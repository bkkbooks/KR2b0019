body:
  text: 續資治通鑑長編巻一百三宋李燾撰仁宗天聖三年春正月丙戌以刑部郎中龍圖閣待制滕渉為右諫議大夫罷職知青州上謂輔臣曰青州大藩宜遴揀牧守渉足以任此乎王欽若曰渉自先朝己任要劇頃自三司副使擢居侍從今兹委寄必能上副聖選也戊子契丹遣宣徽南院使朔方節度使蕭從順樞宻直學士給事中韓紹芳來賀長寜節見於崇政殿皇太后垂簾置酒崇政殿遂燕崇政殿御史中丞薛奎館伴從順欲請見且言南使至契丹者皆見太后而契丹使來獨不得見奎折之曰皇太后垂簾聽政雖本朝羣臣亦未嘗得見也從順乃已及辭從順有疾命宰臣王曾押宴都亭馹從順問曾南朝毎降使車悉皆假攝何也曾曰使者之任惟其人不以官之高下今二府八人六嘗奉使惟其人不以官也從順默然此據王曾言行録稍刪潤之既上壽從順桀驁稱疾留館下不時發上遣使問勞挾太醫診視相屬於道樞宻使曹利用請一切罷之從順知無能為徐引去辛卯長寜節近臣及契丹使初上皇太后夀於崇政殿乙未開封府言長寜節請如乾元節度僧道三百八十人詔止度三百人涇原路總管司言總噶爾埒克遵乞給俸錢詔渭州月給衣著五十匹茶五十斤丙申録故宰相李昉從子宗謹宋琪孫從諤吕端孫詵張齊賢孫襄畢士安孫從簡王旦孫靖並為試秘書省校書郎參知政事李至孫復王沔孫慶孫温仲舒孫希顔及武寜節度使同平章事陳洪進孫永丕翰林侍讀學士禮部尚書邢昺孫處正禮部侍郎王丕孫説並試將作監主簿時以郊祀推恩輔臣之後而丕家無子孫在仕版者故以及之洪進昺例不當得議者以王欽若報其私恩也乙巳宗正寺請以皇后事迹編入玉牒從之辛亥加贈皇后曽祖中書令郭崇為尚書令兼中書令追封祖守璘及父允恭並為節度使母祖母曽祖母並為國太夫人壬子加贈皇太后兄贈侍中劉美為中書令追封嫂越國太夫人錢氏為鄆國太夫人廣州闕守上謂輔臣曰此邦控制海外諸國寳貨所聚前為守者多不能稱職今宜遴擇其人王欽若曰禮部郎中直史館陳從易素有清節先朝累經任使臣等以為從易可從易時在荆南二月乙卯徙從易知廣州加太常少卿直昭文館太常博士臨河陳琰知夏津縣河北轉運使盧士倫曹利用女壻也怙勢聽獄不以直訟者不已付琰評决琰直之御史知雜事韓億聞其事奏為監察御史琰與朱諫並命諫事不詳今但記琰他倣之翰林學士權三司使李諮以其父兵部員外郎致仕文㨗在鄉里春秋髙乞便郡就養上方委諮計事優詔不許欲慰其思親之心戊午賜文㨗三品服詔諸州司士参軍李道宗等三十四人令吏部銓與注官舊制司士参軍以年及格及負犯者為之謂之散参軍先是上取特奏名舉人試藝稍優者補参軍其次與試銜及經南郊試銜者已免選而道宗等反未得注官故有是命庚申詔河北京東路於中等以上户以二税折科塞河梢芟限今年十一月終輦至滑州龜兹及甘州遣使貢方物辛酉試身言書判選人惠州軍事判官林冀等七人與京官餘四十八人第遷如故事先是翰林學士晏殊等以冀等名聞上問輔臣身言書判足以盡人才乎王欽若對曰朝廷設此以旌别選人若四者悉有可采固宜陞進也乙丑右諌議大夫權御史中丞薛奎罷為集賢院學士知并州或譛奎漏禁中語也既而秦州闕守上以奎屢官西邊習其土風即改奎知秦州仍給集賢院學士見俸秦州宿重兵兵費常不足奎務為儉約教民水種謹商算歲終廩粟積者三百萬征算衍者三十萬覆民隱田數千頃復得芻粟十餘萬東上閤門使李昭慶避皇太后祖諱更名昭亮然太后止令羣臣避父諱而近戚多并祖諱避之丙寅提㸃開封府界諸縣鎮公事屯田員外郎張嵩同提㸃供備庫副使張君平並兼管勾開治溝洫河道事仍詔開封應天府陳許徐宿亳曹單潁蔡等州及屬縣親民官並帶開治溝洫河道事先是君平言今歲畿甸雨澤均訴水災者猶及數萬户此積潦不洩州縣縱弛之咎也今方治溝洫或令佐中徙任則後來者漫不知緒何以集事請俟春料畢役許其去時單州碭山下地汚下古河塞不通遂立法督令佐於是河將成又奏非有司專其事後必復廢請本州縣長吏並兼溝洫河道事府界提㸃謹察舉民訴水亟按視之詔皆從其請又以左侍禁李守忠專管勾溝洫河道司己巳詔真宗忌禁樂斷屠宰不視事前後各三日癸酉詔國子監見刋印初學記六帖韻對等書皆抄集小説無益學者罷之三月丙子徙知河南府樞宻直學士陳堯佐知并州毎汾水漲州人憂溺堯佐為築堤植柳數萬本作柳溪亭民頼其利戊寅詔陜西灾傷州軍持仗刼人倉廪非傷主者減死刺配鄰州牢城非首謀者又減一等仍令長吏宻以詔書從事自是諸路灾傷即降下有司敕而民飢盜取穀食多䝉矜減頼以全活者甚衆己卯幸後苑賞花釣魚遂燕太清樓輔臣宗室兩制雜學士待制三司使副知雜御史三司判官開封府推官館閣官節度使至刺史皆預焉庚寅客省使康州防禦使李允則都大提舉内弓箭軍器庫己酉詔輔臣於崇政殿西廡觀孫奭講曲禮仍賜御書古詩各一章度支副使禮部員外郎蔡齊為起居舎人刑部郎中直史館章得象為兵部郎中並知制誥初召齊等試中書上閲其試文謂宰臣曰兩制詞臣以文章為職業然須材識周敏操履端方乃可副朝廷中外任使也王欽若等言齊及得象所長上始命之夏四月壬子朔降詔恤刑先是中書請以例降詔上曰比雖屢下約束州縣吏其能體朝廷欽卹之意乎王欽若曰州縣不能盡得人然獄事至重諸路使者職在按察其稽違者自當劾奏上曰如卿言甚善宜更以此意丁寜申戒之甲寅平羌縣尉鄭宗諤決杖配安州牢城宗諤受枉法贓抵罪㑹赦當追官勒停上問輔臣曰縣尉月俸幾何豈禄薄不足以自養耶王欽若曰俸雖不厚然亷士固亦自守也故重懲之已未賜輔臣御飛白書十軸仍刻石以賜近臣壬戌契丹遣臨海軍節度使耶律守寜衛尉少卿劉四端來賀乾元節癸亥詔權停五月朔御殿先是禮部以故事請上問輔臣曰此何禮也王欽若等曰月令五月之節天子居眀堂太廟唐貞元初以隂氣始此故設君臣相見之儀然近歲未嘗行也因罷之更檢太宗廟説此朔御殿非古也别修癸酉改漢州徳陽縣均渠鄉為太平鄉初邑民張勝家析木有文曰天下太平因以獻故改之仍賜勝茶帛丁丑詔三館所寫書萬七千六百巻藏太清樓初大中祥符中火焚館閣書乃借太清樓書補寫既而本多損蠧者因命别寫還之庚辰三司言興州濟衆監舊鑄錢四鑪歲凡鑄五萬三千貫比來民輸鐡不足而所鑄錢行川界有餘請權減一鑪從之是月以龍圖閣直學士刑部郎中劉曄知河南府曄先代郡人後魏遷都因家河南唐末五代之亂衣冠舊族多離去鄉里或爵命中絶而世系無所考惟劉氏自十二代祖北齊中書侍郎環雋以下仕者相繼環雋生隋大理卿坦坦生唐渝國公政㑹由政㑹至曄十一世皆塟河南而世牒具存曄嘗權發遣開封府事獨召見太后問曰知卿名族欲一見卿家譜恐與吾同宗也曄曰不敢他日數問之曄無以對因為風眩仆而出乃免曄知河南實録偶脱之据河南志在此月因附見家譜事流内銓磨勘引對翰林侍讀學士孫奭所舉滑州觀察判官董儲詔特與太子中允儲進䇿名資序合入太常博士以歴任有過曽笞决部民致死故令近下除改五月癸未禮部言今年貢舉乞賜指揮上謂輔臣曰去歲放及第人數不少然而覽其程試多未盡善今宜權罷貢舉各令勵志修學王曽對曰前來逺方下第舉人方到鄉里今若復許隨計何暇温習事業即降詔權罷貢舉一年五月二日癸未此據㑹要己丑徙廣南宜州懐逺軍於江口寨以舊城多瘴癘而江口可控扼安化蠻人出入故也上始疑徙軍勞民以問輔臣王曽對曰比以轉運使所陳為未足信又使提㸃刑獄官覆按而二司協言其便是可從也詔令徙之庚寅御崇政殿録繫囚癸巳幸南御莊觀刈麥聞民舎機杼聲召問之乃一貧婦也因賜以茶帛諭輔臣曰其勤如此而不免於貧可無恤哉右正言孔延魯當遷官願不遷而為其父祠部郎中致仕朂求三品服上曰子為父請可從也乙未以三品服賜朂王欽若等曰延魯所陳足厚風俗陛下曲從其請實資孝治也己亥賜杭州隠士林逋粟帛兩浙轉運司又言逋有節行居西湖二十餘年未嘗入城故也辛丑贈安化節度使鄒國公允成卒癸卯以其兄齊州防禦使允升為澶州觀察使封延安郡公允升念其弟日夜悲哀上因諭輔臣曰楚王先帝同氣也寢疾歲乆允升兄弟孝友如此宜特為進官以慰楚王之心故有是命允升及允成皆元佐子也己酉詔臣僚奏薦子弟並須言服紀親踈即不得奏無服之親其冐奏者雖遇赦降不原初諌議大夫趙湘以孫為子奏授京官已而自陳殿中侍御史李紘言湘若不自陳則朝廷莫究其弊請條約之而降是詔趙湘以孫為子事當考詳中書言新授虢州團練使田敏差知隰州故事防團刺史赴本任及知州無同判處並權置同判候差朝臣及内職知州即省罷詔隰州權置同判六月乙卯詔京朝官殿直至諸司使新除官及任親民者並令隻日見謝辭其監當及短使許雙日於殿門外見辭丙辰降直昭文館陳從易為直史館集賢校理聶冠卿李昭遘並落職先是從易等校太清樓所藏十代興亡論字非舛誤而妄塗竄以為日課上因禁中覽之故及於責冠卿新安人昭遘宗諤子也辛酉知福州工部郎中陳絳奪兩官責授昭州團練副使福建路提㸃刑獄勸農使侍御史王耿追一官並廣南安置降知興化軍職方員外郎陳覃監潭州税尋又責絳為藤州司馬覃追一官監柳州税太常博士同判信州鞠詠同判邵州初絳與耿互奏不法覃先為勘官詠繼覃而徃皆不得實及遣監察御史朱諌别鞫乃言詠所鞫絳嘗受民通犀帯而估價不盡又覃以絳受民真珠及僧銀而抑令司理參軍葉蓋承之言者以前貶尚輕故絳與覃並再責并及詠焉耿初奏絳不法同提㸃刑獄冦用和獨不言諫因以劾用和上既從諫言絀用和仍謂輔臣曰諫有臺臣風采當記姓名後可用也絀冦用和實録無之今從寳訓魏泰載陳絳獄事比實録差詳然以王耿為轉運使則誤矣且事多與實録不合今不取更當考之丙寅發運副使張綸請開真州長蘆口為河屬之江以免舟楫漂失之患詔從之令涇原路置堡寨五井川以捍西冦仍自今有内附者非先陷蕃軍民邊吏毋得受環原州屬𦍑内冦癸酉命工部郎中龍圖閣待制范雍為陜西縁邊體量安撫使客省副使曹儀副之先是知環州翟繼恩擅配州界熟户和買糧草因縱人入諸族帳催督𦍑人愚鄙初不知糧草數目催督者恣為奸欺誅求數倍小不如意則鞭撻隨之由是諸族帳皆怨思亂乆未能發也㑹涇州蕃部首領斯多倫有過逃去復歸涇原都鈐轄周文質與部署王謙鈐轄史崇信共議斬斯多倫且加凌遲諸族帳皆驚疑遂傳箭相結鈔掠堡柵文質等與知渭州史洵美議放還質子招撫之更擅治兵噐為攻討計賊益恐别部首領實布格又率其族數千帳以叛環州諸族咸起應之大為邊患翟繼恩事據趙珣聚米圖經實録㑹要國史並不載珣以斯多倫為撤陁龍今從實録㑹要國史趙振傳以實布格為薛逋歌與王博文傳不同今從博文傳亦見於實録而趙振則實録無傳也凌遲斯多倫修治兵噐據㑹要實録但載斬斯多倫及放還質子國史俱不載王博文傳所稱曹瑋田敏治邉平冦事皆不合當考丙子改三司蠲納司為理欠司秋七月庚辰朔詔荆湖客船載官糧者回日與免力勝錢從發運司之請也發運使方仲筍副使張綸又言真楚諸州運河冝作水閘石牎分水以溉民田詔漸為之無遽猝擾農綸等訖成其役民甚便焉辛巳知邵武軍職方員外郎吳植除名與上佐官安置殿中丞余諤追一官勒停右侍禁鄭斌衙前編管初植為新繁尉王欽若安撫西川嘗薦舉之於是植被疾懼廢乃附諤黄金二十兩令納諸欽若求外徙諤未至植又遣吏抵欽若第問訊語頗喧欽若知不可掩即捕送開封府既又請付御史臺選中使監劾植初自言未嘗納金反誣吏誤以問諤語逹欽若侍御史知雜事韓億窮治乃得其實然金尚在諤處也斌以追植赴獄輙受賕不即行故皆及於貶有詔撫慰欽若而億并案欽若繆舉之罪詔釋不問時宰相晨朝集待漏院魯宗道視欽若獨不語意象愠甚既明欲上馬忽有䑕突出頗惶擾宗道曰汝猶敢出頭欽若甚媿焉乙酉權御史臺推直官殿中丞程賁言轉官已三周年審官院以為權差未罷不許考課引見詔與磨勘自今在京差遣並準此戊子環慶路鈐轄王懐信言蕃部威布等九百三十五户内附辛卯以環州洪徳寨主左侍禁閤門祇候趙振為内殿崇班𦍑亂始作鈐轄王懐信分兵數千屬振游奕振屢㨗從數十騎詣懐信遇賊十倍射殪數十餘悉追退走而懐信與涇原都鈐轄周文質擁重兵逗遛大板寨不即掩捕既逾月賊數萬衆復圍平逺及定邉合道石昌等寨都監内殿崇班閤門祇候開封趙士隆龍衛右第三軍都指揮使梧州刺史杜澄死焉振引兵由别道力戰抵平逺寨奪取井泉七日夜率敢死士破圍斬首數千級而諸將捄他寨亦盡力賊勢不敵乞兵於趙徳明徳明守境不應乃請和西邉以平振歸信人也杜澄不見邑里趙振本傳載振事差詳諸將捄他寨及賊求援於夏人並畧今取振子珣所為聚米圖經注附益之庶知羌亂始末振本傳及圖經並稱捄平逺寨而實録乃云捄洪徳寨王博文傳屬羌實布格以族帳數千叛既又冦原柳泉鎮環州鵓鴿泉寨梧州刺史杜澄内殿崇班趙士隆戰沒寨名又與此不同當考乙未翰林學士承㫖李維為契丹妻蕭氏生辰使莊宅副使張倫副之張倫未見詔諸路轉運司具所部知州同判老疾不任事者以名聞西邊屬𦍑冦亂既發兵撫遏上慮趙徳明以為疑庚子詔諭徳明辛丑詔環州蕃部内附者前後以萬計宜給土田處之仍戒邊吏自今毋妄納降者壬寅以前户部郎中夏竦起復知制誥竦才術過人然急於進取喜交結任術數傾側反覆世目為奸邪嘗上䟽乞與修真宗實録不報既而丁母憂潛至京師求起復依内官張懐徳為内助而王欽若雅善竦因左右之故有是命丙午詔陜西邊户為𦍑所擾者蠲秋租復役二年從安撫使范雍之請也審官院言得益州路提㸃刑獄張逸状先授太常博士改監察御史通及三年詔依例磨勘丁未荆湖北路轉運使孫冲言下溪州刺史彭儒猛攻殺知忠彭州彭天綰其子儒素率其黨九十二人來歸欲補儒素為復州都知兵馬使餘官並月給錢糧從之忠彭州今忠順州也八月辛亥知益州薛田言本州發解舉人自張詠以來例給館券至京師今得三司移文乃責吏人償所給官物恐非朝廷之意上曰漢貢士皆郡國續食今獨不能行之逺方耶其令悉蠲之丙辰賜涇原環慶路曾經戰守諸軍緡錢有差戊午免忠州鹽井所增鹽及䕫州奉節巫山營田錢萬州穀税錢初䕫州路提㸃刑獄盛京言忠州鹽井三場歲出三十六萬一千四百餘斤近歲轉運司復增九萬三千餘斤主者多至破産被繫而不能輸又奉節巫山兩縣營田户元無實田自偽蜀時奸民詭冐以避徭役其後負税逃死今猶以里胥代之萬州民糴穀而官乃收税錢皆害於民者故悉除之京度之從兄也東上閤門使㑹州刺史王遵度領皇城司遣卒刺事有沈吉者告賈人張化等為契丹間諜即捕繫本司獄所連逮甚衆命殿中侍御史李紘覆訊紘悉得其誣抵沈吉罪辛酉降遵度為曹州都監時有奸人偽為皇城司刺事卒恐民以取賕者權知開封府王臻募得其主名黜竄三十餘人都下肅然乙丑録趙士隆子滋三班奉職淳為借職湘為殿侍杜澄子永徳為奉職永吉為殿侍丙寅幸瑞聖園觀刈穀道燕從臣李諮等既條上茶法利害朝廷亦牓諭商賈以推行不變之意然論者猶爭言其不便辛未命翰林侍讀學士孫奭知制誥夏竦同工部郎中盧士倫殿中侍御史王碩如京使盧守懃再加詳定實録但命奭竦二人此從本志士倫是年三月以工外判度勾尋改工中陜漕十月以度勾為户副詔陜西旱災州軍免今年租税甲戌罷邵武軍歸化縣金場乙亥貶涇原路都鈐轄左騏驥使惠州團練使入内副都知周文質為右率府率衡州安置涇原路部署王謙鈐轄史崇信並免劾差替知渭州馬洵美罰銅三十斤徙别州先是遣太常博士張仲宣右侍禁閤門祇候丁保衡就陜州鞫文質等獄具有司斷文質當徒二年半公罪官減贖銅四十斤特命竄責之丁丑鄜延路鈐轄司言修平川寨城降詔褒諭河北沿邊安撫司言近以奉職張可乆充廣信軍兵馬監押竊縁本軍最處窮邊屯兵不少張可乆新自舉人得班行不惟未諳邊事兼恐職卑難為彈壓管勾欲望於殿直以上别選曽歴邉任監押者充詔可九月庚辰朔以户部郎中知制誥夏竦為契丹生辰使内殿承制閤門祇候史方副之度支副使兵部郎中姜遵為正旦使内殿承制閤門祇候許懐信副之右正言直史館張觀為契丹后正旦使東頭供奉宫閤門祇候趙應副之專遣使賀契丹后正旦始此竦自言承皓與契丹戰沒母䘮未期義不可行改命工部郎中龍圖閣待制馬宗元馬軍都虞候端州防禦使康繼英為涇原路副都部署兼知渭州繼英以戎人雖内附而終蓄奸謀乃大索其嘗反覆者悉蕩除之由是名振西邊誅鋤反覆戎人恐不在此年則此除名亦可削范雍等還自陜西言蕃部因罪罰羊者舊皆輸錢五百比責使出羊而蕃部苦之自今請復令輸錢其罪輕者約以漢法贖銅從之辛巳降知石州洛苑使髙繼昇為洛苑副使先是延州茭村族軍主李都哷等訴茭村廵檢李威眀葉所為不法繼昇非所統輙受而行之有司議法當追一官勒停上特寛之仍令知石州如故繼昇文岯子也罷淮南江浙都大提舉捉賊司乙酉上諭輔臣曰毎遣中使徃名山洞府投龍簡如聞多在僻逺其齎送祭醮之具頗以擾民自今其罷之丙戌詔審官院自今見任并帯職京朝官磨勘並如景徳四年七月敕施行其非時替移年限未及者並候四周年與轉官先是京朝官代還無殿累者皆考課遷官故景徳中詔須見任及三年以上者乃得引對天禧中外任及三年以上者雖未到闕聽磨勘於是申明舊制更立四年之限實録云因以舊制申明按前此轉官止限三年亦有不及三年者今别立四年之限則是稍益舊制不獨申明矣又實録字或脱錯不通參考㑹要稍刪之蓋天禧三年六月二十四日詔書實録失不載也庚寅右率府率衛州安置周文質除名白州編管涇原路鈐轄内園使榮州刺史内侍押班王懐信除名連州編管文質既逺貶而内侍張懐徳又以大板寨擁兵玩㓂之状聞故與懐信再加竄翰林學士權三司使李諮數以疾求外補改樞宻直學士知洪州丁酉詔閤門自今朝臣授外任已辭及代還未見並許赴燕乙巳詔司天監凡奏祥異自今並須據占書以聞時言災變者多為怪迂誕妄之説故條約之丙午詔龍竿城増置蕃落兵兩指揮靜邊寨揚博隆城各一指揮詔自今但係提㸃刑獄勾當不以官資並許舉官冬十月庚戌入内供奉官勾當御藥院張懐徳言體量環慶路蕃官巡檢三班奉職遇埋殺牛犒蕃部𫝊箭欲冦山外詔本路部署司察其巨猾者即加捕誅若事有未便且取酋豪禁質之乙卯涇原路鈐轄司言生户六族首領潘征等二千餘帳内附詔補征本族軍主庚申陜西轉運司言秦州蕃官軍主策拉等請於來逺寨置佛寺以館徃來市馬人從之辛酉翰林學士禮部侍郎晏殊為樞宻副使庚午宰臣王欽若為譯經使唐譯經使以宰臣明佛學者兼領之國朝翻譯經論初令朝官潤文及丁謂相始置使而欽若乃因譯經僧法䕶等請為使議者非之壬申十月二十四日此據㑹要判國子監翰林侍讀學士孫奭龍圖閣直學士馮元等奏近召河南縣主簿郭稹充直講敕令發遣歸任所闕直講别舉官以聞臣等知稹文學優長履行修謹欲徃任所且令在監分經講誦詔以稹為國學説書仍令自今於參選人内保奏不得抽差見在任官稹祥符人也甲戌權知開封府王臻請委清望官於見任京朝官内保舉進士出身曽歴親民者知畿内縣從之十一月己卯朔禁定州嘉山樵采孫奭等言十三場茶積未售六百一十三萬餘斤蓋許商人貼射則善茶皆入商人其入官者皆粗惡不時故人莫肯售又園戸輸歲課不足者使如商人入息而園戸皆細民貧弱力不能給煩擾益甚又奸人倚貼射為名彊市盗販侵奪官利其弊如此不可不革請罷貼射法官復給本錢市茶而商人入錢以售茶者宜優之請凡入錢京師售海州荆南茶者損為七萬七千售真州等四務十三場茶者損為七萬一千皆有竒數入錢六務十三場者又第損之給茶皆直十萬庚辰詔從奭等議自是河北入中復用三説法舊給東南緡錢者以京師𣙜貨務錢償之本志云十月遂罷貼射法恐脱誤今從實錄初計置司議茶鹽利害因言解州安邑兩池舊募商人售京西諸州鹽者入錢京師𣙜貨務乾興元年歲入才二十三萬緡視天禧三年數損十四萬請一切罷之專令入中並邊芻粟及為之増約束防禁以絶販之弊於是復詔入錢京師從京師所便此據本志掇出附見志云乆之今改云於是更須考詳或全取本志并就天聖八年十月聨書之辛巳詔凡配𨽻罪人自今並令長吏以下集㕔事録問仍具案及所配地里逺近以聞其後以奏牘煩罷録案止令以單狀上承進司既而又罷集問焉罷集問乃四年五月事今依本志附此前江都縣主簿王琪上疏陳十事曰復制科禁錦綺珠具置營田立義倉減度僧罷鬻爵𣙜酤和糴行鄉飲籍田復閱武之法興郡學令公卿子弟入國學置五經博士進士專經上以琪學通世務特命試學士院甲申授大理評事館閣校勘琪成都人也辛卯襄州言漢水害民田詔蠲其租丁酉詔晉絳陜解等州歲饑其令本路發廩穀以賑之庚子以太常博士劉牧為屯田貟外郎權度支判官牧善言邊事真宗時嘗獻陣圖兵略得見賜出身上知其名於是通判定州召對便殿而命之劉牧邑里及賜出身當考同知太常禮院陳詁言毎年季冬蜡百神于壇按蜡祭一百九十二位而禮文乃載一百八十二位其五方田畯五方郵表畷十位不載祝文竊恐開元以來年祀浸逺有司失傳又郊祀正辭錄并司天監神位圖蜡祭猫虎皆以虎為於莬蓋初避唐諱請自今復改作於莬為虎及以五方田畯五方郵表畷載之祝文從之司徒兼門下侍郎平章事冀國公王欽若既兼譯經使始赴傳法院感疾亟歸車駕臨門賜白金五千兩戊申卒皇太后臨奠出涕贈太師中書令諡文穆遣官䕶葬事錄親屬及所親信二十餘人女壻大理評事張壊除秘閣校理瓌洎孫也國朝以來宰相卹恩未有欽若比者欽若狀貌短小項有附疣時人目為癭相智數過人毎朝廷有所興造委曲遷就以申上意又性傾巧敢為矯誕太后以先朝所寵異故復用之及呉植事敗太后頗解體同列稍侵之欽若亦邑邑以歿太后解體據温公邑邑以歿據江氏後有詔塑其像茅山列於僊官左正言劉隨言欽若贓汚無忌憚考其實豈神僊也宜察其妄晏殊作茅山五雲觀記載起觀事由或可附此十二月壬子贈右侍禁閤門祇候王仁嶼為崇儀使初仁嶼為歸峽岳鄂都巡檢使與蠻賊力戰以沒至是其子化成乞贈官而中書以歲乆重於施行上曰死鋒鏑之下人之所難豈可以歲月為限乎乃加贈之于闐和罕王遣使來貢方物癸丑宰臣王曽加門下侍郎兼戸部尚書昭文館大學士樞宻副使尚書右丞張知白加工部尚書平章事集賢殿大學士樞宻使曹利用加司空甲寅樞宻副使張士遜加左丞参知政事吕夷簡加禮部侍郎魯宗道加給事中樞宻副使晏殊加刑部侍郎國朝故事叙班以宰相為首親王次之使相又次之樞宻使雖檢校三師兼侍中尚書中書令猶班宰相下咸平初曹彬以樞宻副使兼侍中位戸部侍郎平章事李沆下循故事也乾興初王曽由次相為㑹靈觀使曹利用由樞宻使領景靈宫使時以宫觀使為重詔利用班曽上然議者深以為非至是曽進昭文館大學士玉清昭應宫使同集殿廬將告謝而利用猶欲班曽上閤門不敢裁帝與太后坐承明殿乆至遣押班江徳明趣閤門閤門皇惑莫知所出曽抗聲目吏曰但奏宰相王曽等告謝班既定利用欝欝不平帝使張士遜慰曉之庚申詔宰臣樞宻使叙班如故事而利用志驕尚居次相張知白上及聞召張旻於河陽為樞宻使疑代已始悔懼焉歐靖聖宋掇遺云張知白参知政事嘗言参政之名是貳彼相禮當降之毎乘馬不入政事堂下國老閑談則以降為隆不入為直入未知孰是據此讓曹利用班在已上則歐靖蓋得之矣殿前副都指揮使振武節度使楊崇勲嘗詣中書白事屬㣲雨新霽崇勲穿泥鞹直登堦曽頷之不以常禮延坐崇勲退劾奏其失送宣徽院問狀翌日對上請傳詔釋罪太后問其故曰崇勲武夫不知朝廷之義舉劾者柄臣所以振紀綱寛釋者人君所以示恩徳如此則仁愛歸於上而威令肅於下矣癸亥徙崖州司戸参軍丁謂為雷州司戸参軍謂家寓洛陽嘗為書自克責叙國厚恩戒家人毋輙怨望遣人致於西京留守劉曄祈付其家戒使者伺曄㑹衆僚時達之曄得書不敢私即以聞上見之感惻故有是命謂雅多智是猶出於揣摩也宰相言謂天下不容其罪而竄之今不緣赦宥未可内徙上曰謂斥海上已數年欲令生還嶺表耳魏泰叙此事繆妄最甚今不取張唐英所載差近之故正史循用然謂必不敢上表特與其家人書耳唐英亦誤乙丑淮南節度使檢校太師同平章事張是以前官充樞宻使旻尋改名耆歐陽修作晏殊墓碑云殊上疏論旻不可為樞使當考保大節度使錢惟演加同平章事判許州癸酉契丹遣彰勝軍節度使蕭穆古潘州觀察使鄭文囿來賀皇太后正旦遼使賀太后正旦始此甲戌契丹遣右監門衛上將軍蕭從正右諫議大夫仇道衡來賀正旦詔自今轉運司及州府差官推勘磨勘及勾當諸般公事如已請驛料添支者不得别給㑹要十二月事
