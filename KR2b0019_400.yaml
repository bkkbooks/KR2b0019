body:
  text: 續資治通鑑長編卷三百九十六宋李燾撰哲宗元祐二年三月甲寅詔輔臣分詣寺觀祈雨中大夫集賢殿修撰河北都轉運使李之純為寶文閣待制知瀛州是日內批付三省將來太皇太后受册有司雖檢用章獻明肅皇后故事當御文德殿顧豫凉薄豈敢上比章獻明肅皇后所有將來受册可只就崇政殿宜令三省叙述太皇太后此意降詔施行仍先具詔本進入學士蘇軾草詔曰祥禫既終典册告具而有司遵用章獻明肅皇后故事豫當受册於文德殿雖皇帝孝愛之意務極尊崇而朝廷損益之文各從宜稱矧豫凉薄常慕謙冲豈敢躬御治朝自同先後處之無過之地乃是愛君之深所有將來受册可只就崇政殿後三日內批付三省所進詔本從常慕字下二十六字㫖意稍涉今是不免却有昔非之議可叙述太皇太后顧德實不及章獻不敢必依章獻御文德殿故事宜令三省倣此意度進入於是三省言臣等竊詳二日御劄指揮令降詔受册於崇政殿謙冲退託之意咸謂盛德古昔所無尋具詔草進入今再凖批畫有所更定聖慮所及深加詳盡及凖聖㫖令倣此作詔已依內降本略有損益重定進入如得允當乞批降指揮候得批降指揮作三省同奉聖㫖令學士院依此降太皇太后手詔録黃送門下省陳恬作畢仲游墓志云公之在太常也㑹太皇太后將受寶册宰相申公召公及禮部侍郎郎中員外郎太常卿丞博士至政事堂喻告且訂其論公心知宰相欲遵用章獻明肅皇太后故事受册文德殿也堂吏持其目示座人次至公果然公白願與同列更議宰相曰此先帝遺制且故事也奈何是時羣禮官無一人敢置議者公懼其事遽上抗聲白曰外朝者天子之明堂非母后所宜居之今於此受册遂將垂簾聽政一失其位無以示萬世且先帝遺制豈不曰舊章闕失更在討論耶宰執默諭其意羣禮官猶守舊不變公退獨表請正之宰相以聞太皇太后乃下詔曰以吾不德豈可以充入舊貫之居其受册於中而已於是搢紳大夫皆悚然偉公之建明丁巳太皇太后手詔祥禫既終典册告具而有司遵用章獻明肅皇后故事豫當受册於文德殿雖皇帝盡孝愛之意務極尊崇而朝廷有損益之文各從宜稱仰惟章獻明肅皇后輔佐真廟擁佑仁皇茂業豐功宜見隆異顧豫凉薄絶企徽音稽用舊儀實有慙德所有將來受册可止有崇政殿後數日報政奏事延和殿太皇太后諭曰性本好靜昨止緣主上冲幼權聽政事蓋非得已况母后臨朝非國家盛事文德殿天子正朝豈女主所當御宰臣吕公著等言陛下執謙好禮冠映古今加以思慮精深非臣等所及太皇太后諭執政云云政目亦具載之蘇軾言近被㫖撰太皇太后將來只於崇政殿受册手詔曰愚亦恐有是今非昔之嫌故其略云朝廷損益之文各從宜稱所以推廣聖明謙抑退託之意言此文德受册之禮於今為過於昔為稱也不悟文詞鄙淺未盡聖意致煩改定謹按故事凡詞命有所改易為不稱職皆當罷去伏望聖慈察其衰病廢學特賜改職以安微命鄧溫伯亦請改職詔答不允答詔曽肇制集有之蘇軾草詔軾求罷故也不知鄧溫伯亦求罷何故當考戊午詔宗室世曼第三男令瑜賜仲銑為嗣毋拘年甲著為令又詔左藏南北庫商稅院並中書省差官左右廂店宅務諸司諸庫審計司糧料庫香藥院北抵當所粳米上中下麥料上下諸界舊𨽻三司舉官其令户部奏辟著為令吏部言請諸路科利場務三萬貫以上舉官如故其不及處從本部差注罷京西京東河北陜西路轉運使奏差法從之仍詔如有不職聽轉運司别舉官以聞新本無此辛酉詔禮部貢舉廢雅州嚴道縣錫坑從成都府路轉運司之請也新本無崇寧二年十二月二十五日當考乙丑户部言請致仕文武官遇元豐八年三月六日登極覃恩改官並支與合轉官資請俸內曽因子孫叙封遷轉者即以初轉官一等給折支分數依本條元無請受者勿給從之新本無右諌議大夫梁燾言臣聞黃履薦劉次莊補御史次莊本宰相蔡確密客確弟碩常與交通盜用軍器監官錢抵罪除籍清議喧然不平謂履之不忠莫大焉謹按御史中丞天子執法之官所以持振紀綱肅正朝廷者也御史與宰相隂相交結以為朋附是亂天子之法也朝廷何賴焉宰相者誠人君敬禮信任之臣然一有不勝任之責則御史得以正筆直繩以行朝廷之公是天子以御史為耳目之任既不能治大臣亦將何以治小臣哉確之在位以姦邪欺罔聞當是時權傾天下人莫敢指履既不能正筆直繩已為上辜先帝而下負士大夫矣矧又隂相交結以濟其私至於引客自媚失職亂法其為不忠莫大於此幸陛下仁德如天不致於理而使全首領被簮笏䝉光日月之下為履之賜萬死不報矣安得復列侍從出入朝廷號清臣哉伏望聖慈指揮特賜重行貶竄以為私邪朋黨之誡羣臣幸甚貼黃其保任失當自有國法乞别從有司施行臣恭聞十四日御延和殿聽政伏乞面賜執政大臣行遣仍乞降出此劄子其貼黃乞留中元豐八年四月十四日次莊為御史丙寅降龍圖閣學士知越州黃履為天章閣待制知舒州四月八日履再責梁燾又言臣伏聞已有誥命降受黃履待制在近臣保任失當之過則為重在履朋比不忠之罪則為輕清議訩訩未為允當臣竊以謂羣臣之間有涉附㑹變亂白黑欺罔聰明者自當痛繩以法摧奪屏斥况御史中丞者法度之所在綱紀之所任而自為亂法度隳紀綱可不重為貶竄以清朝廷耶臣前章論履以為其人不堪復在侍從之列非願朝廷削一兩等寵名示恥而已如此豈是治御史不法之典刑哉且待制乃侍從清班安得為貶責之官伏望聖慈詳酌指揮重賜施行以肅中外壓伏清議貼黃臣以清議喧騰不敢循默如朝廷未賜追改前命恐清議終是不平却致言者紛紛紊煩聖聽伏乞少留宸慮速賜指揮臣竊謂執政大臣必能上同聖意共嫉朋邪如履姦回宜無愛惜伏望聖慈面詔大臣别賜施行又言臣近再論黃履結附宰相亂法度隳紀綱待制侍從清班不得為責降之官乞重行貶竄至今未聞指揮臣竊以自古朋黨之起皆致國家禍患明主所當早辨而力除之正臣所當共嫉而急擊之懲一勸百是為典刑方今皇帝陛下富於春秋太皇太后陛下制政房闥乃是深惡朋黨䝉蔽之時而履之姦邪得罪清議正宜立法以肅中外陛下至公至明不疑於斷誠得早辨力除之道輔弼盡忠協德所當共嫉急擊而議罰不敏臣竊惑之伏望聖慈面詔執政大臣檢㑹臣前奏早賜施行以明法度以正紀綱使抱忠特立者知勸懷姦阿狥者知懼臣之為言豈獨區區在履也貼黃若履以已之所知引致孤寒其人冒法履坐纍當貶止是失於保任蓋亦常事陛下聖恩薄其罪可也赦之不問可也今以執法朋附大臣稱薦御史使其人無過履亦自當重責矧次莊之為罪人也履之亂法朝廷不深治之則是為亂法之人又廢其法也何以示天下四月八日履再責左諌議大夫鮮于侁為集賢殿修撰知陳州侁以疾請補郡故也侁舊傳云請六曹寺監長吏各舉僚屬又觀望請復制舉請分經義詩賦為兩科而試先論䇿司馬光以十科取士侁薦王鞏可備獻納科時論紛然新録辨曰制科當復非為觀望侁薦王鞏不曽進用今刪去二十四字恐侁之出或緣薦王鞏也當考二十六日曽肇有論列五月二十日侁卒右諌議大夫梁燾言風聞鮮于侁除集賢殿修撰知陳州侁以疾自陳䝉陛下聖恩許以善去使得安養為侁之賜甚厚然羣議以謂給事中中書舍人諌議大夫待制均是天子侍從獻納之官而諌議大夫在待制之上今侁之去不因有罪輒下遷修撰人以為薄臣謂侁居職未久今方用資格以纍日為功侁之除授不為不當臣竊以朝廷用人當旌别人材不當限此嵗月茍其人可為侍從在朝廷雖一日而去當以其賢而與之侁西州文行之士風莭見稱於搢紳君子中間流落十餘年晚遇陛下奬用羣材之時亟䝉擢在言路侁練習故事忠正開納搢紳咸服是其人可為獻納侍從明矣今以疾請郡恐不須計以嵗月逺近為之髙下伏望聖慈詳酌指揮假侁一侍從職名寵其老成以全陛下初終之恩以長朝廷忠厚之化事出特恩不可為例願下明㫖以塞僥幸二十六日曽肇又論奏詔盛陶依舊工部郎中郭茂恂依舊軍器少監批㫖茂恂多致人言陶在部未久故有是命二月十二日初除四月十八日王覿言盛陶大學博士吕大臨太常博士楊國寶並令中書省記姓名皆以文彥博薦也國寶除太博政目正月二十六日有之實録但稱宣德郎今改正先是侍御史王巖叟言臣風聞文彥博特薦四人乞朝廷不次擢用其間楊國寶吕大臨二人是見任執政之親士大夫口語籍籍以為不平此薦之有無臣不可知既有所聞不敢不告竊以執政之親雖是賢材陛下許其不避嫌而用之若其賢非素信於天下則天下之人一見進用必不稱其賢便謂用之出於私意朝廷雖自信不疑然人之多言亦不可不畏爾况國寶已擢為太常博士大臨已擢為太學博士皆儒學髙選不為沉抑不若且養之以重其名實待他日親嫌之大臣去位躐等用之無所不可初既不損清議又不終失賢材上下兩得豈不美哉不然恐失天下寒士之心於聖德不為有益伏望陛下用人之際常以先寒素為意以慰公議臣聞耆舊之說本朝賢相王旦執政之日不令弟應舉恐妨孤寒進路至今天下稱其美案此下原本缺文詔樞密院將來轉員換前班共不得過七十人人數多寡隨所轄均定殿前司諸班直八人馬軍二十人步軍十七人馬軍司十人步軍司十五人編排神宗皇帝御製所言近申請應中外臣僚之家及官府寺觀等處始經神宗朝賜到御詩御製文字並録本以進頒降付本所竊慮中外臣僚之家祕藏不盡檢尋及録本差錯欲乞從本所移文指定取索仍令所在官司將其本校勘别無差漏用印保明速繳赴本所并御批詔劄之類亦乞取索從之通議大夫提舉鴻慶宫賈昌衡以正議大夫致仕戊辰夏國進奉使祝能野烏裕實克等見於延和殿故夏國主嗣子乾順言昨父國主薨䝉遣使祭奠弔慰前已附表稱謝謹差大使祝能野烏裕實克副使吕寧勤喀瑪等進馬槖駝總二百七十頭匹詣闕稱謝又差大使揚烏威明裕默副使恭羅們色勒裕勒等稱謝太皇太后先是文彥博奏臣竊以數十年風俗僣侈車服器玩多踰制度以致士民之家率多貧之不修廉莭夫為國家之要在乎民富民富之要在乎莭儉民既富矣君孰與不足臣欲乞選官檢唐室至於本朝令式參定制度隨時制宜務令簡當可久遵行庶幾上下有分不敢僣侈風俗當自淳儉太平可以立致臣嘗觀唐史太和中僕射王涯奉勑詳定制度頗為精當終為權貴沮格不行朝論惜之然涯之所定亦甚煩密臣今所乞固須簡當可久遵行其王涯所定令亦録本進呈臣伏詳舊制三品四品官方得衣紫衣朱竊見近時及朝班之內衣紫朱者極多著緑者甚少蓋是時推恩賜者頗衆臣謂服以章有德自古所重臣乞今後非品秩當服朱紫及舊著令例合得外乞罷賜服詔禮部刑部太常寺同共詳議聞奏禮部刑部太常寺尋具到前後禁止奢僣令文可以增損遵行者詔元豐敕令條約已備令御史臺覺察彥博言此蓋在前矣有司及今乃舉行也舊録云禮部刑部太常寺云文彥博奏請近來風俗僣侈車服器玩多踰制度以致士民之家率多病乏欲乞選差官檢詳唐室至本朝令式參定制度隨時制宜務令簡當可久遵行庶幾上下有分不敢僣侈詔令詳議以聞今具到前後禁止奢侈令文可以增損遵行者詔元豐敕令條約已備令御史臺覺察新録因之今全蠔彥博初奏并梁燾駁議故别加删修仍存舊録彥博又奏臣觀六典三銓之法以三類觀其異優者擢而升之否者量而退之所以正權衡明賞罰抑貪冒進賢能今之典選一守定格選格中有以多舉主有軍功者為上多舉主者或善請求有軍功者或容妄冒如近時置人得賞官者極多有同配官者故多失才亦容濫進臣欲乞委吏部尚書侍郎大略依三類之法定本選之人合入知州通判知縣縣令考其才德功效為上中下三品送中書門下覆驗可否定訖判銓官引對一經聖鑑物無遁形便有去留孰不激勸又判銓之官亦當上體朝廷委付之重以衡鑑自任處之不疑間或以人才髙下絶異者特以名聞而進退之乃為稱職詔遣給事中中書舍人左右司郎官吏部禮部看詳彥博奏據本集增入五月十八日三省議上右諫議大夫梁燾言臣恭以天下䝉被聖政日益安靜正宜慎重言動鎮以有常一為動搖猝難復定日者陛下更張法令布宣恩德中外莫不欣悅者以其便于人情也今若事無百倍之利而知其實又不利于百姓則不足為也雖有良法美意未可為也臣竊聞朝廷近以大臣建言乞採用唐王涯之議改易衣服制度付有司集議臣嘗考之古議雖頗有可行之文然在於人情實為未便有司遲留未敢遽决羣言喧騰傳播失實京師細民至不安業逺方之人尤為驚疑臣愚欲乞聖慈特賜指揮寖罷其議以安人心小補之言願留宸念貼黃臣竊聞大臣請以六典故事三類用人朝廷衆議皆以為未安所有元降指揮乞賜寢罷臣所請乞寢罷劄子伏乞聖慈降出付三省候進呈取㫖即乞靣降權罷指揮以示聖恩優假大臣之意又言臣近以大臣請採用王涯之議改衣服制度又請依六曹故事以三類用人並乞寢罷以安羣心今踰十日未聞指揮竊以臣昨來自外方所傳殊可驚駭及入京師乃知事實不致如此然士工皆不自安如所傳者略訪事之本末又知未可行于今日也朝廷雖付之有司以采羣議設使觀望回忌者附㑹遷就其說終亦歸之無用徒為紛紛張皇不若罷之為便今持未可行之事待終無用之言曠日不决以搖人情臣不知何益于朝廷而安之不變耶此臣所以區區而一言也若近來人情已安物議已定臣豈敢復言以瀆天聽訪聞民間以謂事既持久終有施行喧騰搖動未减前日輦轂之下首被聖澤歌頌相聞者有年矣一旦忽起愁歎怨嗟之聲甚可惜也伏望聖慈指揮檢㑹臣前奏早賜施行貼黃涯議苛細妄作當時竟不能行六典雖有成書終亦未曽施行朝廷必欲取其一二且俟他日未晚方今聖政惟新垂意安靜人情漸定不宜動搖伏乞聖慈速賜指揮以安中外按以三類用人至五月十八日乃施行梁燾罷諌議大夫在五月十六日燾行狀云初使契丹回對延和殿太皇太后問燾曰河北有所聞否燾對曰臣自雄州以來但傳聞朝廷改衣服制度臣初不敢為然及至都下乃信所傳不妄而又有甚于傳聞者衣服制度及以三類取人在唐固已難行而謂聖朝可行乎太皇太后曰大臣建議以為可行燾對曰大率國家制度法令豈可以一人為之便遂欲行之須取在廷公議以合天下人情則理順而義得庶可久于行也今陛下不采在廷之公議不察天下之人情直以大臣一言遂以為是便欲行之臣重為陛下失之也太皇太后曰當何如右司諌王覿對曰此終難行燾直曰願罷之陛下方保佑皇帝願守之以安靜有常事有不得已者必更張之乃可此非所先也為大臣者當以堯舜之道輔佐人主奈何以有唐不急之法輒誤聖聽乎燾使還在二月定衣服制度在三月十六日以三類取人在五月十八日須更考詳樞密院言自來轉員引呈軍員絶舊行門對御試武藝並臨時特㫖推恩前期未嘗按試至日試換之際旋乞添加斗力或涉唐突坐罪非輕請於轉員前一日令殿前承㫖軍頭司同入內都知或押班勾當御藥院官一員前一日就軍器庫按習隨事藝定斗力仍審問願換前班之人依令試驗識字殿前司契勘有無過犯申樞密院丁寧曉諭至日不得唐突旋乞增加斗力從之二十六日又有指揮今附此尋又詔令樞密院召管軍臣僚赴院說諭如至日尚有唐突即時押出送所轄軍司收管更不領赴殿前對御審問免致喧瀆新録並無詔內外待制太中大夫以上嵗舉第二任通判資序人堪知州者一人送吏部籍記遇三路及諸路四縣已上知州軍闕先差本等次差嵗舉通判資序人如資序舉主同即兼用本部格差注其見任知懷州王子文知海州霍唐臣知彭州張堯士知廣安軍趙衮令逐路轉運司體量治狀以聞先是殿中侍御史吕陶言臣竊以今日任官之弊其輕且濫者惟郡守為甚也封疆千里生聚萬衆休戚所繫而不問能否一以資格用之為半刺兩任有薦者三人則得之矣侮法慢令殘民害物十郡之中常有二三暗塞不治又有一二舉天下億兆之衆十分而言失其守者將半矣承流宣化又何望焉方今朝廷清明百度講舉憂勞元元以固邦本惟恐一夫不獲而牧守之弊紛紜至此甚可痛也昔兩漢盛時政平訟理民安其業者皆循吏之效唐之貞觀開元號為善治太平亦嘗自擇刺史志其姓名于屏風而用之當時名臣如馬周張九齡輩皆極言刺史不可輕任載在史册足為龜鑑前日朝廷患監司不得其人詔近臣舉用而監司之選稍清矣至于郡守尤為親民略而未議是棄民也臣伏請詔內外待制太中大夫已上於通判資序人內舉堪知州者三人朝廷更加審察送吏部籍記名氏凡遇有闕先差有舉主者如資任未及即差權知其次方差資序合入人庶幾牧守之職有庇民循良之風無愧前古又言王子文等四人治郡無狀故有是詔朝議大夫直龍圖閣試司農少卿范子竒為河北路都轉運使王覿云云附此月二十四日并四月六日己巳詔都水使者王令圖在河北經營河事亡歿令本路量與應副喪事仍賜錢五十萬從侍御史王巖叟奏請也庚午鎮江軍莭度使開府儀同三司判大名府韓絳充集禧觀使發來赴闕絳屢乞致仕不許因召之降授朝散大夫王孝先為都水使者王覿云云附此月二十四日并四月六日右騏驥使內侍押班權管勾入內押班公事馮宗道為皇城使三省言古者道揆在上法守在下今既責有司以守法又委之以引例則為職不專而奉法有二如此則亂上下之分長出入之弊欲例之在有司者收還中書緣修例于法外别作輕重尤難於創法非深識義理善揣情法者不能精也今修例專委吏人恐未能充此任欲擇燭理明審者二人充中書刑房檢例官使議去取類例因令閲大理刑部所上奏案籖貼差失以告於執政古者獄疑則司寇以告于王王命三公參聽之今大理刑部所上奏案必先經尚書省次上中書中書貼例取裁乃過門下門下職在省審見其差誤理須駁正不惟事涉迂滯稽留犴獄亦有逐省退下有司其間輕重相反有司緣此益增眩惑欲刑部大理奏案兩司所議皆同即令具指疑慮可憫情法輕重之狀若兩司所見異同則各為一狀並上中書三省參聽若州郡元作疑慮可憫及情法輕重奏上而有司以謂罪不當讞却行改斷依例具抄奏上內尚書門下省㸃檢尚有可疑亦委三省同議從之政目云詔疑獄三省同議舊録云後以刑部論奏罷前令新録削去二十八日范百録云云即舊録所稱刑部論奏也户部言陜西提刑司奏逐州軍上四等人户既免支移只令本路州縣送納轉運司所立地里腳錢比之就逺倉送納費用錢數别無侵損於民外第五等自來不曽支移人户惟陜解二州費用差少蓋是平日轉運司支移之時地理不均故輕重不等今來難以一例裁减乞下轉運司今後賦稅將第一第二等户支移三百里內第三等第四等户二百里內第五等户一百里內如人户不願支移乞納地里腳錢者亦相度分為三等錢數各從其便從之前此御史言陜西轉運使吕大忠以支移為名其實不離本處止令稅户每斗納腳錢十八文百姓苦之詔提刑司體量故有是奏辛未觀文殿學士銀青光祿大夫知河陽馮京為保寧軍莭度使知大名府詔密州日照莊鹽場以日照鎮為名令監官兼管煙火公事壬申太師宰臣執政親王宗室自羣玉殿迎奉神宗皇帝神御權奉安於文德殿癸酉羣臣詣文德殿行告遷禮皇帝行酌獻禮宗室立班前導神御至景靈宫宣光殿奉安宗室立班如儀迎奉神御鼓吹及鈞容教坊作樂皆吉禮文德殿酌獻皇帝並權易吉服宗室逐處立班及前導神御權用吉服鞍韉禮畢如初吕公著家傳云三月二十一日癸酉奉安神宗皇帝御容於景靈宫宣光殿是日早百官立班文德殿廷詔公著攝事酌獻以上感寒壅不出故也獻畢宰臣親王以下皆徒步導從至本殿非禮也蓋二王欲之此與實録同當考丙子右司諌王覿言臣伏見河北人户轉徙者多朝廷責郡縣以安集空倉廪以賑濟者久矣猶以為未也又遣專使察視之惟恐一夫之不被其澤也恩德可謂厚矣然耕耘失時而流轉於道路者不已二麥將熟而寓食於四方者未還其故何也蓋亦治其本矣所謂本者大河橫流吞食民田未有窮已也故濵河之民居者無安土之心去者無還業之志而又田為陂澤者雖欲還業將安歸乎今河之為患者三泛濫渟滀漫無涯涘吞食民田未見窮已一患也緣邊漕運獨賴御河今御河淤澱轉輸艱梗二患也塘泊之設以限南北濁水所經即為平陸三患也此三患者外則生遐方窺覦之心內則成倉廪空虛之弊失田業者雖遇稔嵗亦無還集之期憂夫役者雖非凶年亦有轉徙之意其為患者如此則朝廷之上得安枕而無慮乎前日朝廷蓋嘗留意於斯矣頻年遣使徒引嵗月而議論終不决也䇿將安出哉臣愚以謂可遴擇都水官轉運司官而責成焉庶幾可為也朝廷於都水轉運司何嘗不務得人耶然而鮮得其人者蓋有自也臣竊見朝廷近日用都水使者必擇其嘗為水官者可謂審矣乃所以失之也夫既有其才又更其事者則善無以加然必不得已惟才之擇焉可也使其人明智不惑而足以辦吾事雖未嘗在河朔未嘗為水官可用也使其人暗陋無識而不足以辦吾事雖久於河朔嘗為水官果何補哉新轉運使范子竒屢在河朔矣是前日嘗建議欲復故道者也初其言似乎得之詳而講之熟者一旦朝廷遣專使李常等按其事常等之議有所不同子竒遽變前說而求合焉果明智不惑之士耶非耶朝廷固嘗採公議而罪之矣今復以為轉運使臣莫知其故也新都水使者王孝先嘗任水官矣是前日以煆錬而為大理卿者也孝先自作長安司録已著暗繆之名關中士人傳以為笑既任水官蔑聞善狀及充廷尉惟務刻深果明智不惑之士耶非耶朝廷固嘗採公議而黜之矣今復以為都水使者臣莫知其故也今河北數千里之地百姓流亡三患未去而欲以治水之效望此兩人臣决知其無補而有害也伏望聖慈以河北生靈為慮使都水轉運司官各得其人然後責之以治水之效庶幾有成焉貼黃稱河議不决纍年矣其持論不同者率多貴近大臣也今都水及轉運司既欲其明智不惑又欲其所守堅正無所觀望畏避然後議論出於至公而可當重責此非子竒孝先之所能及也覿奏議自注云三月二十四日又四月六日覿奏右諌議大夫梁燾言伏聞敕㫖依有司所請以應缺市易均月錢大小姓人户不以係與不係元乞折納舍屋指揮拘掠施行奉聖㫖小姓户拘掠一半此令一出羣衆騷然室廬里巷之間怨嗟愁嘆之聲復作甚可驚也臣以謂失信動搖人情莫大於此朝廷始謂官錢重困百姓至於破産亡家故給還屋業但為均月錢送納甚大惠也行之未久而欲增為貼納行之又未久今復變之豈不失信哉竭其所入為之拘掠擲其不足使之貼納是絶其生計而驅之就饑寒離骨肉也豈不失恩哉其元乞納舍屋謂若在官拘之粗亦有理不係元乞折納者一切奪去未為無名小姓所有不多豈堪去之一半而又增貼納也持之日久取之日削民力終不勝困矣官錢竟至虧損民産竟至破壞是公私兩失矣設使一日得之亦須以嵗月用之即寬嵗月之取以應嵗月之用官錢終足民産終存是公私兩得也况縣官經費不專仰此錢百姓用度非此錢不足何苦而不以緩民而使姦人暴吏不深惟國家大體而妄作自媚諂事朝廷為此刻急之事大罪戾也伏乞聖慈詳酌特賜指揮追寢敕命以安人心使京師之民曉然知陛下仁民惠愛之本意貼黃祖宗之朝京師之民被德澤最深居常無毫髮之擾故大姓數百家慶厯中西鄙用兵急於財用三司患不足者數十萬議者請呼數十大姓計之一日不足曽不擾民而國家事辦祖宗飬此京師之民無所動搖者正為如此臣願陛下以祖宗之法為法存全愛飬京師已敝之民一二十年之間方得如舊誠逺計也伏惟聖慈深留宸念此議梁燾奏議小姓户拘掠一半係二年三月二十四日指揮今附見本月日其從不從當考燾集論此事凡三奏今但存其一編類章疏又别有一奏即第二奏也有少不同今增入燾又言臣風聞朝㫖拘收見缺官錢人户産業臣竊謂未必然命令一下民聞鼎沸傳之四方人情驚擾復結愁怨轉傷和氣甚負陛下安靜天下之本意也伏乞聖慈特降恩㫖罷此行遣令展限理索以安百姓之心貼黃拘收物業者謂如日掠房錢三十二貫每日盡掠納官候償足官錢方却還本户如此則人户每日無以為生必致破壞家計饑寒失所骨肉離散此事萬萬不可行伏乞聖念速賜指揮又今久旱為災恐政事有所未協民情正宜君臣同德以安靜為務此令一出必動人怨非所以感天致雨也伏望面詔執政大臣使欽體睿慈又方今民情漸次安業不可少有動搖只如拘收一半物産亦足以破壞人户家計須是全罷今來指揮即民間實受聖賜也又熙寧以來有司上誤朝廷催納官錢不足即沒納財産至於上等人户雇妻賣子一家老幼星散往往饑寒怨憤至死京師如此破壞大姓十數家中下户不可勝數此事豈可復見於今日也陛下左右之臣必皆忠讜可賜詰問令奏其子細但恐天聰不忍聞之此可為深戒也丁丑開寺觀祈雨戊寅中書舍人曽肇言吏房送到詞頭左諫議大夫鮮于侁除集賢殿修撰知陳州臣已撰辭簽書録黃去訖今檢㑹元祐元年六月十四日𠡠莭文自侍郎至諌議除外官者並無換待制即朝廷擢用及責降者不用此例今來鮮于侁以疾丐郡纍章然後得請即非責降所除集賢殿修撰竊慮未應得前項條貫伏乞下三省改正施行詔候一年取㫖十四日侁出梁燾云云已附十四日駕部郎中黃好謙知濮州樞密院言聞諸路州軍頗闕兵士防守及兵仗不完處今災傷州軍盜賊竊發數有奏報深慮姦人窺伺無備及於僻逺兵甲難到之處乘間作過請除三路外令諸路安撫鈐轄轉運提刑提舉兵甲等司㸃檢轄下防守之備若人兵器仗不足即相度那移添補修完務令足辦僻逺處亦於鄰近量添人防守使緩急可以照應救補或城壘圯壞亦隨宜修補更有合行事件並節次措置以聞即不得張皇搔擾仍不下司從之都大提舉成都府永興軍等路𣙜茶司言凖𠡠熙河秦鳳涇原三路合用茶依舊官為計置永興鄜延環慶三路許商旅通販今欲乞仍以永興鄜延環慶為所部及以都大提舉成都府利州陜西等路茶事司為名并措置畫一並從之編類册三月二十六日聖㫖陜西制置解鹽司言得㫖從本司奏請將沿邊環慶等八州軍依范祥舊法召人自備資本入中解鹽一依新裁定鹽價於轉運司年額鈔內紐算支還價錢其入下鹽却依裁定每斤價錢出賣應副轉運司糴買本司相度乞將舊法客人入納解鹽於年額賣鹽錢數內减費錢二萬七千餘貫許依數取撥添納充在京賣鈔本錢隨時消息平凖鈔價從之己卯詔近年內外官司和雇百姓剗刷廂軍興造土木少有休息今雨雪不時亦恐緣此有傷和應天下見修及合行繕完處止令合役人漸次修緝外餘閒慢處宜權罷三年所有每年例諸州軍剗刷廂軍兵士除河防邊防緊急及城壁倉庫營馬棚不可暫闕應副外亦令權罷差刷三年如有已剗刷到作匠役兵立便却令押歸元處仍不得以和雇為名差雇百姓所有官司有違在京御史臺外路監司覺察按劾以聞西京奉修神御並依己降指揮舊録云國家承平百有餘年祖宗時宫室倉庫至熙寧上漏旁穿先帝稍加完繕時以為傷和氣新録辨曰罷繕修以恤百姓蓋恐懼弭災之盛德今刪去國家承平以下三十四字新録今乃全闕此假蓋脫版非删削也御集在二十八日庚辰刑部侍郎范百祿言近𠡠例在有司者收還中書擇燭理明審者二人充刑房檢例官使議去取因令閲大理刑部所上奏案并令大理刑部奏案具指疑慮可憫情法輕重之狀若兩司所見異同則各為一狀並上中書省者竊詳造令之意當謂秋官之二不得其人致煩朝廷收還此例别建宰屬不付有司恐當為官擇材不可因事變法今新録莭目逐件事理頗窒礙本部施行未得已具奏聽㫖外若以為臣不職宜早斤罷望除臣外任一差遣詔不久新本削去此段今復存之蘇軾撰答詔云成王命君陳商民在辟豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中古之有司與天子相可否蓋如此而况公卿之間議有異同而不盡其說哉例在中書與在有司固宜審處歸于至當而卿遽欲以此去位非古之道也其益修厥官以稱朕意百祿傳明年詔試遷中書舍人司馬光議復差役法百祿曰熙寧初嘗為咸平縣免役法行一日罷開封衙前數百人民甚悅今苐减出錢之數以寬民力可也光不從使遼還遷刑部侍郎有以强盜及故殺鬪殺情可矜者讞于朝法官援例貸免司馬光曰殺人不死則法廢矣百祿曰謂之殺人則可制刑而以為不疑原情而以為無可憫則不可今不處死則二殺之科自是無可疑與可憫者矣天下之獄嵗以萬計如是而殺之則死者不亦多乎光不能奪然卒行之前此嘗詔天下奏獄不當獄者按其罪有司重請讞斷刑罰峻密至有枉情以合法者百祿曰熙寧之令非疑慮與憫而輒奏者免駮勘至元豐刪去之去年詔書不得用例貸配有不當即奏劾自是官吏畏罪不憚論殺因具元豐六年至元祐二年死者貸者之數以聞明年奏獄門下省多駮正當貸者皆欲殺百祿屢以告執政執政怒言於上有詔例在有司者悉收還中書置檢例官二人使議去取閲刑部大理所奏疑慮若可憫情法輕重之狀有異同各以上百祿請去且上疏極論之疏奏悉如所請既宥諸囚而例復歸刑部自是中外奏讞無所避司百祿舊傳載咸平免役事新傳削去餘悉因舊傳按馬光以九月一日卒百祿以九月十二日除刑部侍郎舊傳稱百祿與光爭法豈未為刑部侍郎時或為中書舍人主判刑房則可恐舊傳末可信須考范百祿傳蓋因范祖禹墓志但云使遼還權刑部侍郎不云遷也或以中書舍人兼權刑部侍郎則猶及與光論辨若真為刑部侍郎則光死矣墓銘又云朝廷以百祿議獄持平真為刑部侍郎蓋不詳也墓銘雖出祖禹尚書考之徽録劉賡傳云元佑初大臣議收刑部例還中書設刑房檢討官乃上疏言官制盡出先帝聖畫以例藏刑部可比則擬鈔不可則取㫖六曹惟刑部用例且唐制中書舍人六員押按今以案為房尚襲故事置檢討官則刑房舍人虛設矣時議改熙寧案問自首法賡固執不可髙麗人使李子威問律中五事賡折𠂻疑議聽之聳服云詔右武衛大將軍和州刺史叔羆追毁出身以來告𠡠文字除名勒停坐毆兄叔牙故也又詔內侍省供奉官以下至黃門以一百人為定額遇聖節許進子二人與收係額內有闕於已收係人內從上撥二人食祿願依舊進借差殿侍者聽奏三人餘依著令仍自今年生辰為始殿中侍御史吕陶奏蔡碩案內有考功員外郎吕和卿令其子借軍器監官錢興敗事乞特行責降詔和卿通判袁州八年四月十四日和卿為員外政目云吕和卿袁判生子假名攬軍器監物營運今以曽肇制詞修入二月十六日升卿衝替坐僞封物貿易免稅政目有此實録無之
