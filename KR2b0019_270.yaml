body:
  text: 續資治通鑑長編卷二百六十六宋李燾撰神宗熙寧八年秋七月壬戌詔寺務司不𨽻開封府先是入內供奉官梁從政奏差提㸃寺務司見係開封府判官一員管轄恐一司不須兩處提轄樞密院擬進依前降宣命上批可勘㑹寺務司何等事合屬開封府已而降是詔此據御集增入元年十二月寺務司屬開封崇信節度使知大宗正事宗旦降彰化軍留後欣州防禦使同知大宗正事宗惠降霸州團練使連州防禦使從賁降左武衛大將軍洺州防禦使屯田郎中諸王府記室參軍兼睦親宅講書王慥國子博士同知宗正丞宋靖國內侍髙品盧世永降一官內西頭供奉官張宗禮降西京內品宗旦等坐不察李逢入宫宗禮坐以兵書借趙世居皆㑹赦特責降也詔綾錦院監官李果衝替仍劾罪以聞果被㫖與工匠轉資稽留五十餘日上批果情涉不恭故罷又批三司視有司稽違聖㫖初不行遣亦令分析後三司言綾錦院直受傳宣而三司不預知乃釋之代州言真定府北寨卒杜辛等十六人為契丹所略害之詔賜辛等家絹各二十匹後契丹復歸辛等未嘗殺也癸亥上批河東路義勇保甲養馬每匹支錢嵗計若干速具數申此據御集要見後來申到數目知桂州劉彜言提㸃刑獄許彥先轉運判官傅燮互訟燮指彥先納金珠而轉運使李平一亦言彥先獨差官管勾告發坑冶乞移彥先别路體量理曲之人詔荆湖南路轉運判官喬執中乘驛究實以聞時彥先已除廣南東路轉運副使矣彥先八年三月五日除廣西憲五月二十六日改廣東漕十月二十八日又委李之純九年十月十八日結絶甲子樞密副都承㫖西上閣門副使張誠一為西上閣門使誠一為副都承㫖三年特遷之江南西路轉運司言䖍州江水漲壞州城軍營度修完用錢二萬三千五百餘緡乞降度僧牒詔於本路寬剩役錢內給之令轉運副使李之純提舉右諌議大夫沈立上所集都水記二百卷名山記百卷詔奬之乙丑龍圖閣待制兼樞密都承㫖曾孝寬為龍圖閣直學士上元縣主簿韓宗厚為光祿寺丞以宗厚興水利溉田二千七百餘頃賞之詔進納出身人有㫖落進納字者不以官户例减役錢從司農寺請也丙寅教八軍營陳副將左班殿直閣門祗候臧景權發遣廣信軍景有武略前此知雄州歸信容城縣遼人憚之使者薦其才召見以為營陳副將又擢之而有是命仍召景自今移文北界假洛苑副使兼閣門通事舍人詔左侍禁閣門祗候周宥母喪去職特給俸初令宥勾當騏驥院樞密院言騏驥院並不闕官詔特與添差既踰月又有是命以宥舊事東宫故也添差據六月一日御集周宥本末當考戊辰兩浙路提舉常平等事比部員外郎韓正彥知相州琦兄子也仍詔正彥過闕賜對面諭以照管諸孤又詔聞琦借用相州公使錢二千餘緡其令轉運司除之正彥璩子己巳提㸃淮南東路刑獄祠部員外郎盧秉權江淮等路發運副使七年六月十九日九月二十八日八年五月二十六日并九月十二日吕惠卿云云俱合參考淮南發運司言自五月不雨揚楚州運河通泰等州運鹽河皆不通舟船詔發運司開浚聽留上供錢米給其費仍遣都水監官督視詔聞開封府界雍邱等縣今嵗放水淤田地分其未淤處清水占壓民田其令提舉常平官按視如係民耕地蠲稅一料辛未詔修經義檢討官轉一官選人循兩資張濟葉原闕名劉涇候教授直講有闕日與差舉人各賜絹五十匹王安石初議舉人酬奬欲與免解上不許不許免解據六月二十三日日録上批劉奉世近因相度分畫兵將遍歷涇原等三路慮聞見人材有當達於朝廷者令具以名聞入內供奉官宋用臣為禮賔副使以上批用臣製造諸軍鞍轡一萬五千副皮殼鞍瓦四千面畢工皆用臣創生擘畫省得官錢貫萬不少可優與酬奬故也此據御集詔河北東西路見倚閣纍年常平錢令司農寺比市估量增直聽人以榖折納仍遣官提舉壬申中書堂後官兼提㸃五房殿中丞王兖權發遣大理少卿居數日又權發遣大理寺權發遣大理寺二十二日事今并書前揚州司法參軍張安國為光祿寺丞權檢正中書刑房公事王安石薦之也十二月九日又遷詔京東路監司各具有飛蝗州軍及所撲滅所害田苗分數以聞詔百姓郭懷信逋市易司違限罰錢聽輸同延二州先是懷信自言請市易司鹽鈔既納本息猶以納不如期罰錢千五百餘緡已納百七十緡而市易司又使增納百三十緡乞輸同延二州省道路之費上批可勘㑹元請錢因依進呈而有是詔金部員外郎直集賢院同知諫院兼提舉三司帳司勾院磨勘司范百祿追一官落職監宿州鹽酒稅務曾孝寬張琥言百祿與徐禧爭李士寧獄百祿辭有不實故也吕陶記聞云范蜀公歸成都聞子功自諫院謫宿州與子言曰六郎除諫官時來謀欲辭免豫告之曰辭得亦佳若就之難兩全不壞名節即壞身計今果然上批訪聞通逺軍三岔堡地近纍有西人呌呼理索逃背人口及去失牛羊地分官多不與應報或稱並無致西人不絶辭說久之恐生邉事可令經略司選官一員體量根究如有盜牛羊投來者盡送本界還之河北第十九將內藏庫副使楊萬等充䕫州路體量安撫司聽候差使王安石言萬可了南川獠事也差楊萬等御集在十二日王安石薦萬乃日録七月十九日今并書癸酉詔坑冶旁近坊郭鄉村及淘采烹煉人依保甲排定應保內及於坑冶有犯知而不糾及居停彊盜而不覺者論如保甲法詔以新修經義賜宗室太學及諸州府學甲戌同判都水監侯叔獻言逐年開撥汴口多創作生河侵掘民田廣調夫役官司因緣為弊近朝廷措置惟用訾家店舊口及簽左故道嵗減人夫物料各以萬計今河防無事可以裁損乞從本監選舉小使臣二員勾當汴口兼領雄武掃減罷本掃巡河使臣京西都大使臣各二員所領河清廣濟依舊以六分為額減罷河清一指揮從之十八日叔獻所請可并此詔河北歸鄉流民所過稅百錢以下悉蠲之丙子命太子中允館閣校勘同判武學顧臨代沈括提舉大名府澶恩州義勇保甲韓縝等圖上河東緣邉山川地形堡鋪分書利害詔雙井水峪瓦窯塢分書地開壕立堠增置鋪屋控扼處並依奏石門子鋪如在三小鋪外更不坼移其見安新鋪以東接和爾郭寨地元非分畫處若北人言及即以此拒之如固爭執奏取朝㫖其白草鋪西接古長城先從北與之議毋得過分畫地界其古長城以北弓箭手地聽割移上與王安石日論契丹地界曰度未能爭雖更非理亦未免應副安石曰誠以力未能爭尤難每事應副國不競亦陵故也若長彼謀臣猛將之氣則中國將有不可忍之事矣上與王安石論據日録疑此等即陳瓘所謂記訓也蓋安石實主割地之議者他書可考也此月二十八日并十月一日十一月二十八日云云並合考丁丑詔權羣牧判官祠部員外郎韓宗師改屯田員外郎初御史蔡承禧言宗師自提舉常平入為羣牧判官故事不改左曹恐中書官吏以宗師宰相子故私狥取悅詔御史臺定奪而御史臺以為轉運判官舊例依常調但轉右曹今宗師以第二任通判資序權羣牧判官與運判為一等而本房乃引正羣牧判官例改左曹非是故命改正手詔皇叔祖贈護國軍節度使河東郡王承衍妻京兆郡君陳氏皇家尊屬進封康國夫人又詔河東經略監司提舉司官體量百姓因嵗饑流入北界人數許人首告具實數以聞所差官有嘗經體量前申異同者並釋罪如將來别體量今有不盡當重行朝典上批檢取熙寧初始定兵額文字進入王安石言中書每取兵數料兵食蓋常事前此蔡挺乃令人傳語云不敢公然送去容密寫納緣樞密院嘗得指若中書取兵數即具奏故也安石因請自今乞依例應報上從之於是安石又為上言臣不知兵數須密有何義理也此據王安石日録八年七月十七日事今刪附取熙寧兵額後戊寅太白晝見四方館使榮州刺史李評河東同分畫地界評使遼甫還上復遣之尋有詔促評起發又欲罷韓縝輔臣僉以為不須罷乃已再遣李評必有故當考促評起發見御集二十四日欲罷縝據日録亦二十四日事王圭㑹要七月十八日李評同分畫地界下又云是冬復召韓縝李評赴闕賜對縝等受㫖而往遂畫界至今附注此當考十二月六日癸巳縝等赴闕九年十二月二十五日詔當并考閣門言諸司使至內常侍有職事非繁重而止赴大起居者有初無朝㫖例不赴常朝者有在新城外雖令五日赴朝而隔門不能至者其類不一今請特㫖免常朝起居如故外東西作坊八作司文思院商稅院內酒坊酒庫水碾磨務市易務下界倉草場王府內知客聽赴大起居并朝㑹拜表官局在新城外者聽免常朝起居及朝請餘並赴常朝起居所貴朝請釐務兩不妨廢從之同判都水監侯叔獻監丞劉璯言近詔汴口并黃汴諸河掃河清廣濟兵士增募二分以八分為額竊詳減罷客軍本欲省費若河清等例增二分則嵗費錢糧數倍欲依舊以六分為額罷所差客軍仍詔諸路客軍額減五千人可并入十四日王韶論不當罷客軍招河清致費財上曰但當論河清可減而已罷客軍非不利也安石曰誠如聖㫖此日録六月二十四日今附見罷客軍招河清是月十四日及十八日所書要不詳當考己卯新知明州祠部員外郎劉瑾兼相度淮南水利詔知判官雜壓最髙并未有連判之人結銜不帶同字以中書言知判官兩員以上方稱同而侯叔獻獨判都水監乃帶同字非是故有是命又詔官員合破諸軍迎接者計合到任日除往還驛程前一月發遣送還者除逐程占滯毋過一月詔淮南兩浙路災傷州軍知州通判令監司提舉司精加體量以聞詔濮王諸女並視諸王女封號自縣主改郡主者凡七人此事當考以前不視諸王女何也庚辰大渡河南邛部州山前後都鬼主苴剋為金紫光祿大夫行懷化校尉大渡河南邛部州山前後都鬼主辛巳録草澤王仲回為司士參軍不理選限賜錢百千仲回建言創過嶺閘護民田賞之也詔以新修經義付杭州成都府路轉運司鏤板所入錢封樁庫半年一上中書禁私印及鬻之者杖一百許人告賞錢二百千從中書禮房請也初進呈條貫監司失覺察私印及鬻之者當行朝典上嫌其太重命王安石改之安石謝誠如聖㫖乃臣鹵莾不細看所奏之罪也吕陶記聞云嘉祐治平間鬻書者為監本字大難售巾箱又字小有不便遂别刻一本不大不小謂之中書五經讀者競買其後王荆公用事新義盛行蓋中書五經䜟於先也詔權御史中丞雜壓與正同官職髙者自從本班以御史中丞鄧綰言近嵗中丞始有兼職既兼二職以上則自當從一髙班序位而近者官司妄相凌越以致位序紊亂臣頃嘗申請欲令遵儀制而閣門乃分丞郎給諫為兩等獨令丞郎任中丞者依班圖序中丞本職若給諌為之則在廷立班序中丞位至雜壓則從本班如此則是中丞之位獨申於公而不得申於私也同職異儀臣愚恐不當如此故有是詔又詔進士及第自第一人以下注官並先試律令大義斷案初自三人以下始令試法至是中書習學公事練亨甫言進士髙科任簽判兩使職官通與一州之事其於練習法令豈所宜緩前此習刑名者世皆指以為俗吏今朝廷推恩雖厚而應者尚少又獨優髙科不令就試則人不以試法為榮滋失勸奬之意故有是詔詔權知開封府陳繹奏請孕婦犯罪許㑹赦恩詔經踈决情理輕釋之詔右贊善大夫檢正中書刑房公事范純粹太子中允檢正孔目房公事馬珫各罰銅六斤純粹送審官東院坐在告追開封府吏治事珫坐不承受文字也純粹初與珫爭韓絳頗為純粹解釋上不聽令送御史臺取勘及是絳又不以純粹所坐為然且言純粹有才欲别與差遣王安石言豈可因罪更升差遣上從安石言遂送審官絳力爭弗聽乃曰陛下所見如此則無可奈何即自劾韓絳先乞罷相上謂王安石曰絳恐為范純粹不特為劉佐也事見日録五月十八日范純粹所坐竟未詳當求純粹事迹考究御史蔡承禧言伏閒檢正官范純粹於親情家押貼子勾開封吏人理㑹中書所送文字馬珫封送中書文字與范純粹今見下御史臺勘鞫緣中書政本文字動干軍國機要與羣司不同若使一有漏泄其損不細臣伏詳朝廷置檢正官之意蓋須經術文雅足謀國體多識前言往行以助宰臣有所不知得以咨訪至於㸃檢文字推行吏文猶為下等近年薦者不擇人材祗為進人階漸是致輕墮忽事之人得佐公府臣亦訪聞如王震王白詞場小生新登科舉吏文義理多所未明亦預此選其四人乞聖慈指揮中書大臣課其入府所行文字功最如别無異能先次廢罷公行推擇充選承禧所言純粹馬珫事與實録異今附注此當考權知茂州李琪奏臣竊見本州四面並是蕃部住坐處别無城池限隔土人言每遇蕃部小有作過則便至城下剽劫臣欲修築州城安集百姓以慰逺人之心并乞就本州招刺土兵三百人以武寧指揮為額又竊見利州路一州一縣敕內文州蕃賊入漢界作過其緣邉鎮弓箭手察户等如親自鬭敵斫蕃賊首級者每一賊首支大鐵錢四貫充賞如獲三人首級支賞外仍免户下諸般差配及支移折變其鎮寨將即候得替日量功勞輕重與優等勾當或遷轉一資臣勘㑹本州比之文州更為極邉本州人並慣習戰鬭曾經捕賊今乞威茂保霸等州土兵依上條酬賞上批李琪所陳理有可取宜相度速與施行御集二十一日事當考其究竟行與不行明年四月十三日可參照壬午命知制誥沈括為淮南兩浙災傷州軍體量安撫使太常少卿權判大理寺許遵同糾察在京刑獄詔遵得視三路轉運使資序視資序據遵本傳當考太常丞知司農寺丞朱炎權管勾開封府界提㸃諸縣鎮公事時遣蔡確往河南諸監變轉支賣牧馬府界闕官故也詔開封府國子監舉人併就一處考試仍以兩處解額通計取人癸未命權發遣提舉永興軍等路刑獄太常博士劉定大理寺丞知司農寺丞汪輔之體量根究涇原環慶鄜延路賑濟漢蕃災傷户有無不當貸官榖及措置乖失事以聞究竟當考崇政殿說書同管勾國子監吕升卿權發遣太常寺兼修一司敕升卿乞罷管勾國子監從其請而有是命蔡承禧劾升卿升卿既自辨析且乞劄付承禧王安石白上恐不宜如此若承禧紛紛則煩陛下處置上乃已升卿罷國子以承禧故也事見前月二十三日升卿欲劄已分析付承禧日録乃此月二十八日及八月一日事今并書之於是承禧又奏乞罷升卿經筵職事不報承禧乞并罷升卿說書據奏議增入十月一日升卿出初宰執同進呈承禧劾升卿事吕惠卿曰承禧言升卿事連臣上曰同進呈無害惠卿乞下升卿分析惠卿乃謁告上遣馮宗道撫問召赴中書安石又親詣惠卿道上意惠卿於是上表求補外者三上皆遣中使封還又入劄子上復令安石同王圭諭惠卿惠卿再求對有㫖無復請入見上曰無事而數求去何也惠卿曰陳力就列不能者止臣自度不能所以求止無他願遂臣請上曰卿為參知政事天下事責不在卿一人何必爾惠卿曰頃安石之去一時乏人所以受命不辭安石復來理當决去但䝉陛下宣諭再三所以盤礴至今上曰卿豈以承禧故耶承禧言卿弟無與於卿惠卿曰縱使承禧言臣臣為參知政事茍自度無過豈至為之求去况臣弟分析事又如此乎上曰豈以安石議用人不合安石欲用新進卿不欲之卿欲用曾􅌈而安石不欲耶惠卿曰此亦不繫臣去就况安石未嘗言不用曾􅌈上曰豈以安石前日敷陳承禧事滅裂耶惠卿曰安石避嫌不得不如此臣何訝之有上曰然則安石之來正宜協力何以求去耶惠卿曰安石之來一切託疾不事事與昔日異前此安石為陛下建立庶政千里復來乃反如此不知欲以遺之何人上曰安石何以至此惠卿曰陛下所聽既不一爭又不勝百官紛紛莫可調御臣頃嘗略為陛下陳之至此亦誠難上曰安石必須見天下有可為之理乃肯復來惠卿曰然必是至此有不如所見故不安其位蓋亦緣臣在此陛下意與安石協力者多其聽不一故不安朝廷事可以無臣而不可無安石此臣所以求去也上曰安石必不忌卿惠卿曰安石於臣何忌但陛下初用安石以其勢孤助之故每事易今日陛下以謂安石之助多節之故每事難就則臣之在朝廷所補者少而所害者多不若遂臣之去陛下一聽安石天下之治可成也今使大臣有所不得盡非國家之福蓋為朝廷分别賢不肖是非極是難事斂天下之怨在於一身以及其子孫人主若不察即不免茍且滅裂而已上曰有官守者不得其守則去安石必不肯茍且滅裂惠卿曰惟其欲去所以茍且滅裂王忱不艱允協於先王成德惟說不言有厥咎茍為不然固未能責其不盡也陛下但致一以聽安石殫其學術則臣雖去猶在朝也上曰安石學術莫了得天下事否惠卿曰然上曰卿但參二責不盡在卿惠卿曰此臣所以可去也臣之所陳皆國家事而在臣之私又有往來其間者不去恐為天下笑上曰終不令卿去且但至中書惠卿頓首曰臣不敢奉詔既退上復遣中使諭㫖惠卿辭再入劄子上亦封還且詔銀臺司毋接文字後數日入見上曰纍遣人趣卿就職未見禀承惠卿曰數違㫖不勝死罪但臣在朝有損無補陛下厚恩雖不許避臣之自度終恐難勝上曰無他事何須求去如此之堅惠卿曰臣去則陛下聽安石上曰卿無過慮且可就職惠卿曰陛下數宣諭臣以參二安石不識何也參知政事莫是參知陛下之政事否上曰安石政事即朕之政事也惠卿因言承禧所以言臣弟者意乃在臣上曰已曉無過慮惠卿乃復就職此已上並據蔣靜所作惠卿家傳修入家傳又云承禧言升卿為國子監考試官而惠卿妻弟方通在髙等事凡十餘條宰執進呈至上前惠卿云云今刪取其要詔知丹州宋昌言降通判差遣文思副使郭若虛降一官坐使遼不覺翰林司卒逃遼地不獲也詔晚田闕雨遣官祈禱又詔淮南兩浙等路旱災遣官禱南嶽諸祠載祀典者仍委長吏精䖍致祭命殿前司押教三班差使臧安國定國各選少壯可教兵士五十人教習射法候精熟取㫖升立軍額補義勇保甲教頭安國定國景之子年少熟武藝尤知射法甲申遣大理寺丞陳祐甫殿直楊琰度汴河岸置滲水塘為五丈河上源如可行即計工料以聞後祐甫等言如此興置誠便於是都水監奏請乞令琰管勾興築祐甫提舉從之詔淮南兩浙轉運司相度所須出糴及興修水利斛斗之數計㑹發運司截留上供榖應副以司農寺主簿王古言奉詔體訪淮浙今嵗旱蝗私稼無望民必艱食乞豫為備也六月二十四日古受詔乙酉職方員外郎蹇周輔權發遣淮南東路轉運副使禮院請自今輟朝並輟前殿正朝如已輟而遇休假或坐後殿即通理為數從之丁亥省秦州通判司理各一員以長道大潭二縣析𨽻岷州故也詔提舉京東西路常平等事太子中允方沃贖銅十斤管勾崇福宫太常少卿趙丙降一官持服人太子中允集賢校理許安世俟服闋與小處簽書判官丙沃坐任大宗正丞不察李逢入宫安世坐以鈒龍刀遺李士寧也服除簽書濠州團練判官詔武舉人先試孫吳六韜大義共十道為兩場次問時務邉防策一道與鎖㕔人同考試馬軍司試弓馬差官監試初武舉試格前後參錯至是始加裁定熙河路經略司言夏國錫碩克鄂則爾牒稱前後為漢家蕃部偷略人畜投南界纍索不發遣請髙太尉王團練今月癸未赴三岔堡與錫碩克鄂則爾鄂迪駙馬㑹議牒稱大安二年詔鄜延路經略司令保安軍牒宥州責以夏國久禀正朔今妄稱年號又移牒非其地分邀邉臣㑹議皆違越生事必是夏國不知未欲申奏請聞知國主其首領嚴加誡斷先是上批契勘近降指揮令永興秦鳯等路安撫司委官遍往諸城寨取問緣邉弓箭手有情願請官馬著腳乘騎自管草料准備出入使喚者類聚聞奏即不得抑勒其河東路河裏河外亦有弓箭手人數不少即不曾核及可速依陜西逐路降指揮令經略司委官仔細取問疾速聞奏是日進呈弓箭手願養馬上曰固知其願如此因令具府界保甲養馬數及所免物數進呈上批乃七月二日見御集進呈願養馬乃日録七月二十七日事今附見戊子七月二十八日詔涇原路屯泊就糧上下番正兵弓箭手蕃兵約七萬餘人分為五將副總管苗授為第一將鈐轄和斌副之姚兕為第二將黃琮副之姚麟為第三將都監張繼凝副之鈐轄夏元幾為第四將王寧內殿承制孫咸寧並副之鈐轄种診為第五將都監王光世副之别置熙河䇿應將副以琮咸寧為之從王廣淵請也閏月十二日癸卯五月四日甲子王廣淵言弓箭手蕃部見缺錢九萬餘榖十萬餘乞許令今年秋成日於二年內分作科次催納上批契勘涇原弓箭手蕃部兵纍年災傷人馬俱遭飢餓故逃亡死損數目不少今秋方有成望稍得蘇息所貸錢斛若是併行催理實恐不易復致窘迫逃散可依廣淵所奏速與指揮上批契勘河東分畫地界所已兩次承准北人公牒欲於雙井地分期約相見至今韓縝等未見回報可速降指揮令具約定何月日與北人相見入急遞以聞此月十八日九月二十九日十月一日十一月二十八日可考是月復置真定府井陘縣徙治天威軍即縣治置軍使復河南府偃師鎮為縣廢緱氏縣為鎮德州言民宋靖刃左肋取肝啖父丙久疾為愈
