body:
  text: 續資治通鑑長編卷四百七十三宋李燾撰哲宗元祐七年五月癸未朔甲申象州防禦使知府州折克行為西上閣門使賞戰功也熙河蘭岷路築定遠城凡二十四日畢功經略使范育副都總管王文郁鈐轄知蘭州种誼賜詔奬諭种誼墓志云四年移知鎮戎未赴改權熙河鈐轄知蘭州兼管沿邉安撫司蘭州與通逺軍邉面連屬中間堡障不相接智固麻子等川田美能稼穡皆棄不耕誼纍募民上計請城納克密堡內彭大桞平聚卜結隆扼其要害耕殖以省餽運六年有詔命帥臣范育城其所當先時一路將佐皆難之不敢奉詔獨誼請自任其責於是委誼城李內彭凡二十四日而畢今定逺城是也降詔褒諭賜誼銀絹各百五十按定遠城畢功在七年四月墓志云六年蓋考之不詳誼𫝊大扺因墓志叙事尤疏今不取范育言蘭州城定逺畢功在七年五月一日今以范育此奏附五月一日之後臣近纍乞於努扎谷修八百步大寨及先次修築至今未奉指揮臣勘㑹蘭州既城定逺其東必更城納克密又為二堡定西以東必更城聚卜結隆川又為二堡然後三百里之間形勢相接弓箭手可居地利可據然此六寨堡者皆視努扎為輕重蓋先城努扎則六寨堡易守臣謂努扎之役當先而不當後其說有三其城當大而不當小其說亦有三請終陳之今欲先城聚卜結隆川則其地形當通谷大川有賊馬來路數十處少駐兵則不足以扞賊多駐兵則川谷無水屯兵數萬非穿井數百無以給也若先城努扎則其形勢東距淺井數百里南視聚卜結隆川數百里以堅城駐重兵賊常有後憂不敢引兵而南使其恃衆深入我且要其歸路正所謂扼其吭而撫其背此努扎之城當先而不當後者一也今欲先城納克密則賊必出兵石硤由努扎西向而爭非以重兵東塞努扎之路北制大隆薩等山谷則城未易建也若先城努扎役雖未畢兵不再煩因其餘力傍建納克密併興諸堡工省而易就此努扎之城當先而不當後者二也臣又聞邊防有要害機事有先後今本路建築非一若不據要則將無可緩者若不乘機則將無可後者故先築努扎以據其要則其中數百里之地賊皆不敢窺其外路川谷賊皆不敢肆其出入居者得安於室耕者得安於野行者得安於路巡邏之兵可以息肩而卧矣彼六寨堡者更量本路事力可興則興可止則止可緩則緩可速則速一乘其機則先者已立後者不勞實安邊省費之大利此努扎之城當先而不當後者三也又努扎北控石硤大兵出入之路東扼大小實結等谷其形勢足以制賊使不敢泰然南下如垣墉之禦冦隄防之止水也其西則障蔽數川使裕勒藏等無抄掠之虞遠之使定遠智固勝如無大冦之慮如居室之有門鐍也其南則表裏定西照應聚卜結隆川以東直至秦州諸堡寨如咽喉之視腹心也今若止為護耕小堡則外不足以制賊傍不足以固鄰內不足以自衛與無堡同此努扎之城當大而不當小者一也又護耕小堡不足守禦當賊之去其傍弓箭手視之以為生易其田疇安其室家時其糗糧聚其畜産比賊暴至則委之而趨避是以數十里之民兵生業常寄虎狼之口而待其吞噬也夫為邊防之守乃欲捨其要害之勢而為茍簡之計且將陷民以資敵臣未見其可也此努扎之城當大而不當小者二也又若努扎既為大城獨在東西衆城之表而據其要害則其傍諸寨堡皆外藉其勢故城不必大納克密聚卜結隆川止六百步可以守矣大桞平努扎峗蟾牟山花川止三百步可以保矣若努扎止為小堡則其傍諸寨堡皆戎馬四馳之郊城有不得守守有不得安雖勞人費財未能消異日之邊患此努扎之城當大而不當小者三也臣伏望朝廷深計努扎之不可後城乘土消日舒工役可興之時草枯馬瘠賊兵難集之際先謀修築又計努扎不可作護耕小堡檢㑹臣纍奏乞建八百步大寨利害早降指揮使本路先期計辦一舉就功以消夏賊之狂謀以定邊防之大計臣不勝懇禱二月末王巖叟云云十二月末范百祿云云政目二日勘知真州沈伯玉獄囚死者四五十人監察御史董敦逸言竊見左通直郎直祕閣程頤辭免職名表辭云不用則已獲罪明時不能取信於上又有道大難容名髙毁甚之語怨躁輕狂不可縷數臣按頤起自草澤勸講經筵狂淺迂疏妄自尊大當時有所建白人皆以為笑談而又奔走權門動搖言路幸陛下聖明察其疏繆止令罷職示朝廷之寬恩也頤近因喪服除朝廷以職名加之輿議沸騰皆云虛授今頤猶不自揆肆為狂言至引孔孟伊尹以為比又自謂得儒者進退之義惑衆慢上無甚於此伏望朝廷追寢新命以協公論三月二十二日吳立禮言四月十四日又言丙戌詔程頤許辭免直祕閣權判京西國子監差管勾崇福宫實録云詔程頤許辭免直祕閣權判西京國子監差管勾西京嵩山崇福宫御史董敦逸言頤向為侍講以議論迂疏妄自尊大奔走權門動搖言路乃罷侍講繼以憂去逮服除加之而辭表有怨望輕躁之言故令奉祠頤初表言臣昨被責命出為外官夙夜靡皇惟是內省始蒙招致之禮旋為黜逐之人將胡顔以立朝當自劾而引去至於五請而未聽豈可力辨而求伸遂且從容以須替罷未至任滿遽丁家艱思無忝於所生惟堅持於素節未終喪制已降除書上體眷恩內深愧懼伏念臣志存守道識昧隨時俗所忌憎動招謗毁昨䝉擢任既以人言而被黜為朝廷羞矣今復授以職任適足重為朝廷羞無所益於明時徒取笑於後世伏望聖慈矜察愚誠追寢恩命臣昨因丁憂既已去官今來所下告命不敢祇受已於河南府寄納伏乞朝廷檢㑹臣前來五次奏陳特降指揮許回田里詔不許頤又言伏念臣力學有年以身任道惟知耕食以求志不知利逹以干時陛下詔起臣於草野之中面授臣以講說之職臣竊思之得以講學侍人主茍能致人主以堯舜禹湯之道則天下享唐虞夏商之治儒者逢時孰過於此臣於是幡然有許國之心在職嵗餘凡夙夜畢精竭慮蓋非徒為辨辭解釋文義惟欲積其誠意感通聖心傒交發意之孚方進沃心之論實覬不傳之學復明於今日作聖之效逺繼於先王自二年春後每當臣進說陛下嘗首肯應臣臣知陛下聖資樂學誠自以為千年之遇也不思道大則難容跡孤者易躓入朝見嫉世俗之常態名髙毁甚史冊之明言如臣至愚豈免衆口不能取信於上而欲為繼古之事成希世之功人皆知其難也臣何狂簡敢爾覬幸宜其獲罪明時見嗟公論志既乖於仕道義當致於為臣屢懇請而未從俄遭憂而罷去銜恤既終於喪制退休合遂於初心豈舍王哉忠戀之誠雖至不得已也去就之義當然自惟衰邁之軀得就安閒之地闓今𫝊後更有望於殘年行道致君甘息心於聖世豈期矜貸尚俾甄升恩雖甚隆義則難處前日朝廷不知其不肖使之勸學人主不用則亦已矣若復無耻以茍祿位孟子所謂是為壟斷也儒者進退當如是乎臣非敢自重實懼上纍聖明使天下後世謂朝廷特起之士乃貪利茍得之人甚可羞也臣尚羞之况朝廷乎臣無可受之理敢冒萬死上還恩命伏乞檢㑹臣前後纍奏特賜指揮既有崇福之命頤即承領𠡠牒但稱疾不拜假滿百日亟尋醫訖不就職政目四日納后四日特支依冬至與四月末王巖叟云云不同當考己丑詔宗室初關升親民資序人注監當其請給並視諸路監押例辛卯詔皇后母崇儀使榮州刺史孟在妻王氏特封華原郡君孟在賜錢銀絹各一千賜銀錢絹據政目乃十八日事今附見癸巳詔祕閣試制科論題於九經兼正史孟子揚子荀子國語并注內出其正義內毋得出題丙申朝散大夫給事中黃廉卒丁酉詔今月十六日迎納皇后其行事陪位官各依元祐二年九月太皇太后受冊支賜五分減一二十數已下勿減戊戌上御文德殿發冊及命使奉迎皇后己亥百官表賀於東上閣門庚子吏部尚書王存言臣五月一日文德殿視朝次當轉對臣既述管見復觀事體有可論者不敢默默夫侍從官職在朝夕論思以補上聰人臣備位亡所建明今乃應著令於朔朝轉對以備儀制臣不勝愧汗無地逃責然竊以為視朝轉對之意本為在庭庶官平日不得伸其所見故於朝㑹使之盡言以廣聰明恐非所以責侍從官也欲乞今後文德殿視朝免侍從官轉對專責以朝夕論思之效於體為得從之八月一日孔武仲云云八年正月二十一日免權侍郎以上轉對甲辰龍圖閣待制錢協知青州龍圗閣學士知青州曽布知府州寶文閣待制知瀛州蔣之竒知河中府丙午樞密直學士簽書樞密院事王巖叟為端明殿學士知鄭州以侍御史楊畏言巖叟天資至險強愎徇情父子預政貨賂公行監察御史黃慶基言巖叟廢法徇私强狠自用父荀龍子橫交通貨賄竊弄威福而巖叟遂稱疾章再上故有是命張舜民志巖叟墓云先是公為中書舍人封還滕元發詞頭因言元發能為探報不遣防秋人馬得帥臣體其後他帥已復遣矣而六年秋有麟州之役言事者不知乃謂公在樞府建議罷之然二聖照知本末甚難其言屬公病且久抗章請解機務至於再四上數遣內侍賜詔勉留公請愈堅乃拜端明殿學士知鄭州又云新鄭之命既行言者未巳簾中諭曰不然王巖叟於朝廷有大功今日之命出不獲已此事當考舊録載楊畏黃慶基所言乃殊不及滕元發事須求全章附見新録但刪修云巖叟天資至險强狠自用廢法徇私竊弄威福其餘悉因舊録又失不為巖叟立𫝊信可謂踈略矣鄭雍舊𫝊云王巖叟在位雍依附不言惟奏滕元發罷河東防秋兵致麟府冦為挫國威然則巖叟所以罷要不由此也右正言虞䇿言王巖叟罪狀頗多其間至有贓賄等事猶得端明殿學士而領輔藩伏乞將臣僚前後論列巖叟文字悉付外逐一究治别白是非以正其罪不報編類章疏七年五月二十六日奏今附見此全章當考既無施行即是不報也權陜西轉運使穆衍為左司郎中衍前自右司出視邊備既城定逺於是召入六年十一月十八日衍自右司出權陕漕七年五月二十四日復召為左司衍墓志云熙河分畫疆界議久不决遣衍往視衍還以謂智固勝如據二川美田實蕃漢必爭之地自西郊失利遂廢不守請介二壘之間城李內彭以控要害及言納克密努扎淺井隆諾特皆宜起亭障以通涇原之援明年築李內彭賜名定逺城用衍䇿也六年除陜西漕無幾何復拜左司郎中按衍五年八月以户外使熙河措置弓箭手土田十月十二日除右司員外郎十二月除郎中六年十一月十八日自右司郎中除陜西漕墓志所云請城李內彭蓋六年事却誤繫之五年蓋五年始之六年全未下手七年三月末方進築不一月便了耳墓志便文失實當考正之廣州貢大食國進奉火浣布二匹一段詔置之瑞物閣戊申三省言內殿崇班孟固三班奉職孟禋右宣德郎孟昌齡滎陽縣尉董柏皆以皇后親乞赴闕朝賀今納后禮畢恐合擇此親近者依景祐元年曹琮曹𫝊曹祐例轉官太皇太后曰皇后見有親弟一人係白身須與推恩吕大防等曰董柏亦係皇后親姊夫太皇太后曰昔魯王亦慈聖光獻姊夫未嘗推恩大防等對曰甚善皇后諸親將來年例恩典自可漸及也新舊録同是日三省又言景祐元年十二月李用和劉從廣楊景宗改官移鎮恩例今髙氏向氏朱氏皆有合舉故事加恩者太皇太后曰昔章獻垂簾郭后受册初無此例景宗等恩命蓋仁宗皇帝欲優章惠太后家故爾非垂簾之比也大防等對曰太皇太后雖以向氏故欲深自抑畏其如故事何太皇太后曰外家恩例方欲裁之可又增長乎大防等曰此盛德之事敢不奉詔當備録以付史官麟府路體量安撫司言體量得去年閏八月有探事蕃部斯多音因譯人告知麟州孫咸寧具言賊在海波流欲舉國入塞咸寧詬詈以為誑已叱斯多音出而杖譯者管勾軍馬張若訥統制二州四將知賊深入不即出兵期㑹將佐擊逐伏乞重行責降樞密院言張若訥孫咸寧以斥候不明不豫遣人户作清野之備致賊恣行鈔劫又不能隨後尾擊已降指揮若訥追一官充鄜延路都監咸寧特於已降官上更追一官理逺小處監當資序差赴涇原路准備差使詔張若訥特罷路分都監添差充鄜延路第一將六年九月二十九日又十一月八日體量安撫劉忱也去年十二月十八日遣紹聖三年正月二十七日密院云云可考壬子詔鳯翔府竹木筏應募土人以家産扺當及八千貫以上者管押上京如有拋失虧缺候交納了日給限半年填納並足與三班借職一年外與三班差使又一年與三班借差過二年即不在酬奬之限其少缺木植名數仍將元抵當估價賣填官先是熙寧初鳯翔府寶雞縣木務元係舉人姚舜賢願將家産抵當獨押修河樁木上京罷軍將十五人廪秩之費詔從之而舜賢所押筏木船隻增羡官私利之故有是詔翰林學士梁燾言燾言不得其時因五月十六日納后禮畢附見此月末臣以孤直上荷拔擢兩在言路遍歷臺諫前後論列多蒙聽納昨自外郡再蒙收召使得待罪翰苑論思獻納預聞大政不獨以文字為官也眷遇之厚羣臣莫比如臣之愚何以報稱誓當竭盡死節知無不為終期少補聰明庶不辜負恩遇恭惟皇帝陛下富於春秋早有天下仁聖孝愛之實藹聞于外性資成定盛德日新太皇太后陛下擁護聖躬夙夜不倦保佑之功永福宗社臣民歡欣四海仰戴今來選正中宫已得賢淑冬至大禮自當郊見天地天意人事上下協應維是政機之繁久勞同聼歸權人主不可過時此陛下今日甚盛之舉也退託深宫頤神內典逺光前人垂法萬世豈不美歟願早賜處分以彰全聖如以臣言為然伏望面出手詔付大臣施行天下幸甚臣不勝惓惓竭忠盡直以干斧鉞之誅惟幸裁赦貼黃此事陛下必久已思慮故不在臣下之有言臣輒控至誠上干宸聼以廣聰明之益以决左右之惑唯願早出睿㫖直以還政為指揮不須更問故事如臣下别有獻議伏望斷然勿聼如有合用手詔文字望降密㫖遣使到院諭臣即當進入燾集乞還政時在翰苑其辭可考也行狀亦同行狀於南郊後又載燾疏乞還政辭亦略同集乃無之當考知揚州蘇軾言臣聞之孔子曰善人教民七年亦可以即戎矣夫民既富而教然後可以即戎古之所謂善人者其不及聖人逺甚今二聖臨御八年於兹仁孝慈儉可謂至矣而帑廪日益困農民日益貧商賈不行水旱相繼以上聖之資而無善人之效臣竊痛之所至訪問耆老有識之士隂求其所以皆曰方今民荷寬政無他疾苦但為積缺所壓如負千鈞而行免於僵仆則幸矣何暇舉首奮臂以營求於一飽之外哉今大姓富家昔日號為無比户者皆為市易所破十無一二矣其餘自小民已上大率皆有積缺監司督守令守令督吏卒文符日至其門鞭笞日加其身雖有白圭猗頓亦化為蓽門圭竇矣自祖宗以來每有赦令必曰凡缺官物無侵欺盜用及雖有侵盜而本家及伍保人無家業者並與除放祖宗非不知官物失陷姦民幸免之弊特以民既乏竭無以為生雖加鞭撻終無所得緩之則為姦吏之所蠶食急之則為盜賊之所慿藉故舉而放之則天下恱服雖有水旱盜賊民不思亂此為捐虗名而收實利也自二聖臨御以來每以施舍已責為先務登極赦令每次郊赦或隨事指揮皆從寬厚凡今所催缺負十有六七皆聖恩所貸矣而官吏刻薄與聖㫖異舞文巧詆使不該放監司以催缺為職業守令上為監司之所迫下為胥吏之所使大率縣有監催千百家則縣中胥徒舉欣欣然日有所得若一旦除放則此等皆寂寥無獲矣自非有力之家納賂請求誰肯舉行恩貸而積缺之人皆鄰於寒餓何賂之有其間貧困掃地無可蠶食者則縣胥教令供指平人或云衷私擅買抵當物業或雖非衷私而云買不當價以此之類蔓延追擾自甲及乙自乙及丙無有窮已每限皆空身到官或三五限得一二百錢謂之破限官之所得至微而胥徒所取蓋無虛日俗謂此等為縣胥食邑户嗟乎聖人在上使民不得為陛下赤子而皆為姦吏食邑户此何道也商賈販賣例無見錢若用見錢則無利息須今年索去年所賣明年索今年所賖然後計算得行彼此通濟今富户先已殘破中民又有積缺誰敢賖賣物貨則商賈自然不行此酒稅課利所以日虧城市房廊所以日空也諸路連年水旱上下共知而轉運司窘於財用例不肯放稅縱放亦不盡實雖無明文指揮而以喜怒風曉官吏孰敢違者所以逐縣例皆拖缺兩稅較其所缺與依實檢放無異於官了無所益而民有追擾鞭撻之苦近日詔㫖凡積缺皆分為十料催納通計五年而足聖恩隆厚何以加此而有司以謂有㫖倚閣者方得依十料指揮餘皆併催縱使盡依十料吏卒乞覔必不肯分料少取人户既未納足則追擾常在縱分百料與一料同臣頃知杭州又知潁州今知揚州親見兩浙京西淮南三路之民皆為積缺所壓日就窮蹙死亡過半而缺籍不除以至虧缺兩稅走陷課利農末皆病公私並困以此推之天下大率皆然矣臣自潁移揚舟過濠壽楚泗等州所至麻麥如雲臣每屏去吏卒親入村落訪問父老皆有憂色云豐年不如凶年天災流行民雖乏食縮衣節口猶可以生若豐年舉催積缺胥徒在門枷棒在身則人户求死不得言訖淚下臣亦不覺流涕又所至城邑多有流民官吏皆云以夏麥既熟舉催積缺故流民不敢歸鄉臣聞之孔子曰苛政猛於虎昔常不信其言以今觀之殆有甚者水旱殺人百倍於虎而人畏催缺乃甚於水旱臣竊度之每州催缺吏卒不下五百人以天下言之是常有二十餘萬虎狼散在民間百姓何由安生朝廷仁政何由得成乎臣自到任以來日以檢察本州積缺為事內已有條貫除放而官吏不肯舉行者臣即指揮本州一面除放去訖其於理合放而於條未有明文者即且令本州權住催理聼候指揮其於理合放而於條有礙者臣亦未敢住催各具利害奏取聖㫖其一曰敗闕場務無人承買乞依元祐六年春頒條貫將臨停閉日所定最小錢數為額催納有如缺負即將已前剩納過錢數豁除如已納過無負缺即還所剩其二曰元祐四年大赦已前缺負蠶鹽和買青苖錢物見逃移無處催理者乞依五年四月九日詔保明除放其三曰買撲場務少缺課利估納抵産入官乞依熙寧編􅎁許以所收子利凖折缺數數足給還其四曰元豐八年登極赦前見缺丁口鹽錢及鹽博絹米并和預買紬絹等並乞止據當日所支官物實值為官本催納其因折色增起錢數並權住催理其五曰乞舉行元祐元年九月六日赦文應內外缺市易錢二百貫以下不以官司違法及人户於官司請領或徑於勾當人名下分請者並與除放其六曰諸色缺負並乞只依元祐五年五月二十六日分十料指揮施行仍每遇災傷依元祐􅎁且住催理內人户拖缺兩稅不係災傷已閣者亦分二年作四料送納未納足而遇災傷者亦許權住催理又臣先知杭州日於元祐五年九月具奏四事其一曰見缺市易籍納産業聖恩並許給還或貼納收贖而有司妄出新意創為籍納折納之法使十有八九不該給贖其二曰積缺鹽錢聖㫖已令止納産鹽場監官本價錢其餘並與除放而提舉鹽事司執文害意謂非貧乏不在此數其三曰登極大赦以前人户以産當酒見缺者亦合依鹽當之法只納官本其四曰元豐四年杭州揀下不堪上供和買絹五萬八千二百九十匹並抑配賣與民户不住鞭笞催納至今尚缺八千二三百貫並合依今年四月九日聖㫖除放然臣具此奏目經一百八日不蒙回降指揮復乞檢會行下尚書省取㑹諸處稱不曽承受到上件奏狀十二月八日三省同奉聖㫖令蘇軾别具聞奏臣已於元祐六年正月九日備録元狀繳連奏去訖經今五百餘日依前未蒙行下伏乞檢㑹前奏一處行下臣今所陳六事及前所陳四事止是揚州杭州所見竊計天下之大如此六事四事者多矣若今日不治數年之後百姓愈困愈急流亡盜賊之患有不可勝言者伏望特留聖慮深詔左右大臣早賜果决行下臣伏見所在轉運提刑司皆以催缺為先務不復以恤民為意蓋函矢異業所居使然臣愚欲乞備録今狀及元祐六年正月九日所奏四事行下逐路安撫鈐轄司委自逐司選差轄下官僚一兩人不妨本職置司取索逐州見催諸般缺負科名户眼及元缺因依限一月內具委無漏落保眀供申仍備録應係見行缺負􅎁條出榜曉示如州縣不與依條除放許詣逐司自陳限逐司於一季內看詳了絶內依條合放而州縣有失舉行者與免罪改正訖奏其於理合放而未有明條或於條有礙者並權住催理奏取敕裁仍乞朝廷差官三五人置局看詳立限結絶如此則期年之間疲民尚有生望富室復業商賈漸通酒稅增羡公私寬貸必自此始也臣身逺言深罪當萬死感恩徇義不能默已貼黃稱京師所置局因令看詳畿內缺負又稱本州近準轉運司牒坐準户部符臣僚上言去嵗災傷人户農事初興生意稍還正當惠飬助之蘇息伏望聖慈許將去年檢放不盡秋稅元只收三二分已下者係本户已是七八分災傷今來若未納若有缺必是送納不前乞特與除放其餘納錢見缺人户亦乞特與減免三分外若猶有缺并上二等户如不可一例減放則並乞特與展限候今年秋稅送納其言至切尋蒙聖恩送下户部本部却只檢坐元祐三年七月二十四日𠡠節文災傷帶納缺負條貫應破詔㫖其臣僚所乞放免寬減事件元不相度可否顯是聖慈欲行其言而户部不欲雖蒙行下與不行下同臣今來所論若非朝廷特賜指揮即户部必無施行之理又稱臣今所言六事及舊所言四事並係民心邦本事關安危兼其間逐節利害甚多伏望聖慈少輟清閒之頃特賜詳覽又稱準條檢放災傷稅租只是本州差官計㑹令佐同檢即無轉運司更别差官覆按指揮臣在潁州見逐州檢放之後轉運司更隔州差官覆按虛實顯是於法外施行使官吏畏憚不敢盡實檢放近日淮南轉運司為見所在流民倍多而所放災傷多不及五分支破貧糧有限恐人情未安故奏乞法外支給若使盡實檢放流民不應如此之多與其法外拯濟於既流之後曷若依法檢放於未流之前此道路共知事之不可欺者也臣忝侍從不敢不具實聞奏據蘇軾奏議係此於七年五月十六日今附見月末軾又言臣已具積缺六事及舊所論四事上奏臣聞之孟子曰以不忍人之心行不忍人之政若陛下初無此心則臣亦何敢必望此政屢言而屢不聼亦可以止矣然臣猶孜孜强聒不已者蓋由陛下實有此心而為臣子所格沮也竊觀即位之始發政施仁天下聳然望太平於期月今者八年而民益貧此何道也願陛下深思其故若非積缺所壓自古至今豈有行仁政八年而民不蘇者也臣前所論四事不為不切而經百餘日略不施行臣既論奏不已執政乃始奏云初不見臣此疏遂奉聖㫖令臣别録聞奏意謂此奏朝上而夕行今又二年於此矣以此知積缺之事大臣未欲施行也若非陛下留意痛與指揮只作常程文字降出仍却作熟事進呈依例送户部看詳則萬無施行之理臣人微言輕不足計較所惜陛下赤子日困日急無復生理也臣又竊料大臣必云今者西邊用兵急於財利未可行此臣謂積缺之在户部者其數不資實似可惜若實計州縣催到數目經涉歲月積纍毫釐何足以助經費之萬一臣願特出英斷早賜施行臣訪聞浙西饑疫大作蘇湖秀三州人死過半雖水稍退露出泥田然皆無土可作田塍有田無人有人無糧有糧無種有種無牛殍死之餘人如鬼臘臣竊度此三州之民朝廷加意惠飬仍須官吏得人十年之後庶可全復書曰制治於未亂保邦於未危浙西災患若於一二年前上下疚心同力拯濟其勞費殘弊必不至若今之甚也臣知杭州日曽奏乞下發運司多糴米斛以備來年拯濟饑民聖明垂察支賜緡錢百萬收糴而發運使王覿堅稱米貴不糴是年米雖稍貴而比之次年春夏猶為甚賤縱使貴糴尚勝於無而覿執所見終不肯收糴顆粒以致次年賑濟失備上下共知而小人淺見只為朝廷惜錢不為君父惜民類皆如此淮南東西諸郡纍嵗災傷近者十年逺者十五六年今來夏田一熟民於百死之中微有生意而監司爭言催缺使民反思凶年怨嗟之氣必復致水旱欲望聖慈救之於可救之前莫待如浙西救之於不可救之後也臣敢昧死請內降手詔云訪聞淮浙積缺最多纍歲災傷流殍相屬今來淮南始獲一麥浙西未保凶豐應淮南東西浙西諸般缺負不問新舊有無官本並特與權住催理一年使久困之民稍知一飽之樂仍更别賜指揮行下臣所言六事四事令諸路安撫鈐轄司推類講求與天下疲民盡洗瘡痏則猶可望太平於數年之後也臣伏覩詔書以五月十六日冊立皇后本枝百世天下大慶孟子有言詩曰古公亶父來朝走馬率西水滸至於岐下爰及姜女聿來胥宇當是時也內無怨女外無曠夫此周之所以王也今陛下膺此大慶獨不念積缺之民流離道路室家不保鬻田質子以輸官者乎若親發玉音力行此事所全活者不知幾萬人天鍳不逺必為子孫無疆之福臣不勝拳拳孤忠昧死一言據蘇軾奏議係六月十六日按六月一日已從軾言下詔不應六月十六日又奏此必印本六月日誤今并附五月末
