body:
  text: 續資治通鑑長編卷一宋李燾撰太祖建隆元年春正月辛丑朔鎮定二州言契丹入侵北漢兵自土門東下與契丹合周帝命太祖領宿衛諸將禦之太祖自殿前都虞候再遷都點檢掌軍政凡六年士卒服其恩威數從世宗征伐洊立大功人望固已歸之於是主少國疑中外始有推戴之議壬寅殿前司副都點檢鎮寧軍節度使太原慕容延釗延釗初以殿前都虞侯見顯德五年三月不著邑里將前軍先發時都下歡言將以出軍之日䇿點檢為天子士民恐怖爭為逃匿之計惟內庭晏然不知癸卯大軍出愛景門紀律嚴甚衆心稍安軍校河中苖訓者號知天文見日下復有一日黑光久相摩蕩指謂太祖親吏宋城楚昭輔曰此天命也是夕次陳橋驛將士相與聚謀曰主上幼弱未能親政今我輩出死力為國家破賊誰則知之不如先立點檢為天子然後北征未晚也都押衙上黨李處耘具以其事白太祖弟匡義匡義時為內殿祗候供奉官都知即與處耘同過歸德節度掌書記薊人趙普普初見顯德三年二月語未竟諸將突入稱説紛紜普及匡義各以事理逆順曉譬之曰趙普飛龍記云處耘亦同普曉譬諸將按國史處耘見軍中謀欲推戴即遽白太宗與王彥升謀遂召馬仁瑀李漢超等定議然則曉譬諸將獨普與太宗耳處耘必不在也今削去處耘名太尉忠赤必不汝赦諸將相顧亦有稍稍引去者已而復集露刃大言曰軍中偶語則族今已定議太尉若不從則我輩亦安肯退而受禍普察其勢不可遏與匡義同聲叱之曰䇿立大事也固宜審圖爾等何得便肆狂悖乃各就坐聽命普復謂曰外寇壓境將莫誰何盍先攘却歸始議此諸將不可曰方今政出多門若俟寇退師還則事變未可知也但當亟入京城䇿立太尉徐引而北破賊不難太尉茍不受䇿六軍決亦難使向前矣普顧匡義曰事既無可奈何政須早為約束因語諸將曰興王易姓雖云天命實繫人心前軍昨已過河節度使各據方面京城若亂不惟外寇愈深四方必轉生變若能嚴敕軍士勿令剽劫都城人心不搖則四方自然寧謐諸將亦可長保富貴矣皆許諾乃共部分夜遣衙隊軍使郭延贇延贇不詳何許人建隆二年七月鐵騎左廂第二都指揮使郭延贇領信州刺史馳告殿前都指揮使浚儀石守信殿前都虞候洛陽王審琦審琦初見顯德三年守信審琦皆素歸心太祖者也將士環列待旦太祖醉卧初不省甲辰黎明四面呌呼而起聲震原野普與匡義入白太祖諸將已擐甲執兵直扣寢門曰諸將無主願䇿太尉為天子太祖驚起披衣未及酬應則相與扶出聽事或以黃袍加太祖身且羅拜庭下稱萬嵗太祖固拒之衆不可遂相與扶太祖上馬擁逼南行匡義立於馬前請以剽劫為戒舊録禁剽劫都城實太祖自行約束初無納説者今從新録太祖度不得免乃攬轡誓諸將曰汝等自貪富貴立我為天子能從我命則可不然我不能為若主也衆皆下馬曰唯命是聽太祖曰少帝及太后我皆北面事之公卿大臣皆我比肩之人也汝等無得輒加凌暴近世帝王初入京城皆縱兵大掠擅劫府庫汝等無得復然事定當厚賞汝不然當族誅汝衆皆拜乃整軍自仁和門入秋毫無所犯先遣客省使大名潘美見執政諭意又遣楚昭輔慰安家人殿前都點檢公署在左掖門內時方閉關設守備及昭輔至石守信開關納之宰相早朝未退聞變范質質宇城人初見開運元年按宋史范質傳作宗城人下殿執王溥溥榆次人初見乾祐二年祁按宋史王溥傳作并州人手曰倉卒遣將吾輩之罪也爪入溥手幾出血溥噤不能對天平節度使同平章事侍衛馬步軍副都指揮使在京巡檢太原韓通通初見顯德元年自內庭惶遽奔歸將率衆備禦散員都指揮使蜀人王彥升彥升初見顯德三年遇通於路躍馬逐之至其第第門不及掩遂殺之并其妻子諸將翼太祖登明德門太祖令軍士解甲還營太祖亦歸公署釋黃袍俄而將士擁質等俱至太祖嗚咽流涕曰吾受世宗厚恩為六軍所迫一旦至此慙負天地將若之何質等未及對散指揮都虞侯太原羅彥瓌挺劔而前曰我輩無主今日必得天子太祖叱之不退質等不知所為溥降階先拜質不得已從之遂稱萬嵗太祖詣崇元殿行禪代禮召文武百官就列至晡班定獨未有周帝禪代制書翰林學士承旨新平陶穀穀初見乾祐元年邠州人出諸袖中進曰制書成矣遂用之宣徽使引太祖就龍墀北面拜受國史實録及他傳記並無宣徽使姓名疑即咱居潤也宰相扶太祖升殿易服東序還即位羣臣拜賀奉周帝為鄭王太后為周太后遷居西京蘇轍龍川别志言韓通以親衛戰闕下敗死太祖脫甲詣政事堂范質見太祖首陳禪代議與國史及飛龍記司馬光記聞朔記等所載都不同恐别志誤韓通倉卒被殺未嘗交鋒而太祖實歸府第將士即擁范質等至質等見太祖必不在政事堂其約束將士不得加無禮於太后少帝固先定於未入城時非緣質請也惟執王溥手出血及光所記質不肯先拜當得其實今參取刪修乙巳詔因所領節度州名定有天下之號曰宋改元大赦常赦所不原者咸赦除之內外馬步軍士等第優給命官分告天地社稷遣中使乘傳齎詔諭天下諸道節度使又别以詔賜焉遣使齎詔諭天下國史在己酉今從實録遍告羣祀實録在己酉今從國史二事一體必同施行恐不容相先後五日也别賜諸道節度使詔其日乃戊午今并書眉山蘇軾曰豫觀漢髙祖及光武及唐太宗及我太祖皇帝能一天下者四君皆以不嗜殺人者致之其餘殺人愈多而天下愈亂秦晉及隋力能合之而好殺不已故或合而復分或遂以亡國焉龜鑑曰戰國交爭而合於秦民苦秦暴秦不能一而漢一之南北分裂而合於隋人厭隋亂隋不能一而唐一之五季之餘分閏位天下紛紛而未一也我太祖得天下以仁而民從之故天下一於宋真人勃起開創大業是又跨唐虞越漢唐而與帝王匹休也亦知宋興之由乎我太祖之生蓋天成二年丁亥嵗也祥光瑞采流為精英異芳幽馥鬱為神氣帝王之興自有珍符信不誣也居有雲氣出有日暈天心之眷顧篤矣俚語稱趙神言誇宋人心之向慕久矣天與之人與之而太祖則不知也方其北面周朝奉命征討赫聲濯靈所向輒克顯德之七年太祖生三十有四年矣采薇采薇薇亦作止時蓋正月之上日也是月也京師已有推戴之語而內庭未之知我出我車于彼牧矣時蓋是月之三日也是日也將士又有推戴之語而太祖未之聞越翼日甲辰寢門未闢擁逼者至太祖未及語而黃袍已加之身矣噫河南之避舜猶有辭大坰之至湯猶有待事勢至此聖人不得以遊乎舜湯之天矣奈之何哉則亦有毋虐臣主之誓而已有毋掠民庶之誓而已三遜三辭黽勉而受之能律將士以保周宗而不能使周禪之不歸能擇長者房州之奉而不能遏陳橋之逼天實為之吾其奈何歐陽紀五代史也書梁漢曰亡書晉曰滅至周則大書之曰遜於位宋興嗚呼我宋之受命其應天順人之舉乎受命之日市不易肆仁之至也卧榻之側他睡不容義之盡也汴都仰給漕運故河渠最為急務先是嵗調丁夫開濬淤淺糗糧皆民自備丁未詔悉從官給遂著為式又以河北仍嵗豐稔穀價彌賤命髙其價以糴之上之入也閭巷姦民往往乘便攘奪於是索得數輩斬於市被掠者官償其資戊申贈韓通中書令以禮葬之嘉其臨難不茍也初周鄭王幼弱通與上同掌宿衛軍政多決於通通性剛愎頗肆威虐衆情不附目為韓瞪眼其子微有智略幼病傴時號韓槖駝見上得人望每勸通早為之所通不聽卒死於難王彥升之棄命専殺也上怒甚將斬以徇已而釋之然亦終身不授節鉞其後上幸開寶寺見壁上有槖駝及通畫像遂令掃去之記聞云上初欲斬王彥升以初受命故不忍然終身廢之不用蓋誤也但不授節鉞耳賜唐主李景詔諭以受禪意己酉復置安逺軍於安州鎮國軍於華州泰寧軍於兖州辛亥石守信自義成節度使殿前都指揮使為歸德節度使侍衛馬步軍副都指揮使常山髙懷德自寧江節度使馬步軍都指揮使按宋史作江寧軍節度使侍衛親軍馬軍都指揮使為義成節度使殿前副都點檢厭次張令鐸自武信節度使步軍都指揮使為鎮安節度使馬步軍都虞侯王審琦自殿前都虞侯睦州防禦使為泰寧節度使殿前都指揮使遼人張光翰自虎捷左廂都指揮使按虎捷左廂宋史及宋史記皆作虎捷右廂嘉州防禦使為寧江節度使馬軍都指揮使按寧江宋史及宋史記皆作江寧安喜趙彥徽自虎捷右廂都指揮使嶽州防禦使為武信節度使步軍都指揮使官爵階勳並從超等酬翼戴之勳也壬子賜文武近臣禁軍大校襲衣犀玉帶鞍勒馬有差癸丑放周顯德中江南降將周成等三十四人復歸於唐成未見乙卯遣使往諸州賑貸丁巳命宗正少卿郭玘祀周廟及嵩慶二陵因詔有司以時朝拜著于令玘未見天雄節度使守太尉兼中書令魏王宛丘符彥卿彥卿初見天成元年上表乞呼名詔不允彥卿宿將且前朝近親皇弟匡義汝南郡夫人又彥卿女也上每優其禮遇云先是鎮安節度使侍衛馬步軍都虞候武安韓令坤令坤初見顯德二年領兵巡北邊慕容延釗復帥前軍至真定上既受禪遣使諭延釗與令坤令各以便宜從事兩人皆聽命己未加延釗殿前都點檢昭化節度使同中書門下二品令坤侍衛馬步軍都指揮使天平節度使同平章事辛酉賜霸府賔佐將吏襲衣金帶鞍勒馬有差壬戌歸德節度判官寧陵劉熙古為左諫議大夫掌書記趙普為右諫議大夫樞密直學士宋亳觀察判官安次吕餘慶為給事中端明殿學士攝觀察推官太康沈義倫為戶部郎中歸德節度副使張彥柔領池州刺史彥柔見清泰元年恐非此人甲子以皇弟殿前都虞候匡義領睦州防禦使賜名光義有司請立宗廟詔百官集議尚書省己巳兵部尚書濮人張昭昭初見乾祐二年等上奏曰謹按堯舜禹皆立五廟蓋二昭二穆與其始祖也有商建國改立六廟蓋昭穆之外祀契與湯也周立七廟蓋親廟之外祀太祖及文王武王也漢初立廟悉不如禮魏晉始復七廟之制江左相承不改然七廟之中猶虛太祖之室隋文但立髙曽祖禰四廟而已唐因隋制立四親廟梁氏而下不易其位稽古之道斯為折衷伏請追尊髙曽四代號諡崇建廟室制可國朝宗廟之制嵗以四孟月及季冬凡五享朔望薦食薦新三年一祫以孟冬五年一禘以孟夏其七祀春祀司命及户夏祀竈季夏别祭中霤秋祀門及厲冬祀行惟臘享禘祫遍七祀如親行告謝及新主祔謁即權罷時享告日用牢饌備祀官鎮州言契丹與北漢兵皆遁去北漢戶部侍郎平章事滎陽趙華罷為左僕射華初見廣順元年唐主景遣使誅鍾謨於饒州詰之曰卿與孫晟同使北晟死而卿還何也謨頓首服罪縊殺之亦誅張巒於宣州謨流饒州巒貶宣州副使去年十月事二月乙亥尊帝母南陽郡夫人杜氏為皇太后后安喜人也司徒兼門下侍郎平章事范質加侍中右僕射兼門下侍郎平章事王溥加司空樞密使中書侍郎兼刑部尚書平章事魏仁浦仁浦初見天福十二年衛州人加右僕射樞密使太原吳延祚加同中書門下二品先是質溥參知樞密院事於是皆罷吳廷祚初以宣徽南院使見顯德六年不著邑里按宋史作范質兼侍中王溥守司空魏仁浦為尚書右僕射考宋制兼與為乃實授之詞守則資格未及而暫加之詞今概作加字疑有誤己卯以天下兵馬都元帥吳越國王錢俶為天下兵馬大元帥丙戍長春節賜羣臣衣各一襲宰相率百官上夀賜宴相國寺先是中書舍人安次扈蒙權知貢舉庚寅奏進士合格者楊礪等十九人姓名辛卯大宴於廣德殿凡誕節後擇日大宴自此始前鄉貢生傅孫蘭治左傳春秋聚徒教授其門人有被黜退者蘭乘醉突入貢部喧譁不已下吏案之壬辰蘭決杖配商州就賜前司徒竇貞固貞固泉人初見天福元年前司空李穀穀汝隂人初見天成元年太子太師侯益益平遙人初見天成元年扈彥珂彥珂鴈門人初見乾祐元年不著邑里等器幣於西京宋州以歸德軍旌節來上詔置於潛龍宅三月乙巳改天下州縣名犯廟諱及御名者丙辰唐主景遣使來賀登極南漢宦者陳延夀言於南漢主曰陛下所以得立由先帝盡殺羣弟故也南漢主以為然丁巳殺其弟桂王旋興此據司馬光朔記吳越王錢俶遣使來賀登極唐主景復遣使來賀長春節宿州火燔民廬舍萬餘區遣中使安撫之壬戌追尊祖考為皇帝妣為皇后髙祖幽都縣令朓諡曰文獻廟號僖祖陵曰欽陵祖妣崔氏諡曰文懿曽祖兼御史中丞珽諡曰惠元廟號順祖陵曰康陵祖妣桑氏諡曰惠明皇祖涿州刺史敬諡曰簡恭廟號翼祖陵曰定陵妣劉氏諡曰簡穆皇考周龍捷左廂都指揮使嶽州防禦使𢎞殷諡曰昭武廟號宣祖陵曰安陵陵名號諡皆翰林學士禮部侍郎兼判太常寺事漁陽竇儼所撰定儼儀弟也儼初見顯德四年儀初見開運元年有司言國家受周禪周木德木生火當以火德王色尚赤臘用戌從之癸亥命武勝節度使洛陽宋延渥延渥初見乾祐三年領舟師巡撫江徼舒州團練使元城司超超初見顯德二年副之仍貽書唐主諭意己巳以皇弟光美為嘉州防禦使先是北漢誘代北諸部侵掠河西詔諸鎮會兵以禦之是月定難節度使守太尉兼中書令李彛興言遣部將李彛玉進援麟州北漢引衆去彛興即彛殷也避宣祖諱改焉彛興初見清泰二年此據會要及彛興本傳事當在此月兼判太常寺竇儼上言三王之興禮樂不相沿襲洪惟聖宋肇建皇極一代之樂宜乎立名禋享宴會樂章固當易以新詞式遵舊典即詔儼専其事儼請改周樂文舞崇德之舞為文德之舞武舞衆成之舞為武功之舞改樂章十二順為十二安蓋取治世之音安以樂之義祭天為髙安祭地為靜安宗廟為理安天地宗廟登歌為嘉安皇帝臨軒為隆安王公出入為正安皇帝食飲為和安皇帝受朝皇后入宫為順安皇太子軒懸出入為良安正月朝會為永安郊廟爼入為豐安酌獻飲福受胙為禧安祭文宣王武成王同用永安藉田先農用靜安夏四月癸酉詔儼所定付有司行之儼復請僖祖室奏大善之舞順祖奏大寧翼祖奏大順宣祖奏大慶並從之鐵騎左廂都指揮使王彥升夜抵宰相王溥私第溥驚悸而出既坐乃曰此夕巡警困甚聊就公一醉耳然彥升意在求貨溥佯不悟置酒數行而罷翌日溥密奏其事上益惡之丁丑出彥升為唐州團練使唐本刺史州於是始改焉契丹入侵棣州刺史河南何繼筠追破其衆於固安獲馬四百匹此從本紀按繼筠本傳則在禁盜馬之後二年十月始禁盜馬必繼筠傳誤也繼筠福進子初見顯德二年二月福進初見天成元年太原人也今繼筠傳乃云河南人不知何故昭義節度使兼中書令太原李筠筠初見天福十二年七月在鎮逾八年恃勇専恣招集亡命隂為跋扈之計周世宗每優容之及上遣使諭以受禪筠即欲拒命左右為陳厯數乃僶俯下拜既延使者升階置酒張樂遽索周祖畫像置廳壁涕泣不已賔佐惶駭告使者曰令公被酒失其常性幸毋怪也北漢主知筠有異志潛以蠟書誘筠筠雖具奏而反謀已決筠長子守節涕泣切諫筠不聽上手詔慰撫因除守節為皇城使筠遂遣守節入朝且伺朝廷動靜上迎謂曰太子汝何故來守節矍然以頭擊地曰陛下何言此必有讒人間臣父也上曰吾亦聞汝數諫老賊不汝聽不復顧藉故遣汝來欲吾殺汝耳盍歸語而父我未為天子時任汝自為之我既為天子汝獨不能小讓我耶守節馳歸具以告筠筠反謀愈急癸未執監軍亳州防禦使周光遜間廄使李廷玉遣其教練使劉繼沖及判官孫孚筠誅孚以效順故授屯田郎中不知何許人送於北漢納欵求援光遜德威之子德威初見光化元年廷玉嗣昭之孫嗣昭初見乾寧四年皆有舊第在晉陽北漢主俱釋之厚賜遣還第筠又遣兵襲澤州殺刺史張福據其城從事閭丘仲卿説筠曰公孤軍舉事其勢甚危雖倚河東之援恐亦不得其力大梁兵甲精鋭難與爭鋒不如西下太行直抵懷孟塞虎牢據洛邑東向而爭天下計之上也筠曰吾周朝宿將與世宗義同昆弟禁衛皆吾舊人必將倒戈來歸况吾有儋圭槍潑汗馬何憂天下哉儋圭筠愛將善用槍潑汗筠所畜駿馬也乙酉幸玉津園遣使分詣京城門賜飢民粥丙戌命中使浚蔡河設斗門以節水自都城距通許鎮以客省使萬年張保績為衛尉卿判客省閣門事保績在閣門前後四十年宣贊詞令聽者皆聳儕輩推其能纍使藩方不辱君命歷事六朝未嘗有過故特寵之保績初見顯德四年特寵之此據會要且云事在建隆中本傳云國初遷衛尉卿不得其日月又云從征李筠以足疾留河內因得長告三年十一月卒按此則其遷衛尉卿必在征李筠之前矣今附見昭義反書至樞密吳延祚言於上曰潞州巖險賊若固守未可以嵗月破然李筠素驕易無謀宜速引兵擊之彼必恃勇出鬬但離巢穴即成擒矣上納其言戊子遣侍衛副都指揮使石守信殿前副都點檢髙懷德帥前軍進討上敕守信等曰勿縱筠下太行急引兵扼其隘破之必矣石守信等出軍正史在戊子實録在癸巳戊子四月十九日癸巳二十四日今從其近者是日大宴廣德殿丙申命户部侍郎夀陽髙防兵部侍郎陽曲邊光範並充前軍轉運使防初見天福十二年上召三司使清河張美調兵食美言懷州刺史馬令琮度李筠必反日夜儲偫以待王師上亟令授令琮團練使宰相范質曰大軍北伐方藉令琮供億不可移他郡戊戌升懷州為團練以令琮充使焉令琮大名人也張美初見顯德二年五月己亥朔日有食之上降服出次百官各守其司庚子命宣徽南院使髙唐咱居潤居潤初見顯德二年赴澶州巡檢殿前都點檢鎮寧節度使慕容延釗彰德軍留後太原王全斌全斌初見天成元年率兵由東路與石守信髙懷德會辛丑以洺州團練使博野郭進為太州防禦使兼西山巡檢備北漢也北漢主遣內園使李弼弼未見以詔書金帛善馬賜李筠筠復遣劉繼沖詣晉陽請北漢主舉軍南下已為前導北漢主將謀於契丹繼沖道筠意請無用契丹兵北漢主從之即日大閲傾國自將出團柏谷羣臣餞之汾水左僕射趙華曰李筠舉事輕易事必無成陛下掃境內而赴之臣未見其可也北漢主瞋目謂華曰朕志已決卿安能知其必無成耶卿有長䇿顧當何如華未及對北漢主拂衣上馬行至太平驛筠身率官屬耆老迎謁北漢主命筠贊拜不名坐於宰相博興衛融之上融初見廣順元年封西平王正史作西平王劉恕十國紀年亦作西平王路振九國志及五代史作隴西郡王今不取賜馬三百匹及服玩珍異甚衆筠所獻亦略與所賜等及文武大臣皆有賂筠見北漢主儀衛寡弱不似王者內甚悔之北漢主數召筠計事筠自言受周氏恩不忍負之而北漢主與周世仇也聞筠言亦不悅筠將還別賜馬及鎧甲具裝遣宣徽使萊人盧贊監其軍筠心益不平筠有馬三千匹日夕校閲欲直趣大梁贊嘗見筠計事筠不應顧左右曰大梁兵皆我昔時部曲也見我則降耳贊怒拂衣而起北漢主聞贊與筠有隙遣衛融詣軍中和解之筠留其長子守節守上黨自率衆三萬南出癸卯石守信等言破筠衆於長平斬首三千餘級又攻拔其大會寨是日端午賜百官衣各一襲甲辰詔削奪李筠官爵上以畿甸委輸京師吏多旁緣為姦民或咨怨乙巳命殿中侍御史王伸伸未見監察御史王祜户部郎中沈義倫等八人分領在京諸倉祜莘人也丙午幸宰相魏仁浦第視疾先是改作周六廟於西京己酉廟成遣光祿卿郭玘奉神主遷焉乙卯宴近臣於廣政殿以忠正節度使兼侍中楊承信來朝故也自是節度使來朝即宴如例承信初見天福三年丁巳詔親征以樞密使吳延祚為東京留守端明殿學士知開封府吕餘慶副之皇弟殿前都虞候光義為大內都點檢侍衛馬步軍都指揮使韓令坤率兵屯河陽己末帝發大梁壬戌次滎陽召西京留守河內向拱與語拱初見廣順二年嘗改名訓拱勸上急濟河踰太行乘賊未集而擊之稽留浹旬則其鋒益熾矣樞密直學士趙普亦言賊意國家新造未能出征若倍道兼行掩其不備可一戰而克上納其言甲子次河陽丙寅次懷州丁卯前軍都部署石守信副都部署髙懷德破賊軍三萬餘衆於澤州南獲北漢河陽節度使范守圖守圖未見殺盧贊筠遁入澤州嬰城自固是月永安節度使折德扆破北漢沙谷寨斬首五百級德扆從阮之子也實録在六月甲午據奏到之日也德扆初見乾祐三年從阮初見開運二年六月己巳朔上至澤州督諸軍攻城初吐渾府都留後汾州團練使王全德帥所部從李筠戰澤州南既敗走入潞州與筠子守節為距守計全德未見及上圍澤州全德大懼與親信數十人犯關來奔龍捷指揮使王廷魯廷魯未見亦自潞州相繼出降賊勢轉蹙矣澤州城逾旬未下上召控鶴左廂都指揮使薊人馬全義全義初見廣順三年不著邑里賜食御坐問以計䇿全義請并力急攻且曰緩之恐復生變上即命諸軍奮擊全義率敢死士先登飛矢貫臂流血被體全義拔鏃進戰士氣益奮上親帥衛兵繼之辛巳克其城李筠赴火死獲北漢宰相衛融命掩尸骼禁剽掠放澤州民今年田租乙酉進攻潞州丁亥筠子守節以城降上赦其罪升軍州為團練按續資治通鑑作以為單州團練使用守節為使是日車駕入潞州宴從官於行宫辛卯德音降死罪囚流以下原之潞州近城三十里內勿收今年田租諸路州府寺院經顯德二年停廢者勿復置當廢未毁者存之澤州之未破也筠愛妾劉氏謂筠曰軍州馬尚有幾何筠曰汝何問為劉氏曰今孤城危迫旦暮且破若得馬數百匹尚可以犯圍走保上黨上黨樓堞堅固且近河東易於求援與其守死不猶愈乎筠然之料見馬且千匹將出左右或沮之曰今在帳前之人皆云與大王同心一旦出城劫大王降敵其可悔乎筠猶豫未決明日城陷筠走赴火劉氏將從之筠以其有娠麾之使去守節無子購得之生子卒為筠後北漢主聞筠敗自太平驛遁還晉陽謂趙華曰李筠無狀卒如卿言吾幸全師以歸但恨失衛融盧贊爾由是重文學之士久之華請老使食其祿終身以翰林學士承旨兵部尚書趙𢎞為中書侍郎兼兵部尚書平章事𢎞薊人也按宰相除拜必載於帝紀及宰相表今書中載趙𢎞平章事紀與表皆不載再考薛應旗王宗沐續通鑑亦皆未載疑宋史脫誤而二家因之也癸巳安國節度使元城李繼勳來朝乙未命為昭義節度使繼勳初見顯德三年不著邑里丁酉上發潞州秋七月戊申至京師初衛融之被執也上詰融曰汝教劉鈞舉兵助李筠反何也融從容對曰犬各吠非其主臣四十口衣食劉氏誠不忍負之陛下宜速殺臣臣必不為陛下用縱不殺終當間道走河東耳上怒命左右以鐡撾擊其首流血被面融呼曰臣得死所矣上顧左右曰此忠臣也釋之命以良藥敷其瘡因使融致書北漢主求周光遜等約亦歸融太原北漢主不報辛亥以融為太府卿壬子幸宰相范質第視疾賜黃金器二百兩白金器千兩絹二千匹尋復賜錢百萬賜錢乃八月甲戍事今并書前司空趙國公李穀初歸洛陽李筠以穀周朝名相遺錢五十萬他物稱是穀受之及筠叛穀憂恚發病乙卯卒上為廢朝二日贈侍中戊午宴韓令坤等於禮賢講武殿賜襲衣器幣鞍勒馬有差賞平澤潞之功也初成德節度使金城郭崇崇初見天福二年聞上受禪時或涕泣監軍陳思誨密奏其狀且言常山近虜崇懷怨望宜早為之所上曰我素知崇篤於恩義此蓋感激所發耳然亦遣使偵之崇聞有使至憂悶失據謂左右曰茍使命不測將奈何左右莫對觀察推官辛仲甫曰公首效誠節且軍民處置率循常度朝廷雖欲加罪何以為辭使者若至但率官吏郊迎盡禮致恭淹留伺察當自辨明矣崇如其言日與僚佐飲博使者審崇無他即歸奏之上喜曰我固知崇不反也已而崇請入朝是日命宣徽南院使咱居潤權知鎮州仲甫汾州人崇前在澶淵仲甫為掌書記廂虞候劫部民二人殺之其家訴言隂識賊魁而廂虞候者崇親吏也吏不敢詰仲甫力請捕之案治有狀吏猶稽緩欲變其獄仲甫抗白崇曰民被寇害又使自誣重傷甚矣焉用僚佐請易其獄吏以雪寃憤崇大感悟即遣司法掾李濯移鞫之正其罪置於法李濯未見陳思讓汾州人初見天福六年思誨即其弟也郭崇辛仲甫傳載中使伺察事稍不同今參校修潤使不相抵牾澶州蝗遣使督官吏分捕乙丑唐主景遣使賀平澤潞丁卯又遣其禮部郎中龔慎儀來貢乘輿服御物慎儀邵武人也河陽節度使真定趙朝以疾歸京師是月卒上甚悼焉初贈太子太師再贈侍中朝歷方鎮好聚斂無他勳勞但以周初與宣祖分掌禁軍有宗盟之分故蒙優禮再加贈典非常例也八月戊辰朔御崇元殿設仗衛羣臣入閣置待詔候對官賜廊下食庚午宴近臣於廣德殿江南吳越朝貢使皆預自是江南吳越使來即宴如例壬申復升貝州為永清軍是日幸玉津園甲戍命近臣分詣京城諸祠廟禱雨保義節度使河東袁彥性凶率政出羣小陕人患之及聞禪代日夜繕甲治兵上慮其為變命潘美往監其軍遂圖之美單騎入城諭令朝覲彥即治裝上道上喜謂左右曰潘美不殺袁彥成我志矣丙子徙彥為彰信節度使忠正節度使兼侍中楊承信為護國節度使承信至河中或言其謀反上遣作坊副使魏丕賜承信生辰禮物因察之還言承信無反狀承信因是獲殁於鎮丕相州人也忠武節度使兼侍中陽曲張永德永德初見乾祐三年徙武勝節度使初顯德末有方士私為永德言上受命之符者永德在軍中潛意推奉將聘孝明皇后永德出緡錢金帛數千以助納采上甚德之於是自許來朝命改鎮鄧恩寵優渥舊臣無與比者其後復入覲召對後苑道舊故為樂飲以巨觥永德妻周太祖女晉國公主也但呼駙馬而不名嘗問所寶通天犀帶安在永德曰往以征淮過用官錢二十萬貫已償之矣上曰尚欠幾何曰五萬貫即日詔除其籍仍別賜二十萬從遊玉津園命衛士代執其轡時上將有事於北漢因密訪䇿略永德曰太原兵少而悍加以契丹為援未可倉卒取也臣愚以為每嵗多設遊兵擾其田事仍發間使諜契丹先絶其援然後可圖上曰善據司馬光百官表永德以八月自許州徙鄧州而實録本紀闕略今追附於此龍川别志云太宗娶符后太祖使永德助聘財今從國史壬午以皇弟殿前都虞候睦州防禦使光義領泰寧軍節度使甲申立琅邪郡夫人王氏為皇后皇妹為燕國長公主后華池人彰德節度使饒之女也饒初見天福十二年八月丙戌詔有司案前代舊式作新權衡以頒天下禁私造者十九日本紀即云頒新量衡於天下按此但新造未頒也今從本志右司郎中李秉秉未見責授左贊善大夫秉前判吏部官告院吏盜用官錢穀十萬秉不知覺故有是命初上征澤潞留樞密直學士右諫議大夫趙普居京師普因皇弟光義請行上笑曰普豈勝甲胄乎許之及第功推賞上曰普宜在優等戊子以普為兵部侍郎充樞密副使大宴廣政殿自是大宴皆就此殿上以長春節在二月故每嵗止設秋宴荆南節度使守太傅兼中書令南平貞懿王髙保融寢疾以其子繼元幼弱未堪承嗣命其弟行軍司馬保勗總判內外軍馬事甲午此據曽顔渤海行年記保融卒保融性迂緩御軍治民皆無法髙氏始衰保勗眉目疏秀羸瘠而口吃文獻王甚愛之雖盛怒見保勗怒必解荆南人謂之萬事休郎君乙未唐主景又遣使來賀帝還京是月燕國長公主出降殿前副都點檢忠武節度使駙馬都尉髙懷德涇州馬步軍教練使李玉者本燕人性凶狡與彰義節度使白重贊有隙一日與部下閻承恕謀害重贊先遣人潛市馬纓一即偽造制書云重贊謀逆令夷其族乃持偽制并馬纓以告都校陳延正曰使者致此去矣延正得之亟白重贊重贊具以聞上大驚視其制書率皆詐謬遽命六宅使陳思誨馳驛赴涇州擒玉與承恕鞫問具伏咸棄市擢延正為刺史仍詔諸道凡被制書有關機宜者印文筆迹並須詳審考驗重贊憲州人也重贊初見顯德元年重贊本傳載李玉事後云重贊俄徙兖川據百官表重贊此月改領泰寧節度因附見月末然新舊録本紀皆不書重贊徙兖州而八月壬午太宗實領泰寧節度與百官表異不知百官表何據也當考陳延正未見九月辛丑宴近臣於萬春殿後九日又宴於廣德殿皆曲宴也凡曲宴無常惟上所命壬寅李繼勳言帥師入北漢界燒平遙縣虜掠甚衆癸卯三佛齊王悉利大霞里壇遣使來貢方物丙午御崇元殿備禮册四親廟丁未宰相率百官進名奉慰己酉幸宜春苑淮南節度使兼中書令滄人李重進重進初見廣順二年七月周太祖之甥也始與上俱事世宗分掌內外兵權而重進以上英武出已右心常憚焉恭帝嗣位重進出鎮揚州領宿衛如故及上受禪命韓令坤代重進為馬步軍都指揮使重進請入朝上意未欲與重進相見謂翰林學士饒陽李昉昉初見乾祐元年十一月曰善為我辭以拒之昉草詔云君為元首臣作股肱雖在逺方還同一體保君臣之分方契永圖修朝覲之儀何須此日重進得詔愈不自安乃招集亡命增陴浚隍隂為叛背之計李筠舉兵澤潞重進遣其親吏翟守珣守珣未見間行與筠相結守珣素識上往還京師潛詣樞密承旨李處耘求見上召問曰我欲賜重進鐡劵彼信我乎守珣曰重進終無歸順之志矣上厚賜守珣許以爵位且使説重進稍緩其謀無令二凶並作分我兵勢守珣歸勸重進養威持重未可輕發重進信之上已平澤潞則將經略淮南戊申徙重進為平盧節度使度重進必增疑懼庚戌又遣六宅使陳思誨齎鐡劵往賜以慰安之陳思誨持鐡劵往賜舊録在庚戌新録在壬子今從舊録是日貶中書舍人懷戎趙行逢按趙行逢原本脫行字今據宋史補入為房州司户參軍上之親征澤潞也山程狹隘多石上自取數石於馬上抱之羣臣六軍皆爭負石開道逢憚涉險偽傷足留懷州不行及師還將大有除拜其命甚密行逢當入直又稱疾請於私第草制上怒下御史府劾其罪而黜之陳思誨至淮南李重進即欲治裝隨思誨入朝左右沮之重進猶豫不決又自以前朝近親恐不得全乃拘留思誨益治反具遣使求援於唐唐主不敢納揚州都監右屯衛將軍安友規友規以永興節度副使見乾祐元年三月知重進必反踰城來奔重進疑諸將皆不附已乃囚軍校數十人軍校呼曰吾輩為周室屯戍公茍奉周室何不使吾輩效命重進不聽悉殺之己未重進反書聞上命馬步軍副都指揮使歸德節度使石守信為揚州行營都部署兼知揚州行府事殿前都指揮使義成節度使王審琦為副宣徽北院使李處耘為都監保信節度使宋延渥為都排陳使帥禁兵討之寧國軍節度使吳延福吳越王俶之舅也或告延福有異圖庚申俶遣內牙指揮使薛溫以兵圍其第收延福兄弟五人睦州刺史延遇恐懼自殺衆欲殺延福兄弟俶流涕曰先夫人之同氣也吾安忍置法皆除名徙諸州卒全母氏之族延福見廣順二年不著邑里癸亥詔削奪李重進官爵先是邊將獲北漢民數百人甲子命悉放還詔文武常參官請病告過三日以名聞當遣太醫診視之是月吳越始榷酒酤冬十月丁卯朔賜百官諸軍校冬服諸州長吏屯戍將士遣使就賜之李筠之叛也遣使邀建雄節度使真定楊庭璋庭璋初見顯德五年二月庭璋執其使以聞仍獻攻取之䇿庭璋姊故周祖妃上疑有異志命鄭州防禦使信都荆罕儒罕儒冀州人初見顯德六年十二月為晉州兵馬鈐轄使伺察之罕儒每入府中從者悉持刀劒庭璋開懷接納殊不設備罕儒亦不敢發會有詔召庭璋赴闕庭璋即日單車就道己巳徙庭璋為靜難節度使庚午安友規至自揚州上以為滁州刺史令監護前軍進討壬申河決棣州厭次縣又決滑州靈河縣有司請據諸道所具版籍之數升降天下縣望以四千户以上為望三千户以上為緊二千户以上為上千户以上為中不滿千户為中下仍請三年一貢户口之籍别定升降從之凡望縣五十户二十八萬一千六百七十緊縣六十七户二十二萬八千六百九十三上縣八十九户二十一萬八千二百八十中縣一百一十五户一十七萬九千三十中下縣一百一十户五萬九千七百七十總九十六萬七千三百五十三户按總數不符應作九十六萬七千四百四十三户此國初版籍之數也升鎮州娘子關為承天軍乙酉晉州言兵馬鈐轄鄭州防禦使荆罕儒戰沒罕儒恃勇輕敵常懸軍深入北漢境北漢人多閉壁不出前後虜獲甚衆於是領千餘騎抵汾州城下焚其草市而還夕次京土原北漢主遣大將郝貴超貴超未見領萬衆來襲黎明及之罕儒遣都監氊毯副使閻彥進彥進未見分兵以禦貴超罕儒錦袍𠂻甲據胡床饗士方割羊臂臑以食聞彥進小却即上馬麾兵徑犯其鋒北漢人攢戈舂之罕儒墜馬為北漢人所獲罕儒猶格鬬手殺十餘人乃遇害北漢主欲生致罕儒及聞其死求殺罕儒者戮之上痛悼不已擢其子守勳為西京武德副使因索京土原之將校不用命者黜慈州團練使平陸王繼勳繼勳初見乾祐元年為率府率閻彥進為殿直斬其部下龍捷指揮使石進德等二十九人乙酉十六日也新録據奏到始書今從之不知罕儒戰沒果何日也先是兩京軍巡及諸州馬部判官皆以補將吏於是詔吏部流內銓注擬選人上問樞密副使趙普以揚州事宜普曰李重進守薛公之下䇿昧武侯之逺圖憑恃長淮繕修孤壘無諸葛誕之恩信士卒離心有袁本初之強梁計謀不用外絶救援內乏資糧急攻亦取緩攻亦取兵法尚速不如速取之上納其言丁亥下詔親征以皇弟光義為大內都部署吳延祚權東京留守吕餘慶副之庚寅上發京師百司六軍並乘舟東下癸巳次宋州城中軍有戍揚州者父母妻子頗懷疑懼分命中使就撫之十一月戊戌次宿州甲辰次泗州捨舟登陸命諸將鼓行而前丁未至大義驛石守信遣使馳奏揚州即破請上亟臨視是夕次其城下登時攻拔之李重進盡室赴火死陳思誨亦為其黨所害上購得翟守珣補殿直俄遷供奉官重進性鄙吝未嘗有觴酒豆肉及其士卒下多怨者兄深州刺史重興初聞其叛即自殺弟解州刺史重贊子尚食使延福並戮於市己酉賑給揚州城中民米人一斛十嵗以下給其半為重進脅以𨽻軍者賜衣屨縱之庚戌詔重進家屬部曲並釋罪逃亡者聽自首尸骼暴露者收瘞之役夫死城下者人賜絹三匹復其家三年乙卯唐主景遣左僕射江都嚴續來犒師續可求子初見開運三年庚申復遣其子蔣國公從鎰户部尚書新安馮延魯延魯延已弟初見天福二年來買宴上厲色謂延魯曰汝國主何故與我叛臣交通延魯曰陛下徒知其交通不知預其反謀也上詰其故延魯曰重進使者館於臣家國主令臣語之曰男子不得志固有反者但時有可不可陛下初立人心未安交兵上黨當是時不反今人心已定方隅無事乃欲以殘破揚州數千敝卒抗萬乘之師借使韓白復生必無成理雖有兵食不敢相資重進卒以失援而敗上曰雖然諸將皆勸吾乘勝濟江何如延魯曰陛下神武御六師以臨小國蕞爾江南安敢抗天威然國主有侍衛數萬皆先主親兵誓同生死陛下能棄數萬之衆與之血戰則可矣且大江風濤茍進未克城退乏糧道亦大國之憂也上笑曰聊戲卿耳豈聽卿遊説耶龍衮江南野録載馮延魯對上語乃真以為如此拒重進不知蓋飾説耳今從十國紀年上使諸軍習戰艦於迎鑾唐主懼甚其小臣杜著頗有辭辨偽作商人由建安渡來歸而彭澤令薛良坐事責池州文學亦挺身來奔且獻平南䇿唐主聞之益懼上命斬著於下蜀市良配𨽻廬州牙校唐主乃少安終以國境蹙弱遂決遷都之計乙丑命宣徽北院使李處耘權知揚州時揚州兵火之餘闔境凋弊處耘勤於撫綏輕徭薄賦召屬縣父老訪民間疾苦悉去之揚州遂安十二月己巳上發揚州丁亥至京師壬辰占城國王釋利因塔蠻遣使來貢方物是月唐清源節度使留從效遣使奉表稱藩上亦遣使厚賜以撫之從效桃林人初見開運元年十月上遣使賜從效乃二年正月事今移入此是嵗北漢主以抱腹山人郭無為為諫議大夫參議中書事無為安樂人方顙烏喙好學多聞善談辨嘗衣褐為道士居武當山周太祖討李守貞河中無為詣軍門上謁詢以當世之務甚竒之或謂周祖曰公為漢大臣握重兵居外而延縱橫之士非所以防微慮逺之道也無為去隱抱腹山樞密使段恆恆初見顯德四年無邑里識之薦其材北漢主召與語大恱因授以政復命恆及侍衛親軍使太原蔚進進初見天福十二年皆同平章事上既即位欲隂察羣情鄉背頗為微行或諫曰陛下新得天下人心未安今數輕出萬一有不虞之變其可悔乎上笑曰帝王之興自有天命求之亦不可得拒之亦不能止周世宗見諸將方面大耳者皆殺之然我亦終日侍側不能害我若應為天下主誰能圖之不應為天下主雖閉戶深居何益既而微行愈數曰有天命者任自為之我不汝禁也由是中外懾服親軍校有獻手撾者上曰此何以異於常撾而獻之軍校密言曰陛下試引撾首視之撾首即劔柄也有刃韜於柄中居常可以杖緩急以備不虞上笑投之於地曰使我親用此物事將奈何且當是時此物固足恃乎一日罷朝坐便殿不樂者久之左右請其故上曰爾謂天子為容易耶屬乘快指揮一事而誤故不樂耳三聖實録載內侍行首王繼恩請其故按繼恩開寶中始賜姓名纍遷內侍行首國初未也今於此年附見此事故止稱左右而削其姓名本紀亦不著其姓名嘗彈雀於後苑或稱有急事請見上亟見之其所奏乃常事耳上怒詰之對曰臣以為尚急於彈雀上愈怒舉斧柄撞其口墮兩齒其人徐俯拾齒置懷中上罵曰汝懷齒欲訟我乎對曰臣不能訟陛下自當有史官書之也上恱賜金帛慰勞之前數事皆石介三朝聖政録及記聞所載未必皆在此年也今並附之
