body:
  text: 續資治通鑑長編巻四百五十八宋李燾撰哲宗元祐六年五月己未朔罷文徳殿視朝祭太社百司守職太史言日食二分不及元奏分數翌日呂大防等稱賀梁燾奏疏當考附六月壬辰三省樞密院同進呈熈河延安二㨗報蘇轍奏曰近日邊奏稍頻西人意在得二堡今盛夏猶如此入秋可虞不若早商量了當意欲與之呂大防曰此不可國家歲以二十五萬銀絹賜與在西夏當一百萬豈可恣其侵侮亦須恩威並行王巖叟曰形勢之地豈可輕議棄與不知既與保其後不更要否太皇太后曰敵人無厭劉摯曰敵人誠無厭巖叟曰不可一向示弱韓忠彦曰看道理如何耳遂退忠彦意與轍同獨巖叟以為智固勝如兩堡自元豐用兵有之元祐講和畫界當在我地而西人力爭蓋兼形勢膏腴之利失之則蘭州熈河遂危故主范育議謂不可棄而趙卨意在與之轍自執憲主卨議故進說如此此據王巖叟五月二日所錄七月二十七日當考王巖叟朝論蘭州智固勝如兩堡乃充國留屯之利蘭州賴之以安夏人數犯邊議者謂意在二堡巖叟進曰人言不用兵雖是目前好意但恐地形便利入賊手為他所秉自家無所控禦雖悔無及蓋其意不在二堡意在窺熙蘭路若熙蘭等處一齊不要退嚴固守以安中國極是好事但恐國家不肯盡棄則二堡利害係在熙蘭熙蘭一路既危關中未得安枕今日之事不可不謹重又奏曰自家豈是惜地四寨猶自棄與何况兩小堡子蓋緣二堡形勢不同係熙蘭一路形勢自家自來著守至今吏部差使臣窠名在豈是不守底二堡為佗道不守便承當做不守若其餘更著個名目來相加則將何以處之范純仁在此時與了歲賜望便和事了却因何至今不了陛下看有厭足無且二十五萬家歲賜銀絹猶不知恩與却此待望他知感不復更貪問他敢保否又奏曰定西六處若倒了地界則兩邊去賊境之地近自家兩城相去之地居人耕種既難客旅又無由出入其勢孤危難保庚申中太一宫使觀文殿學士左銀青光祿大夫兼侍讀馮京奏乞致仕詔不允經筵免進讀詳定編修閤門儀制所言按舊儀宣徽使遇百官起居稱賀宴日通喚宣答今復置南北院宣徽使儀品恩數並如舊制其舊制内宣徽使職事欲依舊修入如闕即依見行儀制又三師三公舊儀雜壓在使相下立班在文班僕射前見謝辭與大卿監禮數一等自官制行立位襍壓在宰臣之上其見謝辭宴坐未有定儀欲依宰臣例又百官起居日宰臣遇假故即以次官髙者合押班今門下中書侍郎係兩省分班先入立位相逺難以引揖欲遇宰臣假故即權移門下侍郎在尚書左丞之上押班從之樞密院言熙河蘭岷鄜延路夏賊殺擄人畜攻毁烽火臺經畧司兵邀其歸路生擒首領斬獲首級詔諸路誡約沿邊城寨兵將益嚴斥堠過為禦備如夏賊再來侵犯即審度事勢出竒設伏乗便掩擊勿輕易貪功為賊誘致亦不得妄稱犯塞引生邊患兼慮姦詐聲東出西却别路乗隙作過其環慶涇原秦鳯河東路亦當依此指揮詔提㸃管當宫觀等官每遇本宫觀開啓罷散酌獻之類聽免赴朝㑹從禮部之請也陜西制置解鹽司言提舉出賣解鹽司每年搬運出賣鹽數止是勾帖支遣若不立限拘制脚户請搬竊恐於他場别致欺蔽欲將每年合應運出賣鹽數令脚户於前一年冬季内並赴池場盡數請搬從之先是蔡確母明氏進狀及訴於尚書省乞量移確四月二十二日辛亥三省携確母狀并呂惠卿自量移至宣州年月進呈太皇太后不許移確獨許遷惠卿呂大防劉摯本與確為地乃不如本謀傅堯俞竊語王巖叟曰吉甫却得明氏力巖叟謂摯曰蔡媪早來亦至密院漏舎盍告示以不行令其早歸乆留恐動議論摯曰俟詳奏知令去堯俞又曰遷惠卿上意亦難之苐恐致人言是日惠卿既除中散大夫光祿卿分司南京權中書舎人孫升封還朝議以為惠卿量移未三年無名而復必不可行巖叟以責堯俞堯俞不能對又以責蘇轍謂大防曰惠卿事欲如何商量大防曰欲且依前降指揮刑部以謂量移後别理三朞大防摯欲用檢舉後三年堯俞曰候九月或可耳大防摯不答壬戌進呈皆持兩端禀㫖太皇太后曰候及三年惠卿除分司即五月初二也四月二十二日確母下狀八月二十四日告示確母此皆據王巖叟繫年錄修入劉摯日記與巖叟所錄差異今附注此五月二日呂惠卿分司自副使以中散大夫光祿卿分司南京許在外任便居住惠卿元祐元年九月謫官明年用中書一朞檢舉法除分司而言者不已遂寢明年止移宣州居住及今又將三年通僅五朞矣刑部檢舉法散官用三朞敘本部欲自量移後理朞此非也故將上初簾中亦疑之故起議論既詳奏之遂可已而晩得内降舎人孫升奏封還之具坐元責制詞謂大姦當廢不當牽復若不欲終廢猶須依沈括例七年後可議稍復四日呂惠卿依刑部自宣州後理三朞摯所記確母事别見八月二十四日辛亥樞密都承㫖劉安世言臣伏自去歲疾病得請崇福曽未數月復䝉召用雖聖恩博大不遺小才而臣樸拙愚闇未有以報塞萬一坐耗厚祿日負憂媿至於當今之要務朝廷之闕政每有見聞屢欲論列而既去言路不敢出位伏覩今年四月七日尚書省劄子勘㑹近臣許言事三省同奉聖㫖令御史臺行下臣忝備從官親承明詔事繫國體義當盡規願陛下留神而聽之臣聞朝廷除呂惠卿中散大夫光祿卿分司南京物議沸騰輿情震駭伏惟陛下初踐宸極務從人欲以惠卿蔡確之徒殘民蠧國辜負任使為四海所疾是以繼貶逐之逺方雖匹夫匹婦之愚莫不曉然知二聖之心本為天下生靈驅除患害非有好惡也謂且永投荒裔終身不齒而惠卿自宣城方踰再歲考之常法猶未當敘不識何名遽復卿列議者謂蔡確之母見在京師干訴朝廷願還其子大臣未敢直從其請若惠卿之命遂行則將藉以及確確既復用則章惇之類如蝟毛而起為天下國家之計者其得安乎臣伏觀國朝㑹要第二百三十七卷太宗皇帝雍熙二年五月二十四日中書門下言有甞任職官譴責在外者昨經赦宥望令歸闕責其後效帝不許謂宰相曰朝廷致理當任賢良君子小人宜在明辨大凡人君宜先自正其身亦如治家家長不正家亦亂矣故聽讒邪之言則骨肉至親坐成離間豈能致肥家睦族之道歟大小雖殊其致一也今海島瓊崖逺處甚有竄謫之人郊禋已來豈不念此蓋此等如害羣之馬豈宜輕議哉臣竊謂祖宗仁徳均被動植及其制馭小人則一切斷之以義惟陛下善繼善述不愆不忘保守初政堅如金石萬機之暇屢省先訓異日或有大臣尚持姑息之論巧為道地假借大姦伏望陛下以太宗之至言面折其妄使中外羣小不能窺伺朝廷之間隙搖動正道天下幸甚詔李憲任便居住政目五月初二日事當考甲子中太一宫使觀文殿學士左銀青光祿大夫兼侍讀馮京為檢校司空充宣徽南院使判陳州二十三日免京五上章求致仕眷留甚乆乃有此授自復置宣徽使始於此拜也劉摯云左朝請郎京西路轉運副使彭次雲辭新除河北路轉運副使之命從之次雲事當考四月六日除河北六月十六日改淮南或削去監察御史徐君平言任子舊制天聖令以䕃補出身應授職任者選滿或遇恩放選或因奏乞皆年二十五歲乃許注官熙寧間峻立試格凡試中許年二十注官元祐之初有攝齋郎行事得免試者許比試中人二十參選由是闇増冗貟願並復天聖故事又文臣致仕以年七十為斷而使臣年七十者猶與近地監當至八十乃致仕願許其致仕之年如文臣法而給俸惠養亦倣之又古者父母之䘏無貴賤一也後世有起復之制蓋緣金革之事今太平無事禮義可以下達而小使臣及大使臣使管軍沿邊之類當行服而不請解官者甚衆願著令使武臣並行解官持服之制從之其大小使臣除係沿邊等職任并元是軍班換授及小使臣非奏補或武舉入官人並仍舊是日延和奏事罷呂大防留身乞退引李徳裕論云姚崇宋璟作相亦不過三年本朝呂夷簡雖三入然每亦不過三年遂出居報恩院後三日宣押供職如故非雙日特為垂簾未甞有此恩禮也九日并入此據王巖叟所錄特為垂簾據大防行狀九日并十日并十八日可考始都省吏任永壽等緣吏額事即斥永壽尋又坐贓繫開封府觀望獄乆不决言者皆咎大防故大防求罷後數日太皇太后諭㫖開封永壽之獄乃决五月十八日永夀决杖刺配此據蘇轍龍川别志潁濵遺老傳修入言章已前見乙丑雄州團練使知滄州張利一兼本路兵馬總管以利一官正任循舊例也丙寅給事中朱光庭言衡州上王五等强盗案有情理似可矜憫之言乞令刑部大理寺今後斷案若情理可憫只依元條可憫奏上不得却入疑似之言從之國子監言乞今後補中外舎生牓出三日内不入學者並落籍從之詔相州商王河亶甲冡沂州費縣顔真卿墓並載祀典丁卯詔左僕射呂大防累奏乞外任己答詔不允其收接文字去處無得收接此據哲宗御集不知大防以何為辭乞外任當是言者擊任永壽事此月六日又十日并十八日趙君錫云云可考五年八月一日劉摯云云當考戊辰宰臣呂大防奏進奏院傳報詐作侍御史賈易奏乞催勘任永壽等事臣今取到進奏院報委有撰造文字謹具繳奏望下有司根治御批所奏進奏院傳報賈易奏可先問賈易自降指揮除侍御史後來曽奏過是何章表如有曽奏章表别具抄錄聞奏候對無上件傳報文字即下開封府子細根究從初詐作賈易奏狀之人具案聞奏所有繳到朝報今降出此㨿御集三月十六日易除侍御史劉摯日記云五月九日御史臺狀申乞根治偽作文字人批送開封府究治近日人相傳賈易作官狀稱臣向為臺官所言者三百事䝉施行者未及其半如任永壽事至今未了乞速斷遣訖付臣看詳如允當臣方敢就職三省同奉聖㫖限五日結絶云云其辭鄙俚無體制識者固知其為偽此皆永夀之仇造言鼓衆欲重永壽之責呂大防實封劄子送示中書繳進前此有㫖諸處不接呂大防文字中書不敢承之遣人傳昨日批呂大防劄子云先問賈易如委無上件文字方令開封府根究即付三省奏若候賈易之報則日乆難根究今己見偽為無疑合先行根治仍問賈易畫可十五范百祿來言根治偽章章未明二十六日百祿來言已得偽書人太常贊者李世英己巳鄂特凌古遣温錫沁入貢元祐四年正月錫沁男推恩妻封縣君今年二月錫沁男巴温為勝州刺史日當考詔府監貢舉敕考校武舉内武藝絶倫策義不入等而文理稍有可採者奏裁一節勿用尚書省言發運司奏今後輪管當文字官一貟隨使副編排綱運及入京奏計留一貟在本從之庚午新除殿中侍御史楊畏以母老辭從之仍令御史中丞趙君錫别舉官一貟以聞四月二十四日五月二十八日當并此詔校書郎黄裳供職及二年為集賢校理太原府路鈐兼第一將皇城使康州刺史訾虎罷兼將佐依舊充本路鈐轄以帥司藉虎緩急統制諸將出入故有是命樞密院言昨渠陽貫堡寨罷戍之後慮尚有遺民在溪洞未能歸漢詔令荆湖北路都鈐轄司委忠順蠻官引致並邊縣寨與給公據量支錢發遣歸鄉其蠻官據引致人每名支賞錢五貫即具已到人民及支過賞錢申樞密院其後慮數目不多未肯悉心招置詔再増錢五貫仍以鹽綵充尚書省言監臨主司受乞役人財物者許人告枉法杖罪賞錢十貫徒罪二十貫流罪三十貫不枉法者減半杖罪主典勒停永不收敘徒罪仍鄰州編管從之大理寺言斷案若定奪事卿少卿正應避者免簽書若俱應避者牒開封府從之刑部言一路等條有不以去官赦降原減條合行刪去熙寧八年九月應密院奏請鳯翔府揀中保寧兵士不許投換及改刺别軍如違法依擅行差遣例不以去官赦降原減元豐四年中書省言請熙河蘭岷路蕃部司公使錢依額定每年轉運司分作兩料支撥除干邊事應副支費外輒支用者並徒二年不以去官赦降原減元豐六年五月詔坐倉收糴請軍糧斛不取軍人情願以違制論不以赦降去官原減並合刪去從之是日斷任永壽獄劉摯敘其事云永壽此獄淹延一年永壽曉文法於事精明向在吏額房得罪出省繼有訟其私事者制獄并開封兩處勘劾經恩降外有冒請食計錢絹八匹以案問得杖一百刑部檢刺配例既上都省刑房問難謂不問從案問本寺遂改不作按問從徒一年中書疑其前後不同送刑部刑部如前斷復上中書三省聚議以永壽固無足恤者但前日吏額事朝廷選委使主裁之今緣衆怨羣擠欲殺之意如前日偽書之事而朝廷遂重其罪正快羣仇之私耳有害政體遂面陳其詳永壽從法寺元斷又恐無以平衆情則加以千里編管餘皆末減經恩者更不降特㫖衆議頗以為酌中永壽甞招權作威福所裁者皆百司吏史故取怨如此聞給事中留之一夕明日遂行後六日丙子十八日内降御史安鼎言刑賞乞改正趙思復囬授恩澤與其子及任永壽徒罪批云宜依所奏外封仍印急速等字勢尋具奏二事内有合面禀節目今去垂簾日逺俟二十二日進呈謹先奏知右丞蘇轍初不欲奏便要别議緣永壽十三日已决訖押行難改正須索面奏其詳以簡白轍乃簽書入及垂簾日進呈永壽改作徒刑依律敕折杖法小杖决餘罪十下安鼎論趙思復恩凙今見二十二日庚辰獨不載論任永壽刑名十八日丙子有趙君錫論永夀章乃無施行今附注此辛未荆湖北路轉運使李湜言權管荆湖南路安撫鈐轄措置廢罷蒔竹上里戍兵等今具勾當官及將官使臣等功效以聞詔勾當公事左朝奉郎陳尚能減三年磨勘占射差遣潭州瀏陽縣令王義寧循一資知邵州武岡縣候滿任無引惹特不用舉主改合入官武岡縣令蕭從為潭州瀏陽縣令其餘將官使臣等各等第減年磨勘先是朝廷使唐義問處置渠陽兵將敗亡僅乃廢之後使謝麟廢蒔竹麟以謂楊氏蟠據湖南北溪洞部族相連接湖北先廢渠陽湖南蠻知蒔竹必廢謀之已乆今欲急行廢罷恐難以成功請稍遷延歲月以俟其便執政疑其立異即罷麟潭州以湜代之湜至議罷蒔竹復如麟說執政相視而怒時尚書右丞蘇轍曰蒔竹之議經帥臣二人矣而所言如一朝廷胡不姑用其言若數月之閒其功不成責之未晩也乃從其請未幾湜誘說蠻酋楊光潛使親帥部族裹送蒔竹兵民器械還漢奏至許之仍以蒔竹見糧分賜蠻中饑人凡蒔竹蓄聚皆安然而至不遺一矢不殺一人蓋麟之議本不為過也此㨿龍川别志麟自潭改江寧在正月二十二日湜正除潭州在六月四日仍加集賢校理當以此功也壬申詔徳州漢東方朔廟以祈禱有應載祀典甲戌詔寳文閣待制葉康直知亳州右朝奉郎李察管勾仙源縣景靈宫太極觀任便居住各從其請也政目正月二十六日李察亳州實錄不書葉康直以寳制陜都漕除潭州在正月二十二日康直以疾辭故改命令并此提舉河北路鹽稅司言欲將逐處場務已收鹽稅於舊收五分祖額錢上添入二分錢數共成七分立為祖額仍只許以實收到見錢并當年内凡係催納到本處批過料錢數通比祖額理為賞罰其未納批錢鈔數即除豁不為比較仍年内無違限及雖違限已納倍稅方許理數比較從之新本削去丙子詔禮部尚書鄧温伯知蔡州從其請也二月二十二日吏部言按條官貟不因罪犯體量離任注謂舉辟不就及對移就移避親丁憂罷任之類别授差遣各願補滿前任月日者聽所補不及二年願再滿一任者亦聽緣自來使臣對移差遣並合通理前任年月滿替即不取願與不願補滿亦不許再滿一任近有使臣在外對移陳乞依上條補滿前任月日外乞再滿一任而看詳條元無對移之文亦無添入意義所有對移二字殆為虛文今欲注文除去從之御史中丞趙君錫等言臣伏見近降敕命任永壽特依大理寺前斷决臀杖二十千里編管臣等取㑹刑部大理寺元斷公案詳究乃是先勘到永壽受任中立贓係犯倉法流罪編管該赦外其報上不實未奏減一等斷杖一百都省以開封府見任永壽冒請食料錢等未結案退送刑部候案到從一重斷罪相次刑部大理寺將後案再斷徒一年并具例數件皆是編配上尚書省兼言永壽情重合取㫖遂奉特㫖施行臣看詳永壽前後贓僅七百匹情可謂重則特㫖謂宜法外施行今乃捨其重罪斷其輕罪與有司元請殊不相應是以中外洶洶莫曉朝廷之意蓋法者天下之取平特㫖者人君之利柄以法令與罪人之情或不相當則法輕情重者特㫖重之法重情輕者特㫖輕之此乃所以為利柄也今永壽原其情甚重而特㫖乃輕之此中外所以不服也伏乞聖㫖不憚收還已行之命改從合用之法仍用刑部所上重例刺配以警戒貪狡之人亦使四方曉然知朝廷無姑息姦吏之意五月十八日奏此月十日賈易云云可考任中立見五年六月末蘇轍論吏額疏永夀用安鼎奏改作徒刑已附見十日庚午丁丑樞密院言按元祐敕急脚馬遞鋪廵轄使臣并本縣令佐每遇到鋪㸃檢月終本州委通判磨勘其逐州界首鋪歴每季互相取索磨勘外其縣界廵轄使臣界首鋪歴未有互相取索磨勘之文詔令於上條添入新本削去龍圖閣直學士前知杭州蘇軾言臣近奉詔書及聖㫖劄子不允臣辭免翰林學士承㫖恩命及乞郡事臣已於第三次奏乞除臣揚越陳蔡一郡去訖竊恐區區之誠未能遽回天意須至盡露本心重干聖聽惶恐死罪惶恐死罪臣昔於治平中自鳯翔職官得替入朝首被英宗皇帝知遇欲驟用臣當時宰相韓琦以臣年少資淺未經試用故且與館職亦㑹臣丁父憂去官服闋入覲便䝉神宗皇帝召對面賜獎激許臣職外言事自惟覊旅之臣未應得此豈非以英宗皇帝知臣有素故邪是時王安石新得政變易法度臣若少加附㑹進用可必自惟逺人䝉二帝非常之知不忍欺天負心欲具論安石所為不可施行狀以裨萬一然未測聖意待臣深淺因上元有㫖買燈四千椀有司無狀虧減市價臣即上書論奏先帝大喜即時施行臣以此卜知先帝聖明能受善言上疏六千餘言極論新法不便後復因考試進士擬對御試䇿進上并言安石不知人不可大用先帝雖不聽從然亦嘉臣愚直初不譴問而安石大怒其黨無不切齒爭欲傾臣御史知雜謝景温首出死力彈奏臣丁憂歸鄉日舟中曽販私鹽遂下諸路體量追捕當時梢工篙手等考掠取証但以實無其事故鍜鍊不成而止臣緣此懼禍乞出連三任外補而先帝眷臣不衰時因賀謝表章即對左右稱道黨人疑臣復用而李定何正臣舒亶三人誣造飛語醖釀百端必欲致臣於死先帝初亦不聽而此三人執奏不已故臣得罪下獄定等選差悍吏皇甫遵將帶吏卒就湖州追攝如捕盗賊臣即與妻子訣别留書與弟轍處置後事自期必死過揚子江便欲自投江中而吏卒監守不果到獄即欲不食求死而先帝遣使就獄有所約束故獄吏不敢别加非横臣亦覺知先帝無意殺臣故復留殘喘得至今日及竄責黄州每有表疏先帝復對左右稱道哀憐獎激意欲復用而左右固爭以為不可臣雖在逺亦具聞之古人有言聚蚊成雷積羽沉舟言寡不勝衆也以先帝知臣特達如此而臣終不免於患難者以左右疾臣者衆也及陛下即位起臣於貶所不及一年備位禁林遭遇之異古今無比臣每自惟昆蟲草木之微無以仰報天地生成之徳惟有獨立不倚知無不言可以少報萬一始緣衙前差雇利害與孫永傅堯俞韓維爭議因亦與司馬光異論光初不以此怒臣而臺諫諸人逆探光意遂與臣為仇臣又素疾程頤之姦未甞假以色詞故頤之黨人無不側目自朝廷廢黜大姦數人而其餘黨猶居要近隂為之地特未發爾小臣周穜乃敢上疏乞用王安石配享以甞試朝廷料穜草芥之微敢建此議必有隂主其事者是以上書逆折其姦鋒乞重賜行遣以破小人之謀因此黨人尤加忿疾其後又於經筵極論黄河不可回奪利害且上疏爭之遂大失執政意積此數事恐别致禍患又緣臂痛目昏所以累章力求補外竊伏思念自忝禁近三年之間臺諫言臣者數四方因發䇿草麻羅織語言以為謗訕本無疑似白加誣執其間曖昧譛愬陛下察其無實而不降出者又不知其幾何矣若非二聖仁明洞照肝膈則臣為黨人所傾首領不保豈敢望如先帝之赦臣乎自出知杭州二年粗免人言中間法外配刺顔章顔益二人蓋攻積弊事不獲已陛下亦已赦臣而言者不赦論奏不已其意豈為顔章等哉以此知黨人之意未甞一日不在傾臣洗垢求瑕止得此事今者忽䝉聖恩召還擢用又除臣弟轍為執政此二事皆非大臣本意竊計黨人必大猜忌磨厲以須勢必如此聞命悸恐以福為災即日上章辭免乞郡行至中路果聞弟轍為臺諫所攻般出廨宇待罪又䝉陛下委曲照見情狀方獲保全臣之剛褊衆所共知黨人嫌忌甚於弟轍豈敢以衰病之餘復犯其鋒雖自知無罪可言而今之言者豈問是非曲直竊謂人主之待臣子不過公道以相知黨人之報怨嫌必為巧發而隂中臣豈敢恃二聖公道之知而傲黨人隂中之禍所以不避煩凟陳入仕以來進退本末欲陛下知臣危言危行獨立不回以犯衆怒者所從來逺矣又欲陛下知臣平生冒涉患難危險如此今餘年無幾不免有逺禍全身之意再三辭遜實非矯飾栁下惠有言直道而事人焉往而不三黜臣若貪得患失隨世俛仰改其常度則陛下亦安所用臣若守其初心始終不變則羣小側目亦無安理雖䝉二聖深知亦恐終不勝衆所以反覆計慮莫若求去非不懷戀天地父母之恩而衰老之餘恥復與羣小計較短長曲直為世間髙人長者所笑伏望聖慈察臣至誠特賜指揮執政檢㑹累奏只作親嫌回避早除一郡所有今來奏狀乞留中不出以保全臣子臣不勝大願若朝廷不以臣不才猶欲驅使或除一重難邊郡臣不敢辭避報國之心死而後已惟不願居禁近使黨人猜疑别加隂中也干犯天威謹俟斧鑕貼黄稱臣受聖知最深故敢披露肝肺盡言無隱必致當途怨怒愈為身災君臣不密周易所戒故親書奏狀眼昏字大又涉不恭進退惟咎伏惟聖慈寛赦庚辰翰林學士承㫖蘇軾兼侍讀左朝請郎左司郎中葉伸為河北路轉運副使三省言宗室壻授官合隨宗室服紀立止法詔今後因娶宗室女授官人係祖宗緦麻親文臣至朝請大夫武臣皇城使止中太一宫使觀文殿學士左銀青光祿大夫兼侍讀馮京再辭免新除宣徽南院使判陳州恩命陳乞致仕詔馮京與免判陳州仍舊為宣徽南院使充中太一宫使許朔望朝參初六日除國子祭酒寳文閣待制鄭穆三上表陳乞致仕詔穆提舉洞霄宫給事中范祖禹言穆雖年過七十精力尚强自為布衣閩中士人稱四先生穆其一也平生歴官多掌學校在王府十餘年持身清謹未甞有過擢居左省論議不茍復為祭酒多士矜式旋觀其人終始無缺年耆徳茂力求引去在穆進退誠為可榮而為朝廷計則可惜也願留穆舊職以示朝廷貴老貪賢之美不報太學生千餘人以狀詣丞相府請留亦不報監察御史安鼎言供備庫副使趙思復乞將磨勘所轉一官回授男希元固已違法朝㫖未下思復丁憂則又未甞受官其兄思齊復陳趙普勲勞以申前請朝廷輒遂從之借職雖輕賞命為重乞行改正吏部按趙希元係元祐元年八月以差使參選合至六年八月磨勘轉借職詔趙思復不許回授其希元已授借職特免追改仍自今年八月後起理磨勘年限左諫議大夫鄭雍言竊聞近因臣僚論列王鞏不檢事狀䝉下淮南轉運使林積體量案鞏之罪喧傳都下今積為見朝廷不憑張修所奏輒敢觀望並不明言實狀望先次罷黜林積仍直下淮東提刑司依公子細體量鞏罪明正國典右正言姚勔言林積體量到王鞏事狀罔昧不公伏望先次放罷林積仍下淮東提刑司推勘詔令淮南東路提㸃刑獄司再體量聞奏張修以朝奉大夫知宣州除淮南運副在四年二月十二日今年二月二日修除光祿少卿六月八日鞏罷宿州提刑姓名鍾浚也六年十月六日鞏責三省樞密院言元祐六年春季入流九十六人五年春季入流一百四十七人六年比五年少五十人又將前次科場大禮奏薦轉貟換授人數以三年分為十二季以一季約一百五十四人并元祐六年春季入流共二百五十人除身亡致仕勒停丁憂尋醫侍飬假滿落籍及敘用服闋尋醫年滿比折外其入流多七十人樞密院言殿前馬步軍司奏馬步軍營閱排日與新頒元祐諸路將官通用勅營閱日不同欲乞内外營閱日並依新降將官敕從之户部言分移請受只於元指定處勘請若移往他處即具事因申本屬批鑿文歴住支仍報元分處批鑿文歴訖徑報移往處再批小歴方得起支如違所在官司不得批勘其元分移處除程兩月己上未報聽移往處召保官一貟勘行仍畫時催促候到亦依此批鑿即不報元分移處或受報而不批及不報者各杖一百從之新無五年五月十九日可考壬午詳定編修閤儀制所言尚書侍郎郎官除改别曹乞仍舊許告謝正謝門下中書省諫議大夫已上尚書省權侍郎已上侍從官待制已上凡轉官并寄祿官太中大夫已上新授正任横行新授及加恩差遣大將軍至内常侍已上差充一州總管路分鈐轄都監三路及沿邊知州軍乞並許告謝從之癸未三省言受聖㫖并御批手詔並畫制房分將承受簿剗刷名件職級常行㸃檢具無漏落狀於次月二十日已前門下省送襍務房中書省送催驅房尚書省送知雜房類聚本月内闗送時政記房如有漏落本房并職級量事大小等第理過從之甲申詔開封府界及諸路應人户諸般欠負以十分為率每年隨夏稅料各帶納一分所有前後累降催納欠負分料展閣指揮更不施行此用蘇軾奏議第十一卷及王巖叟繫年錄追書新舊二錄並畧之㨿法冊乃五年五月二十五日聖㫖己見本年月日蔡河撥發司言乞免每年附載紬絹庻幾不滯行運從之是日翰林學士承㫖蘇軾至自杭州始入見丙戌詔楊畏依前降告命充殿中侍御史再從中丞趙君錫舉也十二日聽畏辭免又詔龍圖閣待制熊本知洪州從其請也鄜延熙河蘭岷路經畧司言西人侵入漢界作過遣兵邀截各擒首領一名詔令逐路經畧司只作本司意將逐人放歸本國面諭疆界雖少有未畢夏國安得輒發兵衆侵我邊境今既生擒即合斬首界上蓋為朝廷意在好生又夏國見輸常貢且放汝回本國候到明諭梁葉普并近上首領今後不得縱放人馬亂有侵犯丁亥尚書省言門下中書後省詳定諸司庫務條貫刪成勅令格式共二百六冊各冠以元祐為名從之戊子端明殿學士太中大夫知延安府趙卨卒詔贈右光祿大夫他日輔臣奏事太皇太后語及卨甚憐之王巖叟曰卨乆在邊累求歸不得宜厚䘏之太皇太后曰當遣使者密賜呂大防曰有劉庠例巖叟曰加於劉庠尤善太皇太后曰劉庠猶如此卨固當厚也
