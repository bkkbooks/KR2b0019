body:
  text: 續資治通鑑長編卷三百四十四宋李燾撰神宗元豐七年三月庚子朔以董戩為進奉使廓州刺史李察勒沁為勝州團練使辛丑賜文彥博燕于瓊林苑上製詩以賜之劉昌祚乞於米脂寨中路置堡樞密院言米脂寨去綏德差逺然自收復以來雖有賊馬鈔略不為深患蘭州賊馬近遭傷阻恐懷憤激若興役之際萬一舉衆奔衝小失枝梧增長賊氣詔劉昌祚候地界了日别降指揮癸卯詔知延州劉昌祚罰銅十斤坐擅牒本將改刺蕃落兵也甲辰賜司農少卿亷正臣董詵紫章服正臣自言先提點在京倉場首尾六年收出剩糧三十四萬石草二百五十九萬束故奬之乙巳詔詳定重修編敕所刪定官刑部侍郎崔台符中書舍人王震各遷一官前刪定官知制誥熊本寶文閣待制李承之李定賜銀絹百以書成也要見初重修時熙寧九年十二月二日元豐元年十一月十八日又三年五月十三日又十五日又八月九日又五年十月十二日又十二月十五日又六年九月一日當考卷藝文志元豐編敕令格式赦書德音申明共八十一元豐七年崔台符等修與刑法志云初議修敕必先置局詔中外言法之不便約束之未盡者議集然後更定所言可采而行者賞録其人書成詔中書樞密院及刑法司律官俾參訂可否以聞始咸平敕成别為儀制令一卷天聖中取咸平儀制令及制度約束之在敕者五百餘條悉附令後號曰附令慶歷嘉祐皆因之熙寧敕雖更定為多然其體制莫辨至元豐修敇詳定官請對上問敕令格式體制如何對曰以重輕分之上曰非也禁於已然之謂敕禁於未然之謂令設於此以待彼之至之謂格設於此使彼效之謂式修書者要當知此有典有則貽厥子孫今之敕令格式則典則也若其書備具政府總之有司守之斯無事矣於是凡入杖笞徒流死自名例以下至斷獄凡十有二門麗刑名輕重者皆為敕自官品以下至斷獄凡三十五門約束禁止者皆為令命官之賞等十有七吏庶人之賞等七十有七又有倍全分釐之級凡五卷有等級高下者皆為格奏表帳籍關牒符檄之類凡五卷有體制模楷者皆為式始分敕令格式為四熙寧敕十有七卷附令三卷元豐敕十有三卷令五十卷熙寧敕令視嘉祐條則有減元豐敕令視熙寧條則有增而格式不與焉二敕有申明各一卷天下土俗不同事各有異故敕令格式外有一路一州一縣一司一務敕式又别立省曹寺監庫務等敕凡若干條每進擬有抵牾重復上皆籖改使刋正然後行之防範於是曲盡矣上諭安燾敕令格式已見二年六月二十四日自嘉祐六年始命開封府諸縣盜賊囊橐之家立重法後稍及曹濮澶滑等州熙寧中諸郡或請行者朝廷從之因著為令至元豐更定其法於是河北京東淮南福建等路用重法郡縣浸益廣矣凡劫盜罪當死者籍其家資以賞告人妻子編置千里遇赦若災傷減等者配逺惡處罪當徒流者配嶺表流罪會降者配三千里籍其家資之半為賞妻子遞降等有差應編配者雖會赦不移不釋囊橐之家劫盜死罪情重者斬餘皆配逺惡處籍其家資之半為賞盜罪當徒流者配五百里籍其家資三之一為賞竊盜三犯杖配五百里或鄰州雖非重法之地而囊橐重法之人並以重法論其知縣捕盜官皆用舉者或以武臣為縣尉盜發十人以上者限內捕不獲半劾罪取旨若復殺官吏及纍殺三人焚舍屋百間或羣行於州縣之內劫掠於江海船筏之中雖非重法之地亦以重法論刑法志有此不得其時因編敇成附見須細考之大理寺丞郭槩言就江寧府劾陳繹三供罪狀不盡乞追攝詔陳繹所未承罪止以衆證結案丁未賜京西都轉運司度僧牒百修轉般倉後再給五十詔京東轉運使吳居厚修舉職事致財用登饒又未嘗創有更革止用朝廷舊令必是推行自有檢察勾考法度宜令尸部左曹下本官具事曲折從本曹刪修下諸路遵行庶課入繼有登辦者實録但云刪修以聞今從御集居厚言竊謂聚人理財之義既已見之於易朝廷詔令所及又復委曲詳備若推行滅裂即耗散偽弊悉隨而起臣將命東州承襲困窘深恐速得罪戾每依緣條法試為檢防愚者之慮無足收採今奉朝命具析敢不條上臣謹將已行案卷及應干令勑照會增損略敘施行次第為上下兩䇿或可以革一時之弊與夫久逺施行伏在詳酌謹隨狀上進居厚進檢察勾考事件兩册據崇寧二年八月三日詔旨增入提舉經度制置牧馬司言左侍禁楊嵩於河東共買馬二百八十八匹嵩初言河東路約買馬八千匹詔提點刑獄司劾罪朱本以為事小削去戊申詔散直舊兩班人貟自併為一班後未經裁定可減指揮使一名都知副都知押班二人於兩次轉貟施行詔諸路知州選官任官可為州學教授者送國子監審察令兼管知洺州朝請大夫王荀龍通判奉議郎孟藴各降一官坐差禁軍防送也庚戌手詔劉昌祚本路軍氣自永樂不守以來折索摧喪非往日之比近聞諸將互出頗獲賊級軍氣小振則豪勇異常之人宜有旌别將以氣作之使鼓率士心樂於攻戰今賜卿緊線戰袍紅線勒刀金線烏梢弓虎紋韔銀纒桿槍朱漆圓排金鍍銀裝手刀各五十宜擇衆與之人量所冝賜之詔諸軍轉貟文字並送門下省仍依樞密院例宿直以門下省言諸軍轉貟及換前班除授差遣或係臨時恩例若不送門下因此為例漸廢本省職事故也辛亥詔支內藏庫絹十萬付環慶路經略司言賞功絹見止四千餘匹故也壬子降宣德郎監察御史朱京為宣義郎監興國軍鹽酒稅務初京言朝請郎董揚休前任沂州監司體量以疾曠官衝替法當與宫觀展磨勘一年有司審驗體量應格考功言陳乞宫觀留臺不許磨勘揚休雖非陳乞未有此例御史臺定當依本法與磨勘而朝旨不行朝議大夫致仕宋彥緣事故差任宫觀大略與揚休相類王圭蔡確由中書進擬與磨勘改太常少卿案揚休年六十二彥年六十九皆未及七十老疾雖同長少則異揚休已該磨勘因差任宫觀而所乞不行彥則通理兩任宫觀留臺月日許與磨勘臣竊意大臣進擬有愛憎之私隂收其權歸怨於上望别定奪改正中書門下言京所奏與事實不同詔京具析而京言果不實故責之京初有言乃二月一日今并入此前汀州通判奉議郎郭祥正勒停坐權漳州補僧道亨住持不當受金悔過還王及違法差送接人經赦也御史中丞黃履乞與侍御史張汝賢同薦御史從之癸丑分命輔臣祈雨手詔嗣王雖著品令然自國初以來未嘗除授故有司不能定其恩數近除宗暉嗣濮王宜下御史臺閣門參定以聞二月十四日又手詔京東京西兩路保甲領於提舉司近已専置官提舉都保內所飬馬則保民相干理難兩屬令霍翔吕公雅並兼保甲詔付陜西轉運副使范純粹本路自用師以來歲費浩大朝廷前後應副雖已不資而邊糴雜須尚未充羡近擘畫令於京東徐州鑄到折二大錢二十萬緡計為四十萬貫之用欲歲運致往陜府下卸以佐經費未知有無錢幣輕多之弊可速具奏純粹言本路見有新舊銅鐡錢九監鑄折二大錢約一百萬貫計小錢二百萬貫自來以本路經費浩大惟患鼓鑄不廣今若歲以徐州所鑄錢四十萬貫運致到本路只是增得本路鐡錢監歲額十分之二即未至有錢幣輕多之害雖然臣竊有所議輒因聖問願陳其略臣自未軍興之時參領漕計至于今日方此財用艱窘乃蒙朝廷歲以見錢四十萬貫運至本路以佐經費而以問臣在臣之計得以自幸然而臣若但以本路得錢為利而不為朝廷久逺之謀則不忠甚矣非臣所敢為也謹條列如後一契勘本路沿邊諸處久來難得見錢逐處歲計除以本路課利所入應副支費外其所少之數並是於永興商虢華陜等州錢監收積及於近裏諸處雇腳般運前去其所用腳錢糜費極多且如自陜府般鐡錢一萬貫至泰州計用腳錢二千六百九十餘貫今若自徐州鼓鑄錢津運到陜府下卸臣即不見其得徐州元鑄鐡錢每一萬貫計用本錢若干并沿路水陸腳費又若干及搭入自陜府至邊上所費腳錢數目即一萬貫之內除本路腳錢銷費外紐算邊上所得實錢計若干竊慮枉有糜費若以本司言之則所備固多若為朝廷計之即恐不惟輕用國力兼慮經由之地上下勞費卒無已時伏乞聖慈更賜詳酌付有司會較施行一臣前自公府掾謫知徐州滕縣與利國監相鄰訪聞本監雖是出鐡而鐡性獷利惟冝製作兵仗即未知鼓鑄錢貫又復何如蓋陜西諸監所用鐡若性稍獷脆即難於磨漉多致破缺若性稍稠濁即金汁易凝流注不快錢上字樣率多昏晦與私鑄濫錢夾雜難别為害不細兼臣契勘陜西折二大鐡錢二十萬貫計用鐡三百六十萬斤木炭六百萬斤竊計徐州所用鐡錢料例與此不逺亦未知本處所産鐡炭每歲足與不足二十萬貫所用之數此雖臣私憂過計亦乞朝廷會較施行一臣以謂飛運錢幣之術莫如走役商賈最為簡便臣竊見東南諸路歲以見錢上供不知其幾百萬水陸津運勞費不少既運致到京每蒙朝廷以公據召人於陜西入便却於內庫請出亦費行遣又竊見關陜以西至沿邊諸路頗有東南商賈內如永興軍鳯翔府數處尤多自來患在賣到見錢别無回貨今若嚴立關防符驗於陜西近裏及沿邊諸路召人入納齎給符驗直赴本貫州縣就便請領即公私為利莫如此比借如恐沿邊諸路所入不多若只於永興軍鳯翔府等處入便數十萬貫必可取足如此則不勞公私便可飛運得他路見錢數十萬貫在關陜以西比之就徐州本鑄錢糜費逺腳耗折過半仍只到陜府下卸委似省便臣愚管見如此更乞朝廷會較施行又臣伏詳詔旨只是詢問有無錢幣輕多之害而臣於聖問之外輒陳煩説紊黷天聽罪在不赦然念事君之義知無不言惟乞聖慈深賜矜察純粹奏此乃三月十四日今附本月日葉夢得云三百萬緡蓋誤也已具注六年九月六日純粹八年四月十二日自右司出漕京東九月二日又奏此事可并考甲寅福建路轉運副使王子京言點檢福泉漳州興化軍賣鹽價不同欲乞均定詔户部如不礙見賣額鹽即依所奏乙卯江淮等路發運副使朝奉大夫蔣之竒都水監丞承務郎陳祐甫各遷兩官吏減磨勘年循資有差以上批聞所開龜山運河於漕運往來免風濤百里沉溺之患彼方上下人情莫不欣快其本建言及董役成者令司勳第賞以聞故也開龜山河在六年十一月二十八日神宗寶訓議河渠篇七年江淮發運副使蔣之竒請鑿泗州龜山左肋至洪澤五十七里為新河以避長淮之險二月以成功聞之竒奏計至京繪圖來上上問曰龜山亦故道耶之竒對曰鑿山為渠非故河也方鑿河時獲錢十四其文皆開通識者以為開河必通之兆猶李泌之鑿砥柱獲戟文有平陸為平陸之應也上喜遂下詔曰所開龜山河於漕運往來免風濤百里沉溺之患其始建言及董役成者令司勳第賞以聞乃以之竒直龍圖閣進秩二等餘遷官減磨勘年循資有差六年十一月二十八日開河七年二月十六日遷兩官之竒除直龍圖閣升發運使在哲宗即位後本傳可考寶訓誤也所河渠志第二卷龜山運河熙寧中皮公弼議濬許元開新河自淮隂屬于洪澤四十九里以避長淮之險詔從之發運使羅拯議鑿龜山河屬於洪澤公弼力沮之上察公弼沮壞事功尤欲用拯議元豐六年會發運副使蔣之竒奏計京師建言上有清汴下有洪澤而風浪之險止百里長淮邇歲沉毁漂失公私之載何可勝計自諸道轉輸經湖江數千里之逺而覆敗於百里之近良可惜也上乃遣都水監丞陳祐甫經度之竒議欲上自龜山蛇浦下屬洪澤鑿為復河取淮為源不置堰閘祐甫以其言奏因復陳工費浩大上曰工費雖大然為利亦博矣祐甫曰異時淮中歲失船百七十艘若捐數年所損之費足以濟役事上曰損費尚小如人命何詔遣之竒祐甫董役事起十二州丁夫十萬三千冇竒於正月戊辰始事二月乙未奏功河亘五十七里有竒漕運往來無風濤覆溺之患上遣中貴人勞賜有差詔建言成功之人第賞以聞命之竒撰記刻石于龜山賜權發遣熙州兼管內熙河蘭會路經略司趙濟銀絹六百降敕奬諭以應副軍期趣辦也禮部言誠州奏乞於中路要便之地建二寺大步山欲以靜化古融城欲以懷化為額乞歲度僧二人從之浮圖寨監押殿直朝立貸死免除名勒停追兩官衝替坐令十將續連殺投降秃頭寨主王傑也監察御史寋序辰翟思並守殿中侍御史丙辰户部言提舉京東路常平等司燕若古乞州縣積欠錢斛對移令佐催督看詳欲下提舉常平司具可以權對移職位姓名申部關吏部從之詔廣南西路諸州召募土人𨽻雄略澄海其例物依寄招例支七千外更增錢雍州住營者每名五千餘各三千具數關牒見寄招路照會關牒中書舍人兼侍講蔡卞奏待罪從官久無補報舉士應詔又非其才伏望罷臣職任除一在外差遣詔不許此據御集要見卞舉何人或見朱本丁巳大燕集英殿中燕皇子延安郡王初侍立于前宰臣王圭率百僚廷賀宣答曰皇家慶事與卿等同深為欣懌及圭等升殿上又諭王圭等復前分班再拜稱謝就坐久之乃退王年未當出閣上特令侍宴以見羣臣哲宗熙寧九年十二月生此年九歲也舊紀書丁巳燕羣臣集英殿延安郡王立侍于御坐之側宰臣王圭率百官廷賀及升殿上命與王相見久之土乃退新紀但書侍側廷賀己未手詔熙河一路開創未久凡百用度錙銖較計尚未易供億其緣防城器具雖為粗惡之物極塞所直自亦不少若於禦賊施用未是要急誠為枉費可下經略安撫制置司於己頒百步守城法內據緊急名件隨宜裁定聞奏毋致闕禦賊之用庚申御崇政殿閲諸軍轉員凡三日詔劉昌祚聞夏人以諜妄傳漢家欲城葫蘆河遂發河南北人馬十分之九集於練家流宜明逺斥候知賊所向清野城守則為制賊上策上批詔尾云本路撓耕之兵數出俘斬殆以千數羌人俗重酬報令所聚人馬不見漢兵勢不空回必於諸路鈔略諸路中本路且有瑕釁必恐首攖賊鋒不可不厚為之備詔御史中丞雜壓在六曹侍郎之上詔陜西河東經略司休息士馬更不出塞止為守禦之計候今秋别聽指揮樞密院言馬軍諸指揮及諸班以年出職及軍功轉補今轉員約至運使各有剩數遷補不行詔權置下名軍使二百三十員捧日龍衛各四十拱聖驍騎各五十雲騎三十驍勝三十權置下名副兵馬使九十員拱聖驍騎雲騎各三十知太原府吕惠卿言相度開麟府豐三州兩不耕地所收極厚可助邊計乞推之陜西路詔陜西路經略司詳酌施行七月十日丁未所書當考此與彼相重但經略異耳吕惠卿家傳有可刪入者今附此須更詳之家傳云七年春惠卿之任至河陽以北流移者負老携幼屬於道皆本路之民也既至思所以撫存如上意者先以尤急者三事上聞其一自五年軍興調夫與驢於民夫一名官支雇錢一千米一石驢一頭官支賃錢五百而民間自太原至潞州至河外一夫之費多至百千驢之直多至十千調驢三千頭至用錢四萬貫而官攴才千餘緡其後有司復以為但至極邊未嘗入界追理所支其二河東於二稅外别有和糴支移勞弊與正稅同而災傷無蠲減之法自軍興民尤以逺輸為病其三河東轉運司每歲以斛斗十萬石饋鄜延民間之費幾至倍蓰乃能畢足而計司不敢以為言惠卿皆乞除之於是流移之復業者相踵也河東四路邊面二千餘里兵七萬人舊制畸零交錯戰守不分其弊如陜西惠卿團為十二將二將以備北一將在嵐石一將在府州而八將番戍河外凡所以措置一切用陜西之法復自師出無功之後敵勢益張人心惴恐並邉退縮不敢耕而新疆葭蘆吳堡間號木瓜原者膏腴特甚皆昔西人恃以強國者惠卿遣知石州趙宗本相視之得地可耕者甚廣乃雇五縣耕牛發將兵護其外而耕之旬日種地五百二十九頃又耕麟府豐州地七百三十頃弓箭手與民之無力者與異時兩不耕者九百六十頃邊民始復有稼穡之利而秋成則以糴之官中邊計賴之以紓惠卿乃上疏乞為營田其略曰今葭蘆米脂裏外良田不啻一二萬頃西人名之實都倉或曰真珠山或曰七寶山言其出禾粟多而國中所資多出於此也果能為之法稍耕其地則兩路新寨飬兵之費略已備具而所資之內地者無幾矣况盡闢之乎然而所以不敢耕者前無捍衛而賊馬猶復出沒於其間而官中未有法以耕之故也夫捍衛疆場保護耕鑿莫若建堡寨而論者徒懲永樂之敗而不究其所以敗因置而不敢議此非計也夫堡寨誠不可建則凡新舊城寨皆不可守誠可守則曷為而不建之以據其要衝而令賊得出沒於其間而不敢耕哉今葭蘆西南去米脂才一百二十里若兩路各建一寨則每寨相去不過四五十里又於其間置小堡鋪以相照望則延州之義合白草與石州之吳堡克胡以南諸城寨凡千餘里之邊面面皆為內地其兵固可移之新寨則建寨之初雖當少益常戍而所益不多矣而闢其地利以贍軍用雖有資於內地而所資不多矣而河外三州荒間之地與昔之為西人所侵及蘇安靖請棄之以為兩不耕者臣皆為法以耕之又及時就糴於河外而使河內之民被文移者量出腳乘之宜而革百年逺輸貴糴以困公私之弊一二年間財力稍豐則又通葭蘆之道於麟州之神木其通堡寨亦若葭蘆米脂之法而橫山膏腴之地皆為我有使河西兩路州軍城寨相通自足為一路彼舉國大入則固守勿戰以避其鋒其散居或小入則擇利時出以擊其惰縱未撲滅彼無所歸不逺遁沙漠必請命畫疆則窺圖之望絶賔服之心固而邊境安矣竊以諸將既不能為一舉破敵之謀以經畫於前比奉詔旨令臣相度措置以為持久西邉抗敵之計宜無出於此於是具所以措置施行之法條件以聞而朝廷未暇為也十持久抗敵之計實録係之七月十日據八年正月二七日所奏則營田乃不如惠卿所言也辛酉詔永縣河南府六陵勾當官香火內品等自來承例逺離陵寢將迎使客自今一切禁止非凖朝命輒離陵所者如擅去官守法京東路轉運司言鹽場收雜錢不係本息數乞歲支三百千為本司公使若别費用及數外取索並以違制論不以去官赦降原減從之壬戌手詔李憲昨奏果莊送馬十三匹乞買寫經紙事紙可就賜之而還其馬詔太學外舍生周邦彥為試太學正寄理縣主簿尉邦彥獻汴都賦上以太學生獻賦頌者以百數獨邦彥文采可取故擢之邦彥錢塘人也同管勾京西保馬吕公雅言保馬癯瘠已立備償法其充肥未有旌賞欲乞保馬生駒每匹給絹一匹其充肥支銀楪仍乞借常平錢五萬緡均付諸州縣出息為銀絹費每歲孟夏之月聚而牧放可致蕃息從之京東路凖此五年五月五日又九月十四日又七年二月八日又五月二十六日二十九日京東路都轉運使吳居厚言密州板橋鎮東枕大海四方商賈所聚並無垣墻乞調明年春夫厚築高垣以包民居置關鎖其海灘浮居小屋大半隱藏禁物盜賊並令毁撤仍委密州覺察從之京西路轉運判官沈希顔言本路酒稅監官闕員及不職乞不拘常制奏差公幹文武官户部言內外官司罷舉已著令詔課利及萬緡以上依希顔所乞六月十五日可考詔京東京西淮南路轉運司聞本路久不雨可訪名山靈祠委長吏祈禱甲子鄜延路第二將西頭供奉官張禧追一官勒停初經略司命禧以將下兵至開光寺護輸稅人乘而禧擅以所部入米脂谷采木賊馬略輸稅戶殺人十四禧失於應接經略司劾罪上之仍收禁禧大理寺當禧罰銅五斤請劾官吏不應禁禧罪劉昌祚言禧故不稟本司處分殺無罪十四人有司議法不當情恐將佐觀望以誤邊計故有是命詔河東路經略司臣僚初奏斬獲西賊一人仍體量西賊入寇及城寨使臣等應敵次第并殺獲人畜燒蕩邑居詣實以聞朱本以為事小削去當考其故四月七日丙子朱本所增書或即此事天章閣待制提舉仙源縣景靈宫王居卿卒居卿粗俗吏特以言利至從官云丙寅廣西安撫司走馬承受薛元方乞買荆湖北路鼎澧潭郡等州土産良馬詔荆湖路轉運司詳度誠州言右司員外郎孫覽建議於新開路多星牧溪置二寨堡已遣侍禁劉詔以兵往護役詔賜多星堡公使錢歲百五十千土丁月給錢人三百畢仲遊云云當具覽使歸時戊辰詔河北瀛定二州元豐五六年及接今歲提舉糴買封樁糧草司所糴糧數以巨萬而散於諸處寄糴緩急屯集大軍逺近不相及兼新倉殆為虛設又兼糴處多無守具若令漸運入新倉則其費不資不若致商人自運為便未知必須寄糴利害宜下本司具析李南公王子淵言寄糴法行之已久如保州廣信安肅北平等軍在定州之北係極邊要切儲蓄之地真定府祁州永寧軍亦係次邊合行計置軍儲處與都倉相去皆近便緩急般取尅日可到或容本司計置兊移即可以並歸都倉瀛州都倉寄糴利害如此今若使客人盡知官中必於都倉收糴非得高價未肯入中則必為之增價寄糴之利不唯於都倉無所嫌兼亦平凖物價使輕重之權不為兼并所制從之要見都倉凡幾所在甚州自何年立何年成己巳知相州滿中行言林慮縣南修合澗河水以濟民用功既久又有孟兒等村鑿井取水十年百八十尺不及泉民以為勞而無功寧逺行汲水以初奉朝旨未敢罷詔罷之廣南西路經略司言凖轉運司牒闕錢支遣逐急借褁衣等錢及相度諸州以五等戶正丁買鹽已三申尚書省不報今邊防軍費闕絶牒請同詳定敷奏上批許彥先舉止狂躁輒以本職事妄移他司肆為張皇喧言闕乏內搖士卒之心外示弱戎蠻有虧邊備雖己差替可改為衝替事理重許彥先緣何已差替當考
