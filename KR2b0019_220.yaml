body:
  text: 續資治通鑑長編卷二百十六宋李燾撰神宗熙寧三年冬十月戊午朔命直史館李夀朋詳定百官轉對封章辛酉龍圖閣直學士知成德軍吳中復知成都府詔皇城使端州團練使樞密副都承㫖李綬立班在都承㫖之後宫苑使之前又詔樞密院諸房副承㫖遷至第一名及三期與左藏庫副使補外官舊例諸房副承㫖得第遷至都承㫖至是都副承㫖更用士人故立是法日録九月一日王安石韓絳並薦李綬除副承㫖當考綬邑里判延州郭逵言西界將來關報賀正旦等使牒至未審許與不許收接詔逵作已意答以為嘗寇慶州不敢收接引伴舊紀書以夏人寇環慶詔延州毋納其使新紀書詔延州無納夏使集賢校理趙卨言賊頃犯邊秉常子母無所利特洪宥州酋結明愛旺莽額倡之未能肆其惡而人畜疲敝朝廷又絶嵗賜勢力貧蹙上下擕二向以梁伊特邁計縶送韓道喜於是旺氏與梁氏交怨正恐伊特邁謀中蒙愛請令邊吏諭虜如能禽致旺莽額結明愛及同謀首領來者朝廷賜豫無所吝如此則彼腹心暌離雖有狡計當不得發若此二人至厚寵之以示餘酋宜各解體因而招橫山之衆不戰而屈人兵也陜西宣撫司言官私比乏良馬蓋以官價賤乞應買馬州軍增價市之於是詔惟騍馬不增外其秦渭原州德順軍見買大馬增價有差如價髙商人不願中官者聽民間收買癸亥工部郎中兼侍御史知雜事知審官西院謝景溫知東院司封員外郎直史館知東院蔡延慶知西院以景溫言嘗彈奏同知西院李壽朋之弟復圭知慶州邀功生事壽朋懷此怨嫌數䝉侵怒乞易地故也職方員外郎鄧綰為集賢校理檢正中書孔目房公事綰故名維清雙流人舉進士髙第纍遷寧州通判上書言陛下得伊吕之佐作青苗免役錢等法百姓無不歌舞聖澤臣以所見寧州觀之知一路一路觀之見天下皆然此誠不世之良法願陛下堅守行之勿移於浮議也又與王安石書及頌安石大喜白於上使乘驛詣闕又纍詔趣之比至上使數人迎於中牟八角順天門詗候之抵暮入門就舍詗候者夜飛奏於右掖門竅中進入詰旦召對時慶州方有夏寇綰進呈邊事上問識王安石否曰不識上曰今之古人也又問識吕惠卿否曰不識上曰今之賢人也綰退見安石欣然如舊交安石問家屬俱來乎綰曰承急召未知所使不敢俱來安石曰何不俱來君不歸故官矣後數日值安石致齊陳升之與馮京以綰知邊事奏除知寧州綰聞大恨公語朝士曰急召我來乃使我還知寧州也我已語介甫甚不平朝士問曰君今當作何官綰曰我不失作館職或問君得無為諫官乎綰曰正自可以為之眀日果有此命綰自至京師不敢與鄉人相見鄉人皆笑罵綰曰笑罵從汝笑罵好官我須為之尋又命綰兼編修中書户房條例此據司馬光日記增入兼編例在十月乙亥今并書上批陜西一路就糧禁軍昨定十萬人額自今春令監司分簡至今未奏簡退若干見管若干况今用兵之初關中不稔若當招簡不可後時令陜西河東諸路都總管司據土兵額闕數選兵官往諸州軍速招簡及額詔國子監書庫官差親民及第二任監當人以右司諫直集賢院章衡言舊多權要子弟陳乞職事不修故也甲子雨木冰南康縣尉李總為將作監主簿賞捕盜功也詔發運轉運司主管文字諸路掌機宜官聼舉當入川廣人京東路提舉常平司言轉運司有未償內藏庫紬絹十四萬緡乞借充青苗錢候三年還內藏庫從之是日詔种諤赴闕初諤自隨州安置復西京左藏庫副使商州都監㑹諤丁母憂諤初復官已是元年十二月十二日改秦州都監涇原秦鳳帥又交辟之皆不赴韓絳宣撫陜西召諤問計策除知青澗城兼鄜延路鈐轄專管勾蕃部事折繼世言於諤請築婁城且曰橫山之衆盡欲歸漢大兵出界河南地可奄有諤遂與絳議由綏德進兵取婁建六寨以通麟府包地數百里則鄜延河東有輔車之勢足以制賊上是其議故令入見召諤據御集餘則采諤傳及墓志十二月二十一日免赴闕丙寅慶州大順城本路鈐轄供備庫使梁從吉蕃部巡檢供備庫副使趙餘德知城內殿承制郭需都監內殿承制雷嗣文柔逺寨北路都巡檢左藏庫副使林廣蕃官都巡檢西京左藏庫副使趙餘慶權駐泊都監禮賔使李克忠寨主內殿承制孫宗信監押東頭供奉官木信之荔原堡東路都巡檢兼權本堡都監西京左藏庫副使姚兕權西谷寨主西京左藏庫副使張繼凝各遷一官餘轉資減磨勘年有差夏人入寇從吉等拒戰有功故也夏人舉國入寇環慶堡障皆被圍姚兕駐荔原堡引兵出據險要又張疑兵諸山上使賊不得散掠境內間出竒兵擊之賊稍却明日益兵來攻甚急兕乘馬而射凡三百餘發皆應弦而斃指裂流血而射不己更遣其子雄率精騎出自執旗從城上麾之賊不敢當即引而西攻大順城兕復往援城又獲全進文思副使此據兕本傳附見贈環慶路都監東頭供奉官閣門祗候髙敏嘉州刺史封其妻旌德縣君録其子二人為左右侍禁一人為左班殿直鈐轄皇城使郭慶子二人並為右侍禁指使魏慶宗秦勃子各一人為茶酒殿侍戊辰延福宫使武信軍留後石全彬卒贈太尉定武軍節度使諡恭僖已巳右武衛大將軍昭州團練使克頠領解州防禦使克頠試詩易大義及論於學士院皆合格也提舉陜西常平等事太子中舍劉琯為西京左藏庫副使環慶路都監琯以宣撫使韓絳薦其才故命易官而擢之琯為陜西常平在二年九月十二日庚午判延州郭逵言破西界新修堡塞畢有保捷軍士王青以所獲首級與副指揮使劉興易取金叉未得自首上批賣首級罪論如法仍復與當得酬奬敕賜同學究出身徐布言常平義倉所畜大約不過一千三百餘萬則不及唐五分之一陛下仁民愛物遂遣使者分詣天下行春秋補助之法而迃儒陋士難與慮始臣愚願得權輕重為散斂之法以便貧民而抑兼并願賜清間之燕得縷陳於前上批可召赴中書仔細質問是日中書進呈寢之此據御集所以寢之當考辛未詔中書檢正官俸科如三司判官都檢正官益以傔二人三司言遇支軍糧日每倉選朝臣一員同軍職在倉門看驗布袋出戍軍家糧乞差內臣五員分定指揮覺察緣路侵欺并日詣一兩指揮㸃檢從之壬申詣景靈宫拜天興殿朝謁奉真廣孝孝嚴英德四殿舊紀書朝謁景靈宫新紀不書今從實録詳著之甲戌提㸃陜西路刑獄髙賦徙河東路罷轉運判官李師錫令赴闕提㸃河東路刑獄屯田郎中韓鐸京西路轉運判官太常博士李南公並徙陜西路光祿寺丞吕大鈞為宣撫司書寫機冝文字皆從宣撫使韓絳所請絳言賦非明幹之材師錫昏懦不職故徙罷之大鈞大防弟也先是絳欲就用鐸為河東轉運使王安石不可既而上亦欲用之曰鐸㸃檢城壁器械事甚仔細安石曰朝廷遣鐸往㸃檢仔細乃其職分鐸處置常平事極乖見方被劾豈可便遷擢上曰須以諸軍通計豈可專為常平一事黜陟人安石曰臣但見鐸處置常平事乖方可黜即未見鐸措置他事可陟陛下似未察臣用意臣豈以議立常平法遂欲專以常平事黜陟人常平法於天下事特萬分之一臣所以事陛下非以議立常平一法為事業也陛下似未察臣用意安石嘗進所著洪範傳上手詔答之及奏事罷因留身謝上曰曽公亮年老且去朕方以天下事倚卿卿不得謂朕不知卿九月十三日公亮已罷安石復為上言鐸事曰今內外同為茍且慢法玩令其治之不可不急若方以慢法玩令被劾即遷擢人何所忌憚為天下如醫方若寒時雖純服烏頭附子硫黃不為過熱熱時雖純服大黃朴硝不為過寒陛下當察時病所在而勸沮其緩急不可以不應病也上乃不用鐸於是絳出使陜西因請徙鐸上既從絳請又以手札促鐸赴任促鐸赴任按御集在三年十一月十二日鐸初以權知曹州除河東憲在二年八月初八日今并書洪範傳或於此附見一二九月壬子亦可附知桂州潘夙言主管雍州溪洞文字蔣舜俞近到任即建白欲取交趾恐致生事乞改授舜俞廣南東路差遣從之三月末王安石云云可考乙亥韓絳乞差著作佐郎吕大忠等赴宣撫司以備提舉義勇從之絳乞差駕部員外郎馬玘祕書丞劉拱殿中丞樂渙及大忠凡四人據明年五月四日罷分教義勇所辟官凡八人此蓋未全今並削去止存大忠姓名明年五月四日並罷八人者絳又言今將義勇分為七路延丹坊為一路邠寧環慶為一路涇原儀渭為一路秦隴為一路陜解同河中府為一路階成鳳州鳳翔府為一路乾耀華永興軍為一路逐年將一州之數分為四畨緣邊四路十四州每年秋冬各用一畨屯戍近裏三路十二州軍即令依此立定畨次未得逐年差發遇本處闕少正兵即得勾抽或那往次邊守戍從之當秋季者自八月一日當冬季者自十月下旬各須滿三箇月日放回周則復始仍將季分底換差發時以西賊作過多在春秋當冬季者改作春季自正月十五日至三月終放回義勇分路據㑹要在十二月今並書或移見十一月五日七月八日蔡挺五畨事可考丙子敇工部郎中直龍圖閣知慶州李復圭擅興甲兵討蕩羌境致夏人㽡亂擾我塞陲種落凋荒膏于原野可責授檢校工部郎中保靜軍節度副使不簽書本州公事先是御史知雜事謝景溫言西羌擾邊環慶城堡皆被其害緣復圭邀功生事致一路之人坐受塗炭竊聞復圭自為統帥以來數行剽掠偏師二十餘出遂使外國怨憤舉國內侵士卒死傷邊民流離皆復圭所致昨詔鞫於河中府既又聞貸其罪如此則朝廷之法不行邊臣得以自恣為生民之害非細事也夫王者之師信義為本向使復圭雖有克捷之功而失信義猶不足取而况輕敵損威傷財害民如此之甚乎乞下宣撫使韓絳體量致寇之因考核傷夷之數重行黜陟以警邉藩時己下本路體量既至而有是責此據墨史新舊紀並書復圭以擅興罷韓絳上章乞赦復圭詔答曰復圭才智雖有足尚者但此舉類多欺詐以至魚肉生民殺戮將校職其從來皆復圭之故省所論奏朕再三思之未克從所請深諒忠誠當體朕意此據神宗寶訓御史臺言奉詔定奪秀州軍事判官李定所生母亡當與不當追服看詳庶子為父後如嫡母存為所生母服緦麻三月仍解官申心喪若不為父後為所生母持齊衰三年正服而禫今以流內銓并淮南轉運司取定親鄰人狀稱定乃仇氏所生仇氏亡日定未嘗申乞解官持心喪止是當年稱父八十九歲迎侍不便乞在家侍養即未見定為所生仇氏解官持心喪今定乃言仇氏亡日有鄉人私告曰定之所生母定請於父父曰非汝所生母當日以不得父命而又有鄉人私告之語緣此自疑遂不欲仕止解官侍養名雖侍養實行心喪之制然定復有此自疑為說即是當日未有果決緣心喪之制本繫孝子之情若當日未明仇氏為所生既無母子之恩何緣乃行心制今轉運司據鄉鄰人稱定實仇氏所生益明合依禮制追服緦麻三月解官心喪三年如定稱實非仇氏所生牽合再有辭說乞自朝廷别作施行詔定改太子中允其鄰人李肇等稱仇氏是定所生母令淮南轉運司勒令分析的確照驗以聞要録云既而知雜謝景溫言定嘗言李肇乃嘉祐七年僦居之鄰難以取信檢㑹定元狀稱有鄉人私告定是仇氏所生但使定供鄉人姓名令轉運司根究必見情狀於是詔淮南轉運使取問鄉人的實事狀以聞十一月五日謝景溫云云太常博士陳針為西上閣門副使知欽州續詔針權廣南西路軡轄雍州駐劄續詔據㑹要御集一百五十一卷樞密院奏差西上閣門副使知欽州陳針往廣南西路經略司與潘夙及轉運司同共體量相度公事了日未審令自齎赴闕為復商量了且具狀入遞奏聞御批如有須合靣陳說事件即令赴闕熙寧三年十一月十五日下醫學溫杲奏處置交趾事御批所說極有可採冝速相度聞奏熙寧三年十一月十五日進呈訖溫呆差往廣西同陳針勾當公事因甚至今未與付身文字可只今勘㑹仍劄與令到彼每事與陳針商議熙寧三年十一月日下司馬光日記十一月十三日押班李若愚廣西勾當公事交趾叛將有率衆來降者若愚曰此不可受可以遙決不必往彼也二十一日太博陳針換西閣副使知彬州李若愚更不知廣西只令針體量邊事四年三月二十二日王安石日録上不欲用陳針為雍州以與蕭注不相下余以為注陵之故致此上欲以針知欽州前一日南㕔議移桂州經略於雍州恐交趾反側且俟交趾入貢乃議移經略今且以蘇緘知雍州上許之按陳針知欽州乃三年十月二十日恐日録誤編排當考判延州郭逵言延州西路都巡檢賈翊等入西界與賊戰有功應賞詔優等使臣遷一官仍減二年磨勘第一等使臣并蕃官副都軍主殿侍大將軍各遷一資第二等第三等減磨勘年有差詳定編敇所言嘉祐刪定編敇官以二年為任五年為兩任乞自今應刪定官每月各修敇十條送詳定官如二年內了當不計月日並理兩任如有拖滯雖過二年亦理一任從之此據㑹要三年十月十九日所書增入二年五月十七日三年七月二十二日可考戊寅以宰臣陳升之母卒輟視朝詔升之母歸葬潤州差內臣一員緣路管勾歸葬所須並從官給韓絳言近詔陜西轉運司體量本路通判知縣若加精選絀免必多候朝廷差填不惟闕官日久兼恐常調未必得人乞令監司於本路待闕得替并近下資序官內擇材連名奏舉便令權攝支與本任俸給到任治狀可取即充正官從之樞密院言諸路走馬承受使臣春秋赴闕止是於經略安撫司取索管下城寨平安狀進呈詔河東陜西令親詣城寨取索所至留一日不得飲宴著為令詔太平常州茶鹽酒稅礬務增京朝官一員同監從發運司請也己卯前知秦州右司郎中天章閣待制李師中落天章閣待制降授度支郎中知舒州秦鳳路都鈐轄皇城使帶御器械向寶落帶御器為本路鈐轄著作佐郎王韶降授保平軍節度推官依舊提舉秦州西路蕃部及市易司初遣王克臣李若愚按師中及韶所論市易利害及閒田頃畝克臣等奏與師中叶朝廷疑其不然復下沈起起奏韶所說荒地不見的實處雖實有之然於今未可檢踏召人耕種恐西蕃諸族見如此興置以為朝廷招安首領各授以官職料錢令獻納地土人情驚疑則於招安之計大有所害欲乞權罷墾田之議俟招安諸蕃各已信服人情通順然後為之未晚於是侍御史知雜事謝景溫言近聞起體量甘谷城弓箭手地稍多乞候邊事稍寧日根括施行緣韶元奏自渭源城至成紀縣㳂河良田不耕者萬頃乞擇膏腴者千頃歲取三十萬石濟邊儲今甘谷城去渭水逺非韶昔所指之處乃以此為名避當日欺妄之罪昨克臣若愚嘗奏無此閒田竇舜卿亦稱但打量閒田一頃四十三畝與起所奏各有異同而起亦徇韶之情妄以他田為解附下罔上乞降韶元狀遣推直官一人往體量就推劾如有矯僞重行譴責御史薛昌朝亦言韶妄進狂謀邀功生事今起體量多與克臣等不同兼起妄指甘谷城地附㑹韶言乞以師中前後所上文字及克臣起等節次體量事狀付有司推劾各正其罪時中書謂起未嘗指甘谷城地通作韶所言地之數而師中寶前在秦州稽留朝㫖奏報反覆寶與韶更相論奏各有曲直韶以妄指閒田特有是責其後知秦州韓縝按視乃言實有古渭寨弓箭手未請空地四千餘頃仍復韶官如故復官在四年六月二十三日其本末見彼閣舊紀書知秦州李師中奏報反覆害王韶功落天章待制以度支郎中知舒州新紀削去其削去非也工部郎中直史館李夀朋太常博士集賢校理同知諫院孫洙並兼直舍人院集賢校理鄧綰同知諫院詔翰林學士户部侍郎兼侍讀集賢殿修撰范鎮落翰林學士依前户部侍郎致仕先是鎮奏乞致仕曰臣近舉蘇軾諫官䝉御史劾奏又舉孔文仲應制科䝉下流內銓告諭令歸本任職臣之故上纍聖德下纍賢才臣無靣顔復齒班列望除臣致仕仍不轉官以贖軾販鹽誣罔之罪及文仲對䇿切直之過不報又奏軾治平中父死京師先帝賜之絹百匹銀百兩辭不受而請贈父官先帝嘉其意贈其父光祿寺丞又勑諸路應副人船是時韓琦亦與之銀三百兩歐陽修與二百兩皆辭不受軾之風節亦可槩見矣今言者以為多差人船販私鹽是厚誣也軾有古今之學文章髙於時又敢言朝廷得失臣所以舉充諫官今反為軾之纍臣豈得默默不為一言又文仲對䇿中外皆言其切直設有過當亦由小官踈外不識忌諱且以直言求之而以直言罪之是罔天下忠直而納之罪罟豈不為聖眀之纍乎陛下聰明睿智欲為堯舜湯文之所為而乃拒忠諫惡直言臣竊惜之乞明辨軾之無過恕文仲之直言除臣致仕最後奏曰臣請致仕已四上章歷日彌旬未聞可報緣臣所懷有可去者二臣言青苗不見聽一可去薦蘇軾孔文仲不見用二可去負二可去重之以多病早衰其可以己乎今有人言獻忠與獻侫孰是必曰獻忠是納諫與拒諫孰是必曰納諫是蘇軾孔文仲可謂獻忠矣陛下拒而不納是必有獻佞以誤陛下者不可不察也若李定避持服遂不認母是壞人倫逆天理也而欲以為御史御史臺為之罷陳薦舍人院為之罷宋敏求李大臨蘇頌諫院罷胡宗愈王韶上書肆意欺罔以興造邊事敗則置而不問反為之罪帥臣李師中及御史一言蘇軾下七路掎托其過孔文仲則遣之歸任以此二人况彼二人以此事理觀彼事理孰是孰非孰得孰失陛下聰眀之主其可以逃聖鑒乎惟審思而熟計之朝廷所恃者賞罰而賞罰如此如天下何如宗廟社稷何至於言青苗則曰有見效者豈非嵗得緡錢數十百萬緡錢數十百萬非出於天非出於地非出於建議者之家一出於民民猶魚也財猶水也水深則魚活財足則民有生意養民而盡其財譬猶養魚而欲竭其水也今之官但能多散青苗急其期㑹者則有自知縣擢為轉運判官提㸃刑獄急進僥幸之人豈復顧陛下百姓乎陛下有納諫之資大臣進拒諫之計陛下有愛民之性大臣用殘民之術臣職獻替而無一言則負陛下多矣臣知言入觸大臣之怒罪在不測然臣嘗以忠事仁祖仁祖不賜之死才聽解言職而已以禮事英宗英宗不加之罪才令補畿郡而已所不以事仁祖英宗之心而事陛下是臣自棄於此世也臣為此章欲上而中止者數矣既而自謂曰今而後歸伏田閭雖有忠言嘉謀不復得聞朝廷矣惟陛下裁赦早除臣致仕王安石見之大怒持其疏至手戰馮京謂安石曰何必爾安石命直舍人院蔡延慶草制不稱意更命王益柔而安石又自竄改其辭曰鎮頃居諫省以朋比見攻晚置翰林以阿諛受斥而每託論議之公欲濟傾邪之惡乃至厚誣先帝以蓋其附下罔上之醜力引小人而狃于敗常亂俗之姦稽用典刑誠宜竄殛宥之田里姑示寬容凡所應得恩例悉不之與聞者皆為鎮懼鎮上表謝其略曰雖曰乞身而去敢忘憂國之心又曰望陛下集羣議為耳目以除壅蔽之姦任老成為腹心以養和平之福天下聞而壯之安石雖詆之深人更以為榮焉司馬光預作鎮傳曰吕獻可之先見范景仁之勇決皆余所不及也舊紀書范鎮以附下罔上援引小人落翰林學士致仕新紀削去其削去非也詔遙郡刺史團練防禦使三等第遷並理十年磨勘餘如舊制以同知審官西院李壽朋言見管皇城使三十餘員多領遙郡而尚令磨勘例改遙郡刺史團練防禦使名每進一官增俸錢五十千又增祿粟雜給殊為優幸如令更不磨勘又緣在後行郎中之下品秩太卑臣愚欲乞於皇城使上别置使名二等視中行前行郎中量加俸錢序位次昭宣使於東西班前對立遇磨勘不以內外使臣並令序轉如遷盡令置使名即依文臣至前行郎中例止其遙郡刺史仍限員數比類少卿監序遷其遙郡團練防禦使更不序遷並從朝廷非次賞功擢任故有是詔庚辰信豐縣尉鞠經為大理評事賞捕盜功也知慶州王廣淵言河東礬鹽為利源之最乞於河東京東河北陜西别立礬法置官提舉罷巡促使臣委巡檢縣尉收捕朝臣一員往來提舉詔光祿寺丞楊蟠乘驛同逐路轉運司相度利害以聞後蟠等言坊州宜君縣平臺鄉其地自來産礬官司雖嘗置場收買然以民間私礬數多商人不願就官算請今欲招置鑊户令量官所用多少限定户數收買其商人所算請許令於陜西州軍北至黃河東至潼關并京西均房襄鄧金州光化軍為界以鑊户立為保甲遞相覺察告捕不得私賣及越界至如違並依私白礬條斷遣給賞仍乞令轉運司舉官一員監當如官司敢以捉獲私礬妄名夾雜故減斤重者以故出入人罪論並從之本志同壬午詔潁州進士常立就試舍人院以侍御史知雜事謝景溫言立行義修潔昨預登遣以疾不及試故有是命立秩子也樞密院言諸路有功將士多不依元降賞格速定奪聞奏慮淹遲啓幸詔陜西宣撫司指揮逐路經略司並依行軍賞格施行甲申詔工部郎中直舍人院李壽朋展磨勘二年坐前知滄州令諸縣截留贓罰賞錢預均配百姓小麥黃米入公使及回易取利置陳設器物兼與通判劉叔寶互論舉而壽朋又妄申中書自以為不當坐罪雖經赦降而販易公使法不該免故有是責乙酉京西轉運司言州縣人户昨添差為鄉弓手後别無捕盜日限止是歲集縣尉司教閲一月放散其所置隨身器械入官架閣令全免户下賦役深為僥幸詔京東西淮南兩浙江南荆湖福建等路添差弓手並放罷添差弓手當考其始二年六月八日富弼曽公亮不肯即罷當參照渭州言昨罷保毅應役止令一名納錢三千今據平涼等縣狀保毅元置年深多非本户正丁並各貧下乞免納錢依舊給修城諸役詔每名減錢一千初咸平五年李繼遷叛西陲用兵遣侍御史吳蒨與陜西轉運司閲緣邊丁壯得六萬八千七百號保毅軍給資糧與諸軍分戍保毅之名自此始至治平中置陜西義勇乃令環慶路保毅並撥為義勇鄜延路或為義勇餘仍舊而秦鳳涇原路籍保毅者猶五千餘人至熙寧二年薛向等言兩路保毅並於地畝上科差歲久止有租名初無正丁皆是臨時衆户依地畝合錢雇庸充役每典賣地土即開坐所科保毅分數隨契推送謂宜盡免保毅應役止令輸錢以備修城征行庸直從之至是以所輸重民不以為便故又令損其數兵志第三卷陜西保毅熙寧四年詔廢其軍今附此詔入內內侍省內侍都知押班歲滿當遷自今令樞密院施行詔信州茶鹽稅泗州僧伽塔秦州柴墟口岸睦州酒稅江寧府織羅務隰州溫泉稅舊差內侍監當自今並令三班差人上語輔臣以課利場務不欲令少年宦者與其間故也丙戌著作佐郎館閣校勘王存大理寺丞館閣校勘顧臨著作佐郎錢長卿大理寺丞劉奉世同編修經武要略兼刪定諸房例册仍令都副承㫖提舉編定上曰存等皆館職不欲令提舉可改為管勾通略云存丹陽人臨㑹稽人奉世敞子也陜西宣撫司言邠州振武長行楊元與西賊鬬重傷恐遂為廢人已令邠州給半分糧賜終其身詔自今諸軍因與賊鬬重傷致成篤疾廢疾者並給小分請受終其身願放停者聽詔諸路見闕兵馬都監處如未有本等合入人即於選差一州駐泊都監內差管勾本路都監事
