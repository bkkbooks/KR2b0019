body:
  text: 續資治通鑑長編卷五百三宋李燾撰哲宗元符元年冬十月乙亥朔三省言近水灌解池鹽數少損慮民間闕用河中府解州小池鹽商華等州私土鹽階州石鹽通逺軍岷州官井鹽並聽與解鹽於陜西路出賣又言解州鹽池為水所衝注知州劉棐通判劉公明並放罷令取劾聞奏乞不以將來赦原並從之明年正月二十六日差官致祭雄州奏契丹新置魏州欲徙上等户二千以實之宰相王師儒以為不可力諌不從退而自刺其腹賴左右救止微傷而已遼主遽從其言仍賜壓驚錢三千緡加三官丙子曽布白上此事虛實雖未可知然能以愛民為心強諌如此而遼主聽納又賜金加官君臣之際即在中國亦所難得也上默然詔諸路新附蕃官逐官逐月各特支與月糧借職以下依下班殿侍例奉職以上至供奉官依茶酒班殿侍例候轉至崇班日住支樞密院言淺井瓦和市進築城寨比之自齊訥納森橫水瀾東楞摩進築與涇原路自蕩羌進築鼐摩會額勒色克一帶相迎通接邉面即是迂直遲速并費用錢糧兵馬事力大假相逺遂降指揮令章楶孫路相度兩路各自天都及齊訥納森以來進築城寨通接邉面今議者或謂不先築淺井則諸處川谷賊馬來路不一即未委兩路依前降指揮去處併力進築之際更有無賊馬來路可以入近裏作過朝廷於合進築之處亦無固必全責在兩路帥臣詔令章楶孫路詳已降朝旨及今來所問事理子細體問的確利害公共講議兩路進築次第如合依先降朝旨施行即合至甚時計會勾抽環慶秦鳯路兵馬各行次第進築畫一條析的確利害結罪保明聞奏章楶奏議載此今掇取附見曽布言張行李深皆力陳不築淺井則天都齊訥納森皆未可進築且以謂邉人之言莫不爾而帥臣以鍾傳被責不敢奏雖未可盡信然亦不可不究其説欲下兩帥相度而章惇堅以為不足問又出張詢書云不足議上以布言為是遂降此詔又詔秦鳯支修城保甲雇錢諸路凖此涇原奏新歸漢供奉官以下支殿侍月俸從之丁丑左司員外郎曽􅌈等言謹按周禮大宗伯之職以禋祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風伯雨師又肆師之職立大祀用玉帛牲牷立次祀用牲幣立小祀用牲故先儒之説以為實柴所祀者無玉槱燎所祀者無幣按太常令式衆星三百六十位皆不用幣蓋出於槱燎無幣之義然臣等考於典瑞玉人之官皆曰圭幣以祀日月星辰則實柴所祀非無玉矣則槱燎無幣恐或未然乞下有司考求以上副陛下稱秩百神之意禮部與太常寺看詳按王涇郊祀録凡禮神之幣五星以下各隨方色一丈八尺又國朝祀儀小祀皆用幣惟親祠儀自天皇大帝而下皆為從祀幣日以赤月以白五帝及內宫已下各從方色並長一丈八尺獨內壝之外衆星三百六十位不載用幣之文今乞從所請並隨其方色用幣又言伏考典禮以氣臭事神自周人始至於近世易之以香謹按先儒何佟之議以為南郊明堂用沉香本天之質陽所宜也北郊用上和香以地於人親宜加雜馥前代祀志實存其説今令文北極天皇而下皆用濕香至於衆星之位香不復設竊恐於義未盡禮部與太常寺看詳內壝之外衆星三百六十位欲比附壝內從祀神位每陛各設香爐一座每座用濕香四兩又言郊壇分獻官祀官贊者凡二百餘人皆立於小次之後每有升降多出御前往來紛然不至嚴肅乞下講求著為定制禮部與太常寺看詳元豐郊禮設分獻官於內壝東門外公卿之後重行西向北上立皇帝至位再拜並隨拜降神樂止又隨拜皇帝將奠祀帝之幣禮生各引分獻官奉玉幣升壇奠於上下諸神位訖各引復位初亞獻將升禮生分引諸獻官俱詣罍洗各由其陛奠訖俱還位兹乃舉行舊典已得允當至元祐中止為皇帝升壇贊者引分獻官等往來不至肅靜遂著先期升壇之制顯於禮意未安今欲依元豐舊儀著為定制從之先期升壇之制是何年所定當考禮部言詳定郊壇衆星合用香幣及罷分獻官先期升壇復元豐舊儀從之實録先書禮部言詳定郊壇衆星用香幣等乞依元豐舊制又書左司員外郎曽􅌈等云云至從之又書復先帝舊儀也按禮部詳定凡三事衆星用香幣二事也罷分獻官先升壇依元豐舊儀三事也實録蓋漏第三事今改云禮部詳定郊壇衆星合用香幣及分獻官先期升壇復元豐舊儀從之既總見其事則曽􅌈等所陳自合削者姑存之詔內中玉虛殿自先後依靈釐殿欽天壇每遇立春春分立夏夏至立秋秋分立冬冬至皇帝本命興龍節正旦端午下合屬處修寫表本前二日差使臣供納曽布元符三年日録云二月辛酉上諭云禁中修造華飾太過牆宇梁柱塗金翠毛一如首飾又作玉虛華麗尤甚又云仁宗作一寶座議以為華麗遂置之相國寺今非其比外人何以知鄒浩亦嘗論列余云禁中地窄玉虛誠不須作其他亦多不知但曽從駕至北郊宣入賜茶次日大行諭云昨日盡見北郊宫殿只是綵繪比他處精好外靣人言使了多少金也上云然賜茶處是後殿前殿後有流杯曲水及亭榭無非金翠亦與首飾一般鄒浩敢言無所不論須召還余且再三稱贊宣德郎左膚為監察御史從中丞安惇薦也戊寅禮部言先凖樞密院劄子元符元年夏國厯日更不給賜詔更不給賜仍候邉事了日取旨鄜延路經略使吕惠卿言將兵入界或受降或戰殺全繫兵將官臨時處分若於陳前生降到人户不優為推恩即恐他日討蕩之時不肯全活却致族帳盡為仇敵不肯歸降欲乞將出界陳前生虜到人户除全活老小婦女依紹聖四年正月一日朝旨每名支絹十匹外仍每五人理一級轉資更不支加賜其生降到壯人每名依斬獲例推恩其差人招到人户歸漢先通耗用兵馬於界首等接只依招納勑施行從之諸路凖此紹聖四年正月一日朝旨不見在本月日蓋朝旨不入長編紹聖三年十一月九日乙未曽布云云可考己卯鄜延路經略使吕惠卿言令統制官劉安張誠領兵出界討蕩斬獲首級脅降到人户口詔惠卿以下等第賜銀合茶藥應出界軍兵賜錢有差其得功將士等令本司審察實狀保明以聞吕惠卿家傳九月遣鈐轄劉安以第四將都監張誠以第三將第五將第六將第七將出塞二十三日安至梁聖臺敗賊帥布沁斬首三百餘級招降六百餘人二十四日誠至白地大破威明鼐濟特沙克五千餘騎追北至練州城斬首千餘級獲其兵仗馬牛以萬計既還安復以精鋭千八百騎出討田氏家流斬首千六百四十九級誠亦部諸將至朗戩泊斬首七百級是時賊以重兵冦涇原後得降者言賊兵聞安等討蕩不復有鬭志遂解平夏之圍朝廷以為有牽制之實賜銀三百兩絹三百匹仍降敕書奬諭又詔鄜延路走馬承受尹澤髙陽關路承受劉諶並罷令吏部别選差人替布録初七初八當考澤乞展平戎寨上云極常才并諶罷之是日西賊圍平夏城凡十三日乃退此據章楶元符二年二月十日保明第十一副將寇士元能出詭計使賊驚疑乞加優賞狀增入其詳具二十五日宣和元年九月二日詔旨涇原亷訪王孝傑奏第十將郭成固守賊退又追擊破之庚辰大理寺言察訪司應州縣事若非當路别無察舉事者聽不遍到已經監司若專置總領官司而行遣未當或失於察舉者聽察舉事小者牒本司改正大者以聞涉情弊者申尚書省委鄰路官推治鄰路係本察訪路分者聽直牒內係命官仍具奏聞從之是日三省院同進呈張詢奏已指揮王贍等更不結約西蕃首領攻轄正各令安靜守疆界衆曰如此即前日舉措非矣曽布又言自邉事以來臣即言方與西羌為仇契丹青唐不可令有生事一方小驚即力無以支兼邉事當速為收斂之計北敵自元昊犯塞便親幸燕京移兵近邉以相恐動今雖未敢便爾若見西夏有窮蹙滅亡之形其勢必動臣故欲修葺熙河涇原籬落歲月間便圖休息即彼無釁可動何可更自生事若但青唐有警則邉事已狼狽矣張詢此舉可罪上深然之令留俟八月二十七日已差孫路知熙州明年三月二十二日責辛巳三省言吏工部狀將作監言簿二員乞將先到任一員就改充勾當公事官候成資替罷從之仍今後令本監舉京朝官一員充户部侍郎虞䇿等言諸路役法衙規已推行成緒若更逐一申請降旨施行顯見紊煩欲並依元豐舊法提舉司申役人名額及雇食紙筆等錢并衙前優重合增損及改更事件户部相度指揮訖每季奏知如事體稍大即具奏裁從之新無詔今後諸路走馬承受使臣闕將吏部選到人勾赴樞密院再行銓量每路選使臣二人令入內內侍省引見取旨定差一名并初八初五紹聖四年十一月二十二日壬申密院云云可考壬午朝奉大夫王祖道為户部員外郎仍令閣門引見上殿祖道福州人大觀二年十月有考諸王府翊善朱紱為都官員外郎樞密院言西賊點集大兵在涇原近邉盤泊日久未見出沒慮却於别路作過詔陜西河東路經略司精加探候過作提備鄰路除依條䇿應牽制外如賊馬於秦鳯路作過即仰熙河涇原相度賊形選差兵將擇利乘便或攻其左右或擊其後軍探伺老小輜重用精兵掩擊務令西賊有反顧之憂不能深入久留肆為邉患毋得畏避觀望及輕易舉動如賊馬入别路其鄰路並依此其或稽遲定行典憲布録辛巳同呈邉報涇原自三月報九月二十五日落蕃軍人逃歸言自軍前來羌人點兵百五十萬在天都北去蕩羌寨止五十里至二十九日奏尚未動殊不知其所謂或云國中亂各誅殺首領或疑其見形於涇原而出他路不備之處或疑其困敝不能舉動然皆未得其情實也上亦深疑之數以此詢問遂降旨令諸路嚴備及擊其左右或攻其後軍丙戌同呈涇原報羌兵犯塞自九月探報云點集大兵已而落蕃兵士亡歸云二十五日聚兵百五十萬距蕩羌五十里屯聚凡旬日乃動圍閉蕩羌通峽平夏靈平髙平九羊六城寨約三十萬渭帥章楶以書來云賊不來則已來必墮吾計中因具呈於上云帥臣敢自任以此賊必不能為也二十五日己亥賞功詔自今吏部己申選到走馬承受使臣後續有員闕其前關退下之人亦聽再選并初七初五日詳定一司勑令所言鰥寡孤獨貧之不得自存者知州通判縣令佐驗實官為居養之疾病者仍給醫藥監司所至檢察閲視應居養者以户絶屋居無户絶以官屋居之及以户絶財産給其費不限月分依乞丐法給米豆闕若不足者以常平息錢充已居養而能自存者罷從之癸未詔會聖宫臣僚塑像並除毁諸王府侍講傅楫為諸王府翊善記室參軍何執中為諸王府侍講廣陵郡王院教授徐績為諸王府記室參軍祕閣校理知刑州韓治提點京西路刑獄乙酉陜西轉運司勾當公事孫虞丁言凖勑駕幸睿成宫先朝宫官逐家各賜銀絹共三百匹兩伏念先臣思恭比諸臣歷年最久臣願回納所賜銀絹乞依王陶等近例於南京管下賜撥空間寺院一所移充先臣看墳寺依例二年撥於童行一名詔不許回納支賜特令依例就近指定寺院一所每三年撥放童行一名樞密院奏纍據探報西賊在涇原近邉盤泊日久未見出沒若地未凍以前已見兵馬退散次第即涇原路可以乘此間隙於額色勒克進築堡子詔令章楶孫路詳此速行相度如委是兵馬已退地土未凍及相度事力可以舉動即依此各行進築如合要鄰路兵馬添助出入即涇原於環慶路勾抽兵一萬人馬內三千騎應副餘依前後已得指揮仍先具相度可與不可舉動事狀聞奏章楶奏議有此今掇取附見布録云詔章楶孫路於地未凍前後築城寨丙戌熙河奏星多楚清歸漢携家四十餘口所携冠服器玩鞍韉與羌不同云為西界御史中丞官在宰相樞密之下父哩丁死姪貝中代為統軍楚清官雖髙不得統人馬故來歸所携生金二百兩餘物稱是有繡龍帳之類布録丙戌詔熙河差兵官使臣押星多楚清赴闕布録癸巳今并中丁亥户部侍郎虞䇿言先朝立市易法本意甚美其本務官吏敢有違戾者乞從户部奏劾及御史臺覺察彈奏從之御史中丞安惇言淮南兩浙察訪司按察吕溫卿託江都知縣吕振買部民宅基等事臣曽論奏選官鞫治至今未蒙指揮詔朝請郎曽鎮往揚州置司推勘宣教郎張巨為正字熙河蘭會路經略司言歸附大首領乞優加職任詔吕永信為甘州團練使涼州一帶蕃部都巡檢鈐轄仍候引見日賜牌印對衣金帶鞍轡馬妻琳沁格封會寧郡君仍候引見日賜冠帔男楚清為西頭供奉官仍賜名良嗣蘇沁定瑪為供備庫副使卓羅右廂一帶蕃部巡檢此事實録所記殊不詳青唐隴右録亦無之據曽布日録吕永信乃星多楚清也布曰熙河奏星多楚清官雖髙不得統人馬故來歸所携生金二百兩餘物稱是有繡龍帳之類乞優補名目得旨除甘州團練使右廂卓羅一帶都巡檢使與實録稍不同當考環慶奏遣种朴䇿應涇原布録丁亥戊子詔秦鳯趣遣兵將䇿應涇原布録戊子奉議郎權知陜州馬城降為通直郎以元祐間嘗言元豐傅致煆錬抑就深刑故有是責鄒浩云云看詳訴理有言元祐臣僚上言乞展訴理所日限所貴銜寃之人皆得洗雪可以推廣聖恩感召和氣按所言於先朝不順詔王覿特責授鼎州團練副使澧州安置户部言應獲到私末茶并伴和如不獲元犯人請並依私臘茶獲犯人法估價給償內伴和茶合毁棄者每斤如有獲到拋棄隨行之物凖折充賞剩數即納官無或不足即候獲犯人日追理還官從之工部言金水若河道蓋暗處擅開掘或安置重物者各杖八十即偷引河水私用者許人告及地分軍巡人看管人逋獲每名支賞錢三貫並以犯事人家財充從之庚寅詔開封府奏裁公事有例依舊貼例辛卯詔端王信莘王俁充南郊大禮亞獻終獻官姚麟乞建墳寺詔賜額曰顯忠以其祖嘗開邉特許之餘人不得援例新鄜延路經略司勾當公事蔡碩令吏部改差充陳州駐泊郡監從碩兄確妻孫氏之請也九月甲戌曽布云云可考初欲求在京差遣上問曽布碩如何布曰此人罪狀不虛方蔡確盛時實作過昨以無敘法特與右職此請不足從然碩言章惇掩確定䇿功抑之又云確定䇿時首令碩諭惇非惇首議上曰此是否布曰此事非衆人所知也布録九月甲戌日有此所云章惇掩確定䇿功此必有意當考既改差衆皆言碩在元豐中作過奉養甚厚章惇曰於法不當敘官故特與右職布曰其他不足問至今家富於財何從得此其作過可知也降授榮州刺史鄧州總管孟在提舉崇福宫於京西路州軍任便居住從其請也吕惠卿奏遣男濰齎九寨圖乞上殿代臣面陳利害詔令朝見投進布録辛卯詔通行京東河北鹽入解鹽地分指揮方下小民未知請引其大理寺見根勘犯鹽公事並特放自今並須依近降指揮經官出引販賣內殿崇班向宗夔為閣門祗候壬辰三省考試所試宗室藝業合格者八人詔各遷秩內士暕仍賜進士出身吏部言以職任應舉官而被旨召赴闕者候還任方許奏舉從之涇原奏賊攻平夏甚急熙河奏已遣王愍往右廂牽制布録二十五日涇原賜銀絹二十八日愍落軍職癸巳詔三省守闕守當官出職依樞密院守闕貼房出職法施行詔環慶路添差凖備大小使臣十人從胡宗回奏請也布録太僕卿趙令鑠言太僕寺兊便收租錢出榜稽滯已送大理寺根究及蒙劾問知事連奴僕由臣淺暗察訪不至致干吏議尚攝寺卿實不遑處乞除外任别俟投竄詔令鑠知光州令鑠與趙㞦對移已見八月九日此不當稱太僕卿當云鴻臚卿實録誤也趙令鑠墓碑子漪作云令鑠知潁州召還再領太僕辭曰僕馬之政朝廷武備收息在乎得人臣承乏纍嵗僅逃曠黜難以再當驅䇿所降閣門告勑未敢祗受不報到闕遂就職自來諸路監收租緡嵗儲於外朝旨許人便兊以輸太府寺司契劾先出榜召客人洺州有錢二百餘萬未榜間客宋某願入納在京出洺州謂令鑠受狀書圓付案而寺丞疑主者未嘗有榜客從何知之申乞究治令鑠判送大理寺值連謁喪假在寺官未即遣主吏飛語逹樞府下大理推見火情奏上而密院再取旨以為未盡乞重審鞫遂逮幼稚僕厮輩求庇甚密乃徙令鑠鴻臚尋知光州未行而獄具押狀方在案别無他偽冒奪兩官降朝請大夫知廣濟軍初獄詞辨問目至令鑠曰天子不以小官之不肖俾踐敡寺省位列卿矣得罪有司其可以吏身對吏乎凖問悉承之人以為非􅉝元符二年冬十一月二日令鑠廣濟軍仍降三官小吏等次第編配太學録鄧珫言乞選官刋正五經論語孟子音義詔三經新義與舊音不同者令本經講官編纂音義樞密院言府界京東京西河北東南路非將副駐劄并差出屯泊處軍馬最少處從本將申帥司選委兵官一員兼管訓練官闕或假故即牒本處兵官兼權無兵官牒兼兵官權將副闕或假故出巡並凖此仍申尚司開封府申提舉將兵所從之甲午責授昭州别駕化州安置范祖禹卒乙未詔武官試換文質吏部依元豐試法重修以聞從吏部侍郎黃裳請也元祐二年十一月二十七日元符三年四月二十六日詔秦鳯環慶所差䇿應涇原人馬太少令具析奏聞仍多方救援以牽制賊勢布録乙未熙河奏王贍言得蕃書云星多貝中有歸漢意令經略司多方招誘撫納布録丁酉詔河北京東路州縣有漕黃河漲水淹溺人户田廬多致失所遣工部員外郎梁鑄體量應合賑恤并體訪見今河勢利害以聞九月七日安惇建請差官三省言看詳訴理所奏公案內陳述於先朝不順者具職位姓名聞奏本所除已節次貼説外今來照得有進狀內語言止係稱美元祐置訴理事未審合與不合聞奏詔語言過當者貼説又奏夔州路提舉閻令被制推勘王光祖擅便不行追攝取勘特追兩官勒停元祐除落顯屬不當詔朝奉大夫權陜西路轉運使閻令降為朝請郎其元祐指揮勿行鄒浩云云權殿中侍御史鄧棐言新除京東路轉運判官秦定頃緣姪觀與蘇軾蘇轍厚善遂權監司乞罷新命詔定知濠州己亥詔朝散郎汪衍瀛州防禦推官余爽並除名勒停永不收敘衍送昭州爽送封州編管仍備坐本人所上書行出先是蔡京薦爽上殿章惇惡之其言爽及衍元豐末各上書詆訕先朝爽又元祐中曽上書乞宣仁歸政險詐反覆故有是命布録壬辰章惇留身甚久布再對上問余爽何人布曰臣與之瓜葛然其人無行檢衆所共知亦聞蔡卞舉上殿其人亦精爽但姦險無取恐不可進擢蓋惇攻之也卞又布録癸巳三省以章惇家所收余爽元祐中上書詆訾先朝並永康軍通判汪衍亦然並勒停永不收敘上諭余爽已勒停章惇欲編管且已又蔡卞云曽上執政詩卿必有之可進取來余云詩中極稱熙寧元豐紹聖政事以謂異人間出所行政事皆詩書之所未聞近古之所未有廟堂故老皆閎夭伊周畢召之徒與元祐中所上書殊相反也上亦哂之又乙未呈爽詩上益哂之又令布於章惇處借爽書看十一月乙巳又有余爽事樞密院言涇原路經略司章楶奏西賊犯塞從靈平寨分布人馬數十里間約三十萬専意攻平夏城凡十三日逐處將寨官曉夕捍禦遂保無虞詔章楶特除龍圖閣學士左中散大夫賜茶藥及銀絹一千匹兩又詔平夏城將官皇城使康州團練使郭成為東上閣門使雄州防禦使升充權本路鈐轄其餘知城以下大小使臣及漢蕃將校士卒等並仰經略司疾速審按守城次第據功狀髙下分作等第保明以聞章楶奏傳云十月夏主與其母自將兵數十萬圍平夏城晝夜疾攻自己卯至壬辰凡十四日城守盆堅冦力造髙車號曰對壘俯其上以臨城載數百人填壕而進俄有大風震折之冦大潰一夕皆遁戎母慙哭裂面而還捷奏至帝嘉歎拜楶龍圖閣學士左中散大夫遣中使勞以璽書加賜銀絹各千對衣金帶銀鞍名馬曽布日録丙戌同呈涇原報羌兵犯塞自九月探報云點集大兵已而落蕃兵士亡歸云二十五日聚兵百五十萬距蕩羌五十里屯聚凡旬日乃動圍閉蕩羌通峽平夏靈平髙平九羊六城寨約三四十萬壬辰涇原奏賊攻平夏甚急丙申得章楶咨目報賊攻平夏未巳然將佐皆極一路之選可亡慮又以書抵章惇亦云必保無虞恐上憂勞以此奏知丁酉進呈楶書及咨目己亥涇原奏西賊自十七日酉時退至十八日皆遁去攻平夏十四日填平逺壕又於裏壕壘道路數處直薄城穿數穴皆可容數人又為雲梯洞子百種為攻具然城中捍禦有方終不能破羌人中矢石者數千傷者倍之冀官兵出戰而總管王恩等按兵不動野中芻糧孳畜收拾無遺賊一無所得日久糧盡遂遁歸城寨官兵一無所損他寨雖不被攻然圍繞殆遍將佐皆開門延敵時出挑戰夜以輕兵劫寨賊頗驚擾皆可嘉也章楶遷左中散大夫平夏將兵郭成遷東上閣門使遙防鈐轄知城以下令速第功狀聞奏楶賜銀絹各一千乃降奬詔郭成各三百餘二百一百五十一百及五十凡四等又銀合茶藥有差士卒自二十匹至十匹凡三等老小婦女涇城上役使者五匹河東經略司言統制官張世永等統領將兵入西界牽制到白土川遇賊戰鬭斬獲五百餘級涇原路經略司言賊兵已退其戰守漢蕃士卒及並邉人户為賊燒蕩屋舍殺虜人口焚掠糧食之家望加賞勞詔各賜錢絹有差其環慶秦鳯䇿應軍兵等及捍賊有勞之人亦如之嘗被燒蕩屋舍殺掠人口燒廢斛斗蹂踐田苖者仍給口食郭成賜銀絹三百匹兩知城以下等第支賜十八日兩路奏云云舊録云河東經略司言云云上英武赫然收復境土羌人震恐不敢爭至是大入失利而去西夏於是衰弱橫山之地列置城寨矣新録辨曰既云羌人震恐不敢爭繼言至是大入是敢也今刪去立巡教使臣罰格先是承旨司傳宣科校捧日將校以旬閲事藝不及一分巡教使臣衝替仍令密院增將校教頭刑名曽布既上罰格因言先朝巡閲諸軍但推恩而已事藝不應法即管軍行遣昨因宋球申請方立法今若更增刑名恐動衆不便上矍然從之布曰祖宗以來御將士常使恩歸人主威令在管軍今則反此乃管軍失職凡申嚴軍政豈待朝廷立法而後施行臣亦當更以此意戒之上深以為然布又言臣有所聞不敢不盡前日捧日被決責者多聞舉營皆哭及聞長日祗候以喝箭滿被決莫不震恐馬射稍不如法便拽下上曰不滿却喝滿布曰固知有罪然乞便寬假上亦以為然樞密院奏西賊已經點集將來必有舉動合豫行經畫進築事件詔將來進築城寨合用糧草樓櫓材植及應干板築之具并防守器械什物等並仰章楶豫行經畫計置百色足備才候春暖有機會可乘即依近降朝旨計會熙河路各勾抽環慶秦鳯兩路兵馬及時進築施行不致臨時稍有闕誤仍先具已經畫計置次第事狀聞奏章楶奏議載此今掇取附入庚子詔陜西河東勿以西賊遁去便弛邉備須過為捍禦緩急闕誤重行典憲此據布録涇原奏西賊再以輕騎犯乾興天聖寨地分尋奏已退回布録庚子中書省言元祐元年正月起居舍人邢恕上書言熙寧初王安石吕惠卿用事臣時得召對先帝詢及二人臣具道安石之短惠卿之姦卒見排嫉又言太皇太后躬親聽斷並用忠良全去弊蠧臣於此時首蒙擢為右司員外郎職為宰相屬官與聞政事臣自以為千載之一時又言韓維端諒名德乃與司馬光吕公著一等詔邢恕特降授承議郎知南安軍恕始罷中丞以本官知汝州四月十四日居五月改知應天府九月四日章惇恐恕復用乃檢出恕元祐初所上書白上曰邢恕除蔡確一事外無事不同元祐特責之恕所上書具載元豐八年十二月二十七日詔涇原路平夏城置道觀一所以靈祐為名賜田三頃嵗度童行一名集賢殿修撰權知秦州陸師閔言先朝茶法今已復舊乞許解罷曽布言師閔計嵗月來年當除職臣嘗謂邉帥不須屢易不若除一待制使之安職上曰先朝任之已久若先帝在御作待制久矣遂除寶文閣待制專切措置鐡冶鑄錢監事吕潛言應緣鐡冶事乞並行倉法從之辛丑太常寺言大樂令葉防言祭天地無徹豆之樂乞添選樂章詔學士院修撰詔陜西河東路經略司凖備差使使臣並三年為任新削壬寅三省言太學補試所考到建州右司理參軍龎璿婺州東陽縣尉謝大方試學官中程詔並為州學教授新削三省言臣僚奏糾察在京刑獄凡見勘案情并經奏斷案皆許取索昨開封府避見御史臺點檢斷案情乃引刑察上案勑條凡見勘案情并經奏斷案非緣詞訟不得取索奏請施行在京刑獄𨽻刑察下案甚衆其勑令自為一司今獨開封府不用此令詔御史臺刑察上下案取索文字並依舊條涇原奏已就留王恩等兵馬修築平夏城壁等布録壬寅熙河蘭會路經略司言副都總管王愍統領將兵徑趨卓羅右廂以東攻討以牽涇原賊勢到罷沙會遇賊不知數前來迎敵愍躬率將士奮擊大破賊衆斬首千三百餘級內一級係偽旺羅駙馬頭俘三百餘人牛馬羊駝二萬五千餘數百里族帳蓄積燒毁殆盡詔應出界軍兵賜錢有差其得功將士等仰經略司審察功狀保明以聞既而經略司言愍討賊止及羅薩爾不能深入破蕩巢穴詔愍特落龍神衛四廂都指揮使依舊吉州刺史充熙河蘭會副總管尋又降充都鈐轄落正任十八日熙河奏遣愍二十九日落軍職今并此落正任降鈐轄曽布日録愍落正任在十一月二日今亦附此詔諸路走馬承受使臣應合遵守條貫及被受機密朝旨非專下本官者仰取索編類各抄録成册於本司密收照用內機密册委使臣置匱躬親封鎖其行遣案檢亦置庫架閣其編類到條貫及機密朝旨各抄録一本具委無漏落狀申納樞密院仍今後應被受條貫及朝旨並行遣案檢亦依此接續抄上架閣除朝廷專下本官及已見奏報文字外並不許帶行癸卯三省言檢會元祐間密州管內觀察使駙馬都尉張敦禮奏近者陛下斷自聖心退宰臣蔡確進司馬光為上相以臣言之事有五得等事伏望特賜省察制曰事上之節在知分守之所宜馭臣之方不以近貴而撓法敢姦公義其正明刑武勝軍節度觀察留後檢校司空持節鄧州諸軍事鄧州刺史駙馬都尉張敦禮選自先朝幸備戚里荐蒙休寵躐進美官頃在垂簾之初當深送往之慕而乃忘德犯分醜正朋邪密上封章顯詆前列引譽罪首謂當褒崇欲其黨儔盡見收用獻謀若此措意謂何深惟厥愆宜置之理尚念連姻之近特寬逺服之投貶秩居家益自循省可特降授左千牛衛大將軍駙馬都尉特免安置仍勒住朝參祐聖邸報載敦禮書極詳今但從實録布録十一月乙巳朔云王獻可瀘州再任與轉官上諭獻可元祐中亦有章疏先是章惇進呈余爽書乃出於其家人頗疑之上遂搜閲於禁中得真本禁中得其乞還政書然宣仁六月已服藥爽七月十三日乞復辟九月三日升遐矣故不能救前貶上因檢尋余爽文字遂見王師約張敦禮所上書已而兩人皆貶上又言周鼎李許輩亦皆有書又言許附陳衍可罷閣職及進呈乃云事狀不明且已而周鼎輩文字亦不出可以知聖意之仁厚也然自爽事後迄今紛紛未已而序辰及中司又數以訴理事文致緣飾乞施行然上意終緩故被禍害亦鮮但羣小凶熖未肯收斂爾余爽責在於二十五日鄜延路都鈐轄王湛為澶州總管紹聖四年十二月十七日自涇原改澶州當考曽布録癸卯再對罷王湛鄜延都鈐轄除冀州總管詔賜建州武夷山沖祐觀良田十頃詔朝請郎祕閣校理權知潞州歐陽棐落職送吏部與合入差遣以元祐權臣迷國之際棐朋附大姦每希進用故有是責畢仲遊作歐陽棐傳云會章公子厚入相叔弼甫數請外乃以朝散郎祕閣校理知襄州有魏泰者曽公子宣衛國夫人之兄也居襄二十年倚子宣之重以傳食於漢南雖為布衣州郡以倅二之禮接之猶慊不懌多規占公私田園強市買與民爭利前後無復誰何者於是以州門之東偏樓店官廢址為天荒而請之上下彌縫為成書然後示叔弼甫曰孰謂州門之東偏而有天荒可請乎郤之州官上下更謂叔弼甫曰泰橫於漢南日久未易裁也彼請地而遲與之且不可况終郤之乎叔弼甫曰天荒在野泰請之地州門之左以門左之地為天荒售人非政也憚泰而誣天荒之令非法也泰聞之怒訴於轉運司下其訴於州叔弼甫終持不與泰由是譛叔弼甫於子宣矣襄罷以朝請郎知潞州路又罷乃以校理還吏選繼降官二等元符二年七月癸未棐以朝請為吏部郎秦鳯路走馬承受鄭揖言乞自今本路兵馬出界别路萬人以上走馬承受一員隨軍照管本路人馬從之環慶路凖此河東轉運司言體量到本路州軍為經略司科定買馬匹數多於人户名下配買至昭德軍出給公據令人户往陜西買馬并抑勒市户結攬軍馬中官狀詔河東路知州通判職官降官展年限罰銅有差凡降官並展兩期敘實録載責降人姓名極詳今從新録殿前司言虎翼右第一軍都指揮使榮州刺史崔吉病假滿百日不願致仕合補支郡本城馬步軍都指揮使詔為係神宗皇帝隨龍特依例與御前忠佐馬步軍副都頭仍依舊遙郡刺史御史臺言按元豐法諸赴宴慶賀宣制拜表奉慰行香集議若臨時有急速公事或上殿守宿趂赴不及并本處有條免赴者並報御史臺元祐法應免者不報乞依元豐法從之又言詳定一司敕令所奏按元符元年九月敕府界諸路場務抵當折納田宅更不出賣並召人賃佃竊詳承買場務所供抵當自熙寧元豐以來立法各是出賣以補填不足之數然猶有出賣不及元祐數者以至檢估官吏備償之法其檢估官吏尚或繆增估置今若不行出賣盡令佃賃委有未便伏乞改正從之新無甲辰詔曺國長公主將來大禮合得骨肉恩澤特許回授與本宅入位使臣何伯通張協各轉一官右正言鄒浩奏伏見紹聖以來言官緣論事不當責降差遣者久未牽復竊恐中人以下因此以言為戒今來大禮澤及萬方無物不荷至恩所有紹聖以來責降言官亦望聖慈詳酌情理牽復施行不惟可見公朝未嘗以言廢人抑足以作天下敢言之氣此浩奏藁稱是元符元年十月分所進今附月末十一月二十日赦文可考浩又言伏聞臣寮上言乞於詩書周禮三經義中出題試舉人蒙指揮下合屬去處勘當以為可行臣竊謂三經之指久為注疏所汨自王安石父子奉詔訓釋以示天下而學者知適所從蓋二十餘年矣其有功於名教豈小哉然而謂之義則止是訓三經而已非所謂經也夫以經造士而以非所謂經者雜試之甚失先帝專用經術之意其不可一也不拘注疏一槩出題乃試詩賦時事引以為比又非先帝所以改科之意其不可二也若謂試題有限當以此救其弊則詩書周禮固各有義矣不知易與禮記何以待之五經同試而事體不均其不可三也學者既見三經義文字繁多必擇用力少者而習焉嵗月之間將盡改易與禮記而詩書周禮有時而為棄物矣其不可四也抑恐自此以後又有建言謂易與禮記可廢而専以有義三經取士者勢亦無以奪之其不可五也國體所係尤當審察伏望聖慈特降指揮只令依舊遵奉先朝條制出題施行浩奏不得其時因是月十九日命官編纂三經音義附見月末其後出題訖依舊法當是從浩言也
