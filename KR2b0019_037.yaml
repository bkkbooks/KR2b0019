body:
  text: 續資治通鑑長編卷三十三宋李燾撰太宗淳化三年春正月丙寅朔朝元殿受朝畢改服通天冠絳紗袍復升坐受羣臣上夀酒三行用雅樂宫懸登歌罷大明殿上夀之禮諸道貢舉人萬七千三百皆集闕下辛丑命翰林學士承㫖蘇易簡等同知貢舉既受詔徑赴貢院以避請求後遂為常制乙巳令常參官各舉京官一人充升朝官丙午令宰相以下至御史中丞各舉朝官一人為轉運使又詔所舉京官除三司三館職事官已升擢者不在薦論其有懷才外任未為朝廷所知者方得奏舉此詔别本在二月壬申今移見舉官下戊午詔諸道轉運使自今釐革庶務平反獄訟漕運金榖成績居最及有建置之事果利于民者所在州府軍監每嵗終件析以聞非殊異者不得條奏二月杭州掌庾吏葉彥安等百二十三人缺錢俶日官倉米八十四萬八千四石鹽五萬四百四十六石甲申詔並除之鹽鐵使魏羽等言諸州茶鹽主吏多負官課請行决罰上曰當案問其實若水旱災沴致官課虧失者非可加刑也帝王者為天下主財爾卿等司計當以公正為心無事割削勿令害民而傷和氣焉三月戊戌上御崇政殿覆試合格進士先是胡旦蘇易簡王世則梁皓陳堯叟皆以所試先進擢上第由是士爭習浮華尚敏速或一刻數詩或一日十賦將作監丞莆田陳靖上疏請糊名考校以革其弊上嘉納之于是召兩省三館文學之士始令糊名考校第其優劣以分等級內出巵言日出賦題試者駭異不能措詞相率扣殿檻上請㑹稽錢易時年十七日未中所試三題皆就言者指其輕俊特黜之得汝陽孫何以下凡三百二人並賜及第五十一人同出身上諭之曰爾等各負志業中我廷選效官之外更勵精文翰勿墜前功也何等旅拜稱謝辛丑又覆試諸科擢七百八十四人並賜及第百八十人出身就宴錫御製詩三首針一首進士孫何而下四人皆授將作監丞大理評事通判諸州餘及諸科授職事州縣官入謝于長春殿上謂宰相曰天下至廣藉羣材共治之今嵗登第者又千餘人皆朕所選擇此等但能自檢清美得替而歸則馴致亨衢未易測也時詔刻禮記儒行篇賜近臣及京官受任於外者并以賜何令為座右之戒初內殿䇿士例賜御詩以寵之至陳堯叟始易以針用敦勉勵暨孫何則詩針並賜時論榮之史館修撰梁周翰直昭文館安德裕並為考官詔有司詳定稱法别為新式頒行之先是守藏吏受天下嵗輸金帛而太府寺權衡舊式輕重失凖吏因為姦上計者坐逋負破産者甚衆又守藏吏更代校計爭訟動涉數載及是監內藏庫劉承圭等推究本末改造法制中外咸以為便承圭宦者山陽人也鹽鐵判官左司監韓國華等言偹位諫官兼職計司獨不得從宴逰願兼領館職乙巳命國華等直昭文館三司屬官兼直館自國華等始也辛酉令有司以二月開氷獻羔祭韭先是近代相承用四月蓋誤以豳詩四之日為今四月也祕書監李至請改之上曰四月韭長可以苫屋矣何得謂之薦新歟乃從至請五月甲午朔御文德殿百官入閣舊制入閣惟殿中省細仗隨兩省供奉官先入陳於庭上以為儀衛太簡命有司更設黃麾仗其殿中省細仗仍舊從新制也令諸州所上案牘勿得通封轉運使案部所至州縣先録問刑禁上復命醫官集太平聖惠方一百卷己亥以印本頒天下每州擇明醫術者一人補博士令掌之聽吏民𫝊寫壬寅詔御史臺鞫徒以上罪獄具令尚書丞郎兩省給舍以上一人親往慮問己酉上以久愆時雨憂形于色謂宰臣曰亢陽滋甚朕懇禱精至並祀羣望而未獲嘉應者豈非四方刑獄有寃濫郡縣吏不稱職朝廷政治有所闕乎因遣常參官十七人分詣諸路按决刑獄是夕雨庚戌宰臣相率稱賀上曰朕孜孜求理視民如傷內省于心無所負矣而久愆時雨蓋隂陽之數非朕所憂者憂在獄吏舞文巧詆計臣聚斂掊克牧守不能宣布詔條卿士莫肯修舉職業爾李昉張齊賢及賈黃中李沆慙懼拜伏退上表待罪上曰朕之中心茍有所懷即欲與卿等言之既言之即無事矣然中書庶務卿等尤宜盡心也昉等復上表稱謝焉實録别本昉𫝊有昉等所上表及太宗答詔正𫝊皆無之今亦不載辛亥置理檢院命右正言知制誥錢若水領之復唐制也至道三年罷不得其月附五月末甲寅始命增修祕閣六月甲申有蝗自東北來蔽天經西南而去上謂宰相曰朕素不識此蟲羣飛而過其勢甚盛必恐害及田稼朕憂心如搗亟遣人馳詣所集處視之卿等何䇿可去悉對曰蟲螟因旱乃生頻雨則不能飛為災與否亦繫嵗時聖心焦勞憂念黎庶固當感通天地臣等職在燮調伏增慚懼是夕大雨蝗盡殪寶訓載聖語于二年然二年蝗未嘗過京師也今從實録寶訓稱吕䝉正而三年䝉正已罷相故改其名時京畿大穰物價至賤辛卯分遣使臣于京城四門置場增價以糴令有司虛近倉以貯之命曰常平以常參官領之俟嵗飢即减價糶與貧民遂為永制秋七月壬辰朔置三司都勾院命右諫議大夫張佖判之乙巳太師贈尚書令真定忠獻王趙普卒先是普遣親吏甄潜詣上清太平宫致禱神為降語曰趙普開國忠臣久被病亦寃纍爾寃纍蓋指涪陵悼庶人也潜還普力疾冠帶出中庭受神語涕泗感咽且言涪陵自作不靖故抵罪豈當咎余但願速死血面論於幽冥以直之是夕卒巳酉上聞訃悲悼謂近臣曰普事先帝與朕最為故舊能斷大事向與朕嘗有不足衆人所知朕君臨以來每待以殊禮普亦傾竭自效盡忠國家社稷臣也聞其喪逝悽愴之懷不能自己因出涕左右皆感動遣右諫議大夫范杲攝鴻臚護喪事葬日設鹵簿鼓吹如式二女皆笄普妻和氏言願為尼上再三諭之不能奪皆賜以名號又親撰神道碑書以賜焉按神道碑普以七月十四日卒十四日乙巳也己酉十八日上始聞訃耳八月壬戌朔祕閣成祕書監李至上言願比玉堂之署賜以新額戊辰御飛白書祕閣二字賜之仍詔宰相樞密使與近臣就觀置宴閣下直館閣官皆與又賜詩以美其事詔徴終南山隱士种放辭以疾不至放七嵗能屬文沈默髙潔與其母偕隱豹林谷中以講習為業學者多從之得束修以奉母母亦樂道薄滋味善辟穀㑹陕西轉運使宋維幹言放才行詔使徴之其母恚曰常勸汝勿聚徒講學身既隱矣何用文為果為人知不得安處我將棄汝深入窮山矣放遂稱疾不起其母盡取筆硯焚之與放轉居窮僻人跡罕至上喜其髙節詔京兆府嵗時存問以錢三萬賜之不奪其志談苑載放事與國史不同今從國史戊子詔杭州民二千五百四十九人共缺錢俶日息錢六萬八千八百餘貫並釋之九月壬辰詔以今年十一月冬至有事于南郊鹽鐵副使謝泌嘗升殿奏事上謂之曰大凡居職不可不勤朕每見殿廷兵卒能剩掃一席地剩汲一瓶水必記其名也寶訓稱端拱初泌為鹽鐡判官因奏事上有此語年號與官名皆誤也然不知此語的在何時泌自鹽鐵換度支乃甲午日今附見此日後乙卯馬步軍都頭保州刺史呼延贊出為冀州兵馬總管贊太原人鷙悍輕率自言受國恩誓不與契丹同生文其體為赤心殺契丹字至于妻子僕使同爨皆然鞍韉器用什物亦刺繡朱墨為之後復與諸子别刺文曰出門忘家為國臨陳忘死為主又作降魔杵破陳刀鐵折上巾兩旁有刃皆重數十斤乘騅馬絳抹額北征時上惡其詭異惑衆欲斬之得免至是言於上曰臣服飾詭異所至觀者必衆壅遏願敕州縣遣卒遮迾清道上笑而不許贊至屯或言其無統御才改遼州刺史既又以不能治民復召入為都軍頭領扶州刺史復為都軍頭在五年七月己未今并書之丙辰羣臣奉表加上尊號曰法天崇道明聖仁孝文武上曰但時和嵗豐萬姓阜康朕之願也溢美之號亦何尚焉凡五上表終不許己未上幸祕閣觀書賜從臣及直館閣官飲既罷又命皇城使王繼恩召馬步軍都虞候傅潜殿前都指揮使戴興等宴飲縱觀羣書上意欲使武將知文儒之盛也據職官志㑹要淳化四年始置昭宣使此時未也繼恩但為皇城使爾實録并藝文志皆誤今改之冬十月癸亥祕書監李至言願以上草書千文勒石上謂近臣曰千文蓋梁得鍾繇破碑千餘字周興嗣次韻而成詞理無可取孝經乃百行之本朕當自為書之令勒于碑隂因賜至詔諭戊寅詔諸道知州通判釐務京朝官令録判司簿尉等有治行尤異吏民畏服居官亷恪涖事明敏鬬訟衰息倉廪盈羡冦盜翦滅部內肅清者委本道轉運使以名聞並驛置赴闕親問朕其旌賞之反此者亦具奏當行貶斥上慮中外官吏清濁混淆莫能甄别壬午命户部侍郎王沔度支副使謝泌祕書丞王仲華同知京朝官考課吏部侍郎張宏户部副使髙象先膳部員外郎范正辭同知幕職州縣官考課號曰磨勘院又命左贊善大夫魏廷式與樞密都承㫖趙鎔李著同校三班院殿直以上功過仲華巴蜀人象先虞城人廷式宗城人著東明人也十一月己亥開封尹許王元僖早朝方坐殿廬中覺體中不佳遂不入謁徑歸府車駕遽臨視疾已亟上呼之猶能應少選薨年二十七上哭之慟左右皆不敢仰視追贈太子諡曰恭孝詔以將有事于南郊前十日而許王薨按禮天地社稷之祀並不廢緣親謁太廟恐非便集公卿議之吏部尚書宋琪等上奏請以來年上辛合祭天地從之初王沔罷政歸私第㑹中書小吏舊罪發事連中書因有奏毁沔者上語之曰吕䝉正有大臣體王沔甚明敏毁者慙而退于是上欲甄别官吏能否故命沔同知京朝官考課所奏條目尤細碎不識大體視士君子猶卒伍胥吏設關格以防之物論甚譁而沔自謂直清因結人主求再入庚子沔視事省中暴得風眩疾舁歸第卒上嗟惜之優詔贈工部尚書恭孝太子元僖性仁孝姿貌雄毅沈靜寡言尹京五年政事無失上尤所鍾愛及薨追念不已或悲泣逹旦不寐作思亡子詩以示近臣未幾人有言元僖為嬖妾張氏所惑専恣捶僕妾有至死者而元僖不知為張氏于都城西佛寺招魂葬其父母僣差踰制又言元僖因誤食他物得病及其宫中私事上怒命縊殺張氏捕元僖左右親吏繫獄令皇城使王繼恩驗問悉决杖停免掘燒張氏父母冢墓親屬皆竄逺惡丙辰詔罷冊禮但以一品鹵簿葬焉真宗即位始詔中外稱太子之號張唐英冦凖𫝊云冦凖通判鄆州得召見太宗謂曰知卿有深謀逺慮試與朕决一事令中外不驚動此事已與大臣議之矣凖請示其事太宗曰東宫所為不法他日必有桀紂之行欲廢之則東宫亦自有兵甲恐因而召亂凖曰請某月日令東宫于某處攝行禮其左右侍衛皆令從之陛下搜其宫中果有不法之器俟還而示之隔下左右勿令入而廢之一黃門力爾太宗以為然及東宫出因搜其宫中得淫刑之器有剜目挑筋摘舌等物還而示之東宫伏罪遂廢之選立章聖為太子自是太宗眷注益厚按凖淳化三年已為樞密副使元僖既死太宗愛始衰元僖無恙時固未嘗建東宫不知唐英何所據誣謗特甚今不取淫刑事蓋因楚王元佐已見雍熙二年九月禮儀使蘇易簡上言曰伏以聖朝親祀圜丘以宣祖侑神作主此則符聖人大孝之道成嚴父配天之儀恭惟太祖皇帝光啓丕圖恭臨大寶以聖授聖𫝊于無窮謹案唐永徽中以髙祖太宗同配上帝望將來親祀郊丘奉宣祖太祖同配其常祀孟春祈榖孟冬神州季秋大享以宣祖崇配冬至圜丘夏至皇地祇孟夏雩祀以太祖崇配詔從之本志云易簡正月上言期太迫今移入此年末置勾當馬步軍専勾司官各一人從户部使樊知古請也尋合兩司為一合為一司在五年今并附此分左藏庫為左右藏各二庫右藏受之左藏給之俟右藏既盈即復以給曰錢曰金銀曰匹帛凡六庫更為給受明年仍廢右藏入左藏分為四庫曰錢曰金銀曰絲綿曰生色匹帛雜色匹帛至道元年六月可考吕端云云
