body:
  text: 續資治通鑑長編卷六十七宋李燾撰真宗景德四年冬十月甲午朔太陽當虧雲隂不見詔河北諸州軍增葺城池樓櫓之具令轉運使緣邊安撫都監分往檢校選殿前司龍騎卒材勇者𨽻龍猛先是此軍十三指揮皆募強盜以充時冦賊希少故議併省乙未麟州言趙德明於州西置榷場請行互市上以延州已置不許丙申淮南江浙荆湖發運使度支貟外郎馮亮為侍御史領使如故副使李溥八月己酉先遷戊戌以右贊善大夫監許州商稅王嶼知衛州嶼自言前知棣州值契丹入冦頗申扞禦之效昨以偶未獲賊為轉運使所奏替還釐務上録其前課故復令治郡己亥詔諸軍都虞候已上至廂都指揮使不得與本部軍員結親其指揮使不得與本指揮軍使都頭結親軍使都頭非本指揮即聽違者論如法庚子詔京城倉場受納芻糧勿得留滯令三司開封府察之癸卯于德潤至自象州詔奬曹利用等優賜將士令速具立功人姓名以聞上曰嶺外行師不可持久既已平蕩當速議分屯又曰利用所領荆南澧朗等州歸逺兵聞頗用命此皆強梁負過之人俟行賞補置訖其不該賞者宜遣使擇其壯勇部送京師遷𨽻上軍甲辰右諫議大夫种放自終南山來朝召之也上謂輔臣曰放比髙尚其事每詢訪多有可采朝廷雖加爵秩而未能大用即物議未厭因令陳堯叟諭意且曰朕慮放卷而懷之能副朝旨誠為美也既而堯叟言放云自被聘召及遷諫署無所補報其幸已甚今主上聖明朝無闕政若更處之顯位則重其過矣堯叟復手筆訊之放答疏如前上曰遣內侍齎詔賜放略曰卿宜體兹眷遇罄乃誠明敘經國之大猷述致君之逺略盡形奏牘以沃朕心副涼德之倚毗塞外朝之觀聽乃司樞務式洽至公放上表固讓上曰放能守分益可嘉也乙巳詔奬知象州何邴等自乾德開寶以來用兵及水旱賑給慶賜賞賚有司計度之所闕者必籍其數以貸於內藏俟課賦有餘即償之淳化後二十年間嵗貸百萬有至三百萬者纍嵗不能償則除其籍於是上命陳彭年撰內藏庫記述其事出以示王旦等曰此庫乃為計司備經費耳計司有闕必取於民茍非節用何以獲濟因言漢武外事四夷北伐登單于臺西田車師勞內地以勤逺方此所以財用不足也陳堯叟曰漢武末年户口減半乃封丞相為富民侯是亦悔於用兵也上然之翰林學士朝逈等上考試進士新格詔頒行之初陳彭年舉進士輕俊喜謗主司宋白知貢舉惡其為人黜落之彭年憾焉於是更定條制多因白舊事而設關防所取士不復揀擇文行止較一日之藝雖杜絶請託然置甲等者或非人望自彭年始也詔自今祠祭犧牲令有司擇純白飬豢在滌無得捶朴並如故事其中小祠加用一羊常嚴飾壇壝玉帛豆籩之數未及古禮者議增之置監祭使二貟以監察御史充月給錢十千免其出使詔翰林學士朝逈等各舉常參官堪知大將者二人上親閲班簿擇朝臣有公望者得逈等五十人令保任焉丙子江南轉運副使太常博士直史館何亮遷左司諫為廣南西路轉運使代舒賁也賁坐不察宜州劉永規虐政御史臺差官就劾罷其任欵聞詔贖金釐務以懲之丁未以工部郎中直史館馬亮為右諫議大夫知廣州亮自升州代還表言柏檟在肥上求典廬夀州以便營奉及請對但曰如國家必有驅䇿豈敢以私自便屬初平宜賊上問以桂廣之政亮曰髙謹微髙紳皆循謹非嶺守之才宜審擇其人如張詠劉綜可也上曰詠有疾不可逺適綜在并門寄任已重初欲命楊覃知廣州上察亮願行乃謂宰相曰亮之幹敏不下覃也故授之亮由兵部員外郎改官才數日擢升諫垣以重其命寶訓髙紳作王紳初曹利用言方宜賊之擾楊覃知潭州庶事皆有備上與大臣語嘉其任職王旦曰覃素以吏幹稱江浙人中罕見其比上曰是嘗與朱台符同任陜西者否旦曰然當時所爭雖多曲直然覃頗有愛民之心也詔以曹利用為引進使張煦為如京使張從古為莊宅副使張繼能為供備庫使自餘進秩有差繼能以前鋒首破賊人故被賞最優歸逺軍士手殺陳進者李昊劉宗趙敏並補本軍都頭又以知象州大理評事何邴為祠部員外郎賜緋邴三子並賜出身親屬同扞冦者悉甄敘之升象州為防禦初議行賞輔臣以象州城守四十日其官吏將校各超三資懷逺軍天河寨賊攻之不纍日而退各超兩資上曰賊之初起其鋒正鋭懷逺天河首被攻擊固禦尤難可與象州同超三資王旦等請俟曹利用等赴召取進止上曰賞不踰時且軍中等級皆已有命不可緩也故次第行焉潯州言賊黨周道誠挈其屬自首詔曹利用量罪處置其家屬釋之樞密院上新置殿前侍衛司將校具員詔自今轉補收落令主事即時録其年月有舛誤白知院改正敢漏落移易者劾罪以聞庚戌詔史崇貴于德潤駐桂州督巡檢使臣招亡命賊黨曹利用等遍巡象栁宜融州懷逺軍天河寨訖赴闕仍令利用就差隨行立功使臣為懷逺軍知軍天河寨主象州巡檢以冦孽甫平藉其安輯也詔奬廣南東路荆湖南路轉運使廣桂雍容潭融全諸州長吏及周文質等以供軍設備故也辛亥羣牧司言諸監以草地充屯田遣卒種藝所入不充其費今馬數益多而牧人少請廢屯田仍為草地委所屬州縣標其疆畛免公私侵占從之甲寅德音赦宜栁象州懷逺軍死罪以下囚廣南東西路雜犯死罪以下遞降一等脅從受署者勿理蠲宜栁象州懷逺軍丁錢及夏秋租桂昭州秋租免桂昭秋租實録在明年今從本紀先是中書進擬曲赦條目有云潰散賊徒聽其首露釋罪軍卒仍付所管上曰比令曹利用相度裁處此與前敕不相應會馬知節曰軍卒嬰城叛命若許釋罪恐似太輕上曰既已潰散須有所歸儻禽之不盡豈無後患陳堯叟請元謀同惡者不赦知節又曰軍中合勢迫害長吏聚黨避罪恣擾鄉閭今獲赦宥恐為惡者不悛上曰頃年西川謀害韓景祐者所部皆禁旅亦止誅首惡其徒自首者移𨽻諸軍今澄海州兵耳茍元情重徙置逺郡可也知節執議如前王旦請改云潰散賊徒限一月首露釋罪所在收録奏裁上可之乙卯曹利用等言軍賊黎育與其黨及族屬老幼僅千人奔逃至貴州知州宋希閔不測其來挈牌印與僚吏出城竄避俄而賊入城焚居人廬舍經宿始去希閔乃還詔利用等追捕無令遺逸害及逺民黃梅縣尉潘義方坐獲劫盜云嘗以贓物寄賣酒朱凝家即逮凝至遣獄卒以牛革巾濕而蒙其首燥則愈急凝不勝楚痛即自誣受贓法寺當贖金九斤詔特勒停仍申警中外應有非法訊囚之具一切毁棄提點刑獄司察之東都事略詔曰拷掠之法素著科條非理擅行兹謂慘酷諸道官司應有非法訊囚之具一切毁棄前譙縣尉陳齊嘗獻封論榷茶利害詔送江淮發運司指使馮亮李浦薦齊堪任京官而判吏部銓御史中丞王嗣宗言齊乃豪家子以問中書馮拯曰若選用有才何必限貧富上曰卿言是也比來選人往往指言此某人親某人故必若有才豈可以此不用丙辰齊遂補初等幕職官以前鄠縣主簿洛陽髙志寧為大理評事志寧明經中第請應識洞韜鈐科且求日試三千字既而不能成上察其歷官無過特命遷秩韓琦志墓云免試授官與實録不同恐飾説也志寧蓋琦妹壻今不取戊午甘州輝和爾汗伊嚕格勒遣尼法仙等來朝獻馬十匹仍許法仙遊五臺山尋又遣僧翟大泰來貢馬十五匹欲於京城建佛寺祝聖夀求賜名額不許己未秦國長公主言先於乾明寺署無量夀院令家人披剃焚修緣院宇窄隘請以步廊十二間益之仍令掌寺東門事上以步廊乃寺衆出入之所東門自有主者不許庚申以吏部侍郎兼祕書監集賢院學士郭贄為工部尚書兼袐書監充翰林侍讀學士先是上謂王旦等曰昨召郭贄與語移時頗記朕在東宫時事贄純厚長者善於輔導在府中三年楊可法繼至可法介然有守其輔導不及於贄朕早年嘗至其家贄今已老欲召置近職自吏部侍郎當為何官旦等曰陛下念舊推恩皆係特旨上曰可授尚書故有是命初近附諸州嵗以芻藁輸京師至是年穀屢登輦下物價甚賤畿內和市已及七百圍乃詔滑曹許鄭等州所納芻藁並輸本處張崇貴言準詔賜趙德明冬服及儀天歷令延州遣牙校齎往比聞德明葺道路館舍以俟使命若遣牙校似失所望上曰向不欲遣使蓋慮其勞崇貴今有是奏從之可也德明又請詣五臺寺修設追薦其母陳堯叟欲令張崇貴諭以路由河東多涉軍壘不便聽由鎮州路往上曰宜令崇貴答以不敢聞奏若誠願則聽致施物於鄜延委崇貴差人送五臺也种放復自終南山來朝辛酉贈故桂州監押殿直郝惟和為如京副使故栁州栁城縣監押殿直韓明為崇儀副使故桂象等州同巡檢三班奉職許貴為內殿崇班癸亥詔象州澄海指揮賜名忠敢以守城之勞也初陳進之亂宜州指揮使陳定都頭黃晚皆不從驅率先投象州進欲取此二人甘心焉遂引衆攻圍誓必得之定等亦誓不從賊與官吏糾合城中諭以禍福皆得其死力上始欲令定等赴闕優加擢用又慮其懷土重遷癸亥因擢定為本州馬步軍都指揮使晚為步軍指揮使曹利用等言潰散羣賊並招撫逐處禁繫其情理難恕者欲所在處斬妻子配役從之十一月丙寅詔羣臣當給賻贈者鴻臚寺入內內侍省太常禮院關移不得過二日時有已襄事而未賜者故也雍州解送進士施粲等赴禮部值宜州賊違省限詔貢院特取之丁卯廢定州軍城寨榷場從河北緣邉安撫司之請也戊辰日南至上御朝元殿受朝己巳三鼓中天有赤氣如掃長七尺在輿鬼南占主秦分兵疫上曰日官言赤氣不犯二十八宿躔次雖主兵疫當應在外且國家常存警戒則災眚自滅矣辛未右正言知制誥孫僅知永興軍代四方館使孫全照也以全照知許州先是上謂王旦等藩方長吏尤賴循良全照馭下峻急當擇其代如邉肅孫僅誰可此授馮拯曰僅嘗佐京府熟於民政可用也從之僅純厚長者為政頗寬賜詔書戒諭全照有别墅在許州蓋從所請焉壬申詔三司虧陷官錢許經歷司分覺舉釋其罪仍免均納先是三司憑由司檢見上供案有虧失官錢者有司欲悉令均償主吏上訴命刑部尚書溫仲舒御史中丞王嗣宗詳定以聞而有是詔癸酉以廣南攝官秦百祥為茶城縣令黃中理知立山縣李幹知古縣皆為賊所執抗節不從故奬之立山蒙州古桂州上謂王欽若曰君臣事迹崇釋教門有布髮於地令僧踐之及自剃僧頭以徼福利此乃失道惑溺之甚者可並刋之甲戌廣南巡撫使曹利用言宜州賊黨陳化黎育與其徒二百餘人家屬五百口及曽受補署者並已招收訖詔利用等俟得諸州軍報鄉閭寧靜乃還京象州民有以飲食饋賊者利用請逮捕痛繩之上曰逺方愚民為賊所迫供置食物乃是常理懲罰太峻不可行也令本州量事決責以聞詔申太倉給軍食槩量刻少之禁先是軍士所得斛才八九斗頗以為言上問三司使丁謂謂曰前詔條制太倉納諸州運糧無得增受諸軍月給無得減刻違者至死今此減刻誠合嚴誅但運糧米當有耗舟卒盜食其中若太倉輸納稍難則恐綱運不繼上曰然月廪不可虧少故復約束之省南乳酪院舊置南北二院羣牧使言其煩費故省其一河東轉運使言唐龍鎮來璘來美等為西路契丹所掠美即璘之季父久依府州與來懷正同族不相能故懷正召戎破之以報怨陳堯叟曰璘美等亦窮而款塞者嘗持兩端本非富強之族但據險阻恣為觀望朝廷征之則趣河之東地曰東纒契丹兵加之則趣河之西地曰西纒介卒騎兵所不能及上曰契丹使到可令館伴使言其事仍令轉運使鮑中和與并州劉綜等商度索所掠璘美人畜府州又言唐龍鎮略奪蘆子塞郭莽族人馬詔轉運司理還之丁丑刑部尚書宋白為兵部尚書致仕白年踰耳順圖進不休御史中丞王嗣宗屢使人諷之知樞密院事陳堯叟其子壻也亦數懇勸白不得已始上表上猶以舊臣眷然未許再表乃許焉髙陽關承受劉柳言河北諸州軍用兵之際優給公使錢犒設軍校今邉鄙乂安戍兵大減請令轉運提點刑獄司量州軍間劇均定既而李士衡等請除緣邉及當路仍舊外餘皆增省其數以聞從之戊寅詔廣南知州通判自今審官院選京朝官曽任知縣者充依例引對上謂王欽若等曰近有西北使還者言順安軍西至定州曠土盡懇闢苗稼豐茂民無差擾物價甚賤惟當遴擇守臣使不生邉隙也馬知節曰西北二方久為外患今契丹求盟夏臺請吏皆陛下威德所致且如唐室貞觀開元稱為治世然措置兵甲樹立屏翰皆不得其宜終成尾大之患當今兵柄盡出陛下掌握至於一命之士皆由旨授上曰前代求治之君亦多如德宗思欲威加天下知書自任羣臣雖復上言多所不愜以是人頗循默此亦可深戒陳堯叟曰唐太宗與臣僚論事有不出太宗意者退有憂色蓋以天下至廣深居九重不能周悉而羣臣之見亦未及逺此太宗所以憂也今陛下聽斷如流尚以為戒兹實天下幸甚庚辰殿中侍御史趙湘上言請封禪中書以聞上拱揖不答王旦等曰封禪之禮曠廢已久若非聖朝承平豈能振舉上曰朕之不德安敢輕議初王欽若既以城下之盟毁冦準上自是常怏怏他日問欽若曰今將奈何欽若度上厭兵即繆曰陛下以兵取幽薊乃可刷此恥也上曰河朔生靈始得休息吾不忍復驅之死地卿盍思其次欽若曰陛下茍不用兵則當為大功業庶可以鎮服四方誇示戎夷也上曰何謂大功業欽若曰封禪是矣然封禪當得天瑞希世絶倫之事乃可為既而又曰天瑞安可必得前代蓋有以人力為之若人主深信而崇奉焉以明示天下則與天瑞無異也陛下謂河圖洛書果有此乎聖人以神道設教耳上久之乃可獨憚王旦曰王旦得無不可乎欽若曰臣請以聖意諭旦宜無不可乘間為旦言之黽勉而從然上意猶未決莫適與籌之者它日晚幸祕閣惟杜鎬方宿直上驟問之曰卿博達墳典所謂河出圖洛出書果何事耶鎬老儒不測上旨漫應曰此聖人以神道設教耳其言偶與欽若同上由此意決遂召王旦飲於內中歡甚賜以尊酒曰此酒極佳歸與妻孥共之既歸發視乃珠子也旦自是不復持異天書封禪等事始作辛巳上謂王旦等曰昨暮降雪遽止朕憂其未足夜分使人於宫庭視之乃云復降其勢甚密今果盈尺來嵗麥苖應有望也朕每念稼穡艱難嘗與邢昺言力田多者值災沴昺云民之災患大約有四一曰人疫二曰旱三曰水四曰牛瘴必嵗有其一但或輕或重耳四事之害旱暵為甚蓋田無畎澮悉不可救所損必盡即傳所謂天災流行國家代有者也昺久居田里尤熟農事自云驗之多矣比嵗稼穡屢稔朕常以災沴為慮兼聞今年宿麥甚廣得此時雪農家無冬旱之憂也遂賜近臣飲於中書又宴館閣官於崇文院上作瑞雪詩令三館即席和進兩制次日來上癸未殿前司驍騎小校張信棄市信訴指揮使蓋贊御下嚴急鞭撻過當陳堯叟曰都虞候李繼和言士伍不稟所部合從軍令上曰如罪在士伍可以嚴斷若捶撻過當安可不盡其理耶馬知節曰太祖朝每命將校必取剛方有斷士伍畏威者上曰此蓋彼時所宜爾即下吏案劾信欵云贊乘醉教習決責部下信遂以弓弰擁卒四十餘厲聲曰我輩終為指揮使乘醉所鞭殺即徑詣馬軍司陳告贊云雖日飲酒而所鞭卒皆有過者繼和請斬告者十餘人餘配沙門島罰指揮使都虞候詔誅信餘決杖配𨽻外州輕者復𨽻本州贊決杖配許州其都虞候不能覺察副指揮使不能裨贊並下本司決罰甲申命審官院擇京朝官有材幹舉進士者通判保州以其密邇邉境武臣充守所答北界書牒詞理多謬故也戊子令樞密院條上南郊承天節皇族諸親延賞恩例先是每有朝慶皇族皆過希寵澤上謂陳堯叟等曰若盡遂所請即勤勞王事之臣能不以此為辭自今有越例者即令尚書內省勿下堯叟等曰頃嵗陳國長公主為男求近地刺史已有官者求嵗嵗改轉諸院回圖舟車求免抽稅去年程繼宗掌致逺務坐事制鞫晉國長公主為奏求代凡以此事臣等以其國戚曰取進止陛下皆寢而不報自此所保任親戚有官者限以品秩各定所止中外之人盡知國家推公以待臣下上曰諸親中亦有引太祖太宗朝事為言者朕但答以祖宗功業至大安可比擬况庶事皆有制度朕遵守之何敢失墜邇來漸亦知非各安其分也庚寅賜太廟守衛人等承天節衣服嵗以為例祥符八年正月密院上新例辛卯契丹遣使左領軍衛上將軍耶律元昭德節度使耶律諧理副使左威衛大將軍李琮殿中少監李操來賀承天節蕃俗最重食塔爾布斯發土得之唯以供母主至是使者挈數頭至飲羊乳遂令庖人造蕃食以獻上許進入擇其味佳者再索之使感恱接伴契丹使王曙等言臣嘗奉使北朝羣臣每見競來趨揖問本朝羣臣曽至其國者動靜安否臣察其情無猜阻即一一以實對今北朝使至羣臣中有曽使契丹者亦乞諭令與北使交接問其動靜安否庶幾得其歡心從之會要載此事於四月今移見契丹遣使之後耶律元館於京師嘗詢左右曰館中日聞鼓聲豈習戰陳耶或對以俳優戲場閭里筵設上聞之謂宰相曰不若以實諭之諸軍比無征戰閲習武藝亦國家常事耳且可以示無間於彼也十二月乙未手札賜王欽若曰編修君臣事迹官皆出遴選朕於此書匪獨聽政之暇資於披覽亦乃區别善惡埀之後世俾君臣父子有所監戒起今後自初修官至楊億各依新式遞相檢視內有脫誤門目不類年代帝號失次者並署歷仍書逐人名下隨卷奏知異時比較功程等第酬奬庶分勤惰委劉承圭專差人署歷欽若為人傾巧所修書或當上意褒賞所及欽若即書名表首以謝或繆誤有所譴問則戒書吏稱楊億已下所為以對同僚皆疾之使陳越寢如尸以為欽若石中立作欽若妻哭其旁餘人歌虞殯於前欽若聞之密奏將盡絀責王旦持之得寢億在館中欽若或繼至必避出他所亦然及欽若出知杭州舉朝皆有詩獨億不作欽若辭日具奏詔諭億令作詩竟遷延不送此據江休復雜志附見犍為縣民因伐木開道與南蠻相殺傷知益州任中正奏此縣巖險當雲南要路請置戌兵三百命廷臣為駐泊監押上以蜀郡久安不欲生事乃詔諭中正禁緣邊居民伐木開道與蠻交爭丙申曹利用等言潰散宜州賊徒追捕誅翦已盡仍上破賊圖上出以示輔臣指前軍破賊處言利用與張煦等先同署紙人持百枚備給立功將卒及破賊利用在前軍無所給煦在後而所給乃過半故明年十月始賞寧朔軍士涇原鈐轄秦翰言鎮戎軍納質院先有姦猾蕃部以族屬為質者準詔並釋之有伊特古者族望最大凶狠多謀縱之非便今部送赴闕兼令親屬同行俾無疑慮請配𨽻逺處軍籍詔賜裝錢二萬以𨽻溫州仍給月廪其親屬許還鎮戎受田與糧不令同往上以設法誘置非示信之道故也丁酉詔應大祠及大忌前一日雖不奏刑殺文字若輕罪不可稽留者審刑院上之上初嗣位即詔諸路勿得以祥瑞來貢其後頗有進獻者乃詔尚書禮部舉舊制申禁禮部言福應之至以顯盛猷雖睿德謙沖務於自損若史臣不記來世何觀請止報省關史館奏可初青神縣民史光寶家為盜所劫耆保言是夕雷延賦延誼不宿本舍縣尉即捕而訊之縣吏王嗣等恣行拷掠因而至死有頃州得劫光寶賊七人乃明賦誼之寃益州任中正具奏戊戌詔蠲賦誼二户三年田租免其徭役京城河南草場遺火城外都巡檢步軍副都指揮使王隱命殿前虎翼都虞候髙鸞以近便營兵救撲之殿前司言鸞等非本屬當俟詔旨請劾之上以救焚之急隱得便宜從事因命釋鸞等罪仍戒自今各遵往制己亥詔川峽節度州及衝要兵多處監押用侍禁已上為之時興元府言有小校對護軍無禮其人乃三班奉職以秩輕故也賜近臣契丹錦綺綾縠新羅酒蕃肉等壬寅封駙馬都尉石保吉庶女為樂陵郡君初上以無例令中書詳討故事晉國長公主亟為乞恩故特加郡號兖州道士冶嵗課鐡二萬餘斤主者盡力採煉常不能及有坐是破産者癸卯命廢之先是上嘗問輔臣以天下貢舉人數王旦曰萬三千有餘約常例奏名十一而已上曰若此則當黜者不啻萬人矣典領之臣必須審擇朝逈兢畏當以委之周起王曽陳彭年皆可參預拯曰封印卷首若朝廷遣官主之於理亦順尤宜用素有操守之人旦曰滕元晏於士大夫間少交逰上曰今當以朱巽代周起知舉令起與元晏同掌封印事於是命翰林學士朝逈知制誥朱巽王曽龍圖閣待制陳彭年同知貢舉既受詔上諭以取士之意務在至公擢寒畯有藝者又命監察御史嚴頴張士遜監貢院門都官員外郎喬顔太常博士鄭彛太常丞陳既濟巡試鋪太常丞直集賢院任隨著作佐郎陳覃點檢進士程試大理寺丞馬龜符等六人考較諸科程試又命知制誥周起京東轉運使祠部員外郎滕元晏封印舉人卷首用奉使印殿中丞李道監封印院門進士諸科試卷悉封印卷首送知舉官考校仍頒其式知舉官既考定等級復令封之進入送覆考所考畢然後參校得失凡禮部封印卷首及點檢程試别命官皆始此元晏中正子士遜光化軍人也按周起傳云起創糊名之法又陳靖傳亦云糊名考校始於靖蓋靖先請用之殿試起復請用之禮部故起首為封彌官也嚴頴喬顔鄭彛陳既濟陳覃馬龜符李道七人未詳邑里乙巳詔諸科舉人皆理場第自今不合格者須至覆場方得落下麟府路鈐轄言契丹率兵捕賊至境上恐謀侵軼上曰此疑者過也遣內侍王懷信往察之丙午懷信言契丹執盜馬舍利而還果無它丁未詔羣臣當賜廄馬者如聞騏驥院官吏用情不能均一自今中使據合賜等第各揀定二十匹依名次以賜賜訖復增常足其數戊申詔諸處錢監鑄匠每旬停作一日願作者聽之庚戌都官員外郎同判太常禮院孫奭言伏覩來年正月一日享先農九日上辛祈穀祀昊天上帝按春秋傳啓蟄而郊郊而後耕月令云天子以元日祈穀於上帝乃擇元辰親載耒耜躬耕帝籍先儒皆云元日即上辛郊天也元辰謂郊後吉亥享先農而耕籍也六典禮閣新儀並先云上辛祀昊天次云吉亥享先農伏望改用上辛後亥日享先農仍即著令詔太常寺與崇文院檢討官詳定既而判寺李宗諤言宋書後魏書所載並以上辛後日享先農請如奭奏從之癸丑詔河東路所賜戍兵白金每兩之直以一千為限先是嵗一遣使賜銀鞋使回言本州無銀每兩給錢七百五十其實市價千錢乃計司不預為備故有是詔神騎卒趙榮伐登聞鼓言能以藥點銅為鍮石上曰民間無銅皆鎔錢為之此術甚亡謂也乃下詔禁止其來自外蕃者不在此限唐龍鎮賚卜類與其族人懷正互相讎劫側近帳族不寧麟府駐泊韓守英等以聞詔遣使召而盟之依蕃法和斷先是上降詔榜下禮部貢院序所以杜絶私請搜揚寒秀之意舉人見者咸喜丙辰上與王旦等言及之旦等曰昨頒考較新格周行中頗有論議且言中書不能守科場大體但疑春官有私及詔榜出天下士乃知陛下務盡至公恐多遺材故更此條貫也給事中梁周翰嘗請將試進士先試詩二十首取可採者再試上曰如此則工詩者乃能中選長於文者無以自見矣丁巳斯多特又遣使來貢戊午契丹遣使左威衛上將軍蕭留寧彰武節度使耶律信寧副使崇祿少卿邢祥右威衛大將軍耶律遂正來賀明年正旦上謂輔臣曰比者武將戎臣多言與契丹和不便王旦曰儒臣中亦有此論然國家與契丹和三年於兹矣計其不勞干戈不費財用之外河朔人民頓息飛挽上曰議者或謂敵伺河朔豐實乃動耳馮拯曰邊方不寧武臣幸之以為利上曰國家雖懷柔示信亦不廢戎事彼亦安敢渝盟但當清淨致治以安吾民也邊臣嘗有奏請招市戰馬者上顧左右曰今蕃落安輯久通互市何忽招之且畜馬太多費用尤廣契丹請和今已三載河朔生靈粗爾蘇息撫御四方當務逺略茍止信淺識為國生事則害滋甚矣寶訓以此事係四年今且附見更俟考己未詔廂軍及諸州本城犯所部決杖訖並移𨽻他軍內情理重及緣邊隨軍者奏裁先是法寺上言請與禁軍同等上以軍秩既有差降故犯者亦從末減詔諸路所上軍儲之數自今先下樞密院籍記送中書蓋凡遣戍兵必預度所在資廪豐約故也辛酉河北提點刑獄司陳綱上言杖罪械繫者其枷未有定制望令特置以十五斤為凖從之
