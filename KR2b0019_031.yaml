body:
  text: 續資治通鑑長編卷二十七宋李燾撰太宗雍熙三年春正月戊寅德彛為右千牛衛大將軍判沂州時年十九屬飛蝗入境吏民請坎瘞火焚之德彛曰上天降災守土之罪也乃責躬引咎齊戒致禱而蝗自殪先是知雄州賀令圖與其父嶽州刺史懷浦及文思使薛繼昭軍器庫使劉文裕崇儀副使侯莫陳利用等相繼上言自國家伐太原而契丹渝盟發兵以援非天威兵力决而取之河東之師幾為遷延之役且契丹主年幼國事决於其母其大將韓德讓寵幸用事國人疾之請乘其釁以取幽薊上遂以令圖等言為然始有意北伐上初議親征給事中參知政事李至上言曰幽陵戎之右臂王師往擊彼必拒張攻城之人不下數萬兵多費廣勢須廣備餱糧假令一日克平當為十旬準計未知邊庾可充此乎又賊城之旁坦無陵阜去山既逺取石尤難金湯之堅非石莫碎則發機縋石將安得乎若聖心獨斷睿慮已成則京師天下根本願陛下不離輦轂恭守宗廟示敵人以間暇慰億兆之瞻仰者䇿之上也大名河朔之咽喉或暫駐鑾輅揚言自將以張兵勢壯軍威者䇿之中也若乃逺提師旅親抵邊陲北有戎援之虞南有中原為慮則曵𥚑之懇切斷鞅之狂愚臣雖不肖恥在昔賢之後也刑部尚書宋琪上疏曰伏以國朝大舉精兵討除邊冦靈旗所指燕城必降而敵所趨徑術或落其便必欲取雄霸路直進未免更有陽城之圍蓋界河之北陂淀坦平北路行師擾戈散地况軍行不離於輜重賊來莫測其淺深必兾回轅西適山路望令大軍㑹於易州循狐山之北漆水以西挾山而行援糧以進涉涿水並大房抵桑乾河出安祖寨則東瞰燕城裁及一舍此是周德威收燕之路自易水距此二百餘里並是緣山村墅連延溪澗相接採薪汲水我占上游東則林麓平岡非戎馬奔衝之地內排鎗弩步隊實王師備禦之方然於山上列白幟以望之戎馬之來二百餘里外可悉數也從安祖寨西北有盧師神祠是桑乾出山之口東及幽州四十餘里趙德鈞作鎮之時欲遏西衝曽塹此水况河次半有崖岸不可徑度河壖平處築城護之守以偏師此斷戎之右臂也仍慮步奚為冦可分雄勇兵士三五千人至青白軍以來山中把截此是新州媯山之間南出易州大路其桑水屬燕城北隅繞西壁而轉大軍如至城下於燕丹陵北橫堰此水灌入髙梁河髙梁岸狹桑水必溢可於駐蹕寺東引入祁亭淀三五日彌漫百餘里即幽州隔在水南王師可於州北繫浮梁以通北路戎騎來援已隔水矣視此孤壘浹旬必克幽州管內洎山後八軍聞薊門不守必盡歸降蓋勢使然也然後國家命重臣以鎮之敷慶澤以懷之奚霫部落劉仁恭及男守光之時皆刺面為義兒伏燕軍指使人馬疆土少劣於契丹自彼脅從役屬以來常懷骨髓之恨渤海兵馬土地盛於奚帳雖勉强從事俱懷殺主破國之心其薊門洎山後雲朔等州沙陀吐渾元是割屬咸非叛黨此蕃漢諸部之衆如將來討伐雖臨陳禽獲必貸其死命署置存撫使之懷恩但以罪契丹為名如此則衆族之心顯報私憾契丹小醜尅日殄平其奚霫渤海之國各選重望親嫡封册為王仍賜分器旗鼓車服戈甲優而遣之必竭赤心永服皇化俟克平之後宣布守臣令於燕境及山後雲朔諸州厚給衣糧料錢别作禁軍名額召募三五萬人教以騎射𨽻於本州此人生長塞垣諳練戎事乘機戰鬬一以當十兼得奚霫渤海以為外臣乃守在四夷也然自按巴堅時至於近日河朔户口虜略極多并在錦帳平盧亦邇柳城遼海編戶數十萬耕墾千餘里既殄羣醜悉為王民釋左衽以服衣冠率邉氓而被聲教願歸者俾復舊貫懷安者因而撫之申畫郊圻列為州縣則前代所建松莫饒落等郡未為開拓之盛也琪本燕人究知敵帳車馬山川形勝所言悉有歸趣俄又上疏言晉末契丹頭下兵謂之大帳有皮室兵約三萬人騎皆精甲也為其爪牙國母舒嚕氏頭下謂之舒紳有衆二萬是先戎主按巴堅牙將半已老矣每南來時量分借得三五千騎舒嚕常留餘兵馬部族根本其諸大首領太子偉王永康南北王子伊瑪克塔鄂衮等大者千餘騎次者數百人皆私甲也别族則有奚霫勝兵亦千餘人少馬多步奚霫王阿必達者昔年犯闕時令送劉晞崔廷勳屯河洛者也奚王伊埓也此云阿必達當考又有渤海首領大舍利髙模翰兵步騎萬餘人並髠髮左衽竊為契丹之飾復有近界逹勒逹威竒爾室韋女真党項亦被脅屬每部不過千餘騎其三部落吐渾沙陀洎幽州營內鴈門以北十餘軍州部落漢兵合二萬餘衆此是石晉割以賂戎之地蕃漢諸族其數可見矣每契丹南侵其衆不啻十萬契丹入界之時步騎車帳不從阡陌東西一槩而行大帳前及東西面差大首領三人各率萬騎支散游奕百十里外交相覘邏謂之欄子馬戎主吹角為號衆即頓合環繞穹廬以近及逺折木梢屈之為弓子鋪不設槍營塹栅之備每軍行聽鼓三伐不問昏晝一布便行未逢大敵不乘戰馬俟近王師即競乘之所以新羈戰馬蹄有餘力也其用軍之術成列而不戰俟退而乘之多伏兵斷糧道冒夜舉火上風曵柴饋餉自齎退敗無恥散而復聚寒而益堅此其所長也中原所長秋夏霖霪天時也山林河津地利也槍突劒弩兵勝也財豐士衆力彊也乘時互用較然可知王師破敵之計每秋冬時河朔軍州緣邊栅寨但專守境勿輒侵漁令彼尋戈其詞無措或戎馬既肥長驅入冦戎主親行羣醜萃至寒雲翳日朔雪迷空鞍馬相持氊褐之利所宜守陴坐甲以逸待勞其騎士並屯於天雄軍自磁相州以來若分於邊城緩急難於㑹合近邊州府只用步兵多屯弩手大者萬卒小者千人堅壁固守勿令出戰彼以全國戎羯此以一郡貔貅雖勇懦之有殊慮衆寡之不敵也國家别命大將總統前軍以遏侵軼只在天雄軍邢洺貝州以來設犄角之備俟其陽春啓候北敵計窮新草未生陳荄已朽蕃馬無力疲冦思歸逼而逐之必自奔北前軍行陳之法馬步精卒其數不過十萬自招討以下更命三五人充都監副戎排陳先鋒等臨事分布所貴有權追戎之陳須列前後其前陳萬五千騎陳身萬人是四十指揮左右廂各十指揮是一十將每指揮作一隊自軍主都虞候指揮使押當每隊用馬突或刃子槍一百條餘並弓劒骨􅀈其陳身解鐙排之候與戎人相搏之時無問厚薄十分作氣槍突交衝馳逐往來後陳交進敵若乘我深入陳身之後更以馬步人五千分為十頭以撞竿鎧弩俱進為回騎之舍也陳廂不可輕動蓋防橫騎奔衝此陳以都監領之進退賞罰便可裁决後陳以馬步軍八萬招討董之與前陳不得過三五里展廂實心有常山之勢左右排陳分押之或前陳擊破敵人後陳亦禁其馳驟輕進蓋師貞之律也牧誓云四伐五伐乃止齊焉謹重之誡也是以開運中晉軍犄戎不曽枝散三四年間雖德光為戎首多計桀黠而無勝晉軍之處蓋併力禦之厥後以任人不當為張彥澤所誤如將來殺獲驅攘之後聖人務好生之德設息兵之謀雖降志以難甘亦和戎而為便魏絳常陳於五利奉春僅得其中䇿厯觀載籍前王皆然易稱髙宗用伐鬼方詩美宣王薄伐玁狁是知戎夷侵軼其來尚矣然則兵為凶器聖人不得已而用若精選使臣不辱君命通盟結好弭戰息民此亦䇿之得也臣每見國朝發兵未至屯戍之所已於兩河諸郡調民運糧逺近騷然費煩十倍臣生居邊土習知兵事况幽州為國北門押蕃重鎮養兵數萬討敵乃宜矣每逢調發惟作糗糧之備入蕃旬浹軍糧自齎每人給麨二㪷餘盛之於囊以自隨征馬每匹給生穀二㪷作口袋飼秣日以二升為限旬日之間人馬俱無饑色更以牙官子弟戮力擕擎裹送之一月之糧不煩饋運俟大軍既至定議取舍然後圖轉餉亦未為晚臣有平燕之䇿入燕之路具在前奏願加省覽疏奏頗采用之本傳及㑹要經武聖略皆云端拱二年時討幽薊召羣臣各言邊事琪上此疏按端拱二年戎方侵擾河北朝廷旰食豈暇逺議幽薊此疏蓋雍熙三年春曹彬等出師時所上故専言幽薊事宜故掇出附見於此傳云吏部亦誤也詔三司錢穀公事自今並須詳定合行與否具狀聞奏不得復持兩端取㫖如依奏施行後無益於民不利於國皆當劾罪有大事非本司能决者乃許本使面奏三月潘美出鴈門自西陘入與敵戰勝之斬首五百級逐北至寰州斬首五百級神衛右第二軍都指揮使平城薛超體被金瘡數處流血濡甲縷部分軍士自若庚辰刺史趙彥辛舉寰州降詔以彥辛為本州團練使曹彬進壁於涿州東復與敵戰李繼隆范廷召等皆中流矢督戰愈急敵遂敗乘勝攻其北門克之辛巳取涿州潘美進圍朔州其知節度副使趙希贊舉城降詔以希贊為本州觀察使田重進至飛狐北界西南面招安使大鵬翼等帥衆來援行營西上閣門使袁繼忠謂重進曰敵多騎兵利於平地不如乘險逆擊之蘄州刺史朝城談延美曰敵恃衆易我若出其不意可克也於是重進陳壓東偏數交鋒勝敗未决日將夕命荆嗣出西偏薄山崕以短兵接戰敵投崖而下手斬首百餘級敵勢挫衄散卒千餘人在野嗣呵止降之敵退屯土嶺禆將黃明與戰不利嗣謂明曰汝第頓兵於此為我聲援我當奪此嶺遂力戰克之追奔五十餘里抵蒼頭而還拔小冶直谷二寨嗣因留屯直谷居數日敵遣騎挑戰勢頗張重進召嗣合兵擊却之敵乘夜復圍直谷石門二寨重進遣嗣往救嗣曰今所部才五百人敵衆二萬餘力不敵矣重進憂之問嗣計䇿安出嗣曰談延美方屯小冶有兵二千願間道往邀其䇿應逐馳見延美延美曰敵勢如此何可當也嗣曰但願以全軍就平州列隊樹旗别遣三二百人執白幟於道側嗣乃以所部五百人疾驅往鬬彼見旗幟綿亘逺甚疑大軍繼至敵雖衆可破也延美許焉癸未嗣還力戰一日五七合敵不勝將遁去重進遂以大軍乘之北騎崩潰生擒大鵬翼及監軍馬頵副將何萬通並契丹渤海千餘人斬首數千級俘老幼七百人獲馬畜鎧伏纍萬計大鵬翼貌壯偉而勇健名聞邊寨既禽之敵奪氣曹彬入涿州遣部將浚儀李繼宣等領輕騎渡涿河覘敵勢乙酉敵帥衆來攻繼宣擊破之於城南斬首千級獲馬五百匹殺奚宰相和斯丁亥潘美轉攻應州其節度使艾正觀察判官宋雄舉城降即授正本州觀察使雄為鴻臚少卿同知應州雄幽州人也田重進圍飛狐令大鵬翼至城下諭其守將定武軍馬步軍都指揮使郢州防禦使吕行德尚欲堅守重進急攻之辛卯行德乃與其副都指揮使張繼從馬軍都使劉知進等舉城降詔升其縣為飛狐軍以行德為左驍衛將軍順州防禦使繼從為右屯衛將軍檀州刺史知進為左監門衛將軍重進又圍靈丘丙申其守將步軍都指揮使穆超舉城降以超為右監門衛將軍實録在四月癸卯今併書之是月始用士人為司理判官詔權停貢舉夏四月辛丑潘美克雲州斬首千級田重進破敵援軍於飛狐北斬首千級俘四百人壬寅米信破敵於新城斬首三百級敵衆復集信兵稍却信獨以麾下龍衛卒三百人禦之被圍數重矢下如雨信自射殺數人麾下多死日將暮信持大刀率從騎百餘人呼突圍殺數十人㑹曹彬遣李繼宣等援之遂大破敵於新城東北斬首千級獲馬一百匹乙己田重進遣牙校部送大鵬翼等至闕上責而宥之以鵬翼為右千牛衛將軍領平州刺史丁未以駕部員外郎梁裔知應州監察御史張利涉知朔州右贊善大夫馬務成同知寰州己酉田重進又破敵衆於飛狐北殺酋長二人斬首千級獲馬三百匹壬子命左拾遺張舒同知雲州契丹大同節度副使趙毅為右千牛衛將軍領儒州刺史節度判官張日用觀察判官宋元並為殿中丞掌書記崔從善為右贊善大夫皆仍舊職乙卯田重進至蔚州左右都押衙李存璋許彥欽等殺敵酋蕭多羅及其守卒千人執監城使同州節度使耿紹忠舉城降以崇儀使魏震知蔚州震不詳邑里授存璋順州團練使彥欽平州團練使同知蔚州初王師入北境所向皆下多羅紹忠等懼不自安謀欲殺城中將吏盡率其豪傑歸帳中存璋等知其謀乃先事而發紹忠父美為敵奉聖節度使弟紹雍為三司使紹忠領同州州西南數百里方從北主至遙樂河聞王師至遣為蔚州監城使於是被執存璋等初請降重進疑之先命荆嗣率猛士數十人縋而入得實乃納其款重進軍乏食嗣部降卒輦州廪給之存璋等既殺醜黨慮孤城難守乃盡率其吏民奔重進軍重進厚撫之敵援兵大至副都指揮使江謙妄言惑衆嗣即斬之悉收城中輜重還集重進軍與敵轉戰時軍校五輩其四悉以戰死至大嶺嗣力鬬敵始却遂空蔚州荆嗣傳又云重進將受降而賊反拒王師所出之路遂與鬬殺傷甚多嗣屢縋入城取守將之歸服者他書並不載蔚州既降復叛事真宗實録荆嗣傳亦止云嗣先縋入城察降之虛實耳賊反拒及復縋入城取降將皆削去今從之若輦倉粟及輜重則仍附見是役也邊民之驍勇者競團結以襲敵或夜入城壘斬取首級來歸上聞而嘉之曰此等生長邊陲間習戰鬬若明立賞格必大有應募者乃下詔募民有能糾合應援王師者資以糧食假以兵甲禽敵中酋豪者隨職名髙下補署獲生口者人賞錢五千得首級三千馬上等十千中七千下五千平幽州後願在軍者優與存録願歸農者給復三年自是應募者益衆初曹彬與諸將入辭上謂彬曰但令諸將先趨雲應卿以十餘萬衆聲言取幽州且持重緩行毋得貪利以要敵敵聞之必萃徑兵於幽州敵既聚則不暇為援於山後矣既而潘美果下寰朔雲應等州田重進又取飛狐靈丘蔚州多得山後要害之地而彬等亦連收新城固安下涿州兵勢大振每捷奏至上頗疑彬進軍之速且憂敵斷糧道彬至涿州留十餘日食盡乃退師至雄州以援供饋上聞之大駭曰豈有敵人在前而却軍以援芻粟乎何失策之甚也亟遣使止之令勿復前引師緣白溝河與米信軍接養兵蓄鋭以張西師之勢待美盡略山後之地㑹重進東下趣幽州與彬信合以全師制敵必勝之道也而彬所部諸將聞美及重進纍戰獲利自以握重兵不能有所攻取謀畫蜂起更相矛盾彬不能制乃裹五十日糧再往攻涿州敵當其前且行且戰去城才百里厯二十日始至有酋長領萬騎與米信戰相持不解俄遣使紿言乞降上蔡令大名柳開督饋餉隨軍謂信曰此兵法所謂無約而請和者也彼將有謀急攻之必勝信遲疑不决踰二日敵復引兵排戰後偵知果矢盡俟取於幽州也詐降事柳開傳云將至涿州時今附見於此彬雖復得涿州時方炎暑軍士疲乏所齎糧又不繼乃復棄之還師境上實録云軍士疲乏所齎糧且盡上憂之令還師境上據契丹及曹彬傳則再往涿州復還境上非有詔㫖也彬初欲令所部將開封盧斌以兵萬人戍涿州斌懇言涿州深入北地外無援內無食丁籍殘失守必不利不若以此萬人結陳而去比於固守其利百矣彬從其言令斌擁城中老幼並狼山而南彬等以大軍退無復行伍為敵所躡五月庚午至岐溝關北敵追及之我師大敗彬等收餘軍宵涉巨馬河營於易水之南李繼宣力戰巨馬河上敵始退追奔至孤山方涉巨馬河人畜相蹂踐而死者甚衆知幽州行府事右諌議大夫劉保勳馬陷淖中其子開封兵曹利涉督芻粟隨軍常從其後盡力掀之不能出遂俱死殿中丞孔宜亦隨軍督芻粟溺於巨馬河詔録保勳孫巨川為祕書省正字宜子延世同學究出身癸酉潘美遣使部送應州朔州將吏耆老等赴闕上召見慰撫之老人皆云久陷邉陲有粟不得食有子不得存養不意餘年重覩日月並賜以衣服冠帶丙子宫苑使王繼恩自易州馳騎至上始聞曹彬等軍敗乃詔諸將領兵分屯於邊召彬及崔彥進米信入朝田重進率全軍駐定州潘美還代州曹彬等未還武勝節度使兼侍中趙普手疏諌曰伏覩二月中忽降使臣差搬糧草及詳敕命知取幽州邇後雖聼捷音未聞成事稍稽克復俄及炎蒸師老民疲實增疑慮伏念陛下聖略神功舉無遺算平取浙右力取河東十年之間遂臻康濟蠢兹獯鬻誠非我敵蓋遷徙鳥舉難得而制自古帝王置之度外任其隨逐水草皆以禽獸畜之伏料聖明何足介意此必邪諂附㑹䝉蔽睿聰致興不急之兵頗涉無名之議臣竊見漢武時主父偃徐樂嚴安所上書及唐相姚元崇獻明皇十事據其年代雖則不同量彼是非必然無異專具録奏願賜覽觀伏自大發驍雄往殱凶醜百萬家之生聚飛挽是供數十州之土田耕桑半失兹所謂以明珠而彈雀為鼷鼠而發機所失者多所得者少就其得少之中猶難入手况是失多之外别有關心臣又聞聖人不凝滯於物事無固必理貴變通前書謂兵久則變生此不可不深慮也茍或更圖淹緩轉失機宜旬朔之間便涉秋序內地先困邊庭早凉敵則弓徑馬肥我則人疲師老恐當此際或誤指呼臣今獨興沮衆之言深負彌天之過願頒明詔速議抽軍聊為一縱之謀敢獻萬全之策伏望陛下安和寢膳惠養疲羸長令外戶不扄永使邊烽罷警自然殊方慕化率土歸仁料彼契丹獨將焉往又何必勞民動衆賣犢買刀有道之事易行無為之功最大如斯弔伐是謂萬全臣又思陛下非次興兵必因偏聽小人傾側但解欺君事成則獲利於身不成則貽憂於國昨來議取幽薊未審孰為主謀虛說誑言總應彰露願推首惡早正刑章所貴詐僞革心忠良盡力共畏三千之法同堅八百之基臣欲露肺肝先寒毛髮遲疑數日未敢措辭又念往哲臨終尚能尸諌微臣未死寧忍面諛固知逆耳之言不是安身之計但以恩由卵翼命直鴻毛將酬國士之知豈比衆人之報投荒棄市甘從此日之誅竊祿偷安不造來生之業惟祈明聖時賜察量又以劄子言鄧州五縣其四在山三分居民二皆客户昨來差配約共出十萬貫錢乃可運二萬碩糧至莫州典桑賣牛十聞六七亦有鬻男女棄性命者力加善誘偶赴嚴期滯留至今所費益廣如或再行徭役决定廣致逃移假令收下幽州轉慮干戈未息又言姦人但說契丹時逢暗主地有災星以此為詞曲中聖㫖殊不知蕃戎上下幽州俱置生涯土宿照臨外處不可征討若彼能同意縱幼主以難輕不順羣情無災星而亦敗誠宜守道事貴無私如樂禍以貪功慮得之而不武此蓋兩省少昌言之士靈臺無絶藝之人而况補闕拾遺合專思於諍諌天文厯算須預定於吉凶成兹誤失之由各負疏遺之罪若無懲罰寧戒後來又言勾抽不同舉發一則我無鬭志一則彼有讐心須作過防免輸姦便但令周施捍禦小作程途縱遇交鋒何憂乏力只應信宿便逹城池又言臣猥䝉二聖之深知當兩朝之大用不惟此世應係前生禮雖限於君臣情實同於骨肉是以凡關啓沃罔避危亡實思陛下本是天人暫來塵世是以生知福業性禀仁慈潜聞內裏看經盤中戒肉今者願忍一朝之忿常隆萬世之因如或未止干戈必恐漸多殺害即目民愁未定戰勢方搖仍於夢幻之中大作煩勞之事是何微類誤我至尊乞明驗於姦人願不容於首惡興言及此涕淚交流趙普疏云俄及炎蒸又云旬朔之間便為七月則其上疏時必是六月初或五月末朝廷雖已詔曹彬等班師而普未及知也國史普傳刪潤普辭有云晦朔荐更已及初夏若爾則當載之四月然彬初以三月十三日下涿州留旬餘却回師援糧道其再往涿州當是四月初此時軍實未敗也普劄子又言般軍糧者說大軍被圍此必彬自涿州却回時當四月末五月初也普以是月聞其事尋具手疏論諌既逹朝廷則班師之詔已發故太宗答普詔言諸將違節度事甚詳若在四月中則普手疏及劄子并太宗詔皆不應如此明言軍敗也本傳刪潤普辭蓋失事實矣然其日月既不可詳今附見於此更俟考求普劄子所言尤切本傳悉不載今亦掇取并書念其淪落可惜也上手詔賜普曰朕昨者興師選將止令曹彬等頓於雄霸裹糧坐甲以張軍聲俟一兩月間山後平定潘美田重進等㑹兵以進直抵幽州共力驅攘俾作寇之黨逺遁沙漠然後控扼險固恢復舊疆此朕之志也奈何將帥等不遵成算各騁所見領十萬甲士出塞逺鬭速取其郡縣更還師以援輜重往復勞弊為戎人所襲此責在主將也况朕踵百王之末粗致承平蓋念彼燕民陷於邉夷將救焚而拯溺匪黷武以佳兵卿當悉之也邊防之事已大為之備將來敢肆侵撓必當盡殱醜類卿勿為憂社稷元臣忠言苦口三復來奏嘉愧實深普復上表謝曰昨者臣未測事宜輒陳狂狷陛下親紆宸翰密諭聖謀臣竊審思信為上䇿將帥若克遵成算固可平戎但不副天心致兹敗事今既邊防有備更復何虞况陛下登極十年坐隆大業無一物之失所見萬國之咸康所宜端拱穆清嗇神和志以無為無事保卜世卜年自可逺繼九皇俯觀五帝豈必窮邊極塞與醜類較其勝負臣素虧壯志矧在衰齡固無功伐可稱惟竭忠純上答觀者咸歎其忠六月戊戌朔日有食之上以諸將違詔失律作自勉詩賜近臣初議興兵上獨與樞密院計議一日至六召中書不預聞及敗召樞密院使王顯副使張齊賢王沔謂曰卿等共視朕自今復作如此事否上既推誠悔過顯等咸愧懼若無所容推誠悔過事更當考宰相李昉等相率上疏曰伏思用兵北伐蓋有其由良以晋朝生靈僅踰百萬遭罹否運沒於北戎迫其凶威畜為奴婢陛下內懷痛悼將圖拯救而倚任之際將帥非才莫遵廟勝之謀洊致輿尸之敗天聲靡振敵氣彌驕罔能救於淪胥乃自致於狼狽兩河生聚幾陷兵鋒然悔既往而難追事已成而不咎未可與爭灼著於前經姑務息民何嫌於屈已况天生契丹為患中國漢髙祖以三十萬之衆困於平城卒用奉春之言以定和親之䇿以至文帝奉之彌優外示羈縻內深抑損而邊城晏閉黎庶息肩所傷匪多其利甚溥矣况獯鬻之性惟利是求儻陛下深念比屋之磬縣稍減千金之日費密諭邊將微露事機彼亦素蓄此心固乃樂聞其事不煩兵力可弭邉塵此所謂屈於一人之下伸於萬人之上者也伏望陛下裁之此疏據實録别本昉傳在幽薊失利後不得實日月今附見本𫝊乃無之玉壺野史稱太宗將搜漁陽昉上疏力諌士論駭伏當即是此疏也上慮契丹必入冦命左衛上將軍張永德知滄州右衛上將軍宋偓知霸州右驍衛上將軍劉廷讓知雄州蔚州觀察使趙延溥知貝州廷讓等皆宿將久罷節鎮上欲令擊敵自效故與延溥並命甲辰以御史中丞辛仲甫為給事中參知政事乙卯屯田郎中知制誥知大名府趙昌言遣觀察支使鄭䝉乘馹詣闕上書請斬敗軍將曹彬等上覽奏嘉歎優詔褒之尋召拜御史中丞知制誥正為中丞始此昌言汾州人也為中丞在七月八日今并書之車駕常幸金明池特召昌言預焉憲官從游宴自昌言始憲官從游宴不得其時今附見於此丙辰曹彬等至闕戊午詔翰林學士賈黃中右諌議大夫雷德驤司門員外郎知雜事李巨源召彬及崔彥進米信杜彥圭行營都監郭守文馬步都指揮使傅潜押陳部署陳廷山排陳使蔡玉先鋒都監薛繼昭等九人詣尚書省鞫之秋七月戊辰賈黃中等言曹彬郭守文傅潜具伏違詔失律士多死亡米信崔彥進違部署節制别道回軍為敵所敗杜彥圭不容士晡食設陳不整軍多散失蔡玉遇敵畏懦不擊易服潜遁陳廷山涿州㑹戰失期薛繼昭臨陳先謀引退軍情撓惑法皆當斬詔百官議之己巳工部尚書扈䝉等議如有司所定彬素服待罪深自引咎庚午責彬為右驍衛上將軍彥進為右武上將軍信為右屯衛上將軍守文為右屯衛大將軍潜為右領軍衛大將軍彥圭為歸州團練副使廷山為復州團練副使玉除名配商州繼昭罷文思使為供奉官詔郡臣列校有沒於軍陳或陷於戎冦者宜加優恤録其子孫百姓有運糧不還者給復二年家賜粟三石初米信傅潜等軍敗衆擾獨李繼隆以所部振旅成列而還即命繼隆知定州及詔分屯諸軍繼隆令書吏盡録其詔旬餘有敗卒集城下不知所向繼隆按詔給券俾各持詣所部上嘉其有謀壬申以繼隆為馬軍都虞候領雲州防禦使甲戍以步軍都指揮靜難節度使田重進為馬步軍都虞候自張令驛罷馬步軍都虞候凡二十五年不以除授幽州之役惟重進之師不敗故特命之師初自蔚州還袁繼忠為後殿行列甚整至定州有降卒後期至者重進怒將斬之繼忠諭以殺降不祥皆救免之壬午遣樞密都承㫖楊守一等詣并代等州部所徙山後諸州降民至河南府許汝等州徙者凡八千二百三十六户七萬八千二百六十二口及牛羊駝馬四十餘萬頭此據别本九日戊寅所書左諫議大夫簽書樞密院事張齊賢言事頗忤上意於是上問近臣以禦戎計䇿齊賢因請自出守邉戊子授齊賢給事中知代州與都部署潘美同領緣邉兵馬癸巳階州言福津縣有大山自龍常峽飛來壅白江水逆流髙十餘丈壞民田數百里甲午陳王元佑改名元僖韓王元休改名元侃冀王元雋改名元份國子博士李覺上言秦漢以來民多游蕩趨末者衆貧富不均今井田久廢復之必難曠土頗多闢之為利且勸課非不至而尚多間田用度非不省而未免收賦地各有主户或無田産富者彌望之田貧者無卓錐之地有力者無田可種有田者無力可耕雨露降而嵗功不登寒暑遷而年榖無穫富者益以多畜貧者無能自存欲望令天下荒田本主不能耕佃者任有力者播種一嵗之後均輸其租如此乃王化之本也上覽而嘉之八月初徙雲朔寰應四州民詔潘美楊業等以所部兵護送之時契丹國母蕭氏與其大臣耶律漢寧南北皮室及烏紳特哩衮領衆十餘萬復陷環州業謂美等曰今冦鋒益盛不可與戰朝廷止令取數州之民但領兵出大石路先遣人密告雲朔守將俟大軍離代州日令雲州之衆先出我師次應州契丹必悉兵來拒即令朔州吏民出城直入石碣谷遣强弩三千列於谷口以騎士援於中路則三州之衆保萬全矣監軍西上閣門使蔚州刺史王侁沮其議曰領數萬精兵而畏懦如此但趨鴈門北川中鼓行而往馬邑軍器庫使順州團練使劉文裕亦贊成之業曰不可必敗之勢也侁曰君素號無敵今見敵逗撓不戰得非有他志乎業曰業非避死蓋時有未利徒殺傷士卒而功不立今君責業以不死當為諸公先死耳乃引兵自石跌路趨朔州將行泣謂美曰此行必不利業太原降將分當死上不殺寵以連帥授之兵柄非縱敵不擊蓋伺其便將立尺寸功以報國恩今諸君責業以避敵業當先死於敵因指陳家谷口曰諸君於此張步兵强弩為左右翼以援俟業轉戰至此即以步兵夾擊救之不然者無遺類矣美即與侁領麾下兵陳於谷口自寅至已侁使人登托邏臺望之以為敵敗走侁欲爭其功即領兵離谷口美不能制乃緣灰河西南行一十里俄聞業敗即麾兵却走業力戰自日中至暮果至谷口望見無人即拊膺大慟再率帳下士力戰身被數十創士卒殆盡業猶手刃數十百人馬重傷不能進遂為敵所擒其子延玉與嶽州刺史王貴俱死焉業初為敵所圍貴親射殺數十人矢盡張空弮又擊殺數十人乃遇害業既被擒因太息曰上遇我厚期捍邊破賊以報而反為姦臣所嫉逼令赴死致王師敗績何面目求活於邉鄙乃不食三日而死業不知書忠烈武勇有智謀練習攻戰與士卒同甘苦代北苦寒人多服氊罽業但挾纊露坐治軍事傍不設火侍者殆僵仆而業怡然無寒色為政簡易吏民愛之御下有恩故士卒樂為之用其敗也麾下尚百餘人業謂曰汝等各有父母妻子與我俱死無益也儻敵人散去尚可還報天子者衆皆感泣不肯去遂俱死無一人生還上聞業死甚痛惜辛亥詔削美三任侁除名配金州文裕登州贈業太尉大同節度使賜其家布帛千匹粟千石録其子供奉官延昭等五人及貴子二人九月戊辰户部郎中張去華獻大政要録三十篇上嘉之降璽書褒美賜帛五十段去華初受命知陜州因留不行判刑部張佖上言望自今應斷奏失入死刑者不得以官减贖檢法官削一任長吏並停見任從之張佖上言本志在五月後今移見於此嘗有犯大辟者詔特減上謂佖曰朕以小人冒法原其情非巨蠧故貸死流竄亦足以懲艾之也佖對曰先王立法蓋為小人君子固不犯矣上以語宰相且歎賞佖以為知言冬十月丙申朔上出飛白書賜宰相李昉等因謂曰朕退朝未嘗虛度光隂讀書外嘗留意於真草近又學飛白此雖非帝王事業然不猶愈於畋遊聲色乎昉等頓首謝左拾遺真定王化基抗疏自薦上覽之謂宰相曰化基自結人主誠可賞也又曰李沆宋湜皆嘉士即命中書并化基召試庚子並除右補闕知制誥各賜錢百萬沆肥鄉人湜長安人時皆為著作郎直史館上又以沆素貧負人息錢别賜三十萬償之上尤重內外制之任每命一詞臣必咨訪宰相求才實兼美者先召與語觀其器識然後授之嘗謂左右曰詔臣之選古今所重朕早聞人言朝廷命一知制誥六姻相賀以謂一佛出世豈容易哉郭贄南府門人朕初即位因其樂在文筆遂命掌誥頗聞制書一出人或哂之蓋其素乏時望業已進用朕亦為之靦顔然亦終不令入翰林也甲辰以陳王元僖為開封尹兼侍中户部郎中張去華為開封府判官殿中侍御史陳載為推官並召見謂曰卿等朝之端士故兹選用其善佐吾子各賜錢百萬及去華就遷左諌議大夫又令樞密使王顯傳㫖諭以輔成之意陳載未見丙午改御前及書詔天下合同三印皆為寶戊午出御製新譯聖教序賜宰相李昉等庚申以黎桓為靜海節度使命左補闕李若拙國子博士李覺齎詔往使桓制度踰僣若拙既入境即遣左右戒以臣禮桓拜詔盡恭燕饗日以竒貨異物列於前若拙一不留盼又却其私覿惟取陷蠻使臣鄧君辨以歸桓謂覺等曰此地山川悠逺中朝人乍厯之不亦勞乎覺對曰國家提封萬里列郡四百地有平易亦有險固此一方何足云也桓默然色沮覺使交州實録在十二月辛巳今并書之是月詔祠部凡僧尼籍有名者悉牒度之又詔自今須經業精熟閲試及三百者乃許係籍太宗普度特放凡兩次太平興國七年及此年也實録不記此年事今追書之考試經業實録載其事於此月甲寅今亦附月末上留意字學以許慎說文差謬學者無所依據乃詔右散騎常侍徐鉉著作郎直史館句中正等精加讐校十一月乙丑朔鉉等上新定說文三十卷凡經典相承傳寫及時俗要用而說文不載者承詔皆附益之上稱善遂令模印頒行各賜器幣有差十二月乙未大雨雪上喜甚召近臣宴玉華殿謂曰春夏以來未嘗飲酒今得嘉雪殊慰朕心思與卿等同一醉也上以諸家文集其數實繁雖各擅所長亦榛蕪相間乃命翰林學士宋白等精加銓擇以類編次為文苑英華一千卷壬寅上之詔書褒答契丹將耶律遜寧號裕恱者以數萬騎入冦瀛州都部署劉廷讓與戰於君子館㑹天大寒我師不能設弓弩敵圍廷讓數重廷讓先以麾下精卒與滄州都部署李繼隆令後殿緩急期相救及廷讓被圍繼隆退屯樂壽御前忠佐神勇指揮使巨野桑贊以所部力戰自辰至申而敵援兵復至贊引衆先遁廷讓全軍皆沒死者數萬人廷讓得麾下他馬乘之僅脫死先鋒將六宅使平州團練使知雄州賀令圖武州團練使髙陽關部署楊重進俱陷於敵令圖性貪功生事復輕而無謀裕恱素知令圖嘗使諜紿之曰我獲罪於契丹旦夕願歸朝無路自投幸君少留意焉令圖不虞其詐自以為終獲大功私遺裕恱重錦十兩至是裕恱傳言軍中願得見雄州賀使君令圖先為所紿意其來降即引麾下數十騎逆之將至其帳數步外裕恱據胡床罵曰汝嘗好經度邊事今乃送死來耶麾左右盡殺其從騎乃縛令圖而去重進力戰死之初令圖與父懷浦首謀北伐一嵗中父子皆敗天下笑之重進太原人也丙午瀛州以聞廷讓詣闕請罪上知為繼隆所誤不責逮繼隆令中書問狀尋亦釋之契丹本傳以廷讓敗在明年春此大誤也東頭供奉官馬知節監博州軍聞廷讓敗恐敵乘勝復入冦因繕城壘治器械料丁壯集芻糧十有五日而具始興役官吏居民皆不悅其生事既而冦果至見有備乃引去衆始歎伏初契丹復自和爾郭入冦薄代州城下神衛都指揮使馬正以所部列州南門外衆寡不敵副部署盧漢贇畏懦保壁自固知州給事中張齊賢選廂軍二千出正之右誓衆感慨一以當百敵遂却走循胡盧河南而西先是齊賢約潘美并師來㑹戰居無何間使為敵所得齊賢以師期既漏且虞美衆為敵所乘俄而美有候至云師出并師行四十里至柏井忽奉密詔東路王師衄於君子館今并之全軍毋得出戰已還州矣於是北騎塞川齊賢慮敵知之乃閉其使密室中夜發兵二百人持一幟負一束芻距州城西南三十里列幟然芻敵遙見火光中有旗幟意謂并師至矣駭而北走齊賢先伏步卒二千於士墱寨掩擊大敗之擒其北大王之子一人斬首二千餘級俘五百餘人獲馬千餘匹車帳牛羊器甲甚衆齊賢悉歸功於漢贇己未漢贇以捷音來上上優詔褒答後知漢贇未嘗接戰與鈐轄劉宇皆罷為監門衛大將軍漢贇罷在明年八月甲午宇罷在庚子今并書
