body:
  text: 續資治通鑑長編巻三宋李燾撰太祖建隆三年春正月己巳命淮南道官吏發倉廪以賑飢民初戸部郎中沈義倫使吴越歸言揚泗飢民多死郡中軍儲尚百餘萬可貸至秋乃收新粟有司沮義倫曰若嵗洊飢將無所取償孰當執其咎者上以詰義倫義倫曰國家方行仁政自宜感召和氣立致豐稔寧復憂水旱耶上悦故有是命倫𫝊不載其年故事稱元年寳訓稱二年亦不知的是何日按倫於元年二月壬戌初除戸部郎中四月乙卯受詔分督在京諸倉則使吴越必在督倉以後安得尚指秋粟其稱元年者誤也稱二年者亦無所證據而此年正月乃有此命疑此即太祖用倫之言故載於此倫於此年十一月丙寅乃自戸部郎中除給事中庚午幸迎春苑宴射甲戌發開封浚儀民城皇城東北隅殿前都指揮使義成節度使武安韓重贇董其役詔諸州長吏勸課農桑自後或因嵗首必下此詔王偁東都事略詔曰民生在勤所寳惟榖先王之明訓也朕奄宅中夏為之司牧眷乃億兆期臻富庶矧農桑之業為衣食之原今陽令在辰土膏脉起當播種之云始慮㳺惰之尚多茍力作之不勤則秋歛之何望諸州長吏等任居牧守職司勸課所宜敦率黎庶勉勵農功俾比屋之人服勞於南畆三時之務無失於西成極其穮蓘之勤用致茨梁之詠懋功信賞國典在焉丙子加曹元忠兼中書令元忠子延敬案宋史延敬作延繼為𤓰州防禦使賜名延恭禁諸州鐡鑞錢及江南所鑄唐國通寳錢民間有者悉送官所在設棘圍以受之敢有藏隱許人陳告重寘之法庚辰女真國遣使濟古爾來修貢詔州縣不得役逆旅僑居民充逓夫癸未幸國子監丁亥以監察御史劉湛為膳部郎中湛奉詔𣙜茶于蘄春嵗入増倍遷拜越級非舊典也湛未見是月修西京古道峻隘處悉令坦夷二月庚寅令翰林學士文班常參官曾任幕職州縣者各舉堪為賔佐令録一人如有近親亦聽内舉異時貪濁畏懦職務曠廢者舉主坐之癸巳令諸道州府依法斷獄毋得避事妄奏取裁違者量罪停罰量罪停罰乃乾徳二年正月丁未詔今併列于此不復重出于彼甲午詔自今毎五日内殿起居百官以次轉對並須指陳時政得失朝廷急務或刑獄寃濫百姓疾苦咸采訪以聞仍須直書其事不在廣有牽引事關急切者許非時詣閤上章不得須候次對乙未滑州節度使張建豐免官仍配唐州坐甲仗軍資庫火也己亥詔竊盗贓滿五千足陌者乃處死蜀主以秦王元喆為皇太子令起居前導者皆呼殿下毋得斥言皇太子宰相成都李昊䟽其不可乃止元喆見乾祐三年昊見同光二年壬寅上謂近臣曰今之武臣欲盡令讀書貴知為治之道近臣皆莫對賜崔頌等酒果據實録在此年六月崔頌𫝊亦云三年夏始聚生徒而寳訓載武臣讀書事乃因賜頌等誤也今不取下史臣李沆等曰昔光武中興不責功臣以吏事及天已定數引公卿郎將講論經義夜分乃罷葢創業致治自有次第今太祖欲令武臣讀書可謂有意于治矣近臣不能引以為對識者非之丁未詔自今宰相樞宻使帶平章事兼侍中中書令節度使者依故事納禮錢宰相樞宻使三百千藩鎮五百千充中書門下公用仍於中書刻石記授上年月已經納者後雖轉官不在更納舊相復入者納如其數時中書門下言唐制凡視事於中書者納禮錢三千緡近頗隳廢乞舉行之故也甲寅北漢冦潞晉二州守將擊走之丙辰幸國子監遂幸迎春苑宴從官三月戊午朔控鶴右廂都指揮使尹勲削奪官爵配𨽻許州為教練使先是勲督丁夫浚五丈河陳留丁夫夜潰勲擅斬其隊長十餘人追獲亡者七十餘人皆刖其左耳有詣闕稱寃者兵部尚書李濤以病卧家聞其事力疾草奏乞斬勲以謝百姓濤家人曰公久病宜自愛養朝廷事姑置之濤憤然曰死者人之常吾豈能免但我為兵部尚書知軍校無辜殺人豈得不論上覽其奏嘉之然念勲素忠勇止薄責焉勲浚儀人也壬戌三佛齊國遣使朝貢癸亥分命近臣於京城祠廟禱雨甲子詔以沂州民飢賜種食丁卯幸太清觀遂幸開封尹後園宴射上謂宰臣曰五代諸侯跋扈多枉法殺人朝廷置而不問刑部之職幾廢且人命至重姑息藩鎮當如此耶乃令諸州自今決大辟訖録案聞奏委刑部詳覆之河南府判官盧文翼除名法曹參軍桑植奪兩任官有尼法遷者私用本師財物凖法不死文翼以盗論寘於極典故責之己巳大雨放百官朝乙亥遣使如江南賜唐主生辰國信物詔翰林學士班位宜在諸行侍郎之下熊克九朝通略詔學士班侍郎之上官至丞郎者即在常侍之上至尚書者依本班故事翰林學士侍從親宻不在外朝每五日起居班於宰相之後㑹宴即坐一品之前合班在尚書之上於是陶榖以禮部尚書為學士承㫖而同列李昉等官止列曹郎中榖乃因事建白而降此詔實自表異軋昉等也丙子權知貢舉王著奏進士馬適等合格者十五人丁丑女真遣使朝貢戊寅詔三司春冬送戍卒衣並官給車乗毋得調發民丁己卯封丘縣令蘇允元坐申雨降不實免官壬午有司上重定合班儀制升六曹侍郎在給舍上郎中在補闕上員外郎在拾遺上節度使在六曹侍郎上中書侍郎下故事北省官為侍從班五品押南省四品八品押南省五品節度使在諸司三品下於是改焉丁亥徙北漢降民於邢洺州計口賦以粟唐馮謐表求舒州舊宅及田詔賜之禁民以火塟王偁東都事略詔曰王者設棺槨之品建封樹之制所以厚人倫而一風化也近代以來率多火塟甚愆典禮自今宜禁之是月詔増官鹽䦨入至三十斤煮鹻至十斤坐死蠶鹽入城市百斤以上奏裁又修酒麴之禁凡私造差定其罪城郭二十斤鄉閭三十斤棄市民敢持私酒入京城五十里西京及諸州城二十里至五斗死所定里數外有官署沽酒而私酒入其地一石棄市此據本志初留從効既來稱藩聞唐主南遷疑將襲已頗懼乃遣其子紹錤重幣往謝又潛遣使假道吴越入貢紹錤至豫章而元宗之䘮已東歸元宗李景也今依資治通鑑法僣偽諸國皆即用其本號紹錤因抵金陵唐主留之上亦遣使厚賜從効未至而從効疽發背死少子紹鎡掌留務居無何吴越遣使聘泉州紹鎡夜召其使與之燕語統軍使陳洪進誣紹鎡謀叛欲以其地入吴越執紹鎡送於唐推統軍副使張漢思為留後已為副使陳洪進臨淮人初見開運元年張漢思亦見開運元年不著邑里留從効𫝊稱從効寢疾為牙校張漢思陳洪進所刼漢思自稱留後洪進為副而陳洪進𫝊乃稱從効卒紹鎡掌留務月餘洪進乃執紹鎡推漢思自相矛盾以他書參考洪進𫝊得其實而從効𫝊誤也從効病當在二年冬其死在今年春大定録于三月載從効卒然不知的是何日十國紀年亦不載日夏四月乙未詔奉使江南者毋得將其國所用錢過江北御史中丞洛陽劉温叟上䟽言伏見兩京百司漸乏舊人多隳故事雖檢閲具存於往册而舉行須在於攸司葢因年限得官歸司者例與減選冬集赴調授任者尋又出京兼有纔滿初官不還舊局但稱前資用圖免役又有嘗因停任竊欲歸司而元𠡠不該無由復職遂使在司者失於教習歴事者難於追還伏望自今諸司職掌除官勒留及歸司者如理減外欠三選已下仍須在司執行公事及三十月即許赴集如理減外欠三選已上及在官不成資考者即凖元𠡠處分若在任停官及在司停職有經恩後於刑部出給雪牒却勒歸司如無闕員即令守闕餘依𠡠格處分從之温叟初見聞運元年六月岳之子也丙申以前忠正節度使趙贊為彰武節度使贊别受宻㫖許便宜從事將至延州乃前後分置歩騎使緜緜不絶林莽之際逺見旌旗所部羌渾來迎莫測其數相視奪氣莫不畏服贊延壽之子也趙贊初見漢天福十二年戊戌幸太清觀庚子西州輝和爾阿道等來貢方物壬寅邢州言北漢民四百七十人來降乙巳皇兄光濟贈中書令追封邕王皇第五弟贈侍中追封䕫王賜名光贊故㑹稽郡夫人賀氏追册為皇后皇第三妹追封陳國長公主賀氏開封人公主宣祖季女與上同母未笄而夭戊申置鎮州百井寨北漢冦麟州防禦使楊重勲擊走之定難節度使李彝興遣使貢馬三百匹上方命玉工治帶親臨視之召其使問彞興腹圍幾何使言彞興大腰腹上曰汝帥真福人遂遣使以帶賜之彝興感服先是唐將士降者其家屬猶在江南五月丁巳朔詔唐王尋訪發遣甲子幸相國寺禱雨遂幸迎春苑宴射乙亥發潞州民開太行道通餽運丙子升青州北海縣為北海軍仍以内殿直督指揮使楊光美為軍使光美為政簡易民甚愛之後三年召還北海民數百人守闕下乞留詔諭之不肯去笞其為首者始罷光美文水人也河北諸州旱遣中使視之又命司勲郎中何幼沖等六人乗𫝊檢旱苖幼沖未見甲申幸太清觀又幸相國寺禱雨乙酉詔撤樂太官進蔬食詔縣令佐檢察差使務底均平或有不當者許民自相糾舉京百司補吏須不礙差役乃聽是月始大治宫闕倣西京之制命韓重贇董其役六月辛卯詔宿州發廪賑飢民秦州夕陽鎮古伏羌縣之地也西北接大藪材植所出戎人久擅其利及尚書左丞髙防知秦州因建議置采造務闢地數百里築堡據要害戍卒三百人自渭而北則屬諸戎自渭而南則為吾有嵗獲大木萬本以給京師於是西戎酋長尚巴約帥衆來爭頗殺傷戍卒防出兵與戰捕繫其黨四十餘人以聞上不欲邉境生事癸已以樞宻使吴延祚為雄武節度使往代防先一日謂廷祚曰卿久掌樞務年齒漸髙今與卿秦州庶均勞逸明日制出恐卿以離朕左右不能無憂故先告卿也周世宗之二年始營國子監置學舍上既受禪即詔有司増葺祠宇塑繪先聖先賢先儒之像上自贊孔顔命宰臣兩制以下分撰餘贊車駕一再臨幸焉按山堂考索載六月辛卯復幸國子監今此書未明載又考宋史及宋史記續通鑑諸書皆不載謹識以備考於是左諌議大夫河南崔頌判監事始聚生徒講書上聞而嘉之乙未遣中使遍賜以酒果尋又詔用一品禮立十六㦸於文宣王廟門據實録本紀及㑹要太祖以建隆二年十一月始幸國子監三年正月又幸而祖宗故事乃云元年正月初幸二月再幸因詔増葺祠宇塑繪聖賢其年月與諸書特異今不取若増葺祠宇塑繪聖賢則㑹要固以為國初事不縁幸監然後有此舉也故事葢誤耳頌協子初見廣順元年三月丁酉幸太清觀右補闕袁鳯坐檢田不實責授曲阜縣令鳯未見己亥徳音減京畿及河北諸州死罪以下囚旱故也壬寅雨丁未命吴廷祚齎詔赴秦州赦尚巴約等罪所繫戎俘並釋遣之賜以錦袍銀帶遂罷采造務乙卯幸迎春苑宴射秋七月己未禁諸州中元張燈庚申唐主遣客省使翟如璧來貢謝生辰之賜也如璧未見江南降卒其弱者不能軍壬戌歸數千人于唐乙丑知舒州左諌議大夫歴城馮瓚言州界有菰蒲魚鼈之利居民毎以自給前防禦使司超増收為市征漁奪苛細疲俗告病宜蠲除之上即從其請樞宻直學士司門郎中安平杜韡美風儀工尺牘仕周世宗居近職上章言事頗中時病然恃酒不遜上時典禁衛毎優容之於是罷為駕部郎中宰相擬授韡諌議大夫上不許乙亥斬文思使常岑子勲於東市勲少亡賴嘗詐稱供奉官至泗州為長吏所覺捕送闕下故戮之先是雲捷軍士有偽刻侍衛司印者捕得斬之上曰諸軍比加簡練尚如此不逞耶庚辰命搜索悉配海島於是姦猾歛迹己卯北漢捉生指揮使路貴等十一人來降並補内殿直辛巳遣給事中劉載等十一人按行河北諸州旱田詔朝臣出使還日具所見民間利病以聞右衛率府率薛勲掌常盈倉受民租槩量重詔免勲官配𨽻沂州倉吏棄市舊録以為二年事今從新録兖濟徳磁洺五州蝗八月丙戌朔𠡠大理卿范陽劇可久為光祿卿致仕可乆年逾七十無請老意上特命之新録云可久懇求休退國史亦同今從㑹要庚寅以鎮海鎮東節度副大使錢惟濬為建武節度使惟濬吴越王俶之子也俶請授以嶺南旄鉞上從之癸巳詔開封府捕蔡河務綱官王訓等四人磔於市以訓等用糠覈土屑雜惡軍糧為張義等所告故也賞義等錦袍銀帶是日遣引進使郭承遷㑹秦州吴延祚率兵往尚書寨驅蕃卒歸本部乙未左拾遺知制誥虞鄉髙錫上言近廷臣承詔各舉所知或有因行賂獲薦者請自今許近親奴婢鄰里告訴加以重賞又請注授法官及職官各宜問書法十條以代試判上皆施行之是月安復間有象食稼遣使捕之左領軍衛將軍杜審瓊昭憲太后之兄也與其弟審肇審進家于常山於是悉召赴闕九月丙辰朔以審瓊為左龍武大將軍審肇為左神武大將軍審進為左武衛大將軍並致仕賜第京師太后無恙時審瓊嘗先入見置酒萬歳殿上及皇弟光義以元舅故皆捧觴列拜稱壽詔及第舉人不得呼知舉官為恩門師門及自稱門生戊午天平節度使侍衛馬歩軍都指揮使同平章事石守信表解軍職許之特加爵邑庚午秦州言尚巴約獻伏𦍑縣地壬申詔左諫議大夫崔頌與中使盧徳岳等同修武成王廟仍委頌檢討唐末以來謀臣名將勲績尤著者以名聞癸酉以次對章奏下尚書省集官參詳其有禆政治可施行者以聞丙子占城國遣使朝貢禁民伐桑棗為薪又詔黄汴河兩岸毎嵗委所在長吏課民多栽榆柳以防河決癸未復置書判拔萃科國史于八月乙未即書復置此科今從實録葢乙未始令有司條具其施行實在癸未也甲申同州觀察判官徐光乗坐斷獄失實免官武安節度使兼中書令周行逄病革召其將吏以其子保權屬之曰吾起壠畆為團兵同時十人皆以誅死惟衡州刺史張文表文表朗州人初見廣順二年獨存常怏怏不得行軍司馬吾死文表必叛當以楊師璠討之如不能則嬰城勿戰自歸朝廷可也師璠與行逢鄉里姻戚事行逢為親軍指揮使數有功行逢委信之行逄卒保權領留務行逢崇信釋氏廣度僧尼齋懴不輟每見僧無老少輙拜之捧匜執帨親為煎洗因謂左右曰吾殺人多矣不假佛力何以解其寃乎據九國志保權以九月襲父位而實録於十月乙未乃書行逢卒葢因奏到之日耳今從九國志移附九月末十國紀年亦繫之九月冬十月乙酉朔始賜文武常参官服有司言故事所賜止將相學士及諸軍大校上曰不及百官甚亡謂也乃並賜之丙戌幸太清觀遂幸造船務觀習水戰戊子以棣州團練使何繼筠為關南兵馬都監癸巳有司上新刪定循資格長定格編勅格各一巻詔選人三十以下依舊不得入令録餘皆可己亥幸岳臺命諸軍習騎射遂幸玉津園廣濟縣令李守中坐贓決杖配海門島辛丑以樞宻副使兵部侍郎趙普為檢校太保充樞宻使按山堂考索作檢校太尉充樞宻使樞宻使不帶正官自普始也又以宣徽北苑使李處耘為宣徽南院使兼樞宻副使處耘前自揚州召還老幼遮道涕泣累日不得去張文表聞周保權立怒曰我與行逢俱起㣲賤立功名今日安能北面事小兒乎㑹保權遣兵更戍永州路出衡陽文表遂驅以叛偽縞素若將奔喪武陵者過潭州時行軍司馬廖簡知留後素輕文表不為之備方宴飲外白文表兵至簡殊不介意謂四座曰文表至則成擒何足慮也飲啖如故俄而文表率衆徑入府中簡醉不能執弓矢但箕踞大罵與座客十餘人皆遇害文表取其印綬自稱權留後事具表以聞保權即命楊師璠悉衆禦文表告以先人之言感激涕泣師璠亦泣顧謂其衆曰汝見郎君乎年未成人而賢若此軍士奮然皆思自効保權又遣使求援於荆南且來乞師文表亦上疏自理據渤海行年記張文表攻下潭州在此年十月而國史周保權傅乃云明年春葢誤也按實録十二月甲辰已遣趙璲持詔宣諭文表豈得却在明年春始叛葢明年正月文表尚據潭州耳辛亥畋近郊十一月丁巳令諸州屬縣各置敕書庫用宗正卿河間趙矩之議也矩初見天福十二年辛酉大閲於西郊癸亥詔羣臣使諸道無得私有請託違者當議其罪王偁東都事略癸亥詔曰古稱使于四方不辱君命可謂士矣自今使諸道敢有求託者寘其罪甲子又大閲於西郊上謂近臣曰晉漢以來衛士不下數十萬然可用者極寡朕頃案籍閲之去其冗弱又親校其擊刺騎射之藝今悉為精鋭故順時令而講武焉詔殿前侍衛兩司將校無得冗占直兵限其數著於令此事附見非因講武始下詔也先是案令文州縣官撫育有方户口増益者各凖見戸每十分加一分刺史縣令各進考一等其州戸不滿五千縣戸不滿五百各凖五千五百戸法以為分若撫養乖方户口減耗各凖増户法亦減一分降考一等主司因循例不進考唯按視闕失不以輕重便書下考至是有司上言自今請以減損戸口一分科納係欠一分已上並降考一等如以公事曠遺有制殿罰者亦降一等又言京官月限多少不等有以三十六月為滿者有以三十月者有以二十月住支料錢者有司逐年書校考第並無凖繩自今請應有曹局料錢京官並以三十月為滿内有合校考第者以此為限其料錢一依舊例月數支給並從之唐主遣水部郎中顧彞來貢彝未見刑部尚書范陽邉歸讜三上章告老授戸部尚書致仕荆南節度使高保朂寢疾召牙内都指揮使長安梁延嗣謂曰我疾遂不起兄弟孰可付之後事者延嗣曰公不念正懿王乎先王舍其子繼沖以軍府付公今繼沖長矣保朂曰子言是也即以繼沖權判内外軍馬事甲戌保朂卒保朂卒於十一月二十日從行年紀也國史亦同九國志乃在明年今不取丙子三佛齊國王釋利耶高麗國王昭並遣使來貢方物己卯畋于近郊壬午初頒厯于江南十二月丙戌左贊善大夫叚昭裔坐檢視民田失實責授海州司法參軍丁亥以武平節度副使權知朗州周保權為武平節度使贈龍捷左廂都指揮使江州防禦使馬全義為鎮國節度使全義寢疾上日遣醫診視中使勞問不輟且諭宻㫖曰候疾少間當授河陽節鉞全義時疾己革但叩頭稱謝及卒上為之流涕特加寵秩一子才七嵗召入禁中賜名知節補西頭供奉官仍優恤其家舊制強盗贓滿十匹者絞庚寅詔改為錢三千足陌者處死景祐二年八月又改癸巳詔中書門下每縣復置縣尉一員在主簿之下俸祿與主簿同凡盗賊鬬訟先委鎮將者詔縣令及尉復領其事自萬户至千户各置弓手有差五代以來節度使補署親隨為鎮將與縣令抗禮凡公事専逹於州縣吏失職自是還統於縣鎮將所主不及鄉村但郭内而已從樞宻使趙普之言也此據普行狀本志及㑹要云太平興國二年禁藩侯補親隨為鎮將自此用本州牙吏為之亦有宣補者與此頗相關當考戊戌蒲晉慈隰相衛六州饑詔所在發廪賑之庚子有司上捕賊條詔頒行之給以三限限各二十日第一限内獲者令尉各減一選獲踰半者減兩選第二限内獲者各超一資踰半超兩資第三限内獲者令尉各加一階踰半加兩階過三限不獲尉罰一月俸令半之尉三罰令四罰皆殿一選三殿停官令尉與賊鬬而盡獲者並賜緋尉除令仍超兩資令别加陞擢甲辰遣中使趙璲等齎詔宣諭潭朗聽張文表歸闕且命荆南發兵助周保權上以西鄙𦍑戎屢為冦鈔選授虢州刺史姚内贇為慶州刺史内贇平州人也内贇初見顯徳六年四月上謂近臣曰安邊御衆須是得人若分邉寄者能禀朕意則必優恤其家屬厚其爵祿多與公錢及屬州課利使之固圉特免税算聽其召募驍勇以為爪牙茍財用豐盈必能集事朕雖減後宫之數極於儉約以備邊費亦無所惜也據經武聖略建隆三年太祖有是言因姚内贇捍西邉附見此是嵗周鄭王出居房州新舊録並稱鄭王以建隆三年出居房州王皡唐餘録乃云鄭王以開寳三年自西宫出恐誤也今不取河北陜西京東諸州旱蝗河北尤甚悉蠲其租蜀主命官磨勘四鎮十六州逋稅自廣政十五年至二十年别行追督龍遊令成都田淳上䟽諌其略曰今甲子欲交隂陽變動天運人事合有改更如采厚歛之末議必亂經國之大倫此犯天意者一也太一所行將離分野初來為福末去為譴轉災作福是宜早圖若更倍賦加租則將有不測之禍此犯天意者二也四海財貨盡屬至尊散在民間積為貲産或有科索誰敢抵拒陛下何不舍其小畜以成大有乎此損君道者一也夫百姓六軍之主也百姓足則軍莫不足百姓不足軍孰與足務奪百姓専贍六軍此其損君道者二也蜀主不能用淳每謂所親曰吾觀僣偽改㕔堂為宫殿改紫綬為黄服改前驅為警蹕改僚佐為卿相改妻妾為妃后何如常稱成都尹乃無滅族之禍乎聞者皆為之恐淳論議自若或謂淳曰如君之才固堪重寄宜稍低抑便至金鑾玉堂淳曰吾安能附狗䑕哉葢指樞宻使王昭逺軰也王昭逺初見乾祐元年南漢許彦真既殺鍾允章益恣横惡龔澄樞等居已上頗侵其權澄樞怒㑹有告彦真與先主麗妃私通者澄樞發其事彦真懼與其子謀殺澄樞澄樞遣西班將軍王仁遇告彦真父子謀反下獄族誅之鍾允章見乾祐元年許彦真見顯徳六年南漢主納李托二女長為貴妃次為美人皆有寵拜托為内太師政事必先禀托而後行李托見顯徳六年
