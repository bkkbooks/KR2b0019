body:
  text: 續資治通鑑長編卷二百七十四宋李燾撰神宗熙寧九年夏四月丙戍朔上批付郭逵等近據廣西轉運使李平一奏將來大軍進討合用般糧人夫四十餘萬乞自湖以南一例差科前去顯是張皇驚動人情傳聞逺近上達朝廷深為不便卿等可多方計度的確合運致兵食人力數目疾速以聞逵言契勘平一所奏約兵十萬人馬一萬匹月日口食馬草料計度般運腳夫四十餘萬况入界討蕩交賊巢穴難以指凖一月為期若更寬剩計度又恐費用轉多今計度將來入界隨軍糧草除人馬量力自負及於出産處買水牛䭾米其牛便充軍食如軍食不闕即充屯田耕稼使用可減省米及腳乘并將九軍輕重不急之物權留量差禁軍相兼充火頭等亦不妨戰鬭可那廂兵或用小車騾子往來䭾載及將不得力馬更不帶行如此擘畫可於平一所奏合用般糧人夫內減一半外只以二十萬人節次般運供軍食用及候本司到彼更有可以裁減處别具奏聞此據郭逵家所有征南一宗文字四月初一日詔下十一月奏報今附見要知行軍極費經畫也丁丑詔工部侍郎致仕王獵乃先帝藩邸舊臣可特以全俸實錢給之故事致仕官俸給陳敝物其直十得四獵以篤老自陳願賜二分直免給物故有是詔詔大燕宗室皇伯叔父兄官卑不當坐者免侍立永興軍等路轉運使皮公弼言比者改鑄私錢悉為省樣盜鑄屏迹人情少安今又許通使私錢恐盜鑄復起錢色經久難辨詔三司指揮汪輔之所簡可用鐡錢未得通行先具數以聞二月二十七日遣汪輔之如熙河六月二十五日周尹云云可考詔諸路弓箭手因戰功補殿侍以上其田皆聼自隨起租課如災傷毋得一例減放從涇原路經略司請也閣門言嘗押伴臣寮如夏國使人到闕遇起居燕乞並令暫依曾借章服從之詔令定州真定大名府路安撫司以河北西路守城兵依東路例具轄下州軍縣寨合守禦人數以聞殿前都指揮使郝質等言往軍器監與權判監劉奉世等㑹議軍器上批殿前馬步軍三帥朝廷待遇禮繼二府事體至重寺監小官豈可呼召使赴期㑹尊卑倒植理勢不順自今止令移文定議七年正月十二日吕惠卿云云可考戊子命權御史中丞鄧綰同流內銓官注擬新賜及第進士第三甲以上官都提舉市易司言熙河市易錢本闕乏詔在京市易司發物貨計直十五萬緡熙河市易司貨易見錢為本其物貨却於截到發運司錢內除破相度措置熙河路財利大理評事孫逈言熙州糴場自去年十一月至今年正月缺入中斛斗商人劉義等四百二十户錢鈔共四萬一千三百六十餘緡又本路總管王君萬等三十二人拖缺煕河兩州結糴十四萬六百三十餘緡銀三百餘兩詔遣權提㸃開封府界諸縣鎮公事蔡確乘驛劾秦鳯路轉運司及煕河路官吏以聞後二日逈遷太子中舍權秦鳯路轉運判官二月乙巳巳差官劾治結糴十年正月戊子君萬等責中書户房言張頡前任江淮等路發運使在官二年真揚州運河乾淺不治及有㫖令開浚頡乃兩奏河道雖淺併力牽挽可行若續得雨更不須浚至時未雨即乞開修又通泰運鹽河艱阻中團渦巡檢范彥臣乞放陳公塘水入運河頡亦不聼致諸路闕鹽及御史中丞鄧綰言朝廷遣侯叔獻開修運河未六七日已言兵夫流離死亡者衆飛語上聞豈有方興功役遽致死亡如此之多乞推治造言之人正其欺罔之罪詔罷張頡秦鳯路轉運副使令開封府界提㸃司取勘以聞初頡既不修運河恐叔獻功成而已過益彰乃為謗語對樞使吳充嘗及之至是因綰有言朝廷并命推勘而頡乃更抵以為無有勘司以事干大臣且無他證佐故奏禀於上詔除此一節不推後八月具案上乃止坐開河事除頡知嶽州此與二月二十七日上批相關贈雍州司理參軍任扆虞部郎中廣州南海縣尉雍州管勾溪峒文字王覺職方員外郎三班奉職知七源州儂文富西京左藏庫副使三班借職容州指使王達曹肱並供備庫副使三班差使程瓌黃光安黃仲甫並內殿承制殿侍張巽內殿崇班扆等皆為交賊所害故也己丑省禮賓院先是詳定庫務利害所言禮賓院事務全少亦無支納每諸蕃進奉人至自專差官置局主領逐時販馬自押赴羣牧司本院司屬縱有行遣實亦文具因緣取賂以困逺人乞令本院量合用公人立為定額增其請給因事受錢者以近河倉法坐之庶絶其弊詔下三司施行於是併廢其官請行倉法乃六年八月三日事此據㑹要並書之禮院言遼使告哀故事待制以上至宰臣弔於都亭驛黑帶去魚繫鞋今遼使在館聞哀請如故事從之時雄州言遼國母以三月六日卒故也詔河北西路轉運判官李稷具析在任不法事跡以聞本路察訪司言稷賦性刻薄所為輕率挾恃權勢恣為凌侮措置乖違多任已意一道官吏鮮不苦之又外都水監丞程昉亦言稷僣易侵越職事故也廣南西路轉運司言乞下京西南路借江州車一二千兩以備運糧詔京西路轉運司開封府界提㸃司共括千兩以往庚寅上批零賣熟藥宜罷恐太傷鄙細四方觀望有損國體他事更有類此者亦與指揮時太醫局賣熟藥而市易司出錢買之復使零賣故降是詔已而執政進呈不行是日上與輔臣論營陳法以謂為將者少知將兵之理且如八軍六軍皆大將居中大將譬夫心也諸軍則四體也運其心智以身使臂以臂使指攻其左則右救攻其右則左救前後亦然則兵何由敗也廣南東路轉運副使許彥先言已召募安南效用土人十人為一保二十人為一大保具鄉貫來歷以防姦詐都提舉市易司言支金六千兩應副安南及支物貨五十萬緡與淤田水利司作糴本皆無撥還指揮今上界闕錢本乞攴末鹽鈔五十萬緡貿易為本從之察訪荆湖南北路蒲宗孟言沅州官田并山畬園宅等荒間甚多聞全永道邵州人户往請射其官吏以既籍充逐處保甲遂令遣歸况保甲本欲籍其彊力督姦盜若捨貧就富固當從所欲乞下諸處如人户往沅州請田土毋得以保甲為名勾抽從之辛卯遼主遣興復軍節度使耶律庶針按宋史庶針作庶幾太常少卿史館修撰韓君授遼國母遣崇義軍節度使耶律測太常少卿乾文閣待制館修撰杜君謂來賀同天節以聞遼國母之喪罷置酒是日測等已對詔以聞遼國母之喪罷垂拱殿燕及歸館命以涿州公牒示之仍宣諭輟同天節上夀罷大燕令測等成服於開寶寺福聖院詔宰相以下及從官往慰令學士院别撰與遼主書謝國母遣使及致感惻之意更不報國母書中書覆奏劒南西川節度掌書記司農寺勾當公事王定國上殿上批宜且更試以事審觀其才未須令上殿翌日進呈卒依中書覆奏前提㸃福建路刑獄李景亮言福建路自泉至漳州汀州皆涉瘴煙馬遞鋪卒三年一易死亡大半亦有全家死者深可傷憫乞自今瘴煙地馬遞鋪卒一年一替從之詔省熙河經略司書寫機密文字等官又詔故龍圖閣直學士王廣淵被遇先朝令遺恩外更官其孫二人去年十月二十九日卒知岷州种諤言乞預借本錢五萬緡回易息錢充公使犒設從之奪刑部員外郎向宗儒一官罷中書檢正官權同判將作監依舊修內諸司式宗儒坐私役將作監吏令主錢物吏因而賖放減刻在監役人請受故有是責吏皆刺配五百里牢城三月二十三日謝景溫劾宗儒司農寺言河北東路提舉司計置斛斗若依朝㫖盡運致往澶州大名不惟費腳乘不少兼恐逐處歲支不多反致陳損乞令分於近河及屯兵州軍樁管從之仍令不得過元指定州府二百里癸巳以及第進士徐鐸為大理評事簽書越州判官王任為卭州判官陳師錫為昭慶軍節度掌書記任成都師錫建州人也詔安南道招討司荆湖廣南宣撫使司令隨軍轉運司官多齎金帛隨軍遇有降附州峒即優價博糴糧草甲午熙河走馬承受長孫良臣乞給錢帛及時博糴夏麥中書户房言近提舉市易司已發物貨十五萬緡為熙州市易本錢今欲令市易司增五萬緡以十萬輸熙州十萬令在京市易司入中本路糧草從之乙未同天節以遼國母之喪輟上夀羣臣及遼使詣閣門拜表稱賀丁酉詔春銓試中稍優二人與堂除差遣中等二十一人京官與先次差遣選人不依名次注官下等五十人與注官換官者凖此詔右千牛衛將軍叔諄貸死免除名奪一官勒停坐杖殺直兵也䕫州路轉運副使董鉞乞於施黔二州募義軍千人赴安南從之仍令人給路費錢十千以鹽折之可并二月十六日詔丁憂人樞密直學士孫永朕藩邸舊臣家貧族衆今又罷俸可特給月俸添支詔聞交賊多遣姦人偵事於二廣令宣撫司指揮將官所至審察教閲無聼人縱觀免窺覘擊敵進退之法詔河東河北陜西等路奏舉武舉並須土著人戊戌勾當三班院右諫議大夫程師孟為給事中集賢院修撰以知廣州代還推恩也詔廣濟河依舊行運復置京北排岸司官天聖六年七月熙寧七年十月八年十二月可考荆湖等路察訪蒲宗孟言湖北路保甲無一縣稍遵條詔應排保甲村疃並以大保都保止於逐村編排更不通入别村全不依元降指揮其監司違法官乞施行詔編排保甲不當職官并提舉官並上簿成都府利州路鈐轄司言已遣綿州都監王慶蜀州都監孫青等率兵討茂州蕃賊詔鈐轄司體量入寇因依以聞茂州舊領羈縻九州皆蕃部也蕃自推一人為州將常在茂州受處分茂州舊無城惟植鹿角蕃以昏夜入州剽掠民家六畜及人茂州輒取貨於民家遣州將往贖之與之講和而誓習以為常民甚苦之及李琪知茂州民投牒請築城繞民居凡八百餘步琪請於朝上是琪議下都鈐轄司相度㑹琪罷去琪奏在八年七月二十一日大理寺丞范百常代之百常謂城可築蔡延慶以聞詔令築之既而蕃部羣訴於百常稱城基侵我地乞罷築百常不許訴者不已百常以梃驅出三月己卯始興工而靜州將楊文緒結連蕃部以叛衆數百奄至茂州兵才二百人百常帥以捍擊蕃衆死者數人遂散去百常遷民入牙城明日蕃數千衆四面大至悉焚鹿角及民廬舍引梯衝攻牙城矢石如雨百常乘城拒守後五日其酋長二人為櫑木所斃衆乃退既而屢來攻城皆不克然遊騎猶繞四山城中人不敢出茂州南有結總關路通永康軍北有隴東路通綿州皆為蕃所據百常募人間道詣成都及書木牌數百投江中告急求援於是延慶遣將分路以討之熊本云云附此月二十六日王慶等敗時庚子大理評事同提舉秦鳳等路常平事馬城為太子中舍權發遣江南西路轉運判官王韶言城捃拾煕河官吏故徙之八年十二月九日王韶言城捃拾熙河官吏城徙江西或由此五月十四日王安石云云可證據也壬寅上批宗室女前洞真宫道士趙道深昨以罪降送瑶華宫近經赦已許依舊其兄隨州團練使克淑本緣道深致罪尚挂吏議當展年磨勘宜特與除落先是道深私禱宫官及賂吏求與克淑相見故皆得罪至是原之宣徽使王拱辰言乞凡儀制視簽書樞密院裁定詔令閣門詳定取㫖已而閣門請宣徽使侍殿值中書密院合班問聖體及非次慶賀並預乞修為令從之同判都水監劉璯兼都大提舉制置淮南運河知都水監丞耿琬兼同提舉癸卯詔廣南陳亡及陷賊士卒居民為交賊破蕩殺戮見存人户令廣西轉運安撫司同具户口數及議所以賑恤之以聞都水監丞司言相度於許村港連接魚肋河築堤委是利便見已興修甲辰令官告院給空名國子博士殿中丞衛尉寺丞大理評事內殿崇班供備庫副使告身各九十二道付安南以招降賞功詔聞交趾頻出省地揭榜逼脅溪洞之民令歸附其有迫近外界無從逃避者令宣撫司差使臣密諭首領如大軍未至勢力不加但外從賊黨隂為間諜既可以保全老幼亦足為官軍內應候招討一行至彼共力破賊朝廷爵賞必不吝惜據六月三日附日録六月八日事則且令溪洞附賊乃溫杲之謀也當考四月十九日可并考宣撫司言已發經略司右第一將兵雍州駐劄以備緩急詔雍州城壘未完糧道未備今正霖雨煙瘴之時賊若再來一將軍馬或未能當即更致墮賊姦計令宣撫司再審度指揮丙午户部副使度支郎中王克臣為遼國母祭奠使西上閣門副使張山甫副之太常丞集賢校理蒲宗孟為遼國母弔慰使西上閣門副使王淵副之屯田員外郎知彭州吕陶言交趾寇廣西若外結南詔為黨深可憂慮乞黎雅戎瀘施黔等州皆預為之防又乞廣招土軍藩鎮三千防禦團練州三千餘皆千人精訓練以備吐蕃成都路每一州或一縣有錢數萬緡米糧萬斛年年滋息不可勝計州有城有兵深藏固守縣既無城壘又少兵屯萬一盜賊乘而取之其何以禦今欲皆為之城乞委轉運提舉司㑹逐縣錢榖支一年外餘悉歸之州郡倍增弓手每萬户置百人以防盜賊今若招土兵數未足則莫若多募弓手閲習既久籍而為卒彼亦願從况月募之直人不過四千比之養兵費亦相稱詔所言常平錢榖歸州郡令司農寺詳議修入一路常平敕餘不行其後詔諸邊逺及荒僻縣鎮城寨常平錢委提舉司除留給散外餘悉送州廣南西路轉運使李平一言安南宣撫司牒臣隨行餉軍乞下湖南廣東發平底船千隻雇水手運載錢榖及乞先發兵控扼太平永平寨所貴運糧無虞從之其發兵令經略司相度施行詔省永興軍掌機宜官先是知永興軍羅拯奏乞范育充職而上以永興內地既無邊事又軍馬不多故有是詔時育已從郭逵辟為安南道掌機宜官至潭州奏論交趾事勢略曰朝廷宜講所以輕治緩救之䇿制勝於萬全不當為重且急之謀又曰治大以重雖無事不可緩者西北守邊是也救緩以輕雖有警不可急者征討安南是也遂辭疾歸御集九年四月二十一日永興軍路安撫使羅拯奏辟殿中丞薛昌朝充本路安撫都總管司機宜文字昌朝已差充安南道都總管司機宜文字患未得安難為逺去欲乞降指揮充本路掌機宜文字御批永興軍係近𠂻既無邊事又軍馬不多機宜官可減罷更不差人據御集則薛昌朝實先差充安南機宜非范育也而實録乃以薛昌朝為范育昌朝墓表育所作載昌朝先從郭逵辟掌永興機宜相繼事曽公亮吳中復又從逵辟於太原以葬告歸逵南征又辟掌機宜昌朝病不能赴後乃從李承之于鄜延初不載昌朝為羅拯所辟而育集又有到潭州論安南用兵狀行次長沙辭疾北歸詩則實録亦必非誤或郭逵俱辟昌朝及育但昌朝不行育既行又歸耳御集與實録皆當不誤今兩存之舊録云中書奏罷之蓋昌朝及育皆為王安石所惡故也今但存詔語詔賜通逺軍錢萬緡令回易收息以助公使又詔福建轉運常平司於年計及役剩等錢內支撥修築泉州外城丁未體量成都府等路茶場利害劉佐言商人販解鹽入川買茶至陜西獲利甚厚欲依商人例歲以鹽十萬席易茶六萬䭾約用本錢二百一萬緡比商賈取利皆酌中之數禁商人私販從之仍以佐提舉成都府利州秦鳳熙河等路茶場兼熙河路市易司尋又以佐兼提舉買馬兼買馬乃二十五日事今并書戊申都提舉熙河路買馬司言監牧司闕之見缺市易司錢物而市易司欲俟還足方肯應副買馬遞相推倚實誤博馬日用欲乞馬價盡用茶貨折之若馬客願貼錢就場請茶者亦聼候所貼見錢數多即許與茶兼支庶幾公私兩便其年額博馬茶貨乞令茶場司度合用數支撥與四場候數足然後以剩數撥與轉運司糴買糧草從之仍指揮以川路應副京西紬絹綱內所截留充本路買馬十萬匹支費盡撥與熙河路添助買馬如川路闕錢買馬却令攴成都府路坊場剩錢添助資政殿學士知渭州馮京知成都府龍圖閣直學士知成都府蔡延慶知渭州先是延慶一日三奏茂州蕃部千數把截官路已三遣將官分領人兵討殺詔以延慶奏陳措置前後已似惶擾中書樞密院宜同議可與不可倚仗了此邊事無或轉致乖錯别生巨患故以京代之仍兼成都府利州路安撫使罷比部員外郎汲逢提舉熙河路蕃部依舊同提舉成都府利州秦鳳熙河等路茶場中書言川路買馬既少且弱兼據逐路官司言榷茶修路等事於邊計蠻情皆不便欲罷提舉買馬官其纍降買馬榷茶指揮更不行從之八年正月十二日蔡延慶云云八月一日詔云云知成都府蔡延慶言乞發陜西兵五千援茂州候兵馬集欲自將以往令轉運使攝府事詔朝廷已遣將部兵䇿應令延慶務在持重毋得輕出是日詔梓州路發兵千五百人赴成都此據御集鄜延路經略司言西人侵耕綏德城生地詔綏德城本以界堠與西人分定疆至今所耕地既在本界堠之外自不合爭仍具因何有兩不耕生地以聞五月十五日可參考已酉復導江縣為永康軍以武臣為軍使兼知縣事仍屬彭州以上批永康軍正控西山六州軍隘口昨據張商英奏請廢為導江縣若非軍官實不足彈壓可令復舊故也詔應朝省寺監遣官出外安撫體量察訪及勾當公事等如有措置乖方及違法等所在監司州郡長吏並密具以聞如有隱庇别致發露量事輕重取㫖措置熙河財利孫逈乞移通逺軍市易務於秦州罷秦州通逺軍永寧寨市易三外場熙河通逺三茶場可省官吏五十餘人詔劉佐相度以聞庚戌秦鳳等路轉運司言前管勾熙河蕃部司文字臨涇縣令張維賒與民錢十五萬四千二百餘緡止收及六萬八千一百餘緡其所缺負未知所在乞下安州追張維赴熙州識認缺户催納詔蔡確就置院重根治其張維令開封府差人轉押前去四月三日遣確詔兵部勾當公事選留五員餘減罷今後令兵部舉歷任人候諸路義勇保甲上畨日取㫖增官又詔河北河東等路義勇保甲令於巡檢縣尉下上畨第減放兵級弓手其上畨人並半月一易自上畨三日後每二日一次取二分事藝精熟人先放歸至三次止仍不得放過充填逐處所減兵級弓手人數每年於農隙之月并下畨人令巡檢縣尉聚教五日其替下巡檢兵級即於本路兵額內豁除更不招補其所減兵級弓手舊合支錢物委監司勾收封樁每季具數申兵部中書㸃檢以備移用賈人郭永言牛皮筋角慶厯中嘗禁止至皇祐弛禁逮今三十餘年無闕誤近軍器監請禁通商并立告賞盡科違制今官庫自禁法行比通商日所買皮角數已倍少且農家以牛為耕種之本今其斃死更為條限趣其剝納道路往復官司留滯所費極多稍稽違又有告賞法不獨害其農事欲乞盡罷禁法若軍器所須取辦臣等以開農人商販之利上批筋角之禁公私皆病郭永所陳頗為詳盡中書樞密院可同詳議許令復舊其後遂詔府界京東西並令通商辛亥遣內侍押班王中正體量成都府路邊事始蔡延慶欲用兵討蕩蕃賊恐轉運司不肯給兵費因奏乞近上內臣同處議故中正被遣蔡延慶言茂州賊勢滋盛乞發兵將應援詔王中正於陜西選募諸軍千人初延慶分遣兵將救茂州孫青自結總關往賊伏兵殺之士卒多死傷王慶自隴東道入時州蕃酋請降從者殺其二子蕃酋怒密告靜州等蕃部使遮其前而自後驅之壅溪上流慶兵半涉而决之衆溺幾盡慶遂戰沒慶戰沒不得其時今附此孫青事實録乃無之當考成知彭州吕陶四月十九日奏乞自朝廷選差兵官云都路駐泊有武勇曽經戰陳惟只是劉圭王慶孫青三人近日行軍皆已陷沒據此可見司馬記聞所記孫青敗死事不虛也六月五日己丑十月十二日乙未又有劉圭事圭敗死亦在四月十九日以前矣熊本集有題跋茂州事宜陳忱書今附注此忱書云初因前權州屯田李琪建言於川尹請展築城今知州中舍范百常從而和之或云諸公皆協議川尹遂稱得㫖於今年三月二十三日興工於城外取土蕃將訐於州漢城不當使蕃土范捶之遂歸自經二十五日靜州下蕃部董阿丹率衆逼城攻燒旁城人户大掠而去鈐司以狄咨自導江路郭固自石泉路領兵進討四月八日先鋒左藏劉圭崔昭用供備王慶并其子侍禁張乂徐仕用奉職任慶帶兵一千於地名郭溜口陷沒此係郭固頭下九日先鋒供備孫青崇班馬文秀方中正進至汶川縣為土人攝知縣張仁貴設伏以待青死之馬方重傷免此係狄咨頭下二十三日霸州與賊講和賊遣十人來㑹盟仁貴在焉霸州捕獲送成都先是鈐司以班行并錢五百貫購仁貴郭固退守石泉狄咨還成都張克明代之三十日有蕃部時州首領開朗來投稱帶得茂州知州范中舍手書與鈐轄崇儀通判駕部仲諶見在軍前計置糧草云開朗元初來劉太保圭處要打誓太保不肯殺我蕃部三人為見如此實却相拒所還太保交椅洗鑼并馬一十五匹若許我打誓情願引路至茂州固等與茶綵遣之以未得朝㫖及已殺將官不敢許盟蕃部亦云須得朝㫖方解去又聞捕得姦細人說其初董阿丹欲攻州城有老將止之云漢家州切不可攻破官中不容我輩居此自後有近城蕃部鏗鏗家於州城後面臺盤山引水入州并本州見有築城糧米三千石尚可堅守蜀人始為其結連河外作過頗以驚恐既知止是旁州熟户蕃部及見朝廷易帥命中人亷按遂已寧靜觀其始末蕃部人無大惡從初若且購募邊人入蕃說諭或許以罷築或許之償直不必舉兵或須率兵問罪亦當嚴戒諸將不得輕敵妄進豈復有今日之患所聞如此忱拜覆又一說郡將以漢法治蕃部人心頗携二先因捕劾巫者數人一胥魁受財逃逸遣人追攝部落二三十人拒使者後竟禽獲胥魁并拒者解鈐司各黥配近裏州軍因築城遂為變本題跋云熙寧七年春余在江安檄召成都鈐轄賈昌言領兵入界昌言以王慶父子張乂孫青自隨余却之不聼即以𨽻昌言頭下賊平例皆遷秩徐仕用者醫官之世也常為隨州監押韓璹多使之來求效用余弗之許也明年余再被敕安撫䕫州路且治渝南夷事所用將佐皆瀘南立功者時王慶輩尚在蜀亦請自效賈昌言方管勾中軍數以為言余語昌言兹五人者皆勇而寡謀者也昔之天幸不可以常今方用之必誤余事遂止及歸道出左綿慶為駐泊都監頗以為怨余謝之而己未幾西川出師討茂州熟户慶輩首預其行即為羌賊所陷悲夫凡軍中隊將而上不可專用拳勇者此其鍳也余初至梓䕫奏辟崇班王達至東川見舊監押馬仲通後皆斥去不用後二人者亦以事敗庚申四月二十六日伯通記書延慶又言臣纍牒保霸州領所部兵䇿應而霸州不來疑與賊通臣體察乞行討蕩次詔保霸州慮事力不足難責其應援方有邊事正當安恤鈐轄司毋得妄有逼迫别生他變壬子河北四路安撫使司上清野備敵入保守拒條詔送熊本看詳刪修成法以聞癸丑王中正言軍事令臣與成都府利州路鈐轄司同議如臣發赴軍前有經制事若移文往復恐失事機詔中正候到軍前一面經制訖牒報鈐轄司中書門下言户房申據三司狀為解鹽通商事省司令客人張戡等供析乞將南京河陽等處且令官賣自再行法日至將來及一年以解池支出官賣鹽席比較勘㑹雖據張戡等稱管城等十一縣并南京河陽陜府同華衛州自來客販數多並無照據蓋為見今來私鹽衰息欲占為客販地分若令客販即難依新法招募巡鋪公人不免私鹽奪官課欲乞將唐鄧襄均房商蔡郢隨金晉絳虢陳許汝頴隰州西京信陽軍二十處令客人興販其府界諸縣并澶曹濮懷衛濟單解同華陜州河中府南京河陽等處令提舉解鹽司出賣或逐處先有别司鹽户在彼出賣未盡並令出賣解鹽司支還元價惟是本路轉運司必以所收課利合應副本路支用為說即乞候官賣一年令三司約度所收官賣鹽錢立若干額撥還本路自來合得課利餘令三司隨處封樁詔從之此據㑹要乃九年四月二十八日事今附見明年三月十六日丙寅三司再奏并九年二月十七日定可賣鹽州縣當參考商食貨志第五卷九年三司用商人議以唐鄧襄均房蔡郢隨金晉綘虢陳許頴隰州西京信陽軍通商畿縣及澶曹濮懷衛濟單解同華陜州河中府南京河陽令提舉解鹽司運鹽賣之司馬記聞云張景溫賣鹽法弊邊儲失備朝廷疑之召陜西東路轉運使皮公弼入議其事公弼極陳其不便有詔與三司議之三司使沈括希王安石意言景溫法可行恐即此時也然記聞所載多抵牾已具辨之八年閏四月十八日己酉十二月十一日又詔三司講求利害上批勘㑹河東地界非久分畫了當深慮沿邊守把居住軍民忿見賊人占據素間樵採之地𠂻私遞相糾率越界依舊取打薪芻却致引惹不得安靜宜預密下經略司仰嚴行誡諭城寨地分當職官常切覺察不得小有犯違此據御集九年四月二十八日下甲寅遼主遣林牙臨海軍節度使耶律孝淳來告國母之喪是日上發哀成服於內東門羣臣進名奉慰輟視朝七日遼使見於幕殿續資治通鑑長編卷二百七十四
