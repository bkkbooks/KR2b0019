body:
  text: 續資治通鑑長編巻五十二宋李燾撰真宗咸平五年五月丙申朔詔文武官年七十以上求退者許致仕因疾及歴任有贓犯者聽從便時告老者例得遷秩令録即授朝官並給半俸主客郎中謝泌上疏請甄别之乃降是詔戊戍封宣慈長公主為魯國長公主出降左衞将軍駙馬都尉柴宗慶宗慶禹錫之孫也特升其行令禹錫子之西南蕃王龍漢􅚜遣使來貢方物庚子馮拯陳堯叟言與孫冕同省去三司積滯文帳及諸州無例施行文字二十一萬五千餘道減河北勾當京朝官使臣幕職七十五員時以聚兵防邉供饋甚廣乃命本路轉運使條經費之數大凡出多而入少上慮河南民輸送益勞弊故令籍州縣之少戸口及數員共釐一務者并省之四月五日拯等初領此事壬寅國子博士知榮州禇徳臻坐與判官鄭蒙共盗官銀徳臻杖死蒙决杖配流先是本州勾押官趙文海勾有忠知徳臻等事因諷主典曰官帑之物輙以入已一旦敗露必累吾輩徳臻等聞之即與之銀一鋌以滅口至是事發議罪判大理寺朱摶言文海等恐喝贓滿合處死審刑院以為䝉盗官銀尚從流配文海等只因揚言安可極法乃下其状尚書都省集議既而翰林學士承㫖宋白等議請如審刑院所定從之朱摶未見詔集近京諸州丁壮選𨽻軍籍時西北邉臣屢請益兵輔臣請以河北强壮充選上曰河北河東之民取而為兵其數已衆前年初置强壮嘗諭以永不充軍一旦籍之是失信也吕䝉正等曰闕兵非取於民不可得請於河南諸州籍丁壮量數抽取上曰如此必有騷動然戍卒未充衛士尚少不得已也既而中書樞宻院列状以聞請從前議乃可之丙辰又籍振武軍癸夘徙憲州於静樂縣廢静樂軍代州言進士李光輔善擊劔令詣闕上曰若奨用此民間悉好劔矣賜食遣之甲辰詔舊制内臣許養一子因循浸久頗聞踰法其令宣徽院置籍申明之時明台州等廵檢内品徐志通取百姓李勸等男四人為假子凡十一日懼罪還之又縱卒略民家小兒致其母抱兒投海死坐决杖配掃洒班因降是詔上與輔臣論邉事指秦始皇漢武帝得失因言方今州兵亦不可太盛須防之於漸唐自明皇後藩方逐帥坐邀旄鉞河朔三鎮終不能制此可為監戒也乙巳屯田郎中判三司催欠司楊覃上蠲放天下逋欠計八百萬請付史館從之先是定州路部署山東道節度使同平章事王顯表求致仕不許既而來朝復遣還屯顯固請丙午改授河陽三城節度上謂之曰卿先帝舊臣於國有功河陽近地可以卧治引年告老非所宜也環慶路部署言軍士渉雪討蕃部苦寒有支體廢墮者今遣還京師上念其久勞不忍遽棄令中使就賜緡錢藥酒以𨽻剩員凡三十三人廩給如故自是遂為定例𨽻剩員在七月丁酉今並書之丁未上謂輔臣曰西北邉臣多請増築城壘既有勞費又須益其戍卒况部署司各領重兵可以應援也皆不許戊申詔環州洪徳寨淮安鎮戍兵毎月别給緡錢是州最近邉去井泉樵蘇極逺薪水之價倍他郡二鎮寨特甚故優䘏之己酉詔西路将士臨陣巧作退避者即按軍令不須以聞庚戍皇城司言親從第二指揮使馬翰稱在京有羣賊願自緝逐收捕上謂輔臣曰朕尹京日聞翰以緝賊為名乃有三害都市豪民懼其糾察常厚賂之一也毎獲賊贓量以當死之數送官餘悉入已且戒軍廵吏不令窮究二也常畜無頼十餘輩俾之偵察其擾人不下於翰三也顧其事未彰敗不欲去之自今捕賊止委開封府勿使翰復預其事初禮部尚書温仲舒知開封府以繁劇求罷又面陳不堪外任願優㳺臺閣乃命刑部侍郎宼準代之癸丑詔仲舒兼御史中丞以尚書兼中丞自仲舒始先是開封府有進士詣貢院觀榜其妻留舍或報其父母自逺至某所者妻急僦驢往省路逢醉人毆擊徑詣府訟僦驢者懼證左滯留潛遁去府以醉人亦有指爪痕俱杖而遣之歸舍號哭其夫尋自外落第歸亦泣兩不相知妻徐告以被杖復詣有司訴寃不聴夫妻俱赴水死既而上聞其事大怒由知府已下悉遭譴罰時仲舒實在開封也寇凖以此月丁未權知開封府今聨書之開封府官被譴責此據江休復雜志史無有也仲舒力辭府尹必由此耳熊克九朝通略吴育云小刑責不可不謹也丙辰遣使往邠寧環慶涇原儀渭隴鄜延等州保安軍選保毅軍取二萬人各置營本州號振武升為禁軍上曰當今邉防闕兵朝廷須為制置盖不得已也俟疆場寧静乃可消弭耳壬寅藉河南民兵先是契丹入寇保州縁邉都廵檢使深州團練使楊嗣莫州團練使楊延朗率兵禦之部伍不整為敵所襲士馬多失亡戊午徙定州鈐轄西上閣門使李繼宣為縁邉都廵檢使内殿崇班王汀副之召嗣及延朗赴闕引見詰責将按其罪謂殿前都指揮使髙瓊等曰嗣延朗素勤藎勇於戰鬬今特宥之庶收其後效也王汀未見壬戌詔開封左軍廵使京官知司録及諸曹參軍知畿縣見知府並趨庭設拜侍御史知雜事田錫言臣伏覩近日多雨秋稼頗傷近京諸州積潦為害加以差遣使命㸃集鄉兵人情不安物聽可駭謂一家雖有數口三丁抽兩丁定以强壮之名備於緩急之用雖不刺面各遣歸農其如終𨽻軍名向去須在戎伍當北敵未賔之際值西戎為害之時豈不知臨時抽差以補正軍闕少如此壮丁父母逐家妻男有哀慟之哭聲實感傷於和氣朝廷宜制理於未亂樞相當經始而圖終臣訪聞國家府庫稍虛倉廩不實不然則何以急急於聚歛財貨孜孜於備禦邉防况廟堂無人軍旅無将居崇官者皆莫知危言之士食厚禄者悉坐觀成敗之人邉上奏報繼來戎人侵軼漸近其好佞言而安聖心者則曰國家何患無逺慮而有近憂者不過聖駕親征望陛下以宗社為憂乞陛下以芻蕘可聽臣毎奉聖㫖凡有見聞即令敷陳敢不遵守干冒宸衷錫自注云五月二十二日奏此今附月末六月丁卯賜豐州團練使王承美銀器百兩絹百疋茶三百斤承美内屬但依蕃官例給俸時麟府部署言其貧故有是賜工部郎中陳若拙知處州若拙前任京東轉運使被詔時三司使缺若拙自謂得之及至授刑部郎中知潭州若拙大失望因對固辭且言常任三司判官及轉運使今守湖外反類責降又言父母老不願逺適上曰潭州大藩朕為方面擇人所委不在轉運使下輔相舊臣固亦有出典大藩者卿其勿辭若拙懇請不已乃追新授告敕而有此命上謂宰臣曰士大夫操修必須名實相副若拙前使鄆州就徙為本路轉運使加賜金紫謂其幹事委以方面改官未久仍令遷職而貪進擇禄如此乃知取士擢才必須審慎頃有黄觀者或稱其能選為西川轉運使輙訴免尋絀知閬州自後無敢然者今若拙固當譴降大凡朕之用人豈以親疎為間茍能盡瘁奉公有所樹立何患名位之不至也黄觀未見中書以朱摶議趙文海罪不當請用兵部郎中查陶代之陶道從兄也上曰聞陶亦深文何可用宰臣言當今習熟法令未有如陶者乃許之己巳命陶為秘書少監判大理寺其後楊億知審刑院陶屢攻其失又命代億焉陶持法深刻用刑多失中前後坐罰金百餘斤皆以失入無誤出者億知審刑院在六年六月九月罷今并書之壬申以黒山北荘浪族首領隆伊克為安逺大将軍美克為懐化将軍癸酉河東轉運使宋摶請㸃晉絳慈隰州定羌軍大通監丁壮為兵上以擾人不許李繼遷復以二萬騎進圍麟州金明廵檢使李繼周擊之圍未解麟府濁輪部署曹璨請濟師上曰麟州據險三面孤絶州将戮力足以禦賊但憂城中乏水既而賊果據水寨詔發并代石隰州兵援之又以六宅使宋思恭為并代鈐轄管勾麟府軍馬宋思恭管勾麟府兵馬實録在此月辛巳今從本紀并書之先是詔戎臣條上今嵗防秋便宜知威虜軍魏能知静戎軍王能髙陽闗行營都監髙素言敵首若舉國自來賊勢稍大請㑹兵于保州北徐曹河之間列寨以禦之若敵首不至則止令三路兵掎角邀擊髙陽闗副都部署劉用定州鈐轄韓守英請於沿邉州軍量益師徒若敵首南侵即選驍将銳旅自東路入攻賊界皆圖其地形以獻於是御苑東門對輔臣内出二編令詳閲之曰卿等前議布陣亦指曹徐河之間今諸将之謀盡在此矣吕䝉正等請令轉運使於保州威虜静戎順安軍預積芻粟詔從之守英祥符人用相州人也髙素未見初馬歩軍都虞候王超召還上問以邉事超言今嵗出師請止如去嵗規畫若欲交戰則宜寨於保州北威虜軍南上曰不須力戰但控扼備禦不失機便可也超曰去嵗於大陣之外别招奇兵謂之前陣今嵗令都部署統之上語輔臣曰大陣兵已倍向來之數去嵗於天雄軍莫州北平路及前陣别布師旅此繫朝廷機事今卿等欲以王超為都部署或受命之後固有此請其何以答之吕蒙正等曰此固不可從也上曰既任以閫外則所奏請安可不從宜召至中書樞宻院再詢其方略於是咸言超才堪将帥乙亥以超為定州路駐泊行營都部署殿前都虞候王繼忠副之入内都知韓守英為鈐轄上謂守英汝腹心之臣逺戍邉鄙切須盡心令上下輯睦若知敵中事宜尤當詳審不可虛發士馬以致擾動李繼遷率衆攻麟州四面負版薄城者五日知州閤門祗候衛居實屢出竒兵突戰及募勇士縋城潛往擊賊賊皆披靡自相蹂踐殺傷萬餘人丁丑十三日繼遷㧞寨遁去戊寅吕䝉正因對言唐太宗征高麗親負土不能克其城而旋隋煬帝伐遼致寇盗羣起前監不逺唐太宗踵而行之識者所不取也上深然其言唐太宗踵隋帝之失淳化四年䝉正巳因對及之今復有是言必非史官誤載也高陽闗都部署闕藩臣無可遣者宰相請輟宣徽使授之時知樞宻院王繼英為北院使周瑩為南院使上以瑩頗習軍旅事己夘命瑩為永清軍節度使俾領其任仍兼三路都排陣使瑩𨽻人有錢仁度者頗擾軍政與虎翼小校劉斌相競為殿直閻渥所發詔勿問止徙它軍瑩為高陽部署實録在七月甲午今従本傳并書上未聞靈州㨗奏詔延州部署㑹李繼福所部兵扵要路設伏掩擊李繼遷甲申詔諸路部署副部署鈐轄都監等有用奉使印者令少府監各鑄本司印賜之上對輔臣扵便殿出河北東路地圖指山川要害曰北敵入抄濵棣之民頗失農業今冬若再來朕必過邢洺之北驅逐出境以安生聚吕䝉正等咸請精選将帥責其成效車駕毋勞自行上曰若此卿等宜各畫必然之策以聞乙酉環慶涇原兩路並請益兵先是遣兩路都部署王漢忠等領兵五千為後殿而邉臣慮應援不及詔發虎翼卒三千與漢忠㑹以六千屯環慶路二千屯涇原路召漢忠赴闕罷兩路部署及鈐轄之職丙戌左衛将軍欒州刺史楊海進請老授左衛大将軍以其二子死王事特令月給實俸五十千考海進二子死事何地詔審刑院詳議官大理寺權少卿詳斷官不限在職月日但本官滿三年者即與遷秩詔御史臺勘事不得奏取㫖及於中書取意此據㑹要附見不必在丙戍也丁亥以知雄州何承矩兼制置屯田使先是承矩兼屯田事及以侍禁閤門祇候馬濟知順安軍亦兼屯田事承矩言與濟品秩有異所兼之名則同故特加使額焉壬辰上始聞麟州㨗奏謂左右曰遷賊猖狂以來未嘗如此喪敗加以威虐脅從其衆若頻有奔衂人心必離易為圖也詔以衛居實為供備庫使通判以下並遷秩各賜錦袍金帶仍令籍立功将士以聞初城乏井泉而被圍之際暴雨沾洽人皆置器鑿池以貯之城外雖有泉水列寨為防而垣牆闊逺難於固守至是遣使於河東部并匠至州開鑿上因欲激厲邉将乃賜環慶部署以下詔書諭所以賞居實等之意既又聞居實母郭氏寓居潞州遣使存問超封汾陽郡太君麟州之被圍也衛居實遣單介間道乞師於太原諸将以無詔猶豫未决并代副部署張進獨抗議發兵赴援既至而圍解手詔褒美癸巳定州路部署王超言縁邉有强梁輩常於兩界居止擾動疆場請厚給金帛募充散官從之是月都城大雨漂壊廬舍東南隅地形尤下上累遣覘視軍營中皆有積水命卒伍遷就髙阜處官舍安泊仍賑䘏之民壓死者賜其家布帛因謂輔臣曰隂氣為沴得非時政有所未協下情有所未逹耶卿等宜廣思闕失以答譴誡秋七月甲午朔日有食之詔以冬至有事於南郊詔諸州應㸃充强壮戸租賦止令就本州輸納有司勿得支移石隰路部署言本路縁河至蕃部界皆山險請以歩卒代㕔子軍六指揮朝議亦以此軍本綏夏之民石州近賊境恐越逸非便乃命徙於磁相州知鎮戎軍李繼和言築軍城畢詔繼和領平州刺史此據本傳乙未遣使完葺京城軍營應諸處工役悉罷諸州因霖雨壊軍營有出軍而家屬在營者賜緡錢時都下積潦自朱雀門東抵宣化門尤甚有深至三四尺浸道路壊廬舍城南流水皆入恵民河河復漲溢詔遣使馳往河上按視有陂池古河道處疏决之丙申以鄧州觀察使錢若水為并代經略使判并州上新用儒将未欲使兼都部署之名而其任實同也河東轉運使司封員外郎宋摶屢以秩滿請代朝議謂摶善於其職就加祠部郎中賜金紫兵部員外郎直史館馬亮自西川轉運使代還奏事稱㫖賜金紫命知潭屬縣有亡命卒剽劫為鄉人患鄉人共謀殺之在法當死者四人亮謂其僚屬曰夫能為民除害而乃坐以死此豈法意耶即批其案悉貸之初殿前侍衛卒有犯至死上令閤門祗候錢昭晟専往録問或言其非便於是始令閤門祗候迭往昭晟未見戊戍幸啟聖院太平興國寺上清宫致禱雨霽遂幸龍衛營視所壊垣室勞賜有差己亥殿前都指揮使保静節度使王漢忠坐率兵西討違詔無功責為左屯衛上将軍逾月出知襄州未上道暴得疾遂卒上甚悼惜之謂左右曰漢忠好學知書帥臣中亦不易得然秉性剛愎受任不能盡心比罷旄鉞庻能循省冀可復用遽兹淪䘮深可憫也詔贈太尉命中使䕶䘮事漢忠深沉有識略軍政甚肅毎行師詰旦必焚香祝曰願軍民無犯吾令違者一毫不貸故所部無盗賊又輕財好施賔禮儒士慕賈島李洞為詩居常讀書手不釋巻名稱甚茂以是自矜尚故羣帥不恱之殿直安守忠鄭懐徳皆乗驛詣邉受事漢忠待守忠懐徳不厚遂相與捃摭漢忠宻以聞漢忠黜死二人之力居多懐徳洛陽人與守忠皆襄邸攀附者也十月末田錫疏可參考施州屯兵備溪蠻嵗仰它州饋餉峽民甚苦之權知州事臨汝宼瑊請行和糴之法而償以鹽兵食遂足轉運使丁謂因言溪蠻入粟實縁邉寨柵頓息䕫萬諸州饋餉之弊臣觀自昔和戎安邉未有境外運糧給我戎兵者請以其事付史館先是蠻人數擾邉上召問廵檢使侯延賞曰蠻人何欲延賞曰蠻無他求所欲唯鹽耳上曰此亦常人所須也何以不與之乃詔諭謂謂即取詔𫝊告陬落羣蠻感恱因相與盟約曰自今有入寇者衆殺之且曰天子濟我以鹽我願輸以兵食自是邉榖有三年之積焉其謀盖自瑊發之據寇瑊傳云施州蠻叛傳運使以瑊權知施州先是戍兵仰它州餽糧而多不給瑊至請行和糴之法而償以鹽軍遂足而丁謂所奏遂没瑊謀今參取刪修侯延賞未見庚子詔水災州軍伺候檢覆慮有勞擾宜令轉運使體量即與蠲放仍遣使齎詔馳往免嘉州峨眉山普賢寺田租辛丑録没王事軍校子六十一人遷三班奉職未仕者補東西班殿侍優其廩給乙巳詔近京諸州經水處或艱食為盗毎兩州置使臣一人量給兵仗警廵宰臣吕䝉正等因對言昨中山㑹兵不深入討敵盖所全者大上曰民惟邦本本固邦寧朕熟計之北鄙屯盛兵止為庇民耳先是嶺南輸香藥以郵置卒萬人分鋪二百負擔抵京師朝議病其煩擾詔戸部判官凌策與諸路轉運使規制之策請陸運至南安軍即泛舟而北止役卒八百大省轉送之費策宣州涇人也知開封府寇凖言宣化門外有古河可疏之以導京城積水詔遣使臣同經度之辛亥荆湖北路轉運使監察御史王挺為殿中侍御史仍領使挺撫五溪蠻不擾秩滿求代故奨而留之挺明子也壬子命度支使梁鼎與河北轉運使耿望計度饋邉芻糧先是三司止移文責成外計未嘗有所規畫故専命之上覩臣僚以不和聞者謂宰相曰大凡謗議雖周孔亦不能免但當持公守正而已此軰偶有違言不能包容致成嫌隙朕審究枉直未嘗輕議貶絀今将帥牧守朕固知其不易非人事物情盡與留意則不能集國家之事而成已之善茍人之所欲不妨於事勉而從之公途王事必可行矣然臣下鮮能適中或殘刻害生人或弛慢妨公理凡事自有中道若常守之無不至善如朕理天下覺稍急則緩之寛則人慢復振舉之臣下亦能如是即無悔吝矣癸丑䕫州路轉運使丁謂言髙州刺史田彦伊子承寳並諸頭目官族共百二十二人歸附詔許入朝賜器幣冠帶以承寳為管内山河九溪十洞撫諭都監招諭承寳據寇瑊傳亦其功也甲寅詔有司毎行幸翰林學士侍讀侍講樞宻直學士並從不須臨時取㫖乙卯上曰今嵗北面戍兵已議用去年規畫徙前陣居後以遏遊騎朕思壮陣形而扼空缺莫若募强壮所在團結附大軍為寨柵戸部判官梅詢亦嘗言之因出其章示輔臣即遣使往河北召募仍給鎧甲其虜獲悉付之有功者别加酬賞丙辰遣使齎詔書就終南山召种放赴闕仍賜絹百疋錢十萬先是判永興軍府張齊賢復條上放操行請加旌賁且言臣前在中書親奉先帝徳音欲行下不次之澤臣縁未知本末不敢奏陳今兹出守始熟其為人故也時縁邉禁旅多分守城寨而帥臣以部隊鮮少為言上令六宅使劉承珪馳往環慶等州選廂軍之材勇者得四千五百人付諸寨城易禁旅歸部署司使悉充行陣咸以為便云丁巳遣使修築環慶儀州城戊午翰林學士梁周翰言今後稍闗機宻乞下本院先具詔本進呈取定可否更不将付中書本房詔應中書取索詔敕草本先實封送中書㸔詳定寫進壬戍契丹裕恱部下大林寨使王昭敏等歸附賜衣服錢帛補昭敏鎮将於許州給田歸之洪徳寨主侍禁閤門祗候叚守倫言戎人入寇抵城下率兵擊走之獲羊馬器甲甚衆賜守倫袍帶将士緡錢守倫瀛州人也癸亥詔増川峽路京朝使臣等月給添支及羊直令如銅錢界其知州公用酒亦如之韓國華𫝊云國華為峡路轉運使舊制川峽官俸緡悉支鐵錢資用多乏國華奏増其數至今便之疑即此國華使峽路在至道末㑹要俸門有國華入奏年月當考實録於十二月己巳又書今止一書之至道三年十月又咸平三年五月可考詔進奏院自今河西陜西幕職州縣官進實封文字即與收進八月甲子朔羣臣表上尊號曰崇文廣武應道章徳聖明仁孝不許自是凡三上繼以面請卒不許詔河北陷敵民田宅前令十五年許人請佃自今更展五年石隰州副都部署耿斌言河西蕃部教練使李榮等率屬歸順丙寅環慶路部署張凝言本路都監如京副使宋沆與知環州如京副使張從古領兵離州襲殺蕃寇官軍有傷死者上曰凝在環州而沆等擅出襲寇曽不謀於主帥邉将如此何以成功萬一有所奔軼西鄙實可慮也貪功失機罪宜不赦遂遣使按問既而責沆為供奉官從古為内殿崇班己巳詔常時諸蕃進奉使至而所由司或漏其人數致犒設不均自今令具名送内侍班庚午知鎮戎軍李繼和奏駐泊保㨗軍乍至邉陲乞量賜緡錢其逃亡者請即按軍令上曰此軍曽經選擇若稍加訓練可謂精兵近日逃竄者多盖繼和峻刻少恩不能撫下國有常法豈可踰之其特支錢令有司以繼和奏著宣命中俾軍士感其恵上以繼和勲戚之家故為覆䕶焉詔河北諸軍部署如進軍北向須萃定州轉運司以飛輓之艱慮成勞費其令深入偵候若契丹諸部入寇可止令本道防扞或敵首自至即飛驛以聞辛未前知杭州工部侍郎張詠言指使殿直龔元稍有勞績請賜遷擢元本兖州豪族詠奏以自隨頗干預郡政上素聞之詔令勿復隨詠壬申上謂宰相曰臣僚出使復命言官吏能否或多不實朕洞見情偽俟宻察顯状當黜以為戒又言内侍使陜西教閲者還奏儀州軍士生梗已科懲本都将校此使但令教閲豈得擅行絀罰寄班使臣奉命出外多作威勢朕毎署状戒約且邉事動息又須要聞知若遣三班使臣即畏避不敢公言早嵗靈州廵檢王承序境上磔人承受使臣都不具奏遂决杖降職自是無敢隠蔽今當申警之癸酉以知閬州國子博士黄觀權益州路轉運使代屯田員外郎張巽以巽為陜西轉運使代太常博士李易直以易直知衛州巽與知益州馬知節不協迭相論奏易直先與錢若水經度邉事在道縱酒少檢故有是命仍令知節兼本路轉運使事如有大事與黄觀同議先是歸義節度使譙郡王曹延禄及其弟𤓰州防禦使延瑞並為族子宗夀所殺宗夀遣牙校隂㑹遷入貢上表言延禄等謀害臣臣奔𤓰州縁軍民苦延禄之政遂相率圍沙州延禄延瑞即自殺衆廹臣統領兵馬權留後事及遣弟宗文權知𤓰州求賜旄鉞朝廷以其地本覉縻務在撫懐乃授宗夀歸義節度使宗文知𤓰州宗夀子賢順為衙内都指揮使妻氾氏封濟北郡夫人保州監押侍禁趙希素國之疎屬也上聞其不任事令知州趙彬察之彬奏如詔㫖戊寅罷希素所掌𨽻本州指使實録并載張遂等二人今從寳訓止載希素近制京朝官任中外職事受代者考課引對多獲叙遷而計司三館不與兹例有久次者庚辰内出倉部郎中直秘閣潘慎修等六人姓名並令遷秩館職如故癸未僧睿則上封事薦道近臣諸将又言與故相吕端有舊多宻說敷揚之事上曰此數事端果嘗奏陳然端為宰相安肯以時政漏於外耶必有竊聞而隂使之者耳凡所言朝廷事及禁衛列校等差廩禄輕重無不周悉如唐朝搆朋黨排擯有位不為難矣輔臣退而相謂曰朋比之事上雖細必察斯臣下之深幸也僧睿則未詳本末當考吕誨補正恵公傳以為誣陷者李惟清也然惟清咸平元年已先卒矣今略刪取増入乙酉詔醫師療疾當按方論若輙用邪法傷人膚體者以故殺傷論時涇州民毛宻以禁術療民妻繩縛手足桃杖擊之自初夕至二皷死陜西轉運使劉綜言其事故條約之丙戌六宅使劉承珪言慶州淮安鎮尤為衝要屯兵甚衆而部署在環州毎有警急則道出慶州信宿方至若自黙伯鎮直抵淮安纔八十里路不甚險環慶路部署張凝遣戍卒開修已畢望量益黙伯鎮兵以為諸路之援從之石隰州副都部署耿斌言河西蕃部指揮使伊朗南山等四百餘人來歸賜袍帶茶綵口糧仍令所在倍存恤之本紀是月乙酉石隰部署言河西蕃族伊朗南山等來歸與此編所載丙戍日下小異戊子邛部川蠻王遣王子離歸等二百九十人來貢方物詔河北忠烈宣勇軍選自鄉民無人承替者雖老病不許停籍自今委無家業人代之放令自便命諸州置縣尉弓手營舍度支請增𣙜場院入中金價上曰國家所急者軍儲金非切要之物罷之初運卒有犯繫四排岸獄無親屬者率飢病不聊生庚寅詔自今量給薪米使之全濟先是契丹降人無所依於京城南置院處之是月幽州民趙祚與妻蘇來歸既而趙州民蘇翰詣登聞院訴蘇即其女請并趙祚還其家賜衣物緡帛遣之九月甲午知鎮戎軍李繼和言戎人入冦夜抵城下後二日再至繼和與都監史重貴出兵拒戰重貴中重創敗走之大獲甲騎有詔嘉奨别出良藥縑帛牢醴賜重貴重貴未見上謂左右曰頃有使自鎮戎還言戎人夜填長壕越古長城而入伏騎城側而本軍始知洎出兵賊已據險故無功此盖失於偵邏故也及其再至則既先設備故有此㨗耳又西凉州入貢蕃部張僂儸言夜入鎮戎軍境直抵城隅門尚未閉而不逢警廵者其慢防盖如此因戒邉城嚴斥堠繼和習武藝好談方略頗知書所至幹治然性剛忍御下少恩整衆過峻部兵終日擐甲常如寇至較閲之際杖罰過當人多怨焉上屢加朂厲終以極邉恐緩急人不為用遣如京使張志言代還既即路軍中皆恐其復來其虐如此志言渭南人也先是麟府屯重兵仰河東饋餉雖地里甚近而限以長河土人利於河東民罕至則芻粟增價上嘗訪使邊者言河廣才數十步乙未詔轉運使鄭文寶於定羌軍府州河上經度造浮橋丙申遣如京使苗忠等四人率兵往河北京東提㸃捕賊戊戌髙陽闗部送歸順奚人吹賚漢口李美各賜衣服緡錢以吹賚𨽻渤海直美給田處之己亥涇原部署陳興言鎮戎軍去渭州瓦亭寨七十餘里中有二堡請留兵三百人戍之上曰此蕃寇走集之處兵少難固如興所請亦可備剽掠道路之患或有侵軼即令㑹兵擊之詔西面沿邉修築城壘及供軍防城器用勿以擾民庚子蕃寇近邉令涇原環慶鄜延麟府等路嚴加警備俟便討擊無得輕進自困兵鋒癸卯大理寺請廂禁軍自都指揮使至副都頭及請班差權管指揮使員僚如犯法並委有禄之官定斷從之丁未詔向者南郊優賞有司失於規畫或經嵗時不為給遣宜令諸道預為計度無得復然戊申种放以幅巾入見于崇政殿命坐與語詢以民政邉事放曰明王之治愛民而已惟徐而化之餘皆謙譲不對即日授左司諫直昭文館賜冠帶袍笏館于都亭驛大官供膳上謂宰臣曰放亦有就禄仕意且言跡孤朕諭以俟升班列必見朝廷清肅排擯之事無敢為者賞一人可勸天下矣己酉放表辭恩命上令宰臣召問之又知放與同知樞宻院陳堯叟有舊令諭㫖且曰朕求茂異以廣視聽資治道如放終未樂仕亦可遂其請也放至中書為宰臣言主上虛懐待士旰食憂民如此放固不敢以覉束為念宰臣以聞詔遂不許其讓居數日復召見賜緋衣象笏犀銀帶魚及御製五言詩又賜昭慶坊第一區加帷帳什物銀器五百兩錢三十萬中謝日賜酒食於學士院光寵之盛近所未有也詔麟府州熟戸蕃族隨官軍討賊者特給芻糧西邉諜者言戎人有路出鎮戎軍原州之間分抵原涇州而部署兵多在渭州之西去涇州稍逺乃詔發騎兵千五百人屯涇州庚戌鹽鐵使王嗣宗度支使梁鼎戸部使梁顥同對嗣宗進曰嘗蒙陛下宣諭朕不合管錢榖細務然所憂者盖為天下生民耳方今國家經費甚繁賦入漸少雖陛下勤儉之徳冠於古先其如冗食尚多耗蠧猶廣更宜庻事減節不然則用度不足復重撓於民矣上曰朕所憂者正此耳嗣宗曰河北闗西邉事未息興師十萬日費千金國家兵革非不精士卒非不衆在乎擇将帥嚴號令用之得其宜則何往不利臣等㑹議事有可減省者願條列以聞從之辛亥麟府部署曹璨言偵知戎人入寇領兵進擊不遇賊而旋上曰此盖察之不審致士馬勞頓饋餉益困吾民乃降詔約束焉壬子詔川峽官吏使臣規避遐逺務為不協速期受代自今復然者當行勘責就移逺處與明年六月詔相類先是有華人亡入蠻境乃與蠻俱來朝貢以冒賞賜丙辰詔知益州馬知節辨認釐革之戊午冀州團練使石普自言能為火毬火箭上召至使殿試之與輔臣同觀焉庚申延州言戎人來寇金明都監李繼周擊走之
