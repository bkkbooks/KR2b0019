body:
  text: 續資治通鑑長編卷三百七十八宋李燾撰哲宗元祐元年五月戊辰詔給事中兼侍講孫覺祕書少監顧臨通直郎充崇政殿說書程頥同國子監長二看詳修立國子監太學生條制十月末摯乞罷置局考功郎中王子韶為吏部郎中既而御史吕陶言子韶猥陋不謹罷之改主客郎中以主客郎中周尹為考功郎中吕陶上言在二十五日今并附此詔大理寺公案日限大事減十日中事小事各減五日又詔禮部自今乞試童子誦書所屬毋得收接中書省請自今蕃部有犯除依法合裁減外並令本處依條斷遣毋得一例申奏從之詔著作郎范祖禹宣德郎游師雄朝請郎張璹承議郎朱勃並令中書省記姓名以同知樞密院事范純仁薦也詔奉議郎郭知章令中書省記姓名以江淮等路發運使張汝賢薦也知章龍泉人政和元年有傳詔太祝兼奉禮罷太官令從禮部請也鮮于侁傳云侁為太常少卿㑹罷太常寺太祝侁言神考釐定官制太常設奉禮太祝各一員事合古制理難廢減請復置仍請自朝廷選有學行之士詔從之七月二十二日復太祝皇城使欽州防禦使吳舜臣為永裕陵使是日左僕射司馬光初入對于延和殿子奉議郎正字康扶侍賜康緋章服王巖叟朝論十二日司馬君實參告見於延和初令其子康扶掖之既至近有詔勿拜君實固拜康立旁不敢掖又傳詔曰令康扶相公既拜稍掖之升殿康退君實進俯簾下致謝上又預令設杌於殿以備君實不能立則賜之坐拜畢不可以支持遂遣御藥押入門下省環慶路經略使范純粹奏據本路第二將狀申據提舉巡防侍禁戴榮申今月三日依例選差蕃官朗額依等硬探西界屯聚人馬煙棚逺近次第至四日據朗額依等稱探得西界大寨西有人馬下寨朗額依等只於水泉伴溝內藏泊體探人馬動息次第望見野寨內三人於水寨內取水朗額依等當時先捉下取水三人又逢見西界硬探人馬捉到二人馬四匹共五人馬四匹不敢擅便放去監領前來申上本司檢㑹自來不住指揮沿邊將分城寨并巡防漢蕃使臣首領等鈐束手下人兵各守疆界如是賊馬侵入漢界仰痛行掩殺即不得令人馬擅入西界捉殺人口引惹邊事今來上件硬探人輒於界上收捉生口顯屬無名所有捉到人比欲申奏取候朝廷指揮竊緣事繫機速理難待報蓋西人近於涇原作過至今尚未放散見今於本路到境亦有人馬盤泊今來既無名捉到西界生口五人馬四匹若不逐急送還聽候朝㫖遷延多日深慮對境盤泊人馬忽作酬賽夤夜奔衝别生邊事增長怨隙卒無已時本司已逐急將元捉事人對捉到西人靣行責問諭以朝廷方今務在綏靜之意若西人侵犯即須痛行掩殺彼既别無侵犯何得擅有捉虜及對西人將元捉事人一例枷項諭以不容之意仍差得力使臣監護捉到人馬送第三將却令量帶軍馬於元捉來道路踏髙占穩送還西界去訖其捉事人本司見一靣施行次貼黃臣自到任以來嚴戒邊上漢蕃人户禁絶侵漁結隙之弊訪聞西人粗相信伏彼亦無甚生事今上件人輒有捉虜若不如此急急送還以示非臣純粹之意即恐有害大信立致報復自此漸至生事伏乞朝廷照察二年五月十三日奏此當刪取其要己巳揚王皓荆王頵遷外第太皇太后皇帝幸其第詔皓二子頵七子並特轉一官吕公著家𫝊近臣分從兩宫或可附鮮于綽傳信記云二王始遷於親賢宅未遷之前哲宗車駕臨幸按行新第既遷諸男孝貽等各轉一官制詞云先皇帝篤兄弟之好以恩勝義不許二叔出居於外蓋武王待周召之意太皇太后嚴朝廷之法以義制恩始從其請出就外宅得孔子逺其子之義二聖不同同歸于道可以為萬世法此誥蘇子瞻所作也明日吕大防范純仁妻入見太皇太后曰昨同皇帝幸二王府二王侍立尚食甚恭皇帝待之亦盡禮吾老矣深以此為喜又曰仁宗事燕王盡子姓禮王頗自重但以行第呼仁宗雖禁中服用王輒取之仁宗不敢言吾二兒豈敢如此庚午龍圖閣直學士通議大夫知應天府王益柔卒壬申文彥博言復舊差役法議臣之中少有熟親民政者故議論不同刺史縣令最為親民之官且專委守令差定役人編成籍條列自來體例條貫上轉運司如各得允當即具申奏仍稍寬期限使盡利害其詳定役法所止據逐路申陳看詳定奪詔付詳定役法所陜西路轉運司言將來郊賞乞於封樁錢內支撥詔給本路常平錢十萬緡尚書省言元豐六年江淮等路發運司奏兌買在京封樁闕額禁軍糧米五十萬石價錢限半年上京送納今淮南災傷賑濟慮有闕之詔令淮南轉運司相度本路如闕斛斗仰依元豐六年例監察御史韓川言請應選人試中許出官者自今並與免試詔吏部立法以聞新録無癸酉復左右天廄坊廣南東路轉運司言韶州告發泰興銅場買銅錢乞依岑水場於永通監支給應有銅坑興發並依岑水場買銅條以永通監錢收買從之詳定重修敕令所言應官吏民庶等如見得見行條貫有未盡未便合行更改或別有利害未經條約者並許陳述從之甲戌詔三京依舊置分司官詳定役法所言元豐令場務錢每年於諸路移那一百萬貫赴內藏庫寄帳封樁請自今留以招募衙前支酬重難及應緣役事等費從之中書舍人蘇軾范百祿奏刑房送到詞頭奉聖㫖張誠一邪險害政有虧孝行追觀察使遙郡防禦團練使刺史依舊客省使提舉江州太平觀發赴本任臣等看詳張誠一無故多年不葬親母既非身在逺官又非事力不及冒寵忘親清議所棄猶獲提舉宫觀已駭物聽况諫官本言誠一開父棺槨掠取財物使誠有之雖肆諸市朝猶不為過使誠無之亦當為誠一辨明緣事係惡逆不道非同尋常罪犯不可以不盡根究今既體量未見歸著即合置司推鞫盡理施行所有告命臣等未敢撰詞貼黃稱據京西提刑司體量文字稱誠一取父排方犀腰帶緣葬埋歲久須令工匠重行裝釘是時誠一任密院都承㫖當直人從皆可考驗及慮棺柩內更有賊人盜不盡物為誠一等私竊收藏其族人當有知者臣等欲乞詳酌依上件事理根究施行舊録云左司諫王巖叟言誠一盜取父墓中犀帶按巖叟言章已見四月二十六日今不復重出但取蘇軾等所論具載之六月十二日乃責左武衛將軍分司南京軾百祿又奏刑房送到詞頭奉聖㫖李定備位侍從終不言母為誰氏强顔匿志冒榮自欺落龍圖閣直學士守本官分司南京許於揚州居住臣等看詳李定所犯若初無人言即止是身負大惡今既言者如此朝廷勘㑹得實而使無母不孝之人猶得以通議大夫分司南京即是朝廷亦許如此等類得據髙位傷敗風教為害不淺兼勘㑹定乞侍養時父年八十九嵗於禮自不當從政定若不乞必致人言獲罪不輕豈可便將侍養折當心喪考之禮法須合勒令追服所有告命臣等未敢撰詞貼黃稱凖律諸父母喪不舉哀者流二千里今定所犯非獨匿而不舉又因人言遂不認其所生若舉輕明重即定所坐難議於流二千里已下定斷王巖叟等劾李定與張誠一同見四月二十六日舊録載定事殊略且為之辭曰定不知所生父沒始解官持心喪劉摯言其不持服也新録因舊文稍刪改云定父沒始解官持所生母心喪劉摯言其不持服按舊録蓋定之黨所為故不敢正言其罪新録亦復承用悖語誠不可曉今取蘇軾等繳奏具載要須附以劉摯本章如軾等所論父年八十九歲乃乞侍養必摯本章所指也摯奏集及遺藁今皆無此又不知軾等繳詞頭後如何行遣六月二十八日再責仍坐巖叟章司馬光言臣近奉聖㫖許臣乘轎子三日一至都堂聚議伏緣三省樞密院各有職事難以臣故必令三日一聚檢㑹去歲曾有指揮遇假日有公事許於東西府聚議其東西府近北舊有便門臣欲乞於近南更開一便門臣近緣足疾未愈乞遇假日或日晚執政出省後有合商量公事許乘小竹轎往諸位商量其諸執政有欲商量公事者亦許來臣本位更不一一奏聞所貴論議詳盡事無留滯從之詔司馬光差提舉編修神宗實録並明堂大禮使可並放謝所有敕二道仍令閣門差官降賜御集十八日殿前都馬步軍司承㫖司言拍試陜西集教保甲都教頭等十八人馬步射事藝詔都教頭引見呈試特㫖改換班行指揮勿行其教過畨次人止令轉資賜帛有差吏部言按閲河東路團教保甲所保明提舉官東上閣門使王崇拯勾當公事右騏驥副使宋宣內殿承制閣門祗候鄭勝內殿崇班陳聿到任各及半年兩次按合格事藝人數依格各合轉官減年磨勘詔減半酬奬內王崇拯纍經集教轉官及係橫行使其減半特回授與有官兒男詔趙居子孫趙翥趙嚳各特給與初官一半俸給王巖叟三事當係二年四月十日後此時未有言也乙亥右司諫蘇轍言臣聞漢武帝世御史大夫張湯挾持巧詐以迎合上意變亂貨幣崇長犴獄天下重足而立幾至於亂武帝覺悟誅湯而後天下安唐德宗世宰相盧杞妬賢嫉能戕害善類力勸征伐助成暴斂使天下相率叛上至於流播德宗覺悟逐杞而後社稷存蓋小人天賦傾邪安於不義性本隂賊尤喜害人若不死亡終必為患臣伏見前參知政事吕惠卿懷張湯之辨詐兼盧杞之姦凶詭變多端敢行非度見利忘義黷貨無厭王安石初任執政用為心腹安石山野之人强狠傲誕其於吏事冥無所知惠卿指擲教導以濟其惡青苖助役議出其手韓琦始言青苖之害先帝知琦忠朴翻然感悟欲退安石而行琦言當時執政皆聞德音安石惶遽自失亦纍表乞退天下欣然有息肩之望矣惠卿方為小官自知失勢上章乞對力進邪說熒惑聖聽巧回天意身為館殿攝行內侍之職親往傳宣以起安石肆其僞辨破難琦說仍為安石畫劫持上下之策大率多用刑獄以震動天下自是諍臣吞聲有識喪氣而天下靡然矣至于排擊忠良引用邪黨惠卿之力十居八九其後又建手實簿法尺椽寸土根括無遺雞豚狗彘抄劄殆遍專用告訐推析毫毛鞭箠交下紙筆翔貴小民怨苦甚於苖役又因保甲正長給散青苖結甲赴官不遺一戶上下騷動不安其生遂致河北人户流移雖上等富家有驅領車牛懷挾金銀流入襄鄧者旋又興起大獄以恐脅士人如鄭俠王安國之徒僅保首領而去原其害心本欲株連蔓引塗汙公卿不止如此獨賴先帝天姿仁聖每事裁抑故惠卿不得窮極其惡不然安常守道之士無噍類矣既而惠卿自以贓罪被黜於是力陳邊事以中上心其在延安始變軍制雜用蕃漢上與馮京異論下與蔡延慶等力爭惟黨人徐禧助之遂行其說違背物情壞亂邊政至今為患西戎無變妄奏警急擅領大衆涉入賊境竟不見敵遷延而歸糜費芻糧棄捐戈甲以巨萬計恣行欺罔坦若無人立石紀功使西戎曉然知朝廷有吞滅靈夏之意自是戎人怨叛邊鄙騷動河隴困竭海內疲勞永樂之敗大將徐禧本惠卿自布衣中保薦擢任始終協議遂付邊政敗聲始聞震動宸極循致不豫初實由此邊釁一生至今為梗及其移領河東大發人牛耕葭蘆吳堡兩寨生地托以重兵方敢布種投種而歸不敢復視及至秋成復以重兵防托收刈所得率皆秕稗雨中收穫即時腐爛惠卿張皇其數牒轉運司交割妄言可罷饋運其實所費不資而無絲毫之利邊臣畏憚皆不敢言此則惠卿立朝事迹一二雖復肆諸市朝不為過也若其私行險薄非人所為雖閭閻下賤有不食其餘者安石之於惠卿有卵翼之恩有父師之義方其求進則膠固為一更相汲引以欺朝廷及其權位既均勢力相軋反眼相噬化為讐敵始安石罷相以執政薦惠卿既已得位恐安石復用遂起王安國李士寧之獄以尼其歸安石覺之被召即起迭相攻擊期致死地安石之黨言惠卿使華亭知縣張若濟借豪民朱華等錢置田産使舅鄭膺請奪民田使僧文棲請奪天竺僧舍朝廷遣蹇周輔推鞫其事獄將具而安石罷去故事不復究案在御史可覆視也惠卿言安石相與為姦發其私書其一曰無使齊年知齊年者馮京也京安石皆生於辛酉故謂之齊年先帝猶薄其罪惠卿復發其一曰無使上知安石由是得罪夫惠卿與安石出肺肝托妻子平居相結惟恐不深故雖欺君之言見於尺牘不復疑間惠卿方其無事已一一收録以備緩急之用一旦爭利遂相抉摘不遺餘力必致之死此犬彘之所不為而惠卿為之曾不愧恥天下之士見其在位側目畏之夫人君用人欲其忠信於已必取仁於父兄信於師友然後付之以事故放麑違命也而推其仁則可以託國食子徇君也而推其忍則至於弒君欒布惟不廢彭越之命故髙祖知其賢李績惟不利李密之地故太宗許其義二人終事二主俱為名臣何者仁心所存無施不可雖公私有異而忠厚不殊至于呂布事丁原則殺丁原事董卓則殺董卓劉牢之事王恭則反王恭事司馬元顯則反元顯背逆天理世所共疑故呂布見誅於曹公而牢之見殺於桓氏皆以其平生反覆勢不可存夫曹桓古之姦雄駕御英豪何所不有然推究利害終畏此人今朝廷選用忠信惟恐不及而置惠卿於其間譬如薰蕕雜處梟鸞並棲不惟勢不兩立兼以惡者必勝况自去歲以來朝廷廢吳居厚吕嘉問蹇周輔宋用臣李憲王中正等或以謀利或以黷兵一事害民皆不得逃譴今惠卿身兼衆惡自知罪大而欲以間地自免天下公議未肯赦之然近日言事之官論奏姦邪至於鄧綰李定之徒微細必舉而不及惠卿者蓋其凶悍猜忍性如蝮蝎萬一復用睚眦必報是以言者未肯輕發臣愚憃寡慮以為備位言責與元惡同時而畏避隱忍辜負朝廷是以不憚死亡獻此愚直伏乞陛下斷自聖意略正典刑縱未以汙鈇鑕猶當追削官職投畀四裔以禦魑魅貼黃稱吕惠卿用事於朝首尾十餘年操執威柄凶焰所及甚於安石引用邪黨布在朝右臣陳其罪惡必隂有為之游說以破臣言者惟聖明照察不使孤忠橫為朋黨所害丁丑詔鄜延環慶涇原秦鳳河東五路經略安撫司常平倉司管勾官並罷戊寅直龍圖閣權發遣熙州趙濟知解州左司諫王巖叟言濟先以贓汚不法坐廢於家後以李憲一言遂復為帥未嘗以職事為憂而日與將士蒱博為戲無帥臣體請削職置之散地乃詔落直龍圖閣差管勾中嶽廟落職管廟并王巖叟言章在二十七日癸未今并書之吏部郎中范純禮詳定役法後五日罷之純禮亟罷詳定役法必有故當考判大名府韓絳乞寢子宗師直祕閣之命從之御史中丞劉摯言臣伏見五月四日敕命除文及為右司郎中韓宗師直祕閣尋聞臣僚論列兼宗師父絳繼有辭免遂罷直閣之㫖而及之除命未賜指揮切以都司職任上副丞轄下總二十四司之事而館閣設官以文學名職皆號為清望之選固當無間寒畯不宜專用子弟此所以招言者之論而不能服衆人之心及與宗師差除之日適在文彥博入朝韓維進用之始故議者咸謂執政臣僚見二人進拜所以擢其子姪迎悅其意以立私恩此亦陛下之所宜察也國家名器本待才德但用之以公明人無不服今宗師既罷則及之新命亦望追寢不須更俟其遜避所貴稍申公道以息羣議若以乃父彥博在朝欲及便於侍養即在京甚有職任可處兼平章事乃是朝廷執政正與都司相干亦合回避以此罷之不傷陛下恩禮也六月八日及改少衛尉劉摯集有此奏議今奏議乃無之雜録又繫之王巖叟恐雜録誤今依摯集先是劉摯言臣伏以辨大姦而救未萌人臣之先識褒遺忠而發潛德國家之令典臣嘗觀熙寧之初王安石以道義文學起而輔政先帝舉天下聽之天下士民亦罔不指期以望太平上下向之無異辭當此之時故諫議大夫吕誨為御史中丞獨以為不然屢有奏論其略曰安石居廟堂天下必無安靜之理又曰誤天下蒼生者必此人誨坐是貶官於外未幾亡歿其後安石與其朋黨變亂祖宗法度專以聚斂為事顛倒邪正進退失當廢民之所同欲興民之所同害欺罔朝廷天下被其患者十七八年其間雖有踵事增虐之人然要之權輿造端實自安石始四海困擾皆如誨言誨可謂前知之明矣誨名臣之後為人忠信剛正立朝行已有古人之節大臣之風在言路前後三黜皆以擊姦邪忤權勢最後猶以直道大義為公論所髙誨之死於散地在熙寧四年官至侍從而朝廷未嘗有所贈恤誨之妻今在生事微薄有子皆碌碌小官恭惟陛下臨御以來惠綏生民修明庶政以成就先帝求治本指昭顯于世而開獎言者孜孜聽納凡臣子在前日輸忠獻直嘗有一言於朝者莫不收拾褒用之而誨不幸既亡不見遇於今日此天下有志之士所以歎惜而不能已臣不勝愚慮欲望聖慈嘉誨之有識敢言言不獲用利不得及於世哀其志節特賜褒贈及賜諡以表顯之録其諸孤稍賜任使非獨以慰幽壤蓋亦以勸天下之忠義而愧人臣之為姦諛者非小補也於是尚書右丞吕大防同知樞密院事范純仁言故御史中丞吕誨忠於先朝極陳讜論致忤時宰譴死外藩今其家貧甚諸子仕於常調請優加贈典録用諸子之才者以旌名臣之後詔誨特贈通議大夫男由庚與堂除合入差遣劉摰先以四月二十日論吕誨吕大防范純仁所言與摰略同必因進呈摰章故有此命舊録但舉太防純仁新録因之似太疏漏也今追記摰所論於前復欣州定襄遼州榆社平城和順寧化軍寧化汾州孝義潞州黎城縣己卯尚書省請六察旬奏改作季奏從之詳定役法所言新敕罷天下免役錢緣元豐令修造營房給免役剩錢又和雇遞馬及雇夫并每年終與轉運司分認三十貫以下修造及舊係役人陪備腳剩之類更有諸州造帳人請受并巡檢司馬遞鋪曹司係代役人應用紙筆並係支免役錢今請支見在免役剩錢候役書成別行詳定從之其免役積剩錢應副不足處依嘉祐已前敕條條不載者奏王巖叟言福建免役剩錢或附此已附二月六日又十二月二十四日詔諸路坊場免役剩錢三路外許留一半可參考辛巳中書舍人蘇軾言臣近奏為論招差衙前利害所見偏執乞罷詳定役法尋奉聖㫖依所乞今來給事中胡宗愈却封還上件聖㫖竊緣聖㫖本緣臣自知偏執乞罷即非朝廷以臣異議罷臣胡宗愈不知誤有論奏重念臣前來議論委實疏闊又况衙前招之與差所繫利害至重非止是役法中一事臣既不同决難隨衆簽書伏乞依前降指揮早賜罷免御史中丞劉摰言聞中書舍人蘇軾辭免詳定役法有㫖不許又具辭免者竊以差役之法最今重事陛下欲使利害曲盡置局講求此甚盛德然自置局以來為日寖久未見就緒而議法之官頗已屢易今聞軾以議有異同力欲辭避人人如此則法度之成何時可冀乎臣聞五味不同而適於口者味相足也五聲不同而恱於耳者聲相備也一可一否一是一非雜然並作此議之所以同歸於善一人曰可皆曰可一人曰是皆曰是信如此又何以議為哉議有異同正宜反覆曲折相足備以趨至當而遽為避就則非獨議法難成使姦人乘隙伺釁搖撼法意非國之計也臣願深詔執事者毋以小利妨大體使利害曲盡以稱朝廷之意所有蘇軾且令依舊詳定仍乞催促成就以時布宣鎮慰天下喁喁之望又言吕大防范純仁韓維皆係朝廷遷擢兼官為執政事無不領雖離去本局其責尚存軾若陳乞獲免則不復干預非大防等比不可不論也御集二十六日軾依舊詳定役法不知此後如何又言臣伏見天下役人已復差法自置局以來未見修立畫一條制昨者雖有指揮令依熙寧元年以前舊法施行緣熙寧以前敕條其間亦有不可行者兼近降二月四日敕命自有與熙寧以前條貫抵牾相妨如役人正身不願者今來兼許雇人而嘉祐舊制如耆長弓手之類須正身充役臣不知見今州縣如何施行且繇役大者無如衙前始者改法一槩鄉差既而復以坊場等錢雇募未幾又改雇募為招募三兩月間命令屢變臣恐天下循用或有疑誤而異意之人因此窺伺臣竊料朝廷欲候諸路申請然後立法如此止是一路事件臣欲乞指揮先立通用役法條貫將近降纍次敕命大意為主畫一立法先次頒行若諸路有未便方聽申明隨事别降指揮所貴天下先有大法可守不至乖戾壬午御史中丞劉摰言臣伏見內臣李憲陳乞於西京或鄭州居住臣昨者彈劾憲及中正用臣得一等四人之罪皆天下切齒以謂元惡大姦者而陛下以天地為度特寬兩觀之誅止於奪其一二官秩付以優間之職公議鬱鬱殊不厭服臣愚誠不欲傷陛下包含保全之恩故未敢再三論列然小人之情窺測上指見陛下至仁曲為貸免便以為已無大罪因可以僥幸故輒陳請伏緣臣子之義一被遷降即當皇恐奔走上道深自推省豈得偃蹇不伏自求私便按憲之罪在四人最為深重今又敢慢棄君命詐疾免行公然驕欺無復忌憚中外憤嫉益以不平伏望聖斷暴憲之惡别行竄放所貴國法稍正而陛下威令稍行以戒欺君罔上之人貼黃稱臣奏謂憲等事狀比之甘承立其罪尤重而行遣不同緣國法施於小官而不行於權臣是政令二三也則何以服天下今憲又敢偃蹇自便慢陛下之命伏乞照㑹比類承立事理施行元祐元年六月二十六日八月十四日蘇轍言憲以宣察明道居善地不知摰此章竟從與否當考四月四日憲以武信留後永興副總管就差提舉崇福宫仍令西京居住十九日又降一官改明道不知却於何處居住今乃乞於西京或鄭州居往也右司諫蘇轍言臣聞世無不敝之法雖三代聖人之政不免有害故神而明之存乎其人臣竊見朝廷近罷免役復行差役小民初免出錢鼓舞相慶士大夫因民之喜以為差役一行可坐而無事矣臣之愚意以為免役之害雖去而差役之弊亦不可不知也敢推言其故惟陛下察之國朝因隋唐之舊州縣百役並差鄉戶人致其力以供上使歲月畨休勞佚相代吏若循理不以非法加民則被差之人本無大苦然役人既是稅戶家有田産誅求必得吏少亷謹凡有所須不免侵取故祖宗之世天下役人除正役勞費之外上自衙前有公使厨宅庫之苦中至散從官手力有打草供柴之勞下至耆長壯丁有歲時饋運之費習以成俗恬不為怪民被差役如遭寇虐神宗皇帝照知此害始議立免役之法前弊雖解而所取役錢多收寬剩民間難得見錢日益貧瘁今朝廷既已復行差役除見議衙前差募未有成法外其餘耆壯户長弓手散從官役一切定差貪官暴吏私竊以此相賀何者市井之人應募充役家力既非富厚生長習見官司官吏雖欲侵漁無所措手今耕稼之民性如麋鹿一入州縣已自懾怖而况家有田業求無不應自非亷吏誰不動心妄意朝廷既行差役凡百侵擾當復如舊訪聞見今諸路此弊已行臣恐稍經歲月舊俗滋長役人困苦必有反思免役之便者其於聖政為損不細頃者朝廷初革衆弊士懷異議多被遷逐睥睨新政幸其不成者非一人也若此弊不除使民有怨言彼立異之人他日必指以為據臣欲乞明降詔書丁寧戒敕監司長吏使知朝廷愛惜鄉差役人與神宗朝愛惜雇募役人無異應係日前約束官吏侵擾役人條貫使刑部録出具委無漏落雕印頒下令一切如舊出榜州縣使民知之仍常加督察有犯不能覺察致因事發露者重其坐庶幾民被差役之利而無差役之害然後天下䝉賜深矣權江淮荆浙等路制置鹽礬兼發運副使朝議大夫直龍圖閣蔣之竒為天章閣待制知潭州韓川孫升論罷之竒待制潭州之命在六月八日詔太師平章軍國重事文彥博已降㫖令獨班起居自今赴經筵都堂凡同三省樞密院奏事並序位在宰臣之上四方館使嘉州防禦使李綬罷提舉崇福宫令供本職禮部言祖宗神御並合塑配饗功臣侍立太祖神御前塑趙普曹彬太宗神御前塑薛居正石熙載潘美真宗神御前塑李沆王旦李繼隆仁宗神御前塑王曾曹瑋吕夷簡神宗神御前侍臣乞先行議定本廟配饗功臣修塑如未議定請依例權塑侍臣二員從之權塑二員亦可見鮮于侁當時議論所自其所塑何人當考右司諫蘇轍言朝廷近差杜紘與黃亷同體量蜀中茶法紘為詳定編敕所奏留欲别差一人庶亷不敢以課利增虧自為身計盡見茶法利害詔按察成都等路茶事令黃亷各與逐路轉運司同共繫書以聞轍恐亷自為身計則此時或已有提舉茶馬之命矣四月二十五日六月二十八日當考殿中侍御史吕陶言皇城使蘇緘忠義死節其子子元近任朝奉郎乞換武官舊制換過武臣多自樞密院便除知州軍差遣乞下樞密院除荆南極邊差遣從之子元尋差知新州據蘇軾外制新差鄜延路馬步軍都總管李浩徙河東路馬步軍副總管以自陳避趙卨也復吉鄉軍為慈州甲申皇城使嘉州刺史內侍押班劉有方為招宣使詔守令考課入優等者取㫖特與推恩從御史上官均請也詔諸豫買紬絹直除專條外並給見錢依條限正月十五日支足若過限或刻納缺負或以他物充折者各杖一百右正言王覿言吏部員外郎吕升卿有狀引用朝㫖及先帝德音乞理知州資序貪競反覆乞行勘問詔吕升卿通判海州詔駕部員外郎賈種民知臨江軍御史林旦言其天資邪佞故黜之舊録以為漢陽軍按漢陽復為軍在六月八日此時未也今從吕公著家傳種民尋改通利軍六月二十六日録故翰林侍讀學士賈黯親孫一名以黯預修撰英宗皇帝實録未及推恩而卒也樞密院言將副任滿按到軍兵事藝類多再任例滯待次之人請諸路將副任滿監司同委官按試所將兵事藝並須及等應法及五分已上候到院先次與差遣㪷力不及等二分已上見係六等差遣人降一等餘送吏部合入差遣從之乙酉監察御史上官均言臣聞事有利於目前而為終歲之患者有便於一時而為終身之害者無知之民暗於利害不能自計往往就近利而忘逺患惟在上之人與之長慮熟計謀始要終故不獨為目前之計而有終歲之便不獨為終嵗之便且有終身之利故天下之民受實利於上而無憔悴困窮之後患矣夫有惠民之名而無惠民之實有目前之利而為終歲之患者青苖是也自熙寧以來始行青苖之法散斂之息不過二分而民間之私貸其利常至於五六或至倍蓰其法疑若便民矣然自行法以來錢幣日寡民用日困天下之民不以為惠往往偶語以為在上之人取贏於下耳何則民間私貸其利雖厚然貸於春者冬未必償就使償之未必充數又緩急多少得以自便其貸於縣邑也則不然其出有日其納有期有追呼督催之煩有道途往來之費方其散也往往利於目前之得或輕用而妄費及其斂也迫於期㑹必至於賤賣穀帛而茍免刑責縣邑收息雖止於二分及計民之費用賤售穀帛耗失常至於五六其甚者破蕩資産終身不復自振此臣所謂有目前之利而為終歲之害有惠民之名而無惠民之實是也今之議者必以為往時之散青苖出於抑配故有前日之弊今日募民之願取者然後與之而有司又不以多散為功則民必以為便臣以為不然今天下之民十室之中資用匱之者十之六七誘之以青苖之利無知之民不暇逺計必利一時之得紛然趨赴雖曰不强抑配然以散斂追呼督促之煩道塗往來之費輕用妄費賤售穀帛之患未免如前日也則是誘之以目前之利而陷於終歲之害甚者貽其終身之患此非法之善者也或者以為今罷青苖之散則貧者必取於豪右之家而有倍蓰之息臣以為青苖之息輕則民願就而自陷於後患私貸之息重則民憚取而無異日之害使其不得已而取之於豪右之家則償之早晚緩急多少得以自便非有追呼督促道塗往來之煩費賤售穀帛之弊也此利害得失較然可見矣昔西門豹為鄴令發民鑿渠引河灌田人以為病豹曰百歲後期令父老子孫思我其後皆得水利民以給足夫西門豹區區為一縣令耳猶思為後世之利况聖明在上綏輯四海固宜長策逺慮為萬世計豈當使斯民恱目前之利而陷終歲之害哉臣願陛下節邦用薄租賦省力役清刑罰禁盜賊愛而不傷安而不擾則天下之民耕田鑿井晏然自裕於太平之澤不必待青苖之散而後可以富足也故臣願行閏二月八日詔書罷去青苗復常平昔年平糴之法兹萬世之通利也願陛下明詔左右大臣詳計而審行之太僕少卿李周言凖差至河北陜西河東京東京西路相度措置興置馬監所有逐路應管兵部錢物乞令樁留在彼以備置監支用兵部亦言本部所管錢物依條許召人兊便起發上京送納今欲依李周所乞並隨處封樁凖備置監支用今後權住兊便起發從之元祐元年五月內事據三年四月二十日兵部狀增入
