body:
  text: 續資治通鑑長編巻五十八宋李燾撰真宗景德元年冬十月壬午以磁州刺史邠州駐泊部署許均兼永興駐泊部署仍與知府向敏中及鳳翔梁鼎同提總陜西諸州廵檢捕盗事上既定議北征念關隴重兵多在邊郡自陜以西直抵兩川亦宜過為之防故有是命起居舍人直昭文館种放自終南山來朝上言歸山已乆請計月不受俸特給之詔歴代聖賢陵墓摧毁者官為修葺申嚴樵採之禁鳳州言監軍李朗以細故笞本城武定軍小校梁福福聚徒六人夜入朗廨殺朗而遁遣使督廵檢使捕之癸未以引進使潘州刺史何承矩領英州團練使初議進秩上謂宰相曰承矩知書好名以才能自許宜擇州之美名者授之以環慶路鈐轄供備庫使張煦領賀州刺史為涇原路鈐轄代秦翰赴闕令河北河東陜西縁邊州軍倉場謹火禁備戎諜也遣使勞北面諸軍仍宴犒之羣牧判官王曙言准詔諸州不堪放馬閑田召牧户耕種不許有田輸稅户棄業分房請占又縁浮客戸多苦貧乏應募者少請依職田例招主客戸種蒔以沃瘠分為三等輸課其州縣官吏使臣如招得民依元詔批歴為勞績從之甲申麟府路鈐轄韓守英張志言知府州折惟昌奏奉詔率所部兵自火山軍入契丹朔州界前鋒破大狼水寨殺戮甚衆生禽四百餘人獲馬牛羊鎧甲數萬計詔奬之賜錦袍金帶將士緡錢有差時契丹方圍岢嵐軍聞敗即遁去知澶州張秉言已調集丁壯修葺州城上以戎寇在境而内地遽有完葺恐揺人心亟命罷之尋徙秉知滑州以引進使英州團練使何承矩知澶州乙酉詔漕運所經州軍長吏兼輦運事從淮南轉運使邵曄之請也丙戌遣供備軍副使安守忠案行澶州已北頓遞命澶州兵馬鈐轄内一人兼統縁河兵時縁河州軍益兵備戎人故也先是詔雷有終等取土門路與大兵會至是以戎寇東行逼武强縣復詔有終等率兵赴鎮州王超言契丹引衆沿胡盧河而東詔諸將整兵為備仍令岢嵐威虜軍保州北平寨部署等深入賊境腹背縱擊以分其勢諸路深入以分敵勢實錄不及岢嵐軍今從會要是月二十五日乙巳岢嵐亦奏㨗實錄葢漏此戊子祔明德皇后神主于太廟先是詔有司詳定升祔之禮上議曰唐睿宗昭成肅明二后先天之始唯以昭成配享開元之末又以肅明遷祔晉驃騎將軍温嶠有三夫人嶠薨詔問學官陳舒謂秦漢之後廢一娶九女之制妻卒更娶無復繼室生既加禮亡不應貶朝㫖以李氏卒於嶠之微時不霑贈典王何二氏並追加章綬唐太子少傅鄭餘慶將立家廟祖有二夫人禮官韋公肅議與舒同又云晉南昌府君有荀氏薛氏景帝廟有夏侯氏羊氏魯公顔真卿廟有夫人商氏繼夫人栁氏略稽禮文叅諸故事二夫人並祔於理為宜恭惟懿德皇后乆從升祔不可中移明德皇后繼受崇名亦當配享雖先後有殊在尊親一貫請同祔太宗室以先後次之詔尚書省集官詳議咸如禮官之請二后並配自是始也保州奏孫宻破敵功狀上曰縁邊强壯軍士等皆輕視敵人如此但將領得人固不難殄滅也詔以宻為振武軍校賜錦袍銀帶隨行軍士第遷賜之遣使於濵棣德博州安集流民詔青齊等州諭所部民無令驚擾以邊郡轉徙慮致揺動也令石隰路都監王汀率所部兵屯憲州如戎人自西谷入寇即會代州部署忻州駐泊兵拒之如自岢嵐寧化軍入寇即令麟府鈐轄韓守英率兵赴之庚寅命兵部尚書知青州張齊賢兼青淄濰安撫使知制誥知鄆州丁謂兼鄆齊濮安撫使並提舉轉運及兵馬又令齊賢謂具管内諸州山河道路廣狹形勢畫圖以聞既而敵騎稍南民大驚趣楊流渡舟人邀利不時濟謂紿取死罪囚斬河上舟人懼民悉得濟乃立部分使並河執旗幟擊刁斗以懼敵呼聲聞百餘里敵遂引去時曹濮多盗曹又闕守詔以屯田員外郎謝濤知州事屬縣賦稅舊分送睢陽倉助兵食會霖潦百姓苦於轉輸濤悉留不遣奏曰江淮漕運日過睢陽可取以餉軍願留此由廣濟河饋京師轉運使論以為不可詔從濤奏辛夘詔廣南官滿三年仍願在任者聽之乙未詔王超等率兵赴行在命知永興軍府向敏中兼管鳳州駐泊兵馬以便宜從事上將北征深念西鄙故有是詔敏中得詔藏之不下視事如他日邊藩以安上由是知其任重有再用之意丙申詔隨駕軍士先赴澶州天雄軍及縁河駐泊者並就賜裝錢丁酉詔威虜軍魏能保州張凝北平寨田敏等率所部兵屯定州先是詔能凝敏及邊都廵檢楊延朗分握精騎俟敵至則深入以牽其勢王超嘗請四人悉𨽻所部上以本設竒兵撓其心腹若復取裁大將則四人無以自効令不受超節度超既赴行在乃詔敏等移屯四人據張凝傳實錄獨不及楊延朗按明年正月詔延朗實為縁邊都廵檢而本傳脫略今附見上始聞博囉齊死詔贈武威郡王遣使賻䘏其家以斯多特為鹽州防禦使靈州西面縁邊都廵檢使己亥奪給事中呂祐之半月俸監察御史朱搏贖銅四十斤太僕卿直秘閣錢惟演右驍衛將軍錢惟濟各贖銅三十斤明德皇后發引前夕百官赴臨祐之班定方至搏臨畢而至惟演等不至為御史所紏劾故也辛丑賜監察御史王淳子元孺同學究出身淳先通判麟州會敵騎入寇率厲士衆城守有勞故錄其後詔洺州閉城以來如聞薪芻翔貴民甚艱食應避寇入保者宜縱其樵採壬寅詔川峽四路兵甲賊盗事内益利兩路令西川鈐轄司提舉䕫梓兩路令峽路鈐轄司提舉其逐州都監但主本州兵甲盗賊事命入内副都知秦翰乘傳詣澶州天雄軍等處裁制兵要便宜從事癸夘以斯多特為朔方軍節度使靈州西面廵檢西凉府六谷大首領上以遷黨未平藉其腹背攻制故悉授以博囉齊故官凡外臣除官皆舍人院草制斯多特授朔方猶循舊事自後乃從學士院降麻此據春明錄詔京西諸州軍淳化中雇饑民男女役使者悉還其父母乙巳保莫州岢嵐威虜軍北平寨並言擊敗契丹羣臣稱賀是役張凝田敏皆以偏師抵易州南虜獲人畜鎧仗凡數萬計獨魏能逗撓無功此據凝敏傳附見實錄於十二月辛夘乃書凝等虜獲數今移入是日宴於崇德殿不舉樂舊制卿監坐於東廂不升殿時光祿卿陳省華權知開封府特升於兩省五品之南别設位先是王繼忠得上手詔即具奏附石普以聞言契丹已領兵攻圍瀛州葢關南乃其舊疆恐難固守乞早遣使議和好丙午上覽其奏謂輔臣曰瀛州素有備非所憂也欲先遣使固亦無損乃復賜繼忠手詔許焉募神勇軍士李斌持信箭赴敵寨因令樞宻院擇可使契丹者王繼英言殿直曹利用自陳儻得奉君命死無所避上曰契丹先露懇誠求結和好使於兵間固亦無他然小臣聞命請行斯可嘉也乃授利用閤門祗候假崇儀副使奉契丹主書以徃又賜繼忠手詔利用諫子趙州人也利用本傳稱真宗幸澶州利用奏事行在王繼英薦之按初遣利用車駕未離京師也傳誤以再遣為初遣耳丁未羣臣表三上請聽樂不允以雍王元份為東京留守元份懇讓不許仍為盛選賔佐月増給錢三百萬他物稱是鹽鐵副使林特户部副使崔端同判留司三司特等乞依咸平二年魏羽例不書牒帖上曰魏羽兼權知開封以故不書牒帖今二人同掌不須循此例也戊申以樞宻直學士權三司使劉師道充隨駕三司使兼都轉運使己酉初置龍圖閣待制以都官郎中直祕閣杜鎬右正言祕閣校理戚綸為之以衛州防禦使李重貴為大内都部署初契丹自定州帥衆東駐陽城淀遂縁胡盧河踰關南是月丙戌抵瀛州城下勢甚盛晝夜攻城擊鼓伐木之聲聞於四面大設攻具驅奚人負板秉燭乘墉而上知州西京左藏庫使李延渥率州兵强壯又集貝冀廵檢史普所部拒守發礧石巨木擊之皆纍纍而墜踰十數日多所傷契丹主及其母又親鼓衆急擊矢集城上如雨死者三萬人傷者倍之竟弗能克乃遁去獲鎧甲兵矢竿牌數百萬驛書以聞十一月辛亥朔賜延渥及將士等錦袍金帶緡錢有差又特遷延渥本州團練使通判睦元凱推官李翔錄事叅軍蔡亨兵馬監押王誨及普並進秩普初自貝冀徃援瀛州道不通傳言瀛州已陷普亦叛去上召内殿崇班帶御器械王應昌問之對曰彼輕兵深入聞王師來援其勢固應解去普無故不應叛既而果然延渥進卿子應昌東明人也史普睦元凱李翔蔡亨王誨未詳邑里癸丑石州地震詔澶州逃亡軍士限兩月首身釋罪仍舊𨽻籍乙夘命戸部判官郝太冲詣邢洺磁相澶滑懷衛河陽通利軍安撫北面部署奏契丹自瀛州遁去其衆猶二十萬偵得其謀欲乘虚抵貝冀天雄軍詔督諸路兵及澶州戍卒會天雄軍自契丹入寇河朔皆城守右贊善大夫王嶼知冀州常有破敵之志日閲戍兵又集强壯練習之開門樵採如平日常上言寇若至必可邀擊願勿以一郡為憂於是游騎逼城嶼擊走之有詔嘉奬王嶼未見發忻代州兵赴諸路會合丁巳詔德清軍如戎寇南侵不須固守率城中軍民並赴澶州仍令駕前排陣使分兵應接以其介澶魏之間素不修完屯兵寡少也戊午詔官所僦京畿車乘並籍其數每乘賜千錢以雪寒故也己未遣都官員外郎孔揆安撫河東諸州庚申上謂輔臣曰聞寇沿河屯泊侵擾貝冀窺深州皆不利而去彼皆有備故也獨通利軍素無城壁兵甲若寇漸南王超等大軍未至邢洺即可憂也宜分兵益為之備開封府落解士人百餘擊登聞鼔自陳素習武藝願備軍前役使上御便殿召試之能挽弓者才三人各賜緡錢令赴天雄指使辛酉令隨駕兵自來日以次發赴澶州壬戌詔北面諸路如有材勇之士能入賊壘焚營斬級者以名聞當加殊賞詔縁邊州軍如有契丹渤海人来投即給廪食遣人守䕶俟敵退以聞慮其姦詐諸處莫能辨故也先是周瑩召洺州騎士千五百人赴天雄道與敵遇力戰有死傷者瑩謂其玩寇將悉誅之會使者自北來言其事詔並賜帛及酒藥諭瑩勿治其罪甲子上校獵近郊至丁岡村見民舍有牆垣頽壞室廬卑陋者因幸之乃稅戸喬謙也召其家人賜萬錢衣三十事免三年庸調乙丑詔留守官司如車駕離京後有無頼不逞騷動人民情理難恕者並斬訖以聞頒諸路所偵戎寇事宜以示諸將詔京畿諸縣調發軍馬京東西諸州運芻糧民戸今年秋稅展一月限詔應擊登聞鼔邀車駕河北舉人及諸色人乞扈從先登効用者令軍頭司第其材勇引見訖送諸處指使丙寅遣都官員外郎王礪秘書丞許洞殿中丞皇甫選大理寺丞李渭詣澶州安集河北流民丁夘詔今日以前逃亡軍士並許首身釋罪仍𨽻軍籍在外者加賜裝錢戊辰以山南東道節度使同平章事李繼隆為駕前東面排陣使馬軍都指揮使葛霸副之西上閤門使孫全照為都鈐轄南作坊使張旻為鈐轄武寧節度使同平章事石保吉為駕前西面排陣使步軍都虞候王隱副之入内副都知秦翰為鈐轄王繼忠之戰於望都也張旻為定州行營鈐轄率諸將間道徃援比至城已陷旻與敵戰身被數創殺一梟將遲明復戰而繼忠為契丹所執旻還言天道方利客先起者勝宜大舉北伐并上興師出境之日上以問輔臣皆言不可乃止於是車駕將親征旻方戍并代復奏邊事十餘多論兵貴持重及所以取勝者召還入對上曰契丹入塞與卿所請北伐之日同悔不用卿䇿今須守澶州扼橋而未得人如之何旻請行上喜故命為東西鈐轄先令至澶州候敵逺近旻即馳騎徃秦翰既受命亟督衆環城浚溝洫以拒戎馬功畢寇果暴至翰不解甲胄凡七十餘日云己巳發永興駐泊龍衛雲騎八指揮赴行在庚午詔縁河京東西路諸州軍秋稅並加限兩月實錄又於十二月壬午再書此恐重復今止存其一是日車駕北廵司天言日抱珥黄氣充塞宜不戰而却有和解之象曹利用至天雄孫全照疑契丹不誠勸王欽若留之契丹既數失利復令王繼忠具奏求和好且言北朝頓兵不敢劫掠以待王人繼忠又與葛霸等書令速達此奏是夕奏入上因賜繼忠手詔言已遣利用又以手詔促利用徃并付繼忠使告契丹遣人自抵天雄迎援之繼忠尋亦聞利用留天雄不行復具奏乞自澶州别遣使者至北朝免至緩誤辛未車駕至長垣縣得其奏遂以前意荅焉壬申次韋城縣詔知滑州張秉齊州馬應昌濮州張晟未見徃來河上部丁夫鑿冰以防戎馬之度天雄軍聞冦將至闔城惶遽王欽若與諸將議探符分守諸門孫全照曰全照將家子請不探符諸將自擇利便處所不肯當者全照請當之既而莫肯守北門者乃以命全照欽若亦自分守南門全照曰不可參政主帥號令所出謀畫所决南北相拒二十里請覆待報必失機會不如居中央府署保固腹心處分四面則大善欽若從之全照素教蓄無地分努手皆執朱漆弩射人馬洞徹重甲隨所指麾應用無常於是大開北門下釣橋以待之敵素畏其名莫敢近北門者乃環過攻東門良乆舍東門趣故城故城未詳處所當考夜復自故城潛師過城南設伏於狄相廟遂南攻德清軍欽若聞之遣將率精兵追擊伏起斷其後天雄軍不能進退全照請於欽若曰若亡此兵是亡天雄也北門不足守全照請救之乃引麾下出南門力戰殺傷其伏兵略盡天雄兵復得還存者什三四敵遂陷德清知軍尚食使張旦及其子三班借職利涉虎翼都虞候胡福等十四人並死之先是詔王超等率兵赴行在踰月不至寇益南侵上駐蹕韋城羣臣復有以金陵之謀告上宜且避其鋭者上意稍惑乃召寇準問之將入聞内人謂上曰羣臣輩欲將官家何之乎何不速還京師準入對上曰南廵何如準曰羣臣怯懦無知不異於鄉者婦人之言今寇已廹近四方危心陛下惟可進尺不可退寸河北諸軍日夜望鑾輿至士氣當百倍若回輦數步則萬衆瓦解敵乘其勢金陵亦不可得而至矣上意未决準出遇殿前都指揮使髙瓊門屏間謂曰太尉受國厚恩今日有以報乎對曰瓊武人誠願効死準復入對瓊隨入立庭下準曰陛下不以臣言為然盍試問瓊等遂申前議詞氣慷慨瓊仰奏曰寇準言是且曰隨駕軍士父母妻子盡在京師必不肯棄而南行中道即亡去耳願陛下亟幸澶州臣等効死敵不難破準又言機會不可失宜趣駕時王應昌帶御器械侍側上顧之應昌曰陛下奉將天討所向必克若逗遛不進恐敵勢益張或且駐蹕河南發詔督王超等進軍寇當自退矣上意遂决甲戌晨發左右以寒甚進貂裘絮帽上却之曰臣下暴露寒苦朕獨安用此耶夕次衛南縣遣翰林侍讀學士潘謹修先赴澶州詔澶州北寨將帥及知州不得擅離屯所迎候車駕記聞云王欽若陳堯叟宻奏金陵之謀按欽若已在天雄必無此奏堯叟本議幸蜀上既北出堯叟固亦不復申言且改圖也此當是羣臣怯懦者别請南幸偶與欽若前謀合因誤以為欽若等宻奏耳寇準先破二䇿於朝云不可逺之楚蜀今此但云金陵不可得至固亦不及蜀也它書載準語多差謬葢不知準先議於朝後議於韋城凡兩對輙并言上幸澶淵時故率不可據今略取記聞所載稍刪潤之上前賜王繼忠詔許遣使繼忠復具奏附石普以達普自貝州遣指使散直張皓特詣行闕道出敵寨為所得契丹主及其母引皓至車帳前問勞乆之因令抵天雄以詔促曹利用王欽若等疑不敢遣皓獨還契丹主及其母賜皓袍帶館設加等使繼忠具奏且請自澶州别遣使速議和好事於是皓以其奏入上復賜欽若詔又令參知政事王旦與欽若手書俾皓持赴天雄督利用同北去并以詔諭繼忠因謂輔臣曰彼雖有善意國家以安民息戰為念固許之矣然彼尚率衆兵深入吾土又河冰且合戎馬可渡亦宜過為之防朕已决成算親勵全師若盟約之際别有邀求當决一戰剪滅此寇上天景靈諒必助順可再督諸將帥整飭戎容以便宜從事皓澶州人也沈括筆談云國史載講和事本末不詳因著張皓徃來及以寇謀告繼隆等實錄葢有之見景德二年正月甲戌所稱天雄圍合不知曹利用所在募遣皓及召見皓子則恐非也皓乃石普貝州所遣者既為寇得始見上上因使至天雄督利用皆徃其子當在貝州或在它所安得隨皓在衛南乎括又云和議定始改元景德此則因王曽筆錄之誤改元既誤它所稱咸平六年夏四月石普先得繼忠書抑亦未可信也今並不取括又為皓子牧志墓載皓事尤詳且云考諸國史而信葢飾說也雖如括所載皓實上所親遣則是時上已即師契丹深入澶魏矣皓但當至冦所屯處乃曰臣不操質歸死不復入白溝益知所載皆失實葢括乃皓孫女婿直取其妻父説又増飾之且以夸世耳不可據也契丹既陷德清是日率衆抵澶州北直犯大陣圍合三面輕騎由西北隅突進李繼隆等整軍成列以禦之分伏勁弩控扼要害其統軍順國王達蘭有機勇所將皆精銳方為先鋒異其旗幟躬出督戰威虎軍頭張瓌守床子弩弩潛發達蘭中額隕其徒數十百輩競前輿曵至寨是夜達蘭死敵大挫衂退却不敢動但時遣輕騎來覘王師瓌壽光人也達蘭死時上猶未至澶州劉攽所作冦準傳及他書皆誤今不取乙亥内出陣圖二一行一止付殿前都指揮使髙瓊等給諸軍介胄及賜緡錢有差丙子車駕發衛南李繼隆等使人告㨗又言澶州北城門巷湫隘望且於南城駐蹕是日次南城以驛舍為行宮將止焉寇準固請幸北城曰陛下不過河則人心危懼敵氣未懾非所以取威决勝也四方征鎮赴援者日至又何疑而不徃髙瓊亦固以請且曰陛下若不幸北城百姓如䘮考妣簽書樞宻院事馮拯在旁呵之瓊怒曰君以文章致位兩府今敵騎充斥如此猶責瓊無禮君何不賦一詩詠退敵騎耶即麾衛士進輦上遂幸北城至浮橋猶駐車未進瓊乃執撾築輦夫背曰何不亟行今已至此尚何疑焉上乃命進輦既至登北城門樓張黄龍旂諸軍皆呼萬歲聲聞數十里氣勢百倍敵相視益怖駭上覽觀營壁召見李繼隆已下諸將撫慰者乆之賜諸軍酒食緡錢戊寅移御北城之行營二十六日已渡河幸北城當遂駐蹕二十八日乃始移御北城行宮不知何也豈二十六日却還宿城南乎當考曹利用自天雄赴契丹寨見其國主羣臣與其宰相韓德讓同處一車羣臣與其主重行別坐禮容甚簡以木横車軛上設食器坐利用車下饋之食共議和好事議未决乃遣左飛龍使韓把持國主書與利用俱還詔知澶州引進使何承矩郊勞翰林學士趙安仁接伴之凡覲見儀式皆安仁所裁定云十二月庚辰朔韓把入對於行宮之前殿跪授書函於閤門使使捧以升殿内侍省副都知閻承翰受而啟封宰相讀訖命把外殿跪奏云國母令臣上問皇帝起居其書以關南故地為請上謂輔臣曰吾固慮此今果然唯將奈何輔臣等請荅其書言關南故地乆屬朝廷不可擬議或歲給金帛助其軍費以固懽盟惟陛下裁度上曰朕守祖宗基業不敢失墜所言歸地事極無名必若邀求朕當决戰爾實念河北居人重有勞擾儻歲以金帛濟其不足朝廷之體固亦無傷答其書不必具言但令曹利用與韓杞口述兹事可也趙安仁獨能記太祖時國書體式因命為答書賜杞襲衣金帶鞍馬器幣把即日入辭遂與利用同徃韓把受襲衣之賜及辭復左袵且以賜衣稍長為解趙安仁曰君將升殿受還書天顔咫尺如不衣所賜之衣可乎把即改服而入上又面戒利用以地必不可得若邀求貨財則宜許之利用對曰臣鄉使曉契丹語人宻伺韓把聞其乘間謂左右曰爾見澶州北寨兵否勁卒利器與前聞不同吁可畏也臣此行得熟察之茍妄有邀求必請會師平蕩命户部判官員外郎李含章澶州至京提㸃供頓案含章下疑有脫字今無别本可校姑仍原文鄆齊等州安撫使丁謂言擒獲契丹諜者馬珠勒格即斬之鞫問其人稱徒侶甚衆今各具形貌年齒請下諸路分捕從之是日日有食之德博州並言契丹已移寨由東北去晉公言景德中契丹寇澶淵在河北聖駕在河南陣次忽日食盡真宗見之憂懼司天監官奏云按星經云主軍和解真宗不之信復檢晉書天文志亦云和解移時契丹兵果自退而續馳書至求通好時晉公為紫微舍人知鄆州此事見潘汝士晉公談錄按是日敵使韓祀已入對行營矣談錄妄也今不取辛巳遣殿中侍御史劉益殿中丞皇甫選詣濮青淄齊濰等州安撫河北流民劉益須城人詔左神武軍大將軍王榮寄班供奉官鄭懷德領龍衛兵馬與滄州部署荆嗣會於淄青防寇之南渡也詔永興軍兵除先追赴河陽及量留本州外並令部署許均領赴行在壬午幸城南臨河亭賜鑿凌軍士綿襦及緡錢有差詔京東西縁河州軍秋稅於常限外延兩月龍衛左第四軍都虞候李珂而下六人遞遷軍職賜錦袍銀帶賞北寨戰克之勞也何承矩言臨河觀城縣民石興等數輩自敵寨逃歸具言達蘭中矢死其夕候騎自澶州繼至寇聞駕起衛南皆相顧失色復有馳騎徃來傳報及擊鼔驩譟悉遁去民被驅掠甚衆無守視之者因得脫上曰達蘭乃裕恱之儔也裕恱舊樂野戰頗難制達蘭知勇不在其下而多務城守此所以不及也今歲入寇皆其首謀或聞犯邊以來累戰不利因號令部下凡獲男子十五以上者皆殺之彼既失其謀主朕親御六師而王超等三路大兵亦合勢南來彼奔北固其宜也滑州言契丹引衆攻通利軍知軍王固棄城宵遁契丹掠城中民衆而東詔劾固罪以聞固至河陽為趙昌言所縛送闕下付御史獄治㑹赦責監賀州銀錫場王固未見癸未幸北寨又幸李繼隆營命將校從官飲犒賜諸軍有差遣給事中呂祐之齎敕牓諭兩京以將班師曹利用與韓把至契丹寨契丹復以關南故地為言利用輙沮之且謂曰北朝既興師尋盟若歲希南朝金帛之資以助軍旅則猶可議也其接伴政事舍人髙正始遽曰今兹引衆而來本謀關南之地若不遂所圖則本國之人負媿多矣利用答以禀命專對有死而已若北朝不恤後悔恣其邀求地固不可得兵亦未易息也其國主及母聞之意稍怠但欲歲取金帛利用許遺絹二十萬匹銀一十萬兩議始定契丹復遣王繼忠見利用且言南北通和實為美事國主年少願兄事南朝又慮南朝或於縁邊開移河道廣浚壕塹别有舉動之意因附利用宻奏請立誓并乞遣近上使臣持誓書至彼甲申利用即與其右監門衛大將軍姚柬之持國主書俱還并獻御衣食物其郊勞館穀並如韓把之禮命趙安仁接伴柬之談次頗矜兵强戰勝安仁曰聞君多識前言老氏云佳兵者不祥之器聖人不得已而用之勝而不美而美之者是樂殺人樂殺人者不得志於天下柬之自是不敢復談柬之又屢稱王繼忠之材安仁曰繼忠早事藩邸聞其稍謹不知其他也安仁敏於酬對皆切事機議者嘉其得體乙酉柬之入對於行宮中使受其書書辭猶言曹利用所稱未合王繼忠前議然利用固有成約悉具繼忠宻奏中矣是日上御行宮之南樓觀大河宴從官召柬之與焉丙戌柬之入辭命西京左藏庫使奬州刺史李繼昌假左衛大將軍持誓書與柬之俱徃報聘金帛之數如利用所許其他亦依繼忠所奏云先是上謂輔臣韓把與柬之來皆言其國母附達起居而不述其主此葢母專其政人不畏其主也朕詢於利用其言亦同仍云聞聽之間葢因其主不慧如是則繼昌之行宜亦致書其母可令潛以此意訪于柬之既而利用言柬之云國母比欲致書以南朝未有緘題故寢而不議若南朝許發簡翰頗合便宜遂并致兩書又各送衣服茶藥金器等以答柬之所獻者柬之又言收衆北歸恐為縁邊邀擊有詔諸路部署及諸州軍勿輙出兵馬以襲契丹歸師詔昨所調京畿民車乘輦運芻粟並令輸於澶州而罷遣之其還京車乘有司别為規畫分遣知制誥陳堯咨侍御史知雜事李濬都官員外郎王礪祕書丞許洞撫諭懷孟澤潞滑鄭等州放强壯歸農濬信都人也詔荆嗣仍屯鄆州都提舉鄆青淄濰齊曹單濟沂兖宻亳宋徐州廣濟淮陽軍廵檢司事丁亥遣侍御史髙貽慶等四人分詣河北諸州安集流民瘞暴骸羣盜未禽獲者督捕之以殿直閤門祗候曹利用為東上閤門使忠州刺史利用之再使契丹也面請歲賂金帛之數上曰必不得已雖百萬亦可利用辭去寇準召至幄次語之曰雖有敇㫖汝徃所許不得過三十萬過三十萬勿來見準準將斬汝利用果以三十萬成約而還入見行宮上方進食未即對使内侍問所賂利用曰此機事當面奏上復使問之曰姑言其略利用終不肯言而以三指加頰内侍入白三指加頰豈非三百萬乎上失聲曰太多既而曰姑了事亦可耳宮帷淺廹利用具聞其語及對上亟問之利用再三稱罪曰臣許之銀絹過多上曰幾何曰三十萬上不覺喜甚故利用被賞特厚記聞稱敵兵既退來求和詔劉仁範徃議之仁範以疾辭乃命曹利用利用先與約歲賂二十萬敵嫌其少利用復還奏上許百萬以下按冦始求和兵固未嘗退利用初使葢不及歲賂再還即許三十萬亦不因還奏乃増益之也龍川别志又云達蘭死寇始求和此皆誤今約本史刪修事語則仍取此二書又不知劉仁範何人當考詳遣内侍三班副都知閻承翰徃德清軍規度修城戊子上作囬鑾詩命近臣和幸北寨勞軍召排陣使李繼隆石保吉宴射行宮亭咸賜襲衣金帶鞍勒馬仍舉酒屬之繼隆等皆引滿因再拜言曰契丹無名犯塞此葢將帥非才致勞陛下親駕戎輅冒犯雪霜當戎寇之入也羣議皆務城守若非决於宸斷盡出禁衛騎卒陳於北郊授以成算則前日敵衆侵突必不能戮彼渠魁遏其壯勢又戎寇之退走也若會諸將襲逐必立竒功陛下復念其請盟許其修好安民息戰示以好生不令邀擊開其歸路臣等無以展尺寸之効上曰北陲自古為患儻思平憤恚盡議殲夷則須日尋干戈歲冇勞費今得其畏威服義息戰安民甚慰朕懷亦卿等之力也保吉進曰臣受命禦寇雖上禀宸略至於戎人侵突之際分布行陣指揮方略皆出於繼隆繼隆曰契丹之敗並出聖謀然宣力用心躬率將士臣不及保吉上曰將帥如此協和共圖勲績軍旅之事朕復何憂是役也定國節度使駙馬都尉魏咸信獨無所職因避席自陳材謀不得任用上一笑慰撫之相與盡懽而罷北面諸州軍奏偵得契丹北去未即出塞頗縱游騎騷擾鄉閭貝州天雄軍居民驚移入郭詔髙陽關副部署曹璨帥所部取貝冀路赴瀛州以保州路部署寧州防禦使張凝為縁邊廵檢安撫使洛苑使平州刺史李繼和副之選天雄騎兵二萬為燦後繼以躡戎寇敢刼掠則所在合勢翦戮仍遣使諭契丹以朝廷為民庶尚有驚擾出兵廵撫之意又賜王繼忠手詔令告契丹悉訪所掠老幼命澶州馬鋪小校華斌乘驛齎赴敵寨己丑免澶州將校每日起居欲移軍河内就便董率故也賜河東廣銳兵三十指揮緡錢遣還本營庚寅詔河北經宼乏耕牛商人販鬻者免其稅李繼隆奏龍衛指揮使劉普領兵奪戎人車牛生口凡萬餘計辛夘命給事中呂祐之赴東京閲視迎駕儀仗詔河東轉運使鄭文寳所領蕃漢兵就命使臣部還本道王超等言率大軍赴天雄虎翼卒三人輙入村落伐桑棗為薪已按軍法詔王超等分三路兵營在河南者步騎萬人赴澶州命李繼隆石保吉領之天雄軍始聞超以大軍至頗疑懼孫全照欲閉城拒之王欽若不可曰若果如此則猜嫌遂形是成其叛心也乃命於城外十里結綵棚以待之至則迎勞歡宴飲酒連日既罷其所統諸軍悉已分散諸道盡矣親軍皆不知焉記聞此事恐未必然今且附見當考遣雷有終領所部兵還并州屯所時王超等逗撓無功唯有終赴援威聲甚振河北列城頼以雄張云壬辰赦河北諸州死罪以下民經戎寇蹂踐者給復二年死事官吏追錄子孫遣使臣五人赴曹璨張凝等屯所日一人乘傳入奏命翰林學士邢昺祭河癸巳大宴於行宮宰臣畢士安先以疾留京師是日來朝議者多言歲賂契丹三十萬為過厚士安曰不如此則契丹所顧不重和事恐不能乆也東京有劫盗繫右軍廵獄疑狀未具繼獲餘黨既至見其徒械繫因共擊獄卒以謀奔竄獄吏不能禁馳白留守雍王元份遽遣搜捕送府主吏恐其復亡亟折其足元份始聞獄辭怖甚又不忍其酷法遂驚悸暴得疾詔叅知政事王旦權東京留守事即日乘傳先還時兩河之民頗有陷敵者旦上言國家攬四海之富不急之費動至億萬願出金帛數十萬贖其人或有沮議者遂止陳貫亦有此議具明年以供備庫使帶御器械綦政敏為威虜軍鈐轄先是寇逼軍城部署魏能與保州張凝等出兵拒鬭小失利能即引衆先還凝等力戰却之衆皆憤悱譙讓能凝獨默然或問之凝曰能麤材險愎既不為諸君所容吾復切責使其心不自安非計也上聞而嘉凝及分道抵幽易能又畏懦不敢深入且不戢所部多俘奪人畜既而俱屯定州凝獨受詔躡寇能自媿無功言詞怨懟有涉謗訕朝議以能剛猾少檢不可專任故命政敏同掌其軍政河陽修築城池詔罷之慮擾民也甲午車駕發澶州大寒賜道旁貧民襦袴張凝等奏率兵至貝冀戎人候騎各團結北去不敢侵掠偵得戎首與其母已過定逺軍乙未廵寨使臣上言戎人寇相州通判太常丞楊自牧率州兵丁北逐走之境内以安詔以自牧知州事命天雄軍諸路駐泊鈐轄都監等率兵赴磁相洺州招誘羣盗安集流民楊自牧未見華斌自敵寨還王繼忠具奏北朝已嚴禁樵采仍乞詔張凝等無使傷殺北朝人騎上謂輔臣曰昨儻徇羣議發大軍會石普楊延朗所部屯布縁河諸州邀其歸路以精銳追躡腹背夾攻則彼必顛沛矣朕念矢石之下殺傷且多雖有成功未能盡敵自兹北塞常須益兵河朔人民無日休息况求結歡盟已議俞允若彼自渝盟約復舉干戈因而誓衆中外同憤使其覆亡諒亦未晚今張凝等出兵襲逐但欲絶其侵擾耳左右皆稱萬歲延朗嘗言敵頓澶淵去境北千里許人馬罷乏雖衆易敗凡所剽掠悉在馬上願飭諸軍扼要路掩殺其兵殲則幽易數州可襲取也奏入不報延朗獨帥所部兵抵契丹界破古城俘馘甚衆此據延朗傳按明年正月詔延朗實再任縁邊都廵檢而本傳脫略今附見李繼昌至敵帳羣情大感悅館設之禮益厚即遣其西上閤門使丁振奉誓書來上丁酉車駕頓陳橋振謁見行在所賜宴令辭歸遣曹利用送之境上繼昌言契丹頗遵用漢儀然多雜其國之法上之人雖欲變改而俗不可易也張凝等言契丹已出塞凝等各歸屯所戊戌車駕至自澶州上初以懿德皇太后忌欲徹鹵簿鼔吹不舉樂時龍圖閣待制杜鎬先還備儀仗遣騎馳問之鎬曰武王載木主伐紂前歌後舞春秋不以家事辭王事凱旋用樂於禮無嫌也上復詔輔臣共議皆固以請乃從之寇準在澶州每夕與知制誥楊億痛飲謳歌諧謔喧譁達旦上使人覘知之喜曰得渠如此吾復何憂乎時人比之謝安既而曹利用與韓把至行在議和準初欲勿許且畫䇿以進曰如此可保百年無事不然數十歲後戎且生心矣上曰數十歲後當有能扞禦之者吾不忍生靈重困姑聽其和也準處分軍士或違上㫖及是謝曰使臣盡用詔令兹事豈得速成上笑而勞焉辛丑錄契丹誓書頒河北河東諸州軍始通和所致書皆以南北朝冠國號之上將作監丞王曽言是與之亢立失孰甚焉願如其國號契丹足矣上嘉納之然事已行不果改按兩朝誓書冊内有景德元年誓書本不知真宗實錄何故不載今附于此維景德元年歲次甲辰十二月庚辰朔七日丙戌大宋皇帝謹致誓書于大契丹皇帝闕下共遵成信䖍奉歡盟以風土之宜助軍旅之費每歲以絹二十萬疋銀一十萬兩更不差臣專徃北朝只令三司差人般送至雄州交割沿邊州軍各守疆界兩地人戸不得交侵或有盗賊逋逃彼此無令停匿至於隴畝稼穡南北勿縱驚騷所有兩朝城池並可依舊存守淘壕完葺一切如常即不得剏築城隍開㧞河道誓書之外各無所求必務協同庶存悠乆自此保安黎獻慎守封陲質于天地神祗告于宗廟社稷子孫共守傳之無窮有渝此盟不克享國昭昭天鍳當共殛之逺具披陳專俟報復不宣謹白維統和二十年歲次甲辰十二月庚辰朔十二日辛夘大契丹皇帝謹致誓書于大宋皇帝闕下共議戢兵復論通好兼承惠顧時示誓書云以風土之宜助軍旅之費每歲以絹二十萬疋銀一十萬兩不差使臣專徃北朝只令三司差人般送至雄州交割沿邊州軍各守疆界兩地人戸不得交侵或有盗賊逋逃彼此無令停匿至于隴畆稼穡南北勿縱驚騷所有兩朝城池並可依舊存守淘壕完葺一切如常即不得剏築城隍開㧞河道誓書之外各無所求必務協同庶存悠乆自此保安黎獻慎守封陲質于天地神祗告于宗廟社稷子孫共守傳之無窮有渝此盟不克享國昭昭天鍳當共殛之孤雖不才敢遵此約謹當告于天地誓之子孫茍渝此盟神明是殛專具諮述不宣謹白景祐二年二月一日奉聖㫖令上石又按仁宗實錄慶歴二年九月乙丑載契丹誓書其所稱景德元年十二月七日誓書與此並同但有一二字不同耳此誓書俱不稱南北朝不知王曽何故云事已行不果改當考壬寅詣啟聖院謁太宗神御癸夘命知制誥李宗諤楊億直史館陳彭年詳定正辭錄因令自今祝板當進署者並祕閣吏書寫上覩先代帝王祝文有言商王湯者以問宗諤等上言經典之内堯舜禹湯或以名或以諡今正辭錄堯舜並稱陶唐有虞氏若從改避足表致䖍其禹湯望止曰夏王商王中宗太戊髙宗武丁並止稱廟號奏可邠州部署言李繼遷子阿伊克孔目官何憲來歸詔令乘傳赴闕遣内殿崇班楊保用等四人分詣河東西路撫問官吏將卒察訪功狀實録誤稱河北河東陜西路今從本紀保用宫邸攀附者不詳其邑里見王繼忠傳詔諭陜西川陜官吏軍民以契丹修好畢賀還京也甲辰上謂輔臣曰昨戎人寇德清軍虎翼都虞候胡福帥兵力戰金瘡徧體猶奮劔轉鬬矢無虚發麾下死盡獨挺刃殺數十人副指揮使尚祚能運大撾所斬首拉脅者亦百餘人衆寡不敵皆以戰没忠勇之節實可嘉尚朕遣使訪其遺骸唯得福尸已命厚葬之宜奬其嗣改威虜軍曰廣信静戎曰安肅破虜曰信安平戎曰保定寧邊曰永安定逺曰永静定羌曰保德平虜城曰肅寧乙巳以天雄軍鈐轄西上閤門使孫全照知軍府事召王欽若歸闕丁未廢石隰州部署置石隰縁邊都廵檢使仍命汝州防禦使髙文岯領之西上閤門使張守恩為都監領駐泊兵俟河水合即往來巡察戊申上覽河北奏報諸州多被蹂踐通利軍傷殘尤甚慘然形於顔色乃下詔罪已與民休息畢士安等上表待罪優詔答之翰林學士梁周翰答詔不稱㫖命趙安仁改撰既而謂安仁曰勿令周翰知恐其愧恨也徙河東轉運使鄭文寳為京西轉運使賜手詔嘉奬之以戎寇之際能安輯所部故也詔殿前侍衛司自今孔目官已下有闕不得擅自轉補及改名並奏聽朝㫖先是殿前等司吏人無定制只本司増移補署至是上令指揮使髙瓊等重定員數以聞故有是詔會要在元年十一月今移入歲末
