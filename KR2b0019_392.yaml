body:
  text: 續資治通鑑長編卷三百八十八宋李燾撰哲宗元祐元年九月壬申文思副使內侍押班梁惟簡為皇城副使十月二十日蘇軾云云御史中丞劉摰言臣昨日曽論林希姦邪不可為中書舍人使與朝論今者竊聞已有除命則是臣之區區未䝉採納矣伏緣希天資忮害士大夫皆知之從來惟是阿附執政躁於進用而近日尤甚以利相市其跡甚著若在詞掖日參政議朋姦陷交相為脣齒立私黨以擾公道自此朝廷之上必為其所欺謾交亂政事非小害也昨有試畢以進告身而罷者則邢恕是也由起居以言而罷者滿中行是也伏望聖慈詳察中書舍人職在要近非他官之比决不可以姦邪居之速賜罷希新命依條除一外任以慰公論希有詞藻若稍能自重由正道而進則一舍人不足道也惟其急進朋附非人此臣所以不得已而必論懼其黨之盛也又言臣等竊以姦臣交結古今大患上足以䝉蔽朝廷下足以動搖士類若不察其幾微翦其萌蘖盤固蔓延必將難拔臣等自春至秋纍上章疏及上殿奏陳中書侍郎張璪姦邪乞罷執政陛下嘗諭臣等候過眀堂大禮張璪必退今大禮已畢而璪方楊楊有自得之色殊無退意謹按璪面柔而心狠言甘而行險身為大臣當一以大公之道尊主庇民不當交結臣僚以肆欺罔璪被詔舉文學行誼之臣充館職眀知陸長愈貪汚有素文行無稱以長愈乃林希妻親弟受其請託輒以應詔璪所以受其託者不獨在結希意在希之弟旦見為殿中侍御史冀其隂助也今聞希已為中書舍人昨日聞主者促撰告詞甚急竊意璪之為謀欲希早受命成其姦黨今若使依舊在中書預政柄林希又作屬官預國論又有弟旦作御史為隂助上下朋比挾邪飾詐無所不可朝廷將如何也恭惟陛下睿眀之德洞照姦慝每行黜陟天下咸服今璪與林希兄弟相結姦黨已成臣等若顧嫌疑若避形迹不傾寫肝膽極言力陳以告陛下破其姦黨則後日之患將無可奈何臣等負陛下深矣伏望陛下特奮睿斷罷張璪執政追寢林希中書舍人之命則姦黨不成朝廷清矣陛下如以臣等言為是乞降出臣等章付外公行如以臣等言為非乞行顯戮以戒妄言之罪侍御史王巖叟言臣伏見中書侍郎張璪受詔舉文學行能之士可充館職者而璪無公忠報國之心為陛下求賢乃受起居郎林希干請薦希之妻弟陸長愈以應詔按長愈貪汚狼籍無士人之行已為舉主吳審禮等首其姦狀今在有司璪切於交結林希故昧朝廷而薦之其交結希之意乃在交結希之弟殿中侍御史旦也旦方為言事官欲其隂為已助耳希姦回險佞清議共所不與而璪獨喜之璪柔邪巧佞正人共所憤嫉而希獨附之希藉殿中之權以交璪璪因殿中之勢以親希相資以權相市以勢姦人得朋氣焰增熾未易撲滅非國之福也今希召試中書舍人若陛下不知容其受命遂為璪之屬官矣朝夕相親預聞國論其得安乎自此日購邪謀隂害政事臣恐臺諫交章瀆亂宸聼無有寧日矣伏望聖慈以國家為重禁邪於已兆防患於將然早賜罷免張璪中書侍郎之任追寢林希中書舍人之命并斥陸長愈不得召試館職以懲姦慝以肅朝廷不勝幸甚監察御史孫升言近嘗論奏十科取士必用逹官而朝廷自兩制近臣當求有德茍本源或濁則流泒曷清又嘗論滿中行以謂今日之大臣則前日之侍從今日之侍從則異日之大臣矣侍從之選可不謹哉臣昨因論五月四日差除不當內起居郎林希文詞雖優而行義無取王圭執政則附圭韓縝當國則結縝今則又轉而之張璪之門矣何以異滿中行之所為前日竊聞召希試中書舍人希姦佞險惡無端良公忠之操難以備邇臣之選伏惟陛下臨政以來登崇俊良選用耆德立萬世太平之基澄源清流正在今日如希之姦險安可令侍上左右以陪國論哉伏望聖慈詳察特降指揮追寢則天下幸甚四月二十六日癸丑中行小龍眀州九月十六日希中書舍人十九日罷升又言臣讀易至否泰二卦然後知君子小人進退消長繫天下治亂安危也隂陽之內外小大之往來非一日之積由馴致而然一隂之在內不足以有凶必至於三隂之俱來然後以為否一陽之在內不足以有吉必至於三陽之彚征然後以為泰是猶朝廷之上人主之側一小人之力未足以為天下之亂為天下之亂者羣小也一君子之功不足以致天下之治致天下之治者衆賢也小人成羣賢者衆多雖各以類而至然去取乃繫乎人主是以古先哲王知小人之來則其漸必至於成羣以為天下之亂故去邪勿疑詩云憂心悄悄愠于羣小也知君子之征則其類必至於衆以致天下之治故任賢勿二詩云濟濟多士文王以寧也伏惟皇帝陛下太皇太后陛下臨御以來登用正人斥逐姦惡開大公之路昭勿二之懷且天下四方無愚智皆以為賢者司馬光而已陛下至誠禮貌任以為相於是名儒舊德奮迅而起以彚而征太平之基已兆姦險之惡猶存而光不幸死矣不獨聖懷軫念亦使善類疚心何則姦險之人難退而易進茍引類而來陛下遲疑而不去則其漸將至於成羣此君子所以為憂也所謂姦險之存者中書侍郎張璪也附麗以交結者林希也前日林希召試中書舍人諫官御史極言論列而天聽未回告命已下希既為中書屬官朝夕與璪謀議而希弟旦為御史茍或上下交通則其類馴致誠恐非朝廷之福臣愚不肖誤䝉陛下拔擢夙夜思念少圖補報而狂瞽之言不足以感悟明主臣今非不知上忤大臣之意下失同列之情而中取怨於希所以惓惓愚忠上冒聖聽至於再三者深慮小人之浸長不顧一身之私謀伏望聖慈少加省察檢㑹臣前奏特行追寢則天下幸甚癸酉詔林希為集賢殿修撰知蘇州陸長愈罷試館職侍御史王巖叟言大臣之罪莫深於挾私意以欺主上莫險於急身謀以忘國家莫逆於懷姦心以圖後日之利有一於此皆所當誅而無赦按中書侍郎張璪不忠不孝欺罔先帝之罪不可言陛下隱忍含容不欲加誅且令備位政府今又踰年陛下之恩深矣至矣然璪既不知感又無悛心復隂結姦黨欲成私謀以害政事以危國家幸陛下洞照姦心黜其黨與新除中書舍人林希於外罷其所舉館職宣德郎陸長愈不得召試搢紳之士無不竦服皆謂睿眀不可欺聖斷不可測清眀之政不可亂天下幸甚自古姦臣不眀其罪不政其罰則必揚言於人自以為無過而貽怨於上臣恐陛下於璪罪惡行之有所不暴盡之有所不眀以失中外之意徒使姦心怏怏退有後言非所以嚴典刑厲大臣也伏望陛下眀白其罪行竄斥以示天下使姦臣知懼以為後世事君者之戒貼黃稱臣竊以既黜林希陸長愈則璪不可不行降黜以正其交結之罪勿宜復如蔡確使之僥幸善去令天下之人以為憤恨也惟陛下省察幸甚大抵姦臣為姦之狀難得而見幸而見之不可不行也今陛下行璪一人足以懲姦臣立黨之私矣璪挾私懷姦朋邪罔上如此若朝廷不重加貶謫反進職名與之善藩則他時大臣以勳勞均逸於外者將何以處之此不可不重也定州路安撫司言北人田文等告獲姦細人翟安歸眀乞推恩詔特與茶酒班殿侍添差充淮南指使仍依條給賞新削詔諸路坊郭第五等已上及單丁女户寺觀第三等以上舊納免役錢並與减放五分餘並全放仍自元祐二年為始其收到錢如逐處坊場河渡錢支酬衙前重難及綱運公人接送食錢不足方許以上項錢貼支餘並封樁以備急緩支用七月二十一日蘇轍奏當考眀年孫升有言附正月末權知開封府謝景溫言眀堂大赦乞差推判官一員將帶人吏及法司一名與府界提刑分詣諸縣催促决遣該赦不合原免公事如內有久被禁繫根究未見本末證左在逺所犯該徒已上罪令申解赴府斷遣杖已下即一面結絶及乞今後每遇非次疏次并冬夏仲季月盛暑嚴寒在京差官催促結絶之時本府亦依此施行所貴德澤下流獄事無滯從之樞密院言臣寮奏馬軍教閲舊日除教御陳外更有教馬射法先五人次十人次二十人至全隊射皆重行之字使馬行數多者即依此開行列透空發箭若接戰之際雖用人馬衆多施放各不相妨進則整齊有迎敵之勢退則曲折有待敵之形馬射之法此為便利近嵗專用順鬃直射抹鞦背射法其散教之字馬射遂不教習緣直背射若以輕騎挑戰即可施用至如用衆則直背射不能重行蓋以進退皆向前取直發箭過致相妨則知之字馬射固不可廢也欲乞今後營閲排日內添入馬軍散射與直背射隔日牙教其散射法一依舊日之字使馬自五人至全隊射如此則遇臨大敵便於用衆乞依所請相兼教習從之新削丁丑祕書監張問相度河北水事十一月二十二日丙子言河事舊𫝊可考四月四日以前當亦考右司郎中趙君錫為太常少卿新授京兆府教授劉絢除春秋博士從侍御史王巖叟薦也吏部侍郎傅堯俞言竊謂鄉村以人丁出力城郭以等第出財謂之差科相與助給公上古今之通道也臣不敢逺引為證自本朝百餘年間祖宗之法未有以城郭之財助鄉村之力者今而行之恐未為得凡公人未有不以官事與百姓接者一與關涉必肆誅求但事有大小時有踈數耳况胥史日夕與百姓從事者乎故州縣之官不使公人多見百姓謂之能吏所以百端防檢恐其侵漁猶未能禁其一二今惟憂其不足乃無名取錢於坊郭以與之臣深所未諭也其間固有勞逸不能均齊繫官吏之能否條禁之精粗惟當督責郡縣講求善法安在人人與錢哉昔者鄉村坊郭事體不同故各安其分無有異論自免役之興不復分别今差役既還未有科配常情槩見則似平允必令出錢願樁留以備緩急夫以天下之廣民物之衆事常藏於隱微發於人之所忽邊鄙河防賊盜水旱豈可必其無有哉慶厯中羌賊叛擾借大姓李氏錢二十餘萬貫後與數人京官名目以償之頃嵗河東用兵上等科配一户至有萬緡之費力不能堪艱苦萬狀此皆以上下全盛之時取於民以為助猶或如此况今民力疲弊國家指以為用而不憂者免役寬剩錢耳蓋有時而盡烏能持久如聞天下主財利之臣不度朝廷大體襲觀望故態雖茶鹽酒稅常入之數不甚究心漸有虧失臣恐數年之後或至不足一有緩急將全取於民不惟人難克當必致誤事誠能量使出辦錢物斂而藏之嚴𠡠有司不得輒用其科擾之事一切禁絶示以必信使人無疑則不徒無詞遂將欣歡奔走惟恐輸納之在後耳昨陜西兵興一路等第人户流離奔迸無地藏匿京西州郡與之犬牙相接晏然無預人之憂樂如隔天壤今若積以為備或一方有事轉而濟之是通天下之力不亦均且易哉若取其財依舊科斂他日之患恐不但怨嗟而已臣嘗以是白文彥博司馬光吕公著此乃國之逺圖民之實惠願陛下特斷而行之若用以資助役人臣未敢詳定今役法大議已定皆韓維等素所裁處如未遵用即乞且修整頒降令州縣行用候見抵牾者隨加改正三二年間庶幾全備如以差法為非自可復為雇法不須無事徒此紛紛今諸路文字近來方此改更何日成就臣聞陳力就列不能者止此亦臣之不能為者陛下采用臣言敢不悉心共職若謂臣言與議者不合不可施行乞依蘇軾例許臣罷免詳定儻以臣上違朝㫖將以誡敇不恪雖加重責臣不敢辭元祐元年九月二十二日奏十月六日罷詳定己邜正議大夫中書侍郎張璪為光祿大夫資政殿學士知鄭州臺諌彈章交上凡十數璪乃請外竟從優禮罷去舊録但云從其請今用新録彈章則隨時附見不并書詔御史中丞劉摯同侍御史王巖叟舉監察御史二員詔夏國告哀使副赴闕見辭例物筵㑹買賣並依去年夏國母亡告哀人例施行禮部尚書韓忠彥言夏國主卒遣使詣闕告哀看詳欲權就垂簾日引使副并從人兩班朝見太皇太后拜禮如閣門儀見畢退於殿門屏外立俟皇帝坐卷簾再引兩班朝見如上儀朝辭凖此其衣裝元豐八年十月內夏國母告哀例使副素色三袩黑鞓蹀躞亦聽服紫縿不用紅色錦繡從之太常寺言秉常卒合輟視朝三日緣在諒暗中於禮不舉哀掛服從之措置熙河蘭㑹路經制財用所上修築蘭州西關堡利害詔劉舜卿審度合如何措置不致生事及具圖以聞七月六日又十一月二十二日庚辰宰臣親王執政近臣等分詣觀寺恭謝以眀堂禮畢在諒暗故也癸未權發遣慶州范純粹乞回納一官換冠帔授所生母樂壽縣太君張氏詔特賜不為例右司諫王覿言臣聞利不百不變法凡法之所以變非得已也使利害等均而徒有變更之勞則不待眀智不惑之士而後知其不足為矣彼中才之憚煩者皆不為也况利少害多而可以輕變成法哉臣竊見今年九月九日朝㫖節文內外馬事並𨽻太僕寺直逹尚書省更不經由駕部車營致逺務鞍轡庫駝坊皮剝所飬象所並專𨽻駕部臣竊謂此獨可以敗壞官制而未見為利之實也夫自李唐失政官制紊亂久矣聖朝祖宗以來初則有東征西討之憂既混一區宇之後方務休養元元故於修備官制有所未暇也至神宗慨然憫之於是講求歷世之墜典造新一代之成憲正名百職建復六聨上下相維各有分守此真得唐虞三代建官之美意也後世所當謹守而勿失今朝廷以馬政久廢而推行牧養之法固太僕駕部之職矣若使太僕舊𨽻駕部而共修職事於牧養之法未見其害也使車營致逺等務不𨽻太僕而領於省曹於牧養之法未見其利也利害未分而徒本末失叙官制復隳臣不知其可也且場務惡𨽻寺監寺監惡𨽻省曺乃官吏不恤法度者之常情顧朝廷處之如何耳伏望聖慈宣諭執政大臣無以牧馬一事而輕壞官制追還九月九日朝㫖别降指揮施行貼黃言先朝造新官制於古義皆有按據若推行之際見其未盡乃當修成何無故廢壞臣伏見今年八月二十日敕節文髙麗貢奉皆係管勾所檢勘依條格申所轄鴻臚寺其本寺不以事體大小皆不與奪勘㑹處分但騰申主客取候指揮今後髙麗夏國遇入貢應干排備所須之事並令管勾同文館所都亭西驛所徑申所屬曺部施行更不經由鴻臚寺臣竊謂鴻臚寺不與奪處分誠為非是然若非省曺不稍假以權而致其不敢與奪即是鴻臚寺不任職也此皆罪在官吏乃非官制之過豈可因官吏之罪而廢省曹寺監上下相維之序哉夫蕃夷入貢合責辦鴻臚者今奪而專之於省曹是省曹辦事敏於寺也馬事措置合經由省曹者今析而擅之於太僕是寺之辦事敏於省曹也名實則同而緩急工絀之間何其異也故論者以謂均是省曹一則奪寺事而專之一則雖其所屬之寺事不得預焉均是寺也一則併省曹之事而專之一則雖其本寺之事不得預焉果何義也若謂减去經歷之處然後事可以速集而無害則非獨鴻臚太僕而省曹寺監上下維持之序可存者少矣法度如此豈經逺之道聖慈詳酌覿自注云九月二十八日奏此九月九日朝㫖當是九月七日也王存奏云九月七日聖㫖與覿奏不同聖㫖已附九月七日今列存奏于後兵部尚書王存奏臣等竊惟朝廷以馬事專𨽻太僕不令駕部關預此於牧政未見利害然而事繫省曹紀綱恐自此寖成隳紊臣等思慮所及不敢默默先帝閔歷代官制殽亂命官置局講求堯舜三代之制參以唐典正省臺寺監之職使官有分守事有統制上下相維著成大典以貽後嗣為萬世之守也推行之初特敕寺監於尚書六曹隨事統屬又申諭中外曰人各有分然後安官各有守然後治是以大正百職復建六聨如被選之人不循分守敢有僣紊執政官委御史臺奏尚書而下聽長官紏劾中外臣子具聞德音今奉行已逾四年未見有害一旦乃因有司僭紊申請從而改更臣竊以為過矣大率官司樂於自專不欲有所統屬今日太僕既許不𨽻駕部異時太常又將乞不𨽻禮部其他寺監各務專逹無復分守則上下紛亂官制之壞自此始矣臣誠不忍先帝竭精致慮再嵗而成之一旦用有司僣紊申請而壞之書曰有典有則貽厥子孫蓋六官之制備於成周乃先王典則萬世可守者也六官之壞乃雜建諸司茍務趍辦唐末五季之事也方太皇太后擁佑聖躬制政房闥在位百執事尤宜謹守法度不可循有司一時之請而隳先帝已成之制他如官局有為害於時法令有不便於衆一切更張其誰不服至於省臺寺監所分職事皆本先王制治之法其間或有迂滯不通量加裁正使便於行事無所不可若因而致有隳紊不惟於事體可惜且恐非繼志述事之義也伏乞少加聖慮以先帝制詔示執政大臣自非有害於民毋輒輕改有司僣紊申請宜依令施行庶幾治世之典不至寖有隳壞貼黃先帝權置經制牧馬司當時指揮不𨽻駕部蓋為别是一司創行經畫非同寺監自有分職檢㑹元豐七年十二月二十五日敕諸官司庫倉事不可專行及無法式須申請者並申所屬寺監不可專行並須隨事申尚書本部本部不可專行即勘當上省蓋上下分守內外事務行有次第則不相凌越今來許寺監直逹已得朝㫖方下省部施行不惟其間事有利害不相照應兼本末倒置於理未順朝廷若為修復馬政恐經由駕部或致迂滯則當督責本部務相協濟或寺監事有急速即許其直逹自餘並合關由省部如此則於法制無礙十二月十四日又改此指揮監察御史孫升奏編類章疏元年九月二十八日祖宗之用人創業佐命如趙普守成致理如王旦受遺定䇿如韓琦此三人者文章學問不見於世然觀其德業器識功烈行治近日輔相未有其比而王安石擅名世之學為一代文宗方其居討論潤色之職陳古今治亂之言朝廷為之側席中外莫不引領一旦遭遇聖明進居大任至言不踐舊學都捐擯斥忠良棄衆自用趨近利無逺識施設之方一出于私智以蓋天下之聰明由是言之則輔佐經綸之業不在乎文章學問也伏望陛下臨政以來審擇台輔尊用老成遐邇懷仁邉隅嚮德天下四方忠義端良之士豪傑俊偉之材俱收並用無或棄遺所謂千載一時也臣不勝大願願陛下選任左右輔弼必先乎德業器識無取乎文學聲名貼黃言蘇軾文章學問中外所服然德業器識有所不足此所以不能自重坐譏訕得罪於先朝也今起自謫籍曾未逾年為翰林學士討論古今潤色帝業可謂極其任矣不可以加矣若或輔佐經綸則願陛下以王安石為戒翰林學士蘇軾言臣聞之孔子曰天何言哉四時行焉百物生焉天何言哉天子法天恭己正南面守法度信賞罰而天下治三代令王莫不由此若天下大事安危所繫心之精微法令有不能盡則天子乃言在三代為訓誥誓命自漢以下為制詔皆所以鼓舞天下不輕用也若每行事立法之外必以王言隨而丁寧之則是朝廷自輕其法以為不丁寧則未必行也言既屢出雖復丁寧人亦不信今者十科之舉乃朝廷政令之一耳况已立法或不如所舉舉主從貢舉非其人律犯正入已贓舉主加三等坐之若受賄徇私罪名重者自當從重雖見為執政亦降官示罰臣謂立法不為不重若以為未足又從而降詔則是詔不勝降矣臣請略舉今年朝廷所行薦舉之法凡有七事舉轉運提刑一也舉館職二也舉通判三也舉官四也舉重法縣令五也舉經眀行修六也舉十科為七七事輕重略等若十科當降詔則六事不可不降今後一事一詔則䙝慢王言莫甚於此若但取諫官之意或降或否則其義安在臣願戒敕執政但守法度信賞罰重惜王言以待大事而發則天下聳然敢不敬應所有前件降詔臣不敢撰軾除學士乃九月十二日不知此章以何時上今依軾集附月末十科訖不降詔必是從軾所請也又不知諫官誰欲降詔當考十月二十六日左司諫朱光庭請申勑內外臣寮十科旡或援小人詔從之朱光庭王覿既遷司諫左右正言久闕不補元年九月十二日光庭覿遷二年六月一十八日乃除丁隲為右正言巖叟論奏不得其時因附九月末侍御史王巖叟言臣竊以求言不厭廣納善不厭多言不廣則不足以盡天下之情善不多則不足以成大聖人之德詩曰先民有言詢于芻蕘芻蕘之賤猶不遺而問之况於賢士大夫哉經曰天子有爭臣七人雖無道不失其天下夫茍得其人亦足矣何必七人之衆哉蓋所寶者大則所資者不可以不博此聖人之心也三代以降千古相望其間誠心好諫不過數君而已固未有如陛下聽政之初首以求言為事發於慘怛連下詔書海內之弊使人人得以上聞而虛心以聽鋭意以行不待踰年而朝廷清眀天下休息復見祖宗之盛也然臣區區愚忠尚欲有以廣聰眀而躋聖德者不能自已也惟陛下采納國家倣近古之制諫官置員才六人而已方之先王已自為少今復左右正言缺而不補臣所未諭豈以治道已清而無事於言耶人材難稱而不若虛其位耶二者皆非臣之所以望於今日者也治道雖清而扶持保固正欲得賢人材難稱而搜揚揀拔正欲用意恃已治而忽于聞過則恐治道或損謂材難而曠於任官則恐正人浸孤今多士盈庭豈可無擇伏望聖慈詔補諫臣無令久空其職強大既安之國勢緝熙已就之聖功又言天下之事度而知之不如耳聞其說耳聞其說不如目覩其真今四海之大萬里之逺民情之利害不可以概言風俗之美惡不可以凡舉人材之賢不肖不可以互知竊以陛下所賴以察四方之事逹四方之情者言路數人而已而專用一方之人非所以廣聰眀於天下也臣願陛下常於言路參用四方之士天下幸甚言路專用一方之人當考專用一方之人附五年四月八日為允
