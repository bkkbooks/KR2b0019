body:
  text: 續資治通鑑長編巻三十六宋李燾撰太宗淳熈五年五月癸丑王繼恩言王師入綿州境賊衆望風奔潰殺戮及溺水死者不可勝計甲寅繼恩言克綿州繼恩以四月十八日入綿州當是十九日或二十日也今但用實録竢奏到乃書又言先遣内殿崇班曹習分兵自葭萌趨老溪賊萬餘衆依險為寨習擊破之斬首三千級擁入江溺死者甚衆遂克閬州據張洎集賜王繼恩詔載曹習状稱四月十三日領軍發葭萌到青山鎮其鎮已為賊燒焚至十二日到老溪賊依阻江山分為二寨約萬餘人習擊破之十三日收閬州今但依實録奏到乃書更不追正又言廵檢使胡正違率兵破賊五千人克巴州胡正違未見亦不知何州廵檢使也當考丁巳王繼思至成都引師攻其城即㧞之破賊十萬餘斬首三萬擒賊帥李順及偽樞宻使計詞呉文賞等并鎧甲僣偽服用甚衆順方欲盡索城中民黥其面以𨽻軍籍前一日城破民皆獲免今推考他書書其始克之日其他則皆竢奏到乃書之王師之討李繼遷也府州觀察使折御卿以所部民來助趙保忠既擒御卿又言銀夏等州蕃漢戸八千帳族悉歸附録其馬牛羊萬計戊午授御卿永安節度使賞其功也先是嵗用蒿數十萬圍供甄官及尚染坊造作弓弩必用牛筋癸亥詔自今染作以木柹給之造弓弩其縱理用牛筋他悉以羊馬筋代之上孜孜政理慮物有横費恐吏督責急而民或屠耕牛以供官故下此詔自是嵗省牛筋千萬丙寅趙保忠至自夏州白衫紗帽待罪崇政殿庭上詰責數四保忠不能對但頓首稱死罪詔釋之賜冠帯噐幣令還第聼命仍勞賜其母丁卯以保忠為右千牛衛上將軍封宥罪侯己巳以右諫議大夫張雍為給事中仍知梓州都廵檢内殿崇班盧斌為西京作坊使領成州刺史通判将作監丞趙賀為太子中舍監軍供奉官辛規為内殿崇班節度掌書記施謂為節度判官節度推官陳世卿為掌書記𣙜鹽院判官謝濤為觀察推官皆賞勞也雍初聞李順亂西川即謀為守城計訓練城中兵得三千餘又募强勇千餘令官屬分主之輦綿州金帛以實帑藏銷銅鐡為箭鏑伐木為竿紉布為索守械悉備遣觀察推官盛梁請兵于朝既而斌以十州之衆援成都弗克而還雍即委以監䕶之任子城先為江州所毁斌復勸諭州民自城西大壕中掘塹深丈决西河水注之以環城李順尋遣其黨相貴帥衆二十萬來攻雍與斌登堞望之賊所出兵皆老弱疲憊無鎧甲斌笑請開北門擊之雍曰不可賊或詐見羸形設伏伺我且城中吏民心未定脱為賊所乗則内外堕其奸計矣言未畢果有卒倚敵樓呼嘯與賊相應亟斬以狥斌遂突出與賊戰擊刺三十餘合賊少却俄復大設梯衝火車夜鼓譟攻城城中大恐雍命發機石碎之火箭雜下賊稍復却治攻具於城西北隅雍紿曰軍士趣治装吾将開東門擊賊陽遣歩騎五百臨東門賊升牛頭山瞰城中見之謂雍必出乃設伏於山之東隅衆萬餘以待之雍即召敢死士百軰縋而下焚其攻具自午達申殆盡賊以為神兇黨數乗城進戰皆不利一日北風晝晦賊乗風縱火急攻北門雍與斌等據門立矢石間固守不動賊不能進世卿素善射當城一面親中數百人賊浸盛同幕者皆謀圖全之計世卿正色謂曰食君禄當先報國奈何欲避難為他圖耶亟白雍曰此軰皆怯懦存之適足惑衆不若遣出求援雍從其言圍城凡八十餘日㑹王繼恩遣内殿崇班石知顒分數千兵來救賊始潰去斌出兵追擊之降者二萬餘又破賊數萬衆觧閬州圍斬三千人平蓬州于是雍使謂馳騎入奏上手詔褒美自雍以下悉加賞焉世卿南劍州人濤富陽人也斌在川峽六年以孤軍禦冦屢立戰功表請赴闕上遣使諭曰俟妖孽殄盡當召汝既而賊黨集梓綿漢三州境上斌促往平之辛規施謂盛梁皆未見趙賀有傳封丘人但不言其通判梓州以少府少監雷有終為諌議大夫知成都府有終由峽路入蜀調發兵食規畫戎事皆有節制師行至峽中遇盗格鬭将士渴乏㑹天雨軍人以兠鍪承水飲之且行且戰進至廣安軍軍壘瀕江三面樹栅㑹夜隂晦衆賊奄至皷譟舉火士伍恐懼有終安坐櫛髪氣貌自若賊既合圍有終引竒兵出其後擊之賊衆驚擾赴水火死者無算此事當是四月盡日峽川行營所奏也然不决以為然且附見冇終除知成都時更須考之也詔降成都府為益州壬申以右僕射李昉為司空致仕大朝㑹令綴宰相班嵗時賜予不絶毎逰宴多召之戊寅上署一幅曰公務刑政惠爱臨民奉法除姦方可書為勞績本官月俸並給實錢又别書三十餘幅賜大理正尹玘等人一通皆京朝官之選也召知審官院錢若水等謂曰中冇奉法除姦之語恐不曉者因而生事可語之曰除姦之要在乎奉法故有是言也若水出召尹玘等一一諭之上語近臣曰朕雖德愧前王然於政事靡敢怠惰天下事急若奔駟日日聼斷尚恐有照燭不至者而况唐末帝王深處九重民間疾苦何嘗得知每一思之誠可警畏吕䝉正曰中書樞宻院自來難處之地唐末帝王專委臣下致多闕失兼家族罕有保全今陛下躬决萬幾臣下止於奉行聖㫖臣嘗與同列等言實知榮幸因再拜三呼萬嵗上又曰唐末帝王臣下少得見面縱開延英亦有中人在側何嘗君臣言得一事趙昌言曰當日延英茍踰數刻史臣書之以為美談今天下茍非陛下聼斷不倦則封疆萬里豈能肅清斯所謂一人有慶兆民頼之也實録别本在五月朔今附此戊寅後上又謂近臣曰朕每日後殿自選循吏候選及三二百人天下郡縣何愁不治迂懦因循之人並與諸州副使分司西京或且給俸禄不與差遣然此軰又如何消國家禄食也别本在丁丑今附此王繼恩之克劍州也西京作坊使馬知節實為先鋒知節将家子每以方畧自任繼恩挾勢驕倨惡知節不附已羣小從而間之繼恩遣知節守彭州配以羸兵三百彭之舊卒召還成都知節屢乞師繼恩弗聼賊十萬衆攻城知節率兵力戰自寅至申衆寡不敵士多死者逮暮退守州𪠘慨然嘆曰死賊手非壮夫也即横槊潰圍而出休於郊外黎明救兵至遂鼓噪以入賊衆敗去上聞而嘉之曰賊盛兵少知節不易當也授益州鈐轄知節為益州鈐轄據耆舊傳後集在五月今附見月末初尹元等入峽路首破賊三千餘衆於新寧遂深入梁山廣安渠果之間捕斬収集久未得進王繼恩雖徑㧞成都而郭門十里外猶為賊黨所據偽帥張餘謂王師孤絶無援復嘯聚萬餘衆攻陥嘉戎瀘渝涪忠萬開八州開州監軍秦傳序死之初賊衆奄至傳序督士卒晝夜拒戰嬰城既久危蹙日甚長吏皆奔竄投賊傳序謂士卒曰吾為監軍盡死節以守郡城吾之職也安可茍免乎城中乏食傳序盡出囊橐服玩市酒肉犒士卒而慰勉之衆皆感泣力戰既而賊勢日盛傳序度力屈終不能拒賊乃為蠟丸帛書遣人間道上言臣盡死力戰誓不降賊矣城既壊傳序投火死賊乘勝攻䕫州列陣西津口矢石如雨先是上復遣如京使白繼贇為峽路都大廵檢統精卒數千人晨夜兼行助討遺冦是月庚午繼贇入䕫州出賊不意與廵檢使觧守顒腹背夾撃之賊衆大敗斬首二萬餘級流骸塞川而下水為之赤奪得舟千餘艘鎧甲數萬計六月壬午朔繼贇等㨗書聞上降詔嘉奨傳序家寄荆湘間其子奭泝峽求其父尸比至䕫州船覆而死世以為父死於忠子死於孝奏至上嗟惻乆之録傳序次子煦為殿直以錢十萬賜其家傳序江寧人也甲辰詔翰林學士樞宻直學士自今序立班位依舊在丞郎之上建隆三年三月陶榖初改制庚戍髙麗國王治遣使元郁來乞師言契丹侵掠其境故也上以蠻戎相攻葢常事而北邉甫寧不可輕動干戈秋七月壬子厚禮其使而歸之仍優詔答之髙麗自是絶不復朝貢矣丙寅詔兩浙諸州民先負錢俶日官物計錢十一萬七千五百緡並除之己巳詔三司總計使及諸道判官因上殿奏事如聞宣諭民間利害並令録送中書門下付史官以存勸戒從工部郎中直昭文館韓援之言也以户部員外郎魏廷式自陜西至益州同勾當轉運事廷式後嘗入朝奏事上曰有事當白中書廷式曰臣三千七百里外乗驛而至以機事上聞願取宸斷非為宰相而來也即不時對召問方畧稱㫖賜錢五十萬令還任乙亥李繼遷遣牙校以良馬來獻且謝過猶稱所賜姓名答詔因稱之至道九年九月始復奪之先是李至以目疾辭史職張佖亦以早事偽邦不能通知本朝故實辭乃詔禮部侍郎宋白與張洎同修國史於是洎等請特降敕命詢問太祖朝薨卒勲臣子孫及門人故吏知舊親戚并班行舊者能知先朝故實及周朝軍中事者並許盡言令史官参校不至繆戾者書於國史從之詔三司總計使及諸道判官各給御前印紙自八月互書勞績嵗終校其優劣以申黜陟以殿中丞丁顧言守本官復充堂後官堂吏自唐至漢周率在京百司以有人材能書札行止亷幹者抽補分掌諸房公事年深即授檢校少卿監同正將軍至國初趙普在中書奏令檢校諸曹郎中自邇以來屢懲其貪而惡其黨故参用士人有科第歴外官者至是復秩以朝籍葢矯昔之枉也此據别本乃七月朔日事今附月末須更考詳㑹要亦在七月八月壬午上謂近臣曰孝者人倫至重古之人三年守墳墓今臣僚子弟以祖父亡没或與叙用意在繼其後嗣然有不俟百日便預朝集者朕每覩之中心不忍趙昌言曰陛下如此宣諭乃敦厚風俗之㫖也遂詔文武百官子弟因父兄亡歿叙用未經百日不得輙赴公叅令御史臺專知糾察并有冒哀求仕釋服從吉者並以名聞甲申詔有司講求大射儀注庚寅殿中丞建安李虛已以得御書印紙上表獻詩自陳祖母年八十餘喜聞其孫中循吏之目上喜甚批紙尾曰吾真得良二千石矣賜以五品服虛已先受詔知榮州因改知遂州又别賜錢五十萬以遺其祖母翌日對宰相言及之且曰己與五十緡矣吕䝉正曰前所賜葢五百緡上曰此誤也然不可追虛已父寅舉進士年六十餘以母老求致仕得著作郎有詞學清苦虛已亦純孝篤謹家極貧雖一時誤恩人以為殆天賜也癸巳詔改内班為黄門以崇儀副使兼内班左都知竇神興充荘宅使兼黄門左班都知内官領諸司使始此此據㑹要甲午詔自今京朝幕職州縣官等不得輙獻詩賦雜文若指陳時政闕失民間利害及直言極諫書即許通進其有宏才奥學為人所稱者令投獻於中書宰相第其臧否上之以劍南招安使昭宣使王繼恩為宣政使順州防禦使先是繼恩有平賊功中書建議欲以為宣徽使上曰朕讀前代書史多矣不欲令宦官干預政事宣徽使執政之漸也止可授以他官宰相懇言繼恩大功非此不足以賞上怒深責宰相等因命翰林學士張洎錢若水議别立宣政使名序立在昭宣使上以授之丁酉左神武大将軍權判左右金吾街仗事魏丕以新募街司卒千餘人引對於崇政殿上親選得五百七十人分四營設五都都有員僚隊長一如禁兵之制先是上以京師浩穰六街廵警皆用禁兵非舊制特命左右街各置卒千人優其廪給使傳呼備盗至是始分營部仍令丕更募以充其數焉左諌議大夫知審刑院許驤等上重删定淳化編敇三十巻詔頒行之王小波李順之初作亂也朝議欲遣大臣慰撫給事中参知政事趙昌言獨請發兵捕斬無使滋蔓議乆不决賊連陥卭蜀等州始命王繼恩等分路追討繼恩握重兵久留成都專以宴飲為務毎出入前後奏音樂又令騎兵持博局棊枰自隨威震郡縣僕使軰用事恣横縱所部剽掠子女金帛坐而玩㓂轉餉稍不給軍士亦無鬬志餘賊併伏山谷間郡縣有復陥者上屢遣使督戰意頗厭兵㑹昌言攝祭太廟齋宿中書因召對滋福殿上謂之曰西川本自一國太祖平之迄今三十年矣昌言揣知上意遂言國家士馬精强所嚮無不克顧此草竊不足仰煩宸慮即於上前指畫攻取之䇿上甚喜癸卯命昌言為川陜兩路都部署自繼恩以下並受節度昌言懇辭上不許厚賜遣行别賜手札數幅親授方畧焉李繼遷竄於漠北遣其将佐趙光祚張浦詣綏州見黄門押班真定張崇貴求納欵崇貴㑹浦等於石堡寨椎牛釃酒犒諭仍給錦袍銀帯乙已繼遷遣其弟延信案宋史作廷信奉表待罪且言違叛事出保忠願赦勿誅上召見延信面加慰撫錫賚甚厚知延州王顯上䟽言間嵗以來戎事未息李繼遷負恩於靈夏王小波干紀於巴邛河右坤維並興師旅而繼遷翻然改圖懐音向化遣弟入覲願修職貢陛下開懐容納許其内附示之以德信申之以恩錫深得綏和之道矣然而戎人之性本無其常所宜謹屯戍固城壘積芻糧然後妙擇才勇付之邉任縱其緩急變覆則備禦有素又奚能為患哉至若戎冦未平神人共憤伏望申飭将帥速期蕩平矧事久則變生功緩則師老又况邛蜀之壤物産繁富其間怠兵驕卒或遲留未進或顧戀是圖莫若勿憚往來潛為更代一則均勞役之使一則免遷延之役至如河北關防亦望常令固守敵以國家方事西南容謀興舉分中朝之勢力長外冦之姦計此之機宜不可不謹也顯知延州月日檢未獲此䟽且附見繼遷納欵後是月兵部員外郎田錫奏䟽曰錫自注因甲午詔書故上此䟽今附入月末臣伏聞去嵗或霖潦作沴或癘疫為災陛下憂勞太切勤儉過中乃至進菲薄之膳羞御補浣之服飾又復發廪减儲以饘濟衆損民抑理以粟爵人今聞自邇及遐被原帶隰秋稼大稔流庸復歸茍非英聖之至誠豈致豐年之上瑞所慮者河西尚警劍外未寧此則天機制禦之時睿聖綏懐之際固大臣之與議豈㣲臣之敢知惟聞静以待清即時底定動無遺䇿不日乂寧若以民間利病臣不盡知時政闕失臣不備見所思者唯制科可設鄉飲可行制科設則賢良方正之人得伸其志直言敢諫之士得罄其懐鄉飲行則孝悌之行自修淳厚之風自復儲闈建后用光主鬯之容王府設官宜制正名之秩館殿之職可補吏員樞近之司亦委編録其次講求典禮更訪諸儒優䘏蒸黎可詢羣彦冬年可以立仗俾儀衛之式瞻雨雪可以放朝兾禮容之允肅邦國庠序興復宜先州郡城池増修亦便常平之廪因稔加儲底貢之財因時立制或為民祈穀耕于耤田或齒胄尊儒行之國學征税寛則與民偕足法令簡則俾人易從抑臣聞君子恐懼於所未聞戒謹於所未至故未萌者所以易慮未兆者所以易謀謀於外則先靖於中制於逺則當思於近萑蒲聚嘯既勞我師沙漠乘秋復窺王略師老則民力重困冦玩則狡心必萌今河湟委輸方牽國用井絡凋弊實軫宸衷安之既在於睿謀討之亦勞於神算夫理絲而棼之則愈亂烹鮮而擾之則靡全御衆以寛惟新聖德臨下以簡素在帝心臣之至愚但思報國臣之寡識安能合時管窺之辭庸以塞詔芻言之拙仰兾留中九月有司詳定大射儀并圖來上上謂宰相曰俟弭兵與卿等行之上以蜀冦未平工部尚書辛仲甫素著恩信将令輿疾招撫㑹疾甚不可遣仲甫亦上章告老乃授太子少保致仕先是参知政事蘇易簡薦樞宻直學士虞部郎中張詠可屬四川事詔詠知益州既而留半嵗不行至是始命赴都上靣諭之曰西川亂後民不聊生卿往當以便宜從事詠知益州在九月不得其日也據耆舊後𫝊詠先到衛紹欽繼至因仲甫致仕遂著其事張詠集乃云至道元年春正月受命夏四月二十八日供職茅亭客話亦載詠詩年月與諸書不同葢誤詠自作詩記年月不應亦誤恐傳寫錯謬爾至道元年正月則詠已在成都矣先是京兆劇賊焦四焦八等常嘯聚數百人攻刼居民為三輔之害上令懸賞招募待以不死至是請罪自歸秦民處處相聚供佛飯僧喜免侵暴之患上引對焦四等各賜錦袍銀帶衣服緡錢並擢為龍猛軍使先是有峨眉山僧茂貞者以術得幸嘗言於上曰趙昌言鼻折山根此反相也不宜委以蜀事於是昌言行既旬餘或又奏昌言素負重名又無嗣息今握兵入蜀恐後難制上亟幸北苑召宰相謂曰昨遣昌言入蜀朕徐思之有所未便葢蜀賊小醜昌言大臣不可輕動宜令且駐鳯翔為諸軍聲援但遣内侍押班衛紹欽賫手書往指揮軍事亦可濟矣昌言己至鳯州詔追及之因留候館記聞稱昌言至鳯州時冦凖知州事宻上言昌言素冇重名又無子息不可授以利柄太宗大驚曰朝廷皆無忠臣言莫及此頼有冦凖憂國家爾乃詔昌言行所至即止專以軍事付王繼恩罷政事知鳯翔召冦凖参知政事按凖自青州召入即参政方昌言出時凖葢不知鳯翔知鳯翔乃薛惟吉也則言昌言不可委以利柄者必非凖且其言與譖訴何異凖亦必不為此態昌言罷政事復後此百餘日當時軍事固已付王繼恩續令衛紹欽代昌言入蜀此乃不書葢記聞誤矣今不取依國史不出言者主名却仍取僧茂貞事附益之記聞又云茂貞時在京師按道釋志乃不然茂貞先有是言爾道釋志又云昌言欲殺茂貞其事頗怪未可信也當考李畋作張詠語録云川界既安兵未凱旋主帥頗有驕色詠奏乞遣心腹近臣可以弹壓主将者然後抽兵尋詔衛紹欽為同捉賊招安使韓琦作神道碑亦載此事與畋同按張詠知益州實録偶失其月日檢照他書在九月然則詠與紹欽葢相先後入川耳上依詠所乞遣張鑑馮守規來乃十二月事畋于詠門人也記事乃爾謬誤恐貽人惑故為明辨之詔止昌言按本傳云昌言既行旬餘即有詔他書不載也昌言以八月二十七日發京師詔止其行當在九月十一十二間無所考見乃附之甲寅後甲寅初五日也案此條未載日干此云附甲寅後疑有譌脫乙丑崇儀副使王得一求觧官優詔許之得一河南人以方技進起布衣授使職數召見錫賚甚厚未半載上表自陳不願久當榮遇并請舍所居宅為觀上悉嘉納賜觀名曰夀寕得一嘗入對禁中或至夜分頗敢言外事又潛述人望請立襄王為皇太子焉壬申以襄王元侃為開封尹改封夀王用冦凖之言也凖言見至道元年八月上謂夀王曰夫政教之設在乎得人心而不擾之爾得人心莫若示之以誠信不擾之無如鎮之以清静推是而行雖虎兕亦當馴狎况於人乎書云撫我則后虐我則讎信哉斯言也爾宜戒之按此敕初不為夀王尹開封也而本紀聨書之上語夀王别本亦在十月己丑今並從此紀乙亥以左諌議大夫冦凖参知政事上因謂宰相吕䝉正曰冦凖臨事明敏今再擢用想益盡心朕嘗諭之以協心同德事皆從長而行則上下鮮不濟矣吕端為諌議大夫請居凖下丙子命端為左諌議大夫立凖上丁丑上以蜀冦漸平下詔罪己初命翰林學士錢若水草詔既成進御上笑謂若水曰朕為卿潤色可乎若水頓首謝因命筆親竄數字皆引咎深切尤為精當詔辭畧曰朕委任不當燭理不明致彼親民之官不以惠和為政筦𣙜之吏唯用刻削為功撓我蒸民起為狂冦又曰念兹失德是務責躬改為更張永鍳前弊而今而後庶或警余詔升夀州為大國列於晋國之下燕國之上是月張詠始至益州先是陜西課民運糧以給蜀師相屬於路詠亟問城中所屯兵數凡三萬人而無半月之食詠訪知民間舊苦鹽貴而私廪尚有餘積乃下鹽價聼民得以米易鹽民争趨之未踰月得米數十萬斛軍士驩言前所給米皆雜糠土不可食今一一精好此翁真善幹國事者詠聞而喜曰吾令可行矣時四郊尚多賊壘城門晝閉王繼恩日務宴飲不復窮討官支芻粟飼馬詠但給以錢繼恩怒曰國家征馬豈食錢耶詠曰城中草塲賊既焚蕩芻粟當取之民間公今閉門髙㑹芻粟何從而出若開門擊賊何慮馬不食粟乎詠已具奏矣繼恩乃不敢言㑹衛紹欽亦以詔書來督捕餘冦繼恩始令兵四出紹欽破賊於學射山攻㧞雙流等寨招降數萬衆别将西河楊瓊趨邛蜀蕩賊巢穴遂克蜀州曹習等又破賊於安國鎮誅其帥馬太保斬獲甚衆繼恩嘗送三十餘軰請詠治之詠悉令歸業繼恩怒詠曰前日李順脅民為賊今日詠與公化賊為民何有不可哉繼恩有帳下卒頗恃勢掠民財或訴於詠卒縋城夜遁詠遣吏追之且不欲與繼恩失歡宻戒吏曰得即縛置井中勿以來也吏如其戒繼恩不恨而其黨亦自歛戢云繼恩即分兵四出詠計軍食可支二嵗乃奏罷陜西運糧上喜曰鄉者益州日以乏糧為請詠至未久遂有二嵗之備此人何事不能了朕無慮矣韓琦作詠神道碑云王繼恩縱軍士剽掠民財詠召繼恩用事吏靣數其過将斬之吏股粟求活詠赦之因令繼恩分屯兵繼恩即日分兵屯隣州當還京師者遣之此事固善但恐不然詠誅繼恩帳下卒猶不欲與繼恩失歡若果如此則嫌隙顯矣及見琦載詠在蜀事或先後失其序今不取之募富民出粟千石濟饑民者爵公士階陪戎副尉千石以上迭加之萬石乃至太祝殿直冬十月丙戍以鎮安行軍司馬楊徽之為左諫議大夫與右諌議大夫畢士安並為開封府判官兵部郎中喬維岳夀王府記室参軍水部郎中楊礪諮議司封員外郎夏侯嶠並為推官徽之等入謝上詔升殿賜坐諭以輔導之㫖給事中賈黄中出知澶州上諭之曰夫小心翼翼君臣皆當然若太過亦失大臣之體非分之事固己不為又何暇如是乎黄中頓首謝上因謂左右曰黄中母有賢德年七十殊未衰每與之語甚明敏黄中終日憂畏必先其母老矣又顧参知政事蘇易簡曰卿母亦然自古賢婦人葢不可多得易簡曰陛下孝治天下重人之親臣實何人老母得䝉聖奨此人子之榮耀也丙午翰林學士張洎等獻重修太祖紀一巻以朱墨雜書凡躬承聖問及史官採摭之事即朱以别之史未及成洎遷参知政事宋白獨領史職歴數嵗史卒不就洎等所上太祖紀亦不列於史館云十一月庚戌上遣張崇貴持詔諭李繼遷賜以噐幣茶藥衣物等先是翰林學士錢若水撰賜趙保忠詔云不斬繼遷存狡兎之三穴潛疑光嗣持首䑕之兩端上大喜謂若水曰此四句正道着我意及是又草賜繼遷詔畧曰既除手足之親己失輔車之勢上伸筆批其後曰依此詔本極好若水家因寳藏之辛亥舍人院言先是除授内殿崇班及諸司副使只樞宻院吏送除目閥閲爵里並不得知乞自今詔樞宻院件析事状送中書作詞頭乃付院草制從之㑹要云此制後亦隳廢皇祐二年十月本院復以為言乃詔申明之丙辰賜近臣御飛白書各一軸别賜参知政事冦凖飛白草書一十八軸先是宰相吕䝉正等己受賜凖出使在外至是始及焉上因謂䝉正等曰書札者六藝之一也固非帝王之能事朕聼政之暇聊以自娯爾丁已上賦詩一首令待詔吴郢張用和賫以賜翰林學士張洎錢若水洎因揣摩上意上疏稱述凡數千言上覽而善之賜詩嘉奨召宰相等命坐於崇政殿西廡謂曰張洎所上表深喻朕㫖足以戒躁競之輩殄澆薄之風矣令付史館許衆人就觀因嗟嘆流俗不安義命者久之既又别賜洎詩一首及四體書前所賦詩各一幅草書尤絶妙蘇易簡頓首乞之䝉正亦欲得焉易簡前奏曰臣先得請䝉正巳不及矣上笑而賜之張洎性險詖尤善事宦官嘗引唐故事奏内供奉官藍敏正為學士使内侍裴愈為副使上覽奏謂曰此唐弊政朕安可踵其覆轍卿言過矣洎慚而退然以文彩清麗巧於逢迎上卒喜之丙寅上幸國子監賜直講孫奭五品服因幸武成王廟復幸國子監令奭講尚書説命三篇至事不師古以克水世匪説攸聞上曰誠哉是言也上意欲切勵輔臣因嘆曰天以良弼賚商朕獨不得耶遂飲從官酒别賜奭束帛丁卯大雨雪近臣稱賀上因言多士滿朝朕試令索班簿閲之周行之人魚貫櫛比不勝其衆於其中求一材中轉運使三司判官者了不可得雖多亦奚以為宰相吕䝉正對曰臣等職在辯論官材總領衆職而使陛下孜孜勞於求賢臣等之罪也上曰人心不同如其面焉卿等何由盡知朕嘗謂求賢之要莫若責舉主遂詔䝉正以下至知制誥各舉有噐業可任以事者一人䝉正奏曰臣備位宰相可以進退百官今獨舉一二人是示天下不廣也上曰前代亦合有宰相舉官故事可令史官檢討之既而有司具以歴代故事來上上復召䝉正等謂曰虞丘子舉孫叔敖崔祐甫舉吏八百狄仁傑自舉其子光嗣何謂無也因書優孟對楚王録孫叔敖之嗣故事為一幅以賜䝉正䝉正等退而各舉所知以聞十二月戊寅朔司天言日當食至是隂雪䝉蔽自旦及中而散羣臣稱賀賀日不食葢始此王繼恩御軍無政其下恃功暴横張詠恐軍還日或有意外之變乃宻奏請遣心腹近臣可以弹壓主帥者亟來分屯師旅辛已命樞宻直學士張鑑西京作坊副使馮守規偕往召對後苑門面授方畧鑑曰益部新復卒乗不和若聞使者驟至易其戎伍慮彼猜懼變生不測請假臣安撫之名上稱善鑑至成都繼恩猶偃蹇不意朝廷聞其縱肆鑑之行上付以空名宣頭及廷臣數人鑑與詠即遣部戍兵出境繼恩麾下使臣亦多遣東還督繼恩等討捕殘冦而鑑等招輯反側蜀民始奠枕矣初内侍趙守倫請於諸州牧馬坊畜牝馬萬五千匹逐水草放牧不費芻秣所生駒子可資軍用詔從之自是牧馬頗蕃息未幾守倫復上言牧龍諸坊牝馬及萬匹者嵗生駒四千今嵗止及二千五百實由主者失職不能謹視及虧營䕶孳生之法以致不登其課自今諸坊使臣伏望嚴加條約警其曠慢如牝馬百匹嵗約駒子七十者等級遷擢否者罰亦如之以為懲勸又聞諸坊馬生駒子未即附籍俟其經渉寒暑堪任畜牧然後奏聞欲望今後駒子生即時附籍以聞庶其盡心養飼無有所隱又牧馬不給芻粟自逐水草本無䦨櫪尤藉軍人放牧防其越逸其兵士欲望簡去老弱别募少壮者増補詔並從之
