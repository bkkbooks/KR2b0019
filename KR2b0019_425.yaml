body:
  text: 續資治通鑑長編卷四百二十一宋李燾撰哲宗元祐四年春正月壬申朔不受朝邈川溫錫沁男覺勒瑪斯多卜為本族副軍主溪展為本族副都指揮使軍主遵博斯吉為本族副軍都主並授銀青光祿大夫檢挍國子祭酒兼監察御史武騎尉熙河經略司奏自果莊作過後來鄂特凌古并溫錫沁纍遣下項人將蕃字出漢報乞通和夏國備見向漢用心勾當乞與推恩故也推恩字由據曾肇制集庚辰以三佛齊國進奉副使胡仙為歸德郎將進奉判官地華加羅為保順郎將壬午朝獻景靈宫癸未范百祿趙君錫相度黃河利害還進對太皇太后問河北苗稼盜賊如何人不飢否百祿等奏諸郡苗稼甚廣人無凍餒盜賊亦息去年十一月二日初使視河百祿等言河不可回具去年閏十二月末并此年正月二十八日前右正言劉安世言臣近論列除謝景溫權刑部尚書不當今踰半月未蒙施行按景溫天資姦佞素多朋附熙寧中王安石用事之日擢為知雜御史是時蘇軾方忤安石景溫迎合其意輒具彈奏謂軾丁憂歸蜀乘舟商販及朝廷下逐路監司體量事皆無實章惇以開拓疆土不次進用景溫為湖南安撫使又欲附會乞於徽誠等州建置城寨一開邉隙今已十年有不資之費無秋毫之利徒使湖南湖北及廣西接境州縣常被蠻冦未嘗休息止為進身之計不顧國家之患附下罔上孰甚於此神宗初行官制首用景溫為禮部侍郎王安禮為尚書右丞乃景溫之妹壻諂事安禮隂刺上旨奏疏指陳邉務其言皆先帝日逐與大臣謀議機宜之論景溫借為已説僥幸稱旨緣所論之事非他人所能預聞上既疑安禮漏省中之語又怒景溫交結執政遂以本官出知潭州緣景溫與韓縝正是姻家元祐之初縝為宰相首自髙陽召歸亟加職名尹正京邑及嬖人子弟縱酒犯法景溫釋而不問為臺察所糾朝廷送大理寺取勘方正其罪又於瀛州以女巫自隨置之郡下日令子弟考問禍福小人乘勢惑亂愚民又為言者所發而韓縝方為執政遂薄其責止罷開封知蔡州曾未席暖復徙潁昌既辭成都之行仍竊揚州之鎮中外之論固已不平况顧臨見任刑部侍郎即是本曹元不闕官兼先帝建官之初刑工二部尚書皆不並置今來忽降新法創添權官搢紳之間往往竊議以謂大臣將援引私黨故更張此制而景溫之名預為衆人所料蓋以執政之內有親有舊私分深厚常欲提引是以權官之詔墨未乾而景溫之除書已下使朝廷威福之柄皆為外人窺測甚可懼也近者髙士英除權工部員外郎陛下猶以為因人撓法别授差遣今執政欲引親舊而先改國制五日之內首擢景溫上不奉承陛下之美意下無以慰多士之公言幸門既開進者日濫臣雖愚暗實為聖朝惜之伏望陛下詳覽臣奏速降指揮收還景溫新命依舊與外任差遣仍詔三省罷尚書權官之法庶存綱紀以抑僥幸詔謝景溫别與差遣景溫以元豐五年四月除禮侍十一月出知洪州此云潭州恐誤又言臣近嘗論奏景溫差除不當及乞罷尚書六曹權尚書之制日近雖聞收還景溫之命而權官之法未蒙指揮不避煩瀆再具論列臣伏尋典故都省令僕之次即列八座位貌崇重實亞執政茍無其人則闕之不常置也先帝改命之初惟吏部之外他曺長官多不並建但以侍郎主行未聞闕事考之前代亦不見有權尚書之品而遽兹創立義實未安臣竊謂侍郎之資望最深者其拜尚書自允公議今若加以權字即是未應正除以不可假人之名授非所當得之士欲望中外壓服堂陛尊嚴何可得也幸門一開進者日濫臣雖愚暗竊為聖朝惜之况國家經費不充正務裁省而反無名設官增益厚祿則是朝廷政事自相違戾伏望聖慈詳此事理明敇三省罷尚書權官之法貴無虛授以重國體又言臣近嘗論列謝景溫除權刑部尚書不當比聞已得聖旨别與差遣今踰浹旬未覩明降指揮搢紳之間皆謂景溫差除全出宰臣范純仁之意竊慮九重髙逺無由知外議之詳輒具開陳上禆聖覽臣聞謝景溫與范純仁韓縝素來相結號為死黨而景溫姦邪附會罪狀極多臣於前疏已略言之矣昨在開封又以私昵為言者所劾出知蔡州二年之間三易差遣而貪進之心殊未厭足屢遣親密敦迫純仁直露私求欲得八座純仁勇於效力愛有所忘不恤人言先改國制近者忽降詔旨六曹尚書並置權官士大夫素知純仁與韓謝二族私分深厚見其無名變法逆料必引景溫五日之間除書果下挾情亂法一至於此且陛下用文彥博為平章軍國重事所總政事定格差除尚書已上自合同議昨者創立權官及除景溫彥博初不預謀不知三省安敢輒廢定格議者皆謂吕大防等明知不協士論而重違純仁之意是以雷同詭隨不能拒止純仁既已逼脅同列又欲陵蔑彥博但令吏人以除目就第呈知未嘗稟其可否意彥博沮難故不與共同商議止於此日便具進呈彥博以外議沸騰遽出造朝遂得追寢純仁尚忿形於色屢發躁辭且云待教辭免即行寢罷彥博又折之曰此朝廷之事執政豈可通私意教他辭免此語即時傳播聞者無不駭愕純仁雖屈於正論而終欲遂非無故遷延不追前命蓋欲景溫赴闕更為别營差遣以朝廷之公器為死黨之私恩有以見純仁事上不忠操心不正力進姦慝妄改憲章若不辨之以早異日必敗國事况純仁憑藉門閥素無他才矯情飾詐善取名譽久在間局時以為賢一入樞庭固已改節陛下即政之初罷青苗免役之法及司馬光久在病告純仁遽以國用不足為言復使州縣俵散青苖天下之人莫不疑惑光既視事爭於上前極言論列方得寢罷此事甚近陛下當悉記憶光未薨半月之前嘗與臣言純仁自為執政言行反覆隂懷顧望止為全身之謀以名取人其弊至此蓋光見其姦狀漸露心實悔之業已薦延未能遽罷使光存至今日必不容純仁久處廊廟臣竊惟陛下富於春秋太皇太后陛下不出房闥政事之柄仰成大臣尤是修明紀綱謹守法度之日而純仁棄其素能背公向私惟陛下詳覽臣言博採公議若未欲遽行罷免即望常加防察無使専恣侵壞朝政則天下幸甚貼黃稱臣本欲上殿奏陳適會左右省無諫官拘礙文法不得獨對臣既當耳目之任日聞外議喧騰不敢不具奏知伏望聖慈詳察實録於此載詔王鞏罷知宿州以御史論鞏資質浮淺貪贓汚穢也按六年六月八日丙申乃罷宿州據劉摯敘鞏本末則此時未除宿州也罷宿州實在六年六月八日丙申今削去詔宗室右監門衛大將軍士香特令祕書省試換以其進所業議論故也甲申左司諫韓川為集賢校理權發遣潁州川既辭免太常少卿又堅請補外以數言胡宗愈不聽故也去年閏十二月十六日除少卿嘗同劉安世劾胡宗愈第二十章載川所以罷諫職見三月七日詔夏國遣人詣闕謝封册將過界令逐路經略司諭沿邉兵將官不得縱容人馬以探事為名入西界殺虜人口别致生事詔講筵官許依祕書省職事官例觀新樂賜聞喜宴許依帶職人並赴從崇政殿説書顔復請也右正言劉安世言按安世集有此章當是元祐四年事而是年張燈如故實録去年亦不書愆雪姑存備考臣伏見去冬以來時雪愆亢詢問四方亦多旱暵關陜淮浙民已艱食物價翔踊日益增甚雖朝廷廣行賑貸而嵗事失望荐飢可憂臣觀周禮大司徒荒政之目十有二品救民之道最為詳備其九曰蕃樂蓋嵗有凶歉人君憫恤元元為之閉藏樂器而不作也禮曰雖有凶旱水溢民無菜色然後天子食日舉以樂先王之制具在方册聖明之主所宜留心伏望陛下繼天奉元仁民愛物有年之瑞宜不絶書而雨雪失時人且狼狽雖兩宫憂勞軫念無或少忘而逺方之民未見陛下至誠惻怛之意今上元密邇有司舉行常例猶欲張燈臣愚欲望聖慈明諭執政特以嵗旱俾罷逰宴使四海之內莫不戴陛下勤恤之德庶幾天人感通風雨時若天下幸甚又言臣昨曾具劄子乞罷上元張燈竊聞尋以降付三省而連日值假故執政未遑進呈每接賓客詢訪中外利病皆言去嵗甚愆時雪來牟之望殊未可期民將荐飢深可憂憫今外方郡縣或有災傷猶不放燈著為令敇陛下子育黎庶以天下為家一夫不獲尚軫聖慮而况關陜淮浙民已艱食凶荒遼逺所宜矜恤伏望聖慈特降中旨明諭聖意罷止遊宴以答天變廣謀賑貸用濟民生使覆載之間莫不衣被兩宫之仁德天人和同嘉氣自致惟冀留神省覽早賜指揮乙酉幸凝祥池中太一宫集禧觀大相國寺御宣德門召從臣觀燈丁亥詔以愆雨開寺觀己丑詔坤成節進奉物色凖天聖八年九月故事留本處止奉表附驛以聞刑部員外郎劉賡知宿州辛卯尚書左丞王存等奏此據王存奏議四年正月二十日上此臣等竊見朝廷遣范百祿趙君錫相度孫村回河及減水河利害百祿已行相度條奏孫村不可回河為減水之河乞罷孫村有害無利之役挪人工物料繕築西堤以護南宫決口其説甚詳奏上今已多日朝廷尚未降指揮臣等忝荷拔擢實以河役大事所繫朝廷利害不小不敢茍默以圖自安上負二聖任使之意固當晝講夕思博採兼訪欲以究見利害之實詳觀百祿等所陳利害及論王孝先前後異同狂率之見較然明白可謂曲盡然臣等竊慮人情論議鮮肯公心雖知已説不長終是遂非護短所以孝先等狂妄難回有誤朝廷臣恐孝先等恥回河之説不可施行則必強為減水以蓋前失臣等推尋孝先所開減水河本欲以試回大河今既不可回河不知安用減水或以謂河勢卧西多決西岸孫村不可以回河且開減水河殺大河水勢可以免西決之患臣等竊謂不然自河決北流元豐四年先帝即下詔云河決小吳其東行故道已是淤髙理不可塞將來更不修閉決口候見大河歸納去處合修立隄防令李立之經畫聞奏自是未嘗大理隄防二三年來用王孝先之説専欲自孫村回河不復更理西岸故南宫上下隄防怯薄前此二年皆噎凌而決緣北流之河入地已深其流順快只為不能增築西岸隄防所以連年潰決自孫村興事兵夫之役者日二萬有餘八九月而止民夫之役者日三萬有餘計一月而止總兵民之用力者無慮數百萬輦運物料者又不在此數其於大河略無所補向使一二年前移此兵民之力以繕西岸則隄防完壯南宫上下自不至再決今來劉何等奏南宫水口已奪過河身八分范百祿等乞不行閉塞只理遙隄如此則西岸不可不理既須興西岸隄防之工又不免起孫村減水之役兩役並興勞動轉甚假使盡役兵夫兵夫力已困竭去年修河之役逃亡死損十有二三二聖哀矜今嵗並令放免令下不日豈可復差若令用錢雇夫所雇者衆應募數少必致官差雖以差雇為名其實抑而強雇強雇之弊與差一般若令一例差夫則興發者衆京西去秋大旱十室半飢監司方乞粟賑救本路夫力必不可差則専差京東河北京東河北亦災傷連嵗去秋雖有薄熟去處民力未甚舒蘇譬如久病之人才能支扶履地而強之負重則必顛頓斃踣臣等熟計不若速罷孫村減水之役専力以厚西岸隄防北流入地既深其勢自然安帖公私之力可以不勞而就或以謂孫村減水為河既北流則中國失險分減水勢使之東注所以存中國之險且自河決小吳已及十年先帝不為減水回河之議者豈謂中國之險可以失之蓋雖北流其入海之口猶在乾寧滄州之地漫水合界河入海相度官范百祿趙君錫言之亦已詳悉兼上流之勢本在中國非敵人所得而據昔日東流入海今日東北流入海昔日橫斷河北之地今日斜斷河北之地河北之地皆吾中國所有其為設險一也敵人安能度越大河以用吾之險哉但近世習見大河自澶淵而橫斷河北遂以為不如此中國失險非京師之利臣等雖至愚決知今日大河東北入海未失中國之險或以謂不為減水分減水勢使之東流則塘濼有漫水淤澱之虞臣等聞古今河道北流之處自商胡之決早已淤澱信安以西河水不到自無淤澱之患假使能全回大河北去斷流昔日淤澱之地方且反為邉患今開減水河而欲望北流之河全無淤澱亦已難矣臣等愚見以謂既不能回河而尚開減水以分水勢不止於目前有枉費公私財力之勞而於大河及沿邉塘濼全無所補抑將開後日無窮之患自大河北流每年差夫科買物料尚不能完固沿河隄防使之不決今又增孫村一河名為減水水既分流則泛漲之時溢沿河兩岸去海口各六七百里舊約五千餘掃每年逐掃各須預積物料差夫修固此後年年不得休已是一河未能處置而别生一河枉費工料遺患於河北生靈豈有寧日伏望聖慈採百祿君錫等相度到利害之實深察孝先前後異同誕妄博採衆論以喻物理特降宣諭依百祿等所請罷回河并減水河之議放散所辟官吏抽回諸路催促物料使臣令河北轉運司専領河事以年例兵夫物料修立西隄其新河并南宫水口被水衝淹州縣有合改移處置事件並詳范百祿等所議經畫聞奏所貴河北京東公私稍獲蘇息臣等職任丞轄忝荷二聖顧遇事有所見不能竭盡以補聰明之萬一死有餘罪所以不憚冒瀆之責以盡其愚貼黃見今修河司官吏幾百餘人諸州催促物料使臣四五十員工部每數日一次檢舉催督即諸路騷擾可知理須早行放罷抽回臣等預聞國論職事自合如此商量然猶不免區區冒煩聖覽者實欲上禆聰明之萬一伏望二聖特垂採擇如臣等所言實有可取只乞因輔臣奏對之際特賜聖諭早令依百祿君錫之議罷回河減水之役不獨臣等之幸乃天下之幸也二十八日罷回河及修河司司空平章軍國事吕公著言臣以足疾久在假告未獲入侍軒墀竊以大河北徙自近年水勢潤下以成河道昨來為議論不同須至更遣官按視今據范百祿趙君錫同相度得見今北流深入地中雖有冀州南宫決溢尋復還河益見河勢就下不能為大患其故道髙仰不當開治可以省朝廷百萬之費休息得數路民力既合天時地利下慰輿情伏望陛下特與主張免致公私勞匱公著家傳云百祿君錫既復命旬日執政未能決公著乃上此奏癸巳著作佐郎兼侍講司馬康充修神宗皇帝實録檢討官龍圖閣直學士提舉醴泉觀兼侍講孫覺免侍講依舊提舉醴泉觀免朝參覺以疾請也三年九月十六日罷中丞除龍直提觀侍講政目三年九月十六日孫覺龍直提宫侍講此月二十八日孫覺除龍直醴泉放見謝詔開封府妨礙公事體小者送戶部取勘以刑部言大理寺右治獄廢故也詔寺監屬官庫務官若職事有合赴左右司郎官廳商議者明具合議事報左右司呈稟執政得筆方許赴龍圖閣直學士大中大夫知鄭州王克臣卒甲午詔州縣當水陸之衝者監司守令非假日並禁謁著為法乙未監察御史王彭年言吏人以勞責減年出職入流太濫增添請受費用太冗乞付有司立法詔吏部戶部相度以聞考功員外郎孫路言康古寨新踏寨基未便事理有三其一地形側峻南帶髙阜戎馬可以下臨二土脈乾燥夾砂不可加板築三寨基內新開四井止是智固河內滲水别無泉源緩急必見闕用詔劉舜卿相度具利害以聞如於邉情事力未便可修移增築即將智固勝如兩堡量遣人守據以示中國邉地無使賊人異日以無人守戍指為不係漢地詔石州葭蘆吳堡二寨弓箭手所貸錢斛限三年為六料隨二稅送納從同管勾河東沿邉安撫司公事郭宗顔請也詔成都府路見管鹽井一百六十餘井立為定額不問大井及卓筒並不禁止若遇鹹泉枯竭許於元井側近開卓取水以補元額井數依條差官榷定認納課例其枯竭元井却行棧閉仍不得創於他處及額外增添開卓先是御史吕陶論列陵井監嘉州等處鹽井利害下轉運司相度故有是詔丁酉朝奉郎直龍圖閣范育為光祿卿詔故端明殿學士范鎮本家不曾陳乞前致仕恩例遺表外特與恩澤一名詔春秋銓試合格人上等不得過一人無則闕之中等每百人不得過五人以監察御史王彭年言每嵗承務郎小使臣及選人並等第推恩至有賜出身其次循資減年或占射差遣或不拘名次注官推恩太優故也詔京東路捕盜賞錢五分支提刑司場務錢餘令轉運司應副諸路凖此詔太師文彥博男保雍丁母憂每遇入朝許令孫男扶掖戊戍今後臣僚用冠帔改換醫人服色者不得換紫荆湖北路都鈐轄轉運司言蠻賊寇澧州義鎖鋪故拋下文字意望招安給賜真命劵歷若墮其計恐逺近蠻人觀望欲召正副都頭覃文懿等并都誓主彭仕誠嚴行約束如更透漏蠻人入省地作過責認勒住半年或一年請受所貴邉境安帖不致生事從之詔溫錫沁妻轄索諾木布摩特封縣君月給絹茶各有差從權發遣熙河蘭會路經略司公事劉舜卿請也范百祿趙君錫等既面奏河不可回乞罷修河司旬日不報於是又奏疏曰臣等聞治水之道無他惟在順其就下之性而已禹行其所無事是以能成萬世之功或反禹之所為此鯀之所以致敗也竊謂本朝河決必塞已塞復決未嘗復回於故道也今河行大岯之西至於大陸分注木門由閻官道會獨流口入界河東歸於海合禹之迹前人所欲為而不可得者也元豐以前未有回河之論八年之後乃有一王孝先俞瑾輩敢妄議回河孝先身為水官無容不知有此臣既按視究見利害而大臣廷議踰月未決臣竊惑之伏惟太皇太后陛下皇帝陛下仁心侔天地利澤施四海周旋曲盡無一闕政每聞一處災傷盜賊惻怛不忍動於天顔是以五年之間中外蒙德歡欣鼓舞不可勝紀若今來萬一議論試輒為之則非徒河不可回回之必有大害臣恐數路半天下之生靈財困力弊國家諸路常平司封樁錢物立見耗竭民間誅求既廣嗟怨者多和氣一傷水旱亦至當是之時流亡盜賊無所不有而公私匱竭責將安歸臣實寒心不知議者何以不決昔周靈王時榖洛二水鬬將毁王宫王欲壅之太子晉力諫以為不可勤惓反覆幾二千言大抵止以共鯀為戒禹四嶽為法而曰天所崇之子孫或在畎畝由欲亂民也畎畝之人或在社稷由欲靖民也其靖亂之效逆順之理炳如日月昭示萬世追原太子晉尊愛君父之心謂自后稷以來迄文武成康而僅克安民由厲王而下基禍十五世惟民不靜以為王業之憂直以壅塞榖洛乃周家福祚興廢短長之所繫古人尊愛君父之心切至如此臣按榖洛二水才及黃河百分之一榖洛猶不可壅以其繫周家之廢興况黃河百川之伯四瀆之最尊者乎今人欲壅之非見侮則是愚且狂矣詩云今此下民或敢侮豫孟子云能治其國家者誰敢侮之今國家無事一妄人議論直敢以數百千里之外朝廷所不見自古所難成之事致害天下伯鯀之誅止因稱遂共工之過壅防百川稽舜之政治殛二凶而咸服蓋以為髙髙下下乃天地之性若髙者強之使下下者強之使髙則是逆天地之性逆天地之性則必害天下之生民蠧天下之生物自古以來未有如此而能成功立事興利除害者也昔堯於鯀得非始信其言與四嶽之薦乎及至九年績用弗成而徒汨陳五行反為大害乃悔而更之廢父興子才及四載而禹告成功今考書傳載籍禹之所為止於隨山濬川髙髙下下者行其所無事而已未聞有逆折洪流使回故道之事也且孝先以即目大河港勢方順欲趁今年回河必望朝廷半年之間逐急計置五千萬物料臣竊計此數決不可置場收買必須科配六七路百餘州軍騷擾七八百縣百姓文符急於星火期會比於軍興鞭笞峻刑枷錮滿道臣聞河朔父老説往時六塔閉塞北流民間見錢五百文方了得一束梢草審如此言生靈何罪况今京西陜西連嵗不稔老幼相携流離道路縣官拯救常苦不給而又將來閉塞北流之際全藉人力衆多是時役夫不知幾何萬數臣等昨來移文會到諸處終不報答人情觀望此可見矣臣等請停罷修河司以來將近一月上殿面奏亦已旬餘寂然未聞朝廷行下中外竊議以為河論未決人莫不疑怪臣惶恐待罪不知所裁又况元豐四年小吳河決未兩月而神宗皇帝神機睿斷不下堂而見萬里之外順天地髙卑之性知百川脈絡之理明詔中外藏之有司其大略曰故道已是淤髙理不可復自今更不閉塞於是逺近心服人無異論今孝先等乃敢橫議違戾先帝明詔意欲旁緣以自進爾伏望睿慈亟罷修河司以省大費正孝先之罪以眀典刑則天下幸甚貼黃臣竊以壅防百川古人所忌周太子晉力諫靈王壅榖洛二水之事是也况黃河百川所聚乃天地之脈絡豈有以人力多寡劈約不順其性久之而不致患害者臣等考古驗今灼見不便區區愚心既知其如此夙夜憂惶不敢緘默乞賜聖鑒特逹施行又貼黃臣等昨相度利害奏聞後方始知得元豐四年曾降上件詔劄尋即移文通利軍等處取會録到合具奏聞疏入即乞付外此據百祿等奏藁增入奏云臣等乞罷修河司將近一月上殿面奏亦已旬餘按百祿等上殿在正月十二日其乞罷修河司在去年十二月今參酌附正月二十八日罷回河前百祿此奏云臣等昨相度利害奏聞後方知元豐四年有詔尋移文通利軍録到蓋與此奏同上又在正月二十二日癸巳後也今本傳乃云至黎陽閲舊牘得之恐失事實今不取本傳大抵因行狀但取行文順便不究先後耳尚書省問百祿等行狀亦附使歸今依實録載四月十八日己亥詔罷回河及修減水河此據范百祿元祐八年正月末奏云四年正月二十八日準勑罷回河云云政目二十八日相度河官范百祿趙君錫言東流髙仰北流順快無如北流經久為便奉聖旨罷孫村口回河及減水并開修河司先是御史中丞李常言臣伏見朝廷以河決大吳民被其患遂取獻議者之言或欲開澶州已淤之河或欲自孫村口導還故處今以澶州河身至狹決不可復疑孫村為可納還水勢遣使鳩工自春徂秋所以勞人動衆蓋不少矣未見小效而財欲殫人已敝今又欲廣備物料大興夫役修元防置生隄約為必復之計臣竊以為惑矣臣元祐初年常蒙任使相視河事臣自白馬津夾河往復行七千餘里幾至河流入海處升髙下下以水平視地知孫村地髙岸廢隄防俱壞無可還之理已嘗具奏上聞雖臣愚昧不足與講大河利害然不猶愈於未嘗目視而聽浮説者耶今河流未有可復之勢而修舊防千餘里將用民夫千百萬工民間凡雇一夫不減二十千積而計之民力其可支耶去年京東河北大飢甚者至人相食朝廷發常平粟賑濟不足又繼以上供米數十萬斛今年麥粟稍收飢乏之人方有生意而欲耗竭民財事無功之役臣未知所以處此為何如也今者山東河北盜賊數起濮州之盜張旗育馬數十為羣以入鎮市殄滅未聞而耗民財力納之飢寒之域飢寒切身不相率而為盜者未之有也借使有益於河流猶可冀幸况萬無一補而恬不知慮何也河之不可復臣元奏盡之矣比者轉運司謝卿材所陳亦頗中理欲望聖慈斷以不疑下半紙詔以弭不測之患倘執而不變臣恐致禍之大有甚於河流者臣愚短朴拙陛下推擇於衆彥之林而付之中司今目覩大害其狀灼然默而不言罪在不赦常元奏當考又言臣伏見孫村口回河之役久講未決臣前日劄子述利害稍詳慮未以臣言為然敢再此敷陳願賜省覽檢會元豐四年六月劄子稱奉聖旨河決小吳掃東所行河道已是淤髙理不可塞將來更不修閉決口候見大河歸納去處應合修立隄防令李立之經畫聞奏竊以元豐四年到今七八年矣方是時已言河道淤髙理不可塞况今日耶其時河初西北流行注之平地與舊道髙下已是相逺先帝豈不察之詳慮之深而降此指揮訪聞今來河已成槽勢益就下激之使仰髙而行臣見其必不可也今卿士講於朝民庶議於野以此役為可興者寡矣而朝廷之意尚期以庶幾可復曠日持久猶豫未決臣愚以謂此一河事耳按圖視地利害可明矧成敗之機晦而未兆且大於此者乎伏望聖慈早降指揮寢罷以安羣疑臣非敢以嘗議大河而執為此説今博訪人言深度事勢以禆聖政救患害於未然弭譏誚於他日伏望特賜採納先帝時曹村決鳩工積材隨以閉塞見其有可塞之理故也後來小吳隄破塞之隨決遂不復塞見其勢必不可復耳遂有前項劄子指揮且一小吳口猶不可強閉而欲於大河中作生隄截水勢以入增髙之處其為不可明矣又言復見回河之役至今未降寢罷指揮臣已兩具劄子陳述利害甚明朝廷執而未允臣以謂縱令有可復之勢在今日猶為未宜况決無成功之理常聞唐太宗欲封禪魏徴以為不可曰且借喻於人人有十年長患病治方愈便欲令負米一石日行百里必不可得今舉大役夫力之衆必出於民靈平之役嘗起六七路民夫况今修千里隄防截大河使歸故處不知幾路民夫若干物料可以濟用河北京東皆殍亡之餘京西淮南悉窮空之後今來方被德澤稍有生意一旦以無功之役耗其財力自古亂亡必因盜賊盜賊所起必由疲弊民力秦長城隋伐遼是也伏望陛下奮以獨斷降旨寢罷無貽後患常作中丞在三年九月十六日言此當是九月末十月間既不得其時因罷回河乃附此仍著先是字更徐考之范百祿等既還自河上常又言臣伏見范百祿等相視黃河已見得不可還復故道利害甚明而修河司尚未降指揮廢罷訪聞本司見今辟官一百餘員請受供給不少役過兵夫六萬三千餘人計五百三十萬工約費錢糧四十萬許貫買物料已費七十餘萬貫用過條束二百九十餘萬今不即廢罷枉費日滋欲望早降指揮其王孝先等妄有建議上惑朝聽枉耗國財伏乞重行降黜嚴示懲戒右正言劉安世言臣伏見南宫決口今來已未有隄備漲水在近權住閉塞直候將來隄防成立物料齊足方謀興功雖日下茍安未敢輕論然詢之輿議竊有可憂須至開陳乞賜詳覽臣訪聞南宫之決今已纍月適遭亢旱水勢甚平萬一秋夏之交山水泛濫與大河相合奪過河身一向西流則深山以下必被其患今事勢已急尚未見朝廷如何擘畫此不可不預為之慮也議者又謂將來若理西堤須留九門以道西山之水使河門太小則勢必擁遏入納不快河門稍大則黃河暴漲却致出泄三者之説皆不免與民為害而又修南宫水後亦未保他處終無再決之患向去人使道路若有侵占阻滯國信往來未委如何處置欲望聖慈詳此事理専委都水使者與本路監司子細相度其的確委得不致有前後患害畫一條例結罪以聞庶得利病之實不誤國事南宫之決今已兩月當考其的時附見於此左諫議大夫梁燾右正言劉安世等言安世等奏不得其時今并附李常後訪聞大河西潰今已纍年汗漫散流無復河道故去嵗冀州南宫未閉信都又決繼而大名宗城中掃又決近日復有焦家隄之患則北流利害灼然可見今欲全復故道議者以謂新修理水隄亦未髙闊自大名之東掃岸久已廢壞雖南有橫隄頗為堅實然上卑下薄恐不足恃而又故河未嘗濬治一旦遽決梁村孫村口放水東流可以分減目下漲水欲使還復故道未易能也蓋大河重濁其流稍緩旋即淤填今梁村口循理水隄而下水去堤面才五六尺至孫村口水與隄平兩處下掃僅免決溢或聞只是分過大河三四分水但恐因循浸久積淤日增將來閉塞北流併使東注地勢髙仰壅遏難通則橫隄以南金隄以東決須受害臣等竊謂河事素來論議不一遂致中輟今水官既奮然敢為固有足取然臣等雖知有可成之功恐不免欲速之弊蓋舊河不曾疏濬而向下隄掃全未完葺遽決梁村放水理有未安况今日已後水勢漸小淤填浸多萬一更壞舊河不能還復則是前功盡棄進退被患為今日之計實可重惜伏望聖慈詳此事理明詔都水官吏及本路監司協力盡公講究長䇿廣為儲備增固舊防庶使東流必有成績乃河朔生靈之幸貼黃舊河在大名東水勢丁字正衝馬陵口折向東復西直注小張口兩處視大名各止及五六里每嵗漲水岸至危急馬陵之東元有開撅直河久已淤廢今來欲復東流亦乞再開上件直河以紓大名之患貼黃以梁燾集增入又言臣伏見朝廷欲回大河使歸故道採之輿議頗有異同今之言北流以謂廣占民田大破省稅壅遏西山之水為深趙瀛莫之患吞併御河絶邉城轉餉之利淤填塘泊北使道梗而又隄防卑薄全不足恃故今嵗之間四次決溢今嵗恐合作一嵗更詳之四決即南宫信都宗城焦家隄也臣再三推考實有如此之患是以議欲復東流然而自小吳之決久不閉塞大河故道地形髙仰元堤廢壞往往斷缺所植林木發掘已盡昔日之備百無一二若河流果然東去不免後患故論者皆欲先葺舊防疏鑿故道人功物料悉令具足然後乘春夏暴漲之勢而順導之方有可回之理昨來都水官吏思慮不審惟務速成既未嘗完繕廢堤亦不聞濬治故道乃於水勢向衰之際妄引東注臣聞止是減得四分以來漲水才至復槽遽已斷流緣自來河水稍緩即有沙淤故瀕河之人皆咎都水官吏以謂輕開梁村堙塞故道非特不能紓一方之患而反淤壞舊河此尤可重惜也今朝廷舉不資之費廣儲薪石調發兵夫必數十萬勞民耗國無大於此而典領之人終不敢保河之必回依違觀望僥幸萬一臣竊憂之伏望陛下明詔執政熟講事理大河決不可回則乞早降指揮便令罷役博選通習水事之人就今所行子細相度别為長久禦備之計若必欲使趨故道則乞令都水及修河司官吏條具兵夫物料的確合用之數指定於何處放水自何月日興工至何時了畢委得不致誤事結罪以聞異日成敗用行誅賞使茍簡之吏莫敢誕謾而利害明白中外不疑大衆大役不妄舉動惟冀特留聖慈早賜施行燾集無此燾及安世又言臣近日延和殿進對伏蒙宣問大河次第臣尋具所聞利害悉已面奏退而思之有未盡之意輒復論列上禆憂勤之萬一臣竊謂自小吳之決今已八年澶州之東地形髙仰而又隄道廢壞未有完葺林木剪伐靡有孑遺今若不繕舊防增浚故道一旦河勢全奪東去而下流禦備殊未有涯脫或踈虞何以救備其可慮者一也臣聞昨來沙堤之破北京官吏科配梢草調發丁夫期會嚴峻甚於星火民間勞敝固已不堪今回大河計其薪芻之費恐須百倍於前日雖朝廷已降指揮禁戒騷擾而有司茍避督責急於辦集名為和買實是抑配若欲來嵗興工恐日月逼促地産有限物價踊貴重困民力其可慮者二也臣愚欲望聖慈更切熟計明詔執政參議至理若東流有可成之功即乞謹擇官吏委任責成寬假嵗月無求近效應修河所須之物並量價直只令和買不得擾民如有違犯重行降黜俟三二年隄防完固薪石具備公私之力皆有餘裕然後察水勢之所向而順導之庶幾橫流可回生民受賜比之輕信浮薄之論妄舉莫大之役校其得失固不侔矣唯冀特留聖慮早賜施行梁燾集此係第二奏安世又言臣伏見大河西潰今已纍年朝廷屢遣使者與都水官及本路監司同共按行固已詳熟而利害紛紜訖無定論臣聞自商胡之決踰三十年河淤東髙勢必西徙所以連嵗泛溢旋塞旋潰理有必至無可疑者而王孝先等建議乃欲回復洪流使歸故道所用人工動以億計薪石糧器又數千萬國費民勞莫大於此或聞孝先等奏章顯言新開直河若有淤填乞不坐罪則是妄興大役以徇偏見又慮緩急水勢不應則先入姦言莫肯執咎誕謾自便輕侮朝廷操心如此何足倚辦書曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮蓋聖人作事謹始不敢自用而廣謀從衆以求合於天心也今將動大衆起大役而廟堂之上䇿非素定付之一二庸人肆為臆説治一橫隄已費五百餘萬復千里之故道又將若何茍暫費而永寧固不足吝今建議之臣猶不自保則生民之膏血何負於此輩而恣聽其輕費乎况謝卿材與張景先同為一路監司而二人之論自不相合恐非詢謀僉同之道伏望聖慈博選深知河事之人再令經度參以李陲孫民先之書擇其可用俾干繫官吏條析利害結罪以聞然後付之執政擇定一議所貴慮無遺䇿不貽後悔於是回河及修減水河二役皆罷此奏係安世集第五奏當在三年冬燾集無此奏劉安世盡言集有回河五奏其二奏與梁燾同今附李常後四張景先以元祐二年十二月自京東漕改河北四年月自河北改陜西安世第五奏云景先與謝卿材同為一路監司則此奏必在四年四月已前又纍奏不及遣范百祿等則或恐在三年十一月以前也姑附詔罷回河後焦家隄趙瞻奏亦及之一嵗四決當細考大抵新舊録載河事殊不詳也王孝先乞不坐罪蘇轍奏亦及之不知召王孝先等到三省樞密院果是何時三年十一月二日可考詔均定東南諸路鹽價下逐路轉運司施行資政殿學士知鄆州蒲宗孟知河中府龍圖閣待制知河中府王震知鄭州辛丑詔蒔竹縣防托并荆湖南路安撫謝麟將帶隨行兵員外楊光銜下山丁防托人以冬寒暴露日久令轉運司比類廂軍例等第特支
