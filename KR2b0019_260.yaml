body:
  text: 續資治通鑑長編卷二百五十六宋李燾撰神宗熙寧七年九月丙申朔遣官謝雨命守臣謝嶽瀆詔司農寺籍所興水利自今朝廷遣使即委以體訪其不實不當者案驗以聞用御史知雜事張琥請也賜右班殿直同管勾修內司楊琰度牒三十永不磨勘琰本杭州木工有巧思宋用臣所領營造琰必預其事故得出入禁中嘗命修感慈塔既成自言貸修塔官司錢九千餘貫以集事乞納出身宣劄求賜空名勑告以償之上令琰以支費歷赴中書及舊掌修塔庫供備庫副使黎永德保明所貸數以聞故賜之其後琰用營造勞遷官未嘗止也朱史籖貼云楊琰何嘗出入禁中此言誣罔己未朝㫖下逐官取㑹並無照據合刪又刪琰後用營造遷官未嘗止却增上於用人雖微者必盡其所長賜豫纎悉各當具分不容僥幸如此新史悉依舊本今從之丁酉上謂輔臣曰昔湯至紂六百餘年民之戴商亦已久矣同力度德同德度義武王以革車三百兩虎賁三千人而破紂如林之衆其用兵行師非有法制不能至此馮京曰紂雖有衆七十萬然天下之民苦紂之虐政歸文武之仁德蓋在德不在衆也詔知成都府自今舉文臣知戎州又詔河北西路轉運司體量真定府邢洺磁相趙州通判知縣如不能安輯人民復業並選所部官權代仍速賑濟內義勇保甲保丁正名更優以貸給時上聞河北流民日過京師不絶雖已諭澶州等處約回力及之人令遷入城郭安泊慮州縣不能曉諭即轉徙未巳故有是命約回力及人户見庚子日當在此丁酉日前知桂州劉彛乞募人耕曠土中書户房言開封府界方召人開種稻田及新置沅州有屯田之法與廣西事體相類欲各録其事付彛今更參詳立法以聞從之四月十九日置沅州所稱屯田法未見本志亦云章惇初築沅州亦為屯田務又元豐二年七月二十一日罷沅州屯田務上批京師諸軍闕馬坊教閲可令熙河路買馬司如買可配軍馬及三百匹即遣官部送戊戌上以連日隂雨喜諭輔臣曰朕宮中令人掘地及一尺五寸土猶滋潤如此必可耕耨韓絳等言陛下憫憂元元禱祠備至精誠上逹旋獲感通臣等比預太乙齊祠竊觀執事者踰旬未嘗解帶可見聖意䖍恭左右之臣亦不敢少怠也又論及河北邊備欲料簡重兵於大名髙陽真定等處顧不難但統御者未見其人昔曹公嘗料袁紹兵多適足為禽卿等當深思之知太原府龍圖閣直學士起居舍人劉庠為禮部郎中再任庠尋以母喪去荆湖北路轉運司言諸州軍及川峽四路鐡錢界罪人當配廣南者除情理凶惡州軍餘並配沅州候及五百人止詔沅州廂軍五百人內招本城三百人以宣節為額牢城二百人許刺配諸處罪人候足停配詔河北京西淮南水興秦鳳等路轉運使比時雨屢降可督當職官勸民趨耕其災傷農民如因官私缺負及簿書有拘繫者並權放就農候布種畢施行岷州言已立解額乞賜國子監書許建州學從之己亥命岐王皓為南郊亞獻嘉王頵為終獻環慶路安撫使楚建中言奉手詔以緣邊旱災漢蕃闕食夏人乘此薦饑輒以賞物招誘熟户至千百為羣相結背逃若不厚加拯接或致竄逸於邊防障捍非便委臣講求安輯救接之計臣自八月首户支糧一斛五斗至二斛今又是九月户計口借助錢三百至五百至來年四月計十二萬緡上批散糧又支錢所費既多當此災傷之際極邊何以供辦其罷助錢非緣邊州軍仍募闕食戶運米往緣邊城寨比原糴價不虧官即出糶本司無見糧即計㑹轉運使兊糴詔瀛州修城已畢冀州方修及深趙邢州委李稷恩濵州委陳知儉再檢計其餘令察訪司委官覆計度州縣界內外軍民如緩急入保合修展具圖以聞知儉時為河北東路轉運副使庚子上與輔臣論河北守備韓絳等曰漢唐重兵皆在京師其邊戍裁足守備而已四方有警則兵從之出故邊無橫費而强本弱末其勢亦順開元以後有事四夷權臣皆節制一方重臣悉在西北天寶之亂由京師空虛賊臣得以肆志也上曰邊有老人亦謂今之邊兵過於昔時其勢如倒裝浮圖朕亦每以此為念也兵志繫此事於熙寧初誤也命太子中允館閣校勘崇政殿說書呂升卿兼同修撰經義上批在京及河北禁軍常患役不足府界及京東西淮南先遣戍諸路禁軍廂軍節次抽減歸營諸路近年已增置就糧禁軍并教閲廂軍其令經略安撫鈐轄司常務揀選填補以足元額訓練精熟以充防拓召輔臣觀稻於後苑上批近河北鎮趙邢洺磁相等流民過京師者甚有力及户聞非因災傷乏食就榖止緣客户多已逃移冨者獨不敢安處田里不速禁止邉民流散於守禦之計極不便可令澶州等處體量如委是力及户即計口給一去路糧約回本貫仍丁寧曉告用心安輯如在村野難以獨居處之人多方開諭暫遷就附近城郭安泊丁酉日已云約回力及人户不應後四日乃降指揮恐實録或失先後之次辛丑詔真定府路出省倉糧十五萬石減價糶許民間用金銀等物博買户毋過兩石又詔開封府界河東災傷州軍許於限外接訴狀以聞遣比部員外郎王荀龍京東收糴詔京東轉運司剗刷上供錢帛並留為糴本壬寅户部侍郎致仕張掞卒甲辰涇原路安撫使王廣淵言民飢流徙而倉儲將闕計一月所支凡四萬七千石乞降度僧牒五百借封樁粟盡行賑濟上曰涇原雖災傷然不如廣淵所言之甚豈有不問貧富一例賑濟之乎遣太常博士劉定乘驛體量當賑濟事馳驛以聞十一月一日催定上批昨降指揮在京諸行人歲輸免行錢特與除放一萬貫據孫永已詳定到可速契勘施行此據御集免行一萬貫至是乃除放也丙午上與輔臣論戰陳之法因曰兵隂事也主殺尚右而陽多者勝如高者可以勝下長者可以勝短是也詔詳定行户利害所諸行應有不同者定歸一行供輸仍𨽻都提舉市易司詔澶州具涉春以來南渡流民數以聞時澶邢等九州流民凡四萬六千餘人內出攻守圖二十五部賜河北又出敵樓樣送軍器監頒降修製河南監牧使吕希道請募民於沙苑牧羊詔皮公弼審問民願否并具利害以聞公弼請撥牧羊地十頃召人耕佃每畝納租錢百本監封樁餘千頃令沙苑監牧馬從之公弼又請募人於京畿入羊每斤為錢百三十詔罷之八年閏四月十九日公弼方有此請朱史既載於此又載於彼誤也今止就此載之范祖禹志希道墓云希道初以奏課對神宗諭以言者欲於沙苑牧羊計綱入京希道言此細務臣不敢煩天聽上曰有唐故事希道曰唐都雍去沙苑近今京師非壅比也條其利害凡費緡錢數萬神宗釋然納之按此則希道乃不欲牧羊者與實録異當考丁未虞部郎中俞士龍職方員外郎鄭恕各遷一官除知州以前監市易務課利增羡也史館修撰宋敏求等上蕃夷朝貢録凡二十一卷即李評所請也司農寺言近祥符縣引見保甲有自陳乞試武藝者雖與推恩然慮向去倣效不已自今敢有自陳雖武藝合格亦隔一次從之輔臣有言將帥宜置副二者上曰人之忌能者衆令舉所知不過取其出已下者非有至誠惻怛之心為朝廷立事也呂惠卿曰詩以周爰咨詢每懷靡及古人以王事為心如此上曰聖人取諸人以為善人之言有可行當即行之何所問也馮京曰舜自耕稼陶漁至於為帝無非取於人者上曰用人之言亦難惟舜大聖故能如此耳朕每於庶事心既自了則所言是非隨即辨白古人所以貴知言也詔日者分兩浙為東西路今有司言供億錢榖多在浙西計置及水利事盡在蘇秀等州分之必至闕事其毋復分路分路在四月二十六日癸巳朱本削去墨本誤也其復分路在九年五月十一日丙寅戊申詔係役廂禁軍自今權免役專𨽻習武藝置鳯翔府簡中保寧六指揮三千人專備熙河修城寨賜內藏庫錢十萬緡河北糧鈔二十萬石付西路轉運司令商人入中名南郊青城諸門前曰泰禋後曰拱極東偏曰承和西偏曰迎禧正東曰祥曦正西曰景曜其復門東側曰寅明西側曰肅成殿門曰端成前東西曰左右嘉德便殿曰熙成苑門曰寶華前此青城殿宇門名皆臨時學士撰進至是命中書參定賜名永為定式河北西路察訪使沈括言近有㫖令兩浙路轉運使等各提舉一州第二料水利轉運司奏稱有未便臣在本路與監司日夕聚議凡半年王庭老未嘗言有不便今有此異同乞行推究詔第二料水利除不可興修外並先從低下處興工中髙田不得一例圍裹仍令廷老具析前後異同以聞詔劉忱蕭士元㑹蕭素梁頴於大黃平以呂大忠丁父憂不至也三月二十五日忱等受命四月二十七日大忠乞録地界事付韓縝此實録所書大忠尋請假歸永興軍省父疾約徑路與劉忱㑹於太原忱六月七日起發大忠父尋卒既葬乃詔墨服往代州與忱密議其到代州蓋十月二十日此據大忠集初素以平章事欲正南面坐自云北朝使相有此廟坐儀餘乃序官坐仍欲以墩分高下忱等皆不從移文詰難自七月至於是月事聞乃得國信所言至和元年國信使蕭德帶平章事與館接使行馬坐次皆分賔主以報素頴乃不敢爭舊文云遂以賔主相見今改云乃不爭往樞密時政記十月五日云素與忱等文移返數十次事聞國信所勘㑹到蕭德故事劄與忱等忱等牒素請只依九月六日所議坐次早約日相見素辭屈乃依賔主禮相見九月六日所議蓋賔主相見禮也相見則在十月五日以後并十二月末初詔劉忱等與北人㑹議天池廟鴻和爾山麓土斷有明據可以理譬喻之其餘地界如數議不諧可以南北堡鋪中間為兩不耕地又不可則許以中間畫界其中間無空地即以堡鋪外為界是月戊申也即十三日其後李舜舉言近至逺探鋪遙望大黃平㑹議處盡見地形問防拓人云欲直以大黃平橫都谷為界蓋鋪屋使者在境又聲言再遣泛使自知理屈故作虛聲臣料敵情㑹議有必得之望不與相見止於循舊址增移鋪屋即是議與不議等若慮絶好起釁必不在此設欲屑就其議而與之不若聽敵人無名自占俟我兵儲有備明曲在彼而復之朝廷若以封疆為意特須主張如大石等五寨禁地並當理取仍舊以關口守把交蹤或且為羈縻之䇿乃詔九月戊申指揮更不施行然其後竟盡與之此年十一月二日丙申二十八日壬戌明年二月十日壬申三月八日庚子十七日乙酉四月五日丙寅皆合參照實録熙寧八年四月丙寅遼使蕭禧等辭初朝廷既遣劉忱蕭士元詣河東理辨疆界而契丹亦令蕭素梁頴㑹於境上忱以疾不即至又命呂大忠代士元素頴頗倔彊未肯見忱等一日蕃酋引兵萬衆入代州界焚鋪屋與官軍相射既而素穎徑入橫都谷施帳幕邀忱等相見忱等不往又欲設次於西陘東谷忱等以侵地愈深不許竟㑹於大黃平凡三四見議地界不能決初指蔚應朔三州分水嶺土隴為界忱等偕素頴行視無土隴乃但云以分水嶺為界蓋山皆有分水嶺槩言分水嶺為界則至時可以罔取此黠敵之微意也與忱等相持久之復遣禧來頴蕃酋引萬衆入代州界焚鋪屋與官軍相射既而素徑入橫都谷施帳幕邀忱等相見忱等不往又欲設次於西陘東谷忱等以侵地愈深不許竟㑹於大黃平此等俱合於七年九月載之不應於八年四月别出須考詳刪修老范育作薛向行狀載向密奏乞令劉忱緩行以敵師上用向計敵食盡遂去己酉檢正中書五房公事工部員外郎集賢殿修撰李承之為河東察訪使賜河東提刑司紫衣度僧牒千計置錢糧分給管下闕倉州軍熙河經略司言收復河洮州應副軍須官乞比第三等第四等酬奬詔減年磨勘堂除免試不拘名次差注凡二十二人上批陜西五路經略司案視緣邊諸城堡寨廣為守具毋誤邊計庚戌借內藏庫錢百萬緡付河北轉運司封樁又詔提舉秦鳯等路監牧原渭州鎮戎德順軍遇蕃部馬至即受之無輒遣人招誘辛亥羣牧司言除樁管不係支使及牧養監病馬外自今以二千匹為額其餘堪配軍及雜支馬權與闕馬軍士詔邢洺磁相趙州成德軍今年畸零夏稅權倚閣詔京東轉運司以上供折納斛錢納榖封樁水運赴河北詔趙思忠妻子聽以蕃服入見六月二十一日可考詔提舉市易務賈昌衡等自今有公事許直牒閣門上殿此據御集壬子命東上閣門使榮州刺史李評權同勾當三班院評自是始復入故特書之司農寺言諸旌表門閭有勑書及前代帝王子孫於法有䕃者所出役錢依官户法賜號處士非因技術授者凖此從之以秦州買馬務𨽻提舉熙河路買馬司仍以秦州通判兼提舉牧養歲終計綱撥發都提舉在京市易司言乞罷本司提舉官歲終比較推恩其監官自從舊賞格諸賣買博易並隨市估髙下毋得定價其當給三司變轉物即依三司所估民願以抵保賒請折博歲出息二分計月理息者聽從之上以諸路旱災常平司未能賑濟諭輔臣曰天下常平倉若以一半散錢取息一半減價糶使二者如權衡相依不得偏重如此民必受賜今有司務行新法惟欲散錢至於常平舊規無人督責者大凡前世法度有不可行者宜謹守之今不問利害如何一一變更豈近理耶此墨本所書朱本因之神宗聖慮即此可見二十六日上批當考是日三司火自巳至戌止焚屋千八十楹案牘等殆盡詔三司權於尚書省蒞事朱定國續歸田録云熙寧中有人獻議酒務炊作連竈一門而三鑊一門用柴三鑊俱沸用柴既省謂之燒省法以其法遍諭天下用之此法本巴蜀煎鹽之利水有溫熱遽取之其實沸止一鑊爾炊酒竟不可用而所在但傳燒省法及三司災屋千餘區一日而省之文案存者無幾始知燒省三司災之䜟爾豈偶然哉連竈法據司馬光日記乃京東提刑王居卿所獻已附注四年十二月辛酉更須考詳又詔權御史中丞帶學士常參正衙起居並立中丞本班其雜壓則從學士以直學士院鄧綰章惇互論班著故也八年正月壬子别著令癸丑詔新知常州國子博士呂嘉問監市易務上界職方員外郎劉佐西頭供奉官吳真卿並遷一官勾當公事須城縣尉劉逈為奉禮郎各減磨勘三年餘官吏循資賜錢有差以三司驅磨市易上界課利比六年增十餘萬緡也提舉永興秦鳯路交子宋迪制置永興秦鳯路交子六月二十六日迪以知邠州提舉今改制置二十一日二十六日可考詔三班使臣遇同天節自供奉官至殿直許量率錢進銀及道場功德疏差使臣管勾齊筵以前此多率使臣俸錢以供浮費人頗苦之故也詔河東秦鳯永興等路都總管司見管軍馬别降指揮團併外其開封府界河北京東西路置三十七將副選嘗經戰陳大使臣專掌訓練河北四路為第一至十七府界為第十八至二十四京東為第二十五至三十三京西為第三十四至三十七從蔡挺請也敵議雲中地界久不決挺請盡召還河北緣邊戍兵示以無事兼可積蓄邊儲因是更制將有正副皆給虎符又以河北兵教習不如法緩急不足用奏乞於陜西選兵官訓練六年六月十二日以京東武衛六十二指揮分差主兵官勾抽訓練案此時已有置將規模也八月二十四日可考甲寅上謂輔臣曰卿等所上邊防畫一先擇可施行者十四事更與樞密院議之恐事有未盡既而二府合奏可行之事凡十有四其一自來出戰有功大小使臣未經升擢者以功狀次稍多或一次功狀優異及知名人作一等餘作一等取㫖升用考其才實二停間使臣降配軍員年六十以下武藝及中等精神不衰令投狀自陳長吏試驗如堪戰陳保明以聞三令安撫轉運提㸃刑獄察訪司各體驗轄下將官人材智略具緩急任驅䇿與否內有才之人差遣近下可以升擢及緊要間慢合對換文臣有勇略可為將官不拘路分並密以聞四近降度僧牒三百與定州安撫司充訓練義勇保甲及募刺事人之費其緣邊州軍冝並依定州例量賜本錢出息令鈎致北人之能知其國事者或質所愛使探問敵中任事主兵人姓名材能性識所管兵數武藝强弱屯泊處所城壘大小糧食多少及出兵道路刺其的實逐旋以聞候到參互比較有實者編類成書凖備照用其邊臣不能使人到前後探事尤無實者當移降五河陽别置水軍五七指揮造船習戰以備敵濟渡者六既為堅壁之計當有清野之法逐縣預以義勇保甲附保甲丁口數寓之籍中本州密約計人數至時分入州城及大縣别為一籍令司農寺依樞密院先降造丁産簿條約一處編籍七北京城西偏帶沙低薄已檢計立限修築上下水關其護關戰橋并左右引手城未髙堅相度增築置樓櫓守具八衛州大河之南密接京畿正當控禦之地其城至小并黎陽城亦當要害未能包山為固並展拓修築緩急屯兵防越軼之患九分屯兵馬出戰要害之處並委察訪使就與逐路安撫使等處置具防守事以聞十相度展拓城壕及增築縣城緣城大人寡及城小人衆於法皆在所不可守宜先計度本州户口若干除保縣寨外若干人保州兵民除上城出戰外可容若干若更外來人户容之不盡即展拓毋令過大致難防守其當增築縣城等項須逐州軍更相照應緣四路帥府分統州軍其勢當如絡脉之相通緩急冦至即候望相及掎角相應堅壁出戰皆合事機而敵人腹背懷懼其勢自潰如此修築即不枉用工力十一如遇有警清野備敵百姓般糧斛薪芻畜産入保城壘并合積畜守具及分擘部分倉猝之際常患措置無法即須計度官司屋宇及空閒地分配人户居住及安置所般之物并內有人力不足官為募人般運寄納出給如此之類并應於守拒事件預為講畫詳古今法制斟酌事宜具條件以聞十二敵人出入道路宜悉知之先據地利安置營寨開掘坑塹示之以利導令必趨及可以設伏處預知地形髙下水流所歸如壅決某水即可衝灌某處若恐敵人用之即就何處防守疏決或回避並悉講求畫圖以聞十三河北地利所出有限從京那移錢物多行糴買即增起物價而費本已多冝撥粳米百萬石封樁每年於汴綱內支撥應副仍令京東轉運司據合上供或酒場剩錢於有水路州軍糴粟米小豆計舟車步乘般往河北合分往逐處收蓄及於京西路沿蔡河州軍亦賜糴本錢計般運到京入汴但算糴本步乘比本路常平糴價不貴即計置寬緣邊糴買之數可減撲物價多蓄斛斗以紓邊計其京東西路合計買事専委官相度施行詔皆行之十四河陽置水軍不行仍令樞密院於登州增招刀魚戰船兵團結閲習凖備差使詔已選差教馬軍使臣所有合教事藝宜令曾孝寬張誠一同郝質賈逵速詳定聞奏此據御集七十三卷七年九月十九日手札教馬軍事自此始實録不書今追書之並熙寧十年九月庚午以後至元豐六年二月戊申合參考詔置河東經略司勾當公事官一員候邊事寧息減罷從經略使劉庠請也庠又乞給錢二十萬緡修緣邊近裏城及軍器詔察訪司相度以聞檢正中書五房公事李承之言三司帳案文字焚燒幾盡外方人吏因此拆兌隱藏案檢乞下諸路應熙寧五年後文帳案檢委州縣畫時監勒吏人檢取封印架閣具道數申提舉帳司其吏人各據所管生事文帳及案底簿書開拆收拔名件限三日判使紐計分數并具火勢先後申中書看詳收救并燒失若干量輕重賞罰如敢隱藏或故毁棄即令㸃檢申舉許人告犯人以違制論情理重者當刺配告人給賞錢三百千從之詔三司㸃檢編排帳目文字具散失數及收救不足並申中書或樞密院下諸司檢録降下中外奏聞事關三司未回報并諸處承受三司指揮勘會事未回申雖已回申未行下指揮當結絶者限五日申中書或樞密院元申牒三司文字即一靣申牒三司以上並令本司置簿拘管敢有隱落以違制科罪其應見行事如未見條例並審議施行如事體稍大申中書或樞密院諸因三司火文案不全輒敢詐欺規圖官私財物及增減功過以違制論計贓重者以枉法論乙卯知制誥直學士院章惇權發遣三司使詔惇選舉判官不為例三司火惇時判軍器監遽領所部兵役往救上御樓問救火者誰左右以惇對上悅詔將作監檢計三司地基分布修蓋除副使判官不置堂外餘修如故買民居增廣地步所用材木令熙河採伐輸運委都轉運使熊本提㸃刑獄鄭民憲管勾詔權三司使翰林學士兼侍讀學士元絳落侍讀學士罷三司使鹽鐡副使户部郎中張問知虢州判官金部郎中李端卿太常博士祕閣校理韓忠彥為軍通判並降一官户部副使太常少卿賈昌衡度支副使刑部郎中孫坦其餘判官檢法提舉帳勾院等十二人並罰銅三十斤制置永興秦鳯路交子司封郎中宋迪監三司門內侍殿頭李世良並奪兩官勒停初迪來禀事於三司而從者遺火於鹽鐡之廢㕔遂燔三司故迪坐免絳等及責應救火官令御史臺劾罪以聞詔自今遇大燕親王宗室使相樞密使副宣徽使三司使駙馬都尉並於殿門外幕次賜酒食舊制賜酒於集英殿後朵廊賜食於賜食㕔權發遣宣徽院吳充奏其喧譁故改之丙辰知制誥沈括兼判軍器監代章惇也知同州度支郎趙瞻管勾陜西制置交子瞻墓志可考十八日宋迪制置二十六日云不可行知潞州雄武軍留後郭逵知太原府清海軍節度推官監雍州填乃金坑鄧闢為著作佐郎以歲課得金為錢十萬緡故也後五年又得金為錢十五萬緡遷太常博士於是廣南西路經略安撫司言此坑産金至多乞從本司舉使臣二人為監押巡檢兼監坑並先轉一資任滿課額不虧依橫山寨使臣例又增防守兵三百人從之募京西流民興修工役給錢糧老幼疾病計口給米置熙州天慶觀歲度道士二人給常住地三頃丁巳詔職方員外郎權發遣梓州路轉運副使李竦與監當差遣權知瀘州職方員外郎李曼勒停梓䕫路兵馬鈐轄文思使張承祐供備庫副使孫仲達各追兩官勒停坐瀘州夷賊擾邉不能捍禦也六年四月六日四人同勘己未詔自今差武臣知州軍並降勑詔開封府界縣災傷及五分權停教閲保甲界河巡檢都監供備庫副使郭寅降一官寅應詔舉習弓馬使臣右班殿直張亮亮自陳出於吏胥素不習弓馬故責之辛酉上批諸路常平錢榖近年雖用陜西青苗法蕃息數不少然七分以上散在民間若遇水旱須救濟及緩急朝廷移用則卒難斂索今諸路各災傷來年嵗計極可慮若不速處置深恐州縣不計已倚閣過數接續不住給散致令闕乏宜速指揮諸路州縣據所管已支見在錢榖通數常留一半外方得給散其見有倚閣户毋更給司馬光記聞蘇兖云內侍李憲既怨介甫罷其南征乃言青苗錢為民害上以內批罷之介甫固執不可而止先是州縣所斂青苗錢使者督之須散盡乃己官無餘蓄至是敕留五分此憲發之也青苗止散一半乃七年九月二十六日指揮與御集實録同記聞所記或誤當是李憲怨介甫沮其往熙州故言此介甫時去位上因行憲言蘇兖誤以為罷南征也南征乃介甫再入時事本志云上謂輔臣曰常平散錢收息賤價糴穀各川其半使二者如權衡之相依不得偏重則民受賜乃詔常平錢穀云云此下與實録批語同但甚略耳今附注此十七日上諭輔臣云云可考九年正月九日并二十二日及元豐元年閏正月七日可參考常留一半九年正月二十二日又申言此或司馬光所聞李憲發之實指此也詔置教閲武寧成都府梓州路各兩指揮利州䕫州路各三指揮時東兵之戍川峽者已多還營故也詔永興軍路支折二錢二十萬緡付秦鳯等路轉運司市糧草及推行交子本錢既而交子無實錢法不可行遂罷此墨本所書朱本因之九年正月二十七日乃罷行交子今年六月二十六日又九月十八日并二十一日八年二月二十九日九年正月二十七日皆合參考一食貨志云既以皮公弼熊本領交子事又以內藏錢百萬緡假三司遣市易吏行四路請買鹽引而三司又令秦鳯永興鹽鈔歲以百八十萬為額并趙瞻墓志皆可考壬戌賜皇第五子名僴詔河北災傷州軍罷糴仍令轉運司具見管及所賜錢糧有無闕少以聞先是秦鳯路轉運司請於鳯翔府斜谷置監鑄折二錢都轉運使蔡延慶言鳯翔府郿縣兼錫銅鑄折二錢皆脆惡以鑄當五當十宜可用詔皆罷之此據食貨志第六卷不得其時因本志附吳幾復皮公弼等奏請前二按實録八月戊辰詔罷鳳翔府郿縣鑄夾錫青銅折錢以錢成貫之輒碎也今并入此斜谷罷鑄或前已見當存一去一是時關中錢法敝永興軍路安撫使吳中復請以錢四十買缺薄惡錢一斤則民間專行省撫大錢而大錢少不足用請以所買惡錢悉改鑄大錢而民間所行私大錢一以一小銅錢買而更鑄之永興軍等路轉運使皮公弼請盡買惡錢且毋行鑄鐡錢相易事有司舊納僞錢請先於本路五銅錢監改鑄一年可竟又請改鑄所買惡錢秦鳯路都轉運使熊本言買惡錢及禁舊通行大錢銅錢相易皆非便請降錢式下所屬而禁用惡錢犯者論如法勿廢盡舊通行錢選官庫惡錢同所買改鑄之小變其撫為熙寧重寶今本路官錢受私錢已多省撫錢久廢公私百無一二今雖以錢四十得僞錢一斤及銅錢千易當二鐡錢千其實鐡錢一斤才當斤鐡耳千錢為鐡六斤斤鐡為錢二十而以銅錢千易之官失多矣又錢多一年改鑄未得竟也且民賣千錢得二百五十折二大錢才易其半又禁其通行大錢則方災傷民所有錢四亡其三何以救災衆議不同於是詔逐司相度利害以聞此據食貨志第六卷此實録所書頗詳當用之十二月十一日甲戌熊本云云再下逐司相度癸亥詔永興軍路安撫轉運提㸃刑獄提舉司具析奏流民盜賊不實因依以聞先是安撫等司言本路二麥薄收民闕食流移十已八九賊盜驚劫寖多下熊本體問本言無大驚劫故有是㫖權發遣兩浙轉運副使張靚言體量官司行鹽法差誤十事內三事盧秉舉覺已根究外越州有因監催鹽償錢母殺子者又瀕海等縣隔州縣追同保人令本路轉運司劾官吏其鹽事司違法第月比較課利决責枷錮專副詔淮南西路轉運司劾盧秉以聞其後奏至秉坐公罪杖六十用赦原之差靚體量在五月十九日丙辰呂惠卿日録熙寧八年八月二十八日進呈張靚乞避盧秉狀上曰是他乞移京東西一路或解罷赴闕莫只是要朝廷知僉曰是如此余曰但陛下察之便得見說盧秉尤怨臣等至於人前泣訴王圭曰韓絳等當時便要衝替却上曰秉誠有過當事余曰沈括初自浙中回外靣說底事必然靣奏陛下斷過刑名一嵗及數千人此是沈括録來越州母殺子是謝景溫手裏斷是括體訪來嗔他張靚體量不得是虞太寧論盧秉事只明州有七八件違法雖是秉牒太寧驅磨然太寧才具申縣保甲秉三日走到太寧縣搜尋他事便罷了太寧公事顯是怒他如此申明太寧言秉立式與州縣應斷過鹽案並依式供申本司有逐季申月申旬申逐時申或本司有勾當公事檢法官檢㸃至於入徒流配罪並不㸃檢已死及流配並追償錢於其家只六年八月一日內收坐官員已百餘員決人吏八百餘人如此盡有迹狀若送與秉分析必了不得然臣等為秉亦收許多課利而去歲中外方欲共壞朝廷新法則不可不且保全他以此只於靚體量事中只擇一件月比較專副事勘他然秉一路添許多刑名極非佳事又秉寬苛刻之罪嚴縱舍之禁則州縣自然趣向如此如張靚自言趂得課利多如秉未知實與不實若果是實却無如此違法事即為可嘉上曰若如此即須加賞八年七月九日盧秉自淮東提刑除發運副使靚時任兩浙運副故乞四避十月二十五日緣張若濟鄭膺事罷今附注惠卿云云於此七年九月二十八日更徐考之虞太寧事當并考詔中書樞密院具陜西河北河東纍年解發義勇推恩數數竟何如詔三班院內外使臣如有能射親弓力八斗以上熟於使馬及輪弄器械者在班人許經本班乞試候及十人關赴軍頭引見司考驗當引見在外使臣經本州軍委知州通判兵官同試驗如中格先以聞是月置岷州宕昌寨詔兩制以上有公事合同上殿者令同上殿
