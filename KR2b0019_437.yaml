body:
  text: 續資治通鑑長編卷四百三十三宋李燾撰哲宗元祐四年九月戊辰朔右諫議大夫范祖禹言臣近論安燾不簽書樞密院所記親聞聖語却收藏不出不書於時政記乞特遣使問燾取索降付樞密院并乞付實録院書於元豐八年實録臣伏聞樞密院已於安燾處取到元記聖語即未蒙降付史官臣伏見吕公著奏以王安石吕惠卿有搆造誣罔之言輒修改舍人已行詞頭韓忠彥奏父琦有定策之功而先朝褒賞至和中執政之臣皆蒙降付實録院依所奏施行公著止是為人誣以語言忠彥止是為其父功業不明猶不能已各有辨别免使後世疑惑伏乞陛下以社稷至計宣諭執政事體至重實繫久逺與公著忠彥所論事理大小不同若不書之史册明示萬世則無所取信臣伏惟陛下所以宣諭執政大臣蓋以中外具知本末安燾備位樞極親承德音乃敢隱匿不肯書載此必包藏姦慝别有所在伏望聖慈深察早賜降付實録院并三省所聞聖語亦乞指揮備録付院一處相照實録編修祖禹又言實録院昨凖吕大防關送到元豐八年春季門下省時政記節文二月二十九日三省樞密院詣內東門進榜子入問皇帝聖體面奏欲望早建東宫又奏太皇太后權同聼政臣竊謂三省樞密院不應一時進言必止是一人獨奏據時政記所言有此未眀須得昨來聖語宣諭當時事實三省樞密院所記聖語文字一處照修乃可傳信及樞密院關聖語送實録院祖禹又言臣竊詳安燾自五月二十二日親聞聖諭即合以其日記録付時政記房就使未可亦不過三二日間可以了畢不應遷延日數至七月七日燾方丁母憂若言當母病時有所不及則燾在七月六日視事如常既丁憂後亦合以文字還樞密院今却藏之私家至八月中纍次取索方肯將出此乃燾意欲隱沒事實使時政記漏落不載則無可考據且天下之人具知太皇太后為社稷計不得已而臨朝皇帝以先帝長子嗣位事理明如日月誰有間言而蔡確之黨妄稱定策陛下因語及確故有宣諭非藉一燾發眀聖功而燾乃稽留訓言不即記録懷姦不忠廢事不敬其罪有五親承德音藏匿文書八十餘日其罪一也上背君親下黨姦惡隂與蔡確為地其罪二也陛下以燾為可信而燾不以誠信事陛下其罪三也陛下更張庶政以來燾每事異議沮抑聖志陛下欲修復祖宗舊政燾乃欲固守王安石新法其罪四也陛下以髙官厚祿養燾以異恩優禮待燾始終不衰而燾終不感聖恩欲以姦意疑惑中外之人其罪五也臣嘗言燾若得志必引小人聚於朝廷他日害國政者必在於燾燾之意趣衆所共知今於記録聖言其迹狀如此豈可略不加詰問伏乞罷燾起復明降指揮候服闋日重行黜責據祖禹家藏奏藁乃九月四日上此十八日又言之己巳右金吾衛大將軍澤州防禦使叔牙為秦國公左班殿直士盉按原本作士香考宋史宗室表士香官通議大夫此書于本年四月甲寅亦書通議大夫士香由右監門衛大將軍轉文資此月不得更稱左班殿直又宗室表有燕國公士盉與此正合今改正為右千牛衛大將軍燕國公詔故宗室宗文宗瑗於合得遺表二人外特依故宗輔例更與一子轉官詔延州升為延安府以上藩邸舊鎮也乙亥三省言近詔舉臺察官今御史中丞傅堯俞侍御史朱光庭薦戶部貟外郎穆衍都官貟外郎葉伸翰林學士承旨蘇頌等薦利州路轉運判官陳鵬詔穆衍葉伸陳鵬已係郎官監司令御史中丞侍御史同别舉官二貟翰林學士兩省諫議大夫以上同别舉官一貟以聞戊寅齋于垂拱殿己卯薦饗景靈宫還內庚辰齋於垂拱殿辛巳大饗眀堂大赦天下政目當刪取增入前熊克九朝通略本日詔衙一役復用差法乙酉徐王皓賜詔書不名政目有此實録不書詔觀文殿大學士知永興軍韓縝觀文殿學士知潁昌府范純仁並依大禮令賜物外加賜器幣韓縝各五百匹兩范純仁各二百五十匹兩太子少保致仕張方平依大禮令賜器幣尚書省言任子之法理宜以長幼為序即合奏人曽犯私罪徒并有廢疾及不肖不可從仕者許奏其次著為令從之是日右諫議大夫范祖禹登對奏疏曰臣竊以朝廷治道必歸于一祖宗創業傳之萬世造立法度皆因衆人之智稽日纍月講磨而成非獨出一人之意取一時之便而已纍聖相承百三十年比之前代治安最為長久其法有已成之效此可信而不疑也然行之既久其間不能無弊熙寧之初先帝勵精求治思致太平稍欲更革弊事以光大祖宗之業而王安石用意過當獨任私智悉排衆論吕惠卿曽布之徒欲以改法進身一切變易祖宗舊政至今天下以為不便前後臣僚論之已詳不待臣言而知也自魏晉以後官名不正國家承平日久未遑制作元豐中先帝置局講求此誠一代大典然有司亦失先帝本意一切遵用唐之六典大唐六典雖修成書然未嘗行之一日今一一依之故自三省以下無不煩冗重復迂滯不如昔之簡便臣恭聞先帝已厭官制之煩但未及修完不幸早棄天下今二聖垂拱循守成規除去弊事十已七八海內安靖已有成效今臣之愚竊謂朝廷既以王安石之法為非惟當修復祖宗舊政則天下無事伏望陛下眀諭大臣凡所措置變改悉遵故常無得出意於新舊之間别立一法自官制將法民事有未便者更加修備祖宗時所無而今所有其可行者存之不可者去之祖宗時所有而今所無可復者復之如官制正名則如先帝之規事實則如祖宗之舊其他可以類推如此則上可以存祖宗經久之法成先帝制作之意下亦便於當今之宜庶使法度不至數變紀綱不寖隳壞祖禹家傳云時執政有欲於新舊法别創立者祖禹深以為不可故及之祖禹又言臣近論安燾稽留聖語不即記録藏之私家八十餘日懷姦不忠隂與凶人為地大臣如此不可不責乞罷燾起復明降指揮候服闋日重行譴黜伏乞早以臣奏付外施行己丑翰林學士承旨鄧溫伯為吏部尚書溫伯先以母喪去位及是喪始除也左諫議大夫權給事中梁燾論溫伯操履回邪初依王安石以掾屬為之肘腋後結吕惠卿以諫官為之鷹犬迎合惠卿報怨之意力擠安石親黨畏安石復用之勢還攻惠卿過惡吳充秉政而方用事故自媚於充而茍合蔡確擅權而貪天功故隂濟其惡而忘君蓋其性柔佞不力貪競無恥但知附託巧於進取忍欺二聖之聰眀甘為強臣之役使出入朋黨自懷反覆責之臣節無忠信可觀乃以宅權衡之地竊為陛下惜之又論溫伯頃撰蔡確麻詞妄稱確有定策功不可不懲乃詔溫伯别與差遣詔别與差遣乃二十八日今并書十月二十日改權學亳州舊録溫伯傳云元祐用事之臣結黨排陷坐製蔡確麻詞妄言有定策功以龍圗閣學士知亳州新録辨曰按元祐時政記當神宗末命宣仁聖烈皇后以哲宗所寫經宣示宰執當時惟王圭進對餘人無言且哲宗以神宗長子嗣位孰有聞言而潤甫於麻詞中輒推確定策之功欺罔明甚史官乃謂元祐之臣結黨排陷是誣也今刪去十字溫伯新傳稱為吏書坐製蔡確麻詞妄言有定策功故出知亳州新傳蓋固舊傳但稍刪削其誣詞耳舊録梁燾傳載燾論溫伯云云既而曰朝廷不然其論新録改為不聼按溫伯竟罷吏部尚書安得謂不然其詞及不聼也且燾論溫伯時猶未遷中丞實以左諫議大夫權給事中舊傳及新傳即云改權戶部尚書誤也為中丞論溫伯乃五年三月十四日溫伯為亳州除翰林承旨時舊録新録但云權給事中梁燾論其附託進取也惟燾傳有此既稱溫伯不可宅權衡之地即是除吏書時非承旨時眀矣不知再除承旨時燾所論云何燾行狀則以燾此論在五年五月再除承旨時且云豈可一日居侍從獻納之地不可宅權衡之地未知孰是當考燾集有論溫伯除吏書奏議獨無除承旨時奏議須博求之詔責授秀州團練副使本州安置沈括敘朝散郎光祿少卿責授成州團練副使黃州安置吳居厚敘朝奉郎少府少監並分司南京朝散大夫監常州茶稅賈青管勾洞霄宫朝奉大夫監秦州酒稅吕孝亷管勾仙源縣景靈宫太極觀朝請郎監海州酒稅王子京管勾鴻慶宫仍並許於外州軍任便居住括等並以該眀堂赦恩有司檢舉故也權給事中左諌議大夫梁燾左司諫劉安世封駮前詔燾言臣恭以眀天子在上臨遣使者所以究宣朝廷恩澤循問百姓疾苦欲使民安其業吏稱其職以固本厚下為長久安寧之計也事不本此而附會以見已功欺罔以亂主聽是為害政懷姦失忠幸不加誅而決可廢矣居厚等被先帝詔旨按臨一道曽不少留意於究宣恩澤循問疾苦以苛切聚斂為事功令之下人人無所措其手足嵗無水旱之憂而民以飢寒離散轉而墮於溝壑者不可勝計其故何哉此輩使之然也東南之人恨之痛入骨髓雖加斥逐未快公議今二方瘡痍未補而遽爾稍起示有收用之漸臣竊疑之若使數凶復行終為生靈之患此不可不慮也仰惟聖君在宥仁政敷施所願蘇無辜之百姓不願寬有罪之姦人謂如此輩雖終身廢之不足以少謝平民安世言括資稟姦邪貪冒榮寵因緣朋黨致位從官元豐末年出領延帥而邀功生事創起邉隙永樂之禍辱國殃民先皇帝痛悼愧耻以至厭代忠義之士疾括若讎俾全要領已屈典憲豈可輒因赦宥復起仕途此命一頒恐無以慰天下之望伏乞收還恩例特與量移燾與安世又同奏臣等伏見朝廷近因眀堂赦恩牽復左降官吏首及沈括吳居厚賈青吕孝亷王子京等臣燾臣安世權給事中日已曽封駮或聞得旨令依前降指揮行下茲事體大不容差失須致論列庶存公議臣等竊謂括以從官出帥方面不能為朝廷綏懷外域而創起邉事僥幸寵祿及永樂陷沒兵民之死者以數萬計關陜瘡痍至今未復先皇帝雖舉責帥之典而賜以不誅終緣憂傷遂棄群臣括雖萬死尚有餘罪居厚等奉使一道未嘗宣布眀天子之惠澤而爭為掊克以希進用使無辜之民困於暴令流離轉死不聊其生天下疾之目為民賊陛下初聽政事即令竄黜四方傳報鼓舞相賀終身廢棄猶未塞責豈可援引常法更加録用議者以謂赦乃國之大事不可失信臣等竊以為不然先帝之廢沈括天下皆知其欲謝死事之臣民也陛下之貶吳居厚等天下皆知其欲戒誅剝之官吏也赦書止曰貶降官並與量移即無已量移者與敘用之文縱使有之而不行則是小信失於括等數人而全先帝與陛下仁愛元元之大信於天下二者輕重固不侔矣更望聖慈深察事體收還誤恩允合輿議又言臣等伏見近日除授沈括吳居厚賈青吕孝亷王子京差遣不合公議門下省已行封駁竊謂朝廷必以大禮之後過惡例隨湔滌臣等以為不然括首議再興邉事喪師辱國為先帝遺恨罪不容誅而得全首領無復可以推恩矣居厚欺君害民誅求暴虐掠為已恩歸怨於上罪當放斥而得列搢紳無復可以推恩矣青與孝亷子京苛刻聚斂流毒一方附會誕謾廢失使指重譴逺貶正當其罪如此數人者蹈犯凶桀出於文墨既不可以常法治之亦不可以常赦寬之也若使僥幸復起夤緣再用則羣小振奮躡踵求伸甚非朝廷之福生靈之幸也長姦之漸所宜杜絶伏望聖慈面飭大臣請不以常法治而貶降者不得以赦原如天度兼容未忍終棄即於為惡之間略加差别特移青等一內地監當括與居厚且令依舊庶協大公以懲群枉詔沈括吳居厚前命勿行內沈括更候一期取旨此詔乃二十八日乙未今并書觀文殿大學士知永興軍韓縝知河南府資政殿學士知河南府李清臣知永興軍淮南路轉運使言奉詔體訪王鞏昨通判揚州日因穢濫事輒以私怒決責無罪醫人考驗皆有實狀詔王鞏罷知密州送吏部政目六月八日王鞏知密州五年八月十四日蘇轍云云當考按五年八月十四日楊康國言昨論鞏差除不當間改差太平觀乞送吏部詔令吏部差鞏太平觀然則此未送吏部也姑仍舊録辛卯以祀眀堂禮畢詣景靈宫天興等殿行恭謝禮次詣萬夀觀壬辰詣凝祥池中太一宫集禧觀行恭謝禮次詣醴泉觀大相國寺乙未權發遣提點開封府界諸縣鎮事髙士英為職方員外郎鳯州防禦使世逸為耀州觀察使太師文彥博言先朝賜臣僚儒行中庸篇及文武臣七條欲乞舉行此法依例於朝辭日給賜及宣諭誡勵詔文武七條令檢舉行下逐路監司遍牒遵守其儒行中庸篇候將來科場給賜詔遣戶部郎官往京西會計轉運司財用出入之數右諫議大夫范祖禹言自來諸路每告闕乏朝廷許應副其餘則責辦於外計且既委轉運副使以一路財計而不信其所言虛實必遣郎官然後可信是使諸路使者人人有不自信之心每遇闕少則倚望朝廷遣官會計愈不自安欲乞自今諸路凡有告乏只委轉運司會計保眀聞奏如有不實即重行黜責其誰敢妄今諸路經費所以不足者由提刑司封樁闕額禁軍請受錢帛斛斗萬數不少此乃户部轉運司本分財計先帝特令封樁以待邉用今朝廷方務安邉息民則封樁之法宜悉蠲除欲乞自熙寧十年初封樁以來已起發上京及今日已前未起發上京數目盡以賜尚書戶部諸路轉運司以佐經費樞密院進呈祖禹所言詔諸路見封樁闕額禁軍請受錢帛斛斗自合依神宗處分封樁今後臣僚不得輒起請撥賜户部仍令遵守舊録樞密院言右諫議大夫范祖禹奏請提刑司封樁闕額禁軍請受錢帛斛斗萬數不少乞盡賜户部諸路轉運司以佐經費詔諸路見封樁闕額今後臣僚不得輒起請撥賜户部仍令遵守新録因此今取祖禹家傳及奏議詳載之祖禹舊傳又云上察其姦乃降御批此誣辭也新傳已削去祖禹又言封樁之與經費均出於民皆陛下一家之財也茍可以利國何愛焉譬如移之於東而遷之於西出之於內而歸之於外也唐代宗之時租稅悉進入大盈內庫以中人主之欲天子以取給為便遂不復出有司不能計其多少國用不能計其贏縮殆二十年及德宗即位宰相楊炎頓首於上前請出之以歸有司如此然後可以議政德宗乃詔凡財賦皆歸於左藏庫昔先帝有經略四逺之志是以别貯以待用今陛下垂拱守成至於無為蓄聚於此將安用之今諸路窘乏不可不救若其計窮豈免掊克是奪之於此而使取之於民也惟陛下無疑於改先帝權宜之制不報祖禹又言自元豐四年河決小吳神宗皇帝下詔更不修閉決口宣諭輔臣曰以道治水無違其性河行大吳今已九年自元豐八年以來議者乃有異同朝廷疑惑故先遣李常馮宗道後又遣臣叔百祿趙君錫按視皆言無可塞之理即用北流為便士大夫亦言不可塞者十有八九而李偉希合執政無所忌憚敢肆大言以罔朝廷朝廷更不博謀於衆即依偉奏置都提舉修河司既開直隄第四鋪口而第七鋪危急自八月八日救護至二十八日用梢草百萬調急夫七千人官吏自夜逹旦掃緷愈危隨即墊去終不能守而直隄自潰決今才開一鋪河勢變移人意已不能測將來閉塞北流何止萬倍於此又聞范子竒爭言河不可回朝廷既令分析昨謝卿材奏乞兼領河事制置一年必使國用不加費民力不加勞河清住修物料住買水行地中冀不決溢河灘之地漸可耕墾自來春府界不消調夫亦不至科出夫錢又乞赴闕稟議河事自河決以來監司未嘗肯任咎責獨卿材所奏如此朝廷何不且試之一年若其無成顯行黜責而尚書省批令先具措置利害奏聞不令赴闕昨先移卿材河東乃復置修河司而改用范子竒子竒亦明言不可豈故欲違朝廷哉子竒久任河北必知其可與不可也臣竊見去年初遣二使之時大臣方且力爭或曰可塞或曰不可今言不可者已免罷所以廟堂無異議之人凡河役一或起則公私遂空將來聚十萬兵夫不惟窮困河北一路生靈京東西亦皆震擾陛下昨欲遣使之時先已降詔恐人有觀望之意後追改之此乃陛下以大公為心無所専主謹之至也及二使還奏大臣議論猶不能一獨陛下聖意主張遂罷修河司中外無不以為至當今才歷三時復為回河之役先帝既以為不可陛下又以為不可而執政恥其前言之失必欲遂非妄舉大役輕動大衆河本無事而人強擾之熙寧中河決曹村東南注巨野大興人徒塞之然人力乃無所施一夕河自退減靈平乃成故議者以為天助非人力也祖宗時王楚橫壠商胡皆不可塞也非不欲塞勢不可回也先帝知其如此及河決而北遂不復閉蓋幸其北去無南決逼近都邑之患而河薄西山稍近禹之故道此乃天意非人事也夫河者天地之氣氣之所向誰能禦之今東行故道已髙借使能以人力開之至海終不能使水自下升髙自大禹以來未聞用人功開土渠而引大河行其中者今不以人意順水而欲使水隨人意此乃鯀湮洪水汨陳五行之失也元豐中范子淵為武濟之役橫絶大河費國財害人命不可勝計京西之人恨不食子淵之肉及其敗事姦臣黨庇止奪一官陛下嗣位方加貶責今欲塞北流與子淵何以異校其勞費與其為害又非武濟之比也夫水官欲興河役正如邉臣欲生邉事官員使臣利於功賞俸給吏胥主典利於官物浩大得為姦幸豪民利於貴售梢草瀕河之人利於聚衆營為凡言回河之利者率皆此輩非為國家計也自古欲舉大事動大衆必先盡天下之言不惡異同之論使人人各伸所見而後利害是非出焉至於治河必委忠實可信之士其論議必斷以經術非專用貪利邀功之人也漢武帝使汲黯鄭當時塞瓠子猶復頺壞成帝時平當以經明禹貢使行河領河隄今乃欲望大禹之功於王孝先李偉之徒不亦難乎伏望陛下明諭大臣専採群言息意回河勿輕動衆無以有限之財力生民之性命填不測之巨壑勿循一言之失而望必不可成之功罷提舉修河司散遣官吏兵夫其北流決溢隨宜救護臣自聞復置修河司指揮即欲建言緣臣叔百祿嘗被使指言出臣口理亦有嫌是以躊躇至於閲月今中外訩訩皆言不便臣有言責若避嫌緘默坐觀國事有誤臣之罪大矣亦不報祖禹新傳云朝廷卒從其議按此時初不從卒從之耳或附十月四日祖禹未遷給事前御史中丞傅堯俞言臣伏覩都水使者吳安持李偉等決大名第三鋪口欲因漲水回大河於孫村口使還故道暴集薪芻屢差夫力傍河之民殆不堪命訖無成績虛費不可資計若知不可而強為是貪賞欺天若果可為而不效是不虔敗事欺天敗事未嘗議刑姦憸之人既無所懲艾故今又欲興作大役數十倍於前日假託神怪侮惑朝廷先為謬悠之談而不肯任責是國家將傾半天下之力徇安持等以僥幸於萬分之一茍不成功生靈何罪決為此者豈朝廷之福乞重責安持等以戒將來夫事以議從策由衆定今衆人之論不然者多新除水官亦復異議欲望聖慈且罷修河司以安衆心少休民力詳觀大河之變果有大害徐復議之詢謀僉同庶無後悔堯俞自注云九月二十八日奏此十一月十七日堯俞又云云左司諫劉安世言臣伏覩先王之治在於官率其屬使上下得以相維內外得以相制故人各任職而無茍簡之患吏不數易而人見誅賞之實此堯舜三代之所共由而不廢者也今親民之任在郡縣朝廷既為之置守令矣衆守令而無以統率則民或受弊又為之設監司矣監司之官坐制一道多至三十餘州少者亦不減十餘郡也其所宣布風化振舉綱紀舒慘百城廢置羣吏調發兵民均節財賦朝廷一聼其所為可謂任之重矣既付之以如此之權而無法以紏其繆豈非責小官者為太密而馭大吏者為太略乎臣聞祖宗之朝所以擇監司之意甚謹而考績之意甚詳近世因循寖以不講授任之際未嘗察其行實遂容非才冒處其間既將使指鮮稱其職或出於私喜而褒薦過其情或發於暴怒而誣捃非其罪或優遊茍且計日待遷或承望風旨以非為是急功利者有至於妄作務寬大者有至於容姦不惟無補於朝廷抑亦有害於政事臣嘗考唐六典監察御史之職掌分察百僚巡按郡縣每詣十道則選判官二人為之佐是御史非特紏尚書六司之過失而亦按治諸路也臣愚欲望聖慈先詔執政如諸路監司闕官並以兩制等所舉本科之人更加精擇須協公議亦可除用若未滿任不許遷擢求祖宗課責轉運使副之詔著為定法然後以天下諸路分𨽻六察間遣巡行按其功罪若治行尤異則元舉之官宜推進賢之賞職業無狀者必行繆舉之罰庶幾吏久其任不敢偷惰上下交警百職修舉新録有此奏係之四年九月今附月末須更當考詳安世盡言集乃不注上時
