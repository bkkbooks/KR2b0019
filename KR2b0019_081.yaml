body:
  text: 續資治通鑑長編卷七十七宋李燾撰真宗大中祥符五年春正月癸酉命翰林學士朝逈樞密直學士劉綜知制誥李維龍圖閣待制孫奭同知貢舉上作詩朂以掄材之意始遣內臣二員承受奏報蘇州言水災詔蠲其民秋租杭州言浙江壞岸漸逼州城望遣使自京部掃匠壕寨赴州蕆役從之仍令馳驛而往轉運司更互檢校乙亥贈左僕射宋白卒有司議諡曰文憲內出密奏言白素無檢操不當獲此諡遂改為文安賜處州處士周啓明粟帛東封初啓明舉賢良既罷歸遂不復有仕進意教授弟子百餘人時號處士於是轉運使陳堯佐表其行義於朝故賜之己卯令僦官舍民無出錢三日以雪寒也三司言左藏三庫承前各置官吏今請併為一但置監官二員從之韋氏會要云近年已省一庫今復併三庫為一庫後以官少事煩遂改如今制當考京東都大巡檢胡守節言部民王吉知羣盜匿所密以告官請俟禽獲以其贓給之上曰如此則被賊之家無乃重傷乎宜賜官錢三萬贓悉歸其主胡守節未見河北轉運使言鎮定都部署周瑩曠弛不任職壬午徙瑩知澶州命步軍副都指揮使王能代之瑩在澶州州廨之側屢有寇盜宰相以瑩位居將帥不能以威望鎮靜請復徙他郡上曰處之間僻益便其自奉耳乃下詔督責令其擒捕時發卒修河防而軍中所給糗糧多腐敗不可食又役使不均瑩弗能恤以故亡命者甚衆詔如聞保州遣兵襲賊私越北境疆場之事尤務謐寧其令本州按罪痛繩之分遣使臣馳詣沿黃汴御河州軍申諭守臣謹護隄岸棣州言河決聶家口請徙州城上曰城去河決尚十數里一方民庶占籍甚衆未可遽徙也遣內殿崇班史崇貴內供奉官王文慶與本路轉運使規度完塞仍具利害以聞三司借內藏庫錢五十萬貫癸未令保安軍稻田務旬具墾殖功狀以聞是軍地接蕃境屢詔修廣屯田自高尹涖軍事罕以聞奏故督責之甲申遣內供奉官王懷信侍禁李晏詣秦州小洛門置寨採木令秦州以騎兵百人步軍五百人防從無得廣興兵甲以疑戎人司天言太陰當虧不虧宰臣表賀乙酉并州上芻粟之數可給四五年上曰河東仍嵗豐穰儲偫尤廣自今諸路稔嵗宜以時積穀為凶年之僃因言蜀中儲蓄甚鮮陳堯叟曰兩川地皆肥饒而民不務儲蓄或小歉則每以蔬芋充食上曰河東北非粟不可務農寶穀乃國家養民之道也閶闔門內有人每夕身有光能於隙竅往來無礙上謂宰臣曰此必妖人惑衆令開封府擒捕禁約之詔文武官薨卒當定諡者自今本家申請即準故事施行不須奏入俟報詔殿前馬步軍揀補禁軍捧日上三軍每指揮及三百人龍衛上四軍每指揮及二百五十人拱聖驍騎驍勇寧朔神騎雲騎武騎每指揮及三百五十人並於次下軍額選揀升補上曰安不忘戰古之道也仍令擇材勇者引對補之契丹每遣人至寧化軍詔於橫嶺鋪治館舍以待之從河東緣邊安撫司之請也己丑詔以霖潦害稼除開封府民所欠秋租壬辰令河陽出廪粟萬斛減價給糶以惠貧民上封者言貢院鎖宿後即有朝逈李維家僮旦夕至省前誑求財貨望令開封府捕逐上遣中使諭逈等止絶之使還具言逈維憂畏狀甲午賜逈維手詔慰撫焉京城常平倉置七場分糶米糧趨市者衆或至壅隘詔分為十四場以便民令􅉸州出常平倉粟賤糶以賑窮乏丙申詔緣漢江州軍渡船力勝錢並特除放詔保州稻田務纍嵗積穀未嘗支用慮經久腐敗令三司規度給遣環慶路巡轄馬遞鋪使臣言蕃部酒醉強奪馬纓尋送本界監押和斷遣之上曰熟户蕃人敢干使命令本路部署究其狀重行鞫罰丁酉瀛州言北境商人私以物至州貿鬻為州民恐嚇即潛行厚賂而免詔緣邊安撫使追取所賂悉還北境仍令遍諭彼民有互市即赴榷場無得潛至邊郡戊戌著作佐郎聊城李垂上導河形勢書三篇并圖其略曰臣請自汲郡東推禹故道挾御河減其水勢出大伾上陽太行三山之間復西河故瀆北注大名西館陶南東北合赤河而至於海因於魏縣北析一渠正北稍西徑衡漳出邢洺如夏書過洚水稍東注易水合百濟會朝河而入于海大伾而下黃御混流薄山障隄勢不能逺如是則載之髙地而北行百姓獲利胸奴南冦無所入禹貢所謂夾右碣石入于河孔安國曰河逆上此州界其始作自大伾西八十里曹公所開運渠東三十里引河水正北稍東十里被伯禹古堤徑牧馬坡從禹故道又東三十里轉大伾西通利軍北挾白溝復西大河北徑青豐大名西歷洹水魏縣東暨館陶南入屯氏故瀆合赤河而北至于海既而自大伾西新發故瀆西岸析一渠正北稍西五里廣深與汴等合御河道通大伾北即堅壤析一渠東西二十里廣深與汴等復東大河兩渠分流則西三分水猶得注澶淵舊渠矣大都河水從西北大河故瀆東北合赤河而逹于海然後於魏縣北發御河河西岸析一渠正北稍西六十里廣深與御河等合衡漳水又冀州北界深州西南三十里決衡漳西岸限水為門西北注滹沱潦則塞之使東漸渤海旱則決之使西灌屯田有以見僃塞限邊形勝之利出於中國矣兩漢已下言水利者屢欲求九河故道而疏之今考圖制九河並在平原而北且河環澶􅉸未至平原而上已決矣則九河奚利哉漢武捨大伾之故道發頓丘之暴衝則濫兖泛濟接聞於世夫平原而北地勢浚下泄水甚易故滄德之間舊障皆完􅉸臺而東地形髙平入海稍難故齊棣之間遊波互出若放河北下則其利甚詳惜哉河朔平田膏腴千里而縱容敵騎劫掠其間無山川厄塞之防無形勝顧望之僃雖將材兵盛未暇長驅可謂授勝地於丐奴借寇兵為虎翼漢賈誼朝錯不及此議者以河水未東故也唐戴胄馬周不及此議者以寺在幽北故也今大河盡東全燕陷北則禦敵之計莫大於河不然則趙魏百城賦庶萬億所謂誨盜而招寇矣一日伺我邊土蔬饉穀飢乘虛入犯臨時為計則實難不如因人足財豐之際下民輕資疾力而成實興利除害之大者也詔樞密直學士任中正龍圖閣直學士陳彭年知制誥王曾詳定中正等上言詳垂所述頗為周悉所言起滑臺而下派之為六則沿流就下湍急難制恐水勢聚而為一不能各依所導必成六𣲖則是更增六處河口悠久難於隄防亦慮入滹沱漳河漸至二水淤塞益為民患又築隄七百里役夫二十一萬七千且久閲時日侵占民田頗為煩費其書并圖雖興行匪易而博洽可奬望送史館從之是月詔以磚壘皇城二月庚子環州言故靈州蕃部指揮使令狐謙男自靈州來歸上以謙往在靈州嘗與西戎力戰有功因署軍職今其子復能向化詔本州優給資糧遣令赴闕辛丑延州部署曺利用請建築子城上以勞民不許甲辰兩浙轉運使陳堯佐言部內諸州民以飲博頻犯法者有司籍其名每有爭訟不計曲直即重行決罰使民無由改過自今望令諸州察其易行自新者依理區分犯三次以上情重奏裁從之乙巳內殿崇班閣門祗候錢昭厚言河清卒有惰役者以鎌斧自斷足指利於徙鄰州牢城自今望決訖𨽻本軍從之初占城國貢獅子有二蠻人留養苑中上慮其懷土丙午命優給資糧遣還丁未羣牧司月賜錢五萬以給公費徙莫州順安軍騎捷兵各一指揮屯瀛州先是上封者言初募此軍皆被邊惡少請徙於髙陽關上不欲使之生疑因令髙陽關部署每季取兩指揮以習武藝又聞其疲於往復故有是命洛浦磨嵳洞蠻酋田仕瓊等貢溪布戊申江淮安撫使李迪等上江南諸州夏秋稅錢數詔經災沴處皆倚閣之餘則寬其限令定州出常平倉粟賤糶以惠民初命王旦撰祀汾陰壇頌王欽若撰朝覲壇頌陳堯叟撰親謁后土廟頌庚戌旦等以頌成並加特進邑封旦自集賢殿大學士改昭文館大學士上將如東封例並遷其官旦等固辭得免詔貢舉人但曾預南省試者公罪聽贖壬子詔奬知澧州劉仁霸仍留再任考滿吏民有請故也仁霸言近作歌十首述本州風俗以勸課農桑為意農民唱於田里傳入溪洞錦州刺史向光舜繼成十首以進上悅軍頭司散員皆準赦收敘命樞密參酌原罪分𨽻外州軍校有習知水事者並補緣河諸州自今經差使無過犯者具籍以聞當議遷署癸丑上謂宰臣曰聞貢院試諸科舉人皆解衣閲視慮其挾藏書册頗失取士之體宜令止之先是直史館劉鍇請挾書并同保人殿一舉是嵗諸科以挾書扶出者十八人并同保九十三人而十二人當奏名有司以聞上特令赴殿試乃詔禮部别加裁定罷同保殿舉之制詔開封府諸縣軍民相毆訟者令知縣都監同議斷以上封者言縣與本軍各庇所部多致枉抑故也京西諸州軍民飢處令轉運使諭告積蓄之家有能賑濟及以糧斛減半價出糶者並具名聞第行恩奬詔福州支諸軍俸自今悉用銅錢勿以鐡錢參之丙辰詔如聞夏州貢奉人在道市物頗或擾民宜令所在官司嚴示約束懷州流民有殍踣者令家給緡錢賑恤之詔京東西河北陜西江淮南民以柴薪渡河津者勿收算濱棣州民以物入城市者免稅一年詔三班院擇使臣為諸州都同巡檢先是多用補蔭未歷事者故申飭之詔開封府所遣胥役巡渠因緣擾人宜著為條制犯者懲之己未詔翰林學士已下準詔所舉京朝官一百七十一人宜具舉主及本官歷任簿進內三司借內藏庫錢三十萬貫從之壬戌令禮部貢院録諸州發解試題進內上將親試貢士慮其重復故也自是用為常例癸亥詔河北諸州軍麵洎他物當輸市征者特免一年甲子以侍御史趙禎為兵部員外郎益州路轉運使上諭禎曰蜀去朝廷逺民間事有可更置者悉條上之禎至部事無大小悉心究訪至有一日章數上者蒲江縣捕劫盜不得而官司反繫平民十數人楚掠強服之又合其辭若無疑者禎適行部意其有寃乃馳入縣獄因盡得其寃狀釋出之知河南府馮拯言聖恩優容養疾其留守及府司錢穀文籍望免簽署詔令止署帳檢因以冦準例諭之冦準例當考丙寅詔以河決濵棣州畎畝積水民不安其居委本路轉運使及長吏倍加安撫步軍都虞候英州防禦使袁貴被病詔遣太醫診視晨奏稍損及暮而卒上責醫工無狀並黜其官入內內侍省言前行費遜乞依陳瑩例轉職上曰陳瑩乃太宗尹京日宅庫前行故特補殿直入內內侍省止有前後行曹司名目自今不得别置勾押官餘罷之三月戊辰朔詔自今審刑院大理寺奏案情狀已正條目未僃不致妨閡者並即許斷若事節未僃即直指其事委元推官照會提點刑獄司得法寺疏駮便覆推宜詳酌可以結絶無别致追擾其元推官如事情不變未周僃者亦不須問罪務絶滋蔓以稱欽恤之意焉己巳三司言博州民段倫冒佃田土當收積嵗租絲望給限十年輸官詔從之仍蠲其半丁丑詔河朔諸州見欠去年秋租宜並倚閣民有抱稅逃者委長吏招誘復業加安撫之辛巳詔大理寺自今諸處奏案有失出入徒半年罪者其元勘録問檢斷官等不須問罪三司奏假內藏綾縠二萬四千匹從之癸未詔禮部奏名人隱匿服紀者並令自陳無得輒赴殿試三司言諸司送契丹使道被寒雪有亡失什物及驢畜斃者詔釋其罪蠲除之丙戌令樞密院取諸軍嘗歷戰陳箭鏃在體者籍數以聞先是諸軍取箭鏃者皆被賞馬知節言臣纍曾中鏃若傷骨即死不到骨者登時出之豈有纍年在肌膚者但近例出箭鏃即補小校此特貪其進改故為妄冒耳今若不欲窮詰望止賞以金帛不行遷轉則詐偽自息上曰此當檢視儻非妄冒亦當如前例賞之無使濫可也二年二月發諸路取箭鏃醫人赴闕己丑上御崇政殿親試禮部合格貢舉人殿之廊廡分列位次署其名氏仍揭於榜使無得遷易始摹印詩賦論題以賜官給紙起草得進士建安徐奭而下及第者百人同出身者二十六人諸科及第者三百二十四人同出身者五十二人先是考進士卷入第四等者止九十人令取五舉已上者再考乃及前數詔入第四等者以賦論為先詩次之又以高等十卷命輔臣重定始召放焉遣閣門祗候郭盛乘驛往棣州與轉運使前遣使臣同規畫修河事以完葺隄口奏報稽緩也庚寅上作諸王唱酬詩集序示宰相仍命以集赴祕閣癸巳詔天慶節禁刑七日天貺節一日著于令以堂後官太常博士劉明恕提點五房公事賜錢三十萬上召諭之曰五房事繁藉汝勤幹宜益盡心也甲午詔金明池瓊林苑先許士庶行樂或小有紛競不至毆傷者官司勿得擒捕丁酉上封者言進士蕭立之本名琉嘗因賭博抵杖刑今易名赴舉登第詔有司召立之詰問立之引伏命奪其敇贖銅四十斤遣之近制軍員有年深功高者即授御前忠佐軍頭給以廨宇而諸司使副多強占之上密訪聞得二十餘所乃詔王欽若諭軍頭司悉令移出給付據會要是三月事而實録不載今附見夏四月己亥詔遣官制鞫公事所差推典如經七次無法司駮難者遞遷一級辛丑以太常少卿知潭州劉師道為左司郎中樞密直學士仍知潭州師道敏於吏事所至有聲吏民畏愛長沙當湖嶺都會剖煩析滯案無留事故增秩再任焉詔承前遣使取內外軍中疲老者咸給俸糧之半以𨽻剩員今可簡閲使歸農業其合留者亦據逐營給役數外别為營舍處之內契丹渤海女真本外國人停之慮無所歸可如其舊仍令所至州郡並與部署鈐轄閲驗連署其狀具當去留之數及引視軍校之不任職者即時附驛以聞其當徙𨽻軍額即就配近便州郡緣邊者徙于內地並與本州官吏移牒轉送當停者給以公驗止許居本州嵗上其籍並給次月俸糧裝錢日食遣之所簡馬但筋齒弱老病不中療者咸件析以聞其在京殿前馬步軍司有升退即時具名籍申樞密院有未當者悉改正之當徙者給裝錢在道口糧勿復奏裁其外州軍士當降次軍分所𨽻州郡聽本人自擇其便壬寅慈州言民飢寧鄉縣生石脂如麵民采以為餅餌癸卯令禮部貢院取前後詔敇經久可行者編為條例甲辰修內司言皇城纍甓土摧役卒壓死者十二人詔以錢帛給其家仍劾主者罪自是以功役尤廣且屬炎暑遂罷之戊申命資政殿大學士刑部尚書向敏中守本官平章事李􅐉十朝經要有集賢院大學士六字敏中再掌留任以厚重鎮靜人情帖然上愈嘉之故復使相三司請民有販茶違法者許家人告論上曰此犯教義非朝廷所當言也不許本紀云以利而壞風俗非國體也不許今從實録交州李公藴遣使來貢其使者並優進秩從𨽻有道病死者所賜物附還其家詔江淮南諸州不刺面役人咸釋之從安撫使李迪等奏也雄州言邊民越入北界賭博者準法決訖徙𨽻向南軍籍從之雄霸州民因水壞田艱食者多捕漁自給官復收其市算詔特除之辛亥詔淮南堰埭運糧挽舟軍士四時給役頗為勞自今冬季並令休息壬子除通泰楚州鹽亭户積欠丁額鹽十四萬石杭州言去冬濤頭衝激江岸摧圯者三百餘丈自高品白崇慶醮祭浪勢遂息詔封濤神為英烈王又令本州以春秋二仲就廟建道場三晝夜及以素饌祠神癸丑令升州葺茅山宫觀甲寅涇原路鈐轄曹瑋言緣邊諸州蕃落指揮皆土人習知山川道路及諸蕃情狀每有擒逐常為先鋒望自今軍校止於本指揮敘進從之乙卯詔文武官被制劾者所司移報閣門禁止朝謁時常參官案問而上殿奏事閣門不之知也新及第進士彭乘與同年生登相國寺閣皆顧瞻鄉關有從官之樂乘獨悵然西望曰親老矣安能舍晨夕之奉而圖一身之榮乎翌日奏乞守選侍養上嘉其意命依例注官遣還乘華陽人也戊午遣中使分按諸班諸軍牧馬己未詔緣邉州軍以僃城火牛草賦于民者嚴禁止之辛酉詔饒信州買銅場壤稅錢海州𣙜貨務請茶開裹功錢並除之又饒州往例集民為甲令就官場買茶自今聽從便收市詔比來因公事勘斷人經年遇赦多過闕訴枉自今宜令制勘官每獄具則請官録問得手狀伏辨乃議條決罰如事有枉濫許詣録問官陳訴即選官覆按如勘官偏曲即劾罪同奏如録問官不為申舉許詣轉運提點刑獄司即無得詣闕赴訴壬戌趙德明請割綏州土田人口𨽻當道詔陜西轉運使取元進誓書與邊臣詳定報之初德明以是為請邊臣言當𨽻延州德明復遣使詣闕上訴故有是命德明又嘗言延州蕃落侵其地黑林平下詔按驗轉運使薛奎閲郡籍得德明常假道黑林平移文録示之德明遂伏黑林平事據薛奎傳附此奎為陜西轉運使乃此年二月也同州觀察使王嗣宗知鎮州與樞密直學士給事中邊肅為代二人素不相能肅嘗以公錢貿易規利又遣部吏強市民羊及買妾嗣宗諷通判東方慶等列狀訴之嗣宗以聞有司請逮繫上曰肅在近職朕不欲使之屬吏又念其頃守邢州有固禦之勞乃命樞密直學士劉綜任中正以嗣宗奏示之肅盡引伏乙丑肅坐奪三任授嶽州團練副使不署州事嗣宗嘗自言徙种放掘邠狐及案肅為去三害上謂王旦等曰去嵗令河中府陜州遣官召李瀆魏野皆以疾辭頗有言其踰垣穴壁以避搜訪者近因中使過彼各令存問瀆等復自陳靜退之意旦曰瀆野皆儒雅之士縱被疾不能從宦若國家以禮致聘安得奔遁也三司假內藏庫錢三十萬貫從之五月戊辰朔詔禮部權停今年貢舉上以江淮兩浙路稍旱即水田不登乃遣使就福建取占城稻三萬斛分給三路令擇民田之高仰者蒔之蓋旱稻也仍出種法付轉運使揭榜諭民其後又取種于玉宸殿上與近臣同觀作歌畢和又遣內侍持稻示百官于都堂壬申詔陜西民今年夏秋租稅如本屬州軍地逺者聽輸鄰郡癸酉上以宗室所和緑毛龜詩示宰臣等因曰諸王暇日莫若讀書綴文嘗有請讀史者朕諭以學古莫若讀正經皆聖人之言也乙亥詔河北河東就糧軍士自今互戍二邊甘州輝和爾汗王伊嚕格勒巴烏公主遣使來貢丙子詔自今兩省五品中書省四品諸司三品有同列出使並許郊餞仍給休暇一日餘官親屬僚友出行任以休務日餞送八作司請于京城東紐笮維舟以易汴橋詔開封府規度且言經久之利其獻計兵匠遷一資橋成未半嵗覆舟者數十命毁之仍劾獻計者罪造橋如舊制丁丑詔濵棣州民僦官舍及屋稅鹽錢並減其半俟水落仍舊詔河北轉運使自今斂市芻糧宜就瀕河州郡以便挽送戊寅制以修儀劉氏為德妃令有司擇日備禮册命庚辰上御崇政殿慮囚死罪情理可憫者悉貸之詔川陜諸州屯兵多用草茅覆屋連接官舍頗致延火宜令自今壞者漸易以瓦無得因緣擾民辛巳萬安州言黎洞蠻人互相殺害巡檢使發兵掩捕士有傷者上聞而切責之曰蠻人相攻但許邊吏和斷安可擅發兵甲或致擾動即令有司更選可任者代之癸未入內供奉官江德明言監修東嶽廟民間言山出銅礦採鍊得實望令興置冶務詔不許丙戌令江淮南發運司留上供米二百萬斛以僃賑糶丁亥賜棣州秋租十之三令江淮南丁身鹽米錢自今並免折科前已免丁身錢今又免折科不知何也當考戊子賜近臣金華殿所種麥己丑詔諸路部署司科斷軍人大辟者承前皆不上奏止録案申刑部自今具犯名上樞密院覆奏以聞壬辰祠部員外郎直集賢院錢易等坐所解國子監舉人有十不責監諸州商稅甲午詔自今文臣換武職者並詢其武藝令河北諸州簡本城兵士部送京師分補禁軍之闕知袁州何蒙上言本州二稅請以金折納上曰若是則盡廢耕農矣不許
