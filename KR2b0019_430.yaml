body:
  text: 續資治通鑑長編卷四百二十六宋李燾撰哲宗元祐四年五月庚午朔中書舎人彭汝礪次當轉對上言曰臣伏念治亂之機在於好惡好惡之端在於謹其始其始正無所之而不為正其始不正雖有智力不能善其後是以人主必務學學莫大乎近正人昔者成王始謀於廟其言憂深思逺慄慄悼懼若隕淵墜谷所以求助甚至而羣臣進戒反復曲折獨以學問為先急其君臣可謂知本其詩曰訪予落止率時昭考於乎悠哉朕未有艾將予就之繼猶判渙惟予小子未堪家多難紹庭上下陟降厥家休矣皇考以保明其身又曰日就月將學有緝熈于光明佛時仔肩示我顯德行當時外則周公召公畢公史佚相之内則伯禽叔虞與游焉夫左右前後無非正人也雖欲為不正亦無為之者矣成王㓜則能治身能事親長則能治其天下國家制禮作樂刑措不用本不在兹乎陛下盛德至行得於天甚厚見於政事甚善非臣下所能窺度髙下淺深小大近侍進讀儒臣勸講其見聞可謂甚愽耆俊在位才能在職其輔翼可謂甚衆然學者非聽誦之而已聞乎其言得乎其中將見乎其外今臣下論說使陛下誠能不疑誠能有得則善若猶未也是幾為文具而已夫德義之士孰不竭忠畢誠以致其君於道隔於内外限於上下有不得而見雖見有不得而乆雖乆有不得而言雖言有不得而盡輔弼之人少順從之人衆善或莫能告過或莫能知臣甚懼所以輔成聖徳者未至而神明之或遺也夫以一人治天下甚難以天下而望一人甚重凡事之是非可否轉徙於無窮人之真偽邪正藏於不可知而侈麗之玩好方雜遝而陳於前便嬖之使令方並進而隨其後議論辯說方日蕩其心術聲音顔色方日昡其視聽一好一惡治亂自此分此不可不察也記曰三王四代惟其師詩序曰自天子至于庶人未有不湏友以成王者師友不可無乆矣何獨於今而疑之然則如之何曰尊有道者以時使見游燕或俱言動使相接焉簡上下之分勢盡君臣之底裏問以所疑而無愧質之所欲而無間有善焉使必告告焉而必從有過焉使必諫諫焉而必改如是其庶幾乎傳曰正君而國定此之謂也黄貼子稱臣竊聞皇帝在宫中無他惟好留心典籍比御邇英數垂清問此太皇太后陛下慈訓切至皇帝陛下明德濬發天下聞之抃蹈相慶然人主之學實不止此臣不勝區區願因左右供奉之官分正輔導規諫之任以明是非以捄過失庶幾裨益聖智萬一以惠天下幸甚又言臣竊以古之王者能治其國家非獨修諸已也内亦有助焉后妃夫人能輔佐君子非獨天性然也教亦有素焉后妃人君之配也天下國家安危治亂是繫宗廟社稷禍福是繫子孫之賢不肖是繫豈特其身哉此可謂甚重以天下之事望乎未笄之女子此可謂甚難然則擇之可以不謹乎擇之必知所以教之自寒而暑非一日之積也教之成功亦必有漸矣禮女子十年不出姆教婉娩聽從執麻枲治絲繭織紝組紃學女事以供衣服親祭祀納酒漿以籩豆菹醢禮相助奠詩序曰后妃在父母家則志在於女功之事恭儉節用服澣濯之衣尊敬師傅則可以歸安父母化天下以婦道古之人其教之也素故其成之也至詩曰誰其尸之有齊季女祭祀婦事齊母道自其㓜時婦事母道茍非教之有素曷能與於此周南之治盛矣其德為闗雎其應為麟之趾溯原反本固有所在臣以為皇帝陛下春秋方富冝蚤擇淑德之女以定后妃之儀以正天下之本丕顯休命立其師傅設其保姆擇其姪娣嚴其宫室車馬為環佩之節陳國史之戒非正之玩好不得至其前非正之聲音顔色不得亂其視聽及其歸也凡所欲皆其所嘗聞之者也凡所嘗戒焉者也此可謂甚善以陛下之仁孝恭敬得賢妃之助其治天下國家何有詩曰天監在下有命旣集天立厥配受命旣固周旣受命矣至配立而後言固則人主所以待内助如此凡臣言其事若緩察其微則甚大惟太皇太后陛下留意毋忽易曰正家而天下定此之謂也辛未著作郎范祖禹為右諫議大夫依前兼侍講充實録院修撰賜三品服祖禹即上言臣䝉陛下擢授諫職受命以來夙夜不遑寧處深思天下之事自非逺者大者未之敢先恭惟祖宗受天明命百三十年自三代以來未有承平如此之乆累聖基業付畀子孫成之至難壊之至易四海之廣萬民之衆失之至易安之至難明王欲治天下先正其本在於人君一心而已天下治亂出於君心君心一正則萬無不正臣侍經筵每及人君正心修身之要君子小人繫於治亂之際未嘗不反復開陳伏計陛下聞之已熟今有言責不敢忘此伏望太皇太后日以祖宗之艱難治天下之勤勞萬民之疾苦羣臣之邪正政事之得失說諭皇帝存之於心若皇帝陛下聖心暁然明於邪正是非他日衆説不能惑小人不能進則萬事定而治化綦隆矣詔賜蔡挺神道碑以顯忠為額詔諸州旬具有無雨雪申户部開坐縣分所降尺寸及月日時本部逐旬繳進奏安州言蔡確所作詩初題於牌及移鄧州行一驛復使人取牌去盡洗其詩以牌還付公使庫是日太皇太后諭執政確黨多在朝范純仁進曰確無黨吕大防曰確誠有黨在朝純仁所言非是劉摯亦助大防言確誠有黨在朝先是文彦博同三省入對太皇太后曰蔡確事都無人管使司馬光在必不至此彦博以下皆慙懼不知所對是日執政俱不敢進呈文字大防純仁既退各上䟽並留中此據王巖叟所記増修曰王鞏隨手雜録云初處厚繳詩至京莘老嘗問鞏如何施行余曰此難行前日諸公自罪李定以詩罪人矣莘老曰豈可已乎余曰一則收煞一則創興確所知堯夫亦以見問余語如前堯夫曰吾弟更語莘老莘老曰次第須謫重則分司輕則小州余曰必若謫之當與處厚並命此風不可長也後一日莘老召余入宻室見其顔色慘沮曰九重之内安知有英州新州耶此必有博士又曰今日進呈此老却不入來指文潞公也余意以莘老賣潞公遂往見之潞公問余曰近事如何余答曰蔡確外議以謂過當潞公聲色皆厲曰見無禮於其君者如鷹鸇之逐鳥雀又曰曾見司馬康否余曰見之潞公曰前日被㫖召梁燾司馬康執政面問邢恕語言梁燾言與司馬康同坐聞恕言蔡確社稷臣事康乃曰不聴得時第三杯矣康是時饑貪食肚美不聽得潞公曰康如此不肖耶余曰司馬康温公子也温公道徳人也康不證人於罪真肖矣潞公索湯余引去始知莘老之言不妄也據鞏所録則新州之命端出彦博也與王巖叟所記頗不同當考司馬康不肯證邢恕語言或附是月末恕責官時癸酉龍圖閣直學士御史中丞李常為兵部尚書龍圖閣待制吏部侍郎傅堯俞為御史中丞朝奉大夫侍御史盛陶為太常少卿朝散郎太常少卿朱光庭為侍御史中書舎人曽肇為給事中常與陶皆坐不言蔡確也右司諫呉安詩論肇教彭汝礪救確而不自言其姦乃過於汝礪肇㝷亦坐左遷此據王巖叟所記増入肇以中書舎人除寳文閣待制知潁州在五月十八日起居郎鄭雍與起居舍人王巖叟並召試制誥巖叟以先娶門下侍郎孫固之女引王旦避趙昌言溤京避冨弼故事力辭不赴從之旣而西掖闕貟詔巖叟權行誥命辭免在十六日今并書權行誥命據巖叟墓誌方責蔡確時曽肇已遷彭汝礪不草詞巖叟實奉行鄭雍此月六日已除中書舎人不知何故不以付雍也當考據巖叟所記後責乃雍在假詔自今侍讀以三人為額三年八月二十七日庚子當考詔三省遇内降及生事文字如合係三省樞宻院同聚或三省聚議文字令逐省呈覆本省官下筆赴都堂商議候得筆將上或進入内事體大及應急速即尚書省出劄子逐處仍送本曹照㑹依舊條詔今年明堂大禮太廟更不排頓又詔再賜度牒一百付永興軍修鳯翔府上清宫樞宻院言河北陜西河東路兵馬輪戍縁邊舊例並一年交替内河東路自元豐八年改作二年欲請仍舊從之知熈州劉舜卿言廓州主羅遵遣埒克章來欲焚拆河橋歸漢臣以朝廷釋鄂特凌古罪通及二年諭令依舊管勾部族若鄂特凌古向來不守要約方可圖之羅遵與鄂特凌古釁隙已成疑懼禍及必再遣埒克章來别具利害奏聞次樞宻院言舜卿措置雖極允當然羌性忿暴若彼已露嫌隙萬一復如烏戩新雅克棄地領衆來降受之則鄂特凌古今已通貢我有納叛之名不受則河南諸羌怨漢拒已二者徒開邊隙慮至時本路倉卒奏禀不及詔劉舜卿依所奏外如他日羅遵果欲避禍投漢即差人撫諭為鄂特凌古已通貢難以收留當諭鄂特凌古不得讎害如此即鄂特凌古無由歸曲於漢又不致峻阻河南諸羌歸附之情熊克九朝通畧云羅遵者鄂特凌古屬部也乙亥起居郎祕閣校理鄭雍為中書舎人朝散郎崇政殿說書顔復為起居舎人㝷改起居郎十九日改起居郎丁丑吏部言應在任官差出除應副軍期推鞫録問驗屍并考試部夫權繁難及課利三萬緡以上場務便糴定奪公事外餘事差出毎考通計過百日其日月並不理為任者即自陳有礙而不為改者杖一百其日月與收理從之政目八日趙挺之與外任實録挺之與盛陶等三人同出在十二日政目八日趙挺之並書不知何故特於八日先書挺之當考按此註與本文不合疑有脫誤戊寅尚書省言六曹寺監吏額并闗防約束事件吏籍案所掌無選限吏人及内外役人廢置増減勘㑹當出職等事止隨處行遣應出職而合入流若補授軍大將者並直逹吏部都官其吏籍案仍罷配𨽻案所掌配籍併歸刑部舉叙案其配𨽻案仍罷從之觀文殿學士知鄧州蔡確言臣僚上言臣安州作詩渉譏訕詔臣具因依聞奏一臣昨來謫降安州包蓄怨心公肆譏謗形於篇什此是臣僚横加誣罔欲以激怒朝廷而實不知當時行遣本末妄料臣為怨望也徃年弟碩坐事由臣愚昧失於教察所致㝷上表待罪乞行誅責上荷聖恩寛貸委曲保全止落職移知安州天地之德至深至厚臣日夜感謝未知何以圖報何縁却有怨望且喜愠不以義者小人之事也臣雖愚陋亦粗聞事君行已之大方况又當感而怨豈人情哉臣前年夏中在安州其所居西北隅有一舊亭名為車盖下瞰溳溪對白兆山公事罷後休息其上耳目所接偶有小詩數首並無一句一字輙及時事亦無遷謫不足之意其辭淺近讀便可曉不謂臣僚却於詩外多方箋釋横見誣罔謂有微意如此則是凡人開口落筆雖不及某事而皆可以某事罪之曰有微意也一臣以溳溪舊有郝處俊釣臺因嘆其忠直見於詩句臣以溳溪譏謗君親此一節中傷臣最為深切須至縷縷奏陳處俊唐之直臣父子夫婦之間人所難言而上元中髙宗令其子周王等分朋角勝為樂及欲傳位於武后皆為處俊論議所回故臣詩因嘆其上元間有敢言之直氣今臣僚乃摘取處俊諫傳位皇后事言臣意在譏謗其誣罔可見一也且又其事絶不相類伏惟太皇太后神宗維子皇帝維孫夫以祖母之崇聖德之盛故先帝遺詔以社稷為託保祐嗣君乂安宇内盖先帝託子於聖母同攬萬幾即非唐髙宗欲傳位之比也臣僚輙敢妄引此事牽合以資其説其誣罔可見二也元豐八年春先帝服藥臣與諸執政在禁中御床下受詔請太皇太后權同處分軍國事先帝登遐之日於福寧殿奉遺詔太皇太后依章獻明肅皇太后故事同行聼斷退而就資善堂參議垂簾儀制奏稟施行則是太皇太后聽政諸事臣皆預焉豈有身預其事而自為譏謗其誣罔可見三也又將臣詩句中一思字却引衛風緑衣詩我思古人刺州吁之母上僣事以為說且經史毛詩思字至多其所言思古人思君子思賢之類有不勝其多乃獨引此一篇盖其意在中傷臣而不自覺其言之乖悖也伏惟太皇太后以帝之祖母垂簾聽政而輙無故引唐髙宗欲遜位與皇后及州吁之母以妾僣夫人事迹展轉附合以為説上瀆聖聽莫甚於此以此論之孰為不恭孰為非所宜言也一臣臨溳溪觀水之漲落偶然成句臣僚言臣是譏謗君親其誣罔亦不難曉臣此數詩並是閑詠目前事迹景物如喧豗六月浩無津行見沙洲束兩濵是言前日盛夏山中並水集而溪大今日水退而溪小乃是一溪之上所見其言水之漲落如歐陽修黄河詩云舞波淵旋沒沙渚聚沫倐忽為平地之類甚多也下句用東海揚塵只是舉以相比莊子以河伯對海若盖論其大小之分臣時以溳溪對滄海是道其盈縮之迹即於朝廷事有何干渉何縁却為譏謗又指臣使東海揚塵故事而妄有粧㸃按神仙傳言蓬莱水淺及海中揚塵此是神仙麻姑王方平之語也盖神仙夀命與天地無窮乃能見海之盈縮故李賀詩中亦曽用此故事有天上謡云海塵新生石山下皆述天人夀命無窮能見海生塵之意臣僚却云人夀幾何尤非佳語據神仙傳中並無此説顯是妄有增加輙作妖言欺罔聖聽一臣臨溳溪漁歌徃來景物可樂欣然獨笑偶在詩句中臣僚却言不知笑朝廷何事昔漢武帝時班下詔令有微反脣之罪自此立腹誹之禁謂其見詔令而然爾今臣上荷聖澤得郡安閑前後溪山旁無賔客詠笑自適又非見諸詔令之比也而臣僚湏謂之有微意欲指以為罪則是欲朝廷法禁更急於漢武之時伏惟二聖臨御方以仁愛忠厚為本此人亦非不知盖其心但務中傷臣而不復問朝廷政體也一臣以安州地熱多獨在溪亭避暑溪上鷗鷺羣飛蠅蝱不到昔人云心動於内海鷗舞而不下又昔人有褊急者蠅集筆端怒而拔劒逐之臣方泊然閑適自以謂與有機心怒氣者不同故用此二事故爾即非譏刺執政一臣在溪上所見草木禽魚各遂其性偶入詩句如權德輿詩云危棟燕雛喧李白詩云提携四黄口韓愈詩云唯有魚兒作隊行如此句甚多即非譏刺昨來言事官及擢用臣僚如臣螻螘之微固不足自愛以避飛禍誠使䜛説殄行之風不作於堯舜之世則非惟孤臣之幸實天下之幸也小貼子言古今集中因至昔人所止之地而嘆思其賢者甚多如李白經下邳圯橋懐張子房詩歎息此人去之句又云滄海得壯士椎秦愽浪沙李白之意亦豈為明皇時有此等事而譏之邪况臣詩但歎郝處俊忠直而不曾指事今臣僚乃自摘取一事而云臣微意有所譏訕而事又不類誣罔甚矣又言上元間處俊諫此二事竊慮臣僚曲意證之如髙固祖侃擒車鼻可汗實係永徽元年新舊書髙固傳只永徽中也然則臣云上元間者上元年中所諫事皆是而臣僚乃畧去諫周王分朋事而獨指陳傳位皇后事其說窮則必巧為引援臣故不避煩細奏陳又言竊恐臣僚更指處俊曾云魏文著令不許皇后臨朝等語於臣詩意外增飾浮說妄稱臣意有所譏訕如䝉考臣元豐八年身預國事本末及觀臣今來逐項辨析因依其誣罔判然甚明又言處俊凡諫三事係干皇后皇子父子夫婦所難言如咸亨中諫服外國僧丹藥一事即非難言者也又言既言公肆譏訕形於篇什即合是詩中公然指事譏謗今詩中語意全無干渉並無可捃摭之實却云皆有微意欲令讀者不知其為欺誕不攻自破又言古今詩句用海變桑田事者稍多只近年蘇軾作坤成節大宴詩語亦云欲採蟠桃歸獻壽蓬莱清淺半桑田盖祝壽之辭猶用之何得謂之用此故事尤非佳句左傳襄公八年有俟河之清人壽幾何之語即與神仙傳所載麻姑王方平語意全别足見粧㸃之甚先是安燾嘗語同列曰海變桑田事蘇軾亦嘗用作聖節樂語於是確果以軾為言衆皆疑燾實宻風之也安燾宻風蔡確此據王巖叟西省記小貼子云云舊録以確分析繫十二日辛巳案是日責確其分析不必以是日到也王鞏隨手雜録云先是促蔡相謫命執政議太常少卿分司南京議未决㑹確分析至盛言有策立功諫官繼論之益苦按舊録載確分析初不及策立事不知鞏何據也當考右正言劉安世言臣近四具状論列蔡確指斥乘輿情理切害乞付有司按治其罪陛下聖徳寛厚體貎大臣不欲輕信人言遽行竄殛遂降睿㫖令確開具因依及下安州取索元本日近竊聞確及安州皆有回奏訕上之迹盡如臣章雖文過飾非妄意幸免而情状明著可以無疑臣聞確昨移南陽既離安陸復遣親吏取回詩牌洗滌刮劘靡有存者使確之詩意别無詆斥雖刻之金石固自可信惟其内懐䬬望志在謗訕有歉於心懼或流播故令毁撤欲以滅口推此言之則確之罪惡何可掩也伏望陛下特詢公議母恤浮言明正典刑以謝天地其御史䑓官吏並不紏劾及伺候朝廷已行遣後雖有言者亦持兩端并自餘臣僚進説營救皆確朋黨不顧君親茍尚兼容必為後患伏乞聲言其罪重行貶黜庻分邪正以肅中外左諫議大夫梁燾右司諫吴安詩右正言劉安世又言臣等近以蔡確怨望作詩無人臣敬順之禮累曽奏論乞正典刑朝廷指揮下確開具因依仍令安州知州取索確詩元本皆已奏到確之開具本無所用徒為遷延行遣令確知其事因從容造説交通求救詞皆虗妄必不可信今安州根究得實確詩元書在粉板後來削去墨迹其板見在書之其状已著削去其罪轉明更使確巧詐辨給此亦不能文也詩板是明白已驗之跡便可為據開具乃委曲茍免之詞不足為憑罪在不赦合寘誅竄恭以太皇太后陛下以先帝遺詔用故事請權同聼政當日確偹位次相親見本末豈不知此事不是太皇太后本意盖為皇帝年在沖㓜以保䕶聖躬為功事不得已乃從權宜竊以前日遭值先帝大變之際設不依本朝典禮上尊兩宫則宗社大計何如哉觀確之意以為不然盖竊幸皇帝富於春秋欲以大臣專權自作威福姦心深不可測此不可不誅也大臣之議當歸美報上以福禄夀考稱頌其君確不能庻幾於此乃引竭海變田之事肆為謗讟宻懐大惡之志發為不祥之語此不可不誅也刑賞者人主之權也祖宗所以行威福而公天下服人心傳之子孫為萬世法也兩宫亦不得而私之如確之罪天下所共怒天下所共棄取天下共怒共棄而誅竄在皇帝陛下與大臣也陛下崇養聖徳未專明斷所與議者在大臣如少寛確則天下疑而不服傷陛下之聖孝矣大臣者敢為開陳末減則是朋姦養交靣謾不忠視確之罪無所重輕必不見容於天下矣臣等願盡行公議無屈祖宗之法以失威柄威柄一失則姦邪彊薦無所忌憚後時有不可制之悔於此不得不防微杜漸也伏望聖慈以其事下有司議正其罪為今日誡為後日訓梁燾集此係第七章安世集係第六章又言臣等早來延和殿進對伏䝉宣諭令具行遣比例條列宻奏臣等略具合用條法又責降大臣故事如左一凖名例律十惡六曰大不恭注為指斥乘輿情理切害者凖職制律指斥乘輿情理切害者斬凖名例律議請减贖章犯十惡者不用此律一宰相丁謂貶崖州司户參軍一前樞宻副使孫沔貶節度副使宿州安置一前參知政事吕惠卿貶節度副使建州安置臣等竊謂三人之間丁謂之責最重然其犯亦非蔡確之比伏乞聖明更賜參酌安世云與梁燾同奏燾集乃無此庚辰中書舍人彭汝礪言臣聞人臣之事君猶子之事父母父母善則成之或未則諫焉諫之未聼雖被叱怒鞭扑不辭亦不止要之成父母之善而已盖不如是不得名為人自吳處厚奏至有蔡確開具指揮御史丞雜皆罷無大無小聚議洶湧如所傳聞至可駭慄恭惟太皇太后陛下髙明博大兼並天地喜怒予奪應天心而順人意此豈有不當然今日之患順從之人衆違拂之人少或恐将迎遂使陛下有過舉其令既出雖悔不逮臣言一出口攻之者已至臣不敢復自保日惟誅殛之俟而已然臣所言反之於心考之先王稽之天地質之鬼神實無所疑惑臣雖可廢臣言不可奪蔡確言所非宜固自有罪大臣廢置事所繫重詩曰敬之敬之天維顯思命不易哉無曰髙高在上陟降厥士日監在兹此言天命可畏不可慢事至微矣其陟其降天靡有不察况其大者乎惟陛下寛雷霆之怒宏天地之量垂日月之明察螻蟻犬馬之誠留意芻蕘之言使或有補臣誅死無悔所有蔡確開具事目伏乞聖慈詳察指揮并檢㑹前奏一處省覽臣無任戰慄待罪之至黄貼子稱蔡確事臣雖緘黙陛下未必即以臣為罪衆人未必即以臣為非今諫臣交攻危機已見臣能中止尚可茍安然臣誤䝉大恩擢之近侍典掌命令與聞政事有所懐不言有所畏不言有所言不盡是即為欺君之臣陛下亦無所用之又臣獨當制命出有言已自不及先事論列當或有補以要言之事本告訐聽受不足以為明容之足以増徳美迹渉疑似嚴誅不足以為威寛之足以厚風俗臣言非造次粗有本末惟陛下置之御几以從容留神加察焉臣聞蔡確事獨諫官攻之急或不同即指為黨此宜在所察人臣視君猶天地父母萬物無所逃於覆載人子何適而非其親今懐貳於陛下而交姦邪已廢之蔡確取禍於目前而規㝠漠無形之福雖甚愚人有不為者凡人既無過惡可以蹤跡則必目為朋黨盖不如是則不足啓人主之疑心善人之類必不能盡去此可謂已甚臣恭惟皇帝陛下春秋方富聰明方開嗜好未定一言一動惟陛下是憲陛下所好後必有甚焉今外則告訐之謀勝内則朋黨之言入中則疑怒之心兆其原既開恐不可制考終稽弊可為悼慄惟陛下謹之重之臣聞聼言之道必察人情之好惡確昔秉政其姦惡之毒及人者衆自吴處厚奏至皆舞手蹈足相慶不食其肉不足以饜不復以人主好惡朝廷紀綱天下風俗國家人才為念故紛紛至此夫天無心而萬物覆地無心而萬物載聖人無心而是非定夫此亦一是非也彼亦一是非也孰為真是非哉陛下以道察之而已或以確姦不去則将為天下害是不然人臣能引其君以當道使人主好惡明朝廷紀綱正天下風俗厚正人端士常在上側確雖存亦自廢詩曰雨雪瀌瀌見晛曰消書曰何憂乎驩兠是也使好惡非其道紀綱失其正風俗相與為薄惡君子棄而小人進確雖去天下之欲為確者不少矣臣聞之盛徳毀辱不至伯夷人必不以為不亷雖曰不亷不信也曽子人必不以為不孝雖曰不孝不信也陛下母道備君徳至自三代以還盖未有也如小人言曽何傷於天地哉惟陛下容而置之今左右之臣孰不以告訐為非朋黨為憂雖言者亦自不能不疑但妄意陛下過怒雖知之而不敢言雖言之而不敢盡惟臣愚實有見陛下髙明博大卓然出於萬物之上勉而行之其至堯舜不疑不敢不言亦不敢不盡孟子曰我非堯舜之道不敢陳於王前故齊人莫如我敬王也臣愚竊願學焉書曰為山九仞功虧一簣陛下自昔蒞政於今五年無過言無過行惟不倦以終之而已右正言劉安世言臣昨日延和殿進對嘗論彭汝礪營救蔡確事状䝉宣諭以謂卿等錯㑹汝礪所言與卿等一般者臣雖已具汝礪朋附之實面奏其略尚恐陛下未知羣邪交結之詳緣此事正繫是非邪正之機不可不察須至辨析上煩聖聴臣伏見彭汝礪與曽肇同為中書舍人公然結黨范純仁既是本省官長日得親見朝廷宻命無不關預而又汝礪親弟汝霖娶李常之姪女廟堂之論悉使傳報故御史臺表裏通同殊無公道窺視執政之意旋立議論純仁所欲雖違法害義無敢紏駮稍異己者則必承望風㫖連章䋲治皆有實跡未敢盡舉姑以蔡確之事試為陛下陳之向者吴處厚繳進確詩其徒大懼巧言救觧情態萬状純仁備位宰相見確無禮於君親不以疾惡為心乃諭汝礪及曽肇以謂告訐之風漸不可長汝礪等既聞其語即時傳報李常是以御史䑓依違觀望不復按劾及見朝廷已有行遣方始備禮一言而汝礪輙奮彊狠妄進邪説雖其大概不敢主確而深意全罪處厚臣竊謂以確詩為可罪耶則自有䑓諫官論列若以確詩為不足治耶則臣等豈敢違犯公議輙行誣奏進退之間皆不預中書舍人之事今汝礪出位進疏惟以長告訐為說至於睥睨兩宫悖逆不道則欲置而不問是汝礪貪與蔡確為地而不顧君親之大倫僣亂之基漸此乃朋姦罔上徇私立黨而陛下謂之與臣言一般竊恐聖心未之察也臣聞汝礪與曽肇同受純仁之指而肇隂險姦賊不肯首發故使汝礪先次進言繼聞臣等極力攻擊陛下已賜聼納遂不復言然其交結之迹搢紳無不知者獨其黨人為之諱耳願陛下以臣之論詳覽汝礪之疏則姦人之情狀必不能逃於聖明之鑒臣伺候斷遣蔡確了日當節次具状劾奏姦黨乞行竄逐惟陛下乘不可失之機特行英斷使邪正分别朝廷清明臣雖隕首亦無所恨安世集此係第八章
