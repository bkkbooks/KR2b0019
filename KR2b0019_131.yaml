body:
  text: 續資治通鑑長編巻一百二十七宋李燾撰仁宗康定元年夏四月丙戌詔陜西經略司省縁邊堡寨丁亥太常博士梁適為右正言諫院供職適初為審刑詳議官梓州妖人白彦歡者依鬼神以詛殺人獄具以不傷讞適曰殺人以刄或可拒而詛不可拒是甚於刄也卒以死論有鳥似鶴集端門及廷中或以為瑞適言野鳥來處宫廷此何瑞也甞與知院事燕肅同上殿奏使臣何次公案上曰次公似是漢時人字肅曰臣年老不能記梁適必知之上顧問適對曰盖寛饒黄霸皆字次公上恱因留肅問適家世擢提㸃京東刑獄既對謂宰相曰梁適可留候諫官有闕命之適因進居安謹治箴改開封府推官不半嵗卒踐諫職太子中允直集賢院兼知諫院富弼為鹽鐡判官冨弼徙為鹽鐡判官適知諌院弼所以徙必有故當考大理寺丞祕閣校理石延年徃河東路同計置催促糧草明道中延年甞建言天下不識戰三十餘年請選将練兵為二邊之備不報及西邊數警始召見命副吳遵路使河東時方用延年之說籍鄉丁為兵故也延年又言昔漢用西域之兵破盪諸戎得以外國攻外國之術去年授嘉勒斯賚節制命助討元昊宜募願使其國者䕶發其兵如有功則加以王爵置𣙜場許市易羊馬以通貨財又回鶻在嘉勒斯賚西唐用其兵定吐蕃亦可兼誘之使掎角興師以分賊勢戊子詔審官三班院吏部流内銓募願使嘉勒斯賚者以名聞始用延年之議也己丑龍圖閣直學士右諫議大夫知并州任中師為樞宻直學士知益州先是轉運使韓瀆急於籠利自薪芻蔬菓之屬皆有算及中師至悉奏除之詔陜西安撫部署鈐轄轉運使提㸃刑獄知州通判各察訪所部吏民習知邊事及有武幹者令安撫或轉運司召問其能否以聞又詔江淮南州軍造紙甲三萬給陜西防城弓手改隴西鎮為定邊寨庚寅以鹽鐡副使吏部員外郎蔣堂為天章閣待制淮南江浙荆湖制置發運使先是發運使上計造大舟數十載江湖物入遺京師權貴堂曰吾豈為此嵗入自可附驛奏也前後五年未甞一至京師詔河東所募强壮有習弩者聽自置其第四等以下戸官為給之右騏驥使涇原鈐轄兼知渭州張亢領忠州刺史為鄜延鈐轄兼知鄜州壬辰降知同州鄜州觀察使魏昭昞為郢州防禦使陜州部署知鄜州西上閤門使恩州刺史王德基為盧州都監並坐領兵援延州後至也正月二十七日王徳基以西上閤門使除鄜延鈐轄知鄜州二月十一日王從德又自并代鈐轄二月二十三日張宗誨乃以知鄜州改永興軍鈐轄不知德基知鄜州即代宗誨否也又不知王從德亦為鄜延鈐轄何故當是鄜延鈐轄不止一人或兼知鄜州或不兼知也觀張亢疏云諸路部署鈐轄都監各不過三兩員餘官雖髙止為一州部署鈐轄不預本路事即鄜延路鈐轄不止一人可知也癸巳秦鳯部署司言瑪克占覺請遣使䕶討西賊從之詔諸軍戍邊者令入内内侍省月遣内臣存問其家有疾病者官為致醫藥死而無親屬者官為斂葬之録司天監主簿蒋繼宗二子繼宗死於軍中故也甲午度支副使刑部郎中李昭述使陜西提舉計置糧草并籍强壯以備邊永興軍進士楊蓍盧覬授渭州坊州軍事推官蓍覬皆上書陳方略召試舍人院而命之初契丹幽其母法天后于慶州既改葬齊天后或勸契丹主復迎之且以覬中國嵗聘之利契丹主聽講報恩經感寤即遣使迎法天后館置中京門外筮日以見母子如初加號法天應運仁德章聖皇太后然出入舍止常相距十數里隂為之備乙未契丹母遣始平軍節度使耶律元方州觀察使王惟吉契丹主遣左千牛衛上將軍蕭迪右諫議大夫知制誥劉三嘏來賀乾元節丙申秦鳯副都部署同州觀察使知秦州曹琮同管勾涇原兵馬事尋加㝎國軍留後五月己夘又書恐實録誤今姑兩存之己亥命知樞宻院事宋綬同提舉編修國朝㑹要陜西安撫使韓琦等言慶鄜涇三州調民修城有妨農種復少兵士以代夫役今請聼富民自雇人夫修築三萬工與借職齋郎五萬工與試監簿或同學究出身七萬工與簿尉八萬工與奉職從之㑹要康定元年四月十五日事十五日己亥庚子重修祖宗玉牒成既而修玉牒所言請自今每嵗一貼修十嵗一編録仍以其副留中奏可甲辰六宅使涇原秦鳯路安撫都監張昪復為度支員外郎知絳州昪以母老求復文資而許之乙巳録西頭供奉官閤門祗候孟方子昭明為右班殿直昭立為三班奉職昭齊為借職以方戰没於延州特卹之戊申日贈方單州團練使詔河北都轉運使姚仲孫河北縁邊安撫使髙志寜宻下諸州軍添補强壮初知制誥王拱辰使契丹還言見河北父老皆云契丹不畏官軍而畏土丁盖天資勇悍鄉關之地人自為戰不費糧廪坐得勁兵宜速加招募而訓練之故降是詔文彦博等劾河中府獄既得實龐籍言黄德和退怯當誅劉平等力戰而没子孫宜加賞恤韓琦亦言平以疲兵數千敵賊十餘萬衆晝夜力戰為德和所累既被執猶罵賊不已忠勇不怯於古人今坐誣言所惑憫忠恤孤之典未下邊臣豈不解體乎丙午腰斬東染院副使鄜延路都監黄德和于河中府仍梟首延州城下王信者亦杖殺之坐誣告其主也丁未贈歩軍副都指揮使静江軍留後劉平為忠武節度使兼侍中殿前都虞候邕州觀察使石元孫為中正軍節度使兼太傅仍賜平信陵坊第封其妻趙氏為南陽郡太夫人子孫及諸弟皆優遷未官者録之凡十五人録元孫之子孫亦七人戊申贈延州金明縣都監西頭供奉官閤門祗候張異為濰州團練使慶州東路都廵檢西頭供奉官閤門祗候万俟政贈濮州團練使延州都監西頭供奉官閤門祗候孟方贈單州團練使鄜延路指使三班奉職髙守忠張逹並贈太子右司禦率府率自万俟政以下並據㑹要附見韓𤦺䟽可考涇原副部署龍神衛四廂都指揮使眉州防禦使葛懐敏為本路副都部署出左藏内藏庫緡錢各十萬下陜西給軍須辛亥降鄜延鈐轄左騏驥使榮州防禦使盧守懃為湖北都監安撫都監左侍禁閤門祗候李康伯為均州都監通判延州秘書丞計用章除名配雷州本城守懃坐昊賊圍城對范雍撫膺下淚并易蕃官馬用章坐誣告守懃託病不出兵又甞勸范雍棄城保鄜州康伯坐雍欲遣使說賊而辭不行也然議者以守懃之責猶薄云朔厯載此事詳略差與實録及本傳異又云守懃多占軍士與實録及本傳不同今從實録及本傳發陜西近裏諸州役兵築延州金明栲栳寨始議修復帥臣擁兵不即進轉運使明鎬止以百餘騎自從分督將士一月而城之以邈川首領嘉勒斯賚子董戩為㑹州刺史董戩方九嵗其父為請之喬氏所生也喬氏有色居哩沁城所部可六七萬人號令明人憚服之方董戩㓜時擇蕃酋子年與董戩相若者與董戩遊衣服飲食如一以此能附其衆壬子揀諸路牢城及强盜惡賊配軍年未四十壯健者𨽻禁軍范仲淹未至永興癸丑改為陜西都轉運使髙若訥為天章閣待制知永興軍諫官梁適言仲淹前責饒州若訥實為諫官甞詆仲淹謀事踈濶今俾共事理實有嫌宜易以近任上曰朕方任仲淹若訥以疆事固當體朕所以委寄之意安得以舊事為嫌也宜詔諭之尋留若訥判吏部流内銓李淑等上新修閤門儀制十二巻客省條例七巻四方館條例一巻景祐三年正月丙午初修五月甲寅朔以陜西都轉運使工部郎中天章閣待制張存為龍圖閣直學士知延州詔前殿奏事毋過五班餘對後殿命太官賜食乙夘再贈六宅使化州刺史金明縣都監李士彬為宿州觀察使仍以其從兄内殿承制士紹為西京作坊副使金明縣都監兼新寨解家河盧關廵檢又贈其子左班殿直懐寳為右千牛衛大将軍録其子懐義懐矩並為左侍禁士彬父子正月戰死未甞贈官也此云再贈疑實録或有脱闕也丁巳復太常博士知楚州孫沔為監察御史景祐初沔為監察御史裏行坐言事貶絀逾六年乃復尋召為右正言召為右正言乃六月辛亥今并書先是詔御輦院揀下都輦官年四十以下為禁軍輦官千餘人携妻子遮宰相樞宻使喧訴門下侍郎兼兵部尚書平章事張士遜方朝馬驚墮地李􅐉十朝綱要詔斬二人流二十餘人己未御史中丞栁植等奏其事請付有司治詔樞宻院推鞫以聞時軍興機務填委士遜位首相無所補諫官以為言士遜不自安七上章請老又數面陳壬戌優拜太傅進封鄧國公致仕聽朔望大朝㑹綴中書門下班月給宰臣俸三之一出入施繖又與一子五品服士遜乞免朝朔望從之本朝以宰相得謝者自士遜始士遜新傳云諫官韓𤦺上疏曰政事府豈養病坊耶士遜亦不安七上章請老按士遜致仕時𤦺己知制誥矣𤦺家傳及他書養病坊等語亦不指士遜附傳又不載𤦺甞有言新傳必誤今不取鎮安節度使同平章事判天雄軍吕夷簡行右僕射兼門下侍郎平章事資政殿大學士户部尚書李迪為彰信節度使知天雄軍自元昊反武事乆弛守将或為他名以避兵任迪願守邊詔不許然甚壯其意吕夷簡自天雄復入相即使迪代之奉寜節度使夏竦為忠武節度使詔華州部送張源家屬赴闕二月戊申初賜錢米六月乙未送房州以契丹歸明人田瑋為江陵尉張珪為當塗尉并錄珪父永佐及弟玘仍賜其家衣服錢絹權三司使公事鄭戬言國家所置諸道轉運使副即漢刺史唐觀察使之職其權甚重漢法刺史許六條問事唐校内外官考定二十最觀察使在焉是必責功過明黜陟吏勸其官朝乃稱治今國家承平八十載不用兵四十年生齒之衆山澤之利當十倍其初而近嵗以來天下貨泉之數公上輸入之目反益減耗支調微屈其故何㢤由法不舉吏不職沮賞之格未立也臣近取前一嵗所謂銅鹽茶酒之課者以為比凡虧租額實錢數百萬貫且前之失既已數十百萬若今又恬然不較則軍國常須将何以取辦臣故曰宜循漢唐故事行考課法欲乞應諸道轉運使副今後得替到京别差近上臣僚與審官同共磨勘將一任内本道諸處場務所收課利與租額遞年都大比較除嵗有凶荒别敕權閣不比外其餘悉取大數為十分每虧五釐以下罰兩月俸一分已下罰三月俸一分已上降差遣若増及一分已上亦别與升陟從之㑹要五月九日事九日壬戌也今附本日甲子詔以近降德音更不踈決此據朔厯更檢故事詳註之是日元昊陷塞門寨執寨主内殿承制髙延德監押左侍禁王繼元死之戊辰淮康節度使同平章事判鄭州陳堯佐為太子太師致仕大朝㑹綴中書門下班辛未賜安逺塞門兩寨戍卒緡錢壬申五月十九日此據㑹要都官員外郎何白言乞選群臣識理道明撫綏能制姦吏善撫軍旅者百餘員代陜西河北河東三路知州軍不材者茍一郡之内得一良吏則萬事皆集詔諸路轉運司體量部下知州軍有年老昬昩貪濁踰違及非幹勤者具事以聞何白未見癸酉詔夏守贇王守忠進屯鄜州時大軍駐河中踰三月矣癸酉五月二十日進屯必因韓𤦺䟽當考徙河中鈐轄四方館使恩州刺史王克基為潞州鈐轄甲戌陜西都轉運使范仲淹言兵家之用先觀虚實之勢實則避之虚則攻之今縁邊城寨有五七分之備而關中之備無二三分若昊賊知我虚實必先脅邊城不出戰則深入乘關中之虚小城可破大城可圍或東沮潼關隔兩川貢賦縁邊懦將不能堅守則朝廷不得髙枕矣為今之計莫若且嚴邊城使持乆可守實關内使無虛可乘西則邠州鳯翔為環慶儀渭之聲援北則同州河中府扼鄜延之要害東則陜府華州據黄河潼關之險中則永興為都㑹之府各須屯兵三二萬人若冦至使邊城清野不與大戰關中稍實豈敢深入復命五路修攻取之備張其軍聲分彼賊勢使弓馬之勁無所施牛羊之貨無所售二三年間彼自困弱待其衆心離叛自有間隙則行天討此朝廷之上策也又聞邊臣多請五路入討臣竊計之恐未可以輕舉也太宗朝以宿将精兵北伐西討艱難嵗月終未收復縁大軍之行糧車甲乘動彌百里敵騎輕㨗邀擊前後乘風揚砂一日數戰進不可前退不可息水泉不得飲沙漠無所獲此所以無功而有患也况今承平嵗乆中原無宿将精兵一旦興深入之謀係難制之敵臣以謂國之安危未可知也然則漢唐之時能拓疆萬里者盖當時授任與今不同既委之以兵又與之稅賦而不求速效故養猛士延謀客日練月計以待其隙進不俟朝廷之命退不關有司之責觀變乘勝如李牧之守邊可謂善破敵矣惟陛下深計而緩圖之乙亥延州言元昊陷安逺寨戊寅罷陜西都部署經畧安撫使兼縁邊招討使夏守贇都鈐轄王守忠都大管勾走馬承受黎用信張德明並赴闕守贇性庸怯寡方畧不為士卒所附自河中徙屯鄜州未及行亟罷歸徙知涇州忠武節度使涇原秦鳯路縁邊經畧安撫使夏竦為陜西都部署兼經略安撫使縁邊招討使知永興軍龍神衛四廂都指揮使涇原副都部署兼涇原秦鳯兩路經畧安撫副使眉州防禦使葛懐敏知涇州兼管勾秦鳯路軍馬事夏竦還知永興以六月三十日到任葛懷敏替夏竦或因韓𤦺奏䟽也當考己夘以起居舍人知制誥韓琦為樞宻直學士陜西都轉運使吏部員外郎天章閣待制范仲淹為龍圖閣直學士並為陜西經略安撫副使同管勾都部署司事初仲淹與吕夷簡有隙及議加職夷簡請超遷之上恱以夷簡為長者既而仲淹入謝帝諭仲淹使釋前憾仲淹頓首曰臣向所論盖國事於夷簡何憾也刑部員外郎天章閣待制知同州龐籍為陜西都轉運使籍甞上言連年災異天乆不雨臣謂弭災消禍在朝廷自修比年費用奢廣出納不嚴内中須索既多有司以慿由除破無縁鈎較虚實臣竊謂凡乗輿所用宫中所費宜取先朝為則今宿師西鄙力戰重傷方獲功賞而内官醫官樂官無功時享豐賜故天下指目謂之三官願少裁損無厚賚予専勵戰功敵冦不足平也籍上䟽不得月日本傳在為都轉運使之後今附見更須詳考疏言天乆不雨其時亦可約也定國軍留後秦鳯路副都部署知秦州曹琮兼管勾涇原路軍馬事琮兼管涇原軍馬實録既於四月丙申日書之又再書於此不知何故耀州觀察使夏元亨為陜西副都部署兼縁邊招討副使仍改賜名隨上以元亨舊名與元昊有嫌故也庚辰詔鄜延鈐轄張亢都監王逹率兵趣金明塞門寨擊賊副都部署趙振以重兵繼之自金明破後敵騎猶未退也太常博士國子監直講林瑀殿中丞史館檢討國子監直講王洙並為天章閣侍講景祐末災異數起上憂之深自貶損瑀言災異皆有常數不足憂又依周易推演五行隂陽之變為書上之上素喜方術觀瑀書異之欲遷其官參知政事程琳以為不可止賜章服時瑀兼諸王宫教授琳因言瑀所挾書多圖緯之言不宜與宗室㳺罷其宫職上毎讀瑀書有不解者輙令御藥院批問瑀由御藥院益得關說於上大抵皆諂䛕之詞縁飾以隂陽上大好之於是天章閣侍講闕端明殿學士李淑等薦洙事在中書未行一旦内批用瑀執政皆怒瑀吕夷簡欲探上意堅否乃曰瑀上所用洙臣下所薦爾不若并進二人唯上所擇乃以洙瑀名進上問洙何如夷簡言洙博學明經上曰吾已用瑀矣夷簡請並用二人上許之既而右正言梁適劾瑀于内降除官請治其罪上令以適章示之卒不罪瑀此據記聞瑀為諸王宫教授未見當考辛已賜張士遜以宣化門安重誨舊園上甞御書飛白千嵗字賜士遜士遜因第中建千嵗堂壬午斬輦官曹榮陳吉于都市倡率其徒遮宰相喧訴者也從者二十四人配逺惡州軍牢城不能部轄者又二十人配外州軍牢城卒揀輦官為禁軍如初詔六月甲申朔詔陜西轉運使提㸃刑獄司察所部吏苛虐不能䘏民及老疾罷懦者以名聞太子中允權簽書涇原秦鳯經略安撫判官尹洙數上疏論兵事請便殿召二府大臣議邊事及講求開寳以前用兵故實特出睿斷以重邊計又請減併柵壘召募土軍省騎士増歩卒并請鬻爵為土軍葺營房及所給物費其鬻爵之法凡入粟五百斛為上爵許以珠金為婦女服飾得與本部七品官接坐犯笞罪及詿誤聽贖入粟百斛為下爵許畜女使以銀為飲食噐非等第户減入粟之半司封出空名爵牒下諸州軍給之願移賣者弗禁鄉貢舉人牙前職員京百司補正名以上凖下爵士族勿拘此制凡無爵僣有爵下爵僣上爵論如違制律告者賞錢十萬告畜女使或銀器者賞錢三萬告服珠金者賞錢十五萬女使聼自便銀器珠金沒入官婦人無子若夫男子年十五以下不許告如此行之不益賦于農畝不重斂於富人所取至輕所致甚衆鬻爵之地除陜西河東河北川峽廣南外計所入不減五百萬斛毎斛定輸錢三百計一百五十萬緡下三司使鄭戩與翰林學士丁度知制誥葉清臣參議以聞戬等奏曰為國者禮義不可不立法度不可不行風俗不可不純今洙所言是棄三者之益而困生民之本也古設民爵以賞武功賜耆艾今則鬻爵以規貨財其編户産薄者或子孫驕靡希一爵因至貧窘使父母妻子罹凍飢之患此禮義不立也先王之域民也貴賤有差器服有别今使下愚之民咸得僣上所為驅之㤀本欲不困窮其可得乎此法度不行也㳺惰豪縱之徒因輸財得僭服以踰憲防卒致澆漓之弊此風俗不純也况賣官之令已出權宜然行之寖乆今更為煩細箕斂民財書掲徼塞使敵人有輕中國之心且先朝賜民爵不過公士攝助教之名非有階品若三等之上户皆受爵號即牙前弓手散從官手力之類悉出孤貧浮客又近以真珠折馬價虧民已甚若更設禁科則悉為棄物今陜西所招馬軍安塞清塞託邊蕃落飛塞保節廣銳歩軍振武神虎保㨗定功床子弩手禁軍清邊弩手捉生諸指揮其募軍例物人不過十餘千募萬人所費才十萬緡陜西河北營房大率覆以茨苫關右産材木計一舎費五七千萬人不過五七萬緡以四海之富亦未至用度屈蹙如此况洙所募邊民不刺面與官軍素服習不同取編户膏血之資置新軍烏合之衆如與敵角何異驅市人而戰哉臣以謂未能制勝於閫外適足斂怨於天下况被邊之俗熟户雜處若廣募驍果或參以姦細之人則為患不淺洙之計策未見所長其議遂寢丙戌詔自今假日御崇政殿視事如前殿丁亥宣徽南院使鎮海節度使夏守贇同知樞宻院事侍御史趙及右正言梁適皆言守贇經略西事無功不可復處樞府踰七旬乃罷八月戊申守贇罷詔國子監學官闕本監官於外任州縣幕職内舉實有文行者充其天章閣侍講諸王府侍講諸王宫教授自今罷兼國子監直講癸巳遣駕部員外郎卞咸相度自汴口至集津運糧利害以聞卞咸未見甲午遣官踈决三京繫囚雜犯死罪降從流流降從杖徒以下釋之鄜延副部署忻州團練使任福為環慶副部署兼知慶州福上言慶州去蕃族不逺願勒兵境上按亭堡謹斥候因經度所過山川道路以為緩急攻守之備上善之聽便宜從事福上言不即此時今附見當考乙未陜西提舉修築城池殿中侍御史陳洎兼催督市糴糧草南京言鴻慶宫神御殿火侍御史方偕引漢罷原廟故事請勿復修詔罷修神御殿即舊基葺齋殿毎醮則設三聖位而祠之瘞舊像于宫側詔軍班以武藝中選者毋得為寨主並令赴都部署司指揮詔陜西都部署司令張源弟姪張起張秉彛張仲經等往寨下誘接張源候還日優與恩澤尋皆送房州羇管仍以秉彛為華州長史仲經為文學二月戊申五月乙未丁酉韓𤦺言慶州駐泊神衛軍昨隨劉平救延州戰没者纔十一二本軍右廂都指揮使劉興皆與衆遁歸比令分屯邠寜縁係近上禁軍不能力戰以致䧟覆主将若朝廷一切不問則無以勵衆心欲且罷歸令樞宻院處分從之要見如何行遣己亥省隰憲二州寜化保德岢嵐火山四軍幕職官各一員從轉運使文彦博所請也庚子廢延州承平南安長寜三寨壬寅天章閣待制髙若訥為京西體量安撫使西上閤門副使符惟忠副之侍御史知雜事張奎為京東體量安撫使閤門祗候杜賛仁副之初上封者言用兵以來諸州禁軍多出戍邊列城武備不飾恐盜賊卒起而腹心之患不可不虞故命若訥等尋以禮賔副使耿從政代惟忠改命從政在七月己巳陜西都轉運使龐籍言近至延州定奪所廢諸寨而邊臣之議多欲固留若諸寨居要害之地首當羌戎入冦将以餌賊而自紓其患正月中賊自安逺塞門引兵入破栲栳寨金明縣如踐無人之境昨塞門被圍日乆而延州未甞發一人一騎徃救賊聲言朝廷已棄此寨於是衆皆潰走糧草器甲一無存者近承平塞垂破副部署許懐德兵馬都監張建侯領兵赴敵賊兵始退若塞門少得援兵亦未至屠盪今已廢並邊小寨外其所存皆在近裏道路寛平之處請嚴戒邊吏自今逐寨緩急有警並令互為應援從之涇原部署司言諸堡寨有寨主監押二員請月遣一人行邊若斥候不明者劾其罪從之甲辰詔陜西河北河東京東西等路量州縣户口籍民為鄉弓手强壮以備盜賊河北河東强壮自咸平已來有之承平嵗乆州縣不復閱習多亡其數於是詔二路選補増廣其數并及諸路焉詔二路選補増廣其數據本志并及諸路則據事修入實録云陜西河北河東京東西路其量州縣户口増置弓手以備盜賊本紀但云増置陜西河北河東京東西弓手朔厯同實録皆無强壮字惟稽古録大事記有之又掇取修入盖河北河東陜西舊已有强壮之名河東及陜西舊已有弓箭手今并京東西新招弓手總得名强壮也乙巳詔閤門祗候及十年而官至内殿崇班者與除通事舍人若供奉官以下不隔磨勘與遷一資又詔臣僚再奏親屬自今毋得過所得恩例丁未陜西轉運使明鎬罷隨軍轉運使詔殿前馬步軍司擇禁軍将校武勇而願効命者以名聞戊申詔元昊刺事人自今獲一人者賞錢百萬補班行其容匿者家長斬妻子配流所在失覺者重劾其罪己酉改殿前馬軍備征為備軍辛亥復權武成軍節度判官歐陽修為館閣校勘始范仲淹副夏竦為陜西經略安撫招討辟修掌書記修以親老為辭且曰今世所謂四六者非修所好兼此末事有不待修而能者又曰古人所與成事者必有國士共之非惟在上者以知人為難士雖貧賤以身許人固亦未易欲盡其死必深相知知之不盡士不為用今竒怪豪俊之士往往己䝉收擇顧用之如何爾然尚慮山林草莽有挺特知義慷慨自重之士未得出門下也宜少思焉樞宻院請下縁邊部署司應山險處並溝塹以絶姦細出入之路從之置嵐石州沿河都廵檢使以侍御史知雜事張奎言元昊於河東路伐林木将乗栰奔衝邊郡也時西邊日警二府三司雖休假不休務翰林學士丁度言苻堅以百萬師冦晋謝安命駕出遊以安人心請休務如故無使外域窺朝廷淺深壬子詔自今遇旬假聽休務如舊帝甞遣使問所以禦戎之䇿度奏曰今士氣傷沮若復窮追巢穴饋糧千里輕用人命以快一朝之意非計之得也唐都長安天寳後河湟覆沒涇州西門不開京師距冦境不五百里屯兵嚴烽火雖常有侵軼然卒無事太祖時疆塲之任不用節将但審擢材器豐其廪賜信其賞罰方陲輯寜㡬二十年且中國制邊鄙可以智勝不可戰鬬盖地形武技與中國異也羌戎上下山阪出入溪澗中國之馬不如也隘險傾側且馳且射中國之技不如也風雨罷勞飢渴不困中國之人不如也為今之計莫若謹亭障逺斥候控扼要害為制禦之全䇿因條上其䇿名曰備邊要覽詔三司天下州縣課利場務自今逐處總計大數十分虧五釐以下其知州通判幕職知縣各罰一月俸一分以下兩月俸二分以上降差遣其増二分以上升陟之
