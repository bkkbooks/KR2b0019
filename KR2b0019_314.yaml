body:
  text: 續資治通鑑長編卷三百十宋李燾撰神宗元豐三年十一月己丑朔翰林天文院言日食雲隂不見又言巳時六刻雲開見日不及所食分數宰臣王圭等上表賀舊紀書日食不見新紀削去辛卯詔提舉教習馬軍所見教諸將下馬軍兵級除巳得精熟引見訖發遣外其後來續教到事藝成就人宜令具姓名人數聞奏聽㫖呈驗訖遣還本將下此據御集一百二十三卷手札增入熙寧七年九月十九日十年九月二十三日元豐二年五月十四日三年三月十一日五月十一日六月十八日十一月三日五年十一月十七日六年二月五日甲午詔御史六員令三員分頭察案三員専言事提舉河北路義勇保甲兼提㸃刑獄司言知相州朝議大夫劉航到官半年已在優課近朝㫖修置集教場航日在役所勸督規畫兩月而畢室宇什器一一精至比之他處大省功費本司已繢圖牒諸州為法航又勸諭民兵赴場簡閲莫不踴躍待選及詔誘義勇軍員與保正附保人投狀願教閲者不少內外帖然無驚擾畏避者伏望旌其異效以勸諸郡詔降敕奬諭仍賜銀絹荆湖南路安撫司乞依湖北沅州例募禁軍同丁夫建築郡州溪峒城寨從之提舉河東路義勇保甲司言願習學武藝人約束乞依義勇節級大保長法從之仍令河北陜西凖此乙未陜西路轉運司言知隴州左藏庫使薛繗暗繆不覺察吏受贓乞放罷上批繗嘗以賣酒過度得罪今又不能率履勵行整飭職事乃因循縱弛有甚前日不可不痛懲治其隴州干繫官令轉運司劾之繗先衝替今任內舉繗官亦案後收坐丙申知代州劉昌祚言瓶形寨地有北人欲取直路趨團山鋪往來臣巳諭本寨使臣回答不可更令希覬侵越詔如北人來境上問語言密諭使臣等以理道婉順開說毋得先為形迹致使别起事端河北沿邉安撫司言凖朝㫖定移牒北界安撫司問人船入界河北放箭因依牒本繳奏上批移牒已數可具止之恐其習玩不以為誡詔右正言直龍圖閣前知熙州趙濟落直龍圖閣追三官勒停太常博士前管勾機宜文字許醇鎮寧軍節度推官經制熙河路邉防財用司勾當公事趙輝各追一官并勒停崇儀使涇原都監第六將張恩西染院使熙河都監第二將許利見各追一官指使西頭供奉官張祚三班借職吕忱各贖銅十斤並衝替濟坐遣祚忱以私役禁軍至京買婢醇輝各以般家人假濟踰數又差禁軍利見知而故縱並特責之已而濟又坐奏熙州錢數馬料不實事復詔俟合叙官更展兩期侍御史知雜事何正臣言中書吏王冕馬永錫不當扶宰臣王圭升慈聖光獻太后神御殿階詔王冕馬永錫各罰銅五斤壬寅詔㑹校諸路馬不出牧以嵗入地租除補還轉運司所費草粟價直外餘並合入羣牧司兼轉運司已承認積缺及嵗額等錢宜下羣牧司置簿以時舉催勾收癸卯河北沿邉安撫司奏信安軍地分界河內有北人漁船知軍王惟純指揮約欄須管却入元出來鹿角口內而北人益以人馬却要向下去以致各曽放箭本司勘㑹惟純雖是用心緣未中理若因此特有行遣又慮北人别致生事兼勘㑹界河北岸通連北界河港不一乞今後婉順說諭如離元出口子已逺止令於近便口港回歸免致引惹爭鬬從之丁未太學博士通直郎朱服為監察御史裏行訪聞河北諸將下教頭多未諳習新法事藝則所教人不應格可知今側近各有集教場可遍下諸將據諸色事藝人數精選少壯者關提舉義勇保甲司教習候成就遣還將下分教河東陜西凖此庚戌知廣州中大夫集賢院學士陳繹為龍圖閣待制再任曹佾以封濟陽郡王恩乞男四方館使評引進副使誘改官詔評遷引進使誘遷客省副使御史知雜何正臣等言軍器監詳定法式至今七年及一司敕亦近五年尚未成書蓋官吏利於添給故為遷延詔三司勘㑹逐官自置局後支過食錢並令回納仍於月俸內尅一半辛亥管勾國子監舒亶言近蕭之美言太學考官不詳考校及巡鋪官不指約補試生員考官等雖各㑹赦然在臣正以督責官屬為職實無幸免之理詔中書上簿亶以罰輕又請罪詔罰銅十斤壬子直龍圖閣勾當三班院曽鞏言陛下隆至德昭大道參天地本人倫興學崇化以風天下唐虞用心何以加此然患今之學校非先王教養之法今之科舉非先王選士之制聖意卓然自三代以後之君未有能及此者也臣以謂三代學校勸教之具漢代郡國太常察舉之目揆今之宜理可參用今州郡京師有學同於三代而教養選舉非先王之法者豈不以其遺素厲之實行課無用之虛文非陛下隆世教育人材之本意歟誠令州縣有好文學勵名節孝悌謹順出入無悖者以聞令佐升諸州學謹察其可者上太學以州大小為嵗及人數之差太學一嵗謹察其可者上禮部禮部謹察其可者籍奏自州學至禮部皆取課試通一藝以上今既正三省諸寺監之任其都事主事掌故之屬舊品不卑宜清其選更用士人以應古義遂取禮部所選之士中第者以次使試守滿再嵗或三嵗選擇以為州屬及縣令丞即有秀才異等皆以名聞不拘此制如此則謂之特舉其課試不用糊名謄録之法使之通一藝以上者非獨采用漢制而已周禮大司徒以鄉三物教萬民而賔興之亦以六藝禮樂射御書數也其舊制科舉已習者既久難一日廢之請且如故事惟貢舉疏數以特舉為凖而入官試守選用之叙皆出特舉之下至教化已洽風俗既成之後則一切罷之其立法彌綸之詳願詔有司即定議焉不行朱本削去又議經費曰臣聞古者以三十年之通制國用使有九年之蓄而制國用者必於嵗杪蓋量入而為出國之所不可儉者祭祀然不過用數之仂則先王養財之意可知矣蓋用之有節則天下雖貧其富易致也用之無節則天下雖富其貧亦易致也宋興承五代之敝六聖相繼與民休息故生齒既庶財用有餘且以景德皇祐治平校之景德户七百三十萬墾田一百七十萬頃皇祐戶一千九十萬墾田二百二十五萬頃治平戶一千二百七十萬墾田四百三十萬頃天下嵗入皇祐治平皆一億萬以上嵗費亦一億萬以上景德官一萬餘員皇祐二萬餘員治平并幕職州縣官三千三百餘員總二萬四千員景德郊費六百萬皇祐一千二百萬治平一千三百萬以二者校之官之衆一倍於景德郊之費亦一倍於景德官之數不同如此則皇祐治平入官之門多於景德也郊之費不同如此則皇祐治平用財之端多於景德也誠詔有司案尋載籍而講求其故使官之數入者之多門可考而知郊之費用財之多端可考而知然後各議其可罷者罷之可損者損之使天下之人如皇祐治平之盛而天下之用官之數郊之費皆同於景德二者所省蓋半矣則又以類而推之天下之費有約於舊而浮於今者有約於今而浮於舊者其浮者必求其所以浮之自而杜之其約者必本其所以約之由而從之如是而力行以歲入一億萬以上計之所省者十之一則歲有餘財一萬萬馴致不已至於所省者十之三則歲有餘財三萬萬以三十年之通計之當有餘財九億萬可以為十五年之蓄自古國家之富未有及此也古者言九年之蓄者計每歲之入存十之三耳蓋約而言之也今臣之所陳亦約而言之其數不能盡同然要其大致必不逺也前世於凋敝之時猶能易貧而為富今吾以全盛之勢用財有節其所省者一則吾之一也其所省者二則吾之二也前世之所難吾之所易可不論而知也伏惟陛下冲靜質約天性自然乘輿器服尚方所造未嘗用一竒巧嬪嬙左右掖庭之門位號多闕躬履節儉為天下先所以憂憫元元更張庶事之意誠至惻怛格于上下其於眀法度以養天下之財又非陛下之所難也已而再上議曰陛下謂臣所言以節用為理財之要世之言理財者未有及此也令付之中書臣待罪三班案國初承舊以供奉官左右班殿直為三班立都知行首領之又有殿前承㫖班院别立行首領之端拱以後分東西供奉又置左右侍禁及承㫖供職皆領於三班三班之稱亦不改初三班吏員止於三百或不及之至天禧之間乃總四千二百有餘至於今乃總一萬一千六百九十宗室又八百七十蓋景德員數已十倍於初而以今考之殆三倍於景德略以三年出入之籍較之熙寧八年入籍者四百八十有七九年五百四十有四十年六百九十而死亡退免出籍者歲或過二百人或不及之則是嵗歲有增未見其止也臣又略考其入官之繇條於别記以聞議其可罷者罷之可損者損之惟陛下之所擇臣之所知者三班也吏部東西審官與天下他費尚必有近於此者惟陛下試加考察以類求之使天下嵗入億萬而所省者什三計三十年之通當有十五年之蓄夫財用天下之本也使國家富盛如此則何求而不得何為而不成以陛下之聖質而加之勵精以變因循苟簡之敝方大修法度之政以幸天下詔萬世故臣敢因官以講求其損益之數而終前日之說以獻惟陛下裁擇上頗嘉納之此據本𫝊附見檢正中書禮房公事㑹定陜西五路年計王震言既已㑹見實數立為定法决能自辦更無可以干朝廷之理前此轉運司積缺别司錢縱朝廷督責撥還有司雖獲罪未有可還之期不如加恩一切蠲賜自今明立約束不得更有陳請借支或遇非時添屯兵馬及甚災傷自可朝廷臨時處置詔所缺三司經略淤田并博馬鹽引提舉催驅秦熙等州市易錢物並與蠲免外餘限三年撥還編類將官敕所言應將副兼知州軍者乞免逐營巡教庶免官屬就營過㕔詔應兼知州將官若於巡教悉免則與獨任將副一同其諸軍武藝進退皆不與責爾後更無以考驗職事修廢以為賞罰可改令五日一赴即當巡日在營其州軍職事非急速不得行遣及接見官屬新本削去甲申御史臺言御史分領察事逐員各領二案文字繁簡不同難以次第分定欲以一員領吏工一員領兵刑一員領戶禮從之丁巳三司言乞依成都府路轉運司奏興復雅州錢監鼓鑄錢且以二萬緡為額候將來成倫序每年鑄三萬緡從之十二月己未朔詔諸路監司具到部下知州通判治狀最優有未經任使者令中書籍其姓名庚申上批諸路教民兵多用馬陜西買馬司上供嵗額有限在京支遣常不足可差羣牧判官郭茂恂往與提舉買馬司㑹計每嵗朝廷所給買馬錢帛當買若干除上供及就配陜西諸路土軍弓箭手外有若干可以益發上京應副民兵詔中書宜參詳瓊管體量安撫朱初平等纍奏請速處分庶朝廷萬里遣使不為徒往﨑嶇島處之民早霑惠賜初平等言瓊州朱崖等處官賣鹽不售即令主管衙前賠買及有諸處虛張鹽額初不曽納足而令専典賠納者並乞與免放又海南四州軍諸縣簿書不整齊或書手妄增稅苗或以誤稅撥入書手戶下或代納之弊未去或戶名二三而催科之人不知乞根括原額存正數外其餘欺弊詭僞一皆改正自來黎峒田土各峒通同占據共耕分收初無文記今既投降入省地止納丁身及量納苗米而海北之民乃作請田文字罩其田土使無所耕種又或因商販以少許物貨令虛增錢數立契買峒民田土嵗久侵占引惹詞訟比及官司追逮往往拔刀相殺乞一切禁止黎峒寬敞極有可為良田處欲候將來事定選官揀願耕少壯之人籍成保甲與黎人雜處分耕各限以頃畝教以弓矢武藝足以枝梧邉寇又言瓊崖儋萬越在海外道路不通民既貧苦仍出役錢其少人處不免依舊輪差以投雇為名其間大半貧困不曽輸納甚者逃入黎峒欲乞朝廷且令比不行役法處輪差㑹四州軍見有寬剩錢七千二百五十餘貫如每年依青苗法祗令瓊管一處給散所得息錢盡樁充四州軍官員接送如此則接送不出於民而卒有贏餘其三軍係選人職任欲乞並支與庸錢如許所奏即四州軍冗占役人處亦乞下本路裁减又言海南州軍民間科置食鹽不易除已乞减數外其煎鹽人丁尤更負重兼所煎鹽數例各不同蓋因前後官政擅增鹽數欲乞取逐州軍煎鹽人丁與所賣鹽數立定一等數使見役煎鹽戶力可以應辦不致破業如自今出賣得行更要鹽貨即令逐處申轉運司相度添募人丁或量支價錢和買如官吏輒敢擅增添亦乞重立條約又言朱崖軍在瓊州之南十有六程地窄人少稅米不足舊年撥昌化軍丁稅米輸之不惟地逺兼在路為黎人抄截每年吏人先以錢往糴納每斗算錢三四百民甚苦之然聞朱崖軍頗有生熟黎峒米并海北客舟載米及軍人等坐倉皆可收糴如歲計得足乞盡令納見錢實為久利又言每年省司下出香四州軍買香而四州軍在海外官吏並不據時估實直沉香每兩只支錢一百三十文既不可買即以等科配香戶下至僧道樂人畫匠之類無不及者官中催買既急香價遂致踊貴每兩多者一貫下者七八百受納者既多取斤重又加以息耗及發綱入桂州交納賠費率常用倍而官吏因緣私買者不在此數以故民多破産海內大患無甚於此且廣州外國香貨及海南客旅所聚若置場和買添三二百人未為過也又言海南收稅定舟船之丈尺量納謂之格納其法分為三等假如五丈三尺為第二等則是五丈二尺遂為第三等所減才一尺而納錢多少相去十倍加之客人所來州郡物貨貴賤不同自泉福兩浙湖廣來者一色載金銀匹帛所直或及萬餘貫自髙化來者惟載米包瓦器牛畜之類所直或不過一二百貫其不等如此而用丈尺槩收稅甚非理也以故泉福客人多方規利而髙化客人不至以此海南少有牛米之類今欲立法使客船須得就泊瓊崖儋萬四州水口不用丈尺止據物貨收稅訖官中出與公憑方得於管下出賣其偷稅之人并不就海口收稅者許人告並以船貨充賞又言海南多貧闕舉貸於豪富之家其息每嵗加倍展轉增益遂致抑雇兒女脫身無期乞嚴誡官司覺察大詔瓊州萬安昌化朱崖軍令依威茂黎雅州罷免役法依舊差役其瓊管州軍皆有常平若推行如法自無人戶倍稱出息之弊據初平等所奏措置海南事不少並不及常平等事令具析以聞餘皆從之命檢正中書禮房公事王震㑹計分擘三司開封府界錢物仍同三司府界提㸃官連書以聞甲子詔應遷官除授者並即寄祿官除大兩省待制以上至太中大夫餘官至朝請大夫並通磨勘進士八年餘十年一遷所理年月自降指揮日為始自官制行以舊少卿監為朝議大夫諸卿監為中散大夫祕書監為中大夫故事兩制以上轉官至前行郎中即超轉諫議大夫前行郎中於階官為朝請大夫諫議大夫於階官為太中大夫而兩制磨勘者舊不轉卿監即於今制不當轉此三階又舊制朝議大夫止以七十員為額餘官轉至朝請大夫即須俟有闕方許次補至是因有司申明乃降是詔其大兩省待制以上自通直郎至太中大夫磨勘理三年承務郎以上至朝請大夫理四年自如舊制本志云云附九月十六日詔所稱進士八年餘十年一遷當考丙寅詔前權發遣瀘州左藏庫副使喬叙太常少卿前梓州路轉運使髙秉並除名太子中允集賢校理權發遣夔州路轉運判官許安世降一官與本等小處差遣知遂州比部員外郎范純禮前淯井監判官王參各衝替瀘州指使三班借職楊可久勒停初叙等坐奏蠻乞弟打誓不實致乞弟殺都監王宣等七百餘人又虛奏鬬處非省地等事而安世時為梓州路轉運判官故皆責之御史豐稷言臣近監祭社見攝光祿卿朝請大夫王之才神氣昏憊步艱語澀應選格差知化州乞改授以閒慢差遣詔與宫觀令審官院自今祠祭差官並選堪任攝事人開封府界提㸃司言諸處縣城損壞過半至有髙不盈數尺處昨扶溝鄢陵縣人戶自願展修己奉㫖施行而諸縣復有願者官吏乃不敢專行欲乞自今願者為檢計監視惟不得抑配從之丁卯中大夫集賢院學士蘇頌知滄州頌入辭因言母老畏寒須春上道上曰卿母誰氏頌曰龍圖閣直學士陳從易女上曰天聖間侍從耶頌曰臣外祖天聖間以直昭文館知廣州罷還不市南物輦俸餘錢過嶺仁宗聞之即日擢知制誥上曰清過於馬援矣頌到滄數月召還判吏部己巳新成都府路轉運判官周之道言京東路明堂赦後强盜八十餘乞發下兩路安撫提㸃刑獄司措置詔提㸃刑獄司具不督捕盜賊因依未獲實數以聞之道長興人也知都水監主簿公事李士良言黃河見管大小使臣一百六十餘員並委監丞以上奏舉往往有因緣未必習知水事欲乞今後河掃罷舉官之制並委審官西院三班院選差其都大提舉官即乞且如舊從之仍令內外官司自來舉官泛濫數多處中書凖此立法以聞庚午詔開封府解額並撥屬太學其國子生解額以太學分數取人紹聖三年八月十九日當考辛未權荆湖南路轉運副使瓊管體量安撫朱初平言瓊管限隔巨浸監司未嘗巡歷故官吏資為姦贓臣等欲乞嵗或間嵗専遣廣西監司一員量與支賜令過海巡歷客省副使王淵言近按閲河北等十二將軍馬多不應格其將官段懷德副將王用兼押隊供奉官苗遇楊立殿直石舜封全不曉軍中教閲次第其押隊使臣試以弓馬又不諳習詔將副段懷德王用各特追兩官勒停押隊苗遇楊立石舜封全特勒停仍令承㫖司具將副不職事狀并今次行遣遍下諸將後又詔真定府路安撫司河北轉運提刑司各保明懷德實有材勇而本官近以不職罷可各罰銅十斤癸酉詔自今樞密承㫖司𫝊宣止作直奉聖㫖行下知禮院兼太常寺丞王子韶言寺丞劉次莊祖母亡有嫡曽孫次莊為嫡孫同母弟本院定次莊祖母亡無諸子及無嫡孫次莊以嫡孫同母弟承重檢近降五服條嫡孫為祖注謂承重者為曽祖髙祖後亦如之嫡子死無衆子然後嫡孫承重即嫡孫𫝊襲封爵者雖有衆子猶承重竊詳上條止為嫡孫承重不承重立法即無庶孫承重之文自來嫡孫即不問長幼承重若嫡孫已死見有親弟年少又有庶母弟年長若論長即庶長孫承重若謂庶孫不當承重即嫡孫同母弟雖少當為祖父母齊斬三年未嘗明降指揮乞下禮官詳議立法禮院言自今承重者嫡子死無諸子即嫡孫承重無嫡孫嫡孫同母弟承重無母弟庶孫長者承重曽孫以下凖此其𫝊襲封爵者自依禮令從之甲戌詔府界都副保長大保長與免春夫一名及承代大保長充教頭人並與免體量草內至送納處不及百里免二百束每加逺百里遞减六十束至一百二十束止如本戶不合出夫草并草數不足並詳計㑹别戶折兊都提舉汴河隄岸司言泗州普濟院自元豐二年七月洛水入汴至三年閏九月止得流尸五百四十人比常年减千五百人蓋以安流少所拋失難責以及數其每嵗度僧亦乞依例詔自今每及千人即推恩庚辰承議郎宇文昌齡為監察御史裏行詔依殿中侍御史言事昌齡雙流人也張璪薦昌齡詔祕書省正字驅磨市易錢物范百嘉追一官勒停權發遣戶部副使都提舉市易司王居卿免追官勒停聽以贖論百嘉坐前任監鹽違法冒賞而居卿失保明及被劾虛妄也韓存寶言乞弟遣人以狀來似有降意又恐姦謀故欲相欵現相度討殺上批乞弟昨既傷官兵又已害王宣等朝廷遣兵必誅首惡存寶自進兵以來未嘗大有斬獲今所收乞弟乞降文字未知存寶且欲以計欵賊乘便進討或果欲受降如以計欵賊乃用兵所宜若果欲受降深非朝廷出師之意如乞弟尚能蟻聚委存寶多方擇利掩殺如賊黨逃潰亦選名將搜捕購募殺獲若逗遛不能成事必正軍法時存寶已與乞弟設誓班師次江安五日矣寧逺軍節度使殿前副都指揮使楊遂卒車駕臨奠輟視朝賜銀三千兩贈侍中諡壯敏辛巳通直郎監察御史裏行朱服言臣前為太學博士昨䝉召對後入學供職在博士梅灝直舍有博士袁默招臣起就屏處密語臣云聞君已有除命異時舉御史往往遲回多日君所以速得者皆章參政致力當日特將上即有指揮是時臣以未受命及素以默言多誕不復省答至今月己巳又有成都路轉運判官周之道來臣私居稱見章參政託致意為臣在言職不敢奉簡見所上劄子文字極佳又言甚稱美臣形相更求臣生月臣昨緣對誤被聖擢固己面䝉宣諭而惇為執政乃委曲𫝊意攬為己意况執政之於御史不應交通誠如二人所言則姦邪不可不治臣與袁默舊同職事周之道又聯親屬然以職居言責不敢隱默詔大理寺鞫之四年三月庚子惇罷政癸未馬軍副都指揮使黔州觀察使盧政為殿前副都指揮使武泰軍節度使政起卒伍以數有功進領軍政㑹郝質賈逵楊遂繼卒遂驟典禁衛年七十餘氣貌不衰侍立殿下更數時無惰容扈從輦前能獨上馬踴躍先導觀者壯之舊紀書政為節度使新紀刪去上批供備庫副使董嘉言差管勾京城四壁兼房園等課利內藏庫使慶州團練使宋用臣可依舊京城所職任仍改提轄為提舉甲申遼主遣長寧軍節度使蕭偉太常少卿乾文閣待制石宗回來賀正旦乙酉權發遣北外都水監丞陳祐甫言商胡决三十餘年所行河道填淤漸髙不惟嵗增隄防時正泛溢為今之計其說有三謂商胡與橫壠故道及禹之舊跡商胡橫壠地勢髙平土性疏惡皆不可復復之亦不足以持久惟大禹舊跡故瀆尚存在大伾太行之間地卑而勢固故祕閣校理李垂與今知深州孫民先皆有修復之議乞令民先暫交職事同河北轉運司官一員自衛州王供掃訖於海口案視從之夔州路轉運司奏南平軍止有通判一員無職官本軍兩縣一鎮六寨堡事務繁多欲乞依嘉州例置職官一員兼監鑄錢監從之詔非久修建尚書省等方今天下獨熙河山林久在羌中養成巨材最為浩瀚可以取足即今合用之數宜専差都大經制熙河路邉防財用事李憲兼專切提舉本路採買木植其合置官屬并創立約束並仰畫一條具聞奏其本路以東涉歷路分應緣今來職事他司不得輒干預丙戌上批勘㑹走馬承受公事係朝廷所遣小行人設有貪贓不法監司自當具罪狀聞奏聽㫖送獄推劾今秦鳯路走馬承受公事蘇賁未見有巨蠧罪惡權發遣秦州蔣之竒輕率恣橫於十二月十二日夜差人輒便捉送下獄取勘緣自來守臣未嘗有如此狂悖無禮者宜速下提㸃刑獄司取勘其蘇賁仍限指揮到立便疏出此據御集二十八日丙戌事今附見當考究竟二年三月二十八日之竒除陜漕丁亥通議大夫天章閣待制馬仲甫卒復置昌化軍昌化縣萬安軍陵水縣瀘州羅改寨河北西原北河二堡沅州托口貫保二寨廢鎮江寨為鋪是歲宗室子賜名授官者五十一人天下上户部主戶一千一百二十四萬四千六百一丁一千六百二十三萬六千四百三十客戶五百四十八萬五千九百三丁七百五十九萬四千三百五十一斷大辟一千二百一十二人綱要云是嵗始置元豐庫河東河北陜西三路始行保甲法
