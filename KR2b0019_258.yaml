body:
  text: 續資治通鑑長編巻二百五十四宋李燾撰神宗熙寜七年六月丁夘朔命知熙州王韶都提舉熙河路買馬權提㸃刑獄鄭民憲同提舉以中書言熙河出馬最多雖已置買務於熙州立法未盡故也二十五日韶云云詔賜提舉河北常平倉司衛州封樁糧四萬九千餘石貸共城獲嘉汲三縣中等闕倉户判大名府文彦博言懷衛州闕食饑民聚而為盗初無結集黨與臨時倡率即又潰散既無主名追捕止撓平民不安田種欲的有倡首姓名情理深重者乃追捕從之詔河北路轉運提舉司置場以常平及省倉嵗計餘糧減直許民以絲綿綾絹增價博買為轉運司年計或俟秋成博糴庚午中書奏事已上論古人用兵竒正之術以謂旗參差而不齊皷大小而不應此真敗也至如韓信之破趙背水為陣而棄大將旗皷以誘敵彼成安君知兵者也非示以真敗何能勝乎河北東路察訪司曽孝寛乞自本司差官同安撫轉運司相度滄州三塘及縁界河經黄河填淤地募人種木從之檢正中書户房公事張諤言准朝㫖權提㸃諸路監司所申廵歴狀乞監司官嵗分州縣互廵次年正月十五日以前具已廵歴上中書經一年不廵者委中書㸃檢官申舉從之辛未詔應赴後殿起居臣僚乞假如月過兩次令内侍省遣醫看騐著作佐郎黄顔言給納青苗錢穀乞明立條約使州縣官吏視年之豐荒合請數給散毋以元散數為額權潤州觀察推官王覿言青苗錢乞自今災傷五分以土當展料者舊欠展料錢穀皆未得催理詔並送司農寺癸酉遣官謝雨河東都轉運使太常少卿集賢殿修撰張景憲為右諫議大夫再任先是諸路官吏行新法或違失監司多所奏劾人情惴恐景憲不劾一人議者欲分河東為兩路事下景憲景憲言河東地肥磽相雜州縣貧富亦異正宜有無相通以備邊費若路分則財賦難以移用其議遂罷上批河北路已編排義勇保甲可速令具丁數以聞詔真揚楚州運河依兩浙運河擇尤淺澁處先開淘令發運轉運司借上供錢米雇夫甲戌權知開封府孫永言昭化軍節度使康國公承顯多以金錢與僧本立請求遷官乞從别差官推治詔開封府依公結絶如事干承顯即牒大宗正司㑹問本立嘗屬宰臣王安石子雱永屢上殿及此上察永意欲以及安石也朱本削本立嘗属王雱以下今復存之是日中書奏事已上語輔臣曰諸葛亮居草廬盖有以自重然後可至大用耳其二十罰以上皆自行之蜀寡材能之士是以每事躬親亦何可譏也又曰韓信為大將勸漢王定三秦安天下莫不如其策雖有成臯宛葉之危殆然天下大計固已素定矣詔賜涇原路經畧司度僧牒五百以備賑救又詔自今應陜西賣鹽場見在鹽約支及二年即權停買納乙亥詔罷道士威儀迎引宗室喪塟詔監安上門光州司法叅軍鄭俠勒停編管汀州始俠上書獻流民圖朝廷以為狂笑而不問第令開封府劾其擅發馬遞入奏之罪而俠又上書言天旱由王安石所致若罷安石天必雨安石既罷呂惠卿執政俠又言安石作新法為民害惠卿朋黨姦邪壅蔽聰明獨馮京立異敢與安石校請黜惠卿用京為相且言京及元絳孫永王介四人者皆仁義人也惠卿大怒遂白之上重責之俠言行録云呂惠卿叅政其日京師大風霾黄土翳席逾寸俠又上䟽論之不報此事當考俠薦京為相此據京本傳新舊史皆云而實録墨本但云俠稱京及元絳孫永王介四人皆仁義人不云薦京為相盖不詳也朱本又削去四人姓名按熙寜編敕擅發馬遞罪止杖一百今勒停編管盖别有所為而墨本朱本並云坐上書獻圖擅發馬遞此亦不詳也盖當時但借此以責俠耳今并取新舊傳及司馬光記聞刪修四月七日俠初被劾八年正月七日庚子俠再竄英州權發遣秦鳯等路轉運判官劉宗傑言階州舊𨽻秦州今在岷州之南若割𨽻熙河軍馬易相照應詔王韶相度以聞卒不行皇城使王君萬為東上閤門使逹州團練使夏元幾為東上閤門使果州刺史西上閤門使苗授為四方館使榮州刺史如京副使狄詠為皇城使依舊兼閤門通事舍人餘遷官差賞以兵渡洮討殺蕃部通道之功也上因論及熙河功賞曰慶厯中西方用兵劉平葛懷敏失律士卒死傷數萬方贈官超絶推恩子孫至及二十人者士卒用命被重傷才得錢二千何其薄也今之燕設伶人吹笛擊鼓所得有過此者古人謂廪餼稱事正欲與事功相稱耳今熙河之賞可謂優厚然激勵士氣人人惟恐不得當敵正用此耳丁丑河北縁邊安撫司上制置縁邉浚陂塘築隄道條式圗請付邊郡屯田司又言於縁邉軍城植栁蒔麻以備邊用皆從之熙河路經畧使王韶言熙河二州最為聚兵之地嵗支人糧馬豆三十二萬斛草八十萬束本路有市易於茶鹽酒税可以應辦宜糴乞差官二人乗賤計置其草豆別乞差四人專領並立敷辦賞格并乞鹽鈔三二十萬候三年外本司自辦從之上謂輔臣曰近遣小使至畿縣視秋稼非常滋茂已有髙及二尺者今秋若獲豐稔吾民其小蘇息乎詔在京饑民令開封府籍大小口數并鄉土以聞開封籍上九百三十六人詔委官審問給劵遣還本鄉詔諸州軍職事申禀所属修造城櫓軍器申經畧司軍政訓練都總管或鈐轄司合用物料轉運司外更不禀監司其事不由逐司亦不供報經畧等司不提振及措置不當監司具奏戊寅賜討蕩洮州將士特支錢有差詔在京轉運諸軍都虞候以下至都指揮使應以戰功遷資願回授子孫者聽比嵗軍校以戰功遷者徃徃超至右職故令稍推及子孫又詔應按察官體量大小使臣老疾謬懦不職之類不經核實衝替差替者候到三班院引赴樞宻院覆騐其堪釐務者與合入差遣體量不當官司取㫖己夘詔在京一司一路一州一縣敕編修訖並上中書在京一司敕送檢正官餘送詳定一司敕令所再詳定宰臣韓絳言前内殿崇班王用臣敢死之士實有戰功今熙河路頗藉才武之人欲望與近下班行詔補三班借職熙河路經畧司指使初用臣任鎮戎軍定州寨都監坐自盗贓三十七疋法應絞免死配下班殿侍送本路効用至是又命之辛巳新知蔡州兵部員外郎李復圭復為工部郎中直龍圖閣知滄州復圭自曹州以親嫌徙蔡州過闕得對而有是命兩浙路提㸃刑獄中丞盧秉為太常博士升一任秉提舉鹽事嵗課增羨也時秉已徙淮南東路矣五年二月十八日為浙憲七年五月十九日改淮東八年五月二十六日又升任轉官此年五月十九日丙辰可考方勺泊宅編云云已見五年二月十八日上批聞夏國旱菑擁羊馬牧於縁邊河令六路經畧軍馬司嚴戒當職官吏常禁察漢蕃户無致侵竊壬午分命輔臣祈雨録瀘州進士鮮于之邵為郊社齋郎以梓䕫路察訪司上之邵所陳邊事及役法可采也詔增諸路教授又詔同知禮院宋充國候禮院及三年與省府差遣以判太常寺元絳言充國故相庠之子供職已二年職事有勞也賜岷州新置寺名曰廣仁禪院仍給官田五頃嵗度僧一人癸未秦鳯等路轉運司請於鳯翔府斜谷置監鑄折五折十錢乞降御書字様詔惟鑄折二錢河北西路轉運司請應募役人本家應排保甲者與免身丁從之甲申詔諸班直并皇城司親從官配𨽻諸州牢城本城年五十以下情理輕者班直改配龍騎親從官配壯勇令刑部立諸班直叙法先是衛士以小罪或連坐降配其居南方者病瘴癘多不還自恃才武窘於衣食或亡去為盗故收恤之詔措置懿洽州蠻事勾當官有功第一等京官減磨勘二年選人循一資餘減年注家便官從察訪章惇請也蠲澧州澧陽等三縣官竹園嵗鬻筍錢委有司詳定盗筍竹法令州縣護養以助軍器從本路提㸃刑獄李平一請也乙酉皇第五子生遣參知政事吕惠卿告于太廟名僴秦鳯等路提㸃刑獄鄭民憲言已定熙州漢蕃弓箭手疆界置堡均地借助就耕食上批河洮岷州弓箭手令民憲速行安撫轉運司及其耕時貸以錢糧庶幾速見功緒上謂輔臣曰天下財用朝廷若少留意則所省不可勝計昨者撥併軍營令㑹計減軍員十將以下三千餘人除二節特支及傔從外一嵗省錢四十五萬緡米四十萬石紬絹二十萬匹布三萬端草三百萬束若每事如此及諸路轉運使得人更令久任使之經畫財其可勝用哉治平四年閏三月二十三日熙寜元年十月末二年七月十九日十月十二日三年三月末十一月二十三日六年十月二十一日皆併營事兵志附此語於熙寜二年後蘇軾論併營前非事序也合依實録陜州言五月乙丑大雨水漂溺陜平陸二縣詔被水災民給口食三月遞鋪兵級人給般移錢千詔降宣紙式下杭州嵗造五萬畨自今公移常用紙長短廣狹毋得與宣紙相亂丁亥睦州軍事推官中書禮房習學公事葉適為光禄寺丞館閣校勘權檢正中書禮房公事適初補試國子監生王安石愛其所對策安石去位呂惠卿薦之得召對不稱㫖上以安石故特有是命葉適事據司馬記聞賜摩正姓趙名思忠為榮州團練使母夀安郡君郢城簡賜姓李封遂寜郡太夫人妻裕囉勒齊為安定郡君結日卜聚為仁和縣君又名其弟董古曰繼忠結斡延正曰濟忠轄烏察曰紹忠巴珍覺曰醇忠巴珍穆曰存忠又賜其二子長巴爾丕勒鄂丹斡名曰懷義次噶斡名曰秉義並為右侍禁首領結赤木鄂特凌古並為東頭供奉官十二月四日思忠為秦州鈐轄二十七日斬鄂特凌古舊史趙思忠傳并熙寜十年六月附傳摩正賜姓名授榮州團練使母郢城簡為遂寜郡太夫人月給脂粉錢三十千妻包氏為咸寜郡君母弟及諸子皆超授官方引對思忠時上召包氏裕囉勒齊許以蕃服及二子皆上殿勞問又詔思忠包氏聞汝夫婦不相能今當和睦思忠不能奉詔乃詔思忠居熙州包氏裕囉勒齊居河州此與實録畧不同今附見聴以蕃服入見在九月十六日戊子知冀州王慶民言州有小漳河嚮為黄河北流所壅今河已東流乞發夫開浚詔外都水監丞司相度以聞既而不行詔寺監銓院主判官嵗許舉本屬官一員充京官或職官縣令内選入三員以上許舉兩員六員以上舉三員初勾當三班院陳繹蔡確奏舉權主簿奉國軍節度推官周淑為京官詔送流内銓許收使自今在京主判處官屬准此因著為令辛夘詔以司天監新製渾儀浮漏於翰林天文院安置太常丞集賢校理兼史館檢討同修起居注提舉司天監沈括為右正言賜銀絹各五十司天秋官正皇甫愈等十人並減年陞資餘各賜銀絹有差初括上渾儀浮漏景表三議及渾儀製器朝廷用其説令改造法物厯書至是渾儀浮漏成故賞之八年正月二十七日厯成王韶言奉詔募買蕃馬今黑城夷人頗以良馬至邊乞指揮買茶司速應副從之仍令李杞據見茶計步乗船運具已發數以聞六月一日委韶及鄭民憲提舉買馬贈衛國夫人沈氏為吳國夫人沈氏太宗時入宫逮事真宗扵藩邸上批可贈一大國故有是命壬辰知成都府資政殿大學士趙抃知越州從所乞也秦鳯等路都轉運使龍圖閣直學士蔡延慶知成都府同判司農寺刑部員外郎集賢殿修撰熊本為秦鳯等路都轉運使中書言陜西縁邊熙寜六年入納錢五百二十三萬餘緡給鹽鈔九十萬二千七百一十六席而民間實用四十二萬八千六百一席餘皆虚鈔雖有條約須納錢方給鈔以錢市糧草縁官中闕錢監糴之官務辦年計不免止以鈔折兊糧草雖有臣僚上言乞復行交子多云每年出錢可百萬緡此不知行交子之意今若於陜西用交子止當據官所有見錢之數印造假如於邊上入中萬緡却願於某州軍納換即須某州軍納換處有錢萬緡畫時應副支給如此則交子與錢行用無異即可捄緩急及免多出鹽鈔虚擡邊糴之弊詔永興路皮公弼秦鳯路熊本並兼提舉推行本路交子仍以知邠州朱廸提舉永興秦鳯兩路推行交子九月十八日二十一日二十六日并熙寜四年正月二十四日四月八日可考食貨志第六巻中書言陜西縁邊鹽鈔大出多虚鈔而鹽益輕以鈔折兊糧草有虚擡邊糴之患請行用交子法於陜西七年六月二十六日詔以皮公弼熊本分領其事又詔知同州趙瞻制置七年九月二十一日癸巳録進士李參魯為郊社齋郎參魯故海門縣主簿太學説書覯之子知制誥許將鄧潤甫言覯早以文學知名治古文通經術四方從學者常數百人參知政事范仲淹論薦嘗授一官赴太學説書子孫零落無綴仕籍者今以其文十七巻進呈乞依王回例官其一子故特録之梓䕫路察訪熊本言䕫峽州郡民間無井飲䕫州城中引三洞三臂兩溪水分布之衢巷貯以桐船木檻年必一易使汲者輸錢以治之欲以免役頭子剰錢給其費免取於汲者從之上謂輔臣曰知州轉運使令久任呂惠卿曰衆議皆以舉縣令為急不知列官分職何處不擇人上曰刺史縣令治民為最近故以擇人為急若縣令中明有績効朝廷擢三兩人以勵庶官不亦善乎馮京曰漢宣帝以縣令髙第者為刺史刺史有殊績者入為三公黄霸是也惠卿曰守郡輔臣體自不同上曰如此用人恐亦非宜此覇之風采所以不及為郡時也輔弼之材如周之十亂乃為稱職耳韓絳等曰臣等過䝉㧞擢實不足以仰望清光若如陛下所論臣等雖罄竭駑鈍不可一日在中書然不敢不勉耳上曰如卿軰知識髙逺但行其所知古人不難到也惠卿又言太常寺朝廷禮法之司員數太冗賢愚雜處望選擇三兩人專領其職上曰誠是也唯祀與戎國之大事朝廷近年祠事極不如禮且湯伐桀武王伐紂皆責以犧牲玉幣此固不可不重也詔廣南路經畧安撫轉運司據元管槍手土丁户依義勇例東路槍手西路土丁並每三丁差一丁其自來無槍手土丁州軍更不置以本路轉運司申明舊制槍手土丁止稱主户有三丁者籍其一即未知六丁九丁者合與不合增取及自來無槍手土丁處許與不許差㸃故有是命㑹要太詳今從實録存其畧本志尤畧知桂州劉彛言舊制宜融桂邕欽五郡土丁成丁以上者皆籍之既接蠻徼自懼㓂掠守禦應援不待驅策而近制主户自第四等以上三丁取一以為土丁而旁塞多非四等以上者若仍三丁籍一則將減舊丁十之七餘三分以為保丁保丁多處内地又俟其益習武事則當蠲土丁之籍恐邊備有闕請如舊制便奏可此據本志熙寜七年事今附六月二十七日甲午上論結隊法因歎用兵之難以謂今之邊臣曉知竒正之體者已是無人况竒正之變乎且天地五行之數不過五故五陣之變出於自然非彊為之耳韓絳曰臣昔嘗謂置講説之官今欲令諸路帥臣各具戰陣之法來上取其所長立以為法上可之乃詔五路安撫使各具可用陣隊法及訪求知陣隊法者陳所見以聞詔乃七月二十今并此本志係此事於五年誤矣若五年則韓絳不在相位詔熙河路蕃户近已嚮順事多就緒其本路財利出入凡折博鹽酒茶礬税市易坑冶材木酒坊鑄錢交子鹽鈔等委熊本經制務節用生財邊備豐衍裁省冗官並與王韶相度施行乙未命參知政事吕惠卿提舉編修司農條例審刑院詳議官賈士彦乞差官以熙寜以來得㫖改例為斷或自定奪或因比附辨定結斷公案堪為典刑者編為例又乞委官以諸州奏獄格式及敕律令文斷獄之事裁損編載立為案式頒之天下詔刑部編定丙申遣勾當御藥院李舜舉徃太原府代州勾當公事此據御集詔開封府界京東西河北河東陜西淮南兩浙路轉運提㸃刑獄司具轄下闕雨處入急遞以聞亦據御集皆三十日事是月廣州言鳯凰見增城縣西城縣民葛德出私財修長樂堰引水灌溉鄉户土田授金州司士參軍賜度僧牒十此據本志增都水監言劉璯狀勘㑹北京界黄河自熙寜二年閉斷北流後累横决於許家港及清水鎮下入蒲泊水勢散漫渰浸民田六年十月王令圖等建議乞於北京第四第五埽等處開修直河使大河復還二股故道璯等尋被㫖相度還言其利即已施行命范子淵等領其事子淵等開直河計深八尺不住䟽濬又閉斷南岸魚肋河四道擗拶水勢全入二股河今直河水深二丈五尺或增至三丈而許家港清水鎮河極淺漫幾乎不流看詳二股河今雖水勢深快成河道盖縁蒲泊以東連接清水鎮許家港向下直至四界首漸次退出田土别無固護若向去却遇漫水出崖未免依前牽廽河頭復成水患乞下外監丞司相度候霜降水落將清水鎮河閉斷築縷河堤一道遮欄漲水使大河復循故道别無走移壅遏之患及退出民田數萬頃民得耕種兼退背下博州界堂邑等七埽减省逐年修護之費公私俱濟監司勘㑹北京界第五埽所開直河及用濬川杷鐡龍爪䟽濬河道并閉塞魚肋河等元係劉璯相度措置今又以為言乞差璯與王令圖同外都水監丞司就計其事從之㑹要以此事繫之七年六月今附月末其閉塞魚肋河已見二月五日子淵等受賞在此年十二月十一日甲戌又六年十一月八日丁未可考七月戊戌詔以十一月己未有事扵南郊己亥真定府路安撫司乞降度僧牒二百修城及發諸縣夫五千以二年浚壕從之辛丑詔開封府界民納蠶食鹽等錢折納糧者上三等如故餘並許納錢願輸本色者亦聽又詔陜西解鹽司驅磨同管勾制置解鹽司楊蟠到任後錢數所入多寡以聞以蟠言二年之内比舊增錢七十餘萬緡而察訪李承之言其不職乞較嵗課之登耗也究竟如何賜度僧牒五百為杭州市易本錢又給二百賜河北西路轉運司市草詔自今内外廂軍本城牢城及諸司庫務院坊監等正副指揮使以上并自禁軍初補本城牢城等軍員依舊降宣餘劄下逐處給補牒三司乞借内藏絹二十萬以備冬衣從之詔自今舉官不當罪至停者取㫖壬寅命宰臣韓絳為南郊大禮使翰林學士元絳為禮儀使翰林侍讀學士陳繹為鹵簿使御史中丞鄧綰為儀仗使權知開封府孫永為橋道頓遞使後永罷以韓縝代之光禄寺丞韓宗古為館閣校勘宗古絳從子也以王安石薦召對故命之癸夘羣臣請加尊號曰紹天憲古文武詔不許自是五上表終弗許命工部員外郎集賢殿修撰判司農寺李承之太子中允直集賢院同判司農寺張諤秘書丞館閣校勘權判刑部朱明之太子中允權監察御史裏行丁執禮並兼詳定編修司農條例執禮仍充館閣校勘知開封府兵曹參軍大理評事吳安持忠正軍節度推官管勾國子監丞郭逄原吳縣尉提舉修撰經義所檢討曾敀並兼充編修删定官上批陜西路亢旱秋種未入令轉運司訪名山靈祠祈雨又詔五路教閱保甲州軍如闕令佐許本路權差守選或待闕人又詔蠲河北西路五等户免役錢一年仍自今東西路差春夫毋過五萬人河埽重役當增差者亦具以聞又詔天下奏報雨雪賊盗之類舊悉以狀進令通進司分門類次畧為奏目進入廣南西路轉運司言請攝官通十分為率長史文學七分進士二分特恩補攝者一分候正額有闕以次差補從之甲辰右正言直集賢院管勾國子監常秩為寶文閣待制判國子監秩疾久執政屢請進職以慰安之故有是命詔熙河路破踏白城蕃部將官使臣比再收復河州功其倍賞之押隊使臣各計所部人數并獲級以十分為率九分以上為優等五分以上為第一等三分以上為第二等一分至不及分若無獲者並為第三等優等遷六官餘等降殺以兩至第三等遷一官仍減磨勘一年於是先鋒東上閤門使逹州團練使王君萬遷引進使皇城使文州刺史韓存寶帶御器械䇿先鋒六宅使林廣遷皇城使果州刺史左肋陣右騏驥使盍可道右肋陣左藏庫使郝進殿後姚兕策殿後姚麟並遷皇城使監照管中軍將引進使榮州刺史苗授遷忠州團練使總管燕逹及君萬存寶授兕麟仍各官其親屬一人君萬等所獲並第三等特優擢之監照管三字疑錯當考乙已詔宗室自賜名授官後十五以上理十年磨勘大宗正司依審官院例檢舉其經覃恩改官者自覃恩後别理河北東路轉運司檢定外都水監丞程昉新開永静軍葫蘆河水入沙河利害以聞以民訴水淤漲乞候秋收隄防稍固决水故也八年六月十九日九月七日可考同糾察在京刑獄祝諮請蠲天下負犯百姓見欠開封府贓賞錢賜河東轉運司錢十萬緡市糧草詳定編修三司令敕沈括言奉詔編修明堂籍田祫享恭謝式明堂祫享近嵗多與南郊更用恭謝籍田歴年不講禮文盖已殘缺至於東封西祀朝陵等禮亦皆難以蒐究竊慮空文迄於無用欲止編明堂祫享二禮從之戊申詔河北西路轉運副使吳審禮相度衛相州可置鐵監處以聞賜度僧牒二千五百試監主簿齋郎州助教敕告補牒總五十賑貸涇原環慶路漢蕃饑民及為永興路常平糴本己酉祠部員外郎集賢校理鮮于師中知河州師中自是方知河州朱史五月一日所書其誤審矣初命文臣知河州故記之罷都官員外郎宋充國同知禮院充國妻龎氏悍而妬充國以廟饗齋宿太常龎氏令二婢躡而從之充國笞二婢送開封府即自劾既釋罪并罷其職事壬子以美人邢氏為充容延州乞發省倉白米三萬石糶與闕食人從之上批河北修剏樓櫓守具及軍器合用物料可速相度差官徃出産路剗刷計置或令市易務募商人結買分命輔臣祈雨中書奏自應天至淮以南有蝗已得㫖差官監捕上批與免朝辭癸丑手詔摩正已降熙河邊事漸就安帖此去惟當推廣恩惠懷輯羌落乃為徑久保守之利如蕃部作過合行討蕩經畧司具事取㫖知諫院鄧潤甫言乞於每路監司擇一人與守令博訪青苗法度又乞每嵗散青苗一料取二分息詔並送提舉編修司農寺條例司朱本刪去簽貼云無施行今復存之甲寅詔成都府路轉運等司體量轄下災傷州縣更不候披訴第與分數蠲秋税廣東轉運司言詔惠州永通阜民二監嵗鑄錢八十萬比又增鑄錢三十萬近有㫖改鑄折二錢一嵗比小錢可增二十萬欲乞以所募舟運至發運司改兊小錢入京以為軍國之計上批惠州阜民錢監治平四年置所鑄錢係内藏庫嵗額止自前年移撥與轉運司買銅今既有羨餘宜復歸内藏庫四年三月十四日六年十月二十三日可考詔差官權在京職任如大理少卿之類知州以上資序即許奏薦詔廣南東路提舉司劾廣州市易務勾當公事呂邈擅入市舶司拘攔蕃商物以聞朱史以事小删去今復存之乙夘檢正中書吏房公事太子中允俞充為集賢校理權發遣淮南東路轉運副使禮賔副使提㸃慈孝寺任澤為西染院使以仙遊夫人母弟推恩也司農寺言蘇人訴沈括等所築民田岸圍侵壞良田横費公私錢未委虚實詔轉運副使張靚體視所訴事狀以聞十月體量到詔廣州市泊可依舊存留更不併歸市易務熊本言經制瀘州夷事除乞降外有水路諸村作過夷皆已平蕩具賞平夷賊有功使臣為三等詔洛苑副使閤門通事舎人賈昌言遷西作坊副使餘轉官減磨勘年有差司農寺言五等丁産簿舊慿書手及户長供通隱漏不實檢用無據今熙寜編敕但删去舊條不立新制即於造簿反無文可守尤為未便承前建議惟使民自供手實許人糾告之法最為詳宻貧富無所隱誠造簿之良法詔送提舉編修司農寺條例司建議者前曲陽尉呂和卿惠卿弟也八年十月二十三日罷手實呂惠卿誌呂和卿墓云君之為曲陽尉㑹朝廷初行免役法他州縣皆莫能推行君首以曲陽户等之髙下役事之輕重第為數等以應令定帥李肅之深善之未及行以憂去服除復考太祖朝通檢籍并令文所謂手實者參之以周官大比之法成書以上欲以均天下之役錢㑹余以參知政事領司農寺事始推行焉宰相韓絳力請賞擢君而君意深不欲余為力辭於上乃不果賞其後異論參差事雖中寢而諸路州縣用以造簿者十已八九而役錢卒賴以均太祖朝通檢簿當考吕惠卿提舉編條例在六月乙未食貨志載和卿獻議今附七月末丙辰詔諸房創立或删改海行一司敕可並送法司及編敕所詳定訖方取㫖頒行戊午中書提舉五房公事主客郎中魏孝先知徐州八年四月二十二日召為司提舉百司此出必有為當為馮京也上批已遣劉忱徃河東與北人議地界今韓縝方使敵慮於敵帳議論有渉今商量事節宜令縝回至雄州先遣王宣齎一行語録赴闕御集九十八巻八年七月五日問王宣元降赴闕指揮乃是沈括非韓縝然此時未差沈括也恐御集或與此不同上又批昨據王韶言本路荒田白草可與稈草相伴飼馬聞洮西以累得雨野草茂盛民間以錢四十市草三十斤比之官場價幾十倍其令制置糧草并轉運司速定價督責吏收買以助邊食二十四日可并此詔提舉永興軍路常平等事太常博士章楶體視環慶路灾傷相度賑濟以聞己未右武衛大將軍梅州刺史世恩襲封楚國公世恩從式第三子楚或作榮詔荆湖北路轉運司相度沅錦黔江口三處置博易場與蠻交易可否以聞後本司委知沅州謝麟相度麟言置務博買則均平物價招撫蠻獠新附之人日漸馴熟永息邊患又下其事三司時章惇領三司亦以為便從之賜河北路弓弩十五萬令轉運司分給諸州軍庚申詔諸路方田令併税物内稈草依舊輸本色可并二十二日賜市易務息錢二十萬緡付定州討樁又賜秦鳯路都轉運司度僧牒二千試監主簿齋郎州助教敕牒三百變置糴本江寜府乞以衙前寛剰錢增給法司吏如因職事取受依轉運司吏法施行辛酉檢正中書孔目房公事太子中允集賢校理許安世察訪荆湖路代俞充也岷州修城畢工賜諸軍特支錢禁軍五百廂軍弓箭手蕃兵義勇三百改岷州縁邉安撫使司為洮東安撫司樞宻直學士知定州薛向言並邊教習卒伍試閲義勇保甲必為賞罰使之勸向今公使庫錢支費不足無以充賞而又募人伺察北邊機事其所募人不畏誅戮者以金帛誘之故也今苟無以給其欲則人莫敢赴欲乞給錢三萬餘緡回易以充其費詔以度僧牒三百賜之癸亥分命輔臣祈雨扵郊廟社稷上批聞河北路有蝗害稼而所在多以未至滋盛不即加意翦撲具次第以聞又批訪聞陳留等縣下户已是闕食縣官又不許百姓披訴多行决罰人情惶擾極為可憂乃詔開封府界淮南路提㸃提舉司遍檢覆蝗旱灾傷甚者具合賑䘏事以聞賜米十五萬石賑給河北西路灾傷參知政事呂惠卿言司農條例所該事目極多欲下諸路令提舉司官各具本路推行新法有無疑慮須合申明及未盡未便事合更改措置或本路已修完改正可以推之别路條具申本寺遍牒轄下官亦許直述所見三月十七日惠卿判司農已有此申請當參考又言諸路州縣見行常平苖役丁産保甲農田水利等事全藉簿書鈎考登耗虚實則其製造不可以無法欲令提舉司各據本路見有簿如何製造闗防具簡徑式樣供申從之已而惠卿獻議曰免役出錢或未均出於簿法之不善按户令手實者令人户具其丁口田宅之實也嘉祐敇造簿委令佐責户長三大户録人户丁口税産物力為五等且田野居民耆户長豈能盡知其貧富之詳既不令自供手實則無隱匿之責安肯自陳人無賞典孰肯糾决以此舊簿不可信用謂宜倣手實之意使人户自占家業如有隱落即用隱寄産業賞告之法庶得其實手實法凡造五等簿預以式示民令民依式為狀納縣簿記第其價髙下為五等乃定書所當輸錢示民兩月非用器田穀而輙隱落者許告有實三分以一充賞其法田宅有無蕃息各立等居錢五當蕃息之錢一通一縣民物産錢數以元額役錢均定凡田産皆先定中價示民乃以民所占如價計錢於是始行手實法食貨志第二巻載參知政事吕惠卿獻此議中丞鄧綰駁之按行手實法實録不記是何年月但於此年七月十九日書司農寺云云亦不記建議者何人今既於七月十九日載和卿建議又於七月末因惠卿令諸路各供簿法即取本志所載惠卿云云附此志又云中丞鄧綰駁之天子是其議則於罷手實法時載之行手實法在七年十月十九日罷手實法在八年十月二十三日詔五路州軍修城畢工令軍器監丞一員同本路監司按視具有無未盡未便利害以聞是月開封府界提㸃司言咸平縣有鸜鵒食蝗蝻
