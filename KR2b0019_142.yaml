body:
  text: 續資治通鑑長編卷一百三十八宋李燾撰仁宗慶厯二年冬十月辛丑朔詔戰沒臣僚子孫若親屬補班行者特給俸壬寅麟府路諸寨都巡檢使西作坊使王凱為并代鈐轄専管勾麟府路軍馬司癸卯渭州言葛懷敏戰沒丙午以右正言知制誥史館修撰富弼為翰林學士弼言于上曰增金帛與敵和非臣本志也特以朝廷方討元昊未暇與契丹角故不敢以死爭爾功於何有而遽敢受賞乎願陛下益修武備無忘國恥卒辭不拜契丹既復修和好有忌弼功髙妄指他事譖弼奉使不了乞斬於都市者上雖不聽而弼深畏恐故每遷官輒力辭云此據弼敘前後辭免恩命辨讒謗劄子但不知讒謗者果何人也據魏泰雜録則王拱辰蓋嘗毁弼於上前然不見他書未敢決信當考詔知廣南諸州代還而道卒者如在官例録其子孫一人戊申樞密院言近遣兵九千九百餘人屯陜府欲令慶州團練使魏進往彼訓練兼充本府部署從之鄜延走馬承受入內髙班劉溫潤為內殿崇班鄜延都監以嘗領兵入西界破蕩族帳特遷之己酉鄜延鈐轄西京作坊使貴州刺史王信為保州刺史本路部署鄜延都監西上閣門使狄青為秦州刺史涇原部署涇原都監兼知原州左藏庫副使景泰為西上閣門使本路鈐轄兼知鎮戎軍皆賞其破賊之功也後三日信及青各兼本路經略安撫招討副使信青並兼本路經略安撫副使實録在辛亥百官表在壬子今附此始賊以兵十萬分二道一出劉璠堡一出彭陽城入攻渭州葛懷敏援劉璠戰崆洞北敗沒賊踰平涼至潘原泰率兵五千從間道赴援而先鋒左班殿直張迥逗遛不進泰斬以徇遇賊彭陽西裨將夏侯觀以為衆寡不敵欲退守彭陽泰不許乃依山而陳未成列賊騎來犯短兵接泰隂遣二百騎分左右翼張旗幟為疑兵賊徘徊不進欲遁去將校請進擊泰止之遣士搜山果得伏兵與戰遂斬首千餘級先是上以西邊諸將數有戰功特召見之環慶都監宫苑副使范全入奏近刺知天都左右廂點兵然未知冦出何路上曰適有邊奏已犯髙平軍劉璠堡可乘驛亟往遂遷禮賔使榮州刺史環慶鈐轄手詔令趣范仲淹麾下起兵赴援全晝夜兼行比至平涼賊已解去全受禮賔榮刺乃十月一日狄青時亦被召會賊冦渭州急乃命圖形以進知秦州韓琦嘗奏本路兵備素少請益軍馬朝廷以諸處未可抽那難於應副詔琦詳度以點到弓手選其少壯刺手背充軍或為保毅弓箭手或别立名額速具利害以聞琦奏曰有唐以前兵出於民而國不費財戰得其用者蓋軍令必行而尺籍有敘也五代多故法制不立乃募黥面以名正軍年祀寖久耳目習熟百姓更不知前代籍民為兵但為刺靣給糧則甘死戰鬬聖朝因舊重改廣置禁卒以安天下以服四夷亦隨時御世不易之良制也自逆昊冦擾西鄙乃於陜西點民為弓手以助防守有警則赴集無事則歸農武藝廢而不修禁約輕而易犯至有父子兄弟疏屬外親或則雇人應名更相為代而官中了不可别每遇上州防托多是結衆逃避以此州郡徒有人數若倚以戰賊適足敗事臣纍陳揀刺土兵自是祖宗舊法今或只刺手背及充保毅弓箭手名目終與民不殊請黥為禁軍人給刺面錢二千無用例物詔從琦請揀陜西弓手悉刺面充保捷指揮仍給例物命既下朝廷復檢會前奏令勿給琦復奏揀刺土兵人皆知為當今之利顧無敢發明者慮生事已有責爾臣不避數十萬户之怨捐軀建言衆情幸已帖然今數十萬人所得之物乃以臣一言故罷豈不取怨益深欲使總此新兵禦戎立事不亦難哉願給例物如前詔從之庚戌轉運司言刺保捷軍凡一百八十五指揮秦州既刺保捷又增收保毅及三千人環慶保安亦各籍置是時諸州保毅總六千五伯十八人為指揮三十一此據本志因刺保捷附見河東河北義勇當慶歷初河北路總十八萬九千二百三十人河東路總七萬七千七十九人皆揀強壯兵抄民丁涅手背為之户三等以上置弩一當稅錢二千三等以下官給各營於其州嵗分兩畨訓練上畨給俸廪犯罪斷比廂軍下畨比強壯此據本志因陜西刺保捷數遂附見辛亥以環慶路都部署經略安撫緣邊招討使龍圖閣直學士左司郎中兼知慶州范仲淹秦鳳路都部署經略安撫緣邉招討使秦州觀察使知秦州韓琦並為樞密直學士右諫議大夫鄜延路都部署經略安撫招討使龍圗閣直學士吏部郎中兼知延州龐籍為左諫議大夫葛懷敏敗賊大掠至潘原關中震恐居民多竄山谷仲淹率衆六千由邠涇援之知賊已出塞乃還帝始聞定川事按圖謂左右曰若仲淹出援吾無慮矣奏至帝大喜曰吾固知仲淹可用亟加職進官仲淹以西師久無功密疏乞賜貶降以謝邊陲辭不受命不聽琦初拜觀察使獨不辭曰吾君方憂邊豈臣子擇官之時乎及仲淹等纍辭未聽琦奏乞并罷所受且言恐不知臣者謂他路辭之為得宜臣則壯年貪受祿位會有詔令琦依樞密直學士立位繫銜琦又言朝廷定著不可以恩亂皆不聽至是乃還舊職又遷其官琦辭所遷官曰臣得還舊職固榮矣賊犯鄰境臣雖督遣援兵實無毫髮之助官不當復遷不聽范仲淹附傳云進樞密直學士右太中大夫尋拜四路安撫經略招討使正傳云仲淹上表言不受所除官職帝不許初欲移仲淹鎮涇原仲淹請與韓琦同經略帝用其言復置四路經略招討安撫使以仲淹韓琦龐籍分領之仲淹與琦開府涇州按此則初除密直諫議時未嘗兼領四路也又按韓琦家傳十月授右諫議大夫樞密直學士十一月與仲淹同為四路經略安撫招討使並駐涇州行狀亦云十月為諫議密直十一月為四路帥而實録乃於辛亥日因仲淹琦籍進官職即書三人兼領四路仲淹琦並駐涇州與附傳家傳行狀並不合又按仲淹讓表稱冬至後一日慶州地震此年冬至乃十一月初二日讓表殊不及兼領四路事則此時必未有此指揮若遂與密直諫議同受讓表不應不略説及也疑行狀所云十一月必得實而家傳所云十二月者琦是月始到涇州爾龐籍修橋子谷寨成降詔奬諭已見四月戊子今與仲淹琦同進官職必以是月已酉王信狄青等破賊功但史所記或疏略又檢籍附傳正傳司馬光墓志並不載籍兼領四路事王圭神道碑略載亦不詳今以仲淹琦附傳仲淹正傳琦家傳行狀及仲淹讓表為據於辛亥日仲淹琦籍進官職下且削去並為陜西四路經略安撫緣邊招討使琦仲淹並駐涇州凡二十二字詔永興軍如四路置部署兼本路安撫使提舉乾耀等州軍馬衛衛州防禦知澶州郭承祜為龍神衛四箱都指揮使嘗有中使過澶州遽延入問管軍闕補何人使者曰聞朝廷方擇才武承祜起挽強自衒左右皆笑已而果有是命癸丑贈涇原路都部署殿前都虞候眉州防禦使葛懷敏為鎮西軍節度使兼太尉諡忠隱子宗晟宗夀宗禮宗師皆遷官妻夀寧郡王氏為河內郡夫人涇原鈐轄知鎮戎軍西京左藏庫副使恩州刺史曹英為華州觀察使涇原都監供備庫使李知和為秦州團練使涇原都監閣門通事舍人趙珣為莫州刺史涇原都監內殿承制閣門祗候王保為左衛將軍賀州刺史涇原都監內殿崇班閣門祗候王文為左龍武軍將軍涪州刺史環慶都監內殿崇班劉賀為右龍武軍將軍嘉州刺史鎮戎軍都監內殿承制李嶽為右衛將軍端州刺史天聖寨主內殿崇班張貴為右龍武軍將軍蜀州刺史西路都巡檢內殿崇班趙璘為右龍武軍將軍漢州刺史涇原路巡檢東頭供奉官楊遵為右驍衛將軍賀州刺史瓦亭寨都監左侍禁閣門祗候許思純為右屯衛將軍潮州刺史籠竿城弓箭手巡檢右武禁姚奭為右屯衛將軍汀州刺史西路巡檢左班殿直閣門祗候李良臣為左千牛衛將軍梅州刺史涇原都監巡檢司步軍監押左班殿直董謙為左千牛衛將軍涇原同巡檢三班奉職唐斌涇原路都監司指使三班奉職霍逹並為太子右司禦率府率懷敏通時事善候人情故多以材薦之及用為將而輕率昧於應變遂至覆軍李良臣四年九月復見慶歷五年三月韓琦疏言李良臣自虜來歸蓋良臣此時實不死也據趙珣傳珣亦不死後沒于虜中甲寅以翰林學士兼龍圖閣直學士王堯臣為涇原路安撫使洛苑使英州團練使內侍副都知藍元用副之始堯臣還自陜西請先備涇原弗聽及葛懷敏敗上乃思其言故復遣堯臣往於是前所格議多見施行復任韓琦范仲淹為統帥實自堯臣發之河東都轉運使吏部員外郎天章閣待制文彥博為龍圖閣直學士知渭州兼涇原路都部署經略安撫緣邊招討使丙辰命右正言知制誥梁適為回謝契丹國信使丁巳賜環州戍卒緡錢有差戊午詔發定州路禁軍二萬二千人屯涇原路人賜裝錢千五百俟至長安更賜千錢庚申詔陳亡將校妻女無依者養之禁中辛酉御崇政殿閲龍衛軍士武藝乙丑詔涇州南有間路自宜祿縣徑至邠州宜令置城寨以守之丙寅契丹遣林牙保大節度使蕭偕來報撤兵本紀云遣使來再致誓書報撤兵按實録不云再致誓書契丹傳又不載蕭偕事今但從實録丁卯涇州觀察使知渭州王沿復為龍圖閣直學士刑部郎中降知虢州坐葛懷敏之敗也沿始教懷敏駐軍瓦亭及懷敏趨鎮戎沿馳書戒勿入第背城為寨以羸師誘冦冦至發伏擊之可有功懷敏弗聽進至定川果敗冦乘勝犯渭州沿率州人乘城多張旗幟為疑兵賊引去先是沿子豫謂懷敏非將才請沿奏易之沿不聽故及戊辰御史中丞賈昌朝上疏言太祖初有天下鑒唐宋五代方鎮武臣土兵牙校之盛盡收其權當時以為萬世之利及太祖所命將帥率多攀附舊臣親姻貴胄賞重於罰威不逮恩而猶仗神靈稟成算出師禦冦所向有功自此已來兵不復振近嵗恩幸子弟飾厨傳沽名譽不由勳效坐取武爵者多矣其志不過利轉遷之速俸賜之厚爾禦侮平患何望於茲然乘邊鄙無事尚得以自容昨西羌之叛驟擇將領鳩集士衆士不素練固難指蹤將未得人豈免屢易以屢易之將馭不練之士故戰必致敗此削方鎮兵權過甚之弊也且親舊恩幸已任軍職者使當為將兵謀戰法素不知曉一旦付千萬士卒之命使庸人致之死地此用親舊恩幸之弊也臣謂守方鎮者無數更易管軍辨刺史以上官秩宜審其所授以待有功如楊崇勳李昭亮輩恩幸之人尚在邊任宜速别選人代之此臣所陳救弊之端也方今邊備之尤切者凡六事其一曰馭將帥古帝王以恩威馭將帥於內將帥以賞罰馭士卒於外故軍政行而戰功集乾德中詔王全斌等伐蜀是冬大雪太祖皇帝著暖帽被貂裘御講武殿氊幄顧左右曰今日此中寒不能御况伐蜀將士乎却脫所服裘帽遣中使馳騎往賜全斌此御以恩也又曹彬李漢瓊田欽祚等討江南召彬立於前漢瓊等立於後授匣劍曰副將而下不用命者得以専戮之漢瓊等股栗而退此馭以威也今命將帥必先疑二非近幸不信非姻舊不委錫與金帛巨萬而心無感悅者以例所當得也蓋向來錫與一皆用例如舉兵之際須特出非常然後可動其心也又陜西四路自部署而下鈐轄都監巡檢之屬軍政必相參謀之未成事已先漏彼可則我否上行則下戾雖有主將不専號令故動則必敗請自今命將去疑二推恩意捨其小節責以大效爵賞威刑皆得便宜從事偏裨而下有不聽令者以軍法論至於管𣙜賦稅府庫之物皆得而用之如太宗監方鎮過盛雖朘削武臣之權然邊將一時賞罰及用財集事則皆聽其自専有功則必賞有敗則必誅此所謂馭將之道也其二曰復土兵今河北河東強壯陜西弓箭手之屬蓋土兵遺制也且北方苦寒沙磧之地惡衣食好馳善射自古御冦却敵非此不可然河北鄉兵其廢已久陜西土兵屢為賊破其存者十有二三臣以謂河北河東強壯除己詔近臣詳定法制外每因閲習則視其人武力兵技之優劣又擇其家丁夫之壯者以代老弱每鄉為軍其才能絶類者籍記其名姓而遞補之陜西蕃落弓箭手貪召募錢物利月入糧俸多就黥刺混為營兵今宜優復田疇安其廬舍使力耕死戰世為邊用則可以減屯戍而省供餽為不易之利內地州縣增置弓手亦當約如鄉軍之法而閲試之其三曰訓營卒太祖朝下令諸軍食無肉衣無帛營舍之門有鬻酒肴者則逐去之士卒有服繒綵者則笞責之異時披甲鎧冒風霜攻苦服勞無不一以當百今營卒驕惰臨敵無勇此殆素所資用之過也舊例三年轉員謂之落權正授者雖未能易此制即不須一例使為部署鈐轄且於其間擇實有材勇可任將者授之又今之兵器多詭狀造之不精且不適用虛費民力宜按八陳之法依五兵之用以時教習之使啓殿有次序左右有形勢前却相附上下相援令之曰失一隊長則斬一隊何患衆不為用乎其四曰制邊陲今邊陲蕩然與中國通北方諸國則臣契丹其西諸國則臣元昊而二敵合從以掎角中國之勢就使西夏來服不免與之重賄是朝廷嵗遺二敵不可勝計古之備邊西則金城上郡北則雲中鴈門今自滄之秦綿亘數千里非有山海峻深之阻獨恃州縣鎮戍爾凡嵗所供贍又不下數千萬以天下嵗入之數才可取足而一榖不熟則或至狼狽也契丹近嵗兼用燕人治國建官一同中夏昊賊據河南列郡而行賞罰善於用人此中國之患也宜度西戎諸國如沙州嘉勒斯賚敏珠爾密桑之族近北如黑水女真髙麗新羅等處皆舊通中國今為二敵隔絶可募人往使誘之來朝如此則二敵必憾於諸國矣敵憾則為備備則勢分此中國之利也其五曰綏蕃部且屬戶者邊陲之屏翰也如延有金明府有豐州皆夏人內附之地朝廷恩威不立撫馭乖方比為強敵脅從而塞上諸州藐焉孤壘蕃部既壞土兵亦衰恐未有破敵之期請令陜西諸路緣邊知州軍皆帶安撫蕃部之名多設方略務在招集財賦法令得以自専擇其族盛而有勞者以為酋帥如河東折氏比庶可為吾藩籬之固矣其六曰明探候古者守封疆出師旅居則有行人覘國戰則有前茅慮無其審謹若此太祖命李漢超鎮關南馬仁瑀守瀛州韓令坤鎮常山賀惟忠守易州何繼筠領棣州郭進控西山武守琪戍晉陽李謙溥守隰州李繼筠鎮昭義趙贊鎮延州姚內斌守慶州董遵誨屯環州王彥升守原州馮繼業鎮靈武管𣙜之利悉輸軍中仍聽貿易而免其征稅召募勇士以為牙爪故邉臣富於財得以養死力為間諜外國情狀無不預知者二十年間無西北之憂善用將帥精於覘候之所致也今西鄙刺事者所遺不過數千錢但略涉境上盜聽傳言塞命而已故敵情賊狀與夫山川道路險易之利勢絶而莫通夫蹈不測之危入萬死之地覘伺微密探索機會非有重賂厚賞孰肯自效乎願鑒藝祖將帥之制邉城財用一切委之専使養勇士為爪牙而臨戰自衛無殺將之辱募死力為覘候而坐知敵來免陷兵之恥也始昌朝館伴契丹使者建言和親辱國而尺地亦不可許朝議欲以金帛啖契丹使攻元昊昌朝曰契丹許我而有功則責報無窮且以我市於元昊昔尚結贊欲助唐討朱泚而陸贄以為不可後知吐蕃隂與泚合今安知契丹不出此邪於是命昌朝報使契丹昌朝力辭因奏此疏原州屬羌敏珠爾密桑二族兵數萬與元昊首尾隔絶鄰道范仲淹聞涇原欲襲討之己巳奏言二族道險不可攻前日髙麗嵩嘗已喪師平時猶懷反側今討之必與賊為表裏南入原州西擾鎮戎東侵環州邉患未艾也宜因昊賊别路大入之際即并北取細腰蘆泉為保障以斷賊路則二族自安而環州鎮戎徑道通徹可亡憂矣後二嵗遂築細腰胡蘆諸寨此年三月己未涇原請於細腰城屬羌地內建築堡寨雖許之竟不聞興役仲淹十月己巳乃有此奏當是為二族所隔未能建築將議討之故仲淹以為不可至四年十二月乃卒城細腰也十一月壬申詔閣門自今契丹使不以官髙下並移坐近前舊例垂拱殿燕契丹使坐在西皇親節度使位少後集英殿大燕在學士少後並近南别行至是蕭偕言北朝坐南使班髙而南朝坐北使位絶下既許升坐偕又言與北朝儀制未同故又遇大燕移參知政事皆在東升契丹使坐自此始御史中丞賈昌朝言王沿節制無狀乞劾問以行典憲甲戌詔罷沿龍圖閣直學士降為天章閣待制昌朝又言沿不當復領近職丙子詔沿落天章閣待制詔比令臣僚薦使臣須較弓馬而久不得引試自今預薦者並遷一資邉上任使庚辰詔涇原路弓箭手屬戶避冦未還者宜令經略司招輯之置登州澄海水軍弩手兩指揮每月給料錢五百文立威遠之下克戎之上知慶州范仲淹言陜西駐泊兵士自今滿三年即乞與添支錢從之辛巳徙知渭州龍圖閣直學士吏部員外郎文彥博為秦鳳路都部署經略安撫招討使兼知秦州刑部員外郎直集賢院知涇州滕宗諒為天章閣待制環慶都部署經略安撫招討使兼知慶州西上閣門使果州團練使知瀛州張亢為四方館使涇原都部署經略安撫招討使兼知渭州先是帝以涇原傷夷欲令范仲淹與文彥博對易遣內侍王懷德喻旨仲淹謝曰涇原地重臣恐不足以獨當願與韓琦同經略涇原並駐涇州琦兼秦鳳臣兼環慶一則夷夏稍安事不率易二則涇原有警臣與韓琦可合秦鳳環慶之兵掎角而進若秦鳳環慶之兵掎角而進秦鳳環慶有警亦可率涇原之師以相應援三則通修環州鎮戎諸寨藉此兩路事力必能速有成功四則臣與韓琦日夜計議選練兵將漸復橫山以斷賊臂不數年間可期平定願詔龐籍兼領環慶以成首尾之勢秦州委文彥博慶州用滕宗諒總之孫沔亦可辦集渭州一武臣足矣於是復置陜西四路都部署經略安撫兼緣邉招討使命韓琦范仲淹龐籍分領之仲淹與韓琦開府涇州而徙彥博帥秦宗諒帥慶皆從仲淹之請也三人分領四路卒不得其日月今因秦慶二州改命帥守并書之余靖奏議亦稱聞己降敇命差韓琦等充四路都部署韓琦范仲淹於涇州駐劄仍差文彥博知秦州則韓琦等為四路都部署必與文彥博知秦州同是十一月辛巳日也實録於十月辛亥日即書三人分領四路巳辨其誤矣初葛懷敏軍敗于定川諸郡震恐宗諒顧城中兵少乃集農民數千戎服乘城又募敢勇諜知賊遠近形勢報旁郡使為備會仲淹引環慶兵來援時天隂晦者十日人情憂沮宗諒乃大設牛酒迎犒士卒又籍定川戰沒者哭於佛祠祭酹之因厚撫其孥使各得所欲於是士卒感發增氣邉民稍安故仲淹薦以自代北作坊副使蔣偕知涇州集賢校理余靖言臣竊聞已降勑命差韓琦等充涇原等四路都部署韓琦范仲淹並於涇州駐劄仍差文彥博知秦州者臣聞兵之勇怯在乎將勝敗在乎氣竊見賊昊侵軼邉鄙以來大戰者三矣延安之役人猶男鬬好水之師陷虜伏中定川之敗不戰而走此皆賊乘屢勝之氣而吾將勇怯之分也臣觀賊昊雖曰小羌其實黠虜其所舉動咸有次序必先翦我枝附壞我藩籬先攻易取之處以成常勝之勢金明之族最近賊庭故先取之豐州之地援兵難集故次取之涇原將帥軟懦故又次取之此乃賊知先後之計也臣竊料沿邉諸郡最富貴者秦州爾賊所以盤桓未敢攻秦州者有三焉邈川尚強雜羌未附而韓琦為守也此賊昊之所畏朝廷之所恃也今可憂者邈川嘉勒族為賊所侵漸已低折一恃去矣其餘雜羌附漢者未必全歸賊者未必誅向我堅者往往族滅而不能救今雖受我封拜賊兵若至其肯出死力而援我乎此二恃去矣若使韓琦且守秦州招懷種落撫以恩信訓勵士卒聳以忠果猶須精擇材勇以為鬬將庶幾完輯三恃使賊有所畏可也今乃専委文彥博許懷德守此一路臣深為朝廷憂之臣亦非敢橫議沮事但以三軍所恃者將爾韓琦數年在邉雖未成功羌賊知名士卒信服今一旦使文彥博代之恩信未洽緩急有難兵將肯用其命乎且彥博新進懷德無聞羌賊固輕之矣今雖以韓琦范仲淹在涇原遙制諸路以為聲援但益秦州之憂爾賊若出其上策以一軍守瓦亭則涇渭之師不得南矣以一軍趨隴坻則岐隴之兵不復西矣以一軍直搗秦州而援兵不至雜羌外附則秦州非我之有也賊若出其下策前驅雜羌志在掠奪則吾之救兵可至勝負未可知也若謂賊輕去巢穴以為不然此所以出我不意也臣以為當今之計不若急遣韓琦兼領大帥歸鎮秦州增兵故關以扼衝要諸路有急不妨應援此最安危之機也益涇州之戍以當兵衝以成輔車之勢一大將居之足矣更宜選擇材勇以代懷德亦最急也賊自倔強已來未嘗挫折若得男將以摧其鋒則庶可屈伏矣朝廷處置大事臣妄言其間甘俟鼎鑊不報壬午供備庫使恩州團練使知貝州張茂實為西上閣門使知瀛州茂實副富弼再使契丹議論雖出弼然茂實亦安重習事故特遷之詔文武臣僚授邉任而輒辭者令御史臺舉劾之甲申以泰山處士孫復為試校書郎國子監直講復平陽人舉進士不中退居泰山學春秋著尊王發微十二篇大約本於陸淳而增新意石介有名山東自介而下皆以先生事復年四十不娶李迪知其賢以其弟之子妻之復初猶豫石介與諸弟子謂公卿不下士久矣今丞相不以先生貧賤欲託以子宜因以成丞相之賢名復乃聽孔道輔聞復之賢就見之介執杖屨立侍復左右升降拜則扶之其往謝亦然介既為學官語人曰孫先生非隱者也於是范仲淹富弼皆言復有經術宜在朝廷故召用之乙酉命樞密直學士楊偕龍圖閣直學士權三司使姚仲孫殿前副指揮使李用和馬軍副都指揮使曹琮並管勾制置軍器司鹽鐡副使林濰鹽鐡判官方偕入內副都知岑守素同管勾之丙戌占城國主邢卜施離值星霞拂遣使獻馴象三己丑降石州刺史向進為崇儀使梧州刺史西京左藏庫副使髙惟和為供備庫副使李禹圭吳從周並為內殿承制閣門祗候郝從政內殿崇班閣門祗候趙瑜並落職坐定川之敗也髙惟和李禹圭吳從周當敗時不見此三人官職名姓孟淵郭綸二人不死亦不見責降韓質胡恩與郝從政俱不赴援質恩獨不責降劉湛與向進俱不赴援湛獨免責降當考辛卯詔知永興軍鄭戩兼管勾陜西轉運司計度糧草公事戩建言凡軍行所須願下有司相緩急析為三等非急切罷去先是衙吏輸木京師浮渭泛河多漂沒既至則斥不中程往往破家不能償戩奏嵗減三十餘萬又奏罷括糴以勸民積粟長安故都衣冠子弟多豪惡戩治之頗嚴甚至黥竄法外人皆惕息詔陜西見屯軍馬宜令四路都部署司相度分其半屯次邉又詔京朝官請侍養而親疾愈者須一年方聽朝參詔以河中府同華耀商虢解陜慶成軍並𨽻永興軍都轉運司甲午以瀘州烏蠻王子得蓋所居為姚州仍令有司鑄印給之初本州言管下溪洞鞏州定州髙州奉州淯州宋州納州晏州浙州長寧州十州皆自唐以來及本朝所賜州額今烏蠻所居族盛旁有舊姚州廢已久烏蠻纍使人詣州願得州名以長夷落故許之其後得蓋又請降黃敕亦許焉乞降黃敕乃四年五月事今并書余靖奏議云朝廷與得蓋州印而不與官得蓋遂作過此事當考乙未貶知邠州東上閣門使馬崇政為衡州司馬坐違經略使范仲淹約束也丁酉徙通判雄州太常博士梁蒨通判德州初契丹使蕭偕入境而接伴未至蒨遂引至京師知諫院田况劾其不俟命故徙之知雄州六宅使忠州刺史杜惟序尋亦徙知滄州坐専遣蒨也及知諫院張方平使契丹還言雄州守將委任甚重惟序雖未能有長才遠略察其識用頗為通審去春已來值邊多事隨宜應副無大曠失臣比在朝聞議者多以蕭偕之來惟序不合専遣通判接伴入界蓋其時北戎已釋兵聞朝廷未弛備戎帳不自安於燕京故遣偕走馬來使又涿州諜報先約定過界日辰詳此事理惟序倉卒處置蓋慮止之别召疑生事爾臣竊觀河北中路武臣守郡者悉出惟序之下其於崇飾厨傳惟序實不足向來雄州守將如葛懷敏輩皆以善承迎得虛譽誤採擢終敗大事若惟序守分務實今乃左遷恐非所以勸邊臣也王克基前在滄州以賄聞顧擢引進使知定州張茂實徒以出使道途之勞自供備庫使授東上閣門使知瀛州王克忠無他勤效近得遙刺知貝州惟序當邉事紛紜之際應接一年事已定而更被責去郡朝廷賞罰旌别於茲有纍伏乞録惟序用心之實不使廢於悠悠之毁得比茂實授一橫行在臣觀之諒未為忝至于任用之間亦望使之以器令得盡其才不報蒨鄆人也録填縣尉賈從政子靖為蘄縣尉荀為郊社齋郎仍賜錢五萬以從政與盜力鬬而死也戊戌詔凡有劫盜入州縣城其長吏都監巡檢令長並劾罪以聞又詔河北見教習義勇宜並放歸田里俟來嵗正旦分作四畨勾集訓練徙青州都監衣庫使賀州刺史王果為永興軍鈐轄十二月庚子朔涇原路安撫使王堯臣言今體量定川之敗其失有四不住瓦亭奔五谷口一失也離開遠堡北不入鎮戎軍由西南直移養馬城二失也自養馬城越長城壕赴定川三失也定川見賊不能盡死四失也其長城壕深闊各五七丈最為險固舊有板橋為賊毁去斷官軍歸路别築道二十四自行賊馬壅定川水泉上流將佐無覺知者而懷敏素強愎其屬諫止多不聽始則貪功輕敵至定川賊衆四集倉皇不知所從遂議南遁使數萬之衆投于死地徑兵利器如委溝壑用兵以來無辱於此望勑邉臣自今深鑒前弊不可更驅士旅以陷敗機也河北都轉運使龍圖閣直學士右諫議大夫張存言河北幸無事願以故官留成德辛丑詔存復為兵部郎中知成德軍徙判成德軍楊崇勳判鄭州壬寅詔兩制舉文武官各一員為武學教授從御史中丞賈昌朝之言也乙已賜渭州崆洞山慧明院主賜紫僧法淳號志護大師法渙法深法汾並賜紫衣行者雲來等悉度為僧初法淳率其徒與西賊戰能護守御書院及保蕃漢老幼孳畜數萬計故賞之壬戌詔韓琦范仲淹龐籍已帶四路招討使其諸路招討使副並罷從知慶州滕宗諒之言也宗諒言自定川喪師朝廷命韓琦等都統四路則逐路帥臣當稟節制其官號不可同稱也癸亥降秦鳳都監崇儀副使馮誥為禮賔副使初誥與都監齊再升同路進兵攻蕃部李宫家族分兩陳鬬敵而不知再升戰沒至是經略司言誥焚蕩族帳甚衆蕃部畏服而再升之死實不相從又無退怯之狀然師出無功故降之誥明年六月復故官乙丑契丹國母遣林牙河西節度使耶律庶成崇祿卿趙成契丹主遣定難節度使耶律寧少府監張旦等來賀正旦是冬宰相吕夷簡感風眩不能朝上憂之手詔拜司空平章軍國重事俟疾損三五日一入中書夷簡力辭復降手詔曰古謂髭可療疾今翦以賜卿又問群臣可任兩府者其寵遇如此夷簡平生朝會出入進止皆有常處不差尺寸一日見上誤忘一拜而起外間歡言吕相失儀漢州人張紘時舉制科在京師聞之曰吕公為相久非不詳審者今大朝會而失儀是天奪之魄殆將亡矣故旬餘遂感風眩云是年冬至不受朝不知所指何日也此據司馬光記聞當考夷簡得疾實録並不書此據本傳按朔歷丙辰夷簡以疾請告上許之癸亥夷簡又以久疾辭中書樞密商量文字詔有大事即與夷簡議之然不載中書樞密商量文字元降指揮是何日又不載拜司空平章重事及翦髭以賜不知何也今但從本傳稱是冬而略其月日須細考之會要十二月二十六日宰臣吕夷簡言所患未痊右手尚難舉忝居重任深不遑安乞罷政事未賜俞允切慮中書樞密院公事稽滯己靣説與章得象晏殊等兩府事並請一靣商量進呈施行乞特降指揮詔答依奏如有大事即與卿同共商量又云慶歷三年正月制宰臣吕夷簡進司空平章軍國重事候疾損三五日一入中書夷簡纍以疾求罷朝廷異數留之也所稱正月與本傳不同當考是嵗天下上戶部主戶六百六十七萬一千三百九十二口一千四百八十三萬一千九百二客戶三百七十六萬四千六百二十六口六百二十九萬二千八百三十三元昊之貴臣葉勒綱朗凌約噶兄弟皆有材謀偽號大王親信用事邉臣多以謀間之網朗凌即旺榮也始旺榮答范仲淹書求和語猶嫚仲淹既去龐籍代知延州乃言諸路皆傳元昊為西蕃所敗葉勒族叛黃鼠食稼天旱賜遺互市久不通飲無茶衣帛貴國內疲困思納款遂令知保安軍劉拯為書賂蕃部頗酬使逹旺榮言旺榮方總靈夏兵儻隂圖內附即當以西平茅土分册之而涇原路王沿葛懷敏亦遣僧法淳持書及金寶以遺約噶會綱朗凌詐使朗密尚竒瑪囊等三人詣青澗城請降种世衡知之曰與其殺此三人不若因以為間命監商稅出入有騎從甚寵又為蠟書遣王嵩遺綱朗凌言朗密等已至朝廷知王有向漢心命為夏州節度使俸錢月萬緡旌節已至趣其歸附以棗綴畫龜喻意綱朗凌得書大懼自所治執嵩歸元昊元昊頗疑綱朗凌二己不得還所治且錮嵩穽中遣教練使李文貴以綱朗凌旨報世衡且言不逹所遺書意豈欲通和乎文貴自言用兵來牛羊悉已賣契丹一絹之直為錢二千五百人情便於和時世衡已去青澗城籍不信其言意虜欲款吾軍止文貴於青澗城數月賊果大入敗葛懷敏於定川世衡傳云李文貴至青澗城世衡以白藉按世衡春時已徙環州以文貴書白籍必非世衡若始謀遣嵩則固世衡也朝廷益厭兵會契丹使者來亦言元昊欲歸款南朝而未敢若南朝以優禮懷來之彼宜洗心自新記聞稱梁適使契丹契丹主親與言按適以十月十七日受命其還朝必在冬末或明年春首按籍自青澗城召文貴至延州遣至夏州又從夏州却回延州必數月事而明年正月賀從勉已來從勉之來又在文貴却回延州後期程太迫然則契丹所言優禮元昊不當是適初聞之契丹主也蕭偕以十月二十六日入見此言或蕭偕所致適歸自契丹亦繼言此故朝廷亟遣適與籍議之其密詔籍招懷元昊必不因適使歸始有此密詔決在前矣今約墓志銘稍刪潤之王圭撰梁適墓志云契丹遣劉六符來報元昊欲納款朝廷命適復聘契丹已而元昊令賀從敏齎表至境上又命適使延州遂定元昊復臣之禮按六符以九月二十五日持契丹誓書與富弼俱來六符之來乃報聘也十月二十六日又遣蕭偕來言撤兵梁適先以十六日受命為回謝契丹使所云回謝蓋指蕭偕非劉六符矣墓志恐誤然亦可見使南朝以優禮招懷元昊實非梁適聞于契丹主劉六符固嘗言之或優禮招懷之言更自蕭偕出記聞審誤也記聞所以誤蓋緣實録所載賀從勉語云南朝遣梁侍郎到北朝今北朝諭西界通和不知北朝欲令西界通和劉六符富弼已先言之梁適往聘蓋申舉前議雖契丹實對梁適遣人諭元昊通和又語適令南朝優禮招懷亦非事實也今載優禮招懷元昊事但云契丹使者來言不指名劉六符及蕭偕以示疑於是密詔籍招納元昊元昊茍稱臣雖仍其僭號亦無害若改稱單于可汗則固大喜籍以為元昊驟勝方驕若中國自遣人説之彼益驕蹇不可與言乃自青澗城召文貴謂之曰汝之先主及今主之初奉事本朝皆不失臣節汝曹忽無故妄加之名使汝主不得為臣紛紛至今彼此之民肝腦塗地皆汝羣下之過也汝犯邊之初以國家久承平民不習戰故屢為汝勝今邊民益習戰汝之屢勝豈可常邪我國家富有天下雖偏師小衄未至大損汝一敗則社稷可憂矣天之立天子者將使博愛四海之民而安定之非必欲殘彼而取快也汝歸語汝主若誠能悔過從善稱臣歸款以息彼此之民朝廷所以待汝主者禮數必優於前文貴頓首曰此固西人日夜之願也龍圖能為言之朝廷使彼此休兵其誰不受賜籍乃厚贐遣之元昊固欲和而恥先言及文貴還聞籍語大喜亟出嵩於穽厚禮之使與文貴偕來月餘文貴復持剛浪凌及其弟旺凌威眀懷沃裕正等書抵籍議和且云如日之方中止可順天西行安可逆天東下籍嫌其不遜未敢復書請于朝詔籍復書許其和而書稱旺榮等為太尉籍言太尉天子上公非陪臣所得稱使旺榮當之則元昊不可復臣矣今其書自謂寧凌或默寧皆夏官中國不能知其義稱之無嫌也詔聽籍言既而旺榮等又以書來欲仍其僭號而稱臣納款籍曰此非邊臣所敢知也而主若自奉表章乃敢逹之朝廷名號正則議易合爾時方議修復涇原城寨籍恐虜猝犯之敗其功故數與其使往反計議抑止其僭亦不決然絶也遣間事諸書不一今酌取其不相抵牾者聨書之龐籍正傳附傳墓志銘神道碑种世衡傳墓志沈括筆談司馬光記聞元昊正傳附傳實録所載賀從朂語皆在是也
