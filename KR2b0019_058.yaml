body:
  text: 續資治通鑑長編卷五十四宋李燾撰真宗咸平六年春正月甲午詔延州保安軍自今有賊界投來人並依石隰州例給廪食補其酋長丙申免靜戎軍漢陽等五鄉秋稅以其經戎冦侵略也契丹奚王知客葉錦來降辛丑以錦為三班借職賜冠帶錢綵壬寅以度支使右諫議大夫梁鼎為陜西制置使屯田郎中楊覃為陜西轉運使左司諫張賀副之賜覃賀金紫又以內殿崇班閣門祗候杜承睿同制置陜西青白鹽事先是鼎上言陜西緣邉所折中糧草率皆髙擡價例倍給公錢如鎮戎軍米一斗計虛實錢七百十四而茶一大斤止易米一斗五升五合五勺顆鹽十八斤十一兩止易米一升粟一斗計虛實錢四百九十七而茶一大斤止易粟一斗五升一合七勺顆鹽十三斤二兩止易粟一斗草一圍計虛實錢四百八十五而茶一大斤止易草一圍又鎮戎軍在蕃界渭州在漢界渭州斗米髙於鎮戎軍二十環州在蕃界慶州在漢界而慶州斗米髙於環州六十粟亦髙三十以日繫時潛耗國用儻不釐革必恐三二年後茶鹽愈賤邉食愈虧撿會嚴信咸陽任村定武渭橋等倉見管諸色糧斛七十九萬餘石請以春初農隙併力輦送沿運其沿邉州軍計所屯兵有一年以上儲備則止以將來二稅轉換支填如不及一年處則以上件糧斛增備年備才足則住折轉然後鹽則仍舊官賣草則止令沿邉於夏秋緣科錢內折納取年支足用又官賣解鹽一嵗必得錢三二十萬貫充給諸軍况今來支用比舊已增一倍儻不速為此計異日匱乏則不惟須截留西川上供物帛縑必須自京輦運供儲矣又言中書喚臣令計度如何輦運科撥夏秋二稅者竊以陜西沿邉除鎮戎保安軍各近蕃界不可大假儲積所須糧草止逐時輦運常及半年已上外其渭原涇三州即西路屯兵之處請令永興鳳翔華儀隴五州人户輦運糧草仍支此五州二稅於涇原渭三州輸送其三州二稅即令輦運鎮戎軍糧草環慶二州即中途屯兵之處請令同耀乾邠寧五州人户輦運糧草仍支此五州二稅於環慶二州輸送其二州二稅並於沿路鎮寨輸送延州即東路屯兵之處請令解河中丹坊鄜五州人户輦運糧草仍支此五州二稅於延州輸送其延州二稅即令輦運保安軍糧草其陜虢商三州請令於永興軍輸送其逐處本州軍所備年支糧草則止令五等以下人户供輸秦鳳階成四州地里稍遙其二稅請令輸於本州如上件三路屯軍處輦運科撥不及一年已上儲備即且留緣江茶引許商旅入中添填又言解鹽自準詔放行任商旅興販減落元價務在利民如聞近日緣邉全少商人貨賣頗令逺郡難得食鹽漸致邉民私販青鹽干犯條禁兼於永興等八州軍原禁地分取便貨鬻不惟亂法抑亦陷人為患既深必須禁止其解鹽貨請勿更通商官自出賣其禁𣙜條件臣當别具經畫詔以鼎狀下輔臣議陳堯叟言鹽禁所利甚博呂蒙正等言鼎憂職徇公所言可助邉費請從之覃賀皆鼎所薦而承睿亦言解鹽事與鼎同故並命焉鼎初建議判三司鹽鐡勾院李士衡獨以為不便奏疏曰安邉莫大於息民今不得已而調斂之又增以轉粟挽鹽之役欲其不困何可得哉且鹽不通商則邉城鹽貴必資鹽於外夷奪農時沮商利而佐外夷調用非策也又與輔臣爭於上前卒不聽今年三月辛亥內出封事付梁鼎疑即此疏但此略而彼詳爾士衡以五年十二月戊寅判鹽鐡勾院六年七月出為湖北漕其間末嘗遷他實録乃六年三月辛亥載判鹽鐡勾院林特奉使陜西蓋誤特實判戶部勾院非鹽鐡也今改正之杜承睿未見丙午遣使齎詔賜豐州龍伊克美克族先是上謂知樞密院王繼英等曰纍覩邉奏言遷賊屢為龍伊克美克所敗今豐州推官張仁圭與藏擦勒族蕃官策木多在京或知其事可訪之繼英等即召問仁圭策木多等仁圭等言龍伊克美克一云莊浪美克其地在黃河北廣袤數千里族帳東接契丹北鄰逹勒逹南至河西連大梁小梁族素不與遷賊合遷賊每舉輒為所敗常以馬附藏擦勒入貢如國家賜以恩命亦資外禦繼英等以聞上曰儻遽賜國信又慮諸族生疑乃令使臣往豐州與團練使王承美叶議招諭之庚戌涇原部署陳興等言博囉齊遣密本族蕃官沁布馳騎至鎮戎軍請會兵討繼遷本軍疑其無文牒遂護送部署司沁布懼而逸馬墜崖死護送者梟其首上曰此即尼瑪之子凡再詣闕朕皆召見之蓋念其父子向化屢敗遷賊爾尼瑪二子沁布其長也次曰吹資克按此編咸平五年夏四月載吹資克為尼瑪弟宋史黨項傳所載亦同此又云吹資克尼瑪子沁布弟與前互異如聞彼方之人悉畏沁布既兩詣闕鎮戎官吏豈不識之乃疑其詐又不能防之以理致令奔遁復梟其首異俗聞之寧不怨憾可遣使乘傳按劾鎮戎官吏仍令渭州以禮葬焉涇原環慶部署並言蕃賊在𨫼子山慮旦暮入冦各請益兵上曰此兩路兵數已倍於去嵗或益之則難於減罷可遣别將領三千騎屯邠州以為聲援賊去即班之亦免饋餉之勞也辛亥廢嘉州採銅場壬子知益州馬知節言李順王均之亂蜀民有為賊黥面及偽署者王師至悉棄賊來歸官釋其罪給公慿遣之其類頗衆今欲各令齎詣州别給新本因得籍數以防姦偽上曰脅從之民屢經赦宥宜諭知節但鎮靜而撫育之丙辰知雄州何承矩言殺敵斥堠軍士奪馬二匹并得敵界新城都監仲文煦牒請徙九村民以避劫掠尋各諭令警備其𣙜場商旅見行貿易不絶上慮承矩輕信或致邉患手敕戒諭之曰汝宜領其來意而辨其姦詐也戊午禁江浙造短狹縑帛詔外命婦遇承天節乞録用子弟者自今不得施行遇大禮陳乞者亦具已奏過人數以聞二月癸亥夔州路轉運使丁謂言黔州之南蠻族頗有善馬請致館設給緡帛每嵗收市從之左屯衛上將軍王漢忠既殁其子內殿崇班閣門祇候從吉詣閣門上書言漢忠自莭度使罷居散秩乞暴其罪以示中外又言羣邪惡直醜正誑惑天聽致臣父寃死願推其人斬于市因歷詆羣臣有行賂樹黨以致聲名及邉防屯戍艱苦蒙蔽不以聞之事上謂王繼英等曰朕覽其書雖無實狀然亦虞朝廷有所未察可召至樞密院俾其伸訴及繼英等詢之從吉但誦書中語它無所對上曰從吉頗引史傳必假手於人不若以屬吏朕念漢忠未葬慮無人主其喪或言漢忠有弟及它子數人皆成立即以從吉付御史獄從吉具伏乃進士楊逄為之辭有司當從吉大辟上不忍置於法甲子從吉除名配隨州逄決杖配春州庚午契丹平州牙校韓守榮等來歸並補三班借職賜袍帶緡帛壬申環州葉勒族慶桑等來貢馬乙亥涇原部署陳興等言咱隴吉布琳山首領斯敦巴遣使稱已集蕃騎願隨討李繼遷丙子賢懿長公主出降右衛將軍駙馬都尉王貽貞按宋史公主傳及王溥傳俱作王貽永此作貞似誤貽貞溥之孫也初名克明於是升其行為溥小子使與諸父聨名賢懿尋改封鄭國己卯以京東淮南水災遣使賑恤貧民踈決獄訟西涼府六谷首領博囉齊遣蕃官吳福勝拉等來貢表言感朝廷恩信憤繼遷倔強纍行攻討奪人畜甚衆繼遷因此數放還投去蕃人今悉械繫以俟朝旨又言繼遷送鐡箭令博囉齊歸附稱已納欵于朝未知虛實博囉齊集騎兵六萬乞會王師收復靈州願改一官及量給衣甲上與宰相議其事呂蒙正言博囉齊為鹽州防禦使請以觀察使授之上曰欲與靈州旄鉞如何頃者契丹偽封繼遷為西平王雖戎人之命不足比數然遽加以王爵蓋虛名也朕常恐繼遷西協諸蕃益煩備禦於博囉齊亦何惜此虛名蒙正請如聖旨庚辰以博囉齊為朔方節度使靈州四面都巡檢使仍遣使齎國信及鎧甲錫之以吳福勝拉為安逺將軍李繼遷子阿伊克從劉榮來降補三班借職賜居第辛巳契丹北宰相親吏劉庭鳳等來降並補三班借職丙戌鄜延部署康進康進未詳等言蕃部伊實族羅莽等持賊遷偽署牒帥其族百餘帳來歸詔以羅莽為本族指揮使喇呼為軍使賜賚有差戊子環慶都部署張凝言蕃部牛羊蘇家等族與賊遷族帳鬬敵其立功首領請第賜茶綵上曰此族在環州側恃險與逺結賊遷為援環州常病之朕纍遣邉吏招諭近聞有志內附尚疑其詐今果與賊遷拒戰則無疑矣賞物可優給之庚寅屯田員外郎盛梁削籍黥面流崖州梁前知普州受賕枉法給部民韓從曮所納田産下御史按劾罪當大辟而父年八十子年十四法當上請又事在五年郊祀赦前故免死焉詔內藏庫專副已下不得將庫管錢帛數供報及於外傳説犯者處斬三月辛卯朔欽州言交州八州使黃慶集等率其屬四百五十餘口歸附詔遣使慰撫之令還本道侍御史知雜事田錫言臣伏覩去秋已來霖雨作沴近畿諸處水潦為災雖聞檢覆蠲免租稅又聞相度低下開掘溝渠憂恤之心似有所濟而利害相半莫知適從古者不奪農時慮妨營種或遇歉嵗即念困窮故有賑貸糧儲除放徭役免令凋瘵不至流亡今國家為少闕軍兵防備邉戍遂於曹單宋亳陳蔡汝潁之間點集鄉村揀選強壯得五七萬人訪聞始降宣命指揮只令在本城防守及至奏聞都數即並抽赴京師昨近臣何以商量如此失信令下民寧無怨望况陛下常好讀書有儒臣時得侍講春秋謂君命無二又曰信不由中諒在聖聰盡逹微旨豈有命令既宣於羣下而誠信不由於厥中若外國差人在京探事事無巨細境外既必盡知知而圗謀邉上未得安靜其所謀之大謂古者以民為邦本食為民天今國家取丁壯為兵已失邦本以災傷去食寧有民天糧儲何止無餘邉備亦恐不濟以此得計以此乘時此外國所謀之大者也其所謀之大者以關西去年秋稼不登京東今嵗春種已失國家營救之不暇廟堂圖慮之未精欲以新集未慣之兵授非才無勇之將僥幸求勝輕敵寡謀此外國所謀之大者也如以自春已來多隂少晴每遇朔風其來數日不定變陽春和煦之令入邉塞動靜之占臣不曉占書不知兵略但以經史所言之事求災祥可見之徴以愚意裁量望聖慈採納雖兵者凶器不得已而用之民為邦本不得已而取之今五七萬人並離農畝日近更差使臣揀點豈無物議憂虞以災沴之餘冦盜若起適足為戎人之利有勞宵旰之懷檢災傷乃是虛名行賑貸且非實事斯乃今日之務最急也非時之患可憂也臣謂非十年不足以聚畜財貨非十年不足以生育黎元二十年間治之得其宜則無慮治之失其宜則有患非二十年尚未能畜聚財貨生育黎元况臨事欲制置乎望陛下思今日之急務慮非時之所憂示信以結之善謀以成之若信不由中事出慮外必恐國家多難自今日始臣受先帝拔擢不敢不言臣受陛下指揮不敢不奏錫自注云咸平六年三月一日奏今附本日差使臣揀點曹單宋亳陳蔡汝潁丁壯更當詳考壬辰以密本族首領錦州團練使尼瑪領鄯州防禦使至靈州河外五鎮都巡檢使先是上謂輔臣曰尼瑪與博囉齊同力討賊族帳密邇河外近又遣沁布逺告事宜不幸而死可特與轉改令與博囉齊犄角宣力故有是命石隰都巡檢使髙文岯言綏州東西蕃部軍使葉錦等百九十五口內屬初大理寺丞黃宗旦言潁州陂塘荒地凡千五百頃可募民耕殖即命宗旦往經度之部民應募者三百餘户詔令未出租賦免其徭役且欲宗旦終其事甲午以宗旦通判潁州環州言蕃官蘇爾薩南擊賊有功及屢告賊中機事癸卯以為臨州刺史賜錦袍銀帶有司言慶州克勝等軍亡沒者承例取子弟以代所乘馬死則責其自市故多至逃竄詔自今亡者募人補之闕馬者官給之左司諫直昭文館种放再表乞暫放歸山詔許之丙午特受起居舍人將行宴餞於龍圗閣又詔三館祕閣官宴餞於瓊林苑上賜七言詩三章在坐皆賦辛亥內出封事云臣聞安邉陲定禍亂無出於和人心而正師律實倉廪興饋運無出於惜民力而施號令當今大要實在于兹臣竊謂去嵗醜敵生妖靈州路絶陛下遍詢有位俾獻良籌始皆剋定妖氛終則陷失疆土臣以為此蓋主將無智漕運不才何者若主將有奪人之心漕運有先見之略則料敵制勝必兆深謀弭患平戎不墜姦計矣何以言之去嵗大兵已至邉界疑惑不前致賊先擊靈州斷其道路遂使救兵不至信候不通此主將之無謀也經度糧草集便資儲當使民庶靡勞冦戎不測而張皇事勢明揭榜云限二十五日裹糧取靈武一郡老幼是致賊輩明知事實併力攻圍此漕運之不才也成事不説今固已然來者可追請陳其要臣今又覩命度支使梁鼎等往陜西制置者有以見陛下憂勤蒸庶采擇芻蕘然事理之間有所未便臣若不論利害密逹聖聰異日河西稍失安寧關右復須勞役支吾不暇兵革大興則臣懼此時天必垂咎臣竊聞欲令邉上同近內州郡同其價例貨鬻解鹽此議儻行必招深悔蓋蕃情民意惟利是圗或稍失隄防必共為姦弊臣伏見鄜延環慶儀渭等州未禁青鹽之時每一斤不過十五錢百姓皆食洎禁青鹽客旅入中芻粟運解鹽於邉上貨鬻其所鬻之價與青鹽不至相懸是以百姓樂食賤鹽須致畏法至今蕃部難賣青鹽今若運解鹽赴邉與內地同價則邉民必須冒法圗利却入蕃界私販青鹽乃助遷賊而結民怨矣書云民惟邦本本固邦寧若邦不寧求邉鄙無事不可得也伏望陛下特開聖斷詢問輔臣以安邉為逺圗以恤民為大計審詳利害無失事機詔下其章付梁鼎等條對以聞鼎等言竊以關中郡縣控接河西逺近宿兵不下十萬比約諸郡公錢充費一年計以七十萬五千餘貫仍自去嵗以來諸州支發淨盡劉綜纍奏乞自京般錢三十萬以給邉費上封者不許此患妄騁瞽言但譏變法之非曽乏贍軍之術殊不知自古帝王何嘗不取山澤之利為軍國之資伏望陛下遍召上言之人各訪贍邉之䇿儻遷賊未滅十州軍支用不充則如何畫謀以備供億茍有䇿則請無禁鹽若但抗虛詞工為沮議願加懲責以戒羣倫於是鼎奏罷陜西轉運使劉綜綜歸朝亦密陳其非便上以鼎等封執前議謂必有成故不復詢問既而鼎至關右制置自為矛盾始請運咸陽積粟以實邉而嵗久不堪兵食復請假貸於民俟秋成使納新粟朝命不許又言俟至邉郡斡運資糧有備則請行鹽禁洎乘傳至解池即移牒禁止約束乖當不為吏民所伏旋有運鹽赴邉公私大有煩費而沿邉頓無入中物論紛擾於是命判户部勾院太常博士林特與知永興軍工部侍郎張永詳議其事以聞乙卯宰相呂蒙正上言近臣期功之喪所給賻贈乞令寢罷詔不許環慶都部署張凝言內屬戎人與賊界錯居屢為脅誘臣領兵離默伯鎮由新開路徑至八州原下寨招降得沁揚等三十三族又從淮安鎮入分水嶺招降得瑪默特等三十一族又至柔逺鎮招降得楚密克等二十族遂抵業樂招降得珠蘇威家等百族合四千八十户第給袍帶物綵慰遣還族帳凝以功就加寧州團練使原州熟户裴天下等言伊特古等帳附李繼遷請帥族兵掩擊之來求策應部署司不報上以戎人宣力禦冦不應沮之即詔諸路給以精甲五臺山僧言靈境寺門閉訖自開旦有履迹三十二於庭上曰此甚怪事然彼方人謂有此即嵗稔民安亦可尚也權知開封府冦凖言見闕軍巡判官乞選曽一任判司簿尉人材優者充候滿三年與京官親民差遣從之夏四月壬戌禁蠻人市牛入溪洞夔州路轉運使丁謂峽路都監侯延賞等言髙州義軍務五姓四甲頭角田承進擒生蠻六百六十餘人獲器械六百餘奪所略漢口四百餘人各付親屬訖詔立功軍丁溪洞首領並優與遷改給賜初田彥伊既輸兵甲誓不犯邉而溪南生蠻有背約者謂與延賞權知施州冦瑊等謀遣承進率衆及發州兵擒獲之焚其室廬皆震懾伏罪乃置尖木寨於施州界以控扼之自是冦抄貼息近溪洞田民得耕種矣冦瑊傳云溪南蠻內冦瑊率衆擒其首領戮之以白艻子弟數百人築柵守其險要蓋此事也實録但書侯延賞而會要亦無延賞名今參取增修庶不沒瑊之功為祥符中除東川漕張本乙丑令河北轉運使副兼羣牧事先是自京師發禁旅戍河東數不足則取州兵材勇者補之十不得四三又行伍弗整校長冗多去嵗以義軍分𨽻州兵之籍帥臣請增補如舊制於是命西京左藏庫副使張延禧乘傳料簡得萬三千餘人立為神鋭二十四指揮神虎十指揮常加訓習焉張延禧未見洪德寨主假守倫言李繼遷入冦蕃官慶桑洎伽哲慶等族相與角鬭本寨出兵應援敗走之生擒四十九人墜崖死傷者甚衆獲馬七十一匹旗鼓鎧甲五百六十餘上取陳圗令入奏使者指陳其狀且言慶桑等與賊對陳而洪德寨相距千餘步慶桑等慮其不辨生熟户亟止之自帥部族轉戰繼遷遂敗上曰是雖假王師以張勢援而交鋒掠獲慶桑等功也悉以所獲與之仍加賜賚第給寨兵緡錢以慶桑領順州刺史本族都首領伽哲慶領羅州刺史餘遷秩有差丙寅詔民祠嶽者自今無得造輿輦黃纓繖茜鞍帕及糾社衆執兵違者論如律庚午徙知益州西上閣門使馬知節知延州兼鄜延駐泊部署命鈐轄楊懷忠轉運使黃觀權同知益州知節在成都有訟龍騎卒謀變者支引千數知節密捕其黨按實止誅為魁者七人餘悉不問自乾德平蜀每嵗上供紈綺動踰萬計籍里民補牙校部舟運由嘉陵抵荆渚沈覆殆半破産以償者甚衆州民患之知節請擇廷臣省吏二十人凡舟十二艘為一綱以二人主之三嵗一代而較其課自是鮮有敗者承冦亂之後戢兵撫俗甚著威惠然嫉惡太過兵民有犯多徙配它境人頗怨懼朝議務安逺俗恐知節不協蜀人之情以其素有武幹故移守西邉仍手詔諭以委屬之意荆湖北路轉運使王挺與夔州路轉運使丁謂同規度蠻洞事互相違戾朝議從謂之請先是殿中侍御史任中正按盛梁獄梁坐竄流既而有與梁善者不喜也時中正判三司慿由司於是命中正出使代挺徙挺西路舊制士庶家僮僕有犯或私黥其面上以今之僮使本傭雇良民癸酉詔有盜主財者五貫以上杖脊黥面配牢城十貫以上奏裁而勿得私黥涅之禁私涅面實録在後月今從本志先是博囉齊屢請王師助擊賊時議以西涼去渭州限河路逺不可預約師期於是博囉齊復遣使多卜壘來貢且言六谷聚兵願會王師討繼遷仍請授次首領烏磋等七人官上曰繼遷常在德錦三山之東每來冦邉及官軍出則已遁去使六谷部族近塞捍禦與官軍合勢亦國家之利茍以為難必不敢復有陳請將失其歡心矣乃詔烏磋等七人並授懷化郎將所請會兵如至烏白池鹽州以來即為進師甲戌給西涼州印從知州侍禁丁惟清所請也乙亥參知政事王欽若上言桂州通判太常博士王佑之近丁母憂才及踰月連進五狀請除廣南西路商稅分配河北補填沒納私下羅錦權罷上供金銀述荆南課額逋虧言陜西遞鋪請受凡兹陳露皆匪機宜殊忘哀戚之容茍懷進動之意陛下方施孝治以厚民風望加黜責以朂有位詔削佑之三任配𨽻郴州仍令御史臺榜朝堂告諭丙子契丹入冦定州行營都部署王超遣使召鎮州桑贊髙陽關周瑩各以所部軍來援超先發步兵千五百人逆戰於望都翌日至縣南六里與敵遇殺戮甚衆副部署殿前都虞候雲州觀察使王繼忠常以契遇深厚思戮力自效與敵戰康村自日昳至乙夜敵勢小却遲明復戰敵悉衆攻東偏出陳後焚絶糧道繼忠率麾下躍馬馳赴素衒儀服敵識之圍數十重士皆重創殊死戰且戰且行旁西山而北至白城陷於敵超等即引兵還定州遣使入奏辛巳上始聞繼忠敗詔發河東廣鋭兵一萬五千由土門趨鎮定以援之賜望都戰傷軍士緡帛左衛上將軍信國公祐孝恪敏悟為上所鍾愛及被病司天言月犯前星庶子星上憂之屢設齋醮祈禳是日卒才九嵗追封周王諡悼獻後十五日皇子生兩月者亦不育上乃取宗室子養之宫中周王既薨真宗取宗室子養之宫中范鎮云當考成都闕守朝議難其人上以工部侍郎知永興軍府張詠前在蜀為政明肅勤於安集逺民便之甲申加詠刑部侍郎充樞密直學士知益州民聞詠再至皆鼓舞自慶戊子河西內屬拉爾結瑪等三族請以兵千人馬三百備征討詔嵐州撫諭之己丑廣南西路轉運使馮璉言交州民四百餘户來投欽州至海岸即準詔慰諭遣還本道詔文武官以孫姪為子求蔭敘者坐之仍許諸色人告先是鄧州觀察使判并州錢若水被病會有機事當至府州若水將力疾以往上聞亟止之遣中使領太醫往視俄小瘳遂羸瘵上手詔諭使勉近藥物且曰豈止朝望所屬抑亦慰母氏之心也五月庚寅朔召錢若水歸京師命兵馬鈐轄李允正權知州事詔在京官物可備二年者勿收市以息勞擾仍命吏部侍郎陳恕裁其數河東轉運副使鄭文寶上言管內廣鋭兵萬餘難得資糧請徙置近南諸州又欲令強壯户市馬以備征役詔中書樞密院參議李沆等以為廣鋭皆州兵本州置營必慮安土重遷徙之即致紛擾又強壯散處村落無所拘轄勒其市馬亦恐非便上復令文寶條對文寶固執前奏且言土人久留恐或生事上曰前令團併軍伍改創營壁欲其互移本貫行之已久而文寶確陳其利因命錢若水詳度以聞若水所對與沆等同遂罷之辛卯定州部署王超言契丹出境先是詔髙陽關部署周瑩率全軍寨于寧邉軍及瑩至則敵已退瑩即還屯所上曰瑩為大將何不持重少留使敵無以窺測乎時王超兼總北面三路兵諸將皆受節度瑩獨貽超書言本路甲馬非詔旨不可興發超慮報以公牒則失輯睦之義因表上其事上嘉超憂邉思職手札褒諭之癸巳詔權停貢舉甲午遣使安撫河北荆湖北路轉運使王贄言近溪洞田先以蠻人侵擾禁其墾植今邉境安靜民復耕蒔已遣官檢括置籍請令依舊輸租詔蠲常賦之半贄華陽人也乙未以吏部郎中兼侍御史知雜事田錫為左諫議大夫太常博士劉綜為工部員外郎兼侍御史知雜事仍遣中使諭錫曰第安心著述必無差出欲升殿者聽先奏尋又命錫兼史館修撰綜嘗言天下州郡長吏審官皆據資例而授未為得人自今西川荆湖兩浙福建廣南知州或地居津要或户口繁庶之處望親加選任其執政舊臣及給舍以上知州處亦擇通判又京朝官當任逺官者率以父母未葬為名妄為規免請自今如父母實未經葬者許請告營辦審官投狀並明言父母已葬即許依例考課敢詐妄及違者並罷其官從之丙申罷雄州𣙜場時敵數入冦或言牒者以互市為名公行偵伺故罷之先是吕蒙正暴中風眩上即臨問賜白金五十兩既逾浹旬疾未愈蒙正表求罷相詔不許上以王繼忠實戰死丁酉贈繼忠大同節度使兼侍中録其子懷節為崇儀使懷敏為崇儀副使懷德為內殿崇班懷正為供奉官又贈定州路承受殿直尹能為如京使望都縣監押殿直李勳為供備庫使縣尉吳讓為太子中舍餘死事者第追贈焉唐龍鎮上言鎮有貿易于府州者為州人邀殺盡奪資畜庚子詔府州自今許令唐龍鎮民互市常加存撫環州白馬族與李繼遷拒鬭族帳屢徙乏食丙午詔以禾粟賜之又徙洪德寨內屬蕃部於寧州界刑部侍郎魏庠坐罰知河南州斷獄失入責授衛尉卿西面部署司言李繼遷與其子阿伊克聚兵浦洛河聲言入冦命諸路嚴斥堠整軍旅如冦至鎮戎軍則環慶出兵深入以撓其勢至洪德寨則環慶亦如之會要在八月今從實録壬子録望都戰沒將士子孫仍厚賜其家環州虎翼軍士魏瓊等四人前為李繼遷所掠至是遁歸且言繼遷在靈州東三十里東關鎮樹柵居之所部人騎約三萬去嵗傷旱禾麥不登又引河水溉田功畢而防決凡執役者有小過則繫頭投於河令人就下流接視蕃人則援以出漢人則否銀夏州民衣食稍豐者並西徙蕃落數年薦飢道殣相望下多咨怨詔賜瓊等袍帶緡錢第補小校隊長望都失利上語近臣曰用兵固有勝敗然此戰頗聞有臨陳公然不護主帥引衆先遁者今未能偃兵若不推窮將何以懲後苟盡置于法人必懷懼當治其情理難恕者三二十人或得中道乃命宫苑使劉承圭供備庫副使李允則馳驛按問上曰承圭峻急允則和易朕欲其寬猛相濟耳癸丑霸州防禦使鎮州副部署李福坐削籍流封州拱聖都指揮使王升決杖配𨽻瓊州因降詔戒勵諸路將帥甲寅度支使陜西制置使右諫議大夫梁鼎坐改作非便詔書切責罷守本官從張詠等議解鹽復許商販如舊呂蒙正再表求罷詔不允命李沆諭旨翌日蒙正復上疏優詔止之遣內侍張景宗齎手札勞問及以名藥上尊酒賜焉乙卯邠寧環慶部署言準詔築大落門乾川寨畢功賜名肅逺知廣州凌䇿獻海外諸蕃地里圗京城疫分遣內臣賜藥自望都之失利也上日訪禦戎之策或言楊嗣楊延朗久戍邉練武事遂詢以謀略而所上不適機要因命兩府會議各以狀聞或請合鎮定髙陽三路兵據衝要或請令三路分兵扞禦或請以鎮定兩路兵陳於定州之北又徙髙陽兵於寧邉軍仍别設竒兵於順安軍控扼強壯備城彌縫其闕上總覽而裁定之
