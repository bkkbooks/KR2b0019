  - {type: page-break, offset: 0, content: '', id: KR2b0019_WYG_259-1a, image: WYG0318/WYG0318-0337a.png}
body:
  text: 續資治通鑑長編卷二百五十五宋李燾撰神宗熙寧七年八月丙寅朔鄜延經略使趙卨言秋稼不登欲不候民訴放稅及自冬初日給闕食弓箭手常平米人一升半不足於省倉借給從之并詔近縣城寨秋田未成者亦優加賑濟上批提舉市易司奏市易二年收息錢九十六萬餘緡纍凖朝旨已支九十五萬緡可契勘何月日指揮支往何處訖無行遣朱史削去以為支撥息錢不合書新本亦削去今復存之此亦可見市易司為欺也詔軍器監於諸路州軍除知縣外許不拘常制選官計會轉運司剗刷州縣牛皮筋角如能點檢失陷及擘畫拘收數多者等第酬奬朱本有此新本以為一時指揮削去都提舉市易司言奉詔支息錢二十萬貫付定州安撫司封樁欲兊三司京東折斛錢差使臣運致以往詔知定州薛向如欲以京東錢就本處擘畫轉物貨即依都提舉市易司所申奏朱本有此新本以為一時指揮削去丁卯詔瀛州以省倉糧三萬石博買絲綿匹帛賜河東轉運司絹十萬市糧草前知合州比部郎中劉嶠與堂除前知懷安軍駕部員外郎黃沐令轉運司劾罪以梓州路察訪熊本言嶠議役法不為暴橫所奪纍有申請皆可施行沐根括居民引簷錢以資公使故也新本從朱本削去今存之江淮發運司言淮南轉運司嵗計已辦及量減外少數尚十七萬七千餘石乞蠲減詔放七萬石餘許次年補填詔自今進奉蠻舊借役人馬者給遞馬如不足以免役錢差雇戊辰詔募真定府邢洺磁相趙州闕食流民修城壕真定府委守臣孫固餘委轉運判官李稷提舉仍半月一具已興修次第及支錢糧數以聞己巳皇城副使兼閣門通事舍人知階州劉昌祚為西京作坊使走馬承受內供奉官徐禹臣為供備庫副使寄資賞討階州峯貼硤隆博族蕃部之勞也昌祚先為秦鳳路都監知甘谷城張詵將開邊遣侍禁王世文往階州峯貼硤集蕃酋犒設而誘説之衆疑曰是欲表裏熙河取我地爾即嘯聚大羅蘇木嘉族攻焚峯貼硤寨殺寨官軍民邊堠甚急詵憂懼不知所為即表乞昌祚知階州昌祚至遂討平之以功轉皇城副使於是進討疊州改作坊使此據張舜民志墓昌祚有不許他路兵就熙州改刺奏請當檢附詔淮南東路災傷州軍巡檢縣尉令本路監司不拘常制奏舉候豐嵗如舊又詔河北轉運使同外都水監丞司相度減省河上冗占官吏以聞朱本削去知開封府兵曹參軍兼刪定司農寺條例吳安持言昨同吕嘉問許定行户條貫續差孫永體問利害供析事狀不無異同乞罷知兵曹參軍從之崇政殿説書吕升卿言淮東民所出役錢差重甚有願減錢應募之人尋召五十八人者專勾當諸場務嘗奏一路依此施行乞付轉運副使俞充相度仍兑糴發運司許糶上供米三十萬石與本路闕軍糧處令轉運司依價撥還從之此可見升卿舍講説而言財利事也新本削去今存之庚午右武衛大將軍仲綰領開州團練使仲瑝榮州團練使右監門衛大將軍仲真領文州刺史並以學士院召試中等也光祿寺丞陳象古上書言所生母董氏嫁為孫氏婦迫於飢寒願許歸臣家詔開封府審問仍給以緡錢詔知成都府蔡延慶兼提舉戎黎州買馬其合選舉官具名以聞詔監司每半年一具有無措置改正事及保舉發摘屬官申中書考察如有可以施行即下所司令遍關所屬從河北轉運判官吕溫卿請也詔蠲廬蘄等州民所欠熙寧五年秋六年夏免役錢州縣嘗於不當役之家例使均出者速改正除放賜知鳳翔府光祿卿劉襲禮奬諭敕書襲禮須城人以應副熙河軍須九十萬有勞故也襲禮傳元豐二年八月辛未詔鄜延環慶州保安軍民闕食者其夏稅已蠲減外更權倚閣壬申詔河北非災傷州縣並排保甲監司其務勸誘習四種武藝農隙閲試户四等以下官給弓弩軍器監勘會相度以聞罷諸路剗刷錢帛官先是上批問三司見差是何官在淮南剗刷錢帛中書言司門郎中王道恭太子中舍趙鼎詔罷之朱史削去今復存之上批據御集增入秦鳳路轉運使熊本言夔戎二州舊無邊事守令惟用武人吏民病之乞自今並選文臣從之癸酉詔前權京東路轉運判官太子中舍王子淵送審官東院差通判洋州坐擅於密州置市易務借官錢市乳香也蘇轍龍川略志云熙寧中王子淵為京東轉運判官知密州海舶多私販乳香即明召舶客入官中以賤價收之自以為竒言於朝廷中書户房檢正官向宗儒得之喜曰此法所禁子淵為監司知人犯法不能禁而出錢買之此罪人也子淵既得罪香皆沒官一時以為竒䇿元祐初販香者訴之朝廷令户部支還七分錢議者以為過猶不及也甲戌詔岷州將官皇城副使劉惟吉領英州刺史內藏庫使孫真並為皇城使隊將以下各第遷及減磨勘年賞討蕩岷州擾邉蕃部之功也詔京西轉運司具賑濟流民事狀司農寺具所興修農田水利次第大禮使韓絳乞差檢正中書禮房公事向宗儒提點南郊事務從之其後每遇大禮從中書選差官兩員通管或只差一員丙子詔久旱禱雨未應其令長吏躬禱嶽瀆聞涇原環慶鄜延路自七月後得雨其闕麥種者官貸之官無麥種即借錢糴詔涇原環慶鄜延永興秦鳳等路轉運司同帥臣議抽減緣邉軍馬從之內地或住營州軍以弓箭手代之陜西諸路闕食故也又詔聞鎮趙邢洺磁相之民南涉者人數不少可令河北西路轉運常平倉司疾速具見令賑濟次第以聞此據御集賜夔州路轉運判官董鉞緋章服轉運使孫圭奬諭敕書銀絹二百知施州冦平前卒賜其家銀絹半之餘減磨勘年有差以熊本言鉞等招諭施州蠻田忠現等有勞也樞密院進呈入內供奉官保州廣信軍走馬承受公事任克基奏體量得廣信軍𣙜場北客算請行貨急速及皇城使知廣信軍王臨殿中丞通判廣信軍路拯奏本軍𣙜場北客近來入納行貨稀少算請行貨比舊日稍似緊急并據定州路都總管兼安撫監牧使薛向奏體量得廣信軍𣙜場見今北客買賣並依常例兼比算得見今錢物却少如遞年别無急要大假結計還錢數詔王臨路拯任克基所陳與體量事實各有異同王臨路拯令河北西路轉運司任克基令開封府並勘罪以聞此據時政記八月九月事今增入丁丑賜環慶安撫司度僧牒千以備賑濟漢畨飢民也兵部郎中集賢殿修撰張芻為遼主生辰使皇城使忠州刺史石鑑副之屯田郎中權管勾三司開拆使韓鐸為正旦使內殿崇政班王謹初副之知制誥章惇為遼國母生辰使引進使忠州團練使苗授副之衛尉少卿宋昌言為正旦使西京左藏庫副使郭若虛副之授辭疾改命引進使周永清永清又辭以母病改命東上閣門使李評既而惇為察訪命知制誥許將代之時敵以兵二十萬壓代州境遣使請地嵗聘使多憚行將獨欣然承命張芻請代州事詔答以不知將入對曰臣備侍從朝廷大議不容不知北人度臣不敢及代州事言稍相侵不有以折之則傷國體即詔詣樞密院閲文書遂為例及至敵館伴蕭禧果以代州事問將將屢屈之乃不敢言此據將本傳增入更須考詳太常寺言大駕鹵簿五輅之副各陳於後謹按周禮車僕凡師共革車各以其萃釋者謂諸萃各從其元則諸輅之副宜次正輅又革車本前代宫中所乘五牛旗蓋古之五時副車也以木牛載旗用人輿之失其本制二者謂宜省去並從之詔編修敕令刪定官大理寺丞丁執禮升一任以編修嵗計成書也戊寅詔京西路安撫司流民依乞人法日給口食至九月止不足以常平米充又詔成都府利州路轉運等司賑濟飢疫具次第以聞己卯提舉編修司農寺條例司請新增縣丞主簿就充給納官從之遣勾當御藥院李憲往相州賜韓琦詔書湯藥此據御集必有所為當考或無他則削之庚辰檢正中書五房公事李承之言在京臣僚所請添支食錢等皆輕重不均及所給人從亦無定制以至吏祿多寡皆當著為通法詔承之與孔目房檢正官刪定辛巳詔開封府界所放秋稅及五分以上户其去嵗秋稅及佃牧地租並權倚閣上批真定府邢洺磁相趙州流民日過京師而磁州之數尤多雖屢詔當職官司賑濟都不見施行次第可令轉運等司速具析以聞參知政事呂惠卿言常平錢糧並據願請成貫石給納日收息二分如願以糧銀絹絲綿紬布折納者聽元請糧納本色者每石息毋過二斗給納並約中價物少不盡其錢貼錢以納錢少不盡其物餘錢聽給其第三等以下户免役錢願折納者凖此從之壬午命翰林學士兼侍讀學士元絳權三司使絳乞免赴講筵從之權户部副使太常少卿賈昌衡兼都提舉市易司大理評事編修司農寺條例刪定官吳安持為太子中允兼權發遣同提舉市易司翰林學士行起居舍人權三司使曽布落職以本官知饒州都提舉市易司國子博士呂嘉問知常州軍器監獄具布坐不覺察吏人教令行户添飾詞理不應奏而奏公罪杖八十嘉問亦坐不覺察雜買務多納月息錢公罪杖六十而中書又言布所陳治平財賦有內藏庫錢九十六萬緡當於收數內除豁布乃於支數除之令御史臺推直官蹇周輔劾布所陳意欲明朝廷支費多於前日致財用闕乏收入之數不足為出當奏事詐不實徒二年而有是命魏繼宗仍追一官勒停初市易之建布實同之既而揣上意疑市易有弊遂急治嘉問會呂惠卿與布有隙乘此擠布而議者亦不直布云周輔雙流人也癸未翰林侍讀學士楊繪陳繹並為翰林學士已而知制誥兼知諫院鄧潤甫言嘗論陳繹過惡今繹除翰林臣適當制乞令以次當制官撰辭詔罷繹命先是潤甫嘗言鄧州卒陳美齊貴夜入州廨與婢姦殺繹子及其婦繹自見閨門狼籍一切寬貸庇覆鄧州所劾與轉運司奏不同乞遣官覆案故也龍圗閣待制權御史中丞鄧綰兼直學士院綰代繹乃甲申日事今并書殿中丞王圭為監察御史裏行未幾圭卒詔賜其家錢百千以御史中丞鄧綰乞加賜恤也命知制誥直學士院章惇為河北西路察訪使正月二十七日曽布察訪西路惇必是代布此月二十日改命沈括光祿卿直昭文館知荆南潘夙知鄂州從其請也從請據朱史當考知諫院鄧潤甫言近制試刑法者並許離任緣知縣縣令所總事繁多及推行新法不可闕人自今知縣縣令不許赴試從之詔知州通判如遇接送北使雖有服並暫許聽樂如知州武臣在父母服即許申安撫司權差官發遣提點編修司農寺條例司呂惠卿言常平錢穀並於民闕乏時月作一料給散陸田多處以二月水田多處以三月為限隨秋稅起催限年終納足入十二月不納者依欠稅法如蠶麥豐熟許隨夏稅催納毋得過半限滿不足者勿給後料其依條倚閣者不在此限從之詔諸路監司訪名山靈祠委長吏祈雨又遣輔臣告於中太一宫天章閣待制周孟陽卒詔官其女壻又例外官其一孫聞其家負官錢并息數千緡悉除之甲申詔權發遣梓州路轉運使陳忱遷一官權發遣轉運判官呂開升一任以應副瀘州夷事有勞也閣門通事舍人狄詠為西上閣門副使王韶言詠戰洮西有功也詔御史臺推直官職方員外郎田曽降一官京西轉運使吳幾復轉運判官曾伉提舉常平等事胡宗師各罰銅十斤提點刑獄陳世修赴闕幾復等案權知唐州虞部郎中蘇涓失點檢兵馬司存留修召渠卒及妄費公使錢事涓不服訟久不決遣曽就州置獄涓又訴監司捃托誣罔不實曽不并治乃令審刑院大理寺以涓等事狀取旨時既絀曽等涓所坐杖六十罪以赦原丙戌命知制誥沈括為河北西路察訪使代章惇也先是遣內侍籍民車以備邊人未喻朝廷之意或相驚擾又市易司患西蜀井鹽不可禁欲盡填私井而運解鹽以足之二事言者牆進未省括時修起居注上顧括曰卿知籍車之事乎括對曰知之上曰卿以為何如括對曰未知車將何用上曰北人多馬常以此取勝非車不足以當之括曰審如此萬一敵冦至老稚墳墓田園室廬皆當棄之而身為兵掠復暇恤車乎今陛下籍而未取於民何傷上喜曰卿言是也何論者之紛紛也括對曰車戰之利見於歷世巫臣教吳子以車戰遂霸中國李靖用偏廂鹿角以擒頡利臣但未知一事古人所謂輕車者兵車也五御折旋利於輕速今之民間輜車重大椎朴以牛挽之日不能三十里少蒙雨雪則跬步不進故世謂之太平車或可施於無事之日恐兵間不可用耳上復喜曰人無如此曉朕者當更思之卿又聞兩蜀禁鹽之利乎對曰亦粗知之上曰如何括對曰私井既容其撲賣則不得無私易一切填之而運解鹽使一出於官舊此亦省刑罰籠遺利之一端然忠萬戎瀘間夷界小井尤多不知敵鹽又何如止絶如此後夷界更須列堠加警則恐所得不補所費願敕計臣邊吏深較其得失之多寡然後為之明日二事俱寢執政喜謂括曰公有何術立談而罷此二事上甚多太平車之説括對曰聖主可以理奪不可以言爭若車可用敵鹽可禁括不敢以為非括民車實録不書去年十二月并今年二月十二日庚辰可考鹽禁則殊無所見括修注乃七年七月七日其知制誥不得其時實録因括察訪河北遂書之今亦并附北兩事寶文閣待制常秩兼侍讀十月十九日墨史又書此朱史削去新史因之蓋重出也詔三司支粳米百萬石赴河北轉運司封樁同判都水監宋昌言李立之丞王令圗言汴口已生新灘秋冬之交必稍退背乞權閉汴口使水涸增修隄岸斗門畢再相度同判都水監侯叔獻丞劉璯乞不閉汴口於孔固斗門下權作截河堰使水入斗門候修隄岸畢即開堰詔如叔獻等所請實録八年閏四月三日當考又此年四月二十六日王珫遷官又此月二十九日張罅言並合參照詔别路士人在五路有教授州軍就學者補試充上舍內舍生員毋過本路人三分之一詔開封府界提點司依諸路轉運司增置管勾文字官一員不許差出從蔡確請也戊子遣將作監丞胡宗回點檢河北東路倉厫先往澶州北京計度見管厫屋可貯糧數具圗以聞己丑詔諸路闕兵多處令監司選舉使臣招補開封府蔡確京東李察趙濟京西劉宗傑李南公並提舉招兵鄜延趙卨環慶楚建中涇原王廣淵秦鳳張詵提舉所差將兵九月十八日當考河北西路轉運司請災傷路召募闕食或流民興役朝廷賜米外其干農田水利及修城壕者悉給常平錢穀從之庚寅詔司農寺遣官往西京賑濟流民及令河北轉運司曉諭存恤逐熟民户無致流移巡察盜賊務令安居及令東路以所支粳米十五萬石內賜五萬石賑濟詔臣僚嘗被誣枉停廢後辨訴復官者當得俸賜其非釐務及奉朝請日依分司官例給之詔河北旱災民方艱食惟河防急切及修城許量調春夫餘並權罷一年從判都水監李立之請也環慶安撫司言熟户大旱闕食乞貸慶州糧七萬石環州三萬石從之辛卯手詔河北已排義勇保甲集事之初全在得人專心經畫後乃可收其實用西路以知制誥沈括東路以龍圗閣待制曽孝寬提舉凡緣保甲職事官屬悉聽舉劾仍許不以時遣官或親按視檢察上欲擬後周八柱國法故使從官領之不以屬帥府此據沈括自志括又云朝廷新伍民兵河北河東陜西得徑卒百萬謂之保甲河北三十餘萬先集詔於從官中擇二人分領詔淮南開封府民被災傷者免差來年春夫河北西路轉運使體量邢洺等州災傷除放秋稅又詔河北上畨京東武衛等兵士並宜抽歸營歇泊以省邊儲壬辰河北東路兼青曹鄆濮齊淄等州察訪使曽孝寬言昨與曽布同詳定諸路教閲及賞罰格今布出外欲乞因今奉使更訪問舊格未便事與西路察訪使同詳定取旨詔沈括曽孝寬未進發間同編修訖奏又言本路已排定保甲巡檢縣尉乞下所司選差其不任事者不拘常制選人代從之癸巳詔河北東路轉運司災傷之民失於披訴者特於限外接狀檢放河北義勇保甲以災傷願往他州縣逐熟者以狀言於縣豐嵗關牒所住州縣令復業其所過稅錢百以下並放遣官於南薰安上門置場給流民米人日二升幼者半之時流民自北來者幾三萬人故也詔引進使逹州團練使王君萬等十四人遷官有差君萬仍賜絹五百官其親屬一人例外加一資皇城使威州刺史康從領文州團練使官其一子內殿承制張之誎遷文思副使賞討蕩洮州之功也右諫議大夫集賢學士宋敏求上編修閣門儀制十册簽書鎮寧軍判官孫亶言真定府邢洺磁相趙州流民經過澶州浮橋者日益多其上三等户皆言懼為人攘奪勢不可居欲令此數州通判職官同令佐詣其鄉優加存恤如安存及千人以上量賜奬擢其第四等五等欠青苗本息錢者乞展限納流民所棄田權召人佃依逃田法以年分漸輸納所欠青苗錢候歸集日施行從之其安存流民酬奬仍令立法以聞知延州趙卨言奉詔以緣邊旱災漢蕃闕食民將逃去委臣勞徠亟議安集之計近緣邊得雨而民間闕種漢蕃弓箭手願借官種者各給小麥一石及檢視諸寨城壕不及丈尺者和雇飢民興修邊民所採木及賣牛馬不售者以官錢買之漢蕃户賣馬可備戰用者優給其直經略司常平倉糧穀並減價糶詔秦鳳熙河涇原環慶路經略司詳卨所奏倣此措置先具施行次第以聞永興軍路安撫司言乞展限一月收訴災傷狀河北東路提舉司請除放第五等中等以下役錢並從之甲午侍御史知雜事張琥言侯叔獻乞不閉汴口創築橫隄并置梢澾修舊斗門疏泄水勢還河萬一深冬氷塞斗門滀水衝溢新堰大則都城可虞小則沿汴居民被害雖省一二十萬物料增置梢澾所費亦不少乞依舊閉塞汴口不報又言河北流民多往京西雖已差官賑恤乞多給度僧牒并空名官告召人入粟救濟詔司農寺所差官計會轉運司輟省倉穀賑濟如闕少即計所用空名補牒敕告度牒具數以聞併辰州麻陽招諭二縣𨽻沅州實録云併辰州麻陽縣入錦州寨𨽻沅州今從九域志志又云八年廢錦州寨及招諭縣入麻陽地理志亦云八年併錦州寨人户及廢招諭縣入麻陽為一縣事在八年二月末實録又云省辰州招諭縣入沅州今並從九域志又實録八年二月末并十二月云云已具注於彼
