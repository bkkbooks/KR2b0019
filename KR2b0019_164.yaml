body:
  text: 續資治通鑑長編巻一百六十宋李燾撰仁宗慶厯七年春正月丙子朔御大慶殿受朝壬午降鹽鐡副使禮部員外郎劉湜知沂州度支副使吏部員外郎陳洎知濠州戸部副使戸部員外郎梅摯知海州舊制紫宸殿燕契丹使三司副使當坐東廡下閤門吏以告而湜等謂曲燕例坐殿上今但當止殿門外爾因不即坐趨出閤門使張得一奏之上怒故絀湜等張得一奏湜等據江氏雜志西上閤門使荆湖南路兵馬都監劉貽孫責授安逺行軍司馬岳州安置本路安撫使崔嶧言猺賊未平而貽孫輙託疾求尋醫也嶧因言太常博士楊畋常戰孤漿峒下人樂為用今欲殄賊非畋不可乃換東染院使湖南路鈐轄癸未祠部郎中張堯佐為戸部副使甲申知大宗正事允譲請自今宗室輙有靣祈恩澤者罰一月俸仍停朝謁從之丁亥降右正言史館修撰李京為太常博士監鄂州稅京數上書論事宰相賈昌朝不悦京嘗私以簡屬侍御史吳鼎臣薦推直官李寔鼎臣希昌朝意以告中丞高若訥若訥為鼎臣上京簡京坐是絀京至鄂州引令狐峘錢徽事言臣為御史諌官首尾五年六上章四親對自陳疾故懇求外補臣之出處粗有本末向者在臺見入閣圖三院御史立班各異聞元日將入閣而御史王贄何郯皆謁告歸㑹推直官李寔嵗將滿因簡鼎臣宜留寔補御史鼎臣亦謂議恊公望不意逾兩月乃誣臣與寔為朋黨臣初被絀閲諸橐中鼎臣所遺私書别紙故在臣令男諶亟悉焚燬臣與寔僚友鼎臣鄕曲之舊鼎臣為御史臣延譽推引寔有力焉待之不疑因以誠告豈謂傾險包藏甘為鷹犬惟陛下察之未㡬卒官詔録諶為郊社齋郎録李諶官在十一月乙亥今并書王贄廬陵人詔陜西河東經略司屬者西賊㓂邉斥候不明比官軍至則縱略而去矣其縁邉蕃漢戸有能先期來告者與優賞之仍定賞格以聞又詔河北所括馬死者限其户二年償之戊子尚書左丞知兖州杜衍為太子少師致仕衍年方七十正旦日上表願還印綬宰相賈昌朝素不喜遽從其請議者謂衍故宰相一上表即得謝且位三少皆非故事盖昌朝抑之也辛卯御大慶殿門閲太僕寺新作金輅玊輅癸巳兵部貟外郎知制誥楊偉權知諫院偉嘗曰諫官宜論列大事細故何足論然當時譏其無補戊戌禁河北縁邉停居北界人己亥慶歴編敇成凡十二巻别為總例一巻視天聖敇増五百條大辟増八流増五十有六徒減十有六杖減三十有八笞減十有一又配𨽻減三大辟而下奏聽㫖者減二十有一詳定官張方平宋祁曽公亮並加勲及賜器幣有差辛丑命權御史中丞髙若訥同判太常寺吕公綽管勾修郊廟祭器詔凡降敇舉提㸃刑獄自今非曽歴兩任通判以上毋得差又詔諸敘勞績者毋得升為省府推官及轉運使提㸃刑獄壬寅詔減連州民家為猺賊所害者來年夏租癸卯徙廣南東路轉運使侍御史王絲知通州以疾自請也二月丙午朔刑部貟外郎知制誥王琪責授信州團練副使不簽書州事初琪對便殿上從容謂曰卿雅有心計若三司使缺宜無以易卿及使契丹道屬疾肩輿以行使還其副錢晦希執政意言琪至靴淀敵遣醫候之云無疾更飲以馬溺又在道多失言御史何郯亦言琪與樞宻院有親嫌自當辭行既冐寵利又託疾廢事啟契丹疑心不可不懲琪坐是絀降此叚據王珪所作琪墓誌及何郯奏議修入丁未詔流内銓應納粟授官人不除司理司法參軍洎上州判官資考深無過犯方注主簿縣尉如循資入縣令録事參軍者銓司依格注擬止令臨監物務從御史知雜事李柬之所請也㑹要七年二月二日事己酉詔取益州交子三十萬於秦州募人入中糧草時議者謂蜀商多至秦方秦州乏軍儲可使入中以交子給之又詔樞宻院陜西用兵時環慶鄜延兩路互相援今夏人請和恐因而弛備其嚴戒兩路常講習如故壬子羣牧制置使王貽永言羣牧司先因詳定所減罷副使二員都監二員判官一員比來頗致闕事請自今以使副各一員都監判官各二員為定制從之丙辰命内侍二員提舉月給軍糧時侍御史吳鼎臣言諸軍班所給糧多陳腐又斗升不給請以内侍糾察之翌日諸監倉官進呈軍糧上諭曰自今當足其數以給之時衛士皆在殿下殿前都指揮使李昭亮因相率羅拜以謝軍糧自江淮轉漕至京師又積年而後支惟上軍所給升斗僅足中下軍率十得八九雖遣内侍提舉徒動軍情而終不可行此據實録全文不知出自誰筆當考張方平言竊聞近日中使傳宣諸司頗為煩數其至三司日或數次臣聞王言惟作命百官承式洪範五事言曰從從作乂故王者之言是謂號令令出惟行不行則權綱虧矣今夫屑屑冗微之事皆賤者之所親責在攸司各有程式發輸督促動煩宣下所司既被受其有不可奉行者又須禀復或却寢罷下成廢命上為損威習以為常恬不知怪欲乞今後除有指揮中書樞密院事特降中使外自餘細務合下三司提舉司開封府等處者只乞傳宣中書樞密院劄下逐處有司或敢違慢自應合行勘責即事干急速不容留滯即乞宣付入内内侍省相度事體緩急須即施行者具録宣㫖報下所司所冀出納有常上下得體方平此奏不得其時附内侍提舉軍糧後當考壬戌引進使果州團練使瀛州張亢領眉州防禦使為涇原副都部署亢嘗言瀛州城小而人衆緩急無所容若廣東南關則民居皆在城中河北安撫使夏竦前在陜西惡亢不附已特沮止其役然卒城之丙寅遣官五嶽四瀆祈雨庚午夏竦言博州軍人趙宗者夜寐常有蛇出入口鼻中恐以妖惑衆請度為僧令居京師毋得出外從之壬申西上閣門副使張得一為西上閣門使知潞州始得一引曹佾例求正使名樞密使王貽永副使吳育龎籍譬以曹中宫親例不可用得一曰公朝豈私親耶育謂得一曰侍中子若孫恩澤各别踈親又差降豈非用親乎得一意小絀又引他例非親者貽永曰此邉任得一遽請邉任乃有此命既而以潞州非契丹使所經行改貝州有㫖候代到赴貝又請不候代許之此據江氏雜志志云引曹佾李璋佾為閣使在元年七月而璋為閣使乃在八年五月合削去璋名三月壬午御崇政殿録繫囚天下雜犯死罪以下遞降一等杖以下釋之癸未詔求寛恤民力之事聽官吏驛置以聞上其副于轉運司利害明白者轉運司耑行之毁後苑龍船初有司請修以備幸詔特毁之丁亥以旱罷大讌戊子詔太常禮院權停所上去夏讀時令儀升登州平海兩指揮為禁軍己丑詔御史中丞髙若訥入侍經筵左屯衛大將軍致仕王仲寳卒録其子平為太廟齋郎述為郊社齋郎仍詔毋得援例知慶州戸部郎中天章閣待制施昌言所為不法語徹朝廷昌言疑通判陳湜言之追發湜罪坐廢辛卯亦降昌言知華州癸巳詔曰自冬訖春旱暵未巳五種弗入農失作業朕惟災變之來應不虚發殆不敏不明以干上帝之怒咎自朕致民實何愆與其降災於人不若移災於朕自今避正殿减常膳中外臣僚指當世切務實封條上三事大夫其協心交儆稱予震懼之意焉上毎命學士草詔未嘗有所増損至是楊察當筆既進詔草以為未盡罪已之意令更為此詔乙未工部侍郎平章事賈昌朝罷為武勝節度使同平章事判大名府兼北京留守司河北安撫使樞宻副使右諫議大夫吳育為給事中歸班昌朝與育數争論帝前論者多不直昌朝時方閔雨昌朝引漢災異冊免三公故事上表乞罷而御史中丞髙若訥在經筵帝問以旱故若訥因言陰陽不和責在宰相洪範大臣不肅則雨不時若帝用其言即罷昌朝等尋復命育知許州賈昌朝判大名府即兼河北安撫使據本𫝊工部侍郎平章事陳執中加昭文館大學士監修國史河陽三城節度使同平章事判大名府夏竦依前官充樞宻使故事文臣自使相除樞相必納節還舊官獨竦不然景祐元年八月王曽事可考初降制召竦為宰相諫官御史言大臣和則政事起竦與陳執中論議素不合不可使共事越三日遂貼麻改命焉竦以乙未日除宰相丁酉日改樞宻使而實録并書之今從本紀仍書其日知益州樞宻直學士戸部郎中文彦博為右諫議大夫樞密副使碧雲騢可考上因李柬之建議再畋近郊南城之役衛士不及整而歸以夜有雉殞于殿中諫者以為不祥是月乙亥詔將復出諫者甚衆有雉殞于殿中此據孫抗墓誌但年月差殊今叅取附見御史何郯言古者天子具四時之田所以講威武而勤逺略不徒事游戯而翫細娱載之策書具有典法前日伏聞法駕將獵近郊中外之人聴者頗惑良以去歳車駕已嘗出畋羣臣抗言隨即停罷忽茲再舉未諭聖心伏以陛下繼統以來動遵法度不喜弋獵不數豫逰恭儉之風足邁前古而今之舉事固必有因豈陛下以宇内有年方隅無事故於農隙以講武經欲為都邑游觀之盛乎抑有獻議者謂田獵之事具有禮文行之以時盖舉墜典則嚮者諫止之言不足顧乎若聖意果然如是先定則非愚臣之所敢議也然其中事有切於利害者尚可得而言焉恭自真宗皇帝即位之後遂下詔書罷放五坊鷹鷂獵事不講踰四十年校獵之籍率非宿將士卒久不便習其事官司又不素詳其儀倉卒而行必多曠闕竊聞去歳乘輿之出往返甚勞一日之間殆馳百里而又兵衛不肅警蹕不嚴從官不及侍行有司不暇供億逮於暮夜始入都門此豈非士不習其事官不詳其儀而致然歟况以騎乗而有疾馳之勞在原野而弛嚴衛之備或御者蹉跌變生銜橜愚民迷誤犯及車塵臣子之罪將何贖焉雖則仁聖之資固有神靈之衛然不可不備非常且西北二隅變故難測豈無姦偽雜於稠人廣衆之中由是而言益可深慮傳曰千金之子坐不垂堂矧於萬乘之尊乎賈誼曰射獵之娱與安危之機孰急今不獵猛敵而獵田彘不搏强㓂而搏蓄兎翫細娛而不圖大患非所以為安也伏望陛下罷省出遊無重過舉遵烈考詔書之㫖念前良警戒之規優游養神樂過從禽拱揖在御慮無乘危則宗廟生靈實有慶頼臣職當言責理合開陳罔逃嚴誅貴少有補編修唐書官王疇亦陳十事以諫是日有詔罷出獵又詔停建州造龍鳯茶丙申詔羣臣無得以郊祀請加尊號丁酉改樞宻副使右諫議大夫文彦博為叅知政事右諫議大夫權御史中丞髙若訥為樞宻副使詔天下毋得擅毁諸祠廟其載祀典者官司以時興葺之己亥賜天章閣待制兼侍講曽公亮三品服故事待制入謝未始賜服至是上御邇英閣面賜之仍宣諭曰朕即講席賜卿盖所以尊寵儒臣也公亮自修起居注當遷知制誥賈昌朝其友壻也避嫌故使待制天章閣昌朝罷既半載乃命知制誥庚子羣臣上表請御正殿復常膳詔不允其後雖得雨表三上乃從之辛丑幸西太一宫祈雨所過神祠皆遣中使致禱壬寅降宰臣工部侍郎陳執中為給事中叅知政事給事中宋庠為右諫議大夫工部侍郎丁度為中書舎人先是賈昌朝引漢故事乞罷相昌朝既罷執中等復申前請於是各降官一等而輔政如故上之幸西太一宫也日方炎赫却盖不御及還而雨是日大浹邵博記禱雨西太一宫事由王素然此時不在諫院已具三年五月癸卯太常禮院言天子宗廟皆有常制今太廟之南門立㦸即廟正門也又有外墻櫺星門即漢時所謂壖垣乃廟之外門也昨新建面西墻門元在通衢以止車馬之過廟者其臣僚下馬宜勿禁從之初知宗正丞趙恭和言今廟壖短而去民居近非所以嚴宗廟請别為複墻以甓累之故又設面西之墻然而非制也詔權停貢舉夏四月丁未謝雨于西太一宫以玉仙聖母殿為洞華觀觀即太一宫之别院也己酉内出詔曰前京東轉運使薛紳任部吏孔宗旦尚同徐程李思道等為耳目偵取州縣細過以滋刑獄陷害人命時號四瞪前江東轉運使楊紞判官王綽提㸃刑獄王鼎皆亟疾苛察相尚時號三虎是豈稱朕忠厚愛人之意歟紞已降知衡州而紳等故在其降紳知陜州鼎知深州綽方居䘮候服除日取㫖自今皆毋得用為監司宗旦等四人並與逺小處差遣綽益都人鼎㳂子與紞三人者皆范仲淹等所選用也天章閣待制侍講楊安國因講筵為上言三虎四瞪事故有是詔綽先為刑部詳覆官有廖均者挾當路權勢雪罪中書連舊例送刑部官屬無敢違者綽獨以為敇一定而例有出入今廢敕用例非有司所敢聞也執政雖深惡之然終不能屈選通判雄州城久壊守將慮違契丹誓書不敢修綽以為今徒修之而已實非増廣則於誓書為無害既興役契丹果來問綽報以前語仍緩其使及使返而役已畢契丹亦不敢復問杜衍富弼尤稱其材及䘮除責通判萊州楊安國言三虎四瞪本傳載之但云由是罷按察使誤也按察使前已罷矣臺記王綽傳又云大理寺丞朱處仁上䟽言為天下之害莫大乎三虎四瞪亢旱之來未必不由此仁宗覧䟽大驚遂令召鼎等并綽赴闕綽責萊州今亦不取庚戌京東轉運使監察御史包拯為工部員外郎直集賢院陜西轉運使拯入見既行㑹他路監司有對自求改服章者上不悦因諭中書曰包拯使陜西未嘗自言也可齎賜之行次華陰換三品服拯言臣前年夏中因伴送北使回見河北麥熟價賤乞支借見錢及時收糴外可以實邉備内可以寛國用雖尋䝉差監察御史劉元瑜往彼催促縁河北錢幣有限竟不能廣有積聚以備將來臣去秋赴任京東日竊見朝廷差仲簡宋選陳榮古往三路便糴臣亦曽上言以逐處少得見錢恐難集事欲望特出宸斷權於内藏庫支借見錢或絹帛百餘萬與逐路乘此之便廣謀收糴俾邉廪稍實有數年之蓄庶少寛恤民力臣位踈言賤未賜開納今䝉恩改授陜西縁西鄙用事以來關中生聚凋殘尤甚物貨踊貴且朝廷所以納元昊誠欵許之自新者盖欲稍紓民力爾今邉事雖粗寧息而屯兵防守調度寖廣錢貨積敝倉庾殆空如緩急有軍事亦未免重困生靈况財力一出民間當今之際切在安而勿擾安之之道惟在不横賦不急役若追求不已則大本安所固哉伏望陛下少垂聖意大緩吾民以安天下應三路用度不足且以内帑錢帛借助以恵元元民心茍安則北敵曷足慮哉壬子髙陽關路都鈐轄入内押班楊懐敏兼管勾雄州兵馬事夏竦言縁邉間欲察知敵情其北界歸投人不可悉拒之自今並令移處近裏州軍是日御正殿復常膳仍賜二府喜雨詩乙卯陳執中宋庠丁度皆復所降官契丹國母遣安肅軍節度使蕭徳潤給事中韓紹文契丹遣彰信軍㽞後耶律質右諫議大夫知制誥陳詠來賀乾元節丙辰詔在京寺觀及有神御殿處寳元中嘗减房錢今給還如故丁卯上封者言諸路轉運司廣要出剩求媚于上民輸賦税已是大半之賦又令加耗謂之潤官江西諸路州軍體例百姓納米一石出剩一斗往往有聚歛之臣加耗之外更要一斗且以江西一路歳百萬石為凖若每石取米一斗以一百萬石計之所収已及一十萬石若於民間取十萬石耗米入官則下民必食貴米此只粗引一路之弊况天下之廣賦税之饒其弊無極臣恐諸路轉運使尚有似此無名刻削願陛下閲其奏目或有横加収斂名為出剩乞賜絀貶使民知陛下之意仍乞嚴行戒勵必然止絶上覽之曰古稱聚斂之臣過於盗賊今如此掊斂是與朕結怨於民也亟下詔止絶之此㨿張唐英政要包拯之為監察御史也嘗言臣訪聞江南西路轉運使王逵行事任性不顧條制苛政暴斂全無畏憚州縣稍不順從即時捃拾吏民無告實可嗟憫王逵先任荆湖南路轉運使日非理配率人戸錢物上供以圖進用山下之居民苦於誅求迯入蠻峒結集兇黨致此大患于今未息縁江西重地幅員千餘里財賦戸口尤盛亦與蠻接連境界若久任匪人竊恐為國生事且楊紞但以體量官吏過當尚降差遣况王逵害民蠧化衆議不容伏望聖慈特從降黜則天下幸甚又言臣近以王逵所為任性加以殘酷不可令久居表率之任乞降差遣竊知下本路提刑司體量且提刑與轉運俱是按察之官事相闗連寧無私徇縱情状灼著恐未能必逹朝㫖兼王逵先任荆湖南之日以非理配率錢物臣僚奏劾降知池州尋該赦宥移福州未㡬又自揚州授今任雖遇霈澤棄瑕録用然刻暴之性難以悛改凡所行事布在朝野無不具知且非曖昧臣與王逵素不相接但以物議不允須至上言伏望聖慈特出宸斷只合依楊紞例與降一小郡所貴天下酷吏稍知警懼訖不從逵以五年春末將漕江西是年夏末乃移荆湖北路云逵以五年三月除江西漕其徙湖北實録闕之恭考他書當在七年夏間今附見江西聚斂逵實為此包拯二䟽載其事頗詳今掇取附見然拯六年六月已除京東漕劾逵二䟽當在五年冬或六年夏此時拯出臺將踰年矣己巳詔諫官除朝恭外非公事毋得出入請謁是日講筵讀賈誼傳論三公三少皆天下端士與太子居處出入故少成若天性習慣如自然帝曰朕昔在東宫崔遵度張士遜馮元為師友此三人皆老成人至於遵度尤良師也又嘗問宋祁曰孫奭馮元有子孫在朝否祁曰奭子瑜為崇文院檢討元子譓監内衣庫帝問其材行何如祁以實對帝曰二人名儒奭尤淳正庚午以交州進奉使祕書丞杜文蔚為屯田員外郎副使左侍禁馮昌贍為内殿承制壬申賜環慶路蕃官新州刺史思順慕恩趙明各一子官以其扞邉有勞也實録㑹要並云新州刺史思順供備庫副使慕恩趙明按五年八月慕恩已自供備庫副使遷洛苑使趙明自内殿承制為東染院副使不應此時二人却同為供備庫副使今削其官但著姓名又所謂新州刺史思順初不知謂誰當考嘉祐七年四月復書新州刺史右屯衞將軍思順為右驍衛將軍五月乙亥朔置桂陽監華陰寨以禁軍五百人守之丙子東頭供奉官李瑋為左衞將軍駙馬都尉選尚福康公主也瑋用和次子上追念章懿太后不已顧無以厚其家乃使長女降焉嘉祐六年六月乃出降知諌院王贄言臣僚章䟽内有事合更張者送兩制及臺諫官等同議動經半年餘未見結絶縁官貟數多遷移不定其間若事或分寸有益即遲一日有一日之損盖素無條約而務在因循欲乞今後應批狀下兩制及臺諫等官同定者乞限五日内聚議半月内連書奏上如議論不同才識特異稽合禮法自有建明即許别狀以聞從之仍詔已送下詳定文字亦依此日限詳定聞奏戊寅詔同提㸃刑獄武臣自今非歴知州軍而無過者無得差己卯贈西頭供奉閤門祇候張化基為宻州觀察使化基美人之兄特䘏之辛巳追封衛國長公主為魯國長公主賜諡昭懐壬午以武昌節度使知永興軍程琳為宣徽北院使判延州兼鄜延路經略使仍為陜西安撫使徙知鄆州資政殿學士給事中富弼為京東路安撫使知青州知揚州資政殿學士給事中韓𤦺為京西路安撫使知鄆州知青州翰林學士戸部郎中葉清臣兼龍圖閣直學士為永興軍路都部署兼本路安撫使知永興軍始清臣辭邠州不赴得知澶州不三月改青州於是又徙永興軍上初欲進清臣官為諫議大夫宰相陳執中曰故事兩制自中行郎中遷左右司郎中今遷諫議大夫太優乞且令兼龍圖閣學士上許之故事新除知永興軍者當有錫賚執中曰清臣近已得賜遂不與清臣愈恨過闕請對於上前數執中之短且力辭閣學士不拜上錫賚之亦不受然上遇執中如故清臣卒赴永興乙酉引進副使知保州王中庸為西上閤門使中庸提舉修築河北五州軍堤道成特遷之丁亥廣南東西路轉運使傅惟幾髙易簡等言徭賊唐和令其子執要領詣官自言願貸糧米居所保峒中請敇荆湖南路鈐轄楊畋趣赴連韶州山下共告諭之使以兵械輸官質其親屬仍請補為峒主先給告下轉運司皆從其請己丑補唐和盤知諒房承映承泰文運等並為銀青光禄大夫檢校國子祭酒兼監察御史武騎尉充峒主知諒等和黨也畋曰賊剽攻湖廣七年所殺不可勝計今使飽資糧據峒穴其勢必不久復亂欲招賊出峒而賦以田與轉運使異議不聴明年賊果復出陽山畋即領衆趨嶺外渉夏秋凡十五戰乃潰廣東轉運使傅惟㡬廣西轉運使髙易簡也不知何人與畋異議當考傅惟㡬招降何郯奏議可考水洛城都監内殿崇班閤門祇候劉滬卒其弟淵將䕶䘮東歸居人遮道號泣請留葬水洛立祠城隅歳時祀之經略司言熟戸蕃官努卜堅布等願得滬子弟主其城乃復命滬弟淳為水洛城都監己亥命翰林學士楊察除放天下欠負臣僚上言嘉勒斯賚子轄戩别作一城住坐欲絶往來進奉之路恐與元昊相通亦慮夏國有結親之好乞齎詔敇存撫知秦州梁適亦言嘉勒斯賚父子欲依例只作經略司意度差人量齎信物以存撫為名因便令體探事宜及招買鞍馬從之辛丑詔西北二邉有大事自今令中書樞宻院召兩制以上同議之六月乙巳詔畜猛獸而害人者以違制論辛亥命翰林學士權三司使張方平為南京鴻慶宫奉安三聖御容禮儀使入内都知王守忠都大管勾儀衛乙卯太常禮院言按禮祀昊天上帝日月星辰並用藁秸五帝用筦至唐始加褥今南郊配位各設席加褥而無藁秸與筦又禮以茅縮酒今但供零陵香灌其上殊無所稽宜更制藁秸筦席為藉而縮酒用茅從之辛酉詔天下知縣縣令非鞫獄無得差出外八年八月壬戌可考壬戌置北京留守司御史臺詔臣僚移任求朝見者留京師毋得過十日此必為葉清臣故也然史不詳其事當考丁卯詔審官院益梓利三路並選歴官無私罪人為知州庚午命叅知政事丁度提舉編修唐書先是夏竦䜛言石介實不死富弼陰使入契丹謀起兵朝廷疑之弼時知鄆州亟罷京西路安撫使既而北邉安堵如故竦䜛不效弼自鄆州徙青州仍領京東路安撫使竦在樞府又䜛介説敵弗從更為弼往登萊結金坑兇惡數萬人欲作亂請發棺驗視朝廷復詔監司醴量中使持詔至奉符提㸃刑獄吕居簡曰今破冡發棺而介實死則將奈何且䘮𦵏非一家所能辦也必須衆乃濟若人人召問之茍無異説即令結罪保證如此亦可應詔矣中使曰善及還奏上意果釋介妻子初羈管他州事既辨明乃得還侍御史知雜事張昪及御史何郯嘗極論其事郯奏䟽曰伏聞朝廷近降指揮為疑石介遍根問舊來曽渉往還臣僚以審存没中外傳聞頗甚駭異縁石介平生頗篤學問所病者道未周而好為人師致後生從學者多流蕩狂妄之士又在太學日不量職分專以時事為任此數端是可深責其於他事計亦不為况介前年物故衆已明知萬一使介尚存一𦕈小丈夫亦何所圖臣聞此事造端全是夏竦始初隂令人摹擬石介書迹作與前來兩府臣僚簡尺妄言事端欲傳播入内上惑聰明夏竦豈不知石介已死然其如此者其意本不在石介盖以范仲淹富弼在兩府日夏竦曽有樞宻使之命當時亦以羣議不容即行罷退疑仲淹等同力排擯以石介曽被仲淹等薦引故欲深成石介之惡以汚忠義之臣皆疇昔之憾未嘗獲逞昨以方居要位乃假朝廷之勢有所報爾其於損國家事體則皆不顧焉伏望聖慈照夏竦之深心素來險詐亮仲淹弼之大節終是忠純特排姦謀以示恩遇其石介存没亦乞更不根問庶存大體自夏竦力行此事中外物議皆知不可然而未嘗有敢言者盖慮時論指為朋比爾臣若更不陳始末明辨即是深負言責伏惟聖明矜其愚而圖之則天下幸甚再體量石介存没實録不書今㩀富弼詳䜛謗劄子及何郯奏議附七年夏末吕居簡不發棺據魏泰東軒録居簡傳乃無之張昪辨明介寔見本傳郯傳獨不載此當考
