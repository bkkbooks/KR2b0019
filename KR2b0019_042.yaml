body:
  text: 續資治通鑑長編卷三十八宋李燾撰太宗至道元年六月已卯詔重造州縣二稅版籍頒其式於天下凡一縣所管幾户夏秋二稅苗畝桑功正稅及緣科物用大紙作長卷排行實寫為帳一本送州覆校定以州印印縫於長吏㕔側置庫作板匱藏貯封鎖自今每嵗二稅將起納前並令本縣先如式造帳一本送州本縣納稅版簿亦以州印印縫給令佐乙酉遣內侍裴愈乘𫝊往江南諸州購募圗籍願送官者優給其直不願者借出於所在州命吏繕寫仍以舊本還之上嘗草書經史三十紙召翰林侍讀吕文仲一一讀之列祕閣官屬名位刻石模印裝飾百軸於是付愈賫詣名山福地道宫佛寺各藏數本或丘園養素好古博雅之士為鄉里所稱者亦賜之賜石刻實録在六月戊戍今并書丁酉詔募民請佃諸州曠土便為永業仍蠲三嵗租三年外輸三分之一州縣官吏勸民墾田之數悉書於印紙以俟旌賞八月乙亥朔荆湖轉運使何士宗上言望自今執政大臣出領外郡應合申轉運使公事只署通判以下姓名上謂宰相曰大臣品位雖崇若出臨外藩即轉運使所部要繫州府不繫品位此朝廷典憲不可輕改也冝仍舊貫壬辰制以開封尹夀王元侃為皇太子改名恆大赦天下文武常參官子為父後見任官賜勳一轉詔皇太子兼判開封府自唐天祐以來中國多故不遑立儲二斯禮之廢將及百年上始舉而行之中外胥悅初參知政事冦凖自青州召還入見上足創甚自發衣以示凖曰卿來何緩凖曰臣非召不得至京師上曰朕諸子孰可以付神器者凖曰陛下誠為天下擇君謀及婦人宦官不可也謀及近臣不可也惟陛下擇所以副天下之望者上俯首久之屏左右曰元侃可乎對曰非臣所知也上遂以元侃為開封尹改封夀王於是立為太子京師之人見太子喜躍曰真社稷之主也上聞之召凖謂曰四海心屬太子欲置我何地凖曰陛下擇所以付神器者顧得社稷之主乃萬世之福也上趨宫中語后嬪以下六宫皆前賀上復出延凖飲醉而罷凖嘗奏事切直上怒而起凖攀上衣請復坐事决乃退上嘉歎曰此真宰相也又語左右曰朕得冦凖猶唐太宗之得魏鄭公也三朝聖政録謂凖牽帝衣請决事乃為員外郎時蓋誤也今從本𫝊癸已以尚書左丞李至禮部侍郎李沆並兼太子賔容見太子如師傅之儀太子見必先拜動皆咨詢至等上表懇讓詔不許至等入謝上謂至等曰朕以太子仁孝賢明尤所鍾愛今立為儲二以固國本當賴正人輔之以道卿等可盡心調護若動皆由禮則宜贊成事或未當必須力言勿因循而順從也至如禮樂詩書之道可以禆益太子者皆卿等素習不假朕多訓爾至等頓首謝初置左春坊謁者命左清道率府副率祥符王繼英兼領之繼英少以筆札事趙普普自河陽罷為太子少保常從者皆去惟繼英奉事逾謹普再入相遂𨽻名中書五院皇太子在藩選為導史兼內知客事上嘗召見謂曰汝始事趙普朕所備知今奉親賢尤宜盡節及東宫建故有是命然謁者本內侍之職而太子有通事舍人掌𫝊宣導引之事不名謁者又十率品秩頗崇非趨走左右者所宜為蓋執政之失也丁酉以翰林學士承旨宋白為册皇太子禮儀使有司既定册禮又言唐制宫臣參賀太子皆舞蹈開元始罷之故事百官及東宫接見祗呼皇太子上箋啓即稱皇太子殿下百官自稱名宫官自稱臣常所行用左春坊印宫內行令又按唐制凡東宫處分論事之書皇太子並畫諾令左右庶子以下署姓名宣令奉行其與親友師傅書不用此制今請如開元之制宫臣止稱臣不行舞蹈之禮又緣皇太子兼判開封府其所上表狀即署皇太子位其當申中書樞密院狀祗判官等署餘斷按及處分公事並畫諾詔改諾為凖餘皆從之又言百官見皇太子自兩省五品尚書省御史臺四品諸司三品以上皆答拜餘悉受拜宫臣自左右庶子以下悉用參見之儀其皇太子宴㑹位在王公上奏可有司又草具皇太子受册畢見皇后儀詔止用宫中常禮九月先是汴河歲運江淮米三百萬石菽一百萬石黃河粟五十萬石菽三十萬石以給京師兵食非水旱蠲放民租未嘗不及其數是歲汴河運米至五百八十萬石丁未上因問近臣汴河疏鑿之由參知政事張洎退而講求其事以奏且曰今帶甲數十萬戰騎稱是萃於京師仍以亡國之士民集於輦下比漢唐京邑繁庶十倍其人矣甸服時有水旱而不至艱歉者有惠民金水五丈汴水等四渠派引脉分㑹於天邑舳艫相接贍足京師以無匱之也唯汴之水橫亘中國首承大河漕引江湖利盡南海半天下之財賦並山澤之百貨悉由此路而進然則大禹疏鑿以分水勢煬帝開甽以奉巡遊雖數陻廢而通流不絶於百代之下終為國家之用者其上天之意乎汴渠派分黃河自唐迄今皆以為莫大之利然迹其事實抑有深害何哉凡梁宋之地畎澮之水凑流此渠以成其深隋煬帝將幸江都遂將黃河之派築左右堤三百餘里舊所凑水悉為橫絶散漫無所歸故宋亳之地遂成沮洳卑濕且昔之安流今乃湍悍覆舟之患十有二三昔之漕運冬夏無阻今則春開秋閉終嵗漕運止得半載昔之泝㳂兩無難阻今則逆上乃重載而行其為難也甚矣㳂流而下則虛舟而往其為利也背矣矧自天子建都而汴水貫都東下每嵗霖澍决溢為慮由斯觀之其利安在然歷世寖逺詎可猝圖異日明哲之士開悟積惑言復曩迹始信兹言之不謬此王曽等語今附張洎奏下丁卯上御朝元殿册皇太子陳列如元㑹之儀皇太子自東宫常服乘馬赴朝元門外幄次改服逺遊冠朱明衣三師三少導從入殿受册寶太尉率百官奉賀皇太子易服乘馬還宫百官常服詣宫參賀自樞密使內職諸王宗室師保賔客宫臣等畢集皆序班於宫門之外庶子版奏外備內臣褰簾皇太子常服出次就坐諸王宗室參賀再拜訖垂簾皇太子降坐還次中書門下文武百官樞密使內職師保賔客而下以次參賀皆降階答拜訖升坐受文武官宫臣三品以下參賀庚午具鹵簿謁太廟五室常服乘馬出東華門升輅冬十月乙亥皇太子讓宫僚稱臣許之上嘗謂舜作五絃之琴以歌南風後王因之復加文武二絃乃增作九絃琴五絃阮别造新譜二十七卷俾太常樂工肄習之以備登薦乙酉出琴阮示近臣且謂之曰雅正之音可以治心古人之意或有未盡琴七絃今增為九絃曰君臣文武禮樂正民心則九奏克諧而不亂矣阮四絃今增為五曰金木水火土則五材並用而不悖矣因命待詔朱文濟蔡裔賫琴阮詣中書彈新聲詔宰相以下皆聽由是中外獻歌詩頌者數十人上謂宰相曰朝廷文物之盛前代所不及也羣臣所獻歌頌朕再三覽之校其工拙唯李宗諤趙安仁楊億詞理精愜有老成風可召至中書奬諭又曰吳淑安德裕胡旦或詞采古雅或學問優博抑又其次矣安仁孚子淑丹陽人也朱文濟者金陵人專以絲桐自娛不好榮利上初欲增琴阮絃文濟以為不可增蔡裔以為增之善上曰古琴五絃而文武增之今何不可增也文濟曰五絃尚有遺音而益以二絃斯足矣上不悅而罷及新增琴阮成召文濟撫之辭以不能上怒而賜蔡裔緋衣文濟班裔前獨衣緑欲以此激文濟又遣裔使劍南獲數千緡裔甚富足而文濟藍縷貧困殊不以為念上又嘗置新琴阮於前旁設緋衣金帛賞賫等物誘文濟文濟終守前說及遣中使押送中書文濟不得巳取琴中七絃撫之宰相問曰此新曲何名文濟曰古曲風入松也上嘉其有守亦賜緋衣文濟風骨清秀若神仙上令供奉僧元藹畫其像留禁中十一月已未上閲武於便殿衛士挽弓有及一石五斗者矢二十發而綽有餘力因謂近臣曰事有竒異驚聽者此是也方今寰海無事美才間出悉在吾彀中矣朕向於行伍中選氣質端謹勇而知禮進退有度者授以挽强之法俾相講教所以弧矢之妙􅗥無倫比又令騎兵步兵各數百東西列陳挽强彀弩視其進退發矢如一容止中節上曰此殿廷間數百人爾猶兵威可觀况堂堂之陳數萬成列者乎初梁氏建都草創閭巷皆因舊號丁卯詔參知政事張洎改撰京城內外坊名八十餘由是分定布列始有雍洛之制云十二月癸酉上以時和年豐冦盜翦滅顧謂宰相曰國家自近嵗以來偶逢艱運水旱作沴連年不順河西蜀川相繼叛亂飛芻挽粟千里騷然而又京邑之中霖雨彌月百物涌貴道殣相望于兹時也百姓嗷嗷然朕為其父母居億兆之上位尊責重莫遑寧處每日與卿等相見雖不形於顔色然而中心憂念無須㬰之安由是內修政紀救萬民之愁疾外勤戎略定三邉之狂孽以至有司常職米鹽細事朕亦不憚勞苦並躬親裁斷遂致上天悔禍否極斯泰巴蜀餘妖竄伏黔水繼遷醜類窮蹙沙漠而又普天下九穀咸登塞北江南紅粟流衍朕豈望才經災歉之後便覩兹開泰深自慶慰也吕端等相率稱賀先是司天秋官正韓顯符請造銅渾儀詔給用度俾顯符擇工鑄焉庚辰渾儀成詔於司天監築臺置之張思訓及顯符並有渾儀本志但記思訓所作而顯符所作則略之獨著其候儀法不知何也丙申上顧侍臣曰自晉漢以來朝廷削弱主暗臣强紀綱大壞僅成邦國朕承喪亂之後君臨大寶即位之始覽前王令典覩五代弊政以其習俗既久乃革故鼎新别作朝廷法度於是逺近騰口咸以為非至於二三大臣皆舊德耆年亦不能無異朕執心堅固靡與動搖晝夜孜孜勤行不怠於今二十載矣卿等以朕今日為治如何也雖未能上比三皇至於寰海宴清法令明著四表遵朝化百司絶奸幸固亦無慚於前代矣上又曰近代誠為亂世豈有中書布政之地天下除授皆出堂後官之手賣官鬻爵習以為常中外官吏賢愚善惡無所分别時政如此安得不亂也上又曰當此之時諸侯各據方面威福由已世宗自淮甸回有許州百姓於駕前訟節度使向訓世宗遽械此人付向訓令自鞫問訓得之即活沉於水其輕蔑憲章恣橫不法也如此今日天下即昔時天下也今日人民即昔時人民也朕自君臨未嘗一日不雞鳴而起聽四方之政至於百司庶務雖微細者朕亦常與詢訪所以周知利害深究安危之理故無壅蔽凌替之事吕端等對曰臣等待罪廟堂曾無禆益拜謝而退永安節度使折御卿被病敵諜知之韓德威復為李繼遷所誘遂率衆入冦以報子河汊之役御卿輿疾而行德威聞其至頓兵不敢進㑹疾甚其母遣親信召御卿歸就醫藥御卿曰家世受國恩敵冦未滅御卿之罪也今臨敵安可棄士卒自便死於軍中蓋其分也為白太夫人無念我忠孝豈得兩全言訖泣下翊日卒丁酉上聞御卿之喪痛悼久之贈侍中以其子供奉官惟正為洛苑使知府州事御卿纍世邉將習知蕃夷情狀忠勇感慨常欲立功以報恩朝廷亦以麟府逼近戎人倚為一面捍蔽自子河汊一戰戎人喪氣不敢深入為冦矣戊戌斬馬步軍都軍頭澄州刺史孫贊坐護石堡戍兵擅率兵入敵境失利故也上因謂宰相曰軍旅情狀朕盡識之但信賞必罰人自知勸贊近請往河西效用及與蕃賊接戰違主帥號令陷却百餘人朕已遣使臣就斬之似兹將領稍失律不與寬貸則偏禆行伍安敢更不用命也是日詔內外文武臣寮及諸色人自今起請制置事須有益於國無損於民乃得聞奏如施行後顯有利濟當議旌賞如虧損公私亦重行朝典
