body:
  text: 續資治通鑑長編卷四百八十二宋李燾撰哲宗元祐八年三月戊寅朔辛巳御史中丞李之純言衆賢和於朝則萬物和於野至於形和聲和則天地之和應矣今仲春之末生育之候而風霾間作繼以大寒霰雪雨水有戾和氣殆人事有以干之者夫燮理隂陽輔臣之職比聞國論稍虧協睦語或傳播動繫觀望昔臯陶曰同寅協恭伊尹曰惟和惟一蓋訏謀密勿運動樞極言雖忽微其出彌大不可不謹重協和望深加訓諭責其同德上代天工以召至和之氣國論稍虧協睦當考其事臣僚上言今者春務方興農桑維時而愚民陷罪者衆宜隨輕重決遣以赴耕耘之業請非灼然要切事不得妄有追擾其獄事須證逮者立遣從之將作監王兢為京東西路轉運使政目四日事四年七月以朝奉大夫權京西提刑改秦鳳五年六月二十二日農少六年閏八月十四日將作壬午詔尚書右僕射蘇頌纍上表引年乞解機政可依所請特除觀文殿大學士充集禧觀使所有實封食邑依自來體例施行於今月六日宣麻此新録據御集手札便書御札云云略不修潤今亦從之癸未左光祿大夫尚書右僕射兼中書侍郎蘇頌依前官觀文殿大學士集禧觀使政目十六日頌依前使相初進呈臺章論頌稽留制書尚書左丞梁燾曰頌為宰相理會差除可謂稱任矣况論差除執政皆得可否為相復不得論本省事乎臺章又以頌子為太學博士同舍多有遷擢燾曰差除皆宰執合議方敢將上取旨如一有不同又且罷議非頌敢專也至如父子家庭間語外人豈得知之若臆度猜疑即誣造巧飾何所不至此不可不察頌既罷相以觀文殿大學士宫祠便居燾又爭曰頌罷已非宜願兩宫察言者之妄留頌以遏傾搖之風朝廷輒罷免宰相事體極重太皇太后曰自是頌不肻住燾曰若用自請即職名非故事不可降職處外以示疏逺頌得以大學士留京師邵伯溫云楊畏攻劉相出意謂必相門下侍郎蘇轍朝廷復拜蘇頌為右僕射畏又與來之邵言蘇相留賈易謫命不下為稽留詔命時中丞李之純與蘇相為姻家偶在病告畏入卧內見之純曰臺諫言蘇頌章纍上未有施行公與之連姻託病在告恐言者將及李公長者為畏所劫亦上章言臣僚論蘇頌章疏乞早降出施行蘇相遂罷太皇太后察見楊畏等私意復自外召范純仁拜右僕射畏與之邵又言純仁不可用不報之純與頌為姻家當考實録不載之純有言亦當考餘已見二月二十九日伯溫作楊畏傳云吕相大防喜子安除工部員外郎劉相摯亦喜之下遷子安為監察御史欲其為助子安復為吕相攻劉相出之又攻蘇相頌出之子安與蘇門下轍同為蜀人連攻二相欲蘇門下為相而宣仁后復自外召拜范忠宣公子安又言之不從吕相不知劉相亦喜子安遷殿中侍御史以賞其言畏下遷察院六年四月二十四日已辨之遷殿院以賞其言又不然也畏七年六月已自殿院遷侍御史矣或指侍御史猶可已見七年六月二十二日李清臣與許將書云容功之罷雖言者乘之殆別有謂非面敘莫悉也不知清臣所稱別有謂是何事豈即邵伯溫所記楊畏反復攻擊為蘇轍乎當考七年十二月二十八日蘇轍謂范百祿之罷由議汝遮事并考百祿罷在三月十四日三省言除名勒停人前左班殿直王宗正訟謝景溫初宗正為真定路安撫司指使犯自盜贓法當死特貸命除名送賀州編管挾怨念過京師訟景溫故入極刑指景溫嘗與屬官語吳處厚訐蔡確事而處厚死若有異意語涉譏詆吕大防曰宗正凶人自抵於法今以語言訟景溫未明虛實太皇太后曰怨人言語不可行又曰蔡確已死此人姦邪朋黨為害得它如此是國家福大防曰此是天誅前一日新州以確死聞故有此宣諭確死在正月初六日翰林學士顧臨等言準朝旨令侍從官集議皇地祇事內太常博士孫諤奏為太社太稷設樂架等按開元禮祭社稷設歌磬今只於社壇設登歌實為有闕乞從本官所請外有社稷添用宫架并其餘大祠亦合添用宫架不行餘從之諤奏在七年三月十八日臨等上議在八年三月八日今移見此嫌與范百祿事相間也玉牒云詔祀社稷用樂乙酉中書侍郎范百祿奏臺官言蘇頌稽留賈易知蘇州詔旨纍乞罷免劾章所指雖不及臣臣實何顔茍逃罪戾已面奏不敢入省供職詔不允太府卿程嗣恭為將作監政目初六日事禮部侍郎林希出知亳州此政目八日事二月十三日來之邵云云左朝散郎知亳州朱光庭為集賢殿修撰知潞州初劉摯罷相光庭為給事中封還詔書坐是以本官出守至是復職政目有此新録在二月二十九日今從政目詔權侍郎除帥臣依權侍郎初諸部置權侍郎位在正侍郎下俸視諫議大夫不賜金帶餘並依從官范子竒自權户部侍郎以集賢殿修撰知慶州止得庶官恩例八年二月八日子竒自言於朝乃降此詔前此權侍郎未有作帥者作帥自子竒始子竒權侍郎才一年有半及至慶踰半年通及二年乃除寶文閣待制亦自子竒始此據韓駒南窗雜記修入子竒六年十一月十八日以集撰知河陽入權户侍八年二月八日自户侍又以集撰知慶州紹聖元年二月八日自集撰除寶制監察御史黃慶基言宰臣蘇頌近以稽留制書援引親黨除授不當罷政按除授差遣自係中書省同共商議方可進呈今來蘇頌既罷所有中書侍郎范百祿實預職事豈可不任其責如百祿以為不知則同在中書事無不總安可以為不知也如百祿知而曲從則其罪有二一則朋比宰相欺罔朝廷不守典法是不忠也一則內懷險詐恣頌所為隂圖傾奪是不正也衆論喧騰皆以為殊失大臣之體望賜罷黜以慰中外之論侍御史楊畏言近論列宰臣蘇頌沮遏詔命等事頌已罷去竊惟稽滯制書雖出於頌而中書侍郎范百祿既同職事實亦瘝官伏望施行以警在位監察御史來之邵言近論奏宰臣蘇頌徇私滅公遏塞詔旨頌既罷政然挾情之私雖出於頌而中書侍郎范百祿既同職事無所建明亦不能逃連坐之責戊子慶基又言近論列中書侍郎范百祿與宰臣蘇頌同在中書所有除授不當自合均任其責按百祿非特朋比欺罔不守典法內懷險詐隂圖傾奪而已其狠愎自任援引黨與皆有顯然事迹按百祿自執政以來援引吕陶為起居舍人岑象求為諸王位説書皆川人也陶為右司郎中象求為户部郎中各不及半年固非久次良由曲意主張所以驟加進擢假朝廷之名器而收私室之恩其罪一也至如以宋照知鳳州扈充知利州亦皆川人也鳳州職田供給號為優厚初除沈邁待闕已久乃差邁知泉州以鳳州與照衆論莫不為之扼腕其罪二也馮如晦為户部郎中坐前任夔州路轉運使日按發公事不當御史臺究治未結絶間百祿以其同鄉遽除館職差知梓州且凡有案在寺者尚不許注授差遣豈有見係究治未見罪名乃先除大藩更加館職違朝廷之法徇鄉里之私其罪三也百祿頃曾相大河利害是時力以回河為非北流為是及去歲大河復向東流獻議者屢陳其便乞遣近臣相視可否而百祿固執前日之所見力行沮格竟不聞遣使相視遷延至今春水泛漲已無及矣其狠愎自用執一偏之見而沮公共之議其罪四也為人臣者無有乎已况敢顧其私乎豈有久待闕次而奪與它人見係究治而驟加進用上罔聖明下紊綱紀擅威福之權行邪枉之道其罪五也望出宸斷早賜罷黜以協公論本傳云慶基論百祿與蘇軾蘇轍朋比此章乃無軾轍名當考十二日又一章言宋照知鳳州扈充知利州馮如晦知梓州已丑尚書省言諸路廂軍兵士今闕額數多蓋為轉運司吝惜所支衣糧請受致招填不足詔令逐路提刑司嚴切催促須管招及額其合支衣糧料錢並拘管封樁監察御史黃慶基言近論奏中書侍郎范百祿朋比欺罔狠愎自任援引黨與皆有顯然事迹竊謂仕至執政富貴亦已多矣然猶不守公忠援引黨與者無它乃欲擅權勢而固寵利爾浸淫日久臣恐其不止於權勢寵利而已也陛下可不深慮耶前日陛下罷黜劉摯王巖叟朱光庭孫升韓川輩而後洛黨稍衰然而洛黨雖衰川黨復盛矣百祿之親戚朋遊皆在權要陛下可察而知也今因罪狀明白早賜罷黜以離其黨與庶使當路者有所畏憚不敢招權徇私以欺罔聖明不然臣恐其權勢益盛黨與益多牢不可破則潰亂紀綱蓋未已也方陛下垂簾聽政之時正宜時出英斷使臣下咸知警懼不敢公為蒙蔽然後朝廷尊而綱紀正矣臣間唐文宗之世牛僧孺李宗閔楊虞卿之徒交結朋黨遂亂天下文宗至臨朝興歎然終不能去也豈非變詐百端足以熒惑人主之聽乎前史譏之以為持不斷之慮者開羣枉之門臣初見百祿進用一二鄉曲親舊固未以為然既而進用益多論議騰沸乃知其果無體國之心唯欲恣其不法而已伏望斷自宸衷而行之則可若詢諸近臣則同類必曲為辭説以上惑聖聽臣備位言責願竭孤忠故不畏衆怒力為盡言蓋欲大臣守公正小臣循分義名器不假於人威福不移於下而後至治可期也此據編類章疏八年三月十二日奏庚寅禮部言檢準元豐禮部令諸開科場每三年於季春月朔日取裁本部勘會昨元祐五年發解至今已及三年詔所有今歲科場依例施行翰林侍講學士范祖禹言臣前上仁皇訓典願陛下法則仁宗宜以至誠好學為先今因進講月令聖人奉天之事臣竊以畏天者莫如仁宗故願陛下先誠於事天臣聞聖人之事天也非在於七日戒三日齋執圭幣以饗圜丘之時也天之佑聖人也亦非在於祭則降福之時也聖人無一日而不事天天無一日而不祐聖人昔堯授舜舜授禹皆曰天之歷數在爾躬夫帝王之興受天眷命豈一朝一夕哉由其積行纍功素合於天也臣伏見自去冬郊祀以來天人協應風雨時若豐年之祥此乃皇天饗佑陛下至誠之所感而自仲春以來暴風雨雪寒氣過甚節令不時豐年之祥復未可必夫天之於人君亦猶人君之於臣下也小過則戒敕之若其不改然後責罰加焉人君覩小異而不警戒則大異將至矣是以洊雷震則君子恐懼修省迅雷風烈孔子必變敬天威怒也惟陛下戒之慎之無忽天地之小異側身修行以消大異於未然則天心常恱人心常和四海幸甚左朝散郎舒煥校對祕書省黃本書籍政目十三日事明年六月十三日出臣僚上言蠻夷之俗不知禮法與中國誠不同若其戀父母骨肉保惜山林土田資産愛生而懼死其情一也肯無故以其身試白刃哉故蠻夷不寧必有所因或邊人侵迫之邊吏不才不能禁止或邊吏幸功賞造事端如此之類情偽多塗蠻夷性獷急一旦發狂操兵捐軀拒命以鬬朝廷萬里惟邊臣一面奏報而蠻夷終無路自明本心遂使朝廷專治蠻夷蠻夷或怨漢而生事之人每立於二者之間誅謫不加焉及其事平則又有從而得賞者此邊鄙之深患也謂宜自今廣西湖南北益利梓夔路凡有邊事必量事大小差本路監司或别差官並躬詣體量因依聞奏若生事有實狀必正典憲詔荆湖川廣南路今後邊事如因生事所致及申發不實除帥司自合按舉外亦許監司覺察聞奏此據成都邊界册元祐八年三月十三日樞密院劄子辛卯中書侍郎范百祿奏蒙賜詔書依舊供職者國法有常人言可畏雖善貸之明不惑而愚臣之分難安伏望聖慈亟加必罰以為小人之福以警在位之臣詔以百祿為太中大夫充資政殿學士知河中府初罷百祿不除職尚書左丞梁燾爭之乃有是命百祿不除職政目據梁燾行狀蘇轍遺老傳云范百祿罷政實坐努扎按實録乃有黃慶基楊畏來之邵劾章不知轍何以云爾當考又李清臣與許將書云容功之罷雖言者乘之殆別有謂非面敘莫悉也不知清臣所稱殆別有謂是何等事當考左司諫虞䇿言蘇頌罷相臣備言職朝廷進退宰相宜有論列而臣竊自念頌於元豐年中曾薦舉臣在臣之心誠恐近薄有愧風誼以此不敢入文字臣之尸職無所辭誅乞除臣一小州差遣詔不允癸已知鄭州王巖叟知河陽府知河陽府范純仁知潁昌府實録在二十五日知潁昌府安燾知河南府政目有此燾傳但記知穎昌不記知河南天章閣待制知鄭州趙君錫知陳州實録二月二十九日君錫自陳改鄭州當考君錫傳亦自鄭移陳恐實録誤乙未觀文殿大學士集禧觀使蘇頌言冬春以來內感寒壅發則幾於委頓伏望許上封章俾還閭里詔不允除大朝會外仍特免朝會新權户部侍郎章楶知同州言者論楶環州之役所上失亡數不實又縱賊使全而歸户部侍郎非楶能任故有是命楶除户侍在正月二十三日改同州實録不載今從政目係之三月十八日去年十月十二日環州被圍楶遣將追擊有功召權户侍必由此尋以言者論列左遷言者姓名當考李清臣小簡頗及楶事今具注於後舊録既闕新録又不能補填史官疏略如此可嘆也李清臣與知定州許將小簡云北方極靜牛溫仁決不來矣夏羌圍環州劫慕恩族磽瘠無宿藏留數日無所得章帥以兵將間道邀擊之獲級四百得槖駝幾千頭馬四百八十匹羌衆遁去朝廷遣使有所賜章質夫臨老乃有戰多耶兹亦怪事太原小出獲不甚多又與太原韓縝云羌人抄環劫慕恩族將帥出兵邀擊之獲槖駝千馬四百八十梟甲首三百八十羌酋遁去朝廷遣使賫帛賜有功者章質夫懦甚乃有戰多耶斯亦異事矣此中得諜者言遼人為夏國求援差牛溫仁來泛使已而聞夏國點集頻數部族疲於奔命議臣謂不能為中國大害豈可為他夷失我朝舊好耶遂罷役溫仁之來即不審信然否然遼人亦自顧有逹勒逹之戰頻不勝西京奉聖州一帶調發未已因書及此又與許將云容功之罷雖言者乘之殆別有謂非面敘莫悉也章質夫左遷夏羌遣使求欵而犯延麟皆在三月陜塞易帥紛紛新官又不時至邊事極可防虞范相左目廢右目不任西洛文牘之繁且倦應接賔客意欲潁昌安厚卿謀居洛求洛已數月矣各從其便也又與范純粹云質夫竟坐失亡減數縱賊使全而歸抑亦命也羌人昨自遣使才入境即耒耜雲集近邊一二百里耕種殆無間田彼此方議和無由出掠昨折可適乘熟户憤痛出邀戰果有克獲而我兵頗多自掠吾人者止罰可適三十斤不復究治兵輩甚愜機會也慶節乃公舊治故以所聞及之爾北報無他戎主近多服藥戎孫性凶殆如其父已亥國史院進神宗皇帝紀草先是翰林侍講學士兼修國史范祖禹言臣伏見仁宗時蔡襄上真宗所製奉神述摹本仁宗拱立命襄進讀神宗御資政殿史臣進仁宗英宗紀草神宗立聽顧問至讀畢撤案史臣將降階始坐此皆祖宗孝德嚴奉先之禮也臣本院近奉聖旨二十二日進呈神宗紀草伏緣其日係大宴前一日御集英殿獨看恭惟陛下覽先帝史册甫畢即觀百戲理似未安伏望聖慈特降指揮罷二十二日獨看以示陛下聖孝欽崇神考大典專一之意從之尚書禮部言西京留守范純仁等奏本府轉運司與吏部侍郎范純禮同相度得永裕陵角堠只是些小偏斜難以遷改欲更不再移從之庚子詔皇弟諸郡王國公出就外學各賜九經及孟子荀揚各一部令國子監印給中書省言進士御試答䇿多係在外準備之文工拙不甚相逺難於考校祖宗舊制御試進士賦詩論三題施行已逺前後得人不少况今朝廷見行文字多係聲律對偶非學問該洽不能成章若不復行祖宗三題舊法則學者未知朝廷所尚檢會已降指揮將來一次科場如有未習詩賦舉人許依舊法取應解發各格人不得過解額三分之一已後並兼試詩賦取到國子監狀太學見管生員二千一百七十五人內二千九十三人習詩賦八十二人經義不兼詩賦以此可見中外學者習詩賦人數極多詔來年御試將詩賦舉人復試三題經義舉人且令試䇿此後全試三題其雜犯舉人未得黜落別作一項聞奏元符元年八月孔武仲傳云武仲為著作郎論科舉之弊詆三經新義請復詩賦取士未幾復詩賦科兼用經義又疏請罷大義而益以諸經義二篇御試復用三題按武仲為著作郎乃元祐四年七月至八年四月自中書舍人遷給事中自給事中五月遷禮部侍郎今中書建請未必非武仲發之三年九月九日已有此指揮然訖不行政目在二十三日今從實録壬寅資政殿學士知揚州許將知大名府癸卯翰林侍講學士范祖禹為翰林學士兼侍講學士祖禹力辭不許又力辭兼侍講學士曰臣伏見仁宗之初孫奭為侍講學士凡七年乃兼龍圖閣學士馮京避親除侍讀學士後為翰林學士不兼侍讀神宗初司馬光吕公著皆以翰林學士兼侍講初不兼學士之職臣叔祖鎮再入翰林治平中以侍講學士知陳州神宗召還復為翰林學士亦止兼侍讀不帶學士臣於去歲蒙除禁職聖恩許避親嫌改授侍讀學士今復蒙甲前命遂兼舊職是臣因避親嫌不期歲得兩學士在臣之分夫豈敢安朝廷如不許臣辭免新命又以臣久在經筵仍令兼職即乞依舊例止兼侍講不帶學士則於職事無改而不違典故乃詔以翰林學士兼侍講改命在四月八日今并書政目除內翰在四月四日中書舍人孔武仲為給事中政目二十六日實録在四月十四日給事中范育為户部侍郎政目二十六日實録無河東路轉運副使朱勃為右正言政目二十六日事實録無此七年十月勃以京西運副改河東今不知自何官入六年九月二十七日范祖禹薦勃勃時任京西運判紹聖四年四月六日又二十三日以右司諫論事閏四月五日為河北運副甲辰尚書省言勘會諸路常平廣惠坊場錢物文帳並係年終具帳供申有妨照使令户部指揮諸路提刑司將常平廣惠坊場助役錢文帳每年作上下半年依條式具帳供申其元豐八年後至元祐三年即依元豐八年後來未行役法已前免役錢物帳每季具帳供申從之上親祠南郊之月蘇軾言臣聞榖太賤則傷農太貴則傷末是以法不稅五榖使豐熟之鄉商賈爭糴以起太賤之價災傷之地舟車輻湊以壓太貴之直自先王以來未之有改而近歲法令始有五榖力勝稅錢使商賈不行農末皆病廢百王不刋之令典而行自古所無之弊法百世之下書之青史曰收五榖力勝稅錢自皇宋某年始也臣竊為聖世病之臣頃在黃州親見纍歲榖熟農夫連車載米入市不了鹽酪之費所蓄之家日夜祝祠願逢飢荒又在浙西纍歲親見水災中民之家有錢無榖被服金珠餓死於市皆官收五榖力勝稅錢致商賈不行之咎也臣聞以物與人物盡而止以法活人法行無窮今陛下每遇災傷捐金帛散倉廪自元祐以來蓋所費數千萬貫石而餓殍流亡不為少衰只如去年浙中水災陛下使江西湖北雇船運米以救蘇湖之民蓋百餘萬石又計糴本水腳官費不資而客船被差者皆失業破産無所告訴與其官私費耗為害如此何似削去近日所立五榖力勝稅錢一條只行天聖附令免稅指揮則豐凶相濟農末皆利縱有水旱無大飢荒雖目下稍失課利而災傷之地不必盡煩陛下出捐錢榖如近歲之多也今元祐編敕雖云災傷地分雖有例亦免而榖所從來必自豐熟地分所過不免收稅則商賈亦自不行議者或欲立法如一路災傷則鄰路免稅一州災傷則鄰州亦然雖比今之法小有疏通而隔一路一州之外豐凶不能相救未為良法須是盡削近歲弊法專用天聖附令指揮乃為通濟若行臣言稅錢亦必不至大段失陷何也五榖無稅商賈必大通流不載見錢必有回貨見錢回貨自皆有稅所得未必減於力勝而災傷之地有無相通易為賑救官司省費其利不可勝計今肆赦甚近若得於赦書帶下光益聖德收結民心實無窮之利是月軾又言臣聞應天以實不以文動民以行不以言去歲扈從南郊親見百姓父老瞻望聖顔歡呼鼓舞或至感泣皆云不意今日復見仁宗皇帝臣尋與范祖禹具奏其狀矣竊揆聖心必有下酌民言上繼祖武之意兼奉聖旨催促祖禹所編仁宗故事尋已上進訖臣愚竊謂陛下既欲祖述仁廟即須行其實事乃可動民去歲十一月七日曾奏乞放免五榖力勝稅錢蓋謂此事出於天聖附令乃仁宗一代盛德之事入人至深及物至廣望陛下主張決行尋蒙降附三省遂送户部下轉運司相度必無行理謹昧萬死再録前來劄子繳連進呈伏願聖慈特賜詳覽若謂所損者小所濟者大可以追復仁宗聖政慰答民心即乞只作聖意批出施行若謂不然即乞留中更不降出免煩勘當貼黃稱臣所乞放免五榖力勝稅錢萬一上合聖意有可施行欲乞內出指揮大意若曰祖宗舊法本不收五榖力勝稅錢近乃著令許依例收稅是致商賈無利有無不通豐年則榖賤傷農凶年則遂成飢饉宜令今後不問有無舊例並不得收五榖力勝稅錢仍於課額內豁除此一項臣昧死以聞從違當考十月二十三日可考門下侍郎蘇轍奏臣近以御史董敦逸言川人太盛差知梓州馮如晦不當指為臣過遂具劄子及面陳本末尋蒙德音宣諭深察敦逸之妄而以臣言為信臣德望淺薄言者輕相誣罔若非聖明在上心知邪正所在則孤危之蹤難以自安竊詳敦逸所言謂馮如晦事乃其前狀所言之一則其餘事不可不辨遂乞一一付外施行復蒙再三宣諭以謂其它别無實事伏惟聖恩深厚知臣愚拙曲加庇護仰涵恩造死生不忘然臣忝備執政知人言臣過惡而默然不辨實難安職陛下愛臣雖深而不令臣得知敦逸所言臣竊有所未諭也若敦逸所言果中臣病何惜使臣引去以謝朝廷若敦逸所言非實亦使臣略加别白然後出入左右粗免愧恥如不蒙開允非所以為愛臣也所有董敦逸言臣章疏伏乞早賜付三省施行敦逸前奏不傳此初十日所奏後奏云臣近具奏乞減殺川人太盛之勢及乞廣為體訪等事已塵聖覽今採衆言有合開陳下項一訪聞蘇軾蘇轍范百祿輩各有奏舉及主張差除之人惟蘇軾為多或是親知及其鄉人有在要近有在館職有為教官有作監司有知州軍不可以數考是致仕路有不平之歎中書省尚書吏部須籍姓名乞指揮供具便見員數之多寡事勢之何如臣今月初十日有狀乞留中者已略具川人太盛及差除不當等事一高麗買書之事是陛下已降之命因衆臣共為之議得旨而後行尋以蘇軾見拒而罷見有文案在尚書省禮部國子監乞取索看詳祖宗以來祥符年中賜九經史記兩漢三國志諸子聖惠方等文字天禧年中又賜隂陽地里等書皆從其請一黃河軟堰之事亦是陛下已降之命亦因衆臣共為之議得旨而後行尋以蘇轍見拒而罷見有文案在尚書省工部都水監乞取索看詳臣引照尚書省劄子是時蘇轍偶在式假若從衆臣商議之時轍與其事而於上前自為異説則與許將昔年言除張利一管軍事體一般是亦賣其官長異其同僚况將因轍奏彈遂罷政事轍能責人計亦可以自責也就因轍不與議而人主已行之命其可違而拒之者乎臣聞人君者制命者也人臣者承君之命而奉行者也命令重則君尊命令輕則臣強今陛下已行之命而蘇軾蘇轍違而拒之轍之拒命中外聞之已驚駭矣軾之拒命不惟中外知之外國亦知之矣異日敵人生心邊防誤事臣未及議竊惟蘇頌范百祿以稽留制書及差除不當等事朝廷亦已施行若轍與軾豈惟斂恩作福朋黨不公而又拒違君命語其情犯又非頌與百祿之比此而不治命令輕矣臣豈不知川黨之盛人所難言衆惡見攻禍在不測然臣若更畏避是辜陛下之任使欲乞檢臣前奏初十日留中者并詳今來所陳事理斷自宸衷指揮施行前貼黃言奏為蘇軾蘇轍朋黨不公及拒違君命乞令大臣同共體量等事後貼黃言臣謂吕大防必明知此蓋以二聖垂簾之際且務和同豈期軾轍如此狂易乞以臣前後所奏令大防看詳取聖旨如陛下不欲令一宰臣獨當川黨衆人之怨怒則乞指揮下三省樞密院令韓忠彥梁燾鄭雍劉奉世與吕大防同共體量蓋為大臣當議大事故也仍乞早賜施行則天下幸甚編類章疏係八年三月二十日奏此今因蘇轍辨敦逸初奏不得其時既附三月末則敦逸此奏却不當先見於二十日故亦附三月末蘇轍奏辨後五月十六日吕大防言敦逸言轍應三省同簽文字皆以為轍之罪即指敦逸三月二十日所奏也敦逸初十日所奏獨檢討未得今實録但存黃慶基所奏耳王銍補録亦但存敦逸二十日所奏
