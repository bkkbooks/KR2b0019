body:
  text: 續資治通鑑長編卷二宋李燾撰太祖建隆二年春正月丙申朔御崇元殿受朝賀上服衮冕設宫懸仗衛如儀退羣臣詣皇太后宫門奉賀上常服御廣德殿羣臣上夀用教坊樂庚子占城國遣使來貢方物壬寅幸造船務觀習水戰戊申詔以揚州行宫為建隆寺大僕少卿王承哲坐舉官失實責授殿中丞己酉上御明德門觀燈宴從臣江南吳越使皆與焉樓前設燈山火樹露臺張樂陳百戲外國客各獻本國歌舞遂賜以酒食壬子商州言羣鼠食苖詔蠲其常賦癸丑幸元化門犒修河丁夫周顯德末分命常參官詣諸州度民田多為民所訴坐譴黜上將循世宗之制欲先事戒敕之因謂侍臣曰比遣使度田蓋欲勤恤下民也而民弊愈甚得非使臣圖功幸進致其然哉今當精擇其人以副朕意遣官度田據食貨志云皇朝受命頗循周制而常凖崔遜黜責皆繫之二年正月則元年蓋嘗遣官矣本紀實録乃無其二事二年正月壬子實録始載今當精擇其人之言正月丁巳本紀始書分遣常參官詣諸州度田據實録本紀則食貨志誤矣崔遜由伊陽令為太子洗馬元年四月丁亥也常凖削兩任官二年四月甲午也而食貨志并二事合言之疑作志者便文不考其日月先後故失其實然則實未嘗遣官太祖所言當精選其人蓋謂前朝所遣或不得其人如崔遜等也實録又云崔遜責伊陽未滿嵗除洗馬云未滿嵗則其責當在顯德末矣若在建隆初則才逾三月耳不當云未滿嵗也按王仁鎬傳稱顯德中國子博士上官瓚括田河中將大增賦調比户愁怨仁鎬奏罷之蓋當是時坐度田非實貶黜者不但崔遜一人也今皆削去姓名泛云多為民所訴坐譴黜庶無所抵牾云丁巳分遣常參官詣諸州度民田此從本紀也新舊録盡無之詔發京畿陳許丁夫數萬以右領軍衛上將軍陳承昭督之道閔水自新鄭與蔡水合貫京師南歷陳潁達夀春以通淮右舟楫承昭江表人也承昭初見顯德四年不著邑里今從本傳己未幸造船務甲子斬澤州刺史張崇詁初崇詁為泗州刺史李重進出領淮南崇詁迎説以完聚之計重進既敗其事乃露故命戮焉監修國史王溥等上唐會要一百卷唐德宗時蘇冕始撰會要四十卷武宗時崔鉉又續四十卷溥等於是采宣宗以降故事共勒成一百卷詔藏史館賜物有差二月丙寅幸飛山軍營閲炮車庚午幸造船務壬申命給事中范陽劉載往定陶督曹單丁夫三萬浚五丈渠按宋史作五丈河自都城北歷曹濟及鄆以通東方之漕上因謂侍臣曰煩民奉已之事朕必不為也開導溝洫以濟京邑蓋不獲已耳癸酉權知貢舉竇儀奏進士合格者十一人甲戌幸城南觀修水匱丁丑唐主景遣使來賀長春節已卯遣通事舍人王守正使江南勞唐主之遷都也守正未見先是藩鎮率遣親吏視民租入槩量增溢公取餘羡符彥卿在天雄軍取諸民尤悉上聞之即遣常參官分主其事民始不困於重斂於是出公粟賜彥卿以愧其心朔記即以賜粟事繫之元年五月命王仲等監在京諸倉後今從實録舊制竊盜贓滿絹三匹者棄市己丑改為錢三千其陌八十令民二月至九月無得採捕蟲魚彈射飛鳥有司歲申明之辛卯幸迎春苑宴射是月唐主始遷於南都立吳王從嘉為太子監國留左僕射嚴續知樞密院事湯恱佐之恱即殷崇義池州人也姓犯宣祖諱故改焉續事據九國志恱事據本傳三月唐主至南都城邑迫隘宫府營廨十不容一二力役雖繁無所施巧羣臣日夜思歸唐主悔怒欲誅始謀者樞密副使給事中唐鎬發病卒江南野録稱鎬自縊今從五代史鎬初見顯德六年七月無邑里丙申內酒坊火坊與三司接火作之夕工徒突入省署上登樓見之以酒坊使左承規副使田處巖縱其下為盜並棄市酒工五十人命斬於諸門宰臣極諫上怒微解遽追釋之獲免者十二人而已宋朝大事記建隆二年三月林德頌曰在易之乾君象也其德君德也天以剛為德君德而非剛健何以君天下我太祖之開國也以千百年破碎不可為之天下一舉而削平之強者服狠者順俯首聽命惟恐或後處藩鎮以環衛而藩鎮無異辭授守臣以倅二而守臣無異意是果何道而得此哉英武自天雄斷如神開寶六年差利州知州李鑄通判成都府川班妄訴全班盡廢雄武肆掠戮及百人役夫突入省部其主將亦置極法吏黷貨賄者斬官辭濁務者黜威令之不可測如此其誰敢忤人主之意哉初五丈河泥淤不利行舟詔右監門衛將軍陳承昭於京城之西夾汴河造斗門自滎陽鑿渠百餘里引京索二水通城壕入斗門架流於汴東滙於五丈河以便東北漕運甲辰新水門成上臨視焉乙已賜樞密副使趙普宅一區辛亥以雄武節度使守太保兼中書令太原郡王王景為鳯翔節度使充西面沿邊都部署景掖人景初見天福三年起兵伍性謙退折節下士每朝廷使至雖卑位皆送迎周旋盡禮左右或言王位崇不宜過自損抑景曰人臣重君命固當如此我惟恐不謹爾建隆初封郡王朝廷以吏部尚書張昭為使景尤加禮重遺昭萬餘緡左右或言其過厚景曰我在行間即聞張尚書名今使於我是國家厚我也豈可以往例為限於是自秦州來朝上優待之宴賜加等復遣鎮鳯翔宰相范質王溥相繼卧疾上命翰林醫官王襲米瓊視之質溥皆瘳上喜於是以襲為光祿寺丞瓊為都水監主簿北漢冦麟州防禦使楊重勳擊走之重勳即重訓也避周恭帝諱改焉廣順二年冬重訓初見顯德四年十月重訓以北漢麟州來降即命為防禦使令文武官及致仕官僧道百姓自今長春節及他慶賀不得輒有貢獻癸亥上步自明德門幸作坊宴射酒酣顧前鳯翔節度使兼中書令臨清王彥超曰彥超初見開運三年卿曩在復州朕往依卿卿何不納我彥超降階頓首曰當時臣一刺史耳勺水豈可容神龍乎使臣納陛下陛下安有今日上大笑而罷閏三月甲子朔彥超上表待罪於私第上遣中使慰撫之因謂侍臣曰沈湎於酒何以為人朕或因宴會至醉經宿未嘗不悔也侍臣皆再拜本紀及舊録皆於閏月甲子載此事甲子初一日也與癸亥實相接矣蓋因王彥超上表待罪故云而新録乃於己巳始載之恐誤也今不取殿前都點檢鎮寧軍節度使慕容延釗罷為山南西道節度使侍衛親軍都指揮使韓令坤罷為成德節度使自是殿前都點檢遂不復除授已巳幸玉津園庚午詔開封府集衆杖殺皇建院僧輝文僧録瓊隱等十七人各決杖配流先是上還自揚州左右街僧道出迎輝文等擕婦人酣飲傳舍為其黨所告逮捕按驗得實故有是命壬申唐主遣使貢金器二千兩銀器萬兩錦綺二千假謝生辰之賜也丁丑金商房三州民飢遣使賑之癸未幸迎春苑宴射丙戌韓令坤慕容延釗辭宴於廣政殿自是節度使以上出使赴鎮宴如儀是春詔申明周顯德三年之令課民種植每縣定民籍為五等第一種雜木百每等減二十為差桑棗半之男女十七以上人種韭一畦闊一步長十步乏井者鄰伍為鑿之令佐以春秋巡視其數秩滿赴調有司第其課而為之殿最此據本志在三月不得其日今附見閏月後又詔自今民有逃亡者本州具户籍頃畝以聞即檢視之勿使親鄰代輸其租此據本志附見不得其月日也當考夏四月癸巳朔日有食之甲午給事中常凖奪兩官授兵部郎中免先是大名館陶民郭贄詣闕訴括田不均詔令他縣官按視所隱頃畝皆實上怒本縣令程迪決杖流海島凖實為括田使故責之常凖未見潁州團練使范再遇請老授左金吾衛大將軍致仕别降璽書勞問之再遇故唐將以泗州降者也再遇見顯德四年壬寅詔先代帝王陵寢令所屬州府遣近户守視前賢冡墓有隳毁者即加修葺滄州無棣縣民趙遇詐稱皇弟付有司鞫實斬於東市己未杖殺商河縣令李瑶左贊善大夫申文緯除籍為民文緯奉詔按田瑶受贓文緯不之察為部民所訴故也右神武將軍李懷節出典坊州受代歸闕行次華州忿其從者王乘醉手斬之為其黨所訟下吏按劾乙卯責授率府率漢初犯私麴者並棄市周祖始令至五斤死上以周法尚峻壬戌詔民犯私麴十五斤以私酒入城至三斗者始處極典其餘論罪有差私市酒麴減造者之半上又以前朝鹽法太峻是日定令官鹽闌入禁地貿易至十斤煮鹻至三斤者乃坐死民所受蠶鹽以入城市三十斤以上者奏裁太宗實録太平興國二年云先是官貨鹽與民蠶事既畢即以絲絹償官謂之蠶鹽令民隨夏秋賦租納其直食貨志云唐冇蠶鹽皆賦於民隨夏稅收錢絹與實録少異當考五月癸亥朔上御崇元殿受朝服通天冠綘紗袍仗衛如式德音降死罪囚流以下釋之時皇太后寢疾上憂懼乃曲赦天下以祈冥祐焉乙丑天狗墮西南欽天厯推驗稍踈詔司天少監洛陽王處訥等重加研核欽天厯初成處訥私謂王朴曰此厯不久即差因指其當差處以示朴朴深然之初周世宗命國子司業兼太常博士洛陽聶崇義崇義初見顯德四年詳定郊廟器玉崇義因取三禮舊圖考正同異别為新圖二十卷丙寅來上詔加褒賞仍命太子詹事汝隂尹拙集儒臣參議拙多所駁難崇義復引經解釋乃悉以下工部尚書竇儀裁處至當然後頒行三佛齊國遣使來貢方物甲戌令殿前侍衛司及諸州長吏閲所部兵驍勇者升其籍老弱怯懦者去之初置剩員以處退兵此但令諸州揀去老弜者耳部送強壯以補兩司之闕乃乾德三年八月事兵志及經武聖略等多并言之非是今從實録丁丑詔以安邑解縣兩池鹽給徐宿鄆濟之民先是數郡皆食海鹽泝流而運其費倍多故釐革之戊寅賜左補闕氏居方引進副使郭承遷等錢各十萬令與兩浙江南進奉使飲博居方承遷未見舊制文武常參官各以曹務間劇為月限考滿即遷上謂宰相曰若是非循名責實之道會監門衛將軍魏仁滌等仁滌未見治市征有羡利己卯並詔增秩因罷嵗月序遷之制令諸州勿復調民給傳置悉代以軍卒此從新録及本紀舊録蓋無之五代以來典刑弛廢州郡掌獄吏不明習律令守牧多武人率恣意用法金州民馬從玘子漢惠無賴嘗害其從弟又好為敓􅔯閭里患之從玘與妻及次子共殺漢惠防禦使仇超判官左扶悉按誅從玘妻及次子上怒超等故入死罪令有司劾之並除名流扶海島自是人知奉法矣此事新舊録皆不載今從本紀載於此月其日則闕之是月蜀以翰林學士承旨吏部侍郎華陽歐陽炯為門下侍郎兼户部尚書平章事毋昭裔及范仁恕皆致仕仁恕後尋卒此據十國紀年六月甲午皇太后崩后聰明有智度嘗與上參決大政猶呼趙普為書記常勞撫之曰趙書記且為盡心吾兒未更事也尤愛皇弟光義然未嘗假以顔色光義每出輒戒之曰必與趙書記偕行乃可仍刻景以待其歸光義不敢違及寢疾上侍藥餌不離左右疾革召普入受遺命后問上曰汝自知所以得天下乎上嗚咽不能對后曰吾自老死哭無益也吾方語汝以大事而但哭耶問之如初上曰此皆祖考及太后餘慶也后曰不然政由柴氏使幼兒主天下羣心不附故耳若周有長君汝安得至此汝與光義皆我所生汝後當傳位汝弟四海至廣能立長君社稷之福也上頓首泣曰敢不如太后教因謂普曰汝同記吾言不可違也普即就榻前為誓書於紙尾署曰臣普記上藏其書金匱命謹密宫人掌之司馬光記聞稱太后欲傳位二弟其意謂太宗及秦王廷美也今從正史及新録而舊録蓋無是事按太后以周鄭王年幼羣情不附故令太祖授天下於太宗太宗當是時年二十三矣太祖母弟也若并及廷美則亡謂廷美當是時才十四嵗而太祖之子魏王德昭亦十嵗其齒蓋不甚相逺也舍嫡孫而立庶子人情殆不然然則太后顧命獨指太宗記聞誤也正史新録稱太宗亦入受顧命而記聞不載今從記聞按太宗初疑趙普有異論及普上章自訴且發金匱得普所書乃釋然若同於床下受顧命則親見普書矣又何俟普上章自訴且發金匱乎蓋正史新録容有潤色按太宗實録載普自訴章其辭略與記聞同當顧命時太宗實不在旁也正史新録别加刪修遂失事實耳故必以太宗實録及記聞為正王禹稱建隆遺事又云廷美與太祖太宗皆杜太后所生今本傳以廷美為太宗乳母王氏所生非也謹按廷美與趙廷俊同母母姓耿氏實太宗親語宰相國史著之其迹明甚不知遺事果何所據乃云爾就使廷美真杜太后所生冇罪黜廢於親親之道奚損而太宗特設此虛偽以自欺耶其不然決矣或者杜太后愛廷美與親所生不異故世俗因冇是説且太后享年六十崩時廷美才十四嵗逆數之則生廷美時太后已四十七也然宫掖事祕要不可用傳聞無驗語改國史明迹况所謂建隆遺事者亦不必皆出於禹稱所記耶臣燾嘗辨之具開寶九年十月及太平興國六年九月之龜鑑慈闈一語金匱預盟十七載倦勤之後舉神器大挈而授之龍行虎步之天子堯舜授受曽不是過劉元城嘗曰三代而下漢唐不能仿佛其萬一蓋亦嘆詠於斯云壬子翰林學士單父王著言時雨稍愆請令近臣按舊禮告天地宗廟社稷及望告嶽鎮海瀆於北郊詔從之著初見顯德六年六月丙辰宰臣王溥為皇太后山陵使丁巳吏部郎中閻式式未見奪兩任官式監納河陽夏稅倉上得式所收一斛有五升之羡故黜之其後右衛率府率薛勳著作佐郎徐雄亦坐監納民租槩量失平為偵者所告皆免官勳雄皆未見國子司業趙洙為宗正少卿洙父名漢卿憲司以其冒寵授官欲紏之執正者舉禮文不偏諱乃止洙未見是月唐主景殂於南都秋七月唐主景喪歸金陵景喪歸金陵在七月此據王舉天下大定録有司議梓宫不宜復大內太子從嘉不可乃殯於正寢從嘉即位改名煜尊母鍾氏為太后太后父名泰章易其號曰聖尊后立妃周氏為國后封弟鄧王從善為韓王莒公從鎰為鄧王從謙為宜春王從度為昭平郡公從信為文陽郡公右僕射嚴續為司空平章事吏部尚書門下侍郎知樞密院湯恱為右僕射樞密使大赦境內文武進位有差罷諸道屯田務歸本州縣先是唐主用尚書員外郎李德明議興復曠土為屯田以廣兵食水部員外郎賈彬嗣成之所使典掌者皆非其人侵擾州縣豪奪民利大為時患及用兵淮南罷其尤劇者尚處處有之至是悉罷使職委所屬縣令佐與常賦俱徵隨所租入十分賜一以為祿廪民稍休息焉李德明以尚書員外郎初見乾祐二年七月無爵里仕至工部侍郎文理院學士誅死在顯德三年三月闢曠土為屯田在廣順二年罷屯田害民尤甚者在顯德三年戊辰遣使修北嶽廟初上既誅李筠及重進一日召趙普問曰天下自唐季以來數十年間帝王凡易八姓戰鬬不息生民塗地其故何也吾欲息天下之兵為國家長久計其道何如普曰陛下之言及此天地人神之福也此非他故方鎮太重君弱臣強而已今所以治之亦無他竒巧惟稍奪其權制其錢榖收其精兵則天下自安矣語未畢上曰卿勿復言吾已喻矣時石守信王審琦等皆上故人各典禁衛普數言於上請授以他職上不許普乘間即言之上曰彼等必不吾叛卿何憂普曰臣亦不憂其叛也然熟觀數人者皆非統御才恐不能制伏其下茍不能制伏其下則軍伍間萬一有作孽者彼臨時亦不得自由耳上悟於是召守信等飲酒酣屏左右謂曰我非爾曹之力不得至此念爾曹之德無有窮盡然天子亦大艱難殊不若為節度使之樂吾終夕未嘗敢安枕而卧也守信等皆曰何故上曰是不難知矣居此位者誰不欲為之守信等皆頓首曰陛下何為出此言今天命已定誰敢復有異心上曰不然汝曹雖無異其如麾下之人欲富貴者一旦以黃袍加汝之身汝雖欲不為其可得乎皆頓首涕泣曰臣等愚不及此惟陛下哀矜指示可生之途上曰人生如白駒之過隙所為好富貴者不過欲多積金錢厚自娛樂使子孫無貧乏耳爾曹何不釋去兵權出守大藩擇便好田宅市之為子孫立永逺不可動之業多置歌兒舞女日飲酒相歡以終其天年我且與爾曹約為婚姻君臣之間兩無猜疑上下相安不亦善乎皆拜謝曰陛下念臣等至此所謂生死而肉骨也明日皆稱疾請罷上喜所以慰撫賜賚之甚厚庚午以侍衛都指揮使歸德節度使石守信為天平節度使殿前副都點檢忠武節度使髙懷德為歸德節度使殿前都指揮使義成節度使王審琦為忠正節度使侍衛都虞候鎮安節度使張令鐸為鎮安節度使皆罷軍職獨守信兼侍衛都指揮使如故其實兵權不在也殿前副都點檢自是亦不復除授云此事最大而正史實録皆略之甚可惜也今追書按司馬光記聞云守信等皆以散官就第誤矣王曾筆録皆得其實今從之文辭則多取記聞稍增益以丁謂談録太祖與趙普之意但不欲守信等典禁軍耳豈不令守信等各居方鎮耶太祖云為天子不若為節度使樂是欲守信等出為節度使也及開寶三年冬十月乃罷王彥超等節度使蓋記聞誤并二事為一耳邵伯溫見聞録又云王審琦坐擅入禁中救火故罷不知同時罷者凡四人初不緣入禁中救火也今不取壬午以皇弟泰寧節度使兼殿前都虞候光義兼開封尹同平章事嘉州防禦使廷美為山南西道節度使先是范質奏疏言光義廷美皆品位未崇典禮猶闕伏乞並加封册申錫命書或列於公台或委之方鎮皇子皇女雖在襁褓者亦乞下有司許行恩制又言宰相者以舉賢為本職以掩善為不忠所以上佐一人開物成務端明殿學士吕餘慶樞密副使趙普富有時才精通治道經事霸府歷嵗滋深自陛下委以重難不孤倚任每因欵接備覩公忠伏乞授以台司俾申才用今宰輔未備久難其人以二臣之器能攀附之幸會置之此任孰謂不然上嘉納之上謂殿前衛士如虎狼者不下萬人非張瓊不能統制乃自內外馬步軍都頭夀州刺史擢殿前都虞候領嘉州防禦使瓊館陶人也瓊初見顯德三年命內客省使王贊權知揚州軍府事贊乘舟以往溺於閶橋上嗟悼謂左右曰是殺吾樞密使也贊嘗為河北諸州計度使五代姑息藩鎮有司不敢繩以法贊振舉綱維所至發摘姦伏無所忌上知贊可付以事因使完葺揚州蓋將大用之而贊遽死贊觀城人也是月陳承昭塞棣滑決河役成賜錢三十萬唐句容尉廣陵張佖上書陳十事其一舉簡要二略繁小三明賞罰四重名器五擇賢良六均賦役七納諌諍八究毁譽九節用十屈已唐主嘉納擢為監察御史佖因劾奏德昌宫使傅宏妄毁都城所創樓堞率多隳壞禮賔使孟駢建議於星子造大艦以禦敵纍年不能成蠧國害民皆請置法唐主不聽手詔開諭之拜御史從國史十事之目據鄭文寶江表志又載佖上書日乃七月二十八日己丑也故附見於此吳越自五月不雨至七月八月甲辰唐桂陽郡公徐邈奉其主景遺表來上邈未見義武節度使同平章事孫行友行友初見開運三年五月按宋史及薛應旗續通鑑皆作易定節度使同平章事孫行友在鎮逾八年而狼山妖尼深意黨益盛深意亦見開運三年五月上初即位行友不自安纍表乞解官歸山上不許行友懼乃繕治甲兵將棄其孥還據山寨以叛兵馬都監藥繼能密表其事繼能未見上遣閣門副使武懷節懷節未見馳騎會鎮趙之兵偽稱巡邊直入定州行友不之覺既而出詔示之令舉族歸朝行友蒼黃聽命既至命侍御史李維嶽維嶽未見即訊得實己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之辛亥女真國遣使溫圗喇來貢名馬幸崇夏寺觀修三門永濟縣主簿郭顗坐贓一百二十萬棄市詔緣邊諸塞有犯大辟者送所屬州軍鞫之無得輒斷曹州寃句令侯陟以清幹聞甲寅擢左拾遺知縣事節度使袁彥頗為不法陟抗章言之彥上表謝自陳無罪上亦不窮治焉陟長山人也丁已詔刑部應諸道州府有犯鹽麴人合配役者祗令本州充役示寬典也國子周易博士郭忠恕被酒與太子中舍符昭文喧競於朝堂御史彈奏忠恕叱臺吏奪其奏毁之己未責忠恕為乾州司户參軍昭文免所居官忠恕洛陽人也庚申史館上周世宗實録四十卷賜監修國史王溥修撰官扈蒙器幣有差詔華州修西嶽廟九月壬戌唐主煜遣中書侍郎馮謐來貢謐即延魯也唐主手表自陳本志沖淡不得已而紹襲事大國不敢有二鄰於吳越恐為所讒上優詔以答焉初周世宗既取江北貽書江南如唐與回鶻可汗之式但呼國主而已上因之於是始改書稱詔甲子以荆南行軍司馬寧江節度使髙保朂為荆南節度使上初聞保融之喪遣兵部尚書萬年李濤濤初見天福二年回之族曽孫往弔及還上問保朂堪其事否濤以為可任而保朂貢奉亦數至乃授節鉞保朂性淫恣日召市倡集府署擇士卒之壯健者使相媟狎保朂與姬妾帷簾共觀笑之又好營造臺榭極土木之巧軍民咸怨記室孫光憲諫曰宋有天下四方諸侯屈服面內凡下詔書皆合仁義此湯武之君也公宜克勤克儉勿奢勿僣上以奉朝廷中以嗣祖宗下以安百姓若縱佚樂非福也保朂不從光憲貴平人也光憲初見天成元年是日契丹吉里來降癸酉以鴻臚少卿盧浚為京畿東路發運使盧浚未見戊子遣鞍轡庫使梁義如江南弔祭上召見面賜約束因謂左右曰朕每遣使四方常諭以謹飭頗聞鮮克由禮逺人何觀焉左右請齊之以刑上曰齊之以刑豈若其自然耶要當審擇其人耳梁義未見詔罷大宴以皇太后喪故也冬十月癸巳唐主以皇太后山陵遣户部侍郎北海韓熙載太府卿田霖來助葬熙載初見天成元年叔嗣之子也霖未見乙未升棣州為團練以副使何繼筠充使丙申命樞密承旨方城王仁贍使江南以唐主新立往申慶賜也初五代募民盜戎人馬官給其直籍數以補戰騎之闕上欲敦信保境戊戌敕沿邊諸州禁民無得出塞侵盜前所盜馬盡令還之由是邊人畏慕不敢內侮丙午祔葬明憲皇太后於安陵唐主以南都留守韓王從善為司徒兼侍中諸道兵馬副元帥鄧王從鎰為司空南都留守令諸司無職事官四品以下至九品日二員待制於內殿仍各上封事三兩條時有才髙位下者私喜其言得達多所開陳而迄莫施行衆始失望是月命知制誥河內盧多遜看詳進䇿獻書人文字升降以聞十一月己巳幸相國寺遂幸國子監壬申宴宰臣節度防禦團練使刺史統軍諸軍廂主軍指揮使以上及諸道進奉使於廣政殿不作樂時明憲太后山陵諸道並遣使進奉於是禮畢特犒之癸酉以沙州節度使同平章事曹元忠及其子瓜州團練使延敬按延敬宋史作延繼皆遣使來修貢元忠義金之子也義金事初見大中五年後見咸通十三年及同光二年元忠嗣為節度使據會要在顯德二年後據薛居正五代史則義金卒於天福五年二月子元德襲其位而天福八年正月又載沙州留後曹元深除歸義節度使開運三年乃書以瓜州刺史曹元忠為沙州留後而國史及會要並無元德元深二名不知何也己卯上始獵於近郊賜宰相樞密使節度觀察防禦團練使統軍侍衛諸軍都校錦袍其日先出禁軍為圍場五坊以鷹犬從上親御弧矢射中走兔從官貢馬稱賀中路頓召近臣賜飲至夕還宫其後凡出田皆然從臣或賜窄袍暖鞾親王以下射中者賜馬癸未詔以濠楚民飢令長吏開倉賑貸晉州言敗北漢軍於汾西獲馬牛驢數千計時趙元徽為節度使而本傳不載此事實録亦無之豈元徽實未赴鎮耶不知果誰守晉州也武守琪戌晉州事迹國史殊不詳此或是守琪耳當考十二月壬辰輝和爾罕錦瓊遣使來貢方物甲午于闐國王李聖天遣使來貢方物乙未昭義節度使李繼勳奏敗北漢軍千餘人斬首百餘級獲遼州刺史傅廷彥弟勳以獻代州刺史折仁理黨項蕃部之大姓也世居河西接鄰北境上以其有捍邊之功召令入覲復命歸領刺史如故辛丑幸新修河倉庚戌畋於近郊癸丑遣供奉官李崇贇崇贇未見使江南殿直孫全璋全璋未見使吳越賜以羊馬槖駝等乙卯中書門下言得太常禮院狀皇后姊太原郡君王氏卒凖禮例皇后當出就故彰德節度使王饒第發哀成服百官詣其第進名奉慰從之周廣順初鎮州諸縣十户取才勇者一人為弓箭手餘九户資以器甲芻糧是嵗詔釋之凡一千四百人此據兩朝兵志始置藏氷務常以孟夏命官用幣以黑牡祭玄冥之神乃開氷薦於太廟初南漢女巫樊胡子自言玉皇降其身因宦者陳延夀以見南漢主南漢主於內殿設幄帳陳寶貝胡子冠逺遊冠衣紫踞坐帳中宣禍福呼南漢主為太子皇帝國事皆決於胡子內太師龔澄樞女侍中盧瓊仙等附之胡子每為南漢主言瓊仙澄樞延夀等皆上天使來輔太子有罪不可問是嵗芝菌生宫中野獸觸寢門苑中羊吐珠井旁石自起行百餘步乃仆胡子皆以為符瑞諷羣臣入賀澄樞見顯德三年瓊仙見乾祐三年唐主煜追諡其父景為明道崇德文宣孝皇帝廟號元宗陵號順陵蓋因馮謐以請於上而為之
