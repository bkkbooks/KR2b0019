body:
  text: 續資治通鑑長編卷二百八十二宋李燾撰神宗熈寧十年五月庚戌朔詔諸路言蝻蟲生宜申嚴條約下當職官亟除絶之宣徽南院使判應天府張方平為東太一宮使聼居南京方平四表乞致仕而有是命蘇軾代方平作好兵猶好色疏附此年末監西京抽稅竹木務太子中允程顥改太常丞以知河南府賈昌衡京西北路轉運副使李南公等言顥博通古今行誼修潔改官八年未嘗磨勘故也詔交趾納欵如遣人議事許至桂州從經略使趙卨請也蠲机榔等縣防戍軍馬借支路費錢蘄縣桐墟鎮廵檢殿直劉震為軍賊王海所殺授震子借職法寺言在京床子弩雄武第二指揮王秀等十人坐唱率軍衆毋徃搬卸小麥副都頭牛遂不禁止之秀等比附徒三年刺配五百里外牢城遂當杖六十詔斬秀軍門餘九人配流海島及廣南遂杖百降曹州員寮剰員直此或與四月丙戌搬麥指揮相闗辛亥京東轉運司言萊蕪縣廵檢左班殿直賈若水坐以功贖過免勒停壬子詔大宗正司定武軍留後承裕候所展限及半年與磨勘承裕嘗於殿廬厲聲責大宗正及毆妷婦吳展一年半磨勘上以其屬尊故特減之詔銓試經書律令大義等人經書上等循一資堂除差遣中等先次指射優便差遣下等不依名次注官先次差遣其刑法人第一等充法官第二等循兩資第三等循一資第四等與堂除第五等與免試又詔諸路提舉官每員嵗舉轄下選人九人充京官詔福建路轉運司督捕賊廖恩事有奏禀不及者行訖以聞有能獲恩與右班殿直本路廵檢賜錢五百千獲以次首領等第論賞許自相殺併或禽捕送官原罪亦依此賞之詔河北東西路轉運判官汪輔之黄莘各具廵歴到州軍所支人糧斛様附遞入進四月壬寅輔之自西路改東路可參照乙夘詔廣南西路轉運司具軍興計置金銀錢帛糧草見存名物貯積州軍令提舉官拘轄催驅毋輒費用詔保州保塞定州北平曲陽唐縣尉令定州路安撫司權舉使臣以北人數入為盗故也丙辰詔緣邉安撫司北界遣人移文或押送人口至不係承接州軍城塞並婉順說諭約廽令徃當承接州軍丁巳内殿崇班閤門通事舎人髙公繪髙公紀並遷禮賔使公繪嘉州刺史公紀榮州刺史皇太后殿祗應江有章姚宗元遷一資以皇太后同天節推恩也檢正中書戸房公事安燾言凖敕體量河北京東等路賊盗竊以朝廷平日立法以治盗賊者其追捕之格購賞之科不為不􅊀然今日兩路之民不因災饉而轉為賊盗者相繼至於率衆羣行殺害官吏雖誨盗致冦之由未可遥度然購捕之格恐難以常法治之今獻四事一強盗雖殺人為首者能捕斬死罪兩人為從者捕斬一人以上並原罪給賞二告獲強盗各依重法地酬賞外第加一等三大名府濵棣徳州賊盗如被吿獲依重法處㫁不用格改法四強盗如不自陳首遇将來郊赦未得原免並具情理奏裁從之知韶州都管郎中王之才降勅奨諭以其修治城池不擾民也詔應市易司計置物貨場務不依客例收税並許勾當官申提舉司牒提刑司根究依法施行詔中牟縣列子觀昨經燒毁官為與修仍令道録司選差道士一名管勾㤙例如舊戊午詔修仁宗英宗兩朝正史命宰臣吳充提舉以龍圖閣直學士右諌議大夫宋敏求為修史秘書監集賢院學士蘇頌同修史秘書丞集賢校理王存太子中允集賢校理崇政殿説書黄履著作佐郎集賢校理林希並為編修官勾當御藥院李舜舉管勾兼受奏事暫通銀臺司入修國史院其修史官等禁制并書吏漏泄並依天聖五年修史例銀䑓司權徙於起居院徙銀䑓司丁夘日事今并書敏求八年十一月二十五日為龍圖直龍神衛四廂都指揮使忠州刺史新鄜延路副都總管燕逹權管勾歩軍司歩軍副都指揮使鄜延路副都總管楊遂留鄜延如故詔諸路監司提舉司嵗終各具所分州縣廵歴月日限次年正月十五日以前申中書㸃檢廵歴不遍者奏裁所至有辭訟及官司違法雖非本司事並聽闗送案治庚申詔以歐陽修五代史藏祕閣秦鳳熈河路計議措置邉事李憲上攻討山後生羌禽隆吉卜功狀詔以熈河經略使司封即中天章閣待制張詵為右諌議大夫權發遣秦鳳路轉運副使降授太子中允趙濟復官遷一資權轉運判官太子中舎孫逈減磨勘二年權提㸃刑獄主客即中鄭民憲降敕奨諭中軍將引進使英州刺史王君萬重傷復客省使達州團練使賜絹二百副將崇儀使張若訥遷内藏庫使前軍將皇城使姚麟為西上閤門使英州刺史副将内殿承制孫咸寕為禮賓副使兼閤門通事舎人左軍將引進副使种諤為東上閤門使文州刺史副將西京作坊使楊萬為宮苑使右軍将皇城使文州刺史韓存寳為西上閤門使忠州團練使副將引進副使李浩為東上閤門使果州團練使副將左藏庫使夏元象為皇城使康州刺史壬戌以昭宣使嘉州防禦使入内押班李憲為宣制使宣州防禦使入内副都知左軍西京左藏庫副使徐禹臣右軍内殿崇班張承鑑等七人轉官減年循資有差蕃官皇城使康州刺史包順二子各轉一資皆賞功也先是隆吉卜誘山後生羌擾邉摩正請自効衆以為不可憲曰何傷羌戎畏服貴種其天性也摩正盛裝以出諸羌聳視皆無鬬志我師乘之獲級生降以萬計臨陣斬隆吉卜董戩懼因作旁行書喻之遂遣使入貢此據憲本傳附見御史彭汝礪言臣昔者論不當付寺人以兵陛下以為非是及李憲師出果獲果荘果獲果荘獲字必誤自洮以西遂至無事而臣言絀矣而臣之言非以憲為不足以成功所慮亦不在憲故臣言自絀於疑猶信天下之事固有趣時而為之者然其大綱亦不可以一概言也今以周官觀之考其數葢不及百人而所事亦略可見以今視之其多少輕重何如也葢古者因民之有是疾故擇而任焉非以使令之故刑無罪之人而為之也彼其類非無聰眀賢智無故使以刑徒失身廢絶其類至踰千百焉此非先王以仁愛人之道也古人惟酒漿醯醢司服守祧而已其他莫與焉今以一道之權予之此非先王以義制事之意也憲辟薛昌朝不聼切齒扼腕以為為腐儒所賣自是不復回顧士人矣張茂則以河事頡頏作氣官屬罕見其面雖逹官大吏俛首不敢與抗而姦詐之人稍復趨附以僥倖萬一之時陛下以幾觀之使其有可以輕士之勢其心如何也且朝廷比年之役其最貽陛下憂者洮西闗蜀其最繫議論者惟濬川之役今日之役最為大者洮河之役數者皆在寺人是陛下所愛飬尊寵之士大夫無一可屬任者已且彼其初非無敏健精悍可用之力及稍任事者則窺覦玩弄蹈藉士大夫矣詩曰殷鑑不逺在夏后之世陛下試取漢唐以來宦官之事觀之亦足以知矣自古人君方其無事之時未見其害則士大夫之言為不足信亦莫之聼也及其禍亂既作本末顛沛至於無可奈何而後己自古及今葢非一二也惟陛下為宗杜計之不勝幸甚福建路兵馬都鈐轄司乞遇大段賊盗差調兵馬許本司立定數目預借錢銀起發犒設從之癸亥知越州資政殿大學士趙抃知杭州抃知越州時兩浙旱蝗米價踴貴餓死者什五六諸州皆牓衢路立告賞禁人增米價抃獨牓衢路令有米者任增價糶之於是諸州米商輻輳詣越米價更賤民無餓死者此據司馬記聞先是淮浙饑詔出夲界上供米損市價糶以活饑民發運副使盧秉言價雖賤貧者終不得米請償糴夲盡以其餘賑恤流民詔可是嵗奏計上問曰始聞滁和民食蝗以濟有之乎秉對有之民饑甚死者相枕藉上惨然曰獨趙抃為朕言與卿合前此發運司入奏多獻羡餘以希恩秉獨以錢七十萬緡償三司舊負因言發運司但督六路財賦以時上之本無羡餘以進者率正數也乞遂禁絶上嘉納之秉事因趙抃知越州附見不知秉入奏果是何年秉以八年七月除發運九年廣西用兵其入奏或當十年也賜上供米賑濟飢民乃八年十月十二日御史中丞鄧潤甫知雜事蔡確言開封府判官吳幾復奉詔劾王永年告其妻之兄弟宗室叔皮叔兼等易衣私出求卜言渉不順及永年妻趙氏又訟永年盗官錢事是時永年未死幾復已索永年與叔皮楊繪竇卞等徃還書簡幾復推允叔皮等所言本末至於繪卞書簡皆不問乃以他事為辭乞送府司勘結顯為有所畏避案幾復人物庸下素行汚鄙京府之任已為玷竊復敢隂黨貴勢巧避君命乞行黜責詔與幾復小州詔諸軍賞功以應轉資係轉資并五路衮轉諸軍每合轉一資指揮使陞十名副指揮使陞三十名軍使都副以下並轉資與衮轉下軍下名安排右軍蕃官軍主喬巴裕等四十四人各斬獲溪下首級賜銀有差甲子吴充言史院舊用中書樞宻院時政記及起居注諸司文字纂類日歴時政記纔送至熈寕六年起居注至熈寕二年恐由此事實遺廢乞責近限修進從之詔雄州歸信容城縣民㳺化與三班差使知縣李澤縣尉宋國彦各減磨勘三年以獲北界強盗一十一人也都提舉市易司言乞定上界夲錢以五百萬緡為額以本理息及一分半等第推恩見在息錢先封樁聼朝廷移用從之詔提舉在京諸司庫務翰林學士禮部郎中楊繪責授荆南節度副使不簽書公事候過郊禮與分司判將作監刑部員外郎天章閣待制竇卞落職提舉舒州靈仙觀並坐受所監臨王永年供饋物也刑部言諸處斷遣宣敇自經治平大水頗多散失亦有本處元不闗到者雖曽闗到而吏胥隱漏檢㑹之際㦯容僥倖至於官貟犯罪并刼賊偽印三等公案略不以時架閣凡有取索動經嵗月其間覊旅之人尤可矜憫欲乞計㑹審官東西院流内銓并入内内侍省取已斷官貟宣敕與本部宣敕比對職位姓名如有漏落更互抄録以補其闕仍重編排自慶厯二年為始其熈寕十年以後公案别架閣略具元犯因依姓名申提㸃刑獄司類聚繳納夲部月輪詳覆官一貟與主簿更五計㑹合屬處抄録編排從之乙丑詔邕州召募頭首譚楷與三班借職以邕州言與交賊戰有功也丙寅太子中允權監察御史裏行蔡承禧為集賢校理提㸃開封府界諸縣公事承禧累乞罷臺職久之乃有是命承禧嘗言臣伏以陛下之盛德以臣之至愚不能形容然於文眀而剛大勇智而仁厚臣庶幾或略望清光焉臣伏思陛下以欽承七廟之靈奉飬二宫之懽而又繼之一日萬㡬之勞而思索被於天下四方之事勤可謂至矣而治猶若不充於聖心者何也今之患在乎百職之不自任其職而已中書以進人選才之方諉於陛下宻院以用兵擇帥之事諉於陛下事事皆出於聖意若有未合於輿議則曰皆出於宸衷如是則天下自古迄今何湏輔佐乎凡今之事略可言矣大臣皆不自任其責葢以天下之人才一進于左右天下之廣士人之衆皆出於頃刻一言觀帝堯之聖孔子之智或失之四㓙或失於子羽彼皆積嵗於左右者猶失之而今也以片言之間而求之陛下雖至聖矣臣之愚竊疑乎其未至盡也故大臣不自任其責萬一或自容其私則天下亦不得而見矣何則陛下之斷素出於中也故百職之吏亦相習以成風有操兩可之論以倚决於上者有摭細故以塞重責者此又安得而悉見乎積此而往非所以致大治也古之用兵而任將者覆軍凶師者固有之矣至於用之久則名將出焉葢始任之則有不逮者及其久則人才自然而出矣臣欲乞今後進人發對者必令進曰可以當某用可為某官某職其不當也又假論議之臣以論之集之多則以為大臣進退則才噐職業無諉上之非而臣下亦不敢不盡其心矣又言臣竊以陛下執長䇿以馭天下而所當精擇在相與將二者而已相臣主於用材將臣主於用兵百職不得其治則屬於用材之相六師不得其序則屬於用兵之將二者得其序而天下不治未之有也竊見陛下即位以來求士如不及非惟若商人之立賢無方也又若文王之能官人也非惟若文王之能官人也又若虞舜之諧庶尹也故或取之於下僚或召之於數千里之外或見之於咫尺之間或得之於事功或進之於語言可謂盛矣然竊觀召對之臣非才行卓異之人或儕流推許之士不以進也何則所欲用之重則進之也殊所將待之厚則遇之也異故也如聞二府近薦登對者四人盛僑張堯夫李師德蔡洙惟洙少有稱於儕伍他皆未之聞也稽之議論則以為未見可稱審之中外則以為不知有善不知以何薦之又不知以何而不用衆多疑惑未知所因向者熈河出兵用内臣李憲為熈秦處置人皆以為出於聖斷二府不得已而從命及推原其因乃自二府進擬夫中人之進自古人主有便於一已之指令遂屈羣議而用之者有矣今二府乃自進擬固非所宜夫登對之人欲以備不次之用而進無可稱述之人宫寺之官本以充人主給使之職而乃為大臣之所進擬臣慮庸庸之人汲引漸滿中外而人主動作則左右小臣皆為大臣窺察啓臣下表裏邪惡之漸惟幸陛下攷察之二章不得其時承禧罷御史後更湏考詳詔鄭州長史柴衮令流内銓與注逺處主簿或尉衮周世宗之姪元孫受命已十年乞注一官故也中書門下奏近詔京東河北路強盗罪至死知人欲告及按問欲舉而自首合該減等内係羣黨及情重者未得斷放奏取指揮内有所犯情理不一者欲令比附施行從之詔應係朝廷已降指揮後來面奉指揮改更者並依傳宣内降申中書樞宻院覆奏施行丁卯龍神衛四廂都指揮使忠州刺史燕達除榮州防禦使以收復廣源州之勞也詔安南軍回士卒病者委所在官舎存泊差軍員提舉續給口劵官備粥藥州軍委都監縣鎮委主簿或監鎮官檢視録連劒州都廵檢内殿承制郝懐素子漢臣為三班奉職南劔州廵鹽左侍禁蘇用子球為三班借職以懐素等與廖息鬭為所殺也戊辰詔命官使臣縁安南軍興死亡者旅櫬行李委州縣舁櫬還其家庚午詔侍御史知雜事蔡確知諌院黄履定奪衛州運河及疏濬黄河利害異同理曲不實之人劾罪以聞如合就案騐輟官一貟及取㫖遣内侍同往初熊本既受命與都水監主簿陳祐甫河北轉運使陳知儉共按問諸埽言八年故河道水減三尺濬川杷未至間已增二尺杷至又增一尺且從此以前十年水皆夏溢秋復不惟此一年水落實非杷所致本等乃集臨清冠氏縣十五人責狀及據埽上水歴即南岸以杷試驗雖小有增深寸數翌朝再測已與未濬時無異又訪議者皆以運河之興有費無利且為官私之患遂以文彦博所陳為是奏乞廢濬川司時范子淵在京師先聞之遽上殿言熊夲陳祐甫意謂王安石出文彦博必將入相附㑹其意以濬川杷為不便臣聞夲奉使按事乃詣彦博納拜從彦博飲食祐甫知儉皆預焉及屏人私語今所奏必不公且觀彦博之意非止言濬川杷而已陛下一聽其言天下言新法不便者必蠭起陛下所立之法大壊矣上頗惑其言詔以夲等奏送都水監及外監丞司子淵遂訟本等以七月中北岸水歴定五月中南岸河流漲落又不皆至河所視其利害及大名府已嘗保眀用杷浚二股功利牒轉運司兼夲等専取索濬河司事總四千七百餘紙即未嘗取索大名府安撫司轉運司事相參照而確亦劾夲奉使不謹議論不公乞更委官定奪是非故就委確及履仍即御史臺置獄推究九年十二月癸未朔本初受命相視元豐元年正月己巳本責熊本集有御河及濬川二劄子可刪取増入今附此臣勘㑹河北路州軍自來賞給等茶貨以至沿邉𣙜塲要用之物並自黄河運至黎陽出卸轉入御河費用止於客軍數百人添支而已向者朝廷曽賜米河北亦於黎陽或馬陵道口下卸倒裝轉致費亦不多昨因程昉等擘畫於衛州西南循沙河故迹决口置牐鑿隄引河以通淮舟檝而實邉郡倉廪自興役至畢凡用錢米功料二百萬有竒今後每嵗用物料一百一十六萬廂軍一千七百餘人約計費錢五萬七百餘貫昨開河行水纔百餘日所過船栰六百二十五而衛州界御河淤淺已及三萬八千餘歩沙河左右民田渰浸者㡬千頃所免稅租一千貫石有零故議者皆謂此河之興有費無利而又生公私之患臣近凖敕命躬親按視其利害之實誠如議者所論然尚有大者且衛州居御河上㳺而西南當王供向著之㑹所以捍黄河之患者一隄而已今穴隄引河而置牐之地纔及隄身之半詢之土人云自慶歴八年後大水七至方其盛時㳺波有平隄者今河流安順三年矣脱復礬水暴漲則河身乃在海口之上以湍悍之勢而無隄閣之阻汜濫衝溢下合御河當此之時臣恐墊溺之禍不特在乎衛州而瀕御河郡縣皆罹其患矣夫建功立事將以便兹民而惠萬世也故利之博者不計其費今此河之興一嵗所濟船栰其數止於如此而以為經久公私之利不測之患萌於每嵗不貲之費積於無窮而議者弗及焉豈陛下所以垂世裕民之意㢤臣博采衆論究極咸以謂完故隄堰新口存牐而勿治庶可以銷淤澱决溢之患而省無窮之費萬一他日朝廷欲由此河轉粟塞下則暫開亟止或可以紓飛輓之勞其議論子細臣已同吳審禮等具狀聞奏去訖伏望决於聖㫁早降指揮又臣近凖勑計㑹都水監本路轉運司那官兵同相度疏濬黄河利害聞奏謹具如後用一范子淵奏將熈寧七年以後三年内應管諸埽所物料并差夫數目一例滚合稱比向前未用杷三年減得物料七百七十餘萬及不差二十二萬三千餘夫臣勘㑹沿河共管八十四埽三年内計重疊疏過向著二十二埽其不經疏濬去處至多因逐年河水調勻别無决溢横費兼檢㑹熈寧六年十二月勅節文河北差夫不得過五萬人亦係朝廷指揮減却所差人數一范子淵奏稱熈寧七年已後至九年終疏濬過灘觜及因此退出灘地共三十六萬餘歩減省得開㙭并捲埽二千七百餘萬工物料九百五十餘萬臣尋躬親并差官及取索文案照㑹得已疏濬灘觜地歩及退出灘淺去處即今多却依舊及取問得自來河上隄埽向著即不曾用人兵於對岸開㙭灘觜所下埽緷多少亦只㨿向著𦂳慢今來有曽疏濬處所用物料比元約全不曽經䟽濬處所用物料却多以至雖曽疏濬却有無退灘淺去處變一范子淵奏稱熈寕八年八月内二股河泛溢河道易在王胡莊尋用杷疏導水勢奪歸二股河退灘内民田數萬頃臣契勘當年二股河次下埽分各有河水長落尺寸月日公檢照證得未用杷已前河勢已減退兼王胡莊許村港逓年黄河泛漲出岸渰浸民田至霜降水落退出一臣與陳知儉等曽將杷船於黄河淺處略行試驗雖㣲有増深尺寸隔日便有淤澱伏緣河流湍猛變易自如并兩岸相去闊逺其濬川杷雖時暫可以疏導淤淺至於張官置局差占人船施功尋丈而云能回奪大河自立工料而云能減省費用此議者所以紛紛也其利害子細臣已同陳知儉等具状奏聞外所有部大提舉疏濬河司公事仍乞先次廢罷詔今後二府使相宣徽使以冠帔換授翰林醫學已上章服並須轉服色及五年以上方許陳乞同提舉成都府等路茶場公事蒲宗閔言夲司搬賣解鹽已䝉改法依舊通商外有茶法事亦相闗須至更改每年欲起發茶四萬䭾赴秦州熈河路依市價賣仍認定税息錢應副博馬糴買糧草并川峡路民間食茶許逐場依市價添減收買毎貫收息錢一分出賣仍沿貫納長引錢鳳州鳳翔永興軍環慶路州軍亦依舊為通商地分許客人於川中茶場筭請興販知彭州吕陶亦言官場買茶虧損園戸有致詞訴及生喧閙上詔川中茶場今後不得虧損官私其取淨利三分指揮更不施行彭州堋口茶場園戸作閙仰夲路轉運司根究施行餘令提刑司等同共相度體量利害聞奏官司如有不實亦一面取勘施行已上並從朱本已下並增入先是陶言臣竊見朝廷初遣李把及蒲宗閔等入川相度買茶徃熈河博馬等事當時奉使者急於進用不察事體遂認定逐年息錢四十萬貫應副熈河後來運茶積滯嵗課不足即便擘畫却於彭漢二州逐年收買狹布各十萬匹名為折當脚錢其實將布上所得之息充入茶利自後又恐買布亦難敷及元數則乞却雇回脚船車搬觧塩入川洎至塩法難行則又乞將川中有茶去處並行收買前後乖錯非止一事國家冨有四海山澤之利多與民共自仁祖臨御以來深知東南數路茶法之害制詔有司一切弛放任令通商貨法流行徳澤深厚聖時盛事髙出前世今天下茶法既通而蜀中獨行禁𣙜此葢言利之臣不知本末茍於勞賞而妄為之非所以綏静逺方之意况川峽四路所出茶貨比方東南諸處十不及一日月所照文軌混同法無二門仁不異逺豈可諸路既許通商两川却為禁地虧損治體莫甚於兹大凢官中元有之物民間私侵其利方是犯禁只如觧州有鹽池民間煎者乃是私鹽晉州有礬山民間煉者乃是私礬今川蜀茶園夲是百姓兩稅田地不出五榖只有種茶賦稅一例折科茶園税毎三百文折納絹一匹三百二十折納紬一匹十文折納綿一兩二文折納禾草一束役錢亦須均出自来採茶貨買以充衣食伏縁此茶本非官地所産乃是百姓己物顯與解鹽晋礬事體不同一旦立法須令中賣與官或敢私相交易便成犯禁斤數稍重乃至徒刑仍没納隨行物色理賞錢恭惟仁聖䘏物之心必不如此又言國家置市易司籠制百貨嵗出息錢不過二分須以一年為率葢為今年支出官本一百萬貫至年終要見息錢二十萬貫即不是早買一百貫物晚賣一百二十貫錢今來茶場司却不以一年為率務重行立法盡𣙜民間茶貨入官旋買旋賣取利三分或今日買十貫之茶眀日便作十三貫賣與客旅或朝買一貫暮作一貫三百文出賣日逐將官本變轉殊不休已其公牒行下州縣乃云務令買賣通快無致妨滯錢本則所出利息比至嵗終不可勝筭豈止三分而已此於市易元條自相違越㨿夲州堋口鎮茶場申六日之間買到茶八百八十六斤計本錢一百六貫三百二十文隨日出賣收到息錢三十一貫八百九十六文别無見在臣固疑其買賣之際必有侵損官司尋行體訪乃是客旅并牙子等為見𣙜茶不許衷私買賣一向邀難園戸或稱官中髙擡斤兩或言多方退難遂便於外面預先商量減價其園户各為畏法懼罪且欲變貨營生窮廹之間勢不獲已情願與客旅商量毎斤只收七分實錢中賣與官所餘三分留在客人體上用充買茶之息纔投場中賣了當即時却是客人眀立姓名正行請買所以隨日賣盡假如茶一百斤每斤合賣一百三十文計價錢十三貫其園户既被邀難恐動情願只作十貫賣與官場即時却是客人納錢一十三貫請買文歴雖正情弊則深如此則是園户只得七分價錢暗折三分官中雖得三分之息自是園户本錢客人元不出備逐處買茶官司多是畏懼茶場司威勢務欲買賣通快出得息錢庶可免罪以此互相欺誕不敢申陳臣伏謂園户是國家兩税土著之民今來被好利之臣設此弊法要出息錢却令商旅生姦侵損兩税人户最於逺方不便又况隨日計利殊無分限顯是違越市易元條伏乞聖慈檢㑹臣前奏特降指揮下本路安撫轉運提刑司體量指實早賜改更使王澤不壅可救大弊陶累奏未報而堋口茶園三百餘户凡五千人齎茶赴場監官以本錢支盡續於茶場司闗請未至㑹兩作不即秤收衆積忿恚遂徑陞㕔事圍遶監官欲令牙人先出錢與買監官起避之衆隨詬詈或毆擊從者或禠裂監官衣袖牙人等皆散去陶知衆不可犯但令約束不復究治仍别差官赴場相度増價及依次秤收并申茶場司多支本錢復具奏曰劉佐李把蒲宗閔等茍希進用妄陳愚見必欲出息三分致令茶户被害若逐場盡數收買之後商旅將來計筭不成不願興販則積壊茶貨監官必被責罰干連人必著賠填勢須順承茶場司風㫖減價收買所貴客人願來興販變轉得行或令園户自納三分息錢請引出外情弊如此上下通知恭惟陛下仁民爱物與天地等夙夜孜孜講求治要惟恐一夫未得其所必不容此刻薄小人茍希勞効作為弊法以困西南生聚有累聖政衆所不平臣愚欲望早賜宸斷特降指揮下本路監司或帥臣采訪利害如臣所言稍渉虗誕甘俟誅戮若萬分有一可以采用即乞更張茶禁以便逺民或限數收買或量減息錢則山卿茶戸不勝至幸及是始詔罷取息三分指揮宗閔等所厝置亦㣲有更張而陶尋得罪矣七月四日陶衝替詔西頭供奉官閤門祗候崔象先嘗給事藩邸仍閤門供職日久宜特除通事舎人辛未遣左蔵庫副使彭孫募膽勇人捕殺廖恩以上批恩殺廵檢氣勢滋盛須及時撲滅可速與樞宻院議選一官募兵三五百人捕殺故也又批聞廖恩近雖為鎗杖手吳合九等殺敗所獲不多今賊勢全未衰減日有鄉村無頼入賊中轉更昌熾可遣彭孫速徃又批近日福建路強刼盗賊人數不少未知竊發作過因依可速下提刑轉運司火急體量具析聞奏如縁闕食即檢詳前後救饑條例一面擘畫施行不管别致結集人衆久為民患彭孫亦是羣盗招降者當考六月五日及遣彭保又批近降指揮令李憲候董戩有信息及措置果莊見得次第發來赴闕縁上件羌酋既未能制其死命則歸順之期難以日月可必宜别降指揮仰候推行隊兵賞典訖發來赴闕甲戍駙馬都尉慶州刺史王詵為絳州團練使光州刺史張敦禮為寕州團練使詔中書檢正樞宻院檢詳官二年為一任至提㸃刑獄以上資序者理三年太白晝見乙亥詔太學公用錢可續給候全入光州地課對除之上舎生在學一年並免解三月九日彭汝礪云云可考詔韓縝等昨已與北人分畫縁邉界至其山谷地名壕堠鋪舎相去逺近等並圖畫簽貼及與北人對答語録編進入九年十一月二十五日當考詔熈河路蕃官獲首級副使以上毎級減磨勘三年至三級止餘級各賜絹二十匹内殿承制以下毎級轉一資知廣州曽布言今雖軍興之後亦與平日無事之際不同乞許奏辟安撫司勾當公事三兩貟詔合辟官外許於本州職官數内依辟官條特更辟一人任滿依舊丙子遣屯田貟外郎檢正中書孔目房公事劉定體量安撫福建路減價糶常平榖以救災八月癸未定責衢倅丁丑詔使臣換文資試律令大義十道以八通為上六通次之四通又次之並為合格中書取㫖
