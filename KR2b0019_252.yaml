body:
  text: 續資治通鑑長編卷二百四十八宋李燾撰神宗熙寧六年十一月庚子朔中書言奉㫖置簿考察內外官司功過如遇差除檢録進擬內有特㫖者欲自今亦同檢録從之殿直張榮垂拱殿起居唐突自陳先因罪勒停有女賣入禁中詔貸其罪令內東門還其女王安石言薛向取陜西六年錢穀金銀匹帛出入細數兩本擾人至多請罷之上曰中書令向根究陜西錢帛出入必是省中舊文字不齊整無由見得安石曰省中舊文字雖不曾磨勘然大數亦可見省中法禁嚴密如此尚不備即外州何由備有所勾追得替專副須及七八年以來凡幾人幾日乃可得了兼如此無可了之期昨比較薛向界解鹽一事尚自騷擾人衆終不能了而降朝㫖罷之今此數十倍於解鹽文字如何得了上曰如何見得陜西錢帛增虧數安石曰薛向在陜西時錢帛不闕後來方闕若由人措置失措置遂致闕少即薛向但檢尋在省文字根究自在陜西時施行事後來如何變改遂致闕少若不因施行有異遂致闕少止是年嵗豐凶事冝多少所以見在錢物豐約不同即亦大略可見不須一一㸃磨出入細數乃可見也乃令罷省牒所索文字後數日上又言陜西財用闕乏若有邊事何以待之安石曰有邊事亦不須增費前此邊事若朝廷但令所在堅守城寨勿與敵角徐練兵擾之使不得息彼數次㸃集自無復能動即秉常成禽爾如此則見兵見糧足以辦事不務出此而隨事紛擾應之是以費多而事不成上曰才有事便來乞兵安石曰太祖時將帥有令兒男乞兵者乞不得哭而去然終無敗事今將帥乞兵與不與在陛下上曰太祖用郭進今恐難得安石曰郭進有何難得舉事則才自出如王君萬方其為指使時孰謂其可使因事立功然後知其可用爾上曰今日外夷誠可如此待之安石曰中國廣大人衆財冨加以陛下聰明憂勤天下若措置不失即雖冒頓亦何足畏漢髙祖為冒頓所困亦以中國倦兵人思休息而已使漢髙祖有今日天下必不復畏冒頓也上曰天使中國有勝外國之道但後世倒置爾安石曰誠如此詩以外國强中國弱為牂羊墳首明非天地之常理也辛丑增置嶽州平江縣丞一員壬寅詔河北緣邊安撫司指揮歸信容城兩縣令尉自今遇北界巡馬並徐行襲逐毋得相傷初北界巡馬過白溝而歸信尉臧景射傷涿州小鷹軍使固德等故約束之七月二十五日日録韓縝奏留馮行已以為若罷行已北人以為射殺人故罷即愈驕若復來必以為有計議北人更疑上曰行已奏報亦不覺其昏錯或曰昨對北人言展拓城池是錯上曰昨曾孝寬所帶去使臣乃是張利一所辟人不過聼此輩語故爾縝退余白上孫永言臧景者邢佐臣壻疑射殺人或非全屬南界地分此事未可知然不可不察又白上趙子幾云人甚稱張利一臣為言朝廷所知利一實事數條乃言都不知有此蓋雄州使臣盡是利一所奏辟故如此此事與臧景相關附見待考詔今冬不閉汴口令造筏截浮凌先是權判將作監范子竒言汴口每嵗開閉勞人費財不惟民力重困兼閉口後阻絶漕運乞每至冬更勿閉口以外江綱運直入汴至京廢罷轉般其年計必大有所增操舟兵士自可減省上下酒稅課利亦當以故增多公私便利無越於此若謂經冬不閉致湮河道緣每嵗閉口多在冬深已是霜降水落逮至斷流亦有澄沙却遇春水衝注别無停積若後當淘浚修疊自可約定年限權行閉塞比之嵗嵗興功煩省異矣乃詔汴口官吏相度卒如子竒議時髙麗遣使入貢令自汴泝流赴闕初議不閉汴口上曰舊閉口良有所費安石曰聞有時費至百萬上曰數年前若言不閉汴口即人須大駴乃令不閉汴口及勘㑹遞年所費閉口人工物料進呈上曰聞都省有碑言溝洫前通於汴水不知自何時如此河底漸髙安石曰今溝首皆深汴極低又觀相國寺積沙幾及屋簷則汴河如此漸髙未久上曰有汴河來已久何故近如此漸髙安石曰舊不建都即不如本朝專恃河水故諸陂澤溝渠清水皆入汴諸陂澤溝渠清水皆入汴即沙行而不積自建都以來漕運不可一日不通專恃河水灌汴諸水不復得入汴此所以積沙漸髙也沈括筆談頗與王安石之言相表𠂻今附注于此待考國朝汴渠發京畿輔郡三十餘縣夫嵗一浚祥符中閣門祗候使臣謝德權領治京畿溝渠權借浚汴夫自爾三嵗一浚始令京畿民官皆兼溝洫河道以為常職久之治溝洫之工漸弛邑官徒帶空名而汴渠至有二十年不浚嵗嵗堙澱異時京師溝渠之水皆入汴舊尚書省都堂壁記疏治八渠南入汴水是也自汴流堙澱京城東水門下至雍邱襄邑河底皆髙出堤外平地一丈二尺餘自汴堤下瞰民居如在深谷熙寧中議改疏洛水入汴豫因出使按行汴渠自京師上善門量至泗州淮岸凡八百四十里一百三十步地勢京師比泗州髙十九丈四尺八寸六分就京城東數里渠心穿井至三丈方見舊底驗量地勢用水平望尺幹尺量之亦不能無小差汴渠堤外皆是出土故溝豫令決溝水令相通時為一堰節其水平其上漸淺涸則又為一堰相齒如階陛乃量堰之上下水面相髙下之數㑹之乃得地勢髙下之實癸卯麟府路走馬承受全惟幾請罷廂軍為弓箭手從之初河外多曠土上遣帶御器械王中正募民為弓箭手以實之用省戍兵轉運使趙子幾因上兼募廂軍䇿而不較廪給之費至是罷之甲辰天章閣待制權三司使薛向為龍圖閣直學士洮河闢土其費不資向悉力營辦人以為難手詔賜銀絹各三百曰卿留心邊務覩此成績當慰忠懷向因請戒將帥減溢員罷冗兵省浮費節橫斂且以越職為憂上復諭以手詔曰比選卿主領國計今能建明不失機㑹乃職所宜何越之有乙巳詔河東路經略司新招弓箭手墻院屋宇等並官為修築如願請材木自備工者聼又詔辰州南江軍前並賜特支錢有差丙午同察訪京東路常平等常州團練推官吕升卿為太子中允權發遣京東路轉運判官司馬記聞云升卿察訪京東還除淮南轉運判官轉運判官必須升朝官為之借以中允尋召說書今日録乃不云借當考詔軍器監以殿前為軍司所相度鞍轡樣計在京諸軍馬數造給初馬軍用大鞍不便野戰至是上始以邊樣皮韉小鞍用木鞍長韁回旋轉射得盡馳驟之技仍選邊人習騎者𨽻諸軍後上批昨降鞍樣慮數多計置未集聞諸軍亦有私鞍大約及新樣若能自置即給價錢志有此六月二十七日可考上因懿洽捷報論及首惡慮走匿不可得安石曰師完威震外夷無敢保匿者恐須禽獲上曰如摩正官軍非不威震然終敢保匿何也安石曰自河州殺降即安敢保信邊將故死與摩正相保上曰殺摩正前何以不降安石曰時未有迫切之患故不降今迫切仍不降恐當以殺降故也丁未王安石言以濬川杷濬黃河自二十八日卯時至二十九日申時凡增深九寸至一尺八寸請以杷濬汴從之上曰果如此即大省夫力物料聞河北一軍有用夫五千而本軍丁不過五千一夫至用錢八貫歐陽修常以為開河如放火不開河如失火果用夫勞民如此即不如不開河安石曰若兩皆為害即開河用夫與放火失火無異若以萬人一嵗之力能除千人百嵗之害即猶放火失火之比也今以萬人之力除十萬人之害即決須為之易所謂毒天下而民從之者以其雖毒之終能使之安利故祁寒暑雨非不毒也若無祁寒暑雨亦無以成物也故亭之毒之乃為天道豈可但亭之而已此據王安石日録十一月八日事先是有選人李公義者建言請為鐵龍爪以濬河其法用鐵數斤為爪形沉之水底繫絙以船曵之而行宦官黃懷信以為鐵爪太輕不能沉更請造濬川杷其法以巨木長八尺齒長二尺列於木下如杷狀以石壓之兩旁繫大絙兩端矴大船相距八十步各用牛車絞之去來撓蕩泥沙已又移船而濬之王安石甚善其法嘗使懷信濬二股河懷信用船二十二隻四時辰浚河深三尺至四尺四寸水既趨之因又宣刷一日之間又增深一尺懷信請以五百兵二十日開六里直河順二股河水勢用杷濬治可移大河令快上許依懷信所擘畫安石請令懷信因便相度天臺等掃作直河用杷疏浚上亦許之此假見日録五年十月九日今移入此河渠志云鑿直河七里日録云六里當并考它日又言開直河一道計省却九百萬物料三百萬夫功如懷信所造濬川杷即處處危急可用直河所以有不可開者只為近水開數尺即見水施功不得今但見水即以杷濬之無不可使水趨直河去處即一嵗所省凡幾百千萬物料工夫又汴河廣濟河諸斗門減水河自此更不須計工開浚但製百千枚杷永無淺澱也此假見日録五年十月十九日今移入此更須子細考詳恐日録年月亦自差錯或非五年事河渠志云范子淵上試浚川杷之功詔賞懷信度牒十五道公義與堂除亦係之五年九月後須更參照别修開直河本末其七年二月五日并六月末又十二月十一日河渠志五年九月賞塞決河功後便載李公義事云節度推官李公義獻鐵龍爪揚泥車法以疏浚黃河內侍黃懷信以為可用而未盡善中書請令懷信公義同度之杷制舟尾以大繩垂鐡龍爪水中橰工急棹乘流相繼而下一再過水已深數尺或謂禹所以浚川者也故名曰浚川杷懷信等請於清河港新開兩河港相迎處鑿直河七里試之以觀其效詔春首興工是嵗范子淵上試浚川杷之功詔賞懷信以度僧牒十五道公義與堂除六年王安石為上言用杷浚二股河及閉塞魚肋河之利目今諸掃疏去沙觜即水自移徙若不輟工雖二股河上流可使行地中上乃令與公義改京官七年二月五日子淵言疏二股及清水鎮河道已快而魚肋河三道漸背去可塞即河併入清水鎮二股河行流所退出民田甚衆詔子淵俟浚深即塞之三月劉璯奏濬川杷疏清水鎮河道已深闊并塞魚肋河已訖功於是詔大名府安撫覆實以聞乃遣子淵提舉浚事自衛州至海口黃河六都大司各減官一凡掃岸官皆度減之而子淵劉璯朱仲立以浚功各遷一官餘減磨勘賜帛有差按十年三月十一日公義改京官四月三日差子淵提舉七年十二月十一日賞子淵等獨賜懷信度牒與公義堂除不見於日録當考戊申熙河經略司奏諸將收復河州破常家族及隨王韶往露骨山下先登用命鬬敵效首級計三千餘人詔推恩有差庚戌屯田員外郎同判都水監侯叔獻兼提舉緣汴淤田録三班奉職馬和子祐慶為右班殿直即給俸和攻河州先登城流矢中額而死故也又詔河州功賞獲一級加賜絹五匹其應接大兵破蕩部族者亦如之提舉司天監所言據造厯衛朴等言測渾儀景表刻漏差誤不可為則詔元管勾當官楊茂先送開封府劾罪以聞壬子司農寺請襄邑酸棗尉氏長垣封邱太康陽武開封祥符九縣保甲教習陳法依咸平等縣例入見從之權罷今年畿內保甲聚教癸丑冬至奉安中太一神象德音降天下繫囚雜犯死罪從流流以下釋之應諸路災傷民户本名稅物失訴違省限不該檢放者監司體量檢放其闕食之民安撫提舉司優加振救無致流移除河北路負官物已指揮外餘路負官物被災傷放稅及五分以上並權停先是上以久旱欲因冬至發德音順承太一之貺手詔令輔臣相度王安石等請如詔㫖擬合施行目進呈上於禁中增入檢放一節蓋上察於政事恤民如此乙卯詣集禧觀中太一宫酌獻戊午權武昌軍節度推官崇文院校書王安國為著作佐郎祕閣校理故事崇文院校書二年乃除館閣校勘安國以參知政事馮京王圭薦其學行故特有是命司農寺言開封府界保甲以五家相近者為一保五保為一大保十大保為一都保但及二百户以上並為一都保其正長人數且令依舊即户不及二百者各隨近便并𨽻别保諸路依此從之八月二十七日戊戌可考上批陕西義勇未曽排定近降新法未該行使今涇原路已如此行使可令經略司分析具奏此據御集當考究竟二十日上批合參照熙河經略司言包順乞以獻鹽井功狀録用其子詔王韶勘㑹鹽井既係衆獻何故包順今獨請賞若獨賞順則其餘有無爭競及令韶相度鬻鹽條件以聞契丹欲爭蔚應朔三州地界事有萌芽上深以為憂王安石白上契丹無足憂彼境內盜賊尚不能禁甫捕何敢與中國為敵且彼坐受厚賂有何急切乃自取危殆上曰緣河北亦無以支吾安石曰河北人物稠衆但措置有方不患無以支吾事緩即緩措置事急即急措置吕惠卿家傳載惠卿語云今敵亦未必至此借令起事以中國之大急則急應緩則緩應與安石此語略同附注八年四月五日丙寅蕭禧入辭下上曰彼人衆奈何安石曰人衆尤非所患若人衆而有能率衆之主分别材鄙勇怯各當其分即可畏若無能率衆之主分别材鄙勇怯各不當其分即直易擾敗爾患在於措置無方不能分别人材鄙勇怯所以率衆非其道爾不患彼人衆彼人衆乃所以易擾敗也上曰先朝何以有澶淵之事安石曰先朝用將如王超亦嘗召對真宗與之語退以其語與大臣謀之臣讀史書見當時論說終無堅決上下極為滅裂如此何由勝敵又太宗為傅潜奏防秋在近亦未知兵將所在詔付兩卷文字云兵數盡在其中候賊如此即開某卷如彼即開某卷若御將如此即惟王超傅潜乃肯為將稍有材略必不肯於此時為將坐待敗衄也但任將一事如此即便無以勝敵上以為然上因言日力可惜若遲一日即失一日事安石曰有遲一日而失一年事者上曰若排保甲義勇又須待農隙即是有遲一日遂失一年事者安石曰遲一年事即有遂不及事者上又以夏人為憂曰若有北事則兩面俱受敵奈何安石曰朝廷未宜有北事若有北事夏人不能勝當時中國今日中國與夏人豈止如元昊與當時中國以此不足慮也後數日上又言契丹如此旅拒奈何安石曰契丹齪齪爭尺寸地界其略可見何足憂不知陛下憂錢糧不足耶憂人衆不足耶憂無人材與計事耶上曰人材既未陶治成就錢糧亦誠不足人衆又未訓練安石曰事有緩急故措置有緩急若有警急即急要訓練人衆亦不為晚就令契丹便欲絶盟非年歲未能大舉臨時應變足可支吾若論錢糧即因警急經度亦不患少但今未急故亦不須汲汲爾惟人材之少最是急切之慮然因事乃見人材如熙河事即熙河人材頗有可見者懿洽事即懿洽人材頗有可見者陛下若明見物情無所蔽塞令有能有為者無顧望之意無卷懷之患人人各以赴功趨事為欲則人材不患不足任使也人情上不過為道義中不過為功名下不過為爵祿陛下若能以此三者待天下之士各不失理分即無賢不肖但有寸長皆為陛下盡力即無能之契丹何足慮上以為然朱史取陛下若明見物情以下語附七年二月丁丑今仍見本日庚申王韶遣本琳沁固雲沁巴詣闕皆岷州歸順首領也上批義勇保甲條近曾孝寬等相度河州一路利害參議立定其陕西諸路慮事體不同故令經略安撫司參議未見奏報而聞已有施行者恐司農寺兵部等處行遣差誤可令具析自承指揮後行遣次第以聞御集在二十一日實録在二十二日今從御集并十九日上批可考遣上內供奉官李憲往太原府代州勾當公事此據御集當考辛酉詔永興軍河中府陕解同華鄜延丹坊邠寧環慶耀十五州軍各依元刺義勇外商虢州保安軍並止團成保甲詔定武臣差遣法以其仕歷資任為六等升一等為權升兩等以上者為權發遣並通計二年為一任若特恩升改者不依此振武軍節度使李璋自郢州還朝卒于襄州贈太尉諡良惠録其子五人各遷一官未仕者三人為左侍禁璋强敏好讀書未嘗校家之有無及卒其弟駙馬都尉瑋欲貸襄唐許三州官錢各千緡以治喪事後輸於左藏庫上曰璋故章懿太后家也其以所貸錢賜之壬戍右正言知制詔兼侍講檢正中書五房公事吕惠卿提舉制敕庫先是檢正刑房公事李承之請置庫因以承之兼領所貯五房文書難止令一房提舉故命惠卿領焉詔荆湖北路提㸃刑獄李平一等具析妄奏監鼎州稅借職王晏昏懦不實因依以聞晏赴三班院體量堪釐務也大宗正司言宗室全闕官馬及半闕從人者聼依朝㫖免赴朝從之上問養馬利害王安石曰今坊監以五百餘貫乃飬得一馬若令洮河蕃部養馬所費必不至如此之多兼得好馬因地冝馬又蕃部以養馬為業極便利所省錢計不少而坊監地賦民所收地利又不少上因論三代政事以車馬為急安石曰今用車即不須用馬但以人挽之足矣以人挽車省芻糧無奔警未必不勝用馬辟如古用簡冊今用紙雖三代聖人復起必不復用簡冊恐以人挽車亦如此上曰事但有理即可行三代以前聖人但隨時制法故用馬爾上又曰天使中國有勝外國之道但後世失其道爾此年十二月十八日又明年二月十二日可考癸亥上論熙河糧斛事欲以逐路財賦付經略使自管然卒不行上以農事為急王安石曰家可以資國國可以資天下天下必資天地上曰若設法移民使就寬鄉亦王者所以生財闢土之道也甲子權發遣秦鳯等路轉運判官贊善大夫蔡朦為永興軍等路轉運判官同察訪永興秦鳯等路常平等事大理寺丞李察為太子中舍權發遣秦鳯等路轉運判官朦與蔡延慶共事而不相能故徙朦以察代之朦延慶不相能據延慶本傳緣以軍須牒發張守約兵朦奏之考按事實乃不然今但云不相能而不明著其所以十月十一日延慶加職涇原路經略司言弓箭手人員立功換班行名下土田自今勿以自隨止令子孫或佃户刺填弓箭手從之髙陽關路都總管司言體量到諸州軍依新法教閲已成倫叙不聞有避教閲逃竄者詔走馬承受王延慶張瑾具析以聞先是降諸軍教閲新法分上中下軍弓弩斗力及射親彊槍刀等第而延慶等奏有軍士避教閲投北界者故詰之潭州言西上閣門使前知桂州蕭注遺表乞子充三班奉職孫舉三班借職從之於是上批注昔嘗有功長子刓服闋日更特與循資仍賜絹三百匹注本傳云注不肯取交州據魏泰東軒録則注實言交州可取故復用與本傳不同歿後恩意如此則注本傳或不得其實當考注罷桂州在正月二十七日辛丑乙丑詔同判都水監侯叔獻權發遣監丞俞充知主簿劉璯各升一任權提㸃開封府界諸縣鎮公事吳審禮劉淑各减磨勘二年並以兼提舉淤田有勞也熙河經略司言鈐轄王君萬乞以轉官恩賞回授父母詔特推恩不許回授又詔三司於永興秦鳯等兩路每年封樁解鹽錢內借鈔計百萬緡付秦鳯等路轉運司計置熙河糧草仍許詳酌邊儲緩急增損所定鈔價上怪陕西兵少財用不足王安石曰此事已委薛向根究然日下闕乏須應副令及時收糴上又以為轉運使非其人曰使此輩理財舉事未得安石曰陕西財用不足亦恐未可歸咎監司必是自有許多使處如熙州用兵數亦不多而所費錢斛乃如此之多緣既用兵即所費必如此至於小大失計亦或有之未必便能致財用闕乏也上曰一事失計往往便至數十萬貫錢丙寅左藏庫使董仲寶為皇城副使內殿崇班李實為供備庫副使以章惇言仲寶等在叙州與蠻賊戰有功故也詔開封府雪寒京城內外老疾幼孤無依者並收養於四福田院自今凖此又詔涇原路年例外益以鹽鈔錢二十萬緡付經略司市糧草封樁丁卯河東都轉運司請汾石等十二州軍和糴糧草許以錢布中給從之戊辰遣官謝雪詔流內銓前廬州觀察推官江衍循一資㑹稽縣主簿葉表等六人各與堂除差遣並以檢括修州鑑湖之勞也宋類苑十一月吏有不附新法介甫欲深罪之上不可介甫固爭之曰不然法不行上曰聞民間亦頗苦新法介甫曰祁寒暑雨民猶有怨咨者豈足顧也上曰豈若并祁寒暑雨之怨亦無邪是月廢儋州為昌化軍崖州為朱崖軍萬安州為萬安軍以昌化感恩陵水寧逺吉陽及華州渭南縣並為鎮信州永豐鎮為縣置熙州狄道河州枹罕縣十二月庚午朔章惇言衡永等州溪峒猺人因招諭納土乞並為省民從之辛未罷詳定諸司庫務利害局詳定官國子博士吕嘉問升一任左藏庫副使劉永淵與樞密院指射差遣壬申觀文殿學士户部尚書判南京留司御史臺張方平知陳州三司言新法所增吏祿除舊請外嵗支錢一十七萬一千五百五十三緡有竒實録止云三十萬今從沈括筆談詳書之詔以熙寧四年後坊場稅錢撥還不足則以市易市例等錢補之仍令提舉帳司嵗考支收數上中書時內自政府百司外及監司諸州胥吏皆賦以祿謂之倉法京師嵗增吏祿四十一萬三千四百餘緡監司諸州六十八萬九千八百餘緡然皆取足於坊場河渡市例免行役剩息錢等而於縣官嵗入財用初無少損且民不加賦而吏祿以給焉此假於三年八月二十七日掇出附見沈括云天下吏人素無常祿惟以受賕為生往往有致富者熙寧三年始制天下吏祿而設重法以絶請託之弊是嵗京師諸司嵗支吏祿錢三千八百三十四貫二百五十四嵗嵗增廣至熙寧八年豫為三司使日嵗支三十七萬一千五百五十三貫一百七十八京師舊有祿者及天下利祿皆不預此數樞密院承㫖司言野戰及槍刀手之類自今毋得以五服內親對試從之詔諸路奏賞自今功狀並具將官使臣元將出戰兵斬獲輸折數以聞贈荆湖北路鈐轄司指使陳昌言陳昌朝為光祿寺丞録其子各一人為郊社齊郎以攻狤狑寨死事也癸酉詔殿前馬軍司及諸路州軍牙教所射草人依宣一試格改為草樁仍逺二十步命河北同提㸃制置屯田使閻士良專興修撲樁口增灌東塘淀濼先是滄州北三堂等塘濼為黃河所注其後河改道而濼遂填淤程昉嘗請開琵琶灣引河水灌之功不可成至是士良建言宜堰水絶御河引西塘水灌之故從其請而有是命甲戌御史盛陶言昨吳安持請民輸錢免行都提舉市易吕嘉問被詔與府司官詳定利害而嘉問過為苛察牢取微利雖稍排定所費之外掊斂過多乞應免行錢更加均定惟給行人常費之外其餘中下户並與蠲放不報朱本削去詔淮南東路轉運司募闕食貧民興修揚州江都髙郵天長界河及古鹽河乙亥上謂輔臣曰李靖團力之法以三人得意者為隊已令李浩試之懿洽二州疑亦可行王安石等曰三代至於漢魏皆以五人為伍至如三人若一人戰死押官執刀在後即斬二人恐不可然此法亦可增損為用上曰唐太宗問李靖兵法之要靖以謂不出形之使敵從之一言而已此誠簡要又曰髙宗伐鬼方三年而周公東征亦三年何其久也安石曰古人欲其師之完故不急務又其敵有彊弱故難克也如管蔡乃武王所使以監商人其任至重必非常才於周之盛時乃能率衆叛幾危王室蓋非易克者也上曰君子小人各有道所以能相敵安石曰誠如此以黃帝之聖神而與蚩尤七十戰而後能勝者由此故也上曰以武王周公大聖人商之餘俗至歷三紀然後世變風移衛文公螮蝀之詩乃能止奔何也安石曰商人之俗習於紂惡之日久矣為其所化如怨望周人不使之如商革夏有服在庭以利口亂正非如止奔之易也上曰文王江漢之域無思犯禮衛文公亦能止奔使國人不齒何以異此安石曰衛文公區區一國之君耳但能正身以御下得賢才而任之其地至狹茍能躬行禮義亷恥而所置卿大夫同德協心則彼淫奔之俗衆人之所惡者止之固不為難非若文王之時身為諸侯而能使江漢之人無思犯禮也命提㸃倉場沈希顏御史臺推直官穆珣裁定在京冗占剩員他日上謂王安石曰剩員乃至八萬人多為官員冗占見吕公弼說其父夷簡作某官當時只有三人當直安石曰夷簡作官若是稍近上只三人當直恐傷國體人主尊如堂羣臣如陛上下有等威乃可臨正庶民若甚削弱曾不如富人不知何以為堂陛之勢當時果如此亦未可為法且今日官員所被役兵皆有常數未見過當所患在非其人而已如吕夷簡為大臣納貨賂廢壞朝廷百事便與一人當直亦不消得上乃笑此假見七年二月七日今附見丙子給度僧牒二千付都提舉市易司募人入錢為秦鳯路轉運司糴本丁丑詔京官為提舉官者並為同提舉梓䕫路察訪熊本言江安寨兵官以商議買田為名誘三里夷人斗設等至寨因詰問傷殺兵官主名其人自以罪大即拔刀唱殺尋斬訖斗設等劇賊也上曰此等夷人固不可赦然誘而誅之或為它日之害謂之唱殺特以此為名耳後本乞賞功上弗許蓋本以檄召戎州司户參軍程之元權領江安縣密圖之之元即召諸酋見於廷問景左藏安在諸酋呼噪不服因殺九十餘人斗設手刃思忠者械送瀘州凌遲斬之以祭思忠之元眉山人也朱史云無照據削去程之元事今復存之詔司農寺齊兖州民冒佃泰山禁地量地肥瘠立租令依舊居佃戊寅新權發遣淮南西路提㸃刑獄陳樞言熙寧五年蘇湖大稔米價視淮南才十之五客船販米以緣路場務收往來力勝故蘇湖之米不至淮南乞權令免納從之樞又言兩浙第五等户約百萬出役錢裁五六萬緡錢寡而所敷甚衆且第五等舊無役請得蠲免詔除之此據本志附四年十月鄧綰言李瑜周約後按樞以六年十二月方為淮西憲今附見詔熙河路舉人不以户貫年限聼取應熙州以五人河洮岷州各以三人為解額又賜熙州新修東山禪院名曰慈雲東湖曰慧日庚辰贊善大夫蔡朦提舉興修永興軍白渠朦此時任永興運判實録脫之當考修撰經義所檢討洪州進士徐禧為鎮南軍節度推官中書户房習學公事禧與吳著陶臨皆以白衣為修撰經義所檢討至是又以選人入中書習學行檢正事初吕惠卿薦禧所為治䇿二十四篇上善之曰禧言朝廷以經術變士人十已八九變矣然盜襲人之語而不求心通者亦十八九此言是也觀禧文學曉政事冝試之於有用之地王安石曰中書檢正官如章惇輩朝廷當即有差除後更用人如有不稱艱於退絀欲置人為習學上以為然於是以禧為之中書五房習學公事自此始上復論司馬孫吳及李靖團力之法王安石曰古論兵無如孫武者以其粗見道故也如日有長短月有死生五聲之變不可勝聼五色之變不可勝觀竒正之變不可勝窮蓋粗能見道故其言有及於此上曰能知竒正乃用兵之要竒者天道也正者地道也地道有常天道則變而無常至於能用竒正以竒為正以正為竒則妙而神矣安石曰誠如此天能天而不能地地能地而不能天能天能地利用出入則所謂神也神故能以竒為正以正為竒也王安石對見日録十一月二十五日上善李靖結隊法召賈逵問之逵以為非詔中書密院同議之安石曰今但結三人為隊又結五人為伍相摶執以觀其孰勝則其可用與否立見矣上乃令郭固與殿前司各為一法試其可者舊本十八日丁亥又書詔賈逵郭固教習比試隊伍法及令程昉於沿河採車材按賈逵郭固比試隊伍法已具此矣今依朱本削去丁亥日所書五月八日庚戍巳令諸路教三人為隊此又云云當考本志云上患諸將軍行無行陳之法嘗曰李靖結三人為隊必有意李靖深曉兵星書羽林皆以三人為隊靖非無據乃令賈逵郭固試之本志附之五年當考然以為靖能勝外夷又數稱黃帝兵法必曉古人伍法其用三人為隊或必有意安石曰後世無知兵者靖能結三人為隊以當衰亂散鬬之敵冝其每勝比之韓信則已不及至於黃帝兵法必非靖所能知蓋自黃帝以來即有伍法豈容歷代聖人智不及靖而不能結三人為隊也上曰韓信以數十萬當項羽十萬靖以萬人當頡利一國靖未必不如信安石曰自蚩尤以來未有如項籍者頡利乃衰亂之外國李靖率習戰之士深入敵地而發其機又乘其不戒則其勝之固易上曰兵固欲措之於易勝安石曰措易勝與難勝乃為竒措易勝與易勝不足為竒也馮京曰陛下論兵髙逺非羣臣所及安石曰天錫陛下聖質髙逺與堯舜湯武固無以異論兵誠為髙逺然先王雖曰張皇六師克詰戎兵其坐而論道則未嘗及戰陳之事蓋以為三軍五兵之運德之末不足道也孔子亦曰爼豆之事則嘗聞之矣軍旅之事未之學也以為茍知本矣末不足治也上曰事亦有趨時者如宣王乃以北伐為先安石曰宣王所以北伐乃以能分别君子小人用吉甫張仲故也若十步之內君子小人曽無所分别不知如何能勝玁狁然則先王所務又有在北伐之先者陛下修身齊家誠無愧於堯舜湯武臣若見陛下少有闕失豈敢顧望不諌然即位六七年未能成堯舜湯武功業必有與堯舜武湯不同處詩曰思無疆思馬斯臧思無邪思馬斯徂人君茍出於誠正則馬可使臧可使徂而况於人乎然則無人為將率非陛下所患况今日四夷類皆非豪傑無足以纍聖慮者上以為然已上並見日録十二月二十二日上又論兵以為能知隂陽五行之理而役使之則盡矣要在通理而已安石曰天地乃為陰陽五行所使通陰陽五行之理是所謂精義入神以致用所為無不可者何但兵而已亦見二十三日上又言苻堅以百萬之師為晉所敗安石曰堅號為英主然其實踈暗王猛苻融苦諫以為慕容垂常幸國家之災腹心之患也不知慮此而逺勤吳㑹此乃自敗非晉能敗之也上曰垂必有以中其心安石曰堅欲平晉垂勸之平晉然後封禪此乃堅所欲故為垂所惑也上曰此在人君聼納明與不明耳苻融王猛以晉為不可伐而堅不聼故敗晉武帝欲平吳而一國之人皆以為不可獨用張華羊杜三數人之言故勝然則聼納之際可不審乎辛巳睦州軍事推官葉適平輿縣令編修三司令式刪定官張元方興平縣尉王震並為中書習學公事適禮房元方吏房震刑房葉適七年六月丁亥檢正十月丁丑死張元方未詳王震開封人荆湖北路轉運使孫桷言招諭北江下溪州刺史彭師晏內附録其地里四至户口數以聞詔章惇詳度處置壬午提舉印造編𠡠所言新𠡠刋本將畢慮中書樞密院更有合入條約及續降條約乞候至來年頒降從之熙河路經略司言熙州西羅城已置蕃學曉諭蕃官子弟入學朱史載王安石云云此乃通逺軍事已見彼時今刪去又言固密族首領六人助包順轄烏察等戰有功詔各轉一資餘獲級重傷者轉資賜帛有差納克通身死其子結斡沁兼本族巡檢詔知桂州沈起融州撫納蠻人本以裁省煩費今乃創建城寨其支費比舊孰多各具利害以聞時起欲於新地內創建五七寨大者屯兵六七百人小者三五百人故也可併十月庚午癸未熙河路經略司言岷州入買糧草商人多願請見錢京鈔乞依熙河通逺軍例付見錢鈔三十萬緡詔給鈔十萬緡乃令三司立加饒錢數以聞詔在京納免行錢如有訴未便者都提舉市易司受理以聞賜淮南西路轉運司常平米三萬石募飢民興修水利甲申遣職方員外郎林積監疏汴河噎凌京東西路安撫司言鄆州旱民輸常稅不辦乞權倚閣見缺賖糴斛斗從之乙酉大理寺丞知光化縣葉康直前權廬州觀察推官江衍雍邱縣尉時孝孫秀州司户參軍袁默並為司農寺勾當事以司農寺所總事目頗繁間遣屬官出視諸路常平等事故增員並從判寺曽布辟也中書言增開封府等處吏祿以行重法上曰異時史不賦祿而受賕輒被重劾今朝廷賦祿而責人可謂忠恕矣它日上又稱祿法忠恕馮京曰天下無事乃可以行此太宗時嘗宣諭州縣官有道理少取些錢無道理莫取上曰當是時接五代財用不足王安石曰縱財用不足吏亦人非不衣不食而治公事既衣食即必有所出自可以法收斂以此賦給上曰當是時亦自未可正法也三司言陕西邊穀踊貴請責轉運司裁損其直上曰窮吾國用者兵冗耳不思議此而止於糧草校計毫釐失其要也冝與樞密院同議移軍近裏就食以省邊費詔諸路安撫司依轉運提㸃刑獄提舉司隨本路分定州軍提舉教閲義勇保甲入內西頭供奉官黃懷仁昨修金明池御座龍船乞賜度僧牒酬賞詔三司賜錢十萬丁亥祕書丞吕大忠檢詳樞密院兵房文字都水監丞王令圖減磨勘二年以本監言令圖創白馬縣界鋸牙免河勢暴溢之患也同管勾外都水監丞程昉言國家三嵗一祠圓丘齊宿之地常用帟幕創成帷宫謂之青城綵內頗為勞費若因綵內材本量椽栱瓦箔等及以作綵內一次役兵并借年例上河客軍為宫室以備齊宿可朞年而就此暫勞永逸之利也不報朱本削去新本謂不從內臣所請可見聖政復存之此固當存也詔程昉於沿河採車材三千兩下軍器監定樣製造戰車上修嚴武備既采唐李靖三人隊法欲試行之且以北邊地平可用車為營衛因內出手詔令三府講求而有是詔明年二月十二日上言論民車八月二卜二日沈括云云可考兵志云六年五月詔諸路經略司結隊並依李靖法三人為一小隊九人為一中隊賞罰俟成序日取裁其隊伍及器甲之數依涇原路牙教法按今日録附此事於五月八日庚戌戊子命檢正中書户房公事張諤訊决三司開封府見禁罪人同判都水監李立之言雍邱縣界噎凌沫岸漫流併入白溝河及檢視水口以東汴身填淤髙水面四尺已計功修塞詔賜塞决口兵緡錢築孔固斗門堰役兵凖此明年二月六日王庠等勒停辛卯詔流內銓前湖州觀察推官邵光與循一資注家便官以兩浙轉運司言光根括溫台等九縣沙塗田千一百餘頃故也淮南東路轉運司言體量前江淮發運副使度支郎中皮公弼開真州黃池河除元定差雇夫外有三縣各曾貼夫并死損逃亡兵夫等仍曾委責降及别路官勾幹差破人船供給及以礬鹽等錢為公用得替乘船五隻送還入京又借發運司紙庫錢三百緡候得職田錢償之而權發運萬頥判押給借已還十七千餘未償詔皮公弼令永興軍路提㸃刑獄司萬頥令淮南東路轉運司劾罪以聞後公弼坐降一官頥聼德音釋之軍器監乞差左藏庫副使藍惟永等㸃檢軍器編定御覽目録從之熊本言瀘州納溪寨烏蠻出入道路乞增戍兵及徙置路分都監從之壬辰權發遣京東路轉運判官太子中允館閣校勘吕升卿徙淮南東路軍器監言弓匠李文應箭匠王成伎皆精巧詔補三司守闕軍將以教工匠帶御器械鄭德誠乞權差官輪宿直詔令真定府路總管向寶宿直舊制外任帶御器械過闕朝見不宿衛時寶過京師特命之上與王安石言向寶善戰好將也與薛仁貴何異王安石曰恐不同上曰仁貴更有機略如寶已難得安石曰向寶但能使馬精熟而已其於西市一帶山川最其所諳熟然西市之戰幾敗事如此將率要不難得安石以為寶既貪恣又西市之戰狼狽徒以西府賴其沮壞王韶故稱譽於上前爾癸巳詔京外城二十門監門自今更不管認課利但隨間要以透漏捕獲出入商稅錢數立為賞罰凡五等從都商稅院請也鄭俠事當考明年二月二十七日張諤減定稅額可考詔梓䕫路察訪司凖備差遣蒲宗閔新知永嘉縣沈逵同成都府路轉運司相度成都府置市易務利害以聞蒲宗閔沈逵此假日録在七年二月二十三日遣李杞時朱本先附於此今從之馮京云云仍見本月日又詔借大名府提㸃刑獄司封樁茶稅錢八萬七千緡付河北東路都轉運司糴邊儲夏國主秉常進馬贖大藏經詔特賜之而還其馬乙未岷州都首領轄烏察洮州都首領巴珍覺並為崇儀副使董古為禮賔副使並蕃部鈐轄轄烏察岷州巴珍覺洮州董古河州古等皆摩正弟也王韶招之內附至是引見于延和殿而有是命既又詔董古遷一資亦為崇儀副使董古雖非首領以在納克壘城與其母郢城簡先其兄詣景思立前鋒乞降故也河北西路轉運提㸃刑獄提舉司言參定真定府路義勇保甲新法舊管彊壯人皆係鄉兵及緣邊州軍弓箭社亦籍姓名巡防把截乞並行廢罷依義勇保甲編排從之明年正月十九日可考兵志云罷河北西路彊壯緣邊弓箭社常係籍畨上巡守者即此事蘇軾奏議乞復置弓箭社合參考丙申詔市易司市例錢除量留支用外並送抵當所出以給吏祿𨽻都提舉市易司仍令舉勾當公事官二員專檢估是月廢金州平利洺州臨洺順安軍髙陽大名府大名洹水經城縣並為鎮渭州置制勝關及安化縣以舊縣為鎮遼主遣益州觀察留後耶律洞崇祿少卿竇景庸其母遣左千牛衛上將軍耶律榮太常少卿乾文閣待制梁授來賀正旦賀正旦使副四人實録失不記今以國信名銜補書是嵗宗室子賜名授官者五十九人斷大辟二千九百五十一人續資治通鑑長編卷二百四十八
