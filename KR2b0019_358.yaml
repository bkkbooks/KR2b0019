body:
  text: 續資治通鑑長編卷三百五十四宋李燾撰哲宗元豐八年夏四月丙寅上初御紫宸殿宰臣以下奏事諸司猶未許對丁卯大理寺卿王孝先等言獄空詔付祕書省仍令學士院降詔奬諭戊辰封上乳母竇氏為安康郡夫人己巳詔再試進士及諸科武舉人罷今年御試內應直赴殿試者以前舉省試等第名次編排在今來正奏名之下不曽赴省試者即與正奏名進士同場别號試策一道中書省勘會諸路官得替或已授别任因監司奏乞勒留在前任及發遣赴舊任與見任官同催欠負者今來赦書指揮百姓欠負者例各蠲減詔並令放罷內有見在任已發遣而本任未有新授官者並許還本任編録册八年四月六日聖旨庚午尚書省言河東路經略使吕惠卿言河東勇敢以三百人為額本路止二百人請給微薄應募者少臣昨任鄜延路經略使日奏請增三等請受借支省馬給與七分草料於延州置營差指使教習武藝自後應募稍衆欲依陕西路已得指揮從之樞密院言近制大小使臣因見謝辭輒唐突者徒二年私罪欲乞諸班直諸軍忠佐親從親事官諸色人因入殿輒唐突者徒二年情重者取旨本轄人科不覺察罪詔可辛未禮部言尊太皇太后皇太后皇太妃册請三年喪畢行禮從之京東路都轉運使天章閣待制吳居厚降知廬州以言者論其苛刻也當考言者姓名韓瓘録劉安世語云元豐末京東劇寇數千欲取掊克吏吳居厚投之鐡冶中賴居厚覺早間道遁去不然賊殺一都轉運使從官得晏然而已乎詔户部侍郎李定取都提舉汴河堤岸司所領事并提舉京城所課利條析以聞五月乙未並罷都大提舉汴河堤岸司元豐二年二月二十二日初置三年五月十二日改今名詔尚書省左右司取在京免行納支錢窠名取旨舊録云先帝以濁流入汴澱淤湍急都人有水憂乃導洛通汴置司提舉又官司市物迫行人供應吏並緣為姦至逃亡破産民患之乃等第納錢免充行役以錢募人供市而官司禁不得市於民民得不擾至是姦臣欺罔簾帷以為非是時先帝崩才越月變亂法度由此始其後事無大小悉改革上未親政也新録辨曰神宗皇帝嘗詰興利之弊曰事太傷鄙細有害國體蓋深責有司之過也凡所奉行失其本旨皆有意更去之詔書具在可考而知通汴司本為救患免行錢本為便民其末在有司皆近於興利之舉至是詔取索事目以定可否亦推神宗之意而行之也自先帝以濁流入汴至未親政也一百十六字並刪去又詔宗室官已至磨勘止法者該今年三月六日覃恩並特與轉官依例加恩又詔開封府界京東京西河北陕西河東所養戶馬近已支價錢撥買配填河東鄜延環慶路闕馬軍分自今府界并京東路養馬指揮並罷又詔京東京西路保甲養馬法元定年限極寬民間易以應辦而有司不務循守妄有陳請期限迫急遂致騷擾先帝已嘗降手詔詰責約束至今猶不能奉行其兩路保馬宜令並依元降年限收買其剩買過數目並以充次年分之數又詔提舉京東路保馬兼保甲楊景芬提舉京西路保馬兼保甲張修並令乘傳赴京於三省稟議改廢其後詔京東京西路保馬等級分配諸軍餘數發赴太僕寺其格不應支配即還民戶變易納所給價錢舊録云先帝以國馬不足追效邱乘之制寓馬於民量物産給價立嵗限使民市馬養之得自乘習緩急則集以為用仍命弛其徭役法甚善司馬光言其非便遂罷新録辨曰宣仁參祖宗之制推眀神宗之心保佑哲宗皇帝以致元祐之治其公議在天下甚眀而史官類出私意取一時羣臣之議與神宗皇帝較其得失豈可以示後世自先帝以國馬至非便遂罷六十字並刪去按此時司馬光猶未上疏論民户養馬不知舊録何以云然其後則光固謂不可也吕大防政目十二月二十二日詔京東西路保馬四尺以上駮填軍鋪四尺三寸以上騍從監牧餘給人戶變轉納錢又詔在京并京西及泗州所置物貨等場並罷在京委監察御史黃降駕部員外郎賈種民京西令本路轉運副使沈希顔泗州令權發遣江淮等路發運副使路昌衡點磨物數計會當職官吏交割樁管條析措置結絶事件以聞四月八日七月十八日合參照又詔元豐六年已前積欠夏秋稅租及緣納錢物並依三月六日赦書指揮特與除放中書省言今年正月九日赦書內外人戶見欠市易錢物並仰所屬勘會元賒請本息等錢并已納見欠數目條具聞奏其息錢當議減放在京至今未見有司依赦以聞詔監察御史劉拯兵部員外郎杜常太府少卿宋彭年赴御史臺置局點磨所欠息錢大姓戶放七分小姓戶全放外合納數目關所屬依調催納仍曉諭人戶并具無欺弊聞奏限一月又詔軍頭司應於後殿引見事如呈試武藝人申樞密院令承旨司官與軍馬司同共校試有妨嫌者即與不干礙軍馬司同試如並係干礙即與軍頭司同試皆具狀以聞應不呈試武藝人並令軍頭司押赴樞密院審驗訖申牒所屬施行見謝并軍回過軍並令門見門謝合賜例物及酒食等軍頭司關申依式令施行應合引見人如有自陳仰軍頭司取問申樞密院以垂簾上未御後殿故也元祐二年二月四日密院又有申請又詔諸官司見行條制文有未便於事理應改者並具其狀隨事申尚書省樞密院即靣得旨若一時處分應著為法及應衝改條制者申中書省樞密院審奏傳宣或內降若須索及官司奏請雖得旨而元無條貫者並隨事申中書省樞密院覆奏取旨新本削去此假當考入內省申準赦內臣並與改轉李友詢石璘宋用臣馮仲禮閻守勤馮景梁安禮盧守正史環老弼劉友益黃經臣雷易並令轉出并李彀亦與轉出勾當御藥院劉惟簡與轉出以勾當內東門司閻安代之馮宗道勾當御藥院老宗元梁惟簡並勾當內東門司梁惟簡兼太皇太后殿祗候老宗元兼皇帝殿祗候此密記四月八日事壬申安仁保佑夫人張氏進封秦國晉國安仁保佑夫人甲戍德妃苗氏進位貴妃德妃周氏賢妃邢氏進位淑妃仁宗第十二女進封魏國大長公主為楚國大長公主仁宗第十女韓國大長公主為周國大長公主英宗第三女衛國長公主為冀國大長公主大行皇帝第三女封淑國公主為溫國長公主大行皇帝第四女為康國長公主第八女為欣國長公主第九女為嘉國長公主第十女為德國長公主以大行在殯罷册禮止賜告靜海軍節度使特進檢校太尉安南都護交趾郡王李乾德加同中書門下平章事西蕃邈川首領河西軍節度使檢校太傅武威郡王董戩改檢校太尉詔曰恭以先皇帝臨御四海十有九年夙夜勵精建立政事所以惠澤天下垂之後世比聞有司奉行法令往往失當或過為煩擾違戾元降詔旨或茍且文具不能布宣實惠或妄意窺測怠於舉職將恐朝廷成法因以隳弛其申諭中外自今巳來協心循理奉承詔令以稱先帝更易法度惠安元元之心敢有弗欽必底厥罪仍仰御史臺察訪彈劾以聞舊録云時蔡確等慮法寖改廢故降是詔然卒弗能禁新録辨曰蔡確知有司奉行新法例皆失當過為煩擾實惠不孚則不能不更法也法少更則身必不安於位是詔誠確等有以啓之矣史官不推本神祖愛民之意而飾確之謀以欺後世今合刪改吕大防政目詔有司奉行先帝詔旨失當事以聞在八日尚書省言三省及在京官司官吏凡嵗終比較功過并上簿過犯自來雖遇常赦並通計行罰今該三月六日登極大赦常赦所不原者咸赦除之其今年三月五日已前過犯除以功比折外應理過者並合除免從之禮部言治平故事山陵掩皇堂畢宗正卿行虞祭之禮官制太廟舊儀悉𨽻太常寺將來虞祭乞改太常卿行事從之録故右侍禁王千男亮為三班奉職姪勝為借職以千死事故也乙亥朝奉郎守太府少卿宋彭年言殿前馬步軍司管軍闕官乞依故事差八員仍逐司常留一二員宿衛詔管軍朝廷重事彭年妄有干預特罰銅三十斤延福宫使入內都知利州觀察使張茂則為寧國軍留後入內都知吏部郎中胡宗愈為右司郎中工部員外郎髙遵惠為右司員外郎左司郎中范子竒直龍圖閣河北路轉運使右司員外郎范純粹直龍圖閣京東路轉運使詔以太皇太后七月十六日生辰為坤成節趙子嵩中外舊事云宣仁聖烈皇后垂簾坤成節內外命婦入賀上壽畢內侍老宗元大呼于殿廡曰除宰執宗室命婦依故事外髙氏命婦盡出就宅賜宴即歸供帳甚盛沾及奴僕嵗以為常蓋太皇太后惡請託而逺之也可謂公矣髙世誕證之云宣仁既修北宅以奉親其母兩國太夫人李氏入謝因請置潛火一鋪后曰但令公繪公紀省事豈解失火李夫人不樂復曰曹家亦是聼政時南宅創添潛火人后變色曰姐姐殊不思之甚也二姐豈敢比娘娘娘娘於趙氏有大功不可引也因手扎戒二髙不得妄干請其家至今寶藏髙世誕云此一假當别附詔催作二王外第政目十二日事鄜延路經略使言蕃部伊實鄉道入西界殺副監軍等首級乞與近上班行詔與下班殿侍湖北都鈐轄轉運司言權知誠州西京左藏庫副使兼閣門通事舍人周士隆招納溪洞有勞詔遷一官令再任丙子禮部言元豐二年故事三路緣邊臣寮祔廟畢許開樂治平四年緣邊臣寮百日始開乞依元豐二年故事從之丁丑資政殿大學士銀青光祿大夫吕公著兼侍讀公著時知揚州召用之遵先帝意也新録於此别書云先是神宗諭輔臣曰皇子眀年出閣當以吕公著為保傅至是召公著侍經筵遵先帝意也按神宗諭輔臣前已具書此不必重載今但存遵先帝意也一句新録自為一書故不得不爾資政殿學士大中大夫司馬光知陳州朝奉郎祕書少監孫覺兼侍講奉議郎宗正寺丞劉次莊為殿中侍御史奉職郎真定府路安撫司勾當公事孫升為監察御史按新舊録孫升傳並云中丞劉摰引為監察御史此時摯初未入臺黃履實為中丞舊録既誤新録因之然則升必履所薦也當考元祐二年二月十四日履坐舉次莊自龍學降天制四月八日又落職梁燾奏議可考朝奉郎劉摯宣德郎張汝賢為吏部郎中朝奉郎集賢校理梁燾為工部郎中奉議郎黃庭堅為校書郎詔守太師開府儀同三司潞國公致仕文彥博不許辭免兩鎮節度使六年十一月甲寅已載彥博許免兼永興節度今復有此詔當考或是覃恩申命故也五月十二日許免詔許樞密院依舊制開便門與中書省相通赴都堂議事舊録云先帝設官分職各有分守不可紊也時欲同惡相濟故有是詔新録辨曰密院中書事均一體便門相通祖宗舊制也與先帝設官分職各有分守理不相妨同惡相濟鄙陋無稽自先帝設官至有是詔二十四字並刪去密記十四日自來樞密院與三省議事並會於南廳欲依例開便門與中書省相通赴都堂議事如遇上馬仍依左右丞例同三省奉旨依御史中丞黃履言福建路鹽法惟邵武軍汀州受數為重邵武縣近以鹽多民匱難於出糶遂以人戶産錢紐定賣鹽不循朝旨鄉鋪之法至於建寧光澤等縣其弊亦然汀劍建三州亦有抑勒乞差官體量監察御史安惇言福建轉運副使王子京擘畫官買臘茶嵗三百萬斤訪聞抑認乞委官採訪遂詔昨先帝以諸路監司責任不輕朝廷當加考核其煩急掊克與曠弛不職者當有所懲去嵗已詔修立分遣郎官御史察舉之法可依先帝詔旨施行江南西路遣監察御史陳次升福建路遣監察御史黃降新録但書遣次升及降察舉詔削去黃履安惇所言今依舊録並書之五月十六日改差詔殿前馬步軍司凡前後新招㨂禁軍兵士先令在營指教百日不及第二等再限兩月限滿又未及即於教場再教兩月候又限滿不入等人馬軍改充步軍步軍改充廂軍仍令樞密院召管軍臣僚説論左侍禁權融州王口寨監押杜臨左班殿直權誠州渠陽縣尉杜震弟遘為三班借職先是臨震乞以招安及戰功轉官減年回授遘官而朝廷委本路轉運司審問乃知遘昭憲皇后親弟審進之後故有是命戊寅録故贈文思副使韋定女夫左班殿直向逹為右侍禁蔣沂仇宗亮並為三班借職以定死事故也庚辰知太原府吕惠卿遣兵入西界破六寨斬首六百餘級元祐元年六月八日劉摯黃巖叟蘇轍王覿皆有言責惠卿以四月十七日并十九日出兵此據言章增入五月二日賞功吕惠卿家傳云初惠卿至河東管勾麟府路軍馬公事燕復屢乞以兵入界討蕩為倐往忽來之計使賊不得安居惠卿使諸將會議皆以為夏人數遭掩擊族帳逺徙而斥堠嚴警間諜莫知其詳淺攻無利深入可虞惠卿以為然遂令諸將分地弛守備務耕牧以疑賊計八年四月朝廷以國恤敵謀入冦詔惠卿出師先之惠卿諜知屯聚所在遣將邢佐臣折克行訾虎以蕃漢步騎二萬二千出左廂至聚星泊滿朗嘉伊克羅朗三角等處破賊六寨斬首六百餘級凡首領十三人獲銅印十四顆駱駝牛馬以萬計追奔數十里振旅而歸劉摯劾吕惠卿擅興兵西人復仇以五月犯寨疆臣戰沒士卒陷亡當檢詳追附今五月實録不載西人復仇事王覿云供奉官王英以戰死兵士陷沒者六千餘人摯覿所云今附五月末王巖叟等元祐元年六月二十日奏乃云惠卿以八年四月二十一日遣兵出界辛巳奉議郎職方員外郎邢恕為右司員外郎蔡確初未知恕文彥博之歸洛陽也恕有詩送行神宗嘗對確稱焉且謂恕久在館下當遷確曰熙寧變法之初恕有異議不可用神宗不答確退朝即召恕告之恕尋遷著作佐郎元豐七年五月一日不半嵗又遷職方員外郎七年卜一月九日恕雅善司馬光吕公著確度光及公著必復用遂深交恕意欲因恕以結二人也然恕傾險乃更與確陰謀謂確有定策功於是驟遷都司此據邵伯溫邢恕傳然伯溫謂恕為都司薦劉摯等於蔡確確不能用摯等既攻確并及恕恕怒遂以謀廢立事報摰等按恕與確畫策欲傾王圭蓋二月末間今遷都司蓋確藉其畫策耳不緣欲因恕結司馬光等也今刪取之承議郎試中書舍人王震為大行皇帝遺留北朝禮信使內殿承制騫育副之詔太皇太后母魯國夫人李氏進封韓趙國太夫人遣承議郎左司郎中滿中行充皇帝登寶位北朝國信使左班殿直閣門祗候焦顔叔副之詔中行等到遼國諭其館伴以大行皇帝遺制尊皇太后為太皇太后同處分軍國事典禮並依章獻太后垂簾故事兩朝合通信使令具此聞於北朝壬午詔先帝昔降指揮諸軍月糧足給斗數分遣使臣諸營檢察自今凡月糧務遵先降指揮令入內內侍省所遣官檢察禮部言髙魯王名正字並回避有難回避者空點畫仍以黃紙覆之嫌名於禮不諱亦無回避故事詔可仍自今進呈并入奏文字雖嫌名亦覆之癸未東染院使王殊為皇城使成州團練使六宅副使王殖為六宅使利州團練使殊殖以故燕國大長公主子也殊殖已見林希野史云元豐七年元日王師約之長子莊宅使殖十五嵗裹頭入禁中見自真宗時李端懿兄弟以長公主子入見仁宗英宗兩朝無帝甥英宗三主下降師約子首得進見戚里皆榮之師約次子又許尚淑夀公主朱妃出也按七年春不見王殖入見事八年夏殖尚為六宅副使則希所稱莊宅使必誤也附注當考左司郎中滿中行言內外官司供申朝省旬月季嵗帳狀其間多有久例名件參錯所承管司往往别無照用乞行廢罷從之此用崇寧四年九月六日報狀增入甲申奉議郎權河北路轉運判官張適通判萊州張適必有言者故責當考元豐七年八月三日推行適所上河朔鹽利今責官必坐此詔水部員外郎王諤特罰銅三十斤諤言京東兩路保馬乞令有司奉行朝廷元立條限及乞增置太學春秋博士緣保馬年限係朝廷先已處分并春秋博士亦非本職所當論列故罰之環慶路經略司言蕃官貝等討西賊獲宥州正監軍偽駙馬葉結威明嘉勒詔具功狀以聞葉結威明嘉勒仍押赴闕五月二十四日丙辰當考此月二十二日乙酉趙卨賞功趙卨傳元豐八年四月夏賊葉結威明嘉勒宿重兵于賀蘭原時出盜邊卨遣將李照用蕃官歸仁各領兵三千左右分擊與耿端彥兵四千趨賀蘭原戒端彥曰賀蘭險要過嶺則沙屬磧也使賊入平夏無繇破之復選蕃官二􅊖威明嘉勒族各與輕兵五百使從間道出賊寨後邀歸路是月與賊戰和爾平賊敗果趨平夏千兵伏發賊駭潰斬馘千生擒威明嘉勒斬首領六獲戰馬七百牛羊老幼三萬五月遷龍圖閣直學士朝奉大夫復帥延安傳蓋全因范百祿所作神道碑刑部言敘用人連遇三赦合敘三官惟遇第一赦人多赦前已歷嵗月及赦文內稱特理三期而文武臣僚敘法乃有一期二期一敘者欲應赦前合敘期限已滿之人偶未投狀該前項第一赦者先具期限次具赦恩各與敘用若該第一次赦恩所敘期限未滿即以赦恩敘訖仍留實歷過年月後敘收使并文武臣僚合一期二期一敘者赦文雖稱與理三期止合每赦與敘一官即不在收留赦文內剩期之限從之司馬光上疏曰臣聞本固則末茂源濁則流渾昔仁宗皇帝擢臣知諌院臣初上殿即言人君之德三曰仁曰眀曰武致治之道三曰任官曰信賞曰必罰英宗皇帝時臣曽進歷年圖其後序曰人君之道一其德有三其志亦猶所以事仁宗也大行皇帝新即位擢臣為御史中丞臣初上殿言人君修身治國之要其志亦猶所以事英宗也今上天降災大行皇帝奄棄天下皇帝陛下新承大統太皇太后同聽萬幾不知臣愚猥蒙訪落且愧且懼無以塞責謹復以人君修身治國之要為獻其志亦猶所以事大行皇帝也所以然者臣歷觀古今之行事竭盡平生思慮質諸聖賢之格言治亂安危存亡之道舉在於是不可移易是以區區首為纍朝言之不知臣者以臣為進迂闊陳熟之語知臣者以臣為識天下之本源也夫治亂安危存亡之本源皆在人君之心仁眀武所出於內者也用人賞功罰罪所施於外者也出於內者雖有厚有薄有多有寡稟之自天然好學則知所宜從力行則光美日新矣施於外者施之當則保其治保其安保其存不當則至于亂至於危至於亡行之由已者也所以能當在於至眀所以能眀在於至公是以眀君善用人者博訪逺舉拔其殊尤德行髙人謂之賢知勇出衆謂之能賢不必能能不必賢各隨所長授以位任有功則賞有罪則罰其人茍賢能雖讎必用其人茍庸愚雖親必棄賞必有所勸罰必有所懲賞不以喜罰不以怒賞不厚於所愛罰不重於所憎必與一國之人同其好惡是以古者爵人於朝與士共之刑人於市與衆棄之如此安有不當者乎臣故曰所以能當在於至眀所以能眀在於至公也昔齊桓公置射鉤而使管仲相漢髙祖知人善任使茍為不才雖見喜亦棄之茍才矣雖負販酒徒亡將戍卒亦用之此所以能奮布衣取天下也館陶公主為子求郎眀帝不許而賜錢千萬郎賤官也猶惜之况其貴者乎故永平之治至今稱之宋髙祖事蕭太后甚孝太后欲以子道憐為揚州刺史髙祖以其貪愚不許故功業之髙冠於南朝唐太宗殺建成元吉而用其官屬魏鄭公王圭等與房杜無異卒得其效宣宗事鄭太后甚謹問舅鄭光以政事不能對罷其方鎮故時人稱美謂之小太宗此用人之公眀者也韓昭侯惜敝袴不以賜左右之無功者漢髙祖深怨雍齒而不忘其功魏太祖勳勞宜賞不吝千金無功望施分毫不與唐宣宗重惜服章故當時得緋紫者以為榮此賞功之公眀者也豎牛殺孟丙仲任立叔孫昭子昭子數其罪而殺之孔子善其不勞丁公脫漢髙祖於厄髙祖以為不忠而斬之武帝妹隆慮公主且死屬其子昭平君昭平君殺人武帝流涕而誅之唐眀皇弄臣王㼐掀捕盜官墜馬眀皇杖殺之宣宗謂樂工汝惜羅程藝我惜髙祖太宗法此罰罪之公眀者也臣略舉此數者以為眀驗其餘在陛下博覽載籍以考之知臣所言不為謬妄臣一夫之愚不能周知天下之務近曽上奏乞下詔書開言路伏望聖慈早賜施行并治平四年五月三日上殿劄子具録進呈乞陛下留神幸察此疏以四月二十一日上二十一日甲申也乙酉天章閣待制知慶州趙卨為龍圖閣直學士知延州龍神衛四廂都指揮使昌州刺史劉昌祚令赴闕供職朝議大夫直集賢院知河中府范純仁為直龍圖閣知慶州卨功具四月二十一日注眀年七月七日卨又遷官朝奉郎監曹州酒稅吳安持權知滑州宰臣蔡確言安持向在京寺嘗奏論臣弟碩事坐上書不實得罪先帝用臣奏免勒停與近郡監當雖纍經宥赦而差遣未嘗移改緣安持吏幹實長乞委之繁難俾得自效故有是命王巖叟云云政目安持二十二日知滑州淮南東路提舉常平司言皇帝登位乞依發運轉運提點刑獄官例以本司錢進奉從之詔故樞密副都承旨張山甫任職嵗久録其子詠為右班殿直諭為三班借職女夫陶器為太廟齋郎樞密院言府界三路保甲兩丁之家見教人小弱或久病及除當教人外家止有病丁并第五等以下田不及二十畝者聽自陳提舉司審驗與放免詔可六月四日丙寅二十四日丙戍七月六日戊戍十二日甲辰二十二日甲寅並合參考監察御史安惇奏伏聞成都逐年撥米三萬石賣與貧弱之人近來知府吕大防等却許官戶舉人置歷請買因緣請託享此厚利顯屬僥幸伏望委官核實審如所聞乞賜施行詔令吕大防具析聞奏此據密疏大防政目在四月二十二日今附本日不知大防分析云何當考知成都府吕大防奏凖內臣張琳公文除十色緊絲來年織外所有錦緊絲鹿胎並依今樣織行已將未上機物帛依樣織造合行審取聖旨詔並權住織造舊録云詔知成都府吕大防所乞依樣織造錦緊絲鹿胎並權罷新録云詔成都府織造錦緊絲鹿胎並權罷從知府吕大防請也二録所書不同今從元祐密疏丙戍晉州觀察使駙馬都尉王師約言燕國大長公主薨太常寺關本服齊衰杖期給假三十日緣臣忝冒寵祿悉緣主故恐難循常詔期服依太常議特給假一年蕃官東頭供奉官髙福進戰死録其子文俊孫永德永貴並為三班借職
