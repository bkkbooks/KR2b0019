body:
  text: 續資治通鑑長編巻五百六宋李燾撰哲宗元符二年二月甲戌朔權提舉開封府界常平孫軫為陜西路轉運判官尋兼權同管勾成都府利州陜西等路茶馬事兼管茶馬在三月十日今并此西南韋蕃進奉人安化郎將韋公夏等一十二人並特授奉化郎將保順郎將韋公市等一十五人並特授安化郎將西南牟韋蕃進奉人韋公利等四十三人並特授保順郎將朝奉郎檀宗旦言竊見近降朝㫖令侍從官各舉所知臣恐尚有遺才乞下諸路轉運等司令於所部公共奉舉學術優異才能顯著者一人以備選擢詔毎路監司同舉二貟以聞是日尚書右丞黄履乞罷政徑出居僧舍上遣約攔不令遷徙既而並未聞封還表章及宣押翌日曽市言履昨求去未聞宣召上曰今日封還表章及宣押次布曰履立朝不為無補同列初以不曉事忽之既發明章惇放罪等事遂頗知敬畏上曰履忠實可謂君子布曰陛下旌别人材如此乃士大夫之福若履者真善人君子也布又言履雖長於臣兩嵗然極清健無可去之理臣疾病衰殘實有乞身歸老江湖之意非敢矯飾如他人有懐禄固寵之心聖恩眷憐勉强就職然其心無一日不在山林上但笑而巳即遣内侍封還履表章五皷再遣使宣押履復位如故乙亥簡王似上表請居外邸詔不允自是凡三上表並不允北外都水丞李偉言相度大小河門乗此水勢衰弱並先修閉各立蛾眉隄鎮壓乞先次於河北京東兩路差正夫三萬人其他夫數令修河官一面和顧從之詔環慶依奏築定邉城助以鄜延戰兵一萬或於涇原未舉動前或同時或候涇原師還惟所便正月十八日丙子詔宣使入内押班馮世寜為宣慶使依前忻州防禦使宣政使端州圑練使入内押班藍從熈為宣慶使邵州防禦使入内東頭供奉官寄左藏庫使劉瑗供備庫使郝隨皇城使石璘供備庫使武琭西京左藏庫副使吳遵道各特進秩一等東頭供奉官閤門祗候韓濟西頭供奉官閤門祗候歐瑾右侍禁陳永升各進秩二等翰林醫官使成州團練使卓順之進秩一等回授有服親與翰林醫官入内副都知馮宗道入内押班劉惟簡各特與有服親有官人一資西京左藏庫使張士彦皇城副使馮景供備庫副使老弼各賜絹二百匹其翰林書藝官等各賜帛有差以嘗随龍示優恩也户部言河北東路提舉平常司奏乞將本路諸州管下外鎮並依元豐舊法置抵當從之權𤼵遣永興軍等路提㸃刑獄孫賁改秦鳯等路丁丑詔降授宣徳郎馬城罷新河北轉運副使依舊知陜州以御史中丞安惇言其為人貪鄙衆所共惡故也正月二十八日降授宣徳郎權知陜州馬城為湖北轉運副使奉議郎充髙宻廣平郡王院大小學教授陳并送吏部與逺小監當差遣以嘗上書毁佛道不當故也戊寅廣南西路察訪董必言通直郎新栁州陶逵知本路利害深暁蠻情望考察換右職詔陶逵特與禮賔副使涇原路經略司言乞差本路鈐轄折可適提舉招納投降西界蕃部第十一副將㓂士元同提舉蕃官李忠傑同管勾從之巳邜吏部言𤼵運使張商英奏乞罷眞揚楚泗監倉門斗面官四貟置廵轄綱運官四貟從之舘伴髙麗人使中書舍人郭知章言髙麗人使言國王欲遣士賔貢此乃逺人悦慕教化伏望採擇詔令説諭許賔貢朝散郎知鄭州程之邵除都大管勾陜西路茶馬公事御史鄧棐言之邵頃在元豐常為監司至元祐初年臣僚言之邵縁監法進用尋送吏部不數月除知祥符未幾除知泗州遂擢監司提舉茶事臣聞之邵與蘓軾蘇轍是親表兄弟初為元豐監司與軾轍異趣則以私忿交惡及軾轍用事而之邵卑辭厚賂以事軾轍初見惡於軾轍則言者交攻及為軾轍所喜累有進擢則言者緘口大抵元祐臣僚觀望用事者喜怒以為語默朝廷是非出於頃刻而榮辱無復公論故之邵得以纎巧附勢而不失其進取伏望聖慈察之邵前後蹤跡特賜放罷從之之邵除茶馬在正月九日今并書鄜延奏遣張誠等出兵討擒凌結鄂裕等布録己夘實録在戊子今從布録戊子乃奏功也庚辰樞宻院言熈河蘭㑹經略使孫路奏乞於喀羅川口建橋修城縁涇原將來進築洒水平鼐摩㑹等處即本路便須接續經營齊訥納森一帶進築通接涇原邉面最為今日急務其喀羅川口隣青唐地分慮生事詔孫路進築齊訥納森等處了當别具利害以聞正月七日路初建請三月末遂招納青唐上謂曽布曰孫路輕易誰可代之者布曰路誠輕易如昨遷學士辭云未覆興州巢穴不敢授命此語乃狂妄又終不能踐言昨令體量張珣言王贍結納青唐舉兵事不曽分明奏報迄今猶為喀羅之役以自符合前言誠可罪然未有人可以代之者上曰有人當易之八月十六日乃移路知河南是日歐陽棐朝見上目之語曽布曰此元祐五鬼布曰亦聞有此名元祐附麗必亦有之治郡亦常才然歐陽修之子登進士第修於英宗定䇿之際最有功章惇常言韓琦既以英宗判宗正有建立之意然未敢啟口一日與修議定修見仁宗便言英宗不立為皇子則事未定仁宗熟視修乆之不言衆為之戰慄仁宗徐曰當如此琦與修等遂乞降詔許之當是時不易出此語此功不可忘上矍然曰誠不易啟口布曰此功為發明者少上頷之元符元年十二月二十九日棐以袐校知潞州落職送部不知何故乃得朝見當考辛已權知邢州王峴言嘗丞軍器見作坊所造神臂弓施於軍事實有竒功乞應内外嵗課减别色弓弩之額増數製造軍器監請於五分添修弓弩人匠内撥二分剏造嵗約増一千七百十五張從之中書舍人郭知章言今侍從官薦士或為臺諫館職或監司郡守擢用之後或不如所薦冝有顯罰乞著為令詔今後應被㫖舉官不當具姓名以聞壬午熈河蘭㑹路經略司言押伴轄正般擦使臣郭誗等具析到般擦入内夾帶回紇劉三等上京乞今後解發諸蕃般擦不許數外夾帶及私抵換人口上京如違其抄㸃并押伴使臣並以違制論從之賜環慶度僧牒二百道應副修城也甲申樞宻院言熈河蘭㑹路經略使孫路奏乞候將來照應涇原進築因便興修横水澗堡寨從之路又乞秦鳯兵一萬與涇原同時進築齊訥納森詔以五千與之布録甲申環慶張存等出界斬五百餘級與特支五百布録甲申鄜延路經略使吕惠卿言保安軍順寜寨據西界首領葉烏瑪齎到宥州牒一道稱正月二十日國母薨定差使令遜威明濟賽副使謨程田快庸等詣闕訃告兼附謝罪表狀今來本路所築九寨須於寨北三二里外逺探卓望處建置堡鋪存留二十里疆界竊計諸路亦當如此欲乞候得本路奏到牒本日令於漢界新舊城寨見今把截堡鋪外廵綽探望人所至處為界然後許令通進表狀樞宻院言西人犯順日乆前後㓂邉不一兼近於涇原路作過狼狽遁歸今計窮請命理難便行収接假令朝廷異日許以朝貢亦須畫河為界即於邉防經乆穏便今來却只欲廵綽探望人所至處為界許令通進牒本顯於事機有害詔吕惠卿指揮保安軍順寜寨令喻葉烏瑪等以破界累年作過今國母已死有謝罪表狀縁只是空文别無實事未敢聞逹朝廷今若是㳟順實情即令遣親信謹宻可委之人同葉烏瑪等界首說話候葉烏瑪等果將到本國親信人即令自來有主謀獻計作過之人如珪布黙瑪凌結鄂裕等先次拘執進獻與朝廷謝罪本路有可憑信即敢具事理奏聞候得朝廷允許方可商量仰吕惠卿詳此指揮順寜寨官依此説諭逐旋對荅語言聞奏四月七日再遣使來又言凖朝㫖相度於米脂東建一寨通河東神泉寨今相度到米脂東北四十里去神泉寨約六七十里暖泉山可以建置包占天都山一帶地土百里遮䕶義合堡詔吕惠卿更切相度地形險固可以控扼賊馬來路及有水泉合行進築即斟酌事力及時興工四月十四日暖泉寨賜名孫覧墓誌銘烏龍距延安之暖泉山二十五里而榆木與米脂直於是秦晉始合㓂不得至麟府矣榆木即神泉也二十二日進築烏龍惠卿家傳云於是築暖泉以通河東築金湯以通環慶㑹梁氏死乾順遣人欵塞告哀謝罪且請和惠卿以為軍興之乆中外力疲今此乃不可失之機㑹而涇原方築天都諸路自用兵以來侵耕生界於其外建置堡鋪補全邉面直且令西人執送生事首領珪布黙瑪凌結鄂裕而約以把截堡鋪外廵綽卓望所至為界然後許以通進公牒庻往復間天都畢工而諸路邉面例皆牢固可以乆逺無疆場之患而朝㫖謂西人近㓂涇原狼狽遁歸計窮請命理難便行収接假令異日許和亦須畫河為界既而遣使三輩來惠卿奏禀應荅而牒言梁氏之死乃北敵遣人酖殺之使乾順自管國事惠卿以為誠有之則其欲西人之歸己可知若我應荅太迂所求難與彼見無接納之期則是怒彼以堅北敵之歸而深我之讎也而畫河為界無肯聽從之理乃上疏極論其利害曰西人之所以有河外者以有河南為之限隔也所以有河南者以有横山為之阻固也今若畫河為界則所以為限隔阻固者皆失之矣彼豈不思一葦之水頃刻可渡據横山之險他路臣固不能盡知之只如本路所築九寨與今暖泉之通河東金湯之通環慶幸皆就緒所得疆土東西殆千里而南北逺者乃至百餘里若又於新寨之外更拓三二十里以為堡鋪則形勢膏腴占據殆盡非昔日廵綽卓望所至為界之比也今乾順因其國母之死歸咎姦臣殺之以謝罪而請入貢則我雖未能一舉以覆其巢穴然自有國以來用兵西方而能所為必成所伐必克使天威逺暢醜氐震疊未有如陛下今日之盛者也兵法曰兵聞拙速未覩工之乆也兵乆而國利者未之有也髙宗伐鬼方三年克之猶為憊今軍興四年矣兵之在邉者日夜候望而不能息兵之在内者非時調𤼵而不得下則士馬日以益困矣臣之至邉初年糧食有支嵗計者備添屯者有五年之蓄者有諸司封樁者今㑹而為一不能給散數月之食財用日以益窘矣今因其謝罪而不即納乃為不可得之辭以絶其來望而怒之堅使北敵之歸恐非計之得也且兵家之事有勝有負萬一一路戰守之間偶有失利或天時饑饉有不可知而此敵有求而不得與之恊力以困我當是之時雖思其有今日之請其可得乎禹征有苖而益贊之曰滿招損謙受益時乃天道蓋當治强之世窮兵力以征一國為不難所以不為者惡其太滿而不謙非天道之所與也况力不足而强為之乎老子曰抗兵相加哀者勝矣又曰禍莫大於輕敵罪莫大扵欲得今西人歸罪扵姦而殺之以謝則是兵加而哀矣若我因以為易與而遂有畫河為界之求則是違伯益之謙而並犯老子之三戒矣伏願陛下更與執政大臣深計究議考自古西戎之難服保持今日已得之成功勿疑乾順自歸之信誕深虞北敵乗隙之詭謀自量中外之事力深思兵乆之非利逺鍳髙宗伐鬼方之憊而合之以伯益之謙滿老子之三戒勿令輕敵不知足欲得之過有在於我而兵加而哀與愛惜生靈之言乃出於敵如臣前請姑令執生事之首領送歸朝廷而約之以新疆堡鋪之外為界以俟進築之畢功然後許接公牒無過遲延絶其來望以堅北敵之歸而為我患天下幸甚既而乾順四遣使者来辭益㳟朝廷亦得其近上首領道其宻謀以為急則納土北歸於是詔趣惠卿即接納焉此合附四月七日是日上以西人叩闗請命甚恱輔臣皆言祖宗以來邉事未嘗如此元昊猖狂朝廷之遣使告北敵令指約今其計窮引咎可謂情見力屈朝廷威靈固已震動四方兼邉事自爾收歛於公私為利不細上亦曰公私之力已不堪章惇等又言北敵方遣使勸和今彼已請命更無可言者此尤為可喜上曰慶歴中乃至干求北敵惇曰此是吕夷簡及臣從祖得象為此謀其人皆無取故至於此及富弼奉使増嵗賂二十萬半以代闗南租賦半以為謝彈遏西戎之意曽布曰近世宰相夷簡號有才其措置猶如此今日邉事乃出於陛下睿明應接聽納之際動中機㑹故能如此上曰夷簡實有才布曰夷簡丁謂皆宰相之有才者然趣操皆不正上曰丁謂小人惇曰謂誠有才非夷簡比當元昊旅拒時或謂若丁謂在朝應接必有理元昊以戊寅嵗叛謂以丁丑嵗卒布曰丁謂雖有才然實小人也布再對上又曰邉事可喜祖宗以來未嘗有此布曰臣以為陛下睿明聽納之際動中機㑹故能如此古人以為好謀而能聽人主於能聽最為難事若所聽者當何事不濟今日邉事朝廷但示以經畫大方一切責在帥臣令其見利則動不强其所不能故舉有成功而無敗事邉庭所以震動屈服亦以是也知雄州張赴奏乞開浚雄州績城河道又乞増修外羅城樞宻院言外羅城昨熈寜泛使蕭禧來理㑹尋有詔許以不増修令張赴遵依詔㫖其河道依年例施行不得張皇引惹丙戌熈河蘭㑹路經略司言洮西沿邉安撫司申夏國衙頭首領鄂特丹卓勒瑪於喀羅城差蕃部尚錦等齎蕃字及尚錦等分析鄂特丹卓勒瑪元係邈川大首領温錫沁弟温阿旺格男元名阿敏走投夏國有王子改名作鄂特丹卓勒瑪令遣人齎送蕃字欲歸漢詔熈河蘭㑹路經略使孫路選兵將以討蕩招納為名至喀羅以來多方誘諭鄂特丹卓勒瑪等迎接歸漢青唐録詔右金吾衛大將軍秀州防禦使叔澹特與換宫苑使依舊秀州防禦使御集三月十三日朝請大夫光禄卿胡宗師為直龍圖門權知鄆州丁亥詔自今賜邉臣茶藥銀合許以西人封樁嵗賜銀充戊子樞宻院言鄜延路經略使吕惠卿奏近差本路鈐轄劉安統制將兵招誘神雞流北佃巷口逢凌結鄂裕斬首四千餘級降四百餘人詔軍兵支錢有差得功人保明以聞初六日奏遣劉安等布録云斬五千級特支七百吕惠卿家傳云西人以並建城寨奪其耕牧之地而復數遭掩擊部族離散來歸者日益以多凌結鄂裕率衆營險以阨之欲歸者不得至二年二月惠卿遣劉安以第二第四将張誠以第一第五第六将李希道以第七将㑹於精勤泊以擊之三日至烏延川四日至神雞流遇賊三千餘騎六日至巴勒濟埒克遇賊五千餘騎七日至魯遜滿達勒遇賊七千餘騎安等遭賊皆破之斬首四千餘級降者五百餘人獲其器仗牛羊十餘萬以歸於是築暖泉以通河東築金湯以通環慶熈河路經略使孫路繳連夏國部落威明宻齎南路都統威明律凌書稱夏國欲遣使再乞修貢已回報言如朝廷回降指揮别得馳報詔孫路不合擅收接西人書及便回答文字特降充寳文閣待制如再來計㑹即説諭别無回降指揮如有事告朝廷即合於正路通逹元年八月二十七日自慶改熈樞宻院言三班借職徐子安狀朝廷立法令諸路逐將所將兵馬分作五部差部隊將各自提㸃比見諸路將副多不依朝㫖雖出入分定五部却不合提㸃管轄例各輪差把截邉堡如遇出入於前一日勾抽旋行差撥人馬管押其所差到人兵雖係本將人馬即非自來親自㸃閱之人故使上下人情不相諳信雖有曽經戰敵部隊將却差到下等人馬其間未經出入之人乃各不顧條法豫行結託例得强壯精鋭人馬竊慮誤事有妨驢策縁朝廷於諸將下差置部隊將蓋責以各自訓練軍馬如内有不諳戰陣怯懦之人合具不職事狀别選舉使臣抵替豈得於輪差把截邉堡及於行陣之際旋行移易若更因依挾情差負犯停廢及得替待闕使臣揀選精鋭人馬付之徼倖功賞尤為不便縁五部部隊將平時訓練軍兵及臨戰陣却以所部兵馬付之他人殊失朝廷差置部隊將之意詔陜西河東路經略都總管司嚴行覺察違者以違制論新録刪修云詔陜西河東諸路出軍不得移易部隊將令經略都總管司嚴行覺察違者以違制論從三班借職徐子安之言也初子安上請樞宻院進呈上頗稱善故施行之環慶乞以二月二十六日築定邉寨許之正月十二日相度三月七日畢工己丑樞宻院言承議郎提舉熈河蘭㑹路弓箭手李夷行申招刺之法先經本府及州軍相去不下三兩程以上往反已是勞費及將司百端邀阻有留滯十餘日不能拍試以此多不敢應募乞除將副在城寨許赴將副如帥司州軍相近即於以次近將副處拍試收補又逃亡空地既不𦂳行招人又不速勒租佃即因此人員可以冒種兼城寨使臣往往借賃牛具選擇肥田私自耕種或收授馬料其為姦弊不可勝言今欲乞令本城寨將空地分作等第出榜召人出租權佃如逃田内有山石委是不可耕種者委提舉官相度除放又闕馬人元給到添給地五十畆依條限半年災傷更展半年如不買到馬即許有馬請射今本路闕馬不少例各經隔年嵗不曽勾收地土亦不曽召人租佃使之坐占羙地安肯備錢一半収買馬今欲乞闕馬人更不拘収添給地土據其肥瘠認定每畆租課雖在半年限内亦令送納候買到馬日除放又弓箭手初買到馬全給官錢比來芻料翔貴憚於牧飬往往故有死損又將出界止揀壯馬前去其闕馬人各不隨軍内有一指揮只揀得一二十匹出戰者乞令就近將官并城寨使臣常竊體度將貧闕不能贍馬人許令願飬馬者兊飬并贍馬地隨馬給付即不得兊與人員及有物力頑猾之人又人貟多将錢物借與長行租種地土及借與牛具耔種與之合種分収租課致長行貧乏有誤出入乞令所屬體訪覺察違者杖一百錢物不追並從之新録刪修云樞宻院言提舉熈河蘭㑹路弓箭手李夷行言乞許弓箭手就城寨將副處招刺以絶州府往返勞費及留滯邀阻之弊又請募人權佃逃田以絶人員冒種之弊又請闕馬人於添給地據肥瘠起租有馬即除之又請貧闕不能贍馬之人許令願飬者兊飬隨給贍馬地惟兊與人貟者勿許又請人貟以錢物借長行號為合種者立法禁止詔並從之邵䶵乞免團結錢監及遞鋪兵應副涇原詔罰金十斤閻令李譓専提舉錢監先乞團結令譓皆應副涇原調𤼵故也䶵不預涇原事獨有此請因罰之布録己丑庚寅軍頭司引見涇原路擒獲西界統軍威明阿宻穆賚多卜等共二十七人詔並特貸命釋縳押赴懐逺驛鄜延奏乞止以兵五千應副環慶從之辛夘樞宻院言河東經略司奏投來西界偽鈐轄耀宻滂等雖無文憑縁有舊管蕃官指證不虛詔河東經略司依偽鈐轄例補官及支賜又言近降朝㫖令章楶相度於鼐摩㑹洒水平或秋葦川進築城寨将来若於鼐摩㑹洒水平進築了當其正原自係近裏地分不須枉費財力進築詔令章楶相度利害務要簡便甲午大食國遣使入貢乙未詔吏部守令課績在優上等即闗御史臺嚴加考察如有不實重行黜責從吏部之請也河東路經略司言副總管王文振等詣生界相視得烏龍川北嶺地形險固堪充守禦城寨詔如委與神泉寨米脂葭蘆寨緩急聲援相接可以控扼及有水泉即及時興工進築四月十四日賜名神泉即榆木孫覧墓誌云烏龍距延安之暖泉山二十五里而榆木與米脂直於是秦晉始合㓂不得至麟府少府少監分司南京趙君錫卒是日曽布言章惇蔡卞施行元祐人衆論皆為過當然此豈為詆訾先朝大抵多報私怨耳惇卞初相得故惇於卞言無不聽及與卞相失則卞多持其所短故惇畏之不敢不從但陪笑而已衆莫不笑之今朝廷政事一出於卞惇無敢違者上曰蔡京尤與惇不足布曰惇於蔡氏兄弟無不畏者近頗欲屈意求和於京而京不為之屈衆尤哂之宰相毎以義理處事何畏人之有惇短處多故不能彈壓衆人人皆不畏之而未免畏人也近日外議有一事深以為不平此乃有實狀陛下昨欲復導洛司堆垜塲事惇力陳以為不可卞亦然之衆論亦皆以為不可復陛下詢訪知利害降屈聖意遂從其請収還文字中外稱誦聖徳萬口一辭及蔡卞欲復行市易法而惇不敢遏仍復以吕嘉問主之中外洶洶不平許將亦曽為臣言及此事市易之害與導洛司無以異止是熈寜中王安石所主故卞必欲復行導洛乃元豐先帝所行故無力主之者以此言之誠可不平市易用千五百萬本錢得息錢九百萬失䧟者乃七百八十萬徒作一大事一無所得復行之何益臣嘗以論市易得罪安石亦罷相臣亦貶嘉問亦貶上曰安石因此罷相布曰然遂引惠卿為參政及貶臣乃惠卿力主之安石已去位矣臣立朝至孤寡合側目者衆近日序辰嘉問之徒經營中傷無所不至有李積中者今日亦上殿積中與臣有𤓰葛昨在江西為縣人多言其不亷今知解州朱彦博時為轉運判官不肯薦之以臣故但保全之而已昨既改官累干臣求差遣臣答以向為縣無亷聲何敢為求差遣以此怨怒臣既而周秩舉京西運司勾當公事及為陳次升言知縣不當舉差遣遂罷乃一向毁臣以恱蹇序辰輩故吕嘉問薦之嘉問薦積中在去年八月二十六日上殿得提舉官去年十二月十六日積中除湖南常平初欲經營令為御史欲彈擊臣私事臣茍有罪惡此輩必不為臣掩蔽亦不敢冀朝廷寛貸茍有所陳願賜推治正名定罪痛行貶黜上曰與卿是甚親戚布曰積中妻乃臣女壻之姊常來臣家臣與之親舊一旦干求差遣不得便毁臣以求合序辰輩但觀此舉其人可知陛下嘗以為存乎人者莫良於眸子積中眼目如此亦可見其人也上曰安惇言欲令臣舉積中作御史臣不敢從布曰安惇本非惡人但畏序辰輩不敢不附麗爾陛下擢邢恕作中丞終不免附此黨既又擢安惇亦然蓋序辰嘉問輩凶黨甚盛人人重足一跡無不畏之者雖凶熖如此惟臣不畏之布又言凶黨方熾善類畏縮陛下排衆論擢趙挺之郭知章輩為從官然此輩皆畏凶黨不敢有所陳陛下曽見此輩敢有一言及此黨不是事否以至近日詞頭亦無敢繳者可見其畏懼也然此輩如此皆未足以稱陛下拔擢之意臣被遇兩朝今日得事陛下恩眷之厚臣非不知昨所以懇求致仕正謂避此輩爾臣衰朽疾病無補朝廷實有歸老山林之意非如他人顧戀寵禄為保身之計亦不敢䜛毁他人以為進身之地亦不與人爭進然凶黨窺伺中傷之意如此欲陛下知之爾臣孤拙無一黨援亦終恐難安臣只俟邉事稍見次第汎使還塞臣未免再干煩聖聽乞伸前次上笑而已丙申詔吏部貟外郎孫諤與合入差遣以元祐訴理有䘖寃飲恨之語故也諤邵武軍人楊時誌其墓並三月十一日左膚十一日章但云吏部貟外郎與合入差遣不云送吏部後乃送吏部元符三年十一月五日自司勲為右司是日詔三省樞宻院有邉事處帥臣替移同取㫖布録在三月丁丑先是三省欲以涇州與樞宻院易思州與堂吏時恪從之曽布因言近邢州韓治滿一年三省再除人今恩州李諒未半年三省亦再除人乞立法上以為當然遂得㫖今後互差闕未及一年不許再差人布再對言州郡互差闕已立法臣又嘗與三省言帥臣差除二府同取㫖至辭恩命乞差遣或罷帥别有除授宻院多不預聞如孫覧屢乞差遣直至欲除林希方率宻院同取㫖亦當立約束上然之既而章惇不可故止以此條進呈丁酉禮部言髙麗人使乞收買冊府元龜資治通鑑看詳冊府元龜元祐年曽賣外其資治通鑑難令収買從之翰林學士承㫖蔡京言乞文臣一貟同共檢詳應荅泛使字文欲差正字方天若從之又乞同泛使上殿上問曽布如何布曰京亦曽為臣言恐泛使奏事上有對答語與副使同記臣荅以泛使雖直前奏事上必不答上曰若再三有所奏請如何布曰亦止是令歸驛説館伴朝廷必有指揮恐難便可否其所請上然之遂已又乞降對答畫一指揮悉如擬定曽旼奏泛使蕭徳崇等到白溝不肯乗遞馬欲帶北界人馬至雄州如蕭禧例禧當日凡駞畜車乗皆至雄州徳崇已交割畜乗獨欲留人馬至雄州而旼與張赴堅執不從初朝㫖令從長相度施行旼既拒之却有二貼黄一云理當堅執一云俟其詞婉順即依從所貴不失其歡奏狀止云謹奏而貼黄中却乞朝廷指揮章惇堅以堅執為是曽布曰但當依前降指揮令從長相度施行許將亦以為當然上疑之顧蔡卞以為如何卞曰須慮後來可堅執否兼恐他云因何待遇不如蕭禧惇曰但堅執必不能乆留不敢不聽布曰萬一不聽如何必更奏禀朝廷若從之則是前後三降指揮皆不同恐失體若謂彼必不敢不聽陛下信得及否兼旼曽禀執政亦曽説與度不可争不若便從之今既堅執又却云欲依從自是執不定上曰如此是旼處得不是遂如布所奏再對上問布昨日商量曽旼文字布曰只今早商量初意便以堅執為是故旼赴皆堅執然臣素以為難若朝㫖數反覆不同非便兼泛使來方與議大事不須以小事致其忿怒却更生事費力章惇於邉事論議多如此臣亦未嘗敢曲從毎有所爭論未嘗不正色折之不爾則不足勝惇兼稱屈則便為惇所陵慢矣上哂之布又曰臣於章惇蔡京蔡卞輩無所適莫惇是則從惇京卞是則從京卞未嘗敢以私意變亂是非上曰國事固當如此惟是從之布曰臣與同列毎言公家事當以公議處之何所用心於其間上曰當如此布曰臣嘗言善惡各有類蔡京孜孜欲辟一文臣於館伴所乃意在方天若爾臣屢言天若險薄不可任使今置之館伴所猶不妨若其他薦引願陛下更加裁察上曰在館伴所無所妨布曰臣前日論李積中亦止為其險薄可惡上曰眼是如此上視布曰執政從官於朝廷令中丞舉御史之際廼私薦引其黨人此其為罪甚大以至臣言常立毁先帝却欲引作諌官陛下欲行導洛事則力爭以為不可蔡卞欲行市易則無敢爭者章惇於市易事深以為不便累曽對臣言其罪又云這箇行得多少時且從他許將黄履亦聞之此三事皆不可貸之罪若令臣有一於此必不為衆所容排䧟必矣臣以赤心事陛下無所隠然此等事欲奏陳而不敢啟口者亦十有七八然終不敢不言者以人情外議如此陛下不可不知惓惓如此欲陛下周知人情物議於睿明不為無補爾上欣然曰是是右正言鄒浩奏臣伏聞曽旼往界首接伴北使與之紛爭累日方决終不能奪北使之議臣以得於外論無由備見本末若果有之所係不細蓋彼我紛爭不過是非兩端而已謂旼等所爭為是則終不能奪北使之議是捨是而從非也謂旼等所爭為非則安用紛爭累日方决是以非而為是也捨是從非則必為北使所屈以非為是則必為北使所窺二者必有一焉旼等曽不審處於未見北使之前而乃輕發於已見北使之後此何謂也又况泛使實與常使不同既未知其的為何求而來正頼接伴豫以道理處之使不能妄有生事之漸而乃無故啟其爭心尤為可罪伏望聖慈特降指揮推究旼等如委有上項事迹即乞重行黜責以為後人之戒正月七日雄州云云可考詔以度僧牒千道賜河北安撫司瀛定各三百魏鎮各二百令嵗嵗回易収息添助修葺城壁樓櫓軍器等他用者以違制論不以去官赦降原減詔熈河發遣李公緒乗驛支盤纒上京公緒乃告王舜臣妄奏首級事上曰須與一官衆皆曰公緒為朝廷惜得濫賞官職不少兼邉吏因知警懼當有以奬激上曰與三班奉職詔故銀青光禄大夫檢校國子祭酒知溪峒新逺州軍事兼監察御史田知遷長男彦伊特承襲乙亥奉議郎魯王宫大小學教授石豫為監察御史從中丞安惇薦也先是惇薦豫及承議郎京東轉運司管勾文字康謂上問曽布如何布曰豫極無狀謂亦俗才如此等人何足置之言路然豫竟為御史康謂以承議郎京東轉運司管勾文字提舉䕫路常平在三月十三日庚子權殿中侍御史鄧槃言伏見權發運司勾當公事近日執政大臣與駙馬都尉皆用恩例以親戚陳乞伏望下有司立法詔張敦義罷發運司管勾文字辛丑詔皇城司任滿依熈寜五年指揮酬奬元祐嘗减恩例却増再任酬奬而熈寜舊條再任未嘗推恩蔡卞以為責重不知何故不賞曽布曰再任者皆都知押班毎任滿即須再任故舊條不賞上令再任滿無遺闕取㫖壬寅朝議大夫集賢殿修撰新差知江寜府劉定知廬州朝奉郎直秘閣新差知越州吕升卿知江寜府右正言鄒浩奏伏聞新知廬州劉定前知陳州日恣為貪汚不法等事近因臣僚奏論已降指揮差官根治去訖其劉定雖未即正典刑委是有罪戾難赦之人豈宜更令冒赴新任以辱兵民重寄伏望聖慈詳依賈青罷知河中府近例先次放罷聽候朝㫖施行從違當考賈青罷在正月二十七日
