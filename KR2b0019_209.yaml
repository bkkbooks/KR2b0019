body:
  text: 續資治通鑑長編巻二百五宋李燾撰英宗治平二年五月庚申朔樞宻院奏嘉祐三年詔非軍職當罷横行嵗滿當遷及有戰功殊績皆不得除正任當遷則改州名或加檢校官勲封食邑按㑹要此詔乃三年十一月降今附此更不别出於彼自降詔以來正任刺史以上絶遷進之望今欲因知繁要州郡或路分總管如再經改州名或加檢校官勲封食邑已及十年者與遷官至節度觀察留後止又客省引進四方舘舊置使三員東西上閤門舊置使四員今並増為六員閤門引進客省舊置副使六員今並増為八員閤門舊通事舍人八員今増為十員凡所増置須見任官當遷及有闕乃補其皇城使改官及七年如曽歴邉任有本路監司總管五人以上共薦者與除遥郡刺史至遥郡防禦使止詔自今皇城宫苑副使當磨勘者各於本班使額自下升五資改諸司使其自左藏庫副使以上因酬奨及非次改官者聼如舊餘皆從樞宻院之請初帝謂執政曰諸司副使改轉使當從供備庫使始今對行改五資太優於是合議條奏而為此例此據本志雖實録亦有然文稍繁獨本志以増客省使副員為慶厯四年事則誤也事在嘉祐三年八月癸亥資政殿學士禮部侍郎陳旭為樞宻副使案旭即升之盖其後避神宗嫌名故以字行也先是吕誨言樞宻使冨弼在告已半年疾勢未得痊復陛下深惜其去久虚厥位盖以邦政為憂方倚毗於事柄也昨呉奎丁憂故事百日後有起復之例恩禮未及奎而進用王疇又足以見陛下厲精求治任人之切矣然疇卒既經數月未聞除授何向來之遽而今日之緩也張昪先乞還政胡宿又復請郡彼誠年髙不任於事樞府殆曠政將安寄况兵防久隳邉鄙多故謀謨機宻尤須得人臣愚伏願陛下體軍國之重以生靈為憂早擇才望之人進擢樞貳必僉諧而後可不宜久虚其位俾邪佞闚𨵦大為岐徑經營進用此必然之勢也惟聖𠂻留意即天下幸甚及是誨又言陛下厲精治道左右前後宜得正人贊㐮宻勿以致隆平不意憸人復用公議甚欝者當先朝任陳旭時臣與唐介范師道趙抃王陶言其姦邪不當置於二府封章交上醜迹皆明外則近臣主張内則宦官引援韓琦極力為地冨弼依違不決凡論列半年陳旭出知定州臣等謫斥江外事既兩罷曲直不斷人言沸騰遂成先帝之一失臣愚憤懣痛惜者此也近崇政殿奏對奉承徳音謂旭有才人或言其姦邪者不數日遽聞除命豈有中外言其姦邪明哲知而復用臣竊謂大臣極力引薦陛下不得已而用之旭向來事迹畧舉一二上悟宸聼庶㡬異日明辨旭先為諫官録問張君方公事減落情節出其罪状蓋附宰臣劉沆希奉貴妃因縁徼倖仍多與内臣交結王世寧聨妻族之親因而朋附遂得進用及知開封府史志聰家人不還趙烈賣屋業價錢私志聰而沮烈人不平之親從官踰越皇城事狥内省都知請求一切不問此迹状明著衆所知者餘不復殚論臣輙思一事於體未安者世寧之妻李氏本在宫中先帝命適世寧亦領内省要職旭居樞府掌握重權勢雄内外豈得為便衆人之情頗為駭動臣焉敢緘黙欺蔽朝廷唯兾清𠂻更賜沉慮旭之進退繫於宸斷兵部員外郎秘閣校理蔡抗兼起居舍人充史舘修撰同知諌院抗初為睦親廣親宅講書出入宫邸不受饋遺上器重之請於濮安懿王願得與遊毎見抗衣冠盡禮義兼師友及親政即問抗安在抗時將漕廣東亟召入判都理欠憑由司抗未至上毎見奉使南來者輙問之及對留語日旰曰卿朕故人朕望於卿者厚勿以常禮自踈也居數月遂有是命蔡抗判憑由乃去年八月事翰林學士權知開封府馮京為陜西安撫使代陳旭也先是韓琦言慶厯中臣常與范仲淹同上禦戎四䇿未及施用而元昊請和今諒祚狂童固非元昊之比敢爾輕動勢將渝盟願以臣當時所上四䇿令二府共議擇可行者付邉帥及命京使陜西琦又言本朝何亮劉平各言西事亮謂靈武不可棄棄則西人必吞諸戎為後大患當時不能用而今悉驗焉平之所陳雖與四䇿稍異然大抵以得西人山界土地部族為甚利願并亮平二奏付京使與四路帥臣參議之然京所議方畧卒無聞也此據韓𤦺家傳戊辰詔曰朕觀漢宣之治綜核名實而政事文學法理之士咸精其能繼統之業盛矣朕䝉先帝遺烈懼徳不明未燭厥理乃夙興以思嘉與公卿大夫厲精為治而属天下承平日久内外因循惰職者衆未聞推利及民盡心憂國者也徒累積嵗月以倖其進又沽餙名譽以徼所知其可道者亦不過務在簿書期㑹之間朕何望焉夫憸嘿茍簡者弗懲則端良敏濟者亡以勸朕持賞罰之大公固將必行之詩不云乎夙夜匪懈以事一人百執事其易慮孜孜各修厥職以稱朕意辛未東上閤門使嘉州團練使劉几知鄜州几初權涇原副都總管與陳述古交訟既罷而代几者遂發几過用公使錢詔几赴永興軍聼劾御史中丞賈黯言國家任用將帥當責以禦邉扞冦之效細故小過皆宜畧之則可以得其死力太祖時天下未定用李漢超等一十四人分捍三邉皆十數年不易舉其州征𣙜之利皆以與之仍聼其貿易免所過征稅軍事無小大皆許便宜以故漢超等得成功名而二十年間無西北之憂慶厯中陜西用兵頗失此術邉臣用公使錢微有過則為法吏繩以深文如尹洙張亢滕宗諒是也今西戎叛擾陛下方當以恩威御諸將所宜思太祖之得人而懲近事之失體如几者茍無大過願赦而不問上納其言故有是命此據寳訓邊寄篇丙子權御史中丞賈黯奏近者皇子封拜並除檢校太傅臣按官儀自後魏以來太師太傅太保是為三師太尉司徒司空是為三公國朝因之六典曰三師訓導之官也蓋天子之所師法今皇子以師傅名於義弗安莫此為甚蓋前世因循失於釐正臣愚以謂自今皇子及宗室卑者除官並不可帶師傅之名隨其遷序改授三公下兩制議請如黯奏而中書亦謂自唐以來親王無兼師傅者國朝以三師三公皆虚名故因而授之宜正其失詔可且令已受命者異時加恩改授甲申命宰相韓琦曽公亮權兼樞宻院公事冨弼在告故也弼自去冬以足疾卧家至是章二十餘上乞補外郡終不許丙戌詔少卿監願知兩赤縣及監在京二十七處庫務者聼之樞宻院編機要文字九百八十一册以進賞執事者有差嘉祐六年八月初編六年十一月成一千一百六十二册今未三年復九百八十一册當考其同異會要以九百八十一册為二年九月事今從之實録以為元年九月事恐誤也京師百司所行兵民官吏財用皆無總數中書有一行移則下有司考㑹參知政事歐陽修因暇日盡以中書所當知者集為總目上有所問宰相以總目對修常奉祠家居上遣内侍就中書閤取而閲之此據修本傳掇出附樞宻院編機要文字之後六月辛邜江東轉運判官屯田貟外郎范純仁為殿中侍御史太常博士權發遣塩鐡判官吕大防為監察御史裏行近制御史有闕則命翰林學士御史中丞知雜事迭舉二人而自上擇取一人為之至是闕兩員舉者未上内出純仁大防名而命之大防藍田人也樞宻使張昪奏臣子娶純仁之妹合囬避不許大防首言綱紀賞罰之際未厭四方之望者有五進用大臣而權不歸上大臣疲老而不時許退西夏驕蹇邊患已萌而不擇将帥不知敵情議論之臣禆益朝廷闕失而大臣沮之疆塲左右之臣有敗事而被賞舉職而獲罪者又論冨弼病足請解機政章數十上至以牛馬自比而不納張昪年幾八十體力已耗哀乞骸骨而不從吳奎有三年之䘮召其子而呼之者再遣使而召之者又再程戡辭老不堪邉任恐死塞上免以尸柩還家為請而不許竊以為過矣弼賢臣也今使其得休於外則不病之日為報陛下深矣奎才臣也使其終三年之䘮得盡其孝於所親則服除之日必能盡忠於陛下矣昪戡既老矣又皆哀請求去陛下欲盡忠臣之分則皆與之閑務使盡其餘年如此則中外羣臣皆知陛下優待大臣進退以禮亦何必過為虚餙曲事形迹使四人之誠不得自逹耶此據行状比大防傳差詳要須别删潤之知雜事吕誨言臣常聞漢孝武即位之初田蚡為相薦人或起家至二千石權移主上帝乃曰君除吏盡未吾亦欲除吏非明哲之君智能燭理則威福之柄幾為田氏専矣今見陛下始除二人者誠有㫖哉臣向來所陳令中外兩省官每嵗各舉才能之人籍於禁中要任使即清衷自擇免臨時薦舉可以杜絶請求之路此至公之法願陛下乆而行之被用之人莫不歸感上恩必盡死節以圖効報自昔興王之道未有不繇于是也唯聖慮以橾柄之重謹始克終天下幸甚癸巳羣臣表請聼樂弗許自是五上表乃許之初綘州團練使楊遂為新城廵檢救濮王宫火帝識其面目於是侍衛司闕帥帝首出遂姓名擢登州團練使步軍都虞候己亥詔自今三司乆任判官不得别舉職任壬寅提舉在京諸司軍務王珪等奏都官郎中許遵編修提舉司并三司類例一百三十册詔行之以在京諸司庫務條式為名遵泗州人也己酉荘宅使張利一為皇城使知雄州兼河北㳂邊安撫使代皇城使嘉州刺史李中祐也以中祐權定州路總管利一傳在紹聖二年司馬光言臣聞明主謀事於始而慮患於微是以用力不勞而收功甚大竊見國家所以御敵之道似未盡其宜當安靖附順之時則好與之計校末節爭競細故及其桀傲暴横之後則又從而姑息不能誅討是使敵人益有輕中國之心皆厭于柔服而樂為背叛近者西戎之禍生于高冝北陲之隙起于趙滋而朝廷至今終未省寤猶以二人所為為是而以循理守分者為非是以邊鄙武臣皆鋭意生事或以開展荒棄之地十數里為功勞或以殺畧老弱之敵三五人為勇敢朝廷輙稱其才能驟加擢用既而敵心忿恨遂來報復屠翦熟户鈔刼邊民所䘮失者動以千計而朝廷但知驚駭增兵聚糧其致冦之人既不追究而守邊之臣亦無譴責如此而望遐荒賓服疆埸無虞是猶添薪扇火而求湯之不沸也臣愚竊惟真宗皇帝親與契丹約為兄弟仁宗皇帝赦趙元昊背叛之罪册為國主嵗損百萬之財分遺二敵豈樂此而為之哉誠以屈已之愧小愛民之仁大故也今陛下嗣已成之業守既安之基而執事之臣數以爭桑之忿心不思灌𤓰之大計使邊鄙之患紛紛不息臣竊為陛下惜之近者聞契丹之民有於界河捕魚及於白溝之南翦伐桞栽者此乃邊鄙之小事何足介意而朝廷以前知雄州李中祐不能禁禦為不材别選州將以代之臣恐新將之至必以中祐為戒而以趙滋為法妄殺敵人則戰鬬之端往來無窮矣况今民力彫敝倉庫虚竭将帥乏人士卒不練夏國既有憤怨屢來侵㓂禍胎已成若又加以契丹失歡臣恐國力未易支也伏望陛下嚴戒北邊将吏若契丹不循常例小小相侵如漁船桞栽之類止可以文牒敕會道理曉諭使其官司自行禁約不可以矢刃相加若再三曉諭不聼則聞于朝廷雖専遣使臣至其王廷與之辨論曲直亦無傷也若又不聼則莫若博求賢才增修政事待公私富足士馬精强然後奉辭以討之可以驅穹廬於漠北復漢唐之土宇其與爭漁桞之勝負不亦逺哉試校書郎孫侔試将作監主簿常秩前亳州衛真縣主簿王囘皆為忠武軍節度使推官侔知來安縣秩知長社縣囘知南頓縣侔等皆以文行知名為知制誥沈遘王陶等所薦命下而囘卒侔秩皆辭不赴囘侯官人平子也惇行孝友質直平恕造次必稽孔子孟子所為而不為小廉曲謹以求名譽於世其學問所得自漢以來列於儒林者罕及也常舉進士中第任衛真簿於事有所不合稱病自免退居潁州乆之不肯仕在廷多薦者故命以為縣會卒弟向冏亦以文學知名善序事皆蚤卒仕止於縣主簿其母則曽公亮之姊也甲寅刑部郎中張師顔同提舉在京諸司庫務初兩浙轉運使韓縝上言景徳中朝廷置提舉諸司庫務以朝臣及諸司使副二員領之近年常用顯官詞禁清華固非奔走之任武臣内侍多是職位已高雖欲躬親體亦未便望循景徳初置之意及當時所定條約俾復舊制則衆務畢舉詔増置當入職司朝臣一員而有是命初議崇奉濮安懿王典禮翰林學士王珪等相顧不敢先發天章閣待制司馬光獨奮筆立議議成珪即敕吏以光手藁為案其議曰臣等謹按儀禮䘮服為人後者傳曰何以三年也受重者必以尊服服之為所後者之祖父母妻妻之父母昆弟昆弟之子若子若子者皆如親子也又為人後者為其父母傳曰何以期也曰不二斬也特重於大宗者降其小宗也又為人後者為其昆弟傳曰何以大功也為人後者降其昆弟也以此觀之為人後者為之子不敢復顧私親聖人制禮尊無二上若恭愛之心分施於彼則不得専壹于此故也是以秦漢以來帝王有自旁支入承大統者或推尊父母以為帝后皆見非當時取譏後世臣等不敢引以為聖朝法况前代之入繼者多宫車晏駕之後授立之策或出母后或出臣下非如仁宗皇帝年齡未衰深惟宗廟之重祗承天地之意於宗室衆多之中簡㧞聖明授以大業陛下親為先帝之子然後繼體承祧光有天下濮安懿王雖於陛下有天性之親顧復之恩然陛下所以負扆端冕富有四海子子孫孫萬世相承者皆先帝之徳也臣等愚淺不逹古今竊以謂今日所以崇奉濮安懿王典禮冝準先朝封贈期親尊屬故事高官大國極其尊榮譙國襄國太夫人仙逰縣君亦改封大國太夫人考之古今實為冝稱議上中書奏王珪等議未見詳定濮王當稱何親名與不名珪等議濮王於仁宗為兄於皇帝冝稱皇伯而不名如楚王涇王故事議者或欲稱皇伯考天章閣待制吕公著曰真宗以太祖為皇伯考非可加于濮王也是月己酉中書又奏按儀禮為人後者為其父母報及案令文與五服年月敕並云為人後者為其所後父母斬衰三年為人後者為其父母齊衰朞即出繼之子於所繼所生父母皆稱父母又漢宣帝光武皆稱其父為皇考今王珪等議稱皇伯於典禮未見明據請下尚書省集三省御史䑓官議奏詔從之執政意朝士必有迎合者而䑓諫皆是王珪等議論􅍅􅍅未及上太后聞之辛亥内出手書切責韓琦等以不當議稱皇考而琦等奏太后以珪等議稱皇伯為無稽且欲緩其事須太后意解甲寅三年四月二十七日壬午始罷議此須權罷耳降詔曰如聞集議議論不一冝權罷議當令有司博求典故務合禮經以聞翰林學士范鎮時判太常寺即率禮官上言漢宣帝於昭帝為孫光武於平帝為祖則其父容可以稱皇考然議者猶或非之謂其以小宗而合大宗之統也今陛下既考仁宗又考濮安懿王則其失非特漢宣光武之比矣凡稱帝若皇若皇考立寝廟論昭穆皆非是因具列儀禮及漢儒論議魏明帝詔為五篇奏之執政得奏怒召鎮責曰詔書云當令檢詳奈何遽列上耶鎮曰有司得詔書不敢稽留即以聞乃其職也奈何更以為罪乎於是臺官自中丞賈黯以下各有奏乞且從王珪等議侍御史知雜事吕誨言朝廷既知議論不一當辨正是非參合衆意明所適從豈可事有未定遽罷集議還付所司詔命反復非所以示至公于天下也臣輒狥愚見敢以聞上臣謹按儀禮為人後者為其父母報葢為大宗斬為小宗朞不二斬明於彼而判于此也又按令文與五服年月敕出繼之子於所生所繼皆稱父母稱父母者所以别其本生於後也在屬籍當行除附斯令之意可明也如漢宣光武皆稱父為皇考者二帝上承本宗皆非旁繼於今事體畧不相類據王珪等議濮安懿王於仁宗皇帝其屬為兄於皇帝合稱皇伯而不名於禮得矣及引元佐元儼稱皇兄皇叔之類皆本朝典禮安得謂之無據臣竊原敕意直欲加濮安懿王為皇考與仁廟同稱如是則尊有二上昭有二斬禮律之文皆相戾矣臣恭以陛下龍躍藩邸入繼大統南面尊臨皆先帝之徳也甫終祥禫尚未遑廟謁遽有斯議搢紳之士皆未為然方陛下躬勤孝養上奉慈闈承顔猶懼其不足矧復顧私恩别親踈而㤀大義哉就如有司狥情酌禮以安懿為考仙遊為妣示於中外得為安乎臣竊惟兹事非出清𠂻必佞臣建白茍恱聖情二三輔臣不能為陛下開陳正論又将啓其間隙違背禮義惑亂人情㤀先帝之眷倚䧟陛下于非正得為忠乎臣伏望陛下開廣聖慮精勤孝治不作無益以害至公既罷三省集議當别降詔㫖以王珪等議為定以前後所獻不一論盡降出外辨正是非明其有罪寘之於法可以涣釋羣疑杜絶邪論不然何以明陛下之無私判中外之深惑傳之永乆所損不細又言陛下天賦英睿學通古今經義粲然不應有惑禮所謂大宗者收合于宗族也陛下繼大宗而有天下義之重恩不得掩豈可復顧於小宗哉人臣非不欲陛下尊顯所生褒崇封爵極其美稱唯不過於典禮矧至孝之道不必狥於已私於親唯其誠而已矣在宸𠂻豈不是思苐為邪佞進説惑亂人情陛下何惜一幅之詔推示信誠以皇伯之稱為定追正封爵以稱典禮則中外之心涣然釋疑不如是則紛紛議論有損聖明不獨貽譏於萬世将恐取輕於四方又言陛下踐阼以來克謹政理繼志述事孝誠已至唯濮安懿王一事不合典禮未副人心甚為陛下惜之事繇中書起請兩禁及禮官集議臺諫官章疏俱未䝉施行雖有權罷指揮終未得了絶議論紛紛中外愈惑宰相前請如是必難復有開陳人言不已誠有累於聖躬解天下之疑者莫若發睿斷特以手詔自中而下追封濮安懿王大國諸夫人禮典稱是仍於郊禮前了畢慰厭人心於體為順奏皆留中不行誨前奏以六月二十九日丁邜上後二奏不得其時今並附六月末司馬光又言聖人舉事與衆同欲故能下恊人心上順天意洪範曰三人占從二人言葢國有大疑則決之於衆自上世而然矣伏見郷者詔羣臣議濮安懿王合行典禮翰林學士王珪等二十餘人皆以為冝准先朝封贈期親尊屬故事凡兩次會議無一人異辭所以言者盖欲奉濮王以禮輔陛下以義也而政府之意獨欲尊濮王為皇考巧餙辭說誤惑聖聼不顧先王之大典蔑棄天下之公議使宗室䟽屬皆已受封贈而崇奉濮王之禮至今獨未施行此衆所以拂欝而未為稱惬者也或恐陛下未能知二議是非臣更請為陛下别白言之政府言儀禮令文五服年月敕皆云為人後者為其父母即出繼之子於所生皆稱父母臣按禮法必須指事立文使人曉解今欲言為人後者為其父母之服若不謂之父母不知如何立文此乃政府欺罔天下之人謂其皆不識文理也又言漢宣帝光武皆稱其父為皇考臣案宣帝承昭帝之後以孫繼祖故尊其父為皇考而不敢尊其祖為皇祖者以其與昭帝昭穆同故也光武起布衣誅王莾親冐矢石以得天下名為中興其實創業雖自立七廟猶非太過况但稱皇考其謙損甚矣今陛下親為仁宗之子以承大業傳曰國無二君家無二尊若復尊濮王為皇考則置仁宗於何地乎政府前以二帝不加尊號於其祖以為法則可矣若謂皇考之名亦可施於今日則事恐不侔設使仁宗尚御天下濮王亦萬福當是之時命陛下為皇子則不知謂濮王為父為伯若先帝在則稱伯没則稱父臣計陛下必不為此行也以此言之濮王當稱皇伯又何疑矣今舉朝之臣自非挾姦佞之心欲附會政府誤惑陛下者皆知濮王稱皇考為不可則衆志所欲亦可知矣陛下何不試察羣臣之情羣臣誰不知濮王於陛下為天性至親若希㫖迎合不顧禮義過有尊崇豈不于身有利而無患乎所以區區執此議者但不欲陛下失四海之心受萬世之譏爾以此觀之羣臣之忠佞邪正甚易見矣願陛下上稽古典下順衆志以禮崇奉濮安懿王如珪等所議此亦和天人之一事也秋七月壬戍詔以冬至有事於南郊樞宻使户部尚書同平章事富弼累上章以疾求罷至二十餘上固欲留之不可癸亥罷為鎮海節度使同平章事判河陽案宋史稱判楊州進封鄭國公亦即此時初除僕射及使相弼八上章乞以本官出守且言僕射是正二品官師長百寮使相者文武中並是第一等俸禄臣因病退反有此授固不敢當真宗以前惜此官禄未常輕有除拜仁宗冲㓜即位不曾檢詳祖宗故事兼當時執政者徇私亦欲自為地遂開此例終仁宗一朝罷相罷樞宻使者皆除使相其間最為不可者數人並以不稱職及過惡彰露臺諫官互有彈劾本合得罪黜削而亦皆除使相領大藩人情非常不允臣其時正在中書以仁宗暮召學士次日宣制無由進説陛下臨御以來未曽除人可從今以去一一謹惜若此等爵禄泛泛者容易付與别或有大賢才或有立功立事之人陛下更何以爵禄旌賞之使相以上只有三師三公其品秩雖崇而俸禄甚少比使相絶然不侔也願立法自臣始不從弼止乞罷使相或僕射一官詔許罷僕射而改制焉弼将行又言臣禀性愚直生平未常敢作分毫過惡事先帝盡忠盡誠亦曾面折同列先帝雖知臣一心為國不避人怨怒然而同列非常不喜矣其不喜者乃使門下鷹犬之人撰造是非於先帝前傾臣今陛下侍從臣僚中亦有謗臣者不少臣事陛下如事先帝盡心無隱惟道是從陛下已盡見臣表裏常䝉保全臣今乍離陛下左右仰恃聖睿斷無所憂惟是讒謗尚恐未免萬一有之只乞聖慈察其所謗之語道理如何若臣别無非道非理即望陛下始終保庇使全首領假如臣因今所患便就死滅亦須九泉之下陰有所報臣感戀之外更竭此心伏惟聖明俯賜矜照寧海留後李端愿為武康節度使知相州上未親政端愿求對言陛下當躬攬乾綱以係人心不冝退託失天下望又上書敷陳懇切太后既撤簾端愿稱目疾求謝事乃命以旄鉞出鎮乙丑右僕射兼門下侍郎平章事韓琦為郊大禮使翰林學士諫議大夫王珪為禮儀使給事中權御史中丞賈黯為鹵簿使翰林學士給事中范鎮為儀仗使端明殿學士戸部侍郎權知開封府韓絳為橋道頓逓使既而賈黯言故事當以中丞領儀仗天聖二年用中丞薛奎領鹵簿而翰林學士晏殊領儀仗葢誤也乃詔黯與鎮對易使名丙寅詔曰事有先後故制有隆殺禮有重輕故用有豐約凡郊廟所以奉天地祖宗者冝如故事若乗輿服御之費其務減省徳寧公主出降其資送減康國長公主三之一丙子放宫人百八十人戊寅觀文殿大學士尚書左丞賈昌朝卒幸其宅奠之輟視朝兩日贈司空兼侍中謚曰文元御篆墓碑曰大儒元老之碑昌朝在侍從為名臣及執政不為善人所與或以為結宫人宦官數為諫官御史所攻張方平留唐詢詢譛吳育世皆以為昌朝指也己邜羣臣上尊號曰體乾膺厯文武睿孝皇帝詔答不允庚辰淮南節度使兼侍中文彦博為樞宻使初彦博自河南入見上謂曰朕在此位公之力也彦博對曰陛下登儲纂極乃先帝聖意與皇太后協賛之功臣何與焉上曰備聞始議公於朕葢有恩者彦博遜避不敢當上曰暫煩西行即召還矣彦博行未至永興亟有是命又遣中使促之至永興才數日也樞宻使吏部侍郎張昪罷為彰信節度使同平章事判許州昪乆在病告求罷凡七上章乃得請先是韓琦曾公亮欲遷歐陽修為樞宻使将進擬不以告修修覺其意謂兩人曰今天子諒陰母后垂簾而二三大臣自相位置何以示天下兩人服其言遽止及張昪去位上遂欲用修修又力辭不拜此據蘇轍神道碑辛巳權三司使龍圖閣學士工部侍郎吕公弼為樞宻副使公弼上言諫官御史耳目之官比來言事罕見采用非所以逹四聰也陛下當以政事責成大臣而委視聼於臺諫非其人則黜之如此則言路通而視聼廣矣端明殿學士兼翰林侍讀學士户部侍郎權知開封府韓絳權三司使絳初以群牧使召未至改命京尹浹日又遷詳省絳在成都凡再嵗始張詠以劵給貧民令春糴米秋糴鹽嵗乆劵皆轉入富室絳削除舊籍召貧民别予劵且令三嵗視貧富輒易之豪人不得逞蜀與夷接邊人伐木境上數侵爭因下令禁伐木又以兵守蠶崖間絶畨部往來就威茂交易異時内侍使蜀給酒場吏主貿賣聼使倍取以資費絳奏請加禁約上敕内侍省著為令每行必申戒焉及使三司又請以川陜四路田榖輸常平倉而隨其事任道里差次給直以平物價上歎曰衆方姑息卿能獨不狥時耶詔行之内諸司吏有干恩澤者絳執不可上曰朕初不知當為卿改而干者不已絳執益堅因為上言即有飛語願得究治上曰朕在藩邸頗聞有司以國事為人情卿所守固善其毋憚讒宫中所用財費悉以合同慿由取之絳請有例者悉付有司於是三司始得會計知制誥沈遘為龍圖閣直學士權知開封府遘為人輕俊明敏通逹世務前知杭州令行禁止人有貧不能𦵏者及女子孤無以嫁者以公使錢𦵏嫁數百人倡優飬良家女為已子者奪歸其父母接遇士大夫多得其歡心部吏憸險之徒尤樂傾心盡為之耳目刺閭巷間事纎悉即知故事至立斷衆莫不駭伏小民有犯情稍不善不問法輕重斷訖強刺為卒刺者數百人屏息不敢犯鞠真卿提㸃刑獄欲案其事方移州詰問遘恐悉弛所刺卒給以公據復為民會遘召還真卿亦罷去事遂寝議者以其嚴比孫沔然沔雖苛暴鋭於懲惡至遘善人亦懼焉案史稱遘為人疎雋博逹明于吏治而沔則以滛縱無檢為言官所糾與此所載似異其治開封如治杭晨起視事及午事畢出與賓舊往還從容談笑以示有餘士大夫交稱其能以為且大用矣逾月加龍圖閣學士逾年遷翰林學士尋以母䘮去位遽卒遘遷翰林學士在三年九月卒在四年九月金并書壬午三班差使殿侍崔公度為和州防禦推官充國子監直學公度髙郵人常為故相劉沆所知薦茂才異等科辭疾不赴甫任右職非所好益閉户讀書歐陽修得公度所為感山賦以示韓琦琦言公度守道甚篤文章雄竒贍逸故有是命公度以母老力請留侍從之
