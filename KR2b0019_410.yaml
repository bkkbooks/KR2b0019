body:
  text: 續資治通鑑長編卷四百六宋李燾撰哲宗元祐二年冬十月庚辰觀稻于後苑朝散郎致仕劉宗傑落致仕為比部郎中當考其故壬午以會聖宫奉安神宗皇帝神御不視朝甲申直龍圗閣知桂州苖時中為寶文閣待制再任內侍押班梁惟簡領嘉州刺史樞密院言環慶路將兵與夏人戰俘獲老幼婦女令范純粹選留仍揭榜諭其親故以舊掠漢人對易其引導者賞以絹三匹十嵗以下二匹從之純粹言準詔令臣指揮將驅獲到生口分于近裏安存收養無致枉有死損走透及便問姓名并在賊中住坐去處除年老知得夏國次第并山川道路或精力稍強可留備訪問之人其餘並具姓名于界首分明出榜曉示賊中親戚故舊如能將前後打虜漢人却來出漢交換今來獲到生口即仰子細辨認如委無姦詐即一名許對換一名並令先計會沿邊巡捉人并弓箭手熟户引致赴官其引致并展轉傳致之人每引接到一名共支賞絹三匹仍逐旋具換易人數聞奏臣看詳今降朝旨欲以驅獲西界生口交換漢界陷賊之人雖為善計若施之于講和罷兵之時則名體俱順無所不可緣夏國方爾悖慢興師盜邊在朝廷宜明示棄絶戒諸路邊臣整兵聽命或間出竒兵使其應敵不暇或擾彼農事使其地不得耕穫或反間用權或旁行招納必使彼衆勞厭人意動搖則其凶酋必便改轍然後邊釁可期于止息也若于此時便議將生口與之交換即恐體勢不重有害事機兼訪問得西界凡是捉虜到漢界人生口並一一赴衙頭呈納多是于近裏去處監防羈管今來本路所獲老小人口止是橫山一帶人户縱有逐家骨肉丁壯願遵朝命亦何緣于近裏取得羈管之人前來交易以此推之恐徒有輕動必無實利其所獲生口臣前此已等第安排內續有丁壯歸降識認者各已分付團聚並令有力量蕃官保認在手下監防住坐其無丁壯識認者各已召蕃部情願權行收養仍取責交認知在文字置籍抄記以待續來識認之人庶邊羌聞臣恩信爾後易為招納其丁壯之人無家户老小不可保信者各已分配近裏州軍牢城去訖所有本路出榜告示西人交換一節臣愚未敢施行欲望朝廷察臣今奏事理候它日邊事了日然後施行貼黃訪聞漢人之陷賊者中間監防稍緩後因朝廷議論欲以新復城寨與之換易彼遂謂為竒貨往往遷徙益逺監防益密臣以此竊謂今來所議交換未宜輕發伏望朝廷詳察純粹此奏以十月十八日未知從違何如當考實録以樞密院降到指揮係初六日純粹奏乃云初七日今從實録知懷州賈易責知廣德軍易既罷諫職翰林學士蘇軾中書舍人蘇轍皆乞補外詔不許于是轍言易謝表皆自謂以忠直獲罪而指言羣臣讒邪罔極朋黨滔天上下不交忠良沮喪至引周易履霜堅氷不早辨之言以為戒欲使朝廷原心定罪便行誅戮其間有云蘇轍持密命以告人志在朋邪而害正臣非臺諌凡易所言不敢條析論奏惟有言臣一節理當辨明易雖頃為諫官今出守郡于條不當復以風聞言事其言臣以密命告人伏乞朝廷取問實狀如所言有實臣甘俟朝典于是御史交章論易人才庸下猥蒙朝廷不次拔擢以為諫官當推公正之心夙夜以思補報而易惟諂事程頥默受教戒頥指氣使若驅家奴頥于人物小有愛憎易乃抗章為之毁譽附下罔上背公死黨據其罪狀合賜嚴誅朝廷尚以易在言路為之優容愛惜事體資序極淺與之懷州易不能內愧于心易志改行公肆無根之謗上纍朝廷意欲盜敢言之名以欺中外姦憸之迹欲蓋彌彰伏望早賜指揮降黜以懲朋黨之風詔賈易已罷言職不合更于謝上表內指名論事故有是責元祐邸報十月十六日載此言章今依舊録附此舊録云御史交章論易謝表文過按此時胡宗愈為中丞王覿為侍御史豐稷為殿中趙挺之方蒙趙㞦為監察不知言者為誰按六月二十八日注則御史或是方蒙也交章當考蘇轍奏并增入轍奏必不付出要合存之臣僚上言伏覩今年八月六日聖旨吏部户部刑部三部郎官任滿委本曹尚書侍郎保明治狀顯著可久任者特與再任臣以為此法于人情不協在士論不然也何則郎官之設雖以副二尚書侍郎而朝廷選任非輕自昔號為清要比有屢更轉運使副提點刑獄知藩郡而後授者凡尚書侍郎補外止于牧守郎官之出多為監司則按治有以相及而位望不至絶逺故方其在省也有副二之名而無統攝之實綱條得以參舉論議得以自持也然僚佐之于長官希合而茍從者常多忤犯而不屈者蓋鮮今著之于法治狀必待保明則人以不得保明為患矣其權在長官則以不得意于長官為慊矣長官亦以去留在我褒黜得専而自居則郎位益以卑頽茍非特立不羣必將詭隨容悅之不暇又奚暇綱條之舉論議之持哉國朝之制郡守雖貴官不得薦通判以為許薦之則勢將獨在于守而倅之職有所不得行此蓋可以類推今諸路管庫場務丞簿掾屬之儔有勞績則必待轉運使知州保明乃統按部下小吏之法恐非先朝所以命臺郎之意也尚書省居觀闕之下凡奉職者治有能否才有優劣朝廷可以坐照執政可以目覩豈待長官保任而後知之故有害而無補臣請將保明郎官之法廢罷不行貼黃稱郎官已自朝廷揀擢既成任又治狀顯著則必有褒進乃合公議若猶待尚書侍郎保明方令依舊再任則委不近于人情法有差舛宜在改正詔今年八月六日指揮更不施行元祐邸報十月十八日今依實録附此實録云罷吏户刑部長二保明郎官治狀初文彥博建明朝廷從其請為之定令而諫官論其非是遂罷之今具載言章但不知諌官姓名當考時胡宗愈為中丞王覿為侍御豐稷為殿院趙挺之方蒙趙㞦三人為察官孔文仲為左諫議大夫韓川為左司諫丁隲為右正言臣寮上言伏覩陛下即位以來數降赦令減放民間夏秋二稅積欠及坊場敗闕課利及公人元非侵欺盜用失陷之類所在州縣觀望監司意旨不肯依準赦令直行放免多為人吏隱藏元案公行邀乞或十止放其二三或已放息錢而本錢尚在或已多納過息錢不與通計作本錢勾銷或雖有曉示明言除放而官司託以未經磨算留滯日月或虛稱己申省寺而未有與奪或坊場敗闕廬舍器用已無存在而猶監錮老弱追償未已或送納齊足而不給還本鈔有窮苦失業之民救飢寒不暇復為官司拘繫督迫略無生意其實為諸路監司不推原朝廷仁厚之政惟恐年計不足有妨進用州縣官吏又牽制因循上下蒙蔽以至於此竊以二聖臨御愛恤生靈蠲除逋負而敢爾抑遏閉塞使朝廷有惠澤之名而其實未逮於天下恐非二聖所以為惻恤慘怛之意也臣愚欲乞下御史臺先取諸路監司保明事狀委無未盡案驗乃體訪民間欠負未經行遣及雖已行遣而未盡者乞付吏議重行黜責庶以慰逺方無告之民天下幸甚詔令諸路及府界監司限一月疾速依敕結絶仍具保明聞奏元祐邸報二年十月六日事當考言者姓名乙酉詔于闐國嵗遣貢使雖多止一加别賜裁定詣景靈宫恭謝朝謁儀令大卿監侍御史以上陪祠六月二十七日丁未更定儀注一嵗乃遍詣諸殿翰林學士兼侍讀蘇軾言臣近者竊見劉舜卿賀表具言鄂特凌古罪狀又竊聞舜卿奏乞削鄂特凌古官爵續又聞鄂特凌古上章請命議者或欲許其自新以臣愚慮二者之説皆未為得何者鄂特凌古凶狡反覆必無革面洗心之理今聞其女已嫁梁葉普之子度其久逺必須協力致死共為邊患今來上章請命蓋是部族新破衆叛親離恐吾乘勝致討力未能支故匿情忍詬以就大事若得休息數年蓄力養鋭假吾爵命以威脅諸羌誅不附己者羽翼既成西北相應必為中原之憂非獨一方之病也且夏賊逆天犯順本因輕料朝廷以為必不能討已今若便從鄂特凌古之請則其所料良不為過西蕃小醜朝為叛逆暮許通和則夏國之請理無不許二寇滔天自若欲戰欲和無不可者則西方之憂無時而止矣然遂從舜卿之請削奪官爵即須發兵深入致討彼新喪大首領舉國戒懼我師深入茍無他竒恐難以得志臣愚以為當使邊將發厚幣遣辨士以離其腹心壞其羽翼今聞溫錫沁等諸族已為所質勢未能動而森摩乾展在其肘腋迹同而心異若用臣前計使邊臣與果莊約若能使其部族與溫錫沁森摩乾展等合而討鄂特凌古納趙醇忠即許以生還此正所謂以蠻夷攻蠻夷計無出此者若朝廷便許鄂特凌古通和即須推示赤心待之如舊不復用計謀以圗此賊數年之後必自飛揚此所謂養虎自貽患者也故臣願朝廷既不納其通和之請又不削奪其官爵存而弗論置之度外隂使邊臣以計圗之似為得䇿臣屢瀆天聽罪當誅死丙戌詔罷雍州守臣兼將以路分兵官兼之其知賓橫州悉以武臣若有邊警遣令照應其通判聽舉京朝官知縣資序以上人充奉議郎通判宜州黃陶換授莊宅副使充廣南西路都監兼知賔州朝請郎何琬為工部郎中自府界提刑除郎中丁亥臣寮上言竊見朝廷自開邊以來罰罪不明賞功太濫不求其實秪信其言故上下得以相蒙逺近習為欺誑每出師略有微功則多增虜獲之數至有殺戮老稚無辜以充首級身未入行陳而買首論功官軍或有敗傷百不言其一二此風寖長十有餘年大將明知略無詰難以致朝廷金帛妄施於選懦之士官爵猥加于無知之人夫保明軍中功罪朝廷取信以行賞罰者大將也大將詐偽不以實聞朝廷默默受其欺誑如此曠日持久欲望賞罰皆當以服三軍之心使之赴功集事威制夷狄豈不殆哉今諸路奏功臣恐將吏狃習故態妄冒欺誑以虛為實以少為多以罪為功致朝廷推恩太濫并及無功却致有功將吏無所激勸有罪之人無所畏懼欲望朝廷嚴降指揮下諸路安撫司子細根究據實結罪保明不容鹵莽仍令本路監司覺察虛實責御史臺常切採訪彈奏稍有不實重行降黜庶軍中賞罰無有不當諸將不敢欺誑軍士有所勸沮朝廷無枉濫之費詔劄與陜西河東逐路經略司依詳上件臣寮所奏應將士言功並先責元統領官根究詣實結罪保明供申候到帥司仰更切加考驗如委無妄濫即本司再具結罪保明聞奏并劄與逐路轉運司提刑司常切覺察如有妄冒仰具實封聞奏考驗是實其元保明官司當議重行降黜并劄與御史臺令採訪彈奏此元祐邸報十月九日事當考言者姓名增入河北都轉運使顧臨等奏昨準朝旨勘會河北自河決以來至今未見開修的確利害令與水官講畫合興修去處及所用工料保明聞奏續準朝旨以講議河事所為名近因都水使者王孝先奏將講議河事所與提舉修河所并以都大提舉修河司為名竊聞舊例須是已有興修去處始立提舉修河司總領其事今來方候河水減落見行港勢所向較量利害申陳顯見難以預置興修司局既將講議河事所併為都大提舉修河司又却復分講議與修河兩項行遣不惟名實異同深慮文移交互欲乞將應緣講議河事行遣並依元降朝旨以講議河事所為名候議定合行開修去處奏聞及依故事朝廷差官覆實委得允當許令興工即復為都大提舉修河司詔依所奏候議河事興工即復為都大提舉修河司元祐邸報十月初九日事要見修河議論當刪取之二月八日并四月二十六日詔當考戊子恭謝于景靈宫天興等諸殿己丑于熙文諸殿庚寅于凝祥池中太一宫集禧醴泉觀辛卯德音降西京管內死罪囚杖以下釋之耆老年八十以上者人給酒食茶絹常加存恤為奉安神宗御容禮畢故也丙申詔新厯勿頒夏國以乾順謝封册及賀坤成節使未至故也詔于闐國使以表章至則間嵗聽一入貢餘令於熙秦州貿易己亥西南龍張蕃遣人入貢先是給事中趙君錫奏駮葉祖洽廷試䇿語訕宗廟祖洽既罷新除禮部郎中復為兵部郎中八月二十二日既而御史趙挺之方蒙相繼言君錫所駮極為未允今取祖洽印本試䇿尋究並無譏訕之言不知君錫何以見其譏訕也伏望令君錫具祖洽譏訕之言下近臣參定以明枉直庶使䇿試之士謀議之臣悉心不回毋憚後害祖洽亦上章自辨詔翰林學士中書舍人諫議大夫同共參定於是蘇軾蘇轍劉攽等言竊謂先帝親䇿貢士本欲令人人盡言無所回忌士之論事欲究極始末其語或及祖宗事有是非議難隱諱但當考其所言當否以為進退不可一一指為謗訕取到葉祖洽所試䇿卷子看詳其略云祖宗以來至于今紀綱法度茍簡因循而不舉者誠不為少又云與忠智豪傑之臣合謀而鼎新之臣等以為祖宗撥亂反正承平百年紀綱法度最為明備縱使時異事變理合小有損益亦不當謂之因循茍簡便欲朝廷與大臣合謀而鼎新之詳此顯是祖洽學術淺暗議論乖謬若謂之譏訕宗廟則亦不可挺之等又言凡在朝廷大臣率多當時考試之官祖洽信有此語安敢擢在第一軾因獨奏祖洽及第時臣軾係編排官據初考官吕惠卿等定祖洽為第三等中合在甲科覆考官宋敏求等定祖洽為第五等中合是黜落臣曾具事由聞奏乞行黜落兼據祖洽元試䇿卷子云祖宗以來至于今紀綱法度茍簡因循而不舉者誠不為少今祖洽上章自辨却減落上件言語只云祖宗以來至于今紀綱制度比之前古亦有因循未舉之處顯見祖洽心知茍簡之語為不可故行減落初詔學士舍人與諫議大夫參定而孔文仲不聨書軾等别具奏章言祖洽希合時政躐取科級據其用心不得為無罪挺之蒙等議遂寢孔文仲别狀奏陳必極言祖洽罪狀故挺之蒙所奏不行惜乎舊録不能具載而新録遂削去也文仲舊傳稱吕公著謂文仲為蘇軾所誘脅論事皆用軾意蓋本此新録雖已辨其誣然殊不詳舊録于君錫傳載祖洽事又云蓋先帝初以䇿試多士俾陳當世之務將因時適宜更張流弊而祖洽所對當上意擢居第一至是更二十年君錫等乃追咎其言協力擠之新録獨置而弗辨信是疏略矣庚子詔祕書丞二年除祕閣校理莊宅使种誼為西上閣門使領康州刺史供備庫副使傅遵道為西京左藏庫副使宫苑使彭保為皇城使領茂州刺史宫苑使韋萬為西京左藏庫使皇城使階州防禦使帶御器械權本路鈐轄李詳為宣政使落帶御器械充正鈐轄左藏庫副使馬用誠為左藏庫使蕃官西上閣門使階州防禦使包順為四方館使皇城使登州防禦使包誠為東上閣門使人賜銀絹各五百皇城使通州防禦使趙醇忠為西上閣門使東上閣門使果州防禦使姚兕為四方館使皇城使王光世領威州刺史供備庫副使楊和減磨勘一年宫苑使王文振領嘉州刺史皇城使開州團練使王瞻轉一資皇城使秦貴領昌州刺史皇城使楊進領忠州刺史西上閣門使雄州防禦使李忠傑為東上閣門使餘第賞有差自誼至醇忠以收復洮州俘獲果莊而自兕至忠傑以討羌賊有功故也范純仁言臣竊見賞功舊格其間亦有未盡未便合行修正者皆須隨事便行改正然後不誤陛下信賞之意若或且循舊例却候將來别改條格則于陛下臨御之初將臣方立功效之際賞典或有不均必致人情失望惰其鬬志後來雖有改更衆未必信已于邊事有損追之莫及伏望指揮三省樞密院應今來推賞舊格中有人情未便者即且據事改令均當行下仍一面將舊格别行修正庶幾不誤聖政邊事早了近環慶路有臣弟純粹論列舊例用别將作家計人數均在出戰將領名下一處計分釐論賞不便事理分明兼臣在環慶時已曾奏乞改革伏望聖慈指揮三省樞密院早賜施行范純粹奏論均賞家計人或可刪修增入詔裁定軍功賞格詔京師置場糶官倉米以平市價癸卯尚書左丞劉摯言臣備位左右憂深責重雖夙夜盡瘁終恐無所補報竊以為國家先務莫如人才近臣事君惟有進善臣伏見知陳州傅堯俞知齊州王巖叟知潞州梁燾通判虢州張舜民知廣德軍賈易皆早蒙陛下識擢分任言責不幸志業未伸謗嫉橫作罷職補外各已數月按堯俞等皆忠直之臣守正不撓在職未久知無不言此固陛下素所奬愛必未棄捐然臣私憂過計恐其補外漸久朝廷漸亦忘之不避僭越輒效一言夫人才不同所為亦異或長于政事或善于文學或言語侍從或行義師表今多士盈庭于此數色固無乏事至于公忠朴直不避仇怨不附朋黨一節自守可當大事肯為國家效死守法之人則非獨今日難求也從前世以來不易得也譬如人之身耳目手足肌膚爪髮闕一不可然而四肢者必以骨為主故自古人君崇奬忠直謂之骨鯁之臣傳曰山有猛獸藜藿為之不採言猛獸在山則山中之物無敢犯者如直臣立朝則姦佞有所憚畏也今堯俞等皆有骨鯁之大節公論所重邪黨所畏况當陛下明辨忠邪汲汲進賢之日而反使數人流落外郡為姦邪所使臣實痛惜兼觀近日言路稍異于昔雖章奏交上論議不少然而所推薦者非豪強則親舊所排擊者非孤寒則怨隙朋比之心公無忌憚陛下試取近來言者章疏密察其意其間心出于至誠言出于忠信憂國如飢渴謀議知大體有如堯俞者乎孤立不懼彈劾權強赤心事上略無私意有如巖叟者乎守正堅確不憚大吏不黨同列嫉邪指惡有如舜民燾及易者乎以此驗之真偽立見今聖明在上方修善政而羣小不快爭進於下布列朋黨造作謗議欲以傾陷善良動搖政令紛紛籍籍甚可懼也然上下相罔誰為陛下辨之者當此之時惟且收聚人才使在朝廷若正直之路廣則邪枉之志銷而治道成矣臣疏賤拙直無毫髮親黨之助猶蒙二聖選拔致位於此恩至厚矣則報效之心豈宜比衆人故當知無不言敢避罪禍臣願聖慈深賜省察特發睿斷召此數忠正之臣入備任使以慰公議以消姦黨天下幸甚貼黃吕公著等亦曽同議此數人皆與臣意無異但以未測聖意所以未便奏陳臣故密獻此言若候因臣僚進擬而後召之即不若特降中旨付之三省庶使恩命出于陛下又貼黃或未欲一并召還堯俞巖叟舜民三人本乞外任不是責降願先次指揮或未欲指定差遣即且召赴闕聽候指揮亦無不可並乞聖意裁度又貼黃堯俞巖叟因纍章乞留舜民朝廷不用其言遂乞外任即無罪犯燾因面責給事中張問不能封駁舜民文字遂責降中外皆言燾實無罪却曽上言乞罷禮部所議車服事為權要所怒遂有此責舜民因論邊事偶言及大臣遂罷臺諫乞外任亦非犯罪即今邊事次第一一如舜民所言則是識慮過人雖有罪尚當假借况無罪乎賈易極論朋黨事甚有本末不避仇怨為國家分别是非人臣所難既授外任又因謝表再説及前事遂為怨者所排再責逺小處又貼黃臣願陛下將此數人責降外任因依及從來論事章疏首末觀之察其趣向所在則事理自見無可疑者若臣一言稍近不實甘被誅戮又貼黃臣與堯俞燾巖叟布衣相識備知其所存決可保其不負朝廷任使舜民易舊不識之但聞其操守公正士大夫間稱道者十有八九惟是邪人惡之甲辰泉州增置市舶從户部尚書李常請也常本傳云請復舒鄂諸州錢冶與泉州市舶泉州市舶已見餘當考丙午寶文閣待制李之純為寶文閣直學士知成都府左司員外郎朱光庭為太常少卿光庭舊傳云遷太常少卿右正言丁隲論光庭昔為小官曲奉權要推行法令又極殘苛黨附程頥傾敗善類奉使河北邀求名譽並邊州郡儲蓄一空言雖不行士論快之新録並削去右司郎中韓宗道為太府卿承議郎直龍圗閣張汝賢為左司郎中陜西轉運使范子竒提舉崇福宫前華州司户參軍廖正一為正字正一除館職不必書要附見蘇軾發䇿為楊康國趙挺之王覿所論十二月二十四日二十八日三年正月十九日可考資政殿學士王安禮提舉崇福宫言官論其託疾辭逺而安禮亦自請奉祠故有是命太常少卿范純禮為江淮等路發運使以御史論純禮以廕得官不可任奉常也此據舊録及新録蘇轍作誥詞乃云純禮自乞補外吕公著家傳亦云孫升論純禮别在五年八月為給事時熙河蘭會路勾當公事宣德郎軍器監丞遊師雄為奉議郎充陜西轉運判官賜緋章服龍神衛四廂都指揮使髙州刺史知熙州劉舜卿為團練使充馬軍都虞候旌其議邊事之勞也詔果莊易檻車護送大理寺劾治以聞引見凖辟囚例押入殿初議欲留果莊在邊范純仁言臣近日親聞宣諭欲留果莊在邊以招其子臣等奏對不若且令到京再蒙德音三省樞密院且更商量止果莊於沿路所到處别聽指揮臣有管見已曽録與文彥博以下看詳亦合上瀆聖聰且畫一條具如左一朝廷獲罪人若畏其子弟之強防其讎嫌而不誅則典刑廢矣如梁葉普之輩假設獲之若有強子弟則亦將豢養矣若止欲存果莊而招其子則有逐件利害一若存果莊以招其子必曰我父之存由我輩在我若往則父子俱死如此固無束身歸朝之理若使復統部族效力伸報則果莊常宜存在忽然死亡則適足為其怨叛之資却貽後日之患一果莊本非君長止緣誘殺景思立而覆其軍干犯先朝罪大而告于裕陵設若留之有用尚恐不快神明之怒今留之無益則告陵之典乃是虛行一果莊今已七十餘嵗設使可繫其子之心亦無多日况更囚處異鄉憂愁寂寞其死朝夕可待既死之後其子必却歸怨朝廷雖諭以善終亦必不信兼是向罪人之子解紛深損朝廷威重若任其疑怪則彼必曰既誤我降而殺我父則將怨叛有名一存果莊若不稍使寬足則必無聊而死若使之寬足則戰士當星霜矢石之苦皆有不如之歎一果莊自先朝以來前後殺害中國兵將蕃漢人民為數極多死者寃憤莫伸其家孤寡窮獨之人恨不臠食其肉今得朝廷生獲日望藁街之戮以快存沒之寃而今乃存養供飼過于有功之人徒使激憤幽明有傷和氣一朝廷賞功雖不繫果莊存歿然用命死戰之人見朝廷將其所獲怒而誅之則其心喜快若釋而養之則其心憤鬱今大寇未平尤當體察將士之情一果莊之獲本由熙河蕃將怨其害已故對遊師雄憤怨請行今既冒死獲之使其不得甘心亦恐惰其鬬志一交址方欲妄起事端若果莊戮于京師則四方易得傳聞交人亦得寢謀兼使其他外國尊畏中國一鄂特凌古見令置木沁來求果莊俟得然後納貢若存果莊在邊不惟鄂特凌古以不如所請遷延為名未肯納貢兼其詞已曰果莊在中外一般若今留之在邊厚加奉養恤其羸瘠則正符鄂特凌古之言彼將市恩于果莊之子何暇復感朝廷哉一誅果莊則上可伸先帝之怒其次可正朝廷之法使外國知畏又其次可雪踏白南川之讎增戰士之勇快神人之憤又可使鄂特凌古知朝廷果于誅惡不敢侮慢邀求早為納貢此一舉而數利從之也于是果莊始赴獄九月末蘇軾奏可考初議西邊事近臣多進計請盡還以侵地吕公著及吕大防獨持不可及果莊就擒西賊退却或又言果莊宜優命以官置之秦鳳或言遂放歸以責其來效又言熙河克捷涇原守禦之功皆不足賞公著曰果莊為邊患二十年先帝欲生致之而不可得今二聖待以不死其恩固已厚矣尚何官之有况可放乎疆埸之功雖不可過賞然有勞不報何以使人上皆納用焉此據吕公著家傳或附十二月十二日丁未范祖禹乞于邇英閣復張挂仁宗時王洙蔡襄所書無逸孝經圖從之
