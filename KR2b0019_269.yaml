body:
  text: 續資治通鑑長編卷二百六十五宋李燾撰神宗熙寧八年六月辛卯朔上批聞淮南旱甚其令轉運司委州軍長吏禱名山靈祠賜河北西路轉運司錢二十萬緡以判官李稷言本路放稅多闕諸軍廪給故也詔駙馬都尉王詵罰銅三十斤坐嘗因事至睦親宅見趙世居交語雖會降特罰之癸巳太子中允館閣校勘權監察御史裏行徐禧為集賢校理檢正中書禮房公事提舉絳隰州義勇保甲禧先與范百祿爭李士寧妖妄熒惑事詔曽孝寬張琥鞫實未竟而禧遷權發遣熙河經略使髙遵裕言洮州既未修築及置官吏其新附之衆亦冝略有統制使之漸習漢法詔以崇儀副使趙醇忠為洮州漢蕃鈐轄免出巡皇城使包順為青唐一帶并岷洮等州蕃部都巡檢使岷州青唐巡檢陳義方弓箭手巡檢董行謙兼洮州蕃部巡檢並同管勾蕃部以洮州有馬蕃勇敢岷州并和川寨弓箭手各二百人益以蕃落兵合五百人𨽻醇忠義方行謙即岷州置廨舍嵗使公用錢千緡以備犒設內藏庫言楚濠州運絹三千匹實本庫嵗納之數三司乃乞寄納於左藏庫乞詔三司遵守條制毋下諸庫寄納上批係內庫路分上供錢帛三司毋得别作名目移寄致虧年額甲午命著作佐郎翁仲通措置淮浙鹽事詔翰林醫官使副使並五年一磨勘醫官副使以上舊無磨勘法副使遇推恩即改正使至是立法以資遷東班諸司使副使仍舊兼醫官使副使其副使遷至軍器庫副使乃遷醫官使法寺言三班借職南世景坐監主自盜無官犯罪有官事發以贖論詔世景勒停展三期敘自今比類樞密院取旨戊戍龍圖閣待制同羣牧使兼同判軍器監曽孝寬罷軍器監孝寬乞解官侍養詔免羣牧司而孝寬願領羣牧司故從其請尋詔孝寬仍權發遣軍器監候沈括還日罷權發遣軍器監據御集乃十一月事賜都水監丞司度僧牒二百市掃岸物料己亥提舉崇福宫兵部員外郎直昭文館傅堯俞落職追一官勒停坐知徐州日不受朱唐告李逢謀逆狀法寺當絞以失減及去官會赦特絀之辛丑都官員外郎劉師旦言今九域圖自大中祥符六年修定至今六十餘年州縣有廢置名號有改易等第有升降兼所載古迹有出於俚俗不經者乞選有地理學者重修三館祕閣刪定其後又專命太常博士集賢校理趙彥若獲嘉縣令館閣校勘曽肇刪定仍就祕閣不置局彥若免刪定從之及以舊書不繪地形難以稱圖更賜名曰九域志詔宗室大將軍遷至遙郡刺史以上更不遷環衛官故事宗室磨勘遷遙郡刺史以上不遷環衛官覃恩則并遷三資熙寧中修磨勘法并遷環衛一資蓋有司之誤至是正之壬寅永興軍路安撫使羅拯言昨任發運使計置金銀錢絹總百八十五萬緡乞令奏計發運使催督部押上亰從之甲辰開封府言趙居之子孫并其乳母等衣服損壞舍屋踈漏每須上聞乞自今止從本府下所屬應副從之乙巳福建路轉運使言請如通判福州方蓁議開本路溪灘從之仍詔以寬剩役錢給其費韓縝奏乞面陳利害上謂王安石曰縝但要入京耳必無甚利害安石曰恐有親見利害須靣陳上曰縝前因北使來便云敵必生事後有何事縝喜張皇妄説耳丙午詔判都水監李立之丞王令圖主簿李黼勾當公事陳祐甫各罰銅二十斤立之出知陜州前判監衛尉少卿知陜州宋昌言汴口官都官郎中王珫都官員外郎顔處恭西京左藏庫副使劉文應各降一官改昌言知丹州並坐閉訾家口不當也王安石初議汴口官及昌言為一等當奪一官立之等罪止贖銅上欲罷立之都水與郡王圭又言昌言専受指相度罰冝更重安石曰珫言昌言明與人言執政意必欲閉珫屢爭弗得上曰既如此不奏乃依違何名守官安石曰此所以與昌言同罰然昌言誠宜更重乃奪昌言陜州而使立之代之閏四月乙未可參照都水監言汴蔡兩河可就丁字河置閘通漕從之時有詔糴京西米赴河北封樁患蔡河舟運不能逹河北故水官侯叔獻劉璯建議汴蔡兩河間有丁字河可因其故道鑿隄置閘引汴水入蔡河以通舟運河成可漕河渠志八年詔京西運米于河北于是侯叔獻建請因故道鑿隄置閘引汴水入于蔡河以通舟運河成可漕朱本增入今因之元豐六年二月二十七日可考詔增河南府超化寺嵗度僧二人賜紫衣一人以上批寺乃釋迦佛舍利所在於畿內最為靈迹近兩禱雨即隨獲嘉應聞嵗止度僧一人頗闕人修奉故也丁未同修經義吕升卿言周禮詩義已奏尚書有王雱所進義乞更不刪改從之時升卿輒刪改安石雱詩義安石雱皆不悅故升卿有是言然亦不能解也此據墨本九月十二日所書朱本削去今移入此九月十二日所書更詳之賜趙思忠熙河兩州地五十頃內賜其妻包氏并裕囉勒齊各五頃初思忠乞管勾熙河蕃部包氏乞安鄊城開酒場經略司以為不可故以地豫之七年十二月四日可考王安石得疾上遣醫視之不令受事例安石曰白上乞令受上曰朕已支賜不須爾安石固請上曰少與之勿多也上因留安石諭以吕惠卿甚怪卿不為升卿辨事言卿前為人所誣極力為卿辨今臣為人所誣卿無一言朕説與極為卿兄弟解釋又疑小人陷害朕問是誰乃云在側似疑練亨甫深疑練亨甫何也安石曰亨甫臣所不保然惠卿兄弟無故沮抑亨甫臣勸之勿如此恐反為其所害亨甫陷害惠卿臣所不知然亨甫實未見其闕而惠卿兄弟多方疾惡之實為過當大抵惠卿兄弟好逆料人將為姦上曰亨甫實機警此必有小人交鬭其間小人須斥去不然害及國事安石曰不知誰為小人上曰必曽旻也安石曰陛下何以疑其然上曰料其必如此修經義了即與在外差遣安石曰曽旻材能以人望亦可以作檢正臣向説與惠卿未欲如此過疑者恐衆惡所集必纍及惠卿耳上又曰惠卿自許太過言望卿來戮力時事却屢稱病不治事積事以委臣臣恐將來致傾敗臣預其責又言練亨甫以臣兄弟少貧賤更事識小人情狀故尤忌疾臣兄弟言卿不能知小人情偽故亨甫利卿在位曽旻檢討在七年五月七日戊申中書言近詔運米百萬石往澶州北京計道路糜費不少請嵗給米鹽錢鈔在京粳米總六十萬貫石付都提舉市易司貿易度民田入多寡豫給錢物至收成時令於澶州北京及緣邊州軍入米粟麥封樁候有偹遇物價貴聽糴便司權住入中借兊支用須嵗豐補還其市易司所糴如價髙令以漸計置從之先是上令中書勘會運米費錢若干中書進呈約三十七萬貫上怪其多曰向曽比較那得費如許王安石曰此乃約數然亦必不少俟更比較實數進呈安石因言俵糴事以為非特嵗漕百萬石比今法可省六七十萬貫錢又可榷河北入中價河北大河無事諸河又已循道所出地及淤田至多即嵗增出斛斗不少既遇斛斗貴住糴即百姓米無所糶自然價減是雖有任糴之名而實須有物可糴府界淤田嵗須增出數百萬石民食有限物價須嵗加賤俵糴轉之河北非惟實邊亦免傷農上以為然吕惠卿日録八年九月十六日進呈罷運米令市易俵放文字余曰元初只見在京八十價糴了米司農寺以一百價賒糴了米又東南八十價折斛即是不得八十價米又以二十文致到河北不過一百文糴一斗六七分粟米不為貴然本欲以外來物去河北令官中有偹則和糴價可減不為商賈所操安石欲以粟米易之固甚善然綱船兵梢也不易許多時安排得成次第且待糴得粟米後換粳米也不妨是他須要直罷了亦不奈何然因換得粟米後便説道轉變得息錢一百萬總是亂道除以粟米易粳為異外等是從外處搬物由黃河到河北其餘百般變轉得利只是市易司買賣干他運米甚事才與商量便惡發安石去後是他所立底法為愛護如此只是恐他來不得聞朝班中有曹號呼臣為護法善神是他到來措置過事須要改盡只如市易事吳安持怎盡會得只見韓絳馮京要壞此事臣計算到約有一百三十萬貫息故每起請須要他看過行得方教入遂貼貼地沒人語言自吕嘉問到來説並措置得不是道是無他不得臣見安石來便不能管得而今也又有一百一十餘萬息錢其餘措置若無本末臣怎敢做臣亦量臣力尋常事開陳得官家一時會盡方始奉行見得安石奏事陛下有沉吟中間安石便自道了你既如此須是無心始得然其他不曽見别有事只是臣靣上如此許多年相知厮共做了許多事下梢却恁地按此事即八年九月二十六日惠卿云安石欲罷河東運米而行市易俵放之法惠卿以為非便者也初令運米河北乃六月十八日事不知安石罷此却行市易俵放之法的係何時今附注此更俆考之三司使章惇言河北京東鹽院失陷官錢甚多諸路𣙜鹽獨河北京東不𣙜官失嵗課其數不資乞差官同王子淵詣海場并出産小鹽州縣與當職官吏并兩路轉運司相度利害以聞從之子淵時為何官當考明年八月河北鹽法乃復舊子淵或為糴便當檢明年八月一日上批河北鹽法可速依舊朱本移入此今從墨本仍附本日要之實録載此事兩俱疏略更須考詳按元祐元年閏二月吕陶言熙寧八年章惇任三司使起請乞京東河北榷鹽其奏狀乃曰河北陜西並為邊防今陜西𣙜鹽而河北獨不𣙜此祖宗一時誤恩也有旨依惇所乞召京東提舉鹽事周革入議委陳朴王子淵相度文彥博奏罷之蘇軾與文彥博書載章惇言政如吕陶言軾因説彥博令奏罷𣙜鹽如陶所言則是彥博果奏罷𣙜鹽也慶厯六年十一月張方平對語可參照沈括自志云括權發遣三司使事市易司欲嵗輸三司鈔三十萬緡以請河北京東兩路鹽稅欲自𣙜賣括以為太祖常降墨敕河北無得禁鹽慶厯中又欲官收其利仁宗復詔罷之至今刻詔於北京望宸閣祖宗之戒猶在耳而背之不可其後京東轉運司竟用其説齊魯之間大騷而主司以罪去按括八年十月十二日權發遣三司事實代章惇惇先有𣙜議既不行不知市易司何時復有此議當考十九日惇又議𣙜河東紹聖曽布云云食貨志第五卷河北舊禁鹽建隆四年頗通商開寶三年乃悉罷𣙜熙寧八年三司使章惇言𣙜鹽獨不行於河北京東官失鹽課不資請遣吏偕河北糴便官詣海場及煮小鹽州縣與當職官兩路轉運司度利害從之所謂小鹽偽鹽也於是詔提舉河北京東鹽稅革入議明年手詔三司河北鹽法可如舊庶商人不致疑惑虧損課額都提舉市易司言漢州積滯茶至千五百七十七馱不和雇步乘乞選官體量詔遣都官郎中劉佐維州團練推官都水監勾當公事杜常往究利害以聞王安石初欲遣佐以韓絳所惡乃乞用常既而上令佐與常同往詔緣北邊寨鋪使臣所管界至退縮并故縱人出入者劾罪不以去官赦降原減界至退縮者并統轄官以聞上謂王安石曰河北邊事自蕭禧去後便緩安石曰事要當不在急若措置雖急却不當但害事何補邊計上曰分將事乃日朘月削人見如此即更懈怠又言將下教閲事安石曰向時立教閲法若能推行信賞必罰即雖兵不在將下何緣不精上曰責人須令可以免責如要揀兵員老弱却不由鈐轄都監鈐轄都監空被責何補安石曰自來揀兵員須是監司知州及兵官若不如法自監司以下嚴責降即孰敢滅裂且責降既嚴即上下自須力爭豈肯茍順監司知州而已今専令將官自揀將官亦只是自來知州之類為之不知為知州則茍簡為將官則懇惻是何理也若為將官責重則自可移於知州且人材一般若令三四人連職則容有一人奉法若人材未可知而専任一人其或茍簡誰復明其修舉者安石因言前歲所修教閲賞罰至今尚未施行何故上言修未了故未施行上又言民兵亦未了安石曰邊路民兵易教不同府界略教尚已可用即邊路不愁教習不成緩則緩教急則急教不愁不為用也上又言近歲費用橫多誠為不易將來但恐難為供億安石曰誠如此前歲所修教閲賞罰當考己酉分命輔臣禱雨命同管勾外都水監丞程昉權知都水監丞劉璯提舉開廣沙河初昉璯言王供掃下有沙河故迹可開廣取黃河水灌之轉入枯河下合御河即黃河隄置斗門啓閉其利有五王供乃向著掃免河勢變移别開口地一也漕舟出汴對過沙河免大河風濤之患二也沙河分水一支入御河大河漲溢沙河自有節限三也御河漲溢有斗門啓閉無衝注填淤之憂四也德博舟運免數百里大河之險五也開河用工五十六萬七千四百九十三請發卒萬人役一月可成從其請而有是命文彥傳有劄子論列附九年十月末七年七月九日又八年九月五日七日又九年八月二十九日又十月末又十二月癸未朔又十年五月二十日庚午詔令式所修定宗室祿令不成文理未得頒行送詳定一司敇令所重定以聞於是刪定官魏沂罰銅十斤送審官東院詳定官沈括特釋罪中書言詩書周禮義欲以副本送國子監鏤板頒行從之詔諸州法司當直司司理院推司州院専差勘事司吏委提舉司相度隨宜立定人數法司毋過三人當直推勘司毋過四人月給食料錢雖多毋過十二千法司習學毋過兩人食料錢毋過五千以裁減役人廢罷耆戶長壯丁等錢充度事務繁簡增損人數依轉運司吏行倉法初止行於江寧府至是司農寺請行之諸州又為立稽違差失許法司紏舉賞罰法自事務繁處為始詔邉民典賣地與北界論如私相交易律皆配黃河南本城許人告畝賞錢十千所典賣地勒犯人家或地鄰贖歸犯人家財不足官為借給已有北人居者官司婉順發遣其典買北人地者錢不追地不得耕兩地供輸與全屬南人典賣地者立法有差先是邊民以地與敵交易久則疆畔不明往往生事慶厯中賈昌朝嘗為約束後屢申明不能禁止至是又著為法三司使章惇言河東永利兩監鹽歲課舊額二十五萬餘緡自許商人入中糧草增饒給鈔支鹽商人得鈔千錢才售四五百縣官暗失錢數鋪戶獲利不資又私鹽不禁歲課日減今才十萬四千餘緡若計糧草虛估官才得錢五萬餘緡視舊虧十之八今若依解鹽例募商人入錢請買或官自鬻仍嚴禁私販歲課必大增羡緣邊糧草却用見錢糴買詔河東轉運使范子竒趙子幾相度詳具條約以聞十八日議𣙜河北京東今又及河東食貨志載惇言與實録同但稍文耳今不别出九朝通略子竒雍孫也李承之言河東路奏舉教閲保甲巡檢若係監當止乞支與監當請受王安石曰恐合與添支上曰善然陳恕惜起支定例亦良是數雖少積之乃衆近歲或已有請受又攀例求驛劵如髙居簡已請皇城司添支及出又攀例求驛劵竟不曽與如吳圭在外久然亦不曽與驛劵安石曰凡奏舉官勾當事須藉材而勾當出入須至陪費盤纒不如安居守本職事若使材者勞苦在外而費用反不如不才者安逸而無費則孰肯就奏舉今如髙居簡皇城司厚俸不支驛劵可也然其在外勞苦比只在皇城司安坐之人則有差雖與驛劵不為過如吳圭俸薄又自近歲內小臣出入人人畏謹奉法無敢受賂遺者若勞而不恤亦恐非聖政之善又如河東巡檢既是選舉又有教閲保甲之責又在陸行枯橋路分若更不依諸路請得添支即孰肯就奏舉者且用財省費當大計乘除今以民兵代兵士弓手所省已多即於巡檢請受至少不足愛惜也辛亥吏部尚書平章事昭文館大學士王安石加左僕射兼門下侍郎右諫議大夫參知政事吕惠卿加給事中右正言天章閣待制王雱加龍圖閣直學士太子中允館閣校勘吕升卿直集賢院並以修詩書周禮義解畢推恩也安石辭曰雱前以進書自太子中允崇政殿説書除右正言天章閣待制既病不復預經局事今更有此授極為無名上曰特除雱待制誠以詢事考言雱宜在侍從不為修書也今所除乃録其修經義之勞褒賢賞功事各有施不須辭也惠卿亦辭給事中上曰卿於經義必多起發兼修書改官自有舊例是日中使促安石等令後殿告謝云上坐候乃入見辭所遷官上謂安石曰卿修經義與修他書不類又非特以卿修經義有勞也乃欲以卿道德倡導天下士大夫故有此拜不足辭也後雱又辭所遷職上欲終命之惠卿以為雱引疾避寵宜聽故從之由是王吕之怨益深朱史謂惠卿之語並無照據遂刪去改云雱辭遷職上欲終命之而安石亦堅辭故寢其命今從墨史九月十二日惠卿云臣亦當奪官可考東頭供奉官董中令以捕獲李逢遷一官壬子河東轉運司言祁洺盜李昌等前後四十九發潞州指揮使披帶班殿侍崔全應募率宣毅兵李慶等斬獲首級詔授全三班借職三班差使餘遷資有差詔五服年月敇嫡孫為祖注增入嫡子死無衆子然後嫡孫承重即嫡孫傳襲封爵者雖有衆子猶承重先是同知太常禮院李清臣言五服年月敇嫡孫為祖注謂承重者為曽祖髙祖後者亦如之又祖為嫡孫注云有嫡子則無嫡孫又封爵令公侯伯子男皆子孫承嫡者傳襲若無嫡子及有罪疾立嫡孫無嫡孫以次立嫡子同母弟無母弟立庶子無庶子立嫡孫同母弟無母弟立庶孫曽孫以下凖此究尋禮令之意明是嫡子先死而祖亡以嫡孫承重則禮先庶叔不繫諸叔存亡其嫡孫自當服三年之服而衆子亦服為父之服若無嫡孫為祖承重則須依封爵令嫡孫逺近以次推之且傳爵承重義當一體禮令明白固無所疑而五服年月敕不立庶孫承重本條故四方士民尚疑為祖承重之服或不及上稟朝廷多致差誤欲乞祖亡無嫡孫承重者依封爵令傳襲條餘子孫各服本服如此則明示天下人知禮制祖得繼傳統緒不絶聖王之澤也下禮院請如清臣議既而中書言古者封建國邑而立宗子故周禮適子死雖有諸子猶令適孫傳重所以一本統明尊卑之義也至於商禮則適子死立衆子無衆子然後立孫今既不立宗子又不常封建國邑則嫡孫喪祖不宜純用周禮故有是詔詔淮南兩浙江南荆湖路轉運司具旱災州軍以聞上謂王安石曰沈括奏契丹地界事似已説得了當不知實如此否彼或更不遣泛使來安石曰契丹固宜無他既見朝廷許再遣泛使無所憚則必不再遣也此據日録二十二日事括以五月二十五日至北庭六月五日起離住十一日括初至雄州敵遮境不納責地不已數火邊候以示必舉留雄州二十餘日蕭禧還乃納使人括草遺奏付其兄雄州安撫副使披其大意言臣不還敵必傾國為冦敵之器甲材武皆不逮中國所恃者惟衆而習勞苦不持糧制敵之術惟聚兵定武合西山之衆以守磁趙黎陽河狹而岸近折箠可濟當分澶魏之甲以塞白馬之津懷衛堅壁以塞洞道敵不得而西必出中路以趨河橋則決齊賈原武天臺齊賈皆河掃名見元豐五年九月丁酉以灌之雖百萬可使之為魚矣唐河出於西山以囊壅之待其師還決囊以斷其軍鎮定之師尾其復可蓬卷而覆也括至敵庭敵遣南宰相楊益戒就括議括得地訟之籍數十於樞密院使吏屬皆誦之至是益戒有所問顧吏屬誦所得之籍益戒不能對退而講尋他日復會則又以籍對之益戒曰數里之地不忍終於絶好孰利括應之曰國之賴者義也故師直為壯曲為老往歲北師薄我澶淵河潰我先君章聖皇帝不以師徇而柔以大盟慶厯之初始有鴻和爾之訟慶厯元年十二月庚辰侵耕蘇直等地當考我先皇帝仁宗於是有樓板之戍樓板之戍當考武經邊防代州崞縣有樓板塞西至欣州雲內寨二十里北至契丹界以至於今今皇帝君有四海數里之瘠何足以介國論所顧者祖宗之命二國之好也今北朝利尺寸之土棄先君之大信以威用其民此遺直於我朝非我朝之不利也凡六會敵人環而聽者千輩知不可奪遂捨鴻和爾而以天池請括曰括受命鴻和爾不知其他得其成以還通略云將至境而燕之民皆弛備反耕矣後此據沈括自志附此月壬子二十二日録當考日三月二十六日戊午括始受命韓縝云云已附注彼當并考沈括自有乙卯入國奏請并别録載使事甚詳今輒取其間辨論地界處具注括自志下其緊要亦不出括自志也恐嵗久不復見括别録故且存之前二假已具注八年三月二十九日并閏四月五日入國别録云閏四月十九日離新城縣五月二十三日至永安山逺亭子館伴使林牙始平軍節度使耶律夀副使樞密直學士右諫議大夫梁穎二十五日入見二十七日入帳前赴燕二十九日就館賜燕差樞密副使楊益戒押宴酒二行益戒令人傳語有聖旨請立臣括等尋離坐於帳前與益戒夀頴等對立益戒云奉聖旨昨來蔚應朔三州地界公事朝廷兩遣使人詣南朝理辨今來蔚應兩州已是了當只有朔州一處未了終是難停往復未委卿等昨離南朝日有何意旨了絶臣括等曰河東地界並已了當只差括等來回謝益戒云只是蔚應兩州已了朔州地分俱未了絶臣括答云括等只是差來回謝此等公事不敢預聞益戒云今來係是聖旨宣問侍讀館使須合應報臣括答曰此事雖不是本職不敢預聞既是承準宣命有所知者不敢不對昨來理辨三州地界但北朝稍有照證處盡已劈撥與北朝如鴻和爾大山天池子各是照據分明難議應副益戒及館伴梁頴皆言鴻和爾大山自來係北朝地土臣括答云不委北朝有何文字照證頴云南朝有何照證臣括答云南朝收得北朝照證甚多亦有十年前照證亦有今年照證亦有州縣照證亦有聖旨照證且説最先北朝重熙十一年北朝差教練使王守源副巡檢張永勾印官曹文秀南朝差陽武寨都監翟殿直崞縣令教義練使吳岊同行定奪以鴻和爾大山腳下為界自後順軍纍有公牒皆稱鴻和爾大山腳下為界豈不分白頴云此只是定奪蘇直聶再友地界即非兩朝地界兩朝地界自在近南分水嶺為界臣括答云當時先為蘇直聶再友侵耕過南朝地分纍經理辨康定二年南朝聖旨豈可以瑣細民務輕聞朝廷以兩朝和好事重更不理會只仰以蘇直聶再友所耕地外卓立埄堆永逺為界北朝所以差上件官吏同行定奪若是北朝腹內百姓大地土何煩南朝聖旨及兩朝差官今若言所定鴻和爾山腳只是蘇直聶再友地界既不是兩朝地界不委以南鄰著何人田土頴等無語臣評言昨來北朝國書并白劄子內理會事目如瓦窑塢李福蠻水峪義兒馬鋪及三小鋪西陘一帶等處南朝雖有文字照驗分白但以交驗賊蹤或捉送逃走軍人各依長連城六畨嶺關子口鋪並是兩朝為界去處照證界限并鴈門胡谷寨以東數寨不經治平年發遣鋪分朝廷已不論有無照自證及更不理會並應副北朝事理已盡其鴻和爾大山有元定界至腳下為界文字其天池又有順義軍開泰五年牒稱係寧化軍地分照驗分白今來更有甚商量頴又云南朝照驗文字在河東時見劉少卿等將出數件照驗亦是難為案據故為拖延臣評答云學士們在河東時只爭間事幾時曽理會地界頴又云天池地分自屬北界顯然若天池神堂不屬北界因何却是北界行牒修葺臣評答曰既屬北界因何却是南朝修葺臣括又云南朝廟宇自是順義軍越界橫管譬如代州若牒朔州云鄯陽縣廨宇損漏請疾速修葺便也可以奪得鄯陽縣也頴云鄯陽縣廨宇損干代州甚事因何牒得朔州修葺有何義理臣括答曰南朝天池廟損干朔州甚事因何牒得寧化軍修葺自有順義軍橫管豈可便為憑據頴云今來蔚應朔三州地分內蔚應州地界已了只是朔州地分界至未了侍讀館使因何便言回謝臣評答云北朝理會數字理有可否可者已從劈撥否者難便商量怎生不回謝臣括又云兩朝通和七八十年使人一往一來自是常禮地界公事括等豈敢預聞適為聖旨宣問使人已據確實理道開陳更有何商量頴又云康定二年未定界至已前以何處為界臣括不答云以六畨嶺為界頴云本是鴻和爾大山分水為界委南朝却以六畨嶺為界有何文字照證臣括答云若要南朝照證文字却晒有不委北朝以分水嶺為界以何文字照證頴云此中文字更不少侍讀且將出南朝照證文字來看臣括云但請將出北朝照證文字頴等無語臣評云自來是長連城六番嶺為界頴云有甚照證臣評答云自來長連城六畨嶺一帶關子口鋪便是南北分界去處前係北朝州縣交驗賊蹤送還逃走軍人文牒晒多便是界至去處今來南朝雖有此等文牒照驗分白為只是因事該指鋪分界至不是特指定屬南屬北文字今本朝更不論有無照據已依白劄子內處所劈撥應副北朝了當鴻和爾専有兩朝差官立定界至文字及有順義軍纍次公牒並特指説鴻和爾大山腳下為界天池又有開泰五年順義軍牒特指説係屬寧化軍地分並是北朝文字理道分白怎生改移頴又云西陘一帶地分亦有未了自第一第二第三第四第五逺探白草鋪分割因甚自北以西便挑下分水嶺却向平川中指古長城為界臣括答云此處便是分水嶺不向此中為界更向何處為界頴云此處豈是分水嶺分水嶺自轉向南下去白草鋪望古長城只是平川何處有嶺子臣括答曰莫是學士不曽見彼處地形鎮著分水嶺因何却喚作平川兼此分水嶺以南盡是南界鋪寨及弓箭手鋪子止殺向南更怎生去得頴曰雖有鋪子總是南界侵過分水嶺北蓋却自合拆移豈得却將鋪子為硬界臣括答云此許多鋪子自是在分水嶺南北朝素知兼有北朝聖旨照證怎生不是硬界頴云聖旨道甚臣括云蕭林牙賫來聖旨劄子內稱南朝侵過分水嶺以北蓋却小鋪子三座并義兒馬鋪皆合拆移近南於分水嶺南修蓋因何不説道土磴石趺地分侵過分水嶺蓋却鋪子并義兒馬鋪頴云土磴石趺鋪子不少劄子內不成便説得許多鋪子臣括答云若實是侵過分水嶺北即須著説有甚説不得自是不干著分更水嶺後不説著更何煩理會今且説鴻和爾大山北朝有何照據括自注云北界涿州纍牒並理會西陘地界未了今頴如此爭辨臣括以此言答之頴知理屈自此後更不曾言著鴻和爾大山天池子頴云東西一帶盡合以分水嶺為界因何鴻和爾大山不以分水嶺為界臣括答云東西一帶盡以分水嶺為界有何文字照據頴云照有南朝州軍行過來文字照據臣括云只是胡谷寨以東有文字尚也憑未得干鴻和爾大山甚事頴云既是一處照得以分水嶺為界即東西盡合以分水嶺為界臣括答云若是一處以分水嶺為據盡要以分水嶺為界即西至岢嵐軍東至澶順盡合以分水嶺為界也如此怎去得頴云因何説得澶順有何道理臣括答云既云東西盡合以分水嶺為界即須如此學士元來也知去不得裏臣評隨云侍讀只是設喻頴又云天池子有何照證臣括答云有開泰五年順義軍牒地理屬寧化軍只此照證最是分白其餘晒有文字更不須言頴云只是緊執宅這箇文字臣括云這箇文字不執更執甚文字頴云這箇只是州縣一時錯誤行遣當時官吏若在必不輕恕臣括答云但沒便宜底文字便總道錯誤即休怎生使得頴云既是南朝地界因何乙室王及北界一百部族在彼住坐放馬半年有餘無人發遣臣括云既是順義軍有公文認下是南界地分便住坐五百年亦是北人不合來侵入南界地分住坐臣評曰邊上地界接連去處平時無事兩朝人往來樵採放牧又有何不可豈為時暫住坐便來侵占為自已田地臣括又云譬如民家去别人地內居住一世兩世若執出契書亦須奪却住坐半年豈足為憑南朝只是守執北朝文字乃是實據當時縱不發遣自是北人不合侵越後來又折却鋪立却十八箇烽堆七箇鋪子豈是不經發遣相次有一人裹拳腳幞頭自近前助説臣評認是昨來蕭禧隨行都管髙思裕臣評却云且容侍讀評與樞密給事館伴林牙學士説話不銷得你攙説且退思裕即陳退後臣括又云如鴻和爾大山天池子不惟有向來所逐次照據兼蕭扈吳湛國信來時有北朝聖旨為今來已指立烽臺標竿開撅壕塹興功建立鋪寨即且依舊北朝百姓也且教依舊各更不侵占豈不分白頴云此是蕭扈吳湛傳聖旨已行謫降了也此文字怎生使得臣括云此是北朝聖旨學士因何却言使不得頴云此是蕭扈吳湛錯認聖旨已行遣了臣括云順義軍牒即云州縣錯誤文字不經朝廷處分待不使今來朝旨又言是錯何故錯得許多今後更有照證文字只學士道錯了不成便休也更理會箇甚括等自是回謝亦難為與學士爭口舌臣括更無言稍退立頴又却云昨來北朝理會五處地界三處了當若只有此二處事體至小因何却不理會了當不知此二處元是與不是理會數臣括答云天池子元不是理會數括自注云望頴回答即引耶律榮來時劄子內落下天池子一節答之頴却不問兼蕭林牙賫來劄子內亦只指著鴻和爾大山腳下為界頴沉吟思慮次臣括隨聲曰莫又待道錯賴又多説詞理大率並無照據益戒數目頴令罷臣括待其語定曰學士更説千般道理也不濟事須是要的確文字南朝並無許多言語鴻和爾大山只八箇字曰鴻和爾大山腳下為界天池子只六箇字曰地理屬寧化軍此外非某所知更無可議論臣括又退後立益戒云今來聖旨所問如何回奏臣括答云但告樞密給事回奏括等來時只是回謝别無聖旨今來商議公事若是地界劈撥為因依適來已具咨聞本朝只是守得鴻和爾大山腳下界及地里屬寧化軍兩句確的照據益戒遂顧夀頴如此且休遂相揖就座再座酒二行益戒又云兩朝和好事重侍讀館使早與了絶却好臣括對云有何不了絶南朝道理適來已曽咨聞自餘非括敢預頴猶持昏賴之意復申前説臣括對云兩朝和好七八十年曠古未有昨來入界見兩朝萬里農桑人民富庶此是兩朝祖宗盛德鴻美豈可以邊界小事有傷和好大體蓋是理難應副非是占却益戒云兩朝和好生靈受賜侍讀館使須體朝廷意早與了當却庶免往復臣評對云繼好息民生靈受賜誠如樞密給事之説臣括云只為南朝照驗分白難為應副兼事亦不由使人臣評云這些土地得失不繫兩朝損益頴云北朝晒有照驗文字為侍讀館使堅言只是回謝不肯商量料得咨呈亦不濟事屬臣括云南朝只是守得鴻和爾大山腳下為界及地理寧化軍餘外非括所知亦不煩相示頴又云只如赤埿膠假家堡也晒有事未了在重熙十二年百姓石廷直理會疆界赤埿膠近南晒有地里在只是侍讀館使不未肯商量未欲咨開益戒云且做鴻和爾大山腳下為界委東西石廷直等地上合如何臣括答云若是援引石界廷直所爭地土文字即是已定却鴻和爾大山腳下為東西地土自有照證括自注云重熙十二年順義軍曽山牒代州理會石廷直地土一牒內云須指定鴻和爾大腳下為界其意欲先認殺鴻和爾大山腳下為界却要一直向東包占古長城以南地土南北三十餘里東西晒長臣括所以稱即是已定却鴻和爾大山腳下為界其東靣地土自有買馬城及古長城止殺臣括所以言自别有照據益戒等曉會不再言頴覺理屈却急言鴻和爾大山須是分水嶺為界且論赤埿膠假家堡臣括更不答酒六行起謝恩畢展狀與益戒相别見六月一日赴橫燕次馬上夀等謂臣括曰侍讀備録示南朝聖旨已繳申樞密院也六月一日橫燕酒二行押宴耶律暈令髙思裕傳語云皇帝差楊副樞傳宣臣括臣評各起立帳前良久楊益戒來云皇帝傳宣今日樞密院中書同進呈卿等來南朝聖旨除續有回文外其間節次行遣並先已聞逹即無不聞逹事其蕭禧不肯朝辭只為公事未了須至在彼商量了當所有蕭禧倚柱立不肯下階一節待與問當此外有鴻和爾大山天池于未了當卿等必須帶得南朝聖旨來商量這起若不了當必是不絶往復臣括臣評答云謹審聖旨南朝只欲聞逹恐臣括臣評蒙蔽所諭蕭禧倚柱一節待與問當深見聖意敦重和好事體候括等到南朝一一聞逹臣評對云上承聖諭足見敦尚和好之體然自見行問當蕭禧已上一節宣諭評等當一一歸奏南朝其鴻和爾天池北朝言未了公事使人雖聞即不敢歸奏益戒云到底來是不肯商量便是也不知除此外南朝皇帝更有何意旨臣評對曰若得本朝指揮來商議豈敢不商議頴又云蔚應朔三州土地兩州已了惟有朔州地分鴻和爾天池未了况的是當朝久來地分今來須要了當臣評云奈何南朝所執照據的確甚是分白但恐北朝邊臣生事邈功上惑朝廷未已樞密給事北朝執政大臣請試思南北兩朝通好七八十年兄弟叔姪情契如此不知這件小事消與不消如此計校益戒云事小則固是也臣評又云乞樞密附奏皇帝此北界議論是兩朝皇帝家國事或恐內外臣僚為已興議論却不敢自罷止更望皇帝自奮英斷早指揮了絶則好益戒云此事並是出聖意頴云却道是公事不出聖意便是也臣評對云評意道恐羣臣議論不決更乞特出自聖斷也幾時不出聖意來方説話次當便捉一兩字來評執使人於理不可頴云莫館使錯臣評云評不錯是學士錯頴云這些公事晒小臣評又云既言事小到這裡也好了當也益戒云地界未了侍讀館使必須别帶得南朝聖旨來此起須要了當今是聖旨宣問不可隱藏况前來文字盡言差來審行商議兼令將帶照證文字來北朝理辨必須帶得照據文字來臣括答云南朝元差審行商議後來改作回謝纍有公文關報北朝照據文字元曽承受得後來改回謝後朝廷却盡取去也今來只是回謝益戒又云侍讀館使雖用回謝離南朝後北朝再有牒去言關鴻和爾大山等處地界未了且令使人審行商議恐到推故不肯商量文字到後南朝别有指揮臣括答云都不知北朝再冇文字到雄州後續領得本朝聖旨內坐却據雄州奏到北朝涿州牒却欲令括等審行商議後面奉聖旨沈括等元只是回謝已起發前去訖難為更令商議并劄下雄州令牒涿州聞逹不知曽見此文字否益戒云也見括云此便是聖旨也更有何隱藏况兩朝通和南朝臣僚到北朝便與北朝臣僚一般豈敢對爾聖旨不實兼地界已是了公事真不須如此理會鴻和大山天池子照據是分白又是已一一開陳訖今來使人更豈敢預聞他事押宴耶律暈令髙思裕云天池子自來伊實王在彼下帳若是南朝地土何故伊實王在彼住坐臣括答云南朝地界文字分白自是伊實王不當過界住坐兼有其照據豈可不據文字只據口也暈又曰文字是在前伊實王下悵在後今合用前來照證不知合用後來照證臣括答云若要在後照證則本朝修蓋鋪屋又在後若以在前為據即本朝所執文字在前兩頭總是南朝有道理更何須議論頴又云且容問天池神堂到了是北朝地土是南朝地土臣括答曰是南朝地土學士何故不知頴云既是南朝地土因甚却要北朝行牒修葺臣評答云昨日已曽咨聞既是北朝地土因甚却牒南朝修葺頴又云如吳湛所傳聖旨已是失錯一行上下皆已行遣了也豈可便作憑據臣括答云北朝自行遣了蕭扈吳湛括怎生得知只是據得聖旨况上項聖旨至今已是多少年嵗如今却旋道是錯莫行不得益戒云些小公事北朝只是早要了當只為南朝未肯了當臣括答云南朝為早要了當所以劈撥許多地土更有甚未了益戒又云侍讀館使也合要早了臣括答云通和美事普天率土皆要早了何獨使人事理分白自是北朝稱是未了繫在北朝使人只陳説得道理了與未了括豈敢知益戒云誠是侍讀怎與奪得他朝廷事只恐别曽帶得聖旨來臣括答云實别無聖旨暈及頴只是重疊言前來曲説臣括云此等言語纍曽示及皆無憑據本朝只據得文字别無商量益戒頴同言今來聖旨只是恐侍讀館使别帶得事來侍讀館使只是回謝别無聖旨便是也只如此回奏如何臣括答云只是如此梁頴猶紛紜未已臣括遂退立揖益戒益戒亦揖而退臣等遂各就座此時酬答往來約一時辰語言重疊更不備載大意止如此酒二行頴又云北朝甚有照證文字但侍讀不肯商量更不敢奉呈臣括已知頴别無文字此乃迤邐之詞答云學士如此言必是别有文字且請牢收取酒罷馬上頴又言鴻和爾大山事詞語極多臣初並不曽答直候頴言語稍間乃謂之曰不須如此繁説若有好文字只消一句學士凡腳説鴻和爾大山都不肯説著腳字恁奈何文字上總有字前來順義軍牒雖曽暗落下腳字後來纍經理會今年蕭林牙來時劄子上已却認了也學士必應知之假如除却腳字也無妨只如重熙十二年七月十八日順無義軍牒內稱六畨嶺直南至鴻和爾大山四十里此處腳字試請六畨嶺直南打量四十里看到得鴻和爾大山甚處又云假家堡西南至鴻和爾大山三十里亦無腳字亦請打量看到甚處假令去却腳字只將地里打量也只打量得山腳下何况元更有腳字括更記得似蕭林牙持來劄子理會南側北側是如何學士因何却不説著頴云此是樓板雲內兩寨接界處照證這底且休且未理會此中更别有照據在遂别説道理臣括急鞭止之曰且請休别説且靖理會了樓板雲內寨界至著劄子內言樓板寨西南至鴻和爾大山南側為界不知樓板寨西南甚處得鴻和爾大山莫却在東北上無學士更且子細勘會這箇是北朝自攀引底照證文字劄子內引側張慶文字云樓板寨西南至雲內寨以鴻和爾大山南為界鴻和爾大山乃在樓板寨東北頴已知劄子內所引失證故前後並不肯説著此一節臣括提問頴頴自知理屈但多方回避不肯當頴云此項待别有咨聞這裏别有照證裏臣括遂笑之曰學士許多時在河東理辨地界却被蕭林牙了當却學士須著且恁爭辨不成總無言也學士河東時好與了却如今已被蕭林牙了當却學士才待去這兩假田地上做工夫莫後時也頴云是何頴却是爭功也臣括又云學士北朝名臣括在南朝久聞盛名今日事正好禆贊朝廷早了却好頴惟稱謝然言語重復不已臣括答曰括醉也不及一一奉言且望不怪適值渡一小澗子臣括與耶律夀先遏頴未過間臣括䇿馬先行頴更説話不得頴却笑顧臣評曰侍讀只是揀便宜處説沒便宜處便推醉也直至悵前馬上相揖遂散此時言語往還馬行約十餘里方分散蔚初二日射弓次頴又顧臣評云昨日所説地界公事臣應二州已了只是朔州地分鴻和爾天池如何了絶評云此雖是小事亦無可商議但北朝皇帝指揮了絶即便了絶也頴又云天池子既是南朝地土自來口鋪在甚處因甚直至蘇鈐轄時方始移鋪子向北下安置臣括答云自家地內近北取便拆移有何不可頴云自家地內蓋鋪子因甚却領許多軍兵何用臣括答云當時有無軍兵括不知若實曽領軍兵前去必是怕北界非理約欄將官到極邊便將引軍兵亦是常事臣評云自家地內掘壕塹有何不可既是掘壕蓋鋪須得人功不知當時是引軍兵差人夫來緣當時是部領人夫怎生今日便指作軍兵惡模樣頴又云云不已臣括答曰此來括等奉命回謝本是傳逹兩朝歡好以禮會聚不成却與學士鬪頰舌也但請詳取文字不煩如此頴又云鴻和爾大山元只是定奪蘇直地界侍讀今却要作兩朝地界恁地怎生教憑文字臣括答云文字指定鴻和爾大山腳下為界尚不憑用更憑用甚文字頴云纍曾奉聞元定奪蘇直聶再友地土文字云北至張家莊若當初是定奪兩朝地界何故却聲説北至如此顯只是定奪聶再友田土豈得指作兩朝地界臣括答云且得學士記得元文字分白待子細説與學士若説著北至字却是南朝晒有道理且得學士自記容括咨聞元是定奪文字稱東至買馬城南至鴻和爾大山腳為界西至焦家寨北至當界張家莊四至內因甚只北至獨有當界二字既只是北面至却當界即東面南面西面不是南朝更是何人地土頴云侍讀道是蘇直田土北面方是北朝地分便是也恁地有何文字照據臣括云括不恁道其四至地內是康定二年南朝剖與蘇直地土北面是北界舊界東面南面西面並是南朝見今界至頴云有何文字照據臣括云更要甚文字頴云本朝自有照據未欲一一咨聞臣括云此是兩朝正行定奪底文字只恐更有别文字也只改移這箇不得四日就館夜筵酒數行頴顧夀又説起鴻和爾天池天顧臣評云館使侍讀莫須與他商量了臣評云只為不奉朝旨商量怎生敢到此商量學士纍歷必亦曉得又云天池除開泰五年後更有甚照據臣評云有臣評因顧臣括臣括答云更晒有文字只是此數箇文字分白的確更不須别文字也至如天池子太平四年二月十二日牒於天池子西北過橫嶺子批却簽子木一株其簽木南至南界約三里如此文字晒多但一件文字可用後其餘更何必援引頴審聽之便向坐旁與髙思裕畨語數句如有共記之意臣評又云南朝照據晒有今且略陳所記耳頴又顧臣評曰前來侍讀説道鴻和爾大山天池子曽有北朝國信使帶過聖旨去定了界至怎生道不知國信使是誰頴忘了也試言看臣括答曰是蕭扈吳湛纍曽共學士理會何故得忘了頴云蕭扈吳湛帶去聖旨不知是有文字為復只是口説蕭扈吳湛來時只是口説卒無文字梁頴前來理會時蓋是記不得遂稱錯了聖旨今必是旋去探尋案卷見得只是口説却欲來賴此聖旨具在下文臣括答曰口傳聖旨頴云恁地有甚憑據蕭扈吳湛見在此當初何曽有聖旨臣括答云此是北朝聖旨學士因甚却道有甚憑據學士前日賜燕口與橫燕日兩次對制使及一行人衆稱是蕭扈吳湛錯了聖旨上下一行各已行遣了也括與學士理會言語莫往復三二十轉因何今日旋去檢本子來却道何曽有聖旨頴云上下一行總行遣了不是説蕭佶幾時説道行遣著蕭扈吳湛臣括答云是何蕭佶是治平舊址撥與北朝多少時也此回便有甚因依説到蕭佶身上此來從頭只是理會鴻和爾大山天池子因甚説行遣蕭佶有甚交涉頴云頴不曽道行遣了蕭扈吳湛臣括曰學士對制使及一行人衆道了二三十度言猶在耳怎生便諱得兼此事却有憑據當時蕭扈吳湛雖是口傳聖旨來緣南朝却有聖旨劄了坐著蕭扈吳湛言語已指揮各守地界亦請北朝依此指揮邉臣不得更有侵越此劄子是蕭扈吳湛自賫回兼北朝已有行遣文字到邊上邊上各曽有公文照會怎生諱得頴云這裏不見有文字臣括但笑而下答頴亦不固爭似有慙色酒行至十四盞臣括等共辭之頴固留堅言只十盞也臣評笑謂頴曰不是侍讀靣前以榛實記數甚分白這酒巡莫不尚厮賴夀頴共發笑臣括須臣評云前後學士所辨言語甚好學士不錯學士對南朝使人須著如此理辨方是也必然與朝廷密論時自須依理道前後咨聞事理學士心豈不曉言語且須著恁地不錯不錯穎云不如此須要理會歸實豈是強詞頴云北朝照證文字亦晒多只是侍讀館使未見見後須知得不錯也臣括答云蕭林牙持來劄子內天池子並無一件文字照據鴻和爾大山只引著兩件照據一件樓板寨南側為界底前日已咨聞全沒交涉一件稱順義軍曽牒代州待於鴻和爾山一帶巡邊令代州告示人戶知委代州回牒只稱告示人户知委訖不知此文字何用莫是執道代州不曽理會至如近日北朝文字稱今年在永安山受禮今來館舍却去永安山八九十里不成便須在永安山尖上受禮也順義軍人馬從鴻和爾大山腳下巡過去尖喚做鴻和爾大山一帶有何不可又不曽去鴻和爾大山上巡邊也代州何須理會既言北朝照證文字晒多因甚劄子內只説此兩件必是此兩件是最親切底最親切底尚且如此其餘即不言可知頴云不然劄子內只是略舉二件此中晒有文字在只是侍讀不理會更不欲將出南朝憑據文字如何見得侍讀必將得來若見得南朝的確文字朝廷須有商量臣括答云文字盡在朝廷括非本職不曽將來臣括見頴言朝廷須有商量言語稍似婉順遂語頴曰兩朝通好七八十年這些事道理如此分白不如早了却是和好各自守取道理莫好頴云南北和好固是好事如今地界了後更勝如舊日去也舊日邊上時有小爭競只為河東地界理會來三十餘年也至今未定奪須至時有爭競若此坰了却河東地界今後邊上更無一事和好更勝如日前也酒欲罷頴云三兩日來朝廷有一箇好商量此小事侍讀館使早與了當著好臣括見其語似婉順遂答云公事已了十分但北朝道了便了也别録又載書表司殿中丞知雍邱縣事王純狀稱五月二十九日北朝皇帝與皇子各變服來帳前稱太師及小太尉相次皇帝至侍讀安下帳前書表司王純鮑欣職員張履御厨李回指使王宣等同與皇帝相揖後地上列坐時皇子亦在喫茶罷王純謂皇帝曰今日天涼太師可飲京酒一兩杯皇帝曰好遂具酒菜相次皇帝先發問曰地界還如何了當張履云地界事已了蕭林牙已受了劈撥文字鈐别無未了皇帝曰鴻和爾天池本是北朝地土昨因蘇轄等強來侵占今來只要依舊張履云康定年中兩朝已曽定奪蘇直所爭地土了當鮑欣云記得北朝曽差教練使王守源副巡檢張永勾印官曹文秀計會南朝楊武寨都監翟文秀崞縣令教練使吳岊指揮撥立定蘇直地土已立定鴻和爾大山腳為界此事甚是分白張履云天池南朝自有順義軍開泰五年牒稱地屬寧化軍亦是照據的確皇帝又云天池既是南朝地土因甚於天池廟左側旋蓋鋪形張履又云亦是自家地土上修蓋有何不可鮑欣因舉手謂皇帝曰北朝來理會五處地土南朝已應副了三處此兩處為已經定奪了當及有文字照據的確決難為應副北朝皇帝須是體認南朝皇帝意度便是了當皇帝又云此處地土某曽親到來遂指畫鋪形去處鮑欣張履同指李回謂皇帝曰李司徒久在河東盡知子細皇帝問李回曰蕭赳格太保曽來否回答曰今日不曽來蕭赳格太保便是蕭愛山六宅皇帝曰河東三州疆界左藏甚知次第鴻和爾大有些爭競事為甚未了回答云聞蕭林牙昨來商量已了更無爭競去處已將過文字來太師必曽見上靣都了也皇帝云只為未見道鴻和爾山分水嶺回答云此屬代州陽武寨自康定二年及嘉祐二年兩次兩朝遣使差官商量定奪了當必更難言分水嶺其鴻和爾大山北腳下為界更如何改得尋有皇子却坐云鴻和爾大山北腳與水峪白草鋪相照否回答云全不忤事也其水峪全在鴈門寨北鴻和爾大山北腳在陽武寨西相去甚逺不相照望也皇子又云與天池可相照否回答云更絶疏逺也皇子又云其天池久屬當朝自來以橫嶺為界如今須要復舊回答云若北朝却要橫嶺為界奈緣橫嶺在冷泉村北七里以來上靣冇長城者是昨為北朝百姓杜再榮等偷侵過橫嶺南居占冷泉村本朝為北朝差國信使言北朝人戶也且教依舊為歡好年年不曽起遣只於天池立定界至若安橫嶺為界須起了冷泉村方得也皇子云不是也其橫嶺在天池西南上是也被你南界侵奪也北朝天池豈是侵了冷泉村回答云西南無橫嶺除了舊長城橫嶺回答云若説西南上近者只是於車道塢下有一小嶺子髙不及二丈長不及七八十步豈得指為疆界大不是也橫嶺下脫字列無本可填蕭又書表司王純狀今月初三日午時後有館中勾當太尉呼圖克台體問得北朝太后帳前人又一裏頭巾著駝毛衫人稱姓劉呼司徒一被髮人是昨日來者諢子太保皆是北朝皇帝處人將酒一注子來純帳中請御厨李回書表鮑欣職員張履云昨來祗候不易今日無事特來勸好酒盞良久蕭太尉問云地界事如何見説其餘總了也只有鴻和爾大山天池兩處未了如早了當甚好李回答云鴻和爾大山自康定二年因蘇直聶再友侵耕過南朝地土其時南朝仁宗北朝興宗已各差官定奪别立封疆界石壕子天池亦有南北兩朝往回文字照驗分白了當多年也更有甚事理會未了北人意尚未曉純尋就地畫形勢子細説與北人其鴻和爾山下聖佛谷以北一帶久年以六畨嶺為界後因北界人聶再友蘇直侵耕過南朝地土南朝仁宗為和好多年不欲爭競是時兩朝各差官同共重立山定地界東至買馬城西至焦家寨南至鴻和爾大山北腳為界天池地分舊以近北大橫嶺為界因北界人杜再榮侵耕過冷泉河後來定奪只於天池廟近北别立界至已了當多年别無可理會並有兩朝文字并北朝順義軍公文過來稱天池廟地屬南朝寧化軍照驗甚是分白南朝皇帝必不肯更移改動也其被髮人又問云的實有文字照驗無純答是兩朝公事若無文字照據誰敢浪舌説話又低語謂曰昨日來者太師官晒近上朝廷最信憑他語言交我問書表若有文字國信使副因甚不且將來看過便了也純答南朝應副北朝事已了當别無可理會今只差使副來回謝更不帶文字隨行北朝自有當年往回文字案檢可以照證何須更要南朝文字但交太師自去檢看管不差錯飲罷起又隨行李回狀今月六日離新添館路中有北界馬協司徒續後趕來相祗揖云闕下久住不易今來歸去晒是喜慶甚好事回答云别有甚喜慶好事只是且得一行人馬安樂回歸協又云且得兩朝再成歡好為這些兒疆界公事晒是煩惱昨來蕭相公梁學士為在代州界上住了許多時日不曽商量得些子處了當朝廷尋來勾只三日走焉到駕前晒受了煩惱不少後來蕭林牙再去南朝回雖將得文字來該説代州以東諸寨地界已了更不爭理只有鴻和爾大山與天池兩處未了又待再差蕭林牙去南朝理會却為南朝有泛使未到只等候商量箇次第便教過去皇帝却見侍讀館使開説得理道甚是分白後晒是喜歡太后亦更喜歡道與皇帝南朝晒是應副本國也如有些小底公事也且休恐惡模樣便朝廷取問蕭相公梁學士當時商量教看南朝意度如何肯與不肯確的逐旋聞奏但只説南朝差來職官一向不肯商量却只爭了一場坐位間公事不曽了得些小疆界因何蕭林牙去了却以東數寨如今沈侍讀李館使來説得事理分白顯是你兩箇有隱底事節不聞逹朝廷如此三度令分析更取問蕭林牙一次南界可晒不肯商量其蕭林牙尋復奏南朝若不肯商量怎却將得回答文字來即不知邊上職官相見商量如何協又云與左藏代州往還甚熟後不敢浪舌説脫空實是如此今來北朝皇帝亦甚思想因見侍讀館使纍説南朝皇帝重惜歡好大晒應副北朝也遂亦深思昔年歡好更不理索鴻和爾大山分水嶺只於天池中心為界此甚小事必是侍讀館使見後甚是喜歡也回答蕭相公梁學士在代州界逐次相見實即只間爭相和織羅公事何曽的當商量地界北朝問當乃是也其鴻爾大山及寧化軍天池是南朝照據分白纍經兩朝差官定奪了當難以移改如今北朝只於回牒內帶説天池一節自繫朝廷不知如何使副有何喜歡協又云莫相次走馬報平安行時必先繳奏此事聞朝廷否回答只是循常例奏平安更不去奏事協又云此回國信使副甚有好事諸處點集下兵馬不少未曽令取便勾當及又二年田苖薄熟人戶晒是艱難今來皇帝喜歡方始一齊告示放散一國上下人民皆喜歡初五日使副進發後次日羣臣一齊入賀疆界不爭兩朝再結歡好甚是堅固也莫也知道否回答不知癸丑提舉三司會計司上一州一路會計式餘天下會計候在京諸司庫務帳足編次從之以惠州阜民監折二錢十萬緡借廣州市易務為本錢從都提舉市易司請也仍限三年撥還詔京東西路轉運司勘會吕升卿於太山上鐫勒文字是與不是祖宗御製碑以聞蔡承禧言太山有祖宗御製碑升卿勒名其上故令案實後轉運司言所勒非御製碑乃已先是王安石亦為升卿言昨將碑本來石文多殘闕當是古碑上曰升卿無他然古碑又何用鐫勒大抵後生不更事耳承禧為御史即言升卿經學紕繆不當教國子且挾惠卿之勢崇建親黨輕傲犯法招權慢上等事章既下中書升卿亟自辨析惠卿又陳疾卧家承禧所論多寢不行但令究勒名御碑虛實踰月乃罷升卿管勾國子監罷國子在七月二十三日此據承禧奏議修入詔趙居之子孫并其乳母為即所居增展舍屋免鎖閉房室甲寅詔兩浙淮東闕雨令相度淮東役法王古因便體量災傷當賑濟州軍以聞古靖之子時為司農主簿七月二十四日可見王安石上詩書周禮義序詔付國子監置之三經義解之首先是安石撰詩序稱頌上德以文王為比而上批得卿所上三經義序其發明聖人作經大旨豈復有加然望於朕者何其過歟責難之義在卿固所宜者傳於四方貽之後世使夫有識考朕所學所知及乎行事之實重不德之甚豈勝道哉恐非為上為德之義也其過情之言可速刪去重為修定庶付有司早得以時頒行及進呈上曰以朕比文王恐為天下後世笑卿言當為人法恐如此非是安石言稱頌上德以為比於文王誠無所愧上曰關睢文王之詩皆文王盛德周世世修德莫如文王朕如何可比兼如陟降庭止之類朕豈不自知其不能耶須當改之但言解經之意足矣安石曰陛下誠或未能事事如是然陛下於陟降豈有愛惡之私心乎是乃所以為直也已而安石奏臣伏奉手詔以臣所進三經義序有過情之言宜速刪去臣雖嘗敷奏以為文字所宜又奉聖訓再三但令序述解經之意不須過有稱道伏惟陛下盛德至善孚于四海非臣筆墨所能加損然因事宣著人臣之職也誠以言之不足為懼不以近於媚諛為嫌而上聖所懷深存謙損臣敢不奉承詔旨庶以仰稱堯禹不爭不伐之心遂改撰以進上乃頒行之九月十二日安石云云陳瓘論曰安石初進三經義序極其褒讃神考命安石改進此聖人之謙德也安石退書其事乃偽造神考謙辭曰以朕比文王恐為天下後世笑又曰卿言當為人法嗚呼言而世為天下法此聖人之事也安石之言自謂可以為天下法而謂神考比文王則為天下後世笑詆誣宗廟可謂甚矣凡造神考謙辭皆用此意有曰朕頑鄙有曰朕才力庸短有曰朕自視未有一毫可比漢宣帝如此之類其誣不一愛君之士聞而流涕者豈一人哉且神考熙寧之末既逐鄧綰尋出安石自攬威柄陟降羣臣多取公議凡安石所逐無不收召故安石尤以神考陟降為非而誣造聖訓著于文字以舒其悖訕之氣上與王安石論及官員不肅事安石曰震驚百里乃能不喪匕鬯上曰造言法令不便者官員耳朝廷但見官員紛紛而百姓便於新法之情無由上逹安石曰誠如此此所以要耳目得人此據日録二十四日事乙卯宣政使嘉州防禦使入內副都知張若水罷副都知改耀州觀察使依舊提舉四園苑若水以病求罷故也提點兩浙路刑獄朝端彥言常州違法給蔣轃官地轃乃前兩浙轉運副使俞希旦壻之緦麻兄詔轉運司劾罪以聞後得何罪當考或朱本削去新本亦削去丙辰昭化節度使康國公承顯卒申王德文子也上自臨奠贈太尉樂平郡王丁巳詔權秦鳯等路提點刑獄鄭民憲相度熙河路以見錢茶銀紬絹分數增糴茶銀紬絹並平估毋虧弓箭手如有未便具以聞上批河東飢民流往京西其間甚有丐食道路羸瘠不保旦暮之人其賑濟官程之才等宜令速往戊午詔諸路役人以事藝試補者委提舉司點檢內老弱疲病經久不任教習者募人代之其弓手嵗一案閲每十人給錢千置銀楪以賞武藝優異之人詔判都水監侯叔獻減磨勘二年丞劉璯一年殿直劉永年二年以開訾家口有勞也詔岢嵐火山軍堪耕種地如均給遷移弓箭手有餘更益以西陘等寨未耕官地堪耕種者以漸增募弓箭手時河東與敵人分畫疆土而弓箭手有遷移者故籍曠土分給之司徒兼侍中判相州韓琦薨年六十八前一夕大星隕州治櫪馬皆驚上聞訃輟視朝三日發哀於後苑遣勾當御藥院李舜舉特賜其家銀絹各二千五百兩匹又時遣入內都知張茂則管勾葬事又就差知安陽縣吕景陽相州觀察判官陳安民專管勾葬事許即墳造酒以備支用聽數外留占吏卒命同知禮院李清臣即其喪祭奠顧恤其家甚厚上自為碑文載琦大節又篆其首曰兩朝顧命定策元勳之碑諡忠獻贈尚書令配享英宗廟廷初執政進呈琦贈官王圭言吕夷簡贈太師中書令王安石曰琦受遺立先帝非夷簡比謂冝特贈乃贈尚書令琦合加恩禮上即日批出無一闕者太原府走馬承受樂士宣言地界司韓縝周永清今在太原府如縝永清赴代州日臣當同往或令臣先往上批代州等處地界既按視了當亦無可豫議者可速指揮永清還代州此據御集六月二十八日事按永清以四月十七日受命本傳云永清不願行固遣之俄復命李評同往永清上章陳利害以母病乞還按是年七月十八日始命李評同分畫此時永清已還代州矣本傳似差誤當考詔歸明人增差都監及監當未歷一任者毋得别差勾當公事已未執政進呈軍數上謂王安石曰併營事非斷而行之亦不能了當人盡咎卿鄭俠上書亦云爾當考軍數具載之是夏南川獠叛詔秦鳳路都轉運使熊本往夔路體量安撫經制渝州獠賊此據熊本傳實録失不載此乃于八月七日書夔州路察訪熊本言經制獠賊乞差秦鳳路鈐轄賈昌言量募兵效用但云察訪亦不云體量安撫按御集七月十一日差楊萬等充夔州體量安撫司聽候差使又十二日改差劉從吉替王振募人往夔州路體量安撫熊本下聽候差使然則本受命體量安撫審矣或又兼察訪也今依本傳載之六月末新舊實録並疏略如此更當考詳熊本集記險篇亦云七月在通逺軍被敕充夔州路體量安撫經制渝州獠賊
