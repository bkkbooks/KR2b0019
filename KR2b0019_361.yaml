body:
  text: 續資治通鑑長編卷三百五十七宋李燾撰哲宗元豐八年六月癸亥朔羣臣臨於福寧殿詔再觀大行皇帝畫像於集英殿以前像未肖故也甲子詔給度牒百道修相國寺塔乙丑詔梁從政改遙郡防禦使吳靖方改遙郡團練使並特與見寄官請給仍自寄官日為始又詔水磨茶場𨽻太府寺仍屬戶部右曹九月四日詔元祐元年閏二月二十八日罷丙寅罷府界三路保甲不許投軍及充弓箭手指揮四月二十二日乙酉當考開封府推官胡及罷坐漏言所勘吳㞦公事故也政目四月事二十四日復官丁卯賜故左僕射王圭夀昌坊官第神道碑額曰懿文遺表恩澤十人詔給事中陸佃監護葬事賜宅一百七十八間御集在五月二十日今從實録政目云詔葬王圭依韓琦例己巳録故左侍禁郝仲通弟仲連姪祥並為三班借職以仲通死事也左正議大夫致仕李及之卒庚午詔興龍節諸處合試童行撥放並依舊例坤成節以大行皇帝梓宫在殯惟開封府度僧道比興龍節減三之二仍禁屠決大辟罪餘依元豐令詔揚王男右武衛將軍孝騫為端州刺史第四男賜名孝錫為右驍衛大將軍領成州刺史荆王男右武衛大將軍孝詒為寧州刺史孝參為和州刺史孝奕為慶州刺史孝隲為榮州刺史第七男賜名孝忱為右驍衛大將軍領秀州刺史第八男賜名孝頴為右驍衛大將軍領英州刺史第九男賜名孝願為驍衛大將軍領通州刺史詔河東州軍人戶見缺和糴糧草自三月六日赦書到日元豐七年已前所缺並與除放吕惠卿家𫝊有惠卿所上疏可考已附元祐二年五月四日禮部言太皇太后生辰欲令詳定編修諸司敕式所定所奉物各於舊令式外增一倍其花朵各增十二皇太妃生日并節序物色亦合如皇后例從之詔賜楚州孝子徐積絹三十匹米三十石積治平二年擢進士第三嵗喪父求之甚哀事母孝篤母終居喪盡禮廬墓側十餘年晨昏奉几筵如事生每嵗甘露降於墳域必逾月木為連理守臣迎入學甘露又降其直舍鄉閭化之州具以聞故有是賜癸酉尚書省言乞自今大理寺事於推斷應奏及上尚書省者更不先申本曹從之甲戍詔皇太后出入儀衛依治平四年四月內參定皇太后所乘輿上設行龍六皇太妃出入許乘檐子紹聖元年十月六日云云環慶路經略司奏肅逺寨蕃官左侍禁巡檢慕化環慶路第二將部將戴宗榮差人探得西界減痝井人馬欲來作過同率一百餘人要路等截鬪敵斬獲四十餘級詔慕化戴宗榮各遷一官密記十二日事同提舉經度制置牧馬事樞密副都承旨曹誦奏伏見朝廷用崇儀副使溫從吉法創置孽生馬監逮今二年得駒數少而馬之死損轉送愈多慮合更加討論乞詔御史臺兵察官取索自置監已來文字㑹校利害限半月以聞密記六月十二日事八月二十六日行遣殿中侍御史黃降言訪聞京西轉運副使沈希顔資性苛刻老而彌甚京西民力素薄希顔到任惟務尅剝多求羡餘妄冀朝廷緣此進用鄧州浙川縣春夫自來科納雇錢更不起發去嵗希顔科撥令去縣界民間雇錢有一倍之費希顔非法聚斂一路受弊推此可見兼訪聞希顔奏鹽法自推行已來計算官自般運其費廣於客旅又於官本之外出二分息出賣民間鹽價比舊增貴而般運不繼或至闕絶西京車戶復有差雇之擾於民未便亦乞别委本路官司體量措置所貴經久可行詔令沈希顔分析聞奏降又言希顔稱到任一年所入比之前官一年之數共增八十二萬餘貫臣昨嘗具希顔非法事狀已凖朝旨令希顔分析鄧州浙川縣春夫事又令每夫納雇錢五貫六百文共計五萬餘貫即自不合入本司年計比較亦未審所奏八十餘萬之數虛實欲乞詳酌令希顔一就分析詔令希顔一就分析奏聞政目六月十二日黃降言沈希顔聚斂掊克詔希顔分析元祐密疏有降元奏今附入政目七月二十八日又差官體量朝請大夫天章閣待制致仕孫坦卒乙亥詔延安郡王閣牌印留內中旌節擇日移置天章閣丙子資政殿學士提舉崇福宫韓維知陳州維初赴臨闕庭太皇太后遣中使降手詔勞問維奏治天下之道不必過求髙逺止在審人情而已識人情不難以已之心推人之情可見矣大凡人情貧則思富苦則思樂勞困則思息鬱塞則思通陛下誠能常以利民為本則人富矣常以愛人為心則人樂矣役事之有妨農務者去之則勞困息矣法禁之無益治道者蠲之則鬱塞通矣推此而廣之盡誠心而求之則神孫觀陛下之法不待教而自成聖德賢士聞陛下之風不煩諭而爭宣忠力何憂軍民不欣戴社稷不安固乎臣世受國恩兄弟並列顯近陛下雖不宣諭猶思禆補况親奉聖訓哉又奏臣竊聞陛下濬發德音斥宋用臣等出就外省罷其所領職事黜吳居厚使離本道責以掊刻擾民中外喧𫝊曉然知陛下憂國愛民之深意莫不欣悅相賀臣雖在哀戚之中不覺失聲歡呼然臣尚有愚懇不敢不盡以上聞臣竊恐議者以嗣君新即位且當循守父道三年無改此大不然伏惟太皇太后於大行皇帝為母儀於今上皇帝有祖母之尊此時稱制臨政蓋為社稷大計事有不便弛以利民考古相時理無不可臣以為萬一有敢為此論上惑天聽者若非姦人沮害聖政即是俗儒不識時變願陛下切勿聽之臣近去都下日嘗具奏陳陛下探盜賊所起之原罷非業之令寬訓練之程蓋為保甲保馬發也何則農民以稼穡為生使之出錢市馬已非其願又守護灌飼素昧其方萬一死損復更償買昔時一馬直錢三二十千者今貴至百千矣農民如此未有已時愁嘆之聲聞於道路近嵗保甲以築垣為場號為團教一丁在官訓練更須一丁供餽飲食家闕耕作身受勞苦不無怨懟夫使失業怨懟之人操兵器習為擊刺之事豈非可慮近者又聞京西保馬頗為羣盜掠取換易乘騎如其外廄河北保甲漸亦作過凌暴良民州縣幾不能禁此患在耳目之前臣恐更易措置不可緩也且臣非謂國馬遂不可飬但官置監牧可矣非謂民兵遂可不教但於農隙一時訓練可矣孟子曰天時不如地利地利不如人和人和可勝天時可不務乎臣伏望太皇太后陛下更留聖慮詳酌施行又言先帝為此蓋是憂邊預慮原非好事然至今日方見此數弊老臣之愚不識忌諱切於愛君憂國遂至喋喋惟聖慈少寬而深亮其誠四月八日吳居厚責知廬州五月二日梁從吉代宋用臣領皇城五月三日榜朝堂六月二十五日下詔求言又奏臣近者伏睹𫝊録到朝堂所出榜文開示大信招來羣言皆前代帝王之髙致而方今朝廷之急務天下幸甚然臣尚有疑者若乃陰有所懷至不得已也七十五字恐非元諭聖旨之本意似增飾而為之者何則前云至於拂心逆耳猶將欣然容而不拒又以爵賞勸之後所云則異於此矣又以黜罰懼之且機事之重何害密言已行之令容有未知朝廷之意茍善何惡其觀望流俗之言必淺自可以勿聼藉使有犯此四禁者亦未至拂心逆耳猶在欣然容之之列豈可便行黜罰若此言出於陛下則是詔文前後自相違戾疑誤觀者若出於臣下議論則是違異聖意巧為辭說以懼來者陰成其邪志也古之求言者必曰毋有所諱又曰毋悼後患今則多設防禁又以黜罰懼之是使人有所諱而悼後患也古之為民者宣之使言下至道路芻蕘亦見收采今則出榜止於朝堂降詔不及諸道既乖古義亦非舊體恐非所以推廣聖德普及於遐逺開闢言路不間於幽側也此事若不改正臣深恐自今聖聰漸成壅蔽臣在先帝朝嘗奉聖旨以旱灾撰詔省躬求直言詔下之日都人歡悅甘雨亦降不數日姦人希宰相意上惑聖聽别作一詔蓋掩前詔之美庇護新法之失人情疑懼遂不敢言前詔但成虛文而已今榜後之意頗亦類之此事於國體不小伏望陛下深察此弊而痛絶其端特作聖意批降指揮令刋去此七十五字只以榜前所云别撰詔文遍頒天下使萬方之人豁然知聖人樂善好諌之心披雲霧而覩青天白日豈不快哉豈不大哉於是起知陳州未行召赴闕遂留經筵兼侍讀乃七月十二日今并書是日司馬光言臣伏見皇帝陛下初臨大寶太皇太后陛下同斷萬幾側身虛已渴於求諌於五月三日特下詔書大開言路此誠明主之先務太平之本原也竊見中間一節天下見者未逹聖心咸以為朝廷雖名求諌實惡人論事豫設科禁有上言者皆可以六事罪之是以盤旋猶豫未敢盡言如此則上恩不得下究下情不得上通上下否閉萬事乖失又前來詔書止榜朝堂所詢不廣見者甚少臣愚欲望聖慈下學士院别草詔書除去中間一節務在勤求讜言使之盡忠竭誠無有所諱仍乞遍頒天下在京於尚書省前及馬行街出榜在外諸州府軍監各于要閙處曉示不以有官無官之人應有知朝政闕失及民間疾苦者並許進實封狀言事在京則於登聞鼓院檢院投下委主判官畫時進入在外則於州府軍監投下委長吏即日附遞聞奏不得取責副本强有抑退其百姓無家業人慮有奸詐即令本州責保知在奏取指揮放令逐便候有上件實封奏狀進入至內中伏望陛下以萬幾之暇略賜省覽其所論至當者用其言而顯其身其是非相半者捨短取長其言無可采事不可行者亦當矜容不可加罪如此則下情無不通嘉言罔攸伏聰眀周四逹海內如指掌矣或慮奏狀繁多難以親覽即乞降付三省委三省官看詳擇其可取者用黃紙簽出再進入或乞留置左右以備規戒或乞降付有司施行從之光自注云六月十四日上劄子十八日進呈依奏二十五日乃下詔户部言自奉行新制後省曹寺監吏祿通為一色不分舊請新添無以㑹見新法增添合還之數兼吏員並次第權入即比舊不能無加詔以元豐三年錢數為額仍自六年為始依元條撥還丁丑承議郎新除宗正寺丞程皓卒皓嘗論熙寧初張戩爭新法不可行遂以語觸王安石因曰新法之行乃吾黨激成之當時自愧不能以誠感寤上心遂成今日之禍吾黨當與安石等分其罪也皓深有意經濟方召用遽死士大夫識與不識莫不哀傷文彥博采衆議題其墓曰眀道先生云皓所稱當與安石分罪據新録張戩𫝊他書無有也當考皓五月八日初除宗丞戊寅新知永興軍鄧綰知鄧州新知青州劉庠依舊知永興軍綰庠兩易在五月戊午奉議郎知定州安喜縣事王巖叟為監察御史巖叟荀龍子也詔延福宫使武信軍留後熙河蘭㑹路經略安撫制置使李憲差充永興軍路副都總管憲以疾乞罷故也此必有言者也三月一日憲進入內副都知武信軍留後應熙河蘭㑹路差遣並依舊今乃責永興副總管也己卯朝請郎同提舉永興秦鳯等路保甲胡宗回言已獲軍賊王冲詔以宗回為朝奉大夫供備庫副使權鄜延路第一副將李浦為左藏庫副使弓箭手賀英為右侍禁劉遇為三班借職浦英遇仍給賜銀帛及兵級保甲弓箭手等賜錢有差四月二十四日捕冲政目宗回等遷官在十月十六日辛巳荆湖南路安撫鈐轄轉運司言奉詔於邵州蒔竹縣石驛地名臨口建寨已訖功乞賜名臨口從之玉牒係之辛未誤也癸未詔戶部提轄拘催市易錢物准赦除放息錢外其合納本錢特與展限三年是日吕公著入見太皇太后遣中使賜食公著上奏曰臣伏覩皇帝陛下紹履尊極方逾數月臨朝穆穆有君人之度太皇太后陛下勤勞庶政保佑聖躬德澤流行已及天下臣逺從外服召至左右竊思人君即位之初冝講求修德為治之要以正其始然後日就月將學有緝熙於光眀新而又新以至於大治是用罄竭愚誠考論聖道槩舉十事仰贊聰眀一曰畏天二曰愛民三曰修身四曰講學五曰任賢六曰納諌七曰薄斂八曰省刑九曰去奢十曰無逸皆隨事解釋粗成條貫不為繁辭以便觀覽伏望陛下留神幸察如言有可採即乞置之御座朝夕顧省庶於聖德少助萬一其畏天曰書曰皇天無親惟德是輔又曰惟上帝不常作善降之百祥作不善降之百殃蓋天雖髙逺日監在下人君動息天必應之若修已以德待人以誠謙遜靜慤慈孝忠厚則天必降福享國永年灾害不生禍亂不作若慢神虐民不畏天命則或遲或速殃咎必至自古禹湯文武以畏天而興桀紂幽厲以慢神而亡如影隨形罔有差忒然自兩漢以來言天道者多為曲說附㑹世事間有天地變異日月災眚時君方恐懼修省欲側身修道而左右之臣乃引經據𫝊或指外事為致灾之由或陳虛文為消變之術使主意怠于應天此不忠之甚者也詩曰我其夙夜畏天之威于時保之然則有天下者固當飭已正事不敢戲豫使一言一行皆合天心然後社稷民人可得而保也天人之際焉可忽哉其愛民曰恤我則后虐我則讐人君既即尊位則為民之父母萬方百姓皆為已子父固不可以不愛子君固不可以不愛民若布德施恩從民所欲則民必欣戴不已欣戴不已則天降之福若取民之財不憂其困用民之力不恤其勞好戰不休煩刑以逞則民必怨叛怨叛不已則國從而危故曰民惟邦本本固邦寧然自古人君臨朝聽政皆以赤子為憂一旦用兵則不復以生靈為念此蓋獻策之臣設姦言以導上意以開邊拓境為大功以暫勞永逸為至計此世主所以甘心而不悟也夫用兵不息少壯從軍旅老弱疲轉餉伏尸流血而勝負得失猶未可知也民勞則國先敝夫何以為功兵興則朝廷多事亦不得而安逸也故凡獻用兵之䇿者欲生事以希寵罔上而營私耳豈國家之利哉其修身曰天下之本在國國之本在家家之本在身夫欲家齊國治而天下化莫若修身修身之道以正心誠意為本其心正則小大臣庶罔敢不正其意誠則天地神眀皆可感動不誠則民不信不正則令不行况人君一言一動史臣必書若身有失德不惟民受其害載之史䇿將為萬代譏笑故當夙興夜寐以自修為念以義制事以禮制心雖小善不可不行雖小惡不可不去然人君進德修業實繫乎左右前後夫習與正人居不能無正猶生長於齊不能不齊言也習與不正人居不能無不正猶生長於楚不能不楚言也故曰僕臣正厥后克正僕臣諛厥后自聖其講學曰王者繼祖宗之業居億兆之上禮樂征伐之所自出四方萬里之所視效智足以窮天下之理則讒說不能惑德足以服天下之心則政令無不行自非隆儒親學何以臻兹然天子之學與凡庶不同夫分文析字考治章句此世之儒者以希祿利取科級耳非人主之所當學也人主之所當學者觀古聖人之所用心論歷代帝王所以興亡治亂之迹求立政之要講愛民利物之術自然日就月將德及天下書曰王人求多聞時惟建事又曰念終始典于學厥德修罔覺故傅說之告髙宗者修德立事而已至漢之鼂錯以為人主不可不學術數錯之意欲人主用機權巧譎以參制羣下而景帝用之數年之間漢罹七國之禍而錯受東市之誅蓋其所主者不出於誠信而已由是觀之擇術不可不謹也其任賢曰昔成王初蒞政召康公作卷阿之詩以戒之言求賢用吉士蓋為治之要在乎任賢使能能者不必賢故可使賢者必有德故可尊小賢可任以長民大賢可與之謀國若夫言必顧國家之利而行足以服衆人之心夷險一節而終始可任者非大賢則不能也人君雖有好賢之心而賢人猶或難進者蓋君子志在于道小人志在于利志在於道則不為茍合志在于利則惟求茍得忠言正論多咈于上意而佞辭邪說専媚于君心故君子常難進小人常易入不可不察也自古雖無道之君莫不欲治而惡亂然而治君少而亂國多者其所謂忠者不忠而所謂賢者不賢也書曰有言逆於汝心必求諸道有言遜于汝志必求諸非道人主誠存此心以觀臣下之情則賢不肖可得而知矣其納諌曰昔書稱成湯之德曰從諌弗咈改過不吝湯聖君也不曰無過而曰改過者言能捨己而從諌則不害其為聖也及紂為天子强足以拒諌智足以飾非紂非無才智也然身滅國亡而天下之惡皆歸之者言其愎諌自用才智適足為害也前代帝王無不以納諌而興拒諌而亡著在史册一一可考蓋貴為天子冨有四海貴則驕心易生冨則侈心易動一日萬幾則不能無失固當開道而求諌和顔而受之其言可用則用其言而顯其身言不可用則恕其罪以來諌者夫納忠好諌之臣初若逆耳可惡然其意在於愛君而憂國諂佞阿諛之士始若順意可喜然其情止於媚上而邀寵人君誠能察此則事無過舉身享美名故曰木從繩則正后從諌則聖其薄斂曰古人有言曰百姓足君孰與不足百姓不足君孰與足人君恭儉節用取于民有制則民力寬裕衣食滋殖自然樂輸租賦以給公上若暴征峻斂侵奪民利物力已屈而驅以刑辟勢必流轉溝壑散為盜賊為人上者將何利於此哉故善言治道者尤惡聚斂之臣曰與其有聚斂之臣寧有盜臣前代帝王或耽於聲色或盤於逰畋或好治宫室或快心攻戰於是小人乘間而肆其邪謀為之斂財以佐其橫費世主不悟以為有利於國而不知其終為害也賞其納忠于君而不知其大不忠也嘉其以身當怨而不知其怨歸於上也昔鹿臺之財巨橋之粟商紂聚之以喪國周武散之以得民由是觀之人主所當務者仁義而已何必曰利其省刑曰夫臨下以簡御衆以寬百王不易之道也昔漢髙祖去秦苛暴約法三章以順民心遂定王業孝文循之以清靜而幾致刑措然則為治之要果在於省刑而不在於煩刑也况人主之於刑獄其勢不能親臨則必委之於臣下故峻推鞫則權在于獄吏廣偵伺則權在於小人肆刑戮則權在於强臣通請謁則權在於近習自古姦臣將欲誅鋤善人自専威柄必數起大獄以搖人心何則獄犴之間其情難知煆錬周內一繫於吏及夫奏成獄具則雖有寃抑人主何從而察哉然則欲姦雄不得肆其威善良有以安其性莫若省刑而已自三代以還有天下者數十姓惟宋受命逮今一百二十有六年中原無事不見兵革稽其德政所以特異前世者直以誅戮之刑內不施於骨肉外不及於士大夫至於下民之罪一决於廷尉之平而上自天子下至於有司不復措意輕重於其間故能以好生之德感召和氣而致無窮之福祖宗所以消惡運遏亂原者嗚呼逺哉雖甚盛德無以加矣其去奢曰昔夏禹克勤于邦克儉于家而為三王祖漢文帝即位宫室苑囿車騎服御無所增益而天下斷獄四百幾致刑措然則勤儉者固帝王之髙致也况以天子之尊富有天下凡四方百物所以奉養於上者蓋亦備矣然而享國之日寖久耳目之所御者習以為常入無法家弼士出無敵國外患則不期於侈而侈心自生佞諛之臣又從而導之於是窮奢極侈無不為已是以先王制法作竒伎淫巧以蕩上心者殺無赦夫竭天下百姓所以相生相養之具而以供人主無窮之欲致人主於喪德損夀之地而以邀已一時之榮雖誅戮而不赦固未足以當其罪也昔紂為象箸而箕子諌夫以天子而用象箸未為過侈也然箕子以為象箸不已必金為之金又不已必玉為之故箕子之言所以防微而杜漸也至漢公孫𢎞相武帝以為人主病不廣大人臣病不節儉當是時帝方外伐四夷內治宫室為千門萬户由是天下户口減半盜賊蜂起而𢎞猶病其不廣大何其不忠之甚哉故人主誠能不以箕子之言為太過而察見公孫𢎞之大佞則夏禹漢文之德不難及矣其無逸曰昔周公作無逸之篇以戒成王其略曰昔商王中宗治民祗懼享國七十有五年其在髙宗不敢荒寧享國五十有九年厥後立王生則逸不聞小人之勞惟耽樂之從自時厥後亦罔或克夀或十年或七八年或五六年或四三年嗚呼非愛君憂國之深其言何以至此又曰繼自今嗣王無淫于觀于逸于逰于田無若商王受之迷亂沈于酒德哉小人怨汝詈汝則皇自敬德亂罰無罪殺無辜怨有同是叢於厥身蓋人君初務縱逸小人必怨而大臣必諌至於淫刑亂罰以杜言者之口然後流連忘反不聞其過而終至於滅亡故曰無逸之書後王之元龜也唐眀皇初即位宋璟為相手寫無逸圖設於帝座眀皇勤于政事遂至開元之治其後宋璟死所獻圖亦敝而撤去眀皇遂怠於政親見天寶之亂由是觀之靡不有初鮮克有終人君誠䏻謹終如始不敢逸豫則德有堯舜之名體有喬松之夀豈不美哉又臣聞孟子曰我非堯舜之道不敢陳於王前今朝廷始初清眀臣雖學術𥚹淺惟是前代聖帝眀王所以致治之迹可以為法與夫暴君暗主所以兆亂之道可以為戒者乃敢告於左右古人有言曰舜何人也豫何人也夙夜以思去其不如舜者就其如舜者是亦舜而已矣惟陛下加意無忽則社稷幸甚天下幸甚是日同上奏曰臣聞古者天子聼政命百官進針王闕近臣盡規親戚補察然後事行不悖故孔子曰天子有諍臣七人雖無道不失其天下唐太宗以髙世之姿親安大業然䏻克己從諌以致太平貞觀初孫伏伽始諌太宗悅而賞之有言賞太厚者答曰朕即位以來未有諌者故特賞之爾他日嘗怒苑西監而皇太子驟諌太宗喜曰朕始得魏徴朝夕進諌徴亡而劉洎岑文本禇遂良馬周繼之兒在膝前見吾悅諌熟矣故唐太宗始以納諌致治而又以悅諌教其子孫宜乎功烈甚髙而百王鮮及也然至其裔孫德宗惡諌諍之臣以為賣直取名當時北省閉闥纍月南臺惟一御史不聞其過終致亂亡由是觀之好諌者帝王之髙致可不務哉恭惟太皇太后陛下自親庶政盛德日新皇帝陛下臨朝恭默未有過事然而天下至大萬務至廣方始初清眀之際正是求賢納諌之時况先帝新定官制設諌議大夫司諌正言之官其貟數甚備伏乞申敕輔弼選忠厚骨鯁之臣正直敢言之士遍置左右使掌諌諍無空要職益廣言路又御史之官號為天子耳目而比年以來專舉六察故事廢國家治亂之大計察案司簿領之細過况唐制湮沒已久别無分眀稽據臣在樞府日嘗見先帝頗已厭其煩碎特以近臣獻言聊試其法耳伏乞盡罷察案只置言事御史四人或六人仍詔諌官御史並須直言無諱規主上之過失舉時政之疵繆指羣臣之姦黨陳下民之疾苦言有可用不以人微而廢言令或未便不為已行而憚改所言無取姑亦容之以示眀盛之世終不以言罪人若緘默選懦畏避不言者眀正其罰如此則左右前後不能壅蔽嘉言罔伏庶績咸熙天下幸甚丙戍右司諌蹇序辰為司封員外郎序辰罷言職必有故當考詳增入七月二日序辰云云賜交趾郡王李乾德詔曰省所上表陳乞勿陽勿惡等峒疆土事具悉卿向在先帝朝叙述疆屢降詔諭本末甚眀特徇所求已從割賜忽覽奏牘尚有指陳朕初纘承動循前烈命既素定義難改從宜懋忠嘉一遵先詔以乾德獻書乞移敕內所賜勿陽勿惡等峒樞密院言宜降詔申述先朝詔旨令乾德遵依故也詔三省樞密院官如遇遷拜東西府居更不遷移詔開封府推官胡及依舊供職以開封府勘吳㞦添撰𫝊寫有實而及止以勘鞫不密故也胡及罷在六月四日吳㞦事不詳當考元祐元年正月丁未及送吏部詔內臣甘承立押赴湖北提刑司取勘此據政目六月二十四日事眀年三月二十五日除名配韶州四月末安惇劾承立樞密院言夏國已遣使詣闕陳慰慮諸路謂西人通貢遂弛邊備已降指揮令陕西河東逐路經略司制置司嚴誡邊臣常如寇至過為守備近據河東涇原熙河蘭㑹經略司奏透漏西賊至漢界殺害吏民顯失守禦詔令河東涇原熙河蘭㑹路經略司丁寧誡約緣邊當職將官逺布斥堠及探伺西賊動靜過為之備如更致透漏重行黜責又言訪聞近日府界三路團教保甲多因正長騷擾或巡教官指揮苛虐致小人凶暴凌犯抵法逐處提舉官多務姑息不喜州縣公行致官吏畏避不敢舉發監司觀望不為按劾含養姦凶深為未便欲令府界三路安撫監司提舉保甲司及州縣常切覺察按劾施行如違重行黜責從之密記六月二十四日知河南府韓絳言山陵役兵病死方盛暑之際臣權宜與免檢覆然輒違詔條自劾以聞工部言人命所繫恐致欺蔽詔特依絳所奏仍放罪丁亥詔曰朕紹承燕謀獲奉宗廟初攬庶政鬱于大道夙夜祗畏不敢皇寧懼無以章先帝之休烈而安輯天下之民永惟古之王者即政之始必眀目逹聰以防壅蔽敷求讜言以輔不逮然後物情遍以上聞利澤得以下究詩不云乎訪豫落止此成王所以求助而羣臣所以進戒上下交警以遂文武之功朕甚慕焉應中外臣僚及民庶並許實封直言朝政闕失民間疾苦在京於登聞鼓檢院投進在外於所屬州軍驛置以聞朕將親覽以考求其中而施行之司馬光凡三奏乞改前詔于是始用其言也舊録云以資政學士通議大夫司馬光有請時光欲招其黨人協衆議法以欺簾帷故降是詔於是小人乘之誣詆訿毁紛至矣新録辨曰上即位之始下詔開言路此盛德之事也今添入司馬光奏疏乃見事實自有請至紛至矣三十四字刪去按光乞開言路疏凡三奏新録惟載第二疏耳是其第三疏以十二日奏及是方得請今悉依光集附其疏於本日於此但云始用光言聼言之不易如此故必詳著之戊子詔石得一為永裕陵使宋用臣副之詔諸臣上殿候改元取旨政目二十六日事詔罷秦鳯路置場集教弓箭手令經略司講求土人習教所宜立法以權管勾秦鳯路經略安撫司公事通直郎吕溫卿乞寬蕃漢弓箭手集教故有是命樞密院勘㑹秦鳯路弓箭手自來教閲事藝無法朝廷已差朝請郎權同提舉永興秦鳯等路保甲胡宗回兼提舉㸃擇依保甲法置場集教今訪聞弓箭手自來習射惟務射逺中親不用格法今來聚教有妨農務亦非土人素習所有置場習教元降朝旨欲令胡宗回更不施行其弓箭手並各放𣪚歸本處仰經略使子細講求土人教習所宜立法聞奏仍令後不得違法招刺小弱不堪習戰之人如有未曽團結人數即隨宜團結訓練其見留使臣諸軍教頭等並遣歸司從之先是前權管勾秦鳯路經略安撫司公事通直郎吕溫卿奏乞寬蕃漢弓箭手集教以便人情故有是命密記二十六日有此樞密院言舊例合差官押賜遺留夏國主銀器一千五百兩絹一千五百匹詔如故事仍令學士院降遺詔先是吕公著既上十事太皇太后遣中使梁惟簡諭公著曰覽卿所奏深有開益備見忠亮良切嘉稱當此拯民疾苦更張何者為先更無滅裂具悉以聞庚寅吕公著復上奏曰臣伏見陛下自臨朝以來留神庶政以休息生民為念凡所施為皆中義理如罷導洛堆垜等局減放市易見缺息錢罷人戶養馬放積缺租稅差官體量茶鹽法使者之刻剝害民如吳居厚霍翔王子京等內臣之生事斂怨如李憲宋用臣等皆從罷去中外聞之無不欣喜踴躍今來復䝉陛下不遺踈拙特降清問臣雖無狀敢不竭盡愚見臣伏思先帝初即位召臣充翰林學士當時親見先帝至誠求治嘗令臣草詔書以寬民力為意自王安石秉政變易舊法羣臣有論其非者便指以為沮壞法度必加廢斥自是清苗免役之法行而取民之財盡保甲保馬之法行而用民之力竭市易茶鹽之法行而奪民之利悉若此之類甚衆今陛下既已深知其弊至公獨斷不為衆論所惑則更張之際當須有術不在倉卒且如青苗之法但罷逐年比較其官司既不邀功百姓自免抑勒之患免役之法當少取寬剩之數度其差雇所宜無令下户虛有輸納上户取其財中户取其力則公私自然均濟保甲之法止令就冬月農隙教習仍只委本路監司提按既不至妨農害民則衆庶稍得安業無轉為盜賊之患如此三事並須别定良法以為長久之利至于保馬之法先朝已知有司奉行之繆市易法先帝尤覺其有害而無利及福建江南等路配賣茶鹽過多彼方之民殆不聊生俱非朝廷本意恐當一切罷去而南方鹽法三路保甲尤宜先革者也以上數事皆略陳大槩其他詳悉非書所能盡然臣所深慮者陛下必欲更修庶政使不驚物聽而實利及民莫若任人為急故臣前輒獻愚誠乞陛下廣開賢路選置臺諫官誠得忠正之士布在要職使求天下利害議所以更修之術朝廷上下協心同力斟酌而裁制之則天下不難為矣若不得其人則雖有欲治之意終不可以濟事功臣又竊慮議事者以謂若更張青苗助役等法則向去國用必至不足然自來提舉常平司等處錢物並係封樁自不許撥充軍國常費况今日正是息民省事之時既外不輕用兵革內無土木橫費自然國計易給兼罷得上件掊斂則民力以漸寬舒只如近日方罷導洛司堆垜場沿汴稅額已有增數此古人所謂百姓足君孰與不足者也是日又同上奏曰臣邇具手奏乞陛下廣開言路登用正人此最為當今急務臣尚慮陛下深居九重未能盡知人才輒敢冒陳愚見以助收採臣伏覩祕書少監孫覺方正有學識可以充諌議大夫或給事中直龍圖閣范純仁徑挺有風力可充諌議大夫或户部右曹侍郎使議青苗免役市易等法禮部侍郎李常清直有守可備御史中丞吏部郎中劉摯資性端厚可充侍御史承議郎蘇轍新授察官王巖叟並有才氣可充諌官或言事御史臣誠見陛下有意更張而闕人裨助故不避狂妄輒有論薦更乞聖慈詳擇太皇太后封公著劄子付司馬光詳所陳更張利害有無兼濟之才直書當與未當以聞光奏臣自公著到京止於都堂衆中一見自後未嘗私見及有簡帖往來公著所陳與臣所欲言者正相符合蓋由天下之人皆欲如此臣與公著但具衆心奏聞耳臣聞書曰有廢有興出入自爾師虞言同則繹言國家政事欲有所改更必先謀於衆人所言皆同然後行之則無失也𫝊曰上酌民言則下天上施言為人上者當采酌民言從其所欲則在下之人戴上如天受其恩施也伏望陛下察公著所陳參以臣所上實封奏狀若與之同者斷志行之勿復有疑臣見太平之功不日可見矣公著一言而天下受其利可謂有兼濟之才所言無有不當惟有保甲一事欲就農隙教習臣愚以朝廷既知其為害於民無益於國便當廢罷更安用教習容臣續具劄子奏聞光奏乃七月一日今并書之光又言昨僣妄上言用人等事尋凖御前劄子所奏職位卑微如堪大任者令具姓名奏入陛下推心於臣俾擇多士無復疑間臣承命惶恐惟懼不稱豈可阿私竊見吏部郎中劉摯公忠剛正始終不變龍圖閣待制知亳州趙彥若博學有父風內行修飭朝請郎傅堯俞清立安恬淹滯嵗久直龍圖閣知慶州范純仁臨事眀敏不畏强禦朝請郎唐淑問行已有耻難進易退祕書省正字范祖禹溫良端願修身無缺此六人者皆臣素所熟知節操堅正雖不敢言遽當大任若使之或處臺諌或侍講讀必有禆益其人或與臣有親或有過失臣竊慕古人內舉不避親不以一眚掩大德既䝉訪問不敢自避嫌疑致國家遺才自餘如新翰林學士吕大防兵部尚書王存禮部侍郎李常祕書少監孫覺右司郎中胡宗愈户部郎中韓宗道工部郎中梁燾開封府推官趙君錫新監察御史王巖叟朝議大夫知澤州晏知止十二月二十四日知止自澤改晋元年五月八日為梓路運副朝請大夫范純禮新知登州蘇軾知歙州績溪縣蘇轍承議郎朱光廷或以行義或以文學皆為衆所推伏臣雖與往還不熟不敢隱蔽伏望陛下紀其姓名各隨器能臨時任使然知人則哲自古所難况臣愚陋加以屏居嵗久與士大夫多不相接豈敢盡天下之賢才伏望聖慈博加採訪如文彥博吕公著馮京孫固韓維等皆國之老成可以倚信乞亦令各舉所知庶幾可以參考異同無所遺逸此奏得之雜録不著姓名其首云今月二十五日僣妄上言用推究本末蓋司馬光也但光集獨無此亦無二十五日所奏用人事當考知慶州范純仁言臣伏覩六月二十五日詔書應中外臣僚及民庶並許實封直言朝政闕失民間疾苦者有以見聖心求治之深也臣雖至愚不敢泯默竊以陛下方啓重熙之運布日新之政天下之人翹首以望至治固未覩夫闕政之可陳也所謂民間疾苦則陛下臨御之初聊整數事而百姓鼓舞歡呼者是也蓋在畿輦之下事理著眀者陛下得熟聞而更之其在僻逺幽微者則陛下莫得而聞矣固宜眀詔四方詢求之廣也然中外臣民猶未能深副聖意極有所陳者蓋民庶之愚雖有疾苦不能自言惟舉人胥吏有能言者又以利害不切於已而不言也臣僚則亦有不能言者或有所畏避而不言者矣有踈逺而謹靜者矣有怠於憂國愛人者矣有昔嘗言而今愧於言者矣如此者皆不言也儻非陛下深詔執事及羣有司使各罄其所聞自陳於上則懼聖詔將為空文而天下之情終不能盡也蓋向來朝廷修立法度付之有司以施於天下固欲便民而益國也如慈父寄食哺兒意豈有不善哉而哺者無愛兒之心不量飢飽多少之節曰惟知哺之而已不恤其他則兒不病而死者幾希矣今吏之行法者不恤民之利害惡欲曰惟知行法而已不恤其他則宜其百姓疲弊而無告也然則郡邑之弊守令知之一路之弊職司知之茶鹽利局民兵刑法差役之弊提其局及受其害者知之軍政之弊三帥與將領者知之邊防之弊守邊者知之伏望陛下特下眀詔內則敇六曹四司九寺三監三帥百司外則敇監司提舉提㸃邉臣牧守以至令佐監當曹掾各使條陳本職及所經歷之利害無或隱蔽曰某事利人益國可以興行某事煩擾勞費可以簡省某事蠧害公私可以釐革限一月內聞奏亦可因其所陳略知其人之才識然後陛下參命近侍與大臣審擇而行之流為霈澤被於萬方如此則朋龜獻兆庶績咸熙堯舜三代之政可不勞而成惟陛下留神省察特賜施行則天下幸甚六月二十五日求言純仁在慶州恐此日不能上疏更詳之
