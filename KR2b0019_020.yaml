body:
  text: 續資治通鑑長編巻十六宋李燾撰太祖開寶八年春正月丙子權知池州樊若氷敗江南兵四千人於州界初曹彬等師未出上命韶州刺史王明為黄州刺史面授方畧明既視事亟修葺城壘訓練士卒衆莫諭其意及彬等出師即以明為池州至岳州江路廵檢戰棹都部署辛巳明遣兵馬都監武守謙等領兵渡江敗江南兵萬餘人於武昌殺七百人㧞樊山寨十九日奏到是日行營左廂戰棹都監田欽祚領兵敗江南兵萬餘人於溧水斬其都統使李雄十九日奏到十國紀年李雄作張雄甲申王明言敗鄂州兵三百餘人於江南岸此但依實録據奏到日書之其㨗時當在去年末或今年初㧞樊山寨以前也乙酉上謂宰相曰古之為君鮮能正身自致無過之地朕常夙夜畏懼防非窒欲庶幾以德化人之義如唐太宗受人諫䟽直詆其失曽不愧恥豈若不為之而使下無間言哉為臣者或不終其名節而䧟於不義盖忠信之薄而獲福亦鮮斯可戒矣丙戌樊若氷遣兵馬監押王侁領兵敗江南四千餘衆於宣州界侁樸子也庚寅曹彬等進攻金陵行營馬軍都指揮使李漢瓊率所部度秦淮南取巨艦實以葭葦順風縱火攻其水寨㧞之斬首數千級初次秦淮江南兵水陸十餘萬背城而陣時舟楫未具潘美下令曰美提驍果數萬人戰必勝攻必取豈限此一衣帶水而不徑度乎遂率所部先濟王師隨之江南兵大敗江南復出兵將泝流奪采石浮梁美旋擊破之擒其神衛都軍頭鄭賔等七人潘美泰淮之㨗當在正月而實録與本紀載二月末亦不得其日盖因曹彬傳所載二月次秦淮故也彬及美傳載㧞水寨在㨗于秦淮之後然㧞水寨實録具載其日乃正月十七日也據此則當先載秦淮之㨗疑不敢決仍附見于後彬傳稱既㨗於秦淮浮梁始成按美先率所部渉水則秦淮盖不設浮梁浮梁當在采石磯也美傳又於秦淮既㨗之後始言采石浮梁成事愈顛倒然亦可見秦淮未嘗設浮梁而鄭賔等泝流實欲奪采石浮梁耳今畧加刪潤更俟考求癸巳命京西轉運使李符益調荆湖軍食赴金陵城下是月北漢主命劉繼業馬峰攻晋州武守琦敗之洪洞此據十國紀年二月丙午權知潭州朱洞遣兵馬鈐轄石曦領衆敗江南兵二千餘人於袁州西界曦太原人也十六日奏到朱洞未見癸丑曹彬等敗江南兵萬餘衆於白鷺洲斬首五千餘級擒百餘人獲戰艦五十艘十七日奏到乙夘㧞昇州關城守陴者皆遁入其内城殺千餘衆溺死者又千計天德軍都知兵馬使張進等九人來降十九日奏到初右諫議大夫叚思恭知揚州朝廷方欲經畧江南命思恭兼縁江廵檢出則委通判以州務而思恭常挈印及皷角金鉦等自隨驛書自京師至者輙令齎詣其所事多稽緩通判右贊善大夫李苕不能堪遂相與告訐付有司鞫之思恭詞不直丁巳責思恭為太常少卿苕為大理寺丞壬戌賜吳越王俶軍衣五萬副俾分給其行營將士癸亥權知揚州侯陟以所部兵敗江南千餘衆於宣化鎮甲子上謂宰相曰年榖登豐人物繁盛若非上天垂祐何以及此所宜共思濟給振舉闕政庶成開泰之基也丁夘知制誥王祜權知貢舉知制誥扈䝉左補闕梁周翰秘書丞雷德驤並權同知貢舉命權同知貢舉始此戊辰上御講武殿覆試王祜等所奏合格舉人王式等因詔之曰向者登科名級多為勢家所取致塞孤寒之路甚無謂也今朕躬親臨試以可否進退盡革疇昔之弊矣式等皆頓首謝於是内出詩賦題試得進士王嗣宗以下三十人諸科三十四人江南進士林松雷説試不中格以其間道來歸並賜三傳出身嗣宗汾州人也初授秦州司冦參軍時侍御史路冲知州事為政苛急盗賊羣起嗣宗乗間極言其失冲大怒縶嗣宗於獄又教民之無頼而嘗被罪者訟嗣宗治獄枉濫朝廷遣使者按劾具得訟者誣罔之狀以聞嗣宗始獲免記聞云冲令嗣宗對勾即捨之與此不同當考以手搏得狀元事載舉种放事時是月江南知貢舉户部員外郎伍喬放進士張確等三十人自保大十年開貢舉訖于是嵗凡十七牓放進士及第者九十三人九經一人此據十國紀年王師已至城下而貢舉猶不廢李煜誠不知務者故特書之三月戊寅召近臣宴射苑中壬午太子洗馬周仁俊責授平凉縣令坐知瓊州日販易規利故也乙酉幸造船務丁亥權知廬州邢琪領兵渡江至宣州界攻㧞義安寨斬首千餘級上性寛仁多恕尚食供膳有蝨緣食噐旁謂左右曰勿令掌膳者知嘗讀堯典歎曰堯舜之世四凶之罪止從投竄何近代憲網之宻耶盖有意於刑措也故自開寶以來犯大辟非情理深害者多貸其死己丑有司言自二年至今詔所貸死罪凡四千一百八人庚寅曹彬等敗江南兵三千餘衆於江中擒五百人癸巳命近臣祈雨於在京祠廟乙未太子中舎郭粲除名坐監萊蕪監受冶官景節私賂也己亥權知潞州藥繼能領兵入北漢界夜攻鷹澗堡㧞之斬首數千級獲馬八百匹契丹遣使克卜茂固舒蘇奉書來聘詔閤門副使郝崇信崇信未見至境上迓之及至館于都亭驛是日召見及其從者十二人賜衣帯噐幣各有差宴於長春殿仍召至便殿觀諸班騎射令其從者拉古爾綽和爾與衛士馳射毛毬截栁枝及辭歸國復召見賜噐幣因謂宰相曰自五代以來北敵彊盛盖由中原衰弱遂至晋帝䝉塵亦否之極也今景慕而至乃時運使然非凉德能致先是涿州遺孫全興書云遣使克卜茂固舒蘓至是發書但云克舒蘓或云克其官號也又曰其姓氏也壬寅遣中使王繼恩領兵數千人赴江南詔比者民輸租其紬絹不成疋者率三户至五户合成疋以送官頗為煩擾自今紬不滿半疋絹不滿一疋者計丈尺輸其直大食國遣使來貢方物夏四月乙巳幸東水磑王明言敗江南兵於江州界斬首二千餘級據十國紀年此乃三月事既無的日因奏到書之癸丑幸都亭驛臨河亭閱新戰船吳越兵圍常州刺史禹萬誠距守大將金成禮刼萬誠以城降吳越初起兵丞相沈虎子者虎子未見諫曰江南國之藩蔽今大王自撤其藩蔽將何以衞社稷乎不聽遂罷虎子政事命通儒學士崔仁冀代之總其兵要仁冀錢塘人也壬戌幸都亭驛臨汴觀飛江兵乗刀魚船習戰曹彬等言敗江南兵二千餘人秦淮北實録不載其發奏之日奏以二十日到因書之本紀又言克昇州闗城盖誤也克關城乃二月十二日矣戊辰幸玉津園觀種稻遂幸講武池觀習水戰廣州言竊盗贓滿五貫至死者凖詔當奏裁嶺表遐逺覆按稽滯請不候報決之上惻然曰海隅之俗習性貪冒穿窬攘竊乃其常也庚午詔廣南民犯竊盗贓滿五貫者止決杖黥面配役十貫者棄市幸西水磑是月教坊使衛德仁以老求外官且援同光故事求領郡上曰用伶人為刺史此莊宗失政豈可效之耶宰相擬上州司馬上曰上佐乃士人所處資望甚優亦不可輕授此軰但當於樂部遷轉耳乃命為太常寺大樂署令五月壬申朔加吳越王俶守太師以其子鎮海鎮東節度使惟濬同平章事寜逺節度使惟治為奉國節度使行軍司馬孫承祐為平江節度使行營兵馬都監丁德裕權知常州初兵部郎中董樞知桂陽監罷右贊善大夫孔璘代之璘罷太子洗馬趙瑜代之稱疾去以著作郎張侃代之侃至未幾奏璘在官累月得羡銀數十斤雖送官而不具數計樞與璘所隠沒多矣詔御史府鞫之獄具有司言法皆當死上曰趙瑜非自盗但不能發摘耳璘與樞並棄市瑜決杖流海島以侃為屯田員外郎張侃未見庚辰以解州刺史王政忠權知晋州兼兵馬鈐轄政忠未見疑政忠實代武守琦者欲推尋守琦事跡姑書此以待考詳世言太祖義社十兄弟政忠盖其一人也并當檢討辛巳以久雨命近臣祈晴於在京祠廟改雄逺軍為平南軍甲申吳越王俶言江隂寜逺軍及縁江諸寨皆降幸新修染院梅山峒蠻聞江表用兵乗間冦潭邵州乙酉詔潭州長沙等七縣民為蠻賊擄劫者蠲去年逋租仍給復一年尋詔邵州武岡等七縣亦如之上初遣供奉官李繼隆以進武三百人戍邵州止給刀楯至潭州州之南蠻數千遮截其道繼隆力戰蠻乃遁去手足俱中毒矢兵傷者百餘或告上以繼隆輕敵可罪者已而具得其實上始噐焉繼隆處耘之子也甲午靜海節度使丁璉遣使來貢方物丁酉王明言破江南萬餘衆於武昌奪戰艦五百艘己亥開封府言京城諸官司獄空無繫囚辛丑河決濮州郭龍村詔商人以生藥度嶺者免筭王偁東都事畧詔曰嶺表之俗疾不呼醫自皇化攸及始知方藥商人齎生藥度嶺者勿筭初陳喬張洎為江南國主謀請所在堅壁以老王師師入其境國主弗憂也日於後苑引僧及道士誦經講易髙談不䘏政事軍書告急非徐元楀等皆莫得通師薄城下累月國主猶不知時宿將皆前死神衛統軍都指揮使皇甫繼勲者暉之子也暉初見乾祐六年年尚少國主委以兵柄繼勲素貴驕初無効死意但欲國主速降而口不敢發每與衆言輙云北軍强勁誰能敵之聞兵敗則喜見顔色曰吾固知其不勝也繼勲從子紹傑以繼勲故亦為廵檢使親近繼勲嘗令紹傑宻陳歸命之計國主不從偏禆有募敢死士欲夜出營邀王師者繼勲必鞭其背拘囚之由是衆情憤怒又託以軍中多務罕入朝謁國主召之亦不時至是月國主自出廵城見王師列寨城外旌旗滿野知為左右所蔽始驚懼乃收繼勲付獄責以流言惑衆及不用命之狀并紹傑殺之軍士争臠割其肉頃刻都盡繼勲既誅凡兵機處分皆自澄心堂宣出實洎等專之也於是遣使召神衞軍都虞候朱令贇以上江兵入援令贇業之子也業初見顯德三年擁十萬衆屯湖口諸將請乗漲江速下令贇曰我今進前敵人必反據我後戰而㨗可也不㨗糧道且絶其為害益深矣乃以書召南都留守柴克貞使代鎮湖口克貞先已病遷延不行令贇亦不敢進國主累促之令贇不從克真再用子也再用初見乾寜二年六月癸夘曹彬等言敗江南兵二萬餘衆於其城下奪戰艦數千艘丁未宋州觀察判官崔約録事參軍馬休棄市並坐受賕不法也辛亥澶州言河決頓丘縣界辛酉前鳳翔節度使太師兼中書令魏王符彦卿卒輟三日朝官給塟事彦卿武勇有謀善用兵契丹自陽城之敗尤畏彦卿或馬病不飲齕必唾而呪曰是豈有符王耶契丹既滅晋北歸耶律德光母問其左右曰彦卿安在或對曰在徐州母曰不與彦卿來何失䇿之甚也甲子彗出柳長四丈晨見東方西南指歴輿鬼距東壁凡十一舎八十三日乃沒己巳賜秘書丞雷德驤錢十萬以子有鄰病死故也秋七月辛未朔日有食之先募民告官吏隠欺額外課利者賞以錢而告者或恐喝求財或因報私怨訴訟紛然益為煩擾癸酉詔罷之丙子開封府又言京城諸官司獄皆空無繫囚詔諸州所上案牘令大理寺刑部共裁斷以聞諸道廵檢捕盗使臣凡獲冦盗不得先行考訊即送所屬州府丁丑廬州無為鎮廵檢杜光俊言敗宣州兵三百餘人於江南岸庚辰遣西上閤門使郝崇信太常丞吕端使于契丹端餘慶之弟也初江南㨗書累至邸吏督李從鎰入賀潘慎修以為國且亡當待罪何賀也自是羣臣稱慶從鎰即奉表請罪上嘉其得禮遣中使慰撫供帳牢餼悉從優給壬午復命李穆送從鎰還其國手詔促國主來降且令諸將緩攻以待之癸未西大東印土王子讓濟什喇卜來朝貢此據新録當考先是詔吳越王俶歸其國俶以兵屬其大將烏程沈承禮隨王師進討甲申遣使入貢謝恩髙州刺史田景遷卒其子牙内都指揮使彦伊來告己丑即命彦伊襲其父為刺史癸己皇子德芳出閤己亥山後兩林鬼主懷化將軍勿兒等六十餘人來貢方物以勿兒為歸德將軍左司員外郎權知揚州侯陟受賕不法為部所訟追赴京師陟素善參知政事盧多遜自度繫獄必窮屈乃私遣人求哀於多遜時金陵未㧞上頗厭兵南土卑濕方秋暑軍中又多疾疫上議令曹彬等退屯廣陵休士馬以為後圖多遜爭不能得㑹陟新從廣陵來知金陵危蹙多遜教令上急變言江南事陟時被病上令皇城卒掖入見即大言曰江南平在朝夕陛下奈何欲罷兵願急取之臣若誤陛下請夷三族上屏左右召升殿問狀遽寢前議赦陟罪不治八月甲辰復以陟判吏部流内銓或云己發詔罷兵因陟言始命追還盖誤也時方有此議耳朝廷以丁璉逺修職貢本其父部領之意始議崇寵之丙午封部領為交趾郡王遣鴻臚少卿髙保緒右監門衛率王彦符徃使保緒繼沖從父也江南吉州刺史胡公覇脫身來降以公覇為和州刺史乙夘幸東水磑觀漁遂幸北園辛酉詔停今年貢舉壬戌契丹遣左衛大將軍耶律覇德弓箭庫使雅勒呼通事左監衛將軍王英來聘獻御衣玉帶名馬上皆厚賜之因令從獵近郊上親射走獸矢無虚發使者俯伏呼萬嵗私謂譯者曰皇帝神武無敵射必命中所未嘗見也西南蕃三十九部順化王子若廢等三十七人來貢馬及丹砂左驍衛上將軍致仕李洪信卒洪信無他才術徒以漢外戚致位將相好聚歛積財鉅萬而尤吝嗇當時節鎮皆廣募親兵惟洪信所畜殊寡少癸亥丁德裕言敗江南兵五千餘人於潤州城下時德裕與吳越兵圍潤州也是月以南頓縣令楊可法為鄭州防禦推官權知軍州事此據㑹要九月壬申上獵于近郊逐兎馬蹶而墜引佩刀刺所乗馬既而悔之曰吾為天下主而輕事畋遊非馬之過也自是遂不復獵矣此月壬申出獵自是遂不復出獵因附見此事王師初起江南以京口要害當得良將侍衛都虞候劉澄澄未見舊事藩邸國主尤親任之乃擢為潤州留後臨行謂曰卿本未合離孤孤亦難與卿别但此非卿不可副孤心澄泣涕奉辭歸家盡輦金玉以徃謂人曰此皆前後所賜今國家有難當散此以圖勲業國主聞之喜及吳越兵初至營壘未成左右請出兵掩之時澄已懷鄉背乃曰兵勝則可不勝立為虜矣救至而後圗戰未晚也國主尋命凌波都虞候盧絳自金陵引所部舟師八千突長圍來救絳至京口舎舟登岸與吳越兵戰吳越兵少却絳方入城圍復合固守踰月自相猜忌澄已通降欵慮為絳所謀徐謂絳曰間者言都城受圍日急若都城不守守此亦何為絳亦知城終䧟乃曰君為守將不可棄城而去宜赴難者唯絳可耳澄偽為難色久之曰君言是也絳遂潰圍而出初絳怒一禆將議殺之未決澄私謂曰盧公怒爾爾不生矣禆將泣涕請命澄因曰吾有一言告爾非徒免死且得富貴因諭以降事令先出導意禆將曰某家在都城將奈何澄曰事急矣當自為謀我家百口亦不暇顧矣於是禆將踰城而出絳猶未知明日澄與絳同食主兵者來告澄作色曰吾謂公已斬之矣何得令逃也絳已去澄徧召諸將卒告曰澄守城數旬志不負國事勢如此湏為生計諸君以為如何將卒皆發聲大哭登懼有變亦泣曰澄受恩固深於諸君且有父母在都城寜不知忠孝乎但力不能抗爾諸君不聞楚州耶初周世宗圍楚州久不下既克盡屠之故澄以此脅衆戊寅澄帥將吏開門請降潤州平絳聞金陵危甚乃趨宣州日夕酣飲為樂或勸赴難皆不答乙酉除名人宋惟忠棄市坐私習天文妖言利害為其弟惟吉所告故也丁德裕部送潤州降卒數千人赴昇州城下卒多道亡曹彬發檄招誘稍稍來集慮其為變又盡殺之庚寅彬等言敗潤州潰卒數千人於昇州斬首七百級丁酉以相州録事參軍河南錢文敏為右贊善大夫權知瀘州先是藩鎮多以筆牘私取官庫錢韓重贇領昭德時頗仍舊弊文敏不與重贇怒召文敏廷責之文敏詞不屈重贇既死上始聞其事嘉文敏有守故擢用焉且召見便殿謂文敏曰瀘州近蠻尤宜綏撫知州郭重遷掊歛不法恃其僻逺謂朝廷不知爾至即為朕鞫之茍有一毫侵民朕必不赦因厚賜遣行重遷竟坐棄市文敏在州有政迹夷人詣闕借留詔改殿中丞聽再任是月始發和州三縣丁夫鑿横江河以通糧道從京西轉運使李符之䇿也初李從鎰至江南諭上㫖國主欲出降陳喬張洎廣陳符命以為金湯之固未易取也北軍旦夕當自退矣國主乃止李穆既還上復命諸將進兵及潤州平外圍愈急始謀遣使入貢求緩兵按實録李從鎰以八月十二日還其國使入貢求緩兵不知初發江南是何時用十月一日到京師則當是九月半以後也九月半以後從鎰無縁不在江南矣而煜傳載煜手書附周惟簡奏上者其辭有云在京二弟恤養優豐據此則似從鎰與從善俱未嘗還也從鎰既還而此書亦無一言及之不知何故或者李穆歸朝煜已具謝此特追感從鎰未還時并䝉恤養故耶然李穆再使江南其歸也煜亦當有以復命而史絶不記盖踈畧矣今且參考諸書畧加修潤更俟詳之道士周惟簡者鄱陽人隠居洪州西山國主召之館於紫極宫常以冠褐侍講周易累官至虞部郎中致仕於是張洎薦惟簡有逺畧可以談笑弭兵鋒復召為給事中與修文館學士承㫖徐鉉同使京師時國主屢督朱令贇舉湖口兵來援謂鉉曰汝既行即當止上江援兵勿令東下鉉曰臣此行未必能排難解紛城中所恃者援兵爾奈何止之國主曰方求和好而復召兵自相矛盾於汝豈不危乎鉉曰要以社稷為計置臣於度外耳國主泣下即拜左僕射參知左右内史事鉉固辭國主又以惟簡雅素髙尚不近榮利親寫十數紙題為奏目令惟簡乗間求哀欲謝政養病冬十月己亥朔曹彬等遣使送鉉及惟簡赴闕鉉居江南以名臣自負其來也將以口舌馳説存其國其日夜計謀思慮言語應對之際詳矣於是大臣亦先白上言鉉博學有才辯宜有以待之上笑曰第去非爾所知也既而鉉朝于庭仰而言曰李煜無罪陛下師出無名上徐召之升殿使畢其説鉉曰煜以小事大如子事父未有過失奈何見伐其説累數百上曰爾謂父子者為兩家可乎鉉不能對惟簡尋以奏目進上覽之謂曰爾主所言我一不曉也上雖不為緩兵然所以待鉉等皆如未舉兵時壬寅鉉等辭歸江南按實録徐鉉周惟簡凡兩至京師五代史及談苑太祖對鉉辭有不同今以五代史所載附之初見時談苑所載附之後見時上初荅惟簡但云不曉爾主所言後遂詰責之初猶以理折鉉後乃直加威怒其事勢或當然也更須考詳辛亥詔諸道州府下屬邑令位令佐下鄉里耆艾察民有孝悌力田竒才異行或文武才幹堪備任用年二十以上五十以下者傳送赴闕乙夘遣使檢視京畿逃民丁巳江南國主復遣使入貢求緩師不知所遣何人當考遣莊宅使王仁珪内供奉官李仁祚與知河南府焦繼勲同修洛陽宫室上始謀西幸也實録本紀皆云遣内班都知叚仁誨其後推恩則王仁珪李仁祚也不知何故今從㑹要及焦繼勲傳仁珪仁祚俱未見戊午改潤州鎮海軍為鎮江軍朱令贇自湖口以衆入援號十五萬縛木為筏長百餘丈戰艦大者容千人順流而下將焚采石浮梁王明率所部兵屯獨樹口遣其子馳騎入奏且請增造戰船三百以襲令贇上曰此非應急之䇿也令贇朝夕至金陵之圍解矣乃宻遣使令明於洲浦間多立長木若帆檣之狀令贇望見疑有伏即稍逗遛時江水淺涸不利行舟令贇獨乗大航髙十餘重上建大將旗幡至皖口行營歩軍都指揮使劉遇聚兵急攻之令贇勢蹙因縱火拒鬭㑹北風甚火反及之其衆悉潰己未生擒令贇及戰棹都虞候王暉等獲兵仗數萬金陵獨恃此援由是孤城愈危蹙矣本紀及劉遇傳皆云擒令贇皖口王明傳乃云小孤山江南野録又云虎踞洲未知孰是今從本紀及劉遇傳監察御史劉蟠性清介寡合能攻苦食淡頗任數設詐以倖人主之遇蟠時領染院乙丑車駕臨幸蟠伺上將至輙衣短後衣芒屩持梃親督役頭蓬不治遽出迎謁上以為能勤其官賜錢二十萬上自染院移幸晋王北園賜從臣飲極懽而罷十一月己巳朔瓊州言俗無醫民疾病但求巫祝詔以方書本草給之邕州之右江生毒藥樹宣化縣人常採貨之知州侯仁寶奏其事詔盡令伐去仁寶益之子也舊録以己巳為十月晦今從新録及本紀先是武勝節度使張永德貢馬賀潤州平馬皆老病有司劾奏永德上表待罪庚午詔釋不問永德聞王師南伐出家財作戰船數十艘運糧數萬斛自順陽縁漢水而下州豪髙進者舉族凶暴前後莫能禁永德發其姦寘于法進濳詣闕誣永德據險固置十餘砦將圖不軌上遣使察之使者詰進置砦之所進辭窮乃曰張侍中誅吾宗黨殆盡欲中傷之以報私怨爾實未嘗置砦也使者還白上上曰吾固知張道人非反者也即以進授永德永德遽解其縛就市笞而釋之時稱其長者永德舊喜與方士遊家貲為之罄乏上故以道人目焉永德傳云遣樞宻都承㫖曹翰領騎兵察置砦之所既無有翰即以告者付永德按傳載此事與王師討金陵相連屬曹翰時實將先鋒安得至唐鄧間也且方察其砦之有無安用便領騎兵不亦張皇生事乎且不應即以告者付永德恐傳必誤今輙刪改之更須考詳徐鉉及周惟簡還江南未幾國主復遣入奏辛未對於便殿鉉言李煜事大之禮甚恭徒以被病未任朝謁非敢拒詔也乞緩兵以全一邦之命其言甚切至上與反覆數四鉉聲氣愈厲上怒因按劔謂鉉曰不許多言江南亦有何罪但天下一家卧榻之側豈容他人鼾睡乎鉉惶恐而退上復詰責惟簡惟簡益懼乃言臣本居山野非有仕進意李煜强遣臣來耳臣素聞終南山多靈藥它日願得棲隠上憐而許之仍各厚賜遣還是日幸綾錦院召從臣宴射苑中戊寅初置三司推勘院以將作監丞張邈知院事尋罷之契丹雲州節度使當考其名氏遣人致書瀛州願與防禦使馬仁瑀通好仁瑀以書來上庚辰王明言敗江南兵萬餘人於湖口獲戰艦五百艘兵仗稱是先是曹彬等列三寨潘美居其北以圖來上上視之指北寨謂使者曰此宜深溝自固江南人必夜出兵來冦爾亟去語曹彬等併力速成之不然終為所乗矣賜使者食且召樞宻使楚昭輔草詔令徙置戰棹以防它變使者食已即行彬等承命自督丁夫掘塹塹成丙戌江南人果夜出兵五千襲北寨人持一炬皷譟而進彬等縱其至乃徐擊之皆殱焉其將帥佩符印者凡十數人是日命校書郎直史館宋凖賀契丹正旦殿直邢文度副文度未見王師圍金陵自春徂冬居民樵采路絶兵又數敗城中奪氣曹彬終欲降之故每緩攻累遣人告國主曰此月二十七日城必破矣宜早為之所國主不得已約先令其子清源郡公仲寓入朝既而久不出前數日彬日遣人督之且告曰郎君不須逺適若到寨即四面罷攻矣國主終惑左右之言以為城堅如此豈可尅日而破但報云仲寓趣裝未辦宫中宴餞未畢二十七日乃可出也彬又遣人告曰若二十六日出亦無及矣國主不聽先是上數因使者諭彬以勿傷城中人若猶困鬬李煜一門切無加害吕祖謙宋朝大事記自古平亂之主其視降王不啻仇讐而我太祖待之極其恩禮劉鋹巵酒飲之釋疑李煜一門戒無加害故僭偽之豪悉得保全老死於牗下自古攻取之主其視生民殆若草菅而我太祖待之曲加存撫江南興師不戮一人平蜀多殺每以為恨故新集之衆不啻如赤子之仰父母仁心仁聞三代而下未之聞也於是彬忽稱疾不視事諸將皆來問疾彬曰余之病非藥石所愈須諸公共為信誓破城日不妄殺一人則彬之病愈矣諸將許諾乃相與焚香約言既畢彬即稱愈乙未城䧟初陳喬張洎同建不降之議事急又相要以同死社稷然洎實無死志於是擕妻子及橐裝入止宫中引喬同見國主喬曰臣負陛下願加顯戮若中朝有所詰問請以臣為辭國主曰運數已盡卿死無益也喬曰陛下縱不殺臣臣亦何面目以見國人乎遂縊洎乃告國主曰臣與喬共掌樞務今國亡當俱死又念陛下入朝誰與陛下辨明此事所以不死者將有待也國史張洎傳言洎約陳喬同升閤喬自縊洎視喬氣絶乃下而談苑載喬縊于視事㕔洎猶不知國史盖因九國志陳喬傳所云恐九國志未可信也洎既已背約不死亦何待喬氣絶乃下閤乎談苑又言國主求喬不得或告洎以為喬己北降明年乃得喬尸按此則所云同升閤者繆甚矣今參酌修潤庶免牴牾大抵城破時洎與喬猶同見國主請如前約喬遂死而洎不死耳洎固不能死所以同見國主者度國主必不許其死也彬整軍成列至其宫城國主乃奉表納降與其羣臣迎拜於門即選精卒千人守其門外令曰有欲入者一切拒之始國主令積薪宫中自言若社稷失守則盡室赴火死及見彬彬慰安之且諭以歸朝俸賜有限費用至廣當厚自齎裝既為有司所籍一物不可復得矣因復遣煜入宫惟意所欲取行營右廂戰棹都監梁迥及田欽祚等皆諫曰茍有不虞咎將誰執彬但笑而不荅迥等力爭不已彬曰煜素無斷今已降必不能自引決可亡慮也又遣五百人為輦載輜重煜方憤歎國亡無意蓄財所操持極鮮頗以黄金分賜近臣獨右内史學士張佖不受詣彬自陳願奏其事彬謂佖邀名不許但取金輸之官彬既入金陵申嚴禁暴之令士大夫頼彬保全各得其親屬為軍士所掠者即時遣還之因大蒐于軍無得匿人妻女倉廪府庫委轉運使許仲宣按籍檢視彬一不問紀事本末振之絶恤鰥寡仁人之心無所不至吳人大悦師旋舟中惟圖籍衣衾而已新隆興寺成凡五百六十三區丙申車駕臨視十二月己亥朔江南㨗書至凡得州十九軍三縣一百有八户六十五萬五千六十有五羣臣皆稱賀上泣謂左右曰宇縣分割民受其禍思布聲教以撫養之攻城之際必有横罹鋒刄者此實可哀也即詔出米十萬石賑城中饑民李繼隆善馳驛日四五百里自江南兵起數徃來嘗部送偽將赴闕至項縣㑹其疾斬首以獻上嘉之又從李符督荆湖漕運與江南人鬭流矢中額所冠胄堅厚得不傷上察其材且念其父故欲㧞用之謂曰昇州平可持㨗書來當厚賞汝時軍中使臣内侍凡十數軰皆伺城䧟獻㨗㑹有機事當入奏皆不願行繼隆獨請赴闕上見其來知城未下甚訝之繼隆度金陵破在旦夕因言半途遇大風天地晦㝠此城破之兆也㨗書明日當至矣於是上召繼隆曰正如汝所料庚子上臨惠民河觀軍人築堰辛丑赦江南管内州縣常赦所不原者偽署文武官吏見釐務者並仍其舊曽經兵戈處百姓給復二年不經兵戈處給復一年諸色人及僧道被驅率為兵者給牒聽自便令諸州件析舊政賦歛煩重者蠲除之軍人俘獲生口年七嵗以上官給絹五疋贖還其家七嵗以下即還之又詔不得侵犯李煜父祖邱壠令太子洗馬河東吕龜祥詣金陵籍李煜所藏圖書送闕下丁未以楊克讓權知昇州㝷兼水陸計度轉運事明年二月始兼漕事今并書之戊申三佛齊國遣使來貢方物己酉幸龍興寺辛亥賜京畿諸縣民今年秋租十之三己未以恩赦侯劉鋹為左監門衛上將軍封彭城郡公去恩赦侯之號户部員外郎知制誥王祜判門下省與判吏部流内銓侯陟不協陟所注擬祜多駁正陟訴於盧多遜多遜初為學士隂傾宰相趙普累諷祜助已祜不聽謂多遜曰昔唐宇文融與張説有隙為融所䜛而出説復集賢融遂敗因以傳示多遜且勸釋之多遜不悦癸亥祜坐陟事黜為鎮國行軍司馬司馬日記云祜坐以百口保大明節度使符彦卿非䟦扈逆上意故貶盖誤也開寶二年彦卿已徙鳯翔祜貶時彦卿死矣甲子契丹遣右衛大將軍耶律烏鎮禮賔使蕭呼嚕固通事左千牛衛將軍陳延正來賀明年正旦先是上嘗召吳越進奏使任知果令諭㫖於其主俶曰元帥克毗陵有大功俟平江南可暫來與朕相見以慰延想之意即當復還不久留也朕三執圭幣以見上帝豈食言乎崔仁冀亦告俶曰主上英武所向無敵今天下事勢已可知保族全民策之上也俶深然之丁夘俶請赴長春節朝覲詔許之是嵗詔貢士之下第者特免將來請解許直詣貢部令諸州凡逮捕罪人必以白長吏所由司不得直牒追攝詔有司重詳定推狀條様頒于天下凡三十三條御史臺開封府諸路轉運司或命官鞫獄即録一本付之州府軍監長吏及州院司冦院悉大字掲於板置聽事之壁本志云二事皆在八月今并繫之嵗末秦州戎人大石小石族冦土門畧居民知州張柄擊走之張柄未見周廣順中㸃秦州税户充保毅軍教習武技逃死即以佃地者代之遇征役官給口糧有馬給芻菽是嵗發渭州平源潘原二縣民治城壕既畢因立為保毅軍弓箭手分戍鎮寨能自置馬者免役逃死者以親屬代焉盖因廣順之制也此據兩朝兵制
