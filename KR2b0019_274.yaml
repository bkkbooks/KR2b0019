body:
  text: 續資治通鑑長編巻二百七十宋李燾撰神宗熈寧八年十一月己未朔復光禄卿提舉崇福宫祖無擇為祕書監集賢院學士祖無擇當立傳而史官逸其事須别考詳詔倚閣辰沅州今年秋稅以察訪蒲宗孟言二州夏旱故也詔熈河路兵食吏俸日告闕乏而蕃學之設冗費為甚無補邊計可令罷之其教授令赴闕蕃部子弟放逐便又詔每歳天神四祭太廟五享差兩省以上官攝司徒庚申詔五路緣邊堡鋪守把兵級輪出廵及卓望伏路等遇冬寒舊無皮裘處令特製造人給一領至春煖拘收官為修完熊本言攻破獠賊駱益王本二等七寨木斗翁等四囤獲老㓜婦女百三十三人斬首六十六其木斗翁等四十八人來降乞許令引見詔木斗翁與奉職安穏二與借職木斗七等十一人與京東西州軍教練使給月俸安李四等十二人送京東西淮南州軍安置各給田二頃仍許口支糧三年舊紀云熊本破獠駱益等七寨四囤新紀不書留熊本集紀險篇云十月二十日自渝州領兵入界南平軍凢六十日九年正月六日旋師同判司農寺張諤言按察官廵歴州縣决罸役人乞令州縣籍所犯及杖數以備本寺㸃檢庶使官吏不敢以私忿用刑從之壬戌上批聞在京諸軍官馬大抵生惡盖營地廹窄失於調習近已創四教塲寛大可以馳騁宜指揮殿前馬軍司分定軍馬合赴教馬軍日輪一指揮以馬赴塲走驟百十反令本教使臣押領各給印紙書赴教月日上批付韓縝等聞禧潁近已離麻谷鋪北往靈邱縣去觀北人之意必是别處移牒或遣使促議卿等宜更就彼斟酌人情方便覊縻留連勿使悻然絶議北去却恐意外别致生事朝廷難為酬荅此㨿兩朝誓書冊内十一月初四日御札癸亥樞密使吳充言聞汴水凌牌擁遏京城中今河道已凍合慮恐隄防别有踈虞乞詔都水監速閉汴口上批依今晚指揮令判監一員徃汴口監督連夜閉塞無信妄說利害小有遷延尋又詔聞汴口嘗有不閉口指揮致無准備其令歳備閉口材料毋得誤事毋得誤事乃十二日詔今并書此可附見記聞所載復命侯叔獻開訾家口亦不罪叔獻事迹然吴充乃憂不閉口致踈虞記聞則謂開訾家口免阻絶利害殊不同當考甲子冬至不受朝丁卯新知河南府右諫議大夫馮京為資政殿學士知渭州及京赴闕特遣内侍宣賜茶藥特遣内侍賜茶藥㨿御集九年正月事今附見戊辰趣溫杲赴闕此㨿御集己巳熈河路經畧司言蕃部星斯珪昨因作過所棄地百六十餘頃欲遷部落居之其地距通逺軍約二百餘里既逺西界可絶姦細藏匿兼可控制羅斯結討蕩遺類從之御史蔡承禧言乞下越州究治方澤不可言之醜行詔兩路轉運司體量承禧言已見八月十六日至是乃有體量之命故實録始書廣西經畧司言諜報交趾廣源州集鄉兵欲圖入冦又言古萬峒為蠻賊攻劫詔與賊戰有功人速以名聞被焚畧之家量與存恤九月十五日冦古萬峒庚午祕書丞胡宗回言昨任将作監丞差徃澶州北京督視修倉期以二年今将畢工其澶州北京新舊倉共可貯糓四百萬石如數足自可給分屯軍馬支費其餘乞罷修從之二月已卯可考太子中舍李把進熈河路新折二錢様㑹要辛未御史陳睦以病乞免臺職從之睦前任兩浙路提㸃刑獄違法買女奴及朋附吕惠卿不按贓吏張若濟見被劾也都提舉市易司言昨遣劉佐體量川茶因便結糴熈河路軍儲得糓七萬餘石詔運致給本路又詔都提舉市易司錢見在熈河路者並充本路軍需仍具數以聞遣中使趣發永興軍路鑄錢監折二錢十萬緡應副熈河路糴買糧草又詔契勘陜西鑄錢監見在折二銅錢及封樁交子本錢確的有若干貫萬速契勘進呈又詔髙遵裕累奏熈河闕錢糧轉運司不應副令具析以聞又詔河東路災傷州縣第三等以下户所貸豆麥種與倚閣并所欠倚閣和糴並候次年豐熟依料次輸官壬申令睦州鑄錢監以神泉為名甲戌詔在京應有刑禁處並置獄床中書言川茶元法於茶稅并息錢内歳認定應副熈河博馬及糴買糧草乞令提舉買茶官歳給熈州岷州大竹并洋蜀州茶各三百䭾復於茶塲司應副糧草數内除豁從之永興軍等路轉運司言諸州軍糴買糧草總五百餘萬本司見闕乏乞借錢三十萬緡詔以交子本錢十萬緡給之上批永興秦鳳等路縁邊出交子糴買糧草有折錢多處交子毋得出多時以交子出多而錢不足給致價賤虧官故也乙亥詔一司一務一路一州一縣勑有稱當行極斷决配之類並改為徒二年以舊一司等𠡠參用嘉祐海行勑如此之類並以違制論而熈寧𠡠乃刪去其文法官無刑名可守至是三司檢法官王振為言而降是詔樞宻院擬差内殿承制謝季成充夔州路體量安撫司准備将上批昨熊本奏已部分八界討蕩計今當遂旋師恐季成至必不及事可勿復遣謝季成丙子詔聞通逺秦隴鳳翔永興等州軍屯駐并過徃及馬遞鋪兵所請糧官坐倉糴數過多反致日食不足復増價買於民間令提㸃刑獄司下本路究實以聞其後提舉官杜常惟體量到寜州常預借振武等指揮一月軍糧坐倉全糴入官永興并陜府閺鄉縣亦嘗坐倉收糴詔令提㸃刑獄司取勘違法官吏聞奏内寜州别聼㫖又詔依舊額募壯役兵九指揮每指揮五百人從将作監請也詔自今差官出外己支賜者毋給驛券願請驛券者不支賜中書言欲許令發運司截借諸路上供省錢并赴内藏庫錢各一百萬緡為糴本其内藏庫錢均三年撥還從之丁丑詔江東路累年災傷州縣第三等以下户今年秋稅放及八分夏稅殘欠並與倚閣仍具已倚閣稅數以聞上批契勘河北東西河東路見管義勇保甲確實人數進入陜西兩路候編排訖准此戊寅交趾陷欽州後三日又陷廉州欽州十二月二十日奏到廉州十二月二十二日奏到已卯命輔臣祈雪奉禮郎提舉兩浙常平舒亶為太子中允權監察御史裏行工部郎中秘閣校理同修起居注直舍人院錢藻罷直舍人院御史中丞鄧綰言馮京為性庸狠朋邪徇俗疾害聖政陛下寛仁不誅守藩未幾復移邊帥而藻代陛下作訓誥乃稱京執正不回一節不撓又云大臣進退係時安危京在政府曽無補益惟退有後言何謂一節且京罷政踰歳豈嘗有危藻專事諂諛乞加黜責上從之綰知王安石惡京又恐京復用故為此以附㑹安石也此㨿司馬記聞及魏泰東軒録泰又云綰希合吕惠卿按此時惠卿已去位矣庚辰樞宻使吴充言熈河展置今且四年經畧雖定然軍食一切猶仰東州轉車輓運則人力不給置塲和糴則猾民得以乗時要價以困公上二者之患其敝在於未有土地之入謹按漢唐實邊之䇿屯田為利近聞鮮于師中建請朝廷以既置弓箭手重改作故令試治百頃而已然屯田行之於今誠未易臣以為莫若因令弓箭手以為助田古者一夫百畆又受田十畆以為公田且以熈河四州較之無慮萬五千頃十分取一以為公田大約中歳畆收一石則公田所得十五萬石水旱肥瘠三分除一可得十萬石其便有六官無營屯牛具廪給之費一也借於衆力民不為勞二也大荒不收官無損焉三也省轉輸四也平糴價使猾民不能持輕重之權五也减和糴之數得其錢以移他用六也詔如充奏詳具條畫以聞於是充建請受田大約十頃置公田一頃令受田衆户共力耕穫夏田種麥秋田種粟豆委城寨使臣兼管勾詔遣太常寺主簿黄君俞與熈河路提㸃刑獄鄭民憲商議推行次第以聞後民憲等言弓箭手並新招置深在羗境連歳災傷未甚安若令自備功力種子耕佃公田慮人心動揺不能安處乞候稍稔推行從之朱本削墨本此年十一月二十二日所書却於明年正月十二日畧載新本乃兩存之殊為錯誤今但依墨本載於此仍取朱本明年正月十二日所書稍増入之辛巳開封府請京城内外老病孤㓜無依乞丐者遇大寒風雪委本府選差官并職員齎錢於新舊城門相國寺給散内有凍殍疾患不能赴集者量支錢救濟從之詔責降見丁憂人許用赦叙復此㨿御集第二十八巻七年十二月十一日又九年十月六日可考蔡承禧云云或附此壬午詔陜西諸路緣邊團蕃兵並選年二十以上本户九丁以上取五丁六丁取四丁四丁取三丁三丁取二丁二丁取一丁並刺手背人數雖多毋過五丁每丁十人置一十将随本族人數及五十人置一副兵馬使及百人置一軍使一副兵馬使及二百人置一軍使三副兵馬使及三百人置一副指揮使二軍使三副兵馬使及四百人加一軍使一副兵馬使及五百人又加一指揮使一副兵馬使毋過五百人每百人加一軍使一副兵馬使即一族不及五十人者三十人以上亦置一副兵馬使不及二十人止置十将每月除請受外别給添支錢指揮使一千五百副指揮使一千軍使七百副兵馬使五百十將三百陜西舊有蕃兵頗可扞邉然取丁不均且無部分至是始立法而降是詔本志與實録同舊紀書立陜西路蕃兵部伍取丁法新紀不書又詔自今臣僚不得奏乞諸司吏充指使出外以樞宻院言諸司吏或有行倉法處請給甚厚而反規避本役干求臣僚奏帯出外仍請舊禄妨廢諸司事務宜禁止之故也癸未右諫議大夫集賢院學士宋敏求為龍圖閣直學士右司郎中知制誥陳襄為樞宻直學士先是知制誥鄧潤甫言近者羣臣專尚告訐此非國家之美宜登用淳厚之人以變風俗上嘉納之居數日敏求及襄有是命此㨿司馬紀聞敏求以四年九月十八日為直學士十年五月九日修史潤甫言乞用恬黙持重之人蔡承禧奏議可考或刪取増入承禧奏今别見九年十月末甲申熈河經略司言熈州官員職田乞聼自募人耕種罷支折鹽鈔從之遣勾當御藥院李舜舉徃河東分畫地界所勾當公事此據御集右龍武軍大將軍楚州團練使世開領洺州防禦使初大宗正司言世開學行修潔上召見手詔世開資性俊敏少勤于學可依仲銑例遷一官故有是命世開嘗言袒免女與進納之家為㛰姻明立要約有同鬻賣玷辱國風乞下大宗正司㸔詳施行不聼朱本削去袒免女㛰姻事云取㑹到係告示本人不行今復存之十年九月壬子始降詔開封府言故相王曽子繹等分家財有賜書及御集等欲令置曽家廟毋得借出差宣借兵三人守視仍於衆分僦屋錢内割留充歳時祭享從之上批聞麟府路邊夏國界堠累年不以時墁飾近不知受何處指揮遽徃完治致西人疑慮推毁可宻下新知豐州張世矩考實以聞廣南西路經畧司言安南靜海軍牒欽廉二州新有艱阻不與通和博買及未敢發人上京貢奉詔劉彛毋得止絶時安南已入㓂矣詔劉彛無得止絶安南和市據神宗史交趾傳實録云是冬安南入㓂按此月二十日已䧟欽州後三日陷廉州今改之丙戌上批中書樞宻院同議代北疆事可來日就旬休於東府詳議進呈不可更遲疑滅裂乃議定東水嶺一帯從鴈門寨北過分畫西陘地令接石長城處分畫瓦窰塢地令案視分水嶺所在分畫麻谷寨水䆫舖當拆移令韓縝等先勘㑹聞奏七月十八日二十八日九月二十九日十月一日並合參考先是王安石以疾居家上遣中使勞問自朝至暮十七反醫官脉状皆使駛行親事齎秦既愈復給假十日将安又給三日又命輔臣即其家議事此據司馬光記聞乃十一月事時有不附新法者安石欲深罪之上不可安石爭之曰不然法不行上曰聞民間亦頗苦新法安石曰祁寒暑雨民猶怨咨此豈足恤也上曰豈若并祁寒暑雨之怨亦無邪安石不恱退而屬疾上遣使慰勉之乃出其黨為安石謀曰今不取門下士上素所不喜者暴進用之則權輕將有窺人間隙者矣安石從之上亦喜安石之出凢所進擬皆聼由是安石權益重此據司馬光記聞云是十一月事且云安石既出其黨為之謀曰今不取門下士上素所不喜者暴進用之則權輕将有窺人間隙者矣安石從之既出即奏擢章惇趙子幾等上喜其出勉彊從之由是權益重按惇時已絀子幾方任河東漕與司馬光所聞殊不合今但存其事而不書其所進用者姓名更竢考詳以渝州南川縣銅佛埧為南平軍熈寜四年既討定李光吉王衮舊地置榮懿扶歡兩寨其外有銅佛埧近南接西南烏蠻昆明哥蠻大小播州等蕃界數十部族據有之後朝廷因補其土人王才進充廵檢委之把拓及才進死部族無所統一數出盗邊命熊本徃討平之於是本言所開拓皆膏腴地至林箐深宻處皆可募民開畬佃種謂宜廢南川縣於此置軍以大使臣為梓夔路都監知軍兼沿邊都廵檢稍置官屬并領榮懿扶歡二寨増置開邊通安安穏二寨以為控扼又言夷人居欄栅婦人衣通裙所獲首級多鑿齒者即古巴郡板盾七姓蠻南平獠之故地請以南平為名本又乞權撥大寜監每歳應副陜西及成都府鹽赴新建軍寨募人入中糧儲並從之九域志南平軍熈寜七年招取西南蕃部以渝州南川縣銅佛埧地置軍治南川縣又云熈寜七年以涪州龍化縣𨽻軍仍省渝州南川縣為鎮入焉元豐元年復置南川縣不知實録何故却係之八年十一月或當移入七年十一月并七年二月末所書割涪州龍化縣𨽻南平軍亦移入此後更詳之考按事迹先後則九域志誤實録不誤然實録七年二月末所書割涪州龍化縣𨽻南平軍亦誤權發遣熈河路經略司髙遵裕言河州軍糧乏絶己令出熈河州寜河寨三處買馬塲所管茶買錢以給河州支費乞坐專輙之罪詔釋之詔自今提舉三司帳司磨勘司官止差一員荆湖北路轉運使孫桷言下溪州刺史彭師晏等十人内附已遣知辰州陶弼等部兵夫築下溪州城寨時南江新定師晏據北江之下溪州桀黠難制弼以謀間其黨保靜永順等六州酋豪使自相仇師晏舉族為諸酋所攻殺僅以身免弼乃為書委其用事首領周興諭以禍福師晏遂與興及衆數千來降弼取其地築城寨五弼永州人也明年正月二十二日送師晏等詣闕二月四日弼加忠刺賜渝州軍前兵士土丁特支錢割渝州隆化縣𨽻南平軍實録於七年二月末書此按南平軍以八年十一月二十八日建不應七年二月已有軍名實録誤也九域志又承其誤今移入八年十一月二十八日建南平軍後
