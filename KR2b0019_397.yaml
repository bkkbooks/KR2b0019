body:
  text: 續資治通鑑長編卷三百九十三宋李燾撰哲宗元祐元年十二月乙酉朔濟州請以蠶鹽隨豫買紬絹同散以免下户往復請給之勞從之丙戌詔開封府界并諸路提刑司元豐已前免役坊場錢物令户部别封樁逐季具數申本曹㸃檢繳申尚書省注籍其擅支借並依常平錢法丁亥户部言占城國進奉使蒲麻勿等續進犀􅙧等詔回賜錢二千六百緡刑部言元降官制六曹通用格本曹四司所行職事應勑式條例該載未盡或有疑慮及諸處創陳乞申取指揮并應議可否改更措置按劾官吏等事並尚書與奪判定可否所有條例常程熟事則侍郎判决其餘行遣文書並從四司員外郎書呈尚書其應供檢案牘之事專責吏人所以分事體大小别官吏高下今看詳編修斷例房要例冊草踏乃是專責吏人供檢之事本房却申請更令官吏同共保眀顯失朝廷分任省曹之體欲乞三省諸房應案牘之事只令當行人吏供檢委郎官催促應報不須長二保明供納庶不失官制格法之意從之戊子遼國遣寧逺軍節度使耶律永昌太中大夫行中書舍人充史館修撰劉宥來賀興龍節己丑夏國遣使賀興龍節庚寅朝奉郎畢仲游趙挺之並為集賢校理承議郎行軍器監丞孫朴承議郎行太學博士梅灝奉議郎張舜民奉議郎禮部編修貢籍趙睿並為祕閣校理宣德郎詳定役法所管勾文字李籲承議郎盛次仲並為校書郎試太學録張耒試太學正朝補之河南府左軍巡判官禮部編修貢籍劉安世和州防禦推官知常州晉陵縣丞李昭玘宣德郎陳察並為正字仍今後除校理已上職並出告仲游等十三人並以學士院召詔充選也六月二十一日薦中散大夫集賢校理判登聞鼓院王哲為鴻臚少卿寶文閣直學士權知開封府謝景溫知蔡州坐為御史所劾也十月二十五日王覿云云政目云言者劾景溫信巫西京左藏庫使高遵禮勾當皇城司皇城副使髙遵路為陳州兵馬鈐轄皆內批也新無內批字詔內近中書省檢㑹故事將來服除百官等合拜表上尊號朕惟先帝臨御天下十有九年威加四方澤被萬物功德可謂溥矣然羣公卿士每上徽號則拒而不受其謙厚不伐至矣眇眇之身紹承統緒夙興夜寐不敢遑寧今近司稽用典故以為喪禮之除百官當崇尚徽稱此豈朕所以銜訓嗣事紹休前人之意哉將來服除依元豐三年詔書更不上尊號咨爾中外體朕意焉左諫議大夫鮮于侁言開封府界保甲授班行人不少官户既多縣道差役頗難聞祥符縣內一鄉止有一户可差伏以武舉試䇿及弓馬入等方得近下班行今來保甲人事藝入等才受恩便與公卿大夫一等為官户免役頗為僥幸臣欲乞保甲授班行人依進納官例候改轉升朝官方免户下色役庶令縣道差役得行其三路保甲亦乞依此從之曾肇既繳還葉康直詞頭有詔送以次舍人撰詞蘇轍再繳還曰臣與葉康直素不相識亦不知其人賢愚但見前月二十四日有上件除命是時權中書舍人曾肇當撰告詞肇即具奏言昨者兵興康直調發芻糧一路騷然先帝以其措置無狀又隨軍入界亡失為多嘗命械繫意欲誅之以此不敢撰詞又諫議大夫鮮于侁亦言康直令兒男掘取窖藏斛㪷貨賣及建言欲由涇原路入界和雇車乘人夫為知永興軍吕大防所奏有違詔􅎁先帝以其處置乖方欲深置於法康直素奴事李憲憲密加營救遂得無事今令帶職充一路帥臣未允公議臣今既明知曾肇鮮于侁有上件文字指陳康直罪惡由此難以撰詞欲乞朝廷核實肇侁所言康直事狀見得有無若無此事即乞正肇侁不實之罪然後命臣撰詞臣敢不承命明年二月二十八日罷康直除吕公孺大名府奏引河近府不便詔張問再行相視政目六日事十一月二十二日并二年二月八日可考癸巳夏國進御馬五匹常馬二十五匹槖駝二十頭甲午詔少府將作軍器監都水使者今後在七寺少卿之上監寺在臺寺主簿之上戊戌給事中錢協為龍圖閣待制權知開封府監察御史上官均再奏論協前攝京尹數月茍求速辦專務細察衆論勿以為能乞寢新命不報詔應緣內外馬事舊係羣牧司管勾者專𨽻太僕寺直逹樞密院更不經由尚書省及駕部餘並依官制其令依舊羣牧司法及直逹尚書省指揮更不行九月七日并九月末王覿王存奏并十一月十八日又三月二十一日奏并合考華州奏鄭縣界小敷谷山頺傷居民詔太常博士顔復詣西嶽致祭右諫議大夫梁燾侍御史王巖叟言臣竊伏思陛下即位以來尊用耆哲登崇俊良納天下之善常若不及革天下之弊惟恐不至以百姓之心為心撫而念之不啻父母之於赤子也四海內外物情人意和樂而舒徐巍乎太平之象矣宜乎美祥嘉瑞交至而迭應今反有山摧之異者何也臣見天心之仁愛陛下欲以篤右聖治日新又新以成無疆之休故於未然深示警告願陛下仰思天心而內自厲曰豫臨兆民固凛凛乎無不懼矣豈尚有言動之際忽而不恭者乎公言直道固無間而上下交矣豈尚有詖辭邪說反易是非汨吾之明者乎正人君子固並進而朝廷清矣豈尚有不肖混淆其間亂吾之真者乎天下固安矣豈尚有宿蠧深弊逺而難燭隱而不知或欲改而復存或已除而又作動人之憂者乎四疆固靜矣豈尚有惜虛名而甘實弊以養後患未為至計者乎爵賞不為不謹也姑息以害公僭差而紊正者不能絶歟刑罰不為不平也當罪而縱宜直而枉者罔不察歟政令不為不平也煩而寡要輕出而易反以惑民之聽者審於思歟萬役不為不省也用而不切偏而弗均者究之至歟郡邑之治不為不飭也任非其人遏王澤而不流病吾民者知之盡歟仰願陛下因天之戒凡此類者益加意焉昔梁山崩晉侯以傳召伯宗伯宗以重人之言告而晉侯從之以自責春秋賢之夫晉侯列國之君而梁山一國之望耳其變也猶能亟召賢者而謀之况陛下有天下之大而華山又五嶽之崇乎其可不畏天之威思所以應其變也伏惟陛下博資賢人之謀飭修政事以答天戒貼黃臣伏思華山西方之鎮國家倚之以安靜者也今而傾摧必有天意陛下深思省懼不以為忽天下幸甚又貼黃願陛下既以自警又以詔大臣使交修政事以應天變則盡善矣王巖叟大名集及遺藁皆有此章梁燾奏議亦有之其文並同或兩人同上也樞密院言殿中侍御史吕陶言昔瀘州乞弟入寇始因求索一髦骨價事至毫末而邊吏貪功覬賞擅行殺戮以至敗軍覆將騷動一方再煩朝廷命帥西討公私之費其數不資初林廣統領大兵深入巢穴及到乞弟住處止有茅屋數間賊亦遁去終不能獲其後以王光祖為瀘南安撫意欲生致賊酋經營數年亦無所得今瀘州內外屯兵萬餘作為聲勢欲致此賊其䇿亦踈矣夫欲致賊而不匿其形賊不可得且萬兵之費饋運日勞雖無寇至坐耗民力臣以謂乞弟之存亡違順不足上煩朝慮宜一切置而不問惟徙重兵內郡以省橫費戒邉臣守疆場示不必取之意要以嵗月當有成效今春瀘南𫝊乞弟已死又云相次投降乃是招安將輩妄為之辭以要小利皆不足信按今年正月瀘南安撫司走馬承受王伯虎權安撫使李琮奏蠻賊乞弟為患身死新立蠻頭領阿􅀈等親手刻到芀牌一靣乞投降本司已出給信劄文字許令投降已降朝㫖知瀘州張克明與梓州路轉運判官李傑同管勾詔令張克明與李傑依吕陶所奏如阿􅀈等委實投降即行接納不得信縱招安將等妄入生界虛稱招誘搖動人情但務靜守及禦邉有備其阿􅀈等降與不降即不繫利害詔學士院撰賜乾順詔止嘉其繼承恭順之意更不須言襲封地界事十月八日告哀庚子朝議大夫直龍圖閣劉攽為中書舍人仍免試王巖叟云云附十一月二十四日引進使康州刺史樞密副都承㫖曹誦除遙郡團練使知保州廣西經略安撫使都鈐轄司言乞除桂宜融欽亷州係將不係將馬步軍輪差赴雍州極邉水土惡弱寨鎮監柵及巡防并都同巡檢等處並乞依雍州條例一年之替其餘諸州差往雍州永平古方太平橫山遷隆寨鎮及左右江溪峒巡檢并欽州如昔峒駐劄抵棹寨並二年一替其諸州巡檢下一年一替從之御史中丞傅堯俞言臣聞之於書曰慎厥初惟其終又曰慎厥終惟其始始則念終不敢不慎也終則念始不敢不勉也臣愚竊伏念陛下考古御今修明法度恭儉以克已慈惠以愛人登崇老成開廣言路大義明著仁聲流聞總覽萬幾得其綱要所以欽崇祖宗導世成俗為子孫百世之慮甚備非臣筆舌所能形象雖詩書所載丹青所傳殊未有以過也可謂有其始矣臣愚不勝拳拳竊謂陛下雖聖性得之猶當加聖心焉夫天地無全功聖人無全能此不可不思傳曰審好惡理情性而王道畢矣治性之道必審己之有餘而彊其所不足有餘則養之不敢矜不足則勉之以為戒然後無間可窺而巧僞之徒不得比周而妄進今陛下不出房闈而天下嚮風百僚奉職者無他以陛下通逹平均而政出於大公之道耳茍一有所偏則好惡之情露百邪羣枉必爭隙而入矣陛下前日積勞之所成就中廢而不全矣豈可不兢兢業業日謹一日以圖厥終哉願陛下留神省察則天下幸甚陛下不遺臣愚屬以言責非臣衰拙所當䝉被仰貪盛明黽勉就職臣輒自惟付蓋志有左右而材有能否事有大小而任有重輕陛下使臣拾遺補過以輔盛德明善正失以平庶政舉直錯枉以正大臣方是之時臣極其力以死繼之若夫窺人之私摘其細故有聞必逹遇事輒言則非臣之任又非臣之志也伏惟陛下責其大節寬其近功因臣所能俾效其力臣終不以狗馬之年為子孫計畏首顧尾以辜負恩奬惟始之難陛下既蹈之矣顧不能善其終乎然不可不戒也伏望陛下察臣懇欵不廢其言特賜覽觀則永譽無悔臣不勝大願侍御史王巖叟言臣訪聞晉州上二等人户於葭蘆吳堡兩寨納稅自晉州至汾州三百四十里稍通牛車自汾州又三百六十里而至吳堡三百九十里而至葭蘆並山路險狹澗道阻深不通牛車及渡黃河尤為艱厄白米每斗官估折錢伍拾文而民間實費伍百文方了得一斗往來凡一千四百餘里百姓不勝其苦皆曰昨用兵之際傾竭家産以給軍須謂國家一時之事事已則復可為生矣不意罷兵之後方嵗嵗輸稅常若有急不知何時當是休息日引月長何由堪命未有兩寨已前百姓不記曾離本州輸稅人人得以其所餘養生而送死自有兩寨以來一年稅賦乃十年之費遂為大患不復樂生其識者又曰借令兩寨有益於國家而窮腹心之民以奉之權量輕重猶不可為也况無益耶使腹心之民困弊而興怨一生離心雖有孤城誰與為守民言如此朝廷不可不知知之不可不恤恤之不可不早為計也臣願陛下試以天下大勢觀之初無二寨國家何所少後有二寨國家何所增所增者惟百姓之病而朝廷之憂耳竊以黃河為限險絶有餘今二寨深在賊境又隔大河不繫形勢之彊弱前日特出於徼功幸賞之人誤朝廷而城之以遺後患耳守之無所得棄之不足惜夫徇虛名而受實弊古人之至戒也今日朝廷於天下之事何有不思而尚吝乎此耶昔漢宣帝時魏相請罷車師之田漢元帝時賈捐之請棄朱崖郡皆不欲貪外虛內耗竭生靈而為終不可保之事也伏望聖慈深察二壘已然之弊逺思百姓無窮之憂奮然棄之退嚴故守為長久計幸甚臣愚不勝拳拳貼黃河東民貧於他路惟晉絳二州稍為有力自修兩寨以來纍年於今訪聞晉州人户專給葭蘆絳州人户每輸吳堡今嵗絳州以災傷偶免併在晉州來嵗定復如初臣將見兩州民力坐困於二寨平居困乏而不知别有緩急如何枝梧此不可不思也仍聞晉州第三第四等人户稅亦移於太原及石州盡不下五百里所費皆數倍第五等稅自來只納於本邑今亦移之本州及外鎮縣則是一州五等之民皆受其弊不獨上二等也二寨為害益可見矣二年六月末巖叟又有兩章乞棄二寨是日堯俞巖叟同入對堯俞前謝太皇太后曰以卿有才望故用卿堯俞拜訖未奏事先問曰天下政事如何堯俞稱善且曰但恐陛下臨御日久稍有怠惰如能兢兢業業日謹一日常以大公之道自守則天下無不治太皇太后曰除是昏昧然後如此又曰保甲保馬須是先罷其餘間慢者且休嫌於更改太猛巖叟進曰若果是間慢則可若於民有害則亦不可不改也應曰害民則須改堯俞既讀劄子大要論謹始敬終巖叟進第一請廢葭蘆吳堡二寨劄子堯俞奏曰大率昨來新取者城寨皆可廢不獨此二寨也又曰陛下欲養民足國用則須皆棄置此等為患害之地乃可以內得休息不然後患無窮又終不可保臣今且據為害於兩州者言之如出於朝廷及取於他路者萬數不可勝計乞陛下令有司㑹計即可見不知是多少生靈膏血早罷得一日則爭一日事大臣七八人議論不能齊一須是陛下聖斷若非陛下一言斷之無由得了太皇太后曰此盡是向來小人欺朝廷做底待令施行巖叟又進曰邉上似此者甚多且乞陛下先了此二寨遂進第二言曾肇劄子太皇太后曰且令試巖叟奏曰試之已見踈謬中書舍人以文章言詞為質今已纍有害義之言緣是代陛下之言不可且容天下之人於此言詞觀陛下意思又進曰此是小人今皇帝陛下日長一日正要左右前後皆正人涵養盛德豈可放上此等人在左右極為不便應曰待相度巖叟曰臣已有七章言其不當陛下置臺諫只要察執政除改不當今若不行則執政遂將自肆言路亦無由敢言若如此臣不敢安職臣只是忠於陛下應曰此固是堯俞曰王巖叟忠實言不輕發又曰待相度巖叟曰今日乞陛下一言果决遂應曰待指揮巖叟又曰不知臣等章疏降出否曰已降出巖叟又曰不知今日三省曾與不曾進呈曰未曽進呈巖叟又曰乞早降出今日文字應曰待便降出巖叟又奏乞棄葭蘆吳堡等寨云自開熙河蘭㑹於國家有何所益惟見耗竭生靈供饋不已從來已費用者千百萬今更不可言悔已無及但願惜取今日已後無窮之費若中國困敝無力與之爭必棄却不若早為計以愛惜中國却是自彊之䇿中國若困百姓必怨憤老弱轉死溝壑壯者聚而為盜賊腹心怨憤疾生則逺人必生悔慢萬一侵陵不知何以待之可為寒心願陛下早留意又再論曾肇事曰肇真小人不可用自古未嘗有雜用小人而可以無事不純進賢者而得號為清明也方其兄布專政弄權鼓動天下不聞肇一話一言規告其兄乃自竊美官稍有智識肯如此乎况中書舍人不比其餘侍從須得文行俱高極天下之選有器識之士乃可當之匪人在高位臣之恥也臣誓不與匪人比肩惟陛下亮察上曰且安心言事待這裏主張巖叟進曰若言事省力則不在陛下主張祗緣有如此之難所以須賴人主主張耳古者為官擇人故百官有得賢之稱今為人擇官故人有不稱官之誚某官當得如何等人而後稱不稱則不敢除非其人不可居蓋不可奪者天下之理不可已者人臣之義臣義有所未安故言不敢已上曰且令試如何對曰茍且非治國之道此職若不是代王言則其人自亂道何害於事只為天下人於訓詞中看陛下用意所以須用有文學又有見識知國體之人今曽肇甚是辱纍陛下不可留執政未必不心知此人是小人不協公望只緣既進擬後須且望主張此全在聖斷緣抑得言路一次即言路便氣衰難為任職今後雖執政更有不當如何敢言此陛下不可不察言路若非陛下主張力行其言一日不可便立今臣所言盡是目下實事更有一事臣今日方知子細不及於劄子中論列見肇與新除館職等行告詞云不負於知己此一句大可怪此等除館職人盡是陛下以不次之恩收拔為國家之用固宜訓敕使盡忠朝廷今肇却教令報恩於執政全不知事君之義傳布四方取笑天下謂是都無人為朝廷理㑹乞陛下指揮令中盡改告詞又奏云古者薦賢所以為國不為己也賢者受薦不敢謝恩私門示本以非私意相與也據肇之意薦之者既以私為恩被薦者亦當私為報不知為人臣之道不知事君之義乞落中書舍人令與外任代王言須是能宣道陛下之意如王鞏以言者攻其罪遂責出却用褒辭不知如此是陛下之意否此豈可以代王言暗貶而明褒是何典刑何以風厲天下士大夫因此可明戒敇代言之人今後為定法此並用王巖叟朝論增入當細考之舊録云是日庚子太皇太后宣諭無輕議廢改法度一節內簾幃之言不須顯然題破首變元豐善政良法者亦近密中官之助此舊録庚子日首書此四十二字新録辨曰按此一假前載宣諭語不顯事因後云近密中官之助蓋指張茂則陳衍輩與宣仁𫝊內所載吕大防等進事目之意誣罔略同今並刪之辛丑尚書省言左司狀失入死罪未决并流徒罪已决雖經去官及赦降原减舊中書例各有特㫖昨於熙寧中始將失入死罪一項修入海行勑其失入流徒罪例為比死罪稍輕以此不曾入勑只係朝廷行使近准朝㫖於勑內刪去死罪例一項其徒流罪例在刑房者依舊不廢即是重者不降特㫖反異於輕者於理未便本房再詳徒罪已决例既不可廢即死罪未决例仍合存留乞依舊存留元豐編勑全條從之詔開封府大理寺禁囚公案冬夏仲季月到寺日限五日定斷百紙已上七日每百紙加二日詳議案减半其半日就全日刑部准此舊案斷在仲季月者亦依仲季月到寺日限如元限未滿日比仲季月限數少者止依元限已上應經歷官司各不得過一日有故判展情節未圓須行取㑹不在計日之限新無壬寅資政殿學士知鄧州曾孝寬天章閣待制知永興軍陳安石兩易其任先是殿中侍御史吕陶言竊以四方形勢之重莫如陜右陜右襟要之㑹莫如雍郊土俗豪悍藉名德以鎮壓軍政雄重須才謀以臨制外則應接五路為緩急之助內則統領數郡專綏撫之權付授帥節尤宜審重臣伏見陳安石望不足以服人材不足以治劇年已七十未謀退休彊勉從政多有不逮閭閻盜賊殊不戢畏子城之內亦有剽竊况其人喪失兒女意氣衰倦久當重寄無以寬朝廷西顧之念伏乞速揀良臣易地以處故有是命中書省言元豐五年四月七日條契丹使見辭日並特起居其前後三日內合起居權罷詔今後人使見辭前後三日內除朔望參外起居權罷左司諫朱光庭言學士院試館職策題云欲師仁祖之忠厚而患百官有司不舉其職或至於偷欲法神考之勵精而恐監司守令不識其意流入於刻又稱漢文寬大長者不聞有怠廢不舉之病宣帝綜核名實不聞有督察過甚之失臣以謂仁祖之深仁厚德如天之為大漢文不足以過也神考之雄才大略如神之不測宣帝不足以過也後之為人臣者惟當盛揚其先烈不當更置之議論也今來學士院考試不識大體以仁祖難名之盛德神考有為之善志反以偷刻為議論獨稱漢文宣帝之全美以謂仁祖神考不足以師法不忠莫大焉伏望聖慈察臣之言特奮睿斷正考試官之罪以戒人臣之不忠者策題蘇軾文也詔特放罪光庭又言軾罪不當放其言攻軾愈峻且稱軾嘗罵司馬光及程頥軾聞而自辨此據王巖叟朝論增入光庭章未見曰臣竊聞諫官言臣近所撰試館職人䇿問有涉諷議先朝之語臣退伏思念其略曰今朝廷欲師仁祖之忠厚而患百官有司不舉其職或至於偷欲法神考之勵精而恐監司守令不識其意流入於刻臣之所謂偷與刻者專指今之百官有司及監司守令不能奉行恐致此病於二帝何與焉至於前論周公太公後論文帝宣帝皆是為文引證之常亦無比擬二帝之意况此䇿問第一第二首鄧溫伯之詞末篇乃臣所撰三首皆臣親書進入䝉御筆㸃用第三首臣之愚意豈逃聖鑒若有毫髮諷議先朝則臣死有餘罪伏願少回天日之照使臣孤忠不為衆口所鑠詔追回放罪指揮軾自辨劄子稱元年十二月十八日上明年四月十七日又上或傳朝廷謂光庭所言非是將逐去之御史中丞傅堯俞侍御史王巖叟相與言朝廷命令反覆是非顛倒不可不辨又恐遂逐光庭則所損益大因欲於未逐前早救之乃各上疏論軾不當置祖宗於議論之間猶未顯斥其有譏諷意也疏入不報二年正月八日十二日可考舊録於詔特放罪下又云未幾御史中丞傅堯俞侍御史王巖叟相繼論列乞正軾罪詔傅堯俞王巖叟朱光庭纍彈奏蘇軾撰試館職䇿題不當詳覽文意乃是指今日百官有司監司守令言之非是譏諷祖宗可召至都堂說諭不須更有彈奏續詔學士院所撰䇿題即無譏諷之意然緣官司試人亦無以祖宗治體評議者蓋學士院有失檢㑹劄與本院令知及令軾堯俞巖叟光庭各速視事舊録云軾挾情用意毁斥祖考豐功盛烈不若漢之文宣為臣不忠有若是乎言者紛紜終以辨詐獲免新録辨曰朱光庭等論軾之語及詔意具載于前自挾情用意而下史臣私言今刪去舊録叙此事極略新録但刪去史臣私言餘並因之按王巖叟朝論記述甚詳今參取蘇軾明年正月十七日自辨劄子并王覿孫升等章疏各依本月日附見蓋此事所關甚大不容草草元年十二月二十七日堯俞第一奏二十八日巖叟繼之二年正月八日堯俞巖叟再奏九日王覿奏十一日覿又奏十二日批出令堯俞巖叟光庭不須彈奏十三日三人赴都堂受㫖十四日三人又各上奏十七日罷軾自辨十八日堯俞巖叟同入對十九日待罪二十一日孫升奏二十二日進呈堯俞巖叟所奏二十三日詔令各供職是日孫升又奏二十五日三人侍班次二十七日同見於紫宸殿門此一假事方竟耳巖叟言臣竊聞初有聖㫖以學士院所撰館職䇿題祖宗為不足法而歸全美於異代用諫官言將議其罪陛下寬仁特恕免之舉朝之人方紛然交議以謂學士深失大體諫官言之為甚當朝廷令免罪為太輕今復聞續有指揮追回放罪勑㫖物論疑駭不審陛下知其意不可恕而遂欲正典刑以示天下耶反以無過而收已行之命耶欲正典刑則善矣反以為無過而收之則未安也伏望陛下虛心平意照之以至理格之以大義豈有本朝䇿天下之士欲以求治道而先自短其祖宗命辭之人得為無罪耶不知使陛下何以教天下何以訓後世既以祖宗為有弊又以陛下為可欺罪在不疑罰當無赦或聞蘇軾自辨謂是陛下㸃中此題果然則軾更因其非又推過於君父罪益大矣此題不緣言者深考而明攻之泛讀一過安能遽曉雖禁中㸃出於陛下未為有失今判然知之而不正其罪則失在陛下矣罪已明而反脫命既下而復收乃似朝廷容其如此臣恐天下之人遂移蘇軾之非反為吾君之過臣不可不為陛下惜也仰乞聖慈早正軾罪以解中外之惑貼黃軾之此罪若不正之則於朝廷事體終為不順上下議論終為不允乞陛下深賜省察無以為惑幸甚又言臣伏以朝廷之事莫先於辨是非明賞罰是非辨賞罰明乃可以正朝廷朝廷正則百官正百官正而後天下一於正矣是非之不可不辨賞罰之不可不明所係如此其可忽哉近者蘇軾撰䇿題䇿館職引漢文漢宣以方祖宗語傷大體諫官論乞正其罪聞有㫖特放罪是朝廷初以諫官為是以學士為非也曾未纍日復聞收還放罪之㫖更反以學士為是以諫官為非也一事之間而乍是乍非或行或已於朝廷舉動如何哉此臣之所以為陛下惜也臣竊伏思陛下至公至明之初心必無所惑應有姦言邪說顛倒是非變亂白黑以移陛下之意者自古姦人之心利在人主不納諫而忠臣杜口則欲以行其私非有忠於社稷之志也此理易明豈終能欺陛下陛下略加靜思則得之矣臣觀漢唐以來至於本朝䇿問不可勝數無有此體陛下博覽文史試取而比類之軾之罪不難見矣方兩宫聽政簾下尤當正是非公賞罰使天下無有窺其失臣之心也茍以非為是則小人遂將乘隙而進矣傳曰差之毫釐失之千里正在今日陛下不可不深思而審處之也今議軾之罪或重或輕固在陛下但朝廷之事不可不正耳伏望聖慈斷之以義早賜施行貼黃夫牽制於人以觀是非則是非惑據事實以觀是非則是非正願陛下不以牽制之愛而奪是非之正天下幸甚殿中侍御史吕陶言臺諫之職為天子耳目要在維持綱紀分别邪正凡所彈擊當徇至公不可假借事權以報私怨萬一及此是謂欺君今蘇軾所撰䇿題蓋設此問以觀其答非謂仁宗不如漢文神考不如漢宣也朱光庭指以為非亦太甚矣假使光庭直徇已見不為愛憎而言則雖不中理義猶可恕或為愛憎而發則於朝廷事體所損不細今士大夫皆曰程頥與朱光庭有親而蘇軾嘗戲薄程頥所以光庭為程頥報怨而屢攻蘇軾審如所聞則光庭固已失之軾亦未為得也且軾薦王鞏為不知人戲程頥為不謹言舉此二者而罪之則當也若指其䇿問為譏議二聖而欲深中之以報親友之私怨誠亦過矣况御史上官均近嘗論奏為政之道有寬猛兩端大概與蘇軾䇿題同意陛下謂其言可取著於法令頒於天下夫上官均之奏蘇軾之䇿題二人之言皆是講明治道一則頒以為法一則指以為罪何輕重取舍之異哉此士大夫之意不能無惑也恭惟陛下聖慮髙逺從諫如流然臣下之言或至於激則亦願加審察昔富弼韓琦天下知其忠且賢弼因除張茂實管軍中丞韓絳乃言富弼欲謀不軌韓琦不赴文德殿押班中丞王陶乃言韓琦反狀已露尚賴聖主深照情僞二人者始終安全以富弼韓琦之賢而言者猶如此中傷之則不逮於琦與弼者又可知矣今日光庭中傷蘇軾之心頗類前事欲使朝廷為之報怨不可不察也臣與蘇軾皆蜀人而不避鄉曲之嫌極論本末既備位臺職而輒紏諫官之失當二罪皆不勝誅然喋喋不敢自默者非獨為一蘇軾蓋為朝廷救朋黨之弊也又言明堂降赦臣僚稱賀訖兩省官欲往奠司馬光是時程頥言曰子於是日哭則不歌豈可賀赦才了却往弔喪坐客有難之曰孔子言哭則不歌即不言歌則不哭今已賀赦了却往弔喪於禮無害蘇軾遂戲程頥云此乃枉死市叔孫通所制禮也衆皆大笑結怨之端蓋自此始軾非無過也蘇軾薦王鞏致人言已附十一月末十月二十五日王鞏以宗丞請修玉牒蘇軾薦鞏時鞏為宗丞也吕陶章新舊録並不載按編類章疏明年正月九日王覿奏云云則陶此章必繼蘇軾自辨後或在軾自辨前今并附此王巖叟朝論十二月三日朱光庭上封事密論翰林學士撰試館職䇿題不當譏諷祖宗十四日進呈有㫖放罪光庭章過門下矣光庭以謂此罪不當放遂再論之語益峻自此章方明攻蘇軾又有一貼黃引軾罵司馬光程頥事其意欲以見軾之輕耳然聞軾有文字自辨云學士院共進三題軾所撰一題最在後不謂偶合聖意出於㸃中也既而聞有㫖抽入放罪指揮又謂諫官言之非是且有意逐諫官臣愚與堯俞皆以命令反覆是非顛倒不可不辨又恐遂逐諫官所損大矣不若以未逐以前早救其事乃上疏不疑愚二十七日上堯俞次日亦入然愚二人皆不斥其有意譏諷但云不當置祖宗於議論之間耳堯俞章本集皆不存正月八日愚與堯俞又繼一章十二日於堯俞章後批出云傅堯俞王巖叟朱光庭以蘇軾撰試館職䇿題不當纍有章疏今看詳得是非譏諷祖宗只是論百官有司奉行有過令執政召逐人面諭更不須彈奏十三日召三人至都堂右揆吕公著門下侍郎韓維中書侍郎吕大防左丞李清臣右丞劉摯五人大意皆知軾為有過然特欲以上意兩解之愚等皆不敢奉詔十四日皆上一疏又論不奉詔之意十八日同對於延和殿才讀堯俞劄子了即云此事小何故言堯俞對云正謂不小所以言又云此朱光庭有私卿等黨光庭光庭未言時何不言堯俞與愚皆對曰有一人論之且觀朝廷行不行或中間有差失方當繼言昨光庭初言朝廷有放罪之㫖則是朝廷行得正自不消言後見反汗又是非倒置臣等方合論又宣諭曰蘇軾非是譏諷對曰若是議諷罪當誅臣等不止如此論今止為不當議論祖宗所以乞略行責耳愚懷䇿題一本就簾前指其文而解未終厲聲曰更不看文字也又進讀愚劄子竟不然之堯俞曰如此是太皇太后主張蘇軾乃厲聲曰太皇太后主張蘇軾何甚又不是太皇太后親情也愚即進曰陛下不主張蘇軾必主張道理於道理上斷即峻語曰待責降蘇軾愚與堯俞皆進曰此在陛下假令暫責隨即召之亦是行遣正乃曰待相度堯俞曰愛而知其惡憎而知其善乃所以為平今待軾如此軾驕將何以使又曰便總由臺諫官愚對曰若臺諫所言陛下能盡聽納自足以成陛下之美臺諫何預焉又曰但言不妨行與不行須由宸衷愚對曰如此則是順朝廷意者乃得行恐非朝廷之福書曰有言逆於汝心必求諸道有言遜於汝志必求諸非道願陛下常於此加察恐遜順陛下之言有非道之事愚又曰小人之欲破壞言路者多陛下欲求言路則難欲沮言路則易一沮之則人將以言為戒恐陛下不得盡知外事願加深察堯俞亦曰臣盡至誠告陛下陛下不察亦無可奈何願為國家更深思逺慮遂下至臺與堯俞議待罪乃同奏云臣等今月十八日奏事延和殿䝉宣諭謂臣等黨附諫官朱光庭彈奏翰林學士蘇軾撰試館職䇿題不當事臣等誤承厚恩上辜任使更不敢詣臺供職伏候譴斥自十九日各家居然上殿劄子却降出二十二日垂簾進呈執政撰一白貼子欲明破蘇軾之非久之不納但云四人皆逐出諸公爭之以為不可乃許用白貼子中降指揮二十三日得劄子云正月二十三日三省同奉聖㫖蘇軾所撰䇿題即無譏諷祖宗之意然緣自來官司試人亦無將祖宗治體評議者蓋學士院失於檢㑹劄與學士院令知蘇軾傅堯俞王巖叟朱光庭各疾速依舊供職堯俞二十五日與愚光庭以侍班次二十七日同見於紫宸門內東外方入初與堯俞光庭等奏論蘇軾策題不當進曰漢唐以來多少䇿題無有將祖宗與前代帝王比量長短者䇿題云欲師仁祖之忠厚則患百官有司不舉其職若當時百官有司皆不舉其職不知仁宗在上却何所為乃是全然荒怠致得百官有司如此果如此因何成得四十二年太平至今耆老言之猶往往流涕仁宗何負却言不如漢文上云此事小不消得如此且休則休對曰此雖數句言語緣繫朝廷大體不是小事須合理㑹上云不是譏諷祖宗對曰啓陛下若是譏諷祖宗則罪當死臣等不止如此論列既只是出於思慮言詞失輕重有傷事體亦合須有行遣譬如誤入禁門於法罪亦不輕何則君臣上下之分不可不嚴也今若不以此事為戒他日有一人指斥乘輿而云本出於誤亦可恕否陛下雖欲恕之七廟威靈在上豈得容恕又奏曰執政於都堂對臣等皆言蘇軾不是既知不是豈可却教朝廷做不是底事又豈有朝廷明知不是却抑言事官要休若尋常人私事則可休朝廷事則不可如此臣等為朝廷持風憲若凡所論奏常指揮令休和要將安用即是臣等辱却風憲更有何面目居職又奏曰真宗朝知制誥張秉撰一叙用官制詞云頃因微纍謫於荒遐真宗覽之曰如是則是先帝失政遂罷其職又奏曰若是臣等分上私事則可休事干祖宗干朝廷臣等如何敢休朝廷若不行破書在史冊後世以朝廷為何如哉傳播逺方必有輕慢朝廷之心萬一遼使發問不知如何為答上云言事官有黨對曰臣等不知有黨無黨但知據事之是非論列陛下亦只當看事如何若心疑於有黨則必失事之實既失事之實則是非難辨自古小人欲傾害君子者君子無過别無以奈何惟是指為朋黨人主遂疑人主既疑因而可擠矣陛下不可不察也又奏曰此事是蘇軾輕易不思語傷大體以致議論若不正其罪則此失却在陛下陛下何苦力主此人反自取後世譏誚臺官之職只在觸邪指佞豈當却為人解紛此意可察上曰䇿題是裏面㸃去進曰聞是進入三箇䇿題其兩箇是鄧溫伯撰最後一箇是蘇軾撰陛下已愛其虛名故㸃軾所撰者必然不曾反覆詳覽則雖是㸃中於陛下何傷今既分别得事理明白陛下已知其虛名不欲加罪是惑也陛下今不欲人言軾之短假令昨司馮光在政事或失不知合論與不合論臣等所職是言責所論只據是非更不敢問其人問著人則須生私意上云今日改先帝事何故不得問對云修改政事與形于文字不同兼今日所改之事皆是復祖宗舊法况陛下下詔求比閭疾苦者力改之乃所以承祖宗之美不知䇿題須得論耶不須得論耶陛下如此主張臣等却如此力言違忤陛下以就罪責不知臣等是何意陛下可體察况臣等與軾皆熟素無怨仇只知忠於陛下要正朝廷事使天下後世不能指議陛下故都無所避又進曰陛下只當責臣等不言事不可戒約臣等令不言恐天下窺見陛下此意隂相顧望不肯盡忠於朝廷非陛下之福且乞陛下省納又言前日召臣等去都堂外臣不知皆言是奉聖㫖召臺諫官戒勵甚駭聽聞臣等被摧抑則不足道却是損朝廷風憲且願陛下愛惜朝廷事體陛下於蘇軾所惜者小於言路所損者大不可不思風憲之地非臣之私乃陛下家事陛下不崇奬則臣一匹夫耳侍御史王巖叟言近奏請如舊法不限災傷分數並容借貸不拘民户等第均令免息等事䝉送有司立法伏覩今年十一月二十九日勑户部看詳元豐令限定災傷放稅分數支借種子條合依舊存留外修立到下條諸州縣災傷人户闕乏糧食雖有缺闕不以月分約度合支數預行奏請候得㫖許結保借貸常平榖如闕紐直給錢豐熟日催納若無本色聽依倉例折納或納元價經赦不在除放之限常平不足許借撥轉運司錢榖其災傷至輕或上等人户不致闕乏不得一例奏請借貸臣看詳所修借貸糧食條意已得允當外緣臣元奏本以賑濟舊法災傷無分數之限人户無等第之差皆得借貸均令免息新條必待災傷放稅七分以上而第四等以下方許借貸免息殊非朝廷本意故乞均令借貸以濟其難今户部復將支借種子依舊存留竊以災傷人户既闕糧食則種子亦闕豈可種子獨立限隔臣欲乞通為一法於所修糧食字下添入并種子三字庶使被災之民廣霑惠澤從之十一月二十八日巖叟初言朱光庭奏議亦有此光庭盡散河北積倉其張本或在此更詳之乙巳刑部言赦書節文應赦書該載不盡事件所屬看詳比類條析聞奏看詳開封府界諸路向來違犯常平法編配之人比違犯重祿法事理尤輕其經今赦未合放逐便者欲乞比類推行重祿法編配之人並具元犯保明聞奏從之吏部言欲將初該磨勘使臣經一處住程差遣但及二年不以犯衝差替並許磨勘內合展降者從本條從之新無詔應災傷州縣人户販買魚米柴薪竹木之類合收稅者三百文以下並與免納即時放行不得留滯其免過稅錢收充合收稅錢數法冊元年十二月二十七日聖㫖丙午司封員外郎王振知萊州四方館使嘉州防禦使李綬為樞密副都承㫖權發遣蘭㑹路經略安撫司公事劉舜卿言蘭州西關堡合行修築從之內禁軍令於防托人兵內輸畨和雇候來年二月末間興修仍專委陜西轉運判官孫路提舉七月六日九月二十四日中書省言天聖二年章獻明肅皇后用玉寶方四寸九分厚一寸二分龍紐今來太皇太后權同處分軍國事合依章獻明肅皇后故事從之禮部尚書韓忠彥等言太皇太后皇太后皇太妃冊寶并一行法物除已有故事外有皇太妃别無合用冊寶尺寸方濶制度故事按天聖公式令皇太妃寶經云以金為之檢准敕節文修定到皇太妃生日節序物色除冠朵衣服之類外比皇后約就整五分减一今詳定到皇太妃冊寶制度除比附减定逐項尺寸制度外所有自餘合隨寶陳設法物之類並合依皇后體例制造施行從之二年二月十八日紹聖元年二月二十六日可考韓忠彥傳云詳定皇太妃典禮忠彥稽參歷代及本朝故實以上宣仁初欲以皇太后故少降殺之其後卒用忠彥議畢仲游作忠彥行狀乃無此畢仲游作歐陽棐傳云及議皇太妃典禮哲宗皇帝詔使為差降謂於太皇太后之禮為差降也而議者以謂詔語所及之事則為差降詔語所不及之事則不為差降大略於母后之禮無差降矣棐曰太皇太后與皇太妃位號不同禮亦異數差降之詔何可違也議者猶持不决棐曰上詔所謂差降者謂物物而為差降也豈有及不及之事哉議者不能勝棐所說遂如詔紹聖元年二月二十六日再有詔議皇太妃儀制此時棐實在禮部此傳與韓忠彥傳不同姑存之此當考刑部言知澶州王令圖狀乞有乾黃河處逃軍經過不坐越渡罪諸色人並許從便過往今欲將越乾黃河條刪去及堪造軍器物不得入三路條重行修立從之詔六曹員外郎就除郎中改易曹部轉運判官就除使副轉運副使就除使府推就除判官並令通理為任堂除知州通判並成資為任廣濟河都大管勾催遣輦運提舉三門白波輦運提舉蔡河撥發提舉河北糴便糧草提舉𣙜茶並三十月為任三月二十二日四月十二日詔工部員外郎王古體量淮南及京東路災傷政目二十二日有此須别考詳不知古何時復命王巖叟云云附此侍御史王巖叟言臣伏覩朝㫖以京東路徐州淮陽軍亦係災傷令淮南體量官王古一就體量賑濟臣竊聞京東災傷不獨兩處今兖鄆之間一邑有至老幼數百人或千人日爭買糟酵充食者未必盡是淮陽之民臣以謂當隨所在賑給之而常平義倉所在往往不多殆無以繼乞并委王古通一路應有饑民處體量經畫賑濟使流徙之人均被聖澤以稱陛下救災恤患之意貼黃聞京東諸州災傷縣分猶有督納稅租缺負者百姓益非所堪伏望併賜指揮矜恤丁未侍御史王巖叟奏此據編類章疏元年十二月二十二日聽政之始首發德音以伸天下之枉為之選近臣置專局使考覆至情以上聞仁恩深厚感動幽顯此誠千載一時盛德之舉也然而名甚美而實未充意已至而惠未浹有識之論咸以為惜臣竊見看詳訴理奏雪命官罪犯雖䝉朝㫖特有所寬然大要不過遞减贓罪為徒罪改杖罪或私罪為公罪衝替作稍重稍重作輕差替而已其得盡除落者無幾耳訪聞吏部以無指揮許理元斷月日止從目下所改年月收使以理揆之極為未允其幸而經斷在近者則凡合展年破考之類皆獲通理其不幸而得罪既久者則已展之資考已隔之磨勘無由復得此所以未免不均之歎也又如公罪衝替不以事理重輕昨經元豐八年三赦自合便差遣更無事理重輕今因訴雪方改作稍重或改作輕乃是已赦而復罪豈特不䝉寬赦而已也臣恐非陛下所以詔有司之初意欲乞特賜詳酌將今來雪除寬减命官罪名除料錢請給等更不支外其事涉寃抑者與理元斷年月除落罪名盡還所得恩數情犯可矜者亦得與通理資考叙還磨勘嵗月其該除落者自合依無過人例並乞不拘刑部常格特依臣今來所請明降指揮下吏部施行庶幾隨事重輕人霑實惠以稱朝廷寬大之明詔以副陛下惻怛之誠心天下幸甚戊申夏國遣使賀正旦詔久愆時雪慮刑獄淹延在京委刑部郎中及御史臺刑察官開封府界令提㸃刑獄司諸路令監司分案催促結絶又詔諸路元豐七年已前坊場免役剩錢除三路全留外諸路許留一半餘召人入便隨宜置場和買可變轉物貨即不得豫俵及分配與人户其物貨逐旋計綱起登於元豐庫送納內城都梓州利州三路於鳯翔府寄納封樁先是侍御史王巖叟言臣竊以有無之相通輕重之相權上下之相益內外之相資天下至術也當今之患常患於持之偏而世有受其弊者國家自聚斂之吏倚法以削天下緡錢出私室而歸公府者蓋十分而九故物日益以輕錢日益以重而民日益以困幸陛下曠然下德音悉罷所以斂於民者固大惠也然緡錢一入於公而無復通流於外故斂法雖罷而物輕之弊天下猶共以為病也今四方之逺又有甚者焉臣聞福建一路羡餘免役錢見在一百八十餘萬夫以區區八州之地窮陋狹隘而十餘嵗間斂而藏之官者積數如此則民之有無不問可知矣既民之所有者已空又官之所藏者不出而羣衆相生養之道則必待乎此則勢將何如臣誠懼誘姦聚怨生人心而開禍端貽朝廷之憂爾論者謂本道備用之餘宜悉隨其土地之所有稍增價以市之轉而實京師勿復以取息為事不獨使貨泉流布物價浸平一救傷農之弊且使遐方僻地得泄多藏不誘姦盜之欲心豈不善計非愚臣之獨見實有識之羣議伏望聖慈不以為忽深留宸念特詔有司速令經度施行以幸天下貼黃稱臣舉福建一路以為言則諸路所藏大約可見如以臣言為可采伏望詔有司并議之以救天下錢重物輕之弊於是從其言而降此詔朱光庭奏議亦有此按舊録及元祐密疏此實巖叟建請係之光庭誤也中書省言提舉京城所奏修繕京城所元管大小使臣五十七員今相度可以廢罷四十七人存留一十員管勾事務其使臣並乞不拘常制踏逐指名抽差各與通理三年為一任從之樞密院言廣西經略司奏左藏庫副使雍州左江都巡檢使成卓申進奉人梨鍾密告郡王陳乞地界未䝉回詔告録梨文盛元上書并狀回日禀覆郡王若梨鍾到闕再有陳乞將梨文盛長書等委曲宣諭梨鍾知委審㑹昨成卓保明交人計議疆界不致反覆已依此降詔了當將來交人到闕果敢妄有陳乞朝廷必難别行處分詔苗時中如交人不絶文移尚以地界為辭仰一靣盡理回報折難務令禀伏其成卓令經略司作商量公事勾赴桂州新録刪改云樞密院言廣西經略司左藏庫副使雍州左江都巡檢使成卓具申進奉人梨鍾密告郡王陳乞地界未䝉回詔事詔苗時中如交人不絶移文尚以地界為辭仰一靣回報折難務令禀伏其成卓令經略司作商量公事勾赴桂州左藏庫使管勾崇福宫石得一卒己酉遼國遣使利州觀察使蕭睦髙州觀察使耶律度副使朝議大夫太常少卿史館修撰趙微客省使廣州防禦使劉彥溫來賀正旦詔勘㑹專切提舉京城所近奏已减罷使臣四十七員即不係尚書吏部闕自今如奏差使臣可特令京城所依元豐八年五月十九日勑命指揮御集十二月二十五日下元豐指揮當考詔舊出免役錢三百緡以上人户並依單丁等户例輸納與免色役從詳定役法所言也十月末吕陶疏更考詳明年正月末孫升王巖叟云云侍御史王巖叟言臣伏覩新降役法內一項諸出等髙強户舊納免役錢三百貫以上者依單丁等户法輸助役錢臣博采衆議皆以謂不見其利而見其害非可久之法其言曰祖宗差役之法設大綱而已上户為大役中户為中役下户為下役未嘗銖銖而校也而百餘年間天下無不平之歎今必欲抑其甚髙而齊之則亦終無可齊之理不知適所以為不平爾借令出二百八九十貫之家相去幾何而一應差役三年五年而後休息一納助錢畢世窮年而無已時非至於其家破蕩終不得免此不便一也天下之民方共歡呼鼓舞以得復差法為賀而此一等之民獨何辜而不得預仁澤均為王民而幸不幸相逺如此非所以一人心而息怨咨此不便二也又所謂髙強之家昔者估定役錢之時多出於官司逼令增數二十年間以不勝其重而弊敗蕩覆者蓋已多矣今所餘無幾尚忍因仍故額盡窮之耶此不便三也前日五等槩輸役錢則比户之或升或降皆無所逃今而專斂於最髙之户最髙之户勢必巧為自免之計有弟兄則析居不析居則賣業但能少缺三百千之數則遂可免矣此法既行不出二三年天下當坐失髙強之户此不便四也既不能禁人析居賣業以幸免繼必有建議請自二百貫立法者矣又必有請自百貫而上取之者矣一開其端而後日之患至於如此則差法之壞斯已過半此不便五也元納役錢今雖减半其少者猶須納一百五十緡有餘以北方言之秋成之時糴榖五六百石乃可以充而百色浮費尚不在焉役錢之法三等以上水旱不免使常無天災且不易堪一有旱乾水溢相仍為患則將奈何此不便六也單丁女户之類則所在皆有可以資之為補助如元輸役錢三百貫以上之家有數州之廣無一户者有一路不過三數家者總天下言之共能有幾較其所得亦何益大計而徒被近利之名於天下深可為朝廷惜此不便七也朝廷取天下役錢之害極矣一日下詔復差法竄首議之人於海上今詔墨未乾而復蹈其迹非獨罪人將有辭也而天下之議後世之說謂朝廷舉動為何如哉此不便八也且以臣愚之所聞所知者論之其害己如此若深求於四方廣咨於多士其害有不可勝言者伏望聖慈特令刪去此條以一天下之法以寧天下之心不使有疑於國家幸甚貼黃稱高強之户使天下州州縣縣均有數家特為之立法猶可也今數州數縣未有一户而欲指以為補助臣見徒立虛文枉疵良法為可惜耳臣願朝廷深思而熟講之不以為吝又言臣伏覩續降補助勑既立輸錢之法又有寬剩之文又有委提刑司類聚之㫖天下聞之安得不疑朝廷復為聚斂之事也伏望不棄愚臣之言曲加省慮出令之際重惜此名竊見第一等户已有展年之法至五年而止今豪強之戶亦令應役則自當充役七年矣比祖宗舊法已為甚重兼七年雖滿未必得人間勢須復為以次人户所自决無可免之理乃與永役無異不必嫌其幸免而别立輸錢之法也巖叟言蓋因此十二月二十五日指揮今即附此日孫升云云附明年正月末庚戌詔熙河蘭㑹路住營土兵三十指揮存留一十二指揮本路住營移八指揮於秦隴州鳯翔府置營以極邉物價踴貴故也辛亥樞密言府界諸路每嵗春秋大教軍兵有纍年連併該賞之人及以人數隔礙却有以次事藝精強者多是不沾恩賞甚非廣行勸賞之意今將見行條格重加减定增立該賞人數從之新削户部言蠶鹽欲依在京食鹽并南京等處依條額外印給鹽鈔下陜西制置解鹽司書填召人以家業契書抵當立限依例於解池算請津般赴絳州垣曲鹽倉送納及據府界京東合請茶鹽度數權於市易買下未交割鹽內支借應副候計直般到却行依數撥還從之新録削此相度河北水等事張問奏臣經過永靜軍訪聞本軍有沿邉寄糴并措置司斛斗約四十餘萬石今既御河淤填全無漕運之期惟是嵗久陳朽深冬以來永靜軍斛斗漸貴民户艱食若因此時雖虧折些小元本速行糶貨乃是以向去必棄之物救恤民饑欲望指揮所屬官司施行從之此據元祐密疏十二月事今附月末正議大夫致仕龔鼎臣卒是嵗宗室子賜名授官者三十八人天下上户部主户一千一百九十萬三千六百六十八丁二千七百七十四萬一千六百客户六百五萬三千四百二十四丁一千二百三十三萬一千六斷大辟五千七百八十七人陳師道談叢云元祐初司馬溫公輔政是嵗天下斷死罪几千人其後二吕繼之嵗常數倍此豈智力所能勝耶按師道所云與實録絶異附注待考
