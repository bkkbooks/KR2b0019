body:
  text: 續資治通鑑長編卷一百五十六宋李燾撰仁宗慶厯五年閏五月丙戍朔賜大理寺丞通判鎮戎軍雷周式五品服仍升一任差遣先是西賊圍鎮戎周式收散卒二萬餘人入保賊遂引去故賞及之圍鎮戎是甚時月當考殿前副都指揮使建武節度使李用和以老乞解軍職戊子授宣徽北院使命步軍副都指揮使淮康軍留後李昭亮為武寧節度使殿前副都指揮使代用和也先是承平久將帥多因循軍士縱弛昭亮雖緣恩澤進本將家子習軍中事既統宿衛一切尚嚴多所建請萬勝龍猛軍蒲博爭勝撤屋椽相擊市人惶駭昭亮捕斬之杖其軍主連州刺史宋緒諸軍股栗及上祀南郊有騎卒亡所挾弓㑹赦當釋去昭亮以為宿衛不謹不可貸卒配𨽻下軍禁兵自是頗肅昭亮乞比類特給大例請俸詔昭亮任留後日料錢已給四百千特依大例定支餘人不許援例大例定支㑹要在十二月十五日今附此己丑御延和殿閲諸軍轉貟凡三日丁酉刑部郎中天章閣待制王素知江州前河東轉運使司勳貟外郎劉京罰銅十斤與知軍差遣坐市木擾民故也事雖在赦前特貶之乙亥殿中侍御史梅摯等言廣西轉運使杜把誘殺降蠻五百餘人失朝廷所以推信逺人之意宜劾其罪上置不問賜詔戒諭之禮賔副使陳珙等四十三人並行賞有差録平蠻之功也庚子度支貟外郎集賢校理兼天章閣侍講史館檢討曽公亮宗正丞崇文院檢討兼天章閣侍講趙師民殿中丞集賢校理何中立校書郎宋敏求大理寺丞館閣校勘范鎮大理寺丞國子監直講邵必並為編修唐書官必以為史出衆手非是卒辭之中立長社人必丹陽人也賜廣西轉運使杜把提㸃刑獄李永德器幣有差甲辰以細腰城𨽻原州從四路安撫使范仲淹之請也丙午鄜延經略司言索斡九族巡檢右班殿直李延遇子德明纍擊西賊有功乞補殿侍從之夏國主曩霄遣鼎羅威眀葉雲吕則依張延壽來謝册命又遣僧吉外吉法正謝賜藏經戊申贈神衛右第三都指揮使賀州刺史許倫為䖍州觀察使以倫與西賊戰死也考倫戰沒時己酉宣徽北院使建武節度使李用和為彰信節度使同平章事許張傘擊杖子上下馬如二府儀餘無得援例又詔公使錢特依宗室例歲給其半初用和得宣徽使意不滿不謝未幾遂有此授御史中丞王拱辰言杜審瓊太祖太宗舅事兩朝有勞然終不至宣徽使祖宗所以保后家也用和無功貪驕而陛下名器聽其所欲恐非所以全安之不聽庚戍太子太保致仕楊崇勳卒贈太尉諡恭密將葬易其諡曰恭毅崇勳久任軍職當真宗朝每對見輒肆言中外事喜中傷人人以是畏之性貪鄙任藩鎮日嘗役兵工作木偶戲人塗以丹白舟載鬻於京師壬子詔中書門下曰朕有事太廟格於奉慈每懷保育之仁僾若見乎其位三后厭代多歷年所肆饋合食猶隔閟宫有司不時討論使國有闕典朕甚懼焉其令禮官稽考故籍議升祔之禮清澗城都巡檢內殿崇班馬懷德為供備庫副使兼閣門通事舍人西頭供奉官閣門祇候折保忠為供備庫副使時樞密副使龎籍言賊入清澗城而懷德保忠力戰有功雖已賞然其人並有將帥之略更宜旌用故又遷之馬懷德祥符人或已見癸丑河北都轉運按察使歐陽修言轉運使雖合專掌金榖不與兵戎之事然向被朝廷密㫖令熟圖本道利害陰為邉備今緣邉知州武臣不過諸司使副通判即是常參初入京朝官並得盡聞機事而臣之本司獨不得與非欲侵擾邉臣之權蓋調用軍儲須量邉事之舒急以至按察將吏亦當知處事之當否請自今許令本司與聞邉事從之修嘗奏疏言伏見北敵近於界首添建城寨及拘囚定州巡兵湯則侵過銀坊冶谷地界等事臣聞朝廷至今未有分明嚴切指揮令邉臣以理爭辨竊料朝廷之意必謂爭之恐有引惹之嫌此乃慮之過而計之失也夫敵性貪狠號為天驕欺弱畏强難示以怯今杜之以早而力為拒絶猶恐不能若縱之不爭而誘其來侵乃是引惹况西山道路有三十餘處皆可行兵而其險要所扼在於軍城銀坊等路為彼奪據而不爭則北寨王柳等口漸更來侵豈能爭矣是則西山險要盡為彼奪一日使敵以大兵渡易水由威虜之西平陸而來以竒兵自飛狐出西山諸口而下則我有腹背受敵之患不知何以禦之此蓋兵法必爭之地也且與人為鄰敵而自棄險要任彼奪據而不爭雖使我弱彼强尚須勉强何况勢均力敵又違誓約而彼曲我直乎臣謂朝廷所以然者蓋由未察敵中强弱之形而不得其情僞之實也臣又見朝廷常有懼敵之色而無憂敵之心夫憂之與懼名近而意殊憂者深思極慮而不敢暫忘懼者臨事惶惑而莫知所措今邉防之事措置多失其機者懼敵之意過深也若能察其强弱之形得其情僞之實則目今之事誠不足懼而將來之患深有可憂奈何不憂其深可憂而反懼其不足懼且北敵雖以戰射為國而耶律氏自幼承其父祖與中國通和之後未嘗躬戰陳遭勍敵謀臣舊將又皆老死今其臣下如貫寧者無三兩人寧材不及中人已是彼之傑者所以君臣計事動多不臧當初對梁適遣使河西使與中國通好及議和垂就不能小忍以邀中國厚利乃與元昊爭夾山小族遂至交兵而纍戰纍敗亡失人馬國內瘡痍誅斂山前漢人怨怒往時北人殺漢人者罰漢人殺北人者死近聞反此二法欲悅漢人漢人未能收其心而北人亦已怒矣又聞今春女真渤海之類所在離叛攻劫近才少定方且招輯敗亡修治器甲內恐國中之復叛外有西夏之為虞心自懷疑憂我乘虛而北襲故於界上勉强虛張囚我巡兵侵我地界蓋其實弱而示强爾實弱而示强者用兵之詭計也故臣謂茍能察其强弱知其情僞則無不爭之理何必懼其不足懼哉自國家因於西鄙用兵嘗慮北人合謀乘隙而動及見二敵相失而交攻議者皆云中國之福夫幸其相攻為我之福則不幸使其解仇而復合豈不為我禍乎臣謂北敵昨所以敗於元昊者亦其久不用兵驟戰而逄徑敵爾聞其自敗衄以來君臣恐懼日夜謀議通招丁口簡募甲兵處處開教閲之場家家括糧馬之數以其天姿驕徑之俗加以日夜訓練之勤則其强難敵矣今敵國雖未有人然大抵為國者久無事則人難見因用兵則將自出使其交戰既頻而謀臣猛將爭能並出則是夾山一敗警其四十年因循之弊變驕心而為憤志化惰卒而為徑兵因屢戰而得驍將此乃北敵之福非中國之福也此臣所謂將來之患者也然二敵勢非久相攻者也一二年間不能相并則必復合使北敵驅新勵之强兵無西人之後害而南向以窺河北又將來之大患者也臣雖不知朝廷顧河北為如何但於本路之事以今年較去年則亦可見去年以前河北官吏無大小皆得舉材而擇能急於用人如不及者惟恐事之失計故也自今春以來差除漸循舊弊凡幹敏之吏熟於北方事者舉留奏乞百不一從不惟使材臣能吏不勸而殆亦足見朝廷不憂河北之事辦否也至於廢㳂邉久任之制而徙劉貽孫以王世文當冀州李中吉當廣信王中庸當保州劉忠順當邢州如此數人於閒慢州軍尚憂敗政况於邉要之任乎然臣謂為國計者若以北敵為憂深思極慮而不敢暫忘則其選材任將肯若是乎臣愚以謂朝廷不以北事為憂又怯懼如此既曰懼矣則於用人之際又若忽而不憂此臣之所未喻也臣聞敵人侵我冶谷雖立寨屋三十餘間然尚遷延未敢便貯兵甲更伺我意緊慢若不及早毁拆而少緩縱之使其以兵守之則尤難爭矣此旦夕之間不可失也至於湯則亦聞囚而未敢殺亦不可不爭臣願陛下但以將來之患為憂不忘此事用人之際革去舊例而惟材是擇勿聽小人之繆謀勿於忠良而疑二使得上下畢力至於目今小事未須過自怯懼夫事之利害激切而言則議者以為太過言不激切則聽者或未動心此自古以為難也况未形之事雖曰必然而敢冀盡言乎伏望陛下留意聽納不以人而廢言庶竭愚瞽少禆萬一修疏不得其時因修請與邉事附此劉貽孫責官在七月壬子銀坊城本末八月甲子十月己巳更當考詳詔三司副使官至諫議大夫以上立班次序從本官慶厯元年十月以入省先後為序六月乙卯朔詔司天監保章正至五官正自今聽十年一遷官丙辰降前福建路轉運按察使金部貟外郎髙易簡知衢州福建僞命時行鐵錢本朝因之時泉州青陽等場鐡大發易簡遂置鐡務於泉州欲移銅錢於內地初不以聞坐是得罪丁巳刑部郎中天章閣待制新知江州王素落待制司勳貟外郎劉京監利國監祕書丞監察御史裏行閻詢落裏行監河陽酒稅御史臺主簿楚泰送流內銓注外任官時御史臺鞫素託京市木事既罷而言者乃謂詢泰與素連姻而初不以聞故復責之素兄雍時為兩浙轉運使尋卒於官朝廷以故相旦之後且恤其孤特改命素知汝州改知汝州在八月庚午今并書己未復天慶天祺天貺先天降聖五節日休務仍給輔臣私忘假如舊西兵解嚴故也辛酉罷軍頭司引不急公事壬戍工部侍郎知河陽任布為太子少傅致仕癸亥以澤州進士劉羲叟為試大理評事羲叟精算術兼通大衍諸歷嘗注司馬遷天官書及著洪範災異論歐陽修薦之召試學士院而有是命乙丑以定州北平軍軍城寨真定府北寨及滄州並𨽻緣邉安撫司丁卯復減梓州路上供絹歲三之一紅錦鹿胎半之實録并及益州路今從本志戊辰以樞密使王貽永兼羣牧制置使自王德用出鎮徐州樞密院不復兼領羣牧制置使及是乃復之德用出鎮徐州在寶元二年五月二十二日三班院言舊制臣僚同罪奏舉使臣差遣雖不行而他時或别預選擢其舉狀却復用請於所授宣敇具載舉主姓名後或得罪亦當連坐從之辛未詔三班院自今使臣參班止令讀律寫家狀壬申太常禮院言奉詔議升袝三后事竊惟宗廟之位所以奉先烈配袝之禮所以嚴時饗典制具在今昔所遵謹按唐肅明皇后本中閫之正昭成皇后緣帝母之尊開元中並袝睿宗之室國朝懿德明德元德三后亦同袝太宗皇帝廟恭惟章獻明肅皇太后母儀天下輔成丕業章懿皇太后誕生聖躬恩德溥大伏請遷祔真宗皇帝廟序於章穆皇后郭氏之次章惠皇太后雖先朝遺制嘗踐太妃之貴然至明道中始加懿號與章懷皇后事體頗同伏請遷於皇后廟序於章懷之次又太者生事之禮不當施於宗廟至於章獻明肅皇太后以顧託之重著臨預之勞朝廷追遹丕德崇尚徽稱若題之别廟則義無所嫌且屬之配室則禮或未順况太廟諸室皇后並無四字之名伏請改上章獻明肅皇太后曰章獻皇后劉氏章懿皇太后曰章懿皇后李氏章惠皇太后曰章惠皇后楊氏如此則協李唐之故事孚本朝之正典如允所陳乞再行集議以示奉先謹重之意詔兩制至待制御史中丞同議以聞癸酉賜京城淘河渠役卒緡錢乙亥以岢嵐軍都監西京作坊副使兾興為左藏庫副使初知并州明鎬言修岢嵐軍城指揮使吳式因笞掠軍士其衆輒倡反奔潰入城而興輪䥫簡擊仆數卒衆又欲奔西門宣毅副都頭樊顯獨仗劍禦之虎翼副都頭季清從鈐轄田朏招諭衆乃定乞加旌擢興既䝉賞顯清等亦選一資丙子詔自今京朝官須年及格方得依例磨勘陳乞差遣并選人乞注官如年未及格不得施行時監臨王厚年未及格從父素奏掌機宜三年為歷任乞磨勘故有是詔㑹要六月二十二日事監臨字當考丁丑詔諸路兵馬都監監押寨主並以防城戰具批上歷子其未修完者不得輒離任如任內能盡葺舊損與理為勞績戊寅詔諸軍將士如經戰鬬敢僞入箭頭在身欲希功賞者以違制論軍中失覺察者坐之詔文武臣僚曽任兩地及節度使并丞郎以上不曽貶黜後來除致仕官如章奏文字並許通進司投下先是右屯衛上將軍致仕髙化言每進文字須詣登聞鼓院與農民等念臣嘗事先朝為節度使乞依楊崇勳例每有章奏許詣通進司投下因有是詔㑹要以此為二十四日事二十四日戊寅也庚辰賜黃河掃役卒緡錢辛巳詔殿前馬步軍今後所奏本司公事除係常程依舊例轉奏外如有非泛擘劃急速公事在後殿祗應便令免杖子窄衣上殿若非本司公事别陳利見即關報閣門依例上殿更不旋取㫖此據㑹要六月二十七日事今三衙依杖子奏事始此壬午詔殿前馬步軍司自今內外禁軍非武藝優者毌得入優輕差遣秋七月戌子知大名府程琳兼河北安撫使壬辰詔陜西四路依近降夏國誓詔毋得招納西界蕃戶先是環慶經略司誘西界作過蕃官朗斡等七百六十二人朝廷恐因而生事故約束之甲午樞密院言咸平初陜西振武鄉兵許結社買馬以升填廣鋭軍往歲河東已嘗如此例今河東諸軍闕馬又廣鋭指揮人數不足欲聽本路宣毅義勇鄉軍結社買馬官助其價以升填廣鋭之闕從之丁酉西上閣門使果州團練使廣西鈐轄馮伸已為右武衛大將軍分司西京討蠻賊無功也己亥并代鈐轄管勾麟府軍馬西京作坊使王凱領資州刺史留再任河東經略使明鎬言凱在河外九年屢有功也辛丑貶起居舍人直龍圖閣知潞州尹洙為崇信節度副使洙前在渭州有部將孫用者由軍校補邉自京師貸息錢到官亡以償洙惜其才可用恐以犯法罷去嘗假公使錢為償之又以公使錢不足假軍資錢回易充用及董士廉詣闕訟洙欺隱官錢詔洙分析而監察御史李京又言韓琦因處置邉機不當罷樞密副使琦過實自洙始請并責洙洙復奏章與京辨執政不恱遣殿中侍御史劉湜往渭州鞫之洙竟坐貸公使錢與孫用及私自貸該甲申德音當追兩官勒停特有是命湜頗傅致重法蓋希執政意也壬寅翰林學士王堯臣等言奉詔同詳議三后升祔事伏詳章獻明肅皇太后章懿皇太后遷祔真宗廟室序於章穆皇后之次請如禮官所議其改上章獻明肅皇太后曰章獻皇后章惠皇太后曰章惠皇后遷於皇后廟序於章懷皇后之次揆於禮意竊所未安伏以章獻明肅皇太后在先帝時正位中壼受遺輔政垂將一紀勤勞帝室阜康生民故盛烈丕功非一惠可舉况諡告於廟冊藏於陵無容異時更有輕改矧升祔廟祏本極孝思之報若裁損尊名恐非嚴奉之儀而又博詢典故參質人情有增崇之文無追减之例其章獻明肅之號伏請如舊章惠皇太后擁佑聖躬慈均顧復故景祐中已膺保慶之冊義專繫子禮須别祠請仍稱章惠皇太后依舊享於奉慈廟堯臣等又言凖中書送下龍圖閣直學士李昭述奏伏以禮緣人情孝為德本母之貴必由於子子之孝必極於親此古今之通誼也伏見太常禮院言所議章獻皇后章懿皇后並祔真宗廟室序於章穆皇后郭氏之次竊有所疑按祥符中中書門下言凖詔改上元德皇太后徽名曰元德皇后升祔太宗廟且唐開元中昭成肅明皇后並祔睿宗之室肅明雖睿宗在藩已立為妃緣昭成以帝母之尊故位居其上今元德皇后伏請升祔於明德皇后之上當時詔書諭以元德平昔謙抑之意因而未許恭以章懿皇后膺天脊命誕育聖躬靡及奉養之禮止極追尊之號今升祔有期論議為重稽開元祥符之舊考昭成元德之誼恭請序章懿皇后於章穆皇后之上詔送兩制詳定臣等詳先朝始議升配元德之時有司奏請序在明德之上是時先帝深酌禮意决於聖衷乃詔曰載念尊親蓋惟極致在乎升降非敢措辭唯以祔廟之歲時用為合饗之次序恭以元德皇后神主祔於明德皇后之次今陛下祇事宗廟特頒明制以升祔三后參訪近臣禮官之議請以章獻章懿並祔真宗廟室序在章穆之次其章惠歸袝后廟此則逺承先帝之志近仍别廟之序其李昭述所請以章懿在章穆章獻之上蓋循當時有司之請未本天聖詔中之意又况章穆升祔嵗月已深奉慈三室先後素定若再議升降則情有輕重乞從祥符舊章於禮為順乃詔中書門下覆議議曰伏以親廟之尊配食尤重或稱古者祔止一后而語無經見之明或謂歷世祭有别園而理非孝道之極是使繼室之祀泥古而不通以貴之親掩恩而難議必俟元聖肇經大猷先帝德函天元孝通神理每惟開元舊典創而未備故斷自聖慮揭為新儀奉升正后並饗太宗廟室覺終古之未悟暢罔極之至懷上當靈心外盡昭報是以神克妥侑邦介繁祉陛下膺襲熙之運謹遹追之謀而獻懿别祠依違一紀謹重體天翹勤孝思羣情戢而未喻嚴祏蓋而有待今乃沛然下詔發於至誠尚復退託謙勞博加延問質於禮官之議覆以近臣之評參考既同陟序惟允蓋聞緣人情以制禮則切而有實奉先訓以作古則顯而易遵成憲在前文考之意也配食一體二慈之宜也奉承無改陛下之孝也臣等不勝大願請如禮官及學士等所議奉章獻明肅皇太后章懿皇太后升配真宗廟室章獻明肅尊諡如故章惠皇太后仍饗奉慈别廟皆得禮之變順祀無違者矣其李昭述建言以章懿敘於章穆之上本其推孝及于尊崇按祥符之詔書繫章聖之特㫖今議者雖據前比臣等猶所未安其位敘先後欲乞聖懷制定使昭示萬世永永無窮餘請付外施行乙巳詔曰國之大典無若宗廟之制之為重也比朕以奉慈三室未登禘祫之位四時之感每懷靡寧故命奉常講求舊章而又參質於近臣考詳於宰司庶無繆違以竭誠盡敬而卿等稽衆正論奏章來上乃曰緣人情以制禮則切而有實奉先訓以作古則顯而易遵載味此言實契朕志祇覽祥符之詔深原文考之㫖極意尊親之際重形升降之辭故以袝廟之嵗時用為合饗之次序議無差别情靡重輕矧在菲凉欽率成憲今日之議敢或異諸宜循先朝祔元德故事恭依禮官所議奉章獻明肅皇太后章懿皇太后序於章穆皇后之次上致奉先之順下承繼志之美永修明祀冀饗靈心六月禮院言章獻母儀天下輔成丕業章懿誕生聖躬恩德溥大伏請遷祔序於章穆之次章惠先朝遺制嘗踐太妃至明道中始加懿號與章懷頗同請序于章懷之次太者生事之禮不當施於宗廟章憲明肅皇太后以顧託之重著臨御之勞朝廷追遹丕德崇尚徽稱題之别廟義無所嫌屬之配室禮或未順龍圖閣直學士李昭述又請序章懿在章穆上兩制至待制御史中丞同議七月學士王堯臣等言章獻明肅盛烈丕功非一惠可舉諡告于廟冊藏于陵無容異時輕有追減章惠擁佑聖躬慈均顧復故景祐中膺保慶之冊義専繫子禮須别祠章穆升祔嵗月已深奉慈三室先後素定若再議升降則情有重輕伏請如舊中書門下覆議曰緣人情以制禮則􅋀而有實奉先訓以作古則顯而易遵成憲在前文考之意也配食一體二慈之宜也奉承無改陛下之孝也請如禮官及學士議案祥符之詔繫章聖特㫖位敘先後乞聖懷制定使昭示萬世永永無窮餘請付外施行翌日詔曰比以奉慈三室未登禘祫之位四時之感每懷靡寧故命奉常講求舊章而又參質近臣考詳宰司庶無繆違以竭誠盡敬而卿等謂緣人情以制禮則􅋀而有實奉先訓以作古則顯而易遵載味此言實契朕志宜循先朝祔元德故事恭依禮官所議本志所載如此或只用此可也丁未樞密院言京東就糧諸軍自罷戌陜西其所習武藝漸見弛隳欲選嘗在邉使臣御前忠佐各二人分往訓練從之戊申賜輔臣及管軍人僚臨機抵勝圖詔自今罪殊死若祖父母年八十以上及篤疾無朞親者以其所犯聞是日廣州地震壬子降西上閣門副使劉貽孫為禮賔副使兼閣門通事舍人監湘陰縣酒稅坐前知廣信軍徙涇原路鈐轄不俟代輒歸也出內藏庫絹二十萬市馬於府州岢嵐軍初契丹遣使求割地書以開决塘水為說及申定誓約乃具載兩界塘淀各如舊第罷增廣若隄堰壅塞集兵修築疏導或非時霖淹漲溢皆不移報約既定朝廷重生事自是每邉臣言利害雖聽許必戒之以毌張皇使敵有詞而楊懷敏獨治塘益急是月懷敏密奏曰前轉運使沈邈開七級口泄塘水臣已亟塞之知順安軍劉宗言閉五門幞頭港下赤大渦柳林口漳河水不使入塘臣已復通之令注白洋淀矣邈宗言朋黨沮事如此不譴誅無以懲後詔從懷敏奏自今有妄乞更改水口者重責之此據本志㑹要載此於慶歷五年七月但稱臣僚上言不出楊懷敏姓名且云乞下河北屯田司永為定制如後更有臣僚上言更改此一帶水口及諸州軍塘泊並乞重行責降今冊取之沈邈以慶歷四年九月為都漕楊懷敏奏繫之五年七月㑹要當不誤又據茹東濟屯田圖七級口五門幞頭港下赤大渦柳林口並屬順安軍但有赤鈐口無下赤口當考
