body:
  text: 續資治通鑑長編卷四百九十六宋李燾撰哲宗元符元年三月癸亥樞密院言司勳員外郎韓粹彥等言使人在路州軍諸頓酒食料例已經編定陳設器皿等亦各新備惟府界諸頓祗應人等自京差到及酒食之類未曽豐厚府界宿頓中路管設處共差內臣兩人管勾顯見難以照管乞今後比附沿路州軍條例每頓各量添差官專一管勾及取沿路諸頓酒食料例一體供應陳設等亦乞下合屬修換增置詔更不自京差內官并祗應人等只委本處令佐管勾排辦令府界提點司官提舉點檢其合差祗應人等許於本處并鄰近縣係將不係將下禁軍內選差合用器皿陳設什物之類令府界提點司别行置造本處置庫收掌應約束排辦等并依河北京西路州軍條例新本刪要當換此乙丑朝散大夫直祕閣權陕西轉運使張詢為直龍圖閣權知熙州降授通直郎權管勾熙州事鍾傳再降為宣德郎添差監永州稅先是傳再約陸師閔會兵未至復却之秦鳳人馬殆不勝其勞敝得旨雖不曽赴進築亦依例特支傳以勞敝秦鳳兵馬及奏報反覆詭詐無非欺罔章惇初欲與散官而蔡卞謂黃履曽言傳雖可罪然首倡邊事功亦不可忘曽布以為當然兼德音亦嘗稱進築之功傳當居首乃有是命鄭居中作傳神道碑云有告白草原冒賞事坐責永州監稅與曽布日録不同紹聖四年十二月二十一日可考傳本傳云坐議異同築淺井不成落職降官復有告白草原冒賞者再降宣德郎責降永州稅連州别駕韶州安置據曽布日録則傳落職降官不但緣議異同築淺井不成也紹聖三年十二月五日鍾傳以安西城進築轉通直郎紹聖四年四月十一日鍾傳以金城關進築轉承議郎直龍圖閣元符元年正月十七日鍾傳以出塞討蕩加集撰元符元年三月十一日落集撰降通直郎元符元年三月十六日降宣德永州監當元符二年二月二十二日責連州别駕韶州安置元符末以散官韶州安置復承議郎知信陽軍尋改密州有言者改澧州同議熙帥惇言臣敢保張詢可用如有敗事臣乞獨任責上顧衆人曰如何布曰臣不深知詢但見惇言詢沈審有斷可任以事及章楶昨乞罷亦乞詢為代惇身為宰相當以邊防安危大計為念若援引親戚不恤邊計則罪不容誅惇既任責且試用之如孫路純實穩審或能辦事亦未可知上曰如此即用張詢蓋惇前兩日已嘗密啓故上許之無難色先是上纍諭詢非帥材以惇內舉且乞獨任責兼捨詢亦未有卓然可用者遂試用之詔申王佖端王佶特各每年實給賜公使見錢八千貫三省言翰林學士承旨蔡京等奏奉敕講議定驗咸陽民假義所獻玉璽臣等取責假義狀委於紹聖三年十二月內河南鄉劉銀村修造家舍掘土得之即不是塋域內收到曽有光照滿室及篆文官稱篆文與秦相李斯篆文合有魚龍鳳鳥之形是古之蟲篆考其體法自漢唐而下金石遺文筆法精妍無若此者又玉工言玉璽制作即非今來工匠可造臣等取到祕閣所收玉璽譜記録與歷代史書參照皆不相合今止以歷代正史所載為據略去諸家與傳注之繆考驗傳授之實案所獻玉璽其色緑如藍溫潤而澤其文曰受命于天既夀永昌背螭紐間有小竅用以貫組又得玉螭首一其玉白如膏亦溫潤其背亦螭紐五盤紐間亦有貫組小竅其面無文與璽相合大小方濶無毫髮差殊篆文工作皆非近世所為臣等今考璽之文曰皇帝夀昌者晉璽也曰受命於天者後魏璽也有德者昌者唐璽也惟德允昌者石晉璽也則既夀永昌者秦璽可知今得璽於咸陽其玉乃藍田之色其篆乃李斯小篆體其文則刻而非隱起其字則飾以龍鳳鳥魚乃蟲書鳥迹之法其制作尚象古而不華於今所傳古書莫可比擬而工作篆文之巧者亦莫能髣佛非漢以後所能作亦明矣今陛下仰承天休嗣守祖宗大寶而神璽自出其文曰受命于天既夀永昌則天之所畀烏可忽哉古之王天下者其盛莫如周惟赤刀宏璧琬琰大玉天球河圖舞衣兊之戈和之弓垂之矢以為重寶漢晉以來得寶鼎瑞物猶告廟改元肆眚上夀况傳國之器乎或曰秦所作何足寶哉然漢髙祖破秦而得之光武降盆子而受之至為服用號曰傳國而祠髙廟賜民爵若東晉渡江世以無璽為譏乃或設譎詐興師以取之蓋其重如此恭惟皇帝陛下事天之誠事地之孝明察著見而盛德日躋將以合天地之化故靈符效祉神寶出應其所以昭受命非竭誠盡禮不足以稱臣等被奉詔旨得與討論黜諸家偽説而斷以正史考驗甚明所有玉璽委是漢以前傳國之寶法物禮儀乞所屬施行詔令禮部太常寺考按故事詳定以聞正月十七日得玉印五月一日受崇寧五年四月李公麟傳載公麟以為秦璽議甚詳要亦不必具載也御史中丞邢恕言張舜民除直龍圖閣權青州按舜民資望輕淺未宜遽得青州况舜民在元祐間蹤迹駮雜今不次擢用實駭觀聽義不獲己須至彈奏望寢罷權殿中侍御史鄧棐言張舜民頃在元祐方大臣變亂成憲而舜民歷御史宰屬但聞助姦不見正論議今之法亦合竄投不知何名更與進擢乞追奪成命詔張舜民差除指揮更不施行十三日除樞密院言環慶路經略使孫路奏進築恰伊克寨畢工乞賜寨名詔賜名橫山寨七日賜築兵特支涇原路經略使章楶奏凖樞密院二月二十七日劄子節文坐到聖旨指揮臣勘會九羊谷已興工築八百步寨非久可畢其後石門創迪章即未曽擇地興工自二月二十六日兵馬入蕃界後踏逐得九羊谷去平夏城約三十里經歷後石門側近野韭川正當西賊來路若不築堡子則過往軍民耕樵之人不免抄掠殺戮之患又創迪章之北其名泥棚嶂亦是要害道路九羊谷去鎮羌寨約三十里西面接生界山川隱暗皆是賊路若不築堡子不惟軍人百姓往來道路梗澀兼縱招刺得弓箭手無敢耕者則是所築之城寨空費財用所拓之地土徒有虗名而無實利其間便有增添戍守兵分力弱之慮臣所以區區竊欲補全籬落保聚人民使荒土變為良田戍守之兵資藉耕者如此則國用可省兵力可強天都之地已是吾土敵人雖倔強彼將自斃前曽奏欲於後石門創迪章建築堡寨上件地名並在生界得之傳聞即未曽委官踏逐今來始見的實利害考核地理其後石門去野韭川創迪章去泥棚嶂並皆密邇臣既開拓疆土而更切切於此者所以為國家建固圉強兵之利非作身謀今凖朝旨罷修元奏堡壘勘會天都山乃在九羊谷西北去鎮羌寨一百餘里而創迪章泥棚嶂實在西邊鎮羌寨南至懷逺寨更有木魚川亦是賊路縱便將來進築直據天都其九羊谷鎮羌寨西面亦須有關防而野韭川見是賊來之路臣之管見所謂緊切者朝廷乃以為至間慢臣欲默默不言則所築城寨所拓土地如前之所陳欲紛紛辨論則上拂朝廷意指必取誅戮然而身當閫外之寄圖惟疆事不為朝廷取信尚何面目以見將佐士卒哉繼此或有所為欲望將佐稟從號令遵守約束亦已難矣伏乞朝廷先罷臣職任然後選委侍從或親信官按視體量如臣言繆妄乞賜重行貶黜以戒將帥臣見候進築九羊谷了當分屯軍馬起發往渭州聽候指揮次黃貼子臣前年冬蒙陛下召自逺方付以涇原經略之事朝廷方議進築亦嘗至樞密院遍觀臣僚奏陳䇿畫以至朝廷論議未有略及進築葫蘆河褊江川前後石門者獨鍾傳欲進築南陽川瓦和市善正泊已降朝旨令傳會合熙秦涇原三路兵馬進築臣即時於三省樞密院臣僚前疏駮其非因得指揮令臣自當管認一處臣既領職任體究鍾傳所陳校量利害未見有可為之理到官八日遂建進築石門前後峽好水河古髙平褊江等處幸託陛下威靈僅能集事但新開疆土自熙寧寨以北至平夏城僅四十里自古髙平西至鎮羌寨五十餘里自懷逺北至九羊谷約六十里自九羊谷東至葫蘆岸僅五十里新開疆土所築城寨直北有大山限隔賊之來路不過五六處至於自葫蘆河岸至古髙平正當十川及懷逺至九羊谷六十里間賊之來路甚多若不相度要害增築堡寨則將來必有抄掠之患客旅往來有害而二寨聲援不接空以透漏之法繩將寨官地分巡檢雖日行誅責欲其不透漏不可也而議者以臣為老怯臣年齒七十有二思慮顛倒怯害之譏所不敢辭唯乞陛下選擇不怯者代臣庶幾邊事早得允當又去年三月進築開拓四十餘里建兩城寨良田幾萬頃雖已招到弓箭手臣今親至其地只是城寨側近并新築古髙平堡左右方有耕者才百分之一至於平夏城東北至葫蘆河岸耕夫無敢施工其地非不美也其人非不欲也蓋西賊日夕隱伏伺隙抄掠便有殞軀喪命之患則耕者豈不畏懼臣得諸將議論方欲經營添築護耕堡使人人皆有生業秋夏田成熟之後官司計置糧草不至枉費國用既得朝旨一切不敢更有論列而狂瞽之語又及間慢之事此臣至愚至暗不敢自欺以希合朝廷也伏望聖慈深賜詳察擇才力強敏能如朝廷意指之人代臣早歸田里幸甚幸甚又臣本路竊觀李繼和曹瑋築寨置堡其意槩可考證三川定川兩寨相去才十八里而山外堡寨處處相望地里至近西賊尚或冦掠然不能為大患扞蔽堅全至今蒙利乃能安進弓箭手闢土力耕號為冨庶之地而有善戰之兵如此則有益於國有利及民今聞諸路進築競以深入逺去為能成城之後逐路舊額兵馬必須分差戍守城寨相去遼逺他日必有後患逐路止是舊日之兵既分布防守新壘西賊忽然舉國併兵攻圍一路未知何以支梧蓋興事不以漸則聖人有欲速不逹之戒臣每思之切為寒心更乞陛下深察愚𠂻又臣亦知諸路進築自用一路之兵指日了當逐處不獨因髙割削成城而版築之工甚省蓋非夏國要害之地故彼亦不來力爭去歲三月本路築兩城寨而西賊傾國之衆雲集今九羊谷興工三日已後已有六萬餘騎分布天都山左右只候中寨人馬齊集便來掩擊則本路舉動不可以比方他路也臣去年嘗委种朴進築𥚹江朴堅欲借兵鄰路自云步騎兵不滿八萬并不勾集保甲不敢舉事今春种朴在環州築灰家觜只用二萬餘兵亦有成功臣竊謂一种朴耳前日非怯今日非勇也蓋事有難易理有可為不可為此朴所以或怯或勇也更望聖慈廣覽兼聽審觀事勢察敵人之爭與不爭則難易之實灼然可見矣又泥棚嶂大障灣上下木魚川皆是西賊來路今築九羊谷與鎮羌寨相去不逺又臣分布兵馬沿路把截故不敢輒來斷糧運道路若將來進築天都全藉大車般運至九羊谷自九羊谷更不通車行須當以人夫頭口般運自鎮羌寨至天都百餘里之間賊路既多臣亦不敢保糧運道路不為西賊隔絶萬一救東冦西首擊尾應豈不危殆更乞朝廷詳察三省樞密院勘會朝廷昨降指揮止為九羊谷已建城寨即後石門創迪章不須進築慮虛費公私財力若逐處合於中路修築遮護道路耕種堡子即與古髙平塔子觜事體一般上件兩處即不曽奏聽朝旨今來因何不便行修建兼朝廷在逺邊鄙有未盡利害即當詳具條陳豈可便奏乞罷任及差官體量未欲别作行遣詔令章楶更切相度如泥棚嶂等處合行修築通路堡子可以遮護得人旅往來及弓箭手耕種如兵夫未放散之時即便隨宜修築若已放散即指揮姚雄一面經營候有間隙修築仍速具已措置施行次第聞奏不管將來却致賊馬抄掠往來人旅及有妨弓箭手耕種又詔章楶奏報輕易特降充龍圖閣直學士楶以三月五日奏此啓詔不知是何月日舊録於三月十六日略載楶奏即坐奏報輕易降職按前云未欲别作施行然則降職必不同日今但因舊録仍取楶奏詳載之舊録云涇原路經略使章楶言先凖朝旨後石門創迪章不得興工如已興工速行寢罷勘會天都山乃在九羊谷西北去鎮羌寨百餘里而創迪章泥棚嶂實在西邊鎮羌寨南至懷逺寨更有木魚川亦是賊來路縱將來進築直據天都其九羊谷鎮羌寨西面亦須有關防而野韭川見是賊之行路乞選侍從或親信官按視體量如臣繆妄乞量行貶黜詔章楶奏報輕易特降充龍圗閣直學士先是曽布言近日邊臣奏報大抵自肆如章楶前日議進築事稍不同便乞罷任仍云議者以臣為老怯此乃章惇與楶家書中語豈可便輕易書之章奏上亦以為不可令削一職衆皆以為宜蔡卞又言昨進築九羊谷不預計置博掾却奏稱旋行般運亦可罪布曰此未足言但以奏報輕易黜之則諸路皆知警懼衆亦然之遂有是命十九日又降一官尚書省户部奏請應州縣當行人吏攬納常平免役等錢物受贓乞依重祿公人因職事受乞財物法斷罪其鄉書手若攬納有犯即乞依近降紹聖常平免役因納受乞錢物法施行從之新削丙寅尚書省言進奏院承受尚書省樞密院實封及應入急腳遞文字並即時發又承受捕盜賑濟災傷河防緊急及制書并朝廷文字應入馬遞者並當日發又承受制書及朝廷文字入步遞者限一日餘文書不得過三日限內有故未畢監官隨宜量展從之新削户部言諸路酒務乞將大務所收錢數至歲終先比較祖額如有虧少即將比較務收到錢數補填大務虧少外有剩數仍依大務見趂祖額以十分為率除出二分外餘數依條紐計合支賞錢只支與比較監專等其大務即與免作虧欠若大務所收課利至歲終比額增剩比較務至歲終亦須收趂及二分外其餘增剩錢數與大務所收增剩錢通衮比較務賞錢仍比附依朝旨減正監官之半如比較務歲終趂不及二分數目其賞錢更不支給若大務依條合該改正新額即隨新額依此施行從之新本削去戊辰寶文閣待制吕嘉問為户部侍郎詔近聞省寺官多是私謁后族之家或以邂逅為名諸處宴聚當與薄責庶幾少誡吏部郎中方澤户部郎中劉宗傑户部員外郎鄭僅各罰金三十斤衛尉卿陳紘水部員外郎趙竦各罰金二十斤方澤知虔州鄭僅知建州趙竦知饒州陳紘提舉崇福宫劉宗傑管勾太平觀並任更居住三省言取到朝奉郎國子監丞蘇駉狀內語言不同詔差安惇同大理寺右治獄長官根治詣實奏聞駉頌子也先是同知樞密院林希靣奏蘇駉嘗過臣言見中丞邢恕云待教臣過三省等語既而又具劄子言恕謂駉欲令希過三省蔡京於三省有嫌唯西樞可處駉謂恕中丞眷遇方隆他人必未可先恕曰恕與京熟當且先之恕於此遲速無所校上曰此語可怪章惇曰當召駉至都堂問狀上令便召希再對又言臣不敢不以恕語聞者恐人疑臣有欲三省之意臣與恕本無他只緣臣為中書舍人曽撰吕公著貶詞深斥其惡恕本公著門客素出其門希純兄弟責望恕以報恩恕無可為者故自在言路力欲攻臣為吕氏報怨爾上默然希又曰恕日夜聲言欲排斥臣昨李譓公然對人言曽見諌官有文字攻臣更倡此語欲相傾搖曽布言曰譓之誕妄可罪無疑豈有安惇欲擊執政肯於殿廬中以文字先示譓臣亦聞人言恕云不擊希只令希自圖去就上曰此等語非所問但如駉所言則非恕所當預爾布又曰蔡京與章惇相失亦首因此京有兄弟並進之典而惇昌言於人云自三代以來無此故事故京深怨之上曰朝廷欲用蔡京則章惇亦管不得進退執政豈得由人布曰非獨進退執政非大臣所可自任至於侍從近臣亦當自人主進退豈大臣所得專若議論人物及論説事理亦恐無不可上曰論人物即不妨布曰若論議人物則踈逺小臣言之亦無罪然章惇所説義理則然惇但口快不當於人前昌言爾以臣度之惇未必敢於陛下前及此但京疑其沮已故深怨之邢恕亦嘗語人云人以恕為附二蔡恕實不附他但涉世牢籠人情所不免爾恕榻前之語乃是公論意謂於陛下前所陳至公也然外人但見恕與京及蹇序辰輩甚密故不能無疑恕大抵多言多用數人人欲得其歡心凡聚會處必人人挽之與之附耳私語然人亦罕以為信也上曰章惇言人謂之邢訓云好教訓人布曰自元豐時已有此名只如須欲調和不同之人人各有所守何可調一也恕元祐初行之已無效然為之不已上曰每來此論事重疊反復未嘗不移數刻所言者只是居常所論但每事須更從頭説一遍極可厭布曰外間亦常疑其奏對太久上曰甚久希曰須半時辰以上惇尋召駉至都堂問狀是日惇以駉所供狀進呈與希口奏頗異又言恕云進退執政當出人主雖宰相不得與惇因言初問駉時不及此既供狀乃及此上曰駉所陳却如此不同希復自辨上曰推治即見虛實故有是詔而恕亦以是日對延和殿奏疏劾希纎巧傾險天下共知頃事先帝遣使髙麗臨事辭難嘗坐譴責其後止緣王圭主張再歷文館先帝前後纍有德音謂為姦邪播在羣聽在先朝止於禮部郎官而已宣仁聖烈皇后垂簾王圭既死韓縝首在相位希與弟旦遂附韓縝擢希為左司郎中起居舍人旦為吏部考功郎官已而梁燾恣橫兄弟隂相附會期年之間燾凡再薦旦希以自代皆有顯據可以考質及至李清臣當國初除寶文閣直學士知成都府章惇既至未行復留為中書舍人翰林學士坐階柄任考希本末凡所黨附皆隂邪之臣其迹甚明惟稍見抑於先帝之時與元祐二三年間其餘無所不利則其纎巧可見加之引用親黨內外姻戚遍列朝路鮮有遺者其意乃欲遂擅朝廷以為私計中外有識無不知其為真小人而善諛用事大臣事之如奴所欲靡不如意其勢炎炎不可容長切恐終不利於國家伏望聖慈出自獨斷即賜罷黜上面諭恕曰得非以希奏卿與蘇駉言待教希過三省及蔡京為西樞等語乎恕謝不知上又以駉所供狀諭之恕言偶與駉談命夤緣及此非有他也上曰如此乃間話耳已差官根治恕退又入劄子言臣早來已曽靣奏臣乃陛下所擢以為御史中丞寄之耳目而林希乃宰相章惇所薦引階緣以至執政倚為腹心希與蘇駉係正親家駉之兄詒乃希之親壻駉又因希薦於章惇用為國子監丞希方引駉間時與臣兩人相對旁無證佐又無文字照據口語欲以誣臣有意移易大臣移易大臣乃出陛下獨斷雖宰臣所不敢與必待詢訪而後敢言豈臣力所能及其理甚明然恐希與駉相結欲以此誣臣既已付之吏議而章惇身為上相與林希為黨羣臣畏之如虎竊恐所差官觀望或慿無證不實之辭抑臣依從其為利害不細今臣為陛下耳目希為章惇腹心天下無不知者臣不為希所誣臣留而希去則權歸人主希能誣臣希留而臣去則權歸宰相安危禍福之機在此一舉欲望陛下深察近臣中非章惇等黨者令考實其事臣與駉言各無證佐文據所可慿者有理與無理爾臣將來若蒙取問逐次應報訖須具實封奏知欲望聖慈詳酌若臣言無理不逃聖鑒臣即甘俟誅貶若臣言有理惟望睿慈主張則臣庶免為文吏之所煆鍊用事大臣之所傾擠此事乃直上繫國體非止臣蕞爾一身而已伏望明主留神幸察恕尋又奏疏曰臣已彈擊林希竊恐大臣隂為朋黨欲望聖聰以希有誣臣之言欲不行臣所章疏緣臣欲擊林希非止今日其所論希罪惡並曽先事奏聞非謂林希見誣方行彈治兼臣十九日已前並不知希嘗有誣罔也原希敢結親黨以無證繆悠之常談厚誣天子耳目之官欲以塞臣之言使不得發此希之姦謀本情也大臣黨希者從而欲實其事則其助之之意已可見矣今欲遂如其請收臣章疏不行即是林希之姦謀果伸大臣黨助之意果行而天子之耳目廢朝廷之紀綱壞矣况臣論希罪惡與今來希所誣臣之語並不相干竊計其餘臺諫官亦有章疏擊希其言自合先次施行然後别治口語兩不相妨伏望陛下特奮威斷早賜指揮貼黃臣恐大臣或以臺諫為有黨欲廢其言如此是大臣為黨也今兩下皆可相指以為黨即乞聖意察其孰是孰非孰邪孰正孰公孰私其理是其迹正而其心歸於向公者即不黨其理非其迹邪而其心歸於營私者乃為黨以此觀之不知臺諫為黨邪大臣為黨邪必不逃聖鑒矣餘見四月十四日壬辰申王佖端王佶陳免守司空詔並不允户部言楚州奏漣水軍監稅奉職鄭夀妻室女因姑患消渴日久遂割股肉供食已得痊安乞特賜褒旌布之天下詔賜絹百匹羊十口酒十瓶麵十石大理寺言乞應大理寺開封府承受內降公事並依旨勘斷各不得奏請移送從之鄜延路經略司言討蕩夏州一帶人馬族帳得功人詔等第轉官減年支賜內減年人年限不同者依條比折皇城使已上轉官減年並回授與有官兒男蕃官如無磨勘年限人許權寄再立功通計推恩新本刪修云鄜延路經略司言討蕩夏州族帳得功人詔轉官減磨勘年賜物有差布録云賞鄜延夏州討蕩將佐等環慶路經略司言進築興平城畢工詔西上閣門使張存皇城使通州刺史張誠皇城副使兼閣門通事舍人种朴為統制兵馬進築興平城橫山寨畢工兼接納李額葉一行歸漢張存遷東上閣門使領成州團練使升充本路都鈐轄張誠遷秦州團練更轉一官回授與有官兒男种朴遷文思使餘次第推恩二月二十九日興平城賜名三月十六日橫山寨賜名額葉來降在三月十一日布録云賞環慶興平寨進築布録戊辰乂云環慶進通塞堡鄜延修開公堡按通塞堡畢上在二十四日癸酉詔涇原路經略使章楶申請進築措置般運不當特降一官十六日降龍直布録戊辰楶奏乞令熙秦般運斛斗應副進築特降一官又詔滿志行在軍中方鍾傳舉動反覆之際一無奏報前責太輕特勒停庚午幸申王府辛未幸端王府癸酉三省言提舉荆湖南路常平等事董必奏體量到知雷州朝請郎張逢同本州官吏至門首接見蘇軾蘇轍次日為會召軾轍在監司行衙安泊又令僦進納太廟齋郎吳國鑑宅逢每月率一兩次移厨傳管待差白直七人借事本州海康縣令陳諤差雜直追呼工匠等應副吳國鑑修宅又勒居民拆退籬腳闊開小巷通行人馬以避轍門巷及借手力等事詔蘇轍移循州安置張逢特勒停陳諤特衝替本路提點刑獄梁子美既與蘇轍係婚姻之家不申明廽避并其餘監司失覺察各罰金三十斤去年十一月二十九日必受命體量陳天倪作蘇門下語録云公謫官雷州市中無屋可僦獨有一富家餘破屋數間可賃仍與作交易文契分曉舍主欲稍完葺方交舍時章子厚訪問下州府發此事云蘇侍郎強奪雷氏田宅舍主鞫問賃契分明遂已數年子厚謫雷州亦召前人與議其人曰不可蘇侍郎來幾驚煞我今更不敢賃章相公也作法自弊如此按當時差董必體量天倪所聞未詳也涇原路經略使章楶言進築九羊谷寨畢工詔賜名九羊寨又奏修築石門峽東塔子觜堡畢工詔賜名石門堡紹聖四年二月二十八日建議布録癸酉章楶姚雄劉何李譓李光皆言糧草事力未備未可進築此事附見當考河東路經略司奏崇儀使張世永等統制兵馬出界星羅默隆橫川一帶討蕩斬獲一千餘級大小首領二十餘人詔張世永已下各等第賜銀合茶藥環慶路言修築通塞谷畢工詔賜名通塞堡樞密院言西賊近已困敝耕種之時必須並邊住坐耕牧如諸路對境及橫山一帶等處自來應係賊界內耕種之地若能體探得的實住坐耕牧去處知得賊衆多寡地理逺近可以必取勝捷時遣兵馬前去掩擊使賊不能安居耕種免使將來秋成更肆猖獗實為邊防之利詔西河東逐路帥臣豫選統制官及得力將佐精鋭兵馬戰具乾糧足備體探西賊盤泊耕牧處前去掩擊決保萬全毋致敗事布録云詔諸路時出擾耕六月末章楶奏可考涇原路經略使章楶言投來部落于都勒滿登都羅摩尼揚昌並為三班奉職優給路費伴押赴闕雄州言涿州牒稱為夏國告計會南朝却令還復舊所奪疆土城寨詔樞密院定牒本付雄州回牒涿州先是范鏜使北北接伴問夏國事且言夏人數遣使來彼求助欲祈罷兵仍云要地多為漢家所據及云曽移牒鏜答以不知是日進呈涿州牒詔令以四月中旬回牒而章惇言未可回牒尋己之他日上諭曽布曰北界又有牒催夏國文字布曰此牒已久不可不答上亦以為然布退以語章惇惇曰須十月乃可答布曰舊例皆即時答若一向不答萬一欲遣泛使何以拒之惇曰只消令雄州答以無例布曰終能遏之否惇曰若答速見自家勞攘往往便遣使若不答必不敢遣若如子宣意去年十二月已答了布曰答之何害元豐中牒至便答未嘗聞遣使此乃已試之效何以知不答牒却不敢遣使之理惇曰正如蕭禧爭地界只為應接太速布曰此事自有舊例莫與爭地界事不同惇勃然曰惇措置邉事不錯布曰安知不錯若誤他邊事自家莫難更安位惇曰自家誤他邊事不止不安位當斬首以謝天下布曰教誰斬惇曰好但任便若誤事惇不管他布曰布不至不曉事機權智略亦不在人下凡措置邊事一有過當必加裁節令就繩墨不然踈脫多矣許將曰所言皆有理且更商量十月誠恐太緩蔡卞笑曰止止不須説布亦笑既而吏檢元豐五年正月牒二月答惇乃已時六月壬寅也翌日同呈牒本旨以七月降牒本付雄州令八月回北界惇默然布亦不復論及再對布因言北界回牒已緩昨四月得旨既而章惇又欲罷今已得旨七月靣乞更不移易緣朝廷待此北人一飲食一坐一揖皆有常數以示無所輕重至於相國寺與館伴燒香先後亦必爭論但事皆有常故未嘗不屈伏今牒彌年不答乃明示以忽慢之意恐不便上曰是他無道理布曰元豐中牒一般事已往無可言者但此回更不可移易爾上曰無退見許將曰上對三省亦深患邉人不安靜當以理待之蓋聞昨日喧爭之語也六月二十六日癸卯布録今併入此甲戌定武軍節度使開府儀同三司咸寧郡王俁改河陽三城雄武軍節度使進封莘王集慶軍節度使開府儀同三司普寧郡王似改橫海鎮海軍節度使進封簡王武成軍節度使開府儀同三司祁國公偲改武安軍節度使進封永寧郡王中書舍人范鏜試給事中權户部侍郎杜常為集賢殿修撰知青州權吏部尚書葉祖洽言伏見太常寺定到韓縝諡議申尚書省部覆議按縝在先朝擢於罪廢之餘致位樞機之地其受先帝恩德為不淺矣然垂簾之初內則交結張茂則梁惟簡以取宰相外則附司馬光輩逐蔡確為自安之計至於更改法度縝嘗隂致其力凶虐貪穢之迹暴著中外莊敏美諡非縝所宜詔更不定諡邵伯溫辨誣云韓縝有心術章惇畏之凡元祐執政從官惇必以事中之不敢及縝方遷謫諸公時縝以節度使知頴昌府觀文殿大學士領宫祠蓋惇慮縝能害己也至縝死方使葉祖洽言不與贈諡而已詔新除宥州刺史充環慶路緣邊兼橫山寨至宥州一帶蕃部都巡檢使李額葉别降宣命降去環慶路緣邊兼字只充橫山寨至宥州一帶蕃部都巡檢使本路帥臣言額葉新附未宜遽統諸蕃官恐於蕃情未安故有是命十一日額葉來降詔章楶候農事稍空進築沒煙前峽此據布録御批契勘京朝官以上自合衣公裳出入宣德郎司馬宏承務郎勾當染院李無咎不識分守身服便衣輒敢微行街市雜與小人為伍觀看車馬士人立朝全無亷耻可送御史臺疾速取勘具案奏裁司馬宏李無咎並衝替五年三月二十五日事乙亥寶文閣待制知桂州胡宗師知永興軍朝散大夫權廣西轉運副使程節為直祕閣權知桂州詔遼使經過如遇知州病患事故差請到權迎送人使官應本州接送人使有違慢闕誤許權官按舉勘斷從接伴使韓粹彥請也户部言乞河北河東陕西路除知州通判外其餘當職官並不許入中及坐倉坐場其糶俸餘即不得過坐倉分數從之新削五月二日刑部言犯罪未敘及己敘未復舊官而再犯罪者自後犯日别理期敘從之吏部言官貟罷任或未罷任應關升者並許所在州投狀録白未經關升文字差官點對仍取家狀一本連申吏部即願赴部關升者聽從之新削無丙子朝請郎李延賁守將作少監詔少府將作軍器少監雜壓並依元豐令其元祐指揮更不施行元祐指揮云何玉牒云復少府將作軍器少監班序熙河蘭岷路經略司言進築丹喇關畢工詔以通會關為名除陸師閔鍾傳己責降其路分都監已下各等第賜銀合茶藥本紀書丙子築會寧關蓋五月二十三日改通會為會寧也樞密院言京東西路安撫提刑司奏乞依元豐五年詔巡檢下全置土兵緝捕盜賊從之其所招土兵仍須本州及鄰州有户籍者無户籍有主户一名委保者亦聽招刺詔今後在京禪僧寺院士庶之家婦女除同本家男夫作齋會聽人入外餘輒入者並杖一百夫子知而聽行及主首不舉各一等科罪先是開封奏請乞嚴行禁止故有是詔新削户部言欲陕西路年額解鹽鈔只得赴池請鹽其泛給文鈔許赴京中賣請錢從之新削戊寅樞密院言溪洞緣邊寨鋪寨主都監兩貟處每半月一次輪那一員逐日量帶兵甲在外寅夜於地分巡邏把截仍本州給印歷付所管地分官司寨鋪候逐官巡歷到彼即時批上官位姓名月日季終繳申本州點檢申都鈐轄司如巡歷不到虛上文歷以違制論不以去官赦降原減從之朝請郎集賢殿修撰前知河中府韓宗師卒
