body:
  text: 續資治通鑑長編卷四百一宋李燾撰哲宗元祐二年五月乙丑禮部言西南蕃泰平軍遣石蕃龍以定等齎表装鞍馬砂氊等来貢元豐著令西南五姓蕃每五年許一貢今年限未及合具奏裁詔特許入貢兵禮言江淮等路制置發運淮南路轉運淮東鈐轄提㸃刑獄提舉常平司奏請以宿州虹縣子仙埠為鎮徙通海鎮廵檢司扵子仙鎮仍扵本鎮置場收税賣鹽及濉河西岸淮陽軍界鎮上烟火公事並令廵檢兼之又淮南西路提㸃刑獄司奏請徙蘄州馬口廵檢扵蘄口鎮駐劄並從之可削户部言奉詔㫖舊給蠶鹽處並依昔年例散歛本部約度府界京西京東等路共合用蠶鹽三萬二千五十席請從本部預給鹽引令出賣解鹽司召人結攬般運扵絳州垣曲縣鹽司送納令三門輦運司般運應副支俵應合給脚乗文鈔亦令解鹽司據所般實數申本部撥還從之丁卯中大夫守尚書右丞劉摯為尚書左丞朝散大夫守兵部尚書王存為中大夫守尚書右丞戊辰朝奉郎起居舍人孔文仲為左諌議大夫承議郎大理少卿杜純為侍御史七月二十二日罷朝請郎殿中侍御史吕陶為左司諫七月十六日罷朝奉郎兵部員外郎賈易為右司諫八月罷監察御史韓川上官均並為殿中侍御史均十月十六日罷承議郎侍御史王巖叟為起居舍人朝奉郎左司諫朱光庭為左司員外郎奉議郎右司諌王覿為右司員外郎殿中侍御史孫升差知濟州右諫議大夫梁燾為集賢殿修撰知潞州先是燾扵省中面詰給事中張問以為朝廷近以大臣罷御史當乎問曰不當燾曰言者論之是乎問曰當如此燾曰給事既知罷御史為非又以言者為是初不駮正之何也問曰自有臺諌燾曰朝廷命令之出間有失當初則有舍人繳納中則有給事封駮至成命已行公論不以為然諌官御史乃論之今給事不舉封駮之職乃曰自有臺諌如此焉用給事乎問引咎而已燾因誚問貪祿不去不知世所謂羞耻及宰相遣吏召臺諌官至都堂聽詔燾約同列曰必以張御史事當繼求對既至宰相面出手詔果以舜民事示言者燾同御史與宰相執政辨論乆之同知樞宻院事范純仁曰臺諌出入廼是朝廷常事燾曰樞宻之言失矣先文正與樞宻皆厯言路必熟國體文正以正直聞天下不謂樞宻以朝廷罷直臣為常事此言非公所冝出固非燾所願聞也門下侍郎韓維曰且重惜國體燾曰臺諌論不當因大臣罷天子耳目之官正謂重惜國體使紀綱正而朝廷尊者御史之任也今斥去臺諌正論之臣以紊紀綱曰重惜國體非所喻也方兩宫臨御大臣尤冝避權勢尊主威諸公以累朝人望進當人主仰成之時願自全盛徳以安國家上章請對眀日面論至伏地懇諌謂假借大臣罷斥御史玷求言納諫之眀損大公盡下之志非所以全養忠正而感勵恭順之心也退即家居待罪而孫升再劾張問引燾不知羞耻等語扵是批㫖付三省曰巖叟光庭覿川等乆在言路多所補益冝稍遷擢燾扵禁省詬同列升朋附燾冝罷扵是巖叟等皆逓遷而升燾有是命實錄載舜民罷言職及巖叟等遷改殊不詳六月八日因堯俞知陳州始縂載其事然亦不詳也今悉就本月日追書之吕公著家傳云初二聖首從公言闢言路自是臺諌官章疏無虛日常假借納用焉其後言者益自肆上意寖不懌㑹御史張舜民弹劉奉世語侵太師文彦博乃罷舜民臺職以秘閤校理判皷院扵是臺諌交章以為舜民不當罷上不從中丞傅堯俞諌議大夫梁燾侍御史王巖叟司諌朱光庭王覿御史孫升各居家待罪上命執政召言官至都堂諭以舜民言彦博私奉世使夏國非彦博所見且舜民既平遷難再除御史堯俞等不受命而燾尤喧悖按王巖叟奏藁則居家待罪在召赴都堂宣諭後宣諭乃五月九日居家待罪乃五月十六日公著家傳盖誤也又云言者益自肆上意寖不懌恐亦是私意今不取實録載巖叟等罷言職在十六日按十六日巖叟等入對延和歸即待罪眀日乃罷梁燾行状亦云請對之明日遂責盖實錄誤以十七日為十六日也今改之尚書右丞劉摯言臣伏自罷去言職待罪都省以来不復以章疏論事者盖以謂職在執政茍有所見自當與同列僉議進對顯奏公言而行之不當私有宻請恐非所謂直道事上者也必料陛下亦已察臣之意如此而已乃有不得已之事湏至一言冀効萬一十五日吕公著送示内降批降㫖罷諌官梁燾等或稍遷或移易或免黜者共十數人臣竊料陛下必以近日張舜民事言者救諌紛紛不已雖然仁恕包涵而又欲加彈壓故不行重責但罷其言路此足以見聖度廣大愛惜數人之才黽勉而為此也臣觀舜民之論文彦博止有照管劉奉世一言而已此一言小事也奉世有才可用方出入彦博門下受其知遇而照管之乃大臣所冝則扵彦博何傷兼彦博自不以介意而議者私憂過計恐彦博有所不樂致陛下為罷舜民舜民之罷亦小事無足道而言事者若欲論之一再言足矣何至議論蜂起相繼並作紊凟天聽至煩宣召申諭尚且不已誠有罪也舜民輕言以及元老一失也議者欲慰悦大臣而罷御史又一失也言者知救舜民以全言路而不能體聖眀優禮故老之意又一失也今朝廷又從而移罷臺諌則恐不止扵三失而朝廷之失最處其大者也此臣所以夙夜徬徨深為陛下惜之也古之眀君賢主惟以開廣耳目優養直臣為甚盛之徳故曰主聖則臣直惟堯舜及三代之盛王乃有其事而陛下今優㳺行之自前嵗以来求善若飢渴從諌如轉圜臺諌官言茍可采無不行者雖有失當一切包納故臣子無戮辱之懼罔避權要舒心展誠知無不言所以養就今日忠直之氣上下姦邪摩手切齒嫉惡臺諌亦已乆矣夫臺諌以區區小官上則觸龍鱗而犯忌諱下則結仇怨而取祸患不知其何所利也盖恃陛下主張謹其官守以盡其事君之義爾一旦以小故摧沮罷去之適足以快憎怨之氣開私枉之門非朝廷福也若言者有所私狥渉扵傾陷近扵朋黨則不可不深責而痛治之若乃出扵公義則雖有强直乖誤之言古之聖人一皆容之考之扵傳記不可勝數今夫一言旁及大臣而罷之則後来者不肯言大臣矣一言彈給事中而罷之則後来者不肯言近侍矣以多言而去之則後来者循黙不言矣以剛勁而黜之則後来者柔和取容矣人情不逺相與為戒必然之理也深惟皇帝陛下恭黙未言太皇太后陛下簾闥行政之日正冝大開聰眀以廣萬事之聽而乃杜絶言路是自蔽其耳目也言路一塞何事不生天下之朋黨大吏之私邪百官之罪惡逺方之利害陛下何由一一知也今成命已行臣不敢盡乞改正所以區區言之者非獨為數臣盖所惜者朝廷事體爾數日内梁燾孫升外議以為責之太重臣欲望聖慈詳酌寛此二人之責還其職任以救言路以扶持忠臣之氣且天下之廣莫知其詳但見臺諫官連羣罷去頓與前日之事不同必疑謂聖朝厭倦言者則姦䛕者張目攘臂而動矣後来所用未必皆得如此數人邪正既不可知言路風采一變豈不有損盛徳之治臣天生愚直孤立扵朝受陛下異恩至深至厚夙夜思報惟有竭誠以主張公道不敢雷同唱和苟有所見可以禆補若不盡言于陛下則將何所告訴也因此得罪亦不敢辭伏望赦其狂愚特賜詳察開允貼黄梁燾清修勁直臨事不茍昨者詰責張問雖在衆坐訪聞似因戯謔而坐客有不喜燾者遂播其言以為詬也盖是私居相語之言而問又别無論訴止因孫升彈問罥罣及之至聞逹于朝廷今遂如此行遣羣議皆以為未安也孫升乆在臺中禆補不少論張問止為老不任職别無傷事之言兼前後臺諌彈劾官吏雖或不行何嘗一一加罪今責外郡亦恐過重如蔡碩一獄非升不畏强禦誰能發之今碩獄未斷而升已先責碩之親黨布滿上下適足為仇人報怨耳兼升見有文字論三省差除不當事已䝉降出此皆人人之所難言者伏望矜察寛此二人之責若謂各人已除代者即望别與在京差遣稍加遷擢以償孤忠以慰公論又貼黄昨䑓諌官至都堂宣諭聖㫖既畢公著與臣等因而再三開説内燾與升指陳事理其語氣最為勁直今乃得罪最重外議所以尤疑也又貼黄臣非謂自言路進遂欲主張言路者盖以此事繫朝廷不敢過避形迹故盡其底裏以告扵陛下若幸聽臣之言留此二人足以救萬一之失今雖已有成命命猶未下此事進告尚湏一兩日伏望聖慈再三回慮深思此事早賜裁處不悞陛下舉動又貼黄孔文仲端方該博今為諫議大夫可謂得人矣至如王巖叟鯁亮敢言補益國事最為有功王覿韓川皆有器識知大體願陛下聖念無忘此三人早加進用必不誤任使又貼黄初罷舜民日臣與吕大防曽扵簾外開陳事理其後臣又扵都堂累曽講議多不以臣言為然今湏至獨入文字訴於陛下然亦别不敢囘改已行之命止乞留燾與升在朝廷如䝉省覧伏乞留中升論差除不當合考寳文閣直學士知蔡州謝景温知頴昌府左屯衛大將軍知潞州郭逵為慶州觀察使知河中府温州刺史提舉萬夀觀向宗囘知蔡州刑部言降授四方館使嘉州團練使提舉崇福宫狄諮元任引進使嘉州團練使提舉河北保甲縁措置乖方左降使額著令以期檢舉詔更候一期取㫖樞宻院言近者熈河蘭㑹路經略司等處累奏夏國與西蕃約和連結嘗犯定西城本城監押吳猛鬬死又犯涇原路藺家堡及扵漢界擄掠人畜焚毁舍屋等事夏國自去年再乞納欵頗見恭順慮是邊臣生事請令趙卨廣募自来信實之人厚與金帛令深入夏國直至興靈以来宻訪敢侵犯因依審實急遞以聞從之鄜延路經略使趙卨言蘭州西關城請候分畫界至了日進築樞宻院言熈河蘭㑹路新復城寨其不係給還處係勑書該載今来西關止是修葺舊堡即非剏有進築昨夏國文移止辨論朱梁川曽有開耕地土即不及西關况劉舜卿奏已畢工及已誡約諸路務令静守詔劄與趙卨照㑹又言元豐中令陕西河東逐路經略司嚴切約束邊臣若西賊對境屯聚不得先有舉動竢其犯邊即隨冝禦敵深慮諸路為聞近日熈河涇原曽有西賊出沒幸邀功賞之人乗勢張皇造作邊事帥臣常切彈壓持重毋輙輕動滋長邉患其或敢違雖有立功不惟更不推賞仍量罪重行降黜請下逐路經略司遵依覺察從之是日詔同知樞宻院事范純仁與尚書左右丞理先除授者立班在上先是神宗釐正官名各有位序以官職為次不以除授為先後扵是特降新制御集十七日己巳太師文彦博等言伏奉詔㫖以時雨愆期太皇太后陛下憂閔元元側身修道躬自貶薄以奉天戒權停受冊之禮誠心上徹昭貺隨答恊氣来臻時雨溥霔内自畿甸外及州郡二麥既登秋稼有望陛下勤民克已如此上天降鍳應誠若彼臣等不勝欣幸竊惟尊號冊禮一朝大典正名定位義不可後譬如萬物之扵乾坤人子之扵父母豈可湏臾而不稱哉而乃稽留盛禮不使時上仰無以稱穹昊之眷顧俯無以狥億兆之愛戴臣等不勝大願謹據太史局選定八月初四日舉行儀範崇上徽號詔不許自是三請乃從之三省言吏部狀文彦愽奏請委本部尚書侍郎依唐六典三類之法將本選守令通判考其才徳功効為上中下三品送中書門下覆驗可否委本選長官引對間有人才髙下絶異者特以名聞而進退之詔送給事中中書舍人左右司郎官吏部禮部參詳應守令通判請依元豐考課令通取善最分為三等候罷任委監司審覆具事狀保眀以聞付吏部定本遷合入差遣内知州通判申尚書省覆驗可否定訖付本部官候注擬日引對即守令通判内有才徳功効過惡顯著令尚書侍郎銓量髙下特以名聞乞行陞黜嵗毋得過五人從之彦博元奏附三月十六日梁燾云云可考詔令學士院降勑書奬諭知楚州程之元以淮南賑濟所言之元究心存撫請褒擢故也權發遣熈河蘭㑹路經略司公事劉舜卿言蘭州蕃兵將韓緒不審察虛實誤報提舉修西關堡孫路等致仕修築乞衝替仍就差皇城使鄜延路第九將郝貴填緒闕從之洮西縁邉安撫司言西賊圍閉南川寨八日詔劄與劉舜卿多設方略救援應河州屯聚并經略司節次差去軍馬合用糧草令孫路就近應副又詔以皇城使鄜延路鈐轄兼第一將呂真權發遣涇原路副總管其第一將闕令本路經略司選官以聞詔澶州置州學教授一員從本州請也辛未左司郎中范純禮為太常少卿右司郎中杜紘為大理卿存此要見蘇轍劾杜紘竟不從也壬申于闐國遣使入貢刑部言大理少卿杜紘請省斷官且仍舊額詔省評事二員以十二員為額癸酉御史中丞兼侍讀傅堯俞為吏部侍郎堯俞不拜六月八日待制陳州吏部侍郎胡宗愈為御史中丞宗愈首進六事曰端本正志知難加意守法畏天且言陛下從吉之初四方觀聽若留神此六者則治道得矣他日奏對便殿上問朋黨之弊宗愈曰君子義之與比謂小人為姦邪則小人必指君子為朋黨陛下擇中立不倚者用之則朋黨自銷因進君子無黨論詔孤遺宗室非袒免親外如父祖俱亡無官俸貧闕者委大宗正司及所在官司體訪驗實以聞仍令户部計口第支錢米女已嫁即除之有官者候釐務日住支四月十八日王巖叟所言三事此其一也甲戍朝請大夫充龍圖閣待制知洪州熊本降朝散大夫以先知桂州分畫地界失當故也乙亥資政殿學士知永興軍曽孝寛知頴昌府五月二日孝寛自永興改秦州不行吕陶云云附六月末寳文閣直學士知頴昌府謝景温知成都府吕陶云云附六月末朝奉郎右司員外郎孫覽為直龍圖閣權知秦州開封府言將来坤成節已在後吉後請依長寜節故事度僧道共三百人為額從之詔姚麟罰銅八斤以殿前司言歩軍司擅勾抽捧日指揮人救父故也孫升集有劾姚麟章今附此升言十一月四日朝㫖姚麟罰銅八斤放王道依舊収管臣訪聞初晉用扵内臣閻士良處送酒并封狀與姚麟麟遂違法放停上件偽造黄紙簽符配軍王道事狀甚眀盖兩日之内親判放停若非狥情豈故違法臣愚竊以受賕枉法遇赦不除慢令肆情主兵所戒事防其微漸不可長姚麟掌握侍衛出入禁庭而交通内臣不遵詔令如放停配軍王道止一事爾臣偶察知而有按據可以照驗者則其他從可知矣若朝廷止令罰金依舊供職則何以杜絶姦私嚴肅軍政伏望聖慈詳察出自聖斷早賜指揮罷麟職任以戒廢法慢令之臣貼黄武夫悍卒屈慴馴伏者畏陛下之法爾管軍之臣狥情挟私慢令廢法曽無忌憚止於罰金則將何所不至也樞宻院言西蕃賊馬攻圍河州南川寨逐州軍見屯漢蕃兵馬當暑暴露當行體恤詔劉舜卿躬問士卒勞苦糧食多寡從冝撫恤仍依倣舊例隨事資助使無愁苦樂扵赴敵以稱朝廷撫士之意又言河州南川寨自初二日被圍日夕望救其王光祖王贍姚兕种誼等各統領所部軍馬前去㑹合牽制至今多日未奏觧圍次第請令劉舜卿嚴諭光祖等體認南川寨人力糧儲有限當此圍閉日乆勢力危困務要應援分觧賊圍不得以伺便為名任賊攻圍玩㓂損威誤國大事以至師老糧匱坐取困乏仍厚給金帛召募死士許以重賞令取間道前去南川寨投下文字使知救兵已到安心守禦俟賊退其守城出戰人等自當優賞並從之丙子宗正寺言被㫖修纂濮安懿王以下屬籍故例以宣祖皇帝之子為巻首次即以宗從髙下為之序今若以濮王為巻首則先後不倫請以慶厯已前薨卒宗室屬籍與今所修屬籍相照通計巻第應籍已進者更不重進止扵目錄逐巻増注舊籍二字及將舊籍巻目改貼與新籍通計其數庶有所分别及不失昭穆次序將来接續更修並請依此從之復成徳軍靈夀鎮為縣丁丑朝奉郎王景修提舉出賣觧鹽詔闕臺官令學士院舉官二員兩省諫議大夫以上同舉四員御史中丞同舉二員以聞新河北路都轉運使顧臨言請徙河北提㸃刑獄官就恩邢二州置司從之丁憂人前朝奉郎著作佐郎王仲修特勒停前宣義郎王仲端特依差替人例以仲修等坐令蔡碩屬其兄確撰父珪神道碑為美詞及受碩請屬以犯杖人王儀冒名補授門客恩澤故也户部言近凖詔㫖令諸路乗時廣行収糴今諸州縣長吏及糴官以所管錢計所用糴本分數等第定賞著為令從之王巖叟既除起居舍人固辭不拜是日中詔付呂公著曰巖叟不能自力為朝廷論事而多計㑹已下之官符同論列及薦張舜民不當欲行黜責然以前後論事頗多不欲深罪亦難為授起居舍人今因堅請外補欲除與一直集賢院提㸃刑獄差遣扵恩禮不為不優也如中理則待批巖叟再乞外補狀付外施行卿相度如何却實封進入公著言巖叟近日言張舜民事誠為過當但自来臺諫亦多是相率論事今若因其堅乞外補與除直龍圖閣知藩郡近時朱服滿中行皆自起居舍人因有人言如此除授又批付公著曰王巖叟在言路日淺雖有除命比朱服滿中行不曽赴職卿相度扵次龍圖閣下一等職任擬定實封進入竟以巖叟為直集賢院然故事知雜侍御史無為提㸃刑獄者乃除知齊州王巖叟出知齊州實錄扵六月八日因傅堯俞補外乃言之今從吕公著家傳附五月二十六日按堯俞二十二日改吏侍巖叟尋出堯俞遂力辭新命自當先書巖叟之出也吕大防政目巖叟知齊州在二十八日戊寅刑部言大理寺右治獄應命官犯罪并將校犯徒以上或贓罰餘人罪至死請依舊具案以聞並下左斷刑詳斷非品官者仍斷定刑名應流以下罪人刑名疑慮或情法不相當亦擬定先上刑部裁度如所擬平允即具鈔或檢擬取㫖應刑名疑慮仍聽赴左斷刑評議并比附取裁從之樞宻院言殿前馬歩軍司申請於馬軍頭額内復置槍手一分並給官馬與諸班槍手仍舊教閲應弓箭手兼習蕃槍者並權罷都令兼習小槍從之新削六月十四日又見此可削已卯詔河州南川寨圍閉賊馬並已退散所有因今来事冝曽經抽差牽制應援漢蕃軍兵等並令劉舜卿以勞佚輕重等第特支其南川寨守城漢蕃軍兵婦女等如晝夜捍禦委有勞効亦依則例輕重支給並就委走馬承受喝賜令轉運司應副其經戰立功及守捍有勞矢石傷中應論賞人並等第保眀以聞詔河北陜西路提刑兼提舉保甲並依提刑司分路禮部言交州進奉人乞進賣象牙等估九千四百九十貫有竒詔特添賜并估支錢一萬貫新削瀘南㳂邉安撫使司言請應瀘州界土人因邉事補授班行自出備土丁子弟在本家地分把拓之人並循乆例把拓邉界更不與請給亦不理為資任磨勘改轉若别有勞績戰功并被差入逺界合該推賞自繫臨時奏請恩㫖其敢邀功生事根究得實並不用䕃贖特行决配廣南逺惡州牢城從之庚辰神宗皇帝禫除羣臣慰如儀
