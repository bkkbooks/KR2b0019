body:
  text: 續資治通鑑長編卷三百六十六宋李燾撰哲宗元祐元年二月癸酉監察御史王巖叟為左司諫侍御史劉摯言摯遺藁此章以二月十二日上臣昨者曾論天下監司多無善狀乞朝廷考察澄汰别行選任後來未聞指揮方今陛下興復仁政綏安生民而詔令所下奉行究宣實在部使者有非其人澤不遍被臣伏見河北轉運副使李南公險薄刻害無士人之行天下所知往者以不嫁其妹委于他人先帝惡之黜置散地未幾夤緣再被任用本路昨起鹽禁南公虐行其法科配勞費一路被患近蒙聖恩遣使經畫已皆廢罷則害人之狀臣不復言南公職任監司親被寄委未嘗有一言論可否于朝廷意欲取勝京東有徼幸之望而不顧為國斂怨又去年三月陛下聖恩優賞軍士南公輒移檄州郡令于等第人户括借物上下驚擾人心不安及宣例繼下方行追改然户民已有逃遁避去者南公之倚法罔上急于功賞遇事應變措置乖方此其大略也朔方劇部非他郡比朝廷北顧為重而南公者豈宜久使居之肆其殘虐實不足以副朝廷厚風俗安疲瘵之意伏請特行貶黜以允羣議不從南公尋徙河東路南公自河北改河東在閏二月福建路轉運副使賈青添差監衡州在城鹽酒稅轉運副使王子京添差監永州在城鹽倉兼管酒稅務先是福建路按察張汝賢言青兼提舉鹽事不究利害嚴督州縣廣認數目令鋪户均買子京相承行遣又違法過為督迫訪聞轉運副使陳紘獨有寬厚之稱明知新增鹽額髙大曾無舉發亦乞朝廷詳酌指揮故有是命政目于八年十月十八日已書朝散大夫賈青提舉太平觀今又書此合削彼所書詔户部郎中黃亷按察川路茶法具利害以聞兼體量蒲江鹽并利害行狀有此合增入先是劉摯言臣伏覩陛下即位聽政以來喜與天下休息于安治凡令之弗宜于民者疏通損益之官吏之弗良于政者罷免放黜之中外欣戴人人如被大賚然事猶有在逺方重地為害尤甚者則河北江湖之鹽法福建川蜀之茶禁是也數路之害同而河北江湖福建已蒙朝廷遣使亷治之獨蜀之茶害未聞詔旨臣竊嘗博訪於知其事者槩得其説曰蜀地陋而狹茶之所出不過數十州而已始時人賴以為生今茶司盡𣙜而市之大約園户有茶一夲而官市之額已至數十斤矣官所給錢縻耗于公者名色不一如預借息錢驗引頭子錢稅錢之類費用常以過半每嵗春官司預以劵給借錢糧必以牙儈保任之及輸入之日驗引交稱又牙儈主之故其費于牙儈者又不知幾何則是于園户名為平市而實奪之也園尸有逃以免者有投死以免者已而其害猶及鄰伍欲伐茶則有禁欲增植則加市故其俗論謂地非生茶也地實生禍也茶場司以茶為息始者息一出于茶也其後市之價愈下取之息愈多園户不勝為之也故作茶日少裁足以應官額而已于是主茶息者議不獨賴茶而又為博易以充之也博易之事他貨百物貿販苛刻錐刀瑣屑無不為者依茶為名通曰茶息商稅務坐視漏失嵗課而不敢有所論也至于商賈請算者平時便私散之州郡茶地今則一集于成都一都場髙其估以與之又總計平時所之州郡逺近道里之費故都場之取息又如此商旅之所以難行也官吏以息為功以功第賞既進官減年矣又以息額之餘錢使與胥吏牙儈分取入已日用市易法也市易之賞固非法也然其取息猶曰與民和市而茶之取息一用嚴刑重禁網羅致之亦為功異矣奈何均用一法賞之也今一任有分錢少者至數千緡而減年磨勘至有三十餘年者此何理哉法亦可謂敝矣而朝廷遣使未之及者豈非以蜀之茶法與熙河蘭會之經制相為用者歟蜀茶之利以給熙河蘭會者天下十之三熙河蘭會之費不止而蜀茶之害未可息也然熙河蘭會之費今昔冝有不同昔者事邉之外前有王韶後有李憲提兵革財用之大權朝廷捐金帛市租莫知紀極聽其自用不領于有司無所會計非徒私二家也于是依倚茍合之客圗功興事以利相市之徒公取公豫莫見其迹則熙河蘭會大費外又有以泄之者如此也今既制之于有司無二人者之橫蠧若又于邉計外凡冗名濫費一切大為之節約則蜀之茶雖未可以弛其禁而所謂十之三者殆必可損矣伏望聖慈選遣使指考茶法之敝欺者會計緣茶公家之所費與實息之數大減嵗市之額稍增斤直之價削納茶無名之錢以完養園户裁官吏之貟牙儈之數以省冗給罷息賞之濫分錢之敝以革欺幸而以其事與轉運司通治之如此則蜀民之困苦庶乎可以蘇也臣待罪言路既有得于人之言敢不亟以聞然此其大略至于利害纎悉則願敇使者詳究焉黃亷行狀可增入六月二十八日陸師閔罷時四月二十五日蘇轍云云五月四日差杜紘六月二十八日陸師閔罷開封府界提點司言準朝旨相度祥符縣霧澤陂乞令人户依舊斷佃匱水應副廣濟河行運從之新録削去詔河北路解發到保甲內尚榮孟隆李贇與三班差使更減二年磨勘孔震與三班借差並袍帶令歸吏部承受差遣以試驗武藝出等推恩也兵部言府界提點提舉保甲司申準朝旨保甲更不教騎乞諸縣見催人户買馬填官者並令依元價送納價錢夲司封樁從之仍以元價十分為率若養及一年已上倒死者與免價錢二分每及一年遞減二分至五年者依條蠲免右司諫蘇轍始供諌職上言臣伏見皇帝陛下以至孝純仁承統踐阼太皇太后陛下以聰明睿智親庶政二聖協德以幸天下曾未期嵗而敝事稍去寬政復行元元之民免于流離之患蒙更生之福海內釋然無意外之憂不勝幸甚伏惟陛下恭勤祗畏發于天性猶復選于羣臣增廣諫員求直言以自助天下之士聞風相慶臣實何人得於今日備位于此然臣聞帝王之治必先正風俗風俗既正中人以下皆自勉以為善風俗一敗中人以上皆自棄而為惡中人自勉于善則人主耳目衆多易於為治中人自棄于惡則臣下朋黨蕃殖易以為非蓋邪正盛衰之源未有不始于此者也昔真宗皇帝臨馭羣下奬用正人一時賢俊爭託明主孫奭戚綸田錫王禹稱之徒既以諌諍顯名則忠良之士相繼而起其後耄期厭事丁謂乘間將竊國命而風俗已成朝多正士謂雖懷姦慝而無與同惡謀未及發旋即流放仁宗皇帝仁厚淵默不自可否是非之論一付臺諌孔道輔范仲淹歐陽修余靖之流以言事相髙此風既行士恥以鉗口失職當時執政大臣豈皆盡賢然畏忌人言不敢妄作一有不善言者即至隨輒屛去故雖人主寬厚而朝廷之間無大過失及先帝嗣位執政大臣變易祖宗法度下至小民皆知其非而卿士大夫從風而靡則風俗之變于此見矣是時惟有呂誨范鎮等明言其失二人既已得罪臺諌有以一言及之者皆紛然逐去由是風俗大敗無一人復正言者天佑皇室啓迪聖德臨政未幾而以言路為急天下聳然思見祖宗遺俗然臣自至闕廷聞臺諫封事一切留中不出既不施行又無黜責臣不勝憂疑夫朝廷所以待臺諌者不過二事言當則行不當則黜其所上封事除事干機密人主所當獨聞須至留中外並須降出行遣上所以正朝廷之紀綱使無廢職業下所以全人臣之名節使無負公議若當而不行不當而不黜則上下茍且亷恥道廢風俗衰陋國將從之臣願陛下永惟邪正盛衰之漸始于臺諌修其官則聽其言言有不當隨事行遣大者可黜小者可罷使風俗一定忠言日至陛下垂拱于上羣臣肅雍于下則太平之治可立而待也惟陛下留神省察天下幸甚甲戌上御邇英閣侍讀韓維進讀至天禧中有二宫人犯罪法當死真宗皇帝惻然憐之曰此等安知法殺之則不忍捨之則無以勵衆乃使人持去笞而遣之又幸汾隂日見一羊自擲于道左怪問之左右曰今日尚食殺其羔真宗慘然不樂自是不殺羊羔因奏言此特小善耳然推是心以及天下則仁不可勝用也且真宗自澶淵却敵之後十有九年不言兵而天下富其源蓋出于此昔孟子論齊王不忍觳觫之牛以為是心足以王今恩足以及禽獸而不及于百姓豈不能哉蓋不為耳外人皆言陛下仁孝發于天性每行見昆蟲螻蟻輒違而過之且敕左右勿踐履此亦仁術也臣願陛下推此心以及百姓則天下幸甚三月二十四日程頥亦言避蟻事詔府界三路提舉保甲官并官屬罷謁禁是日甲戍十五御史中丞劉摯言臣昨纍具狀彈奏宰臣蔡確知樞密院章惇乞行罷免至今未聞可否指揮臣竊以御史諫官之彈劾大臣豈敢輕易哉言既出口疏既上聞則其勢不可以中輟其義不可以兩立也幸而人主聽用其言而罷大臣則諌官御史可以安其職而守其官矣若人主不用其言不罷大臣則諌官御史失職不敢不求去矣此言官之分職業之守也臣前後論確章疏並未蒙付外則不審陛下終將聽臣之言乎蓋未可得而知也陛下遂將棄臣之言不聽乎亦未可得而知也皆未可知故臣亦未敢輕為去就之計自求罷職又未敢備録論確等前後文字繳連申三省以決是非而猶有所待也臣亦以謂幸遭皇帝陛下太皇太后陛下至仁至聖修明政事興利除弊惠安四海開廣言路聽納如流乃臣子千載一時之遇臣所以自惜願于此時竭誠效智求有所立若欲以一疏輕決去住于為身之計則潔矣于事國之義則未也然而遲遲待命日已久矣若陛下但留臣章疏不賜可否而臣又不自引去則公議以臣為如何而臣何顔以自安也臣與蔡確章惇非有仇嫌也非訐其隂邪小事也皆以其不忠于先朝不恭于陛下朋邪立黨包藏二心反覆容身以固權位昧進退之義無亷恥之節皆公義所不容之罪也陛下何故不恤天下之義牽制而不斷哉臣屢勸陛下辨别邪正而進退之陛下若罷此二人則天下之邪正辨矣今天下之懷私為利者皆託此二人為之魁主天下之抱忠守義者皆畏此二人不敢自效今陛下能濬發剛斷罷確與惇則善人安小人化凡天下之奉承詔令更張政事者莫不專志盡慮無復疑畏朝廷之福萬世之利在此一舉臣所以區區冒犯威聽而不能已也伏望聖慈檢臣前後言確等章疏再煩一賜詳覽以考二人罪狀然後降付三省施行摯遺藳係第十疏元年二月十五日上摯自去年十月以來纍疏論確今年閏二月二日確始罷相左司諌蘇轍言伏見陛下以久旱憂勞禱請勤至自冬歷春天意未答宿麥枯瘁災害廣逺民自近嵗皆苦于重斂儲積空匱若此月不雨飢饉必至盜賊必起保甲之餘民習武事猖狂嘯聚為患必甚而陛下所以應天勤民未有其實臣竊見去年赦書蠲免積欠止于殘零兩稅至于官夲債負出限役錢皆不得除放民有破蕩家産父子流離衣食不繼有欲死而不可得者買撲酒坊先因實封投狀爭氣務勝競説髙價既得之後利入微細不能出辦違限不納加以罰錢至于籍沒家産杻械生蟣虱而不得脫者臣願陛下降哀痛之書應今日以前民間官夲債負出限役錢及酒坊元額罰錢見今資産耗竭實不能出者令州縣監司保明除放使民得再生以養父母妻子朝廷棄捐必不可得之債以收民心民心悅附甘澤可致雖使天道幽逺雨不時應而仁澤流溢亦可以化服強暴消止盜賊臣謹按漢書文景宣元之間憂民之疲病每嵗輒弛租稅減算賦自損以厚下民戴其澤中遭王莽之變皆謳吟思漢漢以絶而復續夫漢世平安之日猶蠲必得之常賦以惠民而况當今旱勢未止災害方作前件久負皆勢不可得奈何靳而不與哉伏願陛下斷自聖心特降手詔無使有司吝于出納以廢格聖澤則天人不逺宜有善應又言臣竊見近年貪刻之吏習以成風上有毫髮之意則下有邱山之取上有滂沛之澤則下有涓滴之施如先帝向時為瀘南用兵兩川應副疲極特放五等人户賦稅而東川路轉運司公行格沮且只放三等以下緣纍經大赦不敢論列如此之類朝廷雖纍行戒敇終恐不改若行臣此奏即乞痛賜約束如監司敢有違戾許州縣官吏具事由實封聞奏實録于閏二月四日略載此疏蓋是日方進呈施行也今依蘇轍夲集于上疏日即出之乙亥宣州防禦使駙馬都尉張敦禮為密州觀察使以冀國大長公主進封故恩及之陜西轉運副使呂大忠兼同制置解鹽使恐有改法故著此不然削去兵部言畿內馬監已行廢罷即合於諸路相度置監乞差官前去經畫詔庫部郎中郭茂恂往陜西河東路按行相度以聞元豐八年八月二十六日廢府界新置牧馬監并提舉經度制置牧馬司殿前馬步軍司言準朝旨相度到髙翔上言乞依舊教閲御陳事欲於教陳日與新陳法相兼詔遇教陳隔日更互教習所有元豐七年六月甲申指揮勿行甲申六月十六日先是神宗置九軍營陳為方圎曲直鋭凡五變為五陳遂罷教習御陳至是復以舊陳互教中書省奏臣僚上言天下郡縣纍年逋負皆詔蠲放况日者已霈非常之澤凡七年以前租之在民間者悉聽除放天下莫不悅喜至于免役獨不與焉詔户部勘會相度限半月聞奏法册元年二月十六日聖旨是日乙亥十六日司馬光言臣于今月十二日上言乞以天子繼統曠然更始宜下詔數西人之罪而赦之縱未還其侵地且行此策以安邉境至今聞執政議尚未決臣之愚意以為封內未安未可圗外欲急行臣前策以羈縻西人且可數年邉鄙無事朝廷得休息戌兵安養百姓待國力完備家給人足然後奮揚天威討二柔服何所不可若行臣前策可以萬全行臣後策有得有失豈可棄上策而用下策捨萬全而就有失也太平興國中李繼遷反西陲不解甲者十餘年關中困竭寶元慶歷之間趙元昊叛屢入為冦覆軍殺將自是中國虛耗不復富實今國家理財未得其道民力困窮于下府庫窘乏于上又新遭大喪山陵才畢自去年十月初以來不雨雪旱勢甚大若萬一激怒西人微出一不遜語則并臣前策亦不可行矣今因天子即位未久西人外迹未有不順故臣願朝廷旦夕汲汲行之機會難得時不可失此臣所惓惓進言不已也若萬一激怒西人致生邉患兵連禍結士卒殄瘁於鋒鏑生民困竭於轉餉餓殍蔽地盜賊蜂起為國家慮豈不危哉而執政方以為西人微弱不敢動數遣使來誠心內附置之度外不以為虞今復固執先禁私市之議又立法不嚴邉帥不才者不先易去行之太早不能中節一旦禍生所忽邉鄙震驚乃始歸罪夏人豈不害國事乎臣于今月三日上所言措置西邉事雖畫二䇿固以還其侵地責而赦之為上䇿嚴禁私市待其數年貧困來服然後赦之為下䇿所為絶私市非立法至嚴帥臣智勇此法未易可行不若前䇿道大體正萬全無失非臣前後反覆靜言庸違也朝廷比來擢臣于冗散之中使預聞國論蓋亦誤謂臣微有益于國家非徒采其虛名也臣不敢終辭亦欲竭盡疲駑少酬大恩非茍貪於祿位也今盡忠謀國而為衆所挫臣尚留此有何所用此國大事伏望陛下早審察二議從其長者若聖意以臣言為然乞御批依臣前策若降付三省樞密院執政仍有固守已見爭之最力者乞如臣前奏令自入文字言先禁私市保得他日必不致引惹邉事如其不然自執其咎左司諌蘇轍言伏見門下侍郎司馬光乞罷免役錢復行差役法奉聖旨依奏施行臣竊謂近嵗所行新法利害較然其間免役所繫尤重朝廷自去秋以來改更略盡惟此一事遲留不決民間傾聽想聞德音臣竊料此事既行民間鼓舞相慶如飢得食如旱得雨比之去年罷導洛市易鹽鐡等事其喜十倍非至仁至聖至明至斷誰能行此然臣有愚慮蓋朝廷自行免役至今近二十年官私久已習慣今初行差役不免少有齟齬不齊譬如人有重病不治必死醫者用藥攻療必有瞑眩不寧要須藥去病消然後乃得安樂今中外用事臣僚多因新法進用既見朝廷革去宿敝心不自安必因差役之始民間小有不便指以為言眩惑聖聰敗亂仁政兼臣竊觀司馬光前件劄子條陳差役事件大綱已得允當然其間不免疏略及小有差誤執政大臣豈有不知若公心共濟即合據光所請推行大意修完小節然後行下今但備録劄子前坐光姓名後坐聖旨依奏其意可知自今以往其必有人借中外異同之論以搖動大議臣願陛下但思祖宗以來差役法行民間有何患害近嵗既行免役民間之敝耳目厭聞即差役可行免役可罷不待思慮而決矣伏乞將臣此奏留中不出時賜省覽苟大法既正縱有小害隨事更張年嵗之間法度自備臣疏逺小臣初蒙擢用輒此深言罪在不赦但念臣無左右之助諌垣之命出自聖意不敢自同他人更存形迹冒昧陳聞陛下裁幸又言臣竊詳差役利害條目不一全在有司節次修定近則半年逺亦不過一年必有成法至于鄉户不可不差役錢不可不罷此兩事可以一言而決緣所在役錢寬剩一二年間必未至闕用從今放免理在不疑前來司馬光文字雖有役錢一切並罷之文又却委自州縣監司看詳有無妨礙臣竊慮諸路為見有此指揮未敢便行放罷依舊催理則凶嵗疲民無所從出或致生事欲乞特降手詔大略云先帝役法夲是一時權冝指揮施行嵗久民間難得見錢已詔有司依舊差役所有役錢除坊郭單丁女户寺觀依舊外其餘限詔到日並與出榜放免其去年已前見欠役錢具數聞奏未得催理聽候指揮右正言王覿言免役之法便于民者固多而亦不能無弊如此則其勢必至于更張而更張不可以不慎也望與執政大臣熟講之審取之而無忽則天下幸甚監察御史孫升言臣聞有治人無治法法待人而後行此古今不易之理也伏以陛下即政以來因天下之所欲惡而廢舉之海內傾心日望膏澤比因耆舊正論復行祖宗百年差役舊法慰安元元蘇息疲瘵中外歡欣幽明慶快然臣竊以謂免役之為法推行十有餘年習俗已成一旦盡復舊法其間不無窒礙理當委曲隨冝斟酌惟以便安公私為務竊恐諸路使者以其議獨出于一人而罔上賊民偷合茍容之徒遺毒餘孽猶有存者未能竭誠盡公推廣陛下仁心恢復祖宗成法伏望聖慈早降指揮選擇諸路轉運使誡飭諸部使者咸令體認朝廷因民所欲復行祖宗之法惠養元元之意務在協心盡公委曲斟酌便安公私無或過差以相違戾庶祖宗成法早獲就緒則天下幸甚貼黃稱敕文獨坐司馬光之言朝廷委曲處分兹事體大竊恐人事有失欲致煩言此不可不察也惟早選擇諸路轉運使使之推行此最為急伏望陛下留意幸甚又新法役人數目比舊裁減大半舊法圎融陪備新法一切禁止官自出給推行之際不無窒礙須在得人委曲條析上聞方可詳盡又王安石更改役法斥逐正人端士力致輕浮後生專令提舉布在諸路則知法無良不良必待人而後行今民力困極非十五年前之比須在委曲隨宜斟酌施行務在合冝則人無異論選擇諸路使者不可後也舊録云司馬光言復行差役之初提舉官必競言役錢不可罷萬一聽之則良法復壞伏望朝廷執之堅如金石雖有小小利害俟諸路轉運使奏到徐為改更亦未為晚願朝廷勿以人言輕壞利民良法光廢免役法至是知四方民苦之議者紛然故為此説自救焉又云王覿孫升皆光黨也知差役之害民不敢盡以光為非建言以彌縫之新録辨曰法令之出患在輕改差役既已施行又許郡縣監司具利害上聞則俟奏到而後更改為宜不得謂之自救覿等身在臺諌建言損益乃其職非彌縫也自復行以下並刪去司馬光劄子别出全文于後按司馬光劄子新録與覿升所言井載于二十二日今依章惇駁議移光劄子見十七日下覿升所言附蘇轍後舊録欲以覿升所言證光之失故止存數語新録固當追尋覿升全章具載今但刪去誣謗餘並仍舊文似太踈略也王覿孫升所言大抵與蘇轍不異當求全夲具録之孫升已得全夲獨王覿未得二十八日章惇駁奏後覿言可考徽宗實録王覿傳云覿論役法曰司馬光所言差役雖大意已善而所立條目小有未盡章惇既為同列當共議之時不能盡忠論辨乃待其已行之後方言其不便其懷姦狙詐如此覿劾惇在閏二月二十三日惇罷樞密前恐傳所載乃劾惇奏非此時專為役設尚書右丞李清臣奏伏以夏國雖通問使未就貢職察其深意實為欵兵之策觀我強弱謂朝廷有厭兵之論則自棄新疆坐收全勝若依舊固守則今秋物力稍完必左右攻劫使應接倉皇縱未能襲破城寨使上下恐動自謀退保臣料戎人之計必出于此昨日蒙宣問執政奏議未決竊惟邉境大事輔臣之責而上貽聖憂在於愚臣深負愧惕竊見呂大防范純仁皆久在西塞今並依京闕其人明審詳練衆論所稱欲望特降聖旨問以手札使條具邉計及新立城寨可守可棄果決之策若夏國未肯欵服當如何措置向去如何守禦以其奏付三省樞密院與司馬光所言參決利害或選遣一人行視邉塞親與逐路將帥定議聞奏庶得不致誤事又乞先密降御批各付呂大防范純仁俟有所奏即賜聖覽詳酌取捨施行其選遣一人行視就議一節别乞指揮貴得邉計審重丙子太皇太后遣中使以實封手詔賜呂大防及范純仁曰勘會夏國自神宗皇帝升遐後來遣使弔慰祭奠繼以告國母喪進遺物今者又復遣使入朝謝恩使人比來外示恭順稍可見矣然戎情狡獪未測其誠心何如耳如向者所得邉地雖建立城寨亦慮孤僻不易應援棄之則弱國威守之則終恐戎人在念卿久住西塞深曉邉情當此冝罄嘉謀輔豫憂勞可條具邉計合如何措置向去如何守禦親書實封聞奏無拘以文者呂大防對曰詔問戎情狡獪未測其誠心何如臣愚以為敵人之情自古無信西夏自繼遷以來專事譎詐惟朝廷御得其道則詐無所施或失其方則驕而益肆待遇之禮不可不謹然以臣觀之今日夏戎情略可見矣羌人重于酬賽先帝舉大兵徑抵靈武幾入其國而不能以數萬之衆入塞為報永樂諸將寡謀敗事使彼中僅得以藉口然自是王師深入不虞之咎非其本國舉兵之成功蓋未足以為美此彼之無能為一也自來開邉進築之始彼必極力決爭乘其未完至于三四不能得而後已昨蘭州之城攘斥甚廣雖一再至爭不能得去嵗氷合遂不復來城既一完彼望亦絶此彼之無能二也比聞秉常極孱劣梁氏既死而秉常存亡未可知若秉常已亡則內難未已何暇外圗雖使秉常得存亦不足畏今數遣使入朝而不早布誠欵者蓋茍欲觀望遷延不敢先發以示弱以臣愚計竊聞夏使旦夕到闕可使押伴臣僚且以私意問其來使今主上嗣登寶位自大遼諸國皆遣使入賀夏國是朝廷藩臣何故獨不至以觀其意足以測其情偽矣又詔問向者所得邉地雖建立城寨亦慮孤僻不易應援棄之則弱國威守之則終恐戎人在念臣所課新收疆土議者多言可棄蓋思之未熟也詔旨以為弱國威而已又有取侮于四方之端焉不可不審計也况蘭州西使之地本非夏國封境又其君長嘗受朝廷祿秩元昊以來方盜據其地延慶城寨則接近漢界一旦既得而棄之未見其可今日措置之宜只可降詔下本路將會州一處更不攻取改熙河蘭會路為熙河蘭州路其蘭州及延慶兩路新建城寨只據見得地界守禦亦可以稍安敵情而為議和之計矣議者不過謂戍兵少則不足以出戰多則無力以供饋臣愚以為綏蘭之地皆並塞美田增招民兵墾闢以足食則供饋之費省専事守計少存戰兵則騎兵可大減矣其增招民兵墾闢曠土分守戰之計減供饋之費如以為可即乞下臣條析子細利害又詔問邉計合如何措置向去如何守禦臣愚以為今日邉計惟擇將帥為先轉運使為次其他施設皆可取辦伏聞國初西戎之患多在環慶太祖皇帝擇姚內斌董遵誨二驍將以守一州租賦之入兵械之費一切付之而聼其自為西人畏之不敢入寇令以四海九州之力奉邉而不足太祖以二州租入之費禦戎而有餘以此言之守禦之方在于得人而已臣愚以為陕西五路宜擇威名忠亮之臣不限文武為之統帥其次以為將佐又擇公正強明之臣以為轉運使副俾各擇其材能以充其任使之屬官被邉之城専事守計而出戰救援之兵蓄于內郡平居則散而耕冦至則聚而守且為內郡之兵以援之視冦入之多寡深淺而必報之無使其得志亦不妄動以生事守兵雖見大利不得出戰戰兵雖見大利不得久在邉如此則費省而易供守堅而不墮其計又言臣嚮在永興軍日得米脂降羌具道秉常所為使其言粗可信必不能用其衆又臣近館伴北使曾語及夏國遣使入貢北使却問作何人遣使以此觀之秉常存亡誠未可知又言元昊既得甘涼遂有窺隴蜀之志後緣嘉勒氏中強無以進取今青唐乖亂其勢漸分若中國又失洮蘭之土則他日隴蜀之患不可不預為之防又言臣愚以為今日邉帥全藉威名曾經戰陳之將以服敵氣竊謂宜參用武帥如劉昌祚張守約种師古輩皆可為用但儒臣常議或謂武將皆不可用此不知邉事之過計也又臣伏見詔旨陛下深慮邉計極為焦勞以臣料之今日西夏無繼遷元昊之強中國有練卒精甲之備茍將帥得人固無足畏范純仁對曰臣竊見夏國自朝廷用兵以來近漢之民頗失生業並塞二百餘里不敢耕種其國上下之人皆欲講和又自陛下臨御之初聖政鼎新凡有不便于民者悉為蠲除每詔令一下民間歡呼鼓舞以至印賣傳播謂之快活條貫此事即時聞於夏人又邉上臣僚亦多體朝廷意不縱侵擾以此夏國必謂朝廷待之異于前時所以遣使入慰探朝廷之意朝廷待其初來之使禮意既厚是以接續肯來以至纍次不失恭順而終未敢復言請地者其意應為前來朝廷拒之太峻却慮啓口之後更失朝廷之意則和好愈難今夏人又將到闕願選擇押伴臣僚使與推誠語論因而談美聖政及陛下好生惡殺捨已從人之德彼必有所對答則西夏之情亦可測見願和之意則可令押伴臣僚自作臆度説與自用兵以來其有陷蕃官吏軍民見在西界若夏國盡底納與朝廷聞朝廷待將俘到生口賜還夏國如有邉上未便之事亦可因而陳請朝廷必應量度應副彼若云前來已曽請地入貢蒙朝廷不允則可答云前來請地入貢是梁氏之意冝其朝廷不允今梁氏已死朝廷于國主必無所難彼若無對答則乞委延州趙卨宣布此意其肯還生靈及來請地則可曠然降詔許之亦不須疑其狡獪難測彼將陷蕃官吏軍民押在界上即却將向來所得邉地及城寨內外有居漢人屬户先次漸令移入近裏并勾集前後俘到夏國生口亦在界上先立定誓表預約日數兩相交還如此措置則取捨有名于國威無損其有向來所得邊地雖是建立城寨其間實有孤僻不易應援供餉之處留之則戎人必須在念邊事難息若却換得陷蕃生靈不惟無損國體兼和氣充塞天地陛下聖德超越古今矣若趙卨諭意不肯換易之後尚較計别有邀索此則我直彼曲我逸彼勞我直彼曲則神人共怒滅亡可待我逸彼勞則雖久不來庭于王道無損所有交際及宣布之時其間合有意度節次更委趙卨條上不得落賊姦計臣倉卒略具大槩答聖問未能詳盡如蒙召對尚有口奏事件更在陛下擇而行之天下幸甚臣所知邊事只熟知環慶及粗知鄜延其他路非臣所知臣今所陳乃王體當然為萬世之法非一時之利害也又其宣布意度及換易事節先須只作押伴臣僚及帥臣臆度者竊恐戎人萬一應對之間失禮不遜則于朝廷無損又將來夏人回人必有答詔便可奬諭其纍次遣使恭順及喻以解仇釋怨罷兵息民之意先是純仁自慶州召入奏曰臣昨日見罷便蒙三省樞密院召赴都堂訪問邉事臣乍從外任逺來不暇深思熟慮即隨所問略據胸臆陳對問欲降詔則以解仇釋怨罷兵息民為對問欲審察敵情措置事機則以専委帥臣為對問棄地可否則以不可徒然便與可換易陷蕃軍民生口為對緣臣不見先朝舉兵征討因依及夏人後來乞和請地并答詔阻絶本末加以臣志慮短淺訖無果決定論以副所問以臣思之此是國家大事安危所繫兼二三執政所見未同伏計陛下深居九重不易裁決臣今輒有愚見須當密具啓陳難以形于文字伏望聖慈只作中旨特詔臣上殿賜以間燕俾得敷陳一二庶幾少禆聖眀奏既入乃與吕大防同有是問是日丙子十七日司馬光言臣近以抱病家居恐溘先朝露無以少報盛德是以力疾貪陳所見竊以即日為小民病者無若免役錢欲乞悉行廢罷復祖宗差役舊法識慮短淺不意朝廷盡從其説非陛下眀斷不能如是此乃天下之幸非獨微臣之幸也然臣聞令出惟行弗惟反彼免役錢雖于下户困苦上户優便行之已近二十年人情習熟一旦變更不能不懷異同又復行差役之初州縣不能不小有煩擾又提舉官専以多斂役錢為功惟恐役錢之罷若見朝廷於今日所下敕微有變動必更相告曰朝廷之敕果尚未定宜且觀望必競言役錢不可罷朝廷萬一聼之則良法復壞矣伏望朝廷執之堅如金石雖小小利害未備俟諸路轉運司奏到徐為改更亦未晚當此之際則願朝廷勿以人言輕壞利民良法光集無月日實録于二月二十二日載此章惇駁議稱十七日今從之吕大防政目亦云十七日光再劄論役法丁丑故西蕃邈川首領河西節度使威武郡王董戩男肅州防禦使鄂特凌古起復為河西節度使西蕃邈川首領寧塞郡公三省樞密院言董戩死欲依例支賜即不得令賜鄂特凌古制誥使臣一就齎押去從之鄂特凌古事具在正月十二日辛未中書省言六陵準敕城用荆芭分委奉先兵士採織兵士夜宿陵寢恐因此闕事乞下永安縣計置召人結買詔守陵寢兵士豈可于外役使所有城用荆芭亦不須和買自今並令停罷御集二月十八日庚辰詔諸將兵在鎮寨將官駐劄者監鎮主依知縣法同管勾公事著為法夏國主秉常遣使入貢詔學士院降詔答之先是秉常母死朝廷遣使賻贈至是入貢故也辛已江西湖南路按察司按察得蹇周輔先蒙朝廷差委相度江南西路鹽法不能上體德意而乃率性掊尅頓增鹽數立法敷奏更為欺誕既而其子序辰専領鹽事以議出其父略無向公之心惟多方營救以掩其過更令州縣增賣額外之數先期支鹽後期納錢州縣承行之後愈見煩勞朱彥博繼領鹽事既見上項違戾即未嘗盡行究正洎聞朝廷遣官按察之後乃以推行詔書為説檢坐違法事件令官司依應施行知吉州魏綸擘畫逐年增剩鹽九十餘萬斤已措置均敷添召有物力鋪户承買添增到鹽數到年終比較蹇周輔元定鹽額上虧止是虛數委有欺罔并右正言王覿奏竊見江西福建鹽法皆蹇周輔等相度立法之時惟務得利之多自為進身久未譴逐今又聞奉議即程之卲除提舉梓州路常平等事之卲乃周輔相度鹽法之時奏辟隨行勾當公事之人朝廷用周輔之薦謂立法有功遂拔自常調除轉運判官當與周輔同行黜削乃復付以一路事權豈協公議周輔等增添課額害民罔上自當速正典刑今周輔職任仍舊而之邵復蒙任中外人心安得不惑望早行貶責詔刑部侍即蹇周輔落職知和州權江南西路轉運判官朱彥博權知興國軍承議即司封員外郎蹇序辰簽判廬州奉議郎程之邵罷提舉梓州路常平等事之卲除梓倉乃二月六日元豐六年四月丁丑初遣陳次升察江西五月戊申又察湖南劉摯先以去年十一月十八日又十二月三日又二十二日凡三章論周輔序辰及今乃責摯言今附本月日詔新除御史中丞劉摯舉監察御史二員摯除中丞乃二月十二日也二十二日詔猶稱新除緣摯辭免自十七日居家待命猶未供職故也宰臣蔡確言奉差提舉修神宗皇帝實録欲乞就門下後省東位權充修實録院從之禮部言管勾同文館所狀髙麗國王送到書上親王兩府等本部未敢依例用土物回報詔依例河東路經略安撫使司言火山軍今月九日北界西京留守等大小官十有餘人引馬來界壕上相度壘起石城處地界及朔州人馬見在東偏頭村存泊本司已牒緣邉安撫司依先降朝旨候北人退散審度間便前去毀拆詔河東路經略司依纍指揮如合添差官員兵馬亦仰相度選那差撥閠二月甲午可考樞密院言董戩死近繳到鄂特凌古蕃字差人進奉今詳蕃字皆鄂特凌古自言之辭即不見青唐自鄂特凌古管事後蕃情有無不順事迹其在董戩左右親信之人及內外主兵酋首委的服與不服鄂特凌古指揮欲令趙濟選差曽往青唐使臣押入蕃支賜密諭使臣令自入界體訪情實以聞從之青唐録乃以此事係之朝廷爵命鄂特凌古前蓋誤也此月二十八日有詔候趙濟奏到方給鄂特凌古官誥今青唐録亦有熙河帥司奏蕃部服從鄂特凌古事蓋濟以三月十六日奏到也左正言朱光庭奏此據編類章疏增入二月十二日臣竊聞惟輔弼之任實難其人道足以經邦德足以表世才足以制作禮樂政足以推行仁義恥君不如堯舜愛民若保赤子鮮有稱斯任者也如蔡確章惇韓縝者其心徇私安有經邦之道其迹回邪安有表世之德其藴蓄空踈安有推行仁義之政觀望逢迎安有恥君不如堯舜之志因循茍且安有愛民若保赤子之誠使之居鼎軸代天工所謂負且乘者矣方聖政日新天下太平之際而為輔臣者若此將安用哉而不恭不忠不恥之迹見於行事已極著明臣已纍具奏論至今未蒙施行禮曰事君難進而易退則位有序易進而難退則亂也故君子三揖而進一辭而退以逺亂也今日姦邪之人非不知言者纍有章疏而偃蹇自處殊無忌憚不知進退陛下天地之量曲示包涵然而代天理物之任使此姦邪冒處以害政事終纍聖德伏望陛下檢會臣前後纍奏早賜睿旨施行貼黃陛下臨御以來聖政如此天下日就太平惟早去姦邪眀進忠亮以幸天下監察御史王巖叟奏編類章疏二月二十二日臣纍奏論列蔡確章惇姦邪讒險不可久持大柄親近陛下恐日月浸淫惑亂聖聼辨之愈難去益不易臣每讀史書見自古以來姦邪在上人君往往不知忠臣義士雖憤激指言人君又多不信所以飬成禍亂悔不可追唐德宗朝宰相盧杞姦邪蔽塞人情致亂天下德宗猶不覺悟仍問李泌曰人皆言盧杞姦邪朕何以不知泌對曰惟陛下不知所以為姦邪今天下之人皆言蔡確章惇天性姦邪無由變改恐于陛下不覺不疑之間潛行私意隂作身謀或欺罔聖聰或詭隨睿旨或沮格公言或傾陷善類千機萬巧陛下如何可防諫官御史如何盡知雖或知之幾人敢言此姦邪之所以不懼也確輩若從來果是忠臣則天下之人莫不願其長在廟堂自受太平之福安肯日夜望天子逐而去之陛下以此可以亮天下之情矣伏望陛下深味李泌之言逺鑒德宗之蔽勿容盧把之徒久居柄任則社稷幸甚天下幸甚乞早賜指揮臣前論奏二姦臣章疏付外施行中散大夫天章閣待制提舉玉局觀致仕李大臨卒癸未通直郎李珫特換授供備庫副使徙知大名府韓絳請也樞密院言河東額外招到土兵並係應副本路差使兼減下戍兵不少其所支費錢糧等欲令轉運司管認應副所有本路封樁闕額禁軍請受並免從之右司諫蘇轍言臣伏見朝廷近罷市易事不與商賈爭利四民各得其業欣戴聖德無有窮已惟有益利鳳熙河等路茶場司以買賣茶虐四路生靈又茶法影蔽市易販賣百物州縣監司不敢顧問為害不細而朝廷未加禁止臣聞五代之際孟氏竊據蜀土國用𥚹狹始有榷茶之法及藝祖平蜀之後放罷一切橫斂茶遂無禁民間便之其後淳化間牟利之臣始議掊取大盜王小波李順等因販茶失職窮為剽劫凶𦦨一扇而蜀之民肝腦塗地久而後定自後朝廷始因民間販賣量行收稅所取雖不甚多而商賈流行為利自廣近嵗李把初立茶法一切禁止民間私買然猶所收之息止以四十萬貫為額供億熙河至劉佐蒲宗閔提舉茶事取息太重立法太嚴逺人始病是時知彭州吕陶奏乞改法只行長引令民自販茶每茶一貫長引錢一百更不得取息得旨依奏民間聞之方有息肩之望又却差孫逈李稷入川相度始擬極力掊取因建言乞許茶價隨時增減茶法既有增減之文則取息依舊由是息錢長引二説並行而民間轉不易矣而稷等又益以販鹽布乃能增額及六十萬貫及李稷引陸師閔共事又增額至一百萬貫師閔近嵗又乞于額外以一百萬貫為獻朝廷許之于是奏乞於成都府置場客旅無見錢買茶許以金銀諸貨折博遂以折博為名多遣公人牙人公行拘欄民間物貨入場賤買貴賣其害過于市易又以本錢質典諸物公違條法欺罔朝廷蓋茶法始行至今法度凡四變矣每變取利益深民益困弊然供億熙河止於四十萬貫其餘以供給官吏及非理進獻希求恩賞而害民之餘辱國傷教又有甚者夫逐州通判本以按察吏民諸縣令佐亦以撫字百姓而計算息錢均與牙儈分利至于監茶之官發茶萬馱即轉一官知縣減三年磨勘國之名器輕以與人遂使貪冒滋彰廉耻不立深可痛惜又案盜賊之法贓及二貫止徒一年出賞五貫今民有以錢八百私買茶四十斤者輒徒一年出賞三十貫又遞鋪文字事干軍機及非常盜賊腳遞日行四百里馬遞日行三百里違二日者止徒一年今茶遞往還日行四百里違一日輒徒一年立法太深茍以自便不顧輕重之宜蓋造立茶法皆傾險小人不識事體但以逺民無由申訴而他司畏憚不敢辦理是以公行不道自始至今十餘年矣臣竊聞朝廷近日察知其弊差官體量然猶恐未知其詳臣今訪聞稍得其實謹具條件五害如左其一曰益利路所在有茶其間卭蜀彭漢綿雅洋等州興元府三泉縣人户種茶為生自官𣙜茶以來以重法脅制不許私賣抑勒等第髙稱低估遞年減價見今止得舊價之半乞委所差官取𣙜茶至今遞年所估價例對定即見的實茶官又於每嵗秋成糶米髙佑米價強俵茶户謂之茶本假令米直八百錢即依一貫支俵仍勒出息二分春茶既發茶户納茶又例抑半價兼壓以大稱所損有半謂之青苗茶元條園户茶一百斤許收十斤市例內用一半入官一半用饒潤客旅今逐場一百斤收至二十餘斤出利者往往却偽作園户中茶虛旁支出官錢入已近者卭州嘗有此獄又有數多隂與客旅商量納賂不資指放出賣者及至賣茶本法止許收息二分今多作名目如牙錢打角錢之類至收五分以上買茶商旅勢必不肯多出價錢皆是減價錢損園户以求易售又昔日官未𣙜茶園户例收晚茶謂之秋老黃茶不限早晚隨時出賣𣙜茶之後官賣止于六月晚茶入官依條毀棄官既不收園户須至私賣以陷重禁此園户之害一也其二曰川茶本法止于官自販茶其法已陋今官吏緣法為姦遂又販布販大寧鹽販瓷器等并因販茶還腳販解鹽入蜀所販解鹽仍分配州縣多方變賣及折博雜物貨為害不一及近嵗立都茶場緣折博之法拘欄百貨出賣收息其間紗羅皆販入陕西奪商賈工利至于買賣之餘則又加以質當去年八九月間為成都買撲酒坊人李安典糯米一萬貫每斗出息八錢半年未贖更出息二分其他非法類皆如此今四方蒙賴聖恩罷去市易抵當之弊而蜀中茶官獨因緣茶法潛行二事使西南之民獨不蒙惠澤此平民之害二也其三曰昔官未𣙜茶陕西商旅皆以解鹽及藥物等入蜀販茶所過州軍已出一重稅錢及販茶出蜀兼帶蜀貨沿路又復納稅以此省稅增羡今官自販茶所至雖量出稅錢比舊十不及一縱有商旅興販諸處稅務畏憚茶官又利于分取息錢例多欺詐以稅為息由此省稅益耗假有作稅錢上歷嵗終又不撥還轉運司但添作茶官歲課公行欺罔訪聞元豐七年八月陸師閔劄子奏茶司今年課利內有一項係茶稅錢又茶官違法販賣百物商旅不行非惟稅虧兼害酒課蜀中舊使交子惟有茶山交易最為浩瀚今官自買茶交子因此價賤舊日蜀人利交子之輕便一貫有賣一貫一百者近嵗止賣九百以上此省課之害三也其四曰蜀道行于溪山之間最號嶮惡般茶至陕西人力最苦元豐之𥘉始于成都府路廂軍數百人貼鋪般運不一二年死亡略盡茶官遂令州縣和雇人夫和雇不行即差稅户其為騷擾不可勝言劉庠知永興日有洋州般茶人有疲勞不堪告訴庠令取狀在案判云候本府雇人般茶日呈後來永興即不曽雇人後遂添置遞鋪十五里輒立一鋪招兵五千人起屋六十間官破錢一百五十六貫益以民力僅乃得成今置百餘鋪矣若二百餘鋪皆成則是添兵萬人衣糧嵗費二十萬貫見招填不足旋貼諸州廂庫逐州闕人百事不集又茶遞一人日般四馱計四百斤餘回車却載解鹽往還山行六十里稍遇泥潦人力不支逃匿求死嗟怨滿道至去年八九月間劔州劍陽一鋪人全然走盡沿路號茶鋪為納命場此遞鋪之害四也其五曰陕西民間所用食茶蓋有定數茶官貪求羡息般運過多出賣不盡逐州多虧嵗額遂于每斤增價俵賣與人元豐八年鳳州凖茶官指揮每茶一斤添一百錢其餘州郡凖此可見又茶法初行賣茶地分于鳳秦熙河今遂東至陕府侵奪蠟茶地分所損必多此陕西之害五也五害不除蜀人泣血無所控告臣乞朝廷哀憐逺民罷放𣙜法令細民自作交易但收稅錢不出長引止令所在場務據數抽買博馬茶勿失朝廷武偹而已如此則救民于網羅之中使得再生以飬父母妻子不勝幸甚如朝廷以為陕西邉事未寧不欲頓罷茶事即乞先弛𣙜禁因民販茶正稅之外仍收長引錢一嵗之入不下數十萬貫以見今長引錢數計之可見而商旅通行東西諸貨日夜流轉所得茶稅雜稅錢及酒課增羡又可得數十萬貫以未𣙜茶以前及𣙜茶後來年分自蜀至陕西沿路酒稅務嵗課較之可見而罷置茶遞無飬兵衣糧及官吏緣茶所費息錢食錢之類其數亦自不少則𣙜茶可罷灼然易見若異日西邉無事然後更罷長引錢如舊稅而止然臣再詳師閔所營茶利雖使之裒斂一一如數止于二百萬貫無復贏餘矣若以前件茶引茶稅雜稅酒課等錢約七八十萬貫折除即止約有利一百二十餘萬貫若更除茶遞飬兵衣糧及官吏緣茶所費約三四十萬貫即是師閔百端非理凌虐細民止得八十萬貫前件兩項錢並且從小約計故師閔所得利有八十萬貫若依實計之恐不得及此數矣假令萬一蜀中稍有飢饉之災民不堪命起為盜賊或如淳化之比臣不知朝廷用兵幾何費錢幾何殺人幾何可得平定今但得七八十萬貫錢置此不慮臣竊惑也兼臣訪聞陸師閔去年自成都府移治永興仍取成都供給有本府衙前楊日新者為之賣酒至十一月中師閔自覺非法始移牒永興成都止就用永興供給其違法差衙前賣酒及多請過成都供給即不曾舉覺其貪冒無耻一至于此亦乞令所差官便行體量如是情實乞重行黜謫以慰逺方積年之憤貼黃稱陸師閔久擅茶事欺罔朝廷奏請如意為吏民所畏憚若留在本職雖特遣使命恐必難以體量實害欲乞先罷師閔職命及利州路轉運使蒲宗閔昔同建議榷茶曽竊冒恩賞顯有妨礙亦乞指揮不得同簽書體量事所貴官吏不憂後害敢以實告舊録但于閏二月二日略載轍奏數語新録因之今具載此甲申蔡確言已再具表辭位準朝旨令臣管勾門下省緣臣見候解罷欲望差權官管勾詔差尚書左丞吕公著御史中丞劉摯言臣聞書君陳曰爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德此言人臣之義有善則稱其君雖謀出于已亦必曰吾君之德者上下相成忠厚之至也伏見宰臣蔡確辭位求退其所上表無引咎之意有論功之言自陛下臨御以來美政盛事民所歌誦者確皆鋪列條敘以為已功中外傳之靡不怪笑夫收拔耆艾之臣置諸左右乃陛下至眀獨見以天下公望用之而確乃以為已之所引罷去有司漁利剝下苛細之法而黜逐汙吏乃陛下仁心惠德以蘇疲民而確又以為已之所請至于申戒邉場不使生事分遣使者求民疾苦修法令以備先朝之政包同異以行大公之道此中外皆知出于陛下聖謀睿慮實新政之甚善者而確乃一切認之掠為已事貪天之功欺示天下其意謂此數者陛下不能知之因已請而知之陛下不能行之因已請而行之其于輕慢君父欺罔臣庶違道干譽至于此凡確之所引數事者確果曾有所建請乎蓋不可知也確在言路為執政前後久矣不言之于先朝而言之于今日此何意也果有建請固大臣職爾如君陳之歸美于上可也而敘于求退之章又何意也不言之于先帝此不忠之罪也言之于今日此取容之計也敘之於表謂我有功則退陽為求去實欲陛下疑以為功而留之因欲求免于公議此持上罔下之謀也古之人有意于止退則削其藁不欲使人知善之出于已所以推逺權熖避掠美干名之議不知此則何足以為大臣乎確無禮不恭朋邪懷二無廉耻之節昧進退之義又自去冬大旱至今確為上相身任其責其罪惡之著無補朝廷今既逼于公論不得已而求去正當痛自咎責踧踖傴僂為懇切必退之詞乃大臣去就之體今確夸功揚已露行行不平之氣為臣如此不謂之大姦大邪可乎伏望以確表并臣此章付之三省議確之惡重行竄逐以正典憲使天下為人臣者皆得以自盡左諫議大夫孫覺言臣竊見左僕射蔡確右僕射韓縝兩人皆非以德進者也或以典治獄事或以分畫邉界而至執政官臣不敢論其小節細行以瀆天聼直以其進身本末為陛下一一言之可以知曲折矣蔡確按濬川獄知制誥判司農寺熊本奪職確即遷知制誥判司農按御史中丞鄧溫伯治相州獄溫伯罷知撫州確即遷御史中丞按參知政事元絳太學獄絳罷知頴州確即遷參知政事此三獄者士大夫多以為寃確皆批其頰拉其背而奪之位未幾先朝更定官制確即為右僕射所謂大臣以道事君難進而易退者其若是乎今確在朝立百辟之上士大夫相與歎息以其廉隅不修有甚于市人也永裕陵禮畢宜避位以去今已五月矣而遲遲不決雖請不堅尚冀聖恩之復留也韓縝不學無術衆論不以輔相期之先朝嘗以北敵爭地事付之衆謂縝必辱命已而果然無故割地其長七百餘里以遺北敵邉人怨之切骨以為奪我祖父之地棄之敵人非獨惜其地也又歸怨于朝廷敵人得地之後日益桀傲今縝為右僕射臣見敵使來朝問知其官各相顧微笑意以為中國無人乃使是人為相也益有輕中國之心每輒驕慢漢王商為相單于仰視商貌大畏之天子聞而嘆曰此真漢相矣伏乞皇帝陛下太皇太后陛下以災異之故罷免確縝别選有德有言衆所畏伏者使稱其位外足以鎮撫四夷內足以悚動天下以懷徠桀傲不軌之心不勝幸甚方覺又言臣聞蔡確已遷出東位上章求去見傳報表草方更自陳功勞頗更矜伐其詞曰請收拔當世之耆艾以陪輔王室若如其言則是司馬光吕公著之徒今位在執政皆其所引也蠲省有司之煩碎以安慰民心若如其言則自皇帝陛下太皇太后陛下親政以來所以便安百姓省減諸色誅求者皆其所陳也洪範曰惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食如確之言是作福也嚴邉偹以杜二國之窺覦人臣在相位不以鎮撫四方為心則焉用彼相矣今北敵盟好八九十年非確所能為也假令西人納欵入貢如他時祖宗威靈所致確亦何功之有走使軺以察逺方之疲瘵如張汝賢陳次升往福建江西以陛下即位以來上書言利害者多遣往按之非確所建也就令建之豈可自言乎明法令之美意以揚先帝之惠澤先帝惠澤在人人豈忘之不待確而後明也厲公平之一道以合衆志之異同人心異同亦何足恤在上者以道揆之可也異者是耶不以其異而却之同者非耶不以其同而取之顧吾所設施合于道與否爾確之表幾百言其尤甚者此六句爾大抵欲自眀有功無罪以言攻之者為非也尚書曰爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德此大臣之任賢者之事也今確為左僕射上章求去宜曰久與政機何補毫末冬愆陽而無雪春不雨而害農引咎自陳庶幾可免今乃厚自矜伐若市道然非尚書所謂斯謀斯猷惟我后之德也臣聞禮記曰善則稱君過則稱已則民作忠今確為左僕射人臣無二矣朝廷故事有害于民不引以為已過至于改更之際乃皇帝陛下太皇太后陛下圗民疾苦有所更張確乃以為功人臣操心若此可乎確雖避位求去陛下未賜詔可確更有遲遲欲留之心伏願早賜罷免如韓縝非才士論所駭臺諫雖聞有所彈擊縝方偃然自居未有引去之意伏願以臺諫臣僚所上章疏悉以示縝并令罷去如此則確等去位不敢更懷怏怏不平之心伏願聖慈早賜睿斷貼黃稱臣前後兩劄子乞罷免蔡確韓縝左右僕射今蔡確雖上表乞罷遷出東位韓縝尚偃然自居未有去意邢恕孫繹録其父言行云孫莘老為諫議大夫方劉摯王巖叟力攻蔡確時莘老獨無所言巖叟至詆之為姦人莘老乃首與蘇子由攻彈韓縝按覺正月末已有一章此月又有兩章則繹妄説不待辨而可知矣閏二月五日甲午覺與蘇轍同對司馬光具表乞罷門下侍即又劄子言臣以羸病拜起及上下馬不得請朝假將治已及餘月旬日以來疾大勢雖退飲食亦稍進然氣體疲乏足腫生瘡步履甚難䇿杖而行不出室堂况于拜起固所未易臣自料度筋力全復可以朝趨近亦數月逺則半年或過此期未可前定豈有執政之臣身據髙位受厚俸既不趨朝又不供職宴安偃仰飬病于家何待人言獨不內愧臣是用夙宵惶愧無地自處今不免有表上瀆聖聼乞除宫觀差遣一任以飬衰殘竊慮陛下怪其忽有此奏故别具劄子披瀝肝膽伏望聖慈早賜開允乙酉詔答不允仍遣入內供奉官陳衍宣諭光復言臣自結髮從學講先王之道聞君子之風竊不自揆常望有尊主庇民之志不意天幸蒙陛下誤采虛名擢于閭閻之間置之廟堂之上禮遇過優委任至重臣非木石豈不知荷戴大恩銘心鏤骨願竭駑蹇少報萬分眷戀天庭豈肯輕去不謂一旦嬰此沉疴纍月不愈害于飲食不能造朝今雖疾勢漸平飲食亦進而皮骨羸瘠氣力疲乏足腫骭瘍餘毒方熾旬月之間必未能趨伏闕庭瞻望天光端居私家尸位竊祿縱陛下寬仁微臣不知亷恥中外有識之士及天下衆庶其謂臣何伏望聖慈矜察依臣前奏除宫觀差遣一任使得自安其分右正言王覿奏編類章疏二月二十六日臣竊聞知樞密院章惇言役法未便事臣看詳門下侍即司馬光所陳差役法雖大意已善緣不曽經有司立成條目內有小節未安須當接續行下庶幾良法早定不為浮議所搖臣于今月二十四日具狀聞奏訖其章惇文字臣雖未見度其中必有可施行者伏望陛下與執政臣僚熟議若惇之言果有助于役法則行之何疑要之濟務而已然司馬光從初乞行差役劄子係三省及樞密劄子施行為大臣當其時不能盡忠進説乃待其既已施行之後方有論列欲以彰司馬光之短見已之長於天下而已此豈有赤心直道裨補聖政之意哉光之論事雖或有所短不害為君子惇之論事雖時有所長寧免為小人大凡國家之事須執政大臣同心協力而後可成惇之姦邪欺罔著聞有素於此役法一事尤見其處心積慮欲以傾光而不顧其有傷于國體有誤于陛下也陛下察惇如此尚可以置于樞機之地以為腹心之人乎古者不以人廢言固有不可不察者然惡亦不可以不懲伏望聖慈詳酌特行顯黜以戒不忠二十四日奏未見當求之論投名衙前必非二十四日所奏已附二十八日二十四日亦附此當去一存一
