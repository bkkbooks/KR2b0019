body:
  text: 續資治通鑑長編卷一百七十六宋李燾撰仁宗至和元年春正月辛未詔京師大寒民多凍餒死者有司為瘞埋之壬申碎通天犀和藥以療民疾時京師大疫令太醫進方內出犀牛角二本析而觀之其一通天犀也內侍李舜卿請留供帝服御帝曰吾豈貴異物而賤百姓哉立命碎之建寧留侯楊景宗卒贈武安節度使兼太尉諡莊定景宗起徒中以外戚故至顯官然性暴戾所至為人患使酒任氣知滑州常毆通判王述仆地帝深戒毋飲酒景宗雖書其戒坐右頃之輒復醉其奉賜亦隨費無餘始宰相丁謂方盛築第敦教坊景宗為役卒負土第中後謂敗帝以其第賜景宗居三十年乃終癸酉貴妃張氏薨初妃既受封冊寵愛日盛出入車御華楚頗侵並后飾嘗議用紅繖增兵衛數有司以一品青蓋奏兵衛凖常儀上守法度事無大小悉付外廷議凡宫禁干請雖已賜可或輒中郤妃嬖幸少比然終不得紊政及薨上悲悼不已謂左右曰昔者殿廬徼衛卒夜入宫妃挺身從别寢來衛又朕嘗禱雨宫中妃刺臂血書祝辭外皆不得聞宜有以追賁之入內押班石全斌探上意請用后禮於皇儀殿治喪諸宦者皆以為可入內都知張惟吉獨言此事須翼日問宰相既而判太常寺翰林學士承旨王拱辰知制誥王洙等皆附全斌議宰相陳執中不能正遂詔近臣宗室皆入奠於皇儀殿移班慰上於殿東楹特輟視朝七日命參知執事劉沆為監護使全斌及勾當御藥院劉保信為監護都監凡過禮皆全斌與沆合謀處置而洙等奏行之石全斌傳云王拱辰請治喪皇儀殿全斌以為當問大臣宰相陳執中不能正之遂詔近臣宗室皆入奠移班慰於殿東楹皆劉沆及洙與全斌合謀為之按張惟吉傳治喪皇儀諸宦者皆以為可獨惟吉言及當問宰相然則言當問宰相者獨惟吉也全斌實與劉沆王洙等合謀為非禮之禮又安得有此言而全斌𫝊乃攘取以為出自全斌今不取且妃喪那得關學士院其實全斌所請也事下禮官而拱辰判太常寺遂與王洙等附㑹全斌議朝廷既用禮官議故當時皆謂拱辰請之其實不自拱辰也拱辰特從全斌者耳今略加刪潤使不相抵牾初有司請依荆王故事輟視朝五日或欲更增日聽上裁乃增至七日殿中侍御史酸棗吕景初言貴妃一品當輟朝三日禮官希旨使恩禮過荆王不可以示天下不報丁丑追冊貴妃張氏為皇后賜諡溫成先是御史中丞孫抃三奏請罷追冊不報初賜諡曰恭德樞密副史孫沔言太宗四后皆諡曰德從廟諡也今恭德之諡其法何從且張郭二后不聞有諡此雖禮官之罪實貽譏於陛下不可不改因改諡溫成抃及侍御史毋湜殿中侍御史俞希孟等皆求補外知雜事郭申錫請長告皆以言不用故也抃等乞補外申錫請長告此據記聞禁京城樂一月己卯殯溫成皇后於皇儀殿之西階宰臣率百官詣殿門進名奉慰壬午以溫成皇后薨遣官告太廟皇后廟奉慈廟甲申宰臣梁適奉溫成皇后諡冊於皇儀殿百官詣西上閣門進名奉慰是夕設警場於右掖門外上宿於皇儀殿乙酉上成服於殿幄百官詣殿門進名奉慰是日殯溫成皇后於奉先寺輴車發引由右升龍門出右掖門升大升輿設遣奠先是詔樞密副使孫沔讀哀冊沔奏章穆皇后喪比葬行事皆兩制官今溫成追諡反詔二府大臣行事不可於是執冊立上前陳故事且曰以臣孫沔讀冊則可以樞密使讀冊則不可置冊而退宰相陳執中取而讀之既殯百官復詣西上閣門進名奉慰丁亥録周後故太子少傅柴守禮孫若訥為三班奉職戊子録溫成皇后從弟著作佐郎希甫為太常博士光祿寺丞及甫為祕書丞太常寺太祝正甫為光祿寺丞右侍禁閣門祗候山甫為西頭供奉官姪大理寺丞守素為太子中舍西頭供奉官守誠為東頭供奉官妹壻左班殿直寄班祗候胡思廉左侍禁曹詢並為閣門祗候姪壻太常寺大祝盛和仲為大理評事又録其疏屬十數人詔待制以上丁父母憂已聽解官行服今滿百日猶起復其罷之己丑賜溫成皇后母楚國太夫人曹氏敦教坊第一區辛卯御崇政殿録繫囚并下三京輔郡雜犯死罪第降一等徒以下釋之賜宿州布衣營知止絹十匹粟麥各十石知止髙年有行義為鄉里所推故賜及之癸巳延福宫使武信留後入內內侍省內侍省都都知王守忠罷延福宫使為武信留後他毋得援例故事宦官未有真為留後者守忠介東宫舊恩數求之上亦欲子之先是高若訥為樞密使持不可故止及是守忠疾復求為節度使宰相梁適曰宦官無除真刺史者况真節度使乎上曰朕蓋嘗許守忠矣適曰臣今日備位宰相明日除一內臣為節度使臣雖死有餘責御史中丞孫抃聞之亦奏疏力諫乃罷節度使不除然猶得真為留後言者方奏疏論列翼日守忠卒守忠謹厚細密故眷遇最厚方在疾告上令用浮屠法集僧于其家凡四十九日為之禬禳既卒贈太尉昭德節度使諡安僖特給鹵簿以葬按守忠傳不云將除節度使獨王圭志梁適墓載其事而孫抃集有諫疏具在抃本傳亦云帝欲令守忠領武寧節度使抃奏罷之然則守忠蓋將有節度使之除矣賴抃等諫正除目未出故實録及本傳不載其真為留後才一日遂死抃等雖有論列想亦難追正矣實録乃云臺諫官以為言而宰相不能正疑實録所稱臺諫之言乃將除節度使時抃等相論列者若經論列不當真除留後則恐疏實未奏故守忠正傳亦但云臺諫方奏疏論列而守忠卒今從正傳神宗實録梁適傳又削去適諫守忠真除節度使事迹豈謂適素姦邪不能辦此或疑守忠初無此除故邪今復著之二月乙未朔詔天下州縣自今遇大雨雪委長吏詳酌放官私房錢三日歲毋得過三次丁酉詔禮院孝惠孝章淑德章懷皇后章惠皇太后案宋史后妃傳無章惠諡或係章獻章懿章穆之誤或原有章惠之諡後改而史未及載謹識其疑云溫成皇后皆立小忌先是有請立溫成忌者直集賢院劉敞言太祖以來后廟四室陛下之妣也猶不立忌豈可以私昵之愛而變古越禮乎於是并四后及章惠皆詔立忌樞密副使孫沔極陳其不可御史中丞孫抃纍奏論列而禮院官亦以為言皆不聽尋罷之庚子詔曰乃者調民治河隄疫死者衆其蠲户稅一年無户稅者給其家錢三千辛丑詔禁軍逃至緣邊經一宿捕獲者斬初河北緣邊安撫副使宋守約言比嵗河北軍士數逃入契丹良由逋逃軍法輕請復天聖舊制去三日內捕獲貸死之法故更著此條戊申太常博士史館檢討張芻落職監潭州稅先是芻為禮官有詔立溫成忌禮官列言其不可宰相患之或謂宰相曰芻獨主兹議他人皆不得已從之爾芻父太祝牧當任蜀官芻嘗奏章乞代其父且求知廣安軍執政謂曰故事史館檢討不為外官若捨此去職則可往芻始謂必換職名及知弗得乃言父欲自行仍願留史館無何牧至京師復上書乞免入蜀宰相既惡芻因罪芻奏事前後異同而黜之其實欲絶禮官羣議借芻以警其餘爾芻鄄人皓孫也己酉三司言陜西河東嵗減西川所上物帛而軍衣不足又河北入中糧草數多未有紬絹折還請貸內藏庫紬十萬欲先輸左藏庫緡錢二十萬餘計其直以限追償從之戊午詔乾元節度僧尼自今兩浙江南福建淮南益梓利䕫等路率限僧百人度一人尼五十人度一人京師及他路僧尼率五十人道士及女冠不以路分率二十人度一人己未工部郎中直史館張掞為户部副使此為梁適罷相張本賜京畿轉運使公使錢三十萬樞密副使給事中孫沔數言追冊溫成於禮不可且曰皆由佞臣贊兹過舉宰相陳執中等甚銜之沔不自安力求解職壬戌授資政殿學士知杭州浙俗貴僧或縱婦女與交沔嚴察之杖配者甚衆三司使禮部侍郎田况為樞密副使三月戊辰遣開封府判官司封員外郎王鼎往滄州相度鹽利害以聞樞密使彰德節度使同平章事王貽永數以疾求罷己巳罷為景靈宫使加右僕射兼侍中案宋史宰相表作檢校太師仍詔特依宗室例嵗賜在京公使錢五千緡其進奉聽如兩府例貽永性清謹寡言頗通書不為聲伎之樂本朝外姻未有輔政者貽永在樞密積十五年常逺權利歸第則杜門謝賓客迄無過失人稱其謙謹慶厯間貽永位冠西府楊懷敏自河朔入奏塘泊事欲升黜者數十人兩府聚議宰相賈昌朝見懷敏為興呼押班太傅懷敏稱說云云獨貽永頗怒謂曰押班如此騰倒人太多寧為穩便懷敏縮頭而退昌朝大慙龎籍吳育時為樞密副使相謂曰常得此老發怒大是佳事此據江氏雜志附見河陽三城節度使同平章事判鄭州王德用為樞密使庚午三班奉職黃獻圭為左班殿直雍州司户參軍石鑑道州進士吳舜舉並為大理評事黃汾為衛尉寺丞賞獲儂智高母子之功也知桂州余靖加集賢院學士加集賢乃二月辛酉今附此知雍州蕭注遷西上閣門副使注五月丙戌乃遷今并書辛未翰林學士曽公亮鎮潼軍留後李端懿同試入內醫官詔諸路提㸃刑獄朝臣使臣自今三嵗一代之壬申溫成皇后母楚國太夫人曹氏卒輟視朝三日幸其第臨奠賜邊臣御製攻守圖置提㸃京畿刑獄官以度支貟外郎蔡挺為之癸酉録永興軍清逺弩手指揮使李遂子安升並為茶酒班殿侍遂與蕃賊戰死故也乙亥判大名府賈昌朝言自來軍主都虞候并廂軍都指揮使近年退斥者多差為河北路部署鈐轄其人既無遷陟之望惟務侵漁士卒緩急必誤邊事請自今止差閒慢路分從之司天監言日食夏四月朔庚辰德音改元降天下死罪一等流以下釋之癸未易服避正殿減常膳乙酉詔京西民饑宜令所在勸富人納粟以賑之其荒田如人占耕及七年起稅二分逃田及五年減舊稅三分因災傷逃而復業者免支移折變二年非因災傷者免一年丁亥命知制誥吕溱同看詳編配罪人壬辰宰臣率百官上表請御正殿復常膳不許自是表三上乃許之夏四月甲午朔日有食之遣官祀社以救日是日雷雨至申時見所食九分之餘丙申宰相率百官以日食不及算分拜表稱賀丁酉詔諸路轉運提㸃刑獄司賊盜發而不以聞者其州縣長官并以違制論戊戌御崇政殿閲諸軍轉貟凡三日詔三司鑄至和元寶錢庚子龍圖閣直學士刑部郎中知秦州張忭為右司郎中以蕃部冦古渭寨道阻不通而忭舉郭恩發兵擊走之也辛丑御正殿復常膳利州路轉運司言蕃部冦文州詔益利梓䕫路鈐轄秦鳯部署司嚴加守備仍令階州撫綏所屬蕃部勿令結連以為邊患文州蕃部每入冦酋豪常氏輒禦却之知州吳賁隂與諸族約誣常氏欲為變械繫獄將滅其家以幸賞轉運使解賓王馳往出之而奏逐賁賓王蓬萊人也祥源觀火先是知制誥胡宿言臣竊以國家乘火而王火於五行其神屬禮漢書天文志曰火禮也以此而言國家常須恭依典禮以順火性伏覩京師自去秋不雨綿歷三時聖心焦勞臣下隕越思所以消救之道未知所出伏惟陛下明德恤祀䖍共郊廟宜䝉福應乃遘災旱古者祭天神無二主禮專一配所以奉天帝之尊眀不敢瀆三代兩漢之盛莫之敢易唐初始有兼配之事垂拱中禮官希旨郊丘諸祀遂有三祖同配之禮開元十一年明皇親享圓丘禮官建議遂罷三祖同配之事除此之外未有一代三帝同配昊天之禮國家至道三年詔書親郊圓丘以太祖太宗並配陛下即位景祐二年詔禮官詳按典禮以辨崇配之序詔書節文自今以往太祖定配二宗迭侑去年八月八日詔書今次南郊三聖並侑後次却依舊禮未踰旬日復有今後每遇南郊三聖並侑之詔竊尋詔旨先後不同此誠陛下至孝蒸蒸虞舜之用心也然有違典禮未合天衷致旱之由恐在於此臣愚欲望聖慈今後南郊乞且依去年八月八日詔書及景祐二年禮官所定太祖定配之典追寢去年八月二十四日今後每次南郊三聖並侑之詔告謝天地以順火性必䝉福祉之降足消災旱之異臣若心知不可口不敢言即是長負陛下奬育之恩沒有餘責不報胡宿奏章不得其時按胡宗愈作宿行狀云宿因旱災奏章未幾祥源觀火乃下宿章禮官以郊事重未敢議宿復上章始從之然實録都不見此其後嘉祐六年正月罷三聖並侑蓋用楊畋議也今姑附宿章于祥源觀火之後仍云不報更俟考詳甲辰契丹國母遣崇儀節度使左驍衛上將軍耶律秦衛尉卿趙翊契丹遣昭德節度使蕭璉殿中監趙徽來賀乾元節戊午殿中侍御史裏行吳中復對于延和殿上謂曰比上封者多言隂陽不和蓋由大樂未定且樂之不合於古久矣朕以水旱之災繫時政得失非樂所召也己未秦鳯經略司言昨古渭州沙克精谷蕃部相攻而吐蕃轄戩嘗領衆以援官軍今遣人貢馬頗有向化之心欲月增大綵五匹角茶五斤妻李薩勒與封邑號舊軍主李覺薩與轉都軍主月增大綵三匹角茶三斤兄蕃僧遵錐格與賜紫月給小綵一匹散茶三斤從之庚申徙知潭州刑部貟外郎天章閣待制任顓知舒州狄青之南征也顓得宣撫司移文稱宣毅卒有功補為本軍校卒至顓察其色動曰必有異志即付所司案具服又搜其家得細書文字盡記潭之軍伍兵仗城郭道路乃智高所用為內應者也顓令梟首以徇遂修完城壘大為守備赦書褒美賜白金五百兩於是以疾乞舒州未行除龍圖閣直學士知渭州此事或不必書河北緣邊安撫司言比降德音軍士遁入化外者限百日首身放罪今契丹誘過河北軍士前後數千人乞與展一年從之置北京作坊軍匠兩指揮殿中侍御史吕景初言聖人在上不能無災而有救災之術今百姓困窮國用虛竭利源已盡惟有減用度爾用度之廣無如養兵比年招置太多未知揀汰若兵皆勇健能捍冦敵竭民膏血以啖之猶為不可况羸疾老怯者又常過半徒廢粟帛戰則先奔至於勇者亦相率而敗當祖宗時四方割據中國才百餘州民力未完耕植未廣然用度充足者兵少故也而所征者皆克自數十年來用數倍之兵所嚮必敗以此知兵在精不在衆也議者纍以為言陛下不即更者由大臣偷安避怨論事之臣又復緘默則此弊何時而息望詔中書樞密院議罷招補而汰冗濫又言太陽始虧隂雲忽開呈露天象已而復合此天意誡人君之深也西有桀驁之戎北有彊大之敵朝廷捐金幣以紓邊民之患然貪心何厭哉北界比增嵗遺而西戎乘屢勝之氣我亦捐二十五萬以與之百姓匱窮猶遣泛使數有邀求臣知敵計日逺日長欲以困中國中國既困則必渝盟何者蓋今日之兵不足用也卒伍驕惰常冀姑息姑息不至立能為害保塞甘陵可為明驗將帥不能申恩威惟茍免無事如養癰疽觸之則潰况驅以嚮敵乎為陛下計惟急於擇士篤於任賢無以朋黨疑臣下若賢者類進則可以為朝廷選將帥明紀律嵗月磨之使漸變陳態兵戢備嚴常若敵至則邊人不敢動而有所懲艾矣又言坐而論道者三公也今輔相日奏事非留身求罷免未嘗從容獨見以詳講治道雖願治如堯舜得賢如稷契而未至於治者抑由此也幸陛下於輔臣侍從臺諫之列擇其忠信可任而通治道者屢召而數訪之景初所言本傳都無日月實録亦不載因此月日食附之月末五月乙丑詔河北東陜西路每嵗夏曝器甲其有損斷者悉令完補如後檢㸃有不堪用者知州通判并主兵官並降官乙亥馬軍副都指揮使昭信留後張茂實為寧逺節度使知潞州茂實之母微也既生茂實入宫乳悼獻太子茂實方襁褓真宗以付內侍張景宗曰此兒貌厚汝養視之景宗遂以為子於是開封民繁用扣茂實馬首言茂實乃真宗子茂實執以聞事下開封用蓋病狂見事既明言者以嫌請罷茂實兵柄上察其無他故擢節度使出守用坐編管歙州既而言者不已復詔光祿少卿許宗夀鞫之配用竇州牢城實録云茂實乃乳母朱氏子其生常在禁中故用緣而妄言與茂實正傳不同今從正傳用配竇州乃七月辛未今並書司馬光記聞云初周王將生詔選孕婦朱氏以備乳母已而生男真宗取視之曰此兒豐盈亦有福相留宫中娛侍皇子皇子七嵗薨真宗以其兒賜內侍省都知張景宗為養子名曰茂實及長纍歷軍職至馬軍副都指揮使繁用其父嘗為張氏僕自幼聞父言茂實生於宫中或言先帝之子於上屬為兄用冀幸恩賞即為表具言其事於中衢邀茂實以表呈之茂實懼以用屬開封府府以用妄言杖之配外州下軍然事遂流布衆庶譁然於是言事者請召用還考實詔以嘉慶院為制獄按之者言用素病心一時妄言茂實不上聞擅流配之請案其罪詔繁用配廣南牢城辭所連及者釋之又云獄成知諫院張擇行録問駁用非心病詔更驗定蓋初止編管更驗定乃配廣南也丙子廣南西路經略司言獲黎賊符護奴婢十人送還峒中而符護亦嘗犯邊執瓊崖州巡檢三班借職慕容允明及軍士於是以軍士五十六人及允明來歸允明道病死詔軍士至者悉貸之黎峒唐故雍管之地在大海南距雷州泛海一日而至其地有黎母山黎人居焉舊說五嶺之南人雜夷獠朱崖環海豪富并兼役屬貧弱婦人服緦緶績木皮為布陶土為釡器用瓠瓢人飲石汁又有椒酒以安石榴著甕中即成酒俗呼山嶺為黎居其間有號黎人弓刀未嘗去手弓以竹為絃今儋崖萬安皆與黎為境其服屬州縣為熟黎其居山峒無征徭者為生黎時出與郡人互市丁丑祠部貟外郎祕閣校理王純臣通判揚州其兄堯臣時為樞密副使有以純臣多納餽遺聞上者故出之戊寅刑部員外郎兼侍御史知雜事郭申錫為河北體量安撫使西上閣門使張希一副之時牒者稱契丹議遣泛使申錫因言河北官私俱困吏不素擇兵不素練願選能臣申飭備禦上嘉其言即命申錫往託以流民初復業故遣使安輯也尋詔申錫如經制邊事須密行文字毋或張皇詔申錫毋張皇乃七月壬戌日事今並書知并州韓琦請自今河北陜西河東兵每春秋大閲其武藝絶倫者與免軍中諸役如本軍將有窠闕則先補之從之辛巳南丹州刺史莫惟延子世漸為檢校散騎常侍權發遣南丹州事惟延老願以世漸承襲也莫惟延據南丹州𫝊作莫惟辿今兩從之乙酉詔自今三班使臣合入逺地而父母年高者聽依文臣例召保官與近地丙戌廣南西路經略司言融州大邱洞首領楊光朝內附己丑客星出天關之東南可數寸嘉祐元年三月乃沒六月乙未詔益州路鈐轄司應蠻人出入處皆預擇人為備禦時黎州言儂智高自廣源州遁入雲南故也丙申置廣州管勾城池甲仗庫戰船場使臣一員壬寅徙知澶州建武節度使曹佾知青州時議將修塞六塔上賜詔問佾佾言河決殆天時未易以人力爭陛下念河北被患於功費無所惜然決口將合流益駛雖用土如麻葦積芻如邱阜且何所施以臣之見不如徐觀其勢而利導之萬全之算也佾論與執政異故徙之此據李清臣墓銘按此時猶未修六塔恐清臣飾說當考詳明年十月二日趙抃有言乙巳追封皇后父玘為東海郡王溫成皇后父堯封為清河郡王母曹氏為齊國夫人丙午詔荆湖北路安撫司軍士遁入蠻界其防邊土丁能捕獲二人以上與遷一資癸丑殿中侍御史裏行吳中復上殿彈宰相梁適姦邪上曰近馬遵亦有彈疏且言唐室自天寶而後治亂分何也中復對曰明皇初任姚崇宋璟張九齡為宰相遂致太平及李林甫用事紀綱大壞治亂於此分矣雖威福在於人主而治亂要在輔臣上曰朕每進用大臣未嘗不采天下公議所歸顧知人亦未易耳遵樂平人也甲寅出內藏庫紬絹五十萬緡錢三十萬下河北助糴軍儲八月范鎮論買抄事可考秋七月壬戌朔録南作坊副使劉用子世昌為三班借職世隆三班差使殿侍用嘗知瀘州招來夷賊八百餘人又一子戰沒特恤之甲子詔刋修唐書官宋祁編修官范鎮等速上所修唐書丙寅前真定府藁城主簿陳昌期為光祿寺丞先是閩人范士舉與其黨數百人盜販私茶久不能獲而昌期能往招降之也丁卯端明殿學士給事中知益州程戡為參知政事禮院言奉詔參定即溫成皇后舊宅立廟及四時享祀之制檢詳國朝孝惠皇后太祖嫡配止即陵所置祠殿以安神主四時惟設饌無薦享之禮今溫成皇后宜就葬所立祠殿參酌孝惠故事施行仍請題葬所曰溫成皇后園從之戊辰禮部侍郎平章事梁適罷以本官知鄭州先是殿中侍御史馬遵等彈適姦邪貪黷任情徇私且弗戢子弟不宜久居重位適表乞與遵等辨遵等即疏言光祿少卿向𫝊師前淮南轉運使張可久嘗以贓廢乃授左曹郎中又留豪民郭秉在家賣買奏與恩澤張掞還自益州賂適得三司副使故王逵於文德殿庭厲聲言空手冷面如何得好差遣適居位猶自若中丞孫抃言適為宰相上不能持平權衡下不能訓督子弟言事官數論奏未聞報可非罷適無以慰清議上知清議弗平乃罷之王圭志適墓云適論皇儀不可治妃喪又云將以適為園陵使適言嬪御無園陵之制由是與陳執中不合御史因得以傷適今適𫝊猶用圭志按適自以姦邪貪黷罷相初不由議溫成禮與執中異也圭志墓不免緣飾本傳不當因之今不取己巳殿中侍御史馬遵知宣州殿中侍御史吕景初通判江寧府主客員外郎殿中侍御史裏行吳中復通判䖍州梁適之得政也中官有力焉及遵等於上前極陳其過上左右或言御史捃拾宰相自今誰敢當其任者適既罷左右欲并遵等去之始遵等彈適多私又言鹽鐵判官李虞卿嘗推按茶賈李士宗負貼納錢十四萬緡法當倍輸而士宗與司門貟外郎劉宗孟共商販宗孟與適連親適遽出虞卿提㸃陜西刑獄下開封府鞫其事宗孟實未嘗與士宗共商販且非適親遵等皆坐是黜而中復又落裏行知制誥蔡襄以三人者無罪繳還詞頭改付他舍人亦莫敢當者遂用熟狀降敕虞卿昌齡子也梁適因中官得相此據碧雲騢他書無之然適嘗使石全斌訴狄青等賞薄而青遂除樞密使則適固交結中官者也碧雲騢所載或過當今略刪取云御史中丞孫抃言臣等昨論列宰臣梁適事今日風聞吕景初以下並議譴責臣詳觀朝旨必是姦人以巧言移人主意遂使邪正曲直潰然倒置况威賞二字帝王之權古先聖人尤所謹重今梁適內恃私邪外恃勢力重輕高下皆在其手嗟怨之聲沸騰中外陛下庇而不問臣恐緣此之後朝廷事事盡由柄臣臺諫之官噤口結舌畏不敢語陛下深居九重何從而知之此非宗廟社稷之福非天下生靈之福臣居風憲之長既不能警䇿權臣致令放縱私徇又不能防間姦人致令惑誤聖聽臣之罪多矣乞陛下奪臣官爵竄臣逺方以謝天下公議又言朝廷置御史臺伺察奸宄糾彈不法先帝復降詔書不許兼領他務以專言事之任故人人知懼紀綱可守今權臣縱恣威賞自我白簡廉奏是為本職陛下不訪始末衆斥而羣逐之中外共駭無敢語者此蓋執政大臣隂相徇庇以固寵利多設他語寖移聖意上不憂朝政下不畏物論人臣居槐鼎之貴固已極致何苦如是乎臣前與郭申錫等全臺上殿論列朝廷事陛下雖即時未便開可然亦優容討論終不賜之罪名今止言梁適乃遽然有此行遣顯是犯天子之顔者其過輕言宰相之事者其罪重廟堂謀議重輕之際理宜然耶方今幅貟數萬里生齒至夥治亂安危之要係執政數人而已既有過咎臺官不得言諫署不得奏朝廷其何如哉啓此一例政體去矣伏望陛下念太祖太宗真宗大業謹重之又謹重之無使威賞二柄盡假於下又纍奏乞召還遵等皆不報翰林學士胡宿因召對乞留馬遵等退又上言御史者天子耳目之官所以上廣聰明下防威福若有懦弱無狀緘默不言即是尸位素餐負陛下之任使罪之可也若其不畏強禦糾發姦違可謂能言是其本職旌之可也近聞臺官彈奏事連宰相陛下不置詔獄按問止令開封府訊狀憑劉宗孟一面單辭黜三人御史於朝廷有損於人情未服昨日聞御史差敕留中未下外議皆謂必是聖心覺悟不黜臺官人情莫不喜恱剛猛御史自古難得今若逐去須别舉之所舉之人未必能勝此也近日謫見未息姦宄須防古人有言猛虎在深山藜藿為之不採猶言直臣在朝姦人逺避也臣欲乞降旨留三御史在朝以警姦邪臣已曽面論此事欲乞聖慈更賜詳度權知開封府龍圖閣直學士兵部郎中吕公弼為樞密直學士知益州先是上每念吕夷簡聞公弼有才書其名於殿柱公弼奏事上目送之語宰相曰公弼甚似其父既召程戡入輔因使公弼代戡公弼固辭乃復授龍圖閣直學士同羣牧使乃詔同羣牧使權增一員後不為例庚午秦鳯路經略司言西賊冦古渭寨乞於鄰路益兵五千人從之甲戌知渭州端明殿學士禮部侍郎張方平為户部侍郎知益州方平初以父老不得迎侍辭上曰久知此條貫不便但以祖宗故事不欲更變因卿行便可迎侍去當令中書罷此條貫方平惶恐奏祖宗著令安可以臣故輕議變更也此據范鎮東齊筆記附見不知罷此條貫果在何時當考方平措置益州事附明年正月蓋方平以十一月方到也戊寅詔殿前馬步軍司諸軍排連其藝均者以射親為上仍自今别籍記射親者庚辰判大名府賈昌朝請以河北諸州軍户絶錢并官死馬價錢令逐處市馬給戰士從之壬午太子太師致仕杜衍言臣男欣祕書丞通判應天府乞候成資日就差管勾南京留司御史臺詔候今任滿差權替年滿闕衍以引年退居上恤其耆德特從所請非常例也癸未禮院言今立溫成皇后祠殿而未見孝惠故事請每行祭奠止令本處內臣主之詔孟饗特差知制誥待制行事其制如皇后牙盤食差減之戊子龍圖閣直學士吏部郎中歐陽修知同州先是修守南京以母憂去服除入見上惻然怪修髮白問在外幾年今年幾何恩意甚至命判吏部流內銓小人恐修復用乃僞為修奏乞汰內侍挾恩令為姦利者宦官人人忿怨楊永德者隂求所以中修會選人張俅胡宗堯例改京官批旨以二人嘗犯法並循資宗堯前任常州推官知州以官舟假人宗堯連坐及引對修奏宗堯所坐薄且更赦去官於法當遷讒者因是言宗堯翰林學士宿子故修特庇之奪人主權修坐是出守修在銓曹未浹旬也八月癸巳判吏部南曹太常博士集賢校理吳充同知太常禮院同判吏部南曹太常丞直集賢院馮京同判登聞鼓院二人皆以胡宗堯故易任充上疏為歐陽修辨不報出內藏庫錢二百萬緡令入內供奉官勾當御藥院張茂則置司以市河北入中軍糧抄先是上封者言河北入中軍糧京師給還緡錢紬絹商人以算請久未能得其抄每百千止鬻六十千今若出內藏庫錢二百萬緡量增價收市之歲可得遺利五十萬上以為然故委茂則幹其事既而知諫院范鎮言內藏庫𣙜貨務同是國家之物豈有𣙜貨務因欲滯商人算抄而令內藏庫乘賤以買之與民爭利傷體壞法莫此為甚上諾鎮言遽罷之罷買抄乃乙巳日今并書自皇祐二年改用見錢法而京師積錢少不能支入中之費嘗出內藏庫錢帛百萬以賜三司久之入中者寖多京師帑藏益乏商人持劵以俟動彌歲月則至損其直以售於畜賈之家故言利者欲革之朝廷既行即止然自今並邊虛估之弊復起此據食貨志第三卷附見皇祐四年三月壬戌出絹十萬七月乙巳又出錢三十萬絹十萬五年七月丙子出鈔十萬紬絹二十萬綿十萬今年六月甲寅出紬絹五十萬緡錢三十萬范鎮又言臣伏見祠部貟外郎邵必先知常州日誤以杖六十罪作徒一年决遣自開封府推官落集賢校理降充邵武軍監稅凖法去官遷官流以下罪勿論當時特旨以為過重近以南郊赦恩并今年三月德音才移揚州監酒中外之說以為用法過當使必犯情涉深故雖廢終身亦不為過然出於失誤於法本輕又别無難恕情理伏望特與牽復職任庶合用法之意臣與必同在館閣知其本末甚詳竊恐如必之比尚多伏乞下大理寺刑部檢會聞奏比類施行鎮論邵必不得其時據奏藁在論買交抄後因附此大宗正司言左衛大將軍從古自陳亡子世邁嘗冒請亡孫令昶俸錢願除已俸入官請劾罪以聞上以從古知過特釋之從古德芳孫也甲午知制誥賈黯權判吏部流內銓承平日久百官職業皆有常憲蓋樂於因循而銓衡徒文書備具而已黯始欲以風義整救其弊益州推官桑澤在蜀三年不知其父死後代還舉者甚多應格當遷方投牒自陳人皆知其嘗喪父莫肯為作文書澤知不可乃去發喪制服以不得家問為解澤既除喪求磨勘黯以為澤三年不與其父通問亦有人子之愛於其親乎使澤雖非匿喪猶為不孝也言之於朝澤坐廢歸田里不齒終身晉州推官李亢故嘗入錢得官已而有私罪默自引去匿所得官以白衣應舉及第積十歲當磨勘乃自首言其初事黯以為此律所謂罔冒也奏罷之奪其勞考丙申知諫院范鎮言陛下每遇水旱之災必露立仰天痛自刻責盡精竭慮無所不至蓋百吏不稱職使陛下憂勤於上而人民愁苦於下也夫以國家用調責之三司三司責之轉運使轉運使責之州州責之縣縣責之民民竭其力以佐公上而自不給則嗟怨之氣干戻天地此水旱之所以作也願詔中書樞密大臣考求祖宗朝逮天聖中官吏與所畜兵及天下賦入之數而斟酌裁節之庶國用有常而民力有餘陛下雖髙拱無所事而天地之和應矣惟留神采擇丁酉詔前代帝王後嘗仕本朝為八品以下官其祖父母父母妻子犯流以下罪聽贖未仕而嘗受朝廷賜者身所犯非凶惡亦聽以贖論辛丑詔雅州知州專管勾黎州兵甲盜賊公事壬寅起居舍人直集賢院同修起居注吳奎為契丹國母生辰使禮賓副使知鎮戎軍郭逵副之鹽鐵判官主客郎中宋選為契丹生辰使供備庫副使定州路都監王士全副之開封府判官殿中侍御史俞希孟為契丹國母正旦使閣門通事舍人夏伸副之司封貟外郎直龍圖閣兼天章閣侍講盧士宗為契丹正旦使西頭供奉官閣門祗候李惟賓副之癸卯詔觀文殿大學士晏殊五日一赴內殿起居賜信州貴溪縣龍虎山上清觀漢天師二十六代孫張嗣宗為冲靖先生乙巳補易州民李秀為三班差使殿侍始秀為雄州探事有邊民遁入契丹以告秀秀畏罪乃求歸特補之丙午工部侍郎參知政事劉沆依前官平章事集賢殿學士禮部侍郎知鄭州梁適為觀文殿學士知秦州御史中丞孫抃再疏言舊相不當臨邊不報初建古渭寨間為蕃部所鈔及益兵拒守而他族多驚疑適具牛酒召其大酋轄約格羅等撫定之罷所益兵終適之去蕃部不為冦碧雲騢言適除觀文殿大學士由內降按騢舊相為觀文殿大學士非異恩也疑碧雲所載或毁適過甚今不取丁未徙知宣州殿中侍御史馬遵為京東轉運使通判江寧府殿中侍御史吕景初知衢州通判䖍州主客員外郎吳中復知池州初歐陽修罷判流內銓吳充馮京罷判南曹知諫院范鎮言銓曹承禁中批旨疑則奏禀此有司之常也今讒人以為撓權竊恐上下更相畏誰敢復論是非請出言者主名正其罪復修等職任凡再言之帝意解而宰臣劉沆亦請留修帝謂沆曰卿召修諭之沆曰修明日陛辭若面留之則恩出陛下矣戊申命修刋修唐書詔學士院自今當宿學士以故請告者令以次遞宿前一夕命劉沆為宰相召當宿學士楊偉草麻不至乃更自外召趙槩草之故有是詔辛亥詔樞密院自今選有材武任戰陳者權三路鈐轄候五年正授之毋得陳乞壬子詔觀文殿大學士晏殊赴經筵賜坐杌如宰相儀丁巳詔河北沿界河寨鋪使臣非公事毋得擅入州城戊午知制誥賈黯言陛下日御邇英閣召侍臣講讀經史其咨訪之際動關政體而史臣不得與聞臣竊惜之欲乞令修起居注官入侍閣中事有可書隨即記録從之賜坐於御坐西南詔自今將相遷拜見辭之禮令閣門以故事舉行初知制詔韓絳言比年以來多失故事且將相遷拜迎授見辭勞餞各有寵數或當行而輒罷或假豫之非宜遂使恩禮所及頗失其稱請下有司申明舊制故降是詔
