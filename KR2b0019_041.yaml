body:
  text: 續資治通鑑長編巻三十七宋李燾撰太宗至道元年正月戊申朔徳音改元端拱初詔於昭陽門内道北建上清宫謂左右曰朕在藩時太祖特鍾友愛賞賚不可勝紀因悉貿易以作此宫為百姓請福不用庫錢也時王沔參知機務奏曰土木之工必有勞費不免取百姓脂膏爾上黙然數年功不就言事者多指之有詔中輟後嵗餘内設道塲與道士言及之乃復出南宫舊金銀器用數萬兩鬻於市以給工錢訖其役丙辰宫成總千二百四十二區上親為書額車駕即日往謁焉度支判官陳堯叟梁鼎上言唐季以來農政多廢民率棄本不務力田是以家鮮餘糧地有遺利臣等每於農畝之業精求利害之理必在乎修墾田之制建用水之法討論典籍備窮本末自漢魏晉唐以來於陳許鄧潁暨蔡宿毫至於夀春用水利墾田陳迹具在望選稽古通方之士分為諸州長吏兼管農事大開公田以通水利發江淮下軍散卒及募民以充役每千人人給牛一頭治田五萬畆雖古制一夫百畆今且墾其半俟久而古制可復也畆約収三斛嵗可得十五萬斛凡七州之間置二十屯嵗可得三百萬斛因而益之不知其極矣行之二三年必可致倉廩充實省江淮漕運其民田之未闢者官為種植公田之未墾者募民墾之嵗登所取其數如民間主客之例此又敦本勸農之要道也傅子曰命縣於天人力雖修茍水旱之不時則一年之功棄矣水田之制由人力人力茍修則地利可盡也且蟲災之害又少於陸水田既修其利兼倍與陸田不侔矣上覽奏嘉之即遣大理寺丞皇甫選光祿寺丞何亮馳𫝊往諸州按視經度其事選廬江人亮南充人也始命司門員外郎開封孫蠙為皇姪皇孫教授時中書言唐文宗朝宰臣李石奏太子有侍讀諸王亦有侍讀無降殺之禮請改為奉諸王講讀今皇姪皇孫皆列職環衛請以敎授為名從之故涪陵悼王廷美諸子之在京者皆令肄業焉契丹大將韓徳威率數萬騎誘党項囉朗威族十六府大首領馬斡等自振武入㓂永安節度使折御卿率輕騎邀撃之大敗其衆於子河汊囉朗等族乗契丹之亂詐為府州兵躡其後敵大驚擾死者十六七悉委其輜重渉河而遁敵將號突厥太尉司徒舍利死者二十餘人生擒吐渾首領一人徳威僅以身免甲子御卿遣使奏㨗上召見便殿問破敵之状笑謂左右曰契丹小醜輕進易退朕常誡邉將勿與爭鋒待其深入則分竒兵以斷其歸路從而撃之必無遺類也今果如吾言左右皆呼萬歲初并代都部署張永徳聞賊入㓂以太白萬勝訣占之語其僚佐曰賊雖以年月便利乗金而來反值歲星對逆兵家大忌彼當自敗不足慮也坐客皆憮然及是乃歎服端拱末詔以興道坊宣祖舊第建道宫乙丑成凡二百六十五區賜名曰洞真選京師諸州女官得胡又元等三十一人使居焉初趙賛自京兆罷歸纔數月上復令賛專勾校三司簿領㑹改創三司官屬以賛為西京作坊副使度支都監有鄭昌嗣者亦起三司走吏與賛親比互相表裏累遷至西上閤門副使鹽鐡都監二人既得聯職由是益横恣所為皆不法丁卯詔削奪賛官爵并一家配𨽻房州昌嗣責授唐州團練副使既行數日並於所在賜死中外莫不稱快上因謂近臣曰君子小人如芝蘭荆棘不能絶其類在人甄别爾茍盡君子則何用刑罰焉參知政事㓂凖對曰帝堯之時四凶在廷則三代以上世質民淳已有小人矣今之衣儒服居清列者亦頗朋附小人為自安之計如昌嗣輩奔走賤吏不足言也諸州奏案頻有官典盗用庫物者上謂近臣曰夫人之善惡在乎原情假如官典私竊庫物雖至鉅萬止一盗爾亦何害於民政哉若黨庇憸人稔成姦惡以滋蠧政其為盗大矣詔諸處長吏無得擅斷徒杖刑以下聽與通判官等量罪區分二月甲申命宰相及羣臣分於京城寺觀祠廟禱雨又命中使分祀五嶽故事御署祝版以遣之翰林學士王禹偁上言凖禮五嶽視三公今雖加王爵猶人臣爾天子稱名恐非古制請自今更不御署庶尊卑適序典禮無差上親批其紙尾曰昔唐徳宗猶屈拜風雨且國朝典禮素定豈可廢也朕為萬民祈福桑林之禱猶無所憚至於親署又何損焉初將作少監索湘為河北轉運使有訟其擅用庫縑者坐責膳部員外郎知相州時有羣盗聚西山下謀斷澶州河橋入攻磁相白晝輙援旗伐鼓鈔劫閭里鄰郡發兵千人捕逐無敢近湘擇州軍之勁鋭者得三百人偵其入境即掩撃盡擒而戮之河北轉運使王嗣宗以其狀聞詔復前官為河東轉運使丁酉詔除兖州歲課民輸黄䔒荆子茭芟十六萬四千八百圍因令諸路轉運使檢按部内無名配率如此類者以聞當悉蠲之三月丁未朔詔以官倉粟數十萬石貸京畿及内郡民為種有司請量留以供國馬上曰時雨既降土膏初起民無種則不能盡地利但竭廪以給之至秋有百倍之獲國馬食以芻藁可矣庚申詔諸路轉運司告諭部下幕職州縣官等應公私利害並許上言附傳置以聞送中書舍人閲視可否已已上令衛士數百輩射於崇政殿庭召張浦觀之先是李延信還上賜李繼遷勁弓三皆力及一石六斗繼遷意上欲威示戎敵非有人能挽也至是士皆引滿平射有餘力浦大駭上笑問浦戎人敢敵否浦曰蕃部弓弱矢短但見此長大人固已逃遁况敢拒敵乎上因謂浦曰戎人皆貧窶飲食被服粗惡無可戀者繼遷何不束身自歸永保富貴流内銓引見選人内秦可觀者常負微譴瞻對之際詞氣慷慨帝目之數四又陳亷者自陳前任冀州屬邑簿防援城壘有勞詔並補右班殿直授監押差遣各賜紫袍靴笏銀百兩帝謂之曰汝等茍能副吾任使朕固不惜恩澤他年勤幹有勞願復文資者亦聽㑹要三月事今附月末詔權停貢舉夏四月癸未吏部尚書平章事吕䝉正罷為右僕射參知政事吕端為户部侍即平章事上謂䝉正曰僕射師長百僚朕以中書多務與卿均勞逸爾又謂端曰廟堂之上固無虚授但能進賢退不肖便為稱職矣卿宜勉之先是上作釣魚詩斷章云欲餌金鈎深未達磻溪須問釣魚人意以屬端也後數日遂罷䝉正而相端端歴官僅四十年至是驟被奨遇上常恨任用之晚為相持重識大體以清静簡易為務奏事上前同列多異議端罕所建明一日内出手札戒諭自今中書必經吕端詳酌乃得聞奏端謙讓不敢當吕誨補正惠公傳改本史語罕所建明作端笏却立俟顧問蓋飾辭今但用本語參知政事蘇易簡罷為禮部侍郎翰林學士張洎為給事中參知政事洎與易簡嘗同在翰林尤不協及易簡遷中書洎多攻其失易簡去位洎因代之初冦凖知吏部選事洎掌考功考功為吏部官屬凖年少新進氣鋭思欲老儒附已洎夙夜坐曹視事每冠帯候凖出入於省門揖而退不交一談凖益重焉因延與語洎㨗給善持論多為凖心伏乃兄事之極口薦洎於上上亦欲用洎又知其在江表日多讒毁良善李煜殺潘佑洎嘗預謀心疑焉翰林待詔尹熈古等皆江表人洎嘗善待之上一夕召熈古等侍書禁中紀聞作琴棋待詔今從國史因從容問以佑得罪之故熈古言李煜忿佑諫説太直爾非洎謀也自是遂洗然而凖又數薦洎不已既同執政洎奉凖愈謹事一决於凖無所預專修時政記甘言善柔而已戊子詔自今參知政事宜與宰相分日知印押正衙班其位甎先異位宜合而為一遇宰相使相視事及議軍國大政並得升都堂先是趙普獨相太祖特置參知政事以佐之其後普恩替始均其任既而復有釐革吕端初與冦凖同列及先任宰相慮凖不平乃上言臣兄餘慶任參知政事日悉與宰相同願復故事上特從其請亦以慰凖意云實録云初宰相趙普初議置參知政事與宰相異等按太祖置參知政事實用陶穀議非普所建白也今不取庚寅詔御史臺告諭内外文武羣官應父母在川陕漳泉福建嶺南等處並令迎侍就養專糾察違詔者重寘其罪丙申賜布衣潘閬進士及第未㡬追還詔書以閬所為狂妄故也辛丑上謂宰相曰自春不雨至今並走羣望而未獲嘉應豈獄犴之中頗有寃繋乎即日命侍御史元玘等四十四人乗𫝊分往諸道案察刑獄除十惡劫殺故殺鬪殺官典犯賍及損敗官物外其劫殺止除為首者餘悉减死配本城流以下逓减一等一日御崇政殿親决京城諸司繋囚獲原宥者數百人因謂宰相曰刑罰者不得已而用之能不失有罪而得中道者斯為難矣東漢劉寛止用蒲鞭人知耻格所謂威而不猛足以輔成徳化也後三日大雷雨街中水深數尺乙已知通利軍錢昭序表獻部内赤烏白兔各一云烏禀陽精兔昭隂瑞報火徳蕃昌之兆示金方馴服之徵念兹希世之珍罕有同時而見望宣付史館從之上謂侍臣曰烏色正如渥丹信火徳之符矣昭序俶之從子也五月上召三司孔目官李溥等二十七人問以計司錢穀之務溥等言盡知其利病不可以口占願得條對許之俾中使押送中書限五日具奏上因謂宰相曰凡財賦之通塞繫於制置之臧否見簿領李溥等略陳所見亦各有所長朕嘗謂陳恕等若文章稽古此輩固不可望卿至扵錢榖利病此輩自㓜即枕籍寢處其中必周知根本卿等但假以顔色引令剖析宜有所資益恕等剛强終不肯降意詢問吕端曰耕當問奴織當問婢冦凖曰夫子入太廟每事問乃以貴下賤先有司之義也上然之溥河南人也翰林學士王禹偁兼知審官院及通進銀臺封駮司制敕有不便多所論奏開寶皇后之䘮羣臣不成服禹偁與賔友言后嘗母天下當遵用舊禮或以告上不悦甲寅禹偁坐輕肆罷為工部郎中知滁州上謂宰相曰人之性分固不可移朕嘗戒朂禹偁令自修飭近觀舉措終焉不改禁署之地豈可復處乎禹偁嘗為李繼遷草制繼遷送馬五十匹備濡潤禹偁以状不如式却之及在滁州閩人鄭褒徒歩來謁禹偁愛其才及别去為買一馬或言其買馬虧價者上曰彼能却繼遷五十匹馬顧肯虧價哉已未李溥等條上三司利害七十一事中書參校其四十四事可行遂著於籍其十九事令陳恕等議定而後行之癸亥上語及三司因謂侍臣曰朕豈不知以崇髙自恣耶但為救世養民所以錢穀細務亦自與用心區分朕若更不用心則如何整頓也只如前代帝王昏弱天下十分財賦未有一分入於王室唐徳宗在梁洋公私窘乏韓滉專制鎮海積聚財貨徳宗遣其子皐往求得百萬斛斗以救艱危即當時朝廷事勢可見矣朕今收拾天下遺利以贍軍國以濟窮困若豪户猾民望吾毫髪之惠不可得也丙寅參知政事冦凖奏曰近者邉上易署主帥増修甲卒深合事宜上曰天下庶政日新滔滔如流水朕固不怠於聽斷至於疆場戎事既安危所繋亦皆是朕一一躬自籌度預為制置以防其漸若臨事倉卒則無及矣凖對曰自非睿畧淵深長覊逺馭則安能坐制黠敵使邉庭無事也因語及用將帥上曰前代任人責望既深又不知勞苦如漢貳師將軍長驅士卒深入西域以未得汗血馬遮玉門關却令反斾以巫蠱事坐族誅致廣利没身戎虜又蘇武陥單于庭十九年備歴艱辛能終持漢節及歸朝受賞止於典屬國朕則不然將帥材畧固不求其備但量其能而用之上自節旄下至二千石第其功效而授之微勞盡甄下情畢達下情畢達則無猜貳之嫌微勞盡甄則無觖望之釁所以各務忠孝而固祿位悖亂不得而萌也自梁晉巳降昏君弱主失控馭之方朝廷小有機宜禆將列校皆得預御坐而參議其姑息武臣乃如此朕君臨四海以至公御下不唯此輩假使李廣復生亦無姑息之理也丁卯上謂宰相曰國家歲入財賦兩倍於唐室且唐中葉以降藩鎮擅命征賦多不入於公家下凌上替經制隳壊茍前代措置得宜則已致太平豈復煩朕思慮也因召三司使陳恕等責以職事曠弛恕等對曰今土宇至廣庶務至繁國用軍須所費浩瀚國家諸州每有災沴必盡蠲其租臣等時舉利權朝廷慮以侵民皆柅而不行縱使耿夀昌桑𢎞羊復生亦所不逮臣等材力駑下惟盡心簿領終不足上禆聖理上曰卿等清而不通專守繩墨終不能為國家度長絜大剖煩析滯只如京城倉庫主吏當改職簿領有一處節目未備即十年五年不與斷决以至貧無資給轉死溝壑此卿等之過也豈不傷和氣哉恕等頓首稱罪戊辰開封尹夀王元侃言太康縣昭慶鄉華陽村民獲黒兎一以獻上謂宰相曰黒兎之來國家之慶也吕端等對曰黒者北方之色兎即隂類外國之象華為中國中國陽也將有外國入朝受冠帯於闕下昭邦家之慶以致太康者乎
