body:
  text: 續資治通鑑長編卷二百八十八宋李燾撰神宗元豐元年二月丙午朔提舉市易司俞充言永興軍路當兩川秦鳯熙河涇原環慶衝要乞皆置市易務與經制熙河路邊防財用司所置市易相為表裏以牽客旅往來仍許借內藏錢四十萬緡為本候收秦州等市易錢撥還詔財用司同相度以聞後財用司言竊慮他官典領以各司錢物分彼此即往來物貨或相害乞與本司經制同講求别具興置次第以聞從之廣南西路轉運司言昨交人擾邊大兵討伐調發軍費事務實繁本司倉猝之中不用常制差擇得力官吏舉人等分督丁夫糧草應副軍前今以勞績分三等乞賜酬奬詔中書如纍奏未嘗施行可差次輕重量與推恩御集乃轉運使張頡奏丁未江南西路提舉司言興國軍永興縣有熙寧六年至九年拖缺役錢萬二千餘緡本縣民戶地薄稅重纍經災傷又役錢稍重乞特賜蠲免從之轉運司言凖樞密院劄子建昌軍近因廖恩驚劫乘此人情思保聚之際可以修城令計工料以聞今相度物料人工若坊郭民戶出辦不足即更令南豐兩縣三等以上戶等第出備又不足即給省錢從之仍須嵗豐分三料修築詔蔡延慶展磨勘二年時延慶被責落龍圖閣直學士為天章閣待制法當磨勘特展之也己酉命輔臣祈雨詔比部員外郎畢仲熊減磨勘二年右贊善大夫李熙等各減一年仍與先次差遣前桂州觀察度支黃祹等各循兩資進士張祖禮入額差攝仲熊等以應副安南軍須祹等以隨軍有勞也淮南東路提舉司言收糴并折到斛斗除凖備外所管約八百餘萬石慮將來陳積難以轉移况本路甚闕見錢聞京東水災乞豫令收聚本錢移於淮東近便州縣或自清河運致以糧榖撥還却於折糴本錢上聽量出息其步乘亦令管認又京東東路體量安撫黃亷言西路及徐州淮陽軍良田百餘萬頃被水退遲麥種不入秋田又失指擬乞於淮南路沿流豐熟州縣借常平錢十萬緡和糴或於去年折納糧內借十萬石依元折價計數為所借錢水運赴京東以備賑糶聽司農寺移用詔京東淮南東路提舉官於界首㑹議以聞詔曽孝寬候卒哭令起復中書時政記閏正月二十六日可考庚戌昭化節度使同平章事襲濮國公宗誼卒贈太師中書令廣陵郡王諡莊孝遺表推恩十二人支賜三人權發遣三司使天章閣待制李承之權三司使詳定禮文所言有事於南郊薦享景靈宫朝饗太廟大率皆踵唐禮至於壇壝神位大駕輿輦仗衛儀物亦兼用歷代之制若概以先王之禮固己不同必兼用歷代之制則其間情文訛舛甚衆蓋有規摹茍略而因循己久重於更制者有事出一時之儀而不足以為法者謹先具一二奏陳恭俟訓敕以為體式詔詳定合更事以聞録皇城使權發遣廣南西路鈐轄順州駐劄介定姪天祐為三班借職定從郭逵南征所至常先登破賊及留新造順州撫養士卒完葺城壁圗畫山川道路戰陳之法咸有可稱染瘴而卒無子故有是命樞密院言諸路己團結諸將官押隊使臣専一教閲外聞不係團結將兵處兵官全失訓練知州亦不提舉㸃校致武藝生疏欲令逐路經略安撫總管鈐轄司指揮當職官等常切教習若朝廷差官㸃閲武藝稍踈當職官重行朝典從之權發遣提㸃開封府界諸縣鎮公事集賢校理蔡承禧言竊惟陛下所以哀憐元元發於惻怛之仁心講義倉之法使臣等奉行之今率以二石而輸一斗至為輕矣臣之領邑二十二其九己行嵗斛幾萬請自今嵗夏稅之始不煩中覆而舉行之乃詔畿縣皆立義倉事𨽻常平司實録刪承禧奏頗略今從本志熙寧十年九月癸酉初立義倉詔提舉修閉曹村決口所察視兵夫飲食如有疾病令醫官悉心治療具全失分釐以聞當議賞罰辛亥提舉成都府路茶場司請自今應支撥與諸司錢並支見錢金帛勿以茶折所貴不致諸司增損茶價有害茶法從之明州言得日本國太宰府牒稱附使人孫忠遣僧仲回等進絁二百匹水銀五千兩本州勘㑹孫忠非所遣使臣乃泛海商客而貢奉之禮不循諸國例乞以此牒報仍乞以所回賜錢物付仲回從之壬子權荆湖南路轉運副使朱初平等言凖朝㫖招納三州一鎮楊光僣等出漢管勾招納使臣等逾年在邊深入不測委實有勞效詔各遷補職名及賜帛有差詔給鹽鈔三十萬緡付羣牧買馬文思使知府州折克柔領忠州刺史以河東路經略使韓絳言克柔承襲已及六年乞依折繼祖例優與遷官故也又言乞令弓箭手買四尺四寸以上馬仍勒貼納虧官價從之免貼納價錢詔叙宗室前右監門率府率叔諄不欺並為右內率府副率不欺以在式假入殿唐突叔諄毆殺白直卒被罪至是特叙之也又詔剋擇官祖安道奪一官時上為曾公亮舉哭安道擇二十一日吉既而自陳與國音相衝請改用二十二日特責之癸丑都提舉市易司請貨滯於本司者聽臨時依時價轉易如虧元直即於每年比較樁留準備失陷錢豁除從之詔自今親祠太廟焚冊於南神門外其祀郊丘匏爵獻而不酹內壝之外衆星位周環每二步别植筍樁一綳青繩三重以為限域先是提㸃南郊事務向宗儒言車駕詣太廟行禮畢焚冊於齊殿門外禁衛於此坐甲地步狹隘乞於南神門外少東焚冊又言郊壇內壝之外衆星設位舊無限域乞依內壝限以筍樁綳繩又言冕服器用多參以今禮雖匏爵獨循古制恐未為稱又酹酒於盤嫌於祼獻恐非大神不祼之義乞下禮官詳議至是禮院奏以為焚冊於南神門外壇壝綳繩以限星域及匏爵獻而不酹當如宗儒議至欲飾匏爵即非古案先儒義說但曰破匏為爵而不云有飾且取其自然以象天地之性故有是詔御藥院言藥材有市販所無乞下諸路轉運司具出産州軍如闕本院以所須名色科置上供從之軍器監言皮角庫所管牛虎豹鹿等皮角纍萬乞委官編簡堪造軍器并膠料外其病色皮角分等估賣從之上批故西京左藏庫副使河東第六將陳濟美子從善昨為在京教習馬軍所指使近以父喪奔訃冝以濟美久在河外纍有戰功與麟府路指使仍賜絹二百甲寅雍州觀察使宗暉為淮康軍節度使封濮國公兩紀並書此都大提舉淤田司言京東西淤官私瘠地五千八百餘頃乞依例差使臣等管勾從之詔新知單州都官郎中梁端與宫觀差遣新權知泰州屯田郎中段縫别與合入差遣以知諫院蔡確言段縫並無才能乞追還所授新命故也元祐二年二月辛卯詔朝散大夫段縫落致仕與管勾宫觀縫在熙寧中知興國軍嘗論免役不便元豐初宰相吳充専進熙寧異議之人乃除縫知泰州諌官蔡確上言計縫資秩當通判而中書擢知州縫初無才能止以嘗詆毁新政故膺奬任滋長背公慢令之風是天子黜陟之柄臣下可得而回也詔與縫合入差遣乃得通判閬州縫避逺求分司遂以本官致仕至是左司諌王覿薦之故有是詔新史辨曰蔡確挾姦希進専媚王安石以議新法為背公慢令今刪去宰相吳充以下十一字乙卯鄜延路經略使吕惠卿言近以軍馬分定九將己具條約奏乞早賜指揮詔惠卿審度事幾以團定將兵當取裁事逐急從宜施行務在詳審後上批九將條約內擬定將副恐須更選詔送樞密承㫖司同吕大忠薛昌朝看詳以聞壬戍燕國公主薨上長女皇后所生也戊辰分命輔臣祈雨於郊廟社稷仍令京東京西河北河東陕西淮南等路愆雨州軍長吏禱名山靈祠權發遣河北轉運判官太子中允王輔之提㸃河北東路刑獄以知定州薛向言輔之先奏本州軍糧粗惡後因定奪朝廷遂移輔之東路今河北併為一路乞引避故又改輔之也上批手詔前安南戰棹都監楊從先等頃以孤軍冒犯不測深入賊境大小數十戰雖無甚斬獲然官軍亦不致傷敗今師還繫獄殆將逾年原其勞於王事實可矜愍况昨己經郊赦宜並釋之其同行有功將士等仍第賞以聞尋令從先赴闕舊紀全載此詔己巳詔義勇保甲上番所省諸軍請給惟糧米聽留本色外餘並封樁仍以諸路義勇保甲𨽻提㸃刑獄司開封府界𨽻提㸃司知瀘州任伋奏納溪寨蠻甫望箇恕等乞請受上批可量與廩給以羈縻之伋眉山人也明年正月九日與程之才互訟詔外任文武官乞試換者並俟己替就試詔提舉成都府等路茶場司應置場賣茶州軍知州通判並兼提舉經略使所在即専委通判兼之詔知亷州供備庫副使李時亮降一官監押右侍禁衛立之降兩官司戶參軍孔元孫衝替坐不救火焚器甲二十四萬㑹赦特責也庚午河東都轉運使陳安石言年榖屢登當廣行計置乞於河北權住糴見錢京鈔內支三十萬緡市糧草以備朝廷緩急移用如積久令轉運司依常平兑換詔給鈔十五萬緡餘從之詔應諸軍陳亡賻絹陳勝將校三十匹兵二十匹不勝各減半民兵凖此著為令又詔諸城寨堡鎮常平錢榖己給十日具數申司農寺嵗終上都數三司奏在京倉庫支納浩瀚自御厨至店宅務其監官乞奏舉從之辛未詔權桂州司理參軍徐伯偕攝廉州石康縣尉徐伯凖並追毁出身以來告敕除名勒停永不收叙百姓徐建安等並杖脊送荆湖北路編管以不知覺徐伯祥赦前通書交趾特斷也伯祥初以布衣募衆擊交賊授右侍禁為沿海巡檢王師抵富良江乾德遣人以伯祥熙寧六年書至其書自稱巨宋逰士臣伯祥教以擾邊且以朝廷為負其功故積怨欲捨墳墓棄親戚而歸彼於是詔捕伯祥伯祥遂自經死而伯偕者其同母兄伯凖者其同堂弟建安其子也伯祥授官在熙寧九年三月二十一日壬申詔知雄州歸信容城兩縣西頭供奉官李澤尉右班殿直宋彥圗在任無引惹及巡防不失事體澤除閣門祗候彥圖遷一官並再任三月乙亥朔命太子中允權發遣河北東路提㸃刑獄汪輔之文思使屯田司都監謝禹圭同管勾修築塘隄詔奉使髙麗使副所過州郡迎勞並視使遼例知順州陶弼乞監洪州玉隆觀若限貟即乞致仕詔令趙卨體量如實衰病即選差彊力官替弼回桂州詔禮部貢舉戊寅京西南路轉運司言祕書監髙賦言唐州民請地生稅實公私之利乞并登州南陽縣民有田無稅及稅少地多立限一年自陳據頃畝立稅給帖聽為永業限滿不言聽人告請從之詔都水監調撥汴口水勢接淮汴行運其曹村大河決口水雖已還故道然未通順宜用濬川杷疏濬三日一具疏濬次第以聞賜塞次河役兵特支錢有差凡一萬八千四百七人人數據御集淮南東路提舉司請額外民戶增出役錢從下蠲減從之己卯廣南西路轉運司乞下荆湖南路轉運司兌支全永二州糧為桂州軍儲詔經略司同轉運司相度減戍兵於全永就食以上批漸邇盛夏北兵不耐暑可移桂州戍兵過嶺就食永全不惟寬轉餉之力又得滯粟以時變易不致積久陳腐故也詔使髙麗安燾等於今日進發出門賜御筵於永寧院賜度僧牒五十付京東西路轉運司市修橋木庚辰權陕西路轉運使度支郎中皮公弼直昭文館為都轉使太子中允王子韶知禮院仍於資善堂置局修定說文五年六月九日成書賜度僧牒五百付三司兌撥上供錢五萬緡償廣南西路經略司辛巳疏决繫囚雜犯死罪以下第降一等杖以下釋之令諸路監司覺察巡案結絶刑獄毋令淹蔓命太常博士祕閣校理陳睦假起居舍人直昭文館為髙麗國信副使代林希希謫監杭州樓店務以上批聞希雖迫懼朝命不敢終辭然形貌憂鬱不少舒且髙麗望中國使人久矣茍一見希顔狀如此甚非所以使彼識達朝廷眷顧遣使通好之意今雖已啓行理終未便宜遣人代之故也九月二十一日還使御邇英閣沈季長進講周禮八法上曰或言邦治或言官法何謂也季長以義對壬午同知諫院黃履言近遣官禱雨今又降釋罪囚聞三司罪人七十餘人而免者四開封百餘人而免者五由二者推之則淹延未決者蓋多矣乞令隨其罪之輕重立限結絶庶乎被澤者衆而感天不旋日也詔遣檢正中書吏房公事王陟臣檢正刑房公事范鐺同三司開封府官吏了絶見禁獄疑者申中書樞密院環慶路經略司奏夏賊遣威沁刺事及張言㸃集大兵入冦匿於熟戶吹寧家詔經略司根問非虛皆斬訖奏是日侍讀吕公著讀後漢書畢上留公著極論治體至三皇無為之道釋老虛寂之理公著問上曰此道髙逺堯舜能知之乎上曰堯舜豈不知公著曰堯舜雖知之然常以知人安民為難此所以為堯舜也上又論前世帝王曰漢髙祖武帝有雄才大略髙祖稱吾不如蕭何吾不如韓信至張良獨曰吾不如子房蓋以子房道髙尊之故不名公著曰誠如聖諭上又曰武帝雖以汲黯為戇然不冠則不見後雖得罪猶以二千石祿終其身公著曰武帝之於汲黯僅能不殺耳上又論唐太宗公著曰太宗所以能成王業者以其能屈已從諫耳上臨御日久羣臣畏上威嚴莫敢進規至是聞公著言竦然敬納之此據范祖禹帝學及吕公著家傳癸未詔選日遣官禱雨於風伯雨師權發遣福建路轉運使屯田郎中蹇周輔直史館廣南西路經略司乞以兩江峒丁團成指揮權補人員部轄及置馬社乞降度僧牒五百市戰馬千匹分給峒丁候教成可戰以次令自買馬教習詔峒丁止令習溪峒所長武藝勿教馬戰餘從之先是權知雍州劉初等被㫖抄㸃左右江峒丁團結成保隊乞每五百人為一指揮别差正副使二人都頭五人統轄教閲又言峒丁昨覩王師討伐交人因馬取勝願習馬戰乞選兩江武勇峒丁結成馬社人自買蠻馬每匹官給錢三萬如死即買填馬主備三分之一餘令社內均出如習閲武藝出倫優與遷補仍令提舉教閲司遇呈試注籍如藝疏三次注籍即以其馬别給藝精之人故有此㫖詔文臣在京監察御史裏行在外諸路提㸃刑獄府界提㸃以上武臣在京閣門副使在外路分鈐轄以上各舉堪應武舉一人本志但稱元豐初丁亥上批皇太后叔光祿寺丞髙遵惠可除軍器監丞詔編修諸司式所重詳定宗室外臣葬式以聞詔前知吉州駕部郎中張鑑上殿所言無取及用字乖謬其本路監司提舉司元保明治狀顯有不當特免劾放罪詔使髙麗涉海新舟並賜號其一曰凌虛致逺安濟神舟其次曰靈飛順濟神舟御邇英閣講官黃履進講周禮八柄上曰坐而論道謂之三公而八柄非太宰所得與何也履曰八柄以馭羣臣馭者主道也故非太宰所與上曰善戊子右諫議大夫蘇宷為給事中宷知廣州回故事當遷官也庚寅詔時雨稍愆遣官禱元冥五星上批御史臺鞫相州法吏事多逮繫品官宜趣結絶釋其無罪者其雖有罪非受贓及徒以上者勿繫留熙河路經略司言西人鎖珠旺蕃部納木沁於地牢五日放回詔納木沁依重傷例給賜仍令保安軍牒宥州誡約之辛卯遣官謝雨御邇英閣講官沈季長進講周禮九賦上曰或言關市之賦或言關市之征何也季長以義對壬辰詔賀同天節遼使見日賜燕下節别為一行設座先是賀正旦使牒館伴所言舊例燕座上中節自為一行下節負壁今乃三節並為一行館伴以聞故也癸巳詔河北轉運司塞決河所借水利司稈草令澶州償其值仍令本司秋熟買足權發遣荆湖北路轉運判官馬珹言山猺作過己依捕張奉例立賞募歸明人等捕殺及乞朝㫖下邵州捕盜官照應從之仍具猺賊見存徒黨以聞羣牧判官王欽臣請買紬綿綺及虎豹等皮博馬從之御邇英閣講官黃履進講周禮九式上曰賔客之式次於祭祀而八政七曰賔者何也履以義對乙未御崇政殿閲諸軍轉員凡三百丙申詔開封府界諸縣及諸路轉運提舉司權停催理第四等以下戶缺負候夏熟輸納判司農寺蔡確言本寺典領新法事務繁重非諸寺監之比官屬雖以才選而並皆不别理資任欲乞丞主簿並二年理一任别除差遣者須候成任遇有員缺除朝廷特差外丞選於主簿比轉運判官都丞選於諸局丞比提㸃刑獄其資淺者差權與權發遣從之仍詔候理正運判以上資序三年為一任詔應諸軍軍員等與管軍臣僚同姓名者並令改名丁酉詔諸提舉市易官二年一比較取裁詳定諸司敕式所言今修定學士院龍圗天章寶文閣等處敕式如得㫖施行後續降朝㫖乞從本所詳定編入及見修內諸司令式事干有司奉行者並分入逐司從之荆湖北路都鈐轄司言辰沅􅍹賊寇略近邊兩月未獲己於沅州調軍防拓捕殺乞下湖南照應上批付馬珹如賊黨衆多須藉正兵及近上兵官即關牒鈐轄司差撥并暫差荆湖北路都監彭孫前來其已抽到土丁恐春深妨農選不得力先遣歸其不遣者以錢米優給之鄜延路經略使吕惠卿言昨準朝㫖令延州西路同都巡檢䇿應環慶路慶州東路巡檢䇿應鄜延路遇賊大舉聚入一路更以主兵之官引兵䇿應若本路自有兵事令經略臨機相度以别將應援臣竊謂敵興師動數十萬分犯兩路則所在皆賊我安知其何出也茍知我有䇿應之法而欲攻鄜延必見兵形於環慶環慶告急則鄜延起兵以應之欲攻環慶必見兵形於鄜延鄜延告急則環慶起兵以應之少則不足以應敵多則本路必見空虛無備之處如此非特我兵趨疾疲曳有墮賊掩伏之虞彼又將分兵搗虛以襲我矣此非所謂善戰致人者也臣愚以為諸路有兵事其鄰路但當團集以為聲援或且依條相度牽制不必更立互相䇿應之法免致臨事拘文以犯兵家之忌詔鄜延路依奏餘路别聽指揮實録載此密院時政記尤詳今但從實録或又言昔年劉平因救鄰道戰沒自今宜罷鄰道援兵環慶副總管林廣以謂諸道同力乃國家制賊之長計茍賊併兵冦一道而鄰道不救雖古名將亦無能為劉平之敗非援兵罪於是互相䇿應之法得不廢此據林廣傳附吕惠卿建議後守將作監主簿王得君與堂除差遣得君廣淵子也上批廣淵昔嘗遭遇英宗故特有是命此據御集二年年末可并入戊戌賜故衛王髙遵甫先借宅一區遵甫皇太后之父也己亥詔大河初復故道尚或壅遏令都水監遣丞一員於上流王供等掃往來照管及别差官提舉下流隄掃西京左藏庫副使前安南道行營戰棹都監楊從先言昨在交址東涇港口久不聞大兵消息聲勢遂差效用樊實黃宗慶等往占城交址兩界刺事及諭占城毋援交址恐交址賊遁逃令以兵把截今據實等狀稱占城遣蕃兵七千扼交賊要路得其國主蕃書回牒見在潭州制院乞取索看詳優奬之所貴以風勸外夷實宗慶並與三司軍將詔湖南轉運判官都官員外郎趙揚繳進蕃書牒本其樊實黃宗慶仍發遣赴闕庚子以故入內東頭供奉官寄供備庫副使裴昱子孝先為三班借職以昱勾當內東門十年有勞故也辛丑荆湖北路轉運判官馬珹言邵州覘知作過􅍹人有意歸投若不乘勢招安竊恐結集寖盛中書擬令馬珹以猺賊頭首依纍降指揮施行其餘徒黨並聽來降釋其罪仍立賞募人捕殺及許徒中殺併或收捕赴官內丁先鋒支絹百匹牛四頭願就班行與借職其餘頭首減半給之願就班行並與下班殿侍榜於要路上批宜令馬珹更勘㑹如今指揮未到以前其不許首身人已悔罪投降即更不施行仍勿漏泄實封繳申四月庚戌可考詔河東永興軍等路各增提舉官一員以判司農寺蔡確言近制提舉常平官不令他司兼領誠為至便然有所部濶逺如此數路者恐獨員乏事故也賜度僧牒二百付河北轉運司以市年計修河物料京東西路提㸃刑獄司言第七副將供備庫副使張永昌賦性輕率好勝自專以將官楊圭出自軍班常凌忽之凡有公事不務協和詔永昌降一官與淮南逺處監當
