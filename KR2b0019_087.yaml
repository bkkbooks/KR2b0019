body:
  text: 續資治通鑑長編巻八十三宋李燾撰真宗大中祥符七年秋七月丁亥涇原路都鈐轄曹瑋言昨鎮戎軍報北界萬資集人馬謀為鈔掠遣瓦亭寨駐泊都監殿直閤門祗候張仲逹指揮使御前忠佐馬軍都軍頭張㨗殿直李道率兵屯石門仲逹洎㨗擅過石門與賊戰於天麻川道隨衆䇿應戎人乃遁仲逹中流矢死詔劾㨗違命深入之罪降𨽻軍頭司散指揮使賜道奨詔錄仲逹子為三班借職賜名顯忠瑋又言渭州廣銳蕃落兩指揮将士殺賊於天麻川斬首數十級割耳鼻百餘獲其鎧甲鞍馬又威瑪等族掩擊戎㓂殺其酋帥斬首千餘級獲馬八百匹鎧甲稱是戊子知開封府王曙言本府解送舉人承前毎塲以姓名及奏牒送府印頗渉漏泄自今望給奉使一印從之己丑有司言坊州軒轅廟請仿唐明皇帝之制用祝文稱聖祖號自稱嗣皇帝臣某敢昭吿禮科不用葷血詔可庚寅復以戸部尚書陳堯叟為羣牧制置使以前望都縣尉呉致讓知堂陽縣前池州司理㕘軍徐待問知隰州賜錢五萬致讓等先䧟契丹自㧞來歸故奨之其後數有歸者皆授官賜物辛卯以益州路轉運使兵部員外郎趙禎為工部郎中梓州路轉運使殿中侍御史㓂瑊為侍御史仍加一階以饋運之勤也開封府考試舉人舊例試官更互封彌巻首直集賢院楊侃等請别差官從之左神武統軍檢校太師錢惟治卒上聞其子孫甚衆婚嫁闕乏特詔優其賜賚因問向敏中曰是家欲詔塟否敏中對曰羣臣家貧者頗惮官給䘮事乃詔罷詔塟初議贈官敏中援統軍陳承昭孟珏例當得東宫保傅上以惟治忠孝之後特贈太師錄其四子并外弟子壻親族並甄擢之壬辰廣州言知州右太中大夫邵華卒州城瀕海毎蕃舶至岸嘗苦颶風華鑿内壕通舟颶不能害及被疾吏民蕃賈集僧寺設㑹以禱之其卒也多隕泣者甲午詔交阯占城大食闍婆三佛齊丹流眉賔同朧蒲端諸國使入貢者所在遣使臣伴送赴京郵傳供億務從豐備乙未上覽司天監知厯數官表求改秩因謂宰相曰厯象隂陽家流之大者也以推歩天道平秩人時為功究災祥吉㓙者雖有妙術必待之而成近年唯秋官正趙昭逸能專其業始王熈元等上儀天厯獨昭逸請覆筭熈元等不從後二嵗厯果差昭逸言熒惑度數稍謬推驗亦如其説平居筭䇿未嘗離手熈元亦服其精一言後人鮮及熈元處訥子昭逸不詳何許人熈元傳作昭益今從實錄趙昭益見至道二年五月丙申改命王欽若為天書同刻玊副使欽若既罷樞宻名位亦當差降故也庚子詔益州舉人自今薦送定名外别解三人以其逺方多學者故優之辛丑交州李公藴敗鶴柘蠻於芳林州斬首數萬獲其主軍楊長恵遣使來貢方物且告㨗壬寅前三班奉職王襲先釐務饒州以非法縶州民箠之倒掛枋上坐停官及是叙赦恩上惡其虐民命補開封府散教練使甲辰以王嗣宗曹利用並為檢校太保充樞宻副使不帯正官葢用趙普例詔瀘州淯井監駐泊并監井使臣自今能撫綏蠻人邉界無事代還日當議甄奨戊申王旦至自兖州且言河北轉運使李士衡張士遜知兖州王臻汝隂人知長垣縣范識未見京東轉運使俞獻卿知澶州張禹珪同監修景靈宫盧守明京東同都提舉廵檢使李懷信守明懷信未見莅事幹集望賜詔褒諭萊州通判徐懷式知齊州孫夢恊通判閻惟吉采于輿論頗無治聲望令轉運提㸃刑獄司察之詔可或謂旦曰公為元宰将命出使而所舉官吏僅得褒詔不遂超擢無乃太輕乎旦曰既稱薦之又請亟用則上恩皆出于已矣此人臣之大嫌也入内押班周懷政實與旦同行或請間必俟從者皆集整衣冠見之白事已則退未嘗私焉議者以為得體辛亥詔江南廣南偽命日民田並以見佃人為主訟者官勿受理克復後即論如法詔吏部尚書王欽若户部尚書陳堯叟月俸並支實錢仍増給三十千八月甲寅朔置景靈宫使以中書侍郎兼刑部尚書平章事向敏中為之乙卯詔江南兩浙今嵗災傷民户下租及承前倚閣賑貸逋欠者並除之丙辰徙涇原路鈐轄張繼能為鄜延路鈐轄先是内屬戸殺漢口者止罰孶畜繼能則嚴於常法由是戎人畏而不敢犯趙徳明雖受朝命而蕃部不絶冦境繼能日課卒截竹為簽署字其上且言以備将士記殺賊功状賊聞之甚懼焉永寧寨監押楊光習除名配𨽻鄧州坐擅領兵出寨與頗忠族鬬又誣軍中謀殺司馬張從吉故也秦州有永寧寨府州有永寧堡此當屬秦州戊午刑部郎中直史館張復責受工部郎中左司諌直史館崔遵度責受左正言職如故並罷修起居注坐記注以恭謝天地壇昊天上帝為天皇大帝及妄増聖祖配位故也庚申有司備仗衞道門威儀教坊樂自萬嵗殿道塲奉天書赴朝元殿後幄刻玊上親酌獻自是刻玉使日詣焚香副使番徃視鐫刻其篇號題記年月皆上親書辛酉詔三班使臣自今父母亡勿住俸錢甲子以參知政事丁謂為修景靈宫使權三司使林特副之崇儀使藍繼宗為都監乙丑詔自今内臣掌局務滿三年者有司考殿最以聞時上封者言兩省使臣差使俸給多不均故條約之給河東廵邉将士韋裘氊襪丙寅梓州路轉運使冦瑊言本使公署在梓遂去戎瀘地逺緩急邉警難以照應請徙於資州從之改秦州大落門裊箆寨名曰威逺秘書監分司西京楊億以疾愈求入朝上謂王旦曰億性峭直無所附㑹文學固無及者然或言其好竊議朝政何也旦曰此葢與億不足誣謗之耳億受國深恩非土木類諧謔過當則恐有之訕讟之事保其必無也戊辰命億知汝州既而監察御史姜遵奏億頃以母疾擅去闕廷所宜屏迹衡茅盡心甘㫖忽求領郡深屬要君請罷之上曰億前吿歸本無終焉侍養之請今以疾愈求入朝故特與郡遵未諭此意耳乃詔中書召遵諭之遵長山人也按實錄及實訓並稱億求入朝獨姜遵言億忽求領郡不知何也豈遵聽聞不審或實錄與寳訓皆誤當考己巳交州李公藴又遣使來貢學士院草賜公藴詔有善撫黎氓之語上曰公藴始不利於黎民蠻夷不曉或疑朝廷諷已可令改易賜之壬申詔自今勘鞫官宜盡理推究本犯不得以原奏事状抑令招伏致有枉曲詔京城鬬競願送開封府者並聽本廂廵檢不得斷決外州廵檢亦准此各送所屬甲戌河決澶州大呉埽詔徙民即髙阜官給舟渡遣使修塞役徒數千築新堤亘二百四十歩水乃順道始命軍主都虞候一人檢㸃新城外諸營教閲知河南府馮拯嵗滿求代中書欲徙相州張秉代之上曰秉前在河南物望頗輕不可王旦曰郎中以上少人三司副使近例優轉官出領大藩今各官卑恐進擢未至然西京先有侍御史居守者乃以鹽鐡副使兵部員外郎趙湘為刑部郎中直昭文館徃代拯丙子詔自今差發解知舉等授敕訖即令閤門祗候一人引送鏁宿無得與僚友交言違者閤門彈奏如所乘馬未至即以廐馬給之先是翰林學士王曽知制誥錢惟演受敕於武成王廟試經明行修服勤詞學人與翰林學士李維偶語長春殿閤又至審刑院伺候所乘馬遲留久之維曽同在翰林曽妻維姪也時曽妻将産子故曽屬維以家事東上閤門副使魏昭亮意曽受維請託宻以聞押伴閤門祗候曹儀亦具奏即令曽惟演分析詞與維同特釋曽等因有是詔儀璨子也丁丑以御製朝謁太清宫頌明道宫碑聖祖殿等銘示近臣命内侍都知閻承翰奉安太祖太宗聖像於南京鴻慶宫遣使視棣州河隄水勢還言築隄累年僅免決壞而湍流暴溢壖地益削城南河勢髙及三二丈知州殿中侍御史孫沖守護過嚴民輸送踐隄者亦笞之乃詔擇官代沖閤門言崇政殿引對三班使臣有祈恩唐突者宣徽院承例劾其罪而諸司未著條約自今諸司引對唐突者請令所屬官司舉奏不舉奏聽閤門軍頭司糾之詔可戊寅真遊殿成召近臣焚香遂宴從官賜物有差實錄稱是日上梁今從本紀庚辰宗正寺言太廟齋郎室長自今請令預五大饗行事無遺闕者減一選全不赴者殿一選仍遇恩不得放選注官從之辛巳詔嶺南屯戍軍士代還日人給装錢五百以益彭州所簡本城軍士升為禁軍戍戎州名曰寧逺俸料如忠勇等按㓂瑊傳云賊平瑊籍軍之勇悍千人分五都以𨽻禁軍為寧逺指揮使守淯井監與實錄不同當考是月詔國子監學生應子弟在監習業者除實是開封府外毎人召京朝官二人為保識然後收試其保官須其印状赴監詔店宅務每年納課利十四萬一百九十七貫送内藏庫其錢陌不整自今令兊鹽院錢十四萬二百貫充九月甲申朔詔自今制置發運使不限官品其著位並在提㸃刑獄官之上乙酉詔選寄班使臣四員為京城四面廵檢給禁軍器甲増其月俸丙戌梓州路轉運使冦瑊請令峽路鈐轄司發弓弩手禁軍五十人屯瀘州淯井監從之是夕含譽星再見己丑増河南府公用錢五十萬勾當三班院李維等言本院使臣請自今非勾當急速公事限七日朝㕘即赴院差使其非時闕人即據新城門所申姓名定差違者送宣徽院劾罪從之辛卯内出御札與天下臣庶尊上玊皇大帝聖號曰太上開天執符御厯含真體道玉皇大天帝以來年正月一日躬申薦吿仍定儀式頒下先是上於滋福殿設玉皇像奉新撰聖號置匣中再拜授中書門下輦至朝元殿後幄於是又奉御札於崇徳殿庭設香案再拜授樞宻使奉赴文徳殿宣訖左右正言捧香禮部侍郎奉以出安於朝元殿癸巳忻州民詣登聞檢院釘手訴田有司以妄自傷殘當先决杖上聞之因謂宰相云朕猶憶昔時蘄州有一女子逺赴闕廷為其父訴田有司引例决斷遂致被杖其實千里而来不為田而為父也此事或有控撓則傷和氣矣即詔送本州甲午石隰州緣邉都廵檢峽州防禦使髙文岯卒詔遣中使護䘮歸晉州錄其子孫文岯自踐廷來歸人許其忠而知變久在石州得軍民心又蕃衆先隨至者數千戸上慮其失所即以文岯長子繼昇為崇儀副使領父任焉乙未權知開封府王曙洎判官推官等坐斷獄誤罰金初法寺准詔長吏為部民所訟罰訖代之上以京府事繁與外郡異祗命増罰金十斤而復其任丁酉三司借内藏銀八千兩戊戌羣臣以上玉皇聖號詣闕拜表稱賀詔諭諸州官吏将行薦吿之禮務遵嚴肅稍有違懈委轉運使察按之令中外所上表䟽不得連用執符御厯之類二字廣南西路轉運使髙恵連言交州賊船泊如洪寨江口已戒邕賔州廵檢使臣防護邉境詔止於界上設備無或生事上御景福殿試亳州南京路服勤辭學經明行修舉人得進士張觀等二十一人諸科二十一人賜及第除官如東封西祀例觀絳人也絳州非宋亳路當考張觀得官當是國子監及開封府薦送實錄偶不詳耳當云試亳州南京路及開封府國子監所薦送上謂宰相曰近嵗舉人文藝頗精孤貧得路然為主司者亦大不易狥請求則害公絶薦託則獲謗王旦曰今郡縣至廣人數亦繁必須臨軒親試至於南省解發非朝廷特為主張則雖責成主司亦難以集事也辛丑幸五岳觀宴從官賜兵匠緡帛有差翌日上梁又命宗室輔臣徃觀復賜宴許百司休務士庶行樂賜觀名曰㑹靈虢州防禦使邠寧環慶路副都部署荆嗣卒錄其子嗣起行間積勞居方面凡百五十戰有功未嘗自伐臨終戒其子曰吾聞累代為将其後不興汝軰當益修謹也癸卯以奉上玉皇聖號分命輔臣告玊清昭應宫郊廟社稷甲辰令瀘州淯井監戍兵自今分番而徃以其地多瘴疫故也禁軍士私蓄手刀器械其戍邉者不禁乙巳以殿中侍御史周寔為契丹國主生辰使西京作坊副使段守倫副之屯田員外郎趙世長為正旦使内殿崇班閤門祗候張舜臣副之舜臣訓子守倫未見度支副使刑部員外郎直史館孫冕坐前接伴契丹使被酒不謹丙午責知夀州初開封府解服勤辭學進士二十五人為下第者劉溉所訟其十三人以寓貫皆奔竄潜匿有司追捕王旦奏曰陛下比降恩詔捜羅才俊今乃變為囚繫恐傷風教且科舉之設本待賢徳此軰操行如此望特出宸斷以懲薄俗上曰此葢當時官司不曽曉諭致此過誤其寓貫者當並釋罪溉付外州覊管既而御史髙弁上言溉訟事得實被責太過上以問旦旦曰溉訟本非公心據欵乃俟其得解則訟此搢紳之蟊賊朝廷黜其無行諌官所宜樂聞弁妄行對奏由是觀之向非聖斷明哲辨舉子誤犯則須連坐府縣御史抨彈甚無取也上然之弁雷澤人尋以諫修玉清昭應宫降知廣濟軍弁知廣濟據本傳附見當考丁未詔自今舉人如本貫顯無戸籍及離鄉已久者許召官保明於開封府投牒取解己酉給瀘州公用錢嵗五十萬庚戌詔奨知麟州禮賓副使李直已轉運使言其幹事故也直己未見壬子以将作監丞李惟簡為太子中允致仕别賜錢三十萬惟簡穆子也多才藝性冲澹不樂仕進屏居二十餘年上特召對而命之初召惟簡使者不知其所止上令至中書問王旦然後人知惟簡乃旦所薦也旦務匿名迹逺權勢它所薦士尤多類不以吿人其後史官修真宗實錄得内出奏章乃知朝廷士多旦所薦者云歐陽修旦墓誌以惟簡為行簡誤也行簡馮翊人自有傳上甞觀書龍圖閣得王禹偁章奏嗟美切直因訪其後宰相言其子嘉言舉進士及第為江都尉頗勤詞學而家貧母老是日亦召對特授大理評事冬十月丙辰三司言外任官不得挈家者請許分添支錢給其家從之丁巳詔揚州長吏正至朔望朝拜建隆寺太祖神御殿先是登州言髙麗遣使入貢未敢迎迓以須朝㫖上謂宰相曰此事如何王旦曰髙麗久來進奉因契丹阻絶今須許其赴闕契丹必不敢言且使離髙麗契丹必已知之若有所問即當以誠對也王欽若曰此使到闕正與契丹使同時旦曰四裔入貢以尊中國葢常事爾彼自有隙朝廷奚所愛憎上曰卿言深得大體即遣使館接焉戊午詔髙麗使所至縣市物委長吏管勾勿令虧損逺人仍蠲其筭已未淮南飢命轉運發運使賑恤之殿中丞童静専削籍長流郴州不得叙用静専知容州坐贓法當徒又其叔居明先歿王事賜一子出身居明子幼静専冒䕃得官及是事發故重責之仍令福州訪居明之子以聞而居明子頴明年亦登進士第上以慶州所管熟戸蕃部尤衆其間亦有納質夏州者恐浸久成邉患辛酉置慶州緣邉都廵檢使於華池縣使統治之嵗給緡錢五十萬備宴犒從部署王守斌之請也癸亥召左正言直史館劉筠右司諌直史館陳知微並試於中書上覽筠所試特稱善遂遷右司諫而以知微為比部員外郎並知制誥仍令筠在知微上甲子以玊清昭應宫成詔賜酺在京五日兩京三日諸州一日宫宇總二千六百一十區初料功須十五年修宫使丁謂令以夜繼日每繪一壁給二燭遂七年而成詔自今軍士亡命及三年已上雖自首悉具所犯赴闕論決之從知亳州李廸之請也丙寅宴宗室輔臣於崇政殿賜襲衣金帶器幣以奉祀禮成故也因射於太清樓下上作詩賜之初詔用乙丑宴以向敏中私忌改就是日御史臺鞫殺人賊獄具知雜王隨請臠割之上曰五刑自有常制何必為此王旦曰隨司風憲抨彈自有故事此非其所宜言况此賊本情可見一死亦已極矣戊辰上御便殿引對軍校第遷之凡三日而畢先是遣内侍于萊州采玉石造景靈宫聖像於是詔采玉石處除兩稅外免其徭役辛未命知制誥盛度為兖州㑹真宫醮告使入内押班周懷政為都監上以真靈不測慮祠祭有所不及乃作文令度等特詣宫南擇地建壇塲醮吿知兖州王臻讀之科法甚盛遂即其處刻石焉詔自今天慶天貺光天降聖節有司勿進刑殺文字知延州吏部員外郎李及言鄜延路邊防之地所管弓箭手校長承前不給甲胄望許量置以備防守又鄜延界與北界相接望禁止採伐並從之乙亥詔諸州解送舉人内黜落多處宜令本州選官覆試取藝業優長者送禮部以二月一日為限進士諸科其曽經殿試并河北陜西諸科曽經終塲及他州兩經終塲下第者悉免取解己卯京東轉運使李湘言自今新授京官合入逺地未有闕而權涖近州攝務者望許叙為勞考從之李湘未見河北提㸃刑獄司言愽州獄空百三十九日宰相言天下奏獄空者無虛月唯此奏日數稍多上特令降詔奨之十一月癸未朔加號翊聖将軍曰翊聖保徳真君以樞宻副承旨右衞大将軍張質為都承㫖質在樞要幾五十年練習事程精敏端慤未甞有過舊本院吏罕有遷至都承旨者上素知質㢘謹故以授之甞召問五代以降洎國初軍籍更易之制且命條其利害質纂為三篇目曰兵要以進上覽而稱善甲申命太僕少卿裴荘權西京留司御史臺代陳象輿也以象輿為衞尉卿分司西京時刑部郎中趙湘知河南府象輿自以位居湘右每行香拜表輙倨傲不為禮使左右掖之而進上封者言之故有是命因詔西京自今行香拜表並以知府為班首陳象輿傳云馮拯代趙湘奏象輿謬状乃責按湘以是年八月甲戌知河南實代拯也拯既入是年十一月丁未始為中丞象輿責以甲申在丁未前二十四日拯既非代湘者亦恐非言象輿者今但從實錄濱州言河溢于安定鎮乙酉羣臣詣崇徳殿賀玉清昭應宫成賜宫使以下鞍勒馬器幣徳音減諸路繫囚流以下一等死罪可憫者奏裁采伐木石州縣差賜民租丙戌謁玉清昭應宫紫雲如葢覆太初殿三鶴集殿檻宴近臣于集禧殿戊子四方館使髙州刺史涇原都鈐轄兼知渭州曹瑋加引進使留再任時秦州蕃部㓂邊命瑋經畧瑋上表乞還州事専督軍旅上不欲遽更守臣故有是命仍宻詔敦諭之己丑加玊清昭應宫使王旦司空修宫使丁謂工部尚書副使林特工部侍郎為三司使都監藍繼宗洛苑使領髙州團練使置玉清昭應宫副使以丁謂為之辛卯翰林學士晁逈上玊清昭應宫頌其子秘書省正字宗操繼上景靈宫慶成歌上曰逈髙年勤於著述而善訓子弟亦搢紳佳事也以監修宫歩軍都軍頭邢興為馬軍副都軍頭領賀州刺史自餘軍校工匠第遷者九百一十三人知秦州張佶言偵知總噶爾族埒克遵和尚嘉勒斯賚召諸部首領謀犯寨城請益戍兵詔佶審驗如蕃中自相讐刼則潜設備禦撫諭遣之或侵軼疆界則從便掩襲無得深入壬辰御乾元門觀酺自是凡五日戸部尚書陳堯叟上汾隂奉祀記三巻有詔褒答乙未鄜延路鈐轄張繼能言趙徳明進奉人挾帶私物規免市征望行條約上曰戎人逺來獲利無幾第如舊制可也戊戌以辰州溪洞都指揮使魏進武補三班借職監房州稅仍給装錢赴任進武自言房州接歸峽山路頗近蠻界乞移他所遂改淮南置戎瀘資榮州富順監都廵檢使一員時内殿承制閤門祗候馬守遵言戎瀘夷漢雜居本路鈐轄在遂州緩急不能捍禦故特置此職己亥西凉府六谷蕃部來貢辛丑詔廣南東路轉運使李欣西路轉運使髙恵連對換所任先是樞宻使冦凖因對言臣甞稱髙恵連有吏幹可以任使近聞其嚴酷無㢘譽上以西路近蠻徼故徙之因言恵連昔上封事且言朝廷不可用善人善人多敗事因述天有五行為據朕觀之知其渉道淺也王旦曰夫天有五行無不善之理又所言善人若選懦之類誠無所用矣如吉履善行固人之常道安可闕也𫝊曰善人國之紀也語曰善人為邦百年可以勝殘去殺易曰積善之家必有餘慶是也欣莆田人初為階州軍事推官時自知州以下皆坐買馬得罪而欣獨免由是以清謹知名癸卯詔玉清昭應宫每嵗正月朔望許士庶焚香丁未刑部尚書馮拯兼御史中丞賜襲衣金帶鞍轡馬仍賜繡韉以拯歴中書樞宻院故特有是賜非常例也戊申契丹遣使左林牙工部尚書蕭延寧副使衞尉卿張翊來賀承天節己酉置玉清昭應宫判官都監以左正言直集賢院夏竦為判官内殿承㫖入内押班周懷正為都監王旦之為景靈宫朝修使也竦實掌其牋奏竦甞卧病旦親為調藥飲之數稱其才因使教慶國公書竦傳云敎書資善堂按資善堂明年乃置今年未也故但云敎慶國公書又同修起居注及是為判官皆旦所薦也初丁謂欲大治城西礮塲釃金水作后土祠以擬汾隂脽上林特欲跨𤣥武門𤣥武宇當考為複道以屬玊清昭應宫李溥欲致海上巨石于㑹靈池中為三神山起閣道幾遇神仙之屬羣臣亦争言符瑞竦獨抗疏皆以為不可其事遂罷及為判官居月餘乃奏寳符閣奉神果實旦起視之無有查滓狼籍左右殆神食之抗疏排丁謂等附傳有之正傳不載寳符閣所奏正𫝊有之附傳不載葢為正傳者以竦不正必不能諌前事故削去但載寳符所奏可見竦邪佞故也然竦抗疏必不誣附𫝊載其事于竦為知制誥以後恐失其序此必未為判官以前事也竦未為判官故數有正論王旦因喜之及為判官即附㑹神怪僥倖速進寳符所奏是也既有寳符之奏則必不排丁謂等矣今悉著之姦人情状或可由此見爾知秦州張佶言蕃部俶擾已出兵格鬭望量益士卒王旦曰今四方寧輯契丹守盟甚堅西戎入貢不絶藩翰之臣宜務鎮静上曰邊臣利于用兵殊不知無戰為上頃嵗河北請増邊兵王欽若等亦惑其言惟朕斷以不疑終亦無患因言昔甞謂邢昺朕中夕靖思四方至大張官置吏委之千萬里外豈能盡知善惡一有敗事則為患非小自古帝王宵衣旰食正為此爾萬務幾微更賴卿等悉心也庚戌入内殿頭白崇慶言監修淮瀆廟既成民有禱祠者多上廟内烹宰喧瀆請禁之仍徙桐柏縣令廨宇廟之東偏詔可令在京倉草塲如宣㫖並三司使取索都管見在數目即得實封供報自餘官員及提㸃使臣取索不得供報如違當行極斷十二月癸丑朔日當食不虧羣臣表賀乙卯詔三班使臣當入逺地差使求邊郡者令本院閱試武藝擇任職者授之詔自今諸州部送罪人赴闕及徃他州者並所在為劵給以糧仍令依程而行不得非理縶扑倍道進發病者牒所至州縣遣醫療治死者檢視無他故即以公驗付部送吏違者所在官司劾罪以聞先是淄州部送繫囚赴闕道多死者上憫之特命條約丙辰令王欽若陳堯叟馮拯趙安仁洎林特等各舉京朝幕職州縣官詳練刑典曉時務任邊寄者二人丁巳詔増給王嗣宗曹利用飡錢月五萬戊午詔川峽廣南福建轉運使提㸃刑獄官察部内僚吏有貪墨不法惨刻用刑者以聞以道路遼夐民無所訴也先是交州􅀈獠張婆看避罪来奔知欽州穆重頴召之至中路復拒焉都廵檢臧嗣令如洪寨犒以牛酒交州偵知其事因捕􅀈獠遂㓂如洪寨掠人畜甚衆轉運司移牒交州追索之并以聞詔督李公藴護送仍戒疆吏自今無得誘召蠻獠以致生事己未作元符觀初每嵗天慶節就左承天祥符門設帟幕啟道塲上以車騎徃來喧雜乃命葺皇城司廨舍新堂為是觀堂即劉承珪所創景徳末司命臨降處也辛酉加楚王元佐尚書令相王元偓太尉榮王元儼兼中書令自餘宗室並第遷一資忠武節度使駙馬都尉魏咸信同平章事咸信時已耆年甞因誕聖節為幼子昭侃求官且援石保吉呉元扆遺奏例以冀加等其昏眊如此又表求任用上出示中書向敏中曰咸信聨榮戚里位居節制何乃復懷希望上猶優詔答諭因以建南京奨太祖舊臣遂為使相逾年出判天雄軍壬戌修兖州景靈宫太極觀都監周懷政言兖州民有以兵器獻東岳廟者請令焚之不可焚則輸本州甲仗庫從之丁卯權知髙麗國事王詢遣奏告使尹證古及女真将軍塔沁堅已下凡七十八人以方物來貢詢表言契丹阻其道路故久不得通請降皇帝尊號正朔詔從其請又言塔沁堅自稱父兄曽入覲其兄留弗歸兹行遂徃尋訪又河北居民竇文顯等十七人先為契丹所掠投奔髙麗詢亦遣還令歸本貫上深嘉其意待證古甚厚戊辰曹瑋言築隴山外籠竿城畢詔奨之及浚壕訖役又賜器幣緡錢浚壕明年三月訖庚午命王旦為奏告大禮使向敏中為儀仗使㓂凖為鹵簿使丁謂為禮儀使王嗣宗為橋道頓遞使故事禮儀使為四使之首賛道行事敏中衰疾故譲謂以便于陟降也甲戌張佶上大洛門新寨圖先是佶欲近渭置采木塲蕃族聞之即徙帳去佶不能䘏以恩意戎人輙悔因叛卒鄉導遂行抄刼佶深入掩擊悉敗走至是求和佶不許時總噶爾埒克遵嘉勒斯賚温布且等帳族甚盛勝兵六七萬與趙德明抗敵希望朝廷爵命俸給佶奏請拒絶曹瑋獨言宜厚嘉勒斯賚以扼徳明又請如斯多特例授埒克遵節度使乃詔輔臣共議量加官秩勿踰常制采木塲與六月己巳所書或相闗當考據㑹要則曹瑋請如斯多特例望授埒克遵節度使而實錄乃云其蕃部郢城琳布且亦置節度使如斯多特例盖埒克遵一名郢城琳布且也今且從㑹要然埒克遵盖輔斯賚者斯賚猶未加爵命而遽請埒克遵為節度使不知何也當考實錄于此月壬寅始載瑋此奏又云嘉勒斯賚請以馬直改賜金箔什物等今移入張佶事後并書且削去改賜馬直及日乙亥樞宻院言諸州本城馬歩軍都指揮使已下俸給等差不一請自今令三司以三京為一等節鎮為一等防團刺史為一等從之丙子以衣庫使楊崇勲崇儀使夏守贇並為西上閤門使先是守贇晨朝上使内侍皇甫繼明問欲管軍乎為横行使乎守贇對曰臣竊位得日近冕旒足矣與崇勲俱授此職増慶州柔逺寨鳳州柳泉等鎮環州合道鎮監押一員從陜西轉運使之請也丁丑契丹使臨海節度使耶律少寜副使永州防禦使耿寧來賀明年正旦併左藏軍生色雜色匹布二庫為生熟匹段庫淳化三年末可考是嵗天下户九百五萬五千七百二十九口二千一百九十九萬六千九百六十五
