body:
  text: 續資治通鑑長編卷三十四宋李燾撰太宗淳化四年春正月庚寅朔親饗太廟辛卯合祭天地於圜丘以宣祖太祖升配大赦天下度支副使謝泌條上郊祀賞給軍士之數上曰朕愛惜金帛止備賞賜爾泌因曰唐德宗朱泚之亂後唐莊宗馬射之禍皆賞軍不豐所致今陛下躬御菲薄賞賜優厚真歷代王者之所難也二月上以江淮兩浙陜西比嵗旱灾民多轉徙頗恣攘奪抵冒禁法己卯遣工部郎中直昭文館韓授考功員外郎直祕閣潘愼修等八人分路巡撫所至之處宣達朝㫖詢求物情招集流亡俾安其所導揚壅遏使得上聞案决庶獄率從輕典有可以惠民者悉許便宜從事官吏有罷軟不勝任苛刻不撫下者上之詔令有所未便亦許條奏丙戍以磨勘京朝官院為審官院幕職州縣官院為考課院時金部員外郎謝泌言磨勘之名非典訓也故易之朝廷自克平諸國財力雄富然聚兵京師外州無留財天下支用悉出於三司故費浸多上孜孜庶務或親為裁處必以愛民惜費為夲戊子有司言油衣帟幕破損者數萬段欲毁棄之上令煮浣染以雜色刺為旗幟數千以示宰相李昉等奏曰陛下萬幾之外聖智髙逺事無大小咸出意表天生五材陛下兼而用之物有萬殊陛下博而通之雖在細微無所遺棄固非臣等智慮所及先是左司諫張觀因對言揚州民多闕食請格殘稅上曰近已免貧下民秋稅何為復有理納觀曰細民多姦猾或以佃户託名貧下僥幸蠲减惟實貧下者尚有殘缺上冉三歎息曰兩稅蠲減朕無所惜若實惠及貧民雖每年放却亦不恨也今州縣城郭之內則兼并之家侵削貧民田畝之間則豪猾之吏隱漏租賦虛上逃帳此甚弊事安得良吏為朕規制使無惠姦無斂貧稱朕之意乎寶訓載此事云在淳化中今附見三月辛亥詔書然觀方置制茶鹽又知黃州恐此時又不在於朝矣故以先是而别之三月辛亥詔諸道知州通判限一月具如何均平稅賦招輯流亡惠恤孤窮室塞姦幸及民間未便等事共為一狀附疾置以聞他有所見聽别上疏論别委中書舍人詳定可否若可採取當議旌酬茍務因循必申懲責初何承矩至滄州即建屯田之議上意頗嚮之既而河朔頻年霖雨水潦河流湍溢壞城壘民舍處處蓄為陂塘妨民種藝於是承矩請因其勢大興屯田種稻以足食㑹臨津令黃懋亦上書請於河北諸州興作水田懋自言閩人本鄉風土惟種水田緣山導泉倍費功力今河北州軍陂塘甚多引水溉田省功易就三五年內公私必獲大利因詔承矩往河北諸州案視復奏如懋言壬子以何承矩為制置河北緣邉屯田使內供奉官閻承翰殿直段從古同掌其事以黃懋為大理寺丞充判官發諸州鎮兵萬八千人給其役凡雄莫霸州平戎破虜順安軍興堰六百置斗門引淀水灌溉初年稻值霜不成懋以江東晚霜稻常九月熟河北霜早又地氣遲一月不能成實江東早稻以七月熟即取其種課令種之是年八月稻熟始承矩建水田之議沮之者頗衆又武臣亦恥於營葺佃作既而種稻又不熟羣議益甚幾罷其事及是承矩載稻穗數車遣吏部送闕下議者乃息自是葦蒲螺蛤之饒民賴其利實録於是月甲午先載承矩上言即命大作水田及壬子乃以承矩為制置使懋為判官按上得懋書又令承矩按視承矩復奏然後施行恐甲午日未有大作水田之命也今並從本志甲午初六日壬子二十四日成德節度使田重進改授永興軍節度使上謂陜西轉運使鄭文寶曰重進先朝宿將宣力於國卿宜善待之文寶再拜奉詔始上在藩邸憐重進忠勇嘗令給以酒炙重進不肯受使者曰晉王賜汝汝安得拒重進曰我止知有陛下卒不受上嘉其質直故終始委遇又以涪王女長夀縣主適其子守信焉重進徙鎮永興據百官表在三月不得其日詔大理寺所詳决案牘即以送審刑院勿復經刑部詳覆詔銓司舊擇歷任無殿纍者注司法參軍自今許參注有公纍者詔權停貢舉夏四月有司調退材給東窑務為薪上遣使閲視擇其可為什物者作長床數百分賜宰相樞密三司使因謂李昉曰此雖甚微碎然山林之木取之極勞民力乃以供㸑亦可惜也昉曰古人以竹頭木屑皆可充用正在於此唯慚臣下不克盡副天心耳五月甲午詔諸道轉運副使知州通判知軍監等各於所部見任幕職州縣官內舉吏道通明及儒術優茂者各一人壬寅上謂宰相李昉等曰朕孜孜聼政所望日致和平而在位之人始未進用時皆以管樂自許既得位乃競為循默曽不為朕言事朕日夕焦勞略無寧暇臣主之道當如是耶昉等惶懼拜伏上曰事有未至與卿等言之亦上下無隱爾丙午張洎赴翰林上謂近臣曰學士之職清切貴重非他官可比朕嘗恨不得為之故事上日有敕設及㺯獼猴之戲久罷其事然亦非宜今教坊有雜手伎跳丸藏珠之類當令設之仍詔樞密直學士吕端劉昌言及知制誥柴成務等預㑹丁未廢京朝官差遣院令審官院總之翰林學士錢若水樞密直學士劉昌言同知審官院考覆功過以定升降皆其職也又以判流內銓翰林學士承㫖蘇易簡虞部員外郎知制誥王旦等同兼知考課院凡常調選人流內銓主之奏舉及歷任有殿纍者考課院主之并吏員而省司局議者咸以為當從易簡之請也吕蒙亨引對上謂判銓王旦曰此人于兄弟中最優蒙正何以不言旦曰䝉亨文學政事俱其所長即授光祿寺丞此據呂䝉正傳事在至道初今附注俟考䝉亨已見雍熙二年戊申詔罷鹽鐵度支户部等使三司但置使一員判官六員推官三員三部勾院但置判勾官一員判官一員其屬吏並仍舊貫處分符牒並令判官推官通署頒行三司使但於案檢署字從殿中丞馬應昌之議也以鹽鐵使魏羽判三司初京西轉運副使虞部員外郎祁人盧之翰建議以潩水泛溢侵許州民田請自長葛縣開河導潩水分流合于惠民河於是役成之翰以勞加户部員外郎為陕西轉運使夲志在淳化二年今從之翰本𫝊因遷官乃書之六月壬申宣徽北院使知樞密院事張遜責授右領軍衛將軍左諫議大夫同知院事冦凖罷守本官遜素與準不協數爭事上前上將罷之他日凖與溫仲舒同出禁中歸私第道逢狂人迎馬首呼萬嵗右羽林大將軍判左金吾王賔故與遜俱事晉邸遜嘗保舉賔雅相厚善又知遜與凖有隙因奏言民迎凖馬首呼萬嵗既而遜等奏事上詰之凖自辨云實與仲舒同行而遜令賔獨奏臣遜執賔奏斥凖辭意甚厲因互發其私上怒故貶遜而罷凖僧贊寧作王得一行狀云堂吏蘇允淑者受朝㫖沙汰年高選人七十以上當授散官有唐州團練判官掌宣與允淑有憾宣年始三十五被允淑夾帶髙年輩中奏名授宣為唐州司馬宣與僧法燈素友善以此事為訴法燈夙承公厚眷一日言此不平於公公令法燈引至具得見黜之由公奏聞太宗令中使尋訪召而賜對仍令上殿俯邇天顔問其被抑之故面轉著作郎復賜錢百萬宣諭為壓驚之貺授大理法直官送允淑御史臺鞫問所因允淑路由本地紿其押者言略入見家人輩押者令入允淑得便遂自刎卒太宗疑及參政冦凖出凖為青州守其信用皆如此類按準罷政乃緣狂人山呼與得一行狀不同當考以涪州觀察使柴禹錫為宣徽北院使知樞密院事樞密直學士劉昌言為右諫議大夫同知院事右諫議大夫樞密直學士吕端守本官參知政事昌言驟膺大用不為時望所歸或短之于上前且言其詞語難曉上曰惟朕能曉之甲戌尚書省重定內外官參集儀制及比視品秩以聞詔付有司頒行戊寅命左諫議大夫魏庠司封郎中知制誥柴成務同知給事中事凡制敕有未便宜准故事封駮以聞所下制敕悉具編次事當舉行者條奏之從左諫議大夫魏羽之請也先是上急召廣南轉運使向敏中歸闕推工部郎中一曰御筆飛白書敏中及虞部郎中鄄城張詠姓名付宰相曰此二人名臣也朕將用之左右因稱其材秋七月己酉並命為樞密直學士庚戌雍丘縣尉武程上疏願減後宫嬪嬙上謂宰相曰程疏逺小臣不知宫闈中事內庭給使不過三百人皆有掌執不可去者卿等固合知之朕以濟世為心視妻妾似脫屣耳恨未能離世絶俗追蹤羡門王喬必不學秦皇漢武作離宫別館取良家子以充其中貽萬代譏議李昉曰陛下躬履純儉中外所知臣等家人皆預中參備見宫闈簡約之事程微賤輒陳狂瞽宜黜削以懲妄言上曰朕曷嘗以言罪人但念程不知耳八月丙辰朔上草書宋玉大言賦賜翰林學士承㫖蘇易簡易簡因擬作大言賦以獻上覽賦嘉賞手詔褒之易簡直禁中以水試欹器屬小黃門宣事見之因密奏而不識其名及曉朝上曰卿所玩得非欹器耶易簡曰然乃江南徐遊所作即取至便坐上親較試再三嗟賞易簡進曰臣聞日中則昃月滿則虧器盈則覆物盛則衰願陛下持盈守成慎終如始固萬世基業則天下幸甚通進銀臺使舊𨽻樞密院使凡內外奏覆文字必關二司然後進御外則內官及樞密院吏掌之內則尚書內省籍其數以下有司或行或否得緣而為姦禁中莫知外司無糾舉之職樞密直學士向敏中初自嶺南召還即上言通進銀臺司受遠方疏多不報恐失事幾請別置局署命官專涖較其簿籍以防壅遏上嘉納之癸酉詔以宣徽北院㕔事為通進銀臺司命敏中及張詠同知二司公事凡內外奏章案牘謹視其出入而勾稽焉月一奏課事大小不敢有所留滯矣發敕司舊𨽻中書尋令銀臺司兼領之戊寅詔宰相參知政事樞密使副使翰林樞密直學士丞郎兩省給舍以及三司判勾各於京朝官內舉廉勤强幹眀於錢榖堪任三司判官者各一人其現任轉運使副及年齒衰邁者不在稱舉之限初黃州團練副使王禹稱量移解州因左司諌吕文仲巡撫陜西疏言父老求徙東土上即詔禹稱還朝己卯授左正言謂宰相曰禹稱文章獨步當世然賦性剛直不能容物卿等宜召而戒之尋命直昭文館九月乙巳以給事中封駮𨽻通進銀臺司應詔敕並令樞密直學士向敏中張詠詳酌可否然後行下時泰寧節度使張永德為并代都部署有小校犯法永德笞之至死詔按其罪詠封還詔書且言永德方任邉寄若以一小校故摧辱主帥臣恐下有輕上之心不從未幾果有營兵脅訟軍候者詠復引前事為言上改容勞之丙午詔翰林學士承㫖蘇易簡給事中陳恕左諌議大夫魏庠冦準右諌議大夫趙昌言起居舍人知制誥吕祐之等於幕職州縣官中各舉堪任京官者二人左司諌吕文仲等九十七人各舉堪任五千戶以上縣令者二人時天下富庶上勵精求治聽政之暇盡索兩省兩制清望官名籍閲朝士有德望者悉令舉官至祐之名熟視良久宰相因言祐之前舉東野日宣無狀上曰此正可令贖前過耳遂以祐之預焉是秋自七月初雨至是不止泥深數尺朱雀崇眀門外積水尤甚往來浮罌筏以濟壁壘廬舍多壞民有壓死者物價湧貴近甸秋稼多敗流移甚衆陳潁宋亳間盜賊羣起商旅不行上以隂陽愆伏罪由公府切責宰相李昉及參知政事賈黃中李沆曰卿等盈車受俸豈知野有餓殍乎昉等慚懼拜伏黃中出語人曰當時但覺宇宙小一身大恨不能入地耳此據談苑不及吕端豈以端新預政久雨非其罪耶冬十月庚申尚書左丞張齊賢出知定州齊賢自言母孫氏年八十五抱羸疾不願離左右上憫然許之齊賢在相位時母入謁禁中上歎其夀考有令子多賜手詔存問別加錫與搢紳以為榮齊賢尋遭母喪水漿不入口者七日自是曰啖粥一器終喪止食脫粟飯先是大名府豪民有峙芻茭者將圖厚利誘姦人潜穴河隄仍嵗决溢知府事趙昌言識其故一日隄吏告急昌言命徑取豪家廥積以給用由是無敢為姦利者屬河决澶州西北流入御河漲溢浸府城昌言率卒負土填數不及千乃索禁旅佐其役或偃蹇不進昌言怒曰府城將墊人民且溺汝輩食厚祿欲坐觀耶敢不從命者斬衆股栗趨事不浹辰而城完上聞而嘉之壬戌降璽書奬諭自端拱以來諸州司理參軍皆上躬自選擇民有詣闕稱寃者立遣臺使乘傳案鞫數年之間刑罰清省矣諸路提㸃刑獄司未嘗有所平反上以為徒增煩擾罔助哀矜詔悉罷之歸其事於轉運使詔審官院自今京朝官未歷州縣者不得任知州通判從翰林學士承㫖蘇易簡之請也辛未右僕射平章事李昉給事中參知政事賈黃中李沆左諫議大夫同知樞密院事溫仲舒並罷守本官先是上召翰林學士張洎草制授昉左僕射罷平章事洎上言曰昉因循保位近霖霪百餘日陛下焦勞惕慮憂形於色昉居輔相之任職在燮理隂陽乖戾如此而昉宴然自若無歸咎引退之意矧中臺僕射之重百僚師長右減於左位望輕重不侔因而授之何以勸人臣之盡節宜加黜削以警具臣上以昉耆舊不欲深譴但令罷守本官制詞仍以久壅化源深辜物望責之黃中謹厚亷潔習知臺閣政事後進知名士多出其門然在中書畏慎過甚政事頗稽留不决時論弗許之是日以吏部尚書吕䝉正守本官平章事䝉正初為相時金員外郎張紳知蔡州坐贓免或言於上曰紳洛中豪家安肯受賕乃䝉正未第時丐索於紳不能如意文致其罪耳上即命復紳官䝉正終不自辨未幾罷相㑹考課院得紳舊事實狀乃黜之於是蒙正復為相上謂曰張紳果實犯贓蒙正亦不謝翰林學士承㫖蘇易簡為給事中參知政事易簡外若坦率中有城府由知制誥為學士年未滿三十在翰林八年特受人主之遇敻絶倫等或一日至三召見李昉後入在易簡下及先參政乃以易簡為承㫖錫賚與參政等上意欲遵舊制遂正台席且俟稔其名望而易簡以親老急於進用因召見頗言時政闕失沆等罷即命易簡代之易簡母薛氏入禁中上命之坐問何以教子遂成令器對曰幼則束以禮讓長則訓以詩書上顧左右曰今之孟母也非此母不生此子矣是日又以樞密都承㫖趙鎔為宣徽北院使樞密直學士向敏中為左諫議大夫並同知樞密院事敏中自廣南召還當途者忌焉㑹有言敏中在法寺時國子博士皇甫侃監無為軍𣙜務以贓敗發私書歷詣朝貴求末減敏中亦受之事下御史具實嘗有書及門敏中覩其名不啓封遣去俄捕得侃私童訊之云其書尋納筒中瘞臨江𫝊舍馳驛掘得封識如故上大驚異召見慰諭厚加賞激遂决意登用與鎔俱命焉鎔等入謝上曰黃中等以循默守位故罷謫垂淚叙謝朕亦為之悽然昔周有亂臣十人同心同德人臣事主可不念此以保終始古人尚欲立功名於亂世况盛世乎卿等宜各戮力以副超擢黃中等以循默守位故罷據別本實録壬申以左諫議大夫冦凖出知青州上顧凖厚既行念之常不樂語左右曰冦凖在青州樂否對曰凖得善藩當以為樂也纍數日輒復問左右對如初其後有揣帝且復召用凖者因對曰陛下思凖不少忘聞凖日置酒縱飲未知亦念陛下否上默然丁丑以右諫議大夫知大名府趙昌言為給事中參知政事令乘疾置以入即赴中書視事時京城連雨昌言請廄馬分布外郡以就秣言事者或以盛秋備冦馬不可闕昌言曰塞下積水瀰漫必無南牧之患乃從其議是嵗冦亦不動虞部員外郎知制誥王旦趙昌言女壻也昌言既參政旦以官屬當避嫌引唐獨孤郁權德輿故事辭職上重其識癸未命為禮部郎中集賢院修撰及昌言罷乃復命旦知制誥翰林學士張洎知吏部選事嘗引對選人上顧之謂近臣曰張洎富有詞藻至今尚苦心讀書江東士人中首出也然搢紳當以德行為先茍空恃文學亦無所取吕蒙正曰裴行儉不取楊王盧駱正為其無德行爾德行為先誠如聖諭京畿民牟暉擊登聞鼓訴家奴失豭豚一詔令賜千錢償其直因語宰相曰似此細事悉訴於朕亦為聼决大可笑也然推此心以臨天下可以無寃民矣王得臣麈史誤以此事為太祖朝今從國史志按別本實録繫之九月朔閏十月己亥上謂宰相曰朕嘗聞孟昶在蜀日亦躬親國政然於刑獄之事優遊不斷錯用其心每有大辟罪人臨刑之時必令人偵伺其言茍一言稱屈者即移司覆勘至有三五年間遲留不决者以為夏禹泣辜竊欲效之而不明古聖之㫖朕歷覽前書必深味其理蓋大禹止能行王道自悲不及堯舜致人死法所以下車而泣犯罪之人茍情理難恕者朕固不容爾參知政事蘇易簡趙昌言對曰臣等俱曽於江南效官聞李煜有國之日亦如此每夏則與罪人張紗㡡以禦蚊蚋冬則給與衾被恣其晏眠遂至滋蔓淹延以為矜恤如犯大辟者仍令術士然燈以卜之茍數日間燈不滅者必移司勘劾恐其寃枉至有冬月罪人戀其溫燠而不願踈放者上笑曰庸暗如此不亡何待丙午上曰清淨致治黃老之深㫖也夫萬務自有為以至於無為無為之道朕當力行之至如汲黯臥治淮陽宓子賤彈琴治單父此皆行黃老之道也參知政事吕端等對曰國家若行黃老之道以致升平其效甚速宰臣吕䝉正曰老子稱治大國若烹小鮮夫魚撓之則潰民撓之則亂今之上封事議制置者甚多陛下漸行清靜之化以鎮之上曰朕不欲塞人言狂夫言之賢者擇之古之道也十一月甲寅朔日南至御朝元殿受朝上孜孜為治每旦御長春殿受朝聼政罷即御崇政殿决事比至日中尚未御食己未金部員外郎謝泌上言請自今前殿聼政畢且進食然後御便殿决事上不答既而謂宰相曰文王自朝至於日中昃不遑暇食此自有故事然泌此奏亦臣子愛君之忠也又嘗謂左右曰寸隂可惜茍終日為善百年之內亦無幾耳可不勉乎上謂侍臣曰朕自即位以來用師討伐蓋救民於塗炭若好張皇誇耀窮極威武則天下之民幾乎磨滅矣宰相吕䝉正對曰前代征遼人不堪命隋煬帝全軍陷沒唐太宗躬率羣臣運土填塹身先士卒終無所濟上曰煬帝昏暗誠不足語唐太宗猶如此何失策之甚也且治國在乎修德耳四夷當置之度外朕往嵗既克并汾觀兵薊北方年少氣鋭至桑乾河絶流而過不由橋梁往則奮鋭居先還乃勒兵殿後靜而思之亦可為戒䝉正曰兵者傷人匱財不可屢動漢武帝及唐太宗俱英主然用兵皆不免於悔為後世非笑陛下及其未有悔也而早辨之較二王豈不逺哉上曰朕每議興兵皆不得已古所謂王師如時雨蓋其義也今亭障無事但當修德以懷逺此非清靜致治之道耶䝉正曰古者以簡易治國者享祚長久陛下崇尚清靜實宗社無疆之休也此假據別本實録并寶訓及富弼所撰吕䝉正神道碑刪修中國安靜四夷自歸按䝉正本𫝊實䝉正語而寶訓乃屬之趙安仁清靜致治按別本實録亦䝉正語而寶訓乃屬之吕端今並不取咸平五年六月䝉正復有此對丁卯宴羣臣於長春殿以武寧節度使曹彬來朝勞之也詔翰林學士錢若水樞密直學士張詠並赴宴舊制每命將帥出征還勞宴於便殿當直翰林學士文明樞密直學士皆預坐開寶中梁逈為閣門使白太祖曰陛下宴犒將帥安用此輩遂罷之至是始復從參知政事蘇易簡之請也易簡又言故事皇帝御丹鳳樓翰林學士承㫖得升樓之西南隅自今御樓肆赦望令與樞密使侍立御榻之側亦從之易簡數振舉翰林中故事前為承㫖時上待若賔友及參大政每見上不復有欵接之意但嚴顔色責吏事而已易簡乃悔其求進之速也十二月壬辰上謂宰相曰周太祖為人多任權詐以胥吏之行圖帝王之位安能享國長久如史肇出於行伍專事殺害復更稔之為非將赴大名乃謂肇曰兄處於內余處於外則朝廷安如泰山矣朝廷密議肇一一録報以此窺伺漢室可謂姦雄吕䝉正曰昔陳平佐漢之功雖髙然以多用隂謀自亦悔之隋文帝隂以賄遺人尋發其罪則知居心隂忍不保其後故平則嗣絶隋亦祚促上然之初殿中丞華陽梁鼎知吉州民有蕭甲者豪猾為民患鼎暴其凶狀杖脊黥面徙逺郡上賞其强幹代還賜緋魚舊例當給銀寶瓶帶上特以犀帶賜之且記其名於御屏於是為三司右計判官上疏曰三載考績三考黜陟幽明此堯舜所以得賢人而化天下也三代而下典章尚存兩漢以還沿革可見至於唐室此道尤精有考功之司明考課之令下自簿尉上至宰臣皆嵗計功過較定優劣故得人思勵激績效著聞化及蒸黎和氣自洽五代以兵革相繼禮法陵夷顧惟考課之文只拘州縣之輩黜陟既怠名存實亡且夫今之知州古之刺史雖有審官之例絶無考績之條强明者無以自言庸懦者得以為隱治狀顯著朝廷不知方略蔑聞任用如故既失懲勸之理寖成茍且之風致水旱荐臻訟獄盈溢望天下之承平豈可得耶伏惟陛下特詔有司申明舊典或條目未備即隨事增修庶幾官得其人民受其賜上嘉納之鼎𫝊云淳化中上此疏然今年二月始改磨勘院曰審官鼎疏言及審官則必不在二月以前既無可考附見年末鼎為右計判官實今年十月甲戌詔舊制選人年六十不任川陜廣南官或有非本土人而願者聼之先是緣江多盜詔以內殿崇班楊允恭督江南水運時因捕冦黨行及臨江軍擇驍卒拏輕舟伺下江賊所止夜發軍出城三鼓遇賊百餘拒敵久之悉梟其首又趨通州境上躡海賊賊繫衆舟張幕發徑弩短炮允恭兵刃所向多為幕所縈炮中允恭右肩流血及袖容色彌壯徐遣善泗者以繩連鐵鈎散擲之壞其幕士卒爭進賊赴水死者大半擒數百人自是江路無剽掠之患以功轉洛苑副使管勾江淮兩浙都大發運擘劃茶鹽捕賊事賜紫袍金帶錢五十萬先是三路轉運使各領其職或廪庾多積而軍士舟楫不給雖以官錢雇丁男挽舟而土人憚其役以是嵗上供米不過三百萬允恭盡籍三路舟卒與所運物數令諸州擇牙吏悉集允恭乃辨數授之江浙所運止于淮泗由淮泗輸京師行之一嵗上供者六百萬據㑹要允恭往江淮管勾般運茶鹽糧帛乃淳化四年事今附見年末官䘖則依本𫝊所載會要又于至道元年七月書以江淮兩浙都大發運兼捉賊擘劃茶鹽楊允恭為江淮兩浙發運使兼捉賊制置茶鹽公事然則本𫝊所載官銜蓋得其實而㑹要先所稱管勾般運茶鹽糧帛者乃但舉其略爾
