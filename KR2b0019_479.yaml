body:
  text: 續資治通鑑長編卷四百七十五宋李燾撰哲宗元祐七年秋七月癸未孟秋朝獻以雨命執政官分獻丙戍三省言已令轉運司計置麟府豐五年之糧今秋成有望慮近裏州軍封樁錢穀難以兊移詔除側近州軍錢糧兊移外令户部支封樁錢銀共一百萬應副丁亥詔諸獄案內有駮勘及合取單狀或議禀刑名而定斷未得者並大理所斷刑名未當合退送者其同案不相干礙之人並先次定斷戊子詔以十二月十四日有事于南郊河東路轉運司言凖敕江南路廢土産稅物場並住買撲商旅因此通行今比較元祐六年一路官監所收稅額已增三萬餘貫竊慮餘路亦可依此施行詔諸路應有人户買撲土産稅場並依江南西路指揮四月二十七日初罷江南撲買八月五日蘇軾云云已丑淮南轉運使彭次雲權發遣江淮荆浙等路發運使庚寅遼國遣使崇義軍節度使蕭迪副使中大夫守太常少卿充乾文閣待制王可見來賀坤成節壬辰殿中侍御史楊畏言在京刑獄姦弊近開封縣申李寶病癰身死而本臺牒府差官覆驗乃係栲椋至死不可不察其紏察在京刑獄一司今係臺察専領欲乞今後若禁囚死亡専委御史臺定差自來合檢驗官員依條檢驗從之癸已以翰林學士范祖禹樞密直學士趙彥若修神宗皇帝正史宰臣吕大防提舉著作佐郎張耒編修限一年畢侍御史楊畏言竊惟先帝天縱睿智文經武略發於事功過於近古非文詞義理足以取信天下則不能直筆以示來世臣去嵗論趙彥若子仁恕為令慘酷贓汙乃敢抵書監司營救其子恃劉摯姻舊輕衊朝廷今乃使誣訟險忿之人論敘先帝功德竊恐大臣殊未深慮也又疏言神宗睿聖功烈顯赫宜求敦實之人以成信史誣訟不直乃得進擬恐為先帝慮未逺也詔趙彥若修國史指揮不行王銍元祐八年補録以此事係之八年五月且稱翰林侍講學士趙彥若按彥若修史乃七年七月十二日遷翰林侍講學士乃七年十一月二十四日銍誤也今附彥若初除修史時更詳考之八月四日彥若又以密直為國史院修撰詔復置翰林侍講學士以翰林學士范祖禹為翰林侍講學士兼修國史祖禹固請補外乃用王洙避兄子堯臣故事特有是除梁燾行狀云復置翰林侍講學士實燾發之熙河蘭岷路經略安撫使范育言于闐進奉般擦和爾濟勒克伊實密陳中塗嘗為滿裕克所掠乞聞朝廷差般擦同和罕王所發兵攻滅滿裕克臣欲乞解發赴闕審問詔本司選差使臣押伴和爾濟勒克伊實般擦先赴闕新無荆湖南路安撫鈐轄司言全永衡道州猺賊作過官吏措置有功左朝請郎知永州劉䝉衡州推官徐暨左宣德郎武安軍節度簽判劉中衡州判官左膚卲州武岡縣尉借職魏延慶等詔减年循資賜絹有差新無甲午詔在任官員并繫公人不得買諸軍軍馬糧草旁厯違者徒二年許人告物沒官以尚書省言元祐敕罪當杖太輕致有冒犯無以懲戒故立是法新無丁酉環慶路第三將折可適統兵六千出界於威凌崖破賊獲級四百四十九生擒七十三人此據章楶奏議添入已亥以雨罷集英殿宴詔以韓愈祠為昌黎伯廟庚子左朝請郎權發遣江東路提㸃刑獄王祖道權發遣福州此合削去政目在八月十八日癸卯以尚書左僕射兼門下侍郎吕大防為南郊大禮使禮部尚書胡宗愈為禮儀使龍圖閣學士蘇軾為兵部尚書充鹵簿使御史中丞李之純為儀仗使權知開封府韓宗道為橋道頓遞使詔涇原路經略使謝麟本路今春以來西賊築城沒烟多為出沒誘致漢兵如聞本路自二月間已遣人户入城勾集人馬致有失業及孳畜頗多死損詳西賊蓄謀乃正以多方欲誤官兵邊民不得休息合如何禦備子細究心講議條畫以聞乙已左朝奉郎張元方為金部員外郎校書郎楊國寶為集賢校理權發遣開封府推官詔為故知雍州皇城使蘇緘立祠於本州賜懷忠廟為額緘再守雍熙寧中交趾犯邊緘血戰四十餘日殺賊甚衆糧盡不屈而死從州人之請也左司諌虞䇿言獨員乞依例與御史臺官一員同上殿仍乞自今後諌官獨員凖此從之監察御史黃慶基殿中侍御史吳立禮再論知麟州孫咸寧管勾軍馬張若訥守邉斥堠不明不豫為清野致西賊恣行劫略乞削奪逺竄以警邊吏詔孫咸寧罷涇原路凖備使喚添差監邵州酒稅張若訥無行遣當考新録遂削去若訥姓名鄜延路第四將宫苑副使向懷德追一官充鄜延路凖備差使以經略司言其私役禁軍借用公使錢及西賊侵犯綏德城懷德不即時䇿應以其纍有戰功特免勘故有是貶詔陜西河東路就糧禁軍人員節級降充本城已令陜西河東路經略司選年五十以下事藝不退堪任戰鬭之人與舊軍額外收管給廂軍請受遇有事冝責令效命其就糧禁軍雜犯情輕見配降充本城牢城長行者亦凖此仍並不候隨軍便給舊軍請受人員遞降舊職一資十將依虞候例將虞候至長行舊五百料錢者給下軍三百料錢請受舊三百料錢者聽全給新無又詔陜西河東逐路經略司自今緣邊興造須和雇禁軍並開坐闕少役兵因依條具取㫖若事速不可待報聽便和雇亦具聞奏如委官覆按稍有不實當置於法先是緣邉惟緊急修造待報不及方許直雇禁軍而諸路不以急緩與可待報者悉雇禁兵充役故申嚴其制戊申詔應赦前鞫公事諸處申乞不原赦恩或官司故作拖延若被勘之人逃亡並令刑部候案到取㫖新無已酉左朝請郎丁隲為司封員外郎六年五月八日知宿州知德安軍上官均提㸃河北西路刑獄尋改東路改東路在八月十四日權開封府推官趙同為梓州路轉運判官尋改權提㸃䕫州路刑獄仍詔自今後開封府推官未至知州資序人只除轉運判官改䕫憲乃八月四日今并書詔南郊行禮合用大裘更不用黑羊皮以黑繒製造詔諸路安撫鈐轄司并西京南京各賜資治通鑑一部庚戍大宗正司言宗室分異自來未有著令今相度欲乞除緦麻以上不許分析居外袒免已下親父母財産除永業田及供祭祀之物不許分割外餘聽均分從之是月龍圗閣學士知揚州蘇軾言軾以七月二十七日上奏今附月末二十三日已有詔除兵部尚書然未入朝也臣竊謂倉法者一時權宜指揮天下之所駭古今之所無聖代之猛政也自陛下即位首寬此法但其間有要劇之司胥吏仰重祿為生者朝廷不欲遽奪其請受故且因循至今蓋不得已而存留非謂此猛政可恃以為治也自有刑罰已來皆稱罪立法譬之權衡輕重相報未有百姓造銖兩之罪而人主報以鈞石之刑也今倉法不滿百錢入徒滿十貫刺配沙門島豈非以鈞石報銖兩乎天道報應不可欺罔當非社稷之利凡為臣子皆為陛下重惜此事豈可以小小利害而輕為之哉臣竊見倉法已罷者如轉運提刑司人吏之類近日稍稍復行若監司得人胥吏誰敢作過若不得人雖行軍令作過愈甚今執政不留意於選擇監司而獨行倉法是謂此法可恃以為治也耶今者又令真揚楚泗轉般倉斗子行倉法綱運敗壞執政終不肯選擇一强明發運使以辦集其事但信倉部小吏妄有陳請便行倉法臣所未喻也臣今來所奏只是申明元祐編敇不過嵗捐轉運司違法所收糧綱稅錢一萬貫而能令六百萬石上供斛斗不大失陷又能全活六路綱梢數千牽駕兵士數萬人免陷深刑而押綱人員使臣數百人保全身計以至商賈通行京師富庶事理明甚無可疑者但恐執政不樂臣以踈外輒議已行之政必須却送戶部或却令本路監司相度多方沮難决無行理臣材術短淺老病日侵常恐大恩不報銜恨入地故及未死之間時進瞽言但可以上益聖德下濟蒼生者臣雖以此得罪萬死無悔若陛下以臣言為是即乞將此劄子留中省覽特發德音主張施行若以臣言為妄即乞并此劄子降出議臣之罪又言臣聞唐代宗時劉晏為江淮轉運使始於揚州造轉運船載一千石十船為一綱揚州差軍將押赴河隂每造一船破錢一千貫而實費不及五百貫或譏其枉費晏曰大國不可以小道理凡所創置須謀經久船場既興執事者非一須有餘剩衣食飬活衆人私用不窘則官物牢固乃於揚子縣置十船場差專知官十人不數年間皆致富贍凡五十餘年船場既無敗破餽運亦不闕絶至咸通末有杜侍御者始以一千石船分造五百石船二隻船始敗壞而吳堯卿者為揚子院官始勘㑹每船合用物料實數估給其錢無復寬剩專知官十家即時凍餒而船場遂破餽運不繼遂有黃巢之亂劉晏以一千貫造船破五百貫為干繫人欺隱之資以今之君子寡見淺聞者論之可謂疏謬之極矣然晏運四十萬石當用船四百隻五年而一更造是嵗造八十隻也每隻剩破五百貫是嵗失四萬貫也而吳堯卿不過為朝廷嵗寬四萬貫耳得失至微而餽運不繼以貽天下之大禍臣以此知天下之大計未嘗不成於大度之士而敗於寒陋之小人也國家財用大事安危所出願常不與寒陋小人謀之則可以經久不敗矣臣竊見嘉祐中張方平為三司使上論京師軍儲云今之京師古所謂陳留四通八逹之地非如雍洛有山河之險足恃也特恃重兵以立國耳兵恃食食恃漕運漕運一虧朝廷無所措手足因畫十四䇿內一項云糧綱到京每嵗少缺不下六七萬石皆以折㑹償填發運司不復抱認非祖宗之舊制也臣以此知嘉祐以前嵗運六百萬石而以缺折六七萬石為多訪聞去嵗止運四百五十餘萬石運法之壞一至於此又臣到任未幾而所斷糧綱缺折干繫人徒流不可勝數衣糧罄於折㑹船車盡於拆賣質妻鬻子饑瘦伶俜聚為乞丐散為盜賊竊計京師及緣河諸郡例皆如此朝廷之大計生民之大病如臣等輩豈可坐觀而不救耶輒問之於吏乃金部便敢私意創立此條不取聖㫖公然行下不惟非理刻剝敗壞祖宗法度而人臣私意乃能廢格制敇監司州郡靡然奉行莫敢誰何此豈小事哉謹按一綱三十隻船而稅務所官不過一員未委何如隨船㸃檢得三十隻船一時皆遍而不勒留住岸一船㸃檢即二十九隻船皆須住岸伺候顯是違條舞法析律破敕茍以隨船為名公然勒留㸃檢與兒戲無異訪聞得諸州多是元祐三年以來始行㸃檢收稅行之數年其弊乃出綱梢既皆赤露妻子流離性命不保雖加刀鋸亦不能禁其攘竊此弊不革臣恐今後缺折不止三十餘萬石京師軍儲不繼其患豈可勝言揚州稅務自元祐三年七月始行㸃檢收稅至六年終凡三年間共收糧綱稅錢四千七百餘貫折長補短每嵗不過收錢一千六百貫耳以淮南一路言之真揚髙郵楚泗宿六州軍所得不過萬緡而所在稅務專欄因金部轉運司許令㸃檢緣此為姦邀難乞取十倍於官遂致綱梢皆窮困骨立亦無復富商大賈肯以物貨委令搭載以此專仰攘取官米無復限量拆賣船版動使淨盡事敗入獄以命償官顯是金部與轉運司違條刻剝得糧綱稅錢一萬貫而令朝廷失陷綱運米三十萬餘石利害皎然今來倉部並不體訪綱運致缺之因却言緣倉司斗子乞覔綱梢錢物以致缺折遂立法令真揚楚泗轉般倉並行倉法其逐處斗子仍只存留一半命下之日揚州轉般倉斗子四十人皆詣臣陳狀盡乞歸農臣雖且多方抑按曉諭退還其狀然相度得此法必行則見今斗子必致星散雖别行召募未必無人然皆是浮浪輕生不畏重法之人所支錢米决不能贍飬其家不免乞取既冒深法必須重賂輕齎密行交付其押綱綱梢等知專斗若不受賂必無寬剩斛面决難了納即須多方密行重賂不待求乞而後行用此必然之理也臣細觀近日倉部所立條約皆是枝葉小節非利害之大本何者自熙寧以前中外並無倉法亦無今來倉部所立條約而嵗運六百萬石缺折不過六七萬石蓋是朝廷損商稅之小利以養活綱梢而緣路官司遵守編敇法度不敢違條㸃檢收稅以致綱梢飽暖愛惜身命保全官物事理灼然臣已取責得本州稅務狀稱隨船㸃檢不過檢得一船其餘二十九船不免住岸伺候顯有違礙臣尋已備坐元祐編敕曉示今後更不得以隨船為名違條勒住岸㸃檢去訖其稅務官吏為凖本州及倉部發運轉運司指揮非是自擅為條未敢便行取勘其諸州軍稅務非臣所管無由一例行下欲乞朝廷申明元祐編敇不得勒令住岸條貫嚴賜約束行下并乞廢罷近日倉部起請倉法仍取問金部官吏不取聖㫖擅立隨船一法刻剝兵梢敗壞綱運以誤國計及發運轉運司官吏依隨情罪施行庶使今後刻薄之吏不敢擅行胸臆取小而害大得一而喪百臣聞東南饋運所係國計至大故祖宗以來特置發運司專任其責選用既重威令自行如昔時許元輩皆能約束諸路主張綱運其監司州郡及諸場務豈敢非理刻剝邀難但發運使得人稍假事權東南大計自然辦集豈假朝廷更行倉法此事最為簡要獨在朝廷留意而已謹具元祐編敕及金部擅行隨船㸃檢指揮如左一凖元祐編敕諸綱運船筏到岸檢納稅如有違限如限內無故稽留及非理搜檢并約喝無名稅錢者各徒二年諸新錢綱及糧綱緣路不得勒令住岸㸃檢雖有透漏違禁之物其經厯處更不問罪至京下鎖通津門凖此一凖元祐五年十一月十九日尚書金部符省部看詳鹽糧綱運雖不得勒留住岸若是隨船㸃檢得委有稅物名件自合依例饒潤收納稅錢即無不許納稅錢事理若或别無稅物自不得違例約喝稅錢事理甚明右謹件如前若朝廷盡行臣言必有五利綱梢飽暖惜身畏法運饋不大陷失一利也省徒配之刑消流亡盜賊之患二利也梢工衣食既足人人自重以船為家既免拆賣又常修葺省逐處船場之費三利也押綱綱梢既與客旅附載物貨官不㸃檢專欄無乞取然梢工自須赴務量納稅錢以防告訐積少成多所獲未必减於今日四利也自元豐之末罷市易務導洛司堆垜場議者以為商賈必漸通行而今八年略無絲毫之效京師酒稅課利皆虧房廊邸店皆空何也蓋祖宗以來通許綱運攬載物貨既免征稅而腳錢又輕故物貨通流緣路雖失商稅而京師坐獲豐庶自導洛司廢而淮南轉運司隂收其利數年以來官用窘逼轉運司督迫諸處稅務日急一日故商賈全然不行京師坐至枯涸今若行臣此䇿東南商賈久閉不通其來必倍則京師公私數年後必復舊觀此五利也臣竊見近日官私例皆輕玩國法習以成風若朝廷以臣言為非臣不敢避妄言之罪乞賜重行責罰若以臣言為是即乞盡理施行少有違戾必罰無赦則所謂五利可以朝行而夕見也貼黃稱本州已具轉般倉斗子二十人不足於用必致闕誤事理申乞依舊存留四十人去訖其斗子所行倉法臣又體訪得深知綱運次第人皆云行倉法後折缺愈多若斗子果不取錢則裝發更無斛面兵梢未免偷盜則缺折必甚於今若斗子不免取錢則舊日行用一貫今須取三兩貫方肯收受然不敢當面乞取勢須宛轉託人减刻隔落為害滋深伏乞朝廷詳酌早賜廢罷且依舊法又貼黃稱臣今看詳倉部今來起請條約所行倉法支用錢米不少又添差監門小使臣支與驛劵又許諸色人告捉㑹合乞取之人先支官錢五十貫為賞又支係省上供錢二萬貫召募綱梢如此之類費用浩大然皆不得利害之要行之數年必無所補臣今所乞不過减却淮南轉運司違條收稅錢一萬貫綱梢飽暖官物自全其利甚大墓志云朝廷從之當檢詳又言臣近者論奏江淮糧運缺折利害竊謂缺折之本出於綱梢貧困之由起於違法收稅若痛行此一事則朞年之間公私所害十去七八此利害之根源而其他皆枝葉小節也若朝廷每聞一事輒立一法法出姦生有損無益則倉部前日所立斗子倉法及其餘條約是矣臣愚欲望盡賜寢罷只乞明詔發運使責以虧贏而為之賞罰假以事權而助其耳目則饋運大計可得而辦也何謂責以虧贏而為之賞罰蓋發運使嵗課當以到京之數為額不當以起發之數為額也今者折缺盡以折㑹償填而發運使不復抱認其數但得起發數足則在路雖有萬數疏虞發運使不任其責矣今諸路轉運司嵗運斛斗皆以到發運司實數為額而發運司獨不以到京及府界實數為額此何義也臣欲乞立法今後發運司嵗運額斛計到京缺折分釐以定殿罰則發運使自然竭力㸃檢矣凡綱運弊害其略有五一曰發運司人吏作弊取受交怨不公二曰諸倉專斗作弊出入斗器三曰諸場務排岸司作弊㸃檢附搭住滯四曰諸押綱使臣人員作弊减刻雇夫錢米五曰在京及府界諸倉作弊多量剩取非理曝揚如此之類皆可得而去也縱未盡去亦賢於立空法而人不行者逺矣何謂假以事權而助其耳目蓋運路千餘里而發運使二人止在真泗二州其間諸色人作弊侵擾綱梢於千里之外則此等必不能去離綱運而逺赴訴也况千里乎臣欲乞朝廷選差或令發運使舉辟京朝官兩員為勾當綱運自真州至京往來㸃檢逐州住不得過五日至京及本司住不得過十日以船為廨宇常在道路專切㸃檢諸色人作弊杖以下罪許决徒以上送所屬施行使綱梢使臣人員等常有所赴訴而諸色人常有所畏忌不敢公然作弊以嵗運到京數足及缺折分釐為賞罰行此二者則所謂人存政舉必大有益伏望朝廷留念饋運事大特賜檢㑹前奏一處詳酌施行臣忝備侍從懷有所見不敢不盡屢瀆天威無任戰恐待罪之至貼黃臣前奏乞舉行元祐編敕錢糧不得㸃檢指揮竊慮議者必謂錢糧綱既不㸃檢今後東南物貨盡入綱船攬載則商稅所失多矣臣以謂不然自祖宗以來編敕皆不許㸃檢當時不聞商稅有虧只因導洛司既廢而轉運司隂收其利又自元祐三年十月後來始於法外擅便立隨船㸃檢一條自此商賈不行公私為害今若依編敕施行不惟綱梢自須投務納稅如前狀所論而商賈坌集於京師回路物貨無由復入空綱攬載所獲商稅必倍此必然之理也從之徽宗實録蘇軾傳云軾知揚州發運司主東南漕先是漕挽聽其私載往往視官舟為家以時修葺故所載卒無虞近嵗嚴私載之禁舟壞人貧公私皆病軾奏乞復故從之墓志云發運司舊主東南漕法聽操舟者私載物貨征商不得留難故操舟者富厚以官舟為家補其弊漏而周舟夫之乏困故其所載率無虞而速逹近嵗不忍征商之小失一切不許故舟弊人困多盜所載以濟饑寒公私皆困公奏乞復故朝廷從之傳蓋因墓志也軾先以七月二十七日論倉法并綱梢折缺又以八月五日論嵗運額斛到京殿最今并三奏於七月末八月一日又乞罷轉般倉斗子倉法前奏已具更不别出李豸師友談記亦載此事今附見豸云國朝發綱船不許住滯一時所過稅場不得檢稅兵梢口食許於所運米中計口分升斗借之至下卸日折算於逐人俸糧除之蓋以船不住則漕運甚速不檢則許私附商販雖無明條許人而有意於兼容為小人之啖利有以役之也借支口糧雖明許之然漕運既速所食幾何皆立法之深意也自導洛司置舟官載客貨沿路稅物既為所併而綱兵搭附遂止邇來導洛司既廢然所過稅場有隨船檢稅之滯小人無所啖利日食官米甚多於是盜糶之弊興焉既食之又盜之而轉般納入者動經旬月不為交量往往鑿竇自沉以滅其迹有司治罪鞭配日衆大農嵗計不充令犯人逐月剋糧填納豈可敷足張文定為三司使日云嵗虧六萬斛今比年不啻五十餘萬斛矣而其弊乃在於綱兵也東坡為揚州嘗陳前弊於朝請罷緣路隨船檢稅江淮之弊往往除焉然五十萬之闕未能遽復數年之後可見其效也淮南楚揚泗數州日刑綱吏不啻百人能救其弊此刑自省仁人之言其利溥哉
