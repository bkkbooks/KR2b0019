body:
  text: 續資治通鑑長編卷四百五十三宋李燾撰哲宗元祐五年十二月丙午是月之十六日輔臣面奏乞以湖北之渠陽寨復溪洞之誠州補其舊族楊先僭之子昌達為刺史先奏知續入狀畫一行之劉摯自敘其本末云渠陽舊屬溪猺熙寧元豐間取其地自是蠻酋歲出侵擾元祐三年元祐三年當作二年事在七月辛酉三年十一月辛酉十二月丁酉四年五月辛卯當并此五年十二月丙午考詳議者爭言欲棄其地朝廷重其事故廢誠州為軍餘裁廢有差而侵齧出沒猶不已乃以知荆南唐義問為轉運使專措置之駐於黔陽縣選人余卞前為澧州推官上書請廢其地與蠻以息邊患至是義問辟以為句當官二人意主於棄地朝廷固亦久以是為議但今方其跳梁為患宜先有所痛懲艾然後許之於是發京西將兵并土兵殆萬衆益以黔南兵丁給錢二十萬緡責以討撲自十月後兵數進焚蕩廬屋禾倉等奪其兵械甚多但以溪洞地險有林箐巖穴之阻官軍不可以深入多隔溪水林薄相射其殺傷甚衆而不能得其級故八戰皆勝級才得二百餘朝廷不欲專責以級蓋數級以為功懼其反害平民從來將兵者欲多級者類殺良民老小或運糧人夫斬其首議者所痛歎久矣及義問奏捷奏捷見十一月十八日戊寅亦略足以申威靈其酋曰楊晟秀既逃遁藏于飛山故近日官軍圍其巢今窮迫與其族數十人作狀請命義問連上之朝廷遂欲息民竟其事故議如義問所畫如此其間奏請疑不能無小謾然包之以就大計爾復以渠陽寨為溪洞之誠州且命楊昌達為刺史實録俱不載合用劉摯日記增入要須别加考詳五年七月六日已已始命唐義問為湖北漕措置邊事六年正月二十一日謝麟云云當考二月二十二日楊昌達乃授誠州紹聖元年七月壬戌丙寅九月甲寅當考御批十一月二十八日夜太史局等處奏有客星初出在參宿度參宿屬晉分今河東是也竊恐昨者夏賊打劫麟府路殺害人民虜掠人口孶畜不少朝廷雖體量賑濟亦慮體量不實賑濟未得子細及將來本路糧食别致闕乏三省樞密院與商量合如何施行此亦應天一端也如合施行即以尋常意度行遣上件星變事因更不出行御集六年十二月十六日三省樞密院同進呈今附此丁未龍圖閣直學士朝散郎御史中丞蘇轍加龍圖閣學士戊申吏部侍郎劉奉世權户部尚書户部侍郎李之純為吏部侍郎實録誤以之純為尚書今改之權工部侍郎馬默權户部侍郎權兵部侍郎彭汝礪權禮部侍郎祕書監王汾為兵部侍郎太常少卿李周權工部侍郎六年閏八月十六日出祕書少監王欽臣為祕書監知滄州王子韶為祕書少監左司郎中杜常為太常少卿蘇轍明年正月末論差除奉世等十餘人因具載之明年正月壬午改太僕卿奉議郎楊國寶為祕書郎判登聞鼓院時彥為正字時彥階官當檢或與國寶同校書郎朝補之通判揚州此據劉摯日記增入當考其故初議除目呂大防欲以杜純為侍御史孫升為起居郎劉摯曰純向以無科第及朋事諸韓自南床為中司所劾罷去為相州今如何復除此官兼純兄弟與今中司兄弟不相與恐成紛紛若孫升不知彼文學何如大防曰然以其久於此矣自與公同時在臺當少遷若以文行則誰不為之待更熟論摯度大防欲用純者蓋范純禮所囑用升者自許將之去傅堯俞及純禮之黨數數延譽鄧溫伯兾引補其闕而患升之在言路故先欲動升以待之升前與梁劉輩力論溫伯故朋黨架造如此已而純禮過都堂語摯以王汾不當直為真侍郎彭汝礪嘗為中書舍人反為權攝摯告以王嘗除諫議大夫館閣二三十年矣彭謫籍新復集撰兩月即召來料須有漸也又云杜常粗俗不宜典禮樂王欽臣不樂為大蓬是欲他日除真侍郎爾故先以汾立例也摯謂純禮平日恬默不意其開口如此有所偏繫故也此據摯二十日所記增入御史中丞蘇轍言此亦得之汪應辰轍劄子稱十六日蓋明年正月十六日也今與王子韶并附初除時明年正月七日可考臣聞明君用人必須先辨人材之精粗與官曹之清濁若舉粗才俗吏而置之清華之地則士心不服取笑四方不可不慎也况太常卿者禮樂所寄古者伯夷后夔之職前世桓榮楊綰居其任自二聖臨御亦重其選蓋嘗用鮮于侁趙君錫矣雖其才未及古人然或以博學守正或以孝弟篤行率皆可稱述自是以來用人頗輕然亦未有若杜常人材猥下不學無術而加以邪諂好利頑弊無恥者也臣昔為齊州職官呂升卿等察訪京東辟常自隨常遂注解惠卿手著文字所至州郡公然為官吏講説其意以求恱媚自是遂蒙進用及在都司侮慢士人而畏憚尚書省胥吏以至奉行其意不顧條例遂為言事官所劾此二事者皆臣所親見也若其他暗塞乖謬士大夫以為口實者臣不敢一一仰煩聖聽伏乞聖慈特賜追奪無使匪人竊據傳播四方以謂陛下不惜名器一至於此臣昨與屬官已有文字論列未蒙采納伏乞指揮檢會早賜施行又言臣聞堯舜之治以難任人為先孔子論為邦以逺佞人之不可用大則亂國小則害政是以古之明君去之惟恐不速屏之惟恐不逺今二聖為治方選用忠良斥逺邪佞而王子韶者屢進今遂擢為祕書少監甚可怪也昔熙寧之初臣與子韶同在制置三司條例司是時王安石呂惠卿方欲變亂法度子韶與程皓隂贊其事朝夕諂事王呂惟恐不及及呂公著為御史中丞並薦二人以為屬官公著既言新法不便程皓革面從之而子韶脂韋其間隂助安石既為同列所鄙復為先帝所照御批降黜天下莫不稱快徒以面柔無恥善事權要子弟復以字書小學緣飾鄙陋以僥幸進取當今士大夫凡言佞人子韶為首頃者曽被進擢以此屢為言者所劾而罷昨者命下之日御史岑象求孫升皆言其不可臣復繼以為言矣皆不蒙省録雖由臣等才望不及前人言不見信而朝廷屏黜姦佞前後不曽有異伏乞檢會臣等前奏速賜施行以厭公議轍又言轍劄子稱二十四日當是明年正月今并附初除時據劉摯日記則論子韶衙內鑽乃殿中侍御史岑象求章係十二月二十日降出臣近奏乞罷王子韶祕書少監不蒙施行臣竊謂朝廷用人必不得已將舍短取長要須心迹無邪於事不害然後為可也今子韶資性便僻柔佞無恥奉上媚下衆為指笑依勢行私賊害良善皆有實狀只緣邪諂善事權貴故大臣不察拔擢至此然每有進用必致人言自元祐以來初進被劾出知曹州再進被劾出知滄州及今三進臣與僚屬言之者不一豈言者皆妄而子韶皆寃乎陛下試以此察之則得失可見矣子韶昔為小官專事權要子弟以僥幸恩寵于時士人指目羣佞號之十鑽子韶則衙內鑽也自此漸進為監察裏行王安石初用事遣子韶出按淮浙子韶妻父沈扶間居杭州方謀造宅舍每於本州干借捍行役兵知州祖無擇守法不與子韶挾此私恨誣謗百端遂起大獄然卒無事實無擇緣此得罪至今天下寃之其在臺中中丞呂公著方言安石更法令不便等事子韶每見公著則左右其説及至上前輒稱新法之善先帝深知其詐降詔逐之其略曰外要讜正之名內懷朋姦之實天下聞者莫不稱當自此稍被疏外故其害物之心包藏不見而專以邪佞要結為事前年除太常少卿為諫官劉安世所劾而罷今祕書少監與太常少卿均為清選子韶才行與昔無異執政大半猶是舊人而用舍頓殊理不可曉然臣聞安世所言前後凡十餘上然後見從昔劉向譏漢時曽有用賢則如轉石去佞則如拔山之言後世猶且羞之今大臣獨於子韶遲遲不忍臣恐拔山之誚咎有所歸臣與子韶初無仇怨獨為朝廷惜此過舉惟陛下察之侍御史孫升言伏見左司郎中杜常近除太常少卿士論喧然以謂杜常人材闒冗知識庸下太常號為清列論議皆集羣英如常者豈足以為之長杜常昔從呂升卿之辟是時呂惠卿方為手實法以擾天下獨杜常附會惠卿希求進用箋注手實謂其法五常皆備有識之士至今鄙之杜常在都司與狡吏時忱任永壽相為黨與過于交遊欺罔朝廷違條冒賞紊亂紀綱常為首惡仁聖寬容未加誅責已為優幸豈可遷奉常之清列辱聖朝之名器伏望聖慈詳察特降指揮追寢太常之命别與差遣以允公議貼黃稱近來皆自太常遷諫議侍郎若杜常人材猥下如此茍緣是遷擢豈不辱聖朝之名器也伏望自出聖斷特行追寢又言竊以名器之重為天下之砥礪君子之進作邦家之光輝茍輕名器以假人不獨不足以礪世且所進非人則為邦家之汙也杜常人品猥下中外莫不鄙之若遂進擢清列躋升侍從臣恐非二聖貴重名器光輝朝廷之意也伏望聖慈詳察檢會臣前奏早賜指揮貼黃杜常在都司日與狡吏時忱任永壽相為表裏欺罔朝廷違條冒賞紊亂紀綱臣與賈易論列杜常罪惡甚詳二聖必能記省今日若容常貪竊名器玷汙近班豈不為聖政之纍也賈易論杜常在都司時奏章當檢附殿中侍御史岑象求言近歲南省考試分卷取人又五路别立額奏名頗濫詔禮部詳定以聞又言近歲太學諸生無叩問師資之益學官不以訓導為已任祕書省則多務燕間少親讎校請立訓導之法定校讎之課及聞太學補試伺察不嚴有假手之弊詔令禮部祕書省長二詳度以聞户部言抵當財産限十日差官躬親檢視內産業須驗契估定不得過契錢並親見本家尊長義居者見應有分人各令供狀若義居願同供抵當者仍供非尊長抑勒如不願者令供不侵已分財産限二十日畢並置簿拘管若有折欠出賣不敷如本主并保人填納不足者勒元檢估吏人牙人均補如有情弊而檢官知情者準此供抵當若同財之人不願及年二十以下者聽準分法除出已分財産其因抵當人即蒙昧尊長或將同分不願人材産及妄指他人財産充抵當者徒二年未得者杖一百官司知情與同罪若擅將非已分財産充抵當及借請官錢如檢估官吏不令有分人知委并官司不候檢估便行支借若有少欠於犯人處追理不足者勒檢估支借吏人均補其檢估支借官及干繫人有情弊者準此從之新本削去戊申十二月十八日太學博士葉濤校勘黃本書籍劉摯敘其事云濤從王安石學與韓琦有瓜葛向緣太學獄坐罪既訴理復為博士近頗造議論以朝政為不快思欲反復王氏學及熙豐政事氣豪節強其朋恃之與鄧溫伯彭汝礪龔原孫朴之徒為黨然元祐以來摯在言路及主政府論安石政事有所更者固不一而未嘗詆其學雖有穿鑿而闡先儒之説亦多天下公議不可誣也但晚年過在溺于釋老字説爾蓋學者隨流泛濫至於今日之弊而言者多毁安石豈安石之學本然哉可盡廢耶如濤輩亦頗知摯此意故皆歸心焉摯與彭龔孫尤相善者左丞蘇頌有子嘉亦為博士其學舊學與諸子異性行謹粹摯亦與之善頗為濤所凌轢嘉不堪日以濤輩誹憤語態白其父頌頌以白呂大防積久大防鋭欲出之于外摯謂大防曰意異造言之人潛心積慮有深可憂者若朝廷能以大公包含平其意泯然此大善也茍不能固當分明辨之但濤之出略須有名則服矣此十一月間事也其月戊寅十一月十八日早集議大防落筆以濤為某州簽判蓋頌坐與大防接又密促之故也衆不語摯曰似乎無名頌曰記得有薦之者摯曰若有薦者則坐薦章傅堯俞曰是彭汝礪舉自代摯曰舉自代自來何曽使大防曰舉除目內除此一節堯俞曰亦恐立此蹤迹别議甚好晚摯再謂大防曰濤事更加子細但得有名出之無害示朝廷以公平無他意也大防喜笑曰事須分明若見得邪正意在害政當須别白與他行之若做不得即去詞色甚厲摯曰若堅持此意甚善天下之幸也前此一議大防曰濤輩持異學以教導恐惑學者不可不出又持具貟搯以示摯者二人濤與王渙之也今早議不及渙之大防並無此謀由頌用其子之説然人多知之矣大防又曰龔原亦欲求外任摯曰聞之然止以私計為言不知可從否恐且宜留之大防曰是他要去何用留之然此人雖學於安石却純篤實好學之人非濤輩也及是再議十二月十八日頌初用其子嘉之語咻于大防鋭欲出之摯纍論出濤須有名故遲其事摯因言京中與易一處除是主簿奈無闕何姑曰唯有校對黃本可也不意衆以為然遂優於博士矣乃知進退休戚人自有命或者欲以此夸耀寒熱人者不亦謬哉可戒可歎辛亥吏部言請黃河地分當職官係礙季限交割去處有在假月日於季限內補不足聽於後任補填從之新本削去壬子御史中丞蘇轍言此奏得之汪應辰轍集今無此奏臣伏覩二聖臨御天下清心正已未嘗以一毫之私干撓國家髙氏向氏子孫凡幾百人其間得預美任者蓋無一二惟聖心非不愛親戚以祖宗社稷之故退託不敢是以天下協應災害屏息皆此之故也然臣竊見本朝勢家莫如韓氏之盛子弟姻婭布滿中外朝之要官多其親黨者昔韓維為門下侍郎專欲進用諸子及其姻家陛下覺其專恣即加斥逐其後宰相范純仁秉政亦專附益韓氏由此阿私之聲達於聖聽今純仁罷去未幾而傅堯俞任中書侍郎堯俞與韓縝通昏而素與純仁親厚遂擢其弟純禮自外任權刑部侍郎曽未數月復擢補給事中純禮門蔭得官初無學術因緣僥幸致身侍從與堯俞隂為表裏惟務成就諸韓近日韓宗道自權户部侍郎遷試刑部於法經年乃得待制宗道之遷曽未三月適遇青州闕守特遷待制出守青州人言沸騰徐乃依舊其他韓氏親戚度越衆人與優便差遣者蓋未易一二數也是以外議紛然復言謝景溫杜純杜紘皆韓氏姻家堯俞純禮竊相擬議欲相繼進此三人臣忝執法陛下耳目所寄只可先事獻言若候其事已成徐加議論則無及矣臣今謹開陳三人所為具在貼黃伏乞陛下記録臣言徐察堯俞等所用若果如臣言欲乞只作聖意却之實為穩便臣受恩深厚不敢自外冒死以聞貼黃稱謝景溫在熙寧初諂事王安石任御史知雜為安石排擊正人為清議所鄙及元祐初韓維執政擢知開封府維舊知開封分兩廂治事景溫意欲諂維復乞分四廂無益有害近已為朝廷所廢景溫先知瀛州信事一女巫及為京尹與之往來事之益謹至以其子弟為府中小史出入用事一府側目黨庇私匿政事殆廢為言者所劾即時被黜及范純仁用事又百計欲引景溫為刑部尚書亦為言者所劾而止又貼黃稱杜純杜紘二人皆無出身粗俗之人耳方韓維用事欲改先朝斷案舊例並從深坐刑部大理法官及一時議者皆以為不可惟純與紘素諂事維盡力贊之維善其附已故純以蔭補得為侍御史朝廷察其姦妄尋即罷去舊法曽任侍御史非責降者每遇大禮許蔭補內中散大夫以上依見任人朝議大夫依本官及紘詳定元祐敕為純曽任侍御史而官止朝奉郎即改舊法於朝議大夫下添以下二字意欲使純由此得奏薦子弟去年明堂純即坐新條乞奏其子是時臣權吏部尚書親見其姦即中尚書省改正舊法按純紘皆法官進用不為不知條貫至於添改敕文以濟其私其為欺罔未見其比侍御史孫升言臣竊以給事中居瑣闥之地掌封駁之司朝廷命令賞罰之失給事乃能救之於未下臺諫止可言之于已行則是給事之職比臺諫為重前世顯名莫非儒士官制以來皆用辭科蓋非通知古今博習儒學者難任兹職伏見給事中范純禮本由蔭補不學無術外示恬靜內懷進取向任太常少卿朝廷因御史趙㞦論列純禮不學無科名而罷純禮任淮南發運使託疾堅請宫觀既除卿列旋升侍從曽不固辭自居瑣闥無所建明近日中外但聞封駁祕書省以著作張耒為病乞權免朝參純禮以為附下罔上搢紳傳以為笑以其不學無術故至如此况給事中范祖禹見以實録不預給事之職乃獨令不學無術之人當之恐非所以尊朝廷也純禮向以無科名不可為太常今豈可以為給事乎伏望聖慈詳察别除純禮職任以協公議貼黃稱給事中范祖禹久不預給事之職而范純禮不學無術獨當其任封駁之司寂然無聞殆名存而實亡也按劉摯日記十二月十八日內降孫升言范純禮不可任給事中則此奏當係之十二月十八日今附蘇轍云云下又摯十二月二十七日記純禮知有劾章欲投劾摯勸勿遽明年正月二十六日乃改刑侍甲寅鄜延路副都總管呂真為馬軍都虞候權管勾步軍司秦鳯路副都總管劉斌為步軍都虞候髙陽關路副都總管熙河蘭岷路副總管王文郁為沂州團練使捧日天武四廂都指揮使仍升副都總管知涇州張守約為昌州刺史龍神衛四廂都指揮使鄜延路副都總管十月十三日蘇轍云云是日二十四日詔以向宗良知邢州初密院擬差髙士敦士敦益路鈐轄罷合入此差遣告命已至進邸纍日而宗良二十二日入表陳乞此州昨日降出今進呈太皇太后諭曰依宗良所乞即奏曰已差人多日又諭曰差下甚人奏以實諭曰為太后曽言且與宗良復表曰自來已差人無陳乞衝替之例欲與宗良别選一州與邢相若者諭曰涇只與宗良却别尋一差與士敦兼士敦不須忙也退依宣諭以士敦知涇州聖意深逺刻已避嫌多類此宗良孱騃不足當此任宰執所以屢執不與者恐其害民也成就上德姑遂其請爾此據劉摯日記增入已而御史中丞蘇轍奏論不報轍又言臣近奏論朝廷先除髙士敦知邢州向宗良繼有陳乞朝廷為罷士敦而以邢州授之二人皆外戚之家而奪一與一於體不順乞賜追寢經今多日不見施行臣非不知宗良地勢親近屢以為言非臣私便然臣聞君子愛人以德小人愛人以姑息今宗良託身戚里不患不富貴不患無差遣所患者不知禮義亷恥直情恣行日蹈尤悔而不知耳今若許令爭取士敦已授之命不復辭免習此驕橫恬不知畏則恐宗良滿盈速咎其亡無日朝廷雖欲庇之而不可得臣為執法而不能禁之以漸豈愛人以德之謂乎今太皇太后雖欲深抑本宗其於處已則為盛德然以此御下似非愛人以德之義也今外人皆言隆祐之於崇慶盡孝盡敬朝夕無違宗良所請蓋不知耳若其知之必將不許臣是以冒昧獻言上欲以全兩宫慈孝之盛下欲以成向氏廉退之美伏乞檢會前奏早賜施行昔虞芮爭田質之于周入境而遂以其所爭為間田而去今若邢州之命兩皆不與其於國體極為穩便蓋風憲之官事有得失不擇親踈知而不言則為失職言之不避實召仇怨均之二者寧臣自負不敢負國惟陛下察之幸甚轍劄子稱十八日蓋六年正月十八日也實録向宗良髙士敦知邢州不見除命月日據劉摯日記乃十二月二十四日今并以轍明年正月十八日所言附此乙卯夏國遣使賀正旦刑部言應天下郡縣水陸驛路所經並行禁謁知州通判縣令劒門關都監非假日不得出謁即謁本州見任官及職事相干若親屬并泛遣使命或知州鈐轄以上者聽發運監司在本州縣者凖此從之樞密院言知瀘州張克明奏請應瀘州新投降招附生界夷人今後如與漢人相犯並乞依漢法施行若是同類相犯乞比附黔州見行蠻人條制以五刑立定錢數量減數目斷罰入官應笞罪三貫杖罪五貫徒罪十貫流罪二十貫死罪三十貫如無見錢送納即乞以器甲或畜産并土産物竹木之類估價折納入官從之丙辰遼國遣使興復軍莭度使耶律慶先利州觀察使蕭忠孝副使朝議大夫守太常少卿充乾文閣待制趙圭延東上閣門使海州防禦使韓寀來賀正旦樞密院言楚軍大閲請以匹帛銀楪支賜罷轉資從之丁巳户部言諸軍管當請受曹司軍人剩貟詐欺或妄作名目減刻官物及請給入已者依主首自盜法杖罪配鄰州徒流罪配五百里追贓不免罪至死者奏裁若捕人能獲犯人者依驅磨點檢告發隱落失陷官錢法給賞係私物者減半詐欺未得減二等皆降配本轄人故縱與同罪至死者減一等經歷吏人點檢敗獲者得與未得各依告捕人賞三分給一纍給滿二百緡者仍轉一資從之新本削去户部言司封禮部主膳兵職駕庫司門屯田虞部吏祿錢依在京文武官料錢分數其職級互相兼領者從一多給從之新本削去詔刑部點檢大理寺差失每件以三省點檢得一件比較施行王巖叟墓志云有旨刑部點檢大理寺差失王巖叟言刑部之于大理非若户部之于將作也大理乃刑部之助爾今若行點檢之法刑部利賞大理畏罰利則不免過求畏則必多撓曲以此議法未見停平宜且從舊制御史中丞蘇轍言臣竊見大理寺審刑院舊制文臣吏民斷罪公案並歸中書武臣軍貟人並歸密院而中書密院又各分房逐房斷列輕重各不相知所斷既下中外但知奉行無敢擬議及元豐五年先帝改定官制知此情弊遂指揮凡斷獄公案並自大理寺刑部申尚書省上中書取旨自是斷獄輕重比例始得歸一天下稱明自元豐七年十月四日奉聖旨應緣保甲事元係樞密院指揮取勘及保甲司乞特斷公案令大理寺定斷刑部勘當申院元祐四年六月十八日又奉聖旨禁軍公案內流罪以下情法不相當而無例擬斷合降特旨者令刑部申樞密院取旨今年七月七日又奉聖旨應係樞密院取旨下所屬體量根究取勘者候奏案到令樞密院取旨十月四日又奉聖旨應官貟犯罪公案事干邊防軍政令刑部定斷申密院取旨二十九日又奉聖旨應官貟犯罪公案事干邊防軍政文臣令刑部定斷申尚書省武臣申樞密院臣竊詳前件五項條貫不唯斷獄不歸一處其間必有罪同斷異令四方疑惑失先帝元豐五年改法本意兼事干邊防軍政文臣歸尚書省則雖樞密院本職必有所不知武臣歸樞密院則自節度使充經略安撫有所廢黜雖三省亦有不自知者事之不便莫大於此臣今欲乞依先帝改法之舊應斷罪公案並歸三省其事干邊防軍政者令樞密院同進呈取旨而已如此則斷獄輕重事體歸一而兵政大臣各得其職方得穩便轍此奏當是十一月或十二月今附十二月末六年二月十日己亥乃從轍奏十四日上官均罷御史論傅堯俞與韓忠彥爭辨轍奏或此也不知其時今附十二月末其從違并當考十一月五日轍已論此轍又言臣竊見有司近以在京酒户虧失元額改定宗室外戚之家賣酒禁約大率從重謹按嘉祐舊法親事官等賣酒四瓶以上並從違制斷遣刺配五百里外本城其餘以次定罪皇親臨時取旨許人告捉兩瓶以上賞錢十貫止及熙寧法每賣一瓶杖八十一斗加一等罪止杖一百許人告捕一斗賞錢十貫至百貫止及元祐四年所定刑賞與熙寧同而有告無捕及今年十一月六日十二月十八日敕刑從嘉祐而賞從熙寧既兼用兩重及並行告捕仍許入沽販之家而取旨之法兼及本位尊長是以此法一行人情驚擾臣竊惟有司所以立此法者止為酒户虧額而已酒户虧額但户部財利一事耳今既取前後重法施於沽販小人足矣臣訪聞宗室之間頗有疏逺外任之人以窘乏之故或賣酒自給今既許人入其家捕捉小人無知以捕酒為名恣行凌辱無所不至兼逐位尊長爵齒並崇多連宗字而卑幼犯酒不免取旨若取旨不行雖取何益若遂有行遣竊恐聖意未必欲如此故臣愚見以為當去尊長取旨之法仍不許捕捉之人入皇親宅院如此施行頗為酌中伏乞特降指揮速行改定貼黃臣所言事干宗室欲乞聖意裁定如可施行更不出臣此章只作聖旨批降三省從違當可削去是歲宗室子賜名授官四十四人斷大辟四千二百六十一人
