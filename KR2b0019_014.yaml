body:
  text: 續資治通鑑長編卷十宋李燾撰太祖開寶二年春正月甲申畋近郊賜從臣名馬器幣己丑幸飛龍院賜天雄節度使符彥卿等十二人名馬令自擇取之先是彥卿及天平節度使石守信歸德節度使髙懷德鎮寧節度使張令鐸忠正節度使王審琦靈武節度使馮繼業皆以郊禋來朝留京師未還鎮也繼業初見廣順二年戊戌以龍捷軍使石萬德為右千牛衛將軍致仕萬德殿前指揮使都虞候漢卿之父也漢卿方有寵故萬德并授顯秩己亥以錢惟濬為鎮海鎮東節度使惟濬奉其父命來助祭將還特詔增秩上待惟濬特異嘗召宴苑中令黃門奏簫韶樂與諸王同席而坐賜白玉帶綴珠衣水晶鞍勒御馬賜賚巨萬計辭日又賜襲衣玉帶金鞍勒馬壬寅遣殿中侍御史洛陽李瑩等十八人分往諸州調發軍儲赴太原丙午又遣使四十九人發諸道兵屯於潞晉磁等州唐樞密使左僕射平章事湯悅罷為鎮海節度使悅不樂居藩上章求解於是改授太子太傅監修國史仍領鎮海節度使悅初罷政授鎮海節度其年月不可知按李後主集載悅所為北苑侍宴賦詩序乃乙巳嵗開寶二年二月也其銜位稱新授太子太傅必二月初正月末矣故附見于此悅傳云旋拜司空復秉政按後主集三年秋送鄧王牧宣城悅猶以太子太傅監修國史作詩序𫝊云旋拜司空太速今不取客省使盧懷忠使江南還中途遇疾肩輿歸京師上遣太醫診視和艾以賜懷忠諭㫖曰我嘗灸得力汝當勉之及卒上甚悼焉二月己酉遣中使護其喪事庚戍符彥卿辭還鎮乙卯命宣徽南院使曹彬侍衛步軍都指揮使黨進等各領兵先赴太原戊午詔親征己未以皇弟開封尹光義為東京留守樞密副使沈義倫為大內部署昭義節度使李繼勳為河東行營前軍都部署建雄節度使趙贊為馬步軍都虞候先赴太原彰國節度使侍衛馬軍都虞候張廷翰寢疾車駕親臨問之癸亥廷翰卒上甚悼惜贈侍中甲子車駕發京師丙寅次滑州丁卯次王橋頓彰德節度使韓重贇來朝上謂之曰契丹知我是行必率衆來援彼意真定無備將由此路入卿可為朕領兵倍道兼行出其不意破之乃以重贇為北面都部署義武節度使洛陽祁廷義按宋史作彰義軍節度使郭延義副之權知貢舉趙逄奏進士安德等合格者七人此據㑹要及登科記其日丁卯是春車駕親征不知何緣不停貢舉趙逄尋亦為隨軍轉運使豈即於行在所取士乎當考己巳次相州庚午次磁州乙亥次潞州以霖雨駐蹕時諸州饋餉畢集城中車乘塞路上聞之以為非理稽留將罪轉運使宰相趙普曰六師方至而轉運使獲罪敵人聞之必謂儲偫不充非所以威逺之道但當擇治劇者蒞此州耳丙子命戶部員外郎知制誥王祜權知潞州祜即發遣車乘行路無阻以樞密直學士趙逄為隨駕轉運使仍鑄印賜之北漢侍衛都虞候劉繼業馮進琦屯於團柏谷遣牙隊指揮使陳廷山領數百騎來偵邏㑹李繼勳等前軍至廷山即以所部降繼業進琦知衆寡不敵亦領兵奔還晉陽北漢主怒罷其兵柄繼勳等遂圍城時契丹使內侍韓知璠案遼史作韓知範册命北漢主為帝北漢主夜開北門以納之明日置宴羣臣皆預宰相郭無為哭於庭中拔佩刀自刺北漢主遽降階持其手引之升坐無為曰奈何以孤城抗百萬之師乎蓋無為欲以此搖衆心也國史本紀及陳廷山傳皆言廷山以佐聖指揮使領所部來降事迹殊不詳盡今參取九國志修纂然劉繼業傳乃云廷山遇太祖被擒按本紀廷山來降繫於三月戊寅之後甲申之前時車駕尚留潞州也今不取九國志又云王師正月圍城恐亦太早隱度之當在二月十國紀年亦在二月三月戊寅朔宴從臣庚辰以刑部員外郎滕白知河東諸州轉運事壬午潁州團練使曹翰為河東行營都壕寨使王令嵒副之令巖未見乙酉分命近臣祈晴於在城寺廟辛卯祕書丞知河東轉運事劉儀坐饋餉稽期免所居官儀未見先是有詔沿邉和市軍儲既而慮其擾民亟遣中使李神祐馳驛止之時詔已下五日神祐一夕而反神祐開封人也上駐蹕潞州凡十有八日獲北漢諜者問之對曰城中民罹毒久矣日夜望車駕惟恨其遲耳上笑給衣服縱之壬辰發潞州乙未次南關李繼勳言敗北漢兵於城下斬首千餘級獲馬六百匹戊戌次太原庚子觀兵於城南始命築長連城辛丑幸汾河作新橋以兵部員外郎知制誥盧多遜知太原行府事壬寅遣使發太原諸縣民數萬赴城下癸卯北漢憲州判官史昭文以州城來降即命昭文為刺史仍賜襲衣玉帶鞍勒馬乙巳幸城東南始命築長堤壅汾水先是有欲增兵攻城者左神武統軍陳承昭進曰陛下自有數千萬兵在左右胡不用之上未寤承昭以馬䇿指汾水上大笑因使承昭董其役築堤壅汾水本紀在己亥日今從實録及十國紀年丙午决晉祠水灌城丁未命李建勳軍於城南趙贊軍於西曹彬軍於北黨進軍於東為四寨以逼之北漢人乘晦突門潛犯西寨趙贊率衆與戰弩矢貫贊足北漢人未退時黨進遣東寨都監李謙溥伐木西山以給軍用謙溥聞鼓聲即引所部兵赴之北漢人乃退上遽至戰所怪赴援者非精甲問之則謙溥也甚悅劉繼業復以突騎數百犯東寨黨進挺身逐繼業麾下數人隨之繼業走匿壕中北漢兵出援之繼業緣縋入城獲免唐右僕射判省事遊簡言躬親簿領督責稽緩僚吏畏之然暗於大體不為士大夫所重人有請託者必故違戾不復顧其是否數以疾辭位唐主不許是月命簡言兼門下侍郎平章事夏四月戊申朔幸城東觀築堤辛亥遣海州刺史孫萬進萬進未見領軍數千人圍汾州以判四方館事任城翟守素監其軍壬子復幸城東賜羣臣及諸軍時服宴從臣初棣州防禦使何繼筠為石嶺關部署屯於陽曲上聞契丹分道來援北漢其一自石嶺關入乃驛召繼筠詣行在所授以方略并給精騎數千使往拒之且謂繼筠曰翌日亭午俟卿捷奏至也時已盛暑上命大官設麻漿粉賜繼筠食訖辭去戰于陽曲縣北大敗契丹擒其武州刺史王彥符斬首千餘級獲生口百餘人馬七百餘匹鎧甲甚衆己未繼筠遣子承睿來獻捷承睿未至上登北臺以俟見一騎自北來逆問之果承睿也北漢隂恃契丹城久不下上乃以所獻鎧甲首級示之城中人奪氣繼筠獻捷本紀在壬子今從實録孔守正傳云上征太原守正𨽻前鋒何繼筠麾下㑹契丹南大王沙相公來援守正接戰於石嶺關契丹敗追奔過關北斬首萬餘級獲僞排陳使王破得太祖壯之召令從駕按守正從繼筠破敵當是此役也其斬獲數皆不同疑必有一誤今但從繼筠本傳繼筠本傳又云生擒契丹刺史二人據實録止彥符一人今從實録壬戌幸汾河觀造船戊辰幸城西賜從臣飲乙亥鎮國節度使羅彥瓌卒上方親履行陳故不廢朝亦闕贈典焉丙子復幸城西北漢麟州刺史結齊羅兵馬都監嘉且舍鄂以城來降五月戊寅命結齊羅為汾州團練使嘉且舍鄂為石州刺史契丹兵果分道由定州來援韓重贇陳于嘉山以待之契丹見旗幟大駭欲遁去重贇急擊之大破其衆獲馬數百匹癸未使來告捷上大喜手詔褒之李漢超傳云太祖親征太原漢超為北靣行營都監其子守恩從在軍中㑹契丹遣兵來援衆至定州西嘉山將入土門守恩領牙兵數千與戰敗之斬首三千級獲戰馬器甲甚衆擒首領二十七人隨漢超見于行在賜戎馬金帶器幣緡錢太祖曰此子尚幼明日將帥才也按嘉山之捷韓重贇實為主帥祁廷義副之不著漢超名且守恩事微今不復别出矣甲申幸城北引汾水入新堤灌其城戊子幸城東南命水軍乘小舟載彊弩進攻其城內外馬步軍都軍頭橫州團練使王廷乂親鼓之免胄先登流矢中其腦而顚庚寅廷乂卒辛卯殿前指揮使都虞候袁州刺史石漢卿亦中流矢溺死癸巳贈廷乂建武節度使漢卿袁州防禦使漢卿父萬德落致仕為伴食都指揮使領端州刺史漢卿性桀黠善中人主意多言外事恃恩橫恣中外無敢言者聞其死無不稱快其後上亦盡知漢卿諸不法事復令萬德致仕以前蜀州刺史聶章為沁州兵馬部署宫苑使聊城梁逈監其軍聶章事當在庚寅今移入癸巳之後章未見丁酉幸城西命諸軍攻其西門遣偏師圍嵐州趙文度危蹙請降戊戌來見賜襲衣玉帶金鞍勒馬器幣州官皆賜物文度即引也避宣祖諱更賜今名文度母時在晉陽君子罪其不能死節己亥以右千牛衛將軍周承瑨為嵐州團練使庚子宴趙文度於行宫及還自太原授文度重國節度使辛丑以潘州團練使周廣為攻城樓櫓戰棹都部署廣未見癸卯以權知府州折御勳為永安留後時御勳與建寧留後楊重勳皆不俟詔來詣行在上善其意故有是命仍並加厚賜遣還是月上以暑氣方盛深念縲縶之苦乃詔西京諸州令長吏督掌獄掾五日一檢視灑掃獄戶洗滌杻械貧困不能自存者給飲食病者給藥輕繫小罪即時决遣無得淹滯自是每嵗仲夏必申明是詔以戒官吏焉此詔以戊子日降今移見于後太原圍急郭無為謀出奔因請自將兵夜擊王師北漢主信之選精甲千人命劉繼業郭守斌為之副北漢主登延夏門自送之且伺其反是夕初甚晴霽已而風雨晦冥無為行至北橋因駐馬召諸將而劉繼業以馬傷足先收所部兵入城矣守斌迷失道呼之不獲無為不能獨前乃與麾下數十人亦還閏五月戊申水自延夏門甕城入穿外城兩重注城中城中大驚擾上幸長堤觀焉水口漸濶北漢人緣城設障為王師所射障不得施俄有積草自城中飄出直抵水口而止王師弩矢不能徹北漢人因得施功水口遂塞郭無為復勸北漢主出降北漢主不聽閹人衛德貴極言無為反狀明白不可赦北漢主殺之以狥城中稍定北漢人俄自西長連城潛出將焚我攻戰之具我師擊走之斬首萬餘級夜半忽傳呼壁外云北漢主降上令衛士擐甲開壁門八作使趙璲曰受降如受敵詎可夜半輕諾乎上使伺之果諜者詐為也已酉幸城南命水軍乘輕舟焚其門右僕射魏仁浦卒仁浦嘗侍春宴上笑謂仁浦曰何不勸我一杯仁浦因前上夀上密諭曰朕欲親征太原如何仁浦曰欲速則不達惟陛下審思上嘉其對宴罷就第賜上尊酒十石御膳羊百口既而從行中途遇疾還卒於梁侯驛贈侍中諡曰宣懿太原城久不下東西班都指揮使范陽李懷忠率衆攻之戰不利中流矢幾死殿前指揮使都虞候趙廷翰率諸班衛士叩頭願先登急擊以盡死力上曰汝曹皆我所訓練無不一當百所以備肘腋同休戚也我寧不得太原豈忍驅汝曹冒鋒刃蹈必死之地乎衆皆感泣冉拜呼萬嵗時大軍頓甘草地中㑹暑雨多破腹病而契丹亦復遣兵來援壬子太常博士李光贊光贊未見上言曰陛下應天順人體元御極戰無不勝謀無不臧四方恃險之邦僭竊帝王之號者昔與中國為鄰今與陛下為臣矣蕞爾晉陽豈須親討重勞飛挽取怨黔黎得之未足為多失之未足為辱國家貴靜天道惡盈所慮向來恃險之邦聞是役也竭府庫之財盡生民之力中心踴躍各有窺覦傳曰鄰之厚君之薄也豈若回鑾復都屯兵上黨使夏取其麥秋取其禾既寬力役之征便是蕩平之策惟陛下裁之况時屬炎蒸候當暑雨儻或河津泛溢道路阻難輦運稽遲恐勞宸慮上覽奏甚喜復以問宰相趙普普亦以為然因使普召光贊慰撫之癸丑移幸城東罕山之南始議班師也己未徙太原民萬餘家於山東河南給粟庚申分命使者十七人發禁軍護送之因屯於鎮潞等州用絳人薛化光之䇿也化光言凡伐木先去枝葉後取根柢今河東外有契丹之助內有人户賦輸竊恐嵗月間未能下宜於太原北石嶺山及河北西界山東靜陽村樂平鎮黃澤關百井社各建城寨扼契丹援兵起其部內人户於西京襄鄧唐汝州給間田使自耕種絶其供饋如此不數年間自可平定上嘉納之此據范鎮東齊記事按歐陽修志薛奎墓云父化光以䇿干太宗不見用修蓋誤也太平興國四年平太原得戶三萬五千二百二十兵三萬先是陳洪進以漳泉二州降得户十五萬一千九百七十八兵一萬八千七百二十七繼元所統凡十一州軍得户才及漳泉五之一蓋化光之策行其耕民多南徙所存無幾且兵數與民數略同殆以一户奉一兵也欲國不亡得乎本紀止稱山東今從十國紀年并書河南壬戌車駕發太原我師陷敵者數百人上遣驍雄副指揮使浚儀孔守正領騎軍往救守正奮擊盡奪以還北漢主籍我所棄軍儲得粟三十萬茶絹各數萬喪敗罄竭賴此少濟此據十國紀年戊辰次鎮州初真定蘇澄頗養生為道士居隆興觀唐晉間數被召皆辭疾不赴契丹主凡欲自立時求僧道之有名稱者加以爵命惟澄不受於是上召見之謂曰朕作建隆觀思得有道之士居之師豈有意乎對曰京師浩穰非所安也上亦不强壬申幸其所居謂曰師年踰八十而容貌甚少盍以養生之術教朕對曰臣養生不過精思鍊氣耳帝王養生則異於是老子曰我無為而民自化我無欲而民自正無為無欲凝神太和昔黃帝唐堯享國永年用此道也上悅厚賜之樞密使李崇矩被病上亟遣太醫診視且命乘凉車先還崇矩叩頭言凉車乃至尊所御是速臣死也固辭許之是月唐右僕射兼門下侍郎平章事遊簡言卒六月己卯上發鎮州以儀鸞使知易州賀惟忠為易州刺史兼易定祁等州巡檢使惟忠捍邉數有功故遷其秩而不易其任惟忠未見庚辰詔車駕所過民無出今年秋租壬午次邢州癸未以右補闕大名王明為荆湖轉運使將用兵於嶺南也丙戍次相州漳水泛溢壞浮橋命士卒亟治之橋成上步以濟既濟復壞詔諸軍亂流而過己丑次滑州唐主遣其弟吉王從謙來貢辛卯見于胙城縣唐水部員外郎查元方掌從謙箋奏上命知制誥盧多遜燕從謙于館多遜奕棋次謂元方曰江南竟如何元方斂祍對曰江南事大朝十餘年極盡君臣之禮不知其他多遜愧謝曰孰謂江南無人元方文徽子也文徽初見天福八年此據十國紀年乃六月事癸巳車駕至自太原曲赦京城繫囚遣使分往京西諸州賜太原所徙民帛人一匹又命控鶴都虞候京兆崔翰差擇其勇悍習武藝者籍為禁軍樞密副使沈義倫丁憂起視事是月北漢主斬樞密副使假煦及馬軍都虞候馮超於壞水口坐水入不救也决城下水注之臺駘澤水已落而城多摧圯契丹使者韓知璠猶在太原歎曰王師之引水浸城也知其一而不知其二若知先浸而後涸則并人無噍類矣時契丹遣其將南大王來援屯於太原城下劉繼業言於北漢主曰契丹貪利棄信他日必破吾國今救兵驕而無備願襲取之獲馬數萬因籍河東之地以歸中國使晉人免於塗炭陛下長享貴寵不亦可乎北漢主不從南大王數日北還贈遺甚厚卭部川蠻都鬼主阿伏與山後兩林蠻王子勿兒遣人以狀白黎州期十月入貢成都府奏其狀詔許之續錦里耆舊傳云乾德三年夏黎州遞到雲南牒稱大理國建昌城演習爽賀平蜀之意又開寶元年二月黎州遞到南詔建昌城牒云欲通好厥後寂無文字但遣近界卭部兩林川王子時有進奉卭部兩林川者即古之嶲姚州也卭部川去黎州大渡河界七程兩林川十四程建昌城二十四程雲南數十程今國史有黎州山後兩林蠻及黎州卭部川蠻傳無雲南大理國傳按續耆舊傳則山後兩林蠻及卭部川皆雲南之部落耳又按國史實録㑹要雍熙二年十月卭部川蠻都鬼主諾驅并其母熱免遣王子阿有等來貢詔以諾驅為懷化將軍端拱二年九月又遣王子少蓋等來貢淳化元年二月諾驅自部馬至黎州境上求市二年七月又遣其子牟昻叔離襪來貢詔以諾驅為懷化大將軍蓋國史實録㑹要並以諾驅為卭部川蠻都鬼主非雲南大理國主明甚與續耆舊傳所云差合然辛怡顯著雲南至道録載其國山川風俗及淳化末朝廷所賜諾驅詔甚具詔云敕雲南大理國主統轄大渡河南姚嶲州界山前山後百蠻三十六鬼主兼懷化大將軍忠順王諾驅可特授檢校太保歸德大將軍依舊忠順王怡顯兩至雲南親見詔書其所録必不妄則諾驅者實雲南大理國主而非卭部川蠻都鬼主也不知國史實録㑹要何故但稱卭部川蠻而不稱雲南大理國怡顯乂云諾驅謝恩表用元和册南詔印考之前史大中末南詔酋龍立始自稱帝國號大理乾符末酋龍子法又改號鶴拓亦號大封人而諾驅猶用元和册南詔印不知何也後唐時又改號長和今若即以諾驅為大理國主則不當附卭部川蠻傳國史實録㑹要恐誤矣然諾驅數通中國史官那得至如此誤或諾驅固嘗以卭部川自號史官遂承用之不然諾驅貢奉但付卭部川蠻遣入中國史官見貢奉者乃卭部川蠻而不知諾驅實遣之耶且諾驅之子若弟固嘗親至京師傳又言諾驅自部馬至境上其遣入中國者必雲南大理國人不但卭部川蠻也卭部川者雲南部落耳諾驅亦安肯舍其本國之號而以部落自名乎怡顯乂云諾驅住苴咩城苴咩城雲南國都也自嘉州羊山江路至苴咩城凡四十九程其至黎州境上逺近可度也諾驅既為國主亦安肯越數千里自部馬來求市乎國史實録㑹要所稱又恐未得其實此皆不可臆斷今姑從國史須更詳考之又據國史建昌城距嶲州二程者儉浪驛也獨無所謂建昌城者不知果何地也又據國史實録兩林蠻距黎州七程又一程至嶲州又二程至建昌城建昌城山上又有風琶蠻不知大理國欲通好何乃用建昌城牒也辛怡顯云儉浪驛又一程至羌浪驛此即雲南界有牌題曰㑹州都督界豈建昌城者即雲南境上亦如中國之雄州信往來必先道此乎未可知也又按國史自黎州東南行一程至卭部川自黎州南行七日至兩林川疑使南詔者必先由卭部川後兩林川而南詔欲貢奉於中國者亦當先由兩林川乃逹卭部川也而所載兩川道里又與續耆舊傳所云不合此亦不可臆斷必須詳考乃决耳秋七月丁巳幸封禪寺甲子大宴廣政殿賜近臣襲衣金帶丙寅以天雄節度使符彥卿為鳯翔節度使彥卿鎮大名十餘年委政於牙校劉思遇思遇貪而黠招權黷貨軍府久不治於是始議擇官代之戊辰西南夷順化王武才等一百四十二人來貢以武才為歸德將軍詔自今祀天地用太牢餘當用牛者代以羊豕癸酉幸新水磑汴水决宋州夏邑縣是月命鎮深趙邢洺五州各城其管內縣鎮軍寨八月己卯詔開封河南府自今奴婢非理致死者即時檢視聽速自收疾病者不用檢視吏輒以擾人者罪之又詔如聞兩京士庶之家婚姻喪葬臺吏府率伶人多詣門遮道徼求財物自今禁止之違者重置其罪靈武節度使馮繼業既殺兄代父領鎮頗驕恣時出兵略奪羌夷羊馬戎人不附又撫士卒少恩部下多擕二繼業亦慮其為變上在潛日與繼業有舊及即位繼業數來朝覲貢獻因請舉族內徙庚辰以繼業為靜難節度使以棣州防禦使何繼筠領建武節度使判棣州丁亥令川峽諸州察民有父母在而别籍異財者其罪死癸巳幸開封府己亥户部員外郎知制誥王祜權知大名府辭日上謂之曰大名卿之故鄉古人所謂晝錦者也西京留守向拱在河南十餘年專修飾園林第舍好聲妓日縱酒恣所欲政府壞廢羣盜白日劫人於市吏不能捕上聞之怒庚子徙拱為安逺節度使九月乙巳朔幸武成王廟丁未以左武衛上將軍長社焦繼勳知河南府諭繼勳曰西洛久不治卿無復效向拱也繼勳視事月餘都下清肅庚戌令竊盜至死者奏裁刑法志云部送闕下乃明年事今從實録朝廷擇可使代馮繼業者時考功郎中假思恭知泗州上以思恭嘗有功眉州乃召赴闕命知靈州先詔之曰馮繼業言靈州非蕃帥主之戎人不服雖衛霍名將必見逐矣意謂非我他人不能治也汝能治之乎思恭曰謹奉詔上壯之又謂曰唐李靖郭子儀皆出儒生立大功豈於我朝獨無人耶厚賜遣之仍以途陟諸戎令别齎金帛以遺之思恭既視事矯繼業之失悉心綏撫夷落安靜周訪利病多所條奏甚得吏民之情庚申以合州濃泗鎮為廣安軍契丹涿州刺史許周瓊來降以為右羽林將軍仍領涿州刺史周瓊未見壬戌幸玉津園宴射辛未以龍捷左廂第六軍指揮使潘光裕為內外馬步軍副都頭領振州團練使賞石嶺關捍冦之功也潘光裕未見冬十月甲申前司徒竇貞固卒建隆初貞固以前三公赴闕陪位詣范質求任東宫三少預朝請質不為奏乃還洛放曠山水與布衣輩擕妓載酒以自適云丁亥詔西川山南荆湖等道自今發遣舉人往來並給劵王稱東都事略開寶二年冬十月丁亥詔曰昔西漢求吏民之明經術者令與計偕縣次續食蓋優賢之道也國家嵗開貢部敷求俊乂四方之士無逺弗届而經途遐阻資用或闕朕甚愍焉自今西川山南荆湖等舉人往來給劵戊子畋近郊散指揮都知杜延進與其徒十九人謀作亂事覺上夜啓𤣥武門命內侍密詔殿前都虞候楊義擒捕遲明皆獲上御便殿親詰之庚寅悉斬于市夷其族義廨在𤣥武門側上一曰教戰後池鼓譟之聲徹于外義聞之不測其故遽入至苑門猶著皂綈袍上召見命坐謂曰吾教水戰因使其譟耳既出謂侍臣曰此真忠臣也辛卯詔歸峽州並直𨽻京師相深趙三州丁夫死太原城下者三百三十四人詔復其家三年戊戌幸新水磑遂幸飛龍院賜從臣馬各一匹乂幸封禪寺易州言契丹右千牛衛將軍王甲以豐州來降即命其子承美為豐州衙內指揮使㑹要及經武聖略皆云豐州本河西藏才族都首領王甲居之契丹署右千牛衛大將軍開寶二年率衆歸順又命其子承美為衙內指揮使而本紀及實録遂言右千牛衛將軍王承美來降誤也己亥上宴藩臣於後苑酒酣從容謂之曰卿等皆國家宿舊久臨劇鎮王事鞅掌非朕所以優賢之意也前鳯翔節度使兼中書令王彥超喻上指即前奏曰臣本無勳勞久冒榮寵今已衰朽乞骸骨歸丘園臣之願也前安逺節度使兼中書令榆次武行德行德初見天福十二年前護國節度使郭從義前定國節度使白重贊前保大節度使楊廷璋競自陳攻戰閥閲及履歷艱苦上曰此異代事何足論也庚子以行德為太子太傅從義為左金吾衛上將軍彥超為右金吾衛上將軍重贊為左千牛衛上將軍廷璋為右千牛衛上將軍寶訓及故事並稱向拱袁彥亦同日罷方鎮授環衛按今年七月彥自靜難徙保大拱自西京徙安逺此時皆不在京師蓋誤也今不取太子太傅王溥遷太子太師入謝上顧曰溥十年作相三遷一品福履之盛近世所未有也初丁德裕王班張璵同領兵屯西川德裕頗自專恣兵馬都監張延通黨璵益不悅㑹上親征北漢有使來自太原具言上當盛暑躬矢石勞頓狀延通謂德裕曰上暴露若此吾儕日享甘美自取逸樂延通蓋言己不自安之意德裕不答既而璵先歸闕上賜子甚厚及延通德裕繼至上復召延通顧問而待德裕稍薄德裕意其譖己頗疑懼遂奏延通嘗對衆言涉指斥及諸不法事仍指璵為黨上怒收延通璵及王班等下御史獄按之延通等皆欵伏冀得見上面證曲直癸卯上御便殿引問延通抗對復不遜即命斬于市璵班及內品王仁吉並杖脊璵并家屬流沙門島籍其財班許州仁吉西窰務契丹錫利裕嚕等十六族歸附以其大首領囉美四人為懷德將軍壘八人為懷化郎將次首領諾爾布沁旺布十五人為歸德司戈本紀十月庚寅後戊戌前書豐州刺史王重安言契丹十六族歸附又於戊戌書易州言契丹右千牛衛將軍王承美來降按王承美之父甲實居豐州不知本紀所云豐州刺史王重安者果何人也㑹要及契丹傳載王重安與本紀同并載大首領等除官事而實録並無之此可疑也且不知此豐州即王甲所居或别有一豐州而重安亦復一刺史也按實録太平興國七年閏十二月書豐州刺史王承美言錫利裕嚕等族來降名字與重安所言略同豈錫利裕嚕等族既降而復叛叛而復降故耶不然此又可疑也王承美姓名官號本紀實録皆誤前己改正之獨重安名號無所考證今於此月末仍書錫利裕嚕等歸順但削去豐州刺史王重安言凡八字庶不與王甲及王承美相亂更俟審訂之十一月戊申日南至御乾元殿受朝甲寅畋近郊還幸金鳯園庚申輝和爾于闐皆遣使來貢方物輝和爾使者道由靈州交易於市知州假思恭遣吏市碙砂吏與使者爭直忿競思恭釋吏不問械繫使者數日始貫之使者歸訴於其國輝和爾汗遣使齎牒詣靈州詢械繫之由思恭自知理屈不敢報自是數年輝和爾不復入貢丙寅畋近郊還幸金鳯園戊辰詔中書舍人李昉兵部員外郎知制誥盧多遜分直學士院直學士院自昉及多遜始也先是堂吏以事至翰林皆拜於堂下學士略離席勞揖事己即退未嘗與坐昉前在翰林猶然及是有白事者遂拜堂上更展敘中外無復曩日之禮昉愕然詢於同列則云如此承襲數年矣莫詰其故也禮部尚書長安楊昭儉喜譏訾因揚言昉謁堂吏嘗獲其刺字云昭儉嗣復曾孫初見清泰三年是月唐主校獵於青龍山還至大理寺親録囚繫多所原宥中書侍郎韓熙載劾奏獄必由有司囹圄之中非車駕所宜至請省司罰內帑錢三百萬充軍儲十二月甲戌朔畋近郊辛巳户部判官右補闕李令珣免官坐判隨軍三司遺失官物故也癸未幸中書省視宰臣趙普疾乙酉以房州防禦使王彥升為原州防禦使彥升有膂力善擊劔軍中目曰王劔兒性殘忍在原州凡五年戎人有犯漢法者彥升不加刑召僚屬飲宴引所犯戎人於前手捽其耳嚼之下以巵酒戎人流血被體股栗不敢動前後啖其耳者數百戎人畏懼不敢犯塞至天聖中西戎猶有無耳者蓋彥升所啖也有辛文悅者不知何許人上幼從文悅肄業及即位召見授太子中允判太府寺周鄭王時在房州上謂文悅長者戊戌命文悅知房州事新舊録並稱周鄭王以建隆三年出居房州唐餘録乃云鄭王以開寶三年自兩宮出不知何據也恐唐餘録誤據新舊録辛文悅以開寶二年十二月戊戌知房州文悅本傳又稱三年恐本傳誤矣今並從實録丁德裕又奏西川轉運使禮部郎中李鉉亦嘗醉酒言涉指斥上驛召鉉下御史獄鞫之鉉因言德裕在蜀日屢以事請求多拒之皆有狀御史以聞上悟止坐鉉酒失已亥責鉉為左贊善大夫成都記載李鉉坐與張延通寫金字經故責官與本𫝊不同今從國史鉉未見案宋史作右贊善大夫奪右贊善大夫王昭文兩任案王昭文宋史及薛應旗續通鑑皆作王昭配𨽻汝州坐監大盈倉其子與倉吏為姦贓故也鳯翔節度使符彥卿被病肩輿赴鎮至西京上言疾亟詔許就醫洛陽假滿百日受俸如故為御史所糾請下留臺鞫問上以彥卿姻舊特釋之但罷其節度罷節度㑹要在十一月是嵗契丹主明為帳下所弒明性嚴忌㑹醉索食不得欲斬庖者庖者捧食挾刃殺明於黑山下明立凡十九年諡穆宗號天順皇帝無子諸部首領迎立天授皇帝鄂約之子明記號天贊皇帝更名賢改元保寧以上樞密使案遼史作南院樞密使知政事令髙勳守政事令封秦王侍中蕭守興為尚書令封魏王每朝必命坐議國事納守興女雅雅克為皇后初鄂約與妻同日遇害明記年九嵗有以氊束之藏于積薪中由是得免及即位嬰風疾國事皆雅雅克决之明記妻蕭氏即雅雅克也仁宗實録乃以雅雅克為北宰相蕭思溫女與此異疑守興别名思溫耳當考達勒達天王娘子之子策卜迪來貢㑹要不記其特
