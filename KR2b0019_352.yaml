body:
  text: 續資治通鑑長編卷三百四十八宋李燾撰神宗元豐七年八月戊辰朔門下省言刑部奏鈔宣德郎樂京據例當作情理稍輕不礙選注京本坐言役法本部不敢用例詔樂京情重刑部引例不當朱本刪去新本復存之樂京事已見熙寧四月十二日熙河蘭會路經制司言岷州蕃兵將趙惟吉康谷寨主夏亮坐前任隨知岷州張若訥役禁軍修教場衝替乞許其自新宜令依舊詔趙惟吉夏亮許留在任各展磨勘二年荆湖路相度公事所言孫覽相度公事見五月二日又十一日王江一帶自大湴口以上接連檀溪諸蠻與今道路相接朝旨專委管勾廣西經略司機宜文字程節招納措置本處地理闊逺蠻已歸附須築一堡寨以為守備詔節相度節言王江上流地名安口控扼諸洞其地寬平可建城寨然由王口而上經大湴吉老江口皆生蠻猺團族惟以略洞民板木為生今雖效順各有俸給若建城寨亦須兵威彈壓今欲沿江及中心嶺各治道路漸進先置堡鋪於吉老江量留兵丁以防鈔截糧道然後安口可以即工又言王江一帶團洞東由王口三甲西連三都樂土南接宜州安化與誠州新招檀溪地密相鄰比熙寧中嘗遣承制劉初領兵丁置寨於安口諸蠻併力殺傷官軍自此蠻情愈更生梗今遍招納例皆效順當開道路置堡寨驛鋪分兵丁防守乃為久安之計又緣事干西路須與誠州同時措置庶使諸蠻力有所分易為辦集並從之五月二十七日可考御史寋序辰言聞京西麥斗錢不過三十轉運司乃令稅戶折納錢六十以上詔京轉運司具析以開朱本以為事小削去要見後來如何已已詔以鄜延路經略司言新歸順三班差使馬竒特追躡西賊被傷死昨密科川獲級未賞有子沙木紫詔馬竒特來降招誘人戶數多又纍立功沙木紫與三班借職賻錢三十千絹十匹獲級當遷三資給絹六十匹庚午新提點夔州路刑獄朝議大夫裴士林知澶州先是河北路轉運判官張適劾奏知澶州吕希道郡事不治境內賊盜充斥致煩朝廷專官捕逐未獲乞重置朝典上批裴士林今日在殿訴陳以母親高年逺行不便乞易一近地差遣契勘士林纍典劇郡頗有幹力可令替希道赴闕其夔州路提典刑獄别選人具名進呈始希道除知澶州辭日上諭曰以河徙欲鎮安百姓執政進擬從官朕選用卿希道至澶以治績稱秩滿再任河朔保甲白晝持梃公然為盜教隊巡檢和德挾提舉司勢因緣枉法掠聚貨賄監司隱忍不敢詰希道發其贓狀僚屬皆惶恐希道即獨奏其事捕德下獄提舉官聞之馳驛至澶取保甲囚盡釋之希道曰山可移獄不可變既窮治取其首領於劫掠處斬之餘皆配𨽻澶人感泣朝廷亦命他路監司審其獄皆實重貶德自是提舉司益不協保甲有犯法者諸邑稍加懲治則必反中以他事希道檄諸邑保甲犯法有疑必送州至則悉論如法提舉官怒欲劾希道其同僚以希道辭直不敢書狀乃已元豐五年夏河東注靈平掃事見五年七月壬午一夕潰岸幾決希道曰此正前日之曹村也事不可再即馳至河上自督役河得無虞先是河決小吳四年八月八日河決小吳南直靈平下掃甚急當嵗有水患乃請開大吳口導河循西山北流論者以為得禹之舊迹自是曹村無水患矣張適為轉運判官適除運判乃六年十月上河朔鹽利以助邉計詔推行之希道曰祖宗手詔在北門地多斥鹵民所衣食故通鹽不禁河朔之人可安不可擾適深恨怒初澶河未徙南北城相望河貫其內故并河為禁地河既徙而北流有盜十餘人劫掠他州縣夜道退灘適因奏強賊由城中過法當按責守臣希道遂罷此據范祖禹志希道墓須更考詳八年四月二十一日適責官右侍禁杜能自陳有邉功御延和殿引見賜人馬甲一聫詔內臣殿侍管押戶馬往陕西河東路司勳取死損見在分數等第以聞真定府路安撫使馮京言洛州水災漂浸公私廬舍詔轉運司限兩月修完樞密院言蠻乞弟昨棄巢穴而遁今聞無所依止詔王光祖遣人招諭乞弟許出降與免罪補名目於近邉勾當是嵗乞弟死權河北轉運判官張適言已遣第十五副將王文景領兵捕殺澶州界羣賊權令選乘馬鋪馬七匹詔張適不當差馬鋪馬給將下特釋罪朱本云事小不書辛未詔禮部侍郎李常罰銅十斤膳部郎中曽有開與宫觀差遣坐修條不當也熙河蘭會路經略司言昨夏賊圍蘭州蕃官三班奉職章鄂特把隘伏截得力雖不獲級乞恩詔章鄂特遷一資換本族巡檢詔宗室有期以下服既殯許嫁娶毋得用花綵及作樂著為令御集尤詳今從實録河東路經略使吕惠卿言河外緣邉秋稼登稔可市糧草依將來官糴價與轉運司易錢鈔及令內地支移民戶出腳直以便公私乞先給錢三十萬緡在京樁管許以償本司糴買鈔撥本司舊封樁芻糧為年計以所糴買封樁歲終以聞從之仍支末鹽錢三十萬緡給事中韓忠彥言吏部奏鈔擬注江寧府司録參軍前刑部法直官郝京試大理司直不坐條而引例既有著令自當奉行豈可廢條用例詔吏部郎官罰銅十斤都省郎官六斤癸酉中書省言澶州賊單安等劫縣鎮民物頗有徒衆未獲詔左班殿直武學學諭陳濟方募選兵三百指名抽差使臣兩員凖備差使迹捕其賊所至捕盜官等並取濟方指揮甲戍秦鳳路經略使吳雍言秦州糧草才支半年望賜錢三五十萬緡依五路常平法計置詔戶部支常平積剩錢二十萬緡湖北轉運都鈐轄司奏相度誠州已納抄劄到歌樓橫嶺等團畸零人戶各在潭溪與招賞團洞相雜居止於蠻情顯有形比乞加犒賞等從之又奏為誠州三班差使楊晟祝係首先納土歸明今來潭溪等團洞已行招納了當乞與改官或支賜詔與三班借職密記八月七日事五月二日又十一日七月四日八月一日六年五月十三日當考乙亥戶部言提點河北東路刑獄吕仲甫乞二浙歲散和買紬絹止用舊價支鹽三分本部下其事本路轉運鹽司相度言不便詔兩浙轉運提點刑獄提舉鹽事司同相度竟如何當考手詔劉昌祚前機宜官徐勳等本因帥臣失於檢察以致違法敗官聞今來本司官屬尚因前弊玩慢弗悛審如所聞不可不治可更體量違法重者彈治以聞事理稍輕即嚴戒敇以提舉永興等路保甲胡宗回奏鄜延路經略司勾當公事曹輔等不公故也丙子手詔李憲西邉用兵未已行陳之間戰騎為急今諸路奏陳皆以闕馬為言除本路收市外如何經略可以廣置駿足入塞爾目擊其事宜知其詳可速具方略以聞無有回隱朱本都水使者范子淵言相度滑州浮橋移次州西兩岸相距四百六十一步南岸南崖地雜膠淤比舊橋增長三十六步半詔子淵與京西河北轉運司滑州同措置修治監察御史來之邵為將作監丞先是御史中丞黃履言臣與張汝賢同薦御史汝賢嘗與之邵為僚稱其習熟法令故列上之今遽聞之邵雇雜戶女為婢有此汚行乞付有司根治詔之邵具析之邵聞履彈奏即急出之乃言近買婢張數日問得恐是雜戶即遣出故有是命五月乙巳初除御史詔知桂州熊本已除吏部侍郎候辨正地界事畢聼朝旨赴闕六月四日壬申已除吏侍此特申明耳七月二十八日乙丑此月十六日癸未二十一日戊子可考詔樞密院諸班直每轉員出職內是長入祗候已有升軍恩例以病故不得遷者皆補外處本城無升資指揮自今與升一資辛巳鴻臚卿陳睦為遼主生辰使西上閣門使曹誘副之奉議郎試右司貟外郎范純粹為正旦使文思副使侍其璀副之陜西轉運司言今秋民户稅乞許本司酌逺近支移以實緣邉從之毋過三百里詔洺州水災糧儲不足許借鄰近州縣常平倉米麥小豆共五萬石限三年還詔李憲權以職事付趙濟發來赴闕應緣本路防秋事委濟經畫壬午詔聞三省樞密院官常早出六曹諸司不暇結絶日務自今冬夏並以未初為限著于令瀘南緣邉安撫司言羅始黨斗然斗更等首領乞依十九姓團結為義軍欲遣官管勾團結分地把拓立職級管轄從之癸未上批京西民産寡薄今嵗復罹水災兼纍困河役范子淵見營閉武濟河口昨已放工無效今冬雖霜降水落又須廣費財力未可保其必成即且縱其分流據年例物料兵夫固護武廣三掃自於新河無害可遣開封府推官李士良審視士良還奏所修馬頭隄道實未可保其必成乞並罷從之四月二十二日子淵責樞密院言諸路諜報西賊大點集若至秋深入冦諸路方出兵牽制淺攻别無所得徒困兵馬若不乘其未備掩襲使賊得併兵一路為冦於枝梧亦為費力詔陜西河東經略制置司選人深入鉤探如對境一二百里有賊兵不至重大及有收秋人户住止可以倐往忽歸乘便討殺即度事力發將兵仍計萬全毋得深入虛空之地詔交趾所議疆至據近日奏報已稍見涯涘新除知桂州苖時中諳熟彼方蠻夷情偽處畫庶務宜不在熊本下兼本已有改命恐於職事不肯任責可趣時中不候般家先次乘遞馬疾速赴任此據御集初九日丙子二十一日戊子可考乙酉詔河東陜西發保甲給路費出本州界二百里以上保正三千副保正二千大保長千小保丁七百不滿二百里及緣邉不出州界二百里以上保正二千副保千五百保長七百小保長保丁五百丙戍都大提舉汴河隄岸司言京東地富穀粟可以漕運其廣濟河下接逐處但以水淺不能通舟今以本司近修狹京東河岸開斗門通廣濟河為利甚大今欲於通津門裏汴河東城裏三十步內令修城兵就便開河一道取土修城及至斗門上安水磨下通廣濟河應接行運從之元豐五年二月十一日初罷廣濟河運七月二十日六年九月四日上批諸將兵馬平日固已多困於役使難得專意武事近復檢束將副太密多受制於州郡縱有材者亦罕得展四體盡力法守除三路上有帥臣可以責委外開封府界京東西路專選委監司一貟提舉開封府界王球京東吕孝亷京西梁燾如保甲例以內臣一人承受奏報令不以時點檢教事每歲如保甲遣官案閲手詔孝亷朝廷以本路將副類多武人少間文法致所部兵馬纍煩朝廷督責未嘗登額及教閲擊刺行陳多不應法蓋武人不能省閲朝廷頒付法式致廢而不舉兼上無主司赴訴縱有曉職守者其趨公之心亦無從得伸今専委卿提舉本路將兵職任事權並視已頒提舉保甲法施行卿其仰體選付之重往來點檢督責早令事藝修進行陳精熟人馬元額速得登辦緩急調發四方戰守足可保恃立功無踵前日虛數空名而已戊子尚書省言聞今歲廣西秋稼大稔粒米狼戾正宜蓄積詔廣西提舉常平司乘時廣糴計議辨正安南疆至成卓言已與黎文盛等辨正乞降詔加恩賜詔熊本問成卓黎文盛公牒及面議並言不敢爭占儂智會儂宗旦所納州洞何因即乞降詔熊本言成卓據黎文盛狀如成卓議於勿陽順安等洞從南畫斷地界陪臣不敢爭執即是辨正明據詔以隘外八處縣洞賜交趾仍賜使副大衣著黎文盛五百阮陪三百八洞不毛之地事具六月四日壬申及十一月二十二日戊子六年六月四日始令成卓辨正詔熙河蘭會經略安撫司訪問蘭州並河至靈州度河至興州通道有幾具地里逺近迂直以聞詔寺監諸司應有稽違係所轄省曹寺監失點校者亦令臺察彈奏己丑皇第十一子俁為定武節度使成國公舊紀書俁為節使國公新紀不書節使詔禮部員外郎何洵直入內東頭供奉官勾當御藥院劉惟簡同參定諸陵薦獻供奉式禮部言社稷之祭有瘞玉而無禮神之玉開元禮奠太社太稷其玉以兩主有邸乞下有司造兩圭有邸二以為社稷禮神之器從之刑部言南蕃進奉人石以定過汝州襄城其下人毆擊市人及自毁敇黃以定等外蕃當自朝廷指揮外其敕書已關主客押伴使臣乞候回日下大理劾罪詔敕書不别給止令汝州具喧競毁敕書因依連所毁敕送廣西經略司謄牒送界首官司付本蕃押伴使臣依刑部所申權國子司業朱服言天下郡縣之學皆𨽻本監四方之士多出太學將來禮部試慮諸路舉人羣集京師自以不在學籍無糾禁稽察之法循緣舊習浮縱寡恥兼本學生交雜相為掩蔽難以辨究乞應舉人到京或有顯過虧損行義若博奕鬭訟酗酒不檢造為飛語謗訕朝政委本監檢察聞奏比附學規殿舉從之辛卯雄州言凖朝旨依髙陽關鑄城下九鐵水忩工料以數十萬緣今窗上下城塹堅固本州最處極邉若置鐵忩須開撅城身面三十尺底十尺不惟虛費功力亦慮張皇欲漸計工料候有水窗城墮損處修換從之詔堂除及吏部使闕知州自今三年為一任詔諸提舉常平司存留一半見錢以二分為市易抵當詔於絳州垣曲縣支息錢六萬七千緡付河東轉運司應副芻糧壬辰手詔劉昌祚近指揮諸經略司乘隙出兵蹂敵秋稼慮穫事已畢戎騎乘秋健集之時加之邉吏伺候滅裂萬一逢賊誤國不細卿更籌畫如未可出即謹守前約內外備戒勿承順朝廷一時指揮妄有舉動詔江南西提舉鑄錢朝議大夫錢昌武致任江東提舉鑄錢朝議大夫李棻衝替昌武坐妄奏棻處置乖方當徒二年棻坐不實當徒一年各會赦而昌武年七十二故也恩州總管信州團練使孫古滄州總管辰州團練使劉聞等並以年髙令致仕癸巳監舒州石溪鎮酒稅奉職楊茂盛貸死除名郴州編管坐百姓乘馬過務搜得稅物笞之致死也詔河南府被水諸軍借一月糧見尅納者並除之詔內藏庫使榮州刺史涇原路都察知鎮戎軍張世矩追兩官免勒停罷都監領榮州刺史權知鎮戎軍坐先為河東軍馬司上出界功狀效用賈仲寶重傷不實盧秉等言乞少寬假詔候案上取旨故也詔諸路發往陜西户馬有眇目或目單暈者即退令别買詔自今強盜須州縣委不能制或凶惡巨蠧十人以上方得選募將兵捕殺若本州有本屬將下兵即先選募或不足方得選募將兵捕獲如違開封府界京東京西路委提舉將兵官餘路安撫總管鈐轄司舉劾樞密承旨司比較京東京西路諸將副押隊訓練官軍員教頭賞罰詔京東第八將副梁最趙潛京西第五將副張選孫璉各減磨勘三年京東第二將副歐育史吉京西第一將副蘇贇王政殿各展三年衢州言資政殿大學士守太子少保致仕趙抃卒輟視朝贈太子少師諡清獻甲午上批諸路諜報西賊廣造攻具竭國點集聲言欲入蘭州慮守臣將士狃於前勝輕易待敵或為誘戰别致失宜令康識往蘭州與當職官經畫為備及募人深入刺候如賊果入寇務在謹重過於去年照管守禦兵將晝夜悉力應副以取坐勝仍度人情時與犒給候大河水開方得往他處巡歷乙未都提舉𣙜茶陸師閔言川茶之法肇於熙寧甲寅行之陜西既有明效以河北河東生聚之衆惟茶不可一日而闕若視陜右成法而歸利於公上度兩路歲費之數置官場於荆楚間和市歲計運至兩路率用陜右禁地之法本路俱積以助邉費詔師閔條具以聞尋下兩路具到合用茶數及進呈詔寢之朱本刪去云不行合刪按此乃神宗盛德安可沒也仍具存之江淮等路發運副使蔣之竒乞復行東南大路𣙜茶法進呈不行朱本又以不行刪去今復存之權發遣同經制熙河蘭會路邉防財用馬申乞免熙河路封樁新復五州軍闕額禁軍請受詔自今更不封樁其已封樁者撥與經制司丙申詔支常平積剩錢五十萬緡付熙河蘭會路經制司市糧草詔武臣知州軍及軍使並三年為一任都提舉汴河隄岸司乞嵗買建州臘茶十七萬斤依官綱例免稅至京抽十分之一送都茶庫都茶庫所賣茶本司乞嵗買三萬斤隨新陳作價並從之其市易務茶令商議定價如不售即申所屬出開封府界變易詔熙河路經略安撫制置司奏西蕃董戩送到蕃字以夏國遣首領來青唐城欲同董戩首領入漢議通和事已降指揮令差使臣一名引伴赴闕可續指揮令經略司審驗如委有夏國表文及奏陳事即如已降指揮若是與邉臣商量仰先具奏據御集乃三十日丁酉事今附此不知後來竟如何此時董戩已死鄂特凌古繼立但未發喪耳九月戊戌朔樞密都承旨張誠一言樞密都承旨月有職錢三十千凖祿令武臣正任節度使以下不給添支詔特給又詔給李元輔經制絹五千付秦鳯路經略司以賞功樞密院言夏國欲因董戩遣使乞通和其意未可知慮欲以此疑本路邉備詔制置司過為隄備毋得因此稍弛己亥以右武衛大將軍仲先為登州團練使襲封魯國公仲先宗肅子詔以宗肅於先帝為藩邸初從兄故也詔李憲歸本任依舊管勾經略安撫司職事候應接董戩與夏國首領議事畢依前降指揮二十三日可考庚子詔成都府減廢武寧第八指揮置馬軍騎射一指揮支黎州所買馬以四百一十人為額以本路言馬軍不足也詔宗室克頒因心疾毆妻死外宅鎖閉嵗久可免監守辛丑經制熙河蘭會路邉防財用司上嵗計合用錢帛糧草詔歲給錢二百萬緡以本司十案息錢川路苖役積剩錢續起常平積剩錢各二十萬𣙜茶司錢六十萬川路計置物帛赴鳳翔府封樁坊場錢三十五萬陜西三銅錢監銅錫本腳錢二十四萬八千在京封樁劵馬錢十萬裁減汴綱錢十萬二千充自來年始戶部嵗給公據關送候元豐十年終令經制司具支存數以聞禮部言大禮受誓戒應立班官乞免赴朝參從之舊例受誓戒畢赴朝參故誓戒常於未明前或以為非禮故也詔文字稽違職級兩上簿者職事官一上簿詔諸路科買上供圓融抑配委轉運提點刑獄提舉司點檢舉劾聼逐司互察詔知秦州吳雍依近降法分四場教漢蕃弓箭手壬寅西南龍蕃貢方物詔成都府路所發綱馬飼秣太僕寺日久病死者甚衆宜令豫編次當支軍分驗格尺進呈填諸軍廣西經略司言鬱林州澄海指揮子第莫佛就言父貴為交賊所略殺賊自歸由十將補指揮使未還營發赴招討司不知存亡詔賜絹百癸卯都大提舉茶場陸師閔乞除放民戶賖欠茶罰息錢戶部言罰錢七萬緡乃朝廷封樁錢數詔本息正數並給限理納罰息錢除之知太原府吕惠卿乞分河東第九將嵐石州馬步軍八指揮歲更赴石州葭蘆吳堡塞防托從之鄜延路經略司言塞門寨草積爇發已差勾當公事錢景恪替將官郭祥守禦體量詣實詔草場失職自當詰問寨主都監何因先替守禦將官令經略司具析以聞甲辰詔近差左班殿直武學諭陳濟方募兵捕殺河北賊今單安張謝留相繼已獲澶滑州羣盜頗已衰息宜令濟方赴闕各遣還所募兵其未獲賊委開封府界京西河北路監司督捕嗣濮王宗暉言主奉安懿王祠事乞比宗姓使相郡王增俸祿詔嵗增公使錢二千緡厨料給親王例三分之二提舉開封府界保甲王球乞買牝壯馬每等第增錢五十千以毛色土産分髙下從之乙巳三佛齊貢方物荆湖南路轉運司言契勘荆廣等路鑄錢司牒凖內藏庫牒檢會熙寧詳定三司例卷數內一項諸路坑冶課利金銀並納本庫除已牒潭州永興場具興發後來收到銀數以慿回報內藏庫照會本司坑冶收銀並係應副支用久來不係起發赴內藏庫之數或合行並赴內藏庫納即乞截自某年為頭寬立年限逐旋帶納上批宜令依荆廣等路鑄錢司牒內該指熙寧詳定三司例卷內本條並赴內藏庫送納仍以元豐元年為始及依所奏均作五年帶納此據御集元豐七年九月八日事丙午重陽節特御延和殿閲經制牧馬司進諸路簡買馬并左第一監馬駒舊紀書重陽節特御延和殿閲監牧馬新紀不書權管勾熙河蘭會路經略司趙濟言已豫差李浩苖履統領漢蕃四將兵馬以備出入戊申戶部尚書王存言凖詔具析安守忠預繪像因依勘會所采臣僚勳績並於國史實録考求事迹據本傳所載贈太尉安守忠有戰功故迹當預繪像其捧日左廂都指揮使欽州團練使安守忠史册無載即無預繪像人數詔景靈宫改繪贈太尉安守忠像併推恩其家先是景靈宫繪像管勾官誤以欽州團練使安守忠充數而贈太尉安守忠之孫自言故命存考定而降是詔己酉校書郎王仲修為著作佐郎詔都大提舉茶場陸師閔近以奏課登羡戶部已下本路驅磨保明可止令比部取師閔隨行帳案驅磨限半月保明取旨其緣事有勞官吏宜令師閔等上司勳擬賞詔西京被水漂溺之家及秋田災傷五分戶並免來年夏秋支移折變從戶部員外郎張詢請也提舉荆湖南路常平等事張士澄轉運判官陳偲等上本路八州鹽舊賣及今來相度合增賣鹽數修為湖南廣東西鹽法條約總目戶部言欲依此推行侯就緒令本路轉運提舉官同立法從之初寋周輔言韶連郴道州可以通廣鹽數百萬代淮鹽食湖南故奉議郎郟亶亦乞運廣東鹽往湖南路郴全道三州詔送士澄偲相度至是奏上乃下監司行之舊録元豐六年十二月戊子户部言奉議郎郟亶乞通行廣東有餘鹽往廣西荆湖江西福建等路內西一路差三司副使寋周輔相度施行果利便亶昨乞運廣東鹽往湖南路郴道全三州乞選官相視詔送湖南提舉常平官朱本乃從彼移入此又稍刪潤之據元祐元年閏二月末吕陶奏議則湖南賣鹽實郟亶發其端周輔奉行之據舊録則湖廣江西福建皆亶創謀不獨湖南也初委張士澄陳偲在六年十二月甲申資政殿學士通議大夫提舉崇福宫陳薦卒薦儀狀魁偉辭氣莊重天性簡淡無聲色之好韓琦謂人曰亷於進而勇於退嫌疑間毫髦不處與人交久而不變如彥升者無幾司馬光亦服薦之質直云庚戌彰信軍留後駙馬都尉李瑋為建武軍節度使舊紀書此河北西路提點刑獄吕溫卿言霖雨為災已賑濟欲乞坊戶淹溺財産比舊退落七分以上積欠及秋料役錢並展限至來年夏料其漂蕩家業者不候造簿年月先減免役錢以寬剩錢補助戶部言減放役錢欲據家業物力之數於簿內改正其減役候造簿日均敷餘欲依溫卿所乞從之吕惠卿言知石州燕復不依經略司指揮擅追守禦保甲巳奉朝旨劾之竊以探報事宜自當為備牽於文法或誤幾事欲望少寬繩墨詔劾以聞朱本刪去云事小不行辛亥大燕集英殿酒五行罷以上服藥也舊紀書上以疾不果終燕戊午疾愈新紀同酒放翁家世舊聞元豐秋燕神祖方舉酒手緩盞傾覆霑御袍時都下盛傳側金盞曲有司以為不祥遂禁之明年宫車晏駕楚公進挽辭曰花是髙秋宴後萎楚公陸農師也意蓋謂此佛經天人五衰如宫殿震身光滅之類花萎亦其一也已入筆記天人五衰記所無癸丑傳宣閣門以服藥未安前後殿可權不視事甲寅復罷朝參三日丙辰詔濟陽郡王曹佾在病假百日特給寬假戊午上疾愈知永興軍劉庠言昨詔許商人便錢二十萬緡安撫司收潤官錢以末鹽錢給還計置糧依原價兑與轉運司其兑到錢本司已封樁今夏豐稔可以廣糴乞再許入便每百緡加收潤官錢十三千詔支末鹽錢二十萬緡餘依所乞己未鄜延路走馬承受李元嗣言軍士崔臯自截手指避出戰詔崔臯配本處禁軍雜役令劉昌祚體量軍中如此者斟酌施行環慶路經略司言殿直柴植守闕軍將杜大忠與孟真同討烏卜章等寨獲三百級無亡失蕃官例各轉資惟柴植杜大忠不蒙推賞詔各減磨勘三年庚申命殿中侍御史寋序辰右司員外郎路昌衡往熙州劾李憲初御史臺鞫皇甫旦獄召憲赴闕至秦州會有邉警詔止之臺請憲三問不承即追攝詔用衆證結案乃遣序辰等就劾既又命序辰等即秦州移文劾憲初二日令憲還此詔州縣社稷及風伯雨師壇壝令提點刑獄官先次點檢如有未應法式並令依應增改遇損壞即令修飾於壇側建齋廳三楹以備望祭從河東路同管勾保甲馬城請也詔韓國大長公主錢氏長子賜名忱為莊宅副使詔中書省具御史臺察案去年所彈治六曹諸司違法稽慢事若干所彈允當其違法官司若干嘗書斷該罰若干用恩赦放免以聞朱本改云用赦恩放免者不得原減與舊本不同今從新本成都府言新繁縣重光寺壁有圖寫太祖御容乞修神御殿奉安詔令設板屋遮護扄鎖河東轉運使天章閣待制陳安石權轉運判官奉議郎莊公嶽各罰銅二十斤轉運司管勾文字奉議郎晏朋宣德郎王惟各罰銅十斤坐不應副麟府州賞功絹也河北轉運司言自正月行鹽法至七月終收息十六萬七千緡有竒詔嗣濮王宗暉奏子與右內率府率女三人與縣主辛酉河東路經略司土蕃部裕勒星威密特與西賊戰獲級功狀樞密院擬裕勒星威密特各遷一資賜絹四十匹上批如功狀裕勒星威密特獲級並因伯雅克射倒所得恩澤二資可三人分受廣西都鈐轄司言本路土兵闕額數多乞選使往福建江南廣東路招揀投換兵四千人詔見寄招換路分委官招換江南路三千六百人福建路千四百人癸亥戶部言元豐二年三司借末鹽錢五十萬緡市糧限四年還今已限滿欲望均作十年還自今年為始又熙寧十年借內庫錢尚欠四萬二千餘緡亦依此從之詔會通門承傳文字并祗候使臣委內東門司官責本蕃上名內中不犯贓濫請求獻遺賣買同罪保明狀經保明後改節事未發許經內東門司陳首上名三年無遺闕酬奬外更減磨勘三年乙丑詔成都府應武舉王敘上書所言雖不盡中事實然乞於嘉州中鎮寨置場市馬及具道彼方蠻夷族姓道路委曲皆朝廷所未嘗知者宜下成都府路轉運鈐轄司據所奏詢究利害考實以聞朱本即於此書三司言已議差官於中鎮寨買馬按嘉州編録册置場中鎮買馬在十月二十九日合附本月日元祐七年七月二十三日廢罷正史兵志云六年復置中鎮買馬場又誤也禮部言太廟祖祫合食始祖東向昭南面穆北面者本室中之位也今設位戶外僖祖既東向矣而祖宗昭穆别為幄次殆非合食之義伏請自今祫饗徹去逐位幄次即前楹通設幕以應室中之位詔恭依詔應置巡檢下土兵路分並轉運提點刑獄提舉司每嵗依春秋大閲法分定案試提舉河北路保甲司言祁州鼓城縣巡檢下指使彭大因大水收救器甲溺死詔賜其家銀二百兩是日西賊圍定西城將官秦貴等擊却之此據十月二十五日奏新紀亦書乙丑夏人圍定西城熙河將秦貴敗之舊紀於十月癸巳乃書第五副將秦貴云云
