body:
  text: 續資治通鑑長編卷三百五十二宋李燾撰神宗元豐八年三月甲午朔執政詣內東門入問候皇太后垂簾皇太子立簾外皇太后諭圭等皇子精進好學已誦論語七卷略不好弄止是好學書自皇帝服藥手寫佛經三卷祈福因出所寫經示圭等書字極端謹圭等拜賀遂宣制立為皇太子改名煦仍令有司擇日備禮册命又詔軍國事並皇太后權同處分候康復日依舊未刻執政再入問聖體進呈立皇太子例降赦皇太后諭圭等皇太子立大事已定天下事更在卿等用心圭等言朝廷法度紀綱素具臣等敢不悉心奉行自此執政日再入舊紀書甲午立延安郡王傭為皇太子改賜名某詔軍國事皇太后權同處分新紀同哲宗立為皇太子舊録誣謗紹興各官已具辨眀文字甚多今姑存其目新録辨誣第一卷凡六假又髙遵裕傳又燕達傳又荆王頵傳又蔡確傳又鄧潤甫傳又劉惟簡傳又舊録紹聖四年五月己巳又紹聖四年四月二十四日丁未又十一月梁燾傳又元符元年二月張士良獄辭并邵伯溫専著辨誣所載證據訖建炎初並别録在後惟吕大防實録院奏請批付事仍具注此下蓋邵伯溫辨誣所不載紹興史官亦未見也吕大防提舉修實録奏請批付事臣燾嘗見之大防孫成都府路提㸃刑獄司幹辦公事世修紹興二十九年九月世修子寬仁者實從成都府路轉運司檄進入國史院訖今具録如後付吕大防御寶封元豐八年二月三日門下省時政記二月二十九日癸巳寒節假三省樞密院詣內東門進榜子入問聖體靣奏去冬曽奉聖旨皇子延安郡王來春出閣今來聖體違豫欲望早建東宫凡三奏上三顧微肯首而已時疾勢彌留矣又奏皇太后權同聼政候康復日依舊上亦顧視肯首既退即移班東間垂簾見皇太后具所奏如前皇太后辭避近侍奏云且以社稷為念不宜固辭至于再三泣許退三月一日甲午寒節假三省樞密院詣內東門進榜子入問聖體皇太后垂簾宰臣已下起居皇太子立于簾外與王圭等相見皇太后宣諭圭等皇太子極是精俊好學已誦七卷論語略不好弄止是學書自皇帝服藥手寫佛經三卷祈福因出所寫經三卷示圭等書字極端謹圭等再拜且謝且賀退文武百僚赴文德殿聼宣立皇太子制未刻再入問聖體次進呈立皇太子例合降赦次進呈皇太后允之乃諭圭等皇太子建立今來大事已定天下事更在卿等用心圭等奏朝廷法度紀綱素具臣等敢不悉心奉行乞上寬聖慮退臣奉勑提舉修撰神宗皇帝實録取索到元豐八年春季門下省時政記照㑹得其年二月二十九日三省樞密院同奉聖旨皇帝自皇子延安郡王立為皇太子次日文德殿宣制及同日皇太后宣諭等事謹具録如前深慮更有未盡事節伏望檢㑹降下以憑修撰取進止五月日臣大防劄子奉御批覽所奏當日事皆得其實惟初得神宗旨奏皇太后權同聼政一事所記未盡亦恐當日事干禁中隔簾外臣不得悉知今可於皇太后字下添入所批事實近侍乃張茂則也今連元奏在前關請依前件御寶批事理照㑹施行又關修神宗皇帝實録院凖此元祐四年五月日臣具劄子奏禀元豐八年二月三日門下省時政記內事件凖御寶批於皇太后字下添入事實貼定降下臣已依批降貼定指揮關實録院照㑹施行去訖謹具奏知元祐四年五月日臣劄子七日押皆元祐實録云移班東間皇子及皇太后皇后朱德妃在簾下圭等奏請皇太后權同聽政皇太后辭避張茂則言皇太后且為國家社稷事大不宜固辭圭等請至于再三皇太后泣許圭進言自去嵗上令皇子侍燕羣臣皆嘗見之今必更長立乞再瞻覩此皆所批事實紹聖重修乃削去紹興本已復依元祐本增入新録辨舊録誣謗今具録如後哲宗實録辨誣卷第一太子未建中外洶洶皇弟雍王皓問疾輒穿帳徑至皇太后所語見宫嬙不避神宗數怒目視之皓無復忌憚臣等辨曰據曽布手記神宗違豫岐嘉二王日詣寢殿問候起居及疾勢稍增太皇太后即時靣諭並令還宫非諭宣召不得輒入自太子未建至無復忌憚四十二字並刪去皇后憂恐出財佛祠設齊揭榜曰延安郡王祈禱冀天下知王長立能致恭孝臣等辨曰神宗寢疾皇后出財設齊意在祈禱而已豈得便懷希覬預為關防此實厚誣欽聖自皇后憂恐至能致恭孝三十字並刪去廊二月神宗疾甚辛卯輔臣入問至紫宸殿皓乃邀於曰軍國事當請皇太后垂簾又奏乞止宿侍疾皇后力爭得不宿既而留禁中曹王頵屢牽臂引出臣等辨曰國朝親王宰執法制甚嚴未嘗交談所謂皇后力爭者皇后於親王無相見之禮若謂與宣仁力爭則竊聞宣仁聖性嚴毅人不敢犯欽聖孝恭備盡婦道豈有力爭之理引臂之說尤為怪誕不惟誣謗二后亦且不知祖宗家法及國朝典禮自二月至引出六十字並刪去右僕射蔡確懼乃以建儲意問左僕射王圭圭不答確益懼不知所出事愈急㑹確母得入禁中皇后使諭確使外託主兵官燕逹等輔立又因內侍閻守勤諭確協力早定或謂確曰此大事也請與衆詢圭不言則正厥罪是時輔臣韓縝安燾章璪李清臣陰持兩端噤不語確獨約門下侍郎章惇共力癸巳輔臣聚南㕔確顧謂圭圭亦不語確曰去春延安郡王侍宴嘗有旨來春出閣議已定不言何也惇曰言之是則從不則與公偕死圭始曰上自有子何議之有是日日晡詣榻前奏曰去冬得旨皇子延安郡王今春出閣乞立為皇太子以係天下三奏神宗三顧肻首又奏請皇太后權同聽政以俟康復神宗方顧視肯首既退不待奏請殿東間已垂簾於是輔臣簾前具奏被旨如前皇太后泣許是日皓牽幕欲入頵力挽止之臣等辨曰國朝宰執母妻入禁中有時豈有確母獨得入禁中者據曽布手記元符末欽聖云章惇等誤哲宗處多布言只如言宣仁及大臣有傾搖廢立意以此激怒哲宗恐無以取信遂云神宗非宣仁所生欽聖云宣仁是慈聖養女嫁與英宗當時是甚事勢又宣仁實妬忌方十六七嵗豈容有他人所生之子廢立事亦寃他契勘京卞等既修成史録即將時政記盡皆焚毀肆其誣謗何所稽考若當時委有前件事因欽聖於此豈不說及亦豈可掩又據實録及㑹要等書元豐七年三月丁巳大燕集英殿中燕延安郡王侍立宰臣王圭率百官賀神宗宣答曰皇家慶事與卿等同深欣懌及升殿神宗又諭王與圭等相見復分班再拜稱謝就坐久之乃退是冬神宗諭輔臣曰皇子眀年出閣當以吕公著為師保八年三月甲午輔臣王圭等入問神宗聖體皇子立簾外宣仁諭王圭等曰皇子精俊好學已誦論語七卷略不好弄止是學書自神宗服藥手寫佛經三卷祈福因以經示圭等字極端謹圭等拜賀是日降制立皇太子曽布手記亦言建儲之際大臣未常啓沃皇太后內出哲宗手書佛經宣示執政遂令草詔恭惟神宗與子宣仁立孫本無間隙事已素定而姦邪誣罔盡以為蔡確章惇定策之功自右僕射至挽止之二百八十三字並刪去太子立皇后謝皇太后簾中太后抵后胸曰事遂矣其後欽聖數指胸示上曰痛猶在也上泣謝臣等辨曰指胸之事雖士庶之家婦姑之際有所不為而謂宣仁為之指胸以示上曰痛猶在也欽聖果出此言乎哲宗泣謝尤為虛誕不知何所依據而為此說况欽聖宣諭宰執以謂寃宣仁則其事可見此一假宣仁欽聖哲宗皆被誣謗姦臣為利何有于君父無所忌憚一至于此自太子立至上泣謝三十七字並刪去如望之肅然履帝位若固有之臣等辨曰哲宗天性至孝當神宗初晏駕哀痛之心必見于形容如望之肅然履帝位若固有之似誣聖德今刪去髙遵裕𫝊元豐末神宗寢疾儲嗣未立宰臣王圭初懷猶豫嘗密召遵裕之子士充問遵裕所欲立意遵裕聞之泣且怒戒其子勿復往既久語聞臣等辨曰哲宗嫡長仁聖立儲定于侍燕之日而乃王圭問所欲立于遵裕此豈遵裕所得與聞者姦臣為說意在誣謗宣仁自元豐末至既久語聞五十二字並刪去燕達𫝊進殿前副都指揮使拜武康軍節度使元豐八年神宗寢疾益甚㑹確母入禁中皇后使諭確外託主兵官燕達等輔立皇太子逮神考升遐宿衛于內東門百官朝晡臨由垂拱殿入皇族親王由內東門入達謂人曰天子新即位我坐甲于此以備非常萬一有姦人隨皇族而入則事起不測又豈能人人辨之將入上奏人或止之曰皇族之事非所當言言之恐被罪達曰我䝉先帝大恩拔擢常在衆先言之苟當雖死何憾遂奏上大臣嘉嘆之臣等辨曰蔡確誣謗事朝廷已追正其罪託燕達輔立皇太子事合刪去荆王頵𫝊及神宗疾徐王皓有覬幸意每侍疾數牽幕直入頵屢挽止之朝遇蔡確數以言促確曰延安郡王太子也不立何待確猶豫未决頵曰晚則他人是有神宗疾甚皓欲留宿禁中頵奏得弗宿太子立頵內助居多逮元祐初始賜第咸宜坊曰親賢宅居之仍賜國子監書諸子自勝衣以上趨拜應對甚謹上皆命進官自太皇太后聽政頵非大朝㑹未嘗進見間遣使宣召頵曰未復辟不敢往淡泊謙畏喜筆札飛白籕皆工賔禮官僚去輒奏留久者至十餘年喜釋老書尤好書手著普惠乘間集效方數以藥救病者其仁厚天禀暴得疾左右不以聞太皇太后不及問至薨口鼻皆流血又或止之亦不果臨奠方國危疑皇嗣未立頵能不負神考奮不顧身為宗社計雖古之所謂臨大節而不可奪者何以加諸臣等辨曰此正蔡確等傅㑹一時之說謗誣宣仁聖德者實録元豐八年三月載上即位事辨之詳矣此一節合刪去殿蔡確𫝊元豐六年秋確與中書侍郎張璪奏事崇政上悲不自勝謂確曰天下事止此矣確駭曰敢問所因上曰子幼奈何確曰陛下春秋鼎盛忽有不祥之言不審所謂上曰天下事當得長君維持否確曰延安郡王陛下長子臣不知其他臣有死罪已不敢奉詔上曰卿果能為社稷計宜早定確與璪俱進曰臣等敢以死守上曰善確被顧託乃謀欲請王出閣建儲議不協又意上特悲思無聊耳猶豫不决七年春延安郡王出侍宴集英殿確始奏請猶欲來春出閣上可之後因有對者言及確上曰羣臣皆先皇帝遺朕者如確自小官朕親擢至此必不負朕然氣弱得人輔之乃可確聞益自奮久之八年正月神宗疾彌月皇嗣未立中外洶洶確始懼乃以建儲事問左僕射王圭圭不答確亦懼不知所出事愈急㑹確母得入禁中欽聖憲肅皇后諭確使外托主兵官燕達等輔立又因內侍閻守勤諭確早定或謂確曰此大事也請與衆詢圭不言則正厥罪是時輔臣韓縝安燾張璪李清臣持兩端噤不語確獨約門下侍郎章惇共力癸巳輔臣聚南㕔確謂圭圭亦不語確曰去春延安郡王侍宴嘗有旨來春出閣議已定不言何也惇曰言之是則從不則與公偕死圭始曰上有子何議之有是日日晡議定詣榻前奏曰去冬得旨皇子延安郡王今春出閣乞立為皇太子以係天下三奏神宗三顧肯首臣等辨曰祕書省國史案文載太皇太后御崇政殿宣諭三省貶確事七百一十三字甚詳其間云皇帝是神宗長子子承父業其分當然昨神宗服藥既久曽因宰執等對時吾以皇帝所寫佛經宣示其時衆中止是首相王圭因奏延安郡王當為皇太子餘人無語安燾其時悉見又云皇帝乃先帝長子嗣位乃從來常事孰有間言蔡確班在圭下何以獨謂更有㝎策功邪安燾奏曰當時惟首相王圭一人奏對太皇太后遂泣下閒許便批聖語其餘執政更何曽有言况前年上宣皇子使見羣臣足知先帝之意素定也兼當日三省時政記已如此修定進呈豈容外人敢如此妄說謹按此事已修入元祐四年五月丁亥蔡確責授英州别駕新州安置事下詳此即確𫝊前項所載顯為誣謗今刪去六年秋至三顧肯首四百六十二字州確終坐黜而梁燾等猶論不已遂責確英州别駕新安置確受先帝顧命姦臣睥睨坐誣投遐荒乃命中使馳傳押至貶所屢經赦罪無不得宥獨確四年不得還八年正月六日卒貶所年五十七天下莫不寃之臣等辨曰確終坐黜是吳處厚繳詩事梁燾等猶論不已是確自稱受遺事若為一說使後世不可曉又皆誣謗之言今刪去確終至寃之八十二字鄧潤甫𫝊元祐用事之臣結黨排陷坐製蔡確麻詞妄言有定策功以龍圖閣學士知亳州臣等辨曰按元祐時政記當神宗末命宣仁聖烈皇后以哲宗所寫經宣示宰執當時惟王圭進對餘人無言且哲宗以神宗長子嗣位孰有間言而潤甫于麻制中推確定策之功欺罔眀甚史官乃謂元祐之臣結黨排陷是誣也今刪去十字內臣劉惟簡𫝊云云方神宗疾蔡確入問帷幄深密不詳見上惟簡屢以太子促之確猶豫一日惟簡取幄外燭引確見上確知疾革遂立太子上即位確懼選惟簡等十人朝夕左右輔翊姦人方睥睨未閲目黜惟簡餘九人悉罷人莫不寒心臣等辨曰哲宗之立為太子非由蔡確確身為宰相不思宗社大計而因宦者所促遂立太子寧有是理自方神宗疾以下八十五字合刪去惟舊録卷苐六十一紹聖四年五月己巳三省言按梁簡陳衍在元祐時內挾黨類外交權臣邪謀詭計無所不至宣仁聖烈誠心德意不能動搖皇太后皇太妃保佑擁護朝夕備至故惟簡衍不得逞其姦心原其罪惡族滅為宜陛下寬仁止從投竄然聞惟簡衍尚有親戚供職禁中此曹私心各懷危懼何可更充內侍伏乞聖斷索惟簡衍親戚并素所厚善逐出外臣等辨曰此一假雖推尊東朝歸罪閹尹原其誣謗之意尤為深切今刪去七十六字繳舊録卷苐六十七紹聖四年十一月梁燾𫝊吳處厚進蔡確詩疏其怨謗燾與吳安詩劉安世協力攻之欲以悖逆不道置確必死又造為險語以激怒宣仁彭汝礪救解之且請罪處厚臣等辨曰以實録考之蔡確自以為策立顧命之臣貪天之功以為已力梁燾嘗疏論之而史臣以為造為險語激怒宣仁其誣罔甚矣今削去僚舊録卷苐七十元符元年二月張士良獄辭間有臣奏請東朝還政者衍輒詆之曰此不忠不孝之人也匿其奏置匱中不以聞東朝亦不以聞于上及與吕大防往來以合密賜大防妻皆不聞上臣等辨曰宣仁遺誥云欲釋天下之重負就東朝之燕閒復辟以時實吾之志是臣僚前此未嘗有請還政章奏或有之則宣仁在上豈容陳衍藏匿又吕大防妻為國夫人必嵗時入朝三宫如太皇太后賜合容有不必聞上之理史臣此言顯屬誣謗今刪去前件五十九字又奏除范純仁右僕射召文彥慱平章事臣等辨曰宣仁進用大臣豈至謀及中官史臣妄意簾帷易欺增重陳衍之罪所以汙讟聖母不知無根輕發不可以欺天下後世今刪去前件十六字先是文及甫元祐五年以書抵邢恕其書有司馬昭之心路人所知及以眇躬為甘心快意之地可為寒心其徒實繁氣𦦨可畏等語於是詔恕繳元書書至命京惇究問及甫蓋以劉摰為司馬昭以眇躬為主上其徒謂王巖叟梁燾劉安世孫升韓川等輩京惇進呈上曰元祐人果如此京等曰誠有是心然反形未具摰等已責遐方上曰若陳衍朕親見之不可貸故有是命臣等辨曰文及甫書乃六十四卷粉昆事不當再録於此此事是宣仁聖烈事跡冊中具載惇卞欲廢宣仁哲宗怒抵其奏于地遂追張士良於雷州將脅成其獄以逞餘憤士良不可屈而罷今云上親見陳衍之罪蓋誣也刪去前件一百四十四字略按粉昆事新録在一百三十五卷舊録于六十四卷載其詳在此卷第七十舊録卷苐五十九新録卷第一百三十二紹聖四年四月丁未三省言元豐八年二月二十九日御史中丞黃履奏訪聞兩府大臣嘗議奏請皇子就傅建儲事王圭轉語李清臣云是他家事外廷不當管也蔡確章惇聞之對衆窮其所立圭不得已方云上自有子惇確乃宣言於衆其議遂定臣又聞王圭陰交髙遵裕嘗招其子士充傳達語言臣伏思陛下推大公至誠之心以槐位處圭以鼎餗養圭凡十有六年今聖躬偶感微疹而圭已懷二心此而可容何以示懲勸于天下黃貼子近有髙士英者輒至臣家稱上服藥中若皇太后或皇后權同聽覽則傳命者審臣正色答之以為豈可私議臣忝竊位中執法士英尚敢率爾如此發言今圭無故輒招士充又對清臣有如此言竊慮必有奸謀至三月初履又言大臣體國休戚一均事有權宜自合奏禀豈得私有所召及稱不當管他此而可容何以懲勸臣于左僕射王圭議儲之際既聞其然不敢不論今已纍日未見施行臣伏思之使臣之言果合義則圭不可以無責使臣之言無補于事則臣不可以無罪今皇太后權同處分建立儲位以安天下臣雖萬死猶生之年伏望朝廷早賜指揮又紹聖二年十一月內右正言劉拯奏先帝疾宰臣王圭持二心臣僚嘗具彈奏蔡確等定策受顧命輔翼陛下已而權臣擅政確等繼被逐又恐他日復用為已禍也于是因事誣毀擠之廢死之地而後移定策之功于王圭圭之薨也賜宅贈官錫子敕葬特厚而確死投竄之地雖䝉昭雪贈復官爵恩例比圭甚薄且父子繼世雖有定例神器輕重亦繫一時功罪不明孰大于此今為忠者被禍為姦者受賞何以教天下示後世伏望究圭之罪録確之功優加恩典又今年官苑副使西京第七副將髙士京進狀稱先臣遵裕當先帝服藥危疑之際有故宰相王圭召臣親弟承議郎士充密議取决于先臣欲知太皇太后意所欲立蓋為是時先臣為髙氏之長又知先帝太皇后常聽用故來相問尋時先臣泣下大怒曰姦臣敢如此况國家自有正統何决于我遂叱罵故弟士充如敢更往即杖汝死尋將此意指說與先辟機宜官王棫自可照證竊念先臣昨因攻取靈州師老糧匱大河不凍故不能上奉聖訓責置散官遂先朝露其後雖稍加牽復然未嘗别加贈典又不獲伸訴于陛下欲乞優加褒贈又給事中葉祖洽言先皇帝所以待王圭可謂厚矣自翰林學士承旨擢為參知政事自參知政事擢為右相自右相擢為左相在政府凡十六年又擢其子為館職自圭之身及其兄弟子孫皂𨽻凡受朝廷恩命者臣不知其數然則先帝之于圭可謂無負矣當先帝違豫至于大漸儲位未正中外皇皇延頸以望圭為上相衆目所視所宜率先建議首定大計以慰宗廟圭乃持疑顧望含糊不决至于同列以大議迫之不得已而後應不知圭意安在使同列不切責之則圭將遂無言豈不誤事天下至今罪之臣于是時適在朝廷親聞士大夫之論藉藉罪圭已而圭死天下莫不快之然是時朝廷所以賻贈周恤恩禮過厚仍賜甲第一區莫非異數臣聞特恩賜第所以待殊勳異德為臣不忠何以得此乞下有司正王圭之罪以戒天下不忠不孝之臣使知治世典刑無前後之私也祖洽又言臣嘗論王圭背逆不忠之罪未見施行不知所為若以圭之事為無實迹耶則當時二三執政尚在及見今侍從間甚有知其詳者皆可考正其事黃履為御史中丞嘗論之于前劉拯為右正言又論之于後近日髙士京又極陳其狀伏惟陛下察臣之言出于公論稽合羣情决于獨斷以慰中外詔王圭遺表恩例並行追奪其子孫與次逺監當差遣仍永不得注近京路分所賜宅拘收入官故承議郎髙士充特追毀出身以來文字制曰臣無二志戒在懷姦國有常刑議難逃罪其申後罰以正往愆故金紫光祿大夫左僕射兼門下侍郎贈太師王圭竊文華之上科躬柔險之詖行馴致顯位遂居冢司先帝優容臣鄰務盡禮意掩覆瑕慝多歷嵗時邱山之恩毫髮未報屬在彌留之際是謂憂疑之時欲豫安于人心當蚤正于國本矧復昭考與子之意素已著眀太母愛孫之慈初無間隙而乃妄懷窺度専務媕阿指朝廷為他家用社稷為私計同列誚詰久無定言隂持兩端不顧大義僅免生前之顯戮更叨身後之餘榮公議不容舊疏具在返覆參驗心跡較然使其免惡于一時難以示懲于萬世貶從散秩追正誤恩庶令官邪咸知警憲可特追貶萬安軍司戶參軍邵伯溫辨誣曰邢恕誘髙士京上書論其父臨死時屏左右謂士京曰神宗彌留之際王圭遣髙士充來問我曰不知皇太后欲立誰我斥士充去恕又不考究髙遵裕既坐知慶州日建議取靈武事敗神宗貶遵裕散官以宣仁故免安置留京師宣仁后尤不喜雖該哲宗登位覃恩亦不許叙又安能預策立大計惇卞但欲誣罔宣仁遂贈遵裕節度使遷士京皇城使特追貶王圭崖州司戶參軍貶髙士充散官至元符末髙士育上書自稱遵裕幼子其父最愛父病且死未嘗離左右不見士充來說王圭所問之語士京亦不在父所時欽聖后垂簾特與士育改文資除環慶路經略安撫司幹辨公事蓋察其言之實也伯溫見髙公諌言士京乃遵裕假子士育實遵裕幼子士京既為邢恕所誘作此事恨章惇不甚進用之屢欲自陳虗妄南北宅髙氏皆絶之靖康初諸王府贊讀江端友上書論士京事甚詳端友與髙氏子孫相熟也邢恕乂言黃履在元豐末曽有章疏言宣仁后欲立徐邸事伯溫後在同州於曽布之子絣處見曽布手記當時事一編云禁中元無黃履文字黃履家出藁草入獄為咨黃履與恕自未第而交逰相善恕亦與履同謀也王棫京師人善口辨好議論熙寧中為熙河路走馬承受致仕家富逰公卿之門與邢恕為死黨伯溫嘗見王棫尚洙李洵于恕所皆妄人也後章惇因恕薦落棫致仕除知北平軍未幾棫死其子直方不以父為然每為士大夫言父晚年病心後直方亦死無子與朝載之相善以平生所收書畫歸載之觀直方所留書畫于其間得王棫與邢恕往來書一通皆共謀誣造諸人廢立事者靖康元年月日諸王府贊讀臣江端友昧死再拜上書皇帝陛下臣伏睹宣仁聖烈皇后當元豐末垂簾聽政保佑哲宗皇帝起司馬光為宰相天下歸心焉九年之間朝廷清眀海內乂安人到于今稱之其大公至正之道仁民愛物之心可以追配仁宗至于力行祖宗故事抑絶外家私恩當是時耆老盛德之士田野至愚之人皆有復見女中堯舜之語其功德巍巍如此天下歌誦如彼而一邢恕造無根之語以為謗議使後世疑焉如日月之明而浮雲蔽之臣不勝痛恨初元豐中髙遵裕大敗于靈武責散官安置未幾神宗崩哲宗嗣位宰相蔡確以謂遵裕者宣仁族叔也即建請牽復以恱宣仁之意而不知宣仁之不私其親也宣仁簾中宣諭曰遵裕喪師數十萬先帝緣此震驚悒悒成疾以至棄天下今肉未寒豈忍遽私骨肉而忘先帝乎即日批出曰遵裕得罪先帝今來垂簾凡髙氏推恩獨不及遵裕確謀大沮後確責知安州作詩譏訕坐貶新州而邢恕乃確之腹心也偶遇遵裕之子士京中山同官遂以垂簾時不推恩牽復事激怒之使上書言王圭曽遣遵裕之子士充來議䇿立事遵裕斥去之士京庸懦不識字實恕教之為書士充疏逺小臣素不識圭圭安得與之議及社稷大計又何從輒通宫禁語言且上書時圭士充遵裕亦皆死矣何所考按臣竊聞元豐八年時政記即確所修其載三月中䇿立事甚詳何嘗有一疑似之言恕之本心但謂不顯王圭異同則難以歸功蔡確而不知厚誣聖母之罪大也恕之為人非獨有識之士無取其子居實亦不樂父所為也天下皆知之章惇排斥元祐者也在簾前奏事惇傲不遜都堂㑹議以市井語誚侮同列豈忠厚君子哉尚云極力以消除徐王覬覦之謗惇與王圭蔡確同為執政顧命使當時果有異同豈有復為此言乎則恕之謗可謂欺天矣緣此紹聖中蔡卞獨倡追廢聖母之議賴哲宗仁孝不聽其說不然人神痛憤失天下心為後世笑悔可及乎自比年以來三變屢作禍亂繁興水旱相仍夷狄內侮安知非祖宗之靈赫怒于斯耶至于髙氏一族銜寃抱恨無所伸息亦足以感傷和氣召至災祥未必不由此也臣竊惟聖人之德莫先于孝祖廟帝王之政必急于眀是非陛下即位以來登用賢俊退斥姦邪如追贈司馬光等既以辨人臣之謗而眀是非矣而宣仁聖烈皇后者神宗之母陛下曽祖母也彼三十餘年之謗公卿大臣未嘗以一語及之可不痛乎范純仁遺表有云宣仁之誣謗未眀使純仁在朝廷必能辨之也臣願陛下敕有司檢尋案牘推究言語之端發之于誰何其證佐安在則小人之情見矣誕發眀詔曉諭中外庶使逺邇臣民疑議消釋煥然如清氷之近太陽豈不快乎然後以策告宣仁及神宗廟上以慰在天之靈下以解人神之憤昔漢靈帝夢桓帝怒其責宋皇后周成王時皇天動威彰周公之德以此知宗廟之靈禍福之變甚可懼也宣仁之謗臣以為陛下惟不聞耳聞而不辨豈所謂教天下以孝乎臣不勝區區之情惟陛下裁幸小帖子前件事非獨髙氏之深寃乃朝廷之至辱宗廟之大耻范純仁死有遺恨自後公卿大夫皆以非己之事隱忍因循故莫為言者其實今日政事所當先也伏望特出聖意宣召二府與之靣議丁寧懇惻令依臣所乞施行宗廟事必須陛下身自任其責若降付三省恐議論不一難以啇量或施行草草難以慰在天之靈答臣民之望則不如不降出也伏乞特留聖意又小貼子臣觀自昔誣謗反白為黑後既覺悟未有不辨明者今宣仁之謗天下知其非而朝廷獨不辨明臣愚未曉其故陛下事宗廟至孝誠不得不以此事為先也邵伯溫辨誣載江端友書不知果是何月日上當考曽布日録云三省用葉祖洽言追貶王圭昌化司户追賜第遺表恩例及子孫等如劉摯等指揮再録未及奏事上遽宣諭王圭當先帝不豫時持兩端又召髙遵裕子與議事當時黃履曽有文字論列及同列敦迫其後方言上自有子布云此事皆臣等所不知但纍見章惇邢恕等道其略不知黃履章疏在否上云有布等聞禁中無此章履曽於紹聖初録奏比三省又令履録私藁以為質證上又言髙士英者詣黃履問誰當立者此亦履貼黃中曽論列布與林希云天命何可移易但小人妄意窺測爾兼宣仁亦無此心上云宣仁乃婦人之堯舜也外則圭等內則梁惟簡輩妄為此紛紛爾布云德音如此臣復何言然願諭三省於詔令中眀述此意使天下曉然知朝廷誅責大臣而陛下推眀太母德意如此則誰敢復議亦當書之典冊以示後世林希進曰臣謹當著之時政記上云告命當令進呈然後行下布與林希皆稱善退以語林希云布欲增四句云先帝付託羣臣所知太母睿眀聖德無爽希稱善仍督希以白惇布亦慮詔令之出中外有疑於形迹宣仁者遂疑以示惇惇不得已但改云昭考與子之意素已著眀太母愛孫之慈初無間隙希大喜以謂微布發之何以有此使人知上德仁孝于宣仁無疑此乃于國體為便進呈上指所增四語云極當又添近日三省以大防等有廢立謀逆之意又發揚王圭觀望以眀定策之功故痛貶大防圭等又言巖叟等意不在確皆欲以此感動上意為誅戮凶逆之人不避怨怒以為忠藎故上亦為之欣納凡所為姦無不如意者萬一有異論之人則指以為逆黨欲以鉗天下之口吁可畏也布是日悒悒為之寢食不安不勝憤怨而已林希亦云貶竄者未足道但為此言以離間宣仁使上于宣仁不能無疑致其骨肉間有芥蒂此尤為可憤兼蔡京曽云仁宗時嘗欲以庶人禮葬章獻然考之國書無此事京輩大槩每欲如此京又嘗言車駕不可幸楚邸又嘗云上比來已覺悟楚王二壻盡罷翰林司御厨此輩豈可使居此地此論殊可怪又云京嘗言天下根本未正意謂不誅楚邸則未安爾是時楚王未薨故有此論及被詔作墓銘乃固辭亦此意也必布又云梁燾言及楚邸不知聖意以為如何上曰他不知布云誠如聖諭若大臣與楚邸交通真有此謀豈一二人所能辨外議皆疑朝廷欲行遣楚邸臣獨以謂聖意素不如此必無此理今聖諭亮其不知臣復何言謂楚邸不知固無可議就令當時實有此謀陛下亦當㴠容濶略此豈惟傷先帝篤愛兄弟之恩兼形迹宣仁於國體豈為穩便如此則上纍聖德不細上亦然之太母又太息云誤他處多布云只如言宣仁及大臣有傾搖廢立之意以此激怒先帝恐無以取信遂云神宗非宣仁所生太母云宣仁是慈聖養女嫁與英宗當時是甚事勢又宣仁實妬忌方十六七嵗豈容有他人所生之子廢立事亦寃他娘娘豈有此意如此教他先帝怎生不惡布云先帝所以切齒元祐之人正為此爾此事莫如皇太后知虛實太母云無此事楚王希望不可知布云大臣果有此謀否太母云當時不聞誰敢說及此事他只說人罵神宗又說出此一事怎生教他不惡布云外人皆言惇既誣罔元祐人以廢立事又深貶王圭以定策之際持覬望之意今日惇簾前出不正之語人皆以為報應太母云是報應也吕大防手寫時政記元豐八年春季正月一日丙申二日丁酉三日戊戍未時三省樞密院詣內東門進榜子請入問聖體上遣梁從政劉惟簡傳放王圭等再令𫝊奏上即遣從政等引見上于福寧殿東寢閣之中門自是問聖體皆如之四日己亥三省樞密院入問奏事上並首肯晚再入問上手書字諭王圭等自來日可只早入五日庚子三省樞密院入問晚再入問梁從政劉惟簡𫝊宣放自此日惟一入六日辛丑三省樞密院入問晚大慶殿開啓道場七日壬寅三省樞密院入問奏欲降赦上許之八日癸卯三省樞密院入問未時再入九日甲辰三省樞密院入問十日乙巳三省樞密院入問十一日丙午三省樞密院入問十二日丁未三省樞密院入問十三日戊申三省樞密院入問十四日己酉三省樞密院入問晚詣集禧觀宿齊開建道場十五日庚戍三省樞密入問十六日辛亥三省樞密院入問十八日癸丑三省樞密院入問上已漸安十九日