言殆不誣矣既而臣叔碩復見李嗣徽具述姦人陰謀不可量且曰萬一為此輩所先中夜御寶一紙出眀日奈何又見向宗回訪以所聞宗回曰若問所聞寒心難言前聞雍王乞于內中止宿中宫厲聲紛爭乃已先臣以謂事勢危迫如此而又神宗疾勢彌留恐變出不意須早定大計使姦人不及謀則萬全之道也然須內外協力事乃克濟立儲前令臣叔碩諭燕達等曰輔臣之家平時不可與中官軍帥交一語今國家艱難正忘身報上之時固不可以小嫌誤大事也因令臣叔碩謝劉惟簡梁守勤曰前所喻已見忠於國家御藥侍奉左右凡事更加謹察有合知者速須報來事有成敗上繫宗社安危彼此禍福不足言也又諭達云事在旦夕若萬一有異同如何達曰丞相率百官達率將校爭之有死無二又令閻守勤密白知欽聖憲肅皇后明日建儲禁中諸事乞加意伺察至時中宫須至在福寧殿欽聖憲肅皇后云裏靣事不須憂外靣議論如何守勤云蔡相已布置定大事二月二十九日先臣更不宿約諸大臣自內東門回直邀王圭暨執政官就南㕔聚議先臣即語王圭曰神宗疾勢漸急在上有人問當何以對圭俯首不語久之先臣云今日非尋常議事之時安可緘默觀望回目章惇惇復以語恐之圭色變不答先臣顧惇曰相公豈有他哉特臨大事持重爾又語圭曰去年春延安郡王出侍大宴聖意已定圭不得已方云延安郡王惇曰此是第一句爾不知第二句云何圭無語先臣曰相公之言足矣先臣于是索紙寫劄子令惇手書及率衆大臣書名押字是晚同執政至神宗御床前奏云去年春得㫖令延安郡王今春出閣今大本未見乞立為皇太子以安宗社之基請來早降别處分仍肆大赦天下神宗聞之首肯泣下輔臣嗚咽流涕帳後宫人聞之莫不飲泣先臣執劄子顧張茂則厲聲云已得聖旨立延安郡王為皇太子請都知奏皇太后某等賀於是茂則引輔臣至簾前再拜而出太后熟視狀奏差中使鎖學士院三月一日文德殿宣制因奏乞改哲宗廟諱貼麻施行二日肆赦天下尋選神宗所信任中使十人令侍衛皇太子三月五日宣仁聖烈皇后急召二府趨至殿門先臣郤步語王圭曰萬一有不諱須先請皇太子即皇帝位圭云待到簾前取㫖先臣云今日之事各繫家族儲嗣已定相公尚云取㫖何也圭倉皇曰惟命是聽洎至簾前神祖已升遐輔臣向簾前慟哭王圭與張茂則相語欲先到柩前先就坐即皇帝位先臣奏乞捲簾與諸輔臣見嗣君訖下殿再拜退至㑹通門南幕次凡有指揮事並先臣親書令小黃門持至內東門付本房行遣再入奠于神宗柩前乃召軍帥二王上殿簾前論以神宗升遐嗣君即位次率百官軍校班于福寧殿宣遺制見嗣君訖退時簾前出遺制不言欽成皇后先臣奏云德妃朱氏誕生聖嗣遺制內並無尊崇之禮欲添入德妃朱氏可尊為皇太妃久之曰可先臣復與諸大臣奏乞以梁從政承受資善堂文字先臣內宿凡七日歸號泣謂臣祖母明氏曰去年冬中書奏事神宗因論天下事泫然流涕某因問何為感傷豈非宫中有所不快神宗良久曰天下事只做到這裏兒子年小須得長君繼為之某奏云陛下春秋方盛豈可為此語神宗曰天下事只如此某復言陛下有子岐嶷臣等未先朝露當以死報陛下神宗喜顧某曰卿必無負又某初除右僕射時神宗宣諭云朝廷命相須可以託國建儲前二日某因蔽身同列之後以觀神宗不見某枕上輾轉驚愕某近前神宗乃定然某素受神宗顧託今可無愧但吾家如朝錯於漢室矣神宗既殿攢哲宗同宣仁聖烈皇后御迎陽門垂簾聽政是時允議哲宗與宣仁聖烈皇后同設席忽有中人至崇政殿門閣子內見二府云欲少却御椅子及微偏以眀崇事寶慈之禮先臣云朝與宫中不同豈可如此請奏知一如儀注臣祖母明氏母孫氏入見欽聖憲肅皇后言相公簾前奏請立皇太子時皇太后擁哲宗付劉惟簡出就坐而太皇太后以手指擉皇太后云你這回放心因指胸示臣祖母猶有青痕及見欽成皇后號泣曰若非相公我子母幾無去處先臣奉詔為山陵使臣祖母入見因令奏知欽聖憲肅皇后將來神宗山陵發引乞且保佑嗣君不可逺行宜請皇太妃扈從是時中外既安司馬光與諸用事之臣素為神宗所退黜者皆欲乘時攄其憤氣於是神宗法度欲一切掃革之而後已朝廷不問是否一切從之先臣奏云太皇太后與神宗為母子舉動若此反類有仇皇帝陛下父子繼統政事固有隨時損益不冝過聽人言以傷事體自為永裕山陵使回即求解機務宣仁聖烈皇后未許既而稱疾請益堅乃以觀文殿知陳州謹録進呈取進止臣蔡懋劄子上靖康臣僚章疏中書舍人顔岐繳蔡懋詞頭狀臣僚言謹按蔡懋天資險薄臨事傾邪諂附蔡攸結為死黨攸在樞府邀求宰相知懋尹京可以頻對使懋日論王黼罪惡黼雖罷相道君皇帝察攸素無學術不命以相而攸尚引懋為樞密以報助己之力當金人擾攘京城圍閉時懋在本兵之地卒無一言以助計臺陛下當自知之今陛下以邉事未寧雖在盛暑日再御殿訪納孜孜至忘寢食而懋為大名帥不恤民情不憂邉事日用妓樂飲宴廣造舞衣戲衫酣醉優雜殊無體國之意軍民皆不堪命欲殺之言喧于道路大臣如是可謂辱國又按懋昔以父確事迹妄加增飾誣記宣仁聖烈皇后垂簾欺罔道君皇帝乞御製確𫝊載懋誣詆之詞伸其父勞中外讀之無不痛泣此懋可誅之大罪也陛下政事盡法祖宗之舊而宣仁聖烈皇后保佑前朝功德甚髙為懋誣詆言不可讀忠臣義士氣拂其膺願早昭洗陛下尚未暇及臣所以甚惑也今懋猶帶學士均逸宫祠陛下何以示天下何以勸忠孝臣伏望睿慈落懋非據之職治其莫大之罪授以散官投于嶺嶠永不放還仰慰聖仁在天之靈天下幸甚伏候敕旨六月十八日奉聖旨落職宫祠中書舍人安扶繳蔡懋祠頭狀臣僚上言奉聖旨蔡懋落職宫祠者臣竊見所望臣僚章疏上言懋身為舊輔任當元帥方邉事未寧陛下憂勤旰食之時而乃日事飲宴至軍民怨望有欲殺之言已合重行竄斥又况所論詆誣宣仁聖烈皇后欺罔道君太上皇帝二罪之重孰大于此按懋所著父確事跡一出私意妄加增飾自古姦臣愚弄矯誣未有敢如此之甚者蓋其天性凶暴輕蔑朝廷居之不疑中外無不憤嘆陛下臨御以來雖匹夫之寃有不得伸者必為之昭雪而宣仁聖烈皇后為臣下所誣負謗抑者有年矣陛下可不為之動心乎今懋乃止于落職宫祠豈足以正誣詆欺罔二聖之罪哉伏望睿斷眀正懋罪亟行投竄候勑旨六月二十三日三省同奉聖旨蔡懋降充中大夫祕書少監分司南京亳州居住𠡠為臣之惡孰大于矯誣事上之愆莫先于欺罔宜從顯黜用愜衆情資政殿學士通奉大夫提舉西京崇福宫蔡懋肆敢為之凶挾必取之術公詆訕于聖烈力蔽䝉於上皇妄云眀父之勳實遂媒身之計但欲冒朝廷之寵不思黷祖宗之尊逮輔政之罔功俾守藩而自效乃忘體國靡務恤民惟日事於宴逰致人情之怨望言章沓至公論弗容邦憲稍申豈特為垂世之戒宿姦既露亦少慰在天之靈往服寬恩無重後誨之諌議大夫楊時上殿劄子言臣聞天下之本在國國本在家竊惟宣仁聖烈皇后保佑哲宗皇帝枉被誣謗久而未眀臣謹具本末于左昔元豐末伏見神宗皇帝不豫哲宗幼冲宣仁聖烈皇后有旨令二王非宣召不得入內其關防之慮深矣是時王圭首建大議請立延安郡王為皇太子餘人無言者退批聖語在中書仍關實録院衆臣簽書本末詳具天地鬼神臨之在上質之在旁不可誣也至元祐中蔡確以罪去其黨始造為姦謀冀邀異日之福紹聖初章惇蔡卞用事欲中傷舊臣報復私怨遂實其說上誣聖母而以大逆之名加王圭以定策之功歸蔡確而已亦與焉其為此謀非私于蔡確也其實自為因以中元祐之人耳天下銜寃積憤幾四十年伏遇陛下嗣守神器如大眀之無隱不燭而臣幸得備員諌省不得不為陛下言之也凡元祐政事著在甲令者皆以焚毁則當時所批聖語在中書者必無遺矣所幸紹聖中所修時政記具在祕書國史案猶可考也此天實存之以遺陛下伏乞下祕書國史案取索元祐時政記一賜觀覽足以具見事實昭洗王圭為臣不忠之名追奪蔡確冒受褒贈之典濫恩所被悉行改正以釋天下積年憤鬱之氣臣不勝幸願之至取進止動御史中丞陳過庭言臣聞昔周公遭管蔡流言上天威雷電以風禾偃木拔以彰周公之德蓋聖人之用心與天地合不幸遭變故必有感格而震動者恭惟國朝聖聖相繼中外乂寧將二百年自紹聖崇寧大觀宣和以來星文變見日食地震水旱連年盜賊滿野遂致金人侵擾非特姦邪用事忠良擯斥庶政不修百姓愁苦之所致也宣仁聖烈皇后保佑哲宗功在社稷垂裕無窮而乃負誣謗于天下者垂四十年天地幽鬱人神憤怨前日之變幾致大亂未必不由此也近日搢紳之士咸謂臣曰當宣仁聖烈垂簾聼政登用耆舊惠愛黎元如章惇曽布蔡京及卞姦險刻薄之徒棄出勿用小人懷憾務在報復及其得志託紹述為名凡元祐政事禁廢弗用一時輔相侍從之賢死于遐陬荒裔者何可數計及章惇晚年被斥頗有悔過之意其謝表則曰極力以遏徐王覬覦之謗一心以眀宣仁保佑之功觀此則知當時固嘗起徐王之謗而掩宣仁之功矣范純仁嘗曰矧宣仁誣謗之未眀致保佑憂勤之不顯純仁懷忠發憤遂有此言然伸幽直枉正在今日伏望陛下詳酌今三省樞密院及侍從臣僚共議其事辨眀休烈振發潜光然後敕眀詔以諭中外差大臣以告陵廟上以慰在天之靈次以攄幽眀之憤天意披豁人心感悅則中興之業自此有成矣臣不勝懇悃激切之至取進止以吏部侍郎馮澥上殿劄子言臣恭惟宣仁聖烈皇后盛德大恩保佑哲廟八九年間盡其心力天地神眀所共昭鍳功施社稷德被區宇日月光眀安可蔽翳而元豐姦慝輒加誣詆妄興廢立之議興造事端迫脅不肖子弟以為證佐上下共知人臣同憤三十年間無敢言者陛下孝通神眀眀並日月方在潜邸孰知其事今奉承宗廟嚴恭祭享豈容神靈久被誣謗伏睹近日責降蔡懋制書蓋亦言其略矣然行遣未盡人神未厭伏望睿斷眀下詔書述宣仁聖母保佑之功正蔡確父子姦罔之罪追其贈典斫其碑石播告中外咸使聞之上慰九廟在天之靈下紓四海積年之憤取進止户部侍郎邵溥上殿劄子言臣竊惟本朝有天下治安無虞百六十餘年蓋緣祖宗一道皆本忠厚人心固結以臻于此祖宗建業垂統其惟艱哉唐季五代之亂毒流天下民墜塗炭皆見聞所接故立一法度發一號令未嘗不憂深慮逺以為萬世計也其混同區夏補治瘡痍豈一朝之力令海內黎元愛戴其上子孫享安富尊榮之福太平不拔之基者實祖宗積纍之功也自王安石持天命不足畏祖宗不足法之說以眩惑人主之聽章惇曽布蔡京挾紹述之論立誹謗之刑以鉗制天下之口不知有祖宗歷三世矣神宗皇帝功德在人無所與二何負于天下而諂諛大姦乃有誹謗先烈之禁貶祖宗尊禰不可以訓書曰七世之廟可以觀德𫝊曰學士大夫則知尊祖矣詎可以一時政事之因革法度之損益而廢祖宗哉陛下即位十有四日金人引兵直抵城下陛下惕然思前日致冦召亂之端亟下明詔遵用祖宗政事所以應天命順人心俯仰盡矣孟子曰天下之本在國國之本在家家之本在身祖宗忠厚之本陛下一身躬行于家然後推而行之天下異時小人不知人主之有祖其流至于離間人主之骨肉以害人主之家道而馴至天下之亂臣敢以陛下今日自家而推之天下者言之元豐間蔡確以起獄至輔相神宗皇帝上賔懼司馬光吕公著之還朝不容己也造為曖昧不根之言誣詆宣仁聖后志在要功以固寵祿其後羣凶資以為貨紹聖間章惇欲同蔡確之功以自大繼主其說是時同列大臣如韓縝安燾尚在初不聞有此議也政和間蔡京因王圭以沮鄭居中之為相故命史官述哲宗之紀宣和間蔡懋因蔡京以規蔡確之封王故請上皇作蔡確之𫝊宣仁神宗之母嵗九月祀神宗于眀堂宣仁忌辰在散齊之內上皇既不受慰在廷之臣無一人詣景靈宫者尊神宗而卑神宗之母可見蔡京之無忌憚也上皇宣仁之孫也以一蔡確之故用一蔡懋之說親作王母之謗史可見蔡確之無忌憚也在昔神宗皇帝奉侍兩宫孝德彰聞友愛二弟止處東宫而確惇京懋乃敢蔑視宣仁掩神宗十九年之聖孝范純仁遺表曰若宣仁之誣謗未眀致保佑之憂勤不顯本權臣務快其私忿非泰陵實謂之當然是豈哲宗之意哉哲宗之紀蔡確之𫝊非元豐三省樞密院時政紀所載無有據依皆出蔡懋臆說甚者託以祖母明氏之言不獨厚誣宣仁又且上纍欽聖是豈上皇之意哉蔡確之子孫弟姪不論存歿皆被褒録而使吾神宗皇帝之母抱負沈寃四海痛憤違天逆人莫大于此致冦召亂其何能逃臣願陛下特下眀詔暴揚宣仁九年保佑之功烈昭于萬世竄削紀傳奏告陵寢以慰在天之靈誅確惇於己死正京懋于大刑以副夷夏之望不勝幸甚又如太清樓記言自堯舜三代以下王者之作至神宗方大有為而不及祖宗宣和殿記以三朝聖母為婦人女子非上皇制作之文皆蔡京輩悖理害教之辭刻之金石不可以詔後裔也陛下能正此三者則天下之本正矣祖宗政事無所不行矣易曰天之所助者順也人之所助者信也今天下之勢如此陛下思前日天之所譴人之所怒以致金人之禍者改革之茍或更張于末流而以謂復祖宗政事臣恐信順未孚天人未助外侮之患未艾也恭惟上皇以神器授陛下為祖宗社稷無窮之託凡所改革實出上皇之初詔望陛下不疑而力行之以成上皇之志惟陛下裁幸取進止諫七月二十三日三省同奉聖旨令侍從官議定聞奏議大夫徐秉哲上殿劄子繳連謗史在前上皇御製哲宗皇帝紀二月神宗疾甚輔臣入問至紫宸殿雍王皓邀于廊曰上疾急軍國事當請皇太后垂簾輔臣愕不對又請留宿侍疾皇后爭得不宿然數入禁中弗去曹王頵屢執臂引出之右僕射蔡確恐以建儲問左僕射王圭圭不答確益恐不知所出㑹確母得入禁中皇后令諭確託主兵官燕逹等輔立又因內侍閻守勤令早定或謂確曰此大事也宜與衆詢不言則斬以狥時輔臣韓縝安燾張璪李清臣拱手無一言確獨約門下侍郎章惇為助乃顧王圭圭不語確曰去嵗王侍宴有旨眀春出閣議定今不言何也惇怒曰言之是則從不然皆死圭始曰上自有子何議之有于是詣榻前以請者三神宗首肯亦三又圭遽請皇太后權同聽政神宗亦顧視首肯退至殿東間已垂簾簾前白所得旨皇太后許之時皓牽幕直入頵力挽止之太子立皇后謝皇太后太后抵后胸曰事遂矣其後數指胸示上曰痛猶在上泣謝後確母入禁中太后示擊痕尚存三月朔輔臣入太子立簾外皇太后諭圭等太子精俊好學已誦論語七卷略不好弄出手所寫禱疾佛經三卷圭等再拜賀是日改今名確請擇忠謹內侍十人於皇后左右翊衛以備非意乙未大赦天下軍國事皇太后權同處分戊辰即皇帝位百官班賀望之肅然履帝位若固有之宣仁聖烈皇后傳第一卷后雅愛雍王皓先帝疾皓數穿帷入白后后卒不果及皇太子立手抵向后胸曰事畢矣帝嗣位戒皓毋得至上所保佑上躬致極慈愛羣姦數睥睨至有奏疏乞召外戚繼大統者賴后意不移姦謀得息神宗感疾上手書佛經以祈福既正儲位因輔臣奏事后于簾前出所書示之曰太子聰哲社稷之慶及上踐阼又以御書賜宰臣以下人一通曰帝宫中惟好學所賜書欲卿等知之神英宗子皓列𫝊第五卷下皓先封徐後封雍元豐末宗疾彌月太子未建中外洶洶皓有覬幸意每問疾輒穿帷徑至皇太后所語見宫嬙不避神宗數怒目視之皓無復忌憚二月神宗疾甚輔臣入問至紫宸殿皓乃邀于廊請曰上疾如此軍國事當請皇太后垂簾又奏乞止宿侍疾皇后力爭荆王頵力奏止之得不宿既而數留禁中頵屢牽臂引出右僕射蔡確懼乃以建儲意問左僕射王圭圭不答確益懼不知所出事益急㑹確母得入禁中皇后使諭確外託主兵官燕達知開封府蔡京輔立又因內侍閻守勤諭確協力早定居兩日太子立是日皓牽幕欲入頵挽止之意不滿宣仁遇皓朝不使見上又具謗史如前臣竊聞近者臣僚兩次論列蔡懋誣詆宣仁聖烈皇后及欺罔道君太上皇帝等罪初則落職次則分司不惟懋之罪惡未正而詆謗欺妄之狀皆未昭辨臣不得不為陛下言其始末也伏聞哲宗皇帝既即大位蔡確章惇疾王圭為首相恐其專有扶持挾輔之功乃造作語言詆誣宣仁以謂當神廟不豫之時屬意在雍王而不在哲宗自稱其有策立主上之力天下不平之久矣及確因弟碩贓汚事發罷相補外至安陸不自循省謗訕君親投竄嶺表當時謫辭曰先皇與子孰云定策之功太母立孫乃敢貪天之力其㫖意明矣上皇謫惇有謝表亦云盡力遏徐王覬覦之謗一心明宣仁保佑之功則惇已悔前日誣言之非矣况當日門下省時政記惇所録進未嘗有他語也元祐四年左正言劉安世亦嘗論列且曰不若早為辨正以解天下之惑臣恐異日為朝廷之患觀今日之紛紛不已安世之言驗矣蔡懋初與蔡京不相能屢為竄逐自政和中遂通京賂厚相結納懋盛稱京知開封府且入立殿下有助定䇿之功京素誕誇以功名自任乃極力主懋之說初除懋徽猷閣待制明年進直學士又引令上殿靣陳誣罔之語確遂封王爵懋升延康殿學士因而為尚書為府尹為執政其叔碩贓敗免死亦贈待制諸弟諸子諸孫諸壻諸女諸妾或為侍從或為郎官或為建司或加封號門戶華耀氣熖炙手猶以為未足乃誣撰哲宗帝紀與宣仁雍王二𫝊欺罔上皇以帝紀為御製使人不得擬議兹尤可駭臣自筮仕以來聞長老為臣言宣仁之誣謗及臣僚所上章疏固非一事臣未敢决其是非一觀懋所撰謗史以帝紀及二傳參考所謂宣仁保佑之功蔡懋父子誣罔之迹較然自眀豈非豐功大烈神物護持姦臣賊子終不得而掩沒臣請托其一二辨白之謹按哲宗帝紀曰三月朔輔臣入太子立簾外皇太后諭王圭等太子精俊好學已誦論語七卷略不好弄圭等再拜賀是日改今名若宣仁意在雍王豈有盛稱太子之美于未定之前耶是日建儲改名今謗史不言建儲止言改名者掩其因宣仁褒稱而建儲也又按宣仁列傳曰神宗感疾太子手書佛經以祈福既正儲位因輔臣奏事后于簾前出書經示之曰太子聰哲社稷之慶使宣仁意不在哲宗何以未踐祚之前盛稱儲君之美以謗史考之哲宗建儲踐祚盡出宣仁聖意之先定昭昭乎如日星之不可掩又何假于外助此理曉然士庶具知雖懋之姦巧且不可得而改易又按哲宗帝紀曰太子立皇后謝太后抵后胸曰事遂矣其後數指胸示哲宗曰痛猶在後確母入禁中太后示其擊痕尚存又宣仁列𫝊曰神宗疾雍王皓數穿帷入白后后卒不果及皇太子立手抵向后胸曰事畢矣臣讀此不覺淚之橫流也宣仁身為天下母保佑哲宗正位天極垂簾十年陰功厚德滲漉四海女后之賢前古所無姦臣賊子妄稱父功僥幸恩賞乃以閭巷所不為之事上誣聖母兹尤可痛前曰以手抵胸中曰痛猶在後曰擊痕尚存是何毒手尊拳若是之甚也懋等但求其言之深切使人為可信不知其自抵牾也又况上皇乃宣仁之孫也揚美不揚惡者子孫之職借使果有是事自當為尊者諱况事無其實盡出詆誣何可書耶懋等乃敢妄欺上皇託以御製𫝊之後世使人得以議上皇播揚祖母之惡臣恐上皇不知帝紀所載之文如是爾若或知之必不肯借御製之名也懋欲竊取寵祿榮耀其私家使宣仁上皇負謗天下于懋安乎陛下為人子孫所不忍聞也又帝紀曰蔡確以建儲問左僕射王圭圭不答輔臣韓縝安燾張璪李清臣隂拱無言確獨約門下侍郎章惇為助惇怒曰言之是則從不然偕死圭始曰上自有子何議之有臣觀宣仁三月朔稱美太子精進好學之若是其意斷可識矣何待圭等有語圭答以上自有子何議之有臣觀宣仁三月如是事無疑矣輔臣復何異論當時大臣不知以何罪而例遭逺竄若確獨約章惇為助觀惇所進門下省時政記叙其建立之事未嘗有他語惇被責謝表之詞已自眀白是惇初雖惡圭妄為此語實未嘗助確也又帝紀曰㑹確母入禁中皇后令諭確託主兵官燕達等輔立又雍王傳曰㑹確母入禁中皇后使諭確外託主兵官燕達等開封府蔡京輔立臣竊觀元豐七年秋宴之日太子出見羣臣神宗與子之意定矣次年三月朔太子立於簾外宣仁立孫之意定矣燕達蔡京何預焉朝廷大事自有宰輔大臣何關於殿前司開封府乎懋稱託達者以主兵眀其將有變故是欲大其事也必稱託京之助己乃以輔立之說說之使其出力爾蔡京數多姦詐懋之姦詐又出其上又觀紀𫝊所載必言確母宣諭又言以擊痕示確母方此危疑之際確母安得數入宫禁此又懋之姦詐欲稱確母之功然懋非獨稱確母之功又且確以大事未定歸詢其母有妾預議遂乞封為夫人乃蔡莊所生也封告之文尚可稽考懋欲揚其祖母父妾為有助于定策乃陷宣仁于非義豈得不為之痛心乎臣又聞帝紀曰確請擇忠勤內侍十人于皇太子左右翊衛以備非意臣觀宣仁之保佑哲宗恩義盡矣何非意之可備言而及此詆誣益又甚焉臣又聞蔡京所以助懋成此誣罔之說非特為納懋之賂揚已之功其意蓋在于鄭居中也居中王圭之壻方蔡京為太師居中為宰相論議多不協和京欲排去居中未有夤緣故抵王圭為不忠將并其壻而逐之京欲用私意而厚誣宣仁海外之竄未當其罪然臣今日之論止以謗史所載者為之辨正不復取他說以凂天聰今别録帝紀及二傳所載䇿立之事同進伏望陛下留乙夜之覽仍乞取元豐八年三月一日章惇所進門下省時政記元祐四年五月二十二日趙瞻所纂樞密院時政記及劉摰所進三省時政記參驗其說然後知臣所論為不妄矣如天意洞達灼見情狀伏望再詔史官以當時所記之事參詳刪定焚毁謗史絶其根源正懋之罪重賜誅殛追確王爵毁折碑樓凡其家子弟中外親屬及諸婦諸妾緣此所得恩數所賜田産房廊等物並行追奪秉筆史官亦先斥逐庶慰宣仁在天之靈使三十年之鬱憤一日得以昭雪豈不快天下之心昔東海枉殺一孝婦猶致三年之旱况天下之母為姦臣賊子誣謗上天豈不震怒今日之事正在陛下盡子孫之職成祖父之美昭示萬世厥功大矣願陛下留神取進止貼黃稱竊聞蔡確别自有傳其中誣謗之語甚多伏乞取索刪除免致流傳致惑天下臣僚上言近曽論列蔡懋詆謗宣仁聖烈皇后乞將紀傳重行刪修等事至今未見降出施行臣因職事上殿再䝉睿旨令臣重録劄子投進又聞陛下有旨令侍從官集議臣竊謂宣仁誣謗天下共知其非不待集議而後眀然所可議者惟哲宗帝紀及宣仁雍王二𫝊中所載詆誣事迹宜令侍從官將當時三省樞密院時政記參較議其是非真僞然後刪修正史最為緊切兼臣劄子中所辨論止是以帝紀二𫝊中事實反復審訂其非已自昭然今恭依睿旨再録元劄子紀𫝊事迹進上伏望聖慈早賜降出就集議庶使宣仁功德暴于天下不勝幸甚取進止仍連録白七月二十六日奉聖旨令從官一就集議右劄送吏部及尚書省等遵依已降指揮疾速施行建炎初國史院中留守司狀修國史院今月初八日凖尚書省劄子五月二日門下中書省樞密院同奉聖旨宣仁聖烈皇后保佑哲宗有安社稷大功姦臣懷私誣蔑聖德著在國史以欺後世可令國史院托實刋修播告天下其蔡確蔡卞邢恕蔡懋三省取旨行遣仍不得引用建炎元年五月一日赦劄送院者契勘本院史官止有翰林學士莫儔一員近往南京迎奉車駕所有令本院别差官合取自朝廷指揮須至申聞者右謹具申留守司伏乞備狀申朝廷别差官施行伏候指揮神自邵伯溫辨誣至此並從辨誣録出蔡惇直筆云宗朝元豐七年春宴中歇登延春閣寢得異夢驚起召欽聖憲肅皇后諭其所夢乃呼欽成朱后携哲宗來時方九嵗從上御集英殿詔捐宰執親王侍立御前觀築毬畢退歸時宰相王圭等進詩稱美元豐八年正月三日上暴病中風失音降赦自是疾勢日增國醫陳易簡在神宗朝診候最精素得上意是時宣仁聖烈皇后而下內外一委易簡進醫至二月末易簡求就寶慈殿奏事宣仁召見易簡進言曰官家終是劇惱娘娘去裏臣合萬死自數日來盡力扶持證候終不順臣每出外探朝廷議論却都無處置念臣醫術已窮扶持不去告娘娘早與宰相們理㑹宣仁泣誡易簡且多方救療尋召王圭等至寶慈殿宣仁曰適來陳易簡口奏官家病勢可憂言臣已扶持不去聞朝廷都未有處置告早與宰相們理㑹遂泣問王圭等合如何圭當首對而語素吃乃稱是字數聲宣仁曰相公們有甚難處是他官家有子孩兒最孝順自官家服藥來只食素寫經呼內侍出哲廟所書消災經二卷示圭等乃令延安郡王為皇太子至三月初五日太子即位是為哲宗皇帝蔡惇直筆與他書特異今附此景福殿使武信軍留後入內副都知熙河蘭㑹路經略安撫制置使李憲追入內副都知武信軍留後應熙河蘭㑹路差遣並依舊以憲遣將討賊有功特免勒停安州觀察支使管勾機宜文字鍾𫝊除名勒停郴州編管東頭供奉官閣門祗候書寫機宜文字李宇追閣門祗候右侍禁㸃檢文字蔣用左班殿直熙河北關守把兼制置司譯語米安並追一官罰銅十斤免勒停右班殿直皇甫旦除名勒停南安軍編管左侍禁通逺軍榆木岔巡檢何貴西頭供奉官熙河路監牧所指使張守禁並降一官免勒停憲等坐奏邉功不實下御史臺劾憲三問不承臺請追攝詔用衆證結案至是案奏特責之詔用衆證結案乃去年十二月辛未今依朱本并入此舊録李憲𫝊哲宗即位㑹臺劾皇甫旦獄具憲坐奏事異同罷內省職事降永興路都總管先是神宗委憲招納董戩斷夏人右臂憲遣皇甫旦使戩戩猶豫旦報不實故連坐責新録辨曰案皇甫旦事與神宗實録所載不同今以實録刪修新録李憲𫝊初詔憲遣問諭鄂特凌古結輝和爾達勒逹以撓夏人既而憲選右班殿直皇甫旦押二國首領赴闕復命齎詔諭董戩鄂特凌古出兵憲恚事不出已奏旦難以集事必無可為之理與初奏不同旦入蕃為青宜等所遏止冢山寺不得前又奏獲賊功狀上察之命追旦付臺獄遣御史就劾憲獄具罷內省職事降永興軍路都總管新舊𫝊並云降永興軍路都總管據實録乃云應熙河蘭㑹路差遣並如舊六月十六日乃責永興軍路副都總管新舊𫝊皆誤也章惇作王圭挽詞云自奉鸞臺直叨隨陟降蹤共陳尊聖嗣屢請罷軍容自注云自建三省惇與公便居門下元豐七年春語次與公同奏今上為延安郡王侍宴翌日門下省奏事請出閣之期因陳東宫之議大行皇帝諭以當俟來春又門下省每奏李憲怙權難親事語次惇言用李憲事不可為後法公歷數憲招權怙勢狀先帝頷之云當罷憲內職按二事皆惇于元祐初因圭挽詞自序云耳尊聖嗣事後乃自以為功誣奏圭有不臣之心故圭子仲修録白進呈眀其反覆罷軍容事亦必是因憲以邉奏不實罷遂冒為己嘗同圭納說今並不取更須考詳舊紀書武信軍留後李憲以違詔旨奏報不實降為宣州觀察使落入內副都知新紀不書朱文公語類神宗鋭意欲取橫山蓋得橫山則可據髙以臨彼然取橫山之地要又在永樂之城夏以死爭之我師大敗神宗聞喪師大慟聖躬由是不豫永按編年宣和元年童貫命种師道劉延慶等取夏國和等寨大敗夏人而還六月夏人納欵初夏人恃橫山諸險以抗中國慶厯中王嗣宗范仲淹建議收之㑹元昊納欵而止元豐中李憲建議又㑹王師失利神宗厭兵不克行貫嘗從憲得其規模政和初議進築至是十餘年遂得橫山之地夏人失援故納欵然國家是時已建平燕之策益以多故其後西夏與女真有約乙巳冬女真圍太原夏人犯河外則是橫山之取有以結怨于彼也須又曰神宗初即位富韓公為相問為治之要冨公曰是二十年不說著用兵二字此一句便與神宗意不合已而擢用王介甫首以用兵等說稱上旨君臣相得甚歡時建昌軍司户王韶上平戎策介甫力薦之初為秦鳯路經略司機宜後到通逺軍遂一戰而復熙河捷書聞上大喜解白玉帶以賜介甫賞其知人又加韶為龍圖閣待制以為熙河帥熙河本鎮洮軍因復其地改為熙州只是廣漠之鄉有之不加益無之不加損狃于一勝之後廟論一意主于用兵三敗至于永樂極矣永樂之敗徐禧死之禧師川之父黃魯直之妹夫也能文章好談兵有進策行于世文字甚好二蘇之文未出學者爭𫝊誦之
