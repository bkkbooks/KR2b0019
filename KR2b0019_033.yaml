body:
  text: 續資治通鑑長編巻二十九宋李燾撰太宗端拱元年春正月丙寅以大理評事王禹偁為右拾遺羅處約為著作佐郎並直史館先是禹偁知長洲縣處約知吳縣相與日賦五題蘇杭間人多傳誦上聞其名召赴中書命試詔臣僚和御製雪詩序稱㫖故皆擢用為直史館賜緋舊止賜塗金帶特擇犀帶寵之禹偁鉅野人處約華陽人也乙亥上於東郊親饗先農以后稷配遂耕藉田始三推有司言禮畢上曰朕志在勸農恨不能終於千畆豈止以三推為限耕數十歩侍臣固請乃止還御乾元門大赦改元民年七十以上有德行為鄉里所宗者賜爵一級丙子上作東郊藉田詩賜近臣因謂之曰國之上瑞惟豐年爾自累歲登稔人無疾疫朕求治雖切而德化未洽天貺若是能無懼乎庚辰詔諸道州府不得以司理參軍兼涖他職殿中侍御史龔頴編歴代年紀為二圖来上優詔褒之上以補闕拾遺任當獻納時多循黙失建官本意欲立新名使各修其職業二月乙未改左右補闕為左右司諌左右拾遺為左右正言先是有翟馬周者擊登聞皷訟中書侍郎兼工部尚書平章事李昉身任元宰屬北戎入冦不憂邊思職但賦詩飲酒并置女樂等事上以方講藉田稍容忍之於是召翰林學士賈黄中草制授昉右僕射罷政且令黄中切責之黄中言僕射師長百僚舊宰相之任今自工部尚書拜乃殊遷非黜之之義也若以文昌務簡均逸為辭庶幾得體上然之庚子昉罷為右僕射山西東道節度使兼侍中趙普為太保兼侍中給事中參知政事吕䝉正為中書侍郎兼户部尚書平章事上謂普曰卿勿以位髙自縦勿以權勢自驕但能謹賞罰舉賢能弭愛憎何憂軍國之不治朕若有過卿勿面從古人耻其君不為堯舜卿其念哉䝉正質厚寛簡有重望不結黨與遇事敢言每論政有未允者必固稱不可上嘉其無隱故與普俱命藉普舊德為之表率也䝉正晚輩後進與普同位普甚推許之陳王元僖進封許王韓王元侃為荆南湖南節度使進封襄王冀王元份為威武建寧節度使進封越王益王元傑為劍南東西兩川節度使甲辰始置建寧軍上手詔戒元僖等曰朕周顯徳中年十六時江淮未賔従昭武皇帝南征屯於揚泰等州朕少習弓馬屢與賊交鋒賊應弦而踣者甚衆太祖駐兵六合聞其事拊髀大喜年十八従周世宗太祖下瓦橋關瀛莫等州亦在行陣洎太祖即位親討李筠李重進朕留守帝京鎮撫都下上下如一其年䝉委兵權嵗餘授開封尹歴十六七年民間稼穡君子小人真偽無不更諳即位以来十三年矣朕持儉素外絶畋遊之樂内鄙聲色之娛真實之言故無虚飾汝等生於富貴長自深宫民庶艱難人之善惡必恐未曉略說其本豈盡余懐夫帝子親王先須克己勵精聽卑納諫每著一衣則憫蠶婦每餐一食則念耕夫至於聽斷之間勿先恣其喜怒朕每親臨庶政豈敢憚於焦勞禮接羣臣無非求於啟沃汝等勿鄙人短勿恃己長乃可永守富貴而保終吉先賢有言曰逆吾者是吾師順吾者是吾賊此不可以不察也樞密副使王沔為户部侍郎參知政事御史中丞張宏為工部侍郎樞密副使甲辰置建寧軍於建州本紀但載冀王兼領威武建寧二鎮而不書建寧始復軍額案㑹要兼領建寧乃在淳化四年本傳亦云然再益王既兼東西川疑越王不應獨鎮今從本紀丙午詔諸道民有艱食者所在發廩振之上謂宰相曰累年以来百物豐阜自京師逹於四方並無災沴五穀順成若非上穹降福何以及此今郡縣至廣生齒甚衆每聞一方小有凶歉即命賑給雖不能遍亦表朕勤卹之意也趙普對曰文王𦵏枯骨天下稱仁夫民猶草也草上之風必偃若帝王用心行道上合天意民自恱服臣等每聞陛下發言必思為蒼生建長利寧憂和氣之不降也己酉以屯田員外郎楊礪為庫部員外郎充襄王府記室參軍礪鄠人周廣順初遊澶州持所為文謁世宗嘗獨處僧舎夢一人衣冠甚古目礪曰汝能從我遊乎礪即隨往頃之覩宫衛嚴邃若非人間見大殿上真人服王者衣冠秉圭南向總三千餘衆礪陞殿禮謁最上者前有案置籍録人姓名礪見己名冠首因請示休咎真人曰我非汝師指一人曰此来和天尊異日為汝主也當問之天尊笑曰此去四十年汝功成余名亦顯矣礪再拜寤而志之礪初名厲以夢覩籍中礪字遂改焉至是受命謁見藩府歸謂諸子曰吾今見襄王儀貌即来和天尊也先是趙普再入相方立班宣制工部侍郎同知京朝官考課雷德驤驟聞之手不覺墜笏遽上疏乞歸田里又請對具陳所以上勉諭良久且曰卿第去朕終保全卿勿以為慮德驤固請不己壬子罷知京朝官考課仍奉朝請特賜白金三十兩以慰其心上勵精圖治欲聞讜論以致太平患羣下莫肯自盡以奉其上三月甲子下詔申警之曰四聰旁逹庶知乎物情百職交修用熈於帝載而有位之士頗尚於宴安納誨之任率多於拱黙期格於道不亦難乎應兩省諌官等職在箴規任司獻替至於政教之堙鬱典章之闕漏國蠧民瘼悉當上言無有所隱爰暨司憲實資繩愆儻因循而備員則尸曠以何甚所宜振舉職業申明紀律正其彈射以警姦回凡曰中都之官咸有攸司之局並當稱其祿秩幹於事任各懋迺績以副朕意其後上封事者頗衆有詔閤門非涉僥望乃許受之殿中丞直史館謝泌抗疏陳其不可且言外患方熾民政未乂狂夫之言聖人取焉茍詰而拒之四聰之明將有所蔽願采其可者行之不可者止之庶下情得以上逹泌歙州人也上嘗謂户部使李惟清曰朕讀漢書賈誼傳夜分不倦誼當漢文時天下治平指論時事尤為激切至云長太息堪慟哭者蓋欲感動人主不避觸鱗真忠臣明國體者也今廷臣有似此人者否惟清曰陛下登位以来親選貢士所謂俊彦盈庭者矣若言事中理少賜奬擢茍不知忌諱亦望含容即賈誼之流復出上曰朕之聰明雖不逮漢文然每上章言事未嘗不再三省覽求其理道稍或益國便民即付宰相行之識淺事乖寢而不報未甞加罪蓋欲開言路廣視聽若有言大事知大體者朕當擢以不次之位也樞密副使工部侍郎趙昌言與鹽鐵副使陳象輿厚善度支副使董儼知制誥胡旦皆昌言同年生右正言梁顥常在大名幕下故四人者日夕㑹昌言第京師語曰陳三更董半夜有傭書人翟頴者姦險誕妄素與旦親狎旦知頴可使乃為作大言狂怪之辭使頴上之仍為頴改名馬周以為馬周復出也其言多排毀時政自薦可天子大臣及力舉十數人皆公輔之器昌言内為之助人多識其辭氣知旦所為也李昉既坐黜趙普秉政深疾之開封尹許王元僖使親吏儀贊亷得其事白上捕馬周繫獄開封府判官張去華親窮治之馬周具伏上怒詔决杖流海島甲戍謫昌言為崇信節度行軍司馬象輿復州團練副使儼海州旦坊州顥虢州司户參軍上待昌言厚隨欲相之㑹普以勲舊復入惡昌言剛戾難制因是請加誅殛上特寛宥昌言既謫普又請行後命上不許乃止普始為節度使貽書臺閣體式皆如申狀得者必封還之獨象輿不却普謂其慢已故與顥等皆被重譴太平興國初侯莫陳利用賣藥京城多變幻之術眩惑閭里樞密承㫖陳從信得之亟聞於上即日召見試其術頗驗即授殿直驟加恩遇累遷至鄭州團練使前後賜與寵澤莫二遂恣横無復畏憚至於居處服玩皆僣乗輿宫殿之制依附者頗獲薦用士君子畏其黨而不敢言於是趙普使人亷得其專殺人及它不法事力於上前發之乃遣近臣就案利用具伏乙亥詔除名流商州仍籍其家俄詔還之普恐其再用有殿中丞竇諲者儀子也嘗監鄭州𣙜酤於是與班列言利用每獨南向坐以接京使犀玉帶用紅黄羅袋澶州黄河清鄭州將用為詩題試解舉人利用判試官狀言甚不遜普聞之召至中書詰得其實復令上疏告之又京西轉運使宋沆初籍利用家獲書數紙言皆指斥切害悉以聞普因勸上曰利用罪大責輕未塞天下望存之何益上曰豈有萬乗之主不能庇一人乎普曰此巨蠧犯死罪十數陛下不誅則亂天下法法可惜此一豎子何足惜哉上不得已命賜死於商州既而悔之遽使馳傳貸其死使者至新安馬旋濘而踣掀於淖而出換它馬及至磔於市矣聞者快之沆湜之従弟也普彊直疾惡類此或云普於中書接見羣官語次尋繹有言人短長者既退即命吏追録之事發引以為證由是羣官悚息無敢言者中書事益壅蔽中書事益壅蔽此據附傳然普三入相所謂命吏追録人短長殆皆竇諲事也普必當不如此而附傳則以為普素所蓄積皆如此則恐過矣故因竇諲事著此語且以或云畧見普未必當如此之意夏四月庚戍遣考功員外郎兼侍御史知雜事吕端起居舎人鉅野吕佑之使髙麗假内庫錢五十萬以辦裝還遇風濤帆檣折舟人大恐端恬然讀書不輟佑之悉取所得貨沈之迺止詔蠲其所貸五月辛酉置秘閣於崇文院分三館之書萬餘巻以實其中命吏部侍郎李至兼秘書監右司諫直史館宋泌兼直秘閣右賛善大夫史館檢討杜鎬為校理泌湜之兄也朝廷數以敕書招諭李繼遷及同惡蕃部繼遷亦嘗遣孔目官張浦詣知環州鄭德𤣥自陳歸順之意然繼遷終不肯降益侵盗邊境宰相趙普建議欲復委李繼捧以夏臺故地令圖之繼捧時為感德節度使即召赴闕辛未上親書五色金花牋賜繼捧國姓改名保忠壬申授定難節度使所管五州錢帛芻粟田園等並賜保忠壬午保忠辭之鎮賜賚甚厚命右衛第二軍都虞候王杲領兵千人䕶送之及還保忠以土物為贐杲拒而不納上知之召賜白金百兩杲齊人也閏五月己丑以襄州衙内都虞候趙承煦為六宅使承煦普次子也普再入相未始為求官上特命之普常戒其子弟曰吾本書生偶逢昌運受寵踰分固當以身許國私家之事吾無預焉爾等宜各勉勵勿重吾過故自宥密升宰輔出入三十餘年未始為其親屬求恩澤者近制宰相子起家即授水部員外郎加朝散階吕䝉正固讓止授六品京官自是為例此事見富弼作䝉正神道碑云䝉正長子従簡當得水部員外郎䝉正懇辭止授將作監丞因以為著例至今不易丙申賜諸道髙年百二十九人爵為公士秦漢以後不復賜民爵自藉田禮成始復賜焉先是翰林學士禮部侍郎宋白知貢舉放進士程宿以下二十八人諸科一百人牓既出而謗議蜂起或擊登聞皷求別試上意其遺才壬寅召下第人覆試於崇政殿得進士馬國祥以下及諸科凡七百人令樞密院用白紙為牒賜之以試中為目令權知諸縣簿尉謂樞密副使張宏曰朕自即位以来親選貢士大者為棟梁小者為榱桷今封疆萬里人無棄材日思孜孜庶臻理本也卿與吕䝉正等曩者頗為大臣所沮非朕獨斷則不及此矣宏頓首謝白凡三掌貢士所取如蘇易簡王禹偁輩皆知名而罷黜者衆因致謗議時知制誥李沆亦同知貢舉謗議獨所不及舊制鎻院給左藏庫錢十萬以資費用是嵗詔改支尚書祠部錢仍倍其數罷御厨翰林儀鸞司供帳先是開封府發解如諸州之制皆府官專其事是秋以府事繁劇始别敕朝臣主之定名訖送府發解如式遂為永制程宿衢州人此據登科記右諫議大夫李巨源謫授都官郎中知朗州巨源性訐直好言事上屢加奬激將有大用之意㑹貶巨源恃舊恩日夕望召還嘗語僚屬曰㑹當思我寧久居此後數嵗驛遞堂帖令乗傳歸闕巨源啟封見之大笑喜極氣絶而卒巨源以淳化三年十月癸未卒於朗州今附見御史中丞嘗劾奏開封尹許王元僖元僖不平訴於上曰臣天子兒以犯中丞故被鞫願賜寛宥上曰此朝廷儀制孰敢違之朕若有過臣下尚加糾擿汝為開封府尹可不奉法耶論罰如式百官表載此事於端拱元年不記中丞姓名及許王所坐何事今附見李巨源貶後殿中丞江陵夏侯嘉貞嘗為洞庭賦右散騎常侍徐鉉見之曰木𤣥虚之流也詞采又過焉上聞其名召試禁中擢右正言直史館兼直秘閣嘉貞喜黄白之術願為文字官常語人曰我得見鉛中銀錢而知制誥一日足矣嘗獻詩有歆慕青雲意上和以賜之戒其狭劣好進嘉貞尋病卒復以湖南為武安軍本紀於二月即云襄王兼領荆南湖南兩鎮至是復云改湖南為武安案實録襄王二月未嘗兼領湖南也疑復軍額後廼除節度本紀恐誤更俟詳考上既擢馬國祥等猶恐遺材復命右正言王世則等召下第進士及諸科於武成王廟重試得合格數百人丁丑上覆試詩賦又㧞進士葉齊以下三十一人諸科八十九人並賜及第葉齊邑里登科記亦無之上謂宰相曰今嵗炎暑尤甚流俗有言人生如病瘧於大寒大暑中過嵗寒暑迭變不覺漸成衰老茍不競為善事虚度流年良可惜也秋七月戊戍謂趙普曰卿耆年觸熱固應不易自今長春殿對罷宜即歸私第頥養俟稍凉迺赴中書視事普頓首謝八月甲子以宣徽南院使郭守文充鎮州路都部署上面命之曰夫用兵者必先須知敵彊弱明於動静賞罰必當但戢兵清野此大意也且朝廷以鎮定髙陽三路控扼往来咽喉若敵無所顧矜驕而来則出竒兵掩之萬不失一且於騎士一指揮内揀驍勇者間以弓矢槍劍分為十隊乃至三四百隊皆可制也又選廷臣押隊敵若敢踰鎮定汝但勿戰陽為怯勢隂置騎士朕即以駕前精銳徑發格鬭仍竊取敵號俟有必勝之䇿則分布隊伍縦兵擊殺若其未㨗各保城寨皆百戰百勝之謀也自能隨機設計為之便宜即不繫此中書堂後官闕宰相欲選於百司以補之上不許辛未以河南府法曹參軍梁正辭楚丘縣主簿喬蔚等五人並為將作監丞充中書堂後官堂吏㧞選人授京官為之自此始戊寅武勝節度使太師尚書令兼中書令鄧王錢俶卒上為輟視朝七日追封秦國王諡忠懿命中使䕶喪事葬洛陽俶任太師尚書令兼中書令四十年為元帥三十五年窮極富貴福履之盛近代無比庚辰車駕幸國子監謁文宣王禮畢升輦將出西門顧見講坐左右白博士李覺方聚徒講書上即召覺令對御講覺曰陛下六飛在御臣何敢輙升髙坐上因降輦命有司張帟幕設别坐詔覺講周易之泰卦從臣皆列坐覺乃述天地感通君臣相應之㫖上甚恱特賜帛百匹遂幸玉津園宴射辛巳上謂宰相曰昨聽覺所講文義深奥足為鍳戒當與卿等共遵守之趙普頓首謝九月丁未秘書監李至言著作局撰告饗宗廟及諸祠祭祝文稱尊號唐惟開元禮有之稽古者以為非禮且尊號起於近代請舉舊典饗宗廟稱嗣皇帝臣某諸祠稱皇帝斯為得禮従之冬十月甲子特置馬步軍龍神衛四廂都指揮使殿前捧日天武四廂都指揮使以振州防禦孔守正澄州防禦使范延召為之據孔守正傳云上以守正練習戎旅特置龍神衛四廂都指揮使以授之按實録龍神衛四廂盖與捧日天武四廂同置都指揮使范延召與守正並命今附見更須考詳癸未上謂侍臣曰朕每念古人禽荒之戒自今除有司順時行禮之外更不於近甸遊獵五坊鷹犬悉觧放之庶表好生之意遂詔天下勿復以鷹犬来獻是月以右諫議大夫樊知古為河北東西路都轉運使都轉運使自知古始知古即若冰也上為改名焉都轉運使始此實録不書據本傳及㑹要追記故不見其日更俟詳考又太平興國四年十一月髙繼申為河北南路都運使當時河北分兩路繼申止為南路故不為事始十一月契丹大至唐河北荆入㓂諸將欲以詔書從事堅壁清野勿與戰定州監軍判四方館事袁繼忠曰契丹在近今城中屯重兵而不能剪滅令長驅深入侵畧它郡謀自安之計可也豈折衝禦侮之用乎我將身先士卒死於敵矣辭氣慷慨衆皆伏中黄門林延夀等五人猶執詔書止之都部署李繼隆曰閫外之事將帥得專焉往在河間不即死者固將有以報國家爾乃與繼忠出兵拒戰先是易州静塞騎兵尤驍果繼隆取以𨽻麾下留妻子城中繼忠言於繼隆曰此精卒止可令守城萬一宼至城中誰與捍敵繼隆不從既而敵果入易州遂陷卒之妻子皆為敵所掠易州陷守將不知主名亦不得其月日但于此畧見事跡耳國史疎畧如此良可惜也繼隆欲以卒分𨽻諸軍繼忠曰不可但奏陞其軍額優以廩給使之盡節可也繼隆従其言衆皆感恱繼忠因乞之𨽻麾下至是推鋒先入敵騎大潰追擊踰曹河斬首萬五千級獲馬萬匹己丑㨗奏聞羣臣稱賀上降璽書褒答賜予甚厚按此㨗但定州路都部署及監軍之功也郭守文時在鎮州初不聞出兵相為犄角而實録本紀皆云守文上言破契丹於唐河不知何故今但據李繼隆及袁繼忠二𫝊刪修不復稱守文正傳亦云破契丹于唐河又㑹要云敵宼中山守文與繼隆出精兵背城而陣敵盡銳来攻繼隆號令將士一皷破之殺獲甚衆案守文自為鎮州都部署初未甞受詔至定州安得與繼隆俱出兵背城而陣也契丹傳雖云守文繼隆同出戰然亦無背城而陣等事不知㑹要從何得之當考實録又云契丹累嵗㓂邊頗為民患國家乃於鎮定髙陽關大屯兵甲以犄角之遣将之日上親授以成算至是果克㨗焉按此乃史臣歸美之辭恐非事實今不取十二月國子博士李覺上言曰夫冀北燕代馬之所生胡戎之所恃也故制敵之用實資騎兵為急議者以為欲國之多馬在㗖戎以利使重譯而至焉然市馬之費嵗益而廐牧之數不加者盖失其生息之理也且戎人畜牧轉徙旋逐水草騰騎游牝順其物性由是浸以蕃滋也暨乎市易之馬至于中國則縶之維之飼以枯藁離析牝牡制其生性𤣥黄虺隤因而減耗宜然矣又不同中國之馬服習成性食枯芻處華廐率以為常故多生息日無耗失古者田賦之法六十四井出戎馬四匹兵車一乗牛十二頭天子畿方千里提封百萬井除山川城池邑居苑囿二十六萬井不輸賦外六十四萬井出戎馬四萬匹兵車萬乗此賦馬之數也諸侯大者馬四百匹兵車百乗故稱百乗之家則天下之廣諸侯之衆戎馬之賦多矣是以唐堯暨晉皆處河北而北國不能為患由馬之多此馬並取於田賦不聞市馬於外也洎秦壊井田漢興阡陌兵車不取田賦戎馬悉従官給是以匃奴歴年為患由馬之少也故晁錯說文帝勸農功令民有車騎馬一匹者復卒三人謂免三人甲卒之賦也至武帝七十年間衆庶街巷有馬千百成羣乗牝者擯而不得㑹聚此則馬皆生於中國不聞市之於戎也今軍伍中牝馬甚多而孳息之數尤鮮者何也皆云官給秣飼之費不充又馬多産則羸弱駒能食則侵其芻粟馬母愈瘠養馬之卒有罪無利是以駒子生乃驅令齅灰而死其後官司知有此蠧於是議及養駒之卒量給賞緡其如所賜無幾而尚習前弊今竊揣量國家所市戎馬直之少者匹不下二十千往来資給賜與復在數外是貴市於外夷而賤棄於中國非理之得也國家縦未暇别擇牝馬以分畜牧宜且减市馬之半直賜畜駒之將卒増為月給俟其後納馬即止焉則是貨不出國而馬有滋也大率牝馬二萬而駒收其半亦可嵗獲萬匹况復牝又生駒十數年間馬必倍矣昔猗頓窮士也陶朱公教以畜五㹀乃適西河大畜牛羊於猗氏之南十年間其息無算况以天下之馬而生息乎上覽奏而嘉之本志覺疏在端拱元年不得其月日附之年末著作郎直史館羅處約上疏曰處約疏稱今春詔㫖則端拱元年三月甲子所降詔書是也上此疏必在此年終三司置十二員判官乃淳化四年事不知處約何以預言之豈端拱初已有此議淳化時方施行故耶今附見嵗末更俟詳考臣累日以來趨朝之暇或於卿士之内預聞時政之言皆曰聖上以三司之中邦計所屬簿書既廣綱條實繫將盡未善之規冀協酌中之道竊聞省中上言欲置十二員判官兼領其職貴各司其局允執厥中臣伏以三司之制非古也盖唐朝中葉之後兵冦相仍河朔不至軍旅未弭以賦調筦𣙜之所出故自尚書省分三司以董之然國用所須朝廷急務故僚吏之屬倚注尤深或重其任以處之優其禄以委之黽勉從事者姑務其因循盡瘁事國者或生於睚眦因循則無補於國睚眦則不叶於時或淺近之人用指瑕為心計深識之士以多可為身謀蠧弊相沿為日久矣今若如十二員判官之説亦從權救弊之一端也然而聖朝之政臻乎治平當求稽古之規以為垂世之法臣嘗讀傅説之書以為事不師古匪説攸聞又二典曰若稽古皆謂順考古道致乎治平以臣管窺莫若復尚書都省故事其尚書丞郎正郎員外郎主事令史之屬請依六典舊儀以今三司錢刀粟帛筦𣙜度支之事均在二十四司如此則各有司存可以責其集事今則倉部金部安能知儲廩帑藏之盈虛司田司川孰能知屯役河渠之逺近有名無實積習為常况此復都省之事下臣猶能僉知其可况在陛下聰明睿哲乎然議者以為不行已久難於改更若斷自宸心下於相府都省之制故典存焉上令下從孰為不可蓋人者可與習常難與適變可與樂成難與慮始在周易有之天地革而四時成此言能改命而創制及小人樂成則革面以順上矣况三司之名興於近代堆案盈几之籍何嘗能省覽之乎復三司之中更分置僚屬則愈失其本源矣今三司勾院即尚書省比部元為勾覆之司周知内外經費陛下若欲復之則制度盡在迨及九寺三監多為冗長之司雖有其官不舉其職伏望陛下當治平之日建垂久之規不煩更差使臣别置公署如此則名正而言順言順而事成省其冗員則息其經費故書曰唐虞稽古建官惟百夏商官倍亦克用又伏望法天地簡易之化建洪範大中之道可以億萬斯年垂衣裳而端拱矣上嘗謂宰相曰國之興衰視其威柄可知矣五代承唐季喪亂之後權在方鎮征伐不由朝廷怙勢内侮故王室微弱享國不久太祖光宅天下深救斯弊暨朕纂位亦徐圗其事思與卿等謹守法制務振綱紀以致太平上又曰至公之道無黨無偏有國者能行之太平固不難致趙普曰天發生於春夏肅殺於秋冬不私一物此所以能長久王者所宜法也
