body:
  text: 續資治通鑑長編卷五百十六宋李燾撰哲宗元符二年閏九月庚午朔朝請郎賈易特授保靜軍司馬邵州安置以易在元祐中嘗任臺諫內懷比德羽翼權臣誣毁先猷盜竊虛譽故有是命新本刪潤今止從舊昭宣使髙州刺史內侍押班閻安為宣政使以自陳年勞故也布録九月壬戌許閻安以勾當御藥院皇城司年月減殘零年月磨勘改宣政使熙河蘭㑹路經略司言據勾當公事王厚乞城廓州洮東安撫李澄乞城洮州緣收復青唐未了兼河北邈川總噶爾魯旺瑪爾布等城并斯圭鼎南宗堡接連夏國見令修築所有廓州并河南嘉木卓磋藏丹貝葉公城并洮州並係近裏今王厚李澄紛然陳乞事力難辦候收復青唐畢先將河北邊衝要城壁修備候明年相度河南漸次修繕詔令熙河蘭㑹路經略司審量措置為邊防經久之計青唐録云初孫路度青唐未可下請於朝廷乞先修邈川及河南北諸城然後進師按胡宗回師以九月十二日至熙州此奏不應猶是孫路當考曾布日城録庚午朔同呈王贍奏帶領兵馬到總噶爾承議郎知昌州文輅奉議郎通判泗州沈銜宣德郎持服人王髙淮南節度推官知逹州新寧縣張湜各特衝替奉議郎楊阜依衝替人例王髙候服闋日凖此以訴理所言輅等進狀語涉譏訕故也辛未知大名府韓忠彥奏乞顧募饑流民修城從之布録辛未駕部員外郎程堂提㸃永興軍等路刑獄壬申秦鳯路提㸃刑獄孫賁特衝替賁坐權秦州日用女妓夜筵無度及創修園亭過侈故也八月二十五日曽布云云詔知解州劉斐通判劉公明同監解池郭羣鄭安道張侁監安邑池蘇之純解敞劉世隆各特除名勒停送逐處編管劉斐永州劉公明道州郭羣袁州蘇之純筠州鄭安道桂陽監張侁沅州解敞全州劉世隆郴州判官崔貫之推官劉公瑾監門李景張琪安邑主簿劉忞虞鄉縣尉陳希髙各特勒停仍展五朞叙録事參軍權推官徐琮特衝替權判官髙興禮已係它罪衝替外特依衝替人例施行安邑縣尉畢大純特差替以解鹽池决溢斐等坐不謹視護故也熙河奏修會寧關功狀轉官減年支賜有差布録壬申詔蘭州造粗材應副㑹州修倉庫營房廨宇等自黃河沿流運致専委官管勾事畢推恩布録庚申宰臣章惇劄子奏臣今日據熙河蘭㑹路經略安撫使胡宗回狀軍前兵將官王贍等申青唐新僞主隆贊等出降及大首領結斡磋森摩乾展率諸族首領并在城蕃漢人部落子輝和爾等并契丹夏國輝和爾僞公主等並出城迎降者不戰成功平定一國雋偉敏速歷古所無臣欲與三省樞密院來日草賀初五日率百官稱賀從之舊録云其後章惇等草賀曰隴右河源久陷腥羶之域旃裘毳服俄為冠帶之民未閲旬時不勤師旅盡定羌胡之雜種悉復漢唐之舊疆恭惟皇帝陛下德合乾坤明齊日月恢神靈而變化廣恩信以綏懷鎮之以無敵之仁威之以不殺之武酋渠讋伏獻户版而請纓部落歡迎奉壺漿而夾道山川改色蛇豕革心臣等叨備近司預觀偉績舉數州之籍請增輿地之圖上萬年之觴願祝聖人之夀翌日宰相章惇等言取亂侮亡勢固宜於迎解救焚拯溺人久徯於來蘇詎淹纍月之期盡去一方之患竊以虞舜舞干之格初拒命於三旬周文因壘之降終退師而再伐元狩納昆邪之衆五鳯受呼韓之朝或已先自困於兵或不能略有其地曾未若無亡矢遺鏃之費絶飛芻挽粟之勞憺威四方拓土千里功斯須而告就事振古以少倫恭惟皇帝陛下乾剛而離明海涵而地載內陶鎔於九有外綱紀於八荒懷柔以文震疊有武乃眷河湟之近境是惟關隴之舊區自天寶之不綱召紇兵而赴難坐致異類盜據諸州唐室欲收復而無從先帝將經營而未暇雖加厚撫每持兩端㑹其乖離因以招納種落魚爛皆壺漿以迎我師將士鷹揚不血刃而舉其國極太䝉之地際震大宋之天聲悉俘戎王來獻魏闕三百餘年陷沒之故郡蕩滌塵氛數十萬衆強梗之生羌涵濡膏澤一新鐻鍝之俗舉為耕鑿之民包載干戈敉寧華夏自此始矣可謂盛哉臣等猥以非才叨居近列仰奉至神之略莫效涓塵獲觀不世之功惟知鼓舞惇等上殿又賀曰唐室不綱吐蕃肆虐致隴右河西之陷在乾元至德之間不守者踰二十州逮今茲越三百嵗歷代莫思於攻取先朝嘗議於經營有所未遑克開厥後恭惟陛下與天廣覆如日大明運至神於渺默之中成萬務於緒餘之末憫憐冠帶之俗厚辱犬羊之羣拯溺居懷乘機必發適凶渠之內潰命偏將以招携異類有壺漿之迎王師無血刃之事指揮已收於舊地腥羶丕變於華風功逺過於古先期不淹於旬浹臣等叨陪國政無補聖謀欣逄文德之誕敷坐致逺人之來格惟與蒼黔之衆共紓鼓舞之誠知樞密院曾布宣答曰不煩寸㦸坐定一邦青唐降王稽顙闕下捷書來上率土歡呼與卿等內外同慶新録辨云實録體制無載兩篇賀表者已載百官一表此表合刪去布録壬申是日熙河奏九月二十日收復青唐隆贊及森摩乾展結斡磋以下出降章惇獨奏乞以四日草賀五日率百官稱賀從之責授果州團練副使汀州安置孫升卒癸酉降充寶文閣待制新知瀛州陸師閔為陜西都轉運使兼都大提舉茶馬國子司業劉逵言朝廷立三學置博士教導事體均一欲乞今後律學博士闕從朝廷選通知法律人充從之詔詳議廟室之制曾􅌈周常為講議官王允中陳𤾉為檢閲官詔寶文閣直學士知熙州胡宗回特授寶文閣學士以收復青唐故也詔以青唐為鄯州仍為隴右節度邈川為湟州總噶爾城為龍支城廓州為寧塞城其鄯州湟州并河南北新收復城寨並𨽻隴右仍屬熙河蘭㑹路廓州為寧塞城布録在初九日實録亦同今并入此隴右録十月十二日王贍乃被鄯州之命不知何故如此遲滯并五日王厚湟州當考王贍特授四方館使榮州防禦使知鄯州充隴右緣邊安撫使兼都巡檢使种朴就差充熙河蘭㑹路鈐轄知河州管勾洮西沿邊安撫司公事應新收復城寨未差官處仰經略司一面選官勾當甲戍贍又改除詔昨差入內供奉官王逵自京至永興軍及鄜延環慶路寇順之自永興軍至涇原熙河蘭㑹秦鳯路往來催促傳送急遞文字近日奏報多有住滯詔各罰銅二十斤令入內內侍省添差使臣一員自永興軍以西至鄯州以來専一沿路提舉㸃檢根磨催促𫝊送熙河蘭㑹路及鄯州湟州應收復城寨等處往來急遞文字詔熙河蘭㑹路經略司候隆贊到熙州館舍供帳優加禮待所有森摩乾展青圭倫正結結斡磋畢斯布結等并其餘大小首領各令隨溪巴烏隆贊及轄正作兩番赴闕朝見其轄正一畨差入內供奉官黃經臣隆贊一畨差入內供奉官李榖並前去熙州照管進發務從優渥及定引見轄正等儀注上欲依冬至例與諸軍班特支曽布言冬至例支十七萬貫端午八萬貫此但祇應一日恐只須用端午例比冬至大約減三分之一亦有減半者似頗酌中兼僥幸之例誠不可啓上然之布録此假在十一月十二日庚辰今附此詔賜胡宗回已下銀合茶藥有差布録云遣中使押賜軍兵等特支樞密院言陜西河東路弓箭手合輪城寨上畨防托如妄稱疾避免上畨者杖一百將校節級降一資長行降一名若當職官并合干人不切看驗或知情容縱託病給假並委經略司覺察情理重者奏裁從之甲戍宰臣章惇率百官上表賀收復青唐惇等又升殿賀知樞密院曾布宣答降授內殿承制熙河蘭㑹路經略安撫司勾當公事王厚為東上閣門副使知湟州兼隴右㳂邊同都巡檢使十月二日厚始受湟州之命隴右録云不知何故如此遲滯并初四日王贍鄯州當考樞密院言王贍未降官以前係熙河蘭會都監詔王贍特除欣州團練使仍兼熙河路鈐轄所有除四方館使榮州防禦使指揮勿行先是黃履謂贍與遙郡賞薄曽布以胡宗回言贍専擅欲裁抑贍因請須贍撫定隴右一方有效乃與正任而上意欲稍隆之遂有是除欣團據隴右録實録但云正任不著州名三省言陜西州郡鐵錢自來即無輕重之别近日官司多置換銅錢以致民間疑惑錢輕物重今差都轉運使陸思閔轉運副使王博聞轉運判官孫軫提舉措置仍令陜西路並禁使銅錢違者徒二年配千里許人告賞錢二百貫又陜西民間見在銅錢並許於隨處州縣送納依數支還鹽鈔或東南鈔願以鐵錢對換者並支封樁錢仍限三年納換了當仍具一年約用鈔數申乞支降諸色人欲入銅錢地分許於陜府近便處官中兑換換到銅錢并官庫銅錢除量留換錢支用外並津置三門般運赴元豐庫納陜西鑄錢司計置到銅般運就京西近便處置監鑄造充朝廷封樁人匠並於陜西鑄錢監那移本路官鐵錢有缺損輕薄不堪支使者送監别鑄民間有私鐵錢限半年陳首免罪支鐵價違限不納依私錢法曉示從之十二月二十二日并元符三年十月末可考邵伯溫題賈炎家傳後云治平之末長安錢多物賤米麥斗不過百錢粟豆半之猪羊肉三四十錢一斤魚稻如江鄉四方百物皆有上田畝不過二千官員所携路費皆一色銅錢熙寧四年轉運使皮公弼初變范祥鹽鈔法增鈔面錢以廣緣邊糴買殊不知鈔價增則鈔法弊商賈不通物價貴矣至元豐四年邊費益侈遂增鑄錢自此錢法弊鐵錢日多銅錢日少矣鈔法既變尚用十二千買鹽鈔一席商賈等及仕宦罷官入京者將行至京師請銅錢六千比舊買鈔增半賣鈔猶用范祥法漕司差屬官一員在京師以朝廷嵗賜户部錢收鈔長安以至諸路州縣商賈通物價尚平川絹二千一匹河北山東絹差貴三二百他物凖此商賈尚多南商南貨尤多至元符初以鐵錢四千换銅錢一千於是銅錢始分不復同用矣時有部使者與時相鄉人素相善不揣其本直欲以法齊其末乃獻平銅鐵錢平物價平鈔價之說朝廷行下陜西諸路急若星火迅若雷霆民間大駭以至罷市道路不通行旅斷絶民不聊生時伯溫守官華州有漕司屬官數輩自長安來至華州已兩日不得食從者病不能行乃為具飯干郡官請劵米作麋粥方能行未幾朝廷知之聽其從便民間復安公私皆有損折而公家損折尤多至有京師請錢千萬緡隨手破用買宅舍居第出販百貨入陜西得善價以鐵錢准銅錢納官㳂邊糴買以鈔用鐵錢六千准銅錢六千請出鹽鈔私下賣十二千嬴其半入已乃以鐵錢六千之數與民間以見行平銅鐡錢數賤買民間行户物却將往他處貴賣以見行銅鐡錢買官中物却將往他處貴賣如此者不可勝數於是鈔價日貴商賈益不通物價日貴矣兩朝食貨志熙寧四年始鑄折二錢當考其日月伯溫云陜西民三被錢法變改之害政和元年三月二十三日丙辰十月二十三日壬子宣和二年三月十一日辛巳當並考河北都轉運司言昨據都大制置營田使司奏屯田務陸田每年所收不給所費欲依張承鑑申請屯田務陸田許人賃佃所得皆淨利其入户居止即不得創行遷近邊界詔令逐司相度施行新削乙亥西天北印度克實密爾國僧和爾寧格爾根法名剛噶拉入見賜僧衣分物新削宣慶使密州觀察使入內押班藍從熙為景福殿使以年勞故也監察御史權殿中侍御史石豫言駙馬都尉王詵輒恃豪貴抑勒顧人取捨之間不畏公法伏望詳酌指揮詔王詵特罰銅三十斤詵匿藏婦人教令寫文字投顧及虛作逃亡跡狀故也樞密院言今來熙河路已收復青唐邈川等處城寨其洮疊一帶慮有招納未盡部族令胡宗回應洮疊招納部族及修築城寨専委李澄仍委包順同招誘早令出漢其合建置州縣城寨去處應干措置事件從經略司相度仍仰王贍王厚更互出入巡警務令人情安帖青唐録云時疊宕一帶部族大首領彭布錫卜薩等亦乞歸附詔李澄包順専行招誘已上見閏月六日其鄯州湟州寧塞龍支阿爾等城斯桂鼎南宗堡係要害之處令先修繕仍令李澄相度合建洮州利害聞奏已上見十月九日於是胡宗回言自河州安鄉城過黃河入邈川雖屬洮西而道險餉艱乞於蘭州西關堡繫橋通路直入邈川不惟其路坦夷且郵置殊近可以互相照應兼宗河漕運亦便其宗河東岸近北舊有阿密鄂特城乃西畨舊防守夏國該珠卓羅等城之處今城見全略行修築安置樓櫓可以守禦從之已上見閏月七日按宗回奏請與相度建洮州利害初不相關青唐録聨書之非也今仍舊各附本日遣秦鳯戍兵十指揮應副熙河新邊戍守布録乙亥試給事中兼侍讀趙挺之言差充賀北朝生辰見領詳定編修國信條例有北道刋誤志本所將諸州供到古跡人物宫觀寺院與别書校對例有不同或交互差舛己子細考據編修及接見北使書狀儀式未能全備欲乞因令就行詢訪體究纂記緣路看詳修潤從之丙子寶文閣待制新差知河南府孫路知瀛州寶文閣待制李琮知河東府八月十六日自熙州改河南十一月八日加寶直寶文閣待制陸師閔知永興軍兼都大提舉茶馬事其新除陜西都轉運使告納繳監察御史左膚言竊聞起居郎孫傑昨奉使淮浙有違法不公事乞施行詔令郭茂恂取索公案看詳體量詣實以聞新無樞密院言熙河蘭㑹路經略使胡宗回奏自來自河州安鄉城過黃河入邈川雖是洮西本路緣道徑迂險般運艱難臣近體問得蘭州西關堡近西地名把珍旺相近可以繫橋通路直入邈川不惟路徑平坦兼道里甚近可以互相照應兼可以於宗河行船漕運直入邈川其宗河口東岸近北舊有邈川管下阿密鄂特城乃西蕃舊防守夏國該珠卓羅等城去處今城見全備略行修築安置樓櫓可以守禦從之詔新擒西界監軍額伯爾送潭州編管給官屋居住月支錢十貫米麥三石委都監監管無令失所詔轄正隆贊已下相次赴闕御宣德門受降以諸班直及上四軍排列仗衛諸軍素隊自順天門陳列至宣德門其轄正隆贊已下各服蕃服引見𫝊宣審問德音放罪訖各等第賜幞頭袍帶宰臣率百官稱賀再御紫宸殿賜宴令所司各詳具儀注及合行事件以聞丁丑降授禮賔使權發遣秦鳯路鈐轄李沂知階州依舊秦鳯路鈐轄以收復青唐差官奏告太廟諸陵詔賜永祐陵東南明光神廟為靈原廟以有司言舊有泉出至廟下伏流去年補治溝井潛泉忽通流故也吏部言差任未滿而朝廷升移者許通理前任滿日雖在官聼關升從之御史中丞安惇言伏覩王吉甫授蔡河撥發臣昨被㫖看詳訴理文字辟吉甫充管勾官吉甫觀望畏避不肯就職詔王吉甫與合入知州差遣差知磁州王吉甫初自大理寺丞除撥發在八月十八日詔李公弼陸彥回李復杜談王針李惇禮謝瑾鄧球方希哲董䕫袁符劉唐股各特衝替馮豫崔振王申周惟和張松年郭復張寶臣王常張茂先各特差替並坐訴理言涉詆訕故也戊寅朝請大夫直祕閣知荆南吕仲甫右朝議大夫提舉崇福宫賈青朝散大夫新除太府少卿鄧祐甫朝散大夫新提㸃秦鳯等路刑獄游嗣立朝散大夫新知同州李孝廣朝散大夫新江東轉運副使朱伯虎承議郎權福建轉運判官張康國通直郎權兩浙轉運判官曾孝友朝散郎充睦親廣親北宅講書郭附朝奉郎發運司管勾文字葉宗古並特降一官坐奉使淮浙等路各用妓樂宴集為察訪司所糾故也詔入內供奉官見寄皇城使遙郡刺史劉瑗授昭宣使仍寄資奉議郎前知江都縣吕振追出身已來文字除名勒停撫州編管坐自盜官木造禪床等罪故也詔上清儲祥宫住持洞元通妙大師劉混康歸茅山從其請也詔寧塞城置知城一員監押巡檢各二員招置北城兵士一百人熙河蘭㑹路經略使胡宗回言今相度鄯州合置知州通判簽判司理司户參軍兼録事司法各一員兵馬監押巡檢各二員置保寧一指揮廂軍湟州寧塞城共置一將正將於湟州副將於寧塞城駐劄馬軍兩指揮步軍三指揮湟州北城一指揮廂軍本城一指揮鄯州置一將充熙河蘭㑹路第八將湟州寧塞城共置一將充第九將所有將副令經略司選官聞奏舊特詳今從新供奉官䕫州路走馬承受程允武言知南平軍髙權通判張及不和又轉運司差前勾押官王祐之根括南平軍地土租稅等事稽滯詔允武罷走馬承受轉運司官不應差王祐之各罰銅二十斤漕司官罰金以布録增入詔起發元豐庫朝廷封樁錢物者諸門限一日報元豐庫違限及輒令别庫交納者杖一百新無庚辰右司郎中徐彥孚言去年鹽池被水蓋因凍水姚暹渠樊家堰小池等處人户故盜决南岸使水入池緣凍水姚暹渠兩處堤岸并更有小池樊家堰自來止委逐縣尉管認巡覷又緣鹽池周圍及姚暹渠凍水河隄堰地步不下數百里照管不前今欲乞更差兵士一百人添小使臣一員令分管姚暹渠凍水河小池樊家堰并大池四圍堤岸去處從之詔鄯州支公使錢四萬貫湟州二萬貫龍支城三千貫樞密院言涇原路經略司奏第十二將折可適收接到蕃官格埒克歸漢係大首領為無照據故且補三班差使近據統制副都總管王恩申格埒克領部落子一十人入西界逄西賊人馬鬬敵獲一十四級招降到七十二人詔格埒克特補右侍禁熙河奏乞降空名宣劄各一百五十紫衣師號牒一百以待新羌從之布録庚辰辛巳通議大夫守尚書右丞黃履罷尚書右丞知亳州以議論迂闊朋比懷姦動搖國政命令已出退有後言故也鄒浩之竄新州履言浩以陛下所自拔擢平昔優奬之故遂敢犯逆鱗而陛下遽斥之死地人臣孰敢為陛下論得失乎上愕然曰卿言甚有本末朕當徐思之此據履𫝊當考履退遞降責命履是日留身奏事有四劄子置御榻上曾布再對上語笑如常晚歸西府聞履罷政然未知其詳履亦未之知也章惇蔡卞先於都省晚聚時已得中批然不以告履翊日履欲造朝門下吏告之乃止告命四更已過門下及指揮下閣門矣履既貶上諭布曰履有四劄子救鄒浩當時不言既以奉行乃如此必為人所使又曰吕嘉問兩日前嘗謁履又問吳居厚可尹京否蓋欲逐嘉問也布再對遂請於上曰履昨留四劄子所陳何事上曰四劄子皆引故事一唐介二朱雲三劉禹錫又曰履是吕氏客布曰履實出吕氏門下然履蠢野不識忌諱上曰履純蠢不曉事必為人所使又問嘉問幾壻布曰不悉記上曰蹇序辰曾誠皆是又曰曾誠如何人聞多預事布曰章惇不喜誠云安燾傾惇誠多預謀然未知虛實又問蔡卞兄弟不協布曰外議多言如此然不知其實大扺言爭先作執政爾上曰妻亦不和至不相見布曰臣與之瓜葛亦粗聞之誠不相得然不至不相見也是日章惇留身甚久布疑上所問皆惇所奏也此當考詳祐聖邸報三省同奉聖㫖黃履身居執政議論迂闊朋比懷姦動搖國政况履所行之事悉出朝廷奉行之始既有未當自合明議以正得失豈可面從而退有後言為臣不忠無甚於此可落職知亳州替何琬仍放謝辭敕朕惟二三執政股肱之臣所與圖事揆䇿協心一慮以同底於道或異意以害政則朕亦不得而私焉具位黃履議論迂闊不足有為朋比懷姦動搖國政况所行之事悉出朝廷得失是非固當明辨豈可命令已出退有後言為臣若斯朕復何望宜罷綱轄往守藩條其益省循無重尤悔可特罷尚書右丞知亳州郭知章行又履到任謝表云伏奉敕命差知亳州已於今月三日到任祇奉宸綍出守侯邦初見吏民已頒政令中謝伏念臣舊迹踈逺逄辰明昌先帝拔為憲司陛下登以政府恩重泰華身輕毫釐竊慕古人少禆聖治既奉厚誣之遐棄忽令將諗之無從因思裴度已成之言遂成汲黯屢發之戇退量冒昧合置誅夷敢意深慈猶除近郡兹蓋皇帝陛下篤於舜孝推以堯仁致兹狷介之愚膺是宣承之任恐懼修省志當勵於崦嵫遍覆包涵德敢忘於旻昊履所稱厚誣遐棄將諗無從等語或可考尋當時所坐事實故附此徽宗實録黃履𫝊云右正言鄒浩論事竄新州履奏浩以陛下所自拔擢平昔優奬之故遂敢犯逆鱗而陛下遽斥之死地人臣孰敢為陛下論得失乎帝愕然曰卿言甚有本末朕當徐思之又云㑹鄒浩以言事貶新州履奏乞徙善地出知亳州𫝊語重叠殊不可解當考三年二月己亥曾布云云可考九月二十五日注忠佞録合移入此陜州司理吕濬為匿稅亡失官文書前知蘇州吳縣丞吕汴為令馬永觀去浙路閃避察訪及燒子弟往復書簡並候服闋特依衝替人例新無前知蘇州王子京將發運司兵級公人借過錢米判狀繳申發運司特罰銅二十斤新無御史中丞安惇言乞立法應在京諸官司承受一時聖㫖並専置簿抄上嚴切檢舉從之新無詔諸供官之物轉運司預先相度計置錢令本州選官於出産要便處置場作料次請比市價量添錢和買並許先一年召保請錢認數中賣如輒拋降下縣收買及製造物色者並以違制論不以去官赦降原减提㸃永興軍等路刑獄劉何復任劉何復任在五月一日知樞密院事曾布言臣待罪兩府凡措置應接邊防事無非臣躬親斟酌草定三省於其間不過移易一兩句語言其措置大槩亦無以易臣所定臣雖愚短不敢不自竭然亦嘗恐思慮有所不至但自度亦不至大假乖謬近日以來聞三省益不喜每事掎托窺伺無所不至昨放罷劉何及陜西科配衲襖降官并置西安州以未進築了不關報門下省聞皆以為非此三事皆與三省同進呈誠令不當非獨臣罪况别無不當者此等事度亦不敢於陛下開陳但倡之於下以疑衆聽爾臣不敢不一一奏知者臣不言即陛下無由知爾臣常以喋喋冒聖聽為戒然事不得已須至開陳望陛下恕臣喋喋之罪上曰豈有此事皆三省同呈何害但云劉何不干他事故與復差遣布唯唯而已是日五月甲寅也翌日以同罷劉何提㸃刑獄等三事進呈因言劉何本以王發申陳鄜延保甲日顧一夫陪錢三貫吕惠卿及監司皆怒後河中被顧者經察院訟保甲顧役七十餘日缺錢一百三十餘貫不還乃知發所陳不虛蔡卞等衆議以何緣此捃托王發不公故共罷之何此罪甚明無可疑者又王發訟何私事皆不經推究不知三省何以知無罪便與復差遣似此欺天罔上之事皆臣所不敢為上色變既而河中府推勘官王克柔申劉何差官體量王發不公事又係替後及非所部於法不當受理見禁二百餘人皆無罪有自去冬入禁者布録此假在五月二十五日丁卯翌日布獨進呈克柔狀因言三省云劉何是奉行密院指揮勘慕容將美以此為不當罷今檢到元文字乃是三省同簽書兼王發指論劉何不公事未經推究而劉何按舉王發又是違法兼非所部不知劉何如何便復差遣許將蔡卞對臣亦以為當罷卞又云章惇不曾商量是立談間復了劉何差遣上曰莫須曾商量布曰此事欺罔太甚臣亦曾說與卞云此是諸公誤丞相卞怒曰如何却是諸公誤之布曰諸公隨順便是誤惇若臣與惇同列必以理爭如此則惇亦無過舉矣此事當與三省同進呈然不敢不先奏知退以推勘官狀示惇惇曰已見布曰如此劉何莫須罷惇曰好布曰不爭則已爭則布可罷劉何不可不罷又以同簽書批狀示惇又翌日同進呈布曰劉何按舉王發違法不合受理兼王發指論劉何不公事未見虛實及劉何攟拾王發慕容將美情狀甚明不知何以便復差遣臣不敢喋喋乞令三省敷陳惇曰劉何按慕容將美似若無過兼是密院指揮故三省商量與復差遣布曰蔡卞言不曾商量只是立談間復了惇卞皆默然布又曰劉何本以密院職事罷若三省以為可復亦須與密院商量却一靣進呈復差遣是何意外議皆言三省意謂密院罷何三省却復但欲形迹密院爾然劉何職事乖謬如此何可復作監司惇又曰劉何恐無若此事布曰惇與何是親豈可一向為何說道理惇曰臣不敢避此嫌布曰所言公則不避嫌可也王發實有罪朝廷足可施行劉何職事乖謬亦當罷卞曰王發劉何皆可推治何且移一差遣或權罷皆可布曰以臣所見劉何終身不可為監司欲移之何地權罷尤不可依舊是本路監司如何推鞫得實何在永興路怒王發不合申陳保甲陪錢便攟拾王發在秦鳯路怒慕容將美直申秦鳯妄冒功賞事便勘將美何為監司所至怙權作威䝉蔽朝廷如此無乃不可上曰兩人俱有罪總令推勘權罷亦不可須令罷差遣許將曰自朝廷差勘官去為便上曰朝廷差大理官去布曰誰可差者許將曰大理正朱牧布曰臣未敢保牧緣劉何是惇親又三省有曲主何意勘官恐不免觀望乞謹選三省能禍福人若事如意必遷擢若違咈禍患立至樞院不惟不能禍福人兼臣亦不敢如此人亦不畏既差開封府推官曹調為勘官曹調有傳在宣和元年九月載調勘劉何當考李邦彥作曹調墓志云永興提刑劉何以事有劾詔調即治曰大臣與何不相中中書密院更狀其罪卿為朕往其持平無顧望調曰三尺天下平罪有所麗陛下不能使臣重輕何大臣也哲宗歎其言果得實上曰此事莫不難勘布曰王發罪狀已明但劉何事要推究恐觀望爾曹調必對乞更賜戒飭布又欲於昨日所批聖㫖內添入劉何按舉王發及勘慕容將美有無攟拾因依情狀及觀望出入人罪制勘官吏並當法外重行斷遣惇指陳曰密院又於昨日聖㫖內增添此數節上曰何故卞曰夜來三更方送來布曰王發事欲盡勘劉何事豈可只勘一半卞曰劉何攟拾事狀只可看詳無可勘布曰如此須是朝廷看詳欲只移此一節在後云劉何攟拾因依情狀候案到取㫖上曰如此莫好卞亦以為然布初以為王發不須勘朝廷據罪狀勒停衝替無不可惇曰發有贓罪何可不勘布曰如此只是要結正王發贓罪為劉何快意爾上又問劉何勘將美在申陳秦鳯妄冒前或在後卞曰在先布遂檢元申將美是六月二十八日申七月九日差徐彥孚制勘劉何是七月二十三日方申勘將美豈是在先兼王發是前年十一月替去年二月差官體量至十月方牒轉運提刑司施行如此非攟拾而何布再對又言兩日以王發事喋喋冒犯聖聽實負皇恐然業已開陳不爾則事理不明三省近日以來窺伺密院不一臣亦曾說與蔡卞等云人皆怕執政及臺諫官惟臣不怕何以故臣不作過兼職事不至乖謬但請搜尋檢㸃恐無不當者三省職事外議𫝊笑者不一葉祖洽嘗云章惇為勘當他孫子理親民差遣不明罵他作鶻突尚書祖洽云此固不敢避但恐三省鶻突更甚爾如孫傑自察訪回乞先次上殿却送吏部勘當卞亦云豈獨此事鍾正甫上殿乞選守令及學官以厚風俗亦送吏部勘當此猶可笑布對三省亦於上前云三省㸃檢密院不當若不於密院前開陳或可信若對密院開陳恐難屈三省文字凡合與密院簽書者十有八九不當須退難如臣所改定乃敢著字又曰刑部勘當劉何事住滯不當侍郎郎官皆降一官乞令三省檢尋自來六曹勘當公事住滯不當有例曾降官否三省皆默然無以對是日晚歸布謂許將曰兩日喋喋非得已也將曰如此亦足矣此假在五月二十八日庚午於是勘官以具獄上詔劉何與遠小知州王發特勒停閏九月十二日辛巳何發獄始竟自五月末差勘官至今凡一百三十餘日壬午奉議郎校書郎國史編修官吳伯舉為著作佐郎伯舉七月十二日校書十二月二十二日為左史權殿中侍御史左膚言權知開封府吕嘉問慢令不欽違法徇私等事乞賜施行又奏嘉問先任發運使就除知青州日未赴任間先令客司般載本家米往新任出糶乞施行又奏近彈奏開封府通判引散官兑買姓李人茶肆見行兑買未了乞照㑹施行詔令吕嘉問分析以聞新本自又奏以下至施行削去布録乙酉聞左膚言嘉問六事有㫖令分析王贍奏已於收到青唐銀絹內量行支賜將佐布録壬午九月十九日可考癸未御史中丞安惇言欲應陜西沿邊收復故地并納降疆界內有羌人墳壠及靈祠寺觀等不得輒行發掘毁拆從之涇原路凖備將皇城使孫文副將皇城副使許元凱降一官並降充凖備將領依舊管勾第三將副公事權同副將凖備將領西京左藏庫副使翟士彥降一官降充凖備差遣以不體採西賊動息致八巡檢入生界為西人掩殺使臣并弓箭手故也乙酉吏部侍郎徐鐸言乞今後知盜所在屬實而賊雖起離本處能襲蹤於五日內獲者並依條推告賞從之詔東頭供奉官權鎮戎軍平夏城監押劉賁特貸命除名勒停留充本路極邊巡防使喚賁坐擅殺斗子李立以纍立戰功特從寬宥也丙戌權殿中侍御史左膚言竊聞宗室果州團練使仲忽得古方鼎一飾以龍文旁有𨽻識曰魯公作文王尊彛銅色正緑伏望宣取詔儒臣博加考議詔令禮部取納三省看驗可削樞密院再對曾布言皇后殿內臣江有慶合轉副使寄資故事非殿閣使臣不得寄副使而近例有特㫖許併理磨勘亦名異而實同爾然太妃殿有兩人一寄資一併理未知太后太妃皇后殿合作殿閣否上曰恐非殿閣可令入內省詳定聞奏申樞密院布以為太后太妃皇后皆有殿然恐非謂殿閣也布録丙戌既而得㫖太后太妃殿祗應使臣同殿閣皇后閣凖此布録十月己酉今并此丁亥詔涇原路經略使端明殿學士太中大夫章楶降授中大夫餘如故蔡卞以楶稽留朝廷命不即修置烽臺白上亟責之曽布謂楶奏報雖緩然未闕事也章惇殊不平之是日河南叛酋朗阿克章舉兵圍葉公城此據隴右録十月三十日趙吉等乃突圍出戊子三班奉職閣門祗候劉安民為供備庫副使閣門通事舍人帶御器械右班殿直劉景年為西京左藏庫副使兼閣門通事舍人三班奉職閣門祗候劉安澤為內殿崇班秦鳯路奏疊宕一帶部族大首領彭布錫卜薩等乞納土歸順詔令撫存接納布録戊子樞密院乞抽還鄜延一將兵馬以嵗滿故也吕惠卿言戍兵年滿不代人情未安兼窮邊物貴地寒戍兵已截襟抽絮以自給曽布謂惠卿言極激切蓋欲得戍兵為代耳因白上直抽歸營上深以為宜布退與三省言亦莫不笑惠卿也布録戊子尋又直抽秦鳯戍兵五指揮布録壬辰今并此庚寅詔催河北州軍責限修城仍令先具合責年限聞奏布録辛卯兵部侍郎兼權吏部侍郎黃裳等言乞巡檢除三路依材武格外控扼重兵去處五日排次限滿更滿五日無應格人即取守城隨軍被賞免短使及呈試中武藝升半年名次已上并曾歷巡檢監押任滿無遺闕人庶幾差注稍通從之樞密院言熙河蘭會路經略使胡宗回奏近收復青唐了當所有僞王子應干僭擬乘輿服御之物金銀佛像本司已指揮王贍差使臣管押赴闕及轄正先進獻真珠一黃絹袋并𫝊國印及朔方軍節度使等印共四十四面二匣詔轄正等僭擬乘輿物色等令經略司選差使臣先次管押赴闕立吏部奏舉使臣邊任上樞密院銓量聽差法布録壬辰詔沙苑監依舊撥屬提舉陜西等路買馬仍以提舉陜西等路買馬監牧司為名江淮發運司兩浙轉運司言今來潤州京口常州奔牛澳閘興造畢見依提舉興修澳閘兩浙轉運判官曾孝藴相度立定法則日限啓閉通放綱船委是經久可行從之先是曾布具河北兵將數進呈及熙寧中嘗以相州一將兵出戍河東欲令更戍秦晋及别置額減舊額以給新軍上深然之退與三省議亦皆以為可是日詔遣河北第十三將戍涇原第十七將戍河東又以河北水災流民頗衆於大名府等三十二州軍增置馬步軍共五十六指揮共三萬餘人案布録云遣河北第十三將戍河東不言戍涇原又大名府等二十二州軍增置馬步軍共五十六指揮共二萬餘人皆與此異是年十月壬子詔㫖正與布録同應是此誤馬軍以廣威步軍以保捷為額並依陜西蕃落保捷給例物請受却於舊將兵內每指揮减一百人共减一萬七千餘人布因為上言河北增兵及减舊兵額并差戍他路皆前人所不敢議若非聖斷睿明何敢建此議然人情難測萬一小人有凶肆者鼓倡撓法或所不免惟在朝廷主張彈壓爾京東土兵亦嘗殺巡檢作過先帝用兵西方慶州亦有變此事雖未必然恐萬一有之不敢不先奏知上欣納三省亦稱善十月十三日詔當參考或移此入彼陸師閔奏乞買馬司依舊兼監牧及增公使錢從之布録壬辰轄正隆贊雖相繼出降然其種人本無歸漢之意議者謂議者即王愍與李逺言青唐四不可守逺有青唐録汪藻刪修遂沒愍逺姓名方今王師不先修邈川以東城壁而取青唐非計也王贍不顧後患遽入其地可謂無策以今日計之青唐有不可守者四自炳靈寺渡河至青唐凡四百里道險地逺緩急聲援不相及一也羌若斷炳靈之橋塞星章之隘我雖有百萬之師倉卒不能進二也贍提孤軍以入四向無援兵羌人窺伺必生他變三也設遣大軍而青唐總噶爾邈川食皆止可支一月內地無糧可運難以久處四也羌初謂漢舉大兵來今見人馬止是其反在朝夕耳又軍士自會州還者皆憔悴衣屨穿缺器仗不全羌視之益有輕漢心九月末森摩乾展日集羌百餘人於僞宫禁前比馬首而語解羌言者潛聼之皆不可聞人知其必叛是月辛未捕得青唐所遣夏國乞兵者四人斬於市乃知森摩乾展等與斯納阿克節謀欲使逐漸各遣質入城於閏月九日內外相應復奪青唐及戊寅山南諸羌果先叛贍選輕騎二千付部將李忠等夜入冷谷擊之明日諸羌皆應贍乃捕森摩乾展而下十八人囚之羌遍滿四山而呼晝夜不息贍自守西城東城命王瑜等守之羌十餘萬持薪負户欲焚門而入前三日有結斡磋弟碩阿蘇者乞心白旗出城招撫至是反率叛羌攻城甚力㑹李忠逾南山入本敦谷討蕩山南族帳乘勝解阿爾之圍而還適與羌遇始交鋒我軍頗衄蕃官李楞占納芝死之鏖鬭良久羌大敗而奔自相蹂踐墮崖谷死者不可勝數少頃四山不見一人辛巳贍先戮大首領結斡磋森摩乾展凌卜齊巴錦瑪森摩凌瑪德巴本巴沁布嚕克斯多達馬羅等九人悉捕城中諸羌斬之積級如山總噶爾首領嘉沁扎實擒碩阿蘇以獻亦誅之贍初入青唐詰綽爾結曰爾既召王師而復迎立隆贊何也對曰迎立隆贊非欲拒官軍蓋羌人貴王種雖溪巴烏事佛不校而隆贊年漸長恐為異日之患故以計致之欲絶禍根也贍深然之而贍諷諸酋籍羌人勝兵者黥其臂是時諸酋已畜姦計故遷延未有應者綽爾結自言請歸率本部先籍為兵以倡諸酋贍從之綽爾結得去遂連結外叛青唐圍解綽爾結猶與濟實木收合散亡保青唐峗以自固先是羌人以數千人圍邈川壬午夏國遣星多貝中達克摩等三監軍率衆助之合十餘萬人先斷炳靈寺橋燒星章峽棧道四面急攻城中兵才二千四百餘人器械百無一二總管王愍令軍士撤户負之為盾剡木墨之為戈籍城中女子百餘人衣男子服以充軍童兒數十人以瓦炒黍供餉募敢死士三百人冒以黃布巾愍年六十七矣身被甲跨馬率死士開門出戰門上預穴竅投巨石磔數人死羌莫敢前城南隅多嵌竇羌蔽以穴城矢石不能及愍乃撤屋為炬擲穴上火盛通穴穴中人皆焦羌人移攻北水寨入之愍率敢死士開門疾擊梟百餘級羌乃環射城中城中之矢如蝟士多死傷至取矢以㸑羌破納木宗堡獲城官劉文圭驅至城中曰吾所欲城與地耳第以城歸我當送君等自金城關歸漢愍謂文圭曰為我語夏賊漢天子俾我守是賊能殺我城可得也伏弩射文圭不中羌擁文圭去邈川被圍自戊寅至壬辰凡十六日戊寅閏月九日壬辰閏月二十三日是日羌於南門積薪數萬欲焚門及拒闉城中憂懼莫知所為會經略司遣蘭州苖履河州姚雄提㸃秦鳯等路兵渡河及朝廷遣涇原路準備將領李忠傑將選鋒來援自羅格斡楚黑城轉戰而前焚蕩族帳廣數百里煙塵亘天羌不知我兵衆寡遽引兵渡湟水去溺死者數千生擒僞鈐轄威明伊特允凌并獲繡旗等當是時邈川非王愍幾殆總噶爾亦自戊寅被圍至戊子凡十日而解戊寅閏月九日戊子閏月十九日癸巳差苖履姚雄見閏九月二十四日實録於二十四日癸巳書熙河都鈐轄王愍邈川知城馬用誠等言今蕃賊約四千人圍湟州城已分擘人兵於城上鬬敵經略司已差苖履姚雄帶秦鳯等處兵馬渡河前去㑹合應援詔巳差發秦鳯兵將及涇原路準備將領李忠傑揀選部落兵前去應副外令熙河蘭㑹路經略司速指揮新差官兵將官等張大兵勢廣逺斥堠務要穩審决保萬全按此事已用青唐録所修今更不别出唯詔語青唐録不載然圍既解矣雖不載可也實録又於十月十一日己酉書樞密院言熙河蘭㑹路經略司言閏九月十日邈川部族背叛係王愍躬親率將士掩擊次日夏國遣賊馬數萬合勢攻圍愍等晝夜掩擊殺賊約千餘人生擒按僞鈐轄威明伊特允凌并奪到繡旗等賊兵尋已退散此事青唐録所書已具今更不别出玉牒閏九月己酉云夏人挾邈川叛族入冦統制官王愍敗之擒僞鈐轄威明伊特允凌獲首千級曽布日録閏九月二十四日癸巳同呈熙河及李譓申蕃部作過圍繞城壁及納木宗堡使臣等被殺傷并隆珠黑城等城攻破青唐纍日道路不通詔遣苖履李忠傑及差秦鳯兵將往同討定二十五日甲午同呈熙河邊奏是日金城關探報云止是邈宗川人作過總噶爾至青唐一帶無恙然信息未通詔胡回苖履等多募人至青唐以來偵探十月四日壬寅熙河奏青唐邈川解圍捷書至鄯湟皆被圍王贍時出兵擊賊斬首四千級盡殺大首領結斡磋森摩乾展等九人有阿蘇者乞心白旗往招撫叛衆既而率衆攻城甚力總噶爾首領嘉沁扎實生擒阿蘇以獻贍亦誅之邈川城中兵民才二千四百餘人城守之具未備王愍馬用誠力戰固守蕃賊圍繞者萬計又有西夏三監軍人馬助之至二十三日積薪草欲焚城而姚雄兵至賊望見塵頭又有偵邏者還言漢兵將至遂遁走二十四日雄兵與愍㑹賊已潰散愍擒西夏僞鈐轄一名遂討蕩餘衆是日同三省作聖㫖將士並與特支七百苖履等所統續渡河者五百又作帥司指揮將佐痛戮作過部族所得孳畜財物均給士卒牛馬駝即買入官五日癸卯會都堂皆相慶曰朝廷已建兩郡萬一敗事何以示四方後世今兹解圍社稷之靈也王贍輩不通信息幾二十日孤軍深在賊境其不敗事乃幸耳布録癸巳二十四日又載詔遣苖履李忠傑及差秦鳯兵將往熙河同討定邈川作過蕃部按此巳從青唐録具載二十三日布録云云可削去乙未宰臣章惇言提舉詳定編勑成書已頒行其詳定官蔡京劉賡刪定官葛奉世莫砥田登崔彪林攄陳彥恭特减三年磨勘仍支賜銀帛有差吳頥候一司勑了日取㫖詔宣義郎起居舍人崇政殿說書周常特降兩官添差監郴州茶鹽酒稅先是常以狀申御史臺自劾送黃履又鄧洵武等分析常言黃右丞之出為餞行者及言鄒浩復還志在合俗廢法取名故有是命詔胡宗回指揮苖履等如蕃賊見官軍渡河雖即潰散亦須痛行殺戮務要剪滅作過之人淨盡仍不得濫及無辜布録乙未河東八堡寨賞功王文振以下及郭時亮轉官减年支賜有差布録皇子薨輟朝三日又不視事三日追賜名茂贈太師尚書令追封越王諡冲獻舊録云越王茂薨茂上之長子八月戊寅生母皇后劉氏生而偉大粹美九月甲子疾病命國醫治療弗效訪醫於民間醫又弗效薨年一嵗上震悼為輟視朝三日又不視事三日追賜名茂贈太師尚書令追封越王諡冲獻今皇帝嗣位加贈兼中書令追封鄧王按鄒浩僞疏舊録亦不載浩傳又極踈略當别出之已附注九月二十五日丁酉詔醫官卓順之等六人醫治皇子無效並除名勒停卓順之送衡州李士爽永州張倚全州王周道隨州李士奭徐州胡宗唐州並編管皇第四女懿寧公主卒年三嵗輟視朝三日追封魏國公主皇后劉氏所生也翰林醫官張永元追一官勒停石與齡班公權並特勒停懿寧卒布録在二十九日戊戍涇原路經略司奏檢凖敢勇條節文諸帥府敢勇以一百人為額募有户籍行止年二十已上壯勇堪任使喚稍識字不曾犯徒武藝中格人收補又條諸招補格凡三等第一等步射弓一碩一斗馬射九斗每月料錢二貫文米二碩第二等步射弓一石馬射八斗每月料錢一貫五百文米一碩五斗第三等步射弓九斗馬射七斗每月料錢一貫文米一碩已上兼習走馬射笋樁馬槍及施用兵器稍熟收補本司契勘見管聼候差使殿侍軍將守闕軍將人數不少其間有元係敢勇之人因纍立戰功補授各未有撥正差遣見今逐人有狀各乞權充敢勇凖備出入支給請受養贍本司自今見管敢勇有八十七人其中多是新投未諳出入今相度欲將元係敢勇立功補授殿侍軍將守闕將軍未有正任差遣之人取問如願充敢勇依元補得敢勇及升降時等第髙下支與請受如額足即乞將見管敢勇內射弓淺軟事藝生踈人减罷如殿侍軍將守闕軍將却充敢勇之人後來立到戰功即乞依逐人已得名目上轉補不惟出入得人戰鬬兼逐人每月請得錢米贍養如允所奏即乞早降指揮黃貼子凖條敢勇一百人為額本路見管八十七人闕數不多欲乞朝廷早降指揮如允所奏即乞將軍將殿侍身分請受更不支給詔令涇原路經略司將見管敢勇仔細揀試內有事藝淺軟不應等第之人先次放罷據所闕人數依本司所奏施行章楶閏九月二十一日奏今附閏九月末
