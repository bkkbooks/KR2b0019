body:
  text: 續資治通鑑長編卷五十九宋李燾撰真宗景德二年春正月庚戌朔大赦翰林侍讀學士右諫議大夫潘慎修寢疾託故人陳彭年草遺奏不為諸子求官但以主恩未報為恨及卒上甚憫之録其二子賻贈加等命有司給舟護其喪歸葬汝州壬子詔河北諸州强壯除瀛州城守得功人第其等級以聞餘並遣歸農令有司市耕牛送河北癸丑以河北諸州禁軍分𨽻鎮定髙陽都部署合鎮定兩路為一天雄軍滄邢貝州留步卒六指揮自餘營在河陽及京城者並放還行營之號悉罷甲寅工部侍郎參知政事王欽若自天雄軍來朝樞密院議次補禁軍列校王繼英奏曰藩邸給事之人尚在外議者皆聚議騰謗謂臣䝉蔽不言於上致其沉滯上曰此等不自省循茍求僥幸借如因緣際會儻加升擢必須有名方塞輿議先帝時有一散從官李繼榮在藩日曽預給使後十餘年但𨽻名尚食局常隨流輩預選先帝見而詢之乃知繼榮也止遷隊長歲餘漸擢為小校國家爵位豈容妄授也上以河北守臣宜得武幹善鎮靜者乙卯命西上閣門使馬知節知定州孫全照知鎮州刑部侍郎趙昌言知大名府給事中馮起知澶州洺州團練使上官正知貝州莫州團練使楊延朗知保州滁州刺史張禹圭知石州崇儀使張利涉知滄州供備庫使趙繼升知邢州西上閣門副使李允則知雄州供備庫副使趙彬知霸州上親録其姓名付中書且曰朕如此裁給當否卿等共詳之畢士安曰陛下所擇皆才適於用望付外施行從之知節先在鎮州方敵犯塞民相携入城知節與之約有盜一錢者斬俄有竊童兒錢二百者即戮之自是無敢犯者每中使齎詔諭邊郡知節慮為敵所掠因留之募捷足間道而行以達詔㫖會發澶魏邢洺等六州軍儲赴定州水陸並進時兵交境上知節曰是資敵也因告諭郡縣凡公家輸輦之物所在納之敵欲剽劫皆無及車駕幸澶淵大將王超擁兵數十萬屯定州逗遛不進知節屢諷之超不為動復移書誚讓超出兵猶辭以中渡無橋徒涉為患知節先以命工度材一夕而具上聞之手詔奬美殿前都虞候康州防禦使曹璨為鎮定兩路副都部署治鎮州鈐轄四員分二員赴定州如定州有軍事會議令璨暫赴之其緣邊巡檢楊延朗止令在保州遣同巡檢往來巡警如有羣盜會兵剪戮即率麾下往赴荆嗣亦如之璨本傳云兼知定州按馬知節實知定州恐傳誤罷北面部署鈐轄都監使臣二百九十餘員命監察御史朱搏赴德清軍收瘞戰沒遺骸并致祭令河北轉運使賑饑民口一斛戶五斛知益州張詠言羈縻保霸二州刺史董忠義等皆世襲望賜時服上曰蠻陬首領假以名秩若援內地牧守之制當賜錦袍又恐夷人無厭請求不已乃詔依維茂知州例歲賜紫衣錦袍保霸二州密邇維茂蓋西夷也國史附此事於西南蕃𫝊且云西南蕃乃牂牁郡故地按居牂牁故地者實為南夷其族帳首領皆姓龍與諸董絶不相關國史誤矣諸董可號西蕃若牂牁故地族帳則不可號南蕃也咸平中江淮制置茶鹽使秦羲獻議歲增榷酤十八萬緡頗為煩刻於是戶部判官李防出使言江南歲儉所增榷酤新額已權停之仍請權停淮浙荆湖路詔從其請因詔羲無得擅增榷課自後制置司不復兼領酒榷矣羲江寧人傳序從孫也丙辰詔諭緣邊諸州軍各遵守契丹誓約不得輒與境外往還規求財利詔定保雄莫霸州順安平戎信安軍長吏並兼制置屯田事舊兼使者仍舊先是雄州長吏獨兼領使名其諸州即别命官掌之上慮通好之後或漸成弛慢故申敕焉丁已詔河北走馬承受公事止存六餘悉罷之定州部署言昨遣散員指揮使趙信帥所部襲寇至水谷寨誤掠民牛畜鞫得實事在赦前上曰信等皆土人乃素有仇怨而剽劫耳雖已經赦宜部送闕下配𨽻他所召輔臣觀瀛州所獲戎人攻城戰具皆制度精好鋒鍔銛利梯衝竿牌悉被以鐵城上懸板才數寸集矢二百餘因遣宮苑使劉承圭西上閣門副使李允則往瀛州校立功將校等級以聞既而復命睦元凱為屯田員外郎史普為尚食副使方城守際元凱矢中面普勇敢不避敵故也其後李繼宣浚髙陽壕得遺矢凡四十萬敵攻城不遺餘力蓋如此尋又以河間縣令睦昭矩為右贊善大夫司理參軍李義方為大理寺丞自餘幕職令録悉授京官判司簿尉第遷幕職令録同出身人免選超注家便官皆賞守城之勞也賞睦昭矩等在四月丙子今并書之除河北諸州姦人因巡幸輒謀搖動所在斬决之條令蘄黃州賑饑民免潁川學究段廣將來秋解廣以戶籍當運菽百二十石輸澶州復就獻五百石助軍故奬之戊午贈張旦為左衛大將軍深州團練使子利涉為崇儀副使虎翼都虞候胡福為洺州團練使指揮使尚祚為濵州刺史張睿為演州刺史劉福為臨州刺史都頭輔能等十四人並為諸衛率府副率録旦子四人為東頭供奉官福等子十五人次補諸班副都知殿直奉職殿侍仍各賜衣服銀帶以白金百兩給其家初邯鄲令李正辭赴任值道梗留德清同拒敵侍禁夏承皓部兵至大名界遇敵皆戰沒贈正辭工部員外郎承皓崇儀使又贈受事河朔而沒者殿直劉超為供備庫使入內髙班內品李知順為六宅副使奉職胡度等三人為內殿崇班仍各録其子及賻恤其家時上封者言旦等死義朝廷宜優加恩典以勸忠臣乃命有司録贈官制書及録用諸子事布告天下右正言直史館張知白言江南諸州惟袁州有盜二人未獲餘郡皆獄空庚申岢嵐軍請修舊方田火山軍請築月隄上以違契丹誓約不許令有司籍三班使臣自契丹南侵嘗使軍前者賞之辛酉峽路都監侯延賞等言施黔溪洞掠去漢口七百餘戶歸業悉以兵器銅印假署符牒送官癸亥命翰林學士趙安仁等五人權同知貢舉河陽請調丁匠修濟瀆廟上慮擾民令發卒二百給其役甲子詔緣邊諸州契丹來獻雉兔求酒食者遣吏齎置境外給之丙寅山南東道節度使李繼隆武寧節度使石保吉馬軍都指揮葛霸步軍都虞候王隱以澶州之功並加封邑繼隆特加開府儀同三司詔淮南諸州以上供軍儲賑饑民丁卯謁明德皇后攢宮素服行哭賜守奉人緡帛遣內殿崇班楊保用往河北諸州取所頒御劔保用已見去年十二月馬步軍都虞候天平莭度使王超為三路總帥無功引兵赴行在又違詔失期上章待罪上憫其勞舊弗責戊辰以超為崇信節度使罷軍職便道之任始超之敗也人心震搖行營都監李允則勸超衰絰向師而哭以解衆忿復促超整師以進上知之賜允則詔書褒勵焉此據李允則本傳然王超本傳及他書並不言超嘗敗績也但逗撓不進耳豈史官亦有所諱耶今姑從允則本傳附載更須考求之司馬光記王欽若迎勞超於郊外等語蓋當時頗有疑超背叛者然其蹤跡都不可知假如允則本傳兵果敗人心震搖可也衆又何忿而以衰絰哭解之乎罷晉絳等七州博糴芻粟省河東部署鈐轄司使臣百餘人又省河北諸州戍兵十之五緣邊三之一己巳參知政事王欽若加階邑實封中謝又賜襲衣金帶鞍馬故事輔臣加恩無所賜上以欽若守藩有勞特寵異之自是遂為故事此據春明録孫全照張旻秦翰並以戰守功加檢校官及封邑餘悉推恩有差河北諸州官吏使臣曽率兵出城逐寇者第賜階勳一轉令河北部署司各留指揮使使臣天文醫官共十員餘悉遣還仍令計所在軍儲分兵屯戍勿復調民飛挽詔五嶽廟增造什物無得科借擾民庚午令緣邊諸州軍得北界書牒即詳其意報之以其書牒來上令河東發并代廣鋭騎軍三十指揮歸本道代自京所遣禁卒萬七千餘契丹新城都監遣吏齎牒請令商賈就新城貿易雄州以聞辛未詔雄州如北商齎物至境上者且與互市仍諭北界官司自今宜先移牒俟奏報癸酉贈國子博士武白為光祿少卿白受命知相州道遇寇死焉仍録其子給俸終喪武白未詳徙鳳州駐泊兵馬屯鳳翔甲戌以髙品周文質為殿頭髙品澶州之役文質主北寨之西偏會張皓自契丹還言彼謀以遲明來襲文質即馳告李繼隆秦翰等為備頃之敵暴至文質出兵扞禦其部下以連弩射殺達蘭敵遂遁去及是上召見便殿親加奬勞優賜遷秩焉周文質未詳詔緣邊諸州所市戰馬舊自三歲至十七歲者官悉取之自今止市四歲至十三歲者餘勿禁命常參官二人分往荆湖北路淮南諸州出官粟作糜粥以食饑民仍令擇幕職使臣之勤幹者司其事長吏常按視之每十日具所賦糜粥之數以聞自是全活者甚衆詔河南府及徐州等處民轉送軍儲往滑州者蠲其秋稅十之二令河北轉運使察部內幕職州縣官不任職者以聞仍令流內銓自今精加選擇引對取裁戊寅詔河北州官吏設法招集驚擾人民各具數以聞仍書厯為課令河北河東緣邊州軍自今北界齎牒送生口者給以茶綵部送出境答其牒咸定式以頒之上以河朔戎寇之後耕具頗闕牛多瘠死淮楚間民用踏犂凡四五人力可以比牛一具詔取式付轉運司令詢於民間如可用則造給之河北轉運副使盧琰言天雄軍見管米麨計一萬九千五百餘斤澶州計四萬二千二百餘斤詔以給兩處饑民趙州吏民詣轉運使言昨者敵騎入寇知州虞部員外郎王用和完守城壘安輯民庶鄰邦襁負相續而至儲積有備糇糧無乏二月庚辰轉運司以聞詔奬用和先是益邛嘉眉等州本志無眉州有雅州歲鑄錢五十餘萬貫自李順作亂遂罷鑄民間錢益少私以交子為市姦弊百出獄訟滋多乃詔知益州張詠與轉運使黃觀同議於嘉卭二州鑄景德大鐵錢如福州之制每貫用鐵三十斤取二十五斤八兩成每錢直銅錢一小鐵錢十相兼行用民甚便之京西轉運使言襄許陳蔡等州民饑請減價糶倉粟賑救從之辛已令雄霸州安肅軍復置榷場仍移牒北界使勿於他所貿易上聞軍士屯戍於外妻孥受所給月糧或致虧少微弱不能上訴詔開封府察其姦弊辰州言諸洞蠻攻下溪州為其刺史彭儒猛擊走之禽酋首以獻詔賜儒猛錦袍銀帶儒猛自陳母老願被恩典詔特加邑封河東轉運使鄭文寶言知并州王嗣宗知潞州韓國華等綏輯有方供億無乏並詔褒諭癸未山南東道節度使同平章事李繼隆卒贈中書令諡忠武繼隆出於貴胄感槩自立嘗失幼子上令翰林草詔慰撫詔語有云當極卜商之慟上曰此子夏失明事繼隆知書覽之非便遂命改焉在太宗朝特被親信每征行必總戎政上以元舅之故不欲煩之軍旅優游近藩恩禮甚篤繼隆亦多智能用謙謹保身明德寢疾欲面見之上促其往繼隆但詣萬安宮門拜箋終不入宮又嘗命諸王詣第候謁繼隆不設湯茗苐假王府從行茶爐烹飲焉始繼隆病癰醫言不可治上謂近臣曰繼隆往歲西征枉道誤期致陜西之民殍死甚衆加之倉卒頗多殺戮其間豈無寃枉乎此可為戒也於是擇兩街名僧二十一人就所居作佛事四十九日而罷甲申髙品王懷信部送通利軍强盜三人赴闕請行磔市之戮其犯乃在赦前上曰赦令所以示信於天下也况此等未嘗殺人悉宥之以𨽻軍籍詔通利德清軍等處行營軍士為契丹所虜者賜其父母緡錢有妻子者以聘財給之江浙荆湖旱遣使乘傳祠其境內山川咸平末河北轉運使劉綜上言西漢朝錯以為爵者上之所擅出於口而無窮粟者民之所種生於地而不乏使入粟授以爵塞下之粟必多文帝從之令民入粟備邊六百石爵上造萬二千石為大庶長事存典故利及公家今河北諸州聚兵糧饋勞費望行漢制以濟軍儲既而水部郎中許元豹復言緣河州縣和市邊穀數少望許進獻糧粟授以官秩事下三司議奏請令河北定州廣信安肅軍北平寨入榖千石授本州助教文學二千石賜出身三千石授簿尉借職四千石授奉職五千石授寺監主簿六千石授校書正字七千石授太祝奉禮郎八千石授大理評事殿直九千石授諸寺監丞侍禁萬石授大理寺丞供奉官真定府洺邢趙貝冀博瀛莫雄霸等州乾寧順安信安永定永靜等軍千石以上加二百石授助教文學二千石以上復遞加二百石至萬二千石授大理寺丞供奉官大名府懷磁衛相澶等州通利軍千石以上加五百石授助教文學二千石以上復遞加五百石至萬五千石授大理寺丞供奉官上慮爵賞之濫重惜其事宰相言故事具存行之無損乃請陜西諸州亦如此制既而有司復定環渭涇原慶州鎮戎保安軍同定州等處涇寧鳳儀邠鄜秦隴鳳州同洺州等處鳳翔河中府陜同華解乾耀丹坊虢成階州同懷州等處悉從之會要載此事於是年正月乙酉以淮南轉運使工部員外郎邵曄為交州安撫國信使從黎桓所乞也丙戌西凉府六谷首領斯多特遣其甥格布錫來貢并上與趙德明戰鬬功狀又言蕃帳周薩納濟有智勇久參謀議請授以六谷都巡檢使詔從其請仍賜茶綵又追録博囉齊忠藎以其子布濟克為歸德將軍厚賜器幣咱隴吉七族首領有捍寇之勞並月給千錢自周薩納濟以下皆并書之保州虎翼都虞候趙誨子超早歲陷寇於是亡歸其父疑超詐部送闕下上曰安有子歸父而致疑耶詔補殿侍給資糧遣還州丁亥發禁兵屯升洪州荆南府各兩指揮蘄黃唐州各一指揮戊子瀛代州部送奚契丹降人赴闕詔以來降在誓約前者𨽻軍籍如舊制在後者付部署司還之遣使詣澶州以陳粟四萬石分賑饑民辛卯太常博士直史館何亮自嶺表使還言亷州判官單禹錫惠州推官朱嚴潔亷幹事請授京官分蒞小郡詔以禹錫為著作佐郎知南雄州嚴為大理寺丞知白州亮又言桂州荔浦縣猶有僞廣日配米百六十斛詔除之單禹錫朱嚴俱未見懿州刺史田漢希卒癸巳命其子漢能襲為刺史甲午詔緣邊得契丹馬牛者移牒還之沒蕃漢口歸業者均給資糧縱其所乘馬勿留違者論其罪上聞邊民乏農器詔弛鐵禁戊戌詔澶州秦翰所領兵留步軍三指揮餘令翰將還京師庚子環州言戎人入寇熟戶旺家族擊走之俘其軍主斬獲甚衆有司言每歲諸道市紬絹百餘萬匹上供卒丑詔減三之一癸卯命開封府推官太子中允直集賢院孫僅為契丹國母生辰使右侍禁閣門祗候康宗元副之行李僕從什器並從官給時議草國書令樞密學士院求兩朝遺草於內省悉得之凡所與之物皆約舊制而加增損國母書外别致書國主問候而已自是至國母卒其禮皆然僅等入契丹境其刺史皆迎謁又令幕職縣令父老捧巵獻酒於馬前民以斗焚香相迎門置水漿盂杓於路側接伴者察使人中途所須即供應之具蕃漢食味漢食貯以金器蕃食貯以木器所至無得鬻食物受錢違者全家處斬國主每歲避暑於含凉淀聞使至即來幽州屢召僅等宴會張樂待遇之禮甚優僅等辭還贐以器服及馬五百餘匹自郊勞至於餞飲所遣皆親信詞禮恭恪者以致勤厚之意焉禮或過當僅必抑而罷之其他隨事損益俾豐約中度後奉使者率循其制時稱得體康宗元未見先是寇所至潛置毒於瓶罌投之井中遺害居民永靜軍得之以獻令布告河朔使知其事雄州言契丹新城都監令拒馬河南百姓以麞鹿來獻不欲却之報以醪酒上曰疆吏自相問遺固亦無嫌厚其酬答可也甲辰徙瀛州團練使李延渥知邢州西上閣門副使知雄州李允則知瀛州引進使華州團練使何承矩知雄州承矩知雄州實録在癸卯李允則徙瀛州實録不書今并附此允則言朝廷不欲困軍民故屈已議和雖國費甚多較之用兵其利固不侔也但擇邊將謹守誓約有言和好非利者請一切斥去上曰兹朕意也邊將皆如是朕豈復有北顧之憂乎據允則本傳此言在徙瀛州後今附見乙已步軍副都指揮使河西節度使桑贊罷軍職判潁州贊副王超總戎禦敵逗撓無功故也上不欲暴其過止以足疾罷之太子太師呂䝉正請歸西京養疾詔許之丁未召見聽肩輿至殿門外命二子光祿寺丞從簡校書郎知簡掖以升殿勞問纍刻因言北戎請和從古以為上䇿今先啓誠意繼好息民天下無事惟願以百姓為念上甚嘉賞之其二子皆遷官詔緣邊諸州軍如禽獲北界姦人可詰其事狀部送闕下當釋其罪縻置內地先是上曰朝廷雖與彼通好減去邊備彼之動靜亦不可不知間諜偵候宜循舊制又慮為其所獲歸曲於我朕熟思之彼固遣人南來伺察自今禽獲當赦勿誅但羇留之待彼有詞則以此報答可也是月有司上常選人判詞有前饒陽簿張上逵所試荒繆上謂宰相曰似此者何以治民乃詔有司申明太平興國中四等判格令幕職官判上者超一資判中應循資者具歷任及所試引對凡引選人對日方以歷任功過之狀奏裁至是詔有司令先一日進內上親閲而升黜之無不詳允其後審官三班院亦如之此據本志實録但於九月甲子書令吏部流內銓依審官院例前一日具選人歷任進內次日引對然不著審官例始何日又於三年丁未始書詔流內銓自今幕職官赴調判上者超一資判中當循資者具歷任功過并試判引對皆與本志不同今從本志三月己酉朔詔河北諸州牧馬凉棚材木官自計度不足以公錢市之勿得擾民屯田員外郎潘華佑之子也先以疾致仕於是有瘳上書闕下求復朝列上憫佑之忠鯁庚戌詔復授華故官辛亥寧州團練使張凝為本州團練使充殿前都虞候單州刺史田敏為本州團練使康州刺史白守素為合州團練使皆賞勞也文州請許緣邊諸寨守把人丁置木弓箭以備戎寇從之甲寅上御崇政殿親試禮部奏名舉人得進士李迪以下二百四十六人第為五等第一第二第三賜及第第四第五等同出身又得特奏名五舉以上一百十一人第為三等並賜同進士三傳學究出身翌日試諸科得九經以下五百七十人第為三等並賜本科及第出身同出身又得特奏名諸科三禮以下七十五人第為三等賜同學究出身授試御官此據㑹要與實録數略不同按七月戚綸奏是年諸道進士僅三千人諸科萬餘人上謂宰相曰昨親閲考官所定試卷意其入末等者過多即别令詳考往往合格比緣臨試多士糊名校覆務於精當而考官不諭朕意過抑等第欲自明絶私甚無謂也迪所試最優李咨亦有可觀聞其幼年母為父所棄歸舅族咨日夕號泣求還其母乃至絶葷茹以禱祈又能刻苦為學自取名級亦可嘉也以迪為將作監丞咨及夏侯麟為大理評事通判諸州進士第一等為試校書郎知令録餘為判司簿尉迪濮州人咨新喻人也先是迪與賈邊皆有聲場屋及禮部奏名而兩人皆不與考官取其文觀之迪賦落韻邊論當仁不讓於師以師為衆與注疏異特奏令就御試參知政事王旦議落韻者失於不詳審耳捨注疏而立異論輒不可許恐士子從今放蕩無所凖的遂取迪而黜邊當時朝論大率如此初安陽人陳貫喜言兵咸平中大將楊瓊王榮喪師貫上書言前日不斬傅潛張昭逺使瓊輩畏死不畏法今不嚴其制後當益弛請立法凡合戰而奔者主校皆斬大將戰死裨校無傷而還與奔軍同軍衄城圍别部力足救而不至者以逗遛論如此罰明而士卒厲矣上嘉納之將召試學士院執政謂瓊等已即罪議遂格又嘗上形勢選將練兵論三篇大略言地有六害今北邊既失古北之險然自威虜城東距海三百里其地沮澤墝埆所謂天隙天陷非敵所能輕入由威虜西極狼山不百里地廣平利馳突此必爭之地先居則佚後趨則勞宜有以待之昔李漢超守瀛州敵不敢視關南尺寸地今將帥大概用恩澤進雖謹重可信然卒與敵遇不知所以為方略故敵勢益張兵折於外者二十年此選將得失之效也國家收天下材勇以備禁旅賴賜豫廪給而已恬于休息久不識戰當以衛京師不當以戍邊戍邊莫若募土人𨽻本軍又籍民丁為府兵使北兵扞敵西兵扞戎不獨審練敵情熟習地形且皆樂戰鬬無矯心契丹請盟復上言寇數犯塞驅掠良民數十萬今乘其初通宜出內府金帛以贖之彼嗜利必歸吾民自河之北戴德澤無窮矣於是貫舉進士試殿廷得同出身上識其姓名曰是數言邊事者擢置第二等賜及第虞部員外郎知鄭州王矩上書自薦求科名上以矩自燕薊歸化效官清白而自强學業特賜進士及第仍附新榜至道二年五月王矩通判宋州都官員外郎孔揆言貝州自節度孟元哲令民輸稅物先出算規其餘羡以備留使之用相襲不改詔亟除之戊午鄭州防禦使魏能責授右羽林將軍契丹之出境也北面將帥各以師還萃于大名能時與王能曹璨同抵城下鈐轄孫全照遣璨師由北門分道整隊伍先入而能師繼之能怒全照之後已即疾驅爭先全照坐城樓引弓射之能嚄唶不堪其裁量奪全照弓以去翌日見判府事王欽若且誣全照射傷押隊閣門祗候楊凝詞頗紛競全照密疏論能退縮逗遛及歸師不整之狀上初聞能失期不進頗怒之會全照奏至遂質於張凝白守素等得其實故責焉三班奉職李晏先給使廣信軍數與敵戰有功身被重創而死詔贈晏內殿崇班仍優恤其家去年七月可考禮部貢院以新及第進士車馬服從踰制請申約束第一人聽一節呵導餘皆雙控馬首遇常參官並斂馬側立從之庚申禁邊民入敵界掠奪資畜犯者捕繫罪至死者論如法流以下部送赴闕辛酉詔諸王公主近臣無得以下第親族賔客求賜科名時畢士安寇準各以所親為請上不得已而從之因有是詔丙寅以殿直知雄州機宜司趙延祚為侍禁雄州北闕城巡檢賜白金三百兩延祚州之大姓自太宗朝嘗出家財交結彼處豪傑得其動靜即具白州將因授官任於是年七十餘召赴闕詢以邊事且言今之修和北戎先啓誠意國家動守恩信理必長久又言國母之妹曰齊妃與其姊不叶國家所遺金帛皆歸於國主及母其下悉無所及望自今榷場貿易稍優假之則其下獲利必倍欣慰又歷陳其風俗山川曲折地理逺近及晉漢時事歷歷有據上詰其所欲但云衰朽不堪使用有家屬寓居青州願便道得往省之上許焉且以契丹通好不可復置機宜司故命為巡檢上慮河北諸州緣兵罷遂弛備詔敵樓戰棚有隳壞者即葺之詔緣邊諸州軍應北界移牒事理無疑者即報之關機要者疾置以聞待報而答亦勿令知之時安肅軍奏北界移牒尋捕所失牛畜本軍報云已具奏上以小事不必爾又慮事有非順難於施行者不欲出自朝議故有是詔丁卯雄州言容城縣狀稱戎人大驅馬越拒馬河放之其長遣人持雉兒來問遺求假草地上曰拒馬河去雄州四十餘里頗有兩地輸租民戶然其河橋乃雄州所造標立疆界素定豈得輒渡河畜牧此蓋恃已通和謂無間阻可亟令邊臣具牒列誓書之言使聞於首領嚴加懲戒况今歡好之始尤宜執守不可緩也戊辰令雄州勿以錦綺綾帛付榷場貿易上慮戎心無厭若開其端則求市無已故也己巳補神勇員僚劉超為本軍都虞候超前戍瀛州敵之急攻也超部城一角躬冒鋒刃運矢石以授壯勇者督令拒敵敵既解去主將録其勞賚以束帛超再拜曰非超之功乃衆之力願以分賜上聞之嘉其忠勇而讓故特奬焉他日上謂輔臣曰近者諸州立功指揮使未可别加遷擢皆特補本軍都虞候舊無此職名蓋權宜加置若後有闕不可復補將作監丞王曽為著作郎直史館賜緋舊制試文當屬學士舍人院宰相寇準雅知曽特召試政事堂詔自今所舉大理寺詳斷官刑部詳覆官上試斷案五道差官與二司互考壬申大名府饑命轉運司發倉賑救時邊城頗之兵食有司請下轉運司經度上曰戎人出境民初復業若責成外計不免役民飛挽將何以堪之乃命祠部郎中樂和乘驛與轉運使同為規畫還奏請依三司議有輸藁入官者准便糴粟麥例給八分緡錢二分象牙香藥其廣信安肅軍北平寨粟麥悉以香藥博糴乃詔出內帑香藥有利於人者貿易之以實邊備樂和未見舊制弓矢兵器不入外夷時西凉揚丹族上表求市弓矢上以揚丹宣力西陲委之捍蔽特令渭州給賜因别賜斯多特以示恩意焉斯多特又貢馬求易金彩等修佛寺甲戌詔如所求賜之還其馬直是月緣邊諸州歲貢御馬自今止目為第一等馬至闕下閲視其堪充御馬多者乃論賞先是諸州買馬先取高大者别遣使臣部送目為御馬及閲視率為常品蓋部送者假其名在道求索供給頗為煩擾故條約之此據㑹要京東轉運使副廨皆在廣濟軍詔以青州被海敻逺符牒或致淹緩徙一人廨於青州夏四月癸未免瀛州居民二年屋稅僧尼曽經城守者賜以紫衣諸寺院各度一人甲申順安軍言近遣牙校部送禽獲姦盜至北界易州其知州待以賔禮饔餼甚厚慮復遣將吏至軍未詳接待之禮詔諭緣邊諸軍應北界遣將吏至者並豐其饋餉或職位高則以賔禮接之乙酉令鄂州發廪賑饑民丙戌斬布衣申宗古於西市坐詣登聞院誣告宰臣寇準與安王元傑謀反故也辛卯上謂輔臣曰昨減邊城戍兵甚衆然恐此後難以復增其廣信安肅軍見屯兵及二年以上悉令更代並以軍旅人數完足者易其部伍殘闕者則雖實增之無嫌也仍密諭河朔長吏凡軍士數闕自當廣務招置勿以鄰敵通歡輒怠其事南丹州刺史莫洪皓死長子淮勍襲父任俄為弟淮辿所逐淮勍帥屬來奔詔宜州賜間田資給之即命淮辿知南丹州仍諭以茍效忠順當加甄奬壬辰以殿中丞江日新為國子博士日新前知德州追襲敵騎殺獲甚衆復出兵夜破其寨故有是賞監軍劉緒軍校並加檢校兼官癸巳京師穀貴命減價糶倉粟商州配役卒謀劫庫兵殺官吏以叛未發知州李㢲與都巡檢供奉官張越領兵擊剪之詔褒巽越其將校進補有差㢲建陽人王禹稱策可考越未詳乙未并代部署司言廣鋭軍士老疾者須親屬代名乃得除籍請自今應本土居民雖非親屬而願代者亦聽從之上謂輔臣曰晉國公主言孝章皇后寢疾時嘗云我無他憂惟慮瞑目之後族屬不能敦睦為人所笑須朝廷常為約束今聞宋元翰果詣京府求分家財已令勿問仍諭其宗屬益務孝謹以遵先后遺戒焉元翰偓幼子也上御便殿引對諸寺院主首詢其行業優長者以補左右街僧官先是所署或非其人多致謗議故上親閲試焉丁酉樞密直學士劉師道責授忠武行軍司馬知制誥陳堯咨單州團練副使先是師道弟幾道舉進士禮部奏名將廷試近制悉糊名校等堯咨為考官教幾道於卷中密為識號幾道既擢第或告其事詔落籍永不得預舉上初欲含容不復窮理其事而師道固求辨理詔東上閣門使曹利用兵部郎中邊肅內侍副都知閻承翰詣御史府雜治之坐論奏誣罔與堯咨并及於責大理寺丞王湛者咸平五年登進士第與幾道同至於獄詞連及亦削官王遊御史記有湛係西充人咸平二年及第非此王湛也戊戌幸龍圖閣近臣畢從起居舍人直昭文館种放預焉閲太宗御書又觀諸閣圖畫龍圖閣在㑹慶殿之西偏北連禁中閣上藏太宗御書五千一百十五卷軸下設六閣經典閣三千七百六十二卷史傳閣八百二十一卷子書閣一萬三百六十二卷文集閣八千三十一卷天文閣二千五百六十四卷圖畫閣一千四百二十一軸卷冊上曰朕退朝之暇無所用心聚此圖書以自娛耳己亥詔河北諸州軍增葺城池上謂近臣曰內外諸軍所闕小校儻以名次遷補或慮不能盡得武幹之士宜並令按閲選擢而授之先是諸路部送罪人至闕下者軍頭司引對便坐皆即决遣或刑名疑互無所詳準庚子詔自今委本司召法官一人審定以聞會要云本司言開封府獄囚當引見不坐格律請再送司録定斷上慮其久繫故有是詔初李允則在雄州建言契丹禁國中穀食不令出境而彼民有冒禁齎至榷場求售者轉運司以茶博易所得至微恐亦非便壬寅詔罷之工部侍郎參知政事王欽若素與寇準不協還自天雄再表求罷繼以面請上敦諭不能奪乃置資政殿學士以欽若為之仍遷刑部侍郎中書定其班在翰林學士之下侍讀學士之上初邢州地連震城堞摧毁無守備契丹之入冦也兵部郎中邊肅知州事上密詔肅若州不可守聽以便宜南保他城肅匿詔不發督丁壯乘城而闢諸門悉所部兵列陳于外敵至莫之測居三日引去時鎮魏深趙磁洺六州閉壁不出老幼趨邢州者肅悉納之上嘉其功於是以肅為樞密院直學士與虞部員外郎兼侍御史知雜事李濬並命濬居憲府未再歲上寵待之遂超遷參知政事王旦言濬雖有剸劇才然亟踐近職時望未允上曰朕業已許之矣旦時但參政濬傳誤云宰相今改定邢州城池冦未至已修完恐無棄守之詔更當考之作永昌僧院於三陵之側計用錢八百餘萬遣中使取諸陵寢宮白金什器八千餘兩充費乙巳環州言戎人入冦出兵禦之殺獲甚衆生禽賊將慶結部送闕下請斬于藁街以警蕃部上曰驅率而來此亦何罪止令配𨽻淮南潭州言茶園戶乏食請賑以官米從之以貝州驍捷軍都指揮使王贊為御前忠佐馬步軍副都軍頭先是秦翰言贊勇壯得召見贊自陳留步卒以功至軍校太祖太宗朝皆召至闕下遷職頗有效命戮力之意故寵以禁秩令還典其軍閣門祗候郭盛言洪州南康軍民李士衡等願輸米賑饑民請詔與官上曰若其人曽犯刑憲不可授以官秩聽本家次第親屬代之
