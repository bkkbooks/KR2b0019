  text: 欽定四庫全書續資治通鑑長編卷二百二十八
  hash: sha256:28c8221ada8669cd59e548f8513d764110ac3377127dd836c18ec77e3b28be18
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0019_WYG_232-1a, image: WYG0317/WYG0317-0742a.png}
body:
  text: 宋李燾撰神宗熙寧四年十一月壬午朔權襄邑縣都監楊復為開封府界東路都巡檢兼教閲保甲仍令提點司訪察諸縣巡檢有不練武藝者奏選官代之去年十二月乙丑初立保甲法今年八月二日可考九月二十四日初習武藝詔應朝廷擢用才能賞功罰罪事可懲勸者中書樞密院各專令檢正檢詳官一員月以事狀送進奏院遍下諸路舊紀書詔以賞功罰罪事可懲勸者頒告天下新紀因之又詔審官東院每季具知州軍通判闕及合入知州通判人姓名功狀赴中書委中書審問主判官詳察人材不以次選差舊紀書詔審官東院季擬知州通判上中書審差新紀不書廣南西路經略司言交州劉紀見領二百餘人在順安州及引帶交人未見其數上批近纍探報廣源州蠻賊聚集訖無實狀使溪洞之民日不安居恐賊情狡獪故虛傳事勢驚動人情因得脅迫使人歸已黃仲卿盧豹是也若久不處置事理不便可令蕭注速遣官往體量處置無令長成邊患詔以將作監專領在京修造事選置判監一員同判監一員監丞或主簿兩員勾當公事兩員以嘉慶院為監虞部員外郎權發遣戶部判官范子竒權判監太子中允檢正中書禮房公事向宗儒同判監會要載此事在癸未日按范子竒判將作監實録乃在壬午日今從實録向宗儒同判在乙酉日今并書之六年六月二十七日初置軍器監詔江淮發運使舉官無得過本路轉運使副所舉之數集賢院學士史館修撰判祕閣宋敏求轉對言伏見前代崇建册府廣收典籍所以備人君覽觀而化成天下今三館祕閣各有四部書分經史子集其書類多訛舛雖纍加校正而尚無善本蓋讎校之時論以逐館幾四萬卷卷數既多難以精密務存速畢則每帙止用元寫本一再校而已更無兼本照對故藏書雖多而未及前代也臣欲乞先以前漢書藝文志內所有書廣求兼本令在館供職官重復校正校正既畢然後校後漢時諸書竊緣戰國以後及于兩漢皆是古書文義簡奧多有脫誤須要諸本參定欲乞依昨來七史例於京師及下諸路藏書之家借本謄寫送官俟其已精以次方及魏晉次及齊宋以下至唐則分為數等取其甚者加校正三館皆置之庶幾祕府文籍得以完善臣以愚陋而沗職儒館謹以職事而言之無補大猷伏增戰汗事竟不行敏求集有此狀云準御史臺告報十一月一日文德殿視朝當轉對今附本月日八月十七日詔當考癸未三班借職王元規言其父內藏庫副使嵩慶厯中嘗為种世衡遣入西界間疏其君臣因之元昊族其用事者遂納欵乞特追贈授元規三班奉職弟元禮三班借職王嵩事具慶厯五月皇祐元年十一月樞密院言在京兵不足嵗常取於諸路諸路兵失其土性逺行趨役疾患者多而江淮兵士尤不可賴及放凍歸道斃相屬至於起發增給口食費亦不少今略計三年用外軍歲不過七千人而東西八作司壯役指揮最為得力又廩給稍優欲於在京及開封府界京東西河北招少壯軍士及召募廂軍本城牢城願投換者並配缺額壯役指揮仍令在京諸司配雜犯罪人情理不至深重者以次填雜役指揮從之仍令權判將作監范子竒專提舉招換兵志所載與實録同但稍略耳甲申入內供奉官宋用臣右班殿直楊琰為將作監勾當公事宋用臣楊琰或前已見詔蠲天下見欠貸糧總計米一百六十六萬八千五百石有竒錢十一萬七千四百緡有竒上以諸路民欠貸糧積日已久歲催索無已時故盡蠲之百姓聞詔莫不稱慶舊紀書甲申詔天下因飢貸糧其蠲之新紀不書食貨志第四卷負縣官之物者悉總於理欠司以官物輸他司或中都雖著於籍而無已入官之符契者則總於應在司凡赦令下則命御史兩制官同三司除欠負其蠲除率百萬緡以上熙寧四年祀明堂命侍御史知雜鄧綰偕三司理欠司詳定天下逋欠會赦當除者其十一月上以天下民負貸糧積日已久斂索無已命悉蠲之凡釋貸糧米一百六十六萬八千五百石有竒錢十一萬七千四百緡有竒詳定放欠實録例書獨鄧綰未見月日或實録偶脫此也入內副都知宣政使陵州團練使張若水領嘉州防禦使初若水以歲滿當遷既除官上謂樞密院曰若水有提點排垜軍器三庫并提舉添修弓弩二十萬之勞以此并賞之上謹於爵賞雖左右親近未嘗過也乙酉賜太子中允權發遣夔州路轉運判官周直儒緋章服三司言直儒嘗議更在京酒户買麴法也更定買麴法在六月四日丁巳上批王廣淵言知環州种診申有西界投來蕃部三人熟知彼國事舊來留在本州詢問敵情今夏國既通和無所用之乞發遣於近裏州軍安排勘會夏國近才遣使乞復獻欵朝廷方與之要約尚未知其向背今診乃敢輕妄便謂通和竊恐邊防亦已弛備緩急有誤國事其种診未欲劾罪可令王廣淵嚴戒責令依纍降指揮謹敕邊備仍詔投來蕃部三人更不令赴闕丙戌大理寺丞館閣校勘沈括檢正中書刑房公事丁亥右龍武軍大將軍寧州防禦使宗績封韓國公允弼第二子也遣將作監官度地修太一宫先是司天中官正周琮言據太一經推算熙寧七年甲寅歲太一陽九百六之數至是年復元之初故經言太歲有陽九之災太乙有百六之厄皆在入元之終或元之初陽九百六當癸丑甲寅之歲為災厄之會而得五福太一移入中都可以消異為祥竊詳五福太一自雍熙甲申歲入東南巽宫故修東太一宫于蘇村天聖己巳歲入西南坤位故修西太一宫於八角鎮伏望稽詳故事崇建宫宇迎五福太一於京師上省其奏乃命度地建宫于集禧觀之東新舊紀並書此戊子詔諸路提舉常平官歲申通舉京官或職官縣令共三人詔職田占佃戶過數及影庇差役並科違制之罪太常丞檢正中書刑房公事察訪淮南兩浙路常平等事李承之言臣所授敇專令體量官吏違慢未盡察訪之意乞許臣採擇能吏隨才薦舉其有績行尤異者具以名聞從之己丑邠州訓練軍馬閣門通事舍人劉舜卿知德順軍候分屯訖赴闕明年二月十二日可考庚寅樞密院檢吏房文字劉奉世言檢會舊條進奏院每五日令進奏官一名於閣門抄劄報狀申樞密院呈定依本寫録供報逐處緣四方切欲聞朝廷除改及新行詔令而進奏官亦仰給本州不免冒法以致矯為家書發放監官無由禁止日虞罪戾而樞密院所定報狀遞到外州往往更不開省徒為煩費欲乞自今罷樞密院五日定本報狀許諸道進奏官直依例供發應朝廷已差除指揮事及中外常程申奏事並許節寫通封騰報其實封文字及事涉邉機并臣僚章疏等不得傅録漏泄犯者其事雖實亦從違制科罪赦降不原若增加虛妄仍編管如敢承虛撰造致傳報者並行嚴斷事理重者以違制論從之咸平三年六月可考壬辰借左藏庫錢七萬緡為開封府雜供庫本錢許人借貸出息以給公用癸巳太子中允崇政殿説書王雱言蒙差押賜父安石生辰禮物舊例有書送物赴閣門繳書申樞密院取旨出劄子許收兼下榜子謝恩緣父子同財理無饋遺取旨謝恩一皆偽詐竊恐君臣父子之際為理不宜如此臣欲乞自今應差子孫弟姪押賜並不用例從之丙申著作佐郎胡宗師為審官西院主簿代太常博士閻灝將作監主簿沈遼以同知院度支郎中王克臣奏灝等不職故並罷之仍自今止置一員此據會要增入克臣同知在六月八日司馬日記席汝明曰沈遼素為介甫所厚嘗對人竊議新制是非介甫聞之立衝替丁酉賜前碭山縣尉王存立同學究出身仍注合入官存立嘉祐中學究出身以父坐事配為軍嘗納官贖父得免軍籍既而鄉縣籍身丁如平民於是存立自言願得如解舉人免丁役上閔之而有是命戊戌天章閣待制知單州孫思恭許再任思恭以衰疾願守鄉郡故也上批宜依近降選法選通判一人仍自今近臣因老疾得知州軍者其選通判亦如之開封府推官陳忱言同入內供奉官曹貽孫同集僧衆於開寶寺定奪僧志滿可為福聖院主以聞詔開封給牒差自今寺院有闕當宣補者罷宣補及差官定奪止令開封府指揮僧録司定奪準此給牒開封府尹舊領功德使而左右街有僧録司至於寺僧差補合歸府縣僧司而相承奏稟降宣上欲澄省細務諸如此類悉歸有司壬寅開洪澤河達于淮以便舟楫新舊紀並書此五年正月丁酉河成甲辰宣慶使昭武軍留後石全育卒贈太尉彰德軍節度使諡勤僖戊申管勾國子監常秩等言準朝旨取索直講前後所出策論義題及所考試卷看詳優劣申中書今定焦千之王汝翼為上等梁師孟顔復盧侗為下等詔千之等五人並罷職與堂除合入差遣學生蘇嘉因試對䇿論時政之失講官考為上等直講蘇液以白執政皆罷之而獨留液更用陸佃龔原等為國子直講嘉頌子原遂昌人與佃皆師事王安石云此段更詳之選舉志云上以其宿學不足教導多士皆罷之林希野史云蘇頌子嘉在太學顔復嘗䇿問王莽後周改法事嘉極論為非在優等蘇液密寫以示曽布曰此輩唱和非毁時政布大怒責張琥曰君為諌官判監豈容學官生員非毁時政而不彈劾遂以示介介大怒因更制學校事盡逐諸學官以李定常秩同判監令選用學官非執政喜者不預陸佃黎宗孟葉濤曽肇沈季長介妹壻濤其姪壻佃門人肇布弟也佃等夜在介齋授口義旦至學講之無一語出已者其設三舍皆欲引用其黨耳中書言宰臣以下奏薦有官親屬遷一官升一任循一資並當一人內京朝官監當未滿若關升舉王未足不得與升親民如乞試校書郎以下循資並與初等職官監當即不得以合奏選人恩例乞選人轉京官其乞升任不得至知州軍乞遷官不得至員外郎從之仍詔武臣遇大禮奏薦已有親屬遷一官者不得至內殿崇班升一任者不得至親民中書言宰臣以下奏有官親屬遷官及升任循資並當一人京朝官監物務未滿任舉者未應格不得升親民奏選人恩例不許轉京官升任不得至知州軍遷官不得至員外郎武臣遇大禮奏薦已有官親屬遷官者不得至內殿崇班升任者不得至親民選舉志第二卷奏補篇有此蓋因實録刪修今附見五年八月十一日丁亥可考提點開封府界提點諸縣鎮司言諸縣兵級弓手有武藝精者遇按閲請如保甲量藝給賞從之己酉司農寺言諸路賣戶絶田産錢乞從本司移助常平糴本從之是月詔中書門下自今文德殿常朝候垂拱殿坐令御史臺一靣放班王陶事當參考買馬司請權買四尺二寸或一寸牝馬及一十一歲以上與牝馬補遞馬之闕毋以充額此據本志十一月事今附月末升吉州萬安鎮為縣十二月辛亥朔詔每歲加賜國子監錢四千緡以增置學官生員用度不足故也甲寅詔鄜延路經略司立定綏德城界至又遣官往諸路緣邉封土掘壕各認地分知澄城縣范育鄜延路權發遣鹽鐵判官張穆之環慶路涇州通判鄭遵度涇原路陜西轉運司勾當公事吕大忠秦鳯路麟州通判張宗諤麟府路育與大忠皆辭行育言臣伏承宣命差赴鄜延路依見今蕃漢住坐耕牧界至明立封堠界壕所貴彼此更無侵軼臣仰稽聖謀慮患消爭固深逺矣然臣伏念邉兵纍歲非中國之不欲平也強謀逺略之未息也非戎人之不欲附也救患扶衰之不已也今朝廷示寬大之德戎人效恭順之體釁解情通勢宜若一則賜平之始固有大計深謀所當先者臣謂溝封之制非今日之先務其不可為有四臣嘗至邉訪所謂兩不耕地逺者數十里近者數里指地為障華夷異居耕桑樵牧動不相及而爭鬬息矣今恃封溝之限則接壤之氓跌足相冒變安為危其不可一也臣訪聞五路舊界自兵興以來邉人乘利侵墾犬牙相錯或屬羌占田於戎境之中今分畫則棄之窮邉生地非中國之土今畫界其內則當取之棄舊所有則吾人必啓離心取舊所無則戎必起爭端其不可二也臣又聞外國尚詐無耻貪利而不顧義今聞納壤有辭及使臨境彼且伏而不出及地有分爭且置而不校則焉從之單車以往則無以待其變飾兵以臨則無以崇其信其不可三也東起麟豐西止秦渭地廣一千五六百里壕塹深髙才計方尺無慮五六百工使兩邉之民連歲大役轉戰之苦未蘇畚鍤之勞復起坐困籓籬隂資賊計其不可四也此特其事勢之難為者爾抑又有大於此者臣聞言至不約而天下莫之欺德至不爭而天下莫之校前日疆場常嚴矣一旦約敗兵拿鬬者跌於前耕者役於後而封溝不足恃矣釁動情暌詭計百出使人左復甲兵右興金繒朝委而烽煙夕舉其約誓不足制矣故保疆場不如立約立約不如崇信信定於心而已矣臣又聞周官大司徒立封溝於邦國都鄙至於九服則職方氏辨之而已行人制貢而蕃國不與焉蓋聖王之於外國嘉善而矜不能以為號令賞罰之所不加則責之意略爾今乃推溝塗經界之法而行之外國之邦非先王之意也使彼畏威承命則猶有疑心一有暌違上虧國體此其尤大不可者也臣又伏思外國之情難知其服未可信其弱未可輕臣願陛下搜簡軍實選將厲師積穀塞下以御其變消患於無形制勝於不動凡此今日撫戎之先務也臣以孤賤之資先衆荷寵常效犬馬之力奮於危難以報聖恩今日選委茍心知不可為而默默銜命動取後戾以欺天負君死有餘咎臣是以傾心極言而不知避伏願陛下留神大忠言伏聞朝廷將使立定夏國地界此誠陛下安邉息民之心然而安邉息民之策恐不在此臣輒有五不可之説伏惟聖慈財擇自來沿邉多以兩不耕種之地為界其間闊者數十里狹者亦不減三五里出其不意尚或交侵今議重定地界相去咫尺轉費關防樵牧之爭固無寧日釁隙稍久必惹事端此不可者一也懷撫夷狄先以恩信恩信未洽欲畫封疆俱非誠意後必患生或有奔衝人難禦捍此不可者二也議者以夏國辭請恭順遂欲乘此明分蕃漢之限所差官須與逐處首領相見商量以兵則非所以示信不以兵則敵情反覆無常前延州議事官幾為所擒至今邊人危之此不可者三也近年陜西沿邉四路皆有展置城寨戎心怨嗟未有以發既令各守其境曲直自明如或有辭過實在我此不可者四也夏國邊界東起麟府西至秦鳯繚繞幾二千里若欲久存須為壕塹計工多少所役何人或要害之地勢有必爭歲月之間未易了畢暴露絶塞百端可虞此不可者五也非徒五不可又有大不可者一焉無定河東滿堂鐵笳平一帶地土最為膏腴西人賴以為國自修綏德城數年不敢耕鑿極為困撓竊聞今來願於綏德城北退地二十里東必止以無定河為界如此則安心住坐廢田可以盡開彼之姦謀蓋出於此若遂使得志一旦緩急鄜延可憂此所謂大不可者一也如不以臣言為妄伏乞下臣狀付中書樞密院及令臣面析利害庶得周悉茍有可采早賜施行又言臣嘗遊塞上熟知戎情如朝廷敦信誓帥臣嚴節制將佐不敢貪功務獲則永無邉患此事人皆知之但為議者所忽不行耳今講和之初宜先務此又言臣等五人被命而行不敢不先示以信上全國體萬一疏虞則朝廷如何處置移文詰問必漫然不報舉兵討罪又力所不堪復與之和勢皆在彼百端呼索須至含容挫損天威無甚於此不可不慮也王安石不以育大忠等所言為然白上曰臣謂育朝廷但遣育於延州立封溝非遣育於夏州立封溝於周禮有何違異又育言周禮但立中國封溝與外國接境即無之臣謂育中國是腹裏却立封溝與外國接境乃不立封溝此何理大忠言但當擇帥不當立封溝臣謂大忠朝廷但遣大忠立封溝即不責大忠擇帥育與大忠恐不可遣不若但委本路使臣上令别擇官換兩人此據日録在五年正月十七日今并書之既而樞密院擬孔宗翰及楊方平代育與大忠宗翰前為京東路提點刑獄中書奏罷之方平前主鹽院中書按方平不職衝替上閲宗翰及方平姓名皆以為不可用乃差劉宗傑及鮮于師中五年四月二十二日王廣淵乞委師中五月二日宗傑與王韶議建通逺軍樞密院初不欲立封溝及議差官先擬薛昌朝上既不用昌朝而育與大忠議復異昌朝育皆中書所斥者故安石每疑文彥博等設意沮已云此據日録在五年正月十九日今并書范育吕大忠疏及王安石語今並附見育大忠疏更須刪削乃可乙卯禮院言駙馬都尉王師約等奏伏見長公主凡有表章故例不稱妾質諸典禮慮未允當當院參詳男子婦人凡於所尊稱臣若妾義實相對今宗室伯叔近親悉皆稱臣即公主自大長公主而下理合稱妾况家人之禮難施於朝廷伏請自大長公主而下凡上箋表各據國封並稱妾從之詔知澶州鎮寧軍留後劉渙為工部尚書致仕渙頗有才智尚氣放誕遇事無所顧忌鋭於進取既得謝乃悔恨及開拓熙河討伐安南渙幾八十矣猶上書請自效不報刑部侍郎致仕張子思卒戊午詔放麟州蕃部結星還夏國量給口券路費仍令經略司指揮牒宥州於界首交割應諸路去秋以後所獲夏國人口各令經略司選差官就便取問如願歸並準此願留者存恤之舊紀書詔諸路釋夏俘歸其國新紀書歸夏俘初星在夏國偽補鈐轄麟州部將王文郁略地至開光州星力屈而降補供奉官久之謀竄歸夏國為人所告上曰星力屈而降家在西界其欲歸宜也可聽其去而厚賞告者明年正月九日朱本又有詔趙卨事與此諸路經略司所被受並同或移彼所載目録附此已而劉庠言星少壯武勇恐歸為夏人鄉導又言前保星者蕃官五十人殆非實所以奏者姑慰衆心耳今厚賞告者恐開誣告之路王安石曰夏人若能深入豈少如星者為鄉導星得免罪遣還夏人又嘗殺其愛女豈肯為夏人致死於我衆蕃官敢為欺罔為將帥者更枉道以慰其心此皆無理文彥博曰將帥於事不得不反覆思慮詳合如此上曰如此思慮非是告叛得實顧不敢賞恐開誣告之路此甚亡謂安石曰如此則告變之法皆可除矣詔庠依前詔施行仍與告者鄰州差遣使蕃部具見之此據日録五年二十七日事己未保康軍節度使安定郡王從式卒贈同中書門下平章事榮王辛酉上批河北便糴司減軍糧數至多當此豐年物賤之際實為可惜况歲之美惡不常敵之動靜難測平日分屯兵馬計之雖似有餘緩急稍增軍防支用便見不足自來三司逐年指準有定錢數不須别作經畫可令依每歲數目收糴不得減省詔以太府寺所管斗稱歸文思院此據王圭會要熙寧四年十一月十一日事今附本月日要考司馬光所云出賣斗升印板事迹兼亦未詳初賣斗升年月日也光日記云王安石為政欲理財富國人言財利者輒賞之舊制太府寺造斗升用火印班於天下諸州賣之禁民私造升斗其法甚嚴熙寧四年詔自今官司止賣印板令民自造升斗以省釘鐷之費於是量法壞矣又民後氏世於司天監請歷本印賣民間或更印小歷每本直一二錢至是盡禁小歷官自印賣大歷每本直錢數百以收其利又京東提刑王居卿上言天下官酒務皆令作連竈以省薪蘇朝廷從之畫圗頒於天下又有班行上言天下馬鋪每匹令日收糞錢一文亦行之其營利如此而城綏州築婁城堡散青苗錢所用官物動以數十百億計賣歷日已見熙寧四年二月戊寅王居卿連竈事附注七年九月壬子馬糞錢當考右正言集賢校理檢正中書禮房公事許將直舍人院罷檢正中書禮房公事權同判流內銓檢正中書五房公事曾布言諸司吏自來並不以次遷轉出官致闕習事舊人諸事惰慢亦有職務全少而人數至多或事局至輕而出職優厚又有職事雖繁而得祿微薄人數太少選擇不精者今合併廢增祿自宣徽院至軍器所凡七十八處自今第遷須至頭名方許出官或已為頭名其出官即第增之以年或損所出人數約定須三二十年或四十年方得出官諸宗室宫院客司通引書表宅案司舊理二十一年出借職歲約六人今並月給錢三千并御書院等專副並罷出官界滿各理元抽差司分合得酬賞通計增廢之數歲增錢一萬五千餘緡減出官入流三百餘人從之舊紀書減出官入流三百餘人新紀不書癸亥知制誥王益柔知通進銀臺司兵部郎中同提舉在京諸司庫務韓縝兼勾當三班院初二職皆天章閣待制馬仲甫兼領會御史知雜事鄧綰言仲甫在三班院不職縱吏欺謾使臣藏匿酬奬保明奏狀等姦弊十一事嘗召本院主簿汲光審問稱已嘗摘發而未施行乃下綰章韓縝根究仲甫遂辭兼職故改命益柔等明年三年辛巳可考鄧綰言編敕刪定將畢諸路一州一縣敕自慶厯中刪修行用已久請加討論接續刪定又請陜西河東緣邉城寨稍大者置主簿一員並從之甲子茂州防禦使越國公世清為越州觀察使封會稽郡王新舊紀並書此賜衛州通判虞部員外郎聶儀仲家絹百匹以判大名府韓琦言衛州王供掃危急儀仲抱疾馳赴總徒修築因以病亡故也賜河北轉運司度僧牒五百紫衣師號各二百五十開修二股河上流并修塞第五掃決口尋命內侍押班李若愚宫苑使帶御器械程昉同提舉二人同提舉據會要十二月二十三日事實録無之今增入此乙丑詔自今宗室居父母喪者毋得乞為繼嗣時右武衛大將軍克務乞故登州防禦使東牟侯克端子叔摶為嗣請赴朝參起居而不為克端服大宗正司以聞事下禮官而禮官言宜終喪三年故右屯衛大將軍克端以熙寧二年六月卒贈登州防禦使東牟侯丙寅詔閣門自今日輪通事舍人以下二人察視內殿起居臣僚糾無故不赴者三不赴劾罪取旨察視之官不舉委閣門彈奏樞密院言諸路廂軍名額猥多自騎射至牢城其名凡二百二十三其間因事募人團立新額或因工作𣙜酤水陸運送通道山險橋梁郵傳馬牧堤防堰埭要録如澶州船坊之類則因工作而立如楚滇四川裝發之類則因水陸運送而立如龍劒文州橋之類則因通道山險橋梁而立名若此者事存而名未可廢及剩員直牢城皆待有罪配𨽻之人壯城專治城隍不給他役别為一軍而教閲廂軍亦自為額請以諸路不教閲廂軍併為一額餘從省廢其移併如禁軍法奏可遂下諸路轉運司以州大小髙下為序始自某州為第一指揮差次至某州凡為若干指揮每指揮毋過五百人河北曰崇勝河東曰雄猛陜西曰保寧京東曰奉化京西曰徑武淮南曰寧淮兩浙曰崇節江南曰效勇荆湖曰宣節福建曰保節廣南曰清化川峽四路曰克寧總天下廂兵馬步指揮凡八百四十其為兵凡二十二萬七千六百二十七人而府界及諸司或因事募兵之額不與焉本志如此今用之會要特詳或附注此戊辰上批勾當八作司內殿崇班李士宣修東西府始終畢功頗知修道次第可充將作監勾當公事替宋用臣中書樞密院同進呈王韶奏裕囉格勒及旺竒卜等舉種內屬乞依已得朝旨除裕囉格勒殿直蕃巡檢又分其本族大首領四人為族下巡檢既分為四頭項自此可令不復合為一免點集作過又乞除裕囉格勒殿侍瑪爾巴山一帶巡檢上曰如何便言舉種內屬王安石曰不知如何不謂之舉種內屬上曰須點集得方為內屬安石曰不知今欲如何點集上曰亦須便點閲見户口人數安石曰羈縻須有漸如何便令王韶點閲得彼戶口人數文彥博曰若與料錢又使不得可知是易安石曰如此誠易然便要點閲恐却未有此理彥博曰在此見不得到秦州乃見極微杪不足慮安石曰昨托碩只引一蕃僧來秦州便奈何不得今幅員數千里疆族設若有一豪傑自強外立文法迤邐內侵則嶽居戬之事不可謂無之非特如托碩事而已只如董戬摩正自是凡才若稍桀黠兼并生羌日迫內地即是復生一夏國豈得以為微杪不足慮老子以為其脆易破其微易散其未兆易謀就今生羌微杪正是當施謀計之時若待其黨衆架合則欲經營已無所及上曰然要須點集得方為實利安石曰誠如此然今朝廷十萬緡錢付王韶等蕃息收其息以為內屬人祿賜非有傷財勞民之事就令三五年間未可點集亦終為我羈縻免更有創立文法為邉陲之患亦自有利無害若如王韶本謀即終當為吾民不患不可點集也韶本謀欲以官致首領以蕃勇敢招其疆人其疆人服於下首領附於上則餘人不患不為我用然此事恐須少待歲月乃見成效耳彥博曰分却裕囉格勒族下人作四頭項恐裕囉格勒不肯又言未須與殿直與軍主恐見得力蕃官觖望生事安石曰分為四頭項既責任王韶韶必有斟酌朝廷何由遙度不知蕃官如何便敢觖望彥博曰裕囉格勒等並不為用却與官即為用者如何不觖望上曰事體有大小如摩正作刺史董戬作節度使何嘗為甪蕃官亦豈可觖望安石曰秦州蕃官如邁凌錯吉見作殿直不知有多少族帳朝廷除與裕囉格勒旺竒卜官于邁凌錯吉何事便敢觖望彥博曰如韓絳厚蕃兵便致漢兵作過上曰此事不類令悉依王韶所乞上又曰諒祚不得全以為狂妄見韓縝説嫁女與裕勒藏喀木所資送物極厚此所以能得裕勒藏喀木也撫結羌人須厚安石曰厚薄要當理分則能服人若應接不中事幾施恩不當理分則雖過厚適足生驕此所以當擇人付之使度事幾應接而已樞密院退安石論彥博語曰人主御將帥當有方略漢髙祖拔用亡人置之舊將之上固未嘗待其功績著見何嘗畏舊人怨望若邁陵錯吉輩亦彈壓不定即何以制海內此據日録今年十二月十八日裕囉格勒等授殿直而實録並無之於明年五月十一日方書以裕囉格勒為西頭供奉官不知何故或初授殿直後遷供奉官實録但書供奉官不書殿直也當考朱史王韶本傳就韶作機宜時便云韶直抵裕囉格勒帳中交詔因留宿示以不疑于是裕囉格勒感服即遣首領納欵其後率其屬十二萬口歸附按韶作機宜乃元年冬被詔相度招撫乃二年七月朱史預誇韶功已於二年七月辨之然則韶以二年七月被詔招撫其留宿裕囉格勒帳中當是三年或四年事四年十一月裕囉格勒舉衆內附日録所載或非妄也四年十二月裕囉格勒雖云舉衆內附其實元未出界故神宗有點集不得之語至五年五月始見十二萬户口數故再命以供奉官朱史所云其後即指五年五月事或四年十二月事也今並依日録附此事於十二月十八日更須檢詳辛未直學士院曽布言準敇差監護贈榮王從式葬事竊以朝廷親睦九族故於窀穸之具皆給於縣官近世使臣過取饋遺私家之費或倍於公祥符中患其無節嘗詔有司定數皇祐中復著之編敕令使臣所受無過五百朝臣無過三百比歲以來不復循守取之或十倍於令臣承命典領所不敢辭然遵行詔令請自臣始至於吏屬趨走給使之人所得之物亦當有節乞同張茂則取舊例裁定中數以為永式詔宗室敇葬饋遺監護官等令禮院速詳定一行吏人令曽布裁定以聞壬申詔軍頭司馬步兩直可撥入殿前步軍司闕馬者填虎翼有馬者填雲騎馬直雍熙四年置部直端拱元年置馬直請給優厚不差發屯戌惟給軍頭司官驅使故廢之祖宗舊制後殿引公事則軍頭引見司皇城司殿前司三司祗應殿前統制諸班皇城統制親事官引見統制馬直步直而指揮人料錢五百文及并馬直入雲騎步直入虎翼引見司兵遂廢矣此據李復圭記聞京西轉運提舉常平倉司言著作佐郎知長葛縣樂京稱助役之法不可久行本司令具析因依京不肯具析又不肯管勾縣事乞差官衝替許州亦言恐京扇惑民情於是司農寺請依京西轉運提舉司所奏施行時又有劉蒙亦以議役法棄官蒙知湖陽縣初行免役法使者召諸令會議蒙獨以為不便不肯議退而條上利害即投劾去元祐元年五月京落致仕蒙賜物要録初荆南舉京遺逸渤海亦以蒙應遺逸詔蒙既歸以教授為事養親講學從之者衆乙亥武寧軍節度推官前知南川縣張商英為光祿寺丞權檢正中書禮房公事商英唐英弟也初為通川縣主簿轉運使張詵等討渝州叛夷梁光秀李光吉既滅獨王衮未降商英言於詵曰夷亦人也諭以禍福宜聽詵檄商英往説衮遂歸命因辟知南川縣時章惇經制夷事官吏多為所狎侮獨商英與抗論不少屈惇竒之乃薦商英於王安石於是召對擢用何驥作商英家傳云熙寧三年以趙抃薦召對按商英招出王衮降在四年則三年無緣便召對除官今從邵伯溫所作辨誣章惇傳商英乃惇薦非抃也或抃亦嘗薦商英然擢用則緣惇耳權判西京留司御史臺司馬光言比部員外郎崇義公分司西京柴詠管勾周陵祭祀不遵依式無肅恭之心周本郭姓世宗以后姪為郭氏後在位之日父守禮但以元舅處之及太祖受禪其周朝祭享皆命周宗正少卿郭玘行禮國家若欲存周後恐宜封郭氏子孫若以郭氏絶後須取於柴氏雖不得如微子之賢竊謂其宜擇人為之而詠本出班行不知典故惟識庸猥加之老病侮慢憲章簡忽祭祀豈可承周後作賓皇家欲乞朝廷考詳典禮别選人封崇義公以奉周祀上閲奏問當如何王安石曰宋受天下於世宗柴氏也上曰為人後者為之子安石曰為人後於異姓非禮也雖受天下於郭氏然豈可以天下之故易其姓氏所出上以為然乃詔留守司劾詠罪以聞後遂除詠致仕以其子西頭供奉官若訥為衛尉寺丞襲封崇義公簽書河南府判官公事丙子遼主遣髙州觀察使耶律紀崇祿少卿史館修撰邢希古其母遣安復軍節度使耶律德誠海州團練使馬諲來賀正旦先是知常州晉陵縣王九成言江隂軍與臣所治接壤今常州兼有晉陵等四邑僅可供役軍比之州止省通判他官屬皆同以一縣給之宜民之困於役也若省為縣則長吏官屬皆可罷是月廢江隂軍為縣𨽻常州又廢汝州龍興縣為鎮省瓊州舍城縣入瓊山縣鎮戎軍安邉堡入開逺堡實録云省宜州舍城縣入思恩縣今從元豐九域志是歲宗子賜名授官者六十六人斷大辟三千六百九十九人詔蕃官殿侍三班差使補職或繇殿侍遷差使及十二年嘗充巡檢或管勾本族公事或為蕃官指使或嘗備守禦之任者總管司以聞特與遷改兵志第三卷熙寧四年事今附年末
