body:
  text: 續資治通鑑長編巻七十八宋李燾撰真宗大中祥符五年六月己亥三司借内蔵庫金二千兩從之辛丑上以諸王所和金華殿麥歌示輔臣因曰諸王好學朕每誨以屬辭用事當詢於僚佐庶免謬誤王旦曰仲尼稱不耻下問好問則有益也恭孝太子夫人田氏言兄閤門祗候承説自安復州廵檢嵗滿求知州軍上曰親民之官豈可虚授承説素無幹聲可授近地監軍㑹要云止可追復都監乙已鎮戎軍監押陳懷信言伏見環州修浚城壕地處極邉罕得良木望减損其工時朝廷方議遣使規度懷信䟽奏即命為本州監押仍專涖修城之役丁未詔緣邉州軍不得募北界民充軍如北界移牒究問悉還之其誘北界民應募者决訖部送京師𨽻近南州軍龍圖閣直學士陳彭年等上新定閤門儀制詔付有司戊申管勾麟府路軍馬事韓守英言契丹人投河西路由府州境上望戒勵逐處不得停止從之涇原路都鈐轄兼知渭州曺瑋請如舊例别遣官知渭州上曰邉防屯集之地别命知州或亙執其所見將致生事宻諭瑋不許瑋又言緣邉諸寨前許人户買撲酤酒慮其停匿險惡望悉禁罷從之駙馬都尉柴宗慶言自陜西市木至京望蠲免税算上曰朕記太宗朝王承衍市木販易規利當時興訟不已向已諭宗慶無得復然今乃尚有此奏即令樞宻院召宗慶戒飭之既而河東提㸃刑獄言宗慶私使人市馬不輸税請劾其罪詔釋不問衛國長公主嘗請市北隣張氏舍以廣其居張氏即華容縣主婿也上詔之曰如立劵出賣則可也及詢張氏但云日僦錢五百方所仰給上戒令不得彊市乃賜錢二百萬聽於他處圖置宗慶販馬實録在十月辛丑今并書之樞宻直學士禮部侍郎知并州張秉累典大府無顯赫之譽及再至太原臨事少斷多與賔佐博塞雖久踐中外然無儀檢好諧戲人不以宿舊稱之好飾衣服潔饌具每公宴及朋友家集㑹多自挈珍膳而徃家甚貧常質衣以給其費太原有武將為部署鈐轄甚不悦其所為又與轉運使陳若拙席上語相侵若拙奏秉戎政不修詔河東安撫司兼管勾并州公事尋命右諫議大夫樞宻直學士任中正代秉徙秉知相州秉徙相州在十月丁巳今并書當考安撫司兼并州者姓名謂何翰林學士李宗諤等上准詔分定監試發解官薦送紕繆十不九不刑名詔從之壬子修玉清昭應宫使丁謂言天書閣望柱起直氣千餘條青紫黄白相間又吐白光若銀絲上有輕白雲覆之俄變五色上作瑞應詩賜近臣和増濮州公用錢三十萬貫時命右監門衛大將軍李福知州故也諸州言嵗豐穀賤咸請博糴上慮傷農即詔三司使丁謂規畫以聞謂言莫若和市而諸州積鏹數少癸丑出内藏庫錢百萬貫付三司以佐用度權知開封府劉綜言諸路走馬承受使臣到闕皆直造便坐自今請先於前殿見訖乃詣後殿奏事戊午樞宻院言近日通進司入夜所進文字率皆常務望令除事干機急即時進内自餘並湏次日從之己未詔自今伏日並休務修國史院言所修禮志舊日厯祗存事端并禮院取索國初已來禮文損益沿革制作之事及論議平定文字尚慮或有遺落致國家大典有所不備龍圗閣待制孫奭見判禮院深於經術禮學精博望專委檢討供報從之錢塘人林逋少孤力學不為章句性恬淡好古不趨榮利家貧衣食不足晏如也初泛㳺江湖間久之歸杭州結廬西湖之孤山二十年足不及城市轉運使陳堯佐以其名聞庚申詔賜粟帛長吏嵗時勞問壬戌令樞宻院修時政記月送史館先是樞宻院月録附史事送中書編於時政記及是王欽若陳堯叟請别撰許之樞宻院時政記始此詔在京常参官二員舉幕職州縣官一員充京官勿以罷官赴選人應詔禁緣邉民盗契丹馬趨近南州軍貿易癸亥詔諸州轉賣金箔人并減原犯人罪一等决訖令衆半月時杭州民周承裕私鍊金為箔有鄭仁澤者甞市得千枚轉鬻於人事敗全家徙配及是本路轉運使陳堯佐上言情異罰同咸徙逺郡恐傷欽恤之意故有是詔甲子廣南西路轉運使言交州李公藴乞發人船直趨邕州互市上曰瀕海之民常懼交州侵擾承前止令互市於廣州及如洪鎮葢海隅有控扼之所今若直趨内地事頗非便宜令本司謹守舊制乙丑詔諸軍故斷手足以避征役及圗徙便郡者自今决訖並𨽻本州下名罪重者從重斷傷殘甚者决配本鄉五百里外城從知昇州張詠之請也丙寅以太常博士平棘孫冲知棣州大理寺丞史瑩通判州軍事内殿崇班衛承慶為兵馬都監初史崇貴等與轉運使王曙李應機完塞聶家口河河役既成又决於州東南柰民彎環城數十里民舎多壊曙等言州城危墊請徙置滴河縣及郭盛使還請如曙言復遣冲及承慶按視乃言城可固䕶止費三十萬功且薦瑩知水事請同領䕶冲與曙等互言利害上是冲議故以委之冲等又言臣今獨抗衆議力援州城必慮上下不相佽助望轉運使副於他路詔不許仍令轉運使凡冲等有所需索即時供給其董役官吏將校兩月一犒設之尋又遣使諭冲以葺河岸當俟霜降水落無致枉煩力役八月戊申當考實録於七月戊辰載遣使諭冲俟霜降水落乃葺河岸并令固䕶所塞聶家口㨿志及㑹要則聶家口即塞即决王曙因有滴河之議今又何所固䕶耶不知實録何以云爾今從本志及㑹要俟考審刑院言斷知綿州李説坐報上不以實罰銅十斤私罪而漏通舉主及勘官並請按問上謂宰臣曰説止杖罪舉主及勘官罪當笞耳徒有勞煩而不足以懲勸自今宜並取㫖八月丁酉可考㑹要五年六月事秋七月戊辰新作保康門于朱雀門之東徙汴河廣濟橋于大相國寺前牓曰延安又作橋跨惠民河牓曰安國時將建觀以奉五嶽故闢此門尋命修玉清昭應宫使丁謂等就奉節致逺三營地及填乾地之西偏興築内侍鄧守恩董其役實録於八月己未書命中使鄧守恩修五岳觀九月丁亥又書初建五岳觀于南薫門内之東偏既云修又云初建不知何也今從本志及㑹要聨書之詔皇家諸親有求在京職事者自今令樞宻院驗其材質履歴堪任則授之己巳謁玉清昭應宫謝天書閣神光之應也賜修宫使已下器幣工徒緡錢有差龍圗閣待制張知白上言竊覽方册見唐虞之制立四岳十二牧於是百工允釐百揆時叙又曰三載考績三考黜陟幽明漢史載宣帝為明盛之主美其任人責成知王道之根本常曰與我共治天下者其惟良二千石乎斯言也傳示不朽後之人孰不稱頌哉昔唐李嶠嘗云安人之方須擇郡守竊見朝廷重内官輕外任每除牧伯皆避命致訴比遣外任多是貶累之人風俗不澄實由於此望於臺閣妙選賢良分典大州共康庶績臣請輟近侍率先具寮鳳閣侍郎韋嗣立因而請行遂令以本官出領州郡伏見江浙大郡方切擇人茍有闕員俾之承乏臣雖不肖願繼前修矧唐年非遥故事仍在儻以為允乞舉而行上曰知白援引故事請重親民之官良可嘉也然以其累更外任方在要職不許辛未命知白同糾察在京刑獄壬申上封者言諸州軍司法參軍多不得其人致刑法差枉望令吏部銓謹擇明法出身者授之上以示輔臣王旦言明法雖習律文亦須有才識頃法官闕多取屬縣簿尉習刑名者代之今請令銓司參酌施行從之詔河北商人與北境私相貿鬻有所逋負致被移牒辦理者宜令縁邉安撫司趣使償之自今仍禁其市易知雄州李允則言契丹議築武清安次涿郡州城上曰是正違誓約若俟其興功而言則必耻于中輟乃詔允則因使北境者諭之既而允則言彼國聞命即罷其役或作武清寨次遂州城當考癸酉緣邉禁兵老病當停者詔𨽻本州剰員如聞侵費邉儲煩於轉送宜令轉運使閲驗咸遣歸農丁丑廣州言大食國人無西忽華百三十嵗耳有重輪貌甚偉異自言逺慕皇化附古邏國船至詔就賜錦袍銀帯加束帛邉臣言北境移牒商旅違大朝禁法買盧甘石至涿州已依法行遣癸未慶成軍太寧宫廟成摠六百四十六區賜故吳王李煜曽孫女絹百匹錢二百萬以備聘財仍遣内臣主其事䘏亡國之後也甲申命京東路轉運使工部郎中髙驤淮南路轉運使祠部員外郎直集賢院張象中兩易其任驤登州人或言其鄉曲非便故徙之象中昭允弟昭易子也上封者言奏舉使臣皆無其限雖元限七人有一月中連舉五人者詔樞宻院起今引對具奏舉年月以聞乙酉詔尚書丞郎兩省給諫知州府而本部郎中員外郎及兩省六品以下官充本路轉運使副者承前例湏申報雖職當統攝方委於事權而官有等差宜明於品級自今知制誥觀察使已上知州府處所申轉運司狀並止署按檢令通判已下署銜供申如轉運使官秩在上者不用此令其後張詠以禮部尚書知昇州凡有祠部事皆申公狀詠因上言臣官忝六曺祠部乃本行司局而例申公狀似未合宜望自今尚書丞郎知州者除申省外其本行曺局止署案檢從之張詠事本志在六年今并書詠為禮書乃四年四月也先是詔禁命官取息錢犯者勿償大理寺丞知考城縣皮子良貸京師民錢十七萬到官即自首上惡子良無行憲司鞫問法當贖銅命停官丁亥詔河北河東忠烈宣勇廣鋭軍士自今老病者即放歸農無勒召人承替其闕員並自京補選庚寅詔坊監倉庫軍士疾病者續其口糧無令失所時羣牧司秣馬卒因病請告停其所給有匄食餓死者上閔之故有是命乙末慶州言懷安鎮山水暴漲漂溺居民詔人賜千錢米一斛八月丙申朔日有食之内出京城四郊禾黍穗示輔臣曰前夕風雨漂暴慮其致損遂令於髙下田遍取視之皆無傷也丁酉詔京畿諸縣夏税前令送咸平尉氏者今許在京及本縣輸納令河中府周太祖塟冠劔之地禁樵採詔自今文武官在任同事並須從長裁遣如任情偏執不循理道及用私忿不和者轉運提㸃刑獄司察舉以聞當遣官辨其枉直而重責之如不察舉并罰之時綿耀保州繼言同官不和命使劾問而知嘉州袁成務請行戒約故有是詔成務逢吉子也令雜買埸市物並給現錢先是以茶充直不便於民也詔學士院青詞齋祝祭文止稱皇帝無列尊號左僕射張齊賢再表請老戊戌以司空致仕還洛陽别業入辭便坐方拜而仆上遂止之許二子扶掖升殿命並坐墪為三以優之令濵州更免牛税錢一年半六宅副使趙守倫言河東廣鋭軍士善騎而武藝不習望自京簡取隊長精加訓練從之澧州慈利縣蠻人侵擾漢土荆湖北路轉運使陳世卿率兵逐之因請復置澧州武口等寨控之酋長下溪州刺史彭儒猛願嵗修職貢世卿以聞已亥降詔慰奬且許焉先是澧州民四十七家訴蠻侵其地詔閤門祗候開封史方乗驛徃與轉運使同按視於是自竹踈驛至申文崖復地四百里得所掠五百餘人及置澧川等寨即以方知邵州史方本傳云置澧川武口楊泉索溪四寨按㑹要及實録但澧川武口二寨耳當考知昇州張詠頭瘍甚飲食則楚痛増劇御下急峻賔僚少不如意者動加詬詈通判成悦為吏勤事而詠性躁果刑訟多出獨斷悦嘗以法規正無所阿順詠不禮焉人頗少之詠累求分務西洛壬寅命工部侍郎集賢院學士薛映代之映告謝便坐自言久歴外任求領近職翌日授樞宻直學士仍令馳驛以徃詠既還不能朝謁即命知陳州映至昇州言官有牛賦民出租牛死租不得蠲上覽奏矍然曰此豈朝廷所知耶遂詔諸州條上悉蠲之㨿實録蠲牛税在九年十月癸未時映已罷歸今并書于此上因覽昇州奏謂輔臣曰當時弔伐彼方所以持久者盖太祖約束曹彬不許殺人也彬尋遣李繼隆入奏收城之後且保全李煜一門太祖既可其奏又益戒其殺人及城破中使傳宣適至煜家族保全城中人悉免戮太祖深慈至仁皆此類實録附此事於明年正月戊申今因薛映知州并書之然平江南時已畧著太祖戒殺之意矣或可削詔太廟祠祭令行事官與宫闈令躬洗滌祭器諸祠祭亦如之癸夘詔奬三司度支副使鮑中和以其前涖戸部督治帳籍總九十萬曹事無壅故也甲辰詔樞宻直學士限置六員上初欲授薛映以此職因問王旦旦曰先朝但置兩員今已九員矣上曰且復除映自此當為定限也故有是命張詠李濬劉綜任中正周起戚綸張秉李士衡劉師道賜秦州小洛門採造務兵匠緡錢仍委中使王懷信具勤瘁者名聞咸與遷補乙已鄜延路部署曹利用言縁邉所居歸明人户防遏立功者望署為弓弩手指揮詔利用詢其人如願為之及經久利便即依所奏命東染院使秦羲開封府判官冦玹乗傳至棣州按視城隄圗上利害時孫冲等請不徙城議者言其不便故也初議鑄玉清昭應宫正殿聖像令江淮發運使李溥訪巧匠得杭州民張文昱等就建安軍西北小山置冶溥領視之丙午溥奏道場有神雀異光慶雲之瑞詔修宫使丁謂馳徃醮謝宴犒官吏將校耆老賜役夫緡錢溥與謂相為表裏多載竒木怪石盡括東南巧匠以附㑹帝意謂復言溥監鑄聖像蔬食者周嵗詔奬之上作祥瑞論俗吏辨賜輔臣人一本因曰如聞中外有議及朝廷崇奉祥瑞躬親細務者故著此以曉之輔臣請示百官立石於國學許之河東轉運使言所部大稔詔三司宜乗時積穀聚於陜西及縁河州軍以備歉嵗丁未遣使葺廣州南海廟戊申通判棣州史瑩言本州河水為患隄防不固慮非時决溢衝注州城望徙井邑於滳河其城壘俟霜降水涸而葺之知州孫冲又言臣前舉瑩共治水事瑩黨右豪族妄請徙城願召赴闕劾其罪從之時滳河有富民賂官司請徙州治故冲奏及之六月丙寅當考己酉徙河北轉運使右諫議大夫王曙知夀州度支員外郎李應機知濮州其本路走馬承受使臣悉代之坐不察邉肅貪縱故也三司借内藏庫絹三十萬匹庚戍淮南路滁和揚楚泗五州旱詔發運使减運河水以灌民田仍寛其租限州縣不能存恤致民流者罪之詔河東諸軍昨簡𨽻剰員如聞尚多彊壯可併為帶甲剰員以便給使乙夘提㸃開封府縣鎮公事段惟幾言畿縣夏租民乏二麥望許以秋稼折納從之惟幾思恭弟子也遣使治揚州回鑾寺奉安太祖神御先是設殿於其偏始改從正位焉丙辰知制誥王曽判大理寺判寺舊用郎官上欲重其任故特命曽對便殿諭之曰天下之命繫於獄今以屈卿曽頓首謝仍賜錢三十萬因請辟奏僚屬遂著為令詔如聞諸路採木送京師其數尤廣頗擾民宜令三司規度如給用無闕宜悉罷之上作對照詩示輔臣有孜孜綏萬國不媿鬢邉絲之句王旦曰陛下憂勤萬方勵精庶務發揮聖道形于天章臣等固當夙夜盡心上副求治之意辛酉詔應保舉官有誤犯私罪非故違者自今勿連坐舉主六月末季説事可考龍圗閣直學士陳彭年上編録太宗聖製合二百四十巻詔中書門下詳校奉安于太清樓資政殿崇文殿秘閣西京三館各一本癸亥詔自今諸衛將軍諸司使副三班使臣知州府軍監處貢舉人委通判幕職録事參軍及所試官依格敇解發其武臣更不管勾止同署解狀所解不當亦不同罪甲子上封者言伏覩文武官以郊禋誕節補任子弟官者多年在幼稚坐食廩禄有窮經潦倒之士下位沈滯之人常增浩歎望行條約上令輔臣議其事特限年立制議尋不行詔應制獄無臨時處分者並依推勘條式决遣流罪及命官則具案以聞先是審刑院詳議官查拱之言諸州奏案多以所降宣命止言制劾干繫官吏情罪具案以聞乃悉拘禁以伺斷敇頗成留滯故條約之拱之陶子也詔南省及諸司五品以下官各具本貫三代出身歴任有無違闕家狀上御史臺自今新升朝衙謝後並須准此具家狀納審官院逐旋牒送御史臺編聨收掌准備非時旋閲九月丁夘詔大理寺斷案差互者本斷官並行勘劾申明咸平二年四月之詔也又詔斷敇取其簡要勿繁叙欵辭所斷罪不得以取㫖為文上曰一成之法朕與天下共守如情輕法重情重法輕之類皆當以理裁斷具獄以聞戊辰詔應大禮朝㑹據儀制京官並赴陪位自今不至者令御史彈奏己巳龍圗閣直學士陳彭年上言禘祫之日孝惠淑德二后神主自别廟赴太廟祔於簡穆皇后神主之下太祖神主之上此盖用曲臺禮别廟皇后禘祫祔饗太廟之説竊思二聖御㝢之辰可從兹制升祔之後難舉此儀今以椒掖追諡之尊居宸極正統之右稽之經意既靡於前聞度於人情實違於順德竊慮明靈合饗祀禮未安欲望特詔禮官再加詳定或祭於别廟或次於正主冀協聿追之㫖永臻錫類之祥詔有司詳定上奏曰按曲臺禮載禘祫之儀則云如皇后先祔别廟遇禘祫祔饗於太廟如是昭后即坐於祖姑之下南向如是穆后坐於祖姑之下北向又按博士商盈孫議云别廟皇后禘祫於太廟祔於祖姑之下者此乃皇后先沒已造神主夫在帝位如昭成肅明之歿也睿宗在位元獻之歿也元宗在位四后於太廟未有本室故創别廟當為太廟合食之主故禘祫乃奉以入饗此明其後太廟有本室即當遷祔帝方在位故皇后暫立别廟耳本是太廟合食之主故禘祫乃升本廟未有位故祔祖姑之下開寶禮禘祫巻中具載孝明孝惠二后自别廟祔饗太廟祖姑之下則與曲臺禮同及太祖太宗神主入廟孝明懿德升配孝惠孝章淑德不入配饗止在别廟自後遇禘祫嵗有司不逹禮意尚以三后神主祔饗於太廟祖姑之下乃在太祖太宗之上尊卑顛倒誠未允當按禮稱婦祔於祖姑謂既卒哭之明日祔之於祖姑此正禮也稱祖姑有三人則祔於親者注云謂舅之母死而又有繼室二人也親者謂舅所生然則祖姑有三人同在祖之一室明其婦有數人亦當同在夫之本室不可久祔於祖姑也又按唐睿宗入廟遷昭成皇后祔饗肅明祗在别廟故開元禮載肅明别廟時饗之儀而無禘祫祔饗之禮即知别廟皇后時饗及禘祫皆於本廟也禮稱有其舉之莫可廢也今孝惠孝章淑德三后向來禘祫既並祔饗於太廟則難議改易欲望自今禘祫三后神主各祔饗本室次於正主稽諸典禮庶協大中詔可庚午貢院考試官前寧州司法參軍國子監説書王世昌勒停知貢舉官晁逈劉綜李維孫奭並贖銅三十斤時濮州毛詩學究王元慶試義中有一通一粗世昌誤考為十不逈等不之察為元慶所訟故也詔軍民有私置刀兵噐甲限五十日送官違者論如法罪至流者并其家屬部送赴闕至徒者决配本處牢城冶鑄者如之其緣邉諸處曽被㫖許留者聽如舊辛未詔京東西河北陜西轉運使與逐處長吏同相度縁河縣分鄉村各於河北河南就便管轄省民轉輸之勞也壬申杖髙班朱咸則配西京内品坐私與富民飲食故也癸酉詔知天雄軍冦凖都大提舉河北廵檢時河北頗有盗賊而奏報不實又不即時擒捕故命督之廣州駐泊鈐轄秦羲言州有澄海三指揮前凖詔止令訓練無得差役慮浸久驕惰望徙屯嶺北從之羲又請兼提舉在城煙火盗賊事亦從之先是廣州言澄海卒討宜賊有功頗希恩桀驁軍中不能制乞部送闕下上以摠御方面宜擇才幹宰相歴奏數人皆不稱㫖上徐曰秦羲可當此任乃以命羲先是羣官導從多踰品式或庶僚不避大臣詔翰林學士李宗諤龍圗閣直學士陳彭年與禮官議定儀制施行之禁庶官及技術之流以金銀為方圓帶京城除宗室外無得用青繖宰相樞宻使亦禁之明年乃許復用明年六月甲子辛巳國子監請建閣藏太宗御書從之癸未開封府勘糧專勾司吏因諸軍批請納賂罪當徒上曰此但紙筆之費累而為贓第决杖釋之詔兩浙諸州三大户自今令正身勾當其挾名替者先科欺罔之罪復追正身斷决從轉運使陳堯佐之請也甲申大宴含光殿軍校有醉卧禁街者詔廵邏者䕶送之仍命殿前司自今為例丁謂之討溪蠻也權知施州冦玹功最多於是以殿中侍御史為開封府判官嘗奏事上問其施州備禦之䇿因諭玹曰東川控羣夷爾功已試徃為朕撫之丙戌授玹梓州路轉運使玹後改名瑊丁亥知荆南府朱巽言准詔發兵赴澧州廵遏興師動衆必資糧餉加之地理險絶使臣張皇慮虧鎮靜之理陳堯叟曰巽不知朝廷本意昨遣兵止泊慈利縣自荆州至慈利皆坦途也饋運咸委轉運使不勞力役遣使諭其酋長固無驚擾之理若是則朝廷不可作事矣上曰巽能言事亦可奬也可否則繫朝廷爾將命者多務張皇誠有之自今更宜嚴其戒約戊子以吏部尚書知樞宻院事王欽若户部尚書知樞宻院事陳堯叟並依前官加檢校太傅同平章事充樞宻使簽署樞宻院事馬知節為副使學士晁迥草制誤削去欽若堯叟本官詔各存之遂改制而行儒臣領樞宻使相自欽若堯叟始參知政事刑部侍郎趙安仁罷為兵部尚書安仁小心畏謹處事精審特留意於刑名内外書詔關要切者必歸安仁裁損之先是上議立皇后安仁謂劉德妃家世寒㣲不如沈才人出於相門上雖不樂然察其守正不罪也他日與王欽若從容論方今大臣誰最為長者欽若欲排安仁乃譽之曰無若趙安仁上曰何以言之欽若曰安仁昔為故相沈義倫所知至今不忘舊德常欲報之上黙然始有意斥安仁矣嘗諭王旦曰聞趙安仁在中書絶不親事每奏對亦未嘗有一言可罷之旦對曰安仁頗知大體居常進擬皆同列議定方敢取㫖臣每見臨時變易於上前者皆迎合陛下意安仁無異議是有執守上曰能如此耶朕不知也卿可諭之使更宣力旦退以語安仁安仁曰上誤㧞擢至此以不才斥去宜矣使與衆人騁辯取容安仁不為也旦喜曰吾適保安仁於上前不誤知人矣及罷政事仍命同修史安仁雖在貴顯簡儉若平素尤嗜讀書所得禄賜多置典籍手自讎校近朝沿革衣冠人物悉能記之喜誨誘後進成其名聲當世以重德推焉記聞云王欽若譖安仁之明日遂罷政恐未必然今取王旦遺事録附見又沈充媛當此時但為才人恐記聞誤今改之三司使禮部侍郎丁謂為户部侍郎參知政事仍領修玉清昭應宫使初翰林學士李宗諤與王旦善旦欲引宗諤參知政事嘗以告王欽若欽若唯唯旦曰當白上宗諤家貧禄廩不足以給婚嫁旦前後資借之甚多欽若知之故事參知政事謝日所賜之物幾三千緡欽若因宻奏宗諤負王旦私錢不能償旦欲引宗諤參知政事得賜物以償已債非為國擇賢也明日旦果以宗諤名聞上變色不許及趙安仁罷謂時奉詔謁亳州太清宫猶未還即命謂代之盖欽若所薦云欽若與劉承珪陳彭年林特及謂等交通蹤跡詭異時論謂之五鬼己丑以鹽鐡副使右諫議大夫林特權三司使庚寅詔京東河北諸州民以大小麥折納預請絹錢者免其倉耗及頭子錢先是上謂宰臣曰朕每戒宗室令讀書作詩習筆劄射藝如聞頗能精熟朕將臨觀焉於是幸鄆恭靖王安文惠王宫奠其畫像又召宗室從官及宫僚宴射于相王元偓宫賜以御詩并衣幣有差日晡從官退上獨以中官從幸舒王元偁榮王元儼宫復宴元偓宫如家人禮夜二鼓罷元偓首冠戚藩能自修勵嘗曰讀書日記兩事嵗月滋久為益多矣上每稱其好學御詩出必令繼和焉辛夘詔嶽凟四海諸祠廟遇設醮除青詞外本廟神位並増祝文從學士院之請也先是洪州進士黄鼎偽鑄印為敕牒稱朝官紿娶婦利其資財事敗得罪禮部因請定士庶及寺觀所用私記式詔許雕木為文大方寸無得私鑄壬辰殿前司言諸軍訴本軍校長歛錢飾營舎什物數少者望令鼓司勿受上曰軍民訴事有𤨏細非切害者朕常寢而不行若明諭有司則下情壅塞人有寃滯矣不許癸巳翰林學士楊億以疾賜告遣中使挾太醫療之拜章為謝上作二韻詩批紙尾有副予側席待名賢之句尋以久疾求解近職優詔不許但權免朝直億剛介寡合在書局唯與李維路振刁衎陳越劉筠軰善當時文士咸頼其品題或被貶議者退多怨誹王欽若驟貴億素薄其為人欽若銜之陳彭年方以文史售進忌億名出已右相與毁訾于上上素重億未始聽也
