body:
  text: 續資治通鑑長編卷三百三十九宋李燾撰神宗元豐六年九月癸卯朔日有食之詔內外官司見行敕律令格式文有未便於事理應改者並申尚書省議奏輒畫旨衝革者徒一年即面得旨若一時處分應著為法及應衝改者隨所屬申中書省樞密院奏審傳宣內降若須索並隨處覆奏得旨施行即本司官親承處分須索仍畫所得旨録奏請實奉行於是上宣諭執政曰傳宣內降及面得旨覆奏法屢付有司討論終未允當今通內外為一法可更看詳乃行之元年十一月十八又三年五月十三又五年十月二十二又十二月十五日是日尚書右丞王安禮面奏比者舒亶坐自盜贓罪至除名楊畏論列以為失誤有司觀望執政致以贓罪蒲宗孟翻究西府事楊畏論奏臣擅行省事以快所欲徇私壞法無復綱紀及令楊畏根治乃與所言不同前後論事枉直輕重不當如此乞付有司劾治或即加重貶上批今日安禮面論御史楊畏論事挾情不直理當付獄否則重加貶逐朕未深究悉畏付吏可黜之狀三省官論有與安禮同者宜條例以聞當付近臣博議詳處其當已而三省進呈乃詔畏分析甲辰東上閣門使曹偃言閣門使副舊以有兼局故輪差一員直日餘官前殿退即各歸私第今新制行既罷兼局自當隨三省樞密院出仍乞著為令從之乙巳詔中書舍人分領六房隨所領命詞墨本云後復分日朱本削去云復分日乃元祐元年正月二十八日指揮今從朱本廣西經略司言勾當公事談掞言陶宗元等稱廣源尺寸之地難議分畫欲自作章奏以朝旨決可否宗元既不聼命見已回安南詔熊本指揮計議官如與陶宗元等計議仰詳朝廷降去文字執持理道折難商量毋得留連督迫以啓蠻人輕侮之意六月戊申七月辛亥八月乙亥録故西京左藏庫使果州刺史入內押班張允誠子左班殿直鈜為左侍禁孫之雄之純並為三班借職以逮事先帝藩邸特推遺表恩也丙午工部言都大提舉清河輦運司等乞以舊廣濟河并清河行運詔除霧澤陂水令工部相度其餘水可與不可應接廣濟河行運以聞廣濟河與清河並行運當考元豐五年二月十一日初罷廣濟運七月二十日王桓云云七年八月十九日上批提舉河東路保甲王崇拯建議本路教騎人以十分為率從上二分依麟府路和市為價每匹官給錢二十五千責令買及格馬依五年買足據見管人二分當得六千九百一十八匹為價錢十七萬二千九百五十緡可支京東路元豐六年上半年鹽息錢不足即續支下半年令京東路轉運副使吳居厚便置以往付王崇拯月具馬買數以聞其請給之際官私人有分毫取與並依在京河倉法本志有此戊申權發遣京東路轉運副使吳居厚為天章閣待制京東都轉運使先是居厚言本路元豐三年秋季至今上半年終酒稅課利比元豐二年前官任內祖額增百七十九萬五千餘緡其前官任內二年酒稅比祖額虧二十一萬緡上批居厚將命一道不辱使指無黷乎上不擾乎下不喧于聞而於二三年間坐致財用數百萬計前日縣官窘迫一朝變為寬紓經費之外又能應緩急之求內外理財之臣未有出其右者三省可議賞典故有是命居厚以二年六月初除運判五年六月為運副居厚本傳云居厚即萊蕪利國兩監官自鼓鑄贍足一路事在此年九月判陳瓘云云當檢附財范純粹元豐末為陜西路轉運官當五路大舉後用匱乏屢請于朝吳樞密居厚時為京東都轉運使方以冶鐡鼓鑄有寵即上羡餘三百萬緡以佐國用神宗遂以賜范范得報愀然謂其屬曰吾部雖窘豈忍取此膏血之餘耶力辭訖弗納此葉夢得石林燕語所載按詔旨欲撥徐州所鑄折二大錢二十萬付陜西范純粹具奏不納乃元豐七年三月十四日事三門白波提舉輦運司乞借本司所轄阜財監上供錢萬緡遣官於鄰州市木於本司造船場造六百料運船下陜西轉運司依數撥還從之內降蘭州地圖付樞密院手詔劉昌祚諸路探報夏賊點集至六七十萬雖其間精冗相參然賊人之衆若舉而偏攻一路當十倍於我萬一豕突入近裏州軍未知如何遏逐諸路帥臣各膺重寄未然之形宜有以預圖之可具賊之所嚮及禦逐方略來上秦鳯路經略司言所降將官敕本路五將各在外駐劄難為聚議又緣未有直降下逐將敇䇿乞指揮詔秦鳯路諸將各降與一部除營陳法即施行外其通用敇且令看讀候經略司看詳指揮提舉河東保甲兼提點刑獄王崇拯等言第四等已下保丁之家如本户災傷及五色已上即乞依常平條施行從之仍令河北陜西開封府界並依此施行己酉皇第十一子生遣雍王皓告于太廟舊紀書王子俁生新紀不書詔諸路經略安撫轉運司要急差用保甲牒提舉司提舉司隨色應副戰守防托差武藝髙強及第一等者役使差以次人吏部言右千牛衛將軍士俔魏國公仲來嫡長子當依禮令襲封從之權發遣陕西轉運副使范純粹言奉旨令鄜延環慶涇原秦鳯路經略司熙河蘭會路安撫制置使司於軍須錢內撥見錢二十萬貫差官趂時糴買糧草封樁望許臣與劉昌祚詳議據城寨緊慢以轉運司年計糴本及軍須錢帛并見錢公據隨宜分擘凡合當計置處止作一場糴買委劉昌祚與臣同共督責官吏趂時儲積候糴買畢却細算年計軍須錢本各依窠名樁管除以年計數充經費外其用軍須錢物所糴買到數目依本條施行其經略司取撥軍須錢二十萬貫指揮乞更不施行上批所申陳利害之理甚明宜依所奏此據朱本八月六日己卯并此月二十七日己巳皆合參照庚戌詔髙麗國王王徽卒令明州就本州或定海縣擇廣大僧寺以僧三十七人作道場一月罷散前夕作水陸一會徽立凡三十餘年其境東南臨海西北接契丹女真黑水自王建并新羅百濟之地至此蓋百七十餘年王居蜀莫郡曰開州號開成府新羅曰東州號樂浪府為東京王居東北二十日行百濟曰金州號金馬郡南十二日行扶餘舊地曰公州號扶餘郡又南二十日行平壤曰鎬州為京西鴨緑江為西北徼東所臨海水絶清下視十丈大凡海至髙麗界則清入登州經千里長沙即濁地寒多山國王出平地常乘車駕牛或以馬涉山險乃騎官有中書省中樞院平章事參知政事中樞使翰林學士知制誥大抵倣中朝國子監四門學學者至六千餘人三嵗一貢舉進士試詩賦論明經試一大經一小經進士夜試給燭三為蠟八兩燭盡不就即退榜放五十人書有東觀漢記百官以米為俸或給田授罷隨官增減致仕乃已貿易亦用銀米而不用錢不禁民釀酒兵出於民藩衛王府國人好佛法開成府有寺七十餘區興王寺僧千五百人官給田三百結俗以田四方方四百步為一結上田結收二百苫苫為斗十五正與中國一石等天聖以前使由登州入熙寧以來皆由明州言登州路有沙磧不可行其自明州還遇便風四日兼夜抵黑山已望其國境自黑山入島嶼安行便風七日至京口陸行兩驛至開州朱墨本並同正史髙麗傳所載地里與實録並不同當考辛亥陜西轉運副使范純粹言鄜延一路新地稅賦闕乏乞許臣不限元豐三年舊例酌鄰並州縣稅賦逺近移闕處送納從之録四方館使榮州團練使髙永能子供備庫使世亮為皇城使忠州刺史孫右班殿直昌朝為右侍禁借職昌祚並為右班殿直加贈永能房州觀察使賻賜加等壬子擢虔州贑縣尉馬防為宣德郎以捕賊應格也癸丑御史楊畏言被旨分析王安禮所言事臣所論舒亶之事特出於所見非有它心及亶即罪則臣自知為不當因請放逐陛下幸而赦之至於王安禮事臣請略言臣所論修西府事緣是宗孟安禮通書雖宗孟先批依申安禮押過若分首從理或可行獨罪宗孟臣所未諭且依申指揮事出官長安禮丞二處而行之故曰擅事徑用本府吏人行遣不由有司故曰快所欲以己所居故曰徇私有法而不用故曰壞法安禮身任綱轄所為若此故曰無復綱紀臣己案後收坐安禮情罪自緣朝旨罷勘即非所言不同臣聞大臣法則朝廷尊故不量力以圖報效詔以畏為宗正寺丞仍詔宗正寺除長二外自今更不専差國姓官詔各品官詣尚書省六曹上下馬並依雜壓詣尚書省即太中大夫以上就第一貯廊監察御史以上就過道門詣六曹尚書侍郎廳即太中大夫以上就本廳監察御史以上就客位餘並過道門外知瓊州劉威言朱崖軍土脈肥沃欲乞委本軍除舊係黎人地不許請射外餘許招誘客户請係官曠土住家耕作仍立賞格激勸從之延州制勘公事所上閣門使丹州團練使鄜延路第二將李浦案詔李浦貸死免真決不刺面配沙門島遇赦不得放還權環慶總管曲珍罰銅二十斤浦坐永樂城下未戰棄寨出走而副將髙士才死戰浦不能救援又對制使不以實珍坐聽浦請報制使軍前事不盡實也權發遣經略安撫司劉昌祚言浦諳曉軍政乞且留在本路凖備緩急使喚詔從之昌祚奏留浦據御集五月二十五日當并考甲寅河東經略司言本路有當修城壁計功料浩大轉運司錢穀有限必難應副乞賜度僧牒五百分與緣邉州軍和雇軍民修完其次邉及近裏州軍乞令轉運司就農隙度功料發民夫從之乙卯京東都轉運使吳居厚乞并提舉京東路鹽稅司入轉運司為鹽事案又乞青州等十二處監鹽官令本司奏差兩次及非州縣處場務獨員闕官亦令本司選差並從之初置鹽稅司當考或是張景憲提舉京城所言先凖朝旨發夫開新城外壕候興役令開封府界提點司與提舉京城所官同提舉勘會本所已檢計分放工料難更同提舉緣今夫役近在輦轂之下全藉鎮撫欲望差管軍臣僚都大提舉詔開封府界發夫五萬人仍差權開封府推官祖無頗提點開封府界縣鎮公事范峋殿前都虞候苗授都大提舉編欄提舉陜西買馬監牧司言乞免簡發沙苑監捧日馬留為馬種從之七月末可考涇原路鈐轄知鎮戎軍姚麟言遇别路關報西賊入寇乞親總兵出界牽制從之丙辰承議郎左司郎中楊景略為髙麗祭奠使供備庫副使兼閣門通事舍人王舜封副之朝散郎錢協為弔慰使西頭供奉官閣門祗候宋球副之兩紀並書以髙麗國王卒遣使弔祭户部言侍郎寋周輔言河北鹽稅太輕宜倍增稅錢乞下所屬參較立法本部欲下河北轉運司相度從之此據實録朱墨同會要在八月十四日丁亥今不取詔撥河北糴便司見錢二十萬緡應副都轉運司市糧草管勾河東緣邉安撫司李宗師言體量麟豐州弓箭手借官錢穀實以闕食乞住催納從之詔門下中書外省祕書省依諸司遇大忌不作假及不隨執政官早出其尚書左右司樞密院承旨司大忌早出日隨執政出指揮其罷之詔給事中分領六房兩員即依左右曹分領章奏開拆制敕庫房進奏院通進司並通管熙河蘭會路經略制置司乞以見在蘭州駐劄秦鳯路駐劄東兵兩指揮𨽻熙河蘭會從之蕃官六宅使李阿邁減磨勘四年以熙河蘭會經略司上阿邁部五十騎出界刺事獲首級功狀故也丁巳上批付劉昌祚得所進器械具悉今於京師見作軍仗賜卿金線烏梢弓十神臂弓二將官甲馬軍甲偏挨甲各一斧合竹馬槍馬軍刀步人刀各五欒竹步人排附排刀各一標二透蝎尾馬黃弩樁一以備出入卿更省閲具便否以聞八月二十六日先賜詔户部侍郎寋周輔言纍奏乞不閉御河徐曲口以通漕運及令商旅舟船至緣邉蒙差河北東路提舉官楊景芬兼轉運司委官相繼案視得量留口地節限水勢其事理甚明蒙差都水監丞陳祐甫一面施行而祐甫計惜工料不即開撥况徐曲口於轉運措置兩司所繫利害甚大乞選差深曉河事非都水監所屬官一員重相度行視詔本路安撫提點刑獄司與知恩州官同相度以聞戊午差入內東頭供奉官勾當龍圖天章閣馮景計會京東路轉運使吳居厚於登州排辦髙麗國信使所行海道永興軍路提舉司言本路今秋豐稔欲許合催納苗役等錢物聽民折納從之已未權管秦鳯路經略司吕溫卿乞輪差將官在外城寨駐劄訓練漢蕃弓箭手兵馬從之仍毋得創廨舍庚申詔西頭供奉官閣門祗候童政改東頭供奉官更減磨勘一年以政自陳昨討安南嘗立功得旨許轉官減磨勘年故有是命簽書峽州軍事判官張燾言竊見殿直舒光貴增差峽州監押光貴本沅州溪洞首領歸明恐不可管勾一州之民詔吏部與移京東西路差遣知延州劉昌祚言第二將彭孫所請獲首級傷中賞絹凖朝旨相度等第裁減事乞且依元立賞格施行上批軍賞之行所加者衆患在數易以惑士心如昌祚之言甚允宜依所奏他路可並凖此御集所奏事尤詳今止從墨本辛酉詔應輸內藏庫金銀錢帛如出違本年或轉移他用如擅支封樁錢法新知蔡州黃好謙言伏見尚書六曹如吏部左右選戶部左右曹事務皆為繁劇郎官自早至晚書押不絶無暇省覽事祖致差失稽違乞以兩員郎官處分案治事所行符亦許員外郎簽押從之此月七日好謙自司勳郎中除知揚州未行改蔡州曽氏南遊記舊載好謙事謬妄今不取權發遣鄜延路安撫司公事劉昌祚言本路部將并城寨主監押堡鋪把截監押堡鋪橋巡檢等使臣並當極邉不可暫闕昨因陳亡并移任過滿員闕處未嘗填差乞於自京差來及本路所選擇使臣並差令填闕從之癸亥詔降授朝散郎守大理寺少卿吕孝亷昨任京東路轉運判官與本司官長協心修辦職事致課入登羡可復所降官為京東路轉運副使改轉運判官朝散郎趙稱為提點刑獄上批甘陵河朔要地土氣驕悍常須得人彈制則免意外生事近除知州傅燮資望人品恐不可當此任使宜别選官乃以朝散大夫王孝忠知恩州詔措置河北糴便司夏秋每料先給交引百萬緡兼本司見錢糴買候交撥訖具數以聞丙寅命朝請大夫主客郎中龎元英代錢協為髙麗弔慰使元英以母老辭乃復命協詔協不候禫制滿赴闕王舜封亦不候服闋朝見手詔門下中書外省見修尚書省六曹條貫至今多日未有涯緒蓋議論官多人出一意若不分曹編修徒占日月必無成書之期宜以六曹繁簡相參每兩曹差詳定檢詳官各一員庶人各任責朝廷有望成就以詳定官韓忠彥陸佃領吏兵部蔡京蔡卞領户禮部趙彥若王震領刑工部其刪定官每兩曹置三員令門下中書外省分定具名以聞御史中丞黃履言本臺舊有主簿兼檢法官二員乞復置令分治職事詔各置一員詔嵗於蜀州撥州學錢二百千導江縣百千與成都府贍生員其見管田增給為十頃從知成都府吕大防請也吏部侍郎蘇頌上華戎魯衛信録二百二十九卷事目五卷總二百册詔别録一本與樞密院賜頌銀絹三百檢討官朝奉郎王汝翼升一任通直郎李士京銀絹六十頌又言昨于樞密院等處閲檢文字欲依門聨類成册關送樞密院宣旨庫置匱封鎖從之先是遼使鄭顓來賀五年正旦顓明辨有才智頌為館伴上命副使張山甫諭顓以近令頌修信録欲以固兩朝盟好顓感激稱謝見頌益恭私覿禮物皆異常時上遣使諭旨曰聞北使以卿儒學醖藉贈遺特殊今以上龍茶琉璃器賜卿可豫之以答其意顓復遺頌異錦一端即日進之後因奏事語及上曰宫中所無也新紀特書吏部侍郎蘇頌上華戎魯衛信録舊紀無此中書舍人趙彥若等言六房公事乞據舍人員數分領以吏戶禮兵刑工為次其年事班簿制敕庫房並通領從之丁卯詔自今三省進呈差除如從中批出止從中書省奉行其事理未允者所至之省具奏鄜延路經略司奏據順寧寨言西界把口小首領棟芝額指説環慶路兵入西界殺兩流人馬詔環慶路經略司具析有無兵入西界討殺斬獲仍詳鄜延路言西賊欲來酬報事選人伺候常為預備兼八月後本路纍以巡防探事為名遣兵出界各有斬獲并奪到孳蓄顯是不依元降無輒出兵詔旨慮西人以此為詞仰常誡約緣邉城寨兵將官等遵守前詔仍令樞密院更不送門下省止用金字牌發下金字牌長尺餘朱漆刻金字書御前文字不得入鋪尤速於急遞京東都轉運使吳居厚奏本路徐鄆青三州都作院及諸州小作院每嵗制造諸般軍器及上供簡鐵之類數目浩瀚今將徐州利國監兖州萊蕪監年計課鐵充使外所少極多欲乞將兩監鐵冶就逐處監官依邢磁二州例並從官中興扇計其所得比舊可多數倍從之居厚本傳乃以鼓鑄事繫遷運副下誤也遷運副在五年七月戊辰起居郎蔡京言舊修起居注官二員不分左右每月輪一員修纂今起居郎舍人分𨽻兩省所以備左右史官則左當書動右當書言今仍舊制每月輪修蓋其職事未之有别乞自今起居郎舍人隨左右分記言動如允所言其當釐正等事即别具陳請從之詔前京東路轉運使朝散大夫集賢校理知亳州劉攽任內不能修舉職事致經用匱乏屢煩朝廷應副今吳居厚經畫財賦約數百萬不惟本路充足兼有羡餘應副朝廷劉攽不職罪狀甚明可落集賢校理降授朝請郎增差監衡州鹽倉詔今秋銓試中等七十七人下等八十八人並許注官內中等仍不依名次己巳詔陜西五路經略司各撥軍須錢二十萬緡同轉運司計置作一場市糴封樁從轉運副使范純粹請也純粹元申請在此月七日己卯禮部言親祠南郊舊儀皇帝進詣昊天上帝神坐前奠玉幣訖還位又再升壇進熟一獻禮畢即飲福受胙被旨候亞獻終獻禮成然後飲福則皇帝須再升壇欲乞俟終獻復位皇帝於壇下當午陛前北嚮飲福乞於儀注內修正又言周禮凡大祭祀王出入則奏王夏明入廟門已用樂矣今既移祼在作樂之前皇帝詣罍洗奏乾安則入門亦當奏乾安庶合古制兼皇帝入景靈宫門及南郊壝門亦乞奏乾安樂從之庚午詔三路非泛使命除當得支賜外仍取旨别與支賜其所至不得饋遺如違送與受之者各徒二年户部言在京賣買鹽鈔場買鈔本錢支盡乞借鹽本二十萬緡買客鈔從之仍依元豐四年三月乙巳詔買候價平奏取指揮禮部言樞密院都承旨張誠一言伏見朝服法物庫有太常協律郎太樂丞新給袴褶冠今檢諸書志惟袴褶之制未詳所起近代車駕親征中外戒嚴則服之唐制三品以上緋褶七品以上緑褶九品以上碧褶五品以上通用細綾六品以上通用小綾及閲鹵簿記止有鼓吹令丞冠注漆皮為之有兩耳鏤花形如三禮圖委貌冠今俗謂之袴褶冠收載庫籍即無所據乞下禮官考正乃下太常寺于是太常寺言袴褶乃是從戎之服以此名冠尤無所據協律郎當押樂太常卿遇祠祭朝會各以本品朝祭服從事兼太樂令丞今止服本品冠服其袴褶並合不用從之辛未詔內殿崇班王景等八人各遷一官餘減磨勘年有差並以監轄造甲而所造步人甲十萬先畢功也壬申兵部乞以川路見樁賣不堪官馬及死馬錢委提舉司官計置匹帛上京川陜四路凖此從之蔡確舊傳載確事當附見此秋紹興史臣新修哲宗實録已具辨之今悉附見確傳云確為右僕射六年秋與中書侍郎張璪奏事崇政殿上悲不自勝謂確曰天下事止此矣確駭曰敢問所因上曰子幼奈何確曰陛下春秋鼎盛忽有不祥之言不審所謂上曰天下事當得長君維持否確曰延安郡王陛下長子臣不知其它臣有死而已不敢奉詔上曰卿果能為社稷計宜早定確與璪俱進曰臣等敢以死守上曰善確被顧託乃謀欲請王出閣建儲議不協又意上特悲思無聊耳猶豫不決七年春延安郡王出侍宴集英殿確始奏請猶欲來春出閣上可之後因有對者言及確上曰羣臣皆先皇帝以遺朕者如確自小官朕親擢至此必不負朕然氣弱得人輔之乃可確聞益自奮久之八年正月神宗疾彌月皇嗣未立中外洶洶確始懼乃以建儲意問左僕射王圭圭不答確亦懼不知所出事愈急會確母得入禁中欽聖憲肅皇后諭確使外託主兵官燕逹等輔立又因內侍閻守勤諭早定或謂確曰此大事也請與衆詢圭不言則正厥罪是時輔臣韓縝安燾張璪李清臣隂持兩端噤不語確獨約門下侍郎章惇共力癸巳輔臣聚廳確顧謂圭圭亦不語確曰去春延安郡王侍宴嘗有旨來春出閣議已定不言何也惇曰言之是則從否則僕與公偕死圭始曰上有子何議之有是日日晡議詣榻前奏曰去冬得旨皇子延安郡王來春出閣乞立為皇太子以係天下三奏神宗三顧首肯臣等辨曰祕書省國史案文載太皇太后御崇政殿宣諭三省貶確事七百一十三字甚詳其間云皇帝是神宗長子子承父業其分當然昨神宗服藥既久曽因宰執等對時吾嘗以皇帝所寫佛經宣示其時衆中止是首相王圭因奏延安郡王當為皇太子餘人無語安燾其時悉見又云皇帝乃先帝長子嗣位乃從來常事孰有間言蔡確班在圭下何以獨謂更有定策功邪安燾奏曰當時惟首相王圭一人進對太皇太后遂泣下開訴便批聖語其餘執政更何曽有言况前年上宣皇子使見羣臣足知先帝之意素定也兼當日三省時政記已如此修定進呈豈容外人敢如此妄説謹按此事已修入元祐四年五月丁亥蔡確責授英州別駕新州安置事下詳此即確傳前項所載顯為誣謗今刪去六年秋止三顧首肯四百六十二字
