body:
  text: 續資治通鑑長編卷三百三十一宋李燾撰神宗元豐五年十一月戊寅朔上謂輔臣曰御史分察中都官事已多矣又令察舉四方將何以責治辦且於體統非是可罷御史察諸路官司如有不職令言事御史彈奏著為令新紀書戊寅罷御史察諸路陜西轉運副使李察請鄜延涇原環慶熙河等逐路各分委監司官一員專計置應副一路諸將并防城軍器什物從之去年大舉轉運司官已各分路今又有此奏請當考熙河蘭㑹路經略司言董戩鄂特凌古果莊自言破夏國喀羅磋葉城詔經制司令鄂特凌古具有功首領姓名以聞後各賜銀絹有差定州路都總管司言見闕步軍乞不限指揮招填從之河北諸將凖此都水使者范子淵言昨被㫖救護廣武掃大河淪塌隄岸賴官吏奔走赴功連夕暴露畢力營救遂獲安定宜䝉恩賞以勸後功詔子淵具名以聞後轉運副使向宗旦以下各减年升名賜帛有差己卯謝麟言接納安化州歸順蠻人利害上批邊情在逺朝廷不見利害之實委謝麟等便宜措置無致生事四年九月戊子以客省副使謝麟知誠州本𫝊云未幾復知沅州今年七月辛巳麟已自知沅州除經制宜州溪洞事則此時不應以知誠州見今實録稱知誠州恐誤今削去知誠州字九月庚寅更詳之詔种諤具析沈括帶將官使臣軍兵若干往永樂城永樂陷沒及緣路亡失若干諸處存撫收集并沈括隨行各若干以聞不得用情增减朱本簽貼云一時取索刪去今復存之要見亡失實數詳定禮文所言周禮小宗伯禱祠肆儀為位後漢𨽻司徒府皆不於祠所所以逺慢戒瀆本朝親祠南郊習儀於壇所明堂習儀於大慶殿皆近於瀆伏請南郊習儀於青城明堂習儀於尚書省以逺神為恭從之又言壬午景靈宫奉安輝德殿三后衍慶殿三后欲每殿三位同用一祝版不特拜詔每后各用祝版仍特拜墨本云明日奉安輝德殿三后朱本削明日奉安四字新本謂明日奉安典禮也不可削今從朱本大宗正司言興州防禦使仲騑先坐以火灼人面罰俸一季展磨勘一年後又灼女奴面一年之中三犯非禮殘暴乞重責降詔展磨勘五年二月十五日仲騑罰俸詔梓州路轉運判官承議郎程之才知徐州朝散大夫趙鼎並衝替之才坐與前知瀘州任伋交訟報上不實鼎坐乘官舟附私物也原武决掃塞詔禮部員外郎王子韶乘驛祭謝勃泥國進奉使言乞自泉州乘船歸國從之去年八月末入貢詔特倚閣熙河蘭㑹路四州軍弓箭手及鄜延路沿邊城寨漢蕃户借貸錢榖庚辰瀘南緣邊安撫司言乞以戎州所買蠻馬配本路兵外給十九姓七姓義軍人員令習馬戰從之給事中陸佃言讀吏部所上鈔內朝請郎提舉玉隆觀吳審禮擬遷朝奉大夫緣審禮以老疾乞宫觀法不當遷詔寢之皇城使惠州團練使李舜聰提舉府界盜賊巡檢公事視諸路鈐轄詔梓夔州鈐轄供備庫使髙遵治戎瀘等州都巡檢西京左藏庫副使張壽各降一官坐殺已降不肯解弓刀夷賊自上獲渝水夷人冒賞雖㑹降赦特責之辛巳奉安禮儀使宰臣王圭蔡確知樞密院孫固門下侍郎章惇中書侍郎張璪同知樞密院韓縝尚書左丞蒲宗孟及百官等班集英殿門上詣蘂珠凝華等殿祖宗神御行告遷禮至慈聖光獻皇后英宗皇帝坐號慟久之羣臣莫能仰視於是圭等奉神御升綵輿赴集英殿有司請皇帝還內上不聽每神御步從出殿次第導畢始還宫時將奉安景靈宫至是塑像工畢始遷坐於集英殿也詔皇城使張免如京副使石溫其內殿崇班趙潛各追五官文思使髙政文思副使樂進各追四官供備庫副使潘定劉青各追三官皇城使桑湜供備庫使任端內殿崇班閣門祗候宋球各追兩官皇城使沂州團練使李祥左騏驥使閣門通事舍人孫咸寧左藏庫使楊進內殿崇班閣門祗候孫文各追一官東上閣門使狄詠西上閣門使張守約皇城使昌州刺史帶御器械梁從吉各降一官並坐出界將領計亡失所部兵用十分法追奪也壬午質明宰臣百官班集英殿上御殿東幄升殿奠薦如儀禮儀使以神御綵輿行有司奏請還內上不聽步出幄每神御導出至宣德門外次第導辭畢還宫奉安於景靈宫癸未上朝享景靈宫宰臣百官陪祠殿下先詣天興次遍諸殿至繼仁殿哀慟久之先是祖宗神御殿分建於諸寺觀上以為未足以稱嚴奉之義乃酌原廟之制即景靈宫建十一殿每嵗孟月朝享以盡時王之禮及是宫成奉安禮畢初朝享也賜管勾及勾當景靈宫官器幣有差新紀書壬午景靈宫成告遷祖宗神御癸未初行酌獻禮乙酉赦天下官繪象臣僚子若孫一人庚寅燕侍祠官舊紀比新紀差詳要是别無異事景靈奉安英宗皇帝御容畢次日皇太后親詣酌獻祝文鄭鄖溪集列真祕宇右敞神宫天開九重雲車來下威顔斐亹玉座甫寧涓吉齊誠躬修明薦以時朝獻永奉皇靈在案雲車句當在天開句上躬修句當涓吉句上于韻乃叶此疑倒書廣南東路轉運判官徐九思言東海有島曰香山僑田户主客共五千八百三十八分𨽻東莞南海新㑹三縣凡有鬬訟各歸所屬縣辦理遇風濤則踰月不通乞建一縣因香山為名本路監司相度欲止置香山鎮差監官一員兼烟火盜賊從之乙酉以景靈宫奉安神御禮成大赦天下文武舊臣預神御殿繪象之子若孫並與初品官親王之後與見襲爵者遷一官當刪取赦書條件增入封御侍陳氏為才人詔罷知宣州陳侗再任差判登聞檢院以御史王桓言其不當以便私求再任也都水使者李立之言今月壬午塞原武掃决河口五鼓兩馬頭墊落水面闊二十五步雖已固護修閉緣冬深天寒難施工作乞至正初乃進工從之應修閉水口官吏並令開封府劾罪河中府言脅降蕃官殿直拜斯凌殿侍李楞濟伊特香三人不敢一例刺配詔押送江西州軍羈管給大將劵本處給身分請受河東路經略司言府州火山軍申黃河內有北界人船漂至河濵斥候堡已收救得詔牒還北界丙戍詔李憲聞知蘭州李浩性多褊執役使軍士過當多有怨嗟仰密體量如委不可倚仗在彼即别選人以聞後數月命王文郁代浩知蘭州王文郁知蘭州在明年二月九日丙辰鄜延路經略司言塞門山城逼山受敵有古城基并古壕限權本路第三將米贇和募禁兵興築凡七日功畢詔米贇减磨勘三年都水使者范子淵言自大名抵乾寧跨十五州河徙地凡七千頃乞募人耕租從之戊子詔鄜延路沒於王事有家屬見在本路欲歸鄉者給賻外其大使臣以上更支行李錢百千小使臣五十千差使殿侍三千其餘比類支給詔故淑妃董氏逮事仁宗生魯國大長公主與恩澤四人令本家具名以聞權京東路轉運判官吳居厚言諸州剩員所在利於冗占乞從轉運司與當職官看詳合留窠坐裁去冗占以立定十分外量立一分為額以待緩急餘並簡放編入奏䇿從之陜西轉運副使權環慶經略司范純粹奏近者伏見鄜延路行營軍馬以賊兵大至永樂被圍徐禧以下皆在圍中勢有不立須藉鄰援本路經略司牒環慶等路差發兵馬是時臣適在環慶親見曾布議論以謂不奉詔㫖不敢擅遣後至降到朝㫖果令差發未及延州而永樂新城既已不守使者殱沒兵將亡陷上軫聖念下困人力機㑹之失害事如此臣檢凖先降戰守約束諸路並於平日差定主兵官將凖備互相應援或賊衆大舉聚入一路除已差兵將外更許逐路那兵節次䇿應昨因徐禧計議邊事悉罷策應之法方於其時莫有言者而利害得失見於今日豈有兵困重圍請援鄰道尚容中覆而後可哉今邊患未消敵情難測願陛下深鑒近事斷自聖心更修久長之法以杜倉猝之患臣不知邊事不識忌諱惟是思慮所及不忍緘默負區區憂國之素心詔陜西逐路經略安撫使自今應有事宜更不令别路兵馬應援常須本路廣為隄備自作枝梧無致誤事純粹五年十月十一日復運副使是冬奉詔權領環慶路經略司十一月十一日奏此十二月二十九日有㫖下諸路時純粹已罷帥更不别論奏奏議第十卷可考元祐元年閏二月十一日純粹再奏四月三日又奏二年二月十八日降指揮己丑翰林侍講學士黃履試禮部尚書通議大夫禮部侍郎謝景溫以本官知洪州景溫奏疏陳邊事所言多上與執政密議外人無知者尚書左丞王安禮景溫妹壻也上疑安禮泄之惡景溫交結迎合故令出守此據劉安世言章知誠州周士隆言凖朝㫖招納上江多星銅鼓潭溪上和雞公兩路溪洞所有西道胡耳塞溪等處犬牙相入竊慮犒賞不及或不虞生事乞下謝麟措置或許本州撫納詔趙楊相度尋令依荆湖北路都鈐轄司所奏一面撫納更不候趙楊相度不候相度見乙巳日今并書謝麟前知沅州四年九月知誠州未幾復知沅州此據麟本𫝊不知周士隆何時知誠州或是代麟也七年五月十一日孫覽云云可考荆湖南路轉運司言邵州界溪四團人户袁通曉等乞歸明詔聽招納經制宜州溪洞謝麟等言安化中州并上州蠻蛋未便歸順乞差將兵詔於廣東江西近便路選兵三千并差桂州駐泊驍騎兩指揮宣德郎洛陽楊畏為監察御史用中丞舒亶薦也庚寅燕於紫宸殿以奉安列聖於景靈宫禮成故也辛卯就差案閲河北集教保甲樞密副都承㫖客省副使張山甫入內東頭供奉官勾當御藥院劉惟簡案閲本路團教保甲依案閲賞格給賜弓箭手馬步射第一等銀碗七兩絹五匹步射及弩手第一等銀碗五兩絹五匹第二等三等各第减三之一都副保正大保長并己補名目教本保人武藝及第一等都副保正計本都保及十分三班差使借差八分大保長計一都保及十分三班借差九分下班殿侍八分並給銀碗十兩絹五匹不及十分第减有差壬辰詔聞蘭州食貴本州等守禦兵見管七千除留壯健四千人外其餘令於近裏州軍就糧新知湖州閭邱孝直言伏見在京置四抵當所許以金帛質當見錢月息一分欲望推行於諸路州縣其無市易官處就委場務官兼監以嵗終得息多寡為賞格朱本刪去云無施行詔樞密院自今應本院畫㫖送承㫖司文字緣係未行出本院可更不送門下省此據御集十一月十五日事癸已步軍司言效忠指揮使林方狀三次功勞當轉資檢㑹賞格止言指揮使兩該賜即轉都虞候其效忠軍額無都虞候職名詔林方特轉都虞候熙河蘭㑹路都大經制司言昨大軍出界差主簿李宗傑隨軍指引保甲人夫發粟窖搬運遇蕃賊陷沒未推恩詔宗傑依軍主簿陳彥長例以父官官其子給支賜賻物監察御史王桓言知䖍州汪輔之謝上表辭意狂悖望特竄殛詔罷知䖍州依舊分司輔之前為開封府推官乞分司久之乃得䖍州謝表云清時有味白首無成又曰插筆有風空圄無日言者謂清時有味蓋杜牧詩其末句云樂遊原上望昭陵輔之託意怨望故黜之司馬記聞云輔之為河北監司坐輕躁得罪勒令分司按輔之分司不緣輕躁事在元豐三年九月四日記聞或誤也今略加刪修甲午延安郡王傭言䝉恩進封本閣使臣乞下有司檢例推恩詔內東頭供奉官馮世寧减磨勘二年內西頭供奉官李倬藍從熙各轉一官知秦州通議大夫吕公孺知相州先是李憲以詔發兵公孺不遣與憲互論故有是命此據本𫝊司門郎中李文卿知晉州以御史王桓言文卿品質卑凡不足汚郎官之選故也詔提舉教習馬軍所見教臣僚子弟并百姓等馬步射闊閃弓各及一石五斗力手足應法者具名奏熙寧十年九月庚午秋詔同提舉此詔與元豐三年六月十八日己酉手札相重恐實録或誤當考舊録王中正𫝊云詔提舉教閲在京馬軍中正悉以所製弓弩諸兵器及擊刺施用與馬步射教法上之既試咸可用詔頒行之又云詔選教內臣及馬軍武藝以諭諸將提舉教習馬軍所教臣僚軍班子弟及武學生員凡數百人既成引見升補有差新録並削去今附此當考熙寧十年九月庚午至元豐三年三月甲戌五月癸酉六月己酉六年二月辛亥當并考户部言行官制以來惟是吏祿條目最多一等吏人職次既同責任又均而獨於祿廩頗有厚薄誠若未安乞三省六曹諸司省臺寺監見充正額人數不問舊請多寡並依新格支給其係撥到逐等守闕或帶權字人並給正額請受十分之七應前後許帶舊請指揮更不施行詔除三省外依奏乙未河東路轉運判官通直郎蔡曄直龍圖閣知秦州詔大宗正司不𨽻六曹其丞屬聽中書省取㫖差都知押班除授歸樞密院三月乙未七月庚子當考景福殿使武信軍留後李憲為熙河秦鳯路經略安撫制置使其經制邊防財用依舊上始欲用憲為節度使知熙州尚書右丞王安禮曰國朝之制內臣無任節度使者其寵任之極不過畀之稍廩而已當真宗時劉承圭以忠謹得幸欲以節度使與之王旦執以為不可故至今官不過留後矧有民社豈易輕付上曰憲解內職未必喜安禮曰人主用人顧理之有是非不計其人之喜與不也昔漢光武用外戚隂識為侯常每巡幸則委以禁兵留鎮京師以識之賢固堪其事而後世乃緣以為比不問賢否為公卿用事者踵相躡也故卒為東漢禍今憲雖有戰多使其果賢猶不可啓其端况無以踰人者尚書左丞蒲宗孟進曰陛下擢材無所不可安禮曰宗孟他日未嘗言而今乃及此臣不識所謂既退安禮毅然謂宗孟曰孰遣君出聲幾亂朝廷事宗孟恚曰上使宗孟與政今顧弗得言明日廷辨之安禮曰君等足與為治乎苐言之祗為諛耳宗孟慚卒不敢辨此據安禮行狀附見當考求月日或削去詔宗室叔敖訟禮院定克愈襲封不公罰銅二十斤兵部言己支陜西軍器百一十萬今本路又乞支軍器詔據所闕三分給付一分管勾後苑房廊物貨所言元豐四年八月置場至今年十一月共收錢六萬七千緡朱本削去丙申門下省奏樞密院差入內東頭供奉官李宗立領萬壽觀不當為提㸃詔改為管勾又詔州縣官得替計程支庸錢而中道物故丁憂者程雖未滿其錢勿追詔選新知登州朝散大夫石禹勤知撫州如行鹽法職事修舉當議旌擢承議郎考功員外郎范峋增差提㸃開封府界諸縣鎮公事增差當考御史中丞舒亶言根勘住滯梓州路轉運司乞差官給授田土及差周宥崔象先勾當軍頭司事已根究住滯事節實緣官吏慢令造姦雖該赦更不勘結望裁酌指揮詔結勘以聞十月甲子劾明年二月庚戌斷又詔新移遼使驛路所過諸州權許不限米石數造酒鄜延路經略司言延州白草等城寨及保安軍等二十二處守禦未備乞指揮范純粹應副詔録吕惠卿所立鄜延路守禦要急次急稍緩三等及據緊緩計置防城器甲什物分數條約劄與范純粹詔撥糴便司見錢鈔二十萬緡與河北轉運司計置軍儲已亥陜西轉運副使李察言本路五都作院未分路時專差監司一員檢㸃今諸處急闕軍器全藉都作院應副欲令華州應副鄜延路鳯翔府環慶路秦州秦鳯路渭州涇原路永興軍永興軍路各委監司提舉其永興軍都作院乞委提㸃刑獄一員提舉從之十二月十六日差官庚子特封雍王皓長女為京兆郡主乙巳上批付苖授據閻仁武奏十月壬申蘭州北有西賊五十餘人隔河呼曰我夏國己勝鄜延路兵俟河凍即至蘭州卿宜大作枝梧守禦器具倍加㸃檢聞賊酋星多哩鼎者用兵頗凶忍星多哩鼎已見四年十一月己丑永樂之役初總兵至者乃梁默寧凌逡巡十餘日每日支分萬餘人持鍬钁撅城為城上官軍擊死者旋即拽去或覆以氊不欲官軍見之後哩鼎領兵至驅率蕃丁蟻附而進死者列布城下皆不掩尸晝夜急攻故新造之城不守卿宜知此并密諭蘭州守將委悉令廣備守具提舉陜西買馬司言本司管認支填遞馬闕數至多少有及四尺一寸赴官中賣欲乞依定價權買四尺二寸一寸牡馬及十一嵗以上與牡馬相兼支遣從之仍不充額奉議郎知楚州鹽城縣向宗賢言本縣前監都鹽倉通直郎王仲京在任於質户質錢倍過物價已贖仍虧子錢百千仲京宰相王圭之從子故無敢發摘乞選官根究詔淮南路轉運司劾之詔提㸃開封府界諸縣鎮公事承議郎楊景略降一官管勾官歐陽粲任元渥各罰銅二十斤並坐遷本司廨舍違滯及景略不親督趣捕蝗雖㑹恩特責也安化州蠻人䝉光仲光趙等六人內附各除官有差七月辛巳是月夏人以書繫矢射之鎮戎軍境上劉昌祚以白經略使盧秉秉命毁棄之夏人又遣所得俘囚齎書遺秉仍移牒秉不敢不以聞詔秉諭夏人依故事於鄜延自通其遺秉書稱夏國南都統星茂威明吉鼐書云昨於兵役之際提戈相軋今以書問贄信非變化曲折之不同蓋各忠於所事不得不如此耳夫中國者禮義之所存出入動止猷為不失其正茍聽誣受閒肆詐窮兵侵人之土疆殘人之黎庶是乖中國之體豈不為四方之羞哉昨朝廷暴驅甲兵大行侵討蓋天子與邊臣之議謂夏國方守先誓宜出不虞五路進兵一舉可定遂有去年靈州之役今秋永樂之戰較其勝負與夫前日之議為何如哉且中國非不經營五路窮討之䇿既嘗施之矣諸邊肆撓之謀亦嘗用之矣知僥幸之無成故終歸樂天事小之道兼夏國提封一萬里帶甲數十萬西連于闐作我歡鄰北有大燕為我彊援今與中國乘隙伺便角力競鬬雖十年豈得休哉念天民無辜被兹塗炭之苦孟子所謂未有好殺能得天下者也况夏國主上自朝廷見伐之後夙宵興念謂自祖先至今八十餘年臣事中朝恩禮無所虧貢聘無所怠何期天子一朝見怒舉兵來伐令膏血生民勦戮師旅傷和氣致凶年覆亡之由發不旋踵朝廷豈不恤哉蓋邊臣幸功上聽致惑使祖宗之盟既阻君臣之分不交載省厥由悵然何己吉鼐遂探主意得移音翰伏惟經略以長才結上知以沉謀幹西事故生民之利病宗社之安危皆得别白而言之蓋魯國之憂不在顓臾而隋室之變生於元感此皆明智已得於胸中不待言而後諭也方今解天下之倒懸必假英才巨德經略何不進讜言排邪議使朝廷與夏國歡和如初生民重覩太平寧有意也倘如此則非惟敝國䝉幸實天下之大惠也十二月丁未朔遷蕃官西頭供奉官李中和為西京左藏庫副使內殿崇班蓋諤為供備庫副使以西討獲級應格也廣西轉運副使吳潛言近差溫杲知欽州竊聞交賊切齒欲食杲肉萬一因以致冦上批杲資性綿愞又與交人有隙實不宜在極邊要地可改差本路鈐轄劉熙兼知欽州戊申詔門下省凡中書省樞密院文字應覆駮者若干事體稍大入狀論列事小即於繳狀內改正行下若事不至大雖不足論列而其閒曲折難以繳狀內改正者即具進呈以應改正事送中書省樞密院取㫖舊紀書詔門下省覆駮事以狀論之非干大體者行訖以聞乃係之丁未日大理寺勘斷市長謝元卿等罪不直不盡詔御史臺劾罪以聞詔押賜董戩官誥使种誼减磨勘四年餘各减年賜錢帛有差監察御史王桓言大理寺被㫖根勘前羣牧使韓縝將本司公用物歸家連其子宗恕大理寺並不究其情輒以恩原不復結案乞再送别司根治詔開封府根勘以聞後宗恕差替縝釋之當并初勘時六月五日前察訪荆湖路常平等事司勾當公事段詢减磨勘三年賞根括水陸田四千一百餘頃也朝散郎發運司糶糴斛斗鄭佶减磨勘三年前西頭供奉官除名勒停黃州編管人張從惠减一赦敘並以嘗幹當汴口建議導洛入汴也辛亥分命輔臣祈雪壬子提舉修蓋景靈宫寄內藏庫使慶州團練使宋用臣遷寄皇城使登州防禦使癸丑樞密院承㫖司言開封府界諸縣及白馬胙城韋城弓手昨雖裁定縣以二十人為額其庸錢未經立法看詳縣尉既不管鄉村賊盜弓手頓减出入之勞所支庸錢當依諸路弓手定為一等一年正支錢三十千共减錢三千六百二十緡乞預先㑹校錢糧一處封樁從之都大經制熙河蘭㑹路邊防財用李憲言以本路逐將據見管正兵漢蕃弓箭手盡數於所駐州軍團結為五軍仍自熙河蘭㑹一路先推行五軍各差都同總領蕃兵將二員如一州蕃兵及千人給公使錢千緡至三千緡止許將官從宜支使從之朱本移入明年七月壬戌今從新本又言乘來春賊衆未聚先築努扎堡最為賊衝城圍須及千步并接勝如堡中閒築一通過小堡次展定西城蘭州故址然後築鞏心諸堡竊見通逺軍當熙河秦鳯四達之衝人物稠穰即古渭州舊𨽻平凉縣乞改賜州名以定西城為通逺軍以努扎為定西城如此則折衝制勝之形成矣又言臣昨上復古渭州及易置通逺軍定西城列置蘭州堡障事蓋緣熙河一路形勢全藉新復州城以為屏蔽况所得之地川原寬平土性甚美屬羌數萬己就耕鋤新招弓箭手五千膏腴土田占籍未遍須增修城壘使有土著之心不惟地利可助邊儲亦絶犬羊規取舊物之計臣至熙州錢糧殊未有備今且興功於努扎羅日伽羅總三處努扎川西接定西城北通勝如堡東北扼石硤賊馬來路其羅日伽羅總兩堡東接蘭州北臨黃河每嵗河凍須藉羅日等處控遏賊衝來嵗乘春若不先築努扎一帶次完蘭州管下必恐夏秋復冦定西日者本路經略司奏乞遷三岔堡增展定西城臣以謂三岔地在掌握雖費財力而不為用其定西亦須俟努扎亭障既立乃可乘勢增展望特降指揮更賜錢帛一二百萬緡及廂軍萬人速至本路詔遣內侍大使臣各二員就陜西河東團結廂軍萬人於二月內至熙河蘭㑹路錢帛於秦鳯路樁留錢及李元輔變轉四川錢各支五十萬緡丁巳賢妃周氏進位德妃冀國大長公主進封魏國大長公主新紀書以賢妃周氏為德妃舊紀不書上批起居舍人王震諳曉吏文即今全無職事官制所擬修六曹敕令文字浩繁詳定官安燾崔台符各有尚書省職務不能專力可差震同詳定詔御史臺秋冬季差御史一員赴三省㸃檢諸房文字稽滯毋得干預省事及見執政舊紀書詔監察御史嵗以秋冬察三省稽違新紀不書詔六年正旦御殿用新樂舊紀書丁巳新作大樂成新紀書丁巳新樂成右騏驥副使知瀘州張克明言瀘州地方千里夷夏雜居近者白崖囤落婆逺等生夷並為王民既供租賦或相侵犯未有條約一以敕律繩之或恐生事臣欲乞應瀘州生夷如與華人相犯並用敕律同類相犯即比附黔州蠻五等罰法從之四月二十七日庚午已除王光祖知瀘州今十二月十一日丁巳克明以知瀘州論事其月十九日庚申又書光祖知瀘州不知何故今削去庚申所書詔景靈宫繪像臣僚本支下兩房以上取無人食祿者如俱無人食祿或俱有人食祿均者取最長未均即食祿人少者取最長仍以子孫為次敘若子孫亦係繪像本房見無人食祿即便不問别房應推恩人願與以次及别房者聽詔龍猛都指揮使謝有換文思使先是殿前司體量有武藝不堪換授上曰朕記邊臣有言其材勇者可體究又詔樞密覆視皆言年雖五十餘委有心力故有是命戊午引試教閲馬軍所解發習武藝人李振等二人中格並補三班差使詔按閲河北團教保甲所應有出等武藝人雖未團教聽先次解發赴闕按試已未詔朝散大夫試吏部尚書李清臣通議大夫守侍郎蘇頌奉議郎試中書舍人蔡卞通直郎試起居郎蔡京各遷一官樞密都承㫖客省使舒州團練使張誠一領秀州防禦使故起居郎畢仲衍賜絹百匹檢討詳定官一年以上減磨勘三年以下減二年離局第減一等並以官制成推恩也詔冬正朝㑹諸軍所服衣冠廂都軍都指揮使都虞候領團練使刺史服第五等軍都指揮使都虞候服第六等指揮使副指揮使服第七等並班於庭副都頭以上常服班殿門外內園使郭忠紹言堡寨使臣應係兩員以上並係土人處乞以軍班或資廕人一員對換與土人參用從之种諤言宣德郎徐勳閣門祗候种朴望特奬擢詔進城山界諤則預議永樂失守又領一路經略安撫副使自當有罪朝廷寬恩責後效乃敢妄為子弟乞恩初無忌憚特罰銅三十斤梓州奏奉詔收買青緑彩色凡二千斤已計綱起發餘數見計置收買上批速降指揮罷買恐勞民故也庚申詔川峽四路不得將家屬赴任法其除之舊紀於戊午日書詔官川峽不許家行今逺邇如一其除之新紀不書今依實録附庚申日張方平不敢携父之任范鎮東齊記事可增入上批河北緣邊安撫司諜知遼人令賀正旦副使趙庭睦覘朝廷西事慮敵人因語言探測虛實其當酬應之辭三省樞密院同議定劄與館伴先是劉摯等使敵陛辭日永樂城已陷上數言西事面授畫一十餘條預為問對之語曰此禁中自草又歷議所以然且曰敵多辨詐毋為所勝摯對曰臣以誠信自將上憑威靈敵雖多詐安能勝臣聞言忠信蠻貊之邦行矣臣謂問對之際不必過為遷就上喜曰誠是明日遣中使就郊賜茶六十斤諭曰非常例也摯事據摯行實或附八月辛未初使時然附此為允提舉汴河隄岸司言汴河隄岸起三年四月修築至今年十月八日畢工詔都水監官覆視保明以聞原武掃塞特賜役兵錢有差新舊紀並書辛酉塞原武决河與實録差一日又十一月己卯實録已書河塞遣官致祭矣當考辛酉上復御延和殿宣三省樞密院輔臣赴景福殿觀魏國大長公主出降粧奩尚書省上元豐五年下半年條貫詔依簽改行下上每於進擬敕令必簽貼改定然後降出其所指擲事理皆有司抵牾也九月十四日十月十二日詔嵐石隰州都巡檢司舊賜公使錢百五千移賜葭蘆吳堡寨緣邊都巡檢使其石州舊帶三州都巡檢止令嵐石州各帶本州沿邊都巡檢使遇緩急應援各别給公使錢百千壬戍詔諸路監司兼提舉都作院河東以提舉常平等事趙咸梓州路以轉運判官許彥先秦鳯等路以提㸃刑獄吕溫卿京東西路以轉運判官吕孝亷淮南西路以提㸃刑獄王瑜江南東路以提㸃刑獄高復江南西路以提㸃常平等事蹇序辰十一月二十二日李察云云御史臺閣門言開封府諸曹官左右軍巡兩廂官赤縣丞係比類附班得預朝參其祕書省校書郎正字太常寺協律奉禮郎太祝郊社令三學博士五監主簿皆職事官雜壓亦在赤縣丞之上而獨不預欲自今並令朝參從之癸亥上批壬申日遼使見以在臘享致齊不用樂雖有舊例然北使素以用樂燕犒為恩禮之重三省樞密院且更詳度取㫖初閣門言甲戌臘享前三日皇帝不游幸不作樂賀正旦使賜御筵撤樂如至和二年元豐元年故事已從之而復有是詔然卒用例奉議郎王欽臣言諸路監司被制書鞫事所降指揮有差官取勘者有取勘聞奏者一例差官伏緣詔㫖自有區别伏望申明自今朝㫖稱取勘者監司自勘委勘處或鄰近通判録問檢斷如干繫者衆須當置司乃得差官從之陜西轉運判官范純粹言昨遣本司勾當官吕宗嶽管認計備延州懷寧浮圖寨守禦已被受託故不肯就事乞先衝替上批可依奏速處分聊警慢官小吏用心趣事不敢玩法接伴使吳安持言遼使緣路事節並如舊惟例送樂人馬一匹不至臣等俟前路言及詔安持等勿問甲子詔在京新城外四壁城壕開闊五十步下收四十步深一丈五尺地脉不及者至泉止本志又增入自是水有所歸而京城固矣今不取河北都轉運司朝奉大夫集賢殿修撰蹇周輔為寶文閣待制比部員外郎宇文昌齡自鄜州制勘回進對賜緋章服昌齡言陜西逃軍乞增賞告捕詔每捕獲禁軍一人賞錢五千四月三日甲寅昌齡以御史受命往鄜州二十五日改比部員外郎十二月甲子回明年正月己丑獄治斷丙寅上特御延和殿引奉議郎權發遣府界常平等事張詢以下十人進對是日旬休百司不治事上特御便殿延見羣臣踰午始罷於是編類國信文字承議郎王汝翼前權發遣提舉梓州路常平等事江衍各面賜緋章服兩紀並書旬休御延和殿引進對官十人都大提舉汴河隄岸司言凖朝㫖為原武掃閉合水口見增防堰令本司權閉斷魏樓孔固滎澤㪷門五七日自閉合三㪷門汴水增漲今自開逺門浮橋以上凌排查塞水欲抹岸望速降指揮開撥沿汴㪷門及乞於京西向上汴河兩岸相度可潰水處即決隄分減水勢詔如實危急即依奏丁卯廣西轉運副使吳潛言雷化發船之地與瓊島相對今令倒下廣州約五千里請引不便欲乞廣西沿海一帶州縣如土人客人以船載米榖牛酒黃魚及非市舶司抽解之物並依舊更不下廣州諸引詔孫迥相度於市舶法有無妨礙既而不行朱本簽貼云後來進呈訖無施行删去今并存之戊辰詔陜西封樁錢內支三百萬貫分環慶涇原秦鳯路乘時市糧草户部言昨遣李元輔經制變運西川錢物赴陜西路今具已到之數金銀物帛八百十六萬一千七百八十匹兩錢三百四十六萬二千餘貫詔門下省凡本省事從本司取㫖又詔大理寺劾祠部郎中趙令鑠以令鑠道遇叔祖宗晟不致敬故也後令鑠罰銅四斤都水使者范子淵言案視衛州王供掃引道大河可否利害更乞增差春夫萬人於所決巧婦渦下預開一河及其開修王供掃等處畫一事詔遣吏部侍郎李承之入內供奉官馮宗道覆案御史王桓言啓聖院相國寺忌辰行香儀左右巡使兩赤縣令於中門相向分立俟宰臣至立位前直省官通攝案此儀推行雖久無所據依大意推崇宰司故令立班迎候日者極追逺之奉於景靈宫禮文咸秩前事之失義當是正方百官就列祗見祖宗恐非大小之臣交相致恭之時望寢罷從之己巳詔正旦朝㑹日引駕殿前左右班及人員俟至殿閣即分立於殿東西挾行門立於龍墀東西勾欄內起居郎舍人左右巡使並就本位拜其起居郎舍人朔日視朝拜亦凖此比部員外郎王子韶乘驛原武掃致祭以決口塞也吏部尚書李清臣言奉詔㸃閲朝㑹應奉事欲令執事高品以下並服介幘絳服大帶革帶襪履方心曲領從之庚午上批朝廷哀矜庶獄無有逺邇之别茍或淹留宜一體督治成州奏造妖人趙福繫八十餘人案上嵗餘纍經巡白並不與奪及㸃檢催促行下於是判刑部大理卿以下二十人御史中丞以下十人罰金展磨勘年有差詔應封贈文臣自大中大夫武臣觀察使以上吏部議奏降付中書省取㫖餘官奏鈔上門下省不用詞仍許以三公三師及東宫三師三少封贈御史臺言凖詔遼使見辭日並特起居其前後三日內當起居權罷今月壬申紫宸殿遼使見來年正月六日垂拱殿朝辭若各用本殿班即見日望參班赴辭日六參班赴詔並用望參班辛未西南龍蕃首領遏轄使龍已達并部落廖各等凡三百七十六人入貢賜原武掃役兵錢有差壬申遼主遣長寧軍節度使耶律儀太常少卿乾文閣待制趙庭睦來賀正旦詔自今入遼使副如受禮處赴燕遇勸酒須飲盡詔河北立額步軍各於逐指揮額外招百人乙亥以左領軍衛大將軍駙馬都尉郭獻卿為開州團練使贈皇城使嘉州團練使冦偉引進使均州防禦使供備庫使溫普皇城使嘉州刺史左藏庫副使李仕言文思使西京左藏庫副使周輔良們都並供備庫副使孫慶李世忠並左藏庫副使內殿承制李信羅渠甘師道並文思副使瑪克密鄂特桑李仕安張仲謨並西京左藏庫使皆以隨軍沒於永樂城也又録死事者東上閣門副使景思誼等九十人父子弟姪孫及壻妻兄遷官者十四人授東頭供奉官一人左右侍禁各一人左右班殿直二十四人奉職借職百五十六人差使二人有餘資及無子孫賜其家錢各有差丙子詔諸承議郎以上及幕職州縣官并未入官人歷任無私罪徒及入官贓失入死罪并勒停衝替後已經一任者許試刑法無人奏舉聽於吏部及所在官司投狀乞試見在外任官及授黃河地分見闕者不許就試諸舉官試刑法者尚書刑部官大理長二嵗各十人侍從三省六曹御史開封府推判官及監司各七人是冬絳州羣盜王達等阻山橫行劫略達張紅繖以入縣鎮詔提㸃刑獄黃亷督捕盡十二月悉捕斬之亷行狀有此要考王達事因掇取附見是嵗復程鄉縣為梅州新紀書後置梅州舊紀乃不書置瀘州樂共城廢蘭州勝如智固二堡宗室子賜名授官者三十五人斷大辟二千八十五人
