body:
  text: 續資治通鑑長編卷四百六十九宋李燾撰哲宗元祐七年春正月甲申朔樞密院言永州蠻猺因乏食出沒剽劫除已賑濟外欲詔安撫鈐轄司募勇敢效用人乃曉諭猺衆能自相捕依格給賞應合添使臣處選有才略三兩員量帶兵甲於要害處掩殺毋得妄誅從之乙酉樞密院言遼使耶律迪病且殆緣通好已來未有故事今用章頻王咸宜奉使卒於契丹北人津送體例比類預立畫一送館伴所密掌之如迪死即施行從之迪尋死於滑州送伴使校書郎吕希績等以聞詔賜下饗器幣賻贈等就差知通利軍趙齊賢假中大夫充監護使詔遣內供奉官王遘馳驛治喪事特賜迪黃金百兩水銀龍腦以殮正月八日范祖禹乞不遷開封府奏議可增入仍考從違辛卯禮部侍郎范祖禹言凖尚書省批送工部狀乞遷開封府於舊南省令禮工部與將作監同勘當者臣竊以開封府自太祖皇帝開國建置於此太宗真宗皆嘗尹京潛龍故迹至今存焉昨因廨舍遺火逼近原廟遂有遷改之議若以火而遷則廟之東北皆有民居比之開封尤更不逺火何可防又舊南省已為試院今欲以開封府為試院豈可不嚴火禁乎若以開封敲朴之地不可近原廟則景靈官在祖宗時已有列聖神御比之今日輕重亦均若以狹隘而遷則祖宗以來官吏所容亦足以治事且開封非貯火之所但長吏與僚屬住家於其中爾比之民居孰為難防當申嚴火禁或築墻以為隔限亦可以備患矣今乃欲改已成之試院為府廢百三十餘年之府為試院此兩大役營造不小夫土木之功使匠人度之無不言費省而易了及其作之便見費大臣恐勞苦人力虛費國用無大利害不必遷也今若因舊興葺稍徙近南比之兩處營造功賞猶小凡官舍數遷改則民心亦不定不若因其故便昔魯人為長府閔子騫曰仍舊貫如之何何必改作孔子稱之蓋為國者姑務省事不欲多變革也伏望聖慈更賜詳擇其從違當考甲午朝獻景靈宫正字宋匪躬為祕閣校理乙未詔尚書左丞蘇頌撰皇后册文并書丙申詔宗室祖免親參選常許不拘名次路分陳乞指占差遣一次並替任滿闕初任並與監當須職事幹集操守修飭有監司或長官同保明與親民內選人與録事參軍即别有縣令舉主二員內一員職司仍通注縣令其無保明者並依外官條例從尚書省所請也丁酉幸凝祥池中太一宫上清儲祥宫大相國寺還御宣德門召從臣觀燈他日三省樞密院奏事邇英吕大防言元夕晴霽逰人甚樂上亦曰且得晴霽大防曰雖人主逰幸本是為民韓忠彥曰為民祈福爾蘇轍曰為細民經紀大防曰如唐時供帳排辦皆出於京兆京兆皆取於民自祖宗以來並令官中應辦以此見祖宗愛民之意王巖叟曰纍次進讀祖宗愛民之事陛下必一一在聖意所謂非茍知之亦允蹈之今陛下既已知之願陛下常存之於心思所以力行之則祖宗之美復在陛下上嘉納之庚子龍蕃進奉人安化將軍龍以􅀈等並為奉華將軍奉華將軍龍以報等並為武寧將軍安逺將軍龍以萬等並為寧逺將軍龍以庭龍延等並為保順郎將辛丑左朝請大夫寶文閣待制提舉洞霄宫鄭穆卒甲辰以遼寧昌軍節度使耶律迪卒輟視朝一日先是太常寺言典故無例輟朝用節度使葬格特輟一日迪喪所過州致祭守倅皆再拜知瀛州蔣之竒以為生覿且長揖奈何屈膝向死者乃奠而不拜識者韙之政目十四日北使死依節度使輟朝户部言廣南西路轉運司奏本路融桞鬱林廉雍等州及鄰近全州灌陽縣各産鐵甚多已依陜西等路條例鼓鑄鐵折二錢與本路銅錢兼行看詳湖廣江浙銅坑近年所收僅足上供而廣西銅錢稍稍流出徼外嵗仰東路銅貨亦無由永逺應副若比類陜西兼行恐通行日久私下復有陜西輕重之弊欲令廣西轉運司先且踏逐拘收本路出鐵坑冶召人採納如可鼓鑄選官併工鑄大錢及一十萬貫令與銅錢兼行唯得於本路行使向去民間鐵錢漸廣即具實聞奏立定銅錢鐵錢並行分數法從之乙已環慶路第七將內園使張誠特遷兩官權發遣本路都監皇城使本路都監張存為遙郡刺史賞淺功之勞也去年十一月二十五日誠存出兵詔陜西河東保甲兩丁之家與免上畨差使遇軍馬戍邉本州縣闕人巡防聼勾抽於本州界上畨責授左武衛將軍張誠一為右武衛將軍提舉明道宫朝散郎范峋不復職特遷一官誠一元任相州觀察使以穿父墓取犀帶得罪峋元任直龍圖閣權府界提點以應副山陵奏事理曲落職知臨江軍至是從刑部檢舉也太常寺言本朝因唐之舊以御史為監祭使輪知太常寺禮院官監禮近年以博士為獻官遂罷監禮惟御史専視祀事然御史多闕員博士雖可權攝監祭又或不赴遂以他官攝事無所督察乞每祠以博士監如故從之丙午詔勿受尚書右丞蘇頌乞致仕章奏此據御集丁未知鄆州觀文殿學士劉摯知大名府知大名府資政殿學士張璪知揚州知潁州龍圖閣學士蘇軾知鄆州御史中丞鄭雍言北京重地劉摯前宰相以前宰相守重地未為過然而摯兩月前方以罪去陛下之威令方行於天下摯之罷相省咎未數十日而遽遷重鎮天下之人得無疑前日之罷摯為非而又疑今日之遷摯為速也伏望斷自宸𠂻追還劉摯新命以協公論雍又言竊謂摯以不公擅權公議不與陛下聖明照見迹狀罷其相位雖不明言其罪而天下共知才經兩月遽遷重鎮使中外聞之何以示信伏望斷自宸衷早賜追還新命殿中侍御史楊畏言臣竊思摯昨備位宰執不能盡節一心以圖報效背公死黨敢擅威福反覆懷邪罪狀非一陛下照知姦回俾以善去德音睿意照於日星自摯去位薦紳大夫莫不相慶以謂陛下大公無私如此誠廟社天下之幸而朋邪罔上之風庶幾不威而自化矣按摯具位宰相一朝罷去天下知其不職有罪曽未三月遽移大郡使朝廷勸沮豫奪之權有所不明而凡與摯朋比受其私恩之人必皆鼓舞以謂摯已遷重鎮行且復用姦言眩衆不為無害而流俗觀望亦必有妄意朝廷之心恐非所以示天下伏望睿慈特賜寢罷以厭公議畏又言摯近移知大名府命下之日公論沸騰臣不敢泯默已具論奏乞朝廷追寢敕命未聞指揮臣愚昧竊惟朝廷大政莫重於勸沮豫奪之權今以罪去之人到任不及兩月遽有遷動不惟使衆人觀望疑惑誠亦未諭大臣所以進擬之意伏望陛下睿明深加照察使去位之姦不能寖長以明朝廷威令殿中侍御史吳立禮言竊以朝廷罷免大臣謫命固有輕重恩禮固有厚薄蓋因其輕重厚薄之際所以明賞罰而示勸戒也比觀近嵗宰臣出守外鎮若無故而罷則必優進美官加大學士以寵之茍緣罪去則止以學士補外未嘗進秩緣摯近自右僕射出知鄆州既不轉官止兼學士及其行也仍放謝辭方是時臣雖在外不知所以罷免之因然觀朝廷退之之禮固已甚薄則以罪而去從可知矣今到任曽未兩月而遽易重鎮不惟留守陪京復兼一路綏撫之寄牽復太速物論未平伏乞聖慈斷自宸𠂻追寢新命庶幾賞罰昭明下厭公議從之璪與摯皆不遷蘇軾改揚州軾改揚州在二十八日今并書先是開封諸縣多水患吏不究本末決其陂澤注之惠民河河不能勝則陳亦多水至是又將鑿鄧艾溝與潁河並且鑿黃堆注之於淮議者多欲從之軾至潁遣吏以水平凖之漲水髙於新溝幾一丈若鑿黃堆水反流浸州境決不可為朝廷從之潁有宿賊尹遇等數人羣黨驚劫殺被主及捕盜吏兵者非一朝廷以名捕不獲被殺者噤不敢言軾召汝隂尉李直方謂之曰君能擒此當力言於朝乞行賞不獲亦以不職奏免君矣直方退緝知羣盜所在命弓手往捕其黨而躬往捕遇獲之然小不應格推賞不及軾為言於朝請以年勞改朝散郎階為直方賞朝廷不從其後吏部以軾當遷以符會軾考軾謂已許直方卒不報詔通泰州捍海兵士諸處不得勾抽雖有朝旨差出亦令本州執奏特許存留違者並科違制之罪不以遇赦去官原減發運使范純禮請也工部侍郎錢協為户部侍郎戊申荆湖南路鈐轄謝麟言乞依舊制邵州邵陽武岡新化等縣中等以下户選差充土丁弩手與免科役七年一替排補將級不拘替放年分作兩畨邉寨防托不得雇人每遇上畨依禁軍例教閲武藝及専習木弩如妄有役使並依私役禁軍敕從之己酉羅蕃遣使貢方物詔沿邉城鎮堡寨委本將選差醫工一人月給藥錢八貫遇隨軍出入給馬一匹二年一替願再留者聼時慮諸將在外雖有軍醫不能診治故有是詔詔岷州并通逺軍威逺鎮鑄錢監官任內鑄到錢除支費外每淨利錢三萬貫減一年磨勘幕職州官占射差遣六萬貫循一資二員者分受步軍副都指揮使徐州觀察使涇原路經略安撫使知渭州劉舜卿召還宿衛卒於道贈奉國軍節度使諡毅敏左朝請郎集賢校理知潤州崔公度為起居郎公度辭之復知潤州公度知潤州在六年閏八月六日政目於七年六月二日又書公度知潤州實録無之今并此八年六月八日除祕少右朝請郎祕閣校理徐王府翊善喬執中為起居舍人右朝請郎歐陽棐為禮部員外郎工部郎中蘇澥為徐王府翊善左朝請大夫魏廣為徐王府侍講二月四日楊畏姚勔論廣辛亥詔逐路帥臣檢會元祐二年所上捍禦邀截策畫參議豫為計慮毋令緩急誤事仍密具利害以聞此當考詳壬子詔以靈壁鎮為縣從轉運提刑司請也尚書省勘會諸路近參行差役雇募之法其間未便事件隨宜增損務寬民力前後詔旨非不丁寧訪聞州縣不切奉行以致差徭輕重失當或令役人陪備或占役錢不盡雇募假如一州年收役錢一萬貫纍留不得過五分即是合留五千貫止更不樁留如有見在及三萬貫只合存留五千貫外其餘二萬五千貫并年內所收錢數并合依條支充雇錢若見在未及五千貫據所少數貼留但及五千貫即止按察官司亦無紏劾竊慮浸壞大法正月二十九日奉聖旨詔令諸路運使提刑司遍行指揮諸州縣當職官悉心依法推行務在詳究法意均當無擾候施行訖具次第申尚書省仍仰監司官常切檢察如有違慢並具因依奏劾如州縣奉行均當無擾即嵗具保明申尚書省其諸縣亦仰本州依此檢察仍先次施行編録册七年正月二十九日聖旨六年十月二十二日二十五日可考環慶路經略使章楶奏夏賊狂悖不知天地亭育之德還其土地而冦掠愈甚給以嵗賜而侮慢益深然則豺狼之性貪婪之心恩果不足以撫其衆信果不足以使之孚天威赫怒遂下攻討之詔朝廷本無負於小羌而蠢爾蟻聚蓋自取滅亡之道也臣叨護諸將嘗陳淺攻牽制之策朝廷兼採羣議略施行之矣臣再惟夏國之地廣袤僅四五千里其民散居於沙漠山野之間無城郭之固無營衛守戍之兵嘯之則能聚既散則難復然所以能長為邉患者舉國併力専寇一路爾夫以數十萬之衆操戈被甲而來一路之兵固不足以枝梧也宜其鼓行深入抄掠俘虜無所忌憚未嘗不得志而還前日涇原河外是也伏覩詔令纍下授以淺攻擾耕之策賊衆大入則使堅壁清野謹防深入冦攘之事臣竊謂淺攻擾耕止可為西賊皮膚之患不能病其心腹又堅壁清野足以備寇爾未足以制冦也夫制冦之術不伐姦謀而専待其來以自全之計則賊之氣何從而沮賊之力何從而屈哉彼氣不沮力不屈兩敵相持掩以嵗月宿兵於邉則憂其老不伐其謀則取其侮驅收居民保聚於城郭不可以常也夫兵固有先虛而後實者何以言之賊計狡獪每有嘯聚未嘗不屯於兩路之間聲言入寇某處或更在數百里之外知吾催收人口入城郭則偃然不至不收無備則倐然必來又蕃漢之民豈無牛羊犬彘之畜室廬門户之具捨之而去則有毁敗攘竊之慮遷之以行則勞於奔走挈負一嵗之間茍至於再三吾民亦將自困矣况於耕作刈穫之時妨害農業豈曰小哉然則堅壁清野果不足以制賊明矣不於此時圖惟策畫以制其命則恐興師勞衆未有休息之期也臣夙夜計慮思有以上報主恩敢陳破賊伐謀之策謹列於後一陜西河東六路帥臣之所治惟環慶切近賊之巢穴勒兵出塞掩襲不備可以戕其腹心最為順便臣故陳諸路更相助順之略以伐其謀仍以本路為先夫區區小羌自寶元慶歷以後未嘗不舉國併力攻吾一路使我師不敢為之敵可以謂全勝之策也堂堂中國奄有四海億萬之衆濟之以節度之師何所施而不可誠能取彼之策出其不意反加於賊則何賊之不滅何功之不成哉恭惟神宗皇帝挺英武之姿有混一寰宇之志不幸所委非人所建非策嘗興師深入矣乃無尺寸之功嘗拓地進壘矣或有覆軍亡將之辱民苦於轉餉而關陜虛竭兵疲於征討而亡逸自如傾天下之財委於一路如填溝壑而賊氣不少衰者何耶蓋先勞其衆不恤其本議論攻取未嘗揣度可否宜乎卒無成功也臣今日之所陳不敢乞廣益師屯當思橫費也遇出塞欲令鄰路更相資助還塞則復歸本道不敢乞差夫運糧當思先固其本也故欲雇蕃部富贍之人以驢畜般運伺賊衆嘯聚未集之時攻搗虛處或兵馬已散之後掩其不備討擊抄掠皆委主將隨宜措置旬日之間即令還塞一路之師既歸少使休養他路乘間伺隙更迭復出終嵗之間茍能且令三路出師諸路兼行淺攻擾耕之策則小國腹背受敵之不暇彼將有俘虜滅亡之憂豈復能大舉而入境哉不一二年間自當面縛欵塞制賊之命此為上策一賊人知我六路之兵各有分守以為未嘗敢越境以相資今出其不意且合三路之衆深入攻討必獲全勝勘會本路漢蕃之兵除州縣城寨防拓及留將官守禦外所合遣者不過二萬五千人馬六千匹兵勢甚輕不足以驅除豺狼覆蕩巢穴欲於鄰路不係邉面所駐之兵輟假五七日或十餘日併力攻討內鄜延第一將在延安府第八將在河中府第九將在鄜州三將騎兵約有馬二千匹其間亦有新馬未堪戰陳必須揀選下三二百匹欲乞令本路於諸將下更選募抽摘添差騎兵共及三千三將之步人共選募勇壯兵卒七千人成一萬之數又如涇原第一第二將在渭州第三將在原州第七將在德順軍第八將在治平寨第十一將在永興軍第十二將在隴山第四將在綏寧靖安寨此將兵馬若出寨之兵不由此路則更不差八將之騎兵盡乞差撥仍於步人內揀選二萬人合三路兵馬七萬餘衆矣可以號十萬而行馳逐賊境誰敢當我哉今所假鄰路兵馬非謂當賊衆嘯聚之處妄有舉動須探伺得人馬分散近邉人户悉已還家方為此舉只乞朝廷嚴立約束預降指揮候見本路關牒火急應副一二路之兵約七萬餘衆所資糧餽不為不少勘會環慶二州蕃部腳乘稍多自來行兵出塞皆以自隨今已根括所有駱駝驢騾之類可以資行軍之用假有十分內將三分令蕃部自用七分和雇齎糧専運漢兵口食駱駝每頭運糧三石支錢四貫文省驢騾每頭運糧一石支錢二貫文省今來擘畫大抵依放淺攻之計只是須合於蕃界劄寨少駐軍馬散遣騎兵討擊出寨之後只五七日逺不過十日而漢蕃軍衆亦人自賫五七日乾糧又每至其處發掘窖藏自可因糧而食所備腳乘般載須當預防闕乏以備緩急之用今興師旅不止討擊兼行招撫一夏國賊臣梁葉普挾恃其妹梁氏之勢輔立非威明氏之種以為國主誅逐威眀親族潛萌篡奪之計久矣虐用其衆冀幸成功妄肆殺戮庶幾人服而又嘯聚無時舉兵無節民疲於點集家困於資助內外之人無不咨怨憤怒欲食其肉而無由也本路不住有落蕃人投來及歸順蕃人皆能詳道其事若今下詔許其並邉之羌納欵歸命錫以爵賞金帛旌以服章銀器各許其耕墾故土自為籬落效順者必衆所有擬定招納爵賞錫賫則例已具狀奏聞一夏國之先本非強盛自靈武失守奄有橫山之地其俗獷悍其民勇鷙長於弓馬馳驟山嶺溪谷之間如踐平地此其能取勝於漢兵也自元昊舉兵逆命敢以猖狂妄行者橫山之衆良有助焉又其地巇險其土饒衍西賊所恃以為固所仰以為生者皆橫山也橫山之北沙漠限隔今若磨以嵗月乘其衆怨徐議進築堡柵據要害擅地利因其歸附之衆使之耕墾招置漢蕃弓箭手數千人以壯屏蔽然後戍兵可省糧饋之費可損橫山幅員千里彼見我盡得形勢皆不敢安居耕作非徒橫山不安也靈夏豈無憂懼哉進築之議臣今且開其端候出兵有效夏國力屈然後方敢圖上方略以聼朝廷采擇一合用鄰路將官欲乞於將副內指名抽差一員一合用大小使臣欲乞於本路他路得替待闕不拘有無過犯之人權差充陳敵使喚如尚闕少乞於吏部尚書侍郎右選擇少壯敢勇曽經戰陳立功該賞之人共二十人乘遞馬給驛劵前來一勘會本路總管李浩久經戰陳在熙河蘭岷屢嘗出塞動有成功其人果敢有謀不妄舉動漢蕃之人素所信服臣纍與李浩謀議皆與臣合亦嘗持此奏示浩以謂皆可施行今乞朝廷特降指揮如將來遣師出塞専委李浩統制二路兵衆攻討進止並聼李浩處分右謹件如前所有邉機奏狀共五道并對境地圖一面今遣臣男知河中府司録參軍管幹書寫環慶路經略都總管司機宜文字綜齎請闕庭伏望聖慈特賜詳覽或可施行伏乞早賜指揮黃貼子臣自到任經營謀慮收采衆人之議斷之於心非敢妄舉所計合用之兵須及七萬人乃可破賊茍裁損其數或雜用東兵萬一臨敵誤事臣實係首建此議之人雖被誅戮固無所恨誠恐上損國威枉傷人命敢乞聖慈照諒又鄰路更相資助不損兵勢不耗國財最是長策竊恐好事者欲沮此議以為逐路兵少或有他虞檢會神宗朝收復熙河開拓五溪征討交趾瀘南皆於陜西沿邉抽那兵馬或經嵗月尚未還營是時沿邉不聞有闕况今只於鄰路假輟使喚不過旬日兼是非邉靣之兵欲乞朝廷深賜鑒照主張施行又諸路資助兵馬共圖破賊此更互之事也若不合心并力以早破賊為意亦恐論議不一奏請紛紛至期誤事為害不小臣欲乞嚴立約束或乞檢會律令行下又勘會遣兵出塞事體非輕全藉得力大小使臣驅使如將來出塞乞許本司關牒鄰路指名抽差凖備將領或凖備差使大小使臣三兩員應副陳敵使喚本處不得占留回日立便發遣歸本任又將來發兵內本路兵馬欲取環慶州界擇利塞鄜延涇原兵馬令勾抽於近裏前來環慶州會合或只於沿邉出界欲並令李浩臨時相度處置所貴不失機會楶以七年正月二十日奏此附見月末徐考之十月十二日楶本傳云云當考核
