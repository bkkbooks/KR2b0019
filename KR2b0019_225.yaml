body:
  text: 續資治通鑑長編卷二百二十一宋李燾撰神宗熙寧四年三月丙戌朔上批聞太原府有鄉村婦人數千叫號入府門納農器未知虛實其調發荒堆夫速放散令河東緣邊安撫司體問其事安撫司言無之又詔陜西轉運使修婁城等堡寨其見科買物並權罷丁亥判大名府韓琦言懷州災傷最甚自春下戶闕食近申轉運司貸以米粟已下諸縣支給而提舉常平倉司指揮罷給止令轉運司以省倉米賑貸上批方今河北有災傷甚處省倉嵗計有限必不能多賑給常平廣惠倉斛斗須相兼支借令河北轉運提㸃刑獄提舉司覺察州縣無得阻抑人户不盡支散致逃移失所䕫州路轉運司孫桷張詵言杜安行等奏討平夷賊拓地七百里獲鎧甲器仗三百糧六百餘石見安集夷户佃蒔起輸租賦詔遣著作佐郎章惇乘驛同轉運司制置以聞又詔夷賊梁承秀李光吉雖已授首尚有王衮未獲可令轉運司速選人擒捕及諭使歸首六年二月末御批可考中書欲支惇見任料錢添支并給驛劵上批惇已請添支又請驛劵恐礙條貫檢嘉祐以來至近嵗例呈馮京言近方有此例王安石曰嘉祐治平已有例且陛下患人材難得今無能之人享祿賜而安逸有能者乃見選用奔走勞費而與無能者所享同則人孰肯勸而為能如惇以才選令逺使極邊豈可惜一驛券縱有條貫中書如臣者亦當以道揆事佐陛下以豫奪馭羣臣不當守法況有近例上曰有例須支與兼其所得不過數百錢不為多也四月二日丁亥罷惇行先是李承之薦惇於安石安石曰聞惇極無行承之曰某所薦者才也顧惇才可用耳素行何纍焉公試與語自當愛之安石見惇惇素辨又善迎合安石大喜恨得之晚此據邵伯溫見聞録或移入四月丁亥免河東運糧草入西界義勇強壯捉生户今年兩稅支移折變仍免一料和糴支移義勇凡一萬五千人其逃亡者五千餘人並放罪令復業及權倚閣隨軍係役人未納殘稅從轉運使韓鐸奏也權發遣延州趙卨言西賊犯撫寧新築堡不守將士千餘人皆陷沒上閲奏閔然曰近遣人至婁城探視來見所築堡殊不堅完但一土墻圍爾固已憂之今果亡千人邊城舉動後宜深戒也先是卨奏二月甲戌賊圍撫寧折繼世髙永能等重兵駐細浮圗去撫寧咫尺婁城兵勢尚完种諤在綏德城節制諸軍若令永能等㑹婁城兵與撫寧相應賊必奔潰聞諤茫然失措欲作書召燕達戰悸不能下筆顧轉運判官李南公等涕泗不已乃追折繼世兵回方議戰守賊已得志而歸前此臣數與韓絳言諤繼世皆不可用恐貽朝廷憂而絳不聽也達時為鄜延路都監永能文岯從孫始諤以兵六千屬永能先驅入銀川婁城五戰皆克新舊紀於丙戌日並書夏人陷撫寧堡戊子上已假上召二府對資政殿出陜西轉運使奏慶州軍亂示之上深以用兵為憂文彥博曰朝廷施為務合人心以靜重為先凡事當兼采衆論不宜有所偏聽陛下即位以來勵精求治而人情未安蓋更張之過也祖宗以來法制未必皆不可行但有廢墜不舉之處耳上曰三代聖王之法固亦有弊國家承平百年安得不小有更張王安石曰朝廷但求民害者去之有何不可萬事頺墮如西晉之風兹益亂也吳充曰朝廷舉事每欲便民而州縣奉行之吏多不能體陛下意或成勞擾至於救敝亦宜以漸上頷之彥博又言行交子不便上曰行交子誠非得已若素有法制財用既足則自不須此今未能然是以急難不能無有不得已之事馮京曰府界既淤田又修差役作保甲人極勞敝上曰淤田於百姓有何患苦比令內臣拔麥苗觀其如何乃取得淤田土視之如細麵然見一寺僧言舊有田不可種去嵗以淤田故遂得麥兼詢訪鄰近百姓亦皆以免役為喜蓋雖令出錢而復其身役無追呼刑責之虞人自情願故也彥博曰保甲用五家為保猶之可也今乃五百家為一大保則其勞擾可知上曰百姓豈能知事之曲折知計身事而已但有實害及之則怨有實利及之則喜雖五百人為大保於百姓有何實害而以為勞擾乎安石曰交子事誠如陛下言行之非得已然陛下宜深思財用不足人材未有足賴者於邊事姑務靜重而已若能靜重以待邊事則外國未能為患於是可以修內政內政已成人材足用財力富強則為之無不可者彥博又言祖宗法制具在不須更張以失人心上曰更張法制於士大夫誠多不恱然於百姓何所不便彥博曰為與士大夫治天下非與百姓治天下也上曰士大夫豈盡以更張為非亦自有以為當更張者安石曰法制具在則財用宜足中國宜彊今皆不然未可謂之法制具在也彥博曰務要人推行爾安石曰若務要人推行則須搜舉材者而糾罷軟偷惰不奉法令之人除去之如此則人心豈能無不悅如趙子幾在府界案一王愷有濫有贓而近臣乃或以子幾案愷為刻薄小人不當奬用上下相扇為茍且不欲奉法類多如此則誰肯推行法制者陳留一縣因趙子幾往彼修保甲發舉強劫不申官者十二次以數十里之地而強劫不申官者如此其多則人之被擾可知矣條保甲乃所以除此等事而議者乃更以為擾臣所未喻也然更張事誠非得已但更張而去害則為之更張而更害人則不可為又有事誠可為而時勢之宜未可以為者如討外國拓邊境於今時事之宜是未可為者也且禮記以為事前定則不跲今天下事要須前定不可臨時為人論議所移也舊紀書戊子慶州廣鋭軍叛己丑詔叛兵歸首免罪惟首惡不赦辛丑詔得叛兵降者賞如斬級新紀但書慶州廣鋭卒叛乙未平之是日安石又為上論吕大防不能了延州上曰大防不如趙卨又曰郭逵可用但韓琦惡逵耳又論种諤曰是所謂事成而卿不成而烹者也陛下計利害與諤異彥博因毁諤安石曰諤若委以兵三二千令出入境上擾擊蕃部即似可用顧不可純倚仗也上曰用諤如馬隆即無傷己丑遣內侍李舜舉往環慶路詔經略司曰兩營軍士必非盡同謀父兄子弟雖盡監守宜止推究首謀者家屬處置其餘父子兄弟毋得監守其務安存慰諭之應被脅從如能歸首皆免其罪如能執殺元結連之人當議厚賞其已擒獲即具得賊之人馳驛以聞當於例外行賞庚寅詔諸路置學官州給田十頃為學糧元有學田不及者益之多者聽如故仍置小學教授凡在學有職事以學糧優定請給又詔中書五路舉人最多處惟河南府青州已舉學官餘州皆選置教授以蔡州觀察推官陸佃等為之選陸佃等在辛卯今并書條例司言欲令諸路轉運司具屬州繁劇縣分主戶二萬以上增置丞一員以幕職縣令人充從之麟府路承受蕭汝賢等言宣撫判官吕大防相度存新修堡寨留三千人防托有軍士數百人喧訴於大防帳前不能禁斬一人而後定今所修寨實無益望早處分詔河東經略司并王慶民依所受宣撫司指揮運第一寨糧草樓櫓等於神堂寨移兵馬近裏駐劄先是韓絳奏河外所修荒堆寨久逺不可守己令廢拆且抽兵回而大防獨不肯絳因使大防以便宜往相視大防又遷延麟州不即往大風雨役人暴露終夜叫號河外官皆以為言王安石白上曰朝廷便宜只付韓絳豈可轉付大防欲戒大防凡事當申宣撫司毋得徑行荒堆寨乞令毁拆如宣撫使指揮上疑大防方往相視安石曰若不決然可棄絳豈肯如此不須俟大防報也上既手札諭大防乃降是詔此據吕大防家所藏三月四日御札並王安石日録刪修上謂安石曰綏麟通路在理可為但种諤倉猝故不能終其事爾安石曰邊陲未寧不害聖政民力困敝實可憂今陛下即位數年閲天下義理日多求治之心日篤邪說蔽欺日益照察如此何憂不治朝廷既治逺人自賔如尚倔彊沙漠但當蓄財養力考擇人材一舉破之豈但綏麟通路而已通綏麟路云云並據舊録朱本削去并載棄婁城後今仍存此詔樞密院鄜延种諤燕達涇原周永清王寧劉慶种詁環慶种診任懷政秦鳯向寶劉舜卿麟府王文郁許咸吉曹偃張居等十四頭項兵馬各曽出界遇賊並有斬獲其得功將校契勘速與行賞此據御集乃三月五日考詳十四人官職及功勞略附見辛卯上批已降指揮依韓絳所奏罷河外所修荒堆三泉寨并追回吳堡屯兵仍令河東轉運司速指揮諸處見役強壯義勇人夫悉令放散自今合用人夫須奏聽朝㫖方得差發遂詔陜西河東經略司轉運司若軍期急速須調夫役奏禀不及方得據實數差訖以聞遣屯田員外郎周之純相度廣南東路均納丁米所過州縣有奉行新法不職者體量以聞馮京曰數遣使不便不如即與一監司名目王安石曰數遣使極無害可以試人材今未試而與監司則可惜上以為然既三月乃命之純權發遣本路提㸃刑獄周之純未詳邑里均納丁米用孫邈奏日録有其事當考詳周之純相度後如何施行除提刑在六月十四日彭汝礪志金君卿墓云丁米不均積為廣民患使者議論反復更六七人未定及君卿為轉運使搜括隱丁人始無幸免分上中下三等富者多取之而不為虐貧者寡取之而易給人乃以為平按此則周之純初未曽了得此事也壬辰宣徽南院使雄武軍留後郭逵判永興軍初命王廣淵自慶移永興及廣鋭兵叛朝廷憂之乃罷廣淵而更用逵時叛兵散擾關中長安城守逵至則撤警去備追巡邏兵皆還惟以重賞募吏卒入山谷擒盜人情乃安天章閣待制權三司使李肅之同提舉在京諸司庫務江淮發運使天章閣待制薛向權發遣三司使向職未至學士而賜以金帶示特恩也詔遼州官吏免劾罪仍賜知州司農少卿李宏敕書奬諭以河東路體量范育言昨本路舉兵出界惟遼州約民力所勝而餽不失期轉運使猶以科調不如數而劾官吏乞從矜貸故也詔陜西河東路經略司招納蕃部須簡閲團結強壯人令著生業平居不蠧邊儲緩急可以禦敵自今來者有保任無姦詐即依例與銀絹安存亦勿復遣人深入招誘新陜西河東路宣撫司勾當公事宋迪請對詔迪罷行癸巳改迪知陜州二月乙丑不遣李崇貴命龍神衛四廂都指揮使昭州防禦使涇原副都總管張玉陜西招捉賊盜入內副都知宣政使陵州團練使張若水副之應㑹合捕盜官並聽節制若水至陜西則叛兵已潰散玉亦歸涇原矣賊已潰散玉歸本路此據御集甲午上批樞密院言保甲擾人事令王安石體量虛實安石以為問得頗有之為姦人扇惑恐刺為義軍故也欲令提㸃司人分頭撫諭馮京言不須以五百人為一保管仲內政寄軍令亦只是五人為一保上欲且罷都保正安石曰不須罷都保正保正非所以致人不安也上言久逺須至什伍百姓為用募兵不可恃安石曰欲公私財用不匱為宗廟社稷久長計募兵之法誠當變革不可獨恃上曰密院以為必有建中之變安石曰陛下躬行德義憂勤政事上下不蔽必無此理上問建中所以致變安石曰德宗用盧杞之徒而踈陸贄其不亡者幸也據日録於三月九日載此事合附見更俟考詳三月十三日二十二日二十四日五月九日合參照陳瓘論曰安石云非什伍其民而用不可以致治強蓋安石欲變募兵宿衛之法故其言如此時樞密院言因置保甲有截指斷腕者安石初以為然既旬日更白上曰臣召問開封差役公人以為保甲皆人情碩無不便者實不如樞密院言又得趙子幾奏推究截指者兩人其一人遍問無有一人蓋因斫桑誤傷有三人為之證臣所問乃初倡言者也此據日録十九日所書安石持之不堅則此時保甲必罷矣欲見事實故具載于此文彥博言向因進對䝉詢及黥兵民兵利害臣與吳充即時略具大㫖上對然而天威之下頃刻之間固未詳悉臣退而復思自陛下臨御以來焦勞庶政以兵者大事尤所垂意三四年前樞密院檢録得開寶初至治平中內外兵馬大數頗甚詳備遂議酌中定為永額比至道前即差多方慶厯中即頗減內壯根本外護邊陲去冗留精適用省費搜補訓練皆有條理又以三路鄰於羌人即有屬戶蕃兵弓箭手之類以至次邊州軍盡置義勇緩急調發以應征防若守將處之得宜經久必無闕事兼向時諸路郡縣額外增置弓箭手亦欲防虞盜賊如此紀綱臣以謂深協方今之宜頗得備預之理設有未至或有廢墜即當彌縫振舉之可也恭惟太宗之定天下也止用此兵真宗仁宗英宗之守天下也亦用此兵纍聖相承而無異道厯年彌久而無異法故臣以謂協當今之宜得備預之理有未至而廢墜者彌縫而振舉之可也今陛下以睿聖之德承祖宗隆盛之業中原之人不識兵戈者幾百年過於三代所謂民不改聚地不改闢施之仁政而不煩擾之則太平之效又何加焉陛下必欲捨此而别求治道以致太平更易兵制以張威武固非臣愚所及況臣備位樞府所主惟兵不能上副聖意委曲經畫尸祿之責所不能逃伏望聖慈察臣前後纍上章奏聽解樞機之重柄并還將相之印綬得以散秩俾守外郡從愚臣知止之分全朝廷退人之禮臣不勝大幸然臣久䝉天地之恩敢忘犬馬之報竊謂兵民猶水水能載舟亦能覆舟禁暴戢兵武之七德不戢自焚自古所戒凡更制維御之方深願謹之重之區區之誠庶補萬一冒犯宸聽不任隕越惶懼之至此據文彥博奏議自注云熙寧四年不得其月日今附三月甲午樞密院言保正擾人後更須考詳乙未降工部郎中寶文閣待制王廣淵為度支員外郎依舊職知慶州右司諫直龍圗閣趙卨復權發遣延州上既罷廣淵用郭逵判永興而宣撫司亦先命陜西轉運使毋沆權延州促趙卨往延州令廣淵須卨到交割訖於乾州聽㫖㑹廣淵奏叛兵隨定上稱廣淵所奏允當亟詔廣淵卨未得依宣撫司指揮又欲徙逵延州别選重臣鎮永興王安石曰請降廣淵官或職留治慶卨治延逵治永興皆勿徙且言今兩州帥臣皆客寄上下不相保信非便宜速定使上下相安無茍且意上從之故廣淵止坐賊發所部奪兩官行至奉天復還初命逵兼四路安撫使安石以為不便寢之實録云慶州兵亂徙廣淵永興及叛兵隨定廣淵止坐降官復領慶州按廣淵徙永興乃二月七日此時慶州兵未嘗亂實録誤也廣淵附傳及本傳皆誤今按御集并日録刪修天章閣待制知渭州蔡挺加龍圗閣直學士賜手詔曰慶州兵叛不至猖獗涇原之力也上論慶厯中財用未乏而西事不振王安石曰財用足然後可以用兵然財用特用兵一事孫武論用兵所以勝負言主孰有道將孰有能天地孰得法令孰行不及財用足否也方今之事且搜舉人材理財用務富安百姓則外國不足論上曰兵須有名如何僉以為無名則不可用兵上曰恐但顧力如何不計有名無名安石曰茍可以用兵不患無名兵非兼弱攻昧則取亂侮亡欲加兵於弱昧亂亡之國豈患無名但患德與力不足爾或以為不尚力安石曰武王稱同力度德同德度義力同然後度德德同然後度義茍力不足雖有德如文王尚不免事昆夷但有德者終能強大勝外國文王是也先王於外國力不足則事之力同則交之力有餘則制之同力同德我交之而彼拒我則我義而彼不義則我勝矣陳瓘論曰古人有言曰兵猶火也弗戢將自焚自焚之禍生於用而無名也神考曰用兵須有名可見聖主之本心矣安石曰茍可以用兵不患無名何其言之乖戾也實不當用立名而用之豈王者之兵乎意欲用兵則立名而樂殺意欲殛竄則立名而妄誅凡學安石而有為者皆纂述此意丙申上批聞京東自濮州至河北緣邊二月辛已風變異常百姓驚恐不安惟當省事安靜以應天災河北京東役夫可速放散漳河役挽實妨農事可速指揮若來嵗漸開修亦不為晚其災變州郡監司皆不以聞可令分㭊上雖有此詔執政進呈不行其不行必有說王安石日録獨不載此事當考五月十一日乙未上批及劉摯云云可考詔河北京東轉運提㸃刑獄司察所部知州通判都監監押巡檢知縣縣令不職者以聞上批麟州已棄所修第一寨諸防托軍馬可並罷遣兵衆暴露日久各賜特支錢有差丁酉降殿前都虞候雍州觀察使邠寧環慶副都總管竇舜卿為康州防禦使廣鋭兵叛舜卿失覺察故也知太原府吕公弼言請復王慶民前坐所部城不完奪官上閲奏曰慶民首言河外荒堆等處城堡非便果勞民無功凡前言婁城荒堆等不可城城之無利者宜悉具名以聞朝廷常患邊吏不忠信茍先事有言如慶民者亦可嘉也王安石曰漢髙祖以鄂千秋一言眀蕭何功則封關內侯自平城歸諸言胸奴可擊者斬賞罰眀如此故能不勞而盡羣策上言李清臣等可責安石曰張景憲言杜詡保眀婁城道路寬廣亦不可以無責上以為然詡初以殿中丞致仕改授忠武節度推官書寫宣撫司機密文字從韓絳所請也據日録王安石所言在四月十九日依朱本附見于此當考如何賞慶民等曽布集有李清臣責官詞三年九月十四日改殿中丞致仕杜詡為忠武節度推官書寫宣撫司機密文字從韓絳請也與李清臣同日戊戍吕公弼言韓絳奏臣本路處置事率多紛亂外以應副為名其實欲壞邊事兼自諸路出兵牽制以來彼賊無重兵救應困乏極甚竊料今春㸃集不行向去修此堡寨有何不可臣本路昨倉猝出兵應接比他路最為深入偶不敗覆以至修第一寨賊馬首來爭奪殺退及數萬人義勇強壯運糧修寨皆平安歸業即無外以應副為名其實欲壞邊事之理今延州界賊馬十餘萬人攻破撫寧城以此知絳所奏西賊㸃集不行之說未得其實若使臣本路有撫寧之敗則絳之說得行臣亦何以塞朝廷之責臣已纍表乞解寄任惟陛下幸許詔不允王安石曰公弼無罪動且詰問既付一路而使其心每懷嫌疑恐懼不敢自竭於邊計不便今邊事皆如公弼言謂宜手敕撫諭因令有事一一奏陳上以為然上批陳留縣見行保甲每十人一小保中三人或五人須要弓箭縣吏督責無者有刑百姓買弓一張至千五百箭十隻六七百當此青黃不接之際窮下客丁如何出辦又每一小保用民力築射垜又令自辦錢糧起鋪屋三兩區每保置鼓遇賊聲擊鄉村之人居處逺近不一假如甲家遭賊鼓在乙家則無緣聲擊如此須人置一鼓又費錢不少以上事皆被差保頭所說非虛妄及元非朝廷本意令如此騷擾可速指揮令止如元議團保覺察賊盜餘無得妄施行鄉民既憂無錢買弓箭加之𫝊惑恐徙戍邊是以有父子聚首號泣者非虛也王安石進呈不行四年三月十三日上批陳留保甲騷擾執政進呈不行此墨本所書與御集手札同而日録乃絶無此事朱本輒刪改手札仍取五年閏十月十四日日録上因議河東保甲說及開封典作襖置弓箭并安石對陛下當為天子所為等語附四年三月十三日周結陳留騷擾事蓋誤也三丁兩丁各有不易乃安石欲編排河東保甲故有是言與陳留事殊不相干又云六月却令人教閲亦非是四年三月間所當言者反覆推尋朱本誤眀甚今仍依日録附此假語言於五年閏七月十四日削朱本四年三月十三日所書然不知日録何故獨不存四年三月十三日上批陳留保甲騷擾及進呈不行緣由也當考詔成都府路轉運司支交子十萬緡為梓州路常平糴本己亥權陜西轉運副使度支郎中皮公弼權發遣江淮等路發運副使開封府判官祠部郎中趙瞻權陜西路轉運副使上謂瞻陜西人必熟知本路人情故使代公弼其實執政惡瞻不附已故出之瞻初除知鄧州不赴復為開封府判官才數月也又欲用李夀朋易沈起尋不行公弼在陜西嘗建言陜西見行當二文銅錢頃嵗西邊用兵始鑄當十錢後兵罷多盜鑄乃以當三猶私鑄乃減當二行之至今銅費相當民無冒利盜鑄衰息請以舊銅鉛盡鑄當二錢從之其後折二錢遂行天下此據本志三年事因公弼改發運附見不得其月日當考詳六年十月二十三日七年三月十八日七月十八日九月二十七日十二月十七日並合參考詔永興軍依舊買鹽鈔罷行交子十四日事此據王圭㑹要修入五月二十四日當考司農寺言京東常平倉司奏請賣酒場約束乞下本路依開封府界條貫施行從之此項用編緑册四年三月十四日中書劄子指揮修入開封府條貫在三年十二月九日遍賣坊場則在五年二月二十二日新判永興軍郭逵請以便宜行事不許莊宅副使蕃部都巡檢趙餘慶為西京左藏庫使右騏驥副使蕃部都巡檢趙餘德為文思使各賜金帶錦袍三班借職都總管司指使戴嗣良三班差使殿侍押隊康瞻各遷三官仍賜銀絹以環慶路經略司上餘慶等力戰斬捕慶州叛卒功也其後王安石言慶卒之變微餘德餘慶討定柔逺則應者必衆其功宜䝉厚賞以勸後上亦以前賞為薄欲俟走馬歸厚賜之文彥博馮京皆以為蕃官不宜過厚安石曰唐太宗所用黑齒常之之類皆蕃將也立賢無方茍有功於朝廷恐不應分異蕃漢且慶州以此兩人為扞蔽厚賜之錢物使足以役其將吏諜知敵人情狀非特賞功而已上以為然辛丑兵部員外郎直昭文館權發遣鹽鐵副使傅堯俞為河北轉運使堯俞自言為御史日嘗彈劾薛向今難與共事故也尋改知江寧府知江寧在此月二十四日今并書詔判永興軍郭逵本路州郡有飢荒處並以官廪賑濟仍體量放稅逃移民户設法招誘還業以聞環慶路走馬承受李元凱言逃散軍賊解吉等六百餘人尚在乾耀州界詔涇原環慶路遣將官招捕毋得貪功務殺招降一人依斬獲一級酬奬及令涇原路速相度將官之可減者追還又詔慶州叛兵親屬緣坐者令環慶路經略司檢勘服紀年申應元謀反手殺都監縣尉捕殺獲者其親屬當絞者論如法沒官為奴婢者其老疾幼及婦女配京東西許人請為奴婢餘配江南兩浙福建為奴流者決配荆湖路牢城非元謀而嘗與官軍鬪敵捕殺獲者父子並刺配京東西牢城老疾者配本路為奴諸為奴婢者男刺左手女右手餘親屬皆釋之叛軍家屬皆誅者凡九指揮李清臣謂韓絳軍士謀叛初不告妻子宜用恩州故事配𨽻為奴婢絳奏從其言故有是詔此據清臣詔㫖內附傳都官員外郎施邈特勒停坐與故左藏庫副使髙允元妻林氏私通簡札約為婚而林氏夫服未滿為夫弟髙允懷所告又御史林旦言其素行不修㑹降法不當停特行之知陳州張方平言忠武軍牒坐西京留守牒邠州報有軍賊約一千人騎過三水縣涉龍泉鎮已遍牒巡檢諸縣部勒兵甲捕逐臣竊以賊在陜西而諸路移文關報不日遍至天下各遣巡檢縣尉㑹合兵甲急如賊至不惟騷擾鄉村且使人情危懼或容姦猾乘便妄動驚恐四方其忠武軍轉牒未敢謄報鄰州詔依方平所奏因謂執政曰守臣不當爾耶臨事乃見人上批陜西轉運司諸州根檢公使錢支費數聞追呼人不少宜令權罷及應干簿厯文字且停一年已而下司農寺與展兩月上論財用屈竭以為皆緣置官多王安石曰以臣所見似不由官多上曰置廂軍五十餘萬皆以當直迎送官人占使安石曰廂軍不專為官人占使官人所以治人既治人須用人當直上患其占人太多以為吕公弼言先朝待制只破兩人剩員安石曰待制朝廷近官職任已髙入則論議朝廷政事出則鎮撫一路只破兩人剩員當直恐非先朝善政且今士大夫已或不自貴重朝廷更賤薄之則愈自賤薄恐非國體臣愚以為陛下但當患待制非其人不能勝陛下任使壞朝廷事不患待制當直人多茍不可任使壞朝廷事只兩人亦不可借與茍可任使則陛下不患無人用度何憂不足茍能為陛下足用度則雖比今日更多與人當直未為過當壬寅詔以慶州兵叛斬戮甚多人命至重惻然可傷權罷春燕此據御集癸卯德音降陜西河東死罪囚徒以下釋之兩路禁軍並因軍事役使廂軍急腳馬遞鋪兵並與特支因嘗入賊界攻討接戰并嘗捕殺慶州叛兵者雖已經宣撫司支賜更與特支兩路民因軍事被科役者其議量輕重蠲减將來稅賦及科配其已前缺稅倚閣者並除之州縣不急公事及供申磨勘帳厯文字不免追擾者權住候邊事寧息依舊施行緣邊熟户及弓箭手見缺貸糧皆放其闕食者安撫司量與賑貸其德音曰朕德不眀聽任失當外勤師旅內耗黎元秦晉之郊並罹困擾使人至此咎在朕躬其推恤隱之恩以昭悔過之義又曰勞民搆患非朝廷之本謀克己施仁冀方隅之少息當考草制者姓名增入時元絳楊繪韓維實為學士朱本云初進入德音本上批攻戰軍士宜與運糧諸軍異等及改定數事皆極當於理執政皆以為非所及也新録並削去今從新録詔婁城堡宜令趙卨相度如不可守令棄毁訖奏河東所探報西賊水軍恐於石州渡河令吕公弼遍為之備撫寧失陷人令經略司實具數聞奏又婁城盆磋堡令轉運司更不得運糧草前去先是上問執政以婁城存弃王安石以為當俟李評等相度至議之上曰李評等若以為可守何如安石曰儻不須築堡運糧則存而守之無害上曰如欲守之固當築堡安石曰築堡則致冦今撫寧新陷之後士氣沮怯乃於敵界中作堡又必致冦以沮怯之衆當力爭之寇則其生變必矣況又陜西人力疲困難於供饋乎上曰如此當不復計惜己費財力弃之而已然以見兵三千人在彼為可慮及積糧草多為可惜安石曰今評等相度急遞聞奏俟其奏至弃之未晚上曰婁城非不可營但舉事倉猝為非安石曰三代之事固未及論但如李牧猶弗肯速爭小利蓋善用兵者其節短役不再籍糧不三載若誠出此則婁城小利自不當營非特失於舉事倉猝也易稱君子藏器於身待時而動是以動而不括今動無成算又非其時宜其結括也先王惟知時故文王事昆夷方外國未可以兼之時尚或事之此乃所以為文王也豈害其為聖乎今人材未練財用未足風俗未變政令未行出一令尚患州縣不肯服從則其未能兼制外國固宜宣王當周衰之後風俗壞人材少詩曰德輶如毛維仲山甫舉之愛莫助之當是時惟一仲山甫能好德羣臣無助之者宣王能與仲山甫協力以養育成就天下之材人材既足然後征伐故宣王征伐之時首曰薄言采芑于彼新田于此菑畝言宣王先成熟天下之材采而用之所以能征伐也今欲使戰守則患將帥非其人欲使之轉糧餉運材物則患轉運使非其人又國財民力困匱如此則征伐之事固未可議也上以乏材為患安石曰文吏髙者不過能為詩賦及其己仕則所學非所用政事不免決於胥吏武吏或出行伍或出子弟但厚設飲食稱過使客則名譽官爵隨之此風今固未能盡變則乏材固無足怪者但陛下力行不已搜舉能士責以功實風俗漸變政令漸行則人材終當不可勝用矣上悅及是遂弃婁城而有是詔正月二日戊子初城婁城上與安石論說日録並係三月四日朱本附此今從之上曰文王終有以勝之安石對云云於勝外國也何有與三月五日命綏銀通路時語略同今削去上批已差趙卨權鄜延路經略使聞本路自軍興宣撫司移易兵官不定及職名不正有失等威今既廢城寨其一路兵官委卨相度各令依舊如自來得力之人宣撫司易置他路或罷去者具名以聞甲辰韓絳言昨种諤領兵入西界攻討修築城寨所用官軍數少力薄惟藉蕃官折繼世趙懷順等統率屬羌以立戰效并降人八千餘口亦多繼世懷順等招到蕃性獷戾常須撫御察其意必自為拓土有功今見廢棄婁城堡竊恐疑懼不安或至生事如向者延州馬志誠結架之獄馬志誠事已見三年十二月上因种諤被囚綏德未賞繼世反側乘酒有言遂致羣小伺閒成謀緣种諤深得屬羌之情又有膽略西賊所畏若一旦摧辱恐無以得其死力臣非敢庇諤蓋為朝廷預為過慮望密指揮趙卨令安存折繼世趙懷順种諤無使遂成暌間以致疑懼及新招人口亦須慰安所貴用兵之際不至生事兼緩急應敵全倚此輩共為肘腋又言前者綏德之舉事涉擅興存棄之議不繫重輕今棄婁城與前不同忽令廢罷衆情必駭各懷反側竊恐因而生事詔趙卨常務安存折繼世趙懷順勿令疑懼仍常伺察之初絳奏至王安石曰待繼世不過分則無緣更致反側恐待之過乃更生驕悖今者更當密伺察其姦萌上以為然故有是詔上又論西人請和事安石以為當眀示欲和以怠其志徐與之議以堅其約此攻敵人心之道也是日上論李靖說軍法竒正事以為兵非通乎道不能盡其數安石曰不通乎道無自而可茍通乎道無自而不可也詔罷三司使副監議鹽法此據王圭㑹要增入三月十九日事二年七月二十九日當考乙巳禮部尚書致仕張存卒丙午度支員外郎知制誥吕大防落職奪兩官知臨江軍舊紀書韓絳坐宣撫失律降知蔡州判官吕大防落知制誥知臨江軍新紀但書絳罷不著因由亦不及大防禮部郎中集賢殿修撰張問落職知光化軍刑部郎中直史館陳汝羲落職知南康軍皇城副使种諤責授汝州團練使潭州安置大防以預辟宣撫司敗事問汝羲為河東轉運使調發勞民諤以撫寧堡失守也初上議大防等罪王安石曰大防所謂色取仁而行違者専務詭隨以害國事如荒堆斬人其不致變者特幸爾上亦言大防幾致變王中正至以氊自褁以避衆軍喧悖安石曰大防豈不知寨不可立其意殆欲使衆人弃之然後言弃之者非我我欲留之留之則為利以蓋其初計之失上又論諤以為與李復圭同罪安石曰復圭罪薄西事之興自綏德始亦諤之罪也且綏德不畫界則西人自然未肯休兵況已屢奏夏人㸃集之後慶州乃始違詔㫖侵入其地則致寇非復圭也上又言諤罪亦使之者過也文彥博曰諤非能用兵懷寧之戰其勝者亦幸爾上曰諤能勝西人自是其善戰人共服之非幸但任之過分所以至此安石曰諤前後詭妄致誤韓絳其敗壞兩路皆諤之由諤實罪首恐不可但言使之者過也彥博曰人好功名必為害孰不好功名又當體國上曰好功名人自不可得安石曰好功名固先王所不廢然先王奬人以義為主茍違義而好名則反為害上曰誠如此王安石等以德音引咎上表待罪詔釋之丁未吏部侍郎平章事昭文館大學士韓絳罷相以本官知鄧州制詞責絳云聽用匪人違戾初詔統制亡狀綏懷寡謀暴興征師罙入荒域卒伍駭擾橫罹轉戰之傷丁黃馳驅重疲齎餉之役邊書旁午朝聽震驚翰林學士元絳辭也絳詞據玉堂集韓絳言伏覩德音皆陛下責躬悔過之言且今邊事蓋以西賊去年八月攻圍慶州七寨焚蕩室廬殺掠老幼故遣臣往經制臣度其陸梁未已不少懲創則雖得和約亦不可保招降討擊實不得已豈固欲勤動師旅幸十餘處出兵殺獲招降以千萬計雖失撫寧小堡殺獲亦略相當我師未為沮屈河東供軍煩擾百姓蓋轉運使處置乖方安撫司曽不處畫河東既逺本司聞之後時即令蠲除使民安業自陜以西則未嘗令民出力今德音與減二年科配亦慮朝廷不知本司元無科配而然況慶州叛卒已就禽滅關陜雨足二麥向豐流庸漸復陛下但遣忠實可信之臣察訪考驗必不敢誣今德音謂使人至此咎在朕躬必恐內外臣僚有奏陳過當驚動眀聽者陛下方欲威服西戎國家事力何嘗困敝而遽有勞民搆患之詔布於西路若流聞賊境則是過自形見中原虛實強弱之勢臣恐西賊哀鳴求和之意或且中輟彼又知朝廷將來不復出師則今秋併兵入寇一路慿陵侵軼何以枝梧臣近乞面奏邊事欲禀議攻守大計今陛下己謂聽任失當則臣雖復言必不見用見於緣路待罪望早賜責臣一身去就了不足惜所惜邊防大事陛下如此主張臣竭赤誠報國而為內外浮論所搖猝然撓罷不得畢其始謀自今孰敢奮身當責以抗強敵其偷安竊祿之人必坐視臣輩被謗䝉恥進退無路自以為得也又言諸將攻討斬獲招降不少況蕩平和市焚燬村族甚多今西賊一二百里之外方敢住止使其棄失廬井老小流寓己廢春耕不為不困彼雖時出兵馬弱勢已露荒堆懷寧之戰又復敗北獨撫寧被害若以全體較之則勝負可見今朝廷不以興師為功使武將悍卒宣力立事之人莫不解體何以激勵士氣惟偷惰者必自得也絳奏至已貶初朝廷命絳宣撫面授攻守二策而樞密院不知文彥博意絳密受上㫖恐無功并任其責奏請為畫一以付絳而無發兵約束王安石亦乞不預邊事西討方略一以委絳韓絳言伏觀德音至西討方略一以委絳朱本僉帖云絳章文過不曽施行並削去今依新本仍存之絳得空名告身宣敕及錦袍銀帶撫納降附入陜西境散錢與乞人至邊盡召蕃官蕃部厚賞犒之軍士皆怨恨又奪騎兵馬曰此輩不能戰以與蕃部有抱馬首而號泣者專任种諤及王文諒等調發倉卒人不堪命賊出兵爭撫寧堡陷之又急攻婁城諸路出師牽制慶州兵再出遂作亂朝廷憂之乃罷兵棄婁城撫寧學士院草責絳制初云擅興征師上以為非擅興命改曰暴興以絳實得㫖出師而措置乖方故貶安石言陛下固未嘗許韓絳以智略見五月二十六日又言陛下待臣與韓絳皆欲以事為已功見五年正月二十四日上與王安石論保甲事以為誠有斬指者中官厯十三縣探麥苗問得如此然百姓亦多㑹得見習射九㪷去帖子常甚逺者亦相勸以為若捉得賊官必有酬奬又曰得大戶作都副保正自言管轄景迹人若便廢罷即却被景迹人讎害此極是好法要當緩為之諸縣官吏多不能稱人意上以為當以漸只委知縣為之安石以為知縣多非其人不可委上曰如此則罪知縣可也安石曰令選人為之尚不免違失法意致驚擾若委知縣為之其致驚擾但有甚於選人及其驚擾已甚乃始罪之恐已無及且奉行法令不能稱人意便加之罪此陛下之所未能行於朝廷也如何遽責趙子幾輩行之於州縣安石又為上論保甲致人斬指亦未可知就令有之亦不足怪以朝廷所選士大夫甚少陛下一有所為紛然驚怪況於二十萬戶百姓固有愚蠢為人所感動者豈可以此故遂不敢一有所為說命曰若藥不瞑眩厥疾不瘳茍欲瘳疾豈能避瞑眩今保甲所以驚者畏為義勇保捷而已就今盡刺為義勇保捷陜西河東固嘗如此上曰如此則恐不便須致變安石曰陜西河東未嘗致變則人情可知豈有怕為義勇即造反之理上曰民合而言之則聖亦不可不畏自上制法以使之雖拂其情然亦當便於民乃可安石曰今保甲固疑有斷指以避丁者然臣召八鄉人問保甲事皆以為便則合衆赤論之固知其便設有斬指者非衆情皆然也今所以為保甲足以除盜然非特除盜也固可漸習其為兵既人人能射又為旗鼓變其耳目漸與約免稅上畨代巡檢下兵士又令都副保正能捕賊者奬之或使為官則人競勸然後使與募兵相參則可以消募兵驕志省養兵財費事漸可以復古此宗廟長久計非小事也但要眀斷不為浮議所奪而已趙子幾能得府界民情可久任付以此事必有成今保戶已願免體量草養馬事固已有緒上大說曰此極好事然且緩而密安石曰日力可惜上曰然亦不可遽恐却沮事安石曰此事自不敢不密今日獨王圭在此必不漏此言所以敢具陳此據日録全載此所以見保甲不罷由安石納說不一而已也三月九日十三日二十二日二十四日又五月九日已酉吕公弼言宣撫司行賞不當其降到將官使臣宣𠡠未敢給詔將校蕃官依宣撫司指揮將官使臣别聽朝㫖權知開封府韓維等言諸縣團結保甲鄉民驚擾祥符等縣已畢其餘縣乞候農閒排定時府界諸縣初行保甲鄉民或自傷殘以避團結王安石數為上辨說甚苦開封府界提㸃諸縣鎮事曽孝寬言已榜開封縣等十七縣立賞召告捕扇惑保甲之人維所奏不行朱史於五年七月二十二日始載曽孝寬蔡駰曲折保甲斷指三月九日日録因樞院言微著其事十九日眀言其不然朱墨史俱不載墨史但於二十四日因韓維奏略書此朱史又削去新録已復存之今更參取日録於前後詳述首尾庶後世有考焉四年七月二十二日朱史始出蔡駰姓名新録因之又删去安石對語非也今亦具存之五年正月丁未七月己亥閏七月癸酉皆合參考庚戌著作佐郎同管勾淮南常平等事趙濟為太子中允權發遣同提㸃刑獄濟先劾奏亳州官吏不行新法已賜緋章服於是又加進擢云權陜西轉運使工部郎中集賢殿修撰沈起為度支副使工部郎中直史館謝景溫權陜西都轉運使起尋改鹽鐵副使又改知江寧府景溫五年二月一日罷陜漕其為陜漕蓋自鄧州知鄧州在正月九日太常博士范百祿提㸃江南東路刑獄鄧綰薦百祿為御史召對固辭之辛亥改翰林醫學溫杲為兩使職官廣西經略司勾當公事以新知桂州蕭注薦杲嘗入蠻殺賊屢有勞也仍詔杲家貧特給遞馬一匹令赴任給遞馬據御集溫杲姓名已見三年十一月末王安石奏録唐李氏諸孫杲為三班借職德臣養年州長史髙祖并景元皇帝支系賜緡錢有差新舊紀並書此詔韓絳應宣撫司未結絶文字並付李清臣齎赴闕詔㫖清臣傳可考邠州言石門山耀州界尚有軍賊三四百人聚集本州見嚴兵馬候再見的實前往討殺詔前後張皇賊勢不審虛實盡自邠州致驚近裏州軍民人拖拽逐毁兵馬極為非便宜令張靖審問的實事狀施行民方安帖自今無更輕妄復致驚擾壬子王安石白上曰陛下頃令發運司舉官一切應副所舉官多非其人上曰此必薛向所為向性質不如羅拯安石曰或恐如此近舉一章俞知漣水軍之類欲以酬宣力於發運司者今舉俞殊為無理上曰莫罷却安石曰臣非敢養交但方賴向協濟三司令改更事若陛下元許一切應副輒抑其所奏則內懷蒂芥若陛下特㫖罷之則向必畏服庶幾懲創緣陛下方賴薛向為用須至委以舉人若不稍加提撕即恐害事上曰朕為不識章俞安石曰俞已七十素無人稱引亦可知臣亦不識俞陛下更試博問上曰極好俞惇父也詔府界諸縣兵馬都監今後樞密院選人癸丑上論農兵事欲行宋道召人免稅充弓箭手事文彥博以為決不可行王安石曰恐可行但亦不須如此誠以利害驅民習兵則何必用宋道之策臣愚以為如差役法自內修之法成則可舉而措之天下上曰差役則如此可也兵事恐須自有兵處始則人不駭而事易就安石曰誠可如此但恐邊臣未能舉此法以副聖意者因略為上言民可以利驅使趨為兵上欲擇人判兵部如司農安石曰京中諸司固所以提天下之綱要非特兵部也上曰兵部最所急故也安石曰誠如此宋道所言當考陳瓘論曰安石曰民可以利驅使趣為兵安石此語亦為欲變募兵宿衛法故也道河南人泌孫迪兄也范純仁志其墓時為都官郎中同提舉三門白波輦運嘗應詔上五事一曰遣使觀俗以察守令能否二曰復武臣提㸃刑獄以觀人才且使舉其類三曰復茶法以資國用四曰責官吏恤民憂以固邦本五曰增置沿邊弓箭手以省戍兵又嘗言請倣古民兵之法籍編丁蠲其稅無費縣官而習山川之便可得戰士二十萬事多施行云道卒於元豐六年官止朝請大夫提舉崇福宫弟迪亦屢見
