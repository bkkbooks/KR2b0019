body:
  text: 續資治通鑑長編卷四十四宋李燾撰真宗咸平二年春正月甲子詔尚書丞郎給舍舉升朝官可守大州者各一人限一月以名聞俟更三任有政績當議奬其善舉有贓私罪亦連坐之乙丑命禮部尚書溫仲舒知貢舉御史中丞張詠刑部郎中知制誥師頏同知貢舉刑部員外郎董龜玉太常博士王涉同考試及封印卷首仍當日入院禮部貢院封印卷首自此始樞密直學士禮部侍郎楊徽之以衰疾求解職甲戍授兵部侍郎依前兼祕書監及占謝便殿命坐屏左右勞問久之徽之純厚清介守規檢尚名教尤疾非道以干進者自為郎官御史朝廷即以舊德目之嘗言溫仲舒冦凖用搏擊取貴仕使後輩務習趨競禮俗寖薄世謂其知言亦以是寡合于世云二月乙酉朔賜故彰信節度使周渭家錢十萬録其子太廟齊郎建中為乘氏主簿令百日外赴任上謂渭有清節召還將復用之詔下而渭已卒故優恤焉丙申以太師贈尚書令韓王忠獻公趙普配饗太祖廟庭辛丑太常丞判三司催缺司王欽若表述上登位以來放天下逋缺錢物千餘萬釋繫囚三千餘人實録本紀及食貨志並云繫囚三十餘萬恐數太多今從欽若本傳請付史館上謂近臣曰兹事先帝方欲行之朕奉成先志耳因命學士院召試欽若及覽所試文謂輔臣曰欽若非獨敏于吏事兼冨於文詞今西掖闕官可特任之即拜右正言知制誥己酉上謂宰相曰聞朝臣中有交結朋黨互扇虛譽速求進用者人之善否朝廷具悉但患行已不至耳浮薄之風誠不可長乃命降詔申警御史臺糾察之祕書監楊徽之薦著作佐郎通判泰州戚綸文學純謹宜在儒館三月甲寅以綸為祕閣校理綸父同文隱居教授學者不逺千里而至登科者凡五十六人徽之與門人追號同文曰堅素先生丙辰命度支郎中裴莊等分詣江南兩浙發廪粟賑饑民除其田租莊使還言池州興國軍得良吏餘無足稱者且言朝廷所命知州通判率以資考而授至有因循偷安無政術而繼得親民者其素藴公器有政迹者偶緣公坐則黜司冗務真僞莫辨僥幸滋深自今望遴選其人勿以資格授其有政迹者優加恩禮癸亥詔今嵗舉人頗衆若依去年人數取合格者慮有所遺落進士可增及七十人諸科增及一百八十人禮部尋以孫暨等二百五十人名聞內諸科一舉者六人特黜去之餘并賜及第京西轉運副使太常博士直史館朱台符上言曰臣聞蠻夷猾夏帝典所載商周而下數為邊害其人如禽獸繫之而無所用厥土多澤鹵得之而不可居聖王知其然也或振旅薄伐勢不窮極或和親修好意在羈縻歷代經營斯為良䇿至于秦築長城而黔首叛亂漢絶大漠而海內虛耗逞一時之心為萬代之笑此商鑒不逺也頃者晉氏失御而中原亂離邉庭之氣方驕漠野之烽不絶太祖深監往古酌取至道與民休息遣使往來二十年間罕聞入冦大省戍邊之卒不興出塞之兵關防謐寧府庫充溢信深得制禦之道也幽薊之地實為我疆尚隔混同所宜開拓太宗平晉後因其兵勢將遂取之人雖協謀天未厭亂螳蜋拒轍用稽靈誅重興弔伐之師又作遷延之役自兹厥後大肆凶鋒略虜邊民攻拔城寨長驅深入莫可禁止當是時也以河為塞而趙魏之間幾非國家所有既阻歡盟乃為備禦屯兵馬益將帥芻粟之飛挽金帛之委輸贍給賞賜不可勝數由是國之食貨匱于河朔矣陛下自天授命與物更始授繼遷以節鉞加黎桓以王爵咸命使者鎮撫其邦惟彼契丹未䝉渥澤非所以柔逺能邇昭王道之無偏也今已訖諒暗將終祥禫中外延頸觀聽德音臣愚以為宜以此時赦契丹之罪擇有文武才略習知邊境辨說之士一介之使以嗣位服除禮當修好鄰國往告諭之彼十年以來不復犯塞以臣料之力有不足志欲歸嚮而未得其間也今若垂天覆之仁假來王之便必歡悅慕義遣使朝貢因與之湔棄前惡復尋舊盟利以貨財許以關市如太祖故事結之以恩彼必思之兩國既和則無北顧之憂可以專力西鄙繼遷當自革心而束手是一舉而兩獲也西北無事然後備邊之兵可議减省夫邊兵省然後費用可節費用節然後賦斂可緩賦斂緩然後黎庶可安黎庶安然後政化可致原其根本非他也在安邊弭兵而已設使尚稔其惡盈貫罔悛者不過二塗或皇華至邊拒而不納或留我行人不遣復命亦未至于大失體損威重而示弱外戎貽羞國家也然背義絶約曲在彼矣又使天下之人知陛下為元元故日新改作屈萬乘之尊以圖長久庶幾就安利去危殆則聖德巍巍與天無極億兆之民愈歸心而懷惠矣又何傷于明哉陛下若欲訓兵練將與之力爭臣不敢復有所云也若欲繼好息民以安社稷不以此際乘便而行之慮他日噬臍無名發端昔揚雄有言曰北狄之戎五帝所不能臣三王所不能致故其不服中國未得高枕安寢也何者天性忿鷙形容魁健其彊難屈其和難得真中國之雄敵也矧苞桑之繫安不忘危兵家之勝貴于不戰今守文繼統欲致太平法堯舜之垂衣體湯禹之罪已好生惡殺務德化事有損一毫以利天下者又可不思制變而與不識禮義之俗爭先後角氣力哉昔西漢高后時尉他自號南粵武帝發兵攻長沙邊邑黃屋稱制與中國侔及孝文即位先遣陸賈馳書賜之他乃頓首願為藩臣奉貢職夫漢文帝天子之尊也尉他小國之君也其所以然者為中國勞苦且以息戰伐也今契丹之徑過于南粵陛下之聖出于漢文跡而行之事豈相逺哉誠朝廷之大計不可忽也台符又自請使北時論稱之本傳云咸平元年北戎為梗經武帝略云北戎冦邊按元年北兵未動觀台符此疏可知也疏云已訖諒暗將終祥禫則台符上疏時乃二年春矣今附三月末閏三月丙戍宰相張齊賢等言春候已殘雨澤未降此乃臣等燮理無效願示譴黜以塞天下之責上曰朕獲纘承基緒賴卿等輔翼慮政有闕失宜相規以道無惜極言也初秦悼王旅葬涪陵于是詔擇汝鄧間地改葬庚寅詔有司力役之無名營繕之不急者悉罷之實録在己丑日今從本紀皇太后居西宫嘉慶殿宰相引漢唐故事上宫名曰萬安從之己丑宰相張齊賢言于上曰臣受陛下非常之恩當以非常報因述皇王帝霸之說上曰朕謂皇王之道非有迹但庶事無撓則近之矣上以亢旱詔中外臣庶直言極諫詔書略曰朕纍降詔書大開言路頗多叢脞罔副詢求思得讜言以答天戒善者必加甄賞否者亦為優容勿尚靡詞復談鄙事有上封指中書過失諸行罷免者上覽之不悅謂宰相曰此輩皆非良善止欲自進當譴責以警之李沆進曰朝廷比開言路茍言之當理宜加旌賞不則留中可也况臣等非才備員台輔如䝉罷免乃是言事之人有補朝廷上曰卿真長者矣寶訓以此事繫之咸平二年今附此以河北轉運使右諫議大夫索湘為户部使湘在河北時屬郡有幹釀者嵗輸課甚微而不逞輩多聚飲其中為奸盜湘奏廢之德州舊率民馬以備驛𫝊又役民為步遞湘罷其事悉以官兵卒代之會內殿崇班臨渙閻日新建議請于靜戎威虜兩軍置場鬻茶收其利以資軍用湘上言若是則奪民利臣恐𣙜場商旅自兹阻絶甚非便也遂止又言事者請許𣙜場商旅以茶藥等物任於北界販易復招募北界商旅于雄霸州市易北戎既獲厚利則邊患可息矣詔湘詳議以聞湘言北邊自興𣙜場商旅臻凑制置深得其宜今若許其交相販易則緣邊商人深入戎界竊以為非便又北界商人若至雄霸其中或雜以奸僞何由辨明况邊民易動難安蕃戎之情宜有羈制望且仍舊為便㑹有詔經度復修定州新蒲樂陰兩縣湘以其地迫窄非屯兵之所遂奏罷之湘質朴少文而長於吏事歷任邊部所至必廣儲蓄為備豫計出入軍旅間頗著能名先自京輦茶至榷場最為煩擾又多所損敗湘建議請諸商旅緣江載茶詣邊郡入中既免道塗之耗復有征算之益又威虜靜戎軍嵗燒邊草地以處南牧言事者又請于北寨山麓中興置銀冶湘以為召冦亦奏罷之詔三館寫四部書二本來上一置禁中之龍圖閣一置後苑之太清樓以備觀覽此據本志實録但云寫一本置禁中不及龍圖閣也東京記云大中祥符初建龍圖閣據此則咸平初閣已建矣京西轉運副使朱台符上疏曰臣聞皇天無親王者無私上下合符有如影響若王政缺于下則天譴見於上竊惟陛下受先帝之顧命膺兆民之樂推大孝彰聞小心畏謹動遵禮法不愆舊章所宜得天心獲嘉應而踐阼以來二年之內彗星一見時雨再愆者豈非凶醜未盡服政令未盡順天所以示兹警戒也夫災變之來必以類應故彗星見者兵之象也時雨愆者澤未流也今北敵未賓西羌作梗荆蠻有猖狂之冦江浙多饑饉之民慮其來犯邊陲變為盜賊蜂屯蟻聚之衆須俟討平鼠竊狗盜之群亦勞逮捕此彗星之所以見也自即位肆赦臨朝聽政覃恩宥罪施惠及物然未嘗蠲免殘租許行𣙜利山海之貨悉歸于上酒稅之饒不流於下元元之民未盡䝉渥澤此時雨之所以愆也陛下宜深惟二者之所以然設備以禦之修政以壓之不然則事有可慮者聖朝享國四十年括地一萬里經營非不久統御非不衆而治或未至政或有闕意者法術制度尚有可改而更張者乎臣雖不敏輒敢條奏其事臣聞農者國之本也其利在粟多兵者國之命也其功在戰勝此兩者存亡所繫也方今患在農少而粟不多兵多而戰未勝農少則田或未墾兵多則用常不足故儲蓄空虛而聚斂煩急矣民利盡歸于國國用盡入于軍所以民困而國貧也周公之制國積九年此堯湯水旱而民所以無饑色也今郡國闕三年之糧貧民無終嵗之食稼一不熟則有饑死者軍儲自贍不足何暇賑之乎且地方百里每畝收粟一斛嵗計得粟五百四十萬斛今甸服之內凡方百里者百所得曽不能供足軍食而區區運糧于江淮間終嵗所得不過百里之出者由是而論有以見農政之不修也臣愚以為宜省徭役以寬其力驅遊惰以增其衆男悉心於畎畝女盡力於蠶桑種必刈穫養必紡績不出數年自然家有餘食而人有兼衣矣賈誼有言曰積貯者天下之大命也茍粟多而財有餘何為而不成以攻則取以守則固以戰則勝懷敵附逺何招而不至今驅民而歸之農皆著於本使天下各食其力末技遊食之民轉而緣南畝則人樂其所矣此農政之修也國家養兵百萬士馬精強器甲堅利可謂無敵于天下矣然自拒馬失律以還夏廷逆命之後軍聲不振廟勝無聞一紀于兹䝉恥未雪何者將帥弗用命而委任不專也卒既驕惰而不習知邊事也有以見軍政之不修也夫將帥者王之爪牙登壇授鉞出門推轂閫外之事將軍裁之所以克敵而致勝也近代動相牽制不許便宜兵以竒勝而節制以陳圖事惟變適而指蹤以宣命勇敢無所奮知謀無所施是以動而奔北也孫武曰不知軍之可以進而謂之進不知軍之可以退而謂之退是謂縻軍此之謂也臣愚以為疑則勿用用則勿疑謹擇其人專委其任有功者寵以爵位有罪者威以斧鉞明示刑賞斷在必行孰敢不用命哉古者井田之法兵則民也民則兵也出則戰入則耕人各自供官無所贍今農不習戰士不務農離為二途絶不相用臣愚以為古制不可全取宜參驗當今便利酌中而漸制之况江浙舊有義軍寨秦隴見屯强壯執柯取則兹事可行以天下土地之饒士民之衆各于郡縣量置義軍本戶略與復除嵗時少加賞賜動則就便召發靜則任從營養又于王畿千里之內蓄兵十萬以制天下孰敢動搖哉州縣本城隨宜額定溢剩者不合招置疲老者盡放歸休果行此道則天下之兵减太半矣緣邊之人便於弓馬勇于戰鬭蓋天性也妙選有文武才略之士為長吏以統之仍以厚利召募願為正軍者隨郡大小差厥數以備城守止于趙魏之間少屯王師以䇿其後亦足减戍卒之太半矣且耕且戰足食足兵削調斂之煩苛免飛挽之勞苦此軍政之修也臣愚以為不任人無以安邊不安邊無以省兵不省兵無以惜費不惜費無以寬民不寬民無以致治舍此數事雖有智者不能為計矣刺史縣令親民之官有民人焉有社稷焉蓋三代之諸侯也故漢宣帝曰與我共治者惟良二千石乎光武亦曰郎官上應列宿出宰百里茍非其人民受其弊誠重之也頃者不除刺史止以知州代之其差委也上自僕射尚書下至京官奉職率多經授未盡當任權不足以威吏民祿不足以惠窮乏政皆茍且事出因循意者國家以刺史之官為武夫之任有支賜公使之費奏薦僧尼之例重其事而不以授人乎孔子曰名不正則言不順言不順則事不成今文武登朝官諸司使副不翅千餘員代不乏才豈無循吏但未選任之耳臣愚以為宜詔執事精練名實明揚俊賢各以檢校官出為刺史但不得支賜公使奏薦僧尼而縣令乃子男之任與民最親切者也邇來除授率多冗從諸司吏人分據大邑識暗則莫能燭理祿微則鮮克持廉州縣之職大抵相類欲其盡誠于奉上極力於字民其可得乎臣愚以為宜詔有位舉所知銓司擇才諸司吏人不得處大縣為長吏凡牧宰者復奉戶以增月入受空土以為職田俾其衣食足以恤家車服足以示衆多其任以勸效委其權以行事漸敦教導專務勸課每嵗用令文考課之法以户口增减墾田多少定其殿最而黜陟焉如是則人民受賜矣簡易者事不瀆節儉者財有餘今署置之過也官吏森羅于郡邑差命之煩也使者旁午於道路廪祿之費耗驛劵之供給何可勝數無名之賞賜不急之造作亦無限量土木窮其麗工巧極其淫他費百端動計千萬故兩稅之外悉取山海之貨酒𣙜之饒而用猶不足也加以教化未甚行廉恥未甚立奢侈之俗未甚變流亡之民未甚來租稅未甚均刑獄未甚簡藩籬之倚未甚固帷幄之謀未甚臧法有滋章之條吏無惻隱之實其餘背理傷道便文自營非為公家忠計者不可一二而舉也願問大臣以當世之務如上所陳湯沐而櫛治之瞑眩而針砭之使百度正彛倫叙生靈泰社稷安上下協和章程明密建皇極之道樹太平之基陛下坐九重負斧扆南面而聽斷端拱而無為垂子孫之貽謀光祖宗之大業豈不休哉陛下自視當今事勢何如唐漢盛時有土者不可言貧有人者不可言弱以陛下神聖聰明資以天下之大而未比隆於唐漢竊為陛下惜之奏入優詔褒答夏四月丙辰上謂輔臣曰近覽言事封章日不下百數時亦有得卿等更詳之如文理可采者别取進止又詔文武羣臣封事閣門畫時進入勿致稽留辛酉御史中丞張詠上言請自今御史京朝官使臣受詔推劾不得求升殿取㫖及詣中書咨禀從之丙寅河東轉運使掖人宋摶言大通監冶鐵盈積可供諸州軍數十年鼓鑄請權罷采取以紓民詔從其請時西北二邊屯師甚廣摶經制饋餉以幹治稱朝廷難其代凡十一年不徙丙子上謂輔臣曰庶官中求才幹則不乏詢德行則罕見其人夫德為百行之本德行之門必有忠臣孝子豈無德行者能全其忠孝乎又庶官所掌之務多不修舉而捃拾他局利害以圖進身若能自幹本局則百職不嚴而肅又何患乎政事之撓瀆哉御史中丞張詠為工部侍郎知杭州詠既至屬歲歉民多私鬻鹽以自給捕犯者數百人詠悉寬其罰而遣之官屬請曰不痛繩之恐無以禁詠曰錢塘十萬家饑者八九茍不以鹽自活一旦蜂起為盜則其患深矣俟秋成當仍舊法有民家子弟與姊訟家財壻言妻父臨終此子才三歲故見命掌資産且有令異日以十之三與子七與壻詠覽之以酒灑地曰汝妻父知人也以子幼甚故託汝儻遽以家財十之七與子則子死于汝手矣亟命以七分給其子餘三給壻皆服詠明斷拜泣而去曹濟州言旱先是左正言耿望知襄州建議襄陽縣有淳河舊作堤截水入官渠溉民田三千頃宜城縣有蠻河溉田七百頃又有屯田三百餘頃請于舊地兼括荒田置營田上中下三務調夫五百築堤仍集鄰州兵每務二百荆湖市牛七百頭分給之上曰屯田之廢久矣茍如此亦足為勸農之始令望躬按視即以望為右司諫直史館京西轉運使與副使朱台符并兼本路制置營田事是歲種稻三百餘頃望初請以大理寺丞武程總營田務事程上疏言其不便詔移程于他郡别選官代之俟異日務成較其利害取進止行賞罰焉汝州舊有洛陽南務遣內園兵士種稻雍熙中以所收薄且擾人廢之賦貧民于是從台符之請復置募民二百餘户自備耕牛就置團長京朝官專掌之墾六百頃導汝水澆溉歲收二萬三千石耿望除右司諫直史館京西轉運使與副使朱台符兼制置營田乃此月丙子今并書之月末耿望未見主客郎中知虢州謝泌上疏曰臣竊謂聖心所切者欲天下朝夕太平耳唐姚崇獻明皇啓太平凡十事雍熙末趙普嘗録以獻俄命普復入相于時天下之人皆以為致太平之䇿無出于此尋而普病又北戎擾邊所以因循未行其一事今北戎已息繼遷請命則太平十事正可以行于今日矣臣以為先帝未盡行者俟陛下為之耳陛下自臨大寶不加兵於戎敵使西北肅然加以風雨時序民安土著則太平之象復何逺乎至於省不急之務削煩苛之政抑奔競之風開直言之路斯皆致太平之術實見行其八九矣又豈讓唐開元之治也議者或謂方今西戎用兵與開元不同且開元時戎敵亦孔熾耳明皇卒與之和至如漢高祖豈弱主耶及在平城之日亦與之和此皆屈已以寧天下豈大國自輕而與戎敵競小忿乎愚臣請以近事言之往歲討伐交趾王師一動南方幾搖先皇以為得之無用棄之實便乃授以官秩俾為藩屏則至今鼠伏石晉之末聽景延廣之言耻與契丹和遂至天下橫流此豈得為彊哉臣本州監軍室种者燕人也嘗言彼中所嗜者禽獸所貪者財利此外無他智計先朝平晉之後若不舉兵臨之但與財帛則幽薊不日納土矣察此乃知敵情古猶今也漢祖明皇所用之計正可以弭敵心矣臣伏以詔書以近日不逞之徒陳述者皆閻閭猥䙝之事臣聞古先哲王詢于芻蕘察於邇言者蓋慮視聽壅蔽故採此以達物情亦罕聞用其言而行其事也語曰小人勿用必亂邦也先時有侯莫陳利用陳廷山鄭昌嗣趙贊之徒喋喋利口人心惟危賴先帝聖聰各加誅剪然為患已深矣臣又聞工欲善其事必先利其器輔時佐主建萬世之基立不拔之䇿者必倚老成之人至於成康刑措蓋從周召之謀文景清淨亦用蕭曹之畫明皇太平復是姚宋之䇿夫精練國政斟酌王度未聞市井之徒塵走之吏可當其任也望陛下深察前古用小人則亂用大賢則治然後小人不敢萌大賢得以畢力也五月丙戌詔天下貢舉人應三舉者今歲並免取解自餘依例舉送必求實藝無使遺賢當俟奏名朕親臨試上謂宰相等曰近覽上封事所述頗言風俗侈靡有傷淳儉公卿士庶服用踰制至有鎔金飾衣或以珠翠者詢之曰費金數甚多且金至寶也使之為泥誠亦可惜張齊賢曰近歲風俗尤薄奢侈相尚每為事恐不過人此弊當急懲戒或先别大臣之家使各遵朴素則可以導民宣化矣丁亥令有司禁臣庶泥金鋪金之飾違者坐其家長丁酉以殿中丞鄄城馬元方權户部判官從户部使陳恕所奏也元方嘗建言方春民力乏絶請預給庫錢約至夏秋令輸絹于官公私便之朝廷因下其法諸道今預買絹蓋始此馬元方𫝊户部使陳恕奏元方為户部判官元方言方春民貧請預貸庫錢至夏秋令以絹輸官行之公私果便因下其法諸道按元方為戶部判官在咸平二年五月後知徐州景德元年十一月為梓州路轉運使本𫝊附傳皆同范鎮東齊記云太宗時馬元方為三司判官建言方春民乏絶時預給庫錢貸之至夏秋令輸絹于官預買絹蓋始于此鎮所記與元方傳同今從之王闢澠水燕談獨云祥符初王旭知穎州因嵗饑出庫錢貸民約蠶熟千輸一縑其後李士衡行之陜西民以為便今行天下于嵗首給之號和買絹或曰預買始于旭也今不取又按實録大中祥符三年閏二月己未河北轉運使李士衡言本路嵗給諸軍帛七十萬民間罕有緍錢常預假于豪民出倍稱之息及期則輸賦之外先償逋負以是工機之利愈薄請令官司預給帛錢俾及時輸送則民獲利而官亦足用從之仍令優與其直士衡正𫝊附傳皆云因詔推其法于天下范仲淹作李士衡神道碑亦云為河北轉運使建言民乏帛貨每春取絹直于豪户其息必倍本道嵗給請軍帛七十萬匹不足則市于民請便預受其直則公私交濟制從之今行于諸道蓋馬元方任三司實創此議雖布其法于諸道有即奉行者亦有未即奉行者及李士衡在河北復以為請始行于河北然諸道亦未遍其後左藏內藏庫災又特行于京東西范仲淹所謂今行于諸道者蓋指景祐間也行于京東西乃祥符九年春乙巳幸曹彬第問疾賜白金萬兩先是知雄州何承矩奏敵謀冦邊上以問彬對曰太祖英武定天下猶委孫全興經營和好陛下初登極時承矩嘗發書道意臣料北鄙終復成和好上曰此事朕當屈節為天下蒼生然須執綱紀存大體即久逺之利也此事三朝經武聖略繫之咸平二年而無日月今因問曹彬疾附見蓋必是彬為樞密使未卧家時也王曾筆録云侍中曹彬為樞密使向敏中為樞密副使當契丹犯塞繼遷叛命每軍書猝至上必急召樞臣計議彬則曰此狂冦當速發兵誅討斬决而已止用强弩若干步騎若干足矣敏中徐曰其所儲廩未備或道途迂逺或出兵非時當别施方略制之纎悉措置多從敏中所議上或謂將帥難其人彬必懇激而言臣請自效更無他說敏中常私怪之子瑋亦有將材纍歷邊郡威名甚著晚自樞府出鎮西鄙臨事整衆酷類其先君後果于戰鬪而不肯以安民柔逺為意豈將帥之體固當若是耶按彬復為樞密使敏中自同知樞密院改副使乃至道三年八月己亥咸平元年十一月戊子敏中改參政二年六月戊午彬卒兩人同在西府才一年耳真宗初即位便令西邊戢兵繼遷尋納欵契丹蓋末常犯塞不知將所稱軍書猝至指何時也經武聖略于咸平二年載何承矩言契丹謀犯塞或曾實指此時然經武聖略稱彬對真宗以北鄙終復成和好與曾筆録特異或筆録誤也當考嘗有詔聽民越拒馬河抵敵中市馬知雄州何承矩言緣邊戰櫂司目陶河至泥姑海口屈曲九百里許天設險固真地利也太宗置寨二十八鋪百二十五命廷臣十一人戍卒三千餘部舟百艘往來巡警以屏奸詐則緩急之備大為要害今聽公私貿市則人馬交疲深非便宜若然則寨鋪為虛設矣上納其言即停前詔此據承矩𫝊在咸平二年敵復來冦之後今因曹彬對上語附見六月丁巳宰臣監修國史李沆等上重修太祖實録五十卷上覽之稱善謂沆等曰向來史臣不能勤盡聞張洎修國史止成一卷今兹可謂備矣仍降詔嘉奬賜襲衣金犀帶銀帛各有差錢若水而下又加散館食衣沆獨懇辭詔許之戊午樞密使兼侍中贈中書令濟陽武惠王曹彬卒上臨其喪哭之慟言必流涕録親族門客親校拜官者十餘人彬性仁恕清謹遜言恭色在朝廷未嘗抗辭忤㫖博覽彊記善談論被服雅同儒者尤踈財未嘗聚蓄伐二國秋毫無所取位兼將相不以為等威自異造其門者皆為揖客不名下吏每白事不冠不見其為藩帥遇朝士于途必引避過市則戒騶御不令𫝊呼北征之失律也趙昌言表請行軍法昌言知延州還因事被劾未得入見彬在近密遽為上請乃許朝謁彬歸休閉閣門無雜賓保功名守法度近代良將稱為第一祕書丞何亮初通判永興軍詔與轉運使陳緯同往靈州經度屯田及還乞召對因上安邊書曰臣竊料今之議邊事者不出三途以靈武居絶塞之外宜廢之以休中國飛挽之費一也輕議興師深入窮追二也厚之以恩守之以信姑息而羈縻之三也而臣以為靈武入絶塞有飛挽之勞無毛髮之利然地方千里表裏山河水深土厚草木茂盛真牧放耕戰之地一旦捨之以資外戎則外戎之地廣且饒矣以悍鷙之性據廣饒之地以梗中國此外戎之患未可量者矣自環慶至靈武僅千里西域北庭剖分為二故其地隘其勢弱而不能為中國之大患如捨靈武則西域北庭合而為一此戎人之患未可量者二也冀之北土馬之所生自胸奴猖狂之後無匹馬南來備征帶甲之騎取足于西域西北既剖分為二其右乃西戎之東偏為夏賊之境其左乃西戎之西偏秦涇儀渭之西北諸戎是也夏賊之衆未嘗以匹馬貨易于邊郡是則中國備征帶甲之騎獨取于西戎之西偏如捨靈武復使西戎合而為一夏賊桀黠服從諸戎俾秦涇儀渭之西北戎人復不得貨馬于邊郡則未知中國戰馬從何而來此捨靈武而戎人之患未可量者三也若無深入窮追則夏賊度勢不能抵必奔遁絶漠王師食盡不能久留師退而賊復擾邊所謂有大費而無成功深冦讐而速邊患此輕議興師之不利者一也師進則無功師退則冦至冦至不戰則邊郡被其害冦至而戰則邊郡之兵不足以當戎人之衆此輕議興師之不利者二也清逺西北曰旱海蓋靈武要害之路而白馬二將奔敗之地也如王師薄伐無功而還則夏賊必據要害之路以阻絶河西糧道此輕議興師之不利者三也自國家有事于西戎已來關右之民疲極困苦未能息肩而一旦薄伐無功河西路阻賊必斡運飛挽大興征討以通糧道疲民重困盜賊多有此輕議興師之不利者四也若示恩信姑息而羈縻之則又戎人之性貪婪無厭雖存臣事之名終多反覆之志或當道牧放以阻吾軍民或征虜族帳以益其部落如國家止以恩信羈縻之必將復從諸戎然後為中國大患此不可一也自白馬二將奔敗之後夏賊得志擇靈武山川之險而分據之侵河外膏腴之地而闢之逼近城池意在吞噬譬猶伏虎見便則動如國家止以恩信羈縻之則一朝之患卒然而作此不可二也夫以三患四不利二不可為防邊畫既未見其可則在臣愚慮不出二䇿自清逺至靈武有溥樂有耀德蓋水草之地為河西之糧道而悉有古城之跡存焉夏冦西掠諸戎則此其要害之路也故每揚言曰朝廷如修溥樂城我必力爭其言不恭之甚其實懼朝廷之城溥樂以通糧道而危其往還要害之路也如朝廷以修護清逺為名而時納修城創宇之具延環清逺多積軍儲且以數嵗漸計之使民無所傷而賊不能知一旦興師數萬以城溥樂朝發清逺日未中至焉其師也戰士三居其一以備冦也役卒三居其二以荷器具而齎軍儲也凡戰士萬人使役卒萬人齎糧六㪷而行凡戰馬千匹使役卒七千五百人自齎糧三㪷馬粟一㪷草一束士馬皆有半月之食備計城之功不過十日而使戰士自齎三日糧則城畢功而食有餘矣自清逺輸粟亦如之賊知修城而敢悉衆來冦是謂中吾上䇿者也何則夏賊為梗有年國家未能剪滅者非兵力不足而然誠以深入窮追賊則奔絶漠師久則民不堪役師退則賊復擾頻征討則關右耗竭故也如使賊來犯邊而敢與王師拒戰則其殄滅也久矣且國家之城溥樂也必潜師于延環清逺以觀賊之變宜分環州清逺為二道一道傍山而北軍于賊之後一道過長嶺直趨溥樂軍于賊之前而使城溥樂之兵軍其中賊以溥樂孤軍故悉衆來冦而卒然三軍鼎峙則其心駭矣又令延州之師入其境驅其畜産俘其老弱而害其巢穴靈武之衆收河外之地復賀蘭之境杜三山之口以斷其奔路則其衆雖堅鐡石之心必起携二之志其將雖有孫吳之術必無制勝之方而獨使保吉桀黠志在决戰能無敗乎破而擒之此萬世之功也國家之城溥樂也必使一介使于夏諭以明詔曰溥樂耀德悉有古城之基蓋靈武往還之路也今城堞缺壞而輸粟之際暴露在野軍民愁苦朕甚不忍今少發士卒修其郛郭詣山取材慮蕃部不察事宜互相驚擾汝顯荷國恩克紹祖烈茅土節鉞盡萃汝躬直以朕此意按撫之誠知動無所利仰怖天威恭而聽命則中吾下䇿者也雖存靈武而使阻隔旱海居絶塞之外不城溥樂耀德為之唇齒則戎人之患亦未可量與舍靈武無異而加之有連年供給之厚費無防邊尺寸之微功但兀然孤城以困極關右者也今特城二城而賊不敢動則可建溥樂為軍耀德為寨嚴其刁斗堅其守備募天都之貧民營田于塞下以益軍儲然後謹擇將帥謹守邊防而以恩信撫臨之則數十世之利也議者必曰國家贍靈武猶曰困匱而更供給二城其費益大此不練事之深也夫有清逺而無二城則靈武無援一日西北服從合而為一有不測之患焉當是之時國家雖纍千百二城之費遽能剖而分之以弱其勢使賊斂跡夏境而不為邊患乎其靈武至清逺不滿三百里而榖價絶殊於清逺者以度越旱海無舍宿之地有賊冦之憂故也如建此二城則軍兵之趨靈武也有舍宿之地少賊冦之憂輸糴日益榖能無賤乎以減榖之價供二城之費足矣又何疑焉二䇿之外復有一說烏白鹽池之利在諸戎視之猶司命也如夏賊來冦溥樂而令延環之師入其境先據烏白之池而號令諸戎曰有得夏賊首者分封某地而以烏白與之則諸戎願擒保吉者衆矣至于前徒倒戈亦未可量為王師之助不亦多乎但不知國家所命上將軍者果何如人爾詳録亮疏蓋韓琦嘗有取馬國史無此得諸亮家令祕書省正字邵煥於祕閣讀書從其請也祕閣讀書自煥始煥嘗以童子召對賜帛遣歸是春復至京師上命賦春雨詩援筆立成遂命以官時年十二睦州人也癸酉都官郎中劉䝉叟上言曰陛下已周諒暗方勤萬務伏望愈崇儉德謹守前規無自矜能無作奢縱厚三軍之賜輕萬姓之徭使化育被于生靈聲教加于夷夏且萬國已觀其始惟陛下謹守其終思鮮克之言戒性習之漸日謹一日雖休勿休則天下幸甚上嘉納之召試學士院命以本官直史館
