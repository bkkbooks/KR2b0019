body:
  text: 續資治通鑑長編卷二百五十七宋李燾撰神宗熙寧七年冬十月乙丑朔詔興修農田水利應賞者監司申司農寺於鄰路差官餘官及諸色人委提刑司於别州縣選官覆案保明詔取諸軍自來出戰有功該轉資人委當職官呈驗如少壯籍姓名功狀以聞丙寅詔知陳州觀文殿學士户部尚書張方平徙應天府過闕令入見司農寺言今年四月乙巳詔災傷路分見編排保甲方田及造五等簿並權罷候歲豐農隙取旨今年秋成乞下諸路及開封府界除秋田災傷三分以上縣依前權罷外餘候農隙編排保甲方田及造五等簿內永興秦鳯等路義勇保甲依八月甲申詔候來年取旨從之八月甲申詔未見甲申十九日三月二十二日四月二日四月六日丁卯權發遣京東轉運副使趙濟言廣濟河通流貨財為利甚博朝廷昨以河水淺澀滯留綱運遂廢輦運司以上供糧六十二萬石令認折斛錢三十六萬緡自此民間糶賤傷農又頓虧沿河課利如朝廷許令復舊即别具措置利害以聞詔定陶知縣張士澄與同勾當修內司楊琰相度修廣濟河廢廣濟河運年月當考天聖六年七月合參照又熙寧八年十二月九年四月元豐五年二月廢廣濟河輦運至八年八月復置當并考戊辰詔河北河東路當差管勾訓練義勇保甲官並令提舉義勇保甲司奏舉都官郎中新知夔州鄭惟幾言伏見奉特勑奏舉邊臣任用後不如所舉與同罪至死者減一等如致城寨不守其舉主雖會恩不原減竊以戰守之職所繫甚重舉主有罰無賞乞被舉者如擢用後因戰守有功事狀尤異其舉主亦等第旌賞詔自今邊臣功狀顯著者勘會舉主取旨六年四月二十七日詔奬黃琮劉舜卿詔官田已有人租佃及五年者並不在給募役人之限檢詳樞密院兵房文字太子中允劉載監杭州龍山稅坐前知司農寺丞京東體量賑濟災傷擅立關子式牒諸州軍付飢人於積蓄之家假貸違法也六月辛未載初以佐著作除中允檢討贈靖難節度使追封新平郡王諡恭靖宗保卒詔以宗保仁宗朝嘗養於宮中故優贈之宗保允成子出後昭成太子為孫既繼昭成與母康氏異宮定省未嘗闕母或遣人至雖微賤必冠帶見之母卒執喪哀毁康氏好方書每歲以錢十餘萬為藥以施疾者宗保歲歲如之每製藥必涕泗追慕性仁恕吏盜米至千餘石貰其罪或謂宗保太寬宗保曰彼盜贓當流吾恐其人竄逺地則父母妻子皆委溝壑故不忍也嘗於坐隅書忍字以為戒宗室賢之己巳淮南東路轉運司言頻年水旱乞差官以楚州市易本錢糴蘇州米三十萬石應副軍儲或糶用淮南價撥還市易從之令提舉楚州市易司施行如兌充軍糧令轉運司依和糴價償之庚午詔近遣光祿寺丞杜純相度於沿蔡河州軍置糴場計置輦運以食河北路可更於沿黃河州縣計置除朝廷賜本錢外同轉運司計腳費以聞又詔河北東西路察訪司保甲災傷及五分縣與免教閲仍令本司約府界閲試比較武藝給錢糧放散日數立法其義勇閲試更不增糧止支例物辛未中書言準條南郊前一季許約法斷案外餘不約法勘會每約法大理寺供狀法申中書樞密院即檢斷審刑院更不貼草節略貼黃法狀比貼黃繁多刑房吏少慮當此擁併點檢不精乞更不約法止兩月前召審刑大理官赴中書令斷議官同議斷依舊貼草止作節狀申中書樞密院受誓戒前半月依此催促朱史以為小事削去新本從之又奏看詳編修條例所言大禮臣僚加恩舊無定例推恩不一有宗室皆為諸王使相而充獻官及免者食邑並加千户或不充獻官加七百户今並改作千户有皆為知樞密院樞密副使宣徽使而帶節度使者食邑七百户實封三百户不帶節度使者食邑加五百户實封二百户今並改作七百户實封三百户從之壬申詔將作監具已科定修三司所用監官兵匠之數及合役月日以聞涇原路經略司言乞自今漢蕃户盜西界牛馬聽逐路依收接條例於沿邊處界首説諭給還從之詔義勇保甲所習武藝弓須及七斗以上弩兩石以上仍以十分為率弓及槍刀各毋得過二分餘並習弩中書言諸州流民雖願歸業緣河北賑濟糧數不多欲令京西南北路差去官詳纍降指揮存恤無令飢凍如自願歸業者聽之南北路各賜度僧牒二百州助教勑告各二十以助賑濟從之墨本便於此日載遣裴昱賜韓琦等詔及琦答疏誤也朱本因之今移入八年四月蕭禧去時提舉河北河東路義勇保甲沈括等言乞自京給例物赴逐司準備支用不足以逐州軍錢充三司撥還又準朝旨令監司官分定州軍提舉義勇保甲乞應教閲月令逐官往來提舉又義勇乞委安撫司選兵官同本縣官一員監教河北義勇保甲依陜西秦鳯路例别籍上等立通選格及參詳未盡事理條畫以聞欲乞遇所至州縣見教民兵即親閲視其餘委監教官精選擇並從之淮南等路發運司言真揚楚州運河久不浚乞賜錢糧下兩司候綱運稍空募人興工從之仍許截留上供錢米各五萬四千貫石知荆南潘夙罰銅八斤轉運使孫桷荆湖北路都監朱允中各七斤坐妄奏權知懿州左藏庫使李浩斬軍人及擅交割公事赴太原府新任不實故也丙子衛州防禦使馮行已權同勾當三班院始自雄州還朝也還朝據本傳欲載鄉巡弓手廢復故出此不然削去沿邊舊有鄉巡弓手後悉廢罷而北界巡馬如故數漁界河剽取舟船行已請復置鄉巡弓手以杜侵爭之端上手詔嘉納此據行已本傳不知端的月日且附行已歸朝堂三班後王安石熙寧六年四月一日日録載行已不欲復鄉弓手與本傳特異行已舊傳亦同新傳不知史官何故略不參照日録當是日録不可信也皇城使端州刺史帶御器械同管勾外都水監丞提舉河北興修水利程昉領逹州團練使永靜軍判官林伸東光縣令張言舉各追一官勒停權發遣轉運副使陳知儉罰銅二十斤轉運判官黃好謙提舉河北東路常平趙稱前權發遣東路提點刑獄假繹各十斤初昉開葫蘆河引水入新開故道浸民田不可勝計詔河北東路轉運司遣官相視本志云葫蘆河本西山水自冀州新河鎮入深州武強縣與滹沱河合流其後變徙入於大河熙寧中程昉請開引水新河故道詔遣官按視云云不記是熙寧幾年按日録七年正月二十六日有韓宗師劾程昉事已附見本月日轉運司遣伸及言舉伸言舉奏新河身比舊河髙一丈以來致水逆行浸民田宋要録云知儉等憑之以奏詔昉具析昉反言引水通快官私船筏略無阻滯及滹沱河下尾河塘通濶三十餘步詔遣都水監丞劉璯黃御等與催綱李直躬考驗而璯等奏如昉言故昉遷官而絀伸言舉知儉稱好謙皆以憑伸等奏故罰之開河部役官吏仍令昉等第保明會要水利門七年十月十三日以皇城使端州刺史程昉遙領逹州團練使昉治滹沱河議者互出所見謂非利昉確不移既而水行人便之上嘉焉進官以賞之會要所書蓋專為昉道地與元祐史官不同當考元祐史官載伸等言致水逆行昉反言云云紹聖史官乃削去致字反字此可見其意也御史盛陶嘗論昉曰盛陶論奏程昉不得其時今附此更詳之陶以五年九月為御史八年閏四月罷昉挾第五掃塞決河之功專為己力假朝廷威勢恐動州縣故縱壕寨徒屬騷擾不法臣意其能為朝廷立事不無小害久之不敢輕言今聞昉所開共城縣御河頗廢人户水磑多用民力不見成功又議開泌河因察訪官案行始知不當漳河滹沱河之役臣不知用工幾何淤田若干即今通流與否而水占邢洺趙深祁之良田民頗咨怨王廣亷孔嗣宗錢協以至趙子幾皆有論列采之謡言至有魔王金塊之誚其姦欺之狀則聞多置撻口指決河所侵便為淤田其事勢之盛則舉官廢吏惟其所欲無恥之徒希合響附道路厨傳與國信同而監司不與焉至其悖慢豪橫則受聖旨者三受提點刑獄司牒者十二故有違拒朝廷假借任使惟以水政其如小人誤當賞擢驕暴自肆蓋其常態今昉故違制書已被勘劾雖該恩宥尚冀聖斷施行其他興作案近制開修河道之類若相度利害不實致沮廢功利枉用財力不以赦降去官原減乞先委官代還乃行案驗上曰王安石以昉知河事且欲任使開漳河七百萬工滹沱八九百萬工已議體量然朝廷訖不果根治也陶論昉不得其時今附昉領逹州團練使後近旨枉費不以赦原蓋是九月一日張琥奏案驗水利不實不當者果朱本云盛陶王廣廉孔嗣宗皆嘗論奏然朝廷皆不根治也其城屬衛州河北西路邢洺趙深並係西路丁丑詔中書檢正公事官自今員外郎依正提點刑獄例奏子孫賜檢正中書孔目房公事許安世權檢正中書禮房公事葉適家錢各百千以安世丁母憂適卒故也適事見六月二十一日河北西路察訪司言凖朝旨買飢民耕牛以備軍行輜重或候歲豐聽民間請買實為便利從之詔河北兩路察訪所至案視教閲義勇保甲有武藝出倫並第給例物如案視不及處委本司官或元分定監司提舉管勾官施行成都府路轉運司言本路年例移稅往别路逺倉輸納今歲災傷乞止應副利梓州一半估錢外餘正色乞權免支移詔免綿州秋稅其戎瀘龍劔州依例那移錢物以辦年計戊寅詔兩浙西路提舉司出米三萬石賑濟常潤州災傷庚辰遣太子中允檢正中書禮房公事曾伉察訪荆湖路常平等事伉辭不行以檢正户房公事蒲宗孟代之詔三司置會計司以宰臣韓絳提舉先是絳奏三司總天下財賦其出入之數並無總要考校盈虛之法欲選官置司以天下户口人丁稅賦及場務坑冶河渡房園之類租額年課及一路錢榖出入之數去其重復注籍歲比較增虧及其廢置各件錢物羡餘橫費等數或收多則尋究因依以當職之官能否為黜陟若支不足或有羡餘理當推移使有無相濟如此則國計大綱朝廷可以省察議論政事足寬民力仍乞臣絳提舉而三司使章惇亦言天下財賦帳籍汗漫無以察其耗登之數請選置才士刪修為䇿每年校其增虧以考驗諸路當職之官能否得以升黜故有是命絳傳云繼王安石之後請置局中書鈎考用度以均節邦計滯留多不決數月以疾辭新舊録並同當考八年九月庚午罷會計司京西南路流民置田買耕牛權免稅錢樞密院言在京并諸路新招兵南郊賞給恐難與舊人同例詔應降御札後招禁軍廂軍等賞給並給舊人之半詔提舉市易司歲舉京官五員知諫院鄧潤甫言聞開封府司軍巡院所禁罪人多久繫不決有自春夏迄今猶未豫奪詔開封府具析以聞權發遣三司使章惇言三司焚毁舊行公案全闕吏人帳司吏多乞選三十人分於逐案却撥三司善算吏還帳司詔差十五人又奏乞從臣委官及選檢法官一員同取索在省主行文籍逐一看詳素有令式者歸有司未有令式者立條例又奏乞三司僚屬從臣選舉外司之財三司總領如外司有不職不奉法者以時案舉並從之十一月戊戌實録又書三司言乞發運司市易財利並歸三司從之即此總領外司之財也今存此去彼辛已詔成都府路茶本錢令轉運司應副如不足即借兊提舉司坊場剩錢又不足即借常平錢令司農寺拘轄撥還詔開封府界諸縣災傷權住聚教保甲一年司農寺司乞發户長坊正其州縣坊郭稅賦苖役錢以鄰近主户三二十家排成甲次輪置甲頭催納一稅一替逐甲置牌籍姓名於替日自相交割縣毋得勾呼衙集役使除許催科外毋得别承文字違者許人告以違制論不以去官赦降原減從之八年閏四月乙已甲寅可考詔中書樞密院案河北被災至甚州軍文武官職事要切不可闕人管勾外餘相度裁省又詔淮南發運司歲嵗於兩浙所買紬絹許自來年以後於出産州軍置場和買或預給價錢毋得抑配民户上批宗室見補外官者皆非近制所當出之人宜依令宴例仍舊與南郊賞給詔義勇正身不許應募充役已應募者召人對替蘇州人初士堯言曹孝立乞修圍本州五縣田岸有害無利乞諸縣修三等田岸於春冬分兩畨修築詔轉運司相度利害以聞其後轉運副使張靚按孝立所議果非便其總役檢計官魏諤等並劾之孝立初見五年十一月癸未河北西路轉運司言自去秋至今年夏兩蠲稅及虧欠課利七十五萬緡已奉朝旨令三司指揮提舉河北糴便糧草李直躬輒移沿邉鈔與西路令商人入中糧二十萬石及賜內藏庫錢十萬緡緣本路連歲災歉乞更賜錢三十萬緡資助經費嚴約束東路依元定通融年額錢帛應副詔賜發運司市易務收管錢二十萬緡乙酉職方員外郎權發遣江淮發運副使公事張頡升一任時頡以秋運奏計至京上令具羅拯薛向等推恩例進呈舊例發運副使理三司副使資序者除天章閣待制時頡方權發遣又理通判資序故也上批今嵗江淮上供糧實至京師者比元額不及三分之一近又諸路屯兵歸倉計增廪給不少不預處置慮耗嵗額或致闕之宜督張頡奏事訖速還本任計置來年元額張頡附傳云為發運副使詣闕奏事六路財利蕃息頡不自言神考問其意對以不敢用是希賞具數奏上乞付中書以避臣下私有貢獻之嫌詔從之按上批今歲上供比元額不及三分之一則附傳所稱財利蕃息恐飾説也今不取詔管軍臣僚毋得通婚如未管軍前已為親屬者自陳丙戌詔三司借上供糧十萬石與淮南西路提舉常平司凖備出糴或借支用上批王安石生日可差入內東頭供奉官馮宗道依在外使相例取賜蓋特恩也熙寧六年王荆公初罷相以吏部尚書觀文殿學士知金陵薦呂惠卿為參政而去既而呂得君怙權慮荆公復進因郊禮進荆公為節度使平章事方進見上察見其情遽問曰王安石去不以罪何故用赦復官惠卿無以對明年復召荆公秉政而王呂益相失矣此據魏泰東軒録因安石依使相例且附此泰所聞或未必然當考詔大小使臣出官自今武舉使臣更不試䇿其乞試弓馬比元試增斗力方許試增橋道清塞雄勝指揮料錢滿三百已丑三司言知熙州王韶乞依沿邊和糴例以一分見錢九分西鈔别定價募蕃客中賣給鈔應副糴糧從之庚寅詔左班殿直雄州歸信容城縣尉臧景到任以來用心悉力職事幹辦可除閣門祗候就差知雄州歸信容城縣景前已見詔自今大使臣任路分都監知州軍以上合降差遣者除橫行使副以上及降州鈐轄之類審官無闕者並令樞密院量情罪差注餘並量所坐輕重取旨與本院差遣或送審官西院其小使臣特旨責降者凖此三司使章惇乞借內藏庫錢五百萬緡令市易司選能幹之人分往四路入中算請鹽引及乘賤計置糴買詔借二百萬緡知桂州劉彛言雍州溪洞積年水旱所欠稅米等乞援赦除放從之辛卯直舍人院同管勾國子監李定兼權判司農寺士辰中書條例司乞五路弓箭手寨户除防拓巡警及緩急邊事許一靣差撥外若修城池或和雇夫馬牛驢即申經略安撫鈐轄司指揮如敢别差倩及科配和雇不以正身家人並科違制之罪雖經赦降去官不原委按察官覺察及立賞許人告從之其夔州路義軍廣南槍手土丁洞丁湖南弩手福建鄉丁槍手凖此詔義勇保甲令三路提舉官詳定教閲武藝陳隊法權提點開封府界諸縣鎮公事蔡確言夏田災傷十分乞免來年春夫從之權淮南發運副使張頡乞今後使副只于真州本司連書發遣遇春運擁併即輪一員至揚楚泗州以來提舉催促部押末運入亰奏事從之詔應教閲諸軍人員有能部轄士卒比諸軍最整齊或嘗經驅使見其幹辦有膽略堪統領陳隊者在亰委殿前馬步軍司在外委都副總管安撫鈐轄知州路分都監保舉司奏樞密院類聚注籍遇須人驅䇿以舉主多者取旨勾抽驗問録用癸已天章閣待制同提舉在亰諸司庫務韓縝權知開封府工部郎中直集賢院新知邢州范純仁直龍圖閣權發遣慶州純仁過闕入覲上見之甚喜曰卿父在慶州甚有威名卿今繼之可謂世職也純仁頓首謝曰臣不肖何足以繼先臣但以陛下過聽誤使承乏耳上問曰卿兵法必精對曰臣素儒家未嘗學兵法又問卿縱不學兵法卿久隨侍在陜西必亦詳熟邊事對曰臣隨侍時年幼並不復記憶兼今日事體與昔時不同純仁度必有以開邊之説誤上者因進言臣不才陛下若使修繕城壘愛養百姓臣䇿疲駑不敢有辭若使臣開拓封疆侵攘強寇非臣所長願别擇才帥上諭曰以卿之才何所不能但不肯為朕悉心耳對曰臣子之於君父若有可展報效處殺身不避豈有不盡心力耶但陛下所責非臣所長不敢靣謾欺罔以對純仁辭益堅上卒不許詔賜淮南路常平米二萬石下淮南西路提舉司易飢民所掘蝗種又賜五萬石下河北東路提點刑獄司賑濟流民許出糶仍先於常平倉撥見錢賑濟粗色糧聽給價錢樞密直學士權知開封府孫永降授龍圖閣直學士罷知開封府侍御史知雜事張琥言永體問納免行錢利害不當也是月上以新定結隊法并賞罰格及置陳形勢等遣近侍李憲付鄜延帥趙卨俾講求推及諸路詔卨曰陳法之詳已令憲靣諭今所圖止是一小陳卿其從容折問憲必一一有説然置陳法度久失其傳今朕一旦據意所得率爾為法恐有未盡宜無避忌但具奏來繼又詔卨曰近令李憲齎新定結隊法并賞罰格付卿同詳議施行可否及因以團立將官更置陳法想卿必已深悉朝廷經畫之意如日近可以了當冝令李憲齎赴闕於是卨奏臣伏詳置陳之法以結隊為先按李靖法五十人為一隊每三人自相得意者結為一小隊合三小隊為一中隊合五中隊為一大隊餘押官隊頭副隊頭左右傔旗五人即充五十並相依陳凡諸隊頭與賊相殺左右傔旗急進相救若左右傔旗被賊纒繞以次行人進前相救其進救人又被賊纒繞以次後行人急須進救其前行人被賊後行人不救者押官隊頭即斬之今聖制每一大隊合五中隊五十人為之中隊合三小隊九人為之小隊合三人為之亦擇心意相得者又選壯勇善槍者一人為旗頭令自擇如已藝心相得者二人為左右傔次選勇悍者一人為引戰又選軍校一人執刀在後為擁隊凡隊內一人用命二人應援小隊用命中隊應援中隊用命大隊應援大隊用命小隊應援如逗撓觀望不即赴救致有陷失者本隊仰擁隊軍校次隊委本轄隊將審觀不救所由斬之其有不可救或赴救不及或自受敵體被重瘡但非可救者皆不坐其説雖與古同而用法尤為精密此蓋陛下天錫勇智不待學而能也然而議者謂四十五人而一長不若五人而一長之密且以五人而一長即五十人而十長也推之於百千萬則為長者多而統制不一也至如周制五人為伍屬之比長五伍為兩屬之閭胥四兩為卒屬之族師五卒為旅屬之黨正五旅為師屬之州長五師為軍屬之命卿此猶今之軍制百人為都五都為營五營為軍十軍為廂自廂都指揮使而下各有節級有員品亦昔之比長閭胥族師黨正之任也議者謂什伍之制於都法為便然都法恐非臨陳對敵決勝之術也况八陳之法久失其傳聖制煥然一新稽之前聞若合符節蓋法制一定易以致人敵好擊虛吾以虛形之敵好背實吾以實形之然而所擊者非其虛所背者非其實故逸能勞之飽能飢之安能動之此所謂致人而不致於人也臣誤蒙訓諭蚤暮以思偶有所見不敢不盡此據兵志第四卷十月事附見當考
