body:
  text: 續資治通鑑長編卷一百六十九宋李燾撰仁宗皇祐二年八月乙卯朔詔罷祀前一夕警場先是帝謂輔臣曰眀堂直端門而致齋於內奏嚴於外恐失靜恭之意下禮院議曰警場本古之鼓鼜所謂夜戒守鼓者也故王者師行吉行皆用之乘輿宿齋儀衛本緣祀事則警場亦因以警衆非徒取觀聽之盛若以奏嚴之音去眀堂近則請列於宣德門百步外俟行禮時罷奏一嚴亦足以虔恭祀事帝曰既不可廢則祀前一夕邇於接神宜罷之丁巳再降知亳州建武節度使郭承祐為許州部署承祐既落宣徽使言者謂不當更令知亳州故再降之戊午録權雍州同巡檢右侍禁李江子得用為三班借職以江與蠻賊戰沒也己未禮部員外郎兼侍御史知雜事何郯為吏部員外郎直龍圖閣知漢州郯以母老請之將行上疏曰臣伏見三司使禮部侍郎張堯佐慶厯三年冬從開州來是時猶作南宫散郎自頃至今不五六年間遂歷盡要近乃尹京邑乃司計籍緣堯佐雖由進士登第歷官無他過然驟被寵用人情皆以止緣後宫之親不復以才能許之况三司使位望任使為二府之亞跂步便至今堯佐充三司使已踰年若大饗訖事衆議謂陛下以酬勞為名必當進用堯佐在兩府果如衆議命行之日言事之臣必以死爭當是之時陛下欲決用堯佐則當黜言者若聽用言者即須罷堯佐酌之兩途必難並立然用堯佐而黜言者則纍德聽言者而罷堯佐則傷恩纍德則損歸聖躬傷恩則怨起近戚欲聖躬無所損外戚無所怨莫若富貴堯佐而不假之以權如李用和處之正得宜也前古外戚成敗之間其鑒不逺崇寵過當則不免禍咎抑損得所則必能安全禍咎安全不惟其家繫之抑亦國隨而興衰也此書傳所載不可悉數陛下聰眀固宜監觀往事以為社稷之計前嵗陛下備禮册命貴妃外廷紛紜已有物議然臣當時未嘗論列者蓋以天子列嬪妃之位眀著典章若不干預政事置亦無害今用堯佐至三司使已是預政事况欲進處二府則天下之議當以為如何堯佐進用與否固亦未測陛下之意然而已進用而後言縱能追罷在人臣頗獲直名於陛下已損盛德固莫若先事而言冀陛下審處其事使無過差則君臣上下之道兩得之矣臣以言責在陛下左右周旋四五年但事干朝廷大體及大姦大蠧無不論列蒙陛下多賜採納今以親老方將外補唯於堯佐一事心知不可而遂不建一言則異時臣負懷情不盡之責故於將行不敢默默而復布腹心焉伏望陛下幸採臣章俯從公論不徇一時之愛以全千古之名則雖盡南山之竹不足載德美之盛與夫寵一人而失天下之心者不同日而論也又言臣伏見朝廷以文武官入流無限審官三班院流內銓皆除注不行故嘗詔羣臣博講利害以求省官之䇿今選人改官已增立年考胥史出職又議塞他岐唯貴勢奏薦子弟不加裁損則除弊之源有所未盡臣檢會文武臣僚奏薦親屬條制文臣自御史知雜已上武臣自閣門使已上每嵗遇乾元節得奏親屬一人諸路轉運使提點刑獄三司判官開封府判官推官郎中至帶館職員外郎諸司使至副使遇郊禋得奏親屬一人總計員數自公卿下至庶官子弟以廕得官及他橫恩每三年為率不減千餘人舊制雖以服紀親踈等降推恩然未立年月逺近為限所以恩例頻數臣僚廕盡近親外多及疏屬遂致入仕之門不知紀極漢法保任唐制資廕本只及子孫他親無預又不著為常例今本朝沛澤至廣人臣多繼世不絶恩固甚厚然事久則弊生亦當改張以救其失臣欲乞今後文武臣僚官序合每嵗遇乾元節得奏薦親屬之人除子孫依舊外期親候遇郊禋許奏一人其餘親屬再遇郊禋許奏一人其官序每遇郊禋得奏薦親屬之人除子孫依舊外期親候再遇郊禋許奏一人其餘親屬候三次遇郊禋許奏一人如此等級裁減一年內可省入官數十人積年而計所省漸多則仕路之冗不澄汰而自清矣朝廷嚮來已曾更改資廕條制然而親子孫亦以限年釐革是致人心嗟怨遂即復故臣今所請以奏薦疏數為等降皆緣人情蓋人情於近親則恩甚厚於疏屬則恩漸薄今既許近親依舊制其疏屬止以年月逺近為限不盡隔絶酌於衆心計亦無怨惟聖眀斷而行之則官濫之源庶或可塞其邊臣及路分合得恩例即乞仍舊如許施行乞候過今秋大饗後為始郯論恩澤等級不知何時皇祐四年九月釐革舊制其後遂罷聖節奏補或自此始也今附見俟考辛酉著作佐郎直集賢院同修起居注判都磨勘司吕溱為右正言何郯言溱未嘗磨勘特遷之癸亥出內藏庫絹一百萬下河北都轉運司權易大名府路安撫司封樁錢市糴軍儲仍遣權度支判官屯田員外郎董沔往計置之乙丑命開封府判官侍御史張中庸往中牟縣修疊汴河堤岸知杭州資政殿學士范仲淹奏建昌軍草澤李覯撰眀堂圖義覯能研精經訓會同大義按而視之可以興制今朝廷行此盛禮千載一辰而斯人之學上契聖作謹具録以進庶討論之際有所補助詔送兩制看詳稱其學業優博授試太學助教覯嘗舉茂材異等不中親老以教授自資學者常數十百人贈宣慶使入內都知麥允言為司徒又詔特給鹵薄丙寅福州草澤鄭叔豹上宗祀書三卷述眀堂制度及配饗冕服之義鄭叔豹當考不然削去丁卯以眀堂禮近罷秋宴龍神衛四廂都指揮使眉州防禦使李璋為起復雲麾將軍黔州觀察使步軍都虞候西上閣門使李珣領文州刺史濵州刺史駙馬都尉李瑋為起復雲麾將軍保州團練使璋辭不拜己巳詔水災州軍令逐路轉運司體量蠲減租稅以聞初鹵簿使言眀堂大饗用法駕之數減大駕三分之一得兵部狀大駕用萬有八千二百五十六人法駕減其一用萬有二千一百七十人檢大中祥符元年封禪法駕人數即用萬有一千六百六十一人本部今無法駕字圖故本又文牘散逸雖粗有此數較之禮令未能裁決望令禮官與兵部官同共詳定乃定法駕鹵簿當用萬有一千八十八人辛未鹵簿使上所定字圖詔可知諫院陳旭等言屯田員外郎睦親宅都教授阮逸嘗建言作錢葆飾以翠羽具藉以鹿皮欲與錢兼行且錢幣為用天下之大命也其輕重有權與物適均乃能下流而不窮昔張湯為漢武帝巧製皮幣取譏後世况逸之譎怪尤甚豈可用之聖世以開姦詐之心哉上然之丁丑詔立冬罷祭神州地祗初禮院以黑帝及神州地祗皆當合祭於眀堂請罷立冬之祭上以四時迎氣不可輟故止罷祭神州地祗庚辰命觀文殿學士兵部侍郎丁度為軒轅位獻官資政殿學士吏部侍郎王舉正為炎帝位獻官先是禮官言眀堂五帝及日月天皇北極既升祀於堂接皇帝親獻之位請差清望官為獻官上以軒轅聖祖之别號炎帝感生之帝配故命二府舊臣分獻之壬午工部郎中天章閣待制李柬之為契丹國母生辰使西京左藏庫副使李綬副之戶部員外郎兼御史知雜事臨潁李兊為契丹生辰使供備庫副使李賡副之鹽鐡判官司封員外郎崇文院檢討孫瑜為契丹國母正旦使閣門通事舍人王道恭副之司勳員外郎判三司開拆司膠水冦平為契丹正旦使內殿崇班閣門祇候鄭餘慶副之是月深州言大雨壞民廬舍九月丁亥帝服靴袍御崇政殿召近臣宗室館閣臺諌官閲雅樂自宫架登歌舞佾之奏凡九十一曲遍作之因出太宗皇帝琴阮譜及御撰眀堂樂曲音譜并按習大樂新録賜羣臣又出新制頌塤匏笙洞簫仍令登歌以八音諸器各奏一曲遂召鼓吹局按警場賜大樂鼓吹令丞至樂工徒吏緡錢有差帝既閲雅樂謂輔臣曰作樂崇德薦之上帝以配祖考今將有事於明堂然世鮮知音者其令太常益加講求辛卯詔眀堂禮畢並以襲衣金帶器幣鞍勒馬賜夏竦王德用程琳李昭亮將相在外遇大禮有賜自此始癸巳詔近臣宗室及館閣臺諫官三司開封府推官武臣刺史以上赴迎陽門觀先朝御書丙申詔太子太保致仕杜衍太子太傅致仕任布陪祀眀堂令應天府以禮敦遣仍於都亭驛錫慶院優備供帳几杖待其至衍手疏以疾辭布將就道始辭以疾並遣中使齎賜醫藥庚子揭御篆眀堂二字飛白眀堂之門四字仍詔祠畢藏於宗正寺皇城司上新作文德殿門香檀魚契以左契留中右契付本司兵部員外郎知制誥嵇頴為翰林學士未及謝辛丑卒即其第賜告敕襲衣金帶鞍勒馬及眀堂賞物張貴妃之父堯封嘗從頴學所為文多納頴家及貴妃為修媛令其弟化基詣頴求編次堯封文藁為序以獻頴不答亦不以獻時積雨彌旬帝精禱禁中甲辰齋於文德殿天日澄霽人情胥悅己酉朝饗景靈宫庚戍饗太廟辛亥大饗天地於眀堂以太祖太宗真宗配從祀如圓丘大赦文武職官故分司致仕官並特與轉官內臣入仕及十年亦與遷改即不為永例詔內降指揮百司執奏毋輒行敢因緣干請者諌官御史察舉之初議肆赦帝謂輔臣曰卿等廣詢民間利病著為條目務從寬大以稱朕勤恤之意又曰比有貴戚近習夤緣請託以圖內降雖頗抑絶然未免時有侵撓可於赦文中嚴切禁止庶澄清宿弊示信天下輔臣對曰陛下躬行大祀以新庶政闢至公之路杜私謁之蹊實天下幸甚然載之赦條恐未盡聖意仍别為手詔與赦同降陳旭傳稱執奏內降由旭建請當考先是屯田員外郎廬陵彭思永入為侍御史極論內降之弊以為斜封非公朝所宜有及祀眀堂前一日有傳赦書百官皆遷官者思永從駕宿景靈宫亟上言不宜濫恩時張堯佐以親連宫掖驟進王守忠以出入禁闥被寵參知政事闕貟堯佐朝暮待命而守忠亦求為節度使思永欲率同列言之或曰宜待命行思永曰寧以先事得罪命出而不可救則為朝廷之失矣遂獨奏陛下覃此繆恩無意孤寒獨為堯佐守忠故取悅衆人爾且言外戚秉政宦官用事皆非宗社之福疏入上震怒詔詰思永安從得此諫官吳奎言御史許風聞事有非實朝廷能容容之不能容罪之可也若必窮主名則後無敢以事告御史者是朝廷自蔽耳目也中丞郭勸亦言思永納忠不宜深罪上寤不復致詰思永尋罷侍御史以司封員外郎知宣州而堯佐守忠之議遂格思永罷侍御史不得其時為司封員外郎乃十月丁卯也今附見此更須考之郭勸傳云祀眀堂將加中外官勸就齋次帥羣御史求對不許又極論之思永傳乃云思永獨奏或是思永獨奏堯佐守忠羣御史但泛論羣臣不當加官也今兩存之先是宣慶使遂州觀察使入內都知麥允言卒贈司徒安武節度使又詔允言有軍功特給鹵簿今後不得為例同知禮院司馬光言昔仲叔于奚有功於衛衛人使之繁纓以朝孔子曰惜也不如多與之邑惟器與名不可以假人夫爵位尊卑之謂名車服等威之謂器二者人主所以保畜其臣而安治其國家不可忽也今允言近習之臣非有元勳大勞過絶於人贈以三公之官給以一品鹵簿其為繁纓不亦大乎陛下雖欲寵秩其人而適足以增其罪纍也何則三公之官鼎足承君上應三台鹵簿者所以褒賞元功皆非近習之臣所當得者陛下念允言服勤左右生已極其富貴死又以三事之禮為之送終鼓吹簫鐃烜赫道路是則揚僣侈之罪使天下側目扼腕而疾之非所以為榮也惟陛下思仲叔于奚之傳垂意孔子之言則知名器之重不可加非其人况唐制羣臣於國立大功者婚葬則給鹵簿餘不在給限伏望陛下追寢前命其麥允言更不給鹵簿無使天下之人竊敢指目以為朝廷過舉不勝幸甚據會要允言以八月贈官司馬光奏不當給鹵簿在九月十四日今附九月末光奏之從否當考冬十月丙辰宰臣文彥博加禮部尚書宋庠加工部尚書樞密使王貽永加鎮海節度使進封鄧國公河陽三城節度使兼侍中英國公夏竦為武寧節度使進封鄭國公保靜節度使同平章事判澶州王德用為集慶節度使封冀國公武昌節度使同平章事判大名府程琳為武勝節度使檢校太尉寧江節度使同平章事汝南郡王允讓為平江節度使兼侍中武康節度使北海郡王允弼為寧國節度使同平章事安德節度使華原郡王允良為鎮江節度使同平章事樞密使龎籍參知政事髙若訥並加戶部侍郎樞密副使梁適加給事中初議覃恩髙若訥謂文彥博曰官濫久矣未有以節止今又啓之何也彥博不聽若訥卒亦以恩遷官癸亥景福殿使武信留後入內都知王守忠為延福宫使入內都都知實録但云都知本傳云都都知按守忠慶厯元年六月已為都知此必遷都都知實録偶脫爾當更考詳甲子宗室八十七人並遷官舊制金吾衛大將軍在左右衛大將軍之上今有自金吾遷左右衛者蓋中書失之也兄十一弟六姪五十一孫十九人數更須詳考丙寅大宴集英殿以眀堂禮成飲福也辛未詔宰臣文彥博宋庠參知政事髙若訥史館檢討王洙編修大饗眀堂記乙亥燕京畿父老一百五十人於錫慶院是月美人楊氏為婕妤景祐初聽入道居瑤華宫至是復進位號詔自今諸處毋得申奏及發遣念書童子赴闕寶元元年六月可考十一月乙酉召太子中舍致仕胡瑗赴大樂所同定鐘磬制度先是親閲大樂而言者以為鎛鐘特磬大小與古制度未合詔令改作而太常言瑗素曉音律故召之瑗本傳云并召阮逸實録無之案逸此時實教授睦親宅當考會要九月五日詔鎛鐘特磬未叶音律令鄧保信阮逸盧昭序同太常寺檢詳典禮别行鑄造而實録無此丙戌詔河東秋稼大豐其令三司廣糴邊儲戊子命權御史中丞郭勸天章閣待制知諫院包拯放天下欠負壬辰賜淮南江浙荆湖制置發運使金部員外郎許元進士出身上嘗謂執政曰發運使總領六路八十八州軍之廣其財貨調用幣帛穀粟嵗千百萬宜得其人而久任之今許元纍上章求解朕思之不若奬勵以盡其才故特有是賜丁酉邇英閣講易無妄卦帝曰無妄之疾何云勿藥有喜楊安國對曰凡疾之所起由有妄而來九五居尊得位為無妄之主天下皆無妄而偶有疾非己所致病當自損可勿藥而有喜也若人主剛正自修身無虛妄而偶有災若堯湯水旱非己所招但順時修德勿須治理必欲除去不煩勞天下是有喜也然堯遭洪水使鯀禹治之雖知災未可息且順民心鯀功不成者災未息也禹能治水者災欲盡也是亦勿藥有喜之義也今河水圮決歷五十年役天下兵民耗天下財用未嘗息大河亦未嘗復故道也而兵民頓弊何啻百千萬計地財委盡何啻億萬萬計恐民不堪命國力不繼臣以為大河圯決自古為患當如堯舜務順民心順時修德其災自息亦勿藥有喜也戊戌給事中權御史中丞郭勸罷為翰林侍讀學士勸初就眀堂齋次帥衆御史求對論羣臣不當遷官不許乃上疏極言之訖不從於是以老求解臺任許之召樞密直學士給事中知益州田况權御史中丞况未至又命勸管勾御史臺事管臺事在二十四日丁未今并書勸以老求罷據御史臺記益州自李順王均再亂人心易搖守得便宜從事多擅殺以為威雖小罪猶并妻子徙出蜀至有流離死道路者况在蜀逾二年拊循教誨非有甚惡不使東遷蜀人尤愛之以繼張詠王安石志况墓云蜀人以况繼張詠又謂况所斷治為未嘗有誤今從本傳削此等語庚子徙知徐州工部郎中王逵為淮南轉運使諫官包拯言按王逵纍任荆湖南北路江南西路轉運使並所為慘虐黜降差遣昨任河東轉運使放恣愈甚於前未幾降知光州又改今任雖該霈澤棄瑕録用然慘暴之性難以悛改凡所行事布在朝列無不具知固非曖昧且陛下軫恤生靈惟恐不及豈忍以一方民吏俾王逵殘害伏望聖慈特追寢前命且令依舊知徐州不報拯又與陳旭吳奎相繼論列凡五奏訖不報是月詔觀察使已上自今依大兩省待制例經兩次郊禮許一次將弟姪子孫恩澤奏補異姓骨肉此據會要閏十一月丙辰出內藏庫緡錢四十萬紬絹六十萬下河北便糴糧草先是河北頻年水災朝廷蠲民稅幾盡至秋禾稼將登而鎮定復大水緣邉尤被其害上憂軍儲不給故特出內府錢帛以助之丁巳內出手詔朕聞古者作樂本以薦上帝配祖考三五之盛不相沿襲然必太平始克眀備周武受命至成王時始大合樂漢初亦沿舊樂至武帝時始定泰一后土樂詩光武中興至眀帝時始改大豫之名唐髙祖造邦至太宗時祖孝孫考定鍾律眀皇方成唐樂是知經啓善述禮樂重事須三四世聲文乃定國初亦循用王朴竇儼所定周樂太祖患其聲髙遂令和峴減下一律真宗始議隨月轉律之法屢加按核然念樂經久墜學士罕專歷古研覃亦未究緒頃博加訪求終未有知聲知經可信之人嘗為改更未適兹意宜委中書門下集兩制及太常禮樂官將天地五方神州日月宗廟社蠟祭享所用登歌宫縣審定聲律是非按古合今調譜中和使經久可用以發祖宗之功德朕何憚改為但審聲驗書二學鮮並互詆胸臆無所援據慨然希古靡忘於懷於是中書門下集兩制太常官置局於祕閣詳定大樂翰林學士承旨王堯臣等言天章閣待制趙師民博通古今願令預詳定及乞借參知政事髙若訥所校十五等古尺並從之置局乃丁卯日堯臣上言乃庚午日今從本志並書不出其日戊午河南府言前觀文殿學士尚書左丞張觀卒贈吏部尚書諡文孝觀初為祕書郎其父居業從事方州因上言願以官授父真宗嘉之以居業為京官及觀貴居業由恩至太府卿嘗過洛嘉其山川風物曰吾得老於此足矣觀於是買田宅營林榭以適其意觀蚤起奉藥膳然後出視事未嘗一日易也居喪哀毁過人既練而卒己未三司使戶部侍郎張堯佐為宣徽南院使淮康節度使景靈宫使資政殿學士尚書左丞王舉正本官兼御史中丞改命田况為樞密直學士權三司使是日詔后妃之家毋得除二府職任此據本紀庚申又加張堯佐同羣牧制置使辛酉賜貴妃張氏從弟衛尉寺丞希甫太常寺太祝及甫並進士出身堯佐之子也賜汴河治堰卒緡錢是夜秀州地震有聲如雷自西北起癸亥知諫院包拯等言陛下即位僅三十年奉承祖宗謨訓未有失道敗德之事陛下固知之乃五六年超擢張堯佐羣臣皆竊議於下然而迹其過不在陛下在女謁近習及執政大臣也何以言之蓋女謁近習動伺陛下之所為知陛下繼嗣未立而有所私莫不潛有趨嚮而附結之執政大臣不思規陛下以大誼乃從諛順指髙官要職惟恐堯佐不滿其意使陛下有私昵後宫之過此豈愛君之心哉且以本朝故事言之昭憲皇太后誕生祖宗有基命之烈其諸弟杜審肇輩窮老才有一得節度使者雷有終以工部侍郎討平西川得宣徽使李至於先朝有東宫之舊自工部尚書參知政事裁用為武勝軍節度使錢若水任樞密副使李士衡以尚書左丞為三司使以及陛下之朝李維為翰林學士承旨刑部尚書陳堯咨為翰林學士知開封府並止換觀察使夏竦歷兩府自三司使戶部尚書止得散節度使後二年方加宣徽使鄭戬亦曽任樞密副使以資政殿大學士知并州後方得宣徽使又一年乃除節度使今堯佐謂之親孰若杜審肇兄弟乎謂之賢而功孰若雷有終李至錢若水乎而宣徽節度使并以與之若非內外協應蒙惑攘竊寧至此哉堯佐叨據如此慙羞不知真清朝之穢汚白晝之魑魅也况下制之日陽精暗塞天道固於人事不逺伏望陛下斷以大義稍割愛情追寢堯佐過越之恩必不得已宣徽節度使擇與其一仍罷羣牧制置使之命畀之外郡以安全之如此則仰合天意俯順人情而重新盛德矣初執政希上旨一日除堯佐四使又以王舉正重厚寡言同日授御史中丞朝議意舉正儒懦或迤邐退避動經浹旬則堯佐之命必遂行論諫弗及矣甲子舉正遂告謝上殿力言擢用堯佐不當其疏曰臣伏覩張堯佐優異之恩無有其比均以堯佐素乏材能徒以夤緣後宫僥幸驟進國家計府須材以辦經費堯佐猥尸其職中外咸謂非據近者臺諫繼有論列陛下雖罷其使任而復加崇寵轉踰於前併授四使又賜二子科名賢愚一詞無不嗟駭夫爵賞名數天下之公器不當以後宫踈戚庸常之材過授寵渥使忠臣義士無所激勸且堯佐居職物論紛紜固當引分辭避而晏然恃賴曽無一言自陳叨竊居位日覬大用及異恩既出復託以假告未祗受其意尚若不足繼有邀求不虔君命莫甚於此者昔漢元帝馮野王以昭儀之兄在位多舉其行能帝曰吾用野王後世必謂我私後宫親戚本朝太宗皇帝孫妃之父止授南班散秩蓋保全後宫戚屬不令事勢僣盛以取顛覆伏望陛下逺鑒前古美事近守太宗皇帝聖範追取堯佐新命除與一郡以息中外之議伏以陛下自臨御已來孜孜勤政無有失德今忽行此事有損聖眀若濫賞必行則朝綱威柄由此遂紊四方駭任人之失三鄙萌輕國之心臣方叨司憲適覩除命事干國體不敢緘默望聖慈開納速降指揮或臣言之不行即乞罷臣憲司出補逺郡疏入不報戊辰朝退舉正留百官班廷諍復率殿中侍御史張擇行唐介及諫官包拯吳奎於上前極言且於殿廡切責宰相上聞之遣中使諭旨百官乃退唐介傳云堯佐一日除四使介與諫官包拯等七人力爭又請中丞王舉正留百官班卒奪堯佐三使所稱七人蓋中丞王舉正殿中張擇行唐介諌官包拯陳旭吳奎餘一人未詳時李兊實為知雜御史而兊本傳不載兊嘗有言當考陳又張耒眀道雜志云嘉祐中嘗欲除張堯佐節度使秀公作中丞與全臺上殿爭之仁宗初盛怒迎謂之曰豈欲論張堯佐乎節度使粗官何用爭唐質肅公作御史裏行最在衆人後越次而前曰節度使太祖太宗皆曽為之恐非粗官上竦然而堯佐之命竟罷陳升之此時作左司諌不為中丞唐介實為殿中侍御史裏行張堯佐卒除節度使初除又不在嘉祐間耒所志差誤今不取熊克九朝通略據是時乃王舉正為中丞堯佐罷宣徽景靈二使而節鉞如舊雜志誤也己巳詔近臺諫官纍乞罷張堯佐三司使及言親連宫掖不可用為執政之臣若優與官爵於體差便遂除宣徽使淮康節度使兼已指揮自今后妃之家毋得除兩府職任今臺諌官重有章疏其言反覆及進對之際失於喧譁在法當黜朝廷特示含容其令中書取戒厲自今臺諌官相率上殿並先申中書取旨時上怒未解大臣莫敢言樞密副使梁適獨進曰臺諫官蓋有言責其言雖過惟陛下矜察然寵堯佐太厚恐非所以全之是日堯佐亦奏辭宣徽使景靈宫使乃詔學士院貼麻處分而取戒厲卒不行中書取戒厲據梁適本傳及王圭所作適墓志今正史並改作戒諭雖稍文然恐失事實今特存本語詔諸路走馬承受如擘劃過邊上利便事件不得理為勞績仍令入內內侍省選差亷謹穩當之人兼不許指射會要閏十一月二十六日事十二月甲申朔詔班三品以上家廟之制初宰臣宋庠言慶厯元年赦書許文武官立家廟而有司終不能推述先典因循顧望使王公薦享下同委巷衣冠昭穆雜用家人緣偷襲弊甚可嗟也臣嘗因進對屢聞聖言謂諸臣專殖第産不立私廟寧朝廷勸戒有所未孚將風教頽陵終不可復睿心至意形於歎息臣每求諸臣所以未即建立者誠亦有由蓋古今異儀封爵殊制因疑成憚遂格詔書禮官既不講求私家何緣擅立且未信而望誠者上難必責徒善而設教者下或有違若欲必如三代有冡嫡世封之重山川國邑之常然後議之則墜典無可復之期夫建宗祏序昭穆别貴賤之等所以為孝雖有過差是過於為孝殖産利營居室遺子孫之業與民爭利顧不以為恥逮立廟則曰不敢寧所謂敢於爭利而不敢於為孝也以爵服承襲之間小違古因放而不復又所謂去小違古而就大違古也諸儒之惑不亦甚乎乃下兩制與禮官詳定審度而翰林學士承旨王堯臣等定議官正二品平章事以上立四廟樞密使知樞密院參知政事樞密副使同知樞密簽書院事見任前任同宣徽使尚書節度使東宫少保以上皆立三廟餘官祭於寢凡得立廟者許嫡子孫襲爵世降一等死即不得作主祔廟别祭於寢自當立廟者即祔其主其子孫承代不許廟祭寢祭並以世數親疏遷祧始得立廟者不祧以比始封有不祧者通祭四廟三廟廟因衆子立而嫡長子在則祭以嫡長子主之嫡長子死即不傳其子而傳立廟者之子凡立廟聽於京師或所居州縣其在京師者不得於裏城及南郊御路之側既如奏仍别議襲爵之制其後終以有廟者之子孫或官微不可以承祭又朝廷難盡推襲爵之恩遂不果行戊子遣官祈雪己丑詔知制誥曽公亮李絢看詳諸州軍編配罪人元犯情理輕重以聞初戎州人向吉等操兵賈販恃其衆所過不輸物稅州縣捕逐皆散走成都鈐轄司奏請不以南郊赦除其罪從之逮捕親屬繫獄至更兩赦有詣闕訴者刑部詳覆官以為特敕遇赦不原者雖數赦猶論如法同判刑部孫錫獨奏釋之凡釋百二十三人舊制判刑部者多持事往決於中書錫獨不往視法何如耳錫真州人也孫錫事據王安石墓志附見錫先見慶厯八年甲午知制誥胡宿言事神保民莫先祭祀比年以來水旱相仍竊意有所未至也望令天下具名山大川能興雲雨者增秩之春秋以時禱祀詔可戊戌邈川首領保順西河等軍節度使嘉勒斯賚遣使來貢方物丙午雪丁未遣官謝雪賜念書童子曾天麟等四人出身戊申契丹國母遣崇儀節度使蕭槩四方館使榆州團練使劉從正契丹遣昭德節度使耶律素太常少卿李韓等來賀正旦是嵗天下上戶部主戶六百九十一萬二千九百九十七口一千五百四十九萬三千五百四十一客戶三百八十三萬四千九百五十七口六百五十六萬四千一百二十一
