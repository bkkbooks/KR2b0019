body:
  text: 續資治通鑑長編卷一百五十宋李燾撰仁宗慶厯四年六月辛卯朔輔臣列奏答手詔所問曰臣等各䝉奬用待罪二府不能燮理彌縫致化天下過煩聖慮特降德音上以宗廟為憂下以生靈為念臣等不任慙恐戰汗死罪詔㫖謂合用何人鎮彼西方臣等思之今元昊遣人到闕名體稍順其如戎人難信止可權宜如翻覆未寧則當擇節制之帥若和好且合亦須藉鎮撫之才經度邊陲以防來患見選人具名聞奏次詔㫖謂民困敝財賦未强臣等議之國家革五代諸侯之暴奪其威權以度支財用自贍天下之兵嵗月既深賦斂日重邊事一聳調率百端民力愈削水旱無備稅賦不登減放之數動踰百萬今方選舉良吏務本安民修水旱之防收天地之利而更嚴著勉農之令使天下官吏専於勸課百姓勤於稼穡數年間大利可見又山海之貨本無窮竭但國家輕變其法深取於人商賈不通財用自困今須朝廷集議從長改革使天下之財通濟無滯又減省冗兵量入以出則富强之期庶有望矣詔㫖謂軍馬尚多何得精當近韓琦范仲淹所上備邊文字內有河北六事陜西七事精擇兵馬及攻守之策已在其中臣等見商量施行次詔㫖謂將臣不和如制置樞密院先因許懷德張亢不協曽指揮戒勵然將佐之中性情不類愛惡相攻全在主帥别白撫遏隨在任用使各得其所則怨惡不生故長帥之才不敢輕易選用詔㫖謂躁進之徒宜塞奔競臣等謂躁進懷貪之人何代無之由朝廷辨明而進退之如責人實效旌人靜節貪冒者廢之趨附者抑之如此則多士知勸各生亷讓之心韓琦仲淹又奏陜西河北畫一利害事陜西八事一相度緣邊城寨未堅牢處更加修完二陜西諸州土兵內招願守寨者移為邊兵三新刺保捷土兵內有尫弱不堪戰陳者減放歸農四移減東兵入次邊州軍駐泊以就糧草有事冝則勾赴邊上五緣邊弓箭手逐一兩指揮各築堡子居住六逐路差人密切先相度下山川要害可控扼處并可伏兵之處七逐路各選將佐三五人使臣一二十人步兵二萬騎兵三千以備攻戰八相度下橫山一帶要害之地如進兵攻討則據險修寨以奪其地就降其衆河北五事一遣才臣權領河北轉運使密令經度邊事二再議河北三路合屯兵去處三委樞密院於閣門祗候以上選人三班院於使臣中選人逐十日或一月具選人數進呈四於陜西抽戰隊使臣十數人授以新議八陳之法教習諸軍五河北州縣専選知州知縣縣令可以治兵者教習技勇并增置將校已而仲淹又奏臣近與韓琦上言陜西邊畫略陳八事須朝廷遣使便宜處置方可辦集又近覩手詔下問合用何人鎮彼西方兩府已奏見選人進呈次今西人議和變詐難信成與不成大須防將來之患臣久居邊塞下誠無寸功如言鎮彼西方保於無事則臣不敢當但稍知邊情願在驅策雖無竒效可平大患惟期夙夜經畫措置兵馬財賦及指縱諸將同心協力以禦深入之虞今防秋事近恐失於後時願聖慈早賜指揮罷臣參知政事知邉上一郡帶安撫之名足以照管邊事乞更不帶招討都署職任改延州龍口平寨為龍安寨仍賜修寨禁卒緡錢先是鄜延都監周美破賊於無定河乘勝至綏州殺其酋豪焚廬帳獲牛羊馬駝器械三百計因城龍口平寨賊以精騎數千來襲美從百餘騎馳擊破之加本路鈐轄此據周美傳附見然龎籍傳云使王信築龍安寨已附慶歷二年四月戊子而王信傳亦略無龍安築寨事不知何也當考壬辰録散直李慶子忠為下班殿侍以慶與淯井監蠻賊戰沒也置均房州通判各一員丁酉降敕榜下知潭州劉沆招諭桂陽監蠻賊有來首身者並與等第推恩㑹要出師篇即此後書招到二千餘人蓋聯書之也今依實録仍見十月戊戍諫官余靖言元昊遣人求和皆出契丹之意我之言議動息彼必皆知伏緣景德中契丹舉國興師深入先帝與之對壘河上矢及乘輿天下安危在於刻漏止以三十萬物與之通和今元昊戰雖屢勝皆由將帥輕敵易動故為邊鄙之憂數年選將練兵始知守戰之備而鋭意解讐與物遂至二十六萬彼若不允豈可更添且夫戎事有機國力有限失之於始雖悔何追竊以景德之患繫安危於頃刻而物數如彼今日之患逺在邊鄙之外而物數如此臣雖愚賤深所恥之且元昊之書其名雖順其詞甚悖自言通和之事非其本心今雖與物更多邊亭豈敢撤備又况契丹之力能制元昊聞其得物之數寧不生心無厭之求終難應副若移西而備北為禍更深伏乞朝廷極慮商量必令輕重得所事有形比須索隄防元昊凡所過求不冝盡許一啓其源塞之實難惟察利害而審計之但思和與不和皆有後患則不必曲意從之以貽國羞靖又言風聞楊守素等進狀乞早回本國未聞朝廷指揮者臣竊以和好之謀可否之報在於元昊不在行人守素等雖有商量之名必然未肯與奪今若不早發遣切恐别起怨詞計元昊外則貌從契丹內則貪我金帛然其凶狠必非實誠蓋緣出師以來未曾挫衄勢猶大盛心亦無厭此去和與未和必是大舉兵甲羌人之性翻覆勝則驕慢敗遂來歸此皆常情所知也臣以為今之計者莫若許其嵗物定數及和市之限謂言國家各守境界兩不相侵君臣如初無復疑二已敕邊守專待使來如此處置不必守素等肯與不肯也臣又恐二國之好因守素而成北敵邀功勢不可抑况梁適失詞北人徯望已久事成而謝之亦有害事成而不報亦有害謝之之害小而不報之害大此又將來之患也若幸而元昊未滿其意則我或小勝彼當自來儻逗遛行人待其詞服雖得要約未可信也其尹洙與楊守素等伏乞早賜發遣靖此奏不知幾日今附見癸卯改新知渭州孫沔復知慶州新知慶州尹洙知晉州始朝廷欲卒城水洛故令洙與沔易任沔以病辭乃别徙洙於是渭州闕守詔委狄青諫官余靖言涇原在陜西最為重地自范仲淹不敢獨當豈青粗暴所能專任章凡四上其一曰靖論青武人使獨守渭州恐敗邊事本傳有之六章據靖諫草本傳實録俱無有二章别論水洛四章乃專論青領渭州臣竊以朝廷所以威天下者刑賞二柄而已聖人不妄賞人亦不妄罰人若夫同罪異罰者明主之所不取也今狄青尹洙皆坐不合枷勘劉滬爭修水洛城事而洙罷路分青領州任非唯賞罰不明兼亦措置失所臣請别白言之始者朝廷以狄青尹洙雖傷於猝暴不合枷勘滬等又緣是朝㫖不令修城兼恐抑挫帥臣之威遂移尹洙别路狄青當路歐陽修四月二十六日丙辰疏云移尹洙而不動狄青即靖所謂當路但不知是何職任今既不令獨守渭州必自此徙并代也部移狄青當路未詳八月十六日乙巳狄青以權并代署復為涇原部署不知何日權并代部署或在欲令獨守渭州後此蓋朝廷愛惜帥臣之本意今來只因孫沔稱病便忘却舊來商量同罪異罰之外狄青更䝉升用其不可者六焉臣以為當今天下之官最難其才者唯是陜西四路之中當賊衝而民户殘破軍中氣索涇原最甚當擇天下才智第一授以涇原軍民之政今付狄青剛悍之夫不可者一也朝廷自來以武人粗暴恐其臨事不至精詳故令文臣鎮撫専其進止今狄青不思舊來制御之意不可者二也初緣狄青出自行間名為拳勇從來逢大敵未立竒功朝廷奬用太過羣心未服今専使統一路兵馬必無兼才壓服其下且以尹洙之才與相佐尚猶如此若獨任剛狷之人衆所未服必致敗事不可者三也本來選用狄青謂其剛果堪為鬬將令兼知渭州且夫知將以城守為能鬬將以野戰為勇各有以撫軍民今來狄青出戰則須别得守城守城則當求知將豈此一夫所能兼之其不可者四也昨日狄青尹洙同枷勘劉滬朝廷嫌其率暴故移尹洙慶州今洙當降罷而青得進用乃是朝廷専罪尹洙且狄青粗率武人豈得全無血氣枷送滬等未必盡由尹洙歸罪於洙事未明白不可者五也凡暴貴之人不能無驕狄青拔自行伍位至將帥粗豪之氣固已顯露只如昨夾朝廷所差醫官身帶京職青以一怒之忿便行鞭撲如此恣意豈是尹洙所使朝廷歸罪於人亦須察訪其實不可者六也且慶州極邊帥府非養病之地伏乞朝廷别選才智之人以守渭州兼進止一路兵馬専委狄青鬬將之事其孫沔儻或不病則當發遣赴任渭州如實有病即召歸京師診理所以示朝廷憂邊謹罰之意又言臣近奏狄青知渭州尹洙知晉州不協物議未䝉朝㫖者臣竊謂若非大臣全無憂邊之心即是微臣當坐罔上之罪二者之間必有一焉臣伏思陜西四路惟涇原山川寬平易為衝突若戎馬之勢不遏則為關中之憂關中震驚則天下之憂也故國家自有西事以來長以涇原為統帥之府前嵗葛懷敏喪敗之後朝廷欲差范仲淹往彼完緝尚先遣中使諭意其時仲淹不敢獨當此任乞差韓琦同往朝廷委韓琦范仲淹同共經略又差張亢知渭州狄青同為一路部署琦等雖名四路招討其實只是營度涇原亢領州寄青為鬬將即是朝廷憂涇原如此之深也及至去年詔琦仲淹赴闕又令中使問仲淹何人可以為代於是差鄭戬替韓琦仲淹充四路招討尹洙代張亢之渭州至秋又差韓琦田况往彼宣撫則固知朝廷未嘗忘涇原也今年已罷鄭戬歸永興又移尹洙知晉州遂令狄青一身兼領三人職事且范仲淹號為最曉邊事不敢獨當孫沔亦是朝廷精選而託疾不行是涇原有可憂之勢豈青匹夫獨能當之仲淹豈忘之乎大臣必謂韓琦仲淹二年涇原成規可守故専任狄青足以了事臣實以為不然伏自懷敏覆沒之後兵氣沮喪未有小勝百姓遭劫掠之餘雖或歸復而生業未備幸賊未至而謂完實議和未定而早解怠抽減將帥軍民之心尚何所望而敢自安乎且向來於生户界中修一城寨尚有劫奪殺傷不能相保賊馬若至誰復安心是大臣全無憂邊之心明矣初緣昨者狄青尹洙倉猝行事上煩朝廷臣竊料朝廷之意謂此二人偏見之情以相唱和故換孫沔在青之上欲令庶事在所商量今來只因孫沔稱病遂以涇原一路兵馬専令狄青進止豈天下之廣更無一竒才可以知渭州與青共事者是大臣不思之甚也况始因行事猝暴朝廷不欲問罪遂得専兵柄不知是何賞罰且緣青驟自行間未著大功䝉恩超擢又其為性率暴鄙吝偏禆不服所以劉滬敢罵尹洙乳臭狄青一介耳今來以青獨當一路豈不憂偏禆不服而敗國家之事雖傳聞仲淹請行若朝廷從之不過涇州駐劄以制大節須别得渭州知州與青緩急商量戰守之勢又况龎籍守延猶與王信等同事今來反不及青獨任最難一路無乃籍等羞與為伍以懷怨望乎朝廷乏賢一至於此伏乞陛下詢問大臣如或將來賊馬衝突涇原狄青果能保必勝之勢不貽朝廷之憂則臣甘先就誅竄以當罔上之罪又言臣纍具奏陳為狄青兼知渭州不當未䝉朝㫖聽從者此蓋兩府大臣不顧社稷利害唯要遂非行事伏緣西賊僭叛以來涇原屢遭侵擾任福敗於好水葛懷敏敗於定川關中震驚君臣旰食臣謂朝廷當極選文武才傑共守邊疆為謀未周聞諫不聽豈非不顧社稷利害乎涇原利害屈指可計且范仲淹前嵗被差之日必得韓琦然後同行今日預政之謀未為憂國同此議者亦當審細臣料大臣强為其說其詞有二其一謂當今文臣無可差其二謂自來武臣在邊多被文臣掣肘不若専委武臣責其成功此皆護短之說本非通論當今天下之大峩冠委佩出入朝廷列侍從者駕肩疉跡及求一邊郡知州則不能得之此執政者進賢之失也求一士而分其任縱無竒才比於専委一夫不猶愈乎况好水之敗韓琦等為招討使定川之敗王㳂為都部署皆號本朝精選尚猶不免喪師豈可狄青獨能了乎又武臣在邊文臣掣肘之議本為不近人情且琦仲淹等領兵之日自謂安邊之謀臣及其歸朝遂生掣肘之謬論若如此說則龎籍文彥博孫沔盡可罷去矣竊觀狄青所為若其决醫官擒劉滬皆驕滿之至豈能獨統其衆乎且水洛垂成而急捕劉滬致劫掠傷殺之患取笑敵人將帥之才於此見矣况朝廷特差魚周詢等前去體量得有過又䝉進用朝廷之令於何取信勿謂楊守素等來此講和便言邊鄙不足憂者今春張廷夀去後兵臨秦州平川熟户一千餘帳掃地皆盡城中震恐邊臣不以實聞此則目前之禍不必引古為證伏乞早賜選差忠勤才略之臣以知渭州如臣言無可采則乞還舊官臣之分也若謂已行之命難為改易則朝廷今後一切特行何用諫諍又與同列言臣等各三上劄子論列狄青等差遣不當事今聞大臣堅執不肯改更臣等近共論岑守素狄青二事守素是陛下左右之人只是才罷皇城司未當再任陛下要命令必行立改差命其狄青本因有過當行責降朝廷惜邊將事體只合依舊任使大臣不能選擇能臣就委狄青州任明是差失臣等纍有奏陳利害甚顯大臣一向遂非不肯改更初議緣今日天下之勢最可憂者在戎狄戎狄之患在陜西陜西之事安危最急者在涇原自西事以來賊人不過一兩次犯延州等路唯涇原自髙繼嵩王規纍度禦捍得退外又有好水定川之敗則賊之意豈須臾忘此一路也蓋涇原山川廣寬道路平易邊臣制禦不住可以直圖關中如此形勢安得輕授於人假如賊人圍守鎮戍狄青既是部署豈得不出救援青出之後何人守城賊若以一二萬人與青相拒却從間道領衆直趨渭州又使何人守備臣竊聞大臣之議但欲精選通判前日尹洙以館職知州關中之人以洙氣勢尚輕預憂緩急有事不能制伏士卒况可只委一通判小官安能了事以此言之是渭州須别得能臣與狄青分職勾當方免朝廷深憂也陛下欲命令必行雖左右之人已授差遣立有改更大臣觀邊上事勢如此不甚憂念一向遂非强有論執是天子之意易回大臣之偏見難改也伏乞陛下以安危之意直諭大臣令選才望素著之人委以涇原帥府若不如此處置必恐後悔難追尋有詔徙青權并代部署後癸卯七月遂除王素涇原帥蓋因靖等屢言之也又實録八月十六日乙巳秦州刺史權並代部署狄青為惠州團練使捧日天武都指揮使涇原部署青徙并代不知是何月日亦必因靖等論列不已故暫徙之不三月却歸舊任但實録失不載此今即附見更俟考詳岑守素事實録亦不載賜淯井監捕殺夷賊軍士丁緡錢甲辰涇原路經略安撫司言修水洛城畢丁未開寶寺靈寶塔災諫官余靖言臣伏見開寶寺塔為天火所燒五行之占本是災變朝廷冝戒懼以答天意尋聞遣人於塔基掘到舊瘞舍利內廷看畢送還本寺許令士庶燒香瞻禮者道路傳言舍利在內廷之時頗有光怪臣恐巧佞之人因此推為靈異惑亂視聽先自內廷外及四方抄斂錢物再圖營造臣忝備諫職見此事體不可不言臣聞帝王行事但能勤儉修德感動人心則雖有急難後必安濟臣觀今天下自西陲用兵以來國帑虛竭民間十室九空陛下若勤勞罪已憂人之憂則四方之民安咸䝉其福矣如其不恤民病廣事浮費奉佛求福非所望於當今且佛者方外之教理天下者所不取也割黎民之不足奉庸僧之有餘且以侈麗崇飾甚非帝王之事或有戒臣者曰若有營造必不出於府庫但用內廷無用之物凖其直而與之亦不誅求於民任自僧徒化其願施者積嵗纍月而成之庸何傷哉臣應之曰天下之民皆厭賦役之煩不聊其生至有父子夫婦攜手赴井而死者其窮至矣陛下若恤民之病取後宫無用之物內帑有餘之幣出助邊費勿收中民一年田租明降詔書而告中外此則陛下結天下之心感召和氣雖造百塔無以及之若作無用浮侈之事民益怨矣又二年以來減省後宫請給皆言內中煎迫不似往前今一旦捨施則財物無紀何以取信四方哉初緣市井之人有知者少既見內廷崇奉則遽相扇動傾箱竭橐為害滋深若以經火不壞便為神異即本在土底火所不及若言舍利能出光怪必有神靈所慿此言妄也且一塔不能自衛為火所毁又何福可庇於民哉今朽木腐草皆有光水精及珠之圓者夜亦有光况舍利本逺方怪異之物有光亦非今日之瑞昔梁武帝造長干塔時舍利亦常有光及臺城之敗何能致福視此可以監矣其開寶寺舍利塔伏乞指揮更不營造上以見陛下不惑之明下以昭國家愛民之意仍乞更不迎入內中供養且敵人軍校皆呼舍利舍利入宫不祥之語尤宜戒之其燃頂爛臂之人亦乞禁絶時盛暑靖對上極言靖素不修飾上入內云被一汗臭漢薰殺噴唾在吾靣上上優容諫臣如此據江氏志庚戍淮南都轉運按察使兵部員外郎天章閣待制王素為刑部郎中涇原路經略安撫使兼知渭州素在淮南行部至郡邑場務所問者課額羡與否而已未嘗毛舉細故以摘發官吏人初視之若濶於事情而所布耳目實甚廣間有被劾者皆罪法必得故人人若素坐視其家而莫敢為非此據朱吏附𫝊不知誰所作姑録之俟考江鄰幾云王仲儀帥平凉出都門長簷帽四䙆衫金束帶鞍馬稱是子野赴甘棠偕行顧謂子弟輩不意仲儀壞到此箇地位按是年八月王質知陜州然則素雖有此除命到八月乃出京也契丹歸明人進士梁濟世為應天府楚丘縣主簿濟世本涿州人嘗主文書敵帳下一日得罪來歸且言將有割地之請既而劉六符至上發書以示輔臣色皆不動六符亦疑其事先漏也朝廷先知北敵有割地之請緣王果購得敵書本也此又云梁濟世來告豈濟世因果以歸附止一事而史各言之故不相屬乎當考辛亥升陜西制勝指揮於雄武之上賜歸明人大理評事䝉守中進士出身壬子詔疏决天下繫囚流徒罪降一等杖笞釋之雜犯至死情可憫者奏裁旱故也參知政事范仲淹為陜西河東路宣撫使先是仲淹言臣竊見契丹遣使來言欲西征今邊上探報皆稱契丹大發兵馬討伐岱家族并夾山部落及稱亦與元昊兵馬相殺又報元昊亦已㸃集左廂軍馬既是二國舉動必有大事以臣料之夾山等蕃部小族豈二國盡舉大兵攻討此可疑一也又元昊自來惟倚契丹侵凌中原今無大故何敢便與契丹相絶而舉兵相持此可疑二也自古聖賢議論皆稱敵人無信今朝廷便欲倚慿此可疑三也前來契丹邀中國進納物帛欲屈伏朝廷元昊僭號擾邊屢擒將帥如盟信可保何至今日之舉又可疑四也河東地震數年占書亦主城陷今二國之兵萃於彼方此又大可疑五也又邊上探得契丹遣使三道至南山寧化軍岢嵐軍後靣覷步谷口道路此又大可疑六也設或二國不守盟信卒然奔衝以數十萬衆乘不備而來河東軍馬不多名將極少衆寡不敵誰敢决戰此大可憂一也契丹素善攻城今探得㸃集床子弩并炮手皆攻城之具與昔時不同况元昊皆無城可攻如却入漢界併攻三兩城破而屠之則其餘諸城乘風可下此大可憂二也萬一此度却未奔衝以取中國之信使安於疑徐為後舉之策此大可憂三也今乞聖慈顧問大臣如契丹可以保信必不入寇亦不與元昊連衡則乞今日同署一奏納於御前使中外安靜不更憂疑他日或誤大事責有所歸如大臣不敢保信則乞指揮大臣今日更不歸㕔便畫河東禦捍之策抽何路軍用何人將帥添若干錢帛據何處要害如此定策猶恐後時不能當二敵之勢更因循度日直候大寇入境然後為謀則河東一傾危逼宗社臣待罪兩府義當極論不敢有隱繫聖斷處之始仲淹以忤吕夷簡放逐者數年士大夫持二人曲直交指為朋黨及陜西用兵天子以仲淹士望所屬拔用護邊及夷簡罷召還倚以為治中外想望其功業而仲淹亦感激眷遇以天下為己任遂與富弼日夜謀慮興致太平然規摹濶大論者以為難行及按察使多所舉劾人心不自安任子恩薄磨勘法密僥幸者不便於是謗毁寖盛而朋黨之論滋不可解然仲淹弼守所議弗變先是石介奏記於弼責以行伊周之事夏竦怨介斥已又欲因是傾弼等乃使女奴隂習介書久之習成遂改伊周曰伊霍而僞作介為弼撰廢立詔草飛語上聞帝雖不信而仲淹弼始恐懼不敢自安于朝皆請出按西北邊未許適有邊奏仲淹固請行乃使宣撫陜西河東正傳謂仲淹及弼更張無漸規摹濶大論者以為不可行此當時羣小人謗仲淹及弼故云爾李清臣蒲宗孟因而著之未可信也今略加刪潤庶不失事實正傳但云謗毁稍行而朋黨之論寖聞於上㑹塞下有警仲淹因與弼請行邊於是以仲淹宣撫陜西河東今據弼自叙劄子增以夏竦僞作書詔事契丹與西界㑹兵討岱爾族亦據弼奏議國史及仲淹墓志神道碑皆不明言也蘇轍龍川别志云范文正公篤於忠亮雖喜功名而不為朋黨早嵗排吕申公勇於立事其徒因之矯枉過直公亦不喜也自睦州還朝出領西事恐申公不為之地無以成功乃為書自咎解仇而去後以參知政事宣撫陜西申公既老居鄭相遇於途文正身歷中書知事之難有悔過之語於是申公欣然相與語終日申公問何為亟去朝廷文正言欲經制西事耳申公曰經制西事莫如在朝廷之便文正為之愕然故歐陽公為文正神道碑言二公晚年歡然相稱由此故也後生不知皆咎歐陽公豫見張公言乃信之按轍所志未必盡可據如言經制西事莫如在朝廷之便仲淹豈不知此但當時自以讒謗可畏不得不少避之故仲淹及富弼皆求出使其出使固知必不久安于朝非緣夷簡之言仲淹乃覺也魏泰東軒雜記亦云今並不取癸丑諸軍因戰傷廢停不能自存及死事之家孤老月給米人三斗又詔因西事科配及㨂鄉兵逃移未復業者所在招輯之甲寅上謂輔臣曰方嵗旱而飛蝗滋甚百姓何罪而罹此默禱上帝願歸咎于眇躬章得象對曰臣等不能輔理宣化致災斯民且貽陛下憂今聖言及此必有以上感天心矣五行志云是嵗京師旱飛蝗蔽天戊午雨追封鎮國節度使李繼和為安國公以其廟為安國廟初繼和知鎮戎軍創為城洫又有威惠吏民為立祠及西賊入寇廟中數有神光及夜聞甲馬聲故特表異之樞密副使富弼言伏見朝廷以契丹發兵㑹元昊討岱爾族路出河東境外疑其變詐恐為河東之患遂遣參知政事范仲淹宣撫此陛下憂勞愛民之深也仲淹聞命夙夜在心即乞於京師及陜西發兵馬調錢帛為備禦之策此仲淹忠勤體國之至也然以臣愚慮或恐過之何者臣前嵗奉使契丹頗見情狀又自去嵗至今日見河北河東探報契丹與岱爾族相持事宜參驗得實契丹必不寇河東决矣彼既不來是不宜枉有調發空成勞費雖不入寇然張虛聲以困我未必無心今若勞費不悛則正落賊計亦為窺見淺深非䇿之得也此臣但論今嵗必未為患若他時則非臣所知他時雖欲背盟自逞必寇河北第以河東為掎角之地而已伏乞陛下更令范仲淹相度且往河東照管未宜調發若將來河東却有契丹入寇是臣有罔上誤國大計之罪乞加臣身時仲淹疑契丹入寇欲大發兵為備杜衍謂契丹必不來兵不可妄出仲淹爭議帝前詆衍語甚切仲淹嘗以父行事衍衍不以為恨既退仲淹猶力爭韓琦曰若爾則琦當請行不須朝廷一人一騎仲淹怒再求對首奏琦語然兵卒不發仲淹亦不以為忤也先是仲淹受命主西事弼主北事弼條上河北守禦十二策曰國朝以兵得天下震耀武威太祖皇帝待北敵僅若一族每與之戰未嘗不克太宗皇帝因親征之衄敵志遂驕頻年寇邊勝敗相半真宗皇帝嗣位之始專用文德於時舊兵宿將往往淪沒敵騎深入直抵澶淵河朔大騷乘輿北幸於是講金帛啖之之術以結歡好自此河湟百姓幾四十年不識干戈嵗遺差優然不足以當用兵之費百一二焉則知澶淵之盟未為失策而所可痛者當國大臣論和之後武備皆廢以邊臣用心者謂之引惹生事以搢紳慮患者謂之迂濶背時大率忌人談兵幸時無事謂敵不敢背約謂邊不必預防謂世常安謂兵永息恬然自處都不為憂西北二寇稔知朝廷作事如此之失也於是隂相交結乘虛有謀邊臣每奏敵中事宜則曰探候之人妄欲希賞未嘗聽也蕃使每到朝廷勃慢則尚曰邊鄙之人無禮是其常事固不之恤也但只自謾嚇佯為包容其實偷安不為國家任責畫長久之逺經所以縱其姦謀養成深患是致寶元元年元昊竊發數載用兵西人困窮未有勝算又至慶歷二年契丹觀釁而動嫚書上聞中外倉皇莫知為計不免益以金帛茍且一時之安二邊所以敢然者何國家向來輕敵忘戰不為預備之所致也臣深見二敵為患卒未寧息西伐則北助北靜則西動必欲舉事不難求釁通和則坐享重幣交戰則必破官軍叛而復和孰敢不許擒縱自在去住無梗兩下牽制困我中國有何大害而不為邊患有何後悔而長守歡盟渝盟擾邊我則遂困不幸凶荒相繼盜賊中起二敵所圖又甚大矣自契丹侵取燕薊以北拓拔自得靈夏以西其間所生豪英皆為其用得中國土地役中國人力稱中國位號仿中國官屬任中國賢才讀中國書籍用中國車服行中國法令是二敵所為皆與中國等而又徑兵驍將長於中國中國所有彼盡得之彼之所長中國不及當以中國徑敵待之庶幾可禦豈可以上古之舊䇿待二敵也前既輕敵忘戰不為預備致二敵連禍為朝廷深憂今又欲以茍安之勢遂為無事二敵各獲厚利退而養勇不數年相應而起則無復以金帛可啖而盟詛可約也謹具守禦策如左其守策一曰河北三十六州軍內㳂邊次邊北京雄霸冀祁保瀛莫滄鎮定十一州廣信安肅順安信安保寧乾寧永寧七軍北平一寨總十九城皆要害之地可以控制敵冦而不使得深入定為右臂滄為左臂瀛為腹心北京為頭角此四城乃河朔之望也餘十五城為指爪支節乃四城之所使也定瀛滄各置一帥北京置一大帥餘十五城分屬定瀛滄三路擇善將守之十九城都用兵三十萬定五萬瀛滄各三萬鎮二萬雄霸冀保廣信安肅各一萬祁莫順安保寧北平各五千北京五萬為諸路救援餘二萬分頓諸道巡檢遊擊兵今無事時河朔已有駐泊屯駐就糧兵十八萬本城五萬至用兵時約增十萬人則戰兵足矣此三十萬兵非如景德年中閉門自守皆使出而接戰者也當時守城不敢出寇兵堂堂直抵澶淵幾至渡河為京師患今若使良將帥守十九城分領三十萬衆左右出入縱橫救應閃誤逗誘衝陷掩襲臣雖至愚未信敵騎敢長驅而南也頃年大兵悉屯定州然閉城不使出戰者蓋恐一敗塗地無所救援且防中渡之變也今雖用三十萬然而分置十九城左敗則右救縱失則橫援豈有昔時之虞邪其外十七城不復畜兵只以本部鄉軍堅守不使出戰二曰河朔州軍長吏最宜得人以備胸奴之變自來都不選擇贓汙不才年老昏昧者盡使為之又移替不定久者不過一二年其間茍且之人只是驅遣目前常事其經久利害自知不及其身率皆不為前後相承積弊已甚若不選人久任以矯前失則異日敵有變故邊城不守浸淫深入為患不細其上件十九州軍寨在河朔尤為要害內定保雄霸滄五州廣信安肅順安信安四軍近已得㫖選人差定見施行次北京已有大臣自餘鎮冀瀛莫祁五州保定乾寧永寧三軍北平一寨亦乞差選長吏並使久於其任內績效著聞優與就遷秩祿及厚加錫賜使樂於邊計無所怨苦則悉心營職自能久處或亷勤可尚而才力不足者罷之與內地合入差遣若故為乖慢因循欲離邊任及有罪不可留而法不至死者廢之終身如此則人知禍福必及其身孰能不勉三曰除上件十九州軍寨長吏選人久任外其餘小大文武官并十七州軍長吏以下並乞詔本路轉運提刑安撫部署鈐轄分擘舉充或委樞密院三班審官銓司選擇不許循入並須三年一替所貴上下得人衆職皆舉用兵之際有可供使與夫臨時外求得失相萬也四曰屯兵備邊古今常制所患者民賦有限軍食多闕必須廣為經度始給用度其間嵗有凶歉謀之不獲寇至益戍常數不足則暴斂橫取何所不至民由是困盜由是起此歷代所患也河北自石晉失燕薊之險無可固守是以畜兵愈多積粟愈厚國朝踵之頗久至景德講和之後兵備漸弛粟亦隨减前年敵忽生變雖與復和而終非悠久之計自此邊釁已兆未有寧嵗尤宜謹備禦之策使久而不匱臣得養兵二條其一條據守邊兵合留外駐泊屯駐就糧諸軍分屯於河南鄆齊濟濮等州以教以養况其地富實不營而足率二年一代遇有警急發符召之不旬月可到豈有後期不及者邪所以略省河朔誅斂以寬疲民使之安逸蘇息坐待寇至而用庶幾師有餘力可以禦敵其二緣大河州軍起敖倉支河南民稅及漕江淮粟實屯近邊兵馬每三嵗一代亦足以寬河朔乏困之民二者可擇一焉或兼而用之亦善不然恐無事時河朔已殫竭一旦用武民必怨叛則肘腋之下皆為仇讐豈暇禦外寇哉五曰河北最號徑兵處若盡精鋭則無敵於天下况邊陲乎頃朝廷未與胸奴講和敵騎每入寇惟懼北兵視南兵輕之蔑如也我常南北兵各為一軍凡對陳敵必先犯南軍南軍潰北兵纍之以必敗懲此固有南北混而戰者敗走益甚是不若純用北兵之為勝也今河北屯南兵尚多徒能張為聲勢而實不足用臣願自入河北純募土人為禁兵料錢不過五百文每一指揮即代南兵一指揮歸營不數年三十萬盡得北兵又教之精勇則胸奴自當畏服豈敢輕動哉恐議者謂財匱不宜益兵則請於别路罷招以此益彼無所增矣既得土兵勿戍他鄉糧若不足則願用臣前養兵二條六曰北敵風俗貴親率以近親為名王將相以治國事以掌兵柄而信任焉所以視中國用人亦如己國燕王威望著於北敵知是皇叔又為王爵舉天下之尊無與二朝廷庶事皆决於王王善用兵天下兵皆王主之嚴刑好殺而無敢當者北敵疑此益所畏懼故燕薊小兒夜啼輒曰八大王來也於是小兒輒止啼每牽牛馬渡河旅拒未進又曰必是八大王在河裏其畏若此敵使每見南使未嘗不問王安否及所在朝廷以王之故亦見重於北敵謂朝有如是親賢每欲妄動未必不畏王而止今春王薨識者亦憂之謂王之生北敵以朝廷為重王之薨則北敵以朝廷為輕矣臣亦嘗念國家將帥既未聞於敵人而親王素有威望為鄰國所畏者又以淪謝且不復聞皇親可以為朝廷屏翰者敵必謂王室孤危無所扶助本根不固易以搖動此誠宜為敵人之窺測臣願陛下親擇宗室中年長知書識道理曉人事者數人為王畿千里內州慮宗室出外不逹民政或有任性為事通判位下難以規正宜擇方嚴公幹近上朝臣一人為同知州所貴勢均力敵可以共事而無所乖俟歷一兩郡决知可以獨任則罷同知州只置通判又擇其次者數人為千里內州郡鈐轄亦恐未練軍政職事不舉其都監監押未可减省宜擇歷事亷幹之人且令供職乃選良守臣伺察而審處之其年少官卑度其堪任差遣者為畿縣都監監押雖年少亦須擇二十以上者亦選良令長以諫正之並限二年一替亦用文武臣僚賞罰以勸沮之其有勤儉好學接僚屬有禮曉習文法能理民事者量髙下等第或降奬諭或賜金帛或選官秩有諸過惡者亦量小大等第或罰俸或贖金或降官甚者還黜於宫宅俾之省過一二年復遣補外凡三有過而遂不改者終身使奉朝請如此教育選試之善者必賞不善者必罰臣知不數年當有賢宗室如前漢河間後漢東平二王者不為難矣內可以藩屏王室外可以威示四方此有國者之急務也長久之策也故三代以後興王者今日得天下明日封宗室至於襁褓之子亦皆為侯為王分割土地自成邦國所以分布枝葉庇䕃根本張大王室壯觀天下使英豪無間辭無異意謂四海之內盡是一姓雖有凶謀變計不敢妄動此前代帝王制御天下布在簡牘驗之可信今則埋沒抑壓僅同豢養縱其癡騃殊不教訓雖有說書官又實虛設是盡欲愚之而不令知善道為善人甚非養宗室之大義也至於臣庶之家有子孫弟姪者無不孜孜教誘使之成器蓋望立門户主祭祀若子孫不肖則家道淪落又有負擔之夫微乎微者也日求升合之粟以活妻兒尚日那一二錢令厥子入學謂之學課亦欲厥子讀書識字有所進益國家富有天下基業全盛實祖宗艱難而致所宜子子孫孫相承不絶為歷世之計豈可宗室滿宫而陛下未知教道任為過惡俾外夷輕笑是陛下損枝葉而取孤根易搖之患又復思陛下任李用和為殿前副都指揮使任曹琮為馬軍副都指揮使者是任親也用和與琮誠親矣然皆異姓異姓者尚可親信則宗室同姓與陛下是骨肉之親反不可信哉陛下不過謂宗室無人臣謂今則誠未見其人教之試之當自有人矣今惟朝㑹時羣行旅進青蓋滿道士大夫見者方知其宗室但出都城四門之外不知宗室之有無况天下乎又况四夷乎自上古直至周世宗其間所歷何啻萬代至宗室不教不試不用微弱之甚未有如本朝者也宜乎為識者之所憂而北敵之所輕也且如北敵有南大王蕭孝穆北大王蕭孝惠魯王特哩衮楚王伊勒希巴是其親近甚衆臣前嵗奉使盡與之接又詢其國人未必實有才武而中原聞之莫不疑其人人皆良將也其故何哉蓋聞其名而疑有其實爾今朝廷若能崇樹宗室使聲名漸著聞北敵北敵亦必謂南朝有人根本牢矣欲謀則息欲動則止古者有以實效濟者亦有以虛聲懾者兵家尤重先聲而後實况臣之所說必使聲實相副願陛下行之無疑其禦策一曰景德以前緣邊土兵無事時留戌本州軍寇至則盡為逐路部署司抽起緣邊闕食又却以南兵屯守甚無謂也夫土兵居邊知其山川道路熟其彼中人情復諳敵兵次第亦藉其營護骨肉之心且又服習州將命令所禦必堅戰必勝也若遷入內地山川道路不知人情不熟敵兵不諳骨肉不在州縣命令不習又為怯弱所纍則禦必不堅戰必不勝也北敵惟懼邊兵凡聞以南兵替入內地敵人大喜故來則决勝而回前年河朔有警復尋景德初事盡抽邊兵守定州河朔之民大恐以為官軍必敗幸而敵騎中止不見失律不然喪師必矣臣願自今北敵若入寇緣邊土兵只在本處不復令部署司抽移若逐處土兵尚少即以南兵益之有餘則方許部署司抽起况部署司自有近裏州軍土兵可以聚而為大陳矣臣上篇議十九城分領兵三十萬出戰餘十七城係近裏州軍只用鄉兵守之更不出戰其逐路部署司可於十七城聚而為大陳兵矣邊兵勇悍有材武不畏堅徑敵騎初入使當堂堂之鋒必能取勝則近裏州軍人心自壯雖南兵之怯亦頗增氣局以南兵在邊遇寇一敗敵騎乘而南則表裏震恐雖精鋭盡在部署司亦已沮喪安能保其全勝哉二曰景德以前胸奴寇邊多由飛狐易州界道東西口過陽山子度滿城入自廣信之西後又多出兵廣信安肅之間大抵敵騎率由西山下入寇大掠州郡然後東出雄霸之間景德前二州塘水不相接因名東塘西塘二塘之交蕩然可以為敵騎歸路遂置保定軍介於二州以當賊衝厥後開道不已二塘相連雖不甚浩渺而賊路亦少梗矣然窮冬氷堅旱嵗水竭亦可以濟未為必安之地雖然但少以兵控扼之則敵騎無以過矣自餘東從姑海西至保州一帶數百里皆塘水瀰漫若用以為險可以作限只自保州以西至山下數十里無塘水之阻敵可以平入敵且守盟不動則無先發但用臣上篇屯兵之法足以固守萬一渝盟入寇用臣之策可以轉禍為福而逞志泄憤矣何以陳之今敵若寇邊必由廣信西而來敵騎初入塘緣邊州軍堅壁示弱不得出兵敵必不顧而進將及鎮定亦堅壁敵必易我而懈於是令廣信安肅保州三城開壁㑹兵張擊之聲而不與戰敵必分兵復禦已而令鎮定亦閉壁不與戰敵既前後受制必未敢長驅而南於是我急從滄州取海上路以數千艘出輕兵三萬趍平州入符家寨口則咫尺燕薊矣滄州至北界平州水路五百里不數日登岸地肥水草美不必重齎雄霸之間即景德敵騎東歸之路也又出精兵二萬直抵燕京㑹滄州兵搗其腹心破其積聚敵見兩下兵入莫之為計矣燕地既亂入寇者必有歸心又為王師所縈而不能遂去於是乘其向背之際使㳂邊三城及鎮定兵合擊必大破之追奔及燕盡逐敵騎過山後敵兵入界則整若敗而出寨則紛然散失無復行陳易為驅除矣以兵守居庸關古北口松亭關符家寨此四關口皆險隘各以三千兵守之固矣則敵騎無復南者因其妄動可以一舉而復全燕之地拔數郡陷蕃之族平纍朝切骨之恨臣自謂必無遺策矣既以兵守四關口外西山有後來新開布尼雅特木確克珠確克二口敵人以通山後八州之路然皆險峻不容車馬敵人鑿山為徑只通人行有雨則壞常須修壘然後通險峻非行兵之道雖不加防守尚無所害或於口側少伏兵車縱敵入寇發伏可以盡殺之假陛下謹重未欲舉復燕之策即請寇入之後屯重兵於西山下敵雖有所掠而東出無路進退不遂我於是以十九城之兵分布掩擊必使退敗保無深入之患敵勢既屈與和則久亦制胸奴之下策也三曰燕地割屬契丹雖逾百年而俗皆華人不分為胸奴所制終有向化之心常恨中國不能與我為主往往感憤形於慟哭臣前年奉使北廷邊上往復數次邊人多勸臣曰萬一入寇我㳂邊土人甚有豪傑可自率子弟數百人為官軍前驅惟其所向而破賊願朝廷復取燕薊之地為華人死亦幸矣臣竊壯之慰謝而遣臣退念朝廷之力未及外禦遂虛邊豪之請雖然臣未嘗忘懷思為異日之用自後不輟尋訪所得頗多將來敵若寇境臣必能以所得邊豪令自率鄉人各成一隊或為嚮道或為內應或破陳或攻城大可以為王師之助矣其始去則質其家其成功則厚其賞臣亦不患其譎而反為吾害也四曰古者有外虞則以强敵攻强敵中國之利也朝廷西有羌人之患力足備禦不假求外援以自助惟是北敵强盛十倍羌人異日渝盟悉衆南下師力若不給則禍未可涯宜求所以牽制之術使有後顧而不敢動動亦有所憚而不能盡鋭以來我力足以禦之此不可不慮今契丹自盡服諸蕃如元昊回鶻髙麗女真渤海烏舍鐵勒黑水靺鞨室韋逹靼步奚等弱者盡有其土强者止納其貢賦獨髙麗不伏自謂夷齊之後三韓舊邦詩書禮義之風不减中國契丹用兵力制髙麗髙麗亦力戰後不得已而臣之契丹知其非本意頗常勞其制禦髙麗亦終有歸順朝廷之心臣伏見淳化中其國主王治以契丹兵入境遣使元郁來朝納欵太宗不從但婉順回答又於咸平年中其國主王誦遣户部郎中李宣古來使真宗亦不納但降優詔而已又於祥符七年其國主王詢遣工部郎中丹徴古齎表來使表稱今斷絶契丹歸附大國仍乞降正朔及皇帝尊號真宗又不許陛下即位後天聖二年復曾遣使來朝朝廷差柳植館接其事甚邇前後髙麗四次遣使修貢每來必稱不願附契丹而願附朝廷朝廷終不允納雖然觀髙麗欵附之切如渴者望飲饑者望食無一日而忘也但略遣人翹發則其來必矣來即善遇之許其嵗朝京師賜子差厚於前使回其心優為詔命之辭以悅其意他時契丹復欲犯順以逞凶志我遣人使髙麗激之且約曰契丹往年無故取髙麗三韓之地又景德間興師深入誅求無厭髙麗甚苦之我先帝重惜民命不欲數與之鬬故嵗遺亦厚于兹四十年矣今契丹又欲背施肆毒犯我邊境我軍民共怒皆願死戰我不敢違衆行師有日髙麗其舉兵相應表裏夾擊契丹敗則三韓之地及所得人民府庫盡歸髙麗我秋毫不取但止復晉所割故地耳髙麗素怨契丹侵其地又斂取過重向者恨無大國之助以絶之聞今之說則欣然從命然則契丹不足破也或者欵納髙麗則契丹可為釁端或以為不便臣答曰前嵗之隙豈納髙麗興亂邪敵人之性變詐多端茍欲背盟何說不可豈宜動自拘礙不敢有為直俟禍來坐受其弊愚者尚不肯如此况謀謨天下之事乎髙麗果入貢假使契丹來問我當答以中原自古受萬國貢獻矧髙麗素禀朝廷正朔但中間廢隔今却復修舊好使我何辭阻絶亦與契丹納諸國之欵一也契丹安能使我必不納髙麗之貢哉臣又思若契丹寡弱不足為虞或能謹守盟誓無慿陵中國之志則何用逺納髙麗之欵而近忽契丹之約今契丹盡吞諸蕃事力雄盛獨與中原為敵國又常有慿陵之心况前嵗已生釁隙自知不直謂朝廷僞增金帛後圖釋憾不久又將先發以制我焉發而謀之謀不及矣經營措置今乃其時臣又嘗聞契丹議曰我與元昊髙麗連衡攻中原元昊取關西髙麗取登萊沂密諸州又曰髙麗隔海恐不能久據此數州但縱兵大掠山東官私財物而去我則取河東三十六州軍以河為界臣聞此久矣萬一果如此說臣謂朝廷亦無以制之外寇如此窺中國因循日過一日臣不知終久如何夫髙麗纍表乞貢奉朝廷終不許遂决志事契丹所以為契丹用也契丹所教無不從朝廷若能許髙麗進貢正遂其志則必反為我用也契丹何能使之耶臣熟知髙麗雖事契丹而契丹憚之天聖三年契丹常伐髙麗是年朝廷遣李維奉使髙麗殺契丹兵二十萬匹馬隻輪無回者自是契丹常畏之而不敢加兵朝廷若得髙麗不必俟契丹動而來助臣料契丹必疑髙麗為後患卒未敢盡衆而南只此已為中國大利也亦願陛下行之無疑五曰鎮定西山有谷口十餘道盡通北界山後之路景德以前不甚迹熟蓋溪澗峻狹林木壅遏故敵騎罕由斯路而入雖有來者亦不免艱阻臣頃聞河朔人說契丹自山後斬伐林木開鑿道路直抵西山漢界而止今則往來通快可以行師臣亦嘗細詰其由云契丹舊亦疑朝廷有復燕之計恐天兵渡河直抵燕京則敵人欲出我不意由山後進兵旁擊鎮定橫行河朔牽制王師也臣料往年㳂邊亦曾探報聞於朝廷今若契丹自廣信安肅入寇我以重兵禦其鋒復有西山别衆橫行背擊官軍敗績則大事去矣此兵家切務不可不知當得亷幹謹密者隂往經制如何屯戍如何禦捍必有勝之之術先事而定以待其來則保邊之道也六曰祁深舊非要郡宿兵至少城壘迫而庳陋不甚完葺竊聞契丹今後入寇知我重兵屯鎮定不肯直南才過保州便取東南路由祁深趨冀貝寇澶魏冀貝澶魏城大而堅惟祁深二壘當廣而髙之以防攻迫誓書不得創修城池若因而廣之則無疑又曰敵既憚鎮定而忽深祁必謂二城兵分不戒而過我若乘其不備使二城潜出精兵首尾相應而擊之必大得志此繫於臨時非可預慮然知兵者所當留意七曰唐漢以前胸奴入寇率由上郡鴈門代州定襄等路蓋當時中國據全燕之地有險可守胸奴不能由此路而來也自石晉割燕薊入契丹中國無險可守故敵騎直出燕南不復尋定襄等路今朝廷若留意河朔邊鄙有備敵不可得而入須從别路以來或雖可入寇第取定襄等路為掎角之勢則河東不可不大為之防或創立城池或造作險阻卜何地可以設竒伏何路可以出牽制此須預為經度素有隄備則臨時可以禦捍應卒不至倉皇使河朔表裏相應拒寇使不能逞其欲兹實防邊之務也凡此等守禦十二策總十三條是臣庚辰壬午年奉使契丹日於河北往回十餘次詢於㳂邊土豪并內地故老博採參較得之甚詳及於北廷議事又頗見其情狀以至稽求載籍質以時務用是裒聚撰述以副陛下委任之意即非臣任胸臆罔聖聰伏望陛下令兩府㑹議可者速行之其未可者更相致詰而是正之臣必不敢持已狥私旁拒衆證兩府亦不得徒事譏病而無所發明如此則庶幾謀行而患可弭矣臣聞古者明君遭患難則退修道德可以無咎是故文王出羑里純任教化而終滅獨夫勾踐脫㑹稽勵精武事而卒破夫差又聞主憂則臣辱主辱則臣死故陳主答書悖戾而楊素下殿請死蔡賊跋扈難制而裴度誓不兩生終之隋滅江南而裴度平淮西有以見古之君臣所為各得其道則未有不建功立業聲流萬世者也昨契丹背約呼索無厭朝廷以未有備禦增幣約和陛下未有文王勾踐雪恥復讐之心臣下亦未有楊素裴度死難平賊之志如此而望排患解紛建功立業如古之君臣何可得也臣竊計北敵勢方强盛可以入寇而輒肯議和者有謀也謀後舉事以為萬全之策也又計中國之勢如人坐積薪之上而火已燃雖焰未及其身可謂危矣北敵之强既如此中國之弱又如此尚不急求救之之術是欲秦之魚爛梁之自亡邪臣備位樞府夙夜憂畏但恨未得死所少紓國難惟願解臣密職典河朔一要郡得以拙勤經營邊事雖未敢必謂無虞然自謂或可稍寬陛下北顧之憂矣伏惟早賜裁幸是月諫官余靖等言臣等伏覩陛下以災變屢見飛蝗為孽責躬引過祈于天地宗廟社稷不令殃及萬方臣等伏念災異之來實由人事政治闕失感動天地故古之人君或遇災異則避正殿撤常膳深自刻責思所以致之及改治之理以至冊免三公者有之詔求直言者有之此皆消災異召和氣之道也方今天下之勢至危矣敵人驕暴凌脅中國盜賊縱橫驚劫州縣養兵至冗擇將不精科配頻繁公私匱竭內外之官務為辦事而少矜恤之人天下之民急其供億而有流離之苦治道至此未聞救之之術臣等伏見數年以來天戒屢至朝廷雖有驚懼之意然因循舊弊未甚改更所以今日災變頻數蓋天意必欲朝廷大修人事以救其患乃可變危為安也救患之方莫若原其致災之本致災之本由君臣上下之闕失也闕失之事臣等敢次第言之陛下不専聽斷不攬威權使號令不信於人恩澤不及於下此陛下之失也持天下之柄司生民之命無嘉謀異議以救時弊不盡忠竭節以副任用此大臣之過也朝有闕失而不能救民有疾苦而不能逹陛下寬容少斷而不能規大臣循默避事而不能斥百官邪正並進而不能辨四裔交納內侵而不能謀有顧避之心無力諍之節此臣等之罪也今陛下既有引過之言逹於天地神祗矣望陛下必踐其言必行其實踐言行實之要莫若専聽斷攬威權號令信於人恩澤及於下則災異消而和氣應矣其大臣不舉職之過伏乞陛下以致變之由赫然督責之又無近效則用災異冊免三公故事而去之别求能賢以救大患如臣等䝉陛下非次選擢不能稱職尚致陛下有如此之失大臣有如是之過臣等負罪至深伏乞朝廷逺加竄逐别求方正材識之人俾居諌職必能禆贊朝綱上副聖選又言臣等待罪于今七日曽不得報憂愧殊深不知所措竊以今天下之勢外有羌戎結連侵脅之憂內有邊陲守禦戰爭之苦兵冗財竭賦斂暴興生民膏血掊取無極譬如投石入井到底乃止不幸有旱潦饑荒之變盜賊乘時而起將何以禦今日視前一二年國用民力固不如矣復且因循無有更改舊弊之術後一二年還視今日又可知矣非獨不如今日其患至大縱有知者不能為謀臣等以諫名官見天下之勢至危如此既不能開廣陛下恩信以固民心又不能紏正大臣闕失以救時弊是致災異頻數中外恐懼臣等上負陛下選擢之恩下負生靈困苦之望憂慮終日譏責滿身尚何顔靣出入朝中臣等罪咎實深伏乞朝廷必加竄逐以謝天下又言臣等竊慮朝廷以災異所因上下引過不欲専罪臣等然臣等自念昨䝉陛下於衆人之中非次選擢當時物議謂臣等必有建明臣等協心自期必有報效觀今天下之勢日可憂懼天人災變相仍而至豈非臣等不能補助之致也或朝廷尚賜矜容不加深罪伏乞各與臣等外任合入差遣庶盡心力以展實效朝廷别得賢才使居諫職必有謀畫以助治功知制誥張方平言臣微聞外言北敵不守封略築城鄙上邊吏諜知料閲兵馬且復遣使來事固未審虛實然國家與敵通已四十年事窮必變利盡則交疏理之常者顧但紓緩嵗月北方諸部羈從於敵者如奚髙麗逹勒逹常內懷不服特强役屬之爾去冬敵以衆臨河西自以為拾芥之易既而遁散以歸內羞諸部且疑我之納夏人既羞且疑則其起辭生事思有逞於我豈保無他夫兵危事也不當易言之若信好可結朝廷豈願交兵黷武即事至於不獲已亦在上下奮勵講所以折衝之策圖所以式遏之算河朔之兵不啻三十萬邊境千里塘水占三分之二得以専力而控其要害城邑樓櫓守在九天之上若頓重師澶魏中山堅壁而勿與戰清野以待其敝出竒伺便邀其重歸是不可勝在我可勝在敵矣且敵久與中原通甘心豢弭其貴人習於驕佚其部人不練於戰鬬於其本俗衰弊已甚而又母子兄弟內結疑隙上下離二此其亂危之形中國可乘之機㑹若朝廷有意於逺略幽薊可圖也尚能為中原之患哉陛下誠震其威靈廟堂審其計議內外文武各致其力使敵一舉而不得志不有內變必有外叛諸部勢且瓦解山後之地天其或者使復合於中土未可知也臣願陛下思患預防考謀事先秋氣漸清宫殿凉爽時因燕間延對大臣俾各盡其謀猷以定其帷幄一日有邊境之急庶幾無倉卒之擾今西疆粗寧縱不保其久未有旦夕之虞也其將校可任者稍徙河北使得與士卒相服習漸諳土俗至于選官吏峙糗糧繕器械葺廄牧皆當今切務而可以素備者也備而未用為政之常臨事紛紜何以鎮靜此皆朝廷塵熟之論而儒生之常談臣忝在近班愚慮所及不敢自隱惟宸鑒裁擇塘水占北疆三分之二此據方平别疏改定
