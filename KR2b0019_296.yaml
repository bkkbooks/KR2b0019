body:
  text: 續資治通鑑長編卷二百九十二宋李燾撰神宗元豐元年九月壬申朔提舉成都府等路茶場李稷言近者蒲宗閔乞于鳳翔府民間買鹽限一萬席運轉錢本入川中市色遲疾不同難足此數乞令本司如商人例買鹽入川變易本錢嵗毋過萬席從之仍不得令州縣出賣及抑配以知江寧府吕嘉問知潤州江南東路轉運司言嘉問違法不公乞移一郡所貴易以根究故有是命於是嘉問亦言欲案治都大巡檢楊中庸等罪而轉運司輒諭令自陳首乞差不干礙官吏推治詔並送轉運司嘉問以熙寧十年十月二十一日知江寧陕西都轉運司言秦鳳等路緣邉糴場積欠商人入中糧草錢五十九萬緡詔三司特於年額外給鹽鈔三十萬緡以資次先後均二年印給詔諸路上供金銀錢帛應副內藏庫者委提刑司督之若三司發運轉運司擅折變那移截留致虧本庫年額者徒二年癸酉交址貢方物兩紀附年末甲戌詔自今科場奏所試策問並具撰人職位姓名先是上以别頭試官撰奏策問辭意有不當者莫知撰人為誰故有是詔樞密院請非在京及將下禁軍指揮旗頭外馬步軍並以十分為率馬軍一分習槍刀餘習弓步軍二分習弓二分習槍刀餘習弩開封府界京東西五路三百料錢軍分除已習槍刀外見射第一等弓者為弓箭手餘并新招刺人並為弩手從之兵志元豐元年詔在京及將下禁軍以十分為率馬軍一分習槍刀餘習弓步軍二分習弓二分習槍刀餘習弩五路軍士受奉三百者除已習槍刀外見習第一等弓者為弓箭手餘并新募兵並為弩手乙亥詔管勾廣西常平等事劉誼根磨點檢廣西轉運司及提舉兩浙常平事范珣會計安南軍事實費見管不同因依并具逐色樁管在所內在邉逺無守備處並移近裏州有不堪存留者可即貨易之其軍器即擘劃拘收其餘路分亦移牒取索勘會以聞都提舉市易司言欲以市易務上界見欠內藏庫鹽引錢一百萬緡候本務補滿本錢日依朝旨作二年還足詔許自來年為始丙子詔江南東路轉運提點刑獄司同劾江寧府違法官吏以聞其推官王覺左司理參軍關逹仍先次衝替先是止令轉運司按舉而吕嘉問繼有論列故令别司兼治之丁丑詔州縣官吏毋得迎送過客即泛遣使命及太中大夫觀察使以上聽如故又詔都水監相度沿河榆栁令地分使臣兼管剶機及委都大官提舉具利害以聞賜刑部郎中都提舉市易王居卿紫章服刪定在京當直所修成敕式三卷乞以元豐新定在京人從敕式為目頒降從之戊寅詔自今常平免役坊場等錢物如諸處申奏移用已得旨並送司農寺指揮巳卯廣西轉運司言自軍興增戍兵甚衆又新創順州支用實繁乞以見在軍賞絹應副軍衣及諸賞給從之上批令殿前司馬步軍司同提舉教習馬軍王中正狄咨以常用白樺長弰弓隨弓長箭及新造黃樺闊閃弓隨弓減指短箭冝各取一石一斗力試驗遣箭徑緩入物淺深去步逺近保明以聞其後中正等保明奏至乃詔自今用黃樺弓令承旨司立法承旨司奏應諸軍揀填上四軍上四軍親從官騎御馬直小底揀填諸班直及諸班直揀十將將虞候長入祗候并轉班之人欲自今引見呈試並依舊條逐等斗力用弓箭南庫打硾黃樺闊閃弓減指箭弩並遞加三斗從之壬午左班殿直成卓乞辭雍州提舉右江兵馬賊盜都巡檢止就英州清溪或韶州岑水場駐泊捉賊勾當詔不許辭依廣南西路經略司奏就差仍依條先與轉官候任滿與除閣門祗候司農寺請諸路秋熟處民戶積欠常平免役等錢穀三分以上聽量增錢折納從之三司言河東都轉運司乞續支京鈔見鈔三十萬緡計置軍儲今欲依糴買封樁糧草例于末鹽錢內支錢一十萬緡換作本路交引收附與轉運司計置極邉糧草却以末鹽錢撥歸省司從之提舉成都府等路茶場司請出茶州軍每嵗曉示園戶如敢採造黃老秋茶中賣不以多寡並沒官仍乞每嵗别委官驗視已有納到如此色樣並令燒毁從之權發遣河北東路提點刑獄汪輔之言近取索大名府公使例策照使又有新置特送例一策今監司吳審禮髙鎛常受例外特送酒其例策臣已帶在本司凖備證驗所覬朝廷少知外臣貪潔之迹詔輔之速以例策還大名府邵伯溫見聞録云文彥博判大名輔之初自河北西路轉運判官徙東路謁彥博方坐聽事閲謁置按下不問入宅久之乃出輔之已不堪既見彥博禮之甚簡謂曰家人頃令沐髮忘見運判勿訝輔之沮甚舊例監司至之三日府必開筵彥博故罷之輔之移文刻日檢按府庫通判以次白彥博彥博不答是日與家人宴內外事並不許通匙鑰不可請輔之怒破架閣庫鎖亦無從檢按也密劾彥博不治上批輔之所上奏付彥博有以侍中舊德故煩卧護北門細務不必勞心輔之小臣敢爾無禮將别有處置之語彥博得之不言一日會監司曰老謬無治狀幸諸君寬之監司皆愧謝因出御批以示輔之輔之皇恐逃歸托按部以出未幾輔之罷案輔之以熙寧十年四月自河北西路運判改東路運判元豐元年二月就遷提刑三年六月除開封府推官此云未幾輔之罷誤也蓋因詔令輔之還大名府例册衆人歡挾遂云輔之坐此得罪其實不然也癸未詔交址郡王李乾德歸所掠雍欽廉三州人戶則如所乞以廣源蘇茂門等州及機榔縣還之仍將造亂首領就界首斷遣舊紀詳載答詔新紀削去詔新差廣南西路經略安撫使兼知桂州曽布至桂州交割州事管勾令趙卨依舊充經略安撫使以樞密院言安南邉事垂畢須令趙卨首末専一措置故也入內副都知王中正乞馬軍選充上軍上軍選充諸班並馬射一石弓從之甲申中書言應諸縣造鄉村坊郭丁産等第簿並録副本送州印縫於州院架閣從之乙酉端明殿學士兼翰林侍讀學士寶文閣學士戶部侍郎吕公著樞密直學士工部侍郎薛向兼同知樞密院事公著既就職與同列奏事畢獨留謝因言臣老於間外蒙陛下收之桑榆惟知拳拳納忠以報恩遇自熙寧以來因朝廷論議不同端人良士例為小人排格指為沮壞法度之人不可復用此非國家之利也願陛下加意省察上曰然當以次收用之上初即位韓絳即建議復肉刑至是復詔執政議公著以為後世禮教未備而刑獄繁肉刑不可復將有踊貴屨賤之譏吳充議復置圜土衆以為難行王圭欲取開封死囚罪試以劓刖公著曰刖而不死則肉刑遂行矣議竟得寢據時政記公著以十七日戊子供職向以二十二日癸已供職詳定禮文所言禮記曰郊特牲而社稷太牢又曰祭天地之牛角繭栗蓋以覆載之功無物可稱故用繭栗犢取其誠慤以小為貴也特牲而已不及羊豕以少為貴也配坐以祖祖逺而尊以天道事之故亦特牲書曰用牲於郊牛二春秋傳曰養牲養二牛是也嚴父明堂則有牛羊以其禰近而親故以人道事之詩曰我將我享惟羊惟牛是也本朝儀注昊天上帝皇地祗太祖皇帝之坐各設三牲爼不獨配位誤用羊豕而正位亦不専用特非尚質貴誠之義伏請改親祠圜丘方澤正配位皆用犢不設羊豕爼及鼎七有司攝事凖此從之新舊紀並書詔祀天地及配帝用特牲又言正配位不當設簋簠尊豆請改用陶器仍以樿為杓又言取火于日當以照饌及共神厨之用并請從本所訪求鑒與方諸試驗以取明水又下江南饒信等州采鬱金香兾得其真以和鬯酒又言景靈宫太廟設洗於皇帝版位之西非是請設於阼階下當殿之東霤仍罷景靈宫所設爟火並從之郊廟禮文自有本文今但舉其要而削其繁辭他皆倣此司農寺請自今以存留一半錢所糴糧斛别為一項更不與常平舊管同估價從之三班奉職羅昌皓言昨差齎敕書禮物往占城國今畫占城至交址地圗以獻上批昌皓不憚難危逺使絶域雖不能成元初受命之功然勤勞海道亦可矜奬冝轉一資又批自安南用兵獻議討賊者以百數其言水陸進師之道往往不同未知孰得冝類衆説成書各繪圗附見以備他日之用乃詔檢詳官王伯虎梁燾編類丙戌環慶路計議措置邉防徐禧言陕西路至並邉豐稔異常物價至賤乞以百萬緡分借逐路經略司計置異時復令轉運司償納詔提舉成都府路茶場司撥錢十萬緡賜環慶路四十萬緡分賜秦鳳涇原路並令經略司市糧封樁仍令三司支解鹽鈔五十萬緡付陕西路轉運司市糧草熙河路走馬承受長孫良臣言朗圭兩族共六百餘人雖從來借地耕種終非已所有乞于河州或南川寨側近根括空間及弓箭手逃田內摽撥二十頃分給從之丁亥詔三司應係省及上供年額錢所買銅鉛錫其所賣本錢令三司移用外餘並依條封樁中書檢正吏房公事祠部貟外郎王陟臣權發遣兩浙路提點刑獄檢正禮房公事太子中允集賢校理崔公度同知禮院管勾國子監檢正刑房公事太子中允館閣校勘范鏜為利州路轉運判官樞密院檢詳刑房文字太常博士李深權提點荆湖南路刑獄檢詳吏房文字祕書丞吕大忠為河北路轉運判官檢詳兵房文字殿中丞薛昌朝知邠州初上以中書檢正樞密院檢詳官皆置貟過多至是裁減陟臣等六人而在職及二年並升一任仍自今檢正官以四員檢詳官以三貟為額詔占城與交址為仇國其起居及內燕聽回避如願赴燕亦聽交人與占城使遇朔日並赴文德殿分東西立望日交州使副入垂拱而占城赴紫宸起居大燕交人坐東朵殿上占城坐西廡時占城使副乞避交人客省以聞故也詔雍州昨自交賊殘殺人民至今戾氣未息水火疫癘相繼近又土像動搖尤可駭異宜下轉運司差官同本州長吏集鄰部修潔僧建水陸道場為死者薦福令曽布陳倩同相度遷城利害以聞先是州寺有塑佛嘗一動搖而明年交人入寇至是又動而火焚官私廬舍幾盡其後蠻儂智春叛復動如故於是權知州錢師孟投之於江中錢師孟權知雍州未詳儂智春叛事在二年六月甲辰戊子詔陕西轉運司求訪西天梵學僧令乘驛給裝錢赴闕詳定禮文所言國朝南郊儀注皇帝升自午陛司徒奉昊天上帝之爼下逮祝史皆升午陛有司攝事太尉亦由午陛升壇且午陛者人主所升答陽之位也臣下與至尊同階此程元素所以極論於唐也或曰神爼當由午階是大不然按少牢饋食禮爼序升自西階惟肵爼以主人親羞故升自阼階則知升階者繫乎人而不繫乎爼也郊丘之東陛社壇之西陛猶廟西階也郊丘之午陛社壇之北陛猶廟阼階也禮以定尊卑别嫌疑為本伏請親祠圜丘惟天子升午陛及從升之臣依舊外其司徒祝史當升東陛若有司攝事則太尉亞終獻亦由東陛升降庶得禮意從之禮文元年九月十七日依奏又言看詳禮意惟人君得升阼行事阼主人階也雖尊如尸其入廟也必由門左其升堂也必由西階雖親如子其冠也必筵于東序少北其適東壁而見母也必降自西階故曰凡非主人則升降自西階明一尊之義也今太廟儀注熙寧祀儀開寶通禮開元禮亞獻終獻以下其升降俱由阼階有司因循不講之失也伏請自今行禮亞獻終獻公卿祝史並由西階以應古義景靈宫亞獻終獻及司徒司空升降東階亦乞改正詔詳定所再參詳又言臣等遍考禮經無臣子升降阼階阼階天子踐而行事非臣子所得升降若謂以賔禮待尸而尸升西階則宰夫祝史之屬亦升西階是豈所謂以賔禮待之者也其贊衛臣僚從君升降者既從于君自當由阼從之元豐元年七月五日初奏九月十八日再奏乃從今附十七日又言郊特牲器用陶匏象天地之性故開元開寶禮有司攝事亦有匏爵熙寧祀儀有司攝事惟言洗爵拭爵而不言匏因此不用匏爵伏乞自今改用從之元年九月十七日依奏又言今太廟尊彞之數溢於古仍不依四時各設朝享或雜以冬蒸及春祠夏礿之禮其蜃尊二乃四方山川所用者並乞據禮改正春祠夏礿用雞彞一鳥彞一犧尊二象尊二罍六秋嘗冬蒸用斝彞一黃彞一著尊二壺尊二罍六大祫從鄭衆説用虎彞一蜼彞一大尊四山尊六罍六為十八尊禘享如祫但減山尊二為十六尊以本周禮從之元年九月十七日依奏巳丑詔聞熙河州官場糴米斗錢百五十在市百二十令葉康直根究虛增價因依以聞詳定禮文所言周制由命士以上父子異宫祖禰異廟所以致恭而不瀆也祭法曰適士二廟春秋書桓宫僖宫聘禮有之某君受幣于某宫曽子問曰主出廟必蹕是人君逹于命士莫不然也惟諸侯之下士則父子同宫而居祖禰共廟而祭後漢光武儉不中禮合髙祖以下至平帝為一廟異室同堂屈萬乘之尊而俯同周之下士歷代因循不革臣等以儀禮求其迹以爾雅辨其名以考工記約其廣深謹圖上八廟異宫以始祖居中昭穆為左右以進詔送陳襄等詳定本朝可行典禮以聞然卒未果行也然卒未果行也六字從朱本增入詳定所奏可行典禮在四年十一月二十一日新本不載朱本并附此當刪取之又言祀天之有禋柴猶祭地之有瘞血享廟之有祼鬯皆是歆神之始非謂於祭之末燔燒胙餘也蓋周人尚臭掃地而祭故先燔柴於丘上所以升煙而降神也漢魏以後祀於壇上故三獻畢收牲幣祝册黍稷爵酒饌物而燔之所以送神也今郊禮祀於壇上蓋循漢魏以後故事然禮畢升煙非所謂禋祀尚氣也伏請俟降神樂止先燔以為歆神之始詔詳定所再𠫭詳又言禮經燎升煙所以報陽隂祀自血起故熊氏云凡大祭並有三始祭天以煙為歆神始祭地以埋為歆神始然則升煙瘞血以致神祗不可不在先也雖然致神祇矣方有事焉至於禮畢則以牲幣之屬而燔瘞之然後為禮之終故儀禮為祭天燔柴祭地瘞血鄭氏以為祭禮終矣備矣周官司巫凡祭祀守瘞而鄭氏亦以為守之者以祭禮未畢若有事然祭禮畢則去之此説為得而先儒有謂於燔瘞之始即用牲幣之屬既不經見而又未及薦神遽已燔瘞之則是備於先而闕於後也至後世知燔瘞牲幣于祭末而不知致神於其始則是備於後而闕於先也欲請祀南北郊先行升煙瘞血之禮至薦奠禮畢即依舊于壇坎燔瘞牲幣之屬則始終之禮備矣從之禮文元年七月五日送詳定所再參詳九月十八日依奏又言看詳祭禮惟主人受嘏故特牲饋食禮皆曰嘏于主人雖主婦猶不嘏焉凡非主人俱不當嘏曽子問曰攝主不嘏不綏祭蓋將欲受福先減黍稷牢肉隨祭於豆間今避主人不敢受嘏以其不嘏故不墮祭也梁明山賔議請郊廟受福惟皇帝再拜明上靈降祚臣下不敢同也詔依其議開寶禮及儀注熙寧祀儀天子親祠而亞終獻飲福有司攝事而太尉飲福受胙則于禮為非伏請自今親祠惟皇帝飲福受胙以専受祉于神然後賜胙臣下以示均福之義其賜胙及有司攝行事進胙于天子自如常儀詔再參詳元年七月丁丑事又言臣等詳亞終獻之官蓋君命之相成其禮者也攝事之有司亦君命之攝行其事者祭祀之主既自天子則飲福受胙固非臣下所宜惟君賜之然後為可是臣下可以受之于君而不可専受于神也其親祠亞終獻飲福及攝事之臣飲福受胙可罷祭終賜胙再拜自如常儀從之按禮文初送詳定所再參詳乃元年七月五日丁丑得旨依奏則九月十八日己丑也禮文因三年八月二十一日辛亥詳定所請改正皇帝飲福受胙儀注遂并入三年八月辛亥今仍掇取附本年月日庚寅內殿承制王餘應乞敘歸明繼襲管勾豐州詔以為麟州都監候滿二年差知豐州詔三司續支末鹽錢二十萬緡付河東轉運司市糧草壬辰安燾陳睦言已離髙麗國涉海今月乙亥至明州定海縣詔燾等速赴闕二月七日往八月八日即真癸巳御史何正臣言近減罷樞密院檢詳官李深除荆湖南路提點刑獄案深刻薄隂險今為監司士論尤不協聞深妻黃姦穢事在安州適當境上而付以案刺之任實玷朝命望追罷之詔改深知夀州丙申以知明州太常丞集賢殿修撰李定為右正言寶文閣待制同知諫院兼同判國子監戊戌三司言請于糴便司權住糴鈔錢內更撥錢十萬緡應副河北路轉運司乘時收糴軍糧從之詔諸軍排連長行充承局押官無弓刀手者用見闕階數以六分為率先取弩手二分槍手三分次排手一分著為令己亥詔京朝官選人并使臣換文資所試上等第一宜賜進士出身中等稍優與堂除差遣下等與不依名次注官內未出官與出官已出官與免短使無短使者升半年名次此假有脫誤朱墨本同當檢中書時政記吕嘉問言凖詔劾臣違法事聞出于轉運判官何琬舉奏况琬嘗庇受贓吏及自有贓緣為先奏本府違法事須辨正畢方敢舉發而琬乃更以誣臣豈不倒置今琬差官劾臣必選用朋邪害正之人非獨文致臣罪亦使平民橫被考掠煆煉望下别路差官詔應琬所奏嘉問等事令江東轉運提點刑獄提舉司同鞫仍令嘉問具析何從知琬案發事實結罪以聞二年三月六日俞充罰銅東作坊使張之諫為宫苑使就差權知順州權廣南西路鈐轄兼安撫都監緣邉溪洞都巡檢先是以趙卨嘗言順州陶弼衰疾不可倚仗已令之諫權發遣代弼故也庚子同知樞密院事薛向請下提舉糴便所自今糴米粟入官仍依諸軍所請用見錢坐倉收糴從之都進奏院言準傳宣取索自九月以後下江寧府文字令具名件詔應官司不著事因發過文字並下逐處供檢申納中書內曽有挾帶書簡亦盡録同申其臣僚所發私書委開封府下逐家索副本或無底令追省抄録申府繳奏如敢隱匿不盡許人告犯人除名告首賞錢千緡內有官人不願給錢者每三百千轉一資時吕嘉問何琬互奏不法事琬奏才至而嘉問辨論繼上琬以為有從中報嘉問者故詔索所發私書考實也詔諸班直槍弩手闕依舊例人數於親從親事官簡填外餘並簡捧日龍衛弓箭手其廢罷弩手依已得指揮
