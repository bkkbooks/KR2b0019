body:
  text: 續資治通鑑長編卷二百八十五宋李燾撰神宗熙寧十年冬十月己卯罷不拘常制奏辟官惟事干要切者聽仍舊先是同知審官西院竇卞以為言詔從之詔福建轉運司本路槍仗手彊勇出衆為人所推者給口劵差人押赴闕當等第收録即凶惡暴犯而未該編配者再犯情重皆配充鄰路本城卒庚辰上批已差修塞决河提舉官日久今皆在京師未見端緒可令一員先往豫計兵夫宿寨趣什物薪糧有備庶興功之際率皆整辦不至乏事後差判都水監宋昌言學士院言編修內諸司式所送本院式十卷編學士員數并録表疏青辭祝文鎖院敕設宿直之類看詳學士員數繫朝廷臨時除授若表疏青辭祝文或請禱之意不同難用一律况朝廷待學士禮意稍異宣召勑設盡出特恩關白中書樞密院止用咨報不同諸司乞下本所以吏人差補及官物出入之類並立為式學士所職更不編載從之侍讀鄧潤甫陳襄邇英閣進讀因言司馬遷載秦漢以來君臣事迹有不可陳於君父之前者如吕不韋傳之類是也上曰類此者皆闕之勿讀侍講沈季長黃履奏講詩畢請講何經上曰先王禮樂法度莫詳於周宜講周禮詔檢正中書五房公事自今不得倣中書行劄子故事惟中書執政官用劄子以出政令時檢正中書五房公事輒劄送閣門閣門以為言故降是詔客省言于闐國進奉使人婁阿爾斯蘭等有乳香三萬一千餘斤為錢四萬四千餘貫乞減價三千貫賣於官庫從之集慶軍節度使同平章事宗諤坐尅留宗室俸以還已所貸息詔釋其罪右諫議大夫知蔡州吕公孺知永興軍六月八日公孺責蔡州此月十三日彭汝礪云云壬午詔河北路常平封樁斛㪷量減價糶與水災闕食户詔觀文殿學士户部侍郎知洪州王韶落職知鄂州韶謝到任表云為貧而仕富貴非學者之本心與時偕行功業蓋丈夫之餘事又云自信甚明獨立不懼面折庭爭則或貽同列之怒指擲時病則或異大臣之為以至聖論時有小差臣言未嘗曲徇又云陷人君於不義莫如退縮又云曉然知死生之不迷灼然見古今之不變通理盡性雖未能逹至道之淵微立言著書亦足贊一朝之盛美侍御史知雜事蔡確言韶表皆怨憤欲歸過主上而妄為自潔之辭臣嘗被命鞫熙河結糴違法事聞韶屢有爭執大率以朝廷制獄為非察韶之情不過阿庇舊日將校及欲掩其在任弛縱之迹後根究諸州軍公使庫共借結糴錢二十餘萬緡回易取利韶亦有支借百姓劉昌立錢鈔等事朝廷以韶方備位樞府不復譴訶按韶本以邉功驟䝉拔擢其於朝廷政治之要必未有卓然髙論度越羣臣如爭結糴事不獨踈繆又頗挾私則其餘所言臣雖不聞推此可知矣陛下睿知神武羣臣莫望清光規摹言動如韶豈能窺萬一乃敢指斥聖論而又言恐陷人君於不義耶妄自揚已公肆慢上韶必知此表傳播中外因欲欺流俗以盜公直之名乞行黜責故有是命韶既罷樞密言動頗不常上法身三門一篇且云發明自身之學一曰鴻樞獨化之門二曰萬靈朝真之門三曰金剛巨力之門又摹印遍投宰執人以為病狂癸未國子博士勾當雜買場周延年言昨東作坊退賣祭服簮環履襪及三司斥賣長源王佩劒帶臣竊謂凡祭祀之物轉移他用則非所以尊奉神靈故記曰祭服敝則焚之祭器敝則理之龜策敝則埋之牲死則理之示不欲䙝也願下禮官詳定凡天地宗廟社稷山川百神之祀有服器之敝者則焚埋之禮院以延年之言合於經意詔從之知諫院黃履言伏見近日降授胡援王子韶誥辭其略曰當從顯誅以慰言者臣竊謂朝廷黜陟之典係當世天下至公非以慰言者也播之四方虧損事體上批宜如履奏改正其當制舍人錢藻仍上簿詔大河决口官吏不以赦降去官原減下京西京東府界差役兵二萬如不足以禁軍貼役甲申修國史院奏近編修官黃履言國史不須立符瑞道釋志及乞修表竊惟太史公書封禪班固志郊祀范曄志祭祀而歷代之史又有方技列傳然則符瑞道釋亦可以分附於志傳之間不須特立其名又紀傳雖備而未有表今既修之恐不可無也本院看詳齊書有祥瑞志天聖中史官以真宗朝崇建宫觀符瑞屢臻遂著二志以載其事今撰仁宗英宗正史若與舊三朝史别為書則不須著此二志若通為一書則恐真宗朝事無所統繫况未奉朝㫖通修所乞立表欲依履所請詔立表不行餘俟通修國史日别取㫖是時已命宋敏求修公卿百官表而履等不知也御邇英殿講讀時黃履沈季長以講詩畢下殿謝上諭之曰詩言政其詳載於雅頌而奧義尤在末篇卿等發明微意朕甚嘉歎丙戌樞密院言陜西河東相度到團結蕃部法欲依所奏手詔曰夏人所恃以彊國者山界部落數萬之衆耳按其地志朝廷今已據有其半彼用之則并小陵大所向如欲在我則徒能安撫豢養未嘗得其死力豈惟不能用之又恐其為患也故小有悖戾官司惟能以利說解之上下相習畏憚任其縱散久失部勒其近降之法固非所宜知而敢任也然以理言之彼此均有其人而利害遼逺今茍徇邊人衆知所說止於舊法聊改一二則收功疑亦不異往日徒為紛紛無補於事可再下吕惠卿參詳以聞彭孫以廖恩見上諭曰爾罪法所不赦特曲常憲貸爾餘生授右班殿直其黨補授有差又諭彭孫曰廖恩久在福建作過汝能開道朝廷恩意使一方良民不被殘擾特遷兩官彭保遷一官後彭孫言廖恩於武仙場全火首身而彭保令人教恩未須首已奏朝廷乞錦袍金帶乞下開封府根究先是孫嘗乞以袍帶招恩詔給錦袍銀帶各十後開封奏據證逮言保實未嘗教恩上知曲在孫以在赦前特釋之廣南西路經略安撫司言交人遣李繼元等與所差官於界首議事欲令所差官以朝廷恩信曉諭乾德令送還所虜人口給與疆土從之戊子權發遣度支判官右贊善大夫王安上權發遣江南東路提㸃刑獄舊治饒州上以安上兄安石方居閒特詔安上治江寧東軒筆録王荆公再為相承黨人之後平日肘腋盡去而在者已不可信可信者又才不足以任事平日惟與其子雱謀議而雱又死知道之難行也於是慨然復求罷去遂以使相再鎮金陵未幾納節求間地久之得㑹靈觀使居於金陵一日豫國夫人之弟吳生者來省荆公寓止於佛寺之行香㕔㑹同天節建道場府寮當㑹於行香㕔太守葉均使人白遣吳生吳生不肯遷洎行香畢方大㑹于其㕔而吳生於屏後慢罵不止葉均俯首不聽而轉運使毛抗判官李琮大不平之牒州令取問州遣二皂持牒追吳生吳生奔荆公家以自匿荆公初不知其事也有頃二皂至門下云捕人而喧忿于庭荆公偶出見之猶紛紜不已公叱二皂去葉均聞之遂杖二皂而與毛抗李琮皆詣荆公謝以公皂生踈失於戒束荆公唯唯不答而豫國夫人於屏後叱均抗等曰相公罷政門下之人解體者十七八然亦無敢捕吾親屬於庭者汝等乃敢爾耶均等趨出㑹中使撫問適至而聞爭㕔事中使回日首以奏聞於是葉均毛抗李琮皆罷而以吕嘉問為守又除王安上提㸃江東刑獄俾遷治所於金陵魏泰紀此事或不妄然必非同天節若同天節則王安石猶判江寧安上除憲時知江寧者乃元積中非葉均按是年十月六日陳忱自梓漕徙江東何琬自司農丞除判官當是代毛抗李琮十一日王安上除憲二十一日吕嘉問知江寧恐端為安石故一時頓有此除改江東憲本治饒州此據嘉祐驛程今移江寧并當考詳知杭州趙抃言吳越國王錢氏有墳廟在錢塘臨安縣棟宇頽圯林木荒穢欲令兩縣選僧道主管嵗度其徒各一人以墳廟所收地利修葺從之己丑詔提舉江南西路常平等事方澤送審官東院初澤奏請仍舊差三等人户為耆長弓手免出役錢放罷見雇之人而司農寺言免役行之纍年具有成法澤之所請妄謬不知守職故有是命詔判揚州陳升之刺配年小賊人罪特釋之手詔平昌郡夫人同氏先朝選置東宫保視朕躬凡十餘年勤謹小心久而不懈今以壽終可特贈楚國夫人庚寅龍圖閣直學士新知荆南提舉本路兵馬巡檢等事吳中復言先臣名舉乞改為提轄中書擬從其請上批朝廷官稱避守臣私諱於義未安宜不行乃已詔自今舉官者不得舉轉運判官以上知州不得舉通判若走馬承受在任得替及其親戚亦不得舉充本路差遣三月甲戌已降不舉承受指揮俞充分析彭汝礪所言事多自解說詔汝礪具所言充事得於何人詔兩浙監司體究時政記在十三日墨本在十四日今從時政記汝礪言臣伏念天下之材有正則有所謂邪有賢則有所謂不肖人君淵居嚴密無由自察之也於是有耳目之官御史亦因衆人而問焉凡臣之糾摘姦惡非有毫髮為其身謀也實自陛下使之衆人或為臣言亦非有所欲也迫於臣之誠心而已迫以至誠而得之及有所避畏而暴露之而投之罟獲陷穽之中而臣乃獲安焉則臣不惟不容於人亦且得罪於爾有神按歷代名臣奏議作亦且得罪於有司夫廢一官吏非足為朝廷輕重也然官吏以漏言於臺諫而廢則衆皆以前車為戒而外之是非得失無復至於臣輩矣以臣之昏弱不肖而使憲臣盡不得聞知外之是非得失將無以照燭幽暗而彌縫其空缺臣之罪莫大焉臣寧自劾不敢奉明詔充之材行如陛下知之為詳則臣之罪亦自見矣凡臣所居官職皆陛下所豫願并禠奪以警狂易若猶未也願益察之緣臺臣論列非一狀御史中丞潤甫裏行亷亦各有疏乞詢于衆及委官盡公根究如有不實則臣為誣善為殄行竄流荒逺其又何辭又言以下而逹於上以所未信而攻所甚愛皆所甚重臣敢忽諸自充有命御史知雜確首議與中丞潤甫裏行亷及臣各為一狀彈奏既未悟遽用全臺乃以臣開端凡臣所述一二皆師言也陷諸父於刑以妻拜王中正求媚焉如刀溪之事及以相掾賣恩奉使偃蹇凌侮苛刻事自黃亷得之多買官莊鄧潤甫黃亷與臣得之彊貸民蔣潛等錢鄉人投匿名書冒喪赴沈遼宴飲臣與鄧潤甫得之至與鄧潤甫在諫院時所指陳之迹狀王安石韓絳在中書所述之日月蓋無不可察焉臣問之衆人如是問諸百寮如是考諸事如是既已明白故不當問其所聞今陛下所與共天下事者惟一二執政之臣所以是非可否都檢正或參焉使得其人則可以彌縫其缺而告所未至或非其人則竊弄權柄賣鬻恩寵服讒以相傾搜慝以自衛其害亦豈淺哉藉以為不足論如陛下顯擢清選而交結權勢之近貴以幸進用焉則其所養可知藉使臣不肖其言為不足聽然自王安石韓絳鄧潤甫蔡確黃亷其聞與臣皆同則其人可知充逺歸進擢皆知自陛下其戒臣者衆矣臣伏念古者暗主在上其鼎鑊砧斧可以烹斬人之物分布於前而其臣猶或即焉今陛下神知聖德體堯蹈舜而乃挾懷寵之私意蔽可誅之姦惡此非忠臣也臣竊謂天聰明自我民聰明聖人無常心以百姓心為心蓋未有不因於人者今陛下見其有能而臣見其不善以見所能而使之以所聞不善而廢之亦何傷於日月哉且夫先王建設諫彈之名以司耳目亦防其過誤非如俳優焉將以玩之充亦何能而轉因臣言而激拂之則充之用臣實不自安也夫度君之所欲而後言之思君之所能而後進之臣非不能實有所不敢焉夫官職爵位之儻來寄也今日陛下愛之則為士大夫明日逐之則為罪人然所以不敢忘者忠也充不孝罷運判未幾得省判鄧潤甫論吕公孺罷鄆州得永興軍是言之者幾所以興之也公孺自蔡改永興在此月四日所言充事乞詢於衆及委官根究詔兩浙轉運提㸃刑獄司同體量以聞朱本簽貼云後來俞充宋均國分析到别無行遣削去今復存之後二十一日卒罷充都檢正充罷都檢正在十二月五日曾肇銘汝礪墓云神宗用汝礪言故罷充此盛德事也紹聖史官乃削去今復著之辛卯果莊董戩遣人進貢聽寓止同文館癸巳昭化軍節度使宗誼加同平章事封濮國公詔濮安懿王諸子襲封濮國主奉祠事候承襲遍即傳長孫宗誼加同平章事舊紀書之乃不書封濮國公新紀已增入梓州轉運司言瀘州江安縣及安夷寨控扼蠻獠最為險要乞修築城寨從之甲午知桂州趙卨言本州土兵止及二千四百人乞於雍宜融州移雄略澄海指揮土兵二千六百人於桂州置營總五千人團結委官提舉訓練候及一年輪替詔轉運司相度以聞其後本司言錢糧應副可無乏事從之乙未知河陽翰林侍讀學士吕公著提舉中太一宫公著至京師時將祀南郊特詔閣門以散齊日對延和殿勞問周至且曰不見卿七八年殊覺卿老也公著面奏臣伏覩近詔舉才行堪任升擢官竊觀陛下自臨御以來虛心屈已以待天下之士士之起草茅由小官而超至顯近者不可勝數然猶孜孜以求賢為急誠欲廣收人才無所遺棄臣伏思自昔有為之君不借賢於異代然唐虞之際亦稱才難則世固未嘗乏賢而人才亦不可多得今陛下降發中之詔非徒為虗文也中外所舉蓋百有餘人雖不能盡當誠參考名實而試用之宜有可以塞厚望應明指者臣又竊詳今日詔意正欲達所未達然數年以來天下之士陛下素知其能嘗試以事而終就閒外者尚多恐其間亦有才實忠厚欲為國家宣力者未必盡出於迂闊繆戾而難用也漢武帝時公孫𢎞初舉於朝以不稱㫖罷後再以賢良舉帝親擢為第一不數年遂至宰相由是觀之人固未易知而士亦不可忽何則昔日所試或未能究其詳數年之間其才業亦容有進惟陛下更任之事以觀其能或豫之對以考其言兼收博納使各得自盡則盛明之世無滯才之嘆不勝幸甚自熙寧初論新法不附執政者皆譴逐不復收用故公著見上首言之詔秦鳳路轉運判孫逈應承受茶法文字及所聞利害並關提舉茶場司以逈言茶法有未便事乞赴闕奏禀上曰朝廷已委李稷總領其事若從逈奏恐議論乖異責任不一故有是詔丙申詔草澤劉純一决杖刺配沙門島坐狂妄上書言閩南之冦皆出於安南將帥抑黜不用之人聚成羣黨叩心自苦亦非得已竊聞市肆偶語第相默諭皆謂有姦雄無知之徒扇結良民直欲殺大臣而伸已憾法寺言純一罪當流三千里有䕃於法當贖特杖之戊戌許州言太子太師致仕張忭卒忭忠信儉謹退居十餘年葺田廬於嵩陽紫虛谷澄心養氣不問時事耆老而耳目聰眀卒年八十六上輟視朝贈司徒兼侍中諡康節詔於例外更與一人降等恩澤太常丞集賢殿修撰權度支副使張琥太常丞直史館檢正中書五房公事俞充並兼權都提舉市易司司勳員外郎都提舉市易司吕嘉問為司封員外郎直昭文館知江寧府賜錢三百千以嘉問領市易自熙寧九年十年凡收息錢百四十萬餘緡故也吕嘉問自都提舉市易司出知江寧必以王安石故也魏秦所記當得之已具注是月十一日王安上除憲時己亥詔川峽路令佐毋得並差川峽人又詔京東西路增置馬軍十三指揮庚子永國公俊卒年五嵗上悲甚廢朝五日又不視事三日贈太師尚書令兼中書令封兖王諡哀獻於是翰林醫官副使李永昌張昭文以用藥謬誤除名編管永昌隨州昭文唐州餘各降奪有差太常禮院言準禮為無服之殤詔特舉哀成服皇后率嬪御殯普安院永國公以六年四月甲戍朔生皇第三子也九年十二月己丑皇第六子生即哲宗也若永國公尚無恙不應便以元子坐之禮告天地恐永國公卒或在九年十月十七日庚子哲宗未生時非十年十月二十三日庚子也新舊紀皆因實録當考俊墓碑誰作當儉癸卯詔麟州蕃官西頭供奉官閣門祗候髙世忠李保忠各遷一官以河東路經略安撫使韓絳言世忠保忠等捕殺西賊不失期會故也甲辰詔秋考中銓試稍優二人循一資三人與堂除中等十八人不依名次注官下等四十五人注官乙巳詔茶場司許不依常制舉辟勾當公事官三員復永靜軍阜城鎮為縣御史彭汝礪言臣幸以不肖得備數憲府與聞朝廷之議論而其學不根屢辱聖訓乃知堯之道無能名孔子之言性與天道不可得聞而其聞有所未逹不敢諱匿不陳以負盛恩惟陛下加察焉臣聞之凡人莫難於爭臣為人臣則不得有已為爭臣則不得有隱人君我之所天也能制禍福能制貴賤而有過則必正之人臣我所委也非能輕重之非能榮辱之而有姦惡則必言之以至賤應至貴而言其所惡聞之過失以至孤敵至衆而發其所隱之姦惡則危辱怨禍之至如歸焉危辱怨禍不獨其身亦及其子孫夫抱關擊柝乘田委吏皆可以成業而以儻來之名器舍去天下之至安投不測之危禍背違衆人之榮譽而兆無窮之怨惡則其身其計非為其家亦明矣陛下至誠懇惻願治如臣不肖而優容假借慰藉之良厚則知陛下屈意於天下之賢雖古人不能過也聽言之道有所未至者三蓋有所疑有所易有所專此臣之所未喻而不敢諱匿者也臣聞之人君所以交於天地應於萬物者無所不用其誠也在我者無所不用其誠則人之誠亦至焉臣竊聞陛下勵精於事纎悉必躬而不能無疑心臣以為不然周尹言王中正事陛下疑以為中正不能成就蜀中士大夫然後知說者有以焉夫言國恩與鄉里孰重必曰國恩重得於人君與得於人臣孰重必曰人君重違所重而取欺天之罪從所輕而取小人之譽臣子恐不敢如此臣伏思陛下於百官之中取六七人者為諫官御史使得察百官邪正辨天下利害而言之則必以其人為可信也以為可信則任之而不疑以為可疑則去之而不任既任之復疑之既疑之復任之非誠之至也蓋上以疑待下則下亦以疑事上上下之志不交則不足以有成矣陛下所委者外臺也今外臺乞罷免黜逐者日夕不絶使陛下以意度之以為某人為某事言某事為某人言某人按原本作某人言某事為某人今據歷代名臣奏議校正臣知有所不能遍臣非為尹辨恐陛下以是心待天下則賢才如尹者知有所不言矣臣所論多陛下宣諭及所戒飭者則知陛下之意不以不肖為可惡而將告教之也臣雖已銘刻然於義有所未安則其告之亦不敢後也蓋君視臣如手足則臣視君如腹心陛下知足以落天地辨足以雕萬物聖敬日躋方登於堯舜而羣臣區區曽不足以髣佛於五帝之佐其何能仰望清光哉陛下歸視收聽退藏于深宫羣臣猶且縮栗震懾不敢以盡使以明為用則熒熒之火必不能為光矣臣每見陛下之臣稱陛下髙明博厚比於天地論之於古則貫穿歷世而不遺行之於今則周旋萬事而無盡臣下知嗟嘆而已臣獨有疑焉臣前略論市易事䝉宣諭以為不知本末臣誠山野未更於事然臣所以事陛下其嚴如天凡所欲言稽之古參之今聽之民謀之士大夫反覆至於無不同而後言少疑則闕之十至於八九焉則於本末之際不敢言不知也陛下試盡察之而少賜寬閒之燕使臣得指畫於前而少容盡其區區之愚則臣之言必有以當聖心者蓋天下之人散之則愚合之則智故曰君子之道造端乎夫婦夫婦之愚非足以言於君子有取焉以其有所長而已不以其不足聽而忘之也如臣昏暗未諭指數其言不善固不足道惟陛下以誠心待之則言有善於臣者不得疑之矣臣嘗言之曰是非在於衆人則衆人共之利害繫於天下當與天下共之蓋雖人主有不得專也吕嘉問之姦欺險諛自大臣至於僕圉之賤自朝廷以至於四海之逺蓋無不聞知所以愛憐而不忍去者獨陛下而已夫人君之於人臣固有所謂庸之者能有益於國而於民為損能有利於臣而於民為害皆非先王之所庸也傳曰民功曰庸則先王之所以庸之者以民為主而已夫辟土地以彊國實府庫以富國以今言之如所謂才也而孟子以為民賊况嘉問上欺陛下下欺民實未有以益國羣臣言之愈切陛下持之愈固臣未知所謂也夫嘉問區區實不足數為陛下道然陛下以是待天下之士是害有甚於嘉問者陛下有不得知矣有所疑似乎不能毋意有所易似乎未能毋我有所專似乎不能毋固凡此皆非微臣所望於聖學也有所疑則忠信之士不至有所易則禮法之臣不勉有所專則正直之言不進忠信之士不至則所遇者譎詐而已禮法之臣不勉則所任非所嚴者矣正直之言不進則過有不得而知矣此不可不戒也臣聞之治國猶治疾不能望而知之聞而知之亦可矣不能聞而知之脉而知之亦可矣知疾在一支則治一支在一體則治一體以一支體為不足憂則嵗時日月之變外有傳之內小有積而大四支百體病有不可勝治矣臣竊惟陛下剛健不惑日勵精於事天下指日數月以望唐虞成周之太平今有為十年矣而事功未至於成就而其弊有加焉凡此疑皆言路不通之過也惟陛下加察焉貼黃臣性不能書而所言事多親得於德音不敢宣露以取漏言之誅故自繕寫以進字多不真謹惟陛下裁恕汝礪章不得其時十月二十一日吕嘉問出知江寧今附十月末周尹罷御史在九月十六日尹言王中正事當考十一月戊申朔詔知審刑院崔台符録問濬河司公事命官不以輕重吏人徒以上皆不以赦原巳酉詔右千牛衛將軍世奬等五人免追官勒停聽罰金坐私接賔客罪至徒二年上特寬之庚戌詔自今命官犯公罪不至追奪而去官尚當論罪取㫖者録問訖勿禁留仍知所在屯田員外郎劉定奏䝉恩罷歸今被差通判和州臣纍奏暫留衢州實欲扼賊奔衝以衛二浙今賊敗降亦或由此上批定纍奏辨明可坐以擅留禁兵遷延不即討賊罪狀劄與令知五月丙子劉定以檢正體量福建災傷八月癸未責衢倅此據朱本新本削去辛亥李憲言奉職劉戒屈萬寧吳猛有戰功武藝引試延和殿萬寧猛皆不應格上以有戰功遷一官詳定編修諸司𠡠式所上所修𠡠令格式三十卷詔頒行之龍圖天章寶文閣四延福宫一起居院一四方館一玉牒所一入內內侍省合同憑由司二翰林圖畫院二提㸃內弓箭南庫并內外庫二後苑御弓箭庫一入內侍省使臣差遣四內侍省使臣差遣三御藥院二在內宿直人席薦一此據㑹要與藝文志十一月四日事甲寅詔都提舉市易司上界本錢以七百萬貫為定額如不足以嵗所收息補滿其先借內藏庫錢嵗以息錢二十萬貫還之又詔羣牧司選馬七十二匹賜雄州容城歸信縣闕馬弓手乙卯詔東上閣門使知岷州种諤西上閣門使熙河路鈐轄韓存寶各賜銀絹二百部將莊宅使郝貴等五人各減磨勘三年以南川寨禦賊有功也詔髙陽關路副總管六宅使帶御器械卞贇落帶御器械都監供備庫副使劉晟監押西頭供奉官張孝傑各追一官勒停第七將衛進安撫使張景憲各罰銅二十斤始髙陽關募兵契丹隂遣北界刺事人應募主司不察定州路安撫使薛向諜知之吏懼罪縱使亡去向使人入北界誘捕得之聞於朝械送瀛州戮于市故景憲等坐責罰上賜向詔曰卿本部事修鄰道失姦又能捕致方之諸帥實罕其儔詔復都官郎中分司西京謝景初權蕃郡通判權通判保安軍李杲卿任滿取㫖以知樞密院事馮京言景初等以在蜀燕飲事被劾得罪臣時在中書始謂景初等事狀無可疑者及去嵗至蜀訪之當時官吏謂事出中昧而怨仇之人造成其罪今若别加推鞫則當時證逮多或不存重為煩擾望憫其久廢不循常格牽復任使故有是命詔河北京東西淮南等路出夫赴河役者去役所七百里外願納免夫錢者聽從便每夫止三百五百丙辰軍器監言天下軍器五路已編排修完其餘諸路欲令隨州郡大小次第編排以五千人至千人為額從本監量定年限於都作院修選委監司或提舉司官一員提舉㸃檢從之詔曾公亮依外任使相陪祠例支賜西作坊使辰州刺史世爽卒手詔世爽自陳補外依在內宗室贈青州觀察使北海侯自陳補外在熙寧四年九月戊午以左龍武大將軍筠州防禦使宗景為懷州防禦使先是手詔相王允弼皇家近屬先帝敦伯父之愛眷顧加禮逮朕纂承以行尊諸祖待之尤所致恭今宗繢云亡宗繢卒於是年七月諸子尚列環衛非所以稱王昔日親膺光寵之意王之子宗景於今為長宜特遷一官故有是命宗景允弼第三子也己未代州言北界西南安撫司牒稱去年九月南軍擅入當界燒毁劉滿兒田禾等舍屋請嚴行誡約及追取價直上批此與真定壤界若不明指照據速定分畫即含胡日久又成爭端乃詔安燾親詣真定窮究即具所檢北人所種田土燒毁因依仍選官照驗案籍具侵與不侵省界及當分界去處畫圖以聞後來如何當檢附賜河北東西修城役兵特支錢有差庚申廣南東路經略司言占城進奉人皆是與交趾往來之人今令詣闕慮雜姦細其間難以識察乞只令廣州下卸詔依例發遣赴闕詔三司具陜西新法鹽鈔入過斛斗比舊鈔時入過若干并取沿邊州軍八年九年分錢逐季及見今新法鹽鈔在市買賣實價以聞王圭會要十年十一月十三日事實録無此今增入要見比較如何辛酉以昭宣使嘉州團練使入內副都知王中正領果州防禦使初樞密院奏中正當磨勘上以其有軍功故特遷之仍詔自今兩省都知押班已轉至觀察使如該磨勘雖有功止遷使額其有特㫖者令樞密院執奏新紀書詔兩省都知押班已至觀察使如年勞及有功止轉使額雖有特㫖令樞臣執奏舊紀不書中正傳云至福建捕賊廖恩降詔提舉教閲在京馬軍遷果州防禦使其至福建在七月提舉教閲軍馬九月二十三日可考詔雍州觀察使宗暉權奉祠濮安懿王神主壬戍以成都府利州路鈐轄客省使狄詠為西上閣門使用去年十一月癸酉詔也廣南西路經略司言交趾上表犯廟諱已退回詔收接附遞奏武學奏學生賀平隨無黨武藝精熟引試延和殿並補三班借職詔支錢六十萬貫分給陜西轉運司乘歲豐市運儲癸亥録撫接董戩般擦出漢功宣政使宣州觀察使李憲賜衣帶韉馬及與一子轉資客省使達州團練使熙河路鈐轄王君萬為本路都鈐轄內殿承制張承鑑轉兩官餘遷秩有差戊辰吳充言臣與判大名府文彥博為姻家今治濬河公事而彥博在中有司方讞獄上臣乞免簽書從之復州録事參軍萬延之奪一官皇城使閻士良奪兩官並勒停延之坐託監雄州𣙜場官吏買物帛士良報上不實也己巳廣南西路轉運司言九道白衣李聚明等探到交趾事狀詔自今如九道白衣至令經略司優加撫納嘉其向化之意庚午以西蕃邈川首領董戩都首領青宜結果莊為廓州刺史鄂特凌古為松州刺史大首領巴勒藏達爾結等四人並與郎將小首領一人與副軍主特用進奉首領赴闕例也辛未齊于大慶殿壬申薦饗景靈宫癸酉朝饗八室甲戌冬至合祭天地于南郊以太祖配大赦天下赦日合刪取
