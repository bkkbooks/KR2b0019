body:
  text: 續資治通鑑長編卷二百二十七宋李燾撰神宗熙寧四年冬十月壬子朔中書言選人每因恩赦例與放選以至奏補初仕之人年二十五以上試詩一首方許注官猶為無取其間有才能者須俟及年頗為淹滯中才以下亦未嘗試其所能使之釐務往往廢職及銓曹合注官人例須試判三道因循積弊遂成虛文今欲應得替合守選人嵗限二月八日以前流內銓投狀試斷案二道或律令大義五道或議三道差官同銓曹主判官撰式同考試第為三等申中書上等免選注官入優等者依判起例升資無出身者賜出身如試不中或不能就試者及三年與注官即不得入縣令司理司法其録事參軍司理司法仍自今更不試判亦不免選即歷任有舉京官職官縣令五人者與免試注官內得替合叙官人亦許依得替人例收試奏補京朝官選人初出官罷試詩年二十以上許投乞試如所試依得放選等第即與差遣優等賜出身試不中或不能就試如年及三十者即與差遣其授官年已三十即更三年聽出官京朝官展三年監當如歷任於合用舉主外更有二人即免展年其今年以前奏授見年十五以上不能就試者依舊條京朝官依上條展年從之初審官院流內銓出官法試律及詩而奏補人多不能為之人為代作至寫紙毬賣之試者用此得出官其弊頗多至是乃更此法新舊紀並書立選人及任子試出官法選舉志云至是更法上自取其優等擢賜進士用王沇之為太學官於是世祿胄子皆勉於學附見當考是日頒募役法舊紀云壬子詔差役弊民其罷之使民出錢免役立直募人新紀云壬子罷差役法使民出錢募役今刪潤别如此書食貨志二年十二月條例司上言考衆所論獨其言使民出錢雇役者人以為便合於先王使民出財以祿在官庶人之意應昔於鄉户差役者悉計産賦錢募民代役以所賦錢祿之願選官分行天下付以條目博盡衆歡奏可於是條論諸路曰衙酬衙前者既用重難分數凡買撲酒稅坊場等舊以官自賣之以其錢同役錢給其廂鎮場務之類舊酬奬衙前不可令民買占者即用舊定分數為投明衙前酬奬凡衙前部水陸運舊或官以微物占分數及領倉驛場務公使庫并送迎往來及治他事尚多擾者今當省使毋費及承符散從官等諸重役逺接送之類舊苦煩費償缺今當改法除弊使無困既減衙前妄費即重難益少投名人可省承符散從官之類舊占數多而不盡實役也今當省其額凡坊郭户及未成丁單丁女户寺觀品官之家有産業物力者舊無役今當使出錢以助募人應役凡此所為條目也皆委管勾官與監司州縣論定久之司農寺言昨降詔訪差役利害繼命輔臣制置條目付管勾官與監司州縣體度利害至今未報竊以方今州縣差役尤為民事之難而今之條約務在除去宿弊使民樂從然所寬優者村鄉朴蠢不能自達之窮氓所裁取者乃仕宦并兼能致人語之豪户若經制一定即衙前縣吏又皆無以施誅求巧舞之姦故新法之行尤所不便逐司自降朝㫖只是泛下州縣令人具所見官吏既不能盡知法意抑又惑於言者之多築室道謀難以成就欲自司農申明所降條約牒諸司相度先自一兩州為始候其成就即令諸州軍倣視施行其成法實便百姓者奬之從之所寬優及所裁取等語見吕惠卿家傳然則此奏當在惠卿三年五月十七日判司農後九月一日丁憂前家傳云云附五月十七日於是提㸃府界公事趙子幾以用則奏上上下其法司農寺詔判寺鄧綰曽布等更議之綰布上言畿內鄉户計産業若家資之貧富上户分甲乙五等中户上中下三等下户二等坊郭十等歲分夏秋隨等輸錢鄉户自四等坊郭自六等以下勿輸産業兩縣有者上等各隨縣中等併為一輸析居者隨所析若官户女户寺觀未成丁減半募三等以上稅户代役隨役重輕制祿祿有計日有計月有計事而給者開封縣户二萬二千六百有竒歲輸錢萬二千九百緡以萬二百為祿嬴其二千七百以備凶荒缺格他縣倣此鄧綰舊傳云綰判司農首請行免役於府界一日而免衙前歸農者八百二十餘人已附注正月二十二日又言曰差役之弊衙前最重役三歲一代代滿五年已復差每役費至千緡他役不減三二年一差費亦不下數百千吏得臨時髙下強者終身茍免弱者頻年在公以鋤耰之人身在城市不得安生因成遊惰失古使民不見異物而遷之意子弟雖欲興學外役所迫不免笞杖坐廢終身不肖子弟因緣妄費至於蕩析今輸錢之法極户十年輸緡錢二百五十其次八九十而已比昔減過半得免橫費無笞責之憂且終身不事官府以趨南畝奏可然輸錢計等髙下而户等著籍昔緣巧避失實又詔責郡縣坊郭三年鄉村五年農隙集衆稽其物産考其貧富察其詐僞為之升降用意髙下者以違制論衙前主帑藏出納姦盜故多負債歲滿計所歷輕重酬以𣙜酤酒場使自售收其贏能者收或倍稱民被誅刻不能者失利不償所費爭訟日煩乃收酒場官自募人增直賣之取其價以給衙前議者又為役煩人衆則出錢重凡舊冗占苦科配賠償之類悉加裁禁倉驛場庫水陸運漕多代以軍校吏之官罷任送迎者疲於道路乃官給路費免其身行使出錢輕而人易就募法三人相任衙前仍供抵擬弓手試武藝典吏試書計以三年或二年乃更為法備具揭示一月民無異辭著為令令下募者執役被差者歡呼散去開封一府罷衙前八百三十人畿縣放鄉役數千頒其法天下天下土俗不同役重輕不一民貧富不等縣大民庶而富輸錢少易募僻而貧輸多難招然大縣事衆役煩募直故多縣僻事簡役少募直亦寡以一州一縣之力供一州一縣之費以一路之力供一路之費諸路從所便為法開封府衙前免歸者八百三十人已具注五月二十二日本志係此段於二年十一月此後乃叙王安石乞奬梓路漕臣按奬梓路漕臣乃三年十一月二十八日條例司乞選官分行天下實録在二年四月二十一日於是遣八人者出使但實録不載本志所謂條目者六月七日條例司又乞下諸路轉運司各具利害即無選官分行等論當考本志所載司農寺言管勾官與監司州縣至今未報不知是何月日實録九月七日條例司言未見有能條具本志者即是已報但不詳耳志稱未報當在六月七日以前然二年六月七日以前役事未屬司農寺按吕惠卿三年五月十七日同判司農役事自此乃屬司農七年二月一日惠卿再判司農趙子幾為府界提㸃在三年十二月八日則志稱子幾奏役法當在三年十二月八日後曽布同判司農在三年九月八日鄧綰判司農在四年正月二十二日志稱綰布同上言則其言必在四年正月二十二日後賣坊亦未見實月日當考實録載免役事殊無次序今因本紀於四年十二月二日書罷役法使民出錢募役即取本志所載條目等附見須更詳考曽布奏改助役為免役附見三年九月八日恐太早宜更詳之㑹要十月一日頒募役法諸户等第輸錢免其身役官以所輸錢立直募人充役輸錢輕重各隨州縣大小户口貧富土俗所宜謂以家業錢或田畝或稅錢之類計一歲募直及應用之數留凖備錢不得過一分立為歲額仍隨逐處均敷至第三或第四等不足聽敷至第五等坊郭自隨逐處等第均定即貧乏而無可輸者勿敷其户數多寡敷錢則例隨造簿增損不得溢額其後天下上司農寺嵗敷免役錢額月為緡錢一千三百三十四萬三千六百有竒嵗支九百二十五萬八千五百有竒餘為寬剩三百八萬五千有竒按㑹要所載募役法乃據紹聖常平免役今增入令文蓋以紹聖元年四月二十六日至二年五月三日敇詳定非熙寧四年十月初一日所頒也今不取甲寅大燕集英殿丙辰樞密院編修經武要略祕書丞館閣校勘王存著作佐郎館閣校勘陳侗大理寺丞劉奉世前秀州崇德縣令蘇液並檢詳樞密院諸房文字存兵房侗禮房户房奉世吏房液權同兵房侗奉世仍改太子中允液改著作佐郎禮遇添給日直人從出謁之禁視中書檢正官帶館職及本院編修文字依舊餘差遣並罷既而存以母老辭改差祕書丞朱明之新舊紀並書置樞密院檢詳官丁巳樞密都承㫖李評言應諸國朝貢請别置一司總領取索諸處文字類聚為法式從之仍令管勾客省官置局庚申召輔臣觀稻于後苑司封郎中直集賢院張詵權發遣陕西路轉運使兼制置解鹽召對上曰朕不識卿每閲章奏獨卿與蔡挺有所論請令人了然陛辭賜三品服且曰非晚當屬卿以事恐詵對非此日今附見明年二月三日張琥落職祠部即中權陕西轉運副使趙瞻知涇州同列欲更置漕事與瞻議不合故有是命既而瞻所議與事相應乃復以瞻為轉運副使此據范百祿墓志范祖禹墓碑所稱同列未詳姓名當考漕事或是司馬光日記王泰事也當考日記云介甫秉政鳳翔府民獻䇿云陕州南有澗水西流入河若疏導使深又鑿硤石使通穀水因道入河東流入榖水自穀入洛至鞏復㑹于河以通漕運可以免砥柱之險介甫以為然敇下京西轉運司差官相度京西差河南府户曹王泰泰欲言不便則恐忤朝廷獲罪欲言便又恐為人笑乃申牒言今至穀水上流相度若疏引大河水得至澠縣境導之入穀水委實利便可行蓋出澠縣境則硤石大山屬陕西路故也陕西言不可行乃止御集四年十二月九日永興軍三白渠昨差大理寺丞侯可專切經制至今都不見可否次第宜令監司衆寺契勘元差官施行此當并考利州路轉運判官屯田郎中鮮于侁權發遣轉運副使初詔諸路監司各定助役錢數轉運使李瑜欲定四十萬侁以為本路民貧二十萬足矣與瑜議不合各具利害奏上是侁議因以為諸路率仍罷瑜而侁有是命本傳云即罷瑜蓋因范鎮墓銘按瑜尋入判三司都理缺慿由司其罷蓋不久五年五月七日丙戌王安石云云可考侍御史知雜事鄧綰言利路役錢歲用九萬六千六百餘緡而李瑜率三十三萬緡有竒均役本以裕民而瑜乃務聚斂積寬剩提㸃刑獄周約亦同簽書乞重絀以警諸路瑜及約皆坐責尋復之此據綰傳及舊史食貨志云上怒黜瑜約按五年五月七日王安石云云則兩人實嘗罷差遣但實録不書瑜尋入三司約為提刑如故至五年四月二十一日方降官今但云坐責庶不失實仍録志附注此食貨志云於是諸道役法各以書來上司農御史中丞鄧綰言免役之法所以裕民而官吏奉行或不明朝廷役法本意往往多取寬剩役錢臣恐上澤不得究宣良法自此隳壞今利州路轉運使李瑜所為役法本路役錢正用九萬六千六百餘緡而瑜擅科錢二十三萬七千一百餘緡計剩錢十四萬四百緡皆率易措置不酌民情不量州郡貧富增損亡法今所奏書皆未便提刑周約亦同簽書請速擇人代之上怒黜瑜約告天下使明知法意按志云諸道各以役書來上司農御史中丞鄧綰言按綰時且為知雜事未為中丞本志誤也今改之志言李瑜所科役錢數又與范鎮墓銘不同姑存之綰又言司農寺法災傷第四等已下户應納役錢而飢貧者委州縣聞于提舉司考實以免役剩錢內量數除之臣以謂王者賦役斂弛皆以為民豐穰則取饑饉則與為政之實也借或下户役錢一千以分數各減一二百及二三百者減三五十亦不免赴官輸納豈有所濟當立為信令凡遇凶歉使諸路如蠲放稅賦法不待奏禀歲小飢則免最下等户中飢則免以次下户免訖以聞示信於民如此則凶年有施舍之惠法令無動搖之變矣從之此據食貨志附黜瑜約後恐自有月日姑著此徐考之癸亥知制誥王益柔罷兼直學士院以草髙麗國答詔非工也知制誥曽布兼直學士院司馬光日記云才元子容得外容勝之以故事餞之和叔曽布皆不赴明日中書送舍人院吏於京府杖之曰何為擅用官錢餞外官中書熟狀董戬以明堂恩加光祿大夫食邑二千户學士院奏董戬舊階特進食邑二千五百户上以讓中書曰非學士院覺舉幾為外國笑其檢正官皆上簿堂吏皆責降由是諸檢正皆怒責勝之以不申堂而直奏罷直院甲子詔陕西諸路熟户蕃部及弓箭手自今委管勾蕃部使臣量力厚薄什伍為保許於逐路封樁錢內請借以助其急春散秋斂千錢出息二百其闕少器甲鞍馬之類無力置者準此毋限以數先是詔經略司相度利害至是樞密院著為法行之樞密院言嶺南使臣身殁瘴癘者舊録用其子孫近制裁賜銀而已請自內殿承制以下任嶺表滿歲遷官者遷官赴任減三年磨勘者到任一歲遷官替日先令指射優便差遣如此則人情樂行逺方不闕正官從之御史蔡確言韓縝落分司差權判吏部流內銓縝性剽戾所至殘酷乞追改敕命不報尋命縝與同提舉諸司庫務沈起易任又令縝兼判流內銓兩易在此月戊辰兼判在己卯縝七月丙戌分司林希野史云縝分司不數月召判銓牽復最速王安石德其助王韶故也劉摰云云已附注彼龍圖閣直學士韓贄提舉仙源縣景靈宫太極觀從所乞也乙丑檢正中書户房公事章惇言陕西路每歲支移稅賦蓋欲實儲於邉郡然臣體問所支移緣邉穀才十萬餘石草二十四萬束所省不過數萬緡而一路為之騷然若令乘賤廣糴當無事時使兵馬就食近裏州軍即緣邉軍儲自然充積請罷支移以寬一路民力詔判永興軍曽公亮詳所奏如實即速關轉運司罷支移丁卯詔樞密院入內內侍省內侍都知押班并帶御器械係外任差遣時暫到闕者除有㫖及兼領在京司局並供職外每日起居退更不供職從閣門所請也㑹要載此事今附見閣門申請此據王安石五年七月二十一日日録李評為程昉故有此舉當考詔內侍省內臣非禁中祗應及入內省人數寖多自今前後省內侍官至承制崇班內常侍許進一子與下班殿直三班差使內侍省東西頭供奉官殿頭許進一子與茶酒班殿侍髙品髙班黃門許進一子與下班殿侍諸班內品更不許進入內內侍省所管諸班內品每年通計進五人入內供奉官以下至黃門願進外官者比內侍省第加一等推恩內臣諸司使副自今止許奏子充前班上語樞密院曰方今宦者數已多而𨽻前省者又不入內空絶人之世仁政所不取且獨不可用三班使臣以代其職事乎吳充對曰此曹盛衰前代或繫興亡聖朝固無兹慮然仁君重絶人繼嗣盛德之舉也詔三司給絹七十萬賜陕西為常平糴本仍召人供抵當賖買於本路輸錢戊辰中書言近制增廣太學益置生員除主判官外直講以十員為額每二員共講一經委中書選差或主判官奏舉其生員分三等以初入學生員為外舍不限員自外舍升內舍內舍升上舍上舍以百員內舍以二百員為限生員各治一經從所𨽻官講授主判官直講月考試優等舉業上中書學正學録學諭於上舍人內逐經選二員如學行卓然尤異者委主判及直講保明中書考察取㫖除官其有職事者受官訖仍舊管勾候直講教授有闕次第選充其主判官直講職事生員並第增給食錢從之舊紀書詔太學養士無論選升降之法外舍升內舍內舍升上舍具為令新紀書立太學生內外上舍法司馬光日記云諸直講盡代去以舊國子監為內舍武成王廟為外舍錫慶院為上舍上舍生百員內舍倍之外舍無員凡入學者先就外舍每春秋考試合格者升之內舍內舍升之上舍上舍若有秀出者中書覆試除官且令在學遇直講或外州教授有闕則補之又以朝集院為錫慶院天聖尼院為朝集院按改錫慶朝集院附此月己卯己巳江南西路提㸃刑獄陳倩轉運判官金君卿等言體量知洪州祕書監集賢殿修撰榮諲老病文書皆不簽押詔徙知舒州以右司郎中李師中知洪州仍令劾諲不職事狀以聞轉運使徐億考諲課上等候案到取㫖㑹諲卒庚午手詔近纍降指揮陕西河東諸路止絶漢蕃民毋與西賊交市聞去冬今春出兵之際稍能斷絶自後無復禁止近方令回使議立和市茍私販不絶必無成就之理及未通和間使賊有以窺測我意可申明指揮下逐路經略司同修起居注曽孝寬言相度到諸班直諸軍牧馬乞不下槽牧放許民出租請佃牧地及合立條約等利害詔馬自來年更不下槽牧放其五箇月合支草料令三司速計置內外班直諸軍馬舊以夏初出牧迄八月上槽凡軍士之有馬者利其草粟之餘與傔衣糧舉族護視之及其出也數馬一圉人出而未至牧與自牧而歸者常數日草粟無所給方其在牧晝縶之於棚而不得卧休夕就野而牧卒有震雷風逸不知所在有得之數十百里之外雨潦霜露之不時而感寒疾往往而斃者十常三四被病而歸死槽櫪與納换者不在數圉人歲被榜罰者常以千數又牧地多占良田園又侵擾閭里棚井科率無寧歲公私苦之故命孝寬比較相度及詔下人以為便計租入以補草粟猶有羡也自內外班直至有羡據密院時政記又云百年積弊一朝而除者由上斷之不疑也今削去其後上論政事王安石曰牧馬每數年蕃息輒復遇災耗減吳充曰此以不下槽故無耗不然死者衆矣而論者以草地租不足以補上槽芻秣之費安石曰以草地給耕者則所收穀非但官租而已昔人用兩石粟易一石秕以養鴈鶩重食故也今賦牧地與民耕以廣民食則芻秣雖稍損於公家不足惜充曰見租已可芻秣九分之費而未租之地尚多也此段因朱史蓋日録云爾更詳之壬申前武昌軍節度推官王安國為崇文院校書安國常非其兄安石所為為西京國子監教授溺於聲色安石在相位以書戒之曰宜放鄭聲安國復書曰安國亦願兄逺佞人也官滿至京師上以安石故召對謂安國曰卿學問通古今漢文帝何如主也對曰三代以後賢主未有如文帝者上曰但惜其才不能立法更制爾對曰文帝自代來夜入未央宫定變故於呼吸俄頃之際諸將故武夫皆脅息待命恐無才者不及是然能用賈誼言待羣臣有節專務以德化民海內興於禮義幾致刑措使一時風俗耻言人過則文帝加有才一等矣上曰王猛佐苻堅以蕞爾國而令必行今朕以天下之大而不能使人何也對曰王猛睚眦之忿必報專教苻堅以峻刑法殺人為事此必小臣刻薄有以誤陛下者願専以堯舜三代為法理順而勢利則下豈有不從者乎又問安石秉政外論謂何對曰但恨聚斂太急知人不明耳上默然不悅安國初召對人以為必得經筵由是别無恩命久之乃得館職安國嘗力諫安石以天下洶洶不樂新法皆歸咎於兄恐為家禍安石不聽安國哭於影堂曰吾家滅門矣又嘗責曽布以誤惑丞相更變法令布曰足下人之子弟朝廷變法何預足下事安國勃然怒曰丞相吾兄也丞相之父即吾父也丞相由汝之故殺身破家僇及先人發掘邱壟豈得不預我事邪此據安國本傳及司馬光記問刪修林希野史云富弼知河陽陳襄為屬縣弼甚禮之富自并門入相襄在京師迓富於中牟安石笑曰以道事人乃若是邪自是薄之及安石執政士夫伺從閣下諛佞百端安石喜之為賢隨其佞媚厚薄量授官職有日至而夜不出者有間日而至者有安石據厠而見之者平時故人以道義相期者由是漸疏小人讒曰此乃立異者安石果怒書至不省來亦不見其弟安國學業文章與安石相上下任氣強悍論事未嘗少屈安禮夸誕澆薄尤能卑辭以結雱安石於上前譽禮而毁國二人召對國不霑一命禮即日改命充校書章望之曽鞏孫侔三人者忘形之交其詩書相贊美天下皆傳之安石既相佞媚者日進而三人者猶如平時以語言詆忤之書至不復視徑抵於地布見其兄書未發封者懷之而去望之將死為書諂安石且祈賙其後安石大笑曰羣兒妄為爾國從旁曰望之二字似其手迹曷少賙之安石不答左右目其僕使急去案希所云國不霑一命禮即日改命充校書此必誤國除校書乃四年十月壬申禮除校書在五年正月乙酉當是安國初對别無恩命久乃除校書司馬光所云蓋得其實非禮除校書在國先也姑附注此曽布匿其兄鞏書及陳襄迎見富弼並當考講義曰安石之學尚不能同其弟况使天下同己乎雱以父之道光於仲尼安石以子之賢為崇政殿說書子聖其父父賢其子而謂他人皆為流俗宜哉丙子命太常丞檢正中書刑房公事李承之察訪淮南兩浙路常平及農田水利差役事因便體量近降鹽法發運監司及州縣施行次第有無未盡利害以聞究竟如何承之察訪㑹要在九月二十八日今從實録舊紀書丙子中書檢正官李承之察訪淮南兩浙路新紀不書詔虞部郎中權發遣理缺慿由司張宗道駕部郎中權發遣户部判官王休復屯田郎中三司勾當公事胡宗道並送審官東院以御史蔡確言其不材故也日録五年五月六日更詳之樞密副使吳充言竊見在京及諸路州軍斷配軍民其中多為寒餒所迫冒犯刑辟竄伏他所或遇冬寒上道被創露肌膚得活者十無一二國家緣情立法重輕具有常科茍元犯止於配流而必置之死地殆非聖朝好生欽恤庶獄之意欲乞自今雜犯配軍所坐不至巨蠧者每遇十一月後斷刺訖且留本處工役至二月即遞送所配州軍其已配未發遇恩降並依元斷如願便之配所者亦聽首獲逃軍當遞還本所者準此從之舊紀書詔罪人遇冬流配者至中春乃遣新紀因之丁丑提舉諸司庫務勾當公事右贊善大夫吕嘉問權發遣户部判官編修刪定南郊式詳定庫務利害戊寅手詔天下州軍上供兵器在仁宗時嘗有指揮上罷有司奉法不謹逮今時有至者又率皆苦惡枉費牙錢運致其令司農寺取索上供所在一切罷之己卯侍御史知雜事鄧綰言國家治平百餘年雖有國子監粗容春秋釋奠齊庖之室其中不足以容一生員至於太學即未嘗營建止是假錫慶院西北隅廊屋數十間逼窄湫陋生員才滿三百人即無容足之地又官司未嘗葺治致使生員自相率斂以葺補傾漏因此限其員數不令過三百欲乞賜錫慶院以為太學仍修武成王廟以為右學上以擬三王四代膠庠序學東西左右之制下則無後於漢唐生員學舍之盛詔將作監丞宋靖國權發遣户部判官吕嘉問相度以聞後靖國等言準詔改錫慶院為太學修武成廟為右學臣等今相度取太學錫慶院朝集院殿前都虞候廨舍為上舍內舍外舍講堂及掌事人齊舍自朝集院西廊以東通殿前都虞候廨舍及天聖院為錫慶院朝集院從之以錫慶院廣太學舊紀在十一月丁酉新紀因之今并書庚辰詔自今吏民犯杖以下情可矜者聽贖錢以充助役不當贖而贖者監司糾正之詔瀘州合江進士鮮于之邵令本州給錢五十千乘驛赴闕委中書召問量材録用以侍御史知雜事鄧綰言之邵嘗進本州差役利害文字其陳利病皆可施行故也樞密院請降宣下汴口踏逐來年開汴口處上批近差楊永釗周良孺同勾當汴口使臣踏逐就用舊處中書已施行此宣更不須降仍自今責令都水監遵守祖宗以來汴口每歲隨河勢向背改易不常其處於春首發數州夫治之河隂同提舉催促輦運都官即中應舜臣上言汴口得便利處可歲歲常用何必屢易公私勞費蓋汴口官吏欲歲興夫役以為已利耳今訾家口在孤柏嶺下最當河流之衝水必不至乏絶自今請常用之勿復更易或水小則為輔渠於下流以益之大則開諸斗門以泄之王安石善其議擢舜臣權發遣鹽鐡判官於是汴口即用舊處應舜臣未詳何許人四年六月自河隂提舉催促輦運與提舉諸司庫務勾當公事賈􅀈並權發遣鹽鐡判官據司馬光日記云王安石善其議擢舜臣權三司判官即此事也詔汴口即用舊處此據御集在十月而空日今附月末五年五月十三日周良孺遷官可考是月廢漢陽軍為漢陽縣漢川縣為鎮並𨽻鄂州省恩州清陽縣入清河又省慶州華池樂蟠二縣置合水縣河溢衛州正供掃此據河渠志十月事
