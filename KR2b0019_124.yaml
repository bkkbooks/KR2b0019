body:
  text: 續資治通鑑長編卷一百二十宋李燾撰仁宗景祐四年春正月戊寅賜蔡州學田十頃壬午命侍御史知雜事姚仲孫同詳定茶法詳定茶法所請自今商人對買全買茶每一百貫六十貫見錢四十貫許金銀折納從之詔禮部貢院諸州軍貢舉人數多不均宜約舊額增損以聞龜兹國沙州並遣人貢方物乙酉免南平軍瑞陽鍚務所欠鍚三萬九千餘斤丙戌詔天下獄有大辟長吏以下並聚廳慮問有翻異或其家訴寃者聽本處移司又不服即申轉運司或提點刑獄司差官别訊之又諸路提點刑獄朝臣給當直兵士三十人武臣二十五人甲午內藏庫主者言嵗裁出緡錢六十萬以助三司蓋始於天禧三年十二月時詔書切戒三司毋得復有假貸自明道二年距今才四年而所借錢帛凡九百十七萬二千有餘請以天禧詔書申飭之奏可乙未詔應祖父母父母服闋後不以同居異居非因祖父母財及因官自置財産不在論分之限又詔士庶之家應祖父母父母未葬者不得析居若期尚逺即聽以所費錢送官候葬日給之此法祖今為律令故録之庚子賜龜兹國佛經一藏二月丙午賜河北緣邊諸軍緡錢己酉祔葬章惠皇太后於永安陵之西北隅初殿中侍御史張奎請親祀髙禖下禮院詳定庚戌禮院上其儀詔從之壬子洪州别駕王蒙正除名配廣南編管永不録用初其父婢霍撾登聞鼓訴蒙正誣其所生為異姓以規取財産及置獄益州鞫之并得蒙正嘗與霍私通事故再貶之其女嫁劉從德詔自今不得入內及它子孫不得與皇族為婚姻初劉美為嘉州都監蒙正欲嫁女與其子從德蒙正父有才智獨不肯蒙正固請之一日以婚書告家廟父大慟曰吾世為民未嘗有通姻戚里者今而後必破吾家矣此據范蜀公記事又稱蒙正家有訟蒙正入獄竟死於獄中當考髙若訥傳云若訥為知雜御史王蒙正知蔡州若訥言蒙正起禆販因緣戚里得官向徙彬州物論稱不平今與之大州可乎詔寢其命按若訥為知雜日寶元元年十二月此時蒙正已編管不知蔡州除命在何時也必前此乃可若然則若訥有言亦必不在為知雜後也從德女即遂國夫人也别志所書富弼繳詞頭事更當詳考甲寅詔禮部貢院自今三月一日申請貢舉其舉人到省以十一月二十五日為限先是崇政殿説書賈昌朝言舉人有親戚仕本州或為發解官及侍父母逺官距本州二千里宜敇轉運司選官類試以十率之取三人詔兩制議而翰林學士丁度等言貢舉舊制以五月一日申請十月二十五日上名於省若二千里而移試或有不及願稍寬其期聽如昌朝説故降是詔自是諸路始有别頭試除雍州管下溪洞諸州天聖五年以前所逋租稅己未祔章惠太后神主於奉慈廟庚申德音降東西京及靈駕所過州縣囚罪一等徒以下釋之詔自今內品有犯並勘罪檢刑名杖數聞奏降所屬斷遣時髙品陳崇祐抵罪贖金令未得與差遣因有是詔甲子賜御史臺册府元龜及天下圖經各一部乙丑置赤帝像於宫中以祈皇嗣丙寅詔侍御史知雜事姚仲孫司諸路提點刑獄考課之法先是諸路復置提點刑獄還朝多擢為府官仲孫請第其課為三等升黜之故即以命仲孫詔河北緣邊安撫使兼提舉緣邊諸州軍寨便糴糧草賜常州學田五頃庚午詔應責授諸州上佐文學參軍等經十年無過而願自便者聽之三月甲戌朔以崇政殿説書司封員外郎直集賢院賈昌朝祠部員外郎崇文院檢討王宗道屯田貟外郎國子監直講趙希言主客員外郎國子監直講楊安國並兼天章閣侍講預內殿起居比直龍圖閣而班直館本官之上天章閣置侍講自此始元年正月昌朝等初為崇政殿説書追復祕書少監盧多遜為工部尚書妻京兆郡太君蘇氏為京兆郡夫人以其子水部員外郎察援赦自陳也尹洙銘察墓云察得召對從容敘多遜得罪事言已流涕上感動故有是命戊寅詔禮部貢舉羣臣多獻祀髙禖頌己卯各賜敇書奬諭大理評事史館檢討王洙亦賜焉帶職京官降敇書自洙始丙申內出章惠太后閣金千餘兩市莊園邸舍以給萬壽觀建廣愛殿奉安章惠御容故也先是詔從假少連所請尚書省官帶內外制及兼三司副使不赴集議者以違制論集賢校理趙良規以為不可上言曰國朝故事令敇儀制别有學士知制誥待制三司副使著位視品與前朝異同無在朝敘職入省敘官之説若全不論職則後行員外郎兼學士在朝立丞郎上入省居比駕下知制誥待制入朝與侍郎同列入省分厠散郎員外郎任三司副使郎中任判官在三司為參佐入本省為正員所以舊來議事集尚書省官帶職者不赴别詔三省悉集則及大小兩省內朝官悉集則及學士待制三司副使更集他宫則諸司三品武官二品各次本司長官故事尚書省官帶知制誥中書省奏班簿是以尚書省御史臺了不著籍故有絶曹之語又凡定學士舍人兩省著位除先後入外若有升降皆特稟朝旨豈有在朝入省迭為髙下詔御史臺禮院詳定久不決於是判禮院馮元等奏曰會議之文由來非一或出朝廷别旨或徇官司舊規故集本省者即南省官集學士兩省臺官者容有內制給舍中丞集學士臺省及諸司四品以上者容有卿監集文武百官者容有諸衛蓋謀事有大小集官有等差率繫詔文乃該餘職假少連以太常易名之細考功覆議之常誤謂羣司普當會席列為具奏嬰以嚴科遂使絶曹清列還入本行分局常員略無異等請臣僚擬諡止集南省官屬或事緣體大臨時敇判兼召三省臺寺即依舊例御史臺别奏云今尚書省官任內制者係臺省之籍無坐曹之實論職官之言正為絶曹者設豈可受祿則繫官定俸議事則絶曹為辭况王旦王化基趙安仁朝逈杜鎬楊億皆嘗預議於尚書省故相李昉為主客郎中知制誥日屢經都省議事散騎常侍徐鉉見江南舊士所説次苐略同又議大事僕射御史大夫入省惟僕射至廳下馬於今行之所以重本省也故都堂會議列狀以品就坐以官忽此更張恐非通理禮官吳育曰兩奏各有未安尚書制度雖崇亦天子之有司在朝廷既殊班列有司輒易尊卑是以朝省為彼我官職分二事也兩制近職若有事議而云絶班不赴非所以求至當且知制誥中書省奏班簿是謂絶班翰林學士亦知制誥不絶班簿此因循之例未為確據縱絶班有例而絶官無聞一人命書三省連判而都無所係止為俸錢豈命官之理今取典故中最明一事足以質定祥符五年僕射上事儀絶班之官别頭贊引不與本省官同在迎班請凡會議省官帶近職者别作一行而坐自為敘列非以相壓若詔兩制臺省諸司衛官畢集則各從其類自作一行書議如其次詔尚書省議事應帶職官三司副使以上並不赴如遇集議大事令赴别設坐次戊戌翰林學士丁度等上所撰國朝時令一卷詔以五月朔入閣因讀時令尋復問禮官朔日夏至入閣可否皆言五月朔朝會合唐舊制雖是大祀比冬至圜丘禮成受賀在質明後無嫌然據易象月令及蔡雍有閉關靜事不賀之説鄭康成據樂緯春秋説夏至有前殿從八能作樂後漢常行其儀今入閣讀令既屬嘉禮在朔與假本無所礙惟夏至則經義有妨或自聖裁約用漢法詔改以七月朔入閣讀時令尋又罷判鴻臚寺宋郊言請自今外夷朝貢並令詢問國邑風俗道途逺近及圖畫衣冠人物兩本一進內一送史館從之按晏殊前已有此請濟州團練使劉從廣娶荆王元儼女庚子授從廣滁州防禦使時年十七帝遇從廣特厚猶以章獻故也同知禮院吳育言舊藏禮文故事類例不一請擇儒臣與本院官約古今制度參定為一代之法從之慶厯四年正月書始成壬寅詔廣桂雍三州通判在任物故者如廣南知州例與一子官夏四月乙巳譯經使吕夷簡上所定景祐法寶新録二十一卷賜宣州學田五頃丙午禁廣西路民庸雇溪洞婦女犯者以違制論丁未詔學士院自今制策登科人並試策論各一道時將作監丞富弼獻所為文命試館職弼以不能為詩賦辭上特令試策論因有是詔弼尋授太子中允直集賢院弼除職在五月癸亥今并書辛亥賜茅山王欽若所建庵為五雲觀天聖三年十一月欽若卒時劉隨云云或移見此癸丑契丹遣林牙啓聖節度使耶律祥崇祿少卿張素民來賀乾元節癸亥賜汴口開河役卒緡錢甲子右僕射兼門下侍郎平章事王曾罷為左僕射資政殿大學士判鄆州吏部侍郎參知政事宋綬罷為尚書左丞資政殿學士禮部侍郎參知政事蔡齊罷為吏部侍郎歸班天聖中曾為首相夷簡參知政事事曾甚謹曾力薦夷簡為亞相未幾罷夷簡為首相居五年罷不半嵗復位李迪為次相與夷簡不協夷簡欲傾迪乃援曾入使樞密不半嵗迪罷曾即代之始曾久外有復入意綬實為曾逹意於夷簡夷簡即奏召曾及將以曾代迪綬謂夷簡曰孝先於公情契不薄宜善待之勿如復古也夷簡笑諾其言綬曰公已位昭文處孝先以集賢可也夷簡曰不然吾雖少下之何害遂請用曾為首相帝不可乃為亞相既而夷簡專決事不少讓曾不能堪論議多不合曾數求去夷簡亦屢丐罷帝疑焉問曾曰卿亦有所不足耶曾言夷簡招權市恩時外傳夷簡納知秦州王繼明饋賂曾因及之帝詰夷簡至交論帝前夷簡乞置對而曾言亦有失實者帝不悅綬素與夷簡善齊議事間附曾故并綬齊皆罷初命曾以左僕射知青州既入謝求改鄆州乃下學士院貼麻加資政殿大學士判鄆州蓋僕射典州當云判不當云知翰林學士丁度失之也龍川志載王曾復入相由宋綬及吕夷簡事當不誤然所稱嵗月及人姓名頗差殊今據國史略加刪潤庶得其實吏部侍郎知樞密院事王隨户部侍郎知鄭州陳堯佐並為平章事隨加門下侍郎堯佐守本官吕夷簡嘗密薦二人可用故也自薛居正後初相無越遷門下侍郎者丁度始誤草制因不復改禮部侍郎參知政事盛度知樞密院事工部侍郎同知樞密院事韓億三司使吏部侍郎程琳翰林學士承旨兼龍圖閣學士石中立並為參知政事樞密直學士左司郎中王鬷為右諫議大夫同知樞密院事乙丑召宋綬入侍經筵新知樞密院事盛度言奉敇孟夏薦饗太廟已受戒誓而有除命故事樞密不差攝行祠事詔以后廟攝太尉趙賀代之庚午奉國留後知樞密院事王德用為定武節度使禮部侍郎知樞密院章得象並為户部侍郎尋改德用為安德節度使仍更武定軍曰武康軍時言者以武定犯真宗諡號故也詔福建路有以野葛毒人者徙其家嶺北編管永不放還閏四月乙亥知徐州李迪言所部滕縣與兖州接境欲因行縣祀岱嶽并至景靈宫祝聖算禱皇嗣上謂參知政事韓億等曰大臣當詢民間利病以分朝廷之憂祈禳之事豈為政耶詔止之知制誥王舉正以宰臣陳堯佐之壻引故事避嫌戊寅改為龍圖閣待制時龍圖閣待制張逸權知開封府請仍舊班舉正下從之已卯改昭武軍為寧武軍以犯宣祖諡號也上封者言比嵗三司副使不問才否例遷龍圖閣待制容有濫恩請自今别議補授庚辰詔三司副使嵗滿當遷者勿以例除臨時聽旨賜故將作監丞張唐卿家錢五萬帛五十匹米麥各五十斛唐卿進士第一人及第通判陜州其於吏事如素習民有母再適人而死及葬其父恨之不得祔乃盜母之喪同葬之有司請論如法唐卿時攝州事乃曰是知有孝而不知有法耳奏釋之未幾丁父憂毁瘠嘔血而卒壬午命刑部員外郎直史館宋祁權同修起居注先是召用太常丞集賢校理知宣州葉清臣而清臣未至祁以父名玘且病羸不任久立辭之改命刑部員外郎集賢校理趙槩癸未以河北屯田司都監崇儀副使楊懷敏為北作坊副使同管勾屯田公事右侍禁閣門祗候何九齡為左侍禁前年大水壞緣邊八州軍堤岸而懷敏等修治有勞特遷之知施州西頭供奉官閣門祗候劉允忠為東頭供奉官始天聖九年溪蠻談彥綰向進等冦永寧寨嘗詔天賜等州招輯而皆以姻黨相庇援數出擾邊至是為允忠誘降故賞及之乙酉詔流內銓自今引對磨勘奏舉選人並前一日以歷任合除官擬進入內丙戌修中牟縣列子觀仍給田五頃宰相王隨請之也王隨請修觀據春明録實録於景祐元年七月甲午已書仍書給田五頃今此又書但無給田事蓋重出也止存此削去元年七月全州言州民朱道誠母病家貧截髮求醫母卒廬墓下旁有冬笋生丁亥賜道誠絹十匹米十斛令官吏常撫存之己亥武寧節度使夏守恩除名配連州編管守恩為真定府定州路都部署恃寵驕恣不法而其子元吉通賂遺市物多不與直轉運使楊偕張存欲按其事定州通判李參因發其受枉法贓詔侍御史趙及與大名府通判李鉞鞫問得實法當死特貸之守恩弟殿前都指揮使定國節度使守贇罷軍職改鎮海節度使赴本鎮守贇子四方館使榮州刺史元亨亦出知衛州守恩卒於貶所參須城人及良鄉人也內侍岑守中與堂吏受賕撓法及皆劾正其罪參尋擢知荆門軍光州言祕書監致仕丁謂卒王曾聞之語人曰斯人智數不可測在海外猶用詐得還若不死數年未必不復用斯人復用則天下之不幸可勝道哉吾非幸其死也五月壬寅朔鹽鐡副使兵部員外郎陳貫為刑部郎中直昭文館知相州用閏月庚辰詔書也張師正倦逰録云陳學士貫為省副時三司有一胥魁桀黠狡獪潛通權幸省中之事率以咨之每聲諾使簉往往陽為欠伸不敢當其禮陳聞而不平決入省斥逐之既來參見嚴顔以待胥知其意奉事彌謹稟承明敏舉無留事嵗餘陳亦善待之一日陳謂胥曰宅中欲會一二女客何人可使幹辦曰某公事之隙暫往督視亦可陳不知其心有包藏乃曰爾若自行甚善宴席所須十未具一胥乃携十餘嵗女子於東華門街插紙標子於首曰為陳省副請女客今監厨無錢賠僃鬻此女子要若干錢遂結皇城司密邏俾潛以聞朝廷將行黜降賴宰臣辨解終嵗竟罷去止得集賢學士舊例省副罷皆得待制按陳貫以景祐二年八月為户部副使三年正月為鹽鐡副使四年五月除直昭文館知相州舊例省副罷即得待制貫止得館職師正所録或是當時實事然閏月庚辰已有釐革指揮又恐非也貫得集賢學士亦師正誤今姑存此更俟考詳翰林侍講學士兼龍圖閣學士户部侍郎馮元卒特贈户部尚書諡章靖元性簡厚不治聲名非慶弔未嘗過謁兩府執親喪自括髮至祥練皆案禮變服不為世俗齋薦遇祭日與門生對誦説孝經而已多識古今臺閣品式之事尤精易與孫奭俱名大儒凡議典禮多出二人然論者謂元所陳但務廣博不如奭之能折𠂻也元不如奭此據言行録戊申命權三司使王博文同詳定茶法庚戌美人俞氏生皇子上以諭輔臣王隨等皆再拜稱賀遂御崇政殿録繫囚雜犯死罪降徒流流以下釋之是日皇子不育慶厯元年五月乙丑初贈官封王賜名乙卯以旱遣使決三京繫囚丙辰遣刑部郎中判户部勾院李宗詠往江南西路體量安撫庚申滑州上靈河縣民黃慶家蠶自成被長二丈五尺闊四尺賜茶綵其家丙寅有芝生於化成殿柱召近臣宗室觀之仍出御製瑞芝詩賜宰臣王隨以下翌日儒臣並為賦頌以獻右司諫韓琦言春秋之法但記災異至於祥瑞略而不書豈不以君閲瑞牒則意安覩災符則心懼意安則政怠心懼則德修聖人垂戒之深其旨斯在臣愚望陛下特以災異為重一政教之間思所未至者隨其變而應之至於珍祥竒瑞雖陛下仁愛亦望日謹一日以雖休勿休為念則昊穹降鑒答陛下寅畏之心生靈遂宜蒙陛下慈惠之澤自然時和嵗豐家給人足永獲上瑞之報也丁卯以樞密院禮房副承旨木令遵為禮賔副使時延州蕃官金明縣都監李士彬殺義男及堂姪女三人法當死令遵與士彬家連昏姻議者恐令遵漏泄機事故出之尋有詔以士彬世官金明特貸死澧州逃卒匿民家傭以自給一日誣告民家事摩駝神歲殺人十二以祭州逮其族三百人繫獄久不決詔遣御史臺推直官方偕就劾偕令卒疏所殺主名按驗皆亡狀事遂辨侍御史知雜事龎籍薦之戊辰為殿中侍御史裏行偕莆田人也六月甲戌命禮賔使白仲逹入內供奉官蘇紹榮奉安太祖御容於揚州建隆寺景德中嘗即寺置殿繪御容而其制庳陋會占者言東南有王氣乃易以塑像更命新殿曰章武壬午廣南東西路轉運司言所部梅春循新邑欽融桂昭容白瓊崖等州皆煙瘴之地請自今所差京官使臣並二年一替至嵗滿從本司保明與遷一官從之甲申詔杭州捍江軍士自今毋得他役丙戌録唐李氏周柴氏晉石氏李煜錢鏐孟昶髙季興之後為三班借職奉職或遷其官或授試銜李氏八人柴氏五人石氏煜鏐各二人昶季興各一人丁亥又録唐李氏宗屬為借職者十一人為助教者五十三人免解者五人免徭役者三十七人周柴氏宗屬遷官者一人為奉職者三人長史助教者二人免徭役者十一人仍各賜錢一萬戊子以御製神武祕略賜河北河東陜西緣邊部署鈐轄知州軍每得代更相付授始韓億同知樞密院事建言武臣宜知兵書而禁不傳請纂集其要賜之上於是作神武祕略凡三十篇分十卷仍自作序焉甲午皇姪左監門率府副率宗實特遷右內率府率宗實江寧節度使允讓第十三子也生四嵗養於宫中時方六嵗乙未權判都省宋綬言本省集官覆諡而請諡之家皆自具飲饌夫考行易名用申勸沮而享其私饋頗非政體請自今官為給酒食從之丙申詔開封府國子監及别頭試自今封彌謄録如禮部從左司諫韓琦之請也又詔國子監以翰林學士丁度所修禮部韻略頒行初崇政殿説書賈昌朝言舊韻略多無訓釋又疑混聲與重疊出字不顯義理致舉人詩賦或誤用之遂詔度等以唐諸家韻本刋定其韻窄者凡十三處許令附近通用疑混聲及重疊出字皆於本字下解注之戊戌杭州言是月乙亥大風江潮溢岸髙六尺壞堤千餘丈詔遣中使往致祭秋七月癸卯詔河南府省諸陵柏子户永安陵永昌陵各留四十永定陵五十時上封者言陵寢已有奉先指揮給灑掃而柏子户多富民竄名籍中以規避徭役故令自上户減放之乙巳詔御史臺主簿自今滿二年與改京官丁未詔河北河東轉運司密下諸州繕器械完城壁以嚴邊偹始范諷責授武昌行軍司馬會乙未赦書落責授徙保信聽居舒州既遭母喪於是許歸齊州持服諷日飲酒自縱所與逰者輒慕其所為時號東周逸黨顔太初作逸黨詩以刺之而薑潛亦嘗貽書以疏其過潛奉符人也戊申有星數百皆西南流其最大者一星至東璧沒光燭地久之不散已而黑氣長丈餘出畢宿下己未詔命官犯私罪情輕欲鎖廳應舉者聽之辛酉詔三司出銀十五萬兩下河北路絹十萬下河東路助糴軍糧知越州蔣堂言太子中舍致仕齊執象有子廓為荆湖南路提點刑獄唐為吉州司理參軍執象與其妻皆年髙居里中而唐仍纍仕不歸請除唐鄰近一官以便侍養詔唐使歸置廓不問廓會稽人在湖南能任其職潭州鞫繫囚七人為強盜當論死廓訊得其狀非強付州使劾正乃悉免死不取以為功平陽縣自馬氏時稅民丁身錢嵗輸銀二萬八千兩民生子至壯不敢束髮廓奏悉蠲除焉唐既坐責雖置廓不問然士論薄之甲子許新荆湖南路轉運使兵部員外郎集賢校理劉立禮歸館供職以母老自請也八月癸酉詔諸縣令佐兼監茶酒鹽稅者自今賞罰減正監官一等甲戌出內藏庫絹三十萬下河北路市糴軍儲越州言大水漂溺民居詔以錢賜被溺之家有差丙子兵部員外郎知制誥謝絳為契丹生辰使供僃庫使連州刺史帶御器械張茂實副之起居舍人直史館知諫院髙若訥為正旦使西京左藏庫使兼閣門通事舍人夏元正副之庚辰涇州言步軍都虞候端州防禦使孫維鄴卒維鄴初從曹利用討陳進有功及利用長樞密欲擢用維鄴維鄴惡其權盛數以疾辭遂除左龍武將軍致仕利用貶乃落致仕纍遷涇原路部署兼知渭州嘗建言蕭關故道前控大川善水草賊騎所從出也誠得屬羌與俸賜且羈其酋領使為籓籬則可無西顧憂矣維鄴以崇儀副使致仕及落致仕實録當有之須細檢戊子太常博士曾易占除名配廣南衙前編管坐前知玉山縣受賕事發監察御史裏行張宗誼按其罪法當死特貸之易占致堯子也王安石作易占墓志言易占坐知信州錢仙芝所誣故失官壬辰修石州伏落寨成賜知州及都巡檢使敇書奬諭甲午詔天下常平倉錢榖自今三司及轉運司無得借支丙申詔關中舊俗豪縱凡衣冠子弟自今一犯罪而情涉凶悖者並繫獄聽裁戊戌許華福二州立學徙相州造船務於天雄軍九月庚戌詔閣門於紫宸殿垂拱殿刋石為百官位表戊午判鄆州王曾言請如馮拯判陳州例錢榖文字免簽書從之庚申詔諸司使副至三班使臣任川廣而合該遷官者如京朝官例許三兩月前申發磨勘文字丙寅三司言東頭供奉官錢遜奏信州鉛山産石碌可烹煉為銅今池饒江三州錢監並闕銅鑄錢請遣遜與本路轉運使試驗以聞從之丁卯御邇英閣讀唐書因詔唐書列傳止取事義切於規戒者讀之密州大姓王澥私釀酒鄰人往捕之澥紿奴曰此盜也使盡殺其父子四人州論奴以法而澥獨不死大理寺詳斷官鄭人蔣偕當澥及奴皆大辟宰相陳堯佐右澥知審刑院宋郊力爭卒抵澥死堯佐不恱冬十月癸酉命郊判吏部流內銓時災異數見詔開寺觀為人祈福郊言此非所以應天也開寺觀祈福據郊正傳郊改判銓百官表在十二月庚辰甲戌御邇英閣讀正説謹罰篇述後漢光武罷梁統從重之奏帝曰深文峻法誠非善政宋綬對曰王者峻法則易寬刑則難夫以人主得專生殺一言之怒則如雷如霆是峻易而寬難也乙亥禮院言章惠皇太后請如孝惠皇后例不立忌詔從之仍於其日特不視事禁屠宰丙子御邇英閣讀正説養民篇帝曰尸子言君如杅民如水何也丁度對曰水隨器之方圓若民從君之好惡是以人君謹所好焉乙酉權知開封府張逸言頃禁臣僚及皇親命婦上章表禁中以希求恩澤比來漸通請謁宜令所經官司糾劾以聞詔可開封僧有求內降免田稅者逸固執不從上曰有司能守法朕何憂也明道二年五月十三日閣門奏可考辛卯詔殿侍換文資者自今後令國子監試詩二首習經學者試平文十道詩不至紕謬文通四為合格又詔三班差使殿侍犯公罪者聽以贖論癸巳翰林學士李淑請班其父樞密直學士若谷下詔從淑請甲午邇英閣講春秋上曰春秋自昭公之後魯道陵遲家陪用政記載雖悉而典要則寡宜刪去蔓辭止取政教事節講之因謂宋綬等曰春秋經旨在於奬王室尊君道邱明作傳文義甚博然其間録詭異則不若公羊穀梁二傳之質綬等對曰三傳得失誠如聖言臣等自今凡邱明所記事稍近誣及陪臣僣亂無足勸戒者皆略而不講乙未同知樞密院事章得象言開封府進士章仲昌臣鄉里踈屬實無藝業近聞訟訴發解不公事請牒歸其家從之時鎖廳應舉人特多開封府投牒者至數百國子監及諸州不在焉及出榜而宰相陳堯佐之子博古為解元參知政事韓億子孫四人皆無落者故嘲謗羣起然殿中侍御史蕭定基與直集賢院韓琦吳育王拱辰實司試事非有所私也章仲昌事實録偶脫據司馬光朔厯及范鎮東齊記事追附並取光記聞記聞所載或與記事不同則記聞誤記事不誤也十一月己亥朔中書言虞部郎中魯傑九月七日請致仕十月七日降敕録其子九齡為試校書郎而傑以九月二十五日卒屯田郎中唐冕四月二十二日請致仕五月七日降敇録其子鑑為試校書郎而冕以閏四月十一日卒當追還所録恩詔特與之辛丑詔河北轉運司如聞城邑上户近嵗多徙居河南或京師以避徭役恐邊郡寖虛宜令本路禁止之太常丞集賢校理判鹽鐡勾院同修起居注葉清臣上所著升平舉要十篇壬子命為直史館癸丑詔進士諸科舉人嘗經御試及景德四年曾得解大中祥符元年得解而至今三舉者並特許就南省試丁巳詔諸縣壯丁本以僃盜賊自今毋得差防送及它役使己未出內藏庫紬綿五十萬下河北陜西路市糴軍儲癸亥罷登萊州買金場嘉勒斯賚遣使李博木喇斡等來貢方物十二月戊辰朔河北轉運司奏修塞橫壠決河合用錢糧乞早撥赴河口以來春興役上令轉運司再計度從何處修塞河勢從何處赴海有無壅滯保明復奏去年五月已有權停指揮不知何故又有此然此但據朔厯它無有也庚午上封者言西川廣南福建路知州軍通判知縣闕審官院嘗積三五處而不以先後定差其公田有無地之逺近率多不均請自今預籍合入逺官姓名遇闕即以次移差從之壬申以右諫議大夫李允元為給事中知同州初上欲除允元兼集賢院學士執政言故事經科出身雖官至給諫無帶職者遂罷之詔諸路轉運使提點刑獄及知州軍通判自今按察所部官須具實狀以聞給真定府路州學田各五頃仍詔自今須藩鎮乃許立學它州勿聽庚辰改益州路鈐轄及走馬承受公田並為益利路甲申欣代并三州言地震壞廬舍覆壓吏民欣州死者萬九千七百四十二人傷者五千六百五十五人畜牧死者五萬餘代州死者七百五十九人并州千八百九十人知欣州祖百世都監王文恭監押髙繼芳石嶺關監押李昊並傷而前欣州監押薛文昌并州陽興寨監押苖整皆死詔賜百世整及文昌之家錢各十萬文恭繼芳昊各五萬其軍民死傷者皆賜有差自是河東地震連年不止或地裂泉涌或火出如黑沙狀一日四五震民皆露處乙酉命侍御史程戡往并欣州體量安撫右司諫韓琦上疏曰臣聞動民以行不以言應天以實不以文先儒之大議也故宋景公熒惑守心不忍移臣庶之咎子韋稱君有至德之言熒惑必徙三舍此則以實應天之效也唐明皇以太陽虧蝕悉令赦徒𨽻之人宋璟謂可以至誠動天不在德音頻降此則以文應天之弊也臣伏覩嚮者興國寺雙閣災延及開先祖殿不踰數刻但有遺燼復聞仰觀垂象或失經行蓋人事之已形致天變之嗣發其猶影響諒非徒然當是時臣謂陛下宜虛佇以求直言側身而修庶政有功則賞以絶其僥幸之路有罪則罰以清其姦慝之源旌别賢愚撙節財用抑宴私過度之樂休營造不急之務決獄使之無濫出令斷於必行斯所以念祖宗之艱難答天意之警悟也而陛下眷三京以肆赦宥走群望以罄祠祝內自禁掖外及寺觀並與祭醮逮越朔晦今北道數郡繼以地震上聞即命使軺就崇法供矧兹近塞俯接殊鄰豈無間諜之人往道祈禳之事徒彰自恐或誚無稽雖陛下欽順上天之誠可謂至矣其於消伏災眚之道則猶未然夫弛刑網以貸頑悖之民損國資以奉遊惰之輩將欲召丕貺感靈心是猶却行以求前揚湯而止沸無益之驗信昭昭矣臣苟隱情惜已不能獻忠盡言使陛下常以禮緇黃薦牲幣為修德除患之本則臣豈不上負陛下懼災思政之意哉且地震者女謁用事臣下專政之意也今震在北或恐上天孜孜譴告俾思孽敵之為患乎亦望自今而後務在嚴勵守臣密修兵僃審擇才謀之帥悉去懦武之士明軍法以整驕怠之卒豐廪實以增儲偫之具或曰今北敵守盟約甚固奉朝廷有禮初無釁隙保不騷動未可生事以疑敵心此寬陛下宵旰之憂可也為國家之計則踈矣旬餘琦復上疏言近聞大慶殿及諸處復建道場及分遣中使遍詣名山福地以致請禱臣以謂陛下俯從常禮不得已而為之是亦逹寅畏之深旨也臣切以天埀祅象地見災符前世之君覩之感悟以為禳祈之法則必徹樂減膳修德理刑大則下詔以求讜言側身而避正殿是以天意恱穆轉為福應願陛下法而行之復恐此後宫中或有宴飲之事欲望比於常時稍用減節不獨仰奉於天戒斯實上安於聖躬臣子之心所以昧萬死而獻言者正在是也且大慶殿者國之路寢朝之法宫陛下非行大禮被法服則未嘗臨御臣下非大朝會則不能一至於庭豈容僧道凡庸之人繼日纍月喧雜於上非所謂正法度而尊威神也昔唐髙祖立皇太子將會命婦於宣政殿博士袁利諫曰前殿正寢非命婦宴娛之地望請命婦會於别殿自可僃極恩私髙祖納之即令移於麟德殿臣亦望今後凡有道場設醮之類並於别所安置惟陛下特霽天威一加詳納天下幸甚給徐州學田五頃庚寅龍圖閣學士張逸為樞密直學士知益州逸凡四至蜀諳其民風華陽縣鄒長殺人誣道旁行者縣吏受賕獄既具乃使殺人者守囚逸曰囚色寃守者氣不直豈守者殺人乎囚始敢言而守者果服立誅之蜀人以為神會嵗旱逸使作堰壅江水溉民田自出公租減價以賑民初飢多殺耕牛食之犯者既配關中逸奏民殺牛以活將死之命與盜殺者異若不禁之又將廢穡事今嵗小稔請一切放還復其業報可辛卯徙淮南轉運使假少連為陜西轉運使時駙馬都尉柴宗慶知陜州縱其下擾民少連入境即劾奏之壬辰徙知饒州范仲淹知潤州監筠州稅余靖監泰州稅夷陵縣令歐陽修為光化縣令上諭執政令移近地故也上諭執政據朔厯獨尹洙不徙先是京師地震直史館葉清臣上疏曰天以陽動君之道也地以隂靜臣之道也天動地靜主尊臣卑易此則亂地為之震乃十二月二日丙夜京師地震移刻乃止定襄同日震至五日不止壞廬寺殺人畜幾十之六大河之東彌千五百里而及都下誠大異也屬者熒惑犯南斗治歷者相顧而駭陛下憂勤庶政方夏泰寧而一嵗之中災變仍見必有下失民望上戾天意故垂戒以啓迪清衷而陛下泰然不以為異徒使內侍走四方治佛事治道科非所謂消伏之實也頃范仲淹余靖以言事被黜天下之人齰舌不敢議朝政者行將二年願陛下深自咎責詳延忠直敢言之士庶幾明威降鑒而善應來集也書奏數日仲淹等皆得近徙按實録正史景祐四年皆不書京師地震明年十二月甲子乃書京師地震甲子初二日也而清臣傳獨云是冬京師地震疏又云十二月二日丙辰京師地震移刻而止豈會要實録正史皆偶遺忘今用清臣傳語及疏語附范仲淹等內徙後仲淹等內徙緣清臣疏奏附傳亦無有正傳乃增入然兩年地震並以十二月二日疑疏語或誤以熒惑入南斗景祐四年亦無其事惟元年及三年並九月入南斗并寶元元年八月又入南斗清臣所指當是三年事也附傳疏語丙夜或作丙辰按是年十二月戊辰朔十七日甲申考之長厯皆合其曰丙辰者誤也當依正傳作丙夜范仲淹既徙潤州讒者恐其復用遽誣以事語入上怒亟命置之嶺南參知政事程琳辨其不然仲淹訖得免自仲淹貶而朋黨之論起朝士牽連出語及仲淹者皆指為黨人琳獨為上開説上意解乃已癸巳契丹遣始平節度使耶律甫衛尉卿王澤來賀正旦是嵗天下上户部主户六百二十二萬四千七百五十三口一千五百九十二萬五千五百二十七客户四百四十三萬八千二百七十四口七百一十八萬六千九百八十九趙元昊既悉有夏銀綏靜宥靈鹽會勝甘涼瓜沙肅而洪定威懷龍皆即舊堡鎮偽號州仍居興州阻河依賀蘭山為固始大補偽官以威眀碩統張陟楊廓徐敏宗張文顯輩主謀議以鍾鼎臣典文書以沁布開沁尚對烏札如定多特瑪竇惟吉主兵馬葉勒仁榮主蕃學置十八監軍司案十八監宋史作十二監委酋豪分統其衆自河北至鄂爾寧山七萬人以僃契丹河南洪州白豹安鹽州羅羅天都威經山等五萬人以僃環慶鎮戎原州左廂宥州路五萬人以僃鄜延麟府甘州路三萬人以僃西蕃回紇賀蘭駐兵五千人靈州五萬人興慶府七萬人為鎮守總三十餘萬而苦戰倚善鄂善鄂者橫山羌夏兵柔脆不及也選豪族善弓馬五千人迭直偽號六班直月給米二石鐡騎三千分十部發兵以銀牌召酋長面受約束創十六司於興州以揔衆務
