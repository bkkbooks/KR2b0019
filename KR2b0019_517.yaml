body:
  text: 續資治通鑑長編巻五百十三宋李燾撰哲宗元符二年秋七月壬子王贍言已占據嘉木卓磋藏丹貝葉公東迎城通綽克城又哩恭宗堡倫布宗堡塔鼐宗堡共計九處其嘉木卓城正當扼青唐咽喉及丹貝磋藏葉公三城皆係部族繁庻地利要害之處並合修建城寨綂治覊縻新附部族外其間若更有地里相去遥逺𦂳要守禦處亦合修建寨堡詔孫路具見如何應接溪巴烏及將來如何措置詳悉聞奏務為邊防經久之計不得輕易鹵莽致誤機事先是溪巴烏殺阿蘇據錫勒噶爾與轄正相持以此部族離心多願歸漢詔孫路相度收接來者不絶雖日日有奏而所奏並不及溪巴烏一字曾布疑之遂欲降此指揮詰路所以應接措置溪巴烏情狀章惇乃以簡謂布未須詰之且容其措置布未肯已惇遂封孫路數書示布盖路密與惇議云錫勒噶爾城乃積石軍欲除溪巴烏為閤門使知積石軍却自邈川直趍青唐欲建為州而以他人領之布因為惇言溪巴烏以董戩之後人情所附故欲令還青唐逐轄正而復為王子今乃欲處之他所以青唐付之他人恐未安今日部族之所以願歸漢者正以轄正簒國故不為人情所附吾乃欲逐溪巴烏而以他人處青唐則安知歸漢者不翻然而改又安知溪巴烏不能抗朝廷之命而自奮立誠令溪巴烏不振又安知董戬之族更無如溪巴烏者能崛起於下而為自立之計乎如此不惟恐更生邊患兼朝廷何必貪荒逺之地又與董戩之族為仇敵於邊計皆未見其安便也惇曰路只是如此商量亦未定未可詰之布曰俟其已定而詰之不已晩乎惇堅不肯以擬定文字將上布曰且將上禀㫖遂具言孫路累奏河南邈川部族歸漢而不及溪巴烏一字不知路何以處之臣欲如此問孫路而章惇以為未可路欲除溪巴烏官處之積石軍而建青唐為州以他人領之臣恐未可兼此事只是路與惇私書徃還議欲如此臣等皆不預聞路既不奏朝廷又不申宻院在臣為失職不得不論上曰是不曾奏溪巴烏一字遂顧執政曰如何衆皆唯唯而已許將獨曰問路如何應接措置莫也不妨惇曰事未定未可詰問布曰事定而後詰問則已後時雖令改正亦已費力此事大乞裁處上曰此大事不可忽布曰臣今來所問只是問路如何應接措置亦别無撓路經畫處上曰不妨惇曰如此須添一將來字云見今如何應接將來如何措置布曰此兩字添不妨布再對因為上言臣所陳孫路事理灼然而聖問所及執政無一人肯分别是非者此無他但惜人情爾古人以為持禄養交正謂此也養交私情好以持保禄位如此則於國事奈何章惇蔡卞衆人所畏臣與之争論未嘗有所假借若許將黄履不主張事臣亦未曾敢一言及之臣孤立自守所恃者惟睿明毎加洞照議論稍伸爾然惇等側目未易當也布録此叚在庚戌日今著此溪巴烏殺阿蘓附三月末正月六日二月七日又此月二十五日二十八日當并考鄜延奏西人毁新修堡子尋已修葺訖布録壬子癸丑校書郎吳伯舉為神宗正史編修官閏九月十三日為小著先是權禮部尚書蹇序辰言請將六曹諸司元豐八年四月以來應更改法度言渉附㑹譏訕文書盡數檢閲随事編類並著所任官姓名具册申納三省宣徳郎李積中言請選官應先帝法度政事遭元祐變毁者取㑹某事因何人申請而廢因何人勘當而罷各開當職官姓名及謗訕之語若情不可恕即重加貶責詔六曹諸司編類並著所任官姓名具册申納三省如有盗匿棄毁增減隐落及漏泄者罪賞並依編類章䟽已得朝㫖序辰及積中先有是言三省不行踰半年矣序辰既貶乃復檢舉降詔曾布謂三省意欲有所羅織故也此據布録附見降詔日元符三年五月二十八日罷此指揮新本刪修云詔六曹諸司將元豐八年四月以後應廢毁先帝法度申請並著所任官姓名編類成册納三省如有毁匿增減及漏泄者罪賞並依編類章䟽已得朝㫖用權禮部尚書蹇序辰宣徳郎李積中之言也右正言鄒浩奏臣伏覩近降指揮令六曹諸司依臣僚上言各將元豐八年四月以來應本司及所屬申請勘當更改法度言渉附㑹譏訕文書盡檢閲随事編類並著所任官姓名具册申納三省臣竊契勘自元豐八年四月以來曾任六曹諸司及所屬職事人數極多除言渉附㑹譏訕文書已行編類外其不為時勢所屈而尊君奉法挺然如初見於申請勘當之際者亦必有人欲乞依前降指揮亦行檢閲别作一項編類成册具姓名申納以聞所有盗匿棄毁增減隐落及漏泄等事亦乞依編類章䟽已得朝㫖施行庻幾特立自重之人終為聖明所察浩奏附此其從違當考浩又嘗奏臣伏見㸔詳訴理文字所節次㸔詳過文字進呈已䝉朝廷施行了畢臣契勘元降㸔詳指揮繫分兩等一謂語及先帝一謂語言過當除語及先帝之人外其餘所訴雖情犯不齊大率皆以官司鍜鍊致罪抱負寃抑得遇朝廷清明辨雪矜貸為詞只是語言過當一等而已而今所施行則有勒停者有降官者有降官及差遣者有遠小處監當者有罷知州與宫觀者有送吏部與合入差遣者有罰銅三十斤者有罰銅十斤者一時公議竟莫知其所以異也又况訴理之語初亦難辨有可以為輕亦可以為重有可以為重亦可以為輕若可以為重則語言過當者直謂之語及先帝可也若可以為輕則雖語及先帝者但謂之語言過當亦可也然而典刑之所加則不可同日而語矣夫因其近似難辨之迹而典刑輕重随以上下是乃陛下威福之操柄書所謂惟辟作福惟辟作威者正在此也可不謹哉臣今據臣所知已行遣過事件等第節録如後一勒停謝愔訴雪父景初罪犯狀内稱非今日朝廷清明何以雪幽寃於泉下等語言自鄧州職官勒停元符元年十二月二十一日一降官韓忠彦王存等奏雪謝景初罪犯劄子内稱朝廷専置官局辨理枉横景初不幸身歿不能自直等語言其韓忠彦自大中大夫降授中大夫王存自右正議大夫降授通議大夫元符二年正月十七日一周之道訴雪本身罪犯狀内稱天下之寃無如臣比若不仰告公朝臣無路伸理等語言自朝散大夫降授朝奉大夫元符二年五月一日一閻令訴雪本身罪犯狀内稱有罪之人於格不應除雪者茍情渉可矜類䝉寛減聖恩曠大千載一時况臣無辜義當自直等語言自朝奉大夫降授朝請郎元符元年五月二十六日一馬誠訴雪本身罪犯狀内稱朝廷専差制使置獄劾問雖明知傅致鍜鍊不敢以寃濫愬陳恐重得罪等語言自奉議郎降授通直郎元符元年十月十四日一降官及降差遣任公裕訴雪本身罪犯狀内稱刑部一槩以特㫖遂稱難議施行以此排天下之幽寃使不得伸理及稱制勘院附㑹鍜鍊抑勒虛招致臣久負寃抑今覩聖時伸理天下寃滯伏望察臣非辜等語言自朝請大夫權發遣江淮等路發運副使降授朝散大夫充發運判官元符元年九月二十六日一遠小處監當宋喬年訴雪本身罪犯狀内稱朝廷明䘏寃抑喬年之濫罰亦冀獲伸庻獲情法相應寃抑得雪等語言令吏部與遠小處監當差遣未見月日一罷知州與宫觀葉濤訴雪本身罪犯狀内稱蔡確舒亶何正臣李定以興造刑獄為事故羅織及臣抱贓汙之至寃廢處江海今者伏值皇帝陛下太皇太后陛下廢黜姦惡登用正士矜恤民隐薄歛時使前日之吏多以㣲過被罪今方命有司覆理而出之茍臣不以片言自列則是滿堂取樂而已猶向隅衆皆望天而戴盆不已等語言自知明州差主管江寧府崇禧觀元符元年十二月一日一送吏部與合入差遣周邠訴雪本身罪犯狀内稱前日非辜寃抑幸得申訴於今日大公之朝儻䝉昭雪則臣之元降一官庻有望於還復等語言罷知吉州送吏部與合入差遣元符二年正月二十四日一罰銅吳居厚訴雪本身罪犯狀内稱今遇朝廷推廣恩惠凡有罪戾之人盡䝉寛貸湔洗人情莫不悦豫等語言罰銅三十斤元符元年十二月十七日一蔣之竒奏雪李萃罪犯狀内稱今來衝替顯是太重等語言罰銅十斤元年十二月五日伏望聖慈深賜省察以為來事之鑒不勝幸甚詳録此可見當日刑罰之不均也鄜延奏繳宥州牒已遣告哀謝罪人使十二人赴延州七月十日過界布録癸丑環慶奏具到新立烽臺堡舖及人馬廵綽所至之處畫圖進呈大約廵綽所至有及一百一十里至八九十里烽臺有四十里至五六七八十里坐團堡舖有二十里至三十里者如清平闗廵綽至大寨泉在清遠軍之外十餘里戩章㑹接涇原及百一十里至版井川猶六十里又至通峽寨猶五十里上亦病其太遠然以畫疆未定姑聽之而已布録癸丑甲寅宣慶使雄州防禦使入内副都知劉有方為景福使以年勞也洮西安撫司奏乞支給例物銀絹錢及袍帶等招納西蕃部族首領詔户部造金帯渾銀交椅及錦袍銀帶金帛等送熈河經畧司應副支給錢絹等不足聼以諸司封樁及軍資錢物借支訖奏布録甲寅孫路奏㑹州計置功料已備不須減歩數從之仍賜將士特支布録甲寅六月二十二日詔減歩數九月一日畢工乙卯鄜延路奏欲併廢順寧白草等寨詔從之將來更有似此可廢併去處速具聞奏丙辰薦饗景靈宫是日大暑内侍執扇從行升皇武殿上顧見郤之丁巳薦饗景靈宫幸集禧觀中太一宫為民祈祥先是有㫖行幸差殿内親從五十人翼左右而行上自東階降赴西廊宰臣親王執政官皆為内侍所約出外上宣令於圍子内行己未軍頭司引見殿前馬軍司揀試到散祗候等殿侍長行共八十人試藝上親閲人材呼出散祗候王貴陳逹問所射弓更可加斗力否皆願射兩石力弓令再射各應法並換左班殿直更減三年磨勘面賜袍帶貴自陳曾随軍入西界眼下中箭得輕傷酬奬乞改作重傷上謂權承㫖李憲等曰眼下中箭何得為輕傷邪憲等奏以未經官司勘騐詔送樞宻院改正右正言鄒浩奏臣伏覩近降指揮令鄭佑等相度燕家河若開濬後不能行奪北流虛費人工物料逐官並重行朝典自非聖明照見本末豈及於此不勝幸甚然今來所用水官盡是主張東流縁此轉官擢任之人雖已重行朝典豫嚴戒敕竊慮各官勢須力䕶前失規為身謀不免虛費人工物料等事待其事敗然後黜謫則人工物料之費其害已不貲矣伏望聖慈特降指揮令條具内外官曾任水事而不専主東流之議者選用其人使與見今水官相參措置施行庻㡬利害得實不至重有勞民蠧國之弊浩奏附遣曾孝廣前詔水部員外郎曾孝廣詣河北路相度措置河事孝廣嘗為南外都水丞遷都水監丞不主東流之議及是河决内黄故使孝廣按行因得申其素志此據曾孝廣傳九月十九日乞罷外都水丞前知潁昌府吳安持請罷河北都轉運使新命從之安持六月二十六日初除河北都漕鄜延奏西使過界乞發遣赴闕從之令以二十三日行下布録己未環慶進築萌門三岔河東進築嵐石麟府八寨堡並賜將士特支庚申刑部言承受制書官文書及為人掌寄制書官文書在赦前亡失不曾經官司自陳而赦後事發者不以赦原從之新無辛酉大中大夫提舉崇福宫鄭雍卒癸亥殿前副指揮使姚麟乞免與馬歩帥同揀人從之上曰若揀選不當自可按舉曾布曰近聞多差中使同揀則雖兩省亦自無用上曰中使亦間差爾麟曲奉中使揀人之際陞黜惟命麟唯諾而已而獨指二帥同㨂為侵官且云愧恥殊不以中使為言歩軍都虞候曹誦曰麟盖欲因此以交結也布録甲子環慶路經畧司言知環州种朴領兵至赤羊川收接到尚羅格依家屬共一百五十餘口孳畜五千夏賊千餘騎來追與戰生擒監軍額伯爾并首領埒丹鄂特裕勒先是尚羅格依遣納木依卜紳報欲歸漢朴以兵迎接是日值監軍㸃檢野寨格依與首領輩皆徃候之朴乃獲其骨肉及首領扎實等數家以歸詔環慶路經畧司更切體問額伯爾如委是西界監軍即取問在西界日所管地分人馬數目及彼界有何家屬并見聞事速具狀以聞仍管押赴闕所有尚羅格依家屬即多方存恤無令少有失所及選差信實之人通逹本家信號前去招誘格依令早出漢玉牒云知環州种朴討夏賊俘勒監軍額伯爾首領埒丹鄂特裕提㸃河北路刑獄王震知邠州權提㸃江南西路刑獄程筠知鄂州震筠必有故當考丙寅涇原路安撫使章楶言於鹻隈川擇地進築為寨本處附近有鹽池周圍約及十里所産紅白鹽二色詔李譓相度措置以聞十一月二十八日熈河蘭㑹路經畧使孫路言新歸順西蕃大沁戩畢斯布結使首領勤巴阿勝將文字投漢願將部族地土獻與漢家所管地分西至黄河北至布嚕克丹巴南至隆科爾結一帶東至伊朗城額勒濟格城丹巴城至斯丹南一帶甚有部族人户見管蕃兵六千一百四十人其畢斯布結係西蕃近上酋首世族名望所管部族人馬彊盛今來率領本家人口歸漢及獻納地土部族人户顯見忠白望優與推恩其男姪女壻亦望等第補授名目詔令路詳上項事理據投來部族人户斟酌在蕃日所管職事并事力次第具合補名目以聞此月七日云云可考又八月九日玉牒云吐蕃大酋畢斯布結内附以其部族土地來獻新紀云洮西安撫使王贍復邈川城西蕃首領勤巴阿勝以地降新録刪修云熈河蘭㑹路經畧使孫路言新歸順西蕃大沁戩畢斯布結使首領勤巴阿勝將到文字以部族地土來獻見管蕃兵六千一百四十人其畢斯布結西蕃近上酋首乞優與推恩其子姪及壻亦望等第補官詔本路據投來部族地土多少詳察在蕃職任并事力次第具合補名目保奏初畢斯布結既以嘉木卓等四城來降邈川諸酋相繼亦求内附時方進築㑹州工未畢乃詔中分其兵令孫路駐河州王贍將河州軍兵為先鋒總管王愍將岷州及熈州軍馬䇿應以撫納邈川諸部是月己未詔下甲子師發河州次安鄉城贍以先鋒自密藏渡過河有素相結納密戩等三人背盟拒旅贍宵濟奪其隘擒密戩斬之丙寅遂克邈川即日以㨗書聞孫路怒贍徑上㨗書不復由帥府䜛間自此作矣此據汪髙二録戊辰熈河路經畧司言㑹州城去大河不逺與蘭州事體一般可繫橋於河外建立闗城實為經久之利詔孫路相度事力可為及材料已備即一面從長施行曾布因言孫路此謀甚善若度河置闗即正如蘭州金城闗之壯蘭州未有金城以前毎嵗河凍非用兵馬防托不敢開城門然此事亦大既不奏又不申宻院但只以私書白章惇臣等皆素不與聞昨日章惇以此書示臣臣亦以為當然素無奏報欲未施行又慮西夏入貢後異時不復可為故須作訪聞行下孫路措置邊事前後只以私書徃還似此非一上曰如此事何故不奏青唐事尚云經畫未定未敢奏此不奏何也衆亦曰此事不當不奏上曰前後事且未論此事當詰問何以不奏遂批㫖云孫路既有上件條畫因何不具奏陳令具析聞奏惇亦答書行下二十四日甲午布録云苖履奏㑹州城去河三百餘歩矢石不及不可繫橋又河中有灘磧自中灘至河北岸懸崖陡岸無可置闗之地户兵部言涇原路新建城寨西安州未限定驛程經畧司相度自鎮戎軍至平夏城為一程自平夏城至臨羌寨為一程自臨羌寨至西安州為一程仍乞平夏城驛以石門為名臨羌寨驛以秋葦為名西安州驛以鼐摩為名從之已已洮西縁邊安撫司言帶領河州漢蕃兵下結宗城齊暖城且凌城密藏堡結宗堡羅格堡又名幹布堡其新據城堡内有王子并不附順首領倉庫物料已封閉備將來軍儲支遣詔孫路依詳累降朝㫖應所招納河南邈川等處願投漢部族首領更切體度蕃情務先以恩信撫納毋専以兵廹脅并合措置應接溪巴烏等務為邊鄙經久安便之計不得過有所圖别生邊患其所得城寨内合只以心白向漢有力量首領住坐守把或係要害須合差兵馬戍守之處子細審度經久利害務從簡便無令廣有增費財用兵力十一月二十五日當并考孫路又以書抵章惇云且留溪巴烏以持轄正若捐數十萬縑招巴烏新附之衆歸漢則巴烏一孤雛爾曾布因草詔戒孫路惇初不從紛争久之乃定蔡卞以布理勝乃云大事且欵曲商量不須争喧恐觀聽不便布曰當如何衆皆云約束路不妨惇稍屈布因言公多以聲色加人布褊𠂻亦不能忍故徃徃紛争然亦當量國事所繫不敢茍且惇曰公不容人説何嘗不婉順馬上與公言莫且更商量公便怒布曰公不自覺因何士大夫人人皆言為公所慢罵惇曰何嘗罵他但言甚道理須要堂除差遣之類布曰若但如此婉順曉之人亦不怒盖聲色厲不自知爾惇曰公言惇心風豈不是罵布曰公言布欲與西人畫河為界乃云是雜賃院裏婦人言語莫亦是罵否布無他所争者皆國事不敢誤朝廷措置爾惇曰惇豈是為家事布曰公固亦是為國事但須要是爾如孫路欲逐溪巴烏而奪青唐為州郡則布死不敢從也既對亦為上陳其畧上亦以所草詔為然遂行下布再對又言章惇近於邊事凡有所欲為知同列必不合則必隂以書諭諸帥令如其㫖意經營奏請如近日環慶置烽臺堡舖及廵綽處太逺於諸路亦是惇以書諭胡宗囘令如此措置既於清平闗外以大寨泉為廵綽之處已過清逺軍十里又令宗囬更展至大寨泉北欲於此築城又令展至吹哷羅章之外廵綽要於吹哷羅章作寨宗囬皆不敢從并封惇書相示因亦進呈上皆詳覽再三又封折可適書與宗囬其言皆不可用布對三省又與惇言公多以書與兵官如折可適王贍輩皆蕃部之人何可與書一有敗事恐未免為累惇曰昔王荆公與王韶書言邊事無數布曰荆公但發書與韶及公何嘗以書與兵官荆公是時於布無間日見荆公發書與公但以妄殺為戒爾河東路經畧使林希言北界沿邊都廵檢管勾朔州同知多造事端自六月十三日驅擁人夫侵越取水除已為廵檢何灌約囬經一月有餘不至今月十八日復來取水其同知徃來戎帳節次已具奏聞縁北人自前嵗改移東偏頭稅場去嵗拆石墻今嵗不受牒便於賈胡疃興建場屋又過天澗取水及有分水為界之語蓄謀三年發於今日竊恐其勢未已除已牒折克行選差使臣前來依朝㫖随宜應接外縁方當進築之際正藉克行及其子可大帯領兵馬在北界防托深慮那移兵馬前來其本地分廵檢兵數又少如北人再領人馬數多過來陵犯何灌等若便行應接深慮兵力不敵兼恐别生事端已宻諭何灌等及折克行所差使臣但嚴勒兵馬把截取水道路過作隄備不得輕易便行鬬敵其北人所創税場本為私相買賣既嚴禁互市自足以破其謀今若更來取水亦不必與之力競俟進築了日軍馬各歸沿邊有備至時尚來取水不已即别有措置随宜應接亦未為遲從之何灌祥符人墓誌云三年為河東第九副將兼沿邊同都廵檢使此二年已稱廵檢恐墓誌或誤
