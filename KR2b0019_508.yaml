body:
  text: 續資治通鑑長編卷五百四宋李燾撰哲宗元符元年十一月乙巳朔承議郎都貺為金部員外郎許幾為虞部員外郎新彰信軍節度推官方天若試正字先是天若初得召對曾布言天若不可進上曰誰舉之布曰不知上曰徐鐸也布曰天若凶慝衆之所惡林豫嘗言閩中有二凶人一在館閣乃林旦一中高科乃天若此朝廷不幸也昨程文中欲禁錮元祐人子弟籍沒其家産此乃迎合之語非敢言也願加察上曰須且令上殿布曰已召對不可已但於進擢之際願更留聖意審察上頷之布録十月壬辰今附此西作坊使英州刺史知瀘州王獻可再任滿遷左騏驥使又再任上諭曾布曰獻可元祐中亦有章疏獻可二年五月十八日竟責布嘗敘訴理事云先是章惇進呈余爽書出惇家人頗疑之上遂搜閲於禁中得真本又得其乞還政書然宣仁六月已服藥爽七月十三日乞復辟九月三日升遐矣故不能救前貶上因檢尋余爽文字遂見張敦禮王師約所上書已而兩人皆貶師約貶于此月六日上又言周鼎李許輩亦皆有書又言許附陳衍可罷閣職及進呈乃云事狀不明且已而周鼎輩文字亦不出此可以知聖德之仁厚也然自爽事後迄今紛紛未己而蹇序辰及安惇又數以訴理事文致緣飾乞施行惟上意終緩故被禍害者亦鮮但羣小凶焰未肯收斂爾丙午御批勘會近降指揮御輦院將來南郊差撥下都輦官五十人般擎御前物色自可相度間慢去處申明抽那應副其本院被受聖旨經宿乃奏仍復引用常條更不施行所有合干官吏可送大理寺疾速取勘聞奏御集十一月三日事究竟當考又批御輦院官係進乘輿最為親近今梁吉者出自軍伍似非所宜可下吏部審會别行選差自今闕官凖此丁未權殿中侍御史鄧棐言嘗論右司郎中孫杞察訪河北首薦執政大臣親黨門人聞有詔罷杞右司除小郡請早降責命以示天下會杞卒詔杞緣右司郎中身亡合得恩例勿行九月四日安惇云云可考户部言祿令致仕官若本身遇特恩轉官者並依所轉官絡料錢字下請增入注文內該請衣賜者凖此從之新無戊申工部上鑄錢監監官任滿得替殿最法户部上捕蝗法並從之舊本特詳今從新本已酉御史中丞安惇言近奏翰林學士蔣之竒於元祐初奏雪知亳州李莘前任江西提刑日衝替罪犯為太重事望詳前奏早賜處分詔之竒贖金十斤鄒浩云云監察御史蔡蹈言齊鄆濵滄等州大被水患為害甚逺良由北外都水丞司自去年七月以至今年一嵗之間略無措置以備捍禦馴致今日之患詔權北外都水丞竇訥罰金三十斤仍令梁鑄根究河水泛溢去處係是何官司管認及應有罪之人具狀以聞權殿中侍御史鄧棐言河北監司同薦權北外都水丞竇訥正任按訥乃執政大臣之壻監司貪附貴權急於媚竈忘其分守越職論薦曾不顧忌請正犯分附勢之罪詔李仲陳繫王敷各贖金二十斤竇訥章惇壻陳瓘云王敷提舉河北常平實録在三月八日陳繫提舉河北路常平乃紹聖四年五月六日李仲提點河北東路刑獄亦四年十一月十五日三省檢會元祐七年宣德郎宋保國奏請太皇太后行躬詣太廟之禮詔故通直郎宋保國追毁出身已來文字除名宋保國舊特詳今從新環慶路經略司言都鈐轄張誠等襲逐寇犯涇原西賊獲五百餘級詔張誠下軍兵等各賜錢有差其得功將士等仰經略司保明以聞樞密院言近西賊舉國侵犯涇原路攻圍城寨惟恃重兵務在速戰其本路經略司及統制官副都總管王恩等統領官姚雄姚古環慶秦鳯統制䇿應兵馬种朴王道各能持重不與輕戰保全師衆及屯據要害張耀兵勢使不能深入作過致賊無利沮喪遁歸詔賜王恩等銀絹有差朝散郎楊挺為虞部員外郎庚戌吏部言請選人應合用舉主關升改官者除依條限定員數并合用職司外更許奏舉不得過二員從之新無三省奏鎮安留後駙馬都尉王師約元祐間嘗奏請令殿中一二使臣或臣有文字密令承受投進利害可否一繫陛下裁處詔師約降為泰州團練使布録十一月乙己朔云云可考户部言請在京麴院監官每年趂辦課額及三十萬貫減一年磨勘從之新無辛亥上幸醴泉觀壬子樞密院編修文字所言諸將下步軍教習事藝並依海行法除上名人外以十分為率置弓弩六分槍牌手二分遇結隊即依隊法其隊內所闕槍牌手人數却以互習人充代從之癸丑宣慶使榮州防禦使入內副都知梁從政為景福殿使三省言元豐末元祐中王鞏纍上書議論朝政表裏姦臣欲盡變更先朝法度張保源纍上書議論朝政附會姦臣詔朝散郎王鞏特追毁出身以來告敕文字除名勒停送全州編管通直郎張保源特勒停仍展三期敘於峽州居住元符末邸報全州編管人前朝奉郎榮州僉判王鞏元豐末及元祐中纍上書議論朝政表裏姦臣奉聖旨特追毁出身以來告敕除名勒停全州編管奉聖旨放逐便因此可考陳次升言章惇事附元符二年五月二十六日吏部員外郎王博聞言按律宗室下人從輒以鞭棒之類爭奪馬路者杖八十請令百官同為一法從之仍情重加二等新無提舉永興軍等路常平等事蔡肇言按到邠寧慶三州昨環慶路修安疆城寨木植等於上户收買和顧除知邠州仇百玊己降兩官外龍圖直學士右中散大夫新知熙州孫路皇城使文州刺史知欣州藍從周朝奉郎通判太原府李公裕奉議郎新知曹州南華縣事韓緒宣義郎知涇州耿毅各降一官巳未吏部侍郎黃裳言元豐官制凡入品者皆給告身其無品者給黃牒故雖小使臣皆絡告身後來時務從簡遂行宣劄指揮於理未安請自借奉職而上皆給告身復循元豐官制從之舊云復先帝給告之制新削去三省言聞訪市中石炭價髙冬寒細民不給詔專委吳居厚措置出賣在京石炭新削詳定重修大禮敕令所言元豐四年十一月詔親祠宗廟歌者在堂更不兼設鐘磬宫架在庭更不兼設琴瑟堂下匏竹更不置之於階詔登歌鐘磬並依元豐四年詔旨舊録云復先帝禮制也新録削去司封言元豐法中散大夫將軍團練使雜學士以上母妻並封贈郡君其餘升朝官母妻並封縣君銀青光祿大夫太子少保節度使以上郡夫人開府儀同三司以上國夫人並係用子官封敘元祐更制遂紊前法詔封贈並依元豐法舊云復先帝封贈法也新削去庚申刑部言投換軍將人如無家業者許將見錢五十貫已上願納赴官收管充抵當許行投換在京於府司檢校庫在外於所屬州府軍資庫寄納從之新無辛酉上齋于大慶殿壬戍薦饗景靈宫詔讀册官至御名勿興凡讀册皆如之著為令遂齋于太廟癸亥朝饗八室齋于南郊之青城甲子冬至祭昊天上帝于圜丘以太祖配禮畢羣臣賀于端誠殿還御宣德門大赦天下應見貶謫官員除元祐餘黨及别有特旨之人外未量移者與量移十月末鄒浩云云可考戊辰詔莘王俁簡王似依申王佖等出閣例添賜公使錢庚午案此日原本缺文辛未恭謝景靈宫壬申詣上清儲祥宫是月髙麗遣使尹瓘等入貢二年正月二日館伴髙麗所言髙麗使尹瓘等欲十三日朝辭詔留之檢實録等書並無尹瓘入見月日又按王雲雞林志云元祐五年元符元年貢使再至徐兢圖經亦云元祐五年則已見十二月五日獨元符元年須别考詳姑附十一月末又按髙麗使者自元祐以來屢至京師不知王雲何故但舉兩名豈彼時只此貢使歟當并考詳十二月乙亥朔詔自今宣赦書德音輪小兩省官一員往宣讀處指摘句讀寶文閣待制知秦州陸師閔試戶部侍郎知樞密院事曾布言陛下比以甲子冬至躬祀圜丘自奉祠景靈已徹黃道裀褥詔讀册官至御名勿興及赴大次又詔百官不許回班所以深致寅畏之意至太廟門降輅入趨齋宫及升輅赴郊皆屏蓋却輦步趨以進薦獻之際至神宗室悽愴泣涕逮還版位沾濡未巳惻怛感左右臣備位輔臣職在贊導悉所親覩伏乞宣付史官書之典册從之丙子文武百官並以南郊赦書加恩給事中范鏜言中書省送到新知明州葉濤改知淮陽軍為元祐中訴理先朝被罪不當詳濤所進狀辭情不遜侵黷先朝今止降知州軍猶有民社未敢書讀行下詔濤知興國軍鏜再論奏改管勾崇禧觀陳瓘云云鄒浩云云戶部言庫務給官司合用物並監専書押封印供納及付請人候到當官驗認稱量交割其不可書押封印者止封樣交割從之新削丁丑鴻臚少卿趙㞦為太僕少卿按舊録八月九日太僕卿趙令鑠為鴻臚少卿趙㞦為太僕少卿曽布日録云令鑠坐收租便鈔事故與㞦對移又按舊録于十月十九日却書趙令鑠知光州此時又書鴻臚少卿趙㞦為太僕少卿與前八月九日所書並不合恐實録因仍繆誤當詳考修入右司員外郎劉拯試太常少卿太常少卿張商英為集賢殿修撰江淮荆浙等路發運使家傳云以太常少卿召未及入見改除集撰發運按商英除少常乃四年十一月二十六日不應一年餘不曾供職六月十二日己丑曽布議除商英待制知瀛州亦稱自少常除家傳必誤也今本傳因家傳鄜延路經略使吕惠卿言威戎城等處收接到西界歸順首領密鄂特成斡按例合補內殿崇班從之館伴髙麗使所奏尹瓘等尅定來年正月起發回程臣等己婉順説諭瓘等可且盤泊繼而會食又言聞修州橋恐閉口無水臣等未見開河畢工期限慮人使進發河水妨礙御批契勘髙麗使人到闕盤泊未久宜劄與館伴所且作朝廷再三優異待遇欵留之意所有開河造橋可相度别展月日下手仍一就劄與照會因坐間今委曲開諭尋令髙麗使以二月下旬朝辭三月初選日送發御集十二月三日事實録見明年正月二日當存彼去此戊寅遼國遣使奉國軍節度使蕭昭彥副使中散大夫守太常少卿充乾文閣待制王宗度來賀興龍節己卯尚書左丞蔡卞言昨季秋大享于明堂差充初獻就南郊望祭殿行禮竊見其殿制度迫窄階級平夷未足以仰稱嚴事之意蓋聞明堂者天子布政之宫於以朝諸侯而先王宗祀配帝乃就此者所以致親親之意也國家皇祐初講求墜典始即大慶殿奉祠至今循之蓋得古宗祀之遺意獨常嵗遇祭位處有所未安恭惟對越上神配以烈考大事也雖遣官攝事亦當如此伏見新作南郊齋宫端誠殿實天子潔齋奉祀及禮畢見羣臣之所在國之陽髙明邃深可以享神即此行禮於古義為有合請自今大禮依舊制外其常嵗秋大享改就端誠殿從之詔皇太后曾祖考追封魏王向敏中追封韓王妣梁氏張氏宋氏王氏改贈陳國魯國豫國雍國太夫人祖考追封魯王向傳亮追封唐王妣吳氏改贈兗國考追封陳王向經追封吳王妣李氏張氏改贈荆國楊國皇太妃曾祖考崔實贈太子太保妣柳氏贈吳國祖考崔琳贈太傅妣楊氏贈秦國考贈太尉崔傑贈太師妣李氏改贈唐國繼父贈建武軍留後朱士安贈保寧軍節度使開封府推官錢蓋為刑部員外郎涇原路經略使章楶奏依凖六月七日九月十九日十月二日十一月二十五日五次朝旨相度到進築利害下項一欲涇原熙河兩路邊靣通接即合先於涇原路蕩羌寨西北正原灑水平各築八百步寨一所南牟會建一千二百步城一所若不往正原修築便取直徑至灑水平即合自蕩羌寨至灑水平中路修建六百步寨一所只緣取直中路難得水泉恐不可修建堡寨即須自正原前去今來未敢指定中路修築堡子去處候師行臨時相度施行一今來所欲進築去處自蕩羌寨至灑水平約七十里鼐摩會約一百餘里且只論兩處修築每處護築各須占二三萬人其一百里之間道路巡檄防護糧運并於修築前靣逺近探候及左右前後卓望巡綽伏路等諸雜使喚又須占使萬人上下兼顧賊人已知搗虛之利本路既於天都等處進築只能屏蔽得山外諸城寨可以量留人馬防托外至如鎮戎軍東天聖乾興等寨地分須防賊馬抄掠非留萬人未易枝梧只用大路兵馬及環慶一萬五千人實是分擘使喚不著須如修築平夏靈平時會合四路人馬方保無虞又近日賊馬攻圍平夏城退散之後三路人馬追粘在葫蘆河川賊却選精鋭騎兵出天聖乾興等寨地里未甚窵逺賊人已能料度官軍聲勢不能相及遂敢出沒作過將來於灑水平等處進築比葫蘆河川去天聖乾興等寨地里又更兩倍之逺誠是搗虛出沒之處狀內所陳欲留人馬一萬防托照管尚慮兵力單寡枝梧未得其平夏城靈平等寨慮於將來進築之際亦合存留兵馬照管以此須當會合四路人馬方可分俵使用得足惟望聖慈力賜主張施行又契勘去年進築平夏城等處係假借熙河步騎兵三萬秦鳯環慶各一萬今乞會合上件三路人馬若熙河為新添城寨占使人馬處多即乞只假借步騎兵共二萬却於秦鳯環慶各假借一萬五千人騎蓋本路自去年以後添築却六城寨七堡子占留兵馬數目不少今更合在天聖乾興等處屯留兵馬即是本路護築兵不過三萬餘人一議者謂今秋賊既點集來春必難興舉臣與老練邊事將佐并得力蕃官密切商議以為鼐摩會天都等處乃西人要害地分決須出死力爭占官軍若往進築夏人雖不能竭國點集若只側近勾抽十數萬人馬亦未甚費力如謂今秋己點集來春難於興舉則紹聖三年九月內既來寇鄜延次年三月又來本路葫蘆河修築處出沒不得便指凖作困弊無能為今日邊事向成如此一有蹉跌却致增長賊氣虧損前功非良計也李忠傑是天都人亦言若往彼處進築西人必須爭占如不大著人馬未敢保無疏虞仍言忠傑今年到京師日亦曾以此事言與朝廷近日投來部落子通析到事宜己云欲於來年二月間再有出入伏乞照會一涇原如己築了鼐摩會大都等處即是己屏蔽却熙秦兩路邊靣其熙秦却要會合兵馬修築城寨堡子不拘時節甚易為力若須令涇原熙河同時下手修築以為聲援相接緩急可以遞相救應臣竊詳鼐摩會去東楞摩等處不下三二百里聲援自不相及緩急無由照應在涇原則是兵力單寡決無成功在熙河則有涇原兵馬當著西人要害來路為之捍禦屏蔽易於興舉比兩路利害甚不相同其興舉先後緩急之序固當如此一臣今狀所陳係與孫路靣議以為須當會合兵馬先了天都鼐摩會等處非臣敢妄分彼此遷延嵗月兼臣昨來五月內乞會合環慶秦鳯人馬只敢奏陳進築沒煙前峽當時見得機會可乘遂一靣分兵馬修築沒煙後峽今來進築去處若只用環慶兵馬可以了當何須更煩朝廷拖拽别路人馬伏乞深賜體察一熙河秦鳯兵馬欲乞於數內共撥五七千人充自蕩羌寨沿路防托巡徼外其餘人馬並令管認修築鼐摩會一處城寨仍乞令孫路一靣相度或親到軍前或只在進築處側近新修城寨照管熙河秦鳯人馬此事臣巳與孫路當靣商議更合取朝廷指揮一將來進築臣合前去平夏城或蕩羌寨照管軍馬如朝廷許令孫路過涇原即乞指揮與臣一處商量行遣應干分擘那移人馬差委官員使臣并軍前其他凡百措置及進築事件與四路將佐等並聼臣與孫路同共節制指揮一臣今狀雖已指定進築鼐摩會灑水平或正原或灑水平中路三處城寨只是約度到形勢地里或臨時别有移易許臣一靣從長相度施行一契勘本路自去年以來進築城寨逺不過四十里如平夏城去熙寧寨只是三十八里有餘今欲於百里外進築所憂腳乘船運不易體問得正原及灑水平等處山林雖近只是有大木至於磚椽之類須是從九羊鎮羌通峽蕩羌靈平平夏城等處輦致前去又如馬草今秋為賊馬盤泊日久自鼐摩會一帶並己踐踏食用惟有赤地非如修築平夏城時有可因之草亦須般運前去欲乞和顧本路車乘頭口調發保甲外更須如平夏城例和顧熙河秦鳯路車乘頭口仍調發秦鳯保甲前來所貴不至遷延日月速得了當黃貼子鼐摩會偽內所在天都畜牧耕稼膏腴之地人力精強出産良馬夏人得此則能為國失此則於兵於食皆有妨闕將來進築城寨占據了當夏人所有惟餘興靈雖未滅亡大勢已定今日朝廷欲就此事為邊防永逺之利其於勞民動衆勢不得免即非臣敢張大事勢過有邀索也又契勘去年修築平夏城蒙朝廷應副到廂禁軍共四萬人數雖當時收管之人不及上項數目實亦近得三萬人將來進築天都無上項添助工役之人比去年事因已是減耗至於腳乘之類尤更不易辦集蓋平夏城只是四十里內般運兼曾調發本路保甲和顧到熙河秦鳯兩路車乘頭口將來般運逺在百里若只用涇原一路腳乘決是般運不前豈可屯聚四路人馬在外進築而百色所須之物却輦致不辦逗遛日月必無成功所乞依修築平夏城例和顧熙河秦鳯保甲勢不得己伏望深賜矜察一本路去年以來修建却城寨及守禦堡子共八所不守禦堡子又五所除朝廷前後兩次添差到兵士一十五指揮外其餘只是本路儧那分擘人馬前去戍守兩畨占却二萬人今來更議進築本路實更難為那輟乞自朝廷應副馬步軍五七千人前來所貴新舊城寨各無妨闕黃貼子勘會昨來平夏城防守民兵正兵弓箭手共用四五千人方得於賊馬攻圍之時别無疏虞今欲修建三城寨即合於賊馬來路要害處更添築堡子三兩處所用防守之人恐雖添得五七千人亦未足用一臣素所憂者開邊雖廣修築城寨雖多其糧食草料並是官中用髙價糴買戍守之人亦是朝廷增添或係本路多方移輟前去貪外虛內既非邊防久逺之利又所闢地土耕種未有所得所招弓箭手未見成次第今日朝廷欲通接涇原熙河邊靣若涇原已築了灑水平鼐摩會等處熙河自東楞摩打繩川會州迤邐通接前來包裹得幅員數百里之地誠是邊防大利只緣三二年間兩路新修城寨堡子內糧食草料官中不易供億兼人戶未肯便逺去鄉井投刺弓箭手所用戍守之人皆須增添官軍議者欲自淺井修築迤邐北去蓋是便欲招置秦鳯路側近弓箭手人家子弟親情投充新邊弓箭手三五年之後耕種著業皆是勝兵如朝廷急欲通接邊靣則淺井之議可置而不論也一將來興舉須就春暖或四月間所有樓櫓材植及應干版築之具并防守器具什物等見今並已經畫計置次第其合用糧草理當令熙河秦鳯涇原三路應副糧草官通融計置方得辦集乞朝廷特降指揮緣本路經賊馬寇犯之後如鎮戎軍及三川定川熙寧髙平并新修六城寨糧草數目大抵食用殆盡伏乞照會黃貼子契勘進築平夏城等處會合到四路人馬費用糧食草料數目甚多緣當時沿邊城寨各有自來儲蓄只是般運前去今日極邊新舊城寨糧草數目不比日前大假闕少若只令一路應副糧草官獨自管認幹辦必致闕事伏乞詳察右謹件如前伏乞聖慈更賜採擇如可施行即乞早降指揮黃貼子伏詳進築出於事不得巳未是至計欲捨此䇿會合諸路人馬大舉入界則又雕耗民力拖拽兵馬未必保成功勢須從進築之計稍據要害地土迤邐逼脅西人招喚撫納剪除夏國籬落今日涇原進築所據有之地誠亦要害西人近日攻圍作過無所得而去自此降附之人當繼踵以來朝廷未欲向前進築則已如須前去占據灑水平鼐摩會等處若却草草興舉一有差失人心便各沮喪未易振起廢前功而招後患雖將主事之人痛加誅戮無補於事臣今狀所陳非敢張大事勢以進築為貨區區之愚惟欲王師舉動所向必成載在方册夸示後世臣與有榮焉欲望聖慈詳臣狀內所陳事理特從睿斷施行又契勘今年正月內所降朝旨令進築正原等處指揮令會合三路人馬蓋是朝廷己知彼處形勢要害西人必來爭占之地故須多用人馬捍禦防托豈可緣西人今秋曽經點集之故便謂困敝無能為可以輕易侵犯其地臣愚過慮以為如此興舉未是萬全決成之䇿就如西賊誠是困敝至於被人奪其要害膏腴一國所恃以為輕重強弱安危之地土豈肯束手無為瞪目熟視而巳必將倔強跳梁僥幸以來以救其所急何暇更恤人力困與不困哉更望朝廷深思熟計為邊防之福臣自承凖今年六月七日朝旨令與熙河蘭會路經略司子細講議尋差官齎牒前去與熙河帥臣張詢商量未盡利害間朝廷改差孫路知熙州尋又凖朝旨令臣與孫路更切講究利害本官因赴任過渭州臣與之當靣商量梗槩如此竊慮本官到熙河後别見得利害或臣狀內所陳事理有未允當欲乞朝廷將臣今狀下孫路更切看詳相度如路亦謂可以施行即乞速降指揮又將來涇原既占據却鼐摩會天都等處欲自熙河路通接邊靣前來雖據地圖合從齊訥納森及東楞摩等處修建城寨迤邐接連終緣彼處地里形勢臣素不諳知旁採人言又難全聼只如彩畫到地圖靣靣不同無所考正今來不敢妄意保明只乞指揮下孫路一靣相度必得的確利害詔所乞會合四路兵馬令逐路各選差精鋭堪出戰人馬凖備應副其環慶路兵一萬內騎兵三千委种朴統制熙河路騎兵二萬委苗履統制秦鳯路步兵一萬五千騎兵五千委李沂統制仍仰逐路更切令統制官預先選定得力將佐候涇原路勾抽即立便發遣前去不得稍有逗遛住帶如到涇原路並聼章楶節制仰章楶候舉動有日方得勾抽及令秦鳯熙河依近例和顧無馬弓箭手及有馬無馬之家餘丁應副役使自起發日支與盤纒口食如尚差使不足方許於秦鳯路第三等以上保甲內據合要人數從上勾抽應副仍自起發日通不得占留過兩月如有合用糧草仰熙河秦鳯涇原路應副糧草官同共協力計置應副糧草不管闕事內腳乘除本路和顧外更於熙河秦鳯路和顧車乘應副般運其合行約束事件並依去年十一月二十一日朝旨施行及令孫路候涇原路關到出界進築即將熙州公事交割與以次官帶經略安撫都總管司公事及合用將佐兵馬前去本路沿邊接近涇原進築處要便城寨住劄張大兵馬聲勢就近照應其鼐摩會即難議令熙河秦鳯路人馬管認進築仰章楶選擇本路得力統制官如姚雄姚古之類差那一員帶領本路得力兵馬將佐専切管認仍於熙河環慶兩路統制兵將官內各選差一員分擘合要人馬同共管認進築餘並依章楶所奏內有不可行下事件即不一例翻録行下却致先事漏露有害事機此並據章楶奏議修入舊録刪取甚略今附注于後楶以十一月二十四日具奏其畫降朝旨據實録則十二月五日也涇原路經略使章楶言相度進築利害熙河涇原兩路邊靣通接合先於蕩羌寨西北正原灑水平各築八百步寨一所鼐摩會建一千二百步城一所未敢指定中路修築處候師行臨時相度修築今雖指定三處城寨正是約度形勢地里或臨時移易許臣擇利而行仍請會合兵馬進築詔逐路各選精鋭堪出戰人馬凖備應副並聼章楶候舉動有日方得勾抽戊子蔡州觀察使提舉醴泉觀李端慤為安德軍留後致仕從其請也監察御史蔡蹈為考功員外郎已丑戶部言見行鹽法如鋪戶願赴沿邊州軍堡寨入納糧草計價給引赴永利監算請官鹽委是經久可行從之新削京東路轉運司言通直郎孔宗夀等保明孔若蒙親弟前湖州歸安縣主簿若虛堪充襲封仍請若虛身沒之後亦别行選擇不必子繼所貴留意祖廟敦睦族人從之庚寅詔御史中丞安惇舉監察御史二員以聞三省言應看詳訴理文字所奏除雪不當得旨改正事欲令吏刑部具己經赦恩及期數開具至今合如何改正申尚書省從之宣德郎李積中權提舉荆湖南路常平等事八月二十六日吕嘉問薦積中要考積中本末故著此明年二月二十二日曽布云云辛卯三省言淮南兩浙路察訪司體訪得發運使吕溫卿在蘄州蘄水縣妄認富民陳鎡為親託買山作簰筏約直三千緡令家僮作馬比部名目於稅務發引前來所經場務虧少稅錢又令睦州青溪縣丞朱興宗於越州買麥穗紗千餘匹並不曽納稅及於舒黃州差禁軍充合破廂軍顧部內人充女使以二十嵗者作繡工以十六七嵗室女作乳媪詔揚州制勘院依公盡理根究不得觀望滅裂看詳訴理文字所言看詳到責授成州團練副使吳居厚稱罪止緣公今遭遇朝廷推廣恩惠凡有罪戾盡蒙貸前洗人情莫不悅豫詔居厚特罰金三十斤又檢會元祐年自元豐八年三月六日已後至元祐元年九月明堂赦恩以前官司斷遣公事亦行看詳奏雪即非先朝斷遣過人數恐不合一例看詳詔更看詳太學博士劉弇為正字曽布云云在正月二十四日壬辰權殿中侍御史鄧棐言訪聞新除知河中府賈青前知蘇州日粉壁出賞斷人穢語每獲穢語人罰錢入官聚所罰錢蓋造樂籍堂貧民力不能輸金而自縊死者數人權杭州日將所得供給寄公庫造酒出賣以收倍息其在常州買度牒與舊遊女倡為尼請下兩浙察訪司體量詣實又淮南兩浙路察訪司言兩浙轉運副使賈青自前任知蘇州後來多有不法事件及本官到蘇州體問却稱各有舉覺改正文牒詔江東轉運司體究以聞後轉運使郭茂恂究得其實以青提舉崇福宫明年正月二十七日青罷河中宣德郎陳遘言乞守令考課優等召對擢用詔守令課績優異者令吏部每嵗具姓名取旨涇原路經略司言折可適捕到西羌統軍威明阿密監軍穆賚多卜詔賜出戰軍兵緡錢有差仍體問穆賚多卜等所通事宜及具得功人實狀以聞仍就差使臣兵員防護逐人并妻母及大小首領等赴闕除穆賚多卜曽有意歸漢與免檻車如法拘繫外其威眀阿密用木檻擡􅐝餘并管押使臣並乘傳前來威眀阿密穆賚多卜皆勇悍善戰屢為邊患章楶諜知其虛可襲遣可適等間以輕騎二千出蕩羌六道分進寇不及知夜入其室執之盡得其家屬俘馘三千餘獲牛羊不啻十萬曽布白上曰此非常之功可賀也上曰可賀否布曰果莊亦賀及告陵廟此功不在果莊下章惇等皆曰此竒功也上遂許稱賀此據章楶傳附入二十二日楶進官明年正月十九日可適等進官折可適傳云可適權第十三將羌統軍威明阿密監軍穆賚多卜皆西界用事首領朝廷密詔圖之會二酋以放牧為名窺伺境上可適因請出兵銜枚夜襲之俘其家屬部族三千餘人簿所得十餘萬計哲宗於御殿受俘遣中使賜袍帶兵器金幣其所得地即天都山也曽布日録十一月壬辰同呈涇原奏折可適出界擒獲監軍穆賚多卜及統軍威明阿密并其妻孥臧獲無遺者上甚悅蓋二酋皆西羌之桀黠也遣中使賜茶藥及犒設將士曽布曰此非常之功可為慶賀上曰可賀否布曰果莊亦賀及告陵廟此功不在果莊下衆亦皆云此竒功也乙未同呈詔涇原檻車阿密等赴闕是日二府草賀上遣藥璫宣答有實繄廟算之語丙申同呈賜獲偽統軍人戰袍束帶及金帛等上屢稱折可適蓋可適與郭成以二千餘騎分六頭項往擒天都諸酋而為鄉導者乃穆賚多卜之部曲約寧者以懼罪來降故盡知穆賚多卜等巢穴所在又偵知其所居無兵馬故直造其卧內擒之李忠傑分詣銼子山擒星多貝中不獲然亦危以身免獲其牛羊部族衆甚丁酉章楶遷太中大夫仍賜銀絹各二千癸已上遣劉友端諭章惇令百官稱賀遂定以二十一日二府先草賀二十二日百官賀李額葉先己到闕劉友端管勾上遣友端問涇原所執二酋額葉驚曰此皆有智謀能厮殺羌人最為得力者不易擒也右正言鄒浩奏伏覩涇原路招降擒到西夏統軍監軍并大小首領及人口孳畜等萬數不少普天之下莫不稱賀以為先帝之志而陛下成之經所謂天子之功傳所謂惟斷乃成不足為陛下道也然兵家未勝則以決勝為難既勝則以持勝為難惟其時而已徒知決勝於其前而不知持勝於其後則將有棄前功而招後患者矣可不戒哉臣恐將帥之臣狃於屢勝不知所以持之得志而志怠忽事而事生無以釋朝廷西顧之逺慮伏惟聖慈密賜申敕益務謹重圖惟厥終豈但邊鄙幸甚實天下幸甚浩奏附見當考其日浩又嘗奏伏覩近者陛下御延和殿引見歸明蕃官令於殿前呈試弓馬等事夫以陛下威德廣被莫不革心固無他慮但戎人乍臣引見之初亦宜過防兼自今以往歸明者漸衆竊恐此事既傳其間不無隂懷兩端之人若令呈試顯屬未便伏望聖慈深賜省察今後引見蕃官即罷呈試弓馬等此奏附見當考其時乙未禮部言將來正旦御大慶殿朝會奉迎天授傳國受命寶從之仍著為令御史中丞安惇言伏覩先帝在御之日六察逐旬具彈過事件奏聞元祐大臣務為茍簡改為季奏望並依元豐法從之看詳訴理文字所言朝散大夫謝景初昨任成都府路提刑與倡女踰違特追兩官勒停元祐初孫永李常韓忠彥王存奏景初只因提舉司論議不合加誣坐罪又云朝廷専置官局辨理枉橫景初不幸身沒不能自直竊謂永等遭遇先朝致身禁從寵眷隆厚方裕陵之土未乾姦臣誣詆典刑以有為無語言不遜無所忌憚元祐訴理所稱事出曖昧顯涉寃抑特與奏雪遂除落景初前斷過名委屬不當又景初男愔元祐二年狀稱非今日朝廷清明可以雪幽寃於泉下詔謝愔特勒停韓忠彥王存各贖金三十斤新録刪去竊謂永等以下凡四十一字永等言有司議罪不當而云誣詆典刑語言不遜非是按當時行遣除此則為是乎今復存之明年正月十七日忠彥存各降官鄒浩云云樞密院言環慶路歸明蕃官宥州刺史橫山至宥州一帶都巡檢使李額葉并男三班奉職李襄渠卜到闕詔李額葉賜名懷明男襄渠卜賜名世忠丙申以擒獲威明阿密穆賚多卜宰臣率百官賀于紫宸殿涇原路經略安撫使龍圖閣學士左中散大夫章楶為太中大夫仍賜銀絹各二千對衣金帶銀鞍轡馬其獲級重傷等將士賜袍帶錦襖子器械銀碗有差十八日奏到明年正月十九日賞功安德軍留後李端慤卒詔贈昭德節度使諡恭敏丁酉看詳訴理所言元祐訴理除雪故屯田員外郎陳舜俞不奉行常平法降監當等不當及陳禹功稱臣父所言即非狂妄又云今覩聖朝開設訴理一司以來天下寃抑例得伸雪臣父靈識足以伸決于幽冥而萬世抑壓沉鬱之恨一悟聖聰若氷釋等語言詔陳禹功特送鄰州編管又訴理朝奉大夫葉武為勘陳世儒不知賈種民於進呈劄子內添撰事節送審官東院與合入差遣元祐除雪不當事及武稱壞却差遣資任寃抑不伸伏望聖政寬明照恤非辜實天下寃民受賜之日又念生當公朝枉負玷纍等語言詔改正元祐指揮葉武特衝替環慶路經略使胡宗回言萌門白豹兩處係是本路沿邊緊切要害必爭之地及道路通快水草豐足委有良田可耕向去不煩朝廷饋餉地勢險固經久決可守禦緩急聲援處合先行進築詔宗回更選差官前去躬親檢踏子細體問審如所奏即行進築仍須相度賊馬所在乘伺間隙斟酌事力決保萬全方得舉動毋致敗事工部言諸路州軍城寨縣鎮遇有修造只得於城外淺壕內近處取土使用如違其所主修造官司杖八十當職都監監押有失檢察減二等從之新無巳亥遼國遣使泰州管內觀察使耶律遵禮副使朝議大夫守祕書少監充史館修撰邢秩來賀正旦庚子詔應犯罪合配本州鄰州之人身手強壯而願免決配填逐路軍者聼輒抑勒者依故入人罪法是嵗宗室子賜名授官者四十人斷大辟二千四十三人右正言鄒浩嘗奏論章惇曰臣聞人主之職莫大於論相之得失天下之安危係焉不可不深察也臣丞相章惇方陛下躬攬之初亟從祠宫擢登相位委以政事於今五年所宜宵旦竭誠輔佐以副陛下屬任之意而乃徇情廢理専務自營力引所私分據要路潛謀密計妙若鬼神一有作為首尾互應惇雖不動聲氣而事己倐然濟矣是以陛下之所欲用者正人也由此沮格而不得進陛下之所欲來者忠信也由此壅閼而不得聞陛下之所欲推廣者仁恩德澤也由此難於通達而不得均被於元元是陛下之志願未獲盡伸而惇之好惡莫不畢遂惇雖傲然自若以為人莫能窺而不知其效已有不可掩者故論其燮理則水旱薦臻之變異常論其表率則誕謾相習之風彌扇論其旁招則非趨附其門者弗用論其言動則雖凌侮毁罵而必為論其橫身力薦之人則以罪竄逐相繼而是論其尊君畏上之心則遇災而處略不引咎臣厯觀前古茍為相者有一於此輕猶罷免况兼而有之如惇者乎此天下之公議所以久沸而不平而切有望於睿斷也臣願陛下上念宗社付託之計下思生靈休戚之原斷乾剛而力行之實天下幸甚又嘗論奏執政大臣不和曰臣伏自供職以來夙夜靡寧思報萬一顧天下之事可論者雖多然其本原悉在於朝廷之上傳曰正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫敢不一於正此最今日之急務也臣觀執政大臣不務同心同德以稱陛下登用之意其日久矣而莫甚於今故事無利害人無忠邪但某以為可者某必以為不可某以為不可者某必以為可可不可之論相持於上而公是公非悉蔽於下夫是非者萬事之本原不可蔽也一蔽於私而失其實則末流之弊殆有不勝慮者矣陛下雖有求賢之誠真賢何由而盡用陛下雖有聼言之誠忠言何由而盡聞陛下雖有愛育元元之誠仁恩德澤何由而盡達是其為害豈不大哉况陛下操威福之柄以馭普天雖逺在四方萬里之外莫不欲其令之則從禁之則止有以明好惡之所在而不敢違而執政大臣近在左右乃不能體國如此豈陛下之威福獨不可行於左右之近乎夫威福不行於左右之近而欲四方萬里之外無不行焉臣竊以為難也且其不和之心既巳發於聲形動於天地為水為旱為民物之災矣失今弗圖後必滋甚抑恐四夷聞之必有以輕議中國者此正朝廷所以為今日之急務也臣望陛下留神聼察斷以至公大義而力圖之實宗廟社稷無疆之休浩二奏據奏稿並附年末浩又三奏章惇附明年九月浩責時
