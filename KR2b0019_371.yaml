body:
  text: 續資治通鑑長編卷三百六十七宋李燾撰哲宗元祐元年二月丙戌詔諸路軍將並依元豐令差使令其元豐六年四月一日樞密院劄子差不係將兵兩次即差將兵一次勿行從樞密院所請也六年四月一日密劄未見左司諌蘇轍言臣聞唐栁伉一太常博士耳猶能上疏乞斬程元振郇謨一布衣耳猶能哭市以論元載今臣備位諌省逢時艱危若隱忍不言實負天下謹冒斧鉞之誅以論其大者惟陛下哀憐裁幸今皇帝陛下富于春秋太皇太后陛下以女主稱制四方未服積弊如麻陛下以為此何時也賈誼有言抱火厝之積薪之下而卧其上火未及然因謂之安正今日之謂也自先帝以雄才大略躬攬萬幾而西北二邊交趾瀘蠻常擾境以勞王師京東河北福建等路姦猾巨盜常殺官吏以謀不軌今二聖拱默恭已無為責成于執政大臣大臣又皆偷合苟容無足賴者昔淮南王反獨畏衛青汲黯至公孫丞相若發蒙耳臣觀今之大臣尚未及公孫丞相逺甚陛下以謂邉疆窺伺所服者何事姦猾巨盜所畏者何人萬一有之將何以待謹按左僕射蔡確憸佞刻深以獄吏進右僕射韓縝識暗性暴才疏行汙樞密使章惇雖有應務之才而其為人難以獨任門下侍郎司馬光尚書左丞呂公著雖有憂國之志而才不逮心至若張璪李清臣安燾皆斗筲之人持祿固位安能為有安能為無陛下必謂此等皆先帝舊臣不欲罷去然不知先帝以絶人之資獨運天下特使此等行文書赴期會而已至于大政事議論此等何嘗與聞小有罪犯輒罰銅謝過為天下笑先帝若以股肱待之不應如此今陛下深居帷幄之中不自任事而以天下之大付此等其為禍福未可與先帝同日而語也昔漢武帝以車千秋為丞相至受遺詔輔少主則不以屬千秋必得霍光金日磾而後可先帝若自知降年止此豈肯以王圭蔡確之流受顧命之託乎陛下新臨天下人材衰少此數人者未可一朝而去也則願擇其任最重而罪最大者去之臣以為莫如蔡確韓縝者也陛下即位以來罷市易堆垜場及鹽茶鐡法此蔡確之所贊成也放散修城人夫罷保馬等事此韓縝與宋用臣張誠一等所共建也先帝之所是確等亦是之陛下之所否確等亦否之隨時翻覆略無愧恥天下傳笑以為口實而朝廷輕矣先帝時有司屢言縝贓罪有狀先帝隱忍未發不謂陛下即位拔擢至此天下有識所共疑怪近者每發一政三省密院議論紛然至忿爭殿上無所適從皆由大臣才短望輕以至於此所有確縝其餘罪惡臣未敢細陳先論大體伏願陛下思祖宗付囑之重深察方今事勢為至艱至難之時早賜罷免確縝二人别擇大臣負天下重望有過人之髙才而忠於社稷有死無二者以代之上以肅正羣臣異同之論下以彈壓四海姦雄之心然後陛下髙枕而卧天下無事矣臣位卑言深罪當萬死若蒙降黜其甘如薺如其未也則當節次奏請伏閣力爭以決去就非獨臣如此凡在臺諫莫不當然必無備禮一言不行而止者此天下公議非臣意也惟陛下裁酌早賜施行丁亥翰林學士知制誥兼侍講黃履為龍圗閣直學士知越州以左正言朱光庭劾奏履為中丞論事不稱職不當復留經筵故也朱光庭劾履此據蘇轍再乞責降蔡京狀當求光庭所上章附益之因可見履姦狀履此月四日罷中丞二年三月十四日四月八日當考步軍都虞候雄州團練使劉昌祚知熙州代趙濟也三月二十二日徙渭州當考究曾到熙州與否三省檢校上殿班御史中丞侍御史或殿中監察御史一員諌議大夫同司諌或正言一員今御史臺見闕侍御史諌官見闕左諌議大夫詔御史臺不限御史中丞侍御史殿中監察御史諫官不限同省别省諌議大夫司諌正言並許二人同上殿二月三日已有二人同上殿指揮王巖叟論列訖不從三省言訪聞前知鄆州陽榖縣李抃昨行下保馬指揮不數月間夲縣買足十年馬數詔京東轉運司檢詳李抃元行遣次第及如何催促便得數足具詣實以聞詔諸路轉運司管勾文字勾當公事管勾帳司官令逐司各據合留員數選留餘並罷新夲削去御藥院言將來坤成節回答北朝禮物乞依同天節製造從之范百祿言北朝送伴使蕭祐於𣙜場中易得竹牛角詔河北河東緣邉安撫司密行指揮覺察禁止詔鄂特凌古除官制誥并每年所支茶絹及支賜衣帶等候趙濟奏到取旨二月二十日詔下趙濟三月十六日濟奏上先是知樞密院章惇言近奉旨與三省同進呈司馬光乞罷免役行差役事劄子已於初六日同進呈畫旨訖臣以此事不屬樞密院又自去秋已來直至今春司馬光止與三省商議樞密夲不預聞兼劄子止降付三省御封亦止付三省未委三省初四日進呈因何乞與樞密院同進呈據呂公著家傳密院與議役法乃蔡確奏請况役事利害所繫至大臣素不預議論何由考究劄子中所言利害夲末臣初五日與三省聚廳處曾言若同進呈須且留此文字子細看詳三五日時韓縝云司馬光文字豈敢住滯來日便須進呈既不曾素預議論又不曾細看文字其間利害斷未敢措詞其於進呈止同共開展至于可否但決之三省臣實不知當時同三省進呈雖巳奉旨依奏臣於簾前已曾具此因依陳述後來户部繳連到勑文臣曉夕反覆看詳方見其間甚多踈略謹具條陳下項一今月初三日劄子內稱舊日差役之時上户雖差充役次有所陪備然年滿之後却得休息數年營治家産以備後役今年年出錢無有休息或所出錢多於往日充役陪備之費其害一也又十七日劄子內却稱彼免役錢雖於下户困苦而上户優便行之已近二十年人情習熟一旦變更不能不懷異同臣看詳司馬光初三日劄子內竭言上户以差役為便以出免役錢為害至十七日劄子內却言彼免役錢雖于下户困苦而上戶優便旬日之間兩入劄子而所言上戶利害正相反未委因何違戾乃爾臣觀司馬光忠直至誠豈至如此反覆必是講求未得審實率爾而言以此推之措置變法之方必恐未能盡善一稱舊日差役之時所差皆土著良民各有宗族田産使之作公人及管勾諸事各自愛惜少敢大假作過使之主守官物少敢侵盜所以然者事發逃亡有宗族田産以纍其心故也今召募四方浮浪之人使之充役無宗族田産之纍作公人則恣為姦偽曲法受贓主守官物則侵欺盜用一旦事發則挈家亡去變姓名往别州縣投名官司無由追捕官物亦無處理索臣看詳司馬光前項所言亦有所因蓋比來降出臣庶所上封章內往往泛為此説但是言者設疑之一端未必事實且召募役人之法自有家業保識若是主持官物者便是長名衙前比舊惟不買撲坊場至於支酬重難與月給工食錢亦自不當薄豈有無宗族田産浮浪之人得投充此役臣自當行免役新法巳來三經典郡每每詢問募役次第但聞縣下所召承帖人多是浮浪每遇追呼勾當多行騷擾若朝廷欲知事實但令逐路監司指定一州差役時即自熙寧元年已前免役法行後即自元豐元年以後各具三年內主持官物衙前有若干人犯侵盜各是何姓名得何刑罪便可立見有無至如州縣曹司舊法差役之人時亦召人户投名應役直是無人可召方行定差其所差人往往不會行遣惟是雇人代寫文書所差之人但占名著字事有失措身當決罰而已民間中下人户甚以為苦自免役法行或勒嚮來受雇行遣人充手分支與雇錢設若此等人曲法受贓即與舊日何異一稱提舉常平倉司惟務多斂役錢廣積寬剩以為功希求進用今朝廷雖有指揮令役錢寬剩不得過二分竊慮聚斂之臣依傍役錢别作名目隱藏寬剩使幽逺之人不被聖澤臣看詳所言亦未中事理大抵常人之情謀己私利者多而向公愛民者少若朝廷以積錢多為賞勸則必聚斂邀功今朝廷既不許多收寬剩又掊刻者必行黜罰則提舉官若非病狂豈肯力求黜罰况役錢若有寬剩未委作何名目可以隱藏以此驗知言已疏濶一稱臣民封事言民間疾苦所降出者約數十章無有不言免役之害足知其為天下之公患無疑臣看詳臣民封事降出者言免役不便者固多然其間言免役之法為便者亦自不少但司馬光以其所言異已不為籖出蓋非人人皆言免役為害事理分明然臣愚所見凡言便者多上等人户言不便者多下等人户大抵封事所言利害各是偏辭未可全憑以定虛實當否惟須詳究事實方可興利除害况此免役之法利害相雜臣今所言非謂不可更改要之改法須是曲盡人情使纎悉備具則推行之後各有條理更無騷擾緣今來司馬光變法之意雖善而變法之術全踈茍在速行全無措置免役之害雖去差役之害復生不免向去生民受弊而國家之德澤終不下流甚為可惜若及此時盡心講求利害之當使法成之後經久可行國家政事修完生民永永蒙利豈不盡美一稱莫若直降勑命應天下免役悉罷其諸色役人並依熙寧元年以前舊法人數委夲縣令佐親自揭五等丁産簿定差仍令刑部檢按熙寧元年見行差役條貫雕印頒下諸州臣看詳此一節尤為疏略全然不可施行且如熙寧元年役人數目甚多後來纍經裁減三分去一今來豈可悉依舊數定差又令刑部檢熙寧元年見行差役條貫雕印頒下諸州且舊日每修編勑比至雕印頒行之時其間充改已將及半蓋以事目嵗月更改理須續降後勑令今日天下政事比熙寧元年以前改更不可勝數事既與舊不同豈可悉檢用熙寧元年見行條貫竊詳司馬光之意必謂止是差役一事今既差役依舊則當時條貫便可施行不知雖是差役一事而官司上下關連事目極多條貫動相干涉豈可單用差役一門顯見施行未得一稱向日差役之時有因重難破家産者朝廷為此始議作助役法然自後條貫優假衙前應公使庫設厨酒庫茶酒司並差將校勾當又上京綱運召得替官員或以殿侍軍大將管押其粗色及畸零之物差校或節級管押衙前苦無差遣臣看詳此一節自行免役法後來凡所差將校勾當厨庫等處各有月給食錢其召募官貟使臣差并使臣將校節級管押綱運官物並各有路費等錢皆是支破役錢今既差役則無錢可支何由更差將校管勾及召募官貟等管押一稱若以衙前鄉户力難以獨任即乞依舊于官户僧寺道觀單丁女户有屋業每月掠錢及十五貫莊田中年所收斛斗及百石以上者並令隨貧冨等第出助役錢不及此數者放免其餘産業並約此為準臣看詳自免役法行官户寺觀單丁女户各已有等第出納役錢之法今若既出助役錢自可依舊何須一切並行改變顯見不易又更令凡莊田中年所收百斛以上亦納助役錢即尤為刻剝凡內地中年百石斛斗粗細兩色相兼共不直二十千錢若是不當水路州軍不過直十四五千而已雖是河北緣邉不過可直三十來千陜西河東緣邉州郡四五十千免役法中皆是不出役錢之人似此等第官户寺觀送納固已非冝况單丁女户尤是孤弱若令出納豈不更為深害此尤不可施行一稱慮天下役人利害逐處各有不同欲乞今來勑內更行指揮下開封府界及諸路轉運司謄下諸州縣委逐縣官看詳若依今來指揮别無妨礙可以施行即便施行若有妨礙致施行未得即限勑書到五日內具利害擘畫申夲州類聚諸縣所申擇其可取者限勑書到一月內具利害擘畫申轉運司類聚諸縣所申擇其可取者限勑書到一季內具利害擘畫奏聞又十七日劄子內稱伏望朝廷執之堅如金石雖有小小利害未備候諸路轉運司奏到徐為改更亦未為晚臣看詳今日更張政事所繫生民利害免役差役之法最大極須詳審不可輕易况役法利害所基先自縣首理須寬以期限令諸縣詳議利害曲盡逐處所宜則法可久行民間受賜今來止限五日諸縣何由擘畫利害詳光之意務欲速行以便民不知如此草草更張反更為害諸路州軍見此指揮必妄意朝廷惟在速了不欲令人更有議論故立此限逼促施行望風希合以速為能豈更有擘畫上項兩節乃是空文且諸縣既迫以五日之限茍且施行猶恐不暇何由更具利害申陳諸州憑何擘畫諸州既無擘畫轉運司欲具利害將何以憑又况人懷觀望誰肯措置如此則生民受弊未有己時光雖有憂國愛民之志而不講變法之術措置無方施行無緒可惜朝廷良法美意又將偏廢于此時有識之人無不喟歎伏乞更加審議臣所看詳且據司馬光劄子內抵牾事節而已至于見行役法今日自合更改修完但緣差役免役各有利害要在講求措置之方使之盡善臣再詳司馬光所言下户出免役錢驅迫貧民剝膚椎髓弱者轉死溝壑強者聚為盜賊及言民間求錢納官至于拆屋伐桑以賣薪殺牛以賣肉其言太過凡近下人户誠是不願納然自行法已來十五餘年未聞民間因納免役錢有如此事訪聞中間西事軍興科率及科買軍器物料牛皮筋角極為騷擾民間往往殺牛取皮筋角納官并田産牛具伐桑柘毁屋以應副軍期即非役法所致大抵光所論事亦多過當惟是稱下户元不充役今來一例納錢又錢非民間所鑄皆出于官上農之家所多有者不過莊田榖帛牛具桑柘而已榖賤已自傷農官中更以免役及諸色錢督之則榖愈賤此二事最為論免役納錢利害要切之言然初朝廷自議行免役之時夲為差役民受困弊大則破家小則毁身所以議改新法但為當時所遣使者不能體先帝愛民之志成就法意之良惟欲因事以為已功或務茍且速就成務多取役錢妄意百端徼幸求進法行之後差役之舊害雖已盡去而免役之新害隨而復生民間徒見輸納之勞而不知朝廷愛民利物之意今日正是更張修完之時理當詳審况逐路逐州逐縣之間利害不同並須隨宜擘畫如臣愚見謂不若先具此意申勑轉運提舉司官諸州縣各令盡心講求豫具利害擘畫次第以俟朝廷遣使就逐處措置此命既已先行人人莫不用心然後朝廷選公正強明曉練政事官四員充使逐官各更選辟曉練政事兩貟隨行管勾且令分使京東京西兩路每路兩貟使者四員隨行管勾官與轉運或提舉官親詣逐州縣體問民間利害是何等人户願出役錢是何等人户不願出役錢是何等人戶色役可差是何等色役可雇是何等人户雖不願出錢而可以使之出錢是何重難優輕可增可減緣人户貧富役次多寡與重難優輕窠名州州縣縣不同理須隨冝措置既見得利害子細然後條具措置事節逐旋聞奏降勑施行如此不過半年之間可以了此兩路然後更遣此已經措置官員分往四路逐貟各更令兼一員未經措置曉逹政事官同行不過半年之間又可措置四路然後依前分遣遍往諸路如此則逺不過一年半之間天下役法措置悉巳周遍法既曲盡其冝生民永蒙惠澤上則成先帝之美志下則興無窮之大利與今日草草變革一切苟欲速行之弊其為利害相逺萬萬伏望聖慈特賜宸慮詳加省覽舊録載惇奏于閏二月二日新録因之案舊録命韓維等詳定役法乃二月二十九日所以命韓維等詳定役法實緣惇駁光議故呂公著乞置局詳定也維等既受命始以惇奏付詳定所其駁光議則在二十九日前矣新録既失載置局詳定于二十九日至閏二月二日因呂公著劄子方附見之似太踈略也惇又嘗與同列爭曰保甲保馬一日不罷則有一日害如役法熙寧初以雇代差行之太速故有今弊今復以差代雇當詳議熟講庶幾可行而限止五日其弊將益甚矣惇語同列邵伯溫見聞録以為與司馬光爭光不然之按光此時已在病告姑刪取附見曾布日録載惇此語蓋是劄子當檢詳追附陳瓘尊堯集理財總論載惇云一日不去有一日害但指京東鐡馬福建茶鹽當考伯溫所録詳注在王覿後新除御史中丞劉摯言臣覩今月七日敕節文此即司馬光所上劄子二月六日得旨依奏七日乃行下故云七日敕節文也天下免役錢一切罷諸色役人依熙寧元年以前舊制委州縣定差者命既下中外人情鼓舞歡喜皆謂此一事為害最大從來百姓日夕延望今陛下一旦行之救其困苦天下幸甚臣竊聞令下之後姦邪之人論説紛紛造作浮言意欲搖動其事不知陛下察其然乎蓋今日廟堂之上侍從之間其人多由新法而進至于外之監司亦皆由新法而選今法既更改則其心皆非所欲故排議熒惑欲幸其失而不能成爾敕命內固有小節與舊法異同及措置未盡之事緣已行下指揮許州縣監司申明利害擘畫自可候到日修改立法今來改免役為差役乃是大體已正大害已革譬如疾患之人病根已去其他氣體未和當徐徐調養之而已臣恐上下觀望之人指小小未圎事件張皇鼓扇伏望皇帝陛下太皇太后陛下堅持此意力行無疑勿為異論所動俟臣僚及諸路列到未盡未便事理乞付三省類聚參詳為法內如有合先次施行者即乞隨事先賜處分摯又言敕內指揮委逐縣官若依今來指揮别無所妨礙即便依此施行若施行未得限五日內具利害申州州類聚限一月申轉運司夲司限敕到一季內奏聞臣竊惟天下法令欲考利害之實莫若身行之者行之親者又莫若州縣州縣之政又豈有大於役法者乎今既有所改更雖州縣嘉祐舊敕具在施行不難然事經變革其首尾牽連相抵牾者不能無也而限以五日恐倉猝以應期會却致茍簡不免後日申請紛紛臣欲乞諸縣與展限一月役法未行以前州縣諸色人役甚有冗占過多之數及熙寧後來既行募人之法給以役錢故行裁減至於今日並已是合用人數臣欲乞除弓手一役合依熙寧以前舊法人額外其餘役人令州縣定差只依熙寧役法後來裁定之數若或委有不足即具因依合如何增添申請摯畫一申明􅟕法夲集及奏議但存兩項自衙前一役以下並闕當求别夲增入貼黃稱臣以辭免誤恩自十七日居家聽命故未敢上章論事今者竊慮異論眩惑聖聽須至先獻此言伏乞將改免役為差役大意堅守不變以幸天下貼黃稱王安石作此法以害天下違人情猶能行之今聖恩革其弊以救天下順人情則行之豈有難也在陛下主張力行不變而已其間參差未完之事自可接續修立條目又貼黃稱敕內指揮如有妨礙並令具利害擘畫申奏縣限五日緣役法改更利害根夲盡在夲縣邑竊慮五日之內倉猝難了却致鹵莽向後再煩申請臣欲乞只作聖旨縣邑特與展限作一月仍先次施行又貼黃稱諸路及臣僚必然申明利害文字漸多臣恐須置局詳定作畫一條貫然今來止是變復舊法略有修正其置局不須多設官貟仍乞責立近限了當又貼黃稱敕內止坐司馬光奏請後畫聖旨依奏並無朝廷措置處分外人莫不疑駭以謂廟堂之上議不合同各有私二故鹵莽行下意欲引發異論之言及要諸路申請紛紛指以為動搖之事此不可不察也摯十二日除中丞此據奏議遺藁右司諫蘇轍言臣伏見二月七日三省樞密院劄子節文應天下免役錢一切並罷其諸色役人並依熙寧元豐以前舊法人數定差乞指揮諸縣官吏看詳若依今來指揮别無妨礙即便依此施行若有妨礙致施行未得限勑到五日內具利害擘畫申夲州限一季聞奏奏到各隨宜修改奉聖旨依奏臣看詳上件指揮大綱巳得允當其間節目頗有踈略差誤未易一一具言全在有司節次修完近見開封府奏開祥兩縣于數日之內依奏役法人數差到役人臣竊惟自罷差役今近二十年乍此施行吏民皆未習慣兼差役之法關涉衆事根㸦盤錯行之徐緩乃得詳審若不窮究首尾匆遽便行但恐既行之後别生諸弊臣竊見州縣役錢所在例有積年餘剩今年夏料雖已放罷舊餘剩錢猶足支數年欲乞朝廷指揮將見在役錢且依舊雇役盡今年而止却于今年之內催督諸處審議差役令的確可行更無弊害然後於今冬迤邐差撥起自來年役使鄉户一則差役條貫既審詳既行之後無復人言二則將已納役錢一年雇役民力紓緩進退皆便臣深恐諸道以為朝廷已行之命降到即行雖有妨礙更不陳述致差役之條未盡其利若朝廷以臣此言可用欲乞下三省疾速施行又言新法以來減定役人皆是的確數目行之十餘年並無闕事則舊法人數決為冗長天下共知况近降指揮明使州縣相度有無妨礙至于揭簿定差亦無日限今來開封府官吏更不相度申請于數日之間一依舊法人數差撥了絶如壇子之類近年以剩員充者一例差撥役人監勒開祥兩縣迅若兵火顯是故欲擾民以害成法尚賴百姓久苦役錢乍獲復舊更無詞説不爾必須爭訟紛紛為害不小乞下所司取問開封府官吏明知有上件妨礙更不相度申請及似此火急催督是何情意特賜行遣以戒天下挾邪壞法之人轍奏舊録載于閏二月二日章惇駁議下今冝入置局詳定前右正言王覿言伏覩今月七日勑行差役法此見朝廷深恤民隱不憚更張之勞以幸天下也然勑內止是備録門下侍郎司馬光劄子不曾經有司立成畫一條目今來既已施行若內有小節未安須當接續行下庶幾良法早定不為浮議所搖看詳諸色人並依熙寧元年以前舊法人數委夲縣令佐親自揭五等丁産定差此一節緣諸色役人自熙寧九年後來逐旋裁減却人數已多差使不闕今來敕意務寬民力乞降指揮依見今役人立額定差并衙前一役熙寧元年以前舊法許人投名故諸處多是投名與鄉差人相兼祗應亦甚有州郡全是投名人之處如或以少得投名之人方始兼用鄉差之法今既頒行熙寧元年以前差役條貫即合存留投名之人竊恐諸路州縣為見即今無買撲坊場酬折重難遂廢投名之法乞降指揮應投名衙前只用近年規繩以出賣坊場錢支酬重難分數并給請受或內有不願依舊投名之人重别召募不行方得鄉差其官户僧道寺觀單丁女口户免役錢數即留助鄉差之人王覿奏新録但依舊録所載止此當求别夲附益之仍自閏二月二日章惇駁議後移入置局詳定前二十六日編類章疏有一奏巳附本日此奏或移附二十四日始司馬光奏乞復行差役舊法既得旨依奏知開封府蔡京即用五日限令開封祥符兩縣如舊役人數差一千餘人充役亟詣東府白光光喜曰使人人如待制何患法之不行乎議者謂京但希望風旨茍欲媚光非事實也故蘇轍首以為言此據邵伯溫見聞録并紹聖三年十二月已未董敦逸張伯溫謂蔡京詣政事堂白司馬光悮也或至東府耳今并附注伯溫敦逸所言于後邵伯溫見聞録第十一卷云王荆公知明州鄞縣讀書為文章三日一治縣事起堤堰分決陂塘為水陸之利貸榖于民立息以償俾陳新相易興學校嚴保伍邑人便之故熙寧初為執政所行之法皆夲于此然荆公知行于一邑則可不知行于天下不可也又所遣新法使者多刻薄小人急于功利遂至決河為田壞人墳墓室廬膏腴之地不可勝紀青苗遂取二分之利民請納之費至十之七八又公吏冒名新舊相因其弊益繁保甲保馬尤有害天下騷然不得休息蓋祖宗之法一變矣獨役法新舊差募二議俱有弊吳蜀之民以雇役為便秦晉之民以差役為便荆公與司馬溫公皆早貴少歷州縣不能知四方風俗故荆公主雇役溫公主差役差役雖舊典亦有弊蘇內翰范忠宣溫公門下士復以雇役為未盡內翰忠宣子厚雖賢否不同皆聰明曉吏治兼知南北風俗其所論甚公不私于所主元祐初溫公復差役改雇役子厚議曰保甲保馬一日不罷有一日害如役法則熙寧初以雇役代差役議之太速故後有弊今復以差役代雇役當詳議熟講庶幾可行而限止五日太速後必有弊溫公不以為然子厚對太皇太后簾下與溫公爭辨至言異日難以奉陪喫劒太后怒其不遜子厚得罪去蔡京者知開封府用五日限盡改畿縣雇役之法為差􅟕至政事堂白溫公公喜曰使人人如待制何患法之不行紹聖初子厚入相復議以雇役改差役置司講論久不決蔡京兼提舉白子厚曰取熙寧元豐役法施行之耳尚何講為子厚信之雇役遂定蔡京前後觀望反復賢如溫公暴如子厚皆足以欺之真小人耳溫公已病改役法限五日欲速行之故利害未盡議者謂差雇二法兼用則可雇􅟕之法凡家業至三百千者聼充又許假借府吏胥徒雇之無害衙前非雇上戶有物力行止之人則主官物護綱運有侵盜之患矣惟當革去管公庫公厨等事雖不以坊場河渡酬其勞可也雇役則皆無賴少年應募不自愛惜其弊不可勝言故曰差雇二法並同用則可行也荆公新法農田水利當時自不能久行保甲保馬繼亦罷獨青苗散斂至建炎初中國罷亂嗚呼荆公以不行新法不作宰相溫公以行新法不作樞密副使神宗退溫公而用荆公二公自此絶伯溫所云蔡京詣政事堂白溫公溫公喜曰使人人如待制何患法之不行按溫公以正月二十一日謁告直至五月十二日方入對正月二十一日上疏乞罷免役二月七日得旨依奏此時溫公卧家伯溫所聞必誤或溫公嘗召京至東府如紹聖三年十二月京與董敦逸自辨章然京自辨草章要未可信今姑存之更須考詳紹聖三年十二月巳未翰林學士承旨蔡京與侍御史董敦逸辨初敦逸言元祐初司馬光秉政蔡京知開封府光唱京和首變先帝之法行下諸縣各希望風旨只祥符一縣數月之間差撥役人一千一百餘人是後行于畿邑遍于諸路皆是蔡京首為順從何其變之速也乞檢會司馬光章惇劄子并章惇貼黃皆有文據蔡京元祐初略無建明只附司馬光變一先帝之法京言臣昨知開封府于元祐元年二月內降到司馬光差役法令州縣揭簿定差其降到指揮內仍稱如無妨礙即便施行若有妨礙限五日申其開封府雖轄諸縣自來只管勾京城內公事應被朝旨亦只翻録行下諸縣關中而已至于人户差役簿書之類皆諸縣一面施行故當時差法並是諸縣一面定差其開祥兩縣在輦轂之下既見法內有即便施行之文所以承行不敢少緩開封府雖見諸縣承行之急緣是遵依法內指揮開封府豈敢禁止然臣於是時以法令更改上則執政大臣爭論不得下又無百姓陳訴自非明見利害之實未易遽奪亦不敢坐視更變猶以點檢騷擾催督為名差官遍詣諸縣看詳商量又于閏二月內具狀奏稱諸縣中到未可施行事乞從夲府一面奏上或因提點司看詳尋被勑命令與提點司同共聞奏則臣欲具可否論列于此可見勑命見在豈敢首為應和其司馬光因此三次召臣到東府詰責不差衙前并有何利害差官相度因依怒見辭色臣更不待所差官回即乞外任其司馬光差法開封府被受未及一月餘日臣巳罷去遂流落外任十年臣之孤蹤衆所共見臣若能應和司馬光則必為光所知不應變法之始一月之間一請遂得罷去尚書左丞呂公著劄子勘會司馬光近建明役法文字大意已善其間不無踈略未完備處若博採衆論更加公心申明行下向去必成良法今章惇所上文字雖其言亦有可取然大率出于不平之氣專欲求勝不顧朝廷命令大體早來都堂三省樞密院會議章惇安燾大假不通商量况役法元不屬密院若如此論議不一必是難得平允望宸𠂻詳酌或選差近臣三數人專切詳定聞奏遂具韓維李常范純仁孫覺孫永吕大防王覿姓名乞自禁中指揮選差三數人降出又言自來故事朝廷有大議論亦多選差兩制或下兩省定奪近劉摯王巖叟蘇轍數有論奏恐涉嫌疑惟宸衷裁擇章惇安燾不通商量當考章惇不通商量其事已見獨安燾未詳王巖叟論奏二月六日後來獨未見當考是日丁亥二十八日詔門下侍郎司馬光近奏建明役法大意已善緣關涉事衆尚慮其間未得盡備及繼有執政論奏臣僚上言役法利害若不精加考究何以成萬世艮法宜差資政殿大學士兼侍讀韓維吏部尚書呂大防工部尚書孫永給事中兼侍讀范純仁專切詳定以聞仍將逐項文字抄録付韓維等舊録于二月二十九日戊子載此詔而新録于閏二月二日庚寅始載之據司馬光集內降指揮乃二月二十八日丁亥今以光集所載內降指揮月日為定政目亦係之二十九日蓋二十九日始行之也舊録又云蓋自光遽變差役之法州縣承行擾攘民被其害朝廷悟其非故置局詳定焉按置局乃用呂公著劄子兼劉摯王巖叟亦有是請遽云民被其害舊録誣謗類此新録獨置此不辨似疏略也司馬光言臣伏見御批指揮以臣近建明差役法慮其間未得盡備差韓維呂大防孫永范純仁專切詳定聞奏臣竊以免役錢之病民自向日臣僚民庶上封事及日近劉摯等奏陳言之甚詳非獨出臣一人之私意也陛下幸用臣言悉罷免􅟕錢依舊差役詔下之日中外歡呼往來之人聞道路農民迭相慶賀云今後這回快活也然則此令之下深合人心明白灼然無可疑者其間條目未備不能委曲盡善固須有之臣所以乞下諸路州縣官吏令看詳若有妨礙施行未得即具利害擘畫以次上聞誠以畎畝幽隱南北異宜自非在彼親民小官無以知其詳悉故令各具所見指陳利害所以盡下情求民瘼非謂勑書一下禁人不得復議也俟其奏到徐議添改何後之有要在早罷役錢復差役為大利而已如構大厦棟宇巳立雖户牖未備可以徐圗今陛下令韓維等再行詳定考究利害完補漏略成就良法固無所妨但勑下已踰半月州縣差役約已及半方行遣紛紜臣愚竊恐聞此指揮謂朝廷前日之勑改更未定或斂錢或差􅟕尚未可知官吏惶惑不知所從衆庶失望怨嗟益甚必有夲因新法得進之臣乘此間隙爭言免役錢不可罷因聚斂獲功之吏稱舊條未改督責免役錢愈急是民出湯火濯清泉復入湯火也伏望朝廷特賜申勑州縣言今來止為其間條目未備令維等詳定所有差役仰州縣依前勑一面施行候定到事節續降下次免致于差役雇役中半紛紜之際令出反汗人情大搖實天下幸甚初范純仁自慶州召入純仁與司馬素親厚聞光議復行差役法純仁曰法固有不便然亦有不可暴革蓋治道惟去太甚者耳又况法度乃有司之事所謂宰相當為天子搜求賢才布列庶位則法度雖有不便於民者亦無所患茍不得人則雖付以良法失先後施行之次亦足以為民病矣乃言于光欲且緩議先行于一州候見其利害可否漸推之一路庶民不騷擾而法可久行光弗聽純仁嘆曰是又一王介甫矣復折簡遺之曰蒙示奏藁益見公之存心然此法但緩行而熟議則不擾急行而踈略則擾今公寧欲擾民而且將踈略之法使謬吏遽行則其擾民又在公意料之外更有擾矣一夫不獲公之所念而忍以擾事毒重困之民以愚思之不類公之所舉今純仁畫計不改公之法而止欲先自京西推行使不擾一人而公法可成乃不蒙采聽不審何謂又公既知純仁不欲速而示之以益堅之削蓋欲使知其罪而默默耳默默何難人人皆能不止能默亦可贊公使公喜而自容于門下何用犯公怒而喋喋也若果如此則是純仁不若少年合介甫求早冨貴也何用白首強顔于此媚公求合哉惟其如此所以誤公一顧而提携至此惟公憐其誠而深察為幸昨日言三事而公從其二在公屈已從人之義固巳足矣在愚者獻言之分已得矣奈此一事騷及天下而回奏將多以取疑于上則異我者得以指瑕害公致君之效矣若得回奏猶是賢吏若便施行其騷愈甚仁而失國徐偃有之則公未可直以我心至誠于仁便謂民受賜也言以人輕徒此煩聒至憂至懼惟公少加采察光弗聽也始議復差役中書舍人范百祿言于司馬光曰熙寧初百祿為咸平縣役法之行罷開封府衙前數百人而民甚悅其後有司求羡餘務刻剝為法之害今第減出錢之數以寬民可也光不從及議州縣吏因差役受賕從重法加等配流百祿押刑房固執不可且謂鄉民被徭役今日執事而受賕明日罷役復以賕遺人既以重法繩之將見當黥衣赭充塞道路矣光曰微公幾為民害遂已之此據范祖禹銘百祿墓附二月末初議役法時舊傳但存免役減錢議新傳并去之不知何故左正言朱光庭奏此據編類章疏增入二月二十八日臣聞宰相之任所以輔佐天子治天下安危之夲實繫於斯苟非其人必致覆餗若蔡確者豈有大才大德大忠大義聞於天下惟是懷私挾邪觀望逄迎事君何嘗不欺進身何嘗以正由滋彰獄事至大任用居恆祇以揣摩人意為履業昨來扈從神宗靈駕極見不恭臣已具論其事裕陵事畢故事當去而不去猶喜權固寵百巧圗安方聖德日新睿明洞照姦邪露迹莫敢自保上畏天威下懼清議遂成自請非得已然恭以陛下知幾其神惟克果斷因其自請去之勿疑假之外藩禮亦不薄屏此姦邪進以忠正太平成就當在今日臣願陛下留神察愚忠以幸天下貼黃天欲雨而未雨似有所待臣願陛下上順天意早屏姦邪無害聖政膏澤自降嵗則大熟又貼黃姦邪既屏忠正可進陛下致太平功業得司馬光范純仁可不勞而成願陛下進此二臣以輔大業臣前章已具言之又貼黃臣纍言蔡確姦邪今日因其自請俾之善去固為天下之幸外有章惇韓縝臣亦纍言其姦邪臣願陛下早賜睿斷戊子吕公著乞陜西帥漕同計五年之蓄從之糴夲就撥外給降政目有此當檢詳是年六月二十四日三年四月六日紹聖元年十二月三日是月太師致仕文彥博言臣數年前判河南府日見調發師兵進討西夏受國恩深形于過計遂纍具章疏論列利害蒙先帝恩專差臣男貽慶賜臣答詔仰詳詔意乃知先帝夲意止務安邉不欲輕舉皆是邉臣希望功賞為國生事徼幸萬一以致兵食困匱財力殫耗今聞於道路之言西人欲求內附臣以為蠻夷猾夏堯舜之時所不能免伏望陛下恢天海之量廣示開納御四裔之術羈縻而已由此可以偃兵止固吾圉要荒懷服中夏安寧太平之風寖久臣又以朝廷舉事必較利害惟務開疆以希功賞即不知用兵之時所費錢糧若干得地之後所得租賦若干凡一嵗屯戌兵馬所費糧草之直若干所得不償所費逺甚即是竭中原生民之膏血以事荒逺無用之地此乃唐開元之末務賞邉功邉臣各求徼幸致中原困竭唐業下衰可為商鑒今因西人請命伏望朝廷熟計而審處之老臣不勝區區憂國之心迫于傾輸言無倫次所有前者蒙先帝所賜詔書輒敢進呈所貴詳知先帝素志惟在安邉不務輕舉貼黃稱元豐五年李舜舉過洛道先帝意旨令邉臣自固邉鄙多如臣所受詔旨爾後以徐禧南方書生不曉邉事繼之李稷急于官賞妄有開陳經畫遂致永樂敗事臣荷先帝異恩去年春蒙賜御詩云嘉言時幸寄東車臣亦仰和聖製有願傾丹懇上公車之句去年三月西人由熙河路入朝求內附臣欲密啓所見未幾先帝不豫遂止今西人復來須至有此開陳望聖明照察此據文彥博集自注云元祐元年二月臣僚上言竊見祖宗朝為天下州縣守令僻在遐逺多不修舉職事遂于諸路措置轉運使按察糾舉使諸路郡守縣令無不職之人則天下至廣一無寃枉故知轉運使之職非小補哉而後用任至久弊病浸生又至運司續添管勾官雖得人已是煩冗不得人姦巧媚上凡一州郡已是事多加之數人職司文檄往復與舊叢委糾察廢置與舊繁多一州一縣莫不騷擾蓋只知進已而不知害人只知益上而不知損下若久任用如此之人卒無安靜之理也臣欲乞將天下諸路轉運司除留運勾一人外乞罷隨行管勾官若廢之則運司亦不至于闕事置之則徒成煩撓也伏乞朝廷察臣之言特與罷去則諸路更不至多生事體剝刷民間天下豈不幸甚又臣僚上言御者效車雖六馬之多執一䇿而臨之馬調而車安使衆人驅以數䇿則馬煩而車敗矣夫監司之蒞一道猶御者之于車也提其綱而振之屬部清矣頃年添差勾當公事官𨽻轉運司者曰運勾提舉司者曰提勾鹽司者曰鹽勾措置司者曰措勾安撫司者曰撫勾官號之異昔所無有竊計河北一路亡慮二三十員出入乘馹請劵所過州郡到發皆有酒食之饋油燭柴炭之給特優于他官而無有限數此等皆小官新進鮮顧事體憑恃勢要妄自尊大以邀郡邑之承迎小有違忤則吹毛求疵動生瘡痏州縣畏而奉之過于監司其有所詣不徒徑往遽須迂繞數郡以斂供饋道途絡繹項背相望小州公使褊狹殊為厭苦方天下無事郡邑皆循守法度監司無大措置徒使此曹紛紛無益而有損甚無謂也宜一切罷遣俾還選部如逐司有公事選委部下清強之官必無闕乏如此則監司之職清肅郡邑無擾獨䇿一而車安矣詔諸路轉運司河北路管勾文字勾當公事準備勾當公事準備押綱管勾帳司河東路管勾文字勾當公事準備差使夲司催綱管勾帳司陜西路管勾文字勾當公事管勾帳司逐路各留管勾文字勾當公事管勾帳司官各一貟京東路管勾文字點檢計置鹽事準備管押綱運諸般勾當差使勾當鹽事管勾帳司京西路管勾文字準備差使勾當公事管勾買鈔請鹽兼催促般運監鹽場管勾帳司廣南東西路江南東西路荆湖南北路淮南路兩浙路福建路成都府路利州路梓州路夔州路管勾文字管勾帳司逐路各留管勾文字管勾帳司官各一員淮南發運司勾當公事管勾文字糶糴官凖備差遣點勘文字留勾當公事管勾文字糶糴官各一員府界提點司勾當公事管勾文字管勾帳司兼驅磨簿歷留管勾文字管勾帳司官各一員提舉陜西買馬監牧司凖備差使勾當公事留勾當公事一員都大提舉成都府永興軍等路𣙜茶司勾當公事管勾文字留勾當公事二員管勾文字一員措置河北糴司勾當公事管勾文字留勾當公事一員經制熙河蘭會路邉防財用司勾當公事管勾帳司留勾當公事二員管勾帳司一員大名府路安撫都總管司管勾機宜文字安撫司凖備差遣留管勾機冝文字凖備差遣各一員河東路經略安撫都總管司管勾機冝文字書寫機冝文字經略安撫司勾當公事凖備差遣環慶路都總管經略安撫司管勾機宜文字書寫機宜文字經略安撫司勾當公事涇原路都總管經略安撫司管勾機冝文字書寫機冝文字經略安撫司勾當公事秦鳳路經略安撫都總管司管勾機宜文字書寫機冝文字經略安撫司勾當公事經略安撫司凖備差使定州路都總管安撫司正定府路都總管安撫司髙陽關路都總管安撫司管勾機冝文字勾當公事逐司各留管勾機冝文字勾當公事各一員其係奏差到親戚管勾書寫機冝文字依舊府界提舉司左軍管勾官右軍管勾提舉出賣解鹽司勾當公事催促和雇腳乘兼裝發鹽場勾當成都府利州路經制買馬司勾當公事準備差使提舉河北鹽稅司勾當公事陜西鑄錢司勾當公事提舉熙河等路弓箭手營田蕃部司勾當公事並罷元豐八年十一月十四日政目諸州管勾官更不奏差元祐元年閏二月二十九日户部乞罷諸州管勾官從之
