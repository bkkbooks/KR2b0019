body:
  text: 續資治通鑑長編巻三百七十宋李燾撰哲宗元祐元年閏二月辛亥詔正議大夫知樞宻院事章惇累有臣僚上言輕薄無行好為俳諧俚語及嘗受内臣宋用臣饋遺以其大臣彈糾章奏不欲付外又議役法明知未完俟其令行始相沮難近者每於簾前同輔臣議政動多輕悖全無恭上之禮宜解機務可守本官知汝州與放謝辭此據御集閏二月二十三日下制辭曰黜陟之由咸詢至公進退之間尚存大體惇早繇法從亟預近司肆彼躁輕失於審重至於􅉏御之列常交問遺之私比議役書本俾参訂當其敷納初不建明迨於宣行始興排沮務從含貸益至喧呶鞅鞅非少主之臣硜硜無大臣之節稽參故實稍屈典刑噫朕以幼冲仰煩慈訓茍乖忠實曷肅憲章其解政機往臨郡寄弗忘循省祇服寛恩言者既數劾惇惇居位如故及惇與同列於簾前争論喧悖有他日安能奉陪喫劍之語太皇太后怒其無禮乃黜之制詞錢勰所草至於􅉏御之列常交問遺之私惟王巖叟及孫升章有其事盖指宋用臣也紹聖史官隂為惇諱故於巖叟章才舉其畧今乃仍用舊文亦太踈矣今取巖叟章及升章詳著之邵伯温辨誣云蔡確既去章惇自知不可留於簾前與司馬光争論役法喧悖無禮謂光曰後日安能奉陪喫劍太皇太后怒惇以本官出知汝州按司馬光正月二十一日在朝假至五月十二日乃出方惇責時光未參假也且宻院與三省同進呈光差役文字盖二月初光此時安得至簾前伯温必誤奉陪喫劍或因争論改法為光而發非靣與光語也十月六日改揚州左司諫王巖叟言臣竊以陛下所與共天下之治者惟二三執政大臣而已得其人則陛下不勞而天下䝉福非其人則天下受敝而陛下獨勞故執政不可不用天下之賢蔡確章惇之大姦臣先已論之其次如韓縝之鄙俗不學張璪之隂邪不正李清臣之柔佞不立安燾之闒茸不才臣不知此四人自執政以來有益國家者何事恵及生民者何功啓沃陛下者何言天下之物望輕重陛下聰明必皆坐照不待臣言而後知方陛下更化願治之時股肱一人要為一人之用若縝輩累百何補陛下誠惜此地虚為所據伏望陛下重惜名器别圖賢才任以大柄以為社稷之賴以為生靈之福巖叟此言不得其時因章惇罷附此巖叟嘗入對言自古人君最難辨者忠邪今陛下判别之如别白黒又斷之如此之勇此自古英主所不及如蔡確章惇二人用盡姦計欲固位若非陛下至剛至明何以去得天下人心無不懽呼鼓舞人心恱則天意得所以甘澤應之其速如此仍願陛下益信天道益畏人心治天下之道無他事只在合人心而已若人心外求之别無治道便是怨亂之端上曰㑹得巖叟曰既遇陛下留心治道又荷陛下聴納臣等不敢不極忠盡慮以天下之情天下之事一一上達惟在陛下久而不厭常賜收採幸甚上曰甚善巖叟朝論係此於閏二月九日按章惇罷在閏二月二十三日巖叟果以閏二月九日入對何由便及惇罷大抵朝論月日多不可信今掇取此附惇罷後巖叟又言蔡確章惇既去其餘無大姦皆柔佞之徒易為處置惟在常辨之使不可入而已今政府闕員中外之人翹首拭目以觀陛下所用陛下其戒之重之擇有徳業聞望者進之幸甚陛下至明虚心以求之臣知必不誤然不可不更以告陛下上曰如何對曰大名之下有姦才少文之中多重德陛下須察柔佞憃愚無狀懐姦之人一進之在位即誤陛下後雖知其有害去之不易也他人見陛下誤用一執政不過咨嗟嘆息而已臣實與陛下同其責人以用之為是不知其功人以用之為非臣則有過臣不自量夙夜寤寐以吾君之憂為憂俟陛下得賢則臣心安以此位非與百執事同百執事茍失其人則害止於一職或大者一方而已執政失人則害及國家及天下不可不謹右司諫蘇轍言訪聞京城四門外所在白骨如麻多是築城開濠死損人夫東門外又為茶磨棄水所浸雖其間已埋瘞者土薄水深亦皆發露狼籍臭腐不忍聞見陛下躬行仁政罷去苛法民心稍安而京畿及諸路久旱近日雖稍得雨終未霑洽未必非積骸暴露寃氣致此况方春長養正是月令掩骼埋胔之時臣欲乞選差一二廉幹内臣計㑹兩赤縣官吏相度於閑隙地上以塼作數大墳如法藏掩其合破費用仍特支賜内藏庫錢誠使仁澤施及枯朽或能感召和氣卒致豐嵗從轍所奏舊録載於二十九日按轍自注云二十三日奏此今仍見本日又言訪聞淮南久旱雨全未足二麥並已枯死浙中米價雖賤而運河無水客旅不至米斗直一百七十以來民間闕食甚覺不易而所在官吏並未見賑濟及奏請别作處置臣竊見頃立義倉至今已十年所聚糧斛數目甚多每遇災傷未嘗支散一粒民情深所不恱臣欲乞指揮淮南官司先將所管義倉米數隨處支與闕食人戸兼將常平米減價出賣及取問監司州縣因何並不曽申請擘畫兼乞體訪諸路如有似此闕食去處一例施行丙辰二十九日詔諸路依二月四日指揮即從轍奏也先是劉摯言伏見京師所置水磨茶場前後累有臣僚論列乞行寢罷尚未䝉指揮臣契勘官自磨茶之初猶許公私交易故商販之茶或不中官則賣之鋪戸自去年二月遂禁鋪户不得置磨然都下雖禁猶有府界縣鎮可以交易故客人不避重出脚費津置出入至當年七月遂并府界一切禁其私易於是商賈以茶至者觸藩抵禁須至盡賣入官而又使牙儈制之不量茶之色品一切痛裁其價留滯邀遏其狀百端此商旅之所以不敢行商旅不行故沿路征商之數其虧額已多又磨河之水下流壅散浸瀦民田被害者數邑聞去年已被省稅矣臣疑所得未必能當所失而民間食貴茶場户常失業抵冒刑罪又備賞錢利害細瑣其狀不一至於傷國大體則臣未暇論之竊聞臣僚所言多送户部户部送太府太府送本場本場次第上之盖所司知奉法取利而已安有肯為朝廷論義理哉臣亦聞議者云嵗可得息錢僅二十萬緡以助經費何可廢也此以利言之者也苟以謂有助於用而不廢則何事不可為哉亦有道而已矣宋用臣未建此策以前不聞國用闕此二十萬緡也譬夫為人之子日攘竊於人取財以養其親為之親者知其如此顧利其奉養而聴其為盗則可乎伏望聖慈早賜出自睿斷罷水磨茶場以通商賈以養細民以寛州縣稅額以免農民水害而上以副仁聖恵綏天下之意摯此章盖以八年上不得其月日元祐元年閏二月二十九日乃罷水磨茶場從侍御史劉摯右司諫蘇轍殿中侍御史黄降劉次莊所奏也是日右司諫蘇轍又言臣竊見近嵗京城外創置水磨因此汴水淺澁沮隔官私舟船其東門外水磨下流汗漫無歸浸損民田一二百里㡬敗漢髙祖墳賴陛下仁聖閔惻親發德音令執政議救其苦尋䝉指揮畿縣於黄河春夫外更調四萬人開自明河以䟽洩水患計一月畢功然以水磨供給京城内外食茶等其水只得五日閉斷以此功役重大民間每夫日雇二百錢一月之費計二百四十萬貫而汴水渾濁易得填淤明年又須開淘民間嵗嵗不免此費訪聞水磨所入一嵗不過四十萬貫朝廷頃來改更敝法凡與民争利者一切革去水磨之事本亦係廢罷前戸部侍郎李定以邪諂進用不知朝廷大體猥以四十萬貫課利惑誤朝聽依舊存留且水磨興置未久自前來未有此錢國計何嘗有闕而小人淺陋妄有靳惜傷民辱國不以為愧况今水患近在國門而恬不為怪甚非陛下勤恤民物之意而又減耗汴水行船不便臣乞廢罷官磨令民間任便磨茶其利甚溥伏乞指揮疾速施行壬子户部侍郎呉雍為天章閣待制知襄州從所乞也大理少卿張奕知濱州孫升十八日言奕朝奉郎蘇子元換授供備庫使從户部尚書曽布奏舉也詔親王府翊善朝請大夫王汾記室參軍朝請大夫鄭雍為久任各特轉一官願廻受與子孫白身恩澤者聽又詔河北東西路永興秦鳳等路提㸃刑獄兼提舉保甲司並依提刑司例各為一司禮部言閤門參定到太皇太后出入儀衛詔依所定禮部尚書韓忠彦等言凖朝㫖批送下東上閤門使曹誘等乞許閤門依儀令陞殿進讀依舊侍立祗應参詳欲依所請兼通事舎人已下引揖上殿班次等祗應亦合依閤門儀令施行從之左司諫王巖叟言竊聞江西提舉曽孝廉挾私不法驅迫知撫州石禹勤下獄差有嫌隙人李秠為勘官非理凌虐一月之間致禹勤於垂命至家一夕而卒乞選朝臣就往根治重行竄黜詔差錢垂範往撫州根治聞奏李秠錢垂範未詳何官十月二十八日孝廉追停編管詔今後蕃官立功優異者方許取㫖差充本族廵檢仍當三資令樞宻院遵守更不行下先是給事中范純仁言臣竊見熈寜後來用案問欲舉條雖曽隠諱終因罪人說出並得減等所以容姦太多至彊賊兇徒易為幸免不肯改過却致良民受害遂至元豐八年四月二十六日别立條制諸彊盗已殺人彊姦或犯彊盗貸命若持杖三人以上知人欲告案問欲舉而自首及因人首告應減者並不在減等之例又至當年十一月四日續降敇文添入餘犯彊盗雖案問欲舉而首不減一十三字以臣看詳除已殺人彊姦於法自不合首不應更用案問減等外其貸命及持杖彊盗一例不得減等深為太重竊縁贓滿彊盗能告别火死罪即得奏貸今因案問通出本火徒伴數目更多亦須坐死舉重明輕於理未當至於一名獨行彊盗若非即時捕獲則更無他人照證因疑被執贓物雖明賊若隠拒則官司無由用刑今於贓證未明之間其人便自招說豈得不行減等臣謹按嘉祐編敕應犯罪之人或因疑被執贓證未明或徒黨從就擒未被指說但因盤問便具招承如此之類皆從律案問欲舉首減之科若曽經盤問隠拒本罪更不在首減之例此敕於理最當所以仁宗朝用之天下號為刑平臣今乞應天下案問欲舉除於法不首不得原減外其犯罪並取嘉祐編敕内上條定斷其後來敕條更不施行如此則不破敕律用法當情上以廣陛下好生之德下則無一夫不獲之寃又言近因王震在假權管勾刑房公事竊見四方奏到大辟刑名疑慮及情理可憫公案並用去年十一月二十三日敕只委大理寺並依法定奪更委刑部看詳如實有疑慮可憫方奏取㫖餘依法處死臣體問未降此條以前自前年十一月二十三日至去年十一月二十三日一年之内四方奏到大辟案共計二百六十四人内只有二十五人處死其餘並䝉貸配所活將及九分自去年十一月二十三日降敕後來至今年二月終不及百日奏案共一百五十四人却有五十七人處死計所活纔及六分已上臣固知去年十一月未降敕已前全活數多其間必有曲貸然猶不失罪疑惟輕之仁自降敕之後所活數少其間或有濫刑則深虧寜失不經之義臣先乞今後四方奏到大辟疑慮可憫公案並仰刑部大理寺再行審覆節畧罪人所犯及本處元奏因依令執政將上乞自聖意裁斷如所奏或有不當並與免罪如此則刑法不濫施而死者自無寃矣是日詔大辟刑名疑慮情理可憫公案令刑部看詳不得致有枉濫從純仁之請也二月末純仁奏請附此右司諫蘇轍言竊見三省同進呈臣前奏乞將民間官本債負出限役錢及酒坊元額罰錢見今資産耗竭實不能出者令州縣監司保明除放事奉聖㫖令户部勘㑹應係諸色欠負窠名數目仍契勘欠户見今各有無抵當物力開具保明聞奏臣竊謂朝廷將救民於溝壑之中其施行節次當如救焚不可少緩前件指揮令户部開具欠户見今抵當物力此事不在户部惟州縣可見若令户部取之州縣文字往來動經嵗月反覆問難何時了絶救民之急不當如此乃有司出入之常度而非朝廷救災之體如陛下將布徳施仁以收民心答天意但使恵澤滂流雖民間小有僥倖何損於德况此積欠經渉久逺凶嵗疲民空煩鞭箠必無所得縱獲毫末無補國計乞特降朝㫖直下諸路監司與州縣一靣依下項除放結罪保明聞奏所貴小民早被聖恩不至失所别致生事謹具條件如後一官本債負在京乞委提㸃司與府縣及市易官外道委轉運司與州縣同取索逐户元請官本若干經今多少年月合出息錢若干逐户從請出官錢後來已納到官本若干息錢若干通計本息未及官本而家業蕩盡者亦與除放如尚有些小家業而見今孤貧不濟者即權住催理官吏結罪保明聞奏聽候敕裁一拖欠坊場錢所委官同前項乞取索逐户元認净利錢若干自開酤以來違欠月分合納罰錢若干將本戸已納到净利及罰錢通計若干如已通及元認净利之數即行放免如通計未及元認浄利之數而家業蕩盡者亦與除放如尚有些小家業而見今孤貧不濟者即權住催理官吏結罪保明聞奏聽候敕裁一出限拖欠役錢今來朝廷已行差役法即免役錢别無支用雖使差役未了間時蹔留舊雇人執役自有從來寛剰役錢支遣其拖欠役錢乞與一切放免右臣前奏係二月十五日及今已四十日而行遣紆緩未知何時恩澤可以及下伏乞陛下深念欠負人戸枷錮已久衣食不繼父子離散其愁苦無聊甚可哀憫斷自聖心依臣所乞特與除放無使有司争執細故遷延嵗月所得無㡬而民間窮困小則病瘁怨苦感動隂陽大則計較死生起為盗賊所失轉大雖悔無及臣不勝區區為國深慮二十九日行癸丑中書舎人范百禄詳定編修刑工曹條貫代給事中王震也御集二十五日甲寅龍圖閣待制兼侍講趙彦若為兵部侍郎兼侍讀新除給事中孫覺依舊為右諫議大夫初五日除給事中詔尚書侍郎學士待制及兩省御史以上國子司業各限一月内舉經明行修堪充内外學官者二員詔章懿皇后父賜太師開府儀同三司越國公李仁德特追封京兆郡王從泰寜軍留後李珣等奏也實録於三月二日又書此誤也今削去止一書之朝請郎權發遣河北路轉運使李南公朝奉郎權發遣河東路轉運副使孫覧兩易其任三月八日劉摯云云以累赦放逐便人劉彛為朝奉大夫乙夘正議大夫同知樞宻院事安燾知樞宻院朝議大夫試吏部尚書兼侍講范純仁為中大夫同知樞宻院御集在閏二月二十四日政目與御集同吕大忠雜說元祐初申公與司馬温公同為左右相温公久病不出申公數於簾前薦吕大防范純仁可大用已而以大防為尚書左丞純仁命未下也温公一日召滎陽公至府第謂公曰范純仁作執政固好吕大防是韓縝宣撫判官相公何故却薦作執政滎陽公即以意答公曰相公且看即今從官誰是勝得吕大防者温公黙然久之曰是也都不如吕大防二公同時並相其不相疑如此之深其易曉如此之篤前後任事所無也初申公薦大防可在宻院純仁可在中書簾中誤記遂以大防為右丞久之以純仁同知樞宻院大防為右丞在閏月十八日丙午純仁為同知在閏月二十七日乙夘相距才十日此云久之恐誤也左司諫兼權給事中王巖叟言舊録不載王巖叟封駁事止於三月十五日載范純仁告命極為踈畧新録并十五日所書亦削去不知何故比舊益踈畧矣今月二十五日伏覩畫黄除同知樞宻院安燾知樞宻院試吏部尚書范純仁同知樞宻院者臣謹按燾資材闒茸器識暗昧立朝以來無一長為人所稱備位樞庭不能自立惟知佞事章惇隂助邪說以養交取容曽無建明少裨國論公議所鄙中外一辭臣當言責方以逐大姦為先未暇及燾非敢不為陛下言也今大姦既逐適欲論奏而燾更超用其何以慰天下之望弭諫臣之言舊位且非所據况可冠洪樞顓兵柄今邉鄙大事正賴謀謨使燾當之何以勝責伏惟國家樞宻之重名器之隆非所宜誤以屬人為社稷憂也所有畫黄謹繳封進其范純仁除命伏乞分為别敇行下又言左司諫之職屬門下省近䝉本省批狀差權給事中給事中職當論駮臣雖暫權義難苟且今日伏覩畫黄除安燾知樞宻院公議不允臣不敢放過門下縁過門之後即是施行既已施行益難追改據燾不才無補陛下而玷處廟堂坐尸厚禄考之物論謂當置之散地别進賢才今乃超遷總領機務位愈髙而德愈不類任益大而才益不宜必恐多致人言上煩聖聽臣所以輙先封還乞陛下更加裁慮或陛下必憐其人未欲遽行罷免則願且勿升其位但令與范純仁並為同知宻院可也臣亦再三為陛下思之惟如此頗為易處伏望聖慈恕臣踈愚僣易之罪察臣區區愛國之心特垂採納貼黄稱臣䝉陛下任之言責惟願陛下無一毫差錯臣始心安若聞一人議及朝廷除用未當則如臣之身自有過失所以不避煩凟一一進言幸陛下省納使臣得盡其愚以圖補報燾之闒茸不才終不是當大任之人候陛下别得賢才即宜罷免以協公言巖叟又言臣兩次論駁除安燾知樞宻院敕命久之不下意謂聖慈已賜開納今竊聞已有指揮門下省更不送給事中書讀令疾速施行臣聞命皇恐不知所容陛下必以臣為違拒睿㫖遂一面施行仰惟國家置官司正要上下相闗防相審察惟恐有失誤所以重謹之至况給事中喉舌之任若不由過則不成命令何所不可臣違君之命至於再三雖陛下優容未加誅戮臣自知罪不容矣然臣少而讀書本學事君之道今不敢不以其所學事吾君也臣位可奪也而守官之志不可奪也身可忘也而愛君之心不可忘也守官之志可奪則陛下今日雖喜臣從命後日將不復信臣矣愛君之心不忘則陛下今日雖未諒臣後日將復念臣矣陛下聰明燭照豈不察臣之所以區區効愚忠而不已者為陛下耶臣自為耶每與大臣結怨仇而不避者為國計耶為身計耶陛下欲人阿意順㫖則易欲人抗言執議則難臣不為其易而為其難亦何心哉但恐因臣不能為陛下守職事而獲沮抑則人人務為其易非朝廷之福也古人有言曰賞當賢則臣下勸罰當罪則姦邪止此國家之大柄而人主不可以不謹也陛下一日逐章惇為汝州可謂罰當罪矣一日擢范純仁為執政可謂賞當賢矣然安燾之進則未有所當此臣之所以力為陛下言也陛下曰必欲行之臣曰必不可行則是以臣抗君也宜乎死有餘責然臣言之不已為之不疑者以臣職當然也守職而不敢曠乃所以奉陛下也伏望聖慈特賜採納貼黄稱章惇之逐則是陛下知其惡也安燾之進是亦陛下知其善也惇之惡喧然流播於人故其逐也人快之燾之善寂然無聞於人故其進也人皆疑之陛下或以臣為執所見今新給事中傅堯俞歴任四朝老成舊德有天下公望之人也已經告謝陛下不俟正謝指揮供職代臣以觀所見如何陛下退臣則可進安燾則不可願陛下深賜裁慮巖叟又言臣自來聞士大夫相與語曰安燾每與衆執政議事有終席不曽贊一句議論時其不才如此又聞朋附章惇助為姦言動揺正論沮格聖恩而意亦不樂陛下惟新之政其無識又如此平時備位在下猶為忝竊况可以進登上列専右府之寄主決大議哉祖宗以來有虚宰相之位以參知政事當國者今不置知院以同知院行樞宻院事於體無害既不傷陛下之恩又不激衆人之議使小人知懼而謹分大臣畏威而循法以正天下以清朝廷在陛下日新之德非小補也貼黄稱陛下至聖至明豈不察人臣職事放過則易不放過則難臣不為其易而為其難亦何心也小臣所以區區堅持不敢茍且施行者為陛下守職事耳陛下若不容臣與職事而必奪之臣亦無恨以臣為抗命而賜之罪臣亦甘心但恐自今人人皆務為其易而不為其難非朝廷之益耳惟陛下省察幸甚臣毎見衆人攝職事多務茍且皆曰三五日間何須如此殊不知命令之下朝廷所繫至重一有所失則紀綱揺動議論沸騰有累聖政此臣所以夙夜深思不敢忽也陛下既重改成命必欲施行則願聖慈指揮門下省别差官權給事中以全孤臣之守又言臣伏䝉聖㫖指揮以所除安燾敕命已行宜令臣書讀施行者便當恭禀睿詔即時奉行縁事干國體重輕繫君道得失臣為諫官既當言承乏給事中又當駁非臣好為髙論喜忤大臣以自取怨也惟陛下照亮愚臣幸甚今陛下進忠退姦一新大化之時而容柔佞雜進使四海有惑陛下之心忠臣有不自厲之志其可乎燾之非才以久塵樞近既不能自有所發明又明附彊臣章惇助為不公之論沮格聖政自當隨惇罷黜而反䝉褒進更長樞庭何以協公言何以示懲勸臣早來又於諫職繼有論奏伏望聖慈深賜省覧所有畫黄謹再繳連封進其范純仁除命伏乞分為别敕行下貼黄稱如臣放過門下必致諫官御史交章攻撃上煩聖聰恐燾雖欲且安舊位亦不得陛下若容其備位徐待求賢則不宜更有所遷升反為不才之累也時左司諫王巖叟兼權給事中即繳録黄并以諫職上章言燾不協人望乞分為别敇既駁而命復出者再已而告命遂不由門下省巖叟請對言益切至簾中諭曰駁議甚當極知公正祇為告命已出巖叟退就閤門復上章論其當罷繼降手詔俾速書讀中語甚峻巖叟持之愈急復以司諫給事兩職各上䟽云臣為諫官既當言承乏給事又當駁非臣好為髙論喜忤大臣且命令斜出尤損紀綱凡八上章得請乃已此據張舜民誌巖叟墓舊録不載巖叟封駁事止於三月十五日載别出范純仁告命極為踈畧新録并十五日所書亦削去不知何故比舊録益踈畧矣巖叟朱光庭二十八日同對必及封駁事但新録舊録俱不載耳巖叟章據本集并附見當以舜民墓誌稍刪削穿聨之巖叟朝論云閏二月二十二日權給事中二十五日駁安燾除知樞宻院敇二月二十六日再駁遂更不令給事中書讀直自門下侍郎處過送尚書省施行右司諫蘇轍言臣近奏論諸執政才力長短以謂張璪李清臣安燾皆斗筲之人持禄固位安能為有安能為無但陛下新臨天下人材衰少此數人者未可一朝盡去故且存而勿論若陛下必用鎮撫中外彈壓將帥如彼三人皆不足用臣竊見近日李清臣自尚書右丞為左丞雖號稍遷而職位相近未至超擢臣是以不敢復言今者安燾自同知樞宻院為知院度越四人直出其上中外驚怪不知陛下何以取之而遽至此臣觀燾之為人才氣凡近學術空虚不逮中人僅免過失先帝特以燾萬里渉海故酬其勞置之侍從燾謹黙自守遂至樞府既忝重任畧無建明與張誠一同事則隨誠一與章惇同事則隨惇髙下俯仰惟彊有力者是從奈何舉天下兵革之重全以付之若陛下憐燾未忍罷去臣願令且守舊職與范純仁共事如此則樞宻院與三省俱無長官亦無闕於事至於躐等用人非衆人共稱其賢於義不可右諫議大夫孫覺言臣竊聞有㫖安燾除知樞宻院權給事中王巖叟封還不下臣以為安燾材識未有過人者臣嘗論執政數人皆當罷黜燾其一也臣以言韓縝未効未敢論列今陛下乃以燾知樞宻院則是燾已遷矣臣安得晏然而已乎若燾之材能不為士大夫所稱徒以舉進士名在第三因縁以至館職先朝逐去言事臣僚過多無人可用故燾得備位於朝已而遣使髙麗以燾為使者不以海道為辭亦人臣之常事耳遂稍擢至户部尚書同知樞宻院事燾之才品中人以下臣竊以皇帝陛下太皇太后陛下進退大臣以新庶政若燾在所先罷者也不謂陛下因惇之罷㧞范純仁在宻院純仁立朝本末習知邉事非燾之比也朝議以為陛下於安燾未忍即有所去則亦以為同知院事令與純仁同列而處其上可也何遽遷之乎臣以為巖叟封還稍為舉職伏乞特留聖念御史中丞劉摯奏臣伏聞同知樞宻院事安燾除知樞宻院事臣竊以朝廷進用大臣必以有德其次以有功然後上重國體下厭公論謹按燾備位執政以來未聞有一善見稱於人亦不聞有一言少補於國朋附章惇助其彊横以養交固寵中外鄙之惇既貶逐燾亦自當罷去陛下篤於恩舊尚且包含固已為燾之幸豈可一旦無故超越左右兩丞及門下中書侍郎而暴有進擢臣不知陛下以何名進燾謂有德邪有功邪誠無以慰天下之望止言者之辭臣欲乞聖慈如未欲失大體罷燾只乞且令依舊為同知樞宻院事於聖恩無所傷於燾無所害於名器為重於公議必服况今制命未下追止無難伏望速賜處分貼黄臣早來面奉德音以燾受遺舊人欲全恩禮臣以謂燾無功德有罪惡不使罷去足以為恩豈宜更有不次遷擢恐命令既下言者必須交攻至於理道所極則燾之舊位亦不可保却虧失恩遇伏望但令同知本院以允清議勢又同殿中侍御史孫升奏臣等伏聞除安燾知樞宻院事因給事中兩次封駁不當遂䝉特降指揮更不施行送本官書讀直下吏部施行臣等竊見安燾除差未論當否然朝廷命令之出必由門下書讀省審而後行所以審重防察示至公於天下也今陛下除一大臣因其封駮不當遂廢給事中職業不令書讀則是命大臣以私矣私門一開將何以振肅公道維持紀綱乎伏惟陛下臨御以來政事之舉皆合至公獨此一事設施乖戾恐於盛德所損不細臣等深為陛下惜之伏望速降指揮追還所除告命及詳覧臣僚前後論列安燾章疏别賜指揮以全朝廷典法貼黄制敕不由門下及省審書讀不備則不成命令其經歴之司必不敢放過被受之人必不敢當摯又言檢凖元豐三年七月十八日九月二日中書劄子節文奉聖㫖應差除及更改事件到封駮司限當日鈔録闗報御史臺諫院後至元豐五年中給事中舒亶申為新制撥封駁司歸門下省為封駁房如合依舊闗報不知以何官司為名恐内省無闗報外司之理奉聖㫖更不闗報自此已來臣僚差遣政事更革臺諫不復聞知朝省之上禁賞嚴重無敢𫝊者直至敕命已到諸司諸司奉行訖方隨行遣闗報其間若有未安理合論列則往往事已在數十日之後臣下回已行之命固非易朝廷為反汗之令亦必難臣曽於去年十月十九日具狀申請至今未䝉可否指揮今來欲乞聖慈檢㑹臣前奏特賜指揮許依舊制應差除及更改事件委給事中限當日實封牒諫院御史臺所貴命令未宣於外可以先事論奏而朝廷亦易於聽從别無違礙貼黄諫官御史臺承受到給事中牒報事件乞嚴立禁約不得漏泄仍不下司又貼黄封駁司改為封駁房其名號雖異而職事不殊本房既不可闗移然今給事中乃封駁之任也宜自給事中移報臺諫為是兼給事中主封駁臺諫官主論列交相檢察以補成政令其任一也於闗報無嫌元祐元年閏二月二十七日奏此去年十月十九日初奏不從此奏得請在三月十八日丙辰左司諫王巖叟右正言朱光庭進對太皇太后曰知卿等公正不由執政用卿朝廷有闕失一一言來但安心言事太皇太后垂簾官家又年小不比神宗時若非臺諫公正忠孝及執政得人一耳目何由得盡知天下事謂之執政若不執奏事却要何用臺諫官若畏避何以立事卿駁安燾甚當知卿公正只為君命已出又只是次遷今後更不遷也非不知安燾不才無公望但以顧託不欲盡去卿等須㑹得若據執政迎合欺罔盡合趕了只為受遺不欲得卿等所言多已施行除是卿等照管不到之事則休不避怨仇人之難事卿等但安心言事太皇太后一一主張這裏不肯容易卿累薦程頤今已除宣德郎校書郎來日待行出文字召對頤除承奉校書在十八日召對在三月十四日又曰差除若是他有人望不惜他合得人望自然無言語掩人口不得又曰用賢不當避親却恐不當如蔡確等卿等須知神宗時執政若一一進言安得有今日天下許多事蔡確來問人言臣私事乞降出答曰不惜降出别不為私事只為卿先帝時不進言確云此則臣之罪也亦曽如此宣諭韓縝又曰章惇毁韓縝李清臣張璪安燾如奴僕簾前亦無禮便是平交亦須存事體這裏是甚處七八次將入文字來甚不遜改更事天下人皆喜只惇不喜本候他自請圖教去得好却是他如此不免貶去一似蔡確得他請出便乗勢教去也此據巖叟朝論增入舊録但云知卿等公正不由執政用卿朝廷有闕失一一言之知人為難堯舜猶然又曰民間已蘇息未愛民當如赤子又曰知人為難堯舜猶病之又曰民已蘇息未愛民當如赤子此兩言據舊録増入巖叟朝論乃無此巖叟光庭退而同上章言自陛下臨御以來大小之政無一不當近日進用忠良退斥凶邪猶為英斷天下之人皆知敬服懽喜惟是今升安燾為知樞宻院一事便是朝廷闕失臣等誠不忍容燾妄進却累全美燾不才無公望又陛下素已深知未加斥去已是大恩而進知樞宻院乃為太過在西府雖為次遷縁對東府即是躐過左右丞中書門下侍郎四等所以外議終不為允伏望聖慈取天下公言且令燾只居舊職上則不傷陛下之恩下則不起衆人之議中則使燾居之亦安庶全陛下日進之盛德此臣等區區之心所以報陛下也惟乞留神聽納丁巳安燾辭免新命令學士院降詔不允敕黄付左司諫王巖叟書讀巖叟封還敕黄乞特依安燾所請只令依舊同知院事上可以表聖恩之優厚下可以息衆議之紛紜中可以全安燾安處其職又言陛下若因燾辭免遂收新命既得愛重名器之體又有聽納諫諍之名傳播天下益彰聖德伏聞近日差除盡出清衷無不允當外庭之臣交口稱頌仰體聖心亦自愛此善政惟燾不才未副陛下任賢之意臣所以不避煩瀆再三納忠誠不欲僥倖之人上累聖政全美伏望睿慈必賜采納詔今後差知西京大名應天成都太原永興成德軍秦延青鄆杭瀛定慶渭熈廣桂州並待制已上人如未至上件職任曽任正提刑已上即權餘並權發遣其兼安撫總管等自依舊條其知河陽荆南江寜潁昌河中鳳翔陜府陳襄鄧潞揚亳蘇越洪潭泉福梓徐曹蔡鄭滑相邢同晉廬夀湖明宣滄齊棣州已上並差曽任正提刑人餘並權通判已下資序權發遣其見任提刑已上因差知州即具歴任取㫖詔在京水磨茶場廢罷其結絶官物等令户部措置施行從侍御史劉摯右司諫蘇轍殿中侍御史黄降劉次莊所奏也政目云從劉摯等奏摯轍奏在二十三日黄降劉次莊所奏當考元豐八年六月三日九月四日皆合參照又詔八路知州通判簽判監司屬官承務郎以上知縣大使臣員闕並歸吏部差注内接送人合支雇錢者並只差兵士内有專條并奏差及一時指揮及其餘闕并水土惡弱及自來差攝官處並依舊政目同又詔開封府選兩赤縣官檢視京城門外暴露白骨如法瘞埋訖奏仍並支常平錢二十三日蘇轍云云又詔應内外見監理市易官錢在京委太府寺開封府界令提㸃司諸路令轉運司各限一月取索逐户元請官本㸃勘特許以納過息罰錢充折如已納及官本即便與放免并坊場净利錢亦依此許以納過罰錢折填净利以上通折外尚欠官本錢并净利而家業蕩盡及無抵保或正身并保人孤貧者權住催理及今日已前積欠免役錢與減放一半餘分限三年隨夏稅帶納所有今月四日勘㑹欠負指揮更不施行又詔户部疾速指揮諸路如人户委因災傷闕食並依今年二月四日指揮施行二事並從右司諫蘇轍所奏也後一事舊録有之新録削去其第二事舊録又見三月二十八日新録削去盖舊録重出也詔保安軍順寜寨主許明特罰銅十斤鄜延路經畧司保安軍各特放罪初西人所將馳馬䭾乗過數合給回而明輙以車馬般載赴闕故也又詔陜西河東路經畧司指揮沿邉城寨使臣等約束並邉人户及所遣探事人今後不得於界外無故侵擾中書外省奏舊制臣僚封贈父母各有詞欲乞今後並依舊制仍應中大夫防禦使已下用海詞外其太中大夫觀察使已上用專詞從之户部言乞罷諸州常平管勾從之檢初置年月附注元豐八年十一月十四日政目所書可考是月殿中侍御史吕陶言君子小人之分辨則王道有成邪正雜處於朝則政體不能純一此天下安危治亂所繋甚大世主當審其取舎也恭惟太皇太后陛下臨御以來念祖宗積累之難思先帝倚託之重保佑聖嗣安養生民剗除敝事覃布德恵召用一二舊老與之裁正法度緝完紀綱以𫝊萬世欲皇帝陛下他日循而行之則宗社乂安如泰山之四維聖心所存豈不逺哉然大臣之異議者則不能盡誠竭力以稱太皇太后之意尚且依違偷惰務習故態觀望反覆互持兩端推原其情盖有三說一曰先帝之法豈可遽改他日嗣皇親决萬機則吾屬皆有罪二曰國家用度至廣非取於民何以足今一切蠲放餘利則遂見闕乏三曰司馬光老且疾將不能終其事萌此心者蔡確韓縝章惇張璪是也安燾李清臣則依阿其間俯仰徘徊以伺勢之所在而歸之爾謂先帝之法不可遽改乎則三王之政不免有敝為其有敝而改之所以宜民利物而全其治體臣嘗觀去年正月甲辰詔書乃曰嘉與四海洗心自新則先帝彼時已知法之將敝有欲改之意矣今太皇太后以母道臨制天下順元元之所欲而與時損益盖以成先帝之志也且君子愛人以德小人愛人以姑息責難於君謂之忠謂吾君不能謂之賊今之大臣欲改法者使天下無憾於先帝是待其君甚厚而愛之以德也於先帝為忠也其不欲改使天下有憾於先帝是待其君甚薄而愛之以姑息也恭惟皇帝陛下端重仁孝出自天縦佗時親總萬機而見天下有太平之實追觀今日之事是非得失回覧其端則必以厚於先帝而愛之以德者為是薄於先帝而愛之以姑息者為非忠於其君者為得賊於其君者為失矣然則欲改法者佗日將至於無罪不欲改者他日將至於有罪不當私憂而過計也謂國家用度非取於民不能足乎則今日之議法非不取也惟患小人苛刻而取之多故參酌中道而除去煩苛乃百姓足君孰與不足之義也伏惟太皇太后陛下慈愛恭儉德與性成内無土木遊玩華靡之費外無干戈攻戰過濫之賞節用裕民既得其道何俟過取而後給哉謂司馬光老且病將不能終其事乎則修講法度本為宗社萬世之計不問光之存亡假使光雖物故而朝廷圖治之意豈肯中輟哉亦何必望望然幸光之死也謀人國而立意如此是昔日負先帝今日負陛下也當熈寜元豐之際小人之黨棊布於天下急利者争斂財急功者争用兵結民怨起邉禍日甚一日彼數人當此之時或領大農或處近侍或總計省或居二府然而未嘗獻告一言建明一事惟持禄固位茍度嵗月以民事驗之其極也則有市易之息有堆垜之利有江湖之鹽法有京師之茶禁以軍政驗之其極也有乞弟之役有蘭州之取有靈武之役有永樂之陷凡此數事結民怨則深起邉禍則大然皆非先帝之本意乃大臣無所補報而有以成之臣故曰昔日負先帝也今太皇太后惻然念生民之困窮思有以安固邦本乃講求治道舉偏補敝改正法度以付嗣君為萬世之福天下之人傾耳側目日望太平數人者當此之時不能引咎改過猶懐向之三說觀望而不欲為或為之而不欲盡其事是以罷市易則尚存抵當放保甲則須俟嵗首黜江淮運鹽之臣則遷延累月而後行去年秋冬以來言者屢陳江淮運鹽之害執政遲留其事後始黜謫遣川蜀按茶之使則巧為之詞而不發按察川茶黄廉近詣兩府禀議利害皆為章惇所沮且言茶法决不可改富商大賈異論不足聽惇出近言欲仍舊榷茶也至邉鄙之大患存捨之長策皆置而不議及司馬光一獻差役之法則昌言其踈竊笑其迂其徒從而和之妄𫝊章惇有五利七難之說喧播於外士民聞者莫不駭嘆臣故曰今日負陛下也此數人者其處心積慮大畧如此當此之時决不可鎮安社稷矣若乃居家之隠慝在朝之細過聞望之素輕踐歴之太乖則言者陳之已詳陛下知之已久臣近領臺職不敢復道今蔡確章惇已罷免人皆快之縝璪輩猶備位實未厭天下公論也伏望陛下特出聖斷以辨君子小人之分無使邪正雜處於朝罷黜縝等以謝天下則王道之成政體之純一易如反掌耳又言伏見韓縝自備位宰府以來内外文武百執事至於閭閻聚落之人無不竊議交毁以為非據盖其人自為小官以至大吏行檢乖僻譽望衰輕有所欲為則任其狠愎而繼之以無恥任秦州經畧使日酣飲無度誤謂指使使臣窺其私而箠殺之奉使河東日肆為醜行形於翰墨為邉臣燕復所把持乃至呼復為兄而庇其過在宻院則諂事張誠一待以家人禮每劇飲大笑欵宻無間欲因誠一以結宦官此最為士論所深疾者也其使河東日實為北使梁允所屈遂割吾境上形勝之地數百里以資敵人使吾沿邉弓箭手熟户等去墳墓桑梓之日哀號怨憤所不忍聞乃奪官員職田并五臺寺家田以處之其襟要控扼去處多為彼有辱命蹙國罪當萬死先帝志在收復幽燕不欲聖機漏露一切包忍既而梁允以拓土之功歸其國為兩府吾亦用韓縝以示不疑耳其實非大用也自陛下即位以來乃敢賣弄威福崇植親黨差除一人行遣一事多不協於至公郭茂恂王欽臣在陜西為監司皆有醜迹惡聲喧聞一道其事連及縝姪宗儒今為縝主張差茂恂庫部郎中玷辱清選莫此為甚王說前知徐州附㑹呉居厚極力掊斂得替到部縁縝之舊忽除省郎言者彈劾遂罷其職仍知宻州潁昌人辛雍係知縣資序與縝同鄉遂於吏部取知州通判合得一闕差雍為光禄寺丞宣義郎李振者素無長才異効未嘗歴繁要任使止縁其父評曽與縝同定地界遂用振治煩劇去處作選差闕差振知雍邱縣是以一邑之民棄於孺子之手此徇私壊法無復畏避也翟思所以降知南康軍者盖思為御史日曽言縝受燕復馬不償其價故也黄履所以落侍講知越州者盖履為中丞日言縝之姪宗道宗古避親遷換不當奉聖㫖今後差除三省同進呈故也此皆報怨復仇無所忌憚也張璪之為人柔邪猥佞善能窺人主之意隨勢所在而依附之往往以危機中人熈寜初擢在條例司講議役法遂置儒館預諫列唯諾備位無所發明常持兩端先帝聖慮髙逺察見反覆斥逐於外復為王珪出力援引試知制誥兼知諫院珪實欲使之在言路以杜塞内外耳目天下有志之士無不扼腕憤疾後為翰林學士同舒亶判國子監深交於亶以至株連大獄璪有力焉尋判司農寺詳定官制遂忝執政及先帝升遐陛下即位太母垂簾保佑而璪貪天之功自謂顧託之重立黨市恩為持寵固禄之計每差一官除一局則以簡札諭人掠美收恵而後降其命成都路榷茶司勾當公事張同者乃隨州簽判王經臣之甥也同之姊當嫁故益王向經而璪之姊乃嫁經臣璪之與張同固非近親今乃與同書問徃還甚於骨肉交通問遺財賄公行原其所以結張同之心則姦邪可知矣璪事先帝不為不久謂天下利害不知耶則兩次在言路矣謂土木之役不知耶則嘗判將作監矣謂苗役之法不干預耶則嘗判司農寺矣謂官品迂滯不見本末耶則嘗充詳定官矣謂刑獄羅織非其責耶則嘗以蘇軾事欲置於死逮張方平韓維范鎮司馬光矣此二人者其操行則如彼其政事則如此伏望陛下博詢衆議俯聽臣言早賜罷免天下幸甚陛下若謂先朝大臣不欲黜責則二府之出須加以美職知大藩於恩禮不為不重願陛下早賜聖斷陶又言伏見朝廷以福建江西湖南等路鹽法之敝流毒生靈遂遣使案視具得其實譴黜聚斂之吏以慰困窮之民天下皆知公議之不可廢也然事治其終而不治其始罪加於小而不加於大豈所謂無偏黨之道哉盖熈寜中章惇察訪湖南日嘗牒本路提㸃刑獄朱初平措置鹽事立成般運廣鹽添額出賣之法當時元未施行及惇参知政事祕書丞郟亶者邪險急進素為惇所喜迎合惇意推放湖南之法率爾論奏乞般廣鹽於江西出賣朝廷信之遂以亶所奏付蹇周輔往江西相度周輔相度江西廣東賣鹽在元豐三年九月丁亥二十八日惇乃將亶所說鹽事文字又親為小簡封送周輔其簡云郟祕丞言鹽事甚備恐欲知利害之詳郟亶文字并章惇簡見在蹇周輔處乞取索照㑹所以蹇周輔順承風㫖立成江西之法添額最重為害最深然則江西之法乃惇主之於内周輔行之於外情狀表裏灼然可見其後惇為門下侍郎周輔知開封府於元豐六年十二月周輔又奏乞荆湖南路郴道州隣接韶連二州可以通般廣鹽數百萬代淮鹽出賣却儧那舊賣淮鹽於潭衡永全邵等州並乞依倣江西廣東路條法施行當月十八日章惇奉聖㫖差本路轉運判官陳偲提舉常平等事張士澄計㑹本路提刑司根檢章惇昨往本路察訪日牒朱初平相度鹽法一宗文字看詳措置聞奏并送下郟亶奏請亦乞郴道全州般賣廣鹽並委陳偲等相度是致偲等立成添額之法施行未久一路騷然上煩朝廷遣使案察臣今伏詳按察陳次升奏狀内明言元豐六年十二月蹇周輔所奏奉聖㫖委陳偲等相度仍令檢章惇牒朱初平一宗文字看詳措置及送郟亶狀亦付陳偲等陳次升奏狀見在刑部乞取索照用於是又見湖南之法亦出於惇其迹甚明無可疑惑盖惇始立湖南之法雖未行於本路而江西依倣推行已有厚利遂諷蹇周輔郟亶各令奏請已獨主而行之然則江西湖南運鹽添額之害皆惇所倡周輔輩從而和之也按惇備位二府不以道輔朝廷而乃首建邪議與小人相附㑹徇利肆毒貽害生民其罪甚大今蹇周輔張士澄魏綸朱彦博等皆已黜逐而惇獨不問非大公至治之法無以戒天下惇雖以悖慢罷免而運鹽之過未治意朝廷未知也臣愚伏願陛下付有司根治其罪懲以典刑使賊民罔上之臣少知畏懼臣又聞惇於熈寜八年任三司使日起請乞京東河北𣙜鹽奏其狀乃曰河北陜西並為邉防今陜西𣙜鹽而河北獨不𣙜此祖宗一時誤恩也彼時朝㫖依惇之請召京東提舉鹽事周革入見委陳朴王子淵相度將欲施行為文彦博論奏遂罷其事然文案條目具在逐路運司以致李察呉居厚吕孝廉等檢行舊法使一道之民罹此刻剥其謀本出於惇伏望聖慈一就根究施行仍乞改正京東河北鹽法按神宗實録委陳偲張士澄措置湖南鹽法乃六年十二月十四日甲申也此云十八日恐誤文彦博奏罷河北賣鹽實録殊不載已具注在熈寜八年六月十八日戊申周輔奏行湖南鹽法時實為戸部侍郎未知開封府也七年五月九日知開封張士澄衝替郟亶送吏部事在此月四日三月十八日孫升疏可考之陶又言伏謂朝廷差除之法大别有三自兩府而下至侍從官悉禀聖㫖然後除授此中書不敢専也自卿監而下及已經進擢或寄禄至中散大夫者皆由堂除此吏部不敢預也自朝議大夫而下受常調差遣者皆歸吏部此中書不可侵也法度之設至詳至宻所以防大臣之專恣革小人之僥倖也恭惟神宗在御深究其弊凡堂選奏舉之類並悉罷去以示大公之道因去年八月中執政申請以繁劇去處重法地分為詞收占吏部所用知州通判知縣并在京庫務寺監丞闕六十餘處並歸中書取㫖選差之後除吏之敝私徇寖多天下州郡除别京大府并元係堂除處及取㫖選差并元屬八路指射外其歸於吏部以待常調者數極少而員極多待次之士逺至二三年近須一嵗或有一闕可就則中書取而差他人矣或受一闕而去則中書又奪而恵他人矣處州之胡宗質元年正月二日睦州之李孝廣閏二月八日滁州之陳知新閏二月八日光州之燕介均州之劉斐閏二月八日永州之呉潛正月六日此六郡者皆非元係堂除去處而中書取以差也吏部差王照知海州欒子元通判瀛州方䝉知咸平縣皆數月矣中書乃以石麟之知海州元年正月十八日胡及通判瀛州孫純知咸平縣皆奪而恵之也若謂胡宗質李孝廣陳知新自提舉得替燕介係中散大夫石麟之曽任太常官皆非吏部可差之人則當契勘堂除州郡而差不當取吏部見使之闕及奪他人已受者與之也若謂朝廷審擇庶官執政惟才是用則劉斐曽任知州以失入死罪責降呉潛曽為運判以刻剥苛細罷官皆非所謂才者而近方牽復並先除郡士論喧沸已謂不平然又有甚於此者盖胡及嘗為開封府判官以不能檢束去職纔送吏部便得堂除孫純以受贓致罪止縁宰相之妻族乃受畿邑又皆奪佗人之有而與之謂胡及衝欒子元孫純衝方䝉王說前知徐州附㑹呉居厚掊斂害物得替歸部忽除省郎為人所彈乃罷其職今則差知宻州二月一日說除倉部郎閏月四日知宻州陸師淵前知開封縣稅入中限猶未造簿以弛慢衝替今則差知宿州二月二日且胡及送吏部王說罷省郎皆是朝廷顯責詔墨未乾而中書已有選授告命之出不述所因陸師淵與劉斐呉潛均是衝替而師淵又得元係堂除大郡謂知宿州私曲縦横莫甚於此陛下黜之則執政升之陛下退之則執政進之怨歸於上而恩出於下非今日之所宜有夫威福者天子之所得専法度者大臣之所當守今大臣進退羣吏一出已意不守法度而欲専威福矣臣恐朝廷不尊而紀綱紊亂當此之時宜戒其漸也伏願聖慈將合係堂除闕編為一等今後如有合得堂除之人只於前項去處定差其曽經擢用而非次差替罷或責降牽復不送吏部者於合得堂除人之下别為一等依名次先後差遣並不得於吏部所使闕差授及衝已授之人所有元豐八年八月取㫖選差條貫乞賜刪改又言臣又聞二月九日吏部曉示光禄寺丞并少府監丞闕於格先問知州次問通判次問知縣人凡願就者二十餘狀况此二闕不係堂除又非取㫖選差之數自初九日至十六日除寒食假外曉示才得兩日中書已差知縣人辛雍為光禄丞監當人文永世為少府丞進擬之際其速如此若非請託公行則是主張有素吏部使闕遂成空文合入之人不可復得伏望朝廷詳察早設防禁辛雍文永世之事尤駭士人耳目伏乞追改以存公議胡宗質李孝廣陳知新燕介石麟之胡及孫純王說陸師淵劉斐呉潛等差遣亦乞勘當如未到任即乞改正施行三月十四日詔自今堂差不得衝吏部已注受人盖從陶議也二月十日劉摯有章論王說政目閏二月六日宣義文永世少府丞朝散辛雍光禄丞胡宗質元年三月二日知處州李孝廣元年閏二月八日以朝散知睦州陳知新元年閏二月八日以朝散知滁州燕介當檢劉斐元年閏二月八日以朝奉大夫知均州呉潛元年二月六日以朝散知永州石麟之元年正月十八日知海州胡及元年正月十八日以府推送吏部孫純當檢王說元年二月二日以朝議為倉中閏二月四日知宻州陸師淵元年二月二日知宿州
