body:
  text: 作為此書以光修通鑑時先成長編燾謙不敢言續通鑑故但謂之續資治通鑑長編文獻通考載其進書狀四篇一在隆興元年知榮州時先以建隆迄開寶年事一十七卷上進一在乾道四年為禮部郎時以整齊建隆元年至治平四年閏三月五朝事迹共一百八卷上進一在淳熙元年知瀘州時以治平後至靖康凡二百八十卷上進一在淳熙元年知遂寧府事重别寫呈并舉要目録計一千六十三卷六百八十七冊上進故周密癸辛雜識稱韓彥古盜寫其書至盈二厨然文獻通考所載僅長編一百六十八卷舉要六十八卷與進狀多寡迥殊考陳振孫書録解題稱其卷數雖如此而冊數至逾三百蓋逐卷又分子數或至十餘云云則所稱一千六十三卷者乃統子卷而計之故其數較夥矣又據燾進狀其實止於欽宗而王明清玉照新志稱紹興元年胡彥修疏在長編一百五十九之注後則似乎兼及髙宗或以事相連屬著其歸宿附於注末如左傳後經終事之例歟癸辛雜識又稱燾為長編以木厨十枚每厨抽替匣二十枚每替以甲子志之凡本年之事有所聞必歸此匣分日月先後次第之井然有條云云則其用力之専且久可概見矣其書卷帙最夥當時艱於傳寫書坊所刻本及蜀中舊本已有詳略之不同及神哲徽欽四朝之書乾道中祇降袐書省依通鑑紙樣繕寫一部未經鏤板流播日稀自元以來世鮮𫝊本本朝康熙初崑山徐乾學始獲其本於泰興季氏凡一百七十五卷嘗具疏進之於朝副帙流傳無不珍為祕乘然所載僅至英宗治平而止神宗以後仍屬闕如今檢永樂大典宋字韻中備録斯編以與徐氏本相較其前五朝雖大概相合而分注考異往往加詳至熙寧迄元符三十餘年事迹徐氏所闕而朱彛尊以為失傳者今皆粲然具存首尾完善實從來海內所未有惟徽欽二紀原本不載又佚去熙寧紹聖間七年之事頗為可惜然自哲宗以上年經月緯遂已詳備無遺以百年來名儒碩學所欲見而不得者一旦頓還舊規現行諸本增多幾四五倍斯亦藝林之巨觀矣昔明成化中詔商輅等續修通鑑綱目時永樂大典庋藏內府外廷無自而窺竟不知燾之舊文全載卷內乃百方别購迄不能得論者以為遺憾今恭逢我皇上稽古右文編摩四庫乃得重見於世豈非顯晦有時待聖世而發其光哉燾原目無存其所分千餘卷之次第不可考謹參互校正量其文之繁簡别加釐析定著為五百二十卷燾作此書經四十載乃成自實録正史官府文書以逮家録野紀無不遞相稽審質驗異同雖採托浩博或不免虛實並存疑信互見未必一一皆衷於至當不但太宗斧聲燭影之事於湘山野録考据未明遂為千古之疑竇即如景祐二年三月賜鎮東軍節推毛洵家帛米一事核以余靖所撰墓銘殊不相符為曽敏行獨醒雜志所糾者亦往往有之然燾進狀自稱寧失之繁毋失之略蓋廣搜博録以待後之作者其淹貫詳贍固讀史者考證之林也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
