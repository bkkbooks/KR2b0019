body:
  text: 續資治通鑑長編卷四十六宋李燾撰真宗咸平三年正月己卯朔有中使自峨眉山還京師符昭壽戒馭吏具鞍馬將出送之延順等乃悉解廄中馬韁使跳躍庭下陽逐而縶之喧呼之際延順遂帥其徒徑登廳事擊殺昭夀并殺其二僕據甲仗庫取兵器時牛冕方坐州廨受官吏賀聞變皆逃竄冕及轉運使張適附冕傳不詳邑里縋城出奔漢州惟都巡檢使劉紹榮未見冒刃格鬭既而衆寡不敵延順等尚未有主或欲奉紹榮為帥者紹榮攝弓大罵曰我燕人也比自北歸朝肯與汝同逆耶亟殺我我寧死義耳延順等亦未敢害之都監王澤未見聞變召王均謂曰汝所部兵亂盍往招安延順左執昭夀右操劍倣徨未知所適忽見均至即率衆踴躍奉均為主指揮使孫進不從命亟殺之餘兵及驍猛威武軍悉合而為亂紹榮縊死均僣號大蜀改元化順署置官稱設貢舉以神衛小校張鍇為謀主鍇夲名美太原舊卒也是日并代都部署步軍都指揮使髙瓊鈐轄東上閣門使李允正率所部至行在即詔瓊領兵屯冀州辛巳樞密副使宋湜有疾上臨視之先是上封者多言王顯専司兵要謀略無所取乃命參知政事向敏中權同發遣樞密院事視湜病實録在甲申今從本紀中書有敏中銜而不署字此據會要前光祿寺丞李永錫貶康州瀧水縣主簿權户部判官殿中丞皇甫選責授南劍州團練副使永錫惟清子也時居父喪上言厯詆近臣自謂有致太平滅敵之術選因召對具表以獻且稱薦之及追赴行在試䇿與所言異故並黜焉劉筠志選墓云屬以天驕犯塞皇赫斯怒寅車致討業已戒期公以為豺狼沓貪藩籬是固古之上䇿宜責將臣伏閣拜章讜言切至猶堂尊主賈生遂極于涕洟以賊遺君耿弇不勝於忠憤威稜既露吏議匪容明年春責授南劔州團練副使據此則李永錫所陳亦可想見是日王均率衆陷漢州牛冕等奔東川癸未以殿前都虞候葛霸為貝冀髙陽關前軍行營都部署以萊州防禦使田紹斌為邢州觀察使淄州團練使李福為霸州防禦使蘄州團練使石保興為棣州防禦使奬州刺史楊嗣為保州刺史如京使楊延朗為莫州刺史崇儀使敘州刺史帶御器械石普為洛苑使富州團練使兵部員外郎知祁州張旦為尚食使內殿崇班祥符蔚昭敏為崇儀使李規為供備庫副使供奉官閣門祗候張昭文為內殿崇班賞擊退敵騎之功也李規張昭文兩人無聞或可削去李福未見甲申并代鈐轄李允正引廣鋭騎士數百人對于行宫前殿上與輔臣觀之曰聞是兵久經戰陳皆可驅使乃加賜緡錢遣屯邢州先是范廷召自中山分兵擊敵求援於髙陽關都部署馬軍都虞候彰國節度使康保裔保裔即領兵赴之至瀛州西南裴村而廷召後陳已與敵遇使來趣兵保裔選精鋭與之會日暮約以詰旦合戰及夕廷召潛師以遁實録於保裔傳載廷召潛師以遁及傅潛事又云廷召與敵血戰前後差違今但從保裔傳保裔不之覺遲明敵騎圍之數重左右請易甲而逃保裔曰臨難無茍免此吾效死之日矣遂大呼決戰凡數十合兵盡矢窮士卒以徑弩擊敵殺傷甚衆所蹙踏塵深二尺而救兵不至保裔沒焉敵遂自德棣濟河掠淄齊而去上既聞保裔死其部曲畏誅聲言保裔投賊密詔駕前走馬承受榆次夏守贇察之守贇變服入軍中亷問既得其實於是優詔贈侍中以其子寄班供奉官繼英為六宅使順州刺史餘五子及孫悉加寵秩繼英等奉告命占謝曰臣父不能決勝死於敵陛下不罪臣等又蒙非常擢用因悲涕伏地不能起上惻然曰久知爾父忠孝今死王事追贈賞延之命所宜加等顧謂左右曰保裔父死疆場而身復戰沒世有忠節深可嗟惜且聞其母年八十四矣即遣內司賔勞問賜白金五千兩封為陳國太夫人又封其亡妻薛氏為河東郡夫人保裔謹厚多禮好賔延儒士騎射尤妙嘗握矢三十引滿以射筈鏑相連而墜人服其能屢經戰陳身被七十鎗又中手炮傷臂而未嘗言功所賜金帛輒分其麾下積貸公錢數十萬以勞軍沒後親吏鬻器玩以偹償上知其家無遺財乃復厚賜之夏守贇傳云守贇還言保裔因送客猝與敵遇援兵不至遂死奏稱旨詔恤保裔家守贇所言與保裔傳差異今從保裔傳將校官屬死事者十三人悉優其贈典李重貴傳重貴與張凝全軍還屯凝欲上功狀重貴止之按保裔所以死實諸將遁去救兵不至耳免戮為幸安得更論功狀此傳必妄也今不取乙酉鎮定髙陽關路行營都部署馬步軍都虞候忠武節度使傅潛都鈐轄西上閣門使富州刺史張昭允並削奪官爵潛流房州昭允通州潛二子內殿崇班從政從範亦除名隨父流所仍籍沒其家資先是上駐大名既踰旬邉捷未至且聞驍將楊延朗楊嗣石普輩屢請益兵潛不之與有戰勝者潛又抑之不以聞繇是大怒命樞密都承旨王繼英召潛與北面行營先鋒都部署石保吉等各以所部兵赴貝冀路行營潛至冀州乃遣髙瓊單騎即軍中代之令潛等詣行在至則下獄命工部侍郎錢若水御史中丞魏庠知雜御史馮拯按鞫之一夕而獄具罪當斬百官議論如律上封者請正刑典詔特貸其死中外公議無不憤惋范廷召等引兵追契丹丁亥至莫州東三十里大破之斬首萬餘級獲所虜老幼數萬鞍馬兵仗不可勝紀餘衆遁逃出本紀實録並稱貝兾髙陽關都部署范廷召按廷召傳廷召為定州營都部署未嘗有貝兾髙陽關之命葛霸傳云與石保吉同入朝時康保裔戰沒即命霸為貝兾髙陽關前軍都部署實録本紀皆著之不應於廷召獨闕荆嗣傳又云嗣提偏師捍敵嘉山時𨽻廷召麾下廷召徙髙陽命嗣以二千卒為軍逐敵至瀛州按此則廷召果自定州徙髙陽關疑莫州東之捷廷召與霸皆在焉故官名相錯而遣使獻捷則廷召首署其奏耳本紀實録並稱廷召等可見此捷奏非一人所為也今但書廷召等而不書其官以示疑奏稱今月十九日蓋衍十字他書皆悮十二日奏達行在豈得預指十九日耶今改之上在河朔慮南方有聚冦己丑詔以西京左藏庫使康州刺史楊允恭為荆湖江浙都巡檢使內殿崇班楊守遵副之侍禁閣門祇候焦守節為都監本傳云上聞王均叛故復有此命按此時益州之奏尚未到也今改之莫州刺史楊延朗入奏邊事上意甚悅指示諸王曰此即楊延朗也延朗父業為前朝名將延朗治兵護塞復有父風深可嘉也厚賜遣還任庚寅范廷召等遣使奏捷羣臣稱賀上作喜捷詩題行宫壁廷召以功加檢校太傅餘將校恩賜有差按正史范廷召傳咸平二年契丹入寇車駕北巡廷召與敵戰瀛州西斬首二萬級遂北至莫州東云云莫州東之捷實録已具載惟瀛州西斬首二萬獨不載于實録但因傅潛貶稱廷召等擊敵髙陽關與敵血戰而潛不至康保裔遂陷沒若廷召果能與敵血戰且斬級二萬此捷固不為小獨何為不遣使馳奏也今於保裔陷沒已去廷召血戰等字其斬級二萬亦削去兼實録廷召傳殊略疑正傳頗有所增飾耳貝冀行營副部署王榮受詔以五千騎追敵榮無將才但能走馬馳射性恇怯數日不敢行伺敵渡河而後發敵剽淄齊者數千騎猶屯泥沽榮不欲見敵乃以其所部略界河南岸而還晝夜急馳馬不秣而道斃者十有四五上憫之遣使收瘞置榮不問辛卯赦河北諸州軍及淄齊州罪人非持仗劫盜故殺枉法贓至死者並釋之將吏死事者録其子孫民被焚掠者復其租罷緣邉二十三州榷酤諸州舉才武乃五月一日德音本紀誤載于此今除去王均自漢州引衆攻綿州不能克直趨劍門先是知劔州祕書丞李士衡聞寇作以州城難守即焚倉庫運金帛東保劔門是日均至士衡與劔門都監左藏庫副使裴臻逆擊敗之斬首數千級民之脅從者率多奔潰士衡揭榜招降得千餘人悉置麾下示以不疑均衆乏食疲弊不敢由故道徑隂平還成都實録稱均叛卒不滿百人亦多被創竄匿山谷間蓋言之過也今不取裴臻未見樞密副使給事中宋湜疾甚詔許先歸賜以衾褥且諭曰此朕常所御者雖故暗亦足禦道途之寒也又遣中使護送供帳優厚壬辰卒於澶州詔贈吏部侍即録其子弟授官者三人及再幸河朔追悼之加贈刑部尚書甲午車駕發大名府是日次德清軍上始聞王均反即以户部使工部侍郎雷有終為瀘州觀察使知益州兼提舉川峽兩路軍馬招安巡檢捉賊轉運公事御厨使李惠洛苑使富州團練使帶御器械石普供偹庫副使李守倫並為川峽兩路捉賊招安使帥步騎八千往討之又以洺州團練使上官正為東川都鈐轄西京作坊使李繼昌為峽路都鈐轄崇儀副使高繼勳王阮並為益州都監供奉官閣門祇候孫正辭為諸州都巡檢使繼昌崇矩子繼勳瓊子也李惠李守倫王阮孫正辭未見實録即載秦翰於李惠後誤也秦翰受命招捉乃八月事今削去乙未車駕至澶州初知蜀州供奉官閣門祇候楊懷忠聞成都亂即調鄉丁會諸州巡檢兵刻期進討蜀民不從賊者相率抗禦自謂清壇衆懷忠又擇清壇衆之魁七十餘悉補巡檢將遣判官髙本馳驛以聞丙申懷忠率衆攻成都先鋒自北門入遂燒子城北門西至三井橋時王均從劔門還猶未至懷忠與賊將威棹小校崔照及偽招安巡檢魯麻胡等陳於江瀆廟前懷忠兵勢不敵引衆退保江原懷忠所調兵夫多李順舊黨頗貪剽劫故致敗績庚子車駕至自大名府李沆為東京留守不戮一人而輦下清肅壬寅命度支判官兵部員外郎陳堯叟供奉官閣門祇候杜承睿往陜西路體量公事承睿未見癸卯翰林侍讀學士兵部侍郎兼祕書監楊徽之卒徽之先以足疾請告上自取名藥為賜郊祀不及扈從特命加賜如侍祠之例車駕北巡徽之力疾辭於苑中上顧謂曰卿勉近醫藥當不久相見駐蹕大名特降手詔存諭還京又遣使臨問及卒上甚嗟悼贈兵部尚書諡文莊賜其家錢五十萬絹五百匹又遣中使護喪事録其外孫宋綬太常寺太祝二姪皆賜出身徽之有集二十卷上令夏侯嶠就其家取進內徽之無子而宋氏婦賢明知書有禮法子綬能自立於時人以為善慶所及大中祥符中徽之妻王氏卒及葬再以緡帛賜其家綬平棘人也乙巳王均復入成都丙午上謁太宗聖容於啓聖院丁未李士衡乘驛奏捷以士衡為度支員外郎賜緋裴臻為崇儀使領峯州刺史其後川峽招安使言士衡棄城乃復坐絀責焉省杭州通判一員二月庚戌大食國遣使穆吉鼻來朝貢辛亥翰林學士王旦等三人權知貢舉壬子翰林侍讀學士吕文仲上新編太宗御集三十卷先是遣內臣於襄壽等州巡茶鹽癸丑罷之楊懷忠檄嘉眉七州調軍士民丁悉與懷忠會再攻成都時王均方遣趙延順攻邛蜀州懷忠逆擊之賊稍却國史稱懷忠以二月十七日再攻益州據耆舊傳則所稱十七日再攻益州時雷有終等已至矣國史既云自益州還屯櫧木寨又進壁雞鳴原以俟王師若有終已至又何俟乎蓋國史誤以有終十七日始攻益州為懷忠再攻益州實在上旬不得其的日也耆舊傳及實録載二月三日王均遣趙延順攻邛蜀州為懷忠所敗國史稱懷忠再攻益州時均方遣延順攻邛蜀此可見其不出上旬在初四五間也疑不能決并書其事於此俟考懷忠與轉運使陳緯緯為轉運實陕西路今得在此必運糧以給行營諸軍也當考又按淳化五年劉錫為陕府以西至益州轉運使緯必與錫同列但史文略耳麾兵由子城南門直入軍資庫署其庫鑰均所部皆銀槍繡衣為數隊分列子城中出通逺門與懷忠戰會暮懷忠復退軍筰橋背水列陳寨於櫧木橋南以扞邛蜀之路故賊不能復南略既而賊黨自清水埧溫江金馬三道來攻櫧木寨出官軍後焚江原神祠斷邛蜀援路懷忠三道分兵以抗之斬首五百餘級驅其衆入皂江獲甲弩甚衆乘勝逐賊至成都南十五里寨於雞鳴原以俟王師均亦閉成都東門以自固己未命宰相李沆為元德皇太后園陵使餘四使並如例禮官初議用孝章皇后故事止差監護使一員特降是命始議立陵名禮官言唐德宗昭德皇后王氏順宗之母始葬崇陵睿宗肅明皇后始葬惠陵後祔葬橋陵周顯德末都省集議引故事帝后同陵謂之合葬同塋兆謂之祔葬漢吕后陵在長陵西百餘步以同塋兆而無名號又唐穆宗二后王氏生敬宗蕭氏生文宗並祔葬光陵之側今園陵鵲臺在永熙陵封地之內恐不須别建陵號從之太子太師張永德對于便殿凡數刻尋命為彰德節度使出知天雄軍府辛酉詔翰林學士給諌知制誥尚書丞郎郎中御史中丞知雜館閣三司官員外郎以下京朝官有武勇才器堪邉任者知雜而上各二人郎中各一人限五日奏異時不如舉狀者譴之田錫奏附三月末綿漢龍劔都巡檢使澄州刺史張思鈞引兵克復漢州斬偽刺史苖進遣使來告捷按實録此月十三日思鈞遣綿州司法參軍樊信明馳奏克復漢州不稱它人獨耆舊傳云石普先抽兵與思鈞攻下金鴈而國史因之按普本傳亦不云克復漢州若果與思鈞同克復則普本傳何緣不書普又非推功與人者疑國史因耆舊傳而誤耳雷有終等自漢州與張思鈞帥大軍進討列寨升仙橋壬戍賊衆來襲有終擊走之癸亥樞密使王顯罷為山南東道節度使同平章事宣徽北院使周瑩為南院使樞密都承旨客省使王繼英為宣徽北院使並知樞密院事翰林學士中書舍人王旦為給事中同知樞密院事甲子諸軍校以次遷補多自陳其勞績者御前忠佐馬步軍都軍頭康州團練使呼延贊獨進曰臣月俸百千所用不及半忝幸多矣自念無以報國不敢更望升擢政恐福過災生拜謝而退衆頗嘉其知分贊初為鐡騎都指揮使從太宗平太原時方決䇿北征左右因言自此取幽州猶熱𨫼翻餅耳贊獨曰此餅難翻言者不足信也太宗不從卒無功而還君子謂贊最粗暴尚能識此武臣中不可謂無其人也王得臣麈史云富鄭公嘗説永熙討敵既平河東欲乘勝取幽州猶熱𨫼翻餅耳殿前都指揮使呼延贊爭曰書生之言不足信此餅難翻永熙竟趨薊門卷甲而還如贊言鄭公再三嘆息曰武臣中蓋亦有人矣按太平興國四年薛居正沈義倫盧多遜三人並為宰相曹彬石熙載在樞密不置參知政事而趙昌言亦未顯殿前都指揮使乃白進超都虞候乃曹翰贊但為鐡騎指揮使耳得臣所稱官爵及姓名皆繆然當時羣臣必有熱𨫼翻餅之言贊所對實云爾得臣記鄭公之説偶不審耳今沒趙昌言姓名正贊官爵仍録之於此乙丑以山南東道節度使王顯為定州行營都部署萊州防禦使王榮副之入內都知韓守英為鈐轄馬步軍都虞候王超為鎮州行營都部署單州防禦使楊瓊副之南作坊使李繼宣為鈐轄傅潛之在中山也田紹斌將先鋒臨敵境三馳書於潛言敵衆大至請潛止列陳唐河南背城與戰戒無窮追潛由是益不敢出潛既屬吏詞連紹斌即遣使械繫紹斌下御史獄鞫問丁卯責授左衛率府副率勒還私第禁其出入是日王均開益州城偽為遁狀雷有終與上官正石普等率兵徑入李繼昌疑有偹亟止之不聽因獨還官軍多分剽民財部伍不肅賊閉關發伏布床榻於路口官軍不得出頗為賊所殺李惠死之有終等緣堞而墜獲免遂退保漢州初繼昌所部諸校聞城中格鬬聲立請引去繼昌曰吾位最下當俟主帥命是夕有終馳報乃行益州城中民皆迸走村閭賊皆遣騎追殺或囚縶入城支解族誅以恐衆均又脅士民僧道之少壯者為兵先刺手背次髠首次黥面給軍裝令乘城與舊賊黨相間有終乃揭榜招脅從者至則於其衣袂署字釋之日數百計故城守之外悉無剽盜楊懷忠慮賊衆復南出引所部屯於合水尾浣花等處樹機石設笓籬以拒之戊辰以京畿旱御崇政殿親決繫囚多所原宥癸酉大雨詔河北經戎人侵軼州軍舉人除已預薦名外其實曽請解赴省試者禮部籍名以聞當議别試甲戌置靜樂軍實嵐州靜樂寨也丙子曲宴近臣於後苑上作中春賞花釣魚七言詩儒臣皆賦遂射於水亭盡歡而罷自是著為定制是月常山布衣竇詡上疏曰人無法以知天以隂陽寒暑之變而知天臣無法以知主以聲教法令賞罰之動而知主是故往古聖帝賢臣千載符契或取之屠釣或取之版築卒能贊成皇圖光大王業以福天下典䇿流譽煥然不泯者何哉誠君臣之心合於道也聖宋受命奄有萬邦革五代之弊法踵三王之至德太祖以神武英斷定鴻業太宗以聰明文思敷大化赫赫巍巍髙視前古陛下應千年之運嗣二聖之業而居安慮危處廣思狹庶政康矣慮一事之未序百姓安矣憂一物之失所宵旰孜孜勤勞忘倦雖周宣漢文實有慙德天下幸甚向者契丹侵侮剽掠邉郡戎人為患上古而然陛下念邉民之失業閔士卒之暴露不恃萬乘之尊不深九重之居冒犯嚴凝親幸河朔選將訓師應機料敵雖北面沿邉戍兵已衆而復以禁軍張其聲援蠢彼契丹曷當天威殺戮之餘逃竄無地曽未再月掃清邉陲中外歡呼小大同慶臣目覩凱旋鼓舞增氣有以見陛下英斷睿謀天資成算者也臣又伏覩去春陛下以時雨稍愆屢軫聖念遽下明詔許中外之臣隱淪之士各盡所見直言得失其後上書撓天聽者雖多合聖謨者蓋寡何哉臣以為陛下求之者不在貨利不在詞華不在詭辨在乎敦教化厚風俗和庶政安百姓焉而上言者或以小利或以聚斂多尚詞華多近譎怪則是陛下之所求欲公於天下也彼應詔者不出乎進身竊祿而已如此則君臣道合誠難矣因進其芻蕘説五篇上覽而嘉之命入院召試賜同三禮出身詡稱從子也竇詡所上疏實録載之咸平二年二月案二年十二月始幸大名三年正還京詡此疏已有冒犯嚴凝及目覩凱旋等語不知實録何為乃爾誤也然則他事雖繫日者抑未可全信耳詡疏當刪修而存之三月戊寅朔日有食之詔禮部所試合格舉人有權要親族者具名以聞時以邊境未寧議修天雄軍城壘遣度支使刑部侍郎張雍北作坊使勝州刺史劉承圭乘傳經度上之在大名也有詔調丁夫十五萬修黃汴河鹽鐵判官監察御史王濟以為勞民請徐圖之乃命濟馳往經度還奏省其十六七宰相張齊賢以河決為憂因對并召濟入見齊賢請令濟署狀保決不決濟曰河決亦隂陽災沴所致宰相若能和隂陽弭沴災為國家致大平河之不決臣亦可保齊賢曰若是則今非太平耶濟曰北有契丹西有繼遷兩河關右歲被侵擾以陛下神武英略茍用得其人可以馴致今則未也上動容留濟問以邊事濟曰陛下承二聖之基擁萬方之衆維兹契丹敢爾慿陵蓋謀謨當位之臣未有如昔人者衆皆謂國家所恃獨一洪河耳此誠急賢之秋不然臣懼敵人將飲馬於河渚矣退而著備邊策十五條以獻於是選官判大理寺上曰法寺宜擇當官不回者苟非其人或有寃濫即感傷和氣王濟近數言事似有特操可試之甲申以濟權判大理寺禮部上合格舉人甲午上御崇政殿親試命翰林學士承旨宋白等與館閣王府三司官二十一人於殿後西閣考覆國子博士雷説説見開寶八年著作佐郎楊詢封印卷首親覽入等者賜陳堯咨以下二百七十一人進士及第一百四十三人同本科及三傳學究出身堯咨堯叟之弟也又命翰林侍講學士邢昺等十五人考校諸科得四百三十二人賜及第同出身又試進士五舉諸科八舉及嘗經御試或年踰五十者論一篇得進士二百六十人諸科六百九十七人賜同出身及試校書郎將作監主簿賜宴日以御詩褒寵之以堯咨等五人並為將作監丞通判第一等并九經為大理評事知大縣第二等為節察防團推官餘為判司簿尉試銜者守選上連三日臨軒初無倦怠之色所擢凡千八百餘人其中有自晉天福中隨計者較藝之詳推恩之廣近代所未有也雷有終等復自漢州進軍列寨彌牟鎮賊黨來攻有終擊敗之斬首千餘級遣其子奉禮郎孝若馳奏丙午對於便殿孝若願改職自效詔補西頭供奉官按宋史雷有終傳三月進攻彌牟寨為賊所拒四月率兵逆擊於升仙橋大敗之殺千餘人奪其繖蓋金槍等物有終遣子奉禮郎孝若馳奏上問敗賊之由笑謂左右曰均鼠竊耳雖嬰城自守計日可擒矣孝若因言嘗習武藝願改秩自效即補供奉官此編於彌牟寨後即載遣子孝若馳奏召對改職等語又於後四月辛未日載遣姪孝先齎奪王均槍繖入奏上問破賊之由一假事同而載互異丁未免通州蔡港渡錢從制置茶鹽王子輿之請也子輿久掌茶鹽又兼淮南轉運使周知利害裁量經度公私便之所至州縣以公事申請者文牒紛委頃刻待報子輿皆即時決遣不少凝滯是春上以手詔訪知開封府錢若水偹禦邉寇剪滅蕃戎之䇿若水上言曰臣聞唐室三百餘祀魏博一鎮當日戍兵少於今時而外敵未嘗侵境者何也蓋當日幽薊為唐北門命帥屯兵扼其險阻是以戎馬不敢南牧由晉祖割地之後朝廷自定州西山東至滄海千里之地皆須應敵是以設三關分重兵以鎮之少失隄防則戎人內侵晉末直渡長河漢初屢侵邉徼周祖在位復擾中山世宗臨朝來寇上黨此皆見於史氏陛下之所明知也今御札云剪滅蕃戎臣愚以為不得幽州城契丹不可滅今若有陳剪敵之䇿者誠可斬也何以明之臣以為後唐莊宗善用兵者也在河北時先令周德威攻取幽州及得其地知戎人不足慮然後南面爭天下向使幽州未下安得決渡河之計乎臣聞前代剪戎之䇿不可恃兵強皆須逢釁隙單于爭立宣帝所以得志頡利縱欲太宗所以成功若恃兵強則髙祖有長平之圍是也臣不敢為陛下陳剪戎之略直以今之急務陳偹邉之要望陛下開懷而納之夫偹邉之要有五一曰擇郡守二曰募鄉兵三曰積芻粟四曰革將帥五曰明賞罰何謂擇郡守夫今之所患患在戰守不同心望陛下選沈厚有謀諳邉事者任為邉郡刺史令兼緣邉巡檢任其召武勇之人為隨身部曲慮贍給不充則官為廩賜可也然後嚴亭障明斥堠每得事宜密相報示寇來則互為救應齊出討除去則不令逺追各務安靜茍無大過勿為替移儻立微功就加爵賞如此則戰守必同心茍戰守同心則戎人不敢近塞何謂募鄉兵夫今之所患在不知敵情望陛下召邉民為招收軍給與糧賜蠲其賦租彼緣兩地之中各有親族使其懷惠來布心腹彼若舉兵此必預知其事苟預知則百戰百勝矣何謂積芻粟夫今之所患患在困民力望陛下令緣邉各廣營田以州郡長官兼其使額每嵗秋夏較其課程立旗鼓以齊之行賞罰以勸之仍縱商人緣邉入粟儻鎮戍有三年之偹則丐奴不敢動矣何謂革將帥夫今之所患患在重兵在外輕兵在裏去嵗傅潛以八萬騎屯中山博魏之間鎮兵全少非鑾輅親征則城邑危矣願陛下遴選將臣任河北近鎮仍依舊事節制邉兵恐未能削部署之名且望減行營之號遇舉動則暫巡邉徼當事平則却復舊藩豈獨不啓戎心況復待勞以逸如此則不失偹邉之要又無舉兵之名且使重兵不屯一處此實機事言難盡陳望陛下細而詳之何謂明賞罰夫今之所患患在戍卒驕惰臣自知府以來見侍衛殿前兩司送到自邉亡命軍卒人數甚多臣試訊之皆以思親為言此蓋令之不嚴也平時尚敢如此況臨大敵乎望陛下特以此言示將帥俾申嚴軍令務戒其徒古人云賞不勸謂之止善罰不懲謂之縱惡又曰法不可離令不可違臣嘗預修國史見太宗用郭進在山西每遣戍卒則必諭之曰汝等謹奉法我猶赦汝郭進殺汝矣其假借臣下如此故郭進所至兵未嘗小衄望陛下鑒之前事之不忘後事之元龜也臣今舉此五事皆是略陳大綱如可施行則當詳具條奏臣又聞胸奴用兵惟視太白與月耳按天文志太白者將軍也辰星者廷尉也合則有戰合於東則主勝合於西則客勝不合則無戰臣以此推之戎人一二年間未敢深入陛下若用臣言年嵗之內則邉鄙不聳矣邉鄙不聳則丐奴不召而自來矣太祖臨御十七年間未嘗令疆場生事故丐奴先遣使上書乞盟此明驗也安在舉兵剪滅哉臣望陛下思兵者凶器戰者危事不可倒持鏌耶授人以柄自五代以來為將北征者大則跋扈小則喪師此皆布於舊史陛下之所知不可不慎之不可不戒之臣嘗見嚴尤論自古禦戎無得上䇿臣竊笑之以為王者守在四夷常獲靜勝此上䇿也曷謂無哉吏部郎中直集賢院知泰州田錫上疏曰臣伏見去年十一月十四日赦文欲興行武舉令所司條奏以聞今年二月一日又見轉運司行下御史臺牒限五日內舉員外郎以下見任京朝官有武勇才器堪任武職安排充沿邉親民差遣者以臣所見若為邉上要人訪求有武勇才器者急速如此竊慮未得盡理蓋見往年朝臣中求武藝者得劉墀鄭宣等數人劉墀以易州陷沒契丹鄭宣卒無勞效今又朝臣中求人臣慮朝臣中武勇者少設使有武勇多不願在武職況限之以五日奏舉若非相諳識豈易得人臣恐舉非其人有誤陛下任使也今日是陛下注意於良將之時是選求文武材幹為沿邉刺史之際夫理亂必有漸而安危必先見臣曽上章為關西地震是下動之象奏狀進入後降在中書尋却奉聖旨取索入內相次近京諸處多報軍賊逃背沿黃河劫掠軍縣後來驅除雖稍寧息昨契丹犯境聞龍猛兵士三二千人詐作契丹虜劫河北今聞散在兖州山林間又日近西川駐泊神衛軍都虞候王均作亂奔衝劔門尋已殺戮近又訪聞河東州郡澤潞間亦有盜賊此實下動之萌也昨李繼遷雖授夏州節度使在彼自稱西平王豈不為將來邉患國家積儲糧草繕完甲兵尚要素有其偹豈得良將謀臣料敵制勝國家却素無備若求騎射之藝勇猛之人兵法中自有選求之法求便得人但要有智謀者指使之而已所謂獲兔者犬指蹤者人也況善用兵者人無勇怯以智略使之則怯者有勇今若限以五日舉有武勇才器者臣實慮懷才抱器者未盡得竒謀逺見未易知願陛下與宰相近密商量别畫選求之策也若且於見今節度防團刺史諸司使副中有智見勳勞者選擇使用在陛下以賞罰二柄使之而已往年楊業擊契丹侯延廣守靈州人多稱許若見今節度防團刺史諸司使副中因賞罰激勵豈無楊業侯延廣輩為國家立功勳也臣又以江南兩浙自去年至今民餓者十八九未見國家精求救療之術初聞遣使煮粥俵給後來更不聞别行軫恤今月十二日有杭州差人齎牒泰州會問公事臣問彼處米價每斗六十五文足彼中難得錢又問疾疫死者多少人稱餓死者不少無人收拾溝渠中皆是死人却有一僧收拾埋藏有一千人作一坑處有五百人作一窖處臣又問有無得雨稱春來亦少雨澤臣問既少雨澤麥苖應損稱彼處種麥稀少又問飢饉疾疫去處稱越州最甚蕭山縣三千餘家逃亡死損並盡今並無人其餘明杭蘇秀等州積尸在外沙及運河兩岸不少雖未審虛實然屢有聽聞兼聞常潤等州死損之人村保各隨地分埋瘞況掩骼埋胔是國家所行之事文王葬枯骨而天下歸心今積尸暴骨如是而使僧人收藏村保埋瘞甚無謂也伏乞陛下命使吊奠以慰幽魂遣人掩藏免傷和氣所貴王者德澤及於存亡然後訪有兼并之家能出財助國者優奬之有儲蓄之家能發廪救民者旌酬之又宜放一二年稅賦免三二年徭役非富商大賈之稅不用稅非摘山煮海之貨不用徴用此以安民心以防盜起也去年淮南地震臣已畫時奏訖又聞江南地震尤甚望陛下宣御札降德音以禳災異訪問樞相以放稅賦減課利若不可減臣請以近事比臣讀五代史梁朝後唐晉漢及周封疆不及千里江南西川兩浙荆湖廣南各有主帥當時中國多事尚欲制禦蕃戎自太祖平吳取蜀下廣南太宗平河東吳越王舉國歸朝廷此國家封疆萬里稅賦課利百倍於前除邉上所費外但減省不急之用則倉廩府庫自然盈餘何必於江浙飢饉疾疫之後籍其所出稅賦課利以贍軍國今江南二十七州軍兩浙一十六州軍宜知若干州是飢饉疾疫之處若干不是飢饉疾疫之處其地無災沴人無疾疫處依每年上供錢帛糧草外餘係災沴處朝廷早行指揮以有均無以多濟寡以安民心以防盜起也臣又訪聞江淮每年漕運五百六十萬碩米今年春運不如常年其江浙共四十四州軍上供錢帛之數臣即不知亦不知朝廷今春規畫之計臣但以四十四州軍有餓死疾死處州軍放稅賦減課利免徭役是國家安民心防盜起也易不云乎君子以思患而預防之又兵法曰攻其東南偹其西北謂敵若攻城之東南當先防偹其西北慮敵人出其不意也今若西北沿邉未息侵擾而東南沿海復有騷動則臨時制禦必費力臨事籌度難成功今雖差楊允恭等江淮兩浙巡檢屏除盜賊朝廷已有此指揮然於防盜起之萌致民安之漸未見朝廷經度也況所求武勇材器者要沿邉任使又以所舉三班使臣如犯入已贓即連坐舉主若三班中求亷謹有行止者豈得無人其實亦難得人若連坐舉主則舉者必少又所舉貟外郎見任京朝官不如舉狀責在舉主如此求人慮難得人如此求沿邉任使慮未副聖旨夫事有本末理有逺近今不急求謀臣而先求武勇不思將來之患而務目前之事易曰王公設險以守其國漢書有盜卒起殺長吏取庫兵放禁囚驅人民作亂者今諸處城池多不修築壞垣填塹往來如平地萬一卒有盜起逐處官吏何以固守加以在營兵士多非精鋭在庫甲仗少有堅完道路出入之要衝山川險阻之形勝有不相統攝之處有不相叶同之人况太平既久士卒不慣行陳將帥不知戰守加以士卒驕而將帥鄙致昨來傅潛輩臨事而茍且遇敵而進退伏望陛下以選求將帥為急務以博訪謀猷為上䇿若只三班中求任使文班中求武勇臣竊懼失朝廷大計失國家大事也臣讀漢書見日蝕地震必降詔書求直言極諌之士必下德音復赦宥復除之令自去年九月八日淮南地震九月十六日夜月食未見降御札下德音夫至大者天地之變知幾者聖哲之心乞陛下以聖哲知幾之心答天地示變之異經心於逺者大者圖事於未萌未兆覃恩於飢饉疾疫之處布德於月食地震之後况臣憂國之心非今日言事之疏非一章自前年將赴任泰州蒙宣召時後殿面奉聖旨令臣今後有事入遞奏來今具實封進呈伏望聖慈特賜留在禁中披覽可行可止斷在宸衷錫自注云咸平三年三月一日奏此今附月末
