body:
  text: 續資治通鑑長編卷六十六宋李燾撰真宗景德四年秋七月乙丑朔南州蠻龔允進等來貢時虎翼軍有率錢修公用什物者上以法禁甚嚴而此類贓非入已情理可憫丙寅詔自今一事以上並從官給丁卯祔莊穆皇后神主於别廟殿室在莊懷皇后之上令永安縣民僦官舍錢減其半永為定制詔婦人犯罪杖以下非故為者量輕重笞罰或贖銅釋之戊辰審刑院言諸路脫漏丁口輦運金帛儲糧止緣失誤其命官使臣無贓私罪案望止付三司奏斷訖報法寺又法寺與勘命官內檢斷不當公事失錯或保任無狀止是公坐不至追官者並止委轉運司差官鞫問如無情弊即依法罰訖以聞並從之詔自今官吏犯贓及情理慘酷有害於民刑名疑誤者審刑院依舊升殿奏裁自餘擬定用刑封進付中書門下施行㑹要云詔審刑院凡有法寺奏斷公案皆具詳議奏覆今後宜令本院除官吏贓私踰濫為事慘酷及有刑名疑誤者依舊奏覆其餘刑名已得允當即具封進仍以黃貼子擬云刑名委得允當乞付中書門下施行時王濟等上章乞廢審刑院帝因令宰相更為約束王濟欲廢審刑院當考詔審官院見任官滿三年者方得考較引對被特㫖者不在此限先是京朝官代還無殿纍者率考較引對多獲進改未嘗限年故也詔西路州軍衣綱官健為積雨河溢所滯者續給日食舊例軍士所至止給一日口糧上以道塗修阻故恤之己巳上謂輔臣曰王濟上刑名敕五道煩簡不等朕嘗覽顯德中敕語甚為煩碎當是世宗嚴急出於一時既已行下無敢諌者又言魏仁浦嘗作敕草云不得有違堂吏白敕命一出違則有刑何假此言也仁浦是之王旦曰詔敕理宜簡當近亦傷於煩馮拯曰開寶中差諸州通判敇刑獄錢榖一一指揮又有不得慢易之語方今已簡略也上曰大凡聨官茍協和商議事皆中理若一人異同雖不得慢易等字去之亦難自今事理有關輕重不侔者當先訪有司具陳可否然後降敕馮拯𫝊云王濟編敕今從實録又謂輔臣曰近日諫官御史言事殊少豈未熟典故或不知朝廷行事耶茍能糾彈論議切中時務則中外聳聽矣詔羣臣舉官例皆連坐宜有區别自今朝官使臣幕職州縣官須顯有邊功及自立規畫特著勞績者乃以名聞如考覆之際與元奏不同當行朝典或改官後犯贓舉主更不連坐如循常課績歷任奏舉者改官犯罪並依條連坐其止舉差遣本人在所舉任中犯贓即用連坐之制其改官他任縱犯贓罪亦不須問詔如聞鞏縣西南積雨河溢漂露邱冡其令所在官為設祭埋瘞趙德明請許蕃民赴保安軍榷場貿易從之庚午置陵臺令兼知永安縣事壬申詔開封府判官推官各增置一員以獄訟刑法為生事户口租賦為熟事分掌之仍如俸給如事有枉抑未盡公理非吏人受賕者自今並以推判官為首先是上之為開封尹置判官二員推官三員及即位止各置一員於是出筆記六事與王旦等議之其二條以府事繁劇欲增置推判官既有是詔仍令旦等擇人而任之其後推判官止分掌左右軍廂無生熟事之别也無生熟事之别在天禧四年今且并書之髙班內品裴愈出𨽻唐州愈前監廣州綱與交州使相遇因言龍花蘂難得之物宜以充貢至是州採之為獻且言愈嘗道詔㫖上曰朕懷撫逺俗何嘗有所宣索耶即下愈御史臺劾問而有是責仍以龍花蘂還交州愈素與知雜御史王濟有隙上初怒甚濟力為辨理遂獲輕典人多稱濟焉上謂輔臣曰近見詞人獻文多故違經㫖以立說此所謂非聖人者無法也俟有太甚者當黜以為戒初知宜州劉永規馭下嚴酷課澄海卒伐木葺州廨數不中程即杖之至有率妻孥趣山林以采斫者雖甚風雨不停其役六月乙卯軍校陳進因衆怒鼓譟殺永規及監押國均擁判官盧成均為帥僭號南平王據城反廣南西路轉運使舒賁移牒招撫發桂潯等州兵趣栁城討之甲戌奏至詔東上閣門使曹利用供備庫使賀州刺史張煦為廣南東西路安撫使如京副使張從古內殿崇班張繼能副之虞部員外郎薛顔同勾當廣南東西路轉運事發荆湖南北路先屯禁兵蘄黃州虎翼荆南雄略等軍赴桂州閲習行陳俟利用等至合勢攻討無得先進上謂王旦等曰司天屢上占候言當有兵方憂逺地牧守不得其人今此賊果作廷議擇官且言利用精於方略悉心王事煦多歷邊任尤熟用兵從古頗知嶺外山川險厄繼能勇往可任然朕料此賊不出三䇿若保其家屬據城距守一也略城中貨以趣山林二也用此二䇿皆不足慮若選募驍果立謀主直趣廣州此賊之上䇿也然其知識必不及此但慮為人誘教爾又遣入內髙班內品于德潤馳驛將詔諭賊中能束身自歸者並放罪仍舊收管逐州長吏倍加安撫如敢違拒即令利用等進兵禽戮將士務令整肅無得妄傷平民焚蕩閭舍蹂踐田畝立功者所在以官物給賜即時遷擢便宜從事諸州縣官屬如賊至所部能規畫禽戮者厚加酬賞隨軍將校日給肴酒務令豐沃增置自京至宜州馬遞鋪命內侍髙品周文質為廣州駐泊都監諭之曰畨禺寶貨所聚民庶久安萬一賊沿流東下則其患深矣爾亟往與本州官吏密設備禦緩急冦至即集近州兵馬巡檢使臣控要路以扞之仍許便宜從事丙子詔曹利用等將士立功者不須給帖付之第據功狀遷補內殊異者以名聞權三司使丁謂言景德三年新收户三十三萬二千九百九十八流移者四千一百五十總舊實管七百四十一萬七千五百七十户一千六百二十八萬二百五十四口比咸平六年計增五十五萬三千四百一十户二百萬二千二百一十四口賦入總六千三百七十三萬一千二百二十九貫石匹斤數比咸平六年計增三百四十六萬五千二百九欲望特降詔㫖自今以咸平六年户口賦入為額嵗較其數具上史館從之龍圖閣待制陳彭年言按漢書髙平侯魏洪坐酎宗廟騎至司馬門削爵一級此則騎不得過廟司馬門之明文也今太廟别有偏門及東門祀官入齊宫去殿庭尚逺其后廟唯有一門每遇禘祫神主由之出入兼齊宫政與殿門相對數步而已祀官皆乘馬而入實非恭恪望自今中書門下行事許乘馬入太廟東門自餘並不得乘入庶彰寅恭以廣孝思詔祀官遇雨許乘馬入東門導從止門外餘如所請先是將作監丞李迪大理評事李咨范昭同召試上覽所試詩賦謂王旦曰迪稍優咨昭又其次也迪可與著作郎直史館咨太子中允昭著作佐郎並直集賢院仍於制詞述朕此㫖庶使知勸丁丑廢東西窑務以薪蒸分給諸班直諸軍從內殿崇班謝德權之請也祥符二年五月以修昭應宫復置東窑務張崇貴又言緣邊州軍與夏州蕃部移牒往來不絶望增置安撫使以涖其事詔止令轉運使往提振之審刑院言神勇軍校嶽榮戍延州弋射矢傷人至死法止贖銅上曰軍校非閲習而傷人若處常法何以為誡特詔罰俸錢五十千付被傷家庚辰命閣門祗候張禹正楊繼筠為潭桂州駐泊都監上以宜州用兵此二州皆湖廣要地故也黎龍廷自稱權安南靜海軍留後遣其弟峯州刺史明昶殿中丞黃成雅等來貢辛巳授龍廷靜海節度使交趾郡王賜名至忠給以旌節又追封黎桓為南越王明昶等皆進秩及含光殿大宴明昶等與焉上以成雅坐逺欲稍升其位著訪於宰相王旦旦曰昔管仲朝周王饗以上卿之禮管仲固辭受下卿之禮而還國家綏靜逺方優待客使固無嫌也乃升成雅於尚書五品之次實録誤以管仲為子産今改之河溢澶州壞王八掃詔遣使完築令河北河東路部署等巡視軍中其閲習士卒有材勇願𨽻在京諸軍者聽其自陳州給裝錢部送闕下疲老不勝鎧甲者具名以聞時河北驍健軍士因防護至京引對便殿上詢之有願留補禁旅者上以兩河就糧軍多徑勇士因廣搜擇焉壬午詔廣州幕職州縣官軍校及流配人委曹利用等所過延問詢求利便可采者疾置以聞先是被罪失職者多謫嶺外時宜賊方擾上慮因緣叛集議徙近北州軍故因令察訪之詔諸州遣軍士赴東京下卸者自今除口糧外月别給錢二百仍創營屋每冬使其休息上以軍士外役即留廪給之半贍家多致饑寒不給特優恤焉知制誥周起言諸司定奪公事望令眀具格敕律令條例聞奏或事理不明無條可援者須件析具事宜從長酌中之道取㫖不得自持兩端逗遛行遣如挾情者望許人論告重行朝典或止是畏避亦量加責罰從之甲申詔除潭州攸縣大清塘魚稅米乙酉舒賁言是月朔陳進及盧成均等悉衆來攻栁城縣殿直韓明許貴郝惟和率所部兵千餘禦之明貴戰死惟和僅以身免成均乃奔宜州即遣使詣臣求赦罪臣察知其僞是夕進復陷栁城官軍不敵退保象州望亟發兵討擊上曰此誠詐也然進等既以此請宜𫝊詔諭賊中如能解甲歸降盡赦其罪仍加轉補丙戌益州地震丁亥遣使賜曹利用等將士衣服戊子上謂輔臣曰比詔庶官上殿不得以無名劄子奏事蓋慮邪說因緣交鬬而近日已來殊無獻言者卿等宜勤接士大夫察問四方事以聞詔翰林遣畫工分詣諸路圖上山川形勢地里逺近付樞密院每發兵屯戍移徙租賦以備檢閲遣使葺西嶽廟癸巳復置諸路提㸃刑獄官先是上出筆記六事指其一謂王旦曰勤恤民隱遴揀庶官朕無日不念也所慮四方刑獄官吏未盡得人一夫受寃即召災沴今軍民事務雖有轉運使且地逺無由知先帝嘗選朝臣為諸路提㸃刑獄今可復置仍以使臣副之先命中書樞密院擇官具名進內上曰河北陜西地控邊要尤須得人取性度平和有執守者故親選授太常博士陳綱李權李及自餘擬名以聞咸引對於長春殿遣之所至専察視囚禁審詳案牒州郡不得迎送聚㑹所部每旬具囚繫犯由訊鞫次第申報常檢舉催督在繫久者即馳往案問出入人罪者移牒覆勘劾官吏以聞諸色詞訴逐州斷遣不當已經轉運司批斷未允者並收接施行官吏貪濁弛慢者具名以聞敢有庇匿並當加罪仍借緋紫以三年為任增給緡錢如轉運使之數內出御前印紙為歷書其績效中書樞密院籍其名代還考課議功行賞如刑獄枉濫不能擲舉官吏曠弛不能彈奏務從畏避者置以深罪初鑄印二十鈕給在京釐事官以兩京奉使為文先是給印皆以奉使為文內外無别故改鑄焉詔樞密院自今諸司使副使至閣門袛候外任代還或召赴闕者先具履歷以聞上以引見時或不能盡記其人履歷或有勞效嵗久當遷者故降是詔㑹要七月事八月乙未遣內侍閻文慶至桂州宴犒曹利用以下使臣軍校丙申詔宜融州溪洞蠻首領部分族人無得輒出疆境騷擾邊民俟賊平日當議節級優賞首領皆奉詔不敢動丁酉遣使葺泗州僧伽塔內出供帳什物給之己亥詔自今兩省五品尚書省四品大將軍刺史已上知雜御史諸司使被疾請告三日已上者入內內侍省遣使將太醫診視之舊制文武官屬疾咸遣醫療治頗有自陳微恙請不命國醫者上不欲恩例有異故定制焉檢校太傅簽書樞密院事韓崇訓長厚謙畏未嘗忤物素有目疾多請告上謂之曰朕在東宫時嘗見醫眼工言內外瘴眼須俟翳老實撥而藏之功易而效久若翳小而嫩撥之即復生復生無以療矣此頗近理卿宜志之崇訓再拜謝自是纍表求解庚子授齊州防禦使疾甚在告凡四百日每十旬有司上言必詔特令給俸置管勾往來國信司命西京作坊使廉州刺史內侍左班副都知閻承翰供備庫使帶御器械綦政敏主之自契丹修好嵗遣使交聘承翰始専其事因為排辦禮信所至是署局鑄印焉蒲端國進奉使上言伏見占城使䝉恩賜鞍勒馬二匹大神旗二願依例霑賚有司以蒲端在占城之下請給雜綵小旗五從之辛丑詔審官三班引對京朝官使臣不得過三人京朝官差遣不得過五人使臣差遣及吏部銓選人不得過十人其後三班引對使臣增至五人吏部銓選人差遣增至十五人上因謂宰相曰如聞選人於所由司頗有糜費若非主判官精心舉職則愈為下吏所撓朝廷既責以廉節豈得更容其邀幸也壬寅上幸崇文院觀新編君臣事跡王欽若楊億等以草本進御上遍覽之入四庫閲視圖籍謂宰臣曰著書難事議者稱先朝實録尚有漏落億進曰史臣記事誠合詳備臣預修太宗實録凡事有依據可載簡冊者方得記録上然之賜修書官器幣有差甲辰詔以曹利用等出征逺涉炎瘴令緣路諸州創造亭舍使得休息自罷兵之後議者頗以國馬煩耗嵗費縑繒雖市得尤衆而損失亦多知樞密院事陳堯叟獨謂羣牧之設國家巨防今愚淺之說以馬為不急之務則士卒亦當遣而還農也作羣牧議以獻勒石大名監乙巳置羣牧制置使命堯叟兼之堯叟初為羣牧使及掌樞密即罷其任於是內侍副都知閻承翰為都監堯叟自陳職居近密而與承翰聮事合避物議上曰國馬戎事之本宜得大臣總領不可避也堯叟尋以本司事多請但署檢其帖牒委使副判官印署施行從之尋又增置判官一員增置判官在九月丁亥今併書之增置廣州鈐轄一員以內殿崇班閣門祗候何榮為之宜賊方擾故也上謂近臣曰前命諸路提㸃刑獄官察所部官吏踰違不治而亷幹之士未令稱舉逺方聞之或謂朝廷但求人過又恐不識治體者因而生事乃降詔若有能吏亦許薦論詔編修君臣事跡官祕書丞陳從易著作佐郎直史館陳越大理評事祕閣校理劉筠月增給錢五千以從易等修書服勤而俸入比同僚尤薄故也丙午橫州言水漲壞營舍詔賜軍士緡錢丁未以右監門衛上將軍錢惟治為右武衛上將軍月給俸錢百萬仍許在家養疾時惟治弟太僕少卿惟演上聖德論上覽之謂宰臣曰惟演文學可稱且公王貴族而能留意翰墨有足嘉者可記其名并以論付史館因曰錢氏繼世忠順子孫可念聞惟治頗貧乏尤可軫惻也遂有是命出內庫錢五十萬貫付三司市菽麥時宰臣言今嵗豐稔菽麥甚賤為富民所蓄請官為斂糴以惠農民故也中書門下言莊穆皇后公除既久秋宴請舉樂詔有司詳定於是奏議曰按左氏春秋周景王穆后既葬除喪而宴叔向曰宴樂以早非禮也此蓋未行易月故云太早唐昭德皇后正元二年十一月丁酉崩三年二月壬寅神主祔廟四月戊寅德宗御宣政殿備禮冊太尉李晟按開元禮臨軒冊三公皇帝出入奏舒和之樂此則典禮所載眀文可稽伏請凖故事舉樂上不從宰相再表以請詔俟冬至如奏戊申詔自今內庭及含光等殿在京諸處齊醮內臣於諸司庫務宣索物料並令庫務具名數押署逐司方得給付給訖連內臣文字實封送三司置籍每旬具兩本進內一留中一下尚書內省降用印憑由除破其奉詔監葬者畢亦具所費奏聞録别本送三司憑由司勘驗如前制先是內中須索文記委都知司勘驗除破頗有留滯踰年未能訖給者上令樞密院三司議定此制因出內省所批文簿數卷示宰臣皆以諸司奏牘背為之曰宫中用此記事始自先朝凡宫禁省費多此類朕常以在京廨舍營宇所費材木素無條約三司不能盡察因令事材場八作司日具支用件狀進內邇者閻承翰靣陳官廨梁折望𫝊宣給換因知有此條約不敢妄費蓋念關西採市羣木軍民甚勞苦若無禁制弊滋甚矣己酉以三司鹽鐡副使司封員外郎林特為祠部郎中依前充職皇城使勝州刺史劉承圭領昭州團練使崇儀副使江淮都大制置茶鹽發運副使李溥為西京作坊使充發運使並以議茶法嵗課增溢故也時馮亮為使十月丙申乃遷官先是有司上嵗課元年用舊法得五百六十九萬貫二年用新法得四百一十萬貫三年得二百八十五萬貫特等言所增益官本少而有利乃實課也所虧虛錢耳於是特等皆遷秩仍下詔三司行新法毋得輒有改更此據本志然林特茶法條貫序乃云先是年收錢七十三萬八十五貫自改法二年共收七百九萬二千九百六十五貫與此數不同序在大中祥符二年五月當參考命知制誥孫僅龍圖閣待制戚綸重修十道圖其書不及成詔定立功將士賞格付曹利用等上謂輔臣曰承前用兵每獲首級準格給賞比者河朔禦戎之際有梟路人之首級以獻者自是每命將帥必戒諭之宜令利用等常加辨察庚戌詔嶺南新得替官如在任知山川要害者雖已受代宜續給俸料令與新官同掌其事賊平乃罷賜孔子四十六世孫聖佑同學究出身聖佑延世子宜孫也兵部員外郎邵曄嘗保薦光祿寺丞李隨遷著作佐郎坐贓除名為民大理寺以曄連坐當奪一官審刑院駮之云當用正月德音減降大理寺以隨事發雖在德音前而官典受賕不在恩宥之限審刑院言是春刑部員外郎鄭文寶坐舉張舜舉當徒大理引德音降從杖曄當如其例詔刑部尚書溫仲舒等議其事且言曄洎文寶皆不當減知審刑院朱巽屢於上前自訴上以語輔臣王旦等旦曰曄因隨得罪隨不該減削曄亦不在原降之例今朝臣舉官者甚衆若遇赦悉免則是永無連坐之法矣上以曄近自嶺表還故從輕典止詔停任法官皆坐罰翰林侍講學士刑部侍郎兼國子祭酒邢昺以羸老步趍艱梗見上自陳曹州故鄉願給假一歸視田里俟明年郊禋上命坐慰勞之因謂昺曰便可權知本州何須假耶昺又言楊礪夏侯嶠同為府僚二臣已沒皆贈尚書上憫之謂宰相曰此可見其志矣壬子即拜工部尚書知曹州職如故遷其班在翰林學士上入辭日賜襲衣金帶是日特開龍圖閣召近臣宴崇和殿上作詩二章賜之預宴者咸賦昺視壁間尚書禮記圖指中庸篇曰凡為天下國家有九經因陳其大義上嘉納之及行又令近臣祖送設㑹於宜春苑翰林侍講學士外使自昺始以侍禁桂昭等州巡檢張守榮為西頭供奉官閣門祗候殿直知懷逺軍任吉融栁等州巡檢張崇貴並為西頭供奉官三班奉職天河寨監押錢吉為右侍禁仍就賜錦袍銀帶器帛將士緡錢且令具立功人姓名以聞先是宜州賊攻懷逺軍城中固守賊退而復集者纍日守榮等出兵擊敗之獲其器甲又攻天河寨寨兵甚少吉部分嚴整即出擊又敗之自是有賊中來歸者言凶黨再經敗衄多潰散衆心離矣前月十九日實録書知懷逺軍秦文德奏六月二十三日賊攻軍城出兵掩擊敗走之殺獲甚衆此月十九日實録又書知懷逺軍任吉擊賊黨獲其器甲相距才一月懷逺軍不應便易守臣其稱破賊斬獲事略同疑前月十九日奏功此月十九日賞功其實一事爾不知實録何所據乃有秦文德姓名且賞亦弗及疑實録或誤今但取此月事載之削去前月事更當細考也癸丑上謂王旦等曰前詔羣臣言事除機密外不得用無名劄子非合靣奏公事不得上殿蓋防人之多言寖成萋斐也且必有顯狀封章彈奏有何不可近日戚綸靣陳詔㫖不便因出綸奏示旦等曰綸意以踈逺之人難得靣奏然自下詔以來升殿奏事者未嘗有阻朕於羣臣貴存公共不欲令潜行交構隂有中傷朕思天下至廣自惟寡昧常慮闕政豈止虛懷求治亦常惕然而懼前代帝王好窮兵黷武懈於機務惑聲色事奢靡此其大過朕固不為人臣論事若衆人所不敢言獨能言之信可嘉尚王旦曰飛語譖言聖慮固不為惑但近日論利害者差少亦宜留意省察王欽若曰臣下升殿一二次即希恩澤比來中外章疏若以前詔條約皆當付所司鞫問上曰綸性純謹有學問此奏乃未諭詔㫖爾舒賁言民有自賊中逃歸者言盧成均陳進等以衆心携二棄宜州沉家屬之悼耄者五百人於江率其衆才三千趣栁象將固守容管以劫廣州初至栁州限江不能度知州王昱望賊遁去城遂陷又言成均始謀挈屬來降夜潛出城至江見舟小乃復還上曰栁州既限江長吏何至怯懦如此信所用非才耳朕慮利用等以官軍勇鋭輕視賊黨彼遇官軍勢必奔迸雖當襲逐不可便無節制且不測山川險易地里逺近茍師人勞頓則益可慮也軍行逺地宜守萬全之計今賊勢日蹙終當自潰即遣使以手詔諭利用等時廣州駐泊都監周文質增築城壘繕修器甲集西海巡檢戰棹刀魚船據端州峽口以扼之賊知有備遂不敢東下乃挈屬處思順州分兵以攻象州舒賁遣內侍于德潤率兵千人倍道襲逐之丙辰涇原路言瓦亭寨地震丁巳詔修太祖太宗正史宰臣王旦監修國史知樞密院事王欽若陳堯叟參知政事趙安仁翰林學士朝逈楊億並修國史景德二年畢士安卒時冦準止領集賢殿大學士旦以參知政事權領史館事及旦為相雖未兼監修其領史職如故於是始正其名置龍圖閣直學士以龍圖閣待制司封郎中杜鎬為右諫議大夫充職班在樞密直學士之下仍少退工部侍郎吕文仲吕祐之並為翰林侍讀學士文仲周密兢畏㑹得風疾請告踰百日詔續其俸於是與祐之俱罷轉刑部侍郎集賢院學士祐之純謹長者不喜趨競然備顧問不能有所發明也權三司使丁謂上景德㑹稽録六卷詔奬之以其書付祕閣知雄州李允則言應係屯田皆在緣邊州軍臣自來只移牒制置不獲躬按其安撫都監二員常巡邊郡望令兼屯田事因便檢校從之令環慶路都監二員每嵗一巡緣邊戍寨更迭而往時上封者言環慶諸軍多分屯淮安洪德寨而部署未嘗按視戎事弛慢故也己未于德潤言宜州賊尚據栁州洛容等縣上曰此不能離窟穴枉自棄耳王旦曰賊若逺去則粒食無所仰給馮拯曰人或言其趣交趾臣以謂必不然交趾兵甲非賊比也王師即至臣恐其趨瓊管若趨瓊管則王師亦須持久旦曰凶黨固不能久且茍延晷刻之命耳上又曰象州既被圍猶有封奏而桂州獨無若何邴真善守者即遣內侍史崇貴馳騎至桂州撫問曹利用等仍令攝官入賊招諭正史俞獻卿𫝊曰獻卿為昭州推官遇陳進亂象州守不任事轉運使檄獻卿往佐之及至守謀棄城獻卿曰臨難茍免可乎賊至尚當力擊擊不勝有死而已奈何棄去按真宗謂何邴善守則𫝊蓋稱守不任事恐未必然也獻卿附𫝊又云守以獻卿言故止賊亦不至按象州被圍四十餘日所稱賊亦不至謬妄甚矣𫝊蓋因劉敞墓志今並不取壬戌上對輔臣因言世宗每遣使馳𫝊必限以晷刻有先期而至者皆盤旋於外候時復命不爾罪在不測性雖嚴急而智算雄武當時親征下瀛莫非遇疾班師則克復幽薊矣是月諸路皆言大稔淮蔡間麥斗十錢粳米斛錢二百詔三班御史令本臺悉聽聲譽不稱職者具以名聞九月甲子朔知華州起居舍人張舒與官屬率民錢修孔子廟為民所訟並坐贖金因詔諸州縣文宣王廟自今並官給錢完葺無得輒賦民財詔鎮戎軍有侵耕田土隱落常租者悉蠲之初詔以荒土均給備邊弓箭手仍免地征至是民冇訟其所占踰限及隱沒租賦者乃降是詔庚午三司請令左藏庫出次色金為帶以備賜與上曰朝廷褒寵近臣惜費豈在於此即詔已成者悉鎔之别用上色金改造上以承平既久賦斂至薄軍政用度之外未嘗廣費自奉且以庶僚勤事壬申遂詔自今文武官用俸應折支者並給實錢在京六分在外四分若願給他物者亦聽賜畿縣聖惠方甲戌詔審刑院詳議刑部詳覆大理寺詳斷官自今任滿如書罰四次以上未得考課引對其同簽連署者件析以聞當酌其輕重差降任使內供職無遺曠者嵗滿優與升奬上封者言愚民無知佞佛過當謂捨財可以邀福修供可以減罪蠹害斯甚宜行禁止上曰習俗既久安可遽絶然佛之為教本於修心若能悟理為益滋大又其教尚忍則國君含垢亦其義也國君茍能憂勤政治惠養兆民不必像設自為功德耳丙子詔廣南路提㸃刑獄官許乘𫝊按部若炎瘴之地盛夏許移牒㸃檢至秋乃出巡及太中祥符末轉運使副亦聽準例轉運使副用此例在祥符七年五月陳州宛邱鄆州東阿須城等縣蝗不害稼抱草死丁丑上謂輔臣曰宜州賊聞官軍至桂州勢頗窮蹙可令曹利用等分兵追捕以便宜從事仍降敕榜四十付利用等遣人齎示賊衆及揭於要路冀其悛革歸順免於屠戮己卯詔羣臣家有藏太祖舊實録者悉上史館無得隱匿宰相班位與樞密使參知政事重行上每見王旦班與王欽若等立位太迫謂左右曰殿庭儀石以南頗為隘狹故朝集僅若同行即詔閣門移宰相班位於儀石之北餘立其南上聞京城居民多棄擲米麥食物詔開封府嚴行禁止重置其罪初工部員外郎兼侍御史知雜事王濟受詔較新舊茶法持論與丁謂林特劉承圭等多忤承圭等因與王欽若迭詆訾之辛巳改工部郎中出知杭州上靣加慰諭仍戒以朝廷闕失許密疏上言吳越俗尚華靡濟矯以素質用瓦缶木杓為犒設之具吏民竊哂之濟不為變上初與宰相議擇官王旦曰天下重地為朝廷屏翰者不過一二十州若皆得人則鎮撫有方威惠兼著小冦不能為患上深然之時薛映知杭州嵗滿議擇其代馮拯曰餘杭比諸道易治上曰方靣之寄古諸侯也常時無事則為易治吳人輕巧茍備豫非常安可謂之易也如宜州止因劉永規虐用其下聚為冦剽延及他境若長吏得人豈致是耶因閲班簿指孫僅王濟謂王旦曰二人孰優旦曰濟有吏幹可副是選賊圍象州久不克曹利用等以大軍趨救之甲申與賊遇於武仙縣之李練鋪賊初不之覺已而陳進獨率衆來拒直犯前軍寄班侍禁郭志言麾騎士左右縱擊賊衣順水甲執標牌以進飛矢攢鋒不能却前軍即持㦸刀巨斧破其標牌內侍史崇貴登山大呼曰賊走矣急殺之賊心動衆遂潰逐北至象州城下賊寨猶有據長竿以瞰城中者盧成均始挈其族持敕榜來降遂斬進并其黨生擒賊帥六十餘人斬首級器甲戰馬甚衆利用等遂入象州安撫軍民捕餘冦遣于德潤馳奏其事命户部副使祠部郎中宋摶為契丹國母正旦使供奉官閣門祗候馮若拙副之户部判官殿中丞滕涉為國主生辰使侍禁閣門祗候劉煦副之著作郎直史館陳知微為國主正旦使供奉官閣門祗候王承僎副之及還煦坐輕肆鮮禮免官削兩任煦未詳邑里責在明年四月今并書馮若拙未見陳知微髙郵人王承撰審琦子以四方館使洺州防禦使知同州上官正為左龍武軍大將軍平州防禦使起居舍人知華州張舒守本官並分司西京轉運使言其老疾不任吏事故也乙酉知瓊州李文著上言配𨽻人謀殺官吏為亂已與兵馬監押馬懷玉盡擒戮之詔審官三班院俟文著懷玉到闕日引對李文著馬懷玉未見丙戌張崇貴言趙德明將葬其母詔遣殿直閣門祗候袁瑀致祭瑀至夏州遺忘撫問辭且發言輕易及還坐落職贖金十斤袁瑀未見丁亥邊臣言趙德明謀劫西涼襲回鶻上以六谷甘州久推忠順思撫寧之乃遣使諭斯多特令結回鶻為援並賜斯多特茶藥襲衣金帶及部落物有差斯多特奉表謝詔每嵗冬首以蕃殺羊為賜如聞傷生頗甚自今以八節羊代之戊子詔官吏因公事受賕許為曲法及决遣之際復用常科規避枉法之罪自今證左明白者以枉法論至死者加役流從知審刑院朱巽之請也追諡魏仁浦曰宣懿從其子咸信之請也己丑贈故雍州巡檢使西頭供奉官閣門祗候張守榮如京使初宜州賊攻天河寨守榮率兵討之殺傷甚衆而賊鋒尚鋭因入寨固守賊不能破以功遷秩俄屬疾詔遣國醫馳往療之未至而卒特追贈仍録其子焉庚寅遣使齎詔諭曹利用已下及轉運使長吏使臣軍校等福建巡撫比部員外郎張令圖言福建路諸寨柵巡兵捕得私鬻茶鹽人多分其財物縱初犯人逃逸請自今許徒中反告重置其罪仍以所分財之半沒官餘給告人從之壬辰令中書樞密院檢閲建隆已來行事可書簡冊者送修史院癸巳詔三班院自今命諸州監押巡檢使臣並赴樞密院看驗訖引對
