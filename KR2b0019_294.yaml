body:
  text: 續資治通鑑長編卷二百九十宋李燾撰神宗元豐元年六月癸卯朔日有食之權知邵州侍其瓘言扶竹水山􅍹梁義等願附招納籍為省民𨽻邵陽縣輸丁身錢米詔荆湖南路安撫司問義如不願往湖北即邵州安存之兩紀附年末並稱扶山竹􅍹京東體量安撫黃亷言澶州及京東河北淤官地皆上腴乞募客戶依其土俗私出牛刀官出種子分收選曉田利官兩員詣京東河北計㑹轉運提舉二司及逐縣令佐相度招募客户自今秋營種并下司農寺詳定條約從之令轉運司選官係牧地即令提㸃刑獄司選差甲辰夜東南有光燭地大星出匏瓜裂於內階聲如雷新舊紀並如此書乙巳詔太常博士苗師中供備庫使朱仲立等二十三人各遷一官以與塞決河有勞故也河東經略使韓絳言麟州銀城寨熟户蕃部命資允入西界刺事為戎人所獲其子瑪克密已補十將今資允逃歸乞與近上名目免追瑪克密恩命詔補資允十將瑪克密免追奪詔熙州增築西南外羅城漸置樓櫓凡役兵夫四十四萬以經制財用局言熙州為一路根本漢蕃民居及軍營寺觀並在城外無所障護乞因西南壁舊羅城基增築并女墻髙三丈故也荆湖北路轉運司言交人進奉赴闕慮雇人夫不足乞優估價雇錢差借從之自今經歷路分並凖此潁州團練推官武學教授蔡碩為大理評事展磨勘二年碩供職叙考當遷次等京官以嘗姦雜户故有是命丙午以同知禮院太常丞館閣校勘劉摯為集賢校理詔牧地租課諸路委提㸃刑獄開封府界委提㸃司催納每年秋料限滿次季具納缺數上羣牧司任滿無缺不及二分令本司保明取㫖即及三分以上者並奏劾又詔權都大管勾巡護惠民河楊琰令任滿日再任賜度牒五十琰自陳以夏津縣決河故道為大河塞曹村決口省人功物料錢百餘萬緡又五掃退背減罷使臣五員乞恩故也丁未樞密院言副都承㫖西上閣門使滎州刺史張誠一當磨勘詔誠一係副都承㫖特與轉遙郡團練使餘依舊密記已酉梓州路轉運司言討伐瀘州納溪夷賊已凖詔俟秋初進兵今除首惡未獲外見有獻納器甲降人甚衆若須用兵平蕩即未委如何分别當討捕之人合用錢糧於何處應副作幾軍分路入討詔鈐轄轉運提㸃刑獄司同議利害以聞先是瀘州江安縣納溪寨居民蘇三十七與羅茍夷人目特意爭魚笱誤毆殺之夷訴於寨寨聞於縣縣行檢驗之法夷情忿怨謂漢殺我人官中不肯償我骨價又暴露我夷人尸首呪詛纍日因聚衆入冦瀘州出兵備禦寨將馬仲通素懦棄寨出奔夷人遂乘勢焚掠寨南岸人畜廬屋殆盡轉運使髙秉判官陳之才共奏夷人近嵗畏服不敢犯漢一旦狂悖若此今不治必為後患乞以本路兵問罪朝廷既許之秉之才復具事宜以請乃降是詔納溪用師實録正史俱不詳今取宗安國元豐平蠻録附益之七月二日差韓存寶京東路體量安撫黃亷言本路被水之初乞委監司察災傷縣令不得力者聽於不經水災若事簡縣對移如闕人即於得替待闕人不依常例奏舉及乞申𠡠有司檢計溝河候豐熟令所屬調丁夫濬治梁山張澤兩濼纍嵗填淤浸民田亦乞自下流浚至濵州從之開濬溝河令都水監遣官同轉運司檢視工料亷受命安撫京東在熙寧十年八月九日詔河北路轉運司昨發塞決河急夫候發春夫計日折免更蠲五分辛亥詔提舉茶場司于闐進奉使人買茶與免稅於嵗額錢內除之癸丑以前權發遣荆湖北路轉運副使太子中允集賢校理徐禧同知諫院兼管勾國子監同提舉成都府等路茶場蒲宗閔言乞依李稷劾官吏詔宗閔與理轉運判官資序所舉京官縣令及使臣升陟比稷所舉人三分之聽舉其一分其州縣官吏於茶場司職務有違亦許案劾詔武學上舍生在學一年不犯第二等過委主判同學官保明免解從上毋過二人內於貢舉法自應免解及已該免解後更又在學二年以上無殿罰免閣試案此條文義未明疑有脫誤甲寅命輔臣祈雨知鎮戎軍張守約言張義堡四面受敵易攻難守堡南一里有舊堡三面臨崖城兩重皆不受敵乞存新堡外更修葺舊堡移置倉草場及見任監押令管勾上下兩城兵馬煙火遷廨舍於舊堡從之乙卯上批靈平掃役兵冒暑工作極為勞苦賜特支錢有差又批修河所減放役兵多道死者深可憫惻宜指揮專委逐路提㸃刑獄官一員㸃檢催督早令達住營州軍丙辰詔提舉官自今與轉運判官以資任相壓同者序官其添給當直接送人船遞馬兵士並依轉運判官例經制財用司言熙河路弓箭手昨凖朝㫖四人同治官莊一頃頗聞困于役使致闕二千人欲罷四人治田指揮惟收成時聽暫應副外餘毋得役使兼秦鳯路轉運司綱運所兵級已詔𨽻本司乞勘㑹元額下陜西轉運司簡廂軍投換以充治田如不足益以選中保寧兵從之七月一日十月二十七日上批聞近畿路有苦雨處令轉運司委長吏禱名山靈祠及令開封界提㸃司督諸縣開畎積水具退出民田次第以聞京東西路州軍委轉運司施行丁巳權都水監丞趙子淵言乞於泛水鎮北門𨗳洛水入於汴為清汴通漕以省開閉汴口功費詔候來年取㫖十二月六日可考己未詔都水監應河掃物料於合應副路轉運及開封府界提㸃司取三年中一中數為額委逐司管認應副錢物關本監計置庚申著作佐郎直集賢院范育為太子中允檢詳樞密院兵房文字殿前都指揮使安武節度使郝質卒車駕臨奠贈侍中諡武莊辛酉詔滄州清池莫州任邱霸州文安大城秦州成紀隴城清水延州膚施延長延川慶州安化合水全州清湘灌陽邵州邵陽武岡澧州石門慈利十八縣自今委三班院選差使臣為尉其舊係使臣監當闕送流內銓差注詔殿中丞陳安民追一官勒停展三朞叙太常博士吳安持追一官免勒停衝替前檢正中書刑房公事劉奉世落直史館免勒停監陳州糧料院詳斷官竇蘋追一官勒停詳議官周孝恭大理評事文及甫並衝替安民嘗官相州坐與失入馮言死罪屬及甫言於宰相吳充安持坐令及甫屬以諭奉世奉世坐諭法官令指定不須作失入蘋孝恭坐定為非失入其牽連得罪者又數十人充釋不問周清遷一官初蔡確勘是獄欲煆鍊以傾充既為中丞遂收繫及甫及甫懼即如安民前欵稱嘗白充充諾之且稱嘗屬充子安持確又收奉世奉世先為樞密院檢詳充自樞密使拜相奏奉世檢正中書充雅信重之確令大理官吏稱受奉世風指欲出安民罪奉世懼亦稱於起居日嘗受安持屬確又欲收安持詔苐令即訊安持恐被收亦稱實屬奉世時三司使李承之户部副使韓忠彥皆上所厚忠彥琦子而承之嘗為都檢正確皆令囚引之承之知之數為上言確險陂之情上意稍解趣使結正於是獄成忠彥猶坐贖銅十斤充上表乞罷相及闔門待罪者三四上趣遣中使召出令視事確屢率言事官登對言罪安持太輕上曰子弟為親識請託不得已而應之此亦常事何足深罪卿輩但欲共攻吳充去之此何意也以確所彈奏劄還之言者乃已墨本云獄成人以為寃朱本削去今詳述其事則寃狀自見矣癸亥馬軍副都指揮使昭信軍留後賈逵為殿前副都指揮使建武節度使舊紀書此詔應內外臣僚昨舉才行堪升擢官令中書審察人才取㫖甲子同提舉成都府等路茶場蒲宗閔言本司元依客例買解鹽入川變轉茶本不禁私販後劉佐𣙜賣遂致人言及因解鹽司申陳盡從廢罷伏詳朝廷止絶本司賣鹽之意慮妨商賈而害鈔緣解鹽法弊在出鈔過多乞除劉佐𣙜法不行外許依舊施行詔李稷相度以聞乙丑李稷乞定成都府利州路茶場鹽官買茶無雜僞粗惡替罷委提舉官保明滿五千馱與第五等酬一萬馱與第四等每一萬馱第加一等若買粗惡僞濫雜茶估剝計所虧坐贓論同監官賞罰聽減一等即徒罪不至追官者並衝替其賣買食茶依收息給賞從之上批河東路置備兩九軍兵仗近韓絳纍奏有申明陳乞事如有未報可者可趣行下丙寅命太子中允祕閣校理同知諫院徐禧計議環慶等路措置邊防事七月十九日辛卯明年三月十四日癸未十七日丙戍可考詔應教閲軍員有能部轄及曽經驅䇿幹辦各有膽略堪統領陳隊者委管軍臣僚及路分總管鈐轄都監及州總管鈐轄將副各嵗舉樞密院類聚注籍遇須人才任使以被舉重者取㫖録用知將作監主簿王古言去嵗詔講復義倉試於畿邑已不擾而可行欲乞於豐稔路委提舉司勘㑹省稅常平免役等錢穀缺閣共不及三分處先推行庶幾數年之間即見成效詔京東京西淮南河東陜西路依開封府界諸縣行義倉法餘依奏仍以今年秋料為始本志云將作監主簿王古言義倉之法試於畿邑已見不擾請下提舉司視諸路稅役錢缺閣不及三分者先推行之乃詔京東西河東陜西淮南路立義倉如畿縣法八月八日己酉所載路分先後不同當考詔京東東路民訴方田定驗肥瘠未實處並先擇詞訟最多一縣據名色等第酌中立稅候了日無赴訴即案以次縣施行七月九日丁卯荆湖北路轉運司言沅州屯田務自初興至今所收未嘗敷額若募人租種納課不費官本利害甚明乞朝廷詳酌施行及令本州通判管勾月糧給食錢從之委轉運判官馬珹提舉熙寧七年四月十九日初置沅州元豐二月七月二十一日罷屯田務詔諸路都作院委樞密院選差本路提㸃刑獄官一員提舉㸃檢戊辰鄜延經略使吕惠卿言宥州牒稱麟府二州邊人侵耕生地乞降回宥州牒本詔管勾麟府路軍馬髙遵一等驗定西人所爭地界舊曽與不曽開耕係與不係兩不耕地速保明以聞庚午分命輔臣祈晴于郊廟社稷著作佐郎何正臣為太子中允權監察御史裏行正臣新淦人也辛未權發遣福建路轉運使屯田郎中直史館寋周輔并提舉本路鹽事先是周輔言奉詔相度鹽事欲令上四州募人充鋪戶官給印厯請鹽分賣減其價直移南臺倉於水口鎮增巡防兵選捕察之官私販者交易引致停藏負載之人不以赦前後三犯杖皆編管鄰州已編管而再犯者配本城禁其般運雜和之弊嚴保伍捕告之法從之周輔奉詔相度在熙寧十年八月二十九日食貨志熙寧十年福建盜廖恩聚黨掠州縣恩既平御史中丞鄧潤甫言閩粵山林險阻連亘數千里無賴姦民比他路為多大抵盜販鹽耳恩平遂不為備安知無躡恩之迹而起者乃詔福建路寋周輔度利害以聞周輔言建劒汀州邵武軍官賣鹽價苦髙漳泉福州興化軍煮鹽價賤故多盜販賣於貴處異時建州嘗計民産賦錢買鹽而民憚求有司徒出錢或不得鹽今請罷去頗減建劒汀邵武軍鹽價募上户為鋪户官給劵定月所賣從官場買之如是則民易得鹽盜販不能規厚利又稍興復舊倉選吏增兵立法若盜販知情囊槖之者不以赦三犯杖編管鄰州已編管復犯杖配犯處本城皆行之嵗增賣二十三萬餘斤而鹽官數外售者不與焉元豐三年賈青云云具本年前國子博士陳士儒毆婢婢逃且告士儒及其妻李與羣婢共害其母張詔開封府鞫之士儒執中子也據吕公著家𫝊士儒獄是月就開封府鞫明年正月己卯改送法寺復鄧州方城鎮為縣𨽻唐州置南平軍南川縣割通逺軍濟揚堡𨽻岷州此據實録八月又書復方城縣誤也舊紀但書置南川縣割濟楊堡事密記二十六日所載甚詳秋七月癸酉朔主客郎中鄭民憲特升兩任以民憲前任經畫熙河路營田等有勞也五月九日六月十四日十月二十七日手詔御史臺有定奪刑名及承詔治獄皆有司所不能决者丞屬須得人乃以弼佐官長副朝廷欽恤之政其推直官虞肇馮如晦年齒衰遲資性疲耎不足稱辦職事可並送審官東院令本臺舉官以聞虞肇見四月二日相州獄詳定禮文所乞罷南郊壇天皇大帝設位詔弗許又言古者帝牛必在滌三月所以致其嚴潔通誠於神明也今既無滌宫繫養之法每於祭前三月市於民而有司滌養不嚴一切茍簡欲下將作度修滌宫具繫養之法飭所屬官司省視委太常寺主簿一員閲察從之兩紀並書立南郊滌宫又言古之祭祀必具五齊三酒今樽罍一以法酒實之是名物徒存而亡其實也謹案鄭氏釋五齊三酒各有名色尋呼酒工諭以大略工人稱可以約古醖造乞送所屬施行詔止令法酒庫內酒坊以見造諸酒實之二年八月戊午改酒齊法甲戌詔以西上閣門使忠州團練使涇原路總管韓存寶都大經制瀘州納溪夷賊公事仍於渭州及涇原路選下畨土兵五千內馬軍一千及差經戰鬭使臣二十員隨行務在殄滅自來倔彊村囤俟賊衆痛懲剪戮憺威丐命即許自新如有軍馬未集以前請降村囤即令㸃集强壯自備器仗隨大軍討賊或勾集不從即除老小婦女外盡殺之應本路兵馬並聽存寶節制其糧草錢帛委髙秉程之才隨軍計置不得預軍事秉之才奏請具六月六日其提㸃刑獄穆珣令歸本司如韓存寶未到但嚴設隄備毋得輕易出兵先是珣言納溪寨去瀘州才三十里而羅茍村夷賊在寨之西南不及五里八姓五十餘村夷族千户內近漢之地稍平於進兵為易其後則林箐深阻難以嚮邇皇祐中嘗出驚劫殺傷官兵跳梁踰年乃乞打誓今又託事起端燔燒民舍輕侮官軍乍出乍沒以伺邊隙昨雖時有夷人乞降然夷情狡獪未可取信邊人驚惑未敢復業近凖諸處關報朝㫖令招安將婉順開諭夷人以見收捕蘇三七根究施行毋得復為寇此見陛下聖度包荒文德柔逺天地大仁不較蚊虻之毒而愛念元元至深至厚也然而醜類凶悍不識恩信輒復烏合蟻聚侵逼納溪鎖水若不加誅以絶後患則烏蠻生界觀望為害不細臣愚欲望出自宸斷遣親信之臣授以睿算俾専處置行營軍事而轉運鈐轄同經制仍於陜西路就近差神虎保捷等五七指揮以備呼使然後極其巢穴殱厥種類據險要以立堡寨籍保伍以教耕戰使被邊諸夷竭蹶聽命而烏蠻逺徼聞之莫不破膽誠為上䇿時梓夔路鈐轄王光祖先統所部兵屯瀘州亦奏乞陜西兵故以命存寶新舊紀并書存寶經制納溪夷十月辛亥十一月甲申奏功知沅州東西閣門副使謝麟為引進副使辰州都監西京左藏庫副使孫懷用為文思副使以斬捕猺賊及受徭賊丁先鋒等納木契投降有勞轉運判官馬珹保明以聞故也於是珹亦降𠡠書奬諭賜銀絹各五十使臣以下轉官減磨勘年選人循資軍士土丁轉資賜銀絹各有差陳亡仍支孝贈命官軍員與其子恩澤防拓土丁賜錢存恤其家三月辛丑四月辛酉五月巳丑皆合參照丁丑開封府言定奪昭憲皇太后家大禮恩澤當自長子審琦直下子孫仲容始詔杜仲容與三班借職自今大禮推恩凖此以如京使權廣西鈐轄張之諫為熙河路鈐轄以之諫自陳母老久病在甘谷城無供侍乞移陜西故也尋差知順州上批聞蜀中用兵多無賴不逞舉人干請將官以求效用妄希功賞令轉運司及韓存寶毋得以一人往詔三班奉職劉富特轉右班殿直初客省申富齎詔賜真臘國王及管押本國貢物上京中書初未嘗擬賞而令客省發歸本路上批昨朝廷以交蠻犯順令廣州選募富往真臘國宣諭聞往來海上亦頗勤勞可量與酬賞候有保明至别取㫖至廣東經略等奏至故有是命詳定禮文所言舊南郊式車駕出入宣德門太廟櫺星門朱雀門南薰門皆勘箭熙寧中因參知政事王圭議已罷勘箭而勘契之式尚存春秋之義不敢以所不信而加之尊者雷動天行無容疑二必使誰何而後過門不應典禮考詳事始不見於開寶禮咸平中初載於儀注蓋當時禮官之失伏請自今車駕出門罷勘契從之詔奪新授西京左藏庫副使楊中廣轉官𠡠告初中廣以管勾隄堰部役遷官至是知其部役河上多以疾在告不當預賞故也其都大提舉修河燕達等保明不當特釋之又詔開封府國子監舉人並通取解額併試其諸州不滿百人者委轉運司取近便州各用本處解額就一州考試庚辰詔前福建轉運副使職方郎中徐億追一官免勒停今致仕前知福州司封郎中直龍圖閣元積中落職駐泊陳德用巡檢張永等八人並追一官衝替免勒停坐廖恩驚劫措置乖失及不襲捕故也環慶路經略司乞以本司及常平錢帛乘秋成廣糴如將來别無支用即依糴價兑與轉運司從之辛巳命西上閣門副使張山甫入內東頭供奉勾當內東門司馮宗道同案閲京東西將下馬步諸軍武藝以上批依開封府界例特差故也詔永興軍等路提舉司據未經方田均稅縣分并已經方田因民被訴曽差官定奪委實不均縣分如夏熟秋苗滋茂可見豐稔次第即一面依方量均稅條差官體量訖前期一月申中書取㫖六月二十四日又詔故西天譯經三藏鴻臚卿日成賜諡曰闡教仍依法護例遺恩度僧七人惠辨院嵗增度僧一人詔自今諸寺監丞差通判以上資序人如係知縣人即充主簿權發遣丞事上批鄜延路新團諸將及分定守禦堡寨所關器甲什物係軍器監轉運司應副者宜指揮自經略司申牒到限半年內應副癸未判司農寺蔡確請令三局丞主簿不妨職事兼刪修本寺條例從之詔河東陜西經略司指揮緣邊城寨探刺夏人過設備豫以上批秉常始親國事今秋㸃集甚嚴又鄜延麟府界間有遊騎出沒羌情難測戰守之具宜早有分畫故也詔鎮安軍節度推官知澶州衛南縣李夷白循一資以靈平掃闕草夷白市十餘萬束應用都水監乞優與推恩中書擬理為勞績而上批夷白所買草數不足多賞然聞濟一時急用實為有功可特循資甲申詔諸路轉運司就廨舍所在州置斗稱務委都監管轄依省樣造作别差官較定分送諸州商稅務賣之如買出輒增減及私造行用者各杖一百贈皇城使路慶孫妻霍乞追減長子志明一官與壻鍾敏詔以慶孫死事許追志明左班殿直與敏三班差使乙酉詔諸路轉運及開封府界提㸃司樁管闕額禁軍請受令逐司更不問見管兵數有無少剩止據元額月給錢糧委提㸃刑獄及府界提舉司拘收於所在分别樁管其見銷減未盡合廢兵級即復於上件錢糧內支破嵗終具數申樞密院巳丑命樞密直學士提舉中太一宫孫永監修删潤齊醮科儀知河陽兵部郎中集賢院學士鄧綰為龍圖閣待制知荆南庚寅知禮院大理寺丞集賢校理曽肇兼修國史院編修官肇奏臣史學不如臣兄鞏乞回所授不聽詔三司勘㑹江南西路轉運司如去年糧綱起發已辦宜免折變現錢外仍下發運司具析於六路敷錢不均及併差官在江南西路剗刷因依以聞初有㫖聽發運司據逐路未運糧百萬石折變見錢而江西轉運司訴以年額轉漕已足兼朝㫖令於六路均折變而發運司乃獨敷本路以六十萬石又别遣官起本路見錢靡有孑遺違編敕量留凖備糴置三年芻糧之法故有是詔究竟何如又詔廣西提舉司應桂昭賔象梧藤龔潯貴橫等州昨運糧充夫之家第一第二等以上更放一料役錢二分第三等放一料五分第四第五等以下全放兩料辛卯詔自今武臣遙郡以上乞分司如歷任不因戰功轉官及不曽任管軍及橫行並除南班官分司詔澶定州大名府封樁草計置久未畢可令大名府通判馬獻卿澶州通判梁彥明定州通判楊景芬計㑹元計置官以未足數及時糴買仍令逐路安撫司催促其元差勾當官並罷又詔昨吕惠卿重分畫鄜延將兵條約等並已施行今差徐禧往環慶路分畫將兵令與逐路經略司依詳鄜延路所定條約措置如內有事理不同及别與惠卿計議事件即具奏聞仍劄與逐路照㑹六月丙寅遣禧二年三月癸未丙戌可考又詔張山甫就便往亳州按閲見團結訓練諸軍甲午管勾外都水監丞殿中丞耿琬兼提舉河北淤田水利司仍自今罷置淤田一司墨本云自今淤田一司罷置同管勾官今從朱本詔麟州星最朗木瓜鋪自熙寧八年以後所耕闢生地令麟府路軍馬司指揮自今留兩不耕地西人巡馬悉令依舊處過往并劄下河東路經略司照㑹仍候西界再問止作本司已如此施行回牒乙未詔近差京西南路提㸃刑獄張復禮督捕蔡州界强賊今合諸處兵已多深慮統制不一各務顧避遷延致凶黨轉更結集驚擾州縣宜令復禮毋得止在州縣行遣文字可速糾率諸處兵甲不以逺近襲捕須令日近全火敗獲其如軍校有不用命即行軍法命官械繫聽㫖仍應干捉賊事並聽復禮指揮丙申詔張山甫等案閲京東京西將兵其隨行應合用弓弩可依殿前呈試斗力打硾弓以分靶為滿弩三石者加五斗三石五斗加七斗令山甫等親掌之毋得下司上批諸路分樁闕額禁軍請受可令樞密承㫖司専差吏簿録其逐路輒支用者論如擅支封樁錢帛法詔樞密院引見御龍直出職將虞候三人當補神衛都頭以嘗執從物祗應特補天武都頭仍指揮自今應執從物人以人材武藝兼選丁酉詔自今諸酬奬第一等京朝官大小使臣轉一官選人判司主簿尉五考初等職官知令録四考兩使職官令録三考支掌防團節察判官并因軍功捕盜不限考第並轉合入京朝官不及以上資考者循兩資第二等減磨勘三年選人循一資與堂除差遣一次軍功捕盜轉次等合入京朝官第三等減磨勘二年選人循一資第四等免逺免短使免試無可免者各與升一年名次第五等各升半年該兩次已上酬奬者與併賞併升願留後任收使聽江浙等路提㸃坑冶鑄錢公事錢昌武言潭州瀏陽縣永興銀場自去年銀銅興發乞下諸路轉運司應副本司收買銅銀增鑄錢從之仍借支湖南上供錢十萬緡候所鑄錢撥還及令司農寺於認還內藏庫嵗額錢內支那十萬緡専置銀赴京御史黃亷言前嵗科場逐經發解人數不均如别試所治詩者十取四五治書者才及其一雖糊名考校務取實藝然學者務受經業不容優劣相逺如此乞自今於逐經內各取人分數所貴均收所長以専士習詔自今在京發解并南省考試詩易各取三分周禮禮記通取二分又言國子監生員著述論議盡得講官緒餘將來逐官例差考試竊恐去取之際或未能判然無疑雖未必私徇以亂名實其如參校所長多就已見此蓋人情所不能免如此則外方疏逺之人偶不相合遂致黜落甚非朝廷兼收博采之意臣愚欲乞將來止選近嵗一科人為試官或差近郡教授詔候差官日取㫖提㸃在京倉場所言在京諸倉有名額重纍者乞改易其延匹永濟廣子各第一倉依舊名外欲以延口第二為元豐倉永濟第二為永豐倉廣積南倉為大盈倉廣濟稅倉為廣阜倉從之按延匹延口廣子廣積廣濟倉名前後互異當有訛誤詔昨西蕃董戩遣首領朝貢忠欵可嘉宜差供奉官郭英齎詔慰諭及賜對衣金帶銀器衣著各三百匹兩令熙河路經略司依治平二年差使臣賜􅎁告例經略司更送大細法錦五匹大綵五十匹細末茶散茶各五十斤京西第六將言將官李延遇選募兵五百赴唐州桐柏等縣捕賊上批將官捕盜募兵自隨初無明條乃是延遇憚賊怯懦滋大事勢不惟不足彈治士卒𫝊聞四方亦足起侮宜特衝替詔京西遭劫賊殺死保甲人丁及弓手等可檢例與存恤并勘㑹諸捕盜并救助之人輕重傷依條支賜三司言今具熙寧十年終在京及府界樁管闕額禁軍請給數目乞免封樁詔在京特依奏丙申日上批可并此已亥命權發遣河北轉運判官殿中丞髙鎛詣濵棣州界風雨損城壁及害苗稼處照管仍令京東轉運司案齊州章邱縣官吏如不預備救護致民被水衝注為患即劾罪以聞庚子以右諫議大夫集賢殿修撰張景憲知河陽景憲還自瀛洲為上言比年多凶歉百姓積逋負今嵗才小登州縣督趣併償道路流言謂其害甚於凶嵗願少寬假以紓元元上可之下其奏有司時西南蠻犯邊朝廷方出師景憲言聖人以天下為度於四夷何所不容今小醜跳梁殆邊吏擾之耳且其巢穴險逺若進兵窮討萬一糧餉不繼則坐困我師邇人先受其弊上曰卿言是也然朝廷有不得已者景憲二事朱本止存諫出師正史削去今並存之初澶州決河復塞吕公著奏疏曰臣伏見昨來澶州曹村掃決潰全河衝注山東聖心惻然即議閉塞奮自獨斷出於羣疑功未踰時而有成患不閲嵗而尋弭雖上下竭力遂致澄清實由陛下至誠憂民愛物之心天相神助殆非人力以此見天道聰明日監在下棐忱輔德遄應不遲為人上者可不欽畏恭惟陛下聖德仁厚出自天性臨下御衆有日月之明天地之量誠非凡庶庸妄所能臆度以至近日數起詔獄逮繫頗衆有司極於煆鍊羣下無不震恐比至臨決多從末減昔于公一郡之獄吏耳猶以隂德有報光大子孫况以萬乘之尊六合之廣布德施恩固宜受福無疆施及萬世然臣願陛下雖性得之猶復加聖心焉上奉天下接人加精致誠執要行簡道髙百王而謙以自牧學貫六藝而虗以受人雖威肅羣品不得謂下絶欺誣雖智燭輿情不得謂事無壅蔽親正士拒壬人必有忍以濟事功惟內恕以及人物于以崇起忠厚保合太和則易所謂自天祐之吉無不利詩所謂干祿百福子孫千億者蓋將以類而應臣以無狀獲備近列竊慕古人將美盡規之義惟陛下財幸是月公著入對上迎謂曰覽卿所奏深得近臣盡規之義時獄犴寖蕃而上繼嗣未廣公著辭順而意切故上深納焉公著因面奏宜增館閣之選曰臣聞濟濟多士文王以寧方周之興至於置之人有可以當腹心干城之任者今三館祕閣之職乃朝廷之華選前世以來將相名臣多出其間得人之盛難以遽數臣在皇祐至和中備員館閣當時同輩後亦往往至通顯比年雖有簡拔其數不多其中或以勞進者又皆外補朝廷平日難於收採緩急必乏使令以至近者遣使髙麗頗煩聖擇古人有言士不素養無以重國臨事倉卒乃求非以尊朝廷也臣竊以為天下未嘗乏才也求之而後至用之而後知耳臣愚願陛下考合庶言斷自聖見更得雋偉之士疏通之才稍增館閣之選平日足以優游飭厲緩急惟所用之以重朝廷又論宜寬縣令之制曰臣伏乞審官院流內銓以知縣縣令闕多凡選人被舉充職官及轉京官者例差知縣已被差者不通舉辟不得避免臣竊以為當國家有道之時付之以百里之地有民人社稷之重則士子所宜願為今乃設一切之令强所不欲與坐殿負犯者亡異此殆郡縣法網太密而勸别之道不明吏有盡心奉法治行明白者未聞有所褒異一罹微文則不能自免於譴斥加以近嵗朝廷更改法度郡縣之吏或不能奉行故於常法之外峻其黜典經赦去官多不原免積纍嵗月坐此殿纍者益衆臣愚以為長吏之官朝廷宜少寬假非有贓私顯狀及罷軟尤不勝任者雖屬小法無輕替易仍詔諸路監司牧守其所屬令長有奉公愛民治效尤異者每嵗别薦三二人間或奬拔待以不次其次如職事修舉有舉主合轉京官者特與依諸州教授例就任改官許令再任如此則勤亷者得以自保勞能者有所激勸中才足以强勉異效不致滯留上深以為然即詔中書立法而法竟不就
