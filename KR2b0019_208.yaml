body:
  text: 續資治通鑑長編卷二百四宋李燾撰英宗治平二年春正月丁卯詔夏國主諒祚自今涇原秦鳯路熟户及弓箭手地分不可更行侵擾始朝廷遣王無忌齎詔責諒祚諒祚遷延弗受詔而因其賀正使哩穆先附表自言起兵之由歸罪於我邊吏辭多非實故復以詔戒諭焉諒祚終勿聽編排中書諸房文字屯田員外郎王廣淵直集賢院上在藩邸廣淵因上左右時君卿獻其所為文及書札上愛其才故特命以此知諫院司馬光言廣淵雖薄有文藝其餘更無所長於士大夫間好奔競善進取稱為第一嚮以初任通判排編中書文字二年之間堂除知舒州薦紳已相與指目為僥幸今既留不行又驟加美職安得不取外朝怪惑陛下方蒞政之初欲簡拔天下賢材置諸不次之位以率厲羣臣而執事之臣不能稱陛下意前此用皮公弼權發遣三司判官今又用廣淵直集賢院將何以使天下之人尚亷耻之節崇敦厚之風乎若陛下龍潛之時廣淵果曽以文章自達於左右此尤不可漢衛綰不從太子飲景帝即位寵待綰過於他臣周張以錢榖私假世宗而世宗終薄其為人廣淵若當仁宗之世私以文章獻於陛下為臣忠謹者肯如是乎陛下今日當治其罪而又賞之將何以厲人臣之節也光凡再論列訖不報癸酉參知政事歐陽修言諒祚猖狂漸違誓約朝廷禦備之計先在擇人而自慶厯罷兵以來當時經用舊人唯户部侍郎致仕孫沔尚在沔守環慶養練士卒招撫蕃部恩信著於一方今雖七十聞其心力不衰飛鷹走馬尚如平日雖中間曽以罪廢棄瑕收使政是用人之術欲乞朝廷察訪特加奬用庶於人才難得之時可備一方之寄詔以沔為資政殿學士知河中府修嘗奏西邊事冝曰臣伏見諒祚狂僭釁隙已多不越嵗必為邊患臣本庸昏不逹時機輒以外料敵情內量事勢鑒往年已驗之失思今日可用之謀雖兵不先言俟見形而應變然而因敵制勝亦大計之可圖謹具條陳庶禆萬一臣所謂外料敵情者諒祚世有夏州自彛興克睿以前止於一鎮五州而已太宗皇帝時繼捧繼遷為邊患其後遂陷靈鹽盡有朔方之地蓋自淳化咸平用兵十有餘年既不能剪滅遂務招懷適會繼遷為博囉齊所殺其子德明乃議歸欵而我惟以恩信復其王封嵗時俸賜極于優厚德明既無南顧之憂而其子元昊亦壯遂併力西攻輝和爾拓地千餘里德明既死地大兵强元昊遂復背叛國家自寶元慶厯以後一方用兵天下騷動國虛民敝如此數年元昊知我有厭兵之患遂復議和而國家待之恩禮又異於前矣號為國主僅得其稱臣嵗豫之物百倍德明之時半於契丹之數今者諒祚雖曰狂童然而習見其家世所為蓋繼遷一叛而復王封元昊再叛而為國主今若又叛其志可知是其欲自比契丹抗衡中國以為鼎峙之勢爾此臣竊料敵情在於此也夫所謂內量事勢者蓋以慶厯用兵之時視方今邊備較彼我之虛實强弱以見勝敗之形也自真宗景德二年盟於澶淵明年始納西夏之欵遂務休兵至寶元初元昊擾叛蓋三十餘年矣上下安於無事武備廢而不修廟堂無謀臣邊鄙無勇將將愚不識干戈兵驕不知戰陳器械朽腐城郭隳頺而元昊勇鷙桀黠其包蓄姦謀欲窺中國者纍年矣而我方恬然不以為慮待其謀成兵具一日反書來上然後茫然不知所措中外震駭舉動倉皇所以用兵之初有敗而無勝也既而朝廷用韓琦范仲淹等付以西事極力經營而勇夫鋭將亦因戰陳稍習此數年之間人謀漸得武備漸修似可枝梧矣然而天下已困所以屈意忍耻復與之和此慶厯之事爾今則不然方今甲兵雖未精利不若往年之腐朽也城壘粗常完葺不若往年之隳頺也土兵蕃落增添訓練不若往年寡弱之驕軍也大小將校曽經戰陳者往往尚在不若往年魏昭炳夏隨之徒綺紈子弟也一二執政之臣皆當時宣力者其留心西事熟矣不若往年大臣茫然不知所措者也蓋往年以不知邊事之謀臣馭不識干戈之將用驕兵執朽器以當桀黠新興之敵此所以敗也方今謀臣武將城壘器械不類往年而諒祚狂童不及元昊逺甚往年忽而不思今幸已先覺可以早為之備茍其不叛則已若其果叛未必不為中國利也臣謂可因此時雪前恥收後功但顧人謀何如爾若上憑陛下神威睿算係纍諒祚君臣獻於廟社此其上也其次逐狂敵於黃河之北以復朔方故地最下盡取山界奪其險而我守之以永絶邊患此臣內量事勢謂或如此臣所謂鑒往年已驗之失者其小失非一不可悉數臣請言其大者夫敵情變詐兵交陳合彼佯敗以為誘我貪利而追之或不虞橫出而為其所邀或進陷死地而困於束手此前日屢敗之戒今明習兵戰者亦能知之此雖小事亦不可忽所謂大計之謬者攻守之䇿皆失爾臣視慶厯禦邊之備東起麟府西盡秦隴地長二千餘里分為路者五而分為州為軍者二十有四而軍州分為寨為堡為城者又幾二百皆須列兵而守之故吾兵雖衆不得不分所分既多不得不寡而賊之出也常舉其國衆合聚為一而來是吾兵雖多分之為寡彼衆雖寡聚之為多以彼之多擊吾之寡不得不敗也此城寨之法既不足自守矣而五路大將所謂戰兵者分在二十四州軍欲合而出則懼復空而無備欲各留守備而合其餘則數少不足以出攻此當時所以用兵纍年終不能一出者以此也夫進不能出攻退不能自守是謂攻守皆無䇿者往年已驗之失也臣所謂今日可用之謀者在定出攻之計爾必用先發制人之術乃可以取勝也蓋列兵分地而守敵得時出而撓於其間使我處處為備常如敵至師老糧匱我勞彼佚昔周世宗以此䇿困李景於淮南昨元昊亦用此䇿以困我之西鄙夫兵分備寡兵家之大害也其害常在我以逸待勞兵家之大利也其利常在彼所以往年賊常得志今誠能反其事而移我所害者豫敵奪敵所利者在我則我當先為出攻之計使彼疲於守禦則我亦得志凡出攻之兵勿為大舉我每一出彼必呼集而來拒彼集於東則别出其西我歸彼散則我復出而又集我以五路之兵畨休出入使其一國之衆聚散奔走無時暫停則彼無不受其困矣此臣所謂方今可用之謀也蓋往年之失在守方今之利在攻昔至道中亦嘗五路出攻矣當時將相為謀不審蓋欲攻桀黠方强之國不先以謀困之而直為一戰必取之計大舉深入所以不能成功也夫用兵至難事也故謀既審矣則其發也必果故能動而有成功也凡用兵之形勢有可先知者有不可先言者臣願陛下遣一重臣出而巡撫遍見諸將與熟圖之以定大計凡山川道里蕃漢步騎出入所宜可先知者悉圖上方略其餘不可先言付之將卒使其見形應變因敵制勝至於諒祚之所為宜少屈意含容而曲就之既以驕其心亦少緩其事以待吾之為備而且嚴戒五路訓兵選將利器甲蓄資糧常具軍行之計待其反書朝奏則王師暮出以駭其心而奪其氣使其枝梧不暇則勝勢在我矣往年議者亦欲招輯橫山蕃部謀取山界之地然臣謂必欲招之亦須先藉勝健之威使其知中國之强則方肯來附也由是言之亦以出攻為利矣凡臣之所言者大略如此然臣足未常踐邊陲目未嘗識戰陳以一儒生偏見之言誠知未可必用直以方當陛下勞心西事廣詢衆議之時思竭愚慮備芻蕘之一說耳又言臣近曽上言諒祚為邊患朝廷早宜圖禦備及遣一重臣親與邊將議定攻守大計等事至今多日未䝉降出施行臣竊見慶厯中元昊作過時朝廷輕敵玩冦無素定之謀每遇邊奏急來則上下惶恐倉卒指揮既多不中事機所以落賊姦便敗軍殺將可謂痛心今者諒祚以二十萬兵冦秦渭兩路虜掠焚燒數百里間掃蕩俱盡而兩路將帥不敢出一人一騎則國威固已挫矣諒祚負恩背德如此陛下未能發兵誅討但遣使者齎詔書賜之又拒而不納使者羞愧俯首懷詔而回則大國不勝其辱矣當陛下臨御之初遭此狂童威沮國辱此臣等之罪也臣謂陛下冝赫然發憤以邊事切責大臣至於山川形勢有利有不利士卒勇怯孰可用孰不可用何處宜攻何處宜守何兵宜屯某地何將可付某兵如此等事甚多皆陛下聖慮所宜及者臣謂陛下宜因閒時御便殿召當職之臣使按圖指畫各陳所見陛下可以不下席而盡在目前然後制以神機睿略責將相以成功而陛下以萬幾之繁既未及此兩府之臣如臣等日所進呈又皆常程公事亦未嘗聚首合謀講定大計外則四路邊臣自賊馬過後亦不聞别有擘畫臣恐上下因循又如慶厯之初矣近者韓琦曽將慶厯中議山界文字進呈此邊事百端中一端爾蓋琦亦患事未講求假此文字為題目以牽合衆人之論爾自進呈後尋送密院至今多日亦未曽擬臣以非才陛下任之政府便是國之謀臣若其謀慮淺近所言狂妄自可黜去不疑臣昨因目疾懇求解職曲䝉聖意未許其去既使在其位又棄其言而不問使臣尸祿之厚顔何以自處所有臣前來所上奏狀欲望降付中書密院與韓琦山界文字一處商量若其言果不足取棄之未晚禮院奏請自今文武臣薨卒當輟朝者皆輟聞之明日從之丁丑案原本作辛丑誤賜許蔡州見錢鈔十萬貫令和米以救饑人仍命駕部員外郎李希逸提舉壬午命供備庫副使孟淵等十九人往開封府界及京東西淮南路募兵去年九月己卯初募開封府界及京東西淮南饑民少壯者為廂禁軍司馬光言近聞朝廷於在京及諸路廣招禁軍其災傷之處又招饑民以充廂軍臣愚以為國家從來患在兵不精不患不多夫兵少而精衣糧易供公私充足一人可以當十遇敵必能取勝兵多而不精則衣糧難贍公私困匱十人不足當一遇敵必致敗亡此利害之明如白黑不為難知也是以太祖皇帝之時天下兵數不及當今十分之一而猶日加選練簡去羸老専於精鋭故能征伐四方混一區夏景德以來中國既以金帛綏懷外蕃不事征討至今六十餘年是冝官有餘積民有餘財而府庫殫竭倉廩空虛水旱小愆流殍滿野其故何哉豈非邊鄙雖安而冗兵益多之所致乎此乃天下所共知非臣一人之私言也慶厯中趙元昊叛西邊用兵朝廷廣加召募應諸州都監監押募及千人者皆特遷一官以此之故天下冗兵愈衆國力愈貧近嵗又纍次大㨂廂軍以補禁軍之數即日係籍之兵已為不少矣何苦更復廣招禁軍又招饑民以充廂軍臣不知建議之臣曽與不曽計較今日府庫之積以養今日舊有之兵果為有餘為不足乎此蓋邊鄙之臣庸愚怯懦無他材略但求添兵在朝之臣又恐所給之兵不副所求他日邊事或有闕敗歸咎於已是以不顧國家之匱乏只知召募取其虛數不論疲軟無所施用此羣臣容身保位茍且目前之術非為朝廷深謀逺慮經久之畫也諺曰多求不如省費此言雖小可以喻大今以十口之家衣食僅足頓增五口必不能贍若不顧囤中之粟笥中之帛所餘幾何而惟冗口是貪能無窮匱乎國家之勢何以異此羣臣既不能為陛下忠謀陛下又不自以為憂則誰當憂之臣恐邊臣之請兵無窮朝廷之募兵無已倉庫之粟帛有限百姓之膏血有涯不知國家長此沉瘵何時當瘳乎臣又聞即日當災傷之處軍無見糧煮薄粥以飼饑民猶不能給况刺以為兵將以何物養之終身乎且畎畝農民止因一時饑饉故流移就食若將來豐稔則各思復業今既刺以為兵是使之終身失業也於官於民皆為非便謀䇿之失孰甚於此臣願陛下斷自聖志速降指揮應在京及諸路並宜罷招禁軍但選擇將帥訓練舊有之兵以備禦四方不患不足其災傷之處州縣不得妄招饑民以充廂軍但據所有斛㪷救接農民俟向後稍豐使各復舊業則天下幸甚自陛下踐阼以來臣不自知其狂愚見朝廷政令有未便差除有未當屢獻瞽言凂瀆天聽陛下未嘗為之變一政令改一差除若臣者亦可以不言矣然猶區區獻言不已者誠耻居位而不言不耻多言而見厭也甲申詔命官尋醫侍養許差送還公人如例度支判官太常博士集賢校理卲亢為直史館潁王府翊善同判司農寺於皇子兩位供職帝嘗召對羣玉殿訪以世務曰學士真國器也故命為王府官丁亥詔貢院如南省放榜故事合格者以名聞俟敕下乃放榜戊子河北提㸃刑獄王靖奏准中書劄子今年恩冀深瀛滄州永靜乾寧軍所役春夫令過寒食乃入役雖日長易得功料緣妨農人春種兼邢洺德州夫赴恩兾深瀛州役過寒食入役則四月上旬然後得歸欲乞且依舊敕於寒食前半月入役從之初用都水監奏令寒食後入役而御史傅堯俞送伴敵使奏聞百姓紛然以為非便弗聽至是靖又言乃報可是月萊州民吕升以父權喪明割腹探肝切之以啖權權復能視而升不死自後如升者衆不可悉數二月案原本脫二月字今補辛丑權發遣户部副使吕公著言古者民勤於力則工役罕民勤於食則百事廢今京畿諸縣及京東西淮南州軍類多饑歉民有餓殍陛下方發粟賑貸遣使存撫逺近聞之皆知陛下有惻然憂民之心然臣愚以謂凡力役之事非不得已者皆冝權罷况修蓋慶寧宫非為急務就使功力至微然作於禁中恐四方傳聞或致譏議臣欲乞候將來郊禮成年穀稍豐日徐議修蓋從之先是司馬光亦言伏見近日以來修造稍多只大內中幾及九百餘間以至皇城諸門并四邊行廊及南薰門之類皆非朝夕之所急無不重修者役人極衆費財不少此蓋陛下纘極之初禁廷之中誠有破漏不可居者略命整葺理亦冝然而左右之臣便謂陛下好興土木之功遂廣有經度雖不至損壞之處亦毁拆重修務以壯麗互相誇勝外以希㫖求知內以營私規利萬一陛下更因此賞之則營造之端卒無窮已國財必竭民力必殫臣竊惟陛下初臨天下惠澤未孚於民而以好治宫室流聞四方非所以光益聖德也修造勞費不可勝數臣請且言諸州買木一事擾民甚多衙前皆厚有産業之人每遇押竹木綱散失賠填無有不破家者先帝躬履節儉宫室苑圃無有增飾故諸場材木皆有羡餘屢因赦恩放免買木以寬民力自頃修造倍多諸場材木漸就減耗有司於外州科置百端營制尚恐不足而工匠用之賤如糞土昔漢文帝惜十家之産罷露臺而不作今諸場前後所積竹木何啻十家之産陛下至仁若察其所從來得不為之愛惜乎况即今在宗倉廩踈漏甚多皆上件數處興功占使匠人物料未暇修葺致粟帛之數大有損失古者將築宫室宗廟為先廄庫為次居室為後今之所修緩急先後無乃未得其宜乎又皇子生而富貴年未及冠所宜示以朴素謹其所習今聞所修三位規模侈大又復過於祖宗時皇子所居漢明帝曰我子何得與先帝子比恐非所以納之於義方也臣愚伏望陛下特降聖㫖應大內裏外舍屋即日不至大假損壞之處及不至要切如南薰門之類並罷興造其皇子位只因舊屋夾截修整早令工畢不得過為宏壯且令那減匠人物料修倉庫之損壞者所有諸處監修之官自是本職更不與減年磨勘及轉官酬奬以塞泰侈之原使天下皆知陛下去奢從儉仁民愛物不亦美乎三司使給事中蔡襄為端明殿學士禮部侍郎知杭州初上自濮邸立為皇子中外無間言既即位以服藥故皇太后垂簾聽政常為中書言仁宗既立皇子因追思鄂王等悲傷涕泣宦官宫妾爭相熒惑而近臣中亦有異議可怪者乃一二知名人也近臣文字只在先帝卧榻上近已於燒錢爐內焚之矣中書不敢問其姓名但唯唯而退已而外人亦稍稍言襄常有異議然莫知虛實上疾既愈數問襄如何人一日因其請朝假變色謂中書曰三司掌天下錢榖事務繁多而襄十日之中在假者四五何不别用人韓琦等共奏三司事無缺失罷之無名今更求一人材識名望過襄者亦未有歐陽修又奏襄母年八十餘多病襄但請朝假不趁起居爾日髙後即入省亦不廢事然每奏事語及三司上未嘗不變色及諒祚攻却涇原上遂督中書以邊事將興軍須未備三司當早選人琦等初尚救解上意不回因奏待襄陳乞可以除移初傳者多端或云上入宫後親見奏牘至是因襄請罷琦遂質于上上曰內中不見文字然在慶寧即已聞之琦曰事出曖昧若虛實未明乞更審察茍令襄以飛語獲罪則今後小人可以傾陷善人難立矣曽公亮曰京師從來喜造謗議一人造虛衆人傳之便以為實前世以疑似之言陷害忠良者非惟臣下被禍兼與國家為患修曰陛下以為此事果有果無上曰雖不見其文字亦安能保其必無修曰疑似之謗不唯無迹可尋就令迹狀分明猶須更辨真僞先朝夏竦欲害富弼令其婢學石介字體久之學成乃僞作介為弼撰廢立詔草賴仁宗聖明弼得保全臣至和初免喪至闕下小人有嫉忌臣者僞撰臣乞沙汰內官奏藁傳布中外內臣無不切齒判銓才六日為楊永德所讒以差船事罷知同州亦賴仁宗保全尋知其無罪遂却留住至今以此而言就令有文字猶須更辨真僞况無迹狀陛下幸勿致疑琦及公亮又各進說上曰造謗者因何不及他人遂命襄出守龍圖閣學士工部侍郎吕公弼權三司使至和初公弼為三司使帝在藩邸常得賜馬給使吏以馬不善求易之公弼曰此朝廷近親且有素望宜避嫌不可許至是公弼奏事帝曰朕往在宫中卿不欲與朕易馬是時朕固已知卿也公弼頓首謝又曰卿繼蔡襄為使襄訴訟不以時决頗多留事卿何以處之公弼知帝不說襄對曰襄勤於事未常有慢失恐言者妄爾帝益以公弼為長者公弼既為三司使乞於前任羣牧使合被兵級內權留十一詔公弼三任羣牧使特與教駿兵士七人不得為例案是時公弼以同羣妝使權三司使此云龍圖閣學士工部侍郎又云至和初已為三司使皆與宋史不合癸卯樞密副使禮部侍郎王疇卒疇始病上謂胡宿曰卿可遣子弟往問之及病革又敕內侍挾太醫診視及還以不起聞上嗟悼久之即欲臨奠以命官祈雨致齊故翌日乃出賜白金二千兩贈兵部尚書諡忠簡疇妻梅氏方娠上命其家曰即生男女悉以聞及生女子也上又命其及適人以其壻名聞他日謂輔臣曰王疇可惜朕於西府初得此人而遽爾淪喪豈國之不幸邪疇好治容服坐立嶷然言必以文未嘗慢戲吏治審密文辭嚴麗可喜其執法亦言事然於時不能無顧望執政才五十日終于位及所享夀類其父鬷云案疇父名博文官至同知樞密院事鬷别有傳此誤丙午降陜西都轉運使光祿卿陳述古為少府監知欣州坐權知渭州日擅移涇原副總管劉几權知鳯翔并劾几罪按問多失實故也司馬光言竊聞陜西都轉運使陳述古昨因巡邊妄奏朝廷稱邊鄙寧靜不足為慮後因權涇原路經略司事聞副總管劉几稱西人㸃集將謀入冦請出兵防托述古恐與前奏相違因此怒几奏稱不協軍情張皇生事擅移几知鳯翔府數日之間西人果大舉犯邊殺略弓箭手及熟户蕃部述古亦不即時發兵救援致陷沒數千户近者雖朝廷已差臺官勘述古罪狀然竊聞所坐止於擅移劉几及奏狀有不實之處若以文吏議之罪不至重若以國計言之為害實深何則國家承平日久人不習戰雖屯戍之兵亦臨敵難用惟弓箭手及熟户蕃部皆生長邊陲習山川道路知西人情僞材氣勇悍不懼戰鬬從來國家賴之以為藩蔽今述古知西夏欲來侵擾而自避翻覆之辜順成欺罔之謀抑遏將官不許救護遂以數千户生民委於虎口令父子流離骨肉塗炭豈惟已陷沒者深可哀痛臣恐自今以後諸路弓箭手皆不敢於極邊居止熟户蕃部皆有叛國從賊之心以此觀之其害豈小哉况述古出於門䕃材氣庸鄙自歷官以來所至之處縱恣胸臆殘害吏民不顧憲典輕侮王命驕暴狠狡天下共知屢曽坐事黜降旋復收用叨竊名位一朝至此誠過其分量故天奪之魄舉措乖繆駭人視聽陷敗民命挫辱國威內外之人無不憤疾臣聞舜誅四凶而天下服如述古平生所為亦可以謂之凶人矣陛下縱不欲加斧鉞以謝邊民亦當投之荒裔以禦魑魅庶使封疆之臣少加警懼賜直院奏合格進士明經諸科鄱陽彭汝礪等三百六十一人及第出身汝礪等三人授初等幕職官如咸平元年例餘授判司簿尉出身人守選丁已翰林學士王圭等奏准詔詳定禮院及同知禮院吕夏卿禘祫異議請如禮院所議今年十月祫明年四月禘如夏卿所議罷今年臘祭從之翰林學士中書舍人賈黯為給事中權御史中丞時周孟陽王廣淵以藩邸之舊數召對黯言俊人滿朝未嘗有一被召者獨召親舊一二人示天下以不廣請如太宗故事時召侍從館閣之臣以備顧問帝常從容謂黯曰朕欲用人少可任者黯對天下未常乏人顧用之如何爾退而上五事一知人之明二養育以漸三材不求備四以類薦舉五擇取自代禮部郎中兼御史知雜事龔鼎臣為集賢殿修撰知應天府初鼎臣為宰相韓琦所善翰林學士吳奎欲舉御史賈黯不肯奎爭不能得乃止既而以都官員外郎換起居舍人知諫院遂知雜事在言職少所建白至是出之其後上欲用王廣淵為諫官曰近嵗諫官御史多不職如龔鼎臣乃未嘗言事也鼎臣以嘉祐元年五月知諫院八年正月為知雜御史其在諫院蓋一年半有餘實録云未幾遂知雜事恐誤今削去未幾字據鼎臣本傳言事亦不少英宗云未嘗言事疑本傳有所緣飾也實録云上自即位委政大臣諫官御史言事者有司馬光吕誨傅堯俞趙鼎范純仁吕大防而司馬光與吕誨言事尤多光常言王廣淵姦邪不可以直集賢院誨常論奏宰相韓琦五罪以為當罷皆弗聽按范純仁吕大防此時猶未除言官光言王廣淵姦邪已見正月除直集賢院時誨奏韓琦五罪當在濮議後此時未也已未起復前禮部侍郎樞密副使吳奎領故官職奎固辭不許奎遣其子大理評事璟奉表懇辭上意必起之韓琦曰近年兩府大臣文彥博賈昌朝富弼各乞終喪奎必不肯起歐陽修曰若邊境有急金革從事則不容免上曰方此西邊未寧奎何自遂其私也乃詔璟於延和殿面諭賫詔賜奎奎終辭上許之召璟見延和殿乃五月辛酉今并書之詔令月給俸錢之半奎固辭不受辭半俸㑹要在六月今并此三月丙寅命置唐葛周三將軍殿于醴泉觀知制誥祖無擇疏乞罷之不報丁卯詔貢院經殿試進士五舉諸科六舉經省試進士六舉諸科七舉令不合格而年五十以上第其所試為三等以聞乃以進士孫京等七人為試將作監主簿餘三十八人為州長史司馬文學上初即位命殿中丞判司天監周琮及司天冬官正王炳丞王棟主簿周應詳周安世馬傑靈臺郎楊得言作新厯三年而成琮言崇天厯氣節加時後天半日五星之行差半次日食之候差十刻既而中官正蘇易簡與監主石道李遘更陳家學於是詔翰林學士范鎮諸王府侍講孫思恭國子監直講劉攽考定是非推尚書辰弗集于房與春秋之日食參今厯之所候而易簡道遘等所學疏濶不可用新書為密乃賜名明天厯詔翰林學士王圭序之琮等各遷兩官賜物有差其後明天厯亦不可用而琮等皆奪所遷官嘉祐六年七月乙卯初命鎮等三人監修厯琮奪官在熙寧元年八月又十一月辛未新除侍御史知雜事吕誨以嘗言中丞賈黠過失辭職黯奏曰諫官御史本人主耳目一時公言非有嫌怨且誨初得御史乃臣與孫抃等五人薦舉臣等知其為人方正謹厚今兹擢用甚允衆望臣得與之共事必能協濟伏望趣令就職詔以諭誨誨遂受命因言臣先有奏陳以力所不能願辭諫職不意復得此除圖報之心宜如何哉臣竊思歷代設耳目之官益輔人主之不逮不然九重之外無復聞見萬幾之事皆為壅蔽以是論之獻替之言不可一日無之凡事冝辨論是非稍涉欺妄當行重責不當置其言而不用使之沮辱在賢者則死而後已不賢者翻然以思動為身謀悠悠皆是矣借如朝廷之事臺諫官不得預聞及其政令行下方始得知比正其所失則曰已行之命難以追改是執政之臣常自取勝耳目之官與不設同矣又聞近日臣寮建議以先帝臨政信任臺諫官所陳已行之事多有追奪欲陛下矯先帝之為凡事堅執不可易行一繆令進一匪人倡言於外曰出自清𠂻人必不敢動搖果有之是欲窒塞聖聰將拒諫遂事豈公忠愛君之人哉恐非社稷之福也且諫諍者非衮職之闕時政之失不應有所激發上則咈戾聖意下則違逆輔臣以至被糾劾者皆為仇敵豈不知害于家所利者國家所守者職分爾而又近年朝廷殊無懲勸之意諛佞者傾附權勢畏避者喑默自容坐纍嵗月例得遷轉言與不言孰為利哉臣常親奉德音指緘默者甚衆然終不聞有所誡勵斯無益之大者也臣竊謂陛下好問之心過於虞舜但未嘗察其言爾求治之切有如漢宣但未嘗責其實耳臣既未得去敢不以言責自任伏乞陛下既問之當察其言既用之當責其實無俾左右蔽惑聰明言事之官宜時有懲勸則人無茍且職事皆舉有補於朝政太平之基不難成矣矯先帝之為更宜沉慮已行之事果有不便無憚更改不然臣未知職事之所守終不安其分爾辛巳翰林學士王圭奏權御史中丞賈黯前以學士同修撰仁宗實録自領臺憲不復入院望令仍舊供職從之黯乞以實録藁就臺修撰有議事即三五日一赴院詔止令三五日一赴院修撰壬午禮院奏近依國朝故事詳定仁宗大祥變除服制以三月二十九日禫除至七月一日從吉已䝉降勑臣等謹按禮學王肅以二十五月為畢喪而鄭康成以二十七月通典用康成之說又加至二十七月終則是二十八月畢喪而二十九月始從吉蓋失之也祖宗時據通典為正而未講求故事天聖中更定五服年月敇斷以二十七月今士庶所同遵用夫三年之喪自天子逹於庶人不宜有異請以三月二十九日為大祥五月擇日而禫六月一日從吉從之己丑賜越州上虞縣朱回女家絹三十匹米二十斛朱母早亡養于祖媪方十嵗里中朱顔與媪競持刀欲殺媪一家驚潰獨朱號呼突前擁蔽其嫗手挽顔衣以身下墜顔刀曰寧殺我毋殺媪也媪以朱故得脫朱連被數十刀猶手挽顔衣不釋顔忿恚斷其喉以死事聞故有是賜其後㑹稽令董偕為朱立像于曹娥廟嵗時配享焉司馬光言臣近䝉恩給假至陜州焚黃竊見緣路諸州倉庫錢糧類皆闕絶其官吏軍人料錢月糧並須逐旋收拾方能支給竊料其餘諸州臣不到處亦多如此臣聞國無三年之蓄曰國非其國今窘竭如此而朝廷曽不以為憂若不幸有水旱蝗蝻方數千里如明道康定之時加之邊鄙有急興兵動衆不知朝廷何以待之臣伏見陳許潁亳等州止因去秋一次水災遂致骨肉相食積尸滿野此非今日官吏之罪乃嚮時豐稔之嵗其人但務偷安不為逺慮粟麥至賤不能儲蓄及至凶荒之際官私俱竭上下狼狽何由相救雖使桑宏羊劉晏復生亦無如之何也今春幸而得雨麥田有望朝廷已置饑饉之事於度外不復以儲蓄為意矣萬一天下州縣復有災傷則何以異於陳許潁亳之民若饑饉相繼盜賊必興此豈可不早為之深慮乎臣愚伏望陛下於天下錢榖常留聖心特降詔書明諭中外應文武臣寮有熟知天下錢榖利害能使倉庫充實又不殘民害物者並許上書自言陛下勿以其人官職之踈賤文辭之鄙惡一一略加省覽擇其道理稍長者皆賜召對從容訪問以方今食貨俱乏公私皆困何故而然如何擘畫可使上下豐足若其言無可取者則罷遣而已有可取者即為施行仍記録其姓名置于左右然後選其中材幹出羣者以為轉運副判官及三司使副判官仍每至年終命三司撮計在京府界及十八路錢帛糧草見在都數聞奏以之比較去年終見在都數若增羡稍多即令勘會如别無姦巧欺謾及非理賦斂而置增羡其當職之人宜量行褒賞纍經褒賞者即别加進用若減耗稍多即令詰問如别無大故災傷及添屯軍馬而致減耗其當職之人宜量行責罰纍經責罰者即永從絀廢誠能如此持之不懈數年之後可使天下倉皆有餘粟庫皆有餘財雖有水旱蝗蝻之災及邊鄙有急皆不足憂也此疏不得其時附見春末更須詳考上嘗問輔臣天下金榖幾何韓琦等具以對因問冗兵之費倍於曩時何也歐陽修曰自西事以來邊城廣為守備既增置軍額則嵗費益多上又問祖宗綏懷如此尚有倔强者琦曰國家急在息民故示大體含容之爾邊兵不戰久矣彼衆亦自驕惰雖時有倔强蓋犬戎之態如此此據寶訓附見不審何時初昭陵復土韓琦引故事乞罷相守藩上弗許去冬託疾繼請上責以終喪後三上章詔須畢郊禮於是吕誨言臣竊惟君臣離合繫國休戚前世已然之事可為近監陛下親政方及一年二府大臣相繼請去惟衰老疾病不任於事者容有進退之禮焉如其封章朝上詔使夕至被恩寵而遽起非要君而何不惟輕朝廷之體適足取笑於天下也元宰韓琦輔翼聖躬誠有勳效自去冬纍還印綬經數月復又抗章前章有云自謂孤忠之可立豈知直道之難行蓋有所忿激而言陛下宜體其意也君臣之義不當形於間隙中外聞之頗未為然方今樞府之人兵防久弛夏國不順邊氓塗炭茶法更變商賈不行經費日滋財用日耗多事之際琦不思經畫以濟大務委之而去得謂之忠耶為身謀則周愛君之心則未至矣臣欲乞特降詔㫖敦諭二府俾務協心各安厥位盡忠體國同底於道唯衰疾老耄勿强以事聽其罷去以就頥養乃至仁均愛始終之恩也不然大臣輕去就之分其下何觀朝廷紀綱從而隳矣傳聞四方亦有輕朝廷之心所繫誠重數人者去留不宜持久唯聖斷無疑天下幸甚自謂孤忠之可立豈知直道之難行乃琦甲辰冬乞罷相第一表也誨此奏當在琦今夏乞罷後今且先見于此知制誥祖無擇言中書省不當在東乞與門下省對移且門下中書與尚書號三省其長官皆宰相之任莫有髙焉者也今乃左省在西右省在東此不可不易也唐龍朔中嘗改左右省為東西臺此又明不可不易也會要以為三月十四日事今附月末夏四月戊戌詔禮官及待制以上議崇奉濮安懿王典禮以聞宰臣韓琦等以元年五月奏進呈故也辛丑詔曰向命監司知州薦所部吏嵗限定員本防其濫不問能否一切取足非詔意也自今所舉務在得人不必充所限之數先是御史中丞賈黯言今京朝官至卿監凡二千八百餘員可謂多矣而吏部奏舉磨勘選人未引見者至二百五十餘人臣不敢逺引前載且以先朝事較之方天聖中法尚簡選人以四考改官而諸路使者薦吏部數未有限而在京臺閣及常參官嘗任知州通判雖非吏部皆得薦時磨勘改官者嵗才數十人後資考頗增而知州薦吏視屬邑多少裁定其數又常參官不許薦士其條約比天聖漸繁而改官者固已衆矣然磨勘應格者猶不越旬日引對未有待次者皇祐中始限監司奏舉之數其法益密而磨勘待次者已不減六七十人皇祐及今才十年爾而猥多至於三倍向也法疏而其數省今也法密而其數增此何故哉正在薦吏者嵗限定員務充數而已如一郡之守嵗許薦五人而嵗終不滿其數則人人以為遺已當舉者避謗畏譏欲止不敢此薦者所以多而真才實亷未免慁於無能也謂宜明詔天下使有人則薦不必滿所限之數帝納其言故降是詔丙午奉安仁宗御容于景靈宫孝嚴殿
