body:
  text: 續資治通鑑長編卷三百二十八宋李燾撰神宗元豐五年秋七月辛巳廣西經略司言知宜州王竒與賊鬭失利賊兵退守大江回穴諜知溪洞蒙承想萬餘人欲攻思立寨已戒和斌據險拒之詔就差知沅州西上閣門使謝麟經制宜州溪洞事宜州軍在行者並聽麟節制委選官權領沅州并六月十七日十九日又七月五日初費萬既為蠻所襲經略司數移文責竒竒不能堪後數日賊萬餘人攻普義寨與官軍戰竒出遂敗尚有親兵數百或勸竒乘騎逃去竒輒罵曰大丈夫當盡節以報國遂死之廣西經略司又言西南張蕃貢奉乞添至三百人詔具合增數以聞其後本司奏故事以七十為額不可增遂罷詔知環州西上閣門使張守約再任壬午以延州第六將主簿崔順孫為通直郎賞從軍功也尚書省奏自五月一日奉行官制推原法意每事講求緣其端本增立支節須纎悉備具即施用著明奉行以來於今踰月凡續降指揮申明條制雖未周詳僅備大略竊慮董正之初在所考察今繕集為二册乞賜覆核都水監言大河水衝靈平掃已依前降朝旨決大吳掃堤使水下流以紓危墊七年八月庚午吕希道罷澶州可考詔罷大理寺官赴中書省讞案自今每嵗一次本寺以見在案盡數斷絶上中書取旨上因論刑曰先王之肉刑蓋不可廢夫人受形於天以法壞之故謂之肉刑揚子曰肉刑之刑刑也周穆王訓刑大則五刑次則五宥又次則贖凡十五等輕重有倫至漢文帝罷之若革秦之敝欲休養生民則可矣如格以先王之法則不得為無失三代之時民有疆井分别圻域彰善疸惡人重遷徙故以流為重後世之民遷徙不常而流不足治也故用加役流又未足懲也故有刺配猶未足以待故又有逺近之别蓋先王教化明習俗成則肉刑不為過也四年十一月八日庚寅合參照癸未詔重法地縣尉並差使臣其當差使臣監當處對注選人詔三省樞密院獨班奏事日不過三班遇三省並獨班奏事日樞密院事當亟聞更展一班涇原路經略司言知鎮戎軍种古等招納西界降人乞酬奬本司元準朝旨招納丁壯五人賜絹二十匹其刺事蕃部招誘又接引管勾使臣未審如何分結詔經略使以當支絹數量元差人功力多寡分給淮南東路提點刑獄范鏜言宿州有賊四十餘人乞於淮西或開封府界將下募兵詔差彭鐸就淮西將下選募兵三百馬三百陳留縣不係將下選募兵馬各三十捕之鐸孫弟已見甲申皇第九子生遣江夏郡王宗惠告于太廟舊紀書甲申皇子佖生新紀不書太府寺言提舉市易司狀賖貸人户所欠至多已得旨展限三年催納其先降指揮以催到分釐計數追奪酬奬請候至所展三年滿日施行上曰朝廷設市易法本要平凖百貨蓋周官泉府之政官失其職一切賖貸公私頗不便之雖云有收息之數名存實亡今已改用金銀鈔帛抵貨最為善法其元催致欠官吏重行追奪亦其宜也遂從之詔除名人前如京副使費萬追復如京副使廣西經略司言萬死事故也張頡不能蚤慮蠻冦戎備不飭致失兵將令轉運司劾罪以聞并六月十七又七月二日又八日詔鄜延路鈐轄兼第三副將劉紹能移環慶路密記七月五日先是紹能為沈括种諤誣奏既遣宇文昌齡鞫獄故有是命後二十七日詔紹能復歸鄜延密記七月二十二日明年正月己丑獄乃竟五年四月二日六月一日十四日二十二日七月五日十三日二十二日十二月十八日五年正月十三日皆有紹能事今特書此殿前司言殿侍有千二百五人自補授至今不參班乞委諸路監司取索除蕃夷歸明猺人應仕本土及有專條許留本處者及年小痼疾委官司保明聽依舊外餘並發遣歸班仍立程限從之乙酉賜廣西轉運司度僧牒二千供軍興丙戍詔開封府推判官以下至開封祥符縣丞寄祿官未升朝者比類在京職事官並赴起居朝會詔昨朝廷大舉本意直搗興靈覆賊巢穴不為淺攻但取橫山而已以地形觀之自西路保安軍順寧寨趨興靈至近昨种諤等出界自東路綏德城二十二日方至白池而歸師八日已入塞門不因王中正种諤初議進兵何因捨直就迂會兵夏州虛占月日勞頓士馬橫費芻糧不能成功仰具析以聞從徐禧所奏也四年十月批付沈括云种諤甚非善計當考始諤還延州乞對論事章十一上乃聽之而禧與李舜舉實來計議諤入見言橫山亘袤千里沃壤人物徑悍善戰多馬且有鹽鐡之利夏人恃以為生其城壘皆據險隘足以守禦興功當自銀州始其次遷宥州於烏延又其次修夏州三郡鼎峙則橫山之地已囊括其中又修鹽州以據兩池之利如此橫山強兵戰馬山澤之利盡歸中國其勢居高俯視興靈可以直覆巢穴又其次修折薑寨以盡橫山之地諤所論大略與沈括同五月丙午五月二十六日兩人嘗列奏矣及禧先至延州乞趣諤還在道而括已變議從禧謂銀州故城不便移置於東南十餘里間永樂埭上又議自永樂西接居延為大小十二城以據山界多與諤始謀異如是禧又劾諤誤軍道并及中正其實禧等不欲諤分其功也禧奏諤及中正據高遵裕傳禧乞城永樂具戊子日提舉熙河等路弓箭手營田蕃部司康識言與兼提舉營田張太寧同議立法乞應新收復地差官以千字文分畫經界選知農事廂軍耕佃頃一人其部轄人員節級及雇助人功嵗入賞罰並用熙河官莊法餘並召弓箭手人給二頃有馬者加五十畝營田每五十頃為一營差諳農事官一員勾當許本司不拘常制舉選人使臣請給依陜西路營田司法不滿五十頃委附近城寨官兼管月給食錢三千從之丁亥朝散郎新除工部侍郎熊本為龍圖閣待制知桂州本自廣州召還未至會宜州蠻擾邊故改是命代張頡也七年五月十二日賜詔奬諭此月甲申劾張頡詔朝奉郎王競知宿州如能修舉職事屏除賊盜當别加遷擢六年正月責降賜徐州度僧牒五十修城及官舍從知州孫覺請也司勳言梓州路轉運司保明瀘州應副軍期官等出界冒險以至蕩平實有勤勞詔入箐逐等並依林廣下勾當公事軍主簿例優等不理選限試監簿依特奏名同三禮推恩攝官出界比入箐第降一等第三等升半年名次界首逐等升一季名次軍大將並比折減磨勘年內勒停人候敘用日凖此入箐在夷界死各賜絹百匹入箐回死六十匹出界回死四十匹詔譯經潤文使同譯經潤文並罷自今令禮部尚書領之廢譯經使司印詔應冠尚書字者官司並申狀門下中書外省凖此戊子鄜延路計議邊事徐禧等言銀州故城形勢不便當遷築於永樂埭上蓋銀州雖據明堂川無定河之會而城東南已為河水所吞其西北又阻天塹實不如永樂之形勢險要竊惟銀夏宥三州陷沒百年一日興復於邊將事功實為俊偉軍鋒士氣固已百倍但建州之始煩費不資蓋有不關禦戎利害而徒費供饋者城堅守備則賊不敢攻兵衆將武則賊不敢戰固不以州城軍寨遂分輕重今若選擇要會建置堡寨名雖非州實已有其地舊來邊寨乃在腹裏他日建州亦未為晚已與沈括等定議自永樂埭聲塔平移市石堡烏延至長城嶺置六寨自貝旺川稜美蒙默特羅圍羅帕克川布尼雅堡置六堡寨之大者城圍九百步小者五百步一寨用工略十三萬餘堡之大者堡城圍二百步小者百步一堡用工略萬三千其堡寨城圍務要占盡地勢以為永固其非九百步之寨二百步之堡所能包盡地勢處則隨宜增展亦有四面崖險可以朘削為城工料但如所約可足從之沈括自志云前此詔諸帥圖所以剪夏人鄜延請城石堡以臨之彼保旱海之阻勝則進敗則絶幕而去使進有石堡之阻則幕南不可以宿師大幕昔為彼守者乃今為我用也朝廷遣徐禧李舜舉來計議禧乃欲先永樂以陷其腹心括以謂永樂敵所必爭路險而遠勝不能相維敗不足相救非戰守之利也必欲城永樂當自石堡始次羅帕克羅圍蟻封而東壘障山連然後永樂可城也非數嵗之力不可就議之三月諸將皆樂成功之速卒然禧議按种諤傳禧括定議外諤則未嘗以城永樂為非既敗乃為此言耳今不取五月二十六日初遣禧等舊紀書戊子城永樂新紀於八月甲戌乃書城永樂詔御史中丞舒亶舉任言事或察官十員新紀書此舊紀不書詔李察差團結廂軍三萬人令團結官押赴鄜延路聽李稷賦功詔鄜延路修寨兵馬依出界例賜特支錢己丑馬軍都虞候衛州防禦使環慶路總管林廣卒廣還自瀘南會西邊用兵廣復上章請對面陳方略且言韓存寶雖有罪功亦多以今日朝廷諸將存寶不至於死於是遣廣還舊任疽發頸卒於道廣為將持重善馭衆士卒樂為之用然在瀘南以敕榜招蠻出降而殺之及卒頸遂斷人以為殺降之報云辛卯考功員外郎蔡京言奉詔編中書御筆手詔凡千三百四十六事自治平四年抵熙寧十年為二十一册乞頒付中書省從之元豐元年正月十六日辛卯京初建言鄜延路經略司言據捕獲蕃部策木多伊克稱本弓箭手十年前為西賊所虜𨽻牙頭祗候殿直吹邁下昨聞牙頭點集十二監軍司兵欲往鄜延詔策木多伊克慮是西界首領因捕獲虛稱在吹邁下令經略司究實及取問西界事以聞壬辰賜河北東路提舉司度僧牒千兊錢與黃河隄防司應副新河詔刑部貼例擬進公案並用奏鈔其大理寺進呈公案更不上殿並斷訖送刑部貼例不可比用及罪不應法輕重當取裁者上中書省河東路經略司言寧府寨監押三班奉職張天翼隨高遵裕攻靈州戰沒緣邊覘知西賊已送天翼與契丹詔王居卿羈縻天翼家屬具人數以聞又詔假店宅務屋十五間令開封府保管後詔其子並聽先以陳亡推恩癸已樞密院言淮南羣賊驅虜良民經歷數州彭鐸追捕未得欲下本路募人告捕獲首領賞錢六百千與班行次首領三百千徒伴能自殺捕凖此上批范鏜奏今月戊子追迹羣賊於傅家曲斬捕淨盡可更不須指揮今月戊子七月九日詔王中正罷入內副都知并皇城司為昭宣使金州觀察使提舉西太一宫仍放謝辭任便居住徐禧奏中正行軍避直就迂詔中正分析而中正亦自言目病乞罷內職故有是命詔應臺察事並由尚書省取索事小者先約法送中書省取旨詔諸改官於官名應避者擬以次官資品恩數並依合改官法詔蘭州所修城櫓等未畢功料今防秋之時令趙濟雇募人修築七月畢功城蘭州始議制度宏大王安禮曰省版築之勞使城小而堅則易為守上曰卿欲棄蘭州邪安禮曰蘭州不可棄也臣以謂工役省則用力專曠日暴衆則羌人得以乘其懈城茍堅雖小可恃如其窳也雖大奚補未幾邊臣奏減蘭州制度果如安禮言此據安禮行狀附見當考乙未詔景靈宫成嵗時朝拜薦獻之禮其令禮官閣門參酌條上八月庚申條上詔廣南西路安撫司措置宜州溪洞司已録付見行陜西賞功格據前後官推賞及具當降宣劄者以聞葭蘆吳堡寨各招置蕃落二百人夔州路轉運判官席汝明言奉朝旨據彭孫結納義軍指揮使菊曩二菊曩大把截將王用祥已捕獲射殺魏從革獠人木八言有未獲獠人木琴大木琴二木鷂菊曩二等自效必能捕獲令席汝明應接施行即遣差使馮正符同王用祥説諭朝旨授菊曩二三班借職今據菊曩二斬木鷂首級其菊曩二菊曩大自投順向化能不顧逆黨脣齒用命禽賊實著勤效其射殺魏從革獠賊四人已獲半差使馮正符昨以諳熟夷情差權歸正寨監押就令勾當二十七次將命菊曩二等部族小心辦事先詳酌推恩詔菊曩二除右班殿直南平軍夷界巡檢菊曩大王用祥皆為義軍指揮使馮正符遷一資為歸正寨監押去年八月辛巳二十七日又十二月甲戌二十二日又明年閏六月戊寅四日可考先是瀘南用兵林廣為統帥朝廷遣彭孫繼之而稟命於廣孫惡其𨽻廣也乃詭曰乞弟巢穴在瀘南之西南若由南平趨播州以往則出其不意宜有功朝廷從之知南平軍魏從革受孫命率兵治道木琴等駭其至起兵殺漢軍射從革以死一路驚擾議者皆謂夷殺漢將當發兵討捕汝明獨請於朝曰木琴非與乞弟同惡者不意漢兵猝至而致此釁若官軍出討則是又生一乞弟矣臣以為宜募他族使圖之則無大費而罪人得朝廷以為然顓委汝明召夷酋菊曩等入卧內解帶推食以示恩信不數月菊曩斬木琴首以獻上嘉之進官一等此據吕大防墓志當考或附汝明進官時上謂輔臣曰唐明皇晚年逸豫以致禍亂如本朝無前世離宫别館遊豫奢侈之事非特不為亦無餘力可為也蓋北有強敵西有黠羌朝廷汲汲枝梧不暇然二敵之勢所以難制者有城國有行國自古外裔能行而已今兼中國之所有比之漢唐尤強盛也丙申誠州言先奉朝旨令淮南等路刺配罪人三百前來自後止配軍士四人望許令諸路廂軍投換從之通直郎張蕘上言夏人未伏天討多歷年所陛下奮發神武再興王師去嵗進討隳城却敵攻取之利已有成形雖興靈未拔戎人困於蹂踐此人事已得之矣兵不厭計臣請言其失招降之信不立要害之地不城責帥之律未明賞功之惠已厚統制之權不一饋餉之法未講古者懷致逺人莫如恩信夏國悖亂其衆離心今日之勢正當以恩信招徠之時竊見邊將出師首級之賞厚招降之賞薄故投戈就降之卒皆斬級而進利之所在勢所必趨然於國家之計其失大矣臣欲乞明降朝旨戒勵將士生降之人與首級之賞相若降人得存撫之利彼將扶老携幼以歸聖化臣故曰立招降之信夏人百年強盛力足以抗中國者其勢在山界山界地沃民徑可耕可戰自王師之出夏人盡驅丁壯於河外以固巢穴今可度其控扼之處急為堡障然後築銀夏宥州以及洪鹽取鹽鐡之利以實邊粟通清遠修韋川下瞰平漠靈武之壁可拔也昨大軍之還不慮此為後圖臣故曰城要害之地夫用智分則其慮踈用力分則其氣奪昨經俘虜殘敝已甚臣謂宜因此時分定山界付之諸帥議定可建城寨以次興築嚴立期限責以成功乘機搗虛數路並進使敵不知所應今朝廷之議未定諸路未知所向臣故曰責帥之律未明將士前敵效命誠國家厚賞所激若使之常有所兾則進而不已既足其欲彼將圖全臣以將帥之賞不當以首級為效必得其城取其地獲其酋長及大克捷乃優以官賞不然徒纍首級遂致大官此邊將所以玩冦自封甚大患也臣故曰賞功之惠已厚法令不一人將無所措手足况邊機兵行之際乎此曰可進彼曰可止此曰可降彼曰可殺取捨紛亂間不容髮臨敵敗謀臣竊為陛下惜之故臣論統制之權臣已言增築山界漸據要害以圖進討則諸路修置城壘於今為先所築以次則相去不遠饋糧之法不勞逺齎頗增粟直計地里之費則商人奔走塞下不待驅而自致與向之募夫其利相逺矣故臣論饋餉之法六者西邊今日之勢也為陛下略舉之矣然臣又將有所深言之趙德明之死元昊之齒未壯也朝廷務於姑息豢養既成跋扈難制所謂當身不除百世之責也今夏人亂亡無日不可以曠日稽誅憚而不為三數年間復為邊患則國家西顧憂未有艾也惟陛下力行之爾孟子曰雖有智慧不如乘勢雖有鎡基不如待時當今之時則不可失也上批送中書省乃擢蕘通判環州張蕘何許人當考六月辛亥巳見丁酉李憲言西賊盤泊所在惟鐡毛天都二山及沒煙胡盧河數處嘯聚不下數萬為今之慮須令苗授李浩將兵於定西城蘭州照應臣部勒三四軍會熙秦之師直搗鐡毛山諤格什若賊兵退保天都即并兵進討所謀置城寨候出境隨機處畫可則興築不可則旋師如言可采除更不追鄜延環慶兵差夫外餘並乞仍舊施行乃可集事詔李憲所圖至小奏乞朝廷應副事大令依六月詔罷涇原路經略制置使歸熙河蘭會路都大經略司候過防秋赴闕二十九日己酉令憲且在涇原李憲請發關中民運糧蘭州為五月之儲朝廷將從之王安禮曰臣聞靈州之役役夫被斫植立而不動彼固不畏死奈何以死恐之今關輔以西丁壯轉徙物價昂踴乃欲調難用之夫輦至貴之物橫絶賊壤未見其可臣竊料蘭州戎兵其數未多果可以守則見糧猶足為用以為不然則適足餌冦願陛下俾憲自調之憲果以為難其後改用卒夫以時運之此據安禮行狀當考續給空名宣頭百付河東路經略司戊戌詔涇原環慶熙河蘭會路都大經制司涇原路經略制置司據諸路上所聞賊馬頗屯並塞兼鄜延路見議進城山界須諸路兵為聲援令涇原於鎮戎定川熙寧髙平寨各駐一軍委劉昌祚盡護之須兵馬三萬以上環慶於大順城荔原柔逺安疆寨各駐一將令經略司委近上將領盡護之須兵馬二萬以上熙河路蘭州已東昨擬修堡子內三處未曾興工仰都大經制司相度那移本路將兵因今來防秋之際不妨就便以鄜延差到廂軍興役未知便否及轉運使可與不可應副仰一面計會相度施行訖奏密記二萬以上其後别有此假實録無之今附見詔以今年六月并七月令張頡劾知瓊州劉威及威具析并廣西轉運司奏威功狀威奏鹽柵二狀並録送吳潛考實以聞先是張頡奏威引惹蠻人生事詔劾之而轉運司奏乞推賞繼威又自陳修柵畢工洞首符揖皆納罪請降不敢擅據其地故改命潛究其同異六月壬申甲戌又九月辛卯庚子通直郎考功員外郎蔡京為起居郎仍同詳定官制京前為官制所檢討文字於是上批京久在官制所諳知創法本末其弟卞雖見充詳定緣係暫置官局所職止於看詳文字别無政事關由雖兄弟共處理亦無害故也閣門通事舍人崔象先周宥並為禮賔副使帶御器械勾當皇城司以上批舊給事東宫故也十月甲子劾住滯十一月丙申取旨明年二月庚戍斷西京左藏庫使吉州刺史內侍副都知石得一為入內副都知東作坊使嘉州刺史帶御器械劉有方為內侍押班仍詔自今遷補都知押班並三省樞密院同取旨三月乙未已有詔自今入內內侍省初除都知押班中書樞密同進呈又十一月乙未都知押班除授歸密院詔開封府界團教場簿籍記保甲事藝其紙劄并雇直未知從何出辦提舉司可具析以聞先是緣教習保甲費皆從官給獨此無所從出上恐其擾故雖小亦令究治大理寺斷絶公案官吏共賜四百千次第均給之御史王亘言昨廢廣濟河輦運自清河轉淮汴入京臣每見纍官京東博知利害者詢之皆以為未便如廣濟安流而上與清河泝流入汴逺近險易較然有殊望更體量詔令轉運提點刑獄提舉輦運司以舊廣濟河并今清河行運比較利害五年二月十日罷廣濟運廣西轉運司言安化州蠻為冦乞權禁止入省地賣買詔廣南西路經略安撫司經制宜州溪洞司相度指揮補徐州寧淮指揮軍員龎德子為三班差使賜名嗣忠以德捕殺強賊為賊所害也涇原路經略司言三川寨巡檢王貴輕易領兵過壕與西賊鬭敵致傷折多詔獲級傷折人依格推賞河北路都轉運使蹇周輔言江南西路通般廣鹽臣始奏畫立法今虔州南安軍推行方及半年已收息錢十四萬緡兹實已成之效又言定州修倉已見功緒上批方今西師在邊其北面軍實正宜晦藏形迹以杜彼疑令蹇周輔謹密毋得張皇所差出官常作已意誡之辛丑洪州奏自更定鹽法新添鹽錢並合起發赴京深慮遲滯乞先次出賣新鹽然後趂辦舊課庶可及期裝發上批本路新額鹽課並係朝廷指揮凖為邊糧糴本之用嵗嵗常須登辦仍須及期經制到京趂時糴入遂從之涇原路經略司言管押歸順酋長阿克密等二十五人赴闕以上批昨行營出界及塞下招納夏人酋首及羌巢使令之人自歸順後有功者可押赴闕引見故也後阿克密遷皇城使本族巡檢餘馬池特阿香等皆遷官賜袍笏銀帶有差詔自今臣寮上殿劄子並進呈取旨先是三省樞密院或不以進呈直寢之故有是詔壬寅詔鄜延路見修六寨其長城嶺寨以西接連環慶路金湯白豹已指揮環慶路差二萬人並邊照應若别無興作即是虛勞軍馬令徐禧沈括計議其當進築城寨處與曾布議定以聞賜廣南西路轉運司度僧牒二千糴宜融州軍糧詔彭孫功與罪相當其賞罰各不行時孫出界亡失正軍當降兩官斬獲首級當升兩官以功贖過故也皇城使涇原路鈐轄姚麟知鎮戎軍詔諸門令商稅院統轄蘭州置馬軍廣鋭兩指揮步軍保捷兩指揮各以五百人為額保寧兩指揮各以四百人為額牢城一指揮仍許諸軍投換賜陜西路轉運司銀絹各二十萬錢鈔三十萬應副鄜延路計議邊事所用度從判官李稷請也時計議邊事所又乞錢百萬緡工匠千人生熟鐡五萬斤牛馬皮萬張車二千乘義勇保甲萬人遞馬百匹亦從之癸卯詔乞弟逃竄其地已賜羅氏鬼主鋪永令知歸徠州及令楊光震兄弟并沙取落務嫂等蠻會合掩襲所獲夷户令自為主如獲乞弟即依朝旨推賞令瀘南安撫司常舉行吏部言立到選官格各隨所任職事以入仕功狀立格如選巡檢捕盜之官則以武舉䇿義武學生或因臣僚以武略薦或自陳兵略得出身之人他倣此從之詔御輦院既未有所隸宜令專逹時上欲釐正殿中省職事置六尚如唐故事度禁中未有置省之所且未遑也故有是詔王鞏甲申雜見云初議官制張誠一要易都知押班名置殿中監誠一時被眷無敢異者既而與諸監制度作劄子同進呈神宗顧左右無內侍省官在側以御衣遮手搖之曰不可遂卷殿中監劄子收袖手中即别處分事徐顧蘇頌子容蔡京元長曰此名不可輒易祖宗有深意陳縝刑部嘗與官制局時在親聞德音此事當考因未置殿中省且附見甲辰汝州防禦使駙馬都尉王師約為晉州觀察使詔敘復不以官髙下並歸尚書刑部內合取旨及職任非吏部者並上中書省丙午詔涇原路安撫制置使司所辟置官屬與所奏乞事悉罷詔自今外取堂後官供職及五期乃聽出職詔謝麟於湖南北各選兵千人令王克平就本將下簡將領詣宜州聽麟節制詔彭孫權涇原路鈐轄充經制宜州溪洞司凖備將領就差知欽州供備庫副使李時亮知瓊州衝替劉威仍劄與李時亮昨以劉威擅討黎人引惹邊事當用心懷撫早令安帖七月辛已劾威謝麟經制四年十二月丁卯彭孫責金州監當考丁未以兩朝國史書成燕垂拱殿兩紀並書燕修史官賜南外都水監丞司度僧牒六千備廣武上下掃詔進呈衣糧樣舊屬左藏庫及倉界自今衣樣歸太府寺糧樣歸司農寺戊申詔應緣支給軍賞物帛乞取者論如河倉法與者並坐詔河北都轉運司借支澶州封樁軍糧五萬石特除之自今河北三州封樁軍糧如敢請借支者依擅支封樁錢物法詔已置瀘南安撫司其遂州鈐轄司事並隨安撫司移瀘州并四月十九日大觀三年六月八日瀘南安撫司奏請乃四月十九日指揮詔熙河路自今如不用條詔擅役將下兵毋得應副以李浩擅役令般木踏塹故也詔諸司文字上下並申六曹己酉涇原路經略司言諜報西界十二監軍司人馬齎五月糧於胡盧河點集國母小大王七月未過黃河欲以八月克日冦鎮戎軍大川詔留李憲且在涇原照管邊面速遣人深入覘候如有實狀即追秦鳯熙河先團結諸將兵馬及環慶二萬人騎令姚兕統領合力驅逐毋失機會又須得其要領乃可進師令蘭州嚴行隄備并詔環慶秦鳯熙河蘭會經略司應李憲追兵如敢妄有占留發遣遲緩者當行軍法先是諜言秉常久被囚閉今又言國母小大王同過河時亦莫知其實丁酉先令憲赴闕大宗正司言忠國夫人馮氏乞依熙寧二年春葬承範冬葬允弼例乘凶葬夫宗諤太史局言今年五月葬勝王若又葬豫章郡王據地理新書一年不可再葬詔依太史局所定太常寺言丙申詔書季秋祀英宗於明堂推以配上帝其餘從祀羣神悉罷臣等以類推之猶有未盡者謹案周頌噫嘻春夏祈榖于上帝而本朝啓蟄而雩有司尚緣近制皆以羣臣從祀恐與今詔意不同臣等伏乞將來孟夏大雩惟祀上帝以太宗配餘從祀羣神悉罷以明事天不二又言據禮雩壇在國南今寓圜丘非是乞改築從之舊紀書己酉始建雩壇祀上帝以太宗配新紀因之
