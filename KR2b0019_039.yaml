body:
  text: 續資治通鑑長編卷三十五宋李燾撰太宗淳化五年春正月甲寅朔上製元旦除夕詩各二章賜近臣俾之屬和翰林學士張洎上表觧釋詩意凢數千言上甚悦命宰相召至中書奨諭先是上謂翰林學士韓丕曰卿早在嵩陽當時軰流頗有遺逸否丕以田誥及楊朴萬適對上悉令召之詔下而誥卒朴至對於便殿不願仕進上賜以束帛與一子出身遣還鄉適最後至公車拒之不得見寓居京師半年幾至寒餓丕時已罷翰林因為上言其事即日命適為梁縣主簿始受命太醫趙自化怪其色變為診脈曰君将死矣適猶勉赴朝謝舉止山野人皆笑之後數日果卒朴莆田人適宛丘人俱以歌詩得名自化洛陽人也上語䝉正曰夫否極則泰来物之常理晉漢兵亂生靈凋䘮殆盡周祖自鄴南歸京城士庶皆罹掠奪下則火光上則彗孛觀者恐慄當時謂無復太平日矣朕躬覽庶政萬事粗理每念上天之貺致此繁盛乃知理亂在人䝉正避席曰乘輿所在士庶走集故繁盛如此臣常見都城外不數里饑寒而死者甚衆未必盡然願陛下視近以及逺蒼生之幸也上變色不言䝉正侃然復位同列咸多其亢直他日上欲遣人使朔方諭中書選才而可責以事者䝉正退以名上上不許他日又問復以前所選對上亦不許他日又問益急䝉正終不肯易其人上怒投其手奏于地曰何太執耶必為我易之䝉正徐對曰臣非執葢陛下未諒爾因固稱其人可使餘不及臣不欲用媚道妄隨人主意以害國事同府皆惕息不敢動䝉正搢笏俛而拾其書徐懐之而下上退謂親信曰是翁氣量我不如既而卒用䝉正所選復命大稱㫖上于是益知䝉正能任人而嘉其有不可奪之志此二事並據富弼所作䝉正神道碑別本實録火光彗孛等語乃至道元年正月壬戌又載吕端蘇易簡對答與此不同今不取初右諌議大夫許驤知成都府及還言于上曰蜀土久安其民流窳易擾願謹擇忠厚者為長吏使鎮撫之時東上閤門使呉元載實代驤為成都元載頗尚苛察民有犯法者雖細罪不能容又禁民游宴行樂人用胥怨王小波起為盗元載不能捕滅于是東上閤門使郭載受命知成都行至梓州有日者潜告載曰成都必䧟公往亦當受禍少留數日則可免載怒曰天子詔吾領方面阽危之際豈敢遷延遂行先是李順引衆攻成都燒西郭門不利去攻漢州彭州戊午己未兩日連䧟之載既入城賊攻愈急己巳城䧟載與運使樊知古斬關而出帥餘衆奔梓州李順入據成都僣號大蜀王改元曰應運遣兵四出侵掠北抵劍關南距巫峽郡邑皆被其害焉靈州及通逺軍皆言趙保吉攻圍諸堡寨侵掠居民焚積聚上聞之怒曰保吉叛渙砂磧中十年矣朝廷始務含容賜以國姓授以觀察使賜予加等俸入優厚仍通其關市又以綏宥州委其弟兄可謂恩寵俱隆矣乃敢如是朕今决意討之癸酉命馬歩軍都指揮使李繼隆為河西兵馬都部署尚食使尹繼倫為都監以誅保吉上始聞李順攻刼劍南諸州命昭宣使河州團練使王繼恩為西川招安使率兵討之軍事委繼恩制置不從中覆諸州繫囚非十惡真贓悉得以便宜决遣實録及㑹要並於此下即書以張詠知成都按成都記及他書詠至成都乃今年九月繼恩出師知成都當郭載死雷有終代之詠又代有終者實録㑹要皆誤矣實録既於此下即書詠知成都四月辛丑又書張詠知封駮司按此則其誤明甚然詠知封駮亦在前矣此豈申命耶按宋祁所作墓銘韓琦所作碑乃是春除既而留不行及秋乃令赴任吏部尚書宋琪上書言邉事曰臣頃任延州節度使判官經渉五年雖未嘗躬造夷落然常令蕃落將和斷公事嵗無虗月敵人之事熟於聞聼大約党項吐蕃風俗相類其帳族冇生熟户接連漢界入州城者謂之熟户居深山僻逺横遏冦畧者謂之生户其俗多有世讎不相往來遇有戰鬭則同惡相濟傳箭相率其從如流雖各有鞍甲無魁首統攝並皆散漫山川居常不以為患党項界東自河西銀夏西至靈鹽南距鄜延北連豐㑹厥土多荒隙是前漢呼韓所處河南之地幅員千里從銀夏洎青白兩池地惟沙磧俗謂平夏拓㧞葢蕃姓也自鄜延以北地多土山栢林謂之南山葉勒葢冦族之號也從延州入平夏有三路一東北自豐林縣葦子驛至延州縣接綏州入夏州界一正北從金明縣入蕃界至蘆門四五百里方入平夏是夏州南界一西北歴萬安鎮經承安城出洪門至宥州四五百里是夏州西界我師如入夏州之境宜先招到接界熟户使為鄉道其强壯有馬者令去官軍三五十里踏白先行緣此三路土山栢林溪谷相接而復隘陿不得成列躡此嚮導踏白可使歩卒多持弓弩槍􅘫隨之三二千人登山偵邏俟見坦途寕静可傳號勾馬遵路而行我皆嚴備保無虞也長興四年夏州李仁福死有男彛超擅稱留後當時詔延州安從進與李彛超換鎮彛超據夏州固不奉詔朝廷命邠州藥彦稠搃兵五萬送從進赴任時頓兵城下議欲攻取軍儲不繼遽命班師而振旅之時不能嚴整失戈棄甲遂為戎人之利臣又聞党項號為小蕃非是勍敵誠如雞肋若得出山布陣止勞一戰便可盪除深入則饋運艱難窮追則窟穴幽邃莫若緣邉州鎮分屯重兵俟其入界侵漁方可隨時掩擊非惟養勇亦足安邉凢烏合之徒勢不能久利於速鬭以逞兵鋒莫若持重守疆以挫其鋭彼無城守衆乏餱糧威賞不行部族分散然後宻令覘其保聚之處預於麟府鄜延寕慶雲武等州約期㑹兵四面齊進絶其奔走之路合勢擊之可以翦除無噍類矣仍先告諭諸軍擊賊所獲生口資畜許為已有官司不問如此則利誘於心人百其勇也靈武路自通逺軍入青岡峽五百里皆蕃部熟户向來人使商旅經由並在部族安泊所求賂遺無幾謂之打當亦如漢界通旅之家宿食之直也此時大軍或須入其境則嚮導踏白當如夏州之法况彼靈州便是吾上芻粟儲蓄率皆冇偹緣路五七程不煩供饋止令逐部兵騎裹糧輕齎便可足用諺所謂磨鎌殺馬刼一時之力也旬浹之餘固無闕乏矣又臣曽受任四川數年經歴江山備見形勝要害利州最是咽喉之地西過桔栢江去劔門百里東南去閬州水陸二百餘里西北通白水清州案宋史地里志清州乃紹慶之覊縻州白水砦亦屬紹慶黔江縣原本作青州誤今改正是龍州入川大路鄧艾於此路破蜀至今廟貎存焉其外三泉西縣興鳯等州並為要衝請選有武畧重臣鎮守之奏入上宻寫其奏令李繼隆王繼恩等擇利而行左正言直昭文舘王禹偁言伏覩國家出偏師討李繼遷臣有便宜比欲論奏忽奉差使仍放朝辭奔命已來在公少暇必料天威大振逆䜿已擒尚恐稽誅敢伸前志臣淳化二年任商州團練副使之日故團練使翟守素兩曽夏州駐泊因與臣同看報狀伏見李繼遷進奉事是時臣離闕下纔是數月守素因問臣云繼遷幾時有銀州觀察使之命臣遂言七月間在中書當直曽除此官兼賜改姓名恩渥優異守素言此賊未是由衷必恐終懐反側又言繼遷曽被左右暗箭射之横貫於鼻偶然不死今面上瘡痕尚存臣自聞此語常貯於心以為此賊不必勞力而誅自可用計而取况討伐之義權變為先引古證今取則不逺漢光武時彭寵據有漁陽攻伐未下家奴竊發肘腋斬首而來唐元和中李師道父子盗據全齊四五十年崛强難制其禆将劉寤倒戈攻城遂至族滅近代梁太祖時劉知俊兄弟以同州叛入李茂貞梁祖下詔曰有捉得知俊者賞錢一萬貫與節度使得其弟者賞錢五千貫與刺史一月之間生擒其弟諺曰重賞之下必有勇夫兵法曰使貪使愚言貪者利其財愚者不計其死也今繼遷本是匹夫偷生假息苦無財利以結人心伏望聖慈察臣愚見明數罪惡曉諭蕃戎及部下逼脅之徒邉上驍雄之士多署賞賜髙與官資但如梁太祖捉劉知俊兄弟信賞必行使左右生心蕃戎併力繼遷身首不梟即擒恐小蕃力所不加則少以官軍應接何必苦煩睿略多舉王師且自陜以西嵗非大稔加之餽餉轉恐凋殘河北雖是豐登須修邉備况此賊通連北敵朝廷具知周亞夫所謂擊東南而備西北正在此時也不可忿兹小䜿弗顧逺圖臣本自草萊擢居臺閣雖罹譴放㝷沐甄收每欲酬恩恨無死所智小謀大惟俟誅夷報國捐軀豈復顧慮此據禹偁奏議附見本傳云屢獻討賊遷便宜此䟽盖其一也又本傳云自觧州召還為左正言俄直昭文舘求外任以便奉養時使曹州决獄就知單州賜錢二十萬至郡十五日召為禮部員外即復知制誥按直昭文館在四年十一月改禮外知誥在五年四月此云雖罹譴放㝷沐甄収當是召還為左正言直昭文館以後又云忽奉差使仍放朝辭當是决獄曹州時因正月命李繼隆討繼遷故附正月末二月甲申朔上始聞成都䧟召宰相謂曰豈料賊勢猖熾如此萬方有罪罪在朕躬忍令隴蜀之民陷於塗炭去年以來連雨數月此亦兵氣之應朕當部分軍馬旦夕討平之遂命少府少監雷有終監察御史裴莊並為峡路隨軍轉運使工部郎中劉錫職方員外即周渭為陜府西至西川隨軍轉運使馬歩軍都軍頭勤州刺史王果帥兵趨劍門崇儀使帶御器械尹元元未見帥兵由陜路以進並受昭宣使王繼恩節度或言莊本蜀人不宜復遣入蜀上益信倚之李順分遣數千衆北攻劍閣劍閣疲兵纔數百都監西京作坊副使開封上官正奮勵士卒出禦之㑹成都監軍供奉官宿翰翰未見領麾下投劍門適與正兵合遂迎擊賊衆大破之斬馘幾盡餘三百人奔還成都順怒其驚衆悉命斬於城東門外初朝廷深以棧路為憂正等力戰破賊自是閣道無壅王師得以長驅而入奏至上喜甲辰以正為六宅使劍州刺史充劍門兵馬部署翰為崇儀使昭州刺史己酉以兩川盗賊徙封益王元傑為呉王領淮南鎮江節度使先是諸王領節度使必兼大都督府長史翰林學士張洎草元傑制上言按前史皇子封王以郡為國置傅相内史佐王為理如不之國朝廷命卿大夫臨郡即稱内史行郡事唐以揚益潞幽荆五郡為大都督置長史司馬為上佐即内史之職也其大都督之號非親王不授或親王遥領别命大臣臨郡皆是長史副大使知節度使事今呉王實居大都督之任復加長史乃自為上佐其名不正望付中書門下商議施行宰相吕䝉正曰襄王越王皆領長史今呉王獨為大都督居二王之上恐亦非便上曰業已差誤異日别有除授并改之初考功即中姚坦為益王府翊善坦好直諌王嘗作假山所費甚廣既成召僚屬置酒共觀之衆皆褒歎其美坦獨俛首不視王强使視之坦曰但見血山安得假山王驚問其故對曰坦在田舍時見州縣督税上下相急以剥民里胥臨門捕人父子兄弟送縣鞭笞血流滿身愁苦不聊生此假山皆民租賦所出非血山而何時上亦為假山未成有以坦言告於上者上曰傷民如此何用山為命亟毁之王每有過失坦未嘗不盡言規正宫中自王以下皆不喜左右乃教王稱疾不朝上日使醫視之逾月不瘳上甚憂之召王乳母入宫問王疾増損狀乳母曰王本無疾徒以翊善姚坦檢束王起居曽不得自便王不樂故成疾爾上怒曰吾選端士為王僚属者固欲輔佐王為善爾今王不能用規諫而又詐疾欲使朕逐去正人以自便何可得也且王年少未必出此必爾輩為之謀爾因命捽至後園杖之數十召坦慰諭之曰卿居王宫為羣小所嫉大為不易卿能如此無患䜛言朕必不聽也石介聖政録謂聞坦語亦毁山者真宗也盖誤以元傑此事為封兖王時故耳據本傳乃元傑為益王時元傑二十三嵗自益改封呉真宗初乃自呉改封兖其封益時才十二嵗故太宗得云王年少不知出此也本傳載此事殊不詳頗譏坦訐直葢真宗嘗召坦戒令婉辭非太宗也本傳但云上不云真宗疑傳亦以上為太宗也今並從聖政録及司馬光記聞所載然記聞猶以益王為兖王今改之令諸路轉運使每嵗部内諸州民租轉輸他郡者通水運處當調官船不通水運處當計度支給勿得煩民轉輸此據本志在此月上謂宰相曰倖門如䑕穴何可塞之但去其甚者斯可矣近來綱運之上舟人水工有少販鬻但不妨公一切不問却須官物至京無侵損爾吕䝉正對曰水至清則無魚人至察則無徒小人情偽君子豈不知葢以大度容之則庶事俱濟昔曹参以獄市為寄政恐姦人無所容也陛下如此宣諭深合黄老之道實録别本在二月戊申今附此三月甲寅詔王繼恩戒前軍所至處其賊黨敢抗王師即當誅殺本非同惡偶被脅從而能歸順者並釋之倍加安撫以大理評事陳舜封為殿直舜封父善奏聲𨽻教坊為伶官坐事黥面流海島舜封舉進士及第任望江主簿轉運使言其通法律宰相以補廷尉屬因奏事言辭頗㨗給舉止類倡優上問誰之子舜封自言其父上曰此真雜類豈得任清望官葢宰相不為國家澄汰流品之所致也遂命改秩宋亳民市牛江淮間未至上以時雨沾足慮其耕稼失時㑹太子中允武允成允成未見獻踏犁以人力運之不用牛上亟令秘書丞直史館陳堯叟等往宋州依其制造成以給民民甚頼焉戊辰復以國子學為國子監改講書為直講從判學李至之請也詔兩京諸道州府軍監管内縣自今毎嵗以人丁物力定差第一等戸充里正第二等户充户長不得冒名應役民所納夏税餘租隨其數各異已名以輸不得異户合抄其有疋帛零丈尺者止依時估上等價折納緡錢食貨志云里正户長訖今循其制盖指天聖末年也當考趙保忠聞李繼隆將兵來討趙保吉乃先擕其母及妻子卒吏壁野外上言已與保吉觧仇貢馬五十匹乞罷兵上怒立遣中使命繼隆移兵擊保忠於是繼隆兵壓境保忠反為保吉所圖欲并其衆縛牙將趙光祥夜襲保忠帳保忠方寢聞難作单衣披髪僅以身免騎駿馬走還城中資財器用保吉悉奪之初保忠再遣其指揮使趙光嗣入貢光嗣頗輸誠欵詔補供奉官再遷禮賔副使保忠動静光嗣必以聞及保忠隂結保吉光嗣潜知之因出家財散士卒誓以効順保忠既還光嗣執之幽於別所丁丑開門納王師繼隆入夏州擒保忠繫以鋃鐺鏁檻送闕下收獲牛羊鎧甲數十萬保吉引衆遁去禆将侯延廣等議誅保忠及出兵追保吉繼隆曰保忠几上肉爾當請於天子今保吉逺竄千里窮磧難於轉餉宜持重未易輕舉也延廣等服其言秦翰傳云王師次延州翰慮保忠遁逸即乘驛先往矯詔安撫以緩其計及王師至翰又諷保忠以地主之禮郊迎因並驅而出保忠遂就擒按保忠先已出次野外既為保吉所襲乃還光嗣遂執之安得與翰俱迎王師也初環州民與吐蕃相貿易多欺奪之或至鬭訟官又弗直故蕃情常怨及崇儀使柳開知州事乃命一其物價平其權量擒民之欺奪者寘於法部族翕然嚮化是春徙知邠州時調民送軍儲環州嵗已再運民皆蕩析産業而轉運司復督運民數千人入州署號訴且曰力所不逮願就死矣開即移書轉運使曰開近離環州知其芻粟計不増大兵可支四年今蠶農方作再運已勞老幼疲弊畜乘困竭奈何又苦之如不罷開即馳詣闕下白於上前矣卒罷之據張景行状開移邠州乃淳化五年春故附見於此夏四月士午朔詔應天下主吏先逋欠官物令元差官典及旁親人均配填納者凢四十五萬貫疋斤石勿復理自今守藏掌庾筦𣙜等虧欠官物止令主吏及監臨官均償之實録載此詔乃云始令官吏均償按本志則官吏均償盖舊矣但不及旁親人爾今從本志癸未以吏部侍郎兼秘書監李至翰林學士中書舍人張洎右諫議大夫史館修撰張佖范杲同修國史先是上語宰相曰太祖朝事耳目相接今實録中頗有漏畧可集史官重撰蘇易簡對曰近代委學士扈䝉修史䝉性選怯逼於權勢多所廽避甚非直筆上曰史臣之職固在善惡必書無所隱爾昔唐元宗欲焚武后史左右以為不可使後代聞之足為鍳戒因言太祖受命之際固非謀慮所及昔曹操司馬仲達皆數十年窺伺神噐先邀九錫至於易世方有傳禪之事太祖盡力周室中外所知及登大寳非有意也當時本末史官所記殊闕然宜令至等别加綴輯故有是命上因謂吕䝉正等曰朕以宰相之任所職甚重欲修唐朝書考之事以責卿等輔佐之效又念考第之設亦空言爾莫若撫夷夏和隂陽使百度大理一人端拱無事此宰相之職也豈有居其位而不知其任乎甲申上聞趙保忠既成擒詔以趙光嗣為夏州團練使髙文岯為綏州團練使削保吉所賜姓名復為李繼遷稽古録載復李繼遷姓名在至道元年九月與實録本傳不同今兩存之上以夏州深在沙漠本奸雄竊據之地欲隳其城遷民於銀綏間因問宰相夏州建置之始吕䝉正對曰昔赫連勃勃後魏道武末僣稱大夏天王自云徽赫與天連又號其支庶為鐡伐氏云剛鋭如鐡可以伐人蒸土築城號曰統萬言其統領衆多也自赫連築城以來頗與關右為患若遂廢毁萬世之利也乙酉詔隳夏州故城遷其民於綏銀等州分官地給之長吏倍加安撫李繼隆遣其弟洛苑使繼和與監軍真定秦翰等入奏以為朔方古鎮賊所窺覦之地有之可依以破賊并請於銀夏兩州南界山中増置保戍以扼其衝且為内属蕃部之蔽而斷賊糧運皆不報丙戌右諌議大夫史館修撰張佖言史官之職掌修國史不虗美不隱惡凢天地日月之祥山川封域之分昭穆繼世之序禮樂師旅之政本於起居注以為實録然後立編年示褒貶伏覩聖朝編年謂之日厯惟紀報狀畧叙敕文至於聖政嘉言皇猷美事羣臣之忠邪善惡庶務之沿革弛張汗簡無聞國經莫紀謹案故事起居郎掌修記事之史凢記事以事繫日以日繫月以月繫時以時繫年必書其朔日甲乙以紀厯數典禮文物以考制度遷拜推賞以勸善誅罰黜免以懲惡季終則授之國史起居舍人掌修記言之史録天子制詔德音如事之制臣欲請置起居院修左右史之職以記録為起居注與時政記逐月終送史館以偹修日厯如此則聖朝稽古必煥發於典墳信史成文固度越於周漢矣上覧奏而嘉之乃置起居院於禁中命起居舍人史館修撰梁周翰掌起居郎事秘書丞直昭文館李宗諤掌起居舍人事参知政事蘇易簡言故知制誥趙隣幾常追補唐武宗以來實録其家今寓睢陽詔遣殿中丞直史館南安錢熈乗𫝊往取其書熈得隣幾所著㑹昌以來日厯二十六卷及他書凢百巻來上實録葢未成也詔賜其家錢十萬丙申以虢州團練使梁朂為鎮國行軍司馬初王化基治祖吉獄詢其土豪王姓者云吾小民見州將貧乏相醵率為一日之夀豈知其犯法哉悵歎不已化基詰其前後郡守王言三十年以來惟梁都官不受一錢餘無免者梁都官乃朂也有文詞太祖常欲令知制誥為時宰所忌遂止化基因言於上時朂已老病不任吏事特授華州行軍司馬給郎中俸料朂未見丁酉掌起居郎事梁周翰言請自今崇政殿長春殿皇帝宣諭之言侍臣論列之事望依舊中書修為時政記其樞宻院事渉機宻亦令本院編纂各至月終送史館自餘百司凢干封拜除改沿革制置之事悉條報本院以備編修令郎與舍人分直崇政殿以記言動别無起居注每月先進御後降付史館從之起居注進御自周翰始也上嘗謂左右曰大凢帝王舉動貴其自然朕覧唐史見太宗所為葢好虗名者也每為一事必豫張聲勢然後行之貴傳簡册此豈自然乎且史才甚難務摭實而去愛憎乃為良史也壬寅王繼恩言王師由小劍門路入研口寨破賊斬首五百級遂北過青强嶺遂平劍州按張洎集賜王繼恩詔云大軍十八日到綿州界其取劍州必在此數日前既無可考姑從實録竢奏到乃書之先是陳滑蔡潁郢鄧金房州信陽軍皆不禁酒太平興國初京西轉運使程能請𣙜之自能建𣙜酤之議所在置官吏局署取民租米麥給醖釀以官錢市樵薪及官吏工人役夫俸料嵗計所獲利無幾而主吏規其盈羡又醖齊不良潔酒多醨壊不可飲至課民婚葬量户大小令酤民被其害州縣苦之嵗或小儉物貴殆不償其費上知其弊戊申下詔募民自酤輸官錢減常課十之二使其易辦民有應募者檢視其資産長吏及其大姓共保之後課不登者均償之是嵗又取諸州嵗課錢少者四百二十七處募民自酤或官賣麹收其值後民應募者寡猶多官釀罷四百七十二處𣙜酤在今年九月己未依本志并書之
