body:
  text: 續資治通鑑長編卷三百三十宋李燾撰神宗元豐五年冬十月戊申朔李秬种諤沈括奏永樂城陷漢蕃官二百三十人兵萬二千三百餘人皆沒先是沈括奏敵兵來逼城見官軍整故還上覽奏憂之曰括料敵疏矣彼來未戰豈肯遽退耶必有大兵在後已而果然及聞城陷涕泣悲憤為之不食早朝對輔臣慟哭莫敢仰視既而嘆息曰永樂之舉無一人言其不可者右丞蒲宗孟進曰臣嘗言之上正色曰何嘗有言在內惟呂公著在外惟趙卨嘗言用兵不是好事耳慟哭以下據邵伯溫見聞録餘據徐禧傳徙新知太原府資政殿學士呂惠卿知延州天章閣待制王居卿依舊知太原府知淮陽軍降授奉議郎趙卨復天章閣待制知慶州己酉罷冬至御殿太僕寺言御馬每三匹給卒一名常馬千給卒二百飼養從之沈括言援兵皆屬李憲种諤節制欲望許臣參預軍事同力破賊又言已遣蕃捉生馬乞齎所降密諭徐禧聖㫖先給銀絹許以殿直往永樂訖种諤言永樂城已不守西賊進退殊未可測已牒沈括依詔堅壁清野提舉河北路保甲司言見任巡檢多不曉教閲新法欲望許本司選差人代其十三場監教使臣候案閲罷權留本司遇有不得力巡檢補填訖奏從之知單州天章閣待制王克臣試工部侍郎克臣奏事殿中上慰諭曰單州之行寧介意乎自不害進用也辛亥提舉汴河隄岸司言洛口廣武掃大河水漲淪塌隄岸壞下閘斗門萬一入汴人力無以枝梧密邇都城可不深慮詔都水監官速往照管都水使者范子淵言陽武等數掃正居京邑之上自秋積雨南隄受害特異常嵗先是廣武危急繼齧原武之隄國財民力殫耗無窮茍於此時不究經久之䇿嵗或如此未易禦捍竊見衛州王供掃北隄之外比之隄內地形低下北帶山岡可以吞伏巨流乞自王供掃決全河灌隄北俾東出衛州及黎陽縣北又東達澶州之境或至大名府界與見行河合相距約四百餘里兼王供而下逐掃間有重復古隄槩計其功不至浩大如此則南岸自滎澤至迎陽十一掃北隄自獲嘉至蘇村七掃並逺大河所決河經由州縣止三四處可豫作隄防或徙避之較之水逼南隄治隄嵗費利害相萬上批三省可速審議乃詔蹇周輔范子淵陳祐甫同相度可否利害以聞大理寺言太常寺主簿王子琦博士黃實互訟今根究得曲在子琦罷子琦主簿送吏部又言被㫖勘客省使張誠一不依次引朝見班㑹赦當原詔誠一上過犯簿先是誠一奏閣門不以次引朝見官而閣門使李綬以故事執政近臣皆越次排班誠一以為無此比綬遂懷排班歷陳上前歷乃誠一所書押上直綬令付寺根治故有是命御史王桓言伏見自更官制獨散騎常侍諫議大夫司諫正言未聞除命常侍諫議秩位優隆固宜虛之以俟耆德至於司諫正言縱難其選亦有侍從近臣可以權領今以為無其人而不置則是規諫可廢而朝廷無所事於言也願陛下示所先後以明好惡不行朱本削去壬子都水使者范子淵言廣武役兵千六十夫萬三千二百人物料一百四十一萬四千條束魚池兵工一萬三百夫工四萬一千物料六十一萬八千條束詔河東路經略司指揮接連西界緣邊州軍城寨官司應係西界邊事及探報事宜不得申牒河東緣邊安撫司詔涇原路第八將戴嗣良賈辨免所追官先是嗣良等出師亡失三分一釐當追一官既而嗣良自陳計數不及二分故詔免之詔大理寺獄空吏量與支賜自今大理卿免假日直止令治獄少卿推丞更直甲寅詔諸路教閲廂軍於下禁軍內增入指揮名額排連並同禁軍於是馬步軍排定有馬廂軍二十二指揮無馬廂軍二百二十九指揮詔龍圖閣直學士朝散郎知延州沈括責授均州團練使員外郎隨州安置坐始議城永樂既又措置應敵俱乖方故也又詔龍神衛四廂都指揮使懷州防禦使鄜延路副都總管曲珍降授皇城使鄜延路鈐轄兼第一將永樂城陷珍與王湛及士卒五十餘人走至米脂寨自劾無謀致敗樞密院言永樂城守禦未全西賊萬數不少雖官兵勢力不加緣珍斥候不明又不審量事勢以致敗事故降官令於延州照管守備舊紀書甲寅龍圖閣直學士知延州沈括不援永樂貶為均州團練副使新紀不書乙卯詔賜董戩討夏國有功首領告三十一仍賜絹有差承議郎守太僕少卿吳安持等言奉敕接伴賀正遼使原武河決雖己治道路傳聞自滑州以南猶有橫水三十餘里若使人可以理商量自當同舟而濟萬一倔彊稱久例以拒朝㫖或雖肯登舟又阻風波不及朝㑹兼去年凖朝㫖國信舊路以河決不通今已改就西路候過界移牒照㑹北人或執此為言猶恐上煩處置詔遣水部員外郎王諤計置新船六十艘以待濟并檢㑹慶歷四年余靖奉使九月癸亥晚至雲州過長城渡御河入州東門劄與吳安持丙辰修定景靈宮儀注所上景靈宮四孟朝獻儀二卷看詳十三卷大禮前天興殿儀一卷看詳十八卷從之詔宜州權增公使錢千緡詔樞密院入內髙品張禹勤四十一狀奏永樂城軍前事並進入皇城使海州團練使入內副都知蘇利涉卒贈奉國節度使諡勤懿上以利涉逮事英宗藩邸特官其子孫六人妻封崇德郡夫人紹聖二年二月四日陸佃坐利涉𫝊落職傳後數語或可附此詔奉議郎郭茂恂計㑹陜西買馬司揀馬五千匹赴鄜延經略司四年七月四日茂恂以羣牧判官專提舉買馬兼茶場六年六月二十一日亦以兼茶馬見不知何故此但稱奉議郎廣武上下掃危急詔都水使者范子淵救護丁巳皇第十一子生新舊紀並書皇子生戊午詔權管勾陜西轉運判官降授宣德郎范純粹復奉議郎為陜西轉運副使十一月十一日奏策應事上批付苗授蘭州城壕至今未開濬非久黃河氷合咫尺賊界於邊計極未便李浩所乞修羅日伽羅總二堡雖已畫可聞本路禁軍纍經和雇版築人力疲弊甚要休息其併工營葺蘭州及康古使有金湯之恃其二堡俟來春有餘力為之西京左藏庫使果州刺史張允誠為內侍押班以逮事英宗藩邸也河北路提舉保甲司言所統百七縣團教場五千五百止有勾當公事官二員乞更選差大使臣二員又言教罷第二番都教頭當發赴闕如䝉擢授三班使臣乞令本司指名抽差充本路巡檢並從之己未詔祕書省正字以上太常寺博士丞並中書省差詳定重修編敕所言凖朝㫖六曹等處條貫送編敕所修定乞自朝廷於官制見在屬官內選差六員為删定官從之十二月十五日三年五月十三日又十五日又八月九日六年九月一日七年三月六日重修編敕書成熙河蘭㑹路走馬承受公事樂士宣乞且罷來春修努扎堡令李憲相度以聞其後詔憲隨力經營之詔聞解州聞喜縣有軍賊二十餘人劫王屋縣傷巡檢殺弓手州縣不以聞宜令京西北路提㸃刑獄官㑹集三兩處巡檢督捕如入陜西界亦須跡逐仍計㑹劉庠指揮地分㑹合左侍禁班仲方言熙寧八年孫民先乞於衛州王供掃決大河傍西山北流南岸如禹舊跡上遷深州可無水患當時朝廷雖相度未果施行今大吳掃河決不塞內黃縣北流已成正河上至王供掃止二百餘里欲乞移本州界獲嘉汲縣上下衛鎮齊賈蘇村王供七掃却治南岸隄道更不移動深州可減廢開封府界原武陽武宜村滑州界韓房石堰天臺魚池迎陽澶州靈平十掃工料又大河逺離京城無慮河患却乞於相衛州界黃河狹處繫浮橋以通鄰使上批河事已差蹇周輔等相度仲方狀可送周輔庚申奉議郎起居舍人兼崇政殿說書蔡卞試中書舍人兼侍講以上批中書舍人見止有趙彥若一員恐非次在假事故闕官行制卞可日下召試故也江淮等路發運副使李琮言凖朝㫖令臣具所聞江西鹽利害臣所聞江西鹽有合變通增損利害八州軍鹽額當隨宜减多以增少昨已許用見錢鹽鈔抵當今乞亦用金銀遇散和買鹽月令鋪户納錢二分却於其餘月分帶納令縣官與監官一等賞罰仍乞嚴捕私鹽是時江西鹽法弊甚故委琮體訪利害而琮不敢斥言也朱本削去詔張世矩應援鄜延雖外若趨赴急難其奏請多遲慢待報之事顯是公為誕謾中實畏怯罷管勾麟府路軍馬就差充涇原路都監賜塞原武掃役兵特支錢有差廣西經略安撫司言雍廉欽等州水土惡地凡得替未出本路赴任未入若待闕本路身亡者副使以上與子孫一名三班差使崇班以上與借差殿直以上與殿侍餘支賜如法從之辛酉上批西賊攻陷永樂城得志之後頗肆猖狂揚言必欲復得去年所失之地而後己則來嵗春初秋末之際極要凖防其熙河新創蘭州定西城並堡寨皆去年李憲總兵出塞所得之地於今保守得失利害最為親切若非身任其事則他人不可倚仗李憲候到涇原如安泊兵馬已定即徑歸熙河營葺照管使新復之地戰守之具皆及十分如欲搬家即速具奏當令李彀津遣以往權河北緣邊安撫副使李諒言如塘濼內有賊盜乞許令界河巡檢等逐捕詔沿界河巡檢追捕賊盜並依舊條毋得生事壬戌西上閣門使果州團練使涇原路經略安撫制置使司行營總管劉昌祚為涇原路總管兼第一將權知鎮戎軍屬嵗凶無草束為錢百六十昌祚按近邊白草無際即遣官軍刈之束錢三十人樂從遂不乏因上其事著為令癸亥詔罷李浩涇原路安撫副使先是李憲言昨䝉差李浩兼領涇原職任蓋為本路欲謀入界進築保障故令浩因赴制置司參議邊事今既罷進築則浩所兼領涇原職任當便落銜詔候罷制置司浩歸蘭州憲申請御集在八月十二日詔提舉河北路保甲司巡檢尉司指使並省罷均撥與逐縣巡教官充指使甲子命右司員外郎王震兼權提轄拘催市易司物詔詳定官制所言凖尚書省劄子官制所定雜事奏鈔奏有司事舊令式並尚書省左右僕射與左右丞簽書蓋朝廷以法在所司案法聞奏禀候朝命而人主於有司之成務付之執政執政官所宜代工而任責則人主但聞之而已朝廷以天下事分六曹以治之都省以總之六察以案之六曹失職則都省在所糾都省失糾則六察在所彈上下相繼各有職守則奏鈔書都省執政官於理為當其房元齡等告身四道內三卷勑授制授不書尚書都省官內一卷奏鈔並著尚書都省官而不書名案勑授則尚書省有書有不書者唐告體制不一至於奏授則尚書省具鈔奏上未有不具尚書都省官者然於告身有不書名者蓋告身翻録奏鈔其鈔已付吏部翻録為告故或不書今奏鈔已書名即告身止令代書從之詔府界提舉司劾府界提㸃司因塞原武擅支陽武倉封樁錢罪狀以聞又詔御史臺劾差周宥崔象先充軍頭引見司稽留官司以聞七月庚子差十一月丙申取㫖明年二月庚戌斷廣東轉運副使兼提舉市舶司孫逈言南蕃綱首持三佛齊詹卑國主及管勾國事國主之女唐字書寄臣熟龍腦二百二十七兩布十三段臣昨奉差委推行市舶法臣以海舶法敝商旅輕於冒禁每召賈胡示以條約曉以來之之意今幸刑戮不加而來者相繼前件書物臣不敢受領乞估直入官委本庫買綵帛等物候冬舶回報謝之所貴通異域之情來海外之貨從之元豐二年七月三日詹卑國來貢乙丑詔景靈宮奉真廣孝孝嚴英德殿慈孝寺崇真彰德殿普安禪院隆福殿御容十月丁丑告遷入內奉先資福禪院慶基殿太平興國寺開先殿啓聖院永隆殿崇先觀永崇殿普安禪院重徽殿御容十一月壬子告遷入內詔自今鄜延路邊事並不得𫝊報如違徒二年情重者决配各不以赦降原减告者賞錢三百千詔自今義勇保甲及呈試武藝得班行者不許試換文資梓州路轉運司言瀘州軍興及修造所費不少乞於成都府路給交子一十萬緡從之詔鄜延路計議官試給事中徐禧內侍押班李舜舉轉運判官李稷自永樂城陷不知存亡必已死事禧贈金紫光祿大夫兼吏部尚書舜舉贈昭化軍節度使並賜諡忠愍各推恩二十資舜舉子充遷十資自借職為供備庫副使兄舜聰五資自左藏庫使為皇城使遙郡團練使舜欽並姪瑜各遷一資妻任氏特封夫人稷贈朝奉大夫工部侍郎推恩十二資並賜銀絹各千入內高品張禹勤贈皇城使賜銀絹各五百推恩七資禧為人狂踈而有膽氣尤喜言兵以為西北唾掌可取但將帥怯懦耳呂惠卿以此力引之於上故不次驟用先是惠卿在延州首以邊事迎合朝廷已而去官沈括繼之遂請討伐种諤以鄜延之師深入無功高遵裕以環慶之師至靈州城下狼狽而還陜西河東騷然困敝天下共望朝廷息兵而沈括种諤陳進取之䇿復請築城禧素以邊事自任故上遣往經畫之既入賊境不為備寡謀輕敵卒遇彊冦故敗自是之後上始知邊臣不可信亦厭兵事無意西伐矣自呂惠卿力引徐禧以下朱本並削去其意可見也新本復存之今從新本邵伯溫見聞録云自今更不用兵與卿等共圖太平蓋指此事也王安禮前在翰林日以事見上上曰徐禧天下竒才頃在涇原營畫邊事有足稱者卿亦識之乎安禮曰不識上曰卿任檢正官禧為習學庸有不識耶安禮曰臣徒見其面未嘗接語及安禮在政府禧為御史中丞安禮謂上曰徐禧比數對當有謀議願得所上牘一閲上許之己而降出數大軸明日上諭執政曰凡禧所言以為呂惠卿遊說是安知事君者安禮曰御史為天子耳目今乃明附大臣而不加責是自聾瞽也宜黜之上即除禧給事中計議邊事安禮曰禧不足遣其人志大而才踈喜功寡謀將必敗撓國事上曰邊事且不足遣遂廢禧乎居無幾上早朝出永樂奏流涕謂大臣曰朕恨無諫官不圖為國以至於斯也安禮曰陛下方有建立時大臣且不能而今乃欲追咎諫官臣以謂罪在臣等上顧王圭曰王安禮常勸朕勿用兵少置獄此誠可聽他日為此卿等尚諫之安禮顧圭等曰永佩聖訓此據王安禮行狀增入更當考之詔歸明人應給官田者三口以下一頃每三口加一頃不足以户絶田充其價轉運司撥還丙寅詔工部郎中范子竒赴闕供職先是陜西轉運司官皆隨軍出塞子竒權領漕事至是已差范純粹故詔子竒歸省詔李察兼制置解鹽使詔昨以西賊頻劫漢地纍降指揮除應時驅逐外仍伺隙酬復據臣僚言德順軍靜邊隆德兩寨九月中賊過壕虜掠老幼千人牛羊不在焉慮西賊自為得計因此頻入為寇邊民豈得安居委逐路經略司嚴切戒約須先覘賊馬屯聚近逺虛實度兵力可以取勝乘隙掩殺務要萬全不得輕易逺出熙河蘭㑹路經略司言近遣部落子䇿桑等入西界捕獲部落子結當噶爾埒克居己刺充淮南本城兵結當噶爾真州埒克居楚州詔苗授近有指揮止是以投來單獨蕃部刺配淮南本城其捕獲人自合處斬因何如此施行可關牒前路所至州軍斬訖奏种諤言乞以永樂敗折漢蕃弓箭手及再招填得力人逐名支馬一匹不納元買價依舊給馬口分田從之宣義郎張元方提舉出賣解鹽及提舉巡捉私鹽相度措置淤鹹地梓州路轉運司言凖户部符免出夫户今年夏秋二稅所闕錢帛糧米乞應副詔給提舉司米十萬石乃權罷應副利州路糧一年先是曲赦轉運司以財用方匱請格不行轉運副使李琮謂其屬曰上澤如此奈何遏之乃請免其半復裁省浮費得其羡餘儲於梓遂資瀘四州名其庫為邊備秩滿當代朝廷謂未有以易琮者優詔復留此據琮傳詔种諤問高世亮於何處求得高永能遺骸更遣人求訪徐禧李舜舉李稷張禹勤遺骸候見即依沈括已行曉諭給賞錢遷資酬奬初永樂城陷高永能之孫昌裔與左右欲掖永能由間道走米脂永能曰吾束髮從事西羌大小數十戰未嘗敗今年七十又荷國恩寵恨無以報今雖幸免奈士卒死者何汝曹勉之是乃吾死所也因易敝衣奮戰而敵不知其為永能也後永能子世亮及昌裔馳數十騎入城得永能尸以歸永樂客話稱永能以弓掛頸而死今從本傳贈官在明年九月九日戊辰降三川寨都監如京使張進等一官以輕敵出戰亡失多故也庚午太僕少卿吳安持為駕部郎中上以安持舊領羣牧判官校諸牧租并劵馬靡費己令督趨拘收而太僕不領外務故有是命太常寺言將來景靈宮神御殿奉安皇帝酌獻百官陪祀乞並同四孟朝獻之儀從之知蘭州李浩乞諸路雜犯罪人刺配一二千里者免决充蘭州本城廂軍從之降授承務郎新監雍州鹽米倉張舜民監郴州茶鹽酒稅舜民用高遵裕辟管勾機宜從軍出塞贊畫無功作詩譏訕既坐謫乃言常贊遵裕不為所聽凡數事上批下宇文昌齡究實多如舜民所陳故稍內徙並五月六日詔成都府路轉運使朝議大夫李之純再任洛苑副使勾當皇城司趙思齊為供備庫使以上批思齊即韓王普裔孫之長故也壬申詔户部右曹於京東淮浙江湖福建十二路發常平錢八百萬緡輸元豐庫張舜民小史云神宗於崇政殿後設二十四庫以儲金帛親製庫銘其略曰昔在前朝獫狁孔熾嗟余小子其承厥志云云諸路分將置都作院河北設五都倉講好高麗良以此也然功未施而上賓是天未欲幽薊之民歸中國乎元豐庫或即崇政殿後庫當考實録卷末云聚金帛內帑每庫以詩一字目之詩凡三十二字又别置庫賦詩二十字但不記庫名為何元豐三年末食貨志云云當附此左藏庫內藏庫外又有元豐庫雜儲諸司羡餘錢自熙寧以前諸道𣙜酤場率以酬衙前之陪備官費者至熙寧行役法乃收酒場聽民增直以售取其價以給衙前時則有坊場錢至元豐初法行既久儲積贏羡司農請嵗發坊場百萬緡輸中都三年遂於寺南作元豐庫貯之幾百楹凡錢帛之𨽻諸司非度支所主輸之數益廣又以待非常之用焉此據食貨志第四卷附入四年正月十八日㑹要可考賜京西轉運司度僧牒二百應副原武掃詔誠州置歸逺一指揮以五百人為額同提舉茶場蒲宗閔言諸茶場立額出賣比較申奏每收息二萬緡監官减磨勘一年餘數更比類酬奬不滿二萬緡及不願就减年者每息錢百緡支賞錢二千選人依第四等酬奬與免遣免試無可免者升一年名次從之詔候原武掃塞其役兵更特賜錢有差太常寺言來年正月一日請皇帝御大慶殿受朝賀從之癸酉龍神衛四廂都指揮使降授文州刺史种諤知延州詔以米脂降羌分徙京西湖北諤奏分徙未足以消患徒使歸順之民皆懷反側未敢奉詔詔許諤便宜從事新知太原府資政殿大學士通議大夫呂惠卿落職守本官知單州八月十三日初除太原惠卿初除母喪即有太原之命及入見上將改授鄜延且諭令總四路守備惠卿手疏言陜西之師非惟不可以攻亦不可以守為今日之計要在大為形勢形勢之說非一二可盡因請三省樞密院議邊事日乞召臣同對上謂輔臣曰如惠卿之言陜西一路無可守之理則陜西可棄也所謂形勢者惠卿言欲得執政宣撫四路己為副乃可行用意如此豈宜委以邊事可却令赴河東王安禮曰既不令往陜西恐不可更令帥太原與一間郡如陳潁可也上曰與潁州或蔡州張璪曰欲與蔡州上可之命未下翌日三省樞密院對上語及惠卿王安禮曰臣再三思之自古禍福多藏於無形如惠卿用舍實繫朝廷禍福且惠卿久在朝廷朋附者衆今日罷帥與郡曾不明示過惡議者必謂惠卿論事切當主上不能容受讜言輔臣中有擠之者故及於此惠卿亦必以此為解臣以謂宜告命中明言惠卿之罪落大學士與一小郡如單州之類為允使中外小大之臣知惠卿過惡所在人人警懼因又知名位不可以計數取兼足以整勵風俗緣惠卿肆為浮言覬動朝聽弼臣議政自請造前躁輕矯誣出於為利若行制誥當如此命詞則惠卿雖被重責必無以為說未審聖意如何上曰甚善可落職與通議大夫知單州召舍人以此命詞張璪曰欲召舍人諭以意上曰趙彥若安能為之便可指揮令用此詞行下三省至都堂召中書舍人趙彥若諭以聖意王圭書告詞付彥若彥若以故事未有定草令舍人行者退而論列上不許乃用元擬詞彥若書名行下舊紀書癸酉詔曰呂惠卿弼臣議政自請造前躁輕矯誣出於為利落資政殿大學士知單州新紀不書資政殿學士呂惠卿服闋前期取㫖上欲以為陜西四路經略使王安禮建言曰四路置帥頃嘗行之隨亦罷廢蓋以所治偏重他路須禀而後行徒為迂滯今復置之非便上曰第行之他日謂安禮曰呂惠卿且至比聞新命下倘有識且將力辭茍欲親權則必偃然當之惠卿既至日夜計慮圖為要官其次猶欲假大職以為連帥乃上章曰臣官輕不足以帥四路借使忠如徐禧徒能殺身無補國事竊謂今日之勢非鄜延不可守願陛下擇執政官或名位之重者為之其詞甚躁又乞作中㫖執政對時召同議邊事及選募福建捍仗手三千人以守邊上駭曰昔呂夷簡罷相適有邊事仁宗使與執政官俱入夷簡辭曰臣藩臣陛下不以為愚使奉內庭末議願候執政官罷朝以次進未聞自謂厠弼臣之列如惠卿者安禮曰惠卿之躁輕有素矣今日之事正為一言以撼陛下自求重耳此固不可恕上始欲黜惠卿蔡州由是大怒奪其職使知單州安禮曰惠卿之辨足以飾非不于誥命中正其罪明示天下則得以為說上曰卿自為之安禮於上前草其詞命舍人承行之上覽之曰是為有辭而闢之非卿不能由是中外曉然知惠卿之罪以為當黜者此據田晝行狀當考曰呂惠卿家傳云惠卿除大資政知太原入覲賜對上比得卿論出師及再舉非便事朕尋為卿罷再舉足以見卿之忠藎也今徐禧死於永樂邊警甚嚴須仗卿往鄜延仍總領四路惠卿曰臣䝉厚恩不可勝言昨臣母在京師三弟俱䝉陛下除京師官以便侍養又臣母亡聞陛下宣諭政府恐臣暑月奔喪道中傷毁令諭臣家未得訃告但作朝㫖催促赴闕聖心憂臣至於如此又䝉賜錢賙給於本俸外别給廩賜皆例所無今豈敢辭難但事有未便者須至奏陳臣聞鄜延纍遭敗衄士馬物故非如昔日有可措置陛下雖令總領四路如熙河在千里之外緩急何由節制不若令臣往來邊上親見利害不須專在鄜延也上曰此甚好惠卿曰欲乞一輔臣同行臣但副之上曰誰可使者惠卿曰王圭上曰要他何用惠卿曰王圭見任宰相不惟彈壓兼奏請諸事為便上曰此亦不難昨韓絳亦是以宰相宣撫但不知圭敢去否當與議之惠卿曰臣久居憂今之邊事皆不知始末上曰今早已指揮三省樞密院將軍興以來文字盡送卿看詳朕自永樂事後文字更不曽看只候卿來惠卿曰俟見文字節次具利害奏請上曰徐禧初但與李舜舉同築城既畢自合便歸又去守城遂為賊害極可嗟悼兼失近臣深沮朝廷之威惠卿曰禧自為身謀非不周但䝉陛下厚遇不敢愛死爾上曰是如此朕已優與追贈及賜其家官二十資矣惠卿曰勝負兵家常事漢高祖唐太宗遣將失指不免有敗陛下上承宗廟社稷內奉太后為天下之所依仰豈可因小不如意慘怛見於顔色陛下深造至道要當以理自遣上曰卿言是也觀莊周憂患不能入此亦何足介意惠卿曰非特莊周孔子老聃釋氏莫不皆然上曰卿且頻上來要相見說話惠卿退遂至都堂見圭等圭曰朝廷見議除公鄜延早來上曾及之否惠卿曰適己奏知乞相公同去巡邊圭色變不悅既數日無如聖諭送至文字看詳者惠卿意圭之不樂巡邊之請也遂以所聞本路敗後之人馬見在數目乞與政府面議明日請對上曰今議更不屈卿河東鄜延已除卿知蔡州惠卿曰陛下千里促召臣至此未及有所議乃除臣蔡州何也上曰為要兵朝廷無可應副既議論不合所以别除卿差遣惠卿不敢復言而執政者必欲罪惠卿上不得己卒坐請議落職知單州家傳至不足慿如神宗謂朕自永樂事後文字更不曾看及惠卿謂豈可因小不如意慘怛見於顔色須表而出之乃是詔環慶路團結萬人河東路五千人並赴鄜延堡寨戍守以鄜延安撫經略司邊圉未備援兵還營守戍多闕故也環慶路副總管狄詠鈐轄梁從吉張守約出寨亡失三分三釐詔各奪一官詔給內藏錢百萬緡與熙河路户部右曹錢百萬緡與鄜延路及令吳雍發陜西諸司及封樁錢三百萬緡分與環慶涇原秦鳯三路計置糧草熙河蘭㑹經略司言相度移築三岔舊堡於平川圍五百步從之甲成吏部言待制以上舊法六年遷官今准新制三年一遷其已滿三年磨勘外有剩年月者乞許通理磨勘從之是月狹河畢工此據本志增入三年二月十二日始治狹河此年十二月十四日遣官覆視
