body:
  text: 續資治通鑑長編卷四百九十五宋李燾撰哲宗元符元年三月辛亥樞密院言涇原經略司奏被旨差發將兵進築城寨探得西界點集在近邊盤泊慮搗虛深入作過已選將分布照管邊面乞候師還照管得地分無虞許本司量功效大小比類出寨進築官員使臣軍兵奏乞等第推恩從之是日樞密院奏事曾布獨留因為上言臣備位政府無補朝廷每有所聞不敢一一冒瀆聖聰然事干大體不敢緘默臣自去秋即聞朝廷差蔡京安惇究問公事日久未決然以非職事未嘗敢詢三省莫知其詳近見蔡京言劾問張士良稱陳衍於垂簾時日作掌記裁決政事太母但誦之而已又言太母彌留之際不復曉人事而衍尚不肯以國事稟聖斷凡詔旨用寶皆衍專之衍一閹寺敢盜弄國柄如此何可勝誅當時大臣固亦可罪方此時衍事權在手何所不可為衍之可誅無可疑者亦聞三省曾有此議然不若速行况自去秋以來置劾此聲未必不逹海外萬一引決不及行法亦為可惜兼衍家資雖已籍沒恐隨身珍玩不少朱崖軍使乃一使臣其他皆攝官萬一受賕用刑未必如法當遣一監司往處斷仍籍沒其所有乃為盡善近聞遣吕升卿董必察訪二廣中外疑駭以謂恐朝廷遣此兩人往處置已竄黜者人言殊訩訩此事雖臣等不得與聞况於疏逺之人又竊聞欲遣升卿等按問梁燾燾之所言證左已具想必不虛若欲施行不過更遷之海外何必遣使此事虛實臣所不知然燾出此言自為可罪兼追問證左似已有實若更遣升卿輩按問豈免有煆錬之嫌若萬一燾不肯承不知何以處之上曰有李洵證對何敢不承布曰燾必知得罪不輕萬一不肯承必須置獄若置獄而後承則天下後世以為煆錬無疑矣何以釋此謗若更欲推問他事則燾輩當時雖包藏禍心今日事無因發露何肯自言乃知遣使無益况祖宗以來未嘗誅殺大臣令燾更有罪惡亦不過徙海外上曰祖宗未嘗誅殺大臣今豈有此布曰然則何必遣使也况升卿兄弟與軾轍乃切骨仇讎天下所知軾轍聞其來豈得不震恐萬一望風引決朝廷本無殺之之意使之至此豈不有傷仁政兼升卿凶熖天下所畏又濟之以董必此人情所以尤驚駭也必在湖南按孔平仲殊不當今乃選為察訪衆論深所不平上改容曰甚好布又言梁燾言及楚邸不知聖意以為何如上曰楚邸必不知布曰誠如聖諭若大臣與楚邸交通真有此謀豈一二人之所能辨必須有顯狀外議皆疑朝廷欲行遣楚邸臣獨以謂聖意素不知此必無此理今聖諭諒其不知臣復何言然臣以謂楚邸不知固無可議就令當時實有此謀陛下亦當函容濶略此豈唯傷先帝篤愛兄弟之恩兼形迹宣仁於國體豈為穩便如此則上纍聖德不細上亦然之布又言三省大臣無一人為陛下明白裁處此事使中外疑駭皆大臣之罪陛下知章惇蔡卞近來相失每事更相猜二議論之際互相觀望莫肯啓口以致差除不能僉諧往往引二三人取決聖斷上曰近日多如此何為若此相失布曰大約皆謀身而已昔相朋比今相疑忌莫非為私計未嘗志於國事上曰相失必有所因布曰蔡卞引常立惇方與之協比則為之當此事然退亦不免有言有王莘者來都堂求差遣惇正色曰爾本常立所薦何可更要差遣其後論蔡肇鄭居中輩皆公然違戾大抵積此等小事遂成釁隙而惇尤疑蔡京以其在經筵時時造膝隂有所傷中上曰惇深不樂京布曰京兄弟氣焰人無不畏之者唯臣一人不畏之臣自謂致身於此當以義理自恃何敢畏人惇以引蔡肇安師文為京等所指目深恐中其讒間蔡京在經筵卞在政府兩人窺伺而交攻之惇不得不懼以此於議事但容默而已上曰京與惇何以相失布曰惇性暴嘗聞人言舉華申甫作編敕所看詳利害文字惇問京云人言公與之有錢物交加是否京變色曰無此事只曾將一犀帶來與京京不曾受又蔡蹈攻林虡惇問京云人言公令蹈擊之京云豈有此乞理會惇笑而止以此不得不相失申甫乃為吕嘉問探事者先帝特除名誠不可用蹈為京所使亦不虛惇為宰相可按治便當按治不當以間語言激怒之爾上曰惇性輕率布曰誠然但惇雖輕率議論亦多平直卞之隂巧難測願陛下更加審察上微笑而已上又問兩人曲直如何布曰引常立鄭居中則曲在卞引劉正夫輩則曲在惇然卞之黨與甚盛氣焰可畏邢恕安惇輩皆重足一迹惇以此尤畏之也壬子刑部言請三司樞密院吏三年一次許試刑法依條係與法官同試通優等人數欲乞於法官參混考較從之户部言請押綱人押荆湖南路鹽糧綱已受省部付身除程限三十日到轉運司公參如無故違限論如之官限滿不赴律違限月日仍不理磨勘從之癸丑户部言川路舊法坊場錢物并許置金銀并軍裝紬絹等赴鳯翔府送納元限成都府利州路二年梓州路三年並起發了當乞成都利州路並依此梓州路立限三年從之祕書省言依敕命勾集到太史天文局渾天文儀象所官同定永裕陵禁地等今乞選差太史局官三兩員就彼覆按及相驗禁地內補治詔差判太史局官二員天文局官一員餘依奏二月十五日五月二十八日八月七日可考御史蔡蹈言臣伏見專切提舉京城所奏據太史局董惟正指引定奪補貼夷門山寺處闕陷合修髙樓大舍清淨寺院蒙降聖旨於夷門山岡修建一寺者臣契勘夷門山岡實國家本音生氣之地然自祖宗以來未聞有獻議欲補助形勢起建樓閣為議者不知今議何從而起太史董惟正一人之言亦何可依據臣愚雖不習知地理而嘗聞地道以寧靜為貴今若補貼闕陷不免旁近取土深逺畚鍤之衆能無傷乎加以斧斤斫削之聲聞於逺近如此而欲求地道寧靜非所宜也竊慮惟正意在觀望承順而為此説若朝廷必欲如其所請即乞下其議于太史局令衆官參議結罪聞奏庶幾不出一人之私臣或聞先朝嘗有意於此而議終不行伏思先帝之得陛下及諸王果自於此乎陛下仁慈智聖有同於思齊之文王則百斯男不祝而有宗社之慶神明隂相何在岡勢哉臣欲望聖慈省察更賜謹重以圖地道寧靜庶佐多福又言臣近具奏論太史董惟正所定夷門山岡合修寺院切慮惟正意在觀望承順而為此説乞下太史局令衆官參議庶幾不出一人之私尋聞太史局集二宅尅擇官馬士廣等四十七人看詳即無於外修清靜寺院應助福德王利之方經據果見惟正所定殊無經據不合衆論出於其私務在觀望其迹顯然朝廷宜即加惟正欺罔之罪仍罷其役乃慰中外之望而近日以來竊聞凖前指揮興役不惟臣愚滋惑京師之人莫不惑焉書曰三人占則從二人之言今不從士廣等四十七人所定而獨信惟正一人之私非所以示至公而同衆志也臣契勘元豐年中府界提點楊景略奏將帶二宅官王明等按視定奪到夷門山岡勢不得穿鑿先帝竟從其議陛下仁慈篤於繼志尤宜深體先帝所以不欲穿鑿岡勢之意以寧一地道自然聖嗣蕃衍如先帝得陛下及五王之盛豈俟他求哉臣又聞太史局言所修寺地在夷門山岡之外若修寺即無利若不修亦無害且朝廷廣費財用重勞工役亦冀有所益爾不然徒費財用枉勞工役獨使建議者得遂其私甚無謂也書曰不作無益害有益可不戒乎况今國家上至郊廟寺觀禁庭宫院省寺廄庫所合修治補葺凡八十有餘處但以向者併工帷宫有所未暇今能易夷門山岡無益之役以及郊廟等處則人神安悅為福豈可量哉臣愚欲望聖慈詳酌士廣等四十七人定早賜睿旨寢罷工役庶免穿掘基地填貼客土不勝幸甚臣猥當言責不敢緘默干冒誅戮不任戰兢畏惕之至此據蔡蹈奏議附見當徐考之紹聖二年三月十七日蹈為監察元符元年十二月十四日遷考功詔吕升卿差充廣南西路察訪指揮更不施行二月十七日又三月四日後三日董必自東路改使西路事在初七日今并書罷吕升卿察訪廣西或因曾布有言或王鞏所見得之不因布言也更須考詳又恐升卿自國門還朔部是去年冬季清臣事此察訪廣西乃别欲誅二蘇等其罷或果由布言更詳之邢恕言行録云紹聖議遣吕升卿察訪廣西章惇意欲使之盡害諸竄斥者恕聞之在講筵力陳本朝享國安寧度越唐漢良由祖宗以來未嘗誅殺大臣德澤所致哲宗釋然俾寢其行又特宣諭云也不到得時升卿為河北轉運特召赴闕恕仍奏云國朝自來未有遣别路漕臣為察訪者升卿天資刻薄果於殺害故惇選用之爾恕退朝有喜色家人問其故曰吾今日有一善事子孫當享其報矣此蓋恕家傳飾説今不取初章惇蔡卞謀以更毁先烈為説將置元祐臣僚於死地甚則誣及宣仁聖烈皇后有廢立意時左司諌陳次升一日奏事畢即前曰臣有危悃不避死亡上瀆天聼冀陛下一悟臣聞朝廷欲於宣仁聖烈皇后有所貶削果然乎宣仁聖烈皇后保祐聖躬九年功德巍巍四海歸心升遐之日海內如喪考妣若以姦人疵毁輒有議論不唯有虧聖孝恐必失人心上俯首曰無之次升曰臣敢為陛下賀上曰卿何從得此次升曰臣以言為職茍有所聞當以忠告陛下不當詰臣所從來及遣吕升卿按察廣南次升又言陛下初欲保全元祐臣僚今乃欲殺之耶上曰無殺之之意卿何為出此語次升曰以吕升卿為廣南按察豈非殺之耶升卿乃惠卿之弟元祐中嘗監真州轉般倉負罪恐外臺按發嘗託疾致仕太皇太后上升自真州泛小舟隱姓名不七日至京師投匭上書其人資性慘刻善求人過失今將使指於元祐臣僚遷謫之地理無全者於是升卿罷行此據升卿行實附見行實又云元城劉器之嘗目陳當時有功於元祐人為多樞密院言河東路經略司奏今相度葭蘆寨西北榆木川北嶺上塞地去葭蘆寨二十里周圍據險南有小溝泉脈勇壯可以開井控扼得隔祚嶺荒土平瑪克朗三處賊馬來路及包護得烏龍谷韋子川一帶種耕地土後倚葭蘆寨實為便利詔孫覽如果便利即依所奏仍精選兵將官統制兵馬前去進築三月四日奏乞城榆木川四月七日進築十一日賜名布録癸丑詔河東相度進築榆木川蓋葭蘆之屛蔽也鍾傳奏率秦鳯師進築淺井三省樞密院言本無朝旨而傳擅為此舉以二十九日已興役不可遏但進呈訖布録癸丑甲寅工部言淮南開河所奏請開修楚州支家河其河係導引漣河與淮水相通乞賜名為通漣河從之江淮荆浙等路制置發運司言諸路州軍合起上供有額錢物如本州官司不依限計辦人船等足備並科杖一百從之新無可削丙辰朝請大夫充集賢殿修撰知陳州劉定為寶文閣待制知青州已而御史蔡蹈論定老病凋殘義當賜玦不應進登侍從且付巨藩上欲罷之章惇猶擬定入對曾布及黃履謂惇曰外議以罷為允何必更令入對定遂罷十六日除張舜民熙河蘭岷路走馬承受周圭言自來經略司機事不許走馬承受參知致聞奏多有後時乞經略司差發軍馬前一兩日關報將佐人馬數目及沿邊按撫司并極邊城寨有邊事賊馬出沒不移時密切關報以憑聞奏詔遇軍興差發軍馬行日速具數目關報鄜延路經略安撫使吕惠卿言米脂寨畢工乞賜新名詔仍舊以米脂寨為名二月一日十六日五月二十三日可考布録鄜延奏米脂畢工得旨仍舊名賜帥臣以下茶藥等環慶言進築恰伊克寨詔賜軍士特支布録在丁巳賜寨名在十六日詔今後未經漢官差遣歸明蕃官使臣仍舊𨽻屬兵部如立功優異委經略司保明聞奏當議審察取旨丁巳詔五王外第以懿親宅為名江淮荆浙等路發運司言乞應盜買綱運官物除元約數外盜取者計贓以竊盜論加三等強取者依強盜法從之吏部言四選通用在任成資不因罪犯移替許理為任條制欲入曾被對移破考雖還本任通及二年者不在此限及差使借差雖未及二年聽通理若因事對移及衝替之類者不在磨勘之限從之新本刪要今用之軍器監言勾押官前後行等乞依太府寺不許陳乞抽差從之新削是日誅虎翼卒趙立立有訕上語斷手足口舌腰斬告人與將虞候曾布因言近日謗訕者多度日前亦非無此等語但告訐者少爾比因賞告者而開封及三帥司此獄相屬不絶若稍寬犯人及勿賞告者且嚴責本轄人員覺察則庶幾稍止上曰既告有實何可不賞布曰小人無知輕易謗訕非不痛懲而不可遏但恐告者寖多誅殺亦廣於觀聽為不足爾馬步軍都虞候曹誦以立故乞罷軍政詔釋其罪朝奉郎開封府推官王詔為工部郎中宣德郎大理正錢蓋為開封府推官朝奉郎太僕寺丞王敷提舉河北路常平承議郎衛尉寺丞蔡肇提舉永興軍路常平宣德郎董嗣之徙開封府界奉議郎提舉河北路常平鄧洵仁為荆湖南路轉運判官布録丁巳虎翼卒誅曹誦乞罷軍政詔移鼎庚申戊午昭化軍節度使開府儀同三司安康郡王宗漢為彰德軍節度使進封嗣濮王寶文閣待制環慶路經略安撫使孫路為龍圖閣直學士差遣如故賞進築之功也正月五日又二月二十九日又三月七日十一月十六日十九日二十四日先是輔臣以鍾傳陸師閔進築乖繆共議降黜曾布因言諸路進築唯環慶不煩朝廷督責又一切調度默然辦集未嘗有所須索兼所至皆神速成就灰家觜方畢又已進築恰伊克據橫山腹心實可嘉奬章惇曰初言者以路為繆不足任帥事今乃獨過於衆人上亦以為然故有是命三省言究治取問所奏前皇城使張士良辭服士良以御藥院官給事宣仁聖烈皇后與陳衍更直宫中掌文書衍主看詳進呈定其所降付士良書其事于籍其所降付某處其所從違某事皆衍自與奪頒降未嘗以聞上聽間有臣僚奏請東朝還政者衍輒詆之曰此不忠不孝之人也匿其奏置匱中不以聞東朝亦不以聞于上及與吕大防往來以合密賜大防妻皆不聞上坤成節北使朝見太皇坐間痰發扶掖坐殿後御閣衍指揮簾外使臣依次第虛進酒上食至畢外廷皆不知奏除范純仁右僕射召文彥博平章事於是翰林學士承旨蔡京右諌議大夫安惇言臣等伏覩元豐八年大臣輔立陛下內則選建親近以為翊贊外則遵依法度以定紀綱上則請垂簾權同聽政以固根本司馬光劉摯吕大防等忘先帝厚恩棄君臣之義乘時伺便冒利無恥交通中人張茂則梁惟簡陳衍之徒躐取髙位快其忿心盡變先帝已成之法分布黨與悉據要權公私詆誣無所忌憚既而自知其罪終不可逭深懼一日陛下親政則必有欺君罔上之刑乃回顧却慮隂連內外包藏禍心密為傾搖之計於是疏隔兩宫及隨龍內侍十人悉行放罷以去陛下之腹心廢受遺顧命元臣置以必死之地先帝任事之人無一存者以翦陛下之羽翼先帝之所治而得罪者縱而釋之以立陛下之仇敵先帝之所惡而棄者收而用之以植陛下之怨讎以王府為要途以朝廷歸私室上下協比同惡相濟意在不測天錫陛下聖知沉機淵默不言九年側身端拱無毫釐之差羣姦無以伺其隙衆惡不能成其志宗廟之靈社稷之福也此固不待指數而天下曉然易知也然姦黨交結其操心危慮患深蹤迹詭祕世莫得聞至於焚棄毁滅無復考驗前日雖已竄逐擯廢而姦謀逆節蓋未白於天下也臣等幸被詔旨詢究本末乃於焚棄毁滅之餘得其情狀其無君之惡同司馬昭之心擅事之迹過趙髙指鹿之罪天地之所不容人神之所共棄蓋至今日其惡遂彰明較著如此臣等竊覩上項事節大逆不道迹狀明白揆之以義讞之以法死有餘責所有臣衍罪在不赦亦乞更賜審問正以國法詔衍特處死李􅐉十朝綱要杖殺朱崖流人陳衍令廣西轉運副使程節涖其刑徙士良羈管于白州初章惇蔡卞恐元祐舊臣一旦復起日夜與邢恕謀所以排陷之計既再追貶吕公著司馬光又責吕大防劉摯梁燾范祖禹劉安世等過嶺意猶未慊仍用黃履疏髙士英狀追貶王圭皆誣以圖危上躬其言寖及宣仁聖烈皇后上頗亦惑之最後起同文館獄將悉誅元祐舊臣內結宦者郝隨為助專媒孽垂簾時事建言欲追廢宣仁聖烈皇后惇卞自作詔書請上詣靈殿宣讀施行太后方寢聞之遽起不及納履號哭謂上曰吾日侍崇慶天日在上此語曷從出且上必如此亦何有於我皇太妃同皇太后諌上語極悲切上感悟取惇卞奏就燭焚之禁中相慶隨覘知亟以語惇卞明日再具奏堅乞施行上怒曰卿等不欲朕入英宗廟乎抵其奏於地張士良者前竄雷州惇卞逮赴詔獄欲使證宣仁聖烈皇后果有廢立意及士良至既以舊御藥告并列鼎鑊刀鋸置前謂之曰言有即還舊官言無則死士良仰天哭曰太皇太后不可誣天地神祗何可欺也乞就戮京惇無如之何但以陳衍罪狀塞詔宣仁聖烈皇后追廢之議由是得息而惇卞終不肯釋元祐舊臣京惇進呈摯等事目上曰元祐人果如此乎京惇曰誠有是心然反形未具上曰摯等已責遐方朕遵祖宗遺志未嘗戮大臣其釋勿治此移參取新舊録别修按曾布日録云自春以來三省之言浸及宣仁此紹聖四年事也今用為據其他皆從新録新録大抵取邵伯溫辨誣惟隨媒孽及欽成亦同欽聖諫哲宗哲宗焚奏稱不欲入英宗廟等皆伯溫所不記也伯溫記士良貶所亦誤新録蓋得之但不知新録據何書耳伯溫又云時宣仁喪未除按宣仁禫祭在紹聖二年十一月三十日據曾布日録惇卞謀追廢實在四年春以來伯溫誤矣新録已改之然新録所稱適有星變詔曰朕遵祖宗遺志未嘗戮大臣釋勿治此亦因伯溫致誤星變後同文獄究治如故明年二月尤詰問尚洙李洵等更遣吕升卿董必使廣南寧有釋大臣勿治之詔曾布日録星變後哲宗答曾布嘗有此説或伯溫緣此致誤也今移入元符元年三月九日杖殺陳衍時同文之獄自緣無證驗乃罷與星變殊不相干右謂因星變止絶追廢之謀則可然他書初不如此説今亦不敢去之新録削去舊録三假今復存之明知其誣謗又何須削去其他皆倣此惇卞亦不能遂行追廢之謀猶欲盡誅元祐故臣上問元祐人果如此乎蓋疑其不然也京惇答以反形未具雖京惇亦不能羅織此天也上緣此因有釋勿治之詔而舊録不載且移摯等已責遐方為京惇語惜新録但削去不辨今既存之大略加刪潤庶後世有考焉又按摯等去年死距今九十餘日矣朝廷那得不知所云已責遐方尤恐未然須更詳之舊本云三省言究治取問所奏前皇城使張士良辭服士良以御藥院官給事宣仁聖烈皇后與陳衍更直宫中掌文書衍主看詳進呈定其所降付士良書其事于籍其所降付某處其所從違某事皆衍自與奪頒降未嘗以聞上聽聞有臣僚奏請東朝還政者衍輒詆之曰此不忠不孝之人也匿其奏置匱中不以聞東朝亦不以聞於上及與吕大防往來以合密賜大防妻皆不聞上坤成節北使朝見太皇坐間痰發扶掖坐殿后御閣衍指揮簾外使臣依次第虛進酒上食至畢外庭皆不知奏除范純仁右僕射召文彥博平章事於是翰林學士承旨蔡京右諌議大夫安惇言臣等伏覩元豐八年大臣輔立內則選建親近以為翊贊外則遵依法度以定紀綱上則請垂簾權同聽政以固根本司馬光劉摯吕大防等忘先帝厚恩棄君臣之義乘時伺便冒利無恥交通中人張茂則梁惟簡陳衍之徒躐取髙位快其忿心盡變先帝已成之法分布黨與悉據要權公私詆誣無所忌憚既而自知其罪終不可逭深懼陛下一日親政則必有欺君罔上之刑乃回顧却慮隂連內外包藏禍心密為傾搖之計於是疏隔兩宫及隨龍內侍十人悉行放罷以去陛下之心腹廢受顧命元臣置以必死之地先帝任事之人無一存者以翦陛下之羽翼先帝之所治而得罪者縱而釋之以立陛下之仇敵先帝之所惡而棄者收而用之以植陛下之怨讎以王府為要途以朝廷歸私室上下協比同惡相濟意在不測天錫陛下聖智沉機淵默不言九年側身端拱無毫釐之差羣姦無以伺其隙衆惡不能成其志宗廟之靈社稷之福也此固不待指數而天下曉然易知也然羣姦交結其操心危慮患深蹤迹詭祕世莫得聞至於焚棄毁滅無復考驗前日雖已竄逐擯廢而姦謀逆節蓋未白於天下也臣等幸被詔旨詢究本末乃於焚棄毁滅之餘得其情狀其無君之惡同司馬昭之心擅事之迹過趙髙指鹿之罪天地之所不容人神之所共棄蓋至今日其惡遂彰明較著如此臣等竊觀上項事節大逆不道迹狀明白揆之以義讞之以法死有餘責所有陳衍罪在不赦亦乞更賜審問正以國法詔衍得處死令廣西轉運副使程節蒞其刑徙士良羈管于白州先是章惇蔡卞痛詆垂簾結中官郝隨為助言於上欲追廢宣仁聖烈皇后自皇太后皇太妃皆力爭之上感悟焚惇卞所奏章隨覘知之不悅密語惇卞明日再上奏堅乞施行上怒曰卿等不欲朕入英宗廟乎以其奏抵地惇卞不得已請於雷州取宣仁殿御藥官張士良付詔獄士良至既以舊御藥院告并列鼎鑊刀鋸置前謂之曰言有即還舊官言無則就刑士良仰天大哭曰太皇太后不可誣天地神祗何可欺也乞就刑奏至不以惇卞為直遂徙士良白州押赴貶所舊録云間有臣僚奏請東朝還政者衍輒詆之曰此不忠不孝之人也匿其奏置匱中不以聞東朝亦不以聞於上及與吕大防往來以合密賜大防妻皆不聞上新録辨曰宣仁遺詔大欲釋天下之重負就東朝之燕間復辟以時實吾之志是臣僚前此未嘗有請還政奏章或有之則宣仁在上豈容陳衍藏匿又吕大防妻為國夫人必嵗時入朝三宫如太皇太后賜合容有不必聞上之理史官此言亦屬誣謗今刪去前件五十九字舊録云奏除范純仁右僕射召文彥博平章事新録辨曰宣仁進用大臣豈至謀及中官史臣妄意簾帷易欺增重陳衍之罪所以汚讟聖母不知無根輕發不可以欺天下後世今刪去前件十六字舊録云先是文及甫元祐五年以書抵邢恕其書有司馬昭之心路人所知及以眇躬為甘心快意之地可為寒心其徒實繁氣焰可畏等語於是詔恕繳元書書至命京惇究問及甫蓋以劉摯為司馬昭以眇躬為主上其徒謂王巖叟梁燾劉安世孫升韓川等輩京惇進呈上曰元祐人果如此京等曰誠有是心然反形未具上曰摯等已責遐方若陳衍朕親見之不可貸故有是命新録辨曰文及甫書乃六十四卷粉昆事不當再録於此此事是宣仁聖烈事迹册中具載惇卞欲廢宣仁哲宗怒抵其奏於地遂追張士良于雷州將脅成其獄以逞餘憤士良不可屈而罷今云上親見陳衍之罪蓋誣也刪去前件一百四十四字新録紹聖元年二月七日先是元豐七年三月大燕中燕定安郡王侍立王圭率百官賀及升殿神宗又諭王與圭等相見復分班再拜稱謝是冬諭輔臣曰明年建儲當以司馬光吕公著為師保神宗彌留后敕中人梁惟簡曰令汝婦製一黃袍十嵗兒可衣者密懷以來蓋為上倉猝踐祚之備神宗太母所以屬意於上者確然先定無纎介疑邢恕傾危士也少逰吕光著間蔡確得師保語求所以結二公者而深交恕確為右僕射纍遷恕起居舍人一日確遣恕要后姪光州團練使公繪寧州團練使公紀二人辭不往明日又遣人招至東府確曰宜往見邢舍人恕曰家有桃著白華可愈人主疾其説出道藏幸留一觀入中庭紅桃花也驚曰白花安在恕執二人手曰右丞相令布腹心上疾未損延安幼沖宜早定議岐嘉皆賢王也公繪等懼曰君欲禍吾家徑去已而恕又謂后與圭為表裏欲捨延安而立其子皓賴已及惇確得無變確使山陵韓縝簾前具陳恕等所以誣太后者使還言者暴其姦再貶知隨州尋竄新州劉摯拜左僕射恕坐黨與謫永州酒稅紹聖二年除恕待制知青州章惇蔡卞執政謀所以釋憾於元祐舊臣者知恕險鷙果於誕罔又劉摯等已黜方思有所逞為確報投荒之怨召為御史中丞於是日夜論劉摯梁燾王巖叟等謀廢立又造司馬光送范祖禹赴召有主少國疑宣訓事可慮等語以實后屬意徐邸之謗又誅髙士京上書告王圭嘗令髙士充問其父遵裕偵太后之意欲誰立遵裕叱遣士充乃去又教確之子渭進文及甫庾語書有司馬昭之心路人所知等語以斥摯等有廢上謀惇卞起同文館獄使蔡京安惇窮治於是時中人郝隨日夜媒孽稱制時事昡惑左右惇卞交關牒議奉行文書於外作追廢太皇太后詔請上宣讀於靈殿欽聖獻肅皇太后欽成皇后苦要上語甚悲曰吾二人日侍崇慶天日在上此語曷從出且必行此亦何有於我上感悟取惇卞奏就燭焚之禁中相慶而隨等不悅明日惇卞理前請上怒曰卿等不欲朕入英宗御殿乎抵其奏於地同文之獄追建后殿御藥官張士良脅以刀鋸鼎鑊無所得又適有星變詔曰朕遵祖宗遺志未嘗戮大臣釋勿治恕徒以詘於進取極口造言仇執政以逞適惇卞用事凶德參會捨不利之謀無以激怒人主廢辱之幾上及於君親曾不以為忌而尚何有於臣下之家推迹讒口開禍亂原雖江充息夫躬尚何以加新録大抵用邵伯溫辨誣刪修惟桃著白華及郝隨媒孽及欽成亦同欽聖諫哲宗焚奏不欲入廟等語皆伯溫所不記新録既於宣仁傳後敘此又於張士良貶白州時重出之要當去一存一乃善邢恕以紹聖二年十二月自青州入為刑侍四年正月改吏侍五月權吏書七月兼侍講十月遷中丞司馬光坐宣訓事貶乃四年四月十八日髙士京上書乃四年二月同文獄起乃四年八月恕作此三事時皆未遷中丞邵伯溫記云先後稍差池新録不考詳遂因之要當改正張士良以紹聖元年二月二十二日與陳衍梁知新罷御藥士良提點醴泉任便居住六月五日陳衍落遙刺降左藏副使添差監郴州酒稅六月十二日皇城使張士良皇城副使梁知新添差監頴州亳州鹽酒稅六月十八日陳衍送白州編管二年正月二十六日陳衍配朱崖軍士良自紹聖元年六月十三日以皇城使監頴州稅其後不見再貶邵伯溫云已編白州誤也對獄乃送白州新録稱於雷州取士良或得之但不知何所據耳曾布三月辛亥日録乃在郴州今附布録於後曾布日録三月辛亥布既論吕升卿董必不可遣是日晚間梁燾卒布謂林希曰早知此則不復力陳矣先是紹聖初蔡確毋明氏有狀言邢恕云梁燾曾對懷州致仕人李洵言若不誅確於徐邸豈得穩便尋不曾施行既而因及甫唐老事蔡渭白惇云唐老事何足治何不治梁燾惇遂檢明氏狀進呈下究問所推治究問所以問恕恕云得之尚銖遂召銖赴闕銖所陳如恕語云得之李洵又下洵問狀云實聞燾此語遂欲按燾而徙之自去嵗因蔡碩言文及甫嘗有書抵邢恕云劉摯有司馬昭之心行道之人所共知即下恕取及甫書恕以聞仍差蔡京安惇置究問公事所於别試所攝及甫語之曰得之父彥博然終無顯狀京又令及甫疏摯黨人約於上前如龔原孫諤輩皆是又以及甫言未可施行謂摯等與陳衍等交通有廢立意乃召郴州安置官者張士良鞫之士良與衍同為御藥主宣仁閣中文字而其言亦無顯狀但云衍嘗預知來日三省所奏事作掌記與太母為酬答執政之語太母垂簾但誦之而已又言太母彌留時衍可否二府事畫依畫可及用御寶皆出於衍而不以稟上既而獄終未決及甫時在西京士良寄禁府司雖議誅陳衍已定而尚于絞斬有疑殊可笑也劉摯曾孫苪紹興六年四月繳進其祖父跋建中靖國元年二月訴理其父寃事狀云蔡京乞廢棄劉摯子孫紹聖五年四月二十五日進呈送三省五月四日三省進呈訖劉跂辨謗録云靖國元年二月二十日見安燾説張士良內臣獄中百端誘脅並無虛説人甚竒之又見韓治説士良供通云别是一卷與及甫不相于但同在究治所耳纍次見之未得今就白鐵班所居處見之説自白州編管令過闕既到城外開封吏監送軍巡寄禁半月日忽夜送一處簾前語問先示以知而不告同罪條又許以見聞贖罪凡四五十日却還白州問以及甫事乃不相干跂更不敢復問户部言乞令吏部選差熟藥所監官一員從之新削樞密院言涇原路經略安撫使章楶奏見修築九羊谷城寨有沒煙前後峽正原等處合行進築其應干糧草材植及防城器具未備乞務先辦集及候農隙日興工詔從之楶初奏二月十七日丙午又言河東乞於府州安豐寨外修築第九寨只是遮護府州部族人民耕種堡寨不須團聚兵馬詔河東經略司令知府州折克行只用本州漢蕃人兵依上畨例支給錢米候有間隙日修築先令條畫聞奏四月十二日賜役兵十七日畢工詔以宣德郎正字朱長文卒賜其家絹百匹户部言欲將應府界遞年認定應副在京稅斛令司農寺置籍拘管及令府界提點司夏秋具合科色類數目去處關本寺令受納官司供納訖收附一面關報府界提舉司檢點類聚申司農寺鈎考訖保明申部覆行驅磨如不足依條施行於次年補足從之新無陜西都轉運司言乞今後應川路州軍起發到應副本路綿絹如有偽濫不堪其元買納處當職官吏許從本司移文所屬轉運司取勘具案聞奏從之新無權户部尚書吳居厚言乞今後令提點坑冶鑄錢司據江池饒建州合用銅每年支撥足備若應副不及九分即依鈎考上供錢帛法從本部委不干礙官司勘決人吏闕數稍多本司官亦量事理申奏乞從朝廷指揮其欠數限次年春季補足從之詔雄州𣙜場不依樣納布監司降一官通判展二年磨勘北客已般到布令減價收買今後不如樣者須退回如違重行停替監司常切覺察霸州等處𣙜場並依此施行北客所中布嵗充軍人冬裝景祐以前布極厚重自後𣙜場因循一嵗不及一嵗近年以草織成如魚網狀昨酌中取元祐初布為樣比舊已極不堪而主者尚不肯遵依受如故吳安持等皆言當且姑息轉運司又以不買布則當支見錢故利於博買以此上下相蒙不肯如朝旨施行故戒之此據布録戊午日事附見當考吳安持以紹聖三年十月帥真定庚申涇原路經略使章楶言歸順部落子都勒滿登等稱西賊點集大兵已到沒煙峽口慮旦暮入冦難以枝梧已牒環慶秦鳯經略使依先降朝旨䇿應乞更賜指揮詔逐路經略司候見涇原路關報立選將佐人馬前去䇿應毋致闕事其餘合牽制路分亦令照會仍令涇原路經略司密切審問都勒滿登等投漢情實聞奏樞密院言去年纍降朝旨令熙河蘭岷路經略安撫都總管鍾傳秦鳯路經略安撫使陸師閔會合進築丹喇關續據鍾傳奏乞會涇原熙秦三路兵馬進築天都遂依所乞傳等奏乞且各於本路進築又奏乞相度齊訥納森或從近自丹喇關進築繼請知通逺軍康謂通判李深勾集招人甲頭廣募弓箭手等稱包得淺井伽羅和市等處其地利不異收復定西及蘭州須先於淺井及斯伯勒川各置城寨逐處皆有甘泉最宜飬收及秦鳯於巴精谷增置一寨及總領逐路人馬至淺井會合本川土脈膏腴井泉甘美已破土修建於次日奏稱淺井泉源不壯及與陸師閔議欲同築伽羅古城既而又稱審問得本路諸將皆稱水源復流勢難決引恐難成進築事牒陸師閔郍回兵馬傳回定西相度只用熙河事力進築丹喇關等事鍾傳前後奏報反覆異同其所陳失實若不重行降黜無以懲戒其康謂李深及走馬承受滿志行亦合行遣詔鍾傳特落集賢殿修撰降為通直郎權管勾熙州兼權簽書熙河蘭岷路經略安撫都總管司事陸師閔降為朝散郎落集賢殿修撰充直祕閣康謂李深滿志行各特追降因熙河路賞功所轉官減年等仍並不用敘法內滿志行衝替初輔臣皆言傳措置乖謬當黜降章惇便欲罷之曾布曰且削職令管勾簽書帥司事上以為然十三日陸師閔改命十六日傳又降十九日滿志行改命二年三月二十三日傳師閔等再責鍾傳本傳云築丹喇關賜名通會已而坐議異同築淺井不成禠職降秩祐聖邸報云樞密院奏勘會鍾傳奏乞進築去處有違朝廷纍降指揮顯屬輕易舉動反覆異同不當其逐次奏報各有誕妄不實及陸師閔一向依隨並無措置若不重行降黜無以懲戒康謂李深亦是預議之人及隨軍走馬滿志行並無奏報理合行遣三省樞密院同奉聖旨並且在逐路責其後效內鍾傳特落直龍圖閣降通直郎主管熙州兼權簽書熙河蘭岷路安撫都總管司公事陸師閔特降一官落集賢殿修撰充直祕閣康謂李深滿志行衝替係公罪事理重餘差遣依舊除逐人降官落職及差遣并追支賜别降指揮外其滿志行衝替并追減年及不用敘法并康謂權熙河蘭岷路都監權知通逺軍布録三月癸丑鍾傳奏率秦帥進築淺井本無朝旨而傳擅為此舉以二十九日已下手不可遏亦不答但進呈訖戊午同呈邊報鍾傳陸師閔奏進築淺井以無水泉而罷又欲移築伽羅而水亦伏流不可引決恐難成築事已牒師閔領秦帥還秦傳自以熙河事力進築丹喇關乃朝旨素令築之處二府皆言其措置乖繆當降黜章惇便欲罷之曾布曰且削職令管勾僉書帥司事上以為然布曰俟詳其罪狀後日進呈取旨樞密院又言環慶路經略司奏鈐轄張存統制人馬進築西恰伊克寨有西蕃大首領李額葉將妻男并人户約千人牛羊孳畜等歸附又走馬蓋橫奏收到李額葉手下投來共二千七十人牛馬羊駝四千五十西界部族見首領歸漢不輟節次投降按額葉係蕃中老將習練邊事素多智計將全家及部族歸漢即西賊困敝上下離心滅亡不久况諸路近人進築城寨逼近西人住坐巢穴逐路必有願欲歸漢之人詔李額葉特除宥州刺史充環慶路沿邊兼橫山至宥州一帶蕃部都巡檢使仍令環慶路經略司依元降條格給與金帶通格內合賜銀絹錢共持賜錢四千貫銀絹各三千匹兩及相度優給與田土住坐并優以恩意撫存待遇無令一行上下部族小有失所其一行人除依格支賜外內合補名目者速具等第奏當議格外優與推恩并陜西河東逐路經略司乘此事機具李額葉投漢事狀及朝廷待遇存恤次第多方傳逹信息招誘近上首領携挈部族歸投或乘伺間隙出師討蕩逼令歸附仍嚴戒兵官將士不得殺戮老小婦女如生獲到人口並依先降指揮優與酬賞即妄殺老小婦女亦當重行斷遣十九日賞張存二十五日額葉改命李公裕作孫路墓志云敵有李額葉者勇而有謀對環慶為監軍且內冦不已朝廷患之公建議願以謀取之計日可得乃使人諭額葉曰汝失安強在汝國所繫甚大汝主欲擒汝而戮之乃欲以鼠竊之微勞贖失地之大罪蓋已疏矣吾若遣人以利害間而主汝得生乎吾度汝可用欲以為籬落故未忍也汝自計當如何因出敕榜示之額葉感泣以其衆八百人降上喜進龍圖閣直學士賜豫特厚路自寶制加龍直在三月九日環慶又乞錦襖子凖備賜降人特賜紅錦一千青錦二千辛酉工部言乞文思院等處工作合雇人入役者具人數單于監門官點名放入委監官檢察功程及造到名件仍各置歷即日抄上結押每旬申少府監點檢違者各杖一百從之新無可削刑部言將銅錢出雄霸州安肅廣信軍北梢門并過鮑河入兩地供輸地分等法從之新有亦可削壬戍鎮安武勝軍節度使開府儀同三司申王佖加守司空改保平奉寧軍節度使平江鎮江軍節度使開府儀同三司端王佶加守司空改昭德彰信軍節度使朝散郎直祕閣知潭州張舜民為直龍圖閣權知青州十六日罷樞密院言去年纍降朝旨令諸路期約乘西賊未能點集之時出其不意前去討蕩渡河深入直搗賊巢後來諸路各行進築未曾同時舉動緣西賊去嵗不熟今來春深正是人飢馬瘦上下離二事力困弱不能點集又諸路進築各有次第可以期約併兵深入覆賊巢穴之時詔吕惠卿孫覽章楶孫路陸師閔鍾傳詳此候進築城寨畢日人馬歇泊預選統制官將佐使臣及分擘隊伍整齊戰具計置糧草乘西賊未能點集之際相度機會互相關報期約兵馬去至興靈以來破蕩賊巢務在措置精審決保萬全方得舉動不得輕易敗事時執政議遂欲合諸路兵取興靈知河東孫覽曰興靈未可取也乃移書二府具言興靈非餘力可下且曰興靈之舉曩嘗聞餘議於相君矣要使陜西不知用兵而以嵗月下之竊私美至計長䇿無已而令反欲速何耶不聽更上疏論其事二府怒覽尋坐責覽降職在五月二十九日此據畢仲遊墓志仲遊云曾布怒尋以擾奪職按章惇實當國賞罰豈聽曾布仲遊殆偏辭耳今略刪潤之然據布録其怒覽者實布也更詳之詔秦鳯路經略安撫使陸師閔特降一官餘併依舊今月十一日落集賢殿修撰指揮更不施行先詔秦鳯路以兵將會合熙河路人馬進築城寨其應進築事並聼鍾傳措置而師閔削職太重故有是命十一日布録又云師閔於進退不專但以素有伽羅之議故并康謂李深皆降官而已二十四日癸酉陳次升乞再責師閔等次升不知進築事不在師閔上云已諭之尚書省言太常寺與閣門修定刈麥儀車駕出將至籍田門外禮部太常寺官籍田令迎駕起居訖赴殿下西向侍立上御思文殿宰臣以下依次分東西升殿侍立刈麥人員以下起居訖各執器用排立候閣門使詣御座前承旨臨階傳付有司刈麥訖揉取麥粒約合用以黃絹袋封貯置於腰舁覆以黃帕籍田令引詣殿下北向投進內侍降階取麥進呈訖付有司閣門使御前承旨臨階宣付籍田令付有司變造禮食以俟薦獻宗廟籍田令授訖再拜退俟乘輿次赴插稻綵殿降輿升御座插稻人員起居訖閣門使詣御座前承旨臨階傳付有司兵士一名駕牛一具以水碌軸自稻池西南角下池往來訖於東岸上出次插稻訖上降座退幸玉津園如閣門儀秋刈禾凖此從之
