body:
  text: 續資治通鑑長編卷一百九十三宋李燾撰仁宗嘉祐六年春正月辛卯判大宗正事允弼請以潭王宫教授周孟陽等編修本司所降宣敕劄子從之孟陽海陵人也壬辰翰林學士王圭權知貢舉乙未詔有司製南海廣利洪聖昭順王廟所用冠服及三獻官太祝奉禮祭服罷本廟所賜樂曲初駕部員外郎通判廣州吕遘言奉祠南海王廟雖有鐘鼓之設及所賜樂曲而樂工未嘗肄習又其器服制度不應祀典請下禮官考詳而禮官言南海據令為中祠宜如嶽瀆諸祠不用樂因上其冕服及祠官祭服之制乃詔製而給之樂曲誰所賜當考權御史中丞王疇言比嵗兩制臣僚不得與執政相見及臺諫官往還議出一時初無典故當時論者即以為非今執政與諫官已弛其禁而臺官尚設科防臣愚以為臺官主於議論以補天子之聞見豈一二人能周知天下事乎兩制侍從之臣皆國之選今偶或相見交自為疑非所以示朝廷之大體也請自今兩制亦許與臺官相見從之録雍州都巡檢內殿承制宋士堯子序為右班殿直卞為三班奉職以士堯與交址戰死也丁未詔判尚書考功祠部官告院自今並降敕差人理合入資序仍給添支十千故事尚書省諸曹惟判刑吏部南曹許理資序餘遇有闕即申中書中書判送某官謂之送印時以堂除差遣者衆又三曹皆有事守故以敕差之戊申降郢州防禦使宗懿為信州團練使宗懿葬其父濮安懿王而自以本命日不臨穴故也時任守忠護王葬事凌蔑諸子所饋遺近萬緡而心猶未厭宗懿得罪守忠實為之守忠事據記聞辛亥龍圖閣直學士傅永知制誥祖無擇同詳定寬恤民力事癸丑詔開封府自今有摹刻御書字而鬻賣者重坐之二月丁巳詔宗室賜名授官者須年及十五乃許計年轉官辛酉奉安眀德章穆皇后御容於普安禪院之重徽殿癸亥詔宗室上墳陵母得以黏竿彈弓隨行乙丑詔如聞良民子弟或為人誘𨽻軍籍父母泣訴而不得還者朕甚閔之自今有司審其所從來𨽻籍百日內父母訴官者還之按百日宋史作兩月與此小異丙寅御崇政殿録繫囚雜犯死罪以下遞降一等戊辰詔樞密院自今內殿崇班以上須年二十方聽受差遣辛未御崇政殿試禮部進士諸科及特奏名進士諸科三月乙酉召輔臣觀御書兖州至聖文宣王廟榜癸巳賜進士王俊民等一百三十九人及第五十四人同出身諸科一百二人及第并同出身特奏名進士諸科四十三人同出身及諸州文學長史俊民掖人也按宋史是月賜進士諸科及第同出身二百九十五人與此不合戊戍契丹歸眀人武圭為下班殿侍河北沿邊安撫司指使武圭本鎮州人陷敵嵗久頗知敵事至是上所畫契丹廣平淀受禮圖特録之己亥宰臣富弼以母喪去位庚子以富弼母喪罷大燕時同知禮院晏成裕言君臣之義哀樂所同請罷春燕以表優恤大臣之意上亟從其言成裕殊子弼妻之弟也議者或以為過云為大臣母喪輟燕仁宗盛德也而實録及㑹要乃云議者皆以為非是不然矣謂成裕與弼親嫌不當建請則猶可今略加刪潤也辛丑賜衢州進士程汝士周頴粟帛以轉運使言其文行推于鄉里也壬寅封皇第十一女為永夀公王第十二女為寶夀公王寶夀周賢妃所生後封冀國永夀董淑妃所生後封邠國甲辰詔翰林學士承㫖宋祁遇入直許一人主湯藥祁以羸疾請之也戊申幸後苑賞花釣魚遂宴太清樓出御製詩一章命從臣屬和以進詔禮院封柴氏後為崇義公以奉周祀其六廟在西京而嵗時祭祀無器服之數其令有司以三品祭服一以四品祭服二及當用祭器給之庚戍詔大理寺命官有不當書罪而捃拾文致者其本處官吏並鞫罪以聞從殿中侍御史裏行陳洙所奏也政要詳之不須具載夏四月戊午刑部郎中直昭文館冦平知潞州仍理轉運使資序侍御史陳經言平前為淮南轉運使市物不償價已嘗彈奏之請罷所理資序詔可庚申提㸃廣南西路刑獄屯田員外郎李師中權本路轉運使初師中劾知雍州蕭注治雍八年有峒兵十餘萬不能撫而用之乃入溪峒貿易掊斂以失衆心卒致將卒覆敗經略使蕭固措置乖謬與轉運使宋咸黨附注既責荆南師中復言注黷貨阻威誘略儂智髙所閹民羅寨五輩為奴又擅發溪峒丁壯采黃金無簿籍可鈎考為國生事案法當斬今就橫行降一官自都監作鈐轄不知此何名也詔遣中使李若愚鞫實注竟坐此責為泰州團練副使安置固及咸皆追官勒停按李師中傳注泰州安置固咸皆追官勒停注傳亦云為泰州團練副使安置與師中傳合實録乃於七月十七日書蕭固追三官責授檢校水部員外郎泰州團練副使宋咸追一官勒停㑹要並同實録獨不見蕭注有何罪罰疑實録㑹要所載蕭固追三官下必有脫字所載授檢校水部員外郎泰州團練使則蕭注事也王安石集有責蕭注制辭所載官位實與師中傳及注𫝊同今從師中傳及注𫝊先附見注罪罰并固咸追停於師中權漕之後其固咸所坐仍就七月十七日書之更俟考詳辛酉權三司使樞密直學士右諫議大夫包拯為給事中三司使拯在三司凡諸管庫供上物舊皆科率外郡積以困民拯特置場和市民得無擾吏負錢帛多縲繫間輒逃去械其妻子者類皆釋之二事或自有月日則此當削去詔嶺南官吏死于儂賊而其家流落未能自歸者所在給食護送還鄉甲子契丹國母遣林牙左威衛上將軍蕭扆四方館使寧州防禦使韓貽孫契丹遣始平節度使蕭礪崇祿卿李庸來賀乾元節庚午右正言王陶知衛州時臺諫共言陳旭不當為樞密副使上弗聽陶既引疾在告又先自乞罷因許之癸酉詔凡入資為郎至升朝者户役皆免之京官不得免衙前自餘免其身而止若入官後增置田産直五千萬以上者復役如初傭代者聽之丙子大理寺丞郭固編校祕閣所藏兵書先是置官編校書籍而兵書與天文為祕書獨不預大臣或言固知兵法即以命之然兵書殘缺者多不能遍補也庚辰樞密副使右諫議大夫陳旭為資政殿學士知定州三司使給事中包拯為樞密副使禮部郎中天章閣待制知諫院唐介知洪州右司諫趙忭知䖍州兵部員外郎兼侍御史知雜事范師道以本官知福州殿中侍御史吕誨知江州旭始除樞密副使或言旭隂結宦者史志聰王世寧等故有此命介等遂交章論列且言旭頃為諫官因張彥方事阿附貴戚已不為清議所與及知開封府嘗賤市富民馬納外弟甄昻於府舍恣行請託上以其章示旭旭奏臣前任言職彈斥內臣其桀黠用事如楊懷敏何誠用武繼隆劉恢輩多坐絀逐今言者乃以此汚臣志聰臣不識面世寧弟娶臣妻舅之孤女久絶往來若嘗薦臣陛下必記其語乞付吏辨劾遂家居求罷上以手詔召出之介等復闔門待罪頃之復出如是者數四上顧謂輔臣曰凡除拜二府朕豈容內臣預議耶而介等言不已故兩罷之陳旭宋史傳既載旭自辨語又云仁宗知言者非實以手詔召旭出載旭自辨語可也今亦具存之所稱仁宗知言者非實則有所緣飾矣他書皆無此今不取唐介宋史傳云介與趙忭王陶等論升之姦邪交結中人閻士良又與御藥王世寧連姻不可大用與王世寧連姻則吕誨章及升之自辨已見獨閻士良交結本末誨章并言史志聰或宋史誤以志聰為士良當考志聰至和元年正月為入內副都知嘉祐三年五月為入內都知宋史全書吕中曰宦官宫妾便於小人而不便於君子者也後世人主除拜大臣不詢於外朝而詢於內朝則過矣故石顯者貢禹元成之所倚也梁冀者胡廣趙戒之所託也髙力士者楊國忠之所恃也此自古小人未嘗不與宦官宫妾外戚為一者我朝所以無內朝之患以外朝之除拜在內不得而知內廷之請謁在外可得而抑之也初諸路敦遣行義文學之士赴京師者二十三人其至者十六人皆館于太學即舍人院試論䇿五月丙戍賜徐州顔復潤州焦千之成都張祀荆南藥京等七人進士出身四人同出身餘悉授試校書郎復太初子祀察子也時濮州李植道卒嶽州顧立有朞喪梓州章衮蜀州張中理處州吳戭廣安軍蒲伯眀越州吳孜等五人辭不就試復等既推恩亦以試將作監主簿命之張唐英政要云眀年又賜顧立同進士出身當考戊子司天言六月朔日當食六分半詔禮院檢詳救日典故以聞庚寅禮院請其日皇帝素服不御正殿毋視事百官廢務守司合朔前二日郊社令及門僕守四門巡門監察鼓吹令帥工人以方色執麾旒分置四門屋下龍蛇鼓隨設於左東門者立於北孰南面南門者立於東孰西面西門者立於南孰北面北門者立於西孰東面隊正一人執刀帥衛士五人執五兵之器立於鼓外矛處東㦸處南斧鉞在西矟在北郊社令立􅗋於壇四隅朱絲繩縈三匝又設黃麾在北龍鼓一面次之弓一矢四次之諸兵鼓靜立俟司天官曰日有變工人舉麾齊伐鼓祭告官行事太祝讀文其辭以責隂助陽之意司天官稱止工人罷鼓如日隂晦太陽不見即不舉麾不伐鼓從之乙未吏部侍郎集賢院學士余靖為尚書左丞廣南東路經略安撫使知廣州時嶺海猶未平也靖再辭而後受謝表云去嵗雍邊失䇿納彼逋逃峒獠恃强遂成侵擾邏司喪元而潰敗列郡聞風而震驚因驛騎以召臣俾單車而諭指雖島夷聼命願誅首惡之人而寨將貪功未絶交爭之患亦既與之約束各守封疆苟拜令之必行諒吾圉之能固猶以嶺服之外越徼相通俾臨此州以辦邊事去年八月體量安撫可附此丙戍詔諸知州軍及兵官許造酒者毋得賣易及以折物價丁酉天章閣待制知諫院吕景初同詳定均稅翰林學士承㫖兼端眀殿學士翰林侍讀學士工部尚書知制誥集賢殿修撰宋祁卒贈刑部尚書祁兄弟皆以儒學顯而祁尤能為文章善議論清約莊重不逮其兄論者謂祁不至公輔蓋亦以此祁自為遺奏曰陛下享國四十年東宫虛位天下係望人心岌嶪為社稷深計莫若擇宗室賢材進爵親王為匕鬯之主若六宫有就館之慶聖嗣蕃衍則宗子降封郡王以避正嫡此定人心防禍患之大計也又自為左志右志及治戒以授其子其子遵治戒不請諡久之張方平言祁法應得諡諡曰景文諡景文在治平三年今并書己亥馬軍副都指揮使淮康節度使張茂實落管軍知曹州初趙槩代韓絳為御史中丞亦言茂實不宜典宿衛未聽及槩為樞密副使復言之而言者又劾茂實販易公使所遣卒殺人于外茂實因以老自請解兵權始命出守翰林侍讀學士劉敞嘗奏疏言為國之道防患於未然逺嫌於萬一所以安羣情止邪謀也伏聞張茂實本周王乳母子嘗養宫中故往年市人以狂言動茂實頗駭物聽近者韓絳又以讒說傾宰相重搖人心則是一茂實之身逺則為小人所指目近則為羣臣所疑懼雖聖心坦然於物無猜恐未能家至户曉使人人不惑也假令茂實其心如丹必無他腸亦未能家至户曉使人人不憂也如此則備宿衛典兵馬適足以唘天下之惑動天下之憂甚非重宗廟安臣民備萬一之計臣謂今日之宜要令兩善莫若解茂實兵權處以外郡於茂實不失富貴而朝廷得逺嫌疑此最䇿之善者也昔王郎自稱劉子輿盧芳自號劉文伯因疑飾僞未必皆有犯上之心但流言驅扇羣情眩惑使之然爾臣忝近列方當逺出心之所疑不敢不極論乞以臣言密付執政商量敞時受命知永興久之茂實乃罷庚戍御崇政殿録繫囚雜犯死罪以下遞降一等徒以下釋之又遣官疏決三京詔凡府號官稱犯父祖名而非嫌名及二名者不以官品髙下並聽回避初翰林學士知審官院賈黯言伏見大理寺丞雷宗臣除太子中舍以父名乞回避從其請臣按曲禮曰不諱嫌名二名不偏諱釋者曰嫌名謂音聲相近禹與雨丘與區也偏為二名不一一諱也據律文諸府號官稱有犯祖父名而冒榮居之者徒一年釋曰府有正號府號者若父名衛不得於諸衛任官或祖名安不得任長安縣職之類官稱者或父名軍不得作將軍或祖名卿不得為卿之類又諸上書若奏事犯祖廟諱者杖八十若嫌名及二名偏犯者不坐今按宗臣父名顯忠而避中字於禮所謂嫌名臣謂既許避免若復有如此而不避者豈得犯冒榮之律如前代故事東晉以王舒為㑹稽內史舒父㑹求易他郡時議以字同音異於禮無嫌復改㑹為鄶舒遂行後又以舒子允之為㑹稽內史允之亦乞更授詔曰祖諱孰若君命之重下八座詳之給事中譙王無忌以春秋之義不以家事辭王事夫王命之重不得崇其私又故事無祖名辭命之制唐賈曽除中書舍人父名忠固辭議者以中是曹司之名又與曽父名音同字别於禮無嫌至於國朝雖雍熙中嘗下詔凡除官內有家諱者除三省御史臺五品文班四品以上許用式奏餘不在此制然推尋國初迄于近年或小官許改或大臣不從或雖二名嫌名而有許避者或止犯單諱而有不許者如建隆初慕容延釗除同平章事以父名章改為同中書門下三品吳延祚以父名璋改為同中書門下三品趙延進除起復雲麾將軍以延進父名暉改授起復光祿大夫天聖中著作佐郎王傳父名著奉禮郎張子奭父名宗禮以傳為大理寺丞子奭為太祝皆請避而許者如淳化中畢士安父名義林除翰林學士天聖中韓億父名保除樞密直學士景德中王繼英父名忠賜推忠功臣天禧中冦凖父名湘除襄州節度使天禧中劉筠父名繼隆除龍圖閣學士近年楊偉父名自牧為羣牧使皆曽固辭此又雖請避而不許前後許與不許繫之一時蓋由未嘗稽詳禮律立為永制請約雍熙詔書自幾品官以上每有除授若犯父祖名諱有奏陳者先下有司詳定若於禮律當避者聽改授之餘不在避免之限上令太常禮院大理寺同定奪而言父祖之名為子孫者所不忍道不繫官品之髙下並聽回避故以律文申眀之詔河北沿邊安撫司禁北人捕魚於界河初界河屬我境而北人潜入河中捕魚採葦雄州移文涿州詰之契丹驅所犯人榜境上隆緒之統和二十四年亦自約束久之北人或由海口載鹽入界河涉雄霸抵涿易者邊吏因循不能止於是宫苑使忠州刺史趙滋知雄州遣巡兵捕殺之且破其船乃復捕魚之禁趙滋先以宫苑使知保州四月甲戌領忠州刺史知雄州也六月壬子朔日有食之初司天言當食六分之半是日未初從西食四分而雲隂雷電頃之雨渾儀所言不為灾權御史中丞王疇言頃嵗日食於正陽之月陛下避殿徹食奉天抑已方其食時實亦隂晦然於雲氣之間尚有見者固不得同不食當時有司乃稱食不及分而宰臣集班表賀甚失陛下祗畏奉天之意今日食之初殊為晴徹既為隂雲所掩方遂不見亦不得與日不食同也雖陛下至誠修德答變感天必不欲激異為祥然恐有司或援近例乞班賀者臣故得以先事而言也同判尚書禮部司馬光言近世以來每有日食之變厯官皆先奏月日時刻及所食之分數至或為隂雲所蔽或食不滿分公卿百官奉表稱賀臣以謂日之所照用遍寰區雲之所蔽至為近狹雖京師不見四方必有見者此乃天戒至深不可不察漢成帝永始六年九月日食四方不見京師見谷永以為百姓屈遏禍在外也臣愚以謂永之所言似未協天意夫四方不見京師見者禍尚淺也四方見京師不見者禍變深也日者人君之象天意若曰人君為隂邪所蔽灾慝甚眀天下皆知其憂危而朝廷獨不知也由是言之君人者尤宜側身戒懼憂念社稷而羣臣欲相率稱賀豈得不謂之上下相䝉誣罔天譴㦲又所食不滿分者乃厯官術數之不精當治其罪亦非所以為賀也臣職在禮部掌羣臣慶賀表章不敢不言於是詔百官毋得稱賀胡宿請祭社或附此庚申賜草澤章友直銀百兩絹百匹以篆國子監石經成除試將作監主簿不理選限辭不就故有是賜友直建安人得象之族也得象為宰相嘗欲官之友直謝去終其身不仕丁卯徙知鳯翔府工部侍郎集賢院學士崔嶧知河中府嶧所至貪汚比老益甚在鳯翔轉運使薛向按之急不得已移河中未幾遂以刑部侍郎致仕詔還曹利用所沒田宅利用既昭雪其家纍有請于朝至是用祫享赦書而盡還之癸酉樞密院奏近揀四百料錢近下禁軍填近上禁軍所有轉軍分例物即三分特支一分詔支一半此據㑹要是六月二十二日事故附癸酉日甲戍富弼起復禮部尚書平章事昭文館大學士監修國史弼辭不拜故事執政遇喪皆起復弼謂金革變禮不可用於平世上五遣使起之卒不從命或言弼初與韓琦同在二府左提右挈圖致太平天下謂之韓富既又同為宰相琦性果斷弼性審謹琦質直語或涉俗俗謂語多者為絮嘗議政事弼疑難者數四琦意不快曰又絮耶弼變色曰絮是何言歟又嘗言及宰相起復故事琦曰此非朝廷盛典也於是弼力辭起復且言臣在中書蓋嘗與韓琦論此今琦處嫌疑之地必不肯為臣盡誠敷奏願陛下勿復詢問斷自宸慮許臣終喪琦見之不樂自是二人稍有間云此據司馬氏記聞及蘇氏别志又參取弼所上劄子然謂弼與琦自此稍有隙恐未必爾更須詳考上既許弼終喪弼以表謝因言竊聞新授提㸃銀銅場職方員外郎張述纍有封章乞立儲二其詞太過頗涉匪彛事合婉微述乃傷於逼迫語當祕密述乃極於張皇傳聞四方無不驚駭伏緣張述前知泗州絶無政舉臣在中書日亦曽見其闕失事狀本官必是恐朝廷不用遂强作此事雖云納忠而獻直實掩過以取名果若憂國愛君豈肯如此喧布况提㸃銀銅場將來例入職司如述小人不合升奬臣切恐好進之輩更相倣效妄陳禍福頻撓聖聰陛下或致憂隱切欲求嗣即於天聽却成不便臣今雖不在陛下左右實則日久憂慮寢食不安也且念自古帝王未有不任情喜怒殺害臣民恭惟陛下臨御已四十年未嘗枉怒一人况於刑誅固無分毫枉濫惟是仁慈寬恕甚於父母之愛赤子天下䝉被陛下大恩大惠深入骨髓上蒼觀覽豈無報應眀知聖嗣非晚降育臣今所願者惟願陛下勤於政事之外凡百節謹目前愛玩多方制伏其心至於晏飲間動風發氣之物亦宜揀擇不令進御澄神靜思助以平和之藥必享萬夀無疆之慶永為宗社之主皇嗣之晚未足為慮此乃必然之理也弼又言竊恐陛下左右親近者知陛下求嗣心切一向希寵望幸各有誕育之意人人爭進則陛下雖欲制伏其心不可得也雖欲保惜聖躬亦不可得也如此則臣實為陛下憂之為宗廟社稷憂之臣嘗為上相義同股肱當與國家共其禍福不得不憂及此也陛下若不以臣為狂妄即乞以臣此意一一宣諭親近之人臣必料親近者皆有保惜聖躬之心各便省悟而能長守富貴即於陛下自然無憂實天下之幸也宗廟社稷之幸也聖嗣既係天命自有天時不可以人力强致臣受陛下深恩出於懇切不覺語及如此臣不敢避死陛下若肯聽納然後賜臣以死實亦甘心上復以優詔答焉按實録眀年正月甲戍徙知洺州職方員外郎余藻為江浙等路提㸃鑄錢坑冶又按英宗實録治平元年二月己巳江浙等路提㸃鑄錢坑冶屯田郎中余藻提㸃廣西刑獄職方員外郎張述提㸃江浙等路鑄錢坑冶述蓋代藻者嘉祐六年未受命也不知富弼上疏時述何由已帶提㸃銀銅場職任或恐余藻在洺州時張述已先除提㸃銀銅場而實録偶不詳或因富弼言遂罷述後乃更除也當考張述疏曰此據張唐英政要附見不知即富弼所指者否當考臣讀書為儒歷覽經史而效官州縣惟有忠義常盡瘁於職業自登朝列伏見皇嗣未立中外憂之十餘年間已五次上書所言皆指陳宗廟社稷可安可危之事自知卑微天聽髙邈伏慮衡石程書之時不足感悟宸聽又恐言詞激切觸犯忌諱為左右隱蔽臣伏念三聖寶位𫝊付陛下陛下在位既四十年未有繼嗣未審陛下曽仔細思之耶若仔細思之則憂宗廟社稷俾繼嗣不絶矣若未仔細深思之耶不當因循委順天命一祖二宗𫝊付陛下寶位欲其宗廟社稷世世嗣續不絶則陛下方為孝矣臣愚敢引杜太后之言庶激切感悟陛下之心杜太后臨終以藝祖得天下謂無長君所以藝祖得之藝祖奉杜太后之言所以不忍𫝊之子而𫝊之太宗是也向使世宗在位更十數年少帝嗣立藝祖豈得有應天順人之事乎陛下當思之陛下昔誕育豫王若天意與陛下則今已成立矣近聞一年中誕四公主若天意與陛下則其中有皇子也上天之意如是矣陛下合當悟之陛下在位四十年當其安寧萬嵗時宜審擇藝祖太宗賢皇子孫且立為皇子但且異其爵位職之官政係天下之望陛下詳察有賢德可𫝊付則立之所以謹重大事俾宗廟社稷得其主矣而况天地之大五行休王皆有數在天地之中固不可逃其數也一旦卒有萬一不可諱倉皇之際危急之間寶位神器欲使宫闈左右中官兩府遞相觀望而謀之豈陛下之心輕宗廟基業如是之易也當陛下安康之時不能詳擇為之欲至倉皇之際顧令左右取次謀之此則陛下不謹重三聖之基業同尋常之事爾夫繼嗣有賢有不賢則朝政有治有亂社稷宗廟有安有危陛下之心固亦知之矣今陛下在位嵗久萬幾之政稔聞熟見但欲凝神淵默埀拱仰成威福賞罰雖曰出自朝廷即陛下不専矣賞罰不専於己而威福漸移於下臣愚實憂之書曰惟辟作福漸之時義大矣㦲履霜堅冰蓋言漸之不已則東漢陵夷之禍復見于今矣臣愚生不能有益聖世所以吐肝瀝膽犯忌諱狂言僣說庶有感悟陛下之心若有所感悟而能擇繼嗣紹隆宗廟社稷俾世世祭享不絶臣雖赴鼎鑊萬死之日猶生之年而名不朽掛於忠義之列所求遂矣丁丑命翰林學士吳奎王圭同詳定茶法實録明年正月丁丑乃命王圭今從㑹要戊寅度支判官刑部員外郎直集賢院同修起居注王安石知制誥初安石辭起居注既得請又申命之安石復辭至七八月乃受於是徑遷知制誥安石遂不復辭官矣嘗有詔令今後舍人院不得申請除改文字安石與同列言竊以為舍人者陛下近臣以典掌誥命為職司所當參審若詞頭所批事情不盡而不得申請則是舍人不復行其職事而事無可否聽執政所為自非執政大臣欲傾側而為私則立法不當如此前日具論冀䝉陛下省察而至今未奉指揮臣等不知陛下以為是而不改乎將不必以為是而特以出於執政大臣所建而不改乎將陛下視臣等所奏未嘗可否而執政大臣自持其議而不肯改乎以為是而不改則臣等考尋載籍以來未有欲治之世而設法蔽塞近臣論議之端如此者也不必以為是而特以出於執政大臣所建而不改是則陛下不復考問義理之是非一切茍順執政大臣所為而已也若陛下視臣等所奏未嘗有所可否而執政大臣自持其議而不肯改則是政已不自人主出而天下之議廢矣此所以臣等惓惓之義不能自已者臣等竊觀陛下自近嵗以來舉天下之事屬之七八大臣天下初以翕然幸其有為能救一切之弊然而方今大臣之弱者則不敢為陛下守法以忤諫官御史而専為持祿保位之謀大臣之强者則挾聖㫖造法令恣行所欲不擇義之是非而諫官御史亦無敢忤其意者陛下方且深拱淵默兩聽其所為而無所問安有朝廷如此而能曠日持久而無亂者乎自古亂之所生不必君臣為大惡但無至誠惻怛求治之心擇利害不審辨是非不早以小失為無傷而不改以小善為無補而不為以阿諛順已為悅而其說用以直諒逆已為諱而其言廢積事之不當而失人心者衆矣乃所以為亂也陛下以臣等所言為是則宜以至誠惻怛欲治念亂之心考核大臣改修政事則舍人院不得申請除改文字指揮為不當當先改矣若以臣等所言為非則臣等狂瞽不知治體而誣謗朝廷政事當加貶斥以懲妄言之罪則别選才能通達之士以補從官臣等受陛下寵祿典領朝廷職事不得其守則義不得不言而朝廷以為非也則義不敢辭貶斥伏乞詳酌早賜指揮安石由是與執政忤魏泰東軒雜記云王安石素與韓琦議論不合嘉祐末琦為相安石知制誥因論蕭注降官詞頭遂上疏爭舍人院職分其言頗侵執政泰所稱疏必指此也此載於安石集而注責官已附四月庚申因安石知制誥并附此疏庚辰太原府代州鈐轄供備庫使忠州刺史蘇安靜上麟州屈野河界圖自郭恩敗敵益侵耕河西無所憚李思道孫兆相繼往議皆不合至是安靜與其國人哲伊律寧葉朗僚禮始議定其府州自喀沁郭特默隆莊沙威牌橫陽河東西一帶築堠九自沙威旁順橫陽河東岸西界步軍照望鋪間築堠十二自橫陽河西以南直埋井烽築堠六自滿濟彭西南直麟州界伊濟軍營築堠三自伊濟軍營南至大橫水染枝谷伺堠烽策結谷章愛哩烏西界步軍照望鋪相望築堠十二其榆平嶺清水谷頭有西界沙阿寨二從北阿密善正寨一次南瑪克密策寨一各距榆平嶺四里其大科卜遵有西界沙阿寨四從北鄂特彭裕勒星寨一次南威約卜寨一次南瑪克密䇿多寨一次南瑪克密約葉寨一各距大科卜遵五里其紅崖塢有西界沙阿寨三從北綱裕勒愛寨一距紅崖塢二里次南阿密沁布寨二各距紅崖塢一里其都綱都格有西界沙阿寨二並係阿密沁布寨在都綱都格上其十一寨並存之如故寨東西四里各有西界步軍照望鋪亦築堠十二乃約自今西界人户毋得過所築堠東耕種其在豐州外漢寨及府州界蕃户舊沙阿寨並復修完府州沿邊舊沙阿寨三十三更不創修麟州界人户更不耕屈野河西其麟府州不耕之地亦許兩界人户就近樵牧即不得插立梢圈起蓋庵屋違者並捉搦赴官及勒住和市兩界巡捉人員各毋得帶衣甲器械過三十人騎夏國傳載此事甚略但云如是安靜檄夏國得律寧葉朗僚禮來合議安靜乃築堠三十六更新邊禁邀以違約則罷和市界始定云今全用實録本文按吕誨奏議第七卷論麟州地界狀云近罷鈐轄蘇安靜實為至當専遣職方員外郎李思道往彼朝廷授以成算事無不濟今安靜乃上地界圖則是安靜竟了地界不由思道也不知誨所謂罷安靜在何年月當考是夏樞密副使歐陽修言臣材識庸暗碌碌於衆人中陛下不次拔擢置在樞府其於報效自宜如何而自居職以來已逾半嵗凡事關大體必須衆議之協同其餘日逐進呈皆是有司之常務至於謀猷唘沃蔑爾無聞上孤聖恩下愧清議人雖未責豈敢自安所以夙夜思惟願竭愚慮茍有可採冀禆萬一臣近見諫官唐介臺官范師道等因言陳旭事得罪或與小郡或竄逺方陛下自臨御以來擢用諍臣開廣言路雖言者時有中否而聖慈每賜優容一旦臺諫聨翩被逐四出命下之日中外驚疑臣雖不知臺諫所言是非但見唐介范師道等皆久在言職其人立朝各有本末前後言事補益甚多豈於此時頓然改節故為欺罔上昧聖聰在於人情不宜有此臣竊以自古人臣之進諫於其君者有難有易各因其時而已若剛暴猜忌之君不欲自聞其過而樂聞臣下之過人主好察多疑於上大臣側足過積於下於此之時諫人主者難而言大臣者易若寬仁恭儉之主動遵禮法自聞其失則從諫如流聞臣下之過則務為優容以保全之而為大臣者外秉國權內有左右之助言事者未及見聽而怨仇已結於其身故於此之時諫人主者易言大臣者難此不可不察也自古人主之聽言也亦有難有易在知其術而已夫忠邪並進於前而公論與私言交入于耳此所聽之難也若知其人之忠邪辨其言之公私則聽之易也凡言拙而直逆耳違意初聞若可惡者此忠臣之言也言婉而順希㫖合意初聞若可喜者邪臣之言也至於言事之官各舉其職或當朝正色顯言廷臣或連章列疏共論某事其言一出則萬口爭傳衆目共視雖欲為私其勢不可故凡眀言于外不畏人知者皆公言也若非其言職又不敢顯言或密奏乞留中或面言乞出自聖斷不欲人知言有主名者蓋其言涉傾邪懼遭彈劾故凡隂有奏陳而畏人知者皆挾私之說也自古人主能以此術知臣下之情則聽言易也伏惟陛下仁聖寬慈躬履勤儉樂聞諫諍容納直言其於大臣尤所優禮常欲保全終始思為臣下愛惜名節尤謹重於進退故臣謂方今言事者規切人主則易欲言大臣則難臣自立朝耳月所記景祐中范仲淹言宰相吕夷簡貶之饒州皇祐中唐介言宰相文彥博貶春州别駕至和初吳中復吕景初馬遵言宰相梁適並罷職出外其後趙抃范師道言宰相劉沆亦罷職出外前年韓絳言富弼貶之蔡州今又唐介等五人言陳旭得罪自范仲淹貶饒州後至今凡二十年間居臺諫者多矣未聞有規諫人主而得罪者臣故謂方今諫人主則易言大臣則難陛下推此以察介等所言則可知其用心矣昨所罷絀臺諫五人惟吕誨新進入臺未久其他四人出處本末迹狀甚明可以厯數也唐介前因言文彥博逺出廣西烟瘴之地賴陛下仁恕哀憐移置湖南得存性命范師道趙抃並因言論劉沆罷臺職守外郡連延數年然後來復今三人者又以言樞臣罷絀然則介不以前蹈必死之地為懼師道與抃不以中滯進用數年為戒遇事必言得罪不悔蓋所謂進退一節始終不變之士也至如王陶者本出孤寒只因韓絳薦舉始得臺官及絳為中丞陶不敢內顧私恩與之爭議絳終得罪夫牽顧私恩人之常情爾斷恩以義非知義之士不能也以此言之陶可謂徇公滅私之臣矣此四人者出處本末之迹如此可以知其為人也就使言雖不中亦其情必無他議者或謂言事之臣好相朋黨動搖大臣以作威福韓絳言富弼之時介與師道不與絳為黨乃與諸臺諫共論絳為非然則非相朋黨非欲動搖大臣眀矣臣固謂未可以此疑言事之臣也况介等此時雖為謫官幸蒙陛下寬恩各得為郡未至失所其可惜者斥逐諫臣非朝廷美事阻塞言路不為國家之利而介等盡忠守節未蒙憐察也欲望聖慈特賜召還介等置之朝廷以勸守節敢言之士則天下幸甚修疏不得其時唐介等逐在四月二十七日修云在樞府已逾半嵗按修以去年十一月十六日拜樞副則奏此疏當在五月六月問今附夏末七年三月九日乃召王陶及范師道
