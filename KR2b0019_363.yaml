body:
  text: 續資治通鑑長編卷三百五十九宋李燾撰哲宗元豐八年八月癸亥詔太皇太后遇南郊坤成興龍節推恩親屬恩數臨時請旨乙丑詔按察司所至官有才能顯著者保眀以聞丙寅刑部言敕令格式有更造春秋都省付下者并先下條並凖式雕印限四月十月頒畢其已頒者嵗以二月八月録目行下從之丁卯翰林學士兼侍讀鄧溫伯為翰林學士承旨朝奉郎吏部郎中曽肇朝請郎禮部郎中林希兼著作職事官有兼職自此始兼職始此據林希傳當考承議郎蘇轍為校書郎朝奉郎直集賢院權發遣鳯翔府范育為直龍圖閣知秦州通議大夫知鄧州賈昌衡提舉鴻慶宫詔朔望皇帝御前殿合赴起居官次日赴延和殿垂簾起居從御史中丞黃履請也己巳鎮江軍節度使知河南府韓絳加開府儀同三司判大名府兼北京留守絳陛見靣諭以河北水災非故老大臣莫能安集遣使就第賜告時河決小吳未復議者欲為支川傍北都注故道魏人惴恐絳五上疏乞復澶淵故道朝廷為之寢河役此據絳本傳附見當考元祐三年二月己丑馮京言合參照户部狀勘會諸路自去年推行市易抵當至今一年有餘逐旋申眀條畫頒行訪聞諸處商賈少願市賣物貨入官本處官吏或不曉法意即不免拘欄障固本部雖屢行約束尚恐未能止絶嵗課未集已有侵擾之患兼勘會鎮寨市易抵當已凖􅎁旨更不與置今相度除諸路州軍抵當收息至薄以濟民間緩急可存留外其州縣市易及餘處抵當一切可皆省罷從之仍詔抵當如敢抑勒依給納常平錢物法五月八日可考此據法册舊録户部言諸路州軍抵當可以省罷從之抑勒仍依給納常平錢物法新録詔諸路州軍抵當取息至薄民間緩急賴之可以存留其中市易並罷如抑勒依給納常平錢物法從戶部請也二録並脫誤不可曉今以法册全文增入政目云詔罷州縣市易縣鎮抵當玉牒云詔罷諸路州軍市易抵當玉牒又誤也抵當元不罷但罷市易耳又詔給散青苗錢不許抑勒仍不立定額此據九月末王巖叟疏又眀年閏二月司馬光疏增修然政目亦不載此更須考詳恐合削禮部言皇太妃生日節序物色其冠服之屬減皇后五分之一詔翰林學士給舍禮部太常寺同詳定以聞舊録云先是詔依皇后禮儀者以為帝母其禮當崇於后既而以為過厚有司觀望故損之新録辨曰后妃之制固自不同况宣仁臨朝欽聖在位則皇太妃儀物不得不稍損避兩宫也謂之觀望非也自先是詔依至故損之三十二字並刪去太皇太后聖節紫衣師號度牒依元豐五年例共二百道皇太后紫衣師號五十道度牒五十道皇太妃紫衣師號二十道度牒二十道政目初八日事詔知瀘州王光祖先次放罷令梓州路轉運司劾治以言者論光祖苛暴不公下監司詢究得實故也吕陶奏議可考詔大官令為正九品庚午右屯衛將軍髙遵裕卒贈永州防禦使遵裕傳辨誣已見三月壬申詔諸將副押隊訓練官非教閲事有違法者許本州長吏覺察監司點檢癸酉詔朝奉大夫錢曜宣德郎御史臺主簿俞勤並為都水監丞自今並中書省差朝請大夫提舉玉隆觀張頡為直龍圖閣知鳯翔府詔官司事有疑惑而應申請者上尚書本部己申而不報申尚書省或樞密院又不報奏聞即干急速聽先奏後申刑部侍郎楊汲為太皇太后賀遼主生辰使皇城使髙州刺史王澤副之朝請大夫戶部郎中韓宗道為皇帝賀遼主生辰使崇儀使嘉州刺史帶御器械劉承緒副之光祿卿吕嘉問為太皇太后賀遼主正旦使左藏庫使劉永淵副之朝請郎衛尉少卿陳侗為皇帝賀遼主正旦使西京左藏庫使髙遵治副之門下侍郎司馬光言竊惟王者所以治天下惟在法令凡殺人者死自有刑法以來百世莫之改若殺人者不死傷人者不刑雖堯舜不能以致治也近見刑部奏鈔泰寧軍勘到保正家人薑齊見本都代名大保長張存捽著百姓孫遇其孫遇捽著袁貴髻子張存道此人稱是東嶽急腳子胡亂打人不伏收領齊捽孫遇禠衣打二三十拳解擘放却袁貴齊與存捽倒孫遇齊行拳踢打孫遇身死齊發心共張存捉縛袁貴虛做打殺元相爭人申解赴縣替得償命其袁貴到縣不肯虛招齊蒙枷項隔勘方具實招通又懷州勘到百姓魏簡與郭興爭賭錢拽倒郭興其父郭升拽著簡使頭撞簡簡為本人年老便道你共我不是抵對休拽著我待推揢郭升圖放却簡用力去郭升咽喉上揢一揢其人當下倒地身死又耀州勘到百姓張志松為再從弟張小六寃執呪罵責兄弟男女值志松乘酒嗔恨張小六因此行拳打張小六當時身死上件三人於條皆合處死本州並作情理可憫奏裁耀州仍稱張志松本無殺意刑部一切檢例擬特貸命決脊杖二十刺配斷本所牢城竊詳孫遇不合詐稱東嶽急腳子胡亂打人雖是罪人然罪不至死其薑齊等既解擘放袁貴即合申送赴官依法施行其孫遇别更不曽拒捍及走兼已就拘執豈可更捽倒毆擊直至於死又更誣執被苦人袁貴作殺人賊欲令替已償命如此情理有何可憫其魏簡為郭升年老不欲相打却用力去本人咽喉上一揢至死豈不更甚于毆打又張志松只為張小六寃執呪罵事理至輕遂毆本人致死並是鬪殺於情理皆無可憫凡人怨忿相爭迭相毆擊其意豈皆在於殺但一人於辜限內死則彼一人須當償命况此三人皆即時毆殺當死無疑止是逐州避見失入罪名妄作情理可憫或刑名疑慮奏裁刑部即引舊例一切貸命若因循不改為弊甚大所以然者從來律令敕式有該説不盡之事有司無以處決引例行之今鬪殺當死自有正條而刑部不問可貸與否承例盡免死決配作奏鈔施行是殺人者不死其鬪殺律條更無所用也於殺人者雖荷寬恩其被殺者何所告訴非所以禁制凶暴保安良善也欲乞令後應諸州所奏大辟罪人並委大理寺依法定斷如情理無可憫其刑名無疑慮即仰刑部退回本州令依法施行如委實有可憫及疑慮即仰刑部於奏鈔後别用貼黃聲説情理如何可憫刑名如何疑慮今擬如何施行令門下省省審如所擬委得允當則用繳狀進入施行如有不當及用例破條即仰門下省駁奏乞行取勘庶使畫一之法不致隳壞凶暴之人有所畏憚其薑齊等緣係未立法以前今欲先次進入詔從光請實録書此事云門下省言應諸州奏大辟情理可憫及疑慮委刑部于奏鈔後聲説門下省省審否則大理寺退回今依法定斷有不當及用例破條者門下省駁奏以刑部奏泰寧軍薑齊等鈔不應奏裁故也今取司馬光疏備載庶詳見本末七月甲寅并眀年閏二月壬辰丙午可考乙亥供奉官王英子舜臣稷臣並為三班借職仍賻其家以河東經略司言西賊冦葭蘆寨英戰死故也五月末英戰死丙子月有食之既丁丑戶部郎中韓宗道為太常少卿司門郎中韓宗古為光祿少卿吏部貟外郎吕希績為少監並避親也九月十四日戶部言見凖朝旨修完諸路役書其諸色役人多寡合行添減并支酬雇直重輕未均並據逐路相度到事理修入所有免役額錢逐處支用外自來約留寬剩各不過二分係是凖備非泛閣放及增添役人雇直等使用今來申到帳狀立定支用窠名其所留寬剩內有及三四分以上去處合行裁減立定分數今相度欲乞將諸路敷出役錢元額於役書內立定合用錢數外所留寬剩不得過二分餘行減放其自來不及二分處即依舊所貴稍寬民力從之實録刪修云户部言詔修諸路役書請敷出役錢除元立定數外所留寬剩不得過二分餘行減放其自來不及二分處即依舊從之今仍用本文陕西轉運司奏鄜延路會定嵗八十三萬貫如遇年飢非次添屯即不在數此據政目詔給尸部右曹錢六十萬貫充鄜延路邊糴詔貢院官死于火翟曼陳之方馬希孟各與一子官仍賜錢十萬戊寅詔今後親王府翊善侍讀侍講記室參軍第二任知州理提刑資序第四任知州理諸路轉運使資序以王府侍講虞太熙外補揚王皓荆王頵列疏請留乞與理提刑資序故有是命詔陕西河東逐路經略司嚴戒將佐等募人體探賊中事實逺斥堠嚴守備不得輕戰常須謹重及不得張皇勞擾以逐路經略司言探報西賊點兵慮諸路或弛邊備也癸未諌議大夫孫覺言乞依天禧元年手詔言事勘會官制事目格字左右諌議大夫左右補闕拾遺凡發令舉事有不便于時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞于上則條其事狀而薦言之詔依此申明行下此據新舊兩録仍以密疏刪修按覺有劄子云九月始供諌職恐此時元未有所獻納也或移附九月更詳之覺又言諡法當責任有司人主不可自親其文應乞賜者宜一切不許從之此亦以密疏增入詔蕃官尚移贈皇城使髙州團練使録其子及女夫官仍賻賜有差以河東經略司言入界遇賊死之故也乙酉詔太皇太后特送遼國生辰禮物令御藥院依章獻太后與北朝皇太后禮物數排辦內冠朵纒以金玉腰帶水晶鞍轡以玉鞋襪以靴代之門下中書後省言詔詳定三省吏祿并增給請釐為一法除今來所定并舊勞績以時添料錢自隨身分并時服官馬合依舊外其應外取撥到并額內人並從今來新定則例其兼領因事别給并舊來請受並罷即應權若領兩房職名同惟許從一多給從之禮部郎中林希為祕書少監朝散大夫周尹為主客郎中吏部郎中曽肇張汝賢並為右司郎中政目二十四日又書盛次仲通判雄州二録並不書當考丁亥詔入內都都知張茂則宿衛宫省更歷四朝清謹忠勤冝在褒勸以其子左藏庫副使巽為西上閣門副使會校牧馬利害所言會校到提舉制置牧馬司元奏置孳生監每年約生駒五分自置監至今收駒不滿一分四釐二年間死損馬已過五分并轉送又及一分已上較之所收自不足以償死損之數會校委見害多利少詔府界新置牧馬監并提舉經度制置牧馬司並罷應合分撥措置事件令兵部條畫以聞見在馬已經配放并未離母駒撥與同州沙苑監未經配放已離母駒撥與太僕寺令逐路保甲司指揮保甲更不教騎借到户馬并私馬並給還主支到官馬均配諸軍填闕提舉經度制置牧馬司樞密都承旨張誠一罰銅二十斤差知潞州崇儀副使溫從吉降一官從吉始建議創置孳生馬監者也曹誦六月十二日建議乞會校二月十五日遣官按行陕西河東路詔府界三路保甲自來年正月一日依義勇法冬教三月每月赴縣教閲五都保以上分四畨自十月起教至正月罷令保即先從多教周而復始仍降畫一處分府界三路已罷團教其提舉錢糧官司並罷撥與教閲司兼領皆自來年正月一日施行據樞密院時政記此指揮實在八月二十六日丁亥舊録乃係之七月六日戊戍新録因舊録蓋考究不詳也今依時政記於本月日特書又御集八月二十四日有指揮自來年後保甲止冬教令三省樞密早施行蓋二十四日指揮二十六日方行出也新録因舊録於丁亥日書云罷府界新置牧馬監并提舉經度制置牧馬司崇儀副使溫從吉降一官提舉牧馬司樞密都承旨張誠一罰銅二十斤初樞密副都承旨曹誦言朝廷用從吉法置孶生馬監駒少而死損多請委官比較至是稽考如誦言故罷之仍有是責誠一罷樞密都承旨知潞州詔逐路保甲罷教騎其借户馬及私馬並歸主官馬以配諸軍既刪取不詳又將四畨教閲及罷錢糧官移入七月戊戍大抵舊録于元祐改法事都抹殺不肯分眀書入新録不應因之今已别修如上仍附注此殿中侍御史黃降奏伏見昭宣使宋用臣營繕私第及别治園池亭館而臣領點檢水磨所見用臣偷盜官園蓮藕等並虧價買物纍贓不少又聞取洛口金泉法酒贏賣入已勘會用臣所總局分尚有不係廢罷去處未經勾考欲乞朝廷詳酌並委官取索點磨有無欺弊并檢會前後所奏付有司檢校根究施行詔都大提舉汴河堤岸司專切提舉京城所所管不係廢罷去處並仰黃降等依廢罷物貨場已得指揮取索點磨聞奏餘候山陵祔廟了日取旨密疏八月事今附此己丑門下省言中書省申眀諌議司諌正言合通為一法凡有所見並許論奏欲送中書省申眀行下從之貴妃苗氏乞罷册命從之龍圖閣直學士知永興軍劉庠加樞密直學士政目云特除司馬光言臣聞舜眀四目達四聰王者視四海之內皆如戶庭閭閻之間皆如指掌然後能治天下恭惟太皇太后陛下深居九重皇帝陛下冨于春秋四海之廣大閭閻之微隱未嘗身親而目覩也非采聼臣民之言雖以天縱睿智之性何由知之陛下近詔天下臣民皆得上封事言朝政闕失民間疾苦仍降出令臣與執政看詳其第一次降出者三十卷臣謹與諸執政選擇其中除無取及冗長之辭外其可取者已用黃紙簽出進入訖伏乞陛下取簽出者更賜詳覽或留置左右以備規戒或降付有司商議施行如此則忠言日進聰眀日廣誠生民之厚幸社稷之盛福也嚮者執政請聽臣僚上殿陛下謙退以為國家政事多未習知臣僚欲言事者自有章疏何必上殿今臣民章疏舉集於前若陛下不勤加省覽則朝政闕失民間疾苦何由上聞國家政事無時而習知也其間亦有一事而衆人共言者臣亦重復簽出蓋欲陛下知天下所共患衆情所同欲也夫為政在順民心民之所欲者行之所惡者去之則何患號令不行民心不附國家不安名譽不榮哉惟在陛下斷志而力行之耳光又言臣伏覩近降農民許疾苦實封狀王嗇等一百五十道除所訴重復外俱已簽帖進入竊惟四民之中惟農最苦農夫寒耕熱耘霑體塗足戴星而作戴星而息蠶婦治繭績麻紡緯縷縷而積之寸寸而成之其勤極矣而又水旱霜雹蝗􅈮間為之災幸而收成則公私之債交爭互奪穀未離場帛未下機已非己有矣農夫蠶婦所食者粳籺而不足所衣者綈褐而不完直以世服田畝不知捨此之外有何可生之路耳故其子弟逰市井者食甘服美目覩盛麗則不復肯歸南畝矣至使世俗俳諧共以農為嗤鄙誠可哀也又况聚斂之臣於租稅之外巧取百端以邀功賞青苗則強散重斂給陳納新免役則刻剝窮民收養浮食保甲則勞於非業之作保馬則困于無益之費可不念哉夫農蠶者天下衣食之源人之所仰以生也是以聖王重之臣不敢逺引前古竊聞太宗嘗逰金眀池召田婦數十人於殿上賜席便坐問以民間疾苦田婦愚戇無所隱避賜帛遣之太宗興于側微民間事固無不知所以然者恐富貴而忘之故也每臨朝無一日不言及稼穡真宗乳母秦國夫人劉氏本農家也喜言農家之事真宗自幼聞之故為開封尹以善政著聞及踐大位咸平景德之治為有宋隆平之極景德農田敇至今稱為精當昔周公相成王作無逸曰先知稼穡之艱難乃逸則知小人之依蓋以一盂之飯一尺之帛莫不出于艱辛人主既知之則不肯用之于無益散之于無功驕侈之心無自而生矣伏惟太皇太后陛下深居九重皇帝陛下富于春秋自非今者濬發德音大開言路使畎畝之民皆得上封事則此曹疾苦何由有萬分之一得達于天聽哉雖其文辭鄙俚語言業雜皆身受實患直貢其誠不可忽也伏惟太皇太后陛下與皇帝陛下同賜省覽庶以開廣聰眀資益聖德惟于民間情偽靡不周知異日太平之業由此為始矣光集載此劄子在八月十二日後今附月末是月神宗第十子越王偲生會要詔繁劇去處重法地分吏部所用知州通判知縣并在京庫務寺監丞闕六十餘處並歸中書取旨選差元祐元年閏二月末吕陶疏云元豐八年八月內執政以此為詞收占吏部闕今附見月末須别考詳增修九月乙未三省樞密院言該配合從開封府及軍馬司斷遣者並依法配行無軍名者五百里以上並配牢城鄰州本州並配本城強盜或三犯竊盜因盜配軍後再犯罪若謀殺并以刃故傷人放火強姦或人力姦主已成造蓄蠱毒及教令人并傳習妖教故沉有人居止舟船拒捕以上於法合配者并諸軍犯階級及逃亡應配千里以上並依法配行內無軍額五百里以上配牢城鄰州或本州配本城已係本城配牢城已係牢城配重役從之此即十月八日己巳所書詔改新配法也舊録既于九月四日乙未詳書之又于十月八日己巳特書并著黃履有言新録因之蓋考之不詳耳今并入此仍取黃巖叟所言附元豐六年三月二十六日可考初神宗以流人離去鄉邑或疾死于道而護送禁卒失教習有往來勞費故放古犯罪應流者加決刺隨所在配諸軍重役於是中丞黃履有言故令應配者悉配行如舊法仍委長吏無下所降敕履言當考尋全章編入新録削去仍委長吏無下所降敕政目七月二十二日詔開封盜合配者依舊條餘令立法此合參考監察御史王巖叟亦言竊見諸州自行就配法以來民間多苦凶徒騷擾之患緣其人皆是狃于為惡無所畏憚不復自新之人平昔流之逺方猶或逃歸以肆凶虐今既不離本鄉更無限隔足以遂其為惡之志恣其報怨之心使被苦與告捕之家常憂讐害一鄉上下不獲安居若日月益久其徒轉盛愈恐易于結集為患更深伏望朝廷採察罷就配法以為羣凶之戒以為良民之福尚書省言汴河堤岸司所管房廊水磨茶場及京城所所管房廊嵗入錢數除代還免行錢指定合支數外並充户部左曹年計支用按在京諸色行户總六千四百有竒免輪差官中祗應一年共出緡錢四萬三千三百有竒數內約支二萬六千九百有竒充和雇諸色行人祗應等錢外餘一萬六千四百有竒𣙜貨務送納凖備戶部取撥充還支過吏祿錢其在京免行錢盡行放罷自來以免行錢充吏祿及食料錢等並以所撥汴河堤岸司及京城所房廊錢內給其諸色行人自來差付官中祗應人數下開封府並依舊條從之政目九月十四日云在京諸行共六千四百餘户免輪應一年共出錢四萬三千餘貫內二萬六千餘貫雇人祗應外一萬六千餘貫納官並罷即此月四日所行也中書省言在京免行錢既與放免并汴河堤岸司京城所房廊並撥𨽻户部左曹及嵗收課利除代還免行錢吏祿外餘並充本曹年計所有水磨茶場乞令左曹疾速措置經久利害以聞從之元祐元年閏二月二十八日罷水磨茶場六月三日九月四日可考祕書省正字范祖禹言先王制禮以君服同于父皆斬衰三年蓋恐為人臣者不以父事其君此所以管乎人情也自漢以來不惟人臣無服而人君遂亦不為三年之喪惟國朝自祖宗以來外廷雖用易月之制而宫中實行三年之喪且易月之制前世所以難改者以人君自不為服也今君上之服已如古典而臣下之禮猶依漢制是以百官有司皆已復其故常容貌衣服無異于行路之人豈人之性如此其薄哉由上不為之制禮也今羣臣易月而人主實行喪故十二日而小祥期而又小祥二十四日大祥再期而又大祥夫練祥不可以有二也既以日為之又以月為之此禮之無據者古者再期而大祥中月而禫禫者祭之名也非服之色也今乃為之慘服三日然後禫此禮之不經者也既除服至葬而又服之蓋不可以無服也祔廟而後即吉才八月矣而遽純吉無所不佩此又禮之無漸者也易月之制因襲故事已行之禮不可追也臣愚以為宜令羣臣朝服止如今日而未除衰至期而服之漸除其重者再期而又服之乃釋衰其餘則君服斯服可也至于禫不必為之服惟未純吉以至于祥然後無所不佩則三年之制略如古矣詔禮官詳議以聞其後禮部尚書韓忠彥等言朝廷典禮時勢異宜不必循古若先王之制不可盡用則當以祖宗故事為法今言者欲令羣臣服喪三年民間禁樂如之雖過山陵不去纕服庶協古之制緣先王恤典節文甚多必欲循古則又非特如臣僚所言故事而已今既不能盡用則當循祖宗故事及先帝遺制從之舊録云是時祖禹首建此議而執政有主之者人以為違戾故禮部有請新録辨曰范祖禹言先王制禮以君服同于父故請羣臣為三年之喪記曰事君有犯無隱服勤至死致喪三年此禮經也韓忠彥謂當循祖宗故事及先帝遺制故不果行執政謂司馬光也自是時至有請二十五字俱刪去按祖禹集自注此一疏云六月七日上及第二疏以七月九日上丁酉門下侍郎司馬光奏竊慮差臣都亭驛押賜北使御筵為名犯北朝諱乞免差從之密記六日戊戍戶部言見修諸路役書將敷出役錢額於役書內立定合用錢數外所留寬剩不得過二分餘行減放緣兩浙淮南東路役法先已修定頒行其見今合用數外如有寬剩役錢二分已上去處亦合減放欲乞申眀行下若候逐路了當方行減放竊慮後時今欲乞下逐路委當職官親按所供役書帳狀將經久合用錢上量留寬剩役錢不得過二分其合依今降朝旨減放錢數即以鄉村坊郭所出錢均定合減之類體量人戶自來出錢輕重從下等減放仍先具合減放錢數申本部點檢即不候造簿並聽先次指揮減放施行兩浙淮南東路準此從之庚子工部郎中梁燾為吏部郎中戶部郎中李周為職方郎中太常博士林旦為工部員外郎辛丑詔吕大防曰卿鎮蜀日久西南生民疾苦利害或新法有于民未便者想多聞見卿未到闕間宜先以所見條析入急遞奏來於入內內侍省投進無有所隱壬寅遼國弔慰太皇太后使長寧軍節度使耶律仲副使太常少卿充乾文閣直學士吕頥浩等見于大行皇帝神座前行祭奠禮畢皇帝御紫宸殿引見仲等乙巳朝請大夫太常少卿韓宗道為太僕少卿光祿少卿韓宗古為少府少監先是御史中丞黃履言臣伏聞朝旨以韓宗道宗古是右僕射韓縝之姪故宗道自戶部郎中為太常少卿宗古自司馬郎中為光祿少卿又以吕希績是左丞吕公著之子故自吏部員外郎為少府少監臣伏思太常之職掌邦國禮樂郊廟社稷之事歷古及今號為清職宗道雖有吏能且無文譽超次授之既為非稱而又本朝故事凡緣宰執避親多以本等少降處之如中書舍人避親為待制之類未聞假以優遷使竊幸焉兼希績與宗道宗古同為避親在希績則降之本班之末在宗道則升二班在宗古則升一班尤為未允又言竊見韓縝自領中書以來曽未數月朝廷差除及縝姻戚者屢矣若使執政自此皆援縝例以幸子姪則是朝廷為官擇人之清職止為大臣子姪避親階寵之地兼聞韓宗道宗古于臣彈奏次日各急赴本寺禮上士論籍籍以為縝合令俟命不合遽令禮上縝之所為審至于此尤為可鄙於是太皇太后親諭執政而有是命希績亦出知頴州自是遂詔三省合取旨事及臺諌章奏並同進擬不專屬中書吕公著七月戊戍先論列及是乃有此詔然訖不知果是何月日也三省同進擬緣韓縝差宗道宗古為太常光祿少卿御史有言故改法此據蘇轍元祐元年閏二月六日劾韓縝疏元年正月末劉摰劾蔡確云中書二年不將差除與三省合奏及身遷門下陰使言者申請招權營私其當去四也按吕公著八年七月入朝便有此申請不緣確意不知確復使何人申請又據蘇轍劾韓縝則政坐責差除宗道宗古黃履有言因改法耳或劉摰并以此攻履也徽宗實録黃履傳乃以三省同進呈事為哲宗未即位以前誤也宗古眀年四月十四日改職方即中太常少卿韓宗道等言奉敕差充皇帝賀北朝生辰國信使副所有沿路過界未經山陵祔廟禮畢應干禮儀服飾等伏乞下有司裁定詔如到界首北朝接伴須要吉服聽樂仰再三辭免若堅不聽從亦許依嘉祐八年賀北朝生辰使李受等過界在仁宗喪制體例權改吉服聽樂密記十四日資政殿學士韓維奏錢幣闌出邊關則足以資敵國舊法為禁甚嚴今每貫稅錢五十文恣聽其出中國臣請復禁如舊法詔依嘉祐編敕施行其熙寧申眀敕更不施行仍令河北沿邊安撫司契勘自刪定嘉祐編敕後來沿邉如何施行今來却行禁絶有無合隨宜措置事件仰具事理聞奏密疏有此須求韓維元奏增入政目十四日罷放錢出中國即此事也己酉于闐國遣使入貢朝奉郎祕書少監劉摰為侍御史摰言竊惟陛下即阼臨政之始其所先者宜莫若廣言路故臣今就職之日首獻其説蓋聖人以一心御萬事而無遺慮以一視周四海而無遺照非能身親而目得之也為能咨諏訪逮致人之言開闢其塗使無壅蔽上之公卿大夫有百執事下之雖工瞽執技之賤芻蕘負薪之鄙皆得輸意自竭雜然至前而聼吾之所擇惟懼乎言者之不能多也祖宗以來諌官御史張設員品罕不備足凡在職者有言之責臣今伏見諌官止有大夫一員御史臺自中丞而下雖十員然止於中丞侍御史兩殿中法得言事外監察御史六員專于察治官司公事文書之稽違者而不與於言則是在朝廷以言為官而任其責者裁此五人而已天下之大臣工之衆權強之漸朋比之萌民之休戚政之利病其於獻納伺察仍恐耳目之未廣事或有不得盡聞于聖聽者非所謂眀四目逹四聰開衆正集羣策者也臣欲望聖慈于諌院增置諌官員數本臺六察御史並許言事其所領察案目不廢如故所貴共盡忠力交輔聖政朝奉郎蘇軾為禮部郎中邢恕家傳云先是吕公著欲復引恕為中書舍人然與恕素厚衆所共知不欲専自己發孫固時在門下乃公著所援進因召固至閣子中囑令開端公著從而贊之諸公無他言獨劉摰云邢到河陽亦未久且除集撰作帥如何諸公皆不答遂罷是時宣仁已有召恕之意公論亦以恕當還朝摰不能奪衆意故姑欲以集撰塞之因其子贑過河陽即令告恕本末摯于恕初亦相親特以蔡確故乃見踈忌恕始為起居舍人日因見諸公請先用摯聞之者云和叔此舉鬼神也須伏及三省初合蔡確第一筆除摯侍御史蘇軾禮部郎中問恕曰以此二人破題如何恕猶戲答確云所謂德動天鑒祥開日華也恕意取唐李程日五色賦破題如此遂冠多士古今傳誦耳蓋摯元祐初任言責確猶在相位與黃巖叟排擊不已司馬光深不以為然時傅堯俞為祕書監溫公即囑令諌摯止之且云蔡非久自去何必如此形迹摯既已奏疏即答堯俞云已做到這裏如何住得傅亦以告恕也方確之為山陵使也公著及光已嘗為恕言欲假蔡以節旄處之北門或頴昌矣蔡初既力引光已而同在門下相得甚歡章惇則自任語快常以光為鈍不是持正見容豈可處也時京師知事者皆聞此語恕家傳固妄也姑存之使後世有考焉承議郎龍圖閣直學士蔡卞為太皇太后回謝遼國使客省使沂州防禦使曹評副之中書舍人范百祿為皇帝回謝遼國使左藏庫副使兼閣門通事舍人髙士敦副之士敦後以疾辭左藏庫副使知冀州劉惟清代之惟清代士敦在十月癸未今并書詔自今門下中書省樞密院合取會文字依舊直下所屬取索詔中書省增置録事二人元祐元年二月六日詔當考禮部言大行皇帝神主祔廟畢其時享并眀堂祀上帝配座欲依故事下待制以上及祕書省長二禮官詳定以聞從之樞密院言提舉出糶在京封樁斛斗所自元豐三年四月開場糶賣至今見在斛斗一百七萬七千七百四十三碩草三十四萬五千四百束詔在京封樁闕額禁軍并銷廢捧日等六指揮糧草權住糶賣及令司農寺於倉場通融認數樁管不得指定界分仍依舊供具帳狀以備朝廷變易支用元豐三年四月不見糶賣場事始樞密院言昨令國信使蒲中行等計會北朝依嘉祐年北朝皇太后賀仁宗皇帝生辰正旦使人傳達禮意皆自北朝皇帝轉達今來北朝弔慰太皇太后其使人傳達却係北朝皇帝専致傳語使人見日回問則并當專為傳宣問北朝皇帝聖體非故事當改正欲令送伴北朝弔慰使副婉順説諭使人悉依嘉祐年例從之詔陕西提舉買馬監牧司及成都府利州路買馬司並令提舉成都府永興軍等路𣙜茶公事陸師閔兼提舉仍就用茶貨隨冝增減價直相度穩便置場去處計置博買候及一年具買馬實數奏聞應有合措置事件令詳具畫一聞奏所有先降陕西監牧事撥令陕西路轉運司管勾指揮及陕西買馬撥𨽻經制熙河蘭會路邉防財用司并成都府利州路買馬指揮並更不施行此據法册增入庚戍廢徐州寶豐下監五月末巳罷鼓鑄九月十九日遂廢監實録既于此書罷寶豐下監又于十月十二日甲戌書罷鼓鑄以轉運司言闕銅而官吏虛縻廪給也蓋失先後之序今别修仍削去十月甲戍所書罷鼓鑄密疏九月事檢會京東轉運使范純粹奏敇寶豐下監鑄折二大錢令相度利害訪聞本路鐡炭短闕上下勞費欲乞並權令住罷除見在物料依舊外其餘料在民間買納之物各未得拘催並候純粹相度了當别聽朝旨其廢罷寶豐下監應合行事件令轉運司措置施行訖奏此蓋純粹未到京東時指揮純粹既到即廢監也甲寅尚書省言御史中丞黃履奏本臺察案檢察官司稽違其勾朱架閣簿書違式之類係事理輕小者欲止從本臺牒官司改正仍不理為官吏功過殿最已依所乞所有被察官司除官員依法減等無罪外其人吏自合隨事上簿理為過犯嵗終比較從之戊午詔京東西路保馬數未足者更不收據見管數令逐戶依舊主養别聼朝旨政目云京東西保馬未足數罷買監察御史王巖叟上疏曰巖叟上疏不得其時今以疏語斟酌附九月末臣聞忠臣之事君猶孝子之事親一家之事知而不言非孝也言而不盡亦非孝也有人於此為姦言詭説陰蔽善謀以欺其親而幸利焉而其親未之察則當告乎勿告乎孝子不忍以此心事親忠臣不忍以此心事君臣雖愚竊慕孝子之心以為事君之法臣昨在外方聞皇帝陛下即政之始太皇太后陛下垂簾之初內批廢罷京師民情不便十餘事及屏黜宋用臣等數人中外喧呼交相慶快又協天下之望登用忠賢以輔大政人皆謂積年之弊指日可除而七月于今未聞勇決猶鬱天下之望何也蓋忠賢少而姦邪衆陰為朋黨沮隔於其中耳臣誠惜陛下有哀矜庶物之心有愛育羣生之意四方疾苦又盡知之而未得曠然以發于天下也姦朋邪黨既已辜負聖君于前日又欲欺惑陛下於此時臣竊痛心彼見四方之人密封交進以訴疾苦于陛下則亦自知為朝廷謀者不忠矣其心顛沛惟恐陛下有所更張蓋其事既窮則其過自顯而其身難立不得不多方以自為計也固有與忠賢佯為相親而心實忌惡之以伺其倦厭者有眀肆悖戾以侵侮忠賢而欲撓之使去者有默默不言是非兩可而茍容于其間者大要皆欲以自固其權自蓋其惡爾故議者曰姦邪不易去忠賢不易留治亂安危在忠邪去留之間爾此陛下知孤忠之難立則特力以主之可也知羣邪之難却則盡意以圖之可也先民之語曰屋漏在上知之在下今在下之人則皆知某人為忠賢某人為姦邪而不知朝廷之上宫闈之中能種種而知乎以陛下之聰眀宜無不知然臣私憂姦計密行羣邪浸長則陛下之仁心無復得施左右之忠賢無復能立朝廷之公議無復可伸四海之生靈無復受福天下之勢危矣此臣所以寤寐反側而為陛下憂之也今民之大害不過三五事而已儻陛下如聽政之初直從中批出指揮令罷某事則姦心自沮而陛下之聖澤行矣臣昨在河北為知縣奉行青苗免役保甲之法親見其害至深至悉非若他人泛泛而知之也如青苗實困民之本須盡罷之百姓乃蘇而近日指揮但令斂散不立額而已八月八日指揮則所以困民之本十分之八九猶在此必陛下不知也役錢天下億兆之家所共苦也須如舊來復行差法民乃便安而近日指揮但令減寬剩錢而已八月十六日指揮則億兆之家所共苦者十分之七八猶在此必陛下不知也保甲之害三路之民如在湯火未必皆法之弊蓋由提舉一司上下官吏逼之使然而近日指揮雖止令冬教然尚存官司七月六日指揮則所以為保甲之害者十分之六七猶在必陛下不知也此姦邪遂非飾過而巧辭強辨以欺惑聖聽將至深之弊略示更張以應副陛下聖意而已非至誠為國家去大害復大利以便百姓為太平長久之策者也此忠義之良心所以猶抑而姦邪之素計所以尚存也天下識者皆言陛下不絶害源百姓無由樂生不屏羣邪太平終是難致臣願陛下奮然獨斷如聽政之初行此數事則天下之大體無事陛下髙枕而臥矣貼黃稱如執論者以青苖免役遽罷之恐國用不足則乞陛下問以治平嘉祐之前國用何以不闕願令講究而言之
