body:
  text: 續資治通鑑長編巻一百七十四宋李燾撰仁宗皇祐五年春正月壬寅朔御大慶殿受朝初連日隂雪至是天氣澄霽契丹使人在廷下竊相語曰其聖徳所感歟丁未詔廣南西路轉運司移文止交趾助兵從狄青之請也狄青合孫沔余靖兩将之兵自桂州次賓州青以張忠蒋偕皆輕敵取死軍聲大沮前戒諸将無得妄與賊鬬聽吾所為陳曙恐青獨有功乘青未至以步卒八千犯賊潰於崑崙關其下殿直袁用等皆遁青曰令之不齊兵所以敗己酉晨㑹諸将堂上揖曙起并召用等三十二人按所以敗亡状驅出軍門斬之沔靖相顧愕然靖嘗迫曙出戰因離席而拜曰曙失律亦靖節制之罪青曰舍人文臣軍旅之責非所任也諸将皆股栗吕晦誌陳曙墓銘稱曙先與孫抗有隙抗時為廣西漕權桂州與余靖秘狄青所下令趣曙出戰曙遣其副蘇緘詣靖抗言不可抗怒趣戰愈急曙果戰敗及狄青至桂州抗悉以敗軍事歸曙故坐誅與國史事異當考朱夀隆傳云夀隆為廣西提刑狄青殺禆将不用命者張愿數人夀隆曰王師之来凢以除民害也愿等無罪不當死青感其言皆釋之按實録乃無張愿等姓名愿者忠弟見八月丙戌當考詔廣南東西湖南江西路新置轉運判官四員盖縁嶺表用兵均漕輓之勞非久制也候在任滿三年具逐人勞績取㫖罷不復置尋又詔轉運判官每因廵歴除本司牒委及依例㸃檢刑獄錢榖盜賊等事外如有廢置利害及舉劾移易官員並與轉運使同共施行此據㑹要去年六月始置運判初詔正月八日後詔乃四月九日今并附此庚戍詔館閣官已嘗為知州者自今與提㸃刑獄又詔西川去朝廷逺州縣官吏如有貪濫苛刻庸懦疾病以害民妨務者其令轉運提㸃刑獄司體量以聞辛亥觀文殿學士兼翰林侍讀學士尚書右丞丁度卒是日旬休上趣駕臨奠贈吏部尚書諡文簡度性純質不為威儀居一室十餘年左右無姫侍嘗語諸子曰王旦為宰相十五年卒之日子猶為布衣汝曹宜自力吾不復有請矣癸丑翰林學士承㫖兼侍讀學士王拱辰權知貢舉丙辰以廣南用兵罷上元張燈丁巳㑹靈觀火道士飲酒殿廬既醉而火發居宇神像悉被焚獨三聖御容得存乃詔權奉安於景靈宫諌官賈黯言天意所欲廢當罷營繕赦守衛者罪以示儆懼修省之意狄青既誅陳曙乃按軍不動更令調十日糧衆莫測賊覘者還以為軍未即進也翼日遂進軍青将前陣孫沔将次陣余靖将後陣夕次崑崙關黎明整大将旗鼓諸将環立帳前待令乃發而青已㣲服與先鋒度關趣諸将㑹食關外即歸仁舖為陣戊午賊率其衆列三鋭陣以拒官軍執大盾標槍衣絳衣望之如火及戰前軍稍却右将開封孫節死之按武貴傳稱前軍孫節賈逵傳稱右軍孫節而狄青傳乃稱前鋒孫節盖為前軍之右将當軍鋒最前爾張玉實将先鋒實録即稱節為先鋒恐誤玉傳可攷也今於此削先鋒字仍詳列先鋒左右将於後賊氣鋭甚沔等俱失色青起自執白旗麾蕃落騎兵張左右翼出賊後交擊左者右右者左已而右者復左左者復右賊衆不知所為大敗走儂智髙復趨邕州王師追奔五十里捕斬二千二百級其黨黄師宓儂建中智忠并偽官屬死者五十七人生禽賊五百餘人智髙夜縱火燒城遁由合江入大理國遲明青按兵入城獲金帛巨萬雜畜數千招復老壮七千二百嘗為賊所俘脅者慰遣使歸梟師宓等首於邕州城下得尸五千三百四十一築京觀於城北隅時有賊尸衣金龍衣衆以為智髙已死欲具奏青曰安知非詐耶寧失智髙不敢誣朝廷以貪功也青始至邕州㑹瘴霧昏塞或謂賊毒水上流士卒飲者多死青甚憂之一夕有泉湧寨下汲之甘衆遂以濟智髙自起至平㡬一年暴踐一方如行無人之境吏民不勝其毒先是謡言農家種糴家收而智髙為青所破皆如其謡其戰於歸仁也右班殿直張玉為先鋒如京副使賈逵将左西京左藏庫副使孫節将右既陣青誓曰不待令而舉者斬及節薄賊死山下逵私念所部忠敢澄海皆土兵數困而心懾易衂茍待令必為賊所薄且兵法先據髙者勝乃引兵疾趨山立始定而賊至逵擁衆而下揮劍大呼斷賊陣為二玉以先鋒突出陣前而青麾蕃落騎兵出賊後賊遂大潰逵乃詣青帳下請罪青拊逵背曰違令而勝權也何罪之有玉保定人逵藁城人也庚申降廣南東路鈐轄文思使王鍇為文思副使建州都監初儂智髙自邕州順流趨廣州仲簡令鍇領兵扼端州乃留市舶亭不行欲還守城簡不許鍇自還翌日海上廵檢右侍禁王世寧請分兵以徃鍇懼不從及賊抵城下又促世寧入城世寧至南門引大義責鍇稽留不進鍇怒以世寧違軍令斬之朝廷下廣州體量而魏瓘言世寧為海上廵檢若令領兵城中則舟船為賊有鍇令非也世寧有膽略敢戰且能守職其死甚寃於是降鍇而令訪世寧子以聞壬戍觀文殿學士吏部侍郎知定州韓𤦺為武康節度使知并州徙判并州李昭亮判成徳軍知成徳軍宋祁知定州琦知并州首罷昭亮所興不急之役奏逐走馬承受廖浩然浩然宦者怙勢嘗誣奏昭亮昭亮所以徙浩然力也琦言臣熟察浩然所奏多不實朝廷近差侍禁馮靖同承受浩然忌其亷潔無名奏納亦移靖他路既誣逐一大帥又望風誣逐一同職官朝廷略不辨證皆從其請官吏皆憂歎不安且浩然性貪恣不法状甚多願召還使保全不然臣将行法矣上俾浩然代歸敕本省鞭之寧化軍天池顯應廟在禁地中乆不葺契丹冐有之琦遣鈐轄蘓安静抵境上召其酋豪諭曰爾嘗求我修池神廟得爾國移文固在今曷為見侵也契丹無以對遂歸我冷泉村代州陽武寨地舊用鴻和爾山麓為界契丹侵耕不已琦又遣安静塹地立石限之自此不敢耕山上鴻和爾山據行状及家傳即六蕃嶺也祁在成徳請弛河東陜西馬禁聽蕃落民間自相賣買民養馬者勿升户等又請復唐䭾幕之制居三月徙定州又上言天下根本在河北河北根本在鎮定以其扼邊衝為國門户且契丹立國五十年習不畏人狡焉啟疆不能無動今礪甲鍛戈欲肆逞者惟定與鎮二軍不戰則進搏深趙邢洺扼吭擣虚深入疆圉無虚日矣案原本文義生澀不可尋究疑有脱誤今據厯代名臣奏議改正臣所以日夜深計者以為欲兵之强莫如多榖與財欲士訓練莫如善擇将欲人樂鬭莫如賞重而罰嚴欲賊觀望不敢前莫如使鎮重而定疆夫恥怯尚勇好論事甘得而忘死河北之人殆天性然陛下少勵之不憂不戰以欲戰之士不得善将雖鬭猶負無榖與財雖鎮金城定湯壕勢必輕今朝廷擇将練卒制財糧反以陜西河東為先河北為後非計也夫西賊兵鋭士寡不能深入河東天險敵憚為冦惟河北不然失長城之防自薊而南直視千里賊鼓而前如莞袵上行故曰謀契丹患不得不先河北謀河北捨定與鎮無可議矣故臣願先入榖鎮定鎮定已充可入榖餘州列将在陜西河東有功状者得遷鎮定則鎮定重天下乆平馬益少臣請多用歩兵夫閧然聚霍然去雲奔颷馳抄後掠前此馬之長也强弩巨挺長槍利刃什什相聮伍伍相遮大呼薄戰此歩之長也臣料朝廷與敵相攻必不深入窮追敺而去之及境則止然則不得馬而歩可用矣臣請損馬而益歩故馬少則騎精歩多則鬭徤我能用歩所長雖契丹多馬無所用之夫鎮定一體也自先帝以來為一道帥專而兵不分故定揕其胷則鎮掎其脅勢自然爾今判而為二其顯顯有害者北寨山川要險之地裂而有之平時號令文移不能一賊脱叩營壘則彼此不相謀誰肯任責耶臣請合鎮定為一路願以将相大臣領之無事時以鎮為治所有事則遷治定指授諸将權一而責有歸士無茍且之意䇿之上也惟陛下當安思危熟計所長必待事至而後圖之殆矣河東馬强士習善馳突與鎮定若表裏然東下井陘不百里入鎮定矣賊若深走以河東健馬佐鎮定兵掩其惰而歸者萬出萬全此一竒也臣聞事切於用者不可以文陳臣所論件目繁碎要待刀筆吏委曲可曉臣已便俗言之輙别上擇将畜財一封乞下樞密院三司裁制之臣一書生不知軍旅事偶有所見不敢隱特以受大恩思亟報也恐議渉迂暗有司疑詰更乞下臣令悉意條陳然後施行又上禦戎論七篇命知制誥王洙修纂地理書甲子内出手詔遣内侍撫問廣南将校仍賜軍士特支錢屯田員外郎直史館知鄂州楊畋責授太常博士知光化軍庚午降西京左藏庫使康州刺史沈惟恭為供備庫使監蔡州税西染院副使兼閤門通事舍人張承衍為供備庫副使監汝州税並坐勾當㑹靈觀遺火故也惟恭徳妃弟承衍樂安郡主壻命既下妃主皆為上章乞留京師上曰已行之命為國戚所回則法徒設矣二月壬申朔詔開封府促惟恭承衍之任樂安郡主章懿太后養女命為昭成太子元僖女焉丙子上謂輔臣曰狄青已破賊立功将士宜速議賞緩則不足以勸因言朕常觀魏太祖雄材大略然多譎詐唐荘宗亦豪傑行兵用師動無失䇿及即位游獵無節賞罰不時此二主者特将帥之才而無人君之量惜哉初殿中丞通判滁州王靖言太祖禽皇甫暉於滁州太宗下劉繼元於并州真宗禦契丹於澶州是三州皆宜立廟以昭遺烈於是即芳林園命工寫三聖御容宰相龎籍為奉安使權奉安於萬壽觀庚辰車駕詣觀行酌獻之禮癸未宣徽南院使彰化節度使狄青為䕶國節度使案宋史宰相表作䕶國節度使檢校太尉河中尹兼御史大夫樞密副使依前宣徽南院使初廣南捷書至上大喜謂宰相龎籍曰青破賊卿執議之力也遂欲擢青樞密使同平章事籍以為不可力争之乃罷劉敞曰初討智髙使楊畋以起居舍人行其後兩将敗沒賊勢益熾畋以故謫守鄂州及狄青率諸軍至邕一戰破之議者以為文士不足用而宿儒偉賢亦不能自解非知言者也楊畋之官素微又其行以使者徃而所與俱者蒋偕張忠之徒官皆在畋右或宿将自負頡頏作氣招之不來麾之不徃且安得有功青兩府本起行陣能得士卒心其勢固重而朝廷亦深借以權州郡得擅調發幕府得擅辟置将校得擅誅賞以此督戰亦安得無功使兩人易地而處巧拙等耳又曰初議發蕃部落馬擊儂賊殊怪之何則自古詩書所載皆云華夏異宜水陸異習歩騎異便以曹操之善将蹷於烏林故不得不怪也何意以此取勝哉驃騎将軍所将常選然亦有天幸未嘗敗衂近之矣青破賊時但為宣徽南院使敞云兩府似誤也豈宣徽使亞二府當時委任青已與執政均乎詔太常寺置丞一員以近上知禮院官兼之專檢視樂器廵省壇壝即命屯田員外郎集賢校理同知禮院馮誥兼本寺丞初侍御史吳秘言四郊壇外歩畆之内多被侵耕壇陛稜角甚有破裂或瀦水不通道路或剥林木以取課利兼太常寺樂器堆積㕔壁之下全無主職之嚴甚非聖朝崇禮樂之本意也臣以九寺之設惟大理有正員而他皆兼領豈至明之代惟重刑法而輕禮樂也今請選差一人為丞專任其事得以修補為業秩滿以能否升降之詔從秘言太常有丞自此始也馮誥兼太常丞乃此月己丑今并書之甲申赦廣南凡戰沒者給槥櫝䕶送還家無主者葬祭之免賊所過州縣田賦一年死事科徭二年貢舉人免解至禮部不預奏名者亦以名聞乙酉廣南東西湖南江西路安撫使樞密直學士右諌議大夫孫沔知桂州秘書監余靖並為給事中仍詔靖留屯邕州經制餘黨候處置畢乃還桂州狄青嘗問沔何以破賊沔曰使賊出上計收其保聚退守巢穴則當徐圖之據邕州以拒我師猶為中計若恃勝求戰此計最下然賊有輕我心必出下計将成禽爾已而果然沔與青夜謀幄中晝則推青自行之青治附賊者多誅殺沔與青分治所免釋數百人青既先還沔留治後事沔始受命數請騎兵又令軍中制長刀巨斧或謂南方地形不便騎兵而刀斧非所用青竟用騎兵破賊賊翳大盾翼兩標置陣甚堅矢石不可動竟頼刀斧雜短兵摶戰陣乃破人皆謂不及也廣南東西湖南江西路安撫副使入内押班内園使陵州團練使石全斌領綿州防禦使東頭供奉官閤門祇候狄諮為西染院副使兼閤門通事舍人右侍禁狄詠為閤門祇候諮詠皆青之子也詔學士院撰祭文以祭陣沒軍校仍别為文祭孫節丙戍詔禮賓副使廣南西路都監蕭注内殿崇班邕貴欽横潯賓龔七州都廵檢使王成東頭供奉官閤門祇候廣南西路都監于震同追捕儂智髙仍詔有能獲智髙者除正刺史同功人以次甄賞之初余靖遣注糾合諸溪洞注單騎入蠻帳頗結以恩威及狄青次賓州期諸将二十三日破賊青聞注依賊勢為姦利因欲鉤致軍前除之注恐見誅託為游言不敢至於是即令追捕智髙尋有詔權知邕州丙戍十五日也注權邕州乃二十八日己亥今并書丁亥徳音降江西湖南繫囚罪一等徒以下釋之丁壮饋運廣南軍湏者减夏税之半免科徭一年賜狄青敦教坊第一區戊子詔文武官遇南郊得奏薦子孫而年老無子孫者聽奏期親一人從知諫院李兑所請也案成都府編録册云皇祐五年二月二十一日中書劄子吏部員外郎充天章閣待制知諫院兼判登聞檢院李兑劄子奏臣伏覩皇祐四年九月二日敕文今後文武臣僚毎遇郊禋合奏得親屬者除子孫依舊外餘朞親候再遇郊禋許奏一名大功已下三遇郊禋許奏一名伏緣文武臣僚内有於郊禋前方轉官該得奏蔭親屬或以衰朽又無子孫雖有朞親未得奏蔭若湏再遇郊禋竊恐難霑恩澤臣欲特降指揮今後文武臣僚有初該奏蔭而年老無子孫郊禋許奏朞親一名取進止奉聖旨依壬辰右諫議大夫天章閣待制田瑜為廣南東路體量安撫使度支副使工部郎中周沆為廣南西路體量安撫使詔江淮等路州軍今歲上供米除已轉供廣南更减五十萬石仍令三司體量逐路州軍災傷等第減定下發運司施行貸知邕州禮賓使宋克隆死除名杖脊刺配沙門島溪峒都廵檢東頭供奉官同修城劉荘除名杖脊刺配福建牢城賓州推官權通判王方靈山縣主薄權推官楊徳言並除名免杖刺配湖南本城永不録用坐儂賊再至棄城也斷敕既下其日大雨雹上急遣中使追敕已不及人亦頗憫之癸巳詔儀鸞司自今毋得以天下州府圖供張都亭驛初户部副使傅永言奉使契丹而接伴者問益州事且云曽見驛中畫圖故請禁之乙未詔大宗正司宗室有能習詩賦文詞者以名聞後二日又詔通經者差官試驗慮其專尚華藻不留意典籍也贈荆湖北路都監西京左藏庫副使孫節為忠武軍留後封其妻王氏為仁壽郡君賜冠帔官其子二人從子三人給諸司副使俸終喪己亥䕫州路轉運司請升南州為懐化軍并三溪入南川縣以朝臣為軍使兼知南川縣置主簿尉各一員從之三月壬寅詔廣南東西體量安撫使田瑜周沆本路忠敢澄海雄略等軍皆土人勇悍習知山川形勢宜與廣州魏瓘桂州余靖同議蒐捕之仍相度徙屯兵申逺近利害以聞癸夘詔郢隨唐均金房等州射生户非救應盜賊毋得輒役使及防送徃來違者論如役弓手條甲辰詔江南東路淮南路皇祐四年京東路慶厯八年皇祐元年人户所逋貸糧見行催納者其令轉運司候夏秋豐熟舉行之初上謂輔臣曰方春東作民頗艱食而諸路轉運司督責逺年貸糧非所以䘏民也至是中書檢勘年分具其目以進而降是詔貶廣南東路都監供備庫使蘇緘為房州司馬西路都監内殿崇班趙懷恩追三任為右衛率府副率金州安置右侍禁尹修已左班殿直蔡鼎臣各追三官配京東本城並坐邕州金城驛敗軍也庚戍右龍武大将軍克悚上擬試詩賦論十巻且請隨舉人赴殿試上曰宗子好學亦朝廷美事也令學士院召試三題既中等遷左衛大将軍克悚已見三年六月壬子御崇政殿試禮部奏名進士癸丑試諸科乙夘試特奏名進士及廣南進士又試諸科特奏名遣中使陳欽明賜交趾李徳政器幣初徳政欲遣兵助討賊既不許賊平特賜之古渭州距秦州三百里經雅爾峽邊臣屢欲城之而朝廷艱於饋餉不許陜西轉運使范祥既議解鹽通商驟加擢用狃於功利張昪未至祥權領州事不謀於衆遽請修築未得報輙自興役蕃部驚擾青唐族羌攻破綱威嶺堡圍雅爾峽寨殺官軍千餘人丁巳詔秦鳯路部署劉渙領兵討之仍詔祥專主饋餉毋得預軍事城古渭事詳見七月己丑庚申詔江淮南荆湖諸路募置就糧教閱忠節軍大州五百人小州二百人軍額在舊忠節之下川忠信之上軍額自閏七月辛未移入辛酉御崇政殿賜進士鄭獬等二百人及第一百五十人出身一百七十人同出身獬安陸人也壬戌賜諸科五百二十二人及第出身遣入内供奉官衛克懃體量古渭州蕃賊之衆寡仍詔秦鳯經略使張昪部署劉渙招撫之毋得深入輕戰癸亥幸萬壽觀辭三聖御容甲子奉安太祖於滁州天慶觀瑞命殿太宗於并州資聖院統平殿真宗於澶州開福院信武殿各以輔臣為迎奉使副具儀仗導至近郊内臣管勾奉安百官辭觀門外其後上謂輔臣曰并州言四月二十二日奉安太宗御容仍以平晉記來上蓋紀太平興國四年征討之事是時車駕亦以四月二十二日至太原城下何其異也丙寅賜特奏名進士七十五人諸科四百三十人廣南特奏名六百九十一人出身及試銜文學長史夏四月庚午朔降陜西轉運使度支員外郎范祥為屯田員外郎坐擅興古渭之役也議者謂責祥太輕命陜西轉運使李參案宋史食貨志作李恭專制置解鹽代范祥也時參陜西轉運使閱五年矣慶厯八年九月參自西京徙自軍興以來諸路經略司多貸三司錢以佐軍謂之隨軍錢軍罷仍貸參權慶州鉤考得所貸八萬緡悉償之遂奏廢其庫又戍兵多而食苦不足參視民闕乏時令自度榖麥之入預貸以官錢榖麥熟則償謂之青苖錢數年兵食常有餘其後青苖法蓋取諸此朝廷患入中法歲費増廣參請飛錢於邊郡以平估糴權罷入中此參之法省𣙜貨錢以千萬計參以至和元年二月自陜西改江淮發運三事並附見辛未右諫議大夫天章閣待制趙及落待制知南京留守司御史臺以疾自請也壬申狄青還朝置酒垂拱殿癸酉占城國遣使來貢方物甲戍廣南西路轉運使孫抗轉運判官宋咸提㸃刑獄朱壽隆同提㸃刑獄髙惟和廣南東路轉運使元絳提㸃刑獄鮑軻荆湖南路轉運判官李章提㸃刑獄李肅之同提㸃刑獄栁渉以邕州平並遷官楊紘三年六月以刑中為湖南轉運使五年四月仍以刑中徙福建漕不見遷官當考乙亥邕州破蠻賊将分三等遷官遷者凡十三人三班使臣分五等遷資遷者凡七十二人丁丑賜澶州六塔河役卒緡錢戊寅詔益梓利三路去嵗蠶事薄收宜令三司權免先増上供絹三年庚辰契丹國母遣天武節度使左千牛衛上将軍蕭全益州觀察使王守道契丹遣瑞聖節度使耶律述崇禄少卿田文炳來賀乾元節是日御垂拱殿令蕃落騎兵布陣如歸仁舖破賊之勢觀其馳逐擊刺等第推賞仍以拱聖馬三百補其闕都大提舉教閱陣法右班殿直張玉遷内殿承制樞密直學士給事中孫沔還自嶺南帝問勞解所服御帶賜之壬午命知杭州沔自請也庚寅詔毋得連用太宗真宗舊名甲午命參知政事劉沆梁適監議大樂乙未詳定大樂所言知制誥王洙奏黄鍾為宫最尊者但聲有尊卑爾不必在其形體也言鐘磬依律數為大小之制者經典無正文惟鄭康成立意言之亦自云假設之法孔頴達作疏因而述之據歴代史籍亦無鐘磬依數大小之説其康成頴達等即非身曽制作樂器至如言磬前長三律二尺七寸後長二律一尺八寸是磬有大小之制者據此黄鍾為律臣曽依此法造黄鍾特磬者止得林鍾律聲若隨律長短為鐘磬大小之制則黄鍾長二尺二寸半減至應鍾則形制大小比黄鍾才四分之一又九月十月以無射應鍾為宮即黄鍾大吕反為商聲宮小而商大是君弱臣彊之象今參酌其鎛鐘特磬制度欲且各依律數算定長短大小容受之數仍以皇祐中黍尺為法鑄大吕應鍾鐘磬各一即見形制聲韻所歸奏可丁酉命户部副使傅永兼秦鳯路制置糧草知秦州張昪請棄古渭勿城故遣永視之詳見七月己丑日是日邇英閣講書冏命侍御僕從罔匪正人帝曰君臣之際必誠意相通而後治道成楊安國對曰陛下聰明文思從諌弗咈如水之走下視羣臣若僚友自古盛王未之有也帝曰臣下能進忠言朕何惜夏禹之拜五月辛丑命鹽鐵副使劉元瑜按視汴水利害以聞詔古渭州蕃族未平宜令知渭州王素及秦鳯路城寨嚴備之癸夘知并州韓琦兼制置本路糧草乙巳樞密使户部侍郎髙若訥罷為尚書左丞觀文殿學士兼翰林侍讀學士同羣牧制置使樞密副使宣徽南院使䕶國節度使狄青為樞密使青既平嶺南上欲用為樞密使同平章事宰臣龎籍曰昔太祖時慕容延釗将兵一舉得荆南湖南之地方數千里兵不血刃不過遷官加爵邑錫金帛不用為樞密使曹彬平江南禽李煜欲求使相太祖不與曰今西有汾晉北有幽薊汝為使相那肯復為朕死戰耶賜錢二十萬貫而已祖宗重名器如山岳輕金帛如糞壤此陛下所當法也青奉陛下威靈珍戮兇醜克稱聖心誠可襃賞然方於延釗與彬之功不逮逺矣若遂用為樞密使同平章事則青名位極矣冦盜之警不可前知萬一他日青更立大功欲何官賞之且樞密使髙若訥無過若何罷之不若但與移鎮加檢校官多賜金帛亦足以酬青功矣上曰向者諫官御史言若訥舉胡恢書石經恢狂險無行又若訥前導者毆人致死何謂無過籍曰今之庶僚舉選人充京官未遷官者猶不坐况若訥大臣舉恢以本官書石經未嘗有所遷也奈何以此解其樞務哉若訥居馬上前導去之里餘不幸毆人致死若訥尋執之以付開封府正其法若訥何罪哉且諫官御史上言之時陛下既已赦之矣今乃追舉以為罪無乃不可乎叅知政事梁適曰王則止據貝州一城文彦博攻而拔之還為宰相儂智髙擾廣南兩路青討而平之為樞密使何足為過哉籍曰貝州之賞當時論者已嫌其太厚然彦博為叅知政事若宰相有闕次補亦當為之况有功乎又國朝文臣為宰相出入無常武臣為樞密使非有大罪不可罷也且臣不欲使青為樞密使者非徒為國家惜名器亦欲保全青之功名爾青起於行伍驟擢為樞密副使中外咸以為國朝未有此今青立大功言者方息若又賞之太過是復召衆言也争之累日上乃從之曰然則更與其諸子官如何籍曰昔衛青有功四子皆封侯此固有前世之比無傷也上既從籍言後數日兩府奏事上顧籍笑曰卿前日商量除青官深合事宜可為深逺矣是時適意以若訥為樞密使位在已上宰相有闕若訥當次補青武臣雖為樞密使不妨已塗轍故於上前爭之既不得退甚不懌乃密為奏言狄青功大賞薄無以勸後又密使人以上前之語告青又使人語入内押班石全斌使於禁中自訟其功及言青與孫沔襃賞太薄適許為外助上既日日聞之不能無信於是兩府進對上忽謂籍曰平南之功前者賞之太薄今以狄青為樞密使孫沔為副石全斌先給觀察使俸更俟一年除觀察使髙若訥遷一官加近上學士置之經筵召張堯佐歸宣徽院聲色俱厲籍錯愕對曰容臣等退至中書商議明日再奏上曰勿往中書只於殿門閤内議之朕坐於此以俟籍乃與同列議於殿門閤内具奏皆如聖㫖復入對上容色乃和因詔軍國大政邊防重事候前殿退請對後殿先一日具所陳以聞此據本志及㑹要故事樞宻使罷必學士院降制及罷若訥止命舍人草詞後遂為例若訥傳云凡内降恩若訥多覆奏不行入内都知王守忠欲得節度使因執為不可若訥畏惕少過而前騶毆路人輙至死御史奏彈之㑹狄青破儂智髙還帝欲用為樞宻使遂罷覆奏内降恐若訥未必能爾當考丙午詔判河陽宣徽南院使張堯佐歸院供職丁未樞宻直學士給事中新知杭州孫沔為樞宻副使沔行至南京召還給事中知桂州余靖為工部侍郎時御史梁蒨數言靖賞薄孫沔既與狄青繼踐二府故靖亦復加秩以蕃官普延為銀青光禄大夫國子祭酒監察御史武騎尉知廣州魏瓘言儂智髙圍城普延能以猛火油燒其攻具也戊申詔如聞諸路轉運使多掊克於民以官錢為羡餘入助三司經費又髙估夏秋諸物抑人户輸見錢並宜禁絶之三司嘗責諸道羡餘淮南轉運使張瓌獨上金九錢三司怒移文詆之甚急瓌以賦數民貧為對張瓌貢金九錢不得其時今附此己酉詔沿邊州軍有舉人寄户以冀恩澤者令安撫司察舉之庚戍詔審刑院大理寺廣南西路城邑完兵力可以固守而官吏避賊者正其罪其無城邑若兵力不敵者奏裁壬子御崇政殿録繫囚雜犯死罪以下遞降一等徒以下釋之乙夘賜古渭州軍士及弓箭手寨户緡錢丁巳知并州韓琦請置壮城兵士五百人以濬城池從之詔邕州自經蠻賊後物價翔貴其下户令轉運司户貸米一石以濟之戊午環慶經略司言夏國兵馬數出冦邊詔邊吏嚴備之毋得輙有侵軼翰林學士承㫖王拱辰言奉詔詳定大樂比臣至局鐘磬已成竊縁律有長短磬有大小黄鍾九寸最長其氣陽其象土其正聲為宮為諸律之首蓋君徳之象不可並也今十二鐘磬一以黄鍾為率與古為異臣亦嘗詢阮逸胡瑗等皆言依律大小則聲不能諧故臣竊有疑請下詳定大樂所更稽古義叅定之辛酉知諫院李兑言曩者紫宸殿閱太常新樂議者以鐘之形制未中律度遂斥而不用復詔近侍詳定竊聞崇文院聚議而王拱辰欲更前史文義王洙不從語言徃復殆至諠譁夫樂之道廣大微妙非知音入神豈可輕議西漢去聖尚近有制氏世典大樂但能紀其鏗鏘而不能言其義况今又千餘年而欲求三代之音不亦難乎且阮逸罪廢之人安能通明述作之事務為異説欲規恩賞朝廷制樂數年當國財匱乏之時煩費甚廣器既成矣又欲改為雖命兩府大臣監議然未能裁定其當請以新成鐘磬與祖宗舊樂叅校其聲但取諧和近雅者合用之洙既與瑗逸更造鐘磬而無形制容受之别又數勸上用新樂於南郊而議者多以為非後亦不復用壬戍詔杭鄆二州去年秋税已倚閣其别州軍災傷者令本路轉運司約此施行又詔諸路城池據衝要者即修築之其餘以漸興功毋或勞民癸亥尚書左丞兼御史中丞王舉正為禮部尚書觀文殿學士知通進銀臺司兼門下封駁事兼提舉祥源觀事狄青自樞宻副使遷樞宻使舉正又力争之既不能得因請解言職帝稱其得風憲體遣使就第賜白金三百兩而有是命翰林學士兼侍讀學士吏部郎中知制誥史館修撰孫抃為左諫議大夫權御史中丞抃性篤厚寡言質略無威儀雖久處顯要循循罕所建明及制下諫官韓絳論奏抃非糾繩才不可任風憲抃即手疏曰臣觀方今士人趨進者多廉退者少以善求事為精神以能訐人為風采㨗給若嗇夫者謂之有議論刻深若酷吏者謂之有政事諫官所謂才者無乃謂是乎若然臣誠不能也上察其言趣令視事且命知審官院抃辭以任言責不當兼事局乃止抃知審官其日庚午今并書甲子詔諫官御史上章論事毋或朋比以中傷善良又詔兩制兩省臺諫官三館帶職省府推判官等次對言事凢朝政得失生民利病災異時數直言無隱不得徇私挾情抉擿隂細無益治道務在公實觀文殿以下學士至待制合直牒閤門上殿者許請對餘官苐奏封事涉機宻者並用薄紙重封以防漏泄學士待制許請對餘官奏封事此據㑹要實録無之六月己巳朔詔武臣除喪者自今如文臣例先給告身然後入見又詔朝臣入皇城門行馬失序者減律朝㑹應集告而不至罪一等仍理為過犯中書劄子言比來百官入朝多失次序有迫近兩地臣僚行馬者大理寺斷遣違儀式笞四十公坐况入朝過時已涉違慢又迫近二府行馬止與失儀同科行罰未允下御史臺審刑院大理寺叅定而臺寺檢詳律文若朝㑹侍衛違失儀式者笞四十應集告而不至者笞五十又景祐元年中書劄子應文武臣僚京官使臣失儀者依儀責罰不理為過犯今請朝臣入皇城門行馬湏依次序違者減律朝㑹應集告而不至者罪一等殿中侍御史裏行俞希孟又言臺寺所定刑名雖當然不當引景祐元年劄子不理為過犯故降是詔俞希孟坐此議不得為御史在至和元年十月辛未還曹利用所籍樂遊坊第初上憫利用死非辜既賜諡立碑至是又以其第還之癸酉賜環州諸軍及慶州廵檢兵緡錢乙亥御紫宸殿奏太常寺新定大安之樂召輔臣至省府館閣學官預觀之仍觀宗廟祭器賜詳定官器幣有差丁丑詔比聞臣僚坐事未斷而方鎮奏辟或父兄為陳請規為去官者宜禁止之己夘贈東頭供奉官閤門祗候王從政為信州刺史録其孫二人從政女賜冠帔旌館門驛死事也從政死於館門驛本𫝊誤作太平場今改之壬午右武大将軍宗諤上治原十五巻降詔奨諭宗諤允寧子也癸未詔廣南西路夏税布舊例每匹折錢二百如聞本路擅減其價用困於民宜復其價如故丙戍新修集禧觀成初㑹靈觀火更名曰集禧即舊址西偏復建一殿共祀五岳名曰奉神殿蓋取真宗嘗著奉神述也因命知制誥蔡襄重模真宗御書故本立石於東廡名曰神藻殿仍令襄書額㑹靈觀大在正月丙辰丁亥知雄州右騏驥使榮州刺史李緯為西上閤門使留再任緯治兵頗嚴不事厨傳數與宦者争利害積公使錢貯米三千斛為常平倉奏下其法他州詔諸司副使三班使臣非閤門祇候在京毋得連任己丑詔三司副使自今以二年為一任毋遣出使賜黄河役卒衫袴壬辰諸路轉運使上供斛斗依時估收市之毋得抑配人户仍停考課賞罰之制先是三司與發運司謀聚斂奏諸路轉運使上供不足者皆行責降有餘則加升擢由是貪進者競為誅剥民不堪命上聞之特降是詔天下稱慶天下稱慶此據㑹要景徳二年十二月詔可考甲午贈邕州司户叅軍孔宗旦為太子中允知袁州祖無擇始以宗旦死事聞故也乙未詔河北洊饑流民未復安撫轉運使察州縣長吏能招輯勞徠者上其状不稱職者舉劾之封南海洪聖廣利王為洪聖廣利昭順王轉運使元絳言賊冦廣州數有風雨之變賊懼而遁州人頼其神靈故加封之丙申荆南鈐轄皇城使資州刺史王遂上所制臨陣拐槍遂四月甲戌以平邕州第一等功自左衛将軍遷皇城使資州刺史未詳何許人
