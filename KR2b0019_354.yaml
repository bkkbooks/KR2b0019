body:
  text: 續資治通鑑長編巻三百五十宋李燾撰神宗元豐七年十一月丁酉朔詔築誠州上誠天村大由三寨從湖北鈐轄運司請也涇原路經畧使盧秉言西賊入静邉寨隊將借職白玉蕃部落軍使李貴戰死詔錄玉子一人貴子二人新紀書夏人冦静邉寨隊將白玉李貴死之舊紀不書又詔涇原熈河蘭㑹路賞功宣告入急遞以徃戊戌詔盧秉措置禦賊兵將有勞降詔奬諭賜帶馬及銀絹五百初賊遣黠酋星多哩鼎將舉國入冦秉團兵瓦亭分遣彭孫姚雄率師駐静邉俄報賊犯熈河定西城秉遽麾瓦亭全師遣姚麟夜趨静邉且指賊來路曰吾凌晨坐得㨗報矣麟中夜至静邉黎明賊至驚曰王師天降也彭孫等遽擊之衆大潰斬獲甚衆星多哩鼎死于陣有識其衣服者諸將請以聞秉曰諸將上功多恨不實吾可以疑似要賞耶既而諜者言所殺眞星多哩鼎也上遣中貴人取所獲器甲以獻此據盧秉傳然秉乙未日奏殺賊首領星多哩鼎稱彭孫郭振措置精審姚麟等雖不見賊總兵張大聲援而本傳乃以殺星多哩鼎為姚麟等功恐誤也今改修云姚麟中夜至邉黎明彭孫等遽撃賊庶與乙未所奏不相牴牾奏状要可信也更須考詳己亥著作佐郎邢恕言官制史館掌修撰國史實録之事其屬有日厯所比廢編修院歸史館又崇文院未罷日史館有主判官昨以官制罷主判則掌國史實錄修纂日厯諸司關報時政記並歸秘書省國史案長貳丞與著作同領簽書即難别有日厯所乞諸司闗報但稱秘書省中書勘㑹日厯長貳丞不與修纂時政記起居注並於著作所開拆入庫封鎻自今諸司關報文字並稱秘書省國史時政記日厯事非編修官不與詔陜西河東諸路西賊舉國入冦一路如昨犯蘭州之北方得關報餘路牽制不須豫差定軍馬常在極邉其餘鈔略止依例互相關報詔増差廣南東路鈐轄張整為廣西鈐轄駐桂州其廣西上供錢禁軍闕額錢米並令樁留其常平免役寛剰經畧司和糴度僧牒錢緩急並奏聽支用從知桂州苖時中請也十二月六日庚子樞宻院言凖朝㫖涇原路差赴城寨堡鎭防秋卒比之諸路早發並與特支其常例差發者不給涇原路經畧司誤比類該説不盡指揮給渭州防秋府界第四將詔轉運司劾罪已支錢更不拘收勒干繫人均偹後經畧使盧秉言誤給錢乞獨坐罪詔秉罰銅二十斤劾罪均備指揮不行十月三日可考辛丑詔承務郎及使臣以上致仕嘗以戰功遷官者俸錢衣並全給餘厯任無公私罪事理重及贓罪給半因過犯若老疾體量致仕者不給非戰功而功狀顯著者奏裁舊紀書詔致仕官俸有戰功者全給無贓罪公私罪重者給半績効尤異雖非戰功奏裁新紀不書尚書省言大理寺斷潞州民王徳與弟亮婦程姦造意與程謀殺亮死程案問從故殺處死徳減死流二千里刺配按王徳不應用程為首減等詔大理寺斷官罰銅十斤餘干繫官各八斤刑部千繫官吏各六斤壬寅管勾熈河蘭㑹經畧司機宜文字穆衍言夏人入朝乞殺禮待之使董戩無校量輕重之别不報穆衍河中人紹聖二年十二月有傳提㸃江浙等路坑冶鑄錢胡宗師言信州鉛山縣銅坑發已置場冶乞借江東提舉司錢三十萬緡以鑄新錢息二分還福建二浙有銅坑處凖此戸部言宗師言皆可推行詔借江東提舉司錢十五萬緡以所鑄錢還所乞福建二浙借錢不行朱本削去甲辰詔使髙麗兩畨都轄以下涉海有勞各遷一資中書省言聞開封府大理寺禁繫甚多詔令刑察御史與刑部郎中速往㸃檢趣結絶河東經畧使吕惠卿言馬數倍少若依舊條買不入望許河外諸將下馬比舊等尺短五分以下堪被甲者給價填闕候事平依舊條從之熈河蘭㑹路制置司言昨西賊犯定西城兩監押并熨斗平侍禁閻佶將護入馬照應内傷中獲級及戰死禁軍等百九人已賞三十人乞推恩内定西城監押李中冦士元不審賊勢鬭敵損折人馬又緣皆見敵死戰又有斬獲乞以功補過並從之夏國主秉常遣摩格蔑宻伊裕齎表入貢其表曰秉常輒罄丹𠂻仰塵淵聼不避再三之干凟貴圖溥率之和平况夏國累得西蕃摩正王子差人齎到文字稱南朝與夏國交戰歳乆生靈受苦欲擬説話却令兩下依舊通和縁夏國先曽奏請所侵過疆土朝廷不從以此未便輕許於七月内再有西蕃人使繖巴沁鼐丹新等到夏國稱兼得南朝言語許令夏國計㑹令但差使臣齎計㑹表狀西蕃國自差人赴南朝前去切念臣自厯世以來貢奉朝廷無所虧怠至於近歳尤甚歡和不意憸人誣間朝廷特起大兵諸路見討侵奪却疆土城寨自此稱怨歳致交兵今朝廷示以大義特賜還夏國疆土城寨伏望皇帝陛下開日月之明擴天地之造俾還疆土通遐域之貢輸用息干戈庶生民之康㤗儻垂開許别效忠勤上即録本以付李憲仍詔憲詳其來文乃不移前請兼言董戩使人招徠及妄言朝命許其通使之意與鄂特凌古期望本情大段草畧不同可因其使來詳開諭之朱本増入新本削去乙巳著作佐郎邢恕守職方員外郎特書此月戊辰為十二月蔡確事刑部言知汝州中大夫蒲宗孟已滿一朞宗孟前執政未敢凖待制以上條檢舉詔自今執政官罷黜及朞中書省檢舉取㫖詔毎歳賜錢二百萬緡付熈河蘭㑹路邉防財用司充經費丁未寳文閣待制權知開封府寋周輔試中書舍人周輔治開封府數月中丞黄履言周輔攬權歸已留事不决非剸煩之才故也中書舍人蔡京為龍圖閣侍制權知開封府詔應武舉及試出官並依進士試大義一塲苐一等取四通第二等取三通第三等取二通並為中格從司業翟思朱服所定也宣徳郎太學博士邵材為監察御史材宜興人上臨朝甚肅初賜對者徃徃震懾不稱㫖材入見延和殿雍容占奏因曰去歳郊祀臣以太學博士陪祠事陛下至太廟及圜丘執禮甚嚴陛下臨天下將二十年而秉心愈小事天地宗廟愈恭此盛徳也然成天下之大業亦在於持乆不倦耳上首肯之崇寜四年閏二月有材傳此據傳増入河東經畧使吕惠卿言近支末鹽錢三十萬緡赴本路糴買復准户部符給錢銀紬絹鈔入中不行乞於在京樁管見錢從本司出鈔糴買或令人入便其戸部鈔見在本司而河東轉運副使孫覽亦言本司科秋税糧草經畧司令民折納錢如朝㫖許理經畧司以支移糧草折納即乞令經畧司一面管認應付本司支移年計糧草詔並依惠卿所請已出鈔令戸部收毁其經畧司所納轉運司支移年計糧草本司依數管認應副餘令轉運司計置戊申廣南東路轉運副使髙鎛言本路賣鹽場務多虧欠欲依六路鹽法就差逐州管勾官為鹽官考校功過賞罰乞令提㸃刑獄兼提舉鹽事從之己酉中大夫知汝州蒲宗孟為資政殿學士知亳州辛亥冬至不視朝乙卯太白晝見兩紀並書資政殿大學士降授正議大夫吕公著復光祿大夫公著先坐知定州日違法差禁軍防送罪人降官滿一朞也禮部乞諸州不置學官處委轉運司選官及生員多可置教授申本部下國子監審察從之丁巳寳文閣待制寋周輔試刑部侍郎周輔以衰耄廢學免中書舍人故有是命如京副使姚雄為莊宅副使内殿崇班姚古為供偹庫副使兼閤門通事舍人西頭供奉官姚評轉一官减磨勘二年為閤門祗候東頭供奉官彭孝義為西京左藏庫副使内殿崇班孫文顯東頭供奉官李贇左侍禁彭傑並為内殿承制餘遷官减磨勘年有差凡四百九人内諸軍以功次賜絹盧秉第上西賊入静邉寨雜功也中書省言元豐二年提舉茶場李稷以息税五十萬緡為額後陸師閔奏自立額後連歳增羡乞自七年以百萬緡為額未知虛實詔𣙜茶司具自二年立額後至六年所収息税有無増剰及支費數以聞本司具數上乃下刑部驅磨其舊封樁及見在錢並令交割與陜西逐路常平司封樁大理寺上太府少卿吳安持誣奏宰臣蔡確弟碩令幹吏張慶承認賒欠官錢人朱申羅錢未納案安持應私罪徒二年蔡確言安持本縁臣家事乞特寛赦詔安持免勒停増差監曹州酒務御集載此事差詳今附見軍器少監蔡碩奏曽令夲家宣借張慶買羅計價二百貫約今年正月還未還凖抵當所公文稱其錢合赴官送納臣已令張慶齎錢送納了當却凖太府寺差人捉領張慶與元賣羅人一處禁勘伏縁太府少卿吳安持昨為相州公事係臣兄根治安持所坐尤重賣羅人合催納官錢甚多何獨於臣乃要根鞫欲望送不干礙官司盡理根究御批宜令開封府審行根究如所欠錢委已送納了足其太府寺勾到剰員張慶即畫時疎放仍契勘本寺同犯上件所欠官錢人如不曽勾勘本寺官吏用情違法狀聞奏元豐七年九月十七日下京東路都轉運使吳居厚奏元豐七年分支過鹽息錢一十五萬貫九百八十三文買到絹一十三萬六千六百六匹起赴澤州保甲司交納外欲乞今後每年酌中認絹一十三萬匹為額以鹽息錢從本司計置及依已得朝㫖兊到轉運提刑提舉司所管諸般絹帛展限一月到澤州餘並依元降指揮詔所乞展限不行餘依奏寔録甚畧今用宻記己未涇原路經畧安撫使知渭州盧秉以父老乞浙西一郡上批秉乆官塞上甚得静重制賊方畧昨静邉之㨗多其經畫降詔不允秦鳯路經畧司言吕温卿乞本州雞川寨外置水寨今相度若就下修築増置樓櫓防守人兵噐具遇賊圍閉外乗髙險下瞰水寨不利守禦欲止開水渠引水入城鑿池貯之省功而可守從之辛酉木工楊琪為三班借職以修大相國寺西浮圖及延春閣畢功琪琰之弟也朱本簽貼云補一借職法不當書前史官書此意在謗訕遂削去今從新本紹聖元年六月壬辰蔡卞云云可考涇原路總管姚麟乞特給公使錢詔如更有邉事出入給千緡詔河北河東陕西路見在糧草每季於次季孟月具約支年月數上戸部壬戍詔新除吏部侍郎領左選熊本與吏部侍郎領右選陳安石兩易其職以本目疾引見選人不能讀奏也倉部郎中韓正彥言河北河東各止有銅錢一監乞兩路各増置一監歳鑄折二錢各十萬緡封樁詔轉運司相度以聞轉運司言其不便遂寢之癸亥詔太原府封樁二十将器甲什物未有官専提舉致經畧司時有假借出入宜差提㸃刑獄官提舉即非奉朝命支借者依擅支封樁錢物法京西轉運司言每歳於京西河陽差刈芟梢草夫納免夫錢應副洛口買梢草南路八州隨唐房州舊不差夫金均郢襄州丁多夫少欲敷納免夫錢於河北州軍兊還從之甲子蕃官供偹庫使興邁朗額依並為西京左藏庫副使河東第三將以出界遇敵獲級也乙丑以供偹庫使頴沁薩勒為皇城使文思副使結博約特為西左藏庫副使韓緒堅多克並為皇城副使西頭供奉官遵博納芝為内殿承制以賊入定西城頴沁薩勒等清野力戰堅多克重傷故也十二月丙寅朔分命輔臣祈雪三班奉職李概貸死免除名追二官勒停坐毆盗袴遞卒死大理寺當概公罪絞特貸之詔應臺察事已奏雖經恩不原丁夘環慶路經畧司言蕃官朗布以功遷四官乞換本族廵檢詔朗布為本族廵檢當一資餘依格推賞戊辰端明殿學士兼翰林侍讀學士太中大夫提舉崇福宫司馬光為資政殿學士降詔奬諭賜銀絹衣帶馬奉議郎范祖禹為秘省正字並以修資治通鑑書成也資治通鑑自治平三年置局光乞以韶州翁源縣令劉恕將作監主簿趙君錫同修君錫以父䘮不赴太常博士國子監直講劉攽代之攽在局五年通判秦州知資州龍水縣范祖禹代之每修一代史畢上之至是十五代紀三十巻總二百九十四巻目録考異各三十巻時攽出監衡州鹽酒務而恕已前卒上諭輔臣曰前代未嘗有此書過荀恱漢紀逺矣輔臣請觀之遂命付三省仍令速進入初元豐五年將行官制上於禁中自為圖帖定未出先謂輔臣曰官制將行欲取新舊人兩用之又曰御史大夫非司馬光不可蔡確進曰國是方定願少遲之王珪亦助確乃已及除光弟四任提舉崇福宫詔滿三十個月即不候替人發來赴闕不候替人發來赴闕此據光乞留䑓狀盖將復用光也是歳秋宴上感疾始有建儲意又謂輔臣曰來春建儲其以司馬光及吕公著為師保此據邵伯温元祐辨誣及吕大防所為吕公著墓碑大防止稱公著不及光當考蔡確知光必復用欲自託於光乃謂職方員外郎邢恕曰上以君實為資政殿學士異禮也君實好辭官確晚進不敢通書和叔門下士宜以書言不可辭之故恕但與光之子康書致確語康以白光光笑而不答亦再辭而後受之此亦據邵伯温辨誣恕除職方在十一月乙巳新紀特書戊辰司馬光上資治通鑑吕本中雜說元豐中吳充既相復召邢恕為館職恕復為校書在熈寧十年三月元豐初為館閣校勘四年八月兼史館檢討五年四月為校書郎七年五月為小著十一月為識方充去位蔡確頗喜恕因乗間說確曰天下士人所以屈節降志以干權貴者相公以為何求也確曰此無他為欲富貴爾恕曰相公之言盡得天下士人情實矣然有富貴已得名位已極而猶不改前日所為者何也確知恕言中已因曰此確所不識也恕曰富貴已得名位已極而猶不改前日所為者恕以為此乃愚人習常安故無逺志而然耳使明智者當此則必有以善其後矣恕切以為相公自徒歩結人主取宰相固有不盡合天下公論者然今名位已極富貴已乆而猶不盡改前日施設以相公明智如此而習於常人之情恕也疑之確徐曰奈何恕曰名位已極富貴已乆世人之情所深望者欲其位之益安譽之益崇為長乆之計耳若以今日施設而求位之益安譽之益崇猶倒行却走而及前景也其不曵地而死者幸也確曰子將何以教我願卒受命恕曰自熈寧以來改法更制不合人心者甚衆而所用於時者皆一切小人也而相公欲望以此等人行者今日之政望位之益安譽之益崇難矣夫難得而易失時也自古聖賢才智之所望而不可得者權也今相公既有時與權矣何不乗此勢稍收用舊人及更改政事之甚不便者以合人心而固公位乎何為汲汲而但隨衆人已也確曰善於是與恕情分日篤有意改更政事收用舊人矣及神宗升遐宣仁聼政銳意改作而恕助確猶欲漸漸改更乞元豐舊人不可多逐由此邪正遂分元豐末劉摰梁燾孫覺李常以次收用皆恕勸確為此劉摰元豐六年四月二十四日以右司郎中衝替八年四月十四日自滑州召為吏部郎中梁燾元豐八年四月十四日自京西北路提刑召為工部郎中孫覺元豐六年六月自京南留守召為太常少卿李常元豐五年四月自淮西提刑召為太常少卿六年六月遷禮部侍郎吏部言故參知政事陳彭年孫喜昌與弟素各乞祖繪像恩喜昌坐盗發彭年塜杖脊刺配詔推恩其弟素己巳詔自今詞官致齋非行事官不通謁前因黄履申請已有此禁當考庚午皇第十二子似為集慶軍節度使和國公新紀不書節度使辛未詔來年正月上辛祈榖罷庚子紫宸殿燕治平二年可考䕫州路轉運判官宋構言本路鹽井未嘗𣙜課利不均及乞㩁買逹州茶許商人出引行梓州路詔轉運及𣙜茶司詳度朱本簽貼云元祐元年逐司相度到别無利息進呈訖不行合刪去今復存之詔聞新廣西鈐轄張整馭軍太急委知桂州苖時中覺察無致生事十一月初三日樞宻院言西賊近冦諸路方戒嚴時慮邉民私博易或漏邉機詔陜西河東經畧司嚴加約束手詔李憲得來奏以河北賊聚有利可乗欲量發兵馬討襲事將帥能爾朕復何憂賊之滅亡想無日矣披閱再三不忘嘉歎惟更加詳審布置但舉無虛發大殱醜類俾漢威逺暢羌人震疊乃所望也其騎兵須用二萬以上歩人稱是仍作家計勿得逺行但使勁騎四散取利抄掠或選健將部而東上逼賊梟巢使上下震恐奔駭則不世之功庻幾可立矣今制獄雖未結案其犯者朝廷必止於凴律用法不至於異常加典爾宜安心展布四體經營縁今來所為至重至大非平常邉事之比其審念之敬之重之勿虧損前績啟侮羌人朱本増入新本削去墨本書御史臺制勘公事所言李憲三問不承即乞追攝詔用衆證結案朱本削去新本復存之今依朱本移入斷罪處又詔許四選命官通算學者依參選人赴吏部就試合格人上等除博士中下等為學諭元祐元年六月二十八日罷算學癸酉中㪚大夫前成都府路轉運使李之純為右司郎中之純在蜀三任至是代還上勞之曰逺方不欲數易大吏劔外邉夷安静年糓屢豐斯見朝廷綏逺之意也因有是命御史翟思言乞自今在京發解禮部試進士據入試人數以解額隨所治經十分數均取有餘不足相補各無過三分從之甲戍詔陜西買馬𨽻經制熈河蘭㑹路邉防財用司通直郎李孝謹貸死除名配南䧺州牢城免决刺坐前知齊州禹城縣受金錢大理寺當孝謹罪絞特貸之丁丑權提㸃開封府界諸縣鎭公事范峋言前此三年本司歳計乞朝廷特賜及借支錢四十萬緡才以充用今諸縣夏秋所收頗有足額比舊増六十餘萬乞以所餘二十萬緡佐他司之用詔予熙河蘭㑹路修努扎城令戸部印給公據經制司召人入便又乞再展限一年帶納諸積欠稅課從之戊寅同管勾京西路保馬吕公雅言有官之家守官在外止出助錢不均乞令養馬兵部欲令有同居親屬自佃田產者依餘戸養馬從之庚辰分命輔臣謝雪詔戸部尚書王存侍郎楊汲各展磨勘二年郎中晁端彥展三年坐言乞復銅禁不知増錢監用銅多也此事當考實録殊不了了辛巳詔朝廷封樁錢物令尚書省歳終具旁通冊進入詔諸軍雖非出戍因差使不宿於家其妻犯姦許鄰人吿詔三路州封樁常平錢物半年一具數上都省又詔常平免役場務錢榖剰數提舉常平司立限移於帥臣所在及邉要州封樁董戩鄂特凌古差首領齎蕃字并捉到夏國蕃部二人至熈州詔蕃部依蕃丁例刺配湖南北福建路本城所乞買銅及製造火珠二枚從之此據御集壬午龍圖閣直學士曽布為翰林學士布方免喪也詔黎茂威三州知州委鈐轄轉運司依選格奏差又詔川峽四路諸州録事司理參軍毋得並差川人皆從前成都府轉運使李之純請也癸未董戩進奉大首領薩卜賽死於都亭驛詔賻絹百匹仍與朝辭例物附給其家丁亥禮部言錢勰等昨在髙麗國聞女真四十餘人在彼嘗宻諭泉州商人郭敵徃招誘首領令入貢及與中國貿易仍諭敵如得女真語言即至明州知州馬珫處𫝊逹乞下珫候招誘到女真語言即具以聞詔從之其後女真卒不至戊子河東縁邉安撫司言奉詔衝注損界壕處計置北界官司同開修勘㑹代州縁邉諸寨先開立壕候界至甚明欲應諸寨界壕有衝注填淤處乞並候北人先計㑹即施行從之殿中侍御史蹇序辰為右司諫己丑朝散郎錢勰言奉使髙麗䝉賜金帶元不奉指揮許使回仍舊服用而閤門稱曽經恩賜須合改換勰以朝廷服章自有品秩不敢茍紊官制又起居郎楊景畧言䝉改紫章服及賜犀帶臣未敢擅易詔並依品秩瀘南縁邉安撫司言新收生界八姓羅始党一帶宋納兩江夷族願依七姓團結為義軍乞刺字支例物從之元豐六年八月二十二日敕瀘州諸監寨子弟依朝㫖合編排入保甲拘管元豐七年八月十六日樞宻院劄子安撫司奏八姓夷衆願依七姓十九姓等夷人例團結充義軍奉聖㫖宣依所奏元豐七年十二月二十四日敕安撫使司奏勾到羅始党生界八姓等各願團結編排都共一萬五千六百六十人並隨夷情團結為三十一指揮羅始党生界八姓團結為八指揮乞以歸化義軍為名都党十九族團為八指揮乞以順化義軍為名長寕軍管下山前後九州等團為十五指揮乞以懐化義軍為名七年十二月二十四日庚寅詔門下中書外省官同舉言事御史二員河北西路提舉常平胡僧孺衝替坐前任陜西轉運司勾當公事姦雜戸也詔諸路官司倉庫不可專行及無法式並申所屬寺監寺監不可專行申尚書本部本部不可專行上都省若直彼朝㫖應覆奏者依本條元祐元年九月二十八日王存云云辛夘遼主遣永州觀察使耶律㐮太常少卿史館修撰賈師訓來賀正旦壬辰詔保甲願賣所賞銀盂椀入官者聼保甲司買開封府界河東路於禁軍額錢内借支河北路於常平倉借支各七萬緡癸巳詔請給毋得於三路勘請廢通逺軍來逺寨是歳宗室子賜名授官者四十九人斷大辟二千三百六十五人天下免役計緡錢一千八百七十二萬九千三百場務錢五百五萬九十榖帛石匹九十七萬六千六百五十七食貨志第二巻元豐七年事凡天下禁軍之籍熙寧五十六萬八千六百八十八人元豐六十一萬二千二百四十三人此據兵志首篇志又云總治平之兵一百十六萬二千兩禁軍步騎六十六萬三千已附治平四年八月二十二日須更考詳盖元豐視熙寜則増四萬三千五百五十五人視治平則减五萬七百五十七人而廂軍視祖宗時數益衆云此據兵志刪修熙寧四年十二月十六日附載天下廂軍馬步指揮凡八百四十其為兵凡二十二萬七千六百二十七而府界諸司或因事招募之類不與焉此熙寧四年數也未見元豐實數按治平兵數總一廂十六萬二千除禁兵六十六萬三千外廂兵凡四十九萬九千而熙寕四年總廂兵數乃止二十二萬七千六百二十七視治平幾减二十七萬雖熙寕四年府界諸司所招募不在其數又恐所招募數亦不至一倍有餘疑熙寕四年十二月所載二十二萬七千六百二十七或有差錯不然治平四年八月所載一百十六萬二千亦未審也然兩朝兵志所載兵數亦與此同當别考詳又按兩朝兵志景祐中本城兵四十三萬八千逮治平三年乃五十萬矣此合參考或熙寧四年十二月所載二十二萬七千六百二十七止是改立新額人數又在外也須通前後細考之又按本志廂軍八百四十指揮毎指揮不過五百人今且以五百人為率亦合計四十二萬人不應只有二十二萬七千六百二十七人然以本志諸路分數計之即與總數不差未審何故又恐舊額兵數有不廢者其數亦不應與新額相倍雖府界諸司招募數或可并入此數即此兩朝志所稱五十萬數猶不及焉不應即稱視祖宗時數益衆也舊額不廢今具此河北路四指揮橋道壯城牢城馬監河東路五指揮本城牢城壯城雜攅作院工匠陜西路九指揮開山闗河司牧省作院牢城壯城馬監色役咸陽橋道京東路四指揮壯城馬監裝卸牢城京西路一十一指揮橋道開道步驛㑹通橋道採造牢城壯城馬監三水磨東西八作窰務淮南路一十二指揮橋道水運梢工都裝發防成水軍橋道車軍監軍新招梢工抜頭水軍牢城剰員直兩浙路一十指揮水軍船坊舡務車軍採造樓店務江橋院碇手堰軍親務江南路一十四指揮水軍裏運貢軍水運梢工都造舩軍匠步驛牢城壯城下卸錢監鐡木匠營酒務營竹匠營酒務雜役荆湖路五指揮歩驛水運舡坊渡船都清酒務船坊鐡作廣南路六指揮歩驛造船場駕綱水軍城面遞角塲運錫四川路四指揮橋道橋閣防河羅城牢城以上一十一路計八十四指揮係舊軍額不廢者併改新額河北曰崇勝為一百十二指揮河東䧺猛五十二陜西保寕一百十一京東奉化五十四京西勁武四十五淮南寕淮一百二兩浙崇節五十一江南効勇五十三荆湖宣節四十四福建保節三十三廣南清化八十二四川路克寧一百十一總天下指揮凡八百五十其為兵凡二十二萬七千六百二十七人而府界及諸司或因事募兵之類不與焉
