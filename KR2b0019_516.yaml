body:
  text: 續資治通鑑長編巻五百十二宋李燾撰哲宗元符二年秋七月壬寅朔癸卯右正言鄒浩奏伏聞陸師閔除寳文閣待制知河南府契勘師閔於今年三月十九日罷户部侍郎差知蘄州四月二十二日改差知懷州蓋縁任秦鳯路經略使日鍾傳虛奏功賞保明不實情渉欺罔及承受朝㫖許妄冒人自陳免罪不即出牓事屬稽慢夫欺罔稽慢乃臣子大罪而師閔坐此黜謪甫及百日遽然復職俾司留鑰不惟駭動羣聽實無以懲示四方殆非至公之朝謹用賞罰之道伏望聖慈深賜省察特降指揮追寢師閔今來新命以允公議貼黄契勘師閔初被黜謫不即祗赴輒求善地公議固已罪之矣今到懷州席未及暖反亟褒復則是黜謫之命但行於小官而不行於貴近何以示懲戒於天下兼聞師閔在秦鳯日其親屬亦有妄冒功賞者身為帥臣而欺蔽至此尤典刑之所難貸也伏望睿慈省察施行又奏伏見所除師閔告詞有急於得人之際遂遽起用之語乃知朝廷非不知師閔黜謫未當牽復特以乏人任使故有是命然而賞罰之行所以懲勸天下惟其功罪而已不為時方多事故有功者不進但有罰而無賞不為時方乏人故有罪者不退但有賞而無罰又况師閔之罪已經推治迹狀甚明無可疑者其差知蘄州係是三月十九日至今月初二日牽復只得一百三日其改知懐州係是四月二十二日至今月初一日牽復只得七十日其懐州到任係是六月十一日至今月初二日牽復只得二十一日黜謫未乆天下所知若以乏人便當驟用不惟無以正師閔之罪兼此例一開自今以後凡有罪者無問誰何皆可以縁乏人而縱釋之矣尚何恃以肅官吏而振紀綱乎所繋不小不可不察又奏臣近以陸師閔黜謫未乆驟然褒復累具事理奏論乞賜詳酌施行至今多日未奉指揮臣固當體朝廷之意不復論列然區區愚忠不能自已者誠以公議未安故也夫以公議上達聖聽恭俟採擇是乃臣之職分敢不罄竭以聞臣觀自古以來帝王御世之術本末先後雖不一端其要在務明賞罰而已蓋賞罰明故懲勸行懲勸行故官吏肅官吏肅故紀綱正而朝廷尊此務明賞罰所以為操術之至要也師閔之事其可忽乎若以師閔為無罪則忽罷户部侍郎差知小郡在前日為誤罰若以師閔為有罪則驟復寳文閣待制知河南府在今日為誤賞二者並用是豈明賞罰之道哉臣竊惟朝廷不過急於得人任使且謂師閔所坐情為可宥及不欲追改已行之命故雖師閔到任纔二十一日便行褒復不以為疑然而皆有可論者若急於得人任使則臣前奏論之已詳已塵天覽若謂師閔情為可宥則文案具存其情可見按鍾傳奏討蕩畫謀辦事盡出師閔數日間合力幹辦乞特推恩既是計蕩畫謀辦事盡出師閔數日間合力幹辦即傳以一百九十七級為三千五百三十級師閔豈不預其事乎借令不知𫝊妄冒之情豈不知傳乞為推恩之奏乎不以自明此何意也及六月十四日承受朝㫖妄冒人限一月許自首免罪直至十八日方出榜施行却於奏狀内稱尋行出牓豈有奏以尋行出牓而施行乃在得㫖四日之後乎身為從官優被寵寄略不尊憚朝廷公肆欺罔迹狀甚著而遂謂其情為可宥恐非所以示天下也公議未安尤在於此若不欲追改已行之命則言路所聞無不在已行之後儻以追改為難即言職殆將廢矣伏望聖慈曲賜照察出自威斷追寢師閔前命以釋天下公議訖不從八月二日師閔自河南移瀛州尚書省劄子勘㑹陜西路每歳所鑄鐡錢貫數不少近歳以來銅錢太重鐡錢太輕熙寧間銅錢壹貫文換鐡錢二貫五百自來别無定法止是民間逐漸增添竊慮歳乆轉更錢輕物重須議指揮令諸路經略安撫司限半月宻切具利害合如何措置可以稱提鐡錢稍重物價稍輕仍具熙寧以來至今銅鐡錢相換錢數申尚書此文字親自收掌不得下司閏九月五日甲戌遂禁使銅錢専行鐡錢有章楶吕惠卿二狀今附此涇原章楶鄜延吕惠卿皆有狀申尚書省然訖不用其言也楶言勘㑹陜西錢法本無輕重只仁宗朝寳元慶歴之間邉事初興增添戍卒將佐等經費滋多財用匱乏有獻計者剏鑄大錢其文曰重寳每一大錢折十小錢盗鑄之姦自此得利官司所獲無幾而重寳已布滿民間歳斷重辟不知其幾何朝廷患之以折十大錢殺為折五盗鑄不已又殺為折三所獲之利猶博刑辟尚多不得已而以一大錢折二小錢盗鑄稍息其後山澤産銅頗少遂以鐡代銅當時大錢鼓鑄精巧磨鑢皆有楞郭一一如法民間雖欲倣傚計其獲利不能酬人工物料之費則鐡錢銅錢市價無二至和已後官司鼓鑄不精之弊起於率分錢所謂率分者每工所限日鑄之數外有增益者酌給衆工財利之司所貪者錢多監臨之官又以額外鑄錢增數為課則折二大錢不復精巧如法矣盗鑄遂復擅利於下當時官司不治其本乃欲救其末濫錢寖皆輸於官矣而豪宗富室爭蓄大小銅錢與舊鑄大鐡錢故在市買賣細分六等以小銅錢為一等舊鑄至和鐡錢為一等新鑄折二鐡錢為一等私鑄楞郭全備錢為一等私鑄輕闕怯薄錢為一等凡倉庫所出者皆大小銅錢新舊官鑄大鐡錢所納處既不復多得銅錢所輸於官者皆新鑄折二鐡錢及私鑄錢耳然其弊亦未甚為害治平四年因臣僚建議朝廷有指揮不能全記其文大槩以為除闕薄漏貫字様不明不成楞郭外餘並令官司受納庫務輒有退換仍立刑名自此濫錢蕩然無禁熙寧間得朝㫖將官庫錢㨂選不堪行用者改鑄其後復遣官再選官司已揀之錢復使行用官司之錢既無所分勢難止絶則鐡錢之輕自然之理也昔日豪宗富室所蓄大小銅錢舊鑄鐡錢歳月浸乆其銅錢或散入外國或遷而輸隣路蓋所獲利博豈肯蓄藏於家前日朝廷遣官就陜西更欲鑄銅錢不惟不足以救官司之急而所鑄雖多亦恐不能如陜西流行也所凖指揮合如何措置可以稱提鐡錢稍重物價稍輕蓋無術可救為今之計莫若指揮官司精加鼓鑄無貪厚利令製造精密與物相權盗鑄之家獲利既薄豈肯冒重法以自取死亡勘㑹兩川有見行鐡錢有交子可以齎擎遠行今若精選有心力可倚辦官依倣西川體式推行交子之法庶幾少有補焉至於商旅所販百物如絲綿匹帛金銀之類到陜西販賣陜西却無物貨買囬如此物價倍貴無如之何亦别無可措置黄貼子錢輕物重不獨因鐡錢而已自軍興以來添屯兵馬戍邉蓋所急者糧草今且以渭州言之昔日米麥每斗不過百錢今日每斗三百文以上新邉城寨收糴以至五六百文者錢輕之弊蓋又有因也又涇原一路去他路界逺換易銅鐡錢甚少不如朝廷今來坐致之數惟聞同華陜府如此乞賜照㑹又熙寧已來銅鐡錢相換歳月寖乆無由根究今㨿渭州通判李百禄申勘㑹到自元祐年已來至今銅鐡錢相換每貫分數如前兼據小貼子稱雖勘㑹到鐡錢每一貫六百文足換銅錢一貫文足即日民間亦無銅錢可換伏乞照㑹元祐三年内每鐡錢一貫二十文足換銅錢一貫文足元祐六年内鐡錢一貫二百文足換銅錢一貫文足紹聖元年内鐡錢一貫二百五十文足換銅錢一貫文足紹聖四年内鐡錢一貫四百文足換銅錢一貫文足元符二年正月一日至今鐡錢一貫六百文足換銅錢一貫文足惠卿言熙寧十年惠卿任本路經略安撫使至元豐三年得替任内親見本路銅鐡錢相兼使用不聞有輕重之異唯有行路欲將鐡錢換銅錢以便賫擎有每貫不過加錢二十至五十文至元豐末元祐三年以前每貫乃加至一百蓋是銅錢漸少鐵錢漸多以致如此元祐四年始下轉運司議罰銅錢一等行鐵錢由此民間每歳換銅錢分數漸加然不過一百以至四百至八年始罷銅錢方加至一貫五百至紹聖元年增加鈔面錢出買四年復罷官員軍人入便錢以此鐵錢益輕每欲過銅錢地分者至用二貫五六百文方換得銅錢一貫由此觀之則鐵錢之輕官司先自輕之民間不得不行增添也蓋官司徒知鈔面外贏落三二分息及罷官員軍人入便免於近裏支見錢之小利而不究錢輕之弊遂令官司用度增費一倍雖歳賜邉上銀絹錢鈔等愈見支用不足若不講求所以致錢輕之由與求錢輕之法將見倉庫空竭費用不支非止鐵錢太輕物價太重而已今請先陳錢輕之害次陳所以致錢輕之由卒陳所以救錢輕之法所謂錢輕之害者凡有八熙寧元豐十餘年間米價除元豐五年係軍興每斗三百四十文外其餘年分賤止八十文貴不過一百八十文自元祐紹聖以來鐵錢日益輕故米價日長見今延安府官糴米價五百二十文足市新米七百八十文足陳米七百二十文足官中見收糴不行只以見今官糴價計之比元豐五年用兵時最貴價已多一倍以上比五年以前價幾三五倍延安府裏外每歳糴買無慮一百七十餘萬草亦稱是不知枉費幾何也以一府觀之則一路可知以一路觀之則陜西五路可知此錢輕之害一也鑄錢鐡炭人工糧食增貴則所費多不止五百假令止用五百鑄錢一貫文只當得五百文支用而般運至邉上脚乘所費幾半况於所用本錢不止五百乎則是官中鑄錢非特無息而已若不鑄則無錢支用此錢輕之害二也官中除糧斛外如軍器物料應軍需物計陜西一路不啻百萬盡買於民間其價比舊數倍此錢輕之害三也芻粟百物既貴故官中和顧脚乗人工之直比舊亦皆數倍此錢輕之害四也昔日鐵錢與銅錢等及脚乘易得之時内地鑄到鐵錢猶可般運今鐵錢脚乘貴雖鑄得錢般運至邉上不足償脚乘之費以此般運不行則衙前之類不得不將宫錢轉易往往遂至失陷破産自罹重罪此錢輕之害五也茶鹽洒稅之類每歳所得錢有定額今一貫只當五百文用則見稅額暗虧其半此錢輕之害六也官員軍人所得俸入亦然則是無罪而月常奪半俸禄重者固不足言使臣選人無以自給豈無怨咨此錢輕之害七也免役公人顧直但有減於舊日而物貴錢輕費用不足以此所在召募不行深害良法此錢輕之害八也所謂所以致錢輕之由凡有五熙寧元豐中銅錢鐡錢兼行若欲賫鐵錢一貫即可賫銅錢倍之及欲過銅錢地分有銅錢可換即鐵錢亦可流行自元祐間不用銅錢其欲逺行及過銅錢地分無銅錢可換此所以致錢輕之由一也熙寧元豐間鈔價東南鹽鈔每席貴不過六貫賤止五貫若往京師出賣反有利息遇邉事如熙河用兵之時邉上鈔價至賤在京官中却用元價收買以平之度非錢往邉上以故不計其費今鹽鈔一席至十貫文在京雖用本價收買所失幾半此所以致錢輕之由二也熙寧元豐間遇有邉事許諸色人於邉上入便錢却於在京向南請領仍支與加擡及脚乘錢不記其數今官員俸餘既不許入便又已入便下錢者足錢支與省錢是官中自輕鐵錢此所以致錢輕之由三也官中每嵗糴買有出無入錢並散民間此所以致錢輕之由四也官中出度牒及銀絹之類雖價例稍髙其實不得舊日銅錢之價皆是助錢輕之事此所以致錢輕之由五也所謂所以救錢輕之法者亦有五體問得陜西雖不行使銅錢聞轉運司尚有五百餘萬貫若便鼓鑄相添令依舊運致沿邉相兼支使以為遠賫及過銅錢地分之用此救錢輕之法一也出賣鈔價及糴買支用不得過鈔面錢令入中糴草并商旅買賣不能賫錢者有鈔可買不折錢則鐵錢流轉此救錢輕之法二也若刷東南合上供錢及坊埸剩錢許諸色人於沿邉入便却於内地請領支還貫數令民間錢俱入官中不煩鼓鑄般運而自足民間竭錢則錢重而物輕候邉費稍減即罷此救錢輕之法三也官中出賣度牒銀絹之類亦約銅錢估價毋過求利令商旅皆有囬貨則鐵錢流通此救錢輕之法四也今所患民間錢多官中錢少欲將見錢糴買無錢支使先為民間蓄積以待價而舊來民間所蓄錢皆是貴價中官所得今來如欲救錢輕之弊即已上所陳四事皆未可頒下令民預知恐錢不出須宻諭陜西轉運司并經略等司先將所有銀絹度牒鹽鈔等除量留充軍賞及相兼入買外其餘據市色量減一二分價出賣并量加分數許諸色人沿邉入納見錢於内地請領或足數錢支與省錢候收蓄民間錢入官稍有次第然後盡行上四條其遠行賫擎并過銅錢地分既有銅錢相兼行用即不須倍價換易糴過買鈔又只依鈔面及銀絹度牒等并凖銅錢之價支給又許諸色人入便支還實數則所中賣到錢不患無囬貨而所出錢復入中如此則錢益重物益輕可復如熙寧元豐之間無輕重之異矣此救錢輕之法五也此五事者如䝉盡依所陳施行則八害可除而八利可復矣何謂八利糴買價值必減大半一利也鑄錢如舊有息二利也收買諸物價減半三利也和顧脚乘人工之直減半四利也脚乘可顧鐵錢般運得行五利也茶鹽酒税所入暗復舊額六利也官員軍人俸不減半人無怨咨七利也免役公人漸可顧召八利也然此特論官中之費用而已若因此軍民皆食賤物百用倍省其利又不可勝言若雖施行而不能盡譬猶用藥不盡疾之根源少愈而亦不能盡除矣尚書省劄并楶狀㨿楶奏議惠卿狀㨿惠卿家𫝊增入甲辰環慶路經略司言本路進築之字平白豹城白豹城賜名在五月二十八日定邉柔逺寨了畢並係扼賊衝要包占環慶州界舊來邉面城寨各為近裏所有逐處舊城寨駐劄將副各令移於沿邉城寨駐劄其合用城守器甲不少望指揮永興軍等路提刑司於出産材料州軍併功造作仍速般運從之詔陜西河東嚴戒邉吏不得以傳聞西人遣使告哀謝罪便於邉備懈弛及進築之際不過為隄防捍禦之計如緩急小有誤事帥臣以下當重行黜責布禄癸卯鄜延奏已收接宥州公牒遣來使齎白劄子諭其主令遣使赴闕河東奏北人自六月十六日後不復來天澗取水又奏折可大出塞獲千級特除閤門通事舍人乙巳中書舍人趙挺之詳定編修國信條例代蹇序辰也詔當此盛暑刑獄慮有淹延在京令刑部郎中開封府界令提㸃提舉司諸路令監司催促結絶見禁罪人内干照及事理輕者先次决遣仍先具起發月日申尚書省大名府路安撫使韓忠彦言黄河大决府界縣鎮多已衝渰府西即是北流故道水勢漸近府城人心日夕憂惶御河若不閉塞黄河可以直注入城終未為便請令李仲以所得修新河錢物疾速修築詔令本府計㑹李仲就借所樁管未開修菱芡等河所賜錢物相度修築上下愜山與昨來未開修御河日髙厚一般不得低怯十八日曽孝廣措置河事李仲開修新河在四月二十一日涇原路經略司言德順軍德勝寨鎮戎軍開遠寨堡至西安州合修通過堡子一座於鵲子山寺子岔一座於九羊谷峗北嶺上修築并本司已令姚古統領諸將修築詔特支軍兵緡錢有差新録云合作通過堡子三所布録乙丑涇原奏已取七月七日或八日築鹻隈城及差保甲應副般運又令姚古修徳順軍至西安州經路三程作堡子三所並與特支又奏先築鹻隈訖令折可適姚雄以兵二萬騎五千赴㑹州七月二十一日進築正字張巨權𤼵遣京西路轉運判官權提㸃奏鳯等路刑獄孫賁改永興軍等路丙午秦鳯路經略司言第三將招誘到西人伽凌等三人却是環慶路熟户蕃捉生偽冒改名剃髪穿耳戴環詐作誘到西界大小首領本將張恩張德同知情詐冒詔張恩張德先次放罷丁未上批暑熱應在京工役自今月十七日放假詔朝請郎王璩追兩官勒停展三期叙坐諧謔侮慢也當考朝散郎通判瀛州陸元長言蘇州秋賦一歳六十萬碩積水占壓蠲放大半三江不入震澤不定今相度應河之通江海者願撥一年積水合放秋稅二十萬碩乞降祠部牒五百道充顧夫錢糧及市木置閘官為檢計令食利人户自備食力分頭開修詔元長計㑹兩浙轉運提舉司同相度合如何施行具圖狀指定保明以聞熙河乞降收接河南邈川首領官職等第及支賜則例并乞錦襖子公服靴笏銀帶各三百事詔孫路㨿歸漢首領在蕃日職名及加量次第合補是何名目奏聽朝㫖所乞袍帶令户部計置差使臣管押前去布録丁未戊申畢斯布結兄弟三人及首領僕從二百餘人并所管蕃兵六千一百四十八人來降王贍即納之此據汪藻青唐録蕃兵六千一百四十八人實録七月二十五日亦有兵數六此數布録畢斯布結兄弟三人及二百餘人數同無蕃月末畢斯布結來降李逺青唐録云畢斯布結以磋藏中嘉本卓葉公丹貝四城降四城在河州之南重山複嶺事亦六月係曽布言先帝以熙河洮岷四州為一路洮州今方得之又以為熙河蘭㑹路㑹州今亦方得之陛下聖德威靈所及遂成先帝之志非天時人事符合何以至此實朝廷之慶事也五月乙亥又癸亥又六月丁亥又八月丁亥當考鄜延奏已囬牒宥州吕惠卿初但以白劄子遣西人還令遣使赴闕有㫖令囬牒故也布録己酉詳定重修大禮敕令所言編修北郊令式請以詳定編修大禮敕令所為名從之涇原奏擒獲阿克哩克敦巴一行人功狀案布録作阿埋都通有遷十五官至六官者仍賜金帛有差布録己酉庚戌軍頭司引見殿前馬軍司揀試到殿前指揮使御龍直願出職將虞候等九十二人上親閱人材擇其驍勇者九人列於前問所射弓可加斗力否殿前指揮使王閏等七人各願射兩石三斗力二人射應法並特與内殿崇班仍減三年磨勘餘射不能𤼵令減斗力再射等第換官減年冀珪李真射一石一斗力弓杜超射九斗力弓各不及格軍頭司令歸後行上問權承㫖李憲等合何如憲等奏合降軍分上恐其偶不能發宣諭特令再射各應法並補合得軍使舊録云上留神盡材如此新録削去右正言鄒浩奏伏聞河北路水災比之陜西京西等路尤為深切百姓漂溺莫知其數死者既已不救生者復難自存老㓜悲啼傷動道路方聖明在上與天同仁而近畿之民尚爾失所欲望睿慈俯賜詳酌特依去年専自朝廷差官前去逐急賑濟施行務稱陛下憂憫生靈之意貼黄臣竊見近年官吏諱言百姓災傷等事習成風俗故雖朝廷遣使出外亦多不以實聞民情不獲上通王澤不獲下究率由於此為害不細今來若䝉差官前去即乞指揮選擇忠藎不欺之人庶幾漂溺之餘實受恩䘏甚厚浩奏不得其時附遣王祖道前三省言訪聞河北路州縣近因雨水諸河漲溢渰浸人户田廬詔差吏部員外郎王祖道體量應合賑濟存䘏事件多方措置速具以聞權工部侍郎張商英等言伏見黄河自商胡口决以來治水者闊為兩隄相去數十里不與河爭以順其勢行之水失其性一遇汛漲則河道變徙望特降指揮下河北轉運提刑司選官兩員相度圖其地利害詔令王祖道體訪以聞以順其勢下恐有脫字新舊録都一般當求别本曾布白上黄河已北流聞東流已乾鄭佑子按鄭佑子布録作鄭佶子自河北還云已自東流河道中行過亦更無泥水然北流殊未有隄防東流回河治隄費公私財貨何止億萬止三二年遂壊上曰主東流者已受賞今日自當行遣布唯唯布録戊申今附此王祖道奏八月丁丑祖道以吏外為左司諫若祖道此奏在出使河北時即合去左司諫字今且附此更須考之臣伏見神宗皇帝元豐中議移深州於饒陽安平當時復以河防北流適乗事幾其後主東流者欲故違神宗備邉之意遂以移州三十萬之費可以囬河此議遂置臣竊惟神廟前日之志今日偶與時㑹深州因昔年殘破之餘傅潜廼以私計乞移州於陸澤非禦敵之地今大河復北流深州歳用梢草兵夫不貲計一歳所費不知幾萬數以十歳計之又不知幾十萬數以此為移州之費不猶愈於歳歳無窮之虛用邪臣伏望聖斷特降指揮以深州當大河之衝勢不可守宜遷徙州民亦今日治邉之機事惟陛下留神元符報狀有此却不載是何月日今因祖道出使河北附此待考詔賜鄜延暖泉寨慕柰神祠為靈祐廟
