body:
  text: 續資治通鑑長編卷三百十一宋李燾撰神宗案卷首先是五月甲申韓存寶受命經制瀘州蠻賊公事至甲戌存寶乘舟還江安留江安旬日一假本元豐三年之事然與四年辛卯存寶還瀘州其文相屬乃史家追叙之詞舊本分年編卷遂割置前卷之末其文遂無所附麗而此卷存寶至瀘州亦詞無端緒今據文改正以冠此卷之首先是五月甲申韓存寶受命經制瀘州蠻賊公事以九月乙亥十六日至資州閏九月丙辰二十七日發資州十月辛酉三日次江安癸亥五日發江安取夷牢路入界四將左右䇿應兵總三萬二百二十九馬一千九百七運糧夫三萬餘轉運使董鉞隨軍是日次羅改池丙寅八日次羅個腦村為後盧鹽夷所襲第四將兵失利戊辰十日次底蓬褒甲戌十六日存寶遣第一將第二將討後盧鹽斬七十餘級十八日丙子賊復襲第四營不克奉職任光秀者告底蓬褒夷隂與賊通壬午二十四日存寶遣中軍掩擊之斬一千一百餘級焚其村囤先降附者三十餘人亦斬之獨斗箇妳得脫光秀者江安人嘗監淮安軍稅先是帥納溪淯井諸寨招安將至綿州迎存寶故存寶以為腹心底蓬褒實非反者枉被屠害人共寃之十一月壬辰四日發底蓬褒上槐木隘十五里林箐幽深仰不見天存寶疑有伏兵甚懼既出隘口乃喜然第一將姚兕引兵道嶺下與中軍㑹無甚險絶也存寶斥堠不明類此癸巳五日次底蓬强營梅成山遣先鋒將內殿承制秦世章以黔州兵攻小水囤夷不克丁酉九日乞弟率羅始兜六七千衆攻秦世章掠其輜重第一將第三將與世章分山而營依存寶節制不敢擅出兵日過午乃敢鬬乞弟叔沒暮手持鐡扇臨陳指揮保捷軍校田福射殺之賊衆遂奔潰登山捷如猿猱三將引兵追之弗及辛亥二十三日存寶發底蓬强依羅甘山左行二十里次梅令山壬子二十四日羅氏鬼主沙取遣人言乞弟欲求誓存寶許之甲寅二十六日存寶下梅令山行十五里次土城山衆謂大軍必自此長驅抵賊巢穴而存寶畏怯初無深入意或登大嶺以觀底蓬褒底蓬强梅令山三營地皆曲折環繞直行殆不過十餘里耳戊午存寶遣世章掩擊落昏夷於新池賊衆已遁去官軍誤焚他族初議由新池趨樂埧邏者告存寶以道險不可行存寶意亦憚進兵轉運使苗時中程之才屢以書促存寶深入存寶不聽之才又諭存寶設乞弟未即授首當於樂共江門築城寨為他日必取之計存寶亦不聽十二月癸亥乞弟遣奴沙自阿義請降乙丑又遣阿義來獻刀一口氊二領馬五匹並降書存寶遂使招安將與二奴㰱血誓于帳前是日晏州夷水陸攻劫運道奪水運糧千餘石錢七百餘千陸運者皆棄輜重散走左䇿應將視賊抄掠亦以存寶節制按兵不敢擊已而存寶遣人詰晏州夷何故攻劫答云我族未嘗附賊官軍前日殺我首領焚我屋廬故來復仇也丙寅存寶以得乞弟降書令軍中稱賀丁卯遂班師是日次梅令山晏州夷及斗箇妳村夷復羣聚謀抄掠存寶遣諸將擊走之資官尉家安國謂存寶曰晏州水路十二村夷頃同乞弟殺王宣今又劫奪糧運且犯歸師此不赦之罪也盍以大兵乘機討蕩存寶不從己巳存寶又遣招安將與阿義等殺牛再誓於帳前遣還仍遺以銀綵約直五百千報其刀氊及馬之獻也又遣人召晏州夷與誓亦遺以繒帛庚午次朱峒新堡乃存寶所置也距寧逺寨才六七里耳辛未次寧逺寨甲戌存寶乘舟還江安留江安旬日元豐四年春正月辛卯存寶至瀘州上聞存寶逗撓輒自退軍欲按軍法誅之㑹言者亦劾存寶玩寇欺君乃議遣林廣代將存寶軍即瀘州置獄鞠其罪甲午詔成都府路提舉司支錢二十萬緡米十萬石梓州路支錢十萬緡供瀘州軍須並先以本處支外見在錢米通成此數詔昨令韓存寶移瀘州於江安縣及建置堡寨等事令林廣候到與轉運使商議從便宜施行先是樞密院得㫖令存寶移瀘州治所於江安縣及相度如更可展拓擇要害地置城寨控制蠻賊來路遮護生熟夷人久逺不為邉害即隨便興築仍具地圖以聞於是再遣林廣故申命之存寶至瀘州亟議遷徙苗時中曰廢州置州事體非細今瘡痍未瘳奈何遽調夫役雖有朝㫖自當覆奏乃條上利害瀘州竟得不移入內供奉官劉益友言趙州等八州軍義勇保甲共九集教場無黃樺弓乞並給截弰弓陜西河東亦准此從之提舉永興等路義勇保甲司言集教諸軍教頭并所教義勇保甲合用馬數未足詔提舉陜西買馬監牧司選馬均配御史滿中行言判將作監安燾所舉使臣田溉者故知樞密院况之弟富弼之甥壻舉主首其改節者二人杜咨者醫官之子緣管勾執政進奉補班行潘若從者有過犯皆未嘗在燾部下丞曽孝亷既不簽書即申樞密院脅之乞付有司根治詔送大理寺權發遣北外都水丞陳祐甫言滹沱河自熙寧八年以後泛濫深州諸邑為患甚大諸司纍相度不決蓋議者以其下流舊入邉吳宜子淀最為便順而屯田司謂有填淤塘濼之患煩文往復無所適從昨差官檢計若障入葫蘆河約用工千六百萬若治程昉新河約用工六百萬若依舊入邉吳等淀約用工二十九萬其工費固己相逺乞嚴立期㑹令都水監或本司及轉運司各遣官與屯田司進議定歸一䇿詔河北轉運司與北外都水丞司河北屯田司同相視以聞詔聞代州諸寨昨經分畫地界處尚有守鋪卒及弓箭手等䦨出北界採薪致引惹詰問其令經界并緣邉安撫司申明約束犯者於本地分界首斷遣官吏不察治亦法外降黜提舉開封府界教閲保甲大保長所言兩場見教大保長弓馬弩射各己成就欲管押赴京俟引呈許之乙未步軍都虞候英州刺史環慶路副都總管林廣為都大經制瀘州蠻賊公事新舊紀並書廣代存寶經制丁酉命侍御史知雜事何正臣瀘州體量公事入內東頭供奉官勾當御藥院梁從政同體量劾韓存寶事也詔曰韓存寶總領重兵往討小蠻乞弟自至瀘州兩月餘進兵不過二百里但常令偏禆與蠻賊接戰不能擒戮首惡虛有暴露士卒使忠勇之士無所效命又擅遣諭乞弟令齎投降文字至軍中不候朝㫖輒自退軍逗撓怯避其狀甚明韓永式同商量軍事輒敢符同今遣何正臣梁從政同往體量俟林廣至即於軍前告諭存寶永式罪狀當正典刑仍曉告各將校士卒並由存寶節制不任退軍之罪其斬獲首級合推功賞令逐將保明以聞知沅州謝麟言修小由長渡堡畢招到旺誠等州酋首楊進通等及乞增置寨主一員兼同巡檢詔乞補借職以上第降一等餘從之詔開封府界保甲朝廷専命官訓習武事加以肅清姦盜可差昭宣使果州防禦使入內副都知王中正兼都大提舉開封府界巡檢公事三年十二月己未朔提舉保甲入內副都知王中正兼都大提舉開封府界朱本移入此今從之舊録中正本傳須更增入仍差澧州團練使澶州總管燕順同提舉其見今巡檢縣尉下長上畨上保甲並罷并諸縣尉惟主捕縣城及草市內賊盜鄉村地分並責巡檢管勾其餘職事皆仍舊及逐縣巡檢教使臣元令二年代巡檢今宜即令承替仍復置城四面巡檢二員其增减錢糧並送樞密都承㫖司㑹校已而都承㫖司言開封祥符縣各省尉一員弓手四十人存尉一員弓手二十人陳留等二十縣弓手亦如之都副保正雖日輪在本保五團內管勾教閲然地里不相逺欲令依舊管勾本保公事及舊差甲頭催稅有己係出役錢之人兼下户催驅上戶其勢不順今每保欲共募承幹七人人有給雇錢千五百𨽻保正承受文字催稅租常平等錢其大小保長舊法差使及催稅甲頭並罷當教閲者専令赴教凡省錢二十三萬六千七百緡有竒費錢八萬五千三百緡有竒從之仍詔錢物宜付提舉保甲司專令文臣領之歲具帳上兵部其承幹人改為承帖人如犯都副保正依毆詈本屬保正法知諫院舒亶言畿內之民教以武事乃古所謂六鄉之兵而使中官領恐於杜漸防微未便也不報亶言據本𫝊附見戊戌提舉河北路義勇保甲兼提㸃刑獄司言知邢州髙復子康西頭供奉官霍文子武信都縣尉冷源子麟自言隨父在官願附保人赴集教場學習本司試驗康等各射弓力及一石並乞收教從之舊紀於戊戌日書流星如杯出五車裂于天囷新紀削去己亥通直郎集賢校理同修起居注知諫院舒亶權侍御史知雜事措置帳法所言被㫖措置京西一路帳法今巳修立法式奏聞參詳諸路可以依例推行欲乞頒下內京西一路可自來年先行其餘路自元豐五年依新法從之仍令提舉三司帳司官候及一年取㫖諸路委轉運司官一員専推行帳法候將來修定條式止付逐司遵守禮院言案祀儀春祭馬祖夏享先牧土王祀中霤秋祭馬社秋分享夀星立秋後祀靈星冬祭馬步立冬後祀司中司命司民司祿孟冬及藏氷開氷祭司寒每嵗共用一羊每位猪肉一斤半謹案周禮小司徒之職凡小祭祀奉牛牲羞其肆又肆師職云小祀用牲所謂小祭祀即司中司命司民司祿宫中七祀之類是也後世王者雖以有司攝事難於純用太牢宜下同大夫禮用羊豕可也而祀儀如此殊為非禮蓋禮惟郊用特牲所以貴純一而不雜也本朝祠令小祠牲入滌一月所以備潔養之法今猪肉既臨時裁取於市中則又與令文相戾甚非供給鬼神誠莊之義今欲乞諸小祠祭以少牢仍用體解從之庚子荆湖南路轉運判官趙楊言溪峒徽誠等州置城寨畢誠州乞建為郡徽州為縣詔送謝景溫朱初平趙楊同相度以聞經制熙河路邉防財用司言知岷州張若訥通判王彭年及將官等違條看謁妓樂宴㑹已根治其知州通判不可令居任乞别差官李憲言若訥等因部將借職郭英訟本轄將官本司奏乞别差官而不指所犯情節若訥所管洮東安撫實繫方面觀望止以部將指論輕其去就何以彈壓漢蕃乞下本路經略司盡理根勘從之若訥等後止坐罰銅朱本簽貼云此假小事後來勘到若訥只是罰銅合刪去今依新本復存之仍終言罰銅事中書禮房請令進士試本經論語孟子大義論策之外加律義一道省試二道武舉止試孫吳大義及䇿從之新紀書詔試進士加律義舊紀不書辛丑詔樞密院自今所得聖㫖依中書例當日具事目進入如别無批降指揮即次日行下如有急速文字亦依中書例施行月終更不進入先是樞密院逐房日記聖㫖為厯月編寫進入既復下本院上恐失檢察故罷之涇原路經略安撫使司言被㫖逐路糴買糧草令轉運司交割與經略司計置外其糴買錢每年夏秋各分為三分轉運司預封樁夏自四月至六月秋自七月至九月每月應副一分從經略司關報合樁管處即糴買擁併未及次限許權借轉運司封樁錢其糴買鈔令三司依限發付經略司從本司支赴逐州軍折博務書填并稅數合行支移亦從本司計㑹轉運司同相度依例移那支折若遇災傷減放分數即契勘所減糧草石束錢數於合納州縣鎮寨勘㑹别司見在錢物奏乞那撥仍乞選監糴官一員添置勾當公事一員從之令鄜延環慶秦鳯路依此壬寅詔江州廬山太平興國觀九天採訪使者蜀州青城山丈人觀九天丈人並天之貴神與世為福宜加號九天丈人儲福定命真君九天採訪應元保運真君令有司具香幣就遣監司即其祠上之丙午上批賀遼主生辰國信副使劉永保回至莫州卒宜令髙陽關路走馬承受楊安民因奏事赴闕照管般挈付其家令轉運司量應副己酉上批河東陜西見訓民兵非久什長藝成當推行開封府界團教之法其所須錢糧設置官吏從此凖畿縣取索㑹較未知及期能辦與否若更遷延恐不能以時舉可依府界近例令樞密承㫖司取索㑹較本志乃以此詔附九月十九日劉定狄咨遷官加職後詔遣司農寺主簿李元輔往蜀中經制見在司農錢穀變運出關至陜西緣邉要郡樁管其已起發物帛並於鳯翔府秦州等處樁管令本路提舉司拘收內有合行遷徙變轉即具措置事件及契勘耗折數目以聞去年閏九月辛亥已有詔令李元輔撥到鳯翔府銀絹與涇原不應今年正月遷朱史載此事顛倒當考詳移改附二年八月甲寅詔令經制熙河邉防財用司指揮許令弓箭手依官價自買及格堪披帶馬赴官呈印訖給赴關買馬場日支價錢仍充買馬司年額之數庚戌判兵部蒲宗孟言開封府界惟有保甲無義勇五路義勇保甲教習之法事體略同給錢糧亦不相逺今上畨集教既立一法五路不得獨異於府界欲乞五路義勇並排為保甲所貴民兵法出於一於是樞密院言檢㑹熙寧五路義勇保甲之法主戶等四等以上每三丁選一丁為義勇諸縣每百人為一都五都為一指揮不及百人附别都即一縣總不及百人亦為一都每都有都頭副都頭十將虞候承局押官各一人四都立副指揮使一人五都立正指揮使一人主戶兩丁選一丁為保甲以村疃五家相近者為一小保內一人為小保長五小保為一大保內一人為大保長十大保為一都保保外復立都副保正各一人及三小保以上亦立大保長一人五大保以上亦立都保正一人不及者就近附别保若地里隔絶不可附者二小保亦置大保長一人四大保亦置保正一人上批五路義勇宜悉改為保甲爾後丁口增减並依見行保甲法河北河東第四等陜西第五等以上每户及五丁以上者取兩丁令兵部具畫一以聞其舊管人貟節級即改為正長辛亥于闐貢方物樞密使正議大夫兼羣牧制置使馮京為光祿大夫觀文殿學士知河陽京數以疾求解機務故也樞密副使太中大夫孫固知樞密院兼羣牧制置使樞密副使正議大夫吕公著同知樞密院龍圖閣直學士大中大夫樞密都承㫖兼羣牧使韓縝同知樞密院五年四月二十六日丁丑吕公著罷可考吕公著與孫固同遷改而實録闕之今追書家𫝊云用先朝故事按故事樞密院置知院則當為副使者皆改同知院見熙寧元年四年十一月二十二日甲辰樞密院置知院同知院餘悉罷職官志與實録不同己具注在彼四方館使樞密副都承㫖張誠一為客省使樞密都承㫖兼羣牧使都承㫖自是復用武臣職官志云其後誠一以正任觀察使為都承㫖今附此當考侍御史知雜事舒亶言大理寺推治參知政事章惇令周之道𫝊言於御史朱服事如惇三問不承乞勒令參對詔監察御史裏行豐稷同本寺推治惇自言嚮在湖州一見朱服後於京師旅見者再不交一談今為御史無相聞之理亦無托周之道逹意及取服生月年幾等事詔送大理寺詔文思使忠州刺史內侍押班髙居簡罷內侍押班除遙郡團練使提㸃西太乙宫疾故也癸丑林廣言乞委環慶路走馬承受即軍中選擇馬步精兵從之仍詔發往涇原路京西一將軍馬移於慶州駐劄其環慶路緣邊防托軍馬如被揀選即令都總管司移土軍應副仍追回開封府界第一將軍馬歸營别遣府界四將軍馬往資州以備林廣濟師先是詔荆湖北路鈐轄彭孫提舉捉殺瀘州蠻賊於是詔孫取間路進討旁助林廣如入賊界遇軍馬㑹合即聽廣節制差彭孫捉殺實録闕之御集正月十八日二十八日皆有其事今附之陜西轉運使李稷言本道九軍什物之外一物無有乞於永興軍軍須庫以餘財立法營辦臣兼職鹽池垂及三年一毫不棄靳固收蓄得二十餘萬緡可以率先為用無耗蠧經費之弊而數日可成詔李稷具所收見在錢數以聞并二月二十七日甲申先是以龍圖閣學士曾布知秦州後數日改判將作監布以母老為請也甲寅御史朱服言布顧其私畏逺憚勞乞寢罷將作之命飭布就道知諫院權侍御史知雜事舒亶又言布自嶺外授以西帥猶懷不自滿不即就道以親為解欲望發遣赴任或别與一外任詔劄與布知尋以布知陳州知陳州在二月四日今并書命入內東頭供奉官麥文炳為都大經制瀘州夷賊公事司走馬承受兼照管軍馬文思使忠州刺史內侍押班髙居簡得疾强入侍詔免侍立惟朝便殿是日卒贈耀州觀察使乙卯樞密院擬定彭孫討瀘州蠻賊隨行軍兵約束上批彭孫所部既多彊人難繩以常法須特簡嚴為一約束付孫令據所犯隨宜處斷勿令拘制送州縣遂詔應所部兵令彭孫知其甘苦無令失刑如有罪犯量輕重行罰仍令經歷路分轉運司指揮隨處州縣密覺察如有騷擾即具以聞知諫院舒亶言伏見除知蘄州朝散郎許將為龍圖閣待制知秦州昨陛下初建學政將職在論思而受賂小人潜行請寄為亂法首聖恩寬大止從薄責今日月未幾有此除授伏望追寢詔追將龍圖閣待制知秦州敕告依舊知蘄州以知陳州端明殿學士曽孝寬知秦州許將除待制知秦州乃十九日并附見丙辰提舉熙河路採買木植司言乞先支撥經制司息錢二十萬緡以備本司錢糧和雇水腳之費候將來回易三二年所收息既多可以漸省朝廷應副及乞添置通逺軍採造兵士一指揮從之仍令回易近下枋木取息即不得過合支和雇水腳之數提舉開封府界教閲保甲大保長所言管城縣民魏定訴兩目失眀惟有弟存一丁祖母年八十一存選在集教場閲教乞依條放免本所案魏存選充保長學習弓馬請官中錢糧不少今武藝稍成而魏定乃乞放免欲更取聖㫖詔本所依陽武縣張進例問魏存如願且在場習學武藝即聽二月己未詔贈康王宗朴首襲封奉祠十五年其長孫右千牛衛將軍士棖可特授右監門衛大將軍又詔宗室克頌先以心疾毆妻死鎖閉外舍昨己放還冝給初官俸詔瀘州體量公事所鞫韓存寶等毋得追將士如有須證左者止追人吏其將官有罪令案後收坐壬戌提舉崇福宫西上閣門使榮州刺史髙遵裕知代州乙丑中書言諸房自來熟事不用條例文字事目欲令依舊外如更有似此熟事文字并諸處奏請事件引用條例分明别無問難取索便合擬進者凖此從之戊辰增永興軍乾祐縣十酒場以縣令姚輝言縣界凡六百里戶口增倍止有兩酒務乞興置故也己巳知制誥王存言竊見遼人覘中朝事頗詳而邉臣刺遼事殊疏此邉臣任間不精也臣觀知雄州劉舜卿議論方略宜可任此當少假以金帛聽用間於繩墨之外詔舜卿具所資用以聞舜卿乞銀千兩金百兩詔三司給之舜卿初至雄州有告以巡馬大至請申以俟舜卿不為變卒以無事遼妄捕繫州民檄取不聽㑹有使者至因捕其徒一人取償焉待釋乃遣遼遣諜盜西城門鎖舜卿密令易去舊鐍而大之數日遼以鎖來歸舜卿曰吾未嘗亡鎖也引視納之不能受乃慚去諜者因得罪舜卿為雄州月日當考熙寧十年七月方遷客省副再遷西閣使即知雄州庚午資政殿學士提舉中太乙宫元絳兼侍讀絳以知青州過闕留提舉中太乙宫纍乞歸老力疾造朝曰臣疾憊子羸誠恐一旦先朝露則遺骸不得近先臣邱墓上曰朕為卿辦治雖百子何以加於是令絳赴經筵詔審官東院所請重詳定令敕並歸官制所辛未置秦州鑄錢監己卯詔東南諸路團結諸軍為十三將淮南東路第一西路第二兩浙西路第三東路第四江南東路第五西路第六荆湖北路第七南路潭州第八全邵永州凖備廣西應援軍第九福建路第十廣南東路第十一西路桂州第十二雍州第十三舊紀書分淮浙江湖廣南福建路兵為十三將新紀改云分東南團結諸軍為十三將本志同實録御史朱服言開封府界提舉陳向訟臣所言吏人之母出入不實奉㫖令臣具析所得之處臣先在臺見滿中行說有失審實詔滿中行具所得之處以聞已而中行奏臣所聞解鹽司一吏人母出入提舉官之家初未嘗指言陳向兼所得之因臣近日上殿已嘗面奏庚辰河東經略司言凖朝㫖相度代州寧化岢嵐火山軍當增置鋪屋數河東緣邉安撫司元奏覘知北界欲增置鋪候起修日本界亦須增置臣今看瓶形寨以東十鋪若北人修蓋亦便增修緣不繫分畫地分顯似自作事端乞權罷修創其寨西欲增二十八鋪亦恐不須為北界增置其檢計數內若控扼須至修創乞候北人修畢增治詔河東經略司候有北人增置鋪屋再奏取㫖其先降即添置指揮未得遽施行提舉廣南東路常平等事吳潛言廣州自置市易司七年本息錢共七十四萬緡去嵗驅磨缺五十五萬緡始用本錢三十萬緡今以本錢數尚少十萬有餘可廢罷詔諸提舉市易委官根䆒其後市易司言本路錢物才經林顔根磨雖有逋缺然轉運司有錢二十七萬餘緡尚未撥還以此可見出息不少㑹三司度支副使寋周輔亦以為言乃詔本路提㸃刑獄司催理一年了絶其後云云據朱本吳潛元奏可見市易失陷錢物也燕逹言諸軍都教頭欲並行倉法從之甲申權陜西轉運使李稷言解鹽司收簇攢那散漫遺落官錢二十一萬七百九十四貫有竒止在陜府河中府秦解華州永興軍收掌詔並於所在州軍封樁其熟鈔仍變轉見錢并正月二十五日癸丑詔沅州所修小由長渡村堡以小由寨為名誠州貫保新寨以貫保寨為名奉愛豐山新堡以豐山堡為名詔自今推勘及根䆒公事令承行官司約定日限申中書樞密院乙酉鄜延路經略司言知保安軍夏元象等覘夏國主遣姦細招蕃官左藏庫使本路都監劉紹能閣門祗候李德平乞移紹能等於他路上批劉紹能李德平父祖以來世受國恩前後戰功最多在諸路蕃官為第一忠勇朝廷委信之人必無如探報事者必是夏國畏忌用間傾害仰沈括毋得根治以此詔㫖方便露之使知既而升紹能本路鈐轄七月十七日改河中鈐轄五年四月甲寅遣宇文昌齡勘紹能於鄜州六年正月己丑獄竟京東轉運判官吳居厚乞同李察募慣習航海之人因其商販踏行海道之通塞逺近開諭女真人馬之利詢求海北排岸司所在其興廢之因俟得其實條畫以聞從之詔開封府司録參軍路昌衡鞫前太原府教授余行之于邢州四月十五日行之伏誅詔諸州駐泊軍馬知州與駐泊兵官同管屯駐就糧本城軍馬知州通判與本州兵官同管內屯駐就糧仍與駐泊兵官同管其五路都總管司所在舊分將分管轄者即通與本州兵官更不管轄以夔州路轉運司申明舊制故也熙寧五年十月十三日當考丙戌詔聞階成鳯岷州人戶闕食流移令逐州第四等以下人戶支借常平糧斛每戶不得過兩石仍免出息如有去年未納秋稅并諸般缺負等並權倚閣其有往諸處逐熟帶興販物貨稅錢一百以下并經過河渡合納官私渡錢處並令驗認免放如更有合行賑濟事件令陜府西路轉運司經制熙河路邉防財用司秦鳯等路提舉司疾速條具以聞三月戊子朔天章閣待制趙卨權判兵部權發遣度支副使寋周輔言江西嵗運淮鹽有常數人苦淡食而廣東所産不得輒通無賴奸民冒利犯禁習以盜販為業已與兩路監司㑹議謂宜立法兼通廣鹽於䖍州以七百萬斤為年額百萬斤為凖備南安軍以百二十萬斤為年額三十萬斤為凖備均䖍州舊賣淮鹽六百一十六萬餘斤洪吉筠袁撫臨江建昌興國等州軍闕鹽賣處不害淮鹽舊法而可通廣鹽詔令周輔限一月具立成法已而周輔具江西廣東路鹽法并總目條上從之三年九月二十八日始命周輔相度食貨志元豐三年四月周輔已擢三司副使云云其後周輔復議江西鹽法初熙寧三年江西鹽課不登提㸃刑獄張頡言前官蔡挺治鹽有狀而挺所為今多廢詔曰挺治鹽績效不惟課入增仍實致盜賊屏息今無故更革使無賴復有嘯聚其變非小可令修挺故事周輔建言異時淮南嵗以舟運通秦州鹽五十九萬斤於䖍州立倉置吏賣之鹽至䖍州不能多民居逺城郭者常淡食而盜鹽公行至毆傷吏士運路險逺官僦挽舟工費甚舟人盜鹽代以土鹽益惡而廣東東莞新㑹兩縣鹽場柵十有二大煮鹽自廣州水行十有六日至南雄州度大庾嶺至南安軍不百里舟行順流用四日至䖍州淮鹽官以九錢致一斤而盡㑹廣鹽之費減淮鹽一錢而廣鹽善運路無梗請罷運淮鹽通般廣鹽一千萬斤於江西䖍州南安軍復均淮鹽六百一十六萬斤於洪吉筠袁撫臨江建昌興國軍賣以補舊額即於淮南舊課兩無更損詔周輔立法以聞乃為書曰民用鹽不可一日闕今改立新額官自賣以救淡食而消盜賊則興滯補弊察姦禦暴宜必有法為法之本在於均有無平逺近嘉定吏祿嚴丐取之禁以防阻厄編籍首領重告捕之格以絶私販而移用舟車增置兵校設處督之官罷無名之稅以通漕運嵗時考法則登課者有賞虧缺者有罰此其大略也乃上江西廣東鹽法詔班之於是以新法所得利儲之以待用詔以周輔提舉江南西廣南東鹽事察監司之不職者置局於司農寺喻領之本志鹽數與實録不同當考十有二大煮鹽大字必誤檢志本只如此當求别本殿前司言殿前指揮使右班都虞候漢州刺史趙秀假滿百日請放停詔趙秀與左屯衛將軍致仕仍著為令己丑詔經制熙河路邉防財用司於嵗額錢內支三十萬緡赴河州置場糴糧斛封樁詔諸路起發至京錢物內藏庫寄帳內物帛不及省樣合變轉者從本庫相度行之定州路經略司言廣信軍覘遼人於易州緣邉鋪屋四面封標四十步安肅軍覘緣邉量鋪屋圍二十餘步以備牧馬若增築地步置鋪不侵犯本界地合與不合問理上批宜遵守誓書施行辛卯右班殿直雷瑜為閣門祗候瑜監教第四場畢及射藝應法射親出衆故也權發遣度支副使公事寋周輔奏聞江南西路人納淨利撲買鹽場緣鹽繫民食與坊場不同今欲量縣大小戶口多寡立年額官自出賣仍乞先廢罷買撲處令轉運司候法行日於增賣鹽錢內據淨利錢數撥還提舉司從之癸巳中書戶房言諸因戰陳及捕盜陷沒其親屬録用充承奉郎以上及使臣三班差遣借差殿侍雖年小未該出官其俸錢衣糧乞與支給仍著為令從之乙未詔在京官不得舉辟執政官有服親以御史知雜事舒亶言近論蒲宗孟不當薦舉同知樞密院韓縝姪宗弼乞立奏舉法故也舊紀書詔在京官無舉辟執政有服親新紀同元符元年五月庚午申明遵守此詔戊戌命權發遣度支副使寋周輔兼措置河北糴便三年六月四日詔三司選官六年五月十三日王子淵同措置食貨志云河北舊有糴便司取具年計而已上即位意在北鄙屢詔廣儲蓄然皆循故典未更制也元豐四年三月始命權發遣三司度支副使蹇周輔兼措置河北糴便瀛定大名置倉以儲之其額至一千二百萬石聽辟置官屬五年乃裒諸路封樁禁軍額闕及剩鹽息錢為本又假內藏三十萬緡及詔司農寺市易淤田水利同舊計置封樁芻糧者悉歸之明年六年五月十三日以提㸃河北西路刑獄王子淵兼同措置更謂之措置河北糴便司閏六月十七日手詔周輔今春河朔雨澤調節夏必豐成秋稼立苗甚茂宜乘美歲廣謀收糴仍其定瀛州新倉畢工之期以聞是歲大名東西濟勝二倉定州衍積寶盈二倉與瀛州之倉告成各二千楹此食貨志所書詔司農市易淤田水利舊計置封樁芻糧悉歸措置糴便司乃二年正月十四日事志係之五年乃誤也實録熙寧八年四月二十二日王子淵初自通判深州除提舉糴便元豐四年八月三日以河北提舉糴便糧草權河北西路提刑兼提舉糴便糧草並不入長編此年十二月二十二日修倉限三年畢詔瀘州將副皇城使雅州刺史姚兕等次等遷官或減磨勘年諸軍弓箭手義軍勇敢效用招安將獲首級重傷者遷資輕傷賜帛有差獲首領者遷兩資獲乞弟叔沒募首級遷三資仍賜絹五十以韓存寶保明功狀故也庚子西京左藏庫副使兼閣門通事舍人劉綰同提舉開封府界教閲保甲五月戊戌可并入癸卯大中大夫參知政事章惇以本官知蔡州大理寺劾惇父太子賔客致仕俞及弟潁州沈邱縣主簿愷占民田開封府官各懷觀望畏避簽書兵曹參軍吳潛勒停知府錢藻罰銅八斤判官虞大熙展磨勘一年推官胡宗師衝替司録參軍路昌衡展磨勘二年戶曹參軍劉陟士曹參軍王本倉曹參軍蔡旻並差替俞當杖一百以年八十勿論愷勒停御史臺劾新成都府路轉運判官周之道為惇致意朱服及奏上不實袁默妄言為惇致力之道徒一年默杖一百並勒停惇奏事及報上不實又制勘所初追治堂吏王冕等證周之道等語惇以為有司不當信冕等語欲虛揑次數抑逼執政以此報制勘所仍稱請盡情根勘毋止信其妄言坐不當指揮制勘院故有是責舊紀書章惇以父占民田奏不實罷知蔡州新紀不書因依之道致意朱服事在去年十月二十五日環慶路走馬承受陸中言環州洪德寨北壕內歸德白馬二川有間田詔環慶路自來難得間田今陸中乃言有久不耕地約千六百餘頃令經略司審實可與不可耕種及緣何間廢至今是與不是生荒兩不耕之田以聞甲辰翰林學士承議郎張璪為太中大夫參知政事先是王圭嘗三薦璪不用圭曰璪果賢陛下未嘗用以為不賢讒也臣恐士弗得進矣臣為宰相三薦賢三不用臣失職請罷上喜曰宰相當如是朕姑試卿卿德不回朕復何慮王圭薦張璪據圭舊傳附見時人號圭為三㫖宰相恐不辦此或恐未必是薦璪為參政也當考知制誥王安禮為翰林學士安禮於訓辭初不經意而典贍豐潤上數稱之御史豐稷言安禮性行淫僻師言鄙之天德包覆竊幸顯途矜奮自髙無敢論者臣仰惟陛下躬道德履法度以迪勵風俗俾皆有士君子之行今安禮所為鄙夫恥之擢在詞禁地親職重將何以訓多士儀四方臣恐天下之心不以名節望朝廷而僥幸萬一惟陛下察之孔子天縱之聖以言取人不能無失况安禮言放行汚無足觀者伏望追寢成命以釋羣疑御史朱服又言安禮命下之日中外莫不疑駭以為學士職不専以翰墨為事至於論思獻納上干國體地親秩峻待遇寵渥則又學士大夫之所觀望而視效者也方陛下信賞必罰之時髙爵厚祿以賢而制者固不可以輕授而幸得如安禮操行汚穢騰播人口雖里巷小人亦羞稱之但以倚恃安石之故凌傲輕肆無所憚忌而人亦莫敢誰何當世士大夫舉行義之汙者必以安禮為最而朝廷進擢度越流輩甚非所謂以賢制爵之意也方今之患正以為士者無行寡耻習以為俗雖陛下躬道德以迪之而勸沮之術尤在於進退黜陟之榮辱今安禮行義如此而朝廷進擢不已是豈陛下昭示好惡使人知所避行者哉伏望追寢安禮新命不聽河東都轉運使朝散大夫陳安石為朝請大夫天章閣待制再任醫官前皇城使嘉州刺史陳易簡等降舊官一資叙勾當御藥院竇仕宣等押領醫官本殿祗候老宗元等減磨勘年有差以皇太后服藥纍月康復也乙巳以九軍法一軍營陳案閲於城南好草陂已事賜燕逹詔奬諭舊紀書命官以新九軍閲試於京城南新紀書閲九軍營陳法詔提㸃開封府界諸縣鎮楊景略覆檢計提舉京城所標量新城四壁城壕地步以聞保州言覘知北界賀正副使石宗回言於遼主聞南朝大閲武及藏兵於民帳前已指揮燕京西京等處自今有南界投來軍士毋擅送中京順化營並押赴帳前上批聞賀正北使至恩冀間從人於驛舍羣聚合誦教法聲聞於外接伴祗應人有聽聞者此乃緣邉機防不謹有䦨出亡卒漏泄其事冝重告捕賞典并緣邉當職官亦等第立賞罰戊申御延和殿閲諸軍轉員凡三日通直郎集賢校理兼同修起居注知諌院侍御史雜事舒亶知制誥兼判國子監仍以亶所試戒勵士大夫崇尚名節詔榜示朝堂他日亶同僚有草除御史制而命詞戒其察者上曰御史以察為職而反以為戒乎卿諭速命改之詔司農寺封樁府界減罷耆戶長雇錢見在十三萬六千餘緡除撥還借支外餘送提舉府界教閲保甲司支用䕫州路走馬承受王正臣言南平軍管下播州夷界巡檢奉職楊光震於遮勒谷小茆田路口遇乞弟酋領宋阿訛鬭敵斬獲阿訛等三人首級本軍已送瀘州經制夷事司上批蠻賊阿訛纍曽出漢並邉之人必能辨識今光震既殱其親黨又𫝊首來獻忠勇之誠理宜不妄方今師屯在邉購捕元惡患未有應募而往者光震能秉心嚮順率先效力如此非大過所望以賞之必不能鼓動其衆圖成竒功宜専遣使厚賜金帛爵命遂詔林廣審問南平軍元辨識斬獲首級實狀以聞其後南平軍言光震斬獲阿訛等首級非僞乃命賞之詔楊晟堅六保人戶令沅州管轄晟堅與湖北歸明人先有讎隙如經官司陳訴毋得受理委謝麟明諭晟堅仍常存恤三司使李承之言臣近以陳乞寺額事在大理臣與崔台符王安禮皆有嫌怨朱明之即王安禮近親欲望改差公正之臣専置司根治詔移送開封府四月二十一日李徽之肅之奏六月一日移御史臺八月十八日承之責詔自今諸司見勘未結公案事令御史臺刑察不得輒取索情節其承受官司亦不得供報壬子詔樞密院轉員同知院事韓縝押宿仍趁赴起居奏事今後依此甲寅御史朱服言宣德郎權檢詳樞密兵房文字黃實以舅陳朴之喪率斂士大夫錢以為賻實樞府要官非朴親舊者亦不敢不從兼內有武臣𨽻樞密院尤於事體有嫌望付有司推治詔送大理寺鞫實實坐衝替䕫州路轉運司言阿訛最為乞弟心腹之人若果為楊光震所殺深慮乞弟必領兵讐殺光震欲乞詔林廣彭孫選募徑兵勇將赴南平軍同光震協力討捕乞弟上批所言實為機便時不可失宜速下林廣專牒彭孫悉師以往仍詔彭孫俟至南平軍開諭光震以遣官軍共力翦除乞弟之意勿令驚疑後又降敕諭光震率本部彊兵隨彭孫討乞弟如能於未舉兵前自設方略梟斬乞弟破蕩巢穴亦當重賞席汝明墓志吕大防作乃云彭孫不欲林廣故有此命當考隨州言知州正議大夫薛向卒輟視朝遣中使護其喪歸葬墨本云向吏材絶人逺甚所商略財利無遺然其甚者不能不病民有所上課或不實故御史劉述錢顗劉琦諫官范純仁等皆言向不可為大吏朱本增損云向吏事精鋭絶人于財利足心計然發運使所施置如均輸客運之類後雖不終誠不能無小害然亦當時風俗以訐清髙養名譽為事故向多為所排詆御史諫官皆言向不可以為大吏者非確知其利害也意皆倣此云今並不取
