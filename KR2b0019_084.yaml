body:
  text: 續資治通鑑長編巻八十宋李燾撰真宗大中祥符六年春正月癸巳朔御朝元殿受朝丙申髙州蠻人來貢庚子詔自今凡更定刑名邊防軍旅茶鹽酒稅等事並令中書樞宻院參詳施行以上封者言二府命令互出或有差異故也令審刑院大理寺三司詳定配𨽻法既而取犯茶鹽礬麴私鑄錢造軍器市外蕃香藥挾銅錢誘漢口出界主吏盗貨官物夜聚為妖等十二條悉減從輕焉詔如聞入内内侍省遣親事卒於京城察事因縁騷擾並止絶之辛丑詔益利兩路去秋災歉宜令本路轉運使洎長吏倍加存撫倚閣廬夀和泗州所逋去年秋稅以水災故也乙巳䕫州徼外蠻覃如綰等八十三人來貢詔諸路州軍所須繁碎物以正稅折納者自今悉罷之兩浙轉運使陳堯佐言杭潤等州米㪷錢六十盖淮泗不稔行啇販鬻致有増價乞行禁止詔不許仍令發廪賤糶以濟貧民丙午詔使臣犯入已贓徒已上罪叙用已至本職降兩資者止犯入已贓杖罪及元斷徒以上該恩特停官者叙用至元職降一等止縱逢赦命不得叙進又詔援赦理選人如曽犯贓及酷刑害命者令流内銓責其再犯當永不叙用知委狀先是太宗時貶黜再用人皆責改過狀以示儆戒於是申明之丁未中書言命官犯罪配諸州衙前者承前經赦止放從便昨赦恩内許令叙理今請以贓重及情理蠧害者授諸州參軍餘授判司京朝官幕職令録簿尉等第甄叙從之戊申詔内臣將命于外干預州縣公事及所在官吏不即以聞並寘于罪凡内臣出使皆責知委狀敢妄奏他事者當伏軍令祖宗舊制也責軍令状見江休復雜志今附此按此下原本有又詔如聞入内内侍省遣親事卒於京城採察公事因縁騷擾並止絶之凡二十八字已見前庚子條下此係重出今刪去己酉詔京城賜酺五日知舒州蘇國華言部内官吏僧道耆老二千二百七十三人詣州列狀請車駕謁靈仙觀詔諭止之庚戌諸州勝境曽賜先朝御製書者並降上所作太宗聖文神筆頌刻石辛亥進封衛國長公主為徐國楚國為邠國越國為宿國詔仙官仙經之號有犯聖祖名者咸改之命中使葺唐州淮瀆廟甲寅上謂宰臣曰羣臣出任受命之後多以南北非便為訴向敏中曰國家任人豈容自便當須釐革上曰若所任非所便則其心不安心既不安則何以久于其事王旦曰俯從人欲實由聖慈中外素知未可遽改也上然之丁巳以監察御史唐肅為梓州路提㸃刑獄先是肅為泰州司理參軍有商人夜宿逆旅而同宿者殺人亡去旦起視之血汚其衣為吏所執不能明遂自誣服肅為白其寃而知州事馬知節趣令具獄肅固持不可後數日果得真殺人者于是郡牧判官缺或請以肅為之上曰朕方别有所委俄授此任肅錢塘人也庚申置淑儀淑容順儀順容婉儀婉容並從一品在昭儀上又置司宫令正四品在尚宫上著于令以媫妤楊氏為婉儀詔兩浙諸州軍寺觀及民家蔵銅像限兩月内陳首委本處依銅鐘磬例勒知州通判名銜給令依舊供養先是知衢州宋為善言所部民有銅像者依法區斷其銅像凖犯銅例沒官慮傷崇奉之道而䧟刑者衆故條約之宋為善未見辛酉詔宗正寺以皇屬籍為皇宋玉牒從判寺趙世長之請也仍録别本蔵祕閣備檢討趙世長未見榮王元儼嘗侍宴頗多言又嘗請石保吉伶人新𨽻教坊者作戲及赴北園御筵有伶人少不中意元儼遽叱之將加捶撻宫僚皆莫敢諌既而對上復請此伶人作戲上不恱它日以語王旦等曰朕昔與諸王侍宴何敢如此弟兄相接亦無㳺談唯是讀書著文交相質問即位以來每嵗賜宴不過再三政慮宴喜之次言辭或致差失耳王旦曰今當召記室崔昈諭以親王喜怒過當必須規正向敏中曰陛下友愛親賢小或不當必以禮約之誠漸摩之深㫖旦曰聞王罕與賔屬相見上曰朕在東宫常與官僚欵接楊勵邢昺日夕講誦今當儆戒之也寳訓係此事于祥符五年初無時月今附見皇宋玊牒後稍刪潤之邵州闕守臣轉運司遣潭州監稅聞人若拙權領州事上以若拙頃與李琰等謀叛因告變授官遽使親民俗何由勸罷之用澧州駐泊都監史方知邵州上封者言武臣知州軍處或闕通判望令轉運司飛奏以聞付有司速差所差官未到仍于京朝官知州通判有全員處權差從之二月癸亥朔詔廣南福建川峽路軍民凶惡為患者並依法斷訖併家屬械送赴闕川峽四路贓錢賞罰錢許以鐡錢十當一令開封府自四月至八月死亡者不須覆檢它月仍舊賜太常博士中書堂後官劉思恕等緡錢羊酒令賜酺日飲㑹時思恕等引樞宻院副承㫖已下至大理寺法直官例請預酺宴王旦以為不可故特有是命向敏中陳堯叟馬知節丁謂等言自今聖製歌詩望各賜一本從之先是每賜惟及班首故敏中等有是請甲子詔自今犯罪已叙用未復資人遇赦情輕者便與叙用丙寅召宗室近臣詣滋福殿觀聖祖臨降及衆真列侍圖又陳於含光殿以示百官戊辰上御乾元樓觀酺自是凡五日辛未䕫州蠻彭延進等四十八人來貢甲戌詔文武官犯私罪該赦叙理者刑部磨勘訖中書樞宻院具所犯輕重取㫖詔奬知河南府馮拯等獄空故也前泉州觀察推官公孫簡監茶場代還引對便殿上閱其所試判辭荒謬止命加階簡自陳有勞乞改京秩上令以判辭示之左右揮使退簡聲色愈厲詔付御史鞫問責授房州文學乙亥泰州言海陵縣陂湖草中生聖米頗濟饑民乙酉詔自今諸寺院童行令所在官吏試經業責主首僧保明行止乃得剃度如百屬試驗不公及主首保明失實者並寘重罪先是嵗放童行剃度皆㳺惰不逞之民靡習經戒至有為㓂盗犯刑者甚衆故條約之辛卯環慶副部署真定王守斌言凖詔簡省戍卒其自京新發兵已令於永興軍等處屯泊上曰邊防利害係將帥能否守斌能體朝㫖減邊費亦可嘉也三月壬辰朔宜春郡主髙氏言䝉恩賜城西蔬圃望蠲其常租上曰租稅以備軍須免之則後援例者衆不許丁酉詔應祠祭行事並須早入致齋先是饗先蠶太祝馮經為監祭使所紏故申明之河北轉運使右諫議大夫盧琰被疾琰勤於使職所至以幹集聞詔遣中使挾太醫往視及卒上甚悼之時琰母八十餘無恙有詔琰子太常博士士宗特追出命知懐州次子秘書丞士倫為太常博士賦禄終喪己亥閤門奏後苑賞花曲宴羣臣有禮容懈惰者上曰飲之酒而責其盡禮亦人所難也宜且降詔戒諭之龍圖閣待制張知白以疾固請補外甲辰命知青州上作内侍箴賜閻承翰等承翰表請刻石本省從之丁未詔沙門島罪人除該赦遣赴闕外自餘量其所犯輕者徙置近地詔京城徼廵宜參用馬步軍士時廵卒三人因寒食假質軍装賭博既不勝遂謀以五鼓未盡伺擊陌上行人弃尸河流取衣物貿易以贖所質上曰太宗朝廵警兼用馬步卒盖營校不同可以互相覺舉遂復其制焉戊申以主客員外郎直史館判三司都磨勘司楊嵎監汝州留田務嵎以重法按本司吏吏訟嵎嘗私役使公人法當奪官上特寛宥訟者决杖停職權知開封府劉綜言貴要有交結富民為之請求或假託親屬奏授爵秩縁此謁見官司煩紊公政請加抑止庚戍下詔風厲各令自新繼今復然者重寘其罪又詔富民得試銜官者不得與州縣官屬使臣接見如曽應舉及衣冠之族不在此限辛亥詔京師每冬正寒節假止許民庶賭博而禁卒有犯官司亦例釋之甚無謂也自今不得復然壬子䕫州蠻人龔才晃等來貢癸丑進士魏剛决配崖州周惟翰勒出科場大理寺丞魏瓘停官郾城縣令張沔衝替剛與惟翰素有隙因誣告惟翰詆天書按鞫無狀瓘坐延剛與惟翰於家沔即瓘之近親與剛等欵匿故併責焉瓘羽之子也嘗為開封府倉漕參軍㑹上元與内侍督作燈山而内侍誅索擾人瓘宻以狀聞詔杖内侍於省中詆天書據瓘本傳然本傳云剛詆天書則又誤也張沔浦城人劉敞誌墓此别一張沔也甲寅江南路提㸃銀銅鉛錫胡則言信州鉛山縣開放坑港兵卒死傷甚衆詔遣使劾轉運司規畫乖當及提㸃刑獄司不即聞奏之罪其役徒休息之則嘗為鑄錢監得吏所匿銅數萬斤吏懼且死則曰馬伏波哀重囚而縱亡之吾豈重貨而輕數人之命乎籍為羡餘釋弗誅乙卯建安軍鑄玉皇聖祖太祖太宗尊像成以修玉清昭應宫使丁謂為迎奉修宫副使李宗諤副之北作坊使淮南江浙荆湖都大發運使李溥為都監丙辰加溥順州刺史旌其鎔範之勤也戊午詔比來諸州大辟五人以上委轉運提㸃刑獄司録問訖乃得决以故頗有留滯自今聼本處不干礙官若三班使臣録問環慶路走馬承受李希及言縁邊小蕃時縱人騎抄掠熟户上言此亦邊臣少威望所致也因謂王旦等曰邊臣臨事多不得宜大凡若能禽驅敵人則可决䇿出竒不然莫如鎮靜唯曹瑋頗有方略嘗言蕃戎之情誠偽相半但當伺察其情實者推心厚待之姦偽者亦善待而宻為之備彼自以為莫我疑也或有侵盗必掩其不虞而敗之己未詔兩京諸路場務津渡坑冶等不得令仕宦之家該䕃襲人主掌先是陳留縣民田用之盧昭一争奪酒務用之父見任幕職昭一為試秩故條約之存此記事始或可削更檢看夏四月甲子三司定監買茶場官賞罰之式凡買到入筭茶及租額遞年送𣙜務交足而有羡餘者即理為課績其不入筭者雖多不在此限丙寅詔文武官保䕃孫姪者不得妄名為子己巳放瓊州螺蚌稅錢庚午利州路承受侍禁張仲文降一資黜廵外州驛遞初仲文言新知彭州皇甫載不能稱職上令本路轉運提㸃刑獄司察之具言載頗勤所任因命樞宻院召仲文詰之具伏虛妄乃有是責詔雄覇州所調鄉丁為忠順指揮戍于河上嵗月既久宜特遷轉之又詔補填闕額俾及元數河北忠順自太宗朝以瀛莫雄覇州乾寧順安保定軍家丁置凡三千人自淘河至泥姑海口九百里為二十六寨一百二十六鋪沿界河分畨廵徼𨽻縁邊戰棹廵檢司自十月悉上人給糧二升至二月輪半營農慶厯七年八年皇祐四年可考戊寅刑部員外郎兼知雜御史段華言羣臣外任官滿多以焚黄省親為名奏牘不待報而去有累月不赴朝請者望自今請告半月者聼行半月以上者奏裁從之實録本志並如此紀獨云詔外任官解秩者許便道省親展墓恐與此少異也當考已卯出太宗㳺藝集併親製樂曲九絃琴五絃阮譜付史官及太樂署庚辰以樞宻直學士給事中李士衡為河北都轉運使先是上曰議者言士衡用河北錢五十萬貫助東封致令管内闕乏丁謂曰士衡貢東封見錢止十萬餘即薪芻總計五十萬爾上曰官吏艱于經畫輙以此為辭當復任士衡責其集事以塞衆多之言故有是命其後積粟塞下至鉅萬斛或言粟腐不可食朝廷遣使取視之而粟不腐也詔淮南州所給饑民糜粥俟麥登乃止判大理寺王曽言自咸平編敕後續降宣敕千一百餘道及雜行者又三千六百餘道條件既衆檢視尤難望遣官刪定乃詔曽與翰林學士陳彭年等同加詳定壬午有司請開置望春門上以宫觀功役未畢罷之丙戌詔諸州死罪情理可憫及刑名可疑者報提㸃刑獄司詳察以聞當付大理寺詳覆無得顧避舉駮致有幽枉幸新修五岳觀賜官吏器幣工徒緡錢有差丁亥詔聖像所經州縣官吏各賜宴設是月詔諸廂鎮無得擅置刑禁至道初禁鎮將廂校妄理詞訴捶掠人者至是潁州廂校張珪强以鬻牛者為盗捶掠致死刑部請申前制詔應京朝官諸司使副三班使臣等差遣出外縁路館劵回日於閤門送納委三司㸃檢如枉道重疊虛給官物者具名以聞㑹要四月事詔糧料院置諸道幕職州縣官借支料錢文簿請訖勾鑿初度支判官祖士衡上言銓注官訖吏部格式司移牒三司借支俸錢三司下糧料院施行至有候請不及而赴官者未嘗申舉或致欺倖因請置簿以統之經百日而不請者就新任給之㑹要四月十三日今附月末或可削去五月辛卯朔上御崇政殿親録繫囚流罪以下遞降一等壬辰詔伎術官未升朝特賜緋紫者勿佩魚詔權罷今嵗貢舉癸巳權知開封府劉綜言本府鞫罪刑名有疑者舊例遣法曹參軍詣大理寺質問參酌施行近日止移牒往復多致稽緩請循舊例許之辛丑國子監新修御書閣有赤光上燭長尺許判監孫奭以聞孫奭上䟽諌祥瑞今亦為此不知何故按降聖記五月壬寅王旦等奏八日九日十日十一日十二日聖像船有鶴徊翔向敏中等表賀及國子監所奏今月十一日夜祭告官工部郎中直史館髙紳奏禮郎錢曖說書官前德州安信縣令滑文演等同見新修御書閣東北角二條柱上有光約一丈已來至二夜三㸃方散並請宣付史館詔從之初無孫奭姓名而實録所書獨如此當考先是丁謂等自建安軍奉玊皇聖祖太祖太宗四像各御大舟迎奉使副分侍玉皇聖祖都監於太祖太宗舟檢校舟上設幄殿皆有内侍主供具夾岸黄麾仗二千五百人鼓吹三百人别列舟十艘載門旗青衣弓矢殳义道衆幢節所過州縣道門聲讃鼓吹振作官吏出城十里具道釋威儀音樂迎拜所過禁屠宰七日止行刑二日遣迎奉大禮使王旦詣應天府酌獻奏青詞宗室至故驛羣臣至通津門奉迎先於京城升橋北設幄殿大次宫懸甲辰聖像至上齋於長春殿百官宿齋於朝堂乙巳上袞冕朝拜羣臣朝服陳玉幣冊文酌獻具大駕鹵簿自宫城東出景龍門至玊清昭應宫大禮等五使前導載像以平盤輅上加金華盖之飾以迎真迎聖奉聖奉宸為名每乗二内臣夾侍其纓轡馬色玉皇聖祖以黄太祖太宗以赤上具鑾駕先由宫城西出天波門就宫門望拜權設幄奉安擇日各升本殿丙午羣臣稱賀曲赦京城建安軍揚州髙郵軍楚泗宿亳州死罪囚降一等流以下釋之升建安軍為真州鎔範聖像之地特建為儀真觀真州放今年夏稅十之三屋稅十之二聖像所過州軍放夏稅十之一淮南災傷處去年秋稅並蠲之己酉詔玉清昭應宫自今不得以葷茹入如有宴設即就他所賜迎奉聖像官行事官金幣有差辛亥升真州為上州月給酒洎公用錢如泗州例詔淮南諸州應縁玉清昭應宫所差民匠月給其家米人一石丁謂等請以恭孝太子魏懿王院増建景靈宫許之甲寅修懐逺驛為南宅賜皇從姪惟正等惟正德昭長子乙卯詣玊清昭應宫謁聖像度支員外郎陳世卿罷荆湖北路轉運使歸朝屢述溪洞利害上召對頗器其材復言願効用於繁劇㑹知廣州邵曄疾甚朝議擇人代之丙辰授世卿秘書少監知廣州賜金紫世卿至州奏除計口買鹽之制人甚便焉丁巳聖像至京遣知制誥路振龍圗閣待制查道奏吿諸陵己未翰林學士右諫議大夫知制誥李宗諤卒上甚悼之謂宰相曰國朝將相家能以身名自立不墜門閥者惟李昉曹彬爾宗諤方期大用不幸短命深可惜也因厚賻其家子昭遹昭述弟宗諒並遷官及玉清昭應宫成又録其㓜子仍給奉終喪宗諤風流儒雅有醖藉内行淳至事繼母以孝聞二兄早卒奉嫂字孤閨門之内兒無常父賞延所及必先羣從及卒而已子有未仕者好賢奨善薦㧞寒素士大夫皆歸仰之記聞載王旦引宗諤參政已附見五年九月江休復云欽若說旦乞厚賻宗諤家上顧曰宗諤大欠卿債旦乃知為欽若所賣遂邑邑至薨按天禧元年九月旦始卒距此尚五年恐休復誤也若謂欽若縁吳植事邑邑至薨則恐有之旦必不爾今不取詔三班院自今引見差遣使臣内有疾患者並附脚色開說進呈先是選使臣任使引對日乃有盲跛者故降是詔詔諸路走馬承受使臣多有踰越及受財賄事發被劾皆稱靣曽聞奏因縁生姦自今合奏公事並須明具劄子進納不得輙憑口述五月末事六月甲子監察御史張廓上言天下曠土甚多請依唐宇文融所奏遣官檢括土田上曰此事未可遽行然今天下稅賦不均富者地廣租輕貧者地蹙租重由是富者益富貧者益貧兹大弊也王旦等曰田賦不均誠如聖㫖但改定之法亦須馴致或命近臣専領委其擇人令自一州一縣條約之則民不擾而事畢集矣張廓未見趙州言聖像玉石船經州之石橋河水淺澁有黒龍鼓浪以進船凡厯三灘船既渡河水淺澁如故詔遣官致祭詔宰臣參知政事樞宻使副依舊用凉繖先是有司定儀惟宗室得用輔臣悉罷故特有是命乙丑令環州修城材料有餘者覆䕶之備修營舍自今不得配率上以是州極邊不産材木凡有所須即於内地科折踰越險阻輦致甚艱故也丁卯䕫州路轉運司言西南蕃遣二百餘人詣闕修貢詔許其牙職至京餘令以所貢輸黔州就加支賜戊辰幸開寳寺謁舍利塔賜名曰靈感表瑞異也己巳國子監御書閣上梁詔近臣臨觀設㑹上作七言詩賜之翰林學士戸部郎中知制誥楊億嘗草答契丹書云隣壤交歡上自注其側作朽壤䑕壤糞壤等字億遽改為隣境明日引唐故事學士草制有所改為不稱職亟求罷上慰諭之他日謂輔臣曰楊億真有氣性不通啇量及議冊皇后上欲得億草制使丁謂諭㫖億難之因請三代謂曰大年勉為此不憂不富貴億曰如此富貴亦非所願也乃命它學士草制江休復雜志云改命陳從易按從易當此時為館職不應草制黄庭堅思賢詩注改命陳彭年按彭年當此時亦未入翰林或特㫖另撰如張齊賢封除目與黄夷簡曽致堯例則不可知然江黄所記姓名必有一誤今但云改命它學士草制更須詳考之盡得當時人文集檢討亦可推求其姓名也億雖頻忤㫖恩禮猶不衰王欽若陳彭年等深害之益加譖毁上意稍怠億嘗入直忽被召至禁中既見賜坐從容顧問徐出文藁數篋以示億曰卿識朕書跡乎此皆朕自起草未嘗命臣下代作也億皇恐不知所對頓首再拜趨出知譖者之言得行即謀退遁億有别墅在陽翟億母往視之㑹得疾億遂留謁告牓子與孔目吏中夕奔去先一日上聞億母病遣使者以湯藥金幣賜之使者及門則億既亡去矣朝論諠然以為不可上亦謂輔臣王旦等曰億侍從官安得如此自便旦曰億本寒士先帝賞其詞學寘諸館殿陛下㧞擢至此責以公議誠為罪人頼陛下矜容不然顛躓久矣然近職不可居外地今當罷之上終愛其才踰月命弗下億素體羸於是稱疾請解官辛未以億為太常少卿分司西京仍許就所居養療俟損日赴任黄庭堅云改命陳彭年草制命下之日億全家奔陽翟按立后在去年十二月億以今年五月出奔其出奔不縁此也歐陽修所記與江休復畧同今用之錢惟演金坡遺事載億以五月二日奔陽翟使者及門始知億已亡去則湯藥金幣非億去後始賜也本傳云億不待報行上親緘藥劑洎金帛賜之盖飾說也今用惟演所載庶得其實億既亡去朝論即諠然王旦等乞罷其近職此命當亟下乃自五月二日至今月辛未㡬四句始責降真宗愛才容直之盛德於此可見而實録正史並皆脫畧深可惜也今特著之億稱疾求罷因授分司本傳當不謬又云有嗾憲官彈億者則又恐未必然也其時之為憲官者盖姜遵也彈億在明年八月億除汝守之時分司西京之授初不見有憲官舉劾疑本傳别有所據當考中書門下請依宗正寺所奏降皇后三代父母名氏編入屬籍詔從之先天降聖節日令天下以延夀帶續命縷保生酒更相贈遺秦州言知州樞宻直學士左司郎中李濬卒上語近臣曰天水邊要宜速得人馬知節言北作坊使鄜延鈐轄張志言可任上然之壬申授左騏驥使就命知秦州志言尋改名佶以御製大中祥符頌真逰頌聖祖臨降記賜天下道蔵從中書門下所請也以右諌議大夫龍圖閣直學士陳彭年為翰林學士學士兼職自此始甲戌上作歌賜彭年因謂向敏中等曰頃命學士罕曽賜歌詩彭年不同他人故有是作因曰彭年詞筆優長擢居清近久益謹宻多聞好學人鮮偕者平居日寫萬餘言復精詳典禮深明法令人或請益應答如流皆有依據常令檢討典故質正文義每一事必具載經史子集所出備而後已自非强記何由至此敏中曰彭年兼有器識丁謂曰彭年全才也豈止以文雅雍容侍從至如參酌時務詳求物理皆出人意表上然之因曰詳定所事無大小皆俟彭年裁制而後定此一司不可廢也往者參酌典禮雖徧厯攸司而所見皆出胥史今已為定式矣三司借内蔵庫銀三萬兩保安軍言久雨河溢判官趙震及兵民溺者凡六百五十餘人遣使卹之丁丑以大理評事劉中象免持服簽署澧州判官事中象荘宅副使仁覇之子仁覇知澧州綏撫蠻人有政績至是卒前荆湖北路轉運使陳世卿言中象久左隨父任頗諳溪洞事故有是命詔諸州有黄帝祠廟並加崇飾辛巳命翰林學士王曽昭宣使韓守英勾當三班院代孫奭竇神寳以稽滯使臣故也詔廣州知州給添支錢自今以七十萬為添支五十萬為公用時言事者云廣州本無公用錢而知州月給十萬盖兼備公費而長吏以其名為添支但以自奉宴設甚稀故特為定式丙戌秦州言押領龜兹國進奉輝和爾首領懐化司戈林布智行至黄河北為蕃部所隔望遣使臣接導仍賜遷秩告身上曰戎人無厭不可悉如其請令秦州就遣使臣量加賜與引伴出蕃供奉官劉渥前使龜兹以疾先還至京而卒上閔其在道艱阻詔以供帳物賜其家從行人第遷補之丁亥増給兗州公用錢犒修宫使臣軍校己丑詔先天降聖天慶節並前後一日不視事是月詔自今應京朝幕職州縣官乞試斷案者委考試官等就庫宻揀公案親自封記候試時於中更選合要道數依元敕精加考試不得仍前令庫胥檢簽致有漏泄其所試斷案須是引用格敕分明方始定斷合得何罪勿使鹵莾如違其所試官並重寘之法其大理寺應係新舊草檢宣敕等庫自後並差官封鎻無使人吏擅有開閉初中書以試人名進呈宰臣王旦言從來已有差遣或已授逺官雖是法寺要人恐渉規避已不施行其間預試而中選者亦甚僥倖縁選人未經六考無兩人同罪薦舉則無階升陟此輩雖云詳練格法或考試不精則僥倖者多矣或擢于審刑院則例章服嵗滿又加等差使以此尤須得人盡公程試帝曰如卿所言誠有之所斷案往往先知洎至定刑則但曰合入徒罪合入杖罪即不指陳犯何條格致得某罪自今選官精加考試仍申條約故有是詔
