body:
  text: 續資治通鑑長編巻四百三十六宋李燾撰哲宗元祐四年十二月丁酉朔正議大夫章惇降授通議大夫提舉杭州洞霄宫於是舉行八月己未詔書惇始除䘮故也舊録云以諫議大夫劉安世朱光庭言惇彊買民田不法故有是命新録因之按安世等所言不止為惇彊買民田其曲折已具章疏初有服闋與宫觀指揮安世又論其不當而朝廷訖莫從也戊戌西蕃鄂特凌古并温錫沁下大小首領順律覺依等補職名支請各有差以進奉到闕推恩也庚子遼國遣使奉國軍節度使耶律常副使中大夫太常少卿充史館修撰史善利来賀興龍節辛丑夏國遣使賀興龍節右諫議大夫范祖禹言臣近凖樞宻院録白髙陽關路兵馬鈐轄兼河北第六將楊永節為母亡乞觧官行服續據本路都總管司奏乞不許本官觧官行服所貴得人協力勾當奉聖㫖依髙陽關路總管司所奏者臣檢㑹元祐編敕諸武臣丁憂者若係小使臣及元是軍班換授并見任管軍或充縁邊路分總管鈐轄都監知州縣城都監寨主都同廵檢雖係大使臣並不觧官其乞觧官行服者除縁邊任使奏候朝㫖外餘並聼臣竊以小使臣不觧官行服已損孝治之風朝廷恤小官非俸禄無以為養不得已而未之改耳自大使臣以上官既陞朝禄既足以為養而縁邊任使亦不觧官其乞行服者又湏奏候朝㫖帥臣因而奏留朝廷重違其請循例奪服唯狄詠是狄青之子帥臣為之奏請特許觧官當今縁邊無異内地帥臣遭喪者無不觧官自餘將領寄任輕於帥臣非有金革之事而無故奪其喪服全無義理若言其才則方今武臣常患貟多豈至無人可使若恤其貧則在内地者均是人也何獨於縁邊恤之若以觧官為優恩必待如狄青之子然後許之則父母之喪無貴賤一也古者庶人有喪三年不從征役豈可仕至陞朝以上而不使執親之喪臣愚欲乞今後大使臣以上丁憂者雖繫沿邊任使並觧官行服如遇有邊事即許本路奏留繫自朝廷指揮庶使武臣皆知禮法有益風教而緩急藉才亦不失金革從權之制如以臣言為然乞下有司修立貼黄臣竊以奪服之禮本非古法祖宗時文武官尚少故因襲前代權制不許觧官今承平日乆吏貟益多冝使人知禮敎或遇有邊事藉武臣宣力則奪其喪服無所不可壬子京東路轉運司言凖朝㫖本路清河與江浙淮南諸路相通舟楫徃来般運物貨因徐州吕梁百歩兩洪湍淺險惡水手牛驢縴户盤剥人等百般邀阻損壞舟船致客人不行已奉㫖差知常州晋陵縣事趙竦及於本路選差齊州通判朝請郎滕希靖同詣徐州吕梁百歩兩洪相度打量地勢髙下穿鑿作井别無阻礙實可開修月河石堤上下閘開閉通放舟船及約度到人工料次所費官錢米豆經久利便及欲乞於本路不拘常制踏逐使臣差二員專切監勒兵夫人匠等興修及乞存留趙竦與滕希靖同共提舉㸃檢從之内合用兵夫除本路團結修河兵夫不差外令本司剗刷合用役兵應副不足即行和雇仍專差趙竦滕希靖管勾開修令京東路轉運司并徐州應副新本削去癸丑禮部言據大樂正葉防狀近凖敕来年正月一日御殿今再定到威加四海之舞化成天下之舞儀式協律郎陳沂看詳别無未盡欲依所請從之甲寅詔減鄜延等路戍兵節次歸營先是夏人逆命陕西諸路奏乞添屯今已通貢故有是命三省樞密院言昨令都提舉修河司從長擇一順快處回河差夫八萬和雇二萬充引水正河工役外北外都水丞司檢計到大河北流人夫二十萬四千三百一十八人故道人夫七萬四千四百五十六人兩項共計二十七萬八千七百七十四人今都水監丞李君貺等檢計裁減到共十九萬四千九十八人詔令修河司且開減水河其差夫八萬人於數内減作四萬人充修河工役於李君貺等裁定差夫内共減作一十萬人令修河司通那分擘役使餘依前降指揮御史中丞梁燾言臣聞河為朔方之患甚矣不可不治也東流之利人人皆知之朝廷審其如此乃議修復孫村故道令三變而功無所見徒以疑民心耗國力殆非計也夫河事正如邊事在熟計利害而為一定之論必信而力行之豈有分數之漸乎朝廷能信東流之利則斷以不疑極國力成之而無憚是暫勞永逸也如以此勞民傷財當緩之以嵗月從容閑暇儲用計工俟其有餘而一日成之是人逸功倍也於斯二者審擇其一在為與不為爾豈容姑息之計於其間哉今乃省人功物力以為減水河幸其洪流之入亦已玩矣河之大勢北傾悍而不可制其所分之水固不能多水既不多流漸平緩平緩之流終成淤澱淤澱既積遂至斷流若淤斷故道遂失東流之利是自廢長久之䇿也若不為減水則故道依舊終有囘河之期若為減水則故道必廢更無回河之計利害如此甚易見也或謂漲水之時亦湏流行故道設不為減水亦湏淤澱不可一年二年計之必於當年為之則可矣是不然盖漲水之来不過三二分有計時而斷流當水涸之時稍加濬治即故道猶在分水之来雖少亦湏四五分或至五六分常流而不絶直至淤平乃斷分數愈深更不可以施功濬治故道豈復得存耶又謂河勢近年卧東故可為東流若或背去不可復為矣此説誠為有所取然一二年間未必便至於此但歇得一二年間人力國用既已有餘便可為之臣以謂河流所以東卧者必中流之西稍緩其下已積泥沙河底漸髙也久之河底益髙水勢無復能西矣臣愚欲乞罷修減水河以存朝廷將来之利不重朔方今日之患伏望聖慈特賜詳酌面諭大臣極理講議如保得終不害於囘河即聼為之如無必然之説幸用臣言早賜施行貼黄方今正是農時未得春澤興此大役勞民動衆以奸隂陽之和恐致旱沴議如可罷即乞速降指揮三省言六曹學士院臺省寺監官每有衆議隨事申乞支錢雖臨時多寡不一縁無限數未有定式今参酌修立毎貟二貫至一貫所有逐處其支料次錢指揮更不施行餘並從舊制從之新本削去尚書省言在京吏人有過會恩者原免之外不計輕重别無誡勵今欲吏人有過㑹恩事理稍重者仍上簿從之左諫議大夫梁燾言臣近論奏事以方今商旅不行國家財用匱乏乞講求祖宗之法通商廣財又以省罷吏貟太刻滯事廢職人情不安但務茍且乞先省事省官如未暇為之且守四分減一分之法以期久逺之効諸已議而未行者一切罷之又以按此下原本錯簡接寫命使獲薄禄云云今校正裁減浮費所細碎苛急甚損國體集怨於下有害政事乞罷所差官宋肇以其事委户部結絶又以舉人習經義者少習詩賦者多乞更不各取五分只以入試人數用觧額考校合格之人此數事者臣採之公論利害灼然方敢上之朝廷以補聖政萬一竊思陛下聰明洞照中外敬仰人情事體無所不知必以臣言為是竊恐大臣各懐私見以惑聖聼伏望候進呈日斷在必行庶使治道清明人心慰悦事非小補願留宸念貼黄其裁減浮費所差官宋肇奔競小人不識大體游厯權貴之門諂媚迎合為事以此大臣中頗有喜之者伏乞速賜指揮罷免仍不與推恩伏望宣諭其省吏事已著令施行者已不可改其見取索到而未曾施行者乞一切罷去燾乞通商廣財在六月七日論科舉不限五分附六月末此奏劾宋肇據密疏在十二月十八日今從宻疏龍圗閣直學士中散大夫知河陽陳安石為左中散大夫依前職知鄧州殿中侍御史孫升言臣聞壯而仕老而休者古今之通義七十引老而去者禮法之常經所以明止足之分厚亷退之節也其或身繫天下安危徳與朝廷輕重仕不得謝禮益有加者非可以為常也伏見龍圗閣直學士新知鄧州陳安石年七十有九無功於國無徳在民厯仕以来蔑聞政迹而為河東轉運使日附㑹時論興置鹽井害及一路生靈昨在吏部精力已耗日惟昏睡衆所指笑出帥永興亦以昏老為言事者所議今加數年有退無進而不知止足貪冒無恥坐尸厚禄屢易近藩名徳不聞功業無有而恩禄所加如此何以砥礪搢紳崇貴亷恥乎伏望聖慈詳察與一宫觀差遣庶幾朝士大夫稍知止足之義務崇亷退之節安石㝷改鄭州久之乃以提舉崇福宫卒五年二月一日自河陽改鄭州紹聖元年正月乃以崇福宫卒安石傳云自鄭州請崇福不得其時右朝請大夫倉部郎中張安上權知齊州朝散大夫提㸃開封府界諸縣鎮事范子諒為右朝散大夫倉部郎中乙卯知樞密院事孫固門下侍郎劉摯尚書左丞韓忠彦言臣伏見故太子中允直集賢院石介在仁宗朝文學行義名重一時經術博深議論堅正以扶持名教為己任甞與孫復胡瑗為國子監直講教養人材士風丕變故至今論學校者稱慶厯之風然介志氣剛大不肯枉道以阿世而喜於分别邪正嫉惡太明以此忤權貴取怒擠逐傾陷至其死猶不已天下皆寃之其後誣謗雖已明而厯年浸久無復為言之者今聞其子編於民籍略無生業日有饑寒之苦士議歎惜以為聖朝尚賢不應使名臣之後零落至於此極也臣等不勝拳拳欲望聖慈特詔有司録介之後以子若孫一人賜以一命按此下原本錯簡接冩純茂云云今校正使獲薄禄不墜厥世以副聖朝崇奬善人之意而為天下守忠義者之勸貼黄稱仁宗時館職石延年直講孫復身沒之後䝉官其子近日推恩吕誨包拯劉庠之子各任以職事天下感勸如介之後宜在所録伏乞比類施行五年正月二十二日官石師中戊午門下省言三省得㫖文字奏知劄子自来止是具事冝進入其間慮有節冩不圎或致漏落事件詔今後立定式様與録黄連黏在後入進新本削去十月十二日劉安世所言當参考御史中丞梁燾言臣伏見監察御史闕員已乆侍御史近有遷除復未補人竊以紀綱之地所當擇才耳目之官不可曠位况今寒畯待用者猶滯孤直己試者未旌冝加公選以副清議欲望聖慈特賜指揮早除侍御史如更令舉官亦乞檢㑹近制施行庶使中外知聖主開廣言路清明政事之意貼黄臣竊見近日翰林學士至兩省官准聖㫖再同舉御史兩員欲乞朝廷先次選除以補員闕臣訪聞先朝擢為御史而中間以言忤大臣罷去者盖多端良之士伏乞聖慈更加詳擇牽復任用以廣賢材之路舊録刪取燾言大略今全載之詔御史中丞舉官二員兩省諫議大夫以上未曾舉監察御史同舉二貟以聞詔依舊録是日詔文彦博累乞致仕候中春施行此據政目增入五年正月末范祖禹云云左朝散郎李閌為都官郎中庚申朝奉郎徐鐸為左朝奉郎正字刑部言大理寺官舊條惟曾任外處官失入徒已上已决或失入死罪方不預選新條又添入任大理寺官失斷徒已上三人或死罪一人亦不在選限竊以大理日斷天下疑案雖備悉心力縁案牘既繁不無錯誤又况容有疑似輕重之間若因問難改斷亦為差失委是人數太窄竊慮精彊諳習之人偶以礙格不得預選有此未便欲乞於條内改三人作五人改一人作二人從之禮部言諸路申請貢舉𠡠經義兼試詩賦進士及經義進士觧額各取五分竊慮兩科應者不齊拘定五分則似未盡乞行均取看詳進士兩科試法不一舉人互有輕重難易之論兼就試人數不定則觧額難以均當終非通法不可乆行詔来年科塲以試畢舉人分數均取後一次科塲其不兼詩賦人觧額依元祐三年六月五日所降朝㫖如未習詩賦舉人許依舊法取應觧發合格人不得過額三分之一已後並依元祐二年十一月十二日勑命考試進士分為四塲第一場本經義二道論語或孟子義一道第二場律賦一首律詩一首第三場試論一首第四場問子史時務䇿三道以四場通定去留髙下内仍減時務䇿一道政目云来年科場以試畢舉人分數均取後一次不兼詩賦止三分已後依元祐二年十一月十三日條十二月十八日梁燾云云十月十八日蘇軾云云可考辛酉御寳批訪聞近降指揮提舉提㸃集禧醴泉等處宫觀只許非時㸃檢官物月押簿厯外餘並鴻臚寺施行今来提舉提㸃在京宫觀與提舉提㸃外䖏宫觀事體不同如非時行幸之類若凡百責辦鴻臚一司必致闕事兼恐經乆難行可除減官吏并吏禄外餘並一切依舊壬戌遼國遣使保安軍節度使蕭永誨長寕軍節度使耶律寛副使朝議大夫守祕書少監劉從誨廣州防禦使姚景初来賀正旦癸亥中書省言提舉實錄宰臣吕大防奏所修神宗皇帝實録今来已成草巻縁未經編摩㸃對重複功力不少所有修撰已下官吏添給等欲依修仁宗皇帝實録例令依舊支破候冩進冊了當即行住支從之甲子寳文閣待制知潁州曾肇知鄧州左諌議大夫劉安世言肇資禀姦回趨向頗僻昨来蔡確謗訕君親天下臣民所共疾怒而肇倡為邪説惑亂衆聼以至捭闔執政欺罔同列苟有可以救確者靡所不為上賴聖明得正刑典肇不自安遂乞外補陛下敦尚寛厚貸而不誅猶假從官出守近郡搢紳之論固已不平到潁半年遽易帥路非特無以示好惡於天下亦恐氣燄凶慝小人浸長伏望聖慈審度事理收還新命以允公議詔曾肇改知齊州改齊州在明年正月十一日今并書是月宥州牒去城十里作熟地外十里多不耕作草地政目有此明年正月二十四日可考左諌議大夫劉安世言臣伏自前月末聞傳聖㫖權罷講筵是時近興龍節意謂將有燕饗是以暫輟邇英之幸用成慶禮今復半月别無政事亦非有前嵗大雪苦寒之故而勸講之臣乆不得望見清光臣固已疑之矣廼者民間喧傳禁中見求乳母臣竊謂陛下富於春秋尚未納后紛華盛麗之好必不能動蕩淵衷雖聞私議未甞輙信近日傳者益衆考之頗有實狀臣忝備言職當諫其漸伏惟皇帝陛下天錫睿聖纂承大業太皇太后陛下慈仁正順保佑備至覆載之内莫不傾耳拭目以望風化而或者之論乃謂陛下稍疎先王之經典寖近後庭之女寵此聲流播實損聖徳昔者堯之受命惟以天下為憂而不敢以位為樂成湯不邇聲色不殖貨利著之方冊萬世稱誦皇帝陛下不可以不勉太皇太后陛下不可以不勸也伏望聖慈為宗廟社稷之大計清閑之燕頻御經典仍引近臣與之論議前古治亂之要當今政事之宜悉俾開陳以助聖學無溺於所愛而忘其所戒則天下幸甚十二月八日興龍節先是給事中范祖禹上疏皇帝曰臣伏見陛下嗣位以来端拱淵默專意學問臣侍經席於今累年陛下天縱生知聖徳按此下原本錯簡接寫裁減浮費云云今校正純茂對臣下日日如一未嘗少有差失此實上天眷祐皇家保育生民宗廟社稷無疆之福也恭惟太祖皇帝肇造區夏櫛風沐雨削平僭亂以立子孫萬世之基也傳之太宗至于真宗遂致太平仁宗年十三即大位章獻明肅太后安定邦家調護聖性是以四十三年之間徳澤深結於民天下至今思慕不忘英宗自藩邸入繼大統四海之内同心愛戴先帝勵精求治宵衣旰食躬勤萬事十有九年不幸早棄天下陛下年始十嵗登大位當此之時人心懍懍憂危萬端幸賴太皇太后保佑扶持勤濟艱難斥退凶邪登進忠良詔令所至百姓歡呼鼔舞數年以来中外晏然北敵西藩無不順從此皆太皇太后之徳也臣不知陛下將何以報之臣竊思陛下所以報之唯在進徳愛身而已陛下進徳則為太平髙世之主光顯祖宗之業發揚太母之訓使天下之人皆欣欣然曰祖宗之徳太皇太后之力如此則豈惟皇天祖宗饗祐陛下太皇太后亦不虛勤勞矣陛下愛身則無疾疢不貽太皇太后之憂孟武伯問孝孔子曰父母惟其疾之憂夫父母之憂莫切於子孫之有疾疢他日陛下有子當自知之陛下若不進徳不愛身雖極四海九州之養亦未足為孝也臣自今秋聞外人言陛下於後宫已有所近幸臣初聞之不以為信數月以来傳者益多或云已有懷娠將育者言之所起必有其端臣誠至愚不能不惑故敢先事懇切言之陛下内承慈訓外勤聖學方當祇畏以事天地誠孝以奉宗廟思六聖之勤勞念帝業之艱難四方之人無不延頸舉踵注目傾耳觀聼陛下徳業之光名譽之隆以望太平陛下可不慎哉今陛下未建中宫而先近幸左右好色伐性傷於太早有損聖徳無益聖體此臣之所甚憂也孔子曰君子有三戒少之時血氣未定戒之在色言人少時血氣未定而先傷伐根本則損壽考之福故君子戒之陛下今年十四嵗而生於十二月其實猶十三嵗此豈近女色之時乎陛下上承天地宗廟社稷之重守祖宗百三十年基業為億兆人父母豈可不愛惜聖體哉孟子曰事孰為大事親為大守孰為大守身為大守身所以事親也愛身所以愛天下也陛下上有太皇太后皇太后皇太妃休戚皆繫於陛下之一身豈可不愛惜聖體哉方今羣臣之心萬民之情正望朝廷如天聖以来所望陛下法則仁宗而已祖宗天下百三十年如寳器之無缺陛下行純徳備如羙玉之無瑕臣竊為陛下寳之惜之愛之重之陛下豈可不愛惜聖體哉臣聞仁宗未納后已前未甞近幸後宫是以氣體康實在位最乆臣今觀陛下氣怯恐不能如仁宗少時豈可不愛惜聖體哉前世人君多所經歴乃能周知天下之情今陛下生長深宫稼穡艱難未知也人之情偽未見也國家政事未習也六經聖人之言未盡讀也前史興亡之戒未盡閲也天下至大萬事至衆何所不關聖慮豈可不愛惜聖體哉古人有言後宫盛色則賢者隐處佞人用事則諍臣杜口陛下春秋鼎盛方當崇經術邇端士敦尚素樸屏去紛華不冝先留意女色使天下失望以啓小人之心何則陛下若好徳則賢人皆動其心欲助陛下之徳而圗天下治安故於陛下有益陛下如好色則小人皆動其心欲奉陛下之欲而圗一身富貴故於陛下有損賢人進則治小人進則亂人君所好不惟繫一身損益實係天下治亂不可不謹陛下於此二者將何擇焉昔漢成帝自為太子時以好色聞其後逸欲無節終為漢室昏亂之主漢之基業由成帝而壞豈可不慎其細哉唐太宗欲納鄭仁基女魏徴諫而止之憲宗時教坊稱密㫖選良家子納禁中李絳上疏諫乃悉還之文宗末李孝本女入宫魏謩諫即出之古之忠臣愛君必拂其邪心防其嗜欲置君於無過之地使天下莫得而非議之也人君所愛莫切於身人臣亦莫切於愛君之身臣濫備勸講以輔導聖徳為職懷此憂慮已二三年不能言於未然致陛下已有聲聽流聞於外此臣之罪也臣今若猶不言他日陛下或專意聲色委權臣下紀綱壞亂政事荒僻使天下以陛下為逸欲之主則臣之罪豈可勝責雖悔恨萬狀何所及哉伏望陛下察臣之言專精一意勉彊學問日新德業無時逸豫事親則思孝居處則思敬動作則思禮祭祀則思誠服用則思儉養民則思仁使人則思恕心則思道視則思正當食則思天下之饑當衣則思天下之寒陛下毎思及此而彊學不已則將以道徳為麗以仁義為羙豈聲色之可移哉惟陛下抑情制欲以愛養聖體為先則動植之類無不䝉福生靈幸甚祖禹集乞進徳愛身疏自云元祐四年十二月二十三日上又上疏太皇太后曰臣伏見陛下臨御天下于今五年昧爽視朝親斷萬事所以勞心竭力者凡皆為祖宗社稷億兆人民將以太平天下付之皇帝也臣愚竊謂陛下憂勤天下之事必先憂天下之本愛養天下之民必先愛一人之身夫一人之身天下之本也孟子曰天下之本在國國之本在家家之本在身天下安危繫於人君之一身身安則天下安天下治亂出於人君之一心心正則天下正欲治天下必先安身欲正天下必先正心此二者當今之急務乆逺之計慮也陛下内保佑聖躬調護起居外成就睿徳勉進學問前此未甞聞有纎毫之失今之所聞則異於前外議籍籍皆謂皇帝已近女色後宫將有就館者有識聞之無不寒心皇帝今年十四其實猶十三嵗千金之家有十三嵗之子猶不肯使近女色而况於萬乗之主乎陛下愛子孫而不留意於此非愛子孫之道也譬如美木方長正當封植培壅以待其蔽日凌雲若戕伐其根豈不害哉臣甞見司馬光言章獻明肅太后保護仁宗皇帝最為有法自即位以後未納皇后以前仁宗居處不離章獻卧内所以聖體充實在位最為長久章獻於仁宗此功最大臣考之國史仁宗乳褓章獻使章恵太后䕶視章獻臨朝仁宗起居飲食章恵必與之俱所以保佑扶持恩意勤備然則章惠保護仁宗乃章獻太后之意也今陛下臨朝日有萬幾至於左右䕶視皇帝臣不知有如章惠者乎若未能如章恵則陛下豈得不留意也陛下以朝事責宰相以邊事責將帥人君闕失羣臣邪正責諫官御史皇帝學問責講讀官若朝事不治宰相之罪也邊鄙不寜將帥之罪也人君闕失不知羣臣邪正不分諌官御史之罪也皇帝學問不進臣等之罪也至於皇帝起居之節嗜欲之際此最切身之事豈可無任其責者乎陛下博覽史冊洞知古今古之帝王何甞不以女色損壽考之福惟傷於太早敗於無節耳思之至此可為切骨之戒臣所以不避誅戮為陛下言之伏惟陛下與皇太后太妃詳論此事有損聖徳不益聖體宜戒飭保傳令一以章恵為法今聖心已有所知雖不能防於未形猶可以止其將然俟中宫既建然後漸廣繼嗣之路則陛下亦可以不勞聖慮矣今若不加止節女色争進數年之後敗徳亂政無所不有陛下雖欲悔之豈可及乎臣竊觀皇帝天資純粹有上聖之資年益長則宜徳益進方當嚮學以養聖功天下引領以望輝光之新傾耳以聼名譽之隆聰明之開發睿知之深逺皆繫於十五六之時不可失也陛下必欲皇帝氣體康强徳性成就以為宗社無疆之福莫切於今日矣不宜先以好色聞於天下失衆庶之望臣所以拳拳而不能已也惟陛下深思逺慮察臣狂瞽之言疏皆留中祖禹集上太皇太后疏乞保䕶皇帝聖體自注云十二月二十五日初劉安世呼牙媪為其兄嫂求乳母踰月無所得安世怒詰之姥曰非敢慢也累日在府司縁内東門要乳母十人今日方入了安世驚曰汝言益妄上未納后安有此媪具言内東門指揮令府司責軍令狀無漏洩安世猶未之信任府司者適安世故人亟以手簡問之答云非妄安世遂抗章論列他日吕大防等奏事已將退太皇太后留大防謂曰劉安世有文字言禁中求乳母事意則甚善但渠不知耳此非官家所要乃先帝一二小公主尚湏飲乳也官家常在老身榻前閤内寢處冝無此老身又甞究治果無之可説與安世令休入文字大防對曰諌官例不與宰相相見太皇太后曰然則當如何止安世文字勿令再入大防曰范祖禹見修實録臣每間日過實録院必見祖禹劉安世與祖禹同省臣當以聖㫖令祖禹告安世太皇太后因言祖禹亦有疏論列後宫進御事并令大防諭止及祖禹得大防所傳聖㫖即過安世具道之安世曰此事實繫聖徳汚隆安世以諫名官何敢緘默純夫方侍經幄上所親信又豈得不言祖禹曰固甞言之矣安世曰宰相所傳聖㫖盍具奏知萬有一為所紿悔其可追乎安世乃奏曰臣今月二十七日給事中范祖禹至本㕔密傳宰相大防聞徳音諭臣以所謂後宫事實未甞有者稽首承命感忭交集臣歴觀前世之主鮮有不以聲色為累至於近之太早御之無節則又不能保固真源增益壽考聖賢所戒可為寒心且世俗之間粗有百金之産者猶知愛其子孫以為嗣續之託而况國朝百三十年之太平六聖憂勤積累之基業陛下繼而有之可不自愛自重以為宗廟社稷無窮之計乎臣誤䝉聖恩擢置諫列使陛下日新之德未有以大著於四海而親近女寵之謗先播於衆口臣雖愚暗亦深憂之所以不避譴訶先事進戒若陛下實未甞為則臣之所言猶不廢諌官之職若陛下萬一有之則臣進説已是後時雖不敢逃曠官之誅顧亦何補於事惟冀陛下愛身進徳留意學問清心寡欲增厚福基臣不勝惓惓愛君之至祖禹奏曰臣自今月二十三日為吐㵼腹臟不安請假將理於二十七日叅假朝見至門下省見宰相吕大防諭臣二十四日面奉聖㫖兩諌議并臣所言後宫幸御無此事者臣自二十三日為病家居當日上皇帝疏至二十四日吕大防令實録院吏語臣如入省即過㕔相見臣以方病未能入至二十五日又上太皇太后疏縁臣二十五日以前未見大防不知已有聖㫖所以更入後来文字今日大防面諭乃知臣等所聞外議盡是虚傳陛下恕臣狂愚不賜誅責復䝉宣諭令臣具悉臣且喜且懼不能自勝實天下幸甚然臣所言皇帝進徳愛身所宜常以為戒太皇太后保䕶皇帝安身正心乆逺之慮亦願因而勿忘今外議雖虚亦足為先事之戒也臣竊惟皇帝有上聖之資方養徳嚮學涵育仁義臣侍經左右而聞於道路實懷私憂是以不存形跡不知忌諱發於誠心愛上不敢避妄言之罪凡事言於未然則誠為過慮及其已然則又無所及雖言無益陛下寜受未然之言勿使臣等有無及之悔因聞虚語以為實戒則四海生靈動植之類永被其福臣䝉寛宥罪戾無任恐懼喜幸之至伏縁聖㫖令大防諭臣合具奏知貼黄稱大防令臣諭與本省諫官臣退至門下後省已諭劉安世轉諭朱光庭訖其後章惇為宰相上語惇曰元祐初太皇太后遣宫嬪在朕左右者凡二十人皆年長一日覺十人者非素使令頃之十人至十人還復易十人去其去而還者皆色惨沮若嘗涕泣者朕甚駭不敢問後乃知因劉安世上疏太皇太后詰之惇與蔡卞謀誣元祐大臣嘗有廢立議指安世祖禹言為根二人遂得罪幾死劉安世范祖禹論後宫乳母事事最大而實録都不載舊録不書固也新録又因舊録止於祖禹傳畧見之誠不可觧今以安世盡言集祖禹家傳及吳幵慢堂隨筆增修附之十二月末安世未甞為講讀官劉景真記其父安世云職在經筵誤也景真謂安世為其兄嫂求乳母而吳幵云求從嫁婢當從景真又景真以府司録為章惇而吳幵以為曽鎮未知孰是今不復書其姓名吳幵又云安世既奏疏又入對面陳據安世集乞早補諫官疏云去年十月十二日與左司諫韓川於延和殿奏事後凡百餘日不得一至法座前此疏盖五年正月末間所上其論乳母乃十二月事然則一冬止十月十二日面對耳吳幵所云盖妄也祖禹稱朱光庭亦有疏論列而他書皆無所見當考今既刪取異論仍併録於後更湏考詳范仲熊作其父祖禹家傳具載此事云劉公盡言集有兩劄子前劄子無月日後劄子今月二十七日給事中范某至本㕔云云亦别無當時記録文字據劉公之子景真追記云元祐中先人任左諫議大夫因為兄嫂求乳媪有牙儈王其姓者出入頗乆令求訪踰月無所得遂呼前責之王謝曰已得一人方欲供呈間禁中要乳媪十人遂取以塞責先人大罵曰此益妄耳上猶未納后安用此王又曰前日内東門指揮仍於府司録䖏取軍令狀不得漏洩偶府司録是一故人章惇即飛數字詢之章亦不敢答簡只於紙尾批如所諭三字王媪之言既不妄遂因無故不御經筵抗疏論列其章留中一日宰相吕大防已下奏事訖將退太母宣諭相公且住近劉諫議有章疏論禁中求乳母事此人意則甚好但他不知耳非是官家要乃先帝有一二喫乳公主也相公可諭劉諫議休入文字丞相對云自来執政無例見諫官今呼劉安世來宣諭聖意愈更張皇太母云却如何止得此人文字丞相進云今范祖禹見修國史與劉安世乃前後㕔臣間日一入史院視藁臣亦不敢見劉安世當令祖禹傳宣聖意太母連云甚好先人一日在本㕔忽報范給事來先人循例請更衣獻茶小史云給事穿執又遣人以常例傳語范公云請諫議亦穿執先人遽朝服而出才相見盡屏左右仍閉角門子揖先公躬身聼宣先人驚懼俯伏云早來延和殿宰臣面奉太皇太后陛下聖㫖宣諭諫議所論禁中覔乳母事乃先帝一二小公主要更不湏入文字先人再拜謝恩訖與范公坐因曰安世官居諫列職在經筵外議沸騰考之有據此事實係聖德之汚隆不敢緘黙如給事以經術侍帷幄最為上所親信莫湏入一文字否范公云祖禹初不知當與諫議同入章也復云見説禁中甚畏公此疏再舉之事如何先人云亦湏道破給事已逹聖意萬一吕相詐傳中㫖將何取證范公以為然遂入後疏景真所記如此然先公十二月二十三日上皇帝疏二十五日上太母䟽盖元祐諸公論事各不相知先公尤謹宻不以語人景真止記劉公事耳至二十七日已有宣諭故先公第三章與劉公再奏同日上也景真所記不及諸公又云早来宰臣面奉聖㫖以此知景真不得其詳劉公謂先公莫湏入一文字以此知先公初未嘗告劉公也又陳左司權所記劉公之語劉公謂先公莫湏入一文字先公云亦曾有一文字此説恐近之吳幵慢堂隨筆云劉安世言元祐初為左諫議大夫因嫁女呼牙姥欲買從嫁婢累呼不至一日晚坐㕔事姥忽至安世責之姥云累日在府司為内東門要乳母早來方入了安世驚曰内中何故買乳母時曾鎮任府司録急冩數字問之鎮報云有之安世章䟽上言主上冲切早近女色非所以延壽命之福也太皇太后保佑不宜有此語甚切至一日入對復面陳之宣仁曰兒在老身榻前閤子中寢䖏當無是事又明日宣仁亦語宰相吕大防曰相公可留劉諫議来説與老身究治並無此事令放心更不湏入文字来大防奏云諫官例不與宰相相見給事中范祖禹與安出同省臣當傳陛下之㫖使祖禹告之祖禹過安世傳㫖坐獻茶安世曰純夫官侍從又在經筵此事莫也着理㑹否祖禹媿謝云亦上疏後紹聖中章惇蔡卞建言元祐大臣與宣仁有廢立議指安世祖禹言為根二人遂得罪幾死紹聖六年中書舍人任申先述其父伯雨言蔡卞䟽乃謂當時禁中為髙族雇乳母又云蹇序辰言章惇謂序辰曰哲宗紹聖初語惇云元祐初朕毎夜只在宣仁寢䖏前閤中寢處宫嬪在左右者凡二十人皆年長者一日覺十人非㝷常所用者移時又十人至十人還復易十人去其去而還者皆色惨沮若嘗涕泣者朕甚駭不敢問後乃知因劉安世等章疏宣仁詰之劉安世言行録云宣仁因安世上疏始窮詰其事乃知雇乳母者為劉氏也宣仁怒而撻之由是劉深怨望安世其後専寵孟后幽廢正位中闈是為昭懷皇后按他書未有即以此為昭懷者事當考言行録維揚馬大年所編次也御史中丞梁燾言臣愚嘗求當世之急務得導洛通汴之實始聞其説則可喜及考其事則可懼竊以廣武山之北即大河故道河常徃来其間夏秋漲溢每抵山下舊来洛水至此流入于河後欲導洛以趨汴渠乃乗河未漲就嫩灘之上起東西堤闢大河於北攘其地以引洛水中間缺為斗門名通舟楫其實導河水以助洛水之淺涸也洛水本清而今汴常黄流是洛不足以行汴而所以能行者附大河之餘波也增廣武三埽之備竭京西所有不足以為支費轉運司每干於朝廷朝廷不得不為之應副竊計自縁清汴之費其失無慮數百萬計從来上下習為欺罔之姦朝廷惑於安流之説税屋之利恬然不以為慮而殊不知新沙疎弱力不能制悍河水勢一薄則汜濫潰散將使怒流循洛而下直冒京師其患可勝言耶此其大可懼者是甘以數百萬日增之費養異時京師萬一之患亦已誤矣夫嵗傾重費以坐待其患何若折其奔衝以終除其害哉為今之計宜復為汴口依舊引大河一支啓閉以時還祖宗百年以来潤國養民之賜誠為得䇿汴口復成則免廣武潰注以長為京師之安省數百萬之費以紓京西生靈之困牽大河水勢以觧河北決溢之災便東南漕運以蠲重載留滯之弊時節啟閉以除蹙淩之苦通江淮八路商賈大舶以供京師之饒為甚大之利者六此不可忽也惟拆去兩岸舍屋盡廢僦錢為害者一而甚小所謂損小費以成大利也臣之所言特其大略耳至於考究本末措置纎悉在朝廷擇通習前後之臣付之無牽浮議責其成功伏望聖慈面詔大臣商擇而施行之事繫國體願留宸念貼黄京岸舍屋最多以其背隔街面居民不便於經紀往往不肯住賃即今十空五六京城之外下至泗州盖造漸少每至一州縣或店鎮方有亦不至多若行拆去雖是目下廢却所僦房錢却向去商賈通行有所納税錢可以增補方商旅未行之時或至數少乆之大船重載入汴所得數倍之益竊聞今年指揮閉口因此便可施行一面選委文武官一兩員熟舊日汴口利害者相度来春撥口約度分數放水則雖未開展河道存留即今兩岸舍屋恐未至妨事亦乞委之相度洛口雖云經冬行運其實水淺易凍又置打凌兵士虚費錢糧終是饑凍逐年死亾極多每至凍合凌蹙岸决民田被害又流既淺船小載輕其害非一公私阻滯今遇開黄河閘口放水入清洛即舟船方行得一畨閘水已盡船復留滯此可見洛水淺澁無濟於行船也自興導洛司比舊汴口增使臣不少添埽兵甚多調發急夫頻併結買梢草浩瀚人力困弊又其害之甚者燾又言臣近論奏汴洛利害乞復為汴口誠以廣武堤埽不足兼恃大河萬一不禦則首為京師之憂訪聞開汴之時大河曠嵗不决盖汴口析其三分之水河流常行七分也自導洛而後頻年屢决雖洛口竊取其水率不過一分上下是河流常九分也猶幸流勢卧北故潰溢北出自去嵗以来稍稍卧南此甚可憂而洛口之作理湏早計也竊以開洛之役其功甚小不比大河之上但闢一百餘歩即可以通水三分不但永為京師之福又减河北屢决之害兼水勢既已牽動在於囬河尤為順便議者以為不獨孫村之功可成水勢既順澶州故道亦有自然可復之理伏望睿慈斷以不疑出臣前章面詔大臣與本監及知水事者按地形髙下水勢利害先具圗説庶知臣言不妄紹聖三年正月十七日李仲送吏部仲甞建議先復置汴口廢清汴故也仲云自置汴口到今十餘年按清汴始於元豐二年三月二十一日成於六月十七日自元豐二年至元祐三年凡十年仲云十餘年則當是四年也梁燾乞依舊開汴口不知是何時燾云竊聞今年指揮閉口因此便可施行又云牽動水勢於囬河尤為順便紹聖二年正月十三日宋用臣云自元祐二年毎冬深輙閉汴口按二年冬燾不在諫院三年冬亦不在諫院四年二月乃復為左諫議十月改中丞燾乞依舊開汴口當是四年冬為中丞時也燾又云去歳以来水勢卧南若開汴口既可牽動水勢於孫村修河尤為順便修孫村河四年正月罷之八月復置修河司然則燾云云必在四年冬今附年末更徐考之紹聖元年十二月二十七日蔡京言自元豐二年至元祐元年八年之間不曾閉汴口然則閉口必在二年冬也更詳考之玉牒元祐五年十月癸巳導河水入汴玉牒有此他書并無曾布嘗云元祐欲廢清汴下河陽相度布時知河陽賴以不廢布自太原謫河陽在五年正月二十四日自河陽改青州在十二月二日是歳宗室子賜名授官者五十一人斷大辟五千四百五人
