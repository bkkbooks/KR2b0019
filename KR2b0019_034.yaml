body:
  text: 續資治通鑑長編卷三十宋李燾撰太宗端拱二年春正月癸巳詔文武羣臣各陳備邉禦戎之䇿右正言直史館河南溫仲舒章獨先上上悅乙未賜仲舒金紫户部即中張洎奏議曰洎傳及經武聖略皆云端拱初按洎集議邊狀云奉十一日御札令羣臣奏章按實録端拱元年無其事此年癸巳乃有此詔癸巳正月十一日也詔語又與洎集所載御札略同然則洎此奏必在此年此月不在端拱初矣伏自北戎犯順纍載於兹其故何哉蓋中國失地利分兵力將從中御士不用命也北戎為患中國自古而然夏商以還桀暴滋甚備禦之術簡册具存或度塞以鏖兵或和親而結好或誘部落以分其勢或要盟誓以固其心謀議紛紜咸非得䇿舉其要略唯練兵聚穀分屯塞下來則備禦去則勿追是矣夫中國所恃者險阻而已朔塞而南地形重阻深山大谷連亘萬里蓋天地所以限華戎而絶內外也雖冒頓之盛稱雄代北控弦百萬與大漢爭鋒擁衆南侵俄及白登而止自時厥後逮至隋唐丐奴恃強或犯關塞終未有窺兵中夏徑越邉防嘯聚師旅長驅河洛者慮漢兵守其險而絶其後也昔李牧破滅獫狁收功雲中王恢誘致單于伏兵馬邑即其事也然猶百代而下侵掠不已邊鄙罕及瓜之戍中原多旰食之虞天下騷然屢至空竭國家比於前代力又倍焉何則自飛狐以東重關復嶺塞垣巨險皆為契丹所有燕薊以南平壤千里無名山大川之阻蕃漢共之此所以失地利而困中國也國家制禦之道不可以常理在乎審察利害舉萬全之略今河朔郡縣列壁相望朝廷不以城邑小大咸浚湟築壘分師而守焉及乎賊衆南馳長驅深入咸嬰城自固莫敢出戰是漢家郡縣據堅壁囚天兵待敵冦之至也所以邉境敵人莞然自得出入燕趙若踐無人之境及其因利乘便攻取城壁國家常以一邑之衆當敵人一國之師既衆寡不侔亦敗亡相繼其故無他蓋分兵之過也昔劉備廣緣江之柵魏帝料其必亡吳漢分副將之營光武知其必敗髙帝會三王之戰則擒滅霸楚樂毅總四國之衆則蕩定全齊兵聚則功成兵分則禍集蓋自然之勢也善敗之道其理昭然臣今伏請悉聚河朔之兵於緣邉建三巨鎮各統十萬之衆鼎據而守焉仍環舊城廣創新塞俾士馬擊戎逐寇便於出入然後列𤇺火謹晨夕之候選精騎為報探之兵千里之遙若視掌內彼之動靜我必先知仍命親王出臨魏府控河朔之要為前軍後屏自餘郡縣則選在城丁壯授以戈甲俾官軍統攝而城守焉制敵之方形勢斯驗三鎮分峙隱若長城大軍雲屯虎視燕趙臣知契丹雖有精兵利甲終不敢越三十萬之衆南侵貝冀矣兹所謂兵勢地利我實得焉臣詳覽前聞足見明驗昔漢景益梁王之邑則吳越七國之叛不敢越睢陽而內攻唐室濟邠寧之師則吐蕃百萬之衆不敢自涇原而入冦咸以聚兵戎壘折衝大敵脫或契丹尚尋往轍復入近疆則堅壁當其前大軍躡其後從容掩擊舉必成功臣以為制敵之方盡於兹矣天鑒無惑在斷而行焉夫命將統戎前王所謹國家士馬非不精壯也甲兵非不堅利也以順攻逆以中夏攻外戎而聖慮尚勞王師未振者臣甚痛焉軍志曰凡臨敵法令不明賞罰不信聞鼓不進聞金不止雖有百萬之師何益於用又曰將從中御兵無選鋒者必敗臣頃聞涿州之戰元戎不知將校之能否將校不知三軍之勇怯各不相管轄以謙謹自任未聞賞一效用戮一叛命者軍志曰弩不及遠與短兵同射不能中與無矢同中不能入與無鏃同臣頃聞涿州之戰敵人未至萬弩齊張賊騎既還箭積如山乃知戈戟刀劍其用皆然是驅天兵奮空弮而對勍敵也軍志曰三軍耳目在吾旗鼓臣頃聞涿州之戰陳場既布或取索兵仗或遷移部隊萬口傳呌囂聲沸騰乃至轍亂塵驚莫知攸往昔湯武戡定天下桓文攘却四夷項羽之滅強秦闔閭之摧徑楚隋楊素削平禍亂悉以兵鋒而定戎業臣頃聞涿州之戰王師霧集聲讋強冦然而矢石未交竒正先亂嗚呼軍政如此孰救敗亡尚賴天威逺臨全師以濟陛下懲覆車於既往收大功於將來若不揭重賞以圖其勞示嚴刑以齊其衆置三軍於死地然後為用則不能集大勳而摧徑冦矣軍志曰凡出師臨陳一夫不用命則斬一夫一校不用命則斬一校一隊不用命則斬一隊故穰苴戮莊賈立蕩寇之勳魏絳戮楊干顯臨戎之效諸葛亮誅馬謖定庸蜀之土李光弼斬崔衆擁燕薊之師咸以能舉嚴刑方成大略臣請陛下申命元帥自禆將以降有違犯命令者並以軍法從事其殺敵將校所得鞍馬財貨等悉以與之仍優加錫賚嚴刑以制其命重賞以誘其心示金鼓進退之宜謹三令五申之號將不中御衆知嚮方而不能震大宋之天聲制單于之醜類者未之有也兵不以衆勝以理勝惟陛下裁之又沿邉郡縣久被冦戎蠢爾黎元陷兹鋒鏑膏血塗於原野老弱填於溝壑生人之苦莫甚於斯然而接界耕民常時向背昔髙帝北討陳豨猶以列侯印綬慰趙子弟之心向來國家雖有安撫未能曠蕩臣聞吳楚遐壤其大郡有至十萬户者臣竊料兵戰所歷之地凋殘戶口未必能過此數臣欲乞陛下悉與放免秋夏兩稅候事寧之日方仍舊貫朝廷所失租賦未及毫芒且以沮敵人誘掖之謀慰氓庶綏懷之望時方用武民不離心轉危就安且留聖念前史有言曰聖人以天下為度者不以私怒而傷公義焉今邉冦內侵兵連禍結以權濟用蓋有前聞請陛下稍抑至尊舉通和之䇿然今內外羣議尚或否臧臣以為契丹違順兩途咸社稷之利也夫時極則轉物盛而衰其或醜類懷仁上天悔禍寢邊庭之攘敓奉大國之歡盟結好息民以寧宇縣固邦家之望也脫若戎人無厭貪殘是務肆長蛇之毒而不已屈大邦之命而不從曲實在戎我又何咎臣請以天下利害形勢始終而言之昔晉德不綱幽都淪沒陛下應期受命念切遺氓爰舞舜干期恢禹服順天致討豈陛下之佳兵乎及將帥非才干戈暫頓惜兆人之性命霽大國之威稜申命虎臣謹固王略訓農偃革期洽和平而丐奴陸梁侵犯滋甚天下黎獻皆知感詠聖造始結怨於犬戎矣今又大君降志通好穹廬憬彼龍荒復拒天命臣知天下閨闈婦女亦當為陛下荷戈執戟效死於戰場矣况六軍之人哉怒衆執仇實在兹舉伏望陛下內總羣䇿外委元戎易舊謀新盡禦戎之要則河朔之地漸可圖安然而黠敵未誅幽薊未復中國終不得髙枕而寢矣伏願陛下思安危之大計念攻守之良謀內修政經外勤戎略罷天下不急之務停土木之功減官吏之冗員省錫賚之優澤收聚財貨訓練師徒然後親御六戎俟時大舉飲馬於長城之窟勒兵於單于之臺焚老上之龍庭血烏桓之罽幕暫勞永逸殱厥渠魁則天下可得而定矣倘或爭鋒燕薊之郊委衆凡庸之手徒淹嵗月莫計否臧臣恐上帝不降靈中原不解甲方從兹始善敗之道揭諸日月惟明王擇焉右拾遺直史館王禹稱奏議曰伏以中國之病胸奴其來久矣臣今獨引漢文帝時事以為警戒望留意垂覽則天下幸甚且漢十四帝言聖明者文景也言昏亂者哀平也然而文景之世軍臣單于最為強盛肆行侵掠候騎至雍火照甘泉哀平之時呼韓邪單于每嵗來朝委質稱臣邊𤇺罷警此豈係於歷數而不由於道德耶臣以為不然矣且漢文當軍臣強盛之時而外能任人內能修德使不為深患者是由乎德也哀平當呼韓衰弱之際雖外無良將內無賢臣而使之來朝者是繫於時也今國家之廣大不下漢朝陛下之聖明豈讓文帝敵人之強盛未及軍臣單于時至如撓亂邊土觸犯天威豈有候騎至雍而火照甘泉之患乎在外任其人而內修其德矣以臣計之外任其人內修其德之道各有五焉外有五者一曰兵勢患在不合將臣患在無權陛下固未能專委一人則請於緣邊要害之地為三軍以備之若有唐受降城之類如國家有兵三十萬則每軍十萬人使互相救援責以成功立功者行賞無功者明誅敵人不能南下矣二曰偵邏邊事罷用小臣用之則邊情有所隱而不盡知也伏見往來邊上多是闒茸小臣雖有愛君之名而無愛君之實邊疆塗炭而不盡奏邊民哀苦而不盡言誠能用老成大僚往來宣撫賜以溫顔使盡情無隱則邊事濟矣三曰行間諜以離之因衆隙以取之臣風聞犬戎中婦人任政荒淫不法謂宜委邊上重臣募邊民諳練蕃情者間諜蕃中酋長啖以厚利推以深恩蕃人好利而無義待其離心因可取也四曰以外夷伐外夷中國之利也今國家西有趙保忠折御卿為國心腹亦宜勑此二帥率麟府銀夏綏五州張其犄角聲言直取勝州則敵人懼而北保矣此實不用但張其勢而已五曰下哀痛之詔以感激邊民頃嵗弔伐燕薊蓋以本是漢疆晉朝以來方入北境既四海一統誠宜取之而邊民蚩蚩不知聖意皆謂貪其土地致北敵南牧陛下宜下哀痛之詔告諭邊民則三尺童子皆奮臂而擊胡突然得蕃人一級者賜之帛得北地一馬者還其價得酋帥者與之散官如此則人百其勇而士一其心也內有五者一曰併省官吏惜經費也昔唐虞建官惟百夏商官倍亦克用乂周設六官僚屬漸廣秦併六國郡縣食祿者日增用力者日耗降及漢魏以至隋唐員數有加職名無損清介者止於奉科貪濁者又恣侵漁是以約人署官斯為中矣今百官三班中若備言冗食恐有煩聼覽只如臣舊知蘇州長洲縣七千餘家自錢氏納土以來朝廷命官七年無縣尉使主簿兼領之未嘗闕事三年增置縣尉未嘗立一功以臣計之天下大率如是臣請黜陟庶僚併省羣吏賢者得以陳力不肖者得以歸耕誠能省去三千員減俸數十萬以供邊備寬民賦亦平戎之大計也二曰艱難選舉抑儒臣而激武臣也自陛下統御力崇儒術親主文闈志在得人未嘗求備大則數年便居富貴小則數月亟預官常或一行可觀一言可采寵錫之數動逾千萬不獨破十家之産抑亦起三軍之心臣亦其人固自言耳但恐授甲之士有使鶴之言望減儒冠之賜以均戰士之恩三曰信用大臣參決機務蓋分閫外之事者在乎將帥用堂上之兵者在乎相臣宜資帷幄之謀以決安危之䇿方今君臣親愛宰執賢明振古以來未之及此然而限以常禮隔以朝儀情恐未通言恐不盡臣每見千官就列萬乘臨軒中書樞密三司歷陛而進禮成而退望陛下坐朝之暇聼政之餘頻召大臣共議邊事定而後行無容小臣間厠其議四曰不貴虗名戒無益也且聖人無名神人無功迹用不彰品物自化道德既喪功名始生五帝猶能不伐三代多或自矜討蠻夷則重困生靈得土地則空標史䇿禍敗之本何莫由斯今萬國駿奔四民康樂惟兹北境未服中原以臣思之恐宗廟之靈天地之意慮陛下驕於大寶怠於萬幾用廣聖謨以為警戒誠宜作備邊之計示憂民之心不必輕用雄師深入醜敵竭蒼生之衆力務青史之虗名如此則天道順人心悅年嵗之間可緩圖也五曰禁止遊惰厚民力也夫牧民者君也聚人者財也産財用者土地也闢土地者人民也人民衆則土地闢財用足則國家安今雖務農桑尚多浮薄耕織者鮮衣食者衆如飛芻挽粟之勞妨鑿井耕田之力若無條禁曷禦凶荒臣請訪問有司則輸稅之家可見矣食祿之人可知矣軍人受食者可數矣僧道蠧人者可明矣復有臺寺小吏府監雜工總其數而計之聚其人而校之臣恐以三分勤耕苦織之人贍七分坐待衣食之輩欲求民泰不亦難乎今郡縣雖多要荒且逺除河北備邉之外民力可用者惟東至登萊西盡秦鳯南抵淮泗而已此數十州者中土之根本不可不惜也望陛下少度僧尼少崇寺觀勸風俗務田農則人力強而邊用實也若軍運勞於外遊惰耗於內人力日削邊用日多不幸有水旱之災則冦不在外而在乎內也惟陛下熟計之上覽奏深嘉歎賞宰相趙普尤器之禹稱疏亦因癸巳詔書乃上本傳云在端拱初誤矣疏稱折御卿趙保忠五月始除夏州節度不應遽言之知制誥田錫奏疏曰今之御戎無先於選將帥既得將帥請委任責成不必降以陳圖不須授之方略自然因機設變觀釁制宜無不成功無不破敵矣昔漢時西羌犯塞趙充國年七十矣上使丙吉問曰誰可為將充國對曰無踰老臣以是言之則令宰臣以下各舉堪為將帥者宿舊武臣素有聞望者亦令自舉然後陛下詳擇而用之趙充國老將尚云百聞不如一見况今委任將帥而每事欲從中降詔授以方略或賜以陳圖依從則有未合宜專斷則是違上旨以此制勝未見其長伏乞速命宰臣各舉良將及令素有聞望宿舊武臣自舉其能及舉所知者又將帥行恩信恤士卒必豐財貨方得士心昔趙奢為將得賞賜盡與軍吏李牧為將軍市之租皆用享士卒今將帥能效奢牧者幾何人哉若以年年供億挽運師老費財曷若厚給將帥使之賞用也近代侯伯各有廳直三五十人習騎射為腹心每出入敵陳得以隨身後來不敢養置昨楊業陷陳訪聞亦是無自己腹心以致為敵人所獲今雖時異事殊然廢置利害亦宜詢訪行之又可於沿邊諸郡擇有勇智者命為刺史委之自用方略警急利便事訖方奏使人人各盡其才術此必為陛下各立殊勳控制侵侮如後漢郭攸張堪之守漁陽也臣未知朝廷府庫錢帛之大數亦不知國家支費用度之衆寡若陛下省罷塔廟之費廽充軍旅之賞給則孰不革其怨心孰不致其死力臣又聞前年出師向北命曹彬以下欲取幽州是侯利用賀令圖之輩熒惑聖聰陳謀畫䇿而宰臣昉等不知又去年招置義軍劄配軍分宰相普等亦不知之豈有議邊陲發師旅而宰相不與聞若宰相非才何不罷免宰相可任何不詢謀今宰相普三入中書再出藩鎮重望碩德元老大臣人所具瞻事無不歷乞陛下以軍旅之事機密之謀悉與籌量盡其規畫此乃國家大體君父至公臣聞偏信生姦獨任成亂侯利用賀令圖等既悮陛下機宜於前無令似侯利用賀令圖者復悮陛下機宜於後伏乞陛下一一與宰相謀議事事與宰相商量悔自前獨斷之明行今後公共之理則事無不允當下無不盡忠矣又宜辨邊上奏報之虗實察左右蒙蔽之有無奏失利則未必盡言報大捷則不足深信陛下本當信而先信陛下本欲知而未知如此何以利安危如此何以䇿成敗安危成敗之理乞陛下詳而察之兵書曰事莫密於間賞莫重於間北境自有諸國未審陛下曾探得凡有幾國否幾國與丐奴為讎若悉知之可以用重賞行間諜間諜若行則戎人自亂戎人自亂則邊鄙自寧昔李靖用間破突厥心腹之人自離二募能往絶域刺名王亂蕃部使交相侵害如漢之陳湯傅介子之流則不勞師徒自然歸化此可以緩陛下憂邊之心也凡徵發兵士或儲備糧草亦宜慎靜勿使喧煩臣竊聞去年於户稅上折科馬草及官中和買當買納未足之間即有使臣催督貧下户婦女有行校科者又聞汴河乾淺若分南河水添注汴河以通漕運國家計度何在而臨時一至於此臣即不知國家現在軍儲支得幾年若是無九年之糧實為無備若是無三年之糧實為窘急若不窘急則何以科校婦女而納草添注河水而漕運也昔吳起為將為士卒吮癰霍去病為將漢帝欲為治第去病曰丐奴未滅何以家為未喻陛下以今之將帥有如吳起霍去病否若以臣見即將帥必無其人何以知之將帥肯與士卒吮癰乎若賜第宅肯不要乎將帥非才即無威名何以使丐奴望風而懼然以臣所見小小公事不勞陛下一一用心若以社稷之大計為子孫之逺圖則在乎舉大略求將相務帝王之大體也設如人欲理身先理心心無邪則身自正欲理外先理內內既理則外自安臣謂邊上動由朝廷動之邊上靜由朝廷靜之任賢相於內則百職舉而紀綱正委良將於外則四夷靜而邊鄙安臣之愚衷備於此矣已然之患既陛下遍訪直言未然之虞乞陛下常切留意改軍頭司為御前忠佐軍頭司引見司為御前忠佐引見司軍頭司三朝志附殿前侍衛司後蓋因會要也兩朝志移附皇城司後御藥院前兩朝志為允二月以國子監為國子學三月先是翰林學士知貢舉蘇易簡等固請御試壬寅上御崇政殿試合格舉人得進士閬中陳堯叟晉江曾會等一百八十六人並賜及第諸科博平孫奭等四百五十人亦賜及第七十三人同出身賜宴始令兩制三館文臣皆預賜堯叟等針一首勉以修身謹行稽古效官之意堯叟及會並授光祿寺丞直史館第三人以下分授職事州縣官越州進士劉少逸者年十三中選既覆試又别賜御題賦詩數章皆有趣授校書郎令於三館讀書時中書令史守當官陳貽慶舉周易學究及第既而上知之令追奪所授敕牒釋其罪勒歸本局夏四月國子博士李覺上言曰昔李悝有言曰糴甚貴傷民甚賤傷農民傷則離散農傷則國貧故甚貴甚賤其傷一也善為國者使民無傷而農益勸所謂民者謂士工商也朝錯亦云欲民務農在於貴粟蓋不可使至賤亦不可使至貴今王者之都萬衆所聚導河渠達淮海貫江湖嵗運五百萬斛以資國費此朝廷之盛臣庶之福也近嵗以來都下粟麥至賤倉庫充牣露積紅腐陳陳相因或以充賞給斗直十錢此工賈之利而軍農之不利也夫軍士妻子不過數口而月給糧數斛即其費有餘矣百萬之衆所餘既多遊手之民資以給食農夫之粟何所求售况夫西抵三峽南極荆湖􅊶舉江吳旁達浙右歷風濤之險踰嵗月之期始達建安軍歷楚泗泝汴流已達於京師其沒溺耗損亦已多矣凡運米一斛計其費不啻三百錢侵耗損折復在其外而挽船之夫彌涉冬夏離去鄉舍終老江湖亦可傷矣夫其糧之來也至重至艱官之給也至輕至易嵗之豐儉不可預期儻不幸有水旱之虞卒然有邊境之患其何以救之古者有九年之蓄謂之太平水旱人無菜色蓋謂天下之民皆有九年之蓄非専謂兵食也諸軍傔人舊日給米二升今若月給賦錢三百人心樂焉是一斗為錢五十計江淮運米上腳亦不減此數望明敕軍中各從其便願受錢者若市價官米斗為錢二十即增給十錢裁足以當上腳之直而官私獲利數月之內米價必增農民受賜矣若米價騰踊即官復給糧軍人糶其所餘亦獲善價此又戎士受賜矣不十年官有餘糧江外之運亦漸可省也上覽奏嘉之自三月不雨至於五月戊戍上親録京城諸司繫獄因多所原減即命起居舍人須城宋惟幹等四十二人分詣諸道按決刑獄是夕大雨上因謂近臣曰為君當如此勤政即能感召和氣如後唐莊宗不恤國事惟務畋逰動經旬浹大傷苗稼及還乃降敕蠲放租賦此甚不君也樞密副使張宏奏曰莊宗不獨如此尤惑於音樂縱酒自恣樂籍之中獲典郡者數人上曰凡人君節儉為宗仁恕為念朕在南府時於音律粗亦經心今非朝會未嘗張樂晨夕下藥常以鹽湯代酒常服浣濯之衣而鷹犬之娛素所不好且多親飛走真誥所不許朕常以為戒也上嘗謂直史館勾中正曰卿深於字學凡有聲無文者幾何中正退條為一卷以上上曰朕亦得二十餘字可并録之因命中正與史館編修吳鉉等撰定雍熙廣韻六月丁丑廣韻成凡一百卷詔書嘉奬焉初左正言直史館下邽冦凖承詔極言北邊利害上器之謂宰相曰朕欲擢用凖當授何官宰相請用為開封府推官上曰此官豈所以待凖者耶宰相請用為樞密直學士上沉思良久曰且使為此官可也秋七月己卯拜虞部郎中樞密直學士凖嘗知巴東成安二縣其為治一以恩信每會賦役未嘗出符移惟具鄉里姓名揭縣門而百姓爭赴之無稽違者先是詔諸王府僚各獻所著文上閲視纍日問近臣曰其才則見矣其行孰優或以越王府記室參軍虞部員外即畢士安對上曰正合朕意遂命以本官知制誥越王元份請對願留府邸不許先是宰相趙普奏疏言臣久縈疾苦近者始獲朝參竊疑大限非遙深恩未報事當關聼敢不盡誠國家山河至廣郡縣尤多寰中之文軌雖同塞上之干戈未息防微慮逺必資通變之材定難扶危宜退諂諛之輩此時機務須藉正人去年冦敵侵邊生靈受弊萬乘軫焦勞之慮千官無翊贊之功最是微臣偏懷愧恥即日同僚共事無非謹畏清亷惟於獻替之時並執謙恭之禮稍有緘默寧濟急須宜求抱義之人必有分憂之士臣竊見工部侍郎張齊賢數年前特受聖知升於密地公私識者盡謂當才不期嵗月未多出為外任臣在鄧州日雖聞消息未測緣由向來微有傳聞或云奏對過當凡言大事須有尤悔其如義士忠臣不顧身之利害姦邪正直久逺方知齊賢素藴機謀兼全德義從來差遣未盡器能慮淹經國之才堪副濟時之用如當重委必立殊功臣此疏特乞留中所貴全繫君恩免貽衆怒復以劄子言齊賢德義素為鄉里所推而又深知福業謹擇交遊中外卿士舉無出其右者伏念臣全族叨榮半身入土未諧報答常恐參差慙無致主之能但有薦賢之志觀兹方正方敢舉明若朝廷委任忠良真社稷增添柱石朝行夕死是所甘心亦聊遂微臣報德酬恩萬分之一也甲申以齊賢為刑部侍郎樞密副使齊賢復入樞府趙普力薦之也而國史略焉今據普奏藳增入普奏當是年五月而闕其日因齊賢拜官乃追記之按魏泰束軒記稱太祖蓋嘗語太宗以齊賢可任輔相矣觀普此疏則齊賢在樞府前實坐言事忤旨故出帥非普力薦豈終不召耶然則泰所記未必得實也當考戊子有彗出東井積水西青白色光芒漸長晨見東北旬日夕見西北歷右攝提凡三十日至亢沒上避正殿減常膳謂宰相曰長星示變蓋天所以警人君之失固宜恐懼修省晉孝武反舉酒勸之如此狂惑不亡何待今豈非時政有闕物情壅遏乎百姓何罪責在朕躬敢不兢畏貶損以答天譴威虜軍糧餽不繼契丹欲窺取之詔定州路都部署李繼隆發鎮定大軍護送輜重凡數千乘敵將裕恱諜知之率精鋭數萬騎來逆崇儀使北面緣邊都巡檢尹繼倫率領步騎千餘人按行塞上正當敵所入道敵不擊而過徑襲大軍繼倫謂麾下曰敵視我猶魚肉耳南出而捷乘勝驅我輩北去不捷亦泄怒於我我無遺類矣今捲甲銜枚襲其後敵鋭氣前去心輕我不虞我之至萬一有所成縱死猶不失忠義豈能為胡地鬼乎衆皆憤激從命繼倫因令軍中秣馬會夜遣人持短兵潛發躡敵後行數十里至唐河徐河之間天未明敵去大軍四五里繼隆列陳於城北以待之敵方會食既食則將進戰繼倫出其不意急擊之殺敵將一人號皮室皮室者敵相也衆遂驚亂裕恱食未竟棄匕箸為短兵中其臂創甚乘善馬先遁敵望見大軍遂奔潰自相蹂踐死者無數繼倫與鎮州副都部署范廷召追奔過徐州十餘里俘獲甚衆定州副都部署孔守正又與敵戰曹河之斜村梟其帥達延相公等三十餘級敵自是不敢大入冦以繼倫面黑相戒曰當避黑面大王丁未授繼倫洛苑使領長州刺史巡檢如故范廷召孔守正事皆自本傳剟出附見恐曹河之捷復在異時更當細考初命繼隆等發兵護送威虜軍饋餉户部即中張洎復奏封事曰古者築邊城聚兵衆蓋所以控要害之地制外戎之侵故周城朔方漢取河湟唐築受降臨淄等城即其事也隔閾夷夏終古賴焉今聞威虜軍等置在平川地非險阻帶甲之士不滿萬人議者謂國家比創此軍以捍蔽定州此軍若廢則犬戎立至城下臣以為議者不究事實蓋謀慮之過焉今請以敵勢言之若犬戎舉十萬之衆長驅深入量留數千騎營於威虜等軍城隍之側則威虜等軍閉壘不暇豈能出城野戰哉賊略地則既無邀截之期賊攻城則自有敗亡之禍而望藩屏鎮定不亦難乎是知威虜等軍廢之非有利於犬戎置之又無益於邦國曩者丐奴乘隙牧馬於德州去嵗丐奴犯邊頓兵於深趙威虜等軍嬰城自固僅同閉邑徒分兵勢何益邊防且契丹騎兵利於馳逐欲致敵於野戰此禱祠而望也王師堅壁固壘持重以待之既沮其謀此所以未得志於中夏也今聞兵窺近塞阻絶糧道而王師遽為之出是犬戎致敵之謀行矣夫兵者勢也勢之所向利害形焉若諸軍合謀乘機電發援旗鳴鼓決戰中原則殺敵摧鋒士知用命矣今聞三鎮之衆冒炎酷陟郊坰荷戈而趍者裹送餱糧而已既充防護軍儲之役則本無鬭心以援送怠惰之師當戎人狡揚之騎且行且戰必貽敗衄一軍小却衆或隨之則威虜等軍望風而自下矣且威虜等軍朝廷既發大軍與之饋運假使所送兵食得達本城然則嵗月之間餱糧必竭犬戎既未退運路亦未通國家不可復起三鎮之師與之裹送也况威虜等軍所守城邑逼近邊隅犬戎來侵既不背城出戰犬戎入冦又不能謹守封陲但虗聚甲兵費耗廩食而已古者邊城受戰煙塵警急或益甲卒以增其衆或運餱糧以資其食者蓋敵人逺涉吾境雖有十倍之衆終不能曠日持久與我爭鋒兹所以添給戎資以待其遁也今威虜等軍與蕃界連接部族之衆朝夕往來朝廷豈能以月繫時調兵備食也安危事勢昭然可觀儻尚因循必成陷殁夫臨機制變轉危就安天與其時間不容息若此際運糧之衆得達本城其威虜等軍宜因此時乘大軍之勢保全士旅拔壘而旋如是則三鎮之衆出既有名威虜等軍免覆亡之禍矣今犬戎逆命河朔未寧國家控禦之方宜舉其要臣以為凡在邊境軍壘其甲卒不滿三萬人以上者宜從廢罷既省朝廷供給又免外戎吞侵以所管之師外𨽻緣邊大鎮緣邊大鎮甲兵既聚士馬自強以守則無易州傾陷之危以戰則有蕃漢力均之勢與夫分兵邊邑坐薪待燈豈可同年而語也朝廷儻能如此制置向去契丹或昧於機變尚務攻侵則相魏堅壁當其前諸鎮連衡壓其後野無所俘掠資儲易匱乏我軍既聚形勢用張契丹雖恃凶殘臣以為終未能果為中國患也八月辛亥趙普上疏言陛下昨為妖星謫見深自引咎臣與同列親奉御批劄子兢惶戰懼各不勝任其間老臣最負深遇謬列三台之長慚無一日之長自知政術踈遺寧免妖星謫見撓至尊之懷抱皆臣下之作為都緣蒙蔽聰明隱藏疾苦被虐者無由披訴偷安者不敢指陳雖衆議以明知奈皇情而莫測隱蔽之咎惟臣最多甘俟嚴誅仰期深罰今則人心頗鬱上象仍差起狂夫生亂之謀生敵衆犯邊之計天時人事不比尋常惟有今年倍須保護伏審陛下初知妖異親諭德音便欲遍與覃恩優加賞賜發此一言之善須增百福之祥全由惠物之心必有變災之望才經旬朔似有改移切聞司天臺內妄陳邪佞之言深惑聖明之聼猥云妖異合滅契丹臣竊慮俱是諂諛未明真偽今乞問司天臺內所有前件奏陳未委按何經典件具分析親賜看詳真偽之情灼然易見臣聞五星二十八宿至於五嶽四瀆皆居中國不在四夷尚書云萬方有罪罪在朕躬豈謂契丹封疆不在萬方之數臣今老邁豈解隂陽惟將正理參詳復以前書徵驗三墳五典必可依憑今録到左傳漢晉梁唐五事件具進呈冀將師古之文聊正順情之説伏望恭承天戒大慰物情明施曠蕩之恩更保延長之祚蓋緣凡關世事否泰相隨倚伏盈虗豈能常定聖朝開國已三十年國富兵強近古無比物禁太盛前聖不欲恣情今則垂象頻差兆民未泰戰爭勞役寧有了期雖哲后修仁本意固無虧缺而羣生造業隨緣應有感招竊聞陛下目覩星文深勞帝念轉積動天之德思覃及物之恩則知多難興王但傳聞於往昔隱憂啓聖方實見於當今何福不生何災不滅臣今更有誠懇必須面陳伏恨步履艱難語言蹇澀又恐風涎發動遂令不措一詞乞於間暇之時略垂宣喚貴將微細皆具奏聞因請依前代册免三公故事明加黜責用激忠良上覽奏嘉納之丙辰大赦丁巳司天言彗星不見宰相稱賀且言曰陛下引咎責躬損禮肆眚妖異遽滅此甚盛德也上曰天鑒不遠當與卿等砥礪以消去禍災先是上遣使取杭州釋迦佛舍利塔置闕下度開寶寺西北隅地造浮圖十一級以藏之上下三百六十尺所費億萬計前後踰八年癸亥工畢巨麗精巧近代所無知制誥田錫嘗上疏諫其言有切直者則曰衆以為金碧熒煌臣以為塗膏釁血上亦不怒錫此疏必可觀惜其不載於史奏議亦無丙子上謂宰相曰為君為臣作一惡事簡册所載萬祀不泯可不戒耶自古未嘗不欲進君子退小人然君子常少小人常多吕蒙正曰此係時運盛衰國家興隆則君子道長其晦迹丘園蓋畏小人用事而有國家者尤宜早辨上深然之九月戊子以駕部員外即知制誥王化基為右諌議大夫權御史中丞上嘗召至便殿侍坐甚久屬盛暑令搢笏揮扇問以邊事化基曰治天下猶植樹焉所患根本未固根本固則枝幹不足憂今朝廷治邊鄙何患乎不安上然其言詔京朝官有明於律令格式者許上書自陳當加試問以補刑部大理寺官屬三嵗遷其秩自河北用兵切於饋餉始令商人輸芻糧塞下酌地之逺近而優為其直執文劵至京師償以緡錢或移文江淮給茶鹽謂之折中有言商人所輸多敝濫者因罷之嵗損國用殆百萬計冬十月癸酉復令折中如舊又置折中倉聼商人輸粟京師而請茶鹽於江淮膳部員外即范正辭洛苑副使綦仁澤作坊副使尹崇諤同掌其出納每一百萬石為一界祿仕之家及形勢户不得輒入粟御史臺糾之會嵗旱罷塞下納芻糧京師納粟皆謂之折中其實兩事塞下折中自雍熙始既罷復行京師折中今始行之又以旱罷實録與范正辭傳并兩事為一事故載其行罷輒差謬取本志刪修庶不失實云中淳化二年五月復置折博倉即其折倉也上以嵗旱減膳遍走羣望皆弗應是夕手詔賜宰相趙普等曰萬方有罪罪在朕躬自星文變見以來久愆雨雪朕為人父母心不遑寧直以身為犧牲焚於烈火亦足以答謝天譴當與卿等審刑政之闕失念稼穡之艱難恤物安民庶祈眷佑時普被疾請告即以授吕蒙正等壬申蒙正等詣長春殿謝曰陛下臨御以來躬親萬幾勤恤民隱未嘗有纎微之失蓋臣等調燮無狀致此愆尤漢制水旱䇿免三公臣等實任其責願上印綬避賢者路上慰勉之知制誥王禹稱上疏曰臣嘗讀墨子有七患一篇言水旱凶飢之事雖本小説似有裨於時政大抵一穀不收謂之饉二穀不收謂之旱三榖不收謂之凶四穀不收謂之餽五穀不收謂之飢饉則大夫以下皆損其祿五分之一旱則損其二凶則損其三餽則損其四飢則盡無祿廪食而已今旱雲不霑宿麥未茁既無九年之蓄可憂百姓之飢望陛下特降詔書上下君臣之間政教有闕自乘輿服命以下至百官奉料非宿衛軍士邊庭將帥悉第減之上答天譴下厭人心候雨足如故臣朝行中家最貧奉最薄然願首減奉以贖耗蠧之咎外州嵗市紫茜皮翎筋骨之數亦望權停一年事材八作文思紫雲工巧之技亦罷其作近城掘土侵墓者瘞之外州配𨽻之衆非贓盜者釋之然後戒州縣吏以古昔猛虎渡河飛蝗越境之事境內山川靈廟並委祈禱其餘軍民刑政之弊非臣所知者望委宰相裁議頒行但感人心召和氣變災為福惟聖人行之知制誥田錫言臣今奉詔差在太一宫用青詞致醮祈雨者竊以時雨愆亢聖慮焦勞自秋涉冬祠禱皆遍陛下親降乘輿躬謁寺觀有以見仁主憂民之旨聖人恤物之心雖災沴流行何代蔑有而帑廩儲積可備不虞然自今嵗以來天見星妖秋深雷震繼以旱暵之沴可虞飢饉之災此實隂陽失和調燮倒置上侵下之職而燭理未盡下知上之失而規過未能所以成兹咎徵彰乎降鑒或乾文示變或沴氣生妖昨陛下以上天垂謫告之文御樓行赦德音朝發妖彗夕消天不言而感報昭彰神幽贊而應答遄速今以宿麥未種甘雨未零人心不寧農望已失或聞小小冦盜聚散靡常嗸嗸蒸黎憂畏實甚愆陽既戾於寒沍厥疾乃生於癘疵民或流亡穀必翔貴尚賴陛下聖德宗廟慶靈逖彼北方騷邊頓息惠然諸國底貢交修不然則人心一搖盜計斯得何以靜潢池弄兵之嘯聚何以禦戎馬在郊之奔衝惟是秋冬又無雨雪此乃天意尚欲垂誡聖心諒亦深思豈刑繫之間尚未平允法令之設尚爾煩苛或力役未悉矜蠲或奢靡未盡撙節言路雖啓蹇諤者未必一一聼從王道雖行孤苦者未必人人受賜或刑賞過於常理因喜怒失於厥中嘉言納忠或見破於橫議任賢待下或鮮終於至誠若然則雖旰食疚懷宵衣軫念孜孜萬務適足勞於聖躬翼翼小心尚未臻於至化今舉大略上犯宸嚴禮曰王言如絲其出如綸書曰謹乃出令令出惟行今朝廷所行或異於是謀始稍虧於審謹令出無愧於改更有敕下方用尋即罷方用御札謁清廟尋罷謁清廟以是知急速機務寧無錯行臣之愚蒙豈敢逭於誅戮臣之遭遇安忍負於聖明是以因事上言庶裨萬一伏望陛下因此時旱更降詔書引咎責躬以答天誡布德覃慶以安民心蠲減征徭簡約利禁搜察淹滯登進才良猛士守方無使黷鄰召怨朝臣典郡正宜選廉任能或旌别勤勞或省閲浮泛振廪通貨以救餓殍加估收儲以備闕乏蕃戎蹂踐之處士庶陷歿之家哀亡恤存憫其餘苦掩骼置奠慰彼沈寃閭里再命於復除孤寡量優其給賜儉約奉已以合禮謹靜息民以安邊詳延忠鯁之臣詢究災祥之理弭災求理正在此時變沴致祥屬當今日若旱沴不已嵗歉相仍盜聚葦蒲伺隙而動敵乘饉塞幸災為虞是則國家之慮實深朝廷之憂非淺也疏奏上不悅宰相亦怒錫有變調倒置等語尋罷知制誥以户部即中出知陳州中書門下言所録時政記緣皇帝每御前殿樞密院已下先上宰臣未上所有宣諭聖語裁制嘉言無由聞知慮成漏略欲望自今差樞密副使二人逐旋抄録送中書遂詔樞密副使張宏張齊賢同共鈔録自後樞密院事皆送中書同修為一書而授史官副使知院二員同掌之樞密院時政記蓋始此十一月辛丑鎮州都部署宣徽南院使贈侍中郭守文卒守文沉靜有謀略知書善筆札恭謹自處與人無忤歷事纍朝始終如一先是將臣以重兵戍邊者多生事致冦以邀戰功河朔諸州曽無寧嵗及曹彬等敗賊乘勝長驅深入乃命守文以內職總禁衛鎮常山以經略之守文既卒有中使適從北邊來言守文之卒也武夫悍卒咸為流涕上曰何以致此對曰守文得俸祿皆市牛酒以犒軍士卒之日家無餘財上聞嗟惜良久即賜其家錢五百萬仍録其子為五品正員官其後上追念舊勳復納守文次女為襄王夫人上擇將帥可使代守文鎮常山者侍臣奏邊防重寄不宜輕授上默然良久乃曰劉廷翰其人也是日晚召廷翰與語甚悅即命以殿前都指揮使武成節度使出為鎮州都部署廷翰出將本紀實録不書不知即此月或他月矣今附見十二月辛亥詔置三司都磨勘司以左贊善大夫劉式主之式袁州人也庚申詔曰古先哲王託居人上蓋務求於至治豈有尚於虗名矧乃帝王之稱已極崇大爰自唐室始加美號徇臣子之愛戴著方䇿之典常踵事增華積習無改朕亦博考載籍追法古道既異三五之舊制深懼賔實之有踰憮然自思不遑寧處自今四方所上表宜只稱皇帝辛酉吕蒙正等奏曰陛下功德茂盛但可增益尊名今忽省去羣情莫不震駭上曰皇帝二字亦不可兼稱蓋起秦始皇後代因之不改朕比欲止稱王屬以諸子封王為不便耳朕志已定卿等毋勞確奏甲子趙普率百官上表請復尊號表凡再上皆不許戊辰又上法天崇道文武六字詔去文武二字餘許之上謂宰相曰國家取士歷級而升下位韜晦才行者多矣當勿以此為限庶成朕急賢之志因言為人臣者治平之代功效難見若亂世則止用其才不顧其行如陳平韓信頃刻能立勳業當治平即德行施其謀略故孔子四科以德行為長又言下位卑秩不可謂無良士大凡君子含章守道難進易退不求於聞達故常患其不能知也吕蒙正曰迭試事任則能否洞分上曰性之善惡何由知之蒙正曰人之為善終不能掩久則彌著至于為惡亦然茍暫聞善惡或涉愛憎恐悮任使必久而察之則賞罰無濫上善其言國初有樓店務太平興國中改為左右廂店宅務是嵗併為都店宅務以所收錢供禁中脂澤之用日百千明年復分兩廂尋又併之仍號左右廂店宅務
