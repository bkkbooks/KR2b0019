body:
  text: 續資治通鑑長編卷三百四十宋李燾撰神宗元豐六年冬十月癸酉朔以御侍永嘉郡君林氏為美人夏國主秉常遣使奉表復修職貢仍乞還所侵地徹被邉戍兵長為外藩乃賜秉常詔曰惟爾祖考介居邉陲蒙恩朝廷享有爵土撫循備厚歷年滋多昨者王師出征義存拯患謂宜委戈而聽命敵愾以獻功豈虞靡思弗諭朕志殺害吏士捍拒甲兵問罪正名方圖再舉逮使辭之效順聞國政之復常旋納懇誠祈修貢職遽披來奏論請故疆朕惟藩服不恭削地示過咨于故實匪朕所私爾其審思厥終務體至意其地界已令鄜延路經略司安撫使司指揮保安軍移牒宥州施行嵗賜候疆界了日依舊舊紀書夏人來貢新紀書秉常表復修貢乞還所侵地京東轉運司言商人販青州髙家港鹽至齊州等處减價賒賣以致本司賣河北鹽不售欲依見行稅法酌中數每嵗認買髙家港鹽二萬席運至齊州界依河北鹽價相兼貨賣如敢商販者依漏稅法從之六月己未初賣河北鹽沈括自志論河北鹽事云京東主司得罪合參照甲戌皇第十一子佶為鎮寧節度使寧國公新紀不書節度使召輔臣觀稻於後苑權發遣河北路轉運副使李南公専提舉鹽事宣德郎張適為轉運判官同提舉詔西京作坊使劉初管勾洪州玉隆觀令居桂州凖備緩急邉界呼使初治邉頗有勞以病乞致仕而是時交趾方理辨疆界故有是詔承事郎監饒州商稅茶務余舜臣言臣兄堯臣獻饒州景德鎮瓷窑博易務䝉朝廷付以使事推行其法方且就緒以勤官而死乞委臣勾當詔令赴闕中書審其人材可否以聞已而舜臣至乞上殿乃復詔令歸本任乙亥西頭供奉官歸信容城縣宋彥圖為閣門祗候仍令再任以韓忠彥劉舜卿薦彥圖材武曉邉事故也陜西轉運副使李察言緣邉州軍糴買糧草官乞委監司考較每州各定一員優劣行賞罰從之仍令河北河東凖此禮部言祠部出度僧牒以六千三百六十二為額今年已溢額千五百五十四乞嵗以一萬為率若踰數乃以聞從之詔自今勾當內藏庫內臣大使臣非朝廷差命不許奏辟差遣丙子御史中丞黃履言凖敕諸鞫獄言事御史輪治緣御史共置九員分察六案其言事官止三員員數至少欲乞遇鞫獄并言事察案御史輪治從之録右班殿直李釗子大舉大年並為三班借職釗隨軍出界護病卒還宥州遇賊鬬死故也丁丑捧日左第六軍第三指揮押官董安王宣長行潘演賀贇劉福郝秀解起並為三班奉職賜袍帶馬充並邉指使以引試武藝皆能射一石五斗弓也御史翟思言戶部侍郎寋周輔身為從官不厲名節曲回朝㫖與吏為姦而又縱不肖子犯法冒利朝廷付之有司案治二子禁錮身被劾問即當求解職任恐懼待罪而乃了無羞愧尚貪寵榮雖獄成定論自有常刑然出入廷中頗玷班列伏望先令罷職隨正其罪詔趣具案以聞八月七日庚辰寋逢辰下吏十月癸巳責起居郎蔡京起居舍人王震並試中書舍人戊寅詔承務郎馬申復通直郎承事郎胡宗哲復承議郎並權發遣同經制熙河蘭㑹路邉防財用事宗哲仍於同字下加管勾以别之申等並以闕軍興降官至是制置司奏乞叙復故也試中書舍人趙彥若為右諫議大夫諌議大夫初除故特書之己卯詔中書舍人蔡卞領吏兵房蔡京領戶刑房王震領禮工房如有妨礙文字送别房行之命秦鳯等路提㸃刑獄通直郎吕溫卿管勾保甲以上批昨選定提舉保甲官溫卿除去不與近觀溫卿申請軍政頗似留心武事陜西地濶嵗合收錢物色目萬數不少非胡宗回一人可辦宜依舊用新資任差故有是命開封府言周柴氏之後乞自今諸房子孫令具生年月日注籍從之提舉河北路稅鹽司言方澤根磨積缺鹽稅錢乞依京東路除放倍罰錢作年限令納元批正稅從之庚辰詔東上閣門使李緩閣門看班祗候管勾簿書宋瓌各罰銅十斤客省使曹評東上閣門使曹偃客省副使曹誘各罰銅六斤坐失㸃檢江東轉運判官郟亶見有罪被劾而乞上殿故也內西頭供奉官馮士倫追兩官張應之羅安李慶長及內東頭供奉官談文握內侍髙品盧世永左班殿直寄班祗候朱伯瑜各追一官坐編攔國信使不覺察車營兵與北人私交易也詔今後雄州計㑹交割銀絹行與涿州公牒並稱凖尚書戶部符更不稱三司牒密記八日事太常丞吕升卿言近以郊祀致齊之內不當詣景靈宫及太廟朝饗遂具奏伏聞止罷景靈宫諸處朝謁而天興殿及太廟朝饗如故臣伏以郊丘之祀國之大事有天下者莫重乎饗帝臣歷考載籍不聞為祀天致齊乃於其間先享宗廟者也獨有唐天寶之後用田同秀之言立老子廟號曰太清宫是嵗將行郊祀以二月辛卯先躬享焉祝用青詞饋用素饌甲午又親享于太廟丙申乃有事于南郊終唐之世奉而行之莫知其非雖論者以為失禮然考其初致齊之日及辛卯享于太清宮至丙申殆且五日乃得雍容休息以見上帝也今陛下致齊三日其一日於大慶殿而用其二日內行禮焉古之大祀未有不齊三日而敢與神明交者故經曰齊三日一日用之猶恐不敬二日伐鼓何居蓋先王之於祭祀之齊如此其謹也今陛下行禮於天興殿才齊一日爾其之太廟與郊宫也前祀之一日皆嘗用之矣謂之一日之齊尚非全也夫用一日之齊以修大祀未見其可况非全日乎於以奉宗廟則齊之日不足於以事上帝則齊之義不専陛下恭嚴寅畏三嵗一修大禮將以受無疆之休其為致齊者乃如此殆未稱昭事之意也今太廟嵗有五大享皆如古矣又於郊祀復修遍享之禮此為何名乎論者曰宗廟之禮未嘗親行故因郊祀恭展薦獻臣曰不然唐太宗時馬周言曰陛下自踐位宗廟之享未嘗親事竊惟聖情以乘輿一出所費無藝故忍孝思以便百姓遂俾唐史不書皇帝入廟何以示來葉良謂此也且人主於宗廟之饗自當嵗時躬修其事其不親享者蓋後世之失禮也今日必因郊祀以行之則義尤不可夫因者不致専之謂也七世聖神儼在清廟朝廷不特講嵗時親行之禮而因以饗之此非臣之所聞也臣愚以謂今郊禮宜如故事致齊於大慶殿二日徑赴行宫其宫廟親饗並乞寢罷或車駕必欲至太廟即乞止告太祖一室以伸侑神作主之意撤去樂舞以盡尊天致齊之義其天興朝饗乞更不行請如新降朝㫖俟禮畢而恭謝伏請繼今日已往别修太廟躬祀之制嵗五大享乘輿親臨其一焉仍望自今嵗臘享為首於明年行春祠之禮禴與蒸嘗自次年以叙終之每遇行廟享之時則罷景靈宫一孟朝謁之禮廟享致齊乞於內殿車駕出入如常儀如此則祀天饗親兩得其當不行朱本云升卿所論無施行刪去今依墨本仍載之辛巳同提㸃開封府界教閲保甲兼提㸃諸縣鎮公事莊宅使兼閣門通事舍人劉琯提舉府界保甲詔江夏郡王知大宗正宗惠年髙艱於拜趨應太廟祠事宜並免濟陽郡王曹佾將來大禮上二帝徽號止令赴宿衛權發遣京西路轉運判官孫覽言看詳諸路巡檢土兵立法之意蓋謂土人習知本處人情出入道路易以緝捕盜賊近巡歷諸州見所招土兵多老弱堪被甲可擒盜者十無三四仍未必皆土人欲乞逐路委監司一員選留外改刺逐州廂軍從之中書省言三省六曹諸司如係聖㫖指揮應速行及差除並批時辰付受無故違滯隨事科罰一日杖八十二日加一等罪止徒一年詔改作十日徒一年癸未詔賜京東路轉運使吳居厚奬諭敕書以上批居厚近發本路鹽息錢十七萬緡為絹送河東路保甲司買馬不逾兩月已能了辦其夙夜赴公之勤深可嘉奬故也詔宰臣執政官因罪降黜守本官以下應緣前兩府恩例止依本官候有遷除職名即依舊例甲申光祿卿吕嘉問言光祿掌酒醴祠祭實尊罍相承用法酒庫三色法酒以代周禮所謂五齊三酒恐不足以上稱陛下崇祀之意近於法酒庫內酒庫以醖酒法式考之禮經五齊三酒今醅酒其齊冬以二十五日春秋十五日夏十日撥醅瓮而浮蟻湧於面今謂之撥醅豈其所謂泛齊耶接取撥醅其下齊汁與滓相將今謂之醅芽豈其所謂醴齊耶既取醅芽置篘其中其齊䓗白色入焉今謂之帶醅酒豈其所謂盎齊耶冬一月春秋二十日夏十日醅色變而微赤豈其所謂緹齊耶冬三十五日春秋二十五日外撥開醅面觀之上清下沉豈其所謂沉齊耶今朝廷因事而醖造者蓋事酒也今踰嵗成熟蒸醖者蓋昔酒也同天節上夀燕所供臘醅酒者皆冬醅夏成蓋清酒也此皆酒非所謂齊也是知齊者因自然之齊故稱名酒者成就而人功為多故饗神以齊養人以酒竊恐典禮如此又司尊彛曰醴齊縮酌盎齊涗酌依經𫝊則泛齊醴齊以事酒和之用茅縮酌其盎齊緹齊沉齊則以清酒和之不用茅縮酌如此則所用五齊不多而供具亦甚易蓋醖酒料次不一此五種者成而皆自然伏望聖斷以今之所造酒與典禮相參審或不至差謬乞自今年郊廟共奉上批嘉問論證似有理趣今宗廟所實尊彛酒齊未備就且如其說用之於理無害乙酉右監門衛大將軍令綿為朝請郎賜章服與親民差遣以祕書省試經義應格也朝奉郎試大理卿楊汲試刑部侍郎初汲言大理寺斷絶獄空詔付史館因有是命京東都轉運使吳居厚言凖詔支鹽息錢三萬緡修青州城已起發外有未支修城錢萬七千餘緡乞不用六年鹽息錢止以登萊維密州鹽場支不盡腳錢應副從之南郊禮儀使言將來南郊行禮當差行事官詔更不用試差攝止以見任兩省御史并六曹侍郎待制以上仍不限員數今後凖此其儀仗內六引開封牧令闕差知府知縣太常卿闕差少卿尸部尚書闕差侍郎御史大夫闕差中丞兵部尚書闕差侍郎其僚佐即依條差官丙戌詔自今嵗賜諸軍綿襖官司為印號令押賜官所至州軍計㑹長吏兵官驗封號當官給付以麟府路走馬承受賈宗元言伎術官押賜衣襖匿其精粗與諸軍為市故也戊子上批來春開封府界起夫五萬開城壕宜令二月朔入役庶日景舒長工力易辦兼於農事未致失時户部言廣南西路轉運司約今年來年收支闕錢下廣東湖南應副又言本路嵗計無闕乏乞不支賜本部詳前奏副使馬默在假今奏判官許彥先出巡鹽彥先默不協致所奏異同乞下本路提㸃刑獄司案罪從之其後奏案乃彥先於㑹計數內失收見在賣鹽贓罰雜賞錢共十一萬緡所以奏為闕乏詔彥先先衝替已而法寺當上書詐不實以該赦釋之茶場司言凖敕每嵗下本司於熙州樁管茶一萬䭾於經制司年額見錢內除豁充蘭州博糴糧斛仍依市價計錢今乞分四料每季支茶二千五百䭾從之詔自今臣僚上殿劄子其事干條法者尚書省依條法議奏如事理難行送中書省取㫖詔封孟軻為鄒國公以吏部尚書曽孝寬言孟軻有廟在鄒屬兖州未加爵命故特封之新紀特書封孟軻為鄒國公承議郎吳安持等奏將來過界預備對答等事詔如問及沈括即答以見在外任若問王徽即云在闕下日聞已亡殁密記十六日事己丑詔尚書六曹簿書令左右司郎官半年一次取摘㸃檢遣京西提舉官孫覽覆度湖南元議官修建堡寨等事即以覽試右司員外郎廣南西路轉運使權經略司陳倩言所遷徙歸明人並兊易舊省户熟田其舊户所得田多不及舊業數目并給還元屋宇錢亦不當其價乞以官錢貼還從之詔嵗給度僧牒五百限五年止為錢三十二萬五千緡付廣南西路經略司應副宜州蠻事以其餘糴糧從知荆南謝麟所乞也八月十三日可考詔近夏國遣使上表謝恩及乞所剋復城寨疆土比已回詔不允然慮别謀犯順可録回詔劄下陜西河東逐路經略制置使司令常探伺隨宜備禦其詔本仍毋得下司庚寅手詔劉昌祚等曰永樂失律賊氣馮凌凡有所求意在必得今答詔既拂其意必無順命之理於大小遲速之間須豕突作過宜夙夜修嚴戰守之具俾隨方有以待之卿等各膺重寄為國虎臣當體詔告丁寧寤寐勿怠寬我西顧無為子羞今特因録降賜夏國詔書故有是詔詔成都府利州路緣邉出馬處宜堪配軍者令知成都吕大防與兩路轉運司同經制畫一以聞補潭溪峒歸明大首領楊晟想等二人為三班奉職餘補差使二人下班殿侍九人軍將牙職二百九人以荆湖北路轉運司言招納晟想等千一百二十四户獻納器械乞嵗入課米比三州一鎮也後考其實元無課米乃於所給俸內除留入官為課米之直使若歸誠輸力而實以利誘致之三州一鎮亦皆類此朱本簽貼云以密院㑹到為年嵗深逺檢尋不見遂削去後考其實以下四十餘字今復存之四月二日三月十二日又十一月三日前權寧逺寨主東頭供奉官翟士良免真決刺面除名配沙門島坐挾恨加杖决弓箭手員僚李懷恭致死故也提舉陜西買馬司郭茂恂言制置牧馬司於熙河路買牝馬價髙於本司所買年額詔馬價令提舉經度制置牧馬司裁减以聞朱本云無施行刪去今從新本辛卯工部郎中范子竒言昨判軍器監創造床子大弓二張彊於神臂弓獨轅弩較之九牛弩尤為輕便用人至少射逺而深可以禦敵詔工部軍器監管軍官同比試以聞朱本削去云無施行今從新本詔宜州監押右侍禁陸厚貸命免真決刺面除名配沙門島普義寨監押三班借職何希古權融州都巡檢內殿崇班李貫除名送千里外編管通判通直郎曹覯前坐它罪候當叙日展三期推官孫立節司户張峒各衝替土丁指揮使莫令頑石聘副指揮使陸計宜州澄海十將謝進並特放罪初安化州蠻賊千餘人鈔劫厚等坐與蠻鬬先退覯征討稽期立節等失出令頑流罪而令頑等以嘗纍白厚欲出救應故特貰之五年九月庚寅權發遣秦鳯等路提㸃刑獄權管勾經略司吕溫卿言昨㸃檢漢蕃人馬秦州漢弓箭手比元額少八百四十三人馬三百六十五匹取諸城寨弓箭手丁産簿初無開收不可鈎考經略司亦無文籍勘㑹三陽寨主內殿崇班楊應良到任三季招漢蕃弓箭手五百三十二馬一百七十二管勾治坊堡供奉官王訥根括伏羌城等三寨荒田三百六十頃以此見其餘城寨隱陷荒間必多兼訪聞甚有冒佃及弓箭手占在名下不刺入丁臣雖欲檢舉根究立式置籍若不以朝㫖推行恐即廢格乞降指揮令經略司遣官根究逐城寨弓箭手官田置籍具佃人姓名頃畝一送經略司一留本城寨開收其前占佃户並免納租釋罪止令增刺入從之癸巳鎮東軍留後㑹稽郡王贈安化軍節度使開府儀同三司追封虢王諡恭安世清卒車駕臨奠之守巽子賜應天府度僧牒四十修外城門及西橋等從知府孫覺請也録隨軍出界人承議郎王汲子忠嗣壻康公孺並為郊社齊郎手詔同提舉茶場陸師閔昨付以推廣禁地施行蜀茶今據面陳稍見次序可召問大槩及所請職事速議施行詔給絳州垣曲鹽息錢十二萬緡為河東路轉運司糴本朝奉大夫試户部侍郎寋周輔降一官長林縣主簿蹇承辰除名市易務下界監官宋喬年梁鑄內殿崇班符守規借職史安世各衝替三班借職宋仲約刺靣配車營務少府監修製官宋世隆刺靣配沙門島周輔坐不覺察子貸官錢然以措置江西福建鹽事有勞特免廢黜承辰貸度僧牒錢喬年鑄不覺察吏乞取世隆錢餘並以貸官錢連坐㑹赦特斷也八月庚辰周輔子逢辰賒與湯七度牒又稱承辰貸世隆錢逢辰係承務郎承辰無官今承辰乃以主簿見又獨被責當考又詔定祁州官吏資政殿學士光祿大夫吕公著以下八人各降一官坐違法差禁軍防送罪人也初上患禁兵有防送之勞乃定令凡罪人當配流者皆就𨽻當州其一條編管遷鄉人以遞鋪卒轉送至是祁州得河掃重役人尚進等五人贓狀既斷當還之役所祁以武衛卒護至定定復以驍武卒送之陸中素不快於公著亟奏其事李寧案鞫即觀望以為河掃重役人應即用編管人法以遞鋪卒轉送既上于朝大理亦附㑹以蔽罪然理官自知其大謾併引不應為律公著與屬官遞减當贖金三斤至一斤執政請奪職上以為太重故有是命八月十三日命李寧劾禮部言親祠儀注南郊則先奏樂六變升烟以降神然後皇帝升壇奠鎮圭玉幣以禮神太廟則皇帝先詣逐室奠鎮圭祼鬯於地奠幣訖退復位然後作樂九變以降神伏緣祭祀必先求神而後禮神今儀注奠圭幣二事俱在未作樂之前且祼求諸隂樂求諸陽二者主於求神移祼作樂之前可也圭幣則降神之後禮神者也神未降而先禮焉不近經意乞止依舊儀先奏樂然後詣逐室祼鬯奠圭幣或必欲先祼以合周人先求諸隂之義即乞晨祼之時先搢大圭祼鬯復位作樂饋食畢再搢大圭執鎮圭奠於繅藉次奠幣庶禮神並在降神之後又於儀注别無所增從之提舉茶場陸師閔言每嵗所收息稅以百萬緡為額除應副别司年額外並於陜西等路封樁以待詔用從之師閔又言運鹽入蜀見計置萬三千席約賣盡得二分五釐之息又言凖朝㫖增廣茶法自措置以來以所起茶數及見賣價約息稅錢無慮四十萬緡而金州所置三場收息亦當不下六七千萬緡詔候及一年奏取指揮詔皇城使惠州團練使李舜聰免勒停降兩官展三期叙坐提舉開封府界賊盜巡檢私使兵級及事發自訟不實㑹恩也庚子賜髙陽關路安撫司度僧牒百二十修莫州城并築炮臺開壕塹提㸃秦鳯路刑獄權知秦州吕溫卿言雞川甘谷地廣百里正當賊衝雞川雖有十井沙淺無源甘谷城草創二丈六尺欲乞檢計雞川别修水寨及增築甘谷城髙三丈五尺其人工將來防春日就發兩將下漢蕃弓箭手材料錢糧令轉運司應副從之利州路提㸃刑獄司言茶場司運茶入諸場所歷郡縣多不依法和雇腳乘本司訪問知利興州實曽截客人騾綱雇發其興州更籍定四等已上人户般運興元府洋州等處除應募人外亦如興州兩處並曽支雇錢諸處見各如此施行詔茶場司改正仍根究不當處行遣都提舉汴河隄岸司言近為汴水添漲其京西四㪷門分减不退以致開决隄岸今近京除孔固㪷門减水不入黃河外已下雖有孫賈㪷門减水入廣濟河然下尾窄狹不能盡吞伏欲乞於萬勝鎮舊减水河汴河北岸修立㪷門自第一鋪下至第五鋪合河處開淘舊河并自第十一鋪創開生河一道下合入刀馬河實役人夫一萬三千六百四十三人限一月畢工乞下都水監於來年春夫內差發從之仍作二年間修環慶路經略司言欲將蕃官首領因立戰功酬奬酒肆且令開沽或無戰功即停廢從之尚書省成事具十二月甲申新紀特書舊紀無是月董戩死鄂特凌古繼立鄂特凌古于闐人非嘉樂氏後其母章穆轄卜嘗侍董戩因養鄂特凌古為子既而董戩得風痺病卧帳內委政于鄂特凌古甚親之鄂特凌古又得幸于董戩妻喬氏內外咸服遂謀篡奪董戩先有子竒鼎夏人及輝和爾皆以女妻焉竒鼎性輕佻好易服微行鄂特凌古陰使人賊殺竒鼎及董戩死鄂特凌古與喬氏匿喪出令如它日悉召諸族首領至青唐城矯董戩之命曰吾一子已死惟鄂特凌古母嘗事我今當以種落付鄂特凌古仍厚賂大酋果莊溫錫沁等于是諸族首領共立鄂特凌古為董戩嗣鄂特凌古并取竒鼎二妻為己妻以母事董戩妻契丹公主其貢奉朝廷猶董戩在日未遽以喪告此據哲宗實録鄂特凌古傳汪藻青唐録高永年隴右録增修青唐録但云得幸于董戩妻不指誰氏隴右録稱董戩妻喬氏又稱董戩妻契丹公主蘇轍元祐二年六月奏則云董戩妻即契丹公主不知喬氏與契丹公主為同為異當考明年六月乙亥詔并王鞏甲申雜見可考
