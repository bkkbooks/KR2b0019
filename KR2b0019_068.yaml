body:
  text: 續資治通鑑長編卷六十四宋李燾撰真宗景德三年九月庚子朔斬殿直泗州巡檢王文用文用捕獲劫賊受賊父賂遂以其父為反告上於本州既而慮其事敗乃迫脅所部將校謀為剽劫鞫之得實罪當絞特斬焉又黜其父右領軍衛大將軍會州刺史謙為忠正節度副使不署州事上視欵見文用才二十嵗未嘗更事因詔三班院自今使臣年及三十纍經勾當者乃得選充監押巡檢有司言萊蕪監大叔等冶鐡數不登詔廢之大理寺言定禁軍逃亡條其下等禁軍月給醬菜錢滿二百隨軍壕寨而亡命者請如禁軍例決遣自餘悉準廂軍上曰俸少而法重是深文也令自今下等禁軍差為壕寨者並增俸及三百有犯論如法餘從所奏癸卯向敏中張崇貴等言趙德明纍表歸順詞意精確望降詔慰諭從之鄜延副都部署石普言夏州請盟朝廷加以恩制望不授押蕃落使上曰是蕃部舊職不可去也然普意亦有可采宜令止兼管內押蕃落使已酉詔聞陜西緣邊州軍遊惰之民聚而蒱博急則為盜恣擾鄉閭宜令所在申明舊詔嚴行禁止庚戌詔以稼穡屢登幾務多暇自今羣臣不妨職事並聽遊宴御史勿得糾察上已二社端午重陽并旬時休務一日祁寒盛暑大雨雪議放朝著於令知鎮戎軍曹瑋言伊普才迭等族首領率其屬來歸欲發兵應接上以德明輸貢效欵議加朝命乃詔瑋等如舊係熟户則依例安置自餘勿為發兵上謂輔臣曰明德皇后園陵頓遞如聞所司廣有須索頗擾於人乃詔內侍取宫掖及諸王院一行人數付御厨翰林儀鸞司除本司祗備外所須什物畫一以聞即詔州縣供給仍諭所至非有宣敇不得應副揭榜以示民壬子詔民以書籍赴緣邊𣙜場博易者自非九經書疏悉禁之違者案罪其書沒官癸丑鄜延路部署言得趙德明牒請蕃部指揮使色木結等還本道今色木結見屬府州計其歸投在德明誓表前請詔府州具證驗事狀以諭德明從之丙辰御崇政殿親試賢良方正直言極諌光祿寺丞錢易廣德軍判官石待問並入第四等以易為祕書丞待問為殿中丞待問眉山人也上謂輔臣曰今封疆寧謐氣序均調所謂人情和天道順也王旦等曰陛下虛心求治屈已為民逺裔懷徠嵗豐人樂此太平之應也咸再拜稱賀上曰亦卿等之功也朕觀古今事若君臣道合上下同心何憂不治今四方無虞卿等宜謹守經制審於出令耳又州郡守臣尤須遴擇近日亦頗有公勤幹事者多以細故與僚屬不和因之害政况凡近無識好居人上者安能每事循理哉因言劉廷翰典禁軍為上將而不事貴勢步武內庭如一小校嘗入皇城門閽者不識而拒之廷翰即由他門入終亦不言戊午詔選使臣二貟為長城口巡檢各給兵百人分道巡邏以邊民多齎禁物及盜販北界馬故也會要在四年九月上聞河北官吏市民物給直不當價令轉運使以前詔揭榜戒之辛酉詔緣黃河肄役兵匠自今除月廪外别給口糧甲子令京城稅炭場自今抽稅特減十之三詔於諸陵置朝拜行事官齋宫乙丑詔釋西南納質戎人先是諸蕃有鈔劫為惡嘗經科斷者恐異時復叛故收其子弟為質乃有禁錮終身者上憫而縱之族黨感恩皆稽顙自誓不為邊患上封者言州郡官吏忿爭例止移任故好競者不能悛革乃詔自今並遣使按劾區辨枉直以行懲戒雄州團練使何承矩以老疾纍表求解邊任上令自擇其代承矩薦安撫副使李允則丙寅即命允則知雄州兼安撫使改授承矩齊州團練使便道之任承矩至齊州才七日卒緣邉洎涿易州民聞承矩卒皆揮涕有相率詣雄州發哀飯僧者承矩習熟戎事有方略能綏撫異俗其後北使至者言敵人皆畏服承矩之名尤好儒學賔禮賢士大夫嘗知潭州李沆王旦實為佐屬承矩器以公輔待之絶厚實録承矩傳云承矩晚年自恃其勞朝廷每舉大禮輒奏邉警以冀姑息時議短之按承矩死時年六十一所謂晚年當是五十以後也自咸平元年至景德三年真宗凡三舉郊禮承矩輒奏邉警其此時乎然承矩首建𣙜場之議常欲朝廷懷和北戎恐實録所載未必可信也正史傳已削去今亦不取承矩獨自出混泥城不能深入非詔書意時議所短或指是役而實録誤以為奏邉警冀姑息耳當考詔北界盜賊亡命至緣邉州軍者所在即捕送之時有盜賊亡入北界彼即禽付邉將故也丁卯鄜延鈐轄張崇貴入奏趙德明遣牙校劉仁朂來進誓表請藏盟府且言保吉臨終謂之曰爾當傾心內屬如一兩表未蒙聽納但連表上祈得請而已又言所乞回圖及放青鹽之禁雖宣命未許然誓立功效冀為異日賞典也上賜詔嘉奬焉知秦州楊懷忠言雅爾喀尚族蕃落尤大能稟朝命凡諸族為冦盜者輒遏絶之請加旌别詔補三寨都首領張崇貴久在延州善識蕃戎情偽西人畏伏凡德明有所論述及境上交侵必先付崇貴裁制先是夏州趨邊有二路己巳詔緣邉諸州無得承接夏州章奏移牒並令納於延州其遣使往來亦勿取他路以崇貴故也冬十月庚午朔以趙德明為定難節度使封西平王給俸如內地又録德明誓表令渭州遣人齎至西涼府曉諭諸蕃轉告甘沙首領辛未以六宅使奬州刺史內侍省右班都知張崇貴為皇城使誠州團練使內侍省左右班都知賞其功也甲戌趙德明上言臣所管蕃部近日不住歸鎮戎軍蓋曹瑋等招納未已緣臣已受朝命乞賜曉諭詔以德明誓表遍諭邉臣乙亥以太常博士王曙為契丹國主生辰使內殿崇班閣門祗候髙維忠副之戶部貟外郎直集賢院李維為國母正旦使崇儀使雅州刺史張利涉副之太常博士假曄為國母正旦使如京副使孫正辭副之維等使還言契丹主見漢使強服衣冠事已即幅中雜蕃騎出射獵矣官屬隨帳皆自辦器械糗糧始孫僅使時所過官屬路在獻酒及維至則已變改然而遇漢使益厚又言蕃法極嚴罪死者必屠割慘毒云孫正辭未見丁丑以內侍左右班都知張崇貴為趙德明旌節官告使太常博士趙湘副之賜德明襲衣金帶金鞍勒馬銀萬兩絹萬匹錢二萬貫茶二萬斤己卯上曰昨園陵修奉已來朕慮掌事者因緣擾民屢降條約如聞鄭州頓遞所索名件至多尋令取到文字乃轉運司所差忠武節度推官杜保又潛配民户令供折米蕪荑白沙糖生魚蓽撥等且外方州縣安能盡備此物况宫闈及諸王院方奉靈駕亦何暇有此呼索官吏不體朝旨以百姓為念可劾其罪仍揭榜令民不得應副辛巳詔西邊州軍德明已受朝命緣邊屯戍量留步兵餘悉分屯河中府鄜州永興軍以就芻粟知雄州李允則言兩地供輸民或饋羊酒拒之則邉人以為疑欲受而答以茶綵設飲食以接其意可之癸未河北轉運使盧琰言契丹諸族酋長欲緣界河放獵及借西山草地打圍上曰契丹誓約甚明未嘗踰越此必傳者誤耳乃詔緣邊州如果有此則移牒北境請依誓約既而邊表言諸族出畋屢遣人誡部下無得越境今已北去延州向敏中等言趙德明遣人致書以駝馬土物送遺詔令復書以禮物答之先是龍圖閣待制陳彭年言伏見司天定明德皇后靈駕發引用十月十六日申時陛下將以其日未明臨奠竊尋歷代以至聖朝園陵之義未有宵啓九門逺赴郊野伏望謹巖牆之戒遏霜露之悲申命禮官議從宜之制或先事一日酌奠於攢宫或既發平明奉辭於别次雖屈至性深協輿情於是改用丙時癸酉上詣攢宫酌獻甲申又詣攢宫乙酉發引上復詣攢宫自外次易素服行啓奠遣奠之禮號慕哽咽出外次望靈駕稍逺乃還宫自是月壬申至戊戌皆不視朝及吉仗還又廢朝丁亥遣中使馳驛詔園陵頓遞使令所至以鄆王安王周王喪就東西序設次仍畫圖示之先是所司備頓置靈駕所次並設三王幄殿皆位南向上聞之大駭以其失尊卑之别遂有是命大禮使王旦等上表謝罪詔答諭之庚寅復置解州通判一貟舊制州不及萬户者省其通判此時州户盈萬數鹽池纍嵗苦積水鹽不成殿中丞范航使還具奏其事乃復置焉范航未見壬辰賜自京至永安諸陵西京役卒錢令遇風雪休息之癸巳樞密院言訪聞鎮定都鈐轄田敏在任多所交遊不甚謹飭欲令轉運司察之以聞上曰敏北人也以其熟邉鄙事粗有武勇使之捍冦頗亦宣力若責以端慤固非所長且加之伺察寧不憂懼今彼路戍兵既減主將亦多可召令歸京初右諌議大夫知杭州薛映臨決鋒鋭州無留事時起居舍人直史館姚鉉為轉運使亦雋爽尚氣檄屬州當直司毋得輒斷徒以上罪映即奏徒流杖笞自有科條茍情狀明白何須繫獄以纍和氣請詔天下凡徒流罪人於長吏前對辨無異聽遣決之朝廷既施用其言鉉與映滋不協映遂發鉉納部內女口鬻鉛器多取其直廣市綾羅不輸稅占留州胥在司擅增修廨宇上遣御史臺推勘官儲拱劾鉉得實法寺議罪當奪一官特詔除名為連州文學拱亦奏映嘗召人取告鉉狀坐贖銅九斤特釋之因下詔以戒諸路轉運使儲拱未見丁酉葬明德皇后於永熙陵內殿崇班謝德權提轄三司衙司德權設條制均其差使有大將𨽻內侍主藏內侍為奏留規免煩重之役德權擕奏白上極言其僥幸上嘉德權有守又命提總京城四排岸領護汴河兼督輦運先是嵗役浚河夫三十萬而主者因循隄防不固但挑沙擁岸趾或河水泛溢即中流復淤矣德權須以沙盡至土為限棄沙隄外遣三班使者分地以主其役又為大錐以試築隄之虛實或引錐可入者即坐所轄官吏多被譴免者植樹數十萬以固隄岸又建議廢京師鑄錢監他功利多所經畫云德權提轄衙司不知何時據會要水運門此年十月德權以提舉綱運建議令形勢船倒檣今雖不載此事因附見此月十一月庚子朔詔減河北河東陜西諸州指揮使使臣以邊防無事故也癸卯知鎮戎軍曹瑋言環州先叛去蕃官蘇爾薩南復求歸附詔報曰蘇爾薩南反覆無定不可納也若本軍招誘而至德明必以為詞又恐狙詐以誤邊可諭以德眀既納欵皆王土也但復舊居不須更遷內地邠寧環慶都部署孫全照請令張崇貴嚴戒德明自今蕃部歸投諸州者無得入境追逐上曰德明族帳繼有歸投者德明雖遣追逐未嘗敢入境也若從全照所奏恐致危疑乃諭全照如德明果遣騎入境則具以聞會要載此事於十一月四日癸卯也故附曹瑋奏後乙巳詔應明德皇后園陵緣路置頓遞復來年夏租陵所工役人並優賜之增陵州陵井監工役人月給錢米聞其勞苦故也先是工部郎中陳若拙接伴契丹賀正旦使若拙談詞鄙近丙午命太子中允直集賢院孫僅代之若拙多誕妄寡學術雖以第三人及第素無文舊語第三人及第號榜眼因目若拙為瞎榜詔入契丹使從人不得過百人上以使臣奉命外境慮其事體不一每遣使即詔有司諭以近例俾其遵守無輒改易其書題有文詞者皆樞密院送學士院看詳必中禮乃用之閻承翰等言朝廷遣賜契丹國信其使副隨從兵士已差馬軍貟寮一人部轄望更令使臣同共管勾上曰若更差使臣則本國恐難為禮但令增差軍貟上又謂輔臣曰使契丹者要在謹重寡言委之達王命而已且朝廷用人不可求備凡遣使者朕每戒諭當謹禮容蓋中朝禮法所出將命出疆衆所瞻仰稍復違失即致嗤誚况彼所遣使來奉中朝皆能謹恪耶自今遣使卿等宜各以朕意曉之趙德明遣使貢御馬二十五匹散馬七百匹駝三百頭以謝朝命丁未詔應以歷代帝王畫像列街衢以聚人者並禁止之庚戌徙知永興軍府永清節度使周瑩為邠寧環慶都部署東上閣門使邠寧環慶都部署孫全照為四方館使知永興軍府先是詔減西鄙戍兵令屯近地全照以邉防不可無備未即奉詔上曰全照是好勇多言者德明使已至闕復何慮焉故使瑩代之又以知鎮戎軍曹瑋久在邉城頗著勞效欲遷其秩乃召令赴闕西蜀戍卒嵗滿當代議者以為遣髙年則緩急誤事發精鋭則險逺之地難於防轄樞密院言陜西振武鄉兵各有資産今西鄙無事可遣代戍詔從之令兩京諸州道釋得度十人者特放一人不及者每院與一人取係籍居止者度之勿試經業詔以方資善利用廣化樞故也壬子樞密院言諸州所買蕃馬給價漸多蓋緣邊臣各冀增數以為課績方今戎事已息監牧漸蕃亦宜常為節制欲遣使劾其增置之罪以聞從之甲寅令河北諸州罷募振武軍士有願投軍籍者部送上京𨽻虎翼乙卯以宫苑使恩州刺史秦翰為皇城使入內內侍省都知翰久在西邊宣力勤盡故特置是職以寵異焉此據翰本傳實録但載為皇城使戊午三司請以陜孟汝三州正稅芻糧輸送西路給朝陵之用詔不許但令取給畿縣己未上謂輔臣曰執政之地百僚具瞻品藻擬倫當務公共輕語寡信怨是用長不可不戒也冦準之居相位多致人言豈不由此馮拯曰吕蒙正嘗云準輕脫好取聲譽不可不察上因言蒙正性淳厚李沆溫和寡言嘗廷議政事而向敏中獨無言沆乃曰敏中素同此議何得對上緘默亦足見沆之純誠也庚申趙德明又遣使來貢詔每宣敕下諸路相度會問公事多是稽留不即結絶致煩催促况稽留制書律有明禁當諭轉運使告示自今凡受宣敕並須當日內施行律限內結絶若别須會問的實限內未了者亦須於限滿日具事由奏裁如敢依前稽緩官吏並當勘劾依律科罪仍委中書門下樞密院置簿提舉丁卯契丹遣使左監門衛將軍耶律阿古啓聖軍節度使耶律堯寧副使太常少卿石用中祕書少監馬保佐來賀承天節阿古有疾不能入見上遣醫官診視之因謂輔臣曰所遣醫官但令診視合和藥餌當使自為之彼雖得藥即餌以示相信然他時或有不可療者則於事非便自今朝廷遣使宜以醫官隨行彼亦必與醫同至也十二月己巳朔髙溪州蠻酋一百六人來貢甲戌舒王元稱上言妻之近屬盧澄素乞授京秩上曰聞澄素非士流恐涉物議不許己卯知保州趙彬請於州城東北更廣屯田以圖來獻上曰北方既和邉封撤警當勸課農民咸使樂業不用侵占畎畝妨其墾殖也上之幸大名也禱於河有應及駐蹕澶淵戎騎在郊而河流不氷敵人髣佛若見隂兵助戰於是令澶州河南置河瀆廟春秋致祭西京父老再詣闕請車駕朝陵畢臨幸召見慰勞賜物有差辛巳置懷逺驛於汴河北以待諸蕃客使壬午龍圖閣待制陳彭年上言伏覩詔書來年正月三日上辛祈榖於昊天上帝至十日始立春謹按禮記月令天子以元日祈榖於上帝注云為上辛祈榖郊祀昊天上帝春秋傳曰啓蟄而郊郊而後耕蓋春氣初至農事方興郊祀昊天以祈嘉榖故當在建寅之月迎春之候矣自晉泰始二年始用上辛不擇立春之先後齊永明元年立春前郊議者欲遷日王儉啓云宋景平元年元嘉六年並立春前郊遂不遷日其後吳操之又云應在立春前然則左氏所記啓蟄而郊乃三代彜章王儉啓郊在春前乃後世變禮來年正月十日立春三日上辛祈榖斯則襲王儉之末議違左氏之明文理有未安事當復古伏望憲章三代取則六經當以正月立春之後上辛行祈榖之祀從之因詔有司詳定諸祠祭事其後有司言按月令立夏之日天子迎夏於南郊注云迎夏為祀赤帝於南郊又云是月也大雩注云春秋傳云龍見而雩謂建巳之月陽氣盛而常旱萬物待雨而長故祭天以祈雨龍星謂角亢也立夏後昏見於東方又按五禮精義云自周以來嵗星差度今之龍見或在五月以祈甘雨於時已晚但四月上旬卜日今則惟用改朔不待得節祭於立夏之前違兹舊禮之意茍或龍見於仲夏之時雩祀於季春之日相去遼濶於禮未周欲請自今於立夏後卜日如立夏在三月則待改朔庶節氣協於純陽典禮符於舊史又按月令云季秋之月乃令冡宰農事備收藏帝籍之收於神倉是月也大饗帝此則季秋之月農事既終大饗明堂報兹嘉榖或猶未得節尚當建酉因而卜日有屬先時欲望自今並過寒露或寒露在八月則至九月乃卜自餘諸祠祭皆協禮令無所改易奏可斯多特遣使來貢甲申詣普安院謁元德皇太后聖容丙戌涇原儀渭都鈐轄秦翰等言當宗等蕃部葉額實容通望依康古蘭家族首領便粗克等例月賜俸料上曰無功受祿何所旌别詔翰自今有立功者條具以聞乃給俸料戊子詔牛羊司畜有孳乳者放牧勿殺河北安撫司奏契丹車帳至界河捕魚詔雄州俟彼國賀正使到諭之雄州言頃者用兵之際本州每有密事不欲漏落因擇馴謹吏專主行之號機宜司今契丹修和請改為國信司從之辛卯以宰臣王旦為朝拜諸陵大禮使詔朝陵緣路禁樂至禮畢壬辰夔州路轉運使薛顔遣使押髙州新附蠻酋八十九人來貢會要於正月先載高州新附蠻八十九人來貢於十二月又載此人數並同疑重出今從實録止一書之甲午契丹遣使右威衛上將軍蕭和尼廣德節度使耶律留寧副使宗正少卿吳克昌右金吾衛將軍王式來賀明年正旦邵曄等言黎龍廷已遣弟入貢乞加朝命而黃慶集等先避亂歸化種族稍多若復遣還慮遭屠戮望就賜恩秩丙申補慶集三班借職監郴州鹽酒東上閣門使忠州刺史曹利用等以承天節各乞奏補其子樞密院言諸司使副非遇郊禋皆無此例遂罷之簽書樞密院事韓崇訓亦乞奏補其族詔以為右侍禁始用副使及知院事例也是冬殿前侍衛司奏孔目官已下闕人乞行遷補上曰掌禁衛者皆是武臣其如軍政繁重自來遷改不得勞逸不均蓋不簡擇司屬致其罔上欺公也但向屬兵興不暇簡閲今可令樞密院召令具述行藏以公事選試定可否去留各以名聞它日上覽其等第謂王欽若曰可者存之不可者與鎮戍安排其河北諸路部署司典級亦聞皆是邉郡公人親屬多在北鄙嵗時來往事亦非宜當於內地州郡典級中選補遣之或附八月末先是江淮嵗運米輸京師未定制是嵗始定六百萬石為嵗額從發運副使李溥之請也本傳云江淮運米輸京師嵗才三百五十萬斛李溥增至六百萬因除發運副使按溥除副使實録不書會要於景德三年十一月載溥請定嵗額則溥已為副使矣恐傳未必可據也今從會要傳所云嵗才三百五十萬斛蓋止言米及黃米數耳菽粟不與焉米數見至道元年九月不知此云六百萬石者通菽粟言之或專舉米數當考置金耀門文書庫掌三司積年案牘以三班一人監之廢在京鑄錢監改為鑄寫務掌造銅鐡鍮石諸器及道具以供內外出鬻之用契丹上其國母蕭氏雅雅克號曰睿德神略應運啓化法道洪仁聖武開統承天皇太后其主隆緒曰洪文宣武至德廣道昭孝皇帝置中京於齊勤山下其地本奚王牙帳也
