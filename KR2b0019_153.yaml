body:
  text: 續資治通鑑長編巻一百四十九宋李燾撰仁宗慶厯四年五月壬戌朔樞宻副使韓𤦺参知政事范仲淹並對於崇政殿上四䇿曰昨元昊叛命王師數出不利而北敵舉數十萬衆謂元昊是舅甥之邦中國不當稱兵國家以生民之故稍增金繒以續盟好今元昊雖暫求通順後如物力稍寛則又有長驅深入幷吞關輔之心何以知之昨定川之戰彼作偽詔誘脅邊人欲定關中蓋漢多叛人陷於窮漠必以劉元海符堅元魏故事日夜㳺說元昊使其侵取漢地而以漢人守之則富貴功名衣食嗜好如其意乃知非獨元昊志在侵漢實漢之叛人日夜為賊謀也朝廷若從其和則契丹要功下視中國若拒絶之則元昊今秋必復大舉契丹㝷亦遣使問所以拒絶元昊之故或便稱兵塞外張勢脇我國家必於陜西選將調兵移於河北河北未戰而西陲已虛元昊乗虛而來必得志於關輔此二敵交結之勢何以禦之臣等思和與不和俱為大患然則為今之謀者莫若擇帥練兵日計用武之䇿以和好為權宜以戰守為實務彼知我有謀有備不敢輕舉而盟約可固如不我知輕負盟約我則乗彼之驕可困可擊未必能為中國之害試畫一言之其一曰臣等觀西戎蓄禍積有歲年元昊外倚契丹屢乘戰勝而乃輙求通順寔圗休息所獲者大利所屈者虛稱然猶干請多端姦謀未測國家以生靈為念不可不納如唐髙祖太宗之權略猶屈於突厥當始畢之卒為之舉哀廢朝遣百僚詣館弔其來使又太宗馳六騎於渭上見頡利與語親與之盟既退左右勸擊之太宗謂我擊彼敗懼而修徳後患必深周旋俯就使之驕怠一旦李靖擒之威振四極此盛主之謀也陛下當如唐高祖太宗隆禮敦信以盟好為權宜選將練兵以攻守為寔務彼不背盟我則撫納無倦彼將負徳我則攻守有宜此和䇿之得也其二曰元昊未叛時受朝廷恩信甚厚尚或時擾邊境今累次大舉曽無沮敗乃遽請和寔蓄陰計非屈伏之志今若以權宜許之更當嚴作守備然陜西減兵則守備不足不減則物力已困臣等以為縁邊城寨須日加繕完使敵人之心無所窺伺又乆守之計則莫如畜土兵盖其衆諳山川而多習戰鬬比之東兵其功相倍然沿邊次邊土兵數少而分守不足更當於要便城寨益招置之若有近裏土兵願益𨽻邊寨者即遷其家而團集之向慶州創大順城欲置振武保㨗兩指揮乃於永興華州耀州土兵中召願守寨者而應募甚衆何則關内諸土兵多在邊上或代歸而數月之間復出逺戍豈但星霜之苦極傷骨月之恩征夫不保其家嫠婦頗多犯法人情乆則怨起如得并遷其家於邊住營更免出軍父母妻子樂其完聚戰則相救守則相安此可恃之兵也或謂土兵擕家寨下則請給之費尤多臣等曰不然土兵月給差少又素號精強使之戍邊比之東兵數復可減然於逐路漸為增損一二年間方能整集固非一朝可驟改也又陜西新刺保㨗其中有孱弱不堪戰者宜少汰之使歸於田畆既省軍費復增農力然後三分東兵以一屯邊以助土兵之勢以一徙次邊或屯闗輔以息饋餉之勞以一歸京師以嚴禁衞之勢彼如納欵未變則東兵更可減三分之一又沿邊無税之地所招弓箭手必使聚居險要每一兩指揮共修一堡以完其家與城寨相應彼或小至則使屬户蕃兵暨弓箭手與諸土兵共力禦之彼或大舉則必先聞舉集之期我之次邊軍馬盡可駐於堅城以待敵之進退沿邊山阪重複彼之重兵必循大川而行先求速戰既勝則方敢散兵擄掠過越險阻更無顧慮我若持重不戰則彼之重兵行川路中芻糧無所繼牛羊無所獲不數日人馬俱困既不敢越險又未能决勝必不得已而散兵擄掠我扵山谷中伏精鋭以待之使散無所掠聚不得戰欲長驅而來我則使諸将出竒以躡其後欲保師以歸我則使諸城幷力以乘其敝彼将進而無利退而有禍不三兩舉勢必敗亡此守䇿之得也其三曰元昊巢穴寔在河外河外之兵懦而罕戰惟橫山一帯蕃部東至麟府西至原渭二千餘里人馬精勁慣習戰鬬之事與漢界相附每大舉入㓂必為前鋒故西戎以山界蕃部為強兵漢家以山界屬户及弓箭手為善鬬以此觀之各以邊人為強所以秦漢驅逐西戎必先得西界之城彼既逺遁然後以河為限不能深入儻元昊歸欵則請假和䇿以撫之用守䇿以待之或順而飜變則有可攻之䇿竊計陕西四路之兵㡬三十萬非不及也然分守城寨故每路戰兵大率不過二萬餘人坐食芻糧不敢輕動葢不知賊人果犯何路其備常如㓂至彼則不然種落散居衣食自給或忽爾㸃集并攻一路故嘯聚之衆動號十餘萬以我分守之兵拒彼専舉之勢衆寡不敵遂及扵敗且彼為客當勞而反逸我為主當逸而反勞我若復用此計使彼勞我逸則取勝必矣臣等請於鄜延環慶涇原路各選将佐三人使臣一二十人歩兵一萬騎兵三千以為三軍訓以新定陣法俟其精勇然後觀賊之隙使三軍互掠于横山降者納質厚賞各令安土拒者并兵急擊必破其族假者鄜延一軍先出賊必大舉來應我則退守邊寨或據險要勿與之戰不越旬日彼自困敝勢将潰歸則我復出環慶之軍彼必再㸃兵而來即又有涇原之師乘間而入使賊奔命不暇部落携怨我則兵勢自振如宥綏二州金湯白豹戩章等寨皆可就而城之其山界蕃部去元昊且逺救援不及又我以堅城守之以精兵臨之彼既樂其土復逼以威必湏歸附以圖自安三二年間山界可以盡取此春秋時吳用三師破楚之䇿也元昊若失横山之勢可謂斷其右臂矣矧漢唐之舊疆豈今日之生事此攻䇿之得也其四曰臣等既以三䇿陳之又以契丹為憂且契丹乆強在後唐日以兵四十萬送石髙祖至洛陽立為天子遂與石晉為父子之邦邀求無厭晉不能支一旦釁起長驅直抵京師擄石少主暨當時公卿盡室而去為中原千古之恥國家始與之結和将休兵養民有所待也及天下無事人人懐安不復有征戰之議前年北敵驟起詭謀稱兵有割地之請今来元昊欲議和又因而要功其勢愈重茍不大為之備禍未可量請朝廷力行七事以防大患一宻為經畧二再議兵屯三専於選将四急於教戰五訓練義勇六修京師外城七宻定討伐之謀一宻為經畧者自河朔罷兵以来幾四十年州郡因循武事廢弛凡謀興葺則罪其引惹昨朝廷選差轉運使盖欲革去舊弊預為之防然既有本職則日為冗事所嬰未暇周慮請選有材識近臣假以都轉運使之名暫徃經畫親視邉壘精究利害凡邉計未備者皆條上而更置之不出半年歸奏闕下更令中書樞宻院仔細詢訪熟議經久之計若敵情驟變則我有以待之矣二再議兵屯者自来真定府定州髙陽關分為三路其所轄兵馬未甚整齊乃有一州兵馬却屬兩路之處又未曉本路将來於何控扼合用重兵若干又甚處只宜固守合屯兵若干及三路互相應援次第須差近臣往彼宻為經略方可預定法制臨時不至差失或事宜未動亦當相度兵馬合那減於何處駐泊使就芻糧以省邊費庶免先自匱乏至用兵之日重困生民三專於選将者委樞宻院扵閣門祗候使臣以上選人三班院於使臣中選人殿前馬歩軍司於軍旅中選人或有知畧或有材武堪邊上試用者逐旋進呈據選到人數以籍記之候本路有闕則從而差授如此則三二年間得人多矣四急於教戰者扵陜西四路抽取曽押戰隊使臣十數人更授以新議八陣之法遣往河北閲習諸軍使各知竒正循環之術應敵無窮五訓練義勇者今河北所籍義勇雖若唐之府兵法制三時務農一時教戰然未建府衞之官而法制不行號令不一須别選知州知縣縣令可治兵者并増置将校使人人各知軍中之法應敵可用斯則强兵制勝之本矣六修京師外城者後唐無備契丹一舉直陷洛陽石晉無備契丹一舉直陷京師故契丹之心于今驕慢且為邊城堅而難攻京師坦而無備一朝稱兵必謀深入我以京師無備必促河朔重兵與之力戰彼戰或勝則更無所顧直趨澶淵張犯闕之勢至時遣使邀我以大河為界将何以禦之是京師不可以無備也若京城堅完則戒河朔之兵勿與之戰彼不得戰則無乗勝之氣欲謀深入前有堅城後有重兵必将沮而自退退而不整則邀之擊之皆可也故修京城者非徒禦㓂誠以伐深入之謀也漢惠帝時起一百里内男女城長安二年而就唐明皇時城長安九十日而就今約二年而城之則民不勞而利大不可不早計也是日琦仲淹指陳於上前數刻乃罷諌官余靖言竊聞大臣建議内有修京城置府兵二事伏以廟堂建論天下具瞻帝王言動萬世為法安危所繫舉措非輕事之㡬微不可不重難與慮始人之常情臣願陛下深思逺慮以安民為本臣請縷陳二事望陛下擇其可否臣聞西賊僭號之初宋祁請修函谷關此時關中動揺謂朝廷棄關西而自守今無故而修京城乃是捨天下之大而為嬰城自守之計四方聞之豈不動揺強弱之勢正在此矣無戎而城春秋所譏守在四裔義不如此又前歲以邊鄙之警而河北諸路㨂㸃鄉兵天下百萬農夫皆失其業北敵慢書亦隨而至乃是鄉兵之利未集而先致其害也况今北方之賂既厚西戎之好既講雖知信誓不可卒保嗷嗷蒼生咸望帖泰而都畿之下先自擾之根本不寧四方何所望哉昔魏侯恃險吳起以為失詞宣王料民山甫言其害政惟是二者皆古今之所戒而安危之所起願陛下捨此二䇿别議逺圖之術二䇿竟不果行罷置府兵已附三年九月丁夘乃十事之七也靖言不得其時因韓范請修京城附此先是鄭戩奏修水洛城乞令韓琦不預商量琦言臣嘗患臣僚臨事多避形迹致賞罰間或有差誤因退思之臣任西邊及再任宣撫首尾五年只在涇原秦鳯兩路於水洛城事比他人知之甚詳今若隠而不言復事形迹則是臣偷安不忠有悞陛下委任之意臣是以不避誅責輙陳所見利害凡十三條大略言水洛左右皆小小種落不屬大朝今奪取其地於彼置城於元昊未有所損於邊亦無益一也緣邊禁軍弓箭手連年借債修葺城寨尚未完備今又修此城堡大小六七計須二年方可得成物力轉見勞敝二也将來修成上件城堡計須分屯正軍不下五千人所要糧草並須入中和糴所費不小三也自來涇原秦鳯兩路通進援兵只為未知得儀州黄石河路所以議者多欲修水洛城一帯城寨自近嵗修成黄石河路秦鳯兵往涇原并從腹内經過逐程有驛舍糧草若救近静邊寨比水洛逺一程若救鎮戎德順軍比水洛却近一程今水洛勞費如此又多踈虞比於黄石河腹内之路逺近所較不多四也陜西四路自來只為城寨太多分却兵勢每路正兵不下七八萬人及守城寨之外不過三萬人今涇原秦鳯兩路若更分兵守水洛一帯城寨則兵勢单弱兼元昊每来入㓂不下十餘萬人若分三四千人於山外静邊章山堡以來出沒則兩路援兵自然阻絶其城寨内兵力單弱必不敢出城不過自守而已如此枉費功力臨事一無所濟况自來諸路援兵極不過五六千人至一萬人作節次前來只是張得虛聲若先為賊阨其來路必應援不及若自黄石河路則城隔隴山不能抄截五也自隴入秦州由故關路山阪險隘行兩日方至清水縣清水北十里則和爾揚寨自清水又行山路兩日方至秦州由此觀之秦州逺在隴關之外最為孤絶其東路隔限水洛城一帯生户道路不通秦州恃之以為籬障只備西路三都口一帯賊馬來路今若開水洛城一帯道路其城寨之外必漸有人烟耕種蕃部等更不敢當道住坐姦細之人易來窺覘賊若探知此路􅊭快将來入㓂分一道兵自和爾揚寨扼斷故關及水洛則援兵斷絶秦州必危所以秦州人聞官中開道皆有憂慮之言不可不知六也涇原路緣邊地土最為膏腴自來常有弓箭手家人及内地浮浪之人詣城寨官員求先刺手皆候有空間地土摽占謂之強人此輩只要官中添置城寨奪得蕃部土地耕種又無分毫租稅緩急西賊入寇則和家逃入内地事過之後却前首身所以人數雖多希得其力又商賈之徒各務求屬扵新城内射地土居住取便與蕃部交易昨來劉滬下倡和修城之人盡是此軰扵官中未見有益七也涇原一路重兵皆在渭州自渭州至水洛城凡六程若将来西賊以兵圍脅水洛城日夕告急部署司不可不救少發兵則不能進前多發兵則與前來葛懷敏救定川寨覆沒大軍事體一般所以涇原路患在添置城寨者一恐分却兵馬二恐救應轉難八也議者言修水洛城不唯通兩路援兵亦要彈壓彼處一帯蕃部涇原秦鳳兩路除熟户外其生户有磋庫爾珠徳古巴哩城拉家城鴟梟城古渭州康古洮河蘭州疊宕州連總噶爾青唐城一帯種類莫知其數然族帳分散不相君長故不能為中國之患又謂元昊為草賊素相仇讎不肯服從今水洛城乃其一也朝廷若欲開拓邊境須待西北無事財力強盛之時當今取之實為無用九也今修水洛城本要通兩路之兵其隴城川等大寨須藉秦鳯差人修置今秦州文彦博累有論奏稱其不便顯是妨礙不合動移十也凡邊上臣僚圗寔效者特扵選舉将校訓練兵馬修完城寨安集蕃漢以備冦之至而已貪功之人則不然唯務興事求賞不思國計故昨來鄭戩差許遷等部領兵馬修城又差走馬承受麥知微作都大照管名目若修城功畢則皆是轉官酬奨之人不期與尹洙狄青所見不同遂致中輟希望轉官皆不如意今若水洛城復修則隴城川等又須相繼興築其逐處所差官員将校人人只望事了轉官豈肯更慮國家向去兵馬糧草之費十一也昨者涇原路抽囘許遷等兵馬之時只築得數百歩例各二尺以來其劉滬慿恃鄭戩輕視本路主帥一面興工不止及至差官交割又不聽從此狄青等所以収捉送禁奏告朝廷今來若以劉滬全無過犯只是狄青尹洙可罪乃是全不計修水洛城經乆利害只聼鄭戩等爭氣加誣則邊上使臣自此節制不行大害軍事十二也陜西四路唯涇原一路所寄尤重蓋川原平闊賊路最多故朝廷委尹洙狄青以經略之任近西界雖遣人議和自楊守素囘後又經月餘寂無消耗環慶等路不住有賊馬入界侵掠今已五月去防秋不逺西賊姦計大未可量朝廷當勸逐路帥臣豫作支吾今乃欲以偏禆不受節制為無過而却加罪主帥寔先事體未順十三也詔劄與魚周詢程戡等而周詢及戡已先具奏修城之利且言水洛城今欲畢工惟女牆未完棄之誠可惜宜遂令訖役乃詔戡等卒城之丁卯遣内殿崇班陳惟信往涇原路催修水洛城韓𤦺十三條據司馬光記聞稱今已五月必是五月初所言而五月六日丁卯已遣陳惟信往涇原催修城盖魚周詢程戡等先言修城之利奏到在𤦺言後一兩日間故朝廷雖以琦言劄付周詢戡等及周詢戡奏到即從其請遣惟信催修城也記聞稱五月十六日詔戡等卒城水洛蓋誤以初六日為十六日今改之贈興元府都監内殿崇班張詔亮為佐驍衞将軍嘉州刺史以其捕光化軍賊死事也戊辰禮賔副使知鄜州劉兼濟為供備庫使梓䕫路鈐轄左侍禁閤門祗候李顯為西頭供奉官遂州駐泊都監以備敵人也兼濟㝷徙知鎮戎軍十二月乙卯兼濟自鎮戎徙環慶鈐轄彼有注辨實録之誤兼濟平弟桂陽監進士廖革應募深入蠻洞討擊殺蠻三十一人提㸃刑獄楊畋奏其状詔以革為右班殿直捉殺蠻賊己巳徙知慶州孫沔知渭州尹洙知慶州用歐陽修之議也庚午御崇政殿録繫囚忻州地震西北有聲如雷壬申幸國子監謁至聖文宣王有司言舊儀止肅揖而上特再拜賜直講大理評事孫復五品服又幸昭烈武成王廟遂幸玉津園觀種稻燕從臣賜園卒錢帛尋召復為邇英閤祗候說書楊安國言其講説多異先儒乃罷之癸酉司勲員外郎吕紹寧請以見行編敕年月後續降宣敕令大理寺檢法官依律門分十二編以頒天下庶便扵檢閲而無誤出入刑名從之甲戍以皇第七女為崇因保祐大師賜名懿安生才二嵗乙亥卒其母御侍馮氏也撫州上金谿縣所得生金山重三百二十四兩上初令送左藏庫而三司言瑞物宜留禁乃藏於龍圗閣瑞物庫乙亥衞尉寺丞邱濬降饒州軍事推官監邵武軍酒税上封者言濬先作詩一百首訕謗朝政言詞鄙惡兼以陰陽災變皆非人臣所宜言者傳布四方非便在杭州持服毎年赴闕逐處稍不延接便成嘲詠州縣畏懼又印書令州縣強賣以圖厚利去年朝廷以無名詩嚴敕禁捕近又有賦詠傳寫如濬使在京師必須復妄謗好人國家多事之時亦宜使邪正區别風俗純厚無容小軰敢肆輕易故有是命仍令福建路轉運提刑司常切覺察如有違越並具以聞此據會要乃五月十四日事始執政欲重誅之上曰狂夫之言聖人擇焉古有郇謨哭市其斯人之徒歟乃薄其罪此據張唐英政要丙子詔西川知州軍監罷任未出川界而卒者録其子孫一人丁丑知制誥歐陽修言臣親至河外相度移廢麟州今條其利害措置之説為四議一曰辨衆説切詳前後臣僚起請其説有四或欲廢為寨或欲移近河或欲抽兵馬以減省饋運或欲添城堡以招集蕃漢然廢為寨而不䏻减兵則不可茍能減兵而省費則何害為州且其城壁堅完地形高峻乃是天設之險可守而不可攻其至黄河與府州各纔百餘里若徙之近河不過移得五七十里而棄易守難攻之天險以此而言移廢二説未見其可至如抽減兵馬誠是邊議之一端然兵冗不獨麟州大弊乃此五寨若只減麟州而不減五寨與不減同凡招輯蕃漢之民最為寔邊之本然非朝廷一一力可自為必須令邊臣乆任漸推㤙信不限嵗年使得失不繫於朝廷之意而營緝如其家事之專方可収其逺效非二年一替之吏所能為也臣謂減兵添堡之説最近而但未得其要也二曰校存廢今河外之兵除分休外尚及二萬人大抵盡河東二十軍州以贍二州五寨為河外數百邊户而竭數百萬民財賊雖不來吾已自困使賊得不戰疲人之䇿而我有殘民歛怨之勞以此而思則似可廢然未知可存之利者二州五寨雖云空守無人之境然賊亦未敢據吾地是尚能斥賊扵二三百里外若麟州一移則五寨勢亦難存兀爾府州偏僻孤壘而自守不暇是賊可以入據我城堡耕収我土田夾河對㟁為其巢穴也今賊在數百里外沿河尚費扵防秋若使夾岸相望則泛舟踐兵終嵗常憂冦至沿河内郡盡為邊戍以此而慮則不可不存然須得存之之術三曰減寨卒以慶歴三年一年用度麟州用糧十七萬餘石草二十一萬餘束五寨用糧十四萬餘石草十四萬餘束其費倍於麟州扵一百二十五里之地列為五寨除分兵歇泊尚有七千五百人别用二千五百人負糧又有幷忻等十州軍百姓等輸納及商旅入中往來勞費不可勝言逐寨不過二十五騎廵逴伏路其餘坐無所為盖所建五寨之時本不如此寨兵各有定數建寕置一千五百人其餘四寨各止三百至五百今之冗數并是後来所增臣謂今事宜稍緩不比建寨之初然且約舊數尚不至冗費請於建寕只留一千人置一都廵檢其鎮川中候百勝三寨各留五百其餘寨兵所減者皆屯扵清寨堡以一都廵檢領之縁此堡最在近東隔河便是保徳軍屯兵可以就保徳請糧不煩輸運過河若平日路人宿食諸寨五百之卒廵逴有餘或賊馬小入則建寕之兵可以禦捍大入則清寨之兵不失應援蓋都不去百里之内非是減兵但那移就食而已如此則河外省費民力可紓四曰委土豪今議麟州者存之則困河東棄之則失河外若欲兩全而不失莫若擇其土豪委之自守麟州堅險與兵二千其守足矣所謂土豪者其材勇獨出一方威名足以畏敵又能諳敵情偽凡扵戰守不至乖謀委以一州則當視其州如家繫已休戚其戰自勇其守自堅又既是土人與其風俗情浹衆亦喜附之可使自招集蕃漢之民是外能捍賊而戰守内可緝民寔邊省費減兵無所不便不比扵命吏而往凡事仰給扵朝廷利害百倍也然必用土豪非王吉者不可吉見在建寕寨蕃漢依吉而耕者已百家其材勇素已知名况其官序自可為知州一二年間視其功效茍能善守可以世任之使為捍邊之臣惟朝廷裁擇戊寅詔淮南比年榖不登今春又旱蝗其募民納粟與官以備賑貸辛巳賜宜州討蠻軍士土丁特支錢壬午録潭州都監東頭供奉官張克明子惇為三班奉職愉為借職克明死蠻事故也癸未詔曰今天下並建學而所以訓導講説之人未盡有也其免舊舉人入學日限新人以故假而逼秋賦補日不足者除之若學未成者且須後本志云范仲淹罷執政意皆異故下此詔案仲淹以六月壬子出此時未罷也志誤今不取置金州通判一員省募職官一員甲申知制誥田況言近聞西界再遣人赴闕必是重有邀求朝廷前許茶五萬斤如聞朝論欲與大斤臣計之乃是二十餘萬斤兼聞下三司取往年賜元昊大斤茶色號欲為則例臣竊惑之盖往年賜與至少又出扵非時今嵗與之萬數已多豈得執之為例若遂與之則其悔有三不可不慮一則搬輦勞弊二則茶利歸賊三則北敵興辭所謂搬輦勞弊者自西事以来鄜延一路猶苦輸運之患卞咸在鄜州欲圖速效自鄜城坊州置兵車運糧至延州二年之内兵夫役死凍殍及逃亡九百餘人凡費糧七萬餘石錢萬有餘貫才得糧二十一萬石道路吁嗟謂之地獄今茶數多輦至保安軍益逺嵗嵗如此人何以堪議者欲令商旅入中可以不勞而致且商旅惟利是嗜非厚有所得則誘之不行廟堂之論本謂縑貴茶賤故賜茶五萬斤以充其數今計利者謂若令商旅入中則一縑之費未能致茶一大斤此不得不悔也所謂茶利歸賊者臣在延州見王正倫伴送元昊使人縁路巧意鉤索賊情乃云本界西北連接諸蕃以茶數斤可以博羊一口今既許扵保安鎮戎軍置𣙜場惟茶最為所欲之物彼若嵗得二十餘萬斤𣙜場更無以博易此不得不悔也所謂北敵興辭者今北敵嫚視中國自欲主盟邊功茍聞元昊嵗得茶二十餘萬斤豈不動心若縁此亦有所求必不肯與元昊等至時果能以力拒之乎此不得不悔也然朝廷初無大斤議歐陽修亦言昨者西賊来通和朝廷許物數目不少内茶一色計五萬斤縁中國茶法大小斤不同當初擬議之時朝廷謀慮不審不曾明有指定斤數竊慮西賊通和之後須要大斤若五萬斤大斤是三十萬小斤之數如此則金帛二十萬乃五十萬物真宗時契丹大舉至澶州只用三十萬物三十年後乘國家用兵之際兩國交争方添及五十萬今元昊一隅之敵一口便與五十萬物臣略言為國家大患一兩事不知為國計者何以處之三十萬斤之茶自南方水陸二三千里方至西界當今民力困之陛下不恥屈志就和本休息民力若嵗搬輦不絶只此一物可使中國公私俱困此大患一也計元昊境土人民嵗得三十萬茶其用已足然則兩𣙜場捨茶之外須至别将好物博易賊中無用之物其大患二也契丹嘗與我為敵國指元昊為小邦若見元昊得物之數與彼同則須㬰要増添何以應副不過云茶不比銀絹本是麄物則彼亦須要十萬大斤中國大貨利止扵茶鹽而已今西賊一嵗三十萬北敵又要三二十萬中國豈得不困此其大患三也昨與西賊和之初大臣急欲事就不顧國家利害惟恐許物不多及和議将成契丹語洩兩府方有悔和之色然許物已多不可追改今幸有此一事尚可罷和臣乞陛下特召兩府大臣共議保得乆逺供給四夷中國不困則雖大斤不惜若其為患如臣所料不至妄言即乞早議定計乙酉諫官余靖言自古盗賊為患未嘗不赦其脅從而誅其首惡與其勝之不若安之今湖南之賊首惡者不過百人餘皆脅從之民官軍殺平民以邀賞故居民不入城郭則入賊中乃得不死野無耕民則賊無所掠而刼城郭矣幸而城郭未破破一城則其惡已甚雖欲赦之不可得矣宜遣謀智循良之吏單車獨往諭以禍福逆順之理宣以㤙信而招撫之示之生路則衆可潰散賊焰宜熄矣若必欲勝之則湖南之民盡入扵賊民盡則賊盡矣招撫之術惟陛下速行之余靖論蠻事前後凡八章實録但載其第四章扵五月乙酉今並取之仍随時附見其第五章云得盖作過及陳執方殺黄捉鬼二事寔録皆無之又得盖以慶歴二年十一月賜州印四年五月又降黄敕不知作過在何事當考靖又言臣伏見廣南湖南梓州等路蠻賊騷動上煩聖慮臣竊謂皆由朝廷中外措置乖錯以起斯患惟陛下熟思臣竊聞戎瀘二郡舊管覊縻四十餘州皆以土豪累世承襲為其刺史今之聽朝命者十不存一昨者瀘州蠻首得盖戎州蠻首韋彦富皆乞郡印仍乞署官以為寵榮朝廷賜以郡印而不與其官由是怨望今者得盖作過為朝廷憂其韋彦富所乞㤙澤尚有靳吝待有憂而後憂豈若先事而憂之也又聞宜州賊首區正詞曽入蠻洞殺賊詣闕自陳其勞将帥貪功不録其績朝廷吝賞不與其恩因此怨恨歸而作賊今賊首未獲而賣卦廵官隨行人力並坐族誅何益扵事又聞湖南蠻黄捉鬼等詣衡州請降知州陳執方既已納之尋差獄官就驛勘問賊驚而走因捕殺之至今餘黨雖欲歸降懷疑不信此皆中外措置乖錯之所致也歐陽修三月䟽云邵飾等殺黄捉鬼靖此云知衡州陳執方當是一事在三年四月前伏乞朝廷以賞罰為念以威懷為意凡溪洞覊縻州縣及有生熟蕃户等處每有奏報倍加體問無令頻失事機以生兵禍所有戎州韋彦富乞官事當與檢㝷行遣并桂州勘到賣卦廵官随行人力石周應等家族亦乞特行寛貸其湖南蠻賊亦當追罪執方乃能招撫丙戍元昊始稱臣自號國主復遣楊守素来議事歐陽修言臣竊聞元昊近扵延州界上修築城壘強占侵地欲先得地然後議和故楊守素未來而占地之謀先發又聞邊将不肯力争此事所繫利害甚大臣料賊意見朝廷累年用兵有敗無勝一旦計無所出厚以金帛買和知我将相無人便欲輕視中國一面邀求賂遺一面侵占邊疆不惟驕賊之心難從寔亦扵國為害不細今若縱賊侵地立起堡寨則延州四面更無捍蔽便為孤壘而賊盡據要害之地他時有事延州不可保守若失延州則關中遂為賊有以此而言則所侵之地不可不争况西賊議和事連北敵今人無愚智皆知和為不便但患國家許物已多難為中悔若得别因他事即可絶和况此侵地是中國合争之事豈可不争臣謂今欲急和而不顧利害者不過邊臣外憚扵禦賊而内欲邀議和之功以希進用耳故不肯擊逐及争侵地盖小人無識只苟圖目前榮進之利不思國家乆逺之害是國家屈就通和只與邊臣為一時進身之計而使社稷受無涯之患陛下為社稷計豈不深思大臣為社稷謀豈不極慮伏望遣一介往延州令龎籍力争取昊賊先侵之地不令築成堡寨若縁此一事得絶議和則社稷之福也臣仍慮西賊来人尚有青鹽之説此事人人皆知不可許亦慮小人無識急扵就和者尚陳鹽利以惑聖聰伏望聖慈不納浮議此奏不知日月因楊守素来附見然修此時已使河東當考丁亥詔西京諸陵所用祀羊毋得抑配人户己丑省河南府潁陽夀安偃師緱氏河清五縣並為鎮逐鎮令轉運司舉幕職州縣官使臣兩員監酒税仍管勾烟火公事又析王屋縣𨽻河南府始用参知政事范仲淹議也此即仲淹等所上十事其八曰減徭役也已見三年九月乙卯鄜延經略司言西賊冦青澗城宣武副都頭劉岳等與戰敗之詔功第一遷兩資次遷一資
