body:
  text: 續資治通鑑長編卷二百四十一宋李燾撰神宗熙寧五年十二月乙亥朔詔罷諸路上供科買以提舉在京市易務言上供薦席黃蘆之類六十色凡百餘州不勝科擾乞計錢數從本務召人承攬以便民也詔賜王韶御製攻守圖行軍環珠武經總要神武祕略風角集占四路戰守約束各一部仍令秦鳳路經略司抄録丙子詔曰荆湖溪洞中亡命之人今日以前罪無輕重皆釋之如願居本處或欲歸本鄉各從其便如能自效顯有勞績令章惇等保眀等第酬奬若敢創造事端扇搖人户即捕斬以聞先是知辰州石鑑言昨被旨同章惇措置兩江蠻事嘗遣侍禁李資等多方以朝廷威德鐫諭諸蠻今資等言南江蠻人雖各有歸化之意而溪洞多有向時亡命之人阻隔蠻情雖以曉諭許與放罪尚慮懷疑扇惑别致中變故有是詔李資事具六年正月魏泰東軒録云越州僧願成客京師能為符籙禁咒時王雱幼小夜啼用成咒而止雱雖德之然性靳嗇會章惇察訪荆湖南北二路朝廷有意經略溪洞或云蠻人行南法畏符籙雱即薦成于章章至辰州先遣張裕李質入夷中及成等入南江受降欵裕等至洞而穢亂蠻婦蠻酋田元猛等不勝其憤盡縛來使刳斫于柱次至成摶頰求哀元猛素事佛乃不殺裸而遣之願成不以為恥乃更乘大馬擁斧以自從稱察訪大師猶以入洞之勞得紫衣師號此可考李資事詔差官檢視陜西武備從知華州吕大防請也大防因山崩陳私憂者三過計者一以為三路京東人情剽悍最宜先慮緣邊則有城池兵械可恃之具而內郡武備素隳將帥多未選擇乞精揀三路京東守臣密付方略姑令以備邊界為名講論守禦之策若政事稍涉撓動人情者一切緩之以俟他日庶使姦猾好亂之人無所窺伺萬一有不虞則吾亦有以待之也丁丑詔以知太原府劉庠所根括欣麟州寧化軍可耕地招置弓箭手戊寅詔崇奉聖祖及祖宗陵寢神御寺院宫觀免納役錢編修三司令敕所言伏見齋醮式有溫成皇后張皇后秦晉國夫人周太祖世宗梁王宣懿皇后柴太后等忌日齋祭朝廷已為周立後奉祭享不絶而溫成皇后於禮不當有忌乞並廢罷上曰溫成皇后仁宗朝所行日月未逺朕所不忍王安石等對曰嘉祐中諫官楊畋以久雨隂沴言宗廟之禮恐有未順且言城南立溫成廟四時諏日祭奠以待制舍人攝事牲幣裸獻登歌設樂並同太廟之禮蓋當時有司失於講求略無典據昔商宗遭變飭已思咎祖已訓以典祀無豐于昵况以嬖寵列於秩祀非所以享天心奉祖宗之意也遂改溫成廟為祠殿嵗時遣宫臣行事薦以常饌其忌日齋祭在典禮無聞宜如令敇所陳罷去從之己卯河北京東路提舉鹽稅水部郎中王伯瑜為司門郎中再任以嵗課增羡也鹽稅司事始當考河州歸順蕃部首領楞占訥芝為右侍禁充結河一帶蕃部巡檢太常丞樞密院檢詳刑房文字劉奉世為集賢校理以上批奉世自擢置樞掾奉職不茍故也王安石白上曽孝寬等體量河東團保甲散馬至欣州適會教義勇千五百人作三畨召見諭以朝廷所立法無一人不欣然乞如此施行又言河東人至以團保甲散馬謳歌古人以謳歌察民情所在而鼓舞之樂所為作也上曰人情好兵安石曰人情大抵好勝先王能養其勝氣故可以使之征伐上曰河東人惜財物不憚征役可使安石曰義可以使君子利可以使小人陛下誠操義利之權而施之不失其當賢若孔子不肖如盜跖皆可使豈但河東人也安石又嘗為上言吳審禮巡按保甲上畨還言上畨人多願留其較藝獲賞厚人極歆豔習武技至忘寢食上悅曰制法當使人樂趨而競奮太祖因諸營戰勝有功乃令各營升俸廩此人所以樂戰也今虎翼定奉錢五百人何所勸安石曰乃者非但兵也至於士大夫亦各自計資級資級所當得不以為恩若稍稽留便生觖望及陛下稍分别才否陟黜不復盡用資序士大夫乃粗知有勸此據兵志第二卷增入志無年月神宗寶訓係之五年且云安石為上言非吳審禮所奏也今附曽孝寬言河東人悅團保甲散馬後庚辰右諫議大夫沈立等上新修審官西院敇十卷詔賜銀絹有差壬午前禮部尚書平章事集賢殿大學士陳升之除檢校太傅同平章事樞密使大敇繫銜文彥博下遣內侍齎詔往賜仍趣令赴闕要録樞密使下有初上問王安石何以處升之安石曰非臣所敢預固問之固辭上曰與郡可乎安石曰升之以人望亦可驅使顧陛下御之如何耳恐不當與郡王安石言麟府兵可省今內地人習兵足恃極邊又有堅城即雖兵少西人無敢犯之理上恐兵少西人侵寇民不安居安石曰與弱國通和厚與之財物乃更不免其侵寇又不徹備即與和何補但有侵寇即急切與之理會彼自不敢兵法以為無所不備即無所不寡能有所不備者知敵之情故也今不料敵情即豈免無所不備今日之事麟府不須厚為兵備於無事時省兵以紓民愛惜財榖以實邊乃所以待有事也臣愚以為西事但應接不失計即雖元昊復生尚無能為何况如今秉常孱弱上曰慶厯中麟府不過萬人今乃二萬人誠可省但得城寨堅完即可無虞安石曰要城寨堅完此豈難事但令沿邊將吏知朝廷詔令常惕懼不敢茍且即城寨自然堅完乙酉詔廢河東太原監選本監可披甲馬募義勇願養馬者給之如開封府界保甲例以户下稅糴折充草粟不足即通折别户仍許裏私收折腳價錢如義勇願自買馬及以私馬印入官者亦如府界給價錢其養馬之數毋過本監舊額馬不可給義勇者以給下軍及馬鋪其孳息牝牡就便以給河北監牧仍以緣邊次邊空間牧地招置弓箭手見佃牧地人願充弓箭手者聽其餘地所收租撥入轉運司從河東路經略監牧使劉庠請也丁亥司封員外郎直史館蔡延慶為天章閣待制秦鳳等路都轉運使馮京初欲用劉瑾王安石曰百司方賴瑾提舉未宜差出王圭言延慶可用安石亦稱之且曰延慶嘗修注宜與待制上從之判秦州宣徽南院使檢校太尉吕公弼判河陽王韶取熙河公弼以本路帥遷檢校太尉公弼自言無功不敢受不聽會疾作求內徙故有是命尋改為西太一宫使西太一使在眀年二月權秦鳳等路轉運使司封郎中直集賢院張詵直龍圖閣知秦州詔熙河路都巡檢三員各差軍馬千人往根括緣邊州軍不該歸業逃田招弓箭手知太原府劉庠言夏國與董戬結親上曰外夷合從亦可慮王安石曰但當修政刑令中國安強外夷合從非所憂上曰孟子言小固不可以敵大合從則大大則難制安石曰孟子所謂小固不可以敵大者謂地醜德齊者言之故齊以一服八則不能若克修其政刑則王不待大故曰以齊王猶反手也湯以七十里文王以百里豈復計小大又為上言唐兩戎合從犯中國郭子儀以一言伐其交陛下能用郭子儀之徒為將帥則外夷之交固可伐而離之也上曰郭子儀豈易得安石曰有天下之大所患者非子儀之徒難得也要分别君子小人而已又為上言曹操與袁紹相抗紹地大兵衆操寡弱自不敢保勝紹然荀彧逆知操必勝紹者以操眀勝紹機勝紹決勝紹故也既而安石又白上王中正言郢城嘉卜力足敵董戬董戬與夏人結昏欲以兵援送借道於嘉卜界內嘉卜以為夏董交昏即我孤立於兩間素與董戬為讐必被攻襲眀告夏人如此我必歸漢亦遣人至王韶處王韶未敢許納臣以為宜令韶相度事機以利害諭董戬令絶昏宜聽因可以施德於嘉卜收異時之用上以為然文彥博請召王中正問狀乃行下許之日録載此事於十二月二十五日今附見己丑知太平州翰林侍讀學士給事中張瓌奪一官坐三舉官不當也四年九月壬辰嘗坐舉官不當奪官御史盛陶言兵部員外郎判流內銓李復圭昨守慶州驕衆輕敵以敗國事初西人領衆號十萬築納斡堡復圭合漢蕃兵才三千士非素練勞逸又不敵而復圭輕脫迫遣偏將李信劉甫种詠等連夕出兵信等告以大兵未聚衆寡不敵復圭威以節制親畫陳圖以授之信等不獲已進兵遇敵即潰殺傷極多復圭急於自解即拘信等於寧州抽取經略司節制文字獄官希旨回護主帥專劾信等復圭又誣之以違節制以此詠死獄中斬信與甫而流配郭貴等寃魂怨骨銜恨無窮始復圭敗事恍惚謬欲以劫掠之功為幸免之計復出兵印州堡夜入西界蘭浪和市劫掠老小數百增飾事狀論功告捷朝廷為之賞林廣姚兕趙餘慶等又遣兵夜襲金湯會西人已去所殺惟老小一二百人大斂邊怨己而全無斥堠致羣醜嘯聚有酬賽之心鄰路城堡皆警備待敵而復圭庸騃自如賊兵已圍大順諸壘方稍追集邠寧等兵處置乖方故陷郭慶衛慶宗于業樂陷髙敏于榆林慶之屬羌蕩滅無幾正兵義勇死傷不可勝數置之典法萬死猶輕朝廷全其首領止令安置議者至今惜之陛下寬赦聽還近職使復圭稍知亷恥當俯伏引咎以謝生死肉骨之惠乃敢具奏乞賞打劫蕃部時麾下偏禆文過飾非僥幸萬一以夜襲為晝戰謂敗卒為勝兵又有言不能要結中人以致怨謗交作公然傳播玷纍上德豈典刑獨行於李信劉甫而能廢於復圭乎乞置之散地以協公議上語陶曰卿知李信劉甫所受劍否即復圭當受陶曰陛下不誅復圭今日思之不能無悔復圭在朝又將謀帥臣恐陛下後日之悔有甚於今日上曰朕向者不知今日盡知之自有處置乃詔永興軍路提點刑獄周良孺根究以聞陶又言復圭罪狀眀白乞先罷復圭判流內銓然後令良孺與知慶州楚建中同根究從之元祐史官既於五年十二月己丑書盛陶疏又於六年四月乙未書之其疏則同但文稍詳耳朱史削己丑所書并書于乙未日且刪去上語上語安可刪去也蓋王安石主李復圭故史官私為安石諱耳今復存之陶疏則但存其一先是復圭酬奬將官李克忠金湯戰功樞密院言金湯之役復圭盡取趙餘慶所得首級繫之克忠其自洛河川歸慶州克忠兵又中道為敵衝斷有當時轉運使孫坦體量狀及知延州郭逵奏具在上怒復圭詐妄王安石獨眀其不然曰復圭雖得罪克忠等功自當賞上曰餘人已賞之矣克忠乃别坐罪安石曰案復圭劄子論一行將官等不為克忠一人就令克忠一人有罪罪自論罪功自論功陛下斷克忠罪太重克忠不合取蕃部甲原情固與取玉帛子女入已不同克忠所以獲罪太重者正坐平時人浸潤復圭以為阿黨克忠克忠無能又作過壞邊事故常含怒以待之適會事發故特被重斷且陛下為人浸潤遊説所誤非但此一事如王廣淵慶州兵變廣淵撫定有功乃降兩官如种診得朝旨令通消息與西人議和惟不合擅牒韋州原情有何深罪乃追一官又追奪候二年與閣門副使指揮始時衆議紛然深咎种診以為當令分析者疑此事出於廣淵故也及分析到略不干廣淵事陛下以人言衆遂行遣种診如此論者謂种診緣貪功故纍國體臣愚以為妨功慢命即不可容若趣赴政令務成事功縱有過失豈可深罪上曰當時方欲與西人議和种診遽牒去恐西人因此更旅拒安石曰臣愚以為若中國自修政事西人和與不和非所議縱度時宜欲與之和何患西人旅拒陛下斷王廣淵种診罪如此杜純親被旨勘王韶事陛下無故與轉一官固己非理及其奏報欺謾皆杜純奏狀內自見非因人媒孽糾摘然陛下遲疑令候服闋日行遣臣力辨論然止於衝替而已不知陛下謂种診之罪與杜純孰重原兩人之情孰為欲沮壞政事上曰种診但欲了事耳有何罪安石曰如郭逵之罪固不可與王廣淵同日而論王廣淵降兩官郭逵乃止降一官上曰為宣徽使重故也安石曰宣徽使非郭逵所有乃陛下所與兹為天官天官重則報禮亦宜重今逵乃敢如此而陛下譴之止於如此何足以馭羣臣人固有恥其君不如堯舜若撻于市者如此等人豈有肯為不義煩陛下威怒如逵者乃曽盜官肉決杖豈可以待有道君子之道待之惟知畏懼乃可驅使陛下以為逵材亦可用故愛惜之不欲深責臣恐但長逵驕陵不復為用安石言此大抵專為復圭道地也既而復圭乞降御史所言分析上曰已委官體量虛實當自見安石曰但劄與令分析若有理固陛下所欲聞若無理即復圭更有上書不實之罪上乃許之其後安石又請以復圭所分析事狀送建中等上亦許之安石辨李克忠功罪日録在十二月初以盛陶章傳李復圭在二十三日今并書之盛陶再論復圭實録在二十三日以復圭分析送建中等據日録在眀年正月十一日今亦并書之龍圖閣學士給事中李中師前知河南府時朝廷初令民出錢免役中師率先諸州推行富弼告老家居中師籍其户等令與富民均出錢希司農意指多取寬剩比它處獨重洛人怨之中師頗厚結中人庚寅召入為羣牧使先是河南北置監牧使分典國馬中師言養馬費重請罷所置使而養馬於民不報其後卒廢南北兩監牧罷使者上問王安石曰蔡挺得景思立書言入武勝軍非因糧即大狼狽不知今有備否安石曰王韶約至來秋乃舉事今蕃部既接續內附摩正無復能為縱少遲亦無可虞之變上曰河州與蘭州相鄰此可虞也安石曰秉常必無能為但不侵迫彼國必不敢妄作上因言夏人善戰安石曰夏國安能用兵但中國未修紀律故爾如昨者慶州即可見老弱至多都無部分上曰此非其精兵如魏太武驅老弱當敵非其所惜安石曰秉常豈魏太武之比夏國來寇恃衆而已若能潰其老弱精兵豈能獨留上曰夏國屢敗契丹安石曰契丹雖大而無能以當元昊宜其敗上曰諒祚亦能敗契丹諒祚為國主能以身先士衆犯矢石所以能率其衆勝契丹上又曰中國亦未嘗能勝契丹安石曰勝契丹當有素定計略如陛下今日但憂契丹移口鋪與之計校巡馬恐終無以勝契丹也壬辰太子中允集賢校理同修起居注吕惠卿同檢正中書五房公事提舉淮南西路常平司言濠州鍾離縣長安堰定逺縣楚漢泉二堰水利至博積年堙廢久未完復乞依宿亳泗州例賜常平錢榖春初募人興修詔轉運副使楊汲覆視如可興修即本司官提舉乙未知制誥陳繹曽布並為翰林學士初吕惠卿既除都檢正欲布罷職王安石固請留布曰得兩人協濟則臣愚短庶幾寡過上許之及是又欲留布上曰學士職任髙不可為宰屬安石又請留布修中書條例上曰惠卿吏文尤精密不須留布也安石乃己起居舍人史館修撰兼樞密都承旨羣牧副使曽孝寬為龍圖閣待制同羣牧使王安石始欲除孝寬知制誥上曰恐孝寬作文字非所長故有是命太子中允集賢校理同修起居注吕惠卿為右正言知制誥祕書丞集賢校理章惇同修起居注詔京西路差廂軍一千人永興秦鳳等路二千人修築熙州南北關及諸堡寨丙申知亳州太常少卿孫琳罷理三司副使資序知眀州太常少卿趙諴奪一官並勒停鎮安節度使知鄧州李璋降授振武軍節度使知郢州俸給依初除例皆坐舉李守蒙也李守蒙事在閏七月三日或并入彼右監門衛大將軍叔蹤右千牛衛將軍叔吳各奪一官叔蹤坐誣告其弟叔吳坐不告母而還出婢也仁宗修儀楊氏卒贈賢妃王安石為上言三司節略吕嘉問起請儀鸞司供內中綵帛文字却奏云為礙吕嘉問起請乞指揮其意蓋以內東門索綵帛作禁中上元而嘉問起請致妨闕欲中傷嘉問且歸咎於中書立法此事不可不察也上笑曰副使判官為誰曰王克臣晏知止上曰如何行遣安石曰欲送吏人開封府勘斷副使判官具與上簿上從之安石曰如此等事非陛下恭儉節用人臣豈敢如此立法臣見陛下於殿上蓋氊尚御批減省以此知不肯用上等匹帛縻費於結絡上曰本朝祖宗皆愛惜天物不肯橫費如此縻費欲何為漢文帝曰朕為天下守財爾安石曰人主若能以堯舜之政澤天下之民雖竭天下之力以奉乘輿不為過當守財之言非天下正理然陛下聖心髙逺如紛華盛麗無可纍心故安於儉節自是盛德足以率勵風俗此臣所以不敢不上體聖心也丁酉詔留知府州折繼祖荒莊地候春首標撥與歸順蕃部從經略司之請也上問王安石曰見王中正否安石曰見之問何言安石曰中正言熙河人情甚喜蕃酋女子至連袂圍繞漢官踏歌言自今後無讐殺有買賣快樂作得活計不被摩正來奪人口牛馬也上曰邊事須委付不可擾之王韶等不怕西邊事宜却怕東邊事宜每得朝旨或不應事機即人情疑沮安石曰熙州事陛下一一應副無違不知更有何事致人情疑沮昨者韶亦無説方克武勝人人望功賞乃有朝中人書報韶將以城還摩正人情大假疑沮王圭曰此必是聞吳充奏乞以城還摩正事上曰由此觀之事皆在廟堂安石曰事不在廟堂乃皆在聖心聖心辨君子小人情狀分眀不為邪説所蔽即無事不成天授陛下利勢自秦以來未有如今日人民蕃庶內外無事天下四鄰一皆庸愚疲弱無可警之敵且又天錫陛下聰眀亦自秦漢以來鮮及若每以道揆事了無不可為者尚書厯代所寶以為大訓其言乃孔子孟子所取以證事言服四鄰必先曰食哉惟時惇德允元而難任人言兼弱攻昧必先曰佑賢輔德顯忠遂良聖心誠能佑賢輔德顯忠遂良惇德允元而難任人雖有如冒頓之強敵亦非所恤也安石又白上廟堂以文書往擾邊事未若置人朝夕與之共事以沮害之此最所宜察凡付人以一方事必使之能制衆以義制衆則必有不獲逞者人懷不獲逞之心而內有沮害之臣為之應內外相合以沮害其事則忠力之臣雖欲有為必不敢有為必不成矣上批李憲特與磨勘於見寄禮賓副使上轉七資為洛苑副使仍寄資此據御集乃十二月二十四日事己亥遼主遣髙州觀察使蕭瑜廣州防禦使王惟教其母遣安東軍節度使耶律什太常卿史館修撰韓曄來賀正旦賜築州城部役都監楊從先等一十九人銀絹有差詔鼎澧州自今互差文臣權河東轉運使工部郎中孫坦屯田郎中通判河陽李師錫江南東路轉運副使屯田郎中韓鐸各奪一官坐為陜西監司體量所部使臣失實入慶州兵叛不能招安也孫坦等奪官會要云坐不能招安慶州叛兵與實録不同今兩存之贈度支員外郎范祥祕書監仍録子若孫一人為太廟齋郎用秦鳳經略使張詵議也詵以祥嘗經制古渭寨時拓土臨洮自古渭始故請褒之壬寅詔鄜延經略司應緣邊災傷城寨速體量賑濟仍相度乘人力未至飢乏募闕食漢蕃人修近便城寨及諸工役如支常平錢榖無得過二萬貫石詔諸路屯駐駐泊軍回引見如有理訴許以軍頭司自陳如輒唐突決訖降配虛妄者論如法即乞呈試武藝者凖此先是軍士引對唐突喧譁上每優容之面諭管軍原其罪仍令衛士勿擊至是始條約之是月置鎮戎軍張義堡廢梓州永泰縣綿州西昌縣為鎮是嵗河北大蝗舊紀有此六年四月二十五日可考宗室子賜名授官者四十七人天下上户部主户一千四十九萬八千八百六十九丁一千五百七十三萬四千一百九十七客户四百五十九萬二千六百九十一丁六百一十三萬三千六百五十五斷大辟三千七百九十二人
