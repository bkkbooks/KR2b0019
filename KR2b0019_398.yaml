body:
  text: 續資治通鑑長編卷三百九十四宋李燾撰哲宗元祐二年春正月甲寅朔乙卯詔以雪寒權停在京工役三日御集正月二日辛酉户部言中都吏祿嵗計緡錢三十二萬法當以坊場稅錢及免行市易司市利僧道度牒等錢充㑹元豐七年所入才二十三萬兼以係省錢乃給今議罷市易則市利錢隨廢將見闕乏因究諸司有以應給吏祿錢别費者適與所闕數相當度支以聞詔以坊場稅錢盡充利祿毋得他用殿中侍御史吕陶言伏見朝廷德惠及生民者多矣臣下聚斂之態亦已悛革惟坊場一事根株牢固條約交紊猶有餘弊未盡蠲除蓋纍界放賣至今凡十五年其始則有實封投狀競利爭占虛增價值詐通抵産之欺其中則有爭利過重月納不足出限罰錢年滿不替之患其終則有正名已敗壯保納官錢餘缺尚存鄰人買産業之禁期㑹嚴迫莭目煩多不惟酒戶緣此困窮抑亦平民因而脧削或繫獄或受箠或轉徙道路或自經溝瀆天下郡縣無處無之大率一縣之內上中等户因買坊場及充壯保而失業破産者十常四五缺多者至數十貫少者亦三五百緡以四海總計凡幾千家罹此疾苦矣每家以十口為率凡幾萬人失所矣恭惟陛下至仁博愛亦宜為之動心也昔者神宗皇帝通知此弊加意救恤於元豐三年明堂降赦及八年正月赦文纍行蠲免外仍與展限二年送納去嵗大饗亦有權住催理指揮委監司保明聞奏當議等第蠲放德澤之流非不廣厚然而此弊終未盡去者一則為有司違慢㫖法意少有疑似遂不保明二則為物輕弊重錢貨乏絶或災傷所困或兵役相仍衣食之費尚且不完至於官錢何有以納蓋緣第一界至今已十五年第二界今亦十二年往往生業蕩盡子孫淪散虛載簿書枉費刑撻嵗月已久重不聊生憔悴之餘必無可得臣愚欲望陛下推廣先志霈發異恩無逺近之差為輕重之序應第一第二界見缺者並與除放其第三第四界亦乞量立分數蠲免如此則大法簡易不為官吏之沮遏聖澤寬深遂除生靈之疲瘵又言承買場務之家抵産物業元價髙大為近年物輕幣重田宅既减價今雖拘收在官出賣之際必不依得元估官司仍於缺人身上理納餘錢極為搔擾謂如抵産一處元估一千貫今只直七百貫即更令納三百貫之類伏乞特降指揮應係因坊場沒官抵産並許依元估價直充折庶寬民力第一第二界價虛而髙第三第四界價實而低今第一第二界雖缺錢三分比之第三第四界已是增剩况無可得宜特蠲放若須候監司保明奏到方議蠲免深恐諸路遷延期限或所見不一及吏緣為姦别生事莭致使朝廷實惠未能均遍莫若只以界分逺近各與蠲减所貴德澤早及細民此疏不知何時附正月八日以坊場錢給吏祿後其從違當考先是去年十二月二十七日二十八日傅堯俞王巖叟相繼上疏論蘇軾不當置祖宗於議論間其意欲以救朱光庭也既皆不報是日正月八日辛酉堯俞巖叟又各上疏論之巖叟言臣近以學士蘇軾撰試館職䇿題不當評議祖宗因言者論之初令放罪後復收還典刑不明損國大體乞賜辨正纍上封奏至今未䝉施行臣竊以天下之事雖紛然萬端而可以執一御者惟理而已陛下天資髙明知為國之道其要在此自聽政以來未嘗以愛憎喜怒遷是非之至理故人心有恃而天下以安臣䝉被奬拔付之言責何敢不體陛下此意以圖報願陛下不惑於虛名不牽於偏說而平心以察之是非之理明若日星伏望聖慈早賜睿斷或尚有疑則乞降臣前後章疏集百官於朝堂定議如以評議祖宗為當然彈奏蘇軾為非是正臣之罪臣所不辭終不可混亂是非使天下有所惑也陛下省納幸甚壬戍右正言王覿言編類章疏二年正月九日臣竊聞近者左司諌朱光庭言學士院䇿題輕議仁祖神宗以為不可師法者初有聖㫖學士放罪及指揮到尚書省收還不下光庭繼有章疏論列未已臣雖未嘗預其事今既是非曲直久而不决臣安敢默默請為陛下一論之夫學士初有放罪指揮是朝廷以學士為本有罪也既而指揮不下是朝廷以學士為本無罪也以學士為本有罪則大臣必有以光庭之言為是者矣以學士為本無罪則大臣必有以光庭之言為非者矣有以為是有以為非則大臣之論既不同矣臣又聞言事官章疏亦或以光庭之言為然者亦或以光庭之言為不然者或以為然或以為不然則言事官之論又不同矣夫大臣與言事官之論皆不同則陛下將孰從耶臣願陛下姑置衆說取學士所撰䇿題詳察之則是非立見矣彼同異之因不足考也陛下若悉考異同之因深究嫌疑之迹則兩岐遂分朋黨之論起矣夫學士命辭有罪無罪小事也使士大夫有朋黨之名大患也凡小人欲傾害君子者必以朋黨名之然後君子可以盡去而小人可以盡得志焉今朝廷清明賢能萃衆不可因小事以生大患此陛下所當慎也臣故不敢默默而先事以獻說惟聖慈裁擇貼黃臣竊聞朱光庭之論䇿題言者既以謂因蘇軾與光庭之師程頥有隙而發矣吕陶之言朱光庭論者又謂陶與蘇軾同是蜀人而遂言光庭也故今外議籍籍以謂勢不兩全臣竊謂二人者皆不避嫌疑而已陛下若置而不問惟詳察䇿題之是非而有罪無罪專論蘇軾即黨名不起矣若因其嫌疑之迹而遂成其朋黨之名此非朝廷美事也兼執政大臣可否二人之言者尚未必同伏望陛下因執政奏陳之際而斷自聖意此臣區區之願也甲子右正言王覿又言臣前日曽有封事言蘇軾所撰䇿題是非曲直久而不决大臣之論既不同言事官之論又不同陛下將孰從耶望陛下姑置衆說取䇿題詳察之則是非立見矣臣今竊恐陛下終以衆說之不同未即與奪緣臣初不預其事士大夫與臣言者無所嫌疑獲聞公論最詳兼軾所撰䇿題臣觀之亦熟矣今更為陛下終其說臣謂原軾之意則不過設疑以發問按軾之言乃失輕重之體也軾之䇿題曰欲法仁祖之忠厚則患百官有司不舉其職而或至於偷欲法神考之勵精則恐監司守令不識其意而流入於刻又引孝文孝宣以謂不聞其有怠廢不舉之患督責過甚之失何營可以及此也用此以觀軾之本意則誠出於設疑以發問而已然孝文孝宣之治豈無弊者耶軾舉之既已過當而又憂我之有弊而慕彼之無弊則疑若仁祖神考之政不逮於孝文孝宣矣則軾之措辭豈非失輕重之體哉臣故曰原軾之意不過設疑以發問按軾之言乃失輕重之體也臣前疏所謂取䇿題而詳察之意則是非可以立見者蓋如此惟聖慈裁酌施行乙丑朝散郎杜天經權發遣開封府推官從知開封府錢協辟也詔輔臣分詣諸寺觀謝雨雪右諌議大夫鮮于侁言熙寧中以戎瀘夷漢主客户通為義勇保甲嵗以農隙教習武藝令提㸃刑獄司按閲賞勸厥後夷人不免作過而稅地遂或廢耕墾請罷之㑹知鄭州岑象求亦以為言詔本路轉運鈐轄司詳度以聞詔于闐國和罕王貢方物回賜外餘不以有無進奉悉加賜錢三十萬故夏國主秉常以遺進物遣使來貢詔其子乾順為夏國主如明道二年元昊除莭度使西平王例上與太皇太后降詔賜物悉視慶厯八年銀絹各三萬錢三萬貫之數以起居郎權樞密都承㫖公事劉奉世假直集賢院借三品服為册禮使崇儀副使帶御器械翟象先副之册曰皇帝若曰於戲堯建萬邦黎民時雍周立五等重譯來貢此帝王之所同而國家之成法也咨爾乾順惟我列聖顧乃西陲錫壤建邦衛於王室保姓受氏同於宗盟爵命褒嘉恩禮甚渥今爾承其胄緒紹茲藩屏而能事上欽肅飭躬靖䖍申遣使人來陳方物達於朕聽實惟汝嘉是用稽酌典故表顯寵名錫爾以茅土之封加爾以服乘之數誕頒丕册以綏一方今遣朝奉大夫起居郎直集賢院上輕車都尉賜紫金魚袋劉奉世崇儀副使上騎都尉安喜縣開國男食邑三百户翟象先持莭册命爾為夏國主永為宋藩輔夫篤於好德乃克顯光忠於戴君永膺福祉往祇明命無忝豫一人之猷訓詔罷諸路將下管設自今諸將嵗賜公使錢五十萬東南路軍三十萬每公使十萬造酒毋過十石嵗終有餘以繕軍器右司郎中范純禮奏瀛州防禦推官錢世雄等進狀理雪受蘇軾譏諷文字案後罰銅事元案內連坐官黃庭堅周頒顔復盛僑王汾錢世雄吳綰王安上杜子方戚秉道陳圭王鞏受蘇軾謗訕詩不繳罰銅二十斤王詵隱諱上書詐不實徒二年追兩官合牽復昨有㫖王詵訴雪文字不得收接未敢看詳三省進呈王詵以嘗追官難從矜恕黃庭堅等並特與除落是日詔傅堯俞王巖叟朱光庭以蘇軾撰試䇿題不當纍有章疏今看詳得非是譏諷祖宗只是論百官有司奉行有過令執政召逐人面諭更不須彈奏丙寅三人赴都堂右僕射吕公著門下侍郎韓維中書侍郎吕大防左丞李清臣右丞劉摯諭㫖三人者謂公著等皆知軾為有過然特欲以上意兩平之耳皆不敢奉詔丁卯三人者又各上疏巖叟言伏覩聖意周旋委曲優容臣下惟恐有傷雖天地父母無以過也臣當何以報惟知不敢愛身為陛下守官耳茍避犯顔逆鱗之誅而阿意順㫖不盡其心以事陛下則臣所不忍臣按蘇軾如聖諭非是譏諷祖宗然只以祖宗置于議論之間便是有傷大體安得以為無罪今陛下既不欲罪軾又不欲罪臣等而擬兩罷其事在慈仁兼愛之心則可謂至矣於朝廷欲以立紀綱正典刑則未為得也後日他事若更煩陛下和解則恐紀綱由此隳典刑由此廢啓僥幸之門開陵遲之端自臣等始負陛下罪不可容也陛下聽政以來未嘗有一事少差此事更願聖慈曲加思慮必有所得者臣愚不勝拳拳忠告之至貼黃臣竊聞有與軾為地曲為之辭以釋其說上欺天聽者願陛下察其出於私意不以為惑則事遂矣戊辰詔自今舉人程試並許用古今諸儒之說或出已見勿引申韓釋氏之書考試官於經義論䇿通定去留毋於老列莊子出題及舉經明行修京東西河北陜西路各五人淮南江南東西福建河東兩浙成都府各四人荆湖南路廣南東西梓州路各二人荆湖北路䕫州利州各一人委知縣當職官司同保任申監司監司再加考察以聞仍充本州解額無其人則闕之吕大防作吕公著神道碑云自熙寧四年始改科舉罷詞賦等用王安石經義以取士又以釋氏之說解聖人之經學者既不博觀羣書無修詞屬文之意或竊誦他人已成之書寫之以干進由此科舉益輕而文詞之官漸艱其選先帝以答髙麗書不稱㫖故當時以為言議者欲以詩賦代經義公著乃于經義之外益以詩賦而先經義以盡多士之能又禁有司不得以老莊之書出題而學者不得以申韓佛書為說經義參用古今諸儒之學不得專用王氏復置太官令一員從光祿卿趙令鑠言也庚午翰林學士蘇軾言臣近以試館職䇿問為臺諌所言臣初不敢深辨蓋以自辨而求去是不欲去也今者竊聞聖明已察其實而臣四上章四不允臣子之義身非已有詞窮理盡不敢求去是以區區復一自言臣所撰䇿問首引周公太公之治齊魯後世皆不免衰亂者以明子孫不能奉行則雖大聖大賢之法不免於有弊也後引文帝宣帝仁厚而事不廢核實而政不苛者以明臣子若奉行得其理無觀望希合之心則雖文帝宣帝足以無弊也中間又言六聖相受為治不同同歸於仁其所謂偷與刻者專謂今日百官有司及監司守令不識朝廷所以師法先帝之本意或至於此也文理甚明粲若黑白何嘗有毫髮疑似議及先朝非獨朝廷知臣無罪可放臣亦自知無罪可謝也然臣聞之古人曰人之至信者心目也相親者母子也不惑者聖賢也然至於竊鈇而知心目之可亂於投杼而知母子之可疑於拾煤而知聖賢之可惑今言臣者不止三人交章纍上不啻數十而聖斷確然深明其無罪則是過於心目之相信母子之相親聖賢之相知逺矣德音一出天下頌之史册書之耳目所聞見明智特達洞照情僞未有如陛下者非獨微臣區區欲以一死上報凡天下之為臣子者聞之莫不欲碎首糜軀效忠義於陛下也不然者亦非獨臣受曖昧之謗凡天下之為臣子者聞之莫不以臣為戒崇尚忌諱畏避形迹觀望雷同以求茍免豈朝廷之福哉臣自聞命以來一食三歎一夕九興心口相謀未知死所然臣所撰䇿問似實亦有罪若不盡言是欺陛下也臣聞聖人之治天下也寬猛相資君臣之間可否相濟若上之所可不問其是非下亦可之上之所否不問曲直下亦否之則是晏子所謂以水濟水誰能食之孔子所謂惟豫言而莫豫違足以喪邦者也臣昔於仁宗朝舉制科所進䇿問及所答聖問大抵皆勸仁宗勵精庶政督察百官果斷而力行也及事神宗䝉召對訪問退而上書數萬言大抵皆勸神宗忠恕仁厚含垢納汙屈已以裕人也臣之區區不自度量常欲希慕古賢可否相濟蓋如此也伏覩二聖臨御以來聖政日新一出忠厚大率多行仁宗故事天下翕然銜戴恩德固無可議者然臣私憂過計常恐百官有司矯枉過直或至於偷而神宗勵精核實之政漸致隳壞深慮數年之後馭吏之法漸寬理財之政漸踈備邉之計漸弛而意外之憂有不可勝言者雖陛下廣開言路無所諱忌而臺諌所擊不過先朝之人所非不過先朝之法正是以水濟水臣竊憂之故輒用此意撰上件䇿問實以譏諷今之朝廷及宰相臺諌之流欲陛下覽之有以感動聖意庶幾兼行二帝忠厚勵精之政也臺諌若以此言臣朝廷若以此罪臣則斧鉞之誅其甘如薺今乃以為譏諷先朝則亦踈而不近矣且非獨此䇿問而已今者不避煩瀆盡陳本末臣前嵗自登州召還始見故相司馬光光即與臣論當今要務條其所欲行者臣即答言公所欲行者諸事皆上順天心下合人望無可疑者惟役法一事未可輕議何則差役免役各有利害免役之害掊斂民財十室九空錢聚於上而下有錢荒之患差役之害民常在官不得專力於農而貪吏猾胥得緣為奸此二害輕重蓋略相等今以彼易此民未必樂光聞之愕然曰若如君言計將安出臣即答言法相因而事易成事有漸則民不驚昔三代之法兵農為一至秦始分為二及唐中葉盡變府兵為長征之卒自邇以來民不知兵兵不知農農出穀帛以養兵兵出性命以衛農天下便之雖聖人復起不能易也今免役之法實大類此公欲驟罷免役而行差役正如罷長征而復民兵蓋未易也先帝本意使民户率出錢專力於農雖有貪吏猾胥無所施其虐坊場河渡官自出賣而以其錢雇募衙前民不知有倉庫綱運破家之禍此萬世之利也决不可變獨有二弊多取寬剩役錢以供他用實封爭買坊場河渡以長不實之價此乃王安石吕惠卿之隂謀非先帝本意也公若盡去二弊而不變其法則民悅而事易成今寬剩役錢名為十分取二通計天下乃及十五而其實一錢無用公若盡去此五分又使民得從其便以布帛穀米折納役錢而官亦以為雇直則錢荒之弊亦可盡去如此而天下便之則公又何求若其未也徐更議之亦未晚耳光聞臣言以為不然臣又與光言熙寧中常行給田募役法其法以係官田及以寬剩役錢買民田以募役人大略如邊郡弓箭手臣時知密州推行其法先募弓手民甚便之此本先帝聖意所建推行未幾為左右異議而罷今略計天下寬剩錢斛約三千萬貫石兵興支用僅耗其半此本民力當復為民用今內帑山積公若力言於上索還此錢復完三千萬貫石而推行先帝買田募役法於河東河北陜西三路數年之後三路役人可减大半優裕民力以待邊鄙緩急之用此萬世之利社稷之福也光尤以為不可此二事臣自别有畫一利害文字甚詳今此不敢備言及去年二月六日敕下始行光言復差役法時臣弟轍為諌官上疏具論乞將見在寬剩役錢雇募役人以一年為期令中外詳議然後立法又言衙前一役可即用舊人仍一依舊數支月給重難錢以坊場河渡錢總計諸路通融支給皆不䝉施行及䝉差臣詳定役法臣因得伸弟轍前議先與本局官吏孫永傅堯俞之流論難反復次於西府及政事堂中與執政商議皆不見從遂上疏極言衙前可雇不可差先帝此法可守不可變之意因乞罷詳定役法當此之時臺諌相視皆無一言决其是非今者差役利害未易一二遽言而弓手不許雇人天下之所同患也朝廷知之已變法許雇天下皆以為便而臺諌猶纍疏力爭由此觀之是其意專欲變熙寧之法不復校量利害參用所長也臣為中書舍人刑部大理寺列上熙寧以來不該赦降去官法凡數十條盡欲删去臣與執事屢爭之以謂先帝於此蓋有深意不可盡改因此得存留者甚多臣每行監司守令告詞皆以奉守先帝約束毋敢弛廢為戒文案具在皆可復按由此觀之臣豈謗議先朝者哉所以一一縷陳者非獨以自明誠見士大夫好同惡異泯然成俗深恐陛下平居法宫之中不得盡聞天下利害之實也願因臣此言警䇿在位赦其所偏損所有餘補所不足天下幸甚若以其狂妄不識忌諱雖賜誅戮死且不朽辛未傅堯俞王巖叟入對論蘇軾䇿題不當曰漢唐以來多少䇿題無有將祖宗與前代帝王比量長短者䇿題云欲師仁宗之忠厚則患百官有司不舉其職若當時百官有司皆不舉其職不知仁宗在上却何所為乃是全然荒怠致得百官有司如此果如此因何成得四十二年太平至今耆老言之猶往往流涕仁宗何負却言不如漢文堯俞既讀劄子竟太皇太后曰此小事不消得如此且休對曰此雖數句言語緣繫朝廷大體不是小事須合理㑹又曰蘇軾不是譏諷祖宗對曰若是譏諷祖宗則罪當死臣等不止如此論列既只是出於思慮言詞失輕重有傷事體亦合略有行遣譬如誤入禁門於法罪亦不可輕何則君臣上下之分不可不嚴也今若不以此事為戒他日有一人指斥乘輿而云本出於誤亦可恕否陛下雖欲恕之七廟威靈在上豈得容恕昨執政於都堂對臣等皆言蘇軾不是既知不是豈可却教朝廷做不是底事又豈有朝廷明知不是却抑言事官要休若尋常人私事則可休朝廷事則不可如此臣等為朝廷持風憲若凡所論奏常指揮令休要將安用耶是臣等壞却風憲更有何面目居職真宗朝知制誥張秉撰一叙用官制辭云頃因微纍謫於荒遐真宗覽之曰如此則是先帝失政遂罷其職今所論蘇軾若是臣等分上私事則可休事干祖宗干朝廷臣等如何敢休朝廷若不行破書在史册後世視朝廷如何哉𫝊入逺方必有輕慢朝廷之心萬一遼使發問不知如何作答乃曰言事官有黨此朱光庭私意卿等黨光庭耳光庭未言時何故不言皆對曰有一人論之且觀朝廷行不行中間或有差失方當繼言昨朱光庭初言朝廷有放罪指揮則是朝廷行遣得正自不須言後見反汗又是非顛倒臣等方各論奏巖叟因於袖中取軾所撰䇿題就簾前指陳未終簾中忽厲聲曰更不須看文字也巖叟又進讀劄子簾中極不以為然堯俞曰如此是太皇太后主張蘇軾又厲聲曰太皇太后何故主張蘇軾又不是太皇太后親戚也巖叟曰陛下不主張蘇軾必主張道理願於道理上斷事適䝉宣諭言事官有黨臣等不知有黨無黨但只據事之是非論列陛下亦只合看事如何若心疑於有黨則必失事之實既失事之實即是非難辨自古小人欲傾害君子者君子無過别無可以奈何惟是指為朋黨人主遂疑人主既疑因而可擠矣陛下不可不察也此事是蘇軾輕易不思語傷大體以致議論若不正其罪則此失却在陛下陛下何苦力主此人反自取後世譏誚臺官之職只在觸邪指佞豈當却為人解紛此意可察簾中曰䇿題是裏面㸃去對曰聞是進入三首䇿題其兩首是鄧溫伯撰最後一首是蘇軾撰陛下已愛其虛名故㸃軾所撰者必然不曽反覆詳覽則雖是㸃中於陛下何傷今既分别得事理明白陛下已知其虛名不欲加罪是惑也陛下今不欲人言軾之短假令司馬光在政事或失不知合論與不合論臣等所職是言責所論只據是非更不敢問其人問著人則須生私意曰今日改先帝事何故不得問對曰修改政事與形於文字不同兼今日所改政事皆是復祖宗舊法况陛下下詔求民間疾苦者力改之乃所以承祖宗之美不知䇿題須得論耶不須得論耶陛下如此主張臣等却如此力言違忤陛下以就罪責不知臣等是何意陛下可體察况臣等與軾皆熟素無怨仇只知忠於陛下要正朝廷事使天下後世不能指議陛下故都無所避陛下只當責臣等不言事不可戒約臣等令不言恐天下窺陛下此意隂相顧望不肯盡忠於朝廷更非朝廷之福前日召臣等去都堂外庭不知皆言是奉聖㫖召臺諌官戒勵甚駭聽聞臣等被摧抑則不足道却是損朝廷風憲且願陛下愛惜朝廷事體陛下於蘇軾所惜者小則於言路所損者大不可不思風憲之地非臣之私乃陛下家事陛下不崇奬則臣等一匹夫耳簾中峻語曰待降責蘇軾堯俞巖叟皆曰此在陛下假令暫責隨即召之亦是行遣正乃曰待相度堯俞曰愛而知其惡憎而知其善乃所以為平今待軾如此軾驕將何以使之曰便總由臺諌官巖叟曰若臺諌所言陛下能盡聽納自足以成陛下之美臺諌何預焉又曰但言不妨行與不行須由宸衷巖叟曰如此則是順朝廷意者乃得行恐非朝廷之福尚書曰有言逆於汝心必求諸道有言遜於汝志必求諸非道願陛下常於此加察恐遜順陛下之言有非道之事巖叟又曰小人之欲破壞言路者多陛下欲求言路則難欲沮之則易一沮之則人將以言為戒恐陛下不得盡知外事願加深察堯俞曰臣盡至誠告陛下陛下不察亦無可奈何願為國家更深思逺慮遂下至臺堯俞與巖叟議待罪乃同奏曰臣等今月十八日奏事延和殿䝉宣諭謂臣等黨附諌官朱光庭彈奏翰林學士蘇軾撰試館職䇿題不當事臣等誤承厚恩上辜任使更不敢詣臺供職伏俟譴斥自十九日各家居已而却降出堯俞巖叟劄子付三省二十二日進呈王巖叟朝論叙十八日入對事其初甚略二十七日供職後别叙初對時語言方更詳悉但文字互換頗有不同其實不異也今參考删修只作一假庶易於觀覽蓋二十三日既降各供職指揮二十五日三人俱待班次二十七日仍俱入謝未必登對亦無緣更重說許多也司封員外郎盛僑為國子司業國子司業舊止一員於是更增其一僑與黃隱並為之蘇軾草詞云先帝肇新辟雍以養多士於兹厯年學者雲集師儒之任此亦重焉是以增命樂正之官以主司成之教殿中侍御史吕陶言近曽彈奏國子司業黃隱問學寡陋操尚邪詖行不知義事不狥公教化之地非所宜處伏請罷隱職任未䝉施行陶前章附十月末臣謹按隱叨冒學職無以訓導諸生私枉之迹衆所不伏嘲誚姗笑喧聞庠序近日考校私試文字不與祭酒博士公共去留輒敢專縱擢其壻張汝明為第二升降髙下多出其意皆此類也恭惟至治之世為官擇人循名究實咸欲宜稱雖一司一局米鹽簿書之責不敢虛授茍有曠廢必論其罪而師表之官風化淵源乃以素履回險之人竊位久處則士林何所法臣屬何所勸伏乞檢㑹臣前章及今所奏早賜降出以允公論又言隱平日阿私無狀固宜罷黜况今盛僑已除司業則隱不可尚處冗員玷纍教育之寄伏請早賜施行久之乃左遷隱為鴻臚少卿政目八月十五隱改鴻臚少卿實録無之曽肇集有制詞云煩言屢至士不誠服朱無惑萍州可談云黃降與時宰韓絳同名乃託故改名隱清論貶之按黃降以元豐五年正月除監察八年五月遷殿中十二月二十五日改司業皆非韓絳當國時又絳與降音同而字别恐無惑云云未可信又八月十五日丁隲云云當并考登科記黃降開封人治平四年第四人及第朝奉大夫章楶為吏部郎中御史孫升言楶自成都府路轉運副使有此除授按楶昨任荆湖北路提㸃刑獄司內臣甘承立在本路肆為貪暴不法殘虐人命幾千人臣近聞公安縣僧清願者經荆南陳狀於打造上供生活所收拾承立虐死無主工匠骸骨數百副作大冡以葬之道路聞者莫不痛憤豈有仁聖在上而承立小臣乃敢殘虐人命至於如此良有章楶在本路迎逢承立以希進用隨意上下無所不至所部官稍違承立意則楶隨以他事劾之故承立肆意虐人無所忌憚皆楶所致臣竊以章楶職按一路刑獄寃濫身寄朝廷外臺耳目坐視承立殘虐平人性命以為容縱成就其惡路不上聞按楶之罪重於承立今承立雖流嶺表未足以償寃命萬分之一而章楶置而不問復被遷擢進用何以懲小人之惡為後來之戒伏望聖慈詳察特降指揮罷黜以慰存殁之寃楶尋知越州四月二十二日知越州蓋除吏中未至改命朝散郎黃景為職方員外郎初文彥博薦楚建中李之純唐義問范育杜純及景凡六人景時知懷州純等皆擢用彥博復以景為言故有是命此據彥博奏劄增入校書郎黃庭堅為著作佐郎權知陜州陳侗為直祕閣知梓州侗辭之六月末吕陶云云可考詔看詳訴理所應元祐元年明堂赦恩以前內外官司所斷公事情可矜恕者並聽於元限內進狀訴理依前詔看詳政目云詔訴理所展至元祐明堂赦已前詔助役錢只許支充補助役人費用嵗終具剩數奏政目十八日事新舊録並無當考詳增入壬申詔明堂赦書條目甚多皆所以寬恤下民深慮吏奉詔不䖍其諸路轉運司開封府界提㸃刑獄司分按所部紏不如令者即監司違慢令互察以聞舊録有此新録乃不書甲戍復衛州新鄉鎮為縣殿中侍御史孫升奏編類章疏係二年正月二十一日臣聞古人有言曰武王諤諤而昌桀紂默默而亡夫以一士之謇諤豈足以致成周之昌一人之循默安能速夏商之亡積纍然也何以故謇諤之言達則壅蔽之患除壅蔽之患除則忠言日聞忠言日聞則變止於未然禍消於未兆詩曰濟濟多士文王以寧則其昌也不亦宜乎循默之風長則壅蔽之患成壅蔽之患成則忠言不聞忠言不聞則變生於不測禍至於已然詩曰雖無老成人尚有典刑曽是莫聽大命已傾則其亡也不亦宜乎壅蔽之傷國其患如此是以秦之盛彊金城千里子孫萬世帝王之業而趙髙咫尺以鹿為馬則四海九州之逺以亂為治以安為危以白為黑以賢為愚固無足怪是以民窮而主不恤下怨而上不知俗已亂而政不修此壅蔽之極而秦之所以亡也夫世之治亂繫乎君子小人消長內外而已天下君子寡而小人衆君子常患乎在外而小人常患乎在內是以自古及今治世少而亂世多也然則朝廷之有君子可不貴哉恭惟二聖臨御以來首開言路登用正人天下所謂忠信端良之士豪傑俊偉之材俱收並用無有棄遺近世得人之盛未有如今日者也君子日進而小人日退正道日長而邪慝日消在朝廷濟濟有成周之風此首開言路之效也臣愚不肖遭遇明時獲在言職嘗䝉賜對奉承德音使盡言無間雖有過差聖慈為之主張臣佩服訓辭以謂自古聖帝明王欲治求言之意不過如此伏惟皇帝陛下恭默不言太皇太后陛下簾聽庶政一日萬幾之繁四海九州之逺深居房闥所以共事者重恃元老執政大臣爾令此數人者皆至公無私處事無一不當於理猶當廣達耳目杜漸防微况未能皆至公而無私處事無一不當於理而陛下乃於耳目之臣議論之際置黨附之疑開小人之隙疑間一開讒巧必作則君子不可勝誅而言者不安其職矣言者不安其職則朋黨比周之說勝賣直掠美之言入則雖聖聽不能無惑聖聽惑則其弊必至於厭言厭言則循默之風作壅蔽之患生忠言不復聞矣臣竊恐非朝廷之福也臣不勝大懼願陛下深思往古之明戒無替前日之訓辭除黨附之疑心待端良之君子無使循默之風作壅蔽之患生則天下幸甚伏望聖慈少留聽焉臣不勝惓惓披瀝肝膽激切待罪之至貼黃御史中丞傅堯俞厯事四朝白首一莭端方重厚中外共知必不黨諌官以負陛下自汚平生操履也侍御史王巖叟剛徑不回超擢進用皆出聖知必不黨諌官以負陛下自取棄絶也乙亥承議郎祕閣校理張舜民為監察御史從御史府舉也國子監丞張繢為正字宣德郎陳烈落致仕充福州州學教授本路監司言烈雖老猶少請加任使故有是詔廣南東路經略安撫都鈐轄司言西染院使本路鈐轄楊從先躬率召募兵獲賊首岑探并其徒詔親獲岑探人與西頭供奉官仍賜錢二百萬令經略安撫司以名聞餘官吏等捕賊功賞速具來上當視輕重推恩其新州南恩州新㑹縣民元因焚香祈福入山避賊被殺及中毒死者其元祐元年未輸租稅及凡逋負悉除之仍以常平錢米賑其家餘因捕盜踐蹂田宅與追呼妨廢生業者亦除其半皆賑給之凡詔㫖有未盡事令比類施行訖以聞蔣之竒傳云云已見元年十一月二十二日刑部言請以南京鄆兖曹徐齊濮濟單沂滑澶博滄亳夀濠泗宿南劒汀建州淮陽廣濟邵武軍開封府東明考城長垣縣邢州巨鹿平鄉縣洺州雞澤平恩肥鄉縣為重法地方從之是日乙亥三省進呈傅堯俞王巖叟論蘇軾劄子執政有欲降㫖明言軾非者太皇太后不聽因曰軾與堯俞巖叟光庭皆逐執政爭以為不可丙子詔蘇軾所撰䇿題本無譏諷祖宗之意又緣自來官司試人亦無將祖宗治體評議者蓋學士院失於檢㑹劄子與學士院供知令蘇軾傅堯俞王巖叟朱光庭各疾速依舊供職蓋從右僕射吕公著之議也同知樞密院范純仁亦言蘇軾止是臨文偶失周慮本非有罪聞言者未巳深慮煩瀆聖聰恐致陛下别有行遣臣以受恩深厚雖非職事而不避僣易之罪輒敢奏陳蓋此事或聞因小有言恐致交相攻訐流弊漸大伏望聖慈深察召來宣諭之意只乞以朝廷本置諌官蓋為補朝廷闕失及姦邪害政今人臣小過本無邪心言官不須深論若其引咎求去則云朝廷不欲以小事輕去言者爾等當共成朝廷之美則必不敢更有他說以陛下聖明思之必熟而臣敢妄有所陳亦愚誠有所慮不能自止是日丙子殿中侍御史孫升奏編類章疏二年正月二十三日臣竊觀堯舜極治之時忠厚之至則曰宥過無大而孟子以謂君子之過也如日月之食過也人皆見之更也人皆仰之君子不幸而有所過小人則無所往而不為惡過雖大無害為君子惡雖小終歸於小人改過而不吝則成有德惡積而不掩則為大姦過可宥而惡不可容也伏見翰林學士蘇軾昨撰試館職䇿目而其詞以謂欲師仁祖之忠厚而患百官有司不舉其職而或至於偷雖患在百官有司而下文稱孝文寬厚長者至於朝廷之間恥言人過而不聞有怠墯不舉之病則是仁祖之政有病矣其詞以謂欲法神考之勵精而恐監司守令不識其意而流入於刻雖患在監司守令而下文稱孝宣綜核名實至於文理之士咸精其能而不聞有督察過甚之失則是神考之政有失矣且方欲師法祖宗而盛稱孝文孝宣之政無病與失蓋言彼之無病則此必有病稱彼之無失則此必有失則軾之命詞豈得謂之無過矣乎軾嘗應方正直言科文詞俊敏下茟如流不避嫌疑遂涉痕迹若謂軾有意於譏諷則軾非喪心病狂何至於此哉臣竊謂蘇軾以命詞之失而自當之是乃君子改過不吝則師法成湯之德矣陛下以蘇軾命詞之過而降放罪指揮則是忠厚之至而宥過無大躬行堯舜之仁矣君臣之德豈不美哉朝廷之體豈不正哉臣比聞蘇軾居家不出懇求去位至於四五又自辨􅎖其非而不自以為過則乖改過不吝之德矣陛下慈仁愛敬追還放罪指揮以明軾之無過茍以含容於一時則可矣安能逃天下異時之公議乎臣愚深為朝廷惜之臣愚不肖待罪言職為陛下耳目之臣居朝廷紀綱之地方是非紛起之時獨無一言者非為循默茍容之計也臣以謂文詞之過君子所有不必深辨而是非之理明如白黑陛下至眀至聖洞照物情而當國元老執政大臣皆天下以為公忠正直之人必無彼我愛憎之論以惑聖聽而蘇軾以俊敏之過受言詞之失則何害為君子則臣復何言哉今則不然御史中丞傅堯俞侍御史王巖叟因奏論放罪指揮而陛下疑以為黨附諌官而以蘇軾為無過堯俞巖叟居家待罪而元老大臣曽無骨鯁之論以别是非而止降劄子令堯俞巖叟供職二人去就實繫國體茍放罪指揮留而未下則二人者何顔以出而朝廷之體何從而正臣於此時豈可默默坐觀以負陛下耳目紀綱之寄乎伏望聖慈詳漢文漢宣彼此輕重之詞察堯舜成湯宥過改過之德早出先降放罪指揮以全君臣之美以正朝廷之體則天下幸甚升雖有此奏堯俞巖叟既承詔即出就職至二十七日乃入謝今附此不别書丁丑朝散大夫知徐州楊繪復天章閣待制繪自翰林學士坐罪責降至是以赦叙也兵部郎中杜常為光祿少卿太常丞賈易為兵部員外郎詔以右僕射兼中書侍郎吕公著為景靈宮奉安神宗皇帝御容禮儀使入內內侍省都知張茂則都大管勾龍圖閣直學士正議大夫張詵卒戊寅端明殿學士吏部尚書孫永為資政殿學士兼侍讀提舉中太一宫兼集禧觀公事立班佩魚視資政殿大學士韓維例後三日永卒贈銀青光祿大夫諡康簡永卒以二十八日今附見舊録孫永傳云時司馬光變更免役等法永預有力先是謝景初為成都府路提㸃刑獄坐與娼淫免官元祐置訴理所而永以景初之罪出於誣搆為雪其事遷吏部尚書元豐銓法以薦者多寡為差至是永請改不以薦者多寡而以到選先後為次士論不平新録辨曰按永揚厯中外其為吏部尚書蓋以次遷非因雪正景初罪也銓法以薦者多寡則長奔競之風故永請改法今刪去時司馬光以下至士論不平刑部尚書蘇頌為吏部尚書己卯左諌議大夫兼權給事中鮮于侁言蔡河撥發催綱司督京西淮南糧運以供畿內半嵗不能周一運請令催綱司統按縣道立賞罷之法使人自為功從之工部侍郎王克臣提舉萬夀觀克臣請老故也宣德郎楊國寶為太常博士劉摯云云辛巳詔中書舍人蘇轍劉攽編次神宗皇帝御製殿中侍御史孫升言升言不得其時斟酌附此元年九月十八日指揮并近有建議鄉村出役錢者二事當考臣昨奉元祐元年二月六日朝㫖司馬光劄子奏論免役為害於天下有五言詞激切聖意感悟即時施行應天下免役悉罷並依熙寧元年以前差役條貫施行令下之日四方之人莫不鼓舞而又放逐吕惠卿於閩告之以首建青苗次行助役是則免役為害於天下陛下知之詳矣詔令宣之信矣因民之倦而變更之豈得已乎臣嘗奏陳以謂陛下此因耆德正論復行祖宗百年差役舊法慰安元元蘇息疲瘵中外歡欣幽眀慶快臣又言今民力困極非十五年前之比要在委曲隨宜斟酌施行則人無異論臣竊以祖宗百有餘年德澤深厚浹于民心者無他知為國者藏于民之術而已民非財不可以生國非財不足以富而錢為圓法流通貨財於上下且非地之所生非民之可為也貨殖百物産於山澤田野售之於城郭而聚於倉庫而流通之以錢不可以飽人之饑暖人之寒也為國者不取民之力而取民以錢則貨殖百物無以售而民至於困極也城郭鄉村之民交相生養城郭財有餘則百貨有所售鄉村力有餘則百貨無所乏城郭富則國富矣錢流通於下則可以相生養錢蓄積於上則終無所蕃滋為國者不藏於民而聚之於庫此財力所以耗竭上下所以怨也祖宗百有餘年聖賢經綸用度資國贍軍備邊政術詳矣而差役之法行於鄉村而不及於城郭非不知城郭之人優逸而鄉村之民勞苦也夫平居無事之時使城郭之人日夜經營不息流通財貨以售百物以養鄉村由之而不知樂之而不倦然尺地莫非所有也一民莫非朝廷之臣也朝廷之於民猶父之於子父子之財宜無異籍故古語謂未聞子富而父貧也朝廷一旦緩急則計費之多寡隨所蓄之厚薄而均取之天下之民皆知用之不為私取之非無名也歡然樂輸而無憾矣此祖宗藏于民之術也昔人云與其有聚斂之臣寧有盜臣蓋盜取于人猶有止息而容或幸免聚斂則無時而已必至于窮竭而後止也今凖元祐元年九月十八日朝㫖諸路城郭五等以上及單丁女户寺觀第三等以上舊法納免役錢五分自今年正月為始其收到錢如逐處坊場河渡錢支酬衙前重難及綱運公人接送食錢委是不足方許將上項錢貼支其餘並封樁以備緩急支用臣自奉上項指揮日夜罄竭愚慮不敢輕議臣比聞四方之人自降上項指揮訩訩不安以謂朝廷命令更改不定而刻剝聚斂之徒假息竊視幸其有間復肆毒螫此臣所以不敢默默也臣竊以陛下始因司馬光之言感悟聖意復行祖宗差役舊法罷去出錢免役而放逐首議之臣布告四方鼓舞天下矣而復令城郭减半出錢免役城郭之民祖宗以來無役而有科率科率有名而無常數今嵗令城郭免役則是其取無名矣貼支有餘封樁以備緩急則是猶襲聚斂矣無名聚斂之迹猶踵襲乎前則建議放逐之臣必譏訕於後臣愚深為朝廷惜之臣以為與其無名而取於民封樁於府庫以備緩急曷若藏蓄在民使之交相生養待緩急而後取也伏望聖慈詳察臣所奏宣示重事元老執政大臣熟議得失早賜裁决以慰四方人心則天下幸甚貼黃稱良醫之治病必去其根本則無後患朝廷既知免役之病民而除之又復踵襲其故而使之出錢則是餘毒猶在餘毒未除其病必作故近有建議者令鄉村元出役錢三百貫以上不令充役依舊减半出錢均為鄉村之民何獨有錢可出若以為物産髙大人力强壯則或令頻併充役或令增添充役年限以寬下户可也自免役出錢以來鄉村極力人户破蕩殆盡所存無幾今又踵襲出錢之迹以為誅剝則更數年之後物業優厚者破蕩盡矣是豈仁人之用心哉臣近詢問福建路提刑喻陟言福建一路八州見有寬剩錢猶可支雇役十年之費而殿中侍御史吕陶自成都府路回言西川每嵗坊場錢可足一年所用或諸路例皆如此則何忍重困斯民使之出錢以封樁也今東南民間所用無完錢皆烏舊缺邊而鄉村所出穀帛賤無人售城郭人户比十五年前破家者十七八皆因納錢免役之患此上下共知非臣一人之私言也或謂近年開邊之役所費非昔時之比則乞每嵗計邊用所闕多少於諸路城郭人户等第科率應副不為定制則取之有名不為聚斂之患也二月末升有章論買田募役與此相重故兩存之
