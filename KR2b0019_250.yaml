body:
  text: 續資治通鑑長編巻二百四十六宋李燾撰神宗熈寧六年秋七月甲辰權發遣開封府判官職方員外郎沈忱權發遣梓州路轉運使庚戌日可并此置河州折博務令制置觧鹽司倣熈州東南西鹽交引減直召啇旅入中權發遣廣南東路提㸃刑獄陳倩言本路已團定保甲乞給鑼鼓旗物遇襲逐盗賊遞相撃發應接從之己巳交阯進奉使李懐素等乞根尋衙官鄧暗初暗道病舁至張三館自言病且愈不願復舁已而失之不知所在詔客省牒邕州具交人自入界至起發因依移文静海軍及令開封府具鄧暗事給與懐素等公據詔京西淮南两浙江西荆湖六路各置一鑄錢監江西荆湖南路以十五萬緡餘路以十萬緡爲額給轉運司志有此五月二十五日丙午大食陁婆離入貢都蕃首保順郎将蒲陁婆離慈言子麻勿將貢物乞賜號將軍仍請以自代詔以麻勿爲郎將丁未虞鄉縣令吕温卿爲衛尉寺丞同管勾河北路常平等事温卿惠卿弟也内侍押班蘇利渉爲右班副都知仍詔自今兩省押班五年無闕並除副都知詔知瀘州李曼轉運副使李竦鈐轄張承祐都監孫仲逹並罷任取勘此據御集日録亦勘陳充按充四月十九日已送審官矣七年九月二十二日曼等四人同責戊申檢正中書吏房公事太常丞館閣校勘蒲宗孟荆湖南路提刑館閣校勘朱初平太子中允充館閣校勘陳侗並爲集賢校理朱初平陳侗並見治平三年十一月詔洮岷州山林深險糧道難繼而河州方興兵役宜令王韶依累詔指揮詳度事幾務在持重仍戒張玉髙遵裕等毋得深入先是王韶奏欲於河州未築城以前招定洮岷今轄烏察兵未解階成秦州縁邉皆恐且兵不得休息不如及今討蕩自不妨河州之舉僉以爲不可時韶并與王安石書言之安石曰若深入討蕩恐難今洮岷聚兵久師已老吾以見兵加之必潰散即階成秦一帶皆安帖且自不妨河州之舉但當戒韶以詳審也上亦以爲然乃令依韶奏戒以詳審而已己酉分命輔臣祈雨詔諸路配罪人除凶惡盗及應配本州隣州若沙門島外少壯者配河州内應配廣南及去河州千里者决如法餘並免决配及五百人止庚戌提㸃梓州路刑獄司勲員外郎張充宗提㸃利州路刑獄屯田員外郎范百禄兩易其任百禄仍直集賢院上言百禄體量李曼事得實人多庇曼者中丞亦不免百禄乃能如此宜賞以館職且欲大經制淯井夷事或請專委百禄上曰百禄能言此未知能了此否王安石曰百禄與陳忱無以大相過忱自此徃中書樞宻院可以詳論經制大意也乃止令百禄代充宗可并甲辰提舉在京市易務言河東漢蕃市易乆廢乞委轉運副使趙子幾經度從之癸丑相度在京諸司庫務利害劉永淵言近凖詔於瓊林苑藏氷一井校其消釋多氷井務纔十分之二苑中二井除四分以備消釋實収三萬八千段而嵗支三萬八千三百所少纔三百乞於金明池西北岸更置三井則氷有餘用嵗寛民力及減輦載人工請給之費罷氷井務及監官命苑官管勾從之龍猛軍級經章惇出頭乞於懿洽効用上怪禁軍不由軍帥擅經惇投狀王安石曰軍士乞効命雖不由軍帥恐無條禁止上以爲軍制不宜如此安石曰不知如此後有何害上曰經章惇乞効用猶可恐别有妄作安石曰别有妄作即自有科禁若經有所征討官司乞効用正是募兵所欲不知如何加罪呉充曰軍當聼於一今如此即不一不如不差徃安石曰今乞効用不知何害軍聼於一若令彼經殿前司投狀即殿前司必不許不許則壯士何所求奮蔡挺曰若别有結連奈何安石曰結連即自有重法購賞備具今經朝廷所差官乞効用不知如何因此却致得别有結連陳升之曰臣見韓絳宣撫時兵級亦經絳求効用上乃令勘㑹進呈既而上終以爲害事安石曰士卒固欲其願戰請効死反以爲罪何以奮其志氣且未嘗有條貫禁其如此如何加罪上曰禁軍令如此不便若如臨淄王事其漸豈可長安石曰經朝廷所差官司與臨淄王事豈類且欲防變即專固人情使聼於三帥不得自伸於餘處亦不可無慮今經修注官投募與專固人情一聼於武帥孰便上曰三帥防禁嚴宻呉充請今後立法安石曰若爲朝廷討賊乞効死即無可罪若不爲朝廷討賊自相結連除是謀反即法已備具不須别立約束終不能加謀反之律上曰如保甲若别司募去司農亦必有言安石曰保丁固有經章惇者上曰司農奏非經章惇安石曰亦有經章惇者陳升之又言有經韓絳乞効用者上曰郝質言經絳者蓋是合徃本路軍士升之又言非本路上終欲治其罪安石固以爲無罪上令放罪取戒勵此據日録十二日事上疑懿洽事恐如淯井王安石曰臣朝夕切磋章惇惟令持重以敢死士擾之人受其降附專討元惡又已厚結蔣波晃若得其首領即元惡無所藏聞元惡計議入狤狑恐被殺取購必奔蔣波晃彼同州之人亦多自悔或通消息候官軍乃敢収集同志内附廹於利害必有如此者今所遣將吏亦多材士不與淯井將吏同縱令一人失計挫衂可恃者尚衆必無可憂上曰命令宜一聞湖南甚不一或是石鑑出帖或是章惇出帖須出於一乃可安石曰或章惇在别處事有機便隨宜給帖亦恐無害如昨以計誘出舒光秀等不然必爲變方其趣召欲及期㑹誘以恩澤或石鑑一面給帖自不爲過失又聞石鑑亦不足頼數與章惇異議惇以爲旋易人未必便如人意且復使鑑耳昨專用李資誠爲失計然既懲前事必更謹重即無可虞矣甲寅録在京繋囚雜犯死罪降徒流流以下第降一等杖以下釋之權三司使薛向乞令永興秦鳯河東等路轉運司量留三司起發當出賣銅錫外餘並分與諸監鑄錢從之置内弓箭南庫儲御前所製軍器仍别差官提舉九月八日兵至七年置内弓箭南庫儲御前所製軍器詔進諸兵車器械須於殿廷試驗按習者聼於軍頭司公事後進呈其餘兵械監官面奏畢納於禁中置官編修軍器什物法制擇精致者修爲法式於是罷舊長梢弓法悉用闊閃促張弓減指箭改造桐木漆牌爲欒竹穿皮長牌素鐡甲爲偏挨甲内出敵樓様送軍器監頒降修製降斡梯竿様於陜西河東以禦備雲梯本志誤以置内弓箭南庫爲七年今不取餘事姑附注此須考詳削去水九朝通畧云尋以入内都知張若爲之乙卯東上閤門使河州刺史景思立爲四方館使河州團練使禮賔副使兼閤門通事舎人王寧爲引進副使帶御器械餘各遷官减磨勘年有差累賞三月以來破蕩族帳䇿應討阿納定羌城之功也初議賞僉以爲不可比河州王安石曰河州如破竹之初然一次今雖在破竹之後然四次功狀難易多少相乘除宜如河州厚賞上曰軍士或不須如河州厚賞安石曰累戰不惰猶能有所斬獲不宜令後賞反薄於前以衰士氣乃一用河州賞罰法上又令官髙者與升資任爲實安石曰資任可惜宜别爲科格以待賞功上又曰景思立或以爲宜候河州了今思立官已髙難更加官當與賜物安石曰賜物固當然亦須與官今能爲思立之功者少不可不賞以勸將吏或言祖宗時於將帥惜官職上曰當時爲諸國未服若將帥皆滿志即不爲用安石曰今日事誠與祖宗時異能立功者少要厚賞以奮起中下之氣候將帥可用者多然後可如祖宗時愛惜官職蔡挺曰若轉團練使遂増一百貫科錢可惜安石曰一年要増一千二百貫錢極易不足惜若求一能辦事將吏却恐難得上以爲然曰李端慤尚為防禦使司農寺言酸棗等縣民訴免保甲廵宿今欲遇追胥賊盗即聲鼓保長以下暨同保竭作如入他保亦鳴鼓應接其廵宿聼免從之詔自今曾應明經人願依諸科試斷案大義者合格依諸科推恩其特奏名授文學長史願依諸科試刑名者聼前侍御史劉孝孫賜錢百千以權御史中丞鄧綰言孝孫䘮母乞優恤也朱本刪去新本同丁巳詔殺熟户以邀賞者斬訖奏仍許人告每名遷一資賞錢百千無資可遷加五十千如因軍人告而事干本營者送别指揮先是卒多殺熟户以其首級冒賞而吏或不能察故有是詔瀘州増置寧逺一指揮其戎州寧逺第一第二第三指揮各招及五百人第三指揮仍應副瀘州差使時淯井監夷冦未平議者多言東軍不諳山川道路請益土兵故也八月二十八日戊午詔定兩府初除遷官轉㕔觧罷陳乞使臣公人並衮同推恩止令中書施行宰臣樞宻使知樞宻院五人參知政事樞宻副使同知樞宻院四人簽書樞宻院三人己未右羽林軍大將軍巴州團練使仲碩爲沂州防禦使以試學士院應格也知登州李師中言近累乞移沙門島罪人而來者未巳不惟事煩防虞兼已無地存泊詔除朝廷指揮刺配外諸路因徳音續配到人且於登州収禁驛奏犯由仍増兵防守初上患沙門島罪人衆令立法且曰案問欲舉法寛故致多如此王安石曰案問欲舉法寛乃所以疑壊賊黨雖寛一賊必得數賊就法恐須如此乃無配沙門島者師中又言今乞本州月具沙門島罪人姓名鄉貫及其所坐罪申樞宻院注籍量移免下本州取索額外人數以致稽緩從之六月三日又治平四年六月二十五日李慶事可考詔三司出絹五萬付涇原路經略司封樁以備軍費熈河經略使王韶言奉㫖令臣躬將士卒徃視河州修城臣欲令景思立管勾涇原兵馬而委臣就本路擇禁卒蕃兵弓箭手五千及秦鳯路先差下䇿應强壯三千盡以付臣爲思立後繼若有警急即專留思立修城臣不妨退軍應接上善韶䇿遂如所奏行之王安石曰韶䇿誠善若聲言應接河州遂自洮西由洮岷不虞之道攻其所不戒乃用兵之至計既而韶果以兵穿露骨山破賊如安石所料一日五七下馬當附八月二十五日庚申分命輔臣祈雨于郊廟社稷詔河北轉運司監牧司各選官一員同檢放水災牧地租稅甲子檢正中書五房公事吕惠卿乞自今實封文字及干機宻者進奏官并諸司吏傳報者以違制論承虛造事謄報交鬬謗訕扇惑人心者准此仍許人告賞錢三百千情重者奏裁命官除名餘人决配其知情及同撰人首告並免罪仍支賞錢進奏官告獲不候年滿優與授官出職副知告獲與進奏官書寫人告獲與副知上名如止願請賞錢者亦聼從之乙丑遣官謝雨詔河北轉運提㸃刑獄提舉司所部廣逺宜分爲兩路以濵棣徳博恩冀滄瀛雄澶莫州大名府信安保安乾寧永静軍爲東路懐衛磁相邢洺深祁保定趙州眞定府安肅廣信順安永寧軍爲西路其支移錢物令逐司各依乆例立爲年額應副令通融均濟知大名府韓絳言安撫司舊封樁錢帛入十六萬轉運司借用過半相承嵗乆乞自朝廷撥還詔除之髙遵裕言轄烏察率疉宕諸羌脅青唐冦鹽川寨包順撃走之初王韶欲遣張玉討青唐遵裕曰青唐無罪第爲生羌所脅耳但遣禆將從順徃青唐人見順泣訴轄烏察知不附已遂潰去此事據髙遵裕本傳其月日則因日録是月十三日及二十四日所書附此丙寅工部郎中集賢殿修撰周孟陽爲天章閣待制孟陽東宫舊僚及是乃除次對故特書之詔自今進士及第非上三人並令試律令大義斷案據等注官是夜五鼓西北天鳴如磨新舊紀云天西北有聲戊辰審刑院大理寺言夔州權管威棹指揮都頭北班殿侍杜信減尅軍糧盗官營材當杖脊降配詔以信昭憲皇后兄之曾孫特贖銅勒停編管汝州上言熈州無將官張守約不可用王安石曰守約昨康樂之戰既有功聞所措置亦甚善但奏事矜伐爲無量而已未見有他罪上曰昨康樂不肯行王韶激以若不徃當自徃景思立又欲徃乃始肯行坐上見者甚衆安石曰此事未嘗案劾人言安可信臣觀忠實顧義理人極少且當據見功可也若聼浮議恐未可知上曰守約所論功如黄察之類皆是是豈可信安石曰若保明功狀但隨行即須保明誰不如此何但守約如此上又言昨問王韶守約輕妄何故用之韶言自今更不用安石曰韶言如此不知何意然守約不可用實未有顯狀恐須審察己巳河東節度使守司徒兼侍中判河陽文彦博判永興軍龍圖閣直學士知永興軍呉中復知河陽彦博辭永興乃詔皆依舊任鄜延路經略司請支封樁錢於河東買駞三百以運縁邉急闕糧草從之八月十一日鄜州違法事當考庚午河北路察訪司言乞省併眞定府井陘等二十八縣减官七十六員及役人三千一百二十七人從之七月十三縣八月三縣九月七縣十二月五縣共二十七縣鄴廢在五年五月九域志係之六年當考陳瓘尊堯集序云安石論河北要省民徭可以減州爲縣至於言江南利害則曰州縣可析陳瓘尊堯餘言曰臣聞南唐宋齊邱擅大名於一方位至宰相人皆推之以爲儒者之宗又或許之以爲造國之手其說不行則携衣笥望秦淮門而去者數矣其輕於去就如此故其獻替之言曰陛下中興臣之力也奈何忘之其言之悖慢不遜如此者多嗚呼江南氣俗自古然也臣鄉里在南方墳墓在南方飲食風土皆以南方爲便親戚故舊並是南方之人臣之病也爲莊舄之吟臣之老也不㤀首邱之念而區區之愚所以必論南方之風俗者有二說焉九重宫闕都于天地之中央祖宗陵寢列于大江之西北欽若金陵之請安石併析之議分南分北偏而不還臣之所以議江南之氣俗者此其一也陛下聖性中和好平惡偏無私如祖宗普博如天地卞等重南輕北取快目前雖可以暫欺聖聼而偏私稔熟終必敗露又何能久罔天聼乎臣懼陛下於卞等敗露之後將謂東南之士箇箇如此豈不誤東南干禄之人哉臣之區區非特仰順陛下好平惡偏之聖也實亦私爲一方久逺不同之慮耳臣之所以必議江南之氣俗者此其二也臣又以天下譬之一身有兩臂一左一右東南左臂也兩臂雙運則其身安矣一身之内豈可以原左而薄右哉是故平則爲安樂偏則爲疾病凡以偏而爲病者當以平而爲藥也若能用對病之藥則永保康寧之福矣卞武繼安石之志昻仁述蔡卞之事彊左弱右棄此而用彼造作蠧病罪通于天遂使奎婁之間復有譴告陛下所以畏天而率下者可謂至矣白時中等所以慢天而侮上者亦可謂至矣陛下用其至美而將順者少白時中等用其至慢而佽助者多彊者自此而益彊矣弱者自此而益弱矣蠧病未痊藥石愈隔偏而不平是以然也然則江南氣俗臣安得而不論哉太子中允權發遣都水監丞俞允兼權檢正中書刑房公事詔樞宻院減書令史五人増令史俸月錢二千書令史五千春冬各絹五疋以汰冗養亷也詔安肅廣信順安軍保州人户地内令自植桑榆或所宜之木官爲立勸課之法每三株青活破官米一升計每户嵗輸官之物以實估凖折不盡之數以待次年如遇菑傷放稅及五分以上即以凖折未盡米數等第濟接仍據逐户内合栽之數每嵗二月終以前㸃檢及一分青活至十年周遍如不及一分即量罪罰贖勒令補種令佐得替轉運司差不干礙官㸃檢以一任合栽之數紐爲十分如及十分者有賞不及七分者有罰其所栽植之木令人户爲主非時毋得遣人下鄉以㸃檢爲名以致騷擾委轉運司施行應昨所差管勾提舉官並罷初以趙子幾及曾孝寛所言下程昉相度樞宻院欲罷昉以孔嗣宗代之王安石不可乃更立此法元豐八年十二月罷栽桑法廢陜州硤石趙州隆平磁州昭徳滄州臨津徳州徳平乾寧軍乾寧衛州衛新鄉邢州堯山平鄉懐州修武武徳瀛州東城景城江陵府枝江縣並爲鎭河北十三八月壬申朔定州觀察支使宋湜爲光禄寺丞濟州團練推官王援爲大理評事天平軍節度推官張奕杭州錢塘縣丞葛奉世爲太常寺奉禮郎並充大理寺詳斷官湜等以試斷案合格也供備庫使宋亨雷仲提舉京東教閱亨西路仲東路武學言春秋試法内舎生馬歩射馬戰應格對䇿精通士行可稱者上樞宻院補上舎生雖不應格而能精曉術數陣法智略可用或累試䇿優等别取㫖補上舎武藝䇿略累在下等者復降外舎上舎無過三十人别齋増給食如累試又優等及武藝進者上樞宻院審察人材試用從之五年閏七月詔可考廣南東路駐泊都監楊先言本路槍手萬四千今排保甲若兩丁取一得丁二十五萬八千若三丁取一得丁十三萬四千自少計之猶十倍於槍手願委路分都監二員分提舉教閱詔司農寺詳定條約以聞其後户自第四等以上有丁三者以一爲之每百人為一都五都爲一指揮自十一月至次年二月每月輪一畨閱習毎三日一比試事藝髙者先次放歸本志同此詔知保定軍賈世京罰銅十斤初提舉常平等事李宜之請廢保定軍爲縣遣官相視而衆入軍衙乞留軍額甚譁宜之以爲官吏故縱其如此王安石白上曰陛下欲什伍河北民爲用若如此不治後不可用又咫尺北界何以觀示邊人此事若非官吏啟之即百姓不敢如此又引魏軍人焚領軍張彝第以人衆不敢治大赦以安之髙歡遂散財合衆圖起事上曰須體量見實乃可行遣安石曰固當如此乃以命轉運副使蔡天申於是世京坐不能禁約故責及之保定軍卒不廢乙亥編修令敕所言修成支賜式十二巻已經㸔詳可以通行從之檢正中書刑房公事沈括辟官相度兩浙水利上曰此事必可行否王安石等曰括乃土人習知其利害性亦謹宻宜不敢輕舉上曰事當審計無如郟亶妄作中道而止爲害不細也王安石以王韶書進呈韶言洮西事云但恐臨時制不在我則無如之何上怪韶有此言僉以爲韶忌景思立上曰將帥多不能容偏禆稍有功即忌之韶方欲興事恐不宜如此安石曰韶頃為髙遵裕所害然能容遵裕韶似與餘人不類不至不能容偏禆亦恐逺方情有不得自竭陛下雖深倚仗王韶其如中外妨功害能之人甚衆上曰妨功害能必有事實可指安石曰姦人妨功害能此最難指但要精察上又言韶固能容遵裕意謂韶不能不忌思立安石曰王韶才能必不自謂不及景思立陛下待遇固不在思立後韶所興造事功何至與思立争髙下以此推之不宜忌思立上曰卿可再與韶書且包容將帥將帥一心乃可立事安石曰臣恐陛下亦宜更審察物情未可專責王韶不能包容將帥若一心乃能立事即非但邉鄙如此朝廷尤宜如此自古未有令服讒蒐慝小人與君子參相檢制而致百姓昭明黎民於變時雍者上曰然已而安石又白上長子帥師弟子輿尸凶軍旅之事尤宜聼於一如陛下欲奬包順亦宜令王韶為之使包順爲王韶用韶爲陛下用尚復何求今使人人得自逹於天子喜懼恩怨不在主帥即主帥之權分而軍政有所不行矣丙子梓州路走馬承受張宗望追一官衝替上詢瀘州夷事官軍所以不利及夷人入冦狀而宗望所對前後違戾不實故也詳定編修令敕所言裁省綾錦院織匠以四百人爲額從之丁丑三司言永興軍兵儲纔支三季詔察訪司具永興軍等路糧草數以聞仍令轉運司具不預計置因依并借給本路鑄錢監折二錢之半付本司糴買糧草又詔借内庫紬絹十萬以給軍衣檢正中書刑房公事沈括言兩浙州縣民多以田産詭立户名分減雇錢夫役冒請常平錢斛及私販禁鹽乞依京東淮南排定保甲保甲一定則詭名漏附皆可根括以至請納和買常平錢斛秋夏苗稅及興調夫役捕察私鹽賊盗皆有部分不能欺隐又言蘓秀等州湖水耗減涇浜多淺涸者嵗比有年民力饒裕易於興工乞至本路先計度今年一料夫役若一料先畢則處置規畫皆有成法又民間曉然知其爲利次年樂於趍役又言浙西諸州水患久不疏障隄防川瀆多皆堙廢今若一出民力必難成功乞下司農貸官錢募民興役從之戊寅詔自今河州簽判中書選差又詔應品官有犯案察之官不遵詔敕擅行追禁或勒令觧務閣其請給自今並劾罪以聞權發遣䕫州路轉運判官曾阜罷兼提舉常平等事以判司農寺曾布親嫌故也己卯詔自今察訪諸路回條具所至知州通判治狀其轉運提㸃刑獄提舉司每知州通判得替前一月亦具治狀上中書委檢正官注籍待制以上不用此令八年正月乙卯申明此令王安石進呈河北謀變事上以爲河北人愚東南人即難誘合以此事立保甲後此事或少可絶安石曰民所以多僻以散故也故曰上失其道民散乆矣保甲立則亦所以使民不散不散則姦宄固宜少志有庚辰翰林學士陳繹爲翰林侍讀學士知鄧州繹以疾自請也癸未權户部副使太常少卿賈昌衡爲遼國主生辰使左蔵庫使許咸吉副之太子中允權監察御史裏行蔡確爲正旦使供備庫使李諒副之龍圖閣直學士張燾爲遼國母生辰使西上閤門使种古副之金部員外郎判將作監范子竒爲正旦使文思使夏元象副之詔永興軍等路提㸃刑獄司劾鄜州違法截欄商農車乗駱駞般運米麥官吏以聞後㑹赦釋之七月二十八日鄜延買駐事當考甲申翰林學士判司農寺曾布兼詳定編修三司令式敕諸司庫務條例詔罷簡州嵗貢綿紬二十疋上曰此亦何用但擾民爾故罷之乙酉詔開封府陳留雍邱襄邑尉氏咸平中牟七縣各増丞一員詔輔臣觀榖于後苑輔臣進呈保甲條貫呉充言先臣墓在郭店鎭有一户但兩丁一丁又病目乃令四十里外教閱甚苦之此法當改王安石曰郭店事果違法自當推究臣每有所聞輙諭司農令推究施行此事亦不可但已也上即令安石諭司農推究丙戌知海州太常少卿胡揆贖銅十斤知眞州比部郎中江寛知宿州比部郎中陳稱知舒州屯田郎中石収之知壽州太常丞集賢校理鞠眞卿各展磨勘一年皆坐違法折納紬絹本色大估價錢虧損百姓故也三司言淮南發運司嵗冬乗北風以汴綱輸鹽於湖北春乗南風發上供糧入汴聞去冬今春風不順發鹽百二十綱而風水壊五百餘艘兵工水死甚衆詔蔣之竒根究以聞後之竒言汴船出江覆溺人船實比遞年數多詔皮公弼羅拯具析以聞丁亥詔將作監度増左右軍廵院屋軍廵獄房狹隘上以暑溽繋囚不便故令詳度増展或别移寛閑之地其後増展共百餘間王居卿申請廣南西路經略司言已遣澧州司法參軍謝延甫徃融州溪峒撫諭蠻酋詔沈起追還延甫蓋融辰州界連溪峒甚廣上恐其因縁生事也管勾都水監丞侯叔獻言叔獻檢計白溝在五月十二日近凖詔從所請開白溝等河欲白溝爲清汴儲三十六陂及京索二水爲源倣眞楚州開平河置牐四時行舟因罷汴渠上曰叔獻開白溝河功料未易辦乃欲來年即廢汴渠宜更遣官覆驗且汴渠嵗運甚廣河北陜西資焉又都畿公私所用良材皆自汴口而至何可遽廢王安石曰此役若成蓋無窮之利當别為漕河用黄河一支乃爲經乆耳馮京曰若白溝成與汴蔡皆通輸爲利誠大臣恐汴河終不可廢上然之詔劉璯同叔獻覆視以聞後璯等言白溝濉河簽直至淮八百里乞分二年興修其廢汴河行運候白溝功畢别相度從之上曰璯詳審此必璯所議意謂叔獻大促遽也仍詔作三年興修叔獻尋除河北轉運副使上欲留叔獻令與璯了白溝事乃命叔獻同判都水監叔獻同判都水監乃十月二十一日不知除河北副漕是何時實録無之當考上謂劉璯詳審據十月二十二日日録劉璯四月二十四日以監簿提舉淤田十月十九日戊子都水監言欲自白溝濉河簽直至淮八百餘里乞分二年興功其廢罷汴河行運候白溝功畢相度從之仍作三年興修今并入此明年正月二十七日罷役京又言叔獻所開河多浸人墓莊宅安石以爲不然既而上問叔獻乃言若浸人墳莊當伏軍令此據日録十五日事當考登州申沙門島見管罪人六百五十人上批已經赦者據赦次數及情犯輕重量移内地其未經赦者改配廣南仍令登州節次發遣己丑管勾外都水監丞程昉請於保定軍東舊滹沱河南岸臺山口東南疏一川行七十里至乾寧界㑹于御河可無塘濼塡淤之患詔李南公與昉及屯田司同詳度置堰限如無妨礙即令昉計開河功料仍令屯田司檢視今塘濼有無泄漲水處以聞及檢視竟不行不行據朱史簽貼云檢視以為便恐飾說也今不取五月二十二日日録乂同進呈程昉開滹沱河事便欲從程昉孔嗣宗等所奏余白上恐須候程昉到議定别取㫖上以程昉不計淤塘泊鹵莾余曰要存塘泊利害臣所不知若言淤却此一處塘泊為不利即邉呉淀亦淤却一處塘泊豈邉呉淀淤却便過戎馬不得上曰邉呉已是壊却余曰見韓縝說邉呉見今有水不少若存得邉呉淀又更引河從臺山路入御河即是兩塘泊皆存得豈不善八月十六日同宻院進呈程昉言滹沱河事初宻院令孔嗣宗劉舜卿等相度奏稱所閉蔡家門口等外皆深淵若開作堰限即不可復閉昉以爲若今不可復閉即二年前如何閉得嗣宗等又以爲對敵境非便昉以爲二年前有數十道堰限如何敵境不以爲言昉又言自宻院閉此諸堰限凡浸民田二十村七八十里然此方無一人以爲言上乃始言嗣宗所奏皆妄然亦不以爲可罪也上令程昉便計度功料又令計㑹屯田司相度開堰限余曰須令先與屯田司相度開堰限無妨礙乃計功料上以爲然而宻院欲差官同徃相度擬差蔡天申天申挺子余明言其不可乃差李南公五月二十二日又有一叚當刪取并此詳定行户利害條貫所言據米麥等行狀嵗供稌禾蕎麥等薦新皆有賠費緣祠祭重事自今欲乞薦新並令後苑及四園苑供應從之庚寅判軍器監吕惠卿言乞撥三司曹案吏赴本監及東西八作司廣備指揮兵級本監與提舉司將作監等同統領從之仍詔廣備指揮專𨽻軍器六月二十七日可考權永興軍等路轉運使皮公弼言沿邉城寨糧草多寡不均少者支數月不免貴糴或費官錢般運多者及數年徃徃陳腐乞下諸路帥臣候見本司關報多寡處即度城寨𦂳慢移軍馬赴寛剰所就糧從之髙陽關路走馬承受克基言市易司指使馮崇與北人賣買不依資次非便上曰崇不忠信無行可令亟還彼自有官司交易悉存舊規王安石曰崇一百姓牙人耳安足責陛下左右前後所親信孰爲忠信孰爲有行竊恐有未察者上曰審是非察忠邪今若所難然不忠信之人跡狀著顯者未嘗不行法其未顯者吾取其潔不保其徃也如昨知瀘州李曼可謂有過矣而黨庇者至多范百度受命體量獨排羣議而奏其實此可褒進矣而近臣亦有言百禄不當得館職者此不可不察也安石又具道曼事本末曰不知何人庇曼因言士大夫君子固有不爲功名爵禄事陛下徒以致君臣之義者陛下似於君子小人未察也上曰如卿無利欲無適莫非特朕知人亦具知之至於他人則豈可保哉馮京曰君子小人固難知安石曰人人爲君子之容而内或懐小人之情則君子誠未可知若小人情狀已露則小人決矣尚復何疑堯詢事考言三載則知舜今陛下即位六七載詢事考言於羣臣情僞是非宜略可言乃尚以君子小人爲難知恐由小人欺罔尚未懲創故令聰明自蔽爾上曰御史無一人言曼者安石曰御史不能彈治姦邪令陛下聰明有所蔽塞雖流放不足以稱其罪如李曼事自須明白何足道上又言李曼事必須究見是非安石曰陛下若不以有浸潤故増損好惡必令是非之情見於上即天下平治乆矣政恐未能如此後安石又爲上辯上意終不以爲然也新權發遣梓州路轉運使陳忱言瀘州昨以夷賊擾邉屯戍稍廣配率飛輓數州爲之騷然乞計會熊本以所賜夔路度僧牒二百於淯井監安夷寧逺二寨募人入中糧斛以備軍儲從之是日熈河路走馬承受李元凱奏王韶自露骨山過一日至五七下馬歩行上不知韶路徑所趣甚憂之前此王安石答韶書云以萬人爲景思立後繼甚善想當以其間攻洮岷所不戒也上再三言韶不當如此罷敝兵甲安石曰韶頗有計慮舉動必不妄退召問習知路徑者乃言如此出師大善安石翌日白上且曰韶爲大將以萬人暴露原野若収城之功全在思立即韶下將佐無功將佐無功即怨且怠矣臣恐其思慮或有一不及故因書微發其思慮非敢輙然明勸諭之也軍如奕棋若一着只應得一着即無勝理須一着應三兩着乃可勝敵今韶因援河州畧定南山一帶乃是奕棋一着應三兩着之類也陳冦記云韶以八月甲戌領兵自熈之東南踰露骨山入洮州界至香則城山中與涇原兵合壬午分兵趨河州敗摩正於古河州城下河州平壬辰命權御史中丞鄧綰直舎人院許將集賢校理劉邠館閣校勘黄履爲考試制科武舉官龍圖閣學士張燾權樞宻副都承㫖張誠一同軍器監官考試武舉武藝武舉合格所取毋過三十人九月十一日御試場甲午賜熈河路討蕃部常家族及涇原路㑹合禁軍等特支錢有差十五日日録上見王韶去常家族曰韶被將佐煎迫得去翌日余得韶書將佐乃皆不欲徃韶獨決計以書白上曰誰以為韶將佐煎廹上曰王珪言此珪心只是料其如此余見珪但隨上語非珪唱爲此言也乙未詔通逺軍修鹽井城畢功防托工役兵並與特支錢詔將作監嵗用兵匠並於秋季下諸路剗刷明年春首起發約夏季皆集千里内七月終千里外六月終雖有替換補塡更不起發先是將作取外州兵匠並於二月下諸路官司因循有至放凍後乃至故有是詔丙申詔自今文武臣僚特遷官者不隔勘二年七月八日黄汾事可考詳定行户利害所言乞約諸行利入厚薄納免行錢以禄吏與免行户祗應自今禁中賣買並下雜賣場雜買務仍置市司估市物之低昻凡内外官司欲占物價則取辦焉皆從之上曰此固便於民然須嚴立防禁覺察毋使墮廢如天下百姓納麴錢鹽錢異時鹽酒既𣙜其錢不能免也中書言王韶景思立入河州諸羌皆降王安石等請率百官稱賀上曰河州前已収復但未城守此亦廟堂之謀將帥之功於朕何有安石等再三陳請以爲熈河之功近時少比陛下神算前定舉無不克祖宗以來毎下州郡例皆稱慶上猶不允安石曰中外傳河州事多端稱賀則人情釋然請俟修河州城畢入慶從之初王韶自以兵穿露骨山南入洮州界破摩正弟巴珍覺盡逐南山諸羌摩正震恐留其黨守河州自將精銳尾官軍伺擊諸將皆欲直走河州韶獨私念兵抵城下摩正必爲外應而四山蕃部得氣且復坌集則大事去矣乃宻分兵遣景思立攻河州而特蹤跡摩正所在與戰破走之然後抵城下時守者猶以爲摩正至已而知其非是乃出降遂城之丁酉鄜延路經略司乞自十月以後無大段邉事城寨兵有馬者移半赴鄜延就食輪漢蕃弓箭手相兼戍守詔趙卨體量漢蕃弓箭手如將來闕食即詳度賑貸或給借助錢榖及募人浚修城塹給口食多方存䘏之卨初有是請上即欲從之王安石以爲卨私憾楊蟠多㸃檢鄜延不法事故爲此以困轉運司白上曰鄜延路糧草已不足更剏添此弓箭手糧草恐愈不足且鄜延如此即它路援例如何不從從之則轉運司如何應副糧草上曰如保甲義勇將來豈不費糧草安石曰保甲義勇乃須計置减募兵以其糧米供之如府界罷四千兵所供保甲之費才養兵所費之十三上曰府界募兵亦未減得安石曰既有保甲代其窠坐即不要此四千募兵可指合要兵數減此四千今京師募兵逃死放停一季亦須及數千但勿招填即是減得三年三月十七日安石已有此言上又曰弓箭手飢饉若不如此恐流散餓殍安石請令依近降指揮募人修築城池之類或借助免息或賑濟上乃從安石議九月五日又詔卨詳度本志云卨言新募弓箭手頗習武技請更蕃代正兵歸京師詔審度之或即此事當考審度事已副見賜収復河州將士弓箭手寨户蕃勇敢等特支錢有差戊戌詔宰臣親王使相執政宣徽使許於樞宻院第二門外上下馬先是宣徽使以上出入皇城門上下馬與百官有差等惟至樞宻院門與使臣無異至是正之翰林學士曾布等言近司農寺請廵檢置指使保甲置契罷廵宿等條約奉㫖令司農寺兵部檢正檢詳立法臣等今修成義勇保甲及養馬條三巻詔兵部行之保甲惟開封府界以都保置木契左留司農寺右付其縣差官閱試農隙講習皆出左契廵檢司給廂禁軍白直餘以保丁畨上比舊兵級三分之一代更以十日遇追捕羣盗聼抽上下畨縣尉留弓手白直外餘如廵檢法河北河東陜西五路並排定保甲勸誘習武藝聼㫖閱試未得上畨餘路止排定保甲免習武藝其荆湖川廣被邉州軍如當習武藝委監司提舉司詳度以聞本志云後惟余邵上丁邕欽洞丁廣東槍手改為保甲者則𨽻焉今附注此十一月十九日可考新紀云戊戌復比閭族黨之法詔河東北陜西保甲𨽻以武事舊紀云戊戌上以募兵費大驕不可用追比閭族黨之制詔河北陜西河東路保甲𨽻以武事兵志第二巻保甲篇自三代比閭族黨之法廢更五季以來竭邦財以養士卒國以耗蠧而驕惰悖慢世常患之若寓兵於農稍習以武事先於畿甸次逮河北不耗於國得勝兵數十萬邊人望風震恐驕兵悉有慙色國勢以强然立法之初故老大臣相與沮議揺惑羣聼上重其事馴致以漸數與執政大臣論難今著其略與其憂勤艱難之際使來者見徳意之所在焉上嘗論租庸調法善之王安石對曰此法近於井田後世立事粗得先王遺意則無不善今亦無不可爲者顧難以速成爾上問其故安石對曰今百姓占田或連阡陌顧不可奪之使如租庸調法授田有限然世主誠能知天下利害以其所謂害者制法而加於兼并之人則人自不敢保過限之田以其所謂利者制法而加於力耕之人則人自勸於力耕而授田不能過限然此須漸乃能成法夫人主誠能知利害之權因以好惡加之則所好何患人之不從所惡何患人之不避然利害之情難識非學問不足以盡之流俗之人罕能學問故多不識利害之情而於君子立法之意有所不思而好爲異論若人主無道以揆之則必爲異議所奪雖有善法何由立哉養馬法凡五路義保願養馬者户一匹有物力養馬二匹者聼以監牧見馬給之或官與其直使自市毋或强與府界毋過三千匹五路毋過五千匹馬除襲逐盗賊外不得乗越三百里在府界者嵗免體量草二百五十束先給以錢在五路者嵗免折變縁納錢三等已上十户爲一保四等五等十户爲一社以待死病補償者保甲馬即馬主獨償之社户馬半使社人償之嵗一閱其瘠肥禁苛留者凡十有四條先自府界頒行焉在五路者委監司經略司州縣更度之此據本志因八月二十七日曾布上養馬條三巻附見其日更須考詳己亥樞宻副使呉充言朝廷開廣言路微至於庶人皂𨽻茍有可言皆得上聞此至公之誼也而比來士大夫輙以書啟或家信投有位其間排詆營捄増飾事情嫌愛在心言無忌憚因縁聞逹以快私欲雖朝廷必加審核至䝉原察則被誣之人亦已困辱且排詆者既難於反坐營捄者又隂以爲徳含沙射人束緼還婦懐隂害以中良善託公誼以售私恩此風寖成實黯聖政乞有司申嚴法禁庶懲薄俗詔中書樞宻院自今並遵它條制既而王安石白上曰堯舜所以治人但辨察君子小人明白使人不敢誕慢自不須多立法禁上曰要審察安石曰陛下每如此即盡善也戎瀘州江安縣各置武寧軍人指揮以四百人爲額七月十六日祕閣考試所言應制科陳彦古所試六論不識題及字數皆不足凖式不考蓋自祕閣試制科以來空踈未有如彦古者自是制科亦罷矣中書以兩浙提㸃刑獄盧秉書奏御言杭州奏廵檢孫日用捕鹽賊不如格乞衝替日用在職頗有勞宜䝉矜免王安石曰近浙路鹽額大増然州郡尚有不欲嚴禁者故廵捕官未敢竭力且人誰無過陛下若知其可任有違犯且少寛之則能吏奮矣上曰太宰以八柄御羣臣謂宜如此正宰相之任也州郡但能依法案劾行否去留在朝廷耳然少知此體者卿言甚善是月置眀州昌國縣廢澶州頓邱縣入青豐鄚州長豐縣為鎮并廢鄚縣春州為春縣以銅陵縣𨽻南㤙州續資治通鑑長編巻二百四十六
