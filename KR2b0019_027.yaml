body:
  text: 續資治通鑑長編卷二十三宋李燾撰太宗太平興國七年春正月壬寅詔翰林學士承旨李昉等詳定士庶車服喪葬制度付有司頒行違者論其罪甲寅以右衛大將軍侯贇知靈州贇既至按視蕃落犒以牛酒戎人悅服部內甚治在朔方凡十年上雖念贇久次而難其代者贇竟卒於治所初太祖免潭州嵗所調紙十年期滿當徴州言民飢願俟豐嵗乃輸詔並除之二月丙寅以江州星子縣為南康軍庚午豐州大首領黃羅並弟伊克綳等以良馬來貢詔開封府近者蝗旱相仍民多流徙宜設法招誘並令復歸滿百日不至其桑土並許他人承佃便為永業宣徽北院使判三司王仁贍掌邦計幾十年恣下吏為姦怙恩固寵莫敢發者又起范旻等獄坐貶黜者十餘人皆上南府時勳舊戚里用事吏故中外益畏其口會左拾遺南昌陳恕與兵部郎中宋琪同判勾院其僚數人率以皎察不畏強禦自任因議本司事有不協者互持短長及造朝恕獨出班具奏上詰之恕詞辨蜂起仁贍屈伏上怒甚辛未仁贍罷為右衛大將軍琪與度支判官兵部郎中雷德驤鹽鐡判官金部郎中奚嶼並責本曹員外郎戶部判官戶部員外郎王遹責授太常博士以給事中侯陟右正諫大夫王明同判三司同判三司自陟明始兵部郎中劉保勳判勾院擢恕為度支員外郎鹽鐡推官耿振户部推官元圯並權本曹判官事琪初與恕同白上既而反附仁贍故亦左降癸酉改仁贍為唐州防禦使月給俸錢三十萬以勳舊故稍異之也仁贍自以仇怨衆多因怏怏成疾數日卒其後上因言及三司財賦謂宰相趙普等曰仁贍縱吏為姦諸州場院皆隱沒官錢以千萬計朕初即位悉令罷去分命使臣掌其事仁贍再三言其不便朕語仁贍此斷自朕意若嵗課致虧不以責卿既一嵗舊千緡者為一二萬緡萬緡者為六七萬緡利入數倍用度皆足儻遇水旱即可以免百姓租稅仁贍自知其非心頗慙悸朕亦優容之耳别本上與宰相論仁贍在八年十月甲午今移入此兩川上供綱所過丁男百十輩轉送罪人錮送闕下在道病者亦發民輿擔知河南府何承矩奏以為疲民橫役請罷其事乙亥詔西川嶺南荆湖陜西每嵗上供錢帛勿復調民負擔以傳置卒代之甲申改關南為髙陽關廬州民負義倉米萬七千餘石詔特貸之杖殺長道縣尉張俊坐部下受賕犯贓錢五百七十貫故也辛卯封燕國長公主女髙氏為髙平縣主次女為真寧縣主是月復徙并州於三交寨即以潘美為并州都部署此據潘美行狀七年二月事也三交寨即陽曲縣三月癸巳朔日有食之宣州隕霜害桑稼詔蠲其租金明池水心殿成上將泛舟往遊或告秦王廷美謀欲以此時竊發若不果則詐稱病於府第候車駕臨省因作亂上不忍暴其事癸卯罷廷美開封尹授西京留守廷美每從南府入朝過學士院門見鎖院必令人隔扉問之孔目吏即白其姓名率以為常是日當直學士恐廷美問則難答因大啓院門廷美過已乃復扄之當校學士姓名時李昉扈蒙徐鋐實為學士丁未命右正諫大夫李符權知開封府詔黎州造大船於大渡河以濟西南蠻之朝貢者壬子賜秦王廷美襲衣通犀帶錢十萬絹綵各萬匹銀萬兩西京甲第一區又賜留守判官閻矩河南判官王遹錢各百萬初嶺南轉運使許仲宣既分遣南伐之師乃草檄諭交州明國威信期必再舉黎桓亦懼朝廷終行討滅甲寅復為丁璿上表謝罪且貢方物周渭傳亦稱渭檄交州今止記仲宣蓋仲宣不待詔即分屯諸軍功最著故也辛酉唐州言北陽縣蝗生飛烏數萬食之皆盡夏四月壬戍朔詔樞密使曹彬餞秦王廷美於瓊林苑始赴西京也甲子以左正諫大夫樞密直學士竇稱中書舍人郭贄並守本官參知政事上謂稱曰汝自揣何以致此稱曰陛下念藩邸之舊臣出於際會上曰非也乃汝嘗面折賈琰賞卿之直爾稱頓首謝以如京使柴禹鍚為宣徽北院使兼樞密副使翰林副使楊守一為東上閣門使充樞密都承旨守一即守素也與禹鍚同告秦王廷美隂謀故賞之樞密承旨加都字自守一始趙鎔及相里勳皆同告廷美隂謀勳既無傳實録亦不載鎔除官故略之乙丑左衛將軍樞密承旨陳從信罷為左衛將軍皇城使劉知信為右衛將軍弓箭庫使惠延真為商州長史禁軍列校蓚人皇甫繼明責為汝州馬步軍都指揮使棗強范廷召責為唐州馬步軍都指揮使定人王榮責為濮州教練使皆坐交通秦王廷美及受其私犒故也榮未行或又告榮嘗與廷美親吏狂言我不久當得莭帥遂削籍流海島實録坐廷美事左降又有劉令威等數人其名姓後皆不顯今略之丙寅以兵部員外郎宋琪通判開封府京府通判自琪始趙普既復相盧多遜益不自安普屢諷多遜令引退多遜貪權固位不能自決會普亷得多遜與秦王廷美交通事遂以聞上怒戊辰責授多遜兵部尚書下御史獄捕繫中書守當官趙白秦府孔目官閻密小吏王繼勳樊德明趙懷祿閻懷忠等命翰林學士承旨李昉學士扈蒙衛尉卿崔仁冀膳部郎中知雜事膝中正雜治之多遜自言纍遣趙白以中書機事密告廷美去年九月中又令趙白言於廷美云願宫車早晏駕盡心事大王廷美又遣樊德明報多遜云承旨言正會我意我亦願宫車早晏駕私遺多遜弓箭等多遜受之閻密初給事廷美左右上即位補殿直仍𨽻秦王府恣橫不法言多指斥王繼勳廷美尤親信之嘗使求訪聲妓繼勳怙勢取貸贓汚狼籍樊德明素與趙白遊處多遜因之以結廷美廷美又纍遣趙懷祿私召同母弟軍器庫副使趙廷俊與語閻懷忠嘗為廷美所遣詣淮海王俶求犀玉帶金酒器懷忠受俶私遺白金百兩鉛器絹扇等廷美又嘗遣懷忠齎銀碗錦綵詣其妻父御前忠佐馬軍都軍頭開封潘璘營燕軍校至是皆伏罪丙子詔文武常參官集議朝堂太子太師王溥等七十四人奏多遜及廷美顧望呪詛大逆不道宜行誅滅以正刑章趙白等請處斬丁丑詔削奪多遜官爵并家屬流崖州廷美勒歸私第趙白閻密王繼勳樊德明趙懷祿閻懷忠皆斬於都門之外籍入其家財斬白等在丙戌今并書之多遜纍世墳墓在河內未敗前一夕震雷焚其林木皆盡聞者異之及赴貶所食於道旁逆旅有嫗頗能言京邑舊事多遜因與語嫗固不知與語者多遜也多遜曰嫗何自來乃居此嫗頻蹙曰我本中原士大夫家有子任某官盧某作相令枉道為其事吾子不能從其意盧䘖之中以危法盡室竄南荒未周嵗骨肉相繼淪沒惟老身流落山谷今僑寄道旁非無意也彼盧相者蠧賢怙勢恣行不法無所避忌終當南竄幸未死間或可見之耳多遜默然趣駕去瓊州遣牙將知崖州事輒求婚於多遜多遜不許遂侵辱之將加害卒與為婚己卯右監門衛將軍韋進韜責授右衛率府率坐前知雄州鄙吝不市牛酒犒士卒延火燒其官舍城門樓進韜不知覺故也詔秦王廷美男女等宜正名呼貴州防禦使德恭等仍為皇姪皇姪女韓氏婦去雲陽公主之號右監門將軍韓崇業降為右千牛衛率府率分司西京仍去駙馬都尉之號並發遣往西京就廷美安泊命客省使翟守素權知河南府屬嵗旱艱食民多為盜上憂之守素既至漸以寧息左僕射兼門下侍郎同平章事沈倫被病踰數月多請告盧多遜將敗倫已上表求致仕上以多遜包藏逆莭倫與同列不能覺知庚辰責授工部尚書落其子都官郎中繼宗班簿倫清介謹厚故車駕每出多令居守然十年相位但齪齪固寵不能有所建明性尤好釋氏因果之説嘗盛夏坐室中恣蚊蚋咋其膚以徼福鄉人假粟至千斛嵗餘倫悉焚其劵微時妻老且醜有妾田氏甚寵之及貴於太康治第令故妻處焉遂以田氏為魯國夫人搢紳非之中書舍人李穆與盧多遜雅相親厚秦王廷美出為西京留守其朝辭笏記又穆所草也言事者劾奏之壬午責授司封員外郎著作佐郎劉錫知糧料院擅以米數千斛借秦王廷美丁亥上召錫詰之錫頓首稱死罪上怒命左右持梃者撾錫數十委頓而止己丑著作佐郎趙和光祿寺丞趙知微與親屬配𨽻沙門島禁錮皆趙白之兄也詔江南民私鑄鉛錫及輕小錢頗亂禁法自今公私所用每千錢須及四斤先蓄者悉送官潤州言丹徒等縣大水害稼詔給復一年五月癸巳貶西京留守判官閻矩為涪州司戶參軍前開封府推官孫嶼為融州司戶參軍皆秦王廷美官屬坐輔導無狀也綏州刺史西京作坊使李克文繼捧之從父也表言繼捧不當承襲請遣使與偕至夏州諭繼捧令入朝辛丑以克文權知夏州作坊副使尹憲同知州事甲辰西窑務役夫夏遇醉毆隊長楊彥進召至便殿上親問彥進具伏與主將牛鶚素嫉夏遇巧誣之上怒斬彥進配鶚海島擢遇為十將賜束帛銀帶以撫之先是園吏髙進誣告役夫朱希上召問狀乃髙進嘗求賂而希不與故誣之上杖髙進流海島免朱希役至是宰相趙普等以上親決庶獄察見微隱相率稱賀上嘗謂趙普曰朕每讀書見古帝王多自尊大深拱凝嚴誰敢犯顔言事若不降情接納乃是自蔽聰明或喜賞怒刑豈能歸天下之心哉普曰帝王若賞罰無私內外無間上求其理下竭其誠馴至太平不為難事上又問治民之道復有何術普曰陛下恤念生民每聞利病無不即日施行古聖王愛民之心止於此矣寶訓此二事皆云在興國八年别本亦在八年十月壬戌及甲午兩日但不出宰相姓名今從寶訓繫之趙普仍移見親決庶獄後若八年十月則普將去位矣己酉定難軍留後李繼捧來朝見於崇德殿繼捧之先纍四世未嘗入覲繼捧至上喜賜白金千兩絹千匹錢百萬其祖母獨孤氏獻玉盤一金盤三亦加厚賜繼捧自陳諸父昆弟多相怨懟願留京師遂獻其所管四州八縣遣使詣夏州護繼捧緦麻以上親赴闕縣次續食大名府言蝗生癸丑詔諸州縣長吏今宿麥將登宜及時儲蓄其告諭鄉民常嵗所入不得以食犬彘及多為酒醪嫁娶喪葬之具並從簡儉少年無賴輩相聚蒱博飲酒者鄰里共捕送官趙普以秦王廷美謫居西洛非便教知開封府李符上言廷美不悔過怨望乞徙逺郡以防他變丙辰降廷美為涪陵縣公房州安置命崇儀副使閻彥進知房州監察御史袁廓通判州事各賜白金三百兩廓梓潼人也己未詔京畿諸縣膏澤霑足宜令民及時種藝道路泥濘輸租者當俟晴霽吏無得督責庚申詔禁投匿名書告人罪及作妖言誹謗惑衆者嚴捕之置於法其書所在焚之有告者賞以緡錢是月契丹三萬騎分道入冦一襲鴈門潘美擊破之斬首三千級逐北至其境破壘三十六俘老幼萬餘口獲牛馬五萬計一攻府州折御卿擊破之新澤寨斬首七百級禽酋長百餘人獲兵器羊馬萬計一趨髙陽關崔彥進擊破之唐興口斬首二千級獲兵器羊馬數萬辛丑高陽關奏到辛亥鴈門奏到己未府州奏到今并書之皆略其日陕州言蝗生太平州雨雹傷稼詔京朝官出使所給印紙委本屬以實狀書不得增減功過阿私罔上其關涉書考之官悉署姓名違者論其罪六月丁卯齊州言河決臨濟縣初上以字學訛舛欲刪正之學士少能通習或薦趙州隆平主簿成都王著唐相方慶之後書有家法乃召為衛尉寺丞史館祗候令詳定篇韻在史館逾四年甲戍遷著作郎充翰林侍書上聽政之暇每以觀書及筆法為意諸家體洞臻其妙遣中使王仁睿持御札示著著曰未盡善也上臨學益勤又以示著著答如前睿詰其故著曰帝王始學書或驟稱善則不復留心矣久之復以示著著曰功至矣非臣所能及其後真宗嘗對宰相語其事且嘉著之善規益於侍書待詔中絶無其比先是舒州懷寧縣有老僧過民柯蕚家率蕚詣萬嵗山取寶僧以杖於古松下掘得黝石刻志公記云吾觀四五朝後次丙子年趙號二十一帝敬醮潛山九天司命真君社稷永安僧忽不見蕚以石刻來獻於是詔舒州修司命真君祠黃門綦政敏往督其役總成六百三十區號曰靈仙觀綦政敏天禧二年三月有附傳不記郡邑詔文武常參官自今所保舉人犯私罪無輕重減二等論定著於令乙亥齊州言逮捕臨濟縣尉王坦等六人繫獄獄未具一夕大風雨壞獄戶王坦等六人皆壓死丙子令富民出息錢不得過倍稱違者沒入之唐自元和以後不復譯經江南始用兵之嵗有中天竺瑪嘉多國僧法天者至鄜州與河中梵學僧法進共譯經義始出無量夀尊勝二經七佛贊法進筆受綴文知州王龜從潤色之遣法天法進獻經闕下太祖召見慰勞賜以紫方袍法天請遊名山許之上即位之五年又有北天竺克什密爾國僧天息災鄂等答國僧施護繼至法天聞天息災等至亦歸京師上素崇尚釋教即召見天息災等令閲乾德以來西域所獻梵經天息災等皆曉華言上遂有意翻譯因命內侍鄭守鈞就太平興國寺建譯經院是月院成詔天息災等各譯一經以獻擇梵學僧常謹清沼等與法進同筆受綴文光祿卿湯悅兵部員外郎張洎參詳潤色之內侍劉素為都監秋七月辛卯大名府言河決范濟口甲午封皇長子德崇為衛王第二子德明為廣平郡王德崇檢校太傅德明檢校太保並同平章事建徐州下邳縣為淮陽軍此據本紀冀州團練使牛思進護江南屯軍以老病不任事遣其子詣闕上疏求解官乙未授思進右千牛衛上將軍上將軍當作大將軍實録正史思進傳並誤也先是袁廓知鄆州河水溢入城浸民廬舍至冬月結為氷廓大發民鑿取舁出城散積之朝廷使者至謂其方略水獨不入城歸奏其狀優詔褒奬由殿中丞擢監察御史及春解凍州城地窪下流澌自四隅入民益被患於是河大漲蹙清河浸州城將陷急以聞殿前承旨劉吉江南人習水事詔往固之吉率丁夫疊掃於張秋堨河水回北流入平隂而清河水退鄆州不陷武勝節度使兼侍中髙懷德卒贈中書令追封渤海郡王懷德繼世勳貴性簡傲所至多不省事善音律自為新聲度曲臻其精妙好射獵馳逐嘗三五日露宿野次獲狐兔殆至數百每對客或歘然不揖而起則引數十騎由别門從禽於郊外矣有司言衛王及廣平郡王當同日赴中書視事上曰二王兄弟也當分日辛丑詔衛王先視事廣平郡王以次日癸卯幸譯經院盡取禁中所藏梵夾令天息災等視藏録所未載者翻譯之實録本紀皆不書今據本志及會要追記之初沈倫責為工部尚書時倫已病甚不能興但上表謝未幾再奉章乞骸骨壬子復授倫左僕射致仕上念倫國初舊臣嵗餘亦復其子繼宗官以慰撫之九年正月丁丑繼宗始復官丙辰詔緣邉卒沒於征戍者先受廩給勿復徴均州南劍州皆言大水壞民廬舍八月庚申朔太子太師贈侍中祁文獻公王溥卒記聞稱太宗即位即命溥致仕蓋誤也溥以太子太師居於位梧州言大水涪陵縣公廷美既出居房州趙普恐李符漏其言乃坐符府中用刑不當癸亥責符為寧國軍司馬命右正諫大夫邉珝權知開封府右衛將軍劉知信再責為靜難軍行軍司馬初北漢置固軍於嵐州北漢亡廢為宣化縣甲戌復號寧化軍儀鸞副使江守鈞決杖降為髙品坐擅借河陽節度使崔彥進威逺節度使曹翰金鞫得實狀故也乙亥詔刑部大理寺官並優其常俸戊寅詔翰林學士承旨李昉及庫部員外郎楊徽之等十一人舉三司判官及轉運使各一人偽蜀廣政中始鑄鐡錢每鐡錢一千兼以銅錢四百凡銀一兩直錢千七百絹一匹直錢千二百而鐡工精好殆與銅相亂既平蜀沈倫等悉取銅錢上供及增鑄鐵錢易民銅錢益買金銀裝發頗失裁制物價增長尋又禁銅錢入川界鐡錢十乃值銅錢一太平興國四年始開其禁令民輸租及𣙜利每鐡錢十納銅錢一時銅錢已竭民甚苦之商賈爭以銅錢入川界與民互市每銅錢一得鐡錢十又四其明年轉運副使右贊善大夫張諤言舊市夷人銅斤給鐡錢二百望增為千錢可以大獲因復鑄銅錢民租當輸錢者許且令輸銀及絹俟銅錢多即漸令輸之詔許市夷人銅斤止給錢五百然卒難得銅而轉運副使右補闕聶詠同轉運祕書丞范祥皆言民樂輸銅錢請每嵗遞增一分後十嵗即全取銅錢詔從其請祥因以月俸所得銅錢市與民厚取其直於是增及三分民蕭然益苦之或剜剔佛像毁器用盜發古冡才得銅錢四五坐罪者甚衆知益州工部郎中辛仲甫具言其弊乃詔使臣吳承勳馳傳至成都府審度利害仲甫集諸縣令佐問之或潛持兩端莫敢正言仲甫責之曰君等御前及第天子門生何得不為長久計反為聶補闕范祕丞乎乃皆言其不便先是諸州官𣙜酒酤官物不足以充用多賦於民益為煩擾仲甫并請罷之仍許民自釀承勳復命己邜詔劍南東西峽路諸州民輸租及𣙜利勿復徴銅錢罷官酤酒仍造麯市與民前所增麴錢三十萬並除之禁諸州不得擅增物價召聶詠范祥及東川轉運使宋覃同轉運卜倫皆下御史獄詠覃杖脊配役將作監祥倫免為庶人覃倫亦以月俸銅錢市與民厚取其直故也此事國史實録皆不詳參取成都記修潤據實録此年及會要咸平三年並稱宋覃杖脊配役覃時官右補闕又實録景德三年六月己卯録故供備庫使荆南都監宋覃子太廟齋郎維為太常寺奉禮郎覃太平興國初進士纍官至右補闕直史館東川轉運副使太宗厚之為權臣所擯抑換諸司使掌典宿桂升三州至是卒故録其子授京秩據此則宋覃未嘗真決也所稱權臣亦不知謂誰又按太宗實録雍熙四年己未以保信節度判官宋覃為崇儀副使其五月鄭宣等數人俱換內職覃為權臣所抑宣復坐何事耶則所稱權臣蓋未可信也覃自東川失官而景德實録遂沒不言疑必有故當考覃及聶詠杖脊范祥卜倫除名實録在十二月壬子今并書又詔川峽諸州市買院織造院除供軍布帛外其餘錦綺鹿胎透背六銖欹正龜殼等段匹自今不須買織民間有織賣者勿禁於是廢東川轉運使并屬西川其後西川轉運使劉度請官以鐡錢四百易銅錢一百既從之鹽鐡使王明曰若此重銅錢而輕鐡錢則物價彌貴矣望罷之詔可兩浙轉運司言部內諸州繫囚滿獄長吏隱落妄言獄空蓋懼朝廷詰其淹滯也詔自今諸州有妄奏獄空及隱落囚數者必加深譴募告者賞之冀州言南宫縣民王翰母喪明翰自抉目睛補之母目如故九月己丑朔詔曰朕方隆教法用福邦家眷言求度之人頗限有司之制俾申素願式表殊恩應先係籍童行長髮並特許剃度自今勿以為例深州陸澤縣民邢超逋官租里胥督租與超鬭超毆里胥死超子神留年十六詣吏求代父州以聞戊申詔特減死賜里胥家萬錢為棺斂具癸丑權知髙麗國王治遣使來貢方物且言其兄胄死求襲位邠州言蝗食稼上以諸道進士猥雜或挾書假手僥幸得官所至多觸憲章欲懲革之甲寅詔所在貢舉等州自今長吏擇官考試合格許薦送仍令禮部自今解貢舉人依吏部選人例每十人為保有行止踰違為他人所告者同保並當連坐不得赴舉貴妃孫氏卒孫氏以太平興國二年入宫明年封才人後賜號貴妃宫中皆呼貴妃然未嘗宣制也二年八月入宫三年三月封才人新作尚書省於孟昶故第冬十月辛酉夏州言戎人拒命發州兵擊敗之斬首五百級獲羊馬萬計上初以契丹渝盟來援太原遂親征范陽欲收中國舊地既而兵連不解議者多請息民癸亥詔緣邉諸州軍縣鎮等各務守境力田無得闌出邉關侵撓帳族及奪略畜産所在嚴加偵邏違者重論其罪獲羊馬生口並送於塞外上嘗謂近臣曰朕每讀老子至佳兵者不祥之器聖人不得已而用之未嘗不三復以為規戒王者雖以武功克定終須用文德致治朕每退朝不廢觀書意欲酌前世成敗而行之以盡損益也契丹主眀記死不得其時今附嵗末更當考之戊辰幸金明池御龍舟觀習水戰遂幸瓊林苑射壬申幸太平興國寺譯經院遂幸新尚書省懷州言河決武德縣害民田詔蠲其租己卯左諫議大夫參知政事贈工部尚書竇稱卒車駕臨哭將以翌日大宴詔罷之初有司言應天厯氣朔漸差詔司天監王處訥等重加考定處訥别上新厯詔付本監集官看詳會冬官正吳昭素徐瑩董昭吉等各獻新厯處訥既卒所上厯遂不行於是遣內臣沈元應集本監官屬學生參校昭吉等三厯之踈密秋官正史端等言昭吉厯差誤昭素及瑩二厯以建隆癸亥以來二十四年氣朔驗之唯昭素厯氣朔稍均可行用又詔衛尉少卿元象宗與元應等再集官及明厯術者重定象宗等言昭素厯法考驗無差可施之永久上乃自制厯序號乾元厯優賜昭素等束帛唐藩鎮皆置邸京師以大將領之謂之上都留後後改為上都知進奏院五代以來支郡不𨽻藩鎮者聽自置邸𨽻藩鎮者則兼領焉國初緣舊制皆本州鎮署人為進奏官其軍監場務轉運司則差知後官或副知掌之及支郡不復𨽻藩鎮遂各置邸而外州將吏多不願久住京師故長吏募京師人或以親信為之晨集右掖門外廊受制勑及諸司符牒將午則各還私居事頗稽緩泄漏是月始令供奉官張文璨等簡閲進奏官知後官副知等凡二百餘人得一百五十人並補進奏官每人掌二州或三州軍監事其不中選者為私名副知去知後之名置都進奏院於大內側近文璨等領之中書言堂後官元額十五人舊公事不及一百州今除出外官及死亡外止存十人行遣詔吏部流內銓於見任州縣官內選有科名厯任别無不了者抽取引見送中書比試如諳會公事久逺堪充堂後官者即留不堪者却令歸任是嵗抽到州縣官于若訥等三十三人得許州録事參軍陳雅等四人並授雄望州别駕充職餘悉令歸任此據會要乃七年十月事今附見十一月己酉以李繼捧為彰德節度使先詔綏州刺史李克憲銀州刺史李克文皆赴闕乃授克憲單州刺史克文澧州刺史克憲初偃蹇不奉詔遣通事舍人袁繼忠諭旨遂與繼忠俱至仍以克文權知夏州禁民居喪作樂及為酒令者以不孝論十二月戊午朔日有食之詔開封府民輸租於常限外加半月雨雪故也瓊州言颶風壞官寺民舍幾盡辛酉右補闕田錫上疏論朝政得失不報此據錫睦州所上章追記之當搜求錫本章附見睦州所上章注在六年九月兩浙轉運使髙冕條上舊政之不便者凡百餘事庚午詔兩浙諸州自太平興國六年以前逋租及錢俶日無名掊斂吏至今猶徴督者悉除之冕錫之兄子也戊寅權知髙麗國王治封髙麗國王命監察御史李巨源巨源未見著作佐郎直史館單貽慶奉使上喜訪求辭學之士初得須城趙鄰幾擢掌制誥才數月卒上嘆其窮薄因問近臣誰可繼鄰幾者楊守一與貽慶有舊力薦之由主簿召對令中書試文稱旨即命以官上知貽慶貧故使副巨源使髙麗貽慶以母老辭乃留不行詔國子博士雍丘孔維代之貽慶萊州人也髙麗王治問禮於維維對以君臣父子之道升降等威之序治喜曰吾今日復見中國夫子也詔御史臺應見任文武官悉具鄉貫厯職年紀著籍以聞或貢舉之日解薦於别州即須兼敘本坐鄉貫或不實者許令糾告當置其罪自今入官者皆如之委有司閲視內有西蜀嶺表荆湖江浙之人不得為本道知州通判轉運使及諸事任庚辰右驍衛上將軍贈侍中楚昭輔卒閏十二月庚寅豐州刺史王承美言契丹錫利裕嚕密日威約克等十一族七萬餘帳內附又與契丹戰破其萬餘衆斬首二千級獲天德節度使韋太及羊馬兵器萬數遣其弟承義來獻俘賜承義錦袍金帶絹百匹先是交州欲以占城俘九十三人來獻上令廣州止其俘給衣服資糧遣還占城詔諭其王於是占城國遣使乘象來貢方物詔留象於南海新建縣令朱靖因怒決部民致死甲午靖杖脊配沙門島禁錮丙申畋近郊遂幸講武臺賜從臣飲丁酉詔諸州犯徒流罪人等並配所在牢城勿復轉送闕下仍不得輒以案牘聞奏稽留刑獄違者論其罪先是知桐廬縣太常寺太祝刁衎上疏言淫刑酷法非律文所載者望詔天下悉禁止之巡檢使臣捕得盜賊亡卒並送本部法官訊鞫無得擅加酷虐古者投姦人於四裔今乃逺方囚人盡歸象闕配於務役最非其宜神臯勝地天子所居豈可使流囚於此聚役自今外處罪人望勿許解送上京亦不留於諸務充役又禮曰刑人於市與衆棄之則知黃屋紫宸之中乃非行法用刑之所望自今御前不行決罰之刑殿前引見司鉗黥法具並付御史廷尉之獄敕杖不以大小皆以付御史廷尉京府或出中使或命法官具禮監科以重聖皇明刑慎法之意或有犯劫盜亡命罪重者刖足釘身國門布令此乃愚民昧於刑憲逼於衣食偶然為惡義不及他被其慘毒實傷風化亦望減除此法如此則人情不駭各固其生和氣無傷必臻其瑞矣上覽疏甚悅降詔褒答焉衎升州人也初仕李煜直清輝殿閲中外章疏甚被親昵歸朝授太祝稱疾假滿落籍屏居輦下者數嵗李昉扈蒙在翰林勉其出仕因獻聖德頌乃復故官出宰桐廬凡七年不遷搢紳服其純淡夷雅多推尊之去年秋詔百官言事衎疏必因此而上不知的在何時附見丁酉詔後恐此詔實因刁衎也庚戍詔兩京諸州擇郡民有練土地之宜明種樹之法者補為農師縣一人令相視田畝沃瘠及五種所宜指言某處土田宜植某物某家有種某戶有丁男某人有耕牛即令鄉三老里胥與農師同勸民分於曠土稼蒔俟嵗熟共取其利為農師者蠲稅外免其他役民家有嗜酒蒱博怠於農務者俾農師謹察之白於州縣論其罪以警遊惰所墾田即為永業官不取其租辛亥曲赦銀夏等州管內是嵗銀州蕃落拓拔遇來訴本州賦役苛虐乞移居內地詔令各守族帳布納克族結集扇動諸部夏州巡檢使梁逈率兵討平之契丹主眀記卒諡景宗孝成皇帝十朝綱要在位十五年有子三人曰隆緒隆裕隆慶隆緒封梁王繼立號天輔皇帝尊母蕭氏為承天太后改大遼為大契丹隆緒才十二嵗母蕭氏專其國政初蕭氏與樞密使韓德讓通眀記疾亟德讓將兵在外不俟召率其親屬赴行帳白蕭氏易置大臣立隆緒遂以䇿立功為司徒政事令封楚王賜姓耶律改名隆運尋拜大丞相蕃漢樞密使南北面行營都部署徙封齊王隆緒親書鐡劵讀於北斗下以賜之遷尚書令又徙封晉王賜不拜乘車上殿置護衛百人護衛惟國主得置之隆緒每以父事隆運日遣其弟隆裕一問起居望其帳即下車步入本傳載眀記死在三道入冦及息兵詔前恐三道入冦時眀記未死也或眀記死太宗因詔息兵然皆不得其實今移見嵗末三道入冦在五月息兵詔在十月或載眀記死於三月末蓋因本傳今不取
