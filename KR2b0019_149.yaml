body:
  text: 續資治通鑑長編卷一百四十五宋李燾撰仁宗慶歷三年十一月丙寅上清宫火尋有詔以宫地為禁軍營監察御史裏行包拯有章乞勿修按拯為裏行乃在此月癸酉以宫地給禁軍當是癸酉後也己巳陜西都轉運使起居舍人天章閣待制孫沔為禮部郎中環慶路都部署知慶州户部副使兵部員外郎程戡為天章閣待制陜西都轉運使辛未以試方略人黃通為試大理評事張定方為祕書省正字姚光弼張紘為試將作監主簿光弼內斌孫也先是諫官歐陽修言臣伏見御史臺闕官近制令兩制并中丞輪次舉人遂致所舉多非其才不能稱職如蘇紳昨舉馬端却須朝廷别有行遣臣謂今兩制之中姦邪者未能盡去若不更近制則輪次所及勢須舉人近聞梁適舉王勵燕度充臺官其人以適在姦邪之目各懷愧醜懼其汙染風聞皆欲不就以此言之舉官當先擇舉主臣欲乞今後只令中丞舉人或特選舉主仍見朝班中雖有好人多以資考未及遂致所舉非人今乞不限資考惟擇才堪者為之况臺中自有裏行以待資淺之人仍乞重定舉官之法有不稱職者連坐舉主重為約束以防偽濫庶幾稱職可振綱紀又言臣近曽上言為臺官闕人乞不依資考選舉仍令添置裏行所貴得材可以稱職竊聞近詔宋祁舉人依前只用舊例又未有議復裏行臣竊嘆方今大臣事無大小知其弊不肯更改凡臺官舉人須得三丞以上成資過判此例蓋自近年然近年臺官無一人可稱者近者臺官至有彈教坊弟子鄭州來者朝中傳以為笑臺憲非才近嵗尤甚是此例不可用明矣然而寧用不才以曠職不肯變例以求人今限以資例則取人之路狹廣其路猶恐無人何况專守其狹若使資例及者入三院未及者為裏行又於差除都不妨礙况今四方多事之際揚威出使正要得人臣今欲特降指揮令舉官自京官以上不問差遣次第惟材是舉使資淺者為裏行資深者入三院臣見前後舉臺官者多徇親舊舉既非材人或問之則曰朝廷限以資考致别無人可舉今若改此繆例責其惟材是舉則不敢不舉有才之人所冀漸振臺綱免取非笑景祐初置殿中侍御史裏行監察御史裏行凡四人以三丞以上嘗歷知縣人充既而久闕不除於是詔以兩人為額裏行以兩人為額據百官志即慶歷三年事今附見王拱辰舉李京包拯或因修疏也更詳之癸酉太常博士李京殿中丞包拯並為監察御史裏行中丞王拱辰所薦也京趙人嘗知魏縣奉法嚴正吏不便欲以計中京遂相率遁去監司果議以苛刻斥知府任布曰如此適墮吏計中京賴以免拯合淝人事父母以孝聞嘗知天長縣有訴盜割牛舌者拯使歸屠其牛鬻之既而又有告殺牛者拯曰何為割某家牛舌而又告之盜者驚伏徙知端州州嵗貢硯前守緣貢率取十倍以遺權貴人拯命製者才足貢數嵗滿不持一硯歸改新知懷州司勳員外郎周越知台州河北都轉運按察使言越素貪濁而懷州路當衝要宜擇人以代之也辛巳詔引進四方館使自今並兼領閣門事又詔武臣乞致仕而嘗坐贓者降一等除官初光化軍賊邵興帥其黨趨蜀遇華商等州提舉捉賊上官珙殺之又敗興元府兵於饒風嶺軍校趙眀以衆降自州北循山而西捉賊使臣陳曙等領兵追擊興于壻水其黨皆就擒壬午詔並凌遲處斬曙若拙子也韓琦家傳云琦遣秦州將官王子方邀殺之今不取諫官歐陽修言臣切見近日盜賊縱橫張海等二三百人未能敗滅光化軍宣毅又二三百人臣謂朝廷致得盜賊如是者不惟中外無備蓋由威令不行昨王倫賊殺主將自置官稱著黃衣改年號事狀如此如何既敗之後不誅家族凡小人作事亦須先計成則獲大利不成則無大禍有利無害誰不欲反只如淮南一帶官吏與王倫飲宴率民金帛獻送開門納賊道左參迎茍有國法豈敢如此而往來取勘已及半年未能斷遣古者稱罰不踰時所以威激士衆今遲緩如此誰有懼心遂致張海等官吏依前迎奉順陽縣令李正已延賊飲宴宿于縣廳恣其劫掠鼓樂送出城外其人敢如此者蓋為不奉賊則死不奉朝廷不死所以畏賊過如畏國法臣恐朝廷威令從此遂弱盜賊凶勢從此轉強臣聞刑期無刑殺以止殺寬猛相濟用各有時伏望陛下勿採迂儒所説婦人女子之仁尚行小惠以誤大事其宣毅兵士必有家族伏乞盡戮於光化市中使遠近聞之悚畏以止續起之賊其正已仍聞已有臺憲上言亦乞斬于鄧州使京西一路官吏聞之畏恐知國法尚存不敢奉賊從來只被迂懦之人因循不斷誤陛下事壞天下事勢已如此不可更循舊弊武怒威斷惟陛下力行之修又言臣聞江淮官吏等各為王倫事奏案已到多時尚未聞斷遣仍聞議者猶欲寬貸臣聞昨來江淮官吏或斂物獻送或望賊奔迎或獻送兵甲或同飲宴臣謂王倫一叛偶肆猖狂而官吏敢如此者蓋知賊可畏而朝廷不足畏故也今若更行寬貸則紀綱隳壞盜賊縱橫天下大亂從此始矣何以知之昨王倫事起江淮官吏未行遣之間京西官吏又棄城而走望賊而迎若江淮官吏不重行遣則京西官吏亦須輕恕京西官吏見江淮官吏已如此則天下諸路亦指此兩路為法在處官吏皆迎賊棄城獻兵納物天下何由不大亂也臣伏思祖宗艱難造基陛下憂勤嗣業而一旦四裔外叛盜賊內攻其壞者誰哉皆由前後迂繆之臣因循寬弛使朝廷不振紀綱遂隳今已壞之至此而猶不革前非以寬濟寬何以救弊如朝仲約等情理至重但合深行議者無由曲解或聞以為自是朝廷素不為備不可全罪外官假如殺父與兄者豈可只言自是朝廷素無教化而不罪殺之之人又如有人掠奪生人男女金帛不可只言自是朝廷素無禮讓而不罪劫人之賊迂儒不可用可笑如此李熙古豈獨朝廷素信任之臣傅永吉豈獨是朝廷素練之兵蓋用命則破賊矣今朝廷素無禦備為大臣之家父子兄弟並在朝廷權要之臣皆是相識多方營救故先於江淮官吏寬之只要韓綱行遣不重今大臣不思國體但植私恩惟陛下以天下安危為計出於聖斷以勵羣下庶幾國威粗振賞罰有倫其朝仲約等乞重行朝典初羣盜剽劫淮南將過髙郵知軍朝仲約度不能禦諭富民出金帛具牛酒使人迎勞且厚遺之盜悅徑去不為暴事聞朝廷大怒樞密副使富弼議誅仲約以正法參知政事范仲淹欲宥之爭於上前弼曰盜賊公行守臣不能戰不能守而使民醵錢遺之法所當誅也不誅則郡縣無復肯守者矣聞髙郵之民疾之欲食其肉不可釋也仲淹曰郡縣兵械足以戰守遇賊不禦而又賂之此法所當誅也今髙郵無兵與械雖仲約之義當勉力戰守然事有可恕戮之恐非法意也小民之情雖醵出財物而得免於殺掠理或喜之而云欲食其肉傳者過也上釋然從之仲約由此免死既而弼愠甚謂仲淹曰方今患法不舉舉法而多方沮之何以整衆仲淹密告之曰祖宗以來未嘗輕殺臣下此盛德之事奈何欲輕壞之且吾與公在此同僚之間同心者有幾雖上意亦未知所定也而輕導人主以誅戮臣下他日手滑雖吾輩亦未敢自保也弼終不以為然其後兩人不安於朝相繼出使弼還自河北及國門不許入未測上意比夜倣徨不能寐繞牀歎曰范六丈聖人也范文正公作參知政事富文正公作樞密副使時盜起京西掠商鄧均房光化軍棄城走奏至二公同對上前富公乞取知軍者行軍法范公曰光化無城郭無甲兵知軍所以棄城乞薄其罪仁宗可之罷朝富公怒甚謂范公曰六丈要作佛耶范公笑曰人何用作佛某之所言有理少定為君言之富公亦不樂范公從容曰上春秋鼎盛豈可教之殺人至手滑吾輩首領將不保矣富公聞之汗下起立以謝曰非某所及也富公素以丈事范公云據邵伯溫見聞録所稱光化軍蓋謬也今從蘇氏龍川别志以為張海亦恐誤今削去賊名姓仍附誅光化叛卒之後蓋慶歷間賊王倫起京東掠淮南張海起陜西掠京西不聞張海嘗過淮南也范仲淹正傳亦指王倫不稱張海傳所載守令當誅者不但仲約一人今但從别志王堯臣慶史記此事亦與邵伯溫同但稱王倫不稱張海伯溫蓋誤也諌官孫甫言竊觀與西人議和其利一而其害有四且西邉宿兵以來國用空耗而民力匱乏今若與約和則邊兵可減科斂可省其為利一也始契丹聲言嘗遣諭西人使臣中國今和議成恃其功且去嵗乘西邊屢敗已有割地之請朝廷意在息民故但增嵗賂而不忍起二方之役今若更有所求將安拒之乎此其害一也自天下承平四十年間武事不飭及邊鄙有警而用不習之將不練之兵故久無成功然比來邊臣中材謀勇健者往往復出方在講訓不懈以張中國之威一日因議和弛備復如曩日緩急必不可用此其為害二也自元昊拒命終不敢深入關中者以沙州嘉勒斯賚等族素所不附慮為後患也今中國與之通和獲遺之厚彼必専力以制二蕃強大之勢自兹以始此其為害三也且朝廷恃久安之勢法令弛而不振紀綱墜而不修忠邪不辨用度不節未聞有為陛下安危計者及西戎起釁而初猶忽之至纍敗王師始議更張法制以救前事之弊茍戎人遂和又且一時無事前日恃物力之完盛以致今日之患今其勢大屈若復安逸則他時之患不可枝梧矣此其為害四也凡利害之機安危之計願陛下留神而熟圖之癸未詔自今見任前任兩府及大兩省以上官不得陳乞子弟親戚館職并讀書之類進士三人以上一任內無過犯者許進著述召試取優等者充遇館職闕取曾有兩府二人兩省三人同罪舉充者仍取著述看詳試補此即范仲淹等所陳十事其二日抑僥幸已具九月丁卯會要以為十一月二十六日詔諫官歐陽修言伏見國家近降詔書條制館閣職事有以見陛下謹於名器漸振紀綱然而積弊之源其來已久僥幸之路非止一端今於澄革之初尚有未盡其甚者臣見比年外任發運轉運使大藩知州等多以館職授之不擇人材不由文學但依例以為恩典朝廷本意以其當要劇之任欲假此清職以為重然而授者既多不免冒濫本欲取重人反輕之加又比來館閣之中大半膏粱之子材臣幹吏羞與比肩亦有得之以為恥者假之既不足為重得者又不足為榮授受之間徒成兩失臣欲乞今後任發運轉運使知州等更不依例帖職若其果有材能必欲重其職任則當升拜美官優其秩祿况設官之法本貴量材隨其器能自可升擢豈必盡由儒館方以為榮臣竊見近年風俗偷薄士子奔競者至有偷竊他人文字干謁權貴以求薦舉如邱良孫者又有廣費資財多寫文册事業又非絶出而惟務干求勢門日夜奔馳無一處不到如林槩者此二人並是兩制臣僚奏乞召試內邱良孫近雖押出而林槩已有召試指揮舊來本無兩省以上舉館職明文尚猶如此奔競今若明許薦人則今後薦者無數矣臣欲於近降詔書內兩省舉館職一節添入遇館職闕人即朝廷先擇舉主方得薦人仍乞别定館閣合存員數以革冗濫又臣竊見近降詔書不許權貴奏子弟入館閣此蓋朝廷為見近年貴家子弟濫在館閣者多如吕公綽錢延年之類尤為荒濫所以立此新規革其甚弊臣謂今後膏粱子弟既不濫居清職則前已有館閣者雖未能沙汰尚須裁損欲乞令貴家子弟入館閣見在人中若無行業文詞為衆所知則不得以年深遷補龍圖昭文館并待制修撰之類所貴侍從清班不至冗濫修疏附見其從違當考林槩福清人乙酉陜西宣撫副使田况言自冬初諸路得諜者皆聲言西界迤邐約噶綱朗威等諸腹心謀叛賊事覺被誅國中大亂臣竊疑朝廷方遣使議和賊所希甚大若心實欲和則當夸示凶勢幸我曲從以厭其私豈肯詐揚此聲自見危弱此其勢實衰而亟求欵附也若其國人果叛猶且倔強妄有干求不宜過有許與示四夷以弱如諜者所得皆詐則蓄謀懷毒志未可量雖盡副所求只足納侮朝廷既恃和懈備賊乃羸形伺隙禍發所忽昔人所戒望與二府大臣熟計其事其嵗給恐不可復增也丁亥詔曰周大司樂掌學政以六藝教國子則官材蓋本於世胄而今之蔭法推恩太廣以致踈宗蒙澤稚齒授官未知立身之道從政之方而並階仕進非所以審政重民也其著為令使夫冢嗣先録以篤為後之體支子限年以明入官之重設考課之格立保家之條古不云乎爵祿者天下之砥石人君所以礪世而磨鈍咨爾庶位體兹意焉宰相使相舊蔭子為將作監丞期親太祝奉禮郎自今子期親悉如舊餘親以屬逺近補試銜樞密使副使參知政事子為太祝奉禮郎期親校書郎今子孫及期親尊屬如舊餘以次補試銜僕射尚書子為校書郎或正字期親寺監主簿今子孫并期親尊屬如舊餘屬第補試銜三司使翰林學士侍讀侍講龍圖閣樞密直學士丞郎子為正字期親寺監主簿今子及期親尊屬如舊餘屬第補試銜或齋郎龍圖閣直學士給事中諫議舍人知制誥龍圖天章閣待制卿監三司副使知雜子為寺監主簿期親試銜今惟長子聼如舊餘屬第補試銜或齋郎郎中省府推判官館閣職舊郊恩薦補其嘗以贓抵罪復故官至郎中及員外郎任館閣職止蔭子孫親屬一人尚在謫籍者弗預轉運副使提點刑獄悉於郊禮前到任踰一年乃聽蔭補凡選人年二十五以下遇郊限半年赴銓試命兩制三員鎖試于尚書省糊名謄録習辭業者試或詩賦詞理可采不違程式為中格習經業者人専一經兼試律十道而通五為中格聼預選以上經兩試九選以上經三試至選滿有京朝官保任者三人補逺地判司簿尉無舉者補司士參軍或不赴試亦無舉者永不預選京朝官年二十五以上嵗首赴試于國子監考法如選人中格者調官兩任無私罪有監司知州通判保舉官三人入親民經三試朝臣保舉者三人與下等釐物務兩任無私犯監司或知州通判保舉者五人入親民願易武辨者聼其武臣使相子為東頭供奉官期親左侍禁子及期親如舊餘屬自左班殿直第官之樞密使副宣徽節度使子為西頭供奉官期親右侍禁子孫及期親尊屬如舊餘屬自右班殿直以下第官之統軍上將軍節度觀察留後觀察使內客省使子為右侍禁期親右班殿直子孫及期親尊屬如舊餘屬自三班奉職以下第官之客省使引進使防禦使團練使四方館使樞密都承旨閣門使子為右班殿直期親三班奉職子孫及期親如舊餘屬三班借職以下第官之正刺史子為三班奉職期親借職子孫及期親尊屬如舊餘屬為差使殿侍諸衛大將軍內諸司使樞密院諸房副承旨子為三班奉職期親借職子孫并期親尊屬如舊餘屬為下班殿侍諸衛將軍內諸司副使樞密院承旨子為三班借職嘗以入已贓坐罪遷至諸司副使諸衛將軍止蔭子若孫一人初任川廣福建七路恩如舊凡三班試弓弩於軍頭司力及而射有法為中格習書算者三班院書家狀誤才三字算錢穀五事通三為中格習六韜孫吳書試義十而通五為中格兼弓弩為優等願試策者聽之五通三為中格或習武藝五事馳射間敏通書算者亦為優等補邊任武藝不羣策詳而理暢為異等引見聼旨蔭長子孫皆不限年諸子孫須年過十五若弟姪須年過二十必五服親乃得蔭已嘗蔭而物故者無子孫祿仕聼再蔭自是任子之恩殺矣然猶未大艾也此亦仲淹等所陳十事之二也其略己見九月丁卯任子之恩少殺猶未大艾此本志語也戊子録故陜西提舉捉賊內殿崇班閣門祗候上官珙子士堯為右班殿直以珙與羣盜鬬死也己丑御史中丞王拱辰言昨西人乞賣青鹽如聞朝廷欲指定緣邊一兩州軍放行臣尚恐以為未便且博易青鹽雖自官中糶賣與民然必開沿邊蕃户冒販之路若止留官中日用又嵗月所費幾何臣欲乞只於保安軍𣙜場博易青鹽逐旋輦至鄜州許客人如解鹽價請算於關東地分出賣毋得入陜西河東一則鹽法不壞二則商賈見利算者必多商賈既行更不須輦至鄜州只令就保安軍請算此亦濟權宜之策也庚寅詔陜西宣撫使韓琦副使田况赴闕諫官歐陽修言竊聞已降中書劄子抽回韓琦田况等歸闕昨來琦等奉命巡邊本為西賊議和未決防其攻冦要為禦備今西人再來方有邀請在於事體必難便從邊上機宜正須處置仍聞韓琦田况各有奏狀言邊防有備請朝廷不須怯畏每事曲從竊以勝敗之間安危所繫料琦等如此奏來則邊事可知自有枝梧不致敗誤臣謂且令琦等在彼撫遏則朝廷與賊商議自可以持重不須屈就今議方未決中道召還則是使賊知朝廷意在必和自先弛備况事無急切何必召歸其召韓琦等劄子伏乞速賜指揮抽回且令琦等在彼經略以俟西賊和議之決詔選在京五百料錢以上禁軍武伎最髙而衆所服者每營五人令樞密院籍記以備驅使辛卯同修起居注歐陽修請自今上殿臣僚退令少留殿門俟修注官出靣録聖語從之諫官孫甫又言竊見張子奭使夏州回雖聞元昊欲稱臣然嵗乞賣青鹽十萬石兼遣人回易京師及乞增嵗給之數始聞大臣議於緣邊置𣙜場計賣鹽五七萬石及互市諸物臣以謂西鹽五七萬石其直不下錢十餘萬貫况朝廷已許嵗給之物二十萬今又許賣鹽則與遺北敵物數相當北敵之勢與中國抗且因入冦澶淵先帝息民為心故不惜嵗給之厚今元昊世為藩臣擁區區數州之地非北敵比一日無故叛命因其復欲稱臣便同北敵所賂之數實恐他日為患不細且去嵗北敵忽有割地之請雖復繼盟今又見厚給元昊其貪欲之心得自已乎况自德明之時纍乞放行青鹽先帝以其亂法不聼及請之不已命追德明弟入質而許之是以彼必不從之事以杜其意蓋鹽中國之大利又西戎之鹽味勝解池所出而其産無窮既開其禁則流于民間無以隄防矣兼聞張子奭言元昊國中頗甚窮蹙就如其説朝廷不必急和且元昊拒命以來雖屢敗王師殺掠邊民然起事之初自當收結人心凡所得逐時分給其衆兵力雖勝用度隨窘此亦可信當彼窘乏之際尤宜以計困之安得汲汲與和哉議者不過以王師數戰不利若與和則邊用可省然不慮北敵邀功元昊蓄計於後有不可枝梧之勢今西邊窺賊之勢已熟將之能者漸出而兵之精者可用朝廷若減冗兵罷不材之將為持久之計以待之何患賊之不困也古之為天下者見不可為之勢而尚為之今日之勢非不可為但顧目前之利而不為爾賣鹽之請固不可許望陛下與大臣審安危大計而決定之歐陽修言伏見張子奭奉使賊中近已到闕風聞賊意雖肯稱臣受册而尚有數事邀求未審朝廷如何處置臣聞善料敵者必揣其情偽之實能知彼已乃可制勝負之謀今賊非難料但患為國計者昧於逺見茍一時之暫安召無涯之後患自為削弱助賊姦謀此傳所謂疾首痛心賈誼所以太息慟哭者也今議賊肯和之意不過兩端而已欺罔天下者必曰賊困窘而求和稍能曉事者皆知賊權詐而可懼若賊實困窘則正宜持重以裁之若知其詐謀則豈可厚以金繒助成姦計昨如定等回但聞許與之數不過十萬今子奭所許乃二十萬仍聞賊意未已更有過求先朝與契丹通和只用三十萬及劉六符輩來又添二十萬今昊賊一口已許二十萬則他日更來又須二三十萬使四夷窺見中國廟謀勝算惟以金帛告人則邈川首領豈不動心一旦興兵又須三二十萬生民膏血有盡彼求無厭何有限極今已許之失既不可追分外過求尚未抑絶見今契丹往來尚在沿邊市易豈可西蕃絶逺須要直至京師只以此詞自可拒止至如青鹽弛禁尤不可從於我雖所損非多在賊則為利甚博况鹽者民間急用既開其禁則公私往來姦細不分若使賊捐百萬之鹽以啖邊民則數年之後皆為盜用矣凡此三者皆難允許今若只為臣下茍安之計則何必愛惜盡可曲從若為社稷久逺之謀則不止目前須思後患臣願陛下試發五問詢於議事之臣一問西戎不因敗衄而肯通和之意或用計困之使就和乎或其與北敵連謀而偽和乎二問既和之後邊備果可徹而寬國用乎三問北使一來與二十萬西人一去又二十萬從今更索又更與之凡為國計者止有此策而已乎四問既和之後使北敵不邀功責報乎敵或一動能使天下無事乎五問元昊一議和許二十萬他日保不更有邀求乎他日有求能不更添乎陛下赫然以此五事問之萬一能有説焉非臣所及若其無説則天下之憂從此始矣方今急和繆議既不可追許物已多必不能減然臣竊料元昊不出三五年必須更别猖獗以邀增添而將相大臣只如今日之謀定須更與添物若今日一頓盡與則他日何以添之故臣願惜今日所求其如西賊雖和所利極鮮北敵若動其患無涯此臣前後非不切言今無及矣伏望陛下留意而思之且可不與彼若實欲就和雖不許此亦可若實無和意與之亦有後慮也壬辰詔限職田凡大藩長吏二十頃通判八頃判官五頃幕職官四頃凡節鎮長吏十五頃通判七頃判官四頃幕職官三頃五十畝凡防團以下州軍長吏十頃通判六頃判官三頃五十畝幕職官三頃其餘軍監長吏七頃判官幕職官並同防團以下州軍凡縣令萬户以上六頃五千户以上五頃不滿五千户並四頃凡簿尉萬户以上三頃五千户以上二頃五十畝不滿五千户二頃録事參軍比本判官曹官比倚郭簿尉發運制置轉運使副武臣總管比節鎮長吏發運制置判官武臣鈐轄比防團州長吏諸路轉運判官比大藩府通判安撫都監路分都監比節鎮通判大藩府判官黃汴河許汝石塘河都大催綱比節鎮判官節鎮以下至軍監諸路走馬承受并寨主都同巡檢提舉捉賊提點馬監都大巡河不得過節鎮判官在州監當及催綱撥發巡捉私茶鹽賊盜駐泊捉賊不得過幕職官巡轄馬遞鋪監堰并縣鎮監當不得過簿尉自此人有定制士有定限吏以職田抵罪比前日稍希闊焉此即范仲淹奏十事其五曰均公田也已具九月丁卯其明年諫官余靖言伏觀去冬十一月敕頒定天下職田頃畝數目令三司指揮無職田處及有職田而頃畝少處并元標得山石積潦之地不可耕植者限三年內檢括官荒田并户絶地土及五年以上逃田支撥添換以慶歷四年為始斯蓋陛下所以勸羣臣飬廉吏之大惠也然朝廷舉事當以民為本民患未去官吏何安而尚紛紛擾之伏見淮南江浙經春少雨麥田半損蝗蝻復生京西東荆湖南北廣南處處盜賊未盡撲滅陜西河東輦運困苦且庶民惶惶失其農業而長吏以下各營其私憂民之心有所未至加之檢括寧不騷擾况今來所定頃畝比於舊數三倍其多貪吏因緣其害甚大伏乞朝廷特降指揮舊有職田處更候三二年别取朝旨摽撥余靖奏不得其月日今附此據王罕傳謂以户絶荒田為公田非法意則必因靖奏遂有釐革但史不詳載爾初詔定天下公田諸路多誤以户絶為荒田給官吏其後國子博士華陽王罕提點湖南路刑獄諭所部以法不當給聽自舉覺既而廣南諸州坐收户絶田以贓廢者七十餘人知審刑院張揆嘗見湖南官吏列首狀他日遇罕殿廷謂罕曰公德及人多矣王罕事據王圭志罕墓及本傳罕為湖南憲乃慶歷五年十一月張揆知審刑又在皇祐五年二月今并附此王稱東都事略詔曰廉素者士之常而富貴者是人所欲也昔先帝詔復公田合王制班祿之差得聖人飬賢之道然郡縣受地有無不齊其議所以均之詔樞密院比差官詳定國朝勳臣名次若本家見無人食祿者祿其下子孫一人司天監言五星皆在東方主中國大安十二月丙申翰林學士提舉在京諸司庫務宋祁請諸庫務事有未便當更置者皆使先稟度可否而後議於三司又請增置勾當公事朝臣一員並從之提舉司勾當公事自祁始也祁薦太常博士王疇為勾當公事時有宦者同提舉疇辭於中書曰翰林先進疇恐不得事也然以朝士大夫而為閹人指使則疇實恥之乃更用太常博士張中庸為勾當公事疇博文子中庸蜀州人也元昊又遣張延夀等來議事丁酉安化州蠻以方物入貢辛丑幸荆王元儼第問疾太常丞集賢校理同修起居注知諫院歐陽修為右正言知制誥初中書召試而修辭不赴特除之陜西宣撫使韓琦言據司馬光記聞琦以三年十二月八日奏疏實録乃繫之四年正月五日今依記聞移見此月辛巳四年正月戊辰乃書從琦所請罷城水洛今朝廷未能討伐元昊則為守禦之計修完城寨遇賊至清野以待之當不戰而自困矣臣自至涇原路相視諸城寨類當營葺然鎮戎軍及山外弓箭手今年差役修城已有勞苦之嗟來春止令增築所居城堡必自無辭如聞更修生户所獻水洛城頗為未便蓋水洛城通秦州道路自涇原路新修章川堡至秦州宋穰寨百八十里皆生户住止於其中通一徑須築二大寨十小堡方可互為之援其土功自以百萬計仍須採山林以修敵柵戰樓廨舍軍營及防城器用雖即完就又須正兵三四千人更嵗積糧草始能屯守之其費若此止求一日以通秦原之援兼去儀州黃石河路才較兩驛况劉滬昨已降水洛城一帶生户近李中和又屈伏隴城川蕃部各補職名為屬户若進援兵動不下五六千人諸小蕃族豈敢要阻是則雖無水洛之援官軍亦可往來且近邊城堡切於保聚人民尚力有未及何暇於孤逺無益之處枉勞軍民乎請就差劉滬李中和為涇原秦鳳路巡檢令每月互領兵於水洛隴城川習熟所通之道以備緩急策應仍乞只作朝廷指揮下陜西四路部署司涇原路經略司且并力修葺逐處未了堡寨其水洛城候别奏聼旨如朝廷未以為然乞選差親信中使至涇原秦鳳路詢問文彥博尹洙狄青等即知修水洛城於今便與未便蓋彥博洙青皆以為未便也甲辰賜河陽修雄武堤役卒緡錢乙巳桂陽監言猺賊九百餘人復冦邊丁未賜桂陽監捕擊猺賊軍士緡錢戊申以祕書丞張子奭為祠部員外郎右侍禁王倫為左侍禁閣門祗候並以纍使夏州之勞也湖南攻討蠻猺久之不克己酉詔轉運使郭輔之等如未能以兵翦除即就便招撫之楊畋至湖南乃募才勇深入洞討擊然南方久不識兵士卒多畏懾及戰孤漿洞前軍却大兵悉潰畋踣巖下藉淺草得不死卒厲衆平六洞楊畋兵敗孤漿洞不得其時此據本傳附見招撫後或因畋兵敗遂命輔之招撫也當考卒厲衆平六洞當是四年冬末五年春初事置陜州監軍資庫京朝官一員庚戍權御史中丞王拱辰言翰林醫官許希非士族而其子乃與皇兄允升之女約婚不可以亂宗室之制請罷之奏可諫官孫甫言元昊以數州之地世臣中國一旦拒命數年擾邊大臣不能謀於朝將帥不能勝於野守備寖久師老財匱前以金帛二十萬與之議和而戎性無厭猶有所求漢以金繒遺胸奴賈誼謂中國卑辱之甚遂致流涕今與一小蕃議和當嵗給之物近又增至二十五萬彼猶偃蹇未滿其意卑辱又甚於漢矣今使人回其請通青鹽及嵗遣人回易京師聞皆不許於體頗為得之近聞元昊殺用事之人約噶等且方議和未決之際彼殺用事者正揚虛聲欲邊防之弛備爾况邊郡多已經賊蹂踐惟慶秦二州居民與屬蕃富完又鎮戎軍據賊要害彼豈須臾忘也今日之事尤在預擇將帥擇將之術必在責於大臣昔周世宗以秦鳳之亂命宰臣王溥擇將而得向拱既成功而世宗謂溥曰平秦鳳卿之力也蓋自古良將多由輔臣薦用去嵗定川之敗陛下憂憤未巳大臣乃言懷敏非材所致而邊事未足以煩聖念此實欺君之言且西戎為邊患數年大臣不能選良將及其敗也則曰將非材以茍免其過豈非欺君之言乎責成之術不可更循前失今陜西兵官惟种世衡狄青王信材勇可戰可守自餘暗懦險貪者大臣不可謂不知也茍不知何以共謀國事既知而更置惟在於速爾議者或謂秦州有嘉勒斯賚之援賊必不敢入此又不料事機之甚也嘉勒斯賚自為曹瑋所敗豈無怨心近嵗朝廷授以節制使圖元昊受命以來未嘗有一毫之效前月元昊破轄戩而嘉勒斯賚不敢出救既不敢救其子况能為秦州之援乎惟朝廷速擇將帥而深計之甲寅降秦鳳路都監內藏庫副使張龜年逺小監當龜年擅以官圃之利自入及領軍救蕃族過河而軍士溺死者衆故降之乙卯以北平軍𨽻定州以朝臣為軍使兼知北平縣事其都監主簿縣尉監當使臣並如舊餘官省之丙辰衛尉少卿卞咸為司勳郎中改少卿知梓州既辭疾不行然以其前為陜西轉運使有饋邊之勞猶遷之省御河催綱官丁巳大雨雪木氷戊午以南京府學為國子監己未契丹國母遣彰國節度使蕭運左諫議大夫李坤契丹遣懷德節度使耶律順右諫議大夫郭瑋來賀正旦庚申許廣州立學是月澧州獻瑞木有文曰太平之道諫官歐陽修言知州馮載本是武人不識事體便為祥瑞以媚朝廷臣謂前世號稱太平者須是四海晏然萬物得所方今西羌叛逆未平之患在前北敵驕悖藏伏之禍在後一患未滅一患已萌加以西則瀘戎南則湖嶺凡與四裔連接無一處無事而又內則百姓困敝盜賊縱橫昨京西陜西出兵八九千人捕數百人之盜不能一時翦滅只是僅能潰散然却於别處結集今張海雖死而達州軍賊已却百人又殺使臣其勢不小興州又奏八九千人州縣惶惶何以存濟以臣視之乃是四海騷然萬物失所實未見太平之象臣聞天道貴信示人不欺臣不敢逺引他事只以今年內事驗之昨夏秋之間太白經天纍月不滅金木相淹近在端門考於星占皆是天下大兵將起之象豈有才出大兵之象又出太平之字一嵗之內前後頓殊星象麗天異不虛出宜於戒懼常合修省而草木萬類變化無常不可信憑臣又思若使木文不偽實是天生則亦有深意蓋其文止曰太平之道其意可推也夫自古帝王致太平皆自有道得其道則太平失其道則危亂臣視今但見其失未見其得也願陛下憂勤萬務舉賢納善常如近日不生逸豫則三二嵗間漸期修理若以前賊張海等小衰便謂後賊不足憂以近京得雪便謂天下大豐熟見北敵不舉兵便謂必無事見西賊通使便謂可罷兵指望太平漸生安逸則此瑞木乃誤事之妖木爾臣頃見太平州曾進芝草者今又進瑞木竊慮四方相效爭造妖妄其所進瑞木狀乞更不宣示臣僚仍乞速詔天下州軍告以興兵纍年四海困敝方今當責已憂勞之際凡有竒獸異禽草木之類並不得進獻所以彰示明德感勵臣民詔諸祥瑞不許進獻聼申禮部知此詔據會要初不與修相關今附見或因修建言乃下詔也是嵗河北降赤雪河東地震五六日不止諫官孫甫推洪範五行傳及前代變驗上疏曰赤雪者赤眚也人君舒緩之應舒則政事弛賞罰差百官廢職所以召亂也晉太康中河隂降赤雪時武帝怠於政事荒宴後宫每見臣下多道常事不及經國逺圖故招赤眚之怪終致晉亂地震者隂之盛也隂之象臣也後宫也外國也三者不可過盛盛則隂為變而動矣欣州趙分地震六七年每震則有聲如雷前代地震未有如此者也惟唐高宗本封于晉及即位晉州經嵗地震宰相張行成言恐女謁用事大臣隂謀宜制於未萌其後武昭儀專恣幾移唐祚天地災變固不虛應陛下救舒緩之失若自主威福時出英斷以懾姦邪以肅天下救隂盛之變莫若外謹戎備內制後宫謹戎備則切責大臣使之預圖兵防熟計成敗制後宫則凡掖庭非典掌御幸盡出之以省浮費自裁節其恩使無過分此應天之實也又言竊見景福內庫祖宗積經費之餘以備非常之用近嵗諸路物帛多入內庫中外盡疑宫中之私費唐置瓊林大盈二庫率供燕侈楊炎陸贄請罷之今日景福之積頗類唐之二庫後宫之數臣雖不知但聞三司計肉食者千餘人又上有貴職下有私身當不啻數千人矣臣近聞染院計置染綾羅甚急以備宫中支用言左藏庫所積紅羅去冬已絶他物稱此則浮費可知也陛下省之立可感動人心以消災譴張修媛寵恣市恩禍漸已萌夫后者正嫡也其餘皆婢妾爾貴賤有等用物不宜過僭自古寵女色初不制而後不能制者其禍不可悔帝曰用物在有司朕恨不知爾甫曰世謂諫臣耳目官所以逹不知也若所謂前世女禍者載在書史陛下可自知也上深嘉納之是年張美人生女幼悟但不知是何月五年四月卒才三嵗韓琦既至陜西屬嵗大飢羣盜嘯聚商虢之郊張海郭邈山黨君子范三李宗者為之渠率衆相合涉京西界劫掠州縣環繞虢州盧氏之東洛陽長水之西脅從者僅千餘人繼而光化軍宣毅叛卒五百餘人邵興為之長至商於瀼口衆已千餘人與上官珙戰珙死之餘軍以失主將悉潰散於藍田界上藏匿谷間邵興又距百里揭榜招誘本州鑄錢監兵約二千人皆鄜延涇原失陷主將正軍及鼎澧嶽鄂纍作過配𨽻籍中者商虢藍田馳急報於延雍而帥臣未有所處琦尋遣屬官乘傳往商於料簡錢監役兵其舊係沿邊禁兵即令却歸元配州軍仍𨽻籍鼎澧嶽鄂州壯健役兵並押赴陜府填龍猛龍騎壯勇闕額邵興誘致之謀遂不得行又遣內侍黃琮范遷齎宣撫司榜收集上官珙下散軍諭以免罪歸所屬仍召謝雲行等將沿邊土兵入山捕張海等邵興以無援竄入興洋界被殺十一月辛巳陳曙擒邵興於壻水張海相繼殱衄擒捕餘黨殆盡關輔遂安堵矣紀事本末四年二月壬寅以東頭供奉官陳曙遷職有差賞誅賊之功也西邊屬羌之亂是冬大旱河中同華等十餘州軍物價翔貴飢民相率東徙琦即選官分詣州縣發省倉賑之奏差提點刑獄許宗夀專切往來提舉蒲華同三州所活凡二百五十四萬二千五百三十七人他州人數稱是時民力久困琦乃蠲賦役察官吏能否者升黜之又以兵數雖多而雜以疲老耗用度選禁軍不堪征戰者停放一萬二千人後田况乞選諸路軍不堪戰者為廂軍云若謂兵驕久一旦澄汰恐致亂則去年韓琦汰邊兵萬餘豈聞有亂者哉此據琦家傳並附嵗末薛向未嘗為琦屬官家傳稱屬官薛向恐誤今削去姓名實録載田况奏在三年七月今移見四年六月末就彼處辨之
