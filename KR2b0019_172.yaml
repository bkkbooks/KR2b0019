body:
  text: 續資治通鑑長編卷一百六十八宋李燾撰仁宗皇祐二年春正月己亥詔河北提點刑獄司自今嵗調兵夫治河並親往督視之辛丑詔樞密院自今勾當皇城司並選差人仍不許陳乞會要慶厯八年閏正月已有此詔癸卯以嵗飢罷上元觀燈丙午占城國遣使來貢象牙二百一犀牛角七十九齎表二通一以蕃書一以中國書丁未詔施州自今歸明軍校死者許子孫代守邉仍先給食鹽其衣襖須三年乃給之己酉前殿中丞竇運復舊官運始丁母憂聞妖賊據恩州起從安撫司效用既而為有司劾奏勒停至是自論嘗從破賊有勞特復之壬子命翰林學士承旨王堯臣入內都知王守忠右司諫陳旭與三司較天下每嵗財賦出入數以聞四年正月乃以聞自康定元年陜西募人入中並邉芻粟始加數給東南鹽而河北稍用三稅法亦以東南鹽代京師所給緡錢數足即止已見是年年末及慶厯二年三司又請如康定元年法募人入中此據食貨志第三卷乃詔入中陜西河東者持劵至京師償以錢及金帛各半之不願受金帛者豫香藥茶鹽惟其所欲而東南鹽利特厚商旅不復受金帛皆願得鹽至八年河北行四稅法鹽居其一而並邉芻粟皆有虛估騰躍至數倍劵至京師反為畜賈所抑鹽入百斤舊售錢十萬至是止六萬商人以賤估劵取鹽不復入錢京師帑藏益乏於是詔三司詳定王堯臣王守忠陳旭請復入錢京師法視舊入錢數稍增豫鹽而並邉入中先得劵受鹽者河東陜西入芻粟直錢十萬止給鹽直七萬河北又損為六萬五千且令入錢十萬於京師乃聽兼給謂之對貼自是入錢京師稍復故已上並據食貨志第四卷志稱皇祐二年詔三司詳定於是王堯臣王守忠陳旭建對貼議而實録無之今附見命三人較出入數後三年正月始復行見錢癸丑西南蕃王龍光㴰遣使來貢方物以安遠將軍蕃落使龍光辨為寧遠軍大將軍寧遠將軍知靜蠻軍節度使龍光凝承宣武寧大將軍龍異豈並為安遠大將軍承宣奉化大將軍龍異魯為武寧大將軍光辨等授官乃二月戊午今并書丙辰御史中丞郭勸入內都知張惟吉藍元用同檢校黃河故道工料以聞二月乙丑遣內侍賜河東沿邉巡檢使北作坊使王吉金創藥時以本路安撫使王拱辰言吉前與西賊戰為流矢所中今疾發且甚故賜之詔京東所選廂軍於本軍額上加教閲二字其征役同禁軍初安撫使富弼既選一路廂軍團成指揮欲加刺教閲字上不許止令軍額上加之丙寅追封故宰臣王曽妻南陽縣太君蔡氏為莒國夫人繼室贊皇縣太君李氏為沂國夫人曽弟天章閣待制右諫議大夫子融辭一官乞追封之此事當考曽為宰相纍年何以妻無封而子融追請之戊辰詔三司在外禁軍凡郊賞折色並給以實估之直蓋舊制外禁軍郊賞估八百者為一千以給之辛未復三班奉職王維德為左班殿直閣門祗候雍桂等州都巡檢使先是維德為環州都監與西賊戰敗羈管於新州起監廬州稅於道獲賊十八人特遷之壬申詔雄州歸信容城知縣自今罷差京朝官其令本路轉運使舉武臣有才勇及曉兩地民情者為之癸酉罷商州鑄青黃銅錢先是宋庠建議以今年當郊而日至在晦用建隆故事宜有所避因請季秋大饗于明堂乙亥帝謂輔臣曰明堂之禮自漢以來諸儒議論不同將安適從文彥博對此禮廢久矣俟退而講求其當自聖朝行之宋庠建明堂之議據春明録甲申出內藏庫絹五十萬下河北陜西河東路以備軍賞丙戍廣南西路鈐轄司請於雍州羅徊洞置一寨以扼廣源州蠻賊從之三月戊子朔詔罷今年冬至親祠南郊之禮以九月擇日有事於明堂帝謂輔臣曰明堂者布政之宫朝諸侯之位天子路寢乃大慶殿是也况明道初合祀天地於此今之親祠不當因循尚於郊壝寓祭己丑詔以大慶殿為明堂詔河北安撫轉運司按察本路知州軍治狀以聞從右司諫陳旭奏請也命河東經略使王拱辰兼本路計置糧草甲午遣官祈雨保安軍言夏國以戰敗契丹來獻捷本軍以誓詔無泛遣人例已拒還之戊戍詔羣臣毋得上尊號上謂輔臣曰比遇大禮輒加徽號豈稱朕所以奉神昭孝之意文彥博等曰陛下嚴父以配上帝則臣子亦有愛戴君父之心伏奏至於三四上不從彥博又以請上固拒之乃奉詔己亥詔祠明堂宜盡物以遵典禮自乘輿服御諸物務令有司裁簡之分遣朝臣詣天下名山大川祠廟祈雨庚子契丹遣殿前副點檢忠正節度使耶律益彰德節度使趙柬之來告伐夏國還益自言契丹三路進討契丹主出中路大捷北路兵至西涼府獲羊百萬槖駝二十萬牛五百俘老幼甚衆惟南路小失利恐夏人妄説軍勝誇南朝然得邉奏皆以謂遼主濟河不遇賊無水草馬多死耶律貫寧大敗於師子口惟劉五常獲陜西所陷屬户羌二十餘人因而來獻其言多俘獲蓋妄也實録備載遼主書今不取甲辰詔宗室子生四嵗者官為給食初詔五嵗始給食知大宗正事允讓請且仍舊以三嵗故裁定之戊申遣官謝雨己酉翰林學士刑部郎中知制誥趙槩為回謝契丹國信使西上閣門使貴州團練錢晦副之契丹主席上請槩賦信誓如山河詩詩成契丹主親酌玉杯勸槩飲以素摺疊扇授其近臣劉六符寫槩詩自置袖中詔兩浙流民男女不能自存者聽人收養後不能復取辛亥刑部員外郎直龍圖閣兼天章閣侍講王洙同判太常寺兼禮儀事時宋祁楊安國張揆皆判寺事祁言明堂制度久不講洙有禮學願得同具其儀詔遷洙太常癸丑詔以季秋辛亥大饗明堂先是禮官議王者郊用辛蓋取齋戒自新之義又通禮祠明堂亦用辛遂下司天擇日而得辛亥吉蓋九月二十七也命宰臣文彥博為大禮使宋庠為禮儀使樞密使王貽永為儀仗使龎籍為鹵簿使參知政事髙若訥為橋道頓遞使乙卯命樞密副使梁適攝太尉望告天地於南郊樞臣望告非舊例重其事也時政府六員五員充使故以適奏告同告謝復增錫賚如五使焉丙辰宋祁上明堂通議二篇祁自序略曰上薄三代旁搜漢唐禮之過者折之説之繆者正之以合開寶一王之典聊佐乙夜觀書之勤其書自內降出尋復有詔進入是月邇英閣講易師卦字有與御名同音者帝謂王洙曰此字何訓對曰訓正帝曰不須回避恐妨義理洙曰不敢臣子於君父之名臨文暫覩不無悚懼須至回避帝曰但正言之夏四月丁巳朔禮院言按周禮夏后氏世室鄭康成云堂上有五室象五行木室於東北火室於東南金室於西南水室於西北土室於中央崔靈恩亦如之今請如崔鄭之説設五慶於大慶殿又按舊禮明堂五帝位皆為幔室今旁帷上幕宜用青繒朱裏其四户八牖赤綴户白綴牖今宜飾以朱白繒從之庚申詔河北轉運司沿邉四𣙜場有能察捕得北界刺事者當重賞之壬戍河北人張用為奉職張顯王忭並為三班差使殿侍初河北沿邉安撫司言用等各捕得兩地供輸人馮均常往來邉郡探事以報契丹均既處死乃賞用等甲子沙州普克都木薩夲等來貢玉乙丑內出手詔明堂之禮前代並用鄭康成王肅兩家義説兼祭昊天上帝已為變禮祖宗以來三嵗一親郊即遍祭天地而百神靡不從祀故太祖雩祀太宗真宗祈穀二禮本無地祗位當時皆合祭天地祖宗並配而百神從祀今祀明堂正當親郊之期而禮官所定止祭昊天五帝不及地祗配坐不及祖宗未合三朝之制况比年水旱地震稼穡不登移郊為大享蓋亦為民祈福宜合祭皇地祗奉太祖太宗真宗並配而五帝神州亦親獻月日河海諸神悉如圜丘從祀因謂文彥博曰禮非天降地出緣人情爾禮官習拘儒之舊傳捨三朝之成法非朕所以昭孝息民也彥博曰惟上聖至明為能逹禮之情適禮之變非臣等所及翌日彥博奏詔書所定親獻之禮周於五天帝神州比圜丘之位陟降為勞請命官分獻帝曰朕於大祀豈敢憚勞也禮官議從祀神位未決復諭曰郊壇第一龕者在堂第二第三龕者設於左右夾廡及龍墀上在壝內外者列於堂東西廂及後廡以象壇壝之制仍先繪圖以聞丁卯契丹國母遣安逺留後耶律可久給事中龔湜契丹遣奉國節度使耶律霸右諫議大夫李軻來賀乾元節戊辰降翰林學士兵部員外郎知制誥史館修撰權知開封府錢明逸為龍圖閣學士知蔡州開封府判官祠部郎中張式知嶽州推官屯田員外郎李舜元通判壽州先是醫家子冷青自稱皇子言其母嘗得幸掖廷有娠而出生青都市聚觀明逸捕得入府叱明逸曰明逸安得不起明逸為起既而以為狂送汝州編管推官韓絳言青留外惑衆非所宜朝議欲遷之江南翰林學士趙槩言青言不妄不當流若詐不當不誅即詔槩與天章閣待制知諫院包拯追青窮治蓋其母王氏嘗執役宫禁禁中火出之嫁民冷緒者始生女後生青青不調漂泊廬山數為人言已實帝子故浮屠號全大道者挾之入京師欲自言闕下皆論不道誅死明逸坐尹京師無威望又有婦人酇氏以罪繫獄而為獄吏榜之墮足死故與式舜元皆及於責式丹徒人絳億子也實録云青與其黨高繼安皆處死據明逸傳云浮屠全大道不知孰是按何郯包拯奏議並稱高繼安拯稱繼安乃放停軍人先因罪決配鼎州尋却入京託病放停專以幻術交結權貴恐繼安即全大道也冷青醫家子據李清臣墓碑又按錢明逸傳稱青不調未詳醫家子何故不調當考涇原經略司言生户都首領納隆男阿斯鼎舉族內附丁丑左侍禁折繼祖為西染院使知府州折繼閔病亟請以繼祖代之繼祖其弟也以渭州姚家堡左第一指揮十將張遂為三班奉職仍賜襲衣金帶遂自言王沿知渭州日嘗與百姓范仁美持沿書入西界反間葉勒約噶兄弟事覺仁美被殺遂配居攤糧城及契丹西伐獲遂以歸乃録之實録云事覺葉勒等三人皆從誅治王沿以康定元年十一月知渭州慶厯二年十月降虢州四年十一月卒于河中葉勒等被誅乃元昊既稱臣後又葉勒等自以謀殺元昊故族不因謀內附也張遂所言必妄或果嘗與范仁美共持王沿書欲反間葉勒等本無內附意遂反間而不效又坐拘囚偶得生還而葉勒等已死因冒為己功朝廷以契丹故不加覆勘姑録之耳种古訟王嵩亦此類也且遂與仁美俱持王沿書入界仁美獨死遂獨生殊不近人情由此觀之遂所言持沿書要不可信今姑仍其舊實録并載葉勒等三人皆坐遂反間被誅蓋舉信遂言今特削去三人被誅事稍加刪潤使前後不相抵牾壬午詔輔臣與禮官相視設神位於大慶殿上五室內太室中北昊天上帝位皇地祗在左皆南面太祖太宗真宗位在東西面黃帝在太室中西南北面人帝在左少退青帝赤帝白帝黑帝各從本室人帝在左少退神州地祗日月北極天皇大帝並設於五室之間其位少退五帝神州日月北極天皇於郊壇為第一龕位五官勾芒以下設於明堂廷中少東南别為露幄五緯十二次紫微垣內官五方嶽鎮海瀆嵗星真枵鉤星以下七十二位於東西夾廡上版設於郊壇為第二龕位二十八舍黃道內天官角宿攝提五方山林川澤以下百七十九位於丹墀龍墀道東西版設於郊壇為第三龕位黃道外天官及衆星五方墳衍原隰以下四百九十六位並東西廡周環殿後版設以北為上於郊壇為內壝之內外位倣古明堂之制又稍與壇壝位敘相類云此據皇祐明堂記乃五月丁亥朔禮院奏請詔可今附此本志取明堂記儀注尊罍籩豆之數具載之獨略此假恐失輕重之義蓋尊罍籩豆之數職在有司神位則由仁宗聖裁故也初禮官言按通禮昊天配帝用蒼牲二五帝五人帝各依方色用牲十緣國朝南郊雖神位至多亦止用犢四羊豕各十六今明堂請用七犢以薦上帝配帝五方帝羊豕各五薦五人帝既報可尋詔合祭並侑及親獻五帝神州禮官請更增四犢凡用犢十一羊豕亦依郊例各用十六薦日月以下從祀神位從之用犢七羊豕各五據明堂記在三月甲辰用犢十五羊豕各十六在五月癸巳今并附此五月丁亥朔禮院上新作明堂禮神玉及燔玉初上謂輔臣曰前代禮神有祭玉燔玉今獨有燔玉無乃於祀典闕乎文彥博對曰唐太常卿王起以當時祀事止有燔玉因請下有司求良玉而作禮神玉於是造琮璧等九器祭巳則藏之而燔玉止用珉蓋唐以來禮神之玉已不復備上曰朕奉事天地祖宗豈於寶玉有所愛其令有司備製之時沙州適貢玉乃擇其良者製為琮璧等九器其黝璜尤粹溫祭玉之備始于此戊子遣户部判官屯田員外郎直史館楊畋河東路計置糧草及處置盜鑄鐡錢徙江南西路轉運使工部員外郎直史館唐詢為福建轉運使時淮南江浙荆湖發運使許元請六路轉運司移文發運使皆曰申如所屬詢爭以為不可朝廷方委任元故徙詢甲午禮院上明堂五室制度圖封兖州尼邱山神曰育聖侯丙申詔國信司罷三番使臣自契丹通使其接送使人皆自京差三番使臣而沿路州軍大困於須索諫官包拯吳奎極言其擾既罷遣三番而頓置什物並令沿路州軍官自辦之御史何郯言伏覩朝廷昨降指揮廢罷迎送北使三番使臣只令河北州郡逐處供應議者謂於事便利莫兹為大近知有臣僚上言請盡復舊此不惻民隱之甚者緣河北州郡自積年供應三番往來為諸司上下乘便刻剝其勾當公人破敗家産及死亡流移者不可勝數况今纍嵗災傷民力不堪其弊幸而朝廷優恤特行更改若復仍舊弊但以數郡生靈性命奉三番諸司上下誅求爾於事何益朝廷前詔罷之善矣伏望明聖堅斷不為浮議所移庶一路之民有息肩之望何郯奏議今附見吳奎明年十月云罷三番才兩月間輒復紛紛當指此也丁酉明堂禮儀使言將來行禮請皇帝初詣昊天上帝位次皇地祗青帝赤帝黃帝白帝黑帝神州地祗位奠玉幣次詣太祖太宗真宗位奠幣其酌獻之序亦如之又言明堂所用樂皆當隨月用律九月以無射為均而五帝各用本音之樂並從之壬寅置岢嵐軍草城川天窊村巡檢使臣一員戊申廣南西路轉運司言交趾發兵捕廣源州賊儂智高其衆皆遁伏山林詔本路嚴備之己酉內出明堂樂曲及二舞名降神曰誠安皇帝升降行止曰儀安昊天上帝皇地祗神州地祗位奠玉幣曰鎮安酌獻曰慶安太祖太宗真宗位奠幣曰信安酌獻曰孝安司徒奉爼曰饎安五帝位奠玉幣亦曰鎮安酌獻曰精安皇帝飲福曰胙安退文舞迎武舞亞獻三獻皆曰穆安徹豆曰歆安送神曰誠安歸大次曰憩安文舞曰右文化俗武舞曰成功睿德御撰樂章鎮安慶安信安孝安四曲餘詔輔臣分撰庚戍詔所撰樂曲名與常祀同者更之遂更常所用圜丘寓祭明堂誠安之曲曰宗安祀感生帝慶安之曲曰光安奉慈廟信安之曲曰慈安六月己未內出御撰明堂樂八曲以君臣民事物配屬五音凡二十聲為一曲用宫變徵變者天地人四時為七音凡三十聲為一曲以子母相生凡二十八聲為一曲皆黃鍾為均又明堂月律五十七聲為二曲皆無射為均又以二十聲二十八聲三十聲為三曲亦無射為均皆自黃鍾宫入無射如合用四十八或五十七聲即依前譜次第成曲其徹聲自同本律及御撰鼓吹警嚴曲合宫歌並肄于太常案宋史樂志作肄于太常原本肄字誤作𨽻今改正丙寅翰林學士承旨王堯臣等言奉詔與太常參議阮逸所上編鍾四清聲譜法請用之於明堂者竊以律吕旋宫之法既定以管又制十二鍾準為十二正聲以律計自倍半説者云半者準正聲之半以為十二子聲之鍾故有正聲子聲各十二子聲即清聲也其正管長者為均自用正聲正管短者為均則通用子聲而成五音然求聲之法本之於鍾故國語所謂度律均鍾者也其編金石之法則歷代不同或以十九為一簴者蓋取十二鍾當一月之辰又加七律焉或以二十一為一簴者以一均聲更加濁倍或以十六為一簴者以一均清正為十四宫商各置一副是為縣八用七也或以二十四為一簴者清正之聲備故唐制以十六數為小架二十四為大架天地宗廟朝會等各有所施今太常鍾縣十六者舊傳正聲之外有黃鍾至夾鍾四清聲雖於圖典未明所出然考之實有義趣蓋自夷則至應鍾四律為均之時若盡用正聲則宫輕而商重緣宫聲以下不容更有濁聲一均之中宫弱商強是為陵僣故須用子聲乃得長短相敘自角而下亦循兹法故夷則為宫則黃鍾為角南吕為宫則大吕為角無射為宫則黃鍾為商太簇為角應鍾為宫則大吕為商夾鍾為角蓋黃鍾大吕太簇夾鍾正律俱長並當用清聲如此則音律相諧而無所抗此四清鍾可用之驗也至他律為宫其長短尊卑自序者不當更以清聲間之自唐末多故樂文墮缺考擊之法久已不傳今若使匏土絲竹諸器盡求清聲即未見其法又據大樂諸工所陳自磬簫琴和巢笙五器本有清聲塤箎竽築瑟五器本無清聲五絃阮九絃琴則有太宗皇帝聖制譜法至歌工引音極唱止及黃鍾清聲臣等參議其清正二聲既有典據理當施用自今大樂奏夷則以下四均正律為宫之時商角依次並用清聲自餘八均盡如常法至於絲竹等諸器舊有清聲者令隨鐘石教習本無清聲者案原本脫去令隨鐘石教習本無清聲者二句文義未完今據宋史樂志及薛應旗續通鑑增入未可創意求法且當如舊惟歌者本用中聲故夏禹以聲為律明人皆可及若強所不至足纍至和請止以正聲作歌應合諸器亦自是一音别無差戾其阮逸所上聲譜以清濁相應先後互擊取音靡曼近於鄭聲不可用詔可丁卯以御撰黃鍾五音五曲凡五十七聲下太常肄習之戊辰贈貴妃張氏母越國夫人曹氏曾祖旭為祕書丞祖靖為祀部員外郎己巳再頒先朝祈雨雪法令所在置嚴潔處庚午詔舉官為縣令自今河北陜西轉運使副嵗各舉十二人提點刑獄各六人河東京東西淮南轉運使副各十人提點刑獄各五人兩浙江南東西福建荆湖南北廣南東西益利梓轉運使副各四人提點刑獄各四人夔州路轉運使副四人提點刑獄三人六路制置發運使副各六人府界提點刑獄三人知開封府并諸州府軍監各一人仍止得舉所部官初同提點京西刑獄張易官臨滿將代并舉縣令十六人上因謂輔臣曰縣令與民最近故朕設保舉之法今易所舉猥多必以請託故也遂令裁定其數九朝紀事本末上諭輔臣曰近日職司以長吏不理聞者多矣中書未嘗施行且長吏者民之性命可不重乎宜擇其甚者罷之小者易之文彥博等慙謝而退於是自鄂州伍開台州呂士宗等或以衰老或以弛慢而罷斥對移者凡十六人辛未判亳州宣徽南院使建武節度使郭承祐落宣徽南院院使諫官御史言承祐前在南京給糧不以次置陳取新茍悅軍士擅留綱糧及批書宣頭不發戍兵越法杖配輕罪借用翰林器出入擁旗槍以禁兵擬周衛體涉狂僣無人臣禮故也吳奎傳云奪承祐宣徽使仍詔自今后妃之家不得為執政官奎傳誤也此詔乃緣張堯佐非承祐今不取壬申判延州李昭亮請陜西沿邉小堡寨無使臣管勾者並更為鋪從之丙子諫官包拯陳旭吳奎等言實録云知諫院包拯陳旭吳奎按陳吳此時實為右司諫十月壬申乃以起居舍人知諫院今但云諫官庶不失事實比年以來隂沴過甚水壞城郭地復震動大河決溢沉溺者衆是皆羣小之道盛也雖陛下精誠感發未能遽然消伏何者天道福善禍淫與衆同欲則依從己之欲則違今億兆之衆皆謂三司使張堯佐凡庸之人徒緣寵私驟階顯列是非倒置職業都忘諸路不勝其誅求內帑亦煩於借助法制刓弊商旅阻行而堯佐洋洋自得不知羞辱召來災沴實自斯人臣等竊以任用堯佐以來百怪漸露是上違天意也萬口交譏是下咈人情也違天意則善應差殊雖禳祈禱祀無以益也咈人情則治風頺敝雖督率糾正無以拯也陛下何庇一堯佐上違天意下咈人情而稔成危機者乎實為陛下痛之親昵之私聖人不免但處之有道進人合宜使不踐於危機而常保於安地斯為得矣若不恤人言罔顧天戒禍不止其人又貽患於國家前古得喪之迹甚多願陛下留神究觀焉包拯又言臣近以天下財用公私匱竭而主計之吏內則三司使外則轉運使乞精加選擢委任能臣免致將來敗事兼吳奎陳旭等纍曾論列終未蒙施行竊緣三司使張堯佐早緣恩澤驟陟華顯任之會府委以大計而本職隳廢利權反覆公私困敝中外危懼且歷代后妃之族雖有才者未嘗假以事權又况庸常不才者乎但富貴保全之則無所害矣臣伏見國朝自祖宗以來當帑廪豐盈用度充足之際尚乃精選計臣如陳恕魏羽等輩用之其餘亦盡一時之選况今上下窘迫如是豈可專任此人久居是職失天下之望誤天下之事臣實為陛下痛惜之伏望特出宸斷授堯佐以他職别求才傑之士委而任之責以實效一二年間庶幾可濟不然則懼貽陛下之深憂也且宗社至重財用至急而安危繫焉惟陛下特留聖意庚辰特封貴妃張氏第八妹為清河郡君辛巳屯田員外郎吕公著同判吏部南曹公著夷簡之子也嘗召試館職不就於是上諭曰知卿有恬退之節因賜五品服癸未御崇政殿録繫囚雜犯死罪以第降一等杖以下釋之乙酉同提點荆湖南路刑獄內殿崇班閣門祗候劉舜臣上明堂議并圖一卷此據明堂記及會要是月上講書邇英閣因謂侍臣曰古有遷民於寬間之地今閩蜀地狹其民亦可遷乎丁度對曰律令故在但有司不能舉行爾太祖嘗徙太原民千餘家於山東太宗又徙雲應寰朔之民於京西諸州西北之人勤力謹儉今以富稱於鄉里者多當時所徙之民也民固安土重遷若地利既盡要無可戀之理蜀民嵗增曠土盡闢下户才有田三五十畝或五七畝而贍一家十數口一不熟即轉死溝壑誠可矜惻臣以為不但蜀民凡似此狹鄉皆宜徙之寬鄉計口給田復其家如律令實利農積穀之本也上納其言乃詔京西轉運司曉告益梓利夔福建路民願徙者聽之此據會要稍刪潤之秋七月丁亥贈美人尚氏為充儀此可見復召尚氏入宫事迹也戊子出御撰明堂無射宫樂曲譜三皆五十七字五音一曲奉俎用之二變七律一曲飲福用之七律相生一曲退文舞迎武舞及亞獻徹豆用之此假恐與六月己未相重當考據本志果不相重丙申幸彰信節度使兼侍中李用和第問疾入見于卧內擢其次子西上閣門副使珣為閣門使以所居第賜之并給官舍僦錢五千及卒又臨奠哭之慟贈太師中書令隴西郡王特輟視朝五日制服苑中諡恭僖御撰神道碑仍篆曰親賢之碑及其妻卒亦輟朝成服上以章懿太后不逮養故褒寵外家皆軼常等用和緣帝舅起民間位將相而能小心靜默推逺權勢闔門謝客亦其所長也壬寅曹州言太子少師致仕任中師卒贈太子太保諡安惠丁未上封者言明堂酌獻五帝精安之曲並用黃鍾一均聲此乃國朝常祀五時迎氣所用舊法若於親行大饗即所未安且明堂之位木室在寅火室在已金室在申水室在亥蓋木火金水之始也土室在西南蓋土王之次也既皆用五行本始所王之次則獻神之樂亦當用五行本始月律各從其音以為曲其精安五曲宜以無射之均太簇為角獻青帝仲吕為徴獻赤帝林鍾為宮獻黃帝夷則為商獻白帝應鍾為羽獻黑帝詔兩制官同太常議而王堯臣等言大饗日迫事難猝更且俟過大禮詳定以聞
