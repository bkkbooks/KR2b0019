body:
  text: 續資治通鑑長編卷三百六十九宋李燾撰哲宗元祐元年閏二月壬寅右司諫蘇轍言臣聞薄賦斂散蓄聚若以致貧而民安其生盜賊不作縣官食租衣稅廩有餘粟帑有餘布久而不勝其富也厚賦斂奪民利若以致富而民所入有限所害無窮大者亡國小者致冦冦盜一起盡所得之利不償所費之十一久而不勝其貧也臣未敢逺引陳勝吳廣龐勛黃巢之類只如淳化中李順慶歷中張海等熙寧中廖恩此數火盜賊計其燔燒官寺劫略倉庫以至發兵命將轉輸糧食耗失兵械募士賞功之費大率不下數百萬貫但得事了豈敢言費然方其未發有能建言乞捐數十萬貫以消其變則上下爭執如惜支體不肯割截此天下之大迷古今之通患也故臣願於元豐庫或內藏庫乞錢三十萬貫上以為先帝收恩於既往下以為社稷消患於未萌伏願陛下權禍福之輕重較得喪之多少斷而行之毋使有司吝於出納以害大計河北之民喜為剽劫所從來尚矣近嵗創為保甲驅之使離南畝教之使習凶器一夫在官一家資送窮苦無聊靡所不至椎埋為奸十人而九號為保甲莫敢誰何若更一年不罷則勝廣之事可立而待也今雖已罷而弓力之手不可以復執鋤酒肉之口不可以復茹蔬既無所歸勢必為盜今河北冦賊成羣訪聞皆是保甲餘黨若因之以飢饉則變故之作不可復知近嵗富弼知青州是時河北流民百萬轉徙京東弼既設方略振活其老幼而招其壯悍者為軍不待朝㫖皆刺指揮二字其後皆為徑兵百萬之衆無一人為盜者弼為人臣便宜行事猶能若此况陛下富有四海而元豐及內庫錢物山積莫可計數只如近日內降睿思殿金銀一色令别庫收貯者自約及百餘萬貫皆是先帝多方收拾以備緩急支用不取於民聖算深逺非凡所及若積而不用則與東漢西園錢唐之瓊林大盈二庫何異於先帝聖德不為無損故臣願乞三十萬貫為招軍例物選文武臣僚有才幹者各一二人分往河北逐路於保甲中招其强勇精悍者為禁軍本州無闕則自近及逺或押上京不過一二萬人則河北豪傑略盡矣其間武藝絶倫舊日以補班行者押赴闕試驗有實以補內六班之闕或以補本貫及鄰近闕額軍員但當嚴賜指揮候了日當遣人覆按有不如法重坐官吏臣聞先帝本謂保甲可用故欲隱兵於農以漸消正兵是以禁軍多有闕額今保甲既罷正使無事猶合補填况如前件所陳者惟陛下深察果斷而力行之今冬春大旱二麥不熟事勢如此恐不可緩三月十四日從轍請左司諫王巖叟言臣䝉聖恩許就寒食假中展墳於河隂道過管城縣之孫張村有耆老為臣言本村舊七十餘户今所存者二十八家而已皆自保甲起教後來消減至此當時人人急於逃避其家薄産或委而不顧聽任官收或賤以與人自甘傭作今雖荷至恩得免冬教而業已破蕩無由可歸不知朝廷知百姓此等事否臣既聞之不可以不告陛下且恐府界三路若此類者甚多伏望詔諭執政大臣令講畫所以安集之方使離散之民早得其所以稱陛下惠愛之心元祐元年閏二月十五日清明巖叟所言不得其時斟酌附此癸卯詳定役法所言准司馬光奏請天下免役錢並罷其諸色役人並依熙寧元年以前舊法人數令佐揭簿定差續准朝㫖諸路且依二月六日指揮定差今看詳熙寧元年以前役人衙前最為重役有鄉户押録投名三色人充役除押録係年滿撥充投名人係招募外惟鄉户一色方係定差人數亦有酒場支酬長名衙前人數已定去處不曽更差鄉户衙前其州縣典吏書手之類自來亦多有投募去處慮今來承受上項朝㫖却一例定差又緣額管人數自募役法行諸處减數不少祗應已得辦集若依今降指揮依熙寧以前人數定差慮民間虛有煩擾欲乞先次行下諸路除衙前一役先用坊場河渡錢依見今合用人雇募不足方許揭簿定差其餘役人除召募外並依二月六日指揮定差若有妨礙即遞限兩月體訪役法的確利害申州州申轉運司保明聞奏仍令逐州軍一靣先申本所其差衙前有妨礙或别有利害亦仰依閏二月四日指揮施行其見役人如未有人替仍許且支雇錢候有人替方得住支從之尋又乞改雇募字作招募字恐諸路疑惑復行雇法也閏二月二十六日敕申明改此雇募衙前字作招募字此據榮州舊案王巖叟言臣訪聞諸郡縣官員自來雇募到承符散從官手力之類在逐㕔令例合差鄉户抵替減放逐官有以鄉户正身自充須令雇召其被雇之人邀勒鄉户剩要工錢者欲乞指揮下詳定役法所立法約束官員不得抑勒令雇人其情願雇人者雇直不得過元募役錢之數王巖叟所言不得其時附蘇轍論五事前蘇轍言臣近奏罷免役錢行差役事大綱已得允當其間小節踈略差誤乞令諸處審議候的確可行然後行下近日已䝉聖㫖差韓維等四人置局看詳臣前所謂踈略差誤其事有五其一衙前之害自熙寧以前破敗人家甚如兵火天下同苦之久矣先帝知之故創立免役法勾收坊場官自出賣以免役錢雇投名人以坊場錢為重難酬奬及以召募官員軍員押綱自是天下不復知有衙前之患而近嵗所以民日貧困天下共苦免役法者乃是在農之家嵗出役錢不易及出賣坊場許人添價爭剗致送納不前之弊也向使先帝只行官自出賣坊場一事自可了却衙前色役其餘役人且依舊法則天下之利較然無疑獨有一弊所雇衙前或是浮浪不如鄉差稅户可以委信然行之十餘年浮浪之害無大敗闕不足以易鄉差衙前騷擾之患今來略計天下坊場錢一嵗所得共四百二十餘萬貫若立定酌中價例不許添價剗買亦不過三分減一尚有二百八十餘萬貫而衙前支費及召募非泛綱運一嵗共不過一百五十餘萬貫雖諸路多少不齊或足或否而折長補短移用可足由此言之將坊場錢了衙前一役灼然有餘何用更差鄉户今年二月六日所降指揮但諸公使庫設厨酒庫茶酒司並差將校勾當諸綱運並召得替官員或差使臣軍大將將校管押衙前若無差遣不聞有破産之家以此欲差鄉户至於坊場元無明文處置不知官自出賣抑復依舊法酬奬衙前若官自出賣即如川蜀京東淮浙等路舊來坊場優厚人人願為長名元不差鄉户去處今來却須創差民情必是大段驚擾若依舊法用坊場酬奬衙前即未知合召募官員軍員將校等押綱用何錢支遣若無錢支遣即諸般重難還是鄉户衙前管認為害不小其二坊郭人户熙寧以前常有科配之勞自新法以來始與鄉户並出役錢而免科配其法甚便但所出役錢太重非經久之法今若全不令出比農民反為僥幸若依熙寧已前科配則取之無藝人未必安今來二月六日指揮並不言及坊郭一項欲乞指揮并官戶寺觀單丁女户並據見今所出役錢裁減酌中數目與前項賣坊場錢除支雇衙前及召募非泛綱運外常切樁留准備下項支遣所有月掠房錢十五千及嵗收斛㪷百石以上出錢指揮恐難施行其三新法以來減定諸色役人皆是確的合用數目行之十餘年並無闕事即熙寧以前舊法人數顯是冗長虛煩民力今來二月六日指揮却令依舊人數定差未為允當欲乞只於見今役人數目差撥若自前來元差鄉戶充役後來却用剩員抵替如場子壇子之類其剩員差費請受合還運司者即乞於前項坊場坊郭等錢內支還其四熙寧以前散從弓手手力等役人常苦接送之勞逺者至四五千里極為疲敝自新法以來官吏皆請雇錢役人既以為便官吏亦不闕事今民力凋殘比之熙寧以前尤當閔恤若不免接送必有逃竄流離之憂欲乞依新法官吏並請雇錢仍於前項坊場坊郭等錢內支其五州縣胥吏並募情願充役不請雇錢如不情願即量支雇錢仍罷重法亦以前項坊場坊郭等錢支如支用不足即差鄉户仍許指射舊人官為差雇代役其鄉户所出雇錢不得過官雇數目詔送看詳役法所御史中丞劉摰言臣竊以志士莫不嫉惡御史在於觸邪見無禮之人有如鷹鸇之逐鳥雀遇當路之害不問狐狸而先豺狼伏見知樞密院章惇素無才行立身居家有不可言之惡此天下之所共知也向以附㑹王安石欺罔朝廷進不以道遂塵政路自陛下登用舊德修復祖宗政令而惇意不自得以為不便非己之利也故為沮害以悖慢不遜奏對於至尊以强悍非理凌轢其同列排詬之語播於中外臣曽纍具彈奏論其姦狀乞賜罷免未䝉施行近者陛下改免役為差役人情欣快上下莫不以為是而惇獨以為非敢建異議以沮詆聖政非毁詔令緣改法畫㫖之日乃是三省樞密院同共進呈惇果有所見當於是時敷陳講畫使法令成就而後行下亦大臣之義也今待敕命宣布方始退而橫議惇非不知此法之是與非也亦非不知懷私立異之負朝廷也然惇安為之者蓋寧負朝廷而不忍負安石欲存靣目以見安石而已又自以向者無所建明於先朝專以欺罔阿諛由此法而進故今不肯遽然回心革靣且將以遂其非耳見蔡確已罷自知不安欲為此一節賣直聲而去以慰其朋黨之心又復冀望後日萬一此法却有改變則欲出而受其利故不論是非之實傳聞惇語於人曰不貶不去此足以見其志也然則執政如此乃是以髙位厚祿養大姦豈朝廷之利也惇之利口喋喋足以變事實而惑主聽凶氣熖熖足以摧善良而脅羣下故惇不去則不可以安廟朝成善政鎮百姓而服四方伏望聖慈以臣章疏付外正惇不忠之罪罷黜之以明典憲以允公議貼黃蔡確罷日公論翕然稱頌聖德果於退姦度越古今忠邪有所辨别然猶以惇在朝廷為未快也蓋惇乃確之死黨而凶悍則過之不可不去又貼黃臣纍具奏請以謂罷蔡確及惇可致雨昨者罷確而相司馬光宣麻之日遂雨自後不出旬日三得雨都城近尺而畿甸尤為沛然此有以見睿斷所召而天心之應陛下也天道必可畏公議必可信豈非明驗臣望陛下事天益恭常以分别邪正為心不可少懈早賜罷惇以終始盛德以幸天下又貼黃惇辨慧果敢似乎有才者然此正小人之才也古者任大臣必用有德不用有才有德進則行忠厚之政以安天下有才進則為殘刻之政以禍天下則德之與才治亂之所繫也有德者廉靜而重謹故人難識之有才者矜强而捷敏故人多恱之此歷代人主所以多惑於忠邪之際也楊國忠李林甫盧把輩其才皆過人然終為唐室之亂不可不察也臣深慮惇之智詐有以施行而恐陛下疑以為才故詳言之幸早賜睿斷摯遺稿稱元年閏二月十五日甲辰御史中丞劉摰言臣伏見户部尚書曾布在熙寧初王安石以親戚最先引用方此之時神宗皇帝切於求治慨然更化而安石辜負委任乃起聚斂之事褊刻之政顛倒善惡割剝生靈布為檢正判司農寺安石託以腹心故其政皆出於布之謀其法皆造於布之手至於濫刑賞開僥幸排勳舊進姦諛安石一以咨之布布以為然然後落筆遂使流毒肆惡人被其害皆安石為之布實成之臣時為御史曽以此告之於先皇帝曰大臣誤朝廷而大臣所用者誤大臣蓋指布輩也及至陛下損益法令完其已善而革其未安然後先帝惠綏生民之本意始得大明於天下矣今安石已歸老田里而布猶在近侍出入省闥中外之人莫不指議緣今役法新改方講畫條目其事之首尾根本皆在户部而使布典領雖朝廷命令布無敢違然詭情異意必不肯以前日為非而協力成就今日之法恚恨在職實非所宜謹按布不能宣明先帝之政令罔上剋下乃古之所謂民賊而聖人之所謂盜臣也考之典憲宜在所貶廢若聖慈欲全大體不欲傷包荒含垢之恩即乞止罷布户部尚書别移一職任以允公議貼黃自安石熙寧初不能副朝廷求治之意而造作害民之政是時布最先用事其法皆出於布今法既更張修完以追述先朝之意矣而布猶在要近此所以衆議籍籍不以為允伏望速賜指揮罷今職任别移在京或外任一差遣此據元祐章奏雜録摯集今無之遺稿仍具載在閏二月十六日其月二十二日布出知太原布子紆作釋誣云摯為中丞未嘗論布福建所刋骨鯁集有摯章乃選人徐方叔撰造曽經朝廷行遣開封府自有公案不知紆所稱公案是何年月日摯本集今雖無此章其遺稿十卷具載又有月日可據也紆特為其父諱耳兼紆所作釋誣類多先後差誤不可慿已見布為户書日右司諫蘇轍言臣近三上章乞罷免右僕射韓縝至今未䝉施行竊謂縝姦邪無狀略與蔡確等而確猶頗有吏幹粗知經史縝為樞密與宋用臣張誠一等共建修城養馬之議迷國誤朝罪與確均而不學無術去確逺甚又河東定地界一事獨擅其責臣聞縝定地界時多與邉人燕復者商議復勸成其事舉祖宗七百里之地以資冦讎復有力焉復本河東兩界首人親戚多在北境其心不可知而縝與狎昵不持一錢託令買馬及事發乃云方欲還錢如此而可則凡天下犯贓之人無事恣意受之有事則云方欲還主便不書罪則是天下更無贓吏矣復之心迹衆所疑畏縝為大臣曽不為國深慮私相往還至受賂遺正使縝先將金錢令人買馬亦須託良善士人不當及復而况不持一錢將何證明知是欲還而未及欺謾苟免略不知愧訪聞河東當日割地與敵邉地數千家墳墓田業皆入異域驅迫內徙哭聲振天至今父老痛入骨髓而沿邉險要舉以資敵此乃萬世之深慮縝以一死為謝猶未塞責今蔡確已罷相而縝猶未動臣愚竊意陛下欲令縝自引避如確之去臣竊以為過矣縝之罪惡與確未可同日而語當正其罪以告四方乞下臣前後章疏令三省兩制雜議有不如臣言甘伏訕上之罪若臣言不妄亦乞明正典刑以謝天下又言乞下河東提轉安撫使密切體量燕復久逺可以保任不至作過犯否令結罪保明聞奏如不敢保明即乞指揮今後更不與沿邉兵馬去處差遣先帝初使吕大忠商量地界大忠果敢有謀堅執不與北使自知别無的確證驗已似懾服而縝暗懦遂壞此事乞取問大忠及當時知次第人即見詣實左正言朱光庭奏據編類章疏係閏二月十六日臣竊以姦臣在位邪說害政貪冒無厭不恤廉耻臣已纍言章惇韓縝之當去也今日幸聖德寬厚曲為涵洪因而為姦臣者得以偃蹇自安不為去計臣職在諫列覩此姦臣未去言不得不盡夫天下之重任惟賢者可以當之然居之者未嘗不小心兢惕惟恐有負故難進易退一主於義今章惇之為大臣其始進也以妄興荆湖邉事殘害生靈以至大任今日又肆為邪說沮抑聖政慢言俚語陵轢同列無所不至大臣若此豈同心一德者乎又如韓縝之為大臣向在宥密害政滋多今居柄任惟務貪冒寵榮不知引避凡人而無耻可當大臣之任乎竊惟二姦臣之處大任自度素履能無怍乎人可欺乎竊料姦臣非不知人言之衆但偃然自處殊無忌憚若此悖慢雖聖度如天務欲寬之其如天下公議何其如害政何伏望陛下檢㑹臣前後纍奏早賜睿斷施行貼黃今日廟堂之上司馬光未出只有吕公著一人忠朴可倚其餘皆姦邪及備位者也伏望聖慈早進范純仁庶得賢者在位同心一德以輔聖政丙午通議大夫守尚書右丞李清臣為尚書左丞朝散大夫試吏部尚書吕大防為中大夫尚書右丞司馬光云云附注二十七日乙卯吕陶記聞云本朝故事初拜二府其室家入謝禁中以幣帛遺典客夫人茶酒夫人之類每合率二匹至吕微仲范堯夫登庸贈遺皆倍其數雅意安在哉吕范二公之妻恐未必爾也當考范為同知樞密在此月二十七日乙卯給事中兼侍讀范純仁為吏部尚書二十七日乙卯純仁遷同知朝散大夫祕書監兼侍講傅堯俞為給事中兼侍講試禮部侍郎蔡卞為龍圖閣待制知宣州朝議大夫劉攽為祕書少監朝請大夫太常卿葉均直龍圖閣知荆南軍器少監蔡碩為蔡河撥運三月十八日趣赴任監察御史邵材知廣德軍先是州郡有以疑獄上者刑部謂當貸死而執政以為殺人者不可貸仍欲坐所奏官且立法材言疑獄當讞朝廷之常法奏有誤貸罪祖宗之盛德奈何紛更之誠使當讞者不貸為貸者獲罪恐獄吏便文自營不復以疑獄聞矣疏入不報材即自劾遂命出守此據邵材附𫝊增入恐材自以不才被沙汰耳𫝊飾辭非實事也去年七月甲寅八月癸酉已立法此云且立法𫝊飾辭决矣御史罷不可不載姑因之須考詳王震范百祿劉賡皆與執政異議者詔户部應諸路人户見缺市易息錢並特與除放詔以劉摯所言乞罷坊場新法及創增吏祿付韓維等相度以聞舊録云先是吏不得受財無祿以畜養一犯法則從而刑之先帝以為罔民乃祿庶人之在官以興廉省刑吏不敢髙下其手至是以為浮費省之新録已削去今從新録摯所言先是正月九日今但舉其略監察御史孫升言祖宗以來有刑部大理又設審刑糾察按覆內外刑章先朝於大理置獄兼聽推讞而刑部獨總天下之刑其於明慎欽恤之志固亦同矣然而大理刑獄之長如崔台符蹇周輔楊汲王孝先劉衮張奕輩是豈足以知先王忠厚之意哉乞罷去台符輩選公明經術之士為之仍乞取索元豐以來大理因探報公事附㑹奏請法外斷配人數特乞放免庶可以成先帝欽恤之志廣陛下好生之德詔御史中丞劉摯給事中孫覺取索元豐以來大理寺開封府斷遣過因內降探報公事元犯及斷遣刑名看詳內有不合受理并事涉寃抑者具事理以聞四月看詳訴理當并考二十四日張奕出守孫升章當求全本今有奏議十卷獨無此章舊録云由是先帝懲姦罪惡悉稱寃抑無復忌憚新録已刪去樞密院言除太皇太后出入儀衛外如遇三殿同出共使人員十將已上至長行殿侍共二千五百一十七人見闕六百餘人不足據所缺人分擘權差從之權管勾熙河蘭㑹路經略安撫司公事趙濟言譯到鄂特凌古畨字乞通和事詔趙濟候鄂特凌古再來說及滿裕克家乞通和事即令就鄜延路說諭河東經略司言火山軍申依朝㫖拆毁壘起石墻次日有北人二百餘騎來張千地內施放弓箭射中石姓趙立等詔河東經略司暗設隄備以理說諭候退有再壘下石墻侵越界至即便依前拆毁二月辛巳此月甲午當并考户部言陜西轉運副使吕大忠奏見今陜西鹽鈔價貴乞年額外依自來兩池分數更支鹽鈔一十五萬席以平凖其價從之又言臣僚上言解鹽兩池自來通行貨賣今京西轉運司置官設局使民間不得貨賣頗為不便伏乞放行通商每席止令增貼買錢一貫或五伯文并京西轉運副使范純禮相度到本路增收貼買錢無名乞依舊法許令通商將來見在鹽并鈔令本路依客例變轉撥還逐處從之禮部言故朝請郎致仕李弼堅妻王氏狀亡夫從祖維清係繪像臣僚為本支無嗣乞依張知白體例推旁支恩詔從之仍令李惟清族中推有行義者立為嗣詔祭奠弔慰髙麗國王所管勾舟船客人船主梢工虞際與三班借職盛崇李元積與大將右司諫蘇轍言臣竊見朝廷近日察知蜀中賣鹽榷茶及市易比較收息為逺人所苦委成都提㸃刑獄郭槩體量事實臣觀此三事利害易見甚於黑白凡有耳目莫不聞知而郭槩觀望阿附公行欺罔其所奏聞並不指言實弊見今西川數州賣邛州蒲江井官鹽每斤一百二十文為近年鹹泉減耗多夾雜沙土而梓䕫路客鹽及民間小井白鹽販入逐州其價止七八十以官中須至抑配深為民害槩不念民間朝夕食此貴鹽出錢不易却言限內難以報應只此一事已見情弊至於榷茶之法以賤價大稱侵損園户以重輦峻限虐害遞鋪以折博興販攪擾平民其餘百端非理難以遍舉臣近已一一奏聞元委所差官體量詣實槩畏憚茶官陸師閔事勢不敢依限體量此又足以見其意在拖延觀望附㑹至於市易比較收息始因提舉官韓玠以靈泉小縣收息增羡遂督責諸縣以靈泉為比務令多得息錢槩以韓玠叔祖縝見任右僕射意欲趨附不敢體量實狀妄言韓玠不曽以户口比較息錢又代韓玠巧說詞理言諸路推行市易之法不獨成都不可獨治一路及事已在三赦前槩以監司被命相度逐事利害朝廷元不令槩定奪韓玠罪名槩之職分但當具的確事實聞奏至於韓玠或行遣或釋放或原赦或不原赦自出臨時聖㫖指揮非槩人臣所當預定今既不依朝㫖相度却於職分之外擅引三赦意謂朝廷不合相度赦前之事附下罔上肆行胸臆情理難恕槩資品鄙陋嘗通判鳳翔坐失入死罪去官係監當資序因緣權幸致位監司而附㑹欺謾略無顧憚其韓縝係韓玠有服之親顯有妨礙臣未識縝如何進呈作何行遣臣乞降聖㫖先行罷黜郭槩所有賣鹽榷茶市易等事乞賜委官體量施行詔郭槩特差替其賣鹽市易事令黃廉先次體量詣實以聞新録依舊録止略載轍言今詳出之舊録云先帝立均輸以平物價抑兼并以利小民榷茶鹽以走商賈轍謂為民疾苦新録辨曰均輸茶鹽之政已見當時指揮及前後臣僚章疏論之詳矣不當於此言直書其事可也自先帝均輸至為民疾苦二十九字並刪去轍又言臣聞朝廷進退大臣與小臣異小臣無罪則用有罪則逐至於大臣不然雖罪名未著而意有不善輒不可留何者朝廷大政出於其口而行於其手小有齟齬貽患四方勢之必然法不可緩臣竊見知樞密院章惇始與三省同議司馬光論差役事明知光所言事節有踈略差誤而不推公心即加詳議待修完成法然後施行而乃雷同衆人連書劄子一切依奏及其既已行下然後論列可否至忿爭殿上無復君臣之禮然使惇因此究窮利害立成條約使州縣推行更無疑阻則惇之情狀猶或可恕今乃不候修完便乞再行指揮使諸路一依前件劄子施行却令被差人戶具利害實封聞奏臣不知陛下謂惇此舉其意安在惇不過欲使被差之人有所不便人人與司馬光為敵但得光言不效則朝廷利害不復顧用心如此而陛下置之樞府臣竊惑矣尚賴陛下明聖覺其深意中止不行若其不然必害良法且差役之利天下所願賢愚共知行未逾月四方鼓舞惇猶巧加智數力欲破壞臣竊恐朝廷緩急有邉防之事戰守之機人命所存社稷所繫使惇用心一一如此豈不深誤國計故臣乞陛下早賜裁斷特行罷免無使惇得行巧智以害國事轍章以十八日上今附本日或移見二十三日章惇罷樞密之前轍又言臣近奏言知開封府蔡京施行差役事故意擾民以敗成法及曲法庇蓋段繼隆贓汙公事乞先罷京差遣及催督大理寺結絶斷遣至今多日並不䝉施行京文學政事一無所長人品至微士論不與若不因緣蔡卞與王安石親戚無緣兄弟並竊美官今卞已自迫於公議求退而京獨昻然久據要地衆所不平臣竊見左正言朱光庭言御史中丞黃履言事不稱職乞罷侍讀履罷免曽不旋踵竊惟臣與朱光庭並係諫官論奏羣臣得失皆是本職而蔡京罪犯明著甚於黃履陛下明聖以至公御下而諫官之言皆擊其罪或行或否衆所不喻皆謂韓縝所除右僕射日黃履言其過惡不任宰相而蔡京不曾忤縝是致行遣有此同異伏惟朝廷本設諫官以稽察姦惡為人主耳目之用今臣等所言之人韓縝欲行即行欲止即止則是諫官之職乃所以為縝公報私怨非復陛下耳目之官也伏乞陛下檢臣纍奏早賜降黜韓縝仍先罷免蔡京差遣及催大理寺結絶段繼隆公事無使諫官失職宰相恣橫為吏民所共非笑又言訪聞近日諸路監司州郡多以二月六日所降差役指揮有不便事節未敢便行各具利害奏聞顯見事理明白人情不逺茍無挾邪壞法之意誰不論列獨蔡京以侍從之臣居首善之地更無一言只於數日之內催迫了當用意不臧深可忿疾况京治段繼隆事不公外又曲庇僧録司公事竊聞臺諫官並已曽劾奏似此専務私徇豈可復任京尹是日汝州團練推官西京國子監教授程頤為承奉郎政目二月十二日朱光庭薦頤為講官御集閏二月十八日事八年十一月二十七日丁巳元年閏二月二十八日丙辰三月十四日辛未當考先是王巖叟言臣聞孔子曰舉逸民天下之民歸心焉臣以謂舉之易也而祿之難祿之易也而盡其用難非待之有禮處之有方則不可得而祿矣不可得而盡其用矣伏見西京國子監教授程頤學極聖人之精微行全君子之純粹早與其兄皓俱以德名顯於時陛下方欲用皓而皓卒賢士大夫無不相與咨嗟以為朝廷之恨今者幸陛下復起頤而用之頤趨召以來待詔闕下四方俊乂莫不翹首嚮風以觀朝廷所以待之者如何處之者當否而將議焉則陛下此舉繫天下之心臣願陛下加所以待之之禮擇所以處之之方而使髙賢得為陛下盡其用則所得不獨頥一人而已四海光隱德之士皆將相招而為朝廷出矣愚臣區區欲以廣陛下之美者其誠心如此惟聖主留意幸甚巖叟薦頤不得其月日太皇太后嘗諭巖叟云卿纍薦程頤已除校書郎來日待行文字召對此語今附此月二十八日然則巖叟薦頤不但此一奏也頤召對在三月十四日除說書在三月二十四日朱光庭薦頤在八年十一月二十七日丁未宰臣韓縝等上表請特建太皇太后皇太后宫殿太皇太后宫以崇慶殿以崇慶夀康為名皇太后宫以隆祐殿以隆祐慈徽為名詔從之候過諒暗令有司檢舉施行詔給事中兼侍講𫝊堯俞詳定役法己酉髙麗國祐世僧統求法沙門僧義天已下十人朝見詔市易務見計置下凖備外國人使收買之物約五萬餘貫令止據見在數目供賣候絶罷行計置令行人依舊例供應所有元豐四年二月二十四日西驛買賣祗應令市易管認出賣朝㫖更不施行庚戌兵部尚書王存為戶部尚書存固辭不拜户部尚書曽布為龍圖閣學士知太原府劉摰言之也摯言在十六日甲辰元豐八年五月二十六日布除戶部寶文閣直學士謝景溫權知開封府龍圖閣待制蔡京知成德軍先是監察御史孫升言近因段繼隆賣官事論列開封府蔡京恃與宰相同宗不奉朝廷法令任情肆已放縱姦彊若不明行典憲何以風動四方伏望特出睿斷早賜罷黜以警中外䝉朝㫖送大理寺依法施行今大理寺推治繼隆賣官事狀已明開封府人吏已行對定訖緣昨曽該踈决德音朝㫖若令依法即是蔡京更無罷黜之理伏緣蔡京素無行能致身侍從當陛下御統之初不思竭忠奉公少圖補報而棄法自用怙勢挾私肆為姦欺曽不顧畏將何以尹正京邑表率郡縣又近降朝㫖送大理寺依法施行無取勘聞奏指揮即是大臣意欲引踈决放免伏乞特賜檢㑹前奏將蔡京早賜罷黜八年十一月十一日辛丑山陵畢德音降兩京及河陽府死罪囚又元年正月二日壬辰遣官録囚不知孫升所引德音是何月日當考升又言臣愚不肖誤䝉陛下拔擢備數御史為陛下耳目之官任朝廷糾察之責職當執法要在繩姦言而未效既不自劾引去豈可徇默茍容而已也臣謹按蔡京明知段繼隆內外親族出入三省繼隆冒法賣官而京親書塗抹任情放縱不奉朝廷法令而與奪一出於已此其一也又如僧惠信所訴僧録司受金錢違法差僧入內道場事且僧録司在京號為脂膏之地交結貴近貨賂公行京為府尹以發姦摘伏為職知所部犯法自當舉劾又况其間有訐告之事京更不審行推治直以不干己事斷惠信臀杖二十以杜人言其後臣僚纍奏送大理寺推治僧録司贓狀已明京若非隂受請託何故如此此其二也京又嘗違法差開封府判官王得臣當直散從官替名人李福於河隂縣追缺百姓私債張岷及阿蘇等至開封縱李福乞取張岷得金錢及本臺牒取公案始將李福奏斷此其三也三事乃臣所聞本臺所按察者用此推之則臣所不聞違法徇情之事不少矣臣伏以先王為政之道治外必由於內正逺必自乎近今開封府咫尺朝廷乃敢作姦犯科如此陛下不正典刑何以使天下州縣奉法循理推行詔令乎蔡京挾宰相之勢擅京尹之權人莫不望風畏之而臣區區纍冒聖聽者蓋恃朝廷開大公至正之路臣竊不自量欲慕古人明目張膽行御史觸邪之職不然臣之孤微何敢出此伏望察臣前後奏論早降指揮以警中外京既罷府事出守真定升又言三路帥臣實總軍政尤非京所當任乞加黜責以為天下州郡棄法徇私之戒殿中侍御史吕陶言都城之廣萬衆所聚姦僞百出刑訟實繁推劾聽斷尤宜詳審朝廷欽恤之意防禁最密每開封府大辟獄具本處既已録問則申刑部請覆其實刑部乃關吏部差官同慮謂之審問囚無翻異則論决如律事有可疑則移治他司蓋所以察寃濫而重人命也安可徇一己之私見而欲他人之必死乎臣伏見開封府勘小阿賈殺人公事吏部差劉斐審問斐看詳案卷稱是情節可疑遂疏述不圓七事申刑部乞行㑹問續據本府回報三事並是誤供又據劉斐續條陳案節不圓一十二項刑部既見劉斐所申如此亦慮小阿賈之情或涉寃枉遂付大理再推庶得其實即於格法未見違戾而知府蔡京輒有論奏謂阿賈大情已正便當處死劉斐不合疏駮刑部不當移推皆宜論罪其徇情好勝逞威犯分不顧義理一至於此且人命至重死不復生小節既是未圓大情容有不實若便將阿賈處死則是大辟罪人不須再行審問三木之下枉殺必多况朝廷立法極從仁愛天下死罪稍涉疑慮可憫並須奏聽敇裁多䝉寬貸豈有不容問難便欲行刑又緣録問條制令移司勘逐者指定不圓事節回牒本處今劉斐既疏述一十九事皆是不圓刑部須至重勘若阿賈不行凶則京顯有殘忍煆鍊失入之罪或阿賈委是正賊則京猶有鹵莽判押不職之愆生殺之端斐皆無過若萬一朝廷聽其妄奏加罪於斐則向去審問之官率皆畏避不敢伸陳被刑之人多負抑屈無所赴訴况尚書刑部主天下獄訟兼糾察在京刑獄之職可以統轄開封按劾其罪今既舉職反為開封所劾則上下之分顛倒錯亂非所以尊朝廷風四方之意又緣京知府已來殊無治迹聽獄斷罪失謬極多於段繼隆之事則親書塗抹放縱冒法賣官之人於僧惠信之事則遂非妄奏曲庇重祿受賕之吏方當至公之朝宜檢舉京前後過惡重行黜降今既未正其罪又差知真定府兼安撫使考之公論殊未為允伏請寢罷新命候大理結正小阿賈等公事三件了日别取朝廷指揮况真定經劉瑾苛政之後疲民殊未寧居宜擇厚重知治體者以惠養綏懷之如京輕易徇情豈可帥領一道深慮因而生事京荒唐浮薄士論所鄙緣其弟卞為王安石壻牽挽忝冒得至從官既與王安石為婚姻之家又與蔡確有宗族之契慿恃勢力習慣恣橫豈可更領邉帥之任伏乞追改施行右司諫蘇轍言臣近奏論蔡京施行差役事督迫諸縣於數日內了當不依朝㫖申請妨礙事件挾邪壞法用意切害及治段繼隆僧録司等公事私徇不公乞罷京知開封府訪聞臺諫並亦有劾奏京因此奏乞外任而宰相曲加庇蓋臣等所言皆不施行獨行京陳乞文字除京知真定府竊緣真定天下重鎮舊來多擇久歷邉任曉練軍政之人然後除授今京資任至淺才力無聞見有徇私公事未經結絶臺諫交章至今未已而宰相特加奬助授以名藩意以凌壓言事之官使之不敢復言臣竊見前者臺官論朱服不孝事迹服因以乞外官宰相除服直龍圖閣知潤州又論王說黨附吳居厚說亦因此乞外官宰相除說知密州龍圖閣要職也潤密名郡也服說皆因人言反獲美命蓋宰相上欺朝廷下困臺諫習用此術久已成例不可不察臣等若言京不當自當顯被黜責若所言稍當則宰相豈得公然恣橫略無顧憚伏乞聖明稍加詳察追罷京新命使以本官職候大理寺斷遣以弭中外疑惑臺諫所言訖不行六月十二日京坐段繼隆事特罰銅二十斤朱服八年六月二十七日罷右史直龍圖閣知潤州王說元年閏二月四日罷倉部知密州詔神宗皇帝所居東宫改為睿成宫户部言廣南西路桂州修仁縣等處茶貨昨劉何逐年差官置場收買出賣收息止及一萬餘貫慮逺方因此茶價增長有妨民間食用乞依舊放令通商所有元豐七年十月二十九日廣西路榷茶指揮更不施行從之元豐七年十月二十八日甲午詔英州編管人鄭俠特放逐便仍除落罪名尚書吏部先次注舊官與合入差遣從監察御史孫升右司諫蘇轍所奏也舊録云俠以詆訕得罪先帝曽詔有司曰貸與之生已為寬宥時先帝所棄逐漸已收用俠亦加叙雪新録辨曰士自祖宗以來先朝黜之後召用者多矣不但俠也自俠以詆訕至亦加叙雪三十六字並刪去户部言右司郎中張汝賢奏立定福建路産賣鹽額候及五月有併增併虧自依海行條貫施行內四州軍賣鹽後應抑勒人充鹽鋪戶并願退免不為施行者各徒一年提舉鹽事知而不舉與同罪從之髙麗國僧統進奉皇帝興龍節祝聖夀佛像并金器等詔學士院降詔奬諭朝辭日賜衣著一千匹銀器一千兩又詔賜于闐國王龍服一襲腰帶器幣有差刑部言乞應該元豐八年三月六日登極赦以前雜犯配軍除元係軍人配到及宣敕指揮永不放還者更不移放外其元犯殺人放火彊盜僞造符印謀殺人持杖竊盜罪至徒犯雜死罪貸命并餘罪徒以上情理凶惡者在京令所屬及開封府步軍司諸路令轉運使副判官提刑司取索元犯看詳量移從之御史中丞劉摯言臣昨者纍具彈奏知樞密院章惇乞行罷黜未䝉施行謹按惇佻薄險悍無士人之行熙寧初召試館職乃為御史詆其醜惡罷去既而諂事王安石以邉事欺罔朝廷稍稍進用及安石補外惇又傾附吕惠卿當時號為入室之人徇私反覆物論賤之夤緣至於執政以彊市兩浙民田及寄語臺官等事為言路所擊而先帝亦益薄其為人於是黜之未幾復為蔡確所引以至今日自陛下辨别忠邪修完先朝政令雖天下之所同利而惇輩之所不樂蓋自知身非善良故不欲舊德之在其側心懷姦二故不喜正論之出其旁由新法而進故不願祖宗舊法之復用也廟堂之上詆詬同列摧辱公議屠沽之言播在中外其不遜無禮非獨施之於同列至於簾陛之前彊愎慢肆舉止偃蹇専以沮壞善政更無臣子事上之節此士論人情所以憤嫉疑惑而不服也昨者陛下裁保甲之法而惇常護前不以為是有臣僚自外至者臣嘗問之皆謂鄉縣田里自罷教保甲人情安樂無復愁嘆如河北向來逃亡人户往往歸復皆言自此父子骨肉可以相聚而有為生之期矣此事乃惇前日之所不肯改為者也推此觀之則惇豈有意於利國家安社稷也哉近者陛下改正差役而惇又肆橫議賴陛下深燭利害主張法意不為邪議所動然論說紛紛攪擾沮害黷於聰聽者蓋已多矣每事如此則陛下之善政必須口舌爭奪而後能成不亦勞乎夫去惡莫如盡惇與蔡確為黨前日陛下既去確而今猶留惇去惡未盡非朝廷之利非生民之幸非所謂忠邪之辨也伏望出臣章付外速賜睿斷罷惇使外補以全聖政以慰羣望貼黃稱陛下若待其自引退然後罷之緣惇素無廉節已嘗語於人曰不貶不去則安肯以禮自引也乞付臣章於三省正其橫議害政彊愎慢上之罪顯然黜之可也又稱陛下試將今日執政比之熙寧以前朝廷大臣其人物士望孰賢孰否孰輕孰重哉然則今日之勢其間肆惡害政之最甚者豈可不急去之也又稱臣聞近日執政聚㕔因議役法惇詬詈衆人其言乃屠沽之言也有一人對曰吾輩備員於此亦宜存體今紛紛如市井人若此言𫝊播亦於君不便惇靣發赤不言又一人曰今日且得一伏辨狀也其日有禀事官數人在坐皆見之廟堂之上談議如此古今所未聞也無乃上辱朝廷而下取輕於士大夫哉據劉摯奏議遺稿閏二月十九日上此或以為朱光庭誤也右正言王覿言伏讀尚書見伯益言於大舜曰任賢勿二去邪勿疑蓋任賢而二則任之不專而賢者不得盡其道去邪而疑則去之不果而邪者得以肆其姦故伯益陳之以為戒以謂雖大舜之聖亦不可不謹於此也臣近纍曽奏陳以執政大臣姦邪害政者相半伏望陛下擇其尤甚者漸去之所謂姦邪害正者蔡確韓縝章惇張璪其人也今陛下幸已罷蔡確職任中外人情莫不欣快以陛下聖明勇决不惑於姦邪之黨也然縝惇璪猶偃然自固而不知退焉非徒不知退而已又為確游揚論列欲陛下更加恩禮於確臣於此尤見朋邪之迹也夫確以常才冒寵謬為上宰裕陵使回不以故事兼請而顧戀權寵若將終身及言者交攻勢不得已方黽勉以求郡陛下不行諫官章疏以掩其罪慝仍假職名俾守輔郡終始僥幸固已多矣而縝等猶復有言者其意不過欲以受遺定策為確之功而已且皇帝陛下上承正統之初保護援立皆太皇太后之聖德也確縝惇璪曽何預焉適㑹其時乃敢貪天之功妄自張大盜取受遺定策之名以自負故縝惇璪見確之去而以其恩禮不異則將失其所以自負者而無以欺惑愚衆宜其更以加恩禮為請也夫縝惇璪之本情與確豈其相善哉其交相詆訐有素矣此陛下之所知也至於今日翻然皆以恩禮為請若非貪天之功妄自張大者其事正同而欲自為異日之地則豈協謀同力而為確有請哉臣前奏猶欲陛下擇其甚者而漸去之今縝惇璪朋邪之情日益著見則害正滋甚而去之不可以漸矣蓋當先帝時縝惇璪附㑹欺罔上誤朝廷之事不可勝數是以陛下臨御以來修明法度剗革弊事四方內外莫不頌詠聖政而獨縝惇璪大非其所欲故或公為沮止而恐其成或陽為恱從而幸其失如近日之役法終始本末皆欲破壞其事以傾建議之人而不顧有傷於國體有誤於陛下也故初則但録司馬光劄子行下不立條目以幸其失中則惇出力以排之而恐其成終則不待詳定事畢而遽為實封狀之法以惑四方二月二十四日及今月八日奏狀內已嘗開陳備述情狀縝惇璪處心積慮如此而陛下尚何望於彼哉去之安可不速也陛下勿以既罷蔡確又罷三執政為疑臣竊聞真宗即位之初咸平元年十月執政俱罷者四人宰相吕端參知政事溫仲舒李至樞密副使夏侯嶠是也仁宗明道二年四月亦執政俱罷者六人宰相吕夷簡參知政事陳堯佐晏殊樞密副使夏竦范雍趙稹是也茍害於政去之雖多而何所疑既非其人存之雖少而大為害伏望陛下裁自聖斷早賜施行編類元祐章疏繫覿此奏於閏二月十七日今并入此左正言朱光庭奏據編類章疏係閏二月二十二日臣聞易曰小人而乘君子之器聖人之深戒謂其發言動慮害民敗事故舜之去四凶魯之誅少正卯不得不速也竊以輔弼疑丞之任天下之最重者也非夫全德巨才處之為不稱豈容姦邪之冒處邪如章惇韓縝者豈不能自揣素履君子邪小人邪若自以為君子邪胡不觀諸方冊驗諸賢輔有挾邪肆辨敢為欺罔貪冒榮寵不知進退者為君子乎若自知為小人而方聖政大明無幽不燭睿斷如神發必中義而為小人者豈不知畏而引去尚敢偃然自安邪伏自陛下臨御以來力除蠧弊天下之人皆喜之惟章惇不喜每聞簾前辨論悖慢無禮且天下之法度可更張則更張烏有後先之間哉一於便民而已章惇意在不更張而不顧民害之深豈得為忠乎辨論公正猶不可失人臣恭順之禮又况其邪說之多而敢為悖慢耶詩曰人而無禮胡不遄死𫝊曰見無禮於君者如鷹鸇之逐鳥雀臣今見章惇之無禮則逐之而後已韓縝行義之不修而不能自治何以治人代天理物之任豈行義不修之人可以當之乎况內有賢兄不知引避人而無耻不足觀也己此二臣者雖聖度如天進退大臣必思以禮然章惇韓縝無耻之甚尚何待也伏望陛下檢㑹臣前後纍奏特賜睿斷施行左司諫王巖叟之為御史也先言臣竊以輔弼大臣者人主之所體貌天下之所瞻仰非有厚德重望則不足以當之伏見知樞密院章惇材輕行薄廉隅不修無大臣體久處廟堂曽不聞一話一言播在清議獨每聞縱肆猖狂為俳諧俚語侵侮同列朝士大夫相與鄙笑而已流於京師𫝊之四逺甚非所以重廟堂尊朝廷也伏惟陛下臨政之初萬國觀光輔弼大臣尤宜崇奬有德而惇之輕薄如此上則玷體貌之隆下則辱瞻仰之重有識之士無不憤嫉乞行罷免以慰師言又言仁宗用石中立為參知政事中立比惇别無玷缺可羞之行亦無驕恣害政之風止以在中書好滑稽詼笑諫官言之遂行罷免陛下試令考尋當見其事可以察臣之言惇不為過論也陛下罷惇不為無故事也又言今中外之人非但鄙惇輕薄無行不可為大臣而已皆云自陛下即位以來凡欲更張人情不便事惟惇彊悖不肯協心故為異論沮格善謀曽無意助陛下施行恩福天下此人情所以憤嫉之深而欲共逐之者也陛下今不罷惇彼必揚揚自得曰主上知我如此而不罪我矣言事者言之再三而主上不聽矣誰復敢議我者夫以素無忌憚之心而又得所恃焉養之益深將必有跋扈難制之患方是時陛下雖欲悔而除之亦不易矣易貴履霜之早辨春秋憂蔓草之難圖不可不以為鍳也又言臣纍言惇輕薄無行無大臣體不可為輔弼及聞别有言事官言其受宋用臣贈遺貪汙不法臣謂有一於此皆當罷黜况惇之行臣羞為陛下言之且舉一事陛下察焉自古以來名髙則行虧德盛則稱公行薄而不為人所重則名之天下自然之理而不可以勢取者也惇平生多與京師市井小人並游而雜處至為京師之人以其行第屬其名而呼之曰惇七今雖顯貴而佻薄益甚故惇七之呼未離於人口則惇之人望重輕亦可知矣國家何忍以第一等名器與第一等無行之人使天下後世輕朝廷哉又言廟堂者儀刑之地非法度之言不當出也而惇肆為諧謔以玩侮在位汙廟堂若閭閻瀆朝廷如市井陛下以謂大臣當如此否也大臣者體國家之意察天地之心而協濟善政者也而惇執强好勝不恤事情以姦言搖正論以險語劫善人陛下以謂當如此否也輔弼者所宜正而不阿潔而不汙以表厲庶官者也方用臣弄權怙寵恣為欺罔之時惇既不能明言於朝以正厥罪又從而受其贈遺隂與相交喪滅至公玷辱清議陛下以謂大臣當如此否也又言臣聞諫官孫覺常論邉事不合惇意而惇肆言於人曰議者可斬中外聞之無不駭愕臣伏以陛下之意則於諫官之言無所不容諫臣之心無所不察而惇於言者則欲殺之其意不欲人主聞至言朝廷收衆䇿為臣不忠莫大於此自古以來未嘗有大臣敢出此等語脅諫官也推此以往飛揚跋扈何所不可伏望睿明早賜罷黜為國家之福也又言惇姦回險薄事先帝不忠今復有輕陛下意陛下詔書求直臣以益盛德而惇罵上書之人曰不逞之徒其意不欲陛下廣聰明而忌嫉四方之人以實告陛下蓋凡四方之所告皆有前日欺朝廷而蔽先帝者耳又罵陛下所登用老成舊德亦曰不逞之徒以其意不喜陛下用正人而惟欲用憸邪巧佞柔而易制肯同欺蔽之人耳天子即位求民瘼於四方為得邪失邪四方之人以至誠告主上為順邪逆邪陛下用老成舊德有天下之望者以慰天下為是邪非邪臣不知惇何心以事陛下而悖戾如此謗侮如此又罵諫諍之臣曰可斬此語雖人主盛怒不肯以出口也而惇易言之又與同列議事一不合意則連聲罵曰無見識無見識此語雖市井小人有不輕發也而惇以為常談臣不知惇待朝廷為如何而無忌憚敢爾臣前纍章言其輕薄無行好為俳諧俚語侵侮在位無大臣體今則凶德益肆而甚矣惡言益播而廣矣陛下尚使之處廟堂何以服人心人心不服何以安朝廷此臣之所以有隱憂而不能自寧也又言臣纍言章惇以小人之行居大臣之位姦言利口足以變亂白黑顛倒是非久在陛下左右恐日往月來察之難防之難制之又難臣所以不避怨仇力言其惡願陛下早賜斥逺今更舉目前一事陛下觀之自來執政大臣若稍聞言路有言雖章疏留中未出亦必朝夕惴惴有不自安之色何則憚朝廷畏公議也今惇雖知言路交攻而岸然自處無毫髮畏懼意反揚言語人曰不貶不去觀此一語何復有廉恥何復有畏忌竊以臣道主敬主順而惇之傲易不遜乃如此尚可以為大臣乎惇輩見蔡確因上章遂請皆相與結約不復自陳大臣風節一至於此臣實為朝廷歎息伏乞陛下破此姦謀直行罷免以慰天下之望於是巖叟又言臣昨為御史日纍上章言蔡確章惇姦邪讒險同惡相濟負先帝之恩誤天下之事不可當大任䝉陛下採納公言因確之請遂許其去退大姦進大忠制下之日天地改容人鬼歡喜士相慶於朝商賈百工相慶於市耕者相慶於野行旅相慶於塗皆以謂陛下威明英斷自古未有推此以往何善不可為何弊不可革天下復太平之象矣和聲上徹膏雨隨降天心之所以答陛下者豈不速哉臣嘗言若陛下早去大姦使朝廷無壅蔽之患和氣上薄於天則天自將有應臣非有智能可以揣度天道也惟以人心卜之而已人心雖近而通乎天天道雖逺而接乎人故臣願陛下常信天道常畏人心不可忽也今大姦一去而一在人心猶以為鬱陛下何惜並去之以成曠然之治邪臣前論章惇之惡其狀非一或輕薄無行或貪汙不法或沮害美政或迫脅善人或欺罔主上或侮易朝廷臣謂有一於斯皆宜竄黜而聖度并包未加誅逐然惇凶焰日熾惡德不悛近又聞簾前爭役法事詞氣不遜無事上之體虧喪臣道凌弱主威中外傳聞無不憤嫉惇於先帝時何故不敢無禮如此而今日敢爾伏惟皇帝陛下春秋方富太皇太后陛下不出房闈大臣尤當莊敬盡禮之時而惇反有侮慢不恭之志此所以人情棄而不容陛下雖欲容之如朝廷典刑何如天下公議何諫官御史坐觀而不論則是負陛下而右彊臣率羣臣而慢人主罪莫大矣羣臣見惇悖戾不道如此而陛下不加罪則皆將生驕慢之心亡忌憚矣臣居言責其得安乎陛下因臣之言必更嘗觀而密察當亮臣之言非私意也非偏見也非厚誣也伏望聖慈早行降黜以滿人心以答天意以全陛下清明之政貼黃稱惇陵上侮下敗羣亂衆真小人之傑也陛下欲朝廷清肅君道尊嚴不去此害終不可得臣聞惇既於簾前輕慢喧譁又退而以惡言詆毁同列皆非大臣口中語蓋見陛下用司馬光作相躁忿忌嫉益有不樂朝廷之心所以如此士大夫皆言自有執政以來未嘗見如惇之凶劣者願陛下省察早賜罷黜以安朝廷天下之人共以免役為苦陛下一日復差法中外人心無不欣悅而惇獨為異論妄生沮難動搖人情伏望陛下深賜體照無惑姦言以壞美政編類章疏以巖叟所奏係之閏月八日今并入二十二日章惇罷政前一日巖叟又嘗靣奏曰自陛下即位以來凡所更張人情不便事惟章惇不肯協心彊生沮難其人不欲陛下得人心不使人心感陛下中外之人無不憤嫉爭欲為陛下逐之者非但鄙其輕薄御批除官祖宗以來以為美事惇謂陛下不當自除諫官自屬三省密院無所預惇不以公正報陛下乃肆邪說欺惑聖聰况無禮於君人所共嫉陛下所除數人命下之日歡然一辭惟是邪佞之徒不喜惇為門下侍郎日嘗進蹇序辰為司諫王桓為正言陛下試問二人聞望行實孰與今所除數人二人者公議所不許惇乃以為是今三數人者公議所許惇乃以為非臣不知惇以何心事陛下為臣不忠莫大於此素無人望天下共知臣不復道惟嫉其今日居大位不思砥礪以報萬分而驕肆輕揚日甚一日為市井小人之態以汙王朝耳又奏曰人皆言輔弼之任儀型四海非惇薄德所宜處四夷來庭聞輔臣如此恐有輕中國意臣之所言乃不為惇正為朝廷惜上曰深如卿言監察御史孫升言升三章並據升集臣竊觀先王極治之時賢者在位能者在職故詩曰任賢使能周室中興焉則知大任髙位非賢有德者不可以居而材能敏給之人惟可以使之在職而已故賢者獨所以命君子而能者間有以容小人君子在位則小人可驅而為善小人當國則賢者不得其職而天下之所以亂也唐李林甫楊炎盧把輩非無材也適所以資其為惡以王安石履君子之操談先王之言先朝委國而聽之然安石天資彊愎棄衆自用趨近利無逺識非宰相之器憤賢人君子不為己用於是拔小人之材者布於朝廷既蔽主明且誤國事吕惠卿章惇二人小人之材而尤黠者也惠卿自小官三年拔為執政安石之德不為淺矣一旦見利忘義與安石為死仇推是以觀之則其事君之節可知矣賴先朝明聖察知其奸竟不復用不然善人君子今無噍類矣章惇材不逮惠卿而姦惡過之二人之所謂材足以文其姦資其惡罔上殘民偷合茍容而已臣竊恐人或以惇為材進說以誤聖聽故陛下遲疑而不决去也惇前時之議保甲今日之論免役其懷邪不公伏心隱情陛下聰明聖智洞照姦慝固不待臣復言矣臣竊聞惇每議論簾前詞氣悖厲虧事君之禮有慢上之心中外傳聞莫不憤駭且堂陛之勢不可頃刻不分履霜之漸不可一日不戒此惇之罪尤不可貸者也伏望聖慈早賜裁决以清朝政以慰人心則天下幸甚升此章與三月末論張璪文字並行但此無璪姓名及事迹當考又言臣近覩二月六日三省樞密院同奉聖㫖施行司馬光論奏復差役法劄子臣誠愚暗竊疑朝廷别無委曲處分緣光所論止是大綱其間曲折事目不一兹事體大竊恐諸路使者猶懷毒孽推行失宜别致異論或行其失欲致煩言此不可不察也尋具奏陳訖臣比聞知樞密院事章惇果有所論暴衒已長言雖近公意則非正何則惇居左右輔弼之任乃同心一體之人非如侍從臺諫待見命令方可論說惇既與三省同共進呈上件劄子見光所論其間未盡委曲便合即時開陳條目作朝廷處分施行乃是大臣之事豈待命令已行於天下方為異論則惇之所存非出至公意在詆訐正人而已夫免役之為害於天下無愚智皆知之司馬光之意不為己私雖閭巷小人皆知之而惇為陛下股肱心膂之臣粗有知識非不能分别白黑獨不知免役之為害光之不為私而猶德有二三心懷彼我乎蓋惇素無德行本挾險邪進身不以義事君不以道以偷合茍容持祿養交為事其心以謂正人志行則邪黨退君子道長則小人消夙夜揣摩謀為固位之計乃出於此也惇為士人時不檢無行天下所共知其為小官茍恱王安石以進身則賂遺及於王安石之妻母而主於安石之妻弟吳頥頤負安石之勢浪跡都城狎習非類士人指為汙辱惇乃以先生處之惇之辱已無耻豈徒主癰疽瘠環而已及其開拓夷獠率多誕謾參二大政出入纍年無所建明専事容悅交通宋用臣受其贈遺其甥黃實私坐輒除監司惇之為私臣之所知非一二也伏惟陛下登崇俊良委用耆德開大公至正之路永萬世無窮之休惇於此時猥被顧託叨秉樞衡心懷二三德匪純一陪列正人何異冰炭臣竊觀古先哲王立大事成大功未有左右輔弼之臣心懷不同而克濟者也故伊尹曰咸有一德克享天心髙宗命傅說曰惟暨乃僚罔不同心武王曰豫有亂臣十人同心同德又曰乃一德一心立定厥功惟克永世則惇之德匪純一不足以副具瞻心懷二三不足以持大政伏望聖慈特出睿斷罷惇機要之任以慰中外之心則天下幸甚又言臣近曽奏論知樞密院章惇德匪純一不足以副具瞻心懷二三不足以持大政伏望特出睿斷罷惇機要之任以慰中外之心未䝉指揮臣竊以謂人主之所尊用左右輔弼恩禮優異度越羣臣豈徒使之持祿保位阿意順㫖而已固欲協心同力正論廟堂任社稷安危之計圖生民休戚之事耳惇自參大政惟務從諛及秉樞衡徒懷彼我諸路保甲殘虐已深患害將起天聽既聞正論隨發而惇猶閉塞沮抑専為異說論議之際悖厲不恭雖聖度涵容賴睿斷不惑卒從廢罷纍月已來人心帖然流移歸業復守田桑道路歡呼室家相慶上下共知迹非可掩此乃前日橫議不公之明驗也惇既同三省進呈復行祖宗差役舊法劄子司馬光之所論乃是大綱其間曲折條目茍或未盡自合條析上聞作朝廷處分一就施行乃是事君之義方稱大臣之職書曰爾有嘉謀嘉猷則入告爾后於內爾乃順之於外曰斯謀斯猷惟我后之德豈待朝廷之命已行於天下方為異論暴衒已長則惇懷邪不公上無歸美人君之意內挾詆訐正人之心又如前日保甲之議矣豈有心懷二三德匪純一而可任股肱心膂之臣者乎伏望陛下推至誠之意揚先帝之休拔擢正人尊用耆德將欲為天下之盛福躋生民於仁夀而惇懷邪異議眩惑中外與正人之共政類冰炭之難同伏望聖慈特賜檢㑹臣前奏早降指揮
