body:
  text: 續資治通鑑長編卷二百六十九宋李燾撰神宗熙寧八年冬十月己丑朔命龍圖閣直學士樞密都承㫖曽孝寬往河東分畫地界所計議公事時李評言義興冶和爾郭舒克恱大石四寨堡鋪分界與韓縝所上畫圖不同故遣孝寬往審問孝寬請差官案視改正而歸仍詔孝寬有申陳事具奏從入內內侍省進入及孝寬以圖籍案視而並邊未嘗侵北境乃奏曰國家所以待狄人者恩與信也恩不可縱信不可失茍細事不較則將有大於此者矣宜如故便此據孝寬𫝊𫝊又云寇卒聽命今不取不知所聽何命也十一月二十八日又令二府共議分畫而十二月六日已聽韓縝等歸竟不知此四寨堡鋪孰同孰異大抵國史載分畫事殊不了當别考詳七月十六日二十八日十一月二十八日並合參考太子中允直集賢院崇政殿說書吕升卿權發遣江南西路轉運副使升卿初為御史所攻王安石雖數為解釋然其實不樂升卿升卿復於上前訐安石之短上既决意罷惠卿政事故先出升卿升卿於上前訐安石之短據司馬記聞升卿七月二十三日罷國子十二月三日責蔡承禧言臣自五月中纍具劄子言吕升卿恣橫不法處事乖謬憑籍勢要朋黨立私三四月間才罷國子監一差遣而使之修一司一務𠡠又使之知禮院又謬進經義以冒恩賞職名今訪聞又以升卿為江南西路轉運副使無狀如此言之未已翻有進升職司之任吏民之命茍容非才則一方受弊况南方今嵗災旱米直翔踴逺民尤欲更事之官以宣上意綏撫今此輕授中書顯相顔面依違共蔽姦惡不行臣言欲乞追寢成命褫去職名别與行遣又言朝廷比置權發遣之名蓋以本資序未有人才遂於小官拔擢有才之人以居此任今升卿自縣尉為京東察訪則作役法不能成就為淮東運判不久則冒法過潤州葬妻為崇政說書則經藝不勝其謬第能任險愎以害人作姦言以罔上臣兼訪聞升卿所言至於庸常人之所不為或云見僧人言我父未出惡道遂斂錢作大㑹臣度其本實無此蓋已斂衆人之財恐其事露遂作為此言以冀哀於時或云我之所言不誣有母六十嵗足以為呪臣度其本亦非然蓋隂中良善而欲為此語以取信於衆為欺天罔上之語言有毁父呪母之罪惡此市井無知之不忍而升卿優為之臣今考其資序乃初任知縣若與之一邑必非愛人奉法之吏今若付之一路殊非為官擇人之意又况所言如此伏乞屏歸田里以究風教承禧兩章附此十二月三日升卿乃以轉運判官責監酒稅豈朝廷從承禧言先改升卿副使為判官乎當考司農寺言開封府祥符縣賒貸粳米不如法詔元給并當任失催官並衝替劾罪以聞詔以青唐蕃部并蕃兵𨽻岷州從洮東安撫司請也賜河東分畫地界所役兵特支錢有差庚寅開封府推官度支郎中毛維瞻提舉洞霄宫維瞻上殿劄子誤用字及不如式也詔濮安懿王第三女長樂郡主自改封日增請給舊制宗室女適人遷至郡縣主兩經大禮乃增給此以特恩也又詔河北馬軍闕馬其令射弓及一石者先給馬不及一石令改習弩或槍刃賜權知開封府界司録朱炎錢百千以相度免行錢特賞之先是御史蔡承禧奏臣纍言參知政事吕惠卿姦邪不法威福賞刑天下共憤頃在延和面陳其事以為不可置之左右尋䝉𠡠差監試臣以措置試院若少不經心恐有敗事不暇外慮今考試始畢遂得奏陳臣聞參宰之任職於輔弼人主以道揆天下萬事得其理則國家安而賢者進即為至道之朝萬事失其序則朝廷危而不肖進即為非道之世况朝有作福作威玩法之臣者乎况陛下之超然逺覽髙視此理不待臣言而後明也然臣之區區職在於辨邪正審賢不肖姦臣在朝臣安得燕燕朝夕之間而不為天下言乎臣請陳惠卿姦狀之尤著者臣前論升卿疏中備言惠卿之惡頃杭州監稅劉載作司農丞升卿使京東載嘗簽其役法之不善者而載往京東體量災傷以承例用關子散饑貧斛㪷自是州縣不奉其法止約百姓却以不合散關子罪載自密院檢詳官謫之監稅又司農勾當公事時孝孫孫鼇抃皆指京東役法之不善託以司農貟冗減二貟勾當公事遂斥孝孫鼇抃後來不久惠卿復增置司農勾當公事貟額當其減貟乃惠卿力行私忿及其增也又何謂哉此惠卿之罔上反覆顛倒任意自專也三司雜納庫自祖宗以來創置本無不善惠卿以王白充檢正官其父頥監此庫不樂其職請求惠卿遂以頥知管城畿縣而廢此一庫後來朝廷以雜納無之不可遂再行創置其王頥敗壞管城一邑之事彊橫恣縱上所知也夫為一人而即以官局擅廢更置此惠卿之弄權自恣也訪聞惠卿妻弟方希覺初實未有考第選人囑請湖南察訪章惇辟為勾當公事是時邵州進士李鋭深入溪洞招到蠻酋田元猛章惇意在諂附成就希覺恩澤遂以李鋭招元猛之功為方希覺之功而轉奉禮郎其李鋭幾不霑賞比及鋭日夕稱訴懼此事發覺力相蔽護始以鋭為一簿尉此惠卿之朋比竊弄國賞也惠卿之舅監簿鄭膺始寄居秀州華亭縣以惠卿之故一路監司如王庭老之輩皆卑下之而招弄權勢不復可數至奪鹽亭户百姓之地以為田而提刑盧秉挫其所為仍發覺惠卿黨人張若濟姦贓公事遂急移秉淮東以張靚充兩浙路轉運靚遂隂求秉罪無有即將秉所行鹽法虧壞欲成其過而大失遞年課額惠卿既喜靚即以妹妻其弟規此惠卿之朋比專權壞失國家利源也朱溫其為大理少卿惠卿之妻弟方希益充詳斷失入死罪乃倚勢妄稱溫其指揮以脫已罪又以惠卿之勢逮引同官以為證其斷官李昭逺與惠卿鄉人惠卿與溫卿升卿同坐與食以語罵昭逺富貴爵祿盡由我家你却不證方希益昭逺稱無此不敢虛引自後不復與見日求其過此惠卿欺國蔽親鬻權也朱溫其殊無纖過又諷府司録朱炎令勘入朱溫其之罪無得遂更不分首從各罰銅十斤放而隂除方希益衝替之罪此惠卿侮文罔上壞陛下憲法也太學考諸州教授方通乃其妻親詞藝平常惠卿不復計其可否即令升卿勢脅李定之輩考為上等以誤朝廷與之教授此惠卿之自專以崇親黨也朝廷已定之法多所改更不循義理惟循已之一時喜怒如怒鄧綰即令張琥同提舉臺官又令一司一務𠡠於外州定奪聞奏之類皆不可以詰計此惠卿之專已自用不顧朝廷也弟和卿都無善狀才為陽曲尉即諷章惇舉為軍器監丞其舉辭云風力精彊所至必治罔上如此又遷京官夫軍器監丞既為要任當亦選其人而乃以小子妄厠其間衆官擘畫有可取者則欺罔以為已出至於措置乖方則歸之衆人衆皆畏禍不敢與之較此惠卿之挾邪私親也惠卿丁憂之日於兩浙威使州縣語其親黨言其將為宰相與知華亭縣張若濟曲相附㑹脅借民財其數不少以置田畝鄧綰既言其姦贓朝廷已差官體量則惠卿自是罪人當闔門待罪訪聞乃乞勘御史中丞又自乞令以事屬張諤徐禧此惠卿之彊橫無上也身為都檢正受張若濟請求訪聞遂將張若濟枉法重罪論勘斷官吏一切出除止奪三官編管此又惠卿之竊弄威權出入刑名以壞陛下之法也惠卿身為大臣固當守公以奉陛下之法其弟諒卿以無考第請監金耀門不度法之可否威使流內銓供腳色以為於條可得即出𠡠以授既而王安石㸃檢遂作諒卿自陳連纍流內銓官吏上簿惠卿安然無愧此又見惠卿之怙彊自恣以私其親也惠卿之父死於懷州條制大卿監死無依倚者乃得恩澤惠卿令其家陳請異姓越在法制之外此惠卿之貪以害法也朝廷提倉之官所繫不輕一路承禀按察與監司無異當用天下有吏幹之人惠卿不以私故則以私親妻弟方沃庸謬嘗往河北㸃檢軍器郡守有陳其不善者此衆所聞而陛下之所知也乃以為河北提舉又令沃弟方澤為江西提舉惠卿曽判司農豈不知江西役法已成别無可更為其惡江西轉運李之純蘇澥曽陳簿法不便意欲移去却令妻黨作監司捃托其罪又如張靚之比欲壞陛下成法以成就其親且方澤仍是違礙選人自條例司薦為提舉乃一二年此惠卿之欺國家私親黨也曽旻小子能事惠卿之家兵卒孩稚能諂媚惠卿遂薦為侍從陛下之明以為不可矣又特薦之今為常平提舉此又惠卿之不顧義理姑欲以陛下差遣立私恩以快已一日之志也陛下令撰經義惠卿豈不知其弟升卿之不才不可以當此茍欲其弟夤緣以得美官即令撰進其文之紕繆不可以言臣有别疏論列此惠卿之欺陛下而以爵祿私其弟也臣既言之而惠卿百端排毁作為巧言以罔聖聽此又惠卿兄弟不顧義理之至甚也身為大臣當秉身就義使天下莫得以言既恣睢不軌以致言事者上言而詬誶亡節則必躬携文字詐為涕泣懇陳不可謬為恐懼以欺上聰退則張目大言當拔擢某人當削除某人以威天下此又惠卿言動之間必欺陛下也王韶本與惠卿同年登科不為惠卿便佞而夙負學行又以功業為陛下擢為執政拜命之日往惠卿之家乃問其挽彊幾何射之能否意以兵卒待之此惠卿之恣縱凌忽同列也惠卿作兩浙水利攻郟亶之法僞為溫卿之名投進又作造簿手實之法為和卿之名投進不度天下之可否姑欲以此欺陛下而進其子弟此惠卿之姦邪欺蔽也頃者沈括自兩浙察訪回其所措置少異其說則惠卿沮難誣毁力欲黜除賴陛下之聖明辨直而令括又為兩浙察訪恐發其在兩浙姦賄之狀遂嚴為飲食之㑹曲加喣喣以結其歡為括所嗤笑士人莫不知之此惠卿之姦邪翻覆也惠卿之所為有滔天之惡而無抑畏之心發口則欺君執筆則玩法秉心則立黨結朋移步則肆姦作僞朝廷之善事使其朋類揚以為已出不善則使其黨與言為上意如章惇李定徐禧之徒皆為死黨曽旻劉涇葉唐懿周常徐伸之徒又為奔走至有避權畏義之士則指為庸為鄙盡忠去邪之人則以為害人害物貪利希附之者則為賢為善更相推譽彼可侍從彼可監司庸鄙便佞繇此以進欲進之則虛增其善欲退之則妄加其惡曰上與吉甫論某事吉甫告上以某事上起身以聽吉甫之某言吉甫惠卿字也至於陛下之前陽為恐畏卑汨如不自勝間或肆詭辨以伺陛下之心或為小亮以取陛下之信退而踸踔奮厲有輕聖德之語又姦惡之大者也臣聞堯舜之明大矣至於未察四凶之象恭靜言則不害其使之居位及知其滔天庸違則不害於流放竄殛魏道武衰季之常主也崔浩有平四方之功一改國史遂行顯戮唐德宗末世之庸主也竇申所至之家目為喜鵲遂賜之死蓋以為國史敢改則他何所不可乎恩命敢以告人而收為已私至目之為喜鵲則其他何所不至乎彼二主者固不足論尚能毅然斷割以保天下况陛下睿謨英達天地之逺乎况惠卿無涓埃之功而惡逾崔浩竇申哉至如經義陛下曽經御覽既出於中有所不善則當明有論列若私自移易則孰有不可改者乎就使其書未進而易他人之說以著已之謬言則萬事之欺蔽可見恩命刑罰皆出人主若夫左右之臣私以相貴而歸德於已竊榮其親布列中外之黨此而可竊其大無不可者矣伏惟陛下睿眷一賜勇斷惠卿家𫝊載承禧言惠卿罷減司農寺幹當官等二十一條惠卿坐罷政又云中書並坐鄧綰及承禧章以勘惠卿然則惠卿罷及勘皆憑承禧章施行不獨用鄧綰言也綰章既不得其全承禧章實録又不略見今全録之承禧上此章當在九月二十六日惠卿自辨析後既不得其實日附惠卿罷政前據家𫝊則惠卿罷政實緣承禧此章不可不載也是日手詔給事中參知政事吕惠卿朕不次拔擢俾預政機而乃不能以公滅私為國司直阿蔽所與屈撓典刑言者交攻深駭朕聽可守本官知陳州辛卯知制誥許將兼權知諫院御史蔡承禧言九月乙亥夜徐禧李定沈季長周諶㑹坐言及奉慈廟是莊惠后廟禧忽對衆言仁宗多有遺行乞下所司劾正其罪詔禧定季長諶具析諶以為如承禧言定季長言略不省記詔開封府究實禧言臣為御史時以事至章懿皇后神御殿昨試進士與承禧李定沈季長周諶㑹坐臣問定章懿所以廟祀之由定因言仁宗每念章懿之不及見至發於夢寐遂以長主降其舅子瑋臣歎曰雖富有天下有所不足者乃如此曷勝遺恨哉而承禧易恨為行遂謂之謗後開封府言諶等分析異同未經參對難推究結絶詔禧虛實證等無可根究雖㑹赦依律擬罪贖銅四十斤乙亥九月十六日都提舉市易司言袁州和買紬絹舊以鹽凖折今乞依諸路例每匹給錢千從本司遣官據合支鹽數以末鹽鈔赴州出賣從之壬辰宣徽北院使中太一宫使張方平為宣徽南院使判應天府方平在朝雖不任職然多所建明嘗論汴河曰臣竊惟今之京師古所謂陳留天下四衝八達之地者也非如函秦天府百二之固洛宅九州之中表裏山河形勝足恃自唐末朱溫受封於梁國而建都至於石晉割幽薊之地以入契丹遂與彊敵共平原之利故五代爭奪其患由乎畿甸無藩籬之限本根無所庇也祖宗受命規模必講不還周漢之舊而梁氏是因豈樂而處之勢有所不獲已者大體利漕運而贍師旅依重師而為國也則是今日之勢國依兵而立兵以食為命食以漕運為本漕運以河渠為主國初浚河渠三道通京城漕運自後定立上供年額汴河斛㪷六百萬石廣濟河六十二萬石惠民河六十萬石廣濟河所運止給大康咸平尉氏等縣軍糧而已惟汴河所運一色粳米相兼小麥此乃太倉畜積之實今仰食於官廪者不惟三軍至於京師士庶以億萬計大半待飽於軍稍之餘故國家於漕事至急至重京大也師衆也大衆所聚故謂之京師有食則京師可立汴河廢則大衆不可聚汴河之於京師乃是建國之本非可與區區溝洫水利同言也近嵗已罷廣濟河而惠民河斛㪷不入太倉大衆之命惟汴河是賴今陳說利害以汴河為議者多矣臣恐議者不已屢作改更不致汴河日失其舊國家大計殊非小事願陛下特回聖鑒深賜省察留神逺慮以固基本又嘗論錢禁曰臣伏以錢者國之重利日用之所急生民衣食之所資有天下者以此制人事之變立萬貨之本故錢者人君之大權御世之神物也竊觀自漢以來名臣髙識者之篤論皆以為禁銅造幣開通塞輕重之術此濟民之切務保邦之盛業也故錢必官自鼓鑄民盜鑄者抵罪至死示不與天下共其利也國家故事諸監所鑄錢悉入於王府嵗出其奇羡給之三司方流布於天下然自太祖平江南江池饒建置爐鼓鑄嵗至百萬緡積百年之所入宜乎貫朽於中藏充足於民間矣乃自比年以來公私上下並苦乏錢百貨不通萬商束手又緣青苗助役之法農民皆變轉穀帛輸納見錢錢既難得穀帛益賤人情窘迫謂之錢荒府庫例皆空虛人户又無居積不知嵗所鑄錢今將安在此事實繫安危之體宜明利害之源夫鑄錢禁銅之法舊矣纍朝所行令𠡠具載錢出中國界及一貫文罪處死而又重立賞格使人告捕至於居停資給擔擎人等與夫官吏之失於檢察者各等第坐罪又禁銅之法犯至九斤已得刺配之罪亦設告賞之科而自熙寧七年頒行新敕刪去舊條削除錢禁以此邊關重車而出海舶飽載而回聞緣邊州軍錢出外界但每貫收稅錢而已諸􅔓舶舊制惟廣州杭州明州市舶司為買納之處往還搜檢條制甚嚴不得取便至他州也今日廣南福建兩浙山東恣其所往所在官司公為隱庇諸係禁物私行買賣莫不載錢而去錢本中國寶貨今乃與外國共用又自廢罷銅禁民間銷毁無復可辨銷鎔十錢得精銅一兩造作器物獲利五倍如此則逐州置爐每爐增課是猶畎澮之益而供尾閭之泄也大為之防民猶踰焉若又廢之將何憚矣蓋自弛禁數年之內中國之錢日以耗散更積嵗月外則盡入逺邊內則恣為銷毁壞法亂紀傷財害民其極不可勝言矣臣見公私上下並苦乏錢深求其由僅有一得因畨閲前後令敕誠見條例之未便今具録敕文進之衡石伏願陛下申明舊章急救其弊立華戎內外之限通下民衣食之原重惟古先聖人之立制重內以馭外今乃傾中國之利撓君權竭民用以資外國又弛銅禁通商販越邊陲無復紀極所謂假寇兵也既資之財又假之兵以濟其猾逆之心暴害之力桀黠之徒有以窺國家御邊之無算樞機之不密安得不啓其侵侮之謀者哉不知議法者之意據何義理舉纍朝經逺長慮所以保國便民之典一旦削而除之此國之大事惟陛下聖明察納早垂神斷既數請便郡上曰卿在朝豈有所好惡者歟何欲去之速也方平曰臣平生未嘗與人交惡但欲歸老耳上知不可留乃有是命謂方平曰朕初欲卿與韓絳共事而卿論政不同又欲除卿樞密使而卿論兵復異卿受先帝末命卒無以副朕意乎因泫然泣下蘇軾志方平墓云有星孛於軫方平上疏論所以致變之故人皆為恐栗求去愈力乃除應天按星變實初九日方平除應天蓋初四日既除應天後方有星變也今不取又恐論錢禁亦在到南京後緣劉摯集有代方平論此乃在論賣廟事後也方平集論錢禁别有疏不用摯所作賣廟事則純用摯疏云賜秦鳳等路轉運司銀十五萬兩市熙河糧草提㸃成都府路刑獄張諷言近制兩浙水利縣委提舉司舉官或聞所舉多不應令致闕正官乞委銓院選差詔中書選差樞密院上河北將官敕詔行之癸巳詔給韓琦本品鹵簿送葬琦子忠彥初辭葬日給鹵簿許之將葬乃復自請也大名府路安撫使文彥博言盜入博州博平鎮酒稅務取兵仗棄井中驅監官出城役兵王友黎節入井收兵仗率衆追捕乞加賞詔人賜絹十五匹祠部郎中趙鼎言京東自夏秋旱蝗相仍民被災流徙者十六七雖檢放租稅而一縣通較類不及五分蓋恐礙倚閣青苗本意乞令本路體量蠲稅詔司農寺根究依法施行鼎宗道子恐已見趙彥若志鼎墓即言濮事者恐此别一人言濮事者非宗道子宗道子别見元豐元年八月一日權御史中丞鄧綰言續體訪得吕惠卿貪濁事迹乞下根究官體量詔送根究公事所朱本削此假今復存之甲午右武衛大將軍資州刺史仲滂為榮州團練使瀛州刺史仲當為德州團練使右千牛衛將軍仲暹為監門衛大將軍以學士院試論及經義中格也都大提舉淤田司言諸牧地乞從本司淤溉除留牧馬外募人增課承佃以給羣牧司嵗費餘錢封樁買馬從之乙未詔都水監相度開展惠民河利害以聞以宋用臣與巡護惠民河官乞開展河道以便修城也是日十月七日乙未彗出軫舊說於丁酉日乃書太史奏彗出軫今從新記實録亦系之丁酉蓋因太史奏乃書耳按天文志八年十月乙未東南方軫宿度中有星色青白如填星大丙申西北生光芒長三尺斜指軫宿若彗星丁酉光芒長五尺戊戌長七尺斜指太轄主兵喪丁未入濁不見軫楚分也本志書彗委曲若有所諱與三朝兩朝史不同可見史官之諛不可不改修云云丙申知潁州龍圖閣直學士孫永權判北京留司御史臺以母病自請也詔罷給在京官賃宅錢丁酉太常少卿賈昌衡為右諫議大夫太子中允吳安特轉一官升一任及金部員外郎吕嘉問各賜錢三百緡以三司言昌衡等提舉市易司自去年四月至今收息錢市例錢百萬二千六百七十餘緡故賞之詔檢正中書五房公事張諤同提舉市易司官根究比較鹽鈔交子利害申中書取㫖吕惠卿家傳云當考是日九日丁酉太史初以彗聞彗出以七日乙未越二日丁酉太史乃奏也戊戌手詔王安石等曰朕以寡薄猥承先帝末命獲奉宗廟顧德弗類不足仰當天心比年以來災異數見山崩地震旱暵相仍今彗出東方變尤大者內惟淺昧敢不懼焉其自今月己亥不御前殿減常膳如故事卿等宜率在廷之臣直言朕躬過失改修政事之未協於民者以聞遂詔中外臣僚直言朝政闕失王安石言臣等伏觀晉武帝五年彗實出軫十年軫又出孛而其在位二十八年與乙巳占所期不合蓋天道逺先王雖有官占而所信者人事而已天文之變無窮人事之變無已上下傅㑹或逺或近豈無偶合此其所以不足信也周公召公豈欺成王哉其言中宗所以享國日久則曰嚴恭寅畏天命自度治民不敢荒寧其言夏商所以多歷年則亦曰德而已裨竈言火而驗及欲禳之國僑不聽則曰不用吾言鄭又將火僑終不聽鄭亦不火有如裨竈未免妄誕况今星工豈足道哉所𫝊占書又世所禁謄寫訛誤尤不可知伏惟陛下盛德至善非特賢於中宗周召所言則既閲而盡之矣豈須愚瞽復有所陳然竊聞兩宫以此為憂臣等所以倣徨不能自己伏望陛下以臣等所陳開慰太皇太后皇太后臣等無任兢惶懇激之至安石劄子據陸佃所編增入劄子稱十月而無其日庚子右正言知制誥直學士院權三司使章惇知湖州先是御史中丞鄧綰言臣伏見陛下近日斷然罷黜吕惠卿令按治其罪詔命一出上自朝廷之卿士下至閭巷之庶民莫不鼓舞歡欣稱頌聖德雖四海之外萬世之下孰不仰陛下威斷之明臣以謂惠卿執政逾年所立朋黨不一然與惠卿同惡相濟無如章惇臣職在糾彈曽論奏惇佻薄險輕行迹醜穢趣向姦邪亦略條惇狥私作過欺君罔上不忠之罪又復言惇父年八十不肯歸養隳傷教義不孝之惡且陛下官爵而惠卿與惇擅以相私只如惇才差往辰州即舉惠卿妻弟方希覺往軍前妄冒功賞惠卿才管軍器監即舉惇妻弟供奉官張赴在本監勾當公事及惇入三司即商量廢罷二省判特置三主簿內一貟方希益乃惠卿妻之親弟一貟陳朴乃升卿妻之親兄又商量欲擢用和卿則先薦王安石為例和卿之庸懦如此而惇奏風力精彊和卿初作尉二年而惇奏稱所至必治大抵欺謾君父愚弄朝廷其於財利則止有內庫司農寺借錢其於職事則長是中書刑房上簿入省則終日諧䙝未嘗請副使判官過㕔出省則諸處奔馳惟務尋內臣富室酣飲臣前奏內言惇於熙寧七年十月內兩次有劄子面奏稱鹽鈔四年折却八百萬乞借內庫錢五百萬計盡一年可以積剩得三四百萬錢帛而今年却借司農寺錢三十萬支料錢則見惇去嵗所言是欺妄又言惇在省不禀朝㫖専權給與李陟陳敦夫等添給及姪章鉞盜官錢帛惇蔽蓋百餘日並不舉覺及惇已移三司越職違法舉吕和卿為監丞等事皆合改正而至今未䝉施行緣惇人行汚辱朝廷與吕惠卿協力為姦欺罔不一今惠卿雖已黜逐而尚留惇在朝廷亦猶療病四體而止治其一邊糞除一堂而尚存穢汚之半也伏以陛下不世出之英主焦勞求治既已纍年法度雖備而朝廷未至尊榮政化甚孚而風俗未至淳厚良以在朝侍從要近之臣或非其人故也今正當除去穢慝以尊榮朝廷懲汰憸邪而惇厚風俗豈可尚使善惡相與雜處於朝廷夫朝廷者天下本源未有不清其源而能潔其流者語云正朝廷以正百官正百官以正萬民朝廷正於上則陛下之所欲為不勞而成聖德日隆矣於是罷惇三司使以本官出守上嘗對惇稱張方平之美問惇識否惇退以告吕惠卿惠卿明日與方平同行入朝告以上語且曰行當大用矣方平縮鼻不對其夕方平適與客坐惇呵引及門謁入方平使謝曰素不相識不敢受謁惇慙怍而退故蔡承禧劾惇有云朝登陛下之門暮入惠卿之室蓋指此事也上由是惡惇而王安石尤忌方平方平既出惇亦隨責此據司馬記聞淮南兩浙體量安撫使起居舍人知制誥沈括權發遣三司使括行至鍾離召還行至鍾離據括自志太子中允直舍人院檢正中書五房公事同判司農寺張諤為淮南兩浙體量安撫使詔罷下元日朝獻景靈宫以星變避殿故也權御史中丞鄧綰言王庭老張靚朋附吕惠卿黨庇贓吏乞檢㑹臣前奏速罷三人差遣詔睦等候徐禧根究畢取㫖辛丑詔開封府界民缺司農寺所散錢米除官户外實闕乏者與展限一年作兩料輸官又詔廬壽濠常潤揚州江寧府纍經災傷州軍見督民間所逋常平錢物貧不能輸者如開封府界法缺役錢者候嵗豐催理陜西河東甚災傷處凖此又詔江浙淮南災傷州軍除用常平借貸興利外更賜上供米三十萬石賑濟令體量安撫司均給措置又出空名試將作監不理選限𠡠告助教𠡠各十五賜䕫州路轉運司募人入錢米於南川縣等以給邊又詔御史臺根究章惇舉吕惠卿妻弟方希覺赴辰州軍前妄冒功賞事實以聞其後惇言實委李鋭至鵝州招納田元猛希覺等繼差赴蔣晃州相度修寨并就近措置元奏亦以李鋭為最即乞優與推恩希覺等止乞詳酌酬奬而言者誣陷中傷未嘗虛冒也御史臺根究稱招納田元猛功出於李鋭希覺無功於是再下開封府奏以為李鋭親至蠻界希覺實被差出至蔣晃州而已尋詔追希覺等賞降第四等推恩七年正月七日希覺被賞又詔武學上舍生貟曹安國依得解人例赴祕閣再試以武學言安國材略可用故也壬寅大赦新管勾福建路常平等事常州團練推官曽旻罷為潭州州學教授初旻乞朝辭上殿閣門以前此無選人入辭上殿例詔特引對旻因自言願得間官而有是命其實上惡旻交鬭王安石吕惠卿故絀之曽旻小人當與外任上語見六月十七日旻以八月十六日除福建倉司蔡承禧奏議已附見本月日詔司農寺具開封府界諸路役錢見納合用寬剩數畫一以聞詔提舉熙河路買馬司以萬五千匹為額額外所買即估價賣初詔以二萬匹為額候二年取㫖而提舉官李杞以為數多故復有是詔上批付韓縝等今月九日得卿等繳奏北人來牒却改差蕭禧代耶律壽分畫地界事未知遼人之意何在可火急體量奏來所有疆議今後宜更再三思慮應接無見露憚於持久為遼人窺度致浸淫生事卒難了絶此據兩朝誓書册內韓縝等所得御札係十月十四日甲辰詔國子監上舍生顧襄安惇丁執古虞蕡葉唐稷如不得解與免解已得解免禮部試襄開封惇廣安執古泗州蕡常州唐稷南劎州人也葉在後舉方了免解必有因依當考必緣在經義局七月十一日初議免解又九月二十六日吕惠卿云云可考襄已見九月二十六日上批將下兵士旗無定數枉費物帛其令諸將據隊數每隊依數用一色三口乙巳王安石等以上避正殿減常膳上表待罪詔答不允仍斷來章遣大理評事都提舉市易司勾當公事孫逈㸃檢熙河路市易司及同本路當職官相度但干財利合措置事以聞兵部言秦隴成州義勇不多應援熙河路闕數乞以第四等以上兩丁并第五等三丁保丁內兼充數從之詔衛州黎陽監嵗增鑄折二銅錢五萬緡仍益以役兵百人丙午三司請自今廣南東路除留買銅鉛錫上供內藏庫錢外更於所鑄錢發折二錢十萬緡赴內藏庫從之熙河路經略司言裕勒藏喀木弟諾爾者報探西賊集兵抄略並邊熟户丁家等族焚族帳殺人口得實詔被殺者人給絹二匹付其家仍給修造錢有差諾爾令髙遵裕密優賜之丁未潁州進士常立為天平軍節度推官崇文院校書立秩之子熙寧初御史知雜謝景溫嘗薦其行義召赴闕以疾不赴至是特録之是夕十月十九日丁未彗不見自始出至沒十二日實録於此書云彗不見初乙未冇星出軫至丙申長三尺丁酉長五尺太史乃以彗聞戊戍長七尺斜指太轄至是而沒己酉王安石等上表乞御正殿復常膳不許表三上乃許之詔在京遞馬頭子並樞密院給之以都水將作監遣屬官出外或擅給故也庚戌詔中書有置局取索文字煩擾官司無補事實者宜並罷之於是編修中書條例司編修司農寺條例司皆罷又詔雄武軍節度推官時孝孫落衝替以御史中丞鄧綰言孝孫昨任司農寺勾當公事㸃檢河北西路常平事以擅牒監司檢括人户所蓄斛斗得罪衝替原其用心本以為民謂可矜貸中書奉詔取案看詳而孝孫移牒監司乃在不得差官檢括監糴指揮之前實無深罪故也孝孫安陸人曽肇墓志當附初責時辛亥詔河東路永利兩監鹽自今官自計置依商人和雇車乘輦赴本路州縣鎮鬻之禁人私販犯者并告捕賞罰論如私鹽法並邊糧草以見錢糴買仍出見錢鈔十萬緡給其費收賣鹽錢償之先是章惇權三司使建議下河東轉運司相度可否至是以為可行也詔聞通泰州漕河不通自春至今留滯鹽綱四百餘舟其令江淮等路發運司未得疏泄陳公塘水委侯叔獻相度引注溝河通行鹽綱又詔西京河清阜財監嵗增鑄錢十萬緡為市易務本錢從提㸃鑄錢昌武請也編修內諸司𠡠式向宗儒言面奉德音所修文字干賞格刑名為𠡠指揮約束為令人物名數行遣期限之類為式今具草編成𠡠式令各一事詔沈括兼編修內諸司式仍罷詳定一司𠡠前右司諫直集賢院孫覺知潤州初覺知廬州喪祖母以嫡孫解官持服而覺有叔父在有司以新令嫡子死無衆子然後嫡孫承重覺不當為祖母解官故有是命而覺已去廬州亦不赴潤州也詔聞東南推行手實簿法公私煩擾其速令權罷聽㫖委司農寺再詳定以聞吕惠卿參知政事始創立手實簿法事在七年七月十九日並二十七日御史中丞鄧綰言創立簿法之意欲别有所用則臣固不能知若欲以均平役錢則臣請言其大略昨者朝廷免役率錢之法初且用丁産户籍故諸路患其未均相繼奏陳各請重造多已改造矣其均錢之法田頃可用者視田頃稅數可用者視稅數已約家業貫伯者視家業貫伯或隨所下種石或附所收租課法雖不同大約已定而民樂輸矣安用立異造僞剔抉搜索互相糾告不安其生耶役法已定而復搖之民心已安而方騷之天下之民才免差役之殃而復有簿法之害甚可哀也夫田野山谷之氓止知蠶而衣耕而食生梗畏怯有自少至老足不履市門目不識官府者有生平不敢自出輸稅而倍價募人代之輸者其於文字目不能識手不能書豈能曉有司簿法之巧說吏文之煩言榜式狀之委曲苛細耶臣竊見簿法隱落稅産物力及供地色等第居宅房錢不實者並許告訐支賞臣伏以三代牧民能均其力分田制祿皆上所養自上失其道而貧富不一富者所以奉公上而不匱蓋常資之於貧貧者所以無産業而能生蓋皆資之於富稼穡耕鋤以有易無貿易其有餘補救其不足朝求夕索春貸秋償貧富相資以養生送死民之常也今立法使民凡所以養生之物有餘者不敢停塌租賃不足者不敢蕃息營利匱急者無所告求舉貸則貧富皆失其所以為生矣何也本法所謂田土所出或服食器用船車碾磑等物牛羊驢騾之類凡所以養生之具民日用而家有之今欲盡數供析出錢則本用供家不専於租賃營利欲指為供家之物則有時餘羡不免貿易與人則家家有告訐之憂人人有隱落之罪無所措手足矣夫行商坐賈通貨殖財四民之一心也其有無交易不過服食器用粟米財畜絲麻布帛之類或春有之而夏已折閲之或秋居之而冬已散亡之則公家簿書如何拘轄隱落之罪安得而不犯徒使嚚訟者趨賞報怨而公相告訐畏怯者守死忍餓而不敢為生其為法未善可知矣惠卿貶既兩旬乃降是詔鄧綰此奏不得其時朱史繫之十月二十三日辛亥今因之食貨志載綰奏尤詳今用之墨史但載詔語於綰奏略不書當考據此詔則手實但行於東南吕惠卿志和卿墓乃云諸路賴手實以造簿者十八九蓋飾說也當考惠卿墓志見七年七月十九日惠卿建議見七年七月二十九日蔡承禧云云見十二月十五日又詔聞泗州通判陸琮曽詣提㸃刑獄朝端彥首鹽事司張靚配賣鹽端彥不受理令根究公事所考實以聞廣南西路經略安撫使劉彜乞支扈州封樁錢四萬緡糴軍糧從之權發遣河東轉運使范子竒言近年非次朝㫖差官時暫勾當於俸給外增驛券舉天下言之費耗不少乞自今已有本任俸給者罷給驛券從之十一月十八日可考復置雜賣場初三司請廢雜賣場中書户房以為不便下三司而三司議與前異乃復置詔三司官上簿三月十四日廢中書請出錢二百萬緡散在江淮等七路遇榖賤糴充年計外遇價貴亦許量減價糶從之許借留內藏庫上供錢物及發運司蕃息錢總二百萬緡分五年撥還癸丑詔罷兩浙轉運使王庭老張靚令於潤州聽㫖先是太子中允邵竒知華亭縣訴張若濟興修涇河功利不實冒恩賞及受鄭膺私請彊奪民田等三十餘事庭老靚却不受於是司農寺主簿王古體量兩浙路災傷劾奏庭老靚不公失職故罷之仍委古究治十年正月二十七日庭老先責軍器監言造將下鞍轡五千副乞下河東等路采買生曲材造鞍橋上批今材自己堅牢堪用不須枉費財物可罷采買兵部言河北河東保甲教閲乞自今年十一月起至來年二月罷從之甲寅賜嘉王頵長子名曰孝哲為右驍衛將軍詔今月壬寅赦前合叙用人依該非次赦恩與叙京朝官大小使臣非因贓降監當者後無贓私罪到任及二年牽復差遣貶謫官未量移者與量移使臣未得與差遣者聽於所屬投狀軍貟犯罪降配委所屬具元犯以聞軍貟送軍頭司未得與差遣者後無過犯却與差遣應降配充殿侍及配衙前并刺面不刺面配本城牢城編管羈管人等在京委所屬官司諸路委轉運使副使判官提㸃刑獄以分定州軍近經南郊赦未該停放人並減三年理為簡放年限南郊赦後至今月壬寅赦前編配人量元犯輕重簡放命官使臣令刑部以經南郊人各具已經赦數并壬寅赦與理一赦申中書樞密院移放衝替命官係事重者減作稍重稍重者減作輕輕者與差遣使臣比類施行都水監請權閉汴口修鋸牙木岸從之仍比常年閉口展半月乙卯降授彰化留後知大宗正事宗旦復崇信軍節度使霸州團練使同知大宗正事宗惠復欣州防禦使手詔宗旦宗惠以失察趙世居事奪官已幾半年又經特赦本因詿誤理有可矜皇家尊屬叙復宜異庶官故有是命詔溪峒與內地不同若有自死牛聽收皮角䈥置器甲它蠻凖此丙辰詔都提舉市易司勾當公事孫逈勘㑹熙河路嵗市芻糧及雜支錢實數本路嵗入幾何不足當如何計畫及有無可減冗費以聞究竟如何又詔江南西路轉運副使李之純根究許彥先傅燮互訟事以聞七月三日先委喬執中廣南西路經略司言蠻賊冦古萬寨詔劉彜詳審處置戒巡檢使臣嚴守備無輕出戰九月十五日十一月十一日丁巳右諫議大夫知亳州馮京知河南府復翰林侍讀學士兼龍圖閣學士韓維為端明殿學士龍圖閣直學士孫永為樞密直學士工部郎中集賢院學士李大臨為天章閣待制工部郎中集賢院學士蘇頌為祕書監祠部貟外郎劉瑾為史館修撰屯田貟外郎范百祿為金部貟外郎屯田郎中皮公弼為度支郎中大常丞鞠真卿為集賢校理檢校水部貟外郎單州團練副使李師中為右司郎中大理評事監廣州軍資庫唐坰監太和縣酒稅皆以壬寅赦恩也頌與大臨同責大臨既復職而頌獨遷官蓋用事者抑之此據曽肇所為頌墓志增入肇云大臨已復從官今改之用事者抑頌當考著作佐郎王仲修為崇文院校書知禮院仲修圭子也龍圗閣直學士知渭州王廣淵卒贈右諫議大夫遣內侍護其喪歸葬仍令轉運司量與應副御集十一月九日九年四月與二孫恩澤富弼言臣伏念向緣衰疾加之年已及稀不能奔走職事遂求致政伏䝉聖慈俯從愚懇退處衡茅之下杜門自守屏絶私務朝夕待盡而已近日忽聞特宣大赦出於非常又聞别降手詔許中外臣僚直言朝政之闕失洛城士庶歡呼鼓舞喧於道路聲徹幽逺推是而往則天下之人無不慰恱矣臣伏覽赦詔二文始以彗星東出昭示譴告陛下仰觀天變恐懼疚懷濬發德音恩霈寰海臣固知一出聖斷必無左右之助也臣再詳陛下手詔乃陛下親筆非學士所作以至纍年災異如山摧地震旱蝗之類前後包括一一歸咎於已辭㫖哀痛深切明白忠義之士讀之莫不感泣而又避正殿減常膳設齊醮屏御侍前代帝王禳災弭患責躬罪已之法陛下盡行之矣所以上天降鑒知陛下發於至誠故星變不旋踵而滅臣溫衣飽食坐享安佚災禍之至殊無干及一見聖詔驟發即日感動天地譴異消伏速如影響臣尚能踊躍欣蹈不知紀極彼天下之人身被災害家罹荼毒流落破散六親不能相保者其為歡喜感戴當何如也人心既善和氣充塞則天意不得不早回災變不得不遄息此理固然也臣竊知去年久旱陛下曽降手詔許臣僚上封論事人方喜恱日俟朝廷施設而不知何人上纍聖德遽成反汗於是天下大失所望臣近於三月中仰答聖問略曽引及今天變益大詔命益切陛下必不復蹈前車之誤况詔云朝政闕失朕將虛心以改此足見聖意畏天愛民其已至矣然竊聞外議皆云天下弊病甚衆官家多應不知人人咸願條列達於天聽冀幸有所剗革爾矧已大發聖詔許其開陳忠憤者必能不避誅戮傾竭肝膽悉以上聞也臣願陛下盡取羣奏不遺疏賤萬幾之暇一一親閲擇其衆說所合者斷在不惑力賜施行踐虛心以改之辭應天文尤大之變使澤及普率急若置郵則人心恱服天道助順天人相應立致和平國家享無疆之休者正在此時也豈復有災眚出見而上駭聖慮哉萬一姦詐重入宸聽少惑俾夫忠告為妄說恩詔為空文利澤不出於上人心復怨於下則天將曰是以虛辭答我迄無實效必回今日之喜翻為異日之怒災變之作當又甚於數日之彗者矣但以近事證之此乃必然之理非臣輒敢狂率也又言臣未致仕前雖有舊疾筋力粗可驅䇿尚不能從官今致仕已數年衰老益甚退伏草野未嘗與人相接榮辱禍福都不干預而輒敢以狂瞽之說妄陳天聽者實見陛下仰觀星變恐懼修省若不自容也又聞天下生民窮困已甚無所伸訴恐成嘯聚為腹心之患亦慮手詔或致中廢天譴未息則後來别生災害臣所以不顧身之老病而彊作此奏庶幾有所補助而報陛下大恩之萬一也緣臣間居中日與野老相見民間弊病盈塞耳目皆是實事然所說者尚未盡一二伏乞聖慈略賜省覽而少留意焉臣又輒敢煩陛下親閲羣奏者若委臣僚置局必恐不能上體聖意憂勞之切羣奏中利害有所不盡亦恐所委臣僚更存顧望尚或隱蔽或陳巧說妄有沮難則誤聖君畏天愛民不吝改過之意臣固無他腸所憂者如此惟望陛下特賜矜察三月中仰答聖問當考或即蕭禧再來時張方平言臣䝉恩在朝備貟經嵗無施補益每為深愧今被命守藩旦夕出國門適值陛下以垂象之變降御札發德音𠡠宰臣率在廷之臣直言過失改修政事之未協於民者當陛下憂勞之際老臣不為陛下開一言則忠義之語無復至於天聽上負加眷沒有餘責敢以聞見少報重恩臣聞天尊地卑而君臣之分定君君臣臣而後國體正天下安故惟辟作福惟辟作威臣無有作福作威臣而有作福作威其害于而家凶于而國蓋為國之體猶權衡不可使有偏重之勢必成傾覆歷代成敗何不由此自近嵗以來災異之作率由隂侵於陽陛下天縱聰明前言往事無不洞鑒不待臣說也今聖心所以答天戒責躬變禮可謂精誠之至謂天蓋髙其聽則卑故不旋日而星變以隱感通昭答足以明皇天眷佑我有宋之意至矣陛下應之以實固當踐所言今夫政事之未協于民固有之矣大抵新法行已六年事之利害非一二可悉就中役法一事為天下害實深纍經更變竟無長䇿可以定其法議論日以紛擾公私日以勞敝夫人為天地心天地之變人心實為之故和氣不應災害洊作蓋下令如流水之原取其順流之易也經六年而事功莫效顧其事必有未協于民者矣法既未協事資必改若又憚改人將不堪憂患一成噬臍安及陛下承六世之業上有二宫國家大事願陛下憂深而思逺寧忍於人情不可忍於社稷也憂患既成人臣各有去就之分家國之憂獨在聖人其所以終日行不離其輜重謂此也此臣所以為陛下痛心疾首一夕而九興也况今習俗奔競偷敝成風交黨相傾勢利相軋攻訐起於廟堂辨訟興於臺閣非所以昭聖化也毁譽移於好惡賞罰偏於愛憎非所以正王度也士大夫習尚如此有為國家死節仗義臨艱虞而不易操者歟昔堯舜之為君選於衆舉十六官而與臯夔稷契共治天下猶且明四目達四聰而後能協和萬邦雖大聖賢未有一人之心力而可以成天下之務也陛下臨御九年中外臣庶皆在照臨之下其間必有知忠義不二心之臣簡在聖𠂻者矣願陛下召之左右從容訪逮譬之金石叩之則鳴人各有心激之則發吉人之辭寡君子訥於言外若不足其中誠也利口捷給外若有餘其中僞也惟聖鑒精察之若夫導之以言而不能盡者使陳之簡牘必有所效者矣前代明君莫不以是考於下故能廣視聽於扶同之外究得失於幾微之先攬其權綱執其柄鐏慮所以藏身之固思所以置器於安此惟獨决於神斷而後可非所以謀於人者也夫事有失於前者不可不悔患有在於後者不可不懼如救焚溺勢不可緩緩則無及於救矣魚不可脫於淵國之利器不可以假人涓涓可以潰堤熒熒至於燎原釁端厲階不可忽也臣之心惟願國家之善政美事陛下之盛德鴻烈高越百王之上流光萬世之下天之福祥休嘉之象生而咎徴之象不生民之愁嘆怨咨之聲不作而頌聲作使兆民樂事勸功尊君親上欣戴安樂臣退就田里以至瞑目泉下猶知懷此幸願也老臣無狀為陛下慮不敢不精為陛下言不敢不盡亦惟陛下察此至誠俯垂省納實天下幸甚上皆優容之富弼張方平奏疏皆不出此月但不得其日今附見月末吕公著言臣世受國家厚恩陛下涖政之初首被選擢自外藩召入翰林故在左右日口陳手奏數進愚忠頗䝉採納今雖斥處間外其於愛君憂國惓惓之心未曽敢忘伏見陛下祗畏天戒焦勞懇惻實天下幸甚臣聞晏子曰天之有彗以除穢也考之𫝊記皆為除舊布新之象皇天動威固不虛發意者陛下之仁恩德澤猶未布於天下而政令施設所以戾民者衆乎何其譴告之明也陛下既有恐懼修省之言必當有除穢布新之實然後可以應天動民消伏變異伏惟陛下留神幸察臣竊觀陛下自即位以來早朝晏罷勵精庶務其規模蓋宏逺矣固將致堯舜三代之治以光大祖宗之業豈特區區守文之主哉然臨朝願治為日已久在廷之士益乖刺而不和中立敢言者罹讒而放逐阿諛附勢者引類而升進其外則郡縣煩擾民不安業畎畝愁歎上干和氣携老挈幼流離道路官倉軍廪所在闕乏又無以廣賑濟至於骨肉相食轉死於溝壑者多矣上下相䝉左右前後莫敢正言陛下有欲治之心而無致治之實者何哉殆任事之臣負陛下之高志也何以言之夫士之邪正賢不肖蓋素定也今則不然前日舉之以為天下之至賢後日逐之以為天下之極惡前後紛紛玩黷聖聽者蓋不一矣其於人才既反覆而不常則於政事亦乖戾而不審斷可知也陛下獨不察乎况如一二人者方其未進用之前天下固知其姦邪小人也但取其一時附㑹故極力推進此所以終纍陛下則哲之明者也自昔人君委任而責成者蓋有之矣如齊之桓公是也為其勞於求賢而逸於任使也今則不然水旱不時人民困乏則無以分陛下之焦勞敵國桀驁疆場有事則陛下不免於旰食又况加之以天地變異乎未見陛下任人之得也古之為政而初不順於民者亦有之矣鄭之子産是也子産之為政也一年而輿人誦之曰孰殺子産吾其與之三年又誦之曰子産而死誰其嗣之而今陛下垂拱仰成七年於兹矣輿人之誦亦未異於七年之前也陛下雖慮亦及此而終未幡然者殆左右之臣䝉蔽陛下使天下之事不得上聞也臣伏思陛下自即尊位以來上奉兩宫仁孝篤至下逮諸王纍朝貴主無不極於恩禮春秋方富而無聲色之過孝友恭儉發自天性宫中之事人無間言而德澤獨不被於民者何哉臣聞安危在出令治亂在所任故臯陶戒舜曰在知人在安民願陛下以知人安民為先除穢布新以答天戒則轉災為福不旋時而應矣臣昨在朝廷嘗䝉訪逮當時議者謂祖宗制度不可少變朝廷用人必循資級臣固曰不然何則興治補弊者乃人主之先務任賢使能亦不宜專較嵗月但一出於至公則可爾臣今所言亦非謂今日法令皆不可行陛下誠能開廣聰明延納正直公聽並觀盡天下之議事之善者固當存之其未善者則鐫損之茍為非便不為已行而憚改言有可取不以異議而見廢如此則不勞陛下神明不驚衆人耳目而庶事條理百姓安定百姓安定然後可以足兵食禦外侮臣伏自去國六年未嘗有一言仰達聖聰至於私居接人亦未嘗輕議時政今日所以輒進愚悃者誠恐陛下不於此時感悟則後日雖欲改為非有竒謀高䇿亦未易為也陳瓘以公著此疏為熙寧七年所上按公著家𫝊上此疏時乃八年十月星變詔書後公著謂陛下垂拱仰成七年於兹蓋自熙寧二年二月以後王安石始執政也瓘誤從熙寧元年數之故云爾按程頥集公著先令頥代作既而不用别作此
