body:
  text: 續資治通鑑長編卷九十一宋李燾撰真宗天禧二年春正月乙未幸元符觀宴宗室于資善堂己亥尚書右丞兼宗正卿趙安仁為御史中丞兼尚書右丞左右丞兼中丞始此會要以為去年十二月今從百官表詔京城道殣無主者官為埋瘞庚子芝草生真遊殿及皇后所居崇徽殿上作歌詩示宰相詔諫官月俸並給實錢壬寅以河北京東飢詔發廩及漕江淮米十萬斛賑之奉安太宗文集于玉清昭應宫先猷殿御集于繼文殿癸卯龍圖閣待制判大理寺李虛己言凡斷命官使臣犯贓私罪並檢勘舉主竊詳條制蓋以因保任而改官犯贓私則連坐其保舉一任於所任犯罪亦如之其中有初任州縣官使臣內品伎術官等顯無舉奏而例詢舉主俟其報牒方斷文按匪獨符移冗長實且吏曹留滯欲望自今應纍犯經改轉者即問舉主自餘悉罷從之庚戌御史中丞趙安仁言三院御史自今望並給御寶印紙歷録彈奏事又請修國朝六典並從之居數月安仁卒六典不及成卒在五月己卯辛亥幸元符觀資善堂宴從臣及夀春郡王府官屬出御製賜夀春郡王恤黎民等歌元符觀資善堂等記頌并出夀春郡王詩什筆翰示宰相癸丑令大名府官設糜粥濟飢民詔川陜巡檢捕賊軍士無料錢者月給醬菜錢二百乙卯詔京東西河北陜西民之食處官以酒糟給之江德源等言辰州都巡檢使李守元部白丁會諸蠻入白霧團討擊生擒蠻冦十五人斬首百級獲器甲二百招降其酋領黃文千王文象等二百餘人於是守元又與知辰州錢絳知澧州史方等引兵襲下溪州破寨柵斬蠻六十餘人降老幼千餘刺史彭儒猛亡入山林執其子仕漢等赴闕守元繼勳子也乙卯二十一日也是日奏到則其破蠻當在去年矣此月二十七日辛酉又入下溪州閏四月四日始奏到今并書之史方傳下溪州蠻冦辰州殺巡檢王文慶引兵入溪洞討捕降其黨李順同等八百餘人散處安復間隂誅其尤惡者杜忽等十九人即此役也今附見丙辰詔羣臣所舉幕職州縣官改授京朝官與西川知縣者如未有員闕不得差權知縣止令監蒞場務先是命權近邑不過三數月即徙之以其不終考任因循民政吏得欺罔送故迎新頗為騷擾故條約之知青州戚綸請以官廪菽粟二千斛設粥米萬斛減直出糶以惠貧民從之戊午宰相王欽若等上天禧大禮記四十卷己未以京東民飢命內侍楊慶餘馳驛察視所至諭守臣令倍加安撫詔諸路災傷州軍並設粥賤糶官粟以惠貧民庚申并代走馬承受張永和等言并州徑勇馬社軍每人置馬一匹直錢四十五千官止給十千望稍增其數詔增七千二月丙寅甘州輝和爾可汗王伊嚕格勒圭呼遣都督信安等來貢丁卯以升州為江寧府置軍曰建康命夀春郡王為節度使加太保封升王先是宰臣因對屢言王性聰悟好學樂善孝謹彌篤迥然老成而未正封爵中外人情咸所屬望願允臣等奏早議崇建上謙讓久之洎固請再三乃許焉以升州為江寧府號建康軍據實録在丁卯後一日今從本紀先書之開封府言準詔禁鎔金衣物違者奏裁並徒三年決遣伏緣令行之初嚴於約東今犯者殊鮮乞止用本條科斷從之戊辰以夀春郡王友張士遜崔遵度並為升王府咨議參軍左正言直史館晏殊為記室參軍詔右諫議大夫樂黃目比部員外郎知制誥陳知微於常參官中舉公清強明材任御史者各一人從中丞趙安仁所請也是夜北宅蔡州團練使德雍院火延焚數百間詔遣御史張廓鞫劾火起雍子供奉官承亮舍因婢陳所遺燼詔免死杖脊配窰務卒為妻承亮停官德雍奉表待罪詔釋之庚午以翰林待詔司農少卿同正尹熙古裴瑀並為太子右贊善大夫太府少卿同正白憲為太子洗馬熙古等祇事禁中三十年因大禮摹寫碑頌至是表求出官特有兹授右正言劉曄請自今言事許升殿面對從之壬申三班院言保舉使臣先準詔須兩經監押巡檢各及二年半已上其中有不因公纍歷三四任及八九年者以每任不及二年半為礙詳觀詔意蓋欲更事嵗久即為甄敘欲望自今但兩任已上不因公事移替計五年者悉許施行詔可癸酉淮南江浙荆湖制置發運使宫苑使蔣州團練使李溥罷知潭州坐黃震劾奏也以崇儀使昭州團練使賈宗戶部員外郎薛奎並為制置發運副使如京副使郭盛為都監發運司置都監始此詔如聞京東州軍設飢民粥而官吏未克專意或致失所宜令轉運使宣布詔旨倍加優恤乙亥秦州部署曹瑋言知鎮戎軍內殿崇班張綸昨召赴闕令使契丹綸頗知蕃情政治詳敏使還望復委本任詔可會溪蠻入冦即命為辰澧等州緣邊五溪十洞巡檢安撫使綸在鎮戎嘗奏開原州界壕至車道峴約二十五里以限隔戎冦從之詔雖許曹瑋之請然卒以蠻事委綸而實録闕略不知綸為溪洞安撫果何月日也且附見實録於四月三日猶載綸請開界壕事十二日遂帶辰鼎巡檢銜今移開壕事於此庶不與溪蠻相亂丁丑令河北提點刑獄官簡閲諸軍知辰州錢絳言得富州刺史向通漢狀請納疆土舉宗赴闕己卯賜下溪州討蠻將士緡錢令回日優犒設之又降詔撫問荆湖廣南轉運使辰澧桂宜州長吏巡檢使內臣京西轉運使言管內飢民甚多無以賑濟望發絳州粟十萬斛赴白波出糶從之仍遣使臣督運庚辰以西上閣門副使張昭逺為河北緣邊安撫副使內殿崇班閣門祇候常希古同管勾河東緣邊安撫司事二事據會要恐非事始則削去實録但著昭逺辛巳徙泗濠州路巡檢𪠘于龜山先是斷臂僧智悟集鄉里凶黠者為童行總千餘人凌毆平民恣為不道上知其事命內侍任守忠取新𨽻者盡逐去因徙官察視焉大理寺言準大中祥符七年九月敕判寺盛度奏本寺詳斷官八員檢法官尤多不精習法律望依咸平二年三月敕令審刑大理刑部衆官舉奏時詔依請令所舉須經二任六考今臣等參詳準天禧元年五月敕舉奏京官但歷任及四考已上施行本寺欲比類前敕但歷任五考已上並許保薦仍於法官將滿前一月具名開奏所冀精詳法律得遂公平從之仍令自今所舉官先送審刑院試律義五道其通否以聞壬午對右正言劉曄魯宗道于承明殿凡八刻癸未著作佐郎集賢校理陳寬上髙麗女真風土朝貢事儀二卷丙戌江德源圖下溪州江山之狀以獻權涇原路都鈐轄郝榮言樊家族九門都首領開斯多卜并其族來歸詔補開斯多卜為都軍主餘署職有差步軍都指揮使保靜節度使王能以疾求軍職丁亥授彰信節度使彰信近鄉里特寵之也免入謝賜賚如例及能赴鎮疾甚子弟童僕輩頗苛市民物能不之察踰年卒詔應準詔舉到京朝官候得替令審官院勘會知縣與通判差遣通判與知州并合入知州通判者更升藩鎮差遣所有縣令候得替令銓司磨勘奏會要二月二十三日事戊子命益州路轉運使韓庶京西轉運副使趙賀兩換其任以庶上言母年八十無兄弟故也詔河北民所至津渡勿收其算遣使葺天雄軍城樓及編排衣甲涇原路駐泊都監周文質言偵知總噶爾族數與穆爾錫里庫鬭敵嘉勒斯賚兵敗部族離散事勢稍衰而穆爾錫里庫攻之未已也三月甲午朔詔開封府京東西河北河東陜西淮南路災傷處所募民造軍器權停一年乙未詔自今京城遺火並論如法內延燔多情理重者奏裁前歲春旱京城頓火因詔犯者悉處極典至是開封府援引舊詔上以權宜之禁非可久行故改之丁酉荆湖南路轉運使丘雍言邵州密邇蠻界民多掠人口出境賣之望準開寶五年敕處死詔犯者免死決杖黥面配牢城戊戌徙河北都轉運使李士衡知青州代戚綸以綸知鄆州綸嘗作書勸臨淄麻氏出粟以濟飢民太常丞致仕景宗拒之答綸書極不遜綸憤甚具奏其事上怒曰綸選懦不能抑豪強乃煩朝廷耶亟命士衡代之士衡至麻氏具粟千斛以獻景宗曰禍吾宗矣居二年而麻氏破此據王皥百一編不知景宗於士安何屬也皥云景宗是嵗卒未逾嵗士安乃殺其姪當考時盜起淄青間有司捕羣盜妻子置棘闈中士衡悉縱之使去未幾其徒有梟賊首至者監察御史劉平言金明池準例許士庶嬉遊一月今都城物價踊貴民方望罷之詔開池終上旬乃罷辛丑增築京新城畢部役使臣軍校第進一資壬寅上謂宰相曰近日邊奏甚稀疆陲肅靜頻得雨澤民亦安阜向敏中等曰天氣均和時雨浹洽聖心恤下軫救多方麥熟不遙盜冦亦絶陛下以德綏懷逺無不服邊境妥安而兵數未減慮冗費之間尤宜節省上曰今京師兵可議裁減存其精鋭敏中等曰軍額漸多農民轉耗近準詔已住召募或斥疲老則冗食漸少上曰卿等常宜講求務在經久也丁未陜西轉運使段曄言勸誘慶成軍豪民出穀萬一千九百石減價賑飢民詔奬之庚戌詔諸班直諸軍妻坐姦者決訖即放不須𨽻作坊針工其見役者百五十七人皆釋之辛亥曺瑋請名新築大小洛門二寨為安邊來逺詔從之甲寅右正言魯宗道言大辟罪如婺州訛言者望自今精加按覆內出其狀示輔臣向敏中等曰向來四方大辟奏牘陛下未嘗不召臣等審議然後寬貸決罰好生之德蓋超越於前古矣上曰自今當詳議者更加審細貴無濫也宗道風聞多所論列上意頗厭其數宗道因對自訟曰陛下所以任臣者豈欲徒事納諫之虛名耶臣竊愧尸祿請得罷斥上慰諭良久他日念之因題殿壁曰魯直乙卯上封者言伏以信賞以勸善明罰以懲惡古人用此堅如金石信如四時無私如天地今斷天下之獄皆是大理詳天下之法總在審刑二者海內之準繩也且今之律令則具有明文制敕則常有更改凡定罪之要言敕則多指故失言罪則皆坐公私四者定刑重輕殊邈酌情輕而用法重則近侮文按狀重而處條輕則為失實此之審克尤在盡心入私則犯徒追官為公則贖金記過稱故則不得末減稱失則例有降差承前斷公私故失之名止是法官臨時裁處既無著定深慮差殊欲望令應經歷刑法司同定公私罪名參詳畫一其違制稱失者亦須審詳失錯情輕者明件條奏使不能因緣為姦輕重其法杜其萌漸實在於斯詔審刑院大理寺刑部開封府同議定以聞既而法官參詳自今捕盜掌獄官不稟長吏而捶囚不甚傷而得情者止以違制失公坐過差而不得情挾私拷決有所規求者以違制私坐又捕盜官承前有捕捉稽時不聞州者咸以違制論準至道元年敕小可盜失令村耆了絶今例以違制科罪似涉太重望令犯者以違制失論又律分公私罪云私謂不緣公事私自犯者雖緣公事不吐實情心挾隱欺亦同私罪公謂緣公事致罪而無私者雖私曲相須公事得正違法猶以公坐望令斷獄並以上文審定又律有被制書有所施行而違者徒二年失錯者杖一百今請法官斷罪除海行條貫元敕指定違制外自餘情輕失錯者止從違制失論其公私相半而私情重者奏裁從之丙辰上謂宰相曰雨足麥茂豐稔可見貧乏之民事須拯濟州縣先貨糧種或恐吏即收理宜亟止之此據本紀知虢州查道言諸路承例遣幕職官鞫問本路轉運使提點刑獄官事頗未便望自今止令兩司互相劾從之丁巳景靈宫判官知制誥劉筠請令禮儀院宗正寺約唐朝大清祠令撰集景靈宫祠令付本司遵守從之筠又言兖州景靈宫太極觀事體尤盛亦望别加撰集永使遵守詔付禮儀院利州陜西河北等路并州並言雨足夏四月乙丑詔如聞京城作貧民糜粥不至精潔或糅以灰宜遣中使按察不得復然詔諭髙州等蠻如能捕殺下溪州賊彭儒猛者當量功授刺史或賜州額牌印其次遞加補署給次許其貢奉丙寅詔開封府諸縣市芻藁見欠者悉蠲之酒麴場折納亦權停俟秋成如舊丁卯召近臣及館閣三司京府諫官御史謁太宗聖容於宜聖殿觀龍圗閣書及御製贊頌石本時升王未出閣始預坐令從臣賦賞花詩己巳詔兩浙災傷州軍場務虧課者主典並免科罰曺瑋言修築咱爾隆及定邊城堡寨壕塹功畢詔奬之督役使臣將士賜物有差提舉諸司庫務藍繼宗言諸司官健本額四萬七千九百六十六人見管三萬六千三百八十八人今揀擇得二萬三千九百二十一人仍舊充役二千九百五十四人放停五百十三人減衣糧之半辛未賜鎮戎軍朝那湫廟曰靈澤主判三司開拆司劉楚言天下申省及轉運司知委文狀頗為重復勞擾州縣望令逐處減省務從簡要詔知制誥王隨知雜御史吕夷簡與三司詳定三司所減省總九萬餘道三十四萬五千二百紙又令諸路轉運司詳定諸州府可減省數白三司三司覆定以聞遂詔三司及諸路並依新減數不得有增益乙亥發運使言今春發諸州軍銀帛絲綿五十五萬五千計糧儲四百一十七萬石上供詔江淮方稔宜令更留三二百萬石以充軍食免其擾民丙子江隂軍言蝻蟲生捕之已盡詔奬其官屬辰鼎州都巡檢使張倫言下溪州彭儒猛與髙州蠻同惡慮延及施黔州冦劫居民望令二州為備從之詔自今命官犯贓不以輕重並劾舉主私罪杖已下勿論從判大理寺李虛已之請也吏部流內銓言去年赦後至今年三月從得替縣令知縣及合入令録人有願就西川萬戶簿尉司理司法者望許放選注擬以補其闕從之戊寅以嵩山故种放宅及興唐觀基山林賜女道士王道真仍禁樵採道真絶粒歲久景德中嘗召見獻枸杞樹自言相傳四百年矣願至尊采擷服餌用資上夀上特優禮焉獻枸杞樹在明年正月移此九月辛未得玉璧亦合并書召見在景德三年五月己卯曺瑋言蕃僧裕木札卜沁先於故渭州吹莽城聚衆立文法今悉已破散又河州諸族亦破總噶爾族所立文法來歸望令充熟戶依舊出入詔奬瑋仍從其請庚辰上謂大臣曰如聞河北薦飢貧民請豪家息錢未償納者即印券契取其桑土宜禁止之壬午白波發運判官王真言去冬本司挽舟卒寒因假省錢二十萬市衲袍給之今春以衣俸折還並足先是每嵗亡命者不下一二百人是嵗止八人上曰貸省錢雖非舊制而活人之命則可嘉也又出內侍王懷正所進蓬子麵蒼耳實之類因曰民食此物尚未得所尤宜軫恤也詔命官使臣任滿及移徙後身亡其家屬無託不能還鄉里者委所在官司令人護送無令失所甲申三司假內藏銀九百兩曺瑋等言伏羌永寧大小洛門威逺寨今定蕃官月俸正軍主二十一人內六人各二千一十五人各一千副軍主四十六人各七百指揮使百二十七人各五百戊子幸飛山雄武教場宴從官賜將士物有差升王府咨議參軍張士遜言訪聞衛州至天雄軍緣御河頗有暴露骸骨望遣使臣收瘞從之詔朝官使臣知大縣及萬戶縣勿差出如本州及鄰邑公事許更互而往從殿中丞黃吉甫之請也上以災沴頓息流庸皆復庚寅降天下死罪一等流以下釋之災傷地分去年夏秋稅及借糧種悉與除放今年夏稅免十之三大名府登萊濰密青渭州免十之四不得折變支移欠負物色未得依限科校候豐熟日漸次催納諸處造上供物追集百姓工匠有妨農業並令權罷如係供軍切要者候次年奏裁先是上封者言諸處不係名額寺院多聚姦盜騷擾鄉閭詔悉毁之有私造及一間已上募告者論如法於是詔寺院雖不係名額而屋宇已及三十間見有佛像僧人住持或名山勝境髙尚菴巖不及三十間者並許存留自今無得創建三司假內藏錢二十萬貫閏四月丙申詔災傷州軍買撲酒場年課不登如歲滿願仍舊沽賣者聽展限一年己亥詔戶部尚書馮拯以下諸路轉運提點刑獄朝臣於幕職令録內各保舉一人充京官監蒞場務給親民添支庚子曺瑋言緣邊諸寨蕃部納質者七百五十六帳自吹莽城文法破散之後其崆裕勒斯莭博等族先投尚揚丹者悉來歸嘉勒斯賚數為穆爾錫里庫所困今還舊地嘉勒斯賚還舊地不知何等地名也據兩朝國史嘉勒斯賚與埒克遵不協更徙居邈川豈邈川即嘉勒斯賚舊地乎明年春嘉勒斯賚又與埒克遵同遣使入貢則舊地又非邈川矣當考癸卯以宣徽南院使知樞密院事馬知節為彰德軍留後知節自天雄召居樞廷之首顧待殊厚素病足特許內朝别為一班省其舞蹈是歲病甚賜告在第前一月上親臨問謂之曰久不相見思卿而來及是乃罷留止京師以便醫藥知節表求赴任詔不允疾間入謁常令閣門祇候二人更掖之丙午江寧尹升王言得本府狀蠶麥登熟詔奬之戊申宫苑使蔣州團練使李溥坐貪猥責為忠正節度副使初黃震發溥姦贓遣御史鞫治得溥私役兵健為姻家吏部侍郎林特起宅又附官船販鬻材木規取利息凡十數事未論決會赦有司以特故將不窮治大理寺詳斷官劉隨請再劾之卒扺溥罪隨考城人也嘗為水康軍判官軍無城堞伐木為柵壞輒易之頗困民力隨令環植柳數十萬株因相聫屬以限內外民得不擾屬縣令受贓鬻獄隨劾之益州李士衡隂為令請隨不答士衡怒奏隨苛刻罷歸不得調初西南邊市馬入官苦吏誅求隨為繩按之既罷邊人數百訴于轉運使曰吾父何在事聞乃得調李士衡以祥符四年五月知益州六年四月改河北漕未嘗為西川轉運使正傳蓋因宋祁墓志今改之或士衡嘗權領漕事也知并州薛映言民飢設糜粥濟之計三十餘萬人辛亥詔諸州經四月庚戌赦書死罪降徒流強劫盜賊內傷人者黥面配沙門島其廣南路配瓊崖儋萬等州益梓路配商虢均金襄鄧等州利夔路配荆湖南路並𨽻牢城不傷人者黥面配千里外牢城不至流者配本城初赦書言不殺人者奏裁濵棣州巡檢趙繼昌言此等若釋其罪配本州充軍慮不悛革復為過咎故條約之先是皇城司言拱聖營之西南自去年營卒有見龜蛇者因就建真武祠今泉涌祠側汲之不竭疫癘者飲之多愈甲寅詔即其地建道宫以祥源為名士女徒跣奔走瞻拜屯田員外郎判度支勾院河南任布言明朝不宜以神怪衒愚俗不報乙卯右正言劉曄言刑法曹掾之官近日多因世家陳乞而授自今望令銓司精擇寒素無得以權勢親屬充選從之知陳州馮拯言部內麥斗三十錢戊午補下溪州招降蠻人彭仕漢為右班殿直儒霸儒聰並為三班借職監許陳鄭州鹽稅各賜衣冠緡帛
