body:
  text: 續資治通鑑長編巻三百六十二宋李燾撰哲宗元豐八年十二月辛酉朔高麗國賀登寳位使通議大夫工部尚書林槩副使太中大夫兵部侍郎李資仁以下見於紫宸殿頒行釋奠社稷風伯雨師新修祀儀壬戌樞宻直學士知永興軍劉庠充涇原路經略安撫使知渭州十一月丙午劉摯言劉昌祚昭宣使入内押班梁從吉管勾景靈宫詔興龍節以諒闇中上夀宜罷蠲放沂青州諸縣失敷役錢還于闐國和罕王所進師子仍賜銀絹詔今月十五日開講筵講論語讀寳訓講讀官日赴資善堂以雙日講讀仍留一貟宿直初講及更旬宰相執政並赴罷太學保任同罪法舊録云初三舍法成士或濫冐於是立法使五人以上更相保任犯而情重及應送所屬者免檟楚聽贖至是因言者從之又詔栽桑物法蠲民所欠罰錢舊録云熙寧六年立法勸民栽桑若不趨令則倣屋粟里布為之罰至是以楚邱民胡昌等有言故罷勸課種桑榆立法在熙寧五年七月趙子幾言霍舜封等擾民在六年五月十九日癸亥侍御史劉摯言近者曾有論列乞罷刑部侍郎蹇周輔及其子司封貟外郎序辰職任不䝉施行伏縁理有未安事有未可以已者須當再有申列竊以周輔序辰繼於東南虐行鹽法為朝廷生怨讟於數路之民其於掊斂刻剥公論所共棄與吳居厚王子京軰無少異也居厚等初有亷按指揮即先罷見任而周輔等獨得不罷在職如故乃是罪同而法異也若曰居厚子京事在所部勢不可不罷周輔等於江湖非所部無嫌故不必罷臣竊以為不然謂所部當罷是也謂非所部不罷則子京所部在福建而罷泰州何故也不可如居厚例豈不可與子京同行也要之待罪之人必去見事職任以需命爾故王道能使之無偏政令能去其二三槩行公平之法然後可以服人心而正天下周輔等雖有被害之地非所部然今並㳺京師安處華要徃來奔走權門經營道地以為徼幸之計則其害有大於所部之嫌也臣風聞有㫖催促陳次升等疾速體量結絶臣竊見昨者所遣之使幸皆精選於臺省其人必無所觀望萬一有見周輔父子在朝廷獨不去職與居厚等行遣不同又促其使事必疑謂朝廷欲寛其事故風以此意或采察按治滅裂回隱東南之害將有不得盡逹于聖聽而法有不得行焉者故詳今來止於催促則周輔經營之術似已行矣伏望聖慈深察其故不可使公道獨行於外而不行於内早賜罷免周輔序辰見任皆從外補以一朝廷政令以解中外疑異之論候見實狀别聽朝㫖貼黄若以謂周輔等罪狀未到無名以命其去則居厚先守廬州而後體量當時豈無名耶又貼黄政令不一最為國家之大患臣所以不避煩凟者止為上繋治體亦非獨區區於周輔等也十一月十八日初論此月二十二日又再論明年正月二十二日乃責甲子遼國賀興龍節使寧昌軍節度使蕭忠順副使中大夫行起居郎知制誥充史館修撰趙孝嚴見於紫宸殿次見太皇太后于崇政殿乙丑夏國遣人入貢夏國主秉常言母氏臨終屬臣曰世受朝廷封爵恩禮備至今雖邊事未已屬纊之後宜奉遺留物以進示不忘恭順之義雖瞑目無恨臣謹遣使進遺馬白駞詣闕李清臣言伏見朝廷近遣郎官杜紘弔慰夏國今復遣使來謝朝廷必欲因此之際特示招懷所有每年時服近罷給賜欲乞自樞宻院檢舉施行關牒西人開示恩意及昨來用兵擒捉到近上首領多在南方拘管乞擇其三二人可使歸還者推恩釋放庶其戴荷天恩共思欵服又言臣所奏並乞留中如䝉收採即乞節略臣奏自御批降出付三省樞宻院商議取㫖施行又言原釋囚虜以懷敵人自古非一皆為美事如臣言可採即乞議明降詔命嘉其近遣使人辭㫖恭順因此推恩釋放甚協朝廷之體兼可以窺察敵情清臣所言因夏人入貢附見更須考詳元祐元年六月十四日杜紘又以刑中押伴刑部言令提刑司檢法官覆州縣官小使臣等公罪杖以下案申吏刑部大理寺注籍則法官可以專於讞獄從之丙寅御史中丞黄履兼侍講命輔臣分詣寺觀祈雪特賜于闐國進奉人錢百萬侍御史劉摯言摯遺藁以此為第二疏八年十二月六日上臣昨者伏見宰臣蔡確充神宗皇帝山陵使於靈駕進發前一夕凖勅合赴内宿確至夜深方抵禁門不肯依禀聖㫖指揮欲將帶人從同入及見本門臣僚執守詔㫖確遂恚怒而去更不入宿亦不聞奏禀顯是驕慢臣曽具弹奏自後不聞施行摯劾確附十月末臣未敢再有申列者以謂確奉使回必須引咎自劾闔門待罪既而還朝略無忌憚安倨自處以為當然臣又聞近代及國朝以來臣僚凡充先朝山陵使者復土之後例須自求去位莫不得請而後已蓋以謂臣子之禮身典䘮葬方畢其事以嫌自處不敢遽踐嗣皇朝廷所以致事上之恭例雖出於近代然㳂襲莫敢廢之惟是韓琦奉使永昭陵回累章瀝懇終不獲去蓋英宗以琦定策元勲特恩固留所以不得遂其請今確歸自裕陵赴集英内東門朝見訖即日視事但聞升祔之後因事略於簾前備禮自陳竊料聖恩優遇輔臣必曽宣諭不許之意人但見其再拜而退遂偃然自若以為泰山之安確之事朝廷其意亦已輕矣所貴乎大臣者為其去就有禮進退有義臣以道固辭君以恩不許雍容節奏必有文義可觀而確不顧亷隅恐失爵位略無逡廵之意不容陛下少施恩數而乗勢伺便無故自留天下不聞其陽為求去之言不知其公然不退之理且前日違勅不宿已見悖慢之心今日當去而就又無進退之節為臣之分確豈不知蓋謂皇帝陛下富於春秋可以不恭謂太皇太后陛下不出房幃可以無禮又謂天下公論久廢可以欺罔故泰然冐昧茍固權寵中外臣庶痛心憤嫉為確耻之大臣如此尚何以尊隆朝廷内鎮服羣下而外取重四方也哉伏望聖慈深以天下為意無或容養姦惡早發睿斷罷確政事以明國憲以慰安中外貼黄稱若或聖恩廣大誠未欲暴確之罪即乞止以恩禮詔之使均逸于外亦足以慰公論又稱若或議者以臨御未久未宜輕去大臣為說臣以謂不然大臣無罪以禮求去則未可輕進退若有罪豈可牽制此說也據劉摯遺藁此疏係彈蔡確第二疏十二月六日上劉仿王知常撰摯行實載疏語亦同編録者或以此疏繫之王巖叟或巖叟同摯上此也先是王巖叟言臣伏觀陛下即位之始首發徳音下明詔免保丁第五第四之田不及二十畆者使勿教其得免者戴陛下厚恩如獲更生後復下令變保甲月教之法為冬教人人始得安其業又大惠也然臣常親其事而見其㣲尚有以為陛下言者凡第四第五等之家田業壠畆之多寡無甚相逺麄糲不充布褐不備均未免凍餒之憂今若隆冬冽寒使去其家與温飽者同教於城下盈月而後已豈其所堪伏望聖慈哀憐約祖宗義勇等第之制特詔有司免三路第四第五保丁冬教以寛貧民但籍其姓名備緩急出力以從事可也雖不教之戰而教者頼此以共濟耳國家平居能有以知其情則百姓一日樂有以盡其力今雖罷之猶不為無益也臣又按祖宗義勇之法止行三路比者保甲之事乃并王畿之民皆曰我居近天子之都習知䝉幸以為常也今乃督戰鬬之技下與列郡等而又加峻焉安用為王畿之民哉此百姓前日之語也北則韋城白馬西則管城新鄭前為畿内邑則共苦於教今復而歸鄭滑為京西邑則三冬之教遂不預焉民又曰我畿内之民也顧不如畿外之人暇逸而安樂此百姓今日之意也人情如此豈國家所以親腹心厚根本之計哉臣以謂畿内保甲宜悉罷之便惟陛下采納幸甚又言三路教兵固將應緩急之用以守以征也不知畿内教之將何所事哉若曰以禦盗賊則保甲之興反所以増盗賊者多矣皆已然之驗也今既復舊法廵檢添元額弓手置昔日耆壯盗賊固自消矣保甲虚名徒揺人心而無所益願陛下特釋之使根本之地清静而安固人人有歡然親上之心所以資萬世久長之利也豈不善計哉惟陛下留意又按義勇舊法止取第三等已上充教閲四等而下但籍名姓而已更不預教蓋第四等民户貧乏與第五等不相逺耳願陛下惻隐全倣義勇以為法庶貧寒之民盡霑恩徳第五等兩丁免冬教十二月六日丙寅又言臣近以三路第四第五等保丁多貧乏乞依義勇舊法免冬教及畿内舊無義勇今亦乞罷保甲未䝉施行臣竊以道有弛張故法有損益不可以為常要在酌民之言因時之宜而損益之為國家長乆之計耳臣見保甲之法陛下每損之則民心每加喜民心之加喜國計之益以為利也按義勇舊法三丁方取一丁而保甲兩丁便取其一已比義勇立法為甚宻而得兵為甚多臣今不敢請取丁如義勇但乞如義勇免下户冬教而已冬教雖免而姓名猶存於籍亟召則亟得非釋然放之也臣昨為民官每親見下户保丁赴團教不以習技為難而常以艱食為苦未嘗不疾首蹙頞以應一日之教况無衣無褐隆冬大寒當一月之久乎陛下推臣之言以觀其情之樂否也人情之所不樂而必為之非天下之所以望於陛下者也又畿内之民素倚京師以為重浸漬仁恩而安於無事自興保甲以來徃徃竊竊偶語曰三路教民固將緩急當䕶邊之用也我曹豈亦將驅而為此乎臣誠知國家無意至此徒使人心常疑而不自寧何益也議者皆以謂罷之便伏望陛下省臣前奏早賜施行今去起教月分不逺伏望聖慈早賜指揮施行以慰人心於是詔府界三路保甲第五等兩丁之家免冬教新舊録但書府界三路保甲第五等兩丁之家免冬教不著因由詔熙河路經略使趙濟遣康識徃蘭州及選將徃定西城經畫隄備夏人如果來攻城即堅守應敵以取全勝勿為賊誘輕易出兵仍豫為清野之計俟其回兵即審量追襲以諜者言夏人欲㓂邊故也丁卯右監門衛大將軍仲湯封蔡國公戊辰興龍節宰臣率百官并遼國高麗于闐國信使副赴東上閤門拜表稱賀詔招刺禁軍違法聽轉運司㸃檢先是諸路將兵專責提㸃刑獄或提舉官言者謂將兵散在郡縣轉運司因按部閱視可以嵗遍故定此令舊録有此新録削去辛未通議大夫尚書左僕射兼門下侍郎蔡確右僕射兼中書侍郎韓縝並遷正議大夫成徳横海軍節度使守太保開府儀同三司揚王顥為永興鳳翔節度使武昌武安軍節度使守太保開府儀同三司荆王頵為武寧鎮海節度使壬申通議大夫知樞宻院事章惇門下侍郎司馬光中書侍郎張璪同知樞宻院事安燾並為正議大夫銀青光祿大夫尚書左丞吕公著為金紫光祿大夫太中大夫守尚書右丞李清臣為通議大夫宰執親王皆進官用嘉祐治平故事也侍御史劉摯言臣伏覩近降麻制執政臣僚各特轉一官聖恩優厚中外聳動及臣伏讀麻制之詞乃以山陵及升祔禮畢故推此異恩於是臣竊疑焉夫應奉陵寢奔走職事乃臣子之分也若欲酬勞則不應止於執政若旌其送徃則執政未嘗俱行授受之間未有名義伏聞所司檢㑹嘉祐年體例進入依應施行伏縁嘉祐八年英宗皇帝既推即位之恩臣僚各已覃轉後來以弗豫進藥而輔導調䕶鎮寧中外以至聖躬康復親决庶政誠天下之慶謂輔臣實與有勞故又命人進一官然當時臣僚再三辭避累日不敢受命至遣近臣趣令以新官入謝不降坐以待之方敢祗受又治平之末神宗皇帝嗣位覃霈改官之後適值韓琦以山陵使回懇求去位尋以兩鎮外補然猶虚上宰之位自曽公亮而下並不遞遷故亦特轉一官以補轉㕔之恩考求兩朝故事若有因依則今來遷官别無義說雖過賞寧僣在聖人亦足以廣恩而於義未安恐臣下終難於冒處伏望謹重國體愛惜名器授之以公則中外之心服授之以道則亷耻之風行欲望聖慈照㑹兩朝故事不同如執政臣僚辭免新命伏乞特賜允從無傷事體區區臣言庶幾有補摯遺藁自注云八年十二月二十二日壬午上此章今移入十二月二十二日壬午從之光及公著皆力辭光言臣竊惟英宗皇帝親政之初以宰臣韓琦等於嘉祐之末有定策大功保祐聖躬濟於艱難故特遷一官今陛下以神宗皇帝大漸之際宰臣蔡確等啟廸聖心建立儲貳傳授大寳各特遷一官固亦其宜臣當是時方閑居西京憑几末命非所預聞豈得與確等同受褒賞且國家名位本以醻功徳不可但以祔廟禮畢檢舉故事虛有授受况臣於登極之初已䝉覃恩改官今曽未踰年安敢再叨殊渥縱臣貪冒不知愧耻天下之人其謂臣何又言昔英宗皇帝入承大統宰臣韓琦等實有定策之功又踐阼之初聖躬違豫慈聖光獻皇太后權同聽政琦盡忠竭力亦不為不至及英宗皇帝專制萬幾褒賞琦等各遷一官臣時為諌官猶曽上言以近嵗官冗賞濫兩府大臣陛下即政之初宜懲革斯弊今自於朞年之間連併遷官則難以禁他人之倖進者恐宿衞將帥宗室外戚四方藩鎮内侍近臣皆有冀望至時陛下亦不能裁抑兩府亦不敢輙奏當是時英宗皇帝雖不收還恩命而富弼亦有定策之功自以不預顧命力辭甚苦况臣既不預定策又不預顧命豈可來自冗散之地遽與輔臣同賞且臣昔日在人則言其不可受今日在已則受而不辭顧行復言能不自愧光及公著凡六奏訖不許明年正月乃俱受命侍御史劉摯等言臣近言蔡確既為山陵使回自合依故事堅請去位不當貪權固寵不恤公議傲然安處無亷耻之節敗陛下風俗壞陛下典章在臣職分合為朝廷爭之陛下亦須體亮孤臣孜孜不已攻擊權臣有何所益凡人之情莫不樂安而惡危好榮而惡辱然臣不避患害者誠為君也誠為國家也臣伏見神宗初韓琦乞罷相劄子云自唐至於五代首相之為山陵使者事已求罷例皆得請昨仁宗皇帝昭陵復土而先帝尚進藥餌其時臣上體國家不敢援此故事遽然引去又云本朝以來祖宗所任上相山陵事畢多從退罷琦之詞意再三如此神宗亮之遂許琦去五代以上其人難以悉數祖宗以來之臣請歴舉本末陛下考之以照確之進退則貪權固寵無亷退之節曉然易見矣太祖山陵秦王廷美為使無宰相預其事太宗山陵雖以越王元份為使宰相吕端導靈駕至山陵及其還也猶以疾求解避嫌之心可謂深矣逺矣真宗山陵訖馮拯亦以疾五上表遂出判河南府二人皆兩朝所尊禮又國人所惜其去者也然自以山陵事還於體當去故皆力移疾而决遂其請此可見大臣重亷恥明進退之分也仁宗山陵韓琦以英宗服藥未敢去非無故也非得已也逮英宗山陵復土琦即罷相今先帝已安陵祔廟禮成不知確以何名而自留何義而自居若謂陛下富於春秋藉大臣輔翼則左右自有老成重徳為天下信服之人輔翼者如確輩無一正言無一正行天下之人指為姦邪共所憤疾而久留左右適足玷累聖徳為國之蠧爾何輔翼之可頼此愚臣所以區區進忠而不已也若宰相之當山陵使者故事皆不去臣何敢輙言若故事皆去臣何敢不言今衆口諠譁譏切臣等以謂尸禄素餐當言不言辜負聖主又謂養交取容希竊榮進畏避姦臣臣若不力言不惟敗陛下風俗壞陛下典章亦害臣等名節一留姦臣而上下交損如此可不為朝廷惜哉伏望陛下出臣前後章疏付三省施行早罷確政柄使天下知朝廷不抑忠言不沮公議不容姦臣敗風俗壞典章而扶持天下之名節以勵事君則臣等雖死無恨貼黄升祔後轉官故事不當援用則冒耻而受之罷相故事又當援用則違義而取之敗風俗壞典章又如此所以公議沸騰以為早當罷黜也陛下以常禮留之言路以故事攻而去之上則不傷陛下優恩下則不廢天下公議伏望朝廷不以為疑早賜睿斷以慰人心神宗祔廟在十一月七日宰執轉官在十二月十二日今以此疏附十二日後按劉摯遺藁載彈確十疏其第一疏係十月末本集有之遺藁不載自第二至第十月日皆具獨第六第七兩疏係正月而空日又論確十罪疏亦本集有之而遺藁不載已并第六第七疏附元年正月二十一日第五疏後外有此一疏編録者皆云摯作而集及遺藁並不載末又稱臣等蓋當時與其僚王巖叟輩同上未必出摯手故集及遺藁皆無之然所論則實摯先所建白者今仍係摯名且増等字更徐考之癸酉詔犯盗刺環於耳後徒流以方杖以圓三犯杖移於面徑不得過五分右正言朱光庭奏此據編類章疏増入伏以忠邪之迹自古難辨治亂之道由此而分蓋忠臣愛君惟循天理任之則治邪臣蔽君惟徇私欲任之則亂為人君者孰不欲任忠臣以成治道然或不能始卒者邪臣蔽之也則是忠邪不可以不辨也臣伏覩聖政日新思致天下元元入於太平之域愛養基本為無疆之福此甚盛徳也臣愚不肖得於斯時親䝉聖選㧞自常調寘之諫列固當盡忠竭愚以報萬一恭惟神宗享御十有九年勤勞可謂至矣太皇太后陛下以仁聖至明緫攬萬幾保佑皇帝陛下夙成之徳講求善治登任正人天下翕然知所向矣竊以朝廷之事猶一家一身之治也自祖宗以至今日事或未安於理則必更張烏有先後異同之說惟其當而已今朝廷之上所與謀謨論議者數執政大臣若同心於公則惟理為是一懷私意則異說不勝方聖意孜孜圗治之始或慮為大臣者不顧義理之是否輙懷私意復為顧望以為先朝之事不可遽更肆為辨說以惑天聽此乃天下之邪臣不可以不察也臣願當廷見執政大臣論事之際或說有異同一以義理辨之則忠邪自見忠臣則任之宜堅邪臣則亟行顯黜不使肆異說以害政事則天下太平不難致矣甲戌詔將來河北河東路合置保甲冬教塲並令於不當北人道路安置内拶邊州縣仍令提舉保甲司安撫司相度合置去處以聞宻記十四日甲戌吏部尚書曽孝寛為資政殿學士知頴昌府翰林學士知制誥呂大防為吏部尚書端明殿學士通議大夫知頴昌府孫永為工部尚書禮部侍郎李常給事中陸佃並為吏部侍郎給事中蔡卞為禮部侍郎天章閣待制兼侍講范純仁中書舍人王震並為給事中純仁以司馬光親嫌辭不許監察御史王巖叟言給事中處門下當封駁非他職比凡政令之乖宜除授之失當諌官所未論御史所未言皆先得以疏駁而封還之其於扼天下之要以厲至公而嚴朝廷莫先此者宜得正人以允公議按震資材不高特以阿諛附㑹驟致清近前嵗將命西邊所至貪饕多受饋遺流聞京師甚為士論所鄙出使無亷介之譽立朝無端亮之稱封駁之任非震所當處震之新命乞賜追寢巖叟又言臣近彈奏王震不可為給事中乞賜追寢至今未䝉施行理當再有論列臣言其出使無亷介之譽立朝無端亮之稱皆出於中外公論非臣私言竊以震元無科名偶因銓試得進士出身當時之人已譏忝冒因縁附㑹暴至華顯無一言一節之美聞於搢紳惟聞奉使貪汙而已迨出官以來未嘗歴一日外任四方之事皆不習之今論駁之地政令所自出非知天下之務逹天下之情何以講利病裁可否酌是非以聞於上又非忠公勁正何以敢為名器之重豈當虚以授人伏望陛下垂採公議早賜罷震為官擇人以為朝廷之頼貼黄稱臣昨以言震阿諛附㑹驟致清近伏望陛下考震本末即知臣言不妄震别無功能若非善於阿附何以未嘗為一日外官數年之間致位至此惟乞陛下特賜睿斷罷震此職别有差遣以允公議臣竊見祖宗以來給事中皆選用方正不阿踐敡中外之人補助朝廷今震既未歴事且無清名何以當此選而震奉使貪汙玷辱君命因此立出使者供饋之法則非朝廷不知其人也非臣誣其人也巖叟又言臣近兩上章彈震出使無亷介之譽立朝無端亮之稱封駁之任非震所當處乞賜追寢新命不䝉施行此必大臣有左右其人而彌縫其惡以解陛下意使公言不得伸臣初不願攻其私慝以傷大體然知而不言終為負職兼須論奏乞正典刑臣訪聞震事母不孝凡俸祿之入盡歸其妻室母不得而有之飲食衣服皆限量以給其母母常有不足之恨嘗因覃恩得封誥母忿而却之曰以此遺我何如以飽飯一盂遺我邪自陜西奉使回所得數千緡止以銀十兩絹十匹奉母而已其厚於妻子而薄於親士大夫無不知者震大族姻家戚屬滿京師善惡不可掩詩曰鼓鐘於宮聲聞于外外人之論有自來矣固未有篤於事親而人能誣之以為薄也方陛下新即位敦孝以示天下之初而近臣履行如此甚非所以厚人倫隆王化也乞行竄黜以厲事親貼黄稱震乆為中書屬官日以謟佞事諸執政多恱其人而力為地且震與宰相有親伏望聖慈特賜主張以行公議尋命震出守元祐元年閏二月四日壬辰震罷給事中以龍制知蔡州監察御史安惇為利州路轉運判官監察御史劉拯為江南東路轉運判官先是御史臺言事官共置六貟見八貟當减二貟詔長貳擇其可罷者中丞黄履言察官六貟除劉拯外其五人並係臣論薦伏念臣既嘗稱其材以進之又擇其不材而退之在臣私義實恐未安乞止令侍御史劉摯推擇詔從之摯言除陳次升見奉使差出臣未之識外有劉拯安惇到任久次可以减罷乞量才别加任使故拯惇有是命十一月末孫覺云云可考遣吏部侍郎李常代陳安石相視黄河十一月六日遣安石明年正月十四日又二月六日四月四日禮部尚書韓忠彦權發遣開封府蔡京兵部尚書王存御史中丞黄履步軍副都指揮使苗授降授皇城使慶州團練使宋用臣度支貟外郎陳向皇城使邵州刺史張節愛西京左藏庫副使劉孝孫等並第加食邑食實封以應奉山陵有勞也高麗國進奉使人乞收買大藏經一藏華嚴經一部從之又乞買刑法文書不許不許買刑書在十八日今并入此熙河蘭㑹路經略司言諜報西賊集九監軍司人馬欲犯蘭州命趙濟探賊所向先設備罷後苑西作院吏部侍郎熊本為龍圗閣待制知洪州工部侍郎王克臣為龍圗閣直學士知陳州侍御史劉摯言臣近再具狀論蔡確違勅廢禮驕慢不恭無大臣進退之節乞賜聖斷罷其職位未䝉施行確之回自裕陵即使其門下之人揚言於衆曰確有定策大功嗣皇之所依頼不可一日去上左右先布此言揺壓公議衆人皆識其意莫不憤惋而笑之臣竊以昔之所謂定策者蓋國有變故未知所立方艱難之時大臣能奮不顧身議於危疑不可知之中擇賢而立以扶顛定傾則是大策由此人定古之人則霍光今之人若韓琦是也而今日之事豈與彼同也哉恭惟皇帝陛下乃先帝之正嗣祖宗之所傳次太皇太后陛下之所眷命而四海之所歸戴也承序繼統實應天下至公大義自然之道也臣下安可謂之定策况先帝進藥既乆太皇太后陛下聖志前定先已宣諭執政以建儲之事則天下之順道太皇太后陛下實行之矣顧確等輩奉承詔命而已何策之定哉今確乃貪天之功以為已力矜傲自處欲以此固其權位此中外之人所以憤嫉痛心而不平也昨者確等覃恩轉官學士草制獨於確詞中云獨高定策之功命下之日識者皆知其過而確遂當之今乃誇衆以自名貪冒欺罔謂今日天下必待已而後安輕視朝廷無辭遜去位之意罪莫大焉伏望聖慈深察早賜睿斷罷確職任以慰安中外貼黄臣孤立無援非不知附宰相則有福彈宰相則有禍然仰報任使又恃恩遇不敢自為身謀故以外議上聞伏望早賜施行以慰中外又貼黄確與章惇素相親今固結朋黨自陛下進用司馬光呂公著以來意不以為便故確内則陽為和同而隂使惇外肆強悍凌侮沮害今廟堂之情極不和諧近日政事大叚稽壅每議一事一人曰可一人曰否一與之合一與之離有終日不能决一事者蓋衆意欲以歳月消磨善人之氣沮閣聖政不可不察也今中外以謂確與惇不罷則善良無由自立天下終不得被仁厚之澤摯遺藁以此為第三疏八年十二月十四日上乙亥初御邇英閤召三省樞宻院侍講侍讀修注官講讀錫宴於資善堂賚銀帛有差李􅌫十朝綱要上初御邇英閤召宰執侍臣講讀仍詔自今更旬宰執兼赴
