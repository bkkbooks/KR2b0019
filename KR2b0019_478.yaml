body:
  text: 續資治通鑑長編巻四百七十四宋李燾撰哲宗元祐七年六月癸丑朔詔訪聞淮浙積欠最多累嵗災荒人民流移相屬今淮南始得一麥浙西未保收成應淮南東西兩浙路諸般逋負不問舊新有無官本並特與權住催理一年内已有寛限者即依元降指揮從蘇軾之言也蘇軾在揚州與吕大防書云頃者所論積欠䝉示諭已有定議此殆一洗天下瘡痏也舊録載此事甚略新録又不加考詳今特表而出之詔語與軾所奏並同其為從軾奏請無疑也御集有元降御札舊録頗刪潤之今悉存本文詔賜唐栁州刺史羅池神廟為靈文之廟以郡人言其雨暘應祈故也乙卯詔諸路茶稅並専委提刑司管其稅務毋得以茶稅錢更易作雜稅收附其令本州通判及發運轉運提刑司覺察仍許人告首監官専攔坐違制分故失定罪若事由監官而専攔自能告首者免罪外支賞錢三百貫文以賣酒場錢充辛酉左正議大夫守尚書左僕射兼門下侍郎吕大防為右光禄大夫政目吕大防轉官在七日右光禄大夫守尚書左丞蘇頌為左光禄大夫守尚書右僕射兼中書侍郎本傳云頌自至和中入舘居京師閭巷之人皆聞頌名至是登用朝野相慶明日哲宗語執政曰蘇頌甚慰人望曾肇誌墓亦無此政目頌為中書相在七日中大夫守尚書右丞蘇轍為太中大夫守門下侍郎中大夫同知樞密院事韓忠彦為太中大夫知樞密院事翰林學士太中大夫范百禄守中書侍郎翰林學士左朝散大夫梁燾為中大夫守尚書左丞太中大夫守御史中丞鄭雍為尚書右丞左朝請大夫寳文閣待制權户部尚書劉奉世為樞密直學士簽書樞密院事梁燾辭尚書左丞願於舊臣耆徳疎逺之地圖任老成揀㧞雋良庶使輔佐得人朝廷增重章累入上遣中使趣拜燾曲謝日太皇太后曰盡出官家意燾再稱謝太皇太后曰官家盛徳日成正要卿等輔佐燾對曰臣不才謬當寵任不敢不盡忠如范純仁韓維輩在外賢德尚多願陛下留意太皇太后曰此來朝廷有何闕政燾對曰今聖政日新天下安靜如邊防河患内外講究須博詢通習其事者校利害為之如邊事須問西人河事須問河北人㕘酌又上疏言范祖禹劉安世久在侍從宜置諸左右使斷國事又言今日邊事為急范育治邊有功宜先用之又言安燾許將皆舊人可倚任者一日議兩制差除執政異同不决吕大防顧燾問誰可燾曰相公久居朝廷收養人材固多宜自有人惟是不以愛憎牽於偏聽以朝廷得人為己任此所以望於公也大防曰苦乏材燾曰天下何嘗乏材但好人不肯自向前來求進須朝廷識㧞則有以來之立賢無方不患無人也大防曰須在識别分明燾曰公生明則識别自然明矣此據梁燾行狀又云太皇太后問别有何事燾徐曰蔡確竄逐多日願徙内地新號瘴癘窮惡之地一日確先朝露有傷陛下仁政按燾初擊蔡確甚力今始執政乃有是言恐行狀飾説也附見當考詔夏賊犯河東五萬以上兵難以枝梧合銷諸路牽制者麟府路令府州軍馬司嵐石州令石州都廵檢司舉横烽入鄜延路報以次路分仍各别舉横烽至太原府帥司納火麟府路仍聽軍馬司徑報諸路出兵牽制其河東路得諸路横烽除報帥府外亦别以一路横烽轉報府州軍馬司納火仍令諸路遇賊入冦合要牽制䇿應除移牒逐路經略司外更徑報麟府路軍馬司照㑹其諸路得河東横烽若麟府軍馬司得諸路横烽並簡習軍馬便為牽制之備速赴順便堡寨駐劄未得出界各候被賊路分報到審騐得實可以牽制即依累詔從長取利進兵先是河東經略司言横烽之法本路與陜西諸路難以一律故有是詔癸亥詔陜西河東路就糧禁軍人貟節級因犯私罪降充本城牢城指揮内選年五十以下武藝不退堪任戰鬭人權分隸元軍分額外收管支廂軍請受遇有事宜隨軍差使候有戰功量輕重特與禁軍内比附舊職等第安排從樞密請也新無甲子禮部侍郎韓川為龍圖閣待制知潁州韓川之出必有故當考川為禮侍在去年十一月二十一日時范祖禹亦無禮侍天章閣待制知鄧州黄履知應天府尋改青州改青州在十六日今並書宣政使和州刺史内侍副都知趙世長領忠州團練使詔諸路廂軍遇差撥屯駐兵士三十人以上令本處委官一貟與主兵官躬親按簿㸃差以河東路言役兵多輕重不均致有逃亡故也知衡州栁韶令再任以湖南言其課績優異故也置廣文舘解額玉牒甲子日事今以法册所載詳著於後禮部狀近準都省批狀勘㑹開封府遇科場嵗多有四方舉人冒貫畿縣户名取應及太學生貟依條須在學及一年方預就試其間有未及一年之人亦不免有寄貫取應之弊檢㑹舊制國子監取應舉人先於廣文舘補試給牒取應今欲復置廣文舘生貟送禮部看詳立法申尚書省禮部檢㑹元祐貢舉勑進士解額開封府一百人國子生四十人其諸科依舊條開封府二百四十人本部昨已曾乞将諸科量留四十人解額外其餘二百人并開封府進士及國子生共為三百四十人發解廣文舘生貟今再行看詳開封府進士解額一百人即乞依舊外将本府諸科二百人并國子生四十人共為二百四十人解額並撥屬廣文舘以補中生貟毎十人發解一人今擬修下條諸開封府舉人投下取應文字限試補廣文舘生貟鏁院前納畢違者更不在收接之限如有事故服制節目拘礙若至八月一日合該投下文字者許令家人親屬投狀召命官二貟保實亦聼收接諸補廣文舘生貟以二千四百人為額諸進士解額開封府一百人如投下文字不及千人以上即毎十人聽取一名廣文舘二百四十人以補中生貟毎十人發解一名諸試補廣文舘生貟於科場嵗六月五日鏁院委主司定日引試諸廣文舘生貟於開科場七月終已前齎元授公據赴國子監照騐並投納保状試巻請解其公據至並行毁抹如請解不中即仍去聼别試補又勘㑹四方舉人巳置廣文舘許令就補别立解額竊慮尚有詐冒開封府户籍取應及本府舉人亦有更易名字於廣文舘投下文字兩處就試之弊若不别立嚴禁終是未能杜絶今欲修立下條諸舉人詐冒開封府户籍取應者杖一百許人告賞錢五十貫雖已及第並行駮放保官及本屬官吏耆鄰書舖知情并與户籍令詐冒者並與同罪同保人並殿二舉諸開封府舉人巳於本府投下文字更不得就補廣文舘生貟違者依貢舉兩處應舉法並從之禮部狀勘㑹國子生依條以二百人為額其解額以四十為定數自來依條若滿一百人依額解發若不滿一百人並與國學進士混試發解昨來就試近二千餘人太學解額四百七十六人昨來就試人共一千九百八十五人解發過三百九十六人并避親人在内并國子監状太學生貟上舍一百人内舍三百人外舍二千人元祐五年發解國學舉人毎五人四釐二毫一忽解一人六月十二日三省同奉詔依禮部所申今後太學舉人并國子生發解並依元祐五年發解取人分數施行吏部狀檢㑹元祐薦舉令諸路舉幕職州縣官改官者以三分之一舉充幕職官若不及三貟及有餘數聽從便謂如合舉五貟舉二貟改官一貟充幕職官餘二貟改官幕職各從其便即舉流外人充令録或換使臣者並理改官人數勘㑹所舉不及三貟及有餘之數為本條有聽許從便之文不分所舉改官幕職貟數以此就優皆許改官致今來吏部待次改官人數稍多欲將上條餘數聽從便貟數並權改作奏舉幕職官其不及三貟者即通計三年合舉貟數以三分之一舉幕職官謂如舉二貟者前一年舉改官二貟餘二年各舉改官幕職官各一貟合舉一貟者前二年各舉改官一貟餘一貟舉幕職官共三貟仍自元祐八年正月一日為始候改官待次人稀空令吏部申尚書省從之此據編録册七年六月十二日聖㫖増入乙丑詔諸州縣長官及監糴常平斛斗官通一任内所糴斛斗如無虛費官錢可存留變易者委本州保明監糴官依糴買糧草名數等第酬奨州縣長官降監官一等丙寅徐王府記室㕘軍龔原加祕閣校理七年六月十五日朝㫖左朝奉大夫權兩浙路轉運副使毛漸狀自到任已來廵歴所至州縣取索到諸鄉第三等以上人户差役鼠尾都簿㸃檢所差色役逐處多稱不曽起置只有逐鄉五等丁産文簿縁各鄉丁産簿卒難見得差役失當唯是鼠尾都簿易為檢察雖已一靣行牒管下杭越十四州指揮諸縣各起置鼠尾都簿将所管諸鄉第三等已上人户依物力等第人丁數目衮同鼠尾排定於逐人名下注鑿逐次所差色役名目年限得替月日官貟對行簽押以備㸃檢外縁於役法未有立定明文慮諸縣不能遵守須至申請伏乞朝廷更賜詳酌申明立法行下貴得有所遵守户部看詳所造丁産文簿自合将耆户長當官供過人户稅産物力與舊簿此對依次等品量於簿内逐等下鼠尾排定遇差役依條書鑿所差色役年月日及替人姓名即人吏無由移易髙下今據本官前項申請竊慮逐路施行不一今欲申明行下諸路詳此施行若未係改造文簿去處只據排定資次於見用丁産簿内依此鑿定都省批送户部依所申施行戊辰天章閣待制吏部侍郎顧臨禮部侍郎范祖禹並為翰林學士祖禹以百禄方執政乞避嫌補外不許祖禹為禮侍在去年九月十八日時彭汝礪已先為禮侍至十一月二十一日汝礪改吏部韓川却為禮侍與祖禹並立今年六月十二日川出知頴州十六日祖禹遷内翰十八日曽肇除禮侍自是禮侍止有一人龍圖閣待制知青州錢勰權户部尚書寳文閣直學士兵部侍郎李之純為御史中丞兵部貟外郎吕希哲為崇政殿説書用范祖禹之言也中書舍人孫升為天章閣待制知應天府監察御史董敦逸言升文辭疎謬非代言之才而又懐邪挟私情渉譏斥今既加美職又付近藩與善去者無異請加黜謫監察御史黄慶基言升行梁燾鄭雍誥詞有勿䘏用人不終之言升居代言之任乃因誥命刺譏朝廷請㕘騐情實特賜睿斷以協公議詔升罷天章閣待制為集賢殿修撰權知應天府改修撰在二十二日今附見梁燾鄭雍誥詞當求全本元祐渾天儀象成詔三省樞密院官閲之庚午寳文閣待制曾肇為禮部侍郎去年九月三日十八日十一月二十一日今年六月十二日十六日當考兩浙轉運副使岑象求為户部郎中户部郎中馮如晦為集賢校理知梓州左承議郎秘閣校理劉唐老為兵部員外郎右朝奉郎程之元為主客郎中寳文閣直學士知夀州謝景温知鄧州殿中侍御史呉立禮言知潁州晏知止新除知鄧州按知止庸懦不才貪汙無耻昨任成都府路轉運使日毎巡厯州縣殊不以觀省風俗按察官吏為意専務營私誅求無厭自當投置閑散以戒貪夫詔知止知夀州知止除鄧州在十二日今附此樞密院言近言者稱蘭州諸族蕃官以骨肉為質户䖏之城中自屬漢後頗安其業請留質院如願歸族下者亦聽從便時种誼相度若各令歸族下縁與賊隔河毎嵗冰合復遣入城徒生疑惑乞増展質院且令依舊并得首領凖覺斯等状質院各有自置舍屋日有蕃客安泊資以自瞻願且於質院居住范育相度欲依軍角四等所乞又所修蕃市工料浩大昨慮夏國疑惑候邊事寕息修展勘㑹正當今來邊事所修蕃市宜俟寜息詔范育更切斟酌事宜具實以聞壬申環慶路經略使章楶奏檢㑹西賊去秋無故輙舉大衆侵犯麟州驅擄人民劫略孳畜河外籬落為之蕭條朝廷所重人命所惜民力未即討罪但絶朝貢犬羊猘狠不知創艾今春以來屢冦綏徳復以重兵壓涇原之境五十餘日肆其毒螫無所顧憚又於沒煙峽口築壘自固將為家計於此而數令勁騎窺伺邊隙貪噬之勢未有已時蓋葉普專國利其有事以為資藉包藏禍心隂謀竊據雖朝廷仁民愛物不忍生靈肝腦塗地而賊情變詐乗吾不意輙來侵擾是朝廷専以不殺為務而其實未能止殺也嚮者朝廷令諸路講淺攻牽制之法然如昨來舉數十萬衆與涇原對壘而近邊部族皆先起遣深入平夏蓋出師牽制亦有不可用之時然術固有不殺而能扼賊之咽不戰而能伐賊之謀者惟擇地築壘廹近横山以漸困之乃今之上䇿也大率此賊平日輙敢跳梁畔援少屈而復振暫服而愈驕者無他得横山之利以為資恃横山之險以為固而已今若因其冦犯築壘兩界之間以示必取横山彼如震恐所憂者疆土日蹙也彼既憂恐則休兵有期且賊之長技便於野戰中國之利所恃者城守因吾所利以奪其資用吾所恃以披其固以靜制動以逸待勞以不殺止殺帝王之師盡於此也遂乞進築洪德寨西北白馬川地名灰家觜及修復大順城廢安疆寨皆不從此據章楶奏議修入奏議進築序云不克施行楶奏甚詳今别注此下十月十二日可考檢準元祐七年二月二十四日樞密院劄子節文勘㑹陜西沿邊見各有𦂳切控扼賊馬道路以自來夏國講和未曽修築堡寨今既絶彼貢奉可以乘時踏逐地基修築奉聖㫖令環慶路經略司疾速選官帶領合用人馬親詣漢界及並漢地生界内選擇形勢要害堪作守禦寨基去處先據漢蕃地内𦂳要處選定兩處約度毎處城圍地歩大小并去見今城寨四至逺近著望去處及多少月日可以畢工子細畫圖開説聞奏仍先行計置一處合用樓櫓材植物料等百色名件應干支費錢糧候見實數具狀聞奏所有興工下手先後月日即聽朝廷别降指揮續準當月二十日樞密院劄子節文竊慮諸路所遣官不量事勢縁此深入賊境却致落彼設伏姦便奉聖㫖令逐路經略司除漢界寨基依前降指揮外止作本司意度嚴𦂳約束所遣官如入生界踏逐仰只於並漢界側近去處相度地利按視選擇即不得輕易深入本司自承準續降指揮後來觀望賊勢未敢建議遷延以至今日又累探得西賊七月已後便欲㸃集揣度姦計未有歸順之心若不先事開陳竊恐有失機㑹遂於環慶州界合踏逐到可以修建城寨利便去處尋選差權本司幹當公事种建中計㑹皇城使權第二将折可適宫苑使本路兵馬都監第三将張誡親詣逐處相度形勢利害堪與不堪守禦今據逐官申逐處形勢並係要害堪作守禦城寨及約度到逐處城圍地歩大小并去見今城寨四至逺近著望去處及約度到逐處合用樓櫓材植物料等百色名件支費錢糧下項一處環州洪德寨西北白馬川地名灰家觜在邊壕内係漢界生地南至見今守坐白魚峰四里東至洪徳寨二十里西北去界壕不逺依山據險兩靣皆是天塹正當青崗峽口控扼得青崗峽相濟干川同家川三處賊馬來路若於此修建城寨則四靣良田約計可得千頃以來足以招置漢蕃弓箭手以為籬落不惟扼賊喉衿至於平時賊馬常由中原賀子原犯歸德州并自牛圈入帕克巴侵擾日恣剽掠一帶蕃部皆可以照應兼直北去西界清逺軍溝井水窻自來西界屯集人馬之處止是八十餘里去中路牛圏有水草處四十餘里委是要害阻固之地可以修建城寨一處慶州大順城北安疆寨東至保安軍徳靖寨七十餘里西至慶州東谷寨五十里南至慶州大順城三十五里北至西界白豹鎮三十五里雖是已給賜城寨縁城形最為便利我得之則柔逺寨大順城荔原堡一帶邊靣盡在腹裏控金湯白豹賊馬來路自隆雲川一帶部族不敢寧處賊得之則金湯白豹盡能障蔽自歡樂峯下窺漢川不踰十里卒然冦至脫莫能支賊馬據此以為家計而數出輕騎以擾吾邊則柔逺大順荔原門不敢畫開是以熙寧中賊築壘於此本路三寨枕戈而寢萬一賊復來占據将見慶州東北百里便是賊巢不可不慮也其廢安疆寨兩靣亦是大澗因險起城費工極少成中故井猶在四靣良田僅二千頃往年未廢以前贍養漢蕃弓箭手千人尚有餘地其故城雖已廢毁大率版築處不多且順則與之違則取之自於朝廷無所不可右謹件如前勘㑹版築之興貴於神速須當預行措置物物具備其樓櫓城門倉庫舍屋合用材料並須成就只令以檢計慶州大順城荔原柔逺環州洪德肅逺烏蘭官舍樓櫓為名津送至逐寨然後探伺賊中㸃集人馬侵犯别路則量事勢大小分遣將兵作牽制次第出界或三五十里或百里内駐劄一靣版築約半月日可畢工比至賊人知覺城壘已就今來所請事理或城灰家觜或復安疆寨並委本司相度事勢賊冦所聚集逺近擇利興工使其首尾不相及候工畢日許令一靣招募沿邊百姓并近裏弓箭手投換分配住佃四靣田土以為藩籬仍且以一将兵馬分畨防戍候城壘堅全可以固守漸次抽那其合舖廵防逺硬探人馬亦只於近裏逓相趙那出外委無妨闕伏乞朝廷更賜詳酌如可施行即乞於三五月前密降指揮所貴不失計置今畫到圖子二本連粘在前黄貼子勘㑹灰家觜雖是剏行修築亦不須大叚添屯兵馬防守止乞從本司相度臨時於諸将下及城寨那移本路上兵六百人更權移那東兵三百人相兼防守仍乞候招刺漢蕃弓箭手及六七百人即漸次减那東兵三百人却歸元差去處其費頗省為利甚大又勘㑹廢安疆寨若復興築則邊靣東西始與鄜延德靖寨本路東谷寨相照齊一舊日弓箭手見今散在荔原堡大順城柔逺寨等處其安疆四靣原隰饒衍人所樂居只可令復舊業有不存者量加招募易為安輯其戰守人兵亦依舊權那移第三将副一貟帶領舊日所定人馬駐劄那移東兵三百人充守禦其那移東兵候邊事息日却那差土兵抵替歸營蓋今日所使防戍正兵及弓箭手多是曽經在彼之人地利土風皆所便習與剏置之處利害相逺又所遣將兵防拓支費須觀賊馬近逺事勢今且以六将人馬為率若賊勢不至重厚只銷三將人馬其城寨了日合貯錢糧只是近裏趲出人馬更不計㑹自檢準以下至此或更刪取其要癸酉桂州觀察使世智卒贈開府儀同三司追封申國公諡恭良甲戌刑部侍郎范純禮為吏部侍郎寳文閣待制知河中府蔣之竒為户部侍郎之竒建請天下金糓悉隸户部户部與諸道轉運司職事得以相通更任其責此據之竒夲𫝊光禄卿杜純權兵部侍郎國子祭酒豐稷權刑部侍郎殿中侍御史楊畏為侍御史邵伯温云吕相不知劉相亦喜畏遷畏殿院以賞其言按初除殿院二相實同議此時畏未嘗言也今自殿院遷侍御則劉相去位半年矣謂遷侍御賞其言劉相則可謂遷殿院以賞其言蓋伯温之誤也起居舎人喬執中為起居郎政目正月二十八日崔公度起郎六月十二日公度潤州執中蓋代公度者也左正言姚勔為起居舍人右正言虞䇿為左司諫䇿首論臺諫官不當用執政親戚門人以遵國朝舊制此據䇿本傳附見其全章當考必有所指也樞密院言向奉詔遇河外事宜𦂳急許勾備北將兵毋得過五指揮今請不拘有無事宜委自都總管司相度差人替兊毋得過半年輪往河外及沿河防拓仍請額外招募土兵從之熙河經略司言西蕃斯納等族背鄂特凌古奔夏國輝和爾兩界往來謀取董戩姪溪巴烏以董矩為主又蘭州沿邊安撫司探到董戩姪轄揚烏爾自西海率吐蕃輝和爾人馬去青唐城二百里駐兵有斯納森摩隆博三族歸之鄂特凌古遣弟布馮姪結察斡等率兵追捕為轄揚烏爾所敗又聞轄揚烏爾乃斯納森摩隆博族召之欲以繼董戩其鄂特凌古自承襲以來以元非種姓部族頗懷不服又據探報如此然未知轄揚烏爾與董戩是何親屬青唐部族肯信伏否於董戩是親人心歸嚮自能漸次招集不順鄂特凌古部族勢須持久而又青唐日近不與夏國通婚深恐西賊乘此釁隙援助轄揚烏爾遂窺青唐即於邊防非便苟鄂特凌古勢寡力虧求援於漢及率衆歸投若拒而不納縁係朝廷封襲之人兼恐反順西夏共抗中國為患不細若與援助接納又轄揚烏爾既是董戩苗裔部族信伏於理未見其可未審何以措置可無後患詔范育審探的實精心講慮預為謀畫密具方略以聞溪巴烏即轄揚烏爾也據隴右録羌人不敢斥溪巴烏名呼為轄揚烏爾經略司及沿邊安撫司各奏故稱號不同汪藻青唐録誤載此事於六年六月今不取進呈新歴政目二十二日事當考丙子詔諸宗室毆縳人者斷罪外取㫖奪俸錢即朝陵上墳者毋得擕戯玩之具隨行實録六年十月壬申文州防禦使世鴻傳云故事宗室皇親既𦵏嵗時不許展省世鴻懇請上矜其誠詔聽之因著為令此事或可附此世鴻保寧節度使從信子丁丑左朝請大夫李莘為光禄少卿河東路轉運使集賢校理杜常提舉崇福宫戊寅度支貟外郎井亮采權發遣陜西路轉運副使金部貟外郎秦中權發遣河東路轉運副使左奉議郎陳師錫為校書郎太常寺言今嵗行南郊禮請於秋季内併行景靈宫六殿朝獻詔将來孟冬不罷朝獻宣州觀察使提舉明道宫李憲卒紹聖元年贈武泰節度使謚敏恪四年改忠敏舊録李憲𫝊云摩正退保山西收叛亡稍立文法衆謂可襲而取憲曰未可圖須其勢分衆潰可不戰而下遣間招其弟延正降與王韶進取河州斬九十級加東染院使新録辨曰按王韶𫝊擊摩正於觀凌城摩正敗走弟結幹延正舉族二千餘人降即非憲謀遣間今删去舊録云摩正請降或獻欵曰疑我師也憲即解金帶遣使授之摩正徑至麾下捷聞帝製詔褒美加昭宣使嘉州防禦使新録辨曰按摩正降事與神宗實録不同今删去以實録改修舊録云冬交州叛以憲為安南招討副趙卨宰相王安石曰中人監軍此唐叔世故事不可踵罷之新録辨曰按神宗實録憲縁與趙卨紛争而罷非安石以中人監軍為言而罷今刪去以實録改修舊録云元豐四年諜言夏國有内變詔五路出師問罪憲領熙河兼秦鳯建大将旗鼔以節制諸軍倣部隊竒正李靖六花陣蕃漢各為一法前鋒遇賊敗之斬首三千級獲首領一十一人馬二千匹復攻喀木族討平之翌日北下蘭州三日至攃珠川攻楚隴薩卜宗二城㧞之斬千餘級獲首領十三人餘黨赴水死降者三萬七千人憲以蘭州古金城地土壌衍沃美水草漢書所謂臯蘭下者最為河湟要害奏請城之版築方興羗人隔河而寨憲募死士絶河夜斫其營旦輙引去憲謂諸将曰賊盛兵以來不戰而去必有謀也彼見吾具舟筏聲言渡河欲入凉州必引兵由㑹州渡盤泊設伏於鐵毛山将我師今第行墮其䇿中可以有功行次努扎山獲生口問之果然檄王文郁總行營事賊以輕兵迎戰我乃先設伏於北山下戰才接我師偽遁賊縱騎薄之伏發賊之先鋒殱焉斬千餘級㑹天大霧蕃漢相紛拏久不解又追斬二千餘級引兵乘勝上天都山廹鼐摩㑹次葫蘆河師行千里轉戰累日下一州兩城斬獲萬計士馬罷極恐無以自還遂奏班師是時四路出師皆不至所期諸将無功相繼以罪去而憲獨免復上攻守之䇿及進築五利新録辨曰按五路出師一叚與神宗實録所載不同今删去以實録改修舊録又云賊入蘭州乘冰渡河守将王文郁縱騎擊之冰䧟賊溺死餘兵忿攻破西關殺官兵将吏降宣慶使新録辨曰按賊入蘭州一叚與神宗實録所載不同今刪去二十一字舊録又云憲籍本路蕃兵五都各為一将以漢官都同總領部曲麾幟族分户别援桴鼔之勇怯盡應具數以聞詔著為令新録辨曰詔著為令不見於實録今刪修此事當考舊録又云哲宗即位㑹臺劾皇甫旦獄具憲坐奏事異同罷内省職事降永興路都總管先是神宗委憲招納董戬斷夏人右臂憲遣皇甫旦使戬戬猶豫且報不實故連坐責自請提舉西京嵩山崇福宫言者不已降宣州觀察使提舉亳州明道宫又除右千牛衛将軍分司南京居於陳未㡬復觀察使提舉明道宫卒年五十一新録辨曰按皇甫旦事與神宗實録所載不同今以實録刪修舊録又云神宗以英睿不世之略當中國全盛時憤西夏䲭張思有懲艾患将帥乏材當食太息憲以中人侍帷幄備聞謨訓俾臨制閫外遂能恢斥疆土降其渠率置陣行師有名将風烈至於决勝料敵雖由中覆皆中機㑹詔書具在凡三百篇憲奏議七十巻經制財用三十巻藏於家新録辨曰憲勞民傷財以取不毛之地靈武之期永樂之援以逗遛敗事不誅幸矣而云恢斥疆土降其渠率置陣行師有名将風烈欺誕為甚今並刪改按新錄辨舊錄凡七事其第五事當考新録辨誣合随事附本年月日則此可削先是水官建言河齧元城第二埽請於大名之北築隄以䕶京城詔遣朝請郎黄思總役事度長十七里有畸凡民冢之當道者一百六十餘所桑棗諸木八十餘本廬井九區當盡撤毁期有日矣魏人號訴於外臺者足相踵也雖人知其非莫有敢言者轉運副使趙偁至部之明日乃率同列視元城埽曰是何足虞議者之張皇妄爾因約同列辨其事同列曰河流衝溢豈人力可測一日失備罪不細柰何欲保其無虞耶偁曰不保何以信朝廷衆笑而不答偁度同列不可約乃獨上疏請增貼本埽罷築䕶城隄因陳本埽易固䕶者凡五事曰諸埽危急多以水行地上今本埽水行地下深者三丈餘而本埽居上猶髙二丈四尺一也水行地上漲則抺岸今本埽西有廣灘散漫百里才漲數尺即已西傾二也去嵗灘生西岸激水東注今春以來蕩刷殆盡三也昔日埽嘗湍走猶能固䕶比復實墊勢已安定四也旣本隄勢力益壯備禦已至斷可無虞五也又言無益有害者凡八事辨論激切且自請以極典任責䟽奏未報水官檄府縣遷民冢有未舉者官為徙之偁復上言論利害力請罷役於是黄思興工方二日而詔罷之魏人聞詔鼓舞相慶明年第二埽又墊水官復請修䕶城隄增廣為二十七里詔賜度牒募夫調役兵復遣黄思期以五月舉事方是時偁被命恤按刑獄至趙州遽得報即復奏言臣嘗有請獲罷此役有司以先建之議必欲求遂今以有司旣遂之請朝廷重行之命臣雖言何益竊自惟念幸逄聖明在上軫恤民隠未嘗拒言豈可知而不言自陷欺已不忠之罪且北京之東昔行全河澶淵河流頃貫城内皆未嘗築䕶城隄而卒無虞者官吏謹於固䕶也今元城第二埽水行平順埽下亦有生灘勢自可固雖有司欲遂已陳之請而民實何辜祖宗河制謹嚴嵗使結罪比年有司不欲任固䕶之責為已私便上下官吏欺蔽成風偷安弛職不恤民物亡事則受賞有急則議棄其自為謀誠善矣不識設官分職顧何恃焉願以雇夫萬人増修逐埽罷䕶城隄㑹魏人邀訴使者或議渡河求偁以告之於是安撫轉運司亦言其不可詔遂罷役此即政目六月七日所書大名府路安撫司奏乞差黄思提舉築䕶城隄本末也趙偁行状紹聖二年八月户部貟外郎陳察所作當删修附六月末
