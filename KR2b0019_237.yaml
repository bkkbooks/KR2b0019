body:
  text: 續資治通鑑長編卷二百三十三宋李燾撰神宗熙寧五年五月庚辰朔御文德殿視朝命供備庫副使陳圭管勾作坊造斬馬刀初上匣刀樣以示蔡挺刀刃長三尺餘鐔長尺餘首為大環挺言制作精巧便于操擊實戰陳之利器也遂命內臣領工置局造數萬分賜邉臣斬馬刀局蓋始此八年四月二十八日并五月十七日可考召東作坊使廣南西路安撫都監兼知欽州石鑑赴闕將議經制南北江也召石鑑據御集經制南北江在此年閏七月其月二十一日以鑑為湖北鈐轄今先見于此又恐初召鑑時非為南北江㑹劉䇿死因令鑑代䇿耳閏七月六日日録石鑑雍州人知峒丁次第辛巳詔以古渭寨為通逺軍以王韶兼知軍古渭唐渭州也自至德中陷于吐蕃至皇祐中始得其地因建為寨上將恢復河隴故命建軍為開拓之漸先是上嘗言古渭可建軍王安石曰蕃人但見貴種則已恱慕附從若說以中國威靈而懷之以道何憂不集近羌夷盡來古渭決曲直既盡來則易成臨長之勢臨長勢成則化為內地不難矣上乃遣劉宗傑往與韶及髙遵裕議之而降是詔上因論郭逵韓絳議小城寨不可併云我費人彼亦費人併則我省人在我之利害等爾安石曰秦與六國並時秦併小邑為大城而秦終以强蓋如孝公者有謀略能完其氣勢茍有入吾地者雖小獲利吾能報之以大害故雖無小城寨而敵不敢犯也茍不能如秦有謀略則不免多置小城寨矣郭逵韓絳議見二月五日於古渭無與也朱史强附見今不取是月二十四日癸卯王中正乃往秦鳯緣邉司更詳之四年十二月四日劉宗傑代吕大忠立秦鳯封溝上批付中書近不往據雄州繳奏北界涿州來牒理㑹白溝增修館舍及添駐兵甲事未知因依虛實可令緣邉按撫司勾當公事李舜舉提㸃刑獄孔嗣宗密切仔細體量詣實事狀速具聞奏仍各實封劄與此據御集舜舉代李憲勾當見御集五年四月一日樞密院上開封府界諸縣教閲法令有五指揮處日輪一指揮赴都教場都監監押臨視無都教場即就本營日一教事藝疏者日兩教應輪當赴教指揮內守衣甲巡倉之類亦差人抵替子垜方一丈射帖方二尺五寸距所射五十步弓以九斗八斗七斗為三等弩以二石七斗二石四斗二石一斗為三等槍刀手亦以事藝之髙下分三等遇旬休節假請衣糧草日及為雨雪沾濕并許權住教餘分四日初射等第弓弩次射親次打陳次射周而復始提舉官所至縣因教閲日並以酒食犒軍員如春秋大校其弓弩手射親并床子弩炮手並支銀楪在京及京東西教閲准此詔從之其開封府界仍差官提舉四年九月二十四日初教閲今年五月七日議畨上詔修金明池橋木止用常材先是發運司調橋木悉取嘉樹幾千計而上以游燕不急之用懼勞逺民故也詔宗室非袒免親許應舉者試策三道論一道或大經議十道初試黜其不成文理者餘令覆試所取以五分為限人數雖多不得過五十人纍覆試不中年長者當議量材録用新紀書云宗室非袒免親應舉法舊紀無此癸未內藏庫副使知儀州郭固同編修經武要略詔密州觀察使向傳範所占陕府等兵級二十八人可罷歸以剩員八十人代之先是上患近臣戚里多冗占吏卒命提舉司勾當公事錢昌武磨勘減放而傳範輒抗章請留上曰朝廷立法當自近戚始奈何以傳範撓吾法故有是詔又詔塞決河逃卒許首身與免罪死者人給本家三千京東夫及本路續發急夫適妨農時及京東夫以道逺並免户下支移折變一年部夫官以功料不及被劾者案上取㫖京東部夫官任滿注家便官以上批黃河大役今已休工宜有寬恩及勤事者故也又詔增中書審官東西三班院吏部流內銓南曹開封府吏祿其受賕者以倉法論上曰中書吏俸已厚恐堂後官已不受賕矣王安石曰中書下等吏人亦多是近上吏人子弟恐未免受賕也今欲清諸司即宜自中書始今所添錢除用坊場稅錢外合支三司錢二萬六千緡然坊場錢方增未已亦恐所支不盡三司此數若行此法即自中書至諸司皆不受賕亦足觀示四方聖政之美也前人稱孔子為政亦以賔至不求有司為善上曰然朱史移此段附三年八月癸未蓋失先後之序今移日録仍見本日上問王安石見秦州衙前分析摩正事否安石曰已見了初秦州遣人往董戬所摩正坐之庭下又緣路多打撲財物過洮河東即一如漢界不敢復打撲阻留此王韶招納之效也上言要招納須用威乃能成就安石曰如摩正極易取但令邉將先隂厚撫結摩正下首領使其心內鄉又善撫初附令彼首領見而慕羡則摩正孤特若取之則取一夫而已何難之有摩正既取則董戬夏國皆知懼如董戬亦非難取也上曰邉將誰能辦此王韶能否安石曰此事非王韶髙遵裕不能辦也八月丁亥可參考先是河東轉運司言梢草必不辦既而程昉自辦之上令勘張問等與昉轉一官至是再進呈乃下提㸃刑獄司復案昉所買梢草保明聞奏及問等分析乙酉賜摩正細衣著百匹翠毛細花錦旋襴一領以其進藥物故也丙戌供備庫副使知豐州髙遵裕遷五資令再任仍特支賜以河東經略使劉庠言遵裕修展城壘繕完兵械約束邉吏不敢邀功生事故也詔開封府界諸縣保甲願飬馬者聼仍令提㸃司於陜西所買馬除良馬外選驍騎以上馬給之嵗毋過三千匹先是中書與樞密院同進呈保甲養馬事文彥博曰此事須經羣牧司相度上曰此何與羣牧司事韓維又新到只朝廷相度羣牧司官識見必不能及逺彥博又言三代有邱乘出馬又有國馬國馬不可少王安石曰三代用國馬多以用車故又有田馬以備田事今既無田事即又無用田馬吳充曰今法欲令馬死即民間賠備元馬恐不便安石曰今法若不願别買馬却但償價錢别召人買充曰亦恐民間少錢安石曰此法已令諸縣曉諭百姓多以為便有千五百戶投狀充曰大抵言情願者皆官吏驅迫安石曰若官吏驅迫即是諸縣等第均敷今但有千五百户投狀必非驅迫彥博曰如體量和買草河東和買亦名為和買俱不免驅迫上曰此即是均敷均敷即自來驅迫若非均敷則非驅迫可知彥博曰緣官吏或冀望升擢差遣故上下相䝉以强抑為情願不可不察也安石曰必無此事近事但有沮壞朝廷法令即為衆人所助朝廷曲示含容至于奉行朝廷法令即自為衆人所窺伺攻沮朝廷有所聞亦未嘗少假貸如兩浙西路但聞遏抑訴災傷百姓催迫常平物初未及究見所聞虛實便專遣使案察李瑜周約議助役事亦未及推問便罷其差遣李瑜罷在四年十月九日周約時為刑憲如此則但有觀望不敢應副朝廷行法之人無緣敢抑勒百姓以趨赴朝廷所欲興作若抑勒百姓即百姓何緣不經待漏出頭打鼓進狀經待漏出頭即陛下理無不知打鼓進狀即陛下理無不見陛下既知見理無寬貸官吏不知何苦須要抑勒百姓為䝉蔽之事彥博曰李瑜周約尋即牽復安石曰瑜約自為推究得無罪自不當絀責充等又言恐揀却好馬兵士怨望安石亦以為無害上曰此是令保甲養馬又是揀好馬與保甲于兵士有何可怨他日上批付中書保甲浮浪無家之人不得令習武藝安石曰武藝絶倫又纍作凶慝若不與收拾恐生厲階上曰可收拾作龍猛之類安石曰須隨材等第與收拾上終慮浮浪人習學武藝為害以保甲法不如禁軍法嚴密安石曰保甲須漸令嚴密縱使其間有浮浪凶惡人不勝良民之衆即不能為害臣近口奏但未條上欲令保户代巡檢兵級上畨日除破飲食外所餘錢糧各令以武藝等第較取又分武藝為三等災傷已上五分即賑以斛斗自十五石至五石若有武藝髙彊慮其為患之人即才五分災傷已受十五石斛斗若較取錢糧之餘一嵗又可得五七千冬閲免體量草夫役又可得草數千若更有盜賊追捕即又得賞錢至厚如此即有武藝之人豈肯捨此厚利却欲作過即衆不勝寡不能為患至其無藝之人但當恤其貧困不憂其能為彊梗也若作賊盜即但為保衆取賞之資而已可無慮者上慮嵗久錢糧不給安石曰巡檢下六千人每千人嵗約三千貫是一嵗費十八萬貫今若罷招此六千人却以保甲代之計所用錢糧費十八萬貫尚剩十萬貫以十萬餘人替六千人又嵗剩錢十萬貫何至憂不給也教閲至一二年便令保正募征行者六千人必可得况但要守衛京師而已若嵗嵗閲教保丁又封樁所剩錢十萬貫則非特畿內守衛日彊兼亦財有餘積宗廟社稷之憂最在于募兵皆天下落魄無賴之人尚可與之守社稷封疆况於良民衣食豐足者衆復何所虞然此事非陛下躬親庶政上下無壅亦行不得養馬事向時民間以官馬為有尾禍祟豈敢請官馬今民間爭養馬亦足見朝廷政事粗為百姓所信知其後無擾害故也易曰觀民也但觀民如此即我所生可知也此月二日又二十二日并七月五日可考丁亥右監門衛大將軍仲奚領交州刺史以學士院試大義論中等故也上出西邉探報云董戬子與秉常妹為婚王安石曰洮河一帶內附董戬不能不憚與秉常結婚理或有之上憂其合安石以為在我而已此不足慮上又言摩正驕蹇安石以為可令王韶等以計取之若得摩正即洮河一帶皆當為朝廷致死無所不可緣羌惟畏大種摩正既禽即威申于諸羌馮京以為摩正不犯中國何須如此上曰中國遣使人去却坐之堂下又言語悖慢豈得為不犯京曰漢文帝於胸奴但來則禦之而已未常與校上曰漢文帝與馮唐言寢食未嘗忘李牧豈是不欲與胸奴校要安疆場須威足以制乃能無事安石曰漢文帝固不如文王是伐是肆是絶是忽故能四方以無拂然後民始附可以有臺沼之樂先王以天保以上治內采薇以下治外未嘗不始于憂勤然後終于逸樂今摩正河州刺史也以區區萬人之聚乃敢陵侮如此我以天下之大四夷不敢伐不敢忽非文王之事也且元后作民父母使疆場之民為諸羌所陵豈為得已然此事要以謀不可以力當居百全之地以制諸羌之命而已四日癸未可參考戊子樞密院檢詳兵房文字朱明之言內殿承制已下願換文資者乞不須三代及親屬曽任文資之家從之庚寅詔延州通判范子儀為鄜延路定立界至官替張穆之初穆之被詔與夏人于界首議事穆之擅令保安軍北巡檢張藻招夏人就本軍㑹議經略使趙卨以聞文彥博等謂穆之生事邀功違元降指揮上曰只委趙卨自可何用穆之王安石曰臣初但欲委諸路經略使陛下必欲差官然差亦無傷于委任將帥昨所差官但令與本路商量耳兼將帥實有欺罔不可信者得朝廷所差官去則奏報不敢為欺上曰如此即無傷穆之乃不肯與本路商量妄作安石曰此自是穆之違元降指揮非指揮失當也故令子儀替穆之穆之立環慶溝封在去年十二月四日不知何時改鄜延青唐大首領裕囉格勒為西頭供奉官初議裕囉格勒官賞上欲與內殿崇班厚賜之曰必足以鼓動其餘生羌安石曰此事當令王韶髙遵裕斟酌申奏朝廷應副若朝廷直除與內殿崇班即裕囉格勒自以朝廷奬擢不由緣邊安撫司驕抗不肯聽服却令安撫司更無可驅誘此一不便也又恐其餘首領互相比較合要恩奬一有不得却生怨望二不便也天下之勢如心使身身使臂臂使指乃得安利今朝廷自要驅誘裕囉格勒輩即是以身心使指全不由臂事勢非便莫若令王韶輩委之以事隨事大小與官賞則輕重緩急不失事機又必得裕囉格勒輩為實用上悅曰苐恐王韶不敢更乞與裕囉格勒官安石曰陛下因中人諭指可也上曰中人傳諭事意多不盡安石曰陛下以手敕諭之亦可上曰只卿將書說與安石曰近為韶有公事得韶書都不曾敢報答上曰與書何害上又欲便除裕囉格勒蕃部刺史安石曰恐未須如此但令韶相度最便文彥博曰近者恱逺者來裕囉格勒官賞若過厚則舊蕃部或不樂上曰事勢大小自不同安石曰誠如此邁凌錯吉事力豈裕囉格勒之比上曰邁凌錯吉四百户裕囉格勒號為十萬衆縱甚少亦必數萬乃從安石議下安撫司而有是命仍寵以階勳賜姓包名順西羌裕囉格勒既歸朝至閣門引見謂押伴使曰平生聞包中丞拯朝廷忠臣某既歸漢乞姓包神宗遂如其請名順其後熙河極罄忠力此據李復圭記聞恐所聞或非實當考四年十二月十八日初授殿直太常丞權監察御史裏行黃好謙權通判潁州以母老自請故也辛卯詔北界多不循舊規近頗生事慮别蓄姦謀可指揮河北河東厚以錢帛募人深入刺候動靜以聞兩朝誓書冊內載熙寧五年雄州奏職方員外郎王珫與監𣙜場侍禁李端彥於白溝界首橋南幕次內與北界差來左衙戴從省坐定依例般第一㑹絹二千匹去橋中心排垜定有北界永豐庫揀子揚元亨㸃過大數二軍人數過小數從省令元亨解開絹束逐匹看覷并托量丈尺端彥等靣與右衙從省理㑹信好之物久來交割不曽有此體例從省稱為今次宣命指揮從省交割時一匹匹㸃檢看覷當裏靣别無小損破弱即行交割不云生事從省又云設使一色好絹亦須剩住幾日交割圖表仔細云云州司勘㑹久來交絹體例每二千匹作一㑹只事逐㑹㸃數來交割不曽差人解拆絹一匹匹看驗量托今來若縱令如此揀選量度不惟邀難住滯深恐頓失事體仍慮節次别生事端無有了期云云兼稱自去嵗以來凡交割銀絹逐次北界須作邀難再三整理方循舊例今來又有生事若不作理道略與約勒切慮北人轉生枝節州司看詳若便曲與隨順令一匹匹托量㸃儉交割不惟有損事體又緣北人方當生事之際切慮愈生侵慢之心深為不便本州已牒王珫等更且伺候三兩日須是以久來體例交割去訖五月十二日奉聖㫖令雄州執守理道婉順商量依自來體例交割不知後來如何交割此韶稱北界多不循舊規蓋指此等也今附注本日王安石以王韶書進呈韶言已拓地千二百里招附三十餘萬口韶本傳云韶上所降蕃部版圖得地二千餘里口二十餘萬朱墨并同乃與韶書異當考然此特衆人以為異效韶所欲為朝廷施為此尚未髣佛料相公亦不止期韶以此恐勾當人各欲保守見功無復奮勵向前之意安石白上韶如此誠善今三十萬衆若能漸以文法調馭非久遂成漢人緣此本皆漢人故也韶言募到勇敢九百餘人耕田百頃酒坊三十餘處蕃部既得為漢人蕃部賤土貴貨漢人得與蕃部交易即漢得土蕃部得貨兩各得所欲而田疇墾貨殖通蕃漢為一自然易以調馭因令韶如諸路以錢助役收息又捐百餘萬緡養馬于蕃部且什伍其人奬勸以武藝使其人民富足士馬精彊因奮而使之則無所不可今蕃部初附如洪荒之人惟我所措置而已上曰摩正須早剪除安石曰豈但摩正董戬夏國皆在我所措置而已諸路自可髙拱無事上曰今雖已招納得却用不得安石曰韶本謀至今一一不愆于素今已見端緒自此以往日見成效不憂用不得但要陛下明察毋令異議擾之而已韶獄事了若召來喻以此㫖必能濟集上曰髙遵裕已來便可以此指喻之壬辰以大理寺丞都水監主簿周良儒為殿中丞先是良儒言汴水每年口地有擬開次擬開擬備開之名凡四五處雖舊河口勢别無變移而壕塞等人亦必廣為計度蓋嵗調夫動及四五萬因此騷擾百端民間良田莊井或標作河道或指為夫寨以致洛孟汝蔡許鄭之民仍年差調力困不勝加之嵗用物料不訾積年之弊習以為常止如四年春創開訾家店地役夫兵四萬餘一月計一百二十餘萬工才及三月尋已淺澱應舜臣請復用舊口役工才萬餘止計四日而水勢順快由此觀之若河依舊掠南岸止使舊口地為便于是遣良儒相視而良儒又言以今春河口可役夫三千八百五十一人一月計一十萬五十餘工比之四年所役工十減八九其糧食物料不在數而都水監亦請從良孺所陳故奬及之四年十月末應舜臣請汴口即用舊處河陽三城節度使守司空兼侍中曽公亮為集禧觀使知梓州少府監趙尚寬為司農卿直龍圖閣提舉河東路刑獄光祿少卿髙賦為祕書監直龍圖閣知滄州通判殿中丞張恂提舉京西路常平等事先是王安石為上言髙賦興水利事功甚多賦在唐州縱無此功亦合為提㸃刑獄向以人言放罷初未沾恩欲再勘㑹推賞上曰善於是并尚寬恂等進呈上諭執政曰尚寬等在唐州闢田疏水招輯人户殆無曠土已有成效宜宣布治狀並與加職以勸天下愚民可與樂成難與慮始朝廷興作如實知其利假令彊率以就功緒當亦無害但不可不實耳上又論人有才不可置之間處因言漢武帝亦能用人材王安石曰武帝所見下故所用將帥即止衛霍輩至天下户口減半然亦不能滅胸奴上曰武帝自為多欲耳上諭執政曰人主舉動不當有欲以害政安石曰欲亦不能害政如齊桓公亦多欲矣而注厝方略不失為霸於天下能用人故也上曰漢武至不仁以一馬之欲勞師萬里侯者七十餘人視人命若草芥所以户口減半也人命至重天地之大德曰生豈可如此安石曰不仁如此非特人禍隂陽之報亦豈可逃也上曰有政事則豈特人得其所鳥獸魚鱉亦咸若如數罟不入汚池即魚鱉亦得遂其生長矣安石曰誠然先王所以澤及鳥獸草木非特政事而已其德義之至乃能至天地協應故興雨祁祁有淹凄凄者周人盛時之詩及其衰也饑饉札瘥應其政事變雅所刺是也蓋人和則天地之和應人不和則天地之和不應自然之理也上曰堯舜時鳯凰來儀固不足怪詔賜京東路去年今年上供年額糧斛八十七萬緡為在京市易務本錢糾察在京刑獄祝咨言百姓犯罪御史臺差文臣就本司同録問取伏狀方奏斷蓋欽重刑獄以防出入之弊其殿前馬步軍司軍人犯死罪乃止牒審官西院差大使臣録問緣大使臣少通法意乞依開封府例牒御史臺差官就逐司録問又言三司檢法官及開封府法曹功曹參軍遇有闕乞于新試中法官人內差填並從之中書言宗室改官欲自觀察使以上令大宗正司檢舉保明申奏中書以例施行其正任防禦使以下止令本司檢舉依審官東院京朝官磨勘例取㫖候印畫訖降付中書給敕告外任宗室依外官例令所屬施行從之詔妃主臣僚為醫官乞恩毋得至直翰林醫官院以上先是陳國長公主奏乞太醫丞李永昌遷直翰林醫官院詔與一子醫學仍别立法遂定此制東上閣門使樞密都承㫖李評喜論事往往施行然天資刻薄在閣門及樞密院招權不忌多布耳目采聼外事自效以為忠僥幸大用中外側目又嘗極言助役法以為不可王安石尤惡之極言助役不可此據四年六月二十三日日録今附此不别出初紫宸上夀舊儀但言樞密宣徽三司副使不坐而故事親王皇親並坐惟集英大宴乃有親王駙馬都尉不坐之儀時評定新儀初無改易而遽劾閣門吏不當令親王皇親駙馬于紫宸預坐以為不遵新制賈佑馬仲良皆坐免官王安石具奏評所定自不明而輒妄加他人以非罪上亦言儀制錯亂不可用詔評論列不當與閣門官吏俱放罪已而評訴上前自謂所論列非不當上批付中書令再進呈放罪指揮安石執奏閣門官吏無罪評所論列誠不當賈佑馬仲良差遣不應罷又王昭序與佑仲良俱被劾及罷佑仲良乃遣昭序代兩人者陛下未嘗作好惡豈可令評作好惡凡作威作福固陛下之任然臣職任輔導陛下以義如此與奪不可謂義一人橫行於天下武王以為耻近在殿陛左右使橫被摧迫有內懷不平之人何以為天下主作民父母陛下若自作好惡雖有過當尚令人畏陛下若令他人作好惡即恐威福為人所竊臣豈與評爭校枉直但義當如此上終以評所定儀制于舊儀制固未嘗增損非新儀制不眀閣門吏既見相傳坐圖與儀制坐圖差互不同自合申請乃一靣用相傳坐圖貼定評劾之不為不當詔閣門吏特放罪安石又執前奏上曰若新儀制果不明亦非獨評罪安石曰中書但言新儀制不明固未嘗專罪李評所定儀制既如此不明乃妄劾閣門官吏此則評之罪也上曰評固有罪然亦未始罪評也此假據御集并日録刪修上批付中書昨為李評論列閣門誤用同天節上夀儀不當特與放罪今召問評子細評所論列乃無不當可再進呈取㫖中書奏已奉㫖新定上夀儀制不明閣門官吏並不陳請特放罪又批新定上夀儀制與舊儀元不曽更改即非新定儀制不明所有閣門官吏不合既見相傳坐圖與儀制內坐圖差互不同不申明取㫖便一面用相傳坐圖貼定特與放罪速改正行下又批付樞密院評以改易文字令取誡勵適延和奏事因問得仔細及人吏不曽明言已經樞密院副使更定輒用已意改易數十字然評自謂實有鹵莽之罪察其用心蓋亦無他止緣于職事不敢茍且在理固宜矜假可特與免罪林希載評事尤詳今附注評出知保州時希云評誤排軍員坐必希所聞不審也評出知保州在七月戊辰癸巳司農寺丞蔡天申請河東經略安撫司亦置常平倉其條約並如陜西上批麟府豐三州蕃户方之陜西諸路尤為貧乏宜依天申所請于近賜陜西紬絹數內撥合賜涇原鄜延路五萬匹為河東本錢詔摩正弟董古以下諸酋領各轉補及賜茶綵有差甲午上謂王安石等曰蔡確論太學試極草草馮京曰聞舉人多盜王安石父子文字試官惡其如此故抑之上曰要一道德若當如此說則安可臆說詩書法言相同者乃不可改安石曰柔逺能邇詩書皆有是言别作言語不得臣觀佛書乃與經合蓋理如此則雖相去逺其合猶符節也上曰佛西域人言語即異道理何緣異安石曰臣愚以為茍合于理雖鬼神異趣要無以易上曰誠如此馮京言西北闕人教授王安石曰教授必可以為人模範者非其人不若令習近人著述文字上曰西北人誠是茫然未有歸著安石曰西北人舊為學究所習無義理今改為進士所習有義理以學究為進士于士人不為不悅去無義理就有義理于所習不為不善其舊合放解額並還本路東南士人不能侵奪於士人乃無所損既無所損而令士人去無義理就有義理脫學究名為進士此亦新法于西北士人可謂無負矣京曰西北人魯難變安石曰舊科人雖不盡變十須變三四後生即往往盡變凡革舊為新亦須期成效在十年之後也是日王安石留身乞東南一郡言久勞乏近又疾病恐職事有隳敗纍陛下知人之明上甚怪安石如此曰卿豈所懷有不盡當為朕盡言之朕何嘗違卿或是為李評否安石曰臣非為此也自二月已來即欲自言若得一二年在外休息陛下不以臣為無用臣亦不敢告勞上曰卿有何病必有所為但為朕盡言天下事方有緒卿若去如何了卿所以為朕用者非為爵祿但以懷道術可以澤民不當自埋沒使人不被其澤而已朕所以用卿亦豈有他天生聰明所以乂民相與盡其道以乂民而已非以為功名也自古君臣如卿與朕相知極少豈與近世君臣相類如馮京文彥博自習近世大臣事體或以均勞逸為言卿豈宜如此朕頑鄙初未有知自卿在翰林始得聞道德之說心稍開悟卿朕師臣也斷不許卿出外且休著文字徒使四方聞之或生觀望疑朕與卿君臣間有隙朕於卿豈他人能間卿有不盡但為朕言安石曰臣荷陛下知遇固當竭死節然誠以疾病衰耗恐不能稱副陛下任使之意極不敢造次及此言但久自計度須至上煩聖聼臣亦見馮京文彥博近皆乞去不得臣極恐陛下未聼臣去不欲為此紛紛然熟計須至如此乞陛下詳察安石退上留之戒以勿入文字如是者再安石曰臣領聖㫖未敢入文字候一二日再乞對上曰勿如此終不許卿去外人顧望恐害事陳瓘論曰熙寧之初神考以安石為賢自鄧綰黜逐以後不以安石為賢矣安石退而著書憤鬱怨望當此時傲然自聖于是書託聖訓之言曰卿朕師臣也乂曰君臣之義重於朋友朕既與卿為君臣宜為朕少屈此等不遜之言託于聖訓前後不一又謂吕惠卿亦師臣也又謂如常秩者亦當屈已師之惠卿師臣則假曽公亮之言常秩可使則假張戩之言神考常謂常秩不識去就之人而可以為聖主之師乎况張戬言行出處自有本末豈有崇奬不識去就之人而請聖主師之哉神考以堯舜之道光宅天下髙厚如天地光明如日月安石乃欲與吕惠卿常秩俱為師臣輕慢君父不亦甚乎其事矯僞臣故擊之於寓言乙未詔西京左藏庫副使白玉男昭信昨於荒堆遇賊與其父血戰致西賊敗走然以將官子弟於法不許論賞可令引見取㫖後補三班借職賜銀帶袍笏丙申王安石白上劉希奭向為郭逵遊說言頗涉欺罔陛下記憶否恐如此人不宜尚寄以耳目上曰當時言何事安石曰言裕囉格勒欲來經略司出頭及助智緣幾誤陛下邉計上曰希奭言某事某事却是實安石曰若每皆不實乃是踈蠢豈能蔽陛下聰明惟言實事雜以欺罔使陛下不疑為姦蔽陛下聰明此堯舜所憂畏而難之者也且逺方事陛下既不能親近惟寄耳目於使人為欺罔最不可容上恱秦鳯路緣邉安撫司言洮河蕃部近知官有借助錢不住出漢請領緣初得朝㫖令自三月終住支竊慮以故阻節蕃情詔自今更不限時月支借如經略司錢不足以市易司錢續支又言通逺軍宜建學亦許之王安石曰种世衡在環州建學令蕃官子弟入學監司疑其事遣官體量世衡以為非欲得蕃官子弟為門人但欲與之親狎又平居無事時家家如有質子在州上曰世衡事事輒有計謀其建學非茍然也王安石又白上凡欲成大功立大事必須能見衆人所不見乃能成立如韓信用兵趙人笑之諸將陽應曰諾及其已勝諸將尚不知其所以勝也今邉奏至即衆人共議以為可始從之衆人亦安能見衆人所不見此恐雖有韓信亦未肯為朝廷用也上悅安石又曰雖韓信亦不能不敗用將之道茍如其才雖一敗宜寬貸上曰如燕達雖即大敗已赦其罪矣上又曰今誠是未可用兵之時事事未有可用又言雖夏國用兵亦似勝我安石曰夏國主昏亂微弱然庸人習見慶厯以來元昊時事自有憚彼之心彼亦習見舊事又見我邉將尚畏避之如故亦不深自知其微弱也馮京言夏人舉國來我常以一路當之所以不抗上曰只一路若有好將帥豈不足以當夏國丁酉户部判官吕嘉問言畿內酒坊等處連三竈嵗省柴四十餘萬斤推之府界陳留一縣省三十二萬斤約諸州嵗省柴錢十六萬緡先獻連二竈法三司軍將王靖變連三竈法虢州民常震並乞加賞詔王靖遷大將減磨勘五年常震不理選限試國子四門助教仍賜曹州酒坊錢三千緡降左藏庫副使知保德軍髙渙為右清道率湖南監當以河東經略使劉庠言昨知太原府吕公弼為遣兵條寨于生地本司差渙都大提舉纍牒不至既而渙移府言素不習匹夫驍捷之能兼繳奏檢稱萬一不為在上者節制驅策俾專統三五萬衆蕩平凶寇臣願盡力初婁城之役渙實憚行而外為大言朝廷素已聞知及是上謂輔臣曰渙違節制吕公弼不能行法朕方責邉臣以事效如渙之選懦詐誕不黜無以勵衆故有是命仍令進奏院遍牒諸路戊戌提舉京西常平等事陳世修言乞于唐州石橋河南北岸疊石為馬頭造虹橋架過河道於橋梁之下挖透槽橫絶過河引水入東西邵渠灌注九子等十五陂則二百里之間經冬水利均浹詔知唐州蘇涓覆視如實即委世修提舉創造後以涓守土難出乃詔廢本州簽書判官置通判一員令視水事仍用前簽書判官龎昉為之從轉運及提舉司請也置通判乃六月十二日今并書已亥宣慶使文州團練使入內副都知李繼和卒其子從善乞用例加贈上曰此例尤為弊事昨贈石全彬以先帝隨龍故也繼和無軍功豈可用此例乎辛丑命崇文院校書王安禮專一編修三路義勇條貫此據御集五月七日丙戌六月七日乙卯七月十三日庚寅十九日丙申閏七月十四日辛酉十五日壬戌壬寅詔割秦州寧逺等四寨屬通逺軍仍於青唐武勝軍并新招降瑪勒族三處地分各建一堡寨從秦鳯緣邉安撫司請也初吕公弼奏不肯割四寨屬通逺而文彥博亦言文盈關乃險厄處不可外屬王安石進曰欲彈壓羌人使其率服當令通逺氣勢增盛文盈關當考上曰欲盛則增兵可也安石曰多割寨則守兵自多若更增兵乃所以為煩費也大理寺言舊制詳斷官八員欲增二員選新試刑法改官人仍二人連書從之癸卯詔遣六宅副使王中正往秦鳯路緣邉安撫司勾當公事以謀復武勝軍故也是月辛巳詔以古渭寨為通逺軍當考駙馬都尉王師約言乞依正任例于外州軍抽差兵士宣借弗聼蓋上以主第差占親事輦官諸司人數已多故也甲辰權荆湖南路提㸃刑獄職方員外郎毛杭降一官仍徙江南路坐擅牒潭州割屬縣鄉里入鄰縣故也乙巳詔秦州制勘院見劾王韶市易司公事其命官使臣候案成除贓罪外餘並還舊任時朝廷將舉武勝之役慮隨軍闕官故也後又詔轉運使張詵專在通逺軍計置修堡寨什物錢糧先是髙遵裕以春季當詣闕奏事詔趣之韶言臣近被制獄訊問今自通逺軍抵秦州以便供答乞留遵裕在任并由經略司别遣官代遵裕行上謂安石曰韶别無事又遵裕已來安撫司殊闕人宜令韶速歸本司如制獄有所問訊即實封文字應報又令催杜純結絶曰恐人情疑懼不敢向前安石曰今韶不過以二三分心力經營邉事却以七八分精神照管防備人沮害此邉事所以難集非特韶如此凡為韶用者又皆前却不敢以三四分力向前勾當即事尤難集上曰政為與韶勾當人如此也上又曰吕公弼言董戬與夏國結親事其意又似惡緣邉安撫司若不招納蕃部亦豈能止董戬與夏國結親也安石曰董戬與夏國結親于邉事都無所計但我能親附蕃漢人使樂為用即董戬雖與夏國深相結亦不敢違背朝廷恩信况但結為婚姻豈不顧利害以國狥兒女親家上以為然五月二十六日發運司奏杭越湖三州不肯行新法捕鹽課利更虧乞根勘上從之王安石曰議者皆謂捕鹽即陷刑者衆今淮南捕鹽急遂無陷刑者如杭越湖不依新法捕鹽即犯禁者不絶上曰王者之法如江河使人易避難犯如倉法行去年止斷綱稍二百人比以前已減五百人矣且米又盡不雜軍人不須行賕此實良法也安石曰今新法關防猶未盡故雖無夾雜尚有少缺若他日關防不令少缺即此所斷人數尚可更減也安石又曰倉人尤無賴所以不免時有犯法然隨輒被告至於銓審等處即更無復敢受賕上曰不知開封何如恐未能遽絶耳安石曰聞開封府吏自言向時遇事且思如何可以取錢又思如何可以欺罔官員實無心推究人枉直自今誠恐有暇及此然經久天下吏祿恐須當盡增令優足上曰如此豈不善但患闕錢耳安石曰此極多不過費百萬緡然吏祿足則政事舉政事舉則所收放散之利亦必不少且今人吏衣食固亦出於齊民但不令以法賦之而已昨雖十餘萬緡然九萬緡出于酒坊稅錢若將來諸路收酒坊剩錢必然可足吏祿有餘也見五年五月二十六日上又曰吏受賕亦不免出於官錢耳安石曰如綱運于庫務行錢復以酒坊償之是也今公賦祿與之即不為餘人侵牟而又不至枉法害事以取賂矣安石論倉法因捕鹽及之朱史乃附見三年八月二十七日癸未於斷綱稍事尤失次今仍見本日詔廢外殿直班外殿直舊以處諸班老疾者近嵗多差外州權管廂軍所存才數人故廢之權度支副使沈起言奉詔詳定軍器制度乞下在京及三路經略司應造作軍器去處及主兵官員候見取索監造官與主兵官員躬親詢問工匠除舊來制度料例已中法度堪任施用外有無工作弊病不堪施用事件廣加詢訪諸般軍器精利經久可立制度及施用之宜編成文字監官與兵官保明繳送本所詳考其逐處監官兵官或懈慢及不依應供報之人許本州糾奏若人匠供析不中制度人吏行遣稽滯並從本所牒所屬依理施行所貴考究精審早得成書從之㑹要五年五月二十六日事丙午太白晝見丁未詔以涇原路蔡挺衙教陳隊于崇政殿引見仍頒其法於諸路先是挺在涇原建勒武堂諸將五日畨上教閲五伍為隊五隊為陳陳橫列三鼓而出之並三發箭復位又鼓之逐隊槍刀齊出以步鼓節之為擊刺狀十步而復以上凡復位皆聞金即退騎兵亦五伍為列四鼓而出之射戰盤馬先教前一日將官㸃閲完備及赴教再閲之隊中人馬皆彊弱相兼彊者籍姓名為竒兵隱于隊中遇用竒則别為隊出戰涇原路內外凡七將又涇儀州左右策應將每將皆馬步兵各十陳分左右各第一至五每閲一陳此其大槩也上善其法故頒焉知雍州蕭注言乞約束溪洞知州如承報有賊馬過地分不即往約攔鬬敵者並以軍法論上謂輔臣曰報事虛實不明兼賊有衆寡若勢力不敵安能約攔豈可即依軍法宜令經略司相度減等斷遣提舉陜西常平等事國子博士沈披言乞復京兆府武功縣古迹六門堰于石渠南二百步傍為土洞以木為門回改河流可溉田三百四十里詔陜西提舉常平司官一員與披同相度如合興修即計工以聞其後竟無功是月廢慈州為吉鄉軍𨽻隰州省文城縣為鎮入吉鄉省鄉寧縣析其地入晉絳二州廢漣水髙郵軍為縣以漣水𨽻楚州髙郵𨽻揚州劔門關劒門縣復𨽻劔州廢欣州定襄縣入秀容潞州黎城縣入潞城省相州鄴縣趙州贊皇柏鄉二縣汾州孝義縣歸州興山縣為鎮相州鄴縣省為鎮入臨漳九域志在熙寧六年與此不同六年七月庚午所云二十八縣當考
