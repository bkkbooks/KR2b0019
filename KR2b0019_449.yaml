body:
  text: 續資治通鑑長編卷四百四十五宋李燾撰哲宗元祐五年秋七月乙丑直龍圖閣知蘇州王覿為禮部侍郎尋改江淮荆浙等路發運使覿嘗語同列以蔡確有功於國御史中丞蘇轍劾奏之故有是命此據孫升及上官均奏議改發運在六日今并書覿傳并除禮侍不載孫升劾鄧溫伯云王覿近除禮部侍郎以嘗語同列謂蔡確有功於國猶從外補按上官均奏議乃蘇轍有言更當考詳給事中朱光庭言新除李察知密州不協公議詔察别與差遣政目六月八日李察知澶州呂嘉問汝州朱服宣州實録皆不書此云密州當考提點兩浙路刑獄楊傑為禮部員外郎京東路轉運副使范鍔為金部員外郎六月末蘇轍論免夫錢有與鍔相關者明州觀察使贈開府儀同三司追封潤國公諡惠世堯卒草土王師約奏親叔左班殿直克述遣河清兵士毆録事參軍死念臣祖尚秦國大長公主而臣復膺選尚如臣叔父合該極典願納一官乞從寬貸御批王克述歐人致死合從典憲師約乞將一官贖罪難以施行御集五年七月二日事丁卯給事中朱光庭言新除王鞏權判登聞鼓院按鞏資稟憸邪行迹汚下頃為揚州通判以私用刑得罪而去合送吏部新除未協公議詔鞏别與差遣又八月十四日樞密院言諸路主兵官及使臣等犯法下所屬鞫治及案到大理寺論法乃上尚書省取旨慮有元犯情重或事干邊防合原情定罪者既元自樞密院行下當申樞密院取旨從之戊辰樞密院言見議熙河路定西城等處疆界欲知城寨相去地里詔秦鳯路提點刑獄遊師雄按視以聞范育集張舜民墓志己巳詔知荆南唐義問添差荆湖北路轉運使専切措置邊事用樞密都承旨王巖叟所薦也張舜民作王巖叟墓志云湖北諸蠻互出擾邊無有寧嵗巖叟請專委荆南唐義問遂自草檄文喻義問以朝廷方敦尚恩信勿為徼幸功賞之意其後終底輯寧蘇轍論附八月二十四日添差據政目正字陳察朝補之李昭玘並為校書郎十二月十六日可考庚午户部言曽犯私假香人法當勒出行其有易姓名借本合賣雇人及改牌額再買販者乞立賞許人告並坐不應為重罪再犯送鄰州編管從之新削辛未權兵部尚書趙彥若權禮部尚書兼刑部侍郎范純禮權兵部侍郎殿中侍御史賈易提點淮南東路刑獄先是太皇太后諭輔臣欲以黃廉為諫議大夫田子諒趙㞦為臺官呂大防對曰廉無公望㞦確黨皆不可用子諒可也劉摯曰子諒臣之姻家故事不可用傳堯俞曰臣為中丞與宰相韓縝不相避諭曰既有例可特不回避摯曰去年楊康國趙㞦避孫固皆罷見任御史此近例也退即以子諒自度支員外郎為殿中侍御史與賈易對换摯奏乞罷政事不敢妨朝廷用人詔不許乃罷子諒而易與禮部員外郎上官均對换易力辭改國子司業又辭之且丐外遂有此命此據劉摯行狀後記增入六月八日辛丑田子諒自度支郎與殿中賈易對換後四日子諒復故易改禮部二十八日辛酉又改司業七月八日辛未除淮東憲易初與梁燾朱光庭劉安世同劾鄧溫伯不效既皆遷官易獨先出為中丞蘇轍故也此據王巖叟系年録云言者攻鄧溫伯不效梁燾除權户部朱光庭給事劉安世中書舍人賈易司業諸人皆不肯受命易以避蘇轍與三人少異先除淮南提刑三人辭之再三云云易攻溫伯六月八日同孫升奏三省言御史中丞蘇轍侍御史孫升同舉到監察御史二員內一員不曽實歷通判不應條一員與執政官礙親詔蘇轍孫升同别舉官二員轍升言檢會元祐三年六月九日尚書省劄子三省同奉聖旨左右司諫左右正言殿中侍御史監察御史並用升朝官通判資序實歷一年以上舉官凖此臣等竊見後來所用諫官如吳安詩劉唐老司馬康三人並非實歷通判之人緣上件所降朝旨係諫官御史並用實歷通判一年即無分别今來人才難得之際若臺官獨拘苛法必至闕官况自立法以來前後本臺及兩制官並不曽舉到實歷通判可用一人以塞明詔足見此法難以久行伏乞特依近用諫官體例於臣等前來所舉人中選擇除用免致言事之官久闕不補於體不便轍與孫升被詔同舉察院二人在六月二十六日吳安詩四年三月為右司諫劉唐老五年五月為右正言司馬康五年六月為左司諌王巖叟言資格太嚴或可附此轍又言竊觀元祐三年六月九日詔旨本為朝廷除授而設後來朝廷所除諫官如吳安詩劉唐老司馬康三人皆未曽實歷遂再奏乞比附施行尋又蒙尚書省劄子令依條别舉臣退復思念豈以除諫官皆出聖意故不依條法舉臺官出於有司故不得援例耶竊惟前件三人惟司馬康故相光之子光被眷任最深康亦素有清譽或為二聖所知至於吳安詩劉唐老此二人者何緣得被聖眷若非大臣進擬或密有薦導陛下何緣知之竊謂本臺所舉亦合依例施行况朝廷前後所用百官亦名不應格豈故違法蓋不得已也若獨於臺官固執近法中外必以為疑伏乞檢會前奏早賜施行不聼轍所舉監察御史二人其一人宗正丞常安民也宰相吕大防不喜安民故限以資格轍再論列太皇太后以問大防大防曰諫官屬朝廷朝廷主道揆不必用法御史有司也有司正當守法况中丞又謂之中執法豈得不用資格此據常安民家傳安民臨卭人也講讀官許進唐實録史記故事政目八日事壬申遼國遣使崇義軍節度使耶律永孚副使中散大夫守太常少卿充乾文閣待制劉彥儒來賀坤成節太學博士孫諤等言貢舉條詩賦格式有所未盡如韻有一字一義而兩音者若廷字防字夀字之類不敢輒指一聲押用字有合用而私相傳為當避者如分寸尺丈引之引杼柚其空之杼之類又有韻合押而禮部韻或不收者如傳説之説及皥字櫎字之類並自合收用從之涇原路經略司言請自元祐三年五月以後根括違法典賣蕃部土地人與免罪許以兩頃五十畝出刺弓箭手一人買馬一匹止及兩頃者備弓箭手一人五十畝以上者令合刺應役以下者納稅租其未根括者聼詣經略司自陳乞等施行違者許人告從之甲戌詔涇原路隴山及安化縣新招置弓箭手及已降指揮將陳首違法並諸典買限內典買蕃部土地人據頃畝合刺充弓箭手令本路經略司指揮别團為將以訓練將為名乙亥夏國遣使賀坤成節詔入內供奉官石瑀見修葺鳯翔府上清太平官奏到陳乞事件內有乞添差內臣齎青詞酌獻及添破監官職田事皆非修葺事不合職外奏請可指揮入內內侍省告示本人特免取勘仍取責誡勵所陳乞事件更不施行御集五年七月十二日陜西都轉運使寶文閣待制苗時中為户部侍郎權户部侍郎范育仍舊知熙州六年八月二十一日育再任直龍圖閣知秦州葉康直為寶文閣待制陜西都轉運使禮部言開封府解進士一百人而就試二千餘人請依元祐二年例於諸科解額內撥五十人添解進士從之九月八日又撥百五十熙河蘭岷路經略司言西賊攻毁智固勝如兩堡詔移牒宥州詰問六月末政目已書夏人犯二堡於是奏到始令牒問耳御史中丞蘇轍言臣近論奏范育以措置邊事乖方召還為户部侍郎賞罰倒置乞行責降仍乞罷种誼种朴本路差遣更擇熙河帥臣使之懷柔異類謹修邊備雖蒙聖旨罷育户部而使還領熙河其於邊事一皆如故臣方以為憂旋聞智固勝如二寨近日已為夏人出兵平蕩臣本儒生不習軍旅妄以人情揆度以為熙河創於見非守把之地修築城寨理既不直必生邊患言未絶口而夏國之兵既已破城而歸矣臣謹案二寨雖昔嘗興置至元豐五年並已廢罷與婁城永樂等城無異今欲復行修築生事致冦理在不疑而熙河諸將意欲侵奪良田收耕穫之利以守蘭州而不顧夏國爭占之害計其所得不補所亡不待臣言事已可驗然臣竊謂夏國所遣坤成使臣適至京師而國中遂敢舉兵攻城略無所忌者意謂築城之役曲在熙河雖朝廷之重亦必不敢無名苛留其使故也邊計一失遂為夏人所侮可勝嘆哉如臣愚見謂冝速擇良帥俾往綏靖一路至如聚糧添屯之類亦必隨事應副以備不虞今育與誼朴猶在本路觀其輕敵無謀貪功希賞必更妄起事端以蓋前失關陜之憂未可知也况育等欲納趙醇忠謀已宣露為鄂特凌古所怨二難交至可無慮乎昔李德裕議討劉稹同列有異議者德裕請曰有如不利臣請以死塞責今中外皆謂守信固盟中國之利若大臣有欲専任育等不顧邊患者臣願陛下以德裕之請要之若能如此即用其計事定之日按行賞罰則朝廷綱紀庶幾尚在貼黃稱臣竊見朝廷久不明辨是非必行賞罰故羣臣輕易造事去年議回黃河所費兵夫物料不可勝計功卒不成而議者仍舊在職略無責問臣下習見朝廷刑政如此故敢輕造邊釁臣乞陛下以河事為戒與大臣熟議必令任責不辭然後舉事范百祿奏可附此已附六月刑部言佃客犯主加凡人一等主犯之杖以下勿論徒以上減凡人一等謀殺盜詐及有所規求避免而犯者不減因毆致死者不刺面配鄰州本城情重者奏裁從之詔吏部諸司副使理三十年奏薦之人除係換授并內侍官依元降條外餘並自補借職後依條理年限奏薦新無刑部言應抵當所並州縣寄納人户物色在官庫者若有毁失乞並依棄毁亡失及誤毁官私器物律備償從之丙子司農寺言請本寺主簿兼檢法從之新無乙酉詔三路路分都鈐轄並破馬軍十五人新無知汝州盛陶知晉州通判宣州翟思知兖州通判徐州趙挺之知楚州通判廬州王彭年知滁州政目二十二日事當考陶等前責在四年五月十二日夏國主乾順言自去年七月遣使赴闕乞換所賜城寨蒙降詔不許尋與延州經略司議分畫疆界當時議定依綏州例分畫向方靣各打量二十里內十里安置堡鋪耕牧外十里拍立封堠空作草地得保安軍牒稱奉延州指揮其城寨雖定二十里至今諸城相望取直分畫夏國不敢違黽勉奉行其南界諸路地分官只要依綏州例打量二十里不肯依綏州例於內十里修築堡鋪耕牧於外十里拍立封堠空作草地以辨漢蕃出入絶交鬬之端纍令宥州移牒保安軍終不明示可否回賜夏國主詔曰爾逖領蠻畿恪循世守伻來稱幣廷閲奏書永言疆埸之安未即溝封之畫兩界繩直罄忠順而可嘉十里蕪荒瀝悃忱而有請力祈矜許蚤遂底寧惟析壤之求初無故事念安邊之議亦既纍年顧省恭勤特行開納然綏德城本無存留草地詔旨今既欲於漢界留出草地即於蕃界亦當依數對留應見今合立界至處並須明立封堠內外漢蕃各對留草地十里不令耕種仍各於草地以裏自擇安便處修建堡鋪如熟地內不可修建即於草地內修立各不得逼近界堠其餘疆畫未盡事已令押伴官委曲開諭進奉使副訖及已詔鄜延路經略司夏國如欲議事許差人赴延州計議眷方陲恱義之心既輸悃愊而朝廷綏逺之意已示優容宜深體於恩懷亟保和於封略丁亥御史中丞蘇轍言據蘇轍論所言不行劄子云七月二十四日今月八日兩次面奏范育等邊事今以第四次劄子附二十四日第五次劄子附八月八日臣論范育种誼等不可留在熙河章三上矣已而朝廷不從臣亦言之不已不審陛下亦嘗察其故否臣初論育措置邊事失當不合遷户部侍郎朝廷既追寢成命臣亦粗可以塞言責矣育知熙州誼知蘭州皆非今日之命臣雖不言於臣職事非有害也而臣再三干瀆聖聼誠有説也方今太皇太后陛下聼政於帷幄之中皇帝陛下育德於恭默之後欲以仁覆天下則有餘欲以武服四方則不足利在安靖不利作為而大臣欲聼育等狂謀以興邊事使夏人由此失和兵難不解當此之時欲相率持羽檄決計於簾前此臣所以寒心者一也元祐以來朝廷懷柔夏人如恐不及地界之議將成而絶者屢矣頃者朝廷許以二十里為界彼既欣然聼從而熙河幸其聼從之間於四十里之外修築已廢舊寨奪其必爭膏腴之地板築未移戎馬即至而二城不守矣今若不問枉直所在興忿恚之師為必取之計則關陜兵禍漸不可知若自知不直雖不復爭而留育等守之一則夏國懷疑終不信向二則育等悁憤恥功不遂妄造事端以蓋前失患終不弭况復育等既結鄂特凌古之怨二隙交構勢尤可虞此臣所以寒心者二也非此二事憂患迫切育等瑣瑣臣肯屢以為言哉然臣所言於育等三人亦止是各移降差遣及育作待制差緩數年而已於其私計無多損也臣愚以為方論國事宜且先公後私以全大計不勝區區孤忠憂國再三干瀆天聼甘俟斧鉞編類章疏升獨言溫伯在七月二十四日侍御史孫升言臣聞天下治亂由邪正之消長賞罰之是非也邪正混淆則亂之所由生是非無别則公道廢矣夫進賢退姦取是去非左右大臣之任也察邪正辨是非諫官御史之責也邪正不分是非無别以誤主聼過在左右罪歸諫官御史臣愚不肖誤蒙選擇置在御史夙夜自思無以塞責臣前後論列鄧溫伯所為蔡確麻制之詞朋姦罔上負國欺天終未蒙聖意省察臣恐陛下猶以蔡確麻制之詞為溢美未照溫伯之意為朋姦故邪正是非久而未明諫官御史為之失職臣既未能自劾其罪以去願竭誠畢義以終其言且溫伯於二相之中獨稱蔡確有定議之功比方確為漢之周勃可屬大事豈得謂之溢美此必私溫伯者進説以誤聖聼也臣試為陛下詳言之凡命制詞者此其臣為稷契伊周則其君為堯舜湯武不言可知矣今溫伯既此蔡確為周勃誅諸呂定劉氏則未審以何后比方聖上也豈不知有所嫌哉治平中翰林學士范鎮草韓琦制詞云史稱霍光義形於主既以韓琦比霍光則上當為昭帝矣英宗深嫌之范鎮本無姦心止以比琦失當猶罷學士出知陳州溫伯明見太皇保祐之功格於天地朋附姦臣遂以社稷大事歸之蔡確比漢之周勃誅諸吕定劉氏褒臣貶主略無嫌避負國欺君非范鎮之比且漢遭吕氏之亂社稷大臣無所屬乃屬之於周勃今日朝廷治安聖慈在上豈冝言以大事屬蔡確也説者謂之溢美可乎自昔撰次麻制為文之體有講德之詞有敘事之詞如麻制稱蔡確智崇而慮逺器慱而用周此言確材器也包深厚之訓詞蹈髙明之善學此言確學術也此皆講德之詞容有溢美也及稱蔡確服采禁塗之近特為先帝之知此言確遭遇事也統厥百官進二中臺之令間於兩社首持黃闥之鈞外輯三垂內遂萬物此言確為宰相事也及在受遺之列尤嘉定議之功安勸庶邦有若召公之老可屬大事莫如周勃之忠此言確受遺事也此皆敘事之詞事不可無實也蓋講德止為其人一身而言敘事乃為天下後世而發故講德容有溢美而敘事不可無實也恭惟皇帝紹膺聖統乃先帝以萬世不易之理而與子太皇太后以大公至正之道而立孫天人同心上下一意當受遺之際誰為可疑之人誰發可疑之議致危疑不決賴確而後定哉必有事實方形制詞既無其人又無其事而溫伯乃獨稱確為定議以無為有以虛為實形之制命以傳天下以信後世朋姦罔上負國欺天罪在不赦自確流竄新州之後邢恕以鼓唱私言推蔡確為社稷之臣同時已從貶責而王覿近除權禮部侍郎以常語同列謂蔡確有功於國猶從外補今鄧溫伯公然於制命之中獨稱蔡確有定議功比方漢之周勃可屬大事誅諸吕定劉氏以無為有以虛為實傳播天下後世朋姦罔上負國欺天褒臣貶主略無嫌避罪惡如此安得指為溢美上誤聖聼使與正人並立於朝也伏望陛下以臣所論宣付大臣早定邪正是非庶他日姦臣無以藉口則天下幸甚編類章疏升獨言溫伯在七月二十四日即此也三月十六日五月二十七日六月八日七月二十四日凡四狀侍御史孫升言近知湖州武康縣韓宗堯為違法科率耆長納燈油等事先次衝替聞宗堯乃宗原弟宗原實兩浙轉運判官張璹妹之夫部民訴寃璹不為受理違法徇私宜加罷黜詔璹别與差遣詔新除秦鳯等路刑獄遊師雄仍舊兼提舉催促蘭州通逺軍招置弓箭手戊子户部言請應非祖免親宗室以蔭補官者其俸錢在京外任並各依外官法支給從之禮部言凡議時政得失邊事軍機文字不得寫録傳布本朝會要國史實録不得雕印違者徒二年許人告賞錢一百貫內國史實録仍不得傳寫即其他書籍欲雕印者納所屬申轉運使開封府牒國子監選官詳定有益於學者方許鏤板候印訖以所印書一本具詳定官姓名申送祕書省如詳定不當取勘施行諸戲褻之文不得雕印違者杖一百凡不當雕印者委州縣監司國子監覺察從之以翰林學士蘇轍言奉使北界見本朝民間印行文字多已流傳在彼請立法故也已丑刑部言中書刑房條舊有刑部官嵗終具失入徒流罪五人或失入死罪或違限三分並取旨之法自官制行改貼刑部官序為大理寺官其大理寺官嵗終比較係刑部上都省取旨其中書刑房字當改作刑部詔從之御史中丞蘇轍言臣頃權吏部尚書竊見京朝官以上皆使一年以上闕大小使臣及選人皆使二年以上闕雖闕少員多事不得已而待闕之人已不免咨怨近者復見堂除人亦有待闕及一年以上者人情驚駭昔所未見蓋祖宗朝堂除舊例皆見闕然後差除因事然後超擢所除既有限量故用闕不至久逺近嵗監司以上員數至多而猥更擢人以至衍溢所擢未必勝舊徒使監司闕額不足以應副來者而已至於知州以下舊人未減新人日增蓋由干謁成風除授無法雖稱以才擢用其實未免緣故至於待闕久近所任間劇衆口譏評皆為之説只如開封司録舊用歷知州人頃自郭晙之後未及三年而迭用陳該張淳陳元直三人率皆資望輕淺政績未聞已見新故相代輕用堂除於此可見及諸寺丞例亦如此臣欲乞今後謹守祖宗故事凡堂除皆俟有闕方差且將見今堂除人輪環充補其新擢用者皆須功譽顯著然後得差蓋用人之法要須員闕相當未聞無闕添人謂之擢才濟用者也如此數嵗若見闕稍多然後量闕選才理無不可庶使堂除官吏不復待闕與四選稍異亦旌勸之義也轍言不得其時附七月末庚寅中書侍郎劉摯乞罷政詳具八月六日辛卯詔已降指揮河東河北陜西京東京西淮南兩浙七路提刑司以朝廷封樁錢一半糴糧或即於沿流及要便處封樁如有違慢覺察施行政目二十八日事壬辰朝獻景靈宫環慶路經略使范純粹奏臣伏見熙延兩路與夏國所畫封疆至今未決外議謂朝廷務在息兵失於欲速故狂冦要索日益滋彰雖聖朝懷來四逺固為上䇿若邊臣不究利害但務委隨則國體事機不無虧失何以言之自二聖臨御之始夏人來朝繼而秉常訃哀乾順自立使者係道往返五六賈販貿易隨已豐富雖修好甚恭蓋亦為自資之計耳在朝廷固宜開納容彼自新然於處畫土疆未經決議當徐觀向背以察姦謀而朝廷即遣使人往加封册欲速之意為賊所窺果聞侮慢使人不即稱謝構兵入冦延渭破殘反覆不恭宜在誅絶後日復有所請但可只委邊臣與之要約示以間暇使望望然惟恐朝廷之拒而不納也則輕重之權豈不在我乎所謂要約者凡尺寸之地與夫後日之可慮者皆當條畫具盡必使異日莫得而變也事既審決邊臣始以謝罪請盟之狀聞於朝廷然後明詔中外貸彼既往之罪聼其乞盟之請歸吾陷賊之人賜汝既許之地如是則朝廷之體豈不甚尊而制冦之䇿豈不甚簡歟昨不為此計而聞其有請即許造朝此又欲速之意為賊所窺者也使人既至朝廷凡朝夕議論往復酬對寧不知皆廟堂謀臣之言乎是顧接太重而許可太輕此又欲速之意為賊所窺者也朝廷既許以陷寇之衆易新造之壘人有品色多寡之異地有形勢逺邇之差約當素明謀當素定必皆著見於書然後受人割地交相付與則彼尚何所能為乎今謀不素定約不素明彼以疲殘百餘人塞命而已我乃不復較問亟以四壘付之則彼計固已行矣聞四壘既付即已平徹而熙延二境始議畫疆顧不晚乎欲速至是其理固然外議但見朝廷旌賞邊臣竊意朝廷謂邊事已平無足慮者豈以其目今貢奉不爽謂其無所事乎彼貢奉不爽者是復為賈販計耳恐不足恃也前日事之已然者固不可追今日之可為者若審計而徐圖之尚未晚也如聞夏賊於塞門金城之地重有要求又聲言與西鄰為合從之謀將以重我外議恐朝廷不以為重而輕棄之信如是則欲速亦已甚矣朝廷所以謂京城塞門為不可棄者非以兩孤壘之為利也謂其形勢險阻足以藩籬邊徼上田沃壤足以贍給邊兵也利害所繫他壘莫比故獨不在給賜之限今畫疆之議乃欲安目前之小休棄形勢之要地合數千户已耕之土地斷數百里斥堠之要衝屏蔽無餘出門遇敵道路梗澀運餉艱虞孤壘僅存我將安用譬猶欲保一身而損去四體是大不可也然則前日詔旨所不豫之地徒虛名耳且彼之所求我必與之臣不知真足以厭其所欲而不為他日之患乎失要害之地濟無厭之求虧國體勢墮賊計謀養虎開端不可不愼臣伏思邊隅設誓逮今十有餘年不為不久矣朝廷不惜十年之費不憚十年之勞而務為堅守者何哉為形勢人民惜也今日之議信如所傳是能久而不能近也前日諸路大舉雖覆巢之計尚能為之今安以待敵而屑就如此是能大而不能小也能久而不能近能大而不能小棄前功於垂成開後艱於不測臣竊為朝廷惜之臣願朝廷舍其淺近計於久長其所取豫並以元頒詔書從事如其偃蹇置而不問但誡飭邊吏嚴備如昔希功造事則固所不可護邊待敵則冝無甚難以區區內亂之小羌尚能與中國久抗乎期以嵗年決可竟事在朝廷不惑而已臣聞自陜以西議者靡不知此而莫有為朝廷言者是亦以出位為戒耳雖朝廷前此議論邊事専委鄜延他路邊臣無得干預而臣任忝帥寄職在論思今以所得衆人之論妄進狂説則亦未為出位也伏惟聖心採擇不勝大幸純粹以五年七月二十九日奏此當考報答如何
