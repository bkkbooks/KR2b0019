body:
  text: 續資治通鑑長編卷五百十一宋李燾撰哲宗元符二年六月壬申朔河東轉運副使郭時亮言畿甸百姓每歲租賦乞令於所屬縣鎮近便供納特免支移從之河東奏北人於賈胡疃拆石墻侵入天澗取水詔經略司指揮折克行如北人先肆粗行令隨宜應接施行布録壬申五月十四日合參照廣西察訪司言體訪得桂宜融等州土丁差往管下緣邉縣寨防托其間有係單丁亦一例輪差欲乞應係與蠻界相接防托處並差兩丁以上之家若遇教閲及邉防緩急即依自來條例施行從之甲戍鄜延路經略使吕惠卿言西界投來首領伊實巴特瑪係西界雅稜烏格官在旺精之下正鈐轄之上本司乞比類僞天使補崇班詔伊實巴特瑪特補東頭供奉官仍賜銀絹錢各三百檢凖敇榜僞天使之類與崇班仍賜銀絹各五百緣伊實巴特瑪在西界委是雅稜烏格官與僞天使一般遂依僞天使之類先次支給銀絹錢各五百訖給公據已奏乞補內殿崇班今來若降等推恩慮無以取信從之今後如有不依得敇榜所載名目之人並具此類推恩人例奏聽朝㫖即未得先給公據及一面支賜諸路準此環慶路都總管司言展築慶州白豹城畢本處係與鄜延接境控扼互為聲援之處全藉土民戍守合添置在營馬步軍二指揮所有招軍等例物並依興平城新置蕃落保捷指揮施行從之太學博士鄭居中為太常博士乙亥鄜延路經略使吕惠卿言進築暖泉寨畢工已牒延安府於係省錢內每年支錢五百貫充公使犒設從之四月十四日賜名丙子鄜延路經略使吕惠卿言準朝㫖西人再遣使臣若未與收接表狀無以明示開納之意合作本司指揮順寧寨官收接告哀謝罪表章申取經略司指揮候到本司附遞聞奏詔鄜延路經略安撫司如是差人取到即收接附遞以聞如已差告哀使副齎到即選差大使臣一兩員及舊例合差使臣人數引伴赴延州奏聽朝㫖二月十一日四月七日二十四日五月六日布録丙子鄜延奏西人復遣使齎牒又白劄子來詔令收接公牒仍諭西人如遣使賫到告哀謝罪表狀當發遣赴闕如無謝罪表狀即難議收接西人比來去甚遲遲今此復來故益示以開納之意戊寅鄜延奏西人說話次第令依五月指揮施行布録環慶走馬阮易簡奏之字平無水乞權住修築詔胡宗回更切相度施行布録己卯權知開封府吕嘉問言諸廂使臣乞並依熙寧法從本府奏舉從之奉議郎祕閣校理權發遣河東路提㸃刑獄時彥特追一官勒停朝請大夫吏部郎中林邵特勒停供備庫副使閣門通事舍人權管勾樞密副承㫖公事張宗卨特免追官罰金三十斤勒停朝散郎度支郎中王詔西京左藏庫使曹曚罰金二十斤並以充北朝正旦國信使副拜不如儀故也蹇序辰等既付有司左司諫陳次升言制勘蹇序辰乃知開封吕嘉問壻所用獄子等多是府𨽻乞替換仍差內臣監勘上不樂曰內臣豈是臺諫官可差獄子無非開封府取到者曽布曰內臣在聖意可否若有開封人在內令替換不妨章惇曰無可施行布曰若有開封人須令替換上從之先是制勘所上殿言時彥范鏜林邵在番皆曽拜受香藥酒得㫖令並取勘次升疑獄官有所偏故有是請上頗訝其喋喋也已而內降序辰奏制勘所取勘客省帳茶酒有王曉例拜受香藥酒依林邵等例移宴就館例外送馬是書送回答之物不可不受乞聖鑒省察樞密院勘㑹富弼奉使亦以契丹主瘡病伴酒三行差官就館伴酒食刁約奉使以契丹母老病久坐不得伴酒三行差官就館賜御筵除蹇序辰所引王曉例事體不同外即無例就客省帳茶酒及移宴就館不曽例外送馬并序辰稱係書送回答之物各不委自來有無似此體例兼不獨序辰不於語録內聲說拜受酒一節時彥以下亦不曽聲說並合取勘令制勘所詳此及序辰狀內事件逐一子細根勘取見詣實圓結公案聞奏應合取勘之人如已經三問今來供答更有未承伏情狀並具奏聽㫖與三省同入文字御寶批依遂行下蔡卞曰客省帳茶酒有王曉例恐難云無例布為之增改云事體不同遂已此段在四月十二日甲申布又言勘㑹到富弼刁約例甚分明王曉例即不同上曰甚好布曰兼富弼等亦不曾例外受馬臣處此事極平所以云不獨序辰不於語録內聲說拜受酒一節上曰此指揮尤好布曰制勘所先已申陳云入夏禁繫多罪人多病不可淹延乞追攝范鏜等故令已經三問更不招承即具奏聽㫖上曰固合如此布曰此事若臣所擬定稍有未安三省必不肯簽書上曰是同入文字甚好布曰猶恐臣僚有所開陳望陛下審察上深然之此段在四月十四日丙戍及制勘所乞差録問官次日差葉祖洽卞以為不可上令差安惇卞曰如此庶幾布再對言卞如此擇録問官不知何意臣嘗開陳以為序辰黨衆恐左右營救者多陛下以為誰敢為營救者臣言亦似不妄矣此假在五月癸卯朔序辰尋撾鼓乞差官看詳制勘案云勘官令增減欵詞及抑令認奏事不實徒罪凡所勘皆以為不當又言繳駮及訴理事取怨非一及先臣周輔熙寧元豐中曽勘鞫公事多有嫌隙乞出自睿斷選官看詳或乞别推布曰蹇周輔熙寧中曽勘臣不知元豐中所勘者誰黃履曰臣元豐中曽論周輔布又曰訴理事在三省臣所不知然聞章惇許將黃履皆干涉訴理事如此則是宰執於序辰皆有妨嫌須盡易見執政官乃可斷序辰事上曰豈有此理蔡卞曰莫只是說制勘官布曰熙寧中曽勘臣又訴理事干宰執豈是言制勘官卞又曰臣不敢以序辰為無罪然令他招上書不實罪似過當布曰蔡卞不知子細序辰供進語録在王詔事未發前故隱不言拜供儀式在王詔事發後便言曽拜序辰云可以互見制勘所却曽申密院取王詔事發及序辰供儀式月日王詔事發係二月二十六日序辰供儀式係二十九日以此可見前供語録不實兼序辰兩有分析奏狀至二三十紙其間莫須有不實之語上默然惇曰序辰既於客省茶酒却便上殿劄子乞編為例此尤不好又曰序辰在史院曽語及臣諭之云但依實對答只是錯然終不肯如此布又指受例外馬事云序辰言有條辭不獲免聽收制勘所但云無例令招不合收豈有不用條而用例臣以為辭不獲免聽收須如黃履押宴北人送例外物便具劄子進納乃是依例上云須如此乃是布曰序辰得例外馬既不辭却便與常例合得土物五十八匹一處奏請支絹莫不可制勘所令招不合不别具狀申明序辰又以為不當又云拜是承例如此則序辰一切無罪又曰陛下憂勤閔雨之際心不體國淹延刑禁却乞别推豈是體國上曰范鏜等皆有徒罪布曰鏜雖有對制不實之罪然却有奏狀云於奉使絶域不應拜而拜有辱君命取輕北人恭俟重行竄謪如此似稍知體與序辰顫賴殊不類矣衆亦以為然上曰何以處之許將曰候案上取㫖衆亦云當爾遂令依此行下此段在五月六日戊申明日范鏜亦具狀翻變此段在五月初八日己酉安惇請差官重勘上欲遂差安惇布曰昨差周鼎時陛下已欲差惇惇雖曽録問何所妨然恐須差兩人昨章惇云欲差一諫官陳次升有言不可用鄒浩可否惇曰浩乃吕嘉問所薦恐不便布曰浩或不爾蔡卞云趙挺之可上令差挺之仍云挺之必不觀望布曰士人如稍識廉恥何敢爾初上數對執政言獄官要不觀望者豈易得布亦嘗云除蔡京鄧棐之類乃序辰黨與中人不可差其他在聖意裁擇何所不可又白上乞戒飭獄官以惇卞各有所主及序辰自陳於臣等有嫌隙令不得觀望髙下其手上曰安惇輩必不敢如此布曰雖然得德音一警飭之尤善上曰好此段在五月七日己酉是日制勘官安惇趙挺之上殿尋申乞重斷時彥林邵王詔等一行公事布問上曽差中使監勘否上曰不曽差不消得初蔡卞乞差中人監勘上許之既而不聞差人果已罷久之安惇及趙挺之上殿乞重斷時彥林邵王詔等此段在五月二十三日乙丑於是林邵拜受香藥酒於語録內隱避不奏約法合罰銅三十斤放張宗卨合追一官勒停上以林邵為首宗卨為從輕重未允宗卨特免追官并邵各罰金三十斤勒停時彥供語録在前奏不實在後合從事發更為又以首增一拜特追一官勒停熙河築齊訥納森畢工賜帥臣以下茶藥銀合布録己卯五月十二日進築六月八日畢工九日賜名河東奏築河外城塞乞調保甲從之布録朝請郎京西轉運判官曽孝廣為水部員外郎庚辰賜熙河蘭㑹路齊訥納森新寨名㑹川城環慶路駱駝巷新寨名綏逺寨布録己卯五月十二日進築六月八日畢工駱駝巷四月二十二日進築五月二十七日畢工賜進築之字平將士特支鄜延路經略使吕惠卿言據保安順寧寨官李子明等申西界天使德眀雅卜裕木攀等劄子言告哀公牒却無謝罪尋問因何無謝罪表西使言夏國與朝廷是父子之國今已恭順舊例先送告哀公牒然後差使副齎謝罪表狀赴朝廷子明等諭天使未敢收接詔吕惠卿令將寨官收留申保安軍作本軍指揮所有公牒上說告哀不言謝罪與前來不同未敢申上衙若齎告哀謝罪表來當議收接奏取朝㫖六月五日辛巳冀州觀察使提舉從福宫王文郁卒壬午詔河北修城池樓櫓仍令安撫轉運司體量兵官不得力者具名奏差人替又令二府各選差知州通判內不可倚仗者選官對移或非時催督責限修葺了當每歲差官㸃檢有不如法及稽違重行停替河朔連歲霖雨城池多隳壞纍督責修葺而財力不給又官吏多不職邉報多言北敵頗生事其孫專政慮不能安靜故降是詔仍賜支免夫錢及借諸司封樁錢應副河北諸路都提舉汴河隄岸賈種民言乞依元豐年及川茶條例將作監于鄭澶滑等州界地方依開封府界條例出賣官茶從之右正言鄒浩奏伏見元豐年修置水磨變磨茶末出賣止是在京及開封府界諸縣未嘗行於外路今既追復舊法自合盡依元豐事體而都提舉汴河隄岸司乃於京西路鄭滑州潁昌府河北路澶州一例施行近日又更差官前去京東路濟州山口措置水磨等事除鄭州舊係府界縣分可以依舊施行外其潁昌府澶滑州山口皆元豐舊法所無而今輒行之果何謂也若謂潁昌既有水磨可以就便出賣濟州山口置磨以後亦可出賣矣若謂澶滑係與畿縣相鄰可以出賣即凡與畿縣相鄰去處亦可出賣矣若謂山口當清河之衝可以因水置磨即凡通水去處亦可置磨矣既行之鄭滑又行之澶州又將行之濟州皆以為可即一路一州自此通彼輾轉相因何所不至雖朝廷遵奉前例不敢輒有增損而本司乃以機變之巧隂肆滋蔓臣恐歲月之後遂遍天下而茶商衣食之源盡為本司所𣙜不得措其手足其弊可勝言哉伏望聖慈深賜照察特降指揮只令一依元豐舊法施行所有濟州山口措置水磨并其餘非元豐所行事件並一切寢罷庶幾不失先朝立法為民之意上副陛下繼志述事之孝浩奏不得其時附見潁昌滑澶賣茶後濟州置水磨其從違當考浩又嘗奏伏見兩浙路察訪司體究到本路人丁鹽錢利害乞將人户見催過丁鹽錢通一路移補舊額將見缺鹽錢並與除放并遇闕鹽依官賣鹽價蠲免其錢䝉送户部勘當本部稱已有朝㫖難以施行臣竊詳降㫖之初蓋為兩浙路轉運副使胡宗哲止陳其利而隱其害今來既緣臣僚上言付察訪司體究得自轉運司催理以來民力不堪委實有害户部自合依實勘當申取朝廷指揮却自稱已有朝㫖難議施行失仁聖恤民之意伏望睿慈詳酌特降指揮依察訪司所奏事理施行庶幾一路元元實被德澤甚厚此奏附見從違當考孫傑察訪兩浙在元年二月十五日恐此奏合在元年權户部尚書吳居厚言乞差侍從官同户部置詳定除放缺負所詔令户部開排赦條合放而不放及不合放而放者並仰本部劾奏以聞今後遇赦凖此五月十一日可考樞密院言府界諸路將兵內馬軍已依元豐舊法並改充弓箭手兼習為槍其步軍除守營人係全用弓弩手外今來諸將有見依海行者有依隊法者欲乞諸將下步軍教習事藝並依海行法除上名人外各以十分為率置弓二分弩五分槍牌手三分遇結隊即依隊法其隊內所闕槍牌手人數却以互習人充代從之新本删修云樞密院言府界諸路將下步軍教習事藝乞並依海行法以十分為率置弓二分弩五分槍牌手三分遇結隊即依隊法從之鄜延再奏西人來議告哀云已收接公牒欲便諭以已奏朝廷乞發遣告哀使赴闕朝廷必須允從上許之輔臣皆稱善吕惠卿言諸路進築未已不爾無以取信也布録癸未六月五日九日考功員外郎陳師錫加祕閣校理知宣州甲申賜輔臣御筵于都堂既罷各賜銀絹曽布銀絹各一千丙戌詔客人投下河東三稅鈔內錢限三日支銀紬絹限五日紐算印給公據開元豐庫從河東轉運判官陳繫請也涇原奏罷近裏城寨官員詔諸路依此相度速具可以減罷員闕聞奏戍守兵馬亦速依近㫖裁損移那併廢布録丙戌章楶四月一日奏可考丁亥熙河蘭㑹經略使孫路言近據苖履踏逐到古㑹州巴寧㑹中間地形寬廣北控黃河可以置州已依朝㫖計置合用樓櫓材植等赴新城欲候今秋先築㑹州畢工即移兵了當打繩川東北楞摩之間兩寨詔孫路更切相度委是地形要便有水泉經久可以守禦即從長施行七月戊申曽布云云又甲寅孫路奏戊辰熙河奏又八月己卯布云云又辛巳苖履奏又丁亥姚雄知州九月庚午朔畢工戊子翰林學士承㫖蔡京等言臣等每緣職事請對待次或踰旬日方得瞻望清光而文字遇有急速深恐失事伏望指揮下閣門今後許翰林學士依六曹開封府例先次挑班上殿仍不隔班從之元符三年三月末六月末七月末可考中大夫蔣之竒叙復太中大夫從刑部檢舉也己丑熙河蘭㑹路經略司言夏國僞正鈐轄格斡寧以所部孶畜并部落子隆登等投漢詔格斡寧特與內殿崇班仍賜銀絹緡錢各三百接伴遼國泛使朝散大夫試祕書監曽旻等言新修國信敕令儀制等其中條例不無增損而事干北人者恐難改革又泛使往來雖係不常而新令條目元不該及乞下元修官審照舊例刋除略加添修詳定編敕國信條例所取索合用書狀體式更切參詳編修成册送國信所收管準備照使知通逺軍康謂丁母憂乞解官持服不許布録己丑詔應監官典押公文人員作匠之類若在京應管轄兩務去處人吏並不得承賃官宅舍屋地段違者各杖一百以上親戚許除賃住外亦不得轉賃違者杖八十從户部侍郎吳居厚請也新削壬辰鄜延路經略司言統制官苖履等管押人馬入西界討蕩至夏州大沙堆以來斬獲首級乞賜推恩從之五月二十八日苖履以知蘭州進築天都遷官不知今何故又在鄜延路出兵樞密院言鄜延路奏軍功將佐數十人所部止數千人恐減落所部人就分數酬賞令别保奏上曰恐是選精鋭者出戰曽布曰未有此例兼環慶張誠近緣減所部人就分數冒賞奪三官不可不再詰問從之布録戊子今附此太常博士吳絪言昨監釋奠于文宣王殿竊見正配三位設廟門外階上至行事時旋令諸生捧執而入體問得係是元祐中有司申請欲以觀諸生容止遂更此儀乞依元豐條例罷之其武成王廟亦宜凖此從之新削詔諸路進築限八月中旬了當五月二十六日癸巳朝散郎試給事中范鏜落職知蘄州皇城使泰州團練使李嗣徽降授慶州刺史朝奉大夫權禮部尚書蹇序辰落職降一官知黃州供備庫使兼閣門通事舍人帶御器械向縡落帶御器械并降供備庫副使一官衝替並以奉使遼國拜不如儀又不依例受擡箱馬及對制不實等事故也朝請大夫吏部郎中林邵降授朝散大夫衝替前降勒停指揮更不施行時彥等既坐責序辰及鏜獄尋具御史臺制勘所乞差録問官上令差刑部侍郎周之道先是序辰四問不承制勘所上殿得㫖令更一問如不盡情供招取㫖追攝勘所遂坐此㫖再劾序辰乃答云既奉㫖追攝更不敢依前分析仍不肯云所招並是詣實勘官再對言其違法不實之狀甚明衆證灼然又同使李嗣徽等悉已伏罪唯序辰多端避罪意待翻變將來雖結案録問必不免翻變乞依吕溫卿近例止以衆證結案更不取勘録問奉㫖范鏜以下結案録問蹇序辰依所奏以此獄方具上諭曽布曰序辰罪狀分明而拒抗如此當重行布曰近臣殊不知體貌亷恥一向無賴不肯伏辜中外傳笑以為近臣未有如此者上又曰范鏜已上章待罪却翻變舉措殊無義理布亦曰外議喧然傳笑此段在六月十五日丙戍於是同呈序辰鏜等案序辰三上書不實合罰銅九十斤鏜及李嗣徽三十斤向縡合追一官勒停上令鏜落職小郡嗣徽降遙刺衝替私罪重序辰亦落職小郡向縡罷帶御器械降供備庫副使衝替私罪重布曰序辰恐難與鏜一等卞曰亦重序辰乃尚書兼侍讀鏜止一職布曰法不如此彼此皆只是落一待制爾臣非有意於重序辰序辰奉使易擡箱絹拜受酒客省帳茶酒例外受馬自當削職更有九十斤不實之罪鏜止拜受酒一事若一等斷罪何以厭天下公議何以弭范鏜之口因言王琪止因副使言詐稱疾貶信州團練副使上曰太重布曰先朝李師中只因薦司馬光蘇軾亦貶副使上曰以害政故須爾布曰此誠如聖諭然序辰不可與鏜等卞又曰恰好也布曰更輕亦須更降兩官卞亟曰降一官不妨上從之布亦已許將曰如此唯林邵太重上曰如何布曰蔡卞曽言林邵特㫖是就重張宗卨特㫖是就輕卞亦謂然上曰已指揮奈何布曰改亦不妨衆皆曰可改遂令降一官私罪重然自事初衆皆憂序辰黨助多恐不可逐唯上意了然云誰敢為營救者又云須重行然終亦輕典序辰凶慝貫盈人莫敢動搖之者一旦逐去衆論快之布再對因言臣素不以士君子處序辰陛下觀其所為如此有一毫似士君子行義否臣素言章惇引序辰朱服為卞所誤又嘗言服已自敗序辰不久亦必敗今日驗之臣言皆不虛矣河東路經略司言麟府路軍馬司保奏知府州折克行逐次差蕃官結默等部領人馬入西界逢賊斬獲首級乞推恩從之環慶奏之字平進築關城并土橋堡畢工賜帥臣以下銀合茶藥布録癸巳詔孫路減㑹州及北楞摩城寨地步以邉臣言公私財力應辦不易故也布録癸巳五月十四日限八月以前築了七月十三日路奏乞不減地步甲午權殿中侍御史石豫言監內香藥庫李之儀因蘇軾知定州日薦辟管勾機冝文字之儀既為姦臣心腹之黨豈可更居此職欲令有司放罷從之賜環慶路新築之字平關城名曰龍平關舊本云賜名清平布録稱龍平與實録同新紀亦書甲午築龍平關按宋史亦作清平乙未大理少卿同詳定三司敕令劉賡言乞將官制敕令格式送三館祕閣收藏從之鄜延路都總管司言本路新築米脂等八堡寨合添置土兵馬步軍一十一指揮乞不招置只用永興軍等四州新置蕃落八指揮每年輪四指揮赴本路上畨詔河中府同華州新置蕃落六指揮令永興軍路兵馬都監鄧咸安量逐指揮人馬數多少分作兩畨一年一替權差赴鄜延路仍仰本路都總管司每指揮作一頭項差使即不得零差赴諸路詔熙河止築㑹州及北楞摩兩處城寨仍依前減地步其打繩川且為𤇺臺堡鋪遮護候來春進築章楶以書抵曽布言熙河財用不足民力疲敝乞罷築㑹州布具白上故降此詔布自言比元計功料已減其半也布録乙未丙申詔曰致明察者莫重於郊丘之祀極僾肅者莫嚴於祖考之薦乃者奉若猷訓憲章古昔罷合祭之瀆修特禋之典將以夏日之至祇欵皇祗之靈比覽有司之陳欲寢前期之告朕惟朝獻於原廟祼將於太室詎容曠歲之久不及躬祠之奉豈獨異事天之禮抑未稱饗親之誠怵惕永懷靡遑寧處其欽承於先例用悉講於多儀匪敢憚勤庶幾盡志將來親祠北郊前二日躬詣景靈宫朝獻太廟朝饗並依南郊儀制先是輔臣以大禮前朝謁宗廟起自近世北郊方暑可略上以為事天地當一體不可闕故有是詔昭宣使萊州防禦使內侍押班吳靖方為宣政使丁酉寶文閣待制知潁昌府吳安持為河北路都轉運使仍專切措置河事七月十八日罷新命河東路經略司言銀城肅定之間南至神泉共二百一十四里以吐渾河分定麟府嵐石兩路地分共建四寨并通路小堡子四座形勢險固經久可以守禦詔林希更切相度如委是險固控扼得賊馬道路經久决可守禦即一面從長施行實録於此下書就西沿邉安撫司言西蕃長結瑪遣人投漢齎到蕃字報說沁布結索諾木巴勒乞旗號頭巾要求詔孫路依詳近降朝㫖精加措置施行無令遷延有失機㑹今移八月末丁酉即六月二十七日也又詔所築四寨四堡仍限八月中旬了畢布録丁酉鄜延路經略司言昨據投來人稱西界首領威眀鼐濟特沙克率兵冦順寧寨差第三副將張守德等量帶人馬伏截至長城嶺掩殺西賊至赤羊川已來斬獲首級得功人乞推恩河東路經略司言近據太原府路鈐轄張世永等探聞得西界地分名星羅默隆橫川一帶賊馬屯聚尋領兵馬前去掩殺得功人乞推恩並從之戊戌詔進築環慶路定邉白豹城畢工以東上閣門使本路都鈐轄張存為四方館使充副總管左藏庫使都監种朴為皇城使升權鈐轄降授宫苑使權都監張誠復皇城使遙郡團練使為都監各賜銀幣有差布録云環慶築三城寨乞賞此但云定邉白豹應是脫金湯字己亥河决內黃口東流斷絶此據元符二年十月二十六日工部狀追書紹聖史官専主北流之議至東流斷絶乃略不正言其月日蓋姦臣意别有主於記述則未暇詳細耳趙鼎臣河渠書云元符二年六月河决內黃第一掃復北流故道詔遣吏部員外郎王祖道賑濟被水之民又命水部員外郎曽孝廣詣河北相度河事按遣祖道在七月九日遣孝廣在七月十八日右正言鄒浩奏伏聞大河水勢日近暴漲凡在衝注漂蕩一空如三門白波則其害尤甚蓋數十年以來所未有也道路相傳無不駭嘆臣愚欲乞應係陜西京東河北等路被水衝注去處並申飭逐路監司或自朝廷委官前去躬布惠澤厚加撫存庶幾漂蕩之餘生者得以自全而死者不至暴露以傷太平之和氣伏望聖慈詳酌速降指揮施行浩奏不得其時附二年六月末浩又奏臣伏見去年河北京東等路大水為害甚於常時上賴聖恩撫存百姓方幸全復而今年之水又非去年可比蓋自陜西京西以至河北其間州縣當水衝者皆漂蕩民人毁壞廬舍至不可勝計仰惟朝廷申飭監司舉行詔條所以宣導德澤甚厚然而頻年以來水旱相繼雖盈虛之數所不可逃而消復之方尤宜致謹書曰惟先格王正厥事正厥事而已不以為數之當然此消復之實也臣愚伏觀陛下清靜以承天休寅畏以謹天戒惟恐一物失所無以當上天愛育之意固已應天有其實矣尚慮政令施設之間人才進退之際有未足以釋公議者伏望睿慈深賜照察以盡格王正厥事之義不勝幸甚此奏亦附見當考其時浩又奏伏見諸路監司率以本路雨澤霑足秋成有望奏聞朝廷然天道高逺難以豫知若後來雨過多或後來雨不繼為水為旱决不可逃緣監司既嘗奏陳不惟本司務掩前言兼所屬州縣互相觀望雖行檢放亦非實數甚者公然抑勒不令申訴災傷民間窘無所出重以威勢督之遂至質賣妻孥委棄父母轉徙溝壑無以自存為害甚大不可不察伏望聖慈嚴降指揮敕戒諸路監司及州縣長吏如敢似此害及百姓並重行黜謫庶幾今後莫不警懼上副陛下惻怛愛民之心此奏亦不得其時姑附見此是月西蕃大酋畢斯布結等與果莊妻桂摩及其妻孥并果莊河南舊部族皆叩河州岷州境上乞以嘉木卓葉公磋藏丹貝四城來降畢斯布結者結斡磋之子果莊孫也果莊嘗逐溪巴烏其叔父阿蘇又嘗賊殺杓贊世有仇怨聞溪巴烏起河南諸部多歸之畢斯布結不自安故請內附且言轄正已為森摩乾展等所囚廢青唐可取之狀王贍亟具奏乞朝廷速取青唐今時不可失朝廷以前此溪巴烏亦求助于漢邉臣不能知曲折失不以聞今既得志遂不復來方鄂特凌古之篡嘗加封爵而溪巴烏之立初無以助之又納其叛人恐溪巴烏必怨然不納則河南一帶部族未肯附溪巴烏不乘時撫而有之將失機㑹乃詔孫路依詳近降朝㫖精加措置施行無令遷延有失機㑹七月六日七日十一日此據高汪二録增修實録於六月丁酉二十六日書洮西沿邉安撫司言西蕃長結瑪遣人齎到蕃字報說沁布結索諾木巴勒乞旗號頭巾要求投漢詔孫路依詳近降朝㫖精加措置施行無今遷延有失機㑹今移八月末沁布結長結瑪索諾木巴勒當即是畢斯布結桂摩等也曽布日録六月十二日癸未同呈令孫路應接邈川事先是知河州王贍自五月二十三日奏溪巴烏殺果莊子阿蘇奪錫勒噶爾城自稱王子河南部族多叛轄正而歸巴烏巴烏本董戩親姪董戩無子而巴烏見疑遂逃而董戩死竟為鄂特凌古所篡及轄正立而多殺首領人情不附又以溪巴烏佛種人頗附之巴烏遣長子杓贊往奪錫勒喀爾城為阿蘇所殺故巴烏因衆怒而起攻錫勒喀爾城中人為內應遂殺阿蘇而據之部族翕然歸附牛羊倉庫皆為其所有果莊子畢斯布結等與果莊妻桂摩及其妻孥并河南果莊舊部族皆叩河州岷州境上乞歸漢贍屢以聞及報經略司而路不敢納又報黃河橋已斷轄正相森摩乾展亦叛轄正而與巴烏通森摩乾展轄正所恃以立今既叛矣則轄正之不能保無疑矣畢斯布結等皆果莊之黨納之則溪巴烏必怨不納則河南一帶部族未肯附溪巴烏不乘此時撫而有之則恐失機㑹故令孫路子細斟酌敵情相度收接畢斯布結等言若漢家不納即乞借路往投夏國蓋其下已離勢已迫蹙不得不爾溪巴烏初亦求助于漢而贍路輩不能深知其謀亦不詳以情狀上聞又不敢應接巴烏已得志亦不復求助方鄂特凌古之篡朝廷為加封爵而溪巴烏之立又無以助之異時猶恐其與我為仇也顧邉臣所以鎮撫應接之何如耳高永年隴右録云知河州王贍以青唐之亂告云云建言甚力朝廷從之命贍主其事而邈川諸猶求內附時熙河方城㑹州因中分其兵詔孫路駐河州贍以河州軍馬為先鋒總管王愍總熙岷軍馬䇿應以撫納邈州諸酋實元符二年秋七月十八日也七月十八日事附七月二十五日
