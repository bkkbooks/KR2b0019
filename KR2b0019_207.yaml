body:
  text: 續資治通鑑長編卷二百三宋李燾撰英宗治平元年冬十月庚子閲諸軍班直將校武藝擢授有差上諭天武右第三軍都指揮使竇州刺史王秀曰爾藝雖不中格而嘗有戰功故以爾為正刺史又諭散直都虞候胡從曰爾藝雖不中格而治兵齊肅故以爾為內園使命殿前副都指揮使郝質戒諸軍勤習武藝特支諸軍班錢辛丑屯田員外郎直祕閣同知禮院周孟陽告謝上諭閣門引對于延和殿久之自是數召見訪以時事最後至隆儒殿在邇英閣後苑中羣臣未嘗至也癸卯禮院奏魏國公宗懿無後濮王無嫡孫故事宗室推本位最長者承襲瀛州防禦使宗朴濮王第二子今於本位最長詔封宗朴襲岐國公壬子翰林學士王圭等言殿中侍御史趙鼎奏本朝祀儀冬至祀昊天上帝夏至祀皇地祗並以太祖配正月上辛祈穀孟夏雩祀孟冬祭神州地祗並以太宗配正月上辛祀感生帝以宣祖配季秋大饗明堂舊以真宗配循周公嚴父之道最為得禮陛下純孝之仁固已格于上下矣臣聞孝者善繼人之志善述人之事陛下祇紹大統纂承洪業固當繼先帝之志而述先帝之事也仁宗臨御四十二年配饗真宗於上帝者四十一祭今一旦黜真宗之祀廟而不配非所以嚴崇祖宗尊事神明之義也臣謹按易之豫曰先王以作樂崇德薦之上帝以配祖考此稱祖者乃近親之祖非専謂有功之始祖也考易象之文則真宗配天之祭亦不可闕也有唐武德初以元皇帝配饗明堂兼配感生帝至貞觀中緣情革禮奉祀髙祖配明堂遷世祖配感生帝此則唐太宗故事已有遞遷之典最為近古之治有足考驗臣伏請遞遷真宗配孟夏雩祀以太宗専配上辛祈穀孟冬神州地祗循用有唐故事如此則列聖參侑對越於昊天厚澤流光垂裕於萬祀臣圭等按祀典天地大祭有七皆襲用歷代故事以始封受命創業之君配神作主至於明堂之祭用古嚴父之道配以近考故朝廷在真宗則以太宗配在仁宗則以真宗配今則以仁宗配方仁宗始以真宗配明堂罷太宗之配而太宗先已配祈穀雩祀神州地祗本非遞遷今明堂既用嚴父之道則真宗配天之祭於禮當罷難議更分雩祀之配天章閣待制兼侍讀李受天章閣侍講傅卞言自唐末喪亂及五代凌遲中夏分裂皇綱大壞我太祖太宗以神武英睿一統海內功業之大上格皇天真宗以盛德大明纂承洪緒故先帝景祐詔書令禮官議定以真宗與太祖太宗並為萬世不遷之廟然則侑配之道是宜與國無窮矣豈可甫及陛下而遂闕其禮乎議者乃謂遵用嚴父配天之義臣等竊謂嚴父云者非専謂考也故孝經曰嚴父莫大於配天則周公其人也下乃曰郊祀后稷以配天宗祀文王於明堂以配上帝夫所謂天者謂郊祀配天也夫所謂帝者謂五帝之神也故上云嚴父配天下乃云郊祀后稷以配天則父者専謂后稷也且先儒謂祖為王父亦曰大父則知父者不専謂乎考也議者又引唐制代宗用禮儀使杜鴻漸等議季秋大饗明堂以考肅宗配昊天上帝德宗亦以考代宗配又稱引王涇郊祀録注云即孝經周公嚴父之道夫杜鴻漸王涇一時之言豈可便為萬世不移之議哉臣等竊謂趙鼎之議亦為得禮若以太宗配雩祀既久不欲一旦遷侑則乞以仁宗與真宗並配明堂亦為合禮謹按孝經郊祀后稷以配天宗祀文王於明堂以配上帝又按禮記祭法周人禘嚳而郊稷祖文王而宗武王文武但言祖宗者則知明堂之侑下及乎武王矣是文武並配于明堂也故鄭氏曰祭五帝五神於明堂曰祖宗祖宗通言爾國家祭祀既遵用鄭氏之義固亦當稽鄭氏祖宗之說也又易曰先王以作樂崇德薦之上帝以配祖考是亦以祖考並配上帝也上帝之祭正謂明堂宗祀爾昔梁國子博士崔靈恩該通之士達於禮者也總三禮諸儒之說而評之為義宗論議洪博後世蓋鮮能及伸明鄭義亦謂九月大饗帝之時以文武二王泛配謂之祖宗祖者始也宗者尊也所以名祭為始尊者明一祭之中有此二義稽乎孝經祭法周易義宗之言則父子並侑可謂明著矣或者謂父子並坐有乖禮制臣等竊謂不然者唐朝故事已有並侑之禮況向來本朝祀典太宗親祀昊天奉太祖配真宗親祀奉太祖太宗配仁宗親祀奉太祖太宗真宗同侑歷五六十載之間本朝通儒不以為非則於此獨何疑哉如是則太宗既不失雩祀之配真宗又不遷明堂之舊得周家祖宗之義合鄭氏九祭之說神明安之祖考饗之而孝道盡矣詔從圭等議實録及本志載趙鼎及李受傅卞議殊略今依會要詳述之蓋卞受所論嚴父不専為近考足以表裏錢公輔司馬光吕誨正月間所言不可為其言不行遂削不著也庚申翰林學士賈黯奏近詔令內外薦舉文武官堪備升擢及將領任使臣見頃者下詔薦士或其人已有薦者而有他人薦之則例皆責以别舉臣愚謂宜無限重復所薦多者特加擢用則庶幾得人從之十一月甲子詔中外文字不得用受益二字翰林學士賈黯奏仁宗舊名所當避也乙亥命屯田郎中徐億職方員外李師錫屯田員外郎錢公紀刺陜西諸州軍百姓為義勇初宰相韓琦奏三代漢唐以來皆籍民為兵故其數雖多而贍養至薄所以維制萬㝢而威服四方又非近世所蓄冗兵可及也唐置府兵最為近古天寶已後不能復因循至于五代廣募長征之兵故困天下而不能給今之義勇河北幾十五萬河東幾八萬勇悍純實生於天性而有物力資産父母妻子之所係若稍加簡練亦唐之府兵也陜西當西事之初亦嘗三丁選一丁為弓手其後刺為保捷正軍及夏國納欵朝廷揀放於今所存者無幾河北河東陜西三路當西北控禦之地事當一體今若於陜西諸州亦㸃義勇止刺手背不復刺面可無驚駭或令永興河中鳳翔三府先刺闕一字聽既安然後次及諸郡一時不無小擾而終成長利詔從之樞密副使胡宿請且刺㳂邊州軍上曰不若即了之韓闕四字如此乃命億等往除商虢二州不籍餘悉籍義勇闕四字三丁選一六丁選二九丁選三二十至五十材闕二字充止刺手背以五百人為指揮置指揮使并副二人正闕字一頭三人十將虞候承局押官各五人嵗以十月畨上閲教闕一字月而罷又詔秦州成紀等六縣有買保毅田承名額者三丁刺一六丁刺二九丁刺三悉以為義勇人賜錢二千總得十五萬六千八百七十三人按英宗紀作十三萬蓋據會要之數故與此異至司馬光傳云刺義勇二十萬則因後韓琦驟益二十萬兵之語而誤也其後復詔秦隴儀渭涇原邠寧環慶鄜延十二州義勇召集防守日給米二升月給醬菜錢三百實録云刺義勇十三萬八千四百六十五人㑹要與實録數同今從本志十二州别給米及錢會要乃三年八月十日事本志以為是嵗今從本志並附見于此於是知諫院司馬光奏曰伏見康定慶厯之際趙元昊叛亂王師屢敗乏少正軍遂籍陜西之民三丁之內選一丁以為鄉弓手尋又刺充保捷指揮於㳂邊戍守閭里愁怨不可勝言耕桑之民不習戰鬥官中既費衣糧私家又須供送骨肉流離田園蕩盡陜西之民至今二十餘年終不復舊者以此也是時河北河東邊事稍緩朝廷但籍其民以充義勇更不刺為正軍今議者但怪陜西獨無義勇不知陜西之民三丁已有一丁充保捷矣西事以來陜西困於科調比於景祐以前民力減耗三分之二加以近嵗屢遭凶歉今秋方獲小稔且望息肩又值邊鄙有警衆心已搖若更聞此詔下必大致驚擾况即日陜西正軍甚多不至闕乏何為遽作此有害無益之事以循覆車之轍又奏曰臣前上殿乞陛下留意備邊所謂備者非但添屯軍馬積貯糧草而已在於擇將帥而修軍政今將帥不才者未聞有所改更軍政頺斃者未聞有所振舉而無故籍耕桑之民使之執兵徒有驚擾而實無所用昔康定慶厯之間陜西之民為鄉弓手始者明出敕榜云使之守護鄉里必不刺充正軍屯戍邊境榜猶未收而朝廷盡刺充保捷指揮令于邊州屯戍當是時臣丁憂在陜西備見其事民皆生長太平不識金革一旦調發為兵自陜以西閭閻之間如人人有喪户戶被掠闕二字逃避於外官中縶其父母妻子急如追捕鬻賣田園以充購賞刺面之後人員教頭利其家富百端誅剝衣糧不足以自贍須至取於私家或屯戍在邊更須千里供送父母財産日消月鑠以至於盡况其平生所習者唯桑麻耒耜至於甲胄弩槊雖日加教閲不免生疏臨敵之際得便即思退走不惟自喪其身兼更曵動大陳自後官中知其無用遂大加沙汰給以公據放令逐便而惰游已久不復肯服稼穡之勞兼田産已空無復歸望皆流落凍餒不知所在長老至今言之猶長嘆出涕其為失業較然可知今朝廷雖云所籍之民止刺手背農隙之時委州縣召集教閲止在鄉里不令戍邊而民間懲往年之事必大興訛言互相驚擾朝廷號令失信前後已多雖州縣之吏遍至民家面加曉諭亦終不肯信逃亡避匿刑獄必繁足以動搖羣心感傷和氣若使分毫有益於國亦無所顧此有害無益顯然明白伏望陛下軫念生民早賜寢罷又奏曰臣聞之易曰不逺復無祗悔元吉說命曰無恥過作非今雖敕命已下若追而止之猶勝于遂行不顧不可避反汗之嫌而蹈迷復之凶也百姓一經刺手則終身羈縻不得左右人情畏憚不言可知康定年揀差鄉弓手時元不刺手後至慶厯年中刺充保捷富有之家猶得多用錢財雇召壯健之人充替今一切皆刺其手則是十餘萬無罪之人永充軍籍不得復為平民其為害民尤甚於康定之時也望指揮下陜西路其義勇未得揀刺别候指揮然後博延卿士大夫更熟察其可否又奏曰臣比日以來熟思其故誠於民有世世之害於國無分毫之利何謂於民有世世之害臣竊見河北陜西河東自景祐以前本無義勇凡州縣諸般色役並是上等有物力人戶支當其鄉村下等人戶除二稅之外更無大假差徭自非大飢之嵗則溫衣飽食父子兄弟熙熙相樂自寶元慶厯之間將陜西一路弓手盡刺充保捷正軍自此騷然愁苦矣其河北河東之民比於陜西路雖免離家去鄉戍邊死敵之患然一刺手背之後或遇水旱凶荒欲分房逐熟或盡典賣田産欲浮游作客皆慮官中非時㸃集不敢東西又差㸃之際州縣之吏寧無乞覔教閲之時人員教頭寧無斂掠是以常時色役之外添此一種科徭朝廷近年分命朝臣遍往諸路減省色役至于弓手壯丁解子驛子之類州縣所不可闕者亦皆減放謂之寬恤民力今乃無故刺一路之民十餘萬以為義勇何朝廷愛之於前忍之於後憫之於小而忘之於大乎且今日既籍之後則州縣義勇皆有常數每有逃亡病死州縣必隨而補之然義勇之身既羈縻以至老死而子孫若有進丁又不免刺為義勇是使陜西之民子子孫孫常有三分之一為兵也故臣曰於民有世世之害也何謂於國無分毫之利太祖太宗之時未有義勇至于正軍亦不及今日十分之一然而太祖取荆湖平西川下廣南克江南太宗取兩浙克河東一統天下若振槁拾遺此豈義勇之力也蓋由民政修治軍令嚴肅將帥得人士卒精練故也康定慶厯之間趙元昊負纍朝厚恩無故逆命侮慢不恭侵犯邊境朝廷竭天下之力以奉邊鄙劉平任福葛懷敏相繼覆沒士卒死者動以萬數正軍不足益以鄉兵外府不足繼以內帑民力困極財物殫盡終不能出一旅之衆涉區脫之地以討其罪而不免含垢忍恥假以寵名誘以重賂僅得無事當是時三路新置鄉兵共數十萬何嘗得一人之力乎以此觀之義勇無用亦可知矣賈誼曰前車覆後車戒康定慶厯禦戎之策國家當永以為戒今乃一一檢當時體例而行之是後車又將覆也有難臣者必曰古之兵皆出民間豈民兵可用於古而不可用於今乎臣則對曰三代之時用井田之法以出士卒車馬居則為比閭族黨州鄉行則為伍兩卒旅師軍為之長者皆卿士大夫也唐初府兵各有營府有將軍郎將折衝果毅以相統攝是以令下之日數萬之衆可以立集無敢逃亡避匿者以其綱紀素備故也今鄉兵則不然雖有軍員節級之名皆其鄉黨族姻平居相與拍肩把袂飲博鬥毆之人非如正軍有階級上下之嚴也若安寧無事之時州縣聚集教閲則亦有行陳旗鼓開弓彍弩坐作呌噪真如可以戰敵者設若聞敵冦大入邊兵已敗邊城不守則莫不迎望風聲奔波迸散其軍員節級將鳥伏鼠竄自救之不暇豈有一人能為縣官率士卒而待冦乎以臣觀之此正如兒戲而已安有為國家計騷擾一路之民使之破家失業而為兒戲之事乎臣故曰於國無分毫之利也又奏曰今建議以義勇為便者必曰即河北河東不用衣糧而得勝兵數十萬皆教閲精熟可以戰敵又兵出民間合於古制臣請言其不然彼數十萬者虛數也教閲精熟者外貌也兵出民間者名與古合而實異也古者兵出民間耕桑之所得皆以衣食其家故處則富足出則精鋭今既賦斂農民之粟帛以贍正軍又籍農民之身以為兵是一家獨任二家之事也如此民之財力安得不屈以臣愚見河北河東已刺之民猶當放遣况陜西未刺之民乎陛下欲知利害之實何不召試建議者而問之曰河北河東自置義勇以來敵冦凡幾次深入腹內州軍用義勇拒戰而敵冦敗退今既有義勇之後三路正軍皆可廢而不用乎若果然敵冦曾深入因得義勇之力而敗退今來刺義勇之後正軍皆可廢罷此乃萬世之長策也願陛下行之勿疑若自置義勇以來未嘗經陳敵使用今來雖有義勇正軍亦未可廢罷則何忍以十餘萬無罪之赤子盡刺以為無用之兵乎若以為敕命已行不肯遽改即乞且免刺手背候邊事息依舊放散則民雖有一時騷擾之勞猶免終身羈縻之苦若以臣所言皆孟浪迂濶不可施行則臣之知識愚暗更不可久汚諫諍之列望别擇賢才而代之又奏曰臣昨上殿乞罷刺義勇陛下宣諭以為命令已行臣退而思之不勝欎悒終夕不寐深病陛下此言之失自古明聖之君聞一善言立為之變更號令者多矣不可悉數惟近嵗大臣自知思慮不熟號令已失無以抑奪臺諫之言則云命令已行難以更改此乃遂非拒諫之辭陛下新臨大政當求善無厭從諫如流之時而亦有此言天下將何望焉且唐室以前諫議大夫拾遺補闕皆中書門下省屬官日與中書令侍於天子之側議論大政茍事有闕失皆得隨時規正今國家凡有大政惟兩府大臣數人相與議論深嚴祕密外廷之臣無一人知者及詔敕已下然後臺諫之官始得與知或事有未當須至論列又云命令已行難以更改則是國家凡有失政皆不可復救也如此豈惟愚臣一人無用於時諫諍之官皆可廢也以臣所見但當論其事之得失言之是非不當云命令已行不可改也今陜西一路之民小大皇皇正如在湯火之中若忽得朝廷指揮云所有義勇且住揀刺其已刺手背者並給與公憑放令逐便得出湯火之中死而復生也其誰不歡呼鼓舞感戴聖恩豈有人云命令已行不當復改邪陛下萬民之父母萬民陛下之赤子豈有父母誤墜其子於井而曰吾誤矣遂忍不救邪昔舜稱堯之德曰稽於衆舍已從人仲虺稱湯之德曰用人惟已改過不吝臣願陛下勿以先入言為主虛心平意以察臣前後五次所言果然為是為非若其是歟即乞早降指揮罷刺陜西義勇若其非歟即乞如臣前來所奏特賜降黜别擇賢才而代之所有命令已行之言伏望陛下自今永以為戒不可使天下聞之塞絶善言之路也終勿聽光又六奏及申中書自劾求去終勿許嘗至中書與韓琦辨琦謂光曰兵貴先聲後實今諒祚方桀傲聞陜西驟益二十萬兵豈不震懾光曰兵之用先聲為無實也獨可以欺之於一日之間爾少緩則敵知其情不可復用矣今吾雖益二十萬兵然實不可用過十日西人知其詳寧復懼乎琦不能答復曰君但見慶厯間陜西鄉兵初刺手背後皆刺面充正軍憂今復然耳今已降敕榜與民約永不充軍戍邊矣光曰雖光亦未免疑也琦曰吾在此君無憂此語之不信光曰光終不敢奉信非獨不敢但恐相公亦不能自信爾琦怒曰君何相輕甚耶光曰相公長在此可也萬一他人當位因相公見成之兵遣使運糧戍邊反掌間事耳案此處原本多錯訛今據宋史及薛氏續綱目改正戊寅詔內侍遇聖節進子食祿如故事案宋史云復內侍養子令當即此事嘉祐四年五月庚子詔除之從樞密院奏請也會要載樞密院奏請此必有故當考己卯知桂州陸詵奏交趾使所議事上因問交趾於何年割據輔臣對自唐至德中改安南都護府梁正明中土豪曲承美専有此地韓琦曰向以黎樞叛命案宋史黎樞作黎桓太宗遣將討伐不服後遣使招誘始效順山路險僻多潦霧瘴毒之氣雖得其地恐不能守當懷柔之爾是冬陸詵始按邊至雍州召左右江四十五峒將領指麾下閲土丁得精兵五萬補置將校請更鑄印給之奏免兩江積缺稅物數萬交趾大恐因遣使朝貢辭禮加恭其後詵又奏請每嵗一教土丁從之仍自今三嵗一造籍以聞此事附見交趾遣使當自有日月詵請雍州溪洞丁比嵗一教三嵗一造籍以聞乃明年八月事今附見屯田員外郎知襄邑縣范純仁為江東轉運判官襄邑有牧地衛士縱馬暴民田純仁取一人杖之牧地初不𨽻縣有詔劾純仁純仁言兵須農以養恤兵當先恤農朝廷是之釋不問且聽牧地𨽻縣自純仁始純仁仲淹子也戊子將作監致仕贈太子少師吳懷德卒樞密副使奎父也贈太子少師懷德少貧賤不羈及奎貴尚與市井小人飲博無所擇然遇奎甚嚴不以貴故有所寬假也奎居喪毁瘠廬於墓側終喪不飲酒食肉嵗時潔嚴祭祀不徇俗為浮屠事范鎮東齊記事可附見十二月庚子知制誥祖無擇獻皇極針賜詔獎之丙午翰林學士禮部侍郎王疇為樞密副使上嘗謂輔臣曰疇善文章歐陽修曰其人亦徑正但不為赫赫之名耳一旦晚御小殿召疇草詔因從容談中外事語移時上喜曰卿清直好學朕知之久矣非今日也數日遂有是命疇辭不敢拜上遣內侍趣疇入御延和殿以俟之日已昳須疇入乃歸知制誥錢公輔封還詞頭言疇望輕資淺在臺素餐不可大用又頗薦引近臣可為輔弼者上以初政除兩府而公輔沮格制命不行丁未責授滁州團練副使不簽書本州事知制誥祖無擇乞薄責公輔且不即草詔上欲并責無擇中書救之戊申坐罰銅三十斤知諫院事吕誨言疇自登科三十五年仕宦不出京城進身由徑從而可知公輔言其資淺望輕蓋欲朝廷選任賢才未為過也責降太重士論紛紜臣竊為陛下惜之伏乞復公輔舊官止奪其職移知僻小州軍俾令思過稍息紛紜之論天章閣待制兼侍講吕公著亦上疏乞寢公輔責命不報後數日龍圖閣直學士盧士宗因奏審刑院事對便殿從容又為上言外議皆謂責公輔太重訖不從明年十二月乃以刑部員外郎知廣德軍録故江浙等路提㸃銀鉛銅錫坑鑄錢事職方員外郎張述男甫侯為太廟齊郎司馬光引此論陳洙當考殿前馬步軍司奏請內外諸軍排連弩自四石五斗已上二斗當弓一斗不及四石五斗三斗乃當弓一斗槍刀手以會路數便次精熟者為合格藝均先槍手從之先是排連以弓弩槍刀為次引弩四石猶在弓射八斗之下人以為未當故改制焉內侍省押班文思副使王昭明為環慶路駐泊兵馬鈐轄専管勾本路兼管勾鄜延路蕃部公事慶州駐劄供備庫副使帶御器械李若愚為原涇路權駐泊兵馬鈐轄専管勾本路兼權管勾秦鳳路蕃部公事渭州駐泊令體測蕃情治其訴訟公事及有賞罰則與其帥議而大事即以聞各許嵗乘驛奏事團結强人壯馬預為經畫冦至令老弱各有保存之所後數日又以西京左藏庫副使梁實領秦鳳內殿承制韓則順領鄜延而令昭明若愚専領本路前世以宦人豫邊事將不得盡其用及有是命人不以為便也實録云卒罷之蓋追記治平四年六月事不取諫官吕誨言自唐以來舉兵不利未有不自監軍者我朝因循前弊尚多久未更革奈何又增置此員如走馬承受官品至卑一路已不勝其害况今鈐轄寄重其實已均安撫使之權矣原朝廷意必為昨來熟户背叛弓箭手逃亡使之以時犒設専行姑息何其疏也臣嘗見熟戶耕佃官田並無征徭遇戰鬭方出一人一騎兹外更無侵擾熙熙安業界外生戶無背漢之心明矣但為諒祚誘之以厚利劫之以重兵邊臣坐觀殺戮不為救護役將逃死豈得已也若威加邊外戎人不敢內侵熟戶自然安堵不然雖豐牛酒日為犒設徒有損費何益於事哉至如士卒久失訓練蓋官兵不務協同借若五將中有一員內臣則不喜教閲動為姑息唯恐生事上下因循茍簡則軍旅無繇精鋭斯中官姑息之效也疆場之事果只如此處置未知其利而但見其害藩籬不日隳壞將盡藩籬隳壞則邊臣危矣臣前奏乞於無事整緝熟戶弓箭手大臣合議終不以為然臣觀今日處置誠未為便喑默不言則負任使所謂鈐轄四人者臣欲乞朝廷罷之精擇帥臣凡事一切付委庶幾閫外之權専制則於體重矣御史傅堯俞趙瞻皆有論列瞻又因入對力請追還昭明等否則願受顯逐訖不從瞻盩厔人也王昭明等至召蕃部酋領稱詔犒勞賞以銀帛籍城寨兵馬計族望大小分隊伍給旗幟使各繕堡壘人置器甲以備調發仍約如令下不集押隊首領以軍法從事秦鳳路寨十三彊人四萬一千一百九十四壯馬七千九百九十一鄜延路軍城堡寨十蕃兵一萬四千五百九十五官馬二千三百八十二彊人六千五百四十八壯馬八百十涇原路鎮寨城堡二十一彊人一萬二千四百六十六壯馬四千五百八十六為一百十甲總五百五隊環慶路鎮寨二十八彊人三萬一千七百二十三壯馬三千四百九十五總一千一百八十二隊此據本志乃治平二年事今附見知延州程戡言蕃部所以亡去苦邊吏苛暴為西人誘略爾今昭明等徒能呼召首領慰恤以言犒賜以酒肴茶帛亦未足以結其心也而甚動邊聽宜改用昭明等為路分鈐轄都監各部一將軍馬兼㳂邊巡檢使勿復専蕃部事亦不從程戡正傳云從其奏誤矣實録院檢討官集賢校理宋敏求諸王府記室參軍直集賢院韓維同修起居注初修起居注缺中書進敏求及集賢校理楊繪上問修起居注選何等人中書對近例以制科進士髙等與館職有才望者兼用繪皇祐五年第二人進士今以次當補上曰修起居注即知制誥豈以次補乃命繪繪綿竹人也先是張方平言知制誥之職所以代王言為詔令由此召入禁令充學士非才譽允洽何以當其選比來朝廷率以體例次補近日誥命或有鄙淺傳為口實前代國家有事之際或以單札片辭折衝千里之外使三軍感勵萬方悅勸背逆見之或以革心夷狄聞之或以向化故知文辭書命有足以助國威宣王澤也祖宗之世有自州縣之職拔處辭禁有自兩禁黜為管庫者蓋惟才是用豈為人擇官其修起居注史館修撰即次知制誥之資序也今朝士不修廉恥至冒憲章法座之前輒自干請竊謂若此除授宜詳加推擇必其流品才地辭學器識他日可以備大臣之用而後擢處其職文物盛於本朝光華昭於天下使名器以重堂陛以隆此時張方平已出知鄆州疑方平先有是言故英宗不以例特除用人因附見更須考詳癸丑吏部員外郎天章閣待制河北都轉運使趙抃為龍圖閣直學士知成都府抃前使蜀時言蜀人好祅祀聚衆為不法請以其首處死餘皆黥流抃至會有犯者繫獄蜀人大恐抃謂囚曰汝輩能復業吾釋汝罪皆叩頭乞自新止坐為首者餘釋不問蜀人歡服他日上謂轉運使榮諲曰趙抃為成都中和之政也丁巳都官員外郎三司修造案勾當公事張徽權發遣户部判官使都官員外郎知東明縣皮公弼權發遣度支判官近嵗三司官以次遷而任不久凡天下財利盈虛出入雖能者居之未及究本末而已用次遷他職故相習以養資假途為說而不事其職至是中書奏請擇其尤繫要者五員用資淺人久任其餘以待諸路轉運使提㸃刑獄為出入之資於是以鹽鐡設案度支錢帛按戶部修造按及開拆司選初任通判一嵗以上人權發遣候及三嵗令再任與理知州資序兩任通判六嵗與理提㸃刑獄資序三任通及九嵗與理第二任提㸃刑獄出外如差第二任通判一嵗以上人權發遣候及三嵗令再任與理初任提㸃刑獄資序兩任通及六嵗與理第二任提㸃刑獄資序三任通及九嵗與三司判官願出者與轉運副使今命徽等用新制也嘉祐七年五月司馬光論財利疏當考司馬光言朝廷更置權發遣三司判官事既使之久于其任且待以不次之位當得清修孤直之人使天下知勸皮公弼為吏以貪叨致富資性狡猾善于進取在京師則造請不倦在外則書疏相尋専用此術致舉者三十餘人一旦首膺兹選誠不稱陛下求賢之意乞追還前命勒歸故官凡再言之不報是嵗戶一千二百四十八萬九千四百八十一丁二千八百八十二萬三千二百五十二夏秋稅一千五百九十四萬九千八百六十九石以災害放二百九十三萬一千八百石斷大辟二千四百九十三人
