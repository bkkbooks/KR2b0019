body:
  text: 續資治通鑑長編卷三百四十七宋李燾撰神宗元豐七年秋七月己亥以奉議郎徐彥孚提舉荆湖北路常平等事彥孚知衛州黎陽縣嘗言青苖息錢可用常平法聽民非時吉凶匱乏用抵保稱貸立期輸官不報又言保甲逃亡恐積以歲月寖虧本數乞立責正長法下開封府界三路保甲司相度以聞故有是命手詔李憲朝廷奉祀所用圭壁璋瓉常患乏良玉充用近歲于闐等國雖有貢者然品色低下無異惡石爾可博選漢蕃舊善於賈販與諸蕃蹤迹諳熟者厚許酬直令廣行收市并逹是意於鄂特凌古等處求之無害詔陜府西路緣邉諸軍戰馬並依河東麟州例不以上下槽支草料各七分知延州劉昌祚乞不以冬夏支八分上批戰馬在軍政固已要重今用兵未已適當乏馬所係實大特依所乞陜西河北河東熙河路準此庚子詔增韶州岑水場銅價從提點鑄錢司請也辛丑新河東轉運副使范純粹為右司郎中六月四日除運副右司貟外郎承議郎孫覽為河東轉運副使上批聞純粹與知太原府吕惠卿素有私嫌恐難協濟事故也工部言知河南府韓絳乞修大內長春殿等欲轉運司支錢認買木錢萬緡從之夔州路轉運使王宗望乞就成都府置𣙜鹽司即兩蜀産鹽之地置場其井盡𣙜於官然後售之於民收無過一分五釐歲入無慮三十萬緡乃乞量損蒲江鹽直庶幾興利除害以惠逺民成都府梓州路並為𣙜鹽禁地煎鹽戶赴官入中不得私賣買陵井監之井研榮州之應靈専置場各差監官其餘州縣鹽井少處就差稅務官兼無稅務處委令佐置場成都府置轉般都鹽務受諸場運鹽先留息錢一分為元買場課額令都務增腳稅約時價賣漸抑兼并常平鹽價略計兩路共六百井大井日煎鹽千斤小井二百計日收十八萬斤歲得鹽六千三百七十二萬約百斤之價為四千為錢二百五十四萬八千八百緡每緡收息一分五釐歲收息三十八萬二千三百二十緡乞降度僧牒五百銀十萬兩借兩路轉運提舉司錢四十緡為本侯三年撥還其本錢雖當用二百五十四萬有竒若以法支移止用今所乞數可足詔下逐路轉運司詳具可否利害以聞四方館使榮州團練使涇原路總管姚麟乞以南郊奏子恩贈祖福一官詔以麟世有戰功特從之詔遣官於河北河東路依格按閲第一畨保甲事藝四方館使唐州刺史曺誦入內內侍省東頭供奉官勾當內東門司閻安河北東西路東上閣門使樞密副都承旨張山甫入內內侍省東頭供奉官勾當御藥院劉惟簡河東路壬寅詔提舉陜西買馬官展磨勘二年以有司言歲買馬不及額也癸卯提點開封府界諸縣鎮公事范峋言詔發開封府界戶馬三千三百匹貼支河東麟延環慶逐縣戶馬已選發外少一千一百餘匹詔支京東西路坊郭戶馬其尚少數更不貼令峋具開封府界以故不起發戶馬數以聞六月九日當考開封府言故宣徽南院使李處耘孫諶故參知政事郭贄孫爰各乞祖繪像恩諶犯姦會赦爰詈本屬知縣決杖並編管未敢推恩詔並推恩爰與右職中牟縣管勾牧放未合羣馬侍禁李思道殿侍何淵各展磨勘三年以經制牧馬司言棚屋倒塌馬多死傷也朱本云事小不書甲辰知河南府韓絳言伊洛暴漲衝注城中軍營欲望應被水災廂禁軍等第與特支錢及先修軍營其水北軍民被害續奏請詔經水災民戶令體量賑恤被水廂禁軍以差賜般移錢死者依漂溺民戶法給錢舊紀書伊洛溢浸西京新紀但書伊洛溢大名府路安撫司言元城掃河抹岸決橫隄破城見閉子城固護倉庫等詔北外都水監丞司河北轉運司官親督閉塞城南橫隄水口舊紀書河溢元城掃浸北京遣使賑恤賜溺死者家錢新紀因之但改溢字作失字知太原府吕惠卿言故左藏庫副使張世規子拱自言父世規昨牽制蘭州與李經同出界今經遷一官父止賜絹五十乞辭賜别推恩詔世規纍立戰功賜絹三百涇原路經略司言乞以彭孫該磨勘與遷官其軍功别推恩及升都鈐轄差遣詔彭孫候磨勘畢以賞功除領團練使丙午詔尸部貟外郎張詢勾當御藥院劉惟簡賑濟西京被水災軍民并催督救護官物城壁等其合行事如有違礙從冝施行河北路轉運司言河水圍繞大名府透入府城乞多差兵夫船筏救護遣金部貟外郎井亮采勾當御藥院梁從政按視合賑濟事如西京指揮鄜延路經略司言种諤上本軍出界進討分遣諸將討擊不順西賊收夏州至上書平白池等處有功人內第二等將副李浦等乞推恩詔李浦遷一官趙守忠李師古已死以遷官恩賞每資賜絹五十趙守忠百五十李思古五十給其家丁未知河南府韓絳言近被水災自大內天津橋隄堰河道城壁軍營庫務等皆傾壞聞轉運司財用匱乏難出辦役兵纍經剗刷府官職事煩多欲望許臣總額賜錢十萬緡選京朝官選人使臣各三十五人與本府官分頭葺補乞發諸路役兵三四千人詔轉運司於經費餘錢支十萬緡沈希顏往來與韓絳同提舉營葺及選使臣三員役兵於本路剗刷二千人如不足即和雇知太原府吕惠卿言麟府豐州守禦人闕已牒提舉保甲司發保甲乞令提舉司官先撫諭并立調發約束之法從之又言已治兩不耕地初惠卿言臣伏思持久抗敵之計雖已分團兩畨將士及會定新寨守兵而邉事未息人兵未可全減莫若廣勸公私耕種為急蓋邉戍所以久困者凡以貴糴而逺輸故也今若使邉地益墾則邉戍可益而無衆寡不敵之憂邉民稍蘇而無貴糴遠輸之患麟府豐三州兩不耕地可以時出兵開墾不惟歲入可助邉計兼可誘致西賊蹂踐田苖設伏掩擊此於深入不測之敵境勞逸不同臣已委官相度耕種伏詳橫山一帶兩不耕地無不膏腴過此即沙磧不毛今乘羌人來賔出兵防拓廣耕疾種因其蹂踐而掩擊之漸移堡鋪向外把截則不煩深入而拓地日廣并可以招置漢蕃弓箭手承佃或營田軍以抵戍兵則邉費省矣願推之陜西諸路又言官中貴糴內地逺輸增益戍兵國計所患而邉人多乘之以射利今廣耕墾賤糴價省邉費乃非所欲為必有設計謀動搖沮壞之人惟朝廷王張督責則事舉矣詔陜西諸軍經略司詳酌施行三月庚申四月壬午可考此段與三月二十一日庚申所書同但彼略而此繁耳當存一去一八年正月二十七日云云當并考戊申禮部言西南程蕃乞貢方物舊不注籍如許入貢乞依五姓蕃例從之詔夔州路轉運司指度比附一姓人數解發又詔開封府推官李士良提舉救護陽武掃給河東路二十將神臂弓萬從吕惠卿請也侍御史張汝賢落侍御史知信陽軍坐言事失當也事具甲寅日王安禮罷時詔涇原路將官毛政等五人各遷一官管勾文字潘班減磨勘二年張蘇循一資以涇原路經略司奏軍功推賞未當功也詔八內內侍省東頭供奉官麥文炳衝替以管押輝和爾達勒達蕃部到熙河令人於蕃界內市快行馬等故責之己酉上批付鄜延路走馬承受李元嗣諸路牒報賊頗近並邉八九月必入冦或在本路或環慶涇原其勢可料惟賊來切勿驚擾則賊情可得處事不繆昨蘭州被圍聞者狼狽朝廷為動心賴經略司奏報循常中外安定自賊攻圍以致敗去無一毫失事惟得賊尸五萬耳所以上功悉改三官其餘守禦下至婦女格賞之外增賜金帛以巨萬今本路新復城寨未經重寇可諭經略司悉以熙河路已行事為凖仍以軍賞明諭漢蕃兼聞蘭州賊退頗以併力攻城不鈔略為恨今入冦懲艾前車縱兵四略不可不防其餘更在愛惜矢石當時不輕發固已得勝之半矣明逺斥候最為大事可一一宣諭朱墨本同庚戌詔官員因公罪上簿者冉上簿展磨勘一季會恩免者以二當一詔鄜延路未句收積剩錢公據二十二萬六千餘緡給陜西轉運司詔西河下水私船載穀應輸力勝錢而回避詐匿不輸者計不輸物數論如非提舉汴河堤岸司船筏輒載西河鹽棗榖陶器皂莢過西京及入汴者雖經場務出引投稅許人告捕罪賞依私載法都大提舉汴河隄岸宋用臣請下戶部著為令朱本云事小不當書今依新本復存可見宋用臣等言利析秋毫也詔虔吉州界並為禁銅鉛錫地分從戶部請也辛亥詔自今景靈宫朝獻日遇雨雪令宰臣親王執政官分獻定州路安撫司言軍城寨言北界兵千人擁牛具過石城南耕黃貨谷地巡歷人不能遏已指揮當巡官吏毋得透漏及牒保州沿邉安撫司移牒北界止約詔圖上北人所爭地具前後照據以聞大名府路安撫使王拱辰言河水暴至北京數十萬衆號呌求救凡百施為皆是出違條貫臣須至奏請乞賜一不拘常例指揮又言凡干錢穀稟轉運司常平即提舉司軍器工匠即提刑司掃岸物料兵士即都水監未嘗有一敢専者今應猝濟民逐官在逺須至一面先行致違逐司條令所以乞賜一不拘常制指揮上批其事干機速委是奏覆牒稟所屬不及者仰依所乞施行壬子朝獻景靈宫癸丑分命輔臣祈晴左藏庫副使帶御器械劉承緒為禮賔使嘉州刺史手詔以承緒妻建安郡主即先帝同母妹故擢之詔雍王皓乳母孫氏葬報先禪院每歲同天節度一僧甲寅尚書左丞王安禮為端明殿學士知江寧府初侍御史張汝賢言吏部以王圭陳乞子仲端勾當京西排岸司礙選格而本部留闕妄作行遣又王安禮乞子枋勾當九龍廟見任官二人有溢員吏部言當使闕去年孫固陳乞子野勾當裁造院礙法吏部具特旨例申稟而都省批令具鈔及安禮陳乞姪遊監泗州糧料院則援野為例韓縝之姪宗迪指射尚衣庫又以遊為例此乃引用都省批狀例外起例陛下之法遂格不用此弊相襲實害大政乞賜施行六月甲午汝賢奏上以圭子仲端已退所乞差遣而安禮子枋姪遊差遣有條許用例奏鈔汝賢章格不下安禮聞之面奏乞治汝賢之罪上宣諭可且令分析六月丙申汝賢分析又云汝賢嘗言卿平日以惡言恐脅言事官因道汝賢所陳安禮之語安禮乃言昨日論奏張汝賢彈奏臣乞差遣事蒙宣諭汝賢奏以臣嘗有惡言詆毁欲頭璧俱破切緣汝賢官侍御史以言為職彈奏輔臣亂法當出於至公不可茍用怨憎妄托非罪使臣實嘗詆毁聞者豈宜傳逹汝賢雖知在法親聞乃坐况臣初無詆毁之事是必姦險之人以無為有欲激怒汝賢使中傷所惡之大臣而汝賢率情快忿亦昔所未有此而不治於綱紀風俗其害不細乞付有司盡理施行上遂令汝賢分析汝賢奏臣追省當日所聞大概正是安禮因臣論奏王圭等誣上行私輒有及臣之言謂或議已則當致害又有御史青蟲可憎之語臣以其意凡陋固未嘗盡列於朝旋觀安禮外雖狂率中實姦險嫉忌一言及之必為中傷之計屬者臺諫相繼罷黜安禮蓋有得色嘗以此誇衒同列之間臣自顧踈逺蒙陛下擢任不次報冝如何豈敢愛惜以避安禮之暴橫屬聞此語是亦安禮平日之常談臣因上殿口奏者獨冀清衷照察安禮所存實非愚臣茍用愛憎捃托非罪昨因察按論列宰臣執政官陳乞差遣而安禮兩次並是違法都省特旨舊例直行指揮具鈔擬差臣職在言責豈當有隱乃實出於至公未嘗率情快忿安禮惡其及已必欲置臣於罪莠言自口輕躁無恥昔所未聞况安禮素行貪穢所至狼籍名在儒館則日出遊於淫舍湖州潤州身任太守娼女共政淫穢不忌陛下始以其兄安石之故略其舊惡擢置政府然安禮惡不可掩罪不可解知潤州日部內致仕官刁約館閣故老安石以丈人行事之而安禮數飲約家輒私其侍婢約死乃以主喪為名誘略其婢王氏謝氏二人以歸今二婢在家王氏仍已有子閨門之內數致忿爭至或挾持私事欲以告官而安禮多方以捍之蓋取之不正則勢必至此安禮修身治家如此其能為陛下正百官理萬民乎安禮與其兄安國素不相能及聞其喪無甚哀戚喪假僅滿呼妓女燕飲嬉笑自若安禮於所厚者薄其能為陛下勵風俗勸忠義乎安禮喜結四方豪富如杭州俞緡東南大姓賈販小人未嘗為安禮門客特以賄交去歲大禮遂奏緡為假承務郎安禮黷貨如此其能為陛下守法令杜請託乎報慈寺僧詞海乃異時安禮淫汚之淵藪出入安禮家人不呵問道故時淫邪之遊以為笑樂無所不至兼安禮自秉政以來何補國事惟自顧行實如此則無以厭服人言故揚虛聲取恱流俗牢籠士大夫以賣恩招權斂譽在已歸謗朝廷然安禮辨詞亂實隂計害物故士大夫莫不畏其凶焰而安禮平居猶恟恟不自安者獨以臣輩尚在言路軋其姦萌竊惟御史耳目之官本許風聞言事惟禁中語不可泄漏至於大臣之言雖涉詆毁既非親聞自不合坐則傳言之人又何罪焉臣前所聞既未嘗論列而陛下亦不以此為安禮之罪而安禮遽乞付有司根究者意謂就使是實於己無罪但欲有司承望風旨曲求差互使罪之所歸不在於臣則在於傳聞之人如此則安禮别有罪惡誰敢談説况御史位卑而無權不足以動事惟執政大臣喜怒能為天下禍福身居至近勢軋人主則防檢之道不得不嚴故責在御史繩姦糾慝以坐制其非心今安禮乃恃大臣之威欲以鈐制御史杜絶言路則安禮之志殆將何為上以其章付三省謂安禮曰汝賢彈奏卿子姪差遣用例奏鈔在法所許汝賢固有罪其言卿姦巧事卿果如此何以復臨羣官安禮猶辨訴因奏往以安石疾病嘗乞知江寧府願申前請汝賢又言臣論奏王圭王安禮陳乞子姪差遣法許用例奏鈔詔臣分析臣愚見按法之文而折中于理謂有司之事無條有例或雖有條而文意未明應用例以補之皆在所司可以常行於法未礙則為不應奏請可否之事若陳乞差遣自有定法異時執政大臣本因礙法遂有干請畫旨施行所以稱特旨豈有司所専以為不應奏請之事又官制申明逐處例册候册定條目不用即知有司所用之例自可修條未知特旨礙法之事能如此否又尚書省奏事依條目分有法式者上門下無法式者上中書并取旨特旨事乃中書之職臣竊謂法式者有常之稱特者反常之義今用特旨礙法事為有法式事上門下臣雖甚愚未知其可且特旨一也參以近者察案所上有待申請而具鈔者王安禮陳乞是也有不待申請而具鈔者時忱磨勘是也有申請都省而關中書取旨者文彥博陳乞是也有申請而進呈不行者程慶酬奬是也都省若為有例事不限特旨皆不應奏請可否便得具鈔則冝無彼此之别不可於執政大臣與本省吏人私事而遂有異若謂例册有之始可以用印楊天祐等豈非例册所載何為而不引其馮訴借闕事乃非例册所載何為而輒用若為侯永昌等酬奬礙條法有特旨不可引用則王枋等差遣正礙陳乞之法若謂特旨非有司所専而都省可以指揮則時忱磨勘又不得申請而施行推求其説終不可得異時執政大臣特乞子姪差遣多緣私計所便自瀝誠懇以干朝廷今則其家子姪自赴吏部指射皆得施行不惟相承無有紀極而於朝廷事體實未允協大抵有司差遣皆有常法而不可亂自法度之外或戚里之家干乞則有內降或大臣之陳請則有特旨其事一也今戚里之家或告陛下乞一優便差遣既蒙俞允付外與差三省尚須覆奏而後行今大臣之家自詣吏部違法指射而所司遽自與之上下之體臣所未諭蓋聞事變萬殊至當無二天下之人孰不有口有心使言之而不當則有心者能察其非有口者能議其否如是而日黜百人誠何損於事體使言之而在疑似是非相半以此得罪不能自明則言者之氣十已喪其六七使言之而當則有心者莫不知其是有口者莫不稱其可如是而猶不免則敢言之士氣索矣况中人以下者乎如是則大臣之過其敢復有論説者乎臣近又論安禮素行貪穢所至狼籍以至私人之婢而因喪以取之利人之財而鬻爵以償之家有不正之配身有不悌之惡非臣私言著在士論然安禮平居語人則曰固嘗首露於陛下之前陛下知而赦之天下有識之士方以此語為惑言事之臣亦莫測其信否姑置而未論然臣竊謂若陛下幸赦安禮之罪而安禮叨在政府亦宜少有悛心以無負眷遇而怙終放肆了不自新臣今日之論乃在辨正朝廷法度而安禮以姦險之性當躁忿之時語言輕率必不循理是亦無逃於聖鑒而臣自顧以兀立之孤迹獨當衆人之論尚慮蔡確李清臣輩與王圭安禮為朋比論議之際或有僥幸同利之心使臣忠憤不獲申於公朝伏望斷自宸𠂻使臣言得行凶邪去位臣雖萬死無恨上既罷汝賢安禮亦求去故有是命舊紀亦不書安禮所以罷乙卯雄州言拒馬河溢破兩輸長沙河口已放急夫候水落興功觀文殿學士光祿大夫知成德軍馮京知河陽詔判大名府王拱辰罰銅十斤館陶尉薑子厚冠氏尉桑嘉之知縣鄭僅各罰銅八斤坐擅役保甲會赦特責之僅彭城人也僅初為大名府司戶部使者􅊾往他郡留守文彥博曰如鄭參軍豈可令數出奏易司法徙冠氏令河決府西􅊾夜下調夫急僅方閲保甲盡籍以行先他邑至決河遂塞使者怒劾之彥博言於朝曰微冠氏令城中其魚矣詔釋不治此據鄭僅傳傳云釋不治實録云罰銅八斤未知孰是又按文彥博以熙寧七年四月留守大名元豐三年九月徙河南六年十一月請老當七年河溢時留守大名者乃王拱辰傳誤也或言於朝乞免劾僅實王拱辰又拱辰與縣令佐並罰銅謂詔釋不治亦非也今不取姑附注此戊午新河東轉運副使范純粹言昨在陜西朝廷每給軍須並計綱雇夫起發頗為勞擾乞自今給河東陜西邉用非應副機速者並令小作綱數排日遞送從之詔河北河東被水保甲令州縣考實賑濟小保長保丁一石大保長二石都副保正三石提舉保甲官分詣諸州照管具賑濟人數以聞詔陜西河東蕃官蕃部轉職名及因事酬奬者當書其實年於付身文字本路直補轉者凖此己未上批昨尚書省議寬減京畿戶馬人遂放弛全不應令蓄飬帳內但有馬數因事調發乃見其情開封府界提點范峋及知開封縣李括所奏如可行宜令兵部條具以聞兵部言峋奏戶馬未買或乘往别路未回或有病未發如當起發即及一綱乃發本部看詳如乘往河東陜西路者乞就支餘如峋請及如括言馬已起發者限三年買足從之滑州言齊賈下掃河水漲壞浮橋詔范子淵相度以聞河北陜西開封府界凖此庚申召輔臣觀榖于後苑分命輔臣謝晴詔秋銓試上等一人循一資中等二十人不依名次注官下等七十八人注官給空名宣三百付熙河蘭會路經略司同管勾西京路保馬吕公雅言奉手詔聞本路保馬極苦難買衆既爭市價亦倍貴至駑者不減百千深恐本司近奏所買之數過多民間未悉朝廷取效在逺之意遂致如此宜更消息考驗但如元令聊增其數可也臣今相度當減每都之數今約年終各以八匹為限新令施行人率樂從不聞畏恐及本路每都一分四匹今略增倍若買二分八年可足其山僻縣展為十年從之本志有之六月十二日可考提舉京東路保馬霍翔言本路已買保馬萬一千匹及據淄州淄川登州蓬萊等縣有弓手願飬保馬已印給見勸諭弓手願養馬之人候數多續具奏未幾又言弓手願養保馬每縣不限人數每名各養一匹從之除補限外依條聽志亦有之知延州劉昌祚言昨集教保甲弓馬並不精當但令守禦已用士兵換赴將下團結成隊遇敵呼使如有功優賜推恩從之前廣南西路提點刑獄劉宗傑言昨任京西路轉運判官纍奏知鄧州劉忱轉運使陳安石推勘官郭槩等情弊見送御史臺定奪昨臣出巡在外聞劉忱縱吏受贓斷私酒事不法與陳安石相為表裏故入楊千徐宗等徒罪臣謂忱安石等豈獨輕臣乃是違慢詔令遂差襄州通判王子明推鞫忱等情弊適會臣移廣西安石等乃變其獄陷子明於罪罰臣因論奏刑獄寃濫郭槩雖能辨正楊千徐宗不應坐徒及王子明非私罪即不劾劉忱陳安石遂具駮奏下有司歲餘終未結竟望特省覽則十年寃滯之獄無所逃於天鑒上批京西獄事久經辨訴是非之情終未明決可并寋序辰劄子遣御史劉拯即鄧州鞫之後竟如何孫升論宗傑為比部郎中因執政與中丞協比追攝下獄責知郢州當考年月辛酉權發遣江淮等路發運副使蔣之竒直龍圖閣之竒歲漕計復以六月辦奏計京師故有是命手詔李憲勘會諸路團結到役兵工作日久人力疲敝兼邉廪耗費萬數不少若不於工役稍見涯涘之際節次減放則費用滋廣頗有侵蠧冝候八月末工緒有涯以逺近節次放歸訖奏壬戌御史黃降言朝廷修立敕令多因舊文損益其去取意義則具載看詳卷藏之有司以備照用比者官司議法於敇令文意有疑者或不檢會看詳卷而私出己見裁決可否乞申飭官司自今申明敇令及定奪疑議並須檢會看詳卷考其意義所歸所貴法定於一無敢輕重本臺亦得以據文考察詔下刑部刑部言元豐敇令格式看詳卷共二百二十册難以頒降乞自今官司定奪疑議又申明敇令須看詳卷照用者聼就所掌處抄録從之甲子詔三省吏行遣斷絶差賜銀絹著為令知滄州趙瞻奏河北鹽法漸已就緒乞自大名府澶恩信安雄霸瀛莫冀等州運盡行榷賣以增其利從之趙瞻奏當考乙丑奉議郎劉摯知滑州摯前為右司郎中坐事衝替故復之詔蕃官內殿承制鄂特凌葉為左藏庫副使以討西賊於雙池再戰皆重傷及獲小首領一級也知邵州關杞言置芙蓉石馹洞寨柵乞差二百騎防托詔廣南西路鈐轄司與百騎樞密院言交趾使人見辨議疆至全未聼伏恐邉防尚須警備詔熊本緣邉城寨及守禦次第有未周備事悉意措置具如何施行以聞六月四日本已除吏侍當考何日離桂州并後來如何措置八月九日十九日二十一日可考丙寅廣西經略安撫司乞於融州王口寨置轉買務通漢蕃交市乞度僧牒三十為本從之陕西轉運司言通判延州吳安憲凖詔與鄜延路經略轉運司籌度於要近城寨多聚糧草延州秋稼豐稔民戶不能蓄積以待價必為射利之人乘時賤取閉糴以待官場之急延州諸縣去城寨近者十里逺者百里今秋應納青苖免役為錢十三萬緡欲定地理逺近加饒法令民於諸城寨拆納轉運司撥還提舉司本司勘會鄜延路上下畨將兵並在極邉今又增四將馬軍及戶馬二千人供餽不易如安憲所言公私交便從之詔除名均州編管人前漳州軍事判官練亨甫移郴州編管坐與有服兄劼同取雜戶女穢濫也丁卯手詔提舉陜西買馬監牧郭茂恂乞赴闕奏事茂恂在職數年全無績效此乃欲憑藉口舌開釋罪戾宜止令具所見附驛以聞綱要云是月河北路始并大名府澶恩等十州官皆𣙜鹽
