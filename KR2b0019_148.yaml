body:
  text: 續資治通鑑長編卷一百四十四宋李燾撰仁宗慶歷三年冬十月乙未朔右諫議大夫知江寧府劉沆為龍圖閣直學士知潭州經制蠻事也沆兼安撫使乃五年二月此時未也傳即并言之今不取然㑹要亦云是年十月初置湖南安撫司與傳合當更考詳丙申詔利州路轉運司如聞羣盜入金州劫居民其令梁洋二州出兵邀擊之丁酉步軍副都指揮使感德軍留後李昭亮為真定府定州路都部署諫官歐陽修言伏見朝廷自河東移李昭亮為鎮定都部署臣竊以北敵險詐必與國家為患北鄙之事常須有備此一事陛下聖心久自憂之執政大臣非不知而憂之天下之人共為朝廷憂之李昭亮不材不堪為將帥不可委兵柄此一人陛下聖心久自知之執政大臣非不知之天下之人亦共知之不審因何遽有此命大凡朝廷行事不當者或為小事而忽略容有不知致誤施行而致乖錯者有矣未有以天下大可憂患而上下共知之事公然乖謬任以非人如此者臣料兩府之議必因施昌言等近奏三路闕部署而目下無人以昭亮塞請而欲徐別選擇不過如此而已然臣切見朝廷作事常患因循應急則草草且行才過便休不復留意只如差郭承祜於鎮定尋以非才罷之以康德輿為鈐轄闕却部署一職本待徐擇其人臣初喜朝廷必能自此精於選任經今數月何曾用意求人一旦昌言奏來又遣昭亮且去今平時無事之際尚如此不能選人任用若一旦倉黃事動更於何處求人故臣謂朝議欲徐擇人而代昭亮者乃虛語爾方今天下至廣不可謂之無人但朝廷無術以得之爾寧用不材以敗事不肯勞心而擇材事至憂危可為慟哭臣思朝廷所以乏任用之弊蓋為依常守例須用依資歷級之人不肯非次拔擢所以無人可用古人謂勞於擇賢逸於任使今人既難得求之又不勤待其自來復何可得臣纍曾上言練兵選將之法未賜施行又曾言乞於沿邊十數州且選州將亦不䝉聽納寧可公選不材之人委以大兵之柄一旦誤事悔之何及伏望聖慈出於睿斷其昭亮早令兩府擇人替換及早講求選將之法若大將難卒然而得即乞於沿邊州軍選擇州將近下資淺人中庶乎易得昨北使姓名稍遲數日中外之士已共憂疑今幸其未動之間宜作先時之備兵法曰無恃其不來恃吾有以待之惟陛下為社稷之計深思行之則天下幸甚修論軍中選將劄子或可附此北作坊使封州刺史康德輿為并代鈐轄兼知代州樞密院言諸路知州帶提舉兵甲盜賊處若無才力及弛慢昏耄者請擇兩省以上或嘗歷轉運使提點刑獄官代之仍令體量所屬都監巡檢縣尉等不任事者以名聞從之知光化軍韓綱性苛急不能拊循士卒時羣盜張海等剽劫至境上綱帥宣毅軍三百餘人被甲乘城凡十餘日城中富民具酒食犒軍綱輒收其半質錢以市兵器軍士營逺者或不時得飲食而綱所給餅餌常至日旰其乾不可食㑹其監捉使臣至所部卒不以請給例自隨富民又請輸錢以資之綱曰本軍之士尚不給何及於監捉乎軍士因而𫝊言民有獻錢以給乘城兵而知軍却之衆益怨憤綱又使軍校王德者作城內布陳圖久之不成綱詈曰我不敢斬汝邪因召劊子執劒立庭下衆益駭㑹有入粟得官者駱子中刺謁綱綱語子中毋拜軍士誤聽以為子中獻緡錢而綱復拒不取時方給食貟僚邵興叱衆起曰汝輩勿食衆遂投餅餌於庭中綱怒命執數人械繫於獄興懼翌日戊戌興率衆盜庫兵欲殺綱綱踰城逃載其家小舟沿漢而下官吏亦皆逃去興等遂焚掠居民劫其指揮使李美及軍士三百餘人趣蜀道李美老不能行自縊死綱億長子也詔後苑造作所自今御戴花毋得以金鏤之辛丑賜𫝊法院寺務司錢嵗五百千壬寅以玉清昭應宫田二十二頃賜國子監癸卯以權發遣度支判官虞部貟外郎杜杞為京西轉運按察使兼體量安撫執政言其才可使督治盜賊也甲辰徙通判鎮戎軍太常博士范祥知汝州仍賜五品服初西賊圍本軍而祥拒守有勞於是奬之祥三水人也祥本傳云康定初通判鎮戎軍知軍髙維嵩死趙元昊圍城甚急祥帥勵將士拒退之奏築劉璠堡之定川寨歷知慶汝華三州今實録載祥即自鎮戎倅移汝守未曽知慶州與傳不同又此時元昊已乞和必不重冦鎮戎决是康定初事矣及據祥子育作祥行狀載守鎮戎事甚備亦云康定初然康定初事及今乃行賞則所未曉行狀稱通判慶州以張海冦京西尋擢知汝州與本𫝊不同或祥通判慶州未赴遂改知汝州也今但從實録諫官歐陽修言臣伏聞范仲淹富弼等自被手詔之後已有條陳事件必須裁擇施行臣聞自古帝王致治須得待同心叶力之人相與維持謂之千載一遇今仲淹等遇陛下聖明可謂難逢之㑹陛下有仲淹等亦可謂難得之臣陛下既已傾心待之仲淹等亦各盡心思報上下如此臣謂事無不濟但顧行之如何爾况仲淹弼是陛下特出聖意自選之人初用之時天下已皆相賀然猶竊謂陛下既能選之未知如何用之及見近日特開天章從容訪問親寫手詔督責丁寧然後中外喧然既驚且喜此二盛事固已朝報京師暮𫝊四海皆謂日來未曽如此責任大臣天下之人延首拭目以看陛下用此二人果有何能此二臣所報陛下欲作何事是陛下得失在此一舉生民休戚繫此一時以此而言則仲淹等不可不盡心展效陛下不宜不力主張而行使上不玷知人之明下不失四海之望臣非不知陛下専心鋭志不自懈怠而中外大臣憂國同心必不相忌然臣所慮者仲淹等所言必須先絶僥幸因循姑息之事方能救今世之積弊如此等事皆外招小人之怨怒不免浮議之紛紜而姦邪未去之人須時有讒沮若稍聽之則事不成矣臣謂當此事初尤須上下叶力凡小人怨怒仲淹等自以身當浮議姦讒陛下亦須力拒待其久而漸定自可日見成功伏望聖慈留意終始成之則社稷之福天下之幸也按范仲淹等條上十事其四曰擇官長此月十二日丙午張昷之等被選為轉運按察使即擇官長也蓋十事內最得先行者歐陽修此疏不得其時今附見丙午鹽鐡副使工部郎中張昷之為天章閣待制河北都轉運按察使兵部貟外郎王素為天章閣待制淮南都轉運按察使鹽鐡判官兵部貟外郎沈邈為直史館京東轉運按察使用富弼范仲淹等之言也先是仲淹弼等言古者內置公卿士大夫助天子司察天下之政外置嶽牧刺史方伯觀察使採訪使統領諸侯守宰以分理之內外皆得人未有天下不大治者也今轉運按察使古之嶽牧方伯刺史觀察採訪使之職也知州知縣古之諸侯守宰之任也內外官雖多然與陛下共理天下者惟守宰最要爾比年以來不加選擇非才貪濁老懦者一切以例除之以一縣觀一州一州觀一路一路觀天下則率皆如此其間縱有良吏百無一二是使天下賦稅不得均獄訟不得平水旱不得救盜賊不得除民既無所告訴必生愁怨而不思叛者未之有也民既怨叛奸雄起而收攬之則天下必將危矣今民方怨而未甚叛去宜急救之救之之術莫若守宰得人欲守宰得人請詔二府通選轉運使如不足許權擢知州人既已得人即委逐路自擇知州不任事者奏罷之令權擢通判人既已得人即委逐州自擇知縣縣令不任事者奏罷之令權擢幕職如是行之必舉皆得人凡權入者必俟政人稱職而後已仍令久其官守勿復數易其異政者宜就與升擢之若然官修政舉則天下自無事矣朝廷唯總其大綱而振舉之可也上既納其言於是昷之等首被兹選素入辭上謂曰卿今便去諫院事有未言者可盡言之此仲淹等所上十事其四曰擇官長也三具九月丁卯今復著之凡十事皆准此如不可知則闕太常博士祕閣校理孫甫為右正言諫院供職賜荆湖襄鄧等州捕賊軍士緡錢徙知德州右贊善大夫李肅之提㸃夔州路刑獄肅之迪從子前通判澶州以建議修城擢知德州時施黔蠻田忠霸冦邊故選肅之至部徑趨邊寨諭以威信衆讋服詔嘉奬此按肅之本傳田忠霸事又見四年十一月彭乘修注時當考丁未以右正言集賢校理余靖為契丹國母正旦使代張昷之也詔天下稅籍有僞書逃徙或因推割用幸走移若請占公田而不輸稅如此之類縣令佐能究其弊以增賦入者議賞初洺州肥鄉縣田賦不平久莫能治轉運使楊偕患之大理寺丞郭咨曰是無難者得一往可立决也偕即以咨攝令并遣祕書丞孫琳與共事咨等用千步方田法四出量括得其數除無地之租者四百家正無租之地者百家收逋賦八十萬流民乃復及王素為諫官建均天下田賦歐陽修即言咨與琳方田法簡而易行願召二人者三司亦以為然且請於亳夀汝蔡四州擇尤不均者均之於是遣咨與琳先往蔡州首括上蔡一縣得田二萬六千九百三十餘頃均其賦於民既而咨言州縣多逃田未可盡括朝廷亦重勞人遂罷琳共城人也記聞以為執政不然其議沮罷之咨本傳以為遭母喪去今從食貨志又詔有盜殺掠人其捕盜官吏並當日具所掠人數申本屬州軍逐州軍亦限當日上奏如敢隱落若輒稽違者並以違制論戊申詔中書樞密院同選諸路提點刑獄官殿中丞知嶽州楊畋提點荆湖南路刑獄時方攻討蠻猺命畋督之畋重勳曾孫也庚戌徙河北都轉運按察使施昌言為河東都轉運按察使昌言至河東或請於麟府立十二寨以拓境又詔昌言與明鎬張亢度可否昌言獨以麟府在河外於國家無毫毛入而至今饋守者徒以畏蹙國之虛名今不當又事無利之寨以重困財力從之張亢增置堡寨事當考四年六月以後事辛亥環州軍事判官姚嗣宗為著作郎陜西四路部署司勾當公事初范仲淹薦嗣宗文章可備館閣其才乃不獲騁乞就遷其官令佐陜西帥府詔從琦請增置鄧州幕職官一貟初本州言舊幕職官四貟後省其二頗見廢事故復增置之癸丑諫官余靖使契丹入辭書所當奏事於笏各以一字為記凡數十字上顧見之指其字令一一條奏日幾昃乃罷甲寅復置諸路轉運判官仍詔中書樞密院同選用天聖七年初置益梓廣東西運判其後缺不除故此云復置天聖後缺不除當考二府同選其日辛酉今并書乙卯詔修兵書翰林學士承㫖丁度提舉集賢校理曽公亮朱寀為檢閲官朱寀九月丙寅以佐著作直講為集賢校理尋卒范仲淹集有奏狀乞録其弟丁巳史館修撰王質集賢校理天章閣侍講曾公亮同詳定編敇己未范仲淹言臣竊見京朝官使臣選人等進狀或理㑹勞績或訴雪過犯或陳乞差遣其事理分明可行可罷者則朝廷便有指揮內中書樞密院未見根原文字及恐審官三班院流內銓别有條例難便與奪者多批送逐司其逐司為見批送文字別無與奪便不施行號為送煞以此官貟使臣三五度進狀不能結絶轉成住滯臣欲特降聖㫖今後京朝官使臣選人等進狀理㑹勞績訴雪過犯陳乞差遣朝廷未有與奪指揮只批送審官三班院流內銓者仰逐司主判子細看詳如內有合施行者即與勘㑹具條例情理定奪進呈送中書樞密院再行相度別取進止如不可施行即仰逐司告諭本人知委所貴逐司主判各揚其職事無漏落亦免官貟使臣選人等重叠進狀紊煩聖聽從之實録但書詔中外有陳叙勞績或訴雪罪狀中書批送有司者謂之送煞更不施行自今宜令主判官詳其可行者別奏聽裁按此乃范仲淹奏請實録刪取大略今存仲淹元奏庚申護國節度使兼侍中徐國公張耆為太子太師致仕遇大朝㑹許綴中書門下班王稱東都事略詔韓琦等曰比以中外人望故决意用卿等今琦暫往陜西仲淹弼宜與宰相得象盡心國事毋或有所顧忌其當世急務有可建明者悉為朕陳之壬戌詔曰唐虞稽古建官惟百能哲而惠克明俊德然猶三載考績三考黜陟幽明周制太宰之職嵗受官府之㑹以詔王廢置三載則大計羣吏之治而誅賞之故考課之法舊矣祥符之際治致升平凡下詔條主於寬大考最則有限年之制入官則有循資之格及比年事邊因緣多故數披官簿審閲朝行思得應務之才知虧素飬之道然非褒沮善惡則不激勵非甄別流品則不憤發特頒程式以懋官針自今兩地臣僚非有勳德善狀不得非時進秩非次罷免者毋以轉官帶職為例兩省以上舊法四年一遷官今具履歷聽㫖京朝官磨勘年限有私罪及歷任嘗有贓罪先以情重輕及勤績與舉者數奏聽㫖若磨勘三年贓私罪杖以下經取㫖徒以上再經取㫖其能自新無私犯而有最課及有舉者皆第遷之自請釐物務于京師五年一磨勘因舉及選差勿拘凡有善政異績或勸農桑獲美利鞫刑獄雪寃枉典物務能革大弊省錢穀數多凖事大小遷官升任選人視此若朝官遷貟外郎須三年無私罪而有監司若清望官五人為保引乃磨勘遷郎中少卿監亦如之舉者數不足增二年遷大卿監諫議大夫弗為常例悉聽㫖又定制監物務入親民次升通判通判升知州皆用舉者數不足毋輒關升此仲淹等所上十事其一曰明黜陟也已具九月丁卯樞密使杜衍建議擇外戚子弟試外官癸亥以舒州團練使李端懿知冀州端懿遵朂子也甲子陜西四路經略安撫招討使鄭戩言德順軍生戶大王家族元寧等以水洛城來獻其地西占隴氐通秦州往來道路隴之二水環城西流繞帶河渭田肥沃廣數百里雜氐十餘落無所役屬尋遣靜邊寨主劉滬招集其酋長皆願納質子求補漢官今若就其地築城可得蕃兵三五萬人及弓箭手共捍西賊實為封疆之利從之劉滬先以右侍禁瓦亭寨監押權靜邊寨主擊破當羅等族斬一驍將獲牛馬槖駝萬計時任福敗邊城晝閉居民畜産多為賊所掠滬獨開門納之邊人謂滬為劉開門遷左侍禁韓琦范仲淹薦授閣門祗候又破穆寧生氐西南去略陽二百里中有城曰水洛川平土沃又有水輪銀銅之利環城數萬帳漢民之逋逃者歸之教其百工商賈自成完國曹瑋在秦州嘗經營不能得滬進城章川收善田數百頃以益屯兵密使人說城主多薩鼐令內附㑹鄭戩據姚嗣宗水邏城碑戩以八月行邊行邊滬遂召多薩鼐及其酋屬來獻結公水洛囉爾干地願為屬户戩即令滬將兵往受地既至而氐情中變聚兵數萬合圍夜縱火呼笑期盡殺官軍滬兵才千人前後數百里無援獨堅臥念慮因令晨炊緩食坐胡牀指揮進退一戰氐潰追奔至石門酋皆稽顙請服因盡驅其衆𨽻麾下以通秦渭之路又敗臨洮氐于城下遷內殿崇班戬行邊至鎮戎軍趣蓮花堡天寒與將佐置酒元昊擁兵近塞㑹暮塵起有報賊騎至者戬曰此必三川守將按邊回非賊騎也已而果然桂陽監言捕殺猺賊三百八十九人諫官歐陽修言臣昨風聞張子奭未有歸期賊昊又别遣人來必恐子奭被賊拘留西人之來其意未測邊鄙之事不可不憂正是要藉將帥效力之秋近來𫝊聞燕度勘鞫滕宗諒事枝蔓勾追直使盡邠州諸縣枷杻所行拷掠皆是無罪之人囚繫滿獄邊上軍民將吏見其如此張皇人人嗟怨自狄青种世衡等並皆解體不肯用心朝廷本為臺官上言滕宗諒用錢過多未明虛實遂差燕度勘鞫不期如此作事搖動人心若不早止絶則恐元昊因此邊上動搖將臣憂恐解體之際突出兵馬誰肯為朝廷用命向前臣忝為陛下耳目之官外事常合採訪三五日來都下喧𫝊邊將不安之事亦聞田况在慶州目見滕宗諒別無大假罪過并燕度生事張皇纍具奏狀并不䝉朝廷報答又遍作書告在朝大臣意欲𫝊逹於聖聽大臣各避嫌疑必不敢進呈况書臣伏慮陛下但知宗諒用錢之過不知邊將驚嗟騷動之事只如臣初聞滕宗諒事發之時獨有論奏乞早勘鞫行遣臣若堅執前奏一向遂非則惟願勘得宗諒罪深方表臣前來所言者是然臣終不敢如此用心寧可因前來不合妄言得罪於身不可今日遂非致誤事於國臣竊思朝廷於宗諒必無愛憎但聞其有罪則不可不問若果無大過則必不須要求瑕只恐勘官希望朝廷意㫖過當張皇騷動邊鄙其滕宗諒伏望速令結絶仍乞特降詔㫖告諭邊臣以不枝蔓勾追之意兼令今後用錢但不入已外任從便宜不須畏避庶使安心放意用命立功其田况屢次奏狀并與大臣等書伏望聖慈盡取詳覽田况是陛下侍從之臣素非姦佞其言可信又其身在邊上事皆目見必不虛言修又言臣昨風聞燕度勘滕宗諒事枝蔓張皇邊陲騷動曽有論奏乞降詔書安慰邊臣今日又聞度輒行文牒劾問樞密副使韓琦議邊事因依不知燕度實敢如此否若實有之深可驚駭切以韓琦是陛下左右大臣繫國家事體輕重今燕度敢爾無故意外侵凌乃是輕慢朝廷舞弄文法每見前後險薄小人多為此態得一刑獄勘鞫踴躍以為竒貨務為深刻之事以邀强幹之名自謂陷人若多則進身必速所以廣張聲勢肆意羅織今燕度本令只勘滕宗諒使過公用錢因何劾問大臣議邊事顯是節外生事正違推勘敇條况樞密副使是輔弼之任宣撫使將君命而行本藉重臣特行鎮撫今若無故遭一獄吏侵欺而陛下不與主張則今後奉君命出使者皆為邊鄙所輕為大臣而作事者反畏小人所制故燕度論於國體便合坐以深刑責其專擅亦自違於條制罪須行遣情不可容今樞密副使尚被侵凌則以下將帥無辜遭其枝蔓者不少據其如此作事此獄必無平允其滕宗諒一宗刑獄狀乞別選差官取勘絶其燕度亦乞別付所司勘罪行遣明年正月不俟燕度奏獄具責宗諒知虢州度訖無行遣修又言臣風聞邊臣張亢近為使過公使錢見在陜西置院根勘其勘所取干連人甚衆亦聞狄青曽隨張亢入界見已勾追照對臣伏見國家兵興以來五六年所得邊將惟狄青种世衡二人而已其忠勇材武不可與張亢滕宗諒一例待之臣料青本武人不知法律縱有使過公用錢必非故意偷慢不過失於檢㸃致誤役使而已方今議和之使正在賊中茍一言不合則忿兵為患必至侵邊謹備過防正藉勇將况如青者無三兩人可惜因些小公用錢於此用人之際自將青等為賊拘囚使賊聞之以為得計伏望特降指揮為元勘官只將張亢一宗事節依公根勘不得枝蔓勾追其狄青縱有干連仍乞特與免勘臣於邊臣本無干涉豈有愛憎但慮勘官只希朝廷意㫖不顧邊上事機將國家難得之人與常人一例推鞫一旦乏人誤事則悔不可追伏乞朝廷特賜寬貸邊臣知無功之將犯法必行要藉之人亦能贖過則人人自勵將見成功亢七月甲戌自渭州徙并代部署明年正月不俟獄上亢奪引進使降本鈐轄青訖無行遣知渭州尹洙言臣竊見自來武臣將所賜公使錢諸雜使用便同己物其狄青於公用錢物即無毫分私用况本路自西事以來所添兵數主兵臣寮指使使臣等數倍於舊又狄青多與衆官躬親提舉教閲軍中將校每有犒設以此所費益多若不別將錢物回易即無由充用狄青素來謹畏小心其實武人未曉朝廷憲法自聞推究公用錢物謂制院須來追攝照對臣雖日夕曉譬終是內懷憂懼兼言先在延州初授涇原部署曽告龐籍言不願主領公使錢恐未知次第今來纍遭罥罣詞意感切深可軫惻臣以謂朝廷擢青自殿直不三年至刺史委以一路兵柄此必其忠力材智有過於人又欲其奮勵自效以報不次之用今乃以細微詿誤令其畏懼如此今邊上日有探到事宜萬一賊兵驟至若須領兵出外似此憂疑之中竊慮不能主理軍政別致闕事伏望聖慈垂察特降朝㫖曉諭狄青庶令安心専慮邊事
