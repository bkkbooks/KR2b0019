body:
  text: 續資治通鑑長編卷二百四十四宋李燾撰神宗熙寧六年夏四月甲戌朔上不御殿百司守局雲隂日不見皇第三子生母曰宋才人翌日宰臣王安石等賀曰陛下祗畏修省夙宵靡寧方日食時隂晦不見此陛下聖德所感上曰朕之菲德上蒙殊應亦當勉勵以答天心安石等又賀皇子生於是率百官詣閣門上表乞御正殿復常膳詔從之皇第三子賜名俊見七月七日宋才人進封媫妤在四月二十七日俊卒在十年十月二十三日詔熙河路運錢帛給軍傳卒勞苦寒餒其依陜西運糧法日給粟二升五合月增錢二百候邊事息日停給乙亥右正言龍圖閣待制集賢殿修撰知熙州王韶為禮部郎中樞密直學士環慶路勾當公事入內東頭供奉官李憲為東染院使遙郡刺史勾當御藥院走馬承受入內東頭供奉官李元凱為禮賔副使並寄資知德順軍如京副使兼閣門通事舍人景思立為東上閣門使河州刺史韶等以克復河州元凱以隨軍奏捷故也王安石請更厚賜韶以金錢曰遇將帥宜如此乃賜韶絹三千匹鈐轄文思使奚起遷皇城使候三年除遙郡刺史其餘兵官自五官至一官及減磨勘年有差以方收復河州而起等守香則城殺獲有功也太常丞集賢校理直舍人院鄧潤甫常州團練推官館閣校勘吕升卿察訪京東路常平等事王安石知升卿經義非所長請試以事乃命副潤甫出使上疑升卿選人安石曰己帶館職或與轉一京官上曰姑遲之潤甫升卿察訪舊紀具書新紀不書李憲言昨收復河州洮西蕃部尚有竄入山林者乞招降詔熙河路經略司示以恩信許令復業西南龍蕃羅蕃石蕃八百九十人來貢方物詔以道路遼逺往復甚勤如願於緣邊納所貢物即以回賜及朝見所賜緣路驛劵給之五月二十日龍蕃入貢以朝集院為律學賜錢萬五千緡於開封府界檢校庫出息以助給飬生員置教授四員請給人從視國子監直講命官舉人並許入學試中官給食每月公試一私試三公試習律令生員義三道習斷案生員一道刑名五事至七事私試義二道案一道刑名三事至五事據墨本熙寧六年八月癸酉國子監丞楊完言近詔給錢萬緡送檢校庫召人抵保收息給律學今生員滋多乞增賜本錢五千緡從之朱本削去云已見六十卷內蓋墨本誤以五千緡并入初給時故也丙子大理寺丞丁執禮為太子中允權監察御史裏行秦鳯路提點刑獄職方員外郎張穆之徙永興軍路永興軍路提點刑獄殿中丞周良孺徙秦鳯路初王安石白上髙遵裕及穆之皆以不得與河州之行怨王韶書抵薛向極非毁韶然考驗皆無實二人者恐難使與韶共事請復用穆之為三司判官曰穆之向所喜使佐向宜也上謂穆之反覆若歸朝必更造作語言扇惑人乃詔穆之與良孺兩易其任又議遵裕差遣上良久曰此須令韶自擇一協心者命安石以書問韶既而遵裕差遣卒如故又詔熙河路止留蔡延慶應副軍須外餘轉運使副判官並歸本路時蔡朦與其父挺書言王韶修城非要又殺羌多無補并及韶它事挺頗為上言之王安石曰朦等皆不樂韶韶方舉事恐被衆人窺覘難以成功王圭因言延慶及朦俱留熙河恐不須爾安石請遣朦歸上從之它日上謂安石曰李憲言熙河妨功害能舉目皆是安石曰王韶事賴陛下照察方粗有成今將帥待敵誠非所畏惟內外之人相表裏為浸潤最是將帥所患將帥畏此乃甚於畏敵蔡延慶傳云蔡朦奏蔡延慶不應以軍須司牒擅起兵故徙它路蓋不知事實者今不取殿中丞知司農寺丞蔡天申為河北路轉運判官祕書丞河北路轉運判官張端兼審官東院先是上數言端不得力王安石因言端性憸邪事事顧望請以天申代之而端有是命上曰監司既不得力罷去稍抑之使有所懲無傷也安石曰良是詔河北沿邊縣自來不差春夫于近裏州軍功役自今差夫無得出本州軍界廣南西路經略司勾當公事溫杲言詔補儂宗旦儂智會等為將軍以夷人不知此官欲乞一近上班行或副使詔宗旦智會並為供備庫副使宗旦桂州都監智會知歸化州丁丑龍圖閣直學士李中師龍圖閣待制權御史中丞鄧綰同注及第進士諸科等官戊寅賜唐州修召渠役兵特支錢有差新知桂州沈起乞自今本路有邊事依陜西四路止申經略司専委處置及具以聞從之起又乞差人出外界勾當上顧王安石曰如何指揮安石請依所乞劄與監司上曰可安石私記又云上令起密經制交址事諸公皆不與聞凡所奏請皆報聽陳瓘論曰安石入告之言曰兵無時不可用神考曰用兵安可無名安石曰陛下若果欲用兵何患無名于是七年執政而四作邊事神考垂拱仰成任其所為事成則歸功于安石事不成則引咎于已韓絳西事既敗神考降詔罪己未嘗責安石也熙河奏功則解玉帶以賜安石曰非卿主謀于內無以成此梅山用兵章惇受旨于安石及其奏功則神考擢惇而驟用之廣西之事沈起亦受旨于安石及其敗也神考掩護中書生事之過曲從安石貸起之死而亦未嘗責安石也神考之于安石可謂厚矣安石之所以報上者宜如何哉臣今考日録安石于熙河梅山先書李若愚妄沮王韶而神考崇長若愚又先書經制成算已付章惇而神考為人遊説即欲改授蔡燁然後言王韶章惇必可任使之意以謂能知王韶者安石也非神考也矜主謀之功返復張大至于數十萬言自謂有天地以來無此功矣至于韓絳敗事則曰陛下于一切小事勞心于一大事獨誤又曰若陛下詳慮熟計則必無可悔之事夫安石自作可悔之事而恣為誣誕歸過之言神考愛民之志孚于天下此等誣辭何纍天德但臣子之心不能平耳沈起引惹蠻事致令交址犯邉圍陷雍州欽亷失守生事者起人皆知之造謀者安石人不盡知也邉事未作之時神考有罷起之詔曰熙河用兵未冇息期沈起又于南方造作引惹欲治起罪以安中外安石不肯奉詔明年果有事宜三州之民肝腦塗地數路騷動一人焦勞當時詔語以謂一路生靈橫遭屠戮職在致冦罪悉在起然起之所以得不死者良以安石護起神考重違其請不欲盡行耳安石退而著書追記其事則謂沈起經制皆上密謀諸公皆不與聞起所奏乞上皆許之嗚呼四作邉事二敗二勝二勝則掠美于己二敗則斂怨于君吕誨之言辨之早矣己卯遼主遣寧州觀察使耶律寧海州防禦使馬永昌其母遣彰聖節度使耶律昌太常少卿乾文閣學士梁頴來賀同天節於是寧等請合使副班為一如南使在北朝例乃入見僉謂不可許王安石勸上許之仍遣內侍李舜舉諭旨寧等大喜又言南朝近所遣使官多卑乞如先朝例差髙官文彥博等謂戎心無厭不可許安石又謂許之無傷上曰自今與差學士以上官也彥博曰遼使歸必更增飾干賞自今人人爭來生事矣上卒許之庚辰河北路轉運使禮部郎中張問復集賢殿修撰知徐州刑部郎中陳汝羲復直史館上始欲復問職王安石言臣等亦屢商量但非因差除又非赦令故不敢進擬陛下特與復甚善然汝羲所坐與問同俱無大過恐一例當復上從之供備庫使髙永亨遷一官減磨勘二年髙永能遷一官王亢循資再任以鄜延路經略司言永亨等括田招弓箭手有勞也詔諸路轉運使副判官提點刑獄不兼提舉常平倉者並兼提舉詔提舉在京市易務及開封府司録司同詳定諸行利害以聞初京師供百物有行雖與外州軍等而官司上下須索無慮十倍以上凡諸行陪納猥多而齎操輸送之費復不在是下逮稗販貧民亦多以故失職肉行徐中正等以為言因乞出免行役錢更不以肉供諸處故有是詔上因謂執政曰近三司副使有以買靴皮不良決行人二十者今兩府尚不下行人買物而省府乃擾民如此甚非便也墨本但云初京師百物有行官司所須皆以責辦下逮貧民負販類有陪折故命官講求今從朱本詔步軍副都指揮使宋守約罰銅三十斤追罷其子球除閣門祗候指揮守約坐以侍衛司雜役兵給球使令當私罪流該德音特有是命辛巳詔進士諸科及第等人入謝免進銀故事既賜第詣閣門謝恩進銀百兩至是罷之乙酉詔賜涇原路䇿應熙河已回弓箭手錢人二千軍員三千梓夔路鈴轄司言鈐轄張承祐與走馬承受張宗望率兵往江安縣會合討夷賊詔鈐轄轉運司節制早令安帖仍體量知瀘江李曼通判白序引惹夷賊事以聞體量引惹自五月十一日移入此先是淯井監夷賊數百自三里囤突出劫敓客船錢銀及虜掠人兵三十餘人而梓夔路都監孫仲達等會兵討十二村夷于三壕灘逢賊殺傷官軍子弟于是承祐等繼往此事見實録五月十一日癸丑張宗望奏今移附此庶不紊先後之序都官郎中通判梓州張子瑾言晏州六縣種夷約二千人自井溪來駐思晏等處令羅箇募村夷人斗設言十州五囤舊納鹽井柴茆煎鹽自官中賣井我失賣茆之業又令我納米折茆所以結集夷衆於石綱溉劫人船并三壕面與官軍戰兩有死傷今欲與官設誓又聞結集猖獗日甚雖聞諸郡官兵會合未見克捷皇祐初淯井監夷驚劫行旅遂議攻討公私困敝至嘉祐初方息或用皇祐故事討除是為無策乞赦其罪許以招安設誓漸散重兵以免夏秋瘴癘舊録繫此疏于四月十四日丙戌朱史削去以為朝廷都無行遣止是黃庭堅下筆令入此疏新録仍存之今移見十二日乙酉要别檢討重修庶事節分明詔李曼分析柴茆事在五月十五日賣井事日録八月二日略有之當考詳八月二日日録云密院進呈張充宗奏狀盛言因鮮于之邵余白上之邵十一月申中書言不便井以十二月方賣與白文獻上曰恐召賣在前余曰候檢文字别進呈熙河路經略司上河州得功將卒三千五百二十七人詔每獲首一級賜絹五匹于是王安石白上士氣自此益振要當飬之而勿傷爾文彥博曰使更勿怠則南征北伐將無不可矣上曰古人謂舉事則才自練此言是也安石曰舉事則才者出不才者困此不才者所以不樂舉事也開封府勘到樞密院令史任逺告屬都承旨李評不用新條轉充令史等罪詔任逺降奉職監當差遣此據密記四月十二日事文彥博去位或與此相關更詳之五年十二月二十二日可考丁亥王韶等言岷州近為羌兵所隔勢甚孤危西京左藏庫使包順內殿承制包誠膺城拒敵保全其州詔各遷二資賜順絹三百誠二百仍各賜金帶庚寅熙州洮河浮梁成賜名永通橋詔免楚州浚運鹽河夫支移折變錢戶五千户下數少者許于次年敷足中太一宫成以右街都監真靖大師陳景元為宫主景靈宫抱一大師蓋善言副之餘知職散衆道士令景元博選有行業精潔之人毋過二十人嵗披戴恩依東太一宫例辛卯知制誥吕惠卿等言修撰國子監經義乞令直講月輪兩員供本經口義二卷從之命新知桂州天章閣侍制沈起兼提舉糧草荆湖路察訪章惇言狤狑蠻賊千餘自黥江浮船而下捕盜官邀擊獲首級器甲等詔西頭供奉官辰州管界同巡檢謝季成遷一官減磨勘三年餘推恩有差又言邵州新招人户楊昌透等嵗出課米乞展三年起納從之既又聽展一年課米凡三百餘石熙河路比等得功將佐比第一等人依第一等轉官比第二等人轉兩資比第三等人轉一資先是王韶言被旨三等得功將佐並第推恩今詳比類正等得功人恩賞宜少減故有是詔蘇州言體量民間陳説司農寺丞郟亶請興水利不便詔送司農寺墨本有此朱本削去今復存之五月二十三日亶罷壬辰大理寺丞知司農寺丞苖時中為太子中舍權發遣梓州路轉運判官代太常博士陳充時充以不職送審官東院上因曰周材難得如守令即専治民三司判官専治金穀開封府推判官專治刑獄轉運司無所不總求之周行罕有能兼之者時中符離人尋改利州路與太子中允吕開易任徙利州路五月一日事權邵州防禦判官郭祥正為太子中舍與江東路家便差遣章惇言祥正均給梅山田及根括增稅有勞也魏泰云王荆公當國有郭祥正知邵州武岡縣實封附遞奏書乞天下之計専聽王安石處畫凡議論有異于安石者雖大吏亦當屏黜表辭亦甚辨暢上覽而異之一日問荆公曰卿識一郭祥正否其才似可用荆公曰臣頃在江東嘗識之其為人縱橫捭闔而薄于行不知何人引薦而聖聰聞知也上出其章以示荆公荆公恥為小人所薦因極口陳其不可遂止是時祥正方從章惇辟以軍功遷殿中丞及聞荆公上前之語遂以本官致仕而去此事當考安石嘗言郭逢原輕俊可使何獨於祥正乃爾恐未必爾也新賜進士及第余中為大理評事朱服為淮南節度推官邵剛為集慶軍節度推官葉唐懿為處州軍士推官葉杕為秀州司户參軍練亨甫為睦州司法參軍並充國子監修撰經義所檢討上初疑杕等未稱職王安石曰今乏人檢討文字若修撰即自責成吕惠卿上乃許之服烏程剛常州唐懿南劔州杕亨甫皆建州人也亨甫事林希野史詳載已附注五年八月戊戌葉適賜第時新知桂州沈起乞以雍州五十一溪洞洞丁排成保甲遣官教閲從之仍給度僧牒三百甲午命知青州臨朐縣劉溫恭等八人分往齊徐濠泗等十二州排定保甲環慶路經略司言將官李克忠等三年七月破金湯城有功未賞詔克忠落經恩未得敘用指揮林廣除本路鈐轄先是李復圭為克忠乞酬奬樞密院論復圭妄奏王安石主復圭甚力乃下經略司驗問而是役也廣嘗獲級克忠但遣兵䇿應亦得免罪經恩未得敘用事在四年七月二十八日上召廣對謂廣曰金湯石門卿功為多慰勞甚至因諭以熙河事廣辭以不習其山川與人之勇怯若有它任使雖萬死不敢辭乃聽還本路李克忠除落過名實録殊不詳今取日録前後論奏語刪修詔熙河路討河州香則城破積慶寺賊寨諸軍弓箭手勇敢等獲首級并重傷人除己遷資外更與遷一資指揮使升一軍就糧指揮使增料錢二千餘雖不獲首亦與遷一資編管人前皇城副使种諤免編管授華州别駕以上批諤自至貶所纍經寬赦可令自便故也王安石私記云上批初付中書密院而密院獨進呈退安石問何獨進呈文彥博乃陽為不審安石曰上有何指曰令與中書進呈及是進呈彥博已不入陳升之曰諤欲且與量移又進呈升之不復言遂有是命仍免安置此據王安石日録增入諤五年正月自賀移潭今又免編管及安置日録云授華州别駕朱史有之新舊紀日録都闕彥博罷在此月二十六日詔涇原環慶路職田依鄜延路例招置弓箭手其所收租估中價於本路給鹽鈔還官吏仍趣河東秦鳯兩路檢量上之六月癸未可考又詔諸路勇敢效用教閲法依涇原路立為一法乙未兵部員外郎李復圭知曹州楚建中周良孺等奏復圭節制陳圖命李信出軍約束考究不盡如盛陶章故薄責之陶章見五年十二月己丑舊録重出新録又承誤權知瀘州李曼言招誘甫望個恕攻討淯井監夷賊詔曼一聽監司指揮毋得妄處置仍令利州路提點刑獄范百祿體量曼更張邊事不與僚佐評議事實以聞慶厯二年烏蠻王子得蓋居姚州為刺史得蓋死其子竊號羅氏鬼主鬼主死子僕夜襲其號僕夜稍不能令諸蠻其部有甫望個恕晏子二酋者為最強及官軍與淯井監夷賊戰失利曼又借助于甫望人恕議者指曼處置乖方故有是命七年五月二日僕夜甫望個恕受王命上謂王安石曰曼欲引外蠻之強者令總制近邉諸小蠻非計安石曰此誠非計三代蠻夷爵不過子正為制其封域令小則可無侵中國之患故也上曰須弱乃可制安石曰誠須及弱時乃可制制定之後若非中國失政刑即彼無由能兼并為強也安石又白上曼既令知州又方有邉事却令一聽監司指揮不得妄有措置恐害事若己明見曼無狀便合替却未明人言虛實即當責以州事上令别降指揮然訖不改命安石又白上淯井事不足慮上曰但蜀人易搖爾安石又言曼招甫望個恕亦恐未失今監司既盡在瀘州若曼措置非理亦必不聽惟恐因事衆共歡噪傾沮李曼不患人肯撓而從之也洛苑使英州刺史劉紹能為鄜延路都監子永年補本族巡檢並依漢官例衙謝紹能保安軍蕃官也纍戰有功召對擢之右侍禁李德平轉一資兼閣門祗候德平隨紹能赴闕亦蕃官也詔鄜延路經略司自今毋得以路分都監以上引伴西人赴闕丙申翰林學士右正言曽布遷一官以詳定天下帳籍成故也布辭遷官止賜銀絹三百階州録事參軍馬有賢差替初知州劉舜臣令赴教閲義勇於官舍安泊日收僦錢入公使有賢不執白會德音上曰有賢雖暫權通判勢亦可執宜特差替以勵諸郡詔自今刑法官不及兩考者並許就試如試中刑法在寺供職及兩考與推恩詔在今諸路都總管司人吏勿用軍人並于本路州軍使州院選差會要六年四月二十三日丁酉知蔡州龍圖閣直學士陳薦提舉崇福宫初命張琥代薦欲召薦還朝上曰薦見孫永知開封必不樂不如就與一郡王安石曰未有郡薦遂以疾丐間許之殿中丞知都水監主簿劉璯兼同提舉沿汴淤溉民田夔州路轉運判官曽阜言渝州隆化縣新附户己團成保甲每嵗閲試如武藝出倫欲與減租入之半上曰民受田多寡不同賦租亦異若例減半必致不均此事決不可行王安石曰今一人藝精即欲免租若後衰退當如何密院欲每年旋免之上曰縱如此亦非法蓋人户租課多少不等必致不均不若止如府界保甲立法行之新舊録並稱南平軍隆化縣按八年十一月乃以渝州南川縣銅佛壩為南平軍此時未有南平之號當云渝州隆化縣實録誤也河東經略司言有陷蕃卒二人逃歸言夏人恐我大兵至修築于涼州而涼州守乃我順寧寨供奉王某之子每言我有家屬於此如何不早圖南歸詔轉二卒各一資改配熙河路并録其語付本路經略司上因謂執政曰向因五路出兵西人潛築城邑為伏藏之所今涼州去河州不逺如諸路將帥得人表裏相應則西人自此多竄歸者上又疑彼首領未可知王安石曰陛下欲詳知則須用間諜若其大情則不待間諜而可知彼區區夏國果有豪傑之主盡一國之材使材大者在上材小者在下則立為不可敵之國今其主幼婦人為政所任要重皆其親昵雖有豪傑無由自進則其大情己可知矣上曰事欲及時但患難得將帥與陜西財用闕之而已安石曰將帥隨時搜擇亦不乏人經制財用備西事不必専在陜西今天下財用足則轉給陜西無難者但以米穀難于運致故惟陜西農事欲經制爾上又曰財用亦須素為計安石曰逮天之未隂雨徹彼桑土綢繆牖户事豫則立亦誠不可出于臨時上曰作事固自有次第且當并力經營西事也戊戌詔裁定在京諸司吏請給先是吏祿各有定式後以兼局增茶湯紙筆錢僥幸相因略無限制而樞密院有言故降是詔已而王安石白上曰如吏人馬驤差往西川陜西又往湖南北兩路溪洞又如中書檢正吏皆一人兼兩人文字若不許兼請即誰肯任勞責者既是官有兩局若不許兼正是占吏人愈多而妨其本勾當處且令日食不足爾上曰一人兼五七處如何安石曰凡兼局吏非在一員官之下即亦不可兼既無一員官兼五六處差遣者即豈有兼五七局之吏人上乃追前詔寢之追寢前詔朱史簽貼云再取到中書省文字與日録同今從之新本遂削去又詔故邠州三水縣尉向子潛妻李氏封旌德縣君初慶州軍亂子潛以所部弓手鬬敵死事故也上批聞河北諸郡有蝗蝻可令監司督官吏撲滅去年冬末舊紀書河北大蝗新紀于今年四月末書是月河北蝗當考先是文彥博言議者多欲賦牧地與民而斂租課散國馬于編户而責孳息乞朝廷裁察既而蔡挺亦以收牧地賦民為便仍乞汰諸監不堪配軍馬量留支填馬鋪廂軍人員外並發赴河北等路州軍估賣詔元絳吳審禮蔡確詳定以聞八年四月二十八日己亥樞密使劔南西川節度使守司空兼侍中文彥博罷授守司徒兼侍中河南節度使判河陽從所乞也仍詔大敕繫銜曹佾上出入如二府儀彥博乞罷實録正史殊不詳二十一日已不入應是與王安石異議安石既成熙河之功彥博因力求去也十二日乙酉任逺事更詳之詔比許應明法舉人止願依法官條試斷案大義者聽如合格仍編排在本等人之上令定所賜場第及考校樣行之仍改先降指揮明法為諸科如敢冒應諸科人名試法許人陳告賞錢百千同保人永停取應三月二十四日可并此殿中丞王岐勒停送黃州編管坐繼母李為女納采督岐取嫁錢岐不肯與故也王韶既還熙州復遣將渡洮略定南山地斬首七百級築康樂城及劉家川結河二堡以通餉道遂自領兵破阿納城斬首三千級因城之又城香則時羌人謀伏兵南山伺官軍渡洮斷我歸路不則保摩宗城摩宗天險難近號鐡城子韶諜知之引兵徑渡洮遣别將敗其覆遂拔之此據王韶傳云御集五月八日手札改安河作定羌城載王韶奏已領大兵進據結河川安河香則兩城訖緣洮西一帶境上濶逺今商量出文字令逐官權行管勾乞降宣命然則城香則是四月末事審矣髙永年隴右録有王韶表自載破城寨月日與日録本傳不同當考是日奏阿納城捷馮京曰羌人愚可惜枉殺太多上曰旅拒如此豈可不殺王安石曰昏迷不恭正王誅所宜加洮河之兵所謂一月三捷也上曰涇原人精勇故雖王寧庸將亦能克獲安石曰人無勇怯在所措置洮隴徑兵處今羌人乃脆弱如此李抱真所教潞人才二萬教之非能盡如法然己能雄視山東孫武以為治亂數也強弱形也勇怯勢也治軍旅有方則數無不可使治形無不可使強勢無不可使勇上曰士但有技藝則勇安石曰為勢所激則雖無技人亦可使勇然王者之兵則於兵之義理能全之能盡之故無敵於天下此據日録乃二月十六事初張守約自通逺領兵至熙州而王韶已從間道還時諸羌三萬餘猶屯敦巴城聲言欲復舊地守約徑渡洮按甲挫鋭左右設伏伺其怠乘之斬首六百取窖藏助軍食以其帳舍材木城康樂寨得地招弓箭手千五百人五月二十一日乃賞康樂之功庚子以才人宋氏為媫妤二年十一月為才人今年四月一日生皇子樞密院言河北等路副都總管以下兵官銜位上帶駐泊兩字理有未該及盡列本路州軍名額尤為冗長欲令在安撫經略鈐轄司治所者更不稱駐泊其所統地分職務止依舊從之詔諸路經略司具嘗立戰功蕃官羌人引伴赴闕又詔熙河路令所役義勇與免一次上畨外更免本户支移折變物三石如户下折變數少即通於次年敷足詔降敕書奬諭權涇原路鈐轄黃琮河北緣邊安撫副使劉升卿以嘗薦苖授可為主兵官而授將先鋒下河州城及救香則城斬首四千餘級故也三月四日可考
