body:
  text: 續資治通鑑長編卷九十三宋李燾撰真宗天禧三年春正月甲子三司假內藏紬萬五千匹丁卯翰林學士錢惟演等四人權同知貢舉賜秦州永寧寨蕃僧䇿凌班珠爾伊朗頗斡二人紫衣以部署曺瑋言其屢經指使故也乙亥諸路貢舉人郭稹等四千三百人見于崇政殿時稹冒緦喪赴舉為同輩所訟上命典謁詰之稹引咎付御史臺劾問殿三舉同保人並贖金殿一舉時有司欲脫宋城王洙問洙曰果保稹否不然可易也洙曰保之不願易也遂與稹俱罷王洙本傳云稹冒祖母禫墓銘云從母禫今從實録郭稹有傳祥符人恐此别是一人也京西轉運使胡則言滑州進士楊世質等訴本州黜落即取元試卷付許州通判崔立看詳立以為世質等所試不至紕繆已牒滑州依例解發詔轉運司具析不先奏裁直令解發緣由以聞其試卷仰本州繳進世質等仍未得解發及取到試卷詔貢院定奪乃言詞理低次不合充薦詔落世質等而劾轉運使及崔立之罪立鄢陵人也初為果州團練推官役兵輦官物他州道險率衆錢傭舟載歸知州薑從革論如率斂法三人當斬立曰此非以私已罪止杖爾從革初不聽論奏詔如立議上記其名代還特轉大理寺丞大中祥符間天子既封禪士大夫爭奏符瑞獻贊頌立獨言水發徐兖旱連江淮無為烈風金陵大火是天所以戒驕矜而中外多上雲露草木禽蟲諸物之瑞此何足為治道言哉願敕有司草木之異雖大不録水旱之變雖小必聞前後凡上四十餘事云或將後假附祥符二年正月張知白俞獻可所言時事後己卯詔自今罪人當令衆在冬月者免之丙戌知江寧府丁謂言啓承天節道場甘露降仍獻五言詩有詔褒答又和詩賜焉是月三司言使臣傳宣取物承前止是口傳詔旨别無慿由致因緣盜取錢物今請下入內內侍省置傳宣合同司專差內臣一員主之如有所須索即以合同慿由一本給付逐庫務給訖繳申三司三司置御寶慿由司擇人吏專主除破所貴絶於欺弊從之此據會要又王皥百一編置御寶慿由司緣王欽若注在祥符元年二月當考詳禁川峽走馬承受使臣自今往來興販物色二月甲午詔沙門寨監押不得挾私怨害流人委提點五島使臣常察舉之違者具事以聞重置其罪先是著作佐郎髙清襄州文學焦雍皆以罪配𨽻監押董遇因事殺之至是清子伐登聞鼓上言遇責賂不足誣以謀叛詔詰遇而清既死無以證辨故有是命乙未禁採捕山鷓丁酉總噶爾嘉勒斯賚埒克遵遣僧景遵等來貢己亥辰州言富州防禦使五溪都防禦使向通漢卒詔賜緡帛羊酒命其子光舜知富州事光舜尋卒改命其次子光憲襲焉壬寅知越州刑部郎中直昭文館髙紳上言臣訪聞當州僧尼既受戒還家即受父母拜禮臣責問僧司具言有實伏以為臣為子忠孝之道居先在家出家怙恃之情匪異茍乖斯道是曰亂倫且子於父母恩報皆一在儒書則曰昊天罔極在釋教則曰恩重莫報安可用小加大使卑逾尊蓋由甌越之民僧俗相半溺於信奉罔序尊卑竊見唐太宗貞觀五年嘗禁僧尼受父母拜禮方今鴻化風行革除澆弊望降敕命特行戒止詔尚書祠部嚴加禁絶違者重決罰之丙午河南府言地震丁未出皇太子所書御詩賜宰相上作學書歌賜皇太子丙辰又作勸學吟賜之宰相王欽若上會靈志百卷上製序名五嶽廣聞記三月戊午朔日有食之內出聖祖降臨內記示宰相知澧州曺克已言本州石洞寨深在蠻界不當要路所控扼屯集人馬虛費芻糧望令毁拆留卒五人守護有警馳報靈溪寨從之先是亳州民訛言兵起老幼千餘人夜奔陳州已而自還辛酉判陳州張旻以聞命監察御史章頻乘傳察視仍往襄鄧州安撫陜西流民尋又命起居舍人吕夷簡至亳州體量民各安堵如故乃歸京西轉運使提點刑獄官並坐不察部內虛警徙廣西福建夔州等路涇州言知州連州刺史李繼昌暴中風眩上亟遣使挾醫往視又取寶丹封賜之仍許肩輿還京師未至而卒又遣中卒護其喪歸録其子官繼昌性謹厚所至以寬柔為治衆頗懷之任峽路日與上官正聫事正嚴忍好殺嘗有縣胥護芻糧地逺後時而至正令曳出斬之繼昌徐為慰解卒貸焉駙馬都尉遵朂初聞繼昌病即馳省不俟命上遣使令乘驛赴之既還上表自劾上使輔臣慰諭焉壬戌詔南省下第舉人內曽經御試及諸科七舉終場者特以名聞乙丑三司假內藏庫銀一十三萬增許州公用錢至七十萬從知州李維之請也丙寅上御崇政殿親試禮部奏名貢舉人作詩賜考校官令皇子書示宰相得進士王整以下六十三人賜及第八十六人同出身又賜學究出身者一十三人諸科及第者一百二人同出身者四十七人試將作監主簿者五人除官如前例王整魏人登科記云明道元年十月庚子録王旦孫整為正字恐此及第者非魏人或是贄子趙德明來告其繼立母卒遣使弔祭起復悉如景德之制詔禮賔院自今不得以外國人充通事時有開封府民訟通事辛榮本夏州子弟投禮賔院充小蕃通事虛稱在京人府移禮賔院稱無條約詔以榮纍經赦宥免杖黥面配海州本城因有是詔此詔附見會要乃此月事不得其日也辛未補饒州公士楊亮為三班借職轉運使言亮捕強賊百餘人故也亮已見祥符六年壬申慶州言柔逺蕃寇入境巡檢楊承吉與戰不利官軍殺傷頗衆上曰德明素受朝命何忽爾侵擾豈邊將失於撫綏耶即命客省使康州防禦使曺瑋為華州觀察使鄜延路副都部署環慶秦州緣邊巡檢安撫使鄂伽恭邁德密等族聞瑋至歸附者千餘落鄂伽族歸附在八月癸卯恭邁德密族歸附在九月丙寅今并書翰林學士承旨朝迥以老疾求解近職詔不許特蠲其宿直令三日五日一至院迥辭以非故事乃聽俟秋還直己卯工部郎中陳堯佐右正言陳執中並奪一官堯佐為起居郎依前直史館監鄂州茶場執中衛尉寺丞監嶽州酒稅初上纍定考試條制舉人納試卷即先付編排官去其卷首鄉貫狀以字號第之封彌官謄寫校勘始付考官再定等訖復封彌送覆考官再定等乃送詳定官啓封閲其同異參驗著定始付編排官取鄉貫狀字號合之即第其姓名差次并試卷以聞遂臨軒放榜焉大抵欲考校詳定官不獲見舉人姓名書翰編排官雖見姓名而不復升降用絶情弊而堯佐執中為編排官不詳此制復改易其差級翌日內廷覆驗多所同異遂悉付中書命直龍圗閣馮元太子右諭德魯宗道閲視仍召堯佐執中洎考校詳定官對辨之堯佐等具伏王欽若等言堯佐等所犯誠合嚴譴若屬吏議其責尤重請止據罪降黜從之而宗道又請以堯佐等妄去留者明諭貢舉人乃詔禮部揭榜貢院其元定合格為編排誤落者並賜附榜及第元定不合格誤編排及第者並追敕更令修學元定稍及第者量免省試凡已落復及第者進士諸科各二人免省試者進士十四人諸科二十三人已及第出身而追奪者二十一人本志云先是編排官兼詳定仍許點檢差失是歲分編排詳定為二而堯佐執中不詳詔意得詳定試卷復更升降放及第畢禁中參驗多所同異故堯佐執中坐黜責與實録所載差别今且從實録當考王舉正志堯佐墓云編次文卷有差舛宰相王欽若持其事降秩左史司茗榷于鄂渚未至丁內艱癸未翰林學士錢惟演樞密直學士王曙工部侍郎楊億知制誥李咨直史館陳從易並降一官進士陳損黃異等五人並決杖配𨽻諸州其連狀人並殿一舉初損異等率衆伐登聞鼓訴惟演等考校不公命龍圗閣直學士陳堯咨左諫議大夫朱巽起居舍人吕夷簡於尚書省召損異等令具祈所陳事及閲視試卷以聞堯咨等言惟演等貢院所送進士內五人文理稍次從易别頭所送進士內三人文理荒繆自餘合格而損異等所訟有虛妄故并責焉甲申屯田員外郎張宗誨言諸州取年滿里正為牙職主掌官物多致破蕩家業請罷之令募明書計人充職詔付三司乙酉徙判陳州武寧節度使同平章事張旻判襄州時石隕于潁占者以為災逮鄰守特徙旻避之尋命歸本鎮入內副都知周懷政日侍內庭權任尤盛附會者頗衆往往言事獲從同輩位望居右者必排抑之中外帑庫皆專取而多入其家性識凡近酷信妖妄有朱能者本單州團練使田敏家厮養性凶狡遂賂其親信得見因與親事卒姚斌等妄談神怪事以誘之懷政大惑援引能至御藥使領階州刺史俄於終南山修道觀與殿直劉益輩造符命託神靈言國家休咎或臧否大臣時冦準鎮永興能為巡檢賴準舊望欲實其事準性剛強好勝喜其附已故多依違之是月準奏天書降乾祐山中蓋能所為也中外咸識其詐上獨不疑劉攽作冦準傳云朱能獻天書上以問王旦旦曰始不信天書者冦準也今天書降準所當令準上之則百姓將大服乃使周懷政諭準準始不肯而準壻王曙居中與懷政善曙固要準準乃從之按王旦死於天禧元年正月而準上天書乃三年三月攽誤甚矣或欽若實為此非旦也夏四月辛卯備儀仗至瓊林苑迎𨗳天書入內太子右諭德魯宗道上疏略曰天道福善禍淫不言示化人君政得其理則作福以報之失其道則出異以戒之又何有書哉臣恐姧臣肆其誕妄以惑聖聽也知河陽孫奭上疏言朱能者姧憸小人偶塵驅使驟為牧伯皆由妄言祥瑞而陛下崇信之屈至尊以迎拜歸祕殿以奉安上自朝廷下及閭巷靡不痛心疾首反脣腹誹無敢言者漢文成將軍以帛書飯牛揚言牛腹中有竒書殺視得書天子識其手迹又有五利將軍妄言方多不售二人皆坐誅先帝時有侯莫陳利用以方術暴得寵用一旦發其姦誅於鄭州漢武可謂雄材先帝可謂英斷唐明皇得靈寶符上清護國經寶券皆王鉷田同秀等所為明皇不能顯戮怵於邪説自謂德實動天神必福我夫老君聖人也儻實降語固宜不妄而唐自安史亂離乘輿播越兩都蕩覆四海沸騰豈天下太平乎明皇雖僅得歸闕復為李輔國劫遷卒以餒終豈聖夀無疆長生久視乎夫以明皇之英睿而禍患猥至曽不知者良由在位既久驕亢成性謂人莫已若謂諫不足聽心玩居常之安耳熟𨗳諛之説內惑寵嬖外任姦回曲奉鬼神過崇妖妄今日見老君於閣上明日見老君於山中大臣尸祿以將迎端坐畏威而緘默既惑左道即紊政經民心用離變起倉卒當是之時老君寧肯禦兵寶符安能排難邪今朱能所為或類於此願陛下思漢武之雄材法先帝之英斷鑒明皇之召亂庶幾災害不生禍亂不作奭又言天且無言安得有書天下皆知朱能所為獨陛下一人不知爾乞斬朱能以謝天下上雖不聽然亦不罪奭也奭本傳載天且無言安得有書之對在祥符初恐誤也移見祀汾隂前又見于此朱能所獻天書其迎奉之禮蓋不減祥符而國史實録諱之遂不復詳載且失其時日按稽古録於是年三月載冦準奏天書降乾祐山中今用此為據繫之三月末魯宗道孫奭諫疏亦不得其時因此附見國老間談以宗道所諫為指祥符則誤也今追正之記聞載奭諫語比之正傳尤切直恐奭不但一疏今並載之可見先朝容直臣也按李維集有賀天書降兩表其一云四月四日迎奉入內其二云八月二十四日迎奉入內今並用此月日載之長編詔太子左庶子張士遜以下每遇皇太子侍車駕行幸許依內殿起居陪從癸巳謁玉清昭應宫景靈宫因幸開寶寺甲午幸會靈觀上清宫祥源觀免鄜延路鈐轄西上閣門使昭州團練使髙繼勳仍削一任都監曺仁用監押胡從式並除名配頴虢州金州仁用等坐販易交引繼勳市馬虧直也龍圗閣直學士工部郎中陳堯咨嘗舉仁用責授兵部員外郎職如故河東轉運使李放貢錢三十萬貫糧百二十萬石詔奬之乙未幸啓聖院丁酉知江寧府丁謂言中使雷允恭詣茅山投進金龍玉簡設醮次七鶴翔于壇上上作詩賜謂己亥召山南東道節度使同平章事判永興軍府冦準赴闕審刑院請令開封府自今有未明條格止移牒問大理勿遣法曺參軍入寺如故事詔可復遣入寺會要在四年九月今并書辛丑詔轉運使副提點刑獄館閣臺省官外任歲滿代還者並依京朝官例於審官院投狀考課詔奬知保州內殿崇班盧鑑以其幹職也壬寅召近臣詣真遊殿朝拜天書上作玉宸殿觀瑞麥詩賜近臣戊申禁金商等州祀邪神所犯頭首及強豪者並處死壬子録故右侍禁丁惟清子遵望為三班奉職惟清前知西涼州陷蕃故也五月丁巳朔大食國遣使來貢己未龍神衛四廂都指揮使夏守恩為捧日天武四廂都指揮使依前泰州防禦使洛苑使勤州刺史同勾當皇城司劉美為龍神衛四廂都指揮使領昭州防禦使上不豫中宫預政以守恩領親兵倚用之故與美並命守恩尋遷殿前都虞侯美遷馬軍都虞候守恩仍權領殿前步軍司美權領馬軍司事守恩美等遷在七月壬申權領二司在八月丁酉今并書之美本傳云先是美與周懷政聫事懷政姦恣人多畏憚美未嘗附懷政左右有過必痛繩之親從卒偵邏者多不時更易美按籍分番次均使焉上屢欲授美兵柄以皇后懇讓故中輟者數四於是卒用之此傳蓋當時修史官以媚太后爾今不取禮儀院言每歲端午百官休務皇帝不御前殿惟中書樞密院奏事于承明殿今邉鄙寧靜刑訟稀簡無急速機務請令中書樞密院其日罷奏事為定式從之壬戌詔自今管軍將校緣邉部署鈐轄犯贓私罪當禁錮者即以本司事付長吏訖禁勘時鄜延鈐轄髙繼勳免官後始以本司事付知州因降是詔左諫議大夫知鄆州戚綸責授嶽州團練副使先是有王遵誨者嘗任西邊寓家永興閨門不肅事將發知府冦準為平之及是遵誨為同提點刑獄官綸因諧戲語及準遵誨怒以為斥已遂與提點刑獄官李仲容奏綸有訕上語故坐責綸篤於古學善談名理喜言民政頗近迂闊事兄維友愛甚厚維卒聞訃哀慟不食者數日交于故舊以信義著士子謁見必詢所業訪其志尚隨才誘誨之嘗云歸老後得十年在鄉閭講習亦可以恢道濟世大中祥符中繼修禮文之事綸悉參議與陳彭年並職屢召對多建條式恩寵甚盛樂於薦士每一奏十數人皆當時知名者晚節為權幸所排遂不復振後二年卒家無餘資家人於几閣間得遺戒一篇大抵勸子弟為學本傳以遵誨為勸農副使此時猶未改官名也今正之庚午河北轉運使兵部員外郎冦瑊為工部郎中再留一任河決澶淵瑊視役河上隄墊數里衆皆奔潰而瑊獨留自若水為折去衆異之嘗言契丹約和以來河北減卒之半而復刺土兵其實益三分之一而塞下軍儲不給請行入中鑿頭便糴三説之法傳言河決澶淵後瑊始遷官恐誤也按實録明年正月辛未命髙漢美監修澶州決河然不見初決時今且附見當考入中三説當考沈括云世傳算茶有三説法最便三説者皆謂見錢為一説犀牙香藥為一説茶為一説深不然也此乃三分法耳謂緣邉入納糧草其價折為三分一分支見錢一分折犀象雜貨一分折茶爾又有并折蓋為四分法更改不一皆非三説也豫在三司求得三説舊按三説者乃是三事博糴為一説便糴為一説直便為一説其謂博糴者極邉糧草嵗入欲足常額每嵗自三司拋數下庫務先封椿見錢緊便錢緊茶抄緊便錢謂水路商旅所便處緊茶抄謂上三山場𣙜務然後召人入中便糴者次邉糧草商人先入中糧草乃詣京師算請慢便錢慢茶抄及雜貨慢便錢謂道路貨易非便處慢茶抄謂下三山場𣙜務直便者商人取便于緣邉入納見錢于京師請領三説先博糴數足然後聽便糴及直便以此商人競趨爭先赴極邉博糴故邉粟常先足不惟諸郡分裂糧草之價不能翔踊諸路稅課亦皆盈衍此良法也豫在三司方欲講求會左遷不果建議辛未上親録繫囚多所原減癸酉詔今年五月一日已前得替判司簿尉並放選乙亥兵部員外郎龍圗閣待制李虛已為右諫議大夫充職右正言劉曄判三司户部勾院賜緋魚虛已曄並表求外任上以虛已儒雅循謹屢上封言事故加奬而留之或云曄兼他職蓋執政者不欲其專任言責也實録天聖元年四月丁巳稱執政畏忌言官乃優與職任而罷之蓋指此也似有所避忌今兩存之六月末范雍言當考辛巳監察御史劉平為鹽鐵判官章頻為度支判官並賜緋魚御史於是復兼省職劉平傳云平為御史數上疏論事為丁謂所忌久之除鹽鐵判官按此年六月戊戌謂乃參政恐誤也元年二月丁丑詔别置諫官御史六員不兼他職今曄與平類皆兼省職蓋非當日詔意也河北緣邊安撫司言準詔規度雄州壅城其地甚廣本州先有材木望令漸建屋宇冀行旅往來有所障蔽從之甲申冦準自永興來朝準將發其門生有勸準者曰公若至河陽稱疾堅求外補此為上䇿儻入見即發乾祐天書詐妄之事尚可全平生正直之名斯為次也最下則再入中書為宰相爾準不懌揖而起君子謂準之卒及于禍蓋自取之也此出湘山野録其言有理故取之詔廣南福建路京朝幕職州縣官丁憂者委轉運使權差官替放離任此據本志六月丙戌朔禮儀院言先準御札每月旬假及上已春秋二社端午重陽並休務一日內旬假皇帝前後殿不坐餘日百官不入中書樞密院詣後殿起居又準近詔端午前後殿不坐今參詳望凡遇上件休務日皇帝前後殿不視事中書樞密院及諸司有急速公事須面奏者特取進止從之徐州言利國監大風起西南壞官私廬舍二百餘區軍民壓死者十二人詔張旻安撫之戊子保信軍節度使丁謂自江寧來朝召之也辛卯太白晝見占曰女主昌先是江淮發運使賈宗言諸路歲漕自真陽入淮汴歷堰者五糧載煩於剝卸民力疲於牽挽官司艦舟由此速壞今議開揚州古河繚城南接運渠毁龍舟新興茱茰三堰通漕路以均水勢歲省官費數十萬功利甚厚詔屯田郎中梁楚閣門祇候李居中按視以為當然於是役成水注新河與三堰平漕船無阻公私大稱其便賜詔奬之宗復請御製文許之會上仙不及成初殿中侍御史王臻為淮南轉運使發運司請浚漕渠廢諸堰臻言揚州北有召伯堰謝安所作後人思之不敢廢請罷浚渠兼浚渠亦無所益臻尋入三司為度支判官而發運司卒浚渠以通漕坐前異議責監察御史知睦州責官不得其時今附此為度支乃今年正月己卯臻責睦州道復官徙福州實録亦不書甲午左僕射平章事王欽若罷為太子太保時欽若恩遇浸衰人有言其受金者欽若於上前自辨乞下御史臺覆實上不悅曰國家置御史臺固欲為人辨虛實耳欽若皇恐因求出藩會商州捕得道士譙文易畜禁書能以術使六丁六甲神自言嘗出入欽若家得欽若所遺詩及書上以問欽若欽若謝不省遂罷相制辭以均勞之意從優禮云尋命判杭州判杭州實録無其日却於太子太保歸班下即云尋命判杭州今從之實録云初周懷政以上崇禋祀遂與妖人朱能輩偽造靈命冀圗恩寵且日進藥餌欽若屢言其妄復密陳規諫懷政懼得罪因并誣詆言捕獲金商州道士譙文易畜禁書有神術欽若素識之上不復辨詰故有是命此蓋當時史官見欽若復相故隂為之辭其實不然也今削去受金覆實事據記聞載蘇頌子容語此必不妄今從之乙未河決滑州城南劉曄正傳云歲薦飢河決滑州大興力役道殍相望曄請策免宰相以應天變按王欽若已先罷於是冦準未拜獨向敏中在位曄時實為諫官兼省職傳載其事於聖水前蓋顛倒也今附見曄遷知雜時救李􅐉十朝綱要灌澶濮鄆濟至徐州入淮遣使沒溺者恤賜其家丁酉以引進使李允則為客省使依前髙州團練使知鎮州兼鎮定鈐轄允則在雄州十四年自景德三年四月為安撫副使九月乃知雄州至今凡十四年也二年正月嘗知雄州二月即改命何承矩而徙允則知瀛州司馬光記聞云允則在雄州十八年蓋誤也河北既罷兵允則治城壘不輟遼主問其相張儉曰聞南朝尚修城備得無違誓約儉曰李雄州為安撫使其人長者不足疑既而有以為言詔詰之允則奏曰初通好不即完治他日如有頽圯復安敢動因此廢守備臣恐遼人不可測也帝以為然城北舊有甕城允則欲合於大城為一先建東嶽祠出黃金百兩為供器𨗳以鼓吹居人爭獻金銀久之密自撤去聲言盜自北至遂下令捕盜三移文北界乃興板築揚言以護祠而卒就關城浚壕起月隄自此甕城之人悉內城中周世宗始以關為州而民多以草覆屋允則取材木西山大為倉廩營舍始教民陶瓦甓摽里閈置廊市邸舍水磑城上悉纍甓下環以溝塹蒔麻植榆栁廣閻承翰所修屯田架橋引水作石梁築構亭榭列堤道以通安肅廣信順安軍歲修禊事召界河戰棹為競渡縱北人遊觀潛寓水戰州北舊設陷馬坑城上起樓為斥候望十里自罷兵人莫敢登允則曰南北既講和矣安用此為命徹樓夷坑為諸軍蔬圃浚井疏洫列畦壟築短垣縱橫其中植以荆棘而其地益阻險因治坊巷徙浮圗北垣上州民旦夕登望三十里令安撫司所治境有隙地悉種榆久之榆滿塞下謂僚佐曰此步兵之地不利騎戰豈獨資屋材耶上元舊不燃燈允則結綵山聚優樂使民縱遊明日偵遼帥欲間入城中觀允則與同僚伺郊外果有紫衣北人至比夕與俱入傳舍不交一語出妓女羅侍左右劇飲而罷且置其所乘驢廡下使遁去即幽州統軍也後數日為遼所誅嘗燕軍中而甲仗庫火允則作樂行酒不輟副使請救不答少頃火熄命悉瘞所焚物密遣使特檄瀛州以茗籠運器甲不浹旬兵數已完人無知者樞密院請劾不救火狀上曰允則必有謂姑詰之對曰兵械所藏警火甚嚴方燕而燔必姦人所為舍燕救焚事或不測又得遼諜釋縛厚遇之諜言燕京大王遣來因出所刺沿邊金榖兵馬之數允則曰若所得謬矣呼主吏按籍書實數與之諜請加緘印因厚賜以金縱還未幾諜遽至還所與數緘印如故反出遼中兵馬材力地里委曲以為報一日民有訴為遼人毆傷而遁者允則不治與傷者錢二千衆以為怯逾月幽州以其事來詰答以無有蓋他諜欲以毆人為質驗比得報以為妄乃殺諜雲翼卒亡入遼中允則移文督還契丹報以不知所在允則曰在某所契丹駭不敢隱即歸卒乃斬以徇後無敢亡者允則不事威儀間或步出遇民可與語者延坐與語以是洞知人情訟至無大小面訊立斷善撫士皆得其用盜發輒獲人亦莫知其繇身無兼衣食無重羞不畜資貨當時邊臣鮮能及之者邊臣無及允則者此據司馬光記聞今附貨見正傳所云身無兼衣食無重羞不畜資下允則事當散入諸年然日月多不可考今并書之或有與諸年所書相犯者當更檢詳也戊戌以山南東道節度使同平章事冦準為中書侍郎兼吏部尚書平章事保信節度使丁謂為吏部尚書參知政事故事節度使除拜當降麻翰林學士盛度以為參知政事當屬外制遂命知制誥宋綬草辭謂甚恨焉度事據歐陽修歸田録謂在中書事準謹甚嘗會食羮汚準鬚謂起徐拂之準笑曰參政國之大臣乃為官長拂鬚耶謂甚愧之由是傾誣始萌矣辛丑詔自今略賣人口入契丹界者首領並處死誘致者同罪未過界者決配淮南州軍牢城先是河決滑州城西北天臺山傍俄復潰於城西南岸摧七百步侵益州城民多漂沒歷澶濮鄆濟注梁山泊又合清水古汴河東入于淮州邑被患者三十二於是遣中使救溺者賜其家緡錢近臣祭決河御史劾官吏之罪命馬步軍都軍頭興州刺史崔鑾領宣武卒四百人巡護又命光祿卿薛顔西上閣門使張昭逺乘傳與京東河北轉運使計度以聞癸卯命虢州團練使郝榮為滑州修河部署供奉官閣門祇候薛貽為都監丁未以同玉清昭應宫副使吏部侍郎林特為尚書左丞玉清昭應宫副使特性邪險善附會故丁謂始終善特亟引用之戊申召宗室近臣館閣三司諫官御史法官京府官詣真遊殿觀道像各賜聖祖降臨記一函己酉徙邠寧環慶路部署司于慶州是司先在邠州曺瑋言其去邊稍逺故也詔審官院應轉運使副提點刑獄內外帶職兩省臺官并京朝官等轉官及三年已上者如在外仰逐處收接歷任文狀附遞送審官院磨勘進呈內有得替到闕及在京見勾當者亦磨勘引見如在京三年已經磨勘改轉或尚且依舊勾當者即直候得替更及三年以上再合磨勘依例施行其內外有未磨勘間便遇朝廷差使者如合該磨勘即先次磨勘如昨已經勘會轉官及七年曽具申奏并因公事降差遣移任無例磨勘者不在此限會要天禧三年六月二十四日事實録無之今附本日己酉審官院言準詔磨勘內外臣僚合具申請在京勾當臣僚已經磨勘轉官仍舊勾當即候得替更及三年再合磨勘者參詳如見勾當未罷者即準前詔直候得替磨勘如朝廷特留一任或量留年限者欲望每及三年亦與磨勘又京朝官轉官雖及三周年曽經磨勘引見及奏名并該七年申奏者雖不轉官欲望自磨勘後重敘三年方得磨勘如未經取旨特旨别令磨勘者不在此限又勾當事京朝官自降敕以前差遣者即準前詔一例磨勘降敕後方就差遣其間多有改官已及三周年者參詳未勾當事以前雖不該磨勘乞朝廷相度如勾當後及一年或二年别無遺闕即許將前來年限通理亦與磨勘詔臣僚磨勘歷任文字仰本院并將自前已磨勘歷任功過一處開拆進呈降敕後就差遣者改官已及五年勾當事及一年并改官及三年勾當事及二年者並特與磨勘餘悉依奏會要天禧三年七月事今附見六月二十四日後須刪修乃可天聖三年九月六日方改此詔甲寅長清郡主卒秦悼王之長女也適莊宅使田守信有司言小功服禮當降殺上特臨奠廢朝先天節羣臣上夀不舉樂録其二子並遷秩重進子已見淳化四年是月屯田員外郎判三司開拆司范雍言自今諫官御史兼它職者望令仍舊舉職及乞增置諫官上令别選人充諫官御史此據會要當考諫官御史兼它職者姓名五月乙亥辛巳詔選強明朝臣知雲安軍勿差班行從轉運使刁湛所請也
