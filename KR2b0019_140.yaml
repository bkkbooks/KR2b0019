body:
  text: 續資治通鑑長編巻一百三十六宋李燾撰仁宗慶歴二年五月癸卯朔封皇第三女為安夀公主生三嵗矣其母修媛張氏也贈修媛父故石州軍事推官堯封為秘書監詔乃者以河北河東弓手為軍蓋欲知山川道路服習耕戰而諸道游冗之人皆願雇代之籍其非正身者一切罷去甲辰以天武捧日四廂都指揮使知并州恩州團練使髙繼宣為眉州防禦使先是虜冦麟府繼宣率兵營陵井抵天門關是夕大雨及河師半濟黑凌暴合舟不得進乃具牲酒為文以禱俄而凌解師遂濟進屯府谷間遣勇士夜亂賊營又募黥配廂軍三千餘人號清邊軍命偏将王凱主之軍次三松嶺敵數萬衆圍之清邊軍奮起斬首千餘級其相蹈藉死者不可勝計築寧逺寨相視地脉鑿石出泉已而城清塞等五寨繼宣皆與有勞焉此事不得其時據繼宣傳與遷眉防相接因聨書之當考西上閤門使忠州刺史并代鈐轄専管勾麟府軍馬張亢領果州團練使為髙陽關鈐轄初麟州猶未通饋路閉隔敇亢自䕶南郊賞物送麟州賊旣不得鈔遂以兵數萬趨栢子寨邀我歸路亢将才三千人亢激怒之曰若等已䧟死地前鬬則生不然為賊所屠無餘也士皆感厲㑹天大風順風擊之斬首六萬餘級相蹂躪崖谷死者不可勝計奪馬千餘疋乃修建寧寨賊數出爭遂戰于兎毛川亢以大陣抗賊而使驍将張㞯以短兵强弩數千伏山後亢以萬勝軍皆京師新募市井無頼子弟疲耎不能戰遇賊必走賊目曰東軍素易之而虎翼卒勇悍隂易其旗以悞賊賊果趨東軍而値虎翼卒搏戰良久發伏賊大潰斬首二千級不踰月築清塞百勝中候建寧鎮川五堡麟州路始通亢復奏今所通特往來之徑爾旁皆虚空無所阻若増築並邊諸柵以相維持則可以廣田牧河外勢益强議未下而朝廷慮契丹将渝盟乃徙亢髙陽敇亢䕶送郊賞據附傳乃今年事按去年十一月祀南郊不知何故今年方送賞物當考因亢遷髙陽遂書之殿中丞平棘郭諮言恐契丹背盟犯界請決御洨胡盧新唐五河使之北出則深冀瀛鄚諸州皆在水東足以限隔虜騎宰相吕夷簡薦諮言可用乙巳換崇儀副使提舉黄河等處隄岸尋復詔内蔵庫使帶御器械鄧保信洛苑使普州刺史楊懐敏同規度利害以聞諮等議次黎陽大河下與胡盧滹沱後唐河相合以注溏泊混界河使界東北抵于海上溢鸛鵲坡下洙北當城南視溏泊界截敵疆東至海口西接保塞惟保塞正西四十里水不可到請立堡寨以兵戍之詔儲用興役㑹契丹約和而止諮等議據諮𫝊然字或差誤當求别本是正之溢鸛鵲坡下洙北此七字必有差誤者丁未河東都轉運使戸部郎中天章閣待制明鎬遷左司郎中以修建寧中候百勝鎮川清塞等堡寨成賞其勞也戊申安夀公主薨追封唐國公主以母寵帝愛甚成服苑中羣臣奉慰殿門外庚戌河北都轉運使李昭述請修澶州北城從之先是河決久未塞昭述但以治隄為名調農兵八萬逾旬而就劉六符過之真以為治隄也及還而城具甚駭昭述事附見據李肅之傳修城乃肅之建議也肅之時通判澶州辛亥御崇政殿録繫囚洛苑使普州刺史楊懐敏為入内押班先是張方平言伏以天下承平為嵗深逺而國用不贍民力益困今聚師境上調費寖廣倚於經入則財不給加以横賦則人不堪救兹交急特在陛下身先率下惟事事得其撙節而已臣竊惟陛下躬勤節用克自抑畏凡諸服御殊為菲薄而兹中外之論皆言用度之過臣竊疑之蓋宫闈嬖昵左右近習假威恣横敢為欺誣仰恃仁慈縁為姦弊且禁中呼索輙稱聖㫖有司應奉皆為上供外人不知其詳而譏議累乎盛徳國家帑蔵之困乃羣下侵牟之蠧也伏願陛下上念宗社之計下以生民為心彼婦人宦者何煩過於姑息超然逺慮斷自天心試取先帝之世及陛下臨御以來天聖之初宫司帳籍如内東門之類比較近年支費金帛則知増損豐儉之數以一言裁減之恩為萬方廣富之本兆民所頼為幸實深先朝已前事恐難繼若天聖初體例夫豈逺哉因降詔書詔天下以陛下憂邊之心愛民之故則将卒聞之孰不奮厲以投命士民聞之孰不鼓舞以稱仁至于外諸司庫務凡百横費乞特置司局選用公平通敏諳曉時務之士兩三貟條理之而以大臣一人監領其事其不便者惟是左右主當之人爾誠陛下斷之不疑無容阻撓則上可以資徳羙下可以施恩恵内可以集國計外可以成武功效速而利多事近而徳逺此當世之切務也方平既受詔與賈昌朝等減省浮費又言竊聞淵㫖先是宫禁裁省一切用度至于聖躬奉給緡錢亦令罷供此蓋陛下身先勤儉為生靈計夫減省所為者自下而議上則於禮不順由上以率下則於名為正臣願以禁中所行之事擇其大者三數節宣示外廷因發明詔使天下共知聖意憂邊愛人之深則中外臣庻得不體國家之急上成徳羙者乎特在陛下斷之清衷不屑細言則成功可冀也其有狥己之私與則喜奪則怒此女子與小人之情怨謗所由生也臣軰敢不竭情盡慮上副天心壬子内出詔書減皇后及宗室婦郊祀所賜之半著為式又詔皇后嬪御進奉乾元節回賜權罷邊事寧日聽㫖於是皇后嬪御各上俸錢五月以助軍費宗室刺史以上亦納公使錢之半荆王元儼盡納公使錢詔以半給之減罷回賜乃甲寅日今從本志并書給元儼公使之半乃甲子日今亦并書司馬光日記載元儼愁殺人事附明年五月甲午癸丑命知貝州供備庫使恩州團練使張茂實為回謝契丹國副使代符惟忠也惟忠行至武强病卒富弼請以茂實代之詔從其請初轉運使張昷之奏罷冀貝驍㨗軍士上關銀鞵錢事下茂實議茂實言此界河駐先鋒兵有戰必先故平時賜予異諸軍不可罷昷之猶執不已其後遂奏罷保州雲翼别給錢糧軍怨果叛此據茂實傳保州雲翼軍叛事在四年八月昷之以此年三月為河北漕三年五月入為鹽鐵副使十月又為都漕甲寅詔三館臣僚上封事及聽請對余靖論文彥博知秦州状以為五月七日敇按甲寅乃十二日今從實録集賢校理歐陽修上疏曰臣近准詔書許以封章言事臣學識愚昩不能廣引深逺以明治亂之原謹采當今急務為三弊五事以應詔書所求伏惟陛下裁擇臣聞自古王者之治天下雖有憂勤之心而不知致理之要則心愈勞而事愈乖雖有納諫之明而無力行之果斷則言愈多而聽愈惑故為人君者以細務責人専大事而獨斷此致理之要也納一言而可用雖衆議不得以沮之此力行之果斷也知此二者天下無難致理矣臣伏見國家大兵一動中外騷然陛下思社稷之安危念兵民之困敝四五年來憂勤可謂至矣然兵日益老賊日益强併九州之力平一西戎小者尚無一人敢前今又北敵大者違盟妄作其将何以禦之從來所患者邊陲今邊陲叛矣所患者盜賊今盜賊起矣所憂者水旱今水旱作矣所仰者民力今民力困矣所急者財用今財用乏矣陛下之心日憂於一日天下之勢嵗危於一嵗臣所謂用心雖勞而不知求致理之要者也近年朝廷雖廣言路獻計之士不下數千然而事緒轉多枝梧不暇從前所采衆議紛紜至于臨事誰策可用此臣所謂聽言雖多不如力行之果斷者也臣伏思聖心所甚憂即當今所最闕者不過曰無兵也無将也無財用也無禦戎之策也無可任之臣也此五者陛下憂其未有而臣謂今皆有之然陛下未得而用之者陛下未思其術也國家創業之初四方割據中國地狹兵民不多然尚能南取荆楚收偽唐西平巴蜀東下并潞北窺幽薊當時所用兵財将吏其數幾何惟善用之故不覺其少豈如今日承平百年祖宗之業盡有天下之富强人衆物盛十倍國初故臣敢曰有兵有将有財用有禦戎之策有可任之臣然陛下皆不得而用者何哉由朝廷有三大弊故也何謂三大弊一曰不謹號令二曰不明賞罰三曰不責功實此弊因循於上則萬事弛慢廢壊於下臣聞號令者天子之威也賞罰者天子之權也若號令煩而不信賞罰行而不當則天下不服故又須責臣下以功實然後號令不虚出而賞罰不濫行是謹號令明賞罰責功實此三者帝王之竒術也自古人君英雄如漢武帝聰明如唐太宗皆能知三術而自執威權之柄故所求無不得所欲皆如意漢武帝好用兵則誅滅四夷立功萬里以快其心欲求将則有衛霍之材供其指使欲得賢士則有公孫董汲之徒以稱其意唐太宗好用兵則誅突厥破遼東威加四海以逞其志欲求将則有李勣之儔入其駕馭欲得賢士則有王魏房杜之軰奉其左右此二帝凡有所為後世莫及可謂所求無不得所欲皆如意無他術也惟能自執威權之柄爾伏惟陛下以聖明之資超越二帝又盡有漢唐之天下然而欲禦邊則常患無兵欲破賊則常患無将欲贍軍富國則常患無財欲威服四夷則常患無策欲任使賢才則常患無人是所求皆不得所欲皆不如意其故無它由不用威權之術也自古帝王或為强臣所制或為小人所惑權不得出於已方今外無強臣之患又無小人獨任之惑内外臣庻尊陛下如天愛陛下如父傾耳延首願聽陛下之所為何憚而久不為哉若一旦赫然執威權以臨之可使萬事皆辦何患五者之無奈何為三弊之因循而一事之不集臣請言三弊夫言多變則不信令頻改則難從今出令之初不加詳審行之未久尋又更張以不信之言行難從之令故毎有處置之事州縣知朝廷未是一定之命則官吏咸相謂曰且未要行不久必湏更改或曰備禮行下畧與應付指揮旦夕之間果然又變至于将吏更易道路疲于迎送文牒縱横上下莫得遵稟官吏軍民或聞而歎息或聞而竊笑號令如此欲感天下其可得乎此不謹號令之弊也古今用人之法不過賞罰而巳然賞及無功則恩不足勸罰失有罪則威無所懼雖有人不可用矣臣嘗聞太祖時王全斌等破蜀而歸功不細矣犯法一貶十年不問葢是時方伐江南故黜全斌與諸将立法及江南巳下乃復其官太祖神武英斷所以能平天下者賞罰分明皆如此也自關西用兵四五年矣賞罰之際是非莫分大将以無功而依舊居官軍中見無功者不妨居好官則諸将誰肯立功矣偏裨畏懦逗留法皆當斬或暫貶而尋遷或不貶而依舊軍中見有罪者不誅則諸将誰肯用命矣所謂賞不足勸罰無所懼賞罰如此而欲用人其可得乎此不明賞罰之弊也自兵動以來處置之事不少然多有名無實請略舉其一二則其他可知數年以來點兵不絶諸路之民半為兵矣其間老弱病患短小怯懦者不可勝數兵額空多所用者少此有點兵之虚名而無得兵之實效也新集之民所在教習追呼上下民不安居主教者非将領之才所教者無旗鼓之法往來州縣怨歎嗷嗷既多是老弱小懦之人又無訓齊精練之術此有教兵之虚名而無訓兵之實效也諸州所造器械數不少矣工作之際已勞民力運輦般送又苦道路然而鐡刃不鋼筋膠不固長短小大多不中度葢造作之所但務充數而速了不計所用之不堪經歴官司又無檢責此有器械之虚名而無器械之實用也以草草之法教老怯之兵執鈍折不堪之器械百戰百敗理在不疑臨事而誤何可及乎故事無大小悉皆鹵莽此不責功實之弊也萬事不可盡言臣請直言其大者五事其一曰兵臣聞攻人以謀不以力用兵鬬智不鬭多前代用兵之人多者常敗少者常勝漢王尋等以百萬之師遇光武六千人而敗是多者敗而少者勝也苻堅以百萬之衆遇東晉二三人而敗是多者敗而少者勝也曹操三十萬青州兵敗于吕布退而歸許復以二萬人破袁紹十四五萬是用兵多則敗而少則勝之明驗也况於外國尤難以力爭只可以計取李靖破突厥於定㐮只用兵三千人其後破頡利於隂山亦不過萬人其它以五千人立功塞外者不可悉數蓋兵不在多能用計爾故善用兵者以少而為多不善用兵者雖多愈少臣謂方今添兵則耗國減兵則破敵今沿邊之兵不下七八十萬可謂多矣然訓練不精又有老弱虚數十人不當一人是七八十萬之兵不得七八萬人之用加之軍中統制支離分多為寡兵法所忌此所謂不善用兵者雖多而愈少故常戰而常敗臣願陛下赫然奮威飭勵諸将精加訓練去其老弱七八十萬中可得四五十萬古人用兵一以當百今既未能但能以一當十則五十萬數可當五百萬兵之用此所謂善用兵者以少而為多古人所以少而常勝者以此也今不思實效但務添多耗國耗民遷延月日賊雖不至天下已困矣此一事也其二曰将臣又聞古語曰将相無種故或出于卒伍或出于奴僕或出于盜賊唯能不次而用之乃為名将耳今國家求将之意雖切選将之路太狹今詔近臣舉将而限以資品則英豪之士在下位者不可得矣試将材者限以弓馬一夫之勇則智略萬人之敵皆遺之矣山林竒傑之士召而至者以其貧賤而薄之不過與一主簿借職使之怏怏而去則古之屠釣飯牛之傑皆激怒而失之矣以至無人可用則寧用癃鍾跛躃庸懦暗劣之人皆委之要地授以兵柄天下三尺童子皆為朝廷危之前日澶州之卒幾為國生事澶卒幾生事葢郭承祜在澶時此可見也議者不知取将之無術但云當今之無将臣願陛下革去舊弊奮然精求英豪之士不須限以下位知略之人不必試以弓馬山林之傑不必薄其貧賤唯陛下以非常之禮待人人臣亦将以非常之効報國又何患於無将哉此二事也三曰財用臣又聞善治病者必醫其受病之處善救弊者必塞其起弊之原今天下財用困乏其弊安在起於兵興而費大也昔漢武帝好窮兵用盡累世之財當時耀兵單于臺不過十八萬尚能困其國力况今日七八十萬連四年而不解所以罄天地之所生竭萬民之膏血而用不足也今雖有智者物不能增而計無所出矣唯有減冗卒之虚費練精兵而速戰功成兵罷自然足矣今兵有可減之理而無人敢當其事賊有速擊之便而無人敢奮其勇後時敗事徒耗國而耗民唯陛下以威權督責之乃有期耳此三事也其四曰禦戎之策臣又聞兵法曰上兵伐謀其次伐交北敵通好僅四十年不敢妄動今一旦發其狂謀者其意何在蓋見中國頻為元昊所敗故各啟其貪心伺隙而動爾今督勵諸将選兵秣馬疾入西界但能痛攻昊賊一陣則吾軍威大振而敵計沮矣此所謂上兵伐謀者也今論事者皆知西北欲併二國之力窺我河北陜西若使二敵並冦則難以力支今若我先擊敗一敵則敵勢减半不能獨舉此兵法所謂伐交者也元昊地狹賊兵不多向來攻我傳聞契丹常有助兵今若敵中自有點集之謀而元昊驟然被擊必求助於契丹契丹分兵助昊則可牽其南冦之力若不助昊則二國有隙自相疑貳此亦伐交之策也假令二國刻期分路來冦我能先期大舉則元昊倉皇自救不暇豈能與契丹相為表裏是破其素定之約乖其刻日之期此兵法所謂親而離之者亦伐交之策也昊賊叛逆以來幸而屢勝長有輕視諸将之心今又見朝廷北憂契丹方經營於河朔必謂我師不能西出今乗其驕怠正是疾驅急擊之時此兵法所謂出其不意者取勝之上策也前年西将有請出攻者當時賊氣方盛我兵未練朝廷尚許其出師况今元昊有可攻之勢此不可失之時彼方幸吾憂河北而不虞我能西征出其不意此可攻之勢也自四路分帥今已半年訓練恩信兵已可用故近日屢奏小㨗是我師漸振賊氣漸衂此可攻之勢也茍使此時而使二敵先來則吾無策矣臣願陛下不以臣言為狂宻詔四路之帥協議而行之此四事也其五曰可任之臣臣又聞語曰十室之邑必有忠信况今文武常選之官盈於朝廷遍於天下其間非無材智之人陛下揔治萬幾之大既不暇盡識其人固不能躬自進賢而退不肖執政大臣動循舊例又不敢進賢而退不肖審官吏部三班之職但掌文簿差除而已又不敢越次進賢而退不肖是上自天子下至有司無一人得進賢而退不肖所以賢愚混雜僥倖相容三載一遷更無精别平居無事常患太多而差除不行但臨事要人常曰無人使用自古任人之法無如今日之謬也今議者或謂以舉主轉官為進賢犯罪即黜為退不肖此不知其弊之深也大凡善惡之人各以類聚故好贓濫者各舉貪濁之人好財利者各舉誅求之人性庸懦者各舉不才之人守廉節者乃舉公幹之人朝廷不問是非但見舉主數足便與遷官則公幹者進矣貪濁者亦進矣誅求者亦進矣不才者亦進矣混淆如此便可為進賢之法乎方今黜責官吏豈有澄清紏按之法哉唯犯贓之人因民論訴者乃能黜之耳夫能舞弄文法而求財賄者亦强黠之吏政事必由已出故雖誅剥豪民尚或不及貧弱至於不才之人不能主事衆胥羣吏共為姦欺則民無貧富一時受弊以此而言則贓吏與不才之人為害等耳今贓吏因事自敗者十不去一二至於不才之人上下共知而不問寛縱容姦其弊如此便可為退不肖之法乎賢不肖既無别則宜乎設官雖多而無人可用也臣願陛下明賞罰責功實則才不才皆列於前矣臣故曰五者皆有然陛下不得而用者為有弊也三弊五事臣既詳言之矣唯陛下擇之天下之務不過此也方今天文變於上地理逆於下人心怨於内四陲攻於外事勢如此殆非遲疑寛緩之時唯陛下留意乙卯詔諸路轉運使副為按察之官其路分兵馬鈐轄並位其下提㸃刑獄朝臣許壓州鈐轄而與路分鈐轄以官叙之又詔自今應臣僚入見及謝辭如值假故不御前殿即依舊制並放外若事急速許令後殿見謝辭及放正衙並繫臨時特降朝㫖即不得輙自上章陳乞時權御史中丞賈昌朝言䕶國節度使兼侍中張耆赴河陽武勝軍節度使髙化赴相州乞免衙辭河陽節度使楊崇勳復平章事乞免衙謝兼聞上件官等並乞只於後殿見辭者按近制臣僚見謝辭並合在前殿仍詣正衙除假故外若事急速或許於後殿或免過正衙並繫臨時特㫖耆位為節制久去朝闕辭見不由前殿出入不詣正衙或扶以拜君或揖而受賜既稱衰疾且冒寵榮雖聖上眷待老臣特推異數猶宜避免以示恪恭豈可輙上奏封自求優便今國家外捍邊冦方任武臣所宜並示恩威不可専用姑息仍恐文武臣僚自此更輕慢朝廷之儀乃下是詔仍榜朝堂此據㑹要丙辰上謂宰相曰朝廷間遣中人出詗外事而近者臣僚反多奏辟甚無謂也宜令御史臺劾奏之又詔翰林醫官有勞者止遷本院官毋得換右職及别兼差遣丁巳詔比上書獻方略者率多市文於人或削取前後臣僚章奏以冀恩賞已詔無得更陳邊事如聞尚有詣闕者其令禁絶之戊午建大名府為北京徳音降河北諸州軍繫囚一等杖以下釋之嚴飭行宫増置倉厫營舎並給官錢毋得科率景祐中范仲淹知開封建議城洛陽以備急難及契丹将渝盟言事者請從仲淹之請吕夷簡謂敵畏壮侮怯遽城洛陽亡以示威必長敵勢景徳之役非乗輿濟河則敵未易服也宜建都大名示将親征以伐其謀詔既下仲淹又言此可張虚聲爾未足恃也城洛陽既弗及請速修京城議者多附仲淹議夷簡曰此囊瓦城郢計也使敵得渡河而固守京師天下殆矣故設備宜在河北卒建北京議者韙之仲淹疏曰河朔地平去邊千里契丹豪健晝夜兼馳不數十日可及澶州陛下乗輿一動千乗萬騎非數日可辦倉卒之間契丹已近欲進北京其可及乎此未可一也又承平已久人不知戰聞冦大至群情憂恐陛下又引憂恐之師進渉危地或有驚潰雖爪牙之臣誰能制之此未可二也又北京四面盡平絶無險扼之地儻乗輿安然到彼而契丹旁過直趨河南於澶淵四向乗凍而渡京師無備将何以支宗廟社稷宫禁府庫皇宗戚里之屬千官百辟之家六軍萬民血屬盡在無金城湯池可保無堅甲利兵可禦陛下行在河朔心在京師豈無回顧之大憂乎此未可三也假使大河未凍冦不得渡而直圍守澶淵聲言向闕以割地㑹盟為請當此之時京師無備敵騎俯逼陛下能謹守不動而拒其請乎唐明皇時禄山為亂舊将哥舒翰四十萬兵屯守潼關請不出戰且以困賊楊國忠促令討賊一戰大敗遂䧟長安今京師無備敵或南牧朝廷必促河北諸将出兵截戰萬一不勝則有天寳之患朝廷将安往乎昔煬帝盤游淮甸違逺關中唐祖據之隋室遂傾明皇出幸西蜀非肅宗立于朔方天下豈復為唐有徳宗欲幸益都李晟累表乞幸山南以係人心乃知朝廷萬邦之根本今陜西河北聚天下之重兵如京師揺動違逺重兵則姦雄奮飛禍亂四起臣聞天有九閽帝居九重是以王者法天設險以安萬國也易曰天險不可升地險山川丘陵王公設險以守其國正在今日矣臣請陛下速修東京髙城深池軍民百萬足以為九重之備乗輿不出則聖人坐鎮四海而無順動之勞鑾輿或出則大臣居守九重而無囘顧之憂矣彼或謀曰邊城堅牢不可卒攻京師坦平而可深犯我若修營京師使不可犯則伐彼之謀沮南牧之志矣冦入之淺則邊壘已堅冦入之深則都城已固彼請割地我可弗許也彼請决戰我可勿出也進不能為患退不能㤀歸然後困而撓之返則追之縱有鈔掠可邀可奪彼衰我振未必不大勝也此陛下保社稷安四海之全策矣或曰京城王者之居髙城深池恐失其體臣聞後唐末契丹以四十萬衆送石祖入朝而京城無備閔宗遂亾石晉時叛臣張彥澤引契丹犯闕而京城無備少主乃䧟此無備而亾何言其失體哉臣但憂國家之患而不暇顧其體也若以修營城隍為失體不猶愈於播遷之禍哉朝廷大臣百辟必曉此事但懼議者謂其失體而不敢言臣任在西陲非當清問而輙言北事誠罪人也然臣子之言豈敢忘君親之憂况臣素來愚拙惟知報國而不知其受謗者昔奉春君負販之夫勸髙祖都關中而張良賛之翌日命駕臣叨預近列而輙建言比之奉春之僣未甚為過至於西洛帝王之宅太祖營修蓋有意在子孫表裏山河接應東京之事勢連屬關陜之形勝又河陽據大川之險當河東之㑹要為西洛之北門又長安自古興王之都天下勝地皆願朝廷留意常委才謀重臣預為大備天下幸甚契丹既就盟仲淹復上疏曰後疏與前疏多同當考敵情飜覆自古非一以四十年恩信尚不能結之恐非有限之貨能足無厭之心此可大為之防盟誓不足恃也臣切觀朝廷未修東京而先修北都臣謂東京根本也北都枝葉也雖先朝曽有北都之行當時有宿将舊兵嘗經大敵然猶上下憂疑盤桓而進今太平已久人情易動又無宿将舊兵不可不過慮也臣見邊上将佐軍旅恥言不武爭先効命及其臨敵十無一勇臣恐駕前諸班武士矜誇膽勇有誤陛下昔漢樊噲對上曰臣願得十萬衆横行匈奴季布叱曰噲可斬也昔匈奴圍髙帝於平城漢兵三十二萬噲時為上将軍不能解圍今言以十萬人是面謾也今陛下自觀左右将軍有如樊噲者乎臣昨上言請修京城宜持重而不動者葢為此也若将廵幸北都臣謂有可慮之事者五願陛下思之臣三四年來聞人所傳契丹造舟安輪過陸可載過川可濟如南牧而來於滄徳之間先渡黄河取鄆濮而襲我京城陛下虚往北京而敵入東路此可慮之一也又宗廟社稷皇宗戚里千官百辟六軍萬民之家盡在京師而城池無備冦賊大至将何保守此可慮之二也若廵幸北京六軍盡出回顧京師億萬之中或姦凶竊發為亂陛下之心能安於外乎此可慮之三也假使鑾輿未出冦逼澶淵聲言向闕有割地之請既京師無備朝廷能拒其請乎此可慮之四也又敵騎之來必數十萬其河朔之兵當湏持重如京師無備畏彼深入必促重兵與之决戰萬一有哥舒之敗則社稷為憂此可慮之五也願陛下必修京城可禦大患况天子之城古有九重之號未聞以不嚴不固而為國體也能嚴且固則上自宗廟社稷下及百萬之衆可安堵矣陛下乗輿不煩順動矣雖冦入東路不得而襲矣彼如澶淵有割地之請可拒而可弗許矣彼來决戰可戒諸将持重而勿出矣彼知京師有備大軍持重則南牧之志不得而縱足以伐其謀矣而復銳則避之困則擾之夜則驚之去則躡之因其隙而圖焉皆須京師大固然後能行其策近代敵騎為京都之禍者數四矣不可不大為之防易曰王公設險以守其國此先聖之訓非臣之所能言也仲淹知有北京之役方請修京城非先請也龍川别志誤以仲淹為先請檢仲淹集所載劄子則别志誤可知夷簡本𫝊稱夷簡以城洛陽為子囊城郢之計亦誤也葢縁仲淹請修京城故云爾若洛陽則非郢類今略加刪潤使不相牴牾本𫝊又誤以囊瓦為子囊今亦改正識者韙之別志本語然仲淹憂深思逺其言要不可忽今具列于後是日崇慶公主薨追封楚國公主已未以知天雄軍程琳知大名府兼北京留守司恐此時琳即兼河北安撫使但實録不詳五年五月加大資政琳傳始云兼河北安撫使而實録亦殊不載六年二月因夏竦判大名制乃書河北安撫使當考庚申置京東兩路安撫使以知青州陳執中兼青淄濰等州安撫使知鄆州張觀兼鄆齊濮等州安撫使並兼提舉兵馬廵檢盜賊事時契丹雖通使而所徵兵始大集於幽州故河北京東益為守備也環慶都監左蔵庫副使王遇為供備庫使都廵檢使右騏驥副使范全為宫苑副使柔逺寨主内殿承制譚嘉震為供備庫副使權慶州都監西頭供奉官張繼勲為東頭供奉官閤門祗候賞大順城却敵之功也慶之西北馬鋪寨當後橋川口深在賊腹中范仲淹欲城之度賊必爭密遣子純祐與蕃将趙明先據其地引兵随其後諸将初不知所向行至柔逺始號令之版築畢具旬日城成是嵗三月也尋賜名大順賊覺以騎三萬來戰佯北仲淹戒勿追已而果有伏大順既城白豹金湯皆截然不敢動環慶自是冦益少按范仲淹奏議仲淹欲城大順以三月十三日往柔逺寨駐劄遣将密行占得寨地又仲淹集有三月二十七日自大順回見桃花詩四月三日奏乞以寨為城名曰大順今因行賞乃著其事大順城西谷寨有强人弓手天禧間募置蕃戍為廵徼斥候日給糧人賦田八十畝能自備馬者益賦四十畝遇防秋官給器甲下畨随軍訓練及是為指揮六此據本志附見癸亥新邠州觀察使范仲淹復為龍圗閣直學士左司郎中鄜州觀察使龐籍復為龍圗閣直學士吏部郎中並從所請也初仲淹上表言觀察使班待制下臣守邊數年羌人頗親愛臣呼臣為龍圗老子今改觀察使則與諸族首領名號相亂恐為賊所輕且無功不應更増厚禄辭甚切至表三上乃從之仲淹正傳云退而與王興朱觀為伍按范仲淹集所載表乃云居方榮劉興下葢此二人並為留後故也王興朱觀卒不為觀察使傳葢誤改今但從集表所載以西界偽侍中宻香為順徳軍節度使封順徳郡王賜姓名白守忠堪威為㑹州防禦使布達約噶為叙州防禦使仍並賜對衣金帶宻香管宥州兵馬龐籍使珪年族軍主阿克阿入西界伺事宻香言元昊以所掠縁邊人馬送契丹請助兵入漢界宜預為之備續遣人賫偽補文字求封既而堪威等亦求内附命雖下然其後俱不至堪威布逹約噶二人不知何官甲子召江南東路轉運使太常博士直集賢院楊察入為左正言知制誥察在部専以舉官為急務人或譏之察曰此按察職也茍摭拾羨餘則俗吏能之何必我哉又詔乾寧軍獨流寨釣臺寨滄州官鹽竈甜水渦並置烽堠乙丑罷左蔵庫月進錢千二百緡上語輔臣曰此周官所謂供王之好用者朕宫中無所費其斥以助縣官詔開封府界盜賊未捕獲者六百九十餘人其非傷殺變主及元謀之人聽百日歸業除其罪置信安軍兵馬都監監押各一貟丙寅御崇政殿閱諸軍轉貟凡三日真定府定州路都部署保靜節度使王徳用入朝奏事命為宣徽南院使判成徳軍未行改判定州兼三路都部署徙判定州楊崇勲判成徳軍崇勲老不任事故徙之徳用至定州日教士卒習戰頃之皆可用契丹使人來覘或請捕殺之徳用曰彼得其實以告是服人之兵不以戰也明日大閱于郊提桴鼓誓師進退坐作終日不戮一人乃下令具糗糧聽吾鼓聲視吾旗所鄉覘者歸吿敵中謂漢兵将大入既而復議和兵乃解時朝廷發兵屯定州幾六萬人皆寓居逆旅及民間闐塞城市未嘗有一人敢喧呼暴横者将校相戒曰吾軰各務斂士卒勿令擾我菩薩一旦倉中給軍糧軍士以所給米黑喧譁紛擾監官懼逃匿有四卒以米見徳用徳用曰汝從我當入倉視之乃往召専副問曰昨日我不令汝給二分黑米八分白米乎曰然然則汝何不先給白米後給黑米此軰見所得米腐黑以為所給盡如是故喧譁耳専副對曰然某之罪也徳用叱從者杖専副人二十又呼四卒謂曰黑米亦公家物不給與汝曹當棄之乎汝何敢乃爾讙譁四卒相顧曰向者不知有八分白米故耳某等死罪徳用又叱從者六人杖之二十召指揮使罵曰衙官汝何敢如此欲求决配乎指揮使百拜流汗乃舎之倉中肅然僚伍皆服其能處事此據司馬光記聞西上閤門使果州團練使髙陽關路鈐轄張亢權知瀛州兼本路部署司事夏守贇疾故也亢在髙陽每遣諜者輙厚與金帛無所吝亢間處便坐有弟子行首入曰願屏人白事亢慢罵久之其人曰所白機事也不肯去亢為屏人乃曰閤使使錢如糞土曰何故曰閤使所與非其人如我乃可與耳亢復罵久之曰我非與閤使劇我外生女子自小教歌舞甚妙麗為敵騎掠去今幸於敵主日夜居帳中将相皆事之今遣人有所市閤使善結之敵中情偽如指掌也亢曰所市何物曰某大王納女壻須紫竹鞭閤使所執可與也及餘所市物非一亢皆從之自是敵中動靜必吿時邊城多警每一掛撘費甚厚惟髙陽獨否弟子行首事據龍川別志滄州鈐轄㳂界河同都廵檢使及管勾河北屯田事洛苑使普州刺史入内押班楊懐敏為真定府定州路鈐轄兼保州廣信安肅軍縁邊都廵檢使依舊界河同都廵檢使及管勾屯田司事知順安軍劉宗言上書言屯田司濬塘水漂招賢鄉六千戸事下轉運使及屯田司懐敏挾勢卒窘宗言挾勢窘宗言據河渠志在此年今附見志載此事不詳當考邊臣畏懐敏多巧事之髙陽關鈐轄王果獨不屈數言水浸民田無益邊備懐敏怒訴果以不法左遷青州都監王果事據本𫝊附見果二月初除髙陽鈐轄不知何時責青州十一月乃自青州改永興又吴奎傳云奎為廣信軍判官宦者楊懐敏増廣北邊屯田至奪民穀地無敢與抗者奎上書論其不便知保州王果亦屢爭之懐敏使人訟果它事詔置獄推劾奎為力辨得免按果以慶歴二年二月自保州擢領賀州刺史兼髙陽關鈐轄與懐敏爭屯田事坐責當在髙陽關不在保州矣今止從果傳詔河北居民遇有邊警其蓄積許輦至城邑中欲居官舎寺院者亦聽之丁卯徙知成徳軍龍圖閣直學士兵部郎中張存為河北轉運使先是存上言契丹與元昊為㛰恐隂相首尾河北城久不治宜留意無忽於是悉城河北諸州俾存督察之詔管軍臣僚非乾元節及大禮不得非次陳乞親屬恩澤戊辰詔有司申明前後條約禁以銷金貼金縷金間金蹙金圈金剔金䧟金明金泥金楞金背金闌金盤金織金線金撚金為服飾自宫庭始民庻犯者必致之法庚午環慶招討司言西界偽團練使諾爾來降乞補班行詔除右班殿直此據朔歴九月癸卯馬都來降實録有之朔歴乃無疑即此事
