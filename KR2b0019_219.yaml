body:
  text: 續資治通鑑長編卷二百十五宋李燾撰神宗熙寧三年九月戊子朔中書言中書統治百官以佐天子政事而所置吏屬尚仍舊制謂宜髙選士人稍依先王設官置輔之意請置檢正中書五房公事一員每房各置檢正公事二員並以朝官充見宰相參知政事如常朝官禮檢正五房公事官位提㸃上諸房檢正與提㸃序官位堂後官上主書以下不許接坐非親屬寺觀職事相干不許出謁從之初上詔中書議創置士人名目接遇禮數并裁省中書吏員存者增其俸於是中書復請減不習事守當官五人主事二人録事三人與出職更不補額見留録事以下第增祿廪重其乞取之法又置簿書其功過而比之以為升降遇堂後官闕如本院有亷謹曉吏事者更不簡試選人皆從之上初議令執政不與坐以為今欲除一諌官且不能得人計中書置屬必不能得第一等人才不殺其禮即恐分權害事王安石曰中書屬官須精擇可以備諌官侍從者若殺其禮則自愛重者不肯為非自愛重者乃可憂其招權害事宰屬用士人自古堯舜以來如此前代聖人豈不熟計利害然至屏逺士人而專用曹史則止自姚元崇常衮始而二人後皆為曹史所纍此即前事之鑒也朱本以此段附壬子日新本因之事理似顛倒今移入此新舊紀並書中書置檢正官同判司農事吕惠卿言淳化中都下初置常平倉賤糴貴發至景德中差開封府浚儀知縣監倉事祥符六年始以兩縣常平倉併為在京常平其斛斗經二年即支充軍糧貿易新好充見在數其法實為利民而其後糴糶之政久不行文字本末隨亦廢墜今常平封樁米至五十二萬石但寄積在京倉界惟據逐界每月具見在數申寺而朝廷初無發斂之政甚可惜也欲乞遇價稍貴即出之賤即以其錢糴之如淳化中故事於是中書請以司農見樁管米指射新好者貿易仍與開封府界斛斗通融支用從之惠卿是日以父喪去位實録於八月十七日書光祿卿吕璹卒而司馬日記乃於九月一日記惠卿遭父喪蓋璹卒或在他處惠卿九月一日始聞之也今依日記附此當考璹果卒在何處惠卿家傳云云己附五月十七日已丑上謂王安石曰司馬光言方今是非淆亂因曰是非難眀誠亦為患安石曰以先王法言考之以事實驗之則是非亦不可誣且如司馬光言不當令薛向徙貴就賤用近易逺以先王法言考之則懋遷有無化居有何不可又言薛向必失陷官物以事實驗之向果失陷即光言為是向果無失陷而於官物更能蕃息即光言為非他皆倣此上曰司馬光云如李定不孝王安石乃欲庇護如蘇軾雖販鹽亦輕於李定不孝然定豈得為不孝乎安石曰且勿論李定孝與不孝陳薦言李定謝景溫言蘇軾均是令監司體量詣實不知有何偏異於是安石又言近世執政務進朋黨蔽塞人主排抑才士不可駕御者故今侍從有實材可用者極少而其相阿黨不修職事趣功實者則如一焉上患異論者不悛曰或引黨錮時事以況今如何安石曰人主昏亂宦官姦利暴橫士大夫汙穢朝廷故成黨錮之事今日何緣乃如黨錮時事陛下明智度越前世人主但剛健不足未能一道德以變風俗故異論紛紛不止若能力行不倦每事斷以義理則人情久自當變矣陛下觀今秋人情已與春時不類即可以知其漸變甚明上又言或以為西事恐大臣不為用安石曰法行則人人為用以天下人了天下事何至以無可用之人為患因引孟子瞽瞍殺人事曰先王制法雖天子之父犯人不得貸也此孟子所言堯舜所行非申韓之言也上曰武后能駕馭豪傑以法行而已安石曰今士大夫孰能如姚元崇宋璟狄仁傑者如此輩人尚可駕馭盡力況下此者乎此段並見九月二日日録朱本附八月六日非是今仍見九月二日兵部郎中楚建中知滄州建中先為京西轉運使時方用兵西方邊臣多薦建中者召對不稱㫖故有是命其後中書又擬建中為河北轉運使上難之王安石曰河北提㸃刑獄及轉運使三任者已皆嚴急建中平審參用為善上從之此據本傳及王安石日録除河北漕在九月戊申今并書庚寅祕書省正字唐坰為崇文院校書初坰上疏論秦二世制於趙髙乃失之弱非失之强也上然其言因問坰行如何欲留之京師王安石對以不聞坰有闕行遂命之七月癸已初賜出身十二月庚辰修敕式補故下溪州刺史彭仕羲子師晏知下溪州事師晏自祖儒猛世為下溪州刺史仕羲頗黠驁數侵盜省地邉民不安即辰州界石馬崖下喏溪置鋪據守嘉祐初雷簡夫竇舜卿數遣人招諭令歸侵地不聽以兵丁逐之暫去復來後才歸喏溪下眀溪一寨而止八年知州段繼文復遣指使曹振等以衆數千攻之不克至是仕羲為其子師綵所殺師綵自稱權發遣下溪州既殺其父知衆不附專為暴虐賊殺不辜虜其婦女奪諸州貢物其兄師晏結同巡檢彭仕選都指揮使周允榮等攻圍師綵殺之并誅其黨田忠財等三十餘人納誓表上其父平生鞍馬器械仍歸喏溪地因辰州以聞故命師晏襲州事且厚賜之而辰州又請移眀溪寨於通望連雲兩堡而别築堡於喏溪口北岸徙眀溪寨監押一員并通望連雲兩堡兵丁守之據其要害絶蠻人侵軼悉如其請此段實録並據㑹要但微有刪改耳㑹要載此于八月十五日初陳升之既與王安石忤安石數侵辱之升之不能堪稱疾卧家逾百日求解政事不許辛卯復求入見有㫖再拜而已仍令扶至殿門辛卯初四日也此據日記上批江淮發運使薛向熟知環慶城寨地形可召赴中書詢訪兼舊制發運副到闕不得出入理甚無謂其除之初權鹽鐡副使楊佐言故事江淮發運使嵗押米運赴闕許朝見上殿後許元自殿中丞為發運判官十年間至天章閣待制而言者以為僥求恩命遂令嵗部米運止得至國門封進文字自是發運使權益輕諸路多不禀從緣東南六路大計委寄甚重事干利害須合面陳詔自今到新城外實有要切事奏候朝㫖入見奏事畢即辭出城至是又弛此禁皇祐四年十一月治平二年九月可考元祐本云至是又弛此禁朱本改云上以為非罷之新本乃并兩本聫書誤矣今止用元祐本同判都水監張鞏言乞於黃河芟灘收地栽種修河榆栁上批速如所奏庶早寬陕西配卒之役先是王安石言臣伏見陛下宣諭中書以知制誥闕令勘㑹蔡延慶陳襄等資歷竊以陛下擢人置之髙位縱不能得忠良智能之士助興政理猶當得其無損如陳襄邪慝附下罔上隂合姦黨興訛造訕以亂時事陛下必己明知陛下每欲崇奬臣誠不知所謂今違道合衆妨功害能之臣不為不多矣陛下又進如襄者助之不知於時事為無損邪有損邪今春陛下除襄侍講又召試知制誥襄召試知制誥見四月癸未兼侍講見五月辛卯安石云今春不知何故當考襄辭命之語以為古之仕者不得志則可以之齊之楚之宋今天下一君不可以他之惟辭尊居卑為可故欲辭侍講知制誥而且在記注之官陛下以謂記注之官可比抱關擊柝之賤乎人臣辭官之禮可以出此言乎且襄止是附離富弼曽公亮茍求官職之人今日陛下德義朝廷政事何至使如襄者以任髙位為辱也其不識禮義敢為驁誕以疑惑聖聽取悅姦人如此若陛下徒以左右遊談之助多而擢用此乃流俗之所以勝而襄之計中也襄今春既有辭尊居卑之奏今秋必不敢遽復就職不逡巡而後受則偃蹇而終辭髙位者人主所以榮天下之材陛下乃彊以與亂時事之憸人而為其所拒以廣其流俗之妄譽而自令爵命為世所賤臣竊為陛下恥之臣已嘗略論襄之邪慝不宜重有所陳顧在廷之臣孰肯違流俗以助陛下消小人之道者乎是以復冒昧言之伏惟陛下詳酌是日安石留身上諭安石曰見所論陳襄文字甚善襄延慶直院皆未久所以且總未除外制安石曰良是宣力于外者或未被奬擢此皆無勞能若令度越即何以勸此天官也陛下代天叙官豈宜姑以豫人安石論襄據陸佃所編安石文字末稱九月日參知政事王安石劄子蓋三年九月也安石日録九月五日安石留身上曰見所論陳襄文字即此劄子也明年七月襄乃除知制誥癸已著作佐郎編修中書條例曽布為太子中允崇政殿說書王安石常欲置其黨一二人於經筵以防察奏對者吕惠卿既遭父喪安石未知腹心所託布巧黠善迎合安石悅之故以布代惠卿入侍經筵布資序甚淺人尤不服而布亦固辭卒罷之此段據司馬光日記罷說書在十四日四月六日編敕八月二十五日編例九月八日同判司農甲午詔陜西麟府五路緣邉州軍應文武官遷易官職及死喪所得支賜家在京者在京給初秦鳳副總管竇舜卿改環慶副總管賜緡錢千樞密院下慶州給而上批邉事方興並邉金帛尤宜愛惜令移給於永興軍因令有司以此類事推廣施行乃降是詔舜卿與韓縝議不協故徙之乙未工部侍郎參知政事韓絳為陜西路宣撫使度支員外郎直舍人院吕大防為宣撫判官先是絳奏以夏人寇慶州陜西用兵請出使王安石曰臣於邉事未嘗更歷宜往上亦欲用安石乃曰王安石未嘗行邉今可出使也絳以為朝廷方賴安石不宜往安石曰朝廷所賴獨韓絳爾上因論修民兵安石曰今有邉事乃可修之時况西賊亦不足憚以順討逆以衆攻寡以大敵小以陛下明審當十嵗孤兒則勝負之形己決又今彼舉動無算其可勝必矣然應之在勿擾而己臨事惶擾所措置不中事機即為邉將所窺又大計己定小有摧敗亦不足挂聖慮上乃言憲宗論髙霞㝢敗時事又言絳與安石宜無適莫內外相成其為朝廷所賴一也若絳去有不及事可同議之絳言有未盡事當以私書抵安石宜令安石在中書為表裏安石言臣不習邉事每謀議不敢果如慶州事若臣知誠不可破則不須令諸路紛然奔走也恐陳升之或在告則中書應接宜得習事之人謂宜留絳遣臣然上卒遣絳仍賜絳詔如有機事不可待奏報聽便宜施行二十四日詔可考太子中允監察御史裏行林旦判司農寺太子中允崇政殿說書曽布同判司農寺布尋奏改助役為免役吕惠卿大恨之布改免役惠卿大恨此據司馬光記所聞蘇衮之言本志司農言始議出錢助役今悉募充請改助役為免役制可本志附此於遣使促諸路役書下不得其月日因布判司農特書之本志書遣使促諸路役書則係之黜楊繪劉摯後黜繪摯乃四年七月十四日然本志叙事先後特未可信也四年十月一日頒役法更詳之蔣靜作吕惠卿家傳云州縣羌役之法久以為弊重役之家至有破産而僥幸者役或不及衙前承符散役之類色役非一其弊尤甚不可勝言於是朝廷置局詳定利害而以文字送制置條例司看詳司農實兼領之公以謂今欲除去宿弊使民樂從然所寬優者則鄉村朴蠢不能上達之氓所裁取者則仕宦并兼易致人言之豪户以至衙司縣官皆恐無以施誅求巧舞之姦新法之行尤所不便官吏既不能眀見法意抑又惑於言者之多築室道謀難以成就於是為牒具㭊所以措置施行之狀極於詳盡檄諸路監司使之如法推行卒罷差役法令當役人户以等第均出曰免役錢而一切募人充役隨本役輕重以錢給之其坊郭等第户及未成丁單丁女户寺觀品官之家舊無色役者皆以等第均出曰助役錢四年十月一日乃班募役法皇城使端州團練使知恩州李綬為樞密副都承㫖用士人自綬始己酉定接待儀範己亥命司勳員外郎權判大理寺崔台符崇政殿說書曽布殿中丞權發遣大理少卿朱溫其考試法官試法官自此始本志云詔祕閣考合格舉人取毋過五分今附此大理寺丞趙子幾同管勾開封府界常平等事欲記保甲事故出子幾初除或因事可見即須削去樞密都承㫖東上閣門使李評請鑄印及依中書檢正五房公事不許出謁並從之庚子左僕射兼門下侍郎平章事曽公亮為司空兼侍中河陽三城節度使集禧觀使仍五日一奉朝請公亮初薦王安石可大用及同執政知上方向安石隂助之而外若不與同者置條例司更張衆事一切聽之每遣其子孝寬與安石謀議至上前無所異於是上益專信任安石以其助已深德之故推尊公亮而沮抑韓琦御史至中書爭論青苗事公亮俯首不答安石厲聲與之往反由是言者亦以安石為專而公亮不預也蘇軾嘗從容責公亮不能救正朝廷公亮曰上與安石如一人此乃天也然安石猶以公亮不盡同己數加毁訾公亮雖屢乞致仕上輒留之公亮去亦弗勇安石黨友尤疾之上御集英殿冊進士午漏上移御需雲便坐延輔臣賜茶公亮陟降殿陛足跌仆於地上遽命左右掖起之明日以告病連乞致仕於是乃聽公亮罷相此據公亮本傳及司馬光日記王安石日録刪修本傳又云公亮深為子孫計隂助安石公亮既老安石力薦孝寬不數年擢執政案公亮初助安石未必專為子孫計及孝寬遽登樞府故世論即謂公亮始謀如此今削去四年三月九日議除公亮雍帥孝寬漕三月二十四日孝寬捕扇惑保甲者三月二十六日安石云孝寬可備侍從趙伯山中外舊事云王荆公取熙河甚力奏神祖以所費止三百萬他日有西帥登對上問之帥曰除內帑所賜外獨本路應副殆千萬上愕然令退具實數奏來出以示荆公荆公無語復納榻後久之乃怒色鄉語曰是臣偷了耶是臣謾了耶上甚不平㑹韓忠獻論條例司疏駮青苗事介甫家居上深有意罷去新法併荆公罷之曽魯公密遣令綽赴介甫介甫亦恐改法故出視事閲武衛指揮軍士千二百三十八人􅝑排軍陳詔提舉教閲崇儀使亓贇遷三資候帶御器械有闕與差左藏庫副使李希一等四人第減磨勘年教頭及􅝑排兵士二十八人各遷一級自贇而下仍賜帛有差辛丑樞密副使左諫議大夫馮京參知政事翰林學士右司郎中權三司使吳充為右諫議大夫樞密副使上初欲用充參知政事王安石曰充與臣有親嫌上以為無害安石曰充豈能忘形迹若論議之間顧形迹則害國事乃徙京而命充代之天章閣待制知定州李肅之權發遣三司使湖南轉運使張顒知鄂州權發遣户部判官范子竒權湖南轉運副使湖北轉運副使孔延之權開封府推官權發遣開封府推官孫圭為湖北轉運使上批聞顒母老罕出巡性亦好靜延之精力緩慢恐非監司之宜故以圭子竒易之子竒雍孫也太子中允崇政殿說書曽布改集賢校理罷說書從其請也初六日除中允說書二十五日檢正户房壬寅大宴集英殿甲辰出空名敕牒三十宣徽院頭子各一百告身未見數本多如此須别參考增入賜宣撫司於是王安石論宣頭告牒事以為當先定計有地有材然後可議招懷內附昨綏州倉卒之變可為戒也文彥博引慶厯中故事云或潜輸誠欵亦可受之安石曰潜輸誠欵則何以驗其真僞又若無實利及之則彼犯族滅之禍而輸誠欵何為也若以實利加之而彼非實情是則墮賊計中矣彥博曰與宣頭告身而己安石曰彼得宣頭告身而無實利若彼國主通知即我為無算不知則彼受宣頭告身者且憂族滅有族滅之憂而無實不知彼何故肯出此彥博曰慶厯中亦只如此安石曰若如慶厯中故事則其效不過如彼時而已陳升之又論鹽州可取安石以為須有定計一舉取之而寇不能復取則不害清野堅壁之本謀不然即兵連未有己時也彥博言昆夷玁狁自古有之安石曰古之治世守在四夷文王當商末故有昆夷宣王當周之衰故有玁狁彥博曰堯舜亦有蠻夷猾夏安石曰堯舜時蠻夷猾夏則使士師治之爾知鄆州滕甫知定州河北都轉運使劉庠知成德軍是日十七日甲辰此據御集詔執政官同詣韓絳第別絳絳以翌日西征也吕大防與絳建攻守二議其一止絶歲賜以所費金帛及汰去疲兵衣糧分給諸帥别募竒兵驍將伺其間擇利深入破蕩城寨招收部落如西賊大舉衆寡不敵則勿與交戰俟賊退兵散預約鄰路間道設伏邀其歸路其二嚴為守備賊至則堅壁清野退則出竒兵邀擊或乘虛攻略以為牽制速報鄰路出兵救援以解賊圍又言兵不精將不勇求以勝敵自古未有為今計莫若選募兵將盡其智力漢之名將多以良家子從軍晉馬隆出救涼州不用州郡舊兵於京師立標簡募自旦至日中得三千餘人深入轉戰千里之外遂能破敵立功此募兵之效也漢魯竒以偏將軍應募先登唐婁師德以御史應募為猛士此募將之效也及絳至陜西即募彊劫賊盜及亡命罪人為竒兵又分畨漢兵為七軍以知原州种古知環州种診環慶路都監任懷政知保安軍景思立知青澗城种諤知德順軍周永清秦鳳路都鈐轄向寶分領之大防言自來屯兵不分戰守置將不別能否一遇賊馬入境則帥臣往往自擁精兵不問堪戰與否好功者惟知生事而不顧方略偷安者惟務茍且而無節制今定差七將番漢軍馬以行擾擊牽制之䇿用兵之始諸帥尚循故態則必致悮事乞惟聽宣撫司統制則事歸一體矣又言諸帥臣偷安避事咸樂招懷而憚攻討此特未之思耳今朝廷已絶歲賜又斷和市此二者是絶賊之大命理須必爭我必先為之計以挫其謀且星居鳥散不能常聚㸃兵數千動須纍日敵之所短也建營列戍一二萬之衆旦夕可集者我之所長也分路置帥舉一路將兵除防守外不滿二萬者我之所短也率數十萬衆專向一路以多擊少者敵之所長也異時嘗以我之所短而抗敵之所長所以屢敗今七將並出伺其未集便行擾擊彼若聚兵擊我一處則六處牽制一處堅壁使敵防救不暇制敵之命無出於此然後招懷無所不可矣吕大防建議並據行狀詳録當求韓絳别𫝊及事迹參訂刪修乙已御崇政殿䇿賢良方正又䇿試武舉人詔曽公亮諸子依韓琦例推恩遂以比部員外郎孝寬為祕閣校理殿中丞孝宗右贊善大夫孝純並遷官崇文院校書唐坰編修三司令式及諸司庫務條例戊申御崇政殿試武舉人騎射遣殿中丞陳世修乘驛同京西淮南農田水利司官經度陳潁州八丈溝故迹以聞初世修言陳州項城縣界蔡河東岸有八丈溝故迹或斷或續迤邐東去由潁及夀綿亘三百五十餘里乞因其故道量加濬治完復大江次河射虎流龍百尺等處陂塘導水行溝中棊布灌溉俾數百里地復為稻田則其利百倍乃畫圖來上於是上諭世修言陳許間地勢止合作水田甚善又令早應副世修事王安石曰世修言引水事即可試但言八丈溝新河事宜俟一精於水事人同相度可也向時八丈溝止為鄧艾當時不賴蔡河漕運得并水東下故能大興水田其後蔡河分其水漕運水不可并故溝未可議今蔡河新修閘無所用水即水可并而溝可復古迹矣故有是命河渠志無此事上批三司使未到闕副使三人一人差出一人未到止有傅堯俞一人計省事遽可速選差官權遂詔天章閣待制李師中兼權發遣三司使己酉詔樞密都承㫖副都承㫖見樞密使副使如閣門使禮置治所添給直兵令樞密院條奏施行先是李評除承㫖文彥博不禮之詔史院檢討故事史院奏以止載班著職事不見接遇儀範故特有是詔八月己卯丙戌九月乙未詔轉對官所言有可行者特加甄奬此據司馬光日記庚戌司馬光登對乞許州及留臺上曰必得許州乎光曰臣安敢必但稍便鄉里即臣之幸也上曰西京如何光曰恐非才不能了若朝廷差遣又安敢辭因拜謝而退先命知河南府王陶知永興軍知鄧州吕誨知河南誨敕既出上收入禁中蓋將以河南授光也詔三司除在京合支用金帛外應西川四路上供金帛及四路賣度僧牒錢所變轉物並截留陜西轉運司令相度於永興或鳳翔府樁以備邉費候見數可兊折充將來起發往陜西銀絹之數又詔開封府四廂許留使臣兩員分左右廂管勾從韓維請也先是維奏近嵗罷逐廂使臣四員其浚渠救火已委都水監等外加檢驗抄劄打量檢定賊蹤及散貧民錢等勞冗事若令所置京官躬親慮有妨闕故有是詔辛亥詔陜西宣撫使至本路有吏民陳邉防攻守利害蕃夷情狀可採用者聽施行訖奏初八日詔可考樞密院言陜西諸路有投順蕃漢人户不以多少宜令接納厚加存恤審辨姦詐不令有復歸之計從之仍詔須耕種地土賑濟錢糧犒賞之物令宣撫使密戒諸路經度有備先具可以安存之地以聞河東路倣此鄜延走馬承受歐育言緣邉監押官髙即寨主却為監押所壓人情不能相下由是罕得和同乞自今選有心力武幹者充寨主不以官資並在監押之右從之天聖四年二月可考歐育已見八月一日壬子太白晝見陜西宣撫判官度支員外郎直舍人院吕大防兼檢正中書五房公事太子中允集賢校理曽布宣撫司書寫機密文字祕書郎集賢校理李清臣大理寺丞李承之並充檢正公事布户房清臣吏房承之刑房清臣承之仍並改太子中允布九月十四日除校理四年二月八日都檢正太常博士集賢校理孫洙同知諌院詔賢良方正等科太常博士通判蜀州吕陶升一任與堂除太廟齊郎張繪堂除判司主簿或尉前台州司户參軍孔文仲令流內銓告示發赴單州團練推官本任陶等皆中選而文仲䇿初在第三等手詔制科調字號卷詳觀其條對大抵意尚流俗而後是非又毁薄時政援正先王之經而輒失義理朝廷比設直言極諫之科以開擴聰眀來天下賢智之士者豈非謂能以天下之情告上者謂之直言人君有汚德惡政而能忘其卑髙之勢以道爭之謂之極諫者乎以此人之學識恐不足收録以惑天下之觀聽可再進呈而調字號乃文仲試卷也於是上讀文仲試卷至專任德上曰德刑不可偏然救世亦有時而偏用乂用三德是也王安石遂言周禮三典及伐管蔡并商人羣飲事上又讀至亨而後革安石曰革已日乃孚革然後亨若既亨則安用革耶安石因言今文章之士不難得有才智實識道理者至少上以為識道理者殆未見其人安石又論文仲以為如范百祿以非濮王事合考官取髙等爾於是馮京意助文仲上不聽故有是命是歲舉制科者五人文仲所對䇿指陳時病語最切直初考宋敏求蒲宗孟置第三等上覆考王圭陳睦置第四等詳定韓維從初考陶語亦稍直繪記誦該博錢協文稍工皆入第四等侯溥稱災異皆天數又用王安石洪範說云肅時雨若非時雨順之也德如時雨耳衆皆惡其阿諛而絀之維又奏協文平緩亦絀之安石見文仲䇿大惡之密啓於上御批絀文仲知通進銀臺司齊恢孫固屢封還御批維及陳薦孫永皆求對力言文仲不當絀維章凡五上略曰陛下無謂文仲一賤士耳絀之何傷臣恐賢俊由此解體忠良結舌阿諛茍合之人將窺隙而進為禍不細願改賜處分卒不聽文仲延之子陶及溥皆眉州人協眀逸從子也張繪不知何許人登科記以為成都人恐誤協以國子博士舉賢良不中除知尉氏縣此據本傳當考始維等爭言文仲不當絀時㑹安石奉祠上以手詔問之安石答詔曰陛下患韓維輩出死力爭文仲事臣固疑其如此文仲誣上不直以迎合考官不逞之意若不如聖詔施行而用考官等第奬擢則天下有識者必竊笑朝廷聽察之不眀而疏逺無知者謂陛下所為誠如文仲所言而比周不逞之人更自以為得計此臣不敢不奉行聖詔也今韓維欲出死力爭之若陛下姑息從之則人主之權坐為羣邪所奪流俗更相扇動後將無復可以施為今流俗之人務在朋黨因循而陛下每欲考功責實考功責實最害於朋黨因循則其欲撓陛下之權固宜如此陛下誠能深思熟計以靜重持之俟其太甚然後御之以典刑則小人知畏而俗亦當漸變矣其詳乞俟臣祠事罷入見奏論文仲竟坐絀林希野史孔文仲對制䇿悉及時事切直無所回避其語驚人初考官宋敏求蒲宗孟署三等上覆考官王圭陳睦畏避止署四等詳定官王存韓維定從初考故事推恩當得京官簽判有怒其斥已者自吕陶等皆推恩惟文仲特絀下流內銓遣還本任中外大驚既而召其弟武仲為直講辭不赴怒者益甚召其父延之為開封推官畏不敢來乞外郡得越州以鹽課最虧盧秉劾延之違背新法已移宣州特衝替按希所云武仲延之辭召事當考大理寺言麟府豐州及堡寨官吏不申舉修葺城櫓器甲及簡選兵馬等當違制失公罪詔知州皇城使嘉州防禦使王慶民等管勾軍馬司通判寨主監押凡四十人降官罰金有差已而樞密副使馮京言臣昨為本路經略使事無不總而因循茍簡不能提振以至上煩聖慮望蚤降絀使諸路帥臣明知朝廷重邉事雖一時無事罷去後冒取名位者猶必行法以厲偷墮不職之臣優詔釋其罪癸丑作東西府以居執政官此據新舊記當考詳四年九月二十六日府城翰林學士兼侍讀學士右諫議大夫知制誥史館修撰司馬光為端明殿學士兼翰林侍讀學士集賢殿修撰知永興軍先是上欲以河南授光王陶既有永興之命而薛向惡陶乃薦光于上以代陶陶為河南如故及光辭上諭光曰光辭在十月十九日今并書于此今委卿長安邉鄙動靜皆以聞光曰臣守長安安知邉鄙上曰先帝時王陶在長安夏敵犯大順賴陶得其實光曰陶耳目心力過人臣不敢知識外事上曰本路民間利病當以聞光曰謹奉詔光言青苗助役為陜西之患上曰助役惟行京東兩浙耳雇人充役越州已行矣詔環慶路近有陳亡義勇如本户尚有餘丁當刺者悉免之其闕數取他户有丁者刺填初陜西刺義勇户每三丁簡一丁六丁簡二丁九丁簡三丁雖多至三丁止至是恤戰死者故特免焉詔應武舉右侍禁康大同等三人各遷一官餘進士二十二人隨試等補奉職借職茶酒班殿侍三班借差差使仍並與三路緣邉差遣大同等試䇿藝中選故也司馬光日記熙寧三年十月初九日武舉除奉職九人借職七人差遣殿侍四人借職王褒遷右班殿直康大同遷奉職減三年磨勘者一人絀者一人傳義下吏者二人時人言武舉不合格推恩優於賢良方正入第三等者試法官合格者五人皆選人一人除詳斷官四人候有闕與差日記與實録所書有不同者附注當考詔陜西用兵之際全藉得人協力任使本路知州通判知縣縣令委轉運使體量能否以聞丙辰太常博士集賢校理趙卨檢正中書禮房公事尋詔中書以韓絳辭日欲委卨經營邉事令便抽赴闕恐乏人任使且留告敕候宣撫使回乃發付御集留卨差敕在十月一日今并書賜陜西轉運司內藏庫絹百萬以其半分四路封樁餘令貿易收糴緣邉軍儲涇原路安撫司言本路熟户蕃部闕食乞降度僧牒百上批賜五百道付陜西宣撫司易見錢糴穀賑接之詔自今妃嬪公主以下非有服親之壻並不得奏薦㑹要以為三年九月事今附此當考廢洺州曲周縣
