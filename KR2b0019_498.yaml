body:
  text: 續資治通鑑長編巻四百九十四宋李燾撰哲宗元符元年春正月庚戌朔不視朝壬子朝奉大夫周鼎為大理少卿朝奉郎新除權發遣河北轉運副使吕升卿加直秘閣寳文閣直學士知永興軍李南公知成都府九月乃移李清臣甲寅監察御史鄧棐兼殿中侍御史癸酉二十四日曽布云云三省言權工部侍郎郭知章奏頃任御史以言為職雖嘗建明河事然非同水官任責願罷所遷一官從之樞宻院言比令陸師閔以秦鳳兵偕熙河路鍾傳等自丹喇闗進築請令約期會涇原熈河秦鳳三路之師於天都暨平夏城一帶各據地形險要進築其城天都者須一千歩次八百歩至六百歩以旬日内工畢其一千歩者當議建州軍權以𨽻涇原路如兵數多而天都平夏屯聚有餘即復進據各要害之所以通接平夏俟畢選留涇原熙河兩路兵將戍守天都城及擇可任以城守者暨以次將吏以聞即罷三路兵其涇原宜修築九羊谷等處熙河秦鳳宜修築東楞摩暨齊訥納森丹喇闗等處合須城堡仍計度先城其處及以次各若何修築通接平西寨令兵勢附近緩急互為聲援仍令𫝊既受命即乘馹詣涇原會章楶講究軍行進築饋運芻粟戍守兵馬等事皆豫為計軍既行楶冝以故事帶經略等司職駐於近邊照應若楶暨師閔所不至處其三路兵將並聽𫝊節制詔章楶鍾𫝊等審見賊勢困敝所會三路兵力可保無虞即乘機會合出兵如前議若敵情未可舉動亦詳具利害畫一事状保明以聞上以闗中嵗饑深以和雇車乘勞民為念曽布等皆言此事果濟則邊事庶幾可了小擾固不免亦暫勞而永逸及民上意惻怛再與三省議降詔丁寜三帥及監司令雇脚乘價務加優厚仍聽借支諸司封樁錢許以除破即日頒下布又作書諭𫝊以但令官司經歴處不留滯阻節减尅得實惠及民則指三百萬緡為脚乘之費朝廷所不吝若殘敝民力不如詔㫖亦必痛行無恕也又言孫路奏金湯白豹據横山之麓環以良田千頃請皆建築城堡已可其奏而路復言定邊川恰伊克二處皆占横山美田萬頃請悉建城據賊必爭之地亦降㫖如機會可乘即先要切以次進築而路復言賊境威章巴實爾固多吹喇薩木羅等處皆宜進築其前議灰家觜等處請權停按路前後所上奏未審某處最據要害為邊防經乆之利其吹喇薩木多等處深在賊境如何設置斥堠經乆備禦可保無虞詔孫路所計度宜先要害相親道路通逹水草豐足食田可耕險固可守異時無煩朝廷餽餉緩急聲援可以相接即以便冝措置二月二十九日灰家觜畢工戊午新知成都府李清臣依舊知河南府豐稷依舊知應天府其新除告並令繳尚書省四年十二月三日改成都今復還其詳具初移成都日右諫議大夫安惇權國子祭酒朝奉大夫李執柔為職方員外郎三省言知樞宻院事曽布近以恩例陳乞李邈監潤州酒吏部用元祐條不行若用熈寜元豐條例即無違礙詔今依熈寜元豐條例舊録云復先帝陳乞法也先是青州有縣令以書抵蔡卞云或傳龔夬諫䟽云上外信姦囘内耽女寵其言多訕時政卞以示章惇惇遂白上委知青州吕嘉問究之嘉問究見偽為史書者干連五十餘人遂下嘉問推劾此據曽布日録乃去年十二月十五日事於是中書舍人沈銖言青州制勘院奏劾得單立所傳文字係胡潔己將江南潘佑上李煜表改作龔夬姓名毁謗指斥乞委本路監司審察詔京東轉運副使王瑜録問御史中丞邢恕言臣聞胡潔己公案已上聴探得之不知其詳然臣愚意以謂若事渉大逆不順或指斥情理切害自有國法臣子所當共棄若雖渉指斥而情理不至切害或止於謗訕之類則螻蟻微物不足以汙斧鉞欲望睿慈稍從寛貸適足以増光聖徳慰安人情又言前日張天恱處死既是刑餘無頼之人又其言上斥神宗皇帝誅之固宜天恱死在四年閏二月今胡潔已縁係命官若其言不如天恱之甚即乞聖慈斟酌行遣臣更不敢宣漏恕時與章惇已睽意惇必引天恱為例故有此言然潔己獄後亦莫知如何結竟云單立何人王瑜四年正月二十二日除京東運副劉昱王䝉坐薦潔己五月十九日各罰金當并入此詔令張詢候鍾𫝊等出界即帶本路經畧安撫都搃管司公事赴平西寨以来權駐劄就便照會應副先是上諭樞宻院鍾𫝊當推恩須便與正差遣又曰張詢非帥才人人皆言其不可為帥兼一路兩帥殊未安曽布與林希皆曰誠如聖諭退見章惇惇猶欲主詢為帥布笑而已布初欲除傳為副帥衆議以為未安布曰上意亦欲與正帥名惇遂已及進呈欲除𫝊待制上未允布欲與更遷一官亦不從布曰當與服色上從之布録此叚在戊午日今附見十七日𫝊正帥名庚申朝獻景靈宫至於辛酉知齊州吕公雅提㸃江南東路刑獄去年十月五日可考癸亥幸凝祥池中太一宫集禧觀醴泉觀還鄉宣徳門召從臣觀燈乙丑吕惠卿奏遣副總管王愍出界討擊自丙辰與西賊血戰丁巳歸賊来追又與之戰獲首領以下千三百級所部萬三千人將官石福陣亡賀文宻重傷使臣戰没者三人士卒十餘軰詔賜惠卿以下銀合茶藥有差實録丙寅日宻院言王愍等統兵出界討擊斬獲千餘級詔賜惠卿以下銀合茶藥有差今用曽布所録别修仍以丙寅所賜就乙丑日書之吕惠卿家傳五年正月結惠卿復遣王愍䕶諸將自寨門出七日至逹克鄂對凌鄂裕合兩州監軍迎戰愍督諸將擊之自寅至未大破賊衆追奔十餘里斬首千餘級焚族帳積聚収其衣甲器械八日旋師賊以鐵騎萬餘来迎至十里井愍令軍中舍弓弩以短兵衝擊復破之斬其四州戴金環大首領已下三百餘級全師而歸惠卿乘敵衆駭散士氣騰寨其勇之際又進築米脂開先臨夏納木囊博囉特凡五堡防城之具自器甲笓籬至於油炭燈草其板築什物自鍬杵布袋至於觀檐洒子其合用物料自樓櫓材植至於釘線麻檮莫不畢備而往與平𦍑等凡九城寨皆在大里河川長城嶺以来並據横山膏腴要害之地自東徂西氣勢絡繹邊而取直不復如昔時與生界犬牙相参矣惠卿慮執政之見憾者又將兵功因取前後所降朝㫖條上之且乞留中曰臣先凖樞宻院劄子奉聖㫖令臣體問相視米脂細浮圖聲塔平石堡寨門黒水至大里河長城以来選擇地利從長進築臣計本路横山膏腴要害之地無過此數處而其逺不過大里河長城嶺以來若不委自本路從長擇利進築一一奏候指揮往還旬日必至有失機會則上件朝㫖已得詳盡而故安逺寨發兵興工已得指揮差保甲般運而忽降朝㫖放𣪚臣深以為疑續見敵人有機會可乘而細浮圖聲塔平正在六里河之内既有許從長擇利進築指揮臣逐一面奏知計置進築畢工別無闕誤自後又凖三次朝㫖今後進築先相度利害聞奏候得朝㫖方計置人功物料乗機會興功前後更有似此指揮不一各有相妨臣皆未知所遵依尋具劄子申明凖樞宻院直批若踏逐到進築處與新建城寨形勢相接自合乘伺機便進築臣以本路兵將所破宥州及夏州東日宻壘賊衆驚潰臣遂進築盡依累降朝㫖正在長城嶺已来與新建城寨氣勢相接合乘機便進築復凖樞宻院劄子所有其餘經營去處如委係合要固䕶籬落須至進築亦未得興工仰先具的確利害奏候朝㫖臣尋具羅宻克開公等處合修築利害聞奏自後未䝉降到許令進築指揮將謂朝廷已不令本路進築至今年正月内朝㫖下諸路遇有進築城寨如合要和雇脚乘搬運粮草材植等其所支雇直務從優厚亦降付本路臣方知朝㫖却許進築遂具米脂合行修復聞奏其餘納木囊博囉特係新寨氣勢相接及補䕶籬落要害之地難合進築縁有礙去年九月奏聼朝㫖方得興工之文臣若一一論列乞行改正方敢興功不唯於中外之勢不便兼往還旬月過此春夏之交天氣將暑六七月間賊馬漸肥難為興工臣遂乘此困弊未能大集之際除米脂用六將人馬修築外開光只用第二第四兩將臨夏更添第六將共三將納木囊用第三第七第五將博囉特更添第六將兵四將皆已畢工所有博子椽散子木橛子要子之類多就生界採買其役兵並用防托馬軍相兼仍諭以朝廷犒設喝賜雇直優厚之恩并邊境急難當及時興舉之意以此人人勸勉有至一工為一工半或兩工者每寨不過五六日而成既用將分不多及修築日數少以此比之諸路所費及合得酬奬極有減省而將吏日夜暴露實為勞苦竊慮政府以本路有違奏候朝㫖之文及見其成就之速以為甚易將来推恩轉更鐫削無以為勸伏望聖慈候功状到日特賜指揮依諸路及本路前後進築酬奬例施行今以惠卿此奏係五月二十二日米脂賞功後丙寅寳文閣待制知青州吕嘉問知永興軍禮部言永興軍咸陽縣民叚義􅓯地得古玉印記望委官講求典故詔禮部御史臺學士院祕書省太常寺官講求定驗以聞戊辰布希云恐非秦寳三月十六日議詔鍾𫝊統兵出寨討蕩斬首四千級已降指揮賜銀合茶藥外有陸師閔張詢係同措置應副差發兵將并提刑陳敦夫敦夫除秦鳳提刑在紹聖四年二月曽布日録正月辛未云敦夫卒曽随軍入界應副糧草各等第賜銀合茶藥又詔承議郎直龍圖閣熙河蘭岷路經畧判官鍾𫝊特除集賢殿修撰賜金紫差權發遣熙河蘭岷路經畧安撫都總管司公事兼知熈州其將佐等功状依已降指揮疾速保明聞奏四年十二月二十二日今年正月五日九日鍾傅此接奏即是白草原詐冐首級處𫝊本𫝊云直龍圖閣經略安撫判官又城平西寨於安西城之西北以白草原㨗加集撰知熈州鄭居中作傅神道碑云作金城闗以功遷承議郎直龍圖閣熙河經畧安撫判官秩視轉運副使七月又城平西寨於安西城之西北十二月出剉子山討白草原俘馘四千遣幕官董采詣闕詣合涇原帥趍天都山鼐摩會置州與寨自馳赴章楶議云云丁卯工部言今年黄河埽岸并諸河合用春夫除年例人數外少三萬六千五百人乞給度牒八百二十一道充雇夫數從之樞宻院言近令鍾傳親詣涇原與章楶同共會合熙河秦鳳涇原三路兵馬同陸師閔統領出寨進築今鍾傳已除知熈州慮兩路帥臣難以俱出寨外及已令鍾𫝊與章楶議定一面從長施行有詔陸師閔待鍾𫝊等出寨有期即統本路之師會於熙河路平西寨仍量留本路以次兵騎駐於平西䕶兩路官徼毋過五千人餘悉以付鍾𫝊部分出寨既城天都如可分兵遂城齊訥納森諸壘即傳檄以報師閔詔平西所留兵騎悉以濟師俟𫝊出寨即以張詢權代𫝊守熈州若詢當往来近邊督䕶軍事即以次官暫守熙河餘如前詔正月初五日九月十七日辛未三班奉職看班祇候劉安民為閤門祇候三省言吏部侍郎左遷諸縣簿尉相兼處請不注流外人紹聖四年九月辛酉程嗣恭云云可考又言成都府轉運使陳察乞監司嵗舉明審端恕善治獄者充録事参軍詔令吏部立選法聞奏刑部言應押綱小使臣差使借差殿侍大將軍將犯笞杖罪批上行程至卸納處排岸司㸃檢在京送尚書本部在外就近轉運或發遣輦運撥發司施行犯徒以下罪者事發州推勘從之壬申陜西路轉運判官孫賁提㸃永興軍等路刑獄提㸃永興軍等路刑獄劉何移秦鳳路先是曽布獨奏事因言聞林希近留身以不為言者所恱深不自安上曰邢恕不相得云元豐末因除起居舍人遂相失布曰然臣當時見恕深毁希臣與希雖親戚然當時與之迹不熟希却不曽於臣前毁恕上曰希亦毁恕云恕曽有文字云太母臨政天下晏然如此是詆訾先朝明矣布曰當時鮮有無此語者上曰亦是羅織也布曰近日程頥編管恕以為謀出於希盖謂恕本頥門人冀其来救因以傾之上曰此是衆論非獨出於希然希亦曽云編管却不妨布曰恕乃頥門人固不可掩有程頥明道先生傳後題門人邢恕曰門人朱光庭曰有刋印文字上曰不曽見希亦曽納恕文字来又云林旦在元祐中有詆毁先朝文字獨不曽行遣以希故也布曰旦章疏在三省臣所不見在宻院者止是乞不棄地文字亦曽進呈兼臣在史院見蔡卞云有文字擊鄧綰云事王安石至薦其心病子雱舍居壻蔡卞卞失色云乃以此見目此亦是及先朝事然其所陳乃與先帝所批論事薦人不循分守之語無異但語侵卞太惡卞亦不得不怨蔡氏兄弟與希相失亦以此也上曰林希不自安布曰近陜西轉運判官李譓曽與安惇同日上殿譓是日赴吳居厚會吕升卿在坐譓於坐中倡云今日諫官有文字擊執政親見其語及盖謂安惇攻林希也希召升卿質之不虚上曰安惇未嘗有文字兼素無一言及希布曰臣固怪安惇攻執政廼先以示人上曰攻執政豈可與人說布曰臣固知其妄但不知惇果曽及希否今徳音以為無則譓之誕妄明矣然譓如此豈可令在軍前此與臣言章楶強横豈可與共事又言鍾𫝊誕妄若令在軍中必不免造作語言交通言路恐邊臣不安無以集大事譓實有才幹本司事不少若只令在長安本司却令巴宜往軍前乃便上然之先是朝㫖令轉運判官巴宜在長安本司李譓管勾涇原軍湏故也上又云升卿不佳且令在河北邢恕亦曽有文字云升卿乃小人之傑布曰臣不知上又曰林希黨吕公著布曰不然希詆罵公著有過當者上曰是黨王珪近朝廷貶珪希亦不樂布曰希逰珪門下此衆所知元豐中固得罪士論然今日亦不見其不樂之迹兼希自秉政以来持心議論無不向正實孜孜有體國愛君之心在政府未有過失凡此更望垂意審察上頷之而已上又曰希與章惇相得布曰誠如聖諭然希禆補章惇亦不少布又曰陜西闕漕臣劉何今為永興憲可徙秦鳳令專管涇原軍須孫賁却可代劉何改永興憲仍令張詢及巴冝同管熙河秦鳳軍湏則漕臣更不須添差上皆從之布録二月丁亥李譓復留當考壬申詔章楶俟軍興即以經略安撫都總管司職事駐平夏城應援諸軍如當赴軍前亦以便冝從事若楶暨鍾𫝊俱在軍前即令楶節制𫝊副之楶留平夏城照援其軍前並聽𫝊節制即有斬獲傳受級楶覆之若分兵將佐各受所統節制餘如前詔樞宻院言正月甲寅詔㫖約束已下涇原熙河秦鳳三帥縁朝廷在逺敵情機會道里逺近事力多寡難以料度責在帥臣毋致誤事詔章楶鍾𫝊軍興以便宜擇利計度先後措功癸酉宣徳郎鄒餘為監察御史從中丞邢恕所薦也恕薦餘具去年十二月丁卯先是曽布言近舉御史者甚衆臣嘗極陳言路不可不審擇今外議目蔡蹈為宗人上曰何謂布曰謂與蔡卞同姓故上哂之又言蹈雖有此名然衆人猶以為稍知義理如鄧棐者不復知義理亷恥唯知附麗而已此人决不可在言路以至近臣所薦如劉弇葉承方希顔鄧洵仁之徒皆是執政門下人不可用上曰近召見者皆尋常却是鄒餘者頗惺惺布曰臣與餘亦鄉人然不識踈逺之人未必不可用兼出自聖意亦勝於執政所欲用者如近日除從官多出聖斷外議翕然上曰踈逺之人往往可取後三日遂有此命布録在辛未日二月二日方希顔以考城知縣除湖北提舉二月十四日葉成為正字十二月十七日劉弇為正字皇城使榮州防禦使熙河蘭岷路都監知河州兼管勾洮西沿邊安撫司公事兼第三將王贍候今任滿日令再任贍遷遥防在紹聖四年四月右監門衛大將軍惠州刺史令蓍毆城西廂使臣賈若谷并傷其弟犯在赦前合原詔特降一官前知應天府趙君錫等將公使庫寄納官錢借使詔君錫以少府少監分司南京亳州居住趙子洙等一十一人各罰銅十斤刑部言告捕強盗應給賞轉資而官司無故留難者杖一百同强盗例給賞轉資者凖此餘賞减二等從之新無紹聖四年七月二十一日陳敦夫申請已得㫖依今再出樞宻院言已令鍾𫝊出塞日熈州公事交割與轉運使張詢慮有本路城寨及軍馬公事及緩急合處置事宜若赴軍前申禀易致留滯誤事詔令張詢候𫝊出界並一面施行訖報傳照會其涇原路章楶起離渭州即州事交割與秦鳳提㸃刑獄劉何仰何並依張詢指揮施行甲戌幸瑞聖園觀新城北郊齋宫故事郊宫悉設以幕帟費不貲又風雨不除上命繕營不日而成時章惇以為齋宫金碧相照非所以事天地也上曰三嵗一郊次舍之費縑帛三十餘萬萬又倍之易以屋宇一勞永逸所省多矣且齋明以事天地而為浮侈朕豈不知之宫近在城外耳目所接何嘗有此於是臨幸引惇遍視上曰有金碧之飾乎惇惶恐謝去年七月十八日曽布云云十二月末蔡蹈云云丙子曽布再對言前日北郊特恩宣召獲與榮觀上笑曰殿宇亦别無華飾布曰止是新潔爾上又曰外議云使了多少金箔皆妄傳未嘗施金碧兼所見簾幕下便是寝閣更有一登成殿在東爾曽布日録元符三年二月辛酉上嘗諭布曰禁中修造華飾太過墻宇梁柱塗金翠色一如首餙又作玉虚華麗尤甚又云仁宗作一寳座議者以為華麗遂致之相國寺今非其比外人何以知鄒浩亦嘗論列布曰禁中地窄玉虚誠不須作其他亦多不知但布曽從駕至北郊宣入賜茶次日大行諭云昨日盡見北郊宫殿只是彩繪些比他處精好外面人言使了多少金也上云不然賜茶處是寝殿前殿後有流盃曲水及亭榭無非金翠亦與首飾一般鄒浩敢言無所不論須召還布但再三稱賛周煇清波别志元符初後苑修造所言内中殿宇修造用金箔一十六餘萬片祐陵日用金箔以飾土木糜壞不可復收甚無謂也其請支金箔内臣令内侍省按治又一日與輔臣語及放生云天地大徳曰生後苑故事有釣魚荷包㑹比令罷之且云平生未嘗蛤蠏之属且因書印板放生文近士大夫漸知以殺生為戒當嗣服之初崇儉好生見于日用者如此爾後有以豐亨豫大之說蠱蕩上意及命臣璫五軰分地辰治宫禁土木華侈縻費金寳何可數計其暴殄天物亦豈蛤蠏之比祐陵天縱游藝素精測驗常置乙巳占在側日占天象以自儆戒晚年謂近習曰我運行極不佳且覩時事之變竟不克自反姦臣蔽䝉之罪可勝誅哉乙亥詔有官人許入太學充監生於二百人額内不得過四十人丙子皇太后姪内殿崇班向子簡為閤門祇候差勾當右騏驥院左司諫陳次升言乞初改官人除縁邊有急難外餘不得奏辟從之其已差李積中令吏部改正江淮荆浙等路發運司言諸州起發上供錢如無應選募官管押上京即差押綱使臣差使借差殿侍大將軍將管押附帶至真揚泗州寄卸委發運使勾收團併選綱装發其真揚泗州至京地里合支路費錢數與所起錢一處起發前来給與合装錢綱如違本處干繫官吏杖一百仍許發運司常切㸃檢從之新無合削丁丑詔門下中書後省左右司將已編類到臣僚章䟽并續編類者修冩進入仍納三省戊寅刑部言檢舉劉賡等元犯定奪施行買夷人例物増改則例事與范純禮等各降一官該九月赦合叙元官詔劉賡叙朝議大夫范純禮叙左朝議大夫祝庶叙朝奉郎許大希叙朝請郎崔直躬叙通直郎詔皇城使濮州刺史環慶路鈐轄張整為威州刺史龍神衛四廂都指揮先是涇原乞差近上兵官曽布為上言無人可差涇原熙河皆欲得王恩為總管恩少壮可驅䇿兼頗得邊人情置之於此可惜張整軍政嚴明可以管軍但恐以衰病若召之一見陛下自視其人才可進則進不可則却令歸本任似無所害上然之遂召整既對論軍政及職事極有條理上甚恱翌日諭二府曰整殊不類武人語言皆有條理當時豐稷韓忠彦皆拒而不受何也整先除鎮定鈐轄二帥皆以為嚴酷失軍情不納布曰臣不敢過稱道之然其軍政嚴明實有過人者奏對果稱㫖然管軍須三省同除上曰不湏待裏面指揮即日批付二府除四廂二月五日王恩除涇原副總管布因言上煩收攬威柄侍從臺諫多出中批或面諭至整亦欲從中批出三省無復差除右史闕已數月矣朝散郎知潤州王悆言吕城聞常切車水入澳灌注閘身應副官私舟船行運遇舟船擁併人力不給許於到閘船牽駕兵士内量差二分併力車水即未應水則而輙開者許人告監官杖一百不以失减令佐失覺察杖六十若監官任内通及三次展一任監當滿運水委無走泄陞一年名次令佐陞半年委知通監司常切覺察從之新無合削己卯詔醫官卓順之李士爽醫治懿康公主四公主有勞特各轉一官吏部言近差鮑朝賔替提舉兩浙路常平等事替張康國成資闕所有降付張康國敕一道為逓舖兵士亡失若依元祐即未被受間亡失毁棄者自當别給若依元豐式令即當召保給公據詔令吏部出給公據今後並依元豐令二月庚辰朔朝請大夫直龍圖閣權知桂州胡宗囬為寳文閣待制再任三省言殿中侍御史陳次升新權知永州鮑朝賔言乞檢詳敕條差官按察監司詔左司貟外郎孫把察訪河北路户部貟外郎孫傑淮南路十五日傑兼两浙章惇言前日得㫖遣使察訪陜西賑䘏飢饉比聞闗中流冗漸復業物價减兼已令提舉司賑濟今遣使恐妨邊事因言曽布亦云不便布言初不知遣使之議比方聞之實於邊事有害縁察訪之出監司無不從行今監司皆分定路分應副邊事一日不可離若欲遣使即須罷邊事若欲作邊事則使未可遣盖二者正相妨也蔡卞曰只消降一指揮令監司不湏随從布曰此尤不可察訪按察監司職事監司豈可不從行雖令不從豈能安心應副邊計上曰如此是不得遣使昨来何以立法盖三省曽立法云三年一遣郎官御史察訪監司等不職也布曰立法亦非朝廷遣使察訪諸路何湏立法先朝嘗遣使諸路或了當役書或因幹邊事或因災傷皆有為而遣未嘗三年一命使兼先帝在位二十年所遣使亦有數未嘗諸路皆遣也上又曰監司不職如何却不得遣使按察布曰非不得遣但適與邊事相妨爾若他路欲遣使無不可也惇又曰陛下以賑濟為憂當深責監司却遣左右親信中人往察視不妨上黙然布曰此事臣不當與然邉事臣實任責既於邊事有害臣不敢不言遂定議止遣使河北淮南先是惇語布以已得㫖遣使陜西布固以為不可殿廬中又及之卞獨以為不然已乃正色云此事不出自他人乃上意布曰此所不知但論事理耳再對布又陳適論遣使事臣心無他但以害邊事不敢不陳上曰卿言湏罷邊事莫過當布曰臣不過當二者實不可並行陛下欲遣使於他處無不可上曰只為陜西災傷故欲遣人賑濟布曰陛下自邊事以来每以憂民力為念今此又以災傷欲遣使賑恤此人主甚盛徳之事臣等所當將順但適與邊事相妨爾臣與職事不敢雷同望更賜審察上亦然之布退見三省云上留意闗中饑饉如此公等於賑濟之術不可不留意督責監司使推行惠澤以稱上意以邊事罷遣事乃不得已政荒何可忽也况上留意若是乎鄜延路經略使吕惠卿言請修復米脂舊寨及踏逐納木囊山博羅特觜可築堡寨詔惠卿如米脂寨可復即依累降指揮施行其餘合修䕶耕堡子與未合修即随宜相度條築措置仍具事状聞奏正月十六日附注惠卿家傳當考五月四日納木囊山十三日博羅特觜畢工朝奉郎權開封府推官王詔言差充興龍節伴送遼國人使欲乞依接伴到闕例只於瑞聖園門設閤子令送伴使副伺候相見如允乞下有司著為令從之仍令詳定編修國信條例所於儀内修入舊本特詳今從新本河北屯田司言今後屯田務兵士犯罪並依重役軍人法施行從之新無可削陜西制置觧鹽司言永興軍渭河北髙陽櫟陽涇等三縣依同華等六州軍官自賣鹽應干合行事件並依同華等六州軍賣鹽已得朝㫖施行從之新無可削辛巳權吏部尚書邢恕言乞八路知州通判貟闕除廣南東西路并其他路有煙瘴及邊界蠻夷合得酬奬處依舊外餘並收還本部注擬從之六月四日吏部言當考新權提舉廣南西路常平等事盧君佐言京東河北有山林陂澤盗賊結集乞置籍以記浮民詔户部立法以聞陜西轉運使張詢言凖朝㫖令應副熙河等路邊事自来進築入役兵夫等多有和雇錢米有廂軍遞舖之類乞口食外比修城兵夫雇錢减半支給兼本司所管差押搬運錢粮官貟亦部押出界往囘摺運兼車乘數多極為勞苦體訪得官貟使臣以所得酬奬與部役功賞不同人多避逸乞本司所差官不許他司别有差使仍候事畢等第推恩詔涇原熙河秦鳳路進築處並依此新無吏部言官貟任滿酬奨應保奏者自得替日本州限一月取會勘當全備申監司本司限十日保明聞奏内有縁故應展限申奏即具事因與展限不得過元限仍報尚書吏部㸃檢催促從之新無可削此月十二日吏部言可考壬午三省言新授瀛州防禦推官知晉州冀氏縣尚洙状凖尚書省劄子令發来赴闕今已到闕詔三省于都堂召問先是蔡確母明氏言梁燾嘗與懷州致仕官朝散郎李洵言朝廷若存蔡確則於徐邸安得稳便洵憤疾之具以告邢恕及洙詔令恕詳具以聞仍召問洙及洵洵辭疾不至詔洵限指揮到日畫時供析詣實仍結罪委無漏落實封奏初四日事後十三日三省言據洵奏與洙所供析大意不殊惟小有差互再審洙亦無異辭慮洵以嵗月乆記憶未真詔以二状令洵審記因依及有無往復語言奏三月十七日事洵尋以憂死確母牒訴不已恕實教之云尚洙李洵事實録先於紹聖四年八月十六日略見之元符元年三月初三日初四日十三日凡三次備載語意重復今并入初三日惟紹聖四年八月十六日并元符元年五月四日仍依實録存其首尾按王巖叟集有奏乞李洵落致仕云洵安恬以潔端愿而文守義不囘得古人之操飬心寡欲有髙士之風退休已及七年而今年未踰六十閉門窮經愈乆彌厲若如巖叟所薦則洵安肯與邢恕共為誣謗實録云洵忿梁燾言故以告恕及尚洙恐是明氏増節之辭洵辭疾不至又以憂死亦可見其情状也邵伯温云嘗見王棫尚洙李洵於邢恕所皆妄人也棫則固然矣洙未可知洵更當考御史鄧棐言唐義問棄渠陽事三省樞宻院同進呈謂義問貶已累年棐獻謟不已遂批進呈訖布録壬午日事户部言州縣遇有災傷差官檢放乞自住受状至出榜共不得過四十日從之仍於紹聖元年十月二十日條内限三日内差定檢官作當日新無詔皇城使本路都監兼同總領岷州蕃兵將韋萬身死為係邊人累立戰功特與男知幾知一三班差使刑部言綱運綱梢兵級雇到火兒同於本綱倉庫兵級於本倉庫謂無監官處清酒務雖有監官亦同犯笞罪許押綱人及專副以小杖行决不得過十五過數者依前人不合捶律以故致死或因公事毆致折傷以上者奏裁又綱運内雇夫違犯押綱官貟杖一百詈者徒一年餘押綱人杖八十詈者杖一百毆者各徒二年即毆官貟致折傷者徒三年配五百里從之新本削去癸未蕃官内殿崇班龍金為内殿承制西南龍蕃進奉人奉化郎將龍延觧為武寜郎將安化郎將龍文渉等七人為奉化郎將保順郎將龍延丕等二十六人為安化郎將龍延未等二十人為保順郎將龍以亮為歸徳將軍龍以諫等九人為寜逺將軍龍以古等四人為安逺將軍龍延會等十二人為懷化郎將龍延明等九人為武寜郎將龍延誾等十七人為奉化郎將龍延信等十六人為安化郎將龍延洪等五人為保順郎將此可削兵部言儀鸞司乞置次供御人匠等詔添供御工匠各十人新無此當考户部言河北措置糴便司状趙州糴倉闗到措置司糴本文鈔每一十貫加饒錢三百文轉運司糴本文鈔每一十貫加饒錢七百文加饒不同便錢斛斗價亦髙下不一今相度乞將本司丈鈔依轉運司例實一百貫文並支加饒錢七貫文本部相度一州兩司用鈔加饒不同終是未便乞將今後立定加饒每一百貫文支錢三貫文從之新本削去甲申權工部侍郎郭知章貟外郎梁鑄進對言和雇工匠雇直多不時給乞立限支給上曰細民仰以為生不可緩也宣徳郎致仕周常落致仕守宣義郎為太常博士用尚書右丞黄履薦也馬軍都虞候信州團練使王恩為涇原路副都總管三年二月己酉曽布云云可考龍神衛四廂都指揮使張整權管勾馬軍司事王恩從涇原所乞事具正月戊寅鄜延路經畧使吕惠卿言自来諸路出兵不預先闗報諸路照會不惟西賊得以併兵一路兼不係舉動原本缺八字為備乞指揮諸路經畧司今後遇有出兵討蕩或進築城寨並約逺近預先宻切關報諸路經畧司照會詔令逐路帥臣應議定進築討蕩之處候舉動有期即宻切互相闗報户部言保平軍状凖條應官貟請俸粮草除食用外有餘數亦依諸軍價例坐倉乞特不許知州通判入中及坐倉坐塲其糶俸餘即不得過坐倉錢數如允所乞其本路諸州軍并河北河東路亦望依此施行新削三月二十六日又言左右廂店宅務監官賞罰乞著為令并從之丙戌户部言今後官司應縁收買及造換修完出染之類物色若不豫行計料申乞支撥收買及將官庫現在之物妄有退嫌及有别色可以充代而輙稱充代不行經歴官司逗遛行遣并雜買務不依在市實直估價及不依條出榜召人減價中直官吏並科杖一百不以失減其所估價錢並關申度支審覆行下如估不實致大請官錢並許諸色人告首得實支賞錢二十貫文以犯人家財充或無及不足以官錢代支其受贓人依重禄公人從之新削丁亥江淮荆浙福建廣南路提㸃坑冶鑄錢事陳郛罷送吏部與合入差遣知淮陽軍朝散大夫周濟代之安惇𫝊云惇奏元看詳訴理官乞加罪由是陳郛等皆坐責惇奏得㫖乃此年六月二十五日此時未也郛所以罷當考刑部言急脚馬遞舖兵級並五人為一保如犯盗及殺人彊姦畧人放火發冡或棄尸水中若博賭財物蔵匿犯盗之人或盗匿棄毁私折遞角同保人及本轄節級知而不告者各减犯人罪一等不知情者减三等及沿汴無主死屍地分官司避申報而棄尸河中者許人告賞錢五貫文又沿汴装卸河清及馬遞舖兵級應閉營舖門後擅離營舖者各杖一百本轄節級及同保人知而不問與同罪不知情者减三等許人告賞錢五貫文又遭䘮本家不葬埋而棄尸於汴河中者杖八十係尊長者加三等從之新削開封府言今後外處逃軍於京畿首獲如依條合行牒送有瘡病未可行者並依本府敕犯徒應配之人量輕重分送赤縣寄禁候病損可行日牒送前去新削金部員外郎吳君丞言乞造偽鈔者許同犯人告首仍支賞從之戊子户部言凖令大禮謂南郊明堂祫饗欲於令文増入北郊從之己丑工部言河北屯田司令塘水深淺季申工部乞今後塘泊州軍於次季孟月保明所管地分塘水増减尺寸徑報屯田司候到立便差官檢覆訖本司於仲月審察詣實給罪保明奏聞仍具申知本部從之庚寅宰臣章惇中書侍郎許將尚書左丞蔡卞尚書右丞黄履言臣等檢詳紹聖二年三省劄子皇弟佖等冝建邸第開府置属出班外廷奉詔大寜郡王佖遂寜郡王佶冝所依請降詔施行臣等竊見今者盖修五王外第申王端王兩位日夕畢工咸寜郡王俁已下次當出閤伏望詔有司施行詔可工部言文思院上下界金銀珠玉象牙玳瑁銅鐵丹漆皮麻等諸作工料最為浩瀚上下界見行條格及該說不盡功限例各寛剰至於逐旋勘騐裁减並無的據欲乞委官一員將文思院上下界應干作分據年例依令合造之物檢照前後造過工作料状逐一制撲的確料例功限編為定式其泛抛工作即各随物色比類計料仍並委覆料司覆筭免致枉費工料如䝉俞允即乞差少府監丞薛紹彭不妨本職修立定式從之新無可削樞宻院言章楶鍾𫝊乞逐路各且依已得指揮修築等事邊事在逺朝廷難以遥度累降指揮責在帥臣協心謀畫從長措置近為熙河出寨討蕩有功遂令鍾𫝊親赴涇原與章楶靣議欲乘此機會進築天都又章楶言近得鍾𫝊書語及併三路兵馬進築天都楶深然其說兼會合諸路兵馬無不可為之理又鍾𫝊言已到渭州與章楶商議大概已一一依禀朝㫖指揮經營續具畫一奏聞次及章楶鍾𫝊奏今来進築事體甚大乞令陸師閔至涇原往来同共相度措置又稱進築在近軍期已迫乞令李譓專在涇原分頭應副又奏乞環慶路應副兵馬至三日章楶鍾𫝊奏却乞逐路且依已得指揮各自修築詔令章楶鍾𫝊各具析前後所奏異同因依以聞如合逐路進築即依元降指揮樞宻院言塘濼係河北屯田司及沿邉安撫司職事及河北轉運司兼都大制置昨因李仲提舉開修御河其間有經歴塘濼地分與御河接近可以因便修葺去處令計會屯田司那融功力修葺及續降度牒三百道和雇人夫專委李仲出賣與屯田司同共提舉管勾役功近雖已令河北東路提刑朝奉郎李仲相度寛立期限小作料次興功年嵗之間亦未能了當縁塘濼本非提刑司職事及轉運司係當職官合令專一提舉管勾詔令河北路轉運司及縁邊安撫司同共提舉其李仲更不管勾布録云林豫言仲差官十員極張皇上用豫言故罷仲豫今何官當考紹聖四年八月十九日林豫為河北沿邊安撫副使朝奉大夫王機權開封府推官六月二十八日曽布云云辛卯三省言京西路轉運判官周純按視到永裕陵東北角新展禁地長濶歩畝拘占官私田土及標禁妨礙去處乞下有司再行集議詔禮部秘書省句集太史天文局渾天儀象所官同共定奪以聞三月四日五月二十八日八月七日吏部言乞應知州縣令罷任考察課績仰所属須於限内申奏有故保明奏未得者聴展限雖累展即不得過元限仍具因依申吏部㸃檢催督如稍渉迃滯及無故過限者人吏杖一百官員具事由聞奏仍乞將知縣令考課上等人如到部本經行便許已後收使内闕陞入通判資序者比附去年七月二十九日朝㫖與陞半年名次從之新無合刪去年七月二十九日朝㫖未見此月二日云云當考户刑部言應外人無故輙入寺監者並依入六曹法施行有專條者依本法從之新無合刪紹聖四年九月七日可考壬辰詔咸寜郡王俣普寜郡王似於三月下旬内選日出閤權就東宫三省言裁定六曹寺監文字所状乞降指揮翰林侍講侍讀學士向去置與不置詔元祐復置翰林侍讀侍講學士指揮更不施行知䖍州鍾正甫言伏聞朝廷以司馬光吕公著蘇軾蘇轍等悖逆罪状命官置局編録成書以正邦刑為世大戒臣竊恐朝廷尚有遺隱未盡編録今據臣所知悉具奏陳以偹採擇臣嘗與劉惟簡商議職事因臣語及元祐初先帝陵土未乾而善政已為司馬光等變壞更張造為謗訕不復有臣子之義惟簡遂為臣言光等姦黨相濟逆亂自肆最不可忍者二事其一元祐元年明堂光等心懷怨懟遂肆議不以先帝配宗祀而欲祀仁宗皇帝先帝幾不得與祭頼禮官何洵直力爭以謂嚴父配天古今之定禮其事見於孝經雖童稚皆能誦之且自古無宗祀祖考於明堂者其議遂寝而先帝始不廢於宗祀此皆悖逆無道非臣子之所宜言臣與惟簡相對流涕欷歔憤惋切齒而恨其事不得遽聞於上聽以治光等之罪也今惟簡既死竊恐朝廷未及採問而光等罪惡有所隱脫臣雖守郡在逺輙慕古人見無禮於其君者如鷹鸇逐鳥雀之義拳拳忠憤不能自已詔劄與編類姦臣事状蹇序辰等正甫言二事此但其一疑有脫文新録辨曰鍾正甫者何人敢為詆誣一至於此指賢哲為姦黨謂忠孝為悖逆顛倒是非上惑主聴豈可𫝊也此一章合刪去今復存之紹聖四年六月三日鍾正甫以敕令所删定官陛之任與堂除差遣尚書省言彊盗罪至死會恩後再犯而罪不至死者奏裁其已被徒伴通說事發而逃亡後遇赦者凖此因彊盗殺人者不要犯時不知律内傷人或殺傷人之卑㓜者奏裁從之新削癸巳樞宻院言近降指揮令章楶鍾𫝊等相度會合三路兵馬進築今據章楶鍾𫝊奏候將来計置糧草及守城之具足偹或乘春草長茂伺隙進築乞且依巳降朝㫖各於本路進築候有間隙即依朝㫖施行續據鍾𫝊申到渭州與章楶論議涇原等處進築無不合但投来人通說天都一帶無草俟計置有偹續同共進築并章楶要一城防守器具并糧食其防守器具陸師閔稱甚有凖偹若涇原進築有日先且就涇原輟使續自秦鳳輦去補填其糧食亦如此施行今涇原九羊谷熈河丹喇闗逐路自合先次興築須於此月旬日之内了當其没煙峡口至平夏城止二十里熈河齊訥納森去丹喇闗不逺兼係用秦鳳兩路兵馬聲勢不小但多方探伺敵情斟酌事力機會可以乘此修築亦仰相度興工如事力未及或未有機會即一面從長施行仍仰章楶於新築三城寨疾速増價計置的確合要糧草足偹可以興舉即闗報鍾𫝊依所降朝㫖同共相度勾抽三路兵將會合進築沒煙後峡涇原等處所有防守器具亦就近儧那應副詔令章楶鍾𫝊遵依施行如逐路利害不同聽各具所見以聞刑部言逃亡軍人捕獲斷罪條乞著於法從之朝散大夫黄伸為度支員外郎韓王冀王宫大小學教授葉承為正字正月二十四日曽布云云甲午詔孫傑察訪兩浙路二月一日初命己未三省言元祐詔今後臣寮用冠帔改換醫人服色者不得換紫衣詔更不施行吏部言林希乞八路員闕用熈寜元豐條并紹聖新制一處参酌修完成書詔令吏部四選同共編修今乞將川峡福建湖南路季闕並去替一年使闕從之希奏請在紹聖三年七月十二日己亥刑部言右治獄勘到得觧進士蘇天民受髙茂錢與本人代補太學外舍生并進士髙茂却别冒髙昻名入試手分郝定朝請郎國子司業詹文各為齋僕牟順認得是蘇天民因問告發了却作逐人自首牒送所属案蘇天民髙茂所犯各係徒罪郝定詹文各係公罪徒各合該赦恩原免詔並依斷蘇天民髙茂特各分送鄰州編管郝定特勒停詹文特衝替樞宻院言近據鄜延路經畧使吕惠卿乞請諸路進築或討蕩並互相闗報同時舉動已奉㫖依及今月二日降指揮令河東路相度出兵討蕩今據吕惠卿奏見計置修復米脂寨乞令不進築路分出兵討蕩詔令河東路經畧司詳此照會仍依上件累降朝㫖施行布録庚子孫賁奏鄜延已計置修復米脂辛丑令河東相度築荷葉川或其他要便處以應援米脂及屏蔽蘆葭耕牧地仍令張世永張􅀈同親詣地頭相度熈蘭經畧司言權知蘭州兼縁邊安撫司公事王舜臣乞將西界投来部落子瑪新雲且寧補崇班帶廵檢本司乞依王舜臣所乞及已依敕牓内該載支給銀絹錢各二百錦袍銀帶詔瑪新雲且寧特與内殿崇班差充本族廵檢更賜銀絹錢各二百其餘同出漢人内有合補與名目者即斟量髙下以空名宣劄補填訖以聞紹聖四年八月一日舜臣以知鄜州權發遣熈蘭鈐轄詔荆湖南路江南東路各添置有馬雄畧一指揮陜西制置觧鹽司言乞應官司並不得扵折博務買賣興販觧鹽如違其買賣官司並科違制之罪從之新無刑部言疑難公案合奏廵白者押劄子後請限三日内納到部禀議本部限二日内與决行下如合詣都省廵白即再限二日録元劄子赴部限二日納都省候報到限二日詣都省禀決已上每兩件加一日從之新無丙申户部言潭州知通任内應副銅場買銅賞罰條請著為法從之詔差河北路轉運副使吕升卿提舉荆湖南路常平等事董必並為廣南東西路察訪三月四日罷升卿蔡京等究治同文館獄卒不得其要領乃更遣升卿及必使嶺外謀盡殺元祐黨宋朝要録時劉摯梁燾已死朝廷猶未知也權發遣提舉河東路常平等事鄧洵仁言伏見祖宗朝置龍圖天章寳文閣以蔵列聖御製述作况自陛下紹隆丕烈遹明先志而寳閣未新徽名未掲伏望明詔有司祇循舊章亟加營建詔令翰林學士中書舍人每貟撰閣名五名以聞四月十八日名顯謨成都府利州路鈐轄司利州路轉運司言乞於興元府閬州兩處各添置就糧武寜一指揮各以四百人為額從之清海軍節度使開封儀同三司嗣濮王宗祐卒輟視朝三日車駕臨奠成服於後苑時方治道西郊以待上修禊亟詔為罷贈太師追封欽王謚穆恪異時襲封爵者遇祠濮園即移疾不果行或請代之至宗祐獨不肯自秋渉冬數往来道路薦獻如禮既病人皆以為憂春夏當享又亟往遂卒於齋所庚子户部言應不産錫地分官私自出賣許通商販及聽鑄造器用買賣仍並免稅等法詔從之新無户工部言江淮荆浙等路發運副使兼制置鹽礬茶事吕仲甫奏五指山銅礦饒衍堪任鑄錢欲官自興置場冶委官監轄乞下河東路提㸃刑獄司檢踏施行如堪置場即闗報轉運司相度保明聞奏詔令河東路轉運司相度措置雄州言探到北界帳前行文字差人夫於三月上旬開㙭朔武州沿邊壕子等詔河東沿邊安撫司宻切體探有無前項事理及上件界壕自来係與不係西界同共開條具状以聞辛丑右司員外郎河北路察訪孫祀户部員外郎淮南路察訪孫深言元豐八年六月八日敕修立郎官御史按察諸路監司職事條已詳偹今来並乞依元條并元豐令施行内有聲訖未偹乞量行増改舊按察條行遣文書以某路按察司為名今改按察字作察訪字從之壬寅刑部言監司按發公事合推鞫者不得送廨宇所在州軍合送本州及置司者罪從之癸卯樞宻院言章楶已選定二月二十六日會合將兵出寨破土進築九羊谷等處及勾保甲赴軍前般運糧草修城木植兼稱到熈寜寨與姚雄等諸將會合臣躬親統領至平夏城分遣諸將前去看詳所奏進築九羊谷後石門等處縁上件兩處地理相近難並進築枉費財用未委甚處最係控扼要害之地合指定一處外有没煙峽前口至平夏止二十里正係控扼西賊天都出入咽喉之地今九羊谷城寨了當便合乘勢移那兵馬進築詔令章楶更切審測敵情斟酌事力機會乘勢進築如探伺西賊㸃集在近事勢厚重未可舉動亦仰指定探報事實詳具奏状仍先具措置次第并合用兵馬以聞甲辰三班奉職康諿獻書言竊觀誠州之廢累年未聞徳音陛下何不試令臣立於政府反覆辯論則臣胷中之積庶幾得吐憤悶而少有助成陛下紹復之聖志若置臣言而不恤則是先帝之不幸御批諿言殊不度徳敢求自試宜加薄責以誡狂愚可特依衝替人例施行仍與一逺僻處監當差遣仍添入私罪事理重御集二月二十五日事丙午章楶言與鍾𫝊議先進築三城寨其本路有兩座守城器具本路前後進築用過防守器具不少今凖聖㫖將来合於三處建築城寨乞下陸師閔計置一千歩城防守器具一座前来靈平鎮差下卸及下劉何巴宜於諸路速行剗刷八百歩防守器具般運前来所有樓櫓臣乞一靣計置詔令章楶才候修九羊谷了當即將已計置到防守器具遵依今月二十四日指揮於没煙峽前口進築所有後石門創廸章更不得興工如已興工即速行寝罷三月九日楶復奏十六日降職布録丙午降㫖令章楶依已降指揮築九羊谷及没煙前峡口不得更於後石門創廸章進築仍令陸師閔輟一千及八百歩城防城器具各一座詔令巴宜李譓般赴平夏城凖偹進築没煙後峡及涇原使用戊申熙河蘭岷路經畧司言差權知蘭州王舜臣統領兵馬出塞討蕩西賊斬獲約三千級詔舜臣已下等第賜銀合茶藥其出界兵賜錢有差所有得功將士等仰經略司疾速保明功状以聞八月二十二日送勘元符二年二月二十二日布録於庚子云同呈熙河奏王舜臣統兵自金城闗出討擊右廂又戊申云呈王舜臣出界斬獲祁蘭州報斬級二萬既而走馬奏止三千其後止二千餘級然奪馬千匹槖駝五百羊畜數萬舜臣所部止萬五千人而已得㫖賜茶藥特支儧趍上功状又呈録延二十五日進築米脂涇原路經畧司言今月十四日修古髙平堡畢工乞賜堡名詔賜名髙平堡布録戊申涇原築古髙平堡乞賜名止以古髙平為名孫路言進築灰家觜新城畢工乞賜名為城詔賜名興平城其本城合差官并一行修城將佐等功状令環慶路經畧司疾速具状聞奏三月九日路加直龍正月五日宻院云云布録庚子同呈環慶奏已築灰家觜班師戊申環慶築灰家觜千歩城賜名興平樞宻院言章楶所奏據鍾傳申章楶要糧五十萬石馬料在外草八十萬束錢五十萬貫顯是須索太多兼所稱防城器具缺少縁先於去年六月内已曽指揮劉何於近裏州軍輟八百歩防城器具一座已是不少近又已指揮秦鳳路輟那一千歩及八百歩防城器具各一座應副其糧草等又已責在劉何李譓計置那運必不至闕事詔章楶候進築九羊谷了日乘勢於没煙前口進築仍速同劉何李譓等計置合要防城器具及板築所須之物乗此機會務要神速成就仍先次計會鍾𫝊相度次第聞奏當議别降指揮令熈河秦鳳路合兵馬并更於環慶路差發將兵一萬人添助防托二十七日已有詔初輔臣欲責章楶以畏怯避事上曰素議以邊帥不可強以所不可為如此責之未便遂令削去止令相度先築没煙前峽仍一靣計會後峽及正原版築之具候有機會即會合三路兵馬進築曽布曰二府不敢不以此責章楶徳音如此邊臣得以舒巻自如真得任將之體中外幸甚此據布録戊申日事又云章楶赴平夏措置築九羊谷考之兵部言呈試武藝人依敕限十二月以前到部有疾趂限不及期者雖䝉朝廷按用舉人條例許令次年就試今後準此縁其間不無違限冒稱偶病之人無以驗實若便與收試即刑部條限却成空文其舉人事故趂限不及不曽就試者並召保官經所属自陳審按出給公據保明申兵部驗實次舉就試今来呈試武藝人乞亦依舉人條施行從之己酉刑部言欲於編敕廵檢縣尉應承告彊盗而故不申條徒二年字下添入重法地分係結集十人以上者仍不以赦降去官原減從之
