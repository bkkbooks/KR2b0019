body:
  text: 續資治通鑑長編卷四百二十二宋李燾撰哲宗元祐四年二月壬寅朔寶文閣直學士新除刑部尚書謝景溫知鄆州政目在正月二十八日右正言劉安世言臣伏見自去冬謝景溫除權刑部尚書臣等疏其姦邪罪惡乞行寢罷伏蒙陛下特徇公議外移鄆州日近閣門繳回告命而尚書省却令進奏院遞付本官中外喧傳無不駭異臣考尋故事應朝廷除授即無不經拜命而付告身者唯綸言已下其人亡沒乃以命書就賜其家雖景溫曽除秋官因致人言未嘗祇受閣門繳納自合毁抹昨者再行移運之制遽用刑部新銜搢紳之間固有疑論今乃以不當給之告妄授景溫雖欲隂借稱呼暗纍資序而顚倒錯亂殊失舊章伏望聖慈速令追取依條例毁抹所貴君命不私國體無損又言近嘗奏論謝景溫刑部尚書告身不合給付比聞景溫自以無名不敢輒受謂宜因其辭免遽令追還伏見已有朝旨令依前降指揮理實未安須至論列臣伏觀朝廷自來常格應在京新除職事官並須受告方得繫銜昨除景溫刑部尚書未曽拜命而移鄆州之制遽列新職人士固已駭異今又遂非再令給告變亂典故殊無義理况日近王汾除諫議大夫尋用人言而罷未聞以命書賜之何獨景溫遂廢故事與之者不足為恩受之者不足為榮朝廷之事豈宜如此臣區區之所惜者國家之體不可妄變非為景溫而發也惟陛下謹守成憲防微杜漸追還景溫告命依例毁抹所貴名實稍正紀綱不紊癸卯户部言得旨取索裁減在京職事官俸按官制職事官俸以寄祿官髙下分行守試三等看詳寄祿官既髙則本俸自多不須更支上等職錢欲乞去行守一等行者止依守法及不帶行守者亦如之舊無行守兩等職錢者依元定數從之舊録云先帝董正治官悉罷無名雜給分行守試制祿養廉務欲優足至是裁損非先帝志也新録削去御史中丞李常等言朝奉郎何宗元學問通浹乞隨才録用翰林學士許將言太學博士陳祥道尤深於禮嘗著增廣舊圖及考先儒異同之説著禮書一百卷望試以禮官取所為書付之有司詔以何宗元為國子監丞陳祥道為太常博士詔職事官闕許兼政目三日事當考甲辰司空同平章軍國事吕公著卒輟視朝三日乘輿臨奠成服苑中敇有司治葬贈太師申國公諡正獻公著自少講學以治心養性為本識慮深敏量閎而學粹茍便於國不以私利害動其心與人至誠不事表暴其好士樂善出於天性士大夫有以人物為意者必問其所知與其所聞相參核以待上求神宗嘗謂執政曰吕公著之於人材其言不欺如權衡之稱物上前議政事盡誠去飾博取衆人之善以為善至其所當守毅然不可回奪也舊録公著傳神宗相王安石為政而公著與光輩率為異論謂制置三司條例為名分不正常平青苖法本非惠民宜罷去帝以其未喻也猶不之斥乃面奏若韓琦因人心不忍如趙鞅舉甲除君側之惡不知陛下何以待之帝始謫之宋敏求草詞止言敷陳失實援據非宜帝以為不正名其罪令陳升之易之曰厚誣藩鎮興除惡之謀深駭豫聞乖事理之實遂以翰林侍讀學士知潁州新録辨曰舉晉陽甲事當以司馬光日記中語折𠂻為定合刪去上文一百四十三字舊録云自熙寧初論法度不便者皆被黜逮茲政成異議者復希效用公著亦以自薦新録辨曰上文云有詔舉才行可升擢者公著因言兼收博納各得自盡則無滯才之歎如此非自薦以希效用也合刪三十字舊録云時上方恭默太皇太后退託簾帷公著雅善司馬光二人用事更法改制無所忌憚新録辨曰以上三十二字痛詆公著誣及宣仁合行刪去乙巳朝散郎直龍圖閣權發遣慶州范純粹為寶文閣待制知慶州再任吏部侍郎范百祿等言河北轉運使朝議大夫直祕閣謝卿材公忠亮直處身不回論議大河尤為精識臣等近請罷外都水丞司令轉運使副判官兼制置河防公事望檢會前奏施行詔户部工部限半月同共相度以聞七月八日卿材兼領外使侍御史盛陶言近詔除六曹郎中並於第二任知州以上資序人內選實歷知州或曽任監司六曹員外郎校理臺諫官開封府推官滿二年人充竊詳監司係朝廷擢用復滿二年除六曹郎中固不為過其第二任歷知州人多是吏部常調諸路監司被召入省若稍資淺止為員外郎而轄下守倅及資格者乃直為郎中理似未安望且除員外郎有勞乃遷郎中詔於元降旨內刪實歷知州或五字丙午吏部言元豐中立定薦舉文臣承務郎已上及武臣崇班已上升陟員數自後薦舉官司為所舉數足泛為考察之薦於法不應收使詔今後文臣係知州軍資序及武臣路分都監知州軍已上方許奏乞考察己酉朝奉大夫集賢殿修撰知潞州梁燾為左諫議大夫自潞州召入據行狀四月乃至邵伯溫辨誣載燾過河陽見邢恕附五月二十八日可考癸丑尚書左僕射兼門下侍郎吕大防提舉修神宗皇帝實録左中散大夫太常少卿直祕閣王汾為直龍圖閣知明州朝散大夫衛尉少卿王子韶為太常少卿右正言劉安世言按子韶資性憸佞行已無耻熙寧初士大夫有十鑽之諺目子韶為衙內鑽蓋以其造請公卿之門不憚寒暑交結權要子弟巧於自媒如刀錐之銛鋭也及吕公著為御史中丞遂薦子韶以備臺官隂持兩端見利忘義是時王安石用事方行青苖之法子韶每進對之際則迎合上意未嘗有一語敢指政事之失及對公著則又復肆誕謾以謂屢嘗奏疏言新法之非便蓋欲上下欺罔兩獲其利先皇帝聖鑒明哲洞照姦心子韶詐窮情得遂被黜責其後復除荆湖南路轉運判官為言者疏其前後過犯及不葬父母之事因而報罷元祐初擢領劇曹又為御史論其亡狀尋令外補今少常之任素號清選前日之居此官者或遂遷侍郎或就拜給諫大用之漸多假此途豈容匪人輒爾冒處伏望陛下慎重名器斥逺佞邪收還子韶誤恩别擇賢者庶無虛受輿論厭服又言臣聞子韶熙寧中嘗按錢塘祖無擇事承望王安石風旨巧為誣陷搢紳之間至今不以為直及任御史茍務容恱上諛人主下欺官長先皇帝察其頗僻黜為上元知縣清議不齒于今有年中間雖移湖南運判及遷吏部郎中尚為言者所劾皆即報罷今少常之任資望愈重一歷此地遂升要津豈容匪人可冒優選議者謂子韶頗有文學不忝新命此亦姑息之論非公言也國家設官分職本以待天下之才如子韶者反覆姦邪見於已試人物汙下衆所鄙薄既不能納忠於先朝豈復更能盡節於陛下雖區區之記問或有可稱而大義已虧餘何足道今若不究本末妄置清途臣恐幸門遂開小人道長甚非朝廷之福惟陛下重惜名器為官擇人檢會臣前奏事理特降指揮收還子韶之命别授賢者以慰輿議又言按子韶人品冗末性復憸邪熙寧中為御史之日見利忘義反覆迎合其後吕公著陳襄質於上前矯詐悉露先帝疾其誕謾乃詔之曰外要黨正之名內懷朋姦之實遂奪言職逺貶江左止此一節已見棄於清議而况交結權勢子弟不耻自媒挾持私怨造祖無擇之大獄諂事吕嘉問復得提舉折納差遣操行卑汚實鮮倫比昨除湖南運判及遷吏部郎中當時御史猶以為非處子韶之宜劾奏而罷豈茲少常之任乃可輕授除目傳播甚駭物聼臺諫論列方俟進止子韶略無畏憚遽已視事其處心積慮不過以謂朝廷若用言者之論則已嘗就職縱使罷去恩例尚優機巧僥幸一至於此方陛下勵精求治辨别邪正之際尤不可使此輩輒汚清途伏望聖慈特垂省察收還子韶之命以為姦人之戒又言臣近三具狀論奏王子韶除太常少卿不當至今未覩施行近者風聞三省奏事之際嘗蒙宣諭以辨别君子小人為戒輔弼大臣既承聖訓謂宜夙夜交警慎簡庶僚而謬引姦慝塵汚清選考之衆議皆謂執政之間與子韶有舊者憐其獨未顯達力為主張臣竊謂大臣不遺故舊之心則善矣至於屈天下之公議而伸一己之私恩則非所以為朝廷之計也昨者王汾除諫議大夫御史止言其詼諧口吃之類一二小事猶即報罷豈若子韶姦邪反覆見於已試柔屈不耻老而益甚遽躋華胄實辱簮紳况汾以小過而棄捐子韶負大罪而拔擢用捨之道顯屬不當伏乞改授間慢差遣以允輿議三月十六日别與差遣二十六日改衛尉卿御史中丞李常言伏聞回河與減水河之議已奉德音悉令罷免凋瘵之民咸獲休息聖恩所加過半天下盛德之事傳之無窮四海幸甚四海幸甚又考雲平廟碑稱塞曹村掃凡用九路之夫若截河為堤開浚故道倍雲平之役今蒙罷免聖恩所及豈特九路而已竊以舉大役耗國財困未蘇之民事無成之功使朝廷之上久疑而不決妄置官局枉興工役不資之費已數百萬理水之官罪在不赦今置而不問恐非所以懲有過戒後來王孝先等伏望聖慈深詔有司重行黜降用示公朝有罪必罰杜絶他時妄誕希合之弊貼黃稱孝先等庸愚小人豈足以汚典刑雖然上誤朝廷全自此輩興扇浮議使上下交惑今不重行黜責深慮造端希旨之弊日益以甚也伏望特賜指揮是日詔朝請大夫都水使者王孝先知曹州中書舍人曽肇封還詞頭奏曰伏以朝廷起孝先於謫籍之中任以都水之事一旦罷去猶得輔藩以為無罪耶則孝先在河朔二年妄議河事前後反覆勞人費財已有臣僚奏論臣不復言及陛下遣官按視辭窮迹露猶敢廣計工料肆為大言邀縣官以必不可應副之事愚弄朝廷期自解免欺君罔上情狀甚明不可謂之無罪也以為有罪邪則當明正典刑重行黜逐今乃置之近輔不失節鎮使臣於訓詞褒貶之際未有以處故不避冒黷須至奏論大抵人臣事上以忠信為主朝廷紀綱以賞罰為重若誕謾欺罔者略而不問則賞罰失當紀綱殆廢矣况孝先庸猥鄙夫初無善狀出治詔獄則以觀望敗官入為理卿則以刻核抵罪陛下抆拭瑕釁拔而用之所宜竭誠以報恩遇乃習故態惡心不悛此而可容孰為可責臣恐命下之日公論沸騰不免上煩聖聰為之反汗仰纍國體罪實在臣是以承詔傍徨未敢措辭伏望少留神明更加裁處使罰不失當羣情厭服則臣雖以逆旨獲罪亦所甘心干犯天威伏深震懼所有誥詞未敢修撰貼黃稱孝先初議孫村口築隄開減水河為回河之計朝廷聼之興役彌年及遣官行視不可回河已罷修河司則孝先安所逃責若謂為無罪恐非公論又貼黃稱按孝先初自濮州召為都水使者治河二年略無成效更以欺誕罷去乃得大藩恐於朝廷行法未為允當又貼黃稱吏部侍郎范百祿等奏修河司役過兵夫六萬三千餘人計五百三十萬工約支費過錢糧三十九萬二千九百餘貫石匹兩買物料錢七十五萬三百餘貫使過物料二百九十餘萬條束官員使臣大軍將凡一百一十餘員凡請給不預此數又中書省勘會到修河司兵士逃走三千六百九十一人死損一千三百一十九人此所謂勞人費財又貼黃稱范百祿等奏顧臨等從初與王孝先同議孫村口難復故道今却係王孝先奏乞於上件處取水入故道又奏孝先三次陳述前後不同此所謂前後反覆又貼黃稱孝先去年十二月奏開濬故道閉塞北流等共用人工一千餘萬物料近五千萬便要正月數足此所謂廣計工料邀縣官以必不可應副之事又貼黃稱元豐中孝先嘗奉詔勘朱丹孫逈髙遵裕公事坐觀望奪官昨因臣僚上言大理寺刑獄寃濫事降知濮州中書舍人彭汝礪再封還詞頭奏曰聖人在上不能使人不為過惡有過惡則治之而已當堯之時洪水未平堯使鯀治之不克有成鯀不免殛死堯不失為聖人臣伏詳王孝先反覆不信熒惑中外誕謾無懼愚弄朝廷耗蠧國財死折人命其事見於案牘甚具見於人言甚不可欺非特臣言也今朝廷為之蓋覆為之遷徙譬猶愛惜兒女不忍以一指彈治臣恐朝廷綱紀自此弛廢矣賞罰者朝廷綱紀也綱不綱紀不紀雖有智力不能善其後矣陛下自履大位于今五年好惡循理是非以道􅉏御無過與宗室無假借近親貪功廢之終身而不齒乳媪弄權一日棄之如涕唾命於朝廷達於四海詠蹈鼓舞稱為神明今於孝先而疑之臣以為過矣書曰刑故無小又曰怙終賊刑孝先之於河議非不知而為之也及姦詐窮露猶敢肆意誕謾以朝廷為無足畏是所謂怙終雖堯舜在上不能容矣夫是非非我也是天下之公器也雖大臣有不得擅焉賞罰非人也是天下之成命也雖人主有不得而私焉易曰文不當故吉凶生焉治亂禍福之來一嚬一笑之間而已况如此其大者邪惟陛下上畏天威俯同天下之議治王孝先等之罪以解中外之惑以存朝廷之紀綱臣雖得罪蓋所安也所有詞頭臣未敢撰制汝礪更有不行下孫村口文字在此奏前已附去年十二月恐此奏非繳孝先曹州除命須别詳考後十日詔王孝先改知濮州改知濮州乃二十二日今并書之是日詔知洪州黃履知潤州知潤州王覿除淮南轉運使按王覿由知潤州除淮南轉運原本脫知潤州三字今增正新知明州傅燮知洪州中書舍人曽肇既草黃履制詞因言王覿自諫議大夫出知潤州今除淮南轉運使未審有無故事傅燮自江東提點刑獄奉聖旨與知州差遣昨已除明州今又改洪州兼一路鈐轄未審因依乞指揮勘會以憑命辭翌日三省進呈黃履王覿新除皆罷以知宣州張修為淮南轉運副使傅燮知宣州朝奉郎權知曹州韓宗古為集賢校理知潞州右正言劉安世言臣伏見朝廷除韓宗古知潞州仍貼集賢校理考之公論皆謂未安臣聞先帝初更官制以著作校書郎正字𨽻祕書省為職事官前日帶校理校勘之類並轉一資悉令解罷宗古舊為校理已依上件條制轉官納職今日復有此授顯屬無名若謂潞州藩鎮欲示優崇則陜州地望尤髙所宜加禮兼陳侗亦是曽轉官罷館職之人向者移陜未曽復職事體均一豫奪頓殊欲望僉議允諧不可得也况王孝先已改濮州則宗古自合仍舊伏乞追還前命以正國體詔宗古特展四年磨勘已而宗古再請罷職從之宗古展磨勘及再請罷職見三月一日今並書之新差提點廣南西路刑獄蔣之翰以病乞改授知州從之大中大夫集賢院學士髙賦為通議大夫集賢院學士致仕從其請也甲寅尚書省言官員在任以急難乞假離任舊無此法近年創行修立致乞假者稍多妨廢職事其間因緣不無詐妄請除父母疾病危篤許驗實給假離任外餘並刪去兼自來以私故離任者並不差破人從其依在任取送家屬條差人一節亦請刪去并緣邊主兵及向著河掃若虧欠場務官押綱使臣並勿給從之丙辰監察御史王彭年奏臣伏覩皇帝陛下好學不倦聖敬日躋左右講讀必擇天下端亮忠信之臣務以道德輔成聖性若使邪偽險薄之人妄進姦言以惑天聼臣恐為害不細臣聞翰林學士兼侍讀蘇軾每當進讀未嘗平易開釋必因所讀文字密藏意旨以進姦説聞軾言者無不震悚所進漢唐事迹多以人君殺戮臣下及大臣不稟詔令欲以擅行誅斬小臣等事為獻若此言者殊非道德仁厚之術豈可以上瀆聖聰軾之性識險薄一至如是軾之姦謀則有所在竊恐欲漸進邪説大則離間陛下骨肉小則疑二陛下君臣姦人在朝為國大患不即逺逐悔無及矣原軾之心自以素來詆謗先朝語言文字至多今日乃欲謀為自完之謀是以百端姦譎欲惑天聼若此人者豈宜久在朝廷伏願二聖深垂鑒照特行誅竄以謝天下貼黃稱軾之所進漢唐故實誅斬殺戮等事編録見存皆可考驗彭年又奏近者論奏翰林學士兼侍讀蘇軾多以漢唐人君殺戮臣下及大臣不奉法令欲以擅行誅斬小臣等事上進仍於講筵讀史書之際懷挾私意妄論政事以瀆聖聰欲乞朝廷罷斥施行至今未聞德音伏望聖慈特賜睿旨降出臣奏狀付三省取出講筵編録則蘇軾所進漢唐事迹內照驗見有上項殺戮誅斬等事若非輔成人主仁厚德性之説不合進獻即乞早賜斥逐如臣所言不當亦乞特行黜降貼黃稱軾為翰林學士職在侍從凡論政事宜明上章疏指陳是非其在講讀即非議論政事之所今軾於體當上章疏而不上於不當奏事之處而論奏動違故常必挾姦罔伏願詳察早賜罷斥以杜微漸先是軾於講筵進事迹云成帝時張禹位特進甚尊重朱雲上書求見欲斬佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀折殿檻呼曰臣得下從龍逄比干遊於地下足矣未知聖朝何如耳文帝時申屠嘉為丞相鄧通方愛幸嘉入朝而通居上旁有怠慢之禮嘉奏事畢因言朝廷之禮不可以不肅罷朝坐府中為檄召通曰不來且斬通唐太宗時河內人李好德得心疾妄為妖言詔按其事大理丞張藴古奏好德被心疾法不當坐治書侍御史權萬紀劾奏藴古本貫在相州好德之兄厚德為其刺史情在阿縱案事不實上怒命斬之於市彭年纍奏俱不報崇寧末乃檢會施行彭年二奏據詔旨崇寧四年閏二月二十八日丙申贈彭年諫大夫時所載增入前奏以元祐四年二月十五日後奏以三月六日今并此彭年奏尚餘四篇今不復取其二奏要亦不足取又崇寧四年閏二月二十八日檢會或有所假託未必彭年當時果有此等奏也須更考詳詔今後應瀕河州縣積水占田處在任官能為民擘畫溝畎疏導退出良田一百頃以上者並委所屬保明以聞到部日與升半年名次每增一百頃遞升半年名次及千頃以上者比類取旨酬賞功利大者仍取特旨從吏部侍郎范百祿請也丁巳夏國遣使謝封册詔學士院降回詔亳州觀察使克諶卒贈開府儀同三司追封華國公壬戌御邇英閣召講讀官講尚書讀寶訓司馬康講洪範至又用三德上問曰只此三德為更有德康對曰臯陶所陳有九德如柔而立剛而塞強而義之類是也先是上恭默未言起居舍人王巖叟喜聞德音因欲風諫退而上言曰陛下既能審而問之必能體而行之三德者人君之大本得之則治失之則亂不可須臾去者也三數雖少推而廣之足以盡天下之要陛下誠能用以修已安人則堯舜三代之盛可坐致也臣職備史官敬已書之於册以示萬世癸亥故入內供奉官郝士良男陟為三班差使乙丑詔常安民别與差遣安民前自太常丞授江南西路轉運判官以母病不能乘舟辭乃留為宗正丞别與差遣據政目在二十四日三月二十六日改宗正丞除江西運判官在二月二日母病不能江行改宗正丞此據安民家傳戊辰刑部狀看詳內外吏人衙前及係公之人並罷試斷案其許試條更不施行今來諸路監司吏人所試定奪疑難公事亦合依此施行從之編録册二月二十七日聖旨己巳正議大夫知鄧州蔡確為觀文殿學士餘如故確落職再及一期故有是命曽肇制集云蔡確元係觀文殿大學士正議大夫知陳州元祐二年二月十六日三省同奉聖旨特落職差知亳州二月二十八日再奉聖旨蔡確依前降指揮落職差知安州元祐三年二月及一期檢舉奉聖旨蔡確與復觀文殿學士差知鄧州二月二十四日再奉聖旨蔡確守本官差知鄧州至元祐四年二月又及一期三省同奉聖旨與復上件職確在鄧州嘗上章陳乞潁昌府以便私計右正言劉安世言確所陳乞雖未知可否之報而搢紳之議率皆不平敢具僉言上逹天聼按確姦邪隂險盜據宰席不能正身率下宣明教化而縱其弟碩招權納賄贓汙狼籍有司論罪當以大辟陛下特加寬貸止送韶州編管確本同居衆謂預聞其事朝廷既不窮治惟以失教責之削其職名出臨偏郡僅能周歲易守南陽當時議者已謂牽復太速碩至貶所未及踰年確遽上言乞令內徙陛下屈天下之法移置黃州曽不旋踵自請近鎮臣竊謂確所以敢萌意外之望益肆無厭之求者蓋見近日政事多尚姑息是以先用其弟量移之請嘗試朝廷既不能沮止姦謀遽可其奏確謂執政莫不畏已遂敢陵蔑公議輕侮朝綱雖屢蒙非常之恩猶不能滿確之意復託親老願移大藩蓋有以啓之也臣恐小人僥幸之心勢猶未已往往再乞放碩逐便或自乞京師宫觀差遣以就醫為名然則陛下又將許之乎確之朋黨大半在朝夙夕引領以俟復用若使漸得親近廣為岐路異日盜權亂政無不由此而始况輔弼大臣既以罪黜雖領帥節未復職名考之典故猶是謫籍豈有不因詔除輒求自便此風浸長則陛下慶賞刑威之柄遂為虛名國家紀綱必至隳紊不可不謹也伏望聖慈明敇三省執罷確奏以正國體確在鄧州陳乞潁昌不知是何時因確復職附見此章先是户部侍郎蘇轍言臣愚拙待罪右曹俯仰幾嵗訖無小補竊嘗以祖宗故事考之今日本部所行體制既殊利害相逺恐合隨事措置以塞弊源謹昧死具三弊以聞其一曰分河渠案以為都水監其二曰分甲胄案以為軍器監其三曰分修造案以為將作監前件三監皆𨽻工部則本部所專其餘無幾出納損益制在他司頃者司馬光秉政知其為害嘗使本部收攬諸司利權然當時所收不得其要至今三案之事猶為諸司所擅深可惜也祖宗參酌古今之宜建立三司所領天下事幾至大半權任之重非他司比推原其意非以私三司也事權分則財利散雖欲求富其道無由蓋國之有財猶人之有飲食飲食之道當使口司出納而腹制多寡然後分布氣血以養百骸耳目賴之以為明手足賴之以為力若不專任口腹而使手足耳目得分治之則雖欲求一飽不可得矣而况於安且夀乎今户部之在朝廷猶口腹也而使他司分治其事何以異此自數十年以來羣臣不明祖宗之意每因一事不舉輒以三司舊職分建他司利權一分用財無藝他司以辦事為效則不恤財之有無户部以給財為功則不論事之當否彼此各營一職其勢不復相知雖使户部得才智之臣終亦無益於算矣能否同病府庫卒空今不早救後患必甚昔嘉祐中京師頻歲大水大臣始取河渠案置都水監置監以來比之舊案所補何事而大不便者河北有外監丞侵奪轉運司職事轉運司之領河事也凡郡之諸掃掃之吏兵儲蓄無事則分有事則合水之所向諸掃趨之吏兵得以併功儲蓄得以併用故事作之日無暴斂傷財之患事定之後除補其闕兩無所傷自有監丞據法責成緩急之際諸掃所有不相為用而轉運司始不勝其弊矣近嵗嘗詔罷外監丞識者韙之既而復故物論所惜此工部都水監為户部之害一也先帝一新官制並建六曹隨曹付事故三司故事多𨽻工曹名雖近正而實非利甲胄案所掌今內為軍器監而上𨽻工部外為都作院而上𨽻提刑司欲有興作户部不得與議訪聞河北道須歲為羊渾脫動以千計渾脫之用必軍行乏水過渡無船然後須之而其為物稍經歲月必須蠧敗朝廷無出兵之計而有司營職不顧利害至使公私應副虧財害物若使專在轉運司必不至此此工部都作院為户部之害二也昔修造案掌百工之事事有緩急物有利害皆得專之今工部以辦職為事則緩急利害誰當議之朝廷近以箔場竹箔積久損爛創令出賣上下皆以為當指揮未幾復以諸處修造歲有料例遂令般運堆積以分出賣之計臣不知將作見工幾何一歲所用幾何取此積彼未用之間有無損敗而遂為此計本部雖知不便而以工部之事不敢復言此工部將作監為户部之害三也凡事之類此者多矣臣不能遍舉也故願明詔有司罷外水監丞而舉河北河事及諸路都作院皆歸之轉運司至於都水軍器將作三監皆兼𨽻户部使户部定其事之可否裁其費之多少而工部任其功之良楛程其作之遲速茍可否多少在户部則凡傷財害民户部無所逃其責矣茍良楛遲速在工部則凡敗事之用工部無所辭其譴矣利出于一而後天下貧富可責之户部而工部工拙可得而考矣事在職在臣不得不言如果可採伏乞付外施行貼黃稱三司設案舊職今外𨽻膳部光祿寺雖所掌飲食帳設利害非大如臣所言可採亦當如上三案分𨽻户部劄子無月日有得罪幾歲之語轍以二年十一月為户侍至三年十一月才一嵗也當在十一月間於是户部言自官制以來三司所掌錢穀事務分𨽻五曹寺監皆得主行官司既無邦計盈虛之責各物取辦一時不量户部有無利害因依橫費百端請令軍器將作少府都水監太府光祿寺等處轄下係應干申請創修添修計置收買材料錢物改鑄錢料興廢坑冶之類並先申户部看詳檢覆候與奪定許令造作物數從本部關赴本轄部分督責寺監依功限差工匠造作內河防急切申稟不及者聽逐急應副畢亦申户部點檢從之蘇轍自敘請復户部三司諸案朝廷皆以為然從之惟都水如舊據實録載户部所言略與轍不同今先列轍奏後載户部申請轍奏乃去年冬末及今施行當是再奏也監察御史王彭年言近論列知鄆州蒲宗孟非法用刑等事未蒙施行望體量黜責詔京東西路安撫使謝景溫體量詣實以聞宗孟時已改知河中府宗孟自鄆改河中府在正月二十八日今附見樞密院言保甲簿及鄊村丁産簿並係三年一造其合造簿年分多不齊一致重疊勾集供通丁口物力實為煩擾請令府界五路保甲簿候造丁産簿日一就施行如保甲簿造成未滿二年雖遇合造丁産簿並候再造簿日從之新無此御史中丞李常言禮記曰上酌民言則下天上施上不酌民言則犯也下不天上施則亂也蓋言有國家者酌取下民之言以為政令則得民心得民心則下仰恩德如天之施澤茍或戾此亂所由生伏以陛下臨御以來一政一令莫不順人心凡所以更革者非茍更之民以為非便故也所以因舊者非茍因之民以為便故也是以詔令每下海內歡呼靡不仰聖澤下天上施之謂也而其最大者二事臣竊疑焉役法也科場也役法之害溥加四海之農民科場之弊廣及天下之士子臣自蒙選擇當言責首以二事上干天聽半歲于茲鄙言屢上而不蒙採擇臣非要譽於四海之農民天下之學子也誠以不肖不敢上負朝廷至誠竭愚為陛下廣詢博訪酌取民言而上獻於天聽者今置而不問恐非朝廷所以任言責之意不然臣愚無似不足以司邦憲當聖責矣今為政於上而不酌民言執一偏而不求用衆臣恐先儒所謂下不天上施之咎基於此矣伏望聖慈命有司檢會臣前後所論役法科場劄子詳行考按而詔士民許言二者之利病茍臣言不殊伏望早賜施行以安四海農民士子之心李常三年九月十六日除中丞此云半歲當在二月間因附見月末右正言劉安世言臣伏見去冬以來頗愆時雪今春踰月亢陽愈甚詢之四方率多旱暵二麥已損荐飢可憂然南畝之間苖未至稿近日得雨猶有可救方二聖子育黎庶垂意民事謂宜責躬修政以召和氣而禱祀之禮有所未舉賑救之目有所未行臣雖甚愚竊以為過昔堯有九年之水湯遇七年之旱而國無捐瘠之民者蓋備之有素而已宣王遇災而懼側身修行欲消去之故雲漢之詩曰不殄禋祀自郊徂宫上下奠瘞靡神不宗此前代聖帝明王已行之事陛下之所宜法也伏望聖慈祇畏天變徹樂損膳精誠祈禱明敇大臣講求闕政申命中外審決留獄諸路監司謹視所部凶荒州縣廣為賑濟之備或官廩有不充去歲仍勸誘富民納粟以助公上擇其尤者寵以間官不急工役悉俾停罷庶幾人神和悅早致膏澤國有預備民無流散又言臣近以時雨愆候旱勢闊逺嘗進狂瞽粗陳消復之理又舉前代聖帝明王側身修行救災備患之事條列以聞乞賜採擇今已纍日未覩施行臣聞田家之言以謂三冬得雪而中春無雨則猶不免於歲歉今內自畿縣外及諸路率皆旱暵二麥已損嗸嗸下民將罹飢饉凡可以為救助者安可緩也臣聞聖王為國必有九年之蓄故雖遇旱乾水溢之災民無菜色今歲不登人且狼狽若有司不度事勢拘執故常必俟春夏之交方行祈禱之禮民已艱食而始為賑貸之計所謂大寒而後索衣裘亦無及矣伏望聖慈特垂軫惻禋祀之典救荒之政先事而講不必待時責躬求言恤刑省役庶召和氣以致膏澤不報安世言今春踰月當是二月間今附月末更須參考或是五年事是月立市易欠户法甲字項萬貫以上五户千貫以上十一户以抵入官掠利還官及五分給半餘俟足乙字項三千貫以上二十二户以抵五分入官餘作十分歲還一分丙字項二千貫以上四十二户不收抵並作十年歲納一分丁字項百貫以上百一十户餘有營運尅納外限三年政目二十八日事可見當時市易利害故具載云
