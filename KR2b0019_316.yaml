body:
  text: 續資治通鑑長編卷三百十二宋李燾撰神宗元豐四年夏四月己未提舉京城所言京城下創初營葺課利每歲定收十二萬緡元管勾官吏乞賜優奬自今每年止收及十二萬緡更不酬奬詔催驅課利點檢收納供備副使董嘉言遷西京左藏庫副使提舉宋用臣賜宅基一所勾當使臣遷資減磨勘年有差庚申編修諸路學制王震言郡國之吏狃於故常錢穀簿書實知從事受法之始惟在推行恐非俗吏所能通辦願自朝廷選可使者分行諸路措置大略然後授成於部使者郡太守則法行而通無復抵牾矣詔候法成取旨辛酉入內供奉官王懷正差管押軍器往瀘州欲不停見勾當後苑西作别給驛劵上批瀘州道路半在陜西與廣南不同可止依條給驛劵或本任添支入內省取問懷正妄陳乞以聞録故殿直韋城等縣巡檢趙稹子安民為三班差使初稹與賊鬬傷而死其妻乞恩樞密院言開封府界提點司奏稹不能捍禦已先衝替然因傷致死乞特推恩故也承議郎胡宗炎言夷門山在大內東北當陽之位為都城形勝之所國姓王氣所在公私取土於此岡阜漸成坑塹伏望禁止及填塞掘鑿處司天監定如宗炎所言從之癸亥遼主遣安復軍節度使耶律祐客省使韓昭原等來賀同天節上御延和殿閲試保甲雍王皓曹王頵侍少選命皓等坐閲試畢賜茶即從還禁中新紀書御延和殿閲保甲甲子知沅州謝麟言招溪洞中勝等州首領楊晟嚮等乞補授名目詔乞補奉職人與三班差使借職與下班殿侍殿侍與軍將軍將與守閲軍將麟又言凖詔已置托口小由古誠奉愛四寨而黔陽縣等並在腹裏謂宜減戌兵五百五十人即令防托新寨并乞置博易務拘收息錢四寨民性頑獷幸各安居已曉諭赴所屬寄納刀弩欲官為買之并溪江所産麩金欲募人淘采中賣以業遊手之民其城寨身丁稅乞特蠲放七年從之荆湖北路轉運判官髙鎛言古誠州歸明人楊晟堅昨詣謝納土乞屬湖北蓋晟堅懼麟修築城寨逼其巢穴所以乞屬沅州既而邵州使人招諭晟堅又乞屬湖南蓋晟堅嘗盜取向銀周妻子懼銀周在湖北來取其妻故又乞從邵州歸明乞密指揮沅邵州召晟堅詰問使歸銀周妻子仍徙置內地提點刑獄章楶亦言晟堅狡獪反覆乞詳酌處置詔晟堅係歸明人中頭角雖先與銀周有隙亦蠻人之常今朝廷已降指揮𨽻湖北正欲安存撫帖示以誠信今髙鎛章楶所奏全不曉邊事若稍有漏露致驚疑生事鎛楶當重有行遣并下孫頎謝麟照會孫頎是年九月四日丁亥以湖北運副知荆南此時必在湖北為運副也熙寧六年五月以湖南提刑措置梅山轉一官梓州路轉運司言都大經制瀘州蠻賊公事司牒將來入界大約四萬人騎內馬三千匹請據數約備八十日糧草隨軍同行本司相度須作家計朘削堡囤節次聚糧摺運且乞差雇夫五萬內本路四萬成都府路六千夔州路四千牛裸馬共一萬內成都府路五千本路四千夔州路千從之仍令所差雇人牛等先本路如不足於夔州路又不足方得於成都府路及軍行梓州路雇一夫其直三千多至四千夔州路稱是成都府路則加倍焉夫直據平蠻録乙丑詔河北路轉運副使賈青相度新建溪洞徽誠州𨽻屬湖南湖北於何路為便後青具道里以聞乃詔誠州治渠陽𨽻荆湖北路徽州為蒔竹縣𨽻湖南邵州要見問賈青緣由增入此前一月十一日初以朝奉大夫除河北運副或河字當作湖字更詳之誠徽𨽻屬自九月未并入此詔權罷河北路差官檢量根括地土候務開依令敕舉行己巳知定州建雄軍節度使韓絳知潁昌府知潁昌府資政殿學士韓維知定州尋以絳為西太一宫使維知潁昌如故六月二十八日絳為西太一使十三日維復知潁昌今并書權陜西路轉運使兼制置解鹽李稷言考究近日內外鹽鈔價平臣竊謂貴生於難得賤生於有餘自新法未行通取七年支鹽數目乘除每歲當三十六萬餘席故鈔之貴賤視有司鑄出之多寡新法以後鈔有定數起熙寧十年冬盡元豐二年通印給過一百七十七萬餘席而會問池鹽所出才一百一十七萬五千餘席尚有鈔五十九萬有餘流布官私則其勢不得不賤方鈔貴時可無益發及今價賤又未加收斂則盈虛消長之法未盡全備伏望特議少損鈔額仍令賤斂貴出以盡平凖之道所貴久而無弊詔候錢協點檢本路鹽回取旨林廣言乞令彭孫候到瀘州先與臣議進兵次第詔彭孫依前詔取間路進討與林廣協力照應席仲明墓志可考成都府利州路鈐轄司言梓州路欲造鐡蒺藜等已牒轉運司均與諸州製造然前者朝廷運瀘州軍器及本路凖備不少其韓存寶既未嘗深入討伐即所用必不多乞下林廣等計度見在數勿令過有須索詔經制司除以存寶用不盡數充用外約見今實用軍器製造仍下梓州路轉運司具析昨者關牒鄰路造軍器不奏因依詔親祠北郊並依南郊儀如不親祠即上公攝事仍别修定攝事儀制先是己詔從張璪議令禮院再加講求三年五月二日甲子判太常寺李清臣知禮院黃顔王仲修楊傑何洵直葉祖洽文及甫詳定禮文張璪李清臣陸佃皆列名具奏同判太常寺陳薦獨異而同知禮院曽肇亦微不同乃各上之薦言議者以天地合祭始於王莽稽之典禮有所未合故欲罷之臣竊有疑謹按周頌曰昊天有成命郊祀天地也前漢志載郊祀歌十九章其七章曰惟泰元尊媪神蕃釐説者曰泰元天神也媪神地神也第八章言涓選休成天地並况此天地同祀可以概見恐非自王莽始也夫國之大事莫大於天地宗廟之祀有其舉之莫敢廢也古者祀事皆天子親行降及後世事與古異或因或革各從所宜故多遣官攝事今聖朝郊廟之祭三歲一親行必先朝饗景靈宫薦饗太廟然後合祭天地於圜丘蓋參用舊章得禮之中而議者又謂親郊之歲夏至方丘之祀盛夏之時不可躬行宜遣冢宰攝事而罷冬至天地合祭臣亦謂夏至方丘之祀決不可躬行雖大備禮樂上公攝祭亦恐此議未能合古終不若天地合祭之日親執圭幣誠志內盡禮容外重也况天子父事天母事地既親禮天神而不親禮地祇質之情文深恐未安陛下聰明睿智聖學深博古今萬事無一不照其本源其歲親郊天地合祭之禮伏乞且循舊制以昭恭事三神肇言臣竊考周官大宗伯王不與祭則攝位後世祭祀人主不能一一親行今惟三年一郊上所親奉餘皆有司攝事則張璪請以夏至日命冡宰攝事北郊於禮固無不可至於樂舞之類亦當增所未備然臣於此猶竊有疑者蓋以天神地祇其體實均王者奉承不宜有異故經曰事天明事地察而周官冬日至則祀天夏日至則祭地非有隆殺之殊國朝以來三歲一見天地祖宗未嘗廢闕今冬至若罷合祭而夏至又以有司攝事則不復有親祭地祇之時於事天則躬行於事地則遣官以往其於父天母地之義若有隆殺此臣之所不能無疑者也夫夏至祭地此先王之所已行然論者乃謂方今萬乘儀衛加倍於古暑暍之時勢有未便臣竊思之古今雖殊寒暑之於冬夏其為天時一也惡寒憚暑其人情亦一也先王能以五月舉事而後世乃以儀衛之暴露為疑然則損儀衛之虛文以就躬事地祇之實施之於今宜無不可竊考近代故事後周隋唐皆嘗以五月祭地况以陛下之恭勤宜無所憚以陛下之明聖其於措置損益儀衛之類宜無所難臣愚故願陛下斷自聖心遇親祠南郊之歲以夏日至備禮躬親北郊以存事地之義以合先王之制而為萬世不易之法豈不盛哉夫守經而不知變臣愚之罪也以古誼迪上而不敢茍亦臣之職若論者猶以暑暍暴露為疑則不必拘以夏至而斟酌變通順天時之便第令無失躬事地祇之實則一代大典固有待於聖學非愚臣智慮之所能及也於是進呈肇等奏而降是詔判太常寺知禮院及詳定禮文奏狀姓名據曽肇集增入新舊紀並書詔罷南郊合祭天地自今親祠北郊如南郊儀不親祠以上公攝事樂舞如親祠新紀云有故不行則以上公攝事庚午陜西路制置解鹽司言解鹽歲增錢凖條作熟鈔召人衆買內六萬緡令三司封樁去年三司封樁歲增錢六萬緡凡為鈔九千七百五十一席今民間鈔多價賤若更變賣恐轉損鈔價凡鈔乞納三司更不出從之并所增經制轉運司合得六萬緡亦令納三司自今並權住給鈔壬申御崇政殿疏決繫囚舊紀云録京畿及三京囚降罪一等杖以下釋之詔前追官勒停人越州山隂縣主簿太原府教授余行之陵遲處死先是行之以廢黜怨望妄造符讖指斥乘輿言極切害定州教授潁州團練推官郭時亮詣闕告之知定州韓絳即收行之付獄詔開封府司録參軍路昌衡就邢州鞫之行之伏誅以時亮為通直郎召對時亮堅辭不受聽還舊任行之初繫獄上以問同修起居注陸佃對曰臣識其人是嘗為山隂主簿妻子皆不之顧何有於陛下上曰如此則妄人耳行之既伏誅因赦其妻子九朝通略云陸佃家傳曰上初有憂色既聞佃士對乃喜曰廖恩作過無足多慮今行之乃搢紳大夫而有此謀故朕甚憂之深恐朝廷紀綱有可窺覦者今聞卿言乃妄人耳行之獄具遂赦其妻子蓋王圭密為上言陸佃與行之甚熟故上問之此據陸佃本傳遣昌衡在二月二十七日新舊紀並書山隂縣主簿余行之謀反伏誅上批付涇原經略使盧秉近纍得邊奏諜報夏國變故秉常遇弒諸梁擅兵大酋數輩各懷去就上下洶亂興州左右新舊行牙造逆之臣與秉常故時親黨各擁兵自固斬絶河津南北阻隔未測勝負所歸若信如牒報則諸路當一體測見形迹然本路絶不聞問卿可速選委邊吏偵實以聞并下秦鳯環慶熙河河東經略司先是權鄜延路馬軍副都總管兼第一將种諤奏近諜報西夏國母屢勸秉常不行漢禮秉常不從有梁相公者與其叔母亦相繼勸之既而秉常為李將軍所激怒欲謀殺叔母與梁相公其言頗漏露梁相公與叔母共謀作燕會召秉常酒中秉常醉起於後園被害其妻子及從者近百人皆即時繼遭屠戮臣竊謂賊殺君長國人莫不嫌惡羌人遽然有此上下叛亂之變誠天亡之時也宜乘此時大興王師以問其罪仍願陛下假臣鄜延九將漢蕃人馬之外量益正兵選陛下左右親信中貴人為監軍同行文武將佐許臣自辟置止裹十數日之糧卷甲以趨乘其君長未定倉猝之間大兵直搗興靈覆其巢穴則河南河北可以傳檄而定故有是詔鄜延沈括秦鳯曾孝寬環慶俞充熙河苗授河東王克臣等以四月三日庚申奏此又奏見丙子日癸酉上批已遣王中正往鄜延環慶路體量經制邊事可密詔兩路經略司中正所須錢物於拊養庫不計多少畫時應副中正既行稱面受詔所過募禁兵願從己者將之而主兵之官不敢違至西京文彥博以無詔拒之中正亦不募而去朱本削中正募兵事蓋為中正諱也今依新本復存之甲戌上批已議於陜西河東五路聚集軍馬其錢糧器械中書樞密各委官盡數刷會凖備應副遂詔錢糧委檢正官器械委檢詳官各一員取索文字刷會乙亥上批聞同管勾陜西買馬司髙士言凡與蕃部交易動以惡言嫚罵之其儕類有怨色亦是阻其來馬一塗可令郭茂恂體量以聞詔權發遣度支副使兼措置河北糴便寋周輔兼提舉江南西路廣南東路鹽事其主行鹽事監司之不勝任者體量以聞置兩局於司農寺朱本云兩局止是周輔時暫置削去新本已復存之都大提點在京倉場司言汴河糧綱歲運六百餘萬石及司農寺起發淮浙四十餘萬石並於沿汴倉分納乞於萬盈廣衍兩倉增敖屋四百間詔遣開封府推官曽孝亷按視具圖以聞朱本刪去云後來檢到止令騰併事小不須載詔承議郎天章閣待制知慶州俞充追兩官降授通直郎免勒停職任如故朝請大夫知揚州鮮于侁追一官降授朝散大夫衝替坐舉知綿州神泉縣胡獻犯贓故也丙子新權京西路轉運副使朝奉郎李南公為河北路轉運判官以知諫院蔡卞言南公頃因棄妹不嫁管勾宫觀近及二年牽復當以漸故也南公除京西運副乃四月七日甲子今并書丙子十九日也鄜延路馬步軍副都總管兼第一將种諤言臣昨於今月庚申奏夏國秉常為賊臣所殺乞朝廷興師問罪今覘知秉常兵馬見聚於所居木寨國母與梁相公兵馬見聚於國母巢穴自木寨至國母巢穴約五里今已絶河梁南北人馬不通梁相公者已出銀牌點集未知從與不從臣前奏乘其君長未定國人離亂之際順興王師招討且兵尚神速機不可後况此西人叛亂鄰國孰不動心契丹自數年來歲嘗三四以拜禮佛塔為名欲假道興州而意在吞併其國西人平時已嘗患之况今國內有亂若聞中國棄而不顧或備而遲留萬一契丹乘此舉兵吞併易若反掌矣若西夏果為契丹所併則異日必為大患於中國故今此事繫朝廷為與不為決與不決耳所謂楚得之則楚勝漢得之則漢勝今西夏疆埸若歸中國則契丹孤絶彼勢既孤則徐為我所圖矣兵法曰先發者制人後發者制於人願陛下留神早運勝算此千載一時之會陛下成萬世大勳正在今日矣又言向者元昊將死遺言異日勢衰力微宜附中國誓不可脅從契丹中國仁愛而契丹負心若附中國則子孫安寧又得官爵若為契丹所脅則吾族被戮無孑遺矣此語國人皆知之至今相傳今朝廷討伐不惟易以成功西夏素已防拒契丹則必投戈歸命矣又言不必逺調兵賦止發本路九將兵裹糧出塞直趨巢穴兵尚神速彼未及知師已及境矣上批雖朝廷見遣王中正往體量確的情偽又慮兵機一失悔不可及宜先令沈括种諤密議點集兵馬告諭逆順招懷並邊主兵酋首以俟大兵併力仍未得便舉事先密具畫一以聞朱本刪去諤上言三十餘字云與壬申日文字相犯不須重載也今仍存之環州屬羌慕家族首領英博數縱火殺人官不敢問結連諸部欲為寇知環州張守約勒兵擒之及其黨三十六人餘遁入夏國守約駐兵境上取之居數日韋州監軍多葉執送叛者乃盡械英博等歸斬於環州市經略使俞充以聞上賜手詔曰慕家族屬羌前後屢干紀律俶擾塞下守將姑務撫綏玩成驕蹇邇者其酋不度時變踵前鴟張賊殺無辜嘯聚黨與非卿知果且招且誅俾有懲艾不然則自焚之禍殆不可救也此事載張守約及俞充本傳不得其時據御集環慶經略司奏張守約斫到背叛首領頭級并招降三千餘人歸族住坐乃四月十九日今附見秦鳯為俞充子承務郎次臯作紀云元豐元年八月詔以先臣充為天章閣待制環慶路安撫經略使三年四月環州肅逺寨慕家巴勒則等剽屬羌兵為亂攻殺旁族先臣遣第二將張守約走馬承受陸中招降之誅其不聽命者於是羌族始定而亡入夏國者凡三百人復遣守約屯塞上檄夏人使歸其衆夏人承命震恐以其衆歸初慕羌之叛也附置以聞有詔得亡者無小大長少皆即其地斬之至是斬其酋豪百二十有二人而録其脅從幼弱婦女百四十有二人請於朝詔皆原之既又别賜手詔褒諭先臣跪捧伏讀感激涕下退謂臣等曰我本孤生蒙上識拔寵遇如此自度無以報萬一惟與汝曹共誓捐軀而已明年先臣下世臣等銜奉遺訓夙夜隕越念無以致區區者輒求金石具刻明詔以為不朽之傳蓋亦先臣之念也昔唐相權德輿嘗讀文宗所賜手詔至流涕曰君臣之際乃爾邪臣以為萬世之後當有讀明詔而感動復如德輿者矣豈特今日為百執事之勸哉詔東南團結訓練諸將下兵五千人處置將副三千二百人處置單將其將官並以見任訓練官充合置副將處選差人充詔茶場司條令中書别立抵當法先是特旨市易司罷賖請官錢令民用金帛抵當公私以為便故欲推廣之北外都水丞陳祐甫言昨被旨令知深州孫民先及河北轉運司那官一員與臣同自衛州王供掃至海口案視大河故瀆緣臣本以孫民先嘗有奏議復修大禹舊迹故請案視今民先物故臣未敢往詔轉運司官同相視戊寅詳定禮文所言謹按禮記祭法曰埋少牢於泰昭祭時也詩雲漢曰靡愛斯牲周禮太祝注曰禬禜皆有牲是祈禱有牲也自後魏以來凡非大祀皆用脯醢酒幣而已故唐書志曰祈用酒醢古者惟士之賤有脯醢之奠豈禱祠大神供給鬼神而無氣臭以歆格神靈伏請凡祈禱郊廟社稷皆用少牢從之四年四月二十一日依奏己卯建雄軍節度使知定州韓絳言修保州城畢賜詔奬諭提舉河北東西路義勇保甲狄咨言被旨諸指揮兵級內有年髙病患年五十五以上有弟姪兒孫及得等樣令承替名糧竊見其中亦有不堪征役之人乞年四十以上許令承替詔河北馬步諸軍並依此詔知羣牧司封樁錢七千九百八十四貫有竒付殿前馬步軍司充諸軍弓箭手買置教閲射箭每人五十隻其軍中自來率備錢物悉令禁止庚辰鄜延路經略司言劉紹能等覘知夏國主秉常為李郎君所説招誘漢界倡婦樂人其國母置酒誘執李郎君等殺之詔備録劄與王中正照會應諸路奏到上件事凖此御史宇文昌齡言近以六察之法不加於中書樞密院嘗具敷奏未蒙指揮臣竊以中書樞密院為廢置豫奪賞罰號令之津要關制繩糾尤宜加察又言六察之法行於有司而不行於中書樞密院是委大綱治細目縱豺狼搏狐鼠也望檢會前奏施行不報壬午侍御史知雜事舒亶言執政大臣接見賓客已有約束而子弟往還看謁交接賓友未之禁止實於事體未安詔中書立法其後立法執政官在京本宗有服親非職相干及親屬不得往還看謁違者并往還之人各杖一百御史豐稷言權判刑部陳睦令議官代書法狀欺慢之罪會降原減案睦酣酒自逸臨事屢昏官屬辨明輕肆忿怒刑法之任尤非所長乞改授睦一間慢差遣不報甲申詔徙開封府界提點司於白馬縣提舉司於管城縣以御史滿中行言兩司之官名曰外任而治所在城中不務管職赴功惟以請謁奔競為事故也中書言勘會變運川峽路司農物帛等般運已至陜西有合變轉措置令逐路提舉司除銀并紬絹布依省樣可充支遣者存留其餘變轉移徙出賣或折博糴糧斛並於邊要州郡樁管限一年結絶川峽至陜西在路未般物帛慮有損失仰催促般運如闕鋪兵亦許雇人併力輦致所費錢並於變轉錢內支從之河北路轉運副使賈青言福建路山川險阻人材短小自來民間所用兵械與官兵名件制度輕重大小不同欲乞依本路民間所用兵械制造以備捕賊至於新招土兵所用槍刀排笠坐作進退法式亦乞依民間精巧之法於鈐轄司指使或有名槍仗手選差教閲臣今製造到槍刀排笠六物乞宣取進呈詔青於內東門進入乙酉澶州言河決小吳掃舊紀云乙酉河決小吳掃河東行久始決而趨北此當考詳增入又三年七月庚子當并考詔以瀛定澶州擬修盛貯封樁糧斛倉屋圖每州作兩倉修蓋付專切措置河北糴便寋周輔差官往彼度所宜建置處以聞八月十五日乃復滑州此云渭州字必誤今改作澶州九月二十七日云北京等處當考又此年三月十一日并六年七月十一日注並合參考或移六年六月十一日所注御集云云入此五月戊子涇原路經略司言本路弓箭手闕地九千七百頃以渭州隴山一帶川原坡地四千餘頃可募弓箭手二千餘人請佃户或不願應募乞如熙寧八年八月詔收其地入官及以逃亡弓箭手地均給田少之人詔渭州德順軍隴山一帶地令民依舊佃種納租見充弓箭手逃亡限滿不首獲者其地即與闕地弓箭手熙寧八年八月詔當考己酉以權判軍器監朝請大夫李立之權知澶州遣入內供奉官勾當御藥院竇仕宣監塞小吳掃決河馬軍副都指揮使燕逹都大提舉河北轉運副使周革言小吳掃決本州雖已發急夫六千人修塞續於鄰近差夫兵及舟運薪芻其所役人數亦少乞許發近便州軍役兵及於諸掃輟河清兵併力興功從之詔以小吳掃去年修閉不固令河北轉運司追劾當職官吏其南外都水監丞蘇液仍先衝替庚寅廣南路經略安撫使司言昨被旨賜錢六萬五千貫許人請貸出息及往外州回易以牟羡利專備經撫夷賊自後用錢興置雍州填乃等洞金坑每年採買金三千兩上供昨因軍興後人民貧乏回易利息全少金坑所出亦微細每年支費反倍於往日恐不免闕誤欲乞特賜度僧牒五百收錢添助為本詔止罷歲貢金詔濮陽郡王宗暉放罪宗暉坐受三陵都監朱交友所盜斫陵木造車為侍御史知雜事舒亶彈奏故也詔河決小吳掃已全奪過大河若止循例以三五千人急夫必不能塞方當蠶麥收成民力不宜妄有調發宜速令燕逹相度如有以東退背諸墉兵可發即更不差急夫其被水州縣民户令轉運司救護城郭并差官以船筏濟人仍令東西路提舉司速賑濟澶州言河決浸城水勢猛惡本州無兵差撥及無梢草乞剗刷本路兵五七百人及借支河掃場內樁千條梢二萬束本州豫買草四萬束從之甲午燕逹言小吳故道斷流今接近漲水河門口皆深闊墊塌未定難計功料未可修塞詔逹且發赴闕仍以權知澶州李立之權判都水監令立之自河陽至小吳決口點檢掃岸上批聞東南諸路自團立將兵以來軍人日親教閲舊習工作技巧以資私費者無暇為之及巡檢下就糧諸軍例得添支間能獲賊亦霑賞典今已招置土兵更不輪流出入亦是窒其衣食一塗由此軍中甚有貧極日不能糊口者可速博訪利害措置遂詔淮南兩浙江南荆湖福建廣南路轉運提點刑獄司密體量將兵自降教閲新法後軍士有無賠費以聞案閲淮南等路團結諸軍石得一等言江南東路淮南西路團結兵武藝生疏不依元法結隊逐隊呼名不相照應其提舉訓練官江南東路丁誨淮南西路趙永寧并管勾教閲官及押隊使臣弛慢乞施行詔丁誨趙永寧衝替餘俟定殿最畢取旨丁酉詔河東路提點刑獄劉定專賑濟河水災傷人民戊戌詔保州守上皇墳園户與免義勇保甲止令附保提舉捉殺瀘州蠻賊彭孫言楊光震斬獲宋阿訛等首級恐是詐妄詔朝廷欲多方賞募剪除乞弟其楊光震斬獲宋阿訛等首級假令不實朝廷猶當推誠不疑重賞激勵况已經南平軍追集人辨認保明朝廷已推恩賜令彭孫毋得更形疑外之意致光震等反側不能協力集事上批提舉開封界保甲司方措置團結教度之初王中正未回間宜令劉琯路昌衡應有疑難職事赴樞密院承旨司稟議若朝廷間有所欲知者承旨司暫追逐官取會劉琯同提舉府界教閲保甲在三月庚子路昌衡此月庚子以權發遣提舉府界常平除刑房檢正後此三日却未見提舉保甲時陜西轉運使都大提舉茶場李稷言臣典領茶法五年選辟官屬同心一力奉宣條詔今所差諸州官罷滿及期乞本司自今奏辟雅漢州知州卭彭利州通判名山永康綿谷順政知縣所貴維持法度久益不懈詔如轄下官弛慢止令茶場司奏易劾罪以聞己亥大名府路安撫使王拱辰言管下州縣被水之民散居高阜賊盜頗多難一一申請須法外斷遣詔犯盜雖暑月特令察其情重法輕者奏裁辛丑新權江寧府觀法推官鍾世美為承務郎中書户房習學公事癸卯判軍器監龍圖閣直學士太中大夫安燾降授中大夫坐與丞曽孝亷議事不協互論奏而大理推治燾所奏不實也恩州言河決澶州注入御河本州極危乞以州界退背諸掃梢草及河清兵支移赴本州其北岸都大使臣并諸掃巡河使臣亦乞令赴州部役從之其草令北外都水丞司量應副乙巳太中大夫知潭州謝景溫為通議大夫荆湖南路轉運副使朝奉郎直集賢院朱初平為朝散郎轉運判官朝散郎趙楊為朝請郎充祕閣校理朝奉郎權知邵州關把為朝散郎供備庫副使周士隆為西京左藏庫副使兼閣門通事舍人以招納修建徽誠州城寨之勞也於是初平自陳瓊管回而城寨功已畢乞免轉官從之詔成都府梓州路自今常平積剩并坊場司農寺合起發錢截自李元輔回日每年委提舉司易物帛赴陜西兩路提舉司重變轉於邊要州郡樁管詔內外市易務民户見欠屋業等抵當并結保賖請錢物息罰錢並等第除放其本錢三分季輸納息錢并出限罰錢分為三分等第除放第一季本錢納足者息罰錢並放第二季放二分第三季放一分出限尚欠即估賣抵當及監勒保人填納所催錢物在京於市易務下界在外提舉司封樁上批聞瀛州初未有黃河橫水至州界今見役急夫約一萬餘人過有張皇枉費民力宜令急放散自今非城壁堤岸甚急不得輒有差撥丁未詔知滄州降授中大夫集賢院學士蘇頌權判吏部候期滿取旨復官罷檢正中書孔目房吏房公事王陟臣復為度支判官先是頌得旨復太中大夫而知制誥舒亶言頌昨典治京師以孫純聨親故縱純貸僧錢不治聖恩寬大略從降黜及今未幾復有此除授而同知諫院蔡卞亦言宰相置掾以待公正有能之士陟臣身無特操才乏他長惟以從諛附貴茍且取容為事並乞特賜追寢故有是命戊申詔河東北路轉運司尋訪程嬰公孫杵臼墳廟所在以承議郎吳處厚言二人保全趙孤乞加封爵故也後轉運司言嬰杵臼墓在絳州太平縣西南趙大夫塋內及塑像在廟中詔嬰封成信侯杵臼封忠智侯於墓側别立廟載祀典吳處厚申請指言皇嗣當檢附新舊並書封嬰及杵臼神宗寶訓奬忠義篇四年監京東桕稅竹木箔場吳處厚奏臣嘗考趙氏廢興之本末惟程嬰公孫杵臼二人各盡死以保趙氏孤兒最為忠義請於晉趙分域之內訪求二人墓廟特加封爵旌表永為典祀詔念功追逺朝廷善教宜如所奏復訪求二人墓在絳州太平縣詔嬰封成信侯杵臼封忠智侯仍立廟載在祀典知熙州苗授言得西界大首領裕勒藏喀木文字稱夏國主母子以不協殺其宰相詔苗授遣人以本司意密説諭喀木云自三月以來諸路探報夏國變亂所説不一爾必詳知今河津南北阻隔人情去就次第可密語去人及寫一文字來為信仍令經略司以彼難得所急之物為信厚遺喀木己酉詔北外都水監丞陳祐甫特衝替以御史滿中行言祐甫與蘇液同閉小吳口澶州掃岸又屬祐甫地分今液以河決衝替不宜同罪異罰故也中書言刑房覆考試刑法官第一等一人欲充法官第二等下三人欲循一資第三等上十人與堂除第三等中八人與免試仍升一季名次第三等下十二人與免試從之庚戌皇子倜薨倜上第八子也母曰邢賢妃倜生四年薨廢朝五日又不視事三日追賜名贈太師尚書令封鄆王諡沖惠元年十一月生兩紀並書癸丑御史滿中行言開封府治蓋漸之獄漸有田宅質與樞密院都承旨張誠一質既虧元價而又不盡償直仍約將來贖田却取貴價贓貪不法何異冦攘而道路之言以為前知陽翟縣孫賁實為之地賁在任姦狀甚多昨因蓋漸家業檢校在官而賁輒違法轉易視如己物倍價而買半價而償下以應副親識上以交結權貴誠一為利所啖故數薦賁於朝案誠一職在樞府陛下左右之臣而馮恃權寵黷貨外交託公報私欺罔聖聽今聞開封府典獄官吏追逮證左而賁獨在所遺詔送開封府當求蓋漸起獄因依先著之紹聖元年十二月六日可考是年六月十三日可并此都大經制瀘州蠻賊林廣言差借職史利言齎文字付乞弟以取王宣下落及説諭蠻兵士為名隂視進兵之路勇徑可嘉詔史利言遷一官又詔廣問利言道路巢穴險易逺近及應有間見令具析畫圖以聞初利言抵乞弟巢穴乞弟遣其奴沙自阿義隨還獻馬四十匹并歸所虜兵士七人辭欵甚遜而利言具道乞弟降意蓋未決也利言本從納溪舟行所陳道路大軍進發訖不由此癸丑五月二十七日事甲寅知審官東院通議大夫吕公孺兼權判都水監代張唐民以御史滿中行言唐民素無風力加之罷老平時曠弛不以河防為意一有患則救護經畫朝廷悉遣他官唐民飽食安居處之自若恐非為官擇人之意故也三年正月十八日以兵部郎中張唐民屯田員外郎權發遣河北路提點刑獄劉定並權判都水監
