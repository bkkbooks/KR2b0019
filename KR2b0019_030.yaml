  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0019_WYG_030-1a, image: WYG0314/WYG0314-0379a.png}
body:
  text: 續資治通鑑長編卷二十六宋李燾撰太宗雍熙二年春正月癸亥翰林學士賈黃中等九人權知貢舉上謂宰相曰夫設科取士之門最為捷要然而近年籍滿萬餘人得無濫進者乎己巳詔自今諸科并令量定人數相參引試分科隔坐命官巡察監門謹視出入有以文字往復與吏為奸者置之於法私以經義相教者斥出科場伍保預知亦連坐進士倍加研覆貢舉人勿以曾經御試不考而薦始令試官親戚别試者凡九十八人又罷進士試律復貼經上覽諸道轉運副使知州通判奏章有不聨名者謂宰相曰當官共事須叶心從長且條陳利害動輒變改今不聨名此必任其獨見未為允當也二月戊寅下詔戒之丙戌上謂宰相曰朕覽史書見晋髙祖求援于契丹遂行父事之禮仍割地以奉之使數百萬黎庶陷于契丹馮道趙瑩位居宰輔皆遣令持禮屈辱之甚也敵人貪婪啖之以利可耳割地甚非良䇿朕每思之不覺歎惋宋琪等奏曰晋髙祖遣馮道奉使張筵送之親舉酒灑涕曰達兩君之命交二國之歡勞我重臣之彼窮塞息民繼好宜體此懷勿以為憚也及道回有詩曰殿上一杯天子泣門前雙節國人嗟方今亭鄣肅清生靈安泰皆由得制禦之道恢復舊境亦應有詩上然之己未上御崇政殿覆試禮部貢舉人得進士須城梁皓等百七十九人庚申得諸科三百一十八人並唱名賜及第唱名自此始此據登科記宰相李昉之子宗諤參知政事呂䝉正之從弟䝉亨鹽鐡使王明之子扶度支使許仲宣之子待問舉進士試皆入等上曰此並勢家與孤寒競進縱以藝升人亦謂朕為有私也皆罷之青州人王從善應五經舉年始踰冠自言通誦五經文注上厯舉本經試之其誦如流特賜九經及第面賜緑袍銀帶錢二萬時左右獻言尚有遺材壬戍復試又得進士上元洪湛等七十六人癸亥得諸科三百二人並賜及第夏四月丙子復置明法科分周易尚書各為一科附以論語孝經爾雅三小經毛詩專為一科明法亦附三小經進士九經以下更不習法書又以鎖㕔求試者率多繆濫始令諸道州府自今擇才學優茂而厯官無過者乃舉之仍先奏俟報是日召宰相參知政事樞密三司使翰林樞密直學士尚書省四品兩省五品以上三館學士宴于後苑賞花釣魚張樂賜飲命羣臣賦詩習射自是每歲皆然賞花釣魚曲宴始于是也此據㑹要賞花賦詩已見雍熙元年三月五月庚午中書門下奏謫官在外而纍經赦宥者欲令歸闕責其後效上不許謂宰相曰朝廷致理當任賢良君子小人宜在明辨大扺人君宜先自正其身亦如治家身不正則家亂矣故聽讒邪之言則骨肉至親坐成離間豈能致敦叙之道歟大小雖殊其致一也今海島瓊崖逺惡處甚多竄逐之臣郊禋以來豈不在念然此等務行巇嶮若小得志即復結朋植黨恣其毁譽如害羣之馬豈宜輕議哉選舉志言詔從其請蓋誤也六月己卯詔兩街供奉僧于內殿建道場上謂宰相曰今兹夏麥豐稔比聞嵗熟則民多疾疫朕恐百姓或有災患故令設此未必便能獲佑且表朕勤禱之意云丙戌命右諌議大夫劉保勳兵部郎中楊徽之屯田郎中孔承恭與判吏部流內銓王祐同就尚書省以新及第進士諸科名次先後鄉里逺近之便注擬自是為定例秋七月上謂宰相曰國家以百姓為本百姓以食為命故知儲蓄最為急務昨江南災旱甚凶遣使振貸果無流亡盜賊之患若非積聚何以救之庚申詔諸路轉運使及諸州長吏專切督察如倉官吏等依時省視倉粟勿致毁敗其有計度支用外設法變易或出糶借貸與民及轉輸京師如不省視而致損官粟者雖去官猶論如律鼎州言江水溢害稼八月庚辰上謂宰相曰朕于獄犴之寄夙夜焦勞比分遣使臣按巡諸道蓋慮或有寃滯耳因思新及第進士為司理參軍彼于法律固未精習冝令諸州長吏視其不勝任者于判司簿尉中兩易之癸巳上謂宰相曰近代以來政理隳紊無如晉漢兩朝外則侯伯不法恣其掊斂內則權幸用事貨賂公行百姓未納王租先遭率斂縣中官吏歲有年常之求鎮將人員時為乞索之局鄉胥里長更迭往來嗷嗷蒸民何所告訴欲望天道順和其可得乎近年以來頗革此弊臣寮守法兆民舒泰雖未能還淳反朴亦可謂之小康矣每念百姓寒耕熱耘營求衣食國家若非贍養軍旅兩稅亦不忍催督而况非理誅剝乎宋琪等對曰陛下恤民求理取鑒晉漢實天下幸甚㑹要十一月有戒官吏乞取錢物年常節儀酒肉米麵等詔委轉運使與長吏採訪聞奏仍附十一月末九月初涪王廷美既得罪楚王元佐獨申救之上不聽廷美死元佐遂感心疾或經時不朝請龍川别志言太宗將立元佐為嗣元佐堅辭欲立太祖之子由是遂廢故當時以為狂按太祖二子德昭卒于太平興國四年八月德芳卒于六年三月而元佐以七年七月出閣時太祖之子無在者矣元佐雖封衛王蓋未嘗有建儲之議也九年正月廷美死元佐乃發狂固不緣辭位别志誤矣司馬光日記載宋敏求云廷美之貶元佐請其罪由是失愛日記蓋得其實也屢為殘忍不守法度左右微過必加手刃僕吏過庭往往彎弓射之上誨甚厲皆不悛是嵗夏秋疾其上深以為憂是月疾小愈上喜因降德音庚戌重陽召諸王宴射苑中而元佐以疾新起不預至暮陳王元佑等過之元佐謂曰汝等與至尊宴射而我不預焉是為君父所棄也遂發憤中夜閉媵妾縱火焚宫遲明烟熖未止上意火必元佐所為也令攝赴中書遣御史按問置巨校於前元佐恐懼具對以實上遣入內都知王仁睿謂曰汝為親王富貴極矣何凶悖如是國家典憲我不敢私父子之情於此絶矣元佐無以對陳王元佑以下洎宰相近臣號泣營救上涕泗謂曰朕每讀書見前代帝王子孫不率教者未嘗不扼腕憤恨豈知我家自有此事朕為宗社計斷不捨之遂下制廢為庶人送均州安置顧謂宰相曰比者內外安寧方思自適而元佐縱火實撓朕懷宋琪等曰堯舜有丹朱商均此不足有纍聖德元佐茍無心疾當不至是惟陛下開釋丁巳琪等帥百官伏闕拜表乞留元佐京師詔不許表三上乃許之元佐行至黃山召還置于南宫使者監護不通外事楚王府咨議趙齊王遹翊善戴𤣥以輔導無狀皆請罪上曰朕教訓猶不從豈汝等所能贊導耶並釋不問冦凖通判鄆州得召見太宗謂曰知卿有深謀逺慮試與朕决一事令中外不驚動此事已與大臣議之矣凖請示其事太宗曰東宫所為不法他日必為桀紂之行欲廢之則東宫亦自有兵甲恐因而招亂凖曰請某月日令東宫至某處攝行禮其左右侍衛皆令從之陛下搜其宫中果有不法之事俟還而示之隔左右勿令入而廢之一黃門力耳太宗以為然及東宫出因搜其宫中得淫刑之器有剜眼挑筋摘舌等物還而示之東宫服罪遂廢之選立章聖為太子自是太宗眷凖益厚此張唐英所著仁宗政要冦凖傳所載也傳聞謬誤一至于此蓋因廢元佐事耳淳化三年十月罷恭孝太子元僖冊禮則緣惑嬖妾張氏初無淫刑事也唐英書世多有之謬誤不獨此不可不辨九月虞部郎中知制誥鄭人韓丕有文行朝廷稱為長者然誥命應用傷於稽緩一夕頒詔書甚急丕停筆既久問索舊草吏以本典扄户出宿不可搜檢丕乃破鎖取改易而進宰相宋琪性𥚹急常加督責或申以諧謔丕不能平中書舍人王祐以前輩負氣多凌辱面折之乃表求外任閏九月甲戌丕罷知虢州上覽雍管雜記歎其風俗乖異乙未詔嶺南諸州民嫁娶喪葬衣服制度委所在長吏漸加誡厲俾遵條例其殺人祭鬼病不求醫僧置妻孥等事深宜化導使之悛革無或峻法以致煩擾己亥坊州獻一角獸上召近臣觀之咸奏曰按瑞應圖牡曰麒牝曰麟昔嵐州進麟也此乃麒也請宣示中外上不許但令豢於苑中遂其飲齕之性且謂宰相曰時和年豐兆民安泰斯為上瑞鳥獸草木夫何足云冬十月辛丑朔上録京城諸司繫囚多所原減決事遂至日旰近臣或諫以勞苦過甚上曰不然儻惠及無告使獄訟平允不致枉撓朕意深以為適何勞之有因謂宰相曰中外臣寮若皆留心政務天下安有不治者古人宰一邑守一郡使飛蝗避境猛虎渡江況人君能惠養黎庶申理寃滯豈不感召和氣乎朕每自勤不怠此志必無改易或云有司細故帝王不當親決朕意則異乎此若以尊極自居則下情不得上逹矣十一月辛卯詔自今京官幕職州縣官有丁父母憂者並放離任常參官奏聞待報然其後亦頗有特追出者十二月上謂李昉等曰中書樞密朝廷正人所出治亂根本繫焉且天下廣大卿等與朕共理當各竭公忠以副任用人誰無姻故之情茍才不足稱不若遺之財帛耳朕亦有舊人若果無取未嘗假以名器也卿等其戒之開寶中賊攻繡州知州饒陽王恕死焉恕子濟時從行賊將并害之濟擁尸號慟謂賊曰吾父已死吾安用活為但恨力不足殺汝以報父讐耳賊感其言捨之濟遂拾父骨匿山谷間既而官軍大集濟脫身謁其帥朱乙陳討賊之計乙嘉其誠遺以束帛奏假驛置而歸先是濟母終於嶽陽權殯佛舍并獲二喪還饒陽州將以聞太祖召見為其尚少且俾就學於是上書自陳死事之孤得試學士院補龍溪主簿時調福建輸鶴翎為箭羽鶴非常有物官督責尤急至一翎直數百錢者民甚苦之濟以便宜諭民取鵝翎代輸驛奏其事因詔旁郡悉如濟所陳
