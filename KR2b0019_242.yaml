body:
  text: 續資治通鑑長編卷二百三十八宋李燾撰神宗熙寧五年九月丙午朔兵部員外郎李復圭權判吏部流內銓復圭前坐生事責知光化軍於是御史張商英言夏人積謀聚兵犯塞之日久矣與破金湯適相會非復圭生事也故召用之吏部銓舊制職官注擬上下超折不過一資而選人閡於資序注擬不行復圭奏乞通注權入各理本資俸選集者便之復圭奏乞通注據復圭紀聞附見當考詔以摩正弟結斡延正為禮賔副使鎮洮河西一帶蕃部鈐轄初秦鳳緣邊安撫司言摩正自觀凌城敗走結斡延正舉其族二千餘人并大首領李楞占訥芝出降已量補職名撫遣之因言延正可遂授一官使統部族收其用故有是命後又封其母實壘卒為永安縣太君賜以器幣新舊紀於前月甲辰書王韶破摩正于觀凌城按甲辰非本日既因新舊紀載前月甲辰仍增奏字今因結斡延正授官又出之更須考詳權三司使薛向言延秦慶渭等九州舊皆有折博務召商人入芻糧錢帛償以解鹽嵗收緡錢一百六十六萬而秦州當四十萬今割秦之古渭寨以為通逺軍兼新城鎮洮軍皆未有折博務故商旅未行臣愚以為並邊新造之地宜有儲積以待警急願以其事下張詵張穆之使並置折博務仍分十五萬與通逺七萬與鎮洮從之雄州言北界欲以兵來立口鋪文彥博蔡挺等欲候其來必爭令拆却上曰拆却若不休即須用兵如何挺曰不得已須用兵上以為難曰彼如此何意也王安石曰或是因邉吏語言細故忿激而為此或是恐中國以彼為不競故示彊形或是見陛下即位已來經略邊事以為更數年之後中國安彊有窺幽燕之計即契丹無以枝梧不如及未彊之時先擾中國以為絶遲則禍大絶速則禍小故欲絶中國外連夏人以擾我上恐其計不及此安石曰敵國事豈易知茍有一人計議如此而其主以為然則遂有此事矣上曰何以應之安石曰今河北未有以應契丹未宜輕絶和好若彼忿激及示彊而動即我但以寬柔徐緩應之責以纍世盟誓信義彼雖至頑當少沮少沮即侵陵之計當少緩因其少緩我得以修備大抵應口鋪事當寬柔徐緩修中國守備當急切以臣所見口鋪事不足計惟修守備為急切茍能修攻守之備可以待契丹即雖并雄州不問未為失計若不務急修攻守之備乃汲汲爭口鋪是為失計吳充言當愛惜財用間處不要使却緩急兵食最急安石曰兵食固不可之然非最急今河北連嵗豐熟民間非無蓄積緩急要兵食即民間蓄積便是兵食雖有兵食以何人為兵雖有兵以何人為將緩急有事陛下如何應接一事應接失機便繫中國安危當擾攘之時陛下自度應接能昭然無所疑誤否此所以難輕用兵也樞密院退安石曰上宜修河北守備上曰除什伍百姓安石曰獨此可以為守備上曰誰可使安石曰不得已須令曾布去上乃欲韓縝為帥令了此然亦不果安石又白上天下事有緩急如置口鋪是生事人所罕見故陛下亦以為憂如河北都無以待契丹是熟事人所習見故陛下亦不以為慮臣以謂人所罕見者乃不足慮人所習見者乃足憂足憂宜急不足慮宜緩上以為什伍百姓如保甲悠悠難成不如便團結成指揮以使臣管轄安石曰陛下誠能果斷不恤人言駭擾縱有斬指斷臂何患譬如有契丹之患而不能勝即不止有斬指斷臂之苦而已即便團結指揮亦無所妨然指揮是虛名伍百人為一保緩急便可喚集雖不名為指揮與指揮使無異乃是實事幸不至火急即免令人駭擾而事集為上策又白上曰秦漢以來中國人衆地墾闢未有如今日四夷皆衰弱數百年來未有如今日天其或者以中國久為外夷所侮方授陛下以兼制遐荒安彊中國之事天錫陛下聰明非不過人但陛下用之於叢脞而不用之於帝王大略此所以未能濟大功業也開國承家小人勿用小人所知淺近必不能濟國家須君子臣以謂陛下待君子當使之無所嫌疑得自竭盡乃能濟國事上以為兵須久訓練乃彊安石曰齊威王三年酣飲不省事一旦烹阿大夫出兵收侵地遂霸諸侯人主誠能分别君子小人情狀濟以果斷即兵可使一日而彊陳瓘論曰安石勸神考兼制遐荒則奏曰四夷皆衰弱數百年來未有如今日及論神考包置契丹不得則又奏曰四夷人衆地大未有如今日契丹兩對所論同一契丹取快而言乍强乍弱况隨其喜怒而論君子小人哉丁未詔鎮洮軍獻木及運木蕃部並優與價錢仍自今應役使及有所獻並酬其直詔文思副使李景倩供備庫副使王敞各降一官坐為成都府路都監所轄兵謀欲行劫而不覺察故也御史張商英言近日典掌誥命多不得其人如陳繹王益柔許將皆今之所謂辭臣也然繹之文如欵段逐驥筋力雖勞而不成步驟益柔之文如野嫗織機雖能成幅而終非錦繡將之文如稚子吹塤終日喑嗚而不合律吕此三人者恐不足以發揮帝憲號令四海乞精擇名臣俾司詔命不報先是上謂王安石曰直舍人院文字如許將殊不佳安石曰將非但文字不過人判銓亦多生疏不曉事為選人傳笑臣怪陛下拔令直舍人院不知何意上曰止為將狀元及第安石曰陛下初未嘗以科名用人何獨於將如此安石又曰制誥誠難其人然於政事亦非急切上曰說事理不明不快人意要當審擇又問起居注見闕何人可修安石曰吕惠卿喪欲除上曰惠卿最先宣力安石曰非為其宣力如此人自當擢用上曰惠卿勝曾布此段見日録七月二十七日今附見馮行已體量雄州事以為添差弓手騷擾百姓百姓怨咨故引北人巡馬過河上曰弓手果騷擾文彥博曰行已不曉邊事我界內添差弓手如何乃云創生安石曰舊無今有即創生也先是雄州差北界口鋪人戶借車般銀絹涿州不聽樞密院欲牒涿州稱誓書內明言屬南朝口鋪慶厯間北界不合修請詳纍牒毁拆僉以為如此示以必爭舊口鋪猶欲拆毁即必不敢更立新口鋪也王安石曰契丹欲移口鋪其事有無未可知若果有之緣張利一生事故如此今罷却利一差馮行已行已到後正是北人觀其舉措之時若有依前妄占兩屬地稱是南界所管又令拆慶厯五口鋪即與張利一生事無異何由使契丹帖息彥博固爭以為自來須如此國不競亦陵安石曰若要用壯亦柔之俟其不可柔服然後用壯即曲在彼彼或自反若便用壯恐不能止其爭氣上以為馮行已初至正是愛惜人情之時又恐更生契丹疑惑遂至交兵彥博曰交兵何妨安石曰河北未有備如何交兵無妨彥博曰自養兵修備到今日如何却無備上曰朕實見兵未可用與契丹交兵未得彥博曰契丹若移口鋪侵陵我如何不爭安石曰朝廷若有逺謀即契丹占却雄州亦未須爭要我終有以勝之而已彥博曰彼占吾地如何不爭占雄州亦不爭相次占瀛州又不爭四郊多壘卿大夫之辱安石曰太顛閎夭之徒為文王卿大夫文王事昆夷不以為辱以為昆夷强非由我不素修政刑以致如此故也要之吾終有以勝昆夷而已自古大有為之君其歙要録作翕字張取與必有大過人者非特中國雖四夷之雄亦必如此冒頓鄰國請其所愛閼氏乃曰與人鄰國奈何愛一女子至請棄地乃發兵遂滅鄰國其操縱如此此所以能當漢髙也若但一口鋪尺寸之地而必爭恐非大有為之略吳充曰冒頓至請棄地即必爭安石曰臣所論者以為當如冒頓知歙張取與非以為如冒頓爭地也彥博曰須先自治不可略近勤逺安石曰文彥博言須先自治固當若能自治即七十里百里可以王天下孟子曰未有千里而畏人者也今以萬里之天下而畏人只為自來未嘗自治故也上曰呼契丹為叔契丹鄰敵乃呼為皇帝豈是不畏彼嵗賜與金帛數千萬已六七十年六七十年畏契丹非但今日彥博曰吾何畏彼但交兵須有名如太祖取河東亦須有蠟書之事上曰患無力豈患無名因言太祖答江南使人事安石曰茍非無力便取幽燕不為無名陛下以堯舜文武有天下肯終令契丹據有幽燕否彥博曰要服契丹即先自治當令人臣不為朋黨安石曰小人乃為朋黨君子何須為朋黨言天事則有命言人事則有義義命而已何須為朋黨彥博曰言有義命者未必知義命安石曰君子小人情狀亦易考但誕謾無義理前言不復於後後言不掩於前即是小人忠信有義理言可復即是君子若果是君子即須同心蓋國所以固以有人故曰無競維人人所以强以同心故紂有億兆夷人離心離德即為武王所勝武王有亂臣三千惟一心即能勝紂三千人一心非為朋黨也髙宗誡傅說惟暨乃僚罔不同心以正乃辟髙宗非教傅說為朋黨但同心為義即是武王所稱髙宗所誡同心為不義即是朋黨若共國不務同心即國事何由成彥博曰人所見豈可盡同上曰天下義理豈有二也上卒從安石言改定牒本王安石又言既立結斡延正即須處分王韶招捉摩正然後蕃部無向背專附延正文彥博曰如此指揮即須計究竟如何若摩正不受代須加討伐恐用兵未已安石曰摩正一羈旅無助蕃人投夏國即環慶羌人夏國尚不敢納豈敢納摩正必須執送無疑若歸董戬即素有嫌隙以窮歸之必不得所其勢招之必降不降亦何能為洮東自來無主如闌遺物摩正尚不能取今我已占認彼何能復取計摩正窘即衆不敢附寬即衆未敢叛彥博曰略近勤逺非義且今已深入險阻費饋運不可不計究竟如何安石曰秦漢已後事不足論如詩稱髙宗奮伐荆楚罙入其阻如火烈烈則莫我敢遏非是不入險阻如火烈烈其師必衆師衆必用糧食非是不費饋運如鎮洮更自是中國地久為外夷所陷今來經營亦自不至勞費上以安石言為然戊申詔秦鳳路緣邊安撫司曉諭摩正限一月降放罪仍優與官爵不從即多設方略禽討并以內殿崇班及賞錢五千緡募人捕送用王安石之言也又詔陜西緣邊蕃部地土許典賣租賃六年五月二十九日漢戶聽典賣夷人田崇儀使同管勾外都水監丞程昉為西作坊使大理寺丞李宜之為右贊善大夫駕部貟外郎知洺州黃秉與堂除差遣論修漳河之勞也己酉宣政使入內副都知張茂則為宣慶使入內都知庫部郎中宋昌言虞部郎中王令圖並遷一官西作坊使程昉為皇城使端州刺史論塞大名府永濟縣決河之功也先是新堤之掃六決者二下屬恩兾貫御河奔衝為一上憂之自秋迄冬數遣使經營於是人爭言導河之利獨茂則等以謂二股河地最下而舊防可因今堙塞者才三十餘里若度河之湍浚而逆之又存清水鎮河以折其勢則悍者可回決者可塞用力寡而收功速時議者皆以為非而轉運使且以材乏為憂上獨命茂則等董役而使昉營材於並河諸州或取於公或售於私人不加賦而諸河之費已給自五年二月甲寅始事四月丁卯訖功而河深十一尺廣四百尺方浚河則稍稍障其決水至河成而決口亦塞故有是命此朱本所增蓋因河渠志也新本亦用之昉營材於並河諸州或取於公或售於私人不加賦而河費給此語更須參考茂則嘗建言熙寧二年未閉斷二股河北流有荆家鵲城銘房四掃在二股河西北周匝五十餘里大河行流在此隄掃之下自閉斷北流接續下約於二股河北岸起立隄防上流逼近河身已次東北隄道逺處去河止一二百步或一二里夏津縣東隄河相去差逺其上流北岸第一第二掃北經恩州界水漲時溢岸水至隄腳下雖已增修隄道槃木岸及捲掃固護今荆家鵲城銘房四掃在舊隄五十里可以於房家掃下相度地形髙仰處接隄一道簽上北岸新隄用為遙隄可以助二股河上流北岸近河新隄以防決溢可免大名府及御河至恩冀深瀛等州軍水患本志五年八月茂則言此在賞功前今附見賞功後王安石欲除程昉押班上不可曰昉固盡力然性氣不中又好把持人安石曰陛下聰眀有此一蔽惟象共善柔能窺伺陛下眉睫之間為欺者陛下乃以為忠良臣以為害陛下政事乃在此輩人若剛强孟浪之人必不能害政今昉功狀如此與一押班固當若疑不可親近第專令在外勾當可也上曰侍中珥貂取其溫柔安石曰書以為僕臣正僕臣要正亦不專取溫柔况陛下所謂溫柔又或象共誕謾非實溫柔上終不許樞密院言河北義勇雖占籍以萬數然其間老疾小弱甚衆向因災傷流移而又權罷教閲無由見合去留人數欲因今冬大教要録作閲字委官司驗試如實有不任征役之人並給公憑放免從之上欲修河北弓箭社曰須得人人欣賴乃可為王安石曰但令豪傑欣賴即能驅率衆人若要人人欣賴恐無許多官職財物應副若豪傑欣賴驅率衆人衆人成俗則法立而不可廢今召人飲食尚有倦而不赴者况欲什伍之使從我進退豈有人人欣賴之理如畿內事以近故為異論所搖陛下以為疑如金君卿在江西作保甲以逺故異論不到陛下左右陛下又何嘗疑其擾事須以道揆不須聽無稽之異論馮京曰河北義勇十八萬自足何須做弓箭社安石曰河北義勇收人戶不盡河北有許多地有許多人何故只令十八萬人習兵為義勇而不可令盡習兵馮京曰須是丁多方可令習兵安石曰弓箭手不知用丁多少京曰亦須丁多乃入社安石曰今義勇尚只用兩丁如何弓箭社却要丁多臣以為用兩丁為義勇更令逺出上番却於民不便然見今如此施行京曰臣在太原日若糾得兩丁即令替安石曰臣讀義勇敇初刺時已或奏稱兩丁並已刺盡見今條貫須單丁乃許替不知太原何故兩丁却許糾替上令討論修弓箭社法安石曰弓箭社部分不如府界保法當如今府界保法修定京曰義勇已有指揮使指揮使即是鄉豪如又作保甲令何人為大保長安石曰古者民居則為比比有比長及用兵即五人為伍伍有伍司馬二十五家為閭閭有閭胥二十五人為兩兩有兩司馬兩司馬即是閭胥伍司馬即是比長但隨事異名而已今令三丁即為義勇與兩丁之家同籍為保甲居則為大小保長征戍則為義勇節級指揮使此乃三代六鄉六軍之遺法此法見於書自夏以來至於周不改秦雖決裂阡陌然什伍之法尚如古此所以兵衆而强也近代惟府兵為近之唐亦以府兵兼制遐荒安强中國監于先王成憲其永無愆今捨已然之成憲而守五代亂亡之遺法其不足以致安强無疑然人皆恬然不以因循為可憂者所見淺近故也為天下決非所見淺近之人能致安强也上以為然兵志云上遂欲變三路義勇如府畿保甲馮京云云據日録乃是討論弓箭社法今從日録辛亥河東路安撫司言府豐等州蕃兵續入隊丁壯有下戶無力者欲乞禦賊器械並從官給常時與免上番從之編排三司帳案所言太宗尹開封日移牒三司有御筆見存詔送天章閣壬子詔司農寺出常平粟十萬石賜南京宿亳泗州募飢人浚溝河遣檢正中書刑房公事沈括專提舉仍令就相視開封府界以東沿汴官私田可以置㪷門引汴水淤溉處以聞癸丑以右監門衛大將軍令鑠為職方員外郎宗室試換文資自令鑠始令鑠太祖五世孫安定郡王世雄子也雄從藹第四子也新舊紀並書初聽宗室試換文資光祿寺丞黃履為館閣校勘履邵武人治平末得㫖召試㑹履丁憂及是乃命之丙辰詔江淮等發運司隨行移用錢物撥還三司內藏庫外支銀一十萬兩絹一十五萬匹與陜西轉運司計置鎮洮通逺軍糧草丁巳詔以新築策繖丕勒堡為慶平堡通鎮洮軍路置三班使臣二員管勾環慶路經略使王廣淵言乞依治平二年未有邉事日存留東兵人數從之禮院言劉永淵請於瓊林苑藏冰更不運致往冰井務仍罷監務官就委瓊林苑官主之而司天監議於隂陽書無害兼在禮典亦無方位從之先是上以此問王安石曰於經取氷須深山窮谷涸隂沍寒不言有方所上以為然六年七月十二日可考翰林侍讀學士提舉鴻慶宫鄭獬卒夏國宥州牒延州言王韶築城堡侵奪舊屬夏國蕃部上曰西人何敢如此令作牒報之及樞密院呈牒本上令稍回互數字王安石曰甚善然夏國一婦人一兒子一困敝小國乃敢先自違越加不直於我所以報之不當遜屈上曰彼或來作過安石曰若作過即全無計算何足慮馮京曰恐助摩正以兵必不敢公然入冦安石曰方事未集之時不能早助摩正今摩正已敗散洮西人爭附我乃始助摩正其無謀可知上曰彼不能舉國來若舉國來即鎮洮未易當安石曰舉國來亦不妨彼新納誓國人皆喜於息肩我自於西蕃築城堡無預夏國事若舉國來則國人必不自直且不樂行此符堅所以不能取勝也縱彼能破我通逺我亦未足為憂况如通逺未易可破彼舉國來欲何求若我自開邉無預夏國事而夏國輒來按據我便畏之即何以保守中國疆界乎庚申祕書丞盛陶為監察御史裏行陶新鄭人中丞鄧綰所薦也先是李舜舉言探得契丹無移口鋪意鄉巡弓手擾害百姓百姓恐故間牒北界有巡馬事今已罷鄉巡又雄州屢移牒北界令約束巡兵乞覔飲食巡兵亦不敢擾邉民邉民甚安又言張利一妄以每嵗民牽牛入城為避賊又因責兩屬百姓指說北界巡兵盜猪百姓恐巡兵挾恨報復遂移居利一因以為巡兵驚動百姓又言容城令尉以兩屬戶不即申巡馬過河一決二十人問一僧見巡馬否僧云不見又決之凡如此妄決非一人上曰鄉巡果如此擾害生事耶王安石曰固然上又曰令尉何敢妄決人此必利一使之舜舉乃言不當便罷鄉巡弓手須與北界商量亦令罷巡兵又恐邉民姦猾復教北人移口鋪欲呼北界官吏諭之安石固以為不用如此若召而不至至而不聽則於體非宜蔡挺曰向趙用事彼理直故肯來今我理直彼未必肯來共議也上曰此皆張利一生事安石曰利一罪狀明甚觀令尉所為如此若利一奉法循理令尉何敢然令尉如此妄決人不㸃檢顧㸃檢北界巡兵乞覔飲食巡兵乞覔飲食百姓自怨北界預我何事為湯武毆民者桀紂彼專為暴我專為德是北界毆民歸我也今乃縱我人為暴助彼人為德非邉吏善計也上曰聞利一欲殺巡兵賴其早替幾至生事於是降利一為皇城使達州刺史衛州鈐轄仍以失察趙用擅越界河折傷兵級坐之新舊實録並於閏七月十二日書利一衝替後仍坐趙用擅越界河折傷兵級降皇城使逹州刺史不得其時今據王安石日録附見于此衛州鈐轄則據本𫝊本傳亦云利一坐失察趙用與實録同而日録所書月特異不知何故今兩存之當考六年三月丁未孫永知開封更詳之辛酉詔秦鳳路重修甘谷城及移通渭寨防托部役使臣等各與減磨勘三年并賜銀絹有差右武衛大將軍連州刺史叔敖為文州團練使右監門衛大將軍叔彖為雅州刺史以學士院試經義入等也詔武學生試大義十道分兩場從御史劉孝孫請也後試武舉人亦如之癸亥詔輔臣觀稻于後苑上謂王安石曰聞王韶有書與吕公弼患諸人行遣不一此必李憲王中正與韶異同安石曰不知三軍之權而同三軍之任則軍疑軍事最惡如此上曰憲已召還中正須修城了亦召還安石曰甚善因言今不取夏國則四夷旅拒如今日非所以寧息中國然常人不可與慮始此乃陛下所宜留意遂指陳經略之方曰破秉常與破摩正無異也上曰王韶能辦此否安石曰陛下若能任人則何獨王韶韶亦自能辦此又白上宜密使人厚撫夏國所執送韓道喜李崇貴等異時可用也上以為然丙寅少華山崩此據吕大防奏新舊紀又云賜壓死者家錢不能葬者官為葬祭之地産因山變計口給田貸以錢穀今移入十月三日并五日丁卯詔以淮南路分東西兩路揚亳宿楚海泰泗滁真通十州為東路夀廬蘄和舒濠光黃八州無為軍為西路此據五朝㑹要增入詔比差章惇經制梅山蠻事今令知潭州潘夙荆湖南路轉運副使蔡燁與惇協力處議毋致誤失梅山蠻素凶獷數出抄掠漢界嘉祐末鼎州人張頡知益陽縣收捕其桀黠者付三等遂經營開拓安撫使吳中復以聞其議中格及戶部判官范子竒權荆湖南路轉運副使復奏蠻恃險為邉患宜臣屬而郡縣之子竒尋召還又述前議㑹遣惇察訪南北江遂以命惇既而更委夙燁吳中復治平元年十二月日潭徙瀛范子竒熙寧三年九月權湖南運副燁為湖南運副在八月二十一日燁初奏梅山事不可倉卒急成上批章惇可先往辰州侯所經制有叙乃往潭邵又批梅山事可専委蔡燁經制必能了當王安石曰陛下經制邉事既已授成算令人勾當繼而為人游說即别有指揮人見事有釁隙即生沮害上曰前此為無人故令章惇了當今蔡燁自可了當不須專委章惇或疏於蔡燁也馮京曰燁誠仔細安石曰吳王嵗時存問茂才賞賜閭巷及用兵惟一周邱乃不得將兵以其不足賴故也然吳王所使將皆不如周邱人才各有能有不能未易遽論其疏馮京曰安石必已授惇經制次第安石曰陛下易於出命故陛下微情人臣無所不見人臣見陛下微情知可游說搖動故因事有釁隙輒為欺侮如郭逵言摩正必來作過臣智慮淺短無能裁處張利一言因罷鄉巡弓手百姓驚恐入城之類是也人臣左右顧望難於言事故人臣微情陛下有所不知不知人臣微情故指揮事於事情有不盡上曰蔡燁本路監司委之了當似便安石曰蔡燁初到便言章惇必倉卒敗事臣諭章惇令委事於蔡燁大抵人臣計事多先為身少肯為國計利害今梅山事須乘機了當若遷延即生姦猾要利之計兼梅山事未了便要了辰州事不得梅山不難了既了梅山然後到辰州即先聲足以振動兩江兩江亦易了也上曰蔡燁蓋欲自專其事若章惇肯與共功必無他因降是詔是日馮行已言北界巡馬猶未止絶乞移牒約欄上從之王安石曰牒固無害然巡馬過河亦無害上曰只為自來無此故也據日録乃九月二十二日事朱史繫之七月十一日非也今附見本日行已新舊傳並云沿邉舊有鄉巡弓手後悉廢罷而北界巡馬如故數漁界河剽取舟船行已請復置鄉巡弓手以杜侵爭之端神宗手詔嘉之按日録六年四月一日猶載行已不欲復鄉巡弓手與本傳特異當是日録不可信也更細考之戊辰提舉司天監沈括言楚州衛朴精於厯術乞令赴監參校新厯從之仍賜路費錢五十千八年閏四月厯成己巳荆湖北路轉運使司封即中直昭文館孫桷知荆南尋復故九月十九日復故桷本傳云桷改知荆南㑹沅州蠻納欵辰州遣左侍禁李資率輕兵入南江以致諸酋而懿洽二州蠻殺資章惇奏請復桷轉運使諭以恩信歸附者凡十四州遂城沅州此事當考辛未檢正中書五房公事曾布言乞於三司選吏二百人專置司磨勘天下帳籍以至三部勾院亦皆選吏置官責以審覆其人吏各優與俸給課以功限為之賞罰仍自朝廷選官提舉其措置條約乞下詳定帳籍所詳具以聞從之舊紀云置司勾考天下帳藉新紀無此壬申權發遣延州起居舍人直龍圗閣趙卨為吏部員外郎賜銀絹二百以卨奏根括地萬五千九百一十四頃招漢蕃弓箭手四千九百八十四人騎團作八指揮故也鄜延皆荒阜磽瘠占田者不出租賦而倚為藩蔽寶元用兵後殘破流徙名存實亡每調發輒匿避嘗搜集才八百人多罷癃杖耰鉏至金明而潰酋利其亡收田以自殖卨呼諸酋問曰往聞汝族戶若干有諸對曰然曰今何在曰大兵之後死亡耗散其存止此卨曰其地存乎酋無以對卨曰吾貰汝歸聽汝自募家丁使占田充兵可矣吾所欲得者人也田則吾不問衆皆傴曰聞命諸酋感服歸募壯夫悉補亡籍卨曰異時蕃兵提空簿漫無考詰多以老弱充數至有一夫而纍代者因議涅其手論者難之上亦有審處之詔屬嵗饑卨令蕃兵願刺手者貸常平榖一斛於是人人願刺惟恐後蕃官劉紹能有異言弗彊之其所部聞他族刺而得榖皆請於紹能紹能復以白卨笑曰若恐蕃兵疑阻勿刺可也紹能謝愚不知所為遂悉刺之因假與官錢置鎧械以時練閲嚴其除復信其賞罰土人徑悍便習險阻利其田産樂其室家以戰若守一可當正兵之十敵憚之為鄜延長利初上以卨根括等事乃其本職欲止降詔奬諭王安石進曰今居此職而不能辦此事者皆是如卨宜䝉厚賞以勸來者故有是命於是上稱卨招弓箭手省募兵之費甚善安石曰凡我境內百姓皆可使何特弓箭手而已上因稱种世衡安石曰陛下以朝廷利勢為世衡所為豈特功必倍之也卨本傳田數兵數俱多今但從實録與兵志實録田數人數並同志又云六年卨言新募弓箭手頗習武伎請更番代正兵歸京師詔審度之六年九月二十六日十二月五日可考甲戌趙抃言纍入蜀深知蜀人情狀聞欲作保甲教兵必驚擾失人心上曰初無教兵指揮王安石曰無此然教兵亦何妨諸葛亮以蜀人脆而堅用之亮尤為得蜀人心何嘗驚擾上曰諸葛亮舍蜀人即無人可用安石曰漢髙祖伐楚用巴渝板楯蠻武王伐商用庸蜀彭濮人豈有蜀人不可教以千戈之理是月廢䝉州為立山縣𨽻昭州成都府犀浦縣成德軍靈夀縣雅州百丈縣劍州臨津縣為鎮
