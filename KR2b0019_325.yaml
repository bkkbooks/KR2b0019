body:
  text: 續資治通鑑長編巻三百二十一宋李燾撰神宗元豐四年十二月癸丑朔詔髙遵裕自去月丁酉後未有奏報不聞軍前攻戰次第令鄧繼宣厚以金帛募勇士齎書間道走軍前取報及體探見今措置次第以聞仍移文與潘定劉僅等亦令選募或差人展轉往探伺及承接文字轉遞前來是日林廣軍次阿徐池并入前月二十七日又此月十八日當并此甲寅知諫院朱服言伏見在京發解禮部試進士隨所通經以十分為率而取之自今考試乞以義理文辭為髙下去留罷分經均取之法朱本刪去云無施行詔環慶涇原行營囬師將入塞令李憲苖授更不往並歸本路撫定所分地乙卯詔前淮南東路提㸃刑獄金部員外郎范百禄通判揚州太子中舍傅扆簽書判官邵光林旦陳奉古各展磨勘二年右班殿直張嵗閏罰銅二斤嵗閏監髙郵縣樊良鎮稅有市易司經税饒潤竹木過鎮更税之百禄再委扆等定奪稱合盡税市易司提舉張次元言百禄等意在沮壊市易法故也詔諸路大軍出界雖各有斬獲賊級克復城寨今並囬師入寨然興靈未㧞賊之根本猶存既經討蕩賊必謀報須當預圖制其侵寇及向去可以破滅之計令諸路經畧使與出界帥領同轉運司官據昨入賊界見聞利害共議將來攻守長策以聞毋得互有形迹或但為空言致朝廷不見事實盧秉言鎮戎軍熙寧等寨申靈州河水圍城官軍去城一里累土囊成隄約二丈靈州城髙三丈盡以氊褁水沃之大軍糧盡人皆四散漢蕃兵投靈州者甚衆丙辰刑部言福建路轉運使賈青判官王子京提㸃刑獄閭邱孝直舉劾沙縣令施聞等枉法自盗委泉州簽判范伯玉同鞫青等奏伯玉翻變施聞情節從輕放罪人出外結託情弊意欲出逐人罪已先衝替今南劔州再劾伯玉皆無前罪詔令賈青等分析以聞其後青等以赦免伯玉亦改為差替上曰監司朝廷耳目案劾官吏尤在詳審每一制獄連逮者衆窮冬盛夏寧無寃濫茍有不當亦不可輕捨庶有所懲也樞宻院言近累據种諤奏斬獲首級逐時所奏人數不多慮以軍前逃逸人夫蕃部及在路死亡之人取首為數以希功賞詔令种諤指揮諸將嚴約束士卒除討殺殘黨外不得以軍前逃逸及道路死亡之人斫取首級及令种諤凡有斬級子細騐認詔三路保甲毎都保旗上並建州府縣名所載禽獸等物可依先降指揮次序圖識令提舉保甲司製造丁巳詔李憲大軍已入並邊西歸芻糧自可於所由倉場勘給元隨行人夫顯為無用百姓轉餉日久若不亟使休息必妨異時準用爾速相度牒轉運司除委的須頼為使之人餘並放散各令寜家戊午詔聞陜西諸路川軍自邊逃來廂禁軍漢蕃弓箭手蕃兵義勇保甲人夫等甚衆雖已牓諭令自陳尚慮諸處不能究宣恩詔致逃散之人未敢出首永興軍路委安撫使吕大防鄜延路委權陜西路都轉運使李承之環慶路委權管勾陜西轉運使錢勰涇原路委永興秦鳯等路提㸃刑獄李寜熙河秦鳯路委秦鳯等路提㸃刑獄杜常指揮轄下州軍開導詔㫖招撫限一月許令自首免罪廂禁軍令納器甲復本營義勇保甲人夫等聽歸所屬髙遵裕言大軍徑趨靈州㑹合兩路兵至城下自丁亥併力攻撃縁靈州城廣濶守禦備具近城賊兵萬數不少日夕與諸將分頭竭力且攻且戰雖屢獲首級然獨堅城未下至庚子十一月十八日賊决黄河水浸營難以駐留兩路轉運司元計置一月糧草合大兵出界一月以羌人於清逺軍韋州鳴沙川𤇺火平以來多出兵邀撃糧道驛遞不通彭孫兵䕶涇原摺運糧草為賊抄畧諸軍闕食士有饑色今若不統領大兵先討除抄畧之寇使道路通快然後攻取即恐官軍坐致疲敝加以冬寒日甚别致生事臣已與兩路總管將副等議定統兵通活道路迎接糧草環慶路轉運司言涇原環慶兩路兵進攻靈州不下兩值大風夜寒凍死及殺傷士卒不少靈州繞城舊有黄河分水大渠三重及溝澮縱横貫注水所溉田約二十里前大軍經過渠皆乾涸自庚子賊决河水渠漸盈溢寨地卑下勢將渰浸髙遵裕已於辛丑十一月十九日領大軍離城下即有賊馬出没邀截至午過一渠人馬渉水至酉再過大渠雖有小橋人馬壅併亦湏渉水其後涇原兵遇夜止在渠北與中軍隔渠下寨壬寅十一月二十日賊追及後軍接戰兩渠間水浸及寒凍人馬頗有死者申時至南州下營遵裕以涇原再運糧草金帛至南州為賊抄畧幾盡環慶再遣夫糧及境亦以道路艱阻餽運不接見領全軍通道應接糧草據范純粹奏議十一月一日純粹已準朝㫖往來計置環慶路餽運純粹固嘗随軍入界矣此奏當是純粹及李察同上也具注此月十一日鄜延路行營經畧司言本司收復横山一帶州寨已隨事經畫委官權管勾所湏兵馬見亦據逐處事勢差發詔沈括據軍前走馬承受言經畧司差定漢蕃兵馬前去銀州防守事勘㑹本州雖名為州而城守之具百無一有既非可制賊死命之所又非為進攻巢穴之漸徒縻軍馬守之安用顯是全不計校向去得失確的利害止欲成就拓土虛名况士卒久罹凍餒人心厭怠之際尤宜乘時休息以待將來成計大用可急移文种諤仰除米脂細浮圖或招降下呉堡義合係有守具去處湏差人守把外餘未得差兵前去止依近降指揮一切放歸諸城寨易得糧草去處候犒設訖熟令歇泊十一月十八日庚子并此月二十四日丙子明年正月六日戊子可并李憲乞暫赴闕禀攻討策詔今士卒凍殍之餘民力疲曳之後若非乘時充養其氣亟休息之則異時賊攄忿而來凖何禦得爾宜究心安撫全補之以待他日之用邊務當禀者且附遞覼縷以聞己未河東都轉運司言已牒王中正候張世矩到本路即軍中械送府州繫獄差府州通判錢㬉勘劾上批世矩見將兵轉運司如此諠露深慮本人憂畏反側不便可速降指揮云世矩雖狂妄陳述縁昨宥州破賊功最多特許他日以功贖過前降指揮更不行十一月二十日世矩云云上批髙遵裕行營已至並邊王中正兵不湏往今納近降宣命依前詔迤邐歸本路种諤凖此庚申詔涇原盧秉據環慶路行營奏本路兵逃亡不少幾是全軍潰散及云兵衆敭言我曹不憚進戰止憂餓死此乃大段闕食及聞將官使臣等傷中亦多卿可速遣人招呼以朝㫖放罪依舊收管便令復營及户族安存歇泊未得别有團結人支米一石都提舉市易司賈青乞於新舊城内外置四抵當所委官専管勾罷市易上界等處抵當以便内外民户從之髙遵裕言囬軍漸至界首權於極邊分屯以安反側願少寛臣罪使暫入朝别議攻討詔髙遵裕行營以師老食盡知難久留退軍南來未為深罪當且疚心全葺罷弊安撫士衆以圖後効未可赴闕如有急切邊務以驛書聞候軍馬整治舉事有期當有召命詔環慶涇原路行營兵元未經王中正喝賜並賜特支錢先逃亡縁招撫到乃至即不支辛酉環慶路行營經畧都總管司言涇原路出界正兵及漢蕃弓箭手共五萬一千六十人馬五千七百八十二匹除逃散外見管一萬三千四十八人馬三千一百九十五匹是日劉昌祚姚麟葉康直等還至渭州十七日奏癸亥詔三省諸案宜並稱房環慶路轉運司言大軍攻靈州半月頻經寒凍自離靈州日有賊兵追襲為賊傷殺十過二三士卒乃敢攘奪公私之物至剥取軍員衣服生埋揜之并自去巾櫛辮髪詐為蕃兵追奪財物軍器什物棄毁滿野多燒兠牟以造飯槍桿弩樁箭笴彭排之類皆以充薪所持兵刄則以採柴木無不鈍缺凡此皆屬軍政本司不當侵預不敢便施行若不宻奏則緘黙之罪恐難逃逭又言伏聞朝廷下髙遵裕領環慶涇原兩路兵退歸並邊别議措置竊見遵裕識慮昏淺動失事幾喜怒輕肆賞罰謬濫凡有功將佐多遭摧沮士心不伏昨深入賊境全不肯痛行討蕩仍節制將士遇賊接戰限定歩數不許追撃有過所限遂遭庭辱欲行軍法縁西賊戰鬭兵勢稍沮必即退遁既不許乘勝追撃於理無復大㨗以致賊勢猖獗了無成功今若再委遵裕别議措置恐終不能上副朝廷責望之意此月六日已有環慶轉運司奏案環慶轉運副使李察判官范純粹也是月坐隨軍入界西賊抄掠糧草察降授承事郎純粹降授宣徳郎各權管勾轉運判官事純粹乞叙位察下有奏狀可考甲子詔涇原路行營漢蕃兵今已入塞宜令劉昌祚等部領還本路分屯歇泊繕治器甲葺補衣装安養士氣鄜延路經畧司言準朝㫖簡未嘗出界人兵盡以與王中正其諸城堡守禦頓闕若有警急湏發義勇保甲守城慮逐州縣役使放散歇泊臨時有誤勾集欲乞令官司不得差雇占使違者以乏軍興論從之乙丑詔宣慶使宣州觀察使入内副都知李憲自出界討賊收復地土皆有功㨗賜銀絹各二千降敇奬諭别聽恩命明年六月五日先是知樞宻院孫固乞罷西師既而師出無功上諭固曰若用卿言必不至此於是固又言兵法期而後至者斬始議五路入討㑹于靈州李憲獨不赴乃自開蘭㑹欲以弭責要不可赦乞誅之不從丙寅龍圖閣直學士曾布知慶州四年六月十四日自蔡移成徳五年十月丁母憂此並不入長編詔熙河蘭州西使城今已修葺戍守其間有湏増置堡寨通接道路令經制司相度施行外其以東地分即未得别展托昨降鄜延麟府路行營經畧措置司依圖畫地分清蕩河南今靈州既未下其指揮並未得施行且令休息團結士馬别聽朝㫖其麟府路措置司軍馬委王中正相度分遣近裏有糧草處歇泊以備呼使中正軍多募京師諸衛禁旅不置將校最無紀律亦無戰功惟入宥州縱火又自尊大侮辱官吏不恤士卒凍餓死者最甚中正軍多募諸衛以下朱本並削去今依新本復存之權環慶路經畧司事胡宗回言昨起本路義勇保甲赴環慶州等處守禦今大軍己囬乞放令歇泊詔依所奏涇原路準此并再下兩路轉運司應役夫及百姓指揮到盡放散詔李憲以見領職事權交割與苖授量帶官吏速乘遞馬由便道往環慶路博謀將吏具官軍昨攻取靈州得失所以及今改圖詳悉方畧籌策條畫并經過涇原恐有利害亦可詢講親齎赴闕論奏二十二日憲放罪丁卯案閲廣南東路團結諸軍所奏體量知廣州陳繹役使團結兵級五百餘人治廨舍及發諸縣槍手於城中濬河築隄日役千人既非城池又不繫公私利害盛冬興役劾罪以聞詔岷州團練使髙遵裕帥涇原環慶之師攻取靈州無功及不能討殺外援賊黨并節制涇原致師人逃潰降為西上閤門使就差知房州西上閤門使果州團練使劉昌祚東上閤門使英州刺史姚麟戰兵弓箭手逃潰數多各降三官並就差為永興軍路鈐轄内藏庫使忠州刺史彭孫䕶糧草為賊抄刼不能禦敵致軍食乏貸死為東頭供奉官熙河路準備差使尋添差金州監當令涇原路差人監伴前去昌祚墓誌云為永興鈐轄尋有㫖止行復涇原鈐轄據宻院時政記五年正月二十二日昌祚麟並改涇原鈐轄鄜延路經畧副使种諤言囬軍至塞門寨差崇班宋玠提舉修完已畢權委侍禁賈昌運唐宗夀依奏差候滿二年令本路經畧司保明聞奏與遷官酬奬宋玠减磨勘二年詔尚書都省彈奏六察御史糾劾不當事戊辰賜承議郎知將作監丞呉處厚銀絹及使臣吏人銀絹有差以繫滑州浮橋畢推恩也上謂輔臣曰河之為患久矣後世以事治水故常有礙夫水之趨下乃其性也以道治水則無違其性可也如能順水所向遷徙城邑以避之復有何患雖神禹復生不過如此也九月丙戌浮橋壞東上閤門使文州刺史鄜延路經畧副使權副總管种諤為鳯州團練使龍神衛四廂都指揮使遣中使賜貂裘一銀絹各二千种諤言䝉畫下所分地内城壘粗全舊屬漢郡有銀夏宥州包據横山今且修築次第條一并地圖遣子右班殿直書寫機宻文字朴赴闕投進詔种諤前後収復近邊城寨有守具可以保據並依已降指揮外休息士馬别聼處分以朴為閤門祗候令齎詔以往詔陜西河東諸路出界軍馬各已還塞深慮西賊以我軍逺出之後急欲休息反出不意驟來奔衝則經畧司自當任責賊界動靜及人馬嘯聚所在正要體探的實以為隄備日近諸路並無探報事委逐路經畧司選刺事得力之人厚與金帛務令深入仍措置督責縁邊城寨守把大小使臣内至帥府日夜部勒兵馬嚴作守拒不管緩急勿失枝備落賊姦便詔馬申胡宗哲以運糧不繼有妨進討已令權發遣秦鳯等路提㸃刑獄公事杜常依前降朝㫖枷項取勘可依趙咸等例特與免枷止令在外承勘仍並罷職事己巳髙麗進奉使崔思齊副使李子威等百三十五人見賜物有差朝散大夫賈青言準朝㫖下朱初平奏令臣相度新建徽誠州乞招納元屬溪峒地分道路以至地里逺近並附入州縣圖籍令縣邑城寨常切開廣於新城地買官田及許百姓置田其少牛具種糧之類聽結保赴官借貸乞並如初平所奏從之詔諸行營將帥並已還任其經畧安撫都總管司職事並各依舊毋得獨有行遣諸路軍馬既已還塞應縁行營所増置事務官屬並减罷如要切合存留者以聞宣慶使宣州觀察使入内副都知李憲為景福殿使武信軍留後既與所賜銀絹皆寢之憲以賊巢未覆𤇺堠未寜力辭故也明年六月乙卯乃下憲辭恩命據宻記五年六月五日所書今附此馬軍都虞候昌州刺史苖授為沂州防禦使殿前都虞候詔涇原路經畧司具彭孫所領兵及褁䕶人夫若干傷折逃亡各若干以聞彭孫降官候具到取㫖彭孫丁卯日責官太中大夫集賢殿修撰提舉崇福宫孫桷卒庚午賜瀘州行營諸軍特支錢詔廣西經畧司指揮自今有賜安南詔命令欽州關報本道候遣人至界首迎接乃得付之大宗正司言宗室有過名乞比附外官除落詔禮房比外官年限輕重立法林廣之駐軍阿徐池十二月一日乞弟遣人投書求降廣納之及軍次落婆逺越三日廣復令乞弟所遣蠻奴阿義阿生同往諭乞弟乞弟又遣人納降書翌日乞弟又遣其叔阿汝獻馬五十匹請退軍廣隨阿汝所指撃鼓退四將行營於後山然實扼賊歸路乞弟又請不解甲廣策其有異謀為除阜為壇距中軍五十歩且設伏辛未乞弟擁千人稱降廣從十數卒出軍壘以待之乞弟伏弩氊裘下猶豫不肯前謝恩廣即發伏撃之賊大奔潰斬阿汝及酋豪二十八人効三百餘級獲馬鎧仗及乞弟父子所授告敇歸徠州印納江有二橋乞弟弟阿字乘乞弟馬渡上橋王光祖父子追廹墜水斬之軍中以為乞弟争其尸得金絡項條脱者以故乞弟得徑下橋跳去新紀書辛未日廣破乞弟于納江舊紀不書癸酉相視檢計黄河隄防舒亶言詳李立之所乞小呉决口以下舊河見管物料榆柳差使臣等廵防又乞相州漳河増置安陽埽今詳舊河已棄廢虛占使臣兵級乞下轉運司令府州縣以待都水監給用其地逺難運委轉運司賣之以錢應副河防安陽埽當増置並從之髙麗國王與二府親王書詔親王二府土物令受而不答止以書謝應臣僚答髙麗國王書差著作郎林希具草進呈送御書院以精紙寫付使人囬滑州言新作遼使驛已題為武成詔改為通津甲戌詔今措置河北糴便司修倉司限三年畢二月十一日可考侍御史知雜事滿中行奏應今後見任官不許陳請分司已分司者候滿二年並勒停放罷詔見分司官三年罷今後更不許分司此據大觀二年三月三日敇増入實録在戊辰紹聖二年五月二十二日郭知章又言大觀二年三月二日著為令夔州路轉運判官席汝明言招到義軍指揮使菊曩二捕獲射殺魏從革賊木八乞優賞之詔以為三班借職仍候獲木琴大等與轉奉職充夷界廵檢八月二十七日又五年七月十六日又六年閏六月四日熙河路都大經制司乞差蘭州官詔以四方館使熙河路副總管兼知河州李浩知蘭州候修㑹州畢差充蘭㑹經畧安撫副使奉議郎孫路通判蘭州洛苑使兼閤門通事舍人王文郁宫苑使苖履為熙河路分兵官其西使城賜名定西城恭噶關康古堡楚隴城並改為寨時政記云恭噶關更不賜名恭噶關當考元豐六年改恭噶關作東關堡李憲奏準朝㫖分析未得處分間便擅歸本路因依臣以糧草蹙廹不可久留遂迤邐迎接糧運乞加貸宥樞宻院檢㑹已降指揮令李憲往環慶及涇原路博訪籌策詳講利害親自齎執赴闕詔李憲力圖來效以贖今所得罪已降指揮乃此月十四日又詔諸路兵皆已入塞歇泊所有昨歸順招降捕獲西界蕃部等分處近便城寨慮其間或有姦詐反為内應或知官軍糧草措置次第逃逸為賊鄉導令逐路經畧司嚴責城寨使臣蕃官首領等常覊防覺察其首領已補職名人遇有差委參以漢官乙亥禫祭宰臣王珪等上表乞聽樂詔不允自是五表乃從之丙子上批慈聖光獻宅持服從子朝參誦可同判軍器監評知審官西院誌勾當皇城司誘提㸃醴泉觀河東路經畧司言廵檢張璨言西界呉堡寨内隔河呼云鄜延第四將髙鈐轄已収呉堡寨湏渡船一二艘以備轉遞文書詔河東轉運司廣為増置以備濟渡詔將來再討西賊自涇原環慶擇便路趨靈州當于兵行之道兩旁築城堡約十五處置守具積糧草已差李承之為陜西路都轉運使兼提舉涇原環慶路軍湏等事其以陜西諸州軍錢物及所出物并鄜延環慶涇原秦鳯路分到諸司錢物移用計置修築凡城堡事出逐一分畫與葉康直范純粹李察各令速幹辦如用人夫未得調發先以聞丁丑西天大天竺國僧伽羅伽多乞宣取所逰歴諸處畫名山百花圖及御馬等詔令于内東門司投進上批司設呉氏先承事章恵皇太后自景祐初繼事太皇太后垂五十年可特進位尚宫戊寅遼主遣寜昌軍節度使蕭福全太常少卿乾文閣待制鄭顓來賀正旦詔沈括具行營入寨兵馬確的存亡實數以聞勿令諸將増損致誤朝廷賞卹涇原路經畧司言右侍禁魯福隨彭孫至鳴沙川遇賊凡三戰重傷乞優賜推恩上批福臨難奮勇力戰重傷在使臣中實不可多得可授閤門祗候賜絹百匹庶可鼓勵士氣詔李憲得所奏邊策善無以加爾不湏往環慶涇原便擕此策赴闕守待相見面諭委曲憲言昨諸路各以一道之師出界兵勢既分賊已熟見虛實將來再舉湏合諸道兵攻其必救使之莫測若併兵一道則有數者之利如仍舊分路則利悉為害為今之策湏于涇原㑹合併攻自熙寜寨進置堡障直抵鳴沙城以為駐兵之地如此則靈州不攻自㧞河外賊巢必可撲滅縁鳴沙城西扼靈州口復據上㳺比臨大河與靈武對壘臣觀河南故地惟蘭㑹至靈州川原寛廣土脉膏腴今蘭州賊中窖積悉經官軍開發所餘無幾今若扼其川口據其上㳺併出鋭兵討殺使左右前後不得耕穫則靈川一帶窖積既空復無嵗望賊黨離析其為利一也自熙寜寨至鳴沙城約四百餘里可置十餘堡乘時進築則自天都以至㑹州悉在腹裏其間族落既有保䕶之勢必皆内附其為利二也北與靈武對壘直趨賊巢復已不逺兼興州素無城壁候冬深河凍審見賊形即出兵於靈州側擇其地利誘致賊衆併力除蕩然後乘勝分兵北趨靈武其為利三也臣觀鄜延進攻每至結納克雖稱克復其實一到而已盖官軍既去賊黨躡蹤住坐與不討定其實無異若未㧞興靈其環慶鄜延克復之地雖亭障環列烽堠棊布亦難守禦縁兩處土多沙脉古稱旱海不可種藝修置城壘湏近裏輦運朝廷方䘏民力罷困如諸路併修堡寨不惟財力愈殫適更生患以是計之先于涇原進兵可以困賊其為利四也兼靈州以水溉田四向泥淹春夏不可進師秋冬之交地凍可行又城堅有備卒難攻㧞臣以謂今圖必破興靈之策先湏計涇原錢帛芻粟復令河東鄜延環慶熙河四路揚聲進攻各選歩兵一二萬騎兵五七千獨熙河選驍勇蕃兵五六千以備變號易服出賊不意其非行營兵馬亦令逐路團結常備出戰以為畨休及緩急聲援其四路所選兵合涇原之師為十萬先是熙寜寨進攻築堡于沒烟口以誘賊臣度夏賊以涇原環慶之師無功必有輕侮之心如分兵合撃决可蕩平然後進至天都築堡接鳴沙城候河凍北渡以覆賊巢如此則可往來摺運不湏併起諸路夫役糧道無抄略之虞其為利五也臣自至石門觀兩路措置乖謬必知無補顧本司兵勢又難有功審度事幾湏圖再舉遂以目覩利害畫為此策文墨不能盡陳乞許臣赴闕面受成算及悉言諸道進師之害先是憲將熙河秦鳯之師攻得蘭州及西使城上諸將功請築蘭州為帥府以鎮洮為列郡詔憲據軍前事力修完為主兵之所併力河南諸郡而憲頓兵蘭州不進數以糧餉不繼船筏未備為言及涇原環慶師老于靈州趣憲赴援又不能往既而諸路師潰歸上以憲蘭州有功釋勿誅使圖來效憲自以比諸路獨違七月庚寅約束乃陳再舉之策冀塞前罪上以為然故令赴闕明年六月五日實録乃書此云憲以去年十二月上再舉之策今多入詔憲赴闕後張舜民志劉昌祚墓云朝廷欲再舉自鎮戎軍葫蘆河川築十五堡傅靈武此云自熙河寨進築直抵鳴沙城地名不同當考熙寜寨在鎮戎軍北三十五里庚辰詔諸班直上四軍毋得簡嘗有罪改配人壬午置延州義合寨是冬判河南府文彦博奏疏言臣聞昨來西師出界中輟而還將下師徒頗有饑凍潰散以礙人衆不行軍法今便欲再舉何以勵衆又運糧逺渉頗被邀截官吏民夫甚有陷没必恐邊將懼罪不曾依實盡言議臣依違亦不敢明白敷奏老臣荷陛下恩深若又不言乃是負國伏望聖慈深察王師之舉必有邊將謀臣首開端緒不得詳審以誤大計伏望陛下察之若不深責無以勵後又言臣竊聞陜西用兵之後公私蓄積大抵殫耗丁壯運糧從軍夏麥多不下種大兵雖還邊備不可輕弛切慮向去軍民糧食不充緩急無以計置謂宜講求漢唐故事水陸轉輸以備乏絶臣守藩當路近聞岐雍間粟麥之價今已騰踊若至春後必多流亡兼聞關陜人户昨經調發應副軍期不遺餘力死亡之餘疲瘵已甚亦皆覬望徳音儻順青陽一霈恩宥因而有所蠲復或并及河東諸郡兹實陛下盛徳之舉仍願亟詔諸郡申嚴斥堠専為守禦之備養威練卒振䘏傷殘之民在今之宜無以易此臣受恩至深慮有所及不敢自黙又言近聞西師已還中外但知時暫歇泊而未有分屯解甲之㫖人情憂疑皆應王師必有再舉之計老臣受國恩深義同休戚齒髪如此無復覬望惟有區區欲報之意不能緘黙輙為陛下言之臣竊觀陛下臨御以來選㧞將校訓齊師徒修治器械儲峙糗糧皆衆智所不及近世所未有比者夏人昏亂自致天討陛下赫然命將出師以伐有罪師行以來㨗音屢上雖未能覆其巢穴繫其君長而師行有紀所遇輙克羗人遁逃莫敢抗堂堂之鋒天威神武震慴四夷戰功之多近世未有然而數路進軍興動大衆彌歴累月餽輓不貲諸路之民疲于供給將士盡忠竭力為朝廷奮不顧身間關死亡衝冒寒苦備極勤勞臣以謂國威既已振矣將士之力亦已殫矣百姓供餽亦已竭矣為陛下今日之計正當勞徠將士安拊百姓噢咻其疾痛補完其瘡痍使得蘓息按甲養威以全前日之勝如此則外足以懲艾夷狄内足以愛養軍民此宗社無疆之休也今若師徒暫還而復出士氣已衰而再鼓民力已困而調發復興諸路深入而轉餉益逺如此則師之勝敗恐未可知而前功或喪此天下之深憂也兼臣在洛中津遣陜西軍湏不少亦聞陜西事體頗詳皆言百姓亦已流離菽粟之價騰踊今冬二麥多不下種將春農事方興又復調發不已必恐應副不前有誤大計臣而不言孰當言者伏望陛下以天下為度以蒼生為心不以盡敵然後為功亟詔班師分屯諸路使朝廷恩威並行軍民和附以小羌昏亂如此可以坐待其滅亡矣臣不勝大願又聞陜西河東運糧人夫雖所費不貲而逃逸者甚衆至有部夫官亦逃竄恐無人敢子細奏陳兵志謂善用兵者役不再人糧不三載春秋戰國時用兵多在中夏故兵有因糧糧不逺載與今之餽運深入夷狄沙漠之地其勢不同易稱髙宗伐鬼方三年克之小人勿用以聖帝伐鬼方尚三年而克之理有不可急者又曰師貞丈人吉丈人嚴莊之稱用之則吉小人勿用用則無功無功則有罪伏望陛下選擇將兵者如輕險而求僥倖之功者當勿用之臣年老眼昏勉力親書此劄子深懼不謹細伏望聖慈矜察兼不敢附遞恐漏洩不逹謹遣臣長孫承事郎永世持詣通進司投進答詔在明年二月二十五日是嵗置昌化軍感恩縣蘭州康古寨東關臯蘭二堡秦州大雨壊廬舍鳯翔府鳯階州饑河北水遣官振䘏十朝綱要是嵗府界及三路上保丁數凡六十九萬有竒
