body:
  text: 續資治通鑑長編卷二百十二宋李燾撰神宗熙寧三年六月壬戌詔司農寺檢察諸路所申雨澤如有水旱特甚州軍以聞知秦州李師中言奉詔勘㑹昨展置甘谷城所拘占瑭谷地界係與貝實勒新伯等三家仍令王韶劉希奭與蕃部首領指引標定界至聞奏臣已令體量其間有蕃户標撥入官地土數多而今耕種不足者欲却於元獻納數內給還三分之一其弓箭手亦不得執元額止獻合入官地招人庶幾不害邊計詔令王韶等依前降指揮體問元獻地蕃部的實願獻多少地如不係元初獻者並還之劉希奭時為走馬承受已見二月二十八日駕部郎中朱壽昌巽之子也其母劉氏壽昌生二歲巽守長安出劉氏嫁民間母子不相知者五十年壽昌行四方訪求不獲飲食罕御酒肉與人言輒流涕以浮屠法灼臂燒頂刺血寫佛書冀遂其志又棄官入秦與家人訣誓不見母不復還行次同州得之劉氏時年七十餘矣知永興錢明逸表其孝節且言壽昌稱疾尋醫棄官而尋醫法須二年乃赴御史臺看驗乞不俟尋醫限滿復其差遣癸亥詔壽昌赴闕朝見先是言者共攻李定不服母喪王安石力主定因忌壽昌及壽昌至但付審官院壽昌前已再典郡於是折資通判河中府迎其同母弟妹以歸居數歲母卒泣涕幾喪明白烏集墓上拊其弟妹益篤為買田居之其於宗族尤盡恩意嫁兄弟之孤女二人葬其不能葬者十餘喪蓋其天性如此言者謂陳薦也事見五月八日甲子詔罷遂州知州任滿除提㸃刑獄指揮依舊中書選差人舊制知遂州撫馭有方邊界寧靜代日除提㸃刑獄至是罷之丙寅殿前都虞候雍州觀察使秦鳳路副總管竇舜卿知秦州李師中於永興軍聽㫖七月十二日下漕司相度市易置司利害及下王韶分析田事六月八日師中言市易置司及田事初遣王堯臣李若虞案實王韶之議開邊也師中贊成之及韶改提舉蕃部兼營田市易二月十一日師中始言其不便向寶言蕃部不可以酒食甘言結也必須恩威並行且蕃部可合而不可用議與韶異朝廷更命寶兼提舉王安石恐沮韶事亟罷之四月十八日韶及高遵裕並為提舉四月二十三日兩人共排寶數有違言時寶方為師中所信任安石雅不喜師中嘗白上曰師中前後論奏多侮慢今於韶事又專務齟齬陛下若欲保全宜加訓敕使知忌憚當云付卿一路宜為朕調一將佐使知朝廷威福今用一王韶於向寶有何虧損遂欲怨望不肯盡命若果如此朝廷豈無刑戮以待之卿為主帥亦豈免責韶所建立卿皆與議事之成敗朝廷誅賞必以卿為首不專在韶上遣使諭師中如安石所陳此據日録四月二十六日事於是師中亦奏寶在邊無由得安乞罷寶專委韶及遵裕㑹托碩隆博二族相仇董裕以兵助托碩遵裕乃言于師中乞使寶還討之師中復奏蕃部非寶不能制臣已令將兵討托碩族乞依舊留寶仍敕韶等令協和曽公亮擬從其請樞密院又請責韶等戒勵狀安石曰韶等豈可但責戒勵當究見情狀虛實道理曲直行法及進呈上怪師中奏事前後反覆欲遣使體量如安石議文彥博曰韶遵裕得專奏事不由主帥主帥反奉韶等上曰韶所措置事皆關由主帥安石曰若韶措置有害師中自合論奏師中素無忌憚專侮慢朝廷何至奉韶等因請罷師中上欲移郭逵代之曽公亮言延州不可闕人上又欲復移蔡挺衆謂不可安石曰若用挺不如用逵文彥博曰王安石不知陜西事延州乃重於秦州逵不可移安石曰臣固不知陜西事然今秦州蕃部旅拒夏國又時小犯邊城或遂相連結則秦州事豈不甚重且陜西諸路皆與夏國對境苟一處有隙夏國來窺則來窺處即是緊切要人處逵若不可移盍使竇舜卿攝領韓絳亦謂舜卿可使上以為然故有是命丁卯初八日并月未合參照李師中本傳云王韶乞築渭源上下兩城屯兵以脅武勝軍撫納洮河諸部下師中議師中言今修築必廣發兵大張聲勢及令蕃部納土招弓箭手恐西蕃及洮河武勝軍部族生疑無由招撫如皇祐中築古渭塞上丁下丁斷絶廣吳堡路蓋恩信未通人情未浹故也今若先招撫青唐武勝及洮河諸族則西蕃諸族必乞修城寨因其所欲量發兵築一城或三兩堡以示斷絶夏賊鈔略之意部族必歸心唐於西域每得地則建作州其後皆陷失以清水為界大抵根本之計未實腹心之患未除而勤遠略貪土地者未有不如此也詔師中以帥事付副都總管竇舜卿於永興軍聽㫖按師中罷帥王安石日録并司馬光日記頗詳蓋不專坐此疏今參用日録日記刪修不取本傳案宋史作渭涇上下兩城係誤光祿卿知舒州楊璵分司南京轉運司言璵庸懦不職故也著作佐郎黃好謙登對上謂王安石曰好謙守本分安石曰上殿兩劄子言亦不悖理上曰然乃命好謙編修中書例條詔京略安撫鈐轄等司指使並給印紙書其功罪殿侍散直殿前司給差使殿侍以上三班院給軍大將三司給制置三司條例司言開封府百姓納草舊差積草兵士五千人所差數常不足蓋止以逐年科納草數多少差撥緣輸納擁併全藉衆力挑撥積疊方免注滯及不損壞官物欲乞剗刷裝卸兵士倉草場剩員常以四千人為額如不足許差在京府界廂禁軍候納及分數以次减放又請每正草場增朝臣使臣各一員并舊為八員左右騏驥天駟監天廄等三草場及應坊監便草場各增京朝官一員同受納從之丁卯詔今後外居皇親並許於閣門投進表章其舊居令宗正司勘㑹本宫院人口多而屋宇少者移䟎均給又詔三司分在京諸司庫務為四窠令三司并提舉司勾當公事官每半年一次轉輪各㸃檢一窠以三司言提舉諸司務所管七十二處所差勾當公事止是每季㸃檢官物齊整其積壓陳損合係三司變轉乞令因㸃檢除申本司外更申三司故有是詔尋罷之尋罷之此據司馬光日記李師中言王韶申欲於甘谷城等處未招到弓箭手空間地一千五百頃乞差官從三五頃至一二十頃以上逐假標立界至委無侵犯蕃漢地土然後欲憑出榜依朝㫖召人耕種緣本司先准中書劄子王韶募人耕種止標撥荒間地不得侵擾蕃部今韶乃欲指占極邊見招置弓箭手地有違詔㫖又欲移市易司於古渭寨臣恐自此秦州益多事所得不補所失蓋韶初獻議朝廷即依所奏未嘗令臣相度欲乞再委轉運使一員重行審定詔遣權開封府判官王克臣內侍押班李若愚按實以聞初七日丙寅并月未合參照戍辰編修閣門儀所言今罷入閣即文德闕親朝之禮欲下兩制及太常禮院約唐制御宣政殿裁定朔望御文德殿儀以備正衙視朝之制從之鄭州言修嵩陵殿宇輦置瓦木勞費請量裁損舍屋間數不許壬申上批近聞作坊物料庫官吏隱下帳管竹箭簳申乞三司配買三司並不檢察的實有無即施行可勘㑹行遣於是三司使吳充言箭材凡二百八萬四千而勘用者止十一萬二千近商人販至京者凡二百餘萬故遣官選買上疑其非良材命祕書丞章楶驗視果非良材吏皆抵罪楶頻孫也提舉京西路常平等事陳知儉言奉詔案唐州近年招誘民戶開荒田增賦事前趙尚寬任內兄弟父子重復詭名者四百餘戶及簽判張恂僞加水田頃畝并開修黃王池二陂不實事狀詔轉運判官李南公具尚寬恂不實事及元保明官以聞其後南公言尚寬等亦有不實事及具保明官朝廷以纍經赦及該去官並釋之癸酉詔羣臣封爵至大國者更不改封其封妻者隨夫郡國上批宗室女封郡縣主亦乖義理遂詔中書編修條例官檢詳故事取㫖既而條例司言謹案范曄後漢書云漢制皇女皆封縣公主儀服同列侯其尊崇者加號長公主儀服同藩王諸王女皆封鄉亭公主儀服同鄉亭侯其皇女封公主者所生之子襲母封為列侯皆傳國於後鄉亭之封則不傳其職僚品秩皆有等降而前漢稱諸王女亦謂之翁主齊厲王姊以紀氏所生號為紀翁主而王吉傳亦曰漢家列侯尚公主諸侯則國人承翁主先儒以為王姬下嫁於諸侯以同姓諸侯主之故謂之公主公者諸侯之稱也諸侯嫁女則其父自主之故謂之翁主翁者其父也然則公主翁主者皆因其所主婚者而為之名今漢制乃豫封之為某縣公主所生之子遂得襲母封為列侯傳國於後則與先儒之說自不相應其後宋諸王女封縣主隋又有郡主皆無公字唐制遂以太子女為郡主封郡親王女為縣主封縣其始疑因避帝女之號去公字以嫌故又不稱翁主則稱主者非復有主婚之義猶曰主君而已沿襲之訛固非一日然竊以謂今之官爵名號失其本指如郡縣主之類者不可悉數必欲釐正謂宜視事緩急有所先後其議遂寢大宗正司言併省管勾睦親廣親并提舉郡縣主宅所並令本司管勾今有約束及廢置八事請著為令詔除應諸色人并姨㜮杖罪以下乞從本司勘决不許外餘並從之新紀於癸酉日又書有五色雲已見二年七月甲申今從舊紀削去酉案本紀於二年七月甲申三年六月癸俱書有五色雲或係宋史之誤甲戌河北都轉運使劉庠言新修御河成詔管勾開修程昉赴闕去年閏十一月庚子初修八日甲戌昉遷官今年正月丙辰韓琦論奏可考御河渠志御河源出衛州共城縣百門泉𨗳自通乾寧入界河逹於海熙寧二年議者請於恩州武城縣入大河故道下五股河詔都水監丞劉彛同程昉相視而通判冀州王庠謂開所𨗳入葫蘆河為便彛等以其地淺漫沮洳用功多不若開焉烏襴堤歷大小流港橫絶大河入五股河視以復故道乃令提舉便糴皮公弼提舉常平王廣亷再而議與彛昉合於是發邢洛磁相趙真定六州兵夫凡六萬浚之三年四月河成賜役兵緡錢有差八月遷程昉為宫苑副使餘第賞之四年命昉為都大提舉黃河等河同簽書外都水丞事專掌之乙亥韓縝言晉州神虎副指揮使嚴訓康定中戌豐州夏人圍城訓率士卒固守斬馘居多及城陷被執見元昊詬詈不已遂遇害乞下晉州訪其子孫優賜甄録從之案嚴訓事宋史不載丙子兵部郎中同知審官西院韓縝兼直舍人院縝以兄絳執政固辭改集賢殿修撰除修撰在二十二日辛巳今從實録并書降屯田員外郎知山隂縣陳舜俞監南康軍鹽酒稅坐違詔㫖不散常平錢自劾也舜俞先有㫖召試學士院亦寢之舜俞為人矯激不情仕宦頗齟齬中間嘗躁忿棄官居嘉禾白牛村自稱白牛居士已而不能忍復出仕進既謫南康其後乃上書稱青苖法實便初迷不知爾時參知政事馮京欲緣此復用之宰相王安石曰為人反復如何可用也方是時畿內初置保甲且觀其端而知宿州元積中遽乞布之四方故京師為之語曰元積中逆承保甲陳舜俞翻悔青苖聞者以為笑馮京參政在九月十四日立保甲法在十二月九日王安石拜相在十二月十一日舜俞翻悔當附十二月末或削去丁丑詔御史中丞馮京翰林學士范鎮同三司都理缺司相度合放係缺官物封感德軍節度使榮國公承亮為秦國公德雍第三子已見嘉祐六年九月建州觀察使宗肅魯國公允寧子元份孫文州防禦使恩平郡公宗逹蔡國公允升子為元稱後已見慶厯四年七月吉州團練使宗惠魏國公允升子已見治平元年六月尋以宗立代宗惠代州防禦使宗保燕國公允成子為元禧後已見慶厯四年七月右龍衛大將軍果州團練使齊安郡公仲郃陳國公宗望子元傑孫右驍衛將軍泰州刺史世程越國公從讜子惟正孫尋以世清代世程先是禮院言本朝近制諸王之後皆用本官最長一人封公繼襲朝廷以為非古故去年十一月詔祖宗之子皆擇其後一人為宗世世封公補環衛之官以奉祭祀不以服屬盡故殺禮即與舊制有異謹案令文諸王公侯伯子男皆子孫承嫡者傳襲若無嫡子及有罪疾立嫡孫以次立嫡子同母弟無母弟立庶子無庶子立嫡孫同母弟無母弟立庶孫曽孫以下准此合依禮令傳嫡承襲詔可於是禮官復言謹案昭成太子元禧陳王元傑蔡王元稱無後而宗保宗逹仲郃以旁親出繼見封郡公自應典禮太祖之子越王德昭當立庶長曽孫世程太宗之子魏王元佐當立嫡孫同母弟宗惠魯王元份當立嫡孫宗肅韓王元偓當立嫡孫宗繢允弼子吳王元儼當立長孫宗絳允良子惟秦王廷美楚王德芳後禮官議所立不同判太常寺陳薦等以謂傳襲以嫡統為重令文言庶弟庶孫者别妾子之稱然亦不離正統以禮傳言之為後者四有正體而不傳重嫡子有罪疾是也有傳重而非正體庶孫為後是也有體而不正庶子為後是也有正而不體嫡孫為後是也然皆不敢舍本統而及旁支也晉范宣議嫡孫亡無後則次子之後乃得傳重由此言之須嫡房已絶方許次子之後承之况嫡房自有曽孫者耶推情求理宜以本房之庶孫繼禰與祖無庶孫則下傳曽孫不離本統於禮令為是今秦王楚王後自嫡孫同母弟以上皆無存者秦王宜以庶曽孫克繼嗣承慶子德恭孫廷美曽孫已見皇祐四年二月楚王宜以庶曽孫世逸嗣從煦子惟叙孫德芳曽孫知禮院韓忠彥陳睦以謂令文之制與古稍異若無嫡孫而有嫡曽孫則舍曽孫而立嫡子之母弟若無母弟又立庶子以此知亦許推及旁支常以親近者為先也以禮典與五服敕言之諸子之子除嫡長外皆為庶孫既云立庶孫則當於諸房庶孫內擇其長者一人立之蓋王視庶孫恩親等也庶孫比曽孫行尊而屬近也若專以嫡房妾子為庶孫則别房子孫當以何親名之今庶孫見存偶因嫡孫房兄弟皆亡遂棄庶孫不立而下傳曽孫或不幸又無曽孫只有别房庶孫豈可便作無後國除乎秦王宜以庶長孫承亮嗣楚王宜以庶長孫從式嗣惟憲子德恭孫已見至和二年七月詔秦王楚王後如忠彥議餘依禮官定故承亮以下得立而宗繢宗絳以喪故後封從式以封郡王更不改封其後嗣令依今所定先是上問陳薦所說如何王安石對曰今詔與秦王楚王立後兩王無嫡子無嫡孫又無庶子又無嫡孫同母弟惟有庶孫則當立庶孫而已庶孫者除此兩王嫡孫外諸子之子皆是也今薦乃以嫡子之子為庶孫諸子之子為别房孫且秦王謂雍王孫乃為别房孫不得謂已諸子之子為之也雍王光濟秦王兄建隆三年追封上以為然諸王所封國多遷改今必書王於所封國下庶易見也新紀書封宗室秦魯蔡魏燕陳越七王後為公舊紀於七月壬子乃書魏越宗正寺言每歲正月一日裝寫仙源積慶圖宗藩慶緒録各一本供送龍圖天章寶文閣今祖宗非袒免親更不賜名授官一依外官之法合與不合修入圖册詔送禮院詳定禮官言聖王之於其族上殺下殺而殫於六世所以明親踈之異也親道雖盡猶且記其源流百世不紊所以著世系之同也親踈異則恩禮不得不異世系同則圖籍不得不同二者並行而不相悖親親之義備矣禮四世緦麻服之窮也五世袒免殺同姓也六世親屬竭矣庶姓别於上而戚殫於下婚姻可以通乎繫之以姓而弗别綴之以食而弗殊百世而婚姻不通周道然也鄭注繫之弗别謂若今宗室屬籍蓋據漢宗正歲上名籍與禮經合又戶令皇宗祖廟雖毁其子孫皆於宗正寺附籍自外悉依百姓惟每年總戶口帳送宗正寺此則戶令之文又與古制合也以此言之遠近之恩固宜有差降而譜牒之記不可以不存况朝廷釐改皇族授官之制而袒免外親統宗襲爵進預科選遷官給俸事事優異悉不與外官匹庶同法則屬雖踈而恩禮不偏若圖籍湮落則無以審其所從而為遠久之證所有祖宗非袒免親欲乞依舊修寫入仙源積慶圖宗藩慶緒録其在外者委宗正寺逐年取索附籍從之上批薛向等所總東南諸路財利創事之始實藉諳知官吏遠近應接乃可集辦近雖纍指揮如向等奏辟官吏並與應副尚恐有合入遠官朝廷引條不行可自今特與差任滿如無勞績復注遠官二年七月十七日置均輸即許辟官屬九月十六日又詔兼銀銅坑冶等事詔大理寺詳斷官李逹胡澤充替權少卿蔡冠卿降小處差遣權判事許遵審刑院詳議官朱大簡韓晉卿趙文昌馮安之並移差遣坐失入秦州民曹政死罪未决也曽公亮引銀砂案失入例㑹赦王安石曰銀砂已是失引定例宜有特㫖故有是詔晉卿安邱人也詔樞密院逐季進納使相已下至閣門祇候已上姓名差遣班簿一冊今後依此諸司使已下至閣門祇候已上并內常侍已上諸司使姓名差遣逐季合進班簿令西院抄寫進納使相及正任橫行內臣昭宣使以上及樞密院逐房副承㫖姓名差遣逐季合進班簿令樞密院抄寫進納應臣僚奏舉大使臣奏狀令通進銀臺司依逐項發放舉路分都監知州軍已上使臣送樞密院本院依前項指揮先付吏房上腳色訖却批付審官西院舉常程差遣等使臣並直送審官西院施行此據㑹要三年六月十八日事今附本日或可刪取戊寅開封府奏本府曹官今後乞許奏舉從之審刑院詳議官殿中丞朱溫其權發遣大理少卿理合入資序於是御史丞馮京言溫其自北京法曹參軍舉刑部詳覆官五年理為兩任今歲五月方舉授審刑院差遣資序尚淺便令權發遣少卿超越倫輩欲乞且於見任詳議官知州資序人內選擇或外任臣僚有詳練法律持守平允及資望稍深者以應明詔使百司進退各有條序亦所以息奔競之一端也上諭京曰溫其駮案有實效此除不為過也知諫院胡宗愈亦言溫其但能讀誦律疏不知古義不識先王為治之體而又資性深刻無哀矜之意不足以副廷尉之職望選賢良以副大理不聽詔修武成王廟翰林學士司馬光乞差試校書郎前知龍水縣范祖禹同修資治通鑑許之祖禹鎮從孫也辛巳江淮等路發運使司勳郎中薛向為天章閣待制副使太常少卿羅拯為使於是御史中丞馮京言向人物風采天下共知不可以備侍從俟向績效顯著酬勞未晚不報復上疏曰案待制備天子顧問陪扈游宴是蓋法從最親而日奉德音者也非才智明亮該洽古今難以通選而近年自三司副使及嘗理三司副使資序者皆以為集賢殿修撰知制誥闕人則又除直舍人院數人天下悉以為陛下重惜名器以待材傑不意乃今所除如此而已則是前日天下所屬望以為重惜者不得為重矣向謫降補郡未嘗至官為發運使一年未嘗有顯績總九路利權郡邑繁衆設有賣鹽增益之效而自諸興置未見所以為功者今遽除待制物議未允皇祐中發運使許元頗號任職而元賂遺權要傾巧百端其始也止得同進士出身既而又為侍御史在任纍年晚乃得除此職天下清議不以為允而向從事日淺經紀未立阿附者衆過為游說使陛下信為有勞驟加恩賞臣愚未見其可也臣聞天下之人不從上之所言而從上之所行竊恐自今百執事不復以德教政治為心而希冀效慕惟利是興尺帛㪷粟毫銖之息有以利入於公上者悉籠取之以幸官賞則生民日駸駸濵於困窮而莫之能救也其源甚微其害甚遠臣之所憂在此而已知雜事謝景溫亦言選任近職非以德則以勞向在江淮未有毫分之效不可謂有勞一區區聚斂之臣不可謂有德兼去歲朝廷委向者十事絹米二法則措置固已失宜庸雇客舟則公私之利未顯其餘數事方遣屬吏計置陳倩入福建衛琪之兩浙劉忱往江西沈叔通遍歷淮南適廣南荆湖者臣即不知其姓名皆約以七月至泗州商量利害今十事之中未效者七八而向已酬勞使向十事盡有成效陛下復以何官酬之欲望朝廷下中書條例司及三司取其所施行者暴於中外如向實有成效即臣甘受妄言之罪如别無顯績即追還敕告以示至公上閲景溫疏曰審有之乎王安石具言向在東南措置之方因曰用蘇宷張芻榮諲為待制必無異論矣上又曰馮京不為人惑似亦可用此疏極踈謬朕與逐條詰難京即服其非拜謝而去於是皆寢其奏新本考異云豈有馮京謝景溫二人言薛向而上獨謂馮京疏踈謬此王安石日録私意去朱書從舊文今併從朱書景溫言向措置絹米二法失宜當考手詔賜向曰政事之先理財為急故朕託卿以東南賦入皆得消息盈虛翕張斂散之而卿忠識內固能倡舉職業𨗳揚朕意底于成績朕甚嘉之前覽奏且慮流言致惑朕心匪石豈易轉也卿其濟之以强終之不倦以稱朕意本志載向拯遷職在三年九月今從實録係之六月二十七日安案史稱向幹局絶人奮論兵通暢明决神宗深知其才石從中主之益得展其材業據此亦不第以阿附安石得用者也措置絹米二事本傳無考司勳員外權河北監牧使崔台符權判大理寺初王安石定按問欲舉法台符聞之舉手加額曰數百年來誤用刑名今乃得王安石喜其附已故有此授詔京師倉儲已豐比聞民間米價稍貴可發淮南上供新米令酌中估價遣官分詣諸市置場出糶以平物價壬午上批新差權發遣河東提㸃刑獄職方員外郎梁端令審官院與合入差遣端提舉本路常平等事嘗論青苖錢不須設官置局川峽二廣六路宜罷給不報又言為提㸃刑獄韓鐸所沮而不能顯言鐸沮已事狀乃用論新法自劾求罷職以提舉司事屬之提㸃刑獄轉運使及進呈端狀韓絳言端實公直有幹材恐陛下以此一事遂廢之為可惜也上曰如皮公弼尚不廢王安石曰端必有幹材况是絳所舉今言役事乃絳本議必其所見如此非為邪也然今朝廷要當如此施行陛下必不以此終身廢其可用之材故有是命端盩厔人嘗為吕誨所薦授御史臺推直官司馬光日記云端不知已除提刑因論青苗不便故罷今但從實録韓鐸已見元年七月録環慶路蕃官右班殿直李宗亮子惟立為三班奉職充本路巡檢阿爾為下班殿侍賜名惟忠以宗亮死事故也癸未龍圖閣直學士陳薦知蔡州已而不行陜西提㸃刑獄司言乞趣大理寺斷延州義勇長行葉璘等公案上批刑獄如此淹留豈有不傷和氣近中書刑房已置簿鈎考督趣樞密院可相度依此立法㸃檢甲申詔宗室袒免以下親敇前授副率以上者敕後當請裹頭穿執日食送殯盤纒起朝日支馬依袒免授殿直例給之詔京東提刑司取索先檢放災傷人户分數及轉運司後來行遣究實以聞以御史知雜謝景溫言南京災傷已差官檢放而轉運司抑令復認元額故也又詔審官西院磨勘使臣依審官東院例引見㑹要云更不告謝乙酉詔諸路提㸃刑獄司具逐州軍經略安撫鈐轄司特刺配人元犯以聞丙戍貶祕書丞集賢校理知諫院胡宗愈通判真州仍落館職前此上謂執政曰胡宗愈至沮敗朝廷政事又論不當置西審官分樞密院權非所以體貌大臣且令大臣有所施恩有害於政此言乃傾中書以為排沮樞密院蓋樞密院論議已是如此又言張若水者其意蓋欲傾韓絳耳朕嘗面責以方鎮監司事可言者衆略不為朕作耳目專沮敗朝廷所欲為宗愈甚愧怍云陛下許臣臣自敢言明日即言李復圭事曽公亮曰宗愈止是書戇不曉朝廷事耳上曰宗愈似戇然察事情甚精所言皆有含蓄務在中傷非戇也公亮又言數逐臺諫非是上曰此非所謂諫爭乃讒慝爾絳白上姑務包容王安石曰大臣當以國為體不可以形迹之嫌苟容此輩絳曰為諫官乃受陛下㫖言事此最不佳安石曰聖㫖果是諫官將順亦不為非不可以此為宗愈罪惟懷邪沮事乃不可容上令檢出前後章疏行遣安石請御批著其姦狀於是上批付中書曰宗愈氣焰姦慝自領言職未嘗存心裨補朝廷治道凡進對論事必潜伏姦意含其事情旁為邪說以私託公專在破壞正理中傷善良所為如此而置之左右前後豈非所以自蔽聰明故貶仍限一月令兩制各舉升朝官二人補諫官員闕宗愈為諫官遇事必言然不肯出姓名辭多微婉故御批有潜伏中傷等語或曰御批乃吕惠卿筆也初欲與知縣曽公亮不可始除通判宗愈言事不出姓名御批乃呂惠卿作此據司馬日記氣焰姦慝四字本在自蔽聰明上語似不屬元祐本無之新本同元祐惟朱本及御集有此今仍備録但移入自領言職上日記又云宗愈為諫官屢言事又言張若水嘗在慶州韓絳結之宗愈實未嘗言綘惡之者以為間耳丁亥置審官西院主簿二員以升朝官為之從知院韓縝請也天章閣待制孫永兼看詳編配罪人元犯永三年四月降待制知和州未幾召還提舉詳定編敕兼知東審官院但當記其復召此看詳不必記判刑部劉瑾舉權柳州軍事判官宋諤試刑名中書言諤嘗試律賂吏人竊斷案欲不許上批緣試法雖實通律亦恐不免如此諤令就試無害苟不中格自當退黜遣中使降南作坊地圖付三司令計度修蓋初上以執政僦舍散居遠處有急卒文書即吏散走四出且聚議不可得故欲創府使居之至是遣中人即北作坊規度而併北作坊於其南其後又改南北作坊為東西其使副名額亦如之九月二十六日作東西府上既罷李師中後十日批付中書樞密院曰隆博托碩相讎殺王韶高遵裕並不前知今向寶已領兵破蕩高遵裕亦同去王韶令於秦州聽㫖候王克臣體量到别議之王克臣體量在此月七日丁卯上怪韶奏報一日兩說初云蕃部潰散又云董裕助兵萬人相去才二十里乃如此不審文彥博因言王韶不知邊事王安石極力解釋以為韶但慿探事人所報耳蕃部旅拒即二十里內自不通往來或僞退而復進或既散而復聚何由得知此未足罪韶然臣亦疑韶智有所短朝廷用韶提舉蕃部時向寶高遵裕尚為管勾韶即受而不辭臣疑韶智有所短特此事耳又曰韶孤生才領職威信未能使人不可遽責以不能前知蕃部動作若亟令於秦州聽㫖恐沮韶意氣後體量到或無罪復令幹事心更局縮上曰亦慮韶緣此有希意媒孽者然方倚向寶用兵韶在古渭似與寶相妨安石曰韶孤立為李師中所忌衆兵官所惡安能沮向寶朝廷但憂王韶為衆排陷不得申其志不憂韶沮向寶事也請促韶分析未須令往秦州聽㫖上從之後數日又呈李師中分析秦州事師中乞推究請罷向寶者特賜處分安石蓋先以師中分析白上曰樞密院初用王韶提舉蕃部略不措置向寶自以為王韶部轄與韶不和既不和更令寶與韶共事寶專欲用兵韶專欲招撫其勢必相沮壞故臣欲罷向寶但用王韶韶欲招撫故令提舉蕃部寶欲用兵故令依舊作都鈐轄若可和則委韶和之若不可和則令向寶與戰此朝廷委李師中作帥本意也向寶雖罷提舉蕃部仍帶御器械即朝廷於向寶非有負寶雖不管勾蕃部猶在秦州作鈐轄固未嘗奪師中所倚賴之人如何便致蕃部作過又師中以韶不能前知董裕作過便為韶罪韶與董裕非深相要結又其恩威使人勢不及師中師中既不能知董裕作過王韶亦何由獨能前知上以為然及是上與曽公亮等曰用向寶要戰用王韶要和用師中要節制此兩人朝廷於向寶何所虧損而師中言乃如此公亮又為師中解釋上曰姑候體量到别議之初七日丙寅初八日丁卯當參照七月十一日己亥體量到據日録十七日令王韶往秦州聽㫖二十五日呈李師中分析今並書在六月末不書此則無以見王安石力主張王韶其僞辨乃如此也司馬光六月日記云向寶和二族殺董裕二百餘級王安石日録云上批秦州承受奏經略司已差向寶等破蕩招安不得蕃部去訖既云破蕩去訖則必是蕃部遂平司馬光所記和二族殺董裕二百餘級或即此事又按御集三年六月八日上批承受劉希奭等奏秦鳳都鈐轄向寶將帶路分都監髙遵裕並張守約等及各人手下軍馬蕃兵寨户弓箭手破蕩殺戮蕃賊上批觀此處置恩威先後出兵次第却甚為允當此御批蓋王安石十七日所録也然御集乃八日安石繫之十七日不知何故亦皆不書但云已領兵破蕩亦可見蕃部遂平也是月廢太原府平晉縣以其地入榆次清源陽曲禮部侍郎致仕盧士宗卒可削
