body:
  text: 續資治通鑑長編卷二百十三宋李燾撰神宗熙寧三年秋七月辛卯詔新判太原府歐陽修罷宣徽南院使復為觀文殿學士知蔡州先是修病辭宣徽使至五六因論青苖法又移書責王安石安石不答而奏從其請修辭太原移書責安石安石不答而奏從其請此修晚節不汚所以得為君子也紹聖史官乃諱其事簽貼云取㑹並無出處輒刪去今復存之增開封府陳留縣兵馬監押一員上批昨罷諸路賣度僧牒本欲令商人併趨鄜延入錢以助邊計今鄜延所賣之餘存者無幾環慶地險土狹財賦素號不充方邊事未息防秋是時可賜度牒千付經略司令依鄜延法召商人入錢封樁以備支費賜河東經略安撫司紬絹十萬匹令轉運司年計外變糴麟府路糧草舊㑹要有此今附見壬辰樞密使刑部侍郎吕公弼罷為吏部侍郎觀文殿學士知太原府王安石變法公弼數言宜務安靜又與韓絳不協從孫嘉問竊公弼論事奏草以示安石安石輒先白上始不樂公弼及胡宗愈攻絳上疑公弼使之於是謂執政曰公弼屢反覆朕以其務沮李復圭邊事嘗戒之而公弼乘間乃云復圭但忌陳升之韓絳耳此乃以樞密院事賣中書也今并州闕人宜即使公弼往安石請明著其罪上曰太原重地不欲顯斥之曾公亮請自內批出又言公弼先朝兩府欲與轉兩官上曰陳升之出時乃不曾轉官然卒從公亮言又以手札諭文彥博曰太原重地須諳知邊事之人乃可寄委早來已指揮中書差吕公弼見是樞臣故不及與卿議要卿知李復圭邊事司馬日記五月內詳之今附八月辛未蔡惇祖宗官制舊典云執政罷政樞密使除宣徽使轉一兩官判藩府其次除觀文殿學士皆宣麻熙寧間吕惠穆公弼因爭新法求去王安石隂沮之只送舍人院命詞先公時掌外制繳詞頭舉典故論之安石勸上內批今後樞密使罷更不宣麻此恩數遂廢元豐中馮京以樞密使改除節度使知大名府罷政乃以建節宣麻知樞密院罷即除觀文殿學士同知院以上皆除資政殿學士若簽書只除端明殿學士各轉一官知藩郡或罷不甚美多不遷官或只除端明者惇所以稱先公蓋指蔡延慶也張德逺辨云仁廟欲用狄青作樞使龐相云髙若訥無罪何可罷仁廟色頗厲云若訥除觀文殿學士留經筵即今行出乃召當制舍人就殿廊草詞此時樞使罷已不宣麻其後有宣麻者自是舊相并帶節相者耳吕惠穆當時最號助王介甫者裕録并介甫日録可考也其罷政知太原似是避文潞公之歸耳此書抵牾多如此此出於記省老人何能詳德逺是時直舍人院封還誠有之若謂斷自吕公弼始則不然也且制命已行出如何却除學士也德逺辨惇誤誠當然德逺誤亦不少姑兩存之翰林學士端明殿學士禮部郎中權御史中丞馮京為右諫議大夫樞密副使上嘗謂王安石曰京似平穩安石曰京燭理不明若鼓以流俗即不能自守上曰作中丞恐失職安石曰京作中丞充位耳非能啓迪陛下聰明陛下當於幾微之際警䇿之勿令迷錯上曰令作樞密副使何如安石曰亦可也及京奏疏論薛向上以手札諭安石曰試觀馮京奏疏恐不宜使久處言職慮羣邪益譸張為患當如何處置安石言臣伏奉手詔示以馮京奏疏使得參預處置之宜顧臣區區才智淺薄不能宣暢聖問使羣愚早服尚何以塞明指禆大慮乎然臣初固疑京必出於此蓋京所恃以為心腹腎腸者陳襄劉攽而已重為衆奸所誤何為而不出於此書曰惟辟作威又曰去邪勿疑陛下赫然獨斷發中詔暴其所奏明其不知邪正是非必撓國政而罷黜之則內外自知服矣即疑未有可代使知雜御史攝事乃是先朝典故徐擇可用固未為晚若示人以疑取决於外必有遷延其事以待衆姦之合而衆姦知陛下於邪正是非之辨未能果也必復合而譸張以亂聖德而疑海內如陛下所料無疑也若陛下未欲卒然行此則且委曲訓諭以邪正是非所在觀其意若可開悟則大善若度其不可開悟臣竊謂除事之害莫如早也近陛下纍宣諭胡宗愈事既已盡其情狀涵而不决令久在耳目之地亦非難壬人勝流俗之道也願陛下并慮及此若陛下以謂如此者衆不可勝誅則臣恐邪說紛紛無有已時何以定國事乎且以堯舜之明而憂歡兜畏共工奈何陛下獨欲無所難也朝廷去邪與疆場除寇無以異也寇衆而彊盤互歲久則扞之以勇持之以不倦所討多而後聽服固其理也臣既預聞大政又陛下待臣不疑如此不敢避形迹有所不盡伏惟陛下赦其狂愚而察其忠幸甚所有馮京疏謹隨劄子進納此據陸佃所編文字安石論京如此而京卒得改足明神宗於安石未始專任之也今附御札後上稱京似平穩又欲用為樞副安石稱亦可日録並在六月十五日又按安石答詔所問毁京如此而神宗卒不聽恐安石稱京亦可為樞副未必是實今姑取之神宗示安石以京奏疏當即是六月十九日論薛向者或論别事更詳之於是吕公弼將去位上議以代之者曽公亮韓絳極稱司馬光上遲疑未决始欲用京又用蔡挺既而欲并用京及光安石曰司馬光固佳今風俗未定異論尚紛紛用光即異論有宗主今但欲興農事而諸路官司觀望莫肯向前若便使異論有宗主即事無可為者絳徐以安石所言為然公亮言不當以此廢光固請用之上弗許乃獨用京明日又謂執政曰京弱并用光如何公亮以為當安石曰比京誠差强然流俗必以為宗主愈不可勝且密院事光果曉否上曰不曉安石曰不曉則雖强於密院何補但令流俗更有助爾上曰寇凖何所能及有變則能立大節又論金日磾都無所知然可託以幼主安石曰金日磾與霍光不為異乃可以濟寇凖非能平心忠於為國但有才氣比當時大臣為勝而已公亮曰真宗用寇凖人或問真宗真宗曰且要異論相攪即各不敢為非安石曰若朝廷人人異論相攪即治道何由成臣愚以為朝廷任事之臣非同心同德協于克一即天下事無可為者上曰要令異論相攪即不可公亮又論光可用安石曰光言未嘗見從若用光光復如前日不就職欲陛下行其言則朝廷何以處之上遂不用光他日安石獨對又為上言君子不肯與小人厮攪所以與小人雜居者特待人主覺悟有所判而已若終令君子與小人厮攪則君子但有卷懷而已君子之仕欲行其道若以白首餘年只與小人厮攪不知有何所望上以為然御集賜王安石手札云試觀馮京所上章恐此人不宜使久處言職終必無補治道但慮將來羣邪譸張益為患也卿以謂當如何措置可具奏來見御集第八卷此假並據日録并京本傳知制誥權三司使吳充為翰林學士權三司使初議所以代吕公弼者或言及充上謂充資淺王安石曰充信行佳上曰充與卿連姻韓絳曰充亦臣親家既不果用乃有此除充子安持娶安石女絳兄綱子宗彥娶充兄育女也詔秦鳯路經略司擅貸封樁錢回易令提㸃刑獄劾之罷置潞州交子務以河東轉運司言商販緣邊以無回貨故入中糧草算請礬鹽若交子法行必不肯中納糧草不惟有害邊計亦恐礬鹽不售故也本志同務按本紀載是月置潞州交子恐誤或係脫一罷字癸已賜大理寺丞王欽臣進士及第祕書省正字唐坰出身欽臣以文彥博奏舉坰上書言事召對至是並試學士院而有是命欽臣洙子坰詢子也初坰為北京監當官上書言青苗不行宜斬大臣異議者一二人王安石謂坰宜在館閣故得召對坰有才辨韓琦甚愛之既去乃聞其言召坰乃五月一日此據日記坰宜在館閣據五月三日日録林希野史云上薄坰為人但賜出身除知錢塘王安石固留之以為校書修令式又使鄧綰薦為御史坰為御史在四年八月己巳屯田郎中廣濟河都大管勾輦運霍交知金州上批交前日進對奏請二事觀其識見鄙淺全不曉習法令不可奬拔可選官代之甲午樞密院言嘉祐二年詔諸司使攝大將軍副使承制崇班攝小將軍共不過二十人自今攝南班有闕欲差知州軍路分都監以上得替人如不足即於審官西院除有過犯及年未三十未入親民人外取未有差遣人定差上批先差陜西河東代歸或避親放罷并曽有戰功路分都監以上至知城堡寨崇班以上如不足即依樞密院舊條又不足即依今所定乙未樞密院上大順城蕃部巡檢東頭供奉官趙餘德荔原堡蕃官右侍禁䝉布等各遷一官及賜銀絹有差上批餘德出界牽制斬獲首級恐與荔原獲兩級人例遷一資輕重不倫可增賜餘德銀絹各五十詔權御史臺推直官屯田員外郎孫奕更不上殿以馮京舉奕可任御史召對而奕辭不願故也先是執政進呈奕狀云今陛下數見小臣以其所言悅人乃以為辨給善希上㫖如臣豈能當聖意上曰此豈足以眩俗書曰用人惟已朕欲用人如何不得召見王安石曰陛下博召見人臣乃所以廣耳目知事情見人材向時人主所以不得博見人臣者特是大臣蔽主之私計耳安石因言人主不躬親庶事察知上下之情則風俗茍簡政令不平上欲明奕論議無取黜之安石曰但不令上殿足矣故有是命孫奕未詳四年七月鄧綰罷奕丙申王安石進呈蔡挺乞以義勇為五畨教閲事上令論及民兵安石曰募兵未可全罷民兵可漸復雖府界亦可為至於廣南尤不可緩今中國募禁軍往戍多死此害於仁政陛下誠罷軍職所得官十二三鼓舞百姓豪傑使趨為民兵則事甚易成上患密院不肯措置義勇事安石曰陛下誠欲行則孰能禦此在陛下也因為上言國之大政在兵農上曰先措置得兵乃及農緣治農事須財兵不省即財無由足安石曰農亦不可以為在兵事之後前代興王知不廢農事乃能并天下興農事自不費國財但因民所利而利之則亦因民財力而用也涇渭儀原四州義勇萬五千人舊止戍守經略使蔡挺始令遇上畨依諸軍結陳隊分𨽻諸將選藝精者遷補給官馬月廪時帛郊賞與正兵同遂與正兵相參戰守土兵有闕案府兵遺法俾之番戍無補所闕土兵詔復問以措置久逺分畨之法挺即條上以四州義勇分五畨畨三千人按蔡挺傳三千人上無畨字然上文明言四州義勇萬五千人則是每畨為三千人無疑宋史特脫一畨字耳防秋以八月十五日上十月罷防春以正月十五日上三月罷周而復始比之募土兵嵗減糧八萬石料錢六千餘緡春冬衣萬五千匹綿三萬七千兩詔從之行之諸路此據蔡挺傳因王安石日録三月八日進呈義勇五畨教閲事附見十月十八日韓絳云云可考丁酉以宣慶使內副都知遂州觀察使石全育領昭武軍留後提舉東太一宫全育以老病求領宫觀上批全育先朝攀附特依所乞詔宗室袒免壻與三班奉職已有官者轉官循資堂除免選及聽就文資并鎖㕔舉進士者悉如治平二年十月五日詔書先是大宗正司奏緦麻壻有官者京朝官與轉一官職官與循資袒免壻止云與奉職乃無有官循資指揮王安石議可並依緦麻法行之曽公亮曰轉官宜有降殺安石曰與循資不可殺則轉官亦不可殺且白身得一官有官者轉一官不為過此所以勸有官者肯與宗室為婚而亦省入官之一道也上是安石議故有是詔賜河東經略司紬絹十萬匹令於轉運司年計外計置麟府路糧草詔流內銓取問前權秀州軍事判官李定先任涇縣主簿日所生母亡曾與不曽執喪以聞初陳薦言陳薦四月二十一日權管御史臺五月七日罷論李定匿服見五月九日蓋薦入臺即論不在五月九日其行出乃五月九日也定匿所生母喪弗服而為定辨者以為定不自知所生以為乳母及卒或以語定定請於父父固以為非所生定心疑之乃解官侍飬以喪自居而不敢明言及下江東淮南體量而兩路奏定實解官侍飬即不言曽乞持所生母心喪上曰所以不持心喪者避解官也定既解官何所避而不明言心喪然曽公亮等皆力爭以為定不可除御史故又令定分析既而王安石白上曰陛下初除李定作諌官定誠非髙才必不能為陛下濟天下務然近歲諫官誰賢於李定而宰相不肯用定者正以定私論平直不肯阿其朋黨故沮抑之陛下聽其說改命為御史已是一失此陛下豫奪之權所以分而正論之士所以不敢恃陛下為主也胡宗愈蘇頌輩又言用定不合法制人主制法者乃欲以法制拘不得以特㫖指揮天下事固無此理况近制又無京官方得為御史選人即不得擢為御史指揮此是其妄也若言須用中丞舉則先朝御史雖有奏舉法然常有特㫖用人况近日薛昌朝亦然宗愈輩何以不論此又其妄也又蘇頌輩攻李定終不敢言其不服母喪獨陳薦言者薦亦知李定無罪但恃權中丞得風聞言事故也事已明白不可誣曽公亮乃疑合追服定父稱仇氏非定所生定又無近上尊屬可問此定所以不敢明乞解官持喪又疑鄉人所言或是所以不敢之官今定所生所養父母皆死又不曽别訪得近上親屬昨淮南所問鄰人乃是定母死後方來僦居不知令定何據而今日始追服此一不當追服也又定初以仇氏為乳母又仇氏生定兄察即是庶母庶母乳母皆服緦即定已嘗服緦矣若定今日方知是母即庶子為後不過服緦如何令定為母兩次服緦若言未嘗持心喪則定乞解官正為疑仇氏為已所生即是已用心喪自處如何今日又令定追服心喪此定不當追服二也假令定今可驗是母已明從來未嘗服緦即小功尚不追服緦麻固不合追此定不可追服三也此事惟陛下明察特斷而已上曰李定處此事甚善兼仇氏為定母亦未知實否也王安石云云日録在此月十七日朱本先附詔自今疏决或及開封府界三京令於初得㫖日取㫖仍與在京同日降指揮限指揮到停案决聽㫖四京諸縣更不差官應犯杖罪并降從杖以下止委本縣依次日朝㫖施行又詔內外職任舉差者並於見任官嵗滿前三季舉官侍御史知雜事謝景溫言嘉祐以來朝廷數下詔書兩制及外任監司而上各舉所知其間被舉者多非其人蓋自來舉官不報御史臺雖或妄薦無由審知彈劾之法亦由此廢欲應受詔特舉官者發奏日具所舉官姓名報臺從之林希野史云王安石恨怒蘇軾欲害之未有以發㑹詔近侍舉諫官謝景溫建言凡被舉官移臺考劾所舉非其人即坐舉者人固疑其意有所在也范鎮薦軾景溫即劾軾向丁父憂歸蜀往還多乘舟載物貨賣私鹽等事安石大喜以三年八月五日奏上六日事下八路案問水行及陸行所歷州縣令具所差借兵夫及施工訊問賣鹽卒無其實眉州兵夫乃迎候新守因送軾至京既無以坐軾㑹軾請外例當作州巧抑其資以為杭倅卒不能害軾士論無不薄景溫云戊戌雨雹兩紀皆書己亥兵部郎中集賢殿修撰韓縝為鹽鐡副使工部郎中直舍人院鹽鐡副使沈起為集賢殿修撰權陜西都轉運使權判大理寺崔台符兼詳定編勑上批昨聞四月中廣信軍不覺盜斬水窗入城劫民財已令體量今又聞安肅軍是月亦有劫盜夜入城得財而去不舉發又六月中盜穴南關城不遂又一夕有盜穴三家而廣信軍有盜數人嘗夜登城與撼鈴人格鬭不勝縋城而去皆不捕獲邊城如此不可不慮宜令轉運或提㸃刑獄司體量有實即繫劾官吏緣邊安撫司不按治亦當鞫之後兩軍及安撫司降官衝替罰金有差詔陜西轉運司詳度移市易司於古渭寨利害以聞又令王韶具析本所欲耕地千頃所在先是李師中與韶異議遣李若愚王克臣同行視而若愚奏與李師中協上疑不實故復下轉運司六月八日丁卯初命克臣等體量初若愚等至秦問韶所欲耕地安在韶不能對但言衆共沮我我已奏乞歸田竇舜卿使人檢量僅得地一頃六十畝案宋史作得地一頃既而地主自訟復以歸之若愚等奏韶欺罔又言古渭寨置市易司為不便又言韶以官錢假親舊使之他方販易放散甚多王安石恐韶獲罪乃言若愚在廣西素與師中善所奏不得實時已除沈起為都轉運使乃令起往别行體究韓絳及安石皆言起可使故也若愚等以為古渭寨不可置市易司聚三十萬貨物必啓戎心又妨秦州小馬大馬家私交易且私交易多賖貸今官市易乃不然兼市易就古渭則秦州酒稅課利必虧曽公亮文彥博馮京皆以若愚等所言為是韓絳亦以市易不在秦州為非王安石曰若西人能得古渭則非特三十萬貫錢之利也若不敢置三十萬貫錢於古渭恐西人爭奪則尚何須議招致洮河武勝生羌西人敢與我爭致此羌則其為利豈特三十萬貫錢而已以此言之則若愚以為聚貨起戎心非是也又言官市易不許賖貸百姓不便今官市亦非禁民間私相賖貸也於百姓有何不便則若愚言於百姓不便非是也又言虧秦州酒稅今秦州尚運致錢物就古渭若秦州酒稅减即古渭增收錢在古渭在秦州一也則若愚以謂虧秦州酒稅為不便非是也韓絳曰韓琦曽令增古渭地稅恐秦州人往古渭居安石曰以此驗之尤見人情以就古渭交易為便不然何須增稅以困就居之人今王韶欲就古渭置市易利害臣所不敢斷然若愚所奏即臣未見有害上乃令轉運司詳度既而上復問陳升之以古渭市易利害升之以為秦州則應接蕃戶太遠古渭則極邊誠恐郡羌窺覬之心其言與若愚等意協安石更白上曰今蕃戶富者往往有三二十萬緡錢彼尚不畏劫奪豈朝廷威靈乃至衰弱如此臣愚以為今欲連生羌則形勢欲張應接欲近就古渭置市易則應接近古渭商旅並集居者愈多因建以為軍增兵馬擇人守之則形勢張矣今議者患秦州因此商旅更少則非也秦州但患戰兵少而已豈欲冗食之人多乎庚子詔江淮發運司及荆湖北路提㸃刑獄司體量荆湖北路轉運使孔延之判官吳太元不和事狀以聞仍令太元赴闕以上批聞延之太元不和而太元不直故也辛丑遣發運司管勾運鹽屯田郎中劉忱同陜西轉運司相度本興置鑄錢監利害以聞以發運使薛向等請出上供錢帛二十萬貫匹買岑水場銅鉛四百餘萬斤運至陜西增鑄錢百萬緡以備邊計也其後忱等奏至多與向議協乃詔行之本志係此事於元年七月誤也向二年六月乃除發運詔江南西路歲運淮南鹽十二綱赴䖍州提㸃刑獄官與䖍州知州依嘉祐七年二月四日指揮同提舉出賣運船三歲一易鹽有羡十分以五分價錢與稍工充賞部押人三年遷押官並依治平四年四月二十三日指揮及編勑施行合破綱船兵夫分數即且依見行條貫先是權提㸃江西刑獄張頡言䖍州地接嶺南官鹽鹵濕雜惡輕不及斤而價至四十七錢嶺南盜販入䖍以斤半當一斤純白不雜而賣錢二十以故䖍人盡食嶺南鹽慶厯中官賣歲止百萬餘斤冒禁之人本輕利厚挾刃鳴鼓千百為群劫掠村疃官不能制餘二十年朝廷患之嘗遣職方員外郎黃炳同轉運使馮浩及廣南轉運使參議浩等請禁嶺南鹽至䖍州稍减䖍鹽價而更擇壯舟團為十綱差使臣部押運通泰鹽乘春水漲時至凡民有稅錢百則歲與二斤官收其直詔從其請後提㸃刑獄蔡挺更議以鹽支雜惡皆舟人盜劫之弊然䖍州經涉贛江三百餘里故令鹽船三歲一易增入二分舟人運鹽無缺負而有羡及百斤者支半價三運畢部押人轉押官若使臣即得减磨勘二年故鹽不雜惡有羡嵗賣至三百六十一萬斤增二十倍食者既衆不復以稅錢均配盜販衰息自挺去船七歲始易人因稍减賞亦漸薄挺之法十廢五六無賴抵冒之民稍集而官賣益虧願盡復挺規畫以杜姦盜上批蔡挺昨在東南處置鹽事最有顯效績狀可驗不惟課利增盈實得盜賊屛息今無故改革致於如此不便或使無賴嘯聚極非細事可詳頡奏速令一切如舊故有是詔蔡挺事具嘉祜七年正月與張頡所言微有不同今兩存之朱簽貼云契勘舊歲賣鹽百餘萬斤上是兩倍别細算改二十倍為數倍今附此乙已太常少卿祝咨都官員外郎刪定編勑王庭筠並判刑部庭筠資序至淺王安石超用之衆心不服祝咨未詳邑里王庭筠事據日記詔提舉諸司庫務司勾當公事官不得擅詣諸司庫務㸃檢及取索文字追呼公人違者提舉司劾奏以上批近李肅之請提舉司置勾當公事官二人諸事一禀提舉官處分聞極不守職任滋大事體而擅行公牒越驀申報紊亂職守有失等威可與條約故也丙午詔中書考察內外官司置簿記功過俟歲終及因非次除擢檢録比較進呈擇其尤甚者進絀之舊紀書詔中書籍記內外官功過新紀削去他日上取記功過簿讀至被㫖體量不實曰非被㫖者如何王安石曰奏論事不實足以包之又曰學士院有何事安石曰身所論奏非關主判處及告命差失之類上曰此中不言告命差失何也安石曰該說不盡比類抄上是也又問附宿直處抄上何也安石曰如待制直學士元無官司止寄宿於三館上稱所定以為善內一節隨事將上取㫖安石請除將上字上曰取㫖亦可除但令至歲終具功過呈如周禮冢宰歲終詔王廢置此據寶訓法令篇增入己酉詔許三路轉運司舉知縣資序京朝官充本司勾當各二員京東京西淮南兩浙路各一員庚戍詔恩冀等州因水所廢縣候三年復置以轉運司言河雖已變移然流民初復業未可差役故也詔編修勑所見編續降宣敕刪定嘉祐編敕仰候修成一卷日於逐條上鋪貼增損之意先赴中書門下看詳俟書成日同進呈此據㑹要三年七月二十一日所書增入初議置局在二年五月十七日癸丑前陜縣令范育為光祿寺丞崇文院校書育祥子嘗得召對進復田役書上又以轉對章疏三十付育看詳育條奏稱㫖故也先是上問執政范育如何王安石曰育言地制事亦不全為迂闊上曰育言凡於一事措置一事即不得此言是也又言須先治田制其學與張戬同安石曰臣見程皓云須限民田令如古井田上曰如此即致亂之道安石因言王莽名田為王田事上曰但設法以利害驅民使知所趨避則可若奪人已有之田為制限則不可安石曰今朝廷治農事未有法又非古備建農官大防墟垾之類播種收穫補助不足待兼并有力之人而後全具者甚衆如何可遽奪其田以賦貧民此其勢固不可行縱可行亦未為利已而上稱育所看詳轉對文字甚有識見今館職少乃令除校書曽公亮欲令學士院試䇿論安石以為人有或不能為此而能言世務有實用之材者今正要變此尚虛文舊俗若陛下疑其假授或採問得之即召給筆札令內臣監試更以數卷轉對令看詳甚易見也上曰此必非假授若能問即是能擇義理是非亦自是有識見可取也即有是命後數日又除太子中允權監察御史裏行當考育是何人薦得召對并於育集內檢育論田制略見於此育除裏行在八月六日與林旦並命今附見案據此則育先授校書後又權御史裏行宋史作召見授崇文校書監察御史裏行亦誤詔諸路提舉常平官到闕並令辭見如有合奏陳乞上殿即依提㸃刑獄儀制施行此據御集在二十五日實録同西上閣門使逹州刺史知雄州張利一領嘉州團練使再任利一召對陳邊事稱㫖故有是命寧武軍留後遂國公宗立為魏國公宗立允言第二子左武衛大將軍郢州防禦使申國公世清為越國公世清趙國公守巽長子已見熙寧二年六月辛亥初坐爭襲封不當自茂防降左武衛大將軍郢州防禦使初宗室克繼克繼廷美曽孫德恭孫承慶第三子承選承選廷美孫德文第三子言封秦王後嫡庶不當詔兩制詳定翰林學士承㫖王圭范鎮司馬光等言竊詳聖人制禮之意必使嫡長世世承襲者所以重正統而絶爭端也古者諸侯生立世子死則襲爵故令文稱諸王公侯伯子男皆子孫承嫡者傳襲若無嫡子及有罪疾立嫡孫以次立嫡子同母弟無母弟立庶子無庶子立嫡孫同母弟無母弟立庶孫曽孫以下凖此皆謂始薨之時應襲爵之人也其無後者則國除自唐末以來王公不復承襲本朝故事常封本官最長者一人為國公陛下以為非古故詔宣祖太祖太宗之子皆擇其後一人為宗令世世封公又詔祖宗之子并濮國公並令傳嫡襲封臣等詳觀詔㫖皆欲復古禮而重正統也今禮院定越王德昭曽孫世程魯王元份孫宗肅韓王元偓孫宗繢吳王元儼孫宗絳傳襲已如禮令今昭成太子元僖陳王元傑蔡王元稱皆無後宗保仲郃宗逹以旁支繼襲乃是特恩為之立後紹封其國自應禮典秦王廷美之後陳薦等欲立其庶曽孫克繼韓忠彥等欲立其庶長孫承亮楚王德芳之後陳薦等欲立其庶曽孫世逸韓忠彥等欲立其庶長孫從式魏王元佐之後衆禮官皆欲立其庶孫宗惠臣等看詳三王自有正統而承亮從式宗惠皆旁支若此三人襲封則子子孫孫常居環衛世襲爵祿與國無窮其正統子孫袒免以外更不賜名授官數世之後遂為布衣如此旁支何幸而封正統何罪而絶不惟與禮令之意乖違亦非聖詔所謂為宗傳嫡者也所以然者蓋緣禮令據初薨之時定為嗣之人今日於數世之後議當為後者專執令文不原禮意所以齟齬難合異議紛紜忠彥等以為定文之制與古稍異臣等按令文皆約古禮為之安有與古不同之理借使不同朝廷方憲章稽古亦當捨令而從禮豈可棄禮而就令也况令文所謂子孫承嫡者傳襲言嫡子嫡孫相繼不絶雖經百世皆應傳襲也不幸而絶則有立嫡子同母弟以下之事非謂有嫡曽孫捨之不立而立嫡子之母弟也晉庾純云古者所以重宗諸侯世爵士大夫世祿防其爭競故明其宗也吳商云按禮貴嫡重正所以尊祖禰繼世之正統也夫受重者不得以輕服服之是以孫及曽𤣥其為後也者皆服三年受重故也王敞云君為祖三年既為君而有父祖之喪者謂父祖並有廢疾不得受國而已受位於曽祖者也范宣云嫡孫亡無後則次子之後乃得傳重以此觀之明嫡統不絶則旁支無繼襲之道然則令文所謂子孫承嫡者傳襲自嫡曽孫以下皆包之矣所以更言若無嫡子及有罪疾立嫡孫者嫌人無嫡子即立嫡子之母弟或嫡子有罪疾并其嫡孫廢之故也又言曽孫以下凖此者謂庶孫以上皆無即立嫡曽孫之母弟無母弟則立庶弟之類是也若令文之意但以行尊屬近者為嗣則無嫡子便應立嫡子之母弟及庶子何為更立嫡孫也必若忠彥等所云則國家故事取本宮最長者一人封公已是行尊屬近之人便當遵行何必更有改作也彼五服敕所載喪服之制事理各殊豈可引喪服之庶孫證傳襲之庶孫也且造令之時王公以下薨則傳襲故少有立曽𤣥者今諸王之薨已歷數世乃更追議當為後之人則不應捨正統而更取旁支也今欲使合於古而適於今則莫若推自國初以來於其人薨沒之時以令文定當為嗣者以至今日則於禮令不失而亦不離正統矣按秦王廷美以雍熙元年薨於時適長子德恭當立德恭以景德三年卒嫡長子承慶當立承慶以寶元二年卒無嫡子有庶子六人長曰克晤先卒無子次曰克繼當立楚王德芳以興國六年薨嫡長子惟叙當立惟叙以大中祥符四年卒嫡子從煦當立從煦以慶厯五年卒無嫡子有庶子之後世逸一人當立魏王元佐以天聖五年薨無嫡子有庶子三人長曰允升當立允升以景祐元年卒嫡子宗禮當立宗禮以治平二年卒嫡長子仲翹先卒無子次母弟仲髦亦先卒次母弟仲蒼當立仲蒼宗禮第三子以此考之其當為後者豈不明白秦王楚王後宜如薦議魏王後宜以仲蒼嗣下其奏中書中書言越王德昭無嫡子嫡孫無嫡子同母弟無庶子宜以庶長孫宗立嗣世程宗惠不應封餘如六月詔書於是元議官判太常寺陳薦李及之章衡周孟陽知禮院文同張公裕各降一官陳睦韓忠彥各罰銅三十斤而忠彥與蘇頌皆以去官免再議官王圭范鎮司馬光韓維吳充王益柔蔡延慶吕大防各罰銅三十斤薦時亦已去官審刑院當勿論上批法雖去官薦實議首不可原故及之初上出克繼等狀論及世程為庶長曽孫上曰世程非長也王安石因論禮官議魏王無嫡子乃以庶子之嫡子為嫡孫上笑曰無嫡子安得有嫡孫耶及是上令黜罰禮官而陳睦韓忠彥以嘗議正承亮等事故令止以贖論而忠彥又以去官免上曰欲施行盡禮中書亦有失㸃檢衆以為俟行下即當自劾已而宰相曽公亮以下上表待罪詔釋之諸王所封國遷改不一讀者難紀今並取王名附益之庶易見元本蓋無有也舊紀書詔魏王元佐越王德昭封其後為公新紀并入六月丁丑龍圖閣學士右諌議大夫祖無擇責授檢校工部尚書忠正軍節度副使不簽書本州公事丁憂人屯田郎中任造追一任官勒停經恩未得叙用國子博士致仕錢羔羊追三任官衢州編管殿中丞致仕王景追一任官勒停泗州參軍張應巖追參軍明州編管監杭州軍資庫司法參軍孫輔特衝替無擇坐知杭日貸官錢及借公使酒并乘船過制與部民接坐及聽造景羔羊應巖等曲法請求輔坐主公使阿狥無擇法寺奏已㑹去年十一月德音內無擇羔羊應巖皆特斷餘如法寺所奏嘉祐中無擇與王安石同知制誥時詞臣許受潤筆物安石因辭一人之饋不獲義不受以其物置舍人院梁上安石以母憂去無擇取為本院公用安石聞而惡之以為不亷安石既當國無擇遂得罪舊紀書龍圖閣學祖無擇坐貸官錢貶為忠正軍節度副使新紀不書韓駒南窗雜抄云祖無擇知杭州坐法制勘鄭獬往代自開封府移知至郡上疏曰臣過秀州見赤地千里蝗蝻蔽天私怪其故已而見就逮者纍纍道路不絶問之皆坐無擇事追證也無擇官諫議大夫職龍圖閣學士乃以坐法就逮臣不為無擇惜而為聖朝惜也按無於擇與官妓薛希濤通然聞希濤榜笞至死事卒無實至給致仕官張先酒醋厯子及治亭榭不支瓦木價錢則皆州郡常事且今參政王安石前知江寧蔡襄前知福州皆常繕營矣豈盡出於家財若所坐止此則願少寬其獄或更他罪則臣請從坐乃詔無擇追一官勒停駒所云獬自開封移杭州誤也獬自翰林出守在二年五月癸未又云無擇追一官勒停皆失實姑附注此置三班院主簿二員司馬光日紀云東西審官院流內月銓三班院各置主簿審官院見六二十八日流內銓見六月末餘當考減衛州駐泊都監一員從監牧使周革請也詔內殿崇班盤知諒凌遲處死餘黨五人斬一人杖死五人配諸路牢城知諒妻女等配軍士無家者知諒本桂陽監民慶厯初為蠻所掠後數出盜邊招降之補三班奉職纍遷內殿崇班罷泉州監稅家於撫州一日嘗與其子㑹羣偷乘舟詐為吳新等就娶因劫取吉州龍泉縣民郭遠家財二千四百緡走桂陽監為和州東關鎮監稅三班奉職吳植捕獲特於法外論之仍進植一官而撫吉二州捕盜官坐失察捕論罪有差乙卯詔中書堂後官兼五方提㸃魏孝先罰銅三十斤堂後官劉應機主事時士良並降一官監當以上批左武衛大將軍郢州防禦使世清昨以罪降近止許令朝請今敕告中乃復舊官未知因依而中書奏由孝先等勘㑹差失故也先是上以孝先等為過誤王安石曰堂吏所掌專檢勘此不可輕貸乃有是命於是上曰堂吏人數似少安石曰人非少但欲省中書事修選補吏法而已詔三京留臺國子監及諸州宮觀嶽廟所差提舉管勾官等添支大兩省大卿監及職司資序人視知小州知州資序人視小州通判仍各依本人見任官武臣倣此遙郡以上罷正任及遙郡改授南班官元係文資換者却與換文資功績殊異者别取㫖詔京西路於有糧草州軍招廂軍三萬人從轉運司請也丙辰鹽鐡副使兵部郎中韓縝為天章閣待制知秦州先是蕃僧結斡恰爾及康藏星羅結兩人者潜迎董裕詣武勝軍立文法謀姻夏國有并吞諸羌意竇舜卿言王韶招誘董裕下人不當所以致結斡恰爾作過又言宜喻董戬令約束董裕上曰董戬自奈何董裕不得王安石曰舜卿與李若愚等合黨欲傾王韶所奏托碩作過因甚滅裂却專以為董裕下人作過其意可見又朝廷無奈董裕何反控告董戬此徒取輕于董戬而使董戬更驕于制馭董裕則殊非計今但當以兵威迫脅厚立購賞捕星羅結并結斡恰爾招安其餘衆文彥博曰星羅結即須捕結斡恰爾是生户宜勿問安石曰生户侵犯漢界如何縱捨彥博又言購賞無益元昊時亦嘗立購賞馮京以彥博所言為然安石曰結斡恰爾非元昊比也其族類非君臣素定聞自有敢輕侮之者以兵威迫脅重賞購捕必可得上曰元昊威行國中人孰敢犯購捕誠不可得今結斡恰爾事乃不類安石曰若君臣分定中外協附雖無元昊威略亦不可購捕今秉常亦非可以購捕得也上令如安石議安石曰今欲購獲須邉帥肯盡力行朝廷意不然雖張榜購捕而示無推行之意雖出兵迫脅而不示以必攻之形不據其要害之地則雖有迫脅購賞之名而事必無成上欲令沈起專責王韶及髙遵裕了此事安石曰欲出兵迫脅非此兩人能任又言竇舜卿不宜置在秦州朝廷付舜卿以事奏報乃爾乖方雖黜責可也上欲用韓縝代舜卿安石以為縝兄絳在此方用兵恐中書論議多形迹難决當否彥博亦以為宜用縝安石曰陛下欲棄形迹嫌疑則用縝亦奚傷於是用縝縝自河東轉運使入知審官西院兩月中凡五換差遣及遷職云初議購結斡恰爾彥博曰待其復作過乃議蕩除安石曰今尚蕩除不得若今不討則氣勢愈張以為犯漢不敢校則合黨愈衆狃前事復來犯漢則雖欲討除更費力古人為大於其細圖難於其易今正細易之時為之圖之不可以不早也此並據王安石七月二十七日録刪修兩人皆蕃僧據王韶本傳文彥博云結斡恰爾是生户即星羅結亦生户也按董裕乃比托碩者則結斡恰爾或是托碩部族星羅結或是董裕部族也當考韶本傳云蕃僧結斡恰爾康藏星羅結潜迎董裕詣武勝軍立文法謀婚夏國有并諸羌意詔使諭以禍福招其豪曲薩瑚等降之結斡恰爾等約解法廢婚議亦寢未幾康藏星羅結就禽於是諸羌多內附者當檢討兩蕃僧禽獲月日詔以京東預置紬絹并所得息錢五十萬緡賜常事倉司著作佐郎楊完為流內銓主簿編修條例完杭州人從銓司請也
