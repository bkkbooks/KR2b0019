body:
  text: 續資治通鑑長編卷五百一宋李燾撰哲宗元符元年八月丙子朔朝請郎集賢殿修撰知潁昌府髙遵惠為寶文閣待制知成德軍吳安持知潁昌府河北轉運副使呂升卿改河東路河東轉運使郭茂恂改京西路初執政以遵惠與升卿不相得難共處曽布請徙升卿章惇從之先是安惇方論升卿挾怨起上官伋獄上令移京西推勘而惇以獄未成法不可移别路閣詔旨未下故遂從布言上官伋何事當考詔熙河蘭岷路仍舊為熙河蘭會路布録在七月辛未元祐四年八月己亥改蘭會為蘭岷丁丑西南張蕃遣人入貢布録在七月辛未今從實録戊寅左司諫陳次升言舉人就試將燭入院者乞依懷挾法從之涇原路涇略司言折可適入西界俘馘共五百及獲牛駝羊馬等詔軍兵等賜錢有差布録戊寅同呈邉報又折可適出寨斬敵約五百七月二十五日可考熙河路經略司奏乞將來乘機出寨討蕩詔張詢審探不得輕易虛發勞敝人馬布録尚書省言吏部乞舉官有員數而被舉之官亡歿致仕或因贓私罪停廢者聽别舉官充填若前官舉狀不該收使或前一年有未舉人數並許次年再舉從之新削戶部言諸路吏人書手因犯贓罪或纍犯情重依條停罷者並不得募本宗大功已上親承填元闕從之新削保州走馬言探到北界稱太子尚存見計會燕京太師結連兵馬及羣賊謀復位恐北人故為此虛誕因而起兵犯寨曾布曰必無此理上曰密劄與帥臣亦不妨布曰容與三省議上曰不須只密院指揮可也布曰此等事密院固可施行然臣獨當樞府無與議事者故稍涉三省文字必須與三省議及同進呈不敢自用恐有差失爾此據布録太子尚存計會燕京太師必有事因當考龍神衛四廂都指揮使威州刺史權管馬軍司事張整卒賻贈外特賜絹三百匹己卯詔朝請郎河北東路提點刑獄李仲為朝奉大夫以開御河賞勞也詔差文臣升朝官二員專切管勾步軍差使剩員仍以管勾步軍司差使剩員所為名𨽻兵部以步軍事冗故復析為一司庚辰詔今後三省樞密院進擬差遣在京文臣開封府推判官武臣橫行使副在外文臣諸路監司藩郡知州武臣知州軍已上臨時取旨召對三年三月末可考刑部言今後在京官司被受朝旨乞並依元豐四年以前指揮關報御史臺從之鄒浩云云附禮賔使知保安軍李沂為秦鳳路鈐轄辛巳西南程蕃遣人入貢禮部言南郊前朝饗景靈宮太廟乞俟終獻行禮畢皇帝再升飲福降還位從之工部侍郎郭知章言都水使者與內外監丞輪舉使臣如有罪犯乞除輪舉官依舊法外其同奏官於元舉下更減一等科罪從之新削中書舍人趙挺之言朱服除知澶州服向因臣僚言其不孝持母喪湖州不與諸弟同處惟節朔一到几筵因削奪近職今來牽復節鎮理實未安詔以服知宣州紹聖四年閏三月十九日知萊州壬午詔朝散郎致仕何宗範許再任其致仕恩澤追還以監司薦其可任事也熙河蘭會路經略司言蕃官包順引到邈川大首領溫錫沁男巴烏子巴鼐吉歸漢詔巴鼐吉為內殿崇班涇原路經略司上歸明部落子索鼎功狀詔索鼎為三班借職都水監丞曽孝廣勾當內東門司劉友益奏凖差補治永裕陵溝井乞以提舉統領補治永裕陵溝井為名等事御批檢覆工科巡察兵夫等各差使臣二員部役使臣每寨止差一員理斷檢夫官各差破兵士十人大使臣五人小使臣三人官吏等每月犒設一次如有補治利害令劉友益赴闕奏陳餘依奏先是臣僚上言永裕陵居山半脊遇有水下流趨陵而過旁有溝井滿溢間浸靈臺非便上深軫念故命官補治焉御集八月七日三月四日五月二十八日左光祿大夫致仕安日華卒日華燾父也癸未詔今後承旨司得聖旨應合覆奏者並令夲司申樞密院覆奏詔江湖淮浙六路各造神臂弓三千餘箭三十萬布録癸未甲申太僕卿趙令鑠為鴻臚卿鴻臚少卿趙㞦為太僕少卿大理方推究收租錢事故移令鑠七月二十四日可考十月十九日令鑠知光州十二月三日㞦又以少鴻臚為少太僕給事中范鏜言朱服差知宣州按服夲緣不孝得罪可南面長人乎若實賢行體量者妄加此名即朝廷當與辨正乞明詔大臣審議服得罪名實而去取之詔罷新命令呂公雅朱彥同根究以聞公雅彥皆有妨嫌改命遊嗣立程遵彥十七日改命曾布言閻令乞空天都一帶為牧地事且言劵馬不便上問如何布曰令亦曉事然此二者皆非是令欲閉茶却馬令敵人知中國無所資於彼然茶場嵗課二百萬可遽閉乎天都一帶正欲召民兵為戍守可但養馬乎劵馬與綱馬價等而劵馬病者不售死者不算草料昨比較一年綱馬已到寺而死者一分二釐劵馬不及釐而綱馬在路死並已支而死者皆不在此分數其利害不待議論而可知也上深然之丙戌上問曽布曰曽旻謝文瓘何如議除左右史故也布曰旻頗知學術亦曉事但衆論以為險詖文瓘議論趨向頗正兼氣亦稍剛臣聞外議頗欲其在言路但以身在政府不敢啓今已在都司若便擢在左右尤為不次上云先帝多不次擢人布曰如臣與章惇蔡卞之徒皆是然不獨先朝陛下擢沈銖葉濤亦可謂不次上甚悅且曰旻且除異時不必作中書舍人却遷作卿監之類亦可布曰置之此地終難退抑上笑曰極惺惺曉事又問章惇何以喜文瓘布曰乃得之衆論又問周穜鄧洵武布曰臣論之多矣穜專附惇洵武專附卞故卞不喜穜惇不喜恂武各有所偏非公論也穜固不正然洵武正似其父綰天資柔弱然有所朋附則擊搏害物無所不敢為上笑曰綰曽擊章惇云何布曰人言惇與惠卿為刎頸之交半夜之客又目之為城狐社鼠惠卿既逐而惇未去綰又擊之云如糞除一堂之上而留其半遂出知湖州上再問糞除之語大笑又曰惇不喜洵武卞亦不喜旻布曰旻乃惠卿門下士卞固不喜卞嘗為臣言惇不以北郊為然乃出放旻之議論上曰惇欲以十月為北郊五月受寶賜宴皆不妨豈不可於五鼓行禮布曰臣嘗言坤成節最是炎熱之時君臣宴坐冠帶終日豈不甚於夏至黎明奉祠也上曰惇至今疑布曰卞又言旻初來時卞未作執政因問旻議北郊事旻不隱遂求得旻文字一卷卞至今收著待須共旻理會上曰如此即不得又問吳伯舉如何布曰臣已嘗言更在穜洵武之下無足議上默然九月二日布又論洵武伯舉等布因言近日差除多出聖意外議無不愜服德音昨欲用郭知章久未聞除改上曰無易也翌日遂以權工部侍郎郭知章試中書舍人五月末曽布云云尚書省元豐六年條制在京官司應行遣文字有稽遲差失遇恩合原者其止該上簿之人並兩件當一件即是隨輕重理為件數元祐罷去今欲復行從之舊録丙戍鄜延奏苖履出塞討蕩惠卿家傳七月復遣履護七將九千騎出殄羌以八月克帥七日會於桞青平八日至青嶺北賊酋威明鼐濟特沙衆迎敵與戰破之斬首五百級獲牛馬萬計縱兵踐稼十日自威羌還塞威羌當考丁亥朝請郎權禮部尚書權侍讀蹇序辰權改名授之為賀北朝生辰使皇城使泰州團練使李嗣徽副之朝散郎度支郎中王詔為正旦使西京左藏庫副使曹曚副之明年六月八日罰金詔在京侍從官職事官中書舍人已上各舉二人六曹權侍郎已上各舉一人並舉所知堪充是何任使聞奏從御史中丞安惇請也户部言戶絶財産盡均給在室及歸宗女千貫已上者內以一分給出嫁諸女止有歸宗諸女者三分中給二分外餘一分中以一半給出嫁諸女不滿二百貫給一百貫不滿一百貫全給止有出嫁諸女者不滿三百貫給一百貫不滿一百貫亦全給三百貫已上三分中給一分已上給出嫁諸女並至三千貫止若及二萬貫已上臨時具數奏裁增給從之新削朝請郎集賢殿修撰權知應天府杜紘卒舊傳云司馬光議天下奏請情理可憫刑名疑慮多不實輒貸死請勿貸自紘發之時死者甚衆當考戊子詔今後官司誤支官物與蕃官蕃兵及弓箭手並依軍人法新削是日曾布再對呈宋深乞開塘泊種榆栁等又乞修河北城壁布曰塘泊自大河東流有四千餘頃可耕之地見相度召人耕種城壁纍有人言但以敵境有疑未敢興作上曰莫令州郡漸次修葺亦不妨布曰俟與三省議上曰只密院指揮可也布曰臣獨當樞府日久無同列可與議事凡事稍可干涉三省未嘗不與之同議此事密院固可専行若聖意以為無疑臣即當草定遂詔河北諸路安撫司密切指揮逐州軍知州通判因此霖雨之後逐料檢計城壁漸次修整其防守器具什物等亦以次整葺不得張皇得行遣如不遵稟重行黜責遇替移遞相交割如詔旨施行己丑工部言右班殿直王岑自陳父中散大夫令圖向在北京橫隄調發兵夫冒風感疾身亡乞推兒男恩澤詔特與子孫一名太廟齋郎新削翰林學士承旨蔡京言應執政官見學士之禮乞下有司立法時章惇以道服見京故有是請不報新無布録五月戊辰論惇以語言禮貌失人心蔡絛叢談云章丞相惇性豪邁頗傲物在相位數以道服接賔客自八座而下多不平之然獨見魯公則不然魯公時在翰院為承旨亦自負章之不能以氣陵公也一日詣丞相府故事宰執出政事堂歸第有賔吏白侍從官在客次而大臣者既捨轡即不還家徑從廳事所而下以延客及是章丞相反不揖客行入舍公則亟索去於是丞相怍慚恧然而語公曰是必以衣服故得罪矣然願少留公曰某待罪禁林實天子私人非公僚佐即人微顧不恤國體乎遂起欲行章以手按公使留會薦湯而從者少去故得拂袖因卧家具章白其事且以辱朝廷待罪焉哲廟覽公奏深多公之得體亟詔釋之因有旨宰臣章惇贖銅七斤仍命立法以戒後來自是魯公終章丞相之在相位而不以私見噫前朝從臣卓爾風采乃如此恨後來罕見之按絛所云章惇罰銅事與舊録不同疑是飾説姑附注此戶部言河北措置糴便司封樁糴夲錢物除朝廷外不許他司取索其諸州亦不得輒報如凖朝旨申夲司施行從之新削大理寺言諸州公使什物器用陳設并州縣安設所須之物並不得於人戶處借賃及管認裝束妓樂之類違者徒二年長吏知而聽行與同罪不覺察杖一百並不以去官赦降原減其公使庫什物器用陳設如有損闕許以不係省頭子錢修置若擅用轉運司錢者徒二年從之又言訴訟不可施行者並曉示於都門限五日勾收經曉示後人又陳狀依前詞理送所屬告示仍取知委連申經取知委後來依前更陳述者即送所司取勘施行從之新削權提點開封府界諸縣鎮事郭時亮為祕閣校理庚寅涇原奏折可適獲首級及虜生口四百餘人布録辛卯詔故宣政使成州防禦使入內副都知馮宗道為係隨龍遺表恩澤特與六人新削樞密院言麟府路軍馬張世永知府州折克行鄜延都鈐轄苖履各統領將兵出界討蕩斬首各五百餘級詔應出界軍兵各賜錢有差其得功將佐等令經略司具功狀以聞詔戒諸路備禦不得以探報稀少懈弛布録壬辰資政殿學士知定州韓忠彥知大名府試戶部侍郎呂嘉問為寶文閣直學士權知開封府寶文閣待制權知開封府路昌衡為寶文閣直學士知定州二人並除直學士曽布言昌衡罷京尹例當推恩嘉問作待制方一年恐太優上曰亦不校也三省與除布以三省職事遂不復議詔西京左藏庫副使知嵐州劉程通直郎通判鄭語六宅使寧州刺史知石州張構通直郎通判李珙各降一官以進築神泉寨雇人畜不當價也癸已詔刪修皇城司敕王贍陳訴依隨鍾傳妄奏首級詔送制勘所布録癸巳甲午涇原路增置第十二將以折可適曲克權將副布録甲午章楶奏請在六月末丙申降授朝散郎集賢殿修撰權知秦州陸師閔為權户部侍郎二十九日仍舊詔文武臣僚起復今後除管軍及邉任取旨外餘並罷初三省言駙馬都尉郭獻卿卒哭當起復上曰不以金革從事而起復者雖有故事非古也其除之乃降是詔起居舍人龔原為權工部侍郎兼侍講先是上令具少卿以上姓名進呈因親點定無敢異議者既而御史中丞安惇言原元豐初任國子監直講嘗受生員金帛追官停廢詔原為集賢殿修撰知潤州原之初除也曾布為上言龔原久不自安蒙聖恩進擢以至葉濤等稍遷及趙挺之郭知章進擢非出自聖意何繇及此士類無不鼓舞稱頌向者人言龔原間見徐邸實無此事出於讒毁原自言徐邸見官僚皆上歷惟初到官即一獨見此外無獨見者簿歷具在可考虛實上曰只是語言不分明太不開爽布曰此其稟賦如此然純正自守衆論所知不數日竟罷原除工侍在十七日今并書原夲傳云五上章請外而不載言章傳疏矣朝請大夫集賢殿修撰知隨州胡宗回權知秦州上問曽布欲以宗回為戶部侍郎如何布曰宗回有吏才無不可者上曰蔡卞黃履皆稱之而章惇以為暴酷布曰素不聞宗回暴酷惟桂州一事出於嫉惡昨降黜誠未允若以人望為戶部侍郎有餘上亦深然之惇不樂竟用陸師閔而已宗回帥秦上曰不識宗回令朝見訖赴任布曰西帥遷徙不定亦當面諭以邉事樞密院言秦鳯路走馬承受阮易簡嘗奏夲路敢勇張義論隊將侯誠弟詢募首級冒賞詔秦州勘鞫有實及因此勘出統領官秦貴下獲級十五遂作一千三百餘級詔阮易簡特遷三官寄資內臣非殿閣差遣不得寄諸司副使易簡寄資非常例也七月八日云云可考押班閻安特以磨勘改昭宣使布録戊申庚子故嗣濮王宗祐遺表乞兒男推恩詔宗祐為係英宗皇帝同母弟諸子各轉一官詔熙河秦鳳兩路兵馬會合進築止令副總管統制未出界聽熙河帥節制布録庚子辛丑翰林學士蔣之竒應詔薦國子監主簿耿南仲堪臺閣清要知開封府陽武縣陳遘堪不次繁難權戶部尚書吳居厚舉太學博士薛昻任館閣知汜水縣韓蹈任監司戶部侍郎呂嘉問舉宣德郎鄒浩太學教導臺閣顧問知常州無錫縣李積中堪言事官或監司積中除湖南常平在十二月十六日兵部侍郎黃裳舉監京東抽稅竹箔場周彥質知開封府襄邑縣張巨並堪臺閣監司寶文閣待制權知開封府路昌衡亦舉周彥質堪刑獄館閣詔薛昻鄒浩周彥質並令閣門引見上殿耿南仲陳遘薛昻韓蹈鄒浩李積中周彥質張巨陳瓘遵堯録言封事云臣聞紹聖四年蔡卞薦太學博士薛昻上殿昻請罷講筵進讀史書而専讀王安石日録字説哲宗怒曰朕方稽考前代以監得失薛昻諂佞妄言可不黜乎堯舜稽古髙宗多聞緝熙聖學可為後法紹聖大美此其二也趙子嵩中外舊事云哲宗召薛昻對勸上勿觀史專意經術上正色曰朕方看西漢明日語輔臣曰斯人何為引上殿御史蔡蹈言臣竊見朝廷近日引見上殿臣僚已蒙賜對退而俟命十有七八不報而去臣伏思疏逺小臣偶緣薦引乍瞻天顔罔不震懼進對之際倉猝遺忘所不能免若其辭貌不近柔佞而鄙野之氣就列稍久會有變革且器使之以觀其能既而無所取材斥之未晚先王之時務得人材雖侏儒聾瞶有司火修聲蘧蒢蒙鏐之用所以器而使之者也今朝廷方患人才乏職事官員闕自右僕射而下以至寺監丞簿往往通攝無以充數今其進既難則人才益見乏少因而自抑不敢以賜對為望則逺近相傳士志畏怯不自勸勉殆非養才也詩曰芃芃棫朴薪之槱之傳曰量才而任官度德而定位又曰與人不求備如此則下無遺才而朝無虗位矣官人之盛雖成周不能過也惟陛下圖之蹈言不得其時月因路昌衡等薦人物目附見或移入九月十四日己未葉祖洽云云下壬寅龍圖閣直學士知慶州孫路知熙州紹聖二年六月三日知慶州元符二年八月十六日自熙改河南明年正月七日乞進築喀羅川王鞏甲申雜見或更附此四方館使吉州防禦使權鄜延路都鈐轄苖履權熙河蘭會路都鈐轄知蘭州四月二十五日履為鄜延都鈐先是熙河效用李公緒狀首知蘭州王舜臣二月出塞獲八九十級老小妄奏三千級公緒亦虗上三級二月二十九日三省樞密院同呈送制勘所一就根究上曰是密院馬前狀蓋武德先已報知是月丙申也翌日詔諭熙河秦鳳將校兵級虗上首級傷中夲因鍾傳及兵將官指揮上件人更不問罪其餘兵將使臣能於戰守之際立功贖過可以比折減免得所犯罪名者取旨施行以張詢言夲路上下人情不安軍員有殺人而自刎者人情可知布言詢在夲路如第一將在熙州虗上傷中及獲級者千餘人而元無斬獲詢安得不知既不能即時以實告朝廷及被旨體量又不以實報致今日起獄乃詢之罪詢復何言上曰此不可不重行布再對又及詢事曰詢與巴宜俱為監司目擊欺罔豈可不奏况皆被旨體量而詢又權帥何敢爾上曰巴宜須與逺小監當詢亦須罷黜布曰固當如此臣所以對三省力陳正為如此亦不敢以章惇故不極陳上曰國事固當如此後五日布復以通判蘭州張傑書進呈言邉功多不實白草之戰已煩推治威鼎之役復循前軌威鼎之役乃王舜臣二月之出也及卓羅之舉詔使親臨所獲止十八級前日之數十百相倍其情偽可知然則李公緒所陳不虗矣傑又言蘭州當擇守將遂白上欲罷舜臣别擇蘭守上深以為然且曰當以苖履代舜臣布方舉章惇議無以易履而上及之布唯唯而已因言舜臣之事全出張詢然則詢亦何可以安職上云便須罷黜是日秦州制勘所申張詢已出榜告諭兵將官令限外陳首亦與依朝旨免罪改正上赫然曰此豈詢所可專詢何敢便爾指揮衆皆曰不當布因言張詢既掩覆鍾傳誕妄又有舜臣一事若以謂不知則將佐欺誕如此而不能察何可以作帥若知而不言其罪尤大以此言之則詢亦不復可以在職上曰何不罷衆皆曰當罷上曰熙帥用何人布曰臣反覆思之惟孫路可用上曰慶州却用誰布曰容臣等議定取旨今日邉事正在熙州緣熙涇兩路各欲進築城寨通接邉面即環慶但當以兵馬助涇原未可進築故欲徙孫路於熙河兼既欲置苖履於蘭州亦須得名位稍髙者彈壓衆皆以為然上亦曰邉事正在熙河涇原兩路布曰進築得天都以往城寨堅固得邉事收斂有其漸矣環慶一二城寨縱未築得亦無闕事上及同列皆然之乃罷詢用路布再對遂以苖履知蘭州張詢王舜臣並交割訖於秦州聽旨仍令孫路乘馹赴新任是日又得張詢奏云王贍言青唐人半有叛害轄正之意及邈川南山下首領皆言欲附漢西攻轄正詢已令王贍結約兩處蕃部令起兵攻屠轄正候彼舉兵即舉漢兵應接乞速降敕榜處分衆皆駭之布遂草定指揮令詢分析及令孫路相度奏聽朝旨惇悉塗改仍令詢如已舉兵即一面從處置布令院吏各寫一夲欲進呈取旨既而思之不若俱已且將上進呈得旨然後草定惇亦不敢不從同列皆以布所草為是一面從長措置之語決不可用翌日同進呈上亦駭其專輒布曰自邉事以來每以謂須厚撫青唐不可使有間隙若青唐有變則熙河三面受敵自救不暇何暇經營夏國不徒如此諸路應副西夏事宜兵馬事力已是不給若更生一秦即狼狽臣嘗謂方此之時若青唐一有小警則無所措手足今無故生事實安危所繫范育嘗云熙河一路動搖則陜西一路動搖陜西動搖則天下安危所繫也此何可不審元祐中种誼李祥等言青唐二十二頭項兵馬十九頭項欲歸漢其首領皆齎信旗銀笠子赴蘭岷州安撫司為質信又有投漢狀在經略司及蘭岷河三州及邈川來告急范育欲出兵援之猶須奏請而朝廷不從今但以王贍一言為信便約以舉兵殊不可曉張詢何敢爾蔡卞黃履亦曰此太狂妄安危所繫上曰詢何敢如此兼云青唐人半有叛轄正意詢何以得其實衆曰此皆狂妄輕易為國生事上曰詢如此當如何布曰已罷黜只是更添此一重罪狀俟案到取旨遂議定令詢分析仍一切委孫路體問詣實奏聽朝旨措置不管引惹邉患布再對上又曰張詢何敢爾必是章惇令他如此舉動布曰衆亦知其必出於惇兼曽為臣言王贍云青唐可取意欲令詢為之然詢久不敢當此事今日之舉必是欲蓋妄奏首級之罪故爾倉卒上曰必定是如此然惇多與邉吏以私書往還數有人曽論以為不便布曰誠如聖論自林希等在此時每以此為患亦知其必緣私書致人論議執政自來不曾與武臣通書如折克行王舜臣王贍輩惇必總有書與之上曰必有此事欲考虗實亦不難布曰贍等處果有書令走馬取之便可得上曰不難取又曰章惇却恁地布曰惇於邉事大踴躍又欲以此使詢立竒功而同列皆素不預議功在惇與詢兩人而已然行險僥幸此豈可為兼祖宗以來中書樞密院各有職事及邉事則必令二府同議同進呈蓋謹重也故密院事稍大者三省無不可照管至三省事則密院無繇預聞今起此等大事乃欲以私書使邉吏為之而不使同列預議未見其可上深愠之翌日遂詔張詢分析不候朝旨擅結約蕃部攻轄正因依聞奏仍下孫路兼程赴熙州體問王贍所陳虗實如有實狀即責王贍軍令狀奏聽朝旨如不可為即一面多方撫遏務要令青唐一帶上下寧靜不至疑二生事又戒孫路以凖備防秋及經營進築等事詔今後太僕寺合支外路馬軍並依元豐條令軍人就騏驥院調馬其元祐八年五月二十四日令從京差人牽送指揮勿行新削癸邜詔差內侍省押班閻安替入內供奉官勾當內東門司李彀按閲開封府界京東路將兵御集八月二十八日下甲辰朝請大夫集賢殿修撰新知秦州胡宗回權知慶州陸師閔依舊知秦州兼提舉茶馬罷新除戶部侍郎之命先是龍圖閣待制虞䇿自青州改杭州入對上欲留䇿為戶部侍郎而黃履以為不可是日履奉祠曽布同三省對因乞令師閔仍舊以啓上意上從之已而䇿果留為戶部侍郎䇿留試戶侍在九月四日上嘗問布䇿可留否布曰䇿於元祐中在言路甚久無一言疵瑕可指所宜旌别若以為侍郎有餘矣又嘗言士大夫元祐中論議多不正布曰如詆斥先帝非毁政事語言無所顧避此天下以為可誅其間偶於文字中有隱約疑似之言則似亦可恕如趙㞦朱京之類是也上笑曰若如此求瑕則章惇文字中亦有此等語言可指布曰聖諭盡之矣又嘗言曽旻極惺惺曉事布曰旻為學及文詞吏事皆可取但凶險邪慝亦衆所共知如蹇序辰輩亦豈不惺惺曉事但處之太過其分兼此等人不可置之要近爾上笑曰恁地底多惺惺布退稱德音不能已三省言國子監丞畢仲愈言乞詔近臣申講六官之議逹之天下州置六曹參軍而省去職同無補之員右司郎中呂溫卿言請諸路監司及諸州縣依省部六曹所主事務格目分作六案詔送詳定一司敕令所乙巳戶部言印鈔差誤或損汚墨色不均者當官毁抹上歷拘管勒償紙價即私印換者論如盜用餘印律盜白鈔者論如盜官文書律已經書印圓備者論如盜重害文書律並許人告捕內盜白鈔并已書印圓備鈔者依在京通用格賞主守不覺察杖八十知情者與同罪從之新削髙郵軍言飛蝗抱草死玉牒
