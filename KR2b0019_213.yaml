body:
  text: 續資治通鑑長編卷二百九宋李燾撰英宗治平四年春正月庚戌朔羣臣上尊號册於大慶殿大尉奉册授閣門使轉授內常侍由垂拱殿以進是日大風霾契丹賀正使在館故事賜宴紫宸殿時上不豫命宰臣就館宴之使者以非故事不即席曽公亮責以賜宴不赴是不虔君命也人主不使必待親臨非體國也使者乃即席丁巳帝崩於福寧殿神宗即位時年二十百官入福寧殿發哀聽遺制見上於東楹皆如嘉祐之儀惟入埀拱殿後門乃哭為異戊午大赦除常赦所不原者案宋史作赦天下常赦所不原者百官進官一等優賞諸軍悉如嘉祐故事惟百官拜赦不舞蹈舞蹈者嘉祐之失也己未尊皇太后為太皇太后皇后為皇太后以宰臣韓琦為山陵使御史劉庠言禮居喪不飲酒食肉仁宗之喪百官及諸軍朝酺皆給酒肉京師羊為之竭請給百官素食禮官以為然執政不從此據劉庠墓銘及司馬光日記庚申羣臣拜表請聽政不允表三上乃從之樞密院召禮官問遺契丹母書當何稱欲自稱皇姪稱彼為大母判太常寺李柬之同判太常寺宋敏求等以為當稱姪孫叔祖母從之三司使韓絳翰林學士承旨張方平奏疏曰天下不幸大行皇帝奄棄仁宗升遐及今未滿四年大禍仍臻內外公私財費不贍再頒優賞府藏虛散深惟方今至要莫先財用財用者生民之命為國之本散之甚易聚之實難財用不足生民無以為命國非其國也祖宗平天下收斂其金帛納之內帑諸庫其所以遺後世之業厚矣自康定慶厯以來發諸宿藏以助興發百年之積惟存空簿竊見赦書其諸軍將校賞給已行支散外至於文武百官既遷官加職其諸賜賚若更循嘉祐近例竊慮國家財力不堪供給伏乞檢會真宗上仙及仁宗即位舊事施行此乃先朝體例非自今日裁損所有山陵制度遺詔戒從省約竊聞永昭陵修奉之時有司不能恭遵先志張皇勞擾費損不資供索煩多半成棄物乞下三司及經由州縣凡係科率所及路分當職官吏各據的確數目明立期會務在愛惜官私物力今日月猶賖足以辦集至於諸色用度非所急者不以小嗇為無益而弗為不以小費為無傷而不節深慮經逺之計以底蒸民之生方今之切務莫先於此矣臣等被遇先廟叨處近列身同國之休戚目覩民之利病不敢循默少禆涓塵太子右庶子韓維言臣竊聞故事大行皇帝當有遺留物公賜臣下臣伏思承平日久用度無節以致公私財利匱乏又國家不幸四年之內兩遭大故營造山陵又支士卒優賞所費不可勝計今之府庫比於仁宗晚年又益朘削若用嘉祐之例厚行賜賚臣恐為損不少陛下若以為奉承先帝之志加惠羣臣不可罷之則望閲諸府庫取服用玩好物以充用才足將意便可不須過為豐侈所有金帛諸物可以贍兵恤民者願賜愛惜以救當世之急弊又言陛下於此時即位正當躬行勤儉帥先天下以強國阜民為意若以臣言為然則請從此一事為始況遺留之賜自臺諫官以上方始有之此等皆是朝廷近臣義當體國雖至薄約萬無不足之理若事關衆多為陛下怨者臣必不敢妄言詔遺賜令內侍省取旨裁減山陵制度令三司奉行遺制初議山陵上以手詔賜執政於資善堂曰國家多難四年之中連遭大喪公私困竭宜令王陶減節冗費且謂執政曰仁宗之喪先帝逺嫌不敢裁減今則無嫌也癸亥內出遺留物賜宗室近臣有差上謂執政曰仁宗御天下四十餘年宫中富饒故遺留特厚先帝御天下才四年固不可比仁宗然亦不可無也故所賜皆減嘉祐三分之一丙寅始御迎陽門幄殿聽政見百官三司乞內藏錢三十萬緡助山陵支費從之初真宗即位聽政於便殿宰臣等加恩宣制於崇政殿門外及仁宗英宗聽政宣制於文德殿廷至是復用至道故事山陵使言嘉祐八年山陵所役卒四萬六千四百餘人今乞差三萬五千人諸路轉運司和雇石匠四千人從之癸酉羣臣拜表請御正殿不許表三上乃許之上初欲遣王陶往河南府賜手詔曰朕深惟山陵所費浩大方今府庫空竭民力凋敝正當扶危拯溺之際而國家四歲兩遭巨禍志雖切於簡省又慮有司不能遵奉從約之旨今遣卿往河南府計凡事須節省有切時先務者亦宜奏聞又賜詔曰朕前欲遣卿往河南府計置節省山陵浮費庶遵遺旨反覆思之山陵所用皆總於三司少府監欲令與卿同議節減已諭輔臣降敕而朕又以卿在東宫推誠輔朕方即政之初正賴卿與朕戮力圗治故不遽遣也戊寅以王陶為羣牧使二月乙酉始御紫宸殿見羣臣退御延和殿視事龍圖直學士韓維陳三事一曰從權聽政蓋不得已者惟大事急務時賜裁決餘當濶略二曰執政皆兩朝顧命大臣宜推誠加禮每事咨詢以盡其心三曰百執事各有其職惟當責任使盡其材若王者代有司行事最為失體其末又曰天下大事不可猝為人君施設自有先後惟加意謹重并注釋滕世子問孟子居喪之禮一篇因推及後世變禮以申規諷上嘉納焉維事據附傳因始御殿遂著之不傳其日立安國夫人向氏為皇后敏中之曽孫也丙戌御垂拱殿壬辰手詔曰朕嘗侍先帝左右恭聞德音以本朝舊制士大夫之子有尚帝女者輒皆升行以辟舅姑之尊習行既久義甚無謂朕嘗念此寤寐不平豈可以富貴之故屈人倫長幼之序也可詔有司革之以勵風俗朕聞論之始欽仰稱歎至於再三不幸先帝後嬰疾疹其議中寢朕恭承遺旨敢不遂行中書門下可議降詔有司以發揚先帝盛德於是令陳國長公主行見舅姑之禮王師約更不升行公主行見舅姑之禮自此始乙巳賜李端願手詔曰卿地居近戚忠輔先朝纍抗封章悉陳治要先皇帝未及有所施行奄棄四海當沖人嗣位之始是王者有為之秋勿棄謭涼無忘顧託輸忠朕躬庶先帝成業有以振舉應當今先務宜條次以聞後端願所陳甚踈不能副上所望三月樞密直學士禮部郎中王陶為右諫議大夫權御史中丞陶入對便殿上引書咸有一德諭陶曰朕與卿一心不可轉也問以時事陶請謹聽納明賞罰斥佞人任正士復轉對以通下情省民力以勸農桑先儉素以風天下限年藝以汰冗兵命天章閣待制陳薦同修撰仁宗實録降工部侍郎御史中丞彭思永為給事中知黃州主客員外郎殿中侍御史裏行蔣之竒為太常博士監道州酒稅先是監察御史劉庠劾參知政事歐陽修入臨福寧殿衰服下衣紫衣上寢其奏遣使諭修令易之朝論以濮王追崇事疾修者衆欲擊去之其道無由有薛良孺者修妻之從弟也坐舉官被劾會赦免而修乃言不可以臣故徼幸乞特不原良孺竟坐免官怨修切齒修長子發娶鹽鐵副使吳充女良孺因謗修帷薄事連吳氏集賢校理劉瑾與修亦仇家亟騰其謗思永聞之間以語其僚屬之竒之竒始緣濮議合修意修特薦為御史方患衆論指目為姦邪求所以自解及得此遂獨上殿劾修乞肆諸市朝上疑其不然之竒引思永為證伏地叩首堅請必行之竒初不與同列謀之後數日乃以奏藁示思永思永助之竒言修罪當貶竄且曰以隂訟治大臣誠難然修首違濮園事犯衆怒上乃以之竒思永所奏付樞密院修上章自列曰之竒誣罔臣者乃是禽獸不為之醜行天地不容之大惡臣茍有之是犯天下大惡無之是負天下至寃犯大惡而不誅負至寃而不雪則上纍聖政其體不細乞選公正之臣為臣辨理先次詰問之竒所言是臣閨門內事自何所得因何彰敗據其所指便可推尋盡理根窮必見虛實上初欲誅修案宋史云神宗初即位欲深護修使詰思永之竒問所從來辭窮皆坐黜此云欲誅修恐未必然且神宗初立何至以曖昧之言即欲誅舊輔臣耶以詔密問天章閣待制孫思恭思恭極力救解上寤復取之竒思永所奏以入并修章批付中書令思永之竒分析所聞具傳逹人姓名以聞之竒言得自思永而思永辭以出於風聞年老昏繆不能記主名且言法許御史風聞言事者所以廣聰明也若必問其所從來因而罷之則後不得聞矣寧從重謫不忍塞天子之言路因極陳大臣朋黨專恣非朝廷福修復言之竒初以大惡誣臣本期朝廷更不推窮即有行遣及纍加詰問懼指出所説人姓名朝廷推鞫必見虛妄所以諱而不言臣沗列政府動繫國體不幸枉遭誣陷惟賴朝廷推究虛實使罪有所歸章凡三上而充亦上章乞朝廷力與辨正虛實明示天下使門户不致枉受汚辱於是上復批付中書曰凡朝廷小有闕失故許博議聞奏豈有致人大惡便以風聞為託宜令思永等不得妄引浮説具傳逹人姓名并所聞因依明據以聞思永與瑾同鄉力為瑾諱乃言臣待罪憲府凡有所聞合與僚屬商議故對之竒説風聞之由然曖昧無實嘗戒之竒勿言無所逃罪而之竒亦奏此事臣止得於思永遂以上聞如以臣不當用風聞言大臣事臣甘與思永同貶故思永之竒同降黜上手詔賜修曰數日來以言者汚卿以大惡朕曉夕在懷未嘗舒釋故數批出詰其所從來訖無以報前日見卿文字力要辨明遂自引過今日已令降黜仍榜朝堂使中外知其虛妄事理既明人疑亦釋卿冝起視事如初無恤前言它日上謂吳奎曰蔣之竒敢言而所言曖昧既罪其妄欲賞其敢奎曰賞罰難並行乃止墨史孫思恭傳云思恭性不忤物犯之不校歐陽修初不知思恭以為詐及修為言者所攻上將誅修手詔密問思恭恭極力救解朱史以為為言者攻修先帝加詰問既辨明賜手詔召之豈有誅修之意遂刪去按司馬光日記以之竒等奏付樞密院後數日乃復取入密詔問思恭必非墨史之妄今仍掇取附見權知貢舉司馬光等上言所考試合格進士許安世以下三百五人分四等明經諸科二百一十一人分三等詔進士第一第二第三等賜及第第四等賜同出身明經諸科第一第二等並賜及第第三等賜同出身敕下貢院放榜安世及第三等三人並為防禦團練推官其餘注官守選如例丙辰提點開封府界諸縣鎮公事祠部郎中陳汝義判三司都磨勘同知開封縣都官員外郎羅愷提點府界諸縣鎮事愷入見上問以開封事皆不能知上不悅及見汝義問以府界事應答詳敏翌日謂執政曰愷不才冝復用汝義代之仍與館職執政言汝義資序已髙復為提點則下遷冝但令試館職而已上從之知制誥邵必言陛下新即位以言語擢汝義如漢文賞上林嗇夫恐臣下爭以利口求進乞罷之不從汝義詁子汝義直史館在五月癸未并書昌王皓樂安郡王頵乞解官行服詔兩制與太常禮院詳定典禮翰林學士承旨張方平等言謹按大行遺制喪服以日易月自皇帝下至文武百官並依先廟典故惟宗室出則慘服居則衰麻以終制蓋一法度所以尊天子也皇帝承大統奉宗廟昌王樂安郡王當與宗室同例不容以私恩為異所以别嫌明微辨章名分古今通誼也從之丙寅翰林學士兼端明殿學士尚書左丞錢明逸罷翰林學士為端明殿學士兼龍圖閣學士先是御史蔣之竒言臣纍奏彈明逸姦邪及吳申劉庠亦嘗論列先帝屬疾未及施行臣與明逸素無嫌隙但以傾險憸薄在仁宗朝附賈昌朝夏竦王拱辰張方平之黨陷杜衍范仲淹尹洙石介之徒朝廷一空天下同疾况文辭紕繆政術乖疏貪贓有聞沈湎汚濫豈可冒居禁苑而同知諫院傅卞亦有言執政召明逸示以臺諫章疏使自引疾因改命之上它日謂吳奎曰錢明逸不解作文字何因中大科奎言應舉亦繫人之幸一日之長未見其善必若求實才須試以事徐觀其器業又問明逸為人奎言臣頃作諫官嘗論列明逸罪狀其人可知也丁卯三司言在京粳米約支五年以上慮歲久陳腐欲令發運司於上供年額權住起發五十萬石於穀價貴處減和糴之數變市金銀絹輸𣙜貨務封樁分給三路以偹軍須從之壬申尚書左丞參知政事歐陽修為觀文殿學士刑部郎中案宋史作刑部尚書知亳州彭思永等既以論修貶而知雜御史蘇宷御史吳申言猶不已修亦三表乞罷故命出守初英宗以疾未親政太皇太后埀簾修與二三大臣主國論每簾前奏事或執政聚議事有未同修未嘗不力爭臺諫官至政事堂論事事雖非己出同列未及啓口而修己直前折其短士大夫建明利害及所請前此執政多媕阿不明白是非至修必一二數之曰某事可行某事不可行用是怨誹者益多英宗嘗稱修曰性直不避衆怨修亦嘗誦故相王曽之言曰恩欲歸己怨使誰當既出守遂連六表乞致仕不從修年才六十也癸酉樞密使禮部侍郎吳奎參知政事上初欲用奎宰相言陳升之有輔立陛下功上曰奎輔立先帝其功尤大遂越次用之奎入謝日進治説三篇上嘗語以追尊濮王事與漢宣帝異奎對曰然宣帝於昭帝祖行昭穆不相當又大臣所立豈同仁宗能以義立先帝為子先帝入奉大統天下欣戴雖先帝積有令問良由仁宗命為子所以人無異言因言仁宗本意止在先帝更無它擇臣自壽州召還已見仁宗意為大臣間有異議者遂輟後每見必知其微終能決意建立此天地之恩不可忘也追尊事誠牽私恩上深然之又言此為歐陽修所誤奎對曰韓琦於此事亦失衆心臣數為琦所薦天下公論不敢君前有所隱它日奎進言陛下在推誠以應天天意無它合人心而已若至誠格物物莫不以至誠應於上自然感召和氣今民力困極國用窘乏直須順成然後可及它事也帝王所職惟在判别忠邪自餘庶務各有司存但不使小人得害君子君子常居要近則自治矣上因言堯時四凶猶在朝奎對曰四凶雖在朝不能惑堯之聰明聖人以天下為度何所不容未有顯過固冝包函但不使居要近爾太常禮院言凖嘉祐詔書定太廟七世八室之制今大行皇帝祔廟有日僖祖在七室之外禮當祧遷將來山陵畢請以大行皇帝神主祔第八室僖祖文懿皇后神主依唐故事祧藏於西夾室以待禘祫自仁宗而上至順祖以次升遷伏請下兩制待制以上參議後翰林學士承旨張方平等言同堂八室廟制已定僖祖當祧合於典禮請依禮院所奏詔恭依禮院言羣臣奏皇太后稱殿下皇太后處分稱教旨詔皇太后冝稱聖旨餘從之中書言典禮事重乞再下禮院檢詳又從之然卒無所改乙丑贈太師尚書令兼中書令定王允良卒輟視朝五日允良性寬裕好修威儀未嘗詰責左右弟之子宗粹早孤允良保育如所生及卒宗粹請服喪三年然所為荒僣始授泰寧軍節度嫌賜印小私召少府監篆文官張班等入宫與錢帛更鑄大印久之班事發繫開封獄具上不欲致法薄責班等餘置不問好酣樂以晝為夜夜則燕遊晝則寢息左右侍者寢興皆然御史劉庠嘗劾奏允良郊不陪祠久廢朝謁無人臣禮英宗置不問有司以允良起居無度反易晦明諡曰榮易初蔣之竒劾歐陽修上怒曰先帝大漸邵亢建埀簾之議如此大事不言而抉人閨門之私乎之竒以告吳申申即劾亢事下中書上徐知其妄中書亦寢申所奏亢時同知貢舉及出上殿自辨曰臣在先帝時若有是請必不為先帝所容且先帝不豫已來羣臣莫得進見臣無由靣陳必有章奏願陛下索之禁中若得臣章當伏誅索之不得則讒臣者豈得不問願下獄考究上曰朕不疑卿吳申所奏已不行閏三月甲申夏國主諒祚遣使來獻方物謝罪請戒飭酋長守封疆如去冬所賜詔旨復以詔答之曰茍封奏所敘忠信弗渝則恩禮所加歲時如舊仍賜絹及銀各五百匹兩己丑京西轉運使刑部郎中劉述兼侍御史知雜事於是蘇宷遷度支副使中書奏以述代之中丞王陶言述任非所長上因賜陶手詔曰朕固疑述朝望不著士大夫罕有稱者方欲以訪卿而卿適有論列甚符朕意豈得不謂君臣一心覽章賞嘆至于三四大凡執政選言事者利在循默録録輩此意了然可見誠如卿論吕誨傅堯俞朕固知其方正可使止為先朝所逐未欲遽用俟其歲月稍久任之亦未晚也知雜御史誰可當者朝夕密以名聞然上亦竟用述也御史吳申言竊見先召十人試館職而陳汝義亦預漸至冗濫兼所試止於詩賦非經國治民之急欲乞兼用兩制薦舉仍罷詩賦試策三道問經史時務每道問十事以通否定高下去留其先召試人亦乞用新法考試明詔兩制詳定以聞其後翰林學士承旨王圭等言冝罷詩賦如申言於是詔自今館職試論一首䇿一道樞密使永興軍節度使文彥博言蒙賜本鎮公使錢三分之一向因奏事略具陳述蓋樞府無燕犒之費公錢無虛受之理伏望寢罷仍乞自今樞密使領節度使準此從之舊例在京公使錢惟宗室減一半管軍三分給之餘悉罷後增樞密使例至是因彥博辭而罷之知諫院邵亢傅卞御史劉庠吕景言天章閣侍制知永興軍王舉元薄有幹能本無德望四年之間八易差遣遷官改職恩渥便蕃望别選近臣知永興軍仍乞臣僚到任未及二年移差遣者更不推恩詔待制以上因差遣推恩者具職位除授年月取旨庚子詔曰朕以菲德承至尊託于公卿兆民之上惟治忽在朕躬夙夜兢兢上思有以奉天命下念所以修政事之統愧不敏明未燭厥理夫闢言路通上下之志欲治之主所同趣也其布告內外文武羣臣若朕知見思慮之所未及至於朝之闕政國之要務邊防戎事之得失郡縣民情之利害各令直言抗疏以聞無有所隱言若適用亦以得人觀其器能當從甄擢惟爾文武其各體朕兹令之非徒也御史中丞王陶言臣奉詔别舉臺官緣有才行可舉之人多以資淺不應敕文欲乞許舉三任以上知縣資序人為御史裏行從之先是陶乞復用吕大防郭源明執政以為意欲逼已不悅工部郎中知制誥王安石既除喪詔安石赴闕安石屢引疾乞分司上語輔臣曰安石歷事先帝一朝召不起或為不恭今召又不起果病即有要耶曽公亮對曰安石文學器業時之全德冝膺大用纍召不起必以疾病不敢欺罔吳奎曰安石向任糾察刑獄爭刑名不當有旨釋罪不肯入謝意曰為韓琦沮抑已故不肯入朝公亮曰安石真輔相之才奎所言熒惑聖聼奎曰臣嘗與安石同領羣牧備見其臨事迂闊且護前萬一用之必紊亂綱紀公亮熒惑聖聼非臣熒惑聖聽也上未審奎重言之癸卯詔安石知江寧府衆謂安石必辭及詔到即詣府視事或曰公亮力薦安石蓋欲以傾韓琦也龍圖閣直學士韓維言臣今日聞除王安石知江寧府然未知事之信否若誠然者臣竊以為非所以致安石也何則安石知道守正不為利動其於出處大節料已素定於心必不妄發安石久病不朝今若才除大郡即起視事則是安石偃蹇君命以要自便臣固知安石之不肯為也又其精神可以為一大郡而反不能奉朝請從容侍從之地豈是人情臣又知安石之不肯為也所可致者惟有一事即陛下向所宣諭臣向所開陳者是也若人君始初踐阼慨然想見賢否與圖天下之治孰不願效其忠伸其道哉使安石甚病而愚則已若不至此必幡然而來矣臣竊恐議者以為安石可以漸致而不可以猝召若如此是誘之也是不知安石者之言也惟賢者可以義動而不可以計取陛下稽古講道必於此理粲然不惑唯在斷而行之毋以前議為疑則天下幸甚韓維論王安石據維奏議具載之足明安石進退失據也學士院言屯田員外郎夏倚雄武節度推官章惇詩賦中等詔以倚為江南西路轉運判官惇為著作佐郎倚及惇皆治平三年十月兩府所薦者及是召試而御史吕景蔣之竒言倚素無學術嘗任麟倅敗事惇佻薄穢濫向以擢第不髙輒擲劾於廷皆不可奬故不除館職惇浦城人歐陽修所薦也甲辰詔諸路帥臣及副總管有移易可依慶厯故事中書樞密院參議慶厯中嘗詔宰臣賈昌朝凡軍國機務及沿邊兵馬事知州鈐轄宜同樞密使陳報中書參議自後寢廢至是復之龍圖閣直學士知蔡州吕公著龍圖閣直學士兼侍講司馬光並為翰林學士光纍奏固辭不許上靣諭光曰古之君子或學而不文或文而不學惟董仲舒揚雄兼之卿有文學尚何辭光曰臣不能為四六上曰如兩漢制詔可也光曰本朝事不可上曰卿能舉進士髙等而不能為四六何也光趍出上遣內侍至閣門強光受告光拜而不受詔趣光入謝光入至庭中猶固辭詔以告置光懷中光不得已乃受它日上向王陶曰公著及光為學士當否陶曰二人者臣嘗論薦矣用人如此天下何憂不治學士院言奉詔詳定潁許二州進士僧道所貢賀登位銀本朝之制太宗自開封尹晉王即位真宗自開封尹壽王仁宗自建康軍節度升王册為皇太子即位皆無推恩舊領封鎮故事大行皇帝自齊州防禦使即位本州舉人父老僧道詣闕進奉故特推恩今皇帝以忠武軍節度潁王册為皇太子即位與先朝異今兩州貢奉無典故稽考詔却其貢各賜茶綵遣歸丙午屯田員外郎劉攽著作佐郎王存為館閣校勘太常丞張公裕殿中丞李常為祕閣校勘著作佐郎胡宗愈為集賢校理並以召試學士院詩賦入等也攽試入優等故事當除直館入員外郎例不為校勘而攽素與王陶有隙陶及侍御史蘇宷共排之執政但擬校勘翰林學士承旨張方平又奏疏論國計曰天之生民以衣食為命聖人因而均節之立君臣貴賤等威之分以止其爭且亂故禮也者文飾此者也刑也者防禁此者也凡謂賞罰法令仁義亷恥皆緣此而後立者也衣食不足何禮刑之有哉故貨食者人事之確論非髙談虛辭之可致者也今京師砥平衝會之地連營設衛以當山河之險則國依兵而立兵待貨食而後可聚此今天下之大勢也臣在仁宗朝慶厯中充三司使嘉祐初再領邦計嘗為朝廷精言此事纍有奏議所陳利害安危之體究其本原冗兵最為大患略計中等禁軍一卒歲給約五十千十萬人歲費五百萬緡臣前在三司勘會慶厯五年禁軍之數比景祐以前增置八百六十餘指揮四十餘萬人是歲增費二千萬緡也太祖皇帝制折杖法免天下徒初置壯城牢城備諸役使謂之廂軍後乃展轉增創軍額今遂與禁軍數目幾等其歲增衣糧幾何是皆出於民力則天下安得不困臣慶厯五年取諸路鹽酒商稅歲課比景德計會録皆增及三數倍以上景祐中收商稅四百五十餘萬貫慶厯中一千九百七十五萬餘貫景德中收酒課四百二十八萬餘貫慶厯中收一千七百一十萬餘貫景德中收鹽稅課三百三十五萬餘貫慶厯中收七百一十五萬餘貫但茶亦有增而不多爾天下和買紬絹本以利民初行於河北但資本路軍衣遂通其法以及京東淮南江浙景祐中諸路所買不及二百萬匹慶厯中乃三百萬匹自爾時及今二十年但聞比校督責不聞有所寬減也如此浚取天下豈復有遺利自古有國者貨利之入無若是之多其費用亦無若是之廣也昔唐自天寶之亂肅代之後國力大窘禁衛乏餉畿甸百姓至挼穗以共兵食登城門以望四方貢奉之至可謂危蹙矣然患難既平則兵有時而解兵解則民力紓矣今中外諸軍坐而衣食無有解期天下困敝已如此而恬然不圖營救寶元康定中夏戎阻命西師在野既聚軍馬即須入中糧草在京支還交抄銀錢物帛一歲約支一千萬貫以上三司無以計置即須內帑供給慶厯二年三年連年支撥內庫銀紬絹只此兩次六百萬匹兩三司以補不足尋即支盡西事已定二紀于兹中間亦不聞有所處置者邦家不幸大變仍臻頒賚之餘府庫虛匱宿藏舊積盡無餘幾萬一因之以飢饉加之以冦戎臣恐智者難以善於後矣夫茍且者臣下及身之謀逺慮者陛下家國之計兹事重大在陛下所憂無先於此財計之任雖三司之職日生煩務常程計度簿書期會則在有司至于議有繫於軍國之體事有關於安危之機其根本在於中書樞密院非有司可得而預也今夫賦斂必降敕支給必降宣是祖宗規摹二府共司邦計之出入也今欲保泰豐財安民固本當自中書樞密院同心協力修明祖宗已前舊典先由兵籍減省以次舉其為弊之大若宗室之制官人之法諸生事造端非簡便者裁而正之至于微末細故於國計盈虛不足為損益屬之有司可矣提其綱則衆目張澄其源則下流清易曰窮則變變則通通則久又曰變而通之以盡利節卦之辭曰節以制度不傷財不害民故傷財害民之事當為制度以節之爾若但遵常守故齪齪細文避猜嫌顧形迹恤近議而廢逺圖忽人謀而徼天幸日月逝矣歲不我與後雖噬臍何嗟及矣臣叨在近列荷恩三朝竊見時事日以迫急不勝憂憤輒罄狂瞽惟陛下留神省察
