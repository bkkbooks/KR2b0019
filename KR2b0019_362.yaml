body:
  text: 續資治通鑑長編巻三百五十八宋李燾撰哲宗元豐八年秋七月甲午門下省言本省文字各有日限其承中書省樞宻院得旨文字吏不分緩急呈押入進已得畫職級方㸃檢簽書慮有差舛欲自今承受文字先當行吏次職級紙背簽書次給事中書常程文字即付本房呈押入進如故應合商議者職級先呈方寫繳狀簽書進發急速及當日或次日值假當行吏須先呈押以進者候到省次第簽書從之詔吏部郎中張汝賢察舉福建路蹇周輔所立鹽法先是差御史宇文昌齡察治其事以聞右司諌蹇序辰言父周輔與昌齡鄉里故舊乞差不干礙官故改汝賢五月十六日差昌齡六月二十四日序辰罷諌職宻疏有序辰奏當増入今附注扵此右司諌蹇序辰奏福建江西湖南鹽法竊聞近日朝廷差官察舉昨日又相度立法因差臣充提舉官兼領鹽事臣昨任監察御史及殿中侍御史日不能取悦同僚多觸衆惡臣由是與黄履黄降違悞不合後遽以臣父知開封府日騰說事迹奏彈則臣勢難同處自須引去換授臣父為中書舍人而臣待罪諌官福建路差宇文昌齡昌齡與臣父同鄉里為故舊又江西湖南路差陳升之素與黄降相知兼由黄履薦舉竊慮迎合伏望改差不干礙官前去奉聖旨福建路改差吏部郎中張汝賢殿中侍御史黄降言京東西路保馬司管勾公事官乞並權罷候至買馬年分依舊詔保馬司各具合留員數朝議大夫直集賢院陳倩以職換中散大夫為司農卿以職換一官此據政目増入要考以職換一官故事朝奉大夫范純禮為户部郎中六月末司馬光薦太常寺閤門言西人見辭儀制乞如嘉祐八年見扵皇儀殿門外所有朝辭縁太皇太后權同聽斷軍國事乞許垂簾日朝辭或止令門辭詔見依嘉祐八年朝辭詣垂拱殿又詔夏國陳慰使副赴闕遇將来坤成節日已放見令勿豫燕詔諸鎮寨市易抵當並罷仍依條立法舊録云先帝詔有司買賤賣貴以平物估姦人未敢悉廢故先鎮寨新録辨曰買賤賣貴是何等語而謂先帝有詔可乎今刪去王巖叟有章論市易或可先見乎此據巖叟朝論則十月十六日乃言事此詔不因巖叟也政目乃無此丁酉宰臣執政中散大夫卿監宗室正任團練使以上赴南郊壇立班請大行皇帝尊諡於天翰林學士鄧温伯言奉詔告天請諡天賜之曰英文烈武聖孝皇帝廟曰神宗詔恭依戊戍資政殿大學士銀青光禄大夫兼侍讀吕公著為尚書左丞公著言臣伏覩周官三公三少掌論道經邦寅亮天地然皆分治卿職盖進則坐而論道退則作而行之此三代之眀法也唐太宗用隋制以三省長官共議國政事無不總不專治本省事國朝之制毎便殿奏事止是中書樞宻院兩班昨来先帝修定官制凡除授臣僚及興革廢置先中書省取旨次門下省審覆次尚書省施行毎各為一班雖有三省同上進呈者盖亦鮮矣此盖先帝臨御嵗久事多親决執政之臣大率奉行成命故其制在當時為可行今来陛下始初聽政理須責成輔弼况執政之臣皆是朝廷遴選安危治亂均任其責正當一心同力集衆人之智以輔惟新之政譬如共輿而馳同舟而濟人無異心則何求而不得何為而不成伏望聖慈留神省察眀降指揮應三省事合進呈取旨者並令三省執政官同上奏禀退就本省各舉官制施行自元豐五年改官制政柄皆歸中書省王珪以左相在門下拱手不復校王安禮毎憤懣不平欲正其事而力不能也公著被命未受即為上陳之後遂詔應三省合取旨事及臺諌章奏並同進呈施行公著以七月六日拜左丞十一日上此議今附見不知得請果是何月日黄履論韓縝見九月十四日乙巳更詳考之公著家傳便接續載太皇太后諭執政以母改子法及司馬光急扵有為等事考按其時多差池不合司馬光以母改子之言見元豐八年四月庚寅二十七日朝奉大夫守祕書省少監兼侍講孫覺為右諌議大夫兼侍講仍賜三品服中書舍人楊景略為龍圖閣待制知蔡州避親嫌也避親此據景略𫝊景略妻韓維女維尚未執政盖韓縝為中書相在五月二十六日也朝散郎黄好謙為駕部郎中十月十八日詔府界三路保甲自来年正月以後並罷團教仍依義勇舊法毎嵗農隙赴縣教閲一月其差官置場排備軍器教閲法式畨次按賞費用令樞宻院三省同立法舊録云什伍其民教以武事兵出扵農始扵熈寧備扵元豐河北一路得勝兵三十萬北邉震恐時未遽罷漸減廢焉新録辨曰得勝兵三十萬北邉震恐無所稽考今刪去司馬光云宻院聞光欲上奏先以白劄子進呈畫此指揮光奏在此月十二日甲辰後此六日又此月二十二日甲寅八月二十六日丁亥十月二十八日己丑十一月十六日丙午十二月六日丙寅皆有措置保甲事舊録於立法下又云後詔五都保以上並分四番自十月起教至正月令保即先從多教周而復始其提舉錢糧官司並罷令教閲司兼領新録因之按此乃八月二十六日丁亥事當附本日不合入此今削去玉牒於七月五日丁酉書詔罷三縣保甲盖考之不詳也甲辰資政殿學士韓維兼侍讀仍提舉中太一宫兼集禧觀事六月十四日知陳州詔自今待制已上磨勘止中書省擬進詔夏國陳慰使副朝辭日賜銀器衣著詔今後知州年及七十不許奏舉再任禮部尚書韓忠彦等言皇太妃在三年服内衣褥從物並淺淡生日節序物色依皇后例稱慈㫖慶賀用牋太皇太后皇太后於皇太妃稱賜皇帝稱奉百官不稱臣從之門下侍郎司馬光言先帝以敵人驕傲據漢唐故地有征伐開疆之志故置保甲令開封府界及河北陕西河東三路皆五日一教閲京東西兩路保甲養馬仍各置提舉官權任比監司既而有司各務張皇以希功賞其提舉官専䕶本局不顧他司事干保甲州縣皆不得關預管内百姓不得處治其廵檢指使保正保長競為騷擾蠶食無厭稍不如意擅行捶撻其保丁習於游惰不復務農或自為劫掠或侵陵鄉里其本家耕種耘穫率皆妨廢供送不辦箕斂無窮貲産耗竭無以為生弱者流移四方壯者亡為盜賊行之數年先帝寖知其弊申敇州縣令保甲應有違犯并廵教官指使違法事件并許州縣覺察施行及陛下踐阼聽政首令京東西兩路保甲養馬並依元降年限收買其剰過數目並充次年之數又令開封府界三路團教已及半年經朝廷按閲者毎月併教兩日未經按閲者併教三日又令見教人身材弱小或久来疾病及本家止有一丁病患不堪營作第五等以下地土不及二十畝者竝許州縣保眀提舉司審騐放免又令一縣不得過二分皆聖澤矜寛民力於保甲勞廢雖十减五六然保甲保馬向去㸃擇買養補填尚猶如舊其廵教指使保正保長名目猶在於所轄保甲恐不免須有陵逼侵漁其四時教閲雖減日數未免妨農臣愚以為此保甲若使之逐捕盗賊則近已有指揮廵檢縣尉及弓手兵級人數並令依保甲未上畨以前人數復置其保甲更不令管捕盗若使之攻討四夷則皆畎畆白徒教閲雖熟未嘗見敵與敵人戰闘必望風奔潰登極詔書勅邉吏令不得侵擾外界務要安靜疆埸然則此保甲保馬的實有何所用徒令府界及五路農民不堪愁苦幸頼社稷之靈適值累年豐稔猶流民甚多盗賊充斥若遇如眀道年之蝗康定年之旱至和年之水則為國家大患豈可盡言近者羣盗王冲乗保馬諸處行刼置保馬本欲逐盜今為盗資又獲鹿縣保甲斫射毆傷提勾孫文廵檢張宗師以下陵上是乃大亂之源漸不可長凡保甲保馬有害無利天下之人莫不知之臣不知朝廷何憚而久不廢罷伏乞斷自聖心盡罷諸處保甲保正長使歸農依舊置耆長壯丁廵捕盗賊户長催督稅賦其所養保馬㨂擇勾收太僕寺量給價錢分配兩騏驥院坊監諸軍召提舉官還朝其勾當公事廵檢指使並送吏部與合入差遣如此開封府界五路之民孰不歡呼鼓舞荷戴聖徳若以保甲中武藝已成之人可惜使之歸農即乞令逐縣以户馬數毎五十戸置弓手一人略依縁邉弓箭手法許蔭本戸田二頃與免二嵗或税輕者與免若干石斗税及下戸諸般科役本戸田不足聽蔭親戚田務在優假使人勸募然後召募本縣鄉村尸有勇力武藝者投充弓手計即令保甲中有勇力武藝者必多願應募若一人闕額有二人以上争投者即委本縣令佐㨂試武藝髙强者充若見充弓手人有勇力武藝衰退許他人指名比較若勝於舊者即令充替如此則不須教閲武藝自然常得精熟一縣之中其勇壯者既充弓手其羸弱者雖使之為盗亦無能為患仍委本州及提㸃刑獄常切按察令佐有取舍不公者重加刑典若無人投名乞更議優法若尚召募不足即且於鄉村户上依舊雇人候有投名者即令充替若弓手數多即令分畨更互在縣祗應一年一替其餘各分地分廵捕盗賊毎獲賊勘得赦後住止及窩藏去處其本地分嚴行科責及出賞錢與獲賊之人其賊發地分更不作三限科校即令捕賊給賞如此則賊發之處捕盗之人不復掩蔽住止窩藏之處捕盗人不肯庇匿盗賊無所容身自然稀少䟽奏蔡確等執奏不行詔保甲依樞宻院今月六日指揮保馬别議立法宻記具載光奏至自然稀少下即云同三省奉旨保甲依樞宻院今月六日已得指揮保馬關中書省别議立法進呈光前乞罷保甲在四月末䟽語自乞置弓手以下與此同今兩存之舊録云光在先朝論不合先帝弗用然亦弗罪以資政殿學士歸洛至是執政倡變法之議以報怨確等執奏得尚循前詔新録辨曰王安石嘗云始終言新法不可行者司馬光光之論議本末具在哲宗登極宣仁稱制首起扵閑廢而登之廟堂所以成先帝之志也謂之報怨不可以傳信後世自光在先朝至尚循前詔四十四字並刪去餘以司馬光劄子全文添修司馬光乞罷保甲奏後載宻院劄子欲府界三路保甲自来年正月以後並罷團教止令毎嵗農閒月分依義勇舊法赴縣教閲一月所有差官置場排備軍器及教閲法式番次按賞費用等仰樞宻院取索㑹校措置條畫與三省同共立法取旨施行七月六日進呈奉聖旨依此光自注云時樞宻院聞光欲上前奏先以白劄子進呈畫此指揮光奏尋上十二日三省樞宻院同進呈奉聖旨保甲依今月六日已得指揮所有保馬别詳議立法進呈元祐元年正月十四日實録乃書詔保馬别立法以聞乙巳夏國陳慰使鼎努威明黙多克副使吕則依陳裕勒戩等進慰表於皇儀門外退赴紫宸殿門賜帛有差丙午遼國遣奉國軍節度使耶律琚起居郎知制誥充史館修撰王師儒来祭奠又遣寧州觀察使蕭傑客省使海州防禦使韓昭愿来弔慰入皇儀殿大行皇帝神御前行祭奠之禮移班東幄殿見上進名奉慰庚戍朝散郎權發遣河北東路提㸃刑獄王端臣以按吏不當降授朝奉郎知永興軍龍圖閣直學士劉庠再任五月戊午改青州六月戊寅復永興三省樞宻院言同差除及進呈文字理須㑹議者先扵都堂聚議或遇假及已歸東西府聽便門往来聚議從之樞宻院言府界三路團教保甲雖不當赴教日往来於市井村疃以習學事藝為名聚集飲博不治生業詔提舉保甲司關牒轄下不赴教日令務農作遇閑暇許扵本家閲習事業違者重坐之范純仁奏臣伏覩提舉保甲司牒凖樞宻院劄子指揮鈐束保甲子弟不令聚集飲博即遇閑暇于本家閲習事藝竊縁保甲毎月雖䝉指揮併教兩日或三日比之自来日數全少然未免往来聚集有妨農務盖子弟慣入鎮市漸喜逰惰託以修葺弓弩箭器或期約同保私閲為名不肯專意生業官司及父兄終難鈐束覺察自古三時務農一時講武又曰皆于農隙以講事此古人不易之法所以東作西成得盡其力三年之食可足使武事不廢民力不窮三代興王同此道也盖農事播種歛穫不可少有失時常若盗冦之至茍一日愆期或致終嵗之闕則職在勸農者所當申陳也臣今欲乞應三路教閲保甲計一嵗合教日數併就農閑之月其餘月分並歸農業則官司與父老易為拘管純仁奏不得其日今附此殿中侍御史黄降奏伏見沿汴狭河堤岸空地先有朝旨許人斷賃而宋用臣挟持恣横風諭沿汴官司拘攔牛馬果子行須就官地為市交易并其餘諸色行市不曽占地亦納課錢以至市橋皆有地課殘民損國無甚於此雖今例廢罷改正施行縁近降朝旨不曽該載人户至今未得自便臣欲乞朝廷詳酌指揮詔沿汴官司拘攔牛馬果子行并磨團户斛㪷菜紙等諸色行市及市橋地課並罷仍令㸃磨措置結絶在京物貨等場所依廢罷物貨場已得指揮舊録十八日庚戍書詔沿汴官司諸色行市市橋所出地課並罷新録乃脱此叚按元祐宻䟽載黄降所論及降旨甚備今用之政目十八日罷沿汴官司拘攔牛馬果子行并磨團户斛㪷菜紙等行及地課降所稱今例廢罷事在五月三日㸃磨措置結絶在四月八日降又奏伏見福建路下四州軍産錢福州十二縣共八千餘貫泉漳州興化軍一十四縣共六萬餘貫而福州縁王氏之舊毎産錢一當餘州之十其科納以此為率餘随均定鹽額及細出役錢亦皆至五倍而其實減半焉昨者王子京奏立産鹽法不曽檢㑹前項别例遂於元額上増多寡之間甚相遼逺本縁子京之誤遂為定額民間應辦已渉七年逺民之冤未易伸述今来伏遇朝廷遣使按察欲乞特賜詳察令就本路體究詣實改正施行詔劄與張汝賢又奏伏睹朝旨以臣所奏沈希顔事令希顔分析聞奏臣檢㑹元奏内有稱希顔鹽法未便一節係别委本路官體量欲乞再賜詳酌特依臣元奏施行詔令京西北路提刑司體量詣實聞奏六月十五日已體量希顔降二奏並據宻䟽係七月事今因罷沿汴地課在七月十八日並附此二奏癸丑髙麗國祐世僧統求法沙門釋義天等見于垂拱殿進佛像經文賜物有差實録五月八日書蘇注引伴六月二十二日書范百禄舘伴今皆削去但存此甲寅遣官分按逐路團教保甲河北東路左藏庫使李詵西京左藏庫使劉惟簡西路引進使康州刺史樞宻副都承㫖曹誦文思使髙州刺史竇仕昌河東路東上閤門副使王舜封供備庫副使馮景永興軍路光州團練使髙公繪邵州刺史張節愛尋遣左藏庫副使麥文昞代馮景文昞代景在八月癸亥并書詔差在京馬歩軍驍騎等一十五指揮赴鄜延路權駐泊替東兵三將歸營樞宻院言鄜延路權駐泊在京馬歩軍十五指揮昨權團作三將差官訓練今已年滿乞差兵替歸詔令鄜延路都總管司並罷團將候西人過界令畨次起發歸營宻記七月二十二日禮部言大行皇帝虞王回京至瓊林苑權奉安依故事皇太后行奉迎之禮今皇太后已從靈駕回不當行奉迎之禮詔大行皇帝靈駕發引皇太后不從行候虞主回京依故事於瓊林苑奉迎舊録云上新即位先帝所棄逐者漸據髙位無復忌避忠義憂恐蔡確懼請太后勿從太后以疾辭得不行新録辨曰據所書係因禮部申請詔依故事太后不從而乃欺罔虧損聖徳自上新即位至辭得不行三十八字並刪去門下省言自今應天下州軍勘到强盗情無可愍刑名無疑慮輙敢奏聞者並令刑部舉駁重行朝典不得用例破條從之司馬光劄子范百禄𫝊八月癸酉眀年閏二月壬辰丙午當並考舊録云祖宗以来大辟可愍與疑慮得奏裁多從寛宥司馬光屢奏以為廢法故降是詔由是例外不敢奏讞刑部侍即范百禄與其屬劉賡數辨論之不従死者甚衆熈寧嵗二三千或千有竒元豐嵗一二千有竒或不及千元祐嵗四五千或二千有竒新録辨曰按舊文云祖宗以来大辟可愍與疑慮得奏裁則情理無可愍刑名無疑慮者有司妄讞以希寛縱非辟以止辟之意今使刑部舉駁不得用例破條正合祖宗立法之意治姦惡安善良則斷獄雖多乃致刑清之漸也自祖宗以来至二千有竒九十四字並刪去先是曹州民趙倩等三人同刼南華縣頓榮家財物以槍刺傷頓榮既捉獲估贓計六千九十九錢曹州勘頓榮被刺傷時不曽經官檢驗遂具案奏聞大理寺定斷趙倩等㑹赦准律合决重杖處死刑部用例擬特貸命杖脊二十刺靣配廣南逺惡州軍司馬光以為近年諸州勘到刼賊但不曽殺人放火者並作情理可愍或刑名疑慮申奏朝廷率從寛貸竊詳逐人既為刼賊情理有何可愍赦後贓滿傷人刑名有何疑慮此皆逐州官吏避見失入罪名專務便文營已無去害疾惡之心况曹州素多盗賊係重法地分如趙倩等所犯如此皆得免死則是强盗不放火殺人者盡皆免死竊恐盜賊轉加恣横良民無以自存殆非懲惡勸善之道故有是請范百禄新傳云遷刑部侍郎有以强盜及故殺闘殺情可矜者讞於朝法官援例貸免司馬光曰殺人不死則法廢矣百禄曰謂之殺人則可制刑而以為不疑原情而以為無可憫則不可今必處死則二殺之科自是無可疑與可憫者矣卒不用前此嘗詔天下奏獄不當讞者按其罪有司重請讞至有枉情以合法者百禄曰熈寧之令非疑慮與可憫而輙奏者免駁勘至元豐刪去之去年詔書不得用例貸配不當即奏劾自是官吏畏罪不憚論殺因具元豐六年至元祐二年死者貸者之數以聞眀年奏獄門下省多駁正當貸者皆欲殺百禄屢以告執政執政言扵上有詔例在有司者悉收還中書置檢例官二人使議去取閲刑部大理所奏疑慮若可憫情法輕重之狀有異同各以上百禄請去且上䟽論之悉如所請自是例復歸刑部矣百禄舊傳同此當附二年三月或元年九月仍辨其誤王震舊傳云遷給事中時司馬光等變亂法度震度不能争屢欲引去㑹光以州郡讞獄情理可憫刑名疑慮得貸者衆雖有生比不肯用震見光省中曰天下奏案一耳前此例貸死今皆殺之光曰刑輕扵古民易犯矧刑名疑慮引例求貸皆古所無震曰漢約法三章傷人及盗抵罪今盜固有至死者罪疑惟輕與其殺不辜寧失不經皆聖人在上憫元元之意也且漢有决事此何謂無眀日以光所斷當生而殺者具其名數誦言扵朝因求補外遂以龍圖閣待制知蔡州王震新傳云遷給事中時司馬光為相震心不自安欲引去㑹光改刑名疑慮法震見光省中云云因求補外遂以龍圖閣待制知蔡州元年閏二月四日震乃出知蔡州震與光辨當附出知蔡州時舊録杜紘傳云紘為人外若寛曠而中實深險初為文彦博吳充等知薦之元祐初司馬光議天下奏情理可憫刑名疑慮多不實輙貸死請勿貸自紘發之時死者甚衆紘長於法律其刻深類此元祐中附㑹以進新録辨曰史氏有言曰仁者制亂而弱者縦之盖剛强非不仁而柔弱者仁之賊也本朝累聖一徳主扵好生然亦未嘗縦舍有罪末流之弊吏以便文自營為俗雖扵用法無疑者皆以上讞輙見虧除是故姦宄以為幸而民多寃司馬光所以捄有司之過以輔成王者制亂之仁此天下正議也嘗聞之諸老長者元祐初丞相光當國天下死刑減往時少半非盛徳孰能之而史官妄謂時死者甚衆自紘為人以下刪去兵部言河東經畧使吕恵卿奏寧化岢嵐火山軍見管弓箭手五千餘人𨽻第十一將統轄已指揮將副依倣保甲法於弓箭手内選人充教頭禁軍内選都校頭支錢米就教場習事藝并㨂退老弱換强丁馬有疾老者亦令别印換並繫邉防動衆及更改舊法理當奏取朝旨詔河東第十一將下弓箭手新定團教等條格及創添上番人數並不問情願買馬等事更不施行令本將並依舊條管轄教閲新本削恵卿所奏今復増入詔開封府盗合配者依舊條餘令立法此據政目二十五日事九月四日乙未可考殿中侍御史劉次荘奏伏見倉部起請乞將賈青買到建茶五十斤往河北出賣今若運往河北出賣不獨猾商乗影接迹潜冒賈販而姦細之人亦必轉入敵界敵既知其物之重輕又復可以必致則異時賜與將不為珍矣伏望聖慈特賜止絶詔措置河北糴便司糴本建茶只令在京變轉又奏伏見府界提㸃范峋於祥符縣等許人買撲都宰殺猪羊及果子牛牙勾當戸部見行舉問及訪聞京西路轉運副使沈希顔亦於本部置棚拘攔人戸買賣牛馬出納净利近因陳向到任方行改正二吏掊克妄有造立無有條法伏望委官根究詣實重行黜降詔府界令提舉司京西路令提刑司體量詣實聞奏政目二十二日詔罷河北糴本建茶二十八日詔體量府界提㸃司許人買撲宰殺猪羊并果子牛牙及京西轉運副使沈希顔拘攔人戸買賣牛馬納净利據宻䟽即劉次荘論列也乙卯彰徳軍節度使檢校太師北京留守王拱辰卒初拱辰上表乞致仕仍先次給假舁疾便路歸西京醫治不允及是訃聞輟朝一日贈開府儀同三司丙辰戸部侍郎李定為龍圖閣直學士知青州寶文閣待制吳雍為戸部侍郎起居郎范百禄為中書舍人右司郎中胡宗愈為起居郎右司員外郎邢恕為起居舍人吏部郎中劉摯為祕書少監朝散大夫監衡州鹽倉劉攽知襄州詔吏部侍郎熊本罰銅十斤以本昨知桂州在任日三奏歸化順安州儂智㑹等遷徙不便及到闕却乞津遣赴經畧司前後異同故也湖北都鈐轄轉運司言沅州修建寨堡招納蠻猺合要戍兵使臣軍須事樞宻院奏自置沅州已踰十年即無宜峩州等蠻人作過兼知州謝麟昨建議於托口等處増修寨堡已是民力困扵逺輸今若晃宜之間更建寨堡費用尤廣及將来添屯兵馬増置官吏供饋耗蠧生事無補詔去年九月二十一日所降修堡寨指揮更不施行去年九月二十一日指揮今附注此宻記二十四日丙辰湖北都鈐轄轉運司奏沅州相度將来修建寨堡招納蠻猺合要軍兵使臣所湏事件檢㑹孫覽奏沅州先曽招懐狤狼九衙上卿大小平等溪峒班行人員等本州人情上下親見諸處招納建置城寨亦欲擘畫措置重行抄撘臣在彼處子細詢訪别無利害伏望朝廷且與依舊来補立名目覊縻不湏廣有興建已降朝旨令荆湖北路都鈐轄轉運司相度以聞續據兩司奏沅州相度到縁宜峩等州皆控制沅州上㳺萬一有桀黠酋首結連羣蠻為患水路可一二日徑至沅州城下不可不慮朝廷必欲招納麻陽兩縣之間生惡狤狼勢須晃宜之間先建城寨鎮撫兩司看詳九衙上卿大小平狤狼等處溪峒雖已歸眀僻逺令乞依舊覊縻不湏措畫外令相度沅州所乞扵宜洽州地分修寨波晃州地分建堡經久穏便伏望依沅州所乞施行去年九月二十一日已有朝旨依奏今兩司奏為將来修建寨堡合要軍兵使臣所須事件契勘自置沅州已經十年有餘即别無宜峩等州蠻人作過知州謝麟昨建議於托口等處増修寨堡已是民力逺輸困擾不易今若於晃宜之間建創寨堡費用財力不少及將来添屯兵馬増置官吏生事無補兼向去供饋耗蠧民力同三省奉旨去年九月二十一日所降指揮更不施行玉牒云詔罷沅州所置堡寨丁巳詔頒大行皇帝尊諡廟號羣臣奉慰如儀政目二十二日翰林學士鄧温伯上大行皇帝諡曰英文烈武聖孝廟號神宗實録已并入七月五日庚申中書省言管勾講筵所言准令講筵春起二月上旬止五月三日秋起八月上旬止冬前十日本所今来未敢依令施行詔候祔廟畢取旨詔罷提舉開封府界京東京西路將兵官謁禁從劉奉世之請也前熈河蘭㑹路經畧制置使司言昨朝廷所降空頭宣誥等有朱書填乞回納從之仍下河東陕西諸路經畧司依此今後得功人並自朝廷推恩涇原路經畧司言同家堡廵檢李遇與賊闘死之詔録其子仍加賻典司馬光言臣伏見陛下詔開言路至今已渉旬月臣僚民庶上言朝政闕失民間疾苦奏狀必多未見有付外令三省或樞宻院商量施行者如此則徒煩聽覽何所禆益昔漢昭帝時吏民上書言便宜有異輙下杜延年平處復奏先帝初即位詔中外上言得失亦令臣與張方平同詳定選擇可取者與元奏狀同進入内或降付三省樞宻院施行臣竊計今来臣民所上文字其間是非臧否雖錯雜嘉謀長策不可謂無以睿眀所燭諒毫髪無遺豈可一概棄置全不采用欲乞選其可從者降出施行或以萬幾之煩未暇遍加省覽即乞依臣前奏降付三省委執政官分取看詳擇其可取者用黄紙簽出再進入或留置左右或降付有司從之光集載此劄子在七月十二日後今附月末殿中侍御史黄降奏福建路臘茶近王子京奏官復禁𣙜今遣使按察竊見京東路吳居厚罷任日鐵錢監並權住民間買納之物未得拘𣙜並候范純粹相度别聽朝旨今来子京所奏福建等路茶法臣欲乞依此事體施行詔令權住收買又奏伏見京東西兩路保甲司勾當公事官今来買到保馬比元降年限數多已准朝旨以充次年分之數即買馬年分尚賖嵗月見在馬數自可只委逐縣令佐詣保㸃閲欲乞並權放罷候至買馬年分依舊詔令京東西路保馬司各據的實合勾當公事官員數及選定具名聞奏宻院有此云八月事今附月末
