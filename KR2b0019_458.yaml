  - {type: page-break, offset: 0, content: '', id: KR2b0019_WYG_458-1a, image: WYG0321/WYG0321-0814c.png}
body:
  text: 續資治通鑑長編卷四百五十四宋李壽撰哲宗元祐六年春正月辛酉朔不受朝丁卯以皇城使黃忱領端州刺史六宅使胡田領循州刺史宫苑副使李贇為皇城副使左藏庫副使許慶為皇城副使莊宅副使孫暉為右騏驥副使供備庫副使李備為文思副使供備庫副使劉子方為西京左藏庫副使內殿崇班閣門祗候程建為內殿承制前文思副使秦世章復內殿崇班以措置荆湖北路邊事司言忱等躬督士卒轉戰有勞故有是命是月御史中丞蘇轍言劉摯日記內降此章乃正月七日丁卯伏見前年冬溫不雪聖心焦勞請禱備至天意不順宿麥不蕃去冬此災復甚而加以無冰二年之間天氣如一若非政事過差上干隂陽理不至此謹按恆燠之罰載於周書而無冰之災書於春秋聖人之言必不徒說臣謹推原經意而驗以時事惟陛下擇之蓋洪範庶徴哲則時燠豫則恆燠謀則時寒急則恆寒哲之為言明也豫之為言舒也故漢儒釋之曰上德不明暗昧蔽惑不能知善惡無功者受賞有罪者不殺百官廢禮失在舒緩盛夏日長暑以養物政既弛緩故其罰恆燠周失之舒秦失之急故周亡無寒歲而秦滅無燠年今連年冬溫無冰可謂恆燠矣刑政弛廢善惡不分可謂舒緩矣臣非敢妄詆時政以惑聖聽請為陛下具數其實然事在歲月之前者臣不能盡言請言其近者凡有罪不誅者七無功受賞者四陸佃為禮部侍郎所部有訟而其兄子宇乃與訟者酒食交通獄既具而有司當宇無罪此有罪而不誅者一也石麟之為開封府推官與訴訟者私相往來傳達言語獄上而罷更為郎官此有罪而不誅者二也李偉建言乞回奪大河朝廷信之為起大役費用不資今黃河北流如舊漲水既退東流淤填遂成道路臣屢乞正偉欺罔誤國之罪不䝉采納任偉如故此有罪而不誅者三也開封府推官王詔故入徒罪雖䝉德音法當衝替而詔仍得守郡至今經營差遣遷延不去此有罪而不誅者四也知祥符張亞之為官户理索積年租課至勘决不當償債之人估賣缺人田産及缺人見被枷錮而田主毆擊至死身死之後監督其家不為少止本臺按發其罪而朝廷除亞之真州欲令以去官免罪此有罪而不誅者五也孫述知長垣縣决殺訴災無罪之人臺官有言然後罷任雖行推勘而縱其抵欺指望恩赦此有罪而不誅者六也秀州倚郭嘉興縣人訴災州縣昏虐不時受理臨以鞭朴使民相驚自相蹈籍死者四十餘人雖加按治而知州章衡反得美職擢守大郡此有罪而不誅者七也近日差除户部尚書以下十餘人其間人材粗允公議者不過二三人其他多老病之餘及執政所厚善耳臣與僚佐共議以為不可勝言是以置而不論獨取其尤不可者杜常王子韶二人論之然皆不䝉施行夫杜常在熙寧間諂事呂惠卿兄弟注解惠卿所撰手實文字分配五常比之經典及其所至謬妄取笑四方其在都司希合時忱任永壽等㫖意施之政事前後屢為臺官所劾兼其人物凡猥學術荒謬而置之太常禮樂之地命下之日士人無不掩口竊笑此無功而受賞者一也王子韶昔在三司條例司諂事王安石創立青苖助役之法臣時與之共事實所親見及呂公著為御史中丞舉為臺官公著以言新政罷去而子韶隱忍不言先帝覺其姦佞親批聖語指其罪狀自是以來士人不復比數但以善事權要子弟故前後多得美官今又擢之祕書指目循例當得侍從公論所惜實在於此此無功而受賞者二也張淳資才凡下從第二任知縣擢為開封司録曽未數月厭其繁劇求為寺監丞即得將作又不數月令權開封推官意欲因權即真迤邐遷上此無功而受賞者三也丁恂罷少府簿經年不得差遣一為韓維女壻即時擢為將作監丞此無功而受賞者四也其因緣親舊馳騖請謁特從常調與之堂除以至除目猥多待闕久逺孤寒失望中外嗟怨者尚不可勝數凡上件事皆刑政不修紀綱敗壞之實也大率近歲所為類多如此譬如天時有春夏而無秋冬萬物雖得生育而不堅成天之應人頗以類至宜指揮大臣令已行者即加改正未行無踵前失勉强修飾以答天變臣伏見去年歲在庚午世俗所傳本非善歲徒以二聖至仁無私德及上下故此凶歲化為有年然事有過差猶不免恆燠無冰之異由此觀之天地雖逺得失之應無一可欺若更能恐懼修省戒飭在位相勉為善則太平之功庶幾可致也臣備位執法實欲使陛下比隆堯舜無缺可指無災可救是以區區獻言不覺煩多死罪死罪陸宇無罪石麟之除郎官政目六月二十一日麟之得官張亞之除真州政目去年十八日亞之知泗州今年六月十九日自真州改府推孫述罷長垣嘉興訴災死者四十餘人張淳權府推六年十月一日將作監丞張淳為府推丁恂除監丞七事當考杜常正月二十二日壬午自少常改太僕此云不䝉施行然則轍奏此必在二十二日壬午前也合依劉摯日記附正月七日案十八日上原本誤脫月分已已命翰林學士兼侍講范百祿權知貢舉天章閣待制吏部侍郎兼侍讀顧臨國子司業兼侍講孔武仲同權知貢舉執政聚議始欲用侍御史孫升同知劉摯謂無舊比乃止摯意謂鄧溫伯必進補許將闕其黨疑升必論列故謀以此五十日拘之也此據劉摯日記增入二十二日升改左史詔五路進士及諸科明法人就試終場零分不滿十人許解一人仍取文理優長者以尚書省言通利軍等處將終場十人以下零數添解一人不應元祐貢舉敕故有是詔辛未朝獻景靈宫彰德軍節度使知河陽馮京告老徙知陳州令入見過國門辭疾甚壬申改左銀青光祿大夫觀文殿學士兼侍讀充中太一宫使職官志云元祐間馮京以觀文殿學士梁燾以資政殿學士為中太一宫醴泉觀使燾事在八年六月鄜延路經略使趙卨言熙河路所占西人良田極多乞朝廷酌中處置樞密院議夏國見通常貢歲時恩賜一切如舊止是分畫封疆未畢如卨所陳是實西人觀望難於馴服詔卨詳纍降朝㫖及趙伋開諭悉心講究候西人再來界首即盡理折難務令聽伏伋先被詔持地圖去延安議分畫事卨長子也伋為太僕寺丞當考此時無有在寺差出者三月十六日伋赴三省樞密院禀議劉摯日記五年十月二十七日集都堂議遣趙伋至熙河摯以謂不當遣伋伋乃卨之子也據此則竟遣伋行不用摯議伋實以寺丞出殿中侍御史岑象求言長垣令孫述决無罪被水災百姓栁閏限內死有司按治得實述避罪翻異請再鞫無差即遇赦不原從之監察御史徐君平言知真州孫賁除開封府推官聞賁傲虐不檢穢迹甚著詔罷賁新除權知開封府王巖叟言左右㕔𨽻推官各二員公事詞狀初無通管分治明文請除事繫朝省及奏請逐㕔通管外其餘公事詞狀並據號分治庶無留壅從之通州團練使環慶路總管姚兕徙涇原路先是臺諫官並言冬溫乞修政事因及差除是日正月十二日輔臣進呈劉摯奏曰人才難於求備性忠實而有才此上等人也雖無才而忠實其次也小人有才而可藉以集事者又其次也若乃懷二心有所觀望背公立黨此為下矣不可用也今臣等用人亦隨其所能而已然亦須辨得此數等人才則安排得方穩諭曰極是極是知人甚難摯又曰古之聖人如堯舜猶以此事為難臣等亦曉夕思念務合人情以答天戒呂大防曰臣等不敢不恐懼修省冬溫乞修政事並論差除不當蘇轍疏今附月末要合移見十日癸酉詔自今祠祭游幸毋用羔羊從禮部請也甲戌上詣凝祥池中太一宫集禧觀醴泉觀大相國寺宣德門召從臣觀燈戊寅京東轉運司言宣德郎趙竦請修徐州百步呂梁乞徐州知通銜內並帶兼提舉堤閘彭城令佐銜內並帶同管當隄閘等字仍差小使臣一員專監河稅兼管隄閘公事立課程留滯約束損壞决溢之法從之右朝議大夫鴻臚卿韓正彥為河東路轉運使右朝奉郎杜純為鴻臚卿左朝請大夫梓州路轉運副使井亮采為度支貟外郎左朝請大夫兩浙路轉運副使葉溫叟為主客郎中左朝請郎直祕閣太僕卿林旦為河東路轉運使左朝散郎度支貟外郎郭茂恂為河北東路提㸃刑獄八年四月二日為户中左朝奉大夫集賢校理知和州劉定為提㸃京西南路刑獄三月二日朱光庭有言十六日改命右承議郎王鞏用蘇轍謝景溫薦除知宿州劉摯十八日戊寅事已卯資政殿學士知蔡州王安禮知舒州以開封勘到安禮知青州日贓汚不法下京東轉運提刑司體量得實故有是命二十六日又落職金州觀察使馮行已卒壬午左朝奉大夫集賢校理太常少卿杜常為太僕卿左朝奉大夫祕閣校理徐王府記室參軍盛僑為太常少卿左朝議大夫直龍圖閣河東路都轉運使范子竒為集賢殿修撰知河陽侍御史孫升為起居郎劉摯謂執政欲為鄧溫伯地念獨升在言路必爭論久欲移升摯持其議既而升連擊范純禮益犯黨意滋欲移升甚摯堅守之至欲禁升以知舉其意類此於是升竟有此除衆議云西省闕人故也摯即漏舍謂呂大防曰若西省闕人則劉安世豈不可用大防曰諾今日當先奏知既對因論人才大防曰方今人才難得摯曰守節持正終始不變者誠難得也簾中再三曰誠是不變者少摯遂言若劉安世朱光庭二三人頗有節行可謂不變者大防曰光庭欲還其給事中安世欲還其西掖皆是舊職位諭曰安世除甚摯曰中書舍人係昨來已曽除者可除之人奏知范純禮須與移動摯曰候二十四日一齊進呈丙戌二十六日乃還朱劉舊職此二十二日壬午所議左中散大夫主客郎中晏知止知蔡州三月二十二日為少府監左朝奉郎集賢校理荆湖北路轉運使唐義問為直龍圖閣知荆南左朝議大夫直龍圖閣知潭州謝麟知江寧府龍川略志云罷麟潭州李湜代之按湜知潭州乃六月四日然五月十三日湜先以湖北漕權湖南帥蓋麟去潭州湜即權帥六月乃為真帥耳别志附六月四日左朝議大夫直祕閣河東路轉運使謝卿材直龍圖閣為京東路都轉運使右朝奉郎京西路轉運通判官張景先為陜西路轉運判官左武衛將軍郭逵遺表乞男恩舊制上將軍四人降官職而未復乞致仕及遺表奏補並取奏裁有司以逵嘗任同簽書樞密院事及宣徽南院使詔依見任官條推恩湖南安撫鈐轄謝麟言措置到蒔竹縣合付楊光銜乞依湖北例與轉近上正使仍帶遙郡知溪峒徽州名目上里堡合付楊昌嶽下里堡合付楊晟圓並轉資其武陽關峽城步等寨皆係極邊乞逐寨各添屯兵戍守從之五年十二月十六日當考今年正月二十八日乃授光銜徽州使癸未詔以雪寒給在京工役假三日甲申熙河蘭岷路經略安撫使范育言鄂特凌古逼逐溫錫沁父子上青唐樞密院議以鄂特凌古男溪邦貝昌除團練使就除巴溫刺史官號與錫沁同管當邈川一帶部族明示朝廷恩顧以羈縻之詔育密相度以聞六月相度當考二月二十八日乃除二人大理司直竇革等言按元祐大理寺令斷案若定奪事正少卿應避者斷議兩司自來互送卿應避者止免簽書均是有避而立法不一乞並免簽書更不互送從之侍御史孫升言臣伏見都水使者吳安持自肆已意創立條法直申都省從來中書退送工部見行下諸路勘㑹有無違礙未凖朝廷頒行而安持既以已意創立未聽指揮而乃擅將創立條內一項文移場掃于縣鎮用牒往還不候指揮於去年三月內行下外監丞司指揮諸場掃於所屬縣只用公牒往還是致河掃使臣緣此恣橫無所忌憚內陽武掃於去年八月二十八日套墊直至九月八日夜子時方申危急本掃使過稍草二十六萬並不關申本縣及壕寨楊贇等偷盜官樁橛一百數十條本場占護賊人不肯發遣臣竊以河掃使臣壕寨自來欺弊作過偷謾官司物料習以成風若更不令州縣統轄㸃檢則今後蠹害愈深何由覺察臣謹按吳安持行市易之日與呂嘉問挾王安石勢力創造條法內則三司不敢正視外則州縣監司不得㸃檢內外欺弊積久遂至大壞失陷官錢以百萬計害及公私毒流天下至今未已者良由呂嘉問吳安持占蔽不及內外官司㸃檢所致也今日朝廷公明不容小人為姦而吳安持乃敢輒肆欺罔創立條法亂上下統轄之制使姦猾得自恣縱而又不候朝㫖公然行下干紀亂常罪在不赦此而不誅安用執法伏望聖慈指揮付有司推治吳安持不候朝㫖擅行條法之罪重行典憲以懲亂法之吏貼黃稱祖宗以來內則臺省按察百司外則州縣監司各相統轄上下相維萬世不易之法吳安持既已申請場掃縣鎮用牒紊亂紀綱而不候朝㫖專輒行下外監丞司施行則是吳安持自造法令不由朝廷專擅施行紊亂國法罪合誅戮又稱吳安持李偉協比為姦自元祐四年建議回河經今三年欺罔蔽惑枉費財用民力不可勝計困弊一方無毫髮之效朝廷一切不問依舊存留在任今又興二渠之役名分減漲水其實猶幸回河蓋馬頭鋸牙見今有官收積物料而梁村口地即目塵生道路之人皆知欺罔獨朝廷聽信不疑方二聖在上忠賢一心大河咫尺灼然吳安持乃敢欺罔如此愚臣前後奏論而狂瞽之言不足以悟聖主忠憤填臆死有餘責伏望二聖留神省察罷黜吳安持則河事不作生靈蘇息天下幸甚又稱吳安持建議欺罔不顧朝廷利害不恤國家費用不愛生靈性命但欲憑藉事權以為姦私今河上所差官非權勢親舊則是本家勾當之人今略舉四人內苖松年係户部侍郎苖時中之姪見差收支物料却以驅磨為名在京端間請受劉守信尹渙張資三人皆是吳安持勾當之人內張資見缺市易官錢物二千餘貫於法勒任差遣之人安持違法抽差本人又缺熟藥所官錢八百貫有朝㫖押付本府本監並不發遣又與張資正行管勾安持自出付身不曽申取朝廷指揮任情違法不公乞一就根究施行又貼黃安持既違法徇私抽差本家勾當人張資後來又出給付身令正行管勾避見㸃檢違法關報吏部稱是不消申取朝廷指揮安持肆意不法乃敢如此元祐章疏有此乃六年正月二十四日所奏也今依附本月日升二十二日已除起居郎此章或當附二十二日前是日呂大防移疾太皇太后遣陳衍至尚書省問劉摯人材可進用者摯具以六七人對蘇轍王巖叟在焉衍又詣大防第不知大防所對為何也此用劉摯日記增入乙酉成都府利州路鈐轄司言元祐敕應雅州管下盧山榮經縣碉門靈關寨威茂州龍州綿州石泉縣界並為禁茶地分緣諸州縣鎮皆是接連蕃蠻若行禁止竊慮别致搔動詔罷前敕䕫州路轉運司言施黔州蠻人入貢乞就本州投納貢布止具表狀聞奏仍厚為管設或以鹽或以錢等第給賜遣歸溪洞從之丙戌龍圖閣學士知杭州蘇軾為吏部尚書先是太皇太后兩諭執政令除軾此官時以軾弟轍初入臺又杭方災傷故徐徐至今此據劉摯日記增入二月四日又兼承㫖給事中范純禮權刑部侍郎五年九月純禮自兵侍除給事十二日壬寅蘇轍云云先是御史中丞蘇轍言轍劄子稱二十三日不知何月今因純禮改差遣附見訪聞給事中范純禮近日兩次奏乞外補第一次章既下中書省吏房獨進熟狀不允第二次方與三省同共進呈竊緣舊例從官出入盡係三省商量然後進呈取㫖行下今中書獨專其事中外莫不驚怪雖第二次却與三省共議蓋知其已甚故不敢再作臣忝執法若喑默不言恐今後朝廷紀綱日漸廢壞伏乞問中書省如此等事合與不合三省同共進呈如合係三省進呈因何本省獨進熟狀取㫖仍乞依理施行去年十二月十八日內降孫升劾純禮章二十六此純禮白劉摯汞去摯令勿遽既逾月乃有除觀蘇轍此奏豈摯實庇純禮乎當考左朝散郎集賢殿修撰知亳州朱光庭為給事中御史中丞蘇轍言竊見新除給事中朱光庭智昏才短心狠膽薄不學無術妬賢害能本事程頥聽頥驅使方為諫官頥之所惡光庭明為擊之頥既以狂妄得罪光庭本合隨罷而因緣僥幸㑹河朔災傷遣之按視時本路監司州縣並以依條發廪拯給不至飢殍光庭既至復令呼召上等人户强以積粟與之多者至十數石所費凡數十萬沿邊儲蓄為之一空經今積年猶有匱乏之患尋為御史所劾朝廷曲加庇覆竟免於戾繼䝉擢用常在言職每月章疏文理猥謬士人無不掩口光庭亦自知人品凡下專務讎疾勝已如楊畏以母老屢乞間官至今侍養不闕而光庭誣其貪冒官寵遂致母亡秦觀以文學知名朝廷擢為太常博士而光庭加以暗昧之過欲遂廢棄朝廷知其誣罔奬用二人有加於舊而光庭事任如故深以為怪昨者臺諫論鄧溫伯事言既不從劉安世賈易之徒皆章疏絡繹繼上而光庭畏縮惴栗殆不能言及朝廷例皆遷補諸人皆投劾引去而光庭晏然就職略無愧恥據其人物鄙下實汚流品况給事中專掌封駮國論所寄今朝廷以私光庭上則汚辱國體下則傷害善類伏乞追寢成命别付間局以厭公議轍劄子得之汪應辰劄子稱二十七日奏而無其月按光庭先以五年五月二十八日自右諫議大夫除給事是日轍方除中丞必無先一日論光庭之理光庭既就職八月十八日改集賢修撰知司州二十二日改亳州六年正月二十六日白亳州再除給事今即以轍劄子附光庭再除時更須再考詳王巖叟繫年録六年二月十五日朱光庭辭給事中子由時在憲長嘗言之欲遂如所請衆解之巖叟曰用忠實所得多又垂簾之初排邪助正甚有力豈可棄命遂下所稱在憲長嘗言光庭即正月二十七日奏也左通直郎集賢殿修撰提舉崇福宫劉安世為中書舍人後七日改寶文閣待制樞密都承㫖仍賜三品服二月四日改除今并書起居舍人豐稷為太常少卿鄭雍之使遼稷權中書舍人於是將以次補御史中丞蘇轍言轍劄子稱十九日蓋正月十九日今因稷改少常乃附見臣聞古之明主為官擇人未嘗為人擇官是以衆長並舉而百職皆理臣觀近日朝廷所用或異於此施於間局猶或非宜况中書舍人者號令之所自出前後所任必取學問通博詞章雅正播之四方而不怍傳之後世而無疑今豐稷之在此選臣不識朝廷何以取之稷頃撰范純仁太原之詞列四無乃無乃智名無乃勇功無乃咈衆無乃廢備為趙卨延安之告不識聲律朕之頗牧雖未在於禁中汝之功名尚無愧於前人李憲之敘延福有宜叨舊物之言湖北之賞戰功有蓋不得已之語第爾邊勞頒兹寵命蓋不得已其懋承之至於其他乖剌難以具陳如上所指皆足以取笑多士激怒勞臣今朝廷雖之人奈何以稷當此任哉蓋稷之為人本挾姦佞昔在小官則以淡靖欺世及列近侍無日不走公相之門頃為許將所援擢之不次及將以議論反復心懷傾嶮得罪朝廷不欲明示貶降量加官職而稷懷其私恩不顧公議曲加粉飾其尤甚者至謂將養心以誠嘉猷屢告若信如此言則是陛下誤逐正人稷雖封還詞頭可也既知公議難奪而加以溢美之詞瀆亂朝廷黜陟之經動搖中外觀聽之實才既鄙下心復懷姦久權外制實恐害政伏乞特降授間慢差遣庶允公論從之劉摯云子由言豐稷權掖制詞紕繆列其數制皆取笑于外宜降黜豐許定州黨也右正言劉唐老言伏見知蔡州資政殿學士王安禮移知舒州竊以安禮始緣人言攻其青州任內貪穢不法朝廷再下監司體按未知今此改任為其有罪而責之邪以為無事而不治邪茍謂有罪而責則舒之視蔡均為便藩如此施行何名譴黜若為無事而不治則今兹易地有何所因又聞安禮常以章辨歸過於指使使臣衆議喧然亦以為笑且身係大臣固當自重乃與使令厮役規利營財主俸祿之遺餘昧商途之稅入縱非已物猥屑益彰臣竊謂官吏在任興販論法固不為輕使小人有犯則罪之大臣犯此則弗罪則是禁令已不行於貴近法與天下公共王者猶不得私况臣下乎伏望聖慈將所按王安禮事迹明白施行以正朝廷之紀綱以肅官吏之貪穢正月十九日奏左司諫楊康國言正月二十一日臣聞資政殿大學士前知青州王安禮移知蔡州以言官彈奏青州任內不法事䝉朝廷按驗盡得實狀移知舒州謹按安禮自小官以至大用自謂姦雄所至恣橫前任柄臣已坐濫違罷去年持帥節又以贓汚著聞猶敢公肆姦言文飾罪戾足見凌蔑法度侮慢朝廷大臣若斯可不深治而乃止令遷易自蔡移舒在安禮無一毫之損士論沸騰莫不竊議或謂朝廷優異大臣特屈常法臣雖至愚實所未喻如此施行恐非所以示天下至公也况安禮素無禮義必不謂朝廷屈法以為恩當謂曲見牢籠而愈橫若方鎮大臣又有如安禮之不法者不知朝廷將治之乎又將貸之乎若將治之則何行之於後而不行於此若將又貸則臣恐自此以往方鎮大臣更相倣效以玩陛下之法矣荀况以謂法者治之端足以輔德而弼教陛下深居九重垂衣拱手雍容指揮而天下莫不傾聽承命遵守詔令而不敢須臾違者以其畏朝廷之法耳今法不行而務寬貸使天下何所畏憚恐非朝廷之福也且法行則朝廷尊不行則紀綱壞漢賈誼曰先王執此之政堅如金石行此之令信如四時據此之大公無私如天地是法豈可以不行也奈何為一安禮而特屈陛下之法哉伏望陛下深加省察早降指揮正安禮之罪褫奪職名使自循省以誡天下不法之吏則陛下之法行矣臣今區區之言不為安禮一身正為陛下至公之法耳丁亥詔安禮落資政殿學士仍知舒州十九日責舒州劉摯謂安禮非純正之士然慷慨有大節在神宗朝為左丞數數敢論事不小屈於王蔡一時翕然推重但其人治已不肅性淫侈又喜寵小人此其不至者其才髙甚世之悠悠者未可輕議也或云傅堯俞惑於范純禮輩所教鋭欲痛絀之蘇頌韓忠彥不知又佐其說賴呂大防無他意處心稍平故止降小郡不置劾或謂曰不知了得否意欲揚此聲以撩紛紛竟坐唐老康國言再落職劉摯云云用日記增入已丑西京左藏庫使楊光銜為供備庫使賀州刺史知溪峒徽州從謝麟奏請也麟奏請在正月二十二日是月御史中丞蘇轍言臣聞大河流行自來東西移徙皆有常理蓋河水重濁所至輒淤淤填既髙必就下而決以往事驗之皆東行至太山之麓則決而西西行至西山之麓則决而東向者天禧之中河至太山决而西行於今僅八十年矣自是以來避髙就下至今屢决始决天臺次决龍門次决王楚次决橫隴次决商胡及元豐之中决於大吳每其始决朝廷多議閉塞令復行故道故道既髙復行不久輒又衝决要之水性潤下導之下流河乃得安是以大吳之决雖先帝天錫智勇喜立事功而導之使行不敢復塞兹實至當之舉也惟是時民力凋弊隄防未備北流汗漫失於陂障由是元祐之初大臣過聽始開孫村之議欲導河使東以復故道此議一起都水官吏僥幸回河之功河上使臣壕寨利在差遣請受相與倡和爭請回河自是公私困竭河北京東西之民為之不聊生矣伏惟太皇太后陛下皇帝陛下仁民愛物恭儉節用如恐傷之今河本無事而生事之人公然欺罔坐使公私俱弊臣實深痛之謹采河朔民言效之左右惟陛下裁察夫河自天禧西行及其决於大吳其出西山不逺惟有此地未經淤填比之他處地形最下故河水自擇其處决而北流直至瀛莫之郊地勢北髙河遂東折入海其為順便殆天意也惟北京之南孫村在其東岸東接故道其間數十里地頗汚下每歲夏秋漲水多自此溢昔之治河者以為北京宫闕所在兵民夥煩而孫村近在南城之外若使漲水從此流入故道則一城生聚皆有魚鱉之憂故於河之東岸孫村之南開清豐口以泄漲水流入故道於河之西岸開闞村等三河門亦以泄漲水行無人之地迤邐流至館陶復合入大河昨來朝廷如一依昔人措置則北京每歲夏秋漲水自可無虞城南隄防所費並可省罷自北京以北至瀛莫以南地迫西山漸有岡阜河流至此自不能為害惟有深州當河流之衝所宜經畫今若從武强縣開近東舊河道引河稍東則深州之危必自紆解然後修治山公一帶北隄令極髙厚則河流赴海可無大患矣自今建孫村回河之議先開塞闞村等三河門又於梁村築東西馬頭及鋸牙侵入河身幾半迫脅大河强之使東既河身噎塞則上流陽武靈平等處去秋並告危急漲水至北京之南東西兩岸無所分減又為馬頭鋸牙所迫併入孫村直上北京簽橫堤面北京告急嘗稱若雨不止風不定本京必定疏虞其得平安蓋出天幸由此橫隄順水隄皆作木岸所費不資然終亦不可全恃兼梁村東馬頭下崖至水面髙七尺水深二丈已上若欲開掘馬頭以東回奪河身須及三丈乃可訪聞入地一丈泥水不可復開雖復傾國應副力亦不及若欲略行開掘令漲水衝刷成河則二年以來已試不效况故道一帶隄內直髙一丈上下而隄外直髙二丈有餘架水行空最為危事謹按自來河决必先因下流淤髙上流不快然後乃决然則大吳之决已緣故道淤髙今乃欲回河使行於此理必不可且見今北流深處水行地中實得水性捨此不用而欲引入故道使水行空中雖三尺童子皆知其妄而建議之臣恣行欺罔居之不疑今雖變回河之名為分水之議據都水奏請本謂回河與減水事體不同所有已修造馬頭三百餘步乞從修河司隨宜措置馬頭既在大河之中橫欄水勢泛漲之時理須斟酌可存可拆一面施行朝廷雖許其所請然本司收買馬頭物料至今不絶又與本路監司同奏乞隨宜開導口地一帶河槽務令深濶并修葺緊急隄岸釃為二渠臣觀其指意雖名為減水其實暗作回河之計也且自置修河司以來使過朝廷應副見錢四十九萬餘貫其他公私所費猶不在此數今歲春天共役一十萬人而北流止得三萬東流獨占七萬蓋自來河北只管一河東西兩岸而已今為分水之故添為兩河東西四岸內北流橫添四十五掃使臣三十四員河清兵士三千六百餘人物料七百一十六萬三千餘束其為耗蠧何可勝言蓋都水官吏專欲成就决不可行之故道而庇病已行之北流其欲成就故道則孫村開河馬頭等役當罷而不罷其欲庇病北流則深州武强等患當講而不講建議分水之人利在急以顯北流可廢而州危流當開其為不忠莫甚於此北京靈平陽武諸處危急實由分水所致則諱而不言深瀛恩兾去歲無害實由北流隄防稍立之功則指為分水之效其為罔上衆所憤歎臣職在風憲疾之久矣因訪聞習知河事之人頗得其實綵畫成圖隨事籖貼指掌可見今隨劄子上進臣雖未嘗閲視形勢然而朝廷大臣亦未嘗按行其地不可便以都水官吏為信也欲乞聖慈特選骨鯁臣僚及左右親信往河北計㑹逐處安撫轉運提刑州縣及北外監丞官同共踏行詳具圖録開述利害保明聞奏如臣所言不妄即乞罷分水指揮廢東流一行官吏役兵拆去馬頭鋸牙依上件所陳施行今年春夫仍並撥付北流開河築隄役使所貴河朔及鄰路兵民早獲休息國家財賦不至枉費有豐之漸則天下幸甚天下幸甚貼黃稱今河上夫役不過二月半下手如䝉聖意允臣所請伏乞火急差官前去定奪所貴夫役之前早見可否不誤興役此疏不得其時附正月末三月末云云當並考播趙鼎臣河渠書云六年四月吳安持奏請開分水河引漲水納之故道從之今實録並不見開分水河事始惟蘇轍有分水議論疏既附正月末則鼎臣所稱四月或未可信須更考若移轍疏並鼎臣所書入四月末則又與不過二月半下手相妨也恐四月合作正月
