body:
  text: 續資治通鑑長編卷一百三十宋李燾撰仁宗慶厯元年春正月辛亥朔御大慶殿受朝丁巳太子中舍夀光任顓為三司勾當公事先是權三司使葉清臣請置推官四員詔舉朝臣二人係通判資序者充勾當公事三司勾當公事自顓始朝廷既用韓琦等所畫攻策先戒師期知延州范仲淹言昨賊界投來山遇嘗在西界掌兵言其精兵才及八萬餘皆老弱不任戰鬬始賊衆深入蓋為官軍以地分自守既不能獨禦賊鋒又不能並力掩殺彼得其便繼為邉患其虜劫生口牛羊亦不曾追奪故安然往來如蹈無人之境今延州東路合隄防之處已令朱吉與東路巡檢駐軍延安寨其西路亦委王信張建侯狄青黃世寧在保安軍每日訓練及令西路巡檢劉政在德靖寨張宗武在敷政縣密布探馬候賊奔衝放令入界即會合掩擊若數路並入且併衆力禦敵或破得一處即更邀擊别路其環慶路已遣通判馬端往報部署司令一如鄜延路設備如此則可以乘勝而破賊今須令正月內起兵軍馬糧草動踰萬計入山川險阻之地塞外雨雪大寒暴露僵仆使賊乘之所傷必衆况鄜延路已有會合次第不患賊之先至也賊界春暖則馬瘦人飢其勢易制及可擾其耕種之務縱出師無大獲亦不至有他虞自劉平陷沒之後修城壘運兵甲積糧草移士馬大為攻守全勝之策非為小利而動如重兵不時而舉萬有一失將何繼之則必關朝廷安危之憂非止邉患之謂也茍自今賊至不擊是臣之罪也兵法曰戰道必勝主曰無戰必戰可也戰道不勝主曰必戰不戰可也臣於九月末至鄜延路便遣葛懷敏朱觀入界掩襲族帳蓋與今來時月不同非前勇而後怯今若承順朝旨不能持重王師為後大患雖加重責不足以謝天下若伺春暖舉兵未為失策且元昊稔惡以來欲自尊大必被姦人所誤謂國家太平日久不知戰鬬之事又謂邉城無備所向必破以恣桀慢之心侵擾不已今邉備漸飭度其已失本望况已下敕招携番族首領臣亦遣人探問其情欲通朝廷柔逺之意使其不僣中國之號而修時貢之禮亦可俯從今鄜延是舊日進貢之路蕃漢之人頗相接近願朝廷敦天地包容之量存此一路令諸將勒兵嚴備賊至則擊但未行討伐容臣示以恩意嵗時之間或可招納如先行攻掠恐未能深據要害徒為鈔劫損王師之體縱能殘彼妻孥焚彼聚落如白豹之功官軍既退戎類復居狼心重報增其怨毒邉患愈滋無時敢暇若天兵屢動不立大功必為外國所輕臣又近召張亢到延州熟議亦稍願與戎人相見於界上臣所以乞存此一路者一則懼春初盛寒士氣愈怯二則恐隔絶情意偃兵未期若施臣之鄙計恐是平定之一端茍嵗月無效遂舉重兵取綏宥二州擇其要害而據之屯兵營田作持久之計如此則茶山橫山一帶番漢人戶去昊賊相逺懼漢兵威逼可以招降或即奔竄則是去西賊之一臂拓疆制冦無輕舉之失也戊午詔從仲淹所請據仲淹奏議此疏乃是去年十二月二十九日所上實録繫之今年戊午蓋是日方報可耳戊午正月八日也仲淹又言鄜延路入界比諸路最逺若先修復城寨却是逺圗請以二月半合兵萬人自永平寨進築承平寨俟承平寨畢功又擇利進築因牽制元昊東界軍馬使不得并力西禦環慶涇原之師亦與三路俱出無異朝廷雖許仲淹存鄜延一路示招納意仍許仲淹與夏竦韓琦等同謀可以應機乘便即不拘早晚出師仲淹復言去秋遣朱觀等六道掩襲所費不資皆一宿而還近者密詔復遣王仲寶等幾至潰敗或更深入事實可憂臣與夏竦韓琦皆一心速望平定但戰者危事或有差失則平定之間轉延嵗月所以再三執議非不協同又橫山蕃部散居巖谷亦多設堡控扼險處入界兵少則難追多則難行假使主將智勇能奪其險彼則逺遁須過橫山後方到平沙却無族帳可取能别出竒計兵從天落則有非常之功不然未見其利也乞斷自聖意遣近上使命急至鄜延令臣督諸將於二月半出兵先修復廢寨不須大段軍須只以隨車運糧兵夫因便興功候有倫序别置戍守既逼近蕃界彼或點集人馬朝夕便知大至則閉壘以待隙小至則扼險以制勝彼或放散人馬亦朝夕便知我則運致糧草以實其備彼若歸順我已先復舊疆彼未歸順我已壓於賊境橫山一帶在我目中強者可襲弱者恩附此亦托邉之一事然修復諸寨亦動軍民煩費不少比之入界勞散則有經久之利而無倉卒之患且安存得東路熟户蕃部并歸明弓箭手乞聖慈裁酌仲淹前後凡六奏卒城承平等前後十二寨蕃漢之民相踵復業修復十二城寨蕃漢之民相踵復業此據正傳不得其時撿仲淹奏議乃正月二十五日初奏二月八日又奏二月二十四日并二十五日又奏三月七日又奏四月五日又奏凡六奏今刪取附見請不出兵疏後其三月七日所奏别論罷行營事亦别著之十二城寨修復畢功時度仲淹必去延州矣仲淹四月五日所奏猶言修復承平等寨利便然同日仲淹已有責命蓋十二城寨功未畢而仲淹去仲淹雖去十二寨卒能修復如仲淹所議也又按慶厯六年六月仲淹奏未曾修復足明修復十二寨畢功決不在仲淹未去延州四月前也仲淹又言關中民苦逺輸請建鄜州之鄜城縣為軍以河中同華中下户稅租就輸之春夏徙邉兵就食可省糴價什之三他所減不與詔名其軍曰康定地里志在康定二年按仲淹奏議以元年十月二十九日奏請今亦附見己未西蕃邈川首領保順節度使嘉勒斯賚兼河西節度使康定元年初用宋庠等議復京師南京及京東州軍淮南宿亳州池鹽𣙜法而京師𣙜法尋弛於是又詔三司議通淮南鹽給南京兖鄆曹濟濮單廣濟八州軍利害以聞其後兖鄆及宿亳遂皆食淮南鹽矣此據本志附見𣙜法復弛已見寶元二年六月仍復附此兖鄆食淮鹽在十一月赦後壬戌遣使體量安撫諸路翰林學士王堯臣崇儀使果州團練使張士宣陜西路知制誥王拱辰西京左藏庫使馬崇正益梓路知制誥賈昌朝閣門通事舍人徐奎河北路度支副使楊告西京左藏副使彭再思河東路侍御史知雜事張錫內殿崇班慕容惟恭利夔路侍御史論程京東路魚周詢京西路方偕江南東西路殿中侍御史施昌言淮南路度支判官魏兼兩浙路范宗傑荆湖南北路諫官孫沔論崇正奎惟恭非才乞别選官代之不報堯臣將行請曰故事使者所至稱詔存問官吏將校而不及於民自元昊反三年於今關中之民凋敝為甚請稱詔勞來仍諭以賊平蠲租二年從之癸亥録丹州汾水縣尉董正卿子澤為太廟齋郎弟琳與堂除簿尉仍賜其家絹五十匹以正卿與父禹錫捕陜西軍賊郭邈山鬬死故恤及之戊辰陜西經略安撫招討使夏竦言范仲淹前已相度涇原環慶麟府等路齊入賊界一二百里四散攻擊乞朝廷發軍須器械以正月上旬至延州又别立入界擒捉蕃漢賞條甚備又近者朝廷取問不逼逐塞門賊馬之因仲淹亦奏稱非是怯懼候將來春暖大為攻取之計又奏西界春暖馬瘦人飢易為誅討及可擾其耕種之務與臣前所陳攻策並同但時有先後爾賊界已知所定進兵月日豈得却退仲淹又奏橫山蕃部散居巖谷若過橫山後方到平沙即却無族帳可取臣所上攻策自鄜延路涇原路進兵直取橫山諸處族帳鄜延并取綏宥等州非令徑趨平沙况鄜延聚兵最重於諸路而軍氣思奮若差近上臣僚勒令出兵恐不敢更持異議萬一異同即乞且如仲淹前所議併兵先到綏州分頭蕩除撫寧和市場義合鎮茶山一帶人户如西賊的有歸伏之狀朝廷却欲候嵗時招納即乞速降指揮令涇原路亦未得入賊界但令兩路嚴兵聚糧大為進討之勢亦可以屈賊計也己巳遣國子博士知耀州李宋卿催促陜西計置錢糧詔乾元及天慶天祺天貺先天降聖節自今惟正節日禁刑外乾元節仍前後各一日停斷大辟罪壬申詔太常禮院嵗以春分祠髙禖遣兩制官攝事初髙禖為特祀及皇太子昕生既報祠之於是載為常祀依寶元詔不設弓韣弓矢乙亥并代部署司言西賊寇麟府二州請發鄜延等路兵馬入賊界以牽制其勢從之丁丑夏竦為宣徽南院使戊寅夏竦請以通判儀州耿傅參議軍事從之翰林學士丁度言詳定服紀親疏在官回避條制請本族緦麻以上親及有服外親並令回避其餘勿拘從之會要正月二十八日事二十八日戊寅也是月元昊使人於涇原乞和又遣寨主髙延德詣延州與范仲淹約言己卯至保安軍仲淹既見延德察元昊未肯順事且無表章不敢聞於朝廷乃自為書諭以逆順遣監押韓周同延德還扺元昊其書曰髙延德至傳大王之言以休兵息民之意請於中國甚善又為前者行人不逹而歸故未遣親信不為書翰然詞意昭昭有足信矣惟君子為能通天下之志固當盡誠奉答曩者景德初兩河休兵中外上言以靈夏數州本為內地請移河朔之兵合關中之力以圖收復我真宗皇帝文德柔逺而先大王請嚮朝廷心如金石言西陲者一切不行待先大王似骨肉之親命為同姓全付夏土旌旗車服極王公之貴恩信隆厚始終不衰真宗皇帝於當時也有天地之造自此朝貢之臣每來如家馬牛駝羊之産金銀繒帛之貨不絶於道塞垣之下逾三十年有耕無戰禾黍雲合甲胄塵委飬生送死各終天年使蕃漢之民同堯舜之俗此真宗皇帝之至化亦先大王忠順之功也自先大王薨今皇帝震悼纍日嘻吁遣使弔賻之禮聽大王嗣守其國爵命隆重一如先大王大王以青春襲爵不知真宗有天地之造違先帝之誓書遂建位號纍遣人告於朝廷歸其旌節中外驚憤請收行人戮於都市皇帝非不能以四海之力支一方念先帝本意故夏王忠順之功豈一朝而驟絶之皆不殺而還假有本國諸蕃之長抗禮於大王而能含容之若此乎省初念終天子何負大王哉前代故事諸侯干紀即奪爵命購求罪首朝廷寬大至於半年有司屢言方令下詔此國家舊章不獲已而行也二年以來疆場之地耕者廢耒織者廢杼且使戰守之人日夜豺虎吞噬邉界蕭然豈獨漢民之勞敝邪天子遣仲淹經度西事而命之曰有征無戰不殺非辜王者之兵也仲淹拜手稽首敢夙夜於懷至邉之日諸將帥多務小功不為大略未副天子之意仲淹與大王雖未嘗髙會嚮者同事朝廷於天子父母也於大王昆弟也豈有孝於父母而欲害於兄弟哉可不為一二而陳之傳曰名不正則言不順言不順則事不成大王世居西土衣冠言語皆從本國之俗何獨名稱與天子侔擬名豈正而言豈順乎漢唐故事單于可汗皆極尊之稱大王以北朝為比且北朝稱帝其來久矣與國家為兄弟之邦非藩屏可方也大王世受天子建國封王之大恩如諸蕃有叛朝廷者大王當率國人以伐之則世世有功乃欲抗北朝之稱帝乎大王又以拓跋舊姓之後且堯舜禹湯固有後裔復皆立為帝若大王之國有強族稱單于鮮卑之後俱思自立大王能久安乎此大王未思之甚矣徒使瘡痍百姓傷天地之仁觀乎天地飬萬物故其道不窮聖人飬萬民故其位不傾又傳曰國家以仁獲之仁守之唐末天下忷忷羣雄咆哮日尋干戈皇天震怒罰其不仁五代王侯覆亡相續我太祖皇帝應天順人受禪於周廣南江南荆湖西川一舉而下罷諸侯之兵革五代之暴垂八十年天下無禍亂之憂太宗皇帝聖文神武表正萬邦吳越納土并晉就縳真宗皇帝奉天體道清淨無事今皇帝坐朝至晏從諌如流不為遊畋專尚禮樂務以涵飬士民天下之心愛逾父母此所謂以仁守之也大王建議之初必為漢家邉城無備士心不齊驅馬而來所向可下今奔衝邉地頻年於兹矣漢之兵民有血戰而死者無一城一將願歸大王者與初望無乃異乎天下久平人人泰然不習戰鬬劉平之徒發於忠敢輕師而進自取其困餘則或勝或負殺傷俱多大王國人必以獲劉平為賀者昔鄭人侵蔡獲司馬公子燮鄭人皆喜惟子産之言不順今邉上訓練漸精恩威已立將帥而下各思奮發爭議進兵關中官兵之與民兵百五十萬招討司先以邉兵五十萬約諸路入界生降者賞殺降者斬獲精兵者賞害老幼婦女者斬可取則取可城則城縱未入賀蘭之居彼兵民死者所失多矣是大王自禍其民也皇帝不殺非辜然師之行君命有所不受鋒刃之交相傷必衆且蕃兵戰死非有罪也忠於大王爾漢兵戰死非有罪也忠於天子爾使忠孝之人肝腦塗地積纍怨魄為妖為釁因大王也朝廷以王者無外有生之民皆為赤子何蕃漢之限仲淹方欲與大王議而決之重人命也今大王惠然留意何善如之但論議未順文字未至不敢聞於朝廷恐阻諸路之兵大王果然愛民為意者言當時之事由衆請莫遏以此謝於天子必當復王爵承先大王保國庇民之志天下孰不稱大王之賢一也如衆多之請終不獲辭前所謂漢唐單于可汗之稱於本國語言為便亦不失其貴二也但臣貢上國存中外之體不召天下之怨不速天下之兵使人復康泰三也又大王之國府用或闕朝廷每嵗必有物帛之厚賜為大王助四也又前來入貢之臣止稱蕃校以避爵命按唐方國之禮常遣賔佐入貢於朝則不必用蕃校之名又唐諸蕃所建官名未嘗與中國相雜使其持禮而來則無嫌矣其有功有德者必可授朝廷之命五也昨者邉臣上言乞以官爵金帛招致蕃部首領仲淹亦一面請罷惟大王告諭首領不須去父母之邦但回意中朝則太平之樂遐邇同之六也國家以四海之廣豈無遺才在大王之國者朝廷不戮其家安全如故宜善事大王以報國士之知惟同心嚮順自不失其富貴而宗族之心必更優恤七也又馬牛駝羊之産金銀繒帛之貨有無交易各獲其所八也大王聽之則上下同其美利邉民之患息矣况宗廟有先大王誓書在諸路之兵非無名而舉鐘鼓之伐以時以年大王之國將如之何他日雖請於朝廷恐有噬臍之悔惟大王擇焉實録云元昊後亦有復書未肯去僣號今别見正史西夏傳云元昊雖數勝然死亡瘡痍者亦殆半人困於點集財力不給國中為十不如之謡以怨之又誅殺不常肘腋數叛終不能大斥境土而中國兵益練習名將稍出頗究知敵中情狀而元昊始欲臣矣乃以塞門寨主髙延德來歸因乞和按延德來歸時元昊未始欲臣其乞和偽也又未有肘腋數叛事傳序事顛倒今不取所稱十不如之謡當考
