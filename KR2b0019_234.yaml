body:
  text: 續資治通鑑長編卷二百三十宋李燾撰神宗熙寧五年二月辛亥朔御史鄧綰言近朝廷以大宗正丞李德芻罪惡彰明差王陟臣背公向私掩覆其事乞别命官根治詔送御史臺劾問綰又言元因本臺官彈奏顯屬妨礙乃差權判刑部沈衡置司推鞫其後獄成法寺當德芻贓罪笞詔贖銅四斤衝替王安石為上言德芻於職事殊不茍但好陵人故宗室怨之上曰德芻兄弟皆驕好陵人亦其天性也陕西都轉運使工部即中直史館謝景溫知襄州林希野史云自吕公著罷王安石不除中丞意在謝景溫故先使權理檢使事以誘之及景溫劾蘇軾安石大喜而其兄初及親友日夜責其名節不立不得已稍及時事以塞外議及攻王廣淵賈青薛向等進用安石漸惡景溫景溫亦念安石專沮已語言日相失中丞之議由此寢矣初蘇頌等繳李定除御史辭頭上厭於羣言因問其事景溫乃媚安石乃言臣素知定為善士其處所生母喪尤為得禮已而事下臺定奪合與不合追服御史范育等堅持其事景溫迫于禮不得已遂議定當追服安石愈進定職秩景溫林旦等交數十章詆之安石雖盛怒猶以景溫舊嘗助已昌朝等皆奪官外貶景溫除侍讀辭不敢受以直史館出鄧州四年正月九日定等方用事以景溫終始反覆日夜攻其短及移陕西漕四年三月二十六日楊蟠沈披為提舉官議役錢事披蟠輕妄奏議紛紛至請唐太宗肅宗陵皆給為細民田此類甚多景溫不肯附其議披蟠密讒之曽布以景溫不奉司農約束掎托其奏議過失安石遂言於上曰景溫黷法不職罷知襄州遂與安石為仇矣景溫本傳極不詳今附注此壬子龜兹國來貢江南西路轉運副使職方即中徐億奪一官吉筠袁三州官吏論罪有差坐違朝旨以稅米折見錢故也賜兩浙轉運司常平穀十萬石賑濟浙西水災州軍仍募貧民興修水利知都水監丞公事侯叔獻等言見淤官田今定赤淤地每畝價三貫至二貫五百花淤地價二貫五百至二貫見有七十餘户乞依定價承買欲作三年限輸納仍於次年起稅其有願添錢或近限輸納者即不以投狀先後給之其續淤官地亦乞依此從之新本削此以為淤田事不須備載今存之司農寺丞蔡天申察訪京東路天申挺子也察訪據舊紀癸丑工部郎中侍御史知雜事鄧綰為龍圖閣待制權御史中丞上謂綰不忌能又資在衆人前初欲超除綰諌議大夫權中丞王安石謂於近條有礙乃令即本官待制龍圖閣以待制權中丞自綰始右正言直集賢院兼天章閣侍講常秩權判流內銓兼同修起居注赴諌院供職秩免同修注從之權監察御史裏行太子中允唐坰同知諌院上以坰言事不反覆多密裨補而安石亦謂坰當異論紛紛坰言皆切中時病故也林希云安石既令綰薦坰為御史數月欲用為諌官則疑其輕脫暴得位將背已特不除官但以本官同知諌院故事未嘗有也坰氣鋭果怒安石易已八月癸卯遂廷斥之坰為御史在四年八月己巳希所云當考詔太子中允集賢校理同修起居注直舍人院同知諌院張琥落修起居注罷直舍人院諌院先是著作佐郎陳大順謁集賢校理李定同大理寺丞沈邁語陕西轉運使張詵上殿稱旨賜紫章服上令處置慶陽叛兵許以詵為本路經略使定翌日見琥語及之又詵壻檢詳樞密院兵房文字蘇液亦對琥言此琥遂疏於上前以制旨未下傳言漏露恐非所宜且言詵輕脫不可用上疑其言王安石亦謂此事宜窮究恐讒人專造此欲沮詵作帥姦不可長乃令樞密院召訊定等其言不盡如琥章琥坐奏事不實故責上曰琥併奪三職不太重乎安石固以為當然又請窮究定及大順等而定復自言事有證佐與樞密院所訊異狀安石右定不直樞密院乞付御史臺劾上從之三月癸巳再劾張詵召對附去年十月六日庚申司馬光日記云上密諭陕漕張詵便除所招慶卒詵既去諌官張琥言既赦而復誅之何以信後上怒詰琥從何得此語琥云風聞又云得之李定又云得之大理丞沈邁著作陳大順又云得之蘇液液詵壻也上怒其語異同故奪三職且使鞫問詵密以語之介甫欲為三人之地建言若加窮核密語必布使降卒反側非宜乃令陳大順所言為虛語以誑定云日記又云介甫素善待蘇液無不欲罪之乃諷法官駮案更令沈衡鞫之歸而衡鞫李德芻改命祝咨鞫之德芻亦介甫所左右也吕秦州云日記又云劉仲通言上密與張詵謀伐夏介甫漏之張琥諌上怒推迹所從來介甫懼使章惇語陳大順引虛已受其無咎大順許諾已而恐介甫不能庇乃翻云惇俾我云然故并惇付祝咨鞫之日記又云范百祿言上怒張琥疑中書佑之使密院詰問既又下臺鞫問辭與密院異同但令陳大順獨承鹵莽故又使祝咨鞫之詔度支郎中宋迪令蕃官東院特展磨勘一年坐前知潤州髙估配民紬絹價直也甲寅中書言伏見太皇太后與親妹姪之子恩澤樞密院奉聖旨以礙條令本殿使臣别具合與人姓名檢會中書元奏請條太皇太后大功小功緦麻女夫各有恩例仍云其餘該説不盡比類推恩臣等看詳若以夫妻母子論之則夫妻母子之屬同而母子又無絶道若以姑姊妹姪之與姑姊妹之子論之則子或有服而夫皆無服是姑姊妹姪之子其親有過於姑姊妹姪之夫而無不及也况以大小功女之子比類緦麻女之夫其合推恩事尤明白竊惟兩宫恩澤陛下所宜審處而元立條出於中書以此須合保明申乞以臣等所奏付樞密院詳議從之八月十一日可考知祁州馬用之言都監馬景父遂嘗入貝州城手搏妖賊王則遇害有顔假之節今家貧無以葬願稍遷景資級以旌忠義之後詔馬景與就移緣邉駐泊都監仍賜絹百匹大宗正司上編修條六卷先是嘉祐六年正月詔魏王宫教授李田編次本司先降宣敕成六卷以田輒刪改元旨乃改命大宗正丞張稚圭李德芻館閣校勘朱初平陳侗林希同編修至是上之是日馮京為上言張角以有部分故能為變今保甲亦恐豪傑有乘之者王安石曰民散則多事什伍之則無事故曰上失其道民散久矣古事不論但以今日言之自府界立保甲賊盜十減七分京曰歲有凶豐不同今歲豐故也歲凶即未可知安石曰馮京謂張角能為變乃以桓靈無政大臣非其人故州郡不職張角三十六萬同日而起州郡無一處能發覺於未起之前如梁太祖其事至微淺然青州使人反其城無一城不發覺蓋太祖茍非能守一城之人不妄付以一城故也先是上言趙子幾恐孟浪至是安石又為上言子幾有智略可任用且言三代禁防百姓嚴密之意能什伍其民維持之以法制則天下定不維持之以法制則其不亂者幸也乙卯度支副使沈起同看詳編配罪人情理輕重權同提點開封府界諸縣鎮公事趙子幾言考城知縣鄭民瞻擅置義倉令諸鄉保甲數千户等第出斛斗意在沽譽賑給始則頭會箕斂終則責以備償本末皆為煩擾非百姓所心欲詔鄭民瞻先衝替上謂王安石曰舉官多茍且不用心宜嚴立法制今已略備不知更欲如何上又曰如舉監場務官增剩則舉者當預其賞虧欠則當與其罰安石曰場務增虧或不繫監官才否若以賞罰舉主恐不免僣濫也上又言三司判官當督察安石曰三司判官才否亦可見不待督察如吕嘉問最為稱職餘亦多備員而已上令更考察安石曰中書於諸司非不考察陛下既詳閲吏文臣亦性於簿書期會事不欲鹵莽然天下事須自陛下倡率若陛下於忠邪情偽勤怠之際每示含容但令如臣者督察緣臣道不可過君過君則於理分有害且刑名法制非治之本是為吏事非主道也國有六職坐而論道謂之三公所謂主道者非吏事而已蓋精神之運心術之化使人自然遷善逺罪者主道也今於羣臣忠邪情偽勤怠未能明示好惡使知所勸懼而每事專仰法制固有所不及也今日朝廷所謂臣愚以為可以僅存而已若欲調一天下兼制夷狄臣愚以為非明於帝王大略使為欺者不敢放肆為忠者無所顧憚風俗丕變人有自竭之志則區區法制未足恃以收功陛下於羣臣非有適莫用賞刑非有私意於其間所以緩急先後之施或未足以變移羣臣心志者臣愚以謂當更講論帝王之道術而已若不務此而但欲多立法制以馭羣臣臣恐不濟事丙辰三司言福建茶乞在京京東京西淮南陕西河東河北依舊禁𣙜外其餘路並通商販從之此以元祐元年二月二日鹽法增入元祐元年二月二日可考丁巳詔天下貸糧近已與除破聞尚有逺年倚閣蠶鹽麥種至今依舊催納可令司農寺契勘並與蠲免戊午詔監察御史裏行太常博士李實罷御史裏行勾當西京磨勘修內司農判勾院實嘗言諌官御史不可不容其妄言王安石白上曰若然則執政大臣上所體貌亦不可不容然則可以妄言者衆矣辛酉詔趙卨詳夏國主秉常所奏移綏州側近本國自來寨柵置於近裏去綏州二十里為界仍令知綏德城折克雋以此事理與夏人折難商量先是秉常有此奏而近羌議地界首領揚巴凌等與克雋議乃抵以為初未嘗約二十里中間立堠開壕而已於是朝廷欲令牒宥州王安石曰但令克雋折難可也牒之即似示以汲汲故有是命正月十七日二十一日可考令克雋折難日録乃二月二十一日事今從實録壬戌詔陕西運銅錫遞鋪兵極為艱苦死亡無處無之及見應色役極多此去轉不聊生宜訪問利害令有司别處置既而三司言向者都轉運使沈起皮公弼請以遞鋪卒二人挽一車日鋪運銅錫五千斤以年計之可運一百七十二萬道路有雨雪泥水之艱士卒有風霜暴露之苦運致不前欲計傳卒衣糧增給之費募民車以紓其勞及增差軍將管押罷去衙前從之涇原經略使蔡挺言西事定宜罷三將訓練萬五千軍馬王安石奏西人必無奔衝糧草可惜能戍為便上欲議和了徐罷之文彥博亦以為然安石謂西人必不能犯邉且和議不計戍兵多少上乃令罷兩將留河中一將此據日録增入去年十一月八日可考挺又言涇原勇敢三百四十四人久不揀練徒有虛名臣即委二將領季一點閲校其騎射能否升降補有功者以為隊長募極塞軍子嘗歷戰陳者補其闕益募熟户蕃部以為蕃勇敢凡一千三百八十八人騎一千一百九十四匹挽弓一石馳逐擊刺如法其有功者受勇敢下等奉餘遇調發則人給奉三百益以芻糧詔諸路如挺請施行之兵志熙寧五年事今附此挺傳載人騎數與志略不同今附下井蔡挺正傳云涇原舊有勇敢官贍給之未嘗料簡市豪右竄名籍中竊冒功賞挺始程其材藝以為升黜又於熟户募選強壯籍為蕃勇敢得千五百人騎自當分邏境上戍兵由是得休月一易隴坻沃饒蕃冒耕為田四千八百頃挺悉檢括募佃以充邉儲邉人冒市蕃部田挺開自首法復得地八千頃刺弓箭手三千養馬五百附傳云涇原舊有土豪名勇敢官籍姓名資養優贍未嘗料簡豪右子弟市井之人假名籍中竊冒功賞挺始程其才以為升黜又于熟户募選強壯籍為蕃勇敢得千五百人騎當永洛城通邉寨隴山川原生地漢蕃冒耕為田四千八百頃挺悉檢括募佃以充邉儲邉人冒市蕃部田挺開自首免罪法復得地八千頃刺弓箭手三千養馬五百附傳人騎下必有脫字當用本志增入張方平作挺墓碑乃不書此等事癸亥資政殿學士給事中邵亢為禮部侍即翰林學士兼侍講學士禮部即中韓維為吏部即中兼侍讀學士翰林侍讀學士右諌議大夫王陶為給事中龍圖閣直學士刑部即中孫永為兵部即中吏部即中天章閣待制孫固為右諌議大夫刑部員外即天章閣待制孫思恭為工部即中故天章閣待制齊恢與近親一人指射優便差遣東作房副使張恭禮石得一為皇城副使依舊帶御器械禮賔副使李中孚等轉資有差候轉出日降誥敕理今歲月右侍禁周宥崔象先劉滋各轉一資依舊閣門祗候以上幸東宫念藩邸舊僚特推恩也先是維以不習詩辭侍講故改侍讀王安石請用維為學士承旨上曰維必不肯受乃已上曰昨岐王府官各轉一官曽任東宫官宜各與轉一官此據二月十五日日録當考王安石白上聞有旨令秦鳳緣邉安撫使撞市易錢將來比較賞罰别支錢招納蕃部此何故也秦鳳經略司驅磨王韶市易錢未見元降指揮月日三月丙午上曰人言市易司並無利息但虛立蕃部姓名支破恐久逺如蕭注事連外域不可根究不如明以數萬緡給之安石曰中才商賈得二十萬緡本錢便能致息王韶豈不能幹運不知誰為陛下言此此必無之理市易有髙遵裕同領陛下又欲差張守約其管勾使臣非一人財物非王韶獨專韶何緣作得姦欺若作得姦欺事亦何難根究如蕭注事自是當時施行不盡正理今若王韶實有姦欺則事雖連蕃部自可根究如支錢一百緡與結斡恰爾縱上下為姦欺結斡恰爾固可問然王韶粗有行止何遽至此上曰朝廷初不疑韶欲令分曉免人謗議耳安石曰人謗議何可免陛下茍知其無他即謗議何傷今疑問如此即何由責其自竭臣愚以謂任人當有大略如漢髙祖用陳平自言不受金無以為資然漢髙祖委金四萬斤恣所出入不問故能濟大事况王韶未至如陳平無行今陛下别賜韶錢三五萬緡若陛下有術以檢御羣臣即韶自不能為姦如其無術韶更别取賜錢虛支破却撞充市易司息錢陛下亦何由辨察如臣愚見以為假令韶妄用市易錢茍能濟一方大事亦在所容忍况又無此不須預有猜疑臣見王韶誠非盜竊財物之人然其為名髙節亷則似不足陛下遇之未為盡而區區務欲興事造功非士大夫之操也此自於王韶私義為不足於朝廷何負韶內則為大臣所沮外則為將帥所壞雖無罪尚凛凛不自保何况有罪此陛下所當深察也安石又言智緣今與王韶亦不足蓋智緣為郭逵所厚故也又奏智緣宜優賜與班行料錢上許之又令與智緣一僧職安石曰蕃部見王靈所加則鄉服鄉服則易附明日又呈郭逵奏言摩正遣人來告王韶元與我呪誓約不取渭源城一帶地及青唐鹽井今乃潛以官職誘我人謀奪我地我力不能校即往投董戬結連蕃部來巡邉若摩正果來巡邉拒之則違王韶呪誓縱之則前所招納蕃部必為摩正奪去臣智議昏愚無能裁處乞朝廷詳酌指揮安石曰摩正為河州刺史郭逵為宣徽使秦鳳路經略安撫使統押彈制摩正乃逵職事摩正有一語來便稱昏愚無能裁處若知無能何不早辭文彥博曰朝廷專任逵方可以責此安石曰何嘗不專任逵作經略安撫使王韶招納蕃部於逵職事有何所害上曰又不知摩正果有此言否亦安知非逵導之使言安石曰此事誠不可知就非導之使言只觀逵前後論奏反覆事狀甚明前謂西蕃皆脆弱不足收招納枉費錢至摩正一言便稱昏愚無能裁處若如此則摩正乃是強梁可畏可畏則前不當言脆弱脆弱則今何故便以為不可裁處彥博曰事任不專難責辦於郭逵上曰制禦摩正正是郭逵事任如何不可責辦吳充曰逵與王韶矛楯只此可知王韶必獨當秦州事未得郭逵又必不肯協同安石曰朝廷興事若為郭逵不肯協同便自沮壞恐無理彥博曰若摩正果來須與力爭力爭則須興兵安石曰以天下之大若果合興兵亦有所不得已上曰開元號無事然年年用兵有天下國家即用兵亦是常事但久不用兵故聞用兵即怪駭如前日用兵乃坐韓絳措置乖方非兵不可用也安石曰誠如此豈可謂韓絳一舉事不當便終身不復言兵自堯舜文武時何嘗以兵為諱但顧方略何如耳彥博曰兵出無名事乃不成古人用兵須有名安石曰今所以難於用兵自為紀綱未立基本未安非為兵出無名如摩正是河州刺史朝廷自招納生羌又不侵彼疆境却稱我告董戬去我結連蕃部去此豈河州刺史所當言吳充言摩正端為侵彼疆界故云爾上曰王韶所招納並非摩正疆界充曰恐漸次侵及之彥博曰自古用兵非得已今若能服契丹夏國乃善至於摩正不足校計安石曰今所以招納生羌者正欲以臨夏國使首尾顧憚然後折服上曰此所謂圖大於細為難於易安石曰仁宗仁恩在羣臣可謂深厚夏國陵侮仁宗最甚羣臣欲報仁宗當以夏國為事使夏國推屈乃所以刷仁宗之恥也上因言要當詰問不可但令移徙又曰郭逵不當使盈盈故如此安石曰人主操豫奪之柄盈者可虛惟不能制虛盈使在我故盈者自以為雖人主不能使我虛如逵者陛下遇之誠有失於含容逵本小人其志在爭勝負取一資半級耳官雖尊其本趣操豈改陛下遇之當察其趣操且招納生羌自是朝廷本分事若逵肯以此為己任則朝廷何必倚王韶太白晝見甲子僧智緣及結斡恰爾乞置戒院及關茶綵上欲許之謂王安石曰聞智緣極有方略但彼制御不得自由王安石曰劉希奭言王韶忌智緣此事必無智緣乃王韶薦引今招得結斡恰爾自是韶功何緣反忌至於智緣所以有此議論者由智緣招到結斡恰爾便自以為大功過作張皇韶須主裁以理分疾韶者因激怒智緣以為韶忌前因以明致結斡恰爾非韶之功實智緣力也上曰聞結斡恰爾有力過裕囉格勒逺甚安石曰前此未嘗有一人言結斡恰爾力量過裕囉格勒者今一旦遽有此言此欲推崇結斡恰爾以成智緣之氣使與王韶齟齬而已上曰待遣一人往視古渭事人或謂韶所言皆誕妄耳安石曰其誕妄謂何上曰聞韶第招蕃部與物便去初不為我用也安石曰蕃部才歸附即當給與料錢亦安得遽為我用此事要屬之王韶使馴致成熟上曰郭逵却欲領此事以為使臣管勾雖摩正可掃除安石曰逵既知摩正可掃除何故奏狀乃如此張大摩正以為無能裁處招納今已見功緒人皆可了當豈但逵上曰逵非王韶措置事與其意不同安石曰韶措置未見有失但朝廷接應不失事機不為姦人沮壞從中牽制則事無不成之理去年以前未有一人言合如此招納者今逵欲領此事亦無一人復言不合如此招納者即事有功緒昭然可見如摩正者要與不要掃除在陛下而已何必逵乃能辦此摩正所有部落不過一二萬人又多點集不起若以精兵數千或萬人臨之但取摩正一人其餘首領部族不得侵犯一人又誘以爵賞則擒摩正如舉秋毫爾然此事陛下若明見事機不為姦罔所惑則無事不成若不然則雖此小事亦未易辦上言逵言無能裁處事但為韶曽許摩正以不要地及鹽井耳安石曰不要地及鹽井固非欺摩正今來招納何嘗要彼鹽井及地因言陛下許智緣關茶綵及置戒院須委在沿邊安撫司相度如智緣得專取豫即事亂難以調一上從之止給智緣料錢不降關茶綵指揮戒院合置與否令安撫司具奏十七日又有智緣事便可附召智緣歸更詳之安石又曰郭逵有智計若搖扇沮壞王韶即其事必難推究恐非但韶事不成緣此更開邊隙陛下若欲委郭逵則不如罷王韶專任郭逵如以王韶未可廢即須王韶勢力足以自濟不為中外牽制沮壞乃可上曰須專委王韶上又欲差人往體量事安石曰蕃户有無力量即雖韶久在彼尚不得知若暫往之人何由知其實安石又言今生羌久與中國隔絶其有力量與無力量皆非中國所知但來附屬即須與職名料錢若彼未來附屬之人自爭強弱非安撫司所得知若附我者雖弱不可不助未附者雖強不可不摧如此然後恩威立欲立恩威則古渭兵力不可不增上曰建軍須增兵安石曰王韶乃陛下自於選人中拔擢非有左右之力今所為漸有功緒此陛下知人善任使之效為山未成一簣止吾止也掘井九仞不及泉猶為廢井願陛下終成此事毋為衆人沮壞於垂成上曰久任專責固善聞韶止於一年後求罷安石曰此必讒間之言比欲除王韶作檢正官韶願自效於邊方此時事未有端倪韶顧肯自效今事有緒何故一年後遽求罷上曰聞高遵裕亦欲如此安石曰就令一年後求罷一年亦須盡力彥博曰若但滅裂不務功實即難以持久故或有茍且歲月求罷安石曰作一年便罷不知待事成不待事成若事已成何須求罷若不待事成則於遵裕有何所利遵裕非是懵然不曉利害必無此語也時經略司磨勘市易錢凡為王韶幹事者多所追逮韶輒留不遣且言恐人情擾動乞改就三司磨勘安石以韶奏白上曰王韶非貪墨之人臣敢保任假令王韶欲為侵欺如髙遵裕之徒皆規其職任者也茍有過豈肯庇覆以此不須疑兼韶所關借錢才二千餘緡便都侵欺了於委任邊臣之體亦不足校上曰緣經略司取索文歷俱不得必又有詞今更勿委經略司驅磨候三年取旨别官磨勘安石又具劄子言臣伏見秦鳯沿邊安撫司招納事乃以兼制羌人朝廷所當并力以就其事獨出於聖算而又專委王韶獨出聖算則執政以己不任其咎而幸無所成以復其前言專委王韶則將帥以權有所分而多方沮壞以快其私志此皆陛下所自照察也比來中外交奏謂韶姦罔屢經按驗韶實無他故得遷延至今所營稍見功緒而郭逵又復與韶矛盾論奏紛紜逵之捃拾不遺餘力然其所詆亦未見韶顯然罪狀而逵前後反覆辭指不遜且在聖覽非臣敢誣今日陛下宣諭逵欲以招納為己任又言逵以為韶之措置多所乖方逵又以為摩正極易掃除如逵所奏韶事初未見有乖方若言摩正易為掃除則奏狀何故張皇摩正事勢如此方陛下委逵以招納之事逵固不以為然不知今日何故却欲以為己任其所言不可憑信如此而又嫚侮驕盈陛下都無所懲何以復馭將帥招納一事方賴中外協力之時在廷既莫肯助陛下成就此功郭逵又百端傾壞逵既權勢盛大其材又足為姦若扇動傾搖於暗昧之中恐陛下終不能推情狀如此則豈但不能集事亦恐因此更開邊隙書曰兢兢業業一日二日萬幾今日便有處置已非古之先見然猶愈於迷而不復也伏惟陛下早賜詳酌徙逵所任稍假王韶歲月寬其銜轡使讒誣者無所用其心則臣敢以為事無不成之理要録云至是始用安石言而有是命臣於郭逵王韶何所適莫但蒙陛下知遇異於衆人義當自竭以補時事故輒忘進越犯分之罪而冒昧陳愚伏惟陛下裁赦陸佃所編安石文字此劄子稱二月而空日今附見徙郭逵知渭州前丙寅知渭州龍圖閣直學士右諫議大夫蔡挺為樞密副使挺在平涼凡五年自以有勞久在邊庭憤鬱為歌詞因中使至使倡優聲之傳達禁中上亦閔焉遂召用之挺傳云與曽公亮結姻遂不次進擢當考挺以治平四年四月自慶徙渭熙寧二年九月再任五年二月召入觀文殿學士吏部侍郎知鄭州吕公弼為宣徽南院使判秦州宣徽南院使判秦州郭逵判渭州始用王安石之言也議除公弼代逵在正月十九日上諭中書曰公弼在河東當五路出師倉猝綏御有方故使代逵恐王韶生事則委之鎮撫朝廷初疑公弼辭避使內侍李憲齎敕告往賜詔便道之官公弼聞命即戒行上喜復召對面加慰勞而遣之及至董戬用舊事貽公弼以書且稱敕公弼却之曰若藩臣安得妄稱敕董戬自是不敢復稱恐王韶生事則委公弼鎮撫此據墨史本傳朱史遂刪去其他則據范鎮所為墓碑據日録公弼不令董戬稱敕乃十二月事今并書之詔鄜府路自八月癸酉隕霜害稼及五六分可令經略司體量如實災傷其新投降蕃部香葉策木多二族並仍舊給口食及河東沿邊麟豐二州蕃部弓箭手闕食者亦令安撫轉運使體量賑濟詔秦鳯路向寶所招降羌耕種稍成次第若遽遷徙分配必致失所宜令依舊安居從髙遵裕請也辰州言知下溪州彭師晏願納馬皮白務洞地土乞申奏依例轉刺史改支逐年衣襖色額加食鹽并乞母妻進邑號詔彭師晏與下溪州刺史母妻與邑號衣襖食鹽令鈐轄轉運司依例施行丁卯光祿寺丞杜純為樞密院宣敕庫檢用條例官先是詔可專差官一員檢用條例其逐房所呈判檢文字並先送宣敕庫貼寫條例呈覆故用純為之四月丙子純罷內藏庫言勘會饒池江建等州遞年額鑄錢一百五萬貫并額外增剩錢久來並納內藏庫每年却退錢六十萬貫并三年一次支南郊錢一百萬貫赴三司顯見往復欲乞下三司自今年額鑄錢一百五萬貫內支一十一萬六千六百六十六貫六百六十七文并饒池江建州監鑄到額外剩錢並納本庫外餘錢並令左藏庫受更不令本庫逐年退錢六十萬貫并每次南郊支錢一百萬貫與三司仍乞減放兵士庫掐子節級共三十人歸左藏庫每日只輪差庫掐子三人赴庫如遇諸處支納錢實據合使人數逐旋於左藏庫計會勾換從之此據會要增入按天禧三年十二月乙未三司奉準詔與內藏庫議自今撥鹽稅錢及歲别出錢六十萬赴左藏庫給用從之與此年內藏庫所言略不同當考詔兩浙西路去歲經災傷州檢放不盡稅租令三司權與倚閣又詔武臣換文資不限資序戊辰檢正中書吏房公事殿中丞盧秉權發遣兩浙提點刑獄仍專提舉鹽事秉前與著作佐郎曽點行淮南兩浙詢究利害異時竈户煮鹽與官為市鹽場不時償其直竈户益困秉先請儲發運司錢及雜錢百萬緡以待賣鹽者而鹽場皆定鹽竈火灰盤數以絶私煮之弊自三竈至十竈為一甲而煮鹽地什伍其民以相譏察及募酒坊户願占課額取鹽於官賣之月以錢輸官毋得越所沽地而又嚴捕盜販者此據食貨志增入凡私煎盜販及私置煮器罪不至配者雖杖罪皆同妻子遷五百里擅還者編𨽻此據刑法志增入本志云四年遣大理寺丞盧秉著作佐郎曽點行淮南兩浙云云至益兵千人皆聯書之按益兵千人在六年十月十八日非四年事今但掇取措置鹽事附秉初除憲時秉本傳云奉使淮浙措置鹽法秉又與發運使薛向鈎索利病預備本錢優給煮海之民俾無私販遂著為令方勺泊宅編云元豐初盧秉提點兩浙刑獄會朝廷議鹽法秉請自錢塘縣楊村場上接睦歙等州與越州錢清場等水勢稍淡以六分為額楊村下接仁和縣湯村為七分鹽官場為八分並海而東為越州餘姚縣石堰場明州慈溪縣鳴鶴場皆九分至岱山昌國又東南為溫州雙穗南天富北天富場十分著為定數蓋自岱山及二天富皆取海水煉鹽所謂熬波者也自鳴鶴西南及湯村則刮􅬺以淋鹵以分計之十得六七而已鹽官湯村用鐡盤故鹽色青白而鹽官鹽色或失墨由􅀈灰故也楊村及錢清場織竹為盤塗以石灰故色少黃竹勢不及鐵則黃色為嫩青白為上色墨即多鹵或有泥石不宜久停石堰以東雖有竹盤而鹽色尤白以近海水鹹故耳後來法雖少變公私所便大抵不易盧法且水性潤下為鹹其勢不少折則終不可成鹽安邑池鹽以濁河曲折故因終南山南風以成若明越溫杭秀泰滄等州為海水隈奧曲折故可成鹽其數亦不等惟隈奧多處則鹽多故二浙産鹽尤盛他路自溫州界東南止閩廣鹽勝五錢比浙賤數倍蓋以東南最逼海潤下之勢既如此故可以為鹽不必曲折也秉七年五月十九日改淮東憲六月十五日轉官升任八年五月二十六日又轉官升任辛未司農寺言府界提點提舉管勾官閲試諸縣保甲有乞試武藝人欲令本寺再閲試有藝精者取旨引見從之河東經略使劉庠言被旨取問願歸夏國人姓名今具條上詔不須俟夏國議界至官到界上據所奏願歸蕃户於麟州相對界上發遣人支綵絹二匹小貌一匹及令保安軍移牒宥州照會初執政議欲令牒西人差首領交割降羌之願歸者王安石白上恐彼疑不肯來則此願歸之人已嘗取問無由了絶故有是詔壬申詔天下州縣酒務不以課額髙下並以租額紐算淨利錢數許有家業人召保買撲與免支移折變三年十一月七日十二月九日四年二月一日三月十四日可并考甲戌復昭信軍節度副使王陶為度支郎中致仕陶前坐妄奏官吏及子履潔販私茶銅鹽敗官雖會赦當敘而年已七十故令致仕也乙亥詔都鹽院以所買引許商人依陜西賖絹例召保以屋契金銀賖當於緣邊州軍輸納每引六貫加錢三百限一年輸足如違所當並沒官新本削去此段供備庫使張守約為閣門通事舍人守約秦鳯路都監兼管勾蕃部召對期月間上殿者四每顧問輒移刻上問王韶能了河湟事乎守約曰以天威臨之事罔不濟然董戬素忠順不宜侵逼因言古渭寨正據衝要願建為州為隴右根本上納其言故加職遣還勞之曰通事舍人未足以酬卿也丁丑郭逵奏聞王韶招裕囉格勒甚屈辱上謂執政曰韶所奏乃與逵不同王安石曰宜令逵具屈辱實狀以聞韶又言逵公言不當招納裕囉格勒乃私使人誘裕囉格勒來秦州欲招納之功歸已隂沮壞邊事文彥博曰臣嘗議此兩人難並立今既徙郭逵矣安石曰朝廷置緣邊安撫司招納生羌於經略司何所妨害何難立之有彥博曰人各有所見安石曰所見有是非若已所見非是朝廷不以為可則當聽朝廷指揮馮京曰此亦韶偏辭耳安石曰誠然此事當推究乃詔逵分析時經略司已逮捕元瓘送秦州獄鞫韶擅用市易錢贓狀未竟也其後安石進呈逵分析韶招裕囉格勒事上曰乃無屈辱須差官勘韶并此事令勘日録三月二十四日進呈郭逵勒奏分析緣邊安撫司招裕囉格屈辱事上曰却無屈辱候差官勘王韶事一處令勘己卯詔京東常平司輟錢五十萬緡與河東常平司聽以紬絹折充許商人以物産賖買限一年於河東緣邊輸納上謂執政曰秦鳯緣邊安撫司與經略司事宜與分别處置不知吕公弼到又何如安石曰此在陛下陛下專以此事委之必盡力此大事陛下宜留意他時兼制夏國恢復漢唐舊境此乃基本且不勞民費財上曰誠如此但恐公弼復與韶矛盾安石曰陛下以誠意諭公弼宜不敢馮京曰緣邊安撫司與經略司事有相室礙處當措置安石曰事本無相窒礙處但各公心濟務又何勞措置廢蓬州良山縣巴州其章縣卭州臨溪縣嘉州平羌縣並為鎮
