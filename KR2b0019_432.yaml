body:
  text: 續資治通鑑長編卷四百二十八宋李燾撰哲宗元祐四年五月甲午尚書省言保甲出身補借差以上初該磨勘已降指揮用舉主或無即展二年磨勘如已曽磨勘改轉凖此其補授殿侍或軍大將之類即未有該説詔候至借差以上該磨勘日並依借差初該法三省言大中大夫已上奏舉到知州見在部人數甚多蓋為每嵗令舉致差注不行及經眀行修人係每遇科場奏舉詔今後並遇降詔方許奏舉所有嵗舉知州人及每遇科場奏舉經眀行修指揮並不施行實録刪修本文頗失事實今存本文京西轉運司言韓城村人物繁盛場務係百姓撲買欲乞改為鎮創酒稅務置監官一員從之新無乙未朝奉大夫知兖州馬默為衛尉卿朝散郎權發遣兩浙路轉運副使葉伸為都官貟外郎朝散郎權提點河北西路刑獄田子諒為駕部貟外郎丙申刑部言諸路斷流配罪已當若本案內徒以下罪有出入未審合與不合奏裁詔令奏裁又言其出入笞杖及半年徒乞從本部下所屬改正施行官吏更不駮勘從之丁酉吏部尚書蘇頌為翰林學士承旨翰林學士許將兼吏部尚書許將兼吏書據政目增入朝奉郎新除禮部貟外郎賈易為殿中侍御史于闐國貢使李揚星鄂丹威格以下續貢珠玉象牙珊瑚藥物等先是左諫議大夫梁燾言臣恭聞太皇太后親立皇帝嗣興大業功德眀被天下共知所以垂簾之日中外歸心竊聞蔡確輩貪天之功以為已力揚言籍籍自號有社稷大功當時清議已不能容太皇保護聖躬今踰五年而姦黨又隂相造作語言反覆誕妄自以為功以動搖國家順理安常之勢故忠臣義士不勝其憤建言乞深治其事明正其罪以昭太皇陛下之功德臣謂可以立辨不待究治而後見也臣昨被召過河陽見知州事邢恕臣語次問恕云聞皇帝即位前太皇抱官家登先帝御榻問肆赦云與皇子轉官先帝頷之則是太皇聖慮已決知否此事是臣在京西提刑日在穎昌府傳聞又云太皇不忍眀言上為太子故云轉官恕云此事亦聞恕又云知當時十日以前太皇於宫中大計已定臣以恕素為蔡確所厚臣遂又問云是時大臣曽入未恕云未曽入臣云如此則是事本出於太皇也恕云是如此恕兼曽見一書具説本末皆出太皇臣又問得之何人恕云得之甚詳不須問又臣問其書語恕不肯盡道但及其略云旬浹以前大計已定此書必在宫中可考虛實伏望聖慈指揮檢尋降出或失其書乞下恕取索副本進入復以付外明示廷臣仍勒恕具析此事所得因依以其書付史館書之國史更為别本藏之宫中擇謹厚宫人掌之近來邢恕對司馬康等欺罔誣誕語言反復此事甚大不可不早辨貼黃臣聞蔡確等久誤先帝至誠聽委叨竊富貴先帝後知其惡未及施行今日陛下以至公柄任賢老盡逐造亂之人以嗣成先帝之志小人恐失名位百計懷姦交結誕妄無所不至無復愧恥忌憚以幸復進早來雖蒙皇帝陛下宣諭云當時事甚分明在臣以為在太皇不可不早辨眀使姦人詭計不復敢萌於心伏望聖慈詳察其語與恕之人其真實忠正可以嘉賞欲乞因此特與推恩奬録恕之罪亦乞加察恕書中如果有此語即與恕在外揚言確有社稷之功事迹不同可以見恕反復之姦乞加詰責重置嚴憲上以眀皇帝孝德昭明太皇大公至正策立之功下以絶羣凶誣誕之姦邢恕旬浹以前大計已定此書當考究竟張舜民作梁燾行狀云梁燾嘗面奏蔡確巇嶮凶狡在先朝屢起大獄傾擠善良冒竊相位挾姦持權人莫敢指欺罔之罪中外共知兩宫臨御之初言者交攻陛下置其過惡使補近郡體貌之禮不損故事弟碩盜用官錢以數萬計確居相位蒙蔽聖眀確但落職移小郡上辜大恩不務循省猶敢鼓唱姦謀貪天之功以為已力今作詩謗訕罪之小者也恭惟官家先帝之長子也先帝太皇之長子也先帝預使皇子嘗侍宴出見羣臣明示天下中外歸屬太皇親立聖孫嗣興洪業為宗社萬世之安臣嘗聞先帝服藥時太皇親抱官家登先帝御榻太皇謂先帝曰與皇子轉官先帝頷之太皇不欲遽言上為太子故云轉官臣又見邢恕言當時大臣都不知策立事恕又言自十日以前太皇於宫中已定大計是時大臣猶未入大臣何嘗預定䇿也恕又稱嘗有書上兩宫云旬決之前大計已定確豈不知太皇陛下聖德清眀畏謹古無與比所以敢妄為不臣之語非所擬倫蓋欲造為他日誣誕禍基上欺天地社稷以此張本故臣前日面奏謂確懷姦包藏其詩什為輕也太皇曰當時次序官家盡記得太妃宫嬪皆在左右燾又曰先帝立子大統既順大臣何功之有兩宫謂燾曰皆如卿言行狀云云蓋與燾此疏語同但説蔡確作詩謗訕罪小則疏無此語又所載太皇云當時次序官家盡記得太妃宫嬪皆在左右要當表而出之右正言劉安世亦言臣今月二十四日延和殿進對嘗論蔡確朋黨事雖粗陳大槩而臣內有誠懇未能盡逹天聼事體至重不可不憂惟陛下不憚煩而詳覽焉臣聞蔡確章惇黃履邢恕四人者在元豐之末相為交結號為死黨惇確執政唱之於內履為中丞與僚屬和之於外恕立其間往來傳送天下之事在其掌握公然朋比傍若無人以至先帝厭代聖上嗣統四人者以為有定策之功眩惑中外無敢與辨及司馬光被用姦人懼其為己之害乃使惇於上前極口詆毁陛下以惇無人臣之禮逐之於外確又以弟碩贓汚事發亦罷宰相履恕坐事相繼外補既而惇在蘇州肆為不法強以賤價奪民之産確在安陸不自循省作為詩什謗訕君親臣竊謂惇確所以桀驁狠愎無所畏憚者蓋由從來更相稱譽自謂社稷之臣心有所恃故敢如此若不早為辨正以解天下之惑臣恐異日必為朝廷之患臣迹雖踈逺不知先帝傳位之詳然搢紳士大夫間亦嘗講聞其略今試條析為陛下言之臣聞元豐七年秋宴之日今上皇帝出見羣臣都下喧傳以為盛事明年三月神考晏駕衆謂前日之出已示與子之意其事一也先帝違豫岐嘉二王日詣寢殿候起居及疾勢稍增太皇太后即時面諭並令還宫非遇宣召不得輒入有以見聖心無私保佑慎重其事二也建儲之際大臣未嘗啓沃而太皇太后內出皇帝為神考祈福手書佛經宣示執政稱美仁孝發於天性遂令草詔誕告外廷蓋事已先定不假外助其事三也陛下聼政之初首建親賢之宅才告畢工二王即日遷就外第天下之人莫不服陛下之聖眀深德逺嫌之理其事四也臣之所聞大略如此實太后聖慮深逺為宗廟社稷無窮之計彼四人者乃敢貪天之功以為己力臣雖愚陋心常疾之近司馬康赴闕邢恕邀之至河陽燕語之次稱贊確等不已窺其微意類皆捭闔蓋欲康來京師傳逹在位隂與確等謀為復用之計朋姦害正一至於此臣竊謂惇確用事十年小人黨與內外固結造作姦言欺惑愚衆臣恐嵗月寖久邪説得行離間兩宫有傷慈孝則確輩萬死何補於事伏望陛下起福於無形防患於未兆眀詔執政及當時受遺之臣同以親見策立今上事迹作為金縢之書藏之禁中又以其事之本末著之實録然後眀正四凶之罪布告天下除蔡確近已貶竄外所有章惇黃履邢恕欲乞並行廢斥屏之逺方終身不齒所貴姦豪弭息他日無患惟陛下取臣千慮之一得少賜留聼不勝幸甚安世此章以五月二十四日以後方上章云蔡確近已貶竄蓋指新州也十八日既有新州之命安世并及邢恕等恕尋被責恕責必不與確新州同是十八日當在二十四日以後或五月末也舊録載確事極不詳并取責恕事附十八日新録雖增益安世此章却改二十四日為昨日蓋緣不能詳考始末别加修撰姑刪潤舊文趣奏篇耳今掇出責恕事具安世所上章下仍須廣求證驗重與筆削乃善據王巖叟所記責恕乃二十八日如蔡確分析何足具載舊録具載其意固有在而新録仍之當時臺諫彈劾及宰執議論却都泯沒不少槩見謂新録非踈略可乎貶安世等論章惇黃履邢恕及確凡四人恕與確相繼責而惇履獨不坐當考據王巖叟所記中丞傅堯俞先論邢恕乃確腹心乞行遣此一人餘勿問侍御史朱光庭亦論之右正言劉安世疏事可明者四皆二十八日以前事御史中丞傅堯俞侍御史朱光庭言邢恕乃蔡確死交其姦狀衆所共知確既貶竄其徒不能無反側若重責恕其他一切置之則天下服而衆心安矣又言恕違孔孟之學效蘇張之辨與確結交厚善今確侮謗君親已行誅竄恕自來引譽鼓唱中外士大夫頗為之惑若不眀責竊恐無以鎮遏浮議又言恕及確在元豐之末相與結交號為死黨中外唱和公然朋比確罷宰相恕造作姦言熒惑中外語皆捭闔無所忌憚隂與確謀為復用之計確已貶竄恕乞行廢斥所貴姦謀弭息他日無患明示天下三奏據雜録第二册當時坐此行遣不知誰所奏考王巖叟所記此即傅堯俞朱光庭之章也是日詔丁憂人前朝奉郎直龍圗閣邢恕候服闋日落直龍圗閣降授承議郎添差監永州在城鹽倉兼酒稅務中書舍人鄭雍行詞曰言行堅偽王者之所必誅讒殄震驚聖人之所不赦邢恕誦古訓典服儒衣冠不師孔孟之言専鼓儀秦之舌假善類如市道結大姦為死交倡為邪謀眩惑羣聽曩從遷貶未即悛回肆興捭闔之言隂圗冀幸之福凶人既竄餘熖未消盍正典刑以清醜孽汝之自貽伊戚其又何辭焉吾於屈法伸恩可謂無負矣往服寬典尚蓋爾愆先是恕自襄州移河陽專抵鄧州見蔡確相與謀日者所造定策事及司馬康始除喪赴闕恕特招康道河陽因言確有大功不可掩勸康作書稱確為他日全身保家之計康與恕同年登科又以恕出其父光門下信之不疑作書如恕言留恕所恕本意必得康書者蓋以謂司馬光之子云爾則確定策事可取信於世不疑既而梁燾自潞州以左諫議大夫召燾已道溫縣入朝恕亦使人要燾出河陽燾與恕有舊既至恕連日夜論確定策功不休且以康與確書為證燾不恱及當言路會吳處厚奏確詩燾因是遂與劉安世等共請誅確確既貶竄恕亦坐責康初欲從恕招邵雍之子伯溫謂康曰公休除喪未見君不冝枉道先見朋友康純直不意恕欺己且曰已諾之矣伯溫曰恕傾巧或以事要公休公休若從之則必為異日之悔矣公休康字也及燾等論確恕罪亦指康分析康乃悔之邵伯溫辨誣云元祐三年春申公辭相位拜司空平章軍國事吕大防自門下侍郎拜左僕射范純仁自同知樞密院拜右僕射邢恕自襄州移知汝州特往鄧州見蔡確再謀定䇿功恕又移知河陽次年春吕申公薨時知漢陽軍吳處厚得蔡確在安州日題車蓋亭詩十首箋注奏上以為謗訕蓋處厚自寺監丞確辟為山陵司掌箋奏官既罷處厚欲確以故例除館職確不為言而出之以此怨確先是溫公之子康服除赴闕邢恕招之由河陽入朝伯溫素知恕之謀乃謂康曰公休免喪未見君不可枉道先見朋友康純德之士以恕出溫公門下又同年登第信之不疑謂伯溫曰已諾之矣伯溫曰若事不可者公休或從之必為異日之悔康卒往恕見康盛稱蔡確策立大功不可掩勸康作書稱確之功為他日全身保家之地康果不能違作書如恕之言留恕所蓋恕意欲得司馬溫公之子尚稱確功足以取信朝廷天下之士矣是時梁燾自潞州以諌議大夫召燾已取溫縣路赴闕恕亦使人要之出河陽燾與恕有舊燾既至連日夜論説蔡確定䇿功不休恕果以司馬康與確書亦稱其功為證燾不説燾還朝適吳處厚奏確詩至遂與司諫吳安詩正言劉安世侍御史朱光庭等論確罪亦言司馬康與蔡確書字朝廷下康分析康方悔之此假已修入長編仍存本書於後自隨移汝政目在元年十一月二十四日自汝移襄未得其時自襄移河陽則在三年九月十八日確知鄧在三年二月二十四日王鞏隨手雜録載司馬康不肯證邢恕語言已附五月二日辛未與邵伯溫所記頗不同當考紹聖元年五月十八日恕以朝奉郎管勾靈仙觀復直龍圗閣知徐州右諫議大夫范祖禹言臣伏見蔡確已責降英州别駕新州安置臣知陛下宸謀逺慮斷在不疑除去大姦實為宗廟社稷之計非以陛下一心私喜怒也忍於一人所以不忍於天下之人不愛一人所以愛天下之人也然確以凶德叨竊相位作威作福欺罔先帝屢起大獄排陷善良故聞確名者無不震畏以朝廷名器為己私物市恩結黨故貪利之士多為確用今佐佑確者不過懷其舊恩嘗與之相濟為惡或畏其復起不敢結怨不然則所見偏謬謂確以詩得罪欲薄其責不出此三者而已臣聞堯刑一人而天下服書曰殱厥渠魁脅從罔治古之眀王征討叛逆亦不過誅其元惡餘皆赦而不問使之自新若窮治支黨滋蔓不已懼罪者衆則人情不安必有過刑濫及無辜此先王之所深戒也夫聖人之道不過得中天下之事不可極意一時極意後必有悔用刑寧失之於寬不可失之於急寧失之於略不可失之於詳自乾興貶丁謂以來不竄逐大臣六十餘年今已用大刑四方聞之無不震聳然人無愚智皆以確之得罪為當不宜更有驚駭物聼且丁謂見在相位故朝廷有黨不可不黜今確已罷相數年陛下所用多非確黨其有素懷姦心為衆所知者固不逃於聖鑒自餘偏見異論者若皆以為黨確而逐之臣恐刑罰之失中人情之不安也後因登對勸上以辨邪正曰邪必害正正必去邪自古未有邪正並立而可以為國者也比年以來大臣以兼容小人為寬好惡不明邪正不分所引進者不盡得人宰相以進賢退不肖為職而邪正不分豈不負國伏望陛下戒飭大臣各以公心求賢多引鯁正之人以重朝廷無使小人得位為他日之患也祖禹又言臣伏聞開修京城壕日役三四千人雖和雇夫力調發不及民其錢不屬户部然財出於民一也豈可不計較愛惜而枉費用之臣聞開壕深一丈五尺闊二百五十一步廣於汴河三倍自古未聞有此城池也新城周世宗所築太祖因之建都於此百三十年無山川之險所恃者在修德在用人在得民心此三者纍聖所以遺後嗣子孫也神宗時宋用臣提舉修京城大興土功版築過當小人之情唯欲廣用民力多費國財上則徼幸爵賞次則隱盜官物故役無有不大費無有不廣此固姦臣之所利本非先帝意也陛下始初聽政散遣修城役夫百姓皆歡呼鼓舞今欲終成前功但葺之而已可也何必廣作無益以害有益乎又京城外門正門即為方城偏門即為甕城其外門皆用純鐡裹之此祖宗時所無有也甕城乃邉城之制非所以施於京師今東西南三面偏門亦欲為甕城臣不知大臣以何見而為此謀也必以為威北敵也使北敵果渝盟南向大臣將坐守此受敵乎自修城浚池以來議者皆以為無戎而城無寇而溝公宫此言不可不畏其北門城甕城已就改之重勞臣欲乞降指揮東西南三面偏門止為方城其壕廣闊可城三分之二稍正王城之體以惜民力以省國用不聼祖禹又再言之訖不聼祖禹二疏先以五月二十八日上後以七月十四日上舊録於六月二十六日載右諫議大夫祖禹言開修京城壕曰日役三四千人其北門甕城已就外乞指揮東西南三面偏門止為方城其壕廣闊可減三分之二以惜民力改先帝修都城之制也都城元豐已有定制已城者七八至是姦黨妄欲改制六月二十六日字合刪去今並移入五月末六月六日七月六日梁燾云云可考戊戌右諫議大夫范祖禹言臣伏見知樞密院事安燾位次宰相輔政纍年竊恐相位有闕陛下過聼以次用之臣不敢不先事而言燾有不可相者三素無人望此不可一也姿性暗狠遂非不回此不可二也朋比蔡確章惇若在相位必引小人聚於朝廷此不可三也陛下不過以燾先朝執政不欲盡罷故以聖度兼容之自陛下更張衆事以來所用之人所行之政皆非燾所欲臣竊意燾常懷不平他日害國政者必在於燾萬一相之必致議論紛紜喧瀆聖聽方今小人猶倚燾為根本豈宜久居宥密之地燾二親皆老若其請去伏望陛下勿復留之上可以弭國家之患次可以全君臣之恩臣前奏云其有素懷姦心為衆所知者固不逃於聖鑒指謂燾也燾雖無營救蔡確之迹其實確惇之黨也先是左諫議大夫梁燾言伏以宰相之任與上同德隂懷二三是虧忠節顧何以謀王體而斷國論示天下以大公也謹按右僕射范純仁隂狠回邪強愎矯誕本緣家世薄有虛名及在相位大失士望唯諾茍且人不以取信舉止輕脫衆指以為狂不能守正而翻覆是非專務徇私而侵亂綱紀播在物議皆有顯狀迷謬如此自合黜罷臣竊以為未足論及唯黨蔡確一事最為不忠無愛君報國之誠有挾邪朋姦之迹按狀原心首當退斥近者蔡確怨望作詩忠臣義士扼腕切齒如純仁身為宰相荷國厚恩當發憤攻擊急於仇讎率先百辟請加誅殛而乃出死力以主張文姦言以辨解數對賔客傷嗟惋恨以為不宜罪人於詩什之間又謂確無罪可治朝廷必欲行之則當罰金而已聞者駭愕什伯相傳皆以為確之悖逆天下共棄推之公議萬死猶輕使純仁都不知有忠孝則已如少聞君親之義則豈不知確罪在不赦宜正典刑臣謂純仁亦心知確罪度朝廷必須施行乃妄作邪説縱為欺罔兾幸眩惑聰眀以申私欲外為好言使確聞之收恩於已及其終有刑罰則使歸怨於上是無愛君報國之心眀矣古今深於詩者或章句之間意存譏刺託興政事感寤時君如此之類誠亦多矣未有如確密藏大惡之志發為不祥之語傲慢不敬狠賊無憚也使純仁都不知有詩則已如稍辨文義則豈不知確之言甚於漢之楊惲是有挾邪朋姦之迹眀矣大臣者同國休戚是宜竭忠勵敬倡率羣臣夙夜在公以上報禮者也今設心積慮背戾如此豈可復使入侍清光預聞機政對立表儀之地哉伏乞聖慈特賜明察重行竄逐以清朝廷貼黃仁祖用夏竦為宰相諫官言其姦邪一章罷免近年左丞李清臣御史論其不才尋亦罷去今純仁兼有姦邪不才之實又附下罔上罪惡大過於夏竦李清臣誠不足愛若不速賜罷斥何以使知警懼純仁自同知樞密院蒙聖眷拔擢為相不思恩遇殊常盡節奉公以圗報效乃自附姦人之黨出力濟惡坐視悖逆了如無事及有行遣更加救解不顧君臣之義其不知恩分如此燾奏此無月日當在五月十二日貶蔡確後又言臣風聞范純仁嘗與親賔言蔡確事自謂其父仲淹在眀肅時專攻簾中之過亦不顧流俗是非客言今日事與當時不同今是蔡確怨望譏訕即不是太母有闕失也如確者天下恨不食其肉謂純仁何故主張此事大錯純仁私於黨確敢為大惡乃以朝廷行遣為過失欲以宰相之力強持威斷使事不得行不恤公議妄自比其父之敢為可謂不忠矣又聞純仁二子漏語與確私人云解得已有次第只是太皇怒朝廷方治確事純仁備位宰相略不畏避嫌疑隂與姦人相結以濟其惡令子交通確之私人屢以朝廷意旨告語收恩在已歸怨於上不可謂忠也純仁之罪亦已明白不可復留相位伏乞聖眀省察早賜黜罷去邪勿疑願留宸斷貼黃今來姦黨既失確之勢專以純仁為恃賴純仁不去則姦人趨附日夜相與為謀别致生事恐終為朝廷之憂伏乞聖眀留神深慮早賜施行五月二十四日燾奏此又言臣竊聞右僕射范純仁左丞王存十六日留身論救蔡確之罪惡天下共棄聖造賜之更生已為天地厚恩至於竄逐無容議論純仁充位宰相不知愛君存備位執政不知體國但於姦邪知為死黨隂相交結顯為蔽援率先鼓譟邪説必欲移奪公議上賴聰明洞照欺罔竟從威斷慰快中外純仁等違道失職自合引避貪祿固位了無愧畏出入外廷取笑多士大臣如此國家何賴夫內無忠實外無亷隅何以陪輔上德儀型四方也伏望聖眀加察並賜黜罷以戒比周交結之風五月二十四日已時燾又奏此又言臣近論奏右僕射范純仁左丞王存營救蔡確違道失職並乞黜罷至今未蒙施行臣竊以君德之明在别邪正正人者直情徑行一致而易見也邪人者矯情飾詐百端而莫測也夫獨立而無朋敢為而不倚不徼委曲之福不冒僥幸之利以孝友為祥而愛其親以忠信為吉而敬其君行必端不敢以好惡亂天下之正言必信不敢以憎愛變天下之公此正人之大槩也眀君必察焉夫簡弱踈斥而附強傾側顧義畏縮而臨利果敢觸害而轉至改素節以求合附姦而抗至出死力以為黨不以孝友為祥而忘其親不以忠信為吉而後其君咈公義而肆已之愛憎違正道而徇已之好惡此邪人之大槩也明君必察焉臣竊考純仁與存之踐履求之正人焉無有其一也求之邪人焉數者略備矣大臣而躬邪行下比凶人忽君親大義而腹誹面謾豈可以當輔弼之任哉伏望聖慈明察特賜指揮早賜黜罷以厭伏中外人心五月二十八日燾奏此右正言劉安世言臣竊謂丞相者人君之腹心所與共承宗廟燮理隂陽典領百僚協和萬國之職莫或重焉惟是道德修明器識宏逺正身率下憂國如家任賢使能彰善疸惡同心協力庶幾有成茍非其人必敗國事范純仁慿藉門閥素無他長矯情飾詐善取名譽久在間局衆以為賢陛下擢於冗散之間不踰三嵗任以宰輔謂宜極盡智力上報天恩而位過其才名浮於實略無紹國之志惟有朋姦之心輕肆於行列之間猖狂於論議之際廣引私黨變亂舊章護短遂非附下罔上皆有實迹播在僉言以臣觀之猶未足論惟是近日營救蔡確之事最為公議之所不容輒具彈文仰祈睿斷乃者確在安陸作詩訕上悖逆不道天下共疾純仁備位宰相固宜以君親為念而顯助姦慝極力救解每對賓客語及確事則惻怛頻蹙憫其非辜論至處厚則攘臂切齒謂長告訐教導汝礪使之上疏及見不肯草制則與王存再三嗟賞以為天下乃有此人又聞進對之際屢有寬貸之請宰相如此朝廷何賴焉臣竊謂純仁自為樞密之日因司馬光久在病假遂以國用不足為説上惑聖聰申眀常平舊敕巧言附會却令州縣於存留一半錢斛之外依舊散青苖息錢天下之人莫不疑惑光聞其事力疾入見以死爭之又於上前親自稟奏云不知是何姦邪之人勸陛下為此事純仁汗顔畏縮不敢仰視尋得聖旨盡令寢罷光謂臣曰純仁自為執政言行反覆隂懷顧望止為全身之謀以為取人以名其弊至此以上皆光之語言臣不敢有一字增損陛下誠用此以觀純仁則其秉心不一事上不忠取恱大姦徼幸異日懷諼迷國亦已久矣誠不足以敦厚風俗宣眀教化永保國家伏望陛下考詳典憲早行罷黜使邪正辨别朝廷清眀天下幸甚韓瓘録劉安世語云范堯夫欲行七色錢稍復免役溫公方病自力而出簾前對言小人欲以乏財動朝廷稍復免役之法不知謂誰堯夫失色却立卒不敢出語後來堯夫之去蓋因安世章疏且及前事也據安世章疏則瓘所録蓋誤當從章疏安世又言臣近嘗劾奏范純仁秉心不一事上不忠營救蔡確徼幸異日乞行罷免未蒙施行臣聞自吳處厚繳進確詩後來純仁與王存互持異論不欲眀正典刑以至三省進對之際吕大防等已退惟二人者獨於簾前密為申理若純仁等所陳果是公論自當對衆顯言無可諱者惟其內蓄姦意旁畏同列是以輒敢留身隂進邪説雖聖眀在上斷之不疑而中外人情惡其姦妄詢考朝市不謀而同臣竊謂確之罪惡天下之所共疾使純仁等不知事理之重輕冒昧公議奮力救解則可以謂之愚矣知其不可救而救之則志在於姦矣用愚夫為執政固已不可况使姦人處腹心之地乎伏望聖慈為宗社之大計以臣前奏降付外廷罷純仁宰相之職免存丞轄之任使是非邪正不至淆亂天下幸甚貼黃稱臣聞言路亦有純仁親黨竊恐妄託義理以謂元惡既去餘可勿治此等議論臣願陛下切勿過聽昨司馬光既為宰相亦嘗逐姦惡之太甚者止為不能去其根本故使確輩敢至於此今純仁及存居輔弼之地隂懷二心若不罷免將甚於前日惟聖心先定去邪勿疑不勝惓惓之至又言臣近再具狀劾奏范純仁王存隂持兩端營救蔡確乞行罷免未蒙施行臣竊謂人主之於大臣義均一體雖議論取舍小或不同而要其大致必至於善使確平日操履衆以為賢偶有一眚不足以掩其大德如是而純仁等救之可也或謗起於茫昧難明之際不加考驗遽至深文如是而純仁等救之可也今確之姦邪罪惡天下所知怨謗君親情理切害事迹著眀按覆有實凡戴天履地者莫不共疾而同棄之陛下特示優容俾全首領已出天地父母再生之賜而純仁等冒昧公議猶為解救操心頗僻處事顛倒謂主於善其可信乎誠不足以謀王體而斷國論運樞極而重朝廷伏望聖慈考察僉言審詳事理以臣兩奏付之外廷誅其姦意並解機務使天下曉然識邪正之道實在此舉惟陛下斷之不疑天下幸甚又言臣近以三次劾奏范純仁玉存乞行罷免未蒙施行臣所以屢進瞽言上煩天聽者非敢固執偏見生事近名特以二聖臨御仰成輔弼惟是同心同德之人乃可以委政事今純仁等忘君親之大義畏姦豪於異日有附下罔上之意無體國徇公之心不乘此時收還印綬則朋姦之衆又將倚以復興是蔡確之害尚在朝廷此臣所以汲汲彈擊至於再三而不能已也臣聞去草者當絶其本養虎者自遺其患一失機會後將難圗伏望陛下特奮乾剛博考公議以臣纍奏付之外廷正純仁等不忠之罪亟令罷黜使履正奉公者有以堅其志背道妄行者不能長其惡天下幸甚右諫議大夫范祖禹言臣伏見諫官言宰相范純仁營救蔡確乞行罷免聞純仁已請避位宰相進退繫國大體臣之所見不敢不陳純仁為相一年日失人望異口同辭皆以為政事乖方除授失當公道不立私意多行臣近日上殿劄子二道所言邪正不分及修城開壕等事皆是議者指為純仁政事如特置權尚書除謝景溫尋以人言而罷改知鄆州復以尚書告賜之祖宗以來無此故事又韓宗古自曹州移知潞州無故加宗古館職亦致人言景溫宗古皆自不敢當純仁情涉私徇此為甚者陛下若以此責之固宜罷免其營救蔡確即不知純仁以何為説當確為相時純仁流落在外不聞受確私恩純仁之進本不由確此止是所見偏謬凡朝廷有大誅賞亦容大臣出所見論議難以責其盡同陛下本以人望用純仁今以不協人望退之不失朝廷公正之體亦足以風勵大臣使不敢不盡心於政事也以臣愚見竊謂以政事罷純仁公議為允右司諫吳安詩言蔡確譏訕君親罪在不赦免其死而竄之嶺表矣彭汝礪不草詞頭盛陶等隂持兩端又皆逐之矣姦邪滅迹朝廷肅清誠宗社無疆之福也數日來風聞范純仁當處厚繳進確詩之初及朝廷商量行遣之際純仁屢加營救又欲歸罪處厚致汝礪等承望風旨敢為異論又言王存亦嘗助純仁救蔡確今來純仁理當黜罷王存亦不可獨免編類章疏五月二十一日奏今附此又言范純仁王存營救蔡確若使前日純仁等之言少惑聖聰則蔡確之事變矣貼黃勘會臣往年監西京左藏庫范純仁為京西轉運使曽薦臣及為執政臣亦曽見屢稱奬臣然今來所以乞罷純仁者以公義責之不敢懷其私恩也編類章疏五月二十八日奏今附此己亥晦詔以諫官御史所劾范純仁王存章付門下省此據王巖叟所記御史劾純仁存章當考吕大防言內降臺諫官傅堯俞等彈奏宰臣范純仁左丞王存不合留身營救蔡確事宜使思省引罪自為去就輒已封留彈章更不轉示逐人此據編類章疏所載吕大防劄子今附見五月末
