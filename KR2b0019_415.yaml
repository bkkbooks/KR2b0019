body:
  text: 續資治通鑑長編巻四百十一宋李燾撰哲宗元祐三年五月丁巳朝奉郎考功員外郎歐陽棐為集賢校理權判登聞鼔院先是除棐著作郎實録院檢討官而言者争論其不當故有是命棐除佐著史討政目在五月二日右正言劉安世又言臣近嘗奏論歐陽棐朋黨邪佞不當塵玷太史伏䝉陛下特徇公議已令追寢縉紳傳誦莫不相慶聞近日復授集賢校理前後反覆臣竊疑之恭惟祖宗以來尤重館職之選盖將養育成就天下之才以備朝廷緩急不次之用惟是行義著顯學問髙明卓然有聞於時尚猶召試而命爾後或詔執政俾薦所知數十年間才四三舉何嘗輙以名器私假匪人如棐亡狀已具前奏既不可居著作之任豈復宜充館職之選不試而授尤非常典臣恐姦邪寖盛蠧害日深與其悔於已然不若止於未兆伏望聖慈念君子小人消長之漸繫朝廷治亂盛衰之機罷棐館職以慰正人之望又言近以歐陽棐既罷著作復除集賢校理不試而授尤非常典再具論奏乞行追寢今已累日未聞指揮按棐問學未優趨向淺近考功之政闇滯亡狀特以隂邪附㑹取悦權貴是以造為虛譽名過其實執政大臣姑欲成就棐而不論人材之如何公議之可否廢祖宗之典故而與臺諫立敵此乃衰世之弊風恐非聖朝之美事伏望陛下特垂省察檢㑹臣前奏事理罷棐館職以抑朋黨僥倖之弊又言近為歐陽棐除集賢校理不當臣已兩具論奏皆為執政沮抑莫肯依公施行須至再瀝誠懇上凟聖覽臣聞祖宗設館職之選所以收天下之賢才而長育成就以待不次之用自來必求文學行誼卓然有聞於時者然後以朝廷之㫖召試而命之仁祖中年始詔執政各舉所知英宗紹統亦遵故事未嘗不加較試遂授職名惟是臺省之官縉紳宿望或累持使節或移鎮大藩欲示優恩方令貼職今棐猥以庸才徒藉閥閲隂邪朋黨交結執政子弟因縁附㑹造為虛名遂至呂公著薦充史官孫覺舉以自代而執政止為二人稱奨共力主張不論人才之不堪公議之未厭茍徇權貴之意輕廢祖宗之法臣誠愚直私竊惜之况陛下平昔用人或有未允臺諫論列不憚追改豈有縁大臣之謬舉而不恤衆人之公言才罷著作復除校理竊弄朝廷之威福䝉蔽陛下之聰明臣若不言則為負恩伏望聖慈察臣志在狥公深嫉朋比特降中㫖罷棐館職振人主之威令破執政之私謀非特賤臣免廢職之譏亦使小人無倖進之漸貼黄稱歐陽棐自來與程頤畢仲游楊國寳孫朴交結執政吕公著范純仁子弟縉紳之間號為五鬼又與王存係正親家附㑹權勢不畏公議今來執政顧惜人情不肯行臣之言伏望聖慈只作中㫖罷棐館職所貴大臣見陛下耳目寖廣周知外議除授之際稍有畏戢又言近以歐陽棐除集賢校理不當已三具論奏未覩施行雖屢凟天聽難逃罪戾而不協公論終決是非輙復開陳敢冀採納按棐姦邪庸陋亡他行能資藉家聲依傍權要搆起虚譽名過其實昨在考功殊不事事升降予奪多任偏見士人之被枉凡有申訴棐必遷怒曲生詰難行移㑹問動經嵗月孤寒貧寠之人困於留滯徃徃破壊資考茍求出都嗟怨之聲播在羣聼方朝廷綜核名實宜在降黜遽聞遷陟俾長著作臺諫交攻僅得追寢曽不旋踵直除校理進退無義臣竊惑焉若謂棐之文行政事足以厭服士論耶則不當罷著作之命矣惟其人才亡状如言者所奏是以收還新恩用慰公議不識何名復授館職前日之罷是則今日之授非也今日之授是則前日之罷非也陛下以此觀之則是非可否之論决矣或者又謂大臣嘗有論薦重違其意遂貼職名審如此言尤為不可昔申屠剛謂王者承天順地典爵主刑不敢以天官私其宗不敢以天罰私其親人主猶不得以私之而况大臣乎伏望陛下謹守祖宗之典章慎重朝廷之名器稍收威福之柄杜塞僥倖之門檢㑹臣累奏事理罷棐館職示天下以至公之道不勝幸甚又言昨以歐陽棐除集賢校理不當臣已四具論奏未覩指揮施行非不知朝廷之視館職固為細務而所以不避煩凟天聽須至開陳者豈獨以棐之人才不堪盖所可深惜者國家政事之大體也臣竊嘗思之太史之任誠儒學之髙選陛下既用言者之奏罷棐著作不識何名直除校理以品秩言之雖在著作之下以恩數論之則過於著作逺矣今棐之寄禄官已係朝奉郎若帯館職則來嵗郊禮便得奏薦子弟是名為降等而實加厚也且以人言而奪其新命曽不旋踵而所授愈優於前日朝廷予奪取舎之體固當如是乎臣伏觀陛下即政以來未嘗不以至公為治如棐亡狀必無所私而臣反復論列至於四五區區之誠未䝉開納雖朝廷之㣲意莫可得聞而中外之公議均謂不可臣既有言責茍未斥逐終不敢冺黙以負陛下圖任之意伏望聖慈特降睿㫖檢㑹臣累奏事理罷棐館職以慰縉紳之望朝奉大夫集賢校理管勾鴻慶宫劉定知臨江軍曽肇制集云定自降充宫祠後已成資制詞云徃在先朝奉使失指黜置散地及此再期朝奉郎李察知淮陽軍此據曽肇制集制詞云察賦性傾邪急於聚斂以䘮去位適復周行而論議紛然指其宿負稍從簿責以厭輿情察先除知濟州政目在六月二十六日右正言劉安世言考之公議皆謂不可盖以察頃在京東嘗總漕計専務掊克希望進用及移陜西吳居厚實繼其事凡所規畫多察始謀洎聞居厚擢為待制數對賔佐矜其才能以為用我計䇿遂有成效彼䝉恩命已獨不賞扼腕憤怒形於辭色陛下即政之初以居厚刻剥太甚特行竄責察遂杜口不復論功究其本末乃隂險禍賊姦邪趨利縉紳之間鮮有倫比昨以憂制去官未即顯黜中外之人指為幸免今朝廷敦尚仁厚登進賢能茍容刻剥之徒尚叨民社之寄非所以明好惡於天下表勸沮於公朝伏望聖慈特留宸慮縱未能投於荒裔豈復可委以麾符宜徇僉言重行降黜庻使聚歛酷暴之吏有所戒懼於是改知淮陽軍詔贈太師富弼神道碑額許御篆從弼子紹廷請也詔新除著作郎黄庭堅依舊著作佐郎以御史趙挺之論其質性姦回操行邪穢罪惡尤大故有是命右正言劉安世言近聞朝廷除黄庭堅為著作郎繼有臣僚言其缺行尋䝉指揮已令追寢然臣聞御史趙挺之歴疏其惡以為先帝遏宻之初庭堅在德州外邑恣行滛穢無所顧憚竊謂挺之徳州守官耳目相接不應妄繆審如其言則閭巷之人有所不忍而庭堅為之自若虧損名教絶滅人理豈可尚居華貫汙辱縉紳伏望陛下以挺之所奏付外施行庶使是非明辨衆聽不惑又言臣竊謂庭堅所犯若果得實則名教之所不齒豈宜尚居清要汙辱縉紳若或無有而不加考質則庭堅虛䝉惡聲將遂沉廢是非交錯有害政體伏望聖慈特降睿㫖以臺諫官所言庭堅事状委逐路監司依公體量以聞庶使枉直昭晰中外厭服詔提舉教習馬軍所昨因教習在京馬軍置局許臣僚等子弟赴所習學武藝毎年呈試推恩後來罷教習在京馬軍止有臣僚等子弟在所人數不多兼習學武藝之人自依編敕春秋觧發其馬軍所子弟亦可依敕呈試罷提舉教習馬軍所已應法子弟關殿前司候將來冬季特依舊條揀試戊午太中大夫致仕鞏甲卒可削庚申詔改邕州懐化峒為州先是知峒零崇槩納土自順州廢即棄巢穴歸省地朝廷録其功授以使額而有是詔戸部言三司事務分𨽻六曹寺監昨雖将錢榖事收歸戸部縁止是出納今來除左右曹度支倉部見今所主事務應縁公事並隨事勘斷外他曹公事若皆承勘於理未便况今錢帛糧草除係本部諸案及部轄寺監庫務外别部所領已係支付之物如合推治自當送開封府從之辛酉降授四方館使嘉州團練使提舉崇福宫狄諮為永興軍路鈐轄皇城使果州防禦使帯御器械吕寘為鄜延路副總管新知荆南承議郎唐義問除集賢校理東上閤門使鄜延路副總管張守約領康州刺史充秦鳯路副總管文彦博言義問只以近下散官知荆南恐事體不重兼近有謝麟自知邠州移知潭州帯直秘閣葉均以祕書少監知荆南帯直龍圖閣乞加義問館閣職名所貴中外稱呼増重方面事體又言守約進身不茍年過七十精力甚强而官止横行使額乞察其人材履歴擢充正任故二人有是命朝議大夫權河北路轉運使范子竒權河東路轉運使朝請大夫權河東路轉運使馬黙知兖州黙傳云為河東路轉運使時議棄葭蘆吳堡二寨黙奏控扼險阻敵不可攻棄之不便朝廷從之二寨得不棄移知兖州此事當考詔太常太僕大理司農太府寺國子監置長貳餘寺監長貳並互置省軍器監丞太僕寺主簿各一員劉安世蘇轍先有言詔賜熈河蘭㑹路銀絹各五萬鄜延路絹八萬涇原路絹七萬環慶路絹五萬秦鳯路絹五萬並以防秋備軍賞也又賜陜西路轉運司銀絹共四十萬乗時收糴以廣蓄積銀青光禄大夫致仕章愈卒可削壬戌詔府界諸路封樁禁軍闕額錢帛後來創置過禁軍指揮並先據數除出候不及舊額之數方依條封樁仍著為令蘇轍五月一日轉對癸亥詔以治平臣僚所上互進方畧授逐路帥臣講求困賊之策選定持重將佐閲精鋭兵馬先募間諜深入探候要知賊衆聚落所在審無伏兵参驗符合宻為期約出其不意要在使賊莫測疲於奔命方為得計仍先具經畫措置事件及夏賊相抗如何防遏條析以聞治平臣僚所上互進方畧當考環慶路經畧使范純粹言竊詳治平年臣僚所上困賊方畧固為精盡施之於今亦無不可然兵馬數目以至将佐頭項遣應次第即與目今全然不同臣仰悉朝㫖宻作經營但不失今降朝㫖大意而已須諸路動息相聞首尾相照互相為力使西賊於逐路山界各有所畏分兵待敵不敢併兵一路則我計方行不至重困自餘亦不須合治平之意所有朝㫖内先令具經畫措置事件聞奏縁邉機務難以預定貴在臨時處决即先事無可預陳所有凖備西賊防庇邉民一節即不異見今備㓂之策三年六月十日純粹奏此今即附詔㫖下昭信軍節度使開府儀同三司贈太師崇國孝温王宗瑗卒詔特輟視朝三日車駕臨奠詣後苑舉哀成服濮安懿王第十三子初胡宗愈除尚書右丞諫議大夫王覿疏宗愈自為御史中丞論事建言多出私意與蘇軾孔文仲各以親舊相為比周力排不附己者而深結同於己者操心頗僻如此豈可以執政内批王覿論列不當落諫議大夫與外任差遣仍不得帶職其日戊午也十三日也覿奏當求全本増入覿有章疏乃獨無此當考翌日吕公著言臣與王覿舊不相識在前朝及陛下臨政之初並不曽舉薦但見覿自任言責以來凡所言事最為穏審今來若止為論列胡宗愈便行責降未必協衆情其内降指揮臣與吕大防范純仁等商量未敢行下伏乞陛下特與包容更加聖慮裁酌後二日公著與大防純仁再論於簾前太皇太后曰胡宗愈有何罪司空與司馬丞相皆親嘗薦之公著曰宗愈在先朝誠有直聲然自任中執法頗為浮議所惑所言事多不協衆望劉摯進説甚力太皇太后厲聲曰若有以門下侍郎為姦邪甘受之否摯頓首謝曰陛下審察毁譽毎如此天下幸甚然朝廷當顧大體胡宗愈進用自有公議必致陛下貶諫官而後進用恐宗愈亦非所願文彦博曰劉摯言是願賜采納太皇太后意猶未解是日公著又與文彦博及大防純仁等面論純仁退而上疏曰臣昨與吕公著等并今日與文彦博等兩次簾前奏陳乞寛王覿之罪盖欲假借臺諫使人人敢言其間即有不當亦須稍垂寛宥以彰朝廷容諫之美况陛下臨御以來未嘗嚴責諫臣一旦行之恐傷仁化又慮來者或多若一一竄逐寖失朝廷清浄之體其心止於如此更無他意側聞聖訓以為朋黨甚多宜早施行恐於卿等不便以臣愚見朝廷本無朋黨只是善惡邪正各以類分陛下既用善人則匪人皆憂難進遂以善人之相稱舉者皆指以為朋黨所以臣等不避違忤縷縷開陳罄竭愚誠莫回天意臣若面從順㫖則是茍容之臣何足以副陛下簡求何面目處羣臣之右又况彦博公著等皆是累朝舊人陛下留在左右已二三年輔翊皇猷未嘗有闕今日豈有雷同罔上庇䕶黨人盖其愛君之心與臣無異惟在陛下深加採納所有先降貶謫王覿文字臣未敢簽書更乞聖心熟慮臣自先朝言事不合遽斥處外幾二十年遭遇陛下一新庶政從諫任賢夷夏歡呼古今無比皆聖心所悉非愚臣獨敢妄言而一旦㧞臣於疎逺之中驟置於丞弼之位故臣夙宵盡瘁恐負聖知豈有容庇朋黨自損聲名玷辱家聲取笑千古盖是愛惜聖政思報大恩螻蟻之誠惓惓不已今若陛下决以臣言無取即乞謫臣補外彼指為朋黨者自明臣雖一身斥逺若遂决朝廷大疑則是猶有所補不辜簡㧞則臣死之日猶生之年矣又奏臣曲謝日已曽奏聞昔先臣與韓琦富弼䝉仁皇同時用為執政三人各舉所知引用忠良有匪人之不得進者遂搆造謗語指為朋黨先臣與韓琦富弼皆得補外所用之人類遭貶逐當時造謗之人皆欣快相賀曰且得一網打盡此事未逺衆人猶知亦可以為朝廷深戒因録進歐陽修朋黨論此據曽肇墓誌中書舎人曽肇言臣今月十八日吏房送到詞頭五月十三日奉内降指揮王覿言事不當與一外職合入差遣不得帯職十八日三省同奉聖㫖差知潤州者臣承乏近侍職在訓辭理有未安合具敷奏臣伏見陛下臨政以來開廣聰明大闢言路拂意逆耳詆訐狂妄常人之情所不能容者莫不虛心克已温辭降色以受之天下之人歌詠頌歎以為古之聖帝明王不過如此一二年來不惟朝廷政事人情以至四方萬里幽深隠伏之利病莫不畢聞於上者言路無壅故也是以在廷之臣人人勇於自効至不以出位為嫌而以不能盡言為恥振起天下敢言之氣始自今日故如覿者身任言責有所聞見不得不為陛下盡言而無隠也陛下未以其言為然猶當寛大含容未宜遽棄何者以言賞人猶有觀望畏縮而不敢進者以言罪人人將鉗口結舌望望然去矣其肯以身蹈禍而覬萬一之聽察哉覿之一身出入内外不足以為重輕而陛下言路之通塞人情之伸屈在此一舉此臣不得不為陛下慮也陛下寄腹心於大臣寄耳目於臺諫二者相須不可闕一執政大臣朝夕在人主左右據利勢執國柄人情之所難言者也導之使言猶或不聞其過今覿一言及之遂至逐去臣恐在廷之臣以覿為戒依違顧望莫肯正論異時執政大臣雖有罪惡陛下亦將不得聞矣此可為寒心者也陛下臨政以來臺諫章疏無所忌諱雖奏至數十未嘗罪之何獨至於覿一言之入遽不能容何示天下以不廣也覿以小官不一二年㧞擢至此今以言獲罪猶補便郡於覿何損臣所惜者今於聖政不為無累爾伏望陛下深念祖宗付託之重愛惜朝廷臺諫之體不以容納狂直為難而以壅塞言路為懼以覿所論質之公議茍其言可取固當行之如無足採亦願陛下容之度外使天下之人知朝廷不罪人言終始如一而執政大臣有所畏忌増益陛下虛心納諫之明是一舉而數美從之也其可忽哉臣備位侍從首尾三年常恨不能補報萬一今輙縁職事冒進狂瞽惟陛下留神省察幸甚所有制詞未敢修撰貼黄稱臣伏見豐稷昨任諫官所論者陛下骨肉間事猶且含容矜貸更獲美遷聞者皆服陛下仁慈寛厚有天地之量豈獨於覿而不能容伏望聖慈更加省察純仁又言臣昨日入劄子未敢簽書王覿文字因以文彦博吕公著累朝舊人其言乞加採納及論朋黨事繫善惡消長皆愚臣受恩之深罄瀝血誠用伸補報更無顧望攖觸之慮伏望聖慈特加詳覽文彦博吕公著年皆垂老屢乞退閒陛下特留平章軍國事盖以重徳老臣一心向國真可委信此聖慮之深髙出前古兼吕大防等皆陛下選㧞於衆各有公望之人今若商量一諫官差除有言不䝉垂聼則與陛下眷留擢任之意輕重不同臣所以更望聖衷審慮少回天意量加採納以成唐堯舍己從人之意不使大臣有不用之言則社稷幸甚臣前年初到闕時聞有徳音令臺諫官但言事太皇太后自主張臣愚不勝欣喜今見彦博已下諸大臣奏事未䝉聽納臣不勝憂懼庚午承議郎右諫議大夫王覿直龍圖閣知潤州尚書右丞胡宗愈上表乞罷政事除閒慢差遣詔答曰朕開奨言路通來下情雖許風聞猶當核實豈以無根之語輕揺輔政之臣朕方馭衆以寛退人以禮加之美職付以大邦朕既無負於聼言卿亦何嫌而避位祗服乃事毋自為疑蘇軾之詞也監察御史趙挺之奏王覿因言執政而罷朝論以覿任職皆為覿賀伏願追改責覿之命又言臣僚多言胡宗愈之失今朝廷獨責覿外論尤以為疑編類章疏五月二十五日并三十日事今附此監察御史楊康國奏一二年來陛下畧不優假言路去年逐張舜民今嵗又罷王覿皆縁論及執政而嵗嵗逐諫官御史伏望追寢罷覿之命編類章疏五月二十三日今附此皆不報劉摯記覿罷諫議大夫事云初胡宗愈為中丞屢擊侍御史杜純純有勁節但少通脫又昵諸韓始所以進由韓維屬吕公著而宗愈擊純無實惡純為大理丞以不能苛深得罪其事甚著宗愈乃言其刻及詆其隂賛維收例事又言在河北鬻酒又言純為韓氏雜幹如奴僕㑹簾中方惡韓氏此言皆入純以故罷而覿繼之純以二年七月辛未自南床除改右司覿與宗愈不咸有状未幾宗愈為右丞言者交攻之而覿最力其一章先陳維之善謂宗愈輙嘗弹之又叙杜純之善而宗愈擊之皆非是覿亦韓氏所引已蹈嫌疑矣嘗面宣曰宗愈不曽言韓維而覿猶論不已以宗愈為姦邪於是上怒宣示文彦博以下使重譴覿二三公極救之摯亦進曰覿性和而正久在言路有裨補今為諫大夫十數日無罪而黜恐天下不知其故諭曰覿無故挾私詆近臣豈曰無罪侍郎只是不曽被人言及若言作姦邪還肯甘受否摯曰臣有罪惡安得免人言臣非為覿但惜朝廷事體宗愈之進自有公議不須令朝廷逐一諫大夫而用也覿若自出恐宗愈亦非所安耳文彦博曰劉摯之言極是願采之覿竟去免重謫耳劉摯記王覿事用摯日記修入中散大夫許遵卒可削舊録遵傳云登州有婦人何云謀殺違律夫而自承者遵按法因犯殺傷而自首者得免所因之罪仍科故殺傷法而勑有因疑被執招承減等之制即以按状聞于朝其意以謀為殺之因所因得首合從原減今若塞其首原之路則有司一切按而殺之非是王安石是其説而難者以審謀伺便致人於死則相仇者不禁故謀殺而傷其罪必絞遵以法寺四方取則之地故廷尉為天下平今謀殺傷而首一切從死甚非好生之義因引律質正凡十條莫之能難時論與之尋判大理寺面賜三品服遵陛對懇辭詔中使押下非常制也大理斷刑有情不麗於法者雖小必爭其言参以經律即例有繆者數奏改之新録辨曰許遵事實已見神宗實録熙寧六年神宗嘗患沙門島罪人多因宣諭王安石按問欲舉寛法故致多如此今以司馬光奏議更加刪修許遵以此月二十四日卒嫌與王覿事相亂今去其日附覿責後此段當移入何云自首之時案新録辨曰已下詞意未明疑有脫誤辛未詔監司秩滿資深無過人除知州者與理監司資敘皇城使康州刺史訾虎為秦鳯路鈐轄六宅使王慜為鄜延路鈐轄樞宻院言夏賊未平諸路差移兵將經畫攻討等事深慮都副總管或不能同共商議凡兵馬公事及邉防機事並須與副總管同議亦不得别作一將與鈐轄都監等比所貴事體異於偏裨緩急倚以出兵可以節制諸將仍務協和各副朝廷任使之意詔劄與逐路都副總管癸酉詔罷元豐八年十一月二十三日奏讞大辟不當及用例破條法舊録云先是司馬光執政始立法應諸路州軍奏到大辟罪人稱刑名疑慮及情理可憫者令大理寺並依法定斷并坐疑慮可憫條送刑部㸔詳如刑名有疑情實可憫並具疑慮可憫因依申奏取㫖若看詳得刑名無疑慮及可憫者即具抄奏下本處依法施行不得将舊例貸配破條委三省㸃檢如有不當及用例破條奏乞取勘施行自是州郡不復敢以疑獄為讞嵗斷大辟加多天下以為非也故有是詔新録辨曰司馬光立奏讞之法所以正朝廷之綱紀若患嵗斷大辟之多遂欲以奏讞出之使減少則天下犯大辟者豈有悉是疑獄之理今刪去蕪辭樞宻院言諸路鈐轄都監應管轄本路不係將兵屯駐駐泊就糧禁軍應駐劄處歳首揀選及排連轉補公事並與知州等共議兼提舉本處所管諸軍教閲若與鈐轄司同在一州者應行遣軍馬公事並簽書同行不同行者亦繫銜書在某處路分兵官兼將者依此如因廵教揀選兵將所至有管轄不係將兵亦令廵按教閲㸃檢差遣及毎年春秋許安撫鈐轄司相度有不係將兵兩指揮以上無兼將兵官廵教州軍輪定三兩處牒差不兼將路分兵官一員至本處廵按教閲及檢㸃差遣仍與隨處長吏同共商量措置務勞逸均平給遞馬二匹逓舖兵士五人本路遇有盗賊警劫已差將官捉殺若賊黨稍盛力不能制許安撫鈐轄司相度賊勢更差不兼本路路分兵官帶領兵甲與在彼將兵官都同廵檢使臣㑹合捉殺即水火危急亦依此其路分兵官舊有專條管勾甲兵賊盗公事之類並依舊法從之新本削去朝奉大夫鴻臚少卿張修為福建路轉運副使尋改知宣州改宣州在八月十六日并入此甲戌禮部状凖都省送下翰林學士蘇軾等劄子奏近為將來科塲既復詩賦乞更不分經取人已奉聖㫖依奏今來竊見禮部新立條貫将來科塲如差試官三員者以二員經義一員詩賦兩員者各差二員臣等欲乞今後差試官不拘曽應詩賦經義舉者専務選擇有詞學人充其禮部近日新立條貫乞不施行所有蘇軾舉奏别無批降指揮已行附案尚書省看詳上條内差三員處經義不必須差二員今欲科塲所差試官三員處参差經義詞賦人更不指定員數餘依元降指揮五月二十九日奉聖㫖依仍先次施行二月十七日趙挺之奏荆湖北路轉運使李茂直言收溪管下銅鼓峒歸明殿直楊晟嚮昨來收溪賊徒經由晟嚮團峒前來射傷多星堡南平鎮人戸楊晟郎等晟嚮隂與賊人為助因胡田差人勾引收下見覊管在軍詔李茂直胡田不得下司宻切審量楊晟嚮如止是放縱他族經由作過别無助賊顯狀即諭令改過自効如能捕斬首惡當優加賞擢如委是罪惡不可容赦須合拘留處置亦須相度令將來不至驚阻蠻賊歸首之情右正言劉安世言臣前月中嘗具奏陳胡宗愈除尚書右丞不協公議伏乞更加考察特行罷免今已踰月未覩施行臣雖甚愚豈不知違拂聖意彈擊大臣力薄言輕難免罪戾然陛下不以臣不肖使備言路今識者喧然以為姦邪而臣緘黙依違不告陛下雖茍免一時忤㫖之誅而天下将責臣以失職之罪臣亦何敢為自安之計而負陛下圖任之意哉臣聞自昔臺諫之論嘗以天下公議為主因公議之所是而後與之因公議之所非而後擊之人君所以垂衣髙拱不出戸庭而周知天下之情可否予奪必合義理以辨邪正以决疑似如權衡之不可欺以重輕規矩之不可誣以方圓者用此道也臣考之輿論皆謂宗愈才識淺近趨向反覆貪得患失背公狥私不敢悉數其詳以凟天聽猶可粗陳其略冀寤宸衷一言渉欺不敢逃死按宗愈起於貴閥偶中髙科數年之間漸階顯列昔事先帝頗有可稱及陛下即政之初首加進用再朞之内遂至中司未聞深慮逺圖報朝廷之厚徳惟以巧言邪説為進身之私謀如永興軍路提刑馮如晦欲令舊不充役貧下之人出錢以助合役之上戸不量緩急閑劇色役例雇募游手充代其議論乖繆最害役法如聞蘇轍頗主其言亟為公移欲頒諸路户部尚書李常曽不講究遽令施行而員外郎劉昱乃能力辨是非不為押檢議既難合事亦中輟縉紳傳播莫不嘉昱能守其職而宗愈因上雇募衙前之論遂詆劉昱以為户部郎官有近來参詳立法之人䕶短遂非不肯公心舎己從長以救鄉戸之患意在附㑹不顧義理其罪一也按宗愈實娶丁氏今禮部員外郎丁騭乃其妻族宗愈既備從官未見引天下之賢而首薦私親乞不次擢用古之人固有内舉者矣然必誠告其君曰臣之子也今宗愈特薦丁騭而不以實奏幸朝廷之不察以盗寵禄而歸惠於已其罪二也陛下嗣位太皇太后同攬庻政而蘇軾試館職䇿題乃引王莽依附元后取漢室之事以為問目士大夫皆謂非所宜言且臺諫官數嘗論奏而宗愈不惟無所彈劾反又勸止同列不使上疏其罪三也李慎由乃文彦博之孫壻方營在京差遣而宗愈遽薦為本臺主簿偶以礙格遂聞報罷茍狥權貴不恤人言其罪四也昔熈寧中嘗知諫院神宗皇帝深照其姦乃手詔中書曰宗愈自領言職未嘗存心朝廷治道凡進對論事必潜伏姦意舍其事情傍為邪説以私託公坐是落職與通判差遣御批具在天下共知臣竊謂熈寧政事與今雖異而宗愈觀望迎合之迹固同陛下用此數者平心正慮而察其本末則姦回罔上狥私貪利之實灼然可見誠不足以當大臣之任重朝廷之勢伏望聖慈察臣惓惓之忠為天下計萬幾之暇詳覽臣言如所論皆有按據不至謬妄即乞特出聖斷付外施行又言胡宗愈近除尚書右丞不協公議臣於延和殿賜對之日已嘗面奏繼又兩具姦慝條列以聞臣之所言莫非實状累凟天聼渉歴兩月竊惟宗愈之罪惡固不能逃於聖鑒而陛下體貌大臣務全進退之禮是以特降答詔俾安厥位宗愈承命遽出無復遜避縉紳傳播莫不駭笑臣伏聞自昔執政之臣或為言者所擊率皆歸第闔門待罪雖朝廷遣使宣召徃徃遵奉君命暫至官省不敢治事亟復家居原其處心固非畏縮實以輔弼之任與國同體舉措出處天下具瞻茍有過尤掛于清議自當上還印綬退避賢路豈俟斥逐方為去計盖待之之禮既厚則責之之意愈深此所以君臣之間禮體兩得而廉厚之風足以矯厲天下者也賈誼有言曰上設亷恥禮義以遇其臣而臣不以節行報其上者則非人類也臣竊觀陛下之所以待宗愈可謂盡㢘恥禮義之道矣按宗愈之所以報陛下則非止不以節行而又貪墨急進違棄禮義明知臺諫皆有彈劾而尚起視事一如平日近世以來公卿大臣操行汙下毁滅亷恥未有若此之甚也孔子曰鄙夫可與事君也與哉其未得之也患得之既得之患失之茍患失之無所不至矣陛下察宗愈之行誼如此茍充其無恥之心則姦邪趨利何所不為尚安足以輔佐人主参斷國論委之以綱轄寘之於廟堂乎又聞御史中丞孫覺乃宗愈之故人見其改節今已彈奏監察御史趙挺之楊康國皆宗愈所薦二人者雖顧惜小節未見明言其罪風聞各有章疏申救王覿臣竊謂是非之理固不兩立茍知此之為直則曲之在彼不辨而自見今上則朝廷士大夫之論莫不鄙惡宗愈下至閭閻一介之賤茍或詢之無有心恱而誠服者盖天下之民别而聼之則愚合而聼之則神以此卜之可知公議之不與矣伏望陛下考合僉言明辨邪正罷免宗愈斷之不疑實天下之幸
