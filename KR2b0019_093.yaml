body:
  text: 續資治通鑑長編卷八十九宋李燾撰真宗天禧元年春正月辛丑朔奉天書升太初殿行薦獻之禮奉上册寶衮服又詣二聖殿奉上絳紗袍奉幣進酒諸路分設羅天大醮先建道場前七日致齋禁屠宰刑罰止凶穢坊市三日不得飲酒食肉軍校牙將道釋耆夀悉集寺觀軍營民舍就門庭設香燭望拜官吏服非齊斬悉預餘不得慘服諸路令轉運使察之是日上齋于景靈宮壬寅奉上册寶仙衣于天興殿禮畢車駕還內羣臣入賀于崇德殿丙午詔以是月十五日行宣讀天書之禮己酉命攝太尉向敏中奉上太廟六室加諡册寶庚戌親饗六室是日上齋于南郊之青城辛亥奉天書合祭天地以太祖太宗並配還御正陽門大赦天下常赦所不原者咸除之賞賜如東封例免災傷州軍見欠田租及和糴減荆湖南路鹽價蠲天下逋欠雖盜用經三十年者亦蠲之令有司速定茶鹽條貫惟務便民勿拘嵗課合入令録人歷任無過者吏部銓考課以聞江淮上供米特權罷今年春運一次先是著作郎集賢校理張師德判三司都理欠憑由司祥符八年九月事建言有逋負官物而被繫本非侵盜若惸獨貧病無以自償願因慮囚蠲免之上納其言於是遍及諸路群臣上尊號册寶于天安殿壬子上與宰相及諸司三品宗室刺史知雜御史以上駙馬都尉致齋以王欽若為宣讀天書禮儀使設玉皇像於天安殿天書位於東聖祖位於西建道場乙卯三鼓四籌上於殿上西向立羣臣朝服升殿分侍儀衛使奉天書册玉皇前攝中書令任中正跪稱嗣天子臣某謹與宰相等宣讀天書講求聖意虔思睿訓撫育生民王旦跪取左承天門天書置案上攝殿中監張景宗張繼能捧案攝司徒王曽攝司空張知白跪展攝太尉向敏中宣讀每句畢即沈思其指云此句天命訓皇帝某事或云奉天或云愛民攝中書令王欽若執筆抄録宣讀畢攝侍中張是跪奏嗣天子臣某敢不虔遵天命儀衛使跪納天書于匣中又取功德閣泰山天書宣讀王欽若進所録天書意上跪受登歌酌獻奉天書於輦天書意於輿還內遂謁玉清昭應宫上作欽承寶訓述示羣臣丙辰謁景靈宫遂幸會靈觀上作欽承寶訓述實録在二月甲戌今從本紀即見于此丁巳謁啓聖院太宗神御戊午謁普安院元德皇太后聖容壬戌詔以四月一日為天禎節其制度悉如天貺云功德閣天書至是始布告天下不知何也先是內殿承制魏化基言汴水悍激多因橋柱壞舟遂獻無腳橋式編木為之釘貫其中詔化基與八作司營造至是三司度所費功踰三倍乃詔罷之癸亥詔重上舒州靈仙觀聖祖衮服甲子令京東西河北陜西淮南江浙災傷州軍出𣙜務酒糟濟貧民丙寅命宰相王旦為兖州太極觀奉上册寶使尚書右丞趙安仁副之知建昌王耿上書言時政要務凡七事一曰省災異二曰廣言路三曰明享祀四曰正服用五曰察黨與六曰謹修養七曰嚴邉備上覽而嘉之丁卯幸太一宫遂幸奉先禪院謁聖祖昭憲皇后真容奠秦國成聖繼明夫人墳戊辰罷陜西采盧甘石免內殿承制帶御器械符承諒削一任承諒昭夀子嘉興縣主壻主楚王元佐女也先是求外任遂詔落職為黃州都監既復因主入奏請留京師上怒其反復故責之夔州路轉運使臧奎言所部榖貴詔賑之己巳給事中孫僅卒上曰僅篤於儒學性端慤中立無競深可惜也命遷其子官有司言冬至祀圜丘舊命獻官十四員伏思神位甚多升降頻煩未盡恭恪望於前數外量增七員雩祀大饗並請增一貟夏至方丘蠟祭百神並增二貟奏可二月庚午朔詔災傷州軍所糶常平倉榖止收元糴價其省倉斗不得過百錢辛未遣使臣二十九人分往諸路料簡廂軍赴闕三司假內藏庫錢五十萬貫壬申上御正陽門觀酺自是凡五日甲戍給左右巡使常從三人臺直官二人主簿一人從臺司之請也上曰唐制臺省從人頗多蓋差役編民免其課調今悉仰給官司從簡法也曹瑋言陜商人入中糧草交引愈賤總虛實錢百千鬻之才得十二千請於永興鳯翔河中府官出錢市之奏可本志云鬻於市才八九千今從實録曹瑋言會要在五日甲戌既而詳定茶鹽司又言交鈔總虛實錢五千者向來官給十三千至十九千市之今鬻於市止獲八九千恐豪商乘其賤價不於官場入中復虞西鄙軍食闕乏請官自收市以九千為凖從之實録在二月癸巳今移見此曹瑋於去年十一月已改授秦州部署命李及知秦州而實録於此又云知秦州曹瑋蓋瑋知秦州日所言也交引愈賤蓋所給茶多不精商人罕有饒益故也此據本志亳州言修天淨宫畢初宿州臨渙縣有天淨宫言李母感星之所也上將朝謁太清宫丁謂繪圖以聞遣內侍詣宫設醮遂詔重修及是畢工初割臨渙𨽻亳州或言其輸稅不便於是止取臨渙之大李一鄉以附亳而宿人便之言其不便據實録會要乃吏部郎中李及所奏止割一鄉據李迪附傳則迪知亳州日所請按及時已在秦州迪時又在翰林今皆削其名不著乙亥三司言河北昨買絹三十萬匹本路以蝗旱減其三之一今請令京東路買十萬匹上曰京東災傷甚於河北安可重擾吾民乎亟罷之丁丑詔别置諫官御史各六員增其月俸不兼他職每月須一員奏事或有急務聽非時入對及三年則絀其不勝任者先是上謂宰相曰朕以去秋螟蝗因內自省天下至廣豈民政有闕耶比聞外廷浮議謂朝廷鮮納諫諍殊不知羣臣言事朕每虛懷聽受茍有可採隨即施行蓋中外之人猶未深悉爾且今朝士中固多才識近覽賦頌之作尤覺文風丕變直言讜論豈無其人當下詔列置臺省官專主諫奏然所選尤須謹厚端雅識大體者至於比周浮薄朕不取焉王旦等曰陛下聖政日懋多士如林尚復孜孜詢求如恐不及必有竒才上副推擇吏部銓言合入令録選人願折資入司理參軍者自今望與録事俸料止於五千從之戊寅內外官並加恩司徒兼門下侍郎平章事王旦加太保中書侍郎兼兵部尚書平章事向敏中加吏部尚書楚王元佐領雍州牧相王元偓加尚書令兼中書令為成德鎮寧等軍節度使進封徐王彭王元儼加太保為鎮海天平節度使夀春郡王受益兼中書令樞密使同平章事王欽若加右僕射定難節度使趙德明加太傅三公併除雙員自旦及元儼始州牧自元佐始上作會靈觀銘元符論頌思政論仍出正説十卷春秋要言三卷清景殿書事詩百篇召輔臣至龍圖閣示之河東提點刑獄司言晉絳蝗旱物價騰踊百姓流移望閣去秋殘稅詔可上曰前轉運使言並無災傷何也冝按視以稱朕軫恤之意庚辰補新羅人洪橘鮮為應天府都知兵馬使賜衣服緡錢橘鮮仕本國為承旨國王遣其詐遁入契丹偵機事以歸朝廷故也辛巳上作三惑論三惑歌并注仍繢畫刻板摹本以賜輔臣以東染院使平州刺史曹克明知桂州兼冝融等州都巡檢使殿直閣門祗候馬玉為冝融等州巡檢都監並兼管勾溪洞事以虎翼雄武二指揮𨽻之如蠻冦驚擾即益以戌兵及新募忠敢軍給使冦平如故賜克明等洎內侍王文慶楊守珍器帛賞其平撫水之功也初克明與玉分路入討玉所向力戰屢敗蠻軍是時朝廷意在招撫數詔諭克明而克明亦憚深入屢移文止玉玉至如門團為蠻所扼不得進克明遷延顧望月餘乃至撫水州與蒙承貴等約盟而還然其後撫水蠻亦屢入冦論者謂玉以兵威震蠻中蠻人畏之至號馬大王為克明所制不得前終貽邉患人多歸咎克明此據克明正傳所載馬玉未詳何許人玉已見去年九月丁巳發常平倉粟置場十四出糶以濟貧民京市物貴故也令三宫觀差減醮紙念和市輦送之勞也壬午詔京朝官改秩至今年正月十一日郊禮及三歲不限中外守職但非犯入已贓令審官院考課以聞當議遷陟本紀但云詔京朝官改秩及三年者不限內外令審官院考課以聞與去年九月戊辰詔不甚異今從本志明著之既而審官院請非時衝替及因罪譴監當未滿一任及在任降差遣人其見任官雖及三年或經考課不改官者更不勘會詔應非時衝替降差遣人見任官及年限而未考課或考課而不遷其後又及三年非贓濫者悉許考較以聞上謂宰相曰京朝官有曠弛不治衆所共知而無顯過者考課之際苐以久次遷擢此非沮勸之道也嘗記朝士有趙嚴者在河朔以罪降差遣去年審官引對例亦改官近聞嗜酒廢職若此之類尤冝志之此據寶訓審官院所請實録在三月壬子今并書之先是諸王子初授官即為諸衛將軍餘以父官及族屬親疏差等詔宗正卿趙安仁參議定制安仁請以宣祖太祖孫初蔭授諸衛將軍曽孫授右侍禁元孫授右班殿直內父爵髙聽從髙蔭其事緣特旨者不以為例又詔中書樞密院詳定行之癸未以新除工部侍郎參知政事張知白為金紫光祿大夫依前給事中加功臣勳邑餘如故先是知白以郊恩進秩再表固讓上不許復奉章懇請入對自陳者數上敦諭終不能奪給事中參知政事王曽曰臣與知白並新蒙擢用今又增秩實不遑安望並寢恩命上曰知白懇讓無他意但以卿為諫議大夫班在上已為給事中在下固讓之欲品秩有敘爾且近臣著位皆以先後為次茍堅確如此朕亦無吝曽又曰知白才識素優况先朝登名比臣實為宿舊願升知白班在臣上則兩得其冝上不許乃從知白所請而優加名數焉知白傳云知白心不能平故力辭所遷官今但從實録且載上語著位自有定制知白何不平之有恐史官或加潤飾耳宋敏求春明退朝録云二府舊以官相壓李文正公自文明殿學士工部侍郎為參知政事而宋惠安公自左諌議大夫參知政事遷刑部尚書居其上在祥符末王沂公與張文節公同參知政事王轉給事中張轉工部侍郎而班沂公下意頗不恱乃復還二卿之命上以舊官優加階邑自後第以先後入為次序史官潤飾蓋以敏求所録也今不取丙戌上齋於長春殿召宰相至齋室謂曰昨遣中使至陜西始聞去秋蟲螟有蟄於山石間者且慮及春而蘇復傷禾稼冝令州縣速加焚捕丁亥設元天大聖后版位於文德殿上親酌獻拜授册寶于王旦授仙衣于趙安仁旦等跪受奉以升輅具鹵簿儀衛所過禁屠宰二日官吏迎拜至兖州遣官三十員袴褶前導奉册日上不視朝庚寅進封交趾郡王李公藴為南平王曹瑋言總噶爾族馬巴咱爾等領衆設寨於雅爾烏谷即選募神武軍二百人夜破其寨獲生口孳畜甚衆辛卯召太子中允直龍圖閣馮元講易于宣和門之北閣待制查道李虛已李行簡預焉自是聽政之暇率以為常因數訪大臣能否而行簡無所怨昵必盡稱道其長人推其長者癸巳上謂宰臣曰朕以去歲蝗旱秋稼不稔夙夜警懼未嘗暫忘今已中春時雨未降齋心請禱誠感莫達實慮政令有爽天意因思茶鹽條禁傷於峻刻冝有以革之向敏中曰天時災沴抑有常數今陛下勞謙克已孜孜旰昃茍邦政人事無所闕失則天災流行亦無纍於聖德願稍寬憂軫上曰茶法行之已久儻或難於遽改但削其尤不便民而傷於厚斂者可也婺州民黃衮伐登聞鼓訟州民袁象家藏禁書課視星緯妖妄惑衆詔殿中侍御史王竒侍禁閣門祗候李仲乘驛鞫治象欵承與州民童拱進士吳昌言私課星歷訛言切害又以術授徐贊仲嚴録事張亶司理曹允恭嘗令課命詔象拱昌言處死贊嚴流海島亶允恭除名配𨽻恩梧州以衮補三班奉職嘗有日者上書言宫禁事坐誅籍其家得朝士所以往還占問吉凶簡尺上怒欲盡付御史按罪王旦具請以歸翌日白上此人之常情且語不及朝廷不足究治因自取舊所占問者進曰臣幼賤時不免為此必以為罪願并臣下獄上曰此事己發何可免旦曰臣為宰相執國法豈可自為之幸於不發而以罪他人上意解旦至中書悉焚所得書既而大臣有欲因是以擠已不快者力請究治上令就旦取書旦曰臣已焚之由是獲免者衆此事據遺事録及碑墓附見甲午曹瑋言永興寨大馬家族軍主阿錫達等捕得總噶爾蕃部卓薩沁格請授以刺史從之據會要此年六月阿錫達初授軍主與此差互又不知今授何州刺史當考乙未太極觀奉上册寶使王旦言緣路州縣調夫治道臣以方春農事初起悉已罷遣丙申曹瑋言總噶爾族首領幹尊治兵於潤努川將謀冦掠臣密遣蕃部許以恩賞令散其衆而殺幹尊近聞幹尊被創甚亟衆亦潰亂欲俟傳首至州奬以朝命上曰使之殺人又加爵賞非招懷之意也俟别立功效則奬之丁酉新除山南東道節度使冦凖言父名湘與州名音同望且守舊鎮宰相曰樞密使王繼英父名忠而功臣有推忠之號詔旨不避况湘襄嫌名也成命已行不可追改乃詔諭凖焉初加上祖宗諡册刑部侍郎參知政事陳彭年侍上朝天書畢將詣太廟退詣中書閣中方如厠風眩仆地肩輿還家遣中使挾醫診療旦夕存問尋進位兵部侍郎表求罷俸詔答不許己亥卒上聞之即幸其第涕泗良久又覩其所居陋敝歎惜數四贈右僕射諡文僖録其子孫甥姪彭年性敏給強記尤好儀制沿革刑名之學平居手不釋卷屬詞頃刻而就未嘗抒思慕唐四子為文體制繁靡上多令檢討典故自大中祥符後禮典交舉彭年無不參預或别殿訪對或中使手札臨問彭年從宜應答無所凝滯皆合上意凡典章文法之事每密有詢訪自升內閣即以翰墨為已任不欲領他務然李宗諤楊億皆在朝及宗諤卒億病退則彭年專文翰之任矣事務益繁愈復勤職以固恩寵手披簡䇿口對賔友胥吏白事滿前或密答詔問曉夕若是形神皆耗勞心既久舉止多失措至有顛倒冠服手撮果饌雖暑汗沾體不暇浣濯家人左右有不記其名者書字甚急日可萬餘人不能曉惟起居院吏趙亨識之上亦知其姓名後特補三班前後賜御歌詩凡六篇其恩遇如此性卑儉每得俸賜多市墳籍雖處貴顯無改平素及卒上追悼其妻每入謁多獲賜賚嘗出彭年畫像示之又嘗語王欽若曰彭年善人何意遽此淪喪至於兼才博學今罕其比自在左右服勞夙夜憂職太深未嘗休憩朕每諭其遊息然賦性勤謹行之彌篤不幸而隕得非命歟然彭年素姦諂時號九尾野狐在翰林日嘗詣中書謁宰相王旦辭不見翌日復至自言有當啓白旦諭令見向敏中他日敏中命吏取彭年所留文字示旦旦瞑目索紙封之敏中曰何不一覽旦曰不過興建符瑞圖進取耳始彭年仕未達求為大理寺詳斷官張齊賢時實當國一見輒不可人問其故齊賢曰此人在朝必亂國政或疑齊賢過甚後乃服其知人齊賢云云據王皡百一篇附見三月辛丑上以畿甸菽麥苗示輔臣曰今根幹雖茂然旬浹不雨則失所矣加以播種秋稼正在此時冝遣官遍禱天下廟社名山大川庶獲靈應中書言舊制四海不祈上曰百谷之長潤澤及物安可闕禮特命祭之環州路承受王從德言北界蕃賊數千騎來剽熟戶邉兵擊走之巡檢忠佐周興為賊所害望益戌兵向敏中曰戎人互相剽掠蓋其常也但巡檢使臣率無逺略好戰輕敵為國生事望令速即抽退庶靖封鄙上深然之入內髙班王懷正言真州銅山去年蝗蟄今春稍有飛者兼生蝻蟲命本州設祭焚捕壬寅上已罷宴憫雨也梓州路承受臧滬言戎瀘資榮州冨順監都巡檢使公署在戎州去淯井監近踰百里夷冦驚擾則應援不及望徙置江安縣從之癸卯詔如聞災傷逐熟之民所經關渡多邀止之冝令開封府諸路轉運司曉諭勿使復然甲辰京東提點刑獄閣門祗候常希古言去嵗夏蝗秋旱民廪空乏望朝廷責轉運使知州通判令佐等勸課耕桑所冀野無曠土戶有餘糧凡奏舉親民之官悉令條析勸農之績以殿最黜陟之上曰朝廷詔令非不備也但州縣未遵守耳乙巳大雨丁未以給事中權御史中丞凌䇿為工部侍郎知宣州策疾甚再表求任本郡特許之尋有詔增公用錢嵗三十萬亦從其請也屯田郎中梁楚知興州代還上章自薦上頗記其名命楚判戶部勾院楚先見咸平三年二月詔自今遊峩眉山不得停止川峽時有踰年不還因而為盜故條約焉衛州言民飢命發倉粟萬石貸之王旦言兖州自春亢旱行禮之夕降雨及尺庚戌陜西轉運使段惟幾言所部嵗給諸軍衣絹二百萬上供詔令所在别庫貯之殿中侍御史張廓言去秋蝗螟今春亢旱望選朝臣分往諸路轉運使提點刑獄官體量存恤無使失所癸丑詔京城十四場糶米加至百石和州言蝗生卵狀如稻粒差細乙卯以甘州輝和爾罕王伊嚕格勒圭呼為懷寧順化罕王賜襲衣金帶器幣鞍勒馬丙辰詔道士童行不由課試而披戴者自今五年內不得離宫觀特賜紫衣者三年內不得妄託假故出外求省親者計程給假從知衛真縣張中孚之請也丁巳兩浙提點刑獄合肥鍾離瑾言衢潤二州闕食官設糜粥民競赴之有妨農事請下轉運司二萬石賑給家不得過一斛從之轉運使張寶亦言所部民飢州設糜粥外邑地逺慮廢耕作已令就給米人日三合頗濟窮乏上曰前轉運司言蝗不為災皆妄也戊午以樞密使王欽若為會靈觀使會靈初置使命參知政事兼領於是王曽次為之欽若方挾符瑞固恩寵意得此曽因懇辭焉上頗不懌謂曽曰大臣冝傅會國事何遽自異耶曽頓首謝曰君從諫謂明臣盡忠謂義陛下不知臣駑病使待罪政府臣知義而已不知異也葉清臣王曽言行録曽緣此罷政及中謝日具述欽若欲自領使上意大悟於是欽若出知餘杭欽若出知餘杭蓋不因此此誤也今不取庚申免潮州逋鹽三百七十三萬二十斤辛酉以懷衛流民至京令三司作粥糜濟之江南提點刑獄太常博士范應辰上言伏覩辛亥制書常赦不原者咸除之臣謹按吕刑云兩造具備師聽五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正於五過由是赦宥之文可得而詳矣故曰五刑之疑有赦五罰之疑有赦臣今看詳所部州軍正月中旬已後所申犯由過誤而被宥者雖多切害而蒙釋者亦衆蓋以姦凶之輩密料赦期百計罔有不為萬途得以殘酷或發其夙憾恣彼忿心怯弱者因此受辜強梁者由是得便或舉家而隕命或罄室而掠財或持刀殺人肝腦塗地或縱火焚舍藴蓄蕩空有紏合輕生之徒恣為強剽之盜公行殘害以奪資儲巡警之官上逼下逐或設謀而緝捕或冒險以鬭敵科校耆伍書罰令尉方諧敗獲合正典刑逢此霈恩亦除其罪悉又配為卒伍皆給衣糧今力耕之夫遍飢原野而此輩季支以服月賜以粟又何異賞人為盜者耶與夫疑則赦之諒有殊矣望自今應有知赦在近而故為罪戾若赦後彰顯情理切害者死罪以下遞減一等斷之有赦前殺人剽財赦後雖不復為若因事捕獲並請決配逺惡州軍其有諸州曽係殺人放火劫掠財貨已依赦配本城者望止令本處重役如更犯逃亡飲博等罪並依禁軍例科斷其已該赦免重罪而情理切害者令逐處長吏取索赦到日所犯罪人內元犯謀殺鬭殺之類籍其姓名再瀆憲綱不以罪名大小並收禁奏裁其州縣官吏昨因差檢災傷侮刑受賂或案已結正及未發覺者望凖赦原免其罪而除削其官以申警戒上曰先帝因郊禮方議肆赦致齊之夕有朝士秦再思上書願勿赦且引諸葛亮佐劉備數十年不赦事先帝頗疑之時趙普為相因入對言曰聖朝開創已來具存彛制每三年郊祀即覃肆眚所謂其仁如天堯舜之道也至若劉備偏據一方區區用心臣竊為陛下不取先帝善其對赦宥之文遂定應辰所奏頗見盡心然或全無赦宥亦恐難行張知白曰古人所謂數則不可無之實難斯為確論也宿州言靈璧鎮蝗蟲生壬戌給威猛卒二百人𨽻京東都巡檢使及濵棣水路巡檢使其捕盜有勞者奬之時上封者言濵棣淄齊鄆博州茭莽翳薈冦盜所伏巡邏地逺請益兵以警備故也乙丑司天監言今年丁巳三月至嵗末天道利客詔諭邉臣或小蕃侵犯但據城扞敵無得輒入外界深慮城寨使臣等好立事功不務詳審輕於追襲但能訓練戎容謹畏天道自然邉聲逺振風俗和寧為上䇿矣丁卯御史臺言常朝武班止一二人或請告則絶班詔擇內職疾老者補諸衛將軍及率府率凡十二人詔太常禮院自今檢會文字並須判院官議定簽書方得供報時徐王卜日成婚而安王夫人卒內侍省移牒會問禮院禮直官李惟吉以白狀回報故條約之是春京畿旱夏四月庚午王旦至自兖州詔諸處所奏公案收坐得替離任京朝官使臣幕職州縣官在任公罪合該去官原免須候斷勑頗成淹滯自今許大理寺即時移報審官三班吏部銓曺從本寺之請也三佛齊國王霞遲蘇勿吒蒲迷遣使奉金字表來貢辛未王旦言曺濟徐鄆州廣濟淮陽軍每船運上供斛斗三十七萬石去嵗蝗旱望免夏稅一料支移詔可壬申詔大名府磁相澶州通判軍越睦處州去秋災傷民多闕食令轉運司運米賑濟之癸酉河北轉運使冦瑊言懷衛州微有蝻蟲即已焚捕甲戌三司言自京𣙜貨務入便錢請以大中祥符七年二百六十一萬餘貫為額每嵗比較不及數當職官吏準條科罰從之詳定茶鹽所言入中緡錢舊悉從商人所有受之請令十分輸緡錢四五仍定加饒貼納之差從之此據會要及本志而實録不書今附見乙亥出聖祖神化金寶牌分給京城寺觀及天下名山牌長三寸許廣寸餘面文曰玉清昭應宫成天尊萬夀金寶背文曰永鎮福地其周郭皆隱起蛇龍華葩之狀封以絳囊漆匣上親題署之曹克明等上討撫水州蠻冦使臣將士立功者凡千八百一十六人並等第遷補及優便差使賜器帛緡錢官吏應奉軍期者詔奬之戊寅監察御史濟隂王博文言近充監祭使祀夕月其日辰時行事至已時前禮畢伏以祀稱夕月壇號夜明既屬隂靈翻居晝祭以臣愚見恐未合冝望詔禮官博士别加詳定事下有司且言準禮秋分祀夕月於西郊國語云大采朝日少采夕月又曰春朝朝日秋夕夕月唐柳宗元論云夕之名者朝拜之偶也古者旦見曰朝暮見曰夕故詩云莫肯朝夕左傳曰朝而不夕記曰朝不廢朝暮不廢夕按禮文秋祀夕月蓋其時晝夜平分太陽當午而隂魄已生遂行夕拜之祭以祀月未前十刻太官令率宰人以鸞刀割牲未後二刻行禮唐劉禹錫任御史監祀夕月壇有詩備記其事注云其禮用晝蓋是古禮以夕行朝祭之禮又按禮云從子至已為陽從午至亥為隂參詳典禮合於未後三刻行事從之己卯河東江南益州路並言雨足庚辰徙封州刺史知絳州錢惟濟知潞州初惟濟自諸試郡授絳州民有條桑者盜奪桑不能得乃自創其臂誣桑主欲殺之久繫不能辨惟濟取盜而給食視之而盜以左手舉已筯惟濟曰以左手創他人者上重下輕今汝創特下重正用左手傷右臂爾非爾自為之耶盜遂沮伏上聞之謂宰相向敏中曰惟濟試守郡輒明辨後必為能吏矣於是移潞州民相驚有外寇奔城而仆者相枕籍惟濟從容以出從騎甚省因密捕惑衆者送獄有頃自定白骨山僧自言死日逺近趨之爭施金帛惟濟遣人護察及期不死乃杖配之惟濟兄惟演在禁林嘗奏曰惟濟久在外願得一至京師以慰弟兄之思上嘉其友愛即日召之右僕射陳堯叟卒贈侍中諡文惠辛巳命趙州出廪粟萬石以賑貧民壬午賜進士楊偉及第賈昌朝同出身大禮之初貢舉人獻賦頌者甚衆詔近臣詳考惟偉及昌朝可采故召試學士院而命之偉建陽人昌朝獲鹿人璉孫也癸未詔在京場務坊監官周親喪給假五日聞哀二日大功小功給假三日聞哀一日緦麻並給假一日從權三司使馬元方之請也右司郎中龍圖閣待制查道以耳聾難於對問表求外任甲申命知虢州將行上御龍圖閣飲餞之時虢州蝗災道既至不俟報出官廪米設糜粥賑救飢者發州麥四千斛給種農民賴以濟所全活萬餘人翰林學士知通進銀臺司兼門下封駮事朝逈李維上言中書門下劄子付登州據牟平縣學究鄭河狀以本州民闕食願出粟五千六百石賑濟望賜弟巽班行奉聖旨不行者臣等商度損餘補乏為利亦大望令宰臣定議特從其請俟豐稔即止庶儲積之家有所勸率大濟飢乏上寬聖慮詔補巽三班借職自是納粟者率以為例乙酉著作郎劉曄為右正言時準别詔置諫官曄首預其選上曰諫官御史之任實難其人當須識朝廷大體達政刑要道言必詣理乃為稱職耳曄溫叟之子也嘗知龍門縣羣盜殺人曄捕得之將械送府恐道亡皆斬之衆伏其果通判益州召還時王曙治蜀或言其政苛暴因對上問曙狀與凌䇿孰愈曄曰䇿在蜀嵗豐事簡故得以寬假民比嵗少歉盜賊間發非誅殺不能禁然曙所行亦非嘗出陛下法外也上善之曙峻法以繩盜賊贓無輕重一切戮之衆股栗居數月盜賊屏竄蜀外戶不閉嘗有卒夜告其軍謀亂者曙立辨其偽斬之民安其政以比張詠號前張後王戊子邵州言野竹實居民採食頗濟飢乏己丑河東轉運使陳堯佐言河陽懷衛等州去秋災傷本路絳澤州皆有餘羡欲運澤州粟五萬石赴懷州絳州粟二十萬石赴河陽從之陜西陜解等州蝻蟲生辛卯上謂宰臣曰如聞知廣州李應機為政峻急先任廣南轉運使嘗言廣州民無丁稅米建議科納尋詔本路詳度纍議皆難其事今應機領郡因欲遂其前議逺方之民務在綏輯驟增賦調亦恐非便可罷之曹克明言知撫水州蒙懷珌請詣闕貢奉升州言蝻蟲生壬辰給蔡州團練使德雍汝州團練使德文唐州團練使惟正公用錢嵗各百萬癸巳向敏中等言近日朝臣舉官有一嵗之中舉十餘人者又所部內監當朝臣與本處幕職官者或傷於泛濫或涉於嫌疑欲釐革其弊上曰檢詳舊制别加條約甲午傳法院上新譯頻那夜如經上以其經有葷血獻詛之語與經教戾命焚之仍令自今有類此者不須翻譯龜兹國可汗王智海遣使張延來貢乙未陜西河中府解虢州旱丙申發運使李溥言江淮去嵗之食有冨民出私廪十六萬石糶施飢民詔自今命官使臣犯贓私罪不以輕重並劾舉主自餘杖以下罪更不收坐從判大理寺李虛已之請也會要天禧二年四月事五月戊戌朔詔災傷流民所至之處官吏倍加存恤無居室者許於寺觀公舍安泊勿令失所詔奬知臨江軍新淦縣殿直張崇浚以其親率縣民減價糶粟濟飢乏也屯田員外郎謝商言伏見去嵗蝗蟲為害傷食田苗流行雖繫於天災除蕩亦由於民力雖尋遣官吏與令佐焚捕頗聞弛慢罕能盡心或申報稽延致孽蟲之紛積或追擾煩併縱狡吏之誅求情近幸災咎由弛職而又散子在野未免再生臣聞堯水為災或導之於嶓冡湯旱作沴亦禱之於桑林雖軫宸𠂻罔虧聖德捕蝗之命厯代有之深慮曠慢之人但引災咎扇惑民衆更致遷延所冝及蝻裁蘇併功撲滅則冀秋苗無害其子未生欲望特降詔命下去嵗災傷州郡應諸縣有蝗蝻再生之處本所耆長壯丁限當日申縣本縣即時申所屬州軍立選職官與令佐同領人夫打捕令盡並與書歷理為勞課或有貪濁之輩率斂慢公望依枉法定斷仍委本處通判躬親下縣提轄轉運使副往來覺察從之己亥權涇原路駐泊鈐轄郝榮等言掘籠竿城濠自上石門至鎮戎軍功畢詔奬之仍賚器帛賜將士緡錢庚子宰臣王旦以疾表求罷免不許辛丑詔禮部權停今年貢舉河北都轉運使李士衡言奉詔以絳州粟十五萬石給京西闕乏水路頗逺請止運懷州粟麥五萬斛從之壬寅王旦再表求罷不許入內供奉官邵文雅言懷衛邢洺州焚捕蝻蟲並盡甲辰以殿中丞劉平為監察御史用新詔也平嘗知南充縣會夷人寇淯井監轉運使檄平權瀘州事平率土丁三千擊走之後以寇凖薦復知瀘州夷人懲前敗不敢擾邉乙巳改撫水州為安化州從本州首領蒙承貴之請也丙午詳定茶鹽所言請令李溥遵纍降詔旨據詳定所條奏事件速行裁酌如無妨礙則施行訖奏如事有未便則從長規畫以聞溥時在京師詔令溥乘傳還本任經度而溥務執前制亦罕所變革也太保平章事王旦登柄用凡十八年為相僅一紀謙退周謹每遷受賜常有愧避之色素羸多疾又以名位太重憂畏不自安自東魯復命益臞瘠不任趨謁連拜章求解上素重其德望委任莫二聞其引退甚不樂優詔褒答繼以面諭戊申制授太尉兼侍中聽五日一赴起居因入中書遇軍國重事不限時入預參決旦聞命愈恐家居不出手疏懇請去位且言私門百口屬疾將遍欲退身以息災咎今加此峻秩則是愈增罪釁辭意堅苦實録云旦聞詔詣便殿以謝固讓新命據本傳及神道碑並云旦不出也恐實録未可全信今不取又遣其子詣向敏中附奏上曰欲引退固未可言但體質羸弱亦可憂也旦當國嵗久始終如一鎮靜中外實有賴焉且未嘗有一事干撓朝廷今此固辭或難違其意既旬浹乃詔止加封邑其餘優禮悉如前制從旦所讓制書在庚申今并書京兆府言捕瘞蝻蟲并盡庚戌上御崇政殿録京城繫囚死罪情輕者流海島徒流遞降一等杖已下釋之詔以仍嵗蝗旱民多流徙遣殿中侍御史張廓往京西路薛奎往河北路駕部員外郎判三司鹽鐡勾院張紳往兩浙路太常博士判三司度支勾院韓庶供奉官閣門祗候賈象之往江南路著作郎集賢校理判三司都欠慿由司張師德供奉官閣門祗候曹珣往淮南路體量安撫所至不得宴樂遊從及多借官健舟船長吏亦無得迎送珣彬第六子詔京東西河北陜西江南兩浙遭旱戶今年夏稅免其折變就便輸送乙卯詔北戎每嵗以鷙禽為獻憫其羈紲冝悉縱之詔緣江𣙜務二分耗茶特與依舊支給李溥入辭上以詔面使溥行之以髙郵軍民荀懷玉為本軍助教以其出米麥三千斛濟飢民故也仍詔自今為例張知白曰自古入粟拜爵皆歸公廪今則不然民或阻飢自相假貸官為受領均給貧窮陛下深軫皇慈特加旌賞斯令典也丙辰開封府及京東陜西江淮兩浙荆湖路百三十州軍並言二月後蝗蝻食苖詔遣使臣與本縣官吏焚捕每三五州命內臣一人提舉之戊午知明州劉綽言諸州天慶觀聖祖殿自今請令羣官到任得替洎朔望並齋潔朝拜奉辭從之劉綽未見西京應天禪院太祖皇帝神御殿成為屋凡九百九十一區己未命宰相向敏中為奉安聖容禮儀使入內都知張景宗管勾迎奉左諌議大夫戚綸告永昌陵祕書丞譙人魯宗道為右正言用新詔也詔福建路買納民茶斤增十錢從轉運使方仲荀之請也辛酉上以在京軍馬芻糧數示宰臣曰頃者張知白欲知此數故特示卿等大凡國用有備乃得無患向敏中曰臣嘗記國初軍儲止及三二嵗以今方之則倉廪豐實可知矣殿中侍御史張廓言奉詔京東安撫民有儲蓄糧斛者欲誘勸舉放以濟貧民俟秋成依鄉例償之如有欠負官為受理從之壬戌刑部員外郎兼侍御史知雜事吕夷簡請自今止令轉運使副提點刑獄官知州通判舉本部官屬其監當物務知縣京朝官及在京常參官勿使奏舉詔因罪犯監當人不得舉官其朝官知縣者不得舉本州軍幕職曹官餘並如舊所舉但歷任及四考者並許施行癸亥以樞密使王欽若為奉安太祖聖容禮儀使贊導乘輿乙丑自禁中奉聖容赴文德殿備儀衛教坊樂前導丙寅上服靴袍酌獻禮畢奉以升綵輿而行具鹵簿鼓吹道釋威儀上出次奉辭羣臣拜辭于瓊林苑門外奉安日上不視朝自是正至朔望令留司京府官詣殿焚香及别於正月擇日朝拜忌日就院設齋行香
