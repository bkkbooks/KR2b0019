body:
  text: 續資治通鑑長編巻三百十三宋李燾撰神宗元豐四年六月丙辰朔荆湖北路轉運使孫頎等言乞於辰州㑹溪城量益戍兵五七百人漸招納上溪諸蠻仍差知辰州張鄰臣通判栁槩措置從之䕫州路轉運司言南平軍播州夷界廵檢楊光震乞補羅篼等充把截將及給玊帛撫諭羅氏鬼主不令應接乞弟及招納里歌順蠻州等族上批宜並依所乞可下都大經制瀘州夷賊公事梓䕫路鈐轄司指揮及令彭孫應接林廣言知遂州李曼决配犯階級卒郭立不當亦不闗報曼昨知瀘州引惹邊事今又不量情理縱軍士犯罪恐别致生事詔轉運司劾李曼仍發遣出川界永不與川峽差遣自今應林廣所轄兵犯軍法並闗報林廣逐處不得一面施行戊午以權判兵部降授承議郎天章閣待制趙卨權發遣三司使詔東行河道已填淤不可復將來更不修閉小呉口候見大河歸納應合立堤防令李立之經畫以聞其干渉州縣修䕶城堤並聼立之處分時議者欲復禹故道上曰陵谷更變雖神禹復出亦不可拘以故道盖水之就下者性也今止以州縣爲礙壅遏水勢致不由其性此乃治水之事非治水之道故也若以道觀之則水未嘗爲患而州縣爲水之害耳舊紀云戊午詔河決北行順利無塞詔河北諸郡蝗蝻漸熾可專委東路提舉官李冝之督捕河北東路提㸃刑獄劉定言王莽河一徑水自大名界下合大流注冀州及臨清徐曲御河決口恩州趙村壩子決口兩徑水亦注冀州城東若遂成河道即大流難以西傾全與李垂孫民先所論違背望早經制詔送李立之都大經制瀘州蠻賊公事司言己牒知南平軍魏從革候本司闗牒入界期日即禀彭孫節制領兵照應討蕩乞弟詔林廣彭孫將來入蠻界約進兵之期要在首尾相應分張賊勢必於殄滅己未權發遣三司度支副使寋周輔爲河北路體量安撫除河防事李立之經畫外應干振䘏並詳度施行舊紀書周輔體量安撫河北水灾詔䕫州路轉運副使鮮于師中專應制瀘州軍須上批開封府治盖漸之獄禁繫已乆詳其所治在民間至爲小事本府所以如此淹延者必以御史所言致於意外推求盛暑之際追逮不已冀附致近臣之罪以奉言者之口冝限百日結絶母得枝蔓又詔樞宻都承㫖兼詳定官制張誠一開封府劾質田事如有官制事合禀白執政與權免并五月二十七日六月四日十三日詔河北被水之民有少壮者招填諸州闕額廂軍止支一半例物民間有農具許折當常平糧斛候水退日収贖詔歸明人相讎殺公事令所𨽻屬路分官司相度行遣不得交相侵越如已施行仍闗牒照㑹壬戌䕫州路轉運司言乞下彭孫如委自南平軍路趨乞弟巢穴即與本司從長相度運致糧草詔聞南平軍至乞弟巢穴地逺糧道艱阻已降指揮彭孫從便路進討知慶州天章閣待制俞充卒充知上有用兵意屢請討伐西夏先是一月又言西戎跳梁已乆自仁宗朝欲平蕩之未得其䇿近奉詔伺賊巢穴秉常之事臣不輟遣人深入覘伺尚未得實或曰秉常已爲民所殺或曰見存不豫政事爲母所囚以臣愚慮秉常存亡恐不足計雖存亦虛名耳年二十一而未得豫事雖在外國乃朝廷䇿命守土之臣因欲行漢禮以事大國有何可罪而其母怒之遂被幽囚殺其左右恣爲淫亂家道如此國人惡之衆必離怨此正可興師問罪之時也秉常亡則桀黠者起首爲邊患以圖自固臣竊憂之是以言之至於再三朝廷出師惟患無名今有名矣天亡其國神獻其䇿破其巢穴如破竹之易此不可不爲也李靖有言兵貴神速機不可失惟疾雷不及掩耳乃可成功臣料今之議者不過欲先招納羌人此䇿若行其機必露使賊得爲備賊若先動則爲害不細康定覆車今日可誡昔李靖破突厥止用鋭兵三千盖謀之當行之果所以勝也臣平時守邊惟慕羊祐及其伐國志爲李靖而已經營於此已三年矣䇿求萬全一舉而就恢復漢唐兩河之地雪寳元康定之耻以成國家萬世之利其費不過五年嵗賜秉常之數其歴日亦不乆臣欲乞乗傳入朝面陳攻討之畧上禀睿斷不敢乆留京師倍道兼程徃復一月足矣又言近奉詔候王中正到應副錢帛今中正在延州臣若俟其來而議之則日月差遲其機已泄事不可成後悔無及臣欲乞入奏廻與中正㑹議詔充所陳邊事如不可形於文字令走馬承受或機冝官入奏充未及奏是日暴卒於州熈寜中充以推行新法淤田征利鋭於進取自小官不數年擢至侍從一嵗或六七遷既死西師遂大舉實自充發之此墨本充傳云爾朱本簽貼云充爲先朝擢用非獨以推行新法而西兵之舉亦不盡因充前史官妄造此語今刪去案充驟登侍從盖因王中正王珪之力西師啟端种諤居多充盖與有力焉非首謀也今但㸔其所上疏充知慶州在元豐元年八月十一日邵伯温聞見録載充首議取靈武已具注彼可参考也據六月十六日御集環慶走馬承受陸中奏今月七日經畧使俞充身亡乞速差官詔差趙卨今依附七日甲戌本傳云充以五月上此疏今云先是一月庶不失實甲子朝請大夫判登聞檢院王珫衝替以御史朱服言珫父子同惡行如禽獸雖㑹赦降而朝廷原情揆法固將投棄荒裔終身不齒今有司雖許令釐務而珫畧無愧耻遽請朝見故也珫坐與其子仲甫姦大理評事石士端妻王氏付有司劾治尋詔珫放歸田里放歸田里在二十二日今并書之有上書乞審擇守令者上謂輔臣曰天下守令之衆至千餘人其才性難以徧知惟立法於此使象之於彼從之則爲是背之則爲非以此進退方有凖的所謂朝廷有政也如漢黄覇妄爲條教以干名譽在所當治而反贈秩賜金夫家自爲政人自爲俗先王之所必誅變風變雅詩人所刺朝廷惟一好惡定國是守令雖衆沙汰數年自當得人也詔春銓試中稍優一人堂除差遣一次中等三十一人不依名次注官下等四十四人注官丙寅詔李憲赴熈河路經制司管勾職事先是憲乆留闕下將用兵西邊故遣還此據御集丁卯梓州路轉運司乞餉運若闕即本司任責或有抄畧即經制司任之及乞下經制司遣兵防䕶徃來詔梓州路經制蠻事人夫糧草若有闕誤罪在轉運司其遣兵防䕶照管如有疎虞罪在經制司上批河北州軍中路夏田大河横水衝没百姓必乏食冝差官廣募開封府界在京闕額禁軍詔差府界將副四員候至七月分詣河北水災州軍招闕食人充填府界將下并在京五百料錢以下闕額禁軍戊辰檢詳樞宻院戸房刑房文字梁燾上編録安南獻議文字五冊詔聞河北飛蝗極盛漸已南來速令開封府界提舉司京東西路轉運司遣官督捕仍告諭州縣収穫先熟禾稼舊紀於年末書河北蝗新紀不書詔監察御史裏行王祖道罰銅十斤滿中行六斤以判司農寺舒亶言本寺未了文字二千四百餘件未了帳七千餘道失催罰錢三百九十餘千未架閣文字七萬餘件朝廷已送大理寺根究伏縁建置六察正以督治官司違慢爲職今並不弹奏詔罰祖道而中行自劾嘗權戸察故也滿中行言近論開封府治張誠一質田事滅裂未䝉移付别司雖聞本府近追孫貴下吏不數日放令隨司望深察事理特賜指揮又言近弹奏知洪州王韶明出榜告諭親受納簡退不堪紬絹廢法干譽侵官市恩一路民情莫不傾動未䝉施行詔張誠一候案到王韶候體量到並取㫖可并五月二十七日六月四日十三日不知案到竟是何日實録無之紹聖元年十二月六日可考判大名府王拱辰乞依朝㫖不閉決口外修繕舊河并横壠故道放大河分流各三四分其決口即捲埽進約遮攔疏導使直東歸二河量分三四分北行爲新河下接漳御滹沱等河由九河舊跡以至於海大勢既分一河纔受水三二分豈有湍悍滿溢之理乞選明習水事近臣分廵案視不從己巳入内東頭供奉官勾當御藥院竇仕宣言小呉決口下至乾寜軍撲樁口相視今河自乾寜軍撲樁口以下流行未成河道又縁河東北流自小呉向下與御河胡蘆滹沱三河合流深恐漲水之際隄防難限乞令都水監定三河合黄河如何作隄防限隔或不合黄河其三河於何所歸納詔送李立之相度後立之言三河别無回河歸納處須當合黄河行流從之判司農寺舒亶言司農寺前後積滯文字不惟本寺失催舉兼諸路提舉司多是因循其提舉官已有條嵗終分三等考校乞自今以提舉司承受本寺文字嵗終以十分爲率㑹計結絶件數從之亶又言役法未均責在提舉官上曰提舉官未可責也近臣僚有自陜右來者欲盡蠲免中下之民朕謂不然夫衆擎易舉天下中下之民多而上戸少若中下盡免而取足上戸則不均甚矣古謂均無貧朝廷立法但欲均耳卿可更講求以聞此據詔㫖内亶傳徽宗實録因之詔㫖大率據亶墓誌爲傳其詞未必可信不然神宗所稱衆擎易舉何以不見於元豐實録兼與三年二月辛酉李定所言相矛盾當考詳定禮文所言臣等㸔詳君體至尊也故燕禮君不爲主而以宰夫爲主示羣臣莫敢與君亢也天體至尊也故郊禮天不爲主而以日爲主示百神莫敢與天亢也記曰大報天而主日配以月又曰掃地而祭於其質而已矣既已議掃地而祭復古之正禮則主日配月天之位亦不可以不正盖天一位萬物本乎天也祖一位人本乎祖也日月不得而與焉後世報天而不以日爲主非禮也伏請祭天五帝從祀配祖外别設主日配月之位從以百神從之此據禮文元豐四年六月十四日依奏按是年九月二十九日詳定所乞行掃地而祭詔不從此云已議掃地而祭則當設主日配月之位若卒不從掃地而祭之議則主日配月之位恐亦不當設疑禮文或誤也當細考之又言古之王者孝恭盡於事祖故凡奉神之物雖無所用而不敢忽所以廣恭愛之道曾子問曰斂幣玊藏諸兩階之間盖貴命也聘禮巻幣埋於西階東盡恭之義也國朝舊制宗廟之幣則燔之非矣盖宗廟之禮不用煙以歆神則無燔燎之理又特牲饋食禮司宫掃豆間之祭埋之兩階間亦其類也伏請凡神之幣皆埋之西階東冊則藏諸有司之匱從之六月十四日依奏又言恭以本朝太廟諸室帝后一體故禮有鋪筵設同几之文祭則同牢同饌同祀以明天地訢合之義古者惟未吉則不配哀未忘也未聞奏告及祈報而不配近例凡奏告及祈報惟出帝主而不出后主殆與同几之文異矣伏請奏告及祈禱報謝僖祖翼祖宣祖太祖太宗真宗仁宗廟室並出帝后主以明天地一體之義貼黄稱據禮帝后一體同几同席同牢同饌同祀今來㸔詳應奏告祈報除同牲牢祭饌即合出后主外其餘更不出從之六月十四日依奏辛未承議郎王端臣提舉京東西路常平等事先是東西路提舉常平等事通直郎王古因奏事頗言常平法不便詔差官替古而端有是命差官替古乃四月辛巳日今并書宣徳郎司農寺主簿孫覧爲通直郎提舉利州路常平等事判司農寺舒亶言覧因循㢮縱比他官爲甚不足任事詔改覧爲將作監主簿亶兼知諌院嗜排擊欲引覧以自助覧不從亶怒因劾帳司稽違事乃命覧出使亶劾覧不置遂改命李憲言凖宣發廣勇右二十指揮駐熈河令臣將之以徃廣勇剏置未常出軍乞於宣武神勇殿前虎翼差一指揮爲臣親兵詔改差殿前虎翼右一廂四指揮所乞親兵牙隊至管軍方許可劄與李憲令知詔監賓州監税承事郎王鞏累犯情重本路監司陳倩朱初平妄舉牽復及陞擢各罰銅十斤自今朝廷特責降人如妄舉者令御史臺弹劾壬申詔諸路提舉官㪚斂常平錢穀比較増虧令中書立法以聞已而戸房立法乞嵗終令司農寺比較從之判司農寺舒亶言伏見本寺除帳司外三局總十二案丞四員主簿六員其逐局事有煩簡則官屬亦當裁減欲乞止置丞一員三局各置主簿一員餘並減罷從之仍令本寺主判官於見在官内選留或别舉御史豐稷及開封府界提舉司管勾官鄧忠臣等言祥符縣鄧公鄊大堈村有泉水民間飲之多能愈疾遂妄以李水子爲名京師内外士庶軍營子弟轉相告言今日神見某處明日神降某處傾動風俗結成朋社率斂財物奔赴鄧公鄉欲與神立廟小人縁此易生姦心神民異業不可不禁不報癸酉詔提㸃開封府界諸縣鎮公事葉温叟及祥符長垣韋城知縣縣丞主簿尉兼監驛使臣十四人罰銅有差内祥符縣主簿王容韋城縣主簿姜子年仍差替入内殿頭呉從禮張稹史革各展磨勘二年並坐失計置遼使國信路驛亭也丁丑上批近河北諸路牒報北界帳前指揮七月中㑹五京留守及南北王府主兵官諸招討於中京議事未知其實可令䧺州及河北縁邊安撫司精選可信之人厚許金帛速覘以聞既而皆言無之朱本簽貼云後來探得無此事削去今修入戊寅復西上閤門使榮州刺史知代州髙遵裕爲岷州圑練使知慶州尋有詔促遵裕赴任促赴任據御集在二十七日廣南東路經略司言大食層檀國保順郎將層伽尼請備禮物詣闕謝恩上批冝多給舟令赴闕己卯洪州言知州觀文殿學士正議大夫王韶卒輟視朝贈金紫光禄大夫諡襄敏官其子六人賜三女冠帔封長女瑞昌縣君韶爲人粗獷用兵頗有方略毎召諸將授指不復更問所至輙㨗嘗夜卧軍帳中前部遇敵矢石交下呼聲震山谷侍旁者徃徃股栗而韶鼾息自若然熈河所奏多欺誕殺蕃部老弱不可勝數軍以首級爲功韶交親皆楚人多依韶以求仕韶分屬諸將諸將畜降羌老弱或殺與其首以應命既病疽發背洞見五臓亦其報也朱本盡削去墨本别爲新傳且云韶性寛仁少誅殺士卒以故樂附今並不取止從墨本辛巳手詔應熈河路及朝廷所遣四將漢蕃軍馬並付都大經制并同經制李憲苗授依階級法總領照應董戩出兵俟得蕃中要約時日斟酌機㑹調發隨處駐劄如董戩欲得兵馬過界共力攻賊選官部分本路蕃弓箭手量所用人數以徃若夏國母親來或止遣大兵即候董戩人馬交鋒夏人有退敗之勢見隙可乗相度機便與本路諸將出界共力殺逐如董戩以夏人方顧内難别無侵虞敢渝前請猶豫不肯如期出兵致誤朝廷虛有調發即相度機便移兵討除其臨敵利害事干機速中覆不及者隨冝措置施行其錢帛糧草並委經制管勾官馬申胡宗哲計度應副先以支計案充如不足以封樁闕額禁軍衣糧并封樁錢帛充若猶不足以經制司本息充又不足以茶場司錢穀充又詔今陜西諸路㑹集兵馬利害所繫不細應樞宻院遣兵將中書調運軍食等事並㑹議允當然後進呈行下仍於二府逐房各選恭謹敏給吏三二人專主行庶可照應前後處分不致重錯詔賜末鹽錢三十萬貫付河東轉運司依例給鈔兑撥糴買糧草權判湖南路轉運副使朱初平言徽誠州歸明團峒應未建城寨以前有相讎殺及地訟並令以溪峒舊法理斷訖乞自今有侵犯並須經官陳訴如敢擅相讎殺並依漢法處斷其有逃避即官司㑹合擒捕及本處収捉施行從之資政殿學士正議大夫兼侍讀提舉中太一宫元絳爲太子少保資殿學士致仕七年六月十二日卒壬午詔陜西路縁邊諸路累報夏國大集兵至須廣爲之備以東上閤門使文州刺史种諤爲鄜延路經畧安撫副使應本司事與經畧安撫使沈括從長處置據御集一百四十八巻諤以二十八日上殿訖當日出門先是令諤與括宻議㸃集諤乃言疾雷不及掩耳今已籍籍輕兵不可用勢當成軍進討於是入對大言曰夏國無人秉常孺子臣徃提其臂而來耳上壮之乃決意西征命諤副括賜以金帯别賜銀萬兩爲招納之用本路及麟府事悉聼諤節制昭宣使果州團練使入内副都知王中正同簽書涇原路經畧總管司公事如遇出界令王中正及涇原路總管兼本路第一將劉昌祚同徃發開封府界京東西諸將軍馬分與鄜延環慶兩路以東上閤門使英州刺史姚麟權環慶路總管遇出界令知慶州髙遵裕與姚麟同徃其鄜延環慶涇原招納蕃部等費用許支封樁錢涇原路令王中正候編排本路軍馬畢赴闕於在京七百料錢以下選募馬歩軍萬五千人開封府界及本路共選募義勇保甲萬人如涇原路五千人不足於秦鳯路選募交阯郡王李乾徳上表言昨遣使臣陶宗元等朝貢爲廣州禁制窒塞綱運不同向時今遣禮賔副使梁用律著作郎阮文倍等水路入貢乞降朝㫖依舊進奉詔廣州悉凖舊例毋得邀阻差入内使臣一員押伴仍先降詔諭之詔發開封府界京東西在營兵馬十九將徃陜西權駐劄内府界第一第三第五第六京東第一至第五京西第三將赴鄜延路府界第七第九至第十一京東第六至第九京西第六將赴環慶路上批令保安軍以經畧司之命牒宥州云夏國世世稱藩朝廷嵗時賜與比年以來遵奉誓詔修謹貢職恩義甚稱今聞國主爲彊臣内制不能專命國事亦未可測存亡非乆朝廷將差降賜生日及中冬國信使入界未審至時何人承受及本國見今何人主領請速具報以須聞逹朝廷令中書樞宻院審詳施行以嘗賊應報之意兼牒語無詰責之言不須候兵集行下仍令鄜延路下保安軍未得交割回賜賀同天節銀絹等候回報到所問事更聼朝㫖八月二十一日更不移牒提舉永興秦鳯等路義勇保甲兼提㸃刑獄狄詠等言教頭邱簡張旦已依詔並處斬義勇楊簡授三班差使劄子已對衆給付乞差楊簡提舉義勇保甲兼提㸃刑獄司凖備差使從之邱簡等坐謀殺監教使臣爲楊簡所揭故也癸未以建䧺軍節度使韓絳爲金紫光禄大夫觀文殿學士依前西太一宫使詔命提㸃開封府界諸縣鎮公事楊景畧提舉開封府界常平等事王得臣分詣諸縣提舉捕蝗詔已發二十三將軍馬赴鄜延環慶熈河又選募二萬五千人赴涇原令經畧司各具軍噐什物闕數以聞又詔軍噐什物可並以舟載至西京界令陜西京西轉運司速増遞鋪人車以備運致舟載軍須物朱本又於七月甲午書之今止存此詔中書自今應相度定奪分析體量勘㑹驅磨㸃檢之類並置簿𣙜轄勾銷委檢正官量𦂳慢給限甲申詔諸軍起發装錢禁軍依今廂軍剰員降一等如不及五百亦依此數支賜韓絳言河北轉運使副並帯都大制置屯田使今既令定州路安撫使帯都大制置屯田使即與轉運使副使同一官局乞罷轉運使副兼領虛名從之令知䧺保州並帯屯田使雄州東路保州西路通判並帯屯田判官河北縁邊安撫副使都監及專管勾屯田内臣並隨官充副使或都監仍通管兩路上批其雄保州通判驟領其事入銜則與北界公文徃還須當繫書慮北人疑爲生事盖縁誓書不得増展溏濼且令雄州保州具自來知州通判與北界公牒徃還如何結銜以聞上初議西討知樞宻院孫固曰舉兵易觧禍難前後論之甚切上意既決固曰必不得已請聲其罪薄伐之分裂其地使其酋長自守上笑曰此真酈生之説時執政有請直渡河者上意益堅固曰然則孰爲陛下任此者上曰吾以屬李憲固曰伐國大事而使宦者爲之士大夫孰肯爲用上不悦固請去不許他日又對曰今舉重兵五路並進而無大帥就使成功兵必爲亂固數以大帥爲言上諭以無其人同知樞宻院吕公著進曰既無其人不若且已固曰公著言是也此月十日壬戌俞充奏疏并元豐元年八月十一日壬子充初除慶帥邵伯温聞見録并蘓轍龍川别志云云已具注彼並合㕘考
