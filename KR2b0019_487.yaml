body:
  text: 續資治通鑑長編卷四百八十三宋李燾撰哲宗元祐八年夏四月丁未朔夏國主乾順遣使謝罪獻蘭州乞賜塞門寨詔答不許詔答在十四日此事當考詳蘭州未嘗以還夏國今又何獻也戊申左朝請郎權發遣湖州張詢就差河東路轉運副使政目張詢河東使河北東路提㸃刑獄郭茂恂為户部郎中政目二日事六年正月十八日自度外提河北東刑祕書丞孫朴為工部員外郎政目二日事七年八月六日為祕丞中書舍人陳軒為龍圖閣待制知廬州政目二日事實録在十四日庚戌給事中孔武仲為禮部侍郎政目四日事三月二十六日初除給事中實録十四日自舍人除給事中與政目不同今從政目翰林侍講學士范祖禹為翰林學士政目四日事實録在三月二十六日壬子中書舍人喬執中為給事中政目初六日事實録在十四日癸丑降詔恤刑王稱東都事略詔曰方夏暑時動植之類皆以遂其長養而吾民觸禁抵法繫縳囹圄其深文之吏或不能體朕欽恤之意因循延蔓久不為決干隂陽之和非細故也其詔天下官司之長敬若時令哀矜庶獄以丕應朕志甲寅禮部言提㸃京西南路刑獄孔平仲奏鄧州社稷壇牆垣頽毁壇壝蕪沒並無齊㕔亦無門戶令本州增改修建并行下其餘州縣欲乞令後長吏到任須詣社稷春秋祈報自非有故不得委官從之丁巳詔曰朕聞五帝不相沿樂三王不相襲禮世有損益因時制宜惟我祖宗嚴奉郊廟當遣官攝事皆考合於前文唯奠玉親祠自裁成於大禮每以三歲對越二儀咸秩百神大賚四海迄先帝元豐之末講方丘特祭之儀蓋將補一代之闕略振百王之墜典朕惟菲德嗣守丕基列聖已行謹當遵奉先朝未舉懼不克堪是以昔歲仲冬竭誠大祀神祇享答祖考燕寧前詔有司載加集議猶欲咨度諸儒之論稽參六藝之文然禮既不疑則事無可議斷自朕志協於僉言祗率舊章永為成式今從南郊合祭天地依元祐七年例施行仍罷禮部集官詳議詔范祖禹所草也此據新録政目於五月甲申乃書詔南郊合祭依元祐七年例丁亥又書詔禮官罷議合祭今兩存之恐新録考據未詳也二月二十五日蘇軾圜丘六議可考并注范祖禹云云或移注此劉安世云蘇軾議不曽上蓋誤也當是不從軾反復詰難之請因致安世誤云耳安世所云亦未見其詳汪應辰嘗言之兩浙路轉提㸃刑獄司申檢㑹浙西州縣纍經災傷䝉朝廷相繼發米付本路賑濟除接續賑糶過外逐州有見管淮南江西等路發到賑糶不盡米四十餘萬石例各陳次別無支用今欲將其米趂此蠶月鄉民闕食之際各取情願許令人户赴官請借每一斗候至向去秋成納新米八升還官仍限四年均作料次各隨本戶苗稅帶納詔其米許兊充軍糧外餘數仰置場減價出糶戊午御史中丞李之純言臣僚上言乞嚴立制度以絶奢僭之源杜絶邪侈以成風俗之厚至於閭巷庶人服錦綺佩珠璣屋室宏麗器用僭越皆可禁止詔令禮部將見行條貫行下按嘉祐敕猶有品官民庶裝飾真珠之法至熙寧元祐編敕即行刪去竊以承平日久風俗恬嬉以華麗相高而法禁縱弛至於閭閻下賤莫不僭踰以逞私欲商賈販易獲利日厚則彼方採取其數日增最為殘物害人浮侈踰僭之甚者獨無其法何以示民願降明詔禁廣南東西路人户採珠止絶官私不得收買外海南諸蕃販真珠至諸路市舶司者抽解一二分入官外其餘賣與民間欲乞如國初之制復行禁榷珠具抽解之外盡數中賣入官以備乘輿宫掖之用申行法禁命婦品官大姓良家許依舊制裝飾者令欲官買雜戶不得服用以廣好生之德而使民知貴賤之別莫敢踰僭及民間服用諸般金飾之物浮侈尤甚而條貫止禁銷金其鏤金貼金之類皆是糜壞至寶僭擬宫掖往年條禁甚多亦乞修立如銷金之法詔鏤金貼金之類令禮部檢舉舊條珠子令户部相度以聞禮部言祕書省正字陳祥道狀䝉差兼權太常博士伏覩禮文有合行改正按貴人賤馬古今所同故覲禮馬在庭而侯氏升堂致命聘禮亦馬在庭而賔升堂私覿今元㑹儀御馬立龍墀之上而特進以下班立於庭是不稱尊賢才賤馬之意按元㑹儀車輅皆在庭中御輦御馬乃在龍墀之上輦馬不相須兼車輅已在庭中今以御馬在庭儀物別無未稱又王公侍從班在丹墀雖居馬上而特進以下皆在沙墀而實居馬下若以御馬在庭以明尊賢賤馬之意於義為允從之庚申樞密院擬定回夏國主詔省所上表遣使詣闕悔過上章及獻納蘭州一境地土綏州至義合寨亦取直畫定却有塞門乞還賜夏國等事具悉朕統御萬邦敦示大信眷爾嗣藩之始亟馳請命之誠爰給土疆復頒歲幣豈謂受賜而往輒興犯順之師中外交章神民共忿朕以爾在位未久勢匪自由姑戢伐罪之大兵聊用禦邊之中策仍敕疆吏許爾自新今則遣使來庭託辭悔過何乃謝章之初達遽形畫境之煩言况西蕃故疆中國舊地已載前詔不係可還其分界雖曾商量在用兵亦合隔絶然則塞門之請殊非所宜定西以東已有前諭除河東鄜延路新邊界至許從前約令逐路經略司依前後詔委官開立壕堠外蘭岷路未了地界亦已令蘭岷路經略司依先降朝旨委官候夏國差到官詳先降指揮同共商量分畫緣夏國自元祐通貢受賜後來纍次犯邊仍候諸路地界了日可依例別進誓表然後常貢歲賜並依舊例詔令學士院依此降詔先是中書侍郎闕尚書左丞梁燾攝事熙州范育請修築事議不決進呈次燾再爭之曰熙河屢乞修築邊面如努扎聚卜結隆花川隆諾特淺井石門子盡修得為便若先據要隘修之其餘節次可治也今若棄控扼之地而治緩慢處雖多無益徒費國力困邊民生後患也臣聞淺井石門子只可了熙河一路花川應接隆諾特只可了秦鳳一路如努扎去納克密七十里隆諾特去納克密百餘里以其逺應隆諾特不若近接努扎也宜先修努扎納克密次及智固等處如修得努扎其餘未修可也若不修努扎熙河無出入之路定西逺不可保終成後日之患同列或以謂先帝知其不可故不修築燾曰臣聞先帝已降旨聚糧鳩材在通逺軍封樁㑹先帝上仙不及修築非是難其為功而不成也先帝要取㑹州豈有不為此寨范育計置修築之具皆備只俟得旨可以立就如此即涇原不須供饋其地膏腴可足兵食况係喀木故地西人必不敢請若處置得是西人自伏若失措置必須生事昨西夏理㑹智固勝如界纍年不決及一城定逺羌遂畏服及進呈夏國詔本燾謂詔內不須指定地界但云一委帥臣就近從長商量庶使守臣臨機易為處置因進手疏論臣纍與宰相等商量賜夏國詔書所議改易衆論未合昨因進呈略具面陳邊事之大實在此一詔望陛下深思逺慮無茍近利必期久逺之安非臣獨見如此皆中外曉習邊事之人共言其利遂以詔中語言貼定進入又折簡宰相爭之終不得㑹燾足疾作是日遂謁告免權中書省事批出在家主印范育看詳游師雄措置進築在七年二月末此時燾猶未執政也燾執政在六月九日蓋育議久不決燾執政乃有是言今附八年四月十四日更須考詳梁燾行狀張舜民作時中書闕官俾公攝事熙州范育請修築事議不決進呈次公再爭之曰熙河屢乞修築邊面如努扎聚卜結隆花川隆諾特淺井石門子盡修得為便若先據要隘修之其餘節次可治也今若棄控扼之地而治緩慢處雖多無益徒費國力困邊民生後患也臣聞淺井石門子只可了熙河一路花川應接隆諾特只可了秦鳳一路如努扎去納克密七十里隆諾特去納克密百餘里以其逺應隆諾特不若近接努扎也宜先修努扎納克密次及聚卜結等處如修得努扎其餘未修可也若不修努扎熙河無出入之路定西逺不可保終成後日之患同列或以謂先帝知其不可故不修築公曰臣聞先帝已降旨聚糧鳩材在通逺軍封樁㑹先帝上仙不及修築非是難其為功而不成也先帝要取㑹州豈肯不為此寨范育計置修築之具皆備只俟得旨可以立就如此即涇原不須供饋其地膏腴可足兵食况係智固故地西人必不敢請若處置得是西人自伏若失措置必須生事昨西夏理㑹智固勝如界纍年不決及一城定逺羌遂畏服及進呈夏國詔本公謂詔內不須指定地界但云一委帥臣就近從長商量庶使守臣臨機易為處置因進手疏論臣纍與宰相等商量賜夏國詔書所議改易衆論未合昨因進呈略具面陳邊事之大實在此一詔望陛下深思逺慮無茍近利必期久逺之安非臣獨見如此皆中外曉習邊事之人共言其利遂以詔中語帖定進入又折簡宰相爭之終不得㑹公足疾作四月十五日謁告免權中書省事批出在家主印時元祐八年也右轄乞退狀云在假五十餘日政目乞退當在六月半利州路轉運判官陳察為户部員外郎政目十四日事實録無七年八月十六日為江東運判甲子資政殿學士通議大夫知永興軍李清臣為吏部尚書六年閏八月八日永興召為吏書既而寢之十六日改知真定今復自永興召為吏書五月三日又改真定政目無此永興軍恐當作成德軍光祿卿韓宗師權兵部侍郎政目無此權禮部侍郎王覿為户部侍郎政目無此覿傳云自發運使召權刑侍滿歲為改戶侍此云權禮侍當考丁卯四方館使嘉州防禦使李綬致仕政目二十一日事實録無之戊辰禮部言大名府新科明法侯弼等狀竊以先朝立法廢罷明經及諸科舉人許曾於熙寧五年以前應明經及諸科舉人依法官例試法為新科明法科自不許新人取應欲銷盡明經及諸科舊人當日務從朝廷之意而改應新科者十有七八昨於元祐三年又準朝旨置籍拘定人數更不許新人取應今來五路却將新科舉人與進士一例須要就試終場十人已上方許解發一名顯是立法不均欲乞依諸科例十分中亦留一分解額解發新科舉人本部勘㑹存留一分解額有礙條制如朝廷早要銷盡各人許留一分解額乞自朝廷指揮詔五路新科明法舉人今後取應人係就試終場者每實及七人許解發一名如取應終場止有六人已下亦許解一人己巳臣僚上言伏見自祖宗以來條制凡官員親戚於職事有統攝或相干者並回避近時朝廷侍從近臣職事或有親戚相妨多用特旨更不回避今乃類使叔姪兄弟更相臨統則是按察之法名存而實廢矣望應今後內外官職事有親戚相妨並令依法回避更不降特不回避指揮詔依奏內有服紀逺職事疏臨時取旨庚午監察御史來之邵言前潁昌府教授鄒浩以媚道交結蘇頌子弟乃得除太學博士懷其私恩怨望朝廷詆毁言路伏望屏之逺方詔鄒浩令吏部差充襄州州學教授鄒浩怨謗詆毁事當考本傳亦無之陳次升云浩為蘇頌所知故除博士及頌罷浩亦隨罷次升為御史力乞改正按次升為殿院在紹聖二年十一月今據此改執政事作蘇頌監察御史黃慶基言臣僚嘗進劄子乞詔吏部立三法以選擇守令竊謂此乃當今之急務誠使所任皆得人則不勞而治矣唐名臣馬周嘗以告太宗曰治天下者以人為本必欲使百姓安樂在刺史縣令爾縣令既衆不可皆賢但州得良刺史可矣天下刺史得人陛下端拱巖廊之上夫復何為兹實確論伏見朝廷差注知州人吏部惟考歷任資序以為升遷到部月日以定先後雖間有堂除或非詳擇至如常調每有擬注奏鈔朝上俞音夕下授任輕易殊無銓量甚非古者求賢共治之意欲乞應差知州軍人吏部具合入資序人數録歷任考課之優劣舉將之多寡有無勞績有無殿罰畫一申堂中書據其員闕審擇人材量州郡大小地望輕重民事繁簡擬名取旨如此則詮量由於宰執進用出於宸衷於體加重庶幾師帥得人治效可致壬申詔曰訪聞日近在京軍民難得醫藥令開封府體訪如委是人多病患可措置於太醫局選差醫人就班直軍營坊巷分認地分診治本府差官提舉合藥并日支食錢於御前寄收封樁錢內等第支破患人稀少即罷哲宗御集醫治軍民病患詔一道訪聞日近在京軍民病多有不安難得醫藥令開封府體訪如委是人多病患可措置於太醫局差醫人就班直軍營坊巷分認地分看候醫治仍於吏部選差小使臣一十人分頭管押醫治本府那官提舉所有合藥并官員醫等日支食錢於御前寄收封樁錢內等第支破候患人稀少即罷速與施行元祐八年四月二十六日下乙亥㸃檢催放缺負司狀據雍邱縣申準南郊赦應人户缺閣稅租并沿納及因災傷借貸錢榖在元祐四年明堂以前者並特與除放遂具元祐四年秋稅租申乞除放準省部指揮赦書上言人户缺閣稅租在元祐四年明堂以前者並特與除放本縣契勘其元祐四年秋料稅租係在當年九月一日起催當月十四日赦書即是赦前見催缺數本司檢準元祐八年正月十日敕節文應內外諸般缺負並令所屬依赦除放訖關本司㸃檢當否今來雍邱縣所申事理致依所申尚書省勘㑹諸路人户秋稅雖有起催在九月一日緣納畢並在次年正月以後即不係赦前實缺除人戶元祐四年秋料缺閣稅租外餘並依已降赦敕除放七年十一月二十四日顧臨等看詳放缺是月門下侍郎蘇轍奏臣伏見監察御史董敦逸上言近為川人太盛及差遣不公等因言馮如晦緣翟庠推勘公事枉陷徒配杖刑人數不少係聖旨下御史臺取勘更不候事了便除如晦館職知梓州今來前項指揮乃臣所言之事欲乞朝廷引臣前狀照㑹施行詳敦逸所言川人太盛差遣不公指以為言臣以不才過䝉擢任敦逸若言臣名位過分無補朝廷即是公議今乃言川人太盛顯是中傷朝廷用人自有資格豈可為臣一人忝預執政遂使川峽四路士人皆裁抑令不得依本資差遣敦逸又言馮如晦差除乃臣言一事以顯敦逸言臣非一並未䝉降出欲乞早賜行下令三省覆實其事若臣稍涉私邪乞正國法若所言無實亦乞辨明免臣被曖昧之讒臣竊見近日宰相已下皆為陛下恭已責成進退臣下少有特出聖斷悉付之衆議動循典法以此每有差除皆須衆人僉議方敢進擬稍有異同即不敢除惟是近日賈易朝端彥差遣及吕嘉問奏薦恩澤衆議不允遂有忿爭因此喧傳致被彈劾賈易去年十月十二日除京西運副今年二月十八日與蘇州范鍔兩易二十七日改徐州朝端彥去年九月六日知蔡州五年五月八日自左司為發運近日差遣謂見吕嘉問去年十一月知襄州未見奏薦事迹除此之外誰敢主張親舊過有擢用况馮如晦係東川人臣係西川鄉里隔逺全非交舊昨來差除蓋衆人謂其昔任御史推直日能不徇蔡確等意傾陷士人為確所怒因此流落故有此命臣非不知翟庠公事未了合少遲留只為翟庠公事元係臣親舅之子程之邵按發如晦以為深仇臣以此須至稍存形迹恐涉黨助之邵裁抑如晦故不敢異議方以周防畏避為愧不知敦逸反謂臣曲庇如晦事屬誣罔臣備位要近誠不欲與小臣計較是非但恐讒口浸漬漸不可長伏望聖慈早賜施行此據王銍元祐八年補録乃四月事今附月末敦逸并轍三月末已有奏章
