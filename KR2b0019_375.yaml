body:
  text: 續資治通鑑長編巻三百七十一宋李燾撰哲宗元祐元年三月己未左司諫王巖叟言臣聞聖人不貴無過而貴改過明主不貴好諫而貴從諫成湯之所以為三代盛王者惟曰改過不吝髙祖之所以為兩漢英主者惟曰從諫如流伏惟陛下聰明睿哲超越前古求天下之治惟恐不至用天下之賢惟恐不及臣於此時䝉陛下特逹之知擢在諫職是陛下欲臣毎事必言也臣若遇事不言有言不盡則是不忠於陛下有負於朝廷為臣如此陛下将焉用之陛下用范純仁雖驟何故無一人有言蓋當賢也一進安燾則諫官御史交章論奏而多士之議喧然不平蓋非公望所不與也臣以為知其無状且令備位則是陛下所以待大臣之恩已深已厚臣等固不敢不體陛下此意乞賜罷免但願陛下不躐等進之又願陛下正命令所出以存紀綱而不以斜封用大臣成聖政之日新耳今進一非才於極髙之位輕朝廷名器一當論也告命不由門下書讀而行之損朝廷紀綱二當論也二者皆非小事臣豈敢茍順聖意而不為力言陛下面諭臣以為公正而用臣若二三其心不固所守則非陛下用臣之意矣陛下至聖至明豈不亮小臣何敢違君命犯天威以取罪怒蓋義有不可也夫以義事君者臣之忠也以順事君者臣之邪也臣安忍棄忠而不用而以邪事君哉陛下今欲退臣則可進安燾則終難厭服清議惟陛下虚心平意察愚臣之忠而納其言天下幸甚貼黄稱王制曰爵人於朝與衆共之言衆議皆與而後可爵也今一升安燾而士大夫之論皆以為不當非與衆共之之義也願陛下取法先王以服天下右司諫蘇轍言臣等前月二十八日奏論安燾除知樞宻院告不令給事中書讀直下吏部施行事人㣲言輕未能仰回聖意竊惟封駮故事本唐朝舊法祖宗奉行未嘗敢廢事有不由門下不名制敕蓋此法之設本以闗防欺蔽君臣所當共守今安燾差除未允公議有司舉職實不為過而陛下即令廢法以便一時古語所謂君有短垣而自踰之臣等竊恐百司法度自此隳廢君臣之間無所據執何以經久近日朝廷除吕公著門下侍郎止因中書吏人行遣差誤不經門下而給事中范純仁以失職為言朝廷為之行遣以申明舊法及今未㡬乃以一安燾之故特開此例况燾與純仁並命二告皆不經書讀竊料純仁必不肯不顧前言黽勉而受純仁既不受命則燾必不敢不辭燾既力辭而給事中又封駮不已臣等必恐此命無由復行伏乞陛下克已為法檢臣等前奏且令燾依舊供職陛下必謂先朝舊臣無大過惡不可輕棄則同知樞宻院任用不輕陛下必謂已行之命不可中止則命之未行臣等無由預議若既行之後又不得言則朝廷設置臺諫竟将安用陛下明聖其必不然臣等區區所惜者祖宗法度非敢必行已意以廢格明詔惟陛下裁擇庚申御史中丞劉摯言臣近見安燾范純仁告命不由給事中直付所司臣以謂朝廷之大失政也故尋具状及與臺官連状共四次論列至今未䝉追正臣誠不知陛下命令不使給事中書讀此何意也将惮其封駮耶厭其封駮耶天下之理是非當否而已陛下試思之今來進用燾等若果當其人不縁私援則天下必以為是而給事中雖百千封駮猶當終使之經歴而後行不然罷其人可也若燾等之進不由公道理亦未安天下不以為是給事中乃能封還駮正則是拾遺救失善守其官有補於國者陛下當嘉納而改為之乃盛德事也不當厭惮其言而廢其職也今陛下以給事中之言為是耶為非耶而陛下何故自隳典憲為此委曲行政不由於直道命官乃出於斜封不知誰為陛下建此謀者今於門下之録黄明書云奉聖㫖更不送給事中書讀於吏部之告身給事中銜下明書云奉聖㫖不書讀制命乖當未見有如此者實恐取謗於四方貽譏於後世不可忽也録黄初下既見批㫖則門下侍郎合行進駮不合放出既出之後尚書省左右僕射左右丞亦合執奏不合承行既行之後命令不全吏部亦合申禀不合書告是官司上下皆阿諛茍且失其職守壊亂紀綱成此謬誤以累聖德臣不知陛下以名器禄食飬大臣置百官将何所用之凡人主出令差誤古今所不能無但左右之臣彰明救正之則不至於成其失矣况皇帝陛下富於春秋淵嘿之日而太皇太后陛下聽政不出房闥之時乎夫斜封墨敕濫官横賞乃前古之所以召亂者也今大臣欲以此事誤陛下若門户一開何所不有欲望聖慈詢問大臣命令如此施行是與不是茍以為是則可謂罔上迷國茍知其非而不言則可謂不忠尚可以任人之國乎伏請速降指揮追還燾等告命依國朝典故行下所有門下侍郎及尚書省官屬吏部官吏各有前項罪状伏乞以臣此章并前後論列文字付外施行貼黄稱進任大臣而不使告命徧歴門下乃是陛下先以私自處也制書不全而受之是臣下以私自進也上下如此則何以厭服中外臣固知燾等之必不敢受也又貼黄稱燾䝉恩遇未賜罷免已可謂幸若又超遷度越衆人實不足以允公議欲乞檢㑹臣前奏且留燾為同知本院其范純仁告命伏乞追改别作制行下又貼黄稱陛下臨御方逾年正當謹守祖宗法度以銷厭權僭今差除命令偶有差失左右執政既不肯建明而臺諫之言又不䝉聽納則朝政闕失誰復救之陛下既已沮壊給事中所守而又隳言路職業臣所以夙夜憂懼不能自已非獨論燾之進退誠上惜朝廷紀綱所以防㣲杜漸而已是日詳定役法所言乞下諸路除衙前外諸色役人只依見用人數定差今年夏料役錢往罷更不起催官户僧道寺觀单丁女戸出錢助役指揮勿行從之此據榮州舊案增入壬戌詔諸路提㸃刑獄不分路京東西路京東東路並為京東路京西南路京西北路並為京西路秦鳯等路永興軍等路並為陜府西路河北西路河北東路並為河北路淮南西路淮南東路並為淮南路從司馬光閏二月丙申所奏也司馬光言伏覩朝廷改科場制度第一場試本經義第二場試詩賦第三場試論第四場試䇿試新科明法除斷案外試論語孝經義奉聖㫖令禮部與兩省學士待制御史臺國子監司業集議聞奏集議在閏二月二日臣竊有所見不敢不以聞凡取士之道當以德行為先文學為後就文學之中又當以經術為先辭采為後是故周禮大司徒以六德六行賔興萬民漢以賢良方正孝亷質樸敦厚取士中興以後取士尤為精審至於公府掾屬州從事郡國計吏丞史縣功曹鄉嗇夫皆擇賢者為之茍非其人則為世所譏貶是以人人思自砥礪教化興行風俗淳厚乃至後世陵夷雖政刑紊於上而節義立於下有以奸回巧偽致富貴者不為清議所容此乃德化之本源王者所先務不可忽也熹平中詔引諸生能文賦者待制鴻都門下蔡邕力爭以為辭賦小才無益於治不如經術自魏晉以降始貴文章而賤經術以詞人為英俊以儒生為鄙樸下至隋唐雖設明經進士兩科進士日隆而明經日替矣所以然者有司以帖經墨義試明經專取記誦不詢義理其弊至於離經析注務隱爭難多方以誤之是致舉人自㓜至老以夜繼晝腐脣爛舌虚勤勞以求應格詰之以聖人之道瞢若靣墻或不知句讀或音字乖訛乃有司之失非舉人之罪也至於以賦詩論䇿試進士及其末流專用律賦格詩取捨過落擿其落韻失平側偏枯不對蜂腰鶴膝以進退天下士不問其賢不肖雖頑如跖蹻茍程試合格不廢髙第行如淵騫程試不合格不免黜落老死衡茅是致舉人專尚辭華不根道德渉獵鈔節懐挾剿襲以取科名詰之以聖人之道未必皆知其中或逰處放蕩容止輕儇言行醜惡靡所不至者不能無之其為弊亦極矣神宗皇帝深鍳其失於是悉罷詩賦及經學諸科專以經義論䇿試進士此乃革歴代之積弊復先王之令典百世不易之法也但王安石不當以一家私學欲掩蓋先儒令天下學官講解及科場程試同己者取異己者黜使聖人坦明之言轉而陷於竒僻先王中正之道流而入於異端若已論果是先儒果非何患學者不棄彼而從此何必以利害誘脅如此其急也又黜春秋而進孟子廢六藝而尊百家加之但考校文學不勉勵德行此其失也凡謀度國事當守公論不可希時又不可徇俗宜校是非之小大利害之多少使質諸聖人而不謬酌於人情而皆通稽於上古而克合施之當世而可行然後為善也今國家大議科場之法欲盡善盡美以臣所見莫若依先朝成法合明經進士為一科立周易尚書詩周禮儀禮禮記春秋孝經論語為九經令天下學官依注疏講説學者博觀諸家自擇短長各從所好春秋止用左氏傳其公羊穀梁陸淳等説並為諸家孟子止為諸子更不試大義應舉者聽自占習三經以上多少隨意皆須習孝經論語於家状前開坐習某經又毎嵗委陞朝文官保舉一人不拘見在任不在任是本部非本部各舉所知若係親戚亦於舉状内聲説其舉状稱臣竊見某州某縣人某甲有何行能臣今舉堪應經明行修科於後不如所舉臣甘當連坐不辭候奏状到朝廷下禮部貢院置簿各分逐路鈔録本人姓名注舉主官位姓名於其下仍下本州出給公據付本人収執及令本州亦如貢院置簿鈔録凖備開科場日考騐公據其舉状既上之後若所舉之人犯贓私罪至徒以上情理重及違犯名教候斷訖仍収坐舉主奏乞朝廷取勘施行其人未及第者減五等已及第者減三等坐之一如舉選人充京官法臣竊料此法初行其奔競屬請固不能免若朝廷必坐舉主無有所赦行三五人後自皆審擇其人不敢妄舉如此則士之居鄉居家獨處闇室立身行已不敢不審惟懼玷缺有聞於外矣所謂不言之教不肅而成不待學官日訓月察立賞告訐而士行自美矣毎遇開科塲其有舉主者自稱應經明行修舉仍於所投家状前開坐舉主官位姓名有司檢㑹簿上合同方許収接其無舉主者只稱應鄉貢進士舉如常法毎舉人三人以上自相結為一保止保委是正身及是本貫不曾犯真刑無隠憂匿服此外皆不保其本州及貢院考試並依舊法差封彌謄録監門廵捕官程試之日嚴加檢察如舊試經學諸科法各令求已毋得移坐相從託商量相聚傳義傳本懐挾代筆違者扶出第一場先試孝經論語大義五道内孝經一道論語四道先須備載正文次述注疏大意次引諸家異義次以己見評其是非以援據精詳理長文優者為通其次為粗援據疏畧理短文拙者為否三通以上為合格不合格者先次駮放合格者榜引次場就試如舊試經學諸科法或合格人數太少則委試官臨時短中求長詳酌放過次場試尚書次場試詩次場試周禮次場試儀禮次場試禮記次場試春秋次場試周易大義各五道令舉人各隨所習經書就試考校過落如孝經論語法次場試論二道一道於儒家諸子書内出題一道於歴代正史内出題次場試䇿三道皆問時務考䇿之日方依解額及奏名人數定去留編排髙下以經數多者在上經數均以論䇿理長文優者在上其經明行修舉人並於進士前别作一項出榜解發及奏名至御前試時務䇿一道千字以上封彌官於號上題所明經數及舉主人數候考校詳定畢編排之時亦以經數多者在上經數均以䇿理長文優者在上文理均以舉主多者在上其經明行修舉人亦於進士前别作一項編排先放及第其推恩注官比進士特加優異佗時選擇清要官館閣臺諫等並須先取經明行修人其舉主姓名常於官告前聲説如此則舉人皆務尊尚經術窮聖人指趣不敢不精旁覧子史不敢不博又不流放入於異端小説講求時務亦不敢不知所得之士既有行義又能博學又知從政其為國家之用豈不賢於今日之所取乎所有今來乞復詩賦者皆嚮日老舉人止習詩賦不習經義應舉不得故為此説欲以動揺科場制度為己私便朝廷若不欲棄捐舊人俟将來科場進士有特奏名者令試詩賦隨其優劣等第推恩亦無傷也不可以此輕改成法復從弊俗誤惑後生若以為文章之士國家不可無乞許人於試本經合格日投狀乞試雜文於試論次場引試或律詩或歌行或古賦或頌或銘或贊或四六表啟臨時委試官出題目試某文定篇數字數共須五百字以上取辭采髙者為合格俟得解及奏名及第日編排姓名髙下各在經數同等人之上如此則文章之士亦不乏矣至於律令敕式皆當官者所須何必置明法一科使為士者豫習之夫禮之所去刑之所取為士者果能知道義自與法律冥合若其不知但日誦徒流絞斬之書習鍛鍊文致之事為士已成刻薄從政豈有循良非所以長育人材敦厚風俗也朝廷若不欲廢棄已習之人其明法曾得解者依舊應舉未曾得解者不得更應則収拾無遺矣臣愚所見如此伏乞以臣所奏及禮部等官所議牓國子監門及徧下諸州有州學處牓學門令舉人限一月内投状指定何法為善仰本州附逓以聞俟到京齊足更委其他執政看詳參酌從長施行先是光以奏藁示范純仁純仁答光曰舉人難得朝士相知士族近京猶可寒逺之人尤不易矣兼今之朝士未必能過京官選人京官選人未必能如布衣徒令求舉未必有益既欲不廢文章則雜文四六之科不若設在衆人場中不須别設一科也孟子恐不可輕猶黜六經之春秋矣更乞裁度純仁更有一説上禆聰明朝廷欲求衆人之長而元宰先之似非明夷涖衆之義若已陳此書而衆人不隨則虚勞思慮而失宰相體若衆人皆隨則衆人莫如相君矣然恐為諂子媚其間而正人黙而退媚者既多使人或自信為莫已若矣前車可鍳也不若清心以俟衆論可者從之不可便俟衆賢議之如此則逸而易成有害亦可改而責議者少矣若先漏此書之意則諂諛之人能增飾利害迎於公之前矣光欣納之據光集乞先舉經行劄子云三月五日上此議而實録不書今追附本日欣納之語據純仁言行録當考或光聽純仁所説待集議然後出此也集議聖㫖在閏二月二日或移此附彼據范純仁謂先元宰則附閏二月二日差早四月三日蘇轍奏請二十三日先舉經明行修可考王巖叟言臣封還安燾除知樞宻院敕黄伏䝉御批以國家進退大臣皆須以禮况前日延和奏事已嘗靣諭卿今復如是非予所以待大臣之意也可速書讀無執所見者臣既居諫諍之地又假封駮之任不敢俯仰姑息以為陛下守官不敢頋避諛從以為陛下持法今燾差除未安已累恩德命令斜出尤損紀綱此事至重實繫國體臣所以夙夜思慮殆廢寢食屢進愚忠冀囬天意陛下初以燾次補而進之終以燾自辭而聽之是進退大臣以禮也臣以燾為不才不當雜羣賢並進所以上助聖明判白賢佞使在位端亮名節之人知陛下聰明旌别感激自勵是所以副陛下待大臣之意也及延和進對䝉被天奨使臣得安心言事必賜主張在臣之分何以為報須事無大小有利國家者知無不言乃可以副睿眷况今日之事諫官御史議論如一臣之區區豈敢偏執所見伏望聖慈察臣之心恕臣之罪特依前奏早賜施行貼黄稱臣竊恐陛下之意謂已行之命重於更改縁給事中之任本為封駮凡所封駮皆已行之命置官之意蓋以封駮為重而不以已行為重也自唐室以來命令既出由給事中封還格之不下改而後行者不可勝數陛下固已熟知如此更願優容開納使有司得為陛下守官以正綱紀臣以謂為臣之罪莫大於反復臣既再三論列義難却行書讀伏望陛下别賜指揮差官權給事中以全孤臣之守翌日巖叟又言臣累言安燾之進不能協公議不能重朝廷不能服四夷又告命不由門下書讀無以正法度無以持綱紀無以敕羣臣所繫甚大至今未䝉省納施行多士之論皆以為皇帝陛下太皇太后陛下自聽政已來未嘗有一事不愜天下之心今乃因一不材無状之人致累吾君全美之德非獨臣惜之天下愛君之人誰不惜之臣恐有獻言者誤陛下但謂已行之命不可廻不復陳義理當如何此非忠於陛下之言也非明於國體之論也自古及今惟苦口逆耳諫止君父使無過舉為天下後世所議乃忠臣也乃明於國體者也臣竊以明主惟義是從不以廻已行之命為難請引仁宗朝一事以告陛下慶歴三年三月二十一日除夏竦為樞宻使四月八日用御史中丞王拱辰諫官歐陽修等十一疏追竦樞宻使敕當時名儒石介作聖德頌以歌仁宗之美天下流傳至今稱為盛事伏望陛下法而行之不以改已行之命為難而以聽諫為重天下幸甚臣志在愛君其再三之瀆惟陛下察臣之志臣死無恨甲子御史中丞劉摯殿中侍御史吕陶孫升言臣等伏以御史臺肅正紀綱弹劾不法自朝廷至於州縣由宰相及於百官不守典法皆合弹奏今按中書省録黄除安燾知樞宻院事付門下省書讀省審給事中封駮不當奉聖㫖更不書讀門下侍郎省審並不執奏付尚書省吏部出告吏部具給事中不書讀事理申本省尚書省亦不執奏遂以不書讀告命降出所有門下省尚書省僕射侍郎左右丞及付受官并吏部等不守典法有損聖政乞付有司論罪以正朝廷紀綱謹具弹劾以聞貼黄兼范純仁同知樞宻院事係同敕行下仍乞照㑹元祐元年三月初七日摯陶升又言臣等累次論奏安燾知樞宻院不當其録黄不令給事中書讀及經歴受付官並不復奏乞寢罷追改及正其罪今已數日未賜俞允臣等以謂朝廷髙爵重位非有德與功不可虚授若以恩禮假借則不協公議今安燾才望素輕備位樞府已為忝幸一日驟有遷進躐過衆人士論紛然以謂朝廷拜樞府之長殊不遴選非所以鎮社稷服四方也命令既出給事中不得書讀於法式未備而施行門下一省官存職廢紀綱紊亂自此事始尚書僕射左右丞皆無一言建明執奏遂付有司乃是上下廢法中外徇私何以訓治四方維持萬世所繫甚大極可駭嘆恭惟太皇太后陛下保佑聖德以修正法度為急忽有此舉人皆惜之非獨惜安燾差除之過分蓋惜國家法度之廢失也伏望聖慈檢㑹臣等累次論列事理并今來奏陳寢罷安燾除命所有經歴受付官司並乞早正其罪其范純仁録黄指揮仍乞由門下省書讀省審施行元祐元年三月初八日雜録乃以此為孫覺奏誤也乙丑御史中丞劉摯言竊以輔相之任承君代天上以理三光而調四時下以鎮百姓而遂萬物身有德義乃可以尊朝廷心秉公忠乃可以服天下人而非此邦其殆哉伏見宰臣韓縝才鄙望輕不學無術多利欲而好富貴習淺陋而無亷隅前者諂附張誠一夤縁進用備位樞庭近者以王珪死亡次第推移遂至宰席無一言一事有補于國無一長一善見稱于人至於平生之貪殘所至之醜汚前後臺諫已有奏論不假臣言再煩天聽然臣伏見近日毎有差除多不協人情大招物論皆謂縝侵奪吏部員闕恣為中書堂除非親舊者不差非朋比者不録少循公道多立私恩故有才至京闕而便受官經渉嵗序而不得調挾邪者或僥倖有才者或滯淹夫身為大臣手持政柄致此非議不無因依乃是負國以為姦非獨素飡而尸禄方皇帝陛下収延衆正以紹承祖宗之志而太皇太后陛下因革庶事以深圖社稷之安方此之時如縝何補伏望聖慈降臣此言并臣僚論縝章疏付之于外罷縝政事以清朝路以厭羣言貼黄如李南公在河北殘虐累年措事乖當臣曾兩次弹奏而近日却移河東閏二月二十六日郭茂恂在西路醜行狼籍以不職罷到闕便除省郎二月六日尋又選差按行牧地二月二十六日王説以諂奉呉居厚為徐州之害亦用言者罷其省職即日閏二月四日除知宻州蔡京知開封不法見有段繼隆并僧惠信公事在大理寺根勘已見京觀望權要任情曲法臣僚弹奏都不施行乃除真定二月十二日使之帥領一路乃物論之尤不平者皆出於縝也元祐元年三月八日詔今後屯泊戍兵食不盡糧願坐倉収糴者無過三之一以諸路經畧等司言其不便故也樞宻直學士朝議大夫知渭州劉庠卒丙寅御史中丞劉摯殿中侍御史吕陶監察御史孫升言臣等近以安燾除命未當及因給事中封駮遂不令書讀行下累具論列并弹劾門下尚書省經歴官司至今未䝉追改施行臣等待罪風憲見朝廷紀綱頽廢命令乖失茍不竭盡死力以救補之則陛下何用置言路臣等何顔在官次自陛下臨御以來至公為心直道為政故凡見於施為者皆已大服天下之心今忽然行此一事驚駭物聽與從來政事大異甚非所望於陛下者且安燾德凉望輕不自卓立朋附章惇依阿其間今度越衆人無故進位已失公議又制敕不循典故襲斜封以避官司封駮不意聖朝為此必有姦邪之論以誤陛下殊不知中書之宣奉行門下之省審讀乃歴代典章一有不備則不成制命燾等安敢受之哉夫聖人善能救過不能無過故六經不美堯之任已而美其舍已不稱湯之無過而稱其改過今陛下追正此事無甚難也於閤門取燾告身罷燾新命且令依舊同知外范純仁自從别制宣下其門下侍郎尚書僕丞及吏部等經歴奉行官司皆不能建明執奏詿誤聖朝各付有司明正其罪使中外釋然知朝廷尊嚴典憲振肅以銷僥倖之望杜絶私邪之謀而成就陛下納諫之盛德在陛下一言而已何遲遲而不為也貼黄陛下開奨言路多見聽納何獨於此一事不䝉開允縁朝廷正宜守紀綱重命令今差誤非小失臣等所以不避煩瀆期於得請則已伏望檢㑹前後累状付外施行摯章以初九日丙寅上丁夘以蕃官内殿崇班宻納克裕勒威為内殿承制東頭供奉官溪羅為内殿崇班賞戰功也戊辰戸部言成都府路轉運判官蔡朦奏鑄錢三監以樁𣙜茶司本錢比年坑冶興廢鑄錢有限鐵貨積滯而人户坑冶淨利並輸見錢過限則罰迫於罰限則必賤售乞令以合納淨利錢折納鐵應副鑄錢願輸見錢者聽從之御史中丞劉摯奏臣近以安燾差除未安制命施行未審累具状并與官屬連状論列未䝉指揮臣恭惟陛下聖明洞照萬事料於此事非難可否但恐以近日未曾延對執政必然候簾聽日更欲訪問然後改正臣以謂此事是非極甚明白伏望更賜省覧臣等前後章疏今不若出自聖斷但追取燾等告身将范純仁除命作别制行下其燾宜依本官辭免止令同知本院只可批降指揮付三省施行便可了當今來逐官告身久在閤門外言紛紛無益盛徳所有門下尚書省經歴奉行見制敕未完並不建明論奏依阿茍且致陛下命令不由至公直道而行實誤聖政大臣如此不可不有所戒責以申典憲以厲臣節伏乞降臣僚文字付外速賜施行貼黄臣近曾奏聞謂三省亦皆不置長官今樞宻院只置同知兩員實無違礙伏乞聖慈詳酌又貼黄告命未完燾等自不敢祗受則於理須正改又貼黄臣等煩言冒瀆天聽多矣罪不容誅然非有他也職在言路又恃聖度包納故欲自竭以報恩遇而已臣竊慮姦邪之言以謂朝廷命令行而臣等乃欲回改以此疑惑聖聽伏乞深察是非之理臣死罪元祐元年三月十一日右司諫蘇轍言臣聞天下治亂在君子小人進退之間耳氷炭不可以一器梟鸞不可以同栖共鯀臯陶不可以同朝顔回盗跖不可以並處傳曰一薰一蕕十年尚猶有臭夫君子推誠而不疑故易欺孤立而不黨故易危正言而不諱故易間潔亷而不壊故易去小人則不然竊用威福以市私恩交通左右以結主知頑鈍無耻奊詬無節故其合也易而其去之也難誠使君子小人同處則小人必勝君子必去如薰之香一日而亡如蕕之臭十年而存此理之必然者也陛下用司馬光為相雖應務之才有所不周而清德雅望賢愚同敬至於韓縝以屠沽之行害于而家以穿窬之才㐫于而國皆有實状可以覆按行路之人指目非笑紛紜之論不可具載此何等人也而陛下使與光同列以臣度之不過一年縝之邪計必行邪黨必勝光不獲罪而去則必引疾而避矣如人服藥用茯苓烏喙合和而并食之陛下以為茯苓長年之功能勝烏喙殺人之毒乎臣前後六上章論縝過惡乞正典刑至今留中不下陛下必謂縝先朝舊臣不可不用則宜早罷光政事使縝自引其類布列于朝臣等亦當相率而避之毋使邪正雜處而君子終被其禍自古四夷内侮必於新故更代之際主少國疑之時故孝惠髙后之世匈奴桀驁唐太宗初即位突厥奄至渭北今外夷蓄謀安危未分折衝禦侮專在輔弼去嵗敵使入朝見縝在位使副相顧反脣㣲笑此何意也誠見縝無状舉祖宗七百里之地無故與之今其為政我之利也故喜而竊笑耳啟姦辱國必始於是敵人地界之謀出於耶律用正今以為相以闢國七百里而相用正理固當爾而朝廷以蹙國七百里而相縝臣愚所未諭也臣聞之河東父老云韓琦為太原欲置范家東堡范家西堡及赤泥膠三指揮弓箭手恐敵以為言乃召弓手節級髙政使幹其事政率其徒於薩爾台之南北候伺敵人之樵採者輙毆傷之敵以為言則曰此漢界也移文爭之徃反十數卒得其要約自薩爾台以南為漢界而三指揮弓箭手大獲其用及韓縝定地界皆割與之主戸約一千五百餘户客户三四倍之驅迫内徙墳墓廬舍及所種田苗皆委之而南老㓜慟哭所不忍聞遂以天池嶺為界天池北距薩爾台尚二十五六里異時敵欲祈福修天池廟必牒安撫司而後敢入以明廟之屬漢也今亦為敵有髙政者土豪也有威名於北方蕃漢目之為髙天王而天池廟神亦曰髙天王廟方割屬敵時政拊膺大慟謂其徒曰我兄嫂今日陷蕃百姓數千人皆大哭縝為侍從仗節出使而賣國黨冦曾不如一弓手節級此而可忍孰不可忍政數年前為大皇平廵檢年七十餘每見人論縝與燕復之姦即欲食其肉燕復火山軍三界首唐隆鎮一商人也入粟得司户參軍韓絳為宣撫始奏換武邊人疑其細作而縝與之交私狎暱無所不至至呼為燕二亦謂之二哥割地之謀皆出於復敵使梁永蕭禧本以横山下大川為界至七蕃嶺下乃徙入漢地圍褁此嶺凡二十八里意欲自此直至分水嶺界邊民大怒有焦家弓箭手三百餘人毆擊北使奪下梁永等柱斧交椅敵人不敢復南仍自七蕃嶺北轉而西以大川為界燕復至鴈門寨亦為弓箭手所毆匍匐入寨閉門僅免由此觀之邊民皆忠憤不服而敵人亦知理曲無詞使縝稍有臣子忠孝不負本朝之心則七百里之地必不至陷於冦讎之境也火山寜化之間山林饒富財用之藪也自荷葉平蘆牙山雪山一帯直走瓦窑塢南北百餘里東西五十里材木薪炭足以供一路麋鹿雉兎足以飽數州今皆失之雪山有廟河東一路牲幣所走今亦䧟敵中矣人神共怒皆縝之罪中國從來控扼卓望形勢之地如五蕃嶺六蕃嶺七蕃嶺鴻和爾山之類今皆為敵地下視忻代人馬可數異時用精兵數十萬人未易復取而用兵之䇿誰敢復議以此知縝賣國之罪百世不磨若祖宗有靈必不赦縝陛下近者降黜呉居厚王子京蹇周輔之流皆以立法害民耳黜其人改其法不數月而民復業矣如縝之罪智者不能復安疆場之患有不可測者而陛下獨赦之臣不勝為國疾姦憂深思逺之至伏乞檢臣前後章疏下三省兩制雜議正縝之罪以告四方有不如臣言甘伏訕上之罪已已樞宻院言修定諸将廵教例物條從之庚午詔知涇州謝麟權管勾涇原路經畧使司事以劉庠病困故也御集庠八日已卒朝廷未及知耳辛未詔改醴泉觀慈夀殿為夀輝殿工部尚書孫永為吏部尚書吏部侍郎李常為户部尚書常文士少吏幹或疑其不勝任以問司馬光光曰使此人掌邦計則天下知朝廷非急於征利貪吏望風掊克之患庶㡬少息也此據晁説之客話常言伏見朝廷悼法意之未良愍民力之重困凡無名之入悉皆罷去而蠧民害物之吏亦已竄黜疲瘵䝉福天下幸甚竊慮諸路官吏不逹朝廷愛民之意以謂凡所以供給縣官皆可廢弛孟子曰無政事則財用不足賦租課入國政之大者茍或不振何以上佐國用伏望聖慈特下詔令申飭官吏無謂寛民䘏物之德方行於上而於賦租課入廢弛不治以誤大計又言臣近㸃檢得諸路夏秋税及酒税課利全然虧欠上供錢帛例不及額蓋縁轉運司及州縣知佐等妄意觀望務為寛弛恬不知畏伏縁税租課入國用之所賴今肆然廢職上幸任使儻不懲戒深悞大計臣愚伏望聖慈特降指揮下有司修潤舊條至嵗終委本部考校逐路并州縣税賦課利及上供錢帛具虧欠分數上聞從朝廷黜降以戒慢吏李常奏據本集不得其時因常初就職即附見中書舍人胡宗愈為給事中起居舍人蘇軾免試為中書舍人仍賜金紫司農少卿亷正臣都水使者范子淵兩易其任承議郎王鞏為宗正寺丞政目十四日事詔自今堂差不得衝吏部已注授人吕陶論奏先附閏二月末樞宻院言權通判施州朱衍奏蘭州乞招置蕃落廣鋭土兵一萬人為額許陜西諸州土兵投換飬馬一千五百匹共治田一頃五千人為一将分為三畨二畨在屯一畨在城防守教閲逐旬更休詔劉昌祚及相度措置熈河蘭㑹路財用事所各相度以聞詔太學毎嵗以公試歸太學使司業博士自主之如春秋補試法前此鏁院如科場制諫官王巖叟以為言故也巖叟言臣伏見太學毎嵗有公試諸生法朝廷鏁院如科場制欲以與學中一嵗之十二試參考其藝而進之為内舍行之累年所進者無㡬如元豐六年預陞補者三人七年一十四人八年四人而已雖進而為内舍亦於諸生未有沮勸獨比外舍增飡錢八金耳議者以為公試之設無繫利害然事體用度之盛一如科場且以今春公試言之凡用官四十二員胥吏一百七人諸司供事者總二百三十七人鏁宿之法限一月其為煩擾耗蠧不可勝言而於國家無分毫之補臣竊為朝廷惜之臣乞此後以公試歸太學使司業博士自主之如春秋補試法足矣不必張大如此况公私試本庠序之事今設庠序之官既備且衆自當責任俾盡至公人或可疑固在謹擇不當置之而反以疑心待之也伏望聖慈特賜採察施行朝廷亦足以省事而節費舊録云先帝飬士太學考選較試自外舍陞内舍自内舍陞上舍上舍乃免解補官故其試法加嚴今弛以歸太學人得妄冒新録辨曰司業博士太學官也考選較試乃其職也飬士於太學而使學官自主其試此元豐學法兼取行藝之意非以太學之士為妄冒也自先帝飬士至人得妄冒四十五字並刪去詔罷郭茂恂河東陜西按行相度置監以御史有言故也吕陶有章見閏月末軍噐監丞王得君添差監亳州永城縣倉先是得君上書言臣伏覩先帝在御二十年憂勞萬㡬宵旰無倦更易庶政修明百度蓋将措天下於無事之地躋斯民於仁夀之域則先帝之心固無負於天下然而奉法之吏其間有不能宣究聖澤違迕指意故於推行之際不無偷弊陛下嗣位已來逺考古道稽參時變登用賢材咨詢講求天下以為利者舉而行之人情以為弊者革而去之增損緝綴非徒立異而勝之也固欲纂成先志增光前人而已近日言事之臣又復不能體悉聖心遂以先帝之法一切為非指斥㸃塵無所不至臣近見言者乞掩埋京城四門白骨云多是昔日築城開壕死損人夫而謂陛下躬行仁政罷去苛法臣讀此章不勝感憤臣伏惟先帝更新法度之意姑謂時變所當然有所未至陛下今日正革而去之非特陛下成先帝之美是亦先帝所望於陛下如此今建言者不深惟本末乃斥先帝以苛名而自沽訐直之譽陵土未乾肆為醜詆傳播四方人情痛惜書之史冊又将謂何恭惟陛下追慕感愴孝思罔極省覧奏牘宜所不忍伏望聖慈特降指揮應臣僚上章與議改法但許建明事情不得妄有指斥上足以廣孝治下足以抑浮薄天下幸甚臣疎逺㣲賤敢冒天威誠以痛憤所激不能自止内出手詔曰予方開廣言路得君上章謂言事者自沽訐直之譽意欲杜塞人言無状若此可罷職與外任監當舊録云得君敢言人皆嘆息姦臣惡而黜之人情大駭新録已削去熊克九朝通畧得君廣淵之子也宰臣司馬光言今討論經史上自伏羲下至周威烈王二十二年畧序大要合為二十巻名曰稽古録伏望看詳送秘書省正字范祖禹等令繕寫上進候讀祖宗寳訓了日乞取此書進讀從之又言校書郎黄庭堅好學有文即日在本省别無職事欲望特差與范祖禹及男康同校定資治通鑑從之草澤程頥言䝉恩授宣德郎校書郎自昨䝉恩授西京國子監教授方再辭免凖朝㫖令乗逓馬赴闕祗命而來未獲進見遽有此除伏望聖慈令臣入見所降告命不敢當受詔程頥特許朝見仍令上殿二十四日辛未除崇政説書八年十一月丁巳授推官教授元年閏二月十八日丙午授承奉郎後再授宣德校書不記月日政目於閏二月十八日即書汝州團推程頥授宣德校書與御集不同詔陜西路轉運司特許借常平存留錢糴買糧草入内東頭供奉官勾當御藥院梁從政呉靖方乞罷御藥院提㸃宫觀時梁從政見寄理皇城使遥郡防禦使呉靖方寄理左藏庫使遥郡圑練使詔各於見寄官上遷一官轉出内梁從政廻授與有官兒男差提㸃醴泉觀呉靖方額上改轉差提㸃萬夀觀詔河北保甲願投軍人及得上四軍等仗事藝者特許招填合給例物外更增錢五千中軍以下三千比等仗短一指射保甲第一等弓弩並許招刺於本路常平倉錢内支借其不願充軍如祖父母父母願令投軍者委州郡長吏寄招轉運司提舉從右司諫蘇轍請也轍請在閏二月十四日管勾看詳訴理所言看詳進状訴理人若不立定期限竊慮無以結絶欲乞應熈寜九年正月已後至元豐八年三月六日赦前命官諸色人被罪合行訴理並自降今來指揮日與限半年進状先從有司依法定奪如内有不該雪除及事理有所未盡者送本所看詳從之始命看詳訴理在閏月四日舊録云先帝信賞必罰十有九年陵土未乾劉摯建言許被罪者理訴置司設屬以故人人以寃自列既揚先帝之失刑欲示寛大又収被罪不忠之臣悉為己用仍以先帝上賔之日為斷限忠義之士益以歎憤新録辨曰以謂先帝信賞必罰之所加永不可雪又謂被罪者悉不忠之臣永不可用此非先帝之意也其言元豐八年三月六日赦前者蓋用哲宗踐阼大赦之日許其訴理而乃因其疑似輙指為先帝上賔之日非詔㫖也刪去自先帝信賞至歎憤七十八字八月六日又展限殿中侍御史吕陶言伏見安燾之命不送給事中書讀大於法非便臣與劉摯等已嘗論奏拳拳之誠諒煩聖覧臣今為陛下反復思慮此事實繫國體有不可者四須至再具奏陳冒浼天聽夫給事中之職主讀制敕許駮正奏覆陛下不使之讀是廢其職也朝廷設官任人而自廢其職無以訓四方示萬世今門下省録黄於給事中字不書臣某之名而書曰奉聖㫖不送給事中書讀尚書省遂受而付於吏部出告亦如此書臣不知合何法式成何制命此一不可也小人之情巧偽險詐善窺朝廷之釁隙欲逞其志雖防閑禁約謹嚴周宻而猶有撓亂法度以僥倖者陛下儻謂此事已行難於更改不恤人言而遂行之他日或有權臣女謁干請希求非分之事舉援此例乞不付門下省施行臣恐陛下無以却其説蓋已開之於前則難塞之於後此二不可也夫三省大臣皆與國家維持綱紀而同其休戚者今朝廷出令未合於法度而門下侍郎不駮正尚書僕丞亦不論奏惟黙黙奉行以付有司若萬一更有大事處置之間或不中於機㑹則誰為陛下救其失誤此三不可也自陛下臨政以來開廣言路臺諫所奏盡䝉聽納萬分有一可禆治道今以安燾之故獨不允從深恐言事之臣上畏天威自今以去不敢極論得失陛下聰明亦或因而壅蔽此四不可也夫舉一事而有四不可在陛下處之甚難以臣思之甚易何則改過不吝明王之盛德耻過作非古人之深戒故曰人誰無過過而能改善莫大焉又曰君子之過如日月之食過也人皆見之更也人皆仰之且萬機之繁親總獨斷不容無失能知其失而正之則為得矣其於聖政殊不為累今臺諫論列未已士大夫之議紛紛二人者必不敢受命陛下若令閤門繳納安燾范純仁告身續降指揮述其辭免之意除二人皆為同知院事由門下省施行則臺諫更不條奏士大夫之議帖然二人者不敢不拜上全國體下允公論此所謂甚易而不難處也况反汗之嫌小而廢法之失大願陛下權其輕重而行臣不勝懇激待罪之至右諫議大夫孫覺等言臣等伏見朝廷差安燾知樞宻院給事中以為不當駮正封還陛下未信其言遂不送本官書讀施行臣等竊為朝廷惜之夫安燾之才不才差除之當與否自有天下之公論臣皆置而未議所惜者朝廷之法度爾且三省之設事相表裏勢相始終凡命令之出先自中書省一人宣之一人奉之一人行之次由門下省一人讀之一人省之一人審之茍有未當則許駮正然後由尚書省受付施行紀綱程式其宻如此蓋以出命令而尊國體也或闕其一則於制敕不為全中外難以取信近日除吕公著為門下侍郎不由本省而下給事中范純仁力辨其事是也夫國家所以維持四海而傳之萬世者惟守法度而已况當陛下諒闇之日簾聽之時正宜謹守法度不可毫釐差失今安燾之命不送給事中書讀施行乃是封駮一職遂為虚設制敇不全命令不重而法度不存矣斜封授官恐漸起於此臣等所以為朝廷深惜也臣等竊度聖意必謂已行之命難於追改且失序遷則是一舉而兩失矣為安燾者豈可受不全之制敕而處具瞻之地哉莫若因其辭免寢罷新命則君臣之際授受皆得其宜而法度不廢也况朝廷差除因臣下辭免或臺諫論奏而罷與改者多矣豈得於燾獨不改伏望聖慈追還安燾告命及詳覧臣等論列安燾文字别降指揮施行陛下遷進大臣若合公道何故不令給事中依條書讀臣等所論乃繫國體若陛下不賜改正臣等須至再三論奏不敢自已此月末孫覺奏云十四日尚同王覿上殿此章或與覿共奏也今吕陶集亦有此奏門下侍郎吕公著言安燾范純仁除命雖已依中㫖發下而中外紛紛皆以為門下省失官若言者論奏不已則恐轉難處置聞燾方固辭不敢受或因其請特賜俞允則朝廷命令不至乖失其於待燾亦為得體尋有中札問公著不置知院官而兩員並為同知院有故事乎公著既以故事對且言近例同知院有位左右丞上者時燾亦自言近䝉除知樞宻院事非才躐等不協士論致給事中累行封駮在臣之分豈惟新命不敢輙當至於舊職亦難安處望収還成命俾領近州先是范純仁再具奏辭免恩命於是又奏曰臣近以辭免恩命伏䝉聖慈累差中使封回劄子宣諭丁寜者愚賤之臣屢煩天聽再䝉遣使恩典過優固當勉勵疲駑上副任使然臣有微懇須合力陳竊聞臣今來告命不曾經門下省審讀臣聞爵人於朝與衆共之所以昭示至公杜絶私寵乃有司之職守為朝廷之典章此萬古不易之規而聖王之通道也今聞臺諫臣僚皆有文字論列而未䝉陛下聽從陛下必謂進用輔臣已有成命不當因人之言輕有回改以示睿斷欲全恩禮臣之愚慮竊謂不然方今㧞擢臣僚頒宣號令多因公卿宻啟或非陛下素知若不經歴有司必然難得審當今來臺諫官若俱有文字即是朝野公言其言當則人皆謂之忠賢其言不當則人皆謂之䜛黨各自繫其名節豈有輕易奏論非同一人私竊之言可以誤惑聖聽陛下當坦然聽信不必致疑彼皆陛下選用正直使為耳目之官豈有不用耳目而可以視聽於天下也况陛下臨御以來聞善必納從諫如流今乃於臣命特令不過門下言者必不肯已㣲臣必不敢居久鬰衆情恐失羣望不若因臣辭免特賜允從則上可以資陛下納諫之明下可以成愚臣安分之志而俾近臣得職言路開通廣帝堯舍已從人之風協成湯從諫弗咈之義一舉而數善皆得在聖明可不務乎與夫㣲臣叨被誤恩沮格公議利害相去逺矣伏望陛下察臣竭誠為國不為身謀特賜留神采納天下幸甚
