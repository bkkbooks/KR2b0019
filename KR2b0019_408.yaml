body:
  text: 續資治通鑑長編卷四百四宋李燾撰哲宗元祐二年八月辛巳朝奉郎右司諫賈易知懷州自蘇軾以䇿題事為臺諫官所言而言者多與程頥善軾頥既交惡其黨迭相攻易獨建言請併逐二人又言吕陶黨助軾兄弟而文彥博實主之語侵彥博及范純仁太皇太后怒欲峻責易吕公著言易所言頗切直惟詆大臣為太甚苐不可復處諌列耳太皇太后曰不責易此亦難作宗祚切公等自與皇帝議之公著曰不先逐臣易責命亦不可行爭久之乃止罷諫職既退公著謂同列曰諫官所論得失未足言顧主上方富于春秋異時將有進導諛之説以惑上心者當今之時正賴左右力諍不可預使人主輕厭言者也于是吕大防劉摯王存私相顧而歎曰吕公仁者之勇乃至于此此據吕公著家傳稍刪潤之賈易言文彥博吕陶黨助蘇軾蘇轍轍奏乞外任劄子可見易到懷州謝上表又言軾持密命以告人志在朋邪而害正轍又乞取問實狀據此則易所言大略具在獨不知范純仁何與也又頥乃易黨而易請併逐之未知信否頥雖與易同逐自緣他事為孔文仲彈劾不知家傳何以云然又家傳載易責命在七月二十四日今從實録蓋七月二十四日有旨及是乃施行耳舊録云以侵毁大臣言事失當故黜之新録削去侵毁大臣四字通直郎崇政殿説書程頥罷經筵權同管勾西京國子監左諫議大夫孔文仲言頥人品纎汙天資憸巧貪黷請求元無鄉曲之行奔走交結常在公卿之門不獨交口褒美又至連章論奏一見而除朝籍再見而升經筵臣頃任起居舍人屢侍講席觀頥陳説凡經義所在全無發明必因藉一事泛濫援引借無根之語以搖撼聖聽推難考之迹以眩惑淵慮上德未有嗜好而常啓以無近酒色上意未有信嚮而常開以勿用小人豈惟勸導以所不為實亦矯欺以所無有每至講罷必曲為卑佞附合之語借如曰雖使孔子復生為陛下陳説不過如此又如曰伏望陛下燕間之餘深思臣之説無忘臣之論又如曰臣不敢子細敷奏慮煩聖聽恐有所疑伏乞非時特賜宣問容臣一一開陳當陛下三年不言之際頥無日無此語以感切上聽而陛下亦必黽勉為之應答又如陛下因咳嗽罷講及御邇英學士以下侍講讀者六七人頥官最小乃越次獨候問聖體橫僭過甚並無職分如唐之王伾王叔文李訓鄭注是也伾以詩書侍講叔文以棊待詔二惡交踵終兆永貞之亂注以藥術用訓以易義進兩邪合縱卒致甘露之禍臣訪聞頥有家不及治有祿不及養日跨匹馬奔馳權利遍謁貴臣歷造臺諫其謁貴臣也必暗竊重輕之意出以語人收為私恩及有差除若合符節是以人皆憚懼之而又深德之其造臺諌也脅肩蹙額屏人促席或以氣使或以術動今日當論列某事異時當排擊此人而臺諫之中常有儔類竭盡死力如朱光庭杜純賈易之流是也臣居京師近二年頥未嘗過臣門臣比除臺諫官頥即來訪臣先談賈易之賢又賀與易同官遂語及吕陶事曰吕陶曽補司諫命已久閣今聞復下何也如此則賈明叔必不安職矣明叔者指賈易字也臣答曰何以言之頥曰明叔近有文字攻陶之罪已數日矣今陶設為司諌明叔畏義知恥者也言既不行其辭去決矣公能坐觀明叔之去乎臣曰將如之何頥曰此事在公也公之責重也推頥之言必是與陶有隙又欲諷臣攻陶助易也臣素與頥不相識只在經筵相遇又未嘗過臣一旦乃非意相干説諭如此陛下以清明安靜為治于上而頥乃鼓騰利口間諜羣臣使之相爭鬬于下紛紛擾擾無有定日如是者彌年矣伏惟太皇太后陛下皇帝陛下鑒察真偽雖在萬里之外無所遁逃况于咫尺之近而肯容如頥者穢滓班列變亂白黑乎蓋緣執政推舉之過遂誤知人明哲之德伏望論正頥罪儻未誅戮且當放還田里以示典刑御史中丞胡宗愈亦言先帝聚士以學教人以經三舍科條固已精密宜一切仍舊因深斥頥短謂不宜使在朝廷先是頥赴講會上瘡疹不坐已纍日退詣宰相問曰上不御殿知否曰不知曰二聖臨朝上不御殿太皇太后不當獨坐且上疾而宰相不知可為寒心翌日吕公著等以頥言奏遂詣問疾上不悅故黜之此據舊録稍刪潤之但刪去頥雅為羣姦所知至是言者以為間亂黜之非其罪等語新録辨誣云頥知上疾而告于宰臣斯未為過而言者乃以騰口為罪又取市井間語以加之甚矣今刪去按史官但當録其實耳當時孔文仲實以劾頥頥亦坐是黜安可沒而不書若辨其是非則付來者可也胡宗愈舊傳云程頥更定太學規制率出已見無所統紀學者病之宗愈曰先帝聚士以學教人以經三舍科條固已精密宜一切仍舊深斥頥短謂不宜使在朝廷新傳刪改云程頥更定太學規制宗愈曰先帝學法固已精密冝志仍舊其辨誣云程頥當世名儒胡宗愈議諭亦多不苟豈應深斥頥短謂不宜使在朝廷此皆足以惑衆非所宜載今刪去按宗愈既駁頥學制因斥頥不宜在朝廷當時必有此章未可謂舊録誣宗愈也吕本中雜説劉器之言元豐時見司馬君實君實説王介甫初為政舊日同志峭直之士已漸不用猶欲用中立之士如李公擇孫莘老諸人後來如中立之士亦不用君實作俚語云却用一隊阿躋底物事器之又言元祐中間見君實已深不喜正叔君實亦作俚語曰幾時教你如此崛起來待陽遷起居舍人與罷了經筵今仍附見頥因三上章乞納官歸田里不報又乞致仕亦不報此據頥集附見頥本傳載頥所以罷講筵乃云坐上疏乞于延和講説為顧臨孔文仲所劾誤也上疏乃在去年夏末及今一年有餘矣雖今年三月亦曽再上疏然所以罷講筵要不緣此今不取癸未禮部員外郎顔復充崇政殿説書兼判登聞鼓院正議大夫提舉崇福宮吕惠卿責授建寧軍節度副使本州安置法當檢舉詔更候一年取旨九月十二日移秦州尋不行詔創立改法並先次施行應修條者類聚半嵗一進呈以正條入册頒行若非海行法即書所入門目裁去繁文行下所屬仍類奏六曹季輪郎官點檢刪節具事目申尚書省樞密院令左右司承旨司看詳當否甚者取旨賞罰從樞密院言也詔在京置宣武第十三至第十五三指揮廣勇左第三軍第一右第三軍第一兩指揮以先銷廢寬衣天武第六指揮會計一嵗廩給别招中下禁軍以補其額故也以西蕃寇洮河州詔被焚屋舍土棚計間給錢發窖藏糧斛之家計口給食至夏熟日止死事者人給絹七匹此係五月間事見五月二日詔復進納人四任十考改官舊法仍增舉者二人文彥博奏臣近面奉聖旨具自來除授官職次序一本進呈臣略具除改舊制節目如後吏部選人兩任親民有舉主升通判通判兩任滿有舉主升知州軍自此以上敘升今謂之常調知州軍有績效或有舉薦名實相副者特擢升轉運使副判官或提點刑獄省府推判官今謂之出常調轉運使有路分輕重逺近之差河北陜西河東三路為重路嵗滿多任三司副使或任江淮都大發運使發運使任滿亦充三司副使成都路次三路任滿亦有充三司副使或江淮發運使京東西淮南又其次江南東西荆湖南北兩浙路又次之二廣福建梓利夔路為逺小已上三等路分轉運使副任滿或就移近上次等路分或歸任省府判官漸次擢充三路重任以至三司副使內提點刑獄則不拘路分輕重除授轉運使副省府判官或逐急藉才差知大藩鎮者其歸亦多任三司副使或直除修撰待制者三司副使嵗滿即除待制有本官是前行郎中少卿或除諫議大夫者有資淺而除集賢殿修撰充都發運使後亦除待制三院御史舊制多是兩任通判已上舉充嵗滿多差充省府判官或諸路轉運副使纍遷至三路歲滿充三司副使又嵗滿除待制御史或言事稱職公論所推即非次拔擢繫自特恩正言司諫自來遷擢無定制或兼帶館職文行著聞或議論識體方正敢言朝廷所知臨時不次擢用本無常法三館職事本育才待用之地例當在館久任其間資地人品素髙者除修起居注即今起居郎舍人遇知制誥有闕即試補即今中書舍人已上並舊制甄别資品履歷次第除注之法與今來官制或小異而大同更乞與三省參詳進呈乙酉詔三省參詳資品履歷按新舊制除授實録乙酉太師文彥博進除改舊制甄别資品除授之制詔三省參詳資品履歷按新舊制除授今以彥博集所載除改舊制節目詳著於癸未日又詔吏户刑部郎官任滿治狀顯著者長二保奏與升任訖令再任仍升一任資序通及五年理為兩任諸司郎中亦如之從彥博請也十月六日罷之中書侍郎吕大防為西京會聖宫應天禪院奉安神宗皇帝御容禮儀使以吕公著辭疾故也丙戌朝奉郎殿中侍御史韓川為左司諌奉議郎直龍圖閣權發遣潤州朱服權發遣福州言者尋攻其罪改泉州六月二十八日孔文仲云云九月十四日又自福州改泉州今并書言者攻其罪據政目丁亥左諫議大夫孔文仲左正言丁騭進對太皇太后宣諭曰一心為國勿為朋比通議大夫給事中張問提舉醴泉觀問移疾逾兩月就私第書省中事御史趙㞦論之問亦自陳故有是命尋以正議大夫致仕致仕在二十四日今并書之皇城使內侍押班馮宗道都大管勾迎奉神宗皇帝神御赴西京會聖宫河州南川寨戰守有勞漢蕃官兵遷官資賜帛有差江淮等路發運副使路昌衡言糧綱到京欠折緣元豐六年指揮不分輕重發遣向下結斷顯為寬縱致近年侵盜愈多請今後少欠並依元條在京及缷納處折會結斷杖已下即發赴泗州及裝發處從之新無詔應緣綱運事京東排岸司弛慢聽發運司申户部新無提點利州路刑獄公事岑象求言撲買場務違欠課利己科罪者蠲罰錢之半從之新無戊子詔北人及兩輸人應送他州者除婦人小口外並依配軍法差兵級部送新無庚寅西南羅蕃遣人入貢辛卯知鎮戎軍張之諫兼涇原路鈐轄為九月十日鎮戎被圍事書此權涇原路鈐轄王光祖權發遣本路副總管光祖權副總管在十四日今并書之國子司業黃隱為鴻臚少卿先是劉摯吕陶上官均為御史日皆有章劾隱考校遷補徇私違法妄意迎合時政凡生員試卷引用王安石經義者不問是非輒加排斥又預出榜學舍謂朝廷已復詩賦使學者知傾邪浮薄不可任太學長二章皆不報及是乃左遷制詞責以煩言屢至士不誠服故也摯陶各一章均三章並附元年十月末陶又一章附二年正月十八日隱自司業改鴻少此據政目在二年八月十二日實録在十五日今從政目制詞曾肇所作見肇西垣集第四卷二十四日出知泉州司農少卿宋彭年權知棣州以御史趙㞦言其險刻也詔蠲免二浙鹽亭户課鹽舊錢錢塘仁和鹽官昌國亭户計丁納鹽歷嵗已久至是除之樞密院言河北河東陜西保甲不一請並以五家為保丁雖多止作一保其正長合隨家保置從之禁私賣易銅鍮石器犯者依私有法增曹州寃句縣巡檢太常博士吕希純為宗正寺丞此據政目希純為太常博士政目在八年四月十四日朝請郎楊完男特推恩以完嘗為禮官館職因疾請致仕未受命前死尚書左丞劉摯言之故有是命元祐二年八月四日中大夫守尚書左丞劉摯劄子臣伏見故朝請郎楊完博學能文行義純正熙寧中數有臣僚薦先帝賜之召對有所任使多在清選而完以直道自守不茍合于世未嘗一至權貴之門甘貧守節有大臣之風其後以館職嵗滿乞補外衢州之政東南稱之臣昔與完纍任同官實知其人昨凖敕舉監司以完應詔今年春蒙聖恩召完赴闕將有所用不幸道中感疾至杭州遂乞致仕告命至杭州之前六日完已卒矣于法親受方得推恩臣誠悲完不幸不獲副陛下任用又不能忍死數日待致仕告命今既死只有一子而極貧無以自存臣不勝愚懇欲望聖慈憫完平生節操曽歷書局禮官文館之任今已被召旨而歿于道路望曲賜哀憐特出睿恩官其孤子以全善人之祿以為士大夫行義之勸貼黃稱完至杭州以四月十二日乞致仕五月十六日以疾卒當月二十二日致仕之命到州不及親受止五六日而已壬辰詔唐鄧強盜及藏匿家權依重法地分法新無癸巳三省樞密院言夏國自秉常告喪既弔恤其國又封册其子兩宫賜與甚厚國中部落老幼無不歡躍知朝廷更無征伐從此可保無事不謂彼國強酋獨有異意風聞乾順不治國事有梁葉普者擅權立威凡故主近親及舊來任事之人多為所害以為若邊塞無事則姦謀不成故輒敢犯邊以請地為名不遣賀坤成節謝封册使反覆邀乞别懷異圗背恩逆理莫此為甚若不加誅無以威示外國詔夏國久亂新主孤幼其輒敢犯邊及不遣使賀謝皆緣強臣梁葉普等擅權逆命陰有異圗即非其主與國人之罪豈可遽欲興師深入討伐將使無罪向化之人例遭誅戮宜令諸路帥臣各嚴兵備無得先起事端其所發兵馬權屯次邊如葉普等能幡然改圖忠事其國效順朝廷本國上表章通貢奉特仰收接許其自新若果敢犯順即令諸路乘便深入務要誅鋤首惡不得濫及無辜內首領素不附葉普欲自拔逃難及葉普同黨有能歸順者聽所在以聞仍曉諭沿邊漢蕃梁葉普已見五月二日三年四月二十四日西賊攻塞門寨具注葉普事合并考六年十月五日又有葉普破殺事甲午西南蕃遣人入貢乙未户部侍郎張頡為太皇太后賀遼主生辰使皇城使楊永節副之中書舍人曾肇為皇帝賀遼主生辰使皇城使向綽副之太僕少卿王欽臣為太皇太后賀遼國正旦使西作坊使劉用賔副之工部郎中盛陶為皇帝賀遼國正旦使西頭供奉官閣門祗候趙希魯副之三省言應曾歷省府推判官臺諫寺監長二郎官監司人並合堂除而知州軍闕少每于吏部取差有妨本部擬授詔以前後條參酌使兩不相妨立法以聞于是以知州軍闕一百四上朝廷以九十八分吏部吏部狀檢會元祐二年四月四日聖旨應曽歷省府推判官臺諫寺監長二郎官監司人並合堂除勘會上件合堂除知州軍者自來少得本等闕次逐旋于吏部取闕差除致妨在部待闕人已撥員闕令吏部將前後條貫參詳如何得兩不相妨可以久逺推行立法聞奏當部勘會知府軍闕本部除差通判知縣人外共一百十三處內有泰海等州舊係堂除見却係本部差人今相度欲乞將大名應天河南成都太原江寧潁昌河中鳯翔興元府永興成德淮陽軍河陽荆南陜府秦延青鄆杭瀛定慶渭熙桂陳兖襄鄧潞揚亳蘇越洪潭泉福梓徐曹蔡滑相邢同晉廬夀湖明宣滄齊潁恩澶冀潤汝虔鄭邠遂密涇真楚登饒吉濮濟單沂博泗棣宿建滁和舒懷衛商虢漢利通解泰海絳耀秀溫鄂唐州一百四處並朝廷差人更不下吏部取闕邵武廣濟信陽無為髙郵永靜永寧通利平定威勝廣德南康建昌南安漢陽興化廣安軍婺濠河南劍萊濰淄隨郢均房金蘄黃光濵深磁趙澤汾遼坊丹寧威鳯隴台處衢睦常平江池峽嶽安鼎復衡道永栁邵漳蜀彭眉綿邛簡嘉果合資滎渝逹涪南雄韶澧閬洋興劍潮惠夔信吹州九十八處並吏部差人此據邸報增注一百四處闕三處九十八處闕八處當考詔修立回賜于闐國信分物法殿中侍御史韓川言朝廷之于人才常欲推至公以博采及其立法則幾于利權勢以抑孤寒常欲收勤績以赴用而要其終則莫不取虛名而廢實效近委太中大夫以上嵗于諸州通判人內舉充知州遇三路及諸路四縣以上處闕先差本等次通判皆須被舉者餘雖考課上等亦不得預朝廷之意固欲得人而所薦未必公也今太中大夫以上率在京師惟馳騖請求因緣宛轉者得之為多迹逺地寒者固鮮夫寒士雖久歷為郡及治狀已著考課入等偶無近侍之薦則反在通判下不許入三路又不許入四縣路處彼獲一薦章即升躐等級超壓老舊何其幸耶又以州四縣以上為繁劇三縣以下為事簡事之繁簡在民户衆寡不繫邑之多少臣請以薦舉之意績效之實相參修正此條庶幾無弊其所差知州軍更不限縣數詔吏部立法以聞監察御史方蒙言畿內沿汴蔡河諸邑屯列禁旅分置將領雖以蕃衛帝室亦取其漕運便順芻秣易供也近者畿內諸邑軍食無備請下有司計置縱未能有三年之積亦不可無一嵗之計詔户部速計置常令有備丁酉詔諸路䇿應其罷預定將分遇賊入寇即報鄰路帥司于日下發將兵赴之若臨時乘機可以牽制或賊據要害則聽依隔路例擇便牽制從熙河等路經略司請也九月十六日可考戊戌知岷州种誼復洮州擒果莊二十八日奏初誼捐金帛結果莊部下首領卦斯敦什寧使伺賊中動息會遣人來報果莊駐洮州巴羅桑阿克衮等軍馬已放歸族惟以密壘強揚等數族軍馬自隨猶萬人誼即言其狀于遊師雄及聞經略司諸以熙河蕃漢及通逺軍蕃兵五將合本州軍馬直趨洮州此兵法所謂先人有奪人之心者也師雄納其言經略使劉舜卿觀望不欲乃曰賊計誠然當堅壁清野以待之師雄嘗建議乞先檄果莊索洮州所虜生口不聽即諭舜卿命誼出討及師雄至熙州聞夏人遣大首領威明阿烏往青唐計事鄂特凌古囚本朝使者髙升而青唐酋長或來告舜卿以董戩死鄂特凌古祕不發喪詐稱嗣子當立請于朝廷已而復殺董戩妻森摩氏囚溫錫沁部族首領國人怨之若中國以兵問罪于境上當殺鄂特凌古以獻願立董戩之後以安國人舜卿未納師雄聞之喜曰此天贊我也亟具利害上于朝且曰若遣趙醇忠于青唐城如府州折氏世受封爵則西方可保百年無變矣且乞先敵未動亟伐之不報已而夏國主乾順盡召十二監軍兵屯會州天都山西南國母與梁葉普等率之對蘭州通逺軍而營欲與果莊連謀入寇鄂特凌古發河北兵十萬由嘉木卓城橋渡河圍河州又發廓州兵五萬餘人與夏人會熙州城東王家平師雄諜知之謂舜卿曰事急矣不可復待奏稟宜聽誼等出兵急裝輕齎並洮州而進舜卿曰彼衆我寡奈何師雄曰在謀不在衆此機一失後將噬臍儻不濟焉願為首戮議三夕舜卿不得已從之于是遣總管姚兕部洮西領武勝正兵合河州熟户搗嘉木卓城脅取倫布宗部族遣人走間道焚河橋以絶西援誼部洮東以岷州蕃將包順為前鋒由格隆谷會通逺寨蕃兵宵濟巴凌川期是月十五日出師十六日兕破倫布宗百里間焚蕩無孑遺斬首千餘級十七日攻嘉木卓城殺傷相當日晡焚其飛橋移時羌十餘萬奄至旌旗鎧仗亘數十里至橋不得渡望風而潰十八日晚誼至洮州壁青藏峽會夜大雨及旦重霧晦冥誼引兵圍城部分甫畢霧忽開羌望見官軍以為從天而下亟乘城拒守漢兵四面攻之其板築猶未畢也士皆鏖鬬呼聲動天地一鼓破之擒果莊及其大首領九人斬馘數千獲牛羊器甲數萬計城中萬餘人為官軍所蹙入洮水而死者幾半誼固識果莊既被擒戲問曰别後安否果莊曰天不使我復故土命也師雄度官軍必勝前命工為檻車遂縛載果莊送闕下此據張舜民所作种誼遊師雄墓志及汪藻青唐録青唐録云鄂特凌古初立以為朝廷畏已乃與夏國偽相梁葉普通約以熙河岷三州還西蕃蘭州定西城還夏國果莊又陰以印信文字結漢界熙河岷秦階文龍威茂州通逺軍熟户為內應二年三月遂舉兵寇洮州虜趙醇忠及殺熟户大首領皇城使經斡穆等數千人駐兵常家山分築洮州為兩城以居北城周四里樓櫓十七南城周七百步樓櫓七跨洮為飛橋五月一日引步騎七萬圍河州南川寨焚廬舍二萬五千區發窖粟三萬斛脅從杓羊家二族六千餘口井導夏人數萬敗官軍殺都監吳猛而去朝廷深憂之為出兵百五十指揮無慮七萬餘人戍邊且博詢士大夫可與邊臣計畫者大臣以奉議郎遊師雄應詔師雄白宰相以為奉使絶塞軍中可否間不容髮如俟中覆恐失機會請如古者大夫出疆悉得専決朝廷從之師雄乃乞先索歸還洮州所虜生口如不聽命即諭知熙州劉舜卿檄种誼出師取洮州七月三日師雄至熙河聞夏人遣大首領威明阿烏往青唐計事鄂特凌古囚本朝使者髙升兼聞鄂特凌古殺其國母森摩氏國人怨之師雄奏乞因其人心誅鄂特凌古立趙醇忠又奏乞先出兵伐其謀不報時夏國主乾順受朝廷封册不謝盡召十二監軍兵屯會州天都山西南國母與梁葉普等帥之對蘭州通逺軍而營欲約與果莊連謀入寇中分熙河鄂特凌古發河北兵十萬十七日由嘉木卓城橋渡河圍河州又發廓州兵五萬餘人與夏人會熙州城東王家平師雄諜知之謂舜卿曰事急矣不可復待奏稟請分兵兩道急裝輕齎並洮州而進命大將姚兕部洮西領武勝正兵合河州熟户搗嘉木卓城脅取倫布宗部族遣人走間道焚河橋以絶西援种誼部洮東以岷州蕃將包順為前鋒由格隆谷會通逺寨蕃兵宵濟巴凌川期八月十五日出師十六日兕破倫布宗百里間焚蕩無孑遺斬首千餘級十七日攻嘉木卓城殺傷相當日晡焚其飛橋移時羌十餘萬奄至旌旗鎧仗亘數十里至橋不得渡望風而潰十八日晚誼至洮州壁青藏峽會夜大兩及旦重霧晦冥誼引兵圍城部分甫畢霧忽開羌望官軍以為從天而下亟乘城拒守漢兵四面攻之其板築猶未畢也士皆鏖鬬呼聲動天地一鼓破之擒果莊及其大首領九人斬馘數千獲牛羊器甲數萬計城中萬餘人為官軍所蹙入洮水而死者幾半師雄度官軍必勝前命工為檻車至是縳果莊以獻夏人聞之即日舉軍遁去捷書聞宰臣百官表賀于延和殿詔果莊首惡已擒應隨順犯邊羌户令劉舜卿告諭安存免罪仍舊住止願率衆入漢者收納犒設等第以聞果莊子結斡磋并以次兒男如五日內同首領入漢則免果莊死結斡磋等級優與官祿出限不從許以次首領殺併擒捕比類與大首領一等推恩九月獻果莊于崇政殿詰犯邊之狀及諭以罪當誅死聽招其子及部屬歸附以自贖果莊服從釋縛後果莊病死京師而其子卒不至責授朝請大夫少府少監分司南京李定卒庚子新知鄧州資政殿大學士韓維知汝州維解機政出守而其兄絳言其病悴請汝州以便醫故有是命西蕃首領伊州刺史森摩乾展為銀州團練使禮賔副使溫錫沁為瓜州團練使各增月給茶綵及賜銀絹有差以不從果莊犯邊及密報機事故也辛丑吏部尚書蘇頌翰林學士蘇軾兵部侍郎趙彥若充實録院修撰校書郎李德芻為集賢校理倉部郎中王宗望計置陜西路邊糴集賢校理兵部郎中葉祖洽罷新除禮部郎中以給事中趙君錫言其人物凡下頃對䇿訕及宗廟故也十二月二十一日蘇軾等參定祖洽䇿語或并入此據劉攽制集祖洽除禮部郎中與上官均兵部員外郎同制七月十六日可考涇原路經略司言夏人寇三川諸寨敗之夏人寇三川據張舜民劉昌祚墓志乃是攻鎮戎軍後實録于九月十日書鎮戎八月二十二日先書三川當考蘇轍制集云西賊攻圍鎮戎軍南川寨等處韓緒等戰守有勞或傷中韓緒韓進轉兩官趙説臧遜各轉一官事在十一月末制詞云夏戎背恩侵我疆埸烏合之羣遍滿山谷諸將戮力清野以須或斬馘酋豪折其凶氣或堅完壁壘保我蒸徒雖矢刃夷傷而忠節彌壯遂使醜類奪氣引兵遁還得不償費無以復令其下論功行賞國有舊章疇其勞能增其爵秩朕既無德不報爾尚勉于立功按南川寨在河州南四十三里三川寨在鎮戎軍西三十五里此云鎮戎軍南川寨恐制集字或誤也癸卯承議郎殿中侍御史上官均為禮部員外郎按實録七月十三日均已除比部員外郎并吕陶亦移見十六日矣不知何故今猶以殿院改禮外或當改云新比部員外郎上官均改禮部員外郎又據劉攽制集則均除兵外與葉祖洽禮中同制祖洽既遷兵中故均自兵外改禮外恐不當稱比外朝奉郎集賢校理孔平仲為太常博士鴻臚少卿黃隱知泉州以右正言丁騭論其黨附程頥避韓絳易名因不才罷司業遷少卿非是故有是命尋改泗州改泗州在九月二日今并書新録謂黨附易名皆不見事實徒出于一時言者之口遂刪去今從舊録元豐八年十二月二十五日元年十月末二年正月十八日并八月十二日可考詔賜文彥博吕公著曰朕聞几杖以優賢著之典禮耋老無下拜書于春秋魏太傅鍾繇以足疾乘車就坐自爾三公有疾以為故事而唐司徒馬燧亦以老疾自力對于延英詔使母拜今吾耄老大臣四朝之舊德隆而望重任大而憂深者惟卿與公著而已方資其蓍龜之告豈責以筋力之禮今後入朝凡有拜禮冝並特免卿其専有為之報略無益之儀母或固辭以稱朕意詔門下中書後省修立司封考功格式先次施行甲辰西南張羅方三蕃遣人入貢新京西轉運副使吕陶改梓州路陶初有京西之命即引嫌辭避復上疏曰陛下知臣無他哀憐全庇未遂誅戮猶欲付之一道恩德深厚其幸極矣然臣尚敢冒鈇鉞之威傾布腹心求免寄任者蓋為陛下以臣為是黨人以臣為非受恩于陛下得罪于黨人故也陛下以臣為是公也黨人以臣為非私也受恩于陛下則生可保也得罪于黨人則死不可保也當此之時臣欲不言而去則負陛下拔擢生成之恩不有鬼誅必有人禍臣欲言之而去則議者必謂臣因罷職補外憤怒狂躁敢肆譊譊則臣言與不言皆可罪也雖然臣今日在諌列則猶可言明日罷去則不可復言抱恨而死目不瞑矣臣寧取憤怒狂躁之責而不忍負陛下拔擢生成之恩也蓋為皇帝陛下承祖宗社稷之寄恭默不言太皇太后保祐嗣聖務以德治簾外之事有所不知每與謀天下之政者惟執政數人而已每與詢求朝廷之闕失者惟臺諫數人而已每使談演經術開發聖性以充廣道德仁義之實者惟講讀數人而已則居此職者安忍以回邪欺罔報陛下乎今臺官以阿附彈奏而執政應之于內講官以怨仇欲報而諫臣助之于外在臣一介固不足恤然此風一啓非朝廷之福也何則今日惡一小官而擊去明日憾一大吏而中傷推此而上何施不可雖陛下他日覺之亦恐根株已深而剗除不易也况臣今日以後不復面見清光無由更上章疏故于此時敢效古人之尸諌詳悉條陳當今之事以補前疏之略願陛下知之者六然後退就鈇鉞亦未為晚伏望陛下寬臣憤怒狂躁之罪一賜省覽幸甚幸甚臣聞本朝故事為御史者有兩府是舉主並須回避蓋置臺諫以檢察兩府之過若用其門生故吏慮致徇私此祖宗御下之機權至深至密近嵗以來此制隳紊只避親戚不避舉主昨除杜純為侍御史明知是韓維親家略不回避奮然用之無復忌憚中外傳聞莫不駭歎蓋杜紘之子為韓氏壻純與維情愛豈不相厚動息豈不相通維有過則純必不言維有怨則純必為之報害政之端莫甚于此今純雖已罷去臣深恐他日兩府又用其親戚及門生故吏為臺諫表裏作事以誤朝廷臣今日不可不言而去此願陛下知之者一也純之本末如此而人不敢言者畏韓氏之勢也韓氏之勢誠可畏矣宗道為左司宗古為司封宗師為衛尉劉攽為中書舍人未甚過也陛下方以安靜為治進退大臣務全恩禮臣亦未敢指此詆韓維也至于近日則頗専恣以宗文為光祿丞又有待次而權軍器丞者又有奪吏部之闕而為北京通判者乃其子與姪也孔宗翰為刑部侍郎杜紘為大理卿張元方為府界提點辛雍為太常博士馬玿為清河輦運宋彭年為司農少卿楊景謨知開封縣謝景溫免成都得楊州郭茂恂貪贓放罪得晉州徐耘待闕差磨勘染院物帛皆其親也臣方欲極力言之而自遭枉奏勢未暇及今韓維雖已罷免臣恐他日宰執有如維之強橫臣今日亦不敢不言而去此願陛下知之者二也朝廷以太平無事尊賢重道起程頤于山林之下而任以勸講日侍天子之側而訪以道義則非禮勿動非義勿言可也今乃講讀之罷往往與內侍密語非其體也向者皇帝陛下偶因發嗽未御講筵頥乃申請乞今後須得關報亦駭中外之聽不知義也詳定學制疏繆無取禮部逐一駁正三省至今依違未決議者非之臣又風聞頥在汝州侵占民田數家起訟邢恕在彼兩平其事然未審其實有無果無之則是他人以惡語加之也果有之則殊非朝廷所以待頥之意也臣知此久矣未深信之而不言也至于今日則不可不言而去此願陛下知之者三也古者冢宰制國用于嵗杪量入以為出周公制禮太宰以九式均節財用然則邦家經費乃執政所當留意也今聚斂之弊蠲除已盡而浮冗之費殊少裁節雖降詔委官裁減冗費而所減者惟將官公使一項嵗可省十萬貫其他則皆細碎毫末耳臣恐他時所入不足以備所出未免過取于民冝詔三省與户部裁定國費革僥幸戒姑息上以益國下以厚民此願陛下知之者四也國家宗社所以延長萬世德澤及人淪浹骨髓者蓋懲秦漢以來至于五代之弊無族誅有貸法故也天聖中詔天下刑名疑慮情理可憫者皆許上請例蒙寬貸州郡應有不應奏之罪則與免駮勘自昔至今由死得生者不知幾萬人矣近嵗刪去此條于是天下之獄在可疑可不疑可憫可不憫之間者皆畏駮勘更不奏請率皆文致其罪處之死地臣恐刑獄益密而濫死者衆則與免駮勘之條不可不復此願陛下知之者五也夫君子小人之道各有消長觀其大勢何如則治亂可知矣君子並進則治小人彚征則亂世主所以防微杜漸而謹其用舍也今朝廷選拔材器澄清流品勤亦至矣而間有小人雜于其中不可不慮也王安禮者有吏材曉民事委以藩郡乃其所長然其人操行汚濁心膽粗豪神宗亦嘗稱為惡人既差知成都必過闕下不宜留在朝廷况許將今冬成資宜令速赴新任盧秉者昔任兩浙提刑創興鹽法虐害東南至今瘡痍未復在渭州處置邊事惟求合李憲之意曲奉于憲有如尊親憲嘗薦之秉將次服除決不可用宜置之散地苖時中李南公路昌衡輩皆刻薄之資見于已試而又任之以經略發運使之職必無以副朝廷德意而惠養元元矣此願陛下知之者六也凡此六者陛下既已知之願以聖謀英斷收攬威權運于掌上使大臣小吏不敢為欺天罔日之事則宗社幸甚生民幸甚臣雖朝去闕廷暮死溝瀆亦無憾矣臣既與當途之人多有仇怨今轉漕之職必難安處未免煩言重凂天聽伏乞除臣逺小一郡俾安其分于是詔陶與梓州路轉運判官陳鵬兩易其任蓋從陶之請云上官均以七月十三日除比部員外郎與陶除京西運副同日並已移見十六日實録又于八月二十四日癸卯書均自殿院改禮外初不稱比外然則均未嘗為比外也陶以八月二十八日丁未改梓州路按陶家告命改梓州路乃二十五日甲辰也今附甲辰陶改梓州路蓋陶自請不知均改禮部員外郎何故當并考是日翰林學士承旨鄧溫伯以母喪去位此據政目四年九月除吏書乙巳供備庫使內侍押班梁惟簡為西京左藏庫使朝請大夫祕閣校理許懋為右司郎中丙午翰林學士蘇軾言按禮經八十拜君命一坐再至所謂君命者傳命而拜非朝見也然且不免周天子賜齊桓公胙曰伯舅耋老無下拜桓公曰天威不違顔咫尺下拜登受所謂無下拜者無拜于堂下非不拜也然且不敢鍾繇以足疾乘車就坐疑若不拜然亦無明文君前乘車豈足為法而馬燧延英不拜蓋是臨時優禮無今後遂不復拜之文祖宗舊例如吕端之流以老疾進對亦止于臨時傳宣不拜今來彥博公著今後免拜指揮自是朝廷優賢貴老度越古今無可議者但有司合守典禮兼恐彥博公著終不敢當不若允其所請若聖恩優憫老臣眷眷不已遇其朝見間或傳宣不拜足以為非常之恩所有不允批答臣未敢撰從之詔吕公著步履艱難自今每遇入朝許令男一人入殿扶掖又詔吕公著乞外任已降指揮不允令諸處無得收接文字御集八月二十七日翰林學士蘇軾言臣竊聞熙河經略司奏生擒西蕃首領果莊宰相欲以明日稱賀臣愚以為偏師獨克固亦可慶然行于明日臣謂太速如聞本路出兵非一見有一將方指青唐此乃鄂特凌古巢穴若更待三五日間必續有奏報賀亦未晚今者俘獲醜虜功誠不細賞功勸後固不應輕然朝廷方欲輯治邊防整肅驕慢若捷奏朝至舉朝夕賀則邊臣聞之自謂不世之竒功或恩禮太過則將驕卒惰後無以使邊臣願朝廷鎮之以靜示之以不可測昔謝安破苻堅書至安與客圍棋不輟曰小兒輩已遂破賊安亦非矯情蓋萬目觀望事體應爾所有明日稱賀乞更詳酌指揮臣受恩至深不敢不盡出位妄言罪當萬死丁未文彥博上章辭不拜恩命詔曰朕優禮師傅逹德齒之尊以亟拜為可略古之道也卿尊朝廷明君臣之分以不拜為未安禮之節也道並行而不悖義有重以難移勉徇所陳不忘嘉歎所請宜允熙河蘭會路經略司言岷州行營將官种誼收復洮州生擒西蕃大首領果莊青宜結詔首惡已擒應隨順犯邊羌户令劉舜卿告諭安存免罪仍舊住止願率衆入漢者收納犒設等第以聞其結斡磋并果莊以次兒男限五日同首領入漢則果莊特貸死結斡磋等級優與官祿出限不從許次首領殺併擒捉比類與大首領一等推恩仍賜銀絹各一千充賞其結斡磋以下新録削去戊申以復洮州俘獲果莊宰臣率百官表賀于延和殿舊録云果莊西蕃大酋也桀黠有智謀所部兵鋭數為邊患熙寧中誘陷景思立先帝屢詔王韶欲生致之至是與夏人解仇為援築洮州居之詔帥臣以便宜從事又遣遊師雄至熙州諭旨劉舜卿遣洮東安撫种誼破其城擒送闕下始董戩以果莊為將鄂特凌古為相倚二人為重鄂特凌古久欲篡獨疑果莊及董戩病先帝欲俟其亡委果莊圖之盡取其地未及施行及董戩死鄂特凌古遂篡果莊猶豫不自安未決舜卿破其城取之新録辨曰復洮州俘果莊具載實録又當時監察御史常安民有疏論賞种誼太薄其略以為果莊熙寧中于踏白城誘陷景思立先帝嘗下募賞之令元祐中乃陰連西夏遂犯疆土入據洮州屠掠酋豪無敢誰何是時种誼守岷州果莊之兵已逼劉舜卿以朝廷方休兵息民恬不為慮其後朝廷遣遊師雄使熙河趣舜卿出兵然且猶豫纍日始用誼謀既出焚飛橋以斷蕃兵之路扼衝隘以絶傳報之音卒能生擒果莊致之闕下西夏五十萬衆至境遁去此事實也而紹聖之臣猥以其功不自己出乃以為因其猶豫而取之此不可不辨今刪去舊文按常安民為御史在紹聖元年十月安民此章亦未見是月中書舍人蘇轍言臣伏見西夏頃自秉常之禍人心離二梁氏與星多二族分據東西廂兵馬勢力相敵疑阻日深入寇之謀自此衰息朝廷略加招納隨即服從使介相尋臣禮甚至只自今年春末夏初以來始有桀心出兵數萬掩襲涇原殺虜弓箭手數千人復歸巢穴朝廷方自安衆難于用武接以君臣之禮加以䇿命之恩特遣使人厚賜金幣獸心不悛敢為侮慢輒以地界為詞不復入謝至于坤成賀使亦遂不遣中外臣子聞者無不憤怒思食其肉臣忝備侍從主憂臣辱義不辭勞况臣擢自小官列于禁近議論幾事既其本職感激思報宜異常人是以冒昧獻言不避罪戾庶幾聖意由此感悟雖被譴逐臣不恨也臣竊惟當今之務以為必先知致寇之端由審行事之得失然後料敵情之所在定制敵之長算誠使四者畢陳于前羌戎小醜勢亦無能為也董戩本與西夏世為仇讎元昊之亂仁宗賴其牽制梁氏之篡神宗藉其征討世效忠力非諸蕃之比乃者董戩老病其相鄂特凌古擅其國事與其妻契丹公主殺其二妻森摩氏其大將果莊及溫錫沁等皆心懷不服鄂特凌古欺罔朝廷自稱董戩嗣子朝廷不察情偽不原逆順即以節鉞付之謀之不臧患自此起鄂特凌古既知失衆虐用威刑衆心日離而果莊自謂與鄂特凌古比肩一體顧居其下心常不悅夏人乘此間隙折節下之先與鄂特凌古解仇結歡令轉説果莊舉兵入寇復誘脅星多貝中令于涇原竊發黨與既立羽翼既成是以敢肆狂言以動朝聽向若鄂特凌古以董戩之死來告立嗣朝廷因其所請遍問果莊溫錫沁等以誰實當立若衆以鄂特凌古為可立則既立之後衆必無辭若以為不可則分董戩之舊族以三使額授此三人鄂特凌古無僥幸之命果莊無怨望之意則夏人無與為援安能動搖加以數年以來朝廷本厭兵事羌中測知此意亦以自安頃者忽命熙河點集人馬大城西關仍云來年當築康古聲實既暴敵心不寧舉兵自強釁亦由此此所謂致寇之端由也先帝昔因梁氏篡逆之禍舉兵誅討侵攘地界為怨至深羌戎之性重于復讎計其思報之心未嘗一日忘也徒以喪亂相繼兵力凋殘陛下臨御之初意切懷納是以連年入貢以休息其民雖有恭順之言蓋亦非其本意矣假令犯順固猶有詞今朝廷因其承襲之後賜之册命捐金錢二十餘萬緡以為之禮彼既與我有君臣之分然後可責以忠順之節朝廷此舉于義甚長而羌人無謀遂肆桀驁內則其國中士民自知不直必不為用外則中國兵將皆有鬬志易以立功曲直之機于此始定雖棄捐金幣以封殖寇讎小人謂之失䇿而分别曲直以激勵將士智者謂之得計此所謂行事之得失也元昊本懷大志長于用兵諒祚天付凶狂輕用其衆頃為邊患皆歷嵗年然而國小力微終以困弊今梁氏専國數與星多不協內自多難而欲外侮中原料其姦謀蓋非元昊諒祚之比矣意謂二聖在位恭默守成仁澤之深逺近所悉既無用武之意可肆無厭之求蘭會諸城鄜延五寨好請不獲勢脅必從以為狂言一聞求無不得今朝廷既已漸為邊備益兵練將則羌人之心已乖本計不過秋冬寒涼之後小小跳梁以嘗試朝廷而已若朝廷執意不搖守邊無失則欵塞請盟本無愧恥若朝廷用心不一惟務求和則求請百端漸不可忍此所謂敵情之所在也若欲應敵必先正名夏人初起邪謀必有二説其一以為慢詞既逹則地界可得無窮之請因以滋彰其一以為雖不得地實亦無損猖狂力屈稍復求和中國厭兵勢無不許方其不遜則張皇事勢夸示諸戎及其柔伏則略為恭順使中國黽勉而聽今朝廷遣兵積粟地界之請固已不從然而號令未明逆順未著臣恐夏人未知朝廷不憚用兵之意無以折其姦心又恐將來姦窮力屈略修臣禮便與講和要約不堅必難持久昔趙欲與秦為講其謀臣虞卿以為從趙為講不若從秦為講于是東結齊人而秦人自至區區之趙尚知出此而况堂堂中國畏避蓄縮偷于無事不一分别曲直而反聽命于羌人哉臣願陛下明降詔書榜沿邊諸郡其大意略曰夏國頃自諒祚喪亡先帝舉兵弔伐既絶嵗賜復禁和市羌中窮困一絹之直至十餘千又命沿邊將吏迭行攻討橫山一帶皆棄不敢耕窮守沙漠衣食併竭老少窮餓不能自存朕統御四海均覆無外憫此一方窮而無告遂敕諸道帥臣禁止侵掠自是近塞之田始復耕墾既通和市復許入貢使者一至賜豫不資販易而歸獲利無算傳聞羌中得此厚利父子兄弟始有生理朕猶念孤童幼弱部族擕二若非本朝賜之䇿命假以寵靈則何以威伏酋豪保其疆土是時士大夫咸謂羌人反覆心未可知使者將行言猶未巳朕有存亡繼絶之志欲修祖宗爵命諸候之典以為寧人負我斷而不疑故遣使出疆授以禮命金錢幣帛相屬于道邊人父老觀者太息以為仁義之厚古所未有而狼子野心飽而背德不遣謝使不賀坤成朕以君道撫之而不以臣禮報朕天地所疾將相咸怒朕惟狂謀逆節止其一二姦臣國人何辜當被殺戮是以弭兵安衆未議攻討然而逆順之理不可不明其令沿邊諸將飭勵兵馬廣為儲偫敢有犯塞即殺無赦彼既背逆天理不有人禍必有鬼誅姑修吾疆以待其變臣料此命一出羌人愧畏雖未即欵伏而姦計沮屈無以號令其下諸路兵民知彼曲我直人思致死勇氣一發邊聲自倍此必然之勢也今朝廷日夕備邊常若寇至而但曲加隱忍不降此命使羌衆一旦犯境終亦不免交鋒若聽臣此言要之亦不出兵坐而待敵初無有異而使士氣感忿以思戰敵情知難而自屈求和之請其至必速此所謂制敵之長算也臣竊聞朝廷近者添屯兵將增廣邊儲議絶和市使熙河帥臣招徠鄂特凌古果莊溫錫沁星多貝中等此兵法所謂上兵伐謀不戰而屈人者陛下若能饒之以金錢而寬其繩墨使將帥得盡其心間諜得盡其力則事無不成而敵漸可制矣然有一事似非臣所得言者但以蒙國厚恩不敢不盡昔熙寧元豐之間所行政令雖未必便民然先帝操之以法濟之以威是以令無不從而事無不舉頃者朝廷削去苛法施行仁政可謂善矣然而刑政不明多行姑息中外觀望靡然有縱弛怠惰之風平居無事姑以偷安可耳今敵方不順勝負之變蓋未可知緩急之際威令無素何以使衆臣謂宜因事正法以明示天下臣前所言去嵗大臣承用鄂特凌古欺罔之奏授以節制致令果莊懷憤入寇夏人乘釁違命此則當時宰相樞密使副苟簡無謀之罪也近者涇原賊馬至者數萬殺略數千斥堠不明備禦不及熙河賊退今經纍月而殺傷焚蕩之奏至今未至此則將帥弛慢不畏朝廷之罪也陛下恬不為怪略無責問政之不修孰大于此中外相視以為疑怪朝廷方將使人蹈白刃赴湯火臣有以知其不能矣昔公孫𢎞為相諸侯有逆謀請歸侯印以塞責諸葛亮為相任馬謖不當請自貶三等以右將軍領事蓋大臣體國不惜身自降黜為衆行法今陛下何不取去嵗册命鄂特凌古與議大臣不論去位在位皆奪一官至于兩路將帥雖寄任不改而法不可廢皆使隨罪行罰以此號令四方庶幾知所畏憚政修于朝廷之上而敵人恐懼于千里之外勢之所至不足怪也今陛下未能正羣臣而望西羌之畏威不可得矣臣聞范仲淹守慶州因葛懷敏之敗請以任將非人因兩府遜謝損其勳爵而復其位以激厲諸將感慰邊兵時雖不用而仲淹之言至今惜之臣雖不敏究觀往事以為可施于今不敢默已小臣狂僭斧鉞之誅無所逃避惟陛下裁察貼黃稱或言鄂特凌古之請命與乾順之嗣立事體無異今臣言册命乾順為得䇿而封拜鄂特凌古為失計似言之未當者臣以為不然鄂特凌古之請命可否在我而乾順之嗣立朝廷且不得而知况能制其可否乎故臣以乾順之命為是以鄂特凌古之命為非不為妄論也轍本集自注云元祐二年八月乃繫之為户部侍郎時誤也果莊捷奏以二十七日到此蓋二十七日以前轍所論雖無施行然可見當時公事情今附月末轍以鄂特凌古所結董戩之妻乃契丹主他書未見已附正月十二日當考
