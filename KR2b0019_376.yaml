body:
  text: 續資治通鑑長編卷三百七十二宋李燾撰哲宗元祐元年三月壬申詔安燾堅辭知樞密院事特依所乞依舊同知樞密院事仍令班左丞李清臣上范純仁告未經給事中書讀見在閣門可勾收别出録黃告身遍經門下省官施行吕公著家傳以為十四日辛未有此詔舊録繫之十五日壬申今從舊録臺諌及公著論列此事前後不一而舊録略不少見新録又并此詔削去不知何意也王巖叟朝論云論安燾告命不由門下省進呈范純仁申明事狀令繳入來待內中行出又再三言朝政闕失但安心一一言來再論安燾告命不由門下事云國家此來置官司只為要上下相關防相審察况給事喉舌之任若不由過則不成命令何所不可上曰重改對曰謹出令審而後發則無反汗之失不審則必有反汗之事不改又却不可臣每見人權攝職事多務茍且皆曰三五日間何須如此臣雖至愚不敢以此心事陛下不敢一日愧於職事如陛下必欲令施行則願聖慈别差一人權給事中全孤臣之守臣誓以死節報陛下臣聞安燾在都堂與執政議政事有默默終日未嘗贊一言之時士大夫莫不相與笑鄙譏議輕其不才日望别進賢傑以代其人今聞更加超進甚驚物聽陛下容之已鬱公議况可以登進上樞之任與宰相對掌機政豈可輕授三月十五日巳時批出安燾宜從所請依舊同知樞密院事其乞郡不行令學士院降詔勘會試吏部尚書范純仁除同知樞密院事告未經給事中書讀宜令追納别翻敕黃施行先是太皇太后遣勾當內東門司梁惟簡賜文彥博手詔曰豫宫中閲故書得卿神宗時所上親書奏章見卿論議切於治要至誠憂國忠義可見深用嘉歎卿平時所藴如此况當兹國難之際想多憂勤豫佐助機政斯逾年矣雖勉旃聽覽以天下之廣萬幾之繁深慮不逮顧我元老宜有咨詢如近者黜陟臣僚因革庶政公議不孚夏國未附禦以何術卿之所知賢人堪大任者亟當論薦用副柬求并所訪事可條具聞奏切佇至言以補闕失是日三月十五彥博具奏據元祐章疏彥博此奏以三月十五日上今附本月日臣伏蒙聖恩特差中使降手詔詢訪仰被訓旨俯集兢榮恭惟太皇太后陛下坤厚博載天光大明自聽政以來發號施令及進賢退愚時政汚隆或因或革小大愜當中外欣悅所謂宗社無疆之福太平寖隆之時矣而猶謙恭退託以臣遭遇纍聖久竊重任又謂其犬馬之齒加長宜有重言曲賜下問乃詢黃髮采芻蕘之義臣敢不勉竭愚忠粗禆虛佇夫治體之大莫大乎任賢納諫近者所用輔相所擢諫憲皆久積時望大協輿情必能弼直獻納上副陛下求治深切之心以至罷去市易減損青苖免納役錢寬保甲按閲之頻遂農民耕種之業市井畎畝之人歡欣之聲必已逹於天聽矣豈在老臣條陳而後詳然上之數事有損無益不可久行而罷者本非朝廷所圖皆是近年以來臣僚急進僥幸成風率務妄起事端自求總領粗有微效則過求恩賞事若有害曽無責罰欲其省官省事民安政治不可得矣為今之要當革此弊自去年以來斥去聚斂之臣頗寬農商之利四民樂業萬國歡心無名之入多已削除有常之用當要豐足今之户部實主邦計尚書侍郎郎中員外未聞精擇久任惟見屢遷數易欲使何人專任其責國之大計安所望哉此乃朝廷所宜先而不可忽也又謂臣之所知堪大任者臣素愚昧艱於知人然纍玷鈞衡之任惟在薦賢以圖報國方其當軸任人極於遴柬拔十得五安敢庶幾及出領外藩將踰一紀朝中多士罕有識知雖有所聞莫經所試輕議論薦恐未審詳然熟聞士論謂樞密直學士劉庠端正有守雖已在近職久從外補臣向在樞密庠在太原邊事民政靜鎮不擾光祿大夫前吏部侍郎蘇頌性行淳和學問該博於本朝故事多所詳記若備顧問議論當有禆益朝奉大夫京西路提點刑獄劉奉世才力精明所守堅正向為樞密院檢詳及中書檢正頗得時譽若並召還左右宜有所補更乞聖明詳擇或更有新進可副柬求容臣博訪别具奏陳况天下之大必有多士置於周行然自數十年來飬育人材有所未至蓋鄉舉里選不兼取文行禮部覆試類收膚淺之學今若條理學校貢舉之法庶幾取士得人以次擢升大任則濟濟以寧如周之盛方朝廷大施仁政勤恤民隱親民之官專在守令臣謂宜申戒吏部遴擇其人政得以和民受其賜前代銓衡授官之後多赴政府引驗問其所長或采其已試之效而遣之間有昏謬不才類多退落如此則郡縣得人政事修舉又用人之法當各因其才器孔門四科分政事文學之品亦須就其長而授其職職乃無曠前朝選試文學之士即置於館閣育材之地漸進用之雜學士待制皆主侍從備顧問議論以禆時政今則盡補外任臣謂宜略定員數留充左右供職久當察其器識緩急執政闕人便可僉議進擢臣蒙詔旨詢訪敢不傾盡所藴但以老昏言無倫理不任隕越惶懼之至所問夏國事宜不欲雜於此奏謹具别劄開陳所兾便於詳覽又奏臣伏讀聖問有可禦西夏之術臣去年始聞西人欲求內附臣以為方國家多事務早安靜奏乞朝廷恢覆載之量廣示開納御四夷之術羈縻而已由此可以息兵內固吾圉外夷懷服中夏安寧則太平之風浸隆浸久兼曽繳進神宗專令臣男貽慶齎賜臣親書詔一本所貴審知神宗聖意止務安邊不欲輕舉皆是邊臣希望功賞為國生事徼幸萬一以致兵食困匱財力殫耗必料此詔已經聖覽今復蒙下問可禦西夏之術臣愚何足以仰副虛佇臣竊見西人自去年以來凡數次入朝即未見修歲時常貢之禮亦未聞請常賜之物度其姦心必有所待當此之際朝廷亦須有以待之邊臣亦必有以制之若更如向時种諤徐禧輩料敵不精謀攻失策致誤邊事即關中之人其心搖矣自靈武永樂王師不振之後兵勢民力尚未全復狡羌竊發必能制乎即如向時种諤輩皆云西人辭弱取如拾芥又可信乎國之大事豈可數為狂計所誤朝廷於此固當熟計而深念事欲美成計須先定當責成邊臣審料賊勢精選諜者密窺賊形必先事以待之使賊計不行邊壘有備此亦困羌夷之策為人謀之小勝或西人欵塞請覲詰其所由出於善意即導之使來俟至延安帥臣密察亦當得其要領先時奏聞廟堂之上可以預料而審度之俟至闕下知其所來必有所為因其所為之可否或議或詰審而應之可者即從否即已若議及疆土須廟堂之上衆謀大同茍有後艱同任其責或取與之間謀有同異各述利害理須明白後或不應謀果不臧自任其責廟謀一定邊計粗寧天下小康堂上髙枕伏惟陛下聖明逺大之計固已先定出於衆智豈俟臣之過慮然采芻蕘擇狂言諒其誠而不責其妄幸甚貼黃稱臣以謂事有利害者必究其利害之極而斷其取舍之當其理得矣無容更相顧望議論不決乃欲遺賊於君父則安用大臣環慶路經略使范純粹言元年三月十五日奏臣自元豐元年在陜西路備貟監司適當軍興之時至七年乃得還朝廷故陜西邊事粗知始末昨蒙除受今任赴官過闕雖蒙特許朝覲纍狀乞上殿奏稟職事尋凖樞密院劄子催發出門故臣所欲敷奏職事了不獲陳今既到任身逺朝廷須至披露論析仰瀆聖聽竊以夏國效順歲久邊隅無事夷夏晏然祇因种諤沈括數輩希功造事欺罔朝廷以為夏國失勢衆怨親叛無甚勞費席卷可平或請覆巢長驅或請進築開拓致朝廷大舉戈甲諸路並興固嘗長驅而無功亦已進築而失利衆説並試一無所成徒致關輔瘡痍公私困敝百姓流徙國兵凋殘雖諸路各有收復故寨廢州多非中國所利之地深在賊境創為興修橫添兵屯倍置器械加費金幣益耗芻糧盡關輔公私之力曽不足以自支故日煩朝廷自內應副而邊防釁隙日有可憂彼夏國者深沉自居未即報怨蓋亦以頻年應敵部族疲勞橫山之人失業良久勢力未復舉動或艱故比時以來數數遣使迹如效順實乃有謀外則不議土疆內則不修常貢既形欵我之計又為自資之謀臣聞纍畨使人貨販滋廣通約所得不減三數百萬其自資之謀亦可見矣諸路軍兵經纍次凋沮之餘雖諸將招填略充舊數而新人眇少未堪戰鬭朝廷但知兵籍數目而未知士卒之氣全未振奮臣未測朝廷謀畫所向但見近降朝旨應因軍興增置兵將官吏及添戍軍馬並各抽還外議謂朝廷晏然自以為無事人竊憂之則其欵我之計亦已行矣常貢未修彼所以為邊事之未竟也疆土不議彼所以為將來舉事之端也理勢無可疑者然則邊防大事未見成畫臣恐歲月滋久彼力漸強待草豐榖實之秋弓徑馬肥之際稱兵有請暴肆跳梁倉卒之間何以遣應若臨時或議許可則國體有傷若至期復舉干將則生靈被害惟編户之方困豈見籍之能堪臣之心憂言有不忍臣昨者既不得奏稟聖算尋曽往見執政大臣語此憂事雖所慮亦或未至而為謀未知所從如臣之愚亦何敢以自任惟是思慮所得參訪羣言不敢內有所懷願陳煩説臣竊以為諸路所取夏人之地固未足繫彼國存亡之機而所以乘困而必爭者蓋謂日侵月削而不校則小國之勢在所深憂故自保之計不得不然一國共謀豈不及此由是推之乃知所爭之地未棄則邊釁無時而可除也夫中國者禮義之所自出也今彼之與我必爭者顧禮義當如何耳臣竊觀近時之論邊事者猶謂彼既困怠無所能為加以數年可期柔服臣獨以為不然彼所以默默自處未有所請但為自全之計者乃所以飬鋭待時也是豈終困之理哉謂新地城壘自興復以來縻耗巨萬斥棄為難殊不思前日之已費者不可復追而他日之未費者尚可救也臣伏見陛下即位以來纍降德音凡聚斂掊克之令有害民生者悉行蠲除四海兆民歡呼愛戴蒙被聖澤可謂盛矣臣竊思念天下之費莫大於饋邊今邊事未有措置他日一有調度帑藏空虛無以取濟則聚斂傷民之令恐不能輒已此又不可不慮者也臣願陛下靜占往鑒斷自聖心因彼遣使再三而未有所請之時乘彼詞禮恭順而姦謀未露之日特降詔旨槩述先帝所以問罪之意具道秉常所以復國之由嘉其傾盡之誠諭以逆順之理趣令先以前後戰陳虜陷官貟使臣將吏丁夫悉歸朝廷其所削之地並從給賜如此則邊釁可期於止息生靈有望於安全亦足使四夷知朝廷前日興師之意在于拯患問罪而不在乎疆土之利也中國陷冦之人又知朝廷愛人而不愛地也神功偉績可謂難名臣非不知危言異議自速禍悔竊念不獨守邊之職理當建明重以事君之方義無阿避臣於先帝臨御之日數陳邊事屢竭迂淺伏蒙先帝曲賜優容每有稱可非獨敢於此日驟為首尾異同之論古人有言知豫之為取者政之寶也取豫之間正在今日伏望陛下察臣情在憂國志切愛君以臣今言少關聖慮如其粗有可採即乞宣付三省樞密院令大臣共議事機貴速伏乞早賜處決庶不為朝廷異時之患則天下幸甚傳曰事君有犯無隱臣則無隱甚矣其如位卑言高妄議朝廷機政實犯天憲不敢以誅竄自逃貼黃臣頃者聞北敵曽有文字到朝廷請勾還西邊兵馬臣昨充北朝國信使日其接伴敵使嘗語及夏國之事亦云曽有文字教南朝罷兵臣是時隨宜應對尋具奏聞臣以謂西北脣齒之國萬一北敵狡慢或一日又以夏國失疆土為言即朝廷至是却似難為處決今日機會恐不可忽此臣所謂事機貴速者也臣竊見所得西夏舊城堡寨如河東路葭蘆吳堡鄜延路米脂義合浮圖環慶路安疆等寨皆係深在賊疆於漢界地利形勢略無所利而費芻糧皆是倍價計置及歲歲勞煩稅户逺入輸納至于運致錢帛器械置官遣戌一一艱苦今日若行斥棄委是並無關害惟是鄜延路塞門一寨係當中路之衝平川廣闊去帥府地里甚近别無地里控扼之險自得塞門增逺四十餘里可為中路屏蔽粗為邊防之利兼此塞門一寨舊是漢城棄陷以來年歲未逺似與其餘城寨利害有殊朝廷若議存守則理或有名更繫朝廷裁決所有蘭會之地耗蠧尤深如聞朝廷已遣使相視蘭會不敢縷細開陳邊事至重乞賜聖覽此奏係臣男正夫書寫不敢付吏以害機事癸酉詔以季秋擇日有事於明堂左司諫王巖叟言臣伏覩御札以今年季秋擇日有事于明堂四海內外含生之倫無不歡喜年老深識之士皆相與言曰吾君即位以來發政施仁全得祖宗之懿今宗祀禮成大賚天下必能寬賦斂釋逋負求賢才興典禮省刑罰無遺匹夫無間微物無略細事害之所在必蠲除之以慰滿羣生之望矣陛下觀天下之心所望於陛下者如何其可忽哉臣每歎前世赦宥之弊莫不幸小人則多而惠良民則寡撫親近則厚霑幽逺則踈非前期以精講之先事以審裁之廣覽博聽而兼收之則無以曲盡物情深得民意此陛下不可不重也伏望聖慈特取嘉祐以來大禮赦書事節最詳恩最厚者體以為法無削其所可施仍增其所未備凡今臣僚上言并四方百姓所陳疾苦一可行者皆於將來赦文內推為聖意以行之使美不分於臣下而恩一出於朝廷及乞詔執政大臣各陳時弊數端之要密先以聞修赦文日添入庶廣陛下仁民愛物之盛德激揚歡心動蕩和氣以永社稷無疆之休天下幸甚貼黃稱臣伏乞陛下暇日閲嘉祐以來逐次大禮赦書只觀文字之少多已見霑恩之廣狹願陛下丁寧詔諭執政早令總集事目加意修定要在精詳推大聖澤前來宰執惟以掊斂民利為功不以推廣上恩為意每草赦書不過令本房吏人裁定而已曽不自留心也三省言昨罷諸路提點刑獄司管勾而開封府界遂令提點司主之竊慮錢物久而侵紊詔開封府界置提點刑獄官一貟依諸路提點刑獄職事仍以葉溫叟為之罷提舉府界盜賊司罷提刑司管勾當考不知初置此管勾何事恐是管勾常平此有脫字葉溫叟是月五日方以權秦鳯路提點刑獄為陜西路提點刑獄忽有此移改當考揚王皓荆王頵言向在先朝已蒙恩許外第居處今營造將畢如聞五月可遷入伏望早賜指揮詔答未允三上章乃許之詔京東路將兵差出不係將軍馬請受依元豐八年十月指揮特權免封樁三年詔講讀官更不輪資善堂宿直宿直是何年月日詔給事中王震等言凖詔看詳六曹寺監文字稽違法令請在京官司吏人稽緩制書及文書稽程並合依律斷罪及六曹寺監各置杖直醫人獄子一名本司并本轄事非追究者杖已下並本處勘斷從之王震此時安在户部言自新法已前舊法役人主典官物致有失負水火亡失虛降帳籍之數欲令逐司並特與除放從之又言熙河蘭會路經略司奏繳到鄂特凌古奏董戩遺表進奉乞行回賜詔董戩更不支賜其鄂特凌古依元豐元年所降指揮賜絹百匹永興軍等路提刑司言昨民庶進狀興平縣靈寶鄉諸村土地約二百四十餘頃並納二稅熙寧五年本縣逼勒退為牧地依舊耕種令本司定奪聞奏如本路更有將民户稅地改為牧地者亦依此今看詳欲免納租錢令依舊從之舊録云先帝罷監以其地募民佃出租市良馬然其地久為民冒占故稍按籍收還未嘗以逼勒也新録辨曰本縣逼勒退為牧地此乃民庶進狀之詞而監司定奪欲乞依舊則舊非牧地可知有無逼勒乃縣令之職部使者所當察也今每事皆託先帝為言不可以取信後世自先帝罷監至以逼勒也三十五字並刪去詔梁從政與轉昭宣使更不回授兒男樞密院言三路保甲有借到人户私馬並還其直從之權管勾熙河蘭會路經略司公事趙濟言凖朝旨差賜董戩身死物色使臣令訪青唐事畢選奉職高升押賜親見鄂特凌古坐董戩廳大首領果莊并濟特卜䇿結斯卜等二人並在左右與從來應事董戩之人盡事鄂特凌古兼問得首領蕃部等言董戩臨死時勾諸族首領赴青唐城約以鄂特凌古承代今首領蕃部等並各服從詔許承襲仍除節度使每年支賜茶絹衣帶等並依二月十二日所得指揮二月二十日詔問趙濟詳定役法所言坊場河渡錢元用支酬衙前重難添酒錢等凖備場務陪費如此之類名件不一除依條合支外欲並拘留以備招募衙前支酬重難及應緣役事之用從之右司諫蘇轍言臣竊見臺諌前後上章論韓縝過惡乞行屏退皆留中不出人人惶惑不測聖意所在臣頃與李覺上殿奏事靣聞德音以為進退大臣當存國體雖知縝不協人望要須因其求去而後出之臣即奏言陛下以恩禮遇大臣雖盛德之事而臣等身有言責言茍不效義不可止但恐自此章疏紛紜煩瀆聖聽於縝愈為不便至今四十餘日臺諌文字日以益多而縝晏然據位略無陳請臣觀其意思蓋欲佯為不知固執權寵遷延歲月然後因間乘隙以害言者用心如此而陛下望其愧畏公議自引而去知其難矣縝與蔡確章惇均是姦邪皆能虐民亂國然蔡確聞有彈奏即上章請郡章惇雖不能自引而褊中易動輕肆狂言亦蒙顯黜惟縝居其中間雖才器凡陋不及二人而撡心深險既不為確之遜避以辭政柄又不為惇之躁妄以觸天威盤旋顧望其中窺伺不淺茍可以一日固位何所不為而陛下待以體貌含忍不發正墮其計矣臣竊惟陛下以至仁至公撫御羣下近日中外臣庶稍就規矩而獨於進退大臣聽納臺諫優遊不決似未盡善臣不勝愚忠懷愛君之心請為陛下略言其故臣竊見仁宗皇帝在位四十餘年海內乂安近世少比當時所用宰相二三十人其所進退皆取天下公議未嘗輒出私意公議所發常自臺諫凡臺諫所言即時行下其言是則黜宰相其言妄則黜臺諫忘已而用人故賞罰之行如春生秋殺人不以為怨終仁宗之世臺諌不敢矯誣而宰相不敢恣橫由此術也今陛下雖能虛受直言而臣等所陳一切留中不出使臺諫忠邪無由明辨而大臣出入得以自由曖昧成風有損國體蔡確之出已負公議觀文之除衆謂僥幸而大臣猶以不得節度使及轉官為詞良由不正其罪以啓讒慝之口只如章惇之事臺諫久以為言是時陛下若即付三省議其可否則惇之去留自出公議陛下始既不忍養成惇惡然後特出御批言其罪狀正人端士雖知惇有餘誅而邪黨小人或謂陛下以忿怒逐樞密使臣之所憂實在於此故願陛下舉行仁宗故事凡臺諫封章一一付外施行如臣等所論韓縝過惡必不下二三十章並乞降付三省如臣等所言有妄即乞明正典刑如縝罪狀不誣亦乞顯行誅責使天下明知縝之降黜事端發於臺諫蓋是公議所迫雖先朝舊臣陛下亦莫得而赦自然中外更無毫髮議論臣建此言非獨為縝一事蓋欲朝廷賞罰分明庶幾仁祖之風復見於今日甲戌髙陽關路安撫司言滄州多盜乞於敕內添入作重法地分從之詳定役法所言諸路見行出賣坊場河渡等并應合支酬招募衙前使用錢物未有所𨽻詔令提點刑獄司主之尚書省言請自今申奏強劫十人凶惡或軍賊五人以上合降朝旨收捉者更不送刑部直送中書省取旨從之乙亥御史中丞劉摯殿中侍御史吕陶進對因論及帥臣太皇太后宣諭曰帥臣極難得劉庠可惜方欲進用又曰近除胡宗愈蘇軾如何摯等對甚合公議又曰盡是此中自除兼蘇軾天下知其有文多年淹滯又曰每執政來常説凡與差除須是公正外人自無言語又曰王得君以其父廣淵於英宗有舊故除一差遣輒有論奏摯等對此後生必為人所使又曰卿等近言被火災宗室尋差中使存恤踏築屋舍又曰卿等公正不畏權勢但安心言事此中必主張更有事但言來劉庠卒在三月八日王巖叟言臣竊聞日近火災熾大延及宗室顛沛皇皇不知所舍寓於佛寺甚失其所暴露庭廡一無擁蔽都人觀望虧損事體極為不便伏料聖恩已加存撫不待臣言然臣聞聽所得思慮所及不敢遂默此誠陛下所當留念伏望睿慈嚴敇有司速尋可居之地早令安泊以昭陛下救災恤難篤於宗族之仁心以示陛下禁非防邪護惜國家之大體貼黃稱如同文館舊尚書省三班院之類皆舍宇甚多可以權令寓泊無害於事御史中丞劉摯言臣近曽論宰臣韓縝才鄙望輕不足以備輔相乞賜罷免未蒙指揮謹按縝素無學術言詞淺陋夤緣執政無一善可道人之善惡才否懵然不知近日差除但用私意招致物論怨讟並興竊恐漸肆邪志敗壞公道上負委任下妨賢路自仲春以來自知公議所輕揚言於人曰過寒食當乞罷退而又曰俟過神宗小祥近者但見時時挈治行李一二於外以示欲去然不聞有決然之意其無亷隅至於如此吏卒之賤市井之人亦莫不醜笑之何以尊榮廟朝鎮服夷夏乞將臣僚章疏付之於外議其罪罷之以允清議元祐元年三月十八日神宗小祥三月五日或以此章為孫覺非也庫部郎中郭茂恂為軍器少監天章閣待制知河中府王臨提舉崇福宫鄭州居住以疾從其請也詔罷熙河蘭會路經制財用司其本路財利職事併入陜西轉運司如有合措置事件速具聞奏其熙河路合得錢物許兊那應副即不得將充别路支費經制司舊官候交與轉運司方得離任仍於本路朝廷封樁內支撥三萬貫與劉昌祚充經略司凖備支用從昌祚請也熙寧十年八月六日初命李憲及趙濟同經制熙河初仰給度支嵗費數百萬於是置財用司以足經費至是罷之新録辨曰以兩路財用併入轉運司蓋從劉昌祚之請也乃以為指斥先帝開邊費用之廣非也自先帝開斥至是罷之三十二字並刪去詔於常平錢內支賜錢四十萬貫與京西轉運司詔應差除並更改事件令六曹限畫録黃到畫時關報御史臺并門下中書後省諫官案從御史中丞劉摯請也去年十月十日十九日今年閏二月二十六日摯再有論列今乃從其請左正言朱光庭言臣嘗計天下青苖錢除昨來支俵外見在錢數尚多欲乞將一州見在數滚同斟酌諸縣户口多寡並用收糴可留斛斗凡遇豐年則添價以糴遇歲小飢則減價以糶大飢則以貸之候豐歲輸還更不出息詔户部指揮府界諸路提點刑獄司相度合收糴凖備數目須彼處有轉運司支遣斛斗可以兊換及出糶得行不至積留損敗保明聞奏監察御史孫升言江西湖南鹽法之害行於朱彥博陳偲兩路之民殘虐塗炭甚於兵火如知吉州魏綸虐增鹽數獨吉州被害最苦綸既以丁憂去官而發運使蔣之竒乃薦綸悉心職事乞候服闋再令知吉州之竒附會欺罔至於如此獨提舉江南西路常平等事劉誼乃能上書極言利害誼奪官勒停而江南西路轉運使劉淑再任本路首尾五年坐視毒虐其民曽無一言今乃除祠部郎中伏望特正蔣之竒劉淑之罪復劉誼之職詔劉淑罷祠部郎中差知宿州蔣之竒特展二年磨勘仍罰銅十斤劉誼尋差權發遣韶州閏月末吕陶章可考劉誼除韶州在六月末舊録云先帝鹽法以通商利法未就緒升以為殘虐塗炭聞者駭焉新録辨曰孫升建言指謂朱彥博魏綸奉行乖戾失鹽法之意故有殘虐塗炭之説史官不當引先帝為言自先帝鹽法至聞者駭焉二十三字並刪去升又言乞檢詳前奏罷軍器監計置官詔蔡碩更不候進書放朝辭疾速發赴本任竇長裕等元降錢本變易到物貨材料令工部根究有無欺弊聞奏仍令所到路分轉運司截留應管文簿關送工部應干官物並隨處封樁其錢降令轉運司根究一節更不施行閏二月十八日蔡碩除蔡河撥發禮部尚書韓忠彥等言今參詳如有祥瑞邊捷宰臣已下紫宸殿稱賀皇帝畢赴內東門拜賀太皇太后從之樞密院言河東經略司保甲有不堪馬一千六百四十二匹請即以填馬鋪廂軍及給禁軍步人將校餘賣充保甲司樁錢從之詔狄咨劉定與外任宫觀差遣以御史王巖叟劾咨定提舉河北保甲於教閲團場外種蒔鬻錢充本司雜用故也四月十二日再責御史孫升言伏以先朝始議推行天下保伍之法要在辨察姦偽屏除盜賊而已小人欺罔遂進邪説令教習府界三路之民使之知兵嗚呼亦不思而已矣自先王道德之澤熄而禮義之俗壞三代井田之法廢而兼并之徒興千百年間積習陵夷兵民乃判世變之異惟聖智為能通之以太祖太宗雄材大略深慮逺謀并一四海降懾羣雄措子孫帝王萬世不拔之規模顧不知養兵之為費而獨嚴兵器之禁者示民不可使知兵也府界三路保甲患害雖均而河北為甚者使者之罪也劉定上挾章惇之姦黨下附狄咨之庸材內縱巡教指使恣為誅剝外為姑息寬假抑沮州縣使法令行乎其民大肆馮陵公行恐喝故真定獲鹿之變起於後而澶滑之盜作於前賴宗廟社稷之靈聖聽睿斷之果不惑乎姦言邪説卒從廢減不然患害未易言也今遺毒餘孽其弊猶存姦惡之魁既已屏斥於外而劉定狄咨生事起變罪狀顯明然假息竊視冀於幸免未正典刑深鬱士民之憤伏望聖慈察獲鹿澶滑之變職劉定狄咨之由早正其罪重行黜削其後來頒降教閲畫一事件指揮乞令樞密院再加詳議約束禁止以全祖宗萬世不拔之規模則天下幸甚貼黃稱周世宗復三關故地我祖宗平四方僣竊未嘗籍民兵也前日陜西軍賊王沖盤礴數州之間每入團教場則保甲環拜納兵仗而走則知保甲不足用以戰而適足為患耳劉定狄咨以教場內地所種菜配賣與保甲取其入為已用定咨身且如此則左右使令之人安得不肆為誅剝乎兵部言修定河東陜西蕃弓箭手等逃亡法從之以環慶路蕃官巴新永策多為三班差使録死事也丙子門下中書外省言後省成所有修省曹寺監條貫行遣合冠以門下中書後省為名從之丁丑御史中丞劉摯言臣近纍具劄子言韓縝不可任以為相未蒙聖旨稍賜施行臣智識愚淺竊觀先王擇任宰相代天理物任重致逺非有大人之才德者不足以當之大人之才德不常有於天下宰相不可以乏人若漢祖之蕭曹宣帝之丙魏又其次也後世有人焉然能任職者罕矣若唐太宗之房杜明皇之姚宋亦一時之相也又降而下亦世有人焉或其主賢而相不及或其相雖才而主不能用也國朝承五代之弊太祖太宗肇基帝業時則有若趙普文武兼資識時知變輔相兩朝成太平之基真宗時海內無事時則有若李沆王旦沉機先物偉識宏度左右承弼仁宗時則有若王曽呂夷簡簡重方嚴鎮撫內外以才謀識略平治四方晚年得富弼韓琦付屬大事世以永寧臣以為祖宗以來一百三十餘年未嘗一日而無宰相也然其為人稱道顯功隂德若此六七人者亦無幾爾以祖宗之明歷年之久選用宰相其難如此今者陛下即政逾年閲天下之士未能盡遍乃欲用為相者人人皆當不亦難哉然今日自間廢之中擢司馬光以為執政未幾用為上相天下之人無智愚無賢不肖莫有一人以為不可者光之素履信於人也陛下用司馬光之心明不負於生靈幽不愧於鬼神矣如光之學術才識雖未足以望古之人亦將無愧於今之人矣故陛下用之而天下服雖高宗之用傅説明皇之用姚崇又何以加臣竊嘗論光以為光負天下之重望遇陛下之至誠可以端坐廟堂不勞施為付羣才於百執使各舉其職不必身親其勞口與之辨也光如此可以上成伊周之大功下視房杜之末迹矣使光誠能蹈此不幸有人焉曰韓縝者與光為左右僕射對秉國鈞同持大政光欲為此則縝為彼矣光欲一而縝則三矣為光者不亦難乎齊桓公問於管仲曰何如而害霸曰有人不能用害霸也用而不能信害霸也既信而又使小人參之為害霸之大者如司馬光之學術該博清介有守陛下既知而用之用而信之一朝拔而置之羣臣之上天下莫不延頸企首以望太平陛下又參用韓縝小人以為左右僕射使上下懷疑猶豫以為信光之不篤任光之不專不然何為使小人相參也使桓公如此管仲其肯以相齊乎臣為陛下計宜罷縝相位或虛位以待賢者可也尚書曰兹惟三公論道經邦燮理隂陽官不必備惟其人韓縝之行內不孚於家外不見信於朋友朝廷上下見陛下罷去蔡確之果以為縝必不久於此矣今言者亦已衆矣縝之才能罪惡固已稔於上聞矣陛下遲遲而不果豈尚有所疑乎漢劉向曰用賢則如轉石去佞則如拔山如此望隂陽之和不亦難乎竊見韓縝往年知秦州日無辜殺三班奉職傅勍坐廢踰年今日陛下垂簾聽政上下觀望人心危疑之時尤不可使不仁之人在左右韓縝不仁迹狀明白如此伏望聖慈早賜罷免元祐元年三月二十日或以此奏為孫覺係之閏二月末非也
