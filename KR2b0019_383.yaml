body:
  text: 續資治通鑑長編卷三百七十九宋李燾撰哲宗元祐元年六月戊子詔新復州縣知州軍並堂除選餘吏部選司諫王巖叟言伏覩三月二十八日聖旨其見任職事官有舊帶待制已上職者並還舊職竊見兵部尚書王存舊帶龍圖閣直學士權知開封府後及二年乞補外郡朝廷除樞密直學士令再任存堅懇辭免竟不曾受告只自龍圖閣直學士遷兵部尚書今既立法許職事官帶舊職則王存止合帶龍圖閣直學士不合帶樞密直學士豈可以不受告之寵名便為己曾帶之舊職蓋張璪與存是親故因緣依傍以行私意衆議不平謂璪以姦邪附會致位政府聖明在上自當竄逐而陛下曲示涵容以存事體璪固宜惴惴小心以不欺為報而益敢肆於為姦將陛下名器作人情故使外人皆曰王尚書帶密學甚得親家力臣既聞之不勝其憤按璪天資邪佞安於為私欺朝廷多士如無人賣國家美官如已物近又除文及韓宗師之類固非一事陛下如何可防一日萬幾防之得無勞乎宗廟至重陛下何不求賢以自佐而使聖心日逸而無憂也伏望睿慈早賜罷免以清聖政為天下福臣不勝懇懇納忠之至貼黃王存元是龍圖閣直學士因何便帶樞密直學士今改正施行亦足使姦臣知懼不敢公然欺罔陛下矣陛下近因韓絳辭免宗師除命遂從其請恩意不傷事體以正中外之人無不仰望聖德己丑御批兵部尚書王存元是龍圖閣直學士近因復帶職何故却除授樞密直學士可具因依進入中書省奏王存昨自龍圖閣直學士知開封府滿二年除樞密直學士未受命改除兵部尚書今尚書復帶職為存已曾除樞密直學士難以却除龍圖御批見任職事官近降指揮有舊帶待制已上職者並還舊制聞王存舊帶龍圖閣直學士雖曾除樞密直學士緣當時辭免不曾受告若依新除指揮合與不合便除未受告之職可議奏進入中書省奏存昨任龍圖閣直學士知開封府又除樞密直學士未受命間緣官制改除尚書更不帶職經今二年近降指揮職事官許帶舊職若却除龍圖閣直學士即降職一等此據御集王存除密直在四月十八日既而輔臣入對太皇太后問主王存者誰邪門下侍郎吕公著言臣實與三省共議太皇太后曰聞王存附會王安石進不以正公著曰安石初執政時未建東西府存與安石對門居踰年不一過之士人至今稱是太皇太后曰若然則無疑矣措置熙河蘭會路經制財用言𣙜茶司買馬場并綱馬上京及支過本路糧草等請嵗計數令𣙜茶買馬司以頭子錢撥還從之庚寅通直郎根究上供錢物張升卿言綱運入門令門司置籍録部押人姓名起發月日物色名數申所屬省部寺監下庫務交納庫務具年月日正剩欠數申寺監從之太常博士吕希純言皇帝親祠明堂請依皇祐及嘉祐熙寧故事復設小次俟皇帝初獻畢禮儀使奏請歸小次三獻畢奏請就版位恐議者以元豐新定禮文皇帝立於阼階故因去小次請自今仍舊設於明堂午陛之東太廟即設於東階之下太常寺參詳景靈亦合設小次於東陛之下從之辛卯監察御史陳次升奏編類章疏六月五日竊以民財有限取之不可以過多邦賦有常用之不可以無節熙寧以前上供錢物無額外之求州縣無非法之斂自後獻利之臣不原此意惟務刻削以為己功若減一事一件則據其所減色額責令轉運封樁上供别有增置合用之物又令自辦上供名件嵗益加多有司財用日惟不足既無家資之可助又無鄰粟之可貸必至多方以取於民非法之征其來乃自乎是且人生而莫不有惻隱之心豈無愛民之意比年監司多以掊取相髙者蓋迫於嵗計不足其勢不得已而然也伏自陛下臨御以來輕徭役薄賦斂澄汰掊克崇尚忠厚天下之人莫不咸被德澤歡欣鼓舞屬心內附拭目以觀太平之極致然而額外上供之數未除竊恐異日供應不辦官司則有失職之責茍欲避免侵漁之患復從而至河足以上副陛下仁厚之德臣欲乞聖慈特降指揮勘會熙寧以來於舊上供額外創行封樁錢物並與放罷庶使官吏不至過有誅求而民無騷擾之患癸巳詳定役法所言臣僚上言應坊場乞罷實封投狀之法立中數為額詔韓維等相度以聞欲乞以前界買名錢委本州看詳若纍界有增無減即取纍界中次髙一界為額前後拖欠數多及纍限無人陳狀雖有人承買比最髙價虧及五分以上者縣相度減定申州與轉運司次第保明申省仍立界滿承買抵當約束餘並依舊條從之新舊録繫此事於十一月四日按八月二十二日戶部言出賣戶絶田宅已有估覆定價欲依買撲坊場罷實封投狀從之然則八月以前實封投買坊場法固先罷矣又按劉安世言元年六月七日有敕罷實封投買坊場法以此二事證之新舊實録必誤今自十一月四日移入六月七日編録條貫亦六月七日聖旨吕陶乞罷實封附四月却至月末劉摯正月九日先有論列此蓋從陶請也甲午朝散郎吳革為江東轉運判官尋罷之先是轉運判官三員革替齊堪而劉拯尚在任有詔止除一員故也革罷在十一日今并書之詔諸路轉運司每嵗支移折變並須躬親審度地里逺近順便體問收成豐歉去處遵守詔條禁戢官吏務從民便復安州景陵縣為復州鄂州漢陽縣為軍漢川鎮安州雲夢鎮荆南玉沙鎮板江鎮建寧鎮歸州興山鎮並為縣戶部言百姓昔年請鹽謂之蠶鹽及至絲蠶之時大有所濟然後隨處納錢入官昨因言者罷所俵蠶鹽止令百姓虛納鹽錢於義未安請依舊俵蠶鹽從之樞密院言西人遣使入貢計會地界合要承旨司官同共檢詳本末計議事體詔左司郎中劉奉世權樞密院承旨公事候邊事了日依舊御史中丞劉摯言臣竊以國家之患莫大於發政行令而人敢違人臣之罪莫大於邀功罔上而為國生事記曰不從令者死於律擅興千人者誅蓋自古失御臣之道使其凌上召亂而後患有不勝言者多必繇此然則法令不可不嚴而人主不可不察也臣伏覩去年三月六日陛下登極赦書應緣邊州郡仰長吏巡檢使臣鈐轄兵士及邊上人戶不得侵擾外界靜守疆場勿令騷擾命令既下邊境之上風塵頓息蕃夷之情感服靣內當此之時知太原府吕惠卿輒於四月中旬被受赦敕之後連遣部將折克行訾虎相次以數萬人入西界討蕩所得首級皆是淺邊老弱虛夸以為功而官軍人騎死傷甚衆未幾西人復仇以五月犯塞疆臣戰沒士卒陷亡臣以謂勞師動衆奏功不實以至結怨外夷猶未足論也而其公違詔敕擅出師旅實無人臣之禮則其罪不可以不治謹按惠卿遭遇暴起初不以道幸嘗備位執政不深惟大義報國乃欲造非常之功圖再進用且邊陲本自無事又陛下新即位銜恤謹始豈遑用武故上循祖宗以來踐阼故事加惠邊圉禁相侵擾丁寧戒諭所以休息軍民慰安夷夏詔號宣布明若日月可謂至恩盛德人情孰不欣戴而惠卿以前兩府居帥守之任所宜與國家同休戚將順至意以鎮方面乃敢用貪功幸進之志為此亂階夫違棄制命虧臣子之道其罪一也當陛下諒隂之中謀動干戈其罪二也受神宗遺詔未踰月而忘哀疚之情覬幸功賞為大不忠其罪三也致新天子命令失信於四夷其罪四也開外夷之隙至今警備未得安靜其罪五也夫惠卿天下知其為姦人也方命擅兵天下之大惡也臣恐防微杜漸朝廷不當涵飬而不慮也昔漢之王恢欲徼一時之幸於胸奴故為馬邑之役孝武許之是恢欲奉詔以從事也然後以謀出於恢故下吏不赦使恢自殺馮奉世出使外域以便宜擊莎車立功萬里終以擅命不侯蓋古之人御將審兵法義如此若惠卿則非如恢之請命也又非如奉世之止於擅命也被新詔敕禁約甚明而廢格不顧是叛命者也方陛下嗣政之始以威福信義懷寧天下之時而第一命為強悍之臣叛違而不從欲朝廷無所誅詰上下不敢誰何臣知陛下異日有大政號將不足以令天下而信四夷姦臣之逆命心輕國憲者將接迹而動矣臣位中執法職在糾治姦慝伏請以臣章付外議正惠卿罪狀考古之義依律處分以申大公之法為姦雄之戒貼黃稱強臣廢詔出兵則何事不可為也伏望深察只於樞密院契勘見得出兵月日在三月六日赦令約束之後虧損國威失外夷之信不可不行誅竄又稱臣聞惠卿在赦前曾有管勾麟府軍馬張之諫陳説出兵不便惠卿怒其異議奏黜之諫於是部將恐懼既而三月六日赦敕繼到又有折克行引赦書指揮申説而惠卿不聽使克行等於四月十七日并十九日入界又稱或謂惠卿恐於赦後曾有奏稟臣以為不然蓋三月六日赦計程到太原當在中旬間而出兵在四月十七日則必非奏請得旨而後行也借如曾有奏請亦是違勑如許之出兵亦止是三省樞密院經歷去處不合依從施行而於惠卿擅興之罪不繫奏聞皆無所逃也又稱惠卿自以罪大必將有禍遽然託疾揚去力求宫觀差遣意謂朝廷雖有行遣不過如此故先自處置此足以見其姦猾今陛下若謂惠卿已是間局有所寬貸乃是正中其計則朝廷法不復可振而悖慢之臣無復忌憚非國家之福也又稱惠卿自罷執政日夜規圖再用謂非造竒功則不可以復得兩府故逢迎朝廷專意邊事陜西已然之禍更不復論自初至河東即為將士分番之制變亂戍守舊法故兵制大壞邊備浸弱調麟府兵民逺出以耕塞外從來兩界不耕之田虛內以營外坐困三州虛張所入欺謾朝廷又稱惠卿天資凶險其辨詐如少正卯其姦邪如盧杞始自小官附王安石進用事安石有父師之契一日當權遂與安石為死仇起鄭俠之獄以廢逐安石弟安國平時與安石以利相市以私相求及黜知陳州乃盡以安石所通書簡繳奏上以傾安石棄理背義天下賤之兄弟前後於淮浙怙勢殖産脅州縣其事非一四海所共知今來違勑起兵一事尤駭羣聽實見無君亂常之心伏望早賜誅竄以快中外之憤左司諫王巖叟言臣伏以人臣之罪莫重於違君命以貪功莫深於開邊隙以遺患有一於兹法所不赦準元豐八年三月六日陛下登極赦書應緣邊州府仰逐處長吏并巡檢使臣鈐轄兵士及邊上人戶不得侵擾外界務要靜守疆場勿令騷擾陛下所以謹始防微之心可謂深矣可謂逺矣伏見前知太原府吕惠卿立心悖逆輕易朝廷當年四月內故違赦書兩次擅發兵入西界三角川聚星泊以來肆意討蕩致西人五月間復以千五百餘騎犯葭蘆寨供奉官王英為之戰死惠卿為國生事結怨連禍甚明西人性重報復既邊隙一開豈獨王英一死而可已後日之患將源源來矣此首惡之人所以不可不誅也按惠卿隂讒狡獪具足小人之材凶險姦回兼備羣邪之惡昔為參知政事竊弄威權震懾天下公行欺罔人莫敢言賈下之怨歸於朝廷幸先帝明照其姦早加斥逺不得久居中用事不然善人無類而生民塗炭矣其天資殘忍而好貪躁輕而喜動雖處於外亦未嘗少務安靜以生靈之患國家之憂為恤所以果於違命而不懼敢於擅興而無憚方先帝升遐臣子宜哀戚之際而猖狂於弄兵大不孝也方陛下登極大臣宜惴懼之時而驕恣於犯令大不忠也使朝廷不知則已知而不正典刑何以行命令何以嚴法守何以折姦雄之心而消變於未兆伏惟陛下即位赦書非常赦比四夷之心固將信而倚之以自安始踰月而方面大臣首不奉詔罪豈可赦使陛下即位之初失信於外夷者惠卿也陛下今一不治他日邊臣有引惠卿為辭而擅興逞志者陛下何以責此不可不思也使惠卿有功且不可恕况其無功使當常時且不可容况在初政伏望陛下奮獨斷之威正大姦之罪以令四方先王謂刑一人而天下服者若惠卿其人也惟陛下勿疑以明國憲之不可亂社稷幸甚右司諫蘇轍言臣聞以堯為君而舜為之繼四凶之惡不得而容以武王為父而成王為子管蔡之罪不得而赦何者凶德貫盈邪黨蕃熾用之足以熒惑當世存之足以遺患將來是以聖人下為百姓逺慮後為子孫深憂逐而去之靡有疑志今皇帝陛下冨於春秋諒隂不言太皇太后陛下委任大臣政出房闥而存養元惡隱忍不誅人知後患懼者甚衆臣近曾奏言吕惠卿稟性凶邪罪惡山積自熙寧以來所為青苖助役市易保甲等法皆出於惠卿之手至於輕用甲兵興造大獄凡害民蠧國之事皆惠卿發其端故近歲姦邪惠卿稱首臣於前奏論之稍悉然至今多日未見施行竊惟朝廷近日掃除羣慝如吳居厚蹇周輔吕嘉問宋用臣等皆以一事誤朝即加流竄今患卿兼有衆惡自知罪大託疾求間而朝廷因亦不問臣恐國之政刑從此大廢今中外士大夫見惠卿獨得不誅皆謂言事之官有畏強凌弱之心執政大臣有吐剛茹柔之意朝廷用法不平掇拾蜂蟻脫遺鯨鯢貽患後人取笑千古因此羣惡小醜已得罪者亦皆不伏伏惟二聖臨御至公如天地至明如日月其於用法不應如此臣愚竊料聖意必謂方今弊事略除羣枉消退惠卿既領宫觀不足復誅故稍加闊略以安反側臣退復思慮終謂不然惠卿姦人之雄用意不淺無病而去有伺隙之心使之一旦復攝尺寸之柄必致天下之患若不以時放棄深折姦謀臣恐朝廷未得安枕而卧也伏乞檢臣前奏付外施行俟元惡已除然後洗滌瑕疵以安中外不為晚也臣不勝憂國愛君之切不顧死亡以犯凶人惟陛下裁幸右正言王覿言覿言不得其時附摯轍言後臣聞自古中國有以致外夷之患者其端固不一也然大要多因守邊之臣貪功生事而侵擾之積以成釁其禍乃深故漢武帝用王恢聶一之言絶胸奴之好以興馬邑之師已而無利其後連兵不解者數十年唐明皇因孫誨趙惠琮之謀背吐蕃之請以有清海之戰初雖一捷其後官軍陷沒者數萬人如武帝明皇可謂英睿之主矣然一為邊吏所誤渝盟爽信以快一時使生靈肝腦塗地財殫力竭為後世笑可不為之痛惜哉故為國深慮若貪功生事之邊吏置之法而無赦則庶幾得所以懷外夷安邊境之道也臣伏見資政殿大學士吕惠卿前知太原府於元豐八年內違敕差折克行等於四月十七日入西界三角川以來討蕩及差第一將訾虎於四月十九日入西界聚星泊以來討蕩第二將及麟府州蕃漢士卒及添差之兵無慮二萬人騎故結釁於彼而我之士卒陳亡及傷而見姓名者數百人隨軍子弟不與焉支過賞功及陳亡輕重賜銀絹二萬餘匹兩犒設及其餘錢糧又數萬計致西人却於五月中引千餘騎犯邊至葭蘆寨供奉官王英以戰死兵士陷沒者六十餘人自是惠卿內懷憂恐作守備於極邊難得水草之地添屯兵馬虛費極多臣訪聞惠卿出兵之時邊境本自安靖徒以元豐八年曾有朝旨倐往忽來為擾耕之計惠卿緣此於去年春間面諭諸將及遣邊官諷沿邊將佐甲乙出兵蓋欲事成則功歸於已不成則罪在將佐而己故管勾麟府路兵馬公事張之諫不肯隨順申請惠卿挾怒奏黜人咸寃之未出之間三月六日登極大赦既到折克行以赦書指揮不得侵擾外界未肯出兵惠卿不聽故克行等乃以四月十七日十九日入界臣伏讀三月六日赦書應緣邊州府仰逐處長吏并巡檢使臣鈐轄兵士及邊上人戶不得侵擾外界務要靜守疆場勿令侵擾此朝廷之美政陛下之盛德也凡州郡赦書初到之日集官吏軍民而宣讀焉聖恩深厚孰不咨嗟四夷傳聞當亦感泣蓋皇帝陛下即位之始太皇太后同聽政之初以神宗新棄天下聖心悲哀豈遑武事故須慰安外夷休養兵民俾兵民安土而無荷戈之憂外夷歸心而無擾邊之患然後可以見中國禮義之舉可以申聖孝諒隂之情也而惠卿志不在哀心輕赦敕僥幸功賞妄興師徒使朝廷內則致疑於兵民外則失信於外夷虧損國體蠧傷聖政皆惠卿之由也臣檢會本朝自建隆以來南郊等赦並無前項不得侵擾外界等指揮惟太宗真宗仁宗英宗神宗登極大赦戒敕邊吏與去年三月六日赦文正同於此既有以見祖宗謹始之先務又有以知陛下承祧之深意也是則於國家之體所繫豈輕哉凡厥邊臣敢不恭命惠卿嘗為執政方握帥權朝廷禮遇不為不優國家委寄不為不重所當將順聖德彈壓邊陲若提封之內敢或違敕弄兵輒侵外境自當決行軍法以嚴天子之命以為邊吏之戒安可自為亂階身犯詔禁渙汗之號方恱於羣情無名之兵已駭於衆聽如此則吏民豈復以赦書為可信外夷豈復以中國為可親四方豈復以朝命為可尊後世豈復以祖宗為可法陛下以惠卿之罪為微邪以惠卿之惡為可恕邪以惠卿之罪為微則自古以來廢詔逞兵戕民辱國者皆小罪矣以惠卿之惡為可恕則自今以往欺君罔上壞法亂常者皆可恕矣或謂惠卿雖無遵用赦書之意亦豈敢更不奏請而遂出兵哉請不請固非臣之所知而其為罪惡則均也使惠卿不復請而遂出兵則是直廢赦敕無人臣之禮罪不容誅若引赦為説而有請焉亦不過張大出兵之利以欺罔朝廷以邊帥之請而信之不疑則適足以致非禮之舉失信之過盡歸朝廷也為臣不忠孰甚於此伏望朝廷察惠卿妄興師旅違聖孝之情廢格赦敕無人臣之意開異日邊鄙之患僥幸功賞志不在哀內致疑於兵民外失信於外夷虧損國體蠧傷聖政早行誅竄以為天下後世不孝之戒又言臣今來竊聞惠卿出兵之前曾有奏請伏慮朝廷為其有奏請而薄其罪臣請畢其説惠卿之罪在廢赦出兵不在奏不奏也奏而廢赦其罪重輕相去無幾惠卿奏請之意臣固不得而盡知然臣竊料之其説有二而已其一不過謂元豐中曾有詔旨為擾耕之計妄云與赦敕兩不相妨而可以出師則是惠卿引前詔以惑朝廷而乞廢赦也其二不過但以師期來請而不及赦則是惠卿心輕赦敕而直廢赦也引赦與不及赦雖異其廢赦均也朝廷不允其請乃是惠卿欺罔之計不得行而已朝廷允其請乃是惠卿欺罔之計得行而已欺罔之計得行與不得行雖異其為欺罔則一也臣竊惟皇帝陛下太皇太后陛下臨政之初首宣赦敕欲以著大信於外夷申大戒於邊吏也乃因惠卿一舉而壞之本朝自太宗以來登極大赦指揮不得侵擾外界六世所共守也乃至惠卿一朝而廢之陛下謂惠卿之罪猶在可恕乎其所以為罪豈在奏與不奏之間乎監察御史韓川孫升左正言朱光庭奏伏聞蔣之竒自權發遣運江淮忽除天章閣待制知潭州之竒小人不足以當斯任伏望寢罷以協公議御批蔣之竒除待制知潭州告可只今進入如已發出即却行勾收三省進呈罷之政目八日罷之竒待制潭州指揮元指揮在五月二十六日右司員外郎文及為衛尉少卿從其父彥博請也政目在初四日今從實録左司諫王巖叟言臣上章言執政差除文及韓宗師有私意後契勘得不出於宰相特出於中書侍郎張璪雖左丞清臣右丞大防皆可責然主意者璪也所以外議罪璪為深幸陛下至明自見其失因二老之請而罷之中外之人無不竦服陛下聖斷若知恥畏義便合待罪自引而頑然不以為非有慢上之心臣又言除王存帶樞密直學士不當璪與存親亦出於私尤為著見竊聞陛下批降聖旨問其所以臣不知作何對陛下料别無道理可言不過説資任髙年月久又不過妄引體例要之皆非也今來敕旨只令帶舊職則一切浮辭都不可用此事只一句可了畢竟樞密直學士不是王存曾帶之舊職盡是妄生議論以塞聖問緣今來敕旨只令帶舊職而已非舊職則不合説及陛下至明自可以見不待臣言明知其非而不行改正則今後權臣安於為私而無憚矣知陛下容之也臣有言責不敢不爭璪之舞姦權弄威福以賣朝廷者如此此非可以為大臣持國柄積日纍久惟有損於朝廷殊無益於陛下也臣為諫官坐觀害政之人在廟朝豈可不言然非臣嫉之也天下公議之所嫉也臣特以天下之心告陛下耳願陛下以公議為恤早賜罷黜以幸天下乙未光祿少卿趙令鑠言自來宫闈令當出神主參畢升殿其光祿閲視之官亦合先行參神之禮下部請光祿卿凡祠事豫升壇殿點視實設禮料依宫闈令先行致恭再拜然後升壇陳設從之戊戌詔自今職事官帶學士待制者隨駕其不帶職合隨駕者仍舊又詔知軍州路分兵官州鈐轄兼將並理本差遣到任年月日為任其按試將兵自依將官年月法又詔罷制造京城樓櫓詔自今科場程試毋得引用字説從殿中侍御史林旦言也二年十二月十二日可考左正言朱光庭言張誠一邪險害政有虧孝行乞重行黜責詔誠一特責授左武衛將軍分司南京許於本處居住五月十八日責授客省使太平觀紹聖元年正月七日追復舊官右司諫蘇轍言臣竊見唐命尚書郎常選用文行政事之臣以分總庶務神宗皇帝始復唐室舊制其於用人最號重惜今陛下臨御一新庶政朝多清流貪殘之人不當復置省闥謹按金部員外郎吕和卿本惠卿之弟而章惇所薦和卿始以奏補入仕賦性愚騃方其歷任未成考第而惇稱其所至有聲當時士人無不竊笑其後與惠卿共建手實簿法惠卿方任執政使和卿上言而惠卿力行之其法以根括民産不遺毫髮為本以奬用憸險許令告訐為要估計家産下至椽瓦抄劄畜産不遺雞豚天下騷然如被兵火紙筆湧貴鞭笞恣行然其為術迂踈卒不能得民要領先帝知其不可遽要不行近日蹇周輔以賣鹽得罪吳居厚以𣙜鐡蒙責吕嘉問以市易被逐宋用臣以導洛逺徙至於蹇序辰郟亶之流一罣其間皆不逃譴而和卿首為簿法害民之多過於鹽鐡等事獨安然不問竊據郎曹質之公議實失邦憲兼之頃任考功日其兄溫卿任秦鳯提刑明知添支米麥不許割移他處和卿私利西邊軍食價髙割就溫卿本任作弟姓名字請領虧損邊計以益其私蓋其兄弟貪冒無恥從來如此雖事在赦前而竊據清要公議不允伏乞朝廷重行黜責使清濁稍分以警在位詔和卿權知台州衛尉少卿陳侗知陜州侗出守必有故當考初八日文及已除少衛尉知濟州朝請郎段繼隆特勒停權知開封府蔡京特罰金二十斤繼隆坐妄冒奏薦恩澤而京失根治也孫升蘇轍吕陶奏己見前御史中丞劉摯言臣伏見中書侍郎張璪天資傾邪不知忠義立朝行己阿諛柔佞明附憸人無自立之節其始進也以邪説奉王安石其稍進也以姦謀附吕惠卿其後隨王圭諂蔡確黨章惇數人之性雖不同而璪能探情變節左右隨合各得其歡心自陛下更置大臣登用舊相以圖政事中外皆謂璪不能容於其間矣既而詭情偽行俯仰潤入又復安身藏迹如此之久陛下察璪節行尚可使列大臣則無乃為朝廷纍哉蓋非徒無亷隅茍祿而已也乃於緩急投隙伺便營私作過近日差除多負公議見文彥博韓維進拜於五月初乘兩宰相未謝之時引文及為都司韓宗師直祕閣以迎恱之賴彥博并維兄絳力辭而止近制六曹尚書至諫議以上限年帶學士待制之職此事徒亂官制無益政體其議專出於璪蓋上既有以結其同列而下又以此恱於衆人其中如王存樞密直學士尤無義説存璪之婚姻家也存昨再任開封曽進此職存當時辭免而罷近制指揮本為職名之舊曾帶者則還之存雖除而不受則不得為舊帶職不知以何名今復之璪自以得罪於天下懼不得留於朝所以盜弄名器自施恩以結援助臣載惟人主以至誠遇大臣茍得同心協德之人則可以舉國聽之委任責成而已乃若懷二徇私則雖聖明在上安能事事防禦之哉臣向者上殿兩曾論奏璪之姦邪臣恭聞聖意以謂曾經受遺未有顯過不欲傷恩臣是以久未論列今璪過有顯狀士論所疾伏望速賜睿斷罷璪職任以清朝路以副公議元祐元年六月十二日己亥禮部言近制尚書侍郎除改别曹免入謝郎官亦當免從之蘇軾言乞應坊場河渡免役量添酒等錢並用支酬衙前召募綱運官吏接送雇人及應緣衙前役人諸般支使如本州不足即申本路於别州移用如本路不足即申戶部於别路移用其有餘去處不得為見有餘錢額外支破其不足去處亦不得為見不足將合召募人却行差撥從之左司諫王巖叟言新制諸州軍通判每年許舉選人一名幕職州縣官改官判司簿尉充縣令間舉然郡府有小大不可無等殺請分州軍為三等十邑已上歲舉三人改官職官令各一五邑已上歲二人令一改官職官互舉一人五邑已下如新制無邑者不舉從之內兩員通判者分舉新舊録但稱有司按王巖叟奏議前後皆從巖叟建請今明著其實前請見四月三日殿中侍御史林旦言伏以內朝之有侍從省曹之有長二非學行論議材識聞望足以羽儀朝廷冠冕士類何可以妄處兹選也竊見刑部侍郎崔台符人物凡猥資性狡佞本以諸科挾法令而進熙寧中王安石破律改條變易輕重台符附會新意因得進用其後議建大理獄擢諫議大夫首冒卿選先皇帝折獄平刑未嘗專任己意故一切付之理官庶得其情而後決也台符既預獄議遂當付倚不能平心奉承德音而乃隂肆姦利謀結權幸方是時石得一以探報為事每坐獄者台符必迎伺其意之所在鍛鍊吹析遷就其言而成之舞文罔陷多失本情昨來初建六官執政私之又玷刑曹之任士望物論于今不平近者朝廷深悼得一探報之寃都城刑獄之濫己罷官局取索公案看詳敘理寃抑之獲伸者衆矣則前後理官上下其手於其間者他日必有行遣台符實為首惡曾不引退尚敢安然據其職任恐非所以慰安士民之望也伏乞睿明先次罷台符本職且與一外任間慢差遣令别聽指揮更選清通忠恕之士典領刑曹以副陛下寬大矜恤之意庚子刑部侍郎崔台符知潞州福建提點刑獄喻涉薦前安州司戶參軍陳烈行誼詔以烈名在仕版自仁祖嘗以學官命之而棲遲衡門不起宜從其所尚特授宣德郎致仕詔吏部重修簡要選法以聞又詔雜役配軍諸路州軍並配本州牢城在京者元配廣南分配東西窑務三千里者配車營務二千里者分配廣固指揮自今犯杖以上罪並依元犯配行蘇軾言逐處色役各隨本處土俗事宜輕重不同借如盜賊多處以弓手耆長為重稅賦難催處以戶長為重土人不間書算處以曹司為重難以限定等第一槩立法若衙前招募得足即須將以次重役於第一等戶內差撥請諸處色役委本路監司與逐處官吏同相度立定本處色役輕重髙下次第以最重役從上差撥從之詔學士除尚書學士待制除侍郎並許帶職中丞給舍諫議更不帶待制若除他官及外官者侍郎至諫議並換待制尚書換直學士即進擢責降者勿用此例前降中丞侍郎給舍諫議一年加待制尚書二年加直學士指揮勿行從王巖叟之言也巖叟言附三月二十八日門下侍郎司馬光言臣於去年四月二十七日曽上言乞並罷將官其逐州禁軍並委長吏與總管等官同共提舉教閲及諸處差使其州縣長吏所給白直皆如嘉祐編勑以前之數臣自上此文字後來不聞朝廷有所施行竊見近歲諸處多闕雨澤盜賊頗多州縣全無武備長吏侍衛單寡禁軍盡屬將官多與長吏爭衡長吏勢力逺出其下茍有如李順王倫攻城陷邑之寇或如王均王則竊發肘腋之變豈不為朝廷旰食之憂邪王者制治於未亂保邦於未危豈可以恃太平之久謂必無此等事邪又自祖宗以來諸軍少曽在營常分畨往緣邊及諸路屯駐駐泊蓋欲使之均勞逸知艱難識戰鬬習山川自置將官以來茍非有所征討全將起發與將官偕行外其餘常在本營不復分畨屯駐駐泊飽食安坐養成驕惰之性歲月滋久恐難復用又每將下各有部隊將凖備差遣指使之類一二十人而諸州總管鈐轄都監監押員數亦如舊計官重復虛費廪祿凡將官之設有害無利天下曉軍政者莫不知之臣愚伏望朝廷如臣前奏盡罷諸路將官其禁軍各委本州縣長吏與總管鈐轄都監監押等管轄一如未置將官已前之法其諸軍兵馬全少不足守禦之處量與立額招添其守禦有備而寇賊之發不能式遏或棄城逃避或率吏民迎賊或斂民財賂賊雖責之以死彼亦甘心今平時騶從且不能備一旦寇至責以死節不亦難哉右諫議大夫孫覺言將兵之禁宜可少解而責之所在守臣與州郡兵官可乘此時令所在廣行召募稍補前日之額循祖宗之法使屯駐三邊及川廣福建諸道州軍往來道路足以習勞苦南北畨屯足以均其勞佚詔陜西河東廣南將兵不輪戌他路河北輪近裏一將赴河東界諸路逐將與不𨽻將兵並更互差發出戍别路赴三路者差全將或半將餘路聽全指揮分差仍不過半將如本路州軍闕人安撫鈐轄司相度合銷人數移那亦不得過半將具軍分人數申樞密院半年一替因出戌别路而住營處闕人者本路安撫鈐轄司那移應副不足即奏取旨東南川峽闕人路分樞密院相度添戌兵諸路將副在州駐劄不係路分兵官知州并州鈐轄兼充者並差將官一員兼本州都監却減罷本處鈐轄一員止一員者不減其本單將駐劄處勿復差兼舊録云時光等雖欲盡罷諸路將官以壞神考兵制而樞密院難之新録辨曰實録直書時事廢興罷諸路將官壞兵制樞密院難之皆無所稽考刪去二十二字按司馬光及孫覺所建請雖略施行而將官訖不罷則樞密院當時必有議論要當具載曲折乃為詳盡新録但因舊文稍加刪削殊未安也當考右司諫蘇轍言青苖之害民朝廷之所患也罷而不盡廢而復講使天下之人疑朝廷眷眷於求利此臣之所深惜也向者朝廷申明青苖之法使請者必以情願而官無定額議者以為善矣然以臣觀之無知之民急於得錢而忘後患則雖情願之法有不能止也侵漁之吏利在給納而惡無事則雖無定額不能禁也故自今年春諸縣所散青苖處處不同凡縣令曉事吏民畏伏者例不復散其暗於事情為吏民所制者所散如舊蓋立法不善故使猾吏得依法為姦監司雖知其不便欲禁而不可得天下既已病之矣今朝廷復修夏料納錢減半出息之法此雖虛號減息而使天下曉然知今日朝廷意仍在求利雖有良縣令臣恐其不能復如前日自必於不散矣且自熙寧以來吏行青苖皆請重祿而行重法受賕百錢法至刺配然每至給納之際猶通行問遺不能盡禁今吏祿己除重法亦罷而青苖給納不止臣恐民間所請錢物得至其家者無幾矣伏乞追寢近降青苖指揮别下詔旨天下青苖自今後不復支散不勝幸甚
