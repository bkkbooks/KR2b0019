body:
  text: 續資治通鑑長編卷四十七宋李燾撰真宗咸平三年夏四月庚戌徙知鎮州客省使蔚州刺史慕容德豐知滄州先是敵衆內侵德豐繕兵固守餉道無阻詔書嘉奬焉德豐輕財好施宴享將士必極豐飫母留京師妻孥寓長安甚匱乏上聞而憫之特詔給團練使俸太子太保贈司空諡貞惠吕端疾甚上再親臨問焉是日卒中使護喪事追封其亡妻李氏為涇國夫人四子並遷官先是詔知雄州何承矩入朝州民百餘詣闕貢馬求承矩再任壬子復遣承矩知雄州還民所貢馬承矩上言曰臣聞兵家有三陳日月風雲天陳也山陵水泉地陳也兵車士卒人陳也今用地陳而設險以水泉而作固建為陂塘亘連滄海縱有敵騎何懼奔衝昨者戎人犯邉髙陽一路東負海西抵順安士庶安居即屯田之利也今順安西至西山地雖數軍路才百里縱有丘陵岡阜亦多川瀆泉源儻因而廣之制為塘埭則可戢敵騎息邊患矣今緣邊守將多非其才目不知書耳不聞善不守疆界動誤國家雖提貔虎之師莫覩鯨鯢之戮伏望遴擇疆吏出牧邊民厚之以俸祿使充其心借之以威權使嚴其令然後深溝高壘秣馬厲兵為戰守之備修仁立德布政行惠廣安輯之道訓士卒開田疇勸農耕畜芻粟以備凶年完長㦸修徑弩謹烽燧繕堡戍以防外患來則禦之去則備之如此則邉城安堵矣且邊鄙之人多負壯勇識羌敵之情僞知山川之形勝望於邊郡置營召募不須等其人才止求少壯武力令及萬人俟契丹有警任智勇將統而用之乃中國之長算也承矩正𫝊便於此下稱又上疏論𣙜場按事當在五年春後今移見五年四月癸丑殿前都指揮使河西節度使范廷召自定州來朝甲寅河北守城舉人康克勤等三十人對於便殿上親閲試以强弓徑弩克勤善左右射擊劔擢中選者十八人並補三班借職贈故西京左藏庫使劉紹榮為左神武大將軍誠州團練使故西京作坊副使李守倫為崇儀使武州刺史皆死於王均之亂者也乙卯改葬元德皇太后於永熙陵側奉神主祔享别廟有司言入廟鹵簿當減陵之半詔勿減勿減鹵簿實録在丁卯今附見丙辰禁黃河私渡船從轉運使劉綜之請也太子中舍王儼言前知趙州契丹遊騎至城下有學究米著勇而善射命召募壯士百人守捉南門訖敵退無敢窺其門者上命召對試以徑弓補三班借職王皥百一編云虞曹外即王儼吳越故臣時方入貢至都下具所聞以逹錢氏冀申警戒後歸朝任太子中允知趙州遇契丹入寇河朔諸郡皆閉壁自守儼獨啓城門以示之敵騎往復不敢窺訖事朝廷嘉之遷守濟州夀九十三歲實録獨不載儼事當考是日王均自升仙橋分路來襲官軍聚兵於東偏雷有終率軍逆擊大敗之殺千餘人奪其繖蓋金槍等物均單騎還城丁巳徙天雄軍都部署殿前副都指揮保順節度使葛霸為邠寧環慶都部署徙鎮州路副部署楊瓊副之詔諸州行軍司馬節度防禦團練副使上佐司士文學參軍非特許簽署不得掌事己未下詔戒敕朝士使各務進修毋得自棄怠初供備庫副使李允則知潭州將行上詔謂曰朕在南衙畢士安道卿家世今以湖南屬卿允則始至州大火民無居舍多凍死允則亟取官竹假民為屋及春而償民無流徙官用亦不乏初馬氏暴斂州人歲出絹謂之地稅及潘美定湖南計屋每間輸絹丈三尺謂之屋稅營田户給牛歲輸米四斛牛死猶輸謂之枯骨稅民輸茶初以九斤為一大斤後益至三十五斤允則請除三稅茶以十三斤半為定制又山田可以蒔禾而民惰不耕乃下令月給馬芻皆輸本色由是山田悉墾㑹歲饑欲發官廪先賑而後奏轉運使以為不可允則曰須報必踰月則饑者無及矣不聽明年又饑復欲先賑轉運使固執不可允則請以家資為質乃得發廪賤糶因募饑民堪征役者隸軍籍得萬人轉運使請發所募兵禦邵州蠻允則曰今蠻不擾無名益戍是長邊患也且兵皆新募飢瘠未任出戍遂奏罷之於是民列允則治狀詣安撫使者請留使者以聞詔書嘉奬及召還連對三日上曰畢士安不謬知人矣本傳謂安撫使乃陳堯叟以咸平二年三月安撫廣東西不及湖南或是往還經湖南耳又今年正月堯叟方如陜西體量恐此奏或非堯叟也又按實録但稱吏民請留允則及嵐州張允正不云安撫使奏今姑從允則傳但沒使者姓名蠲牛租在四年八月丙午今并書允則召還當考其年月辛酉上御便殿閲兵神騎副兵馬使焦握自言盤鐵槊十五斤命試之握舞於馬上往來如飛擢為本軍使壬戍賜應制舉人林陶同進士出身陶就試學士院不及格上方欲求俊茂故特奬之河東轉運使范正辭言請自今幕職官到任半年令長吏通判具能否以聞從之乙丑令兩制館閣詳定武舉武選人入官資序故事既而未嘗行也去冬趙安仁疏稱今武舉已議復行當指此也戊辰詔自今兩京諸路所解舉人宜先察訪行實或藝文可采而操履有虧投書匿名飾詞訕上之類並嚴加懲斷勒歸鄉縣課役永不得就舉如輒敢解送所由官吏必當論罪仍令御史臺糾之太子少傅致仕贈太子太保辛仲甫卒諡康節己巳以魯山縣令李旦為大理寺丞賜緋時縣民劉用聚徒造符䜟謀作亂旦知之盡擒其黨部送至闕下御史臺鞫問得實故旌賞焉用等並磔於京城諸門連逮者杖脊配流遠惡處其親戚交舊不問庚午知浚儀縣樊證求外任上謂宰臣曰京師浩穰赤縣最為要劇官得其人則民事皆理宜擇有操守不畏權豪者任之證陳州人辛未雷有終遣其姪奉禮郎孝先齎所奪王均槍繖入奏上以示左右因問孝先破賊之由笑謂殿前都指揮使范廷召等曰此鼠竊耳雖嬰城自守計日可禽矣按雷孝先傳王均反孝先隨季父有終進討與賊戰升仙橋斬首數百得均金槍黃繖以獻改將作監丞與此吻合但此編於三月甲午日已載遣子孝若馳奏等語而宋史於雷孝若亦云改補供奉官似有重復舛誤之處張思鈞恃􅊭賊功頗驕恣巴西尉傅翺有善馬思鈞求之翺不與思鈞怒託以饋運稽期輒斬之翺家詣闕訴寃乃命供備庫副使開封張煦為綿漢等州都巡檢召思鈞付御史臺鞫治罪當斬特貸死削籍流封州思鈞削籍實録在十月壬子今並書之思鈞召歸下獄則無其時據續耆舊傳及國史皆繫於四月今因雷孝先奏捷附見其事壬申以西京左藏庫使郭崇信卒不視朝贈福州觀察使命中使護葬事崇信守文次子也諸司無贈官廢朝之例以后兄故恩禮優異焉右諫議大夫知益州牛冕削籍流儋州西川轉運使祠部郎中直集賢院張適削籍授連州參軍初冕適奔東川東川人弗納詔令赴闕至長安就命制劾法官議冕當死詔特貸焉其通判已下並就加貶黜初張詠自蜀還聞冕代已詠曰冕非撫衆才其能綏輯乎既而果然癸酉魯山賊劉用等七人與龍衛軍使張能坐共占星變說䜟緯欲結衆為亂並磔於京城諸門緣坐如律同謀者二人亦斬連逮者杖脊配流逺惡乙亥詔諸州母得給公慿與僧往緣邊游禮詔川峽幕職州縣官並二年注替五月丁丑朔德音降天下死罪囚流以下釋之十惡至死劫殺故殺謀殺犯枉法贓論如律淮南江浙荆湖等路及近京諸州民曾經調發及新歸業者並除其去年逋稅天下逃田鄉縣失於開破均稅在村保者即與放免河北及淄青齊州舉人經蕃冦蹂踐處免取解天下吏民有武藝及材力過人者令長吏薦送赴闕益州亂軍除王均及其同謀人不赦外應脅從軍民如能歸順並當釋之川峽官吏將校請受銅錢一凖鐵錢五者倍給先是宰相張齊賢上言今之所患錢貨未至多望擇使臣往逐處相度添價及招誘人户淘採鉛錫仍按行銅山易得薪炭置監鑄錢如此二年間可得百五十萬貫既遣虞部員外郎馮亮未見內供奉官白承睿往幹其事庚申亮等言饒池江建州嵗鑄錢百三十五萬貫銅鉛皆有餘羡乃以亮為江南轉運副使兼都大提㸃江南福建路鑄錢事承睿同提㸃焉李繼遷冦麟州卓羅寨鈐轄西京左藏庫副使劉文質擊走之癸未賜詔嘉奬本傳云文質為卓羅寨鈐轄蕃酋旺布伊特滿來冦文質擊走之乘勝破其寨獲牛羊器甲萬計賜錦袍金帶徙知慶州不載其擊李繼遷事與實録異當考鄆州觀察推官王瞻自言前任集州有禦賊之勞乙酉以瞻為西頭供奉官丁亥徙知同州工部侍郎冦凖知鳳翔府凖為通判劉拯所訟故也凖本傳自同州朝京師行次閿卿又徙鳳翔與實録異實録别本或云為通判劉拯從吏所訟然載此事俱不詳當考代州部署昭化留後孔守正自言四任雁門邊亭久安願徙東北前鋒戊子以守正為定州副部署辛卯詔曰去嵗天下舉人數踰萬計考核之際繆濫居多蓋其薦送之時輒容僥幸合申典憲以警官司又自前貢院舉奏諸州不合格舉人朝廷每慮停殿人多或與寬宥將懲前弊再示明文自今濫有解薦及遺落孤寒藝實之士並從覆試有不當者悉論如律壬辰馬步軍副都指揮使威塞節度使王漢忠自涇原來朝丙申上御便殿遷補軍職凡十一日而畢自龍衛右第二軍都指揮使恩州刺史周訓而下遞遷者千三十一人周訓未見對禮部尚書溫仲舒於崇政殿之北軒凡五刻上以多雨慮妨收穫令中官於近郊取麥穗出示輔臣其粒實皆無傷焉上甚悅丁酉右神武軍將軍錢惟演為太僕少卿惟演俶子也幼好學於是獻所為文召試學士院而有是命戊戌詔深濵博洺祁州乾寧軍民經蕃戎冦掠不任耕稼者千三百九十八户無出來歲租官吏存撫之己亥詔御史臺獄流死罪令給諫以上録問開封府死罪選朝官録問初宋覃聶詠等坐私以銅錢易鐵錢下御史獄並决杖配役已而太宗知其寃詔問覃覃泣稱臺司不容辨說必令如所訊招罪太宗憫之乃詔自今御史臺每奏獄具差官詣臺録問其後廢不舉至是復行焉覃杖脊在太平興國七年實録景德三年獨為覃隱按此可見也知福州殿中侍御史馮伉卒詔腸其家錢十萬伉子元應同學究出身伉謐之子也歷典藩郡皆有政迹故特褒恤焉庚子詔權罷貢舉一年王均之亂有亡卒數百人冒夜扣梓州城求入知州馮起以其誠僞未可知弗即納俄悉叛去朝議謂起無方略召還壬寅復命知金州居數月起拜章自陳乃徙襄州先是詔都官郎中直史館劉䝉叟等試河北青齊等州舉人得合格者五百八十二人上親試之於是賜進士齊革等十三人諸科三百四十五人及第同出身有下第求試武藝及量材録用者五百餘人各賜裝錢慰遣之命禮部叙為一舉若能捍冦即賞以官秩甲辰河決鄆州王陵掃浮巨野入淮泗水勢激悍侵迫州城命步軍都虞候張進內侍副都知閻承翰等率諸州丁夫三萬人往塞之又遣使存恤災傷之民給以口糧知州馬襄通判孔朂坐免官巡堤左藏庫使李繼元配隸許州福津尉劉瑩携酒肴集僧舍屠狗聚飲杖一伶官日三頓因死權判大理寺王濟論以大辟經德音從流知審刑院王欽若素與濟不相得又以濟嘗忤宰相張齊賢持法尚寬欽若乃奏瑩當以德音原釋齊賢乘其事斷如欽若所啓濟坐故入停官此事不得其時五月癸未王欽若始知審刑因附見五月末應川峽州軍屯駐巡檢諸兵士及校師凡請受當請銅錢一文折支鐡錢五文者並與支鐡錢十文及川峽州軍諸色職官使臣料錢並驛料內錢等亦如之保州民趙加超者國之踈屬居保塞縣豐歸鄉東安村乃宣祖舊里也上遣內殿崇班麥守恩召加超至闕六月丙午朔授左屯衛將軍致仕特給全俸見緡昆弟子姪並加寵秩賜其妻女器幣有差先是上以兩浙灾疫深所軫念命三館檢討靈跡以聞於是遣使遍祭其山川祠廟為民祈福丁未詔緣黃汴河令佐常巡護堤岸無得差出有闕流內銓即時注擬勿使乏人乙酉免益州民今年夏稅先是河决灌濟泗鄆州城中常苦水患至是大雨彌月積潦益甚乃命工部郎中陳若拙與閻承翰經度徙城若拙等請徙於東南十五里汶陽鄉之高原詔可若拙思讓之孫也思讓初見晉天福六年辛亥詔河北諸州軍凡有科率長吏當親閲文簿均配不得專委廂鎮違者罪之上以文思使李守恩久任邉陲頗著聲績壬子擢授隴州刺史知靈州守恩漢超之子也乙卯以荆湖艱食令桂州以北勿禁人商販糧斛仍蠲其征算壬戌詔緣邊百姓自今無得輒入北界劫掠違者所在捕繫具獄以聞丙寅著作佐郎胡則上言請課河北州縣種榆柳以備材用從之上以大兵之後議遣重臣巡慰兩河初命宰相張齊賢辭不行丁卯命參知政事向敏中為河北河東宣撫大使樞密直學士馮拯陳堯叟為副大使發禁兵萬人翼從所至訪民疾苦宴犒官吏百官表云緣邉宣撫使無大字先是以殿中少監李昌齡知梓州是月又以給事中董儼知夀州王德裔楊緘皆嘗任轉運使後失官宰畿邑乙亥侍御史知雜事范正辭上言昌齡輩貪墨著聞願罷其民政詔追還儼敕餘悉選官代之户部判官右司諫直史館孫何出為京東轉運副使何上疏曰國家共治之任牧守為本親民之官令長為急前代刺史入為三公郎官出宰百里其慎選可知也今則兼隋唐取士之法參周漢考績之制然而資䕃登朝居千騎之長胥徒祇役分百里之封或目不知書或心惟黷貨屬當盛世尤宜釐革望令審官院吏部銓凡京朝官籍䕃入仕者非灼然績狀勿與知州州縣官流外出身者非有履行殊常不擬縣令庶分流品用勸士民又三司掌錢刀籠天下貨財古之李悝耿夀昌劉晏第五琦之流雖名聚斂之臣頗負經通之略皆民不加賦兵有羡糧厥後三建使額分其利權胥吏十餘官俸兼倍各為刑獄迭下符移案牘堆積務以决遣為事行之於外滋章頗甚臣權涖計局嘗與丁謂朱台符共酌三部文移之類可以减半望擇近臣識治體幹敏者與三部衆官減省又法官之任人命所懸太宗嘗降詔書諸州司理司法峻其秩益其俸今吏部擬授之際但問資歷相當精律令者或令捕盜懵章程者或使詳刑動致紛拿即議停替小則民黎負屈大則旱暵延灾欲望自今司理司法並擇明法出身者授之不足即於見任司户簿尉內選充又不足則選間書判練格法者考滿無私過越資擬授庶臻治古之化用闡太平之基未幾徙兩浙轉運使何樂名教勤接士類然性卞急不容物為使者專任峻刻所至州郡刺察苛細胥吏日有捶楚官屬多懼譴罰人不稱賢甘州輝和爾汗王遣使安進等來貢方物秋七月戊寅內出陳圖三十二以示輔臣己卯命知天雄軍府彰德節度使張永德歸本鎮以其老疾便頥養也辛巳馬軍副都指揮使王漢忠為高陽關行營都部署戊子定川峽得替文武官防送公人數自十人至三人並止於鳳州界己丑贈驍勇第一指揮使王通成州刺史以其子羽為大理評事賜白金二百兩通戍益州王均作亂通拒之遇害故褒恤焉丙申江南轉運使任中正言凖詔以饒州置場買納浮梁婺源祁門縣茶不便於民令臣與三班借職胡澄審行計度今臣等親到饒歙二州茶倉詢問逐處民俗皆言溪灘險惡轉輸艱阻願各復往日倉厫就便輸納及浮梁縣民李思堯等各願自備材木起創倉厫從之仍降詔曰山澤之征所宜公共茍便於民豈圖羡贏而言事之臣不明大體務為改革罔恤蒸黔特命使車往詢疾苦用循舊制式遂輿情已令制置茶鹽江南轉運司並依任中正所奏丁酉詔文武常參官入朝退朝不由正衙門非公事輒入中書委御史臺彈奏上以江浙饑歉己亥命翰林侍讀學士夏侯嶠侍講學士邢昺為江浙巡撫使知制誥趙安仁直祕閣潘慎修副焉所至問民疾苦疏理獄訟又令嶠於廬山集道士設醮及為大齊嶠采民病二十餘事上之亟詔釐革庚子秦國長公主求為駙馬都尉王承衍置守冡五户從之初荆湖江浙都巡檢使西京左藏庫使康州刺史楊允恭以疾聞詔其子大理評事告乘傳侍疾又遣中使撫問是月卒於升州甲辰賜允恭子告同學究出身􅉠錢二十萬絹百匹又以錢五萬帛五十匹給其家命揚州官造第一區賜之上諭輔臣令録內外庶官歷任功過編䇿進內其該恩復用者别編以備親覽八月丁未詔奬河東轉運使宋摶以并代都部署髙瓊等言其有政績也詔自今獻皇太后物皆曰恭上辛亥以京東水災遣太子中舍張舒供奉官閣門祗候張禧詣諸州遍加安撫癸丑翰林學士承㫖宋白等上重定內外官稱呼請下御史臺宣徽院閣門諸路轉運司嚴行告諭俾其遵守違者論如違律從之先是內外官稱多過其資品知雜御史范正辭請行條約故有是命又詔定臣僚趨朝下馬處令皇城司告諭甲寅以如京使韓崇訓為西上閣門使崇訓重斌之子也前知石州及麟州李繼遷再犯州境崇訓皆出兵擊敗之於是召還崇訓自言歷居邊任凡二十五年矣上嘉其勤故有是命尋出為邠寧環慶清遠等州軍都巡檢使都巡檢在九月庚辰今并書乙卯以濟州賊魏捷補龍猛軍隊長捷趫勇過人衆目為撼動山至是詣登聞自陳為惡黨所脅制願得首罪效力上召見賜錦袍銀帶而録之己未詔晉州以襄陵縣公田五頃給相州兵馬都監魚彥璘為永業仍蠲其賦彥璘本綏州人與高文岯同歸化故優待彥璘見淳化五年戊辰鹽鐡判官制置江淮荆浙茶鹽礬王子輿兼統淮南轉運使丁卯賜邵州進士趙世昌趙世長並爵公士以其出粟濟饑民也辛未命翰林學士朱昻往鄆州王陵掃祭河癸酉殿中丞國子監直講崔頥正以年老病目不任朝謁請致仕上命坐問恤甚至賜器幣聽以本官致仕而不罷其直講職王均自升仙之敗撤橋塞門雷有終等以官軍進至清遠江浮梁而度直抵城下於城北門之西奪舊草場因築壘焉依壕為土山分設鹿角造梯衝洞車攻具石普專主之高繼勳張煦孫正辭攻城東上官正李繼昌王阮攻城西楊懷忠與巡檢馬貴攻城南賊將趙延順盡驅凶黨以拒官軍既而延順中流矢死神衛軍使丁重萬代延順據東城門樓官軍又射殺之然每攻城則雨甚城滑不能上官軍及丁夫為洞屋攻城者賊又鑿地道出掩之多溺壕中死者千餘軍勢小衄賊大宴其凶黨歌吹之聲逹於城外時方暑濕攻城之人多被疾有終市藥它州自和合療之詔復遣洛苑使入內副都知秦翰為兩路捉賊招安使翰既至與有終協議於城北魚橋别築土山是月克城北羊馬城遂設鴈翅敵棚覆洞屋以進逼羅城賊亦對設敵棚號喜相逄樓九月戊寅官軍焚其敵樓賊氣始奪乃築月城自固均起農夫戇懦無謀其僞宰相張鍇者性狡獪粗習陰陽以熒惑同惡先是均每自言天軍若至我當先路出迎自陳被脅之狀鍇聞之即擇軍中子弟署寄班以防守均不令與人接於是詔遣均子姪親族至城下招降官軍射箭開諭鍇得箭即盡焚之均皆不知也初太宗毁并州故城徙其民民有重遷者猶居焉己卯令轉運司諭民畢徙勿復住故城中庚辰契丹應州節度使蕭錫喇弟克圖姪卓庫崇噶爾等歸順賜克圖名懷忠以為右領軍衛將軍嚴州刺史卓庫名從化為監門衛將軍崇噶爾名從順為右千牛衛將軍並賜冠帶器幣本紀載此事於八月庚辰按長厯八月無庚辰今從實録及契丹傳乙酉命直祕閣杜鎬等較第司天臺官吏優劣以聞庚寅始置群牧司命樞密直學士陳堯叟為制置使馬政舊皆騏驥兩院監官專之於是內外廄牧之事自騏驥院而下悉聽命於群牧司也王均為藥矢射官軍多死雷有終募勇士穴城䝉氊秉燧而入焚其守具甲午令東西寨鼓譟攻城有終與石普分主二洞屋以進普又穴城為暗門門成賊攢㦸擁路衆未敢進有二卒出請行許以厚賞乃麾戈直衝賊鋒稍靡遂克其城有終登樓下瞰賊猶以餘衆塞於天長觀前密設架於文翁坊高繼勳白轉運使馬亮願得秸秆油籸乃合衆執長㦸巨斧秉炬以進悉焚之楊懷忠又焚其天長觀前寨追至大安門復敗焉前後殺賊三千餘人是夕二鼓均領餘衆出萬里橋門突圍而遁有終尚疑凶黨潜伏遣人於街郭縱火詰朝與秦翰登門樓牙吏有受賊署為三司使者捕得立樓下乃積薪於旁厝火其上盡索男子魁壯者令辨之曰某嘗受僞署某職不復推究即命左右捽投火中自晨至晡焚數百人頗為寃酷李繼昌嚴戒部下無擾民者獲婦女童幼置空寺中分兵守衛事平遣還其家丁酉詔免遂果閬三州今年夏租十之三以其最近西蜀科役稍煩而果閬又遭水災故也辛丑相國寺僧法仙獻鐵輪鏺渾重三十三斤首尾有刃為馬上格戰具自言姓强家洺州親族百口為戎人所掠願隸軍伍以效死力上憫而許之補外殿直時神衛水軍隊長唐福獻火箭火毬火蒺藜造船務匠項綰獻轉海戰船式各賜以緡錢壬寅幽州衙校馬瓊照朔州衙校韓貢舉族來歸並補外州鎮將賜衣服緡帛彰德節度使兼侍中衛國公贈中書令張永德卒永德涉獵群籍好吟詠賓禮士大夫故太宗嘗有詔云方今天下諸侯賢明知書者唯永德一人而已是月知靈州隴州刺史李守恩陜西轉運使度支郎中陳緯部芻粟過瀚海為李繼遷所邀守恩緯皆戰沒守恩子廣文館助教象之隴州衙內指揮使望之弟寄班守忠亦俱死焉上聞知震悼冬十月甲辰朔特贈守恩洪州觀察使象之左贊善大夫望之內殿崇班守忠崇儀副使録其子佑之為左贊善大夫順之為供奉官用之為侍禁潤之為殿直慶之成之藏之為奉職又贈緯工部侍郎録其子保和為奉禮郎從子保雍為京兆府工曹參軍潤之者守恩幼弟養以為子守恩沒後復齒弟行更名守志居數年守志欲分財産守恩子息多且慮窘乏妻劉訴於上上以舊將家又死王事不欲令析居誨令和協并切責守志令樞密院召佑之等諭焉王均自成都突圍走度合水尾由廣都略陵榮趣富順監所過脅軍民斷橋塞路焚倉而去雷有終先命楊懷忠領虎翼軍追之後二日石普繼往以全軍為援先是朝廷每歲孟冬朔詔富順監具酒肴犒內屬蠻酋是日才設具而均黨適至皆就食焉將結筏渡江趨戎瀘蠻境聞懷忠追騎且至心易之均謂其黨曰速降懷忠之衆令負擔以行懷忠距富順六七里地名楊家市少憩焉賊衆在後者邀戰市側有高原懷忠遣親信五騎登原覘賊懷忠語左右曰縱賊渡江後悔無及石侯將至當以竒兵取之乃臨江列陳擊之賊衆散走有拿舟將渡江而遁者懷忠令强弩射之溺者數艘懷忠張旗鳴鼙入城均方在監署其黨多醉均窮蹙縊死虎翼軍校魯斌斬其首以詣懷忠又獲僣僞法物旌旗甲馬甚衆禽其黨六千餘人逆徒殱焉懷忠旋軍出北門石普始至奪均首馳歸成都梟於北市賊初署親軍為天降虎翼終為虎翼軍所殺云乙巳贈故神衛指揮使孫進為儀州刺史録其子東西班殿侍信為殿直賜袍帶靴笏白金二百兩旌死事也丁未以工部侍郎張鑑知朗州溪洞羣蠻數冦擾鑑召酋豪諭以威信皆俯伏聽命先是鑑知廣州與通判李夷庚巡檢謝德權不協二人密言鑑以貨付海賈往來質市故由廣徙朗已而鑑自陳有親舊謫瓊州每以俸米附商舶寄贍之又言夷庚德權憸人貪凶之狀上意稍釋尋召還李夷庚不詳邑里李沆傳可參考庚戌西京留守左僕射吕䝉正來朝召之也䝉正在洛陽多引故人賔客歡宴賑恤之政尚寬靜委府事於僚佐總大綱而已嘗有內臣之貴者將命而至䝉正接之不逾常禮時人重焉辛亥雷有終遣寄班供奉官楊崇勳馳奏益州平賜以錦袍銀帶器幣崇勳薊人也初給事東宫嘗嘆曰若目不識字手不解書其何以成立上知其志即東宫建學親為教授因命張旻為學長張景宗為副學長崇勳與夏守斌為學察安守忠以下為學生景宗宦者守忠并州人也景宗有傳未詳邑里乙卯制置羣牧使陳堯叟請令諸州有牧監處知州通判並兼管內羣牧事從之丙辰授西涼府六谷大首領結布伊朗布等將軍郎將司戈咸平元年十一月伊朗布已授安逺大將軍此必官其子弟也本傳既無實録㑹要皆如此疑有脫誤邠寧環慶清逺副都部署濵州防禦使王榮帥兵援送靈武芻糧榮素無術略又不嚴斥堠至積石夜為蕃賊所抄榮部大亂涇原環慶副部署博州防禦使徐興邠寧環慶鈐轄六宅使封州刺史李重誨與戰興等所將皆步兵戰敗榮不能救死者甚衆亡失殆盡法當誅上特貸之己未榮削籍流均州興重誨尋並削籍興流郢州重誨流光州興青州人也王榮授糧疑即與李守恩等同一事但史載不詳耳當考興重誨青在十一月朔今并書命翰林學士承㫖宋白等修續通典乙丑雷有終言王均伏誅德音赦川峽路死罪囚以有終為保信留後秦翰等九人並遷秩初上官正與石普不協翰恐生變為曉譬和解之正尋移疾歸東川故賞弗及是役也楊懷忠之功居最為普所掩上微聞之遣使按視戰所盡得其狀既而懷忠秩滿受代歸闕復自供備庫副使擢崇儀使領恩州刺史它日上謂宰相曰人有言清而行濁者實為難知如雷有終頃居三司每因奏對自謂公幹亷潔一代之良臣昨以兩川盜起因命剪除頗聞有終乘其擾攘貪黷財貨以鐡鏹計之僅數萬緡如是則王澤安得下流遠俗何由丕變言行相戾乃如是耶丙寅命翰林學士王欽若知制誥梁皓分為西川及峽路安撫使國子博士袁及甫祕書丞李易直副之閣門祗候李成象未見同勾當安撫事所至録問繫囚自死罪以下得第降之上諭欽若等曰朕以觀省風俗尤難其人數日思之無易卿等各宜宣布德澤使遠方知朕勤恤之意張士遜傳載士遜為射洪令知梓州張雍對安撫使以士遜吏能第一按王欽若安撫西川時張雍已入為度支使矣今不取延州言鈐轄張崇貴等破蕃賊大盧小盧等十族禽獲人口羊馬二十萬張崇貴傳云趙保吉與熟户李繼福為隙因緣內擾崇貴與張守恩擊之焚廬舍虜資畜器甲生口甚衆疑即此事也當考庚午以職方郎中直祕閣黃夷簡為光祿少卿主客員外郎直史館曽致堯為户部員外郎先是宰相張齊賢薦夷簡致堯宜掌詔命嘗有急制值舍人已出院即封除目命夷簡草之議者以為不可於是召試詞亦不工故但進秩而已自淳化末高麗朝貢中絶及王治卒弟誦立嘗遣兵校徐遠來候朝命遠久不至於是其臣吏部侍郎趙之遴遣牙將朱仁紹至登州偵之州以聞上特召見仁紹勞問賜以器帛仁紹因自陳國人思慕皇化為契丹羈制之狀乃賜誦鈿函詔一通令仁紹齎送時明州又言高麗國民池逹等八人以海風壞船漂至鄞縣詔付登州給資糧俟便遣歸其國江南旱十一月甲戌朔詔宰相參知政事依舊許令騎馬入中書大門至逐㕔下馬此據㑹要所稱依舊蓋八月間嘗改舊制也又詔中書五房各置主事一人至道元年八月初置主事二人今每房各置一人通為五人三朝史志云主事五人並至道元年置誤也乙亥靈州副部署慶州團練使孫進都監內殿崇班張嘏擅離所任赴闕進責授復州團練副使嘏許州教練使詔諸州府軍監旬奏禁狀自今並送審刑院看詳有滯留者以聞丙子張進等言鄆州决河塞戊寅詔曰租賦之制故有常典如聞均定以來多歷年所版圖更易田稅轉移眷我王畿是為政本將從便俗當立定規宜令刑部員外郎直史館陳靖為京畿均田使令自擇京朝官分下諸縣据原額定稅不得增收剩數其逃戶别立帳籍令本府招誘歸業其桑功更不均檢諭民廣令種植陳靖領使實録在癸未今從本志并書之庚辰河北轉運副使劉綜言知德州靳湘知濵州路振通判鄭州郝太冲亷勤幹事各賜詔奬之先是敵暴至濱州城下城中兵少民相恐衆謂振文吏無戰禦方略環聚而泣振乃親加撫諭堅壁自守敵尋引去而湘守德州敵亦不能陷振祁陽人湘高唐人湘後改名懷德以避寇準父諱焉郝太冲未見壬午令常參官轉對如故事詔曰間者深詔朝倫大闢言路而箝結相尚啓沃無聞豈朕識之未孚耶庶官狃於因循耶今順考舊規遞進讜議凡朕躬過失時政尤違教令之闕遺人情之壅遏並可條上毋或緘藏言近訐者亦議優容文不工者許其直致其未預次對官聽封奏以聞十二月壬子并五年十月末田錫疏可參考景德三年四月乙未又復轉對東都事略詔曰在昔黃帝有風后之問伯禹有昌言之拜勤納規諫以致雍和君臣協心上下無壅永念於此豫心惕然上御便殿閲捧日天武軍士教戰擢其射御絶倫者遞遷之鹽鐡使陳恕上占額圖丙戌詔任廣南者並二年與代益州之亂議者恐賊緣江下峽乃集施黔及高州溪蠻子弟為捍禦計羣蠻既熟漢路因時出冦掠轉運使丁謂始至召高州刺史田彥伊諭以禍福且言有詔赦不殺彥伊感泣悉歸漢口願世供奉不敢慢乃作誓刻石立蠻境上戊子彥伊遣其子來貢方物且輸兵器自言不復犯邊庚寅供備庫使賈繼勳除名流汝州洛苑副使錢守信左侍禁楊繼並削兩任配𨽻許滑州坐天雄軍修城不謹戰棚圮故也門下侍郎兵部尚書平章事張齊賢與李沆並相情好不協每敷奏多不直致議者以為疏濶辛卯日南至羣臣朝㑹齊賢被酒冠辨欹側幾顛仆殿上御史中丞劾齊賢失儀齊賢自陳因感寒飲酒禦之遂至醉頓首謝罪上曰卿為大臣何以率下朝廷自有典憲朕不敢私甲午齊賢罷守本官張詠傳云詠為御史中丞承天節齊㑹丞相大僚有酒失者詠彈奏之丞相大僚疑即齊賢也然詠咸平二年四月已出知杭州魏庠實代之而庠傳乃不載其嘗有彈奏不知何也今不出中丞姓名本傳稱齊賢再入相數起大獄又與冦準相傾奪人以此少之按數起大獄實録當有其事而皆不見寇準時又在外不知齊賢何以傾奪之豈自同州徙鳳翔由齊賢故耶皆當詳考宋史全文吕中曰一相獨任則有專權之私二相並命則有立黨之患然以趙中令權專任重而能與新進之吕䝉正共事以畢士安德尊望隆而能與使氣之冦準共政不惟無分朋植黨之風抑且盡同寅和衷之義而齊賢反與李沆不叶與冦準相傾何耶君子可以知相業之優劣矣樞密直學士馮拯言中書户房直發劄子四道不由發敕院㸃檢詔三司開封府御史臺進奏院等處凡受宣敕劄子須見發敕院官封方得承禀違者遣吏押送發敕院十二月丁未詔選判司簿尉二人充吏部流內銓南曹主事戊申上狩於近郊以親獲禽獸獻太廟壬子詔有司别録轉對章疏一本留中十一月壬午復轉對乙卯幸殿前指揮使班閲武藝輔臣曰陛下以神武訓兵士禁旅精鋭近古所未有也遂射苑中盡醉而罷庚申詔曰昨均京邑田租如聞小民弗諭朝㫖剪伐桑柘驚惑鄉閭况東作將興穀糴稍貴所宜省事以便吾民其悉罷之西蕃允鄂克部伊默嚕來貢犛牛甲子契丹稅木監使黃顒茶酒監使張文秀關城使劉繼隆張顯等各挈其屬歸順賜冠帶袍笏合於歸明班院顒等皆敵帥裕恱之族也丙寅兵部郎中直昭文館知兖州韓援上言伏覩近詔舉行轉對在外文武羣臣未預次對者各許上封奏事此蓋陛下克勤念慮旁採芻蕘幅員之間蹈詠斯極伏惟陛下膺運圖大握樞御極行一事必遵典禮發一言必訪古今三載遏密之中過形哀毁萬機聽斷之後未嘗怠遑每春澤稍愆宿麥未秀必親臨祠觀備薦蕭薌减御膳以焦勞走使車而旁午並禱羣望盡降五刑昭感上穹必獲嘉澍雖有祲沴安能為災然臣輒以菲葑窺測蒼昊退循僣越難避鼎鑊死罪死罪邇者微有亢旱頗傷稼政天其或者得無以太祖太宗二聖在天陛下春秋鼎盛兆民樂業萬國來王萬一聖心忽生驕佚故暫加災眚用警睿聰昔魏鄭公對唐太宗曰貞觀之初聞善若驚五六年間猶悅以從諫自兹厥後漸惡直言此蓋譏其漸怠於政也則知勤儉難守驕逸易生人之常情也元宗開元十五年後深居高視倦於臨御內寵嬪嬙外事征伐連起詔獄無辜誅夷遂至大盜猖狂中原板蕩蓋其升平之後驕怠使然也臣伏覩先帝福祚延洪享國長久孜孜勤儉未嘗一日曠於萬幾自端拱已來益勵精為理臣嘗權鹽鐡判官得與本使上殿奏事一日先帝從容謂臣等曰大凡居職不可不勤朕每見殿庭兵卒剩掃一席地汲一瓶水必記其姓字夫如是則有以見先帝勤勞庶政片善無遺願陛下守太祖之丕圖遵太宗之遺訓兢兢業業無怠無荒臣又聞治國者在乎遠佞人杜讒口書曰堲讒說殄行震驚朕師詩曰取彼譛人投畀豺虎臣觀今之朝廷自公相已下悉皆方正無邪佞之徒然事生隱微宜防未兆以陛下聰明神智必無驕逸之虞然願罔倦燭幽勿使小人乘間而進日慎一日雖休勿休居安念危在治防亂則天下幸甚疏奏召援歸闕授史館修撰授史撰在明年二月今并書於此開封府言獄空賜詔奬之詔緣邊吏民斬敵首一級賞錢五千禽生者倍之獲馬者給帛二十匹不堪帶甲者還之案本紀詔沿邊吏民係丁卯今並載丙寅疑有脫誤辛未遣翰林學士梁周翰以來歲元日詣太一宫設醮一月為民祈福李繼遷數擾邊環慶大屯士馬壬申詔徙河北轉運使劉綜為陜西轉運使河北河東强壯五代時瀛霸諸州已有之是嵗始詔河北民家二丁三丁籍一四丁五丁籍二六丁七丁籍三八丁以上籍四為强壯五百人為指揮置指揮使百人為都置正副都頭二人節級四人所在置籍擇善射者第補校長聽自置馬勝甲者蠲其户役尋募其勇敢團結附大軍為柵官給鎧甲此據兩朝兵志實録無之團結勇敢附大軍志又在明年今亦附見初濮州有盜夜入城略知州王守信監軍王昭度知黃州王禹稱聞之以為國家武備不修故盜賊竊發近輔因奏疏曰伏以體國經野王者保邦之制也易曰王侯設險以固其國又曰重門擊柝以待暴客傳曰預備不虞古之善教也自唐廣明之季天下亂離各據城壘繕治兵甲豆分瓜剖七十餘年太祖潛躍之初則復關南平淮甸受禪之歲再駕伐叛取庸蜀下荆湘克番禺討金陵是十分天下而有其七矣太宗纘嗣洪業克輯大勳平定并汾懷來閩越天下一家無不臣妾當時議者乃令江淮諸郡毁城隍收兵甲徹武備者三十餘年書生領州大郡給二十小郡減五人以充常從號曰長吏實同旅人名為郡城蕩若平地雖則尊京師而抑郡縣强幹弱枝之術亦匪得其中道也臣比在滁州值發兵挽漕關城無人守禦止以白直代主開閉城池既圯器仗不完及徙維揚稱為重鎮乃與滁州無異嘗出鎧甲二十副與巡警使臣彀弩張弓十損四五蓋不敢擅有修治又地濕暴涼為難上下因循遂至於此今黃州城雉器甲復不及滁揚萬一水旱為災盜賊竊發雖欲禦備何以枝梧臣按司馬遷天官書云天運三十歲一小變一百年一中變五百年一大變此常數也古聖知其如此設備以待雖變不亂國家以建隆甲子歲下西川甲午歲復亂三十年之應也當時西川止益梓眉遂有城可守惟郭載棄而先走為賊所據餘皆固守無城之處悉為賊據此有備無備之明效也陛下纘服二聖恢隆長世必有非常之制改轍更張因時立法固無封執太祖削諸侯跋扈之權不得不爾太祖平僞國夷妖巢本以杜覬望之術其如救世設法久則弊生救弊之道在乎從宜漢高懲暴秦郡縣之失封建其子弟及七國勢强文景乃行削奪唐德宗乘安史厭兵遂有貞元姑息之政憲宗覩齊蔡巨猾遂有元和討賊之議蓋見幾而作為社稷遠圖疾若轉規不可膠柱今江淮諸郡大患者三城池隳圯一也兵仗不完二也兵不服習三也今濮賊之興慢防可見望陛下特行宸斷參之廟算如且因而修治不欲張皇凡江浙荆湖淮南福建等郡約民戶衆寡城池大小並許置本城守捉軍士不過三五百人勿令差出止城中閲習弓劔然後漸葺城壘繕完甲胄郡國張禦侮之備長吏免剽略之虞疏奏上嘉納之
