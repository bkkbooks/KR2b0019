body:
  text: 續資治通鑑長編卷四百三十二宋李燾撰哲宗元祐四年八月甲寅詔應乞致仕而不願轉官者受敇後本州二百日內取索陳乞文狀保明受敇之實繳連奏聞如遞鋪違滯致出條限者更展五分日限限滿不到而亡殁委所屬保明詣實當與推恩中大夫至朝奉郎及諸司使許本宗有服親一人䕃補恩澤橫行諸司副使見有身自䕃補人及內殿承制崇班閣門祇候見理親民并承議郎奉議郎許陳乞有服親一人恩例中大夫中散大夫諸司使帶遙郡者䕃補外凖此即朝奉郎以上及諸司使雖未受敇而身亡者在外以乞致仕狀到門下省日在京以得㫖日亦許乞有服親一人恩例初謝景溫罷新除刑部尚書改知鄆州右正言劉安世論景溫當繳還刑部尚書告既改鄆州自不當復帶刑部尚書新銜乞追告毁抹不報既而李常罷新除兵部尚書改知鄧州按李常於五月坐不言蔡確罷新除兵部尚書改知鄧州並未知鄆州原本作改知鄆州誤今改正常即繳還兵部尚書告而鄧州敇亦不帶兵部尚書新銜安世遂與左諫議大夫梁燾同奏景溫常一等差除而行遣頓異尚書省任意亂法乞行改正再奏不報又奏臣等固非自執偏見上要朝廷特以事繫法度不敢中輟况李常謝景溫均為近侍差除遷徙恩數略同惟是告身付授獨異考之典故實所未有議者謂刑部尚書之命猶已收還今日空名假之何益是天子之制反以執政之喜怒而私豫奪也方二聖臨御仰成大臣之際若廟堂之上不顧國體沮遏公議變易舊章不防其微將亂政事惟陛下早施睿斷力振主威追寢命書毋尚姑息使遂非之論不能勝至公之理天下幸甚乙卯詔謝景溫除權刑部尚書告令繳納樞密院言果莊已除涪戎校尉請給官屋二十間月支食糧錢三十緡春冬衣絹各十匹冬衣綿三十兩并時服馬一匹給芻菽令開封府推判官一貟提舉從之鄜延路經略司言宥州移文稱已鳩集永樂等陷沒人口將管押赴界首分付却交領四寨及㸃檢嵗賜詔趙卨等專一定寫牒本報宥州訖以聞又言宥州牒稱合立界至候送還人口交割四寨了日共約日委官隨宜分畫請候夏國送到人口即移牒宥州從之其後宥州牒鳩集到永樂人口一百五十五人管押赴界首分付交領賞絹所有四寨别差官同日領受去訖本司今定到回牒候交割人口了當及遷移人口畜産資糧盡絶别差官約日交割施行詔令鄜延河東熙河蘭岷路經略司各選差諳練詳明將官及機冝官各一貟依詳牒報宥州事理别作明目遍詣逐處先具城寨河立界至或西人有詞以何道理折難令帥臣審度利害具形勢相去逺近畫圖聞奏政目是月宥牒候還人交寨了日指揮所委官隨宜分畫次令保安牒立界依慶厯誓表依蕃漢見住中間為定十月乙卯范純粹云云提舉河北糴便糧草郭茂恂為度支貟外郎都水監丞鄭祐提舉河北糴便糧草丙辰刑部言熙河秦鳯鄜延陜西永興軍等路安撫司奏管下州軍近年無强盜賊徒請罷權宜指揮仍舊法施行從之戊午詔聞在京諸軍營房例多損壞纍經霖雨深慮墊側或有無屋可居者將致失所其令將作監速行修葺仍令工部提舉催督及郎官分巡檢察己未詔中書侍郎劉摯為禮儀使同知樞密院事趙瞻為儀仗使尚書左丞韓忠彥為鹵簿使尚書右丞許將為橋道頓遞使以門下侍郎孫固乞免禮儀使故也詔輔臣分詣諸宫寺祈晴又詔自今考校特奏名舉人進士入第四等中以上諸科入第三等以上各不得過就試人數之半此事當考政目同左諫議大夫梁燾左司諫劉安世言臣等昨以劾奏章惇强用賤價奪民之産朝廷體量得實止斷罰銅十斤罰不當罪尋具論列今已踰月未䝉施行臣等按惇用其子承事郎援之名承買朱迎等田業而下狀之日惇父尚在檢凖名例律疏謂祖父母父母在子孫無自專之道而有異財别籍無至孝之心名義與之俱淪清節於兹並棄稽之典禮罪惡難容二事既不相須違者並當十惡推原法意正為惇設為子事父而用意如此不孝孰大焉至於悖慢帷幄之前殊無人臣之禮交結蔡確造播姦言貪天之功僥幸異日為臣事君而處心如此不忠莫甚焉臣等按惇之罪實人倫之所共棄王法之所必誅投之四荒始能塞責罰金輕典衆謂失刑伏望聖慈深賜省察依近日邢恕體例不俟服闋預降責命所貴邪正明辨姦慝知畏又言臣等近纍具論奏章惇罪名未正欲乞别議竄黜至今未䝉施行臣等伏見監司郡守以不受朱迎訴狀並行責降令丞違法給受田産亦已衝替檢凖編勑節文衝替比徒一年臣等竊謂原情定罪固有重輕據事約法亦分首從今干繫官吏皆因惇以致罪而又處徒坐惇係首惡之人乃止罰銅十斤事理顛錯亦已太甚况下狀之日惇父尚在而别籍異財事狀著明考按律文罪入十惡愚民冒犯猶有常刑惇為大臣天下所望而虧損名教絶滅義理止從薄罰何以示懲臣等竊謂聖人制法惟務至公若行於匹夫而廢於公卿伸於庶民而屈於貴近此乃姑息之敝政非清朝之所宜行也按惇父在而别籍合徒三年既犯十惡則議請減贖一切不用未知前日所斷援引是何律令伏望陛下深賜省察出臣等此章詰問執政如律文别有衝改臣等妄言即乞明行罔上之戮若大臣别無異說即乞出臣等章疏以正惇罪及依近降聖㫖不用赦原但能稍正典刑庶幾不屈清議惟兾出於宸斷早賜指揮又言臣等向者數曽論奏章惇罪名未正今已纍月未䝉施行臣等按惇於元祐三年二月十四日用其子援之名承買朱迎抵當田産至五月十六日方丁憂即是投狀之日惇父尚在推考事實别籍甚明據律定刑既入十惡則議請減贖一切不用雖赦無得原者庶人之愚或有抵冒朝廷行法未始少私惇位大臣為民所望而絶滅義理貪利無親止令罰金是亂典憲臣等竊謂君子犯義小人犯刑古之聖賢為之深戒若謂惇為君子邪今則犯義矣以惇為小人邪今又犯刑矣二者均不能逃聖人之誅則朝廷何憚於惇而廢祖宗之法伏望陛下出臣等此章送刑部定奪若律文曽經衝改引用不當即乞正臣等妄言之責如勘㑹惇投狀月日係丁憂之前委是父在别籍異財即乞依律斷罪燾集别有五章文辭與此差不同今不别出是日詔章惇候服闋與宫觀差遣安世又言臣伏自去年十二月後來十次論奏章惇買田不法等事雖䝉朝廷節次施行而惇之罪名今猶未正遷延周嵗意在經恩公論難安須煩天聽臣聞議者以謂從來大臣不欲與衆庶交易故託子弟以立文契臣以謂不然祖宗之制惟戒從官以上不得廣營産業與民爭利茍非殖貨太甚則是法所不禁若身為大臣欲避好利之名而使子弟侵刻下民乃是陽為應律而隂縱貪鄙欺君犯義無大於此借如或者之說須無父兄方可别立名目今惇父在而下狀之日乃用其子上虧孝敬下失義方庶人之愚猶不至此大臣之體固若是乎議者又謂惇已不帶職及有㫖候服闋日與宫觀差遣足以示懲不必深責臣亦以為不然惇之不得職名自是朝廷以其無禮於兩宫黜之外補故不用執政善去之例後來惇以便親為請遂得提舉洞霄宫方陛下聖政日新姦邪屏息如惇等輩自知罪惡貫盈必求退縮將來終制方且自陳而乃先以宫觀授之是中惇之意恐不足以當今來所犯之典刑也臣聞自責罰本路監司後來至今訟者不已蓋惇平日持權暴橫人不敢校既知朝廷特為伸屈是以競求赴訴為民之害如此之極何可貸也伏望聖慈以臣劾奏著之責辭或令降官或俾分務但能不失其罪足以稍正國體惟冀出於宸斷早賜指揮二十四日章惇降一官宫觀候服闋日給告辛酉寶文閣待制何正臣知饒州左諫議大夫梁燾左司諫劉安世言昨以何正臣除知洪州臣等論正臣在先朝為患與舒亶相等而獨以幸免公議深不以為然如未能投諸四裔乞且與宫觀差遣朝廷遂罷知洪州則是朝廷以臣等之言為當矣今來未久復與饒州夫饒與洪輕重相去之不侔固不待臣等言而可知然臣等須至再論者出於義固不可已也蓋韓存寶之事正臣固可謂凶人矣况存寶之死議者皆尤正臣朝廷未及加罪而正臣自度不為公議所容故乞宫觀臣等竊見往古廢斥姦臣不必明指一事而去之也但天下指以為公議所不容未嘗見之行事尚當廢之况正臣慘酷著於治獄往時多中傷士人因朝廷許自訴而雪者非一也今乃付正臣以善郡陛下何以慰士大夫之心乎正臣見在金陵居住今得饒州一切便安使正臣自擇所處亦不過如此夫凶人人之所共嫉朝廷待之如此使為善者將何勸乎伏望陛下深察臣等之言為他日無窮之慮依舊與正臣宫觀差遣如以向來宫觀出於正臣自請不緣遷謫即以臣等今日之言特賜施行貼黃稱臣等據士大夫所傳何正臣在先朝為御史時聞欲治韓存寶之罪即先入文字乞特行威斷及存寶之死天下皆知正臣處心積慮成於殺也又言正臣昨自提舉宫觀任滿就差知洪州言者指其罪狀乞賜黜罷卒復與郡未為允當郡之為别雖有大小而朝廷寄任之意則同非所以處罪人也臣嘗質之士大夫皆以謂正臣過惡非一而所當必治者甚大自洪州命下中外洶洶至今未息方朝廷詳刑謹罰未欲遽置於理冝投之散地少塞羣情今乃使居吏民之上此公議之所以不能平也伏望聖慈特賜指揮追寢告命且與依舊差遣足以懲戒凶邪貼黃朝廷如以正臣昨來提舉宫觀出於自請今復與之不復示責即乞坐言者所論别除宫觀差遣梁燾集有此除知洪州在七月二十八日罷在八月二日詔何正臣提舉洞霄宫洞霄之命在九月二日今并書三省言太常寺狀將來明堂禮畢稱賀按天聖五年南郊故事從開寶郊禮藉田禮畢行勞酒之禮如元㑹之儀參詳比附禮例南郊禮畢日太皇太后御㑹慶殿皇帝於簾內行恭謝之禮百寮稱賀訖宣羣官外殿賜酒太皇太后宣諭曰其日皇帝謝于宫中百官皆已勞勿用賀止於內東門進表宰臣吕大防等奏曰聖心每懷謙抑此盛德之事請降詔付外施行乃下詔曰皇帝臨御海內晏安五經季秋再講宗祀以享天心顧吾何功獲被斯福今有司講天聖之故事修㑹慶之盛禮俾文武稱慶干廷吾自臨決萬幾日懷祇畏豈以菲薄之德自比章獻之明矧復皇帝致賀于禁中羣臣奉表于闈左禮文既具夫又何求前朝舊儀吾不敢受將來明堂禮畢更不受賀百官並內東門拜表詔開封府界京西河北東路人户合納蠶鹽錢如不係災傷願折納斛斗者聽壬戌樞密院言邵州蠻人作過纍詔掩殺未報詔謝麟依纍降㫖措置早急邉警毋得逗留觀望馴致後患癸亥吏部言比詔內外官司舉官悉罷令本部立定合舉官處今請尚書左選除𣙜貨務等仍舊舉官外左右廂店宅務文思院太常寺協律郎內酒坊法酒庫作坊八作司通利軍使凖備勾當市舶司經養撫庫務等尚書右選除都大巡河及御厨等仍舊舉官外法酒庫內酒坊街道司作坊八作司便錢博易務排岸司都監巡檢軍使知縣監修營房等侍郎左選職官令録判司薄尉并鳯翔司竹監獨員縣城寨主簿監當縣尉等侍郎右選武學學諭巡檢寨主催綱押綱文思院作坊八作司等城寨軍使知縣縣尉巡檢監押巡坊勾當公事指使凖備差使部役押隊退背河掃催綱監當等並從本部注擬從之左諫議大夫兼權給事中梁燾言凖中書省録黃為市易官茶令客鋪户帶買等事今勘㑹到見在茶五十九萬七千七百餘斤計四千六百六十餘篰盡是市易司磨茶買下夾雜陳茶昨住磨茶後出賣不行户部申乞速行變轉恐至陳損今來又經五年顯有大假壞惡竊緣客人本以射利為生官中雖指揮帶買仍許出外貨賣又許免納稅錢若茶貨不至陳損可以品搭出賣得行自然樂於承認必是纍有虧折方敢經官陳訴今雖寬得客人又復移患鋪户乃是官司刻於裒取公行抑配與市易舊弊不異甚未副陛下愛民賤利之本意也况前後約束不得抑配詔條明具若先自朝廷違之何以示信天下欲乞聖慈特賜指揮户部再委官定驗見管茶陳損內揀出塵惡不堪支遣外分為等第比尋常折支茶多減價錢盡數撥赴近京州軍充明堂官員廂軍折支庶得早見發去滯貨除害公私且使逺近聞朝廷實有止絶抑配之惠商旅漸肯通行以救今日之弊所有録黃謹具封還貼黃臣嘗聞諸州軍所有合折支雜物數目不多或有全無去處只支本色今若以上件茶貨分在近京去處以充折支頗得穩便雖是減損見買價錢却省得户部合支賞給不少燾奏不得其時日八月二十六日舊録罷元祐三年令茶客帶買官茶指揮今附見其前新録遂削去舊録非也所稱元祐三年指揮亦當考詔罷元祐三年令茶客帶賈官茶指揮舊録有此新録削去此當與梁燾所奏同考究之乙丑都水監勾當公事李偉言已開撥北京南沙河直隄第三鋪放水入孫村口故道通行具到乘勢閉塞大河北流等利害又言沙隄第三鋪水勢順快故道漸亦為備朝廷今日當極力必閉北流乃為上策若不明詔有司即令回河深恐上下遷延議終不決觀望之間遂失機㑹乞復置修河司從之仍以都提舉修河司為名差都水使者吳安持提舉外都水使者范子竒同提舉以偉為專切管勾應緣回河等事五年十月二日罷修河司蘇轍孫升云云八月二十八日初用都水議又玉牒云詔以回復大河置都提舉修河司調夫十萬人權陜西轉運副使李南公權發遣轉運使是月邉郡稱有警請八將皆上謂之防秋舊河東十二將其四以備北其八以備西八將更休為上下畨今八將皆上安撫使滕元發曰賊若并兵犯我雖八將不敵也若其不來四將足矣卒遣更休而將吏懼甚扣閣爭之元發指其頸曰吾已捨此矣卒無冦元發舊傳云頸可斷兵不可出遂失備其後冦至大掠麟州府邉民幾盡新録辨曰據蘇軾所撰元發墓志云卒無冦其言疑可信今從墓志删去二十三字按元發墓志軾代張方平撰不當繫之軾新録蓋考之未詳知杭州蘇軾言臣自入境以來訪聞兩浙諸郡近年民間例織輕踈糊藥紬絹以備送納和置夏稅官吏欲行揀擇而姦猾人户及攬納人遞相扇和不納好絹致使官吏無由揀擇期限既迫不免受納嵗嵗如此習以成風由是京師官吏軍人但謂兩浙衣賜皆不堪好上京綱運嵗有估剝日以滋多去年估剝至九千餘貫元納專典枷鎖鞭撻典賣竭産有不能償姑息之弊一至於此臣自到郡欲漸革此弊即指揮受納官吏稍行揀擇至七月二十七日有百姓二百餘人於受納場前大呌數聲官吏軍民並皆辟易遂相率入州衙詣臣喧訴臣以理諭遣方稍引去臣知此數百人必非齊同發意當有凶姦之人為首紏率密行緝探當日據受納官仁和縣丞陳皓狀申有人户顔巽男顔章顔益納和買絹五匹並是輕疏糊藥丈尺短少以此揀退其人却將專典拑撮及與攬納人等數百人對監官髙聲叫喊奔走前去臣即時差人捉到顔章顔益二人枷送右司理院禁勘只至明日人户一時送納好絹更無一人敢行喧閙續據右司理院勘到顔章顔益招為本家有和買紬絹三十七匹章等為見遞年例只是將輕踈糊藥紬絹納官今年本州為綱運估剝數多以此指揮要納好絹章等既請和買官錢每匹一貫不合將低價收買昌化縣輕踈糊藥短絹納官其顔章又不合與兄顔益商量若或揀退即須拑撮專揀扇搖衆户呌喊投州嚇脅官吏令只依遞年受納不堪紬絹尋將買到輕踈糊藥短絹五匹付揀子家人翁誠納官尋被翁誠覆本官揀退章等既見衆戶亦有似此輕踈短絹多被揀退尋拑撮翁誠呌屈顔益在後用手推翁誠令顔章拑去投州即便走出三門前呌屈二聲跳出攔杆將兩手擡起喚衆戶扇搖呌喊稱一時投州去來衆戶約二百餘人因此亦一時呌喊相隨投州衙喧訴臣等體訪得顔章顔益係第一等豪戶顔巽之子巽先充書手因受贓虛銷稅賦刺配本州牢城尋即用計結胥吏醫人託患放停又為詐將産業重疊當出官鹽刺配滁州牢城依前託患放停歸鄉父子姦凶衆所畏惡下獄之日閭里稱快謹按顔益顔章以匹夫之微令行於衆舉手一呼數百人從之欲以衆多之勢脅制官吏必欲今後常納惡絹不容臣等少革前弊情理巨蠧實難含忍本州既已依法決訖臣獨判云顔章顔益家傳凶狡氣蓋鄉閭故能奮臂一呼從者數百欲以搖動長吏脅制監官蠧害之深難從常法已刺配本州牢城去訖仍散行曉示鄉村城郭人戶今後更不得織造輕踈糊藥紬絹以備納官庶幾明年全革此弊伏望朝廷詳酌備録臣此狀下本路轉運司遍行約束曉示所貴今後京師及本路官吏軍人皆得堪好衣賜及元納專副不至破家賠填所有臣法外刺配顔章顔益二人亦乞重行朝典貼黃勘㑹本州去年發和買夏稅物帛計一十四綱今來只估剝到四綱已及九千餘貫乞下左藏庫万見估剝數目浩大此假當删修緣蘇軾後來坐此致人言不得略去也法外刺配顔章顔益既自劾當有回降指揮合檢附左諫議大夫梁燾言臣竊以置局領事幸啓多目徒亂官守而無益治體今中書門下外省編修條例六曹寺監之事也編修敇令刑部之事也城隍土木工部之事也考核吏額吏祿三省五房之事也皆張官置吏𣲖别枝引空日曠嵗附託氣熖漫無成功曽不上體朝廷之聰明下恤官私之所病而又不本官制之法也陛下純法祖宗政治執要而臣下乃敢浸以枝蔓多其條目喜動者以紛更為意姑息者以仍舊為務上下回忌違逺至公甚未副宸衷勤政求治之誠意必欲事當其理不若各委攸司委任而責其效則顧望牽制之弊自消矣臣愚欲望聖慈特賜指揮以前件六事盡罷所别置官吏以見今行遣付之逐路結絶不可閲月踰時相次就工既協省事之理又得裁費之實今日之政不為小補伏望特留宸念燾集奏此在客人鋪戶帶買官茶後按二十六日罷帶買指揮因以此奏附八月末其從違當考燾又嘗言臣訪聞諸路州縣以役法利害申轉運司多至兩月或一月餘日轉運司或不依期限了絶州縣待報久滯聖恩人情惶惑陛下本為便民立法博求至當今朝廷以惠養百姓為事而四方之民莫不知陛下至仁之美意而講議踰年未降成法四方但聞仁政之名而未被其實使郡縣無法可守百姓懷疑動搖不稱陛下發政施仁之本意臣愚欲望出於宸斷罷議役法局一切依嘉祐法施行其間或有未便以歲月隨事刋改庶早得郡縣守法以安民心政體至重乞留聖意貼黃竊慮諸路監司未盡得亷平忠實之人不知朝廷本意大臣建明惟以省事寬民為先而乃懷姦觀望附㑹欺罔狃習故態肆為邪說欺罔朝廷伏望面命執政大臣協恭遍考中外臣僚前後奏章敢有如此者即乞重行責降仍乞降㫖先行戒諭此奏不得其時燾集在元祐三年前後姑附四年八月末更當詳考詔洺州曲周雞澤依舊分為兩縣從河北都轉運司提㸃刑獄奏請也編録冊八月二日事省曲周入雞澤在熙寧二年
