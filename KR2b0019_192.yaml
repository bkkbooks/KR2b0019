body:
  text: 續資治通鑑長編卷一百八十八宋李燾撰仁宗嘉祐三年九月己巳朔詔河東經略使西人議府州橫陽河界恐麟州勢孤絶其相度利害以聞橫陽河為府州界乃去年八月壬申辛未以荆湖北路轉運使兵部員外郎王綽為工部郎中辰澧州體量盜賊殿中丞雷簡夫為國子博士通判辰州都官員外郎余藻升一任差遣西京左藏庫使荆湖北路鈐轄兼知辰州竇舜卿領康州刺史禮賔副使兼閣門通事舍人權荆湖北路鈐轄兼知澧州郭逵為禮賔使舜卿逵仍各賜錢二十萬並以招降彭仕羲有勞故也郭逵傳云逵遣别將孫置掎角破賊羅城峒拔賀府等二十餘隘克新州踰旬至桃花洲仕羲棄城走追擊大破之范祖禹作逵墓銘云仕羲反逵加帶御器械充湖北鈐轄兼知澧州捕得仕羲親信置左右以為小吏善遇之久乃備言山川地形虛實情僞用兵短長嘉祐三年春用小吏為鄉𨗳以步兵進討破羅城峒及賀府等二十餘隘拔新州又銜枚夜進踰旬至仕羲所居桃花洲一戰破之仕羲棄城走蠻酋百餘人仰面乞降逵受降以聞賞功拜本司使實録㑹要載平蠻事極不詳今附見賜開葛家岡河役卒緡錢恭謝天地之嵗始用薛向議罷並邊入中粟自京輦錢帛至河北專以現錢和糴唯入中芻豆則仍計直給茶行之未久用薛向議在嘉祐元年十月末本志云行未數年恐失實今略刪修之論者謂輦運科折煩擾居民且商人入錢者少芻豆虛估益髙茶益賤詔翰林學士韓絳龍圖閣直學士知諫院陳旭即三司經度絳等言自改法以來邊儲有備商旅頗通未宜輕變唯輦運之費宜敕有司悉從官給而本路舊輸稅絹者毋得折為現錢其入中芻豆罷勿給茶所在平其市估至京以銀紬絹三物償之皆從其說自是茶法不復為邊糴所傾而通商之議起矣初官既𣙜茶民私蓄販皆有禁臘茶之禁尤嚴于他茶犯者其罰倍凡告捕私茶皆有賞然約束愈密而冒禁愈蕃嵗報刑辟不可勝數園户困于征取官司旁緣侵擾因而陷于罪戾以至破産逃匿者嵗比有之又茶法屢變嵗課日削至和中嵗市茶淮南才四百二十二萬餘斤江南三百七十五萬餘斤兩浙二十三萬餘斤荆湖二百六萬餘斤唯福建天聖末增至五十萬斤詔特損五萬至是增至七十九萬餘斤嵗售錢并本息計之才百六十七萬二千餘緡官茶所在陳積縣官獲利無幾論者皆謂宜弛禁便先是天聖中有上書者言茶鹽課虧帝謂執政曰茶鹽民所食而强設法以禁之致犯者衆顧贍養兵師經費尚廣未能弛禁爾景祐中葉清臣嘗上疏乞弛禁清臣疏已見景祐三年三月下三司議皆以為不可行至是著作郎何鬲三班奉職王嘉麟又皆上書請罷給茶本錢縱園户貿易而官收稅租錢與所在征算歸𣙜貨務以償邊糴之費可以疏利源而寬民力嘉麟為登平致頌書十卷隆衍視成䇿二卷上之淮南轉運副使沈立亦集茶法利害為十卷陳通商之利宰相富弼韓琦曽公亮等决意嚮之力言于帝癸酉命絳旭及知雜御史吕景初即三司置局議之乙亥秦鳯經略司言西畨嘉勒斯賚與契丹通姻先是嘉勒斯賚納克壘阿匝爾等叛歸夏國諒祚乘此引兵攻掠境上斯賚與戰敗之獲酋豪六人收槖駝戰馬頗衆因降隆博哩恭瑪頗克三大族㑹契丹遣使送女妻其少子董戬乃罷兵歸此據本傳乃嘉祐三年事今附見契丹既與嘉勒斯賚通姻數遣使由回鶻路至河湟間與嘉勒斯賚約舉兵取河西河西謂夏國也欲徙董戬凉州與之相近嘉勒斯賚辭以道逺兵難合乃止此據髙永年隴右日録并汪藻青唐録契丹之妻董戬也遣使送之久留不還間而蠱其妻董戬知之殺其使置其妻不見母喬氏喻董戬宜以契丹故親其妻董戬不從此據汪藻青唐録附見丙子屯田員外郎李師中提㸃廣南西路刑獄師中建言嶺南自古不利戍兵乞置土丁募敢勇家丁至四五則藉一人總為五畨上州教閲不及五百人為四畨利器械農隙訓之禁一切他役上畨則給糧免稅校長免二丁稅于是四路得四萬餘人又請通鹽商以便民復雍州和市場以實邊事多施行桂州興安縣有靈渠北通江湖南入海自秦漢通舟楫皆石底淺狹十八里內置三十六斗門一舟所載不過百斛乘漲水則可行師中積薪焚其石募工鑿之廢斗門二十六役三旬而成舟楫以通辛巳天平節度使宣徽南院使張堯佐卒贈太師賜其家僦舍錢日三千堯佐起寒士持身謹畏頗通吏治曉法律而晚節以戚里進遽至崇顯戀嫪恩寵為世所鄙吕陶記聞云唐子方在言路以忠義結主眷一日登對仁宗從容與語及諫諍事且謂言者有過當常指朕用張堯佐必有如明皇播遷之禍朕果用一堯佐豈遂為明皇播遷乎子方對曰用堯佐未必播遷然陛下若播遷則更不及明皇蓋明皇有肅宗興復社稷陛下安得有肅宗乎上變色徐曰此事與韓琦商量久矣蓋欲立英皇也張詵凡諷時為臺簿知之詵謂余言陶記此事考按未合丁亥降知鄧州吏部郎中天章閣待制劉元瑜知隨州坐前知潭州私補畫工易元吉為助教㑹要在二年九月今從實録以施州溪峒蠻向永勝所領州為安定州巳丑契丹遣長寧節度使蕭翥衛尉卿郭竦來謝慰奠辛卯單州團練使劉永年為齊州防禦使髙陽關部署臺諫官言永年進緣戚里未嘗有軍功乃復為單州團練使知涇州壬辰詔在京諸司庫務監交檢㸃官物差未授外任京朝官已授外任者毋得差癸巳以葛家岡新開河為永濟河凡役工六十三萬九月而成冬十月辛丑以故西蕃奬州團練使轄戬子轄竒鼎摩正為河州刺史轄竒鼎摩正即趙思忠熙寧七年六月賜姓名治平元年七月丙戌更授河州轄結策丹烏沁為本族都軍主轄結策丹烏沁不知後來有無曽賜姓名轄烏察為副軍主轄烏察即趙紹忠本傳云摩正母弟轄烏察居銀川聶家山至和二年補本族副軍主與實録不同㑹要至和二年亦無轄烏察補副軍主事今不取本傳又稱轄烏察為摩正母弟與髙永年元符隴右録及汪藻青唐録不同當考轄戬居康古屢通貢初授澄州團練使授澄團在寶元二年四月居龕谷其詳附景祐三年末遷奬州不得其時既生摩正因入秦州過伏羌蕃部李提克星見其女欲之提克星曰吾女已嫁棄夫歸今妻汝夫聞之必怨恐其讐我汝今還以兵來劫我可也轄戬從之遂舉兵逆其女以歸生轄智及轄烏察此據髙永年隴右日録及汪藻青唐録汪藻云生轄智髙永年云生轄烏察今兩存之而轄戬又有子曰轄烏納克戬轄烏納克戬後不及賜姓名曰轄烏延正後賜姓名曰趙濟忠轄戬凡五子此據汪藻青唐録轄戬既死摩正弱不能自立青唐族酋轄約髙永年云轄約今岷州包順之兄格羅及僧羅尊迎居洮州欲立以服洮岷疊宕武勝軍諸羌髙永年云武勝軍今熙州秦州以其近邊逐之乃還河州此據本傳又汪藻青唐録云轄約格羅及僧羅尊共迎摩正徙帳居宕州欲立丈法服諸羌秦州遣人諭之㑹諸羌不從摩正逐轄約復還河州藻所云徙帳居宕州又云逐轄約與本傳不同當考妹又摩髙永年云轄戬舅李都克占與轄約爭班轄約以妻正摩正右轄約都克占怒曰爾以妻為親以父為疏耶遂占舉兵攻摩正摩正徙居安鄉城僞與都克占和遂殺都克永年所云徙安鄉城與本傳及青唐録不同兼下載還占和州事當考永年稱都克占即李遵子熙州蕃官李楞訥芝叔而汪藻乃以都克占為提克星子轄智母恰凌之弟不知孰是也癸卯詔客省引進四方館使自今遇有闕員須改官四年以上方聽除授之甲辰詔河北陜西河東路轉運使應有功使錢州軍並權停回易聽以官地所産及不係省房錢助其嵗用如尚不足即以户絶及間田差官檢定所出課利量多少給之從包拯議也乙巳出內藏庫紬絹十萬下河東轉運使助糴軍儲丙午賜天竺譯經三藏試光祿卿法護諡曰演法大師法護遺表請度十僧祕閣校理陳襄判祠部執奏不行襄已見蔡襄知福州時襄傳云趙槩奏列子廟三年度道士襄亦執奏不行當考年月巳未降內侍副都知昭宣使果州防禦使武繼隆為單州都監尋改海州都監坐故出內侍省吏䦨入御在所死罪及私役兵匠計庸至百二十二匹及受洪福寺僧餽遺事為諫官所奏此據英宗實録八年七月繼隆復嘉防日所書仁宗實録但云私役兵葺園亭耳然英録乃云責單州都監與仁録不同蓋先責單州尋改海州百官表并陳旭傳可考陳旭傳云繼隆擅役官兵匠治圃舍內侍省吏人闌入罪當死杖而縱之旭劾奏繼隆坐追官為單州都監當追一官勒停特免之翰林學士兼侍讀學士趙槩同繼隆提舉諸司庫務繼隆既被劾槩亦為御史所彈庚申槩罰銅三十斤時槩已罷翰林學士出知鄆州未行也癸亥詔河北諸州軍坊郭客户乾食鹽錢令坊正陪納者特除之甲子提㸃江南東路刑獄祠部員外郎王安石為度支判官安石獻書萬言極陳當世之務其略曰今天下之財力日以困窮而風俗日以衰壞患在不知法度故也又曰今之失患在不法先王之政法先王之政者當法其意而已法其意則吾所改易更革不至乎傾駭天下之耳目囂天下之口而固已合乎先王之政矣又曰方今天下之才不足豈非陶冶而成之者非其道而然乎又曰方今之急在于人才而已又曰人之才未嘗不自人主陶冶而成之所謂陶冶而成之者亦教之養之取之任之有其道而已又曰今之教者非特不能成人之才又從而困苦毁壞之使不能成才又曰因天下之力以生天下之財取天下之財以供天下之費自古治世未嘗以不足為天下之公患也患在治財無其道爾又曰在位之人才既不足矣而閭巷草野之間亦少可用之才則非特行先王之政而不得也社稷之託封疆之守陛下其能久以天幸為常而無一旦之憂乎臣願陛下鑒漢唐五代之所以亂亡懲晉武茍且因循之禍明詔大臣思所以陶成天下之才慮之以謀計之以數為之以漸期為合于當世之變而無負于先王之意則天下之人才不勝用矣又曰陛下誠有意成天下之才則臣願陛下勉之而已又願陛下斷之而已又曰臣之所稱流俗之所不講而今之議者以謂迂濶而熟爛者也惟陛下留神而察之詔淮南江浙荆湖制置發運使孫長卿理三司副使資序令久任長卿揚州人是月詔于景靈宫建郭皇后影殿翰林學士歐陽修言景靈宫自先朝以來崇奉聖祖陛下又建真宗皇帝章懿太后神御殿于其間天下之人皆知陛下奉先廣孝之意然則此宫乃陛下奉親之所今乃欲以後宫已廢追復之后建殿與先帝太后並列瀆神違禮莫此之甚伏乞特賜寢罷以全典禮詔送禮院詳定禮院言臣等看詳諸寺觀建立神御殿已非古禮先朝崇奉先帝太后示廣孝思猶依倣西漢原廟故事今議立郭皇后影殿于禮無據難以奉行其事遂寢案太常因革禮云嘉祐三年十月二十二日敕于景靈宫建郭皇后影殿歐陽修等言其不可而實録不書二年八月書詔修郭皇后影殿于洪福禪院其令太常禮院參定典禮以聞又于三年十二月壬辰書禮院言奉敕修郭皇后影殿于洪福院今詳景祐追册詔書已停諡册祔廟之禮其修影殿又于典禮無文伏請寢罷詔兩制同禮官檢詳祔廟典禮以聞據㑹要請建影殿于洪福院乃楊安國事在四年七月不知實録何故乃于二年八月及三年十二月書之今不取實録又于四年八月書知制誥劉敞言禮官倡議欲祔郭后于廟禮官倡議祔廟實録亦不載緣由按因革禮則事固有次第大抵實録書此事太踈略固當以因革禮為正㑹要但能記洪福影殿由楊安國建議若祔廟又且稱詔書亦未詳盡也員司馬光日記云先是詔為郭后于寺觀立影殿都官外郎權發遣修造案陳昭素以其勞費乃上言神御殿非古法按禮當祔于祖姑乞祔淑德皇后廟詔從之按因革禮則祔廟之議實出禮官不録昭素司馬記當時事不應誤然國史不載今亦止從因革禮孫抃行狀蘇頌傳當考已附四年八月十一月辛未太常博士祕閣校理知濵州王起著作佐郎簽書判官㕔事宋定國各追一官勒停初本州牙前劉玉經轉運使李參訟私船侵奪官渡課利而起等常以私船回易官鹽益公用故主私船户而不直玉及轉運司劾其事輒上奏論辨至是遣職方員外郎李真卿就州置獄皆以上書詐不實罪坐之壬申知諫院陳旭言有司斷獄而事連權幸者多緣中㫖得釋自今乞劾其干請之罪以違制論從之癸酉命翰林學士韓絳諫官陳旭御史吕景初同三司詳定省減冗費初樞密副使張忭請罷民間科率及營造不急之務其諸場庫務物之闕供者令所在以官錢收市之于是置省減司于三司自是多所裁損云多所裁損據本志甲戌詔諸路轉運及開封府界提㸃司體量牙前之役有重為民害者條奏之能件析便利大去勞敝者議賞此據本志議賞則㑹要無之乙亥命入內副都知鄧保吉提㸃修南郊太廟祭器己丑詔曰天下利害繫于水為深自禹制橫潰功施于三代而漢用平當領河堤劉向護都水皆當時名儒風迹可觀近世以來水官失職稽諸令甲品秩猶存今大河屢决遂失故常百川驚流或致衝冒害既交至而利多放遺此議者宜為朝廷講圖之也朕念夫設官之本因時有造救敝求當不常其制然非専置職守則無以責其任非遴擇才能則無以成其效宜修舊制庶以利民其置在京都水監凡內外河渠之事悉以委之應官屬及本司合行條制中書門下裁處以聞其罷三司河渠司以御史知雜吕景初判監鹽鐵判官領河渠司事楊佐同判河渠司勾當公事孫琳王叔夏知監丞事江湖上供米舊轉運使以本路綱輸真楚泗州轉般倉載鹽以歸舟還其郡卒還其家而汴舟詣轉般倉漕米輸京師嵗摺運者四河冬涸舟卒亦還營至春復集名曰放凍卒得畨休逃亡者少而汴船不涉江路無風波沉溺之患其後發運使權益重六路上供米團綱發船不復委本路獨發運使専其任文移坌併事目繁夥有不能檢察則吏胥可以用意于其間操舟者賕諸吏輒得詣富饒郡市賤貿貴以移京師自是江汴之舟合雜混轉而無辨矣挽舟卒有終身不還其家而老死河路者籍多空名漕事大敝皇祐中發運使許元奏近嵗諸路因循糧綱法壞遂令汴綱至冬出江為它路轉漕兵不得息宜敕諸路增船載米輸轉般倉充嵗計如故事于是言利者多以元說為然朝廷為下詔如元奏㑹元去不果行既而諸路綱不集庚寅復下詔切責有司以格詔不行及發運使不能總綱條轉運使不能幹嵗入預敕江湖兩浙轉運司以朞年功各造船補卒團本路綱期自嘉祐五年汴綱不得復出江十二月壬寅京東轉運使王舉元言登州沙門島每年約收罪人二三百人並無衣糧只在島户八十餘家傭作若不逐旋去除即島户難為贍養兼是諸州軍不體認條法將罪人一例刺面配海島內亦有情不深重者如計每年配到三百人十年約有三千人內除一分死亡合有二千人見管今只及一百八十人足見其弊蓋無衣糧須至逐旋去除有足傷憫望嚴戒諸路州軍除依編敕合配海島外餘罪不得配往登州年終具收配到沙門島罪人元犯因依開項申奏委刑部㸃檢如不係編敕合該敕配往彼者具事由以聞從之此據㑹要增入五年三月二十五日可考治平四年六月二十五日李慶奏可并考甲辰樞密院上端拱以來宣敕劄子六十卷以一本留中一本送龍圖閣初韓琦為樞密副使言嘗任河北見祖宗所下詔令皆契丹未講和以前經武禦戎之事請下本院編録而上之乙巳按乙巳宋史作己巳合前後干支考之當從乙巳詔三司每嵗上天下嵗賦之數自今三嵗一㑹其虧贏以聞又詔陜西轉運司本路諸軍衣裝紬絹綿皆出益梓利路今邊事久寧而戎兵不減宜寬三路之所輸若支軍衣而願回賣者官以中估收市之此據張方平之議也楊畋正傳云畋為户部副使河北舊以土絹給軍裝三司使張方平易以雜州絹畋既同書奏聞外議籍籍又密陳其不可此事當考兩川和買絹以給陜西戍兵而蜀人苦于重斂都轉運使曺頴叔為嵗出本路緡錢五十萬以易軍衣之餘遂紓兩川之擾自慶厯鑄大鐵錢行陜西而民間盜鑄不已三司請𣙜鐵頴叔謂鐵錢輕而貨重不可久行况官自𣙜鐵乎請罷諸州鑄鐡錢而以三當銅錢之一從之此據頴叔傳鐵錢三當銅錢之一當考明年二月癸卯所書巳酉詔吏部流內銓自今選人磨勘毋得叙勞績求先次截甲引見若勞績重于改京官朝廷自賞擢之時銓格繁密吏所以為姦其緒尤多案牘及書課歷疑誤僅若毛髮比輒行下推原數四猶不釋以邀賕請故磨勘者類皆待次外州或至吏部二三嵗乃得改官多因緣薄勞求截甲引見故降是詔辛亥光祿卿直祕閣張子憲為祕書監罷職翰林學士韓絳言中書門下宰相所職而以他官判省名不相稱請更定其制百司務多白二府請詳其輕重移付于下使大臣不為細故攖慮得以專講政事又章服所以别尊卑今走吏與公卿不殊請依唐制以品數為等其因年考及階品合服者須未嘗犯徒罪乃聽又臺閣省寺典章所由出也今獨存敕條文案而已本朝故事名臣遺範無所𫝊録請依周禮唐六典著為一書詔翰林學士胡宿知制誥劉敞詳定以聞王安石日録可考敞等條上改正裁損申明十事唐制雖以尚書門下中書三省長官為宰相然尚書中書之名本非宰相之實即欲改正官制仍須别立政事府如丞相之類唐制無樞密院自五代用兵始與中書對掌機務名體不正無甚于此即欲改正官制當廢院名以曺事還中書尚書二十四司既為虛名所以官冗員衆蠧財害政即欲改正官制當罷三司復二十四司及九卿官使有定員其郎官不在本省治職事者並以前資及散官處之文武散官及檢校兼官勳爵實封等在開元以前頗有實事於今唯散官猶叙服色粗繫輕重其餘悉皆虛名無益治體即欲改正官制當例行省罷此所謂改正者也大理寺决天下獄刑部覆之于事已足又加審刑院則為駢行即欲裁損官制當廢審刑院一吏部尚書侍郎郎中分領銓事則當差次輕重分别流品今審官院掌京朝官磨勘而尚書銓唯典州縣幕職官體制不倫即欲裁損官制當罷審官院以其職事歸尚書銓羣牧司提舉司糾察司之類皆古無此官即欲裁損官制悉當省罷還屬尚書九卿此所謂裁損者也諫官史官依唐制並當隨宰相入立仗下今欲申明復此制中書出制敕唐制並經門下審覆然後尚書出告身經歷三省比來唯于中書發敕虛置三省官名今欲申明復此制唐制學士不領外職所以重機密舍人分判六曺事所以謹政令今欲申明復此制所謂申明者也略舉一隅若于可行即推類具正之其後皆不果實録謂宿等以為不足行誤也宿等固嘗條列當是議不合遂罷更須考詳壬子御崇政殿召近臣觀河南府所進芝草上曰今日嘉雪大滋宿麥其瑞大勝芝草也即賜喜雪燕于中書癸丑以雪寒賜諸軍班薪炭甲寅詔大宗正司令睦親宅教授官具所教宗子功課以聞丁巳詔諸路每一州軍巡檢有至三五員者又兩三州至三五州至八九州有都監同巡檢或駐泊捉賊員數既多非惟軍馬勢分兼遇驚劫罕能獲賊惟逐縣弓手習知賊所藏匿而捕獲之其一州軍止留巡檢一人數州留都巡檢一人其沿江海汴河險僻之地舊有巡檢處其留之其增逐縣弓手減散從承符腳力代以剩員巳未御史中丞包拯言冬年寒食前後節假一日雖不御殿即令二府百司入視事如常若行幸或燕㑹次日歇泊不遇休務者更不别為假日或觀書閲禮物之類毋得早歸私第從之辛酉詔年七十而居官犯事或以不治為所屬體量若衝替而未致仕者更不推恩子孫癸亥賜知定州觀文殿大學士户部侍郎龎籍朝辭物如節度使例初命籍為尚書左丞籍固辭不拜閣門言近例上殿班除三司開封府臺諫官遇辰牌不隔外其餘並次日上殿或更有三司開封府并官髙者臣僚亦于辰牌隔下臣僚後引于理未便欲乞今後未進辰牌依舊例引外其辰牌隔下者如至三次得㫖許令特上者即于自來不隔之後引從之㑹要三年十二月十四日事今附月末閏十二月丁卯朔詔嘗為中書樞密院諸司吏人及伎術官出職者毋得任提㸃刑獄及知州軍自軍班出至正任者方得知邊要州軍辛未安化上中下三州及北遐鎮蠻人來貢方物丙子國子博士權鹽鐵判官雷簡夫為屯田員外郎簡夫磨勘當改虞部員外郎知審官院韓絳等言其嘗招降彭仕羲有勞故優遷之先是朝議以科舉既數則髙第之人倍衆其擢任恩典宜損于故詔中書門下裁之丁丑詔曰朕惟國之取士與士之待舉不可曠而冗也故立間嵗之期以勵其勤約貢舉之數以精其選著為定式申敕有司而髙第之人日嘗不次而用若循舊比終至濫官甚無謂也自今制科入第三等與進士第一除大理評事簽書兩使幕職官事代還升通判再任滿試館職制科入第四等與進士第二第三除兩使幕職官代還改次等京官制科入第四等次與進士第四第五除試銜知縣代還遷兩使職官鎖㕔人視此若夫髙材異行施于有政而功狀較然者當以茂恩擢焉自是驟顯者鮮而所得人才及其風迹比舊亦寖衰此據本志取王稱東都事略詔曰朕惟國之士士之待舉皆不可以曠久亦不可以泛冗冗則課校不審久則賢雋或滯用間嵗之期而約貢舉之數以精其選著為定法申敇有司而髙下之往嘗不次而用若猶例進終至濫員故增其任以舉其材緩其進以圖其效此天下之士所同欲而朕果于必行也若夫髙材異行施于有政忠謨嘉猷見諸行事已試之狀為衆所推必有非常之恩以示至公之道咨爾多士體朕意焉巳卯詔明年正旦日食按正旦日食詔宋史載庚辰日與此小異其自丁亥避正殿減常膳燕契丹使無作樂知制誥劉敞言天明雖有可畏之道然亦當稽古率禮然後為允按三代之典日食無預避之事左氏傳稱避移時曽子問諸侯入門不得行禮者日食居其一此覩有變而戒非蚤備也先王制禮過之者猶不及其制法先時者與不及時者均貴得中而已漢唐素服寢兵却朝㑹不視事及求直言大率皆在合朔之辰未見先時旬日者也兆憂太過春秋所譏今敵使入朝逺方觀禮舉措失中或輕為所覘伏乞詳求舊典折𠂻于禮命比部員外郎李言之提舉汴口至泗州堤岸入內供奉官楊昭錫同提舉其沿河使臣令佐有不職者許體量以聞言之迪從子也壬午御崇政殿録繫囚雜犯死已下遞降一等徒已下釋之仍遣使踈決三京甲申宗正寺言真宗廟室墻壞詔修玉牒官劉敞相視擇日修築之乙酉詔諸州毋得擅差本城都監監押同管駐泊軍馬右千牛衛將軍克顔上周禮圖降敕奬諭巳丑詔中書五房編總例從韓琦所請也行狀所叙或可别載不然待書成日附之辛卯契丹國母遣林牙天德節度使耶律通左諫議大夫史館修撰馬估契丹遣保靜節度使耶律惟新右諫議大夫史館修撰王實來賀正旦是嵗天下主户六百九十四萬八千四百七十口一千五百七十萬六千四百九十客户三百八十七萬七千一百一十口六百七十二萬六千三百三廢估馬司命羣牧司官兼領之應天府失入平民死罪未決通判孫世寧辨正之吏當坐法知府劉沆縱弗治提㸃刑獄韓宗彥往按舉沆復沮止之宗彥疏于朝卒抵吏罪宗彥綱子也上春秋髙未有繼嗣宗彥上書請修胎養令曰臣嘗讀漢章帝詔曰諸懷妊者賜胎養榖人三斛復其夫勿算一嵗著以為令史臣以謂深元元之愛著胎養之令者也臣考尋世次章帝八子長則和帝而質安已下諸帝皆其系胄故史臣又曰章帝長者事從敦厚故繼嗣漢室咸其苗裔夫以章帝仁心務在養民而福祚蕃衍及于後世則為國者所當取法焉前者詔書斥户絶田勿賣收其租置廣惠倉以廪食窮獨臣竊喜國家不以絶户之物為利而悉歸諸民近聞後宫就館者有二則嗣續之報將在兹日詎知非廣惠濟民之意有所感發哉然自詔下以後户絶田復賣如故臣竊懷不滿謂宜一以所售之直使益市粟穀兼修胎養之令若未能盡如東漢之制則少加裁損第賜户下懷妊不能自存者是陛下不傷帑藏之積而廣施于海內人心悅則天意感天意感則福祥之報宜以類至蓋人君務蕃育其民則天亦昌衍其子孫理固然也胎養疏不得其時後宫有就館者二即四年董周各生皇女也今附三年末
