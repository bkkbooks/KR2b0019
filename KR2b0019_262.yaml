body:
  text: 續資治通鑑長編卷二百五十八宋李燾撰神宗熙寧七年十一月乙未朔上批劉定昨馳往涇州體量弓箭手蕃部當賑濟否至今多日深慮過時或致逃徙餓殍冝速具以聞九月九日遣定上批纍降指揮令軍器監具可用戰車制度聞奏至今未見將上冝令疾速詳定進呈八月二十日載沈括所論乃民車也可參考丙申入內供奉官李舜舉言劉忱等與蕭素梁頴商量地界語不條暢縱有開發多失機㑹已具奏乞移文理辨望早裁處詔改差吕大忠替蕭士元初大忠既受命以父憂去是嵗九月詔奪喪權衣墨服與劉忱密議不與北人相見至是以舜舉奏罷士元還欣州起復大忠為西上閣門副使知石州與北人相見如大忠請許不聽樂候食畢㑹議大忠丁父憂當在六月間葬畢乃起復蓋九月間也然九月十三日詔劉忱蕭士元㑹蕭素梁頴於大黃平猶云大忠以憂不至據大忠集十月二十日大忠至代州其至大黃平與忱等密議蓋十月二十二日及是月二日乃出見頴素不知李舜舉所稱語不條暢但指士元或并指忱若大忠既與忱等密議則語不條暢忱亦必在其間今獨罷士元似語不條暢專指士元也先是素頴頗倔強未肯見忱及士元一日蕃酋忽引兵萬衆入代州界焚鋪屋與官軍相射既而素頴徑入橫都谷施帳幕邀忱等相見忱等不往又欲設次於西徑東谷忱等以侵地愈深不許竟㑹於大黃平不知竟㑹於大黃平是何月日據吕大忠集乃十月二十二日但恐非初㑹西徑東谷即車場溝凡四三見初議指蔚應朔三州分水嶺土壠為界忱等偕素頴行視無土壠素頴但云以分水嶺為界蓋山皆有分水嶺槩言分水嶺為界則至時可以罔取此其微意也與忱等相持久之議不能决及大忠至屢以理折素頴素頴稍屈然訖不肯從大忠等議也自素頴頗倔強至劉忱等相持久之此據實録八年四月五日所書今移入此實録又云忱初以疾不即至按忱卒與素頴㑹議不見忱屬疾事今削此不載大忠以理折素頴素頴稍屈此據大忠行狀及徽宗實録大忠附傳此月二十八日劉忱等乞差郭逵巡邊據忱所言則素頴終不肯服大忠傳云稍屈或緣飾之辭也八年三月十七日大忠乃罷岢嵐軍使西京左藏庫副使劉琯降一官通判大理寺丞蔣承之展二年磨勘坐根括曠土有訟女户冒佃户絶地千餘頃推劾不實并不察吏受賕故也給度僧牒五百付河東路轉運司修城丁酉河北東路轉運提舉司言夏秋災傷放稅八九分以上乞倚閣第四等以下秋料役錢及當納去年倚閣青苖錢從之墨本於丁酉載上批問河東北流移入朱本削去今移入八年四月末詔房州房陵縣令張存中放歸田里以京西南路轉運司言存中寄私書謝前任押司録事及言知州綦願託買田事既絀存中願劾罪以聞定州路副都總管步軍都虞候楊文廣卒贈同州觀察使文廣時獻陳圗及取幽燕狀未報也戊戌賜權發遣江淮等路發運副使張頡奬諭敕書并銀絹二百先是章惇言措置梅山實自頡發之詔頡具元奏事節以聞故有是賜六年三月二十七日除發副賜絹三百當考檢正中書五房公事李承之言檢㑹刑部大理寺斷覆官元額十二員熙寧五年增置二員今又置習學公事九員三二年間皆改京官乞裁定諸司合置員數詔大理寺詳斷及習學官自今毋過十四員刑部詳覆及習學官毋過六員額外人嵗滿不補知耀州閻充國乞募流民修添水堤詔省倉給豆粟各萬石已亥三司使章惇乞減罷都孔目官勾覆官各一人辟官三員充三部主簿詔許舉京官選人明年十月惇罷三司鄧綰章可考職官志云章惇以既置主簿則承受催驅及勾銷簿歷皆可辦由是奏廢聞拆司及再置開拆司復置主簿上批汴水依前阻塞可差程昉火急前去相度開撥早令通快御集庚子河東察訪使工部員外郎集賢殿修撰檢正中書五房公事李承之為寶文閣待制河北西路察訪使代沈括也將遣括使遼故先有是命端明殿學士兼翰林侍讀學士龍圖閣學士知河陽韓維落端明殿學士以侍御史知雜事張琥言維與孫永同定奪免行錢不當故責及之提舉河北西路常平等事劉定乞逐年引試保甲詔司農寺同兵部定每年開封府界諸路當解發引見人數以聞詔御史臺閣門整肅禁衛所大禮文武班列執事之人出入禁衛者務在嚴整無俾混雜如有關防未盡未備詳具條例以聞辛丑以開州團練使仲淹為文州防禦使池州團練使世本為秀州防禦使右千牛衛將軍仲緘仲戡並為右監門衛大將軍以學士院試中格也權提㸃秦鳯路刑獄鄭民憲以熙河營田圗籍來上即詔民憲兼都大提舉熙河路營田弓箭手㑹要注云熙河地多美朝廷委興營田奏辟官屬以集其事至是始以其圗籍入對本志云民憲以圖籍來對乃以民憲為兼都大提舉熙河路營田弓箭手九年三月十三日民憲云云又十九日又六月十九日要見初興營田年月又此月十二日民憲遷官又十二月九日舒亶改官初遣民憲在三月八日壬寅詔自今京官為檢正檢詳官一年取㫖知諫院鄧潤甫言淤田司引河水淤酸棗陽武縣田已役兵四五十萬後以地下難淤而止相度官吏初不審議而妄興夫役乞加絀罰詔差府界提㸃蔡確究實以聞其後確言元檢計按覆官有不實命開封府悉劾之詔馬軍副都指揮使賈逵舊城裏左廂巡檢孫吉右廂巡檢張忠各降一官步軍副都指揮使宋守約新城裏左廂巡檢顧興右廂巡檢石嵒開封府判官吳幾復勾當舊城裏左廂公事魏中孚各罰銅四十斤坐不能救三司火也癸卯詔同管勾外都水監丞程昉罰銅三十斤昉被㫖相度河事而不躬往及劾罪稱誤㑹朝㫖該德音特罰之乙已詔內藏庫借錢三百萬緡付三司買陜西鹽鈔丙午詔庫部員外郎權提㸃秦鳯路獄鄭民憲遷一官內殿丞制陳玉江惟正各減磨勘三年陳留縣主簿周彥崇臨海縣尉舒亶各循兩資以民憲根括熙河岷州地萬二百六頃招弓箭手五千餘人團成三十六指揮借貸糧築堡修屋玉等皆有勞也初十日民憲入對三司言相度秦鳯永興兩路鹽鈔嵗以百八十萬緡為額從之詔差大名府德博州春夫總三萬人修大名府城仍約逐縣去大名府三百里內差不足聽㫖委文彥博提舉取二年畢丁未同知諫院范百祿言向者都水監丞王孝先獻議於同州朝邑縣界畎黃河淤安昌等處鹻地及放河水而鹻地皆髙原不能及乃灌注朝邑縣長豐鄉永豐等十社千九百户秋苖田三百六十餘頃詔劉定周直孺體量以聞其後直孺等言孝先因淤田約水不住壞民田苖乞候捋來酬奬日取㫖仍乞蠲被水户夏稅從之上批聞熙河路募禁軍築城頗妨教閲近已降指揮罷之冝令總管司約束兵官教閲戊申提舉成都府利州路買茶李杞等言乞舉京朝官或班行選人五員勾當公事從之詔權知楚州駕部員外郎龎元禮通判州事屯田員外郎魏應臣録事參軍盧良臣各追一官勒停司法參軍張裕衝替坐失入徒配賣私鹽凡五十六人該德音特責之吕大忠言河外有土豪三兩人自來皆交結北界權貴欲自備錢物探事候有驗乞朝廷推恩從之詔權發遣京西北路轉運副使李南公計置小麥二三萬石應副河北西路民麥種已酉詔判太常寺官自今可不赴禮院如有議論禮院官赴寺商量從同判寺常秩請也丁已薦饗景靈宫戊午朝饗八室已未冬至合祭天地于圜丘以太祖配赦天下河北西路察訪使沈括言修城之役乞自次邊緊急處興工又乞權罷深州修城卒兼募闕食户併功修展趙州城從之庚申樞密院言武臣犯罪不至追官而特㫖追降官不勒停者其叙限比追官勒停人各聽減一朞即追降三任以上者仍以三朞叙從之壬戌河東路商量地界劉忱等言北人盜侵橫都谷邊臣觀望不即驅逐七月中又侵據大黃平雖移書詰問偃蹇自如又欲僣禮正坐不以賔主賴朝廷不從稍沮姦慝今已設次於車場溝頗有順從之意似當稍以聲勢乘之北人常以姑息期我一旦見形如此彼必動心與之㑹議庶有可合欲乞朝廷暫令郭逵以巡邊為名權駐代州協力應副疆事不報明年二月二十二日西徑寨主秦懷信乃移差遣此年九月十三日始詔忱等㑹大黃平十一月二日李舜舉奏當考十二月丙寅詔省熙河岷三州官百四十一員留五十七員從經略使王韶都轉運使熊本請也詔后廟牆增築五尺勿毁附近民居初內侍楊惟賢乞增廟牆及留巡道一丈而侍禁張從逹自言慶厯中嘗凖朝㫖以私居簷接近廟垣雖令拆修許離磚牆三尺五寸蓋屋留巡道今乞免拆故有是詔後將作監言因舊增髙恐不堅實須毁舊牆增廣墻基恐侵民居并前詔罷之右武衛大將軍道州刺史仲旻父宗說坐內亂幽别所仲旻屢疏乞恩至是因朝叩頭殿下泣訴父老且病願納平生官以還父上亦閔之釋唐突罪未得報退就馬氣塞不能言及家而卒贈同州觀察使馮翊侯丁卯文武百官並以南郊赦書加恩觀文殿學士兼端明殿學士龍圗閣學士禮部侍郎知熙州王韶為樞密副使初韶建議城贊納克詔罷之第令修完熙河二城減戍省糧為久安計且曰冀卿早還朝宣力也於是召赴闕未至遂有此命罷城贊納克據吕惠卿志韶墓未至京師除樞密副使據御集十一月晦日方遣人緣路賜韶茶藥也觀文殿學士户部尚書知應天府張方平為宣徽北院使判應天府方平辭曰宣徽使非寄任不除臣求鄉郡自便而得之恐開僥幸路上曰朕未之思也乃命與翰林侍讀學士知青州滕甫易任既而方平卒不行歸宣徽院供職方平與甫兩易事在十一日甲戌今并書歸宣徽院供職在八年正月二十三日同判司農寺張諤言河東路監司上省事文字寺有相關者並不同繫書聞轉運使趙子幾與提㸃刑獄楊詡交相詆毁論議不一州縣患之望移一員與别差遣御史知雜事張琥亦言子幾狠愎楊詡輕剽皆不可委任乞各與換别路差遣仍委官體量降絀詔河東路察訪司案實以聞三司乞以京東路上供糧自明年後不折變錢依舊計置折變米並於河北近水路州軍封樁以備邊用從之梓州路轉運司言招諭淯井監山前後長寧等十郡八姓及都武等夷衆內附八年年末實録又書夷人獻長寧等十州地𨽻瀘州淯井監蓋重出也岷州團練使知岷州髙遵裕為龍神衛四廂都指揮使知熙州客省使知通逺軍張守約知岷州左藏庫副使河北第十八將楊復兼閣門通事舍人權知通逺軍榮州團練使趙思忠等入辭詔以思忠為秦州鈐轄不釐事思忠乞廨舍上曰為爾創所居比到完矣乞築堡三兩所上曰朝廷未知修築處徐有指揮又乞管勾熙河路蕃部及置酒場賜田詔經略司勘㑹聞奏八年六月十七日不許又乞鄂特凌古與近上名目詔以是趙家族蕃部候立功與之又乞團牌并旗詔賜旗團牌各十又乞蕃僧金字牌許之思忠母乞男繼忠河州修廨舍詔候下本路勘㑹妻結日卜聚乞增所受封邑詔遷郡君妻裕囉勒齊乞巴鄂多爾濟巴鄂索諾木與董古一例官職詔各遷一資又乞各賜以名乃賜巴鄂多爾濟名忠巴鄂索諾木名毅又乞銀槍旗亦許之六月二十一日初賜名十二月二十七日斬鄂特凌古舊史趙思忠𫝊及附傳並云八年為秦州鈐轄不蒞事思忠乃因經略司自言乞管勾熙河蕃十部不許詔於熙河二州給地五十頃包氏裕囉勒齊各頃與本傳不同又遷合州防禦使卒思忠卒在十年按實録七年十二月四日已除趙思忠為秦州鈐轄與本傳不同又實録八年閏四月四日復以思忠為秦州鈐轄不釐職依熙州例供給存恤教諸子以中國文字或七年秦州事當作熙州更詳之權提㸃秦鳯等路刑獄鄭民憲言熙河路招弓箭手雖已給借牛具糧種農器之類蓋今嵗夏秋之交方占佃田其闕農器糧種者乞許貸省倉及支熙州修城銀萬兩經略轉運司封樁見錢紬絹總三萬緡以備接借候熟日聽以糧草償從之知齊州李肅之言提舉常平等事吳璟體量臣前任青州違法不公今璟收鄆州官妓魏在家及負鄆州官私債數千緡詔轉運司案實以聞後轉運司言有實詔璟衝替仍劾之竟坐貸所部錢及盜官錢㑹恩特勒停仍每叙理止與散官勒停在八年八月十四日今并書璟圭子也已見詔涇原路所招舊弓箭手徙熙河路委帶御器械王中正具元差募弓箭手官及所招數以聞己巳知徐州兵部員外郎直昭文館傅堯俞管勾崇福宫堯俞再閲嵗凡六徙困於道途知不為執政所容遂丐閒局而有是命此據吕大防墓志當考同判司農寺張諤言本寺總領民政推行委曲始自畿甸其常平官尤在得人今府界提舉官二人乃以都水監丞主簿兼領職守不專乞許於本寺丞內選舉兩員兼府界提舉罷都水監官從之差知司農寺丞程之才莊公嶽兼管仍令都水監丞司勾當公事三員內選留一員熙河路經略司言自置熙河路以來惟舉人未推恩今兩州學職掌十一人該免解者乞推恩如禮部試下乞許就殿試餘並免解從之追封皇太后祖繼勳為康王父遵甫為武功郡王初皇太后以南郊進封三代上褒寵外家故特詔贈繼勳國王遵甫郡王餘依例上批李憲見寄昭宣使所有南郊支賜緣憲勾當御藥院三書夜執事最為勤勞難依散官例樞密院言南郊式昭宣使以上當支賜銀絹各四十匹兩上曰此係散官無職事人例仍賜銀絹各七十五匹兩御集十六日事今附此上封者言河北西路災傷乞逐州委官禱名山大川靈祠中書言春秋祭祀雖法從官給而近年諸縣往往借貸豬羊或量買市肉以祭乞條約之詔河北西路轉運司令州縣自今禱祠祭祀並依祀儀以省錢買禮料庚午太子中允集賢校理俞充權同判軍器監充本傳云為淮南轉運副使還判軍器監誤也七月除淮南十月判監蓋未赴非還也辛未陳州司法參軍律學正中書吏房習學公事王白為奉禮郎權吏房檢正五房習學及一年者與合入官權檢正自此始詔翰林學士知制誥至中書樞密院議事許繫鞋遇朔望及不因公事依例穿執魏泰云翰林故事學士每白事於中書皆繫鞋坐正堂使院吏入白學士至丞相出迎然此禮不行久矣章惇為知制誥直學士院力欲行之㑹一日兩制俱白事於中書其他學士皆靴足秉笏而惇獨散手繫鞋翰林故事十廢七八忽行此禮大喧物議而中丞鄧綰尤肆詆毁既而罷惇直院而繫鞋之禮後亦無肯行之者泰所言與此詔不同當考淮南東路轉運司乞增賜上供糧十萬石募饑人修水利詔司農寺與上供糧五萬石鄜延路經略司言延州永寧關新作浮梁成賜名寧和壬申知熙州髙遵裕提舉熙河路買馬詔大宗正司具赦前貶官宗室及有罪婦女或削封邑冠帔停俸者元犯以聞內藏庫乞令三司分二年償借過買鈔錢帛三百萬從之樞密院言修內馬步軍教閲所損弓弩若箭極費物材匠手亦不給詔自今諸軍射逺本等武藝及比拍排連用良弓弩餘並用木弓弩令軍器監計置數以聞詔權審官西院主簿熙河路相度營田所勾當公事舒亶特改奉禮郎以權提㸃秦鳯等路刑獄鄭民憲言昨相度熙州營田亶為勾當公事宣力最多雖䝉恩循兩資緣亶嘗犯公罪於銓格才得初等職官臣近䝉遷官及減三年磨勘乞以減年回授亶改一京官故特有是命十一月七日甲戌崇儀使嘉州團練使帶御器械王中正為西作坊使賜銀絹二百録秦鳯等路招弓箭手之勞也中書檢㑹降官降職降差遣人取裁詔司封郎中元積中復直昭文館與舊資序差遣工部郎中李大臨蘇頌各降集賢院學士度支員外郎吕大防候服闋復知制誥雄武軍留後知太原府郭逵復宣徽使和州團練使本州安置李師中移京東路州軍安置太子中允監衡州在城鹽倉劉摯復館閣校勘簽書判官大理評事監廣州軍資庫唐坰移江西監當金部員外郎監秀州稅錢顗屯田員外郎新知通州孫昌齡太常博士監鳯翔府司竹監張戩太常丞知常熟縣王子韶太子中允新監西京洛河抽稅竹木務程皓祕書丞通判蘇州胡宗愈大理寺丞薛昌朝著作佐郎林旦著作佐郎前知韓城縣范育降授光祿寺丞監荆南鹽麴商稅張商英職方員外郎通判解州李周比部員外郎通判頴州周約庫部員外郎通判大名府賈青右贊善大夫權知祥符縣李孝純太常少卿同判西京國子監張端太子中舍通判深州王子淵復合入差遣時責降應復者四十餘人吕惠卿意所惡者輒廢格不行胡宗愈劉摯皆坐言事落職外補宗愈又先責至是惟摯復舊職宗愈通判蘇州如故十年再赦乃復舊職摯嘗言曽布而布尤為惠卿所惡故也此據司馬光記聞當考恐此時未復舊職不但宗愈一人蔡承禧論吕大防云云附九年十月六日又八年十一月二十三日宰臣韓絳言華州别駕种諤昨取婁城堡後雖棄之因此尚開邊二十里考其忠力實亦可嘉乞牽復舊官將領任使詔諤復禮賔副使永興等路州都監後為河北第二十八將詔到闕臣僚依例許上殿者如遇非次赴闕無許上殿指揮者令閣門申中書取㫖秦鳯等路都轉運使熊本言奉詔體量吳中復皮公弼張穆之章楶蔡朦等奏議改私錢法先後異同及不係朝㫖買人間私錢事訪問民間全用省樣錢私錢已不售如中復等議實可行兼王廣淵章惇亦乞通永興軍一路禁私錢復華亭監并鑄紅崖青鐵錢若依逐官所奏即須預措置納換私錢及增鑄錢監利害乃可推行欲令三司下永興秦鳯等路制置交子所同相度利害畫一以聞詔中復等奏議異同及不俟朝㫖買私錢並放罪令趙瞻計㑹逐司速相度以聞中復知永興公弼轉運穆之刑獄楶常平朦運判此事與八年二月八日甲子相關十年九月二十七日壬戌詔逐司相度食貨志第六卷熊本又言今民間專行省橅錢私錢已息中復等議可用今涇原安撫使王廣淵請如永興路法禁私錢復華亭監三司使章惇請禁私錢復置紅崖青鐡錢用廣淵惇議則尚當措置易私錢及增鑄錢監利害請詔永興秦鳯等路監司及制置交子所同度利害本自具改鑄事數修上之大抵略佐中復所論而頗詰難朝廷如本請為再下諸路度利害焉明年二月二日甲子可考本前合在九月二十七日壬戌鄜延路經略司言延州保安軍諸縣民闕食流移入州未止雖依乞丐例給口食米數不多乞出省倉米萬石賑濟從之文思使知府州折克柔言今嵗河外饑饉䝉賑貸尚未周給人欲流散恐北敵因而招誘遂虛並邊民户臣乞保借米三萬石粟二萬石賑貸候豐熟償詔賜省倉粟二萬石賑濟米三萬石借貸詔虞部員外郎權同管勾外都水監丞范子淵殿中丞權知都水監丞劉璯文思副使朱仲立並遷一官子淵落權字司勳郎中知都水監丞王令圗等四人減三等磨勘餘減年支賜有差賞開清水鎮直河及用濬川杷導河之勞也子淵等初受命在六年冬事具七年六月末樞密副使蔡挺方奏事上前風眩仆地內侍掖就西廂上親臨賜藥自殿中肩輿歸府因屢求罷免詔給優假將治挺子朦時為永興軍路轉運判官詔令朦乘驛詣闕已而挺言有子煜任太常丞直集賢院權發遣荆湖南路轉運副使出繼兄抗今抗有子潜欽臣近被病乞令煜復歸本宗即罷任詔煜聽歸宗所奏官不追煜挺第四子也尋以朦權發遣户部判官煜歸宗乃十六日事朦除省判乃二十一日事今并書前月十一日先令朦乘遞赴闕見御集蓋此時挺已病也更詳之或削去乙亥詣太平興國寺啓聖院萬壽觀神御殿恭謝翌日又詣慈孝寺神御殿遂幸集禧醴泉觀大相國寺駕部郎中提舉河北東西路糴便糧草李直躬為淮南東路轉運使明年三月二十七日王安石有言故載直躬差遣虞部員外郎新知常州吕嘉問提舉河北糴便糧草復理提㸃刑獄資序以檢正中書户房公事張諤訟嘉問不應黜陟故也初王安石既有江寧之命諤與嘉問持安石而泣安石勞之曰已薦吕惠卿矣兩人收淚謝安石收淚謝安石此據魏泰東軒録庚辰遣三司勾當公事黃堯允減價糶淮南路官米甲申上批馬步軍五十人為隊十人為火隊當用什物令軍器監度用若干錢以聞翌日又批隨軍什物內驢騾數多難辦又平日耗蠧芻粟冝立法於逐將所領兵住營州據用數預令民結保承認遇兵行日量支雇錢令隨軍仍專差官管勾河北東路吕溫卿西路李稷京東路李察京西路李南公開封府界蔡確吕溫卿六年十月六日河北倉十一月二十二日河北西倉其後王安石議廢牧監吳充欲存之凖備軍行負䭾以為若邊人旅拒馬不可買中國何由得馬上曰雖如此牧馬亦不濟事祖宗時牧監但養犬馬後來孳生是非明白無可疑充曰向令詔定驢牛中書便云騷擾今中書却要臨時買驢以供負䭾豈不騷擾安石曰無事時不問有無驢牛冝令五户或十戶共認驢牛一頭不知此牛驢令誰作主且無驢牛之人須被配率出錢此所以為騷擾今中書計算若遇要驢時用見今第一等價上增一倍買驢事定後更不收一錢即每三年一次用兵比養馬以待用可省七十萬貫用第一等價上增一倍買驢假令括買亦不為虛損百姓此所以異於預認上曰此利害分明兼馬皆生梗豈可負䭾也王安石與吳充爭論據日録八年四月十七日今附見恐預認牛驢指揮尋已不行仍見本年月日詔河南府河北監牧司見在錢帛糧等並𨽻都提舉市易司充買茶本錢詔入內祇候髙班內品黎慶之除名勒停梁恭禮入內髙班吳立張德恭各勒停免除名入內副都知左騏驥使王昭明追兩官特免除名勒停慶之坐誤發內降文字恭禮報昭明令立德恭入求於內夫人龎氏重封印從盜御寶法應除名以嘗㑹赦故也乙酉詔河東路轉運司相度災傷户與免支移知沅州謝麟言本州屯田務無軍士應募乞依配罪人河州法配本州牢城從之樞密直學士兵部侍郎李參為尚書右丞致任丙戌命翰林學士元絳權御史中丞鄧綰同三司理缺司詳定故缺負官物右諫議大夫集賢院學士史館修撰宋敏求提舉萬壽觀敏求請避父嫌名改醴泉觀改醴泉明年正月十七日事今并書詔應上殿臣僚並入臘假日引對先是召對者二十四人以大禮假留積頗久及恭謝畢上顧閣門奏目雖日增引一二班未能即盡至是臘假百司俱休沐特御延和殿比日旰見十五班而罷新舊紀云引進對官二十有四人丁亥詔比部員外郎同提㸃在京倉草場沈希顔減二年磨勘先是在京剩員多冗占及差使輕重不均詔希顔裁定以聞至是裁冗占者三千六百餘人故賞之詔工部郎中直龍圗閣新權發遣慶州范純仁太常丞集賢校理檢詳樞密院兵房文字權同判武學劉奉世看詳鄜延路分將文字當何如措置以聞其後純仁等言相度將本路第一將駐慶州第二將環州第三將大順城第四將淮安鎮第五將業樂鎮第六將默伯鎮第七將永和寨第八將邠州各統領就糧屯駐泊并下番正軍強人漢蕃弓箭手兵馬從之又詔淮南發運司以來年上供米三十萬石與淮南東路轉運司二十萬石與西路並充軍糧及減價糶候豐熟逐路撥還隨運上供如償價即斗錢八十戊子亳州言資政殿學士吏部侍郎知州邵亢卒上遣使致祭手詔曰亢藩邸之舊可優贈以官賜諡乃贈吏部尚書官其親屬五人所推恩各升二等即其鄉造宅五十間賜之太常諡曰安簡已丑遼主遣益州觀察使耶律寧太常少卿史館修撰李貽訓其母遣安逺軍節度使耶律用政衛尉少卿乾文閣待制李之才來賀正旦庚寅上批聞河北西路轉運司近差官批記黃河棄隄林木修城深州武彊遼使往還甬道兩旁公然書記及聞諜者已傳蕭禧兼恐理㑹展拓城池事未知今此張皇是何監司指揮可速以聞究竟何如判國子監常秩等乞立孟軻揚雄像於孔子廟庭仍加爵號又乞追尊孔子以帝號詔兩制與國子監禮院官同詳定後不果行翰林學士楊繪以為加帝號非是當求繪議附見於此范祖禹志繪墓云繪言不必追尊龍圗閣直學士孫永提舉中太一宫尋出知潁州知潁州乃明年三月十七日今并書之入內供奉官李翊言護趙思忠一行至新安驛鄂特凌古毆傷麻宗道詔鄂特凌古追所授官仍令熙河路經略司相度决罰拘質鄂特凌古至熙州髙遵裕斬之以徇十二月四日思忠入辭辛卯詔諸將官及使臣等所受朝廷約束及兵數文字凡干機密不得傳播如違並科違制不以赦降去官原减事理重者取裁以上批近差定河北諸將命下之後將佐兵馬之數人人悉知至於檢中上書草澤亦能道三十七將二十萬兵聞多因將副中有軍班出身者與舊同輩談說致此張皇可立法誡約故也詔辰沅二州並依威茂聽罷免役出錢之法從察訪蒲宗孟請也壬辰河東路察訪使李承之言潞州威勝平定軍等處災傷難人人周給欲取其老疾羸弱及遺棄小兒給粥存養中春稍暖可以興工即募壯者充役乞許臣不拘常法隨冝措置回日具所支錢糧及所濟人數以聞從之六宅使知冀州邢佐臣言比有詔應倚閣青苗户更不支借緣夏秋不稔多以闕食指苗錢買春種非獨民失望亦恐地曠不耕遺棄厚利乞應種春麥户皆貸以種錢詔五路提舉司第四等以下户雖經倚閣實有合種麥地並依青苗法户貸錢千與免息上批東西作坊祖宗以來置之皇城之側昨軍器監官求為廨舍已遷西作坊於雕敝故營安置近司農寺復起遷東作坊以其地又創修廨舍軍器監同心養私曽不占吝未知今來兩作坊却當於何處安置可速具析聞奏又批訪聞見修趙州城所用夜義散子木植轉運司於定州城壕四面採斫不惟枉費腳乘船運重成勞擾兼恐將來本州修城自要使用及深州武強道旁係北使過往路其林木並仰存留是日戊辰辛未劉忱吕大忠與蕭素梁頴再㑹於大黃平大忠屢折頴頴不能堪遂獨以語觸大忠謂大忠不當取棹子閲文字且截斷其語仍對之搖膝因道相鼠及鸚鵡猩猩等章句大忠忍弗與校但具奏乞歸奉几筵素頴既再㑹議再屈乃言待親去帳前取禀别遣使來由是惟以公牒往還不復㑹議尋詔忱大忠赴闕是嵗宗室子賜名授官者五十二人斷大辟三千五百九人詔給青苗錢陸田以二月水田以三月此據本志附年末祕書丞提舉成都府利州路買茶公事蒲宗閔奏伏見成都府轉運司每年應副熙河路交子拾萬貫客人於熙河入納錢肆伯伍拾或伍伯支得交子一紙却將回川中交子務請鐵錢一貫文足見錢今來川中創置茶場乞回本錢買銀及交子鹽鈔等却充茶本臣欲乞候茶場將來般運茶到熙河永寧寨等處日將合買回貨本錢便於成都府交子務兊支上件交子十萬貫却勘㑹本處合買交子時價留充熙河路支用關報川中茶場其茶場只理㑹鐵錢為課利數目所貴兩路更不差人往來管押般運交子等兼熙河交子遲緩無人收買間不積壓在彼虛占錢數從之此據茶馬司編録冊七年十二月一日中書劄子云云崇寧元年九月二十三日蔡京云云可考
