body:
  text: 續資治通鑑長編卷七十九宋李燾撰真宗大中祥符五年冬十月乙未朔詔樞密使帶檢校官平章事不告引止於本㕔贊喝時王欽若陳堯叟上言請定常制先是魏仁浦以宰相兼樞密使告引曹彬以樞密使兼相不告引故止用彬例陜西轉運使薛顔言諸州司理參軍朝廷謂其刑獄重難與免選限或任非其人多致枉濫請自今誤入徒以上罪令書厯守選冀有所懲沮自求平允詔三次誤失者如所請戊戌詔奬知渭州曹瑋以修東關城壕畢也宜州言南丹州莫淮辿聚集諸蠻阻富仁監道路詔轉運使樂黃目乘𫝊往視以理和斷黃目言知宜州信遂不諳溪峒事即命供奉官閣門祗候曹永吉馳驛代之既而黃目又言宜州駐泊監押侍禁侯哲擅領兵入南丹州界白抗卓寨取淮辿伏罪狀以還進退容易恐生邊隙哲亦訴轉運司隱其績狀不盡條奏上廉知南丹州本非侵擾第因接境逃民剽掠客旅遂亡命山谷蠻夷自相冦盜即詔內殿崇班閣門祗候郭盛內供奉官江德明馳往犒設溪洞首領與黃目同撫勞之且戒哲自今戎事皆禀所部庚子遣使馳驛分詣廣南荆湖福建江南京西諸路與轉運提㸃刑獄司知州通判鈐轄都監簡選雜犯配軍人徙𨽻近地本城老病不堪醫治者放從便少壯者部送赴闕當置上軍如不願量移赴闕亦聼鄜延部署曹利用等言保安軍蕃部請築子城望諭首領俾俟農隙從之同修玊清昭應宫使李宗諤以丁謂參知政事請差降等威辛丑改命宗諤為修宫副使甲辰詔如聞建安軍等處自秋霖雨頗妨農事宜委轉運發運使體量賑恤乙巳䕫州路轉運使言溪峒蠻人結集為亂俟發兵討捕則歸先所掠漢口及五千人者承例特署職名許令入貢上曰聞此亦非便或因是輒掠邊民充數邀利所在宜辨察之轉運使又言蠻願入貢者千五百人上以道途往來公私勞費不許詔轉運使定其當赴闕者具名奏裁餘止就本路量行支賜遣還丁未上以宗室所進和幸諸王宫賜宴詩示輔臣因曰宗親好學大是美事茍述作不已自得㫖趣得㫖趣即忘倦矣然當戒於好竒而尚浮靡好竒則失實尚浮靡則少理也淮南比嵗薄稔上憂之賑恤無所不至而言事者以為流亡無算及丁謂使建安軍因令校其實數戊申謂言轉運司具析大中祥符三年四月十五州軍逃民數多者及百戶餘止三十戶繼有復業者時起居舍人王隨為轉運使戒所部出庫錢貸民市糧種嵗終約輸絹以償故流亡者多復業云并代州承受公事李宗政言火山軍南五七里或掊地尺餘則火出蓋火德之應請建祠廟上曰此山有火因山名軍其所由來舊矣宗政妄言不可從也己酉以主客郎中知制誥王曽為契丹國主生辰使宫苑使榮州刺史髙繼勳副之屯田郎中兼侍御史知雜事李士龍為正旦使內殿崇班閣門祗候李餘懿副之舊制出使必假官繼勳本秩既崇不復假官自是為例契丹使邢祥接伴祥詫其國中親賢賜鐡劵曽折之曰鐡劵者衰世以寵權臣用安反側豈所以待親賢耶祥愧不復語曽使還言是嵗契丹改統和三十一年為開泰元年以幽州為析津府國主弟隆裕卒隆裕初封吳王後封楚國王初奉使者止達幽州後至中京又至上京或西凉淀北安州炭山長泊自雄州白溝驛渡河四十里至新城縣古督亢亭之地又十里至涿州北度涿水范水劉李河六十里至良鄉縣度盧溝河六十里至幽州號稱燕京子城就羅郭西南為之正南曰啓夏門內有元和殿洪政殿東門曰宣和城中坊門皆有樓有憫忠寺本唐太宗為征遼陳亡將士所造又有開泰寺魏王耶律漢寧造皆邀朝使遊觀城南門內有裕恱王廨為宴集之所門外永平館舊名碣石館請和後易之南即桑乾河出北門過古長城延芳淀四十里孫侯館後改為望京館稍移故處望楮谷山五龍池過溫餘河大夏坡坡西北即凉淀避暑之地五十里至順州東北過白嶼河北望銀冶山又有黃羅螺盤牛闌山七十里至檀州自北漸入山五十里至金溝館將至館川原平廣謂之金溝淀國主嘗於此過冬自此入山詰曲登陟無復里堠但以馬行記日景而約其里數過朝鯉河亦名七度河九十里至古北口兩旁峻崖中有路僅容車軌口北有鋪彀弓連繩本范陽防厄奚契丹之所最為隘束然幽州東趨營平州路甚平坦自頃犯邊多由斯出又度德勝嶺盤道數層俗名思鄉嶺八十里至新館過雕窠嶺偏槍嶺四十里至卧如來館蓋山中有卧佛像故也過烏灤河東有灤州因河為名又過墨斗嶺亦名渡雲嶺長二十里許又過芹菜嶺七十里至柳河館河在館旁西北有鐡冶多渤海人所居就河漉沙石鍊得鐡渤海俗每嵗時聚㑹作樂先命善歌舞者數輩前行士女相隨更相唱和回旋宛轉號曰踏鎚所居屋皆就山墻開門過松亭嶺甚嶮峻七十里至打造部落館有蕃戶百餘編荆為籬煆鐡為兵器東南行五十里至牛山館八十里至鹿兒峽館過蝦蟆嶺九十里至鐡匠館過石子嶺自北漸入山七十里至富谷館居民多造車者云渤海人正東望馬雲山山多鳥獸材木國主多於此打圍八十里至通天館二十里至中京大定府城垣庳小方圓才四里許民但重屋無築堵之制南門曰朱夏門內夾道步廊多坊門又曰陽德閶闔城內西南隅岡上有寺城南有園圃宴射之所自過古北口即蕃境居人草庵板屋亦務耕種但無桑柘所種皆從壠上蓋虞吹沙所壅山中長松鬱然深谷中多燒炭為業時見畜牧羊馬槖駝尤多青羊黃豕亦有挈車帳逐水草射獵食止糜粥粆糒辛亥上作為政歌賜輔臣詔諸路自今除常例合調民夫外如别有工役須至差撥者並取實役人數調訖具事以聞違者案其罪先是提㸃開封府界段惟幾調中牟縣夫二百人修淳澤監倉羣牧制置使以廄卒代之因有是詔癸丑詔京西市糴軍糧轉運使止當勸誘無得迫促時轉運使於西京市糴條約過當民不如約則杖之故特示禁戒丁巳以知制誥陳堯咨權同判吏部流內銓舊制選人皆用奏舉乃得京官而士有孤寒不為人知者堯咨特為陳其功狀而升擢之戊午九天司命上卿保生天尊降于延恩殿按本志九天司命上卿保生天尊即聖祖也實録於六年七月又書加上九天司命上卿保生天尊曰東嶽司命上卿佑聖真君初封禪禮畢詔上司命天尊之號至是以聖祖臨降名稱相類故改上焉如此則當别一司命矣又據聖降記加上東嶽司命上卿真君聖號敕但云東嶽司命上卿真君可加上東嶽司命上卿佑聖真君無九天及保生天尊字然封禪記書元年十月壬子詔上卿九天司命真君增號九天司命保生天尊實有此六字二書皆丁謂所編乃如此不同當考先是八日上夢景德中所覩神人𫝊玉皇之命云先令汝祖趙某授汝天書將見汝如唐朝恭奉𤣥元皇帝翌日夜復夢神人𫝊天尊言吾坐西當斜設六位即於延恩殿設道場是日五鼓一籌先聞異香少頃黃光自東南至掩蔽燈燭俄見靈仙儀衛所執器物皆有光明天尊至冠服如元始天尊又六人皆秉圭四人仙衣二人通天冠絳紗袍上再拜階下俄有黃霧起須臾霧散天尊與六人皆就坐侍從在東階上升西階再拜又欲拜六人天尊令揖不拜命設榻召上坐飲碧玉湯甘白如乳天尊曰吾人皇九人中一人也是趙之始祖再降乃軒轅黃帝凡世所知少典之子非也母感電夢天人生於夀丘後唐時七月一日下降總治下方生趙氏之族今已百年皇帝善為撫育蒼生無怠前志即離坐乘雲而去及曙以語輔臣即召至殿厯觀臨降之所又召修玉清昭應宫副使李宗諤劉承圭都監藍繼宗同觀已未札示中外大赦天下常赦所不原者咸除之兩京來年夏稅放十之二諸路十之一賜致仕官全俸一年幕職州縣官先經省者權增五百員任滿即停宋朝要録內外諸軍將士並與特支命參知政事丁謂翰林學士李宗諤龍圖閣直學士陳彭年與太常禮院檢討官詳定崇奉天尊儀制以聞庚申羣臣詣崇政殿稱賀因賜酒五行而罷宴宗室諸親于萬嵗殿辛酉上以崇儒術論為君難為臣不易論示王旦等先是龍圖閣直學士陳彭年因奏對上謂之曰儒術汚隆其應實大國家崇替何莫由斯故秦衰則經籍道息漢盛則學校興行其後命厯迭改而風教一揆有唐文物最盛朱梁而下王風寖微太祖太宗丕變敝俗崇尚斯文朕獲紹先業謹遵聖訓禮樂交舉儒術化成實二后埀裕之所致也為君之難由乎聽受臣之不易在乎忠直其或君以寬大接下臣以誠明奉上君臣之心皆歸於正直道而行至公相遇此天下之達理先王之成憲猶指諸掌孰謂難哉彭年曰陛下聖言精詣足使天下知訓伏願躬演睿思著之篇翰頃之上出二論示彭年彭年復請示輔臣旦等因請赴國子監刻石從之詔以天尊降臨分命輔臣告天地宗廟社稷初宰相請准例遣丞郎已下上特命王旦等攝事又遣官告諸陵嶽瀆祠宇上親封香付之壬戌謁玉清昭應宫時將祀神州地祗在致齊內上疑不當出欲别擇日恐緩後乃詔禮官議之且言焚香致謝非遊賞也若不作樂於禮無嫌遂從之詔廣州鈐轄兼提舉在城煙火盜賊事閏十月乙丑詔盜賊當決配者免其令衆情重者奏裁丁卯命王旦為躬謝太廟大禮使向敏中為禮儀使王欽若為儀仗使陳堯叟為鹵簿使馬知節為橋道頓遞使故事每大禮以宰相領大禮使而禮儀等使皆署申狀東封嵗上特命中書樞密院領五使汾隂亦如之於是王旦言頃嵗臣叨備相位欽若以下皆知樞密院參知政事今敏中欽若堯叟悉同平章事詢於事體頗似非宜上曰第依近制可也旦又曰東封汾隂告廟日皆奉天書所以表奉符行事今兹告廟天書重於舉動望不出內詔可鑾駕儀仗舊用二千人有司請增為七千人從之有司請太廟用饗禮一獻庭設宫架殿上登歌無二舞上欲重其事特用三獻乃以相王元偓為亞獻舒王元稱為終獻詔河北𣙜場所市食羊死於路者無得抑市人鬻之詔訪聞邊臣每正旦五鼓即張燭慶賀日聚宴樂至有夜分而城不扄者自今不得復然已已上天尊號曰聖祖上靈髙道九天司命保生天尊大帝有司請以玊清昭應宫玉皇後殿為聖祖正殿東位司命殿為治事之所令施州每月朔望給酒肴犒溪蠻庚午上齊于長春殿以朝元殿建道場設更衣次及奏中嚴外辦於文德殿辛未躬謝太廟六室又命大臣分告天地社稷后廟壬申上謂宰相曰頃聞鄭國長公王肩輿出行民有犯其前導者即捕笞之朕在東宫日有犯者第委之府縣未嘗輒自箠掠也宜令開封府自今有此類未得决罰具名以聞仍嚴戒約諸宅勾當使臣詔聖祖名上曰𤣥下曰朗不得斥犯以七月一日為先天節十月二十四日為降聖節並休假五日兩京諸州前七日建道場設醮假內禁屠輟刑聽士民宴樂京城張燈一夕改延恩殿為真遊殿重加修飾有司言道場及奏告自今用青詞云嗣皇帝臣署大事祀官朝服常時奏告公服薦獻則太祝讀詞醮設止命道士備香酒時果碧色幣詔可癸酉詔天下府州軍監天慶觀並增置聖祖殿乙亥詔上聖祖母懿號曰元天大聖后初宰臣以太祖諡號有與聖祖同名者將議易之上曰真祖臨降皇家大慶也六室並當增諡乃詔太廟六室各奉上尊諡二字中書門下請加僖祖諡曰文獻睿和順祖曰惠元睿明翼祖曰簡恭睿德宣祖曰昭武睿聖太祖曰啓運立極英武睿文神德聖功至明大孝太宗曰至仁應道神功聖德文武睿烈大明廣孝有司言聖祖母未有宫殿望遣官於兗州曲阜縣夀丘奏告從之丙子出玉宸殿新稻賜輔臣上曰禁中植稻暇日臨觀刈穫見其勞力愈知耕農之可念也羣臣上尊號曰崇文廣武感天尊道應真祐德上聖欽明仁孝不允表三上從之詔俟尊冊聖祖畢受冊丁丑謁啓聖院太宗神御殿禮畢詔於龍圖閣取太平興國中舒州所獲志公石以示輔臣上作詩紀其符應又作贊目曰神告帝統石乃加諡志公曰真覺遣知制誥陳堯咨詣蔣山致告其後又加諡曰道林真覺令公私無得斥志公名五溪蠻向貴升等五百人及磨嵳洛浦蠻來貢方物戊寅改兗州曲阜縣為仙源縣建景靈宫太極觀於夀丘以奉聖祖及聖祖母遣內供奉官周懷政與本州長吏規度興作俟宫觀成日備禮奉冊凡宫觀之制皆南開三門二重東西兩廊中建正殿連接擁殿又置道院齊坊其觀宇之數差減於宫庚辰王欽若言所居第在太廟之後后廟之前出入宴處皆不遑寧請易賜官第詔可尋於安定坊造第賜之辛已玉清昭應宫天書閣上梁車駕往觀焉宴賜如例丁亥詔聖祖聖母徽號冊寶法物並飾以金尊號冊以金塗銀為飾舊制皇帝冊寶飾以金宗廟飾以銀及是有司請聖祖冊寶如宗廟之制上崇奉聖真志存謙抑故有是詔有司言唐太清宫樂章皆明皇所作今崇奉玉皇聖祖及祖宗配位樂章請上自為之戊子內出樂章十六曲以示輔臣文舞曰發祥流慶武舞曰降真觀德庚寅龍圖閣直學士陳彭年等上新定閣門儀制十卷客省事例六卷四方館儀一卷詔奬之仍第賜金帛實録本記並於六月丁未書彭年進閣門儀制今又并客省四方館儀制書之疑必重疊故削去六月丁未所書止存此詔太常寺選殿前司天武左右廂軍士每廂七十五人人為角手教習以備警場先是每舉大禮皆預以近京州軍召鳴鼓角者貧民涉逺而至頗成勞費及是罷之人以為便命莊宅副使王承祐入內殿頭楊懷吉浚汴水上謂汴河有灣曲灘淺沒溺甚多蓋開浚之際只依檢計到功料檢計之際又河水蓋覆不見合施功處自今須先塞上流盡河漕內水方行檢計仍差承祐及懷吉領其事承祐審琦第四子懷吉缺十一月丙申上於朝元殿恭謝玊皇奉天書行事致齊三日禁屠宰備三獻薦玉帛麵牲配坐以聖祖位在東褥用黃玉以四圭有邸幣色蒼太祖太宗位在西陳宫架百官朝服祀禮畢賜羣臣福酒有差有神雀及二鶴來集上作詩記之戊戍右屯衛將軍贈潁州防禦使允中卒允中鄆恭靖王第二子也先是有司以冬至當宴近臣於向敏中第於是請不張樂上曰樂以侑食不可廢也第命改中旬設㑹允中改名允懷見康定元年正月當考庚子上作聖祖降臨記宣示中外辛丑詔葺南郊齊宫遣軍士代鄉耆守護常令完潔內侍楊懷恩妄言家婢興讒父母意規異居上曰中官皆養子此弊宜深察特詔决杖配𨽻唐州癸卯詔入內內侍省遣親事卒伺察倉廪因緣乞取財物者令開封府捕劾痛懲之丙午宰臣王旦加門下侍郎向敏中中書侍郎楚王元佐太師相王元偓太傅舒王元稱太保榮王元儼檢校太尉內外文武官並進階勳爵邑有差詔定加文武官月俸有差上承二聖恭儉富有多積承平既久賦斂至薄軍國用度之外未嘗廣費自奉且以庶官食貧勤事非厚其廪稍無以責亷隅故因行慶特議增給遣西京左藏庫使王應昌使夏州以加恩官誥賜趙德明又遣使至交州境上召李公藴子弟以官誥賜之禁夏州進奉使造軍器歸本道殿前侍衛馬步軍司言三司准詔將新收配軍馬請受厯並入勾磨勘動踰旬浹事頗不便望且仍舊詔許且用舊厯來月改從新制丙午宣政使提㸃內藏庫劉承圭上內藏庫須知五卷詔褒之丁未詔自今聽啇賈以糧斛從便貨鬻官司勿禁時京師榖貴上以斂糴增價侵民故有是詔上謂宰相曰汴水嵗有流尸至淮而止然非理死者必有積惡以罹斯苦朕思以善緣濟之乃作發願文遣工部郎中直集賢院李建中內殿崇班張承素齎詣泗州依道釋二教設齊醮宣讀及祭溺者仍詔本州每嵗擇日禁屠宰就寺觀各建道場五晝夜仍設祭宰相請以聖製刻石就州建觀乃得汴水東臨淮之地命內侍趙履信朱允中董役揔衆舍二百七十四區賜名延昌戊申詔如聞沿汴護堤河清卒賊害行客取其資財棄尸水中頗難彰露可明揭賞典募人糾告己酉詔黃帝故事自今凡降書詔非聖母文字外不得引用時學士院撰承天節教坊宴辭中有大電繞樞之語上命宰臣諭㫖易之因降是詔壬子改朗州為鼎州𤣥武門為拱辰門乙卯詔商旅自京便錢至諸州者按太祖開寶三年置便錢務許民入錢左藏給以劵於諸州便換此條當云自京賫便錢劵至諸州原書疑有脫字所在即給付無得稽滯知梓州崔端獻白雉一上以地逺勞人賜牙吏緡錢遣之仍令諸州依前詔勿以珍禽異獸為獻丙辰內出太宗御集并法帖三百六十卷示輔臣王旦曰以文章化人成俗實自太宗始也上謂向敏中丁謂曰太宗所用筆卿等獨未見因各賜一雙戊午契丹遣使昭德軍節度使耶律寧副使大理少卿李道紀來賀承天節庚申令河北緣邊官道左右及時植榆柳辛酉西凉斯多特遣其子來貢是月初置玉清昭應宫使命宰臣王旦為之詔赴上于本宫百官班賀如儀既而以使署未備權罷班詔車營致逺務押綱殿侍自今取纍經差使無過犯之人時上謂近臣曰車營務致逺務三司自來失於條制損失增多即於外郡配置擾人自逐綱立定賞罰専差殿侍管轄死損之數十無一二其殿侍每考其績效入等者與三班差使近日殿侍多乞此差遣斯亦勸之得宜也十二月甲子朔以宣政使應州觀察使劉承圭為景福殿使新州觀察使依前修玊清昭應宫副使先是承圭以疾屢表請致仕修宫使丁謂言承圭方領宫職藉其督轄望勿許所請第優賜告而承圭繼請不已乃許減去繁務特置此職以寵焉班在客省使上其五嶽觀內藏庫皇城司仍舊管勾自餘悉代之承圭又請納觀察使月俸詔可復定殿使俸如內客省使而給實錢親作歌賜之丙寅賜諸班直諸軍及剩員薪炭有差軍士外戍家屬在營者半之詔諸司使副任緣邊部署知州鈐轄巡檢等入辭日求補䕃子姪逺近之際恩典不均宜令樞密院差定條例先是詔丁謂等於京城擇地建宫以奉聖祖謂等奏司天少監王熙元言按天文志太微宫南有天廟星乃帝王祖廟也宜就大內之丙地乃得錫慶院吉地令謂等與內侍鄧守恩修建戊辰詔上新宫名曰景靈己巳令三司出炭四十萬減市直之半以濟貧民時連日大雪苦寒京城鬻炭者每稱錢二百故有是命仍遣使臣十六人分置埸以內供奉二人提揔之自是小民奔凑至有踐死者乃命都巡檢張旻遣軍校領徒巡護賜死者家緡錢無族者官為埋瘞仍令三司常貯炭五七十萬如常平倉遇價貴則出糶之辛未詔文武羣臣趨朝立班及崇政殿引對官員使臣自今有怠惰不如儀者閣門御史臺劾奏之失不劾奏并案其罪上封者言近年朝儀頗不端肅有司顧望莫肯舉職故也有司言按周禮孟冬祀司民唐避文皇諱改為司人今請改𤣥武𤣥冥𤣥弋𤣥枵並為真字遣官就南郊設昊天及四位告之詔可壬申改諡𤣥聖文宣王為至聖文宣王甲戍詔前詔開封府毁撤京城民舍之侵街者方屬嚴冬宜俟春月管勾麟府路軍馬事韓守英言豐州防禦使王承美卒其子文玉權管勾當蕃漢事宜禀朝㫖上曰豐州事繁宜選習知邊事戎人所服者即詔守英洎知府州折惟昌察承美諸子及詢蕃漢牙校以聞尋依所奏命文玉為左侍禁知州事承美初被疾遣中使挾太醫視之令日候其起居附驛言狀及卒贈恩州觀察使録其子文寶為三班奉職孫德鈞為借職仍詔其妻折氏得入謁禁中文恭承美長子也承美以文玊為子奏授殿直既襲任文恭時為侍禁在沂州表訴其事詔改文恭為供奉官乙亥遣常參官於麟府置場和市軍糧時河東豐稔米斛百錢戎人以茶一斤易粟一囊州縣利於轉輸不即斂糴故有是命丙子詔劾管勾國信內臣閻承翰張繼能等坐契丹使在驛輒歸第供億有闕案奏特原其罪自餘第懲罰之戊寅溪洞蠻張文喬等八百人來朝已卯增冀州公用錢嵗五十萬以其當北路衝要也知天雄軍寇凖言獄空詔奬之庚辰知處州張若谷言黃帝任六相而天下治伏覩詔示聖祖臨降有斜設六位之文以臣參詳必當時六相也按唐天寶敕三王五帝各有配享黃帝惟以后土配望於殿內塑六相像并加諡號有司言神靈之事不可備知所云六相恐難執據其六位仙官望令編修道藏所增入醮位及於聖祖殿設像從之若谷南劍州人兩朝史有𫝊自景德初已為三司判官此知處州者當别一張若谷本𫝊即以為南劍州人恐非也辛巳諡峩眉山僧茂貞曰明果上語輔臣曰茂貞修行精至每見王公戚屬皆隨其性勸導之多云為善於身盡忠於君則可以保延福夀長守富貴且預知將亡趺坐而化此亦可嘉也乙酉令泗州出官米十萬石以賑饑民又增兵備盜給蔡州公用錢嵗二十萬丙戍詔天慶天貺先天降聖承天節權止行刑如聞所在容繫頗衆自今笞杖情輕者釋之情重及須證佐者責保於外丁亥立德妃劉氏為皇后后性警悟曉書史聞朝廷事能記本末帝每巡幸必以從衣不纎靡與諸宫人無少異莊穆既崩中宫虛位上即欲立之后固辭良久將降詔而宰相王旦忽以病在告后疑旦有它議復固辭於是中書門下請早正母儀后卒得立凡處置宫闈事多引援故實無不適當者帝朝退閲天下封奏多至中夜后皆預聞之周謹恭密益為帝所倚信焉此固實録舊文蓋埀簾時奏篇其勢不免如此要當刪修編聨祥瑞所上祀汾隂后土壇朝覲壇親奠西嶽廟三圖及祥瑞圖百四十八置龍圖閣下召宗室輔臣兩制尚書丞郎兩省給諫三司副使刺史已上觀之王旦常言於上曰臣頃為大禮使所奏祥瑞臣非親見也據司天監邢中和狀耳願令史官并書其實此據遺事録附編聨祥瑞圖下初不與此相屬也其有無亦當考戊子契丹遣使廣德軍節度使蕭袞副使左衛大將軍齊泰來賀明年正旦庚寅詔諸路大辟罪或有情欵疑互承前皆俟旬終報轉運提㸃刑獄司以致審察淹緩自今即日報之從河東路提㸃刑獄張懷寶之請也詔自今諸州土貢物至京令戶部牒合屬庫務先次受納來人遣回候正旦朝賀排仗别差人齎擎陳列詔知延州李及兼蕃界緣邊都巡使仍給牙隊馬步兵士如無邊警即勿出巡是嵗詔三院御史除差出外任及在京涖它局外定以六員為制㑹要無月日
