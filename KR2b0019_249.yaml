body:
  text: 續資治通鑑長編卷二百四十五宋李燾撰神宗熙寧六年五月癸卯朔御文德殿夔州轉運判官曾阜言播州楊貴遷在夷人中最強盛以老遣子光震光榮獻鞍馬牛黃麝香詔補光震三班奉職光榮借職甲辰樞密使陳升之兼羣牧制置使詔文彥博嘗受先朝顧命今罷樞府冝依曾公亮罷相例與子孫推恩御集乃十二日事今從實録乙巳詔諸路察訪官河東兩浙路許奏選舉人充京官職官縣令十二人餘路十人升陟不限貟數丙午東上閣門使河州刺史知德順軍景思立知河州西京左藏庫使苖授知德順軍專管轄涇原正兵弓箭手䇿應熙河涇原路都監王寧副之時河州未復豫除思立知州事兼洮西安撫使治事於香則城九月一日王安石云云詔名熙河路阿納城為定羌城香則城為寧河寨康樂城為康樂寨劉家川堡為當川堡並𨽻河州詔出常平錢萬緡賑貸延州諸縣闕乏戶戊申分命輔臣祈雨詔創水磑碾碓有妨灌溉民田者以違制論不以去官赦降原減官司容縱亦如之己酉詔熙河路建定羌寧河康樂等城寨及河州興功防城器甲戰具令永興軍秦鳯兩路轉運司於近裏州軍應副庚戌詔諸路經略司結隊並依李靖法三人為一小隊九人為一中隊賞罰候成序日取裁其隊伍及器甲之數依涇原路牙教法十二月十二日庚辰十八日丁亥當考又詔河州公使嵗賜錢二千緡仍權增千緡候有雜收錢止詔永興軍等路轉運司給錢十萬緡付秦鳯路轉運司以助邊費癸丑嶽州司戶參軍崇文殿校書編修三司敕式張諤為光祿寺丞權檢正中書户房公事命都官員外郎檢正中書户房公事熊本察訪梓州路常平等事并體量措置瀘州淯井監夷事新紀但云遣熊本措置瀘州夷先是本及蒲宗孟皆言討淯井蠻不當發西川兵既弱又逺當發戎州兵而已又言淯井蠻不當盛兵討之蠻急則恃山林官軍不能入也然有田以為生若以兵擾之使不得田即亦自困今不務擾之使不得田而盛兵討之我罷則彼出我往則彼藏瀘州糧食難繼我師必困上以為然欲即選遣此兩人王安石曰臣欲更與計議續取旨時李曼建議欲以王命撫甫望個恕及晏子安石又白上此兩人皆以為甫望個恕晏子不可以王命崇奬成其氣勢後不可制臣愚以謂此二族多不過萬人夷俗以王命為重今寵以爵命嵗時稍加優賜約以勿相侵擾彼若懷惠乃所以絶其兼并之謀今縱為生夷即彼自相兼并非我所能制何由禁其彌強上謂曼失䇿安石曰曼奏亦但云各領本部不得相侵擾而已撫二酋以王命恐當如此上乃以為然既而安石言本子細必能了事遂獨遣本仍令諭本此意河北路察訪副使趙子幾言深州安平縣及永寧軍祁州界開滹沱新河其侵鑿民田乞除其稅從之詔涇原路經略司以官錢償德順軍蕃部所買馬母增備價錢詔名硤州新城為安江寨富州新城為鎮江寨龔溪新寨為龔溪寨據九域志安江寨乃硤中勝雲鶴繡五州即唐敘州龍標縣之東境鎮江寨乃富錦圓三州即唐龍標縣地龔溪寨後為鋪屬沅州麻陽縣南江傳以此為六月事今從實録賜瀘州軍前出戰及淯井監寧逺寨戍兵特支錢有差甲寅檢正中書户房公事祕書丞集賢校理同修起居注章惇改禮房檢正中書刑房公事太子中允沈括詳定三司令敕管勾都水監丞侯叔獻覆檢計白溝河八月十六日事與此相關明年正月二十七日罷詔涇原秦鳯環慶鄜延河東五路並依涇原總管司令就糧指揮有室家兵級分造乾糧麻餅量給茶酒柴水錢蓋褁糧軍行所須陳前火食未辦主將下令乃得食舊例以配坊郭户人以為擾今令軍中自辦公私便之鄜延路經略司言新刺弓箭手教閲武藝已精乞更畨赴巡檢下代正兵歸京師詔趙卨再相度道里逺近分畨更替日月以聞五年九月二十七日可考乙卯斬兩地供輸人北界探事百姓王千家屬送潭州編管千坐放火燔日溝驛廟誣北人以求賞也先是雄州牒涿州捕賊并指柴頭草稈蜀黍為證王安石言柴頭草稈蜀黍豈獨北界有之縱非兵士失火安知非本地分人與兵士及村耆有隙故放火以纍之乎及千事敗御史蔡確言放火罪重千為錢三兩千作此恐非實上以語安石安石曰幸於不敗故雖重法亦不憚又報探一事實即今後安撫司倚信非特三兩千之利而已昨河東奏一報探人尚云十數年前報探郭恩事得實必可倚信由此觀之即探報一事實所僥後利非特三兩千也放火事日録差詳在五年十一月八日并十三日又六年五月十五日或可刪附上謂王安石曰東軍近亦可使安石曰自陛下令訓練至今誠可使向時即不然臣未嘗至西北但見江寧屯駐虎翼廣勇教之幾及半年都不能得成次第在今日誠已可用須更督責諸帥各課其教閲殿最不用意者與落職降差遣不過行遣一兩人自然各趨詔令不患兵不精又此事有數可考非難知茍不用心無可逃罪今邊陲無事將帥别無責若教閲不能精不知安用上以為然上又曰近雖立教閲使臣賞罰却未有兵士勸懲安石曰兵士即不過厚以銀碗楪子激勸久教不能成就即退作廂軍而已上曰止當如此若轉資即可惜安石曰轉資須留之以賞戰功也丙辰遣官謝雨詔降敕榜付察訪熊本曉諭夷界除元謀作過首領及手殺命官將校不赦外餘人如能自首歸並免罪審官東院請自今後殿引見京朝官差遣人不限員數從之丁巳詔皇城司係教閲親從官比諸軍例支楪子教射梓州路轉運司上瀘州夷人作過因依詔知州李曼具折勒夷人納米以代柴茆事以聞四月十二日張子瑾奏可考太子少師李柬之卒庚申開封府界提點司言乞令監嵩慶懿三陵使臣兼監郭店鎮稅省監稅使官一員詔以嵩慶懿三陵使臣專奉周朝陵寢弗許辛酉河北路察訪副使趙子幾言自西山道口東至百濟村二百餘里栽榆桑科買桑椹石數不少種在民田牛羊不敢牧察訪使曾孝寬亦言民訴植木占耕地隔州借車牛載桑榆甚擾又科桑椹及令村社監督澆灌民甚苦之詔下程昉相度先是言者謂河北沿邊可植桑榆雜木以限邊馬且給邦之材用朝廷如其言命文思副使霍舜封供備庫副使王鑒以剶杌栽種榆柳為名置司於大名府而昉實董其事子幾孝寬皆言其不便故再令相度以聞元豐元年十月二十七日戊辰乃罷舜封等剶音川朱史云其後曾孝寬以為言按子幾副曾孝寬察訪不應云其後朱史誤也舊史既于此五月十九日書子幾云云下程昉相度又于七月二十九日再書孝寬云云因改立法舊史亦重復失敘事之體其實孝寬子幾同時奉使相先後各有言其後立法則或以孝寬再請故也今稍刪潤令不相抵牾子幾又言程昉造鎮州中渡浮橋不便乞差監司體量安石力主昉謂不須體量且曰奉使者本欲考察官吏情實今李承之使兩浙乃特薦嚴君貺君貺以不奉新法恱俗者也趙子幾使河北専攻程昉昉以營職奉公為衆人所疾者也奉使如此則衆毁不至而衆譽歸之然非公家之利此必由聖心未能不為遊説所惑動故人自為利害之計輒出此塗欲變俗使為忠實此豈可長也癸亥太子中允集賢校理管勾國子監李定兼直舍人院先是上語王安石李定擢用先鄧潤甫輩後别不除差遣如此人盍收奬之安石曰方舉天下言常平為百姓害以欺陛下獨定緣孫覺所舉至京師具以道路所聞見直對遂遭舉朝誣罔幸而得雪後復起獄其事情陛下必能具察上欲令判吏部銓安石曰銓司今不闕人如定吏能誠不過人文字亦可取上曰何如張琥安石以為勝琥故有是命樞密院言近立諸路勇敢效用法緣邊諸路經略司勇敢效用皆以材勇應募從軍月給錢糧戰馬器甲以時肄習若無調發皆聽還家其戰鬭勞效依次遷補凡四補至借職比弓箭手有功遷轉自押官至借職凡十四資淹速特異非朝廷第功均賞之意先據涇原路經略司奏勇敢武藝舊雖分等第弓力多不中程精冗相參疲弱幾半尋閲試汰去冗濫粗為精勇今以河東鄜延秦鳯環慶熙河路各三百人涇原路五百人為額第一等步射弓一石一斗馬射九斗料錢千第二等步射弓一石馬射八斗料錢七百第三等步射弓九斗馬射七斗料錢五百皆用入陳短箭仍兼走馬射笋樁輪弄槍簡不刺手不置營每季首赴經略司閲試及本軍注籍遇有邊事追集給口食借官馬給草料其教習日依甲分分射親及野戰中者有賞全不中者減料錢次季又不中勒停遇戰有功以八等定賞一給公據二甲頭三守關軍將四軍將五殿侍六三班借差七差使八借職其弓箭手有功亦以八等定賞一押官承局二將虞候十將三副兵馬使軍使四副指揮使五都虞侯六都指揮使七三班差使八借職其指揮過關排連即依舊單轉從之仍頒行諸路本志與實録同但稍刪潤其辭今依實録詔自今郡縣主亡陳乞有官親屬遷官無得遷至內殿崇班章惇言權發遣荆湖南路轉運副使蔡煜元奏梅山利害及措置梅山武岡猺人得主客萬四千八百九户丁七萬九千八十九口田二十六萬四百三十六畝起稅租及修築武陽關硤城寨其提點刑獄孫頎權發遣提點刑獄朱初平管勾常平司喬執中知潭州潘夙並協力同議詔各遷一官蔡煜仍直集賢院初議賞陳升之請煜轉一官餘減年上以為薄王安石請煜更升一任餘轉官吳充馮京謂煜首議賞未稱上曰朝廷已自有成議既而曰煜要可使勿升任即除館職已而蔡挺辭煜恩命安石因白上煜沮章惇以為不可倉卒又言梅山不可便取陛下必能記憶上曰煜第恐功在章惇耳安石曰如此人既除館職則朝夕便望修起居注矣上良久曰煜與劉瑾不相逺僉言煜心巧非瑾比上曰煜差險也熙河路經略司言鈐轄張守約領蕃部兵修築康樂城秦州通判陳紘應副軍須有備詔守約遷引進副使紘遷一官仍升一任優等使臣轉三資第一等兩資第二等一資第三等獲首級者一資餘減磨勘三年初王韶乞優與陳紘酬奬王安石曰紘曩修敕修敕了日自合酬奬緣郭逵與諸屬官沮撓韶事故臣選紘往佐韶吳充言紘內行不可道上以問安石安石對不知陳升之亦言不知馮京曰臣聞之然暗昧難明僉議紘轉一官上令更升一任安石曰恐止合轉官俟有省府闕以人望如紘亦可進擬上曰此自當酬奬既専遣往更與升一任無傷也録故忠武軍節度推官王回子汾為郊社齋郎先是右正言同判國子監常秩言回學術行義臣自蒙召對陛下嘗問及回之為人而臣亦恨回不及並升朝列近又被旨進其遺文在朝廷宜加旌勸先王之法善善及子孫致仕者世祿下逮漢魏管寧之徒蓋一時之篤行被召不至而猶得拜子為郎况回非特今之所謂賢者不幸物故今有子汾望特賜甄録上曰秩素行為吕公著程皓等所師仰方公著等紛紛之時秩乃出就祿必其所見有異故也比以言事多不聽故屢求去今乞官回一子回有文行譬之常人官至正郎即可奏子則以一官與之不為過故有是命甲子上批常秩在病告已滿百日聞有司以例停俸秩家素貧父子卧病僦居京師復罷官俸則遂絶粥藥之資甚無以稱朝廷遇秩之意可自停給月皆給之王安石與上論塘泊上以為王公設險守國安石曰誠如此周官亦有掌固之官但多侵民田恃以為國亦非計也太祖時未有塘泊然契丹莫敢侵軼上曰與之和安石曰彼自求和非求與之和也周世宗即不曾與之和然世宗能拓關南地彼乃不能侵軼上又以為世宗勝契丹適遭睡王安石曰李景非常睡亦為世宗取淮南八年四月五日安石又言睡王事附注在蕭禧入辭下今契丹主豈必勝李景其境內盜賊不禁諸事廢弛若陛下異時有以勝之然後乃可以言其無以勝李景爾天錫聖質甚髙天相助陛下甚至若陛下力行先王之政以兼遐荒寧中國為己任即強敵無不可制服者上又稱世宗善駕馭安石曰乘天下利勢豈有不可駕御之人臣不可制服之強敵世宗斬樊愛能等則兵不得不強選于衆舉李榖王朴則國不得不治李榖王朴雖不足方古人然要之一時之選也但此二事足以成大業矣馮京言世宗酷暴上曰聞世宗上仙人皆慟哭安石曰告汝德之説于罰之行人恱德乃在于罰行罰行則誕謾偷墮暴橫之人畏戢公忠趨事之人乃有所赴訴有所託命此世宗上仙人所以哭也皇城司乞增祿行重法馮京欲如內臣所奏王安石以為不須爾上從安石言且曰此常人見之以為末事然能使吏皆不敢受賕姦雄以此觀政安石曰賔至不求有司前史所以稱仲尼也上曰只恐因此有留滯事處京曰前言三班留滯事案驗乃都無一事留滯安石曰開封以不受賕故乃更各要速了不肯故作枝蔓獄訟為之省三年八月二十七日有增祿都數恐合附此更詳之賔至不求有司五年五月三日已嘗言之此又再言之今仍兩存之安石云不須爾當考乙丑詔察訪京東路常平等事鄧潤甫等博訪本路士人行義卓越為鄉黨所服者以名聞梓遂州走馬承受張宗望等言西京左藏庫副使景思忠等攻燒夷囤與夷賊戰路隘險思忠及孫皓潘信傅表臣四人并軍士二百九十四人皆死之詔熊本考實以聞後本以死事人名來上録思忠子昌符等凡七人為三班奉職至殿侍餘軍士各賜其家錢帛有差思忠普人以遂州都監領卒五百從鈐轄張承祐為先鋒賊據險薄官軍思忠戰不利左右勸思忠逃去思忠不聽奮劔疾戰而死舊無録子孫例而本為思忠等陳乞上怪其軍行次第極狼狽但各與一人恩澤録思忠等乃十一月三日事今并書之詔熊本速進發本路見經制夷事官吏且案兵守禦出入道路未得輕進又詔差崇儀事成都府利州路鈐轄田諲權發遣瀘州措置夷事所須犒賞錢帛令轉運司應副又詔發階成鳯三州土兵權駐瀘州又詔李曼及轉運提點刑獄司與田諲從長措置提舉兩浙興修水利郟亶追司農寺丞送吏部流內銓仍罷修兩浙水利初亶言蘇州水利具書與圖以為環湖之地稍低常多水沿海之地稍髙常多旱故古人治水之迹縱則有浦橫則有塘又有門堰碁布之亶能言者總二百六十餘所今欲略循古人之法七里為一縱浦十里為一橫塘又因出土以為隄岸用二千萬夫水治髙田旱治下澤要以三年而蘇之田畢治矣朝廷始得亶言以為可行遂真除司農寺丞令提舉興修然亶徒能言之爾至蘇興役民大以為擾論議沸騰會吕惠卿被召言其措置乖方又違先降朝旨故有是命上謂王安石曰亶似非妄作者今乃如此又曰吕惠卿極以為不可修言無土安石曰臣嘗遍歷蘇州河親掘試皆可取土土如塹極可用臣始議至和塘可作蘇人皆以為笑是時朝廷亦不施行後來修成約七八十里髙岸在深水之中何嘗以無土為患上又以為墟大不可成車水難安石曰今江南大墟至七八十里不患難車水但亶所為倉卒又妄違條約爾郟亶受命在去年十一月八日今年四月十八日蘇州云云丙寅詔賜河州修城役兵作襖丁卯遣帶御器械王中正括麟府路曠間侵冒地募弓箭手及點閲蕃兵上既令王寧䇿應熙河已而追取前詔欲用中正代寧王安石曰中正與王韶不咸不如且用寧上曰中正首宣力今又欲自效與韶亦無它遂改命中正安石又白上中正不宜往前中正欲往青唐助韶數為臣言之然聞中正與往熙州者言乃極搖動韶事緣中正初與韶協謀一旦韶皆棄之事功皆為李憲所收其怨韶宜出死力以報且熙河新造易以口語動搖誠不可使中正往馮京王圭又言䇿應六千人恐中正不能將上曰但為與韶不咸若將兵則中正善撫士卒非不能也然中正亦止求邉任不専要將䇿應軍于是復用寧如故安石因言麟府事合經制宜使中正往上亟召中正問狀中正請行故有是命詔河東就糧馬軍四十七指揮自今輪差七指揮赴鄜延路上畨嵗一替仍委鄜延路都總管司抽減屯泊馬軍內十指揮歸成都府路轉運司言嘉卭州罷鑄錢纍年民間見錢闕乏乞下三司詳度減半鑄與交子相權從之仍令轉運司嵗終具所鑄錢數比較本息以聞志有此七月四日戊辰手詔涇原路經略使王廣淵近舉官類多泛濫或綺紈子弟或府史胥徒使主兵捍敵必誤國事雖多已留中不下尚慮廣淵未體寄委之重猶妄薦論可坐此劄子令自今依公選擇詳定行户利害條貫所奏應開封府委官監分財産當官議定或令探分毋得輒差行人官司下行買物如時估所無不得創立行户今衆行願出免行錢乞從本所酌中裁定均為逐處吏祿從之新舊紀詔官市于民吏輒抑而不受求取百出民以重困其令民輸免行錢官自市熙寧六年五月二十六日中書劄子詳定行户利害條貫所奏準中書劄子節文奉聖旨詳定到行户利害先次聞奏今先詳定到下項節文數內一項據行人徐中正等狀屠户中下户二十六户每年共出免行錢六百貫文赴官更不供逐處肉今據衆行人狀定到下項中户一十三户共出錢四百貫文一年十二月分乞逐月送納每戶納錢二貫七十文下户一十三户共出錢二百貫文一年十二月分乞逐月送納每户納錢一貫二百九十文右奉聖旨宜令詳定行户利害條貫所計會三司同共相度聞奏劄付詳定行户利害條貫所準此於當年九月初三日中書省劄子奉聖旨依奏此據編録册宣和七年四月二十一日講議司劄子內所載今附注此當時指揮蓋據此也紹聖元年十二月二十三日可考己巳知制誥兼侍講吕惠卿兼權知諫院庚午提舉在京市易務殿中丞吕嘉問為國子博士仍升一任監上界屯田員外郎劉佐為都官員外郎仍減磨勘二年並以市易務嵗收息錢有羡也初議嘉問轉一官王安石以為宜更升一任上曰嘉問功誠多遂更升一任辛未西南龍蕃貢方物四月二日龍羅石來貢詔自今漢户典買夷人田土者聽之先是王安石論瀘州夷事因言漢戶不得典買夷人田土此條貫合廢上曰自來有此條貫何故安石曰必緣典買相混爭致開邉隙故立法禁止茍能化其畛域則此非所恤也又淯井兩邉地若捐數萬緡官錢市得令漢户住佃即淯井更無夷事矣上以為然遂降此詔此據王安石日録四月二十二日所載宋史係之九月二十八日非也聽典買夷田據法册乃五月二十九日指揮五年九月三日初許陜西緣邉蕃部土地許典買租賃九月二十八日熊本云云王安石日録六年四月二十二日呈中丞言李曼事上曰鄧綰頗為李曼分説李曼致變殺却許多人恐不可無罪蔡挺曰彼言張荀龍私書荀龍在逺方無所告訴以書與臣欲得上逹豈是私今營救李曼乃却是私安石曰曼措置邉事恐須有事如荀龍言其受邉户財利因别奏恩澤即恐是誣罔據鄧綰奏即曼前未嘗到瀘州曼既行義為衆所稱不容有此陳升之亦曰曼治民甚好人極愛之上曰綰所言夷事多是乃令送熊本相度安石曰漢户不得買夷户田土條貫便合廢上亦以為然曰自來有此條貫何故安石曰必是為因典買相混賴致爭鬭起邉事故立此條貫然若能化其畛域此事非所恤又淯井兩邉地若捐數萬貫官錢買得令漢户住佃即久逺淯井更無夷事上曰本帶一羅才進隨行云夷人可以利開説其黨使為我用內相攻擊果如此最為上䇿是月廢復州為景陵縣𨽻安州仍以玉沙縣為鎮𨽻江陵府監利縣省施州永興寨置夷平寨六月癸酉朔詔自今提舉在京諸司務庫勾當公事止差一員詔永興軍秦鳯路轉運司發北城兵二千付景思立時將城河州思立猶在寧河寨也乙亥章惇言湖南已團成保甲全邵二州各鄰溪洞土丁弩手人員等乞並以舊職名兼都副保正保長習學武藝詔司農寺兵部同詳定以聞其後聽充保正長罷習學丙子上謂執政曰昨洮西香則城之戰聞官軍貪功有斬巴珍覺部蕃兵以效級者人極嗟憤此為害不細不可不察蓋李靖陳法以漢兵為一隊蕃兵為一隊用人如此自無紛亂可令王韶詳度具條約以聞王安石曰武王用庸蜀微盧彭濮人但為一法今欲使為我用則宜令蕃兵稍與漢同與蕃賊異王圭言當别給衣為號上疑别給衣費用安石曰今欲用必先用其豪傑所謂蕃敢勇者既收其用豈可惜費計比招軍其費亦不為多蕃敢勇既樂為用則其餘漸皆慕嚮樂為用矣審刑院言登州沙門島罪人以二百人為額有餘即移配過海恐非禁姦之意乞配沙門島罪人並配瓊崖儋萬四州牢城其見在人依例隨赦量移詔自今以三百人為額七月十八日又治平四年六月二十五日李慶事可考丁丑詔徙秦州茶場於熙州以便新附諸羌市易故也提舉在京市易務奏三班借職張吉甫為上界勾當公事吉甫辭以見為李璋指使璋方在降謫一旦捨去義所不安上歎曰十室之邑必有忠信吉甫雖小人陳義甚髙賢於李清臣逺矣可遂其志王安石曰如聞吉甫極有幹材今所陳乃其私義朝廷取用人正當用此耳初韓絳宣撫清臣從辟會絳無成功被貶清臣規自全多毁絳故上薄之中書禮房進相度事目上批五房催促行下文字及參勘未圓未明事自可擬進取旨不必相度蓋置條目時兵房誤也上雖摘其誤不即以為罪朱本削去云小事不足書新本從朱本今仍存之恐必有謂先是章惇言馮宗道欲往新寨為兵少形勢弱恐蠻人窺見遂止之樞密院具所遣兵言不少上曰或兵未到密院言已到上默然良久曰宗道都無一紙文字奏彼中事情可怪也此據日録四月十九日事王安石云上蓋察知密院沮章惇今節取附見宗道乃正月二十八日遣去是日上諭王安石令惇勿輕易蓋宗道言惇所修寨不堅固又點集丁夫並不從州縣後無由知存亡數又言狤狑與懿洽合元未歸附惇但令人告喻而已安石言今告喻每斫蠻一級即與絹五匹能誘降亦然懿洽必無如此事力購募狤狑狤狑又見官軍盛即必不敢為懿洽出力今以重兵臨之以精兵擊之以厚利誘降其人及誘狤狑及歸明人所誅者元惡數人而已官軍按據要害不妄動即百全無害而坐取勝上曰若如此即善安石曰已與熟議李浩等意亦以為宜如此必無虞也此日録六月四日五日事今附見己卯詔自今災傷年分除於法應賑濟法外更當救恤者並豫計合興農田水利工役人夫數及募夫工直當賜常平錢榖募飢民興修如係災傷輒不依前後敕賑濟者委司農寺點檢奏劾以聞樞密副使蔡挺以知渭州王廣淵書奏御言本路弓箭手昨還自洮西人力疲頓今若復往攻城恐非所堪上曰廣淵為帥臣而有此言得無動搖人心乎王安石等曰此止因書及之至於宣言動衆恐亦不敢上曰廣淵奏辟將佐多非其人近辟一使臣乃濮王宫書吏此人與時君卿善是必因其薦也本路得力官吏不少置而不取乃用此輩一旦誤朝廷事不亦甚乎朕已切責之矣卿等可更因書誡之辛巳提舉司天監陳繹等言本監測驗簿氣朔差互而崇天厯氣後天明天厯朔後天其失皆置元不當未可考正及集衆官詳定浮漏不可用司天監天文院渾儀亦各有舛戾若止因舊器粗為增損不免踈繆詔氣朔令司天監指揮校定厯書人衛朴别造厯與舊厯比較踈密其浮漏渾儀令依新樣製造司天監别測驗以聞南江歸明人向永晤奉其祖防禦使通漢所受真宗塗金交倚銀裝劒及富州印來獻詔以劒倚先朝所賜還之而留其印南江傳六月永晤等二十五人到關引見賜衣帶銀幣詔以新城硤州為安江寨富州為鎮江寨龔溪為龔溪寨等賜名乃五月癸丑傳誤也癸未都大提舉河陽懷衛州界黃沁河堤岸供奉官王亨減磨勘三年廣備指揮使都水監都壕寨髙超賜錢三萬以都水監王亨等獻築土供掃月隄閉口比修閉決口裁省功料故也詔涇原路經略司差䇿應熙河弓箭手貸常平糧斛並免出息秦鳯路經略司言檢量官吏職田及曠土三十餘頃以招弓箭手內職田仍依例以鹽鈔給還四月甲午可考甲申右神武軍大將軍衢州團練使克愈襲封秦國公上批汴水比忽減落中河絶流其窪下處才餘一二尺許訪聞下流公私重船初不豫知放水淤田時日以故減剝不及類皆閣折損壞致留滯久人情不安可令都水應干官司分析仍下三司差官同府界提點司自京抵陳留具有無損壞舟船及比較纍年所壞數以聞後提點吳審禮等言檢視舟船初無損壞者八年閏四月三日日録盛陶因索水漲乃云汴河不合開兩口今檢到水歷方是時汴水乃減四寸索水乃添六尺陶又言嘗溢岸勘會是嵗乃無溢岸云不合開兩口乃自來多開兩口上曰宋昌言閉口不當一嵗凡八次開閉汴口非特費人工物料又汴水不通阻滯綱運甚衆安石曰陶前奏以淤田故兩口水淺靠閣損破舟船甚多京師惶擾乃勘會得並無一船靠損及此八度開閉口勞弊公私舟船皆不通乃無言何也上曰不干盛陶却是薛向奏安石曰向奏臣所不知盛陶即有劄子降在中書不知薛向為近臣如此誣罔聖聽合行法否誣罔如此而不治不知于義理何所當上但笑此假附注當考詔京東武衛等六十二指揮屬諸路分畨勾抽并其餘軍馬並差主兵官分部訓練初河北四路兵不分將教習上慮軍制漸隳故有是詔時政記云河北自通和以來不分將訓練不精慮涉生事重于完葺非聖慮宏逺發自宸斷無以及此今附注兵志云詔河北四路承平日久重于改作茍遂因循益隳軍制其以京東武衛等六十二營𨽻屬諸路分畨教習餘軍並分遣主兵官訓練又詔麟府豐州都巡檢張保移鄜延路差遣仍不理為過犯元勘官周霖追一官勒停體量官范宗師衝替先是保言西界兵三千騎犯邉而鄜州所申才百騎經略司委宗師體量宗師稱止二百餘人後制獄推究如保所言故有是詔乙酉刑部侍郎致仕李受卒手詔以先藩邸舊臣優賜賻贈推恩子孫加等龍圖閣學士工部侍郎提舉鴻慶觀傅永卒可削丙戌詔自今有功蕃官乞創開酒坊者並取裁丁亥知河州景思立乞以德順軍降羌李竒濟等五十五人為洮西安撫司蕃勇敢從之仍計口分三等給修造錢上等七千餘降殺以兩戊子命太子中允集賢校理檢正中書刑房公事沈括相度兩浙路農田水利差役等事兼察訪新紀不書知大名府韓絳言大河掃岸乃者檢計工料但據官吏所見增卑培薄初無定式望委都水監自今並以水面為準髙下須一等其向著處即隄外增貼以絶津漏之患仍先委外都水監丞司與當職官吏躬詣河掃議立法從之詔在朝橫行使副自今並管勾客省四方館公事先是客省四方館闕正官以閣門使副管勾至是引進使李端慤赴闕西上閣門副使張誠一應罷而端慤乞令誠一依舊權管勾故有是詔上批洮西見管涇原弓箭手已節次放散還家歇泊宜指揮王廣淵候到仰所管城寨不得妄有占留仍令經略司常切覺察違者劾罪以聞己丑詔左藏庫副使賈世京減磨勘三年以嘗提舉黃河隄岸建開直河回奪河勢有勞故也直河當考七年二月二日并六月末中書以勸課栽桑之法奏御上曰農桑衣食之本宜以勸民然民不敢自力者正為州縣約此以為資升其户等耳舊有條禁可申明之上批新知河州景思立有母在而未有廨舍以居可特差其弟思誼為秦州職官以慰其念親之意辛卯詔引進使李端慤候二年除防禦使指揮可再展二年坐擅併冀州驍捷等指揮措置乖方致賊燔國信驛故也事在七年二月九日八年二月十八日除正印壬辰司農寺言開封酸棗陽武封邱縣民千餘人赴寺訴免保甲教閲已榜諭無令越訴蓋畿縣令佐或非時追集以故致訟胙城一縣未命教閲而訴並下提點司按察上批今正當農時非次追集於百姓實為不便令提點司劾違法官吏以聞自今仍毋得禁民越訴癸巳永興秦鳯兩路察訪司言虢州盧氏縣有退安處士劉易户下役錢未敢依品官例減半均納詔以七品官例京東路察訪司請自今應推行差役新法有輒傳造言語文字扇搖百姓並依扇搖保甲法從之詔河北路春夫不得過五萬人嵗以為式詔知曹州李復圭罰銅十斤初復圭得曹州上殿有怨懟語曰二十年前已知曹州今日羞見吏民上曰慶州納斡之役枉死者至數千人卿獨不羞見其妻子乃羞見曹州吏民乎復圭無以對至是到官謝表方盛言已無罪橫見劾斥為御史盛陶所彈而有是命上謂王安石曰復圭虛誕才能無一可用欲再斥絀之安石曰復圭前論李克忠等當賞樞密院令本院吏及宣撫司吏供析並稱無例獨陛下明其有例遂賞克忠等然則此事非復圭虗誕也上曰御史言復圭非但此安石曰其實者悉已經斷遣安置以前事非安置以前即無一事實上曰謝表怨誹如何不行遣安石曰依法罰銅足矣上猶以為疑安石曰復圭對語驕悖陛下批出行遣足示懲戒若用御史言復圭加斥絀乃似未允緣御史所言皆失實故也上乃止司農寺言詳定府界提點吳審禮乞令諸縣勸課隨户等種桑椹聽自來年種次年移種候見栽法遍下諸路從之甲午翰林學士陳繹等言奉旨編修道場齋醮式二十八卷乞賜頒行及下僧道録司以本教科參酌逐等道場名目位號立法遵守從之乙未上批熙河路總管髙遵裕見領漢蕃軍于鹽井川築城寨可令就新城造廨舍兩所為七十間賜包順包誠仍先具圖以聞築鹽川寨遵裕本傳可考初議收包順鹽井或以為不可收王安石曰若王韶令人自以私意問包順舊日收十千今日與十五千撲買如何度順與撲買人較計利害之情無異或當欣然欣然即收之無害今置城寨不務就本處經度供給乃從中運致財物為備非經久之䇿上曰古戍邉亦須從內供饋安石曰須計置已盡勢不獲已乃從中供饋若猶可以就便計置何緣釋而不計乃須從中供饋上曰如河北即須至從中供饋安石曰若唐時河北方鎮即外抗強敵旁偹鄰道內抗朝廷又行賂遺然百須不外求而足吳充曰其時誅求何可勝言安石曰近日除從中供饋外亦豈免騷擾也王安石論此在七月十六日今附見丙申知邢州光祿卿史照知恩州仍自今互差武臣以御史蔡確言河北恩冀二州皆為內地不可止用武臣知州故也雄州言北界巡馬五百餘騎入兩屬地上曰北人漸似生事今河北一路兵器皆抏敝不可用加以將卒庸墮何以待敵王安石等曰若陛下少飭邉備顧亦不難今所籍民兵日加訓練自餘經制財用完繕城壘選擇將帥不過此數事而已上曰卿等密為經畫以聞上深以壬人為患王安石曰如太祖之嚴明而張延通陶穀丁德裕得肆其欺者其用譛因人事之形而伺知人主所疑故也戊戌武寧軍留後贈昭信軍節度使南康郡王宗立卒己亥詔諸軍班直都指揮使以下至副都頭等並令承旨司注籍遇非次遷補及事故令殿前馬步軍司關承旨司與轉員對注銷以偹轉員照用置軍器監總內外軍器之政其所統攝並依將作仍以吕惠卿曾孝寬為判監所置官屬令逐官奏舉軍器舊領於三司胄案三司事叢判案者又數易至是始案唐令置監而廢胄案焉先是上語輔臣河北兵械皆不可用王安石曰兵械非可以一朝一夕具須預具上乃議置監設官提舉翌日遂有是命新舊紀並書置軍器監八月十九日吕惠卿云云兵志國朝軍器舊領于三司胄案三司事叢判案者又數易僅能謹簿帳而已先是王雱嘗言曰漢宣帝號稱中興之賢主而史之所敘獨以為技巧工匠皆精于元成之時然則此雖冇司之事而上係于朝廷之政為政者所宜留意也方今外禦兩邉之患而內虞剽盜之變征伐擒捕之䇿未嘗不以為首務而至于戎器則獨不為之恤蓋今天下嵗課弓弩甲胄之類入充武庫之積以千萬數而無堅完輕利真可為武備者臣嘗觀于諸州將作院至有兵匠乏缺而拘市人以備役所作之器但形質既具則精窳之實一切無所問武庫吏亦惟計多寡之數以藏而未有責其實用者故所積雖多大抵敝惡不可復舉夫為政如此而猶用抗威決勝外攝鄰敵之強獷內沮姦凶之竊發臣愚未見其可也倘欲廢弛武備覿天下以無事則金木絲枲筋角膠漆竹羽之材一出于民力而無故聚工以毁之此可惜也臣私計其便莫若更制其法度斂數州之所作而聚以為一處若今錢監之比而每監擇知工事之臣使専于其職且募天下之良工散為匠師於諸監而朝廷亦當內置工官以總制其事然後察其精窳之實而重為賞罰則人人各求勝不飭而皆精矣或聞今武庫太祖時所為弓尚有弓絃如新者而近世所造往往不可用審如此則又有以見法禁之張弛也昔者垂為共工而歷代資其竹矢所以為至治此其一事也上頗採雱説六年始案唐令置軍器監總內外軍器之政置判及同判官各一員其屬有丞有主簿有勾當公事廢三司胄案以其事來𨽻凡産材州並置都作院天下知軍器利害者聽詣監陳述時吏民獻器械之法式者甚衆令三帥視實利便者乃製造又遣吏以利器詣諸路作院諭以為式第工為三等視其器之良窳而黜陟其官吏志所載大抵以神宗政事一切並歸之安石父子其諂甚矣今不取然雱言亦似有可采者姑附注于此是月廢荆門軍以長林當陽兩縣並𨽻江陵府建寧縣為鎮
