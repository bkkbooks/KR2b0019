body:
  text: 續資治通鑑長編卷三十一宋李燾撰太宗淳化元年春正月戊寅朔御朝元殿受册尊號曲赦京城繫囚改元己卯改乾明節為夀寕節丁亥建䖍州大庾縣為南安軍太保兼侍中趙普自去秋以病免朝謁止日赴中書視事有大政則召對及冬病益甚乃請告車駕屢幸其第省問賜予加等普遂稱疾篤三上表致政上不得已戊子以普為西京留守兼中書令庚寅命户部郎中柴成務兵部員外郎趙化成使髙麗左正言宋鎬右正言王世則使交州以加恩制書賜王治及黎桓也髙麗國俗信隂陽鬼神之事頗多拘忌每朝廷使至治必擇良月吉日方具禮受詔成務在館逾月乃貽治書責其牽於禁忌泥於小數眩惑日者之浮説稽緩天子之命書惟典册之垂文非巫祝之能曉書稱上日不推六甲之元辰禮載仲冬但取一陽之嘉㑹燦然古訓足以明稽所宜改圖速拜君賜治覽書慙懼㑹霖雨不止乃請俟晴霽成務復貽書開諭治即出拜命宋鎬等抵交州境黎桓遣衙内都指揮使丁承正等以船卒三百人至太平軍來迎由海口入大海冒渉風濤頗歴危險經半月至白藤涇入海汊乗潮而行凢宿泊之所皆有茅舍三間營葺尚新因為館驛至長州漸近本國桓張皇虚誕務為誇詫盡出舟師戰擢謂之耀軍自是宵征抵海岸至交州僅十五里有茅亭五間題曰柔征驛至城一百里驅部民畜産妄稱官牛數不滿千揚言千萬又廣率其民混於軍旅衣以雜色之衣乘舩鼓噪近城之山虚張白旗以為陳兵之象俄而擁從桓至展郊迎之禮桓歛馬側身問皇帝起居畢按轡偕行時以㯽榔相遺馬上食之此風俗待賔之厚意也城中無居民止有茅竹屋數十百區以為軍營而府署湫隘題其門曰明德門桓質陋而目眇自言近日與蠻寇接戰墜馬傷足受詔不拜信宿之後乃張筵飲宴又出臨海汊以為娱賔之逰桓跣足持竿入水摽魚得一魚左右皆叫噪歡躍凡有宴㑹預坐之人悉令觧帯冠以帽子桓多衣花纈及紅色之衣帽以真珠為飾或自歌以勸酒莫能曉其詞常令數十人扛大蛇長數丈饋於使館且曰若能食此當治之為饌以獻焉又覊送二虎以備縱觀皆却之不受卒三千人悉黥其額曰天子軍糧以禾穗月給令自舂為食其兵器止有弓木牌槍竹槍弱不可用桓輕脱殘忍昵比小人腹心閹竪五七輩錯立其側好狎飲以手令為樂凡官屬善其事者擢居親近左右有小過即殺之或鞭其背一百至二百賔佐小不如意亦箠之三十至五十黜為門吏怒息乃召復其位有木塔其制樸陋桓請同登逰覽乃相顧而言曰中朝有此塔否地無寒氣十一月猶衣夾衣揮扇鎬等明年六月歸闕上令條列山川形勢及桓事迹鎬等自叙云爾初殿中丞清豐晁逈通判鄂州坐失入囚死罪削三任有司以殿中丞右賛善大夫并上柱國通計之丙申詔自今免官者並以職事官不得以勲散試官之類舊制勲官自上柱國至武騎尉凡十二等五代以來初叙勲即授柱國於是詔京官幕職州縣官始武騎尉朝官始騎都尉歴階而升又詔古之勲爵悉有職奉以之䕃贖宜矣今之所授與散官等不得用以䕃贖二月己酉改大明殿為含光殿辛酉詔自今遊宴宣召館職其集賢秘閣校理等並令預㑹先是上宴射苑中三館學士悉預李宗諤任集賢校理閤門吏拒之不得入宗諤獻詩述其事故有是詔國家因唐制建昭文史館集賢院於禁中昭文集賢置大學士直學士史館置監修國史修撰直館昭文亦置直館集賢又有修撰校理之職名數雖異而職務畧同閤門拒校理不得預宴葢吏失之也夏四月上以寺監副貳品秩素髙舊制自郎吏遷授頗聞搢紳之流以臺閣自許目為散地欲振起之乙未以兵部郎中孔承恭為太常少卿魏羽為秘書少監户部郎中柴成務為光禄少卿魏庠為衛尉少卿張洎為太常少卿吕端為大理少卿臧丙為司農少卿袁廓為鴻臚少卿工部郎中張雍為太府少卿屯田郎中雷有終為少府少監虞部郎中索湘為将作少監有終德驤子也癸丑江州言德安縣民陳兢十四世同居老幼千二百餘口常苦食不足令嵗貸官米二千石甲寅詔尚書省四品兩省五品以上每二人共舉常参官一人充轉運使員外郎以上二人於京朝官内舉一人充知州通判自趙普罷吕䝉正以寛簡居相位辛仲甫從容其間政事多決於王沔沔聰察敏辯善敷奏有適時材用然性苛刻不以至誠待人羣官謁見必廿言以啗之皆喜過望既而進退非允人胥怨矣乙巳賜太子中允陳省華及其子光禄寺丞直史館堯叟五品服先是堯叟舉進士中甲科占謝詞氣明辨上問宰相此誰子吕䝉正等以省華對省華時為樓煩令即召見擢太子中允於是父子又同日而賜章服五月辛卯令刑部置詳覆官六員專閱天下所上案牘勿復遣鞫獄置御史臺推勘官二十人並以京朝官充若諸州有大獄則乘傳就鞫辭日上必臨遣諭㫖曰無滋蔓無留滯咸賜以装錢還必召見問以所推事状著為彞制凡滿三嵗考其殿最而黜陟之甲午詔致仕官有曽歴中外職任者給半奉以他物充國初錢文曰宋元通寳乙未又改鑄淳化元寳錢上親書其文作真草行三體自後每改元必更鑄以年號元寳為文六月丙午罷中元下元張燈太僕少卿張洎上䟽言邉防曰夫禦戎之道有三䇿焉前代聖賢論之詳矣繕修城壘依憑險阻訓戎聚穀分屯塞下來則備禦去則勿追䇿之上也偃革櫜弓卑辭厚禮降王姬而通其好輸國貨以結其心雖屈萬乘之尊暫息三邉之戍䇿之次也練兵選將長驅深入擁戈鋋而肆戰决勝負於一時䇿之下也國家自戎馬生郊邉防受敵兵連禍結屬載於兹邯鄲致蹂踐之虞上谷夾藩籬之固飛芻輓粟千里而遥丁壮斃於轉輸膏血塗於原野尚頼聖君宵旰廣運神謀自今夏以來方隅稍定餱糧以濟城邑粗安然而敵人之情變詐難測或慮朔風漸勁塞草具腓乘大漠之苦寒率窮邉之蠢類南下燕趙復恣憑陵則善敗之機未可量也况河朔之地杼柚其空邑里丘墟黎元蕩析倘後日之戰復有殺将覆軍之禍則趙魏鎮定疇能守之人心一搖天下事去矣國家素失薊北之險亡控守之處是上䇿不舉也屯兵平原與匈奴轉戰勞弊已甚勝負未定是下䇿不足恃也審覩天下之形勢憂患未巳唯與之通好或可觧紛今山東諸侯近不交戰訪聞匈奴已還其庭宜因此舉通和之䇿夫屈伸變化與道汚隆轉危就安聖人之務也昔高祖奮布衣起豐沛誅暴秦滅强椘不五七年平定天下出師朔野困於白登爰從説士之辭遂舉和親之䇿迨至文景乘先代之業開太平之基至道興行兆民胥悦海内田賦三十而税一太倉之米紅腐而不可食内府之錢貫朽而不可校巍巍功業與三代比崇及其火照甘泉軍屯細栁則飾宗室之女出聘單于夫以高帝之雄才文景之淳化豈力不足而德不至耶而與之通者盖視彼為不足較耳安肯耗竭中國為無用之舉傷害仁義致彼此爭鋒乎觀典䇿之遺文審安危之大計唯聖人能之結好息民正在今日儻或上天悔禍醜類懐仁奉大國之歡盟息邉城之烽燧誠宗社之福也夫盛衰之理有數存焉聖賢因之以定其業昔者隋季板蕩唐室勃興髙祖太宗肇升天位英衛房杜為佐命之雄頡利可汗遽犯京邑太宗躬枉車駕以敦其夙好廣輸財貨以厭其貪心嵗月若更強敵寖弱李靖數萬之衆擒而滅之此王者䝉垢候時殱强敵之明效也今契丹嬖臣擅軸牝鷄司晨單于幽閉權歸母后裕恱强大處於嫌疑部族之衆雖繁攻奪之形已兆草菅人命極惡窮凶以人事言之則嵗紀未周冒頓之謀必興於敵帳矣國家暫時降屈以濟艱屯而取亂侮亡其則何逺若契丹憑恃種落張皇侵暴逆天悖理不奉綏懐然聖人屈已濟物之誠已彰於天下矣秋七月丁酉以御製詩文四十一卷藏於秘閣八月癸卯朔秘書監李至與右僕射李昉吏部尚書宋琪左散騎常侍徐鉉及翰林學士諸曹侍郎給事諫議舍人等秘閣觀書上聞之遣使就賜宴大陳圖籍令縱觀翌日甲辰又詔權御史中丞王化基及三館學士並賜宴秘閣先是遣使詣諸道購募古書竒畫及先賢墨跡小則償以金帛大則授以官數嵗之間獻圖籍於闕下者不可勝計諸道購得者又數倍乃詔史館盡取天文占候䜟緯方術等書五千一十卷并内出古畫墨跡一百一十四軸悉令藏於秘閣圖籍之盛近代所未有也乙巳令左藏庫籍所掌金銀器皿之屬悉毁之有司言中有制作精巧者欲留以備進御上曰将焉用此汝以竒為貴我以儉為寳卒皆毁之左正言直史館謝泌賀曰聖意如是天下大幸上性節儉退朝常著華陽巾布褐紬絛内服惟絁絹咸屢經澣濯乘輿給用之物無所増益焉癸亥李至上䟽言晉宋以來皆有秘閣之號設於禁中唐室陵夷斯因流蕩陛下運獨見之明下維新之詔復建秘閣以藏竒書總羣經之博要資乙夜之觀覽斯實出於宸心非因臣下之建議也况睿藻宸翰盈溢縑帙其所崇重非復與羣司為比然自創置之後載經寒暑而官司所處未有定制望降明詔令與三館並列叙其先後著為永式其秘書省既無書籍元𨽻京百司請如舊制上可其奏列秘閣次於三館丁卯以起居舍人直史館吕祐之等分直昭文館太子中允和㠓直集賢院先是但有直史館於是始備三館之職㠓峴之弟也九月戊寅以鄉貢進士吕䝉叟為郾城縣主簿䝉荘楚丘縣主簿䝉巽沈丘縣主簿皆宰相䝉正諸弟從其請而命之初䝉正父龜圖多内寵與妻劉氏不睦并䝉正出之頗淪躓窘乏劉亦誓志不嫁及䝉正始仕乃迎二親同居異堂奉養並至云崇儀副使郭載言臣前任使劒南見川峽富人多招贅婿與所生子齒富人死即分其財故貧人多捨親而出贅甚傷風化而益爭訟望禁之詔從其請冬十月乙巳以同州觀察推官錢若水為秘書丞直史館若水文敏之子也初佐同州知州性褊急數以胷臆决事不當若水固爭不能得輒曰當賠俸贖銅耳已而奏案果為朝廷及上司所駁州官皆以贖論知州媿謝然終不改前後如此數矣有富民家小女奴逃亡不知所之女奴父母訟於州命録事叅軍鞫之録事甞貸錢於富民不獲乃劾富民父子數人共殺女奴棄尸水中遂失其尸或為元謀或從而加害罪皆應死富民不勝拷掠自誣服具獄上州官審覆無反異皆以為得實若水獨疑之留其獄數日不决録事詣若水㕔事詬之曰若受富民錢欲出其死罪耶若水笑謝曰今數人當死豈可不少留熟觀其獄詞耶留之且旬日知州屢促之不能得上下皆怪之若水一旦詣知州屏人言曰若水所以留其獄者宻使訪求女奴今得之矣知州驚曰安在若水因宻送女奴於知州乃垂簾引女奴父母問曰汝今見女識之乎對曰安有不識也即從簾中推出示之父母泣曰是也乃引富民父子悉破械縱之其人號泣不肯去曰微使君賜則某族滅矣知州曰推官之賜非我也其人趨謝若水若水閉門拒之曰知州自求得之我何與焉其人不得入繞垣而哭傾家貲以飯僧為若水祈福知州以若水雪寃死者數人欲為之論奏其功若水固辭曰若水求獄事正人不寃死其論功非本心也且朝廷若以此為若水功當置録事何地耶知州歎服曰如此尤不可及矣録事詣若水叩頭愧謝若水曰獄情難知偶有過失何謝也於是逺近翕然稱之上亦聞其名㑹樞宻直學士㓂凖薦若水文學髙第召試學士院面命以此官乙丑賜知白州蒋元振絹三十匹米五十石元振江東人清苦厲節親屬多貧不能膳養聞嶺南物賤因求其官寄家於潭州盡留俸禄供給元振啜菽飲水縫紙為衣頗以簡易為政民甚便之秩滿遷轉運使乞留凡七八年不得代采訪使言其状上嘉歎久之故有是賜丙寅又賜知鄆州須城縣姚益恭絹三十匹粟二十石益恭臨濟人初為興國軍判官以清幹聞召赴闕老幼千餘人遮道不得發至有涕泣者益恭逮夜開城門遁去其在須城鞭扑不用境内大治民數千人三遮轉運使乞留相率如浮屠宫飯僧以邀福願益恭未代采訪使言其状故有是賜初樞宻副使張齊賢微時䘮其父依河南府佐史張懐信乃克葬及貴常兄事之鄉里推其篤行趙普因是力薦之於是齊賢上言以懐信為兄詔授鄭州司馬上遣殿直張明至定州諭都部署李繼隆曰若敵復入冦朕當親討卿勿以為慮繼隆上奏曰建侯行師乃國家之舊制臨陣㤀死亦臣子之常規豈有身握重權坐食豐禄不念扞城而禦侮更煩清蹕以省方夙夜自思啓處無措伏自敵人肆孽邉邑多虞陛下不以臣治兵乏謀任以疆事臣敢不講求軍志震耀戎容奉揚天聲以遏外侮然臣奉辭之日曽瀝愚衷誠以蜂蟻之妖必就鯨鯢之戮臣子之分死生以之望不議於親廵庶靡勞於天歩今日遽聆聖誨将决龍行長驅組練之師徐按和鑾之馭宣威朔野問罪邉庭且一人既行百司景從千乘萬騎雷動風趨郡縣供饋以斯勤驛傳驅馳而甚遠况乃窮荒殘孽醜類㣲妖責在帥臣决期殄戮臣雖駑弱誓死為期仰望鴻慈特寝兹議是嵗契丹亦不敢大為邊患云十一月丁丑知安州侍御史李範上言故殿中通判州事金行成本髙麗人賔貢舉進士中第髙麗國王表乞放還行成自以筮仕中朝思有以報不願歸本國父母垂老在海外旦暮思念之恨禄養弗及命畵工繪其像置於正寢行成與妻更居旁室晨夕定省上食未甞少懈行成疾且革召臣及州官數人至其卧内泣且言曰外國人任中朝為五品官佐郡政被病且死無以報主恩瞑目於泉下亦有餘恨二子宗敏宗訥皆幼家素貧無他親可依行委溝壑矣行成既死其妻誓不嫁養二子織履以自給臣竊哀之詔以宗敏為太廟齋郎禮部即與收補俾安州月以錢三千米五石給其家長吏常嵗時存問無令失所十二月時羣臣升殿奏事者既可其奏皆得專達於有司頗容巧妄左正言直史館謝泌請自今凡政事送中書機事送樞宻院財貨送三司覆奏而後行辛酉詔從泌請遂著為定制中外所上書䟽亦如之大理寺丞王濟為刑部詳覆官屢上封事㑹遣使提總諸道茶鹽酒税且察訪民間利弊及吏治能否上顧問左右刑部有好言事者為誰左右以濟對上即授之既踰月改命通判鎮州牧守多勲舊武臣倨貴陵下濟未甞撓屈戍卒頗恣暴不法夜或焚民舍為盜一夕報有火濟部壯士數十潜往覘伺果得數輩并所盜物即斬之馳奏其事上大喜都校孫進使酒無頼毆折人齒濟不俟奏杖决送闕下軍府畏肅連三詔褒奨焉
