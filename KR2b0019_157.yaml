body:
  text: 續資治通鑑長編巻一百五十三宋李燾撰仁宗慶厯四年十一月戊午朔司天言日當食不食判國子監余靖言臣伏見先降勅命并貢舉條制國子監生徒聽學滿五百日方許取應每十人之中與觧三人其諸路州府軍監並各立學及置縣學本貫人並以入學聽習三百日舊得解人百日以上方許取應後來雖有勅命曾到省舉人與免聽讀内新人顯有事故給假並與勘㑹除破其如令非畫一難以久行竊以國家興學校所以奬育俊秀而訓導之由是廣學宫頒學田使其専心道義以思入官之術伏縁朝廷所賜莊園房錢等贍之有限而來者無窮若徧加廩給則支費不充若自營口腹則貧窶者衆日有定數不敢不來非其本心同於驅役古之勸學初不如此以為廣黌舍所以待有志之士去日限所以寛食貧之人國家存厲賢之風寒士得帯經之便欲乞應國子監太學生徒如有情願聽讀滿五百日即依先降勅命將來取解十人之中與解三人其不滿五百日者並依舊額取解應舉所有開封府及天下州軍建立州學處立取情願聽讀更不限以日數所貴寒士營生務學不失其所乃詔罷天下學生員聽讀日限已未録大名府五縣廵檢右侍禁彭仲舒子益為三班奉職以仲舒與賊鬬死也癸亥賜出箭頭僧方諫齋糧月錢四千諫鄜州人自陜西用兵以來凡中箭而留鏃在骨者飲之以藥而箭隨出嘗賜紫衣後召見欲與班行不就遂賜師號令居京師至是遣赴保州城下為軍士出箭鏃者二十一人故又賜之甲子監進奏院右班殿直劉巽大理評事集賢校理蘇舜欽並除名勒停工部員外郎直龍圖閣兼天章閣侍講史館檢討王洙落侍講檢討知濠州太常博士集賢校理刁約通判海州殿中丞集賢校理江休復監蔡州税殿中丞集賢校理王益柔監復州税並落校理太常博士周延雋為秘書丞太常丞集賢校理章岷通判江州著作郎直集賢院同修起居注呂溱知楚州殿中丞周延讓監宿州税校書郎館閣校勘宋敏求簽書集慶軍節度判官事將作監丞徐緩監汝州葉縣税先是杜衍范仲淹富弼等同執政多引用一時聞人欲更張庶事御史中丞王拱辰等不便其所為而舜欽仲淹所薦其妻又衍女也少年能文章議論稍侵權貴㑹進奏院祠神舜欽循前例用鬻故紙公錢召妓女開席㑹賔客拱辰亷得之諷其屬魚周詢劉元瑜等劾奏因欲動揺衍事下開封府治於是舜欽及巽俱坐自盗洙等與妓女雜坐而休復約延雋延讓又服慘未除益柔并以謗訕周孔坐之同時斥逐者多知名士世以為過薄而拱辰等方自喜曰吾一舉網盡矣王拱辰行狀云或作傲歌有醉卧北極遣帝扶周公孔子驅為奴盖益柔所作也延雋延讓皆起子獄事起樞宻副使韓琦言于上曰昨聞宦者操文符捕館職甚急衆聴紛駭舜欽等一醉飽之過止可付有司治之何至是陛下聖徳素仁厚獨自為是何也上悔見于色自仲淹等出使䜛者益深而益柔亦仲淹所薦拱辰既劾奏宋祁張方平又助之力言益柔作傲歌罪當誅盖欲因益柔以累仲淹也章得象無所可否賈昌朝隂主拱辰等議及輔臣進白琦獨言益柔少年狂語何足深治天下大事固不少近臣同國休戚置此不言而攻一王益柔此其意有所在不特為傲歌可見也上悟稍寛之時兩府合班奏事𤦺必盡言事雖屬中書𤦺亦對上陳其實同列尤不恱上獨識之曰韓𤦺性直據正史蘇舜欽𫝊御史不載劉元瑜姓名元瑜𫝊亦不云嘗奏舜欽獨魏泰雜記載一網打盡乃元瑜語今并出其姓名於魚周詢下然周詢七月為知雜九月為吏外十月為省副不屬御史臺矣當考宋祁張方平同劾奏王益柔此據韓𤦺家𫝊李清臣行狀但云近臣盖諱之也今仍出二人姓名魏泰云發舜欽等祠神㑹者太子中舍李定也梅堯臣為作一客不得食覆鼎傷衆賔詩按舜欽等坐責乃御史劾奏又當時但借此以傾杜衍爾李定無聞今不取乙丑降廣南東路刑獄都官員外郎徐仲謀知邵武軍坐部吏取京債事發而詐為月日發體量狀也張師正倦㳺録載仲謀獻秋霖賦忤賈昌朝陳執中故坐責且云皇祐中事誤也今不取丙寅審官院言三司判官開封府推判官天章閣侍講及館職當任提㸃刑獄各係清要資序請自今磨勘改官更不限舉主從之刑部郎中集賢校理彭乗京西轉運按察使太子中允直集賢院李絢並同修起居注乗前為䕫州路轉運使㑹土賊田忠覇誘下溪州蠻將内冦乗適按部至境大集邉吏勒兵山下以備賊賊遁去因遣人詢之其黨斬忠覇夷其家有詔褒美三年十月李肅為䕫憲已載田忠覇事當考呂溱既貶修起居注缺中書擬人而乗在選中帝指乗曰此老儒也雅有恬退名無以易之及召見諭曰卿先朝舊人乆補外而未嘗自言對曰臣生孤逺自量其分安敢過有所望帝益嘉之戊辰校書郎館閣校勘宋敏求落職與京師差遣敏求自言祖母年髙願落職以便養也己巳詔曰朕聞至治之世元凱共朝不為朋黨君明臣哲垂榮無極何徳之盛也朕昃食厲志庶幾古治而承平之弊澆競相䝉人務交㳺家為激訐更相附離以沽聲譽至或隂招賄賂陽託薦賢又按察將命者恣為苛刻搆織罪端奏鞫縱横以重多辟至於屬文之人類亡體要詆斥前聖放肆異言以訕上為能以行恠為美自今委中書門下御史臺采察以聞范仲淹上表乞罷政事知邠州詔不許知潞州尹洙上疏言臣聞知賢而不能任任之而不能終於治國之道其失一也去年朝廷擢歐陽修余靖蔡襄孫甫相次為諫官臣知數子之賢且久一旦樂其見用又慶陛下得賢而任之所慮者任之而不能終爾以陛下知臣之明修等被遇之深豈有任之而不能終哉盖聞唐魏元成既薨文皇親為撰碑文以賜之後有言其阿黨者遂覆其碑近世君臣相得未有如唐文皇與魏元成者間言一入則存歿之恩不終臣未嘗不感憤歎息而不能已也以是而論則知之任之為易終之實難可不慮哉屬聞歐陽修領使河北臣以邉事之重故不復以内外為疑今又聞蔡襄出知福州未審襄以親自請為以過斥若以過斥豈當進其官秩若以親請則襄在京師不三四年已再省其親士大夫去逺方而仕京師者孰不念其親豈獨襄得遂其私恩哉則襄之不當出明矣陛下優容諫臣在唐文皇上修等之才雖不愧古人然所施為未能少及於魏元成則間毁之言不必待歿而後發也伏惟念知之之已明任之之已果而終之之甚難則天下幸甚然臣愛修等之賢故惜其去朝廷而不盡其才如陛下待修等未易於初則臣有稱道賢者之美如其恩遇已移則負朋黨之責矣夫今世所謂朋黨甚易辨也陛下試以意所進用者姓名詢於左右曰某人為某人稱譽必有對者曰此至公之論異日其人或以事見踈又詢於左右曰某人為某人營救必有對者曰此朋黨之言昔之見用此一臣也今此見疎亦此一臣也其所稱譽與營救一也然或謂之公論或謂之朋黨是則公論之與朋黨常繫於上意不繫於忠邪御臣之大弊也臣既為陛下建忠謀豈復顧朋黨之責但懼名以朋黨則所陳之言不䝉見采此又臣之深慮也惟聖明裁察庚午詔主兵之官皆有牙隊帯器械以從䕶之其遇賊不用命而致陷沒主將者自今人雖衆並以軍法論茍能顯立功效亦當優㧞之其令諸路部署司申嚴飭戒韓𤦺嘗有此奏已前見詔如天禧故事置諫官六員此據㑹要辛未太常博士錢明逸為右正言諫院供職諫官余靖言臣伏覩南郊肆赦在近曠蕩之澤與民更始四方顒顒想望恩渥臣訪聞荆湖南路本因蠻賊出就民家居停其提㸃刑獄邵飾等盡令近山人戸不得耕種及燒拆屋宇起遣入城居住遂致近山人戸失業亡入賊中及楊畋將不曽作蠻賊人戸盡底驅逐散入廣南東西路失其巢穴又京西去嵗被賊人張海等虜掠驚擾臣今欲乞於南郊赦書中特示存撫應荆湖南北路人户先因脇從及投入賊中者限赦書到後一百日内經官司首身並令州縣勘㑹支與舊來田業其山猺人戸亦令安撫轉運提㸃刑獄等司方招誘如能効順並與放罪務令各歸舊住山林常加存恤應京西及荆湖北路去年經賊人驚擾縣分人户轉運司體量勘㑹與免一年科配其上項事節乞指揮中書樞宻院商量施行從之余靖議赦書條目不知何時赦書多從其言今附郊禮前己夘改上莊穆皇后謚曰章穆莊獻明肅皇太后曰章獻明肅莊懿皇太后曰章懿莊懐皇后曰章懐莊恵皇太后曰章恵前一日奉五后諡冊于文徳殿宿垂拱殿百官自正衙從至大慶殿發冊寳授太尉出殿門時雨雪連日帝露立褥位俟冊寳登車衮冕沾濕良久還幄所司導冊寳赴三廟各於南神門外幄次以竢奏告畢皆納於室王拱辰行狀云章獻章懿章恵既升祔王拱辰言孝章嘗正位號而祀别室非是亦請升配時不見用至元豐中卒如拱辰議庚辰朝饗景靈宮是日大霽辛巳饗太廟奉慈廟上始至版位禮儀使奉降神之樂九變請即小次帝曰朕竭誠在祀固無所勞入奉慈章懿室顔色悽愴左右莫不感動壬午合祭天地于圜丘始至壇下勅太常無得擅减樂聲大赦復西京河陽府所廢縣京西湖南北經賊剽劫處第蠲其租益梓路轉運使嵗市綾錦鹿胎萬二千特與减半保州舉人舊係南省下第者特免取解新取解者於舊額上增解二分陜西路解額狹處令貢院定分數以聞先是益州路轉運使袁抗言三司每嵗於兩蜀市綾錦鹿胎比嵗蜀民困甚願少寛其力以備秦中它日之急赦書盖從抗請也黎州嵗售蠻馬詔擇不任戰者郤之抗奏朝廷與蠻夷互市非以取利也今山前後五部落仰此為衣食一旦失望侵侮用幾馬直可平臣念蜀久安不敢奉詔卒如舊制是月諫官余靖言臣切聞湖南賊人首領黄四鄧和尚等各已歸降又聞郴州奏蠻賊千餘人打刼宜章縣放火殺掠者臣初以湖南州軍山險之處即是蠻獠譬如蜂蟻各有屯聚若得就巢穴安其棲息不生驚擾必不肆毒於人其間蠻人亦有不曽作過一例遭官軍就居處殺戮必然懐恨未肯歸降伏縁自古招撫山賊必先恩信如治亂繩緩乃可解今楊畋銳於殺伐蠻人必不相信臣累曽奏陳乞抽廻楊畋乃能令蠻賊盡類歸附未䝉朝廷指揮必是大臣曽與保任所以不肯移畋雖畋曽經邉任身耐勞苦與招撫蠻賊事體了不相同但移楊畋却與近邉差遣别以恩招撫蠻賊使其降附不可恐畋之怨而不憂賊之疑而不降也鄧大志黄文晟黄士元授官在十月癸丑當即是黄四鄧和尚也又言臣風聞廣南東路轉運司奏蠻賊於連韶州界打劫乞差使臣抽押江南兵級前去捉殺臣以為轉運使倉卒張皇無足憂者竊料此賊只因楊畋打破九疑山外蠻人巢穴奪其理生之具本非作過之人既失所居遂懐怨恨迸散為盗故先刼掠郴州宜章縣次入連韶州界初縁郴連等州山險闊逺秋多瘴癘朝廷益發甲兵徒生勞擾死亡之患賊人深入險阻不能得見不可更令廣東之民受此疲敝臣之愚計且以天下之大豈必與一小蠻獠校其勝負只乞朝廷抽廻楊畋并九疑山下兵甲却令前來歸降賊人入洞招諭蠻人以朝廷不恃殺伐降者更得恩賞使蠻之餘黨安其窟穴自然不出為盗矣又言臣初見去年以來荆湖南路蠻人及戎瀘州蠻相繼作過惟戎瀘州蠻朝廷遣官招撫即時安定而湖南路官軍殺伐稍多蠻人失其巢穴所以至今驚擾鄉縣延及别路况今湖南賦税已不上供不可更令廣南又因兵禍臣愚以為因南郊肆赦之後朝廷宣差親信臣僚乗驛徃彼宣𨗳恩信招擕降附兵馬可罷之處即令罷之昭示朝廷仁恩不尚殺伐之意使蠻人向信安其棲息不復為鄉縣之害廣東奏蠻賊㓂連韶州界實録全不載於四年據余靖奏議附此六年十二月實録乃書蠻㓂英韶州界是時靖責逾一年有半矣靖此奏因南郊肆赦之後遣使招諭此四年事也詔引進使四方館使並兼閤門事此據㑹要十二月壬辰加恩百官左千牛衛大將軍交州刺史宗敏縁郊恩請封所生母范氏許之宗室得封所生母盖自宗敏始宗敏信安郡王允寧子也宗敏封所生母不知何時因宗敏是年八月領交州刺史即附見今郊當考乙未冊命元昊為夏國主更名曩霄其冊文曰咨爾曩霄撫爰有衆保于右壤惟爾考服勤王事光啓乃邦洎爾承嗣率循舊物向以稱謂非正疆候有言鄙民未孚師兵勞戍而能追念前𤯝自歸本朝騰章累請遣使係道忠悃内奮誓言外昭要質天地暴情日月朕嘉爾自新故遣尚書祠部員外郎張子奭充冊禮使東頭供奉官閤門祗候張士元充副使持節冊命爾為夏國主永為宋藩輔光膺寵命可不謹歟仍賜御衣黄金帯銀鞍勒馬銀二萬兩絹二萬疋茶三萬斤冊以漆書竹簡凡二十四長尺一寸褾用天下樂暈錦賜金塗銀印方二寸一分文曰夏國主印龜鈕錦綬金塗銀牌長七寸五分闊一寸九分縁冊法物皆銀装金塗覆以紫繡約稱臣奉正朔改所賜勅書為詔而不名許自置官屬使至京就驛貿賣燕坐朶殿朝廷遣使至其國相見以賔客禮置𣙜場於保安軍及高平寨第不通青鹽然朝廷每遣使往館於宥州終不得至興靈焉遣使不至興靈當附初遣使時子奭既行尋有詔即所在止之候契丹使至别議富弼深言其不便曰若敵使未至而子奭先去則天下共知事由我出不待契丹許而後行也今若候敵使至别無難意而後方令子奭遂行則是自以講和之功歸於契丹直待得契丹許意方敢遣使封冊中國衰弱絶無振起之勢可為痛惜萬一敵使知我尚未封冊詞稍不順不可却拒元昊而曲就契丹如此則是朝廷不敢舉動坐受契丹制伏而又前後反覆大為元昊所薄矣此事余靖奉使時契丹已許封冊今但自恐怯更思變改臣實未曉也兼契丹西征大衂山前山後非常困敝必不敢止我此行伏惟朝廷據天下之大四方全盛若每事聴候契丹指揮方敢施為使陛下受此屈辱臣子何安臣忝預樞輔之列實為陛下羞之亦為陛下憂之伏乞斷自宸𠂻不候敵使到闕速令子奭行封冊之恩則天下幸甚弼奏云去年十二月中知子奭已進發近却有指揮縁路止住則此奏當是慶歴五年正月今因子奭行并書之丙申遣入内供奉官盧昭度等五人分往河北河東陜西撫徇官吏將校丁酉詔州縣以先帝所賜七條相誨敕己亥皇第八女賜名㓜悟號保慈崇祐大師其母張美人也癸卯吏部尚書知亳州夏竦為資政殿大學士甲辰龍圖閣直學士吏部員外郎知秦州文彦博為樞宻直學士知益州代蔣堂也初晏殊欲用堂代楊日嚴王舉正謂不如明鎬爭累日不得卒用堂㑹詔天下建學漢文翁石室在孔子廟中堂因廣其舍為學宫選属官以教諸生士人翕然稱之日嚴在蜀有能名堂不喜之於是節逰燕减厨𫝊専尚寛縱頗變日嚴之政又建銅壺閣其制宏敞而材不預具功既半乃伐喬木于蜀先主定陵江瀆祠又毁后土及劉禪祠蜀人寖不恱獄訟滋多久之反私官妓為清議所嗤日嚴時在朝因進對從容言逺方所宜撫安之無容變法以生事故不竢嵗滿亟徙堂知河中府徙知成徳軍龍圖閣直學士起居舍人田况知秦州内殿承制亓贇為莊宅副使内殿崇班胡元為禮賔副使以湖南轉運使周陵言贇元等在石硋洞捕殺蠻賊有勞也徐的𫝊云的再至桂陽降者甚衆其不降若鈐景石硋華隂水頭諸洞悉討平之斬其酋熊可清等王絲墓表又云石硋鈐景二洞聚黨數千絲促官軍力破之斬首數百級招安三千人今實録乃周陵奏二將有勞不知何也當考乙巳降知楚州職方員外郎胡楷通判秦州提㸃淮南刑獄祕書丞祖無擇知黄州初王素自淮南徙渭州移文楷攝轉運按察使事無擇既不平因與楷互訟事雖㑹赦猶降之監察御史劉元瑜劾奏大理寺丞集賢校理陸經前責監汝州酒轉運司差磨勘西京物杖死爭田寡婦李氏并貸民錢又數與僚友燕聚語言多輕肆監司繆薦其才權要主張遂復館職請重寘於法勿以赦論詔遣太常博士王翼往按其罪并以經前與進奏院祠神㑹坐之責授袁州别駕河東轉運使司封員外郎夏安期罰銅十斤太子中允直集賢院修起居注李絢知潤州並坐前為京西轉運使奏舉經復館職不當也宰相杜衍多㧞知名士置臺省惡衍者指絢為其黨而知河陽任布又言絢在京西苛察故遽令出守丙午左衛上將軍致仕楊崇勲為太子太保致仕知制誥張方平封還詞頭言崇勲罪大責輕以上將軍就第物議無不憤疾雖經沛宥而致仕非赦文所該東宫一品非崇勲所宜處訖不從戊申邈川首領轄戩遣使入貢實録於十一月辛未書秦鳳部署司言吐蕃澄州團練使轄戩等遣蕃僧貢名馬此月戊申又書邈川首領轄戩貢金二十兩又鐵甲一副馬百九十疋盖一事也實録誤分為二己酉詔吏部流内銓進納授官人舉縣令者湏及五考有所部升朝官三人同奏舉乃聼施行辛亥置保安軍及鎮戎軍安平寨𣙜場癸丑契丹國母遣右監門衛上將軍耶律褒寧州觀察使星齊契丹遣正義軍節度使蕭玖太常少卿史館修撰姚景禧来賀正旦太常博士王翼西京治獄還賜五品服知諫院余靖言治獄而賜服外人不知必以謂翼深文重法能希陛下意以取此寵所損非細事也嘗有工部郎中呂寛以治獄賜對祈易章綬陛下諭之曰朕不欲因鞫囚與人恩澤寛退以告臣臣嘗書之起居注陛下前日諭寛是則今日賜翼非與奪之間貴乎一體小人望風希進無所不至幸陛下每於事端抑其奔競請自今臣僚入對有輙求恩澤者令有司劾其罪從之甲寅太常博士茹孝標責監光州鹽酒税時上封者言去嵗諫官劾孝標不發父䘮推勘蹤跡不甚明白遂降指揮候服闋日未得與差遣臣以為凡人被不孝之名而出入朝序未得差遣豈能黙黙以受媿恥必有詞訴上煩朝聴孝標乞早與一外任差遣故有是命此據㑹要乃十二月二十七日事實録無之乙夘徙知鎮戎軍供備庫使劉兼濟權環慶路鈐轄陜西轉運使言其軍政苛急而下多怨故徙之兼濟舊𫝊及新𫝊但云轉運使言其苛急實録乃云都轉運使李昭述按昭述五年十一月初除宻直都轉運使此時昭述猶知澶州實録誤也今止從兼濟二傳而不出轉運使姓名又是年五月戊辰兼濟自鄜州改梓䕫路鈐轄不書知鎮戎軍此月乙夘乃自鎮戎軍徙環慶明年閏五月丁亥又書徙梓䕫鈐轄劉兼濟為環慶鈐轄據本𫝊自鄜州徙梓䕫又徙鎮戎軍與實録合自鎮戎改涇原鈐轄復知寧州又知原州即與實録差互恐兼濟未嘗到梓䕫自鄜州即往鎮戎自鎮戎即往環慶實録明年閏月丁亥所書或誤出也今削去更湏考詳環原之間屬羌有敏珠爾宻桑康弩三族最大素號强梗撫之則驕不可制伐之則險不可入其北有二川交通西界宣撫使范仲淹議築古細腰城斷其路於是檄知環州种世衡與知原州蔣偕共幹其事世衡時卧病即日起兵㑹偕于細腰使甲士晝夜築城先遣人以計欵敵敵果不爭又召三族酋長犒之諭以官築此城為汝禦㓂三族既出不意又無敵援因遂服從城成而世衡卒世衡在邉數年積榖通貨所至不煩縣官益兵增饋善撫士卒病者遣一子専視其飲食湯劑以故得人死力及卒羌酋朝夕臨者數日青澗及環人皆畫象祠之慶歴二年三月涇原請於細腰城屬羌城内建築城寨雖許之元不曽興役十月范仲淹又請城細腰亦不曽興役及今乃克城之世衡以明年正月七日卒今附見范仲淹復檄蔣偕築堡大蟲巉堡未完而為敏珠爾宻桑伺間邀擊偕輙從間道遁歸伏經略使庭下請死王素將赦其罪令復往畢功以自贖狄青曰偕輕而無謀往必更敗素曰偕死則部署行矣狄青乃不敢言偕卒完所築堡致其酋長而還始敏珠爾等族數為㓂偕潜兵伺之斬首四百擒酋豪三十九焚帳落八十獲馬牛三千所俘皆刳割磔裂于庭下坐客為廢飲食而偕笑談自若富弼言伏以河北一路盖天下之根本也古者未失燕薊之地有松亭闗古北口居庸闗為中原險要以隔閡匈奴不敢南下而歴代帝王尚皆極意防守未嘗輕視自晉祖棄全燕之地北方闗險盡屬契丹契丹之來蕩然無阻况又河朔士卒精悍與他道不類得其心則可以為用失其心則大可以為患安得不留意於此而反輕視哉臣昨奉詔宣撫自渡河而北遍詢土人熟知祖宗以來邉防事機者觀其所説皆有條理謂太祖太宗之時契丹入㓂邉兵或有䘮敗而不能長驅真宗初時邉兵亦少失而有長驅之患者何哉盖太祖太宗時屢曽出師深入攻討及㓂至又督諸將發兵禦戰敵騎雖勝知我相繼開壁援兵四至無退藏之懼是以怱怱出塞不敢長驅也洎真宗即位懲䘮師之衂遂下詔邉臣㓂至但令堅壁清野不許出兵繼不得已出兵只許披城布陣又臨陣不許相殺賊知我不敢出戰於是堅壁之下不顧而過一犯大名一犯澶淵是故雖無䘮師之失而有長驅之患真宗再駕河朔幸而講和不然事未可知也臣嘗為史官竊覧國史以土人之説參驗之大略相合既得祖宗朝守禦利害又伏思今來事體不及祖宗朝其事有七朝廷號令不一前後自相牴牾事有緩急四方不能遵行北敵茍動必有闕悞此號令不及先朝嚴明一也自西鄙用兵于今七年大小凡經十餘戰而每戰必敗官軍沮䘮望風畏怯北敵之衆又非西賊可比茍有變動何由以威武取勝此威令不及先朝震赫二也兩府大臣不敢生事設有所主斷然而行則横議羣興惑亂聖聴以此往往破壊暫行復止是致朝政不舉北敵茍動事繫安危誰敢為朝廷主張行事此執政者不及先朝大臣主斷三也天下民人恩信不及配率重大攘肌及骨悲愁怨恨莫不思亂近年凡有盗賊應者如雲足見人心多叛北敵茍動大兵四集百姓必有觀釁而起者自憂内患不暇豈暇防外虞哉此民心不及先朝固結四也朝廷費用浩瀚財物殫竭取於民則民力已困取於内帑則内帑有限今河北諸州軍惟糧儲稍有凖備外其餘庫藏無不虛空北敵茍動所費無涯今未有財用所出之計此財用不及先朝豐足五也外有彊敵竊圖中國或攻或守須得健將今河朔止有一二人可充偏禆五七人可以陣中役使北敵茍動大兵畢集都未有將帥統領此將帥不及先朝有謀勇而經戰陣六也軍政隳弛士卒驕惰居常少有鈐束不過笞箠已謀殺害都將相結逃背若急有調發使當矢石則豈無變亂與外㓂勢合為孽昨保塞事起滄州兵欲刼瀛州莫州兵欲刼順安軍自餘至城下者無不白日刼人殊無畏憚其事甚近可以為騐士卒不及先朝肅整七也上件七事盡臣目覩耳聞不敢緘黙恐悞邉防大計伏望陛下特留聖念以先朝已試之效而革今日因循之弊奮自宸斷以為久長之䇿不勝大幸冨弼上章不得其時今附見年末
