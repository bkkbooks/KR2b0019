body:
  text: 續資治通鑑長編巻三百二十宋李燾撰神宗元豐四年十一月辛丑詔林廣累奏進兵次第極為遲緩今已深冬若更渉春天氣漸暖烟瘴霖雨轉難窮討巢穴或遷延未了即兩川不免騷擾令林廣宜速進兵時廣留屯落个綱凡七日矣沙取率衆來降後五日乃發瓊管司言已罷海南經制事如有生黎歸附乞量支官錢買物犒設詔以劉誼奏請招懐經制朝㫖盡録送知桂州張頡如實有生黎歸嚮可相度施行訖奏其所用犒設賞賜之物即以經撫庫錢物應副頡知桂州在三年閏九月二十一日詔熙河路都大經制司軍馬出界暴露日久今雖駐涇原近邊亦慮無以休息可令李憲等計㑹盧秉分遣於近便有糧草州軍城寨歇泊指揮將佐存恤安養士氣如靈州未下纔候夫糧有備速進兵往協力攻取若靈州已㧞依已降指揮據所分地清蕩賊境并下盧秉如軍士单露寒凍即擘畫應副照管李浩言蘭州節次招到西使監軍司管轄順夏國西蕃音摩古勒額勒錦星羅舒克等四部族大首領蕃鈐轄約蘇等二百三十餘户二千餘口尋犒設等第支給例物各令歸族内有㑹州人户權給官地住坐己申熙河路都大經制司乞等第與補職各詔送熙河路都大經制司京西路轉運司言準朝㫖於均鄧州共發夫三萬每五百人差官一員部押赴鄜延路饋運計用官六十員本路闕官乞於起夫縣各差令佐及鄰州縣不依常制共差二十員餘四十員乞自朝廷差官詔均鄧州所部夫三萬自離家日及本路程頓並依前降指揮日支錢米外令轉運司計自入陜西界至延州程數日支米錢三十柴菜錢十並先併給是日環慶涇原兵去靈州初髙遵裕攻圍靈州十有八日不能下糧道且絶賊决七級渠以灌我師水至遵裕斷砲為梁以濟劉昌祚殿手劔坐水上待師畢濟然後行賊騎追襲轉戰累日至韋州士爭入寨無復隊伍賊乘之我師潰死者甚衆先是有詔輙班師者族城久不下涇原鈐轄种診獨與遵裕書言頓兵攻堅兵法所忌而食且盡吾營布列稻塍若賊决河水灌之吾其魚矣請歸屯清逺通糧道以聼命遵裕以示衆無敢應者遵裕乃謂診曰聼公言活兩路生靈得罪死無所恨遂班師此據范育所作种診墓誌及明年六月五日實録十二月三日盧秉奏又五日遵裕及轉運司奏新紀于辛丑日書師還或是因此也舊紀書遵裕班師在丙午日癸卯詔太中大夫待制以上帶修撰者並罷又詔諸省曹寺監元額以職事繁簡及資序髙下互除尚書侍郎奏事郎官一員同上殿大理寺左聼已畫㫖公案批送門下省罷宣徽使見任宣徽使依舊自今更不除人沈括言順寧寨等處申种諤下漢蕃軍馬四散各逐城寨不敢邀截詰問又言卒楊成言种諤至夏州索家平三軍無食皆號泣不行已失三萬餘人即未敢擅招安詔沈括所奏事體皆邊防機速頃刻不可遲緩若帥臣不任為已責隨宜措置乃須俟中禀則利害之間失之多矣其速如朝廷已降指揮外隨宜措置早令定貼仍酌度人情如尚可因而鼓奬為用即聼令斬捕境上剽盗羌賊贖罪請糧歇泊餘非朝㫖所該者但以便宜隨機處之勿一一中覆也索家平當即是麻家平也今兩存之又鄜延路言种諤軍前士卒奔潰入寨未知行營所在今度种諤事勢必未能深入詔种諤速引軍並塞於便處權安泊候士氣稍寛糧餽有備即依甲申詔施行甲申十一月二日續詔沈括今月壬寅得卿丁酉奏以軍前士卒逃潰散在本路縁理出不得已須當急切招安卿可速具朝㫖出牓云聞戰士止是不禁饑寒逃歸其家可各隨所在城寨權送納器甲請給糧食仍卿一面令城寨安撫速依牓受納給十日糧聼歸所屬節次具招撫數以聞又詔沈括招撫逃潰軍事毋得關報軍前詳定禮文所言古者宗廟九獻王及后各四諸臣一自漢以來為三獻后無入廟之事相循至今若時享則有事于室而無事于堂禘祫則有事于堂而無事于室室中神位不在奥堂上神位不在扆有饋食而無朝踐此古今之制所以不同也然古禮有不必復者事尸與王后入廟是也有須復而後禮意備者祼將于室朝踐于堂饋食于室是也盖獻之屬重于祼而朝踐薦腥所以貴本而備上古之食以神道事之也饋食薦熟所以親用而備後世之食以人道事之也三者交神之大節必須人主親之遂撰定可行典禮以聞且言此所謂度今之宜而備古九獻之意室事與堂事本末兼舉僖祖以下八廟之祭可一日而畢又言臣等勒禮直官大樂令同行試習并勒司天監刻漏官記其時刻凡一廟纔占二刻其合有皇帝入次食息百官齋班等更破二刻即八廟行禮四時可畢舊儀以丑時行禮即至辰時末禮畢詔送禮院候廟制成日取㫖禮文四年十一月二十二日送禮院今附本月日元年九月己丑初詔詳定可行典禮朱本云云合參考并修又言㸔詳南郊前一日朝饗太廟又四孟臘饗皆設神位于室户之内向則以籩十有二陳于其左豆十有二陳于其右牙盤陳于其前鉶三在牙盤之南㽅三其一在鉶南其一在籩左其一在户外之左爼三其二在籩南其一在豆南簠簋四在三爼之間彝尊及罍則陳廟堂上前楹間各于室户外之左北向西上觀其左右前後之序皆後世率意為之不與禮合臣等謹推特牲少牢禮而約以周天子之制别圖上二本所有室中堂上筵几及豆鉶爼簋籩㽅之列伏請據古考正所實之物雖已具别録然恐在今有不可備者乞以時物品類相近代之若大祫羣廟之主㑹於祖廟則籩豆爼簋至多恐室中不足以容乞量減其數移之户外詔送禮院候廟成日取㫖四年十一月二十一日又言臣等聞歌者在上匏竹在下貴人聲也匏竹在前鐘鼓在後貴人氣也書曰搏拊琴瑟以詠此堂上之樂又曰下管鼗鼓合止柷敔笙鏞以間此堂下之樂堂上之樂以象朝廷之治堂下之樂以象萬物之治後世有司失其𫝊歌者在堂兼設鐘磬宫架在庭兼設琴瑟堂下匏竹寘之于床並非其序矣伏請每遇親祠宗廟歌者在堂更不兼設鐘磬宫架在庭更不兼設琴瑟堂下匏竹更不寘之于床其郊壇上下之樂亦乞依此正之有司攝事凖此元豐四年十一月二十一日中書劄子奉聖㫖依奏又言臣等謹按周禮小胥之職曰王宫縣諸侯軒縣卿大夫判縣士特縣説者曰宫縣四面軒縣三面判縣二面特縣一面又曰凡縣鐘磬半為堵全為肆説者曰鐘一虡磬一虡謂之肆諸侯之卿大夫西一虡鐘東一虡磬士磬一虡而已又按儀禮大射儀曰笙磬西面其南笙鐘其南鎛皆南陳頌磬東面其南鐘其南鎛一建鼓在西階之東南面説者曰此諸侯之制也諸侯西面一磬一鐘一鎛則三面鐘磬鎛九而已諸侯鐘磬鎛九則天子鐘磬鎛十二虡為宫縣明矣故或以為配十二辰或以為配十二次則亦無過十二虡也自先王之制廢學者不能考其數至有謂宫縣當二十虡甚者又以為三十六虡此隋唐以來論不一也方唐之盛日有司攝事樂並用宫縣至徳後太常聲音之工散亡凡郊廟有登歌而無宫架後世因仍不改所有郊廟有司攝事樂伏請改用宫架十二虡元豐四年十月二十一日中書劄子奉聖㫖依奏又言臣等㸔詳天地之徳至大故主用文舞以祀周禮曰舞雲門以祀天神舞咸池以祭地示又曰雲門之舞冬日至于地上之圓丘奏之咸池之舞夏日至於澤中之方丘奏之雲門則黄帝樂咸池則堯樂皆所謂文舞也於天地之徳用此以求稱近世南北郊樂舞兼用武舞即記所謂干戚之舞非備樂也既非古制又不足以稱天地之徳伏請南北郊樂舞純用羽籥庶合禮意已具奏聞訖禮文無月日今附十一月二十一日甲辰詔増减官吏並門下中書省同取㫖樞宻院置知院同知院餘悉罷於是大改官制議者欲廢樞宻院歸兵部上曰祖宗不以兵柄歸有司故専命官統之互相維制何可廢也上又以樞宻聯職輔弼非出使之官乃定置知院同知院二人時有知院事孫固同知院事吕公著韓縝凡三員或曰上欲以禮退公著自是踰五月公著始請補外云此據職官志志稱五年誤也定宻院兩員之制恐非事實欲以禮退公著必史官誣詞公著明年四月丁丑罷自緣議論不合耳孫固以元年閏正月壬辰除同知吕公著以元年九月乙酉與薛向並除同知三年九月癸未三人並改樞副丙戌向罷四年正月辛亥固改知院公著同知韓縝初除同知志云定置知院同知院二人時有知院事孫固同知院事吕公著韓縝凡三員官制既行上欲以禮退公著逡廵數月公著始請補外乃以資政殿學士知定州按志所稱定置知院同知院二人與四年十一月二十二日甲辰實録所書樞宻院置知院同知院餘悉罷盖不同實録初不限員疑志或有差誤當是置知院一人同知院二人而志偶脱一人字故于公著遂加誣辭不然作志者將以此譏公著也今畧刪潤其辭更須考詳又詔提舉江西廣東鹽事司寋周輔已差充河北都轉運使更不差提舉鹽事官令廣南東路轉運判官程之邵江南西路轉運司提舉鹽事司官及合屬處依已降條約悉力奉行毋得有虧嵗課詔李憲亟旋師本路安養士氣品第功狀以聞應行營漢蕃將士作畨次厚與犒設仍大開恩信廣務招徠新土生羌及宻定置戍之所計度版築之具以俟春暖興作朱本云又詔憲朝廷比聞塞外寒甚士卒手足瘒瘃故頒降圖畫俾諸道各依分地清蕩河南東西魚貫南北相望修復故城列置戍壘處分甚明但俟靈州収復則諸道自當遵奉爾之今畫適契已頒之命甚善又詔乃朱本増入新本削去考按朱本乃似專助憲者其削去固當乙巳西京左藏庫副使鄧繼宣言差提舉編排環慶路馬急脚鋪等竊見韋州至清逺軍駐劄將官潘定劉清日逐搜山道路通活别無阻節其南州至韋州駐劄將官劉僅樂進雖差下未至即今靈州至韋州向上糧道阻節不通乞差近上臣僚多發禁軍自新界柴稜溝每十里置一鋪及剏堡寨以便運糧轉送文書詔令胡宗囬詳繼宣所奏展轉移牒指揮劉僅等速赴所分地廵綽通道令宗囬具析見權本路帥領兼職在饋運道路梗澀並不措置因依以聞詔令彭孫候褁送夫糧至軍前却帶所領軍馬於靈州及鎮戎軍熙寧寨以來見有西賊藏伏抄刦往來道路不通處廵綽照管摺運夫糧及轉送文字如將來糧道通活朝廷推賞不在攻城破賊之下仍一聼盧秉節制環慶涇原兩路兵既發靈州賊追襲之是日劉昌祚等於隘口遇賊髙遵裕遣六宅使俞辛等領兵應援辛及使臣任誠等三人戰没此據十二月九日環慶行營奏今移入此丙午詔令劉昌祚等如軍前兵可輟即益彭孫部下俾及五千則上下經畧搜踏羌冦必不敢存跡俟已施行得報以聞又詔盧秉聞本路昨差䕶送夫糧赴軍前彭孫一行為賊逐散未知虛實速考實以聞又詔秉聞劉昌祚等行營之後賊馬屯聚甚盛轉餉丁夫數遭窘辱爾後卿宜詳酌遣之詔據种諤奏已移軍並塞兵馬暴露日久宜令种諤部領還本路安養士氣繕治器甲葺補衣裝俟稍近春暖再出討其本路土兵各歸元駐劄州軍城寨蕃兵并漢蕃弓箭兵分擘於近裏有糧草州軍屯泊其運糧夫皆放散种諤下將佐隨軍歇泊詔沈括本路行營之師自出境以來逢賊大小戰鬭未嘗傷沮迄今保全南歸並塞其士卒適當凝寒之際加之常抱饑餒其於勤勞忠藎可嘉甚矣若不俾遂休息以待將來之用則氣力必須衰墮傷其壮勇之心况今邊事未有期程縁邊要地芻粟宜乘時豫有愛惜卿等疾速將諸將軍馬節次分屯内元係縁邊者即量留防守其餘移置永平已下州寨非𦂳切擬用去處就食仍候使人到犒設撫諭支賜訖寛與日數歇泊已差勾當御藥院劉惟簡往來本路𫝊宣撫問出塞還將士已下並賜銀合茶藥犒設支賜卿可責委轉運司官編排錢綢絹各六七萬貫匹已上凖備喝賜先是有詔軍士疾病先還者不賜惟簡至慶州䟽言士卒去父母妻子入萬死一生之地不幸將臣違聖畧失綏撫糧食不繼逃生以歸其情可貸今同立廷中觀彼受賜而已不預小人無知倉卒之際恐未易制上嘉其言即聼均賜二十五日乃遣惟簡八月十二日沈括擅賞鎮兵當考詔環慶涇原之師見攻靈州未破賊兵繞出大軍之背扼絶糧道本路别無援兵即今道路隔絶不可不慮令王中正將所部兵馬除已過河更不追還於延州簡不隨种諤出界兵及并河東兵共三萬人已上速自環州洪徳寨入至韋州以北如道路通快賊兵敗走靈州已有可破之勢即換在彼久役兵員回或糧餽闕乏即應援兩路之師迤邐退歸務在持重仍速報軍前其中正所領俟出界前一日賜特支錢權熈河蘭㑹經畧副使李浩言蘭州及西使城界連接熙河通逺軍新復多荒閑地已依朝㫖招弓箭手竊慮應猝難得數足乞權許人開耕候招弓箭手却支撥所貴得廣芻粟以實塞下詔熙河路都大經制司相度施行詔髙遵裕環慶鄜延大兵久頓靈州城下糧道艱阻令髙遵裕如已収復靈州即分遣將兵開通道路猝未可破即同涇原兵夫從環州路迤邐移寨並邊别議措置回師之際務在部分嚴整其左右賊馬湏痛殺戮已令王中正部領大軍應接更在審度機便施行舊紀于丙午日書詔髙遵裕班師盖因此詔也丁未寳文閣待制何正臣言伏見朝廷比以逺官迎送之勞特於八路立法差注計之八路蜀為最逺仕於其鄉者比他路為最衆今自郡守而下皆得就差而一郡之中土人居其大半寮屬既同鄉里吏民又其所親難於徇公易以合黨乞収守令員闕歸於朝廷而他官可以兼用土人者亦宜量限分數庶幾經久不為弊法兼聞本路差注往往未至盡公盖縁地逺朝廷不能徧察而審官吏部所見不過具文而已仍乞八路凡有員闕及遇指射皆使提㸃刑獄司通知如有情弊亦許取索㸃檢聞奏詔八路差官自今委提㸃刑獄司逐季取索㸃檢如有違法具以聞仍申中書本房立法中書言八路差官已許他司覺察不湏别更立法今欲申明行下從之鄜延走馬承受楊元孫言近轉運司部夫往安定黑水堡摺運軍糧未至所運亦不多雖頗得蕃部窖粟又數不至廣致士卒有饑餓逃亡大兵至西界白鹽池去懐州止百餘里种諤凖詔已領兵回恐近邊屯聚人馬轉運司供軍糧依前有闕上批鄜延路轉運使李稷應副軍糧闕乏乖方及累奏誕妄致令行營士卒乏食逃潰若不差人代領其職付吏正治其罪則有誤國事不細可令中書樞宻院同議其事詔李稷降兩官為轉運判官今悉心職事如更闕誤當依九月戊申詔施行宣徳郎張亞之本稷奏舉今幹辦無效可罷轉運判官令赴舊任亞之部夫尤酷令軍士殺夫軍士不忍殺至誘蕃兵殺之以奉議郎王欽臣為鄜延路轉運副使朱本簽貼云誘蕃兵殺先無照據兼李稷本𫝊已書訖刪去今復存之趙起作种太尉𫝊云諤以十一月十三日至白池凖詔班師當考种諤言米脂川敗西賊有功人總兵官走馬承受各一員機宜官七員軍主簿等十人獲級諸軍漢蕃弓箭手等四千餘人乞推賞勅學士院降詔賜諤銀絹各二千匹兩其功賞候事畢推行楊元孫轉兩官依舊寄資穆衍等七員各遷一官選人依條比附施行汲光徐勲賜章服軍主簿并獲級諸軍等依格酬奬遣勾當御藥院劉惟簡往延州賜行營回經畧副使以下茶藥𫝊宣撫問漢蕃將士及等第支賜禁軍都指揮使錢七千絹七匹都虞候以下有差其下軍卒亦賜絹或綢一匹遣劉惟簡已見二十四日戊申詔令鄜延環慶路轉運司速指揮轄下經由州縣糧草支費什器頓舍務令畢備毋得張皇騷擾詔自今堂選堂占悉罷以勞得堂除者減磨勘一年選人不依名次路分占射差遣又詔中書樞宻院吏止分𨽻三省毋撥入六曹如有剩數並額外存留轉補請受及諸恩例並如故鄜延路經畧司言鈐轄曲珍申蕃敢勇効用自來立功朝廷酬奬止于族下軍員安排竊縁蕃敢勇効用多是西界投來彊梁有名目之人一日立効却補元族下軍員又無田産非其所願乞自今蕃敢勇効用如立邊功一依漢敢勇効用節次推恩至班行所貴人人激勸詔止依蕃敢勇効用資級遷轉詔環慶涇原兩路行營兵頓靈州城下未見攻破次第道路阻絶糧饋不通兼李憲奏彭孫所部兵夫曽為西賊抄刼日近並不得兩軍音問事體至急又李憲累奏欲歸熙河路照管邊面今兵駐石門子歇泊多日郭茂恂糧草已至本處令李憲量帶三五百人騎取近便城寨徑歸本路就已放歸及本路兵馬照管撫定所分地令苖授速領見在行營將佐兵馬褁䕶夫糧通道趨靈州與髙遵裕併力收復如髙遵裕相度班師即應接取便路前來一行人兵于起發前就差本路走馬承受樂士宣賜錢絹等並依劉惟簡往延州賜行營回軍錢絹等例今涇原路轉運司速應副趙濟張大寧各部押本路夫糧隨軍前往秦鳯路經畧司言秦州通判鄭民瞻等至甘谷城招降西界偽鈐轄諾爾鼐佐并首領等共二百五十三人己酉詔聞自軍興以來關内民頗有偏弊之處人情震懼多全室逃亡縁今朝㫖其已經差夫之户更不差發慮未有大吏究宣恩詔致此惶駭不安其令李承之速往陜西諸路安撫告諭民苦於調發而非軍興所急者悉蠲之詔李憲如熙河所分地有須身措置事不可以委將佐等即總率苖授以下兵將速往兼昨日髙遵裕奏今併力攻靈州一面分兵接戰雖西賊援兵屢戰官軍屢勝止是大軍之後賊屯未解糧運未快所以須假諸路兵力照援宜令李憲等知悉中書言録事孟述古編排諸房文字得英宗藩邸轉官文字六件詔送天章閣侍御史知雜事滿中行言兩省䑓官文武百官日赴文徳殿東西相向對立宰臣一員押班聞𫝊不坐則再拜而退謂之常朝遇休假併三日以上應内殿起居官畢集謂之横行自宰臣親王以下應見謝辭者皆先赴文徳殿謂之過正衙然在京釐務之官例以别敇免參宰臣押班近年已罷而武班諸衛本朝又不常置故今之赴常朝者獨御史䑓官與審官待次階官而已今垂拱内殿宰臣以下既已日參而文徳常朝仍復不廢舛謬倒置莫此為甚至於横行參假與夫見謝辭官先過正衙雖沿唐之故事然必俟天子御殿之日行之可也有司失于申請未能釐正欲望特降指揮先次罷去下詳定官制所本所言今天子日聼政於垂拱以接政官及内朝之臣而更于别殿宣敇不坐實為因習之誤兼有職官升朝官五日一赴起居而未有職事者反日參踈數之節尤為未當又辭見謝自己入見天子則前殿正衙對拜自為虛文其連遇朝假則百官自赴大起居不當復有横行參假中行乞罷常朝及正衙横行為是從之權發遣廣南西路提㸃刑獄彭次雲言朱崖昌化萬安軍僻在海島元屬生黎未嘗開通竊慮瓊州知州通判已往逐軍廵按臣若再往㸃檢或致黎蠻驚疑乞候至瓊州計㑹知州通判分往㸃檢并海北州已廵歴外有六州未到及合按閲融桂州諸縣保丁乞依例差官㸃檢詔昌化朱崖萬安軍如道路艱阻委難廵歴即依所奏若可以親往依近降指揮林廣進軍特容壩落始兠蠻相率據隘距我軍是日廣分遣諸將腹背攻之斬三千餘級得王宣王謹言陷賊時印賊大震恐呼漢兵為生鬼從天而降自是所向莫敢當者遂進軍阿徐池十二月一日癸丑乃次阿徐池今并書庚戌上批將來陜西路建置城壘合用之物甚多其有從京師及他路應副者宜令逐路轉運經畧司速具名數以聞詔沈括聞賊㑹十二監軍司兵萃於靈武内外拒捍官軍縁慶渭之軍暴露日久人饑力疲湏得外來生兵為助殺逐救援賊馬通活糧道未論攻城利害且全兩路之師整陣南歸已為上計今种諤已囬軍並塞分諸將於保安軍及管下城寨歇泊朝廷已專遣使臣厚賜賞賚必可鼓奮士氣旋便思用宜速諭諤來徳靖駐劄䟎移諸將並赴西路休息飽給飯食候使人至犒設訖接續舉軍西去環州洪徳路應接兩道大軍并力殺逐見屯賊馬辛亥置延州塞門浮屠二寨是月廢編修院入史館此據元祐五年十月十三日尚書省言
