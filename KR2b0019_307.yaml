body:
  text: 續資治通鑑長編卷三百三宋李燾撰神宗元豐三年三月乙丑工部侍郎平章事監修國史吳充罷為吏部尚書觀文殿大學士西太一宫使仍大朝會許綴中書門下班依知大藩例支添給充為相務安靜不遣使不滋長法令所言於上人無知者先是上怒安南師出無功言者又因周沃謝表謂充與郭逵書止其進兵乃置獄劾逵事人皆為充懼然充書但勸逵以經久省便非止其進兵也充既數為同列所危素病瘤積憂畏疾益侵慈聖光獻太后崩不能入臨力辭位不許章七上遂輿疾歸第上始聽充罷要録云充嘗乞召還司馬光吕公著韓維蘇頌又薦孫覺李常程皓等十數人世譏充心正而力不足周沃事初在二年八月辛亥後在此年二月丙辰八月乙卯舊紀書充以疾罷新紀不書因由詔髙麗學法僧覺真賜號法照大師曇真法逺大師麗賢明悟大師仍賜紫方袍聽隨貢使歸國禮院言國子博士孟開乞姪孫宗顔為嫡孫據無子者聽養同宗之子昭穆合者又曰子孫繼絶應析户者非十人以上不得析則是有以孫繼祖者又晉侍中荀顗無子以兄之孫為孫請如開所乞從之政和三年閏四月二十七日檢此丁卯手詔大行太皇太后虞主於集英殿奉安據禮官從臣之議終為未允蓋集英在平日未嘗一御又非昔厝殯宫之所則殊失妥虞神靈禮意或於慶夀殿奉安恐亦無嫌可下禮院詳定以聞既而禮官以為於義無嫌請虞主自右掖門繇承天宣祐內東門入慶夀殿虞主至京山陵使以下導至右掖門並從之初詔山陵使以下導虞主至板橋先入朝謁而禮儀使陳薦因請令侍從官前導至集英殿禮官以為不可故也二月十七日何洵直云云辛未遣官祈雨詔聞蜀中上供布比嵗多闕凡十年約六百餘萬匹令提舉成都府路常平等事閻令磨勘以聞癸酉葬慈聖光獻皇后於永昭陵兩紀並書要録云后好讀史書及佛道教善飛白亞於仁宗慶厯八年閏正月望夜仁宗欲於禁中再張燈后力諫止之後三日衛士數人踰屋至寢殿時后侍帝夜半聞變帝遽欲出后閉閣抱持遣宫人馳召都知王守忠以兵入衛賊至福寧殿下斫宫人傷臂聲徹帝所宦者何承用慮帝驚紿奏曰宫人毆小女子后叱之曰賊在殿殺人帝且欲出汝敢妄言耶后知賊必縱火乃遣宦者持水踵其後賊果以燭焚簾水隨滅之所遣宦者后親剪其髮以為識諭之曰賊平加賞當記汝髮為證宦者爭盡死力賊即擒滅倉猝處置一出於后后閣侍女有與黃衣卒亂者事覺當誅求哀於帝幸姬為之言帝性寬仁欲赦之后具衣冠見固請誅之帝曰痛杖之足矣后不可曰如此無以肅清闈闥帝命后坐后立請幾移兩辰帝乃許之遂誅於東園張貴妃專寵驕恣嘗出遊欲假茜蓋於后后即欣與之妃以白帝帝曰此國家文物上下有秩汝張之出外臺諫必有言妃不樂遂不出妃數侵侮后且危中之后不與之校自持謹甚卒不能害英宗感疾詔軍國事請太后權同處分事涉曹氏及內臣者無絲髮優假中外章奏下二府者日不減五六十通二府考會擬議近者數日逺者旬月然後進呈后一一記舉大意無所忘失樞密使富弼退謂副使吳奎曰君名強記能如是乎上即位事后致極誠孝本朝故事外家男子不得入謁后既高年多疾弟佾亦老上為后言宜數召見以自慰懌后輒不許一日上自與佾同至后閣坐少頃上先起令佾得伸親親意后遽謂佾曰此非若所當留也趣遣隨出甲戌命王圭提舉修兩朝國史舊紀書此新紀削去詔自今嵗降大小厯本付川廣福建江浙荆湖路轉運司印賣不得抑配其錢嵗終市輕齎物附綱送厯日所餘路聽商人指定路分賣上批權知髙麗國王事王徽除回降詔書外可别與一詔諭以貢船在海遭風乃操舟者不良非使人之罪宜從矜釋之意詔遼使所過州軍迎送賜燕許聽樂至開封府界勿作詔臣僚軍班子弟武學生員百姓有保識者聽赴教馬軍所學馬步射舊録王中正傳可考附注熙寧十年九月二十三日庚午新録並削去二月二十五日己未巳罷教習馬軍所此又云爾當考樞密直學士兼侍讀陳襄卒乙亥元德皇后忌以虞主在道罷奉慰行香及虞主至自永昭陵值明德皇后忌亦如之丙子詔聞河北京東西河東陜西淮南路不雨已傷麥苗榖田亦乾未可耕作其令守吏博訪名山靈祠祈禱罷同天節上夀賜燕羣臣進奉酒器香合等權京東路轉運使劉攽等言前兖州仙源縣主簿孔若升乃宣聖裔孫乞令監修兖州仙源縣文宣王廟限二年畢從之補定州軍城寨卒孫倩為三班借職以告營兵九人謀叛伏誅也廣南西路經略司言知南丹州莫世忍貢銀香師子馬七印以西南諸道武盛軍德政官家明天國主印為文降敕書答之賜錦帶并以南丹州刺史印賜之仍詔經略司毁其舊印新紀書乙亥南丹州入貢賜以刺史印舊紀不書丁丑詔鄂州嘉魚縣尉兼主簿扈大有為衛尉寺丞賞捕盜功也賜高麗國王徽詔問其疾苦以徽自言見服所賜湯藥故也詔在京募五百料錢步軍候數有餘選充馬軍河東經略安撫使孫永乞聽代州瓶形寨主劉進再任上批進向與北人理辨木寨地界應對之間稍識機會特從之上批羣牧行司就給諸路弓箭手馬殊不堪宜專委一有風力監司覆案訖支配遂命陜西轉運使李稷案之上批穆珣乞移梓夔路鈐轄司於資州應接夷事頗為近便但轉運鈐轄兩司皆不欲徙故言者雖衆議卒不行宜依珣奏直處分仍專委轉運使髙秉處畫自今委中書選人知資州管勾梓夔兩路兵馬司事尋詔遂州罷兼管本路兵馬罷遂州管兵馬乃六月九日事今并書上批近差梓夔路都監王宣雖前後纍曾薄立戰功然皆就本路升擢未嘗一至京師朝廷得親審其材否聞宣人品椎鈍全少識略常須得人指縱或且稍堪驅策今若委以處置職任不惟於邊事無補亦恐緩急别致乖方貽朝廷憂可别選一稍有思慮者代宣遂以左藏庫副使髙遵治兼閣門通事舍人代之詔監司督捕賊盜許差馬步軍卒五十人并器械自隨從京西南路提點刑獄胡宗回請也禮院言周禮司服職曰凡喪為后齊衰注曰諸侯為之不杖期疏義謂諸侯諸臣皆為王后著齊衰不杖又儀禮喪服為君之祖母傳曰何以期也從服也又五服年月敕齊衰不杖期章為祖父母是古者諸臣於后同服齊衰而不杖今羣臣為大行太皇太后於禮合服齊衰不杖期遺誥雖言釋服後勿禁作樂續詔民庶過百日作樂自啓菆至祔廟復詔禁止即羣臣自宜依禮律期年聽樂詔三路緣邊官祔廟畢許用樂餘文武官皆期年庚辰復置晉州趙城縣初熙寧中廢入洪洞縣為鎮至是知州王説言百姓輸納詞訴回逺歲輸稅課不便兼竊考趙氏之先季勝生孟增孟增生衡父衡父生造父周穆王賜造父以趙城今趙城是也由此為趙氏乃是國家得姓始封之地不與他縣邑比故復之舊紀書復趙城縣新紀不書乙酉祔慈聖光獻皇后神主于太廟兩紀並書丁亥上批大行太皇太后殿使臣及祗應人等各轉一資十年以上加一資又詔永昭永厚陵奉先兵士特免差出二年都大提舉導洛通汴司宋用臣言近泗州置場堆垜商貨本司承攬般載將欲至京乞以通津水門外順成倉為堆垜場從之二年十月四日初置泗州堆垜場四年八月七日蔡河又置戊子德音降兩京畿內河陽管內死罪囚杖以下釋之緣山陵應奉民户蠲閣租稅有差兩紀並書樞密直學士簽書樞密院事曾孝寬為端明殿學士知河陽孝寬免喪故有是命尋入見留判司農寺判司農乃四月十三日今并書之端明殿學士兼翰林院侍讀學士提舉崇福宫司馬光奏再任巳滿已經兩任難更除授止乞專修資治通鑑詔特許再任詔廣西不係團結土兵闕近六千人若以見闕數移於湖南江西便近州軍招置作兩畨上下不惟廣西得上畨人應副差使湖南江西亦得下畨兵控制冦盜其令樞密院勘會廣南西路當減併指揮人數招置處及軍額以聞從前提點刑獄劉宗傑請也詔西上閣門使狄詠展磨勘一年詠知廣西軍契丹嘗入新河鋪縱火坐斥堠不嚴贖金至是當改官故也增置羣牧都監一員己丑景靈宫使昭德節度使兼侍中曹佾為護國軍節度使守司徒兼中書令出入如二府儀公使半給見錢後無得為例又給宣借兵五十人又以慈聖光獻皇后姪左藏庫使康州刺史帶御器械誦為東上閣門使六宅副使諭為供備庫使西上閣門使評為四方館使慶州刺史左藏庫昌州刺史志為皇城使榮州團練使西京左藏庫副使讀為文思副使兼閣門通事舍人西京左藏庫副使兼閣門通事舍人誘為東上閣門副使姪孫西頭供奉官閣門看班祗候㬇為東頭供奉官閣門祗候試大理評事時等七人各遷兩官白衣曞等七人並為右班殿直姪曾孫白衣溫等五人並為三班奉職從弟皇城使偃為西上閣門使雄州刺史從姪成州團練使駙馬都尉詩等三十一人各遷兩官候服闋除防禦使白衣謀等五人並為三班奉職從姪孫左藏庫副使明等三十六人各遷一官白衣習等四十五人並為三班借職姪女四人各遷一等又封弟婦贈昭慶軍節度使億妻申國夫人徐氏為楚國夫人姪女七人從姊妹六人從兄弟婦八人並為郡君已為縣主者改郡主增料錢二十千姪孫女十五人並為郡君已為郡君者遷一等未有冠帔者與冠帔為尼者賜法名紫衣師號上以慈聖光獻故大推恩於曹氏於后為兄弟行者進三官子行進兩官孫行者進一官凡被賞者百餘人且欲以佾為正中書令呂公著言正中書令自宋興以來未嘗除人况不帶節度使即宰相也非所以寵外戚上曰此誠濶典第不如是不足以稱厚恩爾公著固爭乃以節度使兼中書令他日佾又奏臣鄉除兼侍中三子皆以臣故進官今除兼中書令亦乞用前比進三子官公著言佾除兼侍中曹氏子孫皆不遷故特以佾故進其三子今佾三子已用泛恩進兩官矣豈可以復加上曰理固如此第以元舅之請不可違爾上又曰褒寵外戚誠非國家美事顧以慈聖光獻有功於宗社宜優恤其家爾公著因言自古亡國亂家不過親小人任宦官通女謁寵外戚等數事而已上深以為然時王中正宋用臣等任事故公著假此以諷上既退薛向嘆曰公乃敢言如此事使向汗流浹背詔在京及諸路賖當市易司錢物出限者展一季如限內納足本息其出限息罰錢悉蠲之又詔于闐國進奉使所賣乳香償以見錢其乳香所過官吏失察令轉運使劾罪詔給階州錢千緡為招撫羈縻管設蕃部之費初秦鳳路經略使羅拯乞階州置蕃部司不許故賜以錢上批手詔旱氣日甚夏秋之田卒將被災宜擇日再遣官懇禱天地宗廟社稷庚寅詔輔臣祈雨又詔六宅使慶州團練使宋用臣修太皇太后皇堂有勞於見寄使額上遷五資御史滿中行言近論奏乞追寢翰林學士李清臣新命未蒙施行按清臣前任京東提點刑獄蘇軾在部中親見軾輩悖慢怨謗附下訕上而不能刺舉則清臣失職之罪已在可誅矧復與之更唱迭和相為朋比而怨懟譏謗之辭又特過之固治世之刑所不宜赦也伏望明著清臣罪狀追寢誤恩使天下曉然知為姦於幽而蒙戮於顯雖廋情隱慝無以逃聖世之誅不聽朱本削去御史何正言臣近被差監太廟祔饗祭而神主幄殿無侍衛之儀檢會儀注少府監以神主匱祔前一日以箱帕覆之置於腰輿詣幄帳中宫闈令捧置座上所司侍衛如儀今所司簡慢如此伏乞治其主者以懲不恪詔御史臺取勘以聞後判太常寺李清臣陳薦知禮院葉均崔公度曾肇王子韶各贖銅及禮直官禮生等各決罰有差詔遼使賀同天節見辭日止賜茶餅十日拜表賜節衣並遣執政官就驛賜御筵十一日就驛賜射弓例物十三日不賜御筵餘如故事以在慈聖光獻皇后年內故也又詔戎瀘知州自今差武臣各帶本州緣邊都巡檢使遇有邊事與兵官照應出入從梓夔路鈐轄司請也環慶路走馬承受胡育坐例外取索軍馬文字副總管兼第一將林廣引莊賈故事非是並罰銅十斤育移别路辛卯故懷化校尉大渡河南卭部川都鬼主苴尅男韋則為懷化校尉大渡河南卭部川都鬼主夏四月乙未贈司空兼侍中諡正憲吳充卒輟視朝二日幸其第奠之充臨死戒妻子勿以私事干朝廷上聞而悲之對輔臣言充孤立無與先是御史臺鞫周沃言安南宣撫招討司事未竟後數月詔充諸子有干涉細故並免根治當時言者蓋欲借是以傾充也世譏充心正而力不足知不可而不能勇退云吳充正傳辭多貶斥其贊云充舍同即異幾以動搖時政明不燭理狃於流俗彼哉彼哉蓋非公言也然亦可以見充心術矣今從墨史詔充諸子免根治乃七月十二日事今并書之蔡絛叢談云熙寧十年交址無故犯鄙遂并陷欽亷雍三郡多殺人民係虜其子女朝廷為赫怒出大師行討之時將遣內侍李憲行王荆公介甫力爭其不可乃止而介甫亦罷矣於是吳丞相充王岐公圭皆次當國命帥郭宣徽逵而副以文臣趙卨南征為合西北鋭旅暨江淮將兵多至十餘萬輜重轉輸不在也及入蠻境先鋒將苗履燕達徑渡富良江一擊散走其賊衆擒偽太子佛牙將進破其國矣逵聞而怒亟追還之欲斬二驍將於纛下賴卨救免因屯師於蠻地不戰者六十餘日大為交人慢侮逵但遜辭廑取其要領且納賂得還報中原人不習水土加時熱疫大起於是十萬大師瘴癘腹疾死者八九既上聞神廟大不樂命窮治厥繇久之乃得吳丞相與逵書札曰安南事以經久省便為準蓋逵承望相臣風旨因致坐斃事未竟會吳丞相以疾薨於位得不治其後幾三十年當大觀之初吳丞相之二孫曰儲曰侔者以同妖人張懷素有異謀皆坐死一時識者咸謂安南之役天之所報云嗚呼執事之人主國家謀議者可不謹哉可不戒哉絛所云郭逵欲斬苗履燕達等並當考詳賜上清儲祥宫田二十頃遇同天節賜道士一人紫衣賜靈慧大師王太初為靈慧沖寂大師太初以符籙行於京師宫中亦頗用之上方委以營宫故也詔校定孫子吳子六韜司馬法三略尉繚子李靖問對等書鏤板行之審刑院奏知德順軍姚麟知河州劉昌祚秦州甘谷城監押尚德等以公用銀槍并馬借人各得公罪杖中書擬進麟昌祚依斷尚德衝替私罪事理重上批尚德已改充本路副將何不照會宜速改正翌日改正丙申分遣輔臣祈雨詔兩浙路減罷耆户長壯丁坊正并撥還支酬衙前度牒等錢百二十餘萬緡其變市金帛輸司農寺封樁從都丞吳雍請也鄜延路經略使兼措置陜西緣邊四路邊防呂惠卿等言分定熙河路戰守兵馬九將所領兵四萬一千三百八十九馬萬二千四百一十八輜重人萬三千一百三州軍城寨關堡守城兵五萬一千一百九十四從之丁酉淮康軍節度使同平章事濮國公宗暉進封濮陽郡王濮安懿王諸子孫皆遷官諸女增俸錢二十千孀子婦進封一等無品可進者改大國於是自觀察使遷留後者七人防禦使遷觀察者六人刺史遷團練使者一人大將軍領防禦使遷正任者四人領團練使改防禦使者二人領刺史改團練使者十四人自大將軍領刺史者五人將軍遷大將軍者五人率府率遷將軍者五人副率遷率者四十五人又以王夫人弟皇城使昌州刺史任澤為嘉州刺史姪四人皆遷一官舊紀書宗暉封濮陽郡王新紀同又書濮安懿王子孫皆進官一等是日同知樞密院吕公著復歸西府先是元年六月開封府鞫陳世儒獄公著時為端明殿學士兼侍讀世儒妻李將就逮亟謂其母吕曰幸告端明公為祝蘇尹得即訊於家吕即夜至吕公所如女言公著曰不可比相州獄止坐請求耳逮繫者數百人况此豈可干人耶吕涕泣而退其年九月公著除同知樞密院明年正月御史言開封所鞫不盡詔遷其獄於大理大理丞賈種民因欲蔓其獄間謂李曰亦嘗有屬於官司乎李即具對嘗請於公著而公著不許種民得之乃更其獄牒謂公著嘗許之而公著子希績希純皆與聞遂逮李母吕吕至對如李辭又逮公著從子希亞世儒友壻晏靖而告於朝希亞靖見二月二十八日上謂執政曰公著宜無此乃遣御史黃顔監治其五月種民來就問於西府公著及二子皆以實對顔知獄皆誣枉不可就而畏避不敢言未幾托疾去時上已稍知獄官之無狀因不復遣御史中書復固請用御史何正臣監訊正臣至大理而獄益熾其八月壬子十七日又遷其獄於御史臺逮公著壻邵􅀈及二婢仍檄閣門止公著朝謁上詔公著入謁如常公著即以其月丙辰二十一日避位待辨於家上數遣內侍勞問促公著復位公著訖不敢起世儒既伏誅請求事猶未辨會慈聖光獻崩被召乃就職及易月之制畢上以十一月己丑復視朝翌日公著面奏曰臣比蒙召命以陛下方在喪次臣子當奔走承事不敢以私故辭今陛下已抑情聽政臣請復待罪於家上固留公著公著遂杜門不復出正臣治獄久不決至追逮蘇頌於濠州煆錬靡所不至竟無事實辛卯中丞李定等入對即奏云公著實未嘗請求特嘗因垂拱退朝頌與衆從官泛言陳氏事公著亦預聞爾欲用此辭以結獄是日何正臣稱疾不上壬辰詔御史舒亶以定等所奏就問公著於家公著言臣審聞此於法固無害第實不預聞不敢妄對以欺君爾十二月己亥定等復入對正臣又稱疾不上定等奏被繫者訖無所承且皆無左驗上始大感寤遂詔停獄而種民以擅更獄辭下御史臺劾治上既詔停獄即日遣中使諭公著獄事已解可亟入就職越三日壬寅公著入謁展謝上曰有司考竟都無一事比拜起上如是言者再遣使押公著家屬歸西府公著亦未敢遷始公著被誣或謂公著以輔弼挂吏議當隨事自承不宜有陳公著曰不然自古公卿大臣遭枉濫而不能自直者多矣皆不得其時也今吾生治世事明主近在帷幄之間一旦被誣而不能申理則四方疏逺之人何以自明將恐治獄者狃以自張被罪者望風畏却一罹呵問例自承服致朝廷有濫罰之譏罪乃在吾而不在朝廷也獄事既釋公著曰吾身備輔弼既被吏議矣雖無事安可以復在位會慈聖梓宫在殯陵事方嚴未可以請及慈聖神主祔廟公著即再上表乞補外郡上再遣使封還仍召公著入對敦諭彌切公著乃復歸西府上批兩朝國史先詔春季成書復繼差出官及聞諸志文字編次全未有緒可展至今秋五月六日庚戌又批殿前侍衛馬步軍司今歲春首有緣舊例以不該移降過犯簡退諸軍有言三十五以下武藝及本軍中等以上者並許依舊名次收管仍令逐司再拍試提點寺務司言大相國寺僧居雖有六十餘院一院或止有屋數間簷廡相接各有庖爨常虞火患乞東西各為三院召禪僧住持四院為六院從之後又請分為八院賜度牒二百以給修繕之費從之真定府路走馬承受黃誥言本路差禁軍採泥城粘草妨教閲蹂民田詔市以常平倉頭子錢戊戌以經制熙河路邊防財用司勾當公事奉禮郎馬申為太子中舍權發遣陜西轉運判官兼同管勾邊防財用詔陜西轉運司熙河一路錢帛芻糧並與經制司管認緣經制財用職事舉廢官吏亦令經制司施行詔杭州禁民毋以言涉邊機文字鬻髙麗人詔聞諸路將副多輪一員直日巡教可令提點刑獄司體量以聞己亥遼主遣瑞聖軍節度使耶律永芳太常少卿乾文閣待制劉彥先來賀同天節詔陜西轉運使秦州廂軍所支月糧三分以一分支白米二分支小麥如無米即借撥於他司以走馬承受沈置言所給米陳腐兼以糜蕎之類軍人有辭故也庚子詔西北諸路愆雨北嶽令知定州韓絳東西中嶽令所在知州躬往祈禱又詔太學正鍾世美上年陳太學事有可行者下看詳太學條制所立法以聞三司言乞就運廣濟河所漕榖二十萬石往青淄等穀貴處糶從之賜江淮發運司度牒三百給真楚泗州修轉般倉運河水閘之費詔明州象山縣尉張中救接髙麗人船有勞落衝替初髙麗船遇風中往救之坐嘗與使人和詩衝替至是髙麗使以語館伴官故釋其罪禮院言禮宗廟三年一祫以孟冬五年一禘以孟夏而四時之祭薦其常事故禘祫之月則不行常饗自熙寧八年四月禘於太廟至今五年今年孟夏薦饗請改為禘從之辛丑詔權三司勾使李承之根磨提舉京東河北鹽稅司歲入課利以聞鹽稅司當考正月二十二日詔太子中允館閣校勘監察御史裏行范鏜罷管勾國子監太子中允權監察御史裏行黃顔知諫院兼管勾國子監太子中允權監察御史裏行何正臣為館閣校勘罷勾當三班院將以御史專領六察故差遣悉罷後鏜又自言見判禮部亦罷之何正臣舊傳云其為御史也兼管勾三班院牢辭不獲乃從容為帝言臣備位言職以激濁揚清為事兼它局則嫌於不自舉人言交攻何以逃責帝善之為悉罷御史兼局顧謂近臣曰以忠事主如何正臣可也帝嘗閲别試策題他日問撰者誰正臣對范鏜同撰帝曰語若不出於卿乃鏜自為邪有旨策題并注撰人姓名二事皆自正臣始乙巳上批乞弟侵擾屬蠻邊將開諭撫遏而姦凶竊發殺傷吏卒﨑嶇山獠敢爾跳梁赦而不誅何以懷逺雖令鄰路濟兵應援須議發兵深入討除夔州路轉運判官程之才可徙梓州路同轉運使髙秉預於要便州縣城寨備人二萬馬五千一月芻糧詔權發遣淮南路轉運副使都官員外郎李琮根究逃絶户下虧陷稅役等錢正月二十二日琮初除漕詔開封府界京東西諸將下弩手每五十人差教頭一人詔虞部員外郎陳幵放歸田里永不收敘幵陳世儒之從兄世儒殺母事覺幵諭世儒自盡而心利其財故也通判熙州祕書丞胡宗哲同管勾經制熙河路邊防財用事丙午同提舉成都府等路茶場屯田員外郎蒲宗閔及勾當官遷官循資有差録故提舉茶場李把子珏試將作監主簿以陜西轉運司言茶場司自熙寧七年置場至十年總入息稅錢百二十二萬九千餘緡而把已死故也詔監文思院殿中丞王史太子中舍許遷並衝替坐造山陵皇堂鐵葉不中度也丁未詔開封府界京東西河北河東陜西等路久苦旱災近雖霑潤未至優渥深慮刑獄或有寃留上干和氣可諸路分委監司在京遣中書刑房檢正官督遣繫囚又詔轉運提點司體量災傷七分以上蠲其夏稅不及七分檢覆如常法提點刑獄提舉司察不如法者以聞戊申詔中書宗室大小學官員多俸薄其議減員增俸六月戊戌閣門言儀制有車駕省方出獵大閲大酺之類行之希濶欲並置舊本餘以儀制修定從之提舉茶場范純粹兼三司勾當公事以李稷言純粹任右贊善大夫官卑恐不能彈壓州縣故也御史臺言奉詔復置六察察在京官司今請以吏部及審官東西院三班院等𨽻吏察户部三司及司農寺等𨽻户察刑部大理寺審刑院等𨽻刑察兵部武學等𨽻兵察禮祠部太常寺等𨽻禮察少府將作等𨽻工察從之初乞弟歸自江安怨夷牢殺一毛欲讎之然不敢出其部冦掠殺一毛具元年十二月末知瀘州喬敘數遣人邀之打誓通判家定國曰有事而誓猶不足以示威今無事而求其誓徒納侮耳敘不從卒以金繒誘乞弟打誓於江安乞弟率衆坐大嶺上遣兄阿字及蠻奴沙自阿義與敘打誓時三月己巳也誓訖乞弟遂攻圍羅箇牟村索其舊稅羅箇牟村自熙寧十年熊本始團結之約蠻有讎殺漢為救援於是奉職任光秀詣江安告急梓夔路都監王宣恥不與打誓江安令阿宗範復以言激之遂檄戎瀘等州都巡檢王謹言江安駐泊都監郭晏悉以兵會同日至羅箇牟村與賊遇乞弟曰我近與漢家打誓不敢犯漢羅箇牟欠蠻舊稅我故讎之宣等不聽堅欲與戰乞弟未敢動且曰我蠻不敢先為惡宣遣任光秀往督戰光秀突騎馳陳前與賊對語抽身立髙嶺上賊衆四合宣與其子三班差使琥驅兵力鬬賊衆稍怯欲自引去晏州夷以刀畫地呼曰我隨爾蠻爾蠻若退漢必殺我他日爾蠻如何更來索我稅賊衆遽止先攻殺謹言次又殺晏宣知必敗諭琥令馳歸曰我以王事當死琥曰父死於此子復何往遂俱死官軍死者幾八百人是日梓夔路鈐轄司言宣等全軍戰沒詔入內供奉官勾當內東門韓永式往瀘州體量公事差韓永式據御集二十日再出劄子舊紀書瀘州蠻賊乞弟冦戎州都監王宣巡檢王謹言死之新紀但書王宣並録之初韓存寶經畫羅茍夷爭不償骨價事乞弟遣其親信至納溪寨率兵助王師軍前報以不用重兵約能撫遏諸蠻擒捕羅茍餘黨當有厚賞乞弟皆如約存寶既平羅茍遂不立賞乞弟率晏州夷六千餘攻戎州界及江安縣諸蠻焚聚落作木契劫以輸稅擁兵責存寶所許賂不可得數日乃去今按羅茍夷與羅箇牟不同原本多訛改正庚戌詔西北諸路久旱慮蝻蟲漸生其令轉運司督州縣撲滅毋致滋長又詔在京官司奏或申中書樞密院事待報半年未下聽節略大綱及申奏月日以聞都大提舉導洛通汴司言所狹河道欲留水面濶八十尺以上束水水面濶四十五尺詔狹河處留水面濶百尺審刑院刑部言宣州民葉元有為同居兄亂其妻縊殺之又殺兄子而強其父與嫂為約契不訟於官鄰里發其事州為上請上批同居兄亂其妻或強或和既無證左又罪人今皆已死則二者同出於葉元有一口不足用以定罪又下民雖為無知抵冒法禁固宜哀矜然以妻子之愛既罔其父又殺其兄繼戕其姪背逆天理傷敗人倫宜以毆兄致死律論又批祥符知縣唐彀等於城北點集保甲約二千餘人農事方急未知點集因依可令提點司具析後提點司言詔書教大保長先令提舉官追集簡閲人材故祥符有此點集詔劾祥符官吏仍戒諸縣自今先簡大保長不足方選家丁及以次人既而祥符官吏自言受提舉教閲官指揮乃詔免劾樞密院言提舉教馬軍所教保甲巳經閲試補三班借職五人三班差使十六人披帶班殿侍九人賜銀絹六十人詔五人充王中正教大保長隨行餘分差赴巡檢尉下指教長上保丁辛亥上批瀘州蠻事未息梓夔路鈐轄司所奏諸縣寨邊事關報異同間冗之語悉以上聞慮其間隱晦要切事或致處分之際有失機會可約束令自今並須審察事實節略機要以聞髙陽關路鈐轄兼河北第十將雷仲言臣昨欲舉行霸州教閲不依元結隊伍為副將劉昌序沮止遂獨御中總管司後來營教已依元結隊伍法有雲翼卒胡千輒率衆當教場不唱喏是日昌序先入教場臣後至恐必有事因令霸州鞫百餘日未結正乞委官體量上批專下轉運判官孫迥推究慮劉昌序欲傾搖雷仲故導千等抵冒深刑宜令研窮考訊必見姦慝所在既而迥言昌序實無害仲之意乃止梓州路轉運司言體量乞弟等三月己巳赴納溪寨立誓歸順羅箇牟村蠻止為收藏乞弟奴婢有任光秀妄以生南羅箇牟村為省地報王宣以蠻人侵犯致輕易出兵陷沒緣羅箇牟村蠻熙寧七年後方量納官稅不同省地熟蠻納二稅役錢詔羅箇牟村蠻既納稅賦即是省地熟户見在圖籍並係熟蠻不委所奏有此異同今不獨為王宣接戰所因緣繫久逺地界事令轉運鈐轄司審實以聞後逐司奏羅箇牟村蠻但量納稅物以羈縻之實與省地熟蠻不同後逐司奏云云朱本簽貼去以密院取會到修入墨本無之河東經略使孫永舉供備副使董中行為岢嵐軍草城川都巡檢詔中行以伎術進豈宜領邊要職任令别舉官權發遣司農寺丞太子中允館閣校勘張商英檢正中書刑房公事前絳州團練使駙馬都尉王詵復慶州刺史聽朝參詵前坐蘇軾奪官蜀國長公主久病上欲慰主心故特有是命及上視主疾問所欲主但謝復詵官而已壬子御史滿中行言都水監丞及巡河使臣按行河上縱吏受賄而逐掃軍司濠寨人員兵級等第出錢號為常例稍不如數則推擲過失追擾決罰苦於誅求至借官錢應辦乞體量根究施行詔轉運判官孫迥體量以聞後應犯在赦後者皆根勘論如法詔前河北路轉運副使陳知儉罰銅三十斤前提點河北路刑獄韓正彥罰銅三十斤坐河決曹村失備也甲寅命翰林學士權御史中丞李定詳定郊廟奉祀禮文定中辭之罷郡牧行司復置提舉買馬監牧司入內東頭供奉官瀘州勾當公事韓永式乞差熙河都虞候呂昱為指使上批昱本熙河弓箭手纍立戰功補都虞候近私隨韓存寶討蠻賊本路已作逃亡除籍故困躓無所歸可與三司軍將令帶隨行代州言諜報契丹北樞密蕭堯昌等引步騎點檢緣邊鋪舍上批敵若止是增飾鋪舍必不遣如此重官恐尚有理辨團山子以東地界之意故假此為名宜下定州真定府安撫司太原府經略司速募人伺敵情仍增邊界巡守及權移異地分內不得力使臣後逐司奏言惟點閲鋪舍而已非有他故也詔衡州茶陵縣歲以稅米折納船材運至潭州造船公私縻費自今以所輸船材即本縣造船二百艘轉運司出錢佐其費從太子中允王子韶太常博士何琬請也後又詔民稅米聽輸縣米一石别輸船腳錢七十官為運至潭州詔濰州防禦使克諶饒州防禦使克懼各追一官罰銅九斤停朝參俸給以遇慈聖光獻皇后虞主坐道旁不起為禮儀使劾奏也乙卯詔候諒暗畢加上仁宗英宗尊諡權御史中丞李定言奉行朝廷法令以致之民者諸路監司而無鈎考之法今御史臺分察官司違慢若推此法以察諸路監司宜無不可者以户案察轉運提舉官以刑案察提點刑獄如此則內外官司各勤職事朝廷法令不至隳廢從之兩紀並書詔御史分察諸路監司丙辰詔以季秋擇日有事於明堂丁巳詔鄜延路經略司緣邊隨市價增錢鬻鹽鈔以聞京東路轉運司言鄆州築遙隄長二十里下濶六十尺髙一丈先是河決曹村水至鄆州城下明年山水暴至漂壞城北廬舍知州賈昌衡李肅之相繼議築遙隄以捍水患至是隄成役夫六千一月畢賜詔奬之詔司農寺改更常平免役坊場等事有干大法者不得輒下相度並先奏取旨己未資政殿學士知延州呂惠卿為資政殿大學士再任詔故梓夔州路都監禮賓使王宣戎瀘等州同都巡檢使內殿承制王謹言瀘州江安縣駐泊都監內殿承制郭晏前瀘州管界內同巡檢右侍禁孫中立都監司指使三班借職楊永夀差使王琥散直盛贇劉用押馬殿侍張德李珣孫宣旦孫文秀令轉運司致祭賜其家錢絹有差護送家屬至願歸處無親戚者遣吏齎骨及財物贈官宣敇等送其家贈宣六宅使謹言晏並西京左藏庫副使録宣子琥後二人為三班奉職三人借職謹言晏後各一人奉職二人借職中立後一人奉職一人借職餘各一人補下班殿侍詔監司提舉司有所措置及申請而輒及他司者論如非所職輒管勾法陜西路轉運使李稷言秦州造公使酒給省倉米慶歷中詔歲毋過千五百石嘉祐四年後歲給四千至六千餘石熙寧二年遂至九千石自後歲不下七八千石前後違法官吏亡存相半未敢推劾詔釋官吏罪自今歲毋過四千石庚申賜梓州路轉運司坊場錢五萬緡絹布各萬匹增備邊計又詔熙河路遇同天節止令進馬二十匹又詔御史臺六察案官二年為一任以所糾劾官司稽違失職事多寡為殿最中書置簿以時書之任滿取旨升黜後中書上刑房所修法注云其所糾劾須朝廷用其言以斷罰人者上批人字下增或上簿三字增字用御集所書朱本云增取旨字今不取仍自五月庚午移入此上批新受供備庫使曹諭舊有廢疾未嘗出官故未得俸既以恩遷其以俸給之詔權御史中丞李定罷判太醫局除放欠負以領察事也提舉福建路鹽事賈青上所部賣鹽官吏元豐上年歲課比租額增羡及捕獲私鹽最多乞優加酬奬上批福建路鹽事自寋周輔承命創法賈青相繼奉行方爾期年已見就緒盜販衰止歲課有贏東南一方公私所賴不細賈青近已嘗推恩自餘行法有勞官吏可第賞之時周輔已擢三司副使自轉運判官王子京而下二十人遷官升任循資減磨勘年堂除不依名次路分注官有差熙寧十年六月周輔除福建漕八月徙京東九月仍漕福建元豐元年十月除發運副使十一月以發運副使入為大理少卿十二月兼提舉福建鹽事知齊州王臨言州有靈巖寺地課幾萬緡皆為僧徒盜隱乞差官監收每歲計綱上京納詔賜與上清儲祥宫辛酉增國子監歲賜錢六千緡初給外舍生食人月為錢八百五十至是增至千一百故也御史何正臣言諸路監司郡守體量官吏不待考實多先乞替罷刺舉之際豈能無失其間好惡不公喜怒以意者往往而有乞自今體量官吏有贓狀已明不可留本任者取旨先替罷餘委别司考察或俟結正施行詔送詳定重修編敕所朱本云元行不書詔非導洛司船輒載商人稅物入汴者雖經場務投稅並許人告罪賞依私載法即服食器用日費非販易者勿禁官船附載蕟箔柴草竹木亦聽仍責巡河催綱巡檢都監司覺察從宋用臣請也三月二十四日
