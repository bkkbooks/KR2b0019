body:
  text: 續資治通鑑長編卷二百九十七宋李燾撰神宗元豐二年三月庚午朔董戩經沁伊達木凌節等來貢方物上問所以來之意對曰董戩蒙恩許貢故遣使謝上慰撫之皆歡呼舞拜權監察御史裏行舒亶為集賢校理以上批亶優於辭學詳於吏治自丞屬憲府能以先後左右朝廷政事為已職責故也詔錢藻且權開封府以許將連太學獄事而御史臺鞫治多用開封府吏也八月丙辰許將責權御史中丞蔡確言畿內及諸路闕雨宿種未長重虞疾疫陛下賑恤窮乏詔書數下仁民之慮可謂至矣臣愚竊謂四方犴獄宜更澄察決滯理寃足召協氣乞詔畿內提舉司諸路轉運或提舉司委官與提點諸縣鎮及提點刑獄官巡按闕雨州縣督治未結絶公事有涉枉濫或無故淹延者並申理決遣劾官吏以聞知諫院李定言京東河北飢青齊滄棣尤甚陛下已敕有司賑救貧乏租稅欠負例皆展閣減價出粟支借種錢籍録飢羸給以日食尚聞民不安居漸有流散乞戒監司檢察州縣若賑救不如法致有逃死以戶口多少等第黜罰知諫院黃履亦言知青州龔鼎臣知滄州張問性雖厚重而短於應務不足以賑乏紓急乞别選能者易鼎臣問以他郡皆不行朱本削此三事詔兩浙路災傷民負戶絶田産價錢者展限半年輸官初本路乞展限一年而司農寺以為太寬也賜辰州捕猺賊兵丁特支錢辛未詔河東定奪吉伯溝地界毋得張皇或致生事候究治得實具奏聽旨以管勾緣邊安撫司王崇拯言差官定奪滋長狡計宜但戒地分巡檢毋得侵越耕種而已上以其言為然故有是詔又詔開封府界僧寺旅寄棺柩貧不能葬嵗久暴露其令逐縣度官不毛地三五頃聽人安葬無主者官為瘞之民願得錢者官出錢貸之每喪毋過二千勿收息詔提舉常平等事陳向主其事以向建言故也後向言在京四禪院均定地分葬遺骸天禧中有敇書給左藏庫錢後因臣僚奏請裁減事遂不行今乞以戶絶動用錢給瘞埋之費至六月向又乞選募僧守護量立恩例並從之葬及三千人以上度僧一人三年與紫衣有紫衣與師號更令管勾三年願再住者凖此向桐廬人也張舜民云云可考新舊紀並書詔畿內貧民不能葬者給地貸以錢無主者瘞之癸酉賜梓州路轉運司度僧牒百修遂戎瀘州城丁丑上批前內侍省髙班梁堅坐監嵩慶陵自盜贓貸死編管襄州該恩已放逐便今貧窶無所歸內臣執事兩省更無他所安排可與一內侍省把門內品遂為後苑散內品環慶路經略使俞充言蕃部昌寧為西界守領使詐歸投來刺邊事續來理索并熟戶蕃部蘇尼亦入漢界刺事若依法處置昌寧恐生彼疑乞牒還西界蘇尼乞刺配近裏州軍上批蘇尼有死罪二一犯十惡法當緣坐今幸敗獲所宜眀正典刑不知有何情理可矜特為末減昌寧雖本西人自是入中國刺事理亦不可牒還縱今遣回未知於夏人疑我之心如何可解顯亦全無意謂可令依法施行其捕獲蕃官速依條酬奬節略蘇尼等情欵牒鄜延路令轉牒宥州取問首領擅遣人入中國刺事人罪嚴加誡斷遂斬蘇尼而昌寧處死上批大理寺長二丞主簿家屬既不在治所如遇休假宜止各輪一員在寺餘歸休沐庶制可經久人無憚倦其著為令三司言會計河北東路熙寧十年收支實闕錢帛等比轉運副使陳知儉判官汪輔之元奏之數少七十三萬餘緡知儉等誠不職乞降黜以誡諸路詔提舉司劾罪奏之輔之坐杖七十知儉杖六十各該去官詔各特罰銅二十斤知都水監丞范子淵言修黃河南岸治水隄乞給人兵物料緡錢詔發卒三千人給官莊司熟藥所錢共三萬緡仍特賜公用錢二百緡提舉河北糴便糧草王子淵言糴緣邊軍儲皆商人入中嵗小不登必邀厚價故設內地州縣寄糴之法以權重輕自內地用御河船運至緣邊且以熙寧八年言之綱船三百用兵工幾二千人所運不及八萬石計綱船兵工約一斗已費錢七十矣若僦私船百里之地斗才一錢三分至五分率以千里之逺計之猶可省綱船所費之半宜雇客船便下三司議三司請留綱船二百二十艘應副船運不足即如子淵議從之令嵗終具和雇私船所省錢數以聞戊寅録北界人程詮程屺為三班借職程景三班差使李弼送襄州賜地二頃月支錢千米一石三年詮等嘗為邊人刺北事及嘗告獲姦細事覺來歸定州安撫使乞推恩故也庚辰御集英殿策禮部進士舊紀具載策題禮賔使嘉州刺史髙公繪為羣牧都監文思副使髙遵路管勾景靈宫公繪以皇太后從子遵路以從叔也辛已詔今嵗特奏名眀法改應新科眀法人試大義三道又詔京朝官選人班行所試經書律令大義斷案上等三人循一資中等三十四人不依名次注官下等七十人注官壬午策特奏名進士又策武舉進士刑部言祕書省正字王鞏坐嘗借趙居兵書當杖八十追兩官勒停已敘祕書省正字今又及三期當敘太常寺太祝上批王鞏所犯交結巨惡情理極重緣當日元勘不盡故案法得罪至輕可更展三期與敘元官詔發壯役兵二千京東廂軍一千濱棣州修城揀中崇勝兵五指揮並赴洛口工役癸未御集英殿試諸科新科眀法龍圗閣直學士知渭州蔡延慶權知開封府延慶初得安南九軍法讀之謂諸將曰漢蕃兵馬未整幸今無事可依此團結以備調發乃以正兵弓箭手人馬團為九將合百隊分四部為左右前後而隊有駐戰拓騎之别步騎器械每將皆同又以蕃兵人馬為引隊各隨所近分𨽻諸將每將之數不及正兵之半所以制之也處老弱於城寨使漢蕃不相雜所以防其變也為書上之會鄜延路亦分畫兵將朝廷以兩路所奏遣徐禧議定禧奏宜依鄜延奏從事乃下諸路有不同者具析以聞延慶條鄜延所奏未便者具上且言不敢附下以孤委任上是延慶以禧為不然乃召延慶神宗初以延慶分畫兵將為是後乃有詔褒奬徐禧且命禧代延慶則似禧為是也延慶傳云上以禧為不然當考褒奬禧詔在此月丙戌御集四月十八日元年七月辛卯更詳之龍圗閣待制知秦州吕大防知審刑院御史舒亶言大防果於立異足動流俗使在朝廷於聖政有損無益乞與一在外差遣不聽詔聞鄜延路緣邊蕃部有積年借貸錢榖主事催督迫急貧下戶囏於送納甚有自盡及亡出外界者可更展限半年環慶路凖此賜董戩進奉馬四百六十三匹價錢一萬一千二百緡銀綵各千對衣金帶銀器衣著等補進奉大首領經沁伊達木凌節珍州刺史劉勇丹濟古扶州刺史餘有官者遷一資未命者補職名有差嵗增大首領大綵十七匹小首領五匹散茶各十斤以經制熙河邊防財用李憲言經沁伊達木凌節敘述和斷之勞故也回賜馬價用密院時政記增入密記却不書銀綵當考閣門言同天節臣僚罷散道場賜御筵乞依燕式賜花從之太常博士周直孺等言國信一路郡縣驛亭陳設什物以致樂器等故弊乞新之詔自京令國信所緣路委監司一員先事點檢完治秦鳯路經略使吕大防言階州漢蕃戶獻納并根括田五百二十頃頃可募弓箭手詔依緣邊法人給地兩頃丙戌龍圗閣直學士知成都劉庠進一官知秦州太子中允集賢校理知諫院徐禧為右正言直龍圗閣權發遣渭州賜緋章服其計議措置邊防事如故計議措置如故據禧本傳初陜西緣邊兵馬蕃弓箭手與漢兵各自為軍每戰多以蕃部為前鋒而漢兵守城伺便利後出不分戰守每一路以數將通領之吕惠卿帥鄜延以為調發不能速集始變舊法雜漢蕃兵團結分守戰每五千人隨屯置將且條約以上邊人及議者多言其不便上頗采惠卿議欲推其法於諸路故遣禧往計議禧先具環慶法上之遣官措置涇原而涇原帥蔡延慶以為不可朝廷亦是之并難禧環慶法禧厯疏涇原法疏略參錯圗其狀别為法以奏且言環慶法不可改上與惠卿詔曰徐禧論措置析將事惻怛慷慨謀國不顧已令代延慶帥涇原卿宜勉終之異日為一代良臣矣元年六月丙寅初遣禧計議七月辛卯有詔付禧及諸路是年三月癸未蔡延慶云云可考太原府路走馬承受全惟幾言馬遞鋪兵轉送朝廷邊機遞角簷擎使命行李并諸搬綱運軍器材料衣賜絹布之類略無休息雇賃腳乘倍費錢數窮困凍餒乞加寬恤上批久聞鋪兵囏勤之狀深可傷惻今因惟幾到闕面審其實具道逐人衣不庇體食不充口家人則以不任寒凍多埋覆於溫灰之中以茍活生命窮極如此亟宜拯恤可委陳安石速具措置以聞後安石言欲乞應軍器及材料并衣賜凡綱運並差廂軍搬運日支口食如闕即和雇又軍器材料其間有不適用及粗重枉破腳乘欲乞並委所屬専差官相驗堪好方得起發應合變造成朴並令要用去處先造樣一二件關送起發州軍依樣計置應副如此減得腳乘兼便於津搬詔軍器監相度以聞本監言如此誠便並從之河北緣邊安撫司言雄州兩輸戶避北界差夫及科栣木修涿州城各擕家屬來近本州并關城居止上批兩輸户避役逃移不免失所其給口食賑恤候北界科役少息諭令復業戊子管勾廣南西路常平等事劉誼言雍州官舍民居悉以茅覆兼兵火之後邊城樓櫓未備乞集陶匠燒瓦運宜州木板置溪洞竹蓋公私屋宇庶絶火患從之詔誼經畫施行轉運司協力應副上批河東路見運物材就緣邊造軍器顯為迂費張皇可令軍器監速罷之廣西經略司言延衆鎮右千牛衛將軍張智常誘致九道白衣冨雅州李聚眀等內附詔遷智常右監門衛將軍庚寅詔入內東頭供奉官宋用臣都大提舉導洛通汴前差盧秉罷勿遣初去年五月西頭供奉官張從惠言汴河口嵗嵗閉塞又修隄防勞費一嵗通漕才二百餘日往時數有人建議引洛水入汴患黃河嚙廣武山須鑿山嶺十五丈至十丈以通汴渠功大不可為自去年七月黃河暴漲異於常年水落而河稍北去距廣武山麓有七里逺者退灘髙濶可鑿為渠引水入汴為萬世之利知孟州河隂縣鄭佶亦以為言時范子淵知都水監丞畫十利以獻嵗省開塞汴口工費一也黃河不注京城省防河勞費二也汴隄無衝決之虞三也舟無激射覆溺之憂四也人命無非橫損失五也四時通漕六也京洛與東南百貨交通七也嵗免河水不應妨阻漕運八也江淮漕船免為舟卒鐫鑿沉溺以盜取官物又可減泝流牽挽人夫九也沿汴巡河使臣兵卒薪楗皆可裁省十也又言汜水出王仙山索水出嵩渚山亦可引以入汴合三水積其廣深得二千一百三十六尺視今汴流尚贏九百七十四尺以河洛湍緩不同得其贏餘可以相補懼不足則旁隄為塘滲取河水每百里置木閘一以限水勢隄兩旁溝湖陂濼皆可引以為助禁伊洛上源私取水者大約汴舟重載入水不過四尺今深五尺可濟漕運起鞏縣神尾山至士家隄築大隄四十七里以捍大河起沙谷至河隂縣十里店穿渠五十二里引洛水屬於汴渠總計用工三百五十七萬有竒疏奏上重其事是年冬遣左諫議大夫直學士院安燾入內都知張茂則行視正月燾等還奏索水在汴口下四十里不可引洛汜二水積其廣深才得二百六十餘尺不足用滲水塘引鑿大河緩則填淤急則衝決洛水惟西京分引入城下流還歸洛河禁之無益置閘恐地勢髙下不齊不能限節水勢黃河距廣武山有才一二里者又方向著南岸退灘堅土不及二分沙居十之八若於其間鑿河築隄至夏洛水內溢大河外漲有腹背之患新隄一決新河勢必填淤則三百餘萬工皆為無用又子淵建此本欲省汴口嵗嵗勞費今置堤掃水澾之類嵗計恐不啻一汴口之費而又有不可保之慮雖然財力在人猶可為之惟是水源不足則人力不可強致蓋伊洛山河盛夏雖患有餘過此常若不足疑謀勿成惟陛下裁之上以子淵計畫有未善者乃命用成經度以楊圭往至是用臣還奏可為請自任村沙谷口至汴口開河五十里引伊洛水入汴每二十里置束水一以芻楗為之以節湍急之勢取水深一丈以通漕運引古索河為源注房家黃家孟王陂及三十六陂髙仰處瀦水為塘以備洛水不足則決以入河又自汜水關北開河五百步屬於黃河上下置閘啓閉以通黃汴二河船筏即洛河舊口置水澾通黃河以泄伊洛暴漲之水古索河等暴漲即以魏樓滎澤孔固三斗門泄之計用人九十萬七千有餘又乞責子淵修護黃河南隄掃以防侵奪新河詔如用臣策故有是命始營清汴主議者以為不假河水而足用後嵗旱洛水不足遂於汜水斗門以通木筏為名隂取河水以益之朝廷不知也朱本云其後清汴成率如其説波流平緩兩隄平直泝行者道里兼倍官舟既無激射之虞江淮扁舟四時上下晝夜不絶至今公私便之非上意眀斷不惑於凡淺之論千載之患未易除也此朱本所云新本已削去上用墨本也新紀於四月二十六日甲子書起役導洛通汴舊紀於六月十七日甲寅畢工乃書之辛卯詔權發遣羣牧判官太子中允王欽臣罰銅十斤坐違法擅移所部官也賜登州度僧牒百修城上批西驛交市舊法除買於官庫外餘悉聽與牙儈市人交易提舉市易司近奏並令市易上界管認一切禁其私市聞戎人甚不樂昨正旦使所須物本務又不能盡有不免責買於市肆今會其贏數亦不多宜令仍舊御試編排官李承之等言熙寧九年御試新科眀法正奏名三十九號止以通粗資次編排今一百四十六號比前數倍欲以二通為合格分兩等從之命樞密院編類文字大理評事蔡碩等編類將官敕令承旨司修定以都承旨韓縝等言自降將敇後陳請不一慮衝改不眀諸將或未諭恐誤施行故也壬辰詔近已差宋用臣都大提舉導洛通汴可令范子淵修黃河南岸畢留卒二千給用臣工役仍令轉運副使李南公専應副河南府都巡檢一人往洛口編攔用臣支賜依所寄諸司使給之知延州吕惠卿乞招敢勇每十人為一甲從之河東路經略司言麟州有西人先放箭及虜兵士吕重等欲牒宥州誡約詔人馬已索到箭數不多更不移牒詔敗折場務買撲等錢保人當填納者委提舉司具拖欠年限嵗豐凶及保人家力當給日限申司農寺詳度指揮從本寺請也癸巳集英殿賜進士眀經諸科開封時彥以下及第出身同出身同學究出身總六百二人舊録鄧綰傳云綰知熙寧六年貢舉請進士第五甲依舊賜本科出身無以同學究恥之不從後元豐二年再言之卒從其請新録辨曰熙寧六年有請不從元豐二年賜進士及第出身同出身亦有同學究出身者卒從綰請忘也今削去舊紀書進士眀經諸科賜第及授官者千三百八十人新紀同蓋并癸巳日所賜人數也客省言車駕逰幸射弓故事每御箭射中宰臣親王以下進馬欲自今初射中羣臣進馬及賜羣臣馬如舊續射中並免進奉從之詔審刑院刑部自今留滯公案及二百道官吏勒宿甲午御集英殿賜特奏名進士眀經諸科同學究出身試將作監主簿國子四門助教長史文學助教總七百七十八人新舊紀并入癸巳雄州言北界民户以差配騷擾併有驚移涿州乃移文言南界縣官以兵馬遮約不令應役請速遣回詔雄州具創生侵越騷擾因依報之及戒兩縣巡防候北界差科稍息即諭驚疑人户歸業既而緣邊安撫司言逃移人多客戶自言若北界未肯罷夫欲往他處營田作力以為嵗計樞密院請詔雄州曉諭民户田蠶及時不可逺棄家産候北界差科稍息有人招呼各歸復業上批兩輸户逃移四方雄州深以為不便者不過恐元佃之地全為北人拘占今逃者既多客户則浮寓之民縱使散之他所亦無深害可止令出榜安慰還業新舊紀並書詔雄州兩輸户南徙者諭令復業丙申閣門通事舍人河北緣邊安撫副使劉琯乞兩輸人已於近南居者不得復於兩輸地來往詔雄州己發遣歸業民戶責鄰保覺察丁酉詔新進士依舊式賜錢五百千為宴集費外特賜千緡諸科三百千詔大理寺月具見禁及已決罪人數申中書賜特奏名進士孫寶養真處士以寶犯不考式恩補攝助教不就自言有修鍊術乞一名號歸山故也孫寶何許人邢州乞權住散本州市易司絹錢以寬民力詔都提舉市易司案民户逋負數多州縣毋得給錢降東上閣門使果州刺史秦鳯路副總管夏元幾為都鈐轄坐前知鎮戎軍失入死罪也五月己巳又責岐王皓之夫人馮侍中拯之曽孫也失愛於王屏居後閣者數年是春岐王宫遺火尋撲滅夫人聞有火遣二婢往視之王見之詰其所以來二婢曰夫人令視大王耳王乳母素憎夫人與二嬖人共譛之曰火殆夫人所為也王怒命內知客鞫其事二婢不勝考掠自誣云夫人使之縱火王杖二婢且泣訴於太后曰新婦所為如是臣不可與同處太后怒謂上必斬之上素知其不睦必為左右所陷徐對曰彼公卿家子豈可遽爾俟按驗得實然後議之乃召二婢命中使與侍講鄭穆同鞫於皇城司數日獄具無實又命翊善馮浩録問上乃以具獄白太后因召夫人入禁中夫人大懼欲自殺上遣中使慰諭曰汝無罪勿恐且命徑詣太皇太后宫太皇太后慰存之太后與上繼至詰以火事夫人泣拜謝罪曰乃縱火則無之然妾小家女福薄誠不足以當岐王伉儷幸赦其死乞削髮出外為尼太后曰聞詛詈岐王有諸對曰妾乘忿或有之上乃罪乳母及二嬖人命中使送夫人於瑶華宫不披戴舊俸月錢五十緡更增倍之厚加資給曰俟王意解當復迎之此據記聞附于月末復置熙州狄道縣舊紀仍不書此夏四月庚子內藏庫使張若訥代种諤知岷州禮賔副使康識代楊萬知通逺軍以上批諤萬與經制邊防財利司數論辨公事因而生隙勢難安處故易之以諤知涇州陜西都轉運使度支郎中皮公弼降一官展磨勘二年公弼常舉汝州俞士龍坐自盜贓法寺當公弼徒二年勒停詔以公弼經制鹽事有勞免勒停辛丑幸金眀池觀水嬉燕射瓊林苑上射中的羣臣皆賀乃命羣臣射又特命樞密副都承旨張誠一射酒罷御苑門觀軍士射栁枝上自即位至是始再幸池苑後不復至矣新舊紀並書幸池苑癸卯太皇太后皇太后幸金眀池上扶太皇太后登輦又豫為百寶酒船於是馳以上夀權發遣鹽鐵判官提舉成都府等路茶場國子博士李稷言自熙寧十年冬推行茶法至元豐元年秋凡一年通計課利及舊界息稅并已支見在錢七十六萬七千六十六緡上批蜀茶變法又前後奉行使者失指議論紛紜恐動羣聽稷能推原法意日就事功宜速遷擢以勸在位遂落權發遣詔編茶場一司敇甲辰遼主遣林牙懷化軍節度使蕭晟左諫議大夫知制誥張襄來賀同天節龍圗閣直學士右諫議大夫宋敏求卒乙巳提舉成都府等路茶場李稷言經制司擅𣙜買熙河岷州通逺軍商人貨詔經制司具析以聞後李憲言自置司以來除蕃商水銀及鹽川寨鹽官鎮兩場依法禁私販外市易賣買並取情願交易未嘗拘攔臣以淺踈終恐難逃吏議乞獨坐臣罪乃詔憲赴闕令轉運使蔣之竒根治劾有罪之人又詔之竒宜依朝廷所降事目推治虛實無令支蔓詔之竒事在七月辛未及獄成憲與馬甲趙濟霍翔坐奏事不實徒二年詔憲等所坐緣公宜依德音釋之獄成據朱本在六月戊戌朔今并入此御集在十一月二十六日是年九月十八日十月十五日皆有德音九月十八日止及頴州當是十月十五日朱本必誤當從御集詔昨安南從軍士卒因病寄留後不知存亡者除籍給賻從廣西經略司請也庚戌詔新賜進士及第自第四甲以上依熙寧九年推恩諸科正及第眀經出身依熙寧六年推恩命御史中丞蔡確同判流內銓官注擬又詔司農寺出坊場錢十萬緡賜導洛通汴司增給吏兵食錢內以二萬緡給范子淵為固護黃河南岸薪芻之費上批聞兖鄆徐濟等州久無雨榖麥失望人情不安雖已遣內臣往東嶽建道場可更遣禮官祈禱又批廣西春旱特甚其令安撫轉運司訪名山靈祠祈禱又詔河北東路提舉常平倉司所散濵棣滄州飢民食至五月止封濮安懿王第十一女梁鑄妻仁夀縣主為同安郡主第十八女夏大醇妻崇德縣主為永嘉郡主不俟大禮給俸舊制再經大禮方給故也命江南西路轉運判官彭汝礪提舉兩浙路常平等范峋就潤州推鞫吕嘉問事詔嘉問權罷潤州嘉問以前知江寧責臨江軍事在眀年正月壬午江東監司奏乞罷嘉問潤州事在去年十二月癸卯環慶路都鈐轄皇城使帶御器械梁從吉領昌州刺史從吉在環慶厯四任故特遷之辛亥以新科眀法及第王壬為試銜知縣律學教授壬子遼使辭置酒紫宸殿不作樂以乙卯有司薦饗太廟是日齋故也乙卯廣南西路經略司言賔州瘴癘加以兵火之後難得官願就乞差殿中丞吳潛知賔州從之司勳員外郎韓晉卿知夀州晉卿自大理出知同州上批晉卿非次替罷可特與一見闕故從之詔導洛通汴用是月甲子興工遣禮官祭告如河道侵冢墓量給錢令遷避無主者官為瘞之賜固護黃河南岸卒特支錢丙辰廣南西路經略司言順安州貢洞等舊𨽻雍州昨宣撫司因收復廣源分𨽻順州乞還舊𨽻從之丁巳鎮江節度使同平章事秀國公陳升之致仕直學士院安燾草辭有云尹躬一德共嘉同體之和説命三篇獨先注意之任卒有成績基於始謀御史舒亶指此六句以為悖禮失實詔燾改之乃盡去六句止云早從士論擢典冡司貼麻行下後二日升之卒贈太保中書令輟視朝二日成服於苑中諡成肅升之深狡多數善傅會以取富貴丹陽居第壯大踰制南方人驚詫以為未識其它豪侈類此舊紀並書致仕紀但書卒上批聞知鄜州尹寶臣有子三班奉職抃妙知為弓能辨六材令乘驛赴闕詔西上閣門使嘉州團練使知保州張利一及三年與代定州路都鈐轄再任從安撫使韓絳奏也己未廣南西路經略司言蠻冦順州乞濟師上批可發潭州團結兵全將往桂州權戍庶可以鎮安二廣人心不致怯懼候邊事息追還知諫院李定言秀州嘉興崇德兩縣初定役法時以僧舍什物估直敷錢恐非法意下司農寺請下本路改正他路有類此者令提舉司依此施行從之庚申上批河北東路提舉官李孝純乞拘收諸路官司先借兑出本司錢榖可選差精敏有風力文臣一員兼委以拘催都水監借京東等路提舉司雇夫錢乃遣都官員外郎潘良器催促發還以龍衛廢營地賜衛國公主地與主第相直也主後以其地建法雲寺京西第五將言昨奉詔遣教頭二人教習馬軍各已精熟詔京西第五將提點刑獄司那官一員依案閲將兵馬軍格案試具合格人以聞既而上批勾當軍頭司內侍押班石得一往南路管勾葬事可因便委令閲視庶諳知次第不為將副所紿朝廷誅賞所加發必無妄遂改用得一辛酉鹽鐵判官提舉成都府等路茶場國子博士李稷權陜西轉運使兼制置解鹽使都大提舉茶場稷在長安州軍縣鎮創增侵街錢一路騷然與李察皆苛暴時人為之語曰寧逢黑殺莫逢稷察賜故陜西都轉運使屯田郎中直昭文館皮光弼家絹三百匹後復録其子彥仲為將作監主簿壻試將作監主簿不理選限趙仲邈許出官以轉運使范子竒等言公弼因出巡致疾乞優恤其家故也録子壻在七月二十日丁亥今并書廣西路經略司言得歸眀人戶三千三百七十五壬戍詔大理寺劾陳世儒留繫多日繼又推治初勘官不公及因緣請求遷延久未結正可遣御史黃顔監勘乙丑日可并提舉成都府等路茶場司請自今嵗課茶息稅錢已定十五萬緡嵗以五萬緡給轉運司餘以待詔用從之癸亥詳定正旦御殿儀注所言元會受朝賀執鎮圭非是伏請不執上夀凖此又言元會行禮於朝而天子服祭服羣臣服朝服亦非是請服通天冠絳紗袍又言御殿當設旗幟仍闢大慶殿門皇帝即御座禮官等引中書門下親王使相押諸司三品尚書省四品及宗室將軍以上班分東西入正安之樂作至位樂止羣臣不服劒不脫屨舄並從之此但舉其要而削其繁辭提舉成都府等路茶場司乞留銅錢百萬緡為本從之甲子知審刑院安燾言天下奏案視十年前增倍以上審刑院刑部詳議詳斷官視舊員數頗減乞復置詳議官一員又詳議官遍簽刑部斷案職事不専乞分議官六員每案二員連簽若情狀可疑未麗於法即議官通簽如此則疑難之獄得盡衆議眀白罪案不致留積詔增審刑院詳議詳斷官各一員罷刑部檢法官一員餘如燾請詔權判南京國子監駕部郎中鄭宗礪罰銅十斤致仕坐前知眉州失入人死罪會赦而宗礪年七十餘故也新紀於二十六日甲子日書導洛通汴蓋起役之日也六月十七日甲寅畢工三月二十一日庚寅可考乙丑詔知大理少卿蹇周輔丞葉武賈種民同黃顔鞫陳世儒事從顔請也手詔大理寺勘陳世儒惡逆事雖續根究世儒妻母因緣請求致軍巡元勘官改易情節變移首從故出入本罪世儒夫婦無緊切照證自可結正以聞可并壬戌及五月庚辰眀年正月庚寅武罷丞丙寅鹽鐵副使工部郎中李復圭為集賢殿修撰知滄州候二年與諫議大夫尋改知鄧州改鄧州御集在六月九日當考其故或並削去提舉成都府茶場李稷言洋州西鄉縣茶舊與熙河秦鳯路蕃漢為市而商人私販南入巴達州東北入金州永興軍鳯翔府官未置場以前於州界仙逰少府雞雄歸仁洋口等鎮鋪差牙校編攔抄發指州縣輸稅熙寧十年廢罷四場牙校止留洋口一處州縣慢令私販公行西鄉茶嵗比舊減少乞雞雄等場令州縣督責買撲人編攔歸仁鋪乞依舊輪差稅務牙校編閲抄發園戶中官茶數嵗以三十萬斤為額增及萬斤賞錢一千如虧少量事決罰從之司天監太卜令魏成象請宗室祔葬三品以上用輴車如禮文四品以下用􅀈轆車如舊例可減雇夫錢布禮院請如成象議從之初七日事今附月末
