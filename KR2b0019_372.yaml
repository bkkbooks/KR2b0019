body:
  text: 續資治通鑑長編卷三百六十八宋李燾撰哲宗元祐元年閏二月己丑朔右司諫蘇轍言臣頃論奏蔡確韓縝才不足用及多過惡乞賜罷免至今未見施行確近已上章求退而縝安然未有去意臣恐陛下隱忍不决久失天下之望竊惟先帝在位僅二十年厲精政事變更法度將以力致太平追復三代是以擢任臣庶至有起於小臣十餘年間致位公相用人之速近世無比者究觀聖意本欲求賢自助以利安生民為社稷長久之計夫豈欲使左右大臣偷合茍容出入唯唯危而不持顛而不扶竊取利祿以奉養妻子而已哉然自行法已來民力困敝海內愁怨先帝晚年寢疾彌留照知前事之失親發德音將洗心自新以合天意而此志不遂奄棄萬國天下聞之知前日弊事皆先帝之所欲改思慕聖德繼之以泣是以皇帝踐阼聖母臨政奉承遺㫖罷導洛廢市易損青苖止助役寬保甲免買馬放修城池之役復茶鹽鐡之舊黜吳居厚吕孝廉宋用臣賈青王子京張誠一吕嘉問蹇周輔等命令所至細民鼓舞相賀臣愚不知朝廷以為此數事者誰之過也上則大臣蔽塞聰明逢君之惡下則小臣貪冒榮利奔競無耻二者均皆有罪則大臣以任重責重小臣以任輕責輕雖三尺童子所共知也今朝廷既已罷黜小臣至於大臣則因而任之將復使燮理隂陽陶冶民物臣竊惟朝廷之意將以禮貌大臣待其愧耻自去以全國體今確縝自山陵以後猶端然在職不肯引咎辭位以謝天下臣謹按確縝受恩最深任事最久據位最尊獲罪最重而有􅌤靣目曽不知愧確等誠以昔之所行為是則今日安得不爭以昔之所行為非則昔日安得不言窮究其心所以安而不去者不過以為是皆先帝之所為而非吾罪也夫為大臣忘君狥已不以身任罪戾而歸咎先帝不忠不孝寧有過此臣竊不忍千載之後書之簡冊大臣既自處無過之地則先帝獨被惡名此臣所以痛心疾首當食不飽至於涕泗之橫流也確等皆碌碌常才無過人之實朝廷將取其德則不聞其孝弟可稱將取其才則不聞其功業可紀將取其學則不聞其經術可師徒以恱媚上下堅固寵祿陛下何不正確縝之罪上以為先帝分謗下以慰天下之望今獨以法繩治小臣而置確縝大則無以顯揚聖考之遺意小則無以安反側之心故臣竊謂大臣誠退則小臣非建議造事之人可一切不治使得革靣從君竭力自效以洗前惡臣不勝狂愚忘身為國乞宣示此疏使確縝自處進退之分臣雖萬死不以為恨又言臣竊觀蔡確所上表雖外迫人言若欲求退而論功攘善實圖自安所云收拔當世之耆艾以陪輔王室者臣謂當世之耆艾乃確昔日之所抑逺者也所謂蠲省有司之煩碎以慰安民心臣謂有司之煩碎乃確昔日之所創造者也此二者皆確為相無狀以纍先帝之明非陛下卓然獨見孰能行此確既不自引咎又反以為功著之表疏𫝊之天下則是確等所造之惡皆歸先帝而陛下所行之善皆歸於確臣不勝憤悶乞賜詳酌施行左正言朱光庭奏據編類章疏增入閏二月一日臣自供職以來纍具章疏言退三姦進三賢乞陛下早行睿斷以幸天下今日蔡確請去是天欲去一姦臣矣願陛下因其自請去之勿疑臣已兩進愚忠於天聽願陛下留神果斷以順天意外有章惇姦臣尚安厥位亦願陛下早行屏去竊惟惇之所為更甚於確自知素履不為清議所與向日妄作荆湖邊事欺罔朝廷僥幸大用自陛下臨御以來百端沮抑聖政肆為辨說內懷觀望動出俚語市井小人之不若今日蔡確請去竊恐惇猶次進設使若惇之小人進至宰輔則朝廷治亂從可知矣蓋任小人未有不亂之理臣願陛下察其姦慝早行屏去不可令更進大任以害生靈臣願戒之謹之深留聖慮又若韓縝素無行義不自度德因緣閥閲遂至大用然而內有賢兄外有賢士大夫顧利懷寵不為引避蓋只知爵祿之為榮不知名教之為貴可謂無耻之甚矣是亦固位之姦臣臣願陛下早行屏去勿使僥幸大任以遂其貪此三姦在陛下之朝如四凶之在舜朝舜能去之然後天下咸服恭惟陛下睿明公正冠越今古願法虞舜之所以去四凶以去今之三姦則太平可立而待臣所謂進三賢者亦嘗具聞於上矣今若蔡確先去則乞進司馬光補蔡確之闕進范純仁補門下侍郎之闕若章惇韓縝繼去則乞進范純仁補韓縝之闕進韓維補章惇之闕孔子曰舉直錯諸枉則民服臣願陛下特奮睿斷退三姦進三賢一舉錯而天下能事畢矣又何患太平之不成哉臣愚不勝惓惓貼黃今日治亂安危之所繫惟在陛下退三姦進三賢一舉錯之間耳此天下之幾事不可失也臣願陛下留神特奮睿斷施行御史王巖叟嘗入對極言蔡確隂邪巧佞深阻難知又擅自封殖耽寵固權未嘗以國家為念臣疏逺小臣於蔡確素無讎嫌於司馬光等亦非親舊但憤姦邪用意如此近日薦髙遵惠韓宗文張璡遵惠太皇太后之叔宗文右僕射韓縝之姪璡中書侍郎張璪之弟蓋其意不在三人而在諂其親不在諂其親而在資其身不知此等事合教天下人道姦邪否陛下虛心委政大臣隂陽不和非陛下失德皆大臣之過臣觀兩漢故事凡水旱災異則䇿免三公今自當䇿免之時此等人在左右極於官家無益上曰難得人對曰全材則難得優於此人者易得上又曰止為他受遺對曰啓陛下不可受遺後長占定此地位况自太皇太后已定大議此輩只是請得熟成濫為受遺其實何功之有假令受遺不知比韓琦如何韓琦厚陵復土後先帝堅留至竟求去又論蔡確縱弟碩不法曰碩少無行初為密州司理已嘗姦贓敗官坐廢於家則碩之所為確非不知也確方當國碩又嘗冒法於市易務賖羅九十匹段限滿不還官錢太府少卿吳安持發其事奏既上碩方從後使人納之僞為先納者反誣安持為妄言確遂付安持於吏議乃風諭知開封府蹇周輔逼脅安持不得已自誣服天下稱其寃確於是時復矯為奏章救解安持則是確與碩為餘地以縱其姦非一日矣碩為軍器監請自辟官二員經制軍器物料工部勘當斷以為不可忽從尚書省直降指揮如軍器之請碩辟官之私意確不容不知碩用度奢侈過於君相少監俸入能有幾何而饗奉如此確同居豈不見見之固當問所從來不當坐視而不問也今不黜確後日大臣子弟必自肆而不置意於法矣上曰待便行此並據王巖叟朝論增入庚寅正議大夫守尚書左僕射兼門下侍郎蔡確依前官充觀文殿大學士知陳州從所請也臺諫纍有章疏論確朝廷訖不肯正其罪世以為恨云蘇轍自序云蔡確韓縝章惇皆坐言者逐去然卒不以前後反覆歸咎先帝罪之世以為恨正議大夫守門下侍郎司馬光依前官守尚書左僕射兼門下侍郎光方以病再乞宫觀未報而有是命光固辭不許令閣門就賜光制書光又固辭乞留制書閣門須疾損入對又不許舊録云始確受遺輔立光乘變故入覲因得輔政挾怨酬君乃㸃確光即登用人主孤立天下寒心由是法度大變矣新録辨曰蔡確受遺輔立本無是事元祐時及安燾樞密所記備見其詳挾怨酬君之語可謂厚誣人主孤立天下寒心尤為誕謾略無忌憚一至于此始確至法度大變矣四十二字並刪去司馬光言臣聞書曰人惟求舊蓋以其歷事之多也夫老成之人輔相纍世如周之太公周公召公畢公唐之郭子儀裴度皆難得之賢臣也臣竊見文彥博沉敏有謀略知國家治體能斷大事自仁宗以來出將入相功效顯著此天下之所共知也年踰八十精力尚强臣初除門下侍郎日已曽奏乞召彥博置之百僚之首以鎮安四海尋䝉陛下遣梁惟簡宣諭以彥博名位已重又得人心今天子幼冲恐其有震主之威且於輔相中無處安排又已致仕難為復起臣當時新入朝恭承詔㫖更不敢復言今蔡確出知陳州以臣代之臣方敢再有叙陳竊惟彥博一書生耳年逼桑榆富貴巳極夫復何求非有兵權死黨可畏懼也假使為相陛下一旦欲罷之止煩召一學士授以詞頭白麻既出則一匹夫耳何難制之有震主之威竊恐防慮太過也若依今官制用之為相以太師兼侍中行左僕射亦有何不可儻不欲以劇務煩老臣則凡常程文書只委右僕射以下僉書發遣惟事有難决者方就彥博咨禀在陛下臨時優禮耳自古國家藉其才謀致仕復起者蓋非一人何為不可彥博今年八十一朝廷不過得其數年之力耳願急用之臣但乞為門下侍郎彥博為政庶亦時有小補今不以彥博為首相而以臣處之是猶捨騏驥而策駑駘棄璵璠而收碔砆臣竊為朝廷惜之臣今自書此劄子不令人見陛下若允臣所奏乞自以聖意行之若以已除臣左僕射難為無故以他人易之則臣欲露表舉彥博自代乞御批依臣所奏以臣表付學士院草麻施行不聽四月已丑乃召彥博資政殿大學士正議大夫知太原府吕惠卿知揚州正議大夫知瀛州謝景溫為寶文閣直學士知太原府景溫尋召入知開封府景溫知開封府在此月二十二日惠卿三月二十日宫祠三省言霍翔吕公雅提舉保馬不循詔㫖至減朝廷元立年限之半督責收買急圖己功兩路騷然民力困敝昨來雖各移任然其欺罔害民之罪未加絀責無以懲沮詔霍翔差管勾太平觀吕公雅添差監舒州鹽酒稅務詔堂除差遣除在京職事官外並替成資闕又詔已差官詳定役法令諸路且依二月初六日指揮定差仍令州縣及轉運司提舉司各遞與限兩月體訪役法民間的確利害縣具可施行事申州州為看詳保明申轉運提舉司轉運提舉司看詳保明聞奏仍令逐州縣出榜許舊來係納免役錢今來合差役人户各具利害實封自陳二月二十八日差官劉摯言免役錢之為天下害也久矣陛下一旦罷去復用祖宗差法中外罔不欣快臣尋曽奏乞堅守差法大意力行毋疑勿為異論所動其有條目未備措置未盡之事外則已於前敕許州縣監司申明內則巳䝉選官置局詳定今敕命若止於展限則可也而其間命令有未安者臣於是疑陛下於此法之意似已為異論所搖矣且命令之出要在必行豈可却云且行則天下奉承者豈不疑惑懷私之人豈不觀望又令舊納錢者今被差者皆具論列緣四海百姓向來無不納錢則是竭天下之人使之實封議法則求言無乃太廣乎實封之狀州縣必須疲於遞送其達於朝廷者計須山積則考閲何時可遍而所謂差役之法何年可見其成也不知誰建此論者蓋欲為遷延之謀動搖之術不意朝廷從而行之甚哉邪說之可以移主聽也故免役與差役利害明若觀火易見也參差不齊在所修立者其大不過十餘條目而已今已選官建局但宜趣具畫一宣布行下大法既先定如州縣奉行委有未便方聽依限申請然後隨事修備則豈不簡直易行而何用此紛紛以遂沮害之計召天下之疑哉伏望速賜契勘如已頒行即乞於敕內自仍令逐州縣出榜以下三十字更不施行又言先王順人情以立政故政令之行自合於人情莫不服也今設官建局以議大法但思所以便安於人可也何至遍問天下百姓使人為之說此古今所無也天下百姓實封之議雜然而至將如何去取哉此止欲稽滯以生變不可不察也王巖叟言臣伏以陛下差法大意已善而更欲曲盡事情故選用近臣令加詳定命出之日上下同詞稱為至當詳定官當自於新舊法中參取便事裁而成書頒之天下必皆允愜不須朝廷别降指揮更下四方惑亂衆心竊覩近降指揮全與前來敕意異同乃是為陛下謀者未容詳定先欲鼓紛紛之論以搖良法又前敕為已見民間免役之害故復差法而今敕方云限兩月體訪利害朝廷豈不知昨來四方應詔上書之人以千萬計皆是斥言免役不便足為信矣何須更煩體訪故作逗遛前日民言若不為信則後來之語如何可慿前敕不以委提舉司而今敕又令提舉司看詳保明朝廷豈不知提舉官多是護持弊法之人人人利於且為監司惟恐便行廢罷見此指揮必生觀望以為免役可存妄有陳述姦人得以藉口誑惑聖聰動搖善政誤陛下仁民愛物之良法伏望特賜收還近敕候詳定成法日别取㫖施行庶命令無反復之嫌中外無二三之惑閏月八日朱光庭王覿又奏初十日遂降指揮尚書省言禮部以掌貢舉為職伏見朝廷用經術設科蓋欲人知禮義學探原本近嵗以來承學之士聞見淺陋辭格卑弱其患在於治經者専守一家而略去諸儒𫝊記之說為文者惟務解釋而不知聲律體要之學深慮人材不繼而適用之文從此遂熄兼一經之內凡可以為義題者牢籠殆盡當有司引試之際不免重復若不别議更張寖久必成大弊欲乞朝廷於取士之法更加裁定又禮部言乞置春秋博士及進士専為一經又侍御史劉摰言伏見國朝以來取士設科循用唐制進士所試詩賦論䇿行之百餘嵗號為得人熙寧初神宗皇帝崇尚儒術訓發義理以興人才謂章句破碎大道乃罷詩賦試以經義儒士一變皆至於道夫取士以經可謂知本然古人治經無慕乎外故其所自得者內足以為已而外足以為政今之治經以應科舉則與古異矣以隂陽性命為之說以泛濫荒誕為之辭専誦熙寧所頒新經字說而佐以莊列佛氏之書不可究詰之論爭相夸尚場屋之間羣輩百千渾用一律主司臨之珉玉朱紫困於眩惑其中雖有深知聖人本㫖該通先儒舊說茍不合於所謂新經字說之學者一切在所棄而已至於蹈襲他人剽竊舊作主司猝然亦莫可辨蓋其無所統紀無所櫽括非若詩賦之有聲律法度其是非工拙一披卷而盡得知也詩賦命題雜出於六經諸子歷代史記故重復者寡經義之題出於所治一經一經之中可為題者舉子皆能類聚裒括其數豫為義說左右逢之才十餘年數榜之間所在義題往往相犯然則文章之體貢舉之法於此其弊極矣詩賦之與經義要之其實皆曰取人以言而已賢之與不肖正之與邪終不在詩賦經義之異取於詩賦不害其為賢取於經義不害其為邪自唐以來至於今日名臣巨人致君安民功業軒天地者磊落相望不可一二數而皆出於詩賦則詩賦亦何負於天下哉或取一詩賦或取一經義無異道也但有司所言之法有難有易有難有易故有利害有利害故去取或失其實則所繫者大矣然則法不可以不改也臣愚欲乞試法復詩賦與經義兼用之進士第一場試經義第二場試詩賦第三場試論第四場試䇿經義以觀其學詩賦以觀其文論以觀其識策以觀其材前二場為去留後二場為名次其解經義仍許通用先儒傳注或已之說而禁不得引用字解及釋典庶可以救文章之弊而適乎用革貢舉之弊而得其人亦使學者兼通他書稍至博洽又言漢制因天見災異或政有闕失則詔郡國及在位舉賢良文學之士天子親䇿以求其言至於國朝沿襲故事於是置為賢良茂材科目隨貢舉召試其於得人視古為盛近時之制遂罷此科臣竊以為國家之道得士欲廣故取之非一途謂常選不足以致異人故設制科以收超絶之才而每舉中等不過一二人而已今夫官人之法入流門户日益增多未有澄汰而於三年取一二非常之人則廢其科不用此何謂也臣愚欲乞復置賢良方正及茂材異等科每遇貢舉詔近臣依舊制舉試所以廣言路求人材繼祖宗之制也又言近制明法舉人試以律令刑統大義及斷案謂之雜科明法登科者吏部將司法員闕先次差注在進士及第人之上臣竊以先王之治天下以禮義為本而刑法所以助之者也惟君子用法必傅之以經術法之所治理之所在也故惡有所懲而常不失忠恕之道舊制明法最為下科然其所試必有兼經雖不知其義而止於誦數而先王之意猶在也今新科罷其兼經専於刑書則意若止欲得淺陋刻害之人固滯深險之士而已又所取之數比舊猥多調擬之法失其次序臣以謂宜有更張欲乞新科明法並加論語孝經大義登科之額裁減其半及注官之日並依科目資次所貴從事於法者稍不逺義而士之流品不失其分伏望聖慈裁酌如賜開允即乞今年降詔並自元祐五年秋賦為始詔禮部與兩省學士待制御史臺國子司業集議聞奏所有將來科場且依舊法施行舊録云侍御史劉摯言乞貢舉進士添詩賦復置賢良茂材科新科明法添兼經大義及減人數詔禮部與兩省學士待制御史臺國子司業集議聞奏所有將來科場且依舊法施行先帝迪士以經術罷雕蟲篆刻之習士始知義理之學摰遽言復之新録辨曰國朝用詩賦取士得人為多至是復祖宗之舊摰乞添詩賦非不用經術也自先帝迪士至遽言復之二十六字並削去新舊録於摰所言才舉一二語今全録之此後或可載司馬光議自三月五日移入此據范純仁謂光元宰則附三月五日為允此年四月三日六月十二日十一月二十四日二年十一月十二日三年九月九日十一月十日詔嵗舉官升陟者承務郎以上並依合舉改官及充幕職官縣令之數大使臣准小使臣法通判許舉承務郎以上依知州舉充幕職官之數詔河北逐路總管副總管更不兼將並令提舉訓練覺察本路軍馬公事又詔府界五路提舉保甲司指揮州縣如有見送納軍器若不是非理損壞不堪或事件不全止據見在受納不得須令修整賠填仍曉示若有隱藏換易元給官弓弩者限一月首納特與原罪限滿不首即依私有禁兵器法告賞禮部言董戩等貢乳香及溫錫沁貢犏牛合行回賜詔並增二分賜之其鄂特凌古近差到進奉首領等仍並依董戩改賜例支賜詔以右正言蘇轍所論蜀茶五害劄付黃廉其蒲宗閔仍不得預簽書事二月二十四日轍論蜀茶五害己見本日涇原經略司言西界蕃部哩博晉巴投報西賊㸃集得實詔哩博晉巴與都虞候仍於近裏族分住坐陜西轉運副使吕大忠言乞延渭秦慶州永興軍通判許本司選定奏差一次從之蘇轍言臣近奏乞取問開封府官吏明知熙寧以前舊法役人數目顯有冗長並不依近降指揮相度申請便盡數差撥及朝㫖本無日限輒敢差人監勒於數日內蹙迫了當故意擾民以壞成法乞賜行遣以戒天下挾邪壞法之人至今未䝉施行謹按權知開封府蔡京職在近侍身為民官若不知舊法人數之冗是不才若知而不請是不忠京新進小生學行無聞徒以王安石姻戚蔡確族從因緣幸㑹以至於此近者段繼隆公事道路皆知其私徇繼隆出於胥吏兄弟數人布列三省京嘗為檢正官與此輩狎昵繼隆贓汙顯露理在不疑而大理寺官吏畏避觀望數月不决今者方欲推行差役舊法王畿之政為天下表儀而使懷私之人竊據首善之地四方瞻望何所取法乞賜指揮先罷京開封府仍敕大理寺疾速結絶前件公事所貴官吏不至觀望首鼠以長姦私先是有李雍者經開封府訴知濟州段繼隆賣進奉恩澤蔡京初判追人事連門下省守闕令史段處約當申省京已判申字尋抹去止判追餘人就問處約及處約分析到即令勘雍吏言處約偏辭恐未可信京遂抹勘字别判放字不復究雍所訴事既而御史臺察舉詔送大理寺依法施行處約兄處厚中書省令史弟處信尚書省令史兄弟三人並𨽻三省京前任中書檢正繼隆乃堂後官京曲法庇之故臺諫皆以為言也此月十八日蘇轍又言大理寺未曽結絶辛卯詔新除觀文殿大學士知陳州蔡確如前宰相儀朝奉大夫天章閣待制知成德軍劉瑾卒閏二月三日壬辰金紫光祿大夫尚書左丞吕公著為門下侍郎給事中王震為龍圖閣待制知蔡州震初附王安石以進及司馬光當國震心不自安欲引去㑹光以州郡讞獄情理可憫刑名疑慮得貸者衆雖有生比不肯用震見光省中曰天下奏案一耳前此例貸死今何殺之光曰刑輕於古致民易犯矧刑名疑慮引例求貸皆古所無震曰漢約法三章傷人及盜抵罪今盜固有至死者罪疑從輕與其殺不辜寧失不經皆聖人在上憫元元之意也且漢有决事比何謂無之明日以光所斷當生而殺者具其名數誦言於朝而御史王巖叟纍奏言震不當居封駮之任乃命出守舊録云司馬光變亂法度震度不能爭云云遂求補外新録改云司馬光為相震心不自安餘並從舊録然誦言於朝事尚須考詳未可信也巖叟言附震初給事中時去年十一月十四日甲戌又去年七月甲寅八月癸酉可考光祿大夫知揚州滕元發為龍圖閣直學士知鄆州朝議大夫倉部郎中王說知密州劉摰有言朝請大夫鴻臚少卿韓正彥知曹州朝議大夫前知洪州孔宗翰辭司農少卿乞依世家例知兖州奉孔子祀從之宗翰除農少在去年十一月丙申今并此環慶路經略安撫使范純粹奏乞差監中嶽廟編修禮部貢籍文字承議郎韓川管勾本司文字從之舊録有此新録削去要見韓川本末故特存此川賢者當立傳而史闕之當并考詔府界提㸃磨勘司見催扶溝縣人户耗草及鄢陵縣人户肉臟錢特與除放新録刪去三省言元豐八年三月六日赦恩以前命官諸色人被罪今來進狀訴理據案已依常法慮其間有情可矜恕或事涉寃抑合從寬減者欲委官看詳聞奏詔御史中丞劉摰右諫議大夫孫覺看詳以聞十八日孫升言可考江南西路按察司言荆湖南路舊賣淮鹽蹇周輔請般廣鹽數百萬代淮鹽差轉運判官陳偲等相度湖南路般運廣鹽往全道郴州桂陽監出賣却將四處所賣淮鹽均於衡潭等州添賣蹇周輔鹽法抑勒騷擾亦乞運廣鹽而陳偲張士澄附㑹推行周輔之法頓增鹽數肆行抑配除陳偲已死詔張士澄特衝替送吏部與合入差遣初委陳偲張士澄在元豐六年十二月甲申八年四月丁丑初遣陳次升察舉江西五月戊申次升兼領湖南元祐元年二月蹇周輔等先責是月末吕陶論鹽事尤詳詔户部勘㑹應係諸色缺負窠名數目若干係官本若干係息或罰及逐户已納過息罰錢數并拋下免役及坊場淨利等錢仍以缺户見今有無抵當物力速具保明以聞從蘇轍甲戌所奏也二月十五日甲戌蘇轍具奏舊録云先帝理財裕民足國轍以為重斂致旱其後省併罷廢無所不至而水旱連年新録辨曰省併罷廢所以寬民力也因此而致水旱連年豈其理哉自先帝理財至水旱連年三十字並刪去閏月二十九日丁巳改此指揮右司郎中張汝賢言准朝㫖按察福建路州軍比年增起鹽額之弊就四州軍所苦為甚者較之則邵武軍立額最重受害尤深行法之初知軍張德源務在增羡過有抑配將樂知縣楊永天資殘忍用刑慘酷宣化知縣趙侁光澤知縣曹格因緣趂賣决人稍多雖在赦前伏望特行黜責內楊永仍乞候南劍州奏到其餘罪犯公案一處照㑹詔張德源特衝替趙侁曹格差替楊永候案到令刑部奏取指揮楊永後如何行遣當考録故左侍禁李公度男適為三班差使公度監熙州市易務市糴場收息計緡錢一十八萬有畸故也復慶州平戎鎮中丞劉摯監察王巖叟入對當在初四日但實録不載耳當考甲午右諫議大夫孫覺右司諫蘇轍進對有㫖俟簾下內臣盡出方得敷奏此下附覺轍劾韓縝疏轍有月日可見覺必與轍同須覺集考證乃善邢恕孫繹録其祖父言行有云莘老與蘇子由首攻韓縝雖所言未必可信然兩人同時上章或不虛耳繹録已附正月二十四日癸未覺言臣竊見右僕射韓縝素無德望稔有愆惡百揆之任非縝所宜前後臺諫臣僚章疏不一未聞縝有避位之心臣不勝憤悶以為朝廷今日四方窺測之時天下延頸之際必得重德偉望才謀出世之人以為輔相則敵人不敢外侮姦雄不敢生心自縝在位敵使見之相顧失笑適足以貽朝廷之羞增邉陲之氣唐宰相裴度功名震異域使外國者其君長必問度年今幾何狀貌孰似天子用否其威名德業比郭汾陽而用不用常為天下重輕今者皇帝陛下春秋尚幼太皇太后陛下垂簾聽决此宜旁求遴選有德有望內足以操制姦雄外足以厭服邉境與司馬光同心一德佐佑聖政維持紀綱天下幸甚韓縝物情不歸人望不屬言者紛紜久煩聖聽遲遲不急免罷深恐為朝廷生事轍言臣伏見陛下採聽羣言罷左僕射蔡確中外釋然具知朝廷清明邪正曲直不可復欺而右僕射韓縝獨端然據位略無動意衆情疑惑臣忝備諫官不敢默已謹按韓縝才質凡鄙性氣粗暴文學政事舉無寸長比之蔡確逺所不及陛下聖明必無賢縝之理特以先帝新棄天下未欲從外别擢宰相不免循例以次遷補今已逾年即位改元政令一新確既已罷去而縝任遇如故是以衆議紛紛未肯弭服臣聞韓縝家法不正雖其父子不能相安涖官猛暴至以酣酗鞭殺指使過惡雖著而無與國事臣不敢一一煩言如縝昔奉使定契丹地界舉祖宗山河七百餘里以資敵國坐使中華之俗陷沒契丹敵人得乘髙以瞰并代朝廷雖有徑兵良將無所復施其後擢為樞密使職在安邉而西戎無釁用兵深入至使諸將敗衄前後喪師數十萬衆天下疲弊帑廪空竭雖得蘭州及安疆米脂等五寨地而厲階一生至今為梗存之則耗蠧中國為禍日深棄之則戎人不請無緣强與遂使朝廷皇皇議論經年不知所出而縝曽無計以救前失據縝二罪雖伏斧質以謝天下不為過也而况備位宰相以來怙勢作威任情不法羣下􅍅􅍅側目畏之宗道宗古皆縝之親姪縝任在中書職當進擬並引二姪同升列卿因臺官彈奏始自舉覺各與降等差遣朝廷知其不可信任遂令三省自此同書進擬縝之兄絳移守北京絳守北京在八年八月八日知父子無同領帥權之理而乞以其子宗師同管勾安撫司公事知轉運判官以按察已而乞以所親信人杜純為之杜純以權發遣河北運判為運判在八年十二月二十四日宗師同管帥事實録不書必抽回指揮故也壞法亂紀莫斯為甚縝公行私意廢法狥兄以行其言父子同領大權古無此事惟東晉之衰司馬道子與其子元顯共執國政自非季世安有此例賴陛下聖明抽回指揮若其不然遂為四方口實臣又竊觀言事之官每有論奏縝事縝懷忮恨不拘久近或罷其言職或因事責降必報而後已先帝朝翟思為臺官言縝在樞府令所轄邉將買馬虧價自羣牧司遷官盜使公使庫錢不還先帝隱忍不行翟思近以司業作詩失韻非有大過而縝逐思止與知軍差遣縝初作相臺官黃降言縝平生過惡不堪大用陛下業巳用縝未欲即罷縝畏其復言除降國子司業雖似遷擢實奪其言事之權是以羣臣震懾不敢忤縝臣知今日言縝異日縝必報臣然念臣起於遷逐之餘誤䝉聖恩收拔至此不敢上負朝廷下辜公議是以為國排姦有死無二惟陛下裁察三省自此同進擬文字與八年七月戊戌九月乙已此年正月末劉摯所言合參考朝請郎司門郎中吕陶為殿中侍御史從御史中丞黃履侍御史劉摯所舉也二月四日履已罷中丞十三日摰巳除中丞不知新舊録何故如此書或是二人先曽薦陶當考承議郎殿中侍御史劉次莊為江南西路轉運判官次莊之出必有因依當考左正言朱光庭奏據編類章疏增入閏二月五日臣纍具奏陳乞行睿斷屏去姦臣以幸天下今蔡確一姦臣退矣中外之臣莫不嘆服朝廷剛決之明實宗廟社稷之福外有章惇韓縝二姦臣未退竊惟天下大任非姦臣所當處如章惇之輕肆鄙俚敢為邪說以沮抑聖政韓縝之冒寵固位不知引避其賢兄是皆天下之姦臣去之則朝廷清明矣伏望聖慈檢㑹臣前後纍奏特賜睿斷施行貼黃今日既用司馬光為宰相又用吕公著為門下侍郎矣所有尚書左丞闕乞用范純仁補之天下大政得此衆賢然後大治臣願陛下留神又貼黃臣纍奏乞退三姦進三賢今蔡確一姦退矣章惇韓縝不知進退廉恥之分臣願陛下特賜睿斷施行右諫議大夫兼侍講孫覺為給事中覺言臣竊聞有㫖除臣給事中聖恩深厚所不敢當然臣伏見前後執政大臣每臺諫臣僚言有及之者多遷官以寵之使罷言職尋即令人剔發微細過差逐之使去以報其私忿今言事官不顧大臣之威斥言其罪乞行黜免者所以報主上之恩行言守之責也至有人言未絶於口而身已擯於外不惟人主威福移於大臣之家又使上為朝廷不顧忌諱直節敢言之士栗栗危懼不保其身豈不可為朝廷惜哉臣近因御史翟思在神宗朝論韓縝受人私饋馬先朝不為施行擢思為國子司業思進神宗挽詞誤落韻亦小過且言者及之謫守臨江軍御史黃降言縝為相非才即遷降國子司業罷其言職臣見仁宗朝言事臣僚為國盡忠於大臣無所避忌者仁宗終始保全之故言者敢直言以報國恩一時名臣多由此出如臣微眇流落於外十有五年神宗晚嵗始賜召還皇帝陛下太皇太后陛下臨政之始首䝉擢置經筵去年九月中始供諫職如臣愚賤前後言事不合聖意者不可勝數宜在斥逐之日久矣今者䝉恩遷給事於臣之私極為榮幸然臣前後論縝未䝉施行一日去職使縝得挾怨中傷臣實未知死所今日在得言之地尚可布露本末為陛下言之一日去職怨嫌已成恐如翟思黃降臣雖欲自辨不可得也伏望聖慈特賜指揮收還給事中新命使臣且供諫職他日韓縝去位之後别有差遣臣不敢辭後二十日詔覺復為諫議大夫二十六日甲寅覺復為諫議大夫覺又言竊見已降制除司馬光左僕射中外歡慶以為得人然臣見光論役法文字頗或疏略尋有聖㫖更差韓維等四人専切詳定立法推行可以永久矣光之學業行義羣臣莫與比者如更得忠亮篤實才識敏明之人相與左右揆度則萬務無不舉矣今韓縝人品汙下才薄望輕先朝以為樞密院都承㫖本不以輔相期之也陛下臨御未幾擢為右僕射士大夫無不失望今左相之位以處司馬光論者以為得矣韓縝尚為右相則賢不肖混淆人才雜處所謂氷炭同器也伏願聖慈罷縝相位别求賢才使與司馬光協心共濟則天下不難治矣惇雖小有才而為性强愎操心不公廟堂之上以惡言相加所謂具瞻之地若此可乎張璪暗繆荒疏尤非所處若惇與璪可並罷去伏乞别賜推選有德有言堪其任者擢以代之詔自今觀文殿學士資政殿大學士班序雜壓並在六曹尚書之上資政殿學士曽任執政官者准此先是門下侍郎司馬光言竊以洪範八政食貨為先故古者國用必使冢宰制之祖宗之制天下錢榖自非常平倉𨽻司農寺外其餘皆總於三司一文一勺以上悉申帳籍非條例有定數者不敢擅支故能知其大數量入為出詳度利害變通法度分畫移用取彼有餘濟此不足指揮百司轉運使諸州如臂使指朝廷常遴選健吏精於理財者為三司官如陳恕林特李參之類皆稱職有名者也其餘非通曉錢榖者亦罕得叨居其任理資序受厚俸而已故倉庫充溢用度有餘民不疲乏邦家乂安自改官制以來備置尚書省六曹二十四司及九寺三監各有職事將舊日三司所掌事務散在六曹及諸寺監户部不得總天下財賦既不相統攝帳籍不盡申户部户部不能盡知錢穀之數五曹各得支用錢物有司得符不敢不應副户部不能制户部既不能知天下錢榖出納見在之數無由量入為出五曹及內百司各自建白理財之法申奏施行户部不得一一關預無由盡公共利害今之户部尚書舊三司使之任也左曹𨽻尚書右曹不𨽻尚書天下之財分而為二視彼有餘視此不足不得移用天下皆國家之財而分張如此無専主之者誰為國家公共愛惜通融措置者乎譬如人家有財必使一人専主管支用使數人主之各務已分所有者多互相侵奪又人人得取用之財有增益者乎故利權不一雖使天下財如江海亦恐有時而竭况民力及山澤所出有限制乎此臣所以日夜為國家深憂者也今縱未能大有更張欲乞且令尚書兼領左右曹侍郎分職而治其右曹所掌錢物尚書非奏請得㫖不得擅支諸州錢榖金帛𨽻提舉常平倉司者每月亦須具文帳申户部六曹及寺監欲支用錢物皆須先關户部符下支撥不得一靣奏乞直支應掌錢物諸司不見户部符不得應副其舊日三司所管錢榖財用事有散在五曹及諸寺監者並乞收歸户部若以如此户部事多官少難以辦集即乞減户部冗末事務付間曹比司兼領而通𨽻户部如此則利權歸一若更選用得人則天下之財庶幾可理矣是日詔尚書省立法七月二十四日乃施行舊録云先帝董正治官各有常守左曹典司邦國常用右曹治常平斂散不相紊今遽奏改新録辨曰財用並歸户部事權出於一此於先帝董正治官之意不相紊也自先帝董正治官至今遽奏改三十二字並刪去司門郎中吕陶言初熙寧十年朝廷依李把蒲宗閔劉佐等起請盡數榷買川茶收息出賣逺方不便本州茶户纍有陳訴及堋口茶場減價虧損園戶臣嘗三具論列已䝉施行後來李稷貪功急利欺罔滋甚皆臣論奏後來寖生弊害嵗月愈久為患愈深近聞遣使入川按察所有臣昔年奏狀并今來條析利害伏乞詳酌指揮詔劄與黃廉吕陶所論茶事大扺不過蘇轍二月二十四日所論五害疑轍得之陶也今不復重出樞密院言武臣戰功酬奬自來不以諸司使副大小使臣每一資並於見任官上改一官內皇城使一資便轉遙郡刺史或除入橫行并閣門使以上每一資亦轉一官即此其餘大小使臣改轉輕重未為均當詔閣門副使左藏庫副使以上每兩資與轉一官客省使及皇城使以上每三資與轉一官以上應減年者並回授有服親應轉資者每資轉一官或循一資即不得轉至朝奉郎及諸司副使并幕職州縣官改官應減年者對減磨勘年限不同者依賞格准折詔陜西河東緣邉諸巡綽把截探事人接引到西界投來彊壯人口每名支錢二貫即將投來人殺戮妄作鬬敵獲級冒求恩賞者許人告捕每名轉一資新録削去河東路經略安撫司言火山軍北界順義軍牒理㑹壘起石牆事已指揮緣邉安撫司依前後朝㫖審度便毁拆及重别定寫牒北界牒本去訖詔可二月辛已并此月丙午可考樞密院言元豐四年陜西河東兵進討權宜重立賞格誘激將士以備大敵自獲級重傷等第轉資外重加賜絹及捕獲分釐功五等之賞並特優厚所以酬大陳之功昨自還塞後來凡遇巡綽探事之類逢賊鬬敵因循尚用此格顯涉僥幸看詳除所立功狀尤異合臨時取㫖推恩外令别修立捕獲賞格從之丙申詳定役法吕大防孫永韓維范純仁進對太皇太后曰役法大事自來出役錢人下户不易卿等各宜子細仍辟屬官四員曽歷知縣差遣者要知民事又曰今後文字直降卿等戊戌十日詔可考舊録云元祐間哲宗恭默聽政簾幃處分皆非宣仁所言乃司馬光吕公著吕大防前為供具節目擬入宣諭之狀陳衍謄寫作榜目以御侍小宫人執持假口宣示蓋政柄實出於姦人之言也新録辨曰哲宗皇帝嘗曰宣仁婦人之堯舜也觀宣仁嘗為羣臣言知卿等公正朝廷有闕失一一言之知人為難堯舜猶然蓋亦以此道自處而已史官乃以元祐間簾幃處分皆大臣前一日供具節目中官録之御侍執持假口而宣示之豈不厚誣聖德故刪去之命宰臣司馬光提舉編修神宗皇帝實録著作佐郎范祖禹為實録院檢討官校書郎孔文仲為禮部員外郎詔皇太妃殿每遇聖節及生日各更與骨肉一名恩澤司馬光言臣聞書稱明王立政不惟其官惟其人臣少時見天聖中諸路止各有轉運使一員亦無提㸃刑獄惟河北陜西以地重事多置轉運使兩員然朝廷必擇朝士纍任知州有聲迹曉錢榖者乃得為之未嘗輕以授人凡一路之事無所不總使按察官吏薦賢發姦愛養百姓興利除害或朝廷有本路事務未能細知利害者則委之相度措置當是之時官少民安事無不舉公私饒樂海內宴清景祐初始復置提㸃刑獄其後或時置轉運判官以其冗長害事尋復廢罷自王安石執政以來欲力成新法諸路始置提舉常平廣惠農田水利官其後每事各置提舉官皆得按察官吏事權一如監司又增轉運副使判官等員數皆選年少資淺輕俊之士為之或通判知縣監官資序及選人以權及權發遣處之有未嘗歷親民即為監司者能順己意則不次遷擢小有乖違則送審官院與合入差遣更加責降彼年少則歷事未多資淺則衆所不服輕俊則舉措率易歷事未多故措置百事往往乖方衆所不服故依勢立威以行號令舉措率易故慮事不熟壞法害民又利祿誘於前罪戾俟於後由是往往上不顧國家事體下不恤百姓怨咨止務希合以圖進取致今日天下籍籍如此皆由此來也陛下幸念民惟邦本本固邦寧知元元困窮於國家非便欲救而安之詔青苗錢不得抑配免役錢寬剩不得過二分竊聞諸路提舉官州縣猶有於春首抑配青苖錢勒百姓供情願狀别作名目占免役寬剩錢但取文具而已如此則朝廷號令廢格不得行於臣下恩澤壅塞不被於黎民徒存空文何以為政臣聞去草者絶其本救水者塞其原提舉官者乃病民之本原也陛下必欲蘇息疲瘵乞盡罷諸路提舉官其轉運使除河北陜西河東外餘路只置使一員判官一員提㸃刑獄分兩路者合為一路共差文臣兩員凡本路錢榖財用事悉委轉運使刑獄常平兵甲賊盜事悉委提㸃刑獄管勾仍選知州以上資序纍歷親民差遣所至有政迹聰明公正之人方得為監司聰明則知官吏賢不肖公正則黜陟無私部下官吏皆得人事務安有不幹集百姓安有不富庶此乃國家鎮撫四方之本也若以提舉官纍年積蓄錢榖財物不少恐轉運司一旦得之妄有耗散即乞盡樁作常平倉錢物委提㸃刑獄一面交割主管依舊常平倉法謹伺榖價賤糴貴糶及准備災傷賑貸其餘不得支用若轉運司委的窘乏須至兊那常平錢物者必須具數先奏朝廷得㫖乃得移牒支破若以監司數少路分濶逺處巡歷及管勾不辦即乞只依舊法每嵗遍巡諸州更不遍巡諸縣非要事不令監司親往勾當只令選差本部官除司理司法縣尉獨員監當之類舊條不許差出外其舊條不得隔州差選人勾當差及被差之人皆有罪新條諸州管勾及主簿當給散月分不得令差出之類指揮更不施行所貴監司有官可差幹得事務若遇有賊盜乞朝廷只委提㸃刑獄差官或行移文字監督捕盜官捉殺不令親入山監逐如此則監司巡歷管勾職事簡要易為辦集矣詔諸路轉運使除河北陜西河東外餘路只置使一員副使或判官一員其諸路提舉官並罷提㸃刑獄分兩路者合為一路共差文臣兩員本路錢榖財用事悉委轉運使刑獄常平兵甲賊盜事悉委提㸃刑獄司管勾其轉運使副提刑今後選一任知州以上轉運判官選通判一任實曽歷親民差遣並所至有政迹人提舉官纍年積蓄錢榖財物盡樁作常平倉錢物委提㸃刑獄交割主管依舊常平倉法監司今後每嵗遍巡諸州外更不遍巡諸縣如差本部官勾當除司理司法縣尉獨員監當之類舊條不許差出外其舊條不得隔州差選人勾當新條諸州管勾官及主簿當給散月分不得令差出之類指揮更不施行賊盜委提㸃刑獄差官或行移文字監督捕盜官捉殺察其不稱職及有可以代之者先令權攝仍奏乞替換許一靣相度賊盜强弱立賞錢數目其捕盜官若有功許隨功大小保明聞奏朝廷臨時詳酌比類恩澤直降賜指揮五月二十九日上官均疏七月二十一日劉摯疏皆云閏二月八日聖㫖罷散青苗當考詳增修舊録但書司馬光言諸路轉運使除河北陜西河東外餘路置使一員副使或判官一員其諸路提舉官並罷提㸃刑獄分兩路者合為一路共差文臣兩員從之提舉官専行苗役之政法官隨罷焉新録惟削去提舉以下十五字餘並用舊録今以光奏疏及當時頒下條貫增入吏部尚書吕大防等言國朝之制奉僖祖皇帝太祖皇帝太宗皇帝以配郊丘外所有季秋大饗自唐及本朝皆用嚴父之義伏請宗祀神宗皇帝於明堂以配上帝詔恭依試給事中兼侍講范純仁言近除門下侍郎吕公著文字並不經臣書讀兼不見得尚書吏部合與不合將不經門下省文字直便行下及慮别有被授指揮按門下省自來繳覆中書省録黃樞密院録白內有與侍郎妨礙或是親戚並於親書名下具貼黃聲說奏知欲今後如係侍郎兩員俱係合避親及有妨礙或只係獨員有上件因依除依舊奏知外許給事中繫書繳覆詔令别出畫黃送門下省仍今後急速不係出告文字不過門下省並關門下省照㑹兵部言提舉京西保馬司奏准朝㫖京西路見管保馬令取㑹本路及陜西路將下見闕馬軍分數并馬鋪據格尺依條支填合銷分數外餘數起發上京赴太僕寺送納其牝馬並送同州沙苑監不及格尺並病色不堪支配者並烙退印給與人户令取便變轉止納元給官錢具到看詳申請事件仍乞令京東路准此從之新録削去陜西轉運司言永興軍藍田縣巡檢下兵校于千與王冲格鬬死詔于千支賜給付本家男特與下班殿侍新録削去樞密院言每旬諸軍呈試內槍刀手與弩手格鬬欲乞止令軍中依舊教習更不呈試推賞從之又言走馬承受近年凡遇軍行多以親戚請託僥幸功賞欺罔百出蓋自來未有條禁今欲隨軍出入不以將帥功效大小並不得陳乞推恩違者以違制論如能覺察軍中將帥貪冒功勞賞罰不當申奏功狀虛妄並密具聞奏朝廷根究得實當優與推恩及走馬承受親戚門客親隨等並不得隨軍效用雖著功勞亦不在酬賞之限如故隱匿虛稱不是親戚等冒求隨軍效用因而酬賞者犯人决配走馬承受并知情官司並除名許人告以犯人所受恩澤充賞從之鄜延路經略司言順寧寨主許明申稱西人葉烏瑪等來界首言興州衙頭差下賀登寶位人使多時為國信不來未敢過界詔鄜延路經略司指揮保安軍如西人再來計㑹即答與昨來皇帝登寶位為夏國未修常貢朝廷難為先遣押賜使命若夏國差人賀皇帝登寶位朝廷必須依例差人宣賜如西人將到公牒亦仰依此意回牒仍令經略司如牒過使副姓名過界月日即令鄜延路經略司依舊差官引伴户部言京西路轉運司奏本路諸州軍遞年支俵豫買錢各闕乏欲乞於本路南北提舉司借錢三十萬貫俵散候納到絹帛只於常平庫收掌候本司逐旋支撥到價錢據數交絹從之新録削去禮部尚書韓忠彥等言奉聖㫖皇太妃應干典禮儀衛等事令翰林學士給舍尚書禮部太常寺官同共以故事詳定聞奏令比附參酌定到格目又言看詳皇太妃生日止有皇帝所奉禮物别無太皇太后所賜止合稱奉賜己於格內貼正外其興龍節坤成節皇太后生辰排當所稱奉賜即係總稱合存奉賜兩字又言今除已依先降朝㫖將生日節序物色減定外有取㑹到皇后閣大禮宣賜太史進歷日等即不係生日節序事元不准朝㫖詳定今來若行修定稱進及賜之類即合降㫖施行詔皇太妃歷日已降指揮供納其不係生日節序事內有係奉賜之物仰詳定聞奏京西北路提舉司言准朝㫖相度蔡州西平上蔡兩縣人户見佃屯田支移等事欲止令人户畝出租課外更不支移折變詔户部相度以聞左正言朱光庭奏編類章疏係閏二月八日臣伏覩近降朝㫖以司馬光建明差役法大意已善差韓維吕大防孫永范純仁専一詳定聞奏臣又竊聞閏二月二日朝㫖下轉運司俾天下州縣百姓各陳利害臣竊惟司馬光建明差役法陛下知其大意已善故更詔韓維等四臣詳定所以講求未備事理務要詳盡以成治世之良法豈可命下方數日不待四臣講求一二遽却令天下州縣百姓各陳利害前後詔令不一臣竊慮姦臣為此畫以惑天聽意欲搖動善法以行姦計竊以差役之法大意已善其間如衙前人額并官户等所出助錢及役人接送之類更行詳究裁定便成完法可以頒之天下此朝廷一大政事輔臣言之陛下處之已盡善矣而深恐姦臣之謀幸其枝葉未備遂欲移動根本故却令提舉司轉運司同共相度緣提舉司係専領免役法今來既行差役則提舉司當罷而慮姦臣求衆邪為助故使欲罷之官司亦預其事此姦謀至深至密陛下不可以不察也况此法繫天下生靈利害若陛下主定差法更行修補則為天下生靈之利一為姦臣搖動則為天下生靈之害利害所繫如此陛下可不深察之哉臣竊料此舉必出章惇之謀而韓縝輩同行之若此姦說得行不獨遂壞善法兼致朝廷詔令前後不一何以示信於天下此姦臣之謀為害不細陛下豈可赦之乎兼臣前後纍言章惇韓縝姦邪今日又姦謀如此伏望聖慈特賜睿斷罷章惇韓縝柄任以正姦臣之罪所有閏二月二日朝㫖亦乞追止更不施行所貴詔令歸一善法得成以幸天下前貼黃奏乞主定差役屏去姦臣事又前貼黃臣竊覩陛下憂勤之如此而大臣姦邪之如彼一日萬幾何以倚仗今司馬光未出惟有吕公著一人忠朴可委外皆非其人臣巳纍言乞用范純仁補左丞之闕庶幾陛下左右早得忠正大臣為之助伏望留神聽納天下之幸又貼黃章惇韓縝姦邪臣已纍言之今日輒為姦謀欲壞善法伏望陛下因此謀為不臧特行顯黜以戒悖慢之臣又貼黃臣竊以謂抑兼并而惠困窮仁政之先務也免役之法上户幸而下戶不幸差役之法下户樂而上户不樂今日陛下令韓維等四臣更行詳定若衙前等事益加寬舒則上户亦無不樂之理誠治世之善法也而慮姦臣為謀幸其法之未完却令天下百姓先陳利害此必上户多陳差役法不便又使提舉欲罷之官司助為之說是姦臣意欲動搖善法伏望陛下深察姦謀力主差法以惠天下初十日别降指揮右正言王覿奏編類章疏閏二月八日所奏臣前狀所陳事理只是為今來詳定役法既未了當便令人户具利害實封自陳顯見執政大臣內有不恱更張之人意欲人户陳訴者衆即可以沮止差法也所謂陳訴者亦不過上户合充衙前重役者而已然上户雖少最能搖扇人情以其下户多衣食於上户而畏之惟其所使也如此然恐妄有陳訴者衆今若不許人户實封投狀乃却是阻絶民言亦不為便故臣欲乞指揮詳定役法所於日近速具合行措置事件申奏仍令諸路州縣候施行了畢一月以外方得出榜收接人户實封狀繳奏所貴衙前等法已經修備即自無詞訴而異意之人無以曲行沮難也其執政大臣內有不恱更張之意臣已嘗於二月二十四日奏狀內開陳訖既不恱更張即見臣今來所奏事理必須難沮雖不沮抑而行遣稽緩則亦於事無補矣伏望聖慈主張速賜指揮施行貼黃衙前等利害臣先已有狀奏陳乞已䝉降付詳定役法所看詳行遣次今狀內只是略行聲說即更不須降下初十日降指揮丁酉左司諫王巖叟入對奏曰巖叟朝論云二月十六日除左司諫閏二月初四日受告敕初六日告謝當日門下省供職初八日謝次日上殿奏云云臣為御史未久上感陛下特達之知擢置諫列前後每進狂言䝉不加罪又賜納聽臣死何以報惟當以至誠不欺事陛下求治不可太急太急則姦人有以迎意進說而行其私李訓之事為可鑑也又奏乞廣求賢者訪以治安之論曰今承顧問者獨一二執政對不及頃而罷豈暇陳治安議教化哉又奏今日所急在人材須節節有人以為備當督責大臣進賢又曰朝多正人則多正論又奏乞進正直之人曰正直者小人所憚正直易退小人易進朝廷常有可忌憚之臣則朝廷安又奏乞察賢不賢去留不可緩賢者亦留不賢者亦留賢者恥而不樂為用方兩宫垂箔尤宜得賢輔上曰誠然又奏乞審於聽言用人曰聽言一差則佞者忠賢者愚用人一失則樂者憂安者危又奏陛下聰明剛斷乞詳察進言者或有曰方今兵器不可用必變而更之而後可以勝敵則陛下可曰兵器之利鈍不可知然我知祖宗用此以取天下則說者自破矣或有曰差法不便雇法便必皆雇之而後可則陛下可曰差雇我不知然祖宗用差以慰天下罷差以來人怨此可信耳又奏乞遵祖宗之法曰祖宗得天下百餘年以至聖至神之資親知民間疾苦其法度所立莫非天下人情之要故行之百年天下安樂而人情以為便有變易則天下羣聚而非之故妄言之人有以祖宗法為非者陛下不知將信百年已安之效邪信今日未效之言邪今有人曰祖宗之法有不善也當改而新之陛下驟聞其說若可聽然陛下但觀祖宗之時人情何如變祖宗之法人情又何如此以事觀之其效不難也上曰何如得民一歸厚巖叟曰示以厚則民歸厚示之一則民歸一顧在上者何如耳又奏聖人不以無過為美而以改過為美不以無諫為美而以從諫為美又奏臣節以不回為忠主意以易回為聖且先王之時百官在廷各以其職諫所聞可謂博而芻蕘之賤猶不遺者以其所知或聖賢所不知也蓋一人之思不及二人之智况於賢者古人立謗木通治道所以堯有衢室之問舜有總章之訪禹立敢諫之鼓進善之旌又曰人君行事須為後來之法須防後日之弊故聖人緣情立法以稱事願陛下留意庶陛下稱物平施之心昭於四方垂於萬世又奏兩宫垂簾杜絶內降更乞陛下照管太皇太后曰甚言語試問官家不到得皇帝曰無巖叟曰如此甚幸蓋斜封墨敇不宜於今日有自古此事盡出於外人交結宦官女謁遂賣官鬻獄無所不至不可不防微不可不奏知太皇太后曰這箇則極是决然不到得不須憂也巖叟曰天下之幸天下之幸巖叟朝論所載對語不但此又不得其月日姑擇其善者附初對時戊戌詔已差吏部尚書吕大防等専切詳定役法內有合經由三省文字與免勘當及不依常制日限催促施行丙申八日太母宣諭可考又詔今差役議論未見成法若許諸色人申陳恐徒滋煩擾候有成法録下諸路立限許實封申陳逐旋看詳更改其閏二月二日朝㫖勿行從劉摰王巖叟朱光庭王覿之言也榮州元祐元年改差役法文字內有此指揮乃閏二月十日敇今刪取增入摯巖叟奏在閏二月二日光庭覿奏在閏二月八日舊録不載固當新録亦遂脫略殊可怪也己亥環慶路經略使范純粹言臣竊以謂中國之所以能坐制西夏者誠由連城比帥並統重兵利害相同左右相援首尾相副聲勢相接心一而力同氣逺而勢重如一身之有手足上下交相為用而無有偏廢此我之所長而彼之所畏者也方寶元康定用武之時先臣仲淹嘗統兵往援鄰道破元昊長驅深入之謀救涇原屢衄可憂之患見於己試理勢灼然朝廷後來參定戰守約束頒降諸路實用其策昨因徐禧計議邉事輕有改張遵行之初自罹其害顯驗如此理難循行緣敵兵前後大舉未曽不併力一路决是彼衆我寡勢有不敵或一路諸寨同時被圍使不得更相救援不過閉門堅守期於自保若攻圍急迫日久勢危本路兵力少虧而鄰路拱手坐觀法不得援是自棄其所長而使彼復無所畏也然則攻而不拔者幸耳况被圍之人其所以日夜疲憊竭死固守者實以旁援之可待也援兵之來先聲一至罔測薄厚城中之人則心安而氣振賊兵之衆則心疑而勢搖其不舍而去者鮮矣今若但令本路自為枝梧則被圍既困之衆復何望哉臣恐於危迫之際變起不虞此又不可不慮者也雖非攻圍但賊兵併力一路則旁為牽制理不可闕蓋兵家張耀聲勢左牽右制古所不廢固未聞兵窮力乏不假聲援而能獨勝者也今邉事未平敵人難測平居慮患正在今日伏望朝廷深賜詳度檢㑹臣前奏及元頒戰守約束再加修明諸路遵守施行所貴緩急不至誤事元豐五年十一月十一日初奏元祐元年四月三日又奏二年二月十八日從之御史中丞劉摯言摯言不得其時附閏二月十四日蘇轍言之前其從違當考伏覩近制保甲罷團教朝廷所以惠綏疲氓恩施甚厚民得去其所苦就其所安逺近承風莫不鼓舞然臣竊有私憂過計者夫鄉野之民其性易於傳習臣往見農人或被差役一為弓手手力耆壯之類及罷滿而歸則拱手閒惰已不復能反業於農蓋出入公門游集市井有所誘怵使之然也今之保甲則又甚焉衣必華細食必酒肉固已變其向者布麻粗糲之習矣羣聚而笑喧奮臂而矜勇固已移其向者椎魯勞苦之性矣其家質田賣屋出錢以濟其所用官司嵗時教試與之金帛寵之名目以養其欲故凡保甲之父母兄弟妻子一家憔悴終嵗困擾而身為保甲者未必不自喜以為樂也今既嵗教止於一月罷其團集省其監督去其羈縈勞費之患則保甲之父母兄弟妻子欣歡休息復有生理而身為保甲又未必不自失以為戚也彼有自失之意而欲使人人俯首甘心盡如平日肯復從事於耕勢蓋難矣惡少而失其欲悍强以成其性又挾素所教弓刀刺擊之技以為之資臣懼其非獨不能從事於耕而已也亦恐其得為陛下之良民者少也臣愚以為宜有法以斂制之蓋保甲之技藝强弱髙下州縣皆有等籍今按取優等之人召其情願刺以為本州禁軍若舊係保長等名色則比類軍中之階級隨其等差對換補之自餘中下藝等亦召願充公人者依近制募以為弓手手力耆壯户長之役所貴在軍者既團𨽻部束之有法又使得伸其素習之技能其在役者既不失服職於公家比之召雇浮浪乃得熟事鄉民必賴其用為多伏望詳酌又言保甲既有換充軍者若本保階級闕人或丁有闕數即乞遇冬教日推擇排連填補則不損保甲之額若換兊他役則自不廢教集
