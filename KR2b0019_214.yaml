body:
  text: 續資治通鑑長編卷二百十宋李燾撰神宗案自英宗治平四年四月至神宗熙寧三年三月原本並闕今仍其舊熙寧三年夏四月癸亥幸金明池觀水嬉燕射瓊林苑舊紀書幸西苑新紀不書乙丑命知制誥宋敏求看詳減省銀臺司文字都官員外郎王庭筠太常博士集賢校理劉瑾殿中丞朱溫其著作佐郎錢長卿曽布前河西縣令杜純並為編敕刪定官庭筠嘗奏疏稱頌王安石所定謀殺刑名而溫其素為王安石檢法贊成其事者也此據司馬光日記溫其介休人布鞏弟純鄄城人庭筠長卿未詳曾布八月二十三日編中書例給度僧牒五百付秦鳯路經略使李師中言制置招納蕃部及募敢死士須金帛以備支費三司乞賜銀絹各五千上批銀絹必不免科散坊郭户乃以度僧牒賜之丙寅遼主遣永州觀察使耶律寬衛尉少卿程冀其母遣懷德軍節度使蕭禧太常少卿張冀來賀同天節丁邜以新及第進士葉祖洽為大理評事上官均陸佃為兩使職官張中程堯佐為初等職官第六人以下為判司主簿或尉第三甲并諸科同出身並守選仍命翰林學士范鎮龍圖閣直學士張掞同吏部流內銓注擬張中開封人程堯佐丹陵人罷全州嵗貢斑竹簾給度僧牒五百付兩浙轉運司分賜經水災及民田薄收州軍召人納米或錢賑濟飢民國信所言賀同天節遼使至臨清驛有契丹迪烈子伊爾根夜刺同宿契丹死者四人傷者十二人除孝贈錢絹外餘未敢支賜詔傷死者更給對見生餼節衣朝辭例物等如病死者例其迪烈子伊爾根亦凖此給如死亦以孝贈賜之戊辰詔御史中丞吕公著比大臣之抗章因便坐之與對乃誣方鎮有除惡之謀深駭豫聞乖事理之實可翰林侍讀學士知潁州權知開封府翰林學士兼侍讀韓維權御史中丞知太原府端明殿學士兼翰林侍讀學士馮京為翰林學士兼端明殿學士知開封府公著在言職纍奏乞罷制置三司條例司及提舉常平官最後言祖宗承五季之亂法度草創固亦未盡及古至於臨下以簡御衆以寬好生之德洽于民心則漢唐之盛無以加也是以有國百年民心欣戴雖凶年飢嵗流離至死而無有背叛之心者良以仁恩厚德足以深結之也惟是日月既久事或有弊此陛下所以臨朝奮然思欲懲革然而設施措置未得其術才及一二末事頗已咈戾衆心是以內外乖離人人危懼竊以祖宗以來所以深得人心者艱難積纍固非一日今豈可以一二末事輕失其心人心一搖未易復收後雖有善政亦難行矣况上下危疑之際難安易動此臣所以為寒心也伏望陛下仰思先烈俯察物情凡所施為務在仁厚無致近薄以斂衆怨則人心悅而天意得矣又言名不正則言不順言不順則事不成今制置一司上既不關政府下又不委有司是以從初置局人心莫不疑眩及見乎行事物論日益騰沸蓋朝廷大事無不出于二府惟是制置條例實繫國家安危生民休戚而宰相不得與聞若宰相以為可自宜與之共論以為不可亦不當坐觀成敗但書敕尾而已至於倉場庫務瑣細利害又恐不必執政大臣然後能集臣又聞聖人之政貴乎顯仁藏用管仲霸者之佐耳及其為寓令猶曰法成而鄰國不知今朝廷處置實未能有利及民然而先置一司使天下疑惑愁怨至今不定恐非策之得者也乞檢會臣前奏施行皆不聼乃求罷職家居俟命是月乙丑詔復除公著舊職同提舉諸司庫務韓絳為中丞李中師權知開封府命且下復留之至是乃黜公著且以馮京代中師王安石著時政記曰公著數言事失實又求見言朝廷申明常平法意失天下心若韓琦因人心如趙鞅舉甲以除君側惡人不知陛下何以待之因涕泣論奏以為此社稷宗廟安危存亡所繫又屢求罷言職上察其為姦故黜初上欲明言公著罪狀令曾公亮等以旨諭當制舍人公亮諭宋敏求草制但言引義未安而已安石曰聖旨令明言罪狀若但言引義未安非旨也敏求草制如公亮所教翌日再取旨公亮陳升之趙抃等皆爭以為不可上曰公著有逺近虗名不明言罪狀則人安知其所以黜必復紛紛矣公亮等以為如此則四方傳聞大臣有欲舉甲者非便且於韓琦不安上曰既黜公著明其言妄則韓琦無不安之理雖傳聞於四方亦何所不便公亮等猶力爭至日旰上終弗許而面令升之改定制辭行之安石所記如此後公著復召用至哲宗即位領實録事上奏臣先任御史中丞前後乞罷制置三司條例司論差官散青苗錢不當不蒙施行五乞責降外任差遣亦嘗入對面陳蒙神宗曲賜敦諭聖意溫厚初無譴怒之旨四月五日聞除臣翰林學士兼侍講學士寶文閣學士知審官院臣於六日再奏以言事不效乞降責至七日聞有指揮落兩學士黜知潁州是時王安石方欲主行新法怒論議不同遂取舍人已撰詞頭輒修改添入數句誣臣曾因對論及韓琦以言事不用將有除君側小人之謀緣臣纍次奏對不曾語及韓琦一字方欲因入辭自辨時已過正衙忽有旨放臣朝辭令便赴任至元豐中臣再對朝廷先帝待臣甚厚未幾遂除柄任及嘗賜臣手詔大略云顧在廷之臣可以託中外腹心之寄均皇家休戚之重無逾卿者被誣遭逐全不出於聖意止是王安石怒臣異議呂惠卿興造事端日月既久臣本不欲自明適以宰職總領史任今實録若即依安石所誣編録既因臣提舉修進則便為實事它時直筆之士雖欲辨正亦不可得望以臣奏付實録院許令紀實以信後世內批依所奏施行時元祐二年也司馬光記所聞於趙抃曰上諭執政以呂公著自貢院出上殿言朝廷推沮韓琦太甚將興晉陽之甲以除君側之惡王安石怨公著叛己因此用為公著罪及中書呈公著責官誥詞宋敏求但云敷陳失實援據非宜安石怒請明著罪狀陳升之不可曰如此使琦何以自安安石曰公著誣琦於琦何損也如向日諌官言升之媚內臣以求兩府朝廷豈以此遂廢升之皆俯首不敢對上既從安石所改且曰不爾則青苗細事豈足以逐中丞光又云公著素謹初無此對或謂孫覺嘗為上言今藩鎮大臣如此論列而遭挫辱若唐宋五代之際必有興晉陽之甲以除君側之惡者矣上誤記以為公著也公著家傳云三月十一日壬寅諫官孫覺見上論青苗事且言條例司駮韓琦疏鏤板行下非陛下所以待勳舊大臣意賴琦朴忠固無它慮設當唐宋五代藩鎮強盛時豈不為國生事乎後二日甲辰公著見上復極論青苗事然未嘗及琦也已而上謂執政曰呂公著孫覺皆極言青苗不便且云駮難韓琦非是因面詰王安石韓絳不當鏤板初無罪覺意也覺既被黜執政遂以覺語加公著及公著黜覺猶艤舟城東未赴廣德乃謂人曰韓琦事獨覺嘗言及爾然後人知公著未嘗言琦又云公著兄女嫁琦子者二人公著必不肯誣琦又公著自三月十三日後不復對凡二十二日乃罷中丞誠使公著誣琦而上以為罪自當即日加譴不應如是之久又必不應先除三學士職也家傳所載如此今但從司馬光記聞不敢用家傳證國史也然光記此事亦與家傳不殊耳元祐實録載王安石時政記及呂公著奏其書法甚允當朱本乃云先帝實録不應載元祐文字並加刪削全用安石日録今仍存元祐舊本并附司馬光所記云魏泰東軒録云熙寧初朝廷初置條例司諸路各置提舉常平官及俵常平錢收二分之息時韓魏公鎮北都上章論其事乞罷諸路提舉官常平法依舊不收二分之息魏公精於章表其説從容詳悉無所傷忤者皇城使沈惟恭者輒令其門客孫棐詐作魏公表云欲興晉陽之甲以除君側之姦表成惟恭以示閣門使李評評奪其稿以聞上大駭下惟恭孫棐於理而御史中丞呂公著因便坐奏事猶以棐言為實上出魏公章送條例司惟恭流海上孫棐杖殺於市罷公著中丞出知潁州制曰比大臣之抗章因便坐而與對乃厚誣方鎮有除惡之謀深駭豫聞乖事理之實蓋謂是也按司馬光記孫棐事亦甚詳初不云詐作魏公表恐泰妄也舊紀書御史中丞呂公著言王安石失當降為翰林侍讀學士知潁州新紀不書當從舊紀壬申知青州觀文殿學士兵部尚書歐陽修為宣徽南院使判太原府宣徽使自皇祐三年著令母過二員後富弼以宣徽使判并州於時已有二貟詔以邊任故權增一員至是郭逵王拱辰已為宣徽使并修為三用弼例也太原闕守上初欲用滕甫議不合遂用修上初疑修以病不肯往王安石曰試敦諭并稍加恩禮必肯往也因授宣徽使修卒辭之七月三日乃聼修辭五月二十一日修止俵青苗特放罪癸酉大宴集英殿丁丑韓維權知開封府馮京權御史中丞王安石既引韓絳同制置三司條例又薦維以代呂公著欲其兄弟助己也曾公亮等皆以為如此必致人言綘亦言臣弟必不敢當命既下陳襄既言其不可維力言兄絳方任樞密副使兼條例司議論所及非一御史中丞於朝廷闕失無所不當言不言則廢公議言之則廢私恩且吕公著論青苗事用此罷臣代其任自處之地不得無嫌且無以屈士大夫之論又屢面對引義堅切卒與京易任初命李中師權知開封既而以中師不允人望罷之曾公亮等始建議欲召吳中復為中丞王安石曰中復鞫李參事人皆以為附文彥博恐非正人陛下宜自察之乃不果召及罷中師又欲召中復尹京王安石曰臣昨奏中復附文彥博事無可考恐難信如前日不放提舉官所差指使下縣若不以聞當申條例司此於韓琦有何關預中復乃申琦其枉道媚韓琦如此亦足以知其為人也卒罷之詔祕書丞鄒何令審官院與先次合入差遣何舉御史既召對罷之戊寅祕書丞集賢校理同知諫院胡宗愈同判司農寺詔秦鳳路都鈐轄向寶兼提舉秦州西路緣邊蕃部王韶加同事寶舊為管勾後命韶為提舉上以為輕重不倫故正之命張守約依舊専管勾東路蕃部尋皆罷初文彥博陳升之皆以為寶宜為提舉己而王安石獨進曰向寶素壞王韶事韶言有兩族不可招撫者以寶沮害其事故也今令與韶共事又在其上即韶事恐不可成陳升之曰寶雖帶此名然止在其城中即亦何害安石曰寶既為官長即所屬吏皆嚴憚之其勢足以沮事何謂無害兼因邊事出城即更足以亂韶事時李師中有奏言用韶提舉若不令寶都大提舉即失寶心不肯盡節於是升之亦以其言為然安石曰朝廷用一王韶於寶有何虧損乃不肯盡節如漢髙祖得陳平於亡卒即令盡護諸將諸將何嘗不盡力上與樞密院再議文彥博固執前説上固令罷寶命乃用急腳遞追還尋復罷此詔據朱本新本遂削去不知果是何日己邜右諫議大夫參知政事趙抃為資政殿學士知杭州王安石更張政事抃屢言其不便及安石家居求去上諭執政罷青苖法抃獨欲俟安石參假由是新法不罷抃大悔復上言臣近以制置條例司遣使四十餘人馳傳天下人情驚擾物論喧譁纍具奏陳并與宰臣等數嘗面奏乞罷諸路提舉官屬其常平等事一切責成監司信賞必罰孰敢慢者而王安石強辨自用動輒忿爭以天下之公論為流俗之浮議順非文過違衆罔民近制置司所差官如張次山吳師孟范世京等七八人懇辭勇退惟恐不得所請夫要職顯任人之所欲彼不願就者蓋知事悉乖戾不敢當之昨日安石再舉西川福建提舉官四員其愎如此而欲止人浮言是所謂惡醉而強酒也近臣侍從臺諫官力言制置司不便司馬光因罷樞密副使之命中外人情莫不怪駭李常家居待罪多日孫覺張戩程皓三人各與安石論列於中書又悉嘗上殿乞罷言職今日呂公著范鎮俱請郡朝廷事有輕重體有大小以言乎財利於事為輕而天下之民心得失為重矣以言乎提舉官於體為小而禁近與耳目之臣用捨為大矣今夫不罷財利而失天下民心是去重而取輕也不罷提舉官而棄禁近耳目之臣是失大而得小也今中外人情􅍅􅍅如此更乞酌事之重惜體之大罷其輕者小者變禍為福易於反掌爾因纍章乞罷遂命出守杭州杭故多盜聞抃性寬細民益聚為盜抃捕獲情重者配他州遂散去境內以清吏部侍郎樞密副使韓絳參知政事絳間與王安石同奏條例司事嘗贊上曰臣見王安石所陳非一皆至當之言可用陛下宜深省察故安石尤德之此語據王安石五月五日所録侍御史知雜事陳襄言竊聞已制命除韓絳樞密副使兼參知政事絳以才望序遷固未為過然朝廷所以用絳之意似乎不厚矣陛下始以王安石參預大政首為興利之謀先與知樞密院事陳升之同領制置三司條例司未幾升之用是遷為丞相而絳又領之曾不數月今又以絳參預政事則是中書選任大臣皆以利進自古至治之朝未有此事也臣欲乞罷絳參知政事今後中書選任大臣必求道德經術之賢以處之而不得以利進如陛下不欲追罷巳行之命即乞將制置條例司與青苗補助之法只歸三司及責之守令相度施行庶不害於王政而足以全大臣之節矣前秀州軍事判官李定為太子中允權監察御史裏行案宋史以定除御史裏行為癸未日事未知孰是定素與王安石善孫覺歸自淮南薦定極口因召至京師定初至謁李常常問南方之民以青苗為何如定言皆便之無不善者常謂曰今朝廷方爭此君見人切勿為此言也定即日詣安石自其事曰定惟知據實而言不知京師不得言青苖之便也安石喜甚遂奏以定編三司嵗計及南郊式且密薦於上乞召對謂定曰君上殿當具為上道此及見上果問常平新法定對如安石所教上恱批付中書欲用定知諫院曾公亮陳升之以為前無此例固爭之乃改命焉編式乃二年十二月三日太子中允權監察御史裏行程皓權發遣京西路提點刑獄皓先上疏言臣聞天下之理本諸簡易而行之以順道則事無不成故曰智者如禹之行水行其所無事也捨而之於險阻則不足以言智矣蓋自古興治雖有専任獨決能事功者未聞輔弼大臣人各有心睽戾不一致國政異出名分不正中外人情交謂不可而能有為者也况於措置沮廢公議一二小臣實與大計用賤陵貴以邪妨正者乎凡此皆天下之理不宜有成而智者之所不行也設令由此徼幸事小有成而興利之臣日進尚德之風寖衰尤非朝廷之福矧復天時未順地震連年四方人心日益搖動此皆陛下所當仰測天意俯察人事者也臣奉職不肖論議無補望允前奏早賜降責故罷朱本削去皓疏云時政記不載皓被責非緣此疏前史官妄載改書云以數言常平新法乞責降故有是命按皓此疏豈非言新法紹聖史官猥為王安石諱遂欲蓋抹正論輒加刪修今仍從元祐新本吕本中雜説正叔嘗説新法之行正緣吾黨之士攻之太力遂至各成黨與牢不可破且如青苖一事放過何害伯淳作諫官論新法上令至中書議伯淳見介甫與之剖析道理氣色甚和且曰天下自有順人心的道理參政何必須如此做介甫連聲謝伯淳曰此則極感賢誠意此則極感賢誠意此時介甫亦無固執之意矣却緣此日張天祺至中書力爭介甫不堪自此彼此遂分辛巳祁國長公主進封衛國長公主淮南轉運使屯田郎中謝景溫為工部郎中兼侍御史知雜事景溫雅善安石又與安石弟安國通姻吕公著之為中丞也人謂景溫必先舉御史及公著罷乃有此除先是安石獨對問上曰陛下知今日所以紛紛否上曰此由朕置臺諌非其人安石曰陛下遇群臣無術數失事機别置臺諌官恐但如今日措置亦不能免其紛紛也此安石三月十六日對上語於是専用景溫司馬光日記云自是不復置中丞按此時已除馮京中丞但未到耳陳薦權臺事不知日記何以云爾恐誤也知遂州職方郎中向宗道都大催遣廣濟河輦運初張次山力詆新法辭提舉常平倉弗就會廣濟遣運闕官曾公亮在病告安石攝禘祭致齋次山與陳升之有連升之亟言次山可用命既下而中旨謂次山資淺改付宗道其實安石惡次山異己言於上而罷之右諌議大夫知制誥宋敏求言中書送李定除權監察御史裏行詞頭伏以御史之官舊制須太常博士經兩任通判方許奏舉景祐初以資任相當者少始許舉通判未滿任者去嵗驟用京官今又幕職官便升朝著處紏繩之地臣恐弗循官制之舊未厭羣議其詞頭未敢具草且以疾辭知制誥壬午宋敏求罷知制誥以上批敏求文字荒踈曠其職業不能者止於義可從也於是王安石曰敏求草吕公著制臣諭聖旨令明著罪狀反用曾公亮語止云援據匪宜而已此自是違聖旨已幸朝廷不問乃更辭職上乃令從敏求請罷職及呈敏求誥詞上又令因著其前者失職之罪曾公亮以為無罪可著上曰令作公著誥辭初不依旨明言罪狀乃宣言於外以謂朝廷改誥詞須當乞免知制誥改誥詞亦常事何至如此此乃挾姦見朝廷前者不加罪故今敢如此爾安石曰敏求作公著誥詞曾公亮雖云但言援據失宜而臣即諭聖旨令明著罪狀敏求不用臣所諭旨而從公亮之言此豈得無罪公亮曰舍人是中書屬官止合聽宰相處分安石曰舍人乃行聖旨豈是行宰相處分上曰若止一人説與則可緣王安石又説聖旨既所傳不同即合覆奏如何即草制公亮不肯從上曰但止説文字荒蕪失其職守罷之可也公亮曰若失守即是臣致其如此時己日旰安石曰改作曠其職業亦可上從之公亮因請罪上曰不須爾公亮曰不敢更上章拜謝於上前而退墨本云上批十六字朱本云元無上批止是司馬記事云有此語不可便為上批改云舍人院草制新本復用墨本今從之舊紀書宋敏求論李定以軍事推官為御史非舊制罷知制誥新紀不書當從舊紀十二月十四日敏求為修撰右正言祕閣校理李常落職為太常博士通判滑州常言散常平錢流毒四海又州縣有錢未嘗出而徒使民入息者上令具州縣官吏姓名至五六終不肯具而求罷職故黜前此上謂執政曰李常終不肯分析朕再三諭以此止是欲行遣違法官吏常堅云體不合分析曾公亮曰臺諌官自前許風聞言事難令分析也上曰欲令説是何人言或以所言不實罪諌官即壅塞言路今令説違法官吏是何人因何却不肯王安石曰許風聞言事者不問其言所從來又不責言之必實若他人言不實即得誣告及上書詐不實之罪諌官御史則雖失實亦不加罪此是許風聞言事今所令分析止欲行遣官吏何妨風聞及是上令改常正言為博士仍明著常罪曰言事反覆專為詆欺是日又呈常疏有云陛下一宫殿之費百餘萬一宴遊之費十餘萬乃令大臣剝膚椎髓掊斂百姓上笑曰近聞人謗如此乃是常疏中語安石曰陛下即位未嘗營繕及事外遊宴惟修太皇太后皇太后兩宫爾而常敢於誣上如此上批監察御史裏行張戩侵侮柄臣誣罔事實王子韶外要守正之名內懷朋姦之實所入章疏與面奏事前後反覆不一並落職知縣戩江陵府公安子韶江寧府上元戩屢言青苗不便最後上疏曰近乞罷制置司及諸路使者并言散錢取利為害及安石處事乖謬専為聚斂好勝遂非狠愎日甚呂惠卿險薄姦凶尚留君側而曾公亮陳升之趙抃等心知其非依違不斷觀望思避顛危莫扶及識昧知幾言乖悟主均為有罪乞正嚴誅等事並未施行今大惡未去橫斂未除不正之司尚存無名之使方擾臣自今更不敢赴臺供職居家待罪又言韓絳代陳升之領條例司左右徇從安石與為死黨遂參政柄李定邪諂自幕官擢臺職陛下惟安石是信今輔以絳之詭隨臺臣又得李定之比繼繼其來牙蘖漸盛臣豈敢愛死而不言哉戩論韓絳李定據戩附傳增入按絳除參政定御史皆四月十九日戩責以二十二日墨本云臣自今日十二日以後更不赴臺供職蓋二十二日也墨本偶脫二字耳若十二日以後既不赴臺供職則不應更論絳定今附本月日戩二十三日家居待罪其日便責亦可見當時事勢云子韶嘗乞追孫覺呂公著謫命及言臺諌方論青苗乞罷兄子淵管勾京東常平差遣先是上謂執政曰王子韶言青苗法實不便但臣先與此議不敢論列小人首鼠兩端當黜之知雜陳襄亦奏子韶回邪反覆隂薦子淵為常平使者請罷其言職故也朱本刪陳襄論子韶以為時政記所無今依新史復存之又據襄奏增薦子淵事初戩子韶皆以知縣資序為御史至是曾公亮請皆以為通判王安石不可上從安石議戩既上疏又詣中書力爭辭氣甚厲公亮俯首不答安石以扇掩面而笑戩怒曰參政笑戩戩亦笑參政所為豈但戩笑天下誰不笑者陳升之解之曰察院不須如此戩顧曰只相公得為無過耶退即家居待罪其日遂與王子韶同黜詔纍戒河東陜西諸路經略司禁止邊民與西賊交市頗聞禁令不行自今有違者經略司并干官吏劾罪重斷能告捕者厚賞之委轉運司覺察癸未虞部員外郎蘇稅祕書丞陳睦並為祕閣校理祕書郎李清臣為集賢校理江寧府推官劉摯為館閣校勘大理寺丞樂咸為太子中舍稅等先朝得旨召試至是試入等獨咸論入四等上䇿四等下故也稅睦摯已見治平三年十一月咸未詳刑部郎中侍御史知雜事陳襄同修起居注罷知雜事襄纍奏乞罷青苗法其第三奏曰陛下聖性聰明固已曉然開悟但以王安石執議不變重違其意物論喧然不加聽察事之可者則置勿問其不可者則無所不行豈非條例之臣為自安之計巧為飾説誣罔聖聰近者韓琦上言以河北俵散青苗錢立定貫伯均與等第人户比之他路獨取利息三分顯是提舉官違條抑配而朝廷並無黜責琦之論列足以知其非便而特寢不行呂景以畿縣之民逋負官物尚有五十餘萬不宜更與預支實慮虧陷官本而却令取勘故臣前奏謂此法一行騷動天下正謂此也陛下近以司馬光為樞密副使中外翕然皆以陛下知光之言是而悟制置司之為非今復遽罷之者豈又以光言為非耶必以其辭而不受也然則光之所以不受者以陛下不行其言爾如欲用之行其言而已矣何吝而不為哉輕進退於大臣失孚號於天下非所謂令出弗反之意也李常職在諌官既聞中外之議不敢不言事雖不實誠亦得之輿論况國朝舊制自許風聞言事若令分析是欲使其必去將以杜言者之口恐非所以待諌臣之體而廣言路之道也凡此數事皆聖慮一時之失豈非聽察之誤乎禮曰有所忿􅀈則不得其正有所好樂則不得其正亦在陛下追而正之耳書曰改過不吝湯之德也自陛下臨政以來事無過舉惟用安石然後有更事之暴而致興利之非聖人施為自有法度不合於道者去之任天下之羣才收天下之公議堯舜三王之治可以指期而至又何必徇一士之曲議以貽黎元之患哉所有制置條例司如有可行事件欲乞只歸三司相度施行青苗之法早賜停寢則天下幸甚襄又奏臣觀制置司元降指揮莫非引經以為言而其實貸民以取利事體削弱為天下譏笑是特為管仲商君之術非陛下之所宜行臣願陛下為堯舜之君以義治天下不願其為霸主也陛下富有中國廣輪萬里內無強臣敵國之患外無西陲北邉之難凡四海九州之賦入又足以供吾之用不為不足陛下不於此時與廟堂之臣坐而論道以行王政而反屑屑為均輸舉貸之事臣竊為陛下惜之今日之弊在於國家因循制度未立而侈用日廣陛下但遴選主計之臣付與利柄取天下賦入之籍度縣官調度之數百用為之均節而歸之藝極則浮費省而財用足省徭役薄賦斂寬關市之征弛山澤之禁修庠序之教勸之以忠信孝悌尊賢而使能才者進不肖者退農有餘財民服其教吏稱其治然而國不富而政不王者未之有也又奏陛下以至仁求治凡欲更張法度皆以為民安有取民脂膏以為貸息而謂周公太平已試之法哉陛下之心必不為此然則天下之人皆知誤陛下者王安石也誤安石者呂惠卿也以陛下之聰明觀天下之論議其法制利害固已灼然可知奈何安石恃強辨以熒惑於前惠卿畫詭謀以隂助於後加以反覆比周之小人隨時觀望平日公論則舉知其法之非一撓於利則又言其法之是此雖陛下之至聖不能無惑雖臣等之至忠亦不克指為朋黨也近者諌官李常以言事待罪尚令分析孫覺以奏對反覆落職外遷御史中丞呂公著而下皆以不職為言乞從責降而臣獨區區未敢以請者尚冀犬馬之誠一悟聖意許以青苗之法下議百官如臣言非則甘從逺竄以戒妄言如臣言是則安石惠卿亦乞特行貶斥以謝天下既而有旨召襄試知制誥於中書襄以言不行辭不就試乞補外王安石請用為集賢殿修撰陜西轉運使命未下上批别進呈而改是命於是上謂安石曰經筵殊少人安石曰何用多上曰吳申全不能講欲候襄受職留之經筵朕見襄每引經亦粗可故也襄五奏據襄集司馬光記云襄雖論常平新法而辭婉故除官獨優必當時以此議襄也襄五月辛卯除直舍人院兼侍講卒辭之太子中允同提點京西刑獄程皓簽書鎮寧節度判官事皓既罷御史懇辭京西故也上謂王安石曰人情如此紛紛奈何安石曰堯御衆以寬然流共工放歡兜歡兜止是阿黨共工止是靜言庸違象共滔天如呂公著真所謂靜言庸違象共滔天陛下察見其如此非一事又非一日然都無行遣直待公著所為熟爛自不肯安職復除三學士令在經筵又不肯留乃始除侍讀知潁州告詞又初極稱其材行中乃用數字言其罪後乃令帶侍讀學士以此示天下天下皆知朝廷無綱紀小人何緣退聽陳襄程皓専黨呂公著都無助陛下為治之實今天下事不如理至多人臣為姦罔至衆襄與皓曾有一言及之否専助呂公著言常平法此即是歡兜之徒而陛下於邪説紛紛之時張戩之徒皆未出即奬用襄知制誥皓提點刑獄又稱其平實此輩小人若附呂公著得行其志則天下之利皆歸之既不得志又不失陛下奬用何為肯退聽而不為姦臣愚竊恐陛下非不知陳襄輩情狀但患斥逐人多故以言假借涵容且使安職此大不然彼不謂陛下涵容乃謂陛下尚可欺罔故紛紛不止也龍圖閣直學士陳薦權發遣御史臺事西京左藏庫副使閣門通事舍人髙遵裕提舉秦州西路蕃部日録與王韶相閿四月十八日六月七日當參考甲申翰林學士司馬光讀資治通鑑漢賈山上疏言秦皇帝居滅絶之中而不自知因言從諌之美拒諌之禍晏子曰和與同異水火醯醢鹽梅皆相反之物宰夫濟其不及以泄其過若羮已鹹復濟以鹽已酸復濟以梅何可食也伊尹戒太甲有言逆於汝心必求諸道人之情誰不欲順己而惡其逆惟聖賢知順之損知逆之益譬如酒醴雖適口而醉人藥物雖苦口而除病是以臣之於君剛則和之柔則掖之明則晦之晦則明之非故相反欲裁其有餘補其不足以就皇極耳若逆己者即黜降順己者即不次拔擢則諂諛日進忠正日疏非廟社之福也上曰舜堲讒説殄行若臺諌欺罔為讒安得不黜光曰臣因進讀及之耳時事臣不敢盡論也及退上留光謂曰呂公著言藩鎮欲興晉陽之甲豈非讒説殄行光曰公著平居與儕輩言猶三思而發何故上前輕發乃爾外人多疑其不然上曰此所謂靜言庸違者也光曰公著誠有罪不在今日向者朝廷委公著專舉臺官公著乃盡舉條例司之人與條例司互相表裏便熾張如此逼於公議始言其非所謂有罪也公著與韓琦親何故以險語讒之上曰非讒琦也志在君側之人耳光曰據誥詞則讒琦也公著有罪無罪在於事實不在誥詞誥詞雖云爾外人皆云公著坐乞罷條例司及言呂惠卿姦邪不云坐為讒也上曰王安石不好官職及自奉養可謂賢者光曰安石誠賢但性不曉事而愎此其短也又不當信任呂惠卿惠卿姦邪而為安石謀主安石為之力行故天下并指安石為姦邪也上笑光曰李定有何異能而拔用不次上曰孫覺薦之邵抗亦言定有文學恬退朕召與之言誠有經術故欲以言職試之光曰宋敏求繳定辭頭何至奪職上曰敏求非坐定也朕令草呂公著誥詞言興晉陽之甲除君側之惡王安石以諭敏求而曾公亮以為不可敏求不遵聖旨而承公亮之語但云援據非實而已光曰公著誠有此言亦不過欲朝廷從琦言罷青苗耳語雖過差原情亦可恕也今明著於誥詞暴之內外君不密則失臣造膝之言若皆暴以為罪自今羣臣誰敢為陛下盡言者臣以為敏求隱晦其語亦未為失體也且敏求非親承聖旨據曾公亮之言而為之耳上曰公亮安石所傳聖旨不同亦當奏稟也上曰李常非佳士屬者安石家居常求對極稱其賢以為朝廷不可一日無也以臣異議青苗之故寧可逐臣不可罷安石也既退使人具以此言告安石以賣恩光曰若爾誠罪人也上曰有詐為謗書動搖軍衆且曰天不祐陛下致聖嗣不育或云卿所上書光曰臣所上書陛下皆見之且臣未嘗以奏草示人也上曰卿所言外人無知者臺諌所言朕未知外人己遍知矣上曰今天下洶洶者孫叔敖所謂國之有是衆之所惡也光曰然陛下當察其是非然後守之今條制司所為獨安石韓絳呂惠卿以為是天下皆以為非也陛下豈能獨與三人共為天下耶詔諸路州軍遇正至寒食端午重陽節序無得以酒相饋初知渭州蔡挺言陜西有公使錢許造酒處每五節以酒交遺有行經二十驛者挈負去來道路煩苦請禁止許之至是都官郎中沈衡復言知莫州柴貽範送别州酒至九百餘瓶所差兵夫至二百餘人其違法勞人可知故并諸路禁止焉乙酉條例司言青苖錢以半為夏料半為秋料使倉儲不空以備非常然今諸路農時早晚夏秋所獲多少及民間所須緩急所在不同恐不可為一定之法欲令有司因民緩急量入為出各隨其時不拘以數詔諸路轉運開封府界提點提舉常平倉司約定嵗散青苗錢可以實散若干數目聞奏詔館閣校勘劉攽與外任攽初考試開封與王介爭言為臺諌所劾既贖銅又罷考功及鼓院至是求外任王安石因之并逐攽此據司馬光日記汪應辰云恐只是御史劾攽丙戌特支修大河東流隄掃及濬御河役兵緡錢有差丁亥祕書丞集賢校理孫洙兼史館檢討大理寺丞鄜延經略司勾當公事薛昌朝為太子中允權監察御史裏行王安石言昌朝可用也安石欲用昌朝此據日録知涪州樂溫縣鍾浚為著作佐郎以考課院言浚治狀入優等故也司馬光讀資治通鑑張釋之論嗇夫利口光曰孔子曰惡利口之覆邦家夫利口何至覆邦家蓋其人能以是為非以非為是以賢為不肖以不肖為賢人主苟以是為非以非為是以賢為不肖以不肖為賢則邦家之覆誠不難矣時吕惠卿在坐光所論専指惠卿也此據日記陳升之以母老乞退上不許此據日録戊子中書言宗室令晏等狀袒免以下親當出官及外居奏薦并接賓客並以有法其文移表奏欲乞亦如外官例上批令晏雖係袒免止是法許外居非換官出官人數不可一用外官例可再詳度令諸事相稱毋使親踈輕重不等於是中書再定袒免將軍以下願出官委尊屬同教授保明宗正司審察以聞見任外官奏子孫依外官法若祖宗袒免以下已有官而祖父俱亡不願出官願出外居者許置田宅産業願出官者置田宅如外官法從之韓琦乞徐州養疾上曰琦必緣吕公著事也曾公亮曰琦當乞相州今乃乞徐州意或在此上曰何故公亮曰相州實屯重兵處王安石曰琦意未必然上曰須開諭令無自疑安石曰彼初無此意何用開諭但如常批答可也候琦以人言為辭開諭未晚上從之琦章四上上卒遣內侍李舜舉開諭琦乃止
