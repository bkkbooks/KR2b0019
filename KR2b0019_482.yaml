body:
  text: 續資治通鑑長編卷四百七十八宋李燾撰哲宗元祐七年冬十月庚戌朔環州地再震乙卯皇叔祖建雄軍留後同知大宗正事宗景為感德軍節度使禮部侍郎曽肇為刑部侍郎肇十六日知徐州權刑部侍郎王覿為權禮部侍郎丁巳工部言陜西轉運司奏乞將本路州縣應有前代帝王陵寢祠廟去處鄰近地各行摽撥委所屬縣分擇比近多丁之家召募看守本部欲依所奏每陵寢此近十里內有係官空間地土可修處擇丁多之家召募五户每户給田一頃與免營田地內每嵗所出租課及本縣內諸般差役永充看守其祠廟若小有損壞亦責修葺其間有不就給田看守及雖有承佃地土不及一頃而情願看守者並聼從便如本家有田自合應役者即不免諸般差役若無人召募仍陵寢側近無田可給即並依本縣差役條差仍止於第四等五等人户內召募看管內祠廟若有損壞即令合屬官依條修葺從之只用新本所刪修為允戊午朝奉郎權發遣開封府推官來之邵為監察御史之邵咸平人或已見八年六月八日為殿院初除府推在七年三月十八日政月有之實録無辛酉皇叔徐王皓充南郊亞獻髙密郡王宗晟充終獻中書舍人孔武仲兼直學士院起居郎喬執中為中書舍人起居舍人姚勔為起居郎右司郎中吕陶為起居舍人考功員外郎髙士英為右司員外郎直集賢院兼侍講吳安詩為天章閣侍講安詩為天章閣侍講非待制也或誤作待制今不取初兼侍講在四年十月四日知舒州王安禮知宣州知宣州賈易為京西路轉運副使十二月十六日甲子明年二月己巳詔以大河東流都水監使者吳安持賜三品服北都水監丞李偉於任滿日令再任玉牒云辛酉河復東流趙鼎臣河渠書係安持賜服李偉再任於九月今從實録鼎臣即於此下載其父稱奏議乞罷北外丞司當考今附注紹聖九年正月二十二日環慶路總管李浩為本路副都總管以浩復觀察使故也是日西賊大舉攻圍環州及烏蘭肅逺洪德永和寨合道默伯鎮凡七曰乃解去初知慶州章楶數遣輕兵出討斬獲甚衆並邊部族不敢寧居楶䇿其必報乃取黠羌啖以厚利陽笞而遣之若得罪而逸者因使事賊刺其舉兵所向即馳歸以告果知羌人將冦環州楶乃料精兵才萬餘統以二驍將使營絶塞而授之䇿曰賊進一舍我退一舍彼必謂我怯為自衛計不復備吾邊壘乃御枚由間道繞出其後或伏山谷伺間以擊其歸又以境外皆沙磧近城百里有牛圈所瀦水足以飲人馬乃夜遣置毒賊圍環數日無所獲而歸所使驍將折可適屯師洪德城賊過識其母梁氏旗幟城中鼓譟而出馳突躪轢賊大敗而去斬首千餘級獲牛馬橐駝鎧仗以萬計過牛圈飲其水且盡人馬被毒而奔迸蹂藉墮塹谷而死重傷而歸者不可勝計梁氏幾不得脫盡棄其供帳襜褕之物而逃前此邊上功狀多虛或以易為難或奪甲與乙廣張俘級習以為常楶獨核實第勞無少欺徼幸者不悅頗有謗言楶弗恤也自初知慶州以下據詔㫖內章楶傳增入楶傳又云楶言夏人不知義惟嗜利而畏刑不稍懲革邊未得寧也古者諸侯有罪貶爵削地甚則六師移之今既憚用兵宜稍收入其土疆如古削地之制舉西人之師止當我一路請諸道豫具版築俟一入冦即諸路皆出師擇要害地而置城寨彼雖猖獗壤地褊小不過一再舉而勢蹙力窘矣又請復安疆寨以固吾圍招部族以離其衆案楶議進築見正月末請復安疆見六月二十日朝廷蓋不從其議也楶傳又云鄜延奏夏人乞入朝謝罪楶亟奏曰夏每犯邊必得所欲今所至有請朝廷能厭足之固得利矣苟為不能尚足欵我師且獲嵗賜金帛十萬願勿遽聼不然取輕損威邊患未弭也後皆如楶言案鄜延奏在八年正月辛卯楶傳又云明年召權户部侍郎謗者不止中道改知同州案楶六年二月十四日知慶州八年正月二十二日除户侍其降同州實録不見月日政目在三月十八日又十月十八日又二十二日又二十六日又十一月二十四日又十二月二十日又二十四日云云當并考十二月二十四日折可適功狀可考或參入二十二日壬戌户部言汴綱嵗入斛斗欲將每年合起小麥數目委發轉運使副臨時相度均撥與少缺并酬奬綱裝船不得過一運其發運司勾當公事官糴上供斛斗請委使副專切覺察如敢糴買不堪之物並令奏劾并轉糴綱運斛斗明有條約務在舉檢欲州委通判縣委主簿各於公廨收鎖官錢以俟賞給應綱船入門凡載竹木蕟箔等在場㸃檢稅訖不得再令供申出卸岸之數及已卸空綱不得與重綱同岸繫泊並從之以司農寺丞秦定有請故也新無甲子朝獻景靈宫乙丑刑部侍郎曽肇知徐州從其請也初六日改刑侍左司諫權給事中虞䇿言竊聞曽肇因議郊禮乞外任士論謂肇守經議禮别無過失所有録黃未敢書讀行下侍御史楊畏言曽肇近以論天地不當合祭不數日罷禮部移刑部己而肇乞出遂除徐州按肇以職事論禮初無不當及見其言不行而請去則義在所取不在所斥伏望朝廷更加審察䇿繳肇徐州政目在十八日今并書楊畏云云附見權吏部侍郎彭汝礪言肇以十六日除知徐州汝礪二十二日奏此今并十六日臣竊聞刑部侍郎曽肇以議禮不當乞從罷出䝉恩除知徐州給事臺諫有言臣竊謂南北郊合祭事朝廷自許近臣集議或同或異乃是常理必不以此黜一從官如肇用意為國家忠臣朝廷容納直言愛惜人才義當為改命今體問得畫黃己到吏部臣以為過矣臣伏念才難久矣人嘗千百億而一二茍或有之或流落而不遇幸而有之又既得之或棄於無所用故治安之日嘗不足而危亂之日嘗有餘孔子曰如有所譽必有所試如肇者其文可以掌大命令其學可以決大謀議頃在西掖屢能補縫闕漏及還禮部遂能是正典常循名觀實謂之賢可也且並祭之禮不經見如臣輩皆莫敢安能奮不顧忤大臣為陛下言者獨肇而已朝廷既不用其言又遂出其人故臣以為過或曰朝廷非惡肇議禮謂其言過而已夫言不直則道不見今病者之求藥惟病之愈是望故雖五毒遍施針砭切骨而不為過使惟香味顔色之悅則豈惟不足治病適足以增病書曰有言逆于汝心必求諸道有言遜于汝志必求諸非道肇之言雖有拂逆以道觀之則為當矣夫欲安榮惡危辱人之所同情也臣願陛下少留神明以理度之今人臣不肯朋比大臣為朝廷明是非論然否此為其身邪以人主故邪此為其私邪以國家故邪順從鉗默則速得福奮厲激昻則速得禍而人臣終於不忍不言以負陛下此其心不在其身而在人主不在於私而在國家可見也人臣瀝肝膽披腹心為陛下國家為長久慮而陛下屏去不容此甚非計也夫上所好惡人之表也今侍從之臣不能依隨大臣而陛下去之然則孰不願附大臣今有一言則陛下去之然則孰不欲學不言人臣與國家同安危共休戚使皆附大臣而不以國為憂閉口不言而為妻子計此非社稷之福也惟陛下察之方朝廷多事宜盡拔心膂之賢遍置左右博求骨鯁之士並為輔弼蓋猶恐不足今有一曽肇而不能留故臣以為過非獨臣也凡忠於陛下者皆然肇命雖已下而未行臣至愚欲望太皇太后陛下深以愛人才容直言為念出自聖斷且留肇在朝肇守官任職必當有以報國臣言或繆靡所逃誅夫改易差遣常事也留賢者盛德也在朝廷蓋優為之矣貼黃稱南北郊並祭議始下臣實嘗與肇言天地之祭至大至重今容易改易甚未安使無言者汝礪亦不敢緘默又曰肇禮官其言當在肇遂有議論肇既逐臣亦難處矣終不可留臣亦願與罪焉陜西轉運使李南公為直龍圖閣知延安府范純粹遭其母喪故也左奉議郎太常博士朱彥權差通判博州彥自陳昨與侍從官集議南郊合祭事今曽肇既罷禮部則臣元係與肇同論之人備員禮官俱為失職乞賜罷黜故有是命當有言者丙寅詔刑部大理寺已發斷上公案如遇恩者其已斷該赦降勿論及全原并減外無罪者更不退送若於法不該原減者據未斷降下名件押貼子下大理寺批逐件合引赦降各人事狀連法狀行下其餘並退送丁卯環慶路經略司言西賊入冦詔令章楶丁寧城寨專作守計但能堅守無虞即為有功密誡諸將凡事慎重勿與賊鋒迎鬪仍選募死士夜擊賊寨或俟惰歸及分掠之際擇利邀擊痛行殺戮并下鄜延涇原兩路慮賊馬恃衆分兵冦犯亦仰丁寧過設隄備二月八日楶奏當考三省言堂除諸路職司有帶權及權發遣者未行官制已前係中書檢舉除落今却係吏部檢舉具鈔更不經中書顯是不相照應詔吏部依條檢舉具狀申尚書省送中書省取㫖施行詔嵗給諸路州軍藥錢各有差選官監督醫工隨風物氣候依所降方論製藥給散不得留難其當職官勿給御史臺主簿王任為正字辛未正字陳祥道為館閣校勘太常博士工部員外郎游師雄為集賢校理權發遣陜西路轉運副使張舜民志遊師雄墓云同列欲變民租為錢意在收羡餘以獻公靣折之曰五路宿師以待餉反令輸錢錢可食乎借若帑庫盈積而倉廪空虛邊陲有警師徒霧集君能任其責耶同列無以應內地兩稅支移於邊者民常以為病公為奏曰在昔邊土不耕仰粟於內故設支移之法今㳂邊之法既多糴粟軍食自足宜令內地稅户隨斗升計地里輸腳乘錢以免支移之勞既可以休民力又可佐邊用公私便之二事當考環慶路經略司言賊稍欲引退本路六將己從間道前去邀擊時西賊入冦方數日今忽引歸慮别蓄姦謀復來衝突詔經略司候賊退日丁寧誡諭㳂邊將官使臣過為隄備不得幸賊解去便為懈惰兼慮賊知鄰路赴援環慶輒乘虛入别路作過仰審度賊勢若漸欲引退即於涇原兩路䇿應兵馬量度先次遣回明年正月二十五日賞兩路䇿應功此年十月十二日十八日二十六日史宜父本云環慶路經略言賊稍欲引退本路六將已從間道邀擊然賊壘才數日無故引歸慮别蓄姦謀復來衝突詔經略司候賊退日誡諸將毋得輒弛備具鄰路赴援環慶恐賊乘虛由它路入冦宜審賊勢勿致敗事其辭甚略附見此乙亥户部侍郎寶文閣待制蔣之竒知熙州之竒本傳云知熙州夏人請畫疆而伏兵山谷間之竒亦以兵自衛而令其屬至定西城㑹議往來二年議卒不合朝廷知其詐而罷之之竒益務修守備謹斥堠常若冦至終之竒去敵不敢犯寶文閣待制范育為給事中著作佐郎徐鐸為集賢校理工部員外郎校書郎時彥朝補之並為著作佐郎八年五月十六日黃慶基論朝補之以西賊出塞賜環慶州并默伯鎮及自餘鎮寨曽經西賊攻圍戰守䇿應軍兵等特支錢有差十月十二日丙子太常寺言義羅所說王公已下繖合用青其鹵薄圖别不開說恐鹵簿圖內更有未合典禮事送禮部太常寺同詳議申尚書省今按開元禮義羅應大駕八角紫繖王公已下四角青繖今鹵簿圖六引紫繖欲乞改用青又誕馬鞍鹵簿圖曰舊並施鞍韉景祐五年去之昨來納后誕馬猶施鞍韉今欲乞除去仍令鹵簿圖用纓轡緋屧又二十八宿五星攝提旗按鹵簿圖二十八宿旗攝提旗盡畫人形及牛虎頭婦人小兒之類於禮無據元豐三年禮文所乞改製各著其象以則天文後有司因循舊儀未曽改正今欲乞依前降指揮改造從之翰林侍講學士范祖禹言臣於去年十二月轉對奏事乞除賊盜重法未䝉施行臣聞王者之德如天無不覆地無不載四海之內皆赤子也無有逺邇當視之如一今重法之地獨為匪民一人犯罪連及妻孥沒其家産便同反逆先王制刑必使民得以自新不聞别異州城偏行峻令恐非聖世所宜為也陛下將郊見天地御樓肆赦若於赦文悉除此法一切蕩滌與之更始足以感格人心召致和氣則帝舜好生之德大禹泣辜之仁成湯解網之恩復見於今矣恭惟祖宗無不哀矜庶獄刑罰從寬逺過前代實有隂德上當天心是以承平百年福祚無窮惟自嘉祐七年初立窩藏重法熙寧中中書檢正官奏請遂為著令皆因有司建議非仁宗神宗本意此乃權時之制不可久行臣前奏論之已詳今因初郊宜以為仁政之始聖人順動雲行雨施刑清民服此其時也伏望聖慈斷而不疑特降睿㫖於將來赦書行下使百姓曉然知二聖天地涵飬無私之德不獨視此諸郡如蠻貊之人臣將見民之戴恩淪於骨髓則勝殘去殺庶可望矣貼黃議者必謂一除此法賊盜必熾臣竊以為不然自嘉祐以來行重法至今不聞地分盜賊衰少近元祐編𠡠比舊法稍輕亦不聞盜賊滋多以此知盜賊多少不繫重法决可除去無疑并乞檢㑹臣前奏施行丁丑天章閣待制知杭州林希為禮部侍郎八年三月乙酉出知亳州鴻臚卿直龍圖閣髙遵惠為太府卿感德軍節度使同知大宗正事宗景充南郊亞獻安定郡王世凖充終獻以徐王并宗晟辭疾也戊寅河東路經略司言熙寧十年正月九日朝㫖應弓箭手年老或病患不任征役者給公憑放停看詳上條止說年老或病患不任征役者即無立定許揀選之文以至其間隱庇尫悴走跳遲慢怯弱之人竊慮緩急有誤驅使欲乞今後逐年因教閲時委知州軍并將官揀選弓箭手如有年髙或病患及尫悴行步遲慢怯弱不任征役之人許本家或親屬內選人承替若遇災傷及七分以上權免教閲秖令作畨次勾抽揀選從之通議大夫集賢院學士致仕髙賦卒十一月庚辰朔西南龍蕃遣使入貢詔諸稅租助役常平錢物鈔候倉庫封送到縣令佐即日勒吏開拆分授鄉書手各置歷當官收上排日以千字文為號將所授鈔畫時上簿當職官對簿勾銷訖封印置匱收掌候納畢於簿末計正數或每色剩納到數并畸零殘缺畫一朱書限三十日二萬户以上限五十日官吏保明具鈔數并簿送州新無辛巳皇城使康州刺史訾虎專管勾麟府路軍馬依舊權發遣太原府路都鈐轄知麟州西作坊使王獻可追一官勒停皇城使河東第一將彭保罰銅三十斤衝替坐不禀帥司節制擅統領將兵擊夏賊故也江淮等路發運司言嵗運上供斛斗全藉所管汴河押綱使臣人員鈐束兵梢整葺船舟方可辦事近年以來其押綱人卸納斛斗回為見少缺未經結絶或是年滿替人未到即妄稱疾擅離本綱若不立法止絶深慮其弊愈深請應汴河押綱使臣人員卸糧回如有疾病並須隨空綱將治候到裝發處申所屬官司審驗差人權押候痊安日依舊管押元綱年滿不得擅離空綱年月雖滿不候正人交割者凖此如違並依元祐𠡠擅去官守法從之新無壬午權知乾寧軍張元卿言本軍當諸河之衝㑹隄掃不可不治詔乾寧軍掃岸令工部指揮合屬官司每年依修檢計合役夫功從都水監相度委合起夫即於本軍依近裏州軍條例科夫功役不得過三百人仍却於本路年額溝河夫內除豁如功役稍大本軍夫不足即令都水監那融應副癸未秦鳯路經略司言近年兵將官與城寨等使臣多是違朝㫖及帥臣節制以至敗事緣嘗立邊功多從寬減上下玩習浸已成風今西賊拒命常在對境若不更法無以懲戒請今後將官及城寨堡使臣應緣戰守有違朝㫖並乞不以邊功寬減庶幾人知畏凜紀律稍嚴從之甲申髙麗國進奉使通議大夫兵部尚書黃宗慤副使中大夫尚書工部侍郎栁伸入見詔諸太中大夫觀察使以上每員許占永業田十五頃餘官及民庶願以田宅充祖宗饗祀之費者亦聼官給公據改正稅籍不許子孫分割典賣止供祭祀有餘均贍本族已上輒典賣依卑幼私輒典賣法不限年許理認田宅仍先改正諸太中大夫觀察使以上居住雖有分人不得無故毁拆輒典賣者依私輒典賣永業田法乙酉詔應重法地分劫盜五人以上或凶惡者行重法餘依常法窩藏人凖此御史中丞李之純言請今後付章奏下六曹者委逐部子細著詳長二審行裁决明白指揮符下或具申禀如委是無可施行即令條析申都省檢㑹元祐通用令諸受都省送下文書未有處分者並檢勘施行若理不可行月終具狀以聞不應奏者申都省仍關所屬詔申明行下新無丙戌于闐國遣使入貢庚寅上齊于大慶殿辛卯薦享于景靈宫遂齊于太廟壬辰朝饗八室至神宗室上涕洟不止陟降盡禮黎明齊于南郊之青城癸已冬至合祭天地于圜丘以太祖配禮卑羣臣賀于端誠殿還御宣德門肆赦是日五鼓初輦詣壇外壝撤蓋及內壝百官凖詔不回班自小次歷午陛下升壇不設茵褥稽首跪奠致誠極恭夜月澄爽雲物晏溫比還御樓肆赦終日和燠天意昭答翌日風寒相屬時雪如期宰臣執政侍從官皆進詩賀御史董敦逸請以其事宣付史館從之上之在太廟也內中朱紅車子十餘兩爭道於乾明寺前有張紅蓋者鹵簿使蘇軾即車中具奏曰臣謹按漢成帝郊祠甘泉泰畤汾隂后土而趙昭儀常從在屬車間時揚雄待詔承明奏賦以諷其略曰想西王母欣然而上壽兮屏玉女而却虙妃言婦女不當與齊祠之間也臣今備位夏官職在鹵簿凖故事郊祀既成乘輿還齊宫改服通天冠絳紗袍教坊鈞容作樂還內然後妃嬪之屬中道迎謁已非典禮而况方當祀事未畢而中宫掖庭得在勾陳豹尾之間乎竊見二聖崇奉大祀嚴恭寅畏度越古今四方來觀莫不悅服今車駕方宿齊太廟而內中車子不避仗衛爭道亂行臣愚竊恐於觀望有損不敢不奏乞賜約束仍乞取問隨行合干勾當人施行上亟遣人以軾疏白太皇太后翌日中使傳命申敕有司嚴整仗衛上自太廟還后以下皆不復迎謁中道陳師道談叢云故事常赦官典贓入己不赦熙寧以後始赦吏罪元祐七年南郊赦杖罪八年秋皇太后服藥而赦則盡赦之矣此事附注當考辛丑三省言郊禮畢徐王加恩當賜劔履上殿緣虛文已刪去請嵗增公使緡錢太皇太后曰嘗有例耶大防等對曰仁宗時荆王元儼增至五萬貫徐王昨亦增賜今為三萬緡於是詔許增三千緡又言皇弟加恩四人乃郡王一為國公舊例出閣進爵今雖非出閣合取㫖太皇太后曰四人皆加恩國公事體宜一於是五弟恩數均矣詔文武官並以南郊赦書加恩癸卯兵部尚書蘇軾乞越州不允改為端明殿學士禮部尚書兼翰林侍讀學士御史黃慶基言軾三狀在八年五月壬辰禮部尚書胡宗愈為吏部尚書政目七年九月丙申載宗愈權吏書實録無之今并入此樞密直學士趙彥若為翰林侍讀學士新知襄州集賢殿修撰楊汲知越州十二月二日自襄加集學吕嘉問知襄州嘉問襄州惟政目有之當考五年六月八日汝州詔宗女宗婦因作過披剃及一年者許與祖父母及本宗有服朞親婦人并所生兒女側近處相見即不得經宿每月不得過一次新無三省言檢㑹赦文應官吏軍民諸色人諸般缺負官錢在元豐八年三月六日大赦以前者五百貫已下並與除放五百貫已上奏裁差侍從官與户部同㸃檢催督限一年畢詔翰林學士顧臨御史中丞李之純與户部長二依赦施行仍就本部置司時置司必以蘇軾奏議當考喬執中傳云執中為中書舍人因降赦乞免官逋五十萬以上者上特許之置司或由執中也詔環州及諸鎮寨守禦居民及入保漢蕃人户等第所借口食內有曾經賊馬到處令經略司並特蠲放具數以聞十月十二日又詔綱運聽差管下使臣二員不妨本職與催綱使臣一員及定地分相兼催遣仍躬親覺察盜賊任滿每嵗各催過年計官物及八分以上內白波至泥水閘口泥水㳂汴至京盜失舟船不及十五隻官物估價不及五百貫升一年名次白波向上至澠池陽湖炭場舟船不及十隻官物不及三百貫升半年名次如過數之半及催遣官物不及七分從本司奏劾並置印歷抄上催出地界月日時辰綱分姓名所裝物數下納去處每月本司檢察年終比較如能獲盜賣官物許比折未獲盜失之數新無可削甲辰詣景靈宫萬壽觀恭謝乙巳幸凝祥池中太一宫集禧觀大相國寺尚書左丞梁燾言臣昨在翰苑日嘗密具劄子披露肝膽冒聞聖慈陛下聖明洞察不賜疏斥嘉其忠藎用之輔政臣仰體眷遇益堅臣節重以身䝉寵榮而未行其言是以夙夜不遑寧處期必補報不敢少懷不盡之意致陛下有後時之悔陛下每有宣諭必以不喜管事為言常欲安靜此聖意之本也臣未嘗一日不思切惟淵衷逺慮深識用臣前言自適其時矣伏望檢㑹前奏早賜詔音斷歸人主以全大功臣不勝激切盡言之至燾前奏附五月此奏不得其時行狀云南郊禮畢燾上此奏附十一月末又言先帝大臣多以材進可稍復用委以别都名藩以全終始此據梁燾行狀附見新舊傳俱無乞還政等事當考嘗有布衣劉正叟上書論復辟事宰執以為狂欲羈管湖南燾爭曰布衣敢言何罪之有况其言又非狂乎遂置之此據燾行狀并附見當考吏部侍郎彭汝礪言臣聞不能知危則不能有天下之安不能知憂則不能有天下之樂臣伏觀歷代之君其祖宗以勞苦得天下至嗣子若孫生於深宫之中體安文繡口甘滋味耳習聲音目便技巧一日出房闈而有天下偃然自以為吾固當有之甘於樂而不知憂處於安而不知危內為侈靡外習茍簡讒諂之說行因循之計用骨鯁之臣疏棄藥石之言不納綱紀日壞禍亂並作而猶不悟雖有聖知亦不能善其後矣臣恭惟皇帝陛下以盛德履帝位今八年矣內無過行外無過舉明哲方發如日之升淵默不言與天同德非太皇太后所以扶持擁護何以至此謙虛退託隱而未發於言也有所聞而無所問於事也有所知而無所命臣聞詩曰弗躬弗親庶民弗信弗問弗仕勿罔君子此言人君擅開闢豫奪之權以制萬物之命無有逺近幽深知其來物如此而後能治其國家今其行則弗躬也其事則弗親也雖有至德民有所不信矣弗能問以盡其事弗能察以盡其物於是小人得以勿罔君子矣庶民不信則不能安民矣勿罔君子則不能知人矣夫人君之失不獨強暴威虐馳騁田獵而後謂之憂不能知人不能安民其憂莫大焉臣恭惟太皇太后陛下以至德受天明命清明博大齊莊中正參二天地同信四時自周以來母后之德未有如斯之盛者也今人皆曰太皇太后陛下無意於任天下今且將還政臣以謂太皇太后陛下三世為天下母其崇髙富貴上無倫下無敵其於稱制也宜矣故其還政甚非難既還政而俾皇帝陛下能不失其聖惟難其道無他在教之安民知人而已臣欲乞皇帝陛下同御前殿稍令近臣及知州職司入對俾稍見人才察其邪正賢不肖之實遂聞知天下之事三省進呈公事以發聽斷俾日見之行益進選道德忠信之士置之左右前後使告其所己治而規其所未至損其所有餘而補其所不足使一日專政則利害不能惑君子小人不能蔽以事天地而享以治萬物而安以承宗廟而固太皇太后所以擁護之者可謂全矣汝礪奏不得其時附十一月末梁燾奏後
