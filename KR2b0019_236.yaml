body:
  text: 續資治通鑑長編卷二百三十二宋李燾撰神宗熙寧五年夏四月庚戌朔詔殿前司馬步諸軍令巡教使臣春秋分行校試射親人等第給銀楪及令兵房檢詳官置簿考校以多少定殿最取旨舊制諸軍教閲每指揮給一兩銀楪一射中者共分之所得既微無以激勸故命遍賜以鼓舞之且定殿最新紀云立殿前馬步軍春秋校試殿最法辛亥光祿寺丞樞密院宣敕庫檢用條例官杜純往秦州推勘王韶公事上召對遣行壬子詔三司出紬絹百萬付陜西四路經略司變易以備邉用上謂王安石曰欲專用此借助熟戶弓箭手安石曰如此甚善馮京曰熟户貧多與恐凶年難償安石曰此事在人措置耳今五嵗即收息一倍以其息專賑濟凶年即凶年可使熟戶常保其土田不為大姓兼并又懷服朝廷恩德此極無害而有利上以為然又詔環慶路勾當公事度支判官張穆之根究陜西去嵗糴買糧草比三司元支撥數少錢二百七十二萬餘緡因依及鹽池去年虧價錢五十五萬餘緡令轉運司及制置解鹽司具析以聞上曰鹽酒之法既未可弛即須嚴禁王安石曰陛下雖致治如唐虞時鹽酒法亦不須弛若欲推利與民惟須厚農而已末作不禁更能害農非堯舜之政也王安石又為上言邉事尋當帖息正宜討論大計如疆場尺寸之地不足校計要當有以兼制遐荒乃稱天所以畀付陛下之意今中國地廣民衆無纎芥之患四夷皆衰弱陛下聰明齊聖憂勤恭儉欲調一天下兼制遐荒極不難要討論大計而已上曰誠如此遐荒非難兼制但朝廷事未成次第今欲收功於遐荒即糧不足兵亦不足又無將帥安石曰此皆非方今之患也陛下誠思柴世宗及太祖時邉鄙兵孰多於今糧孰多於今今糧不足但以未急故耳若急須糧多轉錢帛厚價收糴何患糧不足募兵既多百姓又極衆如何却患兵少自古興王皆起於窮困寡弱之中而能為富強衆大若待富強衆大然後可以有為即古無興王矣方今之患非兵糧少亦非無將帥也若陛下能考核事情使君子甘自竭力小人革面不敢為欺即陛下無為而不成調一天下兼制遐荒何難之有上大恱三月四日并此月二十二日西邉事可考先是中書言準治平四年閏三月敕遷僖祖廟主藏之夾室臣等聞萬物本乎天人本乎祖故先王廟祀之制有疏而無絶有逺而無遺商周之王斷自契稷自稷以下者非絶嚳以上而遺之以其自有本統承之故也若夫尊卑之位先後之序則子孫雖齊聖有功不得以加其祖考天下萬世之通道也切以本朝自僖祖以上世次不可得而知則僖祖有廟與契稷疑無以異今毁其廟而藏其主夾室替祖考之尊而下附於子孫殆非所以順祖宗孝心事亡如存之義求之前載雖或有然考合於經乃無成憲因情制禮實在聖時伏惟皇帝陛下仁孝聰明紹天稽古動容周旋惟道之從宗祏重事所宜博考乞以所奏付之兩制詳議而擇取其當詔答曰廟祧之序蓋有典彛所以上承先王下法後世朕嗣宅大統獲奉宗祀而世次遷毁禮或未安討論經常屬我哲輔于以佐朕不逮而仰稱祖宗追孝之心朕覽之矍然敢不祇服宜依所請施行中書以二月八日戊子奏詔以四月三日壬子答今并附壬子日朱墨新本於十一月二十三日戊辰始載此奏及詔雖穿聮作一處易于檢閲緣其間如趙彥若建議乃特出却難理會故仍用編年以事繫日之法先著此六年正月七日辛亥舊紀書中書言萬物本乎天至事亡如存之義即云奉僖祖為太廟始祖遷順祖藏夾室孟夏祀感生帝以僖祖配按中書所言乃五年三月八日戊子不應載六年正月七日辛亥新紀已削去中書所言文亦不備今並參考月日别書之甲寅閲諸軍轉員凡三日乙卯遼主遣歸州觀察使耶律適衛尉少卿張藹其母遣安逺軍節度使蕭利民太常少卿王經來賀同天節知鄧州觀文殿學士吏部侍郎韓絳知許州絳十上章乞歸田里守墳壟王安石亦為之言故有是命慶州駐泊都監供奉官馮倜為閣門祗候以慶州兵亂倜城守有功故也日録三月二十五日云倜諭却欲叛之兵與實録所稱稍不同今從實録都官郎中梁彥明權發遣開封府判官比部員外郎沈希顔都官員外郎劉明逺各升一任彥明等首議行倉法故也兵部郎中集賢校理王瓘刑部郎中祕閣校理李綖刑部員外郎集賢校理陸經並同判太常寺仍給三司判官俸要考給省判俸因依不然當削去丙辰上批前日議置市易務魏繼宗文字可檢取進入朱本云别無因依止是取索不須載今依新本復存之繼宗已見三月二十六日己未權發遣延州趙卨乞差通判范子儀及機宜官魏璋左文通等根括間田及提舉招置弓箭手從之先是卨管勾本路機宜文字上營田議曰昔趙充國興屯田以破先零唐宰相婁師德嘗為檢校營田使而河西隴右三百六十屯嵗收六十餘萬石今陜西雖有曠土而未嘗耕墾朝廷屯戍不可徹而逺方有輸納之勤願以間田募民耕種以紓西顧之憂詔以其事下經略安撫使郭逵逵言今懷寧新得地百里已募漢蕃戶使為弓箭手實無間田以募耕者至是卨復乞根括焉御集二十一卷熙寧五年三月十六日進呈卨奏寢之今乃施行食貨志云卨又言之遂檢括得地萬五千餘頃募漢蕃兵幾五千人為入指揮詔遷卨官加賜金帛按志所云必自有月日姑附此志又云凡言實邉者營田本趙卨官莊本霍翔翔事在十年二月六日庚申河北緣邉安撫司言北人漁於界河及奪界河西船并射傷兵級雖已指揮都同巡檢以理婉順止約慮彼國不知邉臣不顧歡好信縱小民漸開邉隙詔同天節送伴使朝端彥等諭北使以朝廷務敦信誓未嘗先起事端請聞之本朝嚴加約束癸亥閣門言都司使已下揭貼班簿舊止一册乞分東西班各作一册從之丙寅天章閣待制馬仲甫詳定除放欠負先是權陜西都轉運使謝景溫言昨賜緣邉諸軍見錢而邠州訓練卒五千人同在一處獨不與於理未均詔緣邉諸路後有似此權添軍馬候合降宣與諸路特支錢日取旨三班借職管勾經略司文字楊置為樞密院書令史初上以樞密諸房案牘煩委胥吏皆父兄保任多不得人因命都承旨李評立法參補流外選人三班使臣初以莫淵陳宗道𨽻刑房掌法令至是又以置邉吏習事使𨽻河西房詔趙卨於綏德城界相度要便有水泉處修置堡寨先是卨欲乘夏人不意占據生地築堡寨上問執政如何僉以為卨不肯妄作宜從所乞王安石曰今若要與夏人絶即明絶之要與和即須守信誓既約彼商量地界遽出不意占據生地非計也兼我所以待敵人不在數里地此數里地不計有無上曰朕亦疑此計未善因令卨具析利害以聞此據三月十九日録卨請築堡寨於界內乃降是詔安石又曰今陜西一路即户口可敵一夏國以四夏國之衆當一夏國又以天下財力助之其勢欲掃除亦宜甚易然終不能使夏國畏服以其君臣強武則其君幼弱其臣不過親昵闒冗之人然而終不能兼制彼者必有以也將帥未肯出智力為陛下任事雖欲出智力任事亦恐未敢得志上曰有智力人誠少安石曰有智力人豈在多但人人竭心以奉朝廷號令所與議出號令者亦豈在多人但要好惡是非分曉耳樞密副使蔡挺言近撥併就糧諸軍其間甚有溢額軍員乞下殿前馬步軍諸路總管司依職次撥併一般軍分一州內撥填不足願就鄰州安排者聼從之王韶言招納洮河武勝軍一帶蕃部鄂特凌等千餘人乞補都虞候指揮使等職名仍第給俸從之詔著作佐郎新陜西轉運勾當公事陳大順罰銅六斤衝替坐被鞫報上不實遇降故也祝咨再劾大順等具得其語言曲折李定亦坐報上不實罰銅五斤放罪王安石力為定辨數謂定初對樞密院時固云證佐具在而樞密誣之定不當坐乃詔免定罰又詔御史臺前勘官姚原古治獄鹵莽雖去官下淮南轉運司劾罪以聞原古又見十月癸未丁卯太子中允集賢校理同知審官西院張琥復知諫院同修起居注直舍人院制勘院言琥以諫官論事無罪可劾故也二月癸丑罷職詔以諸班直轉員樞密院承旨以下賜錢有差檢用官不與以士人不可同胥吏故也詔趙卨候分畫地界畢繳納先許便宜行事指揮初陜西河東帥臣惟郭逵趙卨嘗請以便宜行事既而上以諸路邉事經略使自當隨宜措置又疆事漸寧故罷之祕書丞祕閣校理章惇押伴西人不赴驛宿特罰銅八斤放罪此據密記庚午鑄諸路走馬承受銅朱記給之仍收所授奉使印故事諸路走馬承受書䘖皆曰某路都總管司走馬承受公事而任職者惡有所𨽻屬故於御位中隂去都總管司字冀擅其權至是始釐正之仍鑄為銅朱記西京左藏庫副使知利州周永懿貪暴不法轉運副使鮮于侁得其贓狀即遣吏就御史張商英言永懿在任時轉運使李瑜提點刑獄周約交章薦舉永懿倚瑜約之助故鬻獄納賄無所忌憚不可不治詔候永懿案到取旨後永懿編管衡州瑜約及同提點刑獄羅居中皆坐奪一官瑜約居中奪官會要在閏七月三日今附見于此瑜四年十月九日緣役法已當罷官即復如故辛未都大提舉修塞北京第五掃決河入內副都知張茂則等言已塞第五掃全河入新開二股河詔賜茂則已下御筵於大名府仍命右諫議大夫集賢院學士宋敏求就決河致祭新舊紀並書辛未塞北京決河王安石白上曰程昉舉官最不敢妄舉如霍舜舉王鑒此兩人皆了事其他所舉亦皆是了事人昉若不如此即壞所幹河事然讒者以為昉所舉有私昉了河事內則執政大臣外則方鎮大臣表裏攻毁非一端以為人食生米又以為無地可安置物料黨助內外大臣之人又交口謗毁伺其過失轉運司即不肯應副買梢草又以為無地安置物料都水監李立之又多端沮其所須物料差兵士前後申請至於六七僅能差得觀衆人窺伺陷害如此如昉有罪豈為衆人所容讒者乃謂昉倚賴臣聼信故橫陛下以為人所以攻昉者何也乃多以臣故今臣有罪固不能自蔽况如昉者乎陛下每事欲平施臣觀近日差遣極有用干請舉非其人者臣每所切歎然誰為陛下言其情者作為姦私之人即陛下初未嘗知忠力寡助之人反為人百端攻沮陛下但見忠力之人為人所譖毁即欲案其罪如此誰肯為忠力者臣竊謂茍為忠力雖有罪當見寬恕况又無罪陛下恐須深察上以為然且曰近日革面者亦已多安石曰陛下能以道揆事則豈患人不革面若陛下未能以道揆事即未革面之人日夕窺伺聖心乘隙罅為姦私臣不能保其不亂政也陛下於刑名度數簿書叢脞之事可謂悉矣然人主所務在於明道術以應人情無方之變刑名度數簿書之間不足以了此上曰任人固宜責成他日安石又為上言昉前在府界提轄淤田救護孔固灣斗門實有勞下至濠寨後皆蒙恩賜惟昉略無賜豫陛下方更問第五掃河決何故不收坐昉此事中書所知不須更下河北緣小人方以為中書庇護昉故更下河北勘會朝廷施行政事如此但恐人未肯趍赴功實上笑曰程昉誠得氣力然作事過當宜少沮抑近李若愚病却奏舉內臣陳舜臣替李若愚管勾塘泊安石曰如此事誠為僭越非是蔽欺陛下聰明於國事有何所害至於挾姦為邪內外交結蔽欺陛下聰明陛下不寤者乃當深懲漢元帝唐文宗所以危社稷宗廟端在此輩也陛下不能懲此輩專欲沮昉未為得計如昉有罪自不為衆所容陛下亦不須深察上曰昉為韓琦所惡人惡昉亦多政自作過不得詔河北河東陜西緣邉諸路各增置鈐轄印二路分都監印二初緣邉兵官皆有印自康定以來增置偏禆倍多皆因用寄納雜印而姦偽無以檢察至是始釐正之知慶州王廣淵言乞移朗斡章威等於近裏漢界熟戶部內買地住坐耕種應遷徙者作三等給修造價錢仍委經略司計口貸糧常加存附從之廣淵又言朗斡章威地雖見今耕牧緣前牒報夏國不曽耕牧將來必爭王安石曰夏國奏狀云依見耕牧為界即理不合爭上以為必爭安石曰彼國主幼用事者防將來歸責必且爭執至於甚不得已衆皆欲割棄然後敢許我所以紓將來之責若敢旅拒即恐無之朝廷當知此意即不須汲汲應之既而廣淵又言朗斡章威官已買與地初不曽侵耕西界惟是宣撫司指揮後有七十餘戶侵耕生地百餘頃乞令鮮于師中相度文彥博曰廣淵作帥豈可却推師中相度安石曰廣淵但恐朝廷不信故欲朝廷質師中亦不為避事又謂吳充曰朝廷亦不須計惜此尺寸地充曰只恐違却元降指揮安石曰若指揮外求索則難若指揮內自有所裁損何為不可文彥博馮京及充問蔡挺挺言地已盡耕向時所買地皆不可種有名而已上曰何如彥博曰必已盡耕西人地不止百餘頃上曰蔡挺必知仔細挺曰臣去慶州後方招到朗斡等聞官所買地不堪耕後來盡耕却蕃人地安石曰挺亦止傳聞此事可案驗令鮮于師中案驗盡耕與不盡耕及所耕頃畝皆可見詣實上曰若專要退地即如何措置章威等安石曰向來只用二千貫買地一頃才十貫餘宜其不好今若以章威等歸附務在優撫即捐數萬貫買地給與必不至失所僉以為無地可買上曰又恐賣却地熟戶無以安存安石曰熟户亦須自有買賣田地者官以善價買其地賣地者不患失所亦不患無地可買上曰只恐羌人性貪示以弱即轉無厭安石曰羌人誠不可狃然亦計度事勢若強弱適相當即狃之更來侵陵無已若彼方困弱困弱而示強即我稍假借以利更易為柔服且邉鄙事須計大勢即此尺寸地未有所計彼豈以尺寸地便絶和好雖固爭不與彼亦不過聲言點集為迫脅之計終未敢便深入也然此小利恐不須爭挺曰若相度買地須候商量界至事定未定間若彼知買地即難商量上曰相度地事須令經略司密之安石曰此事不須密若彼知我買地必更緩以待我我若有地可買自可退地與彼我若無地可買必要彼地則彼亦知我取之非得已正恐他路亦有侵地因此更難商量挺以為諸路地與此不同此地為有數山寨界至分明故必爭安石曰陛下初議界至亦料此處難商量即知他處與此處不同上曰廣淵作帥須專委廣淵計置此事安石曰按驗地即不須鮮于師中上乃從安石言令廣淵相度以聞於是退地與夏國改徙章威等廣淵言慶卒尚反側未可用不宜有疆事故也此事用日録三月四日四月三日二十六日編修附見移章威等後更須考詳刪取其要仍與三月四日納斡堡礓石寨相參廣淵於四月四日奏章威地事即與實録所書納斡堡礓石寨相接或納斡礓石即是章威地也六年七月章威等投西界當參考鮮于帥中去年十二月四日遣立封溝辰州團練使致仕郭化言臣致仕例得一子恩乞依例降資分授子二人詔止與一人右班殿直舊例奏薦恩許降資分授上以為此朝廷特恩外授非古且長僥幸故罷之壬申詔班行換選人並依奏補出官人試法選人換班行須年四十以下親書家狀馬射六斗步射八斗弩張二石五斗各十箭中兩箭已上除流外進納人及曽犯贓罪并私罪重不許換外餘並聼之甲戌遣入內東頭供奉官李憲往河北緣邉安撫司勾當公事先是權發遣開封府推官朝端彥言雜供庫嵗約支九千餘貫已裁減三分之一乞下左藏庫借錢為本依古公廨錢及今檢校庫召人借貸出息却候儧剩撥還詔左藏庫支本錢七萬貫差同勾當司録司檢校庫吳安持與本府戶曹孫迪專一置局管勾息錢支給是日上批問中書昨支左藏庫錢七萬貫與開封府召人情願借貸依常平出息充捕賊賞錢訪聞本府違法並不召人情願請領却將逐色行人等第配率王安石白上此臣女壻所領必無此事自可令馮京取索文字推究事極分明未嘗配率也此據會要及御集并日録上批乃二十五日也乙亥祕書丞集賢校理檢正中書户房公事章惇刪修都亭西驛條制夏人久不朝故西驛條制重復雜亂承用者無所適從至是復修貢故有是命知雄州張利一言北界有七八千騎過拒馬河南兩地共輸北塹等村地分續令歸信容城知縣縣尉領兵至彼其人馬即過河北及河北驛內復有人馬約一千餘詔安撫司體量因依以聞容城歸信縣人戶雖兩屬而北界前此未嘗遣兵巡邏故也上與王安石言患將帥不一安石曰陛下用心一則朝廷一朝廷一乃能一將帥上曰西事定後當如何經略安石曰不過什伍百姓訓練兵甲儲積財穀然大抵要馭將帥令奉行朝廷政令上又言將帥多不奉行朝廷意指安石曰陛下能察忠信誕謾不為人蔽欺即不敢不奉行朝廷意指今對面為姦罔無所懲即背面為姦罔復何所忌於有形狀可尋為讒慝無所忌即於無形狀可尋為讒慝何所不至姦罔讒慝不禁如此而欲治道起風俗變無此理陛下非不憂勤非不明察然事之機要處知略尚有所不及此所以大業尚難濟也陛下欲安民當以知人為先知人乃能馭臣則姦慝自當化為忠良左右前後多忠良則陛下何求不得何欲不成陛下所宜憂者左右前後忠良知略之臣少能開悟陛下聰明者殆未見其人也上曰求智略過人誠難得忠良安石曰欲人臣忠良在陛下聼察分明而已先是御史張商英言薛向罪王安石白上曰臣於衙前押綱事每事訪聞極感向照管無稍留滯及因商英論奏向齎文字説辨乃知所聞非謬向為三司使所任已重又於此事盡力反見侵辱如此何由得其心陛下見商英宜略戒敕上曰商英意亦無他安石曰商英雖無他然如何令薛向堪臣以為陛下若見薛向亦宜稍慰藉令知陛下知其盡力無過上以為然此段據日録殊未了了當考丙子詔升朝使臣以戰功得減年磨勘者不候磨勘即與收使以三班舊院制初有減年者須再經磨勘乃得用故也入內副都知張茂則等言二股河舊有龍女祠祈禱輒應乞賜廟額詔以河平為額賜神濟夫人罷樞密院檢用官杜純歸編敕所先是諸房條例即檢詳官檢用及都承旨李評建議始别置檢用官專主之而每用例則亦取之諸房徒使移報往復益為迂滯故罷之三月十七日純初除樞密院檢用條例官御集五年五月六日又差審官西院主簿胡宗師權檢用官當考詳相度諸班直諸軍牧地司言乞依勾當官董鉞狀將侵耕牧地分三等出租從之詔知涇州騏驥使王臨通判國子博士卞章並衝替章仍與逺小處監當節度推官蘇惟演支使崔世賢並勒停司法參軍眭從周追一任官勒停初涇卒謀為亂因告變伏誅而臨等論緣坐骨肉之法失于刻深故也後河北都轉運使韓縝言臨乘慶卒猖獗之後務在肅遏未為大過况臨剪除狂卒之功未加賞録乞與除落衝替遂以臨為河陽鈐轄先是三司起請市易十三條其一云兼并之家較固取利有害新法令市易務覺察申三司按置以法御批減去此條餘悉可之御史劉孝孫言於此見陛下寬仁愛民之至因言宜約束市易務王安石曰孝孫稱頌此事以為聖政臣愚竊謂此乃是聖政之闕天付陛下九州四海固將使陛下抑豪強伸貧弱使貧富均受其利非當有所畏忌不敢也較固法是有律已來行用今但申明所以為均均無貧蓋孔子之言於聖政有何害陛下不欲行此此兼并有以窺見陛下于權制豪強有所不敢故內連近習外惑言事官使之騰口也上笑曰已有律自可施行故不須立條安石曰雖有律未嘗行又未嘗委官司振舉須先申明使兼并知所避上曰若但設法傾之即兼并自不能為害安石曰若不敢明立法令但設法相傾即是紙鋪孫家所為孫乃百姓制百姓不得止當如此豈有天下主亦為孫家所為也上又言新法行故油貴安石曰以理論之必無此當是市人未喻耳安石退取市估及油店户私簿閲視明日亟白上曰油未嘗增價也又言茶籠行人狀稱新法便民牙人有誘人經三司陳訴嘗試官司如何者不可不斥逐茶籠行人乃曉此朝廷豈可不喻此乎陳瓘論曰吕嘉問請於律外别立市易較固一條神考聖訓以為已有律不須立條其時劉孝孫稱頌聖訓曰此仁厚愛民之意也安石奏曰孝孫之言非也此事正是聖政之闕也陛下不欲行此此兼并所以窺見陛下於權制豪強有所不敢故內連近習外惑言事官使之騰口也臣竊謂神考不欲於律外立較固之條可謂仁厚愛民之意劉孝孫將順聖美不為過也日録之內但為抑揚嘉問故不以御批為是不以孝孫為然於是造神考之言曰若設法傾之則兼并不能為害又撰對上之詞曰若不能明立法令但設法相傾即是紙鋪孫家所為紙鋪孫家為是百姓制百姓不得故止如此豈有為天下主乃止如紙鋪孫家所為何以謂之主嗚呼設法相傾之語謂之不誣可乎紙鋪孫家之語謂之不詆可乎神考愛民守法而指為闕政力主嘉問遂至於侮薄君父不亦悖乎戊寅左龍武大將軍寧州防禦使宗繢為登州防禦使以上批相王允弼遺奏乞推恩諸子以礙條不行今已終喪宗繢其長子可特遷一官故也詔諸蕃所進物三司初估例不盡當價必再估增價然後支賜及馬價亦如之其自今于初估即定實價并馬價亦以暗添錢就作添賜是月廢集州為難江縣𨽻巴州勿巡占城遣使朝貢
