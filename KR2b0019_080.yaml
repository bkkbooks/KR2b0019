body:
  text: 續資治通鑑長編巻七十六宋李燾撰真宗大中祥符四年六月癸卯朔徐州言知州山南東道節度使駙馬都尉吳元扆卒上甚悼惜之贈中書令諡忠惠子弟進秩者五人且以得疾時本州不即上言有詔劾其官屬後塟元扆時上元然燈為移次夕己酉詔諸路州府遣親屬奉方物詣汾隂者送學士院量試本業授試秩齋郎不就試者補三班借職如東封例辛亥益州言知霸州董仁誥為其廵檢使董延早所殺庚申命龍圖閣直學士陳彭年待制張知白王曙同詳定閤門儀制甲子以甚暑錄示軍民解毒方開封府言祥符縣有飛蝗先是春秋二仲月遣宗正卿以公服廵陵於是詔以祭服行事上以歙州嵗供宣敇大紙其數甚多頗勞民力思有以寛之知樞密事王欽若因奏諸房紙羡餘者凡一十萬八千三百番望令三司罷給一年仍裁本州造數從之遣中使宣諭副都承㫖張質已下仍特賜御筵江淮南水災民饑丙寅命起居舎人直史館李廸為安撫使内殿崇班閤門祗候張利用為都監所至存問里閭察訪官吏訊詳犴獄寛節財征以便宜從事既而廸等言廬壽州早稻已登江洪筠袁州漲溢民田不至全傷張利用未見知洪州李元病上與宰相歴選朝士將徙知揚州凌策代之上曰南昌水潦艱虞長吏當便宜從事不必禀於外計也王旦言䇿涖事和平若委以方面望即授江南轉運使詔可仍遣使諭以遴簡之意饒州產金前詔禁商賈販鬻或有論告逮繫滿獄策請縱民販市官責其算人甚便之實録於明年閏十月末乃書饒州事今依本𫝊并書之策除漕乙丑日也授交甘等州大食蒲端三麻蘭勿廵蒲婆羅國進奉使官劔利閬集壁巴等州饑詔賑之内供奉官張承素為其父贈豐州觀察使崇貴立神道碑上曰中官立碑恐無此例如李神福竇神興曽立碑即可此見㑹要李竇立碑事當考兩浙福建荆湖廣南諸州循偽制輸丁身錢嵗凡四十五萬四百貫民有子者或棄不養或賣為僮奴或度為釋老秋七月壬申朔詔悉除之癸酉歴代帝王陵寢申禁樵採犯者所在官司並論其罪丙子詔自今應差文武臣僚充安撫使副廵檢都監及提㸃刑獄之類但係同差帶職名者並令一班辭見合重行異位即依常例崇真資聖禪院市蔬擾人丁丑詔以蔬圃賜之庚辰上謂輔臣曰昨覃慶中外遷官惟入内内侍省内侍省官若依例改轉即勤惰勞逸不能均矣因取兩司官姓名較其入仕久近幹事繁簡第升降之遂詔從祀至脽上河中府入仕及十年者至西京入仕及十五年者留司掌事入仕及十七年者並與改轉將命在外者並如之其請長假及事故入仕未滿限者量増奉給内諸司使有子者恩例外更特與改轉一人詔奬淮南江浙荆湖制置發運使李溥兩浙轉運使陳堯佐荆湖南路轉運使孫冕知温州胡則知郴州袁延慶知濠州定逺縣王仲㣲以規畫供修玉清昭應宫材木無闕故也袁延慶未見詳定所言皇帝臨軒冊五嶽㕘詳冊文無作樂之儀上曰凡大朝㑹公卿出入尚作樂且禮緣人情宜令有司别撰樂章王旦曰冊案當於門外設次俟入則樂作從之詔丁謂李宗諤與禮官詳定五嶽衣冠制度及崇飾神像之禮壬午進封韓國長公主為衛國吳國長公主為楚國隨國長公主為越國甲申詔中書樞密院除改皇親檢行恩例自今凡進巻草並臣僚親封朕當面拆之即降處分時皇親加恩制未出有傳知者帝意内省見之遽即令進名付學士院草制次日始進覆狀又降此詔羣牧副使閻承翰與勾當估馬司趙守倫雖素為姻家又聯職任然不相得遂各訟訴並付御史臺鞫問承翰坐擅用公錢當贖金三十斤守倫坐違制移估馬司當免所居官典吏當杖脊乙酉詔寛其罰承翰贖金十斤守倫贖二十斤典吏亦降從杖羣牧都監張繼能判官陳越而下並釋罪制置使陳堯叟特免按問所用公錢悉蠲之戊子鎮眉昌等州皆言地震契丹界自應州而北地震裂有聲室宇摧圯人多壓死上曰此必遼境民災宜諭邊臣常為之備因議擇河北轉運使經度軍儲備緩急謂輔臣曰王曙淳厚李應機幹敏皆可委也乃以曙為轉運使應機為同轉運使開封府進士郭顔孫碩等同保應服勤詞學科碩預薦顔既被絀詣府自首有服紀不當赴舉欲以累碩上惡其險躁無儒行令配蔡州永勿齒貢籍碩等五人贖金殿三舉己丑詔河北濵棣州水潦為患比降赦命免其田租十之三今所納七分可更蠲其半三司假内蔵庫絹三十萬匹從之泉州觀察使駙馬柴宗慶表求邊任上謂輔臣曰宗慶未嘗更事豈堪此選卿等可召至中書諭以疆埸無虞恐動人情故不許也辛卯河南府言有蝗自死不害稼京東轉運使言蝗生食苗葉不傷穗國史院進所修太祖紀上録紀中義例未當者二十餘條謂王旦王欽若等曰如以鐘鼓樓為漏室窰務為甄官豈若直指其名也悉冝改正之欽若曰此蓋晁逈楊億所修上曰卿嘗參之耶旦曰朝廷撰集大典並當悉心務令廣僃初無彼此之别也因詔每巻自今先奏草本編修官及同修史官其初修或再㸔詳皆具載其名如有改正増益事件字數亦各於名下題出以考其勤惰焉工部尚書參知政事馮拯以疾求辭優詔不許且作詩諭意拯復三表固請甲午罷為刑部尚書知河南府知西京留守司事仍令委事官屬聽養疾自便知樞密院事王欽若言近者王公車輅皆飾以龍頗紊彛制請下太常禮院檢詳以其法付太僕寺重修永為定式使尊卑不瀆從之八月壬寅朔捧日右廂都指揮使王潛等七人各授諸州團練使刺史赴本任仍令審官院擇官為通判增給諸王府公用錢相王舒王嵗萬三千貫榮王萬貫上謂宰相曰朝廷宜守經制儻務更張則攀援者衆乃知命令之出不可不謹今言某事有利輕為釐革始則皆以為當久乃翻成有害洎加裁正是朝令夕改也又涖官之人不可過為寛恕以致弛慢或探求罪惡不顧煩擾抑又甚矣王旦曰古人有言法出而獘作令下而姦生寛則民慢䧟法者多猛則民殘無所措手足正為此也詔樞密院凡軍校轉員諸班都虞候料錢及三十貫者並與除遙郡刺史開封府言咸平中牟二縣蝗初龍圖閣直學士陳彭年言前所頒諸路發解條式與禮部新格不同慮官吏惑於行用望申明之詔翰林學士晁逈等重加詳定癸卯逈等上其書乃頒於諸路甲辰兖州言蚄蟲生有蟲青色隨齧之化為水時謂旁不肯蟲上謂宰相曰昨遣人潛視東畿苗稼大率所傷不過三四分王旦曰陛下憂民之切上天固當垂祐矧連歳豐稔今兹小損亦未至失所也丙午詔外任官負罪衝替及别與差遣者詔到所在權差官代之即使離任令諸路除畬田依舊俗外勿非時火田以傷生類右諫議大夫知廣州楊覃勤於吏事所至以幹局稱南海有番舶之利前後牧守或致謗議覃循謹清介逺人宜之及卒有洒泣者丁未復置廣濟河催綱朝臣是職舊命常參官近嵗省去止用使臣而州郡皆不承禀故復之祀汾隂考制度使馮起等言陜州湖城縣民張化基閻用和楊忠並累世同居詔旌其門閭庚戍以汾隂禮成曲宴宗室輔臣於後苑賜衣帶器幣有差時刑部尚書馮拯新解政事特召預㑹賜子同輔臣荆州言南和縣荒地秬黍自生約二十頃頗濟饑民癸丑贈懐州防禦使河内侯惟叙卒有司言惟叙於上為再從姪無臨䘮制服之禮上特行焉時榮王元儼生辰伊邇上曰朕已諭元儼若開宴宜改擇日王旦曰但不舉樂於禮亦無嫌也明道二年九月贈保靜留後髙平郡公丙辰録唐長孫無忌段秀實等孫授以三班借職祖宗以來兩省御史臺官須文學優長政治尤異者乃特除拜汾隂肆赦始以叙遷上恐循習非便乃詔自今遵守舊制不得以他官轉入其東頭供奉官至閤門祗候高品至殿頭内供奉官至崇班亦不得一例遷授其合陞改者當優與差遣增其俸給三司使丁謂言東封及汾隂賞賜億萬加以蠲復諸路租賦除免口算聖澤寛大恐有司經費不給上曰國家所務正為澤及下民但敦本抑末節用謹度自當富足矣丁巳詔文武官有言刑政得失邊防機事者並賜對其餘細務令條列以聞辛酉令淮南轉運使安集滁和等州流民癸亥甘州輝和爾可汗王伊嚕格勒遣使奉表詣闕初伊嚕格勒屢與夏州接戰毎遣使入貢即為趙徳明所掠至是總噶爾等族皆感朝恩遣人防援而至焉乙丑刻御製大中祥符頌於左承天祥符門戊辰河決通利軍合御河壊大名城傷田廬遣使發廪米賑被水家人一斛又遣使詣􅉸州經度西岸開減水河上謂宰相曰獻計者言疏治此河可以析水勢省民力役成宜奬之九月辛未朔以霖雨遣官分祈天地宗廟社稷在京神祠寺觀京城民僦官舎者免其直三日賜諸軍薪蒸壬申上作内蔵庫銘癸酉詔諸路州軍縣鎮文武官見居逺任家屬寓止者如其子孫弟姪無頼不幹家業即嚴行約束茍不悛革則并其交㳺之輩劾罪以聞從樞密直學士劉綜之請也明年五月綜始知開封本傳以此事為綜在開封時所請恐誤也乙亥免監内弓箭庫内園使綦政敏削一任同監官如京副使安繼昌特停官政敏坐私役公人上書不實繼昌素與政敏不協因遺庫吏錢使上書訟政敏故并責之㑹要在十一月丙子秘書監向敏中等請集御製蔵於館閣從之仍詔不得與太宗御集同處於是内出雜文篇什付敏中等各以類分其繼作即續附之丁丑以霖雨未止遣官祈祀涇原鈐轄曹瑋言隴山外籠竿川熟户蕃部以閑田輸官請於要害地立堡寨募弓箭手居之且言異時秦渭有警此必爭之地也詔可此年冬乃成庚辰詔自今訴訟民年七十已上及廢疾者不得投牒並令以次家長代之若己自犯罪及孤獨者論如律汾隂赦書諸路催欠司向來五日一次科責自今令季限比較區斷其官吏亦别議定徙寛條制辛巳三司定三分以上催欠官知州通判罰直之差凡三等三分以下並免從之壬午兩浙轉運使陳堯佐言淮南廬壽等州有流民至常潤州已依詔㫖發廪粟減直出糶河陽言河溢于温縣甲申曹瑋言趙徳明遣軍校蘇守信領兵攻西凉䇿丹族其首領斯多特㑹諸族禦之大敗其衆乙酉詔諸州所閱老疾軍校補署未及三年者不須停免丁亥詔殿前侍衛司宣徽院三司軍頭司自今以請託為名而率歛軍士緡錢其同謀及受贓並處斬軍校知情者連坐不知情者决配三司鹽鐡副使林特上祀汾陰慶賜例冊上謂宰臣曰外道所給比往年南郊乃多十餘萬蓋募兵太廣爾其間老疾不任事者當令簡閱之王旦曰言事者稱民間或有小歉及㳺手者皆宜募置軍籍然一列軍門何由復業不若令田農有利自致滋殖也上然之戊子幸太一宫祈晴己丑以工部郎中龍圖閣待制張知白為契丹國主生辰使崇儀副使薛惟正副之兵部員外郎兼侍御史知雜事趙湘為正旦使供奉官閤門祗候符承翰副之惟正至幽州赴㑹飲射不如儀使還詔劾其罪惟正承翰未見蘇州言吳江汎溢壊廬舎詔遣使按視存䘏仍詣廟致祭辛卯命資政殿大學士刑部尚書向敏中為東嶽奉冊使兵部郎中龍圖閣待制孫奭副之工部侍郎集賢院學士薛映為南嶽奉冊使給事中錢惟演副之翰林學士工部侍郎知制誥晁逈為西嶽奉冊使刑部郎中龍圖閣待制查道副之禮部侍郎馮起為北嶽奉冊使太僕寺少卿裴莊副之右諫議大夫龍圖閣直學士陳彭年為中嶽奉冊使光祿少卿沈繼宗副之其玉冊如宗廟諡冊之制繼宗倫子癸巳御乾元樓觀酺凡五日先是温州甘子園及蓮池三司定課令本州配市丁酉詔以其課給本州公用冬十月辛丑遣使齎手詔勞問知河南府馮拯賜以茶藥使還言拯奉詔感動涕泗交下壬寅詔河北忠烈宣勇軍士本自户籍選置其老疾者召人承補然後歸農如聞承補之人或有逃亡官司復收録農者充役甚無謂也自今不得更然癸卯詔自今諸路州院司理院繫囚死者並遣他司官吏檢視防其枉抑也軍頭引見司言諸色人邀車駕進封事悉無異見竒策又非枉抑但欲僥望恩澤請示條禁違者論其罪從之丙午上謂王欽若曰每嵗寒食初冬宫人上陵在路所須之物皆令預立定數蓋防其擾民如聞宗室諸宫嵗遣人拜掃所歴州縣過有呼索可切戒之戊申有司設五嶽冊使一品鹵簿及授冊黄麾仗於乾元門外各依方所又設載冊輅及衮冕輿於乾元門外羣臣朝服序班仗衛如元㑹儀上服衮冕御乾元殿中書侍郎引五嶽玉冊尚衣奉衮冕升殿上為之興奉冊使副班于香案前侍中宣制曰今加上五嶽帝號遣卿等持節奉冊展禮咸承制再拜奉冊使以次升自東階受冊于御坐前降西階副使受衮冕于丹墀玉冊至乾元門列黄麾仗設登歌奉冊於車衮冕於輿使副袴褶騎從遣官三十員前導及門奉置幄次以州長吏以下充祀官致祭畢奉冊衮冕置殿内辛亥太常丞李經言州縣多冒夜秉燭杖罪人至有僱人受杖者望嚴行禁止從之壬子詔如聞州縣社壇多不如禮至有縱民放牧臨祭之日始重修飾宜令禮官檢定制度頒下甲寅詔自今决杖令衆者舊十日減為三日以上者勿過五日暑月免之丁巳上以江南淮南接壤而鹽酒之價不等令三司與江淮制置發運使李溥規定以聞有司執言慮失嵗課上曰茍便於民何顧嵗入也丙寅召輔臣至苑中山亭觀太宗聖製及四部書由玊宸殿佛閣至東西洞觀古書讀御製書籍記石上作詩王旦等賦和丁卯白波發運判官史瑩言孟州汜水縣孤栢嶺下緣南岸山址導河入汴甚為便利詔勾當汴口楊守遵與瑩偕徃經度守遵言役大而流悍非人力可禦又詔内侍副都知閻承翰覆視承翰亦言其不可遂罷承翰因請浚四渠於汴水下流以防潰溢從之承翰乞浚四渠實録在四月庚申今從㑹要并書於此戊辰詔修玉清昭應宫使丁謂同修宫使李宗諤副使劉承珪都監藍繼宗視内殿功徳及御書因命宴而承珪繼宗賜食于别次上作詩賜謂等初冦準在中書多召兩制㑹飲私第酒酣氣盛必閉關苛留之往往侵夜畏謹者甚憚焉宗諤嘗預㑹日既夕矣而關不可啓遂於門扉下竊出得馬以走於是上勸宗諤酒宗諤堅辭以醉且云日暮上令中使附耳語云此間不須從門扉下出宗諤皇恐致謝上笑而頷之因謂宗諤曰聞卿至孝宗族頗多長㓜雍睦朕嗣守二聖基業亦如卿軰之保守門户也宗諤頓首謝上又曰翰林清華之地前賢敭歴多有故事卿父子為之必周知也宗諤嘗著翰林雜記國朝新制翌日上之手詔褒荅命蔵内署殿中侍御史薛奎性剛不茍合遇事敢言上時數宴大臣至有霑醉者奎諫曰陛下嗣位之初勤心萬務而簡於燕幸今天下誠無事而飲樂無度又大臣數被酒無威儀非所以為朝廷重也上善其言奎諫附此奎除殿中不得其時今年十一月乃以殿中判磨勘司明年二月遂出為陜漕己巳西凉府六谷都首領斯多特遣錫喇卜薩木丹来貢賜紫方袍是月詔諸司所奏公事並須同官商議無得各執異見上諭王欽若等曰昨日殿前都指揮使曹璨奏本司孔目官出職其以次勾押官亦乞一例出充班行且殿前侍衛諸司孔目官已下皆掌軍兵之事若散令出職事亦非便况曽降宣命條約並令轉至孔目官五周年年及五十已上方許出職安排樞密院當誌之不可輙隳此制仍明諭曹璨知之初置牧養病馬江淮發運使文思使李溥自陳年終漕輦之績詔示王欽若等特改北作坊使以酬之此據㑹要三司言衣庫使監𣙜貨務安守忠一界收到出剩課利萬數至多覆之皆實詔特改軍器庫使此亦據㑹要詔先差内品往諸州勾當場務其内品皆是克復廣南後即選識字彊明者任之今老不任事若别用後生者多不能幹集自今有内品貟闕精加選擇如闕人即改差使臣十一月庚午朔詔聞河朔諸州解送舉人艱於考覈頗多黜落令轉運使於落解舉人至多處遣官别加考試合格人送禮部占城國遣使貢獅子甲戍詔河中府進士五舉諸州諸科終塲七舉已上特許禮部奏名伊嚕格勒遣使言敗趙徳明乞賞其立功首領詔付空名司戈司階郎將十道使承制補署之先是汾陰赦書舉服勤詞學經明行修之士如東封例准不覆考丙子上御崇政殿親試進士扣殿檻請諭詩賦論題所出上令録示之始令賦論中不得用小臣儒有字又以冬晝景短罷常務不决即令引試内出新定條制舉人納試巻内臣收之先付編排官去其巻首鄉貫狀以字號第之付彌封官謄冩校勘用御書院印始付考官定等訖復彌封送覆考官再定等編排官閱其同異未同者再考之如復不同即以相附近者為定始取鄉貫狀字號合之乃第其姓名差次并試巻以聞遂臨軒唱第其考第之制學識優長詞理精絶為第一等才思該通文理周密為第二等文理俱通為第三等文理中平為第四等文理踈淺為第五等自餘率如貢院舊制賜進士張師徳等二十一人及第十人同出身諸科及第者四十二人同出身者八人師徳去華子也汾隂路多獻文章者庚辰詔以前均州參軍許洞前彰武節度推官解旦等九人姓名付中書令召試中書言旦及進士范本陳矩詞學可采授旦著作郎本賜及第矩出身洞蘇州人辛巳詔自今知貢舉及發解官並令門辭遣官伴送入院不得更求上殿及進呈題目壬午知河南府馮拯言官市芻粟望増給其直陳堯叟曰増直以市不若徙馬他所京師馬舊留二萬今留七千自餘悉付外監仍欲於七千之中更以四千付淳澤監嵗可省芻粟三百餘萬若有給賜朝取夕至矣從之㑹要於明年四月始載堯叟言又馬數不同今從實録上又曰馬及十萬當且止也王旦曰聽民間畜養官中緩急以本直市之猶外廐爾且所費芻粟皆出兩税少損馬食用資軍儲亦當世之切務馬知節曰馬多不精若十萬匹選可用者當得四五萬耳多畜駑弱其費愈甚上然之實録載上云馬數十萬可止在六年二月今從寳訓并書之癸未諸路轉運提㸃刑獄安撫等司自今不得牒監場務京朝官使臣令體量州縣官吏以其統攝之下言多不實故也工部侍郎种放屢至闕下俄復還山人有貽書嘲其出處之迹且勸以亟辭禄位居嵒谷放不荅放終身不娶尤惡囂雜故京城賜第為擇僻處然禄賜既優晩節頗飾輿服於長安廣置良田歳利甚溥亦有彊市者遂致爭訟門人族屬依倚恣横王嗣宗之出守長安始甚敬放放被酒稍倨嗣宗怒以語譏放放曰吾不猶愈乎角力而中第乎初嗣宗就試講武殿嘗因戯弁擢首科故放及之嗣宗媿憾因上䟽言所部兼并之家侵漁衆民凌暴孤寡凡十餘族而放為之首且述放弟姪無頼據林麓樵採周回二百餘里奪編甿厚利願以臣疏下放而賜放終南田百畆徙放嵩山疏辭極其醜詆目放為魑魅且屢遣人責放不法上方待放厚詔工部郎中施䕶推究㑹赦恩而止於是放自乞徙居嵩山天封觀側詔遣内侍就興唐觀基起第賜之假踰百日續給其奉然猶往來終南按視田畆每行必給驛乘在道或親詬驛吏規算糧具之直時議浸薄焉王嗣宗傳云令放徙嵩山以避之按今年正月嗣宗已有命徙邠州放四月方還終南及今乃徙居然則徙居不縁避嗣宗也傳語誤壬辰詔華州管内靈蹟並禁樵採癸巳封駙馬都尉柴宗慶母穆氏為河南郡君宗慶以母為嫂故不得封衛國長公主數有陳乞乃特封之甲午契丹國主遣使右威衛上將軍蕭昌琬副使衛尉卿王寕來賀承天節乙未免雄霸莫州信安乾寧保定軍今年秋租十之七法官言准赦詳律令制書有失於重者四條請減定從之戊戌詔加上東嶽淑明后南嶽景明后西嶽肅明后北嶽靖明后中嶽貞明后之號仍遣官祭告是月詔選使臣一人管勾故太師趙普家事普妻和氏卒因其家自請而從之三朝寳訓䘏舊族云趙普妻卒上令中使録其家貲數甚廣因謂左右曰普夫妻儉嗇致此儲蓄其子承宗已卒承煦尚㓜當遣使臣為主家務無令散失按承宗死於淳化二年承煦時已二十八嵗今不得云尚㓜蓋寳訓潤文遂失事實耳今但從㑹要十二月庚子朔以左領軍衛大將軍楊瓊知兖州有州卒自言得神術能飛行空中州人頗惑瓊捕至折其足奏戮之衆伏其明壬寅䕫州路轉運使言近置暗利寨有為惡蠻人能率屬歸投者署其首領職名月給食鹽詔可詔三禮三傳科自今各减一塲仍以五通為合格乙巳詔楚泰等州民為湖水害稼者給復其租没溺者人賜千錢米一斛戊申太常博士江嗣宗言陛下躬臨庶政十有五年殿廷間事一取聖斷有勞宸慮今請禮樂征伐大事出於一人自餘細務委任大臣百司上曰此頗識大體乃詔褒嗣宗從其所請江嗣宗未見知河南府馮拯言天慶節公費錢不充詔嵗増十萬江淮發運使邵曄言先准詔江淮路以廪粟賑貸及減價出糶者凡二十萬石庚戍兵部郎中龍圖閣待制孫奭以親老解官歸侍不許辛亥幸殿前班召從臣觀騎士習武藝賜物有差遂幸潛龍園宴射上封者言京城殺禽鳥水族以供食饌其數甚廣有傷生理望賜條約上曰如聞内廷及皇親諸縣市此物者尤衆可令入内内侍省内東門司嚴加約束庶乎自内及外使民知禁也甲寅判太常禮院孫奭言準禮冬至祀圜丘有司攝事以天神六百九十位從祀今惟有五方上帝及五人帝五人神十七位天皇大帝以下並不設位且太昊句芒惟孟夏雩祀季秋大享及之今乃祀於冬至恐未叶宜詔兩制及崇文院詳定翰林學士晁逈等言按開寳通禮圜丘有司攝事祀昊天配帝日月五星中宫外宫衆星總六百八十七位雩祀大饗昊天配帝五天五帝五官總十七位方丘祭皇地祗配帝神州嶽鎮海瀆七十一位今司天監所設圜丘雩祀明堂並十七位方丘七十一位即是方丘有嶽瀆從祀圜丘無星辰而反以五人帝從祀參詳故事實為闕典望如奭所請以通禮神位為定其有增益者如後敇奏可京城糓貴乙卯詔發惠民廩粟賤糶以濟之庚申溪洞安逺順南永寧濁水等州蠻田承曉等三百七十二人來貢甲子契丹遣使長寧節度使耶律漢寧副使太常少卿張儉來賀明年正旦詔京東諸州兵甲自來專委徐州提轄疆界闊逺恐難管攝可據地勢分委徐州兖州齊州知州提舉是嵗天下户十三萬三千一百一十二口五十四萬一千四百一十九
