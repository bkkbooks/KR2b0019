body:
  text: 續資治通鑑長編卷一百九十宋李燾撰仁宗嘉祐四年秋七月丙申太子中允王陶為監察御史裏行初詔中丞韓絳舉御史而限以資任屢舉不應格於是絳請舉裏行以陶為之詔可陶辭不受詔強之乃就職按景祐元年二月中丞韓億請復置殿中侍御史監察御史裏行詔從之是年五月張宗誼孫沔並為監察御史裏行慶厯三年十一月李京包拯又並為監察御史裏行今實録云初以陶為裏行恐誤也會要亦同實録今並不取詔強陶使受今從記聞陶傳云時狄青罷樞密為使相陶上言祖宗以來未有軍佐之人在此位者宜著為令使後毋復然按青罷樞密為使相前此矣今不取贈管勾雍州古萬寨兵甲三班奉職李惟賔為內殿承制以蘇茂州蠻冦邊而惟賔戰死也甲辰貶觀文殿學士禮部侍郎知夀州孫沔為檢校工部尚書寧國軍節度副使初臺諫交論沔淫縱不法事詔按其實而使者奏沔在處州時於遊人中見女子白牡丹者誘與姦後數召會郡舍至或踰城往來及在杭州嘗從蕭山民鄭旻市紗旻髙其直沔以為恨會旻貿紗有隱而不稅者事覺沔取其家簿記積計不稅者幾萬端配𨽻旻他州州人許眀有大珠百妻弟邊珣以錢三萬三千強市之沔愛眀所藏郭虔暉畫鷹圖明不以獻初眀父禱水仙大王廟生眀故幼名大王兒沔即捕案眀僣稱王取其畫鷹圖配刺之及沔罷去眀詣提點刑獄斷一臂自訟乃得釋悅州人金氏女白晝使卒輿致亂之有趙氏女許嫁莘旦沔見西湖上令吏戒莘姥絶昏弗許又使官妓戒趙姥趙姥以莘姥為解沔聞僧與莘氏私者得從曉并莘母鞫為姦置之法遂取趙女至州宅與飲食卧起所刺配以百數及罷盜其案去後有訴寃者多以無案不能自解在并州私役使吏卒往來青州麟州市買紗絹紙藥物官庭列大挺或以暴怒擊訴事者常剔取盜足筋斷之奏至故貶又降知欣州四方館使李中吉為東上閣門使汝州鈐轄中吉先自欣州載家妓至并州與孫沔狎飲又以妓遺沔沔受之并為言者所劾中吉坐是貶杖殺驍騎張玉時河北都轉運使李參簡退諸軍老羸者萬餘人軍士頗出怨言玉素凶險疑三司使包拯以祫享甫近愛惜賞給風參為此因突入三司詬拯拯使醫診驗謂有心疾第送殿前司皇城邏者具以聞詔下開封按其事玉實無心疾臺諫乃言玉驕悖敢凌辱大臣不可不誅法官奏比附諸軍犯階級罪當死遂誅之司馬光七年五月奏疏云軍人罵三司使而法官以為非犯階級疑於用法朝廷雖誅其人而已停之卒復收養之此事實録所載殊不詳當考初涇卒以折支不給出惡言慢通判相糾欲為亂其後斬二人黥四人亂意乃息詔提舉在京諸司庫務胡宿置獄劾三司吏不眀計度三司使包拯護吏不遣宿言涇卒悖慢誠其罪然折支軍情所繫積八十五日而不與則三司豈得無罪陛下以包拯近臣不欲與吏一體置對可謂曲法申慈而拯不知省懼公拒制命如此則主威不行綱紀益廢矣拯皇恐遣吏就獄此據胡宗愈所作胡宿行狀附見丙午後宫彭城縣君劉氏於洞真宫為法正虛妙大師賜名道一劉氏自民間入宫為司飾又嘗掌供御膳偶得進幸恃上恩多凌慢一夕逐在延福宫揭屏風紙自作奏凡數百字幾感動上意然卒逐之後又坐罪削髮為妙法院尼丁未又放宫人二百三十六人初劉氏在掖廷通請謁為姦御史中丞韓絳密以聞上曰非卿言朕不知此當審驗之後數日出劉氏及他不謹者且詔中書召韓絳諭意劉氏及黃氏在十閣中尤驕恣者也於是并黃氏皆出之己酉詔殿前馬步軍司皆置檢法官一人先是有禁卒妻男皆為人所殺殿前副都指揮使許懷德以其夫為不能防間謫配下軍侍御史知雜事吳中復言三衙用刑多不中理請置檢法官既從之尋有言其非便者復罷之司馬記聞云朝士魯有立上言非便故罷之當考二年五月癸未修編敕劉敞云云并可𠫭照甲寅校書郎致仕孔􅌈為國子監直講揚州進士孫侔為試校書郎本州州學教授皆以近臣薦其行義也兩人卒辭不就侔讀書多自得文甚竒古嘗舉進士不中母病革時以為恨侔自誓不復求仕客居江淮間士大夫敬畏之劉敞知揚州嘗薦侔曰侔居則孝悌仕則忠信足以矯俗扶世求之朝廷吕公著王安石之流也及敞帥永興奏辟掌機宜侔亦不就先是太學生鄭叔雄者善醫用王舉正及吳中復薦授校書郎知諫院范師道因言山林有道之士近臣屢薦輒不報而方技援例必行非所以示天下也於是􅌈等皆除官庚申詔在京所造軍器多不精利其選朝臣使臣各一員揀試之裝御營卒桑達數十人酗酒鬬呼指斥乘輿有司不之覺皇城使以旨捕送開封府推鞫案成棄逹市糾察刑獄劉敞移府問所以不經審訊之由府報曰近例凡聖旨中書門下樞密院所鞫獄皆不慮問敞曰此豈可行耶遂奏請自今一凖定格樞密使以開封府有例不復論可否進呈報敞不行敞爭之曰先帝仁聖欽恤以京師刑獄最繁故建糾察一司澄審真偽自爾以來每有大辟倍加精審此則先帝不敢兼于庶獄庶謹惟有司之任今乃曲忤聖旨中書門下樞密院所鞫公事不復審察未見所以尊朝廷審刑罰而適足啓府縣弛慢獄吏侵侮罪人銜寃不得告訴之弊又朝廷舊法不許用例破條今顧於刑獄極謹人命至重之際而廢條用例此臣所不喻也上乃以敞章下開封府著為令此據敞行狀又奏議狀以七月二十四日上八月七日報可今附七月末敞又言伏見先帝哀矜庶獄開釋無辜以京師浩穰獄訟頻多創設糾察一司辨理微枉澄審繆誤誠不欲使吏得弄法民陷非罪設令侵寃有所告訴也伏見諸大辟公事或具獄既上情涉可疑或審問之際囚自翻變者並皆移司推勘左軍則移右軍右軍則移左軍府司亦然然此三處形勢既均利害略同更相顧望自為地道寧伸吏典莫念民枉以此治獄恐非朝廷欽恤之意臣謂諸大辟公事其情理可疑及囚自變者並委糾察司奏請别差官置勘其司獄等仍須與原勘處不相干礙方許抽差如此則獄無銜寃之濫無試法之幸好生之德洽民心矣敞此奏不得其時今附見七年正月有詔兩軍巡翻異者送御史臺推劾恐或有此上始欲於景靈宫建郭皇后影殿禮官言其不可遂寢之既而翰林侍講學士楊安國請建影殿於洪福院再下禮院檢詳禮官言影殿非古也比年萬壽觀建溫成皇后影殿蓋事出一時未經禮官審訂不足以訓于後若謂郭皇后本無大過今既牽復位號則宜賜以諡册祔於后廟以正典禮八月甲戍知制誥劉敞言伏聞禮官倡議欲祔郭氏於廟臣竊惑之昔春秋之義夫人不薨于寢不赴于同不反哭于廟則不言夫人不稱小君徒以禮不足故名號闕然然則名與禮非同物也名號存而禮不足因不敢正其稱况敢正其義者乎郭后之廢雖云無大罪然亦既廢矣及其追復也許其號而不許其禮且二十餘年今一旦欲治以嫡后之儀致之於廟然則郭后之殂也為薨於寢乎赴于同乎反哭於廟乎羣臣百姓亦嘗以母之義為之齊衰乎恐其未安於春秋也春秋夫人於彼三者一不備則不正其稱而郭氏於三者無一焉而欲正其禮恐其未安於義也禘於太廟用致夫人蓋以未致者不宜致也不宜致者以其不薨於寢不祔于姑也且傳曰不有廢也君何以興廢興之間必有正與不正之理存焉今欲扶所廢以為正亦將抑所興以為不正古者不二嫡則萬世之後宗廟之禮豈臣子所當擅輕重哉謹按景祐詔書本不許郭氏祔廟議已決矣無為復紛紜以亂大禮議者或謂郭氏之追命也詔書薄其過既復其號不得不異其禮譬猶大臣坐非辜而貶者茍眀其非辜則復用之豈得遂不使為大臣夫物有殊類異勢未可以相凖者臣之於妻其義雖均然逐臣可以復歸放妻不可復合臣衆而妻一也故春秋公孫嬰齊卒于貍脤君曰吾固許之反為大夫此逐官可以復歸也杞伯來逆叔姬之喪以歸夫無逆出妻之喪而為之者此放妻不可復合也今追祔郭氏得無近於此乎乞令諸儒博議極其論難以求折𠂻於禮為允詔下學士院詳定據蘇頌所作孫抃行狀則倡議祔后廟乃抃也又據汪藻所編詔旨蘇頌傳頌實倡議者頌以至和元年十一月同知禮院頌行狀是曾肇作抃行狀云初仁宗追閔故后郭氏以微過廢卒久無祠所詔於景靈建神御殿嵗時追享上封者言神御殿不當建或曰當祔於廟詔下禮官頌與僚屬同執非是獻議曰先朝建神御殿已非禮然猶尊奉祖考不失孝思之議今為后妃而置之其於失禮又甚矣儻陛下追念郭氏殂謝既已追復位號不若因而賜以諡册祔于皇后廟則恩意至而典禮存焉復下兩制合議久之不決然卒罷神御不建頌傳云嘉祐初詔禮院議立故郭皇后神御殿于景靈宫頌以謂敕書云向因忿鬱偶失謙恭則無可廢之事又云朕念其自歷長秋僅周一紀逮事先后祗奉寢園此則有不當廢之悔又云可追復皇后其祔廟諡册並停此則有合祔廟諡册之議請祔郭皇后於廟以成追復之議備薦享之禮衆論未決一日白事都堂曽公亮問曰學士議郭皇后事甚善然郭后是上元妃若祔廟則事體重矣頌曰國朝祖宗三聖賀尹潘皆元妃事體正相類今止祔后廟則豈得有異同之言公亮曰議者以謂隂迫母后是恐萬嵗後配祔之意頌曰若加一懷愍哀之諡則不為逼矣公亮嘆重久之然事終不行乙亥御崇政殿䇿試應才識兼茂眀於體用科眀州觀察推官陳舜俞賢良方正直言極諫旌德縣尉錢藻汪輔之舜俞藻所對䇿並入第四等授舜俞著作佐郎簽書忠正軍節度判官事藻試校書郎無為軍判官輔之亦入等監察御史裏行沈起言其無行罷之輔之躁忿因以書誚讓富弼曰公為宰相但奉臺諫風旨而已天下何賴焉弼不能答舜俞烏程人藻璆五世孫也輔之邑里未詳汪輔之與富弼書見馮潔已御史臺記戊寅降知鳯翔府兵部郎中直龍圖閣宋禧知汝州江南東路轉運使兵部郎中范寬之知濠州禮賔副使王知和為均州都監并坐前為兩浙轉運使提點刑獄而失按知杭州孫沔也庚辰詔學士院趣上郭皇后祔廟議先是禮官祥符張洞駮劉敞議曰竊以郭氏正位中宫母儀天下逮事先后親奉寢園案於禮法無大過惡不可絀廢所以名臣感慨抗論於朝中外迄今韙之陛下閔其偶失謙恭旋亦昭洗乃復位號位號既復則諡册祔廟安得並停蓋當時執政大臣護已然之失乖正名之典若以平昔之議為得彌可駭惑况引春秋禘于太廟用致夫人之例據左氏則哀薑之惡所不忍道考二傳之説復有非嫡之辭以此證本朝之事恐非其當若曰不薨于寢不赴于同不祔于姑則郭后之歿不得其所責當歸於朝廷死者何罪而始儷宸極終不廟食邪儻以杞伯來逆叔姬之喪質之譏其既棄而復逆則天子之后萬方兆姓之母也非有極惡又可棄之乎既追復曰皇后可絶其享乎議者欲用後漢東晉故事或祭於陵寢或築宫於外稽考二史皆稱曰母后况之于今未見其合也惟唐創立别廟遇禘祫則奉以入享於義為允敞復奏曰臣觀洞之言曼詞飾説似茍欲蔽前之失而非忠信之道也前世之道廢斥后妃皆溺於私愛或嬖妾上譛或讒訴妄及此則羣臣當引大體伏節死爭如陛下於郭后固未嘗有此蓋于時聖慮在宗廟社稷之際不得不然爾昔漢光武起於布衣紹復天位郭氏其后也正位十有六年子疆為太子輔為中山王可謂盛矣然自見年長寵衰數懷怨懟光武由此廢之為中山王太后其後太子疆亦自貶為東海王然當時文武之臣元功俊德布於朝廷不以光武為情有厚薄亦不以郭氏為過不當廢者其意識深逺知事有不得已也今陛下之慮豈不然乎光武雖廢郭氏然顧待其家初不衰減亦眀退人以義不緣於私故也此又詔書所以追復郭氏之意矣用平生之愛故尊以虛名顧禮義之正故絶其祔廟是范曄所謂使後世不見薄厚進退之源者也至公至平可謂折中今洞之意以追復郭氏則出於天子以停止廟諡則出於大臣共一詔書也而論之異同未知洞何從見之若不幸而此言傳於後且歸過君父虧損聖德此其一也且臣前奏最要切者以謂興廢不兩立而人君無二嫡備萬世之後而禮分不眀也洞既不以此為辨若不幸朝廷過聽之是雖自以能訐上起廢為功而猶且隂逼母后妄瀆禮正此其二也臣以謂非臣子之義忠信之道矣伏乞并下臣章令兩制詳議臣誠愚竊恥聖朝無光武之臣是以莫能推眀上德而又崇飾誹謗營為非禮也洞復疏難敞説其後學士院卒不上議時集賢校理蘇頌亦為禮官所請與洞合一日白事都堂曾公亮問曰郭后乃上元妃若祔廟則事體重矣頌曰國朝祖宗三聖賀尹潘皆元妃事體正相類今止祔后廟則豈得有異同之言公亮曰議者以謂隂逼母后是恐萬嵗後配祔之意頌曰若加一懷愍哀之諡則不為逼矣公亮稱善然議終格辛巳贈知虔化縣衛尉寺丞趙樞為兵部員外郎樞死事故也癸未賜殿中丞致仕龍昌期五品服絹百匹昌期陵州人寶元中韓琦使蜀奏授試國子西門助教文彥博知益州召置州學奏改校書郎用眀鎬薦遷太子洗馬致仕又以眀堂恩遷殿中丞先是昌期上所著書百餘卷詔下兩制看詳兩制言昌期詭誕穿鑿指周公為大姦不可以訓乞令益州毁棄所刻板本昌期年幾九十詣闕自辨彥博少從昌期學因力薦之故有是賜翰林學士歐陽修知制誥劉敞等劾昌期異端害道當伏少正卯之誅不宜推奬同知通進銀臺司兼門下封駮事何郯亦封還詔書乃追奪昌期所賜遣歸何郯傳云文彥博深惡郯言自銀臺司徙判吏部銓案郯徙判銓乃明年九月此時彥博不在中書傳誤也劉敞行狀云昌期惶恐不敢受賜今從國史甲申詔比者霖雨害稼其遣官體量減放開封界及京東路民稅以聞乙酉户部員外郎天章閣待制唐介為契丹國母生辰使六宅使梅州刺史桑宗望副之侍御史丁詡為契丹生辰使左藏庫副使劉建勳副之開封府判官工部郎中張中庸為契丹國母正旦使左藏庫副使馮文顯副之太常博士集賢校理判理欠憑由司沈遘為契丹正旦使供備副使髙繼芳副之遘錢塘人也先是禮官張洞韓維言國朝每遇禘祫奉别廟四后之主合食太廟據唐郊祀志載禘祫祝文自獻祖至肅宗凡十一帝所配皆一后其間惟睿宗二后蓋昭成眀皇之母也又續曲臺禮有别廟皇后合食之文蓋未有本室遇祫饗即祔祖姑之下所以大順中以三太后配列禘祭博士商盈孫以誤認曲臺禮意當時不能改正議者譏其非禮臣等伏思每室既有定配則餘后於禮不當升祔遂從别廟之祭而禘祫之日復來參列與郊祀志曲臺禮相戾今親行盛禮義當革正其皇后廟伏請依奉慈廟例遣官致祭詔待制以上議而翰林學士承旨孫抃學士胡宿侍讀學士李昭述侍講學士向傳式知制誥劉敞王璹天章閣待制何郯等議曰春秋傳曰大祫者何合祭也未毁廟之主皆升合食於太祖且以國朝事宗廟百有餘年至祫之日别廟后主皆升合食遵用以為典制非無據也此聖祖神宗𠫭用歷代之法因時施宜以貽子孫者也未易輕改况大中祥符五年已曽定議一時禮官著約中之論而先帝有恭依之詔且行之已久祝嘏宗史既執守以為常一旦輕議損益恐神靈不安亦未必當先帝意也議者乃謂四后之主於合食則貴有所屈於别饗則尊得以伸然則不疑於黜逺四后而獨豐於昵者乎他年有司攝事故四后皆預合食今陛下甫欲躬齋戒奉祖禰而四后見黜不亦疑於以禮之煩也而不能事其先妣乎受命之君以議禮制典為急繼體之君以承志遵法為美先帝議之制之陛下承之遵之臣曰可矣宗廟之祭至重茍未能盡祖宗之意則莫若守其舊禮疑文偏説未可盡據傳曰祭從先祖又曰有其舉之莫敢廢也此之謂也臣等以謂如其故便翰林學壬歐陽修吳奎樞密直學士陳旭包拯權御史中丞韓絳知制誥范鎮天章閣待制錢象先唐介盧士宗議曰古者宗廟之制皆一帝一后後世以有子貴者始著並祔之文其不當祔者則又有别廟禘祫有司攝事乃以别廟之后列於配后之下絶席而坐非惟於古無文於今為不可者又有四焉淑德皇后太宗之元配也列於元德之下章懷皇后真宗之元配也列於章懿之下其位序先後不倫一也升祔之后統以帝樂别廟諸后則以本室樂章自隨二也升祔之后同牢而祭牲器祝册亦統於帝别廟諸后乃從専饗三也升祔之后聨席而坐别廟諸后位乃相絶四也號為合食反絶席而坐牲牢祭器樂章祝册皆自别而不同又位序顛錯殊非嚴事之意伏况章獻章懿皇后在奉慈未升祔時每遇禘祫不從合食只於本廟致饗所以申其尊者最為得禮也若四后各祭於其廟則其尊自申而於禮文無參差不齊之失又有章獻章懿之眀證而議者以為國朝行之已久重於改作則是失禮之舉無復是正也向者有司攝事失於講求而今行親饗之禮禮官舉職而改正乃理之當然也臣等請從禮官議久之不能決劉敞又獨上奏曰九經所載祫祭制度最眀備者莫如春秋公羊傳自漢以下皆引為證所謂未毁廟者豈有帝后之限哉此乃國朝所以依緣循守行之已百年者也今羣臣不務推原春秋之法而獨引後儒疑近之説不務講求本朝之故而専倡異代難通之制不務將順主上廣孝之心而輕宗廟久衍之議欲擯隔四后使億萬斯年永不得合食于先帝臣竊恨之昔貢禹議罷園廟匡衡議遷郊兆羣臣和之者非一自以謂周公孔子復生不可得變元帝成帝信之然而通人未以為當既而皆悔之則無及矣夫宗廟之禮神靈之位豈可使舉措數有後悔哉此自陛下所當留聖思也此據劉敞行狀增入丁亥詔曰朕惟春秋大事在於禘祫前詔太常按求舊禮以孟冬之吉恭祠祖廟庶因合食聖靈相接以廣蒸蒸之孝而一二禮官於别廟四后有疑論焉訂之諸儒議久未一深惟宗廟之祭至重至嚴祖宗以來有司攝事行之舊矣祥符中復經聖考著定明詔當時博士講求已云義不可廢矧兹眇末甫崇孝饗其敢廢先妣之常祀違先帝之聖志哉孝惠孝章淑德章懷皇后祫饗且依舊須大禮畢别加討論劉攽作劉敞行狀云初上春秋髙朝議或有恐勞上拜起者而禮官承旨遂造此議上微間之又得敞奏謂近臣曰朕初謂禮當然茍以拜起為煩吾猶能之何憚也按建此議者張洞韓維維等必不然敞緣議郭后祔廟事與洞有隙攽云爾似誣洞也今不取己丑提點河北刑獄屯田員外郎張問提點開導莫州順安乾寧軍塘泊水口初河北屯田司言奉詔疏導緣邊積水而順安軍牙家港十洪橋石水限地近北界不可開今欲調丁夫疏石塜等六口以分邊吳諸淀夏秋漲水乾寧軍自東明港至獨流寨凡有水口三十三自可發泄水勢莫州會賔口北堤口泄水口洛陽口并順安軍塘北護城堤可令本處嵗治之其塘泊髙仰之地聽人耕種夏田故命問専領之問襄人嘗為狄青掌鄜延機宜六年七月己丑可考自郭咨均稅之法罷論者謂朝廷徒恤一時之勞而失經逺之慮至皇祐中天下墾田視景德增四十一萬七十餘頃而嵗入九榖乃減七十一萬八十餘石蓋賦不均故其弊如此其後田京知滄州均無棣田蔡挺知博州均聊城髙唐田嵗增賦榖帛之類無棣總千一百五十二聊城髙唐總萬四千八百七十四既而或言滄州民不以為便詔諭如舊是日復遣職方員外郎孫琳都官員外郎林之純屯田員外郎席汝言虞部員外郎李鳯祕書丞髙本分往諸路均田從中書門下奏請也本獨以為田稅之制其廢已久不可復均朝廷亦不遽止後雖均數郡田其於天下不能盡行實録在五年四月丙戍今從會要及司馬光記聞按會要云四年八月二十七日與記聞所書巳丑相合也庚寅降知河陽龍圖閣直學士工部侍郎李柬之為給事知虢州知蘇州工部郎中知制誥王琪為度支員外郎知饒州並坐失保任也九月癸巳朔御製祫享舞名僖祖奏大基順祖奏大祚翼祖奏大熙宣祖奏大光太祖奏大統太宗奏大昌真宗奏大治孝惠皇后奏淑安孝章皇后奏靜安淑德皇后奏柔安章懷皇后奏和安迎神送神奏懷安皇帝升降奏肅安奠瓉奏顧安捧爼徹豆奏充安飲福奏禧安亞獻終獻奏祐安退文舞迎武舞奏顯安皇帝歸大次奏定安登樓禮成奏聖安駕回奏采茨文舞曰化成治定武舞曰崇功昭德帝自製迎神送神樂章詔宰臣富弼等撰大祚至采茨曲詞十八甲午權發遣度支判官太常博士張田知蘄州田澶淵人初為廣信軍通判夏竦與楊懷敏建議增廣信等七州軍塘水詔田聚議田獨曰塘水不足以禦邊而壞民良田浸人冢墓非便奏疏極言之坐徙通判均州又責監郢州稅久之復通判冀州中官張宗禮過郡使酒自恣郡將畏憚不敢發田發之詔置獄配宗禮西京灑掃班三司使包拯薦田攝其屬執政難之田乃貽富弼書數其過失五事曰公負天下重望數十年今為元宰而舉措如此甚可惜也拯由是得請五月甲辰田權發遣度支判官田因建議郊賚非古也軍賞或不可遽廢願自執政而下小損之章五上諫官唐介劾田資任至淺幸得擢佐大計內挾姦心外夸敢言隂祔宗廟宦官不敢裁減而刻剝其餘使國家虧恩傷體乞加貶黜故有是命乙未詔以內藏西庫地還崇文院庚子録故象州都監六宅副使張立孫公弼為三班差使以立與蠻賊鬬死也甲辰贈翰林學士吳奎祖文祐為太子中允祖母李氏為安邱縣太君初奎將葬其祖乃與父太常丞致仕懷德共請以祫享恩授一命而奎又請納所遷官詔許之丙午詔帶閣門祇侯使臣內殿崇班以上太子率府率及正刺史以上遭父母喪及嫡子孫承重者並聽解官行服其元係軍班出職及見管軍若路分部署鈐轄都監極邊知州軍縣城寨主都監同巡檢並給假百日追起之供奉官以下仍舊制願行服者聽宗室解官給全俸先是判三班院韓縝言今武臣遭父母喪不得解官行服非天下之通制下臺諫官詳定而具為令丁未審官院言應京朝官磨勘在京者例須引見今冬及來春京朝官磨勘年限俱滿乞依外任人例更不引見從之先是眀堂覃恩內外官同時改轉自是每及三年則同時嵗滿故也會要九月十五日事十五日丁未也當考此時覃恩有無隔磨勘兼何故一例止滿二年戊申按戊申原本作戊寅合前後干支考之寅字誤今改提點廣南西路刑獄李師中言知雍州蕭注欲伐交址知宜州張師正欲取安化軍恐逺人聞之不自安請戒注等毋得為邊生事從之注在雍州久隂以利啖廣源諸蠻密繕甲兵乃露奏曰交址外奉朝貢中包禍心常以蠶食王土為事天聖中鄭天益為轉運使嘗責交州不當擅賦雲河洞今雲河洞乃入蠻徼數百里蓋積嵗月侵削以至於此臣今盡得其腹心周知要害之地乘此時不取他日為患不細願得馳至闕下面陳方略論者以注且為國生事不省也辛亥賜滑州修魚池掃役卒緡錢癸丑翰林侍讀學士禮部郎中知和州吕溱落職分司西京溱既奪兩官降知和州李參等猶窮治溱在真定事收捕指使張宗惠自殺參等因言溱與宗惠共為姦利前貶太輕權御史中丞韓絳及知諫院唐介等又交論不已翰林學士歐陽修等言溱所犯法重情輕宜在末減絳曰兩制有罪兩制營救則天下之法屈於貴者矣臺諫遂并劾修等執政憐溱以忤監司意抵峻法卒從輕坐知制誥劉敞草溱謫辭有簡直好節推誠不疑等語臺諫又引胡旦李昌齡故事乞加敞罪不報又降鄜延路部署四方館使光州刺史王德恭為西上閣門使榮州刺史權永興軍都部署坐前在真定假寺僧牛車赴鄜延也甲寅户部郎中直史館同修起居注張瓌同判太常寺兼禮儀使事瓌再上疏乞毁溫成廟皆不報此據江氏雜志本傳無之亦不載瓌判寺事史館修撰歐陽修言史之為書以紀朝廷政事得失及臣下善惡功過宜藏之有司往時李淑以本朝正史進入禁中而焚其草今史院但守空司而已乞詔龍圖閣别寫一本下編修院以備檢閲故事從之江氏雜志陳相就史館檢先君傳云嘗為縣小史因此進本入內至今史館無國史與歐陽所言不同當考會要載修言但稱史官無李淑姓名當考丙辰又降禮部郎中分司南京吕溱為兵部員外郎以臺諫言前責尚輕也初陜西用兵朝廷多假借邊帥倚以集事近臣出帥或驕恣越法及孫沔與溱相繼得罪自是守帥之權益微矣詔享景靈宫太廟習儀自今並於尚書省先是度支員外郎集賢校理邵必言周禮小宗伯之職凡王之會同甸役禱祠𨽻儀為位鄭氏注云若今時𨽻儀司徒府今習宫廟儀而啓室登殿拜則小挹奠則虛爵樂舉柷敔舞備行綴慢褻神靈莫斯為甚夫習儀者本以防失禮而瀆神也奈何天子未親祠而有司先瀆之宜移於尚書省以比漢司徒府下禮院兩制定而從之冬十月癸亥虔州巡檢左侍禁王咸孚除名廣南編管坐不掩捕鹽賊戴小八也甲子百官赴尚書省習儀尚書省門庭迫狹僕馬壅塞自宰相親王以下至日昳不能出壬申朝饗景靈宫實録云車輅入景靈宫雪驟作及出行禮雪乃止眀日五鼓有黃雲捧月江休復云祫祭行禮之際雪寒特甚上秉圭露腕助祭諸臣見上恭虔衆手執笏者惕然揎袖二事當附或不必書更詳之癸酉祫于太廟大赦男子百嵗以上者特推恩命民父母年八十以上復其一丁士人有節行學術為鄉里所推者委轉運使提點刑獄同加搜訪每路各三兩人仍與本處長吏具事實連書結狀以聞委中書門下再行詢察特加試用諸路解發有就試人多解額少處今既並歸土著令禮部量添解額本文有今既並歸土著六字實録刪去恐失事實仍增之本紀書云詔諸路監司察士有學行為鄉里所推者同長吏以聞民父母年八十已上復其一丁湖南郴道永州桂陽監及衡州茶陵縣夏秋二稅外每丁别納錢絹米豆藥物箭簳者令轉運司檢勘無業者與除放有業者特與減半自今進丁更不添納廣東西路自祥符中降御札免身丁錢至今尚有送納未了處亦仰轉運司具未放因依以聞益梓利夔路州軍進奉南郊乾元節銀自今止令進空表卭州鑄錢權住十年諸路轉運司如於二稅上重疊科折以困農民並令逐州軍畫時以聞仍不許更進羡餘若以本路錢帛密申三司取發上京者必當黜降諸縣令佐兼監酒稅等場務其有羡賸更不酬奬復以益州為成都府并州為太原府始中書進擬赦書條目極多専務惠澤及民既宣赦畢咸稱前後赦恩未嘗如此也韓琦之在太原也乞復并州為節鎮詔兩制議之翰林學士胡宿以為堯遷閼伯于商邱主火而商為宋星遷實沈於大夏主水而參為晉星國家受命始於商邱王以火德又京師當宋之分野而并為晉地參商仇讎之星今欲崇晉非國之利也自宋興平僣偽并最後服太宗削之不使列於方鎮幾八十年謂宜如舊制上是宿議及琦秉政因祫享赦書卒復之宿又以為言不報戊寅文武百官並以祫享赦書加恩樞密使兵部尚書同平章事宋庠封莒國公判河南府河陽三城節度使同平章事文彥博封潞國公宋文封國實録不記其時今附此辛巳內酒坊火甲申內殿崇班柴詠為殿中丞封崇義公簽書奉寧節度判官事實録在十月戊辰今從日記始百官致齋于朝堂翰林侍讀學士尚書左丞李昭述暴得疾輿歸遣太醫診視賜禁中藥存問甚厚是日卒贈禮部尚書諡恪方李氏居城北崇慶里凡七世不異㸑士大夫多推之至昭述稍自封殖與其從子不相合而家法頗衰娶贈中書令曹璨女其進用所從來蓋有憑藉云丁亥大宴集英殿以祫享禮成飲酒也十一月甲午知制誥劉敞范鎮同看詳諸州編配罪人乙未天章閣待制兼侍講錢象先盧士宗右司諫吳及定奪該恩敘雪人自後每降赦即命官定奪事蓋始此丙申翰林學士王圭御史中丞韓絳同知諫院范師道同詳定除放欠負蘇軾上蔡襄書云往年韓中丞詳定放欠以為赦書所放必察其家業蕩盡以至於干繫保人亦無孑遺可償者又當計赦後月日以為放數如此則所及甚少不稱天子一切寬貸之意自今茍無所隱欺者一切除免不問其他此事當考録淮陽軍駐泊捉賊左侍禁王懷政子和為三班奉職以懷政捕賊鬬死也己亥以河南處士邵雍為將作監主簿本府以遺逸薦故有是命後再命為頴州團練推官皆辭疾不起庚子汝南郡王允讓薨王性至孝楚國太夫人感寒疾方盛夏猶屛處密室欲鑿牖為眀恐匠氏弗謹以斤斸驚夫人因自撤牖始庀工及夫人喪過自哀毁帝臨奠賻白金三千兩王伏廷下泣曰臣無勞月享大國俸財餘于室銜愧日久今以親喪受重賜是為子終不能以己力辦喪而負誠孝也固辭葬日徒跣攀柩行十餘里出順天門帝聞之亟詔王就乘再三始奉詔王始卧病帝憂見于色敕太醫診療日問疾增損使者相望既臨奠詔特屛桃茢枝祓滌以示親厚賻恤加等罷朝五日贈太尉中書令追封濮王諡安懿命龍圖閣直學士向傳式入內副都知任守忠護葬王天資渾厚內仁而外莊雖左右未嘗見喜愠之色為大宗正二十年宗族懷其恩而畏其嚴重故事內朝謁宗婦不預王曰託姻皇屬而不得一望禁闥非所以顯榮之也奏通其籍又宗婦少喪夫雖無子不許更嫁曰此非人情乃為請使有歸宗婦得通籍及許改嫁二事當檢年月今附見凡郊祀天地七為亞獻恭虔得禮嘗入朝僕爭道于門折其鞭左右執之王釋去其恕如此富弼為首相濮王薨不以例差龍圖閣直學士向傳式監護喪事物論嗤鄙蓋弼之子與傳式結姻鴻臚所貺僅六千緡既護葬歸即感疾求典徐州得請至郡未及月化去噫世之官爵金帛安可妄圖得之禍不旋踵士大夫得不為戒哉此王陶談淵所記也當考傳式死在嘉祐六年九月丙午校書郎致仕孔􅌈為光祿寺丞致仕初􅌈被召為國子監直講辭疾不至特遷之甲寅寧逺節度使張茂實為淮康節度使馬軍副都指揮使茂實前以嫌罷軍職出典藩踰四年朝廷察其無他故復任之茂實本傳云仁宗終以其無他故復召典軍今書此為韓絳罷中丞張本乙卯左龍武軍大將軍深州防禦使宗諤為沂州防禦使進封虢國公宗諤允寧子元份長孫也濮王既薨以本宫之長特封之是月賜果州草澤何羣安逸處士益州草澤章察沖退處士轉運使言其有行義也據會要二人賜號在此月羣西充人嗜古學喜激揚論議雖業進士非其好也慶厯中石介在太學四方諸生來學者數千人羣亦自蜀至方講官會諸生講介曰生等知何羣乎羣日思為仁義而已不知寒飢之切已也衆皆注仰之介因館羣于其家使弟子推以為學長羣愈自刻厲著書數十篇與人言未嘗下意曲從同舍人目羣為白衣御史羣嘗言今之士語言悅易舉止惰肆者其衣冠不如古之嚴因請復古衣冠又上書言三代取士皆本於鄉里而先行義後世専以文辭就文辭中害道者莫甚於賦請罷去介贊美其説會諫官御史亦言以賦取士無益治道下兩制議皆以為進士科始隋歷唐數百年將相多出此不為不得人且祖宗行之已久不可廢也羣聞其説不行乃慟哭取平生所為賦八百篇焚之講官視羣賦既多且工以為不情絀出太學羣徑歸遂不復舉進士何羣傳云何郯薦察成都記云王素薦察授處士號至和元年十一月田况薦察授本州助授十二月壬戍朔詔沿堂五院私名人自今以一百二十人為額初右諫議大夫周湛知襄州襄人不善陶瓦率為竹屋嵗久侵據官道簷廡相逼故火數為害湛至度其所侵悉毁撤之自是無火患然豪姓不便提點刑獄李穆奏湛所毁撤民屋千五百餘間老幼失業相聚怨泣湛素不才又年踰七十貪慕榮祿不知進退乞特行責降或令致仕詔轉運司察實甲子徙湛知相州右司諫吳及疏曰湛所為應科不宜被責穆聽讒言為權豪報怨且朝廷風化疾於影響是欲教人苟簡而枉道以干譽轉運司按湛伐木敗民舍意不直湛而為穆遊説然則百姓侵官而主司禁之其職然爾况聞湛先期告戒眀著律令約民以信未嘗督迫乃湛奉法行事未有過也百姓自知其咎不敢有訴時故相夏竦邸店最廣而郡從事髙直溫乃竦子壻讒之於穆且謂湛伐木若干株者昔之民居侵越官道則木在道側及正其侵地則正處中衢固宜剪去又湛種楸桐千餘本課户貯水以嚴火禁又於民居得衆汲舊井四廢而復興人賴其力道旁之井反在民居之下其侵越豈不白乎當今之弊正在羣司不舉職而務茍且必使舉職者有害而茍且者有利將何勸焉望詔執政大臣辨正湛穆是非眀行奬黜若謂湛已行之命憚於追改則傷風敗俗貽患於後不若一時追改之愈也相襄皆大郡於湛不為輕重但國家舉措有所未安耳眀年六月湛卒於相州湛附傳云轉運使陳希亮言湛為民息災不為擾與正傳不同今從正傳乙丑加贈皇長子褒王昉為越王次子鄂王曦為陳王皇第二女楚國公主為周國第三女唐國為漢國第四女越國為秦國第五女鄆國為魏國第七女隋國為吳國第八女韓國為燕國第六女未及封於是追贈魯國戊辰嘉勒斯賚遣人貢方物詔閣門自今嘉勒斯賚進奉首領赴殿燕升其坐近北一間初秦鳯路經略司言嘉勒斯賚首領每到闕遇燕坐廊下而見夏國使人坐朵殿上意頗不平故特升之乙亥知麟州王慶民上麟府二州圖己卯觀文殿學士兼翰林侍讀學士禮部尚書王舉正為太子少傅致仕舉正在經筵二年每進讀及前代治亂之際必再三熟復以盡諷諭癸未海州都監昭宣使果州防禦使武繼隆為京東西路鈐轄京東西路鈐轄北作坊使廣州團練使閻士良為鄜延路都鈐轄同知通進銀臺司兼門下封駮事何郯封還誥敇言二人前罪犯至重遇恩復官已為優厚今於差遣各似未允况繼隆素非善良早年不盡心於陛下已降充江州監當不可授以一道兵權士良好作威福昨又與邊臣公行賂遺今不可復委邊任伏望聖眀上存國體下慰人言開至公之路抑近幸之勢繼隆改除一州鈐轄士良授與近裏州軍差遣又言衆議喧傳云嚮時保州之亂因繼隆本州官僚素有忿隙嘗以言語激發軍心致成後患當時其事在逺朝廷不知不曽推究其實然衆口云云至今未息事深可疑今授以一道兵權嘗被罪謫必懷怨望若舊惡不悛又以一言搖衆逞憾則為害非細士良恣作威福騷撓邊臣不可不慮也不知郯奏從違姑附此俟詳考之明年正月士良乃以王陶言易任繼隆卒不見改移甲申宰臣韓琦言向曽陳監牧之弊乞逐路坊監并諸軍牧地除留放牧其餘田聽下户請佃河北一路諸軍牧地剩田三千三百五十餘頃得嵗課斛斗一十一萬七千八百二石絹萬三千二百五十一匹草十六萬一千二百三十束其管勾摽括職方員外郎髙訪望特與堂除虞部員外郎張越與先次並從之丙戍契丹國母遣歸德軍節度使耶律思寧泰州觀察留後韓造契丹遣懷化軍節度使耶律嘏起居舍人知制誥史館修撰王棠來賀元正丁亥工部郎中直龍圖閣王逵提舉兖州仙源縣景靈宫太極觀初逵自停廢中起知金州而知門下封駮事何郯還其制且言逵貪酷害民不可復使為知州故命改之宰相富弼自祫享禮成以母老纍章求退上不許仍斷來章弼又上劄子一留中一封還又稱疾卧家上遣中使召出之乃復視事故事節度使移鎮及加恩皆别上表再辭每降批答遣內侍齎賜必有所遺是嵗殿前都指揮使許懷德以祫享加恩又自保寧移鎮建雄乃共為一表以辭翰林學士歐陽修劾其慢朝命詔以修章示之且令依故事各以表再辭懷德謝罪而已亦不復别進表其鄙吝如此然論者以為臣下讓官當出其志非上之人所當強也知制誥劉敞言臣伏見故事諸讓官者或一讓或再讓或三讓皆有品秩非不欲人人讓也讓之迹近名則容偽而為禮者惡煩煩近於褻故設中制有所止之也昔舜命九官夔龍不讓其他伯益之徒一讓而止此則治世之法也竊見頃來士大夫每有除命不問髙下例輒纍讓雖有出其至誠恬於勢利然亦已逾典制過夔益矣若習俗逐巧流風稍敝必且挾偽采名要上迷衆更以此為進取之捷徑奔競之祕䇿甚可惡也豈獨煩於禮哉夫讓雖美道君子所有餘小人所不足然非其真則醜亦甚昔鄭公孫段辭為卿退則又使太史命已子産惡其為人其後卒為亂故飾偽之敝至於此非國家之福也公孫段尚其小者爾子之擅燕王莽代漢其始皆以善自名已而稍入於邪也臣謂賢者之節難進而易退難進而易退者非苟讓一官之謂也謂其能擇於義不犯非禮也故雖不多讓其節猶可見衆人之情好得而惡失好得而惡失者亦非勉受一職之謂也謂其不擇於義越禮而動也故雖復飾讓其情亦彌險讓與不讓一以故事舊典為凖無使釣利者要君乘名者售偽不幸而不值子産之精識則公孫段之徒紛然競於朝矣臣言似迂而慮實逺望賜裁幸時士大夫稍矜虛名每得官輒讓衆亦豫其恬退之稱讓不失始利而得名益髙讓端無窮或四五讓或至七八天子常優容之下至布衣陳烈等初除官亦讓賜之粟帛亦讓敞以為此皆挾偽求名要上迷衆其漸不可長乃奏此疏此據劉攽所作敞行狀及敞集附見其從違當考
