body:
  text: 續資治通鑑長編卷三百五十一宋李燾撰神宗元豐八年春正月戊戍上寢疾日昃三省樞密院詣內東門請入問聖體遣勾當御藥院梁從政劉惟簡傳宣放宰臣王圭等再附從政奏乃令從政等引入見上於福寧殿東寢閣自是問聖體皆如之兩紀並書上有疾己亥詔不視事五日三省樞密院問候於福寧殿東寢閣宰臣言上未視事應合行事乞權作聖旨行出以聞事體稍重者進畫施行又言六日欲於大慶殿設消災祈福道場七晝夜罷日設大醮啓罷日三省樞密院官並宿齋餘日畨宿在京宫觀寺院各道場七晝夜差官啓罷五嶽四瀆就遣所在長吏準此上不能言首肯之晚再詣福寧殿上書字諭王圭等自來日可只早入圭等進竹瀝三器詔賀正旦遼使令六日門辭授書賜例物庚子執政官晚再詣內東門內侍傳宣放自此日惟一入辛丑遼使辭於紫宸殿門外壬寅執政官詣福寧殿東閣問候奏欲降赦天下以屢獲豐年中外嘉靖方春發生宜有惠澤為文意許之自此分宿本廳右丞李清臣寓門下省甲辰大赦天下其赦法用第二等兩紀並書赦天下命戶部侍郎李定權知貢舉乙巳遣輔臣詣景靈宫行禮舊紀書丙午罷朝獻景靈宫新紀書命輔臣代詣景靈宫丁未中書省言上元節欲景靈宫萬夀觀神御殿排設張樂開諸宫觀寺院門五日燃燈作樂及不禁夜不御宣德門諸樂藝人賜物依舊給從之御輦院言禮院定皇太后儀衛御龍骨垜子直都虞候都頭各一人十將長行各三十人弓箭弩直指揮使都副頭各一人十將長行各二十人內外諸司局務監官每遇皇太后出差官管押乞自今輪本院監官隨行從之壬子皇城使郭忠紹言神臂弓未有教習指揮詔步人弩手及第一等者並令兼習癸丑鄜延路經略司言第二第四第五將出塞討賊獲八十八級詔禁軍民兵蕃兵並與特支錢第六將解元忠獲五百五十四級牛羊駝馬萬計詔賜將官使臣等茶藥銀各有差乙卯上手書字諭王圭等自今可間日入問自戊戍上不豫三省樞密院日至寢閣至是上小瘳故有是旨敕宰臣樞密親王齋禱天地宗廟三省官寺監長二分禱社稷及都內諸神祠舊紀書羣臣禱於天地宗廟社稷神祠新紀書分遣羣臣禱於天地宗廟社稷丁巳王圭等言聖體向安御殿有期臣等不勝欣喜上欣然首肯之己未上移寓寢閣之東榻勾當御藥梁從政及醫官陳易簡言於圭等上昨日行步多體勞有汗再感寒氣圭等欲復日入問候又以適得間日詔諭遽復日入恐人心驚憂故且間入三省言己亥以上未視事應合行事並權作聖旨行訖以聞稍重者進畫今聖體向安前詔欲更不施行從之詔聞京城內外官吏軍民僧道各建祈福道場今已安和可令所司慰諭勿重勞費其已設道場聽滿日罷環慶路經略司言招誘西夏韋州蕃官伯德率丁口二百五十歸附詔授伯德供備庫副使本族巡檢賜銀絹三百辛酉執政官入至福寧殿王圭言制勘熙河蘭會路經略司使李憲等案熙河入界賞功狀欲候御殿取旨從之又言元豐五年十一月詔臣僚上殿劄子並送中書省取旨欲有司勘當小事權進入候畫旨施行其難行事中書省收訖奏候御殿依舊從之壬戍河東路轉運司言經略司去年三出兵耕種木瓜原等兩不耕地凡用將兵萬八千五百四十五馬二千三十六其費錢七千三百六十五緡榖八千八十一石糗糒四萬七千斤草萬四千三百束又畨上保甲守禦凡二千六百三十七人其費錢千三百緡米三千二百石役耕民千五百雇牛千具皆非民之願所收麻粟喬麥萬八千石草十萬二千不償所費又預借本司錢以為子種至今未償增人馬防托之費仍在年計之外慮經略司來年再欲耕種望早賜約束樞密院言河東經略司去嵗差借民牛耕種葭蘆諸寨田及發防護軍馬保甲靡耗極邊貴價糧草錢物仍奪農時令民失業比至收成不償所費詔劄與吕惠卿宜審較利害無蹈前失七年三月二十一日七月十日可考癸亥執政官入至福寧殿王圭言閣門見謝辭權放內不許隨放之人令入門見其上殿臣僚非召赴闕者有奏陳事權令進入並至視事依舊從之二月乙丑朔詔朝散大夫致仕孫竒知太醫局潘璟席延賞教授邵化及赴御藥院祗候從執政請也丁卯詔邵州芙蓉石驛浮城等洞已修寨鋪其歸明戶及元省地百姓如省地法應婚姻出入典買田招佃客並聽從便從知邵州關杞請也庚午詔河南大名頴昌府鄆青揚鄧州守臣訪諸通醫術者乘驛赴闕辛未戶部言福建路轉運副使王子京乞并鄰近兩浙江南廣東復禁茶諸路仍通商未有朝旨詔在京及開封府界陕西路通商之外並為𣙜茶地七年十月十七日可考元祐元年二月二日改此壬申詔宣德郎河東相度坑冶孫宰乘驛赴闕以宰通醫術也丁丑詔開封府界三路保甲所養官馬生駒不赴官等量私自市若藏買并引領牙保及所轄人各減盜及貿易官馬法一等許人告賞錢二十千庚辰詔州縣社壇用石為主先是河東路轉運司申眀社用石為主植木以表之禮部言祭社不屋而壇當受霜露風雨以達天地之氣則用石為主取其堅久今太社已用石主長五尺方二尺剡其上方其下埋其半又按禮制天子社稷方五丈諸侯半之州縣社壇石主尺寸廣長謂宜半太社之制於是下太常寺修入祀儀而有是詔詔受納稅租斛加一升蒿草十束加一為耗舊例多者及常平租課並依例蒿草支盡有欠者耗內聽除二分辛巳總領熙州蕃兵將皇城使吕吉領髙州刺史同總領皇城使王贍領嘉州刺史河州蕃兵將皇城使光州團練使李忠傑領雄州防禦使又以一官回授其子岷州蕃兵將皇城使沂州團練使帶御器械權本路都監李祥升鈐轄蕃官皇城使階州防禦使包順授其子一官皇城使岷州刺史包誠領恩州團練使皇城使榮州刺史趙醇忠領光州團練使皇城使慶州刺史李楞占訥支領康州團練使皇城使丹州刺史溫玉領榮州團練使皇城使郢沁薩勒領榮州刺史左藏庫使日卜聚瑪伊克為皇城使餘以功遷者百二十四人以熙河蘭會路制置使李憲言吉等渡河深入賊界轉戰大敗賊衆臨陳斬其將色辰岱楚賞功也是夜四鼓開寶寺寓禮部貢院火承議郎韓王冀王宫大小教授兼睦親廣親宅講書翟曼奉議郎陳之方宣德郎太學博士馬希孟皆焚死吏卒死者四十人兩紀並書開寶寺貢院火甲申上第五女卒母朱德妃也生始七嵗追封惠國公主丙戍遣官分禱天地宗廟社稷百神禮部言順祖及惠眀皇后遷主既藏於夾室罷忌日行香請倣僖祖忌日於景靈宫天興殿東設幄故事遇忌日於永昌院佛殿之東張幄齋設追薦詔僖順翼祖并后六位遇忌日並于永昌院設幄追薦丁亥三省言禮部貢院火試卷三分不收一分欲令禮部别鎖試從之新紀書令禮部别鎖試舊紀不書門下省言中書録黃前淮南節度推官吕公憲等狀各磨勘當改官乞下吏部先引驗吏部已引驗四人奏已降出正月庚子當引見及未引驗八人見磨勘十九人詔轉官人依例除官餘候會問無違礙依前次先引驗訖聽其皆引見後舉主有事故並不礙引見候御殿日依舊詔日者火災可於集禧觀為民祈福道場一月罷日設大醮辛卯詔諸朝會殿中侍御史闕牒監察御史又闕牒在京職事官起居舍人闕牒著作祕書郎著作佐郎又闕牒中書舍人其餘執事官闕牒班內官攝並報閣門諸三省御史臺官寺監長二開封府推判官六參職事官赤縣丞以上寄祿升朝官在京釐務者望參不釐務者朔參癸巳上疾甚遷御福寧殿東閣之西間三省樞密院入問聖體見上於榻前王圭言去冬嘗奉聖旨皇子延安郡王來春出閣願早建東宫凡三奏上三顧微肯首而已又乞皇太后權同聽政候康復日依舊上亦顧視肯首既退移班東間皇子及皇太后皇后朱德妃皆在簾下圭等奏請皇太后權同聽政皇太后辭避入內都知張茂則言皇太后且為國家社稷事大不宜固辭圭等請至于再三皇太后泣許圭進言自去嵗上令皇子侍燕羣臣皆嘗見之今必更長立乞再瞻覩是月三省樞密院親王自朔日至今日由內東門入問候於福寧殿惟是日未後再入先是蔡確疑上復用吕公著及司馬光則必奪己相乃與邢恕謀為固位計恕故與皇太后姪光州團練使公繪寧州團練使公紀交哲宗即位公繪公紀乃遷團練使此時但為刺史當改之上初寢疾恕密問公繪具言疾可憂狀恕聞此更起邪謀確嘗遣恕要公繪公紀二人辭不往眀日又遣人招置東府確曰宜往見邢職方恕曰家有桃著白花可愈人主疾其説出道藏幸留一觀入中庭紅桃花也驚曰白花安在恕執二人手曰右相令布腹心上疾未損延安郡王沖幼宜早定議雍曹皆賢王也公繪等懼曰君欲禍我家徑去已而恕反謂雍王皓有覬覦心皇太后將舍延安郡王而立之王圭實主其事與內殿承制致仕王棫共造誣謗棫開封人嘗從髙遵裕掌機宜于涇原傾巧士也故恕因之又知確與圭素不相能欲借此以陷圭他日亟問確曰上起居狀比何如確曰疾向安將擇日御殿恕微哂曰上疾再作失喑直視聞禁中已别有處分首相外為之主公為次相獨不知耶一日片紙下以某為嗣則公未知死所矣公自度有功德在朝廷乎天下士大夫素歸心乎確竦然曰然則計將安出恕曰延安郡王今春出閣上去冬固有成言羣臣莫不知公盍以問疾率同列俱入亟于上前白發其端若東宫由公言而早建千秋萬嵗後公安如太山矣確深然之恕又曰此事當略設備今與平時不同庶可以自表見其曲折苐告子厚同列勿使知子厚章惇字也確愧謝謂恕曰和叔見子厚具言之惇固凶險即許諾遂與確定議仍約知開封府蔡京以其日領壯士待變於外廷謂曰大臣共議建儲若有異議者當以壯士入斬之是日三省樞密院俱入問疾初亦未敢及建儲事既退乃于樞密院南廳共議之確惇屢以語迫圭幸其應對或有差誤即以圭為首誅圭口吃連稱是字數聲徐曰上自有子復何議蓋圭實無他志但蓄縮不能先事納説所以致疑及是出語確惇顧無如圭何尋復入奏得請俱出逢雍王皓及曹王頵於殿門外惇更厲聲曰已得旨立延安郡王為皇太子矣奈何皓曰天下幸甚已而禁中安堵如故輔臣等各罷歸翌日遂立皇太子確惇京恕邪謀雖不得逞其蹤迹詭祕亦莫辨詰各自謂有定策功事久語聞卒為朝廷大禍其實本恕發之元豐末建儲事諸家異説紹興史官既别加考定専取元祐舊文固得真實矣苐恨弗詳今參取諸書稍增益之推原後來致禍如彼慘毒敵人遂入中國者蓋由王圭任首相不早建白立太子致蔡確章惇蔡京等得乘隙造謗而萌芽則自邢恕發之其令蔡京領劊子入內庭確惇當時亦必有他説紿圭故圭不以為疑然開封知府何與朝廷事此正坐圭愚暗耳若圭能即拒絶既無疑似之迹則橫禍又何從而來疑似之迹當時不過如此耳其後浸淫轉加增飾遂有宣訓事粉昆事黃履疏髙士京書至蔡懋宣和間劄子用誣訕文字托名御製誠可為痛哭也非建炎初聖主覺悟果斷眀辨則朝廷之禍豈有極乎此事既存真實仍悉取異説附見於後庶觀者曉然究其真實謬妄小人情狀無所遁逃亦猶孟子必著許行楊墨等語不用掃除絶滅之也哲宗新録宣仁聖烈皇后傳云先是元豐七年三月大燕中燕延安郡王侍立王圭率百官賀及升殿神宗又諭王與圭等相見復分班再拜稱謝是冬諭輔臣曰明年建儲當以司馬光吕公著為師保神宗彌留后敕中人梁惟簡曰令汝婦製一黃袍十嵗兒可衣者密懷以來蓋為上倉猝踐阼之備神宗太母所以屬意于上者確然先定無纎介疑邢恕傾危士也少逰光公著間蔡確得師保語求所以結二公者而深交恕確為右僕射纍遷恕起居舍人一日確遣恕要后姪光州團練使公繪等二人辭不往眀日又遣人招置東府確曰宜往見邢舍人恕曰家有桃著白花可愈人主疾其説出道藏幸留一觀入中庭紅桃華也驚曰白花安在恕執二人手曰右丞相令布腹心上疾未損延安沖幼宜早定議岐嘉皆賢王也公繪等懼曰君欲禍吾家徑去已而恕反謂后與圭為表裏欲舍延安而立其子皓賴已及惇確得無變確使山陵韓縝簾前具陳恕等所以誣太后者使還言者暴其姦再貶知隨州尋竄新州劉摰拜右僕射恕坐黨與謫監永州酒稅新録載建儲事具此確貶新州恕責永州皆元祐四年五月事摰拜右僕射乃六年二月事不知新録何故相連書之恕除起居舍人在元豐八年七月二十四日方神宗寢疾時恕但為職方員外郎公繪公紀遷團練使在哲宗即位後此時但為刺史耳新録稍似抵牾今改之又不知所稱桃著白花出何等文字當考按桃著白花事見髙世則紹興六年十一月所供納史館册內第十一事此史官所據也册凡四十一事今不具注趙子嵩中外舊事云元豐末命公正明白王蔡二相初無矛盾特出邢恕妄作耳王文恭公薨時舉朝名士挽詩皆以立子之功歸之當時無異論也自司馬溫公入朝恕乃用捭闔之術欲合蔡公於溫公溫公不疑初亦稱其材羣僚大懼既而公議不容乃出守宛邱會恕亦憂去因梁左丞燾過懷恕見之怵梁論蔡之功不宜逺外自此遂攘其事蔡自以謗詩貶皇太后命三省樞密院於時政記日録眀著元豐八年三月事以示後世且曰官家是神宗長子子繼父業乃是本分昨神宗服藥時將官家所寫佛經宣示宰執其時衆中只是首相王圭曽奏乞立延安郡王為皇太子其餘人别無言語今安燾其時亦在盡見子細確有何策立功勞若是確他日復來欺罔上下豈不為朝廷之害恐官家制御此人不得於社稷不便所以皇太后不避姦邪之怨因其自敗如此行遣蓋為社稷也嗚呼堯舜之眀不過如此確既死其子懋衣齊衰立憑公喪筵唐突告變章雷州力主之王文恭公之子仲修録章所為挽詩二章刻石訴于相府章慚不能答方元祐初太皇后嘗榜髙公繪之門不得與邢恕相見懋之姦惡未可殫舉蔡魯公亦畏之蓋初事元度密間其兄弟後事攸又間其父子然卒引致西府者使監攸也宣和間結梁師成至請太上皇親述確傳指斥太皇太后無所不至又推恩其兄承弟莊皆從官子堅臯皆郎官壻邢倞曽詠王晉明皆監司善善及子孫未聞及子壻蓋欲激去鄭燕公耳夫王禹玉之事與鄭何與本朝宫禁之嚴古今所無懋乃謂神宗大漸確使妾趙氏入見長樂趙氏莊之母也故宣和開封夫人又謂使府尹蔡京挾劊子入內隨徐王尤可駭寸刃豈能入皇城况危疑時此不可欺三尺童子而卒用以富貴數世安而無禍天難諶哉江子嵩又云余既書元豐末命紹興二年四月避地潯偶司諫韓瑝叔夏謫監潯州鹽稅暇日語及因借得其父文若記莊敏丞相作樞長時神宗服藥日久韓一日語張璪曰上服藥日久建儲如何璪曰子厚多口試説與看韓乃語章惇惇曰此議甚好説與二相亦以為然約集議于密院南廳屏人留茟硯一副紙數幅就坐久之皆無語韓視王圭曰今日之議立延安郡王為太子延安郡王去年上已令侍宴出見羣臣又有旨四月一日出閣此事何故都無一言圭曰諸公之議亦圭之意也别有何疑張璪推茟研紙與章惇令於紙上寫立延安郡王為皇太子來日至寢閣召內臣張茂則曰今日奏事欲立延安郡王為太子茂則令於御榻前設案王圭將所書紙鋪在案上奏欲立延安郡王為皇太子時神宗風喑不能語但慘怛久之衆人皆拱立未敢復言時太妃亦在帳中露半靣國婆婆抱上坐頃之再奏國婆婆云聖意已允張茂則云聖意已允王圭問張茂則太后在甚處太后自云在此中茂則令內臣張簾太后在簾下云相公等立得這箇孩兒便好這孩兒真是孝自官家服藥只是喫素寫經簾內出經兩卷一卷延夀經一卷消災經逐卷後題云延安郡王臣某奉為皇帝服藥日久寫某經一卷願早康復自簾內宫人抱出哲廟哲廟褁帽子著衫帶立於簾外諸公環侍久之無他語遂宣制施行後神宗上仙宣遺制立皇太子內外欣戴初無異聞已上韓氏手録不敢增損一字具按子嵩所書與邵伯溫辨誣所載並同辨誣注在三月甲午朔
