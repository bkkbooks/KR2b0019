body:
  text: 續資治通鑑長編巻四百三十九宋李燾撰哲宗元祐五年三月丙寅朔中大夫同知樞密院事趙瞻卒輟朝臨奠贈右銀青光禄大夫諡懿簡遺表常數外特官二人丁夘詔賜故龍圖閣直學士孫覺家錢五百緡令所屬給𦵏事及借官舍御史中丞梁燾為之請也必以經筵官故有此詔當考覺以二月三日卒梁燾為之請據燾奏議増入都水使者吳安持言大河信水向生請鳩工豫治所急舊録云雇夫漸修𦂳急工料新録改云鳩工豫治所急詔特發元豐庫封樁錢二十萬充雇夫范祖禹梁燾云云附此月六日政目云賜元豐封樁錢三十萬貫雇夫治河每夫錢二百文不得裁減詔昨東上閤門副使景思誼以永樂之圍縋城與夏人議和被執今送納陷沒人口而思誼未歸令鄜延路帥臣趙卨具事因移牒宥州二月四日此月十八日户部言起支官員殿侍大將軍選人將校請受添給不以則例限内申户部者杖一百并擅給厯及不候分移厯到而收併者各徒二年從之起支請給舊無法禁故多重疊偽冒有已分移而他處全請已身亡而分移處猶請者故立是法戊辰侍御史孫升言密䟽五年三月三日臣伏見李偉吳安持自去嵗興回河之議二人相與誣罔朝廷而安持詭譎多姦既已誑惑大臣不肯同任其責萬一僥倖其成則欲享其利敗事則將歸之建議者遂令李偉於去年八月獨奏陳大河要切利害其略云今來大河已是分流即更不消開淘因昨来一決之後東流自是順快渲刷漸成港道見今已為二股約奪大河三分以來今只得夫二萬於九月便興工至十月寒凍時已畢因而引導河勢豈止為二股通行而已亦將遂為回奪大河之計今來既因擗拶東流修完鋸牙當迤邐増進一埽取一埽之利比至來年春夏之交遂可全復故道又云竊觀今日兩岸増進馬頭鋸牙其沙河堤水口自己通快顯有全回之勢惟與都水使者吳安持曉夕講究見得上件利害灼然安持遣臣暫赴尚書省禀議伏望早賜宸斷即乞復置修河司其官屬諸般事件並依昨來已降條例施行所貴司存既正凡百悉有條理可以乘時建立大事李偉吳安持協比為此姦言朝廷遂以為信並依所奏施行今日考其奏請之言無一驗者而枉費財用民力已不可勝數逺近為之騷然上頼宗廟社稷之靈聖聽睿斷之果照察姦言一切放罷不然患害有不可言者臣訪聞都水使者吳安持未罷河役之日既見其議漸伸聖聽已察物論喧然而安持知其姦言敗露端坐都城不往役所提舉乃於朝班中揚言云有司止是奉行朝㫖而已乃知向日獨令李偉建議奏請隂持姦謀不肯同任其責眀矣盖小人懷邪不顧朝廷利害不恤國家費用不愛生靈性命止在竊取名器憑藉事權以為私謀如前日罔上壞法為市易冒竊恩賞雖其父命且不聽從遺患公私至今未已欲其忘身徇國何可得也有臣如此將安用之臣愚以為大河之議未有萬全之畫朝廷豈免北顧之憂則宜選擇諳知河事乆曽經厯公忠誠實有守之人以為水官使之經營講究庶幾有補於今日如吳安持李偉利口輕儇按原本作和口輕壞文義未詳當是利口䡖儇之訛今改正欺罔奏陳傳播中外姦言顯露罪惡難掩伏乞早賜指揮罷黜以協天下公議仍乞罷修河司候有定議别聽朝㫖中外幸甚貼黄安持往提舉市易以不堪物貨於畿縣委官置場賖賣務欲抑配與人遂奏請乞舉改官六人於是選人争為誘脅違法抑配公私被害今提舉修河司又依前奏請改官六人造作事勢以為誘脅公論莫不怪駭況上件指揮止是白劄子不曽降敕吏部亦不闗御史臺又貼黄吏部見待次改官者已及二百人來者未已舊制合舉改官之數猶當裁減都水使者乃復舉人改官顯屬無名而又吳安持昨奏請本以北京二股河口即目水勢東流順快乞舉選人改官張大事權以為誘脅今來東流之言既已欺罔則改官指揮自合追改又貼黄前日上下蔽塞朝士大夫莫不以言回河為諱今日聖朝既察姦言公論方出議者以謂萬一閉塞北流未論河北生靈之患而天臺魚池埽必定汎決直注京都雖誅夷建議之人將何及矣訪聞去秋漲水未落増進馬頭鋸牙之時天臺以増埽人皆危之又貼黄吳安持揚言于朝中止有光禄卿范純禮與聞安持本與李偉協比欺罔及至敗露乃歸之朝廷聞者莫不切齒詔改官聽修河日施行餘寢之升以三月三日上此奏三月八日降此詔今并於上奏日書之舊録于三月八日書殿中侍御史孫升言李偉吳安持興回河之議乞賜罷黜仍乞罷修河及追改許奏舉選人改官詔改官聼修河日施行餘寢之新録因舊録今既具載升䟽即舊録不可用姑附注此升奏貼黄其家集乃無之此據元祐密䟽増入光禄卿姓名盖范純禮也十四日遷刑侍己巳詔皇城使李許為西上閤門使毋為例以許帶御器械勾當皇城司三經大禮觧罷特恩故也荆湖南路安撫鈐轄謝麟言處置邵州管下作過蠻賊畢詔第其功為五等轉官減年磨勘支賜有差其差所部人獲級更不推賞器械估價給直詔在京告獲私乳香雖係杖以下罪其别理賞並以官錢借支不滿一斤五貫一斤十貫毎一斤加十貫罪至徒者自依本條以户部言私香盛行課額虧欠及杖以下不以官錢支賞無以勸緝捕之人故也新無庚午御批髙遵路妻曹氏乞女令羣妻髙氏歸俗除宗女及王舜封女歸俗體例外更有無似此體例亦無許陳乞歸俗法刑部勘㑹比之王氏遇赦數多欲依例放逐便御批髙遵路女令羣妻髙氏先為犯罪落髮𨽻妙法院宗婦既無放歸俗條貫刑部因何定奪作遇赦數多欲依例放逐便兼勘㑹王舜封女因父舜封奉使髙麗有勞特恩放女歸俗係一時特㫖難以為例其髙遵路妻所請宜更不施行所有刑部定奪不當取勘聞奏御集五年三月五日八月八日罰金辛未皇城使向綽右藏庫副使兼閤門通事舍人朱伯材並帶御器械仍以綽勾當皇城司龍圖閣直學士中大夫吏部侍郎蔡延慶卒賜錢三百緡仍令所屬候𦵏日量事應副給事中范祖禹等為之請也祖禹又言中書録黄尚書省送到元豐庫狀凖敕三月二日同奉聖㫖特支賜元豐庫錢二十萬貫和雇人夫令都水監相度分擘與南北丞地分并深州及應係將来取㫖𦂳急須合預先興工去處工役仍不得令州縣科差尚書省看詳元豐庫既無河北路起發上京錢物即難以兌那三省同奉聖㫖於河北東西路提刑司封樁舊法坊場免役内特就便支給錢二十萬貫餘依已降指揮所有令元豐庫支錢指揮更不施行臣伏詳二月六日所降聖㫖權罷修河放罷人夫衆論皆謂東流故道夫役當罷其北流河水見行地分則當修葺固䕶以偹夏秋之患實不可罷陛下哀憫百姓不欲科差所以今月二日續降聖㫖支賜封樁錢二十萬貫和雇人夫自降此指揮外議皆謂南北丞地分并深州合興工役外所有應係將来取㫖𦂳急預先興工去處即是李偉所領東流故道回河之役縁二月六日聖㫖内有候今秋取㫖之文所以三月二日聖㫖又帶下將来取㫖去處工役陛下以乆旱欲息民勞北流興役盖不得已而修河權罷未一月東流功役復興竊恐枉費國財重為無益河北百姓見此次第依前惶惶伏望聖慈於今来支提刑司封樁錢指揮内除先降聖㫖應係將来取㫖𦂳急須令預先興工去處功役一節更不施行外餘依已降指揮以協中外之心臣已封還李偉請給等録黄乞罷李偉差遣所有今来録黄亦未敢行下謹具封還祖禹此奏乃三月六日其從違當考據蘇轍九月末奏祖禹封駮後四月五日有㫖李偉差遣候過漲水取旨御史中丞梁燾言臣風聞朝廷議以封樁錢雇夫修河臣未敢為信既有所聞不敢不以上達若果有此事後時言之却恐難回已行之命竊以昨縁乆旱聖恩放免夫役歡呼之聲道路相聞中外感悦人人慶快必然已達睿聽未及一月而議者却欲雇夫臣嘗靣䝉宣諭雇夫只是名為和雇其實差科聖眀已察其弊盖官司貴得易為管勾所以須要土著之人雖朝廷約束丁寧終不免於騷擾當此大旱之時尤更有害農作況今漸近榖雨數日間若得膏澤便要播種正是農忙豈復得暇從役若此令既下必動百姓憂疑遂易歡呼復為愁嘆甚不副天心仁愛矜恤之意欲望聖慈特賜詳酌候奏禀取㫖靣賜誡飭大臣謹守已行之命取信天下顧此旱災豈得更勞民力如有合興工役處只今剗刷近處廂軍優支盤纒錢發遣不惟免却民間騷擾又不致妨廢農務又得兵士十分功料又省國家分外支費大有所益並無所損伏惟仁聖深留宸念貼黄臣近日劄子言乞修見今大河向着堤岸其意為見管河清兵士及年例上河兵士人數自己不少或更就近差撥廂軍相添工役乞不更議雇夫恐執政别有敷奏伏望以臣所奏事理特賜丁寧誡飭又封樁錢先帝本要備非常之用不可輕議支費伏望特賜主張燾奏附范祖禹後從違當并考壬申中大夫守尚書左丞韓忠彦同知樞密院事忠彦弟純彦妻知樞密院孫固女也各以親嫌乞罷不許翰林學士承㫖光禄大夫知制誥兼侍讀蘇頌為右光禄大夫守尚書左丞御史中丞梁燾言伏見近除韓忠彦同知樞密院蘇頌尚書左丞續有指揮令忠彦立班在頌之下臣竊惑之以官制言之則同知樞密院在左右丞之下以近例言之則同知樞密院先入者在左右丞之上忠彦自合在左右丞上今既不依官制又不循近例仰惟聖意必以頌為老舊故特示此優禮忠彦雖是晩軰然進之在前頌雖是舊人然用之在後竊以朝廷尚爵宜正先後之次今既不以先後次之則是陛下特形重輕之意陛下擢用執政其委任均一不可於班次髙下之間特有形迹使不安其處既不安處何以責其盡心昨傅堯俞為中書侍郎班等自髙不自聖意處分即無形迹之嫌與今来忠彦等事體不同欲乞聖慈裁酌只依近例序位庶於君臣恩意朝廷儀度皆得其所伏望采納愚言别賜批降指揮貼黄二府名位貴重人主用人於此為極人臣報君於此為盡若不用之則已如用之必使其如此乃為得也今升頌在忠彦之上於頌則為榮寵於忠彦與將則皆為愧懼是得一官之心而失二臣之意也恐非責大臣盡節圖報之理陛下以如此名器與人而却使人有愧懼不自安之心臣竊為陛下惜之此事不可不深繫聖慮陛下於大臣知其不可用而退之則可也見其有罪而斥逐之則可也容其在位而薄之以踈其心則不可也陛下自即位以來凡有處分事皆允當人情慰服惟此一事外人皆言未至平穩臣既有所聞不敢不以上奏在頌以得被大用為貴不以班次相壓為重若依近例以先後為序於頌自無損況聞頌已曽辭避亦足以成頌之美伏乞用此意特賜指揮此據梁燾奏議増入其從違當考癸酉命知潁昌府范純仁與知太原府滕元發兩易其任後六日罷之從中書舍人王巖叟言也巖叟言臣伏覩初六日除目延安趙卨太原滕元發皆進職易地臣當行制忽得指揮収還臣不知所以固已疑之今日乃以潁昌范純仁易元發竊聞用本路走馬奏章遂有此除臣謂朝廷進退大帥固當重惜不可輕用一人之言而行之使其言出於愛憎喜怒之私意而欺罔公議豈不損主上之眀誤國家之事果若可疑自當令本路監司公共體量信如其言行之未晚聞元發在河東頗有顯效為士大夫所稱按本路毎嵗入秋即自近裏州軍發兵馬往戍河外渉春乃還坐耗芻糧於難得之地不知幾萬計前此帥臣雖度知無事未有敢不遣戍者去秋元發獨能不遣為國惜費其利甚博盖其眀見事機以身任責故為之不疑衆論莫不嘉元發有大帥之略臣計陛下必不知之知之宜不遽易也今言者蔽其所長而不以告摘其所不足而暴之則其愛憎之情自己可見夫有顯效不録而隂言亟行四方聞之誰為陛下盡心者既以走馬一言易元帥將人人畏憚此曹有不自保之憂此曹將人人侵侮其帥有驕横之勢陛下不可不察也此風寖長非朝廷美事貼黄稱一元發不足惜所惜者朝廷進退帥臣事體爾如臣言可採伏望指揮必留告命速詔大臣别加詳議施行陛下以方靣屬人毁譽之聽不可不謹善惡之實不可不考若其材略足以當事雖小有疾苦何害於卧理如其無能雖壯安用也王巖叟墓誌云巖叟為中書舍人滕元發自太原易潁昌巖叟封還詞頭言進退帥臣理當重惜今以走馬承受一言便易邉帥使後人畏憚不自保此風寖長非委任安邉之福元發遂罷行走馬承受姓名當考又云巖叟封還滕元發詞頭因言元發能為探報不遣防秋人馬得帥臣體其後他帥已復遣矣而六年秋有麟州之役言者不知乃謂巖叟在樞府建言罷之尋出知鄭州三省樞密院言元祐四年冬季入流一百四十二人三年冬季入流一百七十九人四年冬季比三年冬季少三十七人將後次科場大禮奏薦轉員換授人數以三年分十二季約算内一季約一百五十四人有零并元祐四年冬季入流一百四十二人衮合共計入流二百九十六人除身亡致仕勒停丁憂尋醫侍養假滿落籍及叙用服闋尋醫等參部人比折外其入流多二十人乙亥詔祖父母在無子孫成丁委親投軍者杖一百限一年許尊長自陳取廂耆或鄰人委保放停即品官有服親投軍者雖未有子孫成丁及非委親如願放停不以年限准此鄜延都總管司言委親投軍熈寧法限兩月許尊長自陳而元祐易為尊長知後限一年許自陳頗容僥倖故立是法己夘知亳州龍圖學士鄧温伯為翰林學士承㫖中書舍人王巖叟封還詞頭言温伯賦性憸柔巧於傅㑹元豐之末已在翰苑交結蔡確求固寵禄及陛下踐祚之始褒嘉大臣是時王珪實位上相温伯草珪麻制則曰預定議於禁塗及為確詞則曰尤嘉定議之功輕重之間包蓄姦意隂受邪說以攘王珪之美徼幸異日操心不忠莫大於此及確之敗罪狀方露適在憂制未正典刑昨者外除嘗有天官之命門下封駮就改亳州搢紳之間已有疑論今方累月遽復禁林非惟邪正之混淆實恐賞罰之差忒伏乞収還除命别擇賢才庶逺姦人以隆聖徳詔以次舍人鄭雍撰詞既而給事中鄭穆再封還告命不聽御史中丞梁燾等相繼論列亦不聽燾論温伯已具四年九月二十二日除吏書時今次論列當求全本以増入燾集乃無此也巖叟又言臣近封還温伯詞頭䝉指揮令以次舍人撰詞縁其日亦是臣當直退而自省茍非臣踈繆無此處分若猶冒處義實難安伏望聖慈矜察特許罷職以適愚分詔不允巖叟又言竊以典誥之任所以發揮人主之好惡以示天下則别白賢佞乃其所先若用得其人便當采摭公議敷之訓詞若用非其人則宜列上所聞請収除目故事不一流風具存今温伯之用以邪亂正有害治體臣所以輙敢封還冀以忠良易此柔佞而䝉不回初命徒改詞臣則是臣濫居職分無補盛眀莫伸守官之義有愧代言之責伏望聖慈檢㑹臣前奏早賜俞允居兩月巖叟竟徙他官五月十八日巖叟改都承旨劉安世第一章云給事中兩次封駮當此時給事中兩人鄭穆及范祖禹也祖禹家傳載祖禹論議甚詳獨不云封駮温伯除命然則兩次封駮皆穆也五月十八日王巖叟遷二十六日梁燾劉安世遷二十七日穆與朱光庭遷是皆不得其職也草温伯承旨告者鄭雍此據王巖叟繫年録吏部侍郎范百禄兼侍讀百禄言臣愚竊以為分别邪正自古所難惟察言觀行考其事實所謂正直之人或天資亮直或家世忠義或有志報國或自立名節所謂姦邪之人或逢迎上意或希合權貴或性識頗僻或冀望寵利凡此二端其情非一不可遍舉今輙䟽其條目如後凡導人主以質直使之虛中聽納則為公正導人主以諂諛使之諱過拒諫則為姦邪導人主以徳義則為公正導人主以功利則為姦邪導人主以尊宗廟敬祭祀則為公正導人主以簡宗廟畧神祗則為姦邪導人主以敦睦九族惠養耆老則為公正導人主以踈薄骨肉棄老遺年則為姦邪導人主以恭儉清淨奉循典法則為公正導人主以驕侈放肆不顧舊章則為姦邪導人主以稼穡艱難惠及鰥寡則為公正導人主以輕鄙農事不䘏惸獨則為姦邪導人主以柔逺息兵則為公正導人主以用兵攻戰則為姦邪導人主以原情審罰則為公正導人主以峻法立威則為姦邪導人主以安民利衆則為公正導人主以勞民動衆則為姦邪導人主以進君子用善良則為公正導人主以近小人用惡徳則為姦邪伏望特留聖意推此事類以觀人情則邪正分而聰眀無惑矣傳載百禄進分别邪正二十條在四月十八日許講讀留對後今因百禄初除即附見此二十條要非宻事不必留對乃進也兵部侍郎趙彦若為禮部侍郎政目云尋依舊禮部侍郎陸佃加龍圖閣待制為吏部侍郎政目云尋依舊光禄卿范純禮權兵部侍郎彦若佃尋復故純禮改刑部十六日彦若佃復為禮兵侍郎純禮改刑侍今并書國子司業豐稷為起居舍人湖北提刑司言元祐敕品官之家不得請射乞改為請佃字從之辛巳殿中侍御史孫升為侍御史升言臣祗受誥命其詞云爾其察邪正之原昭賢佞之路臣愚不肖仰佩聖訓敢不夙夜自竭盖天下治亂安危繫于邪正消長而已夫邪佞之人未必顯為大惡以暴露其迹但隂為朋附蔽匿姦謀依違俯仰一旦得志則害及天下矣宜乎聖訓之告戒丁寧也臣伏聞近除鄧温伯為翰林承㫖温伯嘗為此職適以憂去當蔡確之姦惡未露而温伯朋附之謀不顯既無大惡茍居此職未以為過今日蔡確怨謗君親自謂有功於定䇿欲掩太皇太后天地之全功確既投竄炎荒而姦惡敗露朋附之謀亦已彰顯温伯由此遂為公論所棄矣何則温伯朋邪之謀見於制命自蔡確罪惡暴於天下則温伯所為制命傳於四方而朋邪之迹雖欲蔽匿不可得也當皇帝陛下即位之初王珪為首相温伯為珪之制詞則曰預定議於禁塗獨蔡確之制則曰尤嘉定議之功審如温伯之言則當時必有危疑不决之議頼確而後定凡先帝與子之意太皇太后立孫之功皆為蔡確所掩者率由温伯制命之詞也温伯朋附懷邪如此朝廷若還之舊物預聞密命清切之地付之匪人臣竊恐邪正之不分而賢佞之不眀也伏望聖慈特加省察早降指揮追除温伯除命以眀邪正之原則天下幸甚三月末五月二十七日六月八日七月二十四日可考新知齊州曽肇知陳州癸未户部尚書吕公孺提舉醴泉觀大理少卿劉衮知齊州詔時雨未足權罷春宴鄜延路經略使趙卨言夏人商量分畫界至催索公牒准樞密院劄子除塞門寨於東西北三靣各取二十里為界外其蘭州界并定西城界堡寨及本路義合與河東吳堡寨比接諸城邉靣齊截去處於城外打量二十里照直為界擇地卓立封堠修建堡舖仍詳此大意潤文修定牒本聞奏詔鄜延路經略司令保安軍移牒宥州訖奏政目三月末宥州牒除寨門屈曲分畫其餘比接諸城取直畫定其間地土雖甚闊逺亦割屬漢據此云云則或是正月末事非三月末也政目板數差錯更考之丁亥左中散大夫吕希道為少府監己丑詔太師文彦博致仕恩澤依條外特與一名并四月二十二日庚寅户部言接送人知州及兵官路分都監以上許差禁軍路分總管副總管鈐轄仍許差馬軍他官並許差廂軍委無人即支雇錢毎人毎程一百文足從之新削辛卯著作佐郎集賢校理孔武仲為國子司業新永興軍路提㸃刑獄楊畏為監察御史左諫議大夫劉安世右諫議大夫朱光庭言臣等伏見朝廷以御史闕員屢詔近臣俾舉所知向者大臺及兩制等數以名聞未嘗採録中外疑惑莫知所謂及再令舉官敕下略出事因如葉伸穆衍則曰已係省郎陳鵬則曰已係監司臣等遂於常調通判資序中以陳古張㣲充薦二人者皆崇厚剛正可任言責剡奏以来于今兩月未䝉朝廷有所簡㧞今日乃聞以楊畏為監察御史竊惟祖宗之制所以命近臣舉言官者盖耳目之任不欲置執政之私人也今兩制等奉詔舉官不合大臣之意則妄以監司省郎為解拒而不用楊畏不係所舉之士又見充永興軍路提刑未審朝廷何名除授臣等後来所薦既非監司省郎即合依公掄選他日茍不稱職自可并坐謬舉之罪今既未嘗試之以事而便謂其才不堪取舍任情殊無義理伏望聖慈追還楊畏新命止令于兩制等舉到人内選差庶使祖宗之法不至廢壞又言臣等伏觀祖宗故事天禧二年二月詔左諌議大夫樂黄目知制誥陳知㣲于常參官舉公清彊敏材堪御史者各一人臣等竊惟聖訓皆有㣲㫖何者御史之任所以糾察百僚茍非剛正無私不可濫居此職故須先擇舉主使之引類是以受詔者知眀主眷待之厚遴簡端良被舉者體朝廷責任之意崇尚名節得人之盛無媿前古厥後方令兩制資次舉官當時議者巳謂無善惡皆得薦士故多非其人然亦未嘗專出於執政也今兩制等初以名聞則猥曰已係監司省郎更令别舉後来所薦既已應格則又棄而不用乃以私意外召楊畏畏見受永興軍路提刑獨非監司乎前日以此拒人而今日躬自蹈之威福自任反覆如此舉官之詔遂成虚文祖宗法度日益廢壞臣等竊為陛下惜之况二聖臨御仰成輔弼若言路漸布私黨則政事得失何由盡達天聰為大臣之計則安為陛下之慮則踈矣伏望聖慈鍳前代姦邪䝉蔽之患循聖人開廣聰明之理罷畏新命以示至公又言祖宗以來尤重風憲之任必得公正之士付之彈劾之權所以糾察百僚振肅綱紀雖在人主未嘗敢以已意用之必命近臣與臺諌長貳更互奏舉以協中外之望如畏者初無自立之譽又非應詔之薦忽䝉簡㧞甚喧物議昔王安石當國惟以破壞祖宗法度為事毎於言路多置私人持寵養交寖成大弊今朝廷之政率由舊章豈容臺臣更蹈覆轍伏乞陛下審察事理罷畏新命再令近侍各舉所知庶使端良不廢故事又言竊聞議者以謂本朝嘗用舊人乃欲持此沮抑公論臣伏觀祖宗以來雖有復召之例率皆風節暴著為搢紳所服如吕誨之類者方可不用奏舉再授言職今楊畏從王安石學議論駮雜及吕惠卿用事又傾心附託後縁舒亶之薦得為御史觀其所主固已刻薄考其素履尤為乖異豈可為有故實妄引匪人竊謂朝廷不至乏才如此之甚伏望陛下審察義理罷畏新命庶幾言路純一衆聽不惑又言竊惟御史之官朝廷雖有復召舊人之例謂宜審其材實參以公議如畏之趣向乖僻附麗姦邪搢紳之間多所鄙薄非獨出於臣之私言也况元豐之末已嘗任用在職之日苦無建明雖粗曽彈擊貴近亦是承望權臣風㫖為之鷹犬今若不考其素輕授風憲匪人得進寖壞言路伏望聖慈深賜省察檢㑹臣累奏事理早降指揮罷畏新命以稱陛下為官擇人之意五月二十二日乃從安世等言畏改工外王巖叟繫年録云畏除御史言路譏畏學王荆公附惠卿主舒亶遂罷御史中丞梁燾言臣竊聞近除楊畏監察御史召命既下畏凡再辭誠意激切盖有不忍於其親者觀其心於事親則足矣於事君則有所未暇也古人有言忠孝不兩立此雖非聖人之道然無傷於士君子之行也伏願陛下成畏之孝於今日而責畏之忠於異時特允所乞以安其分劉安世朱光庭攻畏甚力而梁燾獨有此奏不知何也附見當考初除畏御史在三月二十六日罷在五月二十二日陜西路轉運判官游師雄為提㸃秦鳯等路刑獄提㸃秦鳯等路刑獄張舜民赴闕政目二十六日張舜民赴闕當考梁燾集有薦舜民兩奏舜民傳云為秦鳯憲未幾以考功員外郎召舜民力辭許還舊任俄除殿中侍御史五月二十二日舜民為殿中侍御史知河南韓縝言太中大夫致仕程珦身亡請以其弟琉特權管西京國子監從之琉何官當考檢附是日都省吏時忱出職任永夀歸吏部政目三月二十六日又二月二日可考板數錯亂又恐是正月二十八日壬辰工部言車駕幸瓊林苑金明池舊制三月下旬取㫖詔今嵗權罷仍舊令支賜龍圗閣直學士正議大夫吕公孺卒贈右光祿大夫
