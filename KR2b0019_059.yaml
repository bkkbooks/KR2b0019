body:
  text: 續資治通鑑長編卷五十五宋李燾撰真宗咸平六年六月己未朔御便殿內出陳圖示輔臣曰今敵勢未輯尤須防遏屯兵雖多必擇精鋭先據要害以制之凡鎮定髙陽三路兵悉㑹定州夾唐河為大陳量冦逺近出軍樹栅寇來堅守勿逐俟信宿冦疲則鳴鼓挑戰勿離隊伍令先鋒策先鋒誘逼大陳則以騎卒居中步卒環之短兵接戰亦勿離隊伍貴持重而敵騎無以馳突也又分兵出三路以六千騎屯威虜軍魏能白守素守素開封人張鋭領之張鋭未見五千騎屯保州楊延朗張延禧李懷岊李懷岊神祐子領之五千騎屯北平寨田敏張凝石延福延福未見領之以當敵鋒始至勿與鬭待其氣衰背城誘戰使其奔命不暇若敵南越保州與大軍遇則威虜之師與延朗㑹使其腹背受敵乘便掩殺若敵不攻定州縱軼南侵則復㑹北平田敏合勢入北界邀其輜重今雄霸破敵以來互為應援又命孫全照王德鈞德鈞未見裴自榮自榮未見領兵八千屯寧邊軍李重貴趙守倫張繼旻繼旻未見領兵五千屯邢州扼東西路敵將遁則令定州大軍與三路騎兵㑹擊之又令石普統兵萬人於莫州盧文壽文壽未見王守俊守俊附王繼忠傳監之俟敵北去則西趨順安軍襲擊斷其西山之路如河冰已合敵由東路則命劉用劉漢凝漢凝祥符人平父也田思明思明未見領兵五千㑹石普孫全照掎角攻之自餘重兵悉屯天雄命石保吉領之以授將帥尚恐有所未便卿等審觀可否更共商榷李沆等曰戰陳之事古今所難契丹侵邊自非陛下制勝於內諸將各禀廟算分禦邊要實恐未易驅攘今所裁制盡合機宜固非臣等愚慮所及上曰任人擇才頗亦難事朕必求其所長而用之魏能性剛張鋭和易故使佐能威虜地最要害白守素久習邊防共司戎政庶其寬猛相濟也孫全照好陵人取其嘗所保薦者與同事三路都鈐轄韓守英素無執守當使閻承翰代之承翰雖無武幹然亦勤於奉公也其它選用悉皆類此沆等曰臣觀陛下所任並中外素推許者况捨短取長必能協心成績矣上曰已令將帥别上方略候其奏至或無可採即當依此施行初馮拯建議以謂備邊之要不能扼險以制敵之衝未易勝也若於保州威虜間依徐鮑河為陳其形勢可以取勝前嵗王顯違詔不趨要地契丹初扼境王師未行而敵騎已入鈔賴霖雨乃遁去比至王超奏敵已去而東路奏敵方來既聚軍東山以救望都而兵困糧匱將臣陷沒幾盡超等僅以身免今防秋宜於唐河增屯兵至六萬控定武之北為大陳邢州置都部署為中陳天雄軍置鈐轄為後陳罷莫州狼山兩路兵上多采用其議云本傳云上從之按所出陳圖不盡拯言也庚申合內員僚三直為一詔所在官吏有規避事任交鬬不協或故為曠失以幸替移自今察知並當劾問譴責以戒澆浮選舉志在十一月今從實録與去年九月壬子詔相類辛酉詔河北河東陜西轉運使副按行邊陲經度軍費比之他路甚為勞止其月俸可給實錢壬戌遣使詣河北河東陜西近郡取器甲羡數徙置沿邊發順安軍役卒浚北平寨壕又以定州蒲隂縣當髙陽關㑹兵路詔葺其城供奉官閣門祗候謝德權兼掌其事一日乘傳詣闕求對且言緣邊民庶多挈族入城居止前歲胸奴犯境傅潜閉壘自固康保裔被擒王師未有勝捷臣以為今歲戎人必冦內地令邊兵聚屯一處尤非便利願速分戍鎮定髙陽三路天雄城壁濶逺請急詔蹙之仍葺澶州北城浚德清軍隍塹以為備豫上變色曰此大事非爾所當言德權曰臣䝉恩驅策冒萬死求見願陛下留意臣實慮蒲陰工作未訖冦必暴至矣上慰遣之既而敵果圍蒲陰丙寅詔陜西諸州疏理繫囚丁卯以工部員外郎兼侍御史知雜事劉綜為起居舍人河北轉運使時兩河用兵邊事繁急轉漕之任尤所倚辦綜繼領其職號為詳練上眷屬甚厚警急之際動息須其奏處云先是儋州流人洪湛卒於此州調馬驛湛一子偕行甚幼州以聞湛之被罪也參知政事王欽若亦內自愧於是白於上詔給錢二萬官為護喪還本貫丁卯因詔命官流竄沒于嶺南者給緡錢聽歸葬其親屬州遣吏部送之威約克密日伽羅美克等族濟河擊敗李繼遷辛未賜詔奬之癸酉以莫州團練使楊延朗為保州威虜靜戎軍沿邊都巡檢使代李繼宣也望都之敗契丹剽略郡縣繼宣壁徐河敵衆數千隊薄威虜威虜魏能與戰走之久而繼宣始至又冦靜戎副使王汀請分兵自將襲賊繼宣不許雖日出遊騎偵賊勢屢徙寨而未嘗出戰為能及汀所發乃詔還令樞密院問狀繼宣自西上閣門使康州刺史責授如京副使汀先領閣門祗候亦坐落職繼宣等責降在後日今并書丙子徙權知天雄軍府西上閣門使孫全照為寧邊軍部署丁丑知渭州曹瑋言隴山西延家首領圖卜等納馬立誓乞隨王師討賊仍請以漢法治蕃部且稱其忠實可使詔授圖卜本族軍主厚犒設之瑋彬之次子也始繼遷叛諸將數出無功太宗問彬誰可任者彬以瑋對時為供奉官太宗召見欲除諸司使知渭州彬固辭乃以本官知渭州數歲即真纍加閣門通事舍人仁宗實録曹瑋年十九彬為樞密使薦瑋按瑋生於開寶五年壬子卒於天聖七年己巳年十九時當淳化元年庚寅也彬自太平興國八年罷樞密使真宗即位乃復入淳化初彬實在徐州傳載瑋事要亦不詳今且附見當别考尋修正己卯升石州㕔子軍為禁軍先是部署司遣此軍巡警北平道遇冦踴躍爭進斬捕甚衆故升其軍額以奬之初緣邊冬衣常以八月送勤州防禦使權殿前都虞候劉謙言邊城早寒請促以六月詔從之時天武卒有負債殺人纍日發土得尸于左廂都指揮使髙翰營上怒翰失檢察執見於便殿謙即前奏曰翰職在巡邏及教閲諸軍不時在營本營事宜責軍頭上為釋翰罪謙博州人也髙翰未見庚辰令京東西河北河東陜西淮南諸縣令知管館驛使州勿差往它所威虜軍魏能上言軍士亡入賊境者即請沒其妻子為奴婢上慮其無以自新乃詔先監其家屬限百日招誘限滿不獲實入賊境者其妻子論如法壬午以威虎十指揮𨽻虎翼先是邊兵捍冦虎翼多勝蓋用徑弩也時新置威虎皆材勇之士故以增之徙并代鈐轄一貟率兵屯岢嵐軍初戍嵐州以備北戎控西河或言地非要衝不若徙就岢嵐北拒草城川賊路西援府州故有是命癸未詔律令具有明文法官不能詳處多以獄情輕重列奏取裁或再令審定即復更改一成之制豈若是耶自今無得以情理取㫖丙戌徙永興副部署冀州團練使石普為莫州部署普獻禦北戎圖掘坑設險以陷敵馬又上戰具銛鋒巨棓名品非一亦有普嘗用擊賊得勝者云實録及本傳並云上以普性剛愎與衆不和故自永興徙莫州按是年六月真宗裁定防秋圖因欲令普以萬人屯莫州乃是選才而用不緣與衆不協故徙屯也今不取內侍右班副都知閻承翰為定州路鈐轄代韓守英也先是三司各置使局不相總統彼此自求充濟以促辦為務至於出納移用均㑹有無則專吝封執動相違戾或交托利病以邀功希進譁言日聞于上頗煩親决文符互出莫知適從丁亥始并鹽鐡度支戶部為一使命刑部侍郎權知開封府寇準為兵部侍郎充三司使復置鹽鐡度支户部副使㑹要云真宗即位三司副使遷它職遂不復置及是乃復置也以刑部貟外郎卞衮領鹽鐵工部貟外郎查道領度支祠部貟外郎林特領戶部判使非奏事及有所更張則止署按檢餘皆本部副使判官主之三司副使自是始預內朝預內朝據林特傳附見以吏部侍郎陳恕為尚書左丞知開封府恕在三司前後踰十數年究其利病條例多所改創其徙它官也嘗薦寇準可用及準至三司即檢其前後所改創事類為方冊其曉諭榜帖悉以新版别書齎詣恕第請署恕一一為署之不復辭準拜謝去故三司多循恕舊貫自準始也魏泰載此事蓋可取然叙陳恕寇準履歷皆顛倒失序當準使三司時恕徙它官二年餘矣沈括云世稱陳恕為三司使改茶法歲計幾增十倍豫為三司使時考其籍蓋自景德中北戎入寇之後河北糴便之法蕩盡比後茶利十喪其九恕在任值北敵講解商人頓復歲課遂增雖云十倍之多考之尚未盈舊額至今稱道蓋不虞之譽也按恕使三司前後踰十年咸平四年正月遂改它官括云恕在任值北敵講解又妄也秋七月庚寅詔京朝官任河北路諸州通判監場務及幕職州縣官其令選鄉貫在本路歷任無贓罪者充其當入川峽廣南者即授以邊州辛卯補原川葉勒族首領子阿伊克為懷化將軍按宋史党項傳作補狸野族又懷化作懷安壬辰令陜西振武兵依河東廣鋭例官給直以市戰馬廣鋭本州兵官給中金以充馬價而兵人相與立社馬死則共市而補之公私咸便振武兵願從其例因而許焉壬寅詔北面諸軍有因事棄鎧甲兵仗而劫奪他人所有以償之者委隊長覺察告官當行嚴斷不告者連坐上以北戎入寇將議親征癸卯命司封郎中欒崇吉自京至鎮定檢視行宫頓遞甲辰復并三司鹽鐡度支戶部勾院為一命著作郎直史館陳堯咨兼判之從堯咨所請也丙午詔軍士因將校科責挾恨訴訟推勘虛妄者並禁錮奏裁先是上謂近臣曰纍有人言軍士不畏將校蓋不逞之徒自為過惡及被懲罰即掎托訴訟請行極斷使不復然朕熟思之如此處分恐亦未當蓋近者繼有訴訟驗問皆將校不法若遽加嚴刑不復省報它時或遂結成禍逆因莫敢告發則所繫非輕矣故有是命上又曰近復有告將校斂軍士緡錢賂樞密院吏請求出軍及屯戍等事洎令鞫實皆小人託名規財耳致軍士枉有費用遂成貧乏因踰越以陷罪戾雖纍行禁止猶未斷絶可再詔諭諸軍朝廷所發師旅皆先進入兵籍朕躬自㸃定所去之處非可請求貴其禀信不犯刑辟也己酉契丹供奉官李信來歸信言其國中事云戎主之父眀記號景宗后蕭氏轄哩宰相之女凡四子長名隆緒即戎主次名贊僞封梁王今年三十一次名郭密僞封吳王年二十五次名珍格八月而夭女三人長曰英格年三十四適蕭氏弟北宰相留珠格僞署駙馬都尉次曰長夀努年二十九適蕭氏姪東京留守伯葉次曰延夀努年二十七適伯葉母弟克圖延夀努出獵為虎所觸死蕭氏即縊殺克圖以殉葬蕭氏有姊二人長適齊王王死自稱齊妃領兵三萬屯西鄙驢駒兒河嘗閲馬見蕃奴達蘭阿巴姿貌甚美因召侍帳中蕭氏聞之縶達蘭阿巴抶以沙囊四百而離之踰年齊妃請於蕭氏願以為夫蕭氏許之使西捍達勒逹盡降之因謀帥其衆奔瓜爾佳國結兵以篡蕭氏蕭氏知之遂奪其兵命領幽州次適趙王王死趙妃因㑹飲置毒蕭氏為婢所發蕭氏鴆殺之蕭氏今年五十自景宗死領國事自稱太后國中所管幽州漢兵謂之神武控鶴羽林驍武等約萬八千餘騎其僞署將帥契丹九女奚南北皮室當直舍利及八部落舍利山後四鎮諸軍約十萬八千餘騎內五千六百常衛戎主餘九萬三千九百五十即時入寇之兵也其國境自幽州東行五百五十里至平州又五百五十里至遼陽城即號東京者也又東北六百里至烏弋國其國用漢文法使印八角而圓之又東南接髙麗又北至女真東踰鴨江即新羅也以信為供奉官賜器幣冠帶實録契丹附傳以隆緒為梁王而不載其弟所封國名正傳則以隆緒為常王未知孰是當考或常字誤知全州錢綘請招誘溪洞酋豪上曰西南蠻唯全州一境久已安靜不宜以虛名生事也錢絳未見癸丑武寧泰寧節度使太保兼中書令兖王元傑薨追封安王諡曰文惠元傑頴悟上特所友愛翊善考功郎中姚坦性木彊固滯喜直諫太宗嘗奬焉王稍佚豫坦即醜言詆訐王頗薄其為人坦由是益暴揚其惡上嘗戒坦曰元傑知書好學亦足為賢王矣少不中節亦須婉辭規諷况無大故而詆訐之豈裨贊之道乎它日坦為衛尉少卿判吏部南曹因事得對上以其舊人召升殿與語坦言及故府意短諸王而稱已之敢言坦退上謂近臣曰坦在宫邸不能以正理誨諭事有微失則從而揚之此賣直取名耳知通進銀臺司兼門下封駮事王嗣宗言京朝官受差遣者其中有苛刻踰違犯法虐民之人儻朝廷未能審察臣等復不能舉駮深非沮勸之道乞今後風聞濫狀許臣於審官院取索家狀按其由歷如得事實特許上言從之八月癸亥右諫議大夫史館修撰田錫言國家自先帝平晉之後與強敵結隙將相舊人相次薨謝邊鄙州郡屢為強敵所陷皇威不振久矣時議乃以將相無人亦久矣即不知今來朝廷公卿大夫間有如韓擒虎與李靖論兵否有人如牛宏知李靖有王佐才否若有人能論兵有人負王佐才未審陛下知之否有人善論兵有人負王佐才乃是帝王合先知之自來皇城司差人探事又别差探皇城司探事人如此察探京城民間事事無巨細皆達聖聰近又差朝臣為巡撫使及差朝臣以提㸃酒稅名目出外採訪採訪之事不過民間利病不過官吏能否而已即未聞委公卿大夫察訪善論兵之人詢求有王佐之才者也由是見所求者瑣屑而所忽者逺大陛下若以宗社為憂以生民為念即宜以逺大為務求將相為急也錫自注云咸平六年八月六日奏此丙寅命樞密院承旨曹璨捧日天武四廂都指揮使劉謙分往諸營疏導積水其居室未葺者以近便園苑分官舍處之戊辰賜內園使折惟正祖母路氏詔書茶藥時惟正請告詣府州省覲上聞路氏常訓子孫以忠孝故勞賜之己巳宰相呂䝉正自五月即罷所請俸詔三司續給之先是議北面防秋之策就定州為大陳既而慮契丹知之潜為奸計乃詔王超遣禆校於徐曹鮑河别擇營柵之地標表具圖以疑契丹庚午有司葺西華門城堞摧圯笮二十餘人死者半之命優恤其家笞其將領西凉府咱隆族都首領遣使貢名馬上以其嘗與博囉齊協力抗賊命優待之辛未原渭等州言州界戎人未附者八部二十五族今悉詣吏納質黎州言卭部川都蠻王諾驅卒其子阿酋嗣立壬申知開封府陳恕言僧徒往西天取經者諸蕃以其來自中國必加禮奉臣嘗召問皆罕習經藝而質狀庸陋或使外域反生輕慢望自今先委僧録司試驗經業省視人材擇其可者送府出給公據從之甲戌對輔臣於便殿上曰今河北已屯大兵而邊將屢奏敵未有隙且聚軍虛費則民力何以充給朕竊思之不若因其所制置以為控扼之制靜戎順安軍先開營田河道可以扼黑盧口三臺小李路又得通漕極邊常令承此開浚使及軍城敵或撓吾役即合兵擊殺李沆等咸曰設險興功守邊之利沿邊守臣茍漸為之制以增邊備善莫大焉上曰營田河道自來建議多為將帥所沮皆云甲馬雄盛不宜示弱殊不知不戰而屈人兵善之善者况國家訓卒練兵大為之備亦非全恃此險沆曰功之難成蓋人人互執所見參驗而行實為至便遂詔內侍閻文慶與靜戎王能順安馬濟共督其事徙莫州路部署石普屯順安之西與威虜軍魏能保州楊延朗北平田敏掎角以為防遏環州言蕃官蘇爾薩南死乙亥詔其子聶寧襲臨州刺史丙子詔度支户部二案公事繁簡不均宜令三司使酌其間劇命判官六貟分掌之詔環州秋田經蕃寇踐傷者頃賜粟十五斛民被掠者口賜米一斛又詔賜棣州民租十之三戊寅詔沿黃汴河知州通判每兩月迭巡河津辛巳以靜戎軍兵馬使周靖為本軍副指揮使先是敵嘗入寇靜戎據公孫橋靖率衆擊走之前年戍黑盧口復與敵戰為所獲於是脫身來歸因擢任焉壬午命雄州鈐轄米鋭威虜軍鈐轄髙素兩換其任以威虜被邊而素病目鋭出於行伍頗練軍事在雄州以幹職聞故對易之米鋭髙素未見丙戌髙麗國王誦遣其戶部侍郎李宣古來貢且言晉割幽薊以屬契丹遂直趨𤣥菟屢來攻伐求取無厭乞王師屯境上為之牽制詔書優答焉上謂輔臣曰晉祖何不厚利謝敵遽以土地民衆委之遺患至今蓋彼朝乏人故也九月己丑以安文惠王之喪今秋宴勿舉樂庚寅三佛齊國王遣使來貢方物且言本國建佛寺以祝聖壽願賜名及鐘上嘉其意詔以承天萬壽為寺額并鑄鐘以賜其使副授歸德歸化將軍壬辰夏州教練使安晏與其子守正來歸且言賊境艱窘惟劫掠以濟又籍夏銀宥州民之丁壯者徙于河外衆益咨怨常不聊生詔補晏殿直賜衣服緡錢大食國遣使來貢方物及紅鸚鵡其國在海上與占城相接自是始通也相州牧龍坊生芝一莖色黃紫長尺餘分七枝皆如手五指狀其最上枝類鳳首知州工部侍郎張鑑表獻之以為河朔弭兵戎人欵附之兆優詔答焉上聞河北大稔丙申出內府綾羅錦綺計直百八十萬命鹽鐵判官朱台符與轉運使定價出市糴粟實邊俄以本路均定物數未等復命祕閣校理戚綸往視之詔自今品官犯罪當奪官者其階勳如故戊戌廣南西路轉運使言黎桓迎受官誥使黃成雅附奏自今朝廷加恩願遣使至本道貴接王人以光海裔上以桓旁緣賦斂民被其禍未許也白溝河溢害民田庚子命度支貟外郎邢用之往度功役以疏導焉用之嘗建議為王矩沮罷於是卒成之用之初議在至道二年三月當考莫州部署石普等言准詔浚靜戎順安軍營田河道畢功詔奬普等賜將士緡帛有差普又言賊遣使至境上偵伺其事臣於役所設地關陳四面為塹每立營柵皆據險以扼賊路上曰普引軍壁馬村以西所開壕極廣足以張大軍勢若邊城下營悉能如此必可限扼敵騎蓋倉卒難以馳突而易於追襲矣司空平章事呂䝉正七上表求退甲辰罷為太子太師封萊國公辛亥麟府鈐轄言准詔置寨於府州西塞嶺今已畢功詔賜名曰寧逺詔續降宣敕令大理寺寫本封駮司看詳是秋募近京強壯補禁衛詔殿前都指揮使髙瓊閲習陳勢召近臣觀之日將午左右進繖上令撤之覩行伍整肅甚喜謂瓊曰昨日村民皆為精鋭矣擢材勇者三十人為小校惟二人𨽻御龍直優賜緡錢左右有言此二人武藝絶優上曰是新強壯始𨽻禁衛驟統舊卒故亦非便瓊曰陛下發言舉事動有逺慮非臣等所及也上又謂近臣曰比來備邊專意西北至於逺方殊俗要不可忽如川廣荆湖常須訓齊軍伍以為邊備也初太常少卿王仲華知蘇州本道轉運使任中正上其治狀就加右諫議大夫知杭州既而謝泌為轉運使奏劾仲華徙任日冒請蘇州添給詔罰金冬十月戊午移知䖍州上遣使就終南山撫問种放圖其林泉居處以獻己未召近臣觀之翌日又遣使優詔促其入覲放以疾未平為請許之令并州以皮衣裘給威虜靜戎軍士先是流外勒留出官及選限皆無定制其𨽻近司有才三二年即堂除外官者上命翰林學士承㫖宋白與兩制御史中丞同詳定焉辛酉白等上所定條例從之癸亥詔徙北面都部署兵屯天雄軍及邢洺州其威虜軍兵屯順安軍莫州北平寨兵屯定州寧邊軍兵屯平虜城深州鎮定兩路兵屯邢洺磁相州蕃入寇則㑹而前進北面都部署當是王超此段冇可疑者須詳考之㑹要亦同此甲子蠲寧邊軍夏稅以其經蕃寇也靜戎軍王能奏於軍城東新河之北開田廣袤相去皆五尺許深七尺狀若防捍仍以地圖來上上召宰相李沆等示之沆等咸曰沿邊所開方田臣僚纍曽上言朝廷繼亦商𣙜皆以難於設防恐有奔突尋即罷議今專委邊臣漸為之制斯可矣乞并威虜順安軍皆依此施行且慮興功之際敵或侵軼可選兵五萬人分據險要漸次經度之是日詔靜戎順安威虜軍界並置方田鑿河以遏敵騎己巳髙州義軍指揮使田彥強等來貢詔緣邊軍卒亡匿蕃部者限百日自首為兵為農各從其便仍加給賜限滿不至募蕃部收捉送官厚賞之辛未䕫州路轉運使丁謂言施州蠻酋談仲通等三十餘人先叛去各已招降請加職任上曰羣蠻妄希恩澤若姑息太過亦不可也詔悉補寨將仍詔自今蠻人殺賊有功就加賜賚其合補職任者具名以聞勿復部送赴闕㑹要於五年十月載談仲通事又於六年十月載載之蓋誤也今以本傳為據削去五年十月所戊寅給軍中傳信牌先是石普言北面抗敵行陳間有所號令則遣人馳告多失詳審復虞奸詐請令將帥破錢而持之遇傳令則合而為信上以為古者兵符既已久廢因命漆木為牌長六寸闊三寸腹背刻字而中分之置鑿枘令可合又穿二竅容筆墨其上施紙札每臨陳則分而持之或傳令則署其言而繫軍吏之頸至彼合契乃署而復命焉己卯殿前都指揮使髙瓊上鞭箭陳圖鄧州觀察使錢若水卒若水能斷大事事繼母以孝聞上甚悼惜之贈戶部尚書諡宣靖賵贈加等特遣中使存問其母賜白金五百兩若水諡本傳無之此據百官表庚辰知保州趙彬奏請决雞距泉自州西至滿城縣又分徐河水南流以注運渠置水陸屯田詔都監王昭遜與彬協力共成其事雞距泉在州之南東流入邊吳泊歲漕粟以給軍食而地峻水淺役夫甚苦之既成舟行無滯癸未鄜延部署馬知節等言李繼遷調集諸族㑹于鹽州謀取槖駝車箱峽等路入寇環慶上曰此必攻略西蕃而聲言入寇也乃詔涇原部署陳興等於鎮戎軍石門摧沙堡六盤關等處頓兵設備伺其至掩襲之丙戌銀州牙校時乂等挈族歸順補右三班借職賜賚有差長樂郡主髙氏為弟殿直處約求亳州兵馬監押上曰護戎之任實司軍旅處約未歷事不可從也㑹要咸平六年十月事今附月末十一月戊子分同州沙苑監為二每監牧馬四千五百匹庚寅詔監司之職刺舉為常頗聞曠官怠於行部將何以問民疾苦察吏否臧自今諸路轉運使令遍至管內按察令秦州防秋兵分𨽻儀州鳳翔府以就儲廪辛卯停江淮兩浙州軍配市紬絹癸巳以萬安太后寢疾御崇政殿親决繫囚徒以上遞減一等杖以下釋之環州言李繼遷部下突陳指揮使劉贇等以繼遷殘虐蕃部災旱率其屬來歸丙申以苦寒令諸路休役兵己亥閲捧日軍士教連珠必勝等三陳于崇政殿拔其趫勇者第遷之光祿寺丞李永錫奉禮郎王嘉祐坐交遊非類不修檢操並責監酒稅永錫和州嘉祐天長縣嘉祐禹稱子也嘉祐平時若愚騃獨寇準知之準知開封府一旦問嘉祐曰外間議準云何嘉祐曰外人皆云丈人旦夕入相準曰於吾子意何如嘉祐曰以愚觀之丈人不若未為相為相則譽望損矣準曰何故嘉祐曰自古賢相所以能建功業澤生民者其君臣相得皆如魚之有水故言聽計從而功名俱美今丈人負天下重望相則中外以太平責焉丈人之於明主能若魚之有水乎嘉祐所以恐譽望之損也準喜起執其手曰元之雖文章冠天下至於深識逺慮殆不能勝吾子也嘉祐對準據記聞責官事當考鎮州程德元政事曠弛上以徑兵所聚思得威名鎮撫癸卯徙延州馬知節代焉復降手札敦諭令疾置之任本傳云知節在延州偵戎人將入寇適值上元遽令張燈纍夕大啓城門敵人不測即引去按知節以今年四月庚午自益州徙延州才半歲又徙鎮州安得在延州值上元也今不取洛苑使李繼和出為并代鈐轄將行請對欲領兵按度邊壘上曰河東巖險之地兵甲甚衆敵若入寇但邀其歸路則可致捷勝不必率兵而往也上察繼和之志鋭於立功且慮其剛暴復戒之曰比者鎮戎之城非汝不立備知汝之勤悴唯益務和衆使其盡心統轄師旅亦當畏愛相須繼和曰事有不便臣當執守上曰不便之事固宜執守執守之間亦須婉順則事必和濟不失人情矣繼和為并代鈐轄據本傳在此年不得其月日按李允正自并代徙鄜延乃此年十一月癸卯繼和必替允正者今附見于此己酉罷河東孳生羊務先是轉運司奏置而市羊於民其死者令民償之上聞其勞擾故罷焉甲寅有星孛于井鬼大如杯色青白光芒四尺餘犯五諸侯歷五車入參凡三十餘日沒上謂宰相曰垂象如此其咎安在李沆曰陛下修德布政實無所闕第恐分野有災耳上曰朕德薄致兹謫見大懼災及吾民密邇誕辰宜罷稱觴之㑹以答天譴沆曰星文變異陛下克謹天戒此甚盛德也然其咎乃屬臣等至於華夷上壽禮不可廢且邊境未寧大兵在境所慮物情罔測固請不已乃許之詔郡縣主為壻之親屬求補職至殿直者不在遷轉之限六宅使王世隆承衍之子也性驕恣每坐諸叔之上人皆嗤之十二月戊午秦國長公主為世隆求正除近京刺史上曰牧守親民之官繫朝廷公議不許庚申遣使西北面勞賜將士甲子詔求直言仍令御史臺諸路轉運使司布告天下王稱東都事略冬十二月甲子詔曰朕為民司牧罔敢逸豫冀聞闕政屢詔讜言而羣臣奏對罕有極陳得失豈詢求之未至何循默以自持其令御史臺諭內外官各上所見勿為顧避西面部署言李繼遷劫西蕃攻陷西凉府逐出其居人知凉州殿直丁惟清沒焉乙丑廣南西路轉運使馮璉言廉橫賔白民田相承耕墾未嘗輸送己命官檢括盡出常租上曰遐方之人宜省徭役亟令罷之先是鎮安節度使同平章事李繼隆纍表求詣闕面陳邊事且乞自劾有詔召還及至對於便殿繼隆曰伏覩車駕將巡幸河朔陛下向來制置邊備分任將帥悉合機要至於戎人入寇人民小有騷動蓋亦常事即如太宗朝城堡往往陷歿然終不能為害願專責將帥不須鑾輅親舉上曰先帝天資聖武混一天下朕安敢上擬今外敵歲為民患既不能以德服又不能以威制使邊民橫被傷殺骨肉離異為人父母者其得安乎此朕所以必行也既而上亦不果行庚午改命繼隆為山南東道節度使尋出判許州繼隆以七月壬子二十三日對於便殿至十二月庚午十五日乃命徙鎮留京師幾半年也實録於壬子即載繼隆對語今移附徙鎮時判許州亦在明年正月今從本傳并書時河陽三城節度使王顯亦上疏言陛下將事親征臣竊惑其事謂非謹重之道且意陛下昨以王師小衄於望都故决議討伐然盛寒在序未聞犯塞鳴鑾輕舉直抵窮邊敵若不逢師乃先老又意或者獻說請復幽燕此非長策也且繼遷未滅西鄙不寧儻北敵與之結援競來侵軼則重為中國之患矣凡建議大事上下協力舉必成功今公卿大夫以及庶人尚多異同之說安可行之耶臣謂止可命將帥以討之訓士卒以禦之堅壘以挫之按甲以待之必欲燕薊舊地則宜修文德養勇鋭伺時利然後奉行天罰何往不克也此疏不得其月日附見李繼隆止上親征之後辛未右諫議大夫史館修撰田錫卒錫耿介寡合嚴恭好禮居公廷必危坐終日未嘗懈容慕魏徴李絳之為人及居諫署連上八疏皆直言時政得失嘗曰吾立朝以來封疏五十二奏皆諫臣任職之常也言茍獲從吾幸大矣豈可藏副示後謗時賣直耶悉取焚之臨終日作遺表猶勸上以慈儉守位以清靜化人居安思危居理思亂上覽之惻然謂宰相李沆曰田錫直臣也天何奪之速乎嬰疾以來朕日遣太醫診療卒不能起盡心匪懈始終如一若此諫官誠不易得朝廷小有闕失方在思慮錫之章奏已至矣不顧其身惟國家是憂孰肯如此朕每覽其章必特召與語以奬激之錫嘗慮奏疏不得速達遂令每季具所上事目及月日以聞而所修二書竟弗克就深可憫也壬申優詔贈工部侍郎賻贈加等以其子將作監主簿慶逺慶餘並為大理評事給俸終喪命有司録其事布告天下其後錫妻亡亦詔二子不絶廪給景德四年四月事今并書錫為右諫議史撰乃是年四月甲戌以萬安太后寢疾未瘳詔天下訪善醫者以聞上手詔問䕫州路轉運使丁謂如何得邊防久逺寧帖蠻人不敢為非乙亥謂上言若所委之官不邀功不生事以安靜為勝凡所制置一依前後詔條則羣蠻必不敢抵冒妄干天誅矣上然之戊寅德音赦天下死罪降一等流以下並釋之除五年逋租萬安太后服藥故也癸未上親閲逋負名籍釋繫囚四千一百六人蠲物八萬三千於是將肆赦改元或謂蠲放逋債減除率斂其數煩多三司必以恩澤太濫虧損國計為言上曰非理害民之事朝廷决不可行吝於出納固有司職也要當使斯人實受上賜甲申日將午雷暴震司天言占主國家發號布德未及黎庶上謂輔臣曰豈所議赦書小惠未遍上天以雷警朕耶今河北關西戍兵未息民甚勞苦而三司轉運使賦斂益繁卿等宜悉取民弊著為條目大者隨事減省小者即為蠲免又諸道罪人為惡情重頃令并其家屬赴闕委棄資産流離道路斯可憐憫自今止送正身臣僚負私過情輕終身為纍者委刑部特與洗滌其它卿等皆盡心講求之羣牧司言牧龍坊兵士乞給皮毛裘牧放上曰逈野苦寒賜之可也然野外披毳牧馬有類北敵可令以皂紬表之
