body:
  text: 續資治通鑑長編巻四百九宋李燾撰哲宗元祐三年三月戊申朔詔諸路經畧司講求䕶耕之策勿令賊計得行致失春事其新復城寨有近邊未耕處聲言召人開耕令不能測又詔編敇及春秋頒降條其勿印賣舊錄云自熈寜以來吏知習法而無新書以從學遂特聽印賣至是因言者罷之新錄刪去今從新錄户部言在京畜積嵗計應用之物欲将存留外有餘令以新兊舊估賣闕則前一年其不可留者前半年並計度申所𨽻處審實申尚書本部計置從之己酉三省言奉㫖集英殿御試舉人欲依天聖年故事皇帝御崇政殿試舉人二十二日太皇太后皇帝御延和殿垂簾宰臣以下進呈文巻皇帝御崇政殿唱名放榜賜公服鞾笏訖次班于延和殿謝太皇太后詔舊例崇政殿試舉人景福殿考覆自熈寜後移于集英殿可依已降指揮就集英殿試其殿試進呈文巻唱名放榜並皇帝御殿俟賜公服鞾笏謝恩訖移班赴内東門謝太皇太后詔䕫州路轉運司選人諭施州蠻田忠進以朝㫖放罪仍限百日聽經官陳首依舊住坐若及一年能彈壓蠻衆不復為過即次第保奏特與真命辛亥詔給借揚王顥錢三萬緡從顥請也壬子樞密院言西賊屯聚逐寨各止三四百人聲言作過欲我清野以妨春種或自為䕶耕之計或示寡弱誘致官軍伏藏重兵以邀戰勝或欲于别路作過牽制本路應援之師詔趙卨審量賊計若止是撓我春種即講求䕶耕之䇿勿令賊為我患若欲作過即隨宜應變深計利害以取全勝仍嚴戒諸将使臣勿為賊誘或激怒輕易舉動癸丑詔經明行修人如省試不應格聽依特奏名進士例就殿試甲寅詔荆南湖北路因蠻事出戍軍兵土丁特給錢有差天村蠻㓂多星堡詔胡田按實以聞仍相度措置若因官司引惹生事及不犯堡寨殺擄人口即行撫納若無故聚集自謀作過即掩捕捉殺務得首惡及以次造謀之人仍立賞募人殺捕其餘驅牽徒衆可諭以放罪使彼疑惑勢不能久仍令李茂直同共措置以聞丙辰樞密院言近降指揮廣南西路經畧安撫司令約束楊晟天等速歸本業不可侵越隣路作過詔本司體訪楊昌成等如實與楊昌星結集過湖北即選人曉諭勾回本業若不聽即差将兵掩捕討蕩及取其家屬以為牽制鎮江軍節度使守司空開府儀同三司致仕康國公韓絳卒上為輟朝臨奠成服贈太傅謚獻肅舊錄絳傳云數薦司馬光可用又稱程頥有經行已而光亂法頥敗俗新錄辨曰王安石變亂舊章神宗晚而悔悟及司馬光相哲宗追復祖宗成憲而史臣斥曰光亂法頥之學以孔孟為師而云頥敗俗是皆誣也自已而至敗俗八字今刪去丁巳御集英殿試進士樞密院言洪沅州楊昌星過龍繫路入大盈盡殺梁家族詔經畧使苖時中選官同體訪事状明諭歸業若蠻情終難安帖即約束兵将經畫務要誅殛首惡勿致例傷驅率之人輕進貪功别貽後患詔廂軍歸營及一季乃聽從役戊午試特奏名及武舉進士樞密院言陜西河東路並邊民人以夏賊屯集境上徃徃不敢耕種撓耕之䇿反為彼用實于邊民為患不細請令趙卨等按實以聞仍講求䕶耕之䇿以破賊計從之庚申試諸科及特奏名人癸亥試武舉進士射藝于崇政殿推恩補官者十有五人詔罷别考校祖宗袒免親試法舊錄云宗室自熈寜後稍知向學故科舉比進士少寛乃分考以為别異使之勸向至是罷去新錄削去今從新錄左正言丁騭奏編類章䟽三年三月十六日臣伏自去嵗及今凡四上章䟽論列何正臣不法未䝉施行正臣之惡未懲臣之言終不已葢自二聖臨御登進老成黜棄凶邪天地民人無不懽恱而獨正臣者置而不問天下有識之士竊有疑焉不知其何縁而幸免也太學之獄至于六七而沈季長葉濤王沇之葉唐懿余中沈銖孫諤龔原周常等無辜被罪太學生非理而死者不可勝數濾州之獄疑似不明而髙秉董鉞内臣韓永式等削籍逺竄韓存寳身首異處方是時生靈驚擾追呼逮捕畧無虛日正臣怙權冒寵不一二年措身侍從之地簡忽驕怠出入士大夫間自以為得計罪惡至此鬼神所不容典法所不赦而偃然游于江湖之上日與蔡卞等登髙賦詩飲酒嘯歌樂以卒嵗臣不識正臣者何縁而幸免也刑部大理治天下之獄郡縣小臣一杖之枉一罰之失皆書而為罪彼正臣者舞文巧詆過于羅織持法刻深甚于黨錮方是時御史諫官不指其非執政大臣同惡相濟任其横逆如此今二聖在上青天白日而猶置而不問故有識之士所以疑而未解臣之區區所以論列而未已也伏願二聖以祖宗社稷為念發于睿斷消除元姦追奪其號名竄流于窮裔非獨以舒天下寃抑之氣亦足以慰九泉無告之魂當考如何施行正臣元年十月十二日自潞州改梓州此云江湖之上當考自梓州改崇福宫未得其月日又言近聞羣小造作謗議有五鬼十物之名乞下御史臺體訪施行編類章疏二年九月十七日今並附此甲子資政殿大學士知汝州韓維提舉崇福宫以營塟兄絳自請也融州蠻㓂文村堡射傷防托官劉澤等遣鈐轄張整将兵討捕詔經畧使苗時中處置令堡寨嚴備固守仍先誅首惡及以計謀散驅率之人詔宗室嫁娶緦麻以上須兩世袒免須一世有官非諸司出職及進納伎術工商雜類惡逆之家子孫若違礙及妄冒者犯人并媒保各以違制論主婚宗室知情與同罪並不以赦降及自首原減其非袒免親乃依庶姓法四月十四日趙㞦云云二十七日詔云云乙丑詔改元豐元祐庫為元豐南北庫增置南庫監官一員正月九日五月十一日三省奏朝廷封樁錢物係備邊河防及緩急支用元在𣙜貨務收乞将舊司農寺充庫詔名元豐庫别差監官政目十八日事當考樞密院請蘭州通逺軍沿邊水陸田募人充弓箭手他路舊人聽帶舊地換充並依例給田自買馬者加五十畞仍官借錢糧俟及三年乃令應役從之詔奏舉改官職官縣令等人過犯輕重或刑名特㫖不同令吏部斟酌事理看詳比附取㫖吏部尚書蘇頌等狀看詳試刑法人舊來毎年春秋兩試昨准敕秋試已罷即今毎年只是一次春試若依條毎年申都省立定到闕日限顯是枉煩欲乞将試刑法人立定毎年一次春試其試人限當年二月十五日以前到闕免逐旋申煩朝廷立限若立此法亦令試人毎年預知試期依限赴闕從之戸部狀朝請郎金部員外郎范鍔同京東路轉運司奏准朝㫖前去京東路計㑹轉運司同共相度密州市舶保明聞奏詢訪得本鎮自來廣南福建淮浙商旅乗海船販到香藥諸雜税物乃至京東河北河東等路商客般運見錢絲綿綾絹徃來交易買賣極為繁盛然海商之來凡乳香犀象珍寳之物雖於法一切禁𣙜縁小人逐利梯山航海巧計百端必不能無欺隱透漏之弊積弊既久而嚴刑重賞所不能禁者亦其勢然也故上下議論皆以為與其禁𣙜用倖隱匿歸之于私室莫若公然設法招誘俾樂輸于官司則公私兩便試言其畧一者板橋市舶之法使他日就緒則海外之物積于府庫者必倍多于明杭二州何則明杭貿易止于一路而板橋有西北數路商賈之交易其絲綿縑帛又蕃商所欲之貨此南北之所以交馳而奔輳者從可知矣二者商舶通行既無冒禁枉陷刑辟之苦而其貲財亦免有籍沒窮悴之憂非特此也凡所至郡縣塲務課額必大增羡三者毎嵗市舶抽買物貨及諸蕃珍寳應上供者即無數千里道途輦運之費江淮風水沉溺之虞其本鎮變轉有餘者亦可以就便移撥于他路擘畫發洩或充折支賞給之用凡此皆利源所出莫非自然無所侵擾實為經久百世之利今相度板橋鎮委堪興置市舶司户部勘當欲依范鍔等奏從之改板橋鎮為膠西縣軍額以臨海軍為名實錄但書密州板橋置市舶司仍改鎮為膠西縣軍為臨海軍今以法冊増入泉密市舶皆李常建請常傳可考金部員外郎范鍔為京東路轉運副使丙寅龍圖閣直學士朝議大夫知鄭州王克臣為太中大夫以克臣訴理隔磨勘十有八年故特遷也戊辰朝奉郎中書舎人孔文仲卒孔文仲舊傳新錄辨誣今附此舊傳云以引經背理又懷異求合考官意神宗察之遂黜不用臣等辨曰范鎮奏言文仲對䇿切直而史官以為引經背理懷異求合恐非其實自以引至之遂十八字今刪去又云論崇政殿説書程頥汚下憸巧素無鄉行經筵陳説僭横志分遍謁貴臣歴造臺諌宜放還田里以示典刑臣等辨曰程頥一代名儒世所矜式謂其汚下憸巧素無鄉行及遍謁貴臣歴造臺諫恐非其實刪去二十五字又云凡先朝政事詆毁無所不至臣等辨曰諌官言事所見各有不同謂之詆毁過矣今刪去又云其後宰相吕公著謂為蘇軾所誘脅論事皆用軾意則文仲之為人可知矣臣等辨曰吕公著之言恐未必有此且文仲所論青苗免役保甲保馬茶鹽之法當時廷臣論者非一一時公議如出一口豈皆為蘇軾所誘脅而盡用軾意乎非吕公著之言明矣以上二十九字今刪去又云紹聖四年詔以文仲元祐中任言官誣詆法度附㑹姦險雖指柄臣實訕先烈追貶梅州别駕臣等辨曰文仲以元祐三年三月卒紹聖追貶指揮自見于後本傳不必載今刪去三十六字己巳賜進士李常寜等二十有四人及第二百九十有六人出身一百八十有八人同出身内宗室子湜為承務郎令馡為承奉郎諸科明經七十有三人各賜本科及第出身同出身有差庚午賜特奏名進士武舉諸科舉人進士經眀行修王鄰臣等同五經三禮學究出身假承務郎京府助教諸州文學助教右班殿直三班奉職借職差使凡五百三十有三人辛未朝請大夫國子祭酒集賢校理鄭穆為直集賢院諸王府侍講壬申于闐國遣使入貢詔李茂直等嚴督兵将于見今作過蠻賊所居團峒取其家屬焚蕩巢穴牽制賊衆及于界首伏截掩殺其荆湖南路安撫鈐轄司仍嚴設隄備張耀兵勢以為聲援因廣南西路經畧司言融州蠻楊晟臺等聲言來年㓂文村等堡故也甲戌增賜新釋褐進士錢百萬酒五百壺為期集費乙亥開封府獄空詔付史館權知府錢勰轉一官推判官賜章服夏人侵徳靖寨将官張誡等敗之各轉一官及蕃漢軍兵賜銀絹錢有差是月蘇軾言臣近領貢舉侍立殿上祗候放榜伏見舉人程試有犯皇帝舊名者有㫖特許依本等賜第又有犯真宗舊名者執政亦乞依例收錄而陛下親發徳音以為此人犯祖宗廟諱不可不降等已而又有犯僖祖廟諱者有㫖押出在廷之人無不稽首欣服與同列退相告語非獨以見聖人卑躬尊祖之意亦足以知陛下嚴于取士之法不好小恵以求虛名臣備位禁近固當推廣聖意将順其美而補其所未備謹具貢舉合行事件畫一如左一伏見祖宗舊制過省舉人一經殿試黜落不少既以慎重取人又以見名器威福専在人主至嘉祐中始盡賜出身然猶不取雜犯而近嵗流弊之極雜犯亦或收錄遂使過省舉人便同及第縱使紕繆亦玷科舉恩澤既濫名器自輕非祖宗本意也自來過省舉人限年累舉積日持久方該特奏名恩今來一次過省殿試不合格當年便得進士出身此何義也伏乞下有司立法将來殿試除放合格人外其餘並皆黜落或乞以分數立額取人所貴上無姑息下絶僥倖之心如聞已有去取二分指揮然有法不行與無法同如已有法即乞申明仍告諭天下将來殿試依法去取一自來釋褐舉人惟南省榜首或本塲第一人唱名近下者或有㫖升一甲然皆出自聖意初無著令今者南省十人已上及别試第一人國學開封解元武舉第一人經明行修舉人與凡該特奏名人正及第者皆著令升一甲紛然並進士不復以升甲為榮而法在有司恩不歸于人主甚無謂也竊謂累舉奏名已是濫恩而經明行修尤是弊法其間權勢請託無所不有侵奪解額崇奨虛名有何功能復令升甲人主所以厲世磨鈍正在科舉等級升降榮辱之間今乃輕以予人不復愛惜臣所未喻伏望聖慈更與大臣詳議前件著令乞賜刋削今後殿試唱名除南省逐塲第一人臨時取㫖外其餘更不升甲所貴進退之權専在人主其經明行修一科亦乞詳議早行廢罷一臣近在貢院與孫覺孔文仲同入劄子論特奏名人恩澤太濫未䝉施行伏乞檢㑹前奏降付有司詳議裁減仍乞立法應特奏名人授文學長史之類今後南郊赦書更不許召保出官一伏見近日禮部立法今後科塲差試官三人者一人詩賦二人經義差兩人者詩賦經義各一人臣謂此法不可施行凡差試官務在選擇能文之士若得其人則治易及第不害其能問春秋經義入官不害其能考詩賦若不得人縱用本科不免錯謬頃自聲律變為經義則詩賦之士便充試官何曾别求經義及第之人然後取士若必用本科各考所試則經義詩賦䇿論四塲文理不同亦須各差試官一人而後可此本言者私憂過計而有司不察便為生出此條自有科塲以來無此故事今後毎一試院分兩頭項試官問經義者則主虚浮之文考詩賦者則貴聲病之學紛紜爭競理則不疑自此科塲日有詞訟為害不小了無所益今來朝廷既復詩賦又立此條深恐天下監司妄意朝廷必欲用作詩賦之人為試官不問有無詞學一例差充其間久離塲屋之人或已廢學若用虚名差使顯不如經義及第有文之人欲乞特賜指揮今後差試官不拘經義詩賦専務選擇有詞學之人其禮部近日所立條貫更不施行軾與孔文仲孫覺同論特奏名恩澤太濫已見二月二十九日軾又言臣近因宣召面奉聖㫖何故屢入文字乞郡臣具以疾病之狀對又䝉宣諭豈以臺諫有言故耶兄弟孤立自來進用皆是皇帝與太皇太后主張不因他人今來但安心勿䘏人言不用更入文字求去臣退伏思念頃自登州召還至備員中書舎人以前初無人言只從參議役法及䝉擢為學士後便為朱光庭王巖叟賈易韓川趙挺之等攻擊不已以至羅織語言巧加醖釀謂之誹謗未入試院先言任意取人雖䝉聖主知臣無罪然臣竊自維蓋縁臣賦性剛拙議論不隨而寵禄過分地勢親廹遂致紛紜亦理之當然也臣只欲堅乞一郡則是孤負聖智上違恩㫖欲黙而不乞則是與臺諌為敵不避其鋒勢必不安伏念臣多艱早衰無心進取得歸邱壑以養餘年其甘如薺今既未許請郡臣亦不敢逺去左右只乞解罷學士除臣一京師閑慢差遣如祕書監國子祭酒之類或乞只經筵供職庶免衆臣側目可以少安奉議郎權發遣韶州劉誼勾當靈仙觀誼謝到任表怨望狂率故也後二嵗令吏部與知軍差遣得漢陽軍此據張莘所編劉江西萬言書集附見二年十二月十六日政目云劉誼因上章疏與宫觀或移此入彼朝請郎河東路轉運副使井亮采知滑州亮采前自京東路轉運判官徙河東及是京東民饑無以賑給故黜之亮采為京東運判在元豐八年四月徙河東在元祐二年九月此據劉攽制集増入攽制并責張璹而實錄無之今附此攽制云河東運副井亮采可知滑州朝奉大夫張璹可知唐州外計之任表率一道邦用莫重於金穀民務莫先於調度智弗及之曠職甚矣爾等前假使傳徃蒞東土不知輕重之要曽無聚斂之術以致民饑而無以賙賑糧絶而勞於轉發責其無狀宜有懲罰黜守一邦是為寛典張璹元祐元年七月自河北提刑改京東運判未見遷徙今乃以朝奉大夫同亮采責知州而實錄亦不書附見當考夏四月戊寅詔勿受尚書右僕射兼中書侍郎吕公著告老章奏以屢請故也龍圗閣直學士許将為翰林學士承議郎權發遣河北路轉運副使唐義問徙河東路以河北漕臣有溢員故也張景先増差故有溢員此據曽肇制集以御試中選進士杜藻昭憲太后族孫特授初等職官令占射差遣詔諸路郡縣各具差役法利害條析以聞李常奏議云昨來雖有朝㫖令逐路監司與州縣看詳未盡未便限兩月聞奏後來苦無申陳當即是四月二日詔也釐正倉部勾覆理欠憑由案及印發鈔引事歸比部太府寺己卯内殿承制知乾寜軍張赴以大河漲急䕶水有勞降勅書奨諭仍推恩官屬七人詔諸路及州各具圗開析建立沿革城壁吏員户口貢賦山川地里上職方左正言丁騭奏編類章疏四月三日竊覩明詔欲於後次科舉以詩賦取士天下學者之幸也然近時太學博士及州郡教授多縁經義而進不曉章句對偶之學恐難以教習生員臣愚欲乞下兩省館職寺監長貳外路監司各舉二人曽由詩賦出身及特奏名入仕者以充内外教官蓋經義之法行而老師宿儒久習詩賦不能為時學者皆不就科舉直候舉數應格方得恩命今或舉以為教官當能稱職伏乞二聖早降睿㫖使四方多士一變妄誕穿鑿之風而趨規矩凖繩之學天下幸甚辛巳金紫光祿大夫守尚書右僕射兼中書門下侍郎吕公著為司空同平章軍國事仍一月三赴經筵二日一朝因至都堂議事中大夫守中書侍郎吕大防為大中大夫守尚書左僕射兼門下侍郎中大夫同知樞密院事范純仁為太中大夫守尚書右僕射兼中書侍郎先是太皇太后實封御札付吕大防曰吕公著以年老堅乞休退方今皇帝冲㓜正要宿徳大臣輔佐公著豈易得也欲堅留依舊供職誠慮中書尚書兩省日逐事務繁擁恐未副尊待老臣之意今欲轉官罷尚書右僕射除攝太保同平章軍國事一月三赴經筵二日一入朝因至都堂議軍國事未知如何卿可相度合如何為便親書實封進入大防即奏曰臣伏詳詔㫖有以見陛下尊徳優老之意周旋曲折莫不精當臣愚不肖不勝大幸以臣愚見只欲因其舊官而優假之但進一官作特進依前令充右僕射加以平章軍國事即煩勞職事悉已蠲免恐亦不至闕事如未合聖意即乞罷右僕射進兩官作司空平章軍國事仍令三省樞密院各令議軍國事條目聞奏餘依文彦博已得指揮貼黄稱舊制大禮行事命官稱攝今來職事官恐不可稱攝御札又付大防曰覽所奏吕公著事以公著徳望欲兼一保傅官乃亞次太師文彦博一等也務要外協人望實益勸講然公著官去保傅甚逺卿可相度加一保傅之名於典故如何從一時權宜如何今欲除守司空行太保事同平章軍國事餘如所議其行太保事四字當與未當若不須更作保傅官即減去行太保事四字大防又奏曰臣伏詳詔㫖吕公著進拜三公平章軍國事及月赴經筵足以亞次師臣之體已慰人望多矣恐不須帶保傅官而後可也若正除太保則恐超越過多若用行太保事四字則恐非典故於今事體亦不須用權宜之制更望聖慈詳擇此並據吕大防家所受敕札并奏藁今刪取附見范純仁亦必與議但無所考據耳太皇太后從之仍與大防純仁並命又詔公著入都堂議事勿限時出省常行文字免簽書及附近東西府置公廨執政有所議聽就議公著大防純仁制詞學士蘇軾所草也是夕軾對於内東門小殿既承㫖太皇太后忽宣諭軾曰官家在此軾曰適已起居矣太皇太后曰有一事欲問内翰前年任何官職軾曰汝州團練副使曰今何官曰臣備員翰林充學士曰何以至此軾曰遭遇陛下曰不關老身事軾曰必是出自官家曰亦不關官家事軾曰豈大臣薦論耶曰亦不關大臣事軾驚曰臣雖無狀必不敢有干請曰久待要學士知此是神宗皇帝之意當其飲食而停筯看文字則内人必曰此蘇軾文字也神宗毎時稱曰竒才竒才但未及用學士而上僊耳軾哭失聲太皇太后與上左右皆泣已而命坐賜茶曰内翰直須盡心事官家以報先帝知遇軾拜而出徹金蓮燭送歸院此據王鞏隨手雜錄増入壬午觀文殿學士正議大夫兼侍讀孫固守門下侍郎中大夫守尚書左丞劉摯守中書侍郎中大夫尚書右丞王存守尚書左丞正議大夫知樞密院事安燾為右光祿大夫依前知樞密院事試御史中丞胡宗愈為中大夫守尚書右丞試户部侍郎趙瞻為樞密直學士簽書樞密院事熙寜八年十二月曽孝寛簽書猶帶同字今趙瞻則不帶同字吏部侍郎兼侍講孫覺為御史中丞龍圗閣直學士知延州趙卨為樞密直學士范百錄誌趙卨墓云夏人入朝貢而以重兵壓境諸将亟請益戍兵為捍禦具卨徐諭之曰苐謹斥堠整戈甲無為冦先戍兵不可益也因遣人詰敵方和好何故引兵来汝敢侵軼當自為備觀吾兵何從而出夏人素畏卨前後入㓂未嘗得志乃謂境上人曰我不敢犯龍圗歸保吾境耳遂潰去諸将歎服以為一言破賊十數萬自昔未有除樞密直學士再任按此月二十四日夏人攻塞門寨卨於是有洪州之役慕誌先叙洪州次云敵不敢犯即加職再任頗失次叙恐未可信今不取卨本傳亦云加職再任而實錄初無再任指揮又劉安世章亦以無故為言恐本傳誤本傳但因墓誌耳曽肇集有卨加密直制云嵗月寖久屢奏膚功是用進職樞庭且仍舊服亦不云再任吕大防政目於六月二十六日乃書趙卨密直再任初六日不書御集四月六日孫固等差除内有龍圖閣直學士朝議大夫知延州趙卨除同知樞宻院事按卨初無拜二府之命不知御集何故如此欵是錯誤姑附此當考初御批以卨同知樞密院公著大防純仁因告免對罷别批云延和進呈遂以瞻代卨卒莫詳其故云卨除同知惟御集有此他書皆無初疑錯誤後得劉摯日記則卨除命乃是中輟非錯誤也今追修如上仍全載摯日記云四月五日宣制吕晦叔為司空平章軍國事吕微仲左揆范堯夫右揆安厚卿進一官孫和父固門下侍郎予為中書侍郎趙大觀瞻簽書密院王正仲進左丞胡宗愈完夫右丞孫莘老覺補其闕為中丞予閲中書實封見其日御批以趙卨同知院三相因告免對退别批云延和進呈以瞻代卨三人書字莫知其故也右正言劉安世言臣伏見朝廷近除知延州趙卨為樞密直學士博考僉言亟有異論輙據公論上煩天聽臣歴觀祖宗以來待帥臣之體或以其久在方面敵人畏服或以其征伐捍禦績用彰著再委守藩之任方行進職之典卨治鄜延未滿三嵗考其治行無以過人伏讀告辭又非再任方朝廷進拜執政而卨獨無端同日遷陟中外傳播皆謂失體兼臣風聞卨嘗遣使與西夏約和反為羌人執而戮之審如傳者之言則挫國家之威靈沮塞垣之士氣守邊無狀孰甚於此臣聞賞不當賢則無以勸善罰不當罪則無以懲惡而况無功受賞有罪不罰欲持此道以治天下臣竊惑焉伏望聖慈特加考騐若卨果有上件事迹不惟收還新命亦乞明正典刑庶使貪功邀利之徒有所戒懼不報甲申廣西經畧司言融州蠻粟仁催渠陽軍蠻楊晟臺等結集徃來於兩路為民患已督兵将討蕩詔勿進兵深入擇其倡率首惡之人以購賞募人捕殺户部言陜西沿邊五年之蓄計緡錢五百餘萬請注籍以備勾考從之元年二月二十九日六月二十六日紹聖元年十二月三日中散大夫直龍圗閣提舉崇福宫劉忱知荆南是日左司諌韓川右司諫劉安世進對太皇太后問近日差除如何安世等曰朝廷用人皆協輿望惟胡宗愈公議以為未允耳太皇太后曰且徐觀其所為安世退而上章曰仰承聖諭固當遵奉退而熟慮終有未安是以不避嚴誅再凟天聽伏惟陛下留神省覽臣聞執政之任天下極選惟是當世之賢傑乃可不次而登用至於徳行不足以出羣臣之右才智不足以服多士之心則必假之以嵗月進之以階漸非惟養其聞望亦所以抑僥倖而止奔競也臣伏見宗愈頃在先朝粗能修飾陛下踐阼之始首加任使再朞之内致位中司然而性本姦回才識闇陋自居風憲尤務迎合既不聞有所啟沃進賢退姦亦未嘗有所建明興利除害朋邪罔上中外側目忽聞制命擢居丞轄輿議喧然莫不驚駭臣竊謂人君命令雖在必行茍處之得其理則執之不可變苟其不合衆望違拂人情關天下之盛衰繫朝廷之輕重所宜擇善何憚改為而况輔弼之臣與國同體豈容憸佞雜處其間臣於宗愈固無一日之雅亦無纎芥之怨惟是公論有所未安是以前日賜對罄盡悃愊而拳拳之忠不能自已故復論列以報陛下用臣之意伏望聖慈更加詢考若臣言不謬則乞收還新命授以外官庶使邪正有辨不失天下忠賢之望乙酉詔陜西河東路廵檢堡寨使臣透漏西人入界第四次以上衝替其兼兩地分以上者加一次以樞密院言刑部檢斷一犯即擬衝替故有是命先是御批劉摯王存不許辭免詔書差三省樞密院主事已上人送中書省奏執政官辭免恩命降不允批答六批已上差三省樞密院主事送今後詔書理合差中使齎賜或降付學士院是日御批今後三省樞密院主事以上人只送郊禋等大禮後常例加恩批答所有執政官以上非次特恩除轉不論批答數目并詔書並從御前差内臣降賜所貴不失事體元祐元年五月九日指揮并今月七日已批出差定人更不施行此據御集元祐三年四月九日手札實錄於八日載詔執政官以上特恩除授答詔並御前遣内臣降賜今用御集全文丙戌詔司空平章軍國事吕公著遇後殿垂簾同三省進呈六參日仍起居奏事自兩宫同聽政常以雙日於延和殿垂簾故詔公著二日一入朝然皇帝乃五日一御前殿視朝皆隻日也於是公著復請六參日仍起居奏事庶得瞻望皇帝清光詔從之丁亥淮南路轉運司請减安河務税令龜山鎮置務為税額從之戊子朝散大夫太府卿韓宗道為權户部侍郎二年七月四日初置權侍郎除授或自宗道始實錄不帶權字今從政目朝散大夫起居郎權樞密都承㫖公事劉奉世為天章閣待制樞密都承㫖起居舎人彭汝礪為中書舎人右司郎中王陟臣為起居郎著作郎兼侍講范祖禹為起居舎人五月八日辭聽知樞密院事安燾辭免所遷右光祿大夫先是翰林學士蘇軾言臣竊謂人主之馭羣臣専以禮義亷恥若使受無名之寵則為待臣子之輕今朝廷豈以執政六人五人進用故加遷秩以慰其心燾位冠西樞委寄至重豈肯見人擢用即以介懷既無授受之名僅以姑息之政縱有先朝故事亦是一時誤恩今燾力辭正為知義臣欲奉命草詔不知所以為詞伏望聖慈從其所請若除受别有縁故即乞明降指揮茍於義稍安敢不撰進内批可且用一意度作不許辭免詔書進入燾再辭免遂從之己丑詔吏部授兼管買馬官並赴樞密院引驗庚寅范純仁以韓宗道孫固以文彦博親嫌為言劉摯言故事執政於同列少有避親者太皇太后曰執政親戚無回避之理如用人合公議雖親何害若或狥私雖非親戚必致人言惟盡公滅私則善矣正議大夫章惇知蘇州先是罷惇資政殿學士除知越州惇自言越州告為遞兵偷匿縁父齒耄期禮當専養乞更不别給告只依舊提舉洞霄宫范純仁言惇父老居蘇州陛下方以孝治天下豈可使舊臣失晨昏之養其所請宜聽故以蘇州命之惇復辭乃依所乞而父已卒二月二十三日知越州五月二十一日仍提舉洞霄而章俞先以十六日卒今并書之四年十一月二十四日降一官與宫觀候服闋日給告左正言丁騭為禮部員外郎監察御史趙㞦為都官員外郎以騭與胡宗愈㞦與孫固親嫌故也㞦尋改考功改考功在五月四日㞦為御史嘗論今日二聖深居九重政在大臣之時其法度更改粗已就緒惟是進㧞人材所關國體甚大陛下不可不深思而審察之臣聞治平以前執政大臣不敢公然援引親黨置在要途所乞子弟差遣多處筦庫之任甚者不欲使之出應科舉恐與孤寒競進如其稍渉葭莩之親雖有卓然才能亦且抑而不用以示公義滅私恩也自熙寜以後因王安石用事破壞此例其子弟既處要職而内外親戚亦皆布列華近徒持内舉不避親之説而不能無私意於其間遂致後來習以為常凡一人進用則内外親戚咸有不次之望乃以筦庫為不足道且某執政譽某人之親族曰此可選任之也某人復舉某執政之親族曰此宜褒陞之也互相推假何者非賢或以㨗給者為有才或以鈍訥者為有徳或以資任淺者居事權繁重之地或以無出身者預文字清要之選是使權貴親戚皆有侈心而孤寒疎逺罕得而進自此以後私恩勝而公義息矣如韓維平日譽望非不美及預機政只縁多引親黨遂失士論既而陛下覺悟罷其政柄出補藩郡臣猶恐自是以來未免此弊事之既徃不復備論也伏願陛下思循治平以前祖宗用人之深㫖思革熈寜以後執政援親之陋風凡進擬除授之際親發天語以訪逮之茍非執政親族又非交相稱譽則用之而不疑如其一有似之則宜詰難戒敕以卻其謀如此則各盡公平知所畏避唯乞陛下黙而識之徐而觀之必有得於是矣貼黄言執政援引親黨非太平之美政實天下公論之所未平其來亦稍久矣今臣所論者蓋止欲陛下知之明詔大臣杜絶其弊此疏乃臣親書不敢漏泄元祐編類章疏三年四月二十日㞦奏此按四月二十日則㞦罷御史矣恐二十日字誤今附見罷時正月十四日㞦論言官已見本月日㞦傳又有餘論今附此論執政引用親戚則傳甚畧今從編類章疏具載之又論言事之臣或稍遷其任實奪言職或畧行其言而退予善地或兩全並立而茍從和解或置不問而外示并容使忠鯁之士包羞而艱退此朝廷所宜深察也又論宗女不宜與工商之有官者為㛰三班使臣不當以粗習經律而試換文資取士當先經義而後詩賦郎官監司宜使迭為出入使無内重外輕之弊㞦又論以下據徽宗實錄㞦原傳蓋因許将墓誌也宗女婚見三月十七日並此月二十七日又論近嵗常賦之外悉罷利入之路國用向去必至不足乞裁减宗室賜予及人吏俸禄此據編類章疏三年四月十八日所奏今附見於罷時司空同平章軍國事吕公著免冊禮令學士院降詔從之舊制將相皆以階官守三師或三公元豐改官制文彦博常以河東節度使守太師王安石以觀文殿大學士守司空元祐初彦博罷節度使入為平章軍國重事即去守字及公著為司空學士院草制誤存守字是日三省被㫖貼麻改正癸巳詔定職事官嵗舉陞陟人數甲午朝獻景靈宫正月十一日又七月二十三日又十月十五日丁酉鄂特凌古遣人入貢詔江南東西荆湖南北福建成都府梓利䕫路元祐二年以前朝廷封樁錢物紬絹綿并舊在京召人入便及計置紬絹綿並罷聽逐路提刑司兊便或起赴要便及沿流州軍仍舊封樁監察御史趙㞦言元豐敕重法地分凡劫盗者妻子編管元祐新敕一切削去則前此編管者宜不少請令從便從之其窩藏人縁坐妻子准此舊錄云初京東諸路有人習為盗處雖上等税户在於豐嵗㓂攘剽劫無所畏憚而儕類相與為之囊槖故刑名視他路加重以懲其心及除縁坐法故㞦有是請新錄削去今從新錄兵部状勘㑹自來所管牧租錢物並賣不堪馬死馬肉臟户絶劵馬糜費等錢物係羣牧司管勾及後來有封樁保馬户贖銅錢及廢監省費等錢物文帳本部依元豐七年七月二十日朝㫖繳申都省及檢㑹元祐元年十二月十四日聖㫖應縁内外馬事舊係羣牧司管勾者専𨽻太僕寺直逹樞密院更不繳申尚書省及駕部本部未審上件封樁文帳合隷屬太僕寺或復是本部繳申都省正月二十四日聖㫖令兵部依舊勘當繳申都省樞密院今檢㑹兵部状契勘廢監省費錢本部拘催雖近准朝㫖令轉運司應副監馬上槽草料等支用如有剰數依舊封樁看詳上件錢物許應副監馬草料等支用如有拘催剰數亦乞並撥隷太僕寺施行奉聖㫖依本院勘㑹除保馬户贖銅錢不屬樞密院外其廢監省費等錢物已有指揮撥𨽻太僕寺難以却從兵部上尚書省二月十五日聖㫖應係舊羣牧司所管封樁錢物並令太僕寺拘管催驅依條具帳申樞密院令承㫖司置籍拘管所有今年正月二十四日指揮更不施行尚書省契勘元降指揮止係将應縁馬事如復置馬監招刺兵士牧放孳生收支配填之類悉令隷屬况其錢穀自非樞密院主領之事兼元降聖㫖餘依官制其嵗支弦箭錢自官制行撥屬駕部後來亦常支給及新復諸監凡有費用既奉朝㫖許以朝廷封樁錢物應副自無不行支撥之理兼牧地租課等錢物見管五百七十餘萬係應副朝廷緩急移用即非止縁馬一事支遣若樞密院應縁馬一事及新復諸監所須錢物得㫖許令支撥即尚書省皆合應副今來駕部申封樁帳合依已得聖㫖兵部依舊繳申都省四月二十日三省同奉聖㫖依今年正月二十四日所得指揮施行勘㑹到下項三省樞密院同奉聖㫖牧租等錢物並撥歸樞密院令太僕寺拘催依條封樁赴内藏庫送納寄帳及充應縁馬事支用其元祐元年十二月已前己未封樁錢物除已得㫖合支用外今後遇有非泛支使並三省樞密院取㫖施行河北户絶一項自元祐三年正月已後撥歸尚書户部今劄付尚書兵部仍關户部太僕寺及申牒應干合屬去處准此一太僕寺具到除廢監省費錢外餘並係舊羣牧司所管如後數内錢物窠名下項牧地租課死馬肉臟錢不堪馬錢劵馬糜費河北户絶廢監省費錢一勘㑹元祐元年五月内兵部状太僕少卿李周等状差前去河北陜西河東京東京西路相度興置馬監所有置監事件一就措置勘㑹逐路應管兵部錢物令樁留在彼以備置監支用乞指揮勘㑹本部所管錢物依條許召人兊便起發上京送納今據上項河北等路應管本部錢物並隨處封樁准備置監支用今後權住兊便起發奉聖㫖依兵部所申一契勘元祐元年十一月四日兵部申上槽馬草料等将逐路省費錢物封樁令轉運司出備等事奉聖㫖令逐路轉運司将所認省費錢應副新復諸監草料請受等使用如有剰數即依舊封樁此據編錄法冊増入乃三年四月二十一聖㫖疑三年當作二年姑從法冊元年十二月十四日戊戌聖㫖已附本年月日又元年五月末又十一月四日云云合參考二年正月十四日丁丑聖㫖并二月十五日戊戌聖㫖本年月日並不載若係今年正月二十四日壬申及二月十五日辛卯即并附此更不别出戊戌朝請大夫集賢校理諸王府翊善王汾為左中散大夫直祕閣庚子龍圗閣待制傅堯俞為吏部侍郎承議郎侍御史王覿為右諫議大夫朝奉大夫右司郎中盛陶為侍御史舊錄元符二年九月七日盛陶傳云陶外寛簡中無所守初為御史以不稱任罷羣姦用事復引在風憲所論多兩可求容不能引義讜正終為姦黨新錄辨曰此史官憎疾誣毁之言今刪去朝議大夫祕閣校理諸王府記室參軍鄭雍為起居郎吏部員外郎王古為右司員外郎禮部員外郎上官均為吏部員外郎朝請郎權陜西路鈐轄轉運副使吕大忠知陜府朝奉郎祕書丞直集賢校理孔平仲為江南東路轉運判官承議郎都官員外郎吳安憲提㸃河北路刑獄詔吕公著俸賜依宰相例又詔天下郡城以地里置壮城兵額禁勿他役是日西賊攻塞門寨皇城使雄州刺史帶御器械鄜延路第五将米贇西頭供奉官郝普右班殿直吕惟正與賊戰死之鄜延路經畧使趙卨知賊将入㓂檄西路将劉安李儀曰賊即犯塞門汝徑以輕兵擣其腹心於是安等襲洪州斬擄五百餘焚蕩族帳萬二千獲孳畜鎧仗萬三千米贇等死塞門士氣沮恧距府百餘里大川夷易敵可以百騎並驅城中洶洶老将皆有憂色或請堙城門伐壕木以備㓂卨笑不答賊尋遁去范百祿誌卨墓云夏人自元豐六年後屢請盟且懷公威信有素戒其黨無輙犯塞獨渠酋梁伊特邁桀虐數擾邊國人亦苦之於是公度伊入特邁終不悛使間以善意問伊特邁何苦與漢為仇必欲㓂第數來恐汝所得不能償所亡洪州是也能改之吾間善遇汝遺之戰袍錦綵自是伊特邁不復窺塞因復縱使微泄其事國中固疑伊特邁不犯漢也又聞私受吾饋果殺之此事當考不知伊特邁與葉普何如葉普事見二年八月癸巳将曽肇制集皇城使雄州刺史帶御器械鄜延路第五米贇可特贈四方館使遥郡防禦使西頭供奉官郝普可特贈西京左藏庫副使右班殿直吕惟正可特贈東頭供奉官樞密院闗鄜延路經畧司奏四月二十四日於塞門寨面與西賊鬬敵将官等收身不到奉聖㫖贈官羌戎背恩乗間竊發驅脅種落繹騷邊陲爾等躬率師徒先登薄戰忠憤所激奮不顧身殞於兵鋒朕用嗟悼或起陞使領或躐進官榮豈惟慰爾忠義之魂庶用伸予哀痛之意鄜延路四月二十四日西賊攻犯塞門寨下項劉安等能於當日出兵入界牽制致西賊聞此聲勢遂致解圍兼斬獲數多奉聖㫖逐人各與轉一官内劉安更特與减二年磨勘主将如京使本路第三副将劉安西京左藏庫使本路凖備将領解元忠計獲得四分已上内殿崇班經畧司凖備差使郝遜同本将部領人馬使喚蕃官内殿崇班經畧司凖備差使歸仁獲得三分已上黠羌之衆輕犯邊城安與元忠即日出師擣其不備聲勢既振俘斬亦多賊懷内憂旋即引去歸仁暨遜皆與有勞第實進官庸示褒勸鄜延路四月二十四日西賊人馬到塞門寨圍閉危急本将帶領人馬入西界牽制到石堡寨逢賊鬭敵破蕩燒却石堡寨及勒吉平一帶族帳并分遣人馬於花氊㑹油平相對多設疑勢舉放烽火逼逐西賊至二十六日退回正将西京左藏庫使李儀斬獲四級雖於例止該賜絹縁能破蕩賊帳致西賊聞此聲勢遂至解圍奉聖㫖特與轉一官㸃羌猖狂邊戍告急爾能乗其不意深入㓂境焚毁部族鼓行而前煙火相望軍聲大震羌衆遁去爾勞為多錄其謀勇之長豈在俘馘之衆進秩一等兹為異恩壬寅西京左藏庫副使髙遵固兼閤門通事舎人以踐歴有勞也西上閤門使康州刺史知岷州兼管勾洮東沿邊安撫司公事种誼移秦鳳路鈐轄兼第一将以誼與劉舜卿有嫌故也皇城使昭州刺史郭紹忠充熈河蘭㑹路鈐轄知岷州管勾洮東沿邊安撫使司公事兼第四将龍圗閣直學士提舉萬壽觀陳安石知陳州龍圗閣直學士提舉萬壽鴻慶宫盧秉落龍圗閣直學士為寳文閣待制秉前以父䘮去渭州䘮滿得知荆南秉辭疾奉祠於是言者論秉熈寜間推行二浙鹽法所配流無慮萬餘人故責之右正言劉安世言臣伏聞累有臣僚論列盧秉昨在兩浙推行𣙜鹽之法務為慘刻殘虐一路比䝉朝廷下本道根究皆有實狀而害民之甚者自行法以來其所配流一萬二千餘人如聞寛恩止落學士猶以待制提舉宮觀中外之議皆謂未安伏惟聖朝愛養元元不欲一物失所而秉出将使指總按一道未聞宣布恵澤興利除害而専為身謀不顧義理罔上以虚課虐下以苛法愁苦之聲溢於道路議者皆謂誅剥掊克與吳居厚畧同而峻刑害物則又過之雖降一官尚玷侍從恐無以戒戢姦暴慰塞民情伏望聖慈特詳此理比附吳居厚例重行黜責以答公議舊錄云言者論秉熈寜間推行兩浙鹽法犯禁抵罪者多後以期赦率聽從便而論者尚及之坐此被責新錄但刪去後以期赦率聽從便并尚字於秉罪狀殊不詳今用秉本傳及劉安世章别修不知初論秉者誰也當考五月六日趙君錫云云河東路經畧司言北界歩騎七百餘人於吉伯溝界出沒及府州河濱斥堠堡有西賊百餘騎襲獲一騎推騐是北人詔曽布将所獲北人推問來歴牒送北界癸卯詔宗室嫁娶依舊制大宗正司勘驗三月十七日詔云云永寜軍博野縣民張永昌五世同居詔加旌表
