body:
  text: 續資治通鑑長編巻一百七十二宋李燾撰仁宗皇祐四年春正月辛亥徙英州别駕唐介為全州團練副使監郴州酒税王堯臣王守忠陳旭等較慶厯皇祐總四年天下財賦出入凡金幣絲纊薪芻之類皆在其數叅相耗登皇祐元年入一億二千六百二十五萬一千九百六十四而所出無餘為書七巻丙辰上之詔送三司取一嵗中數以為定式二年正月受命至是乃上之庚申乾寧軍獻古鐘詔送詳定大樂所實録明年二月末又書乾寧進古鐘本志亦在明年二月而此年所進志獨不書恐實録重出也今止存其一明年二月不復書丙寅聽吉州司理叅軍祝紳持兄服初江南東路體量安撫言紳㓜亡父母養於兄嫂已嘗為嫂服今又請解官持兄䘮上曰近世盖有匿父母䘮而干進者今紳雖所服非禮然不忘鞠養之恩亦可勸也既聽之仍候服闋日與幕職官知縣詔昨為唐介顯涉結附合行降黜亦慮言路或塞尋與敘遷尚恐言事之臣有所顧忌令御史臺諫院其務盡鯁直以箴闕失仍令通進司或有章奏畫時進入必當親覽或只留中此據㑹要四年正月十九日丙寅也戊辰詔御史臺臣僚年七十因體量罷官或分司致仕者更不推恩子孫己巳詔許諸路轉運司災傷處貸民種食即不得以勸誘為名抑配人户壬申樞密直學士工部侍郎知福州劉䕫請解官歸武夷山為道士不許尋命知建州䕫建州人遂以户部侍郎致仕知建州在今年十月戊戍致仕在明年四月今并書之癸酉刑部郎中江東轉運使張沔直史館翰林學士趙槩等言沔早居臺省頗聞清謹乞加襃擢故也乙亥塞郭固口二月戊寅上謂輔臣曰東南嵗比不登民力匱乏嘗詔損嵗漕百萬石今發運使施昌言許元乃欲分往兩浙江南調發軍儲是必謀誅剥疲民求羡餘以希進爾宜約束之因詔昌言等遵前詔毋得輙有科率己夘降利州路轉運使度支郎中李熈輔提㸃荆湖北路刑獄度支員外郎張紀知歙州並坐按部無状也庚辰兵部郎中傅永為户部副使慶厯末永自梓州路轉運使移陜西慶厯八年正月自梓州徙時關中用折十鐵錢盜鑄不可勝計公私患之永獻䇿請變錢法至境問民所乏貸以種糧錢令麥熟納償而薄取其息民大悦永亟檄州縣凢㪚二百八十萬緡大錢悉盡乃以聞已而朝廷變法遂下令以小鐡錢三折大鐡錢一民出不意破産失業自經死者甚衆而盜鑄亦以衰止所貸得麥四十萬斛商人入粟於邊而受錢於中都嵗五百萬緡時河北奏乞錢朝廷未有以給永言本道倉廪實請以所當錢畀之上嗟賞自康定用兵陜華以西移輸税於邊民力大困永令輸本郡而轉錢以供邊糴儲亦無乏王堯臣詳定課績上其事又賜詔襃之尋召入權糾察在京刑獄於是權副三司傅永𫝊云永獻䇿請變法既悉貸民大鐡錢遂下令以一折三民多破産失業而盜鑄亦止按變法在慶厯八年六月乃用三司議或因永獻䇿亦未可知若謂永遂下令以一折三則是永自擅作法罔民初非朝廷變法也朝廷變法適與永貸民大鐡錢相先後盖永悉貸民大鐡錢大錢雖折小錢十而小錢十可改鑄大錢五且有餘即鄭戬所云盜鑄獲利十之六也永前貸民大錢今但用小錢又以小錢三折當十大錢一其名似優貸者其實隂奪盗鑄之利也永𫝊載此事殊不了了今畧加删潤使易曉詔開封府比聞浮薄之徒作無名詩玩侮大臣毁罵朝士及注釋臣僚詩句以為戲笑其嚴行捕察有告者優與恩賞辛巳降提㸃江南東路刑獄都官員外郎張肅知睦州同提㸃内殿承制閤門祇候趙牧小處監押先是朝廷以京東淮浙江湖災傷令轉運提㸃刑獄分路廵察而肅等稽違不行乃奏凖編敕每遇出廵仍湏同行又請挈家於分定州軍上曰始令分路廵按盖急於撫䘏疲羸督視盜賊而肅等乃欲挈家以自便故降之癸未命御史中丞王舉正與三司同詳定冗費甲申右屯衛大将軍克繼上廣夏竦所集古文韻六巻上謂輔臣曰宗室中嚮學者鮮獨克繼孜孜於字學宜降詔奨諭仍以其書送秘閣克繼徳恭孫承慶子也乙酉端明殿學士兼龍圖閣學士禮部侍郎集賢殿修撰李淑以母老乞觧官奉養從之丁亥詔每嵗汴口祭河自今兼祠十七星初司天監靈臺郎王太明言按占書主河江淮濟溝渠溉灌之事凡十九星汴口祭河瀆七位而不及星詔司天監詳定而言十九星内亢地主波水徃来送迎之事北河為契丹北戒南河為越門南戒土司空掌土功事皆不主江淮濟太明所遺有箕斗奎三星顓主津瀆請與東井天津天江咸池積水天淵天潢水位水府四瀆九坎天船王良羅堰等凡十七星案此所載止十六星考宋史禮志東井下有天津星名原本遺漏今増入在天河内者並當祠之汴河口祭星自此始己丑詔夏國嵗遣首領進奉其引伴押伴自今選練習邊事人庚寅西上閤門使惠州刺史劉兼濟知雄州先是邊民避罪或亡入契丹契丹輙納之守将畏事不敢詰兼濟悉移檄責還己亥詔河北安撫轉運使知博州蔡挺與入内都知張惟吉同議六塔河利害以聞時郭固雖已塞而水勢猶壅議者議開六塔河以分其勢故命惟吉等按視之初井淵為賊所執挺言宜如漢喬元不以其子故遂緩捕賊朝議從之時河北多盜挺以選知博州申飭諸縣嚴伍法訪得嘗為盜藏者數人貸其宿負補為吏使察知諸偷所在每發必得之且言均博平聊城兩縣税嵗増鉅萬田况為三司使上其法行之諸路然大抵増税百姓苦之均税事宋史削去今附見當考庚子蠲湖州民所貸官米四萬斛入内内侍省言近来諸處多将無例事件乞本省差使臣𫝊宣竊恐援例請陳紊亂詔條乞自今並送所轄去處令檢㑹條例施行本省更不差使臣𫝊宣從之此據㑹要二月事今附月末三月丁未兵部員外郎天章閣待制知諌院包拯為龍圖閣學士河北都轉運使拯在諌院踰二年數論斥大臣權倖請罷一切内降曲恩又列上唐魏鄭公三䟽請置座右以為龜鑑别條七事一曰陛下天縱寛仁容納羣下而憸險之臣肆矯妄飾無根之説誣䧟善良使坐受排斥不得自辨夫隂姦得計則忠義之臣懼讒恐禍不敢當事儻有急猝則朝廷所倚何人願陛下發神明之斷如察見厚誣亟付有司研覈其實使是非較然則忠臣可以竭節圖効矣二曰比有指臣下之朋黨者其間奮不顧身奨善嫉惡者則被巧詆進一良士必曰朋黨相濟退一庸才亦曰朋黨所嫉使正人結舌不敢公言是非此為國之大患也夫聖明在上安有朋黨朋黨之弊起於衰闇漢之黨錮始於安帝極於桓靈唐之朋黨起於穆宗甚於文宗武宗以陛下勵精圖治豈比漢唐衰闇之際乎斯乃臣下務相傾軋以快其志不顧國事者也陛下循名察實因迹照心毋以朋黨為疑則君子小人可辨矣三曰頃嵗大臣專政忌才有所開建則謂之沽激是以莫敢自効或不顧時忌指事陳説則百計阻撓訖不得施夫在位雖衆志於國家之急者甚鮮幸有一焉又脅於沽激之説是則因循懦黙者為得計志士仁人終無以為也此任事之臣圖私醜正豈陛下之心哉願收納公議别白否臧勿以沽激為猜則人得盡其心矣四曰議者謂陛下頗主先入之説夫朝廷之事顧理道如何不繫説之先後也必若先入者為是則害賢牟利之臣隂中厯詆惟恐居後亂天下邪正掩陛下聰明願聽受之際但顧事之是非裁之以義勿甘先入之説則情偽明矣五曰比者所設科禁動有防疑闕一御史湏舉二員奏俟親選又限以中外及嘗為二府論薦者皆不得預輔臣惟旬休見客若百官廵㕔白事臺諫官私謁刑法官接見雪罪敘勞之人率有常禁臣謂皆非帝王推誠待下之道也陛下方将擬迹堯舜豈如漢武雄猜多忌哉盖有不識大體之臣過防謬論上誤聖徳臣恐書之史册取譏萬世願革近制推大信於羣下朝廷政事一法景祐之初則盡善矣六曰比年災變數見蟲蝗水旱所被甚廣陛下焦勞求理恐一物失所聖心若此豈不能弭災沴和隂陽哉此殆執政不能同寅協恭以救時弊陛下亦或有所間阻不能委任責成故致此也方今流民頗衆帑廩空虛官濫兵驕西夏强横不幸洊饑加以冦盜在位之臣誰可倚者陛下何不以事觀之孰能盡心思天下之弊孰能出力當天下之責果得其人則宜主張而委任之其持禄取容妬賢妨能以為身計者速罷免之毋俾久塞要路化危為安易於反掌儻失此時而不亟為禍變一發雖欲有為不可得矣七曰近嵗臣下竄逐或以無辜或因小過或為隂邪排䧟或由權要憎嫉吹毛洗垢以求疵瑕刑網密張罪罟横冐夫匹婦含怨亢陽累年匹夫懷憤飛霜下擊彼非辜竄逐之臣氣感天地精貫日月詎止匹夫匹婦之為乎願陛下躬閲謫籍察其有才行功實而無大過者或與牽復或加寵擢則聖造洪覆與天同徳譛䧟之風不敢肆矣䟽奏多見采納拯所陳七事據正史今實録乃於吳奎𫝊載此盖誤也朱本已削去然亦不能辨其非奎豈與拯同在諌省時論列故墨本并載之今不取拯前此嘗建議罷河北屯兵分之河南兖鄆齊濮曹濟諸州遇警即發且無後期不及之患如謂屯兵不可遽减則訓練義勇以壮邊備雖小給餱糧每嵗不當屯兵一月之費用一州賦可給義勇十八萬朝廷難之於是復奏曰拯本𫝊云拯前此嘗建議無事時請徙兵内地不報至是復請云云事卒不行按拯徙兵議元年亦略行非不報也至欲以義勇代戍兵則其事竟寝本𫝊并二事為一事故與實録不合今略加刪潤仍兩出之訓練義勇代戍兵已具元年三月都漕時今所上奏仍具録之於後臣竊見天下之患在乎三路而河朔為甚冗兵耗於上公用蠧於下内則致帑廩空竭外則致生靈困敝臣前後累曽論列乞那移兵馬於河南州軍及罷諸處公用回易尋委逐路安撫轉運司相度終未見果决施行况北界請和四十餘年嵗遺金帛數十萬者是欲寛國用而紓民力爾方今邊鄙無事正是保國息民之時而屯兵益衆用度益廣每年河北便糴糧斛三四百萬石約支見錢四五百萬貫僅有三二年之備雖朝廷竭力應副亦所不逮日甚一日臣恐數嵗之後必有不可救之患至如寳元已前天下無事財貨充足一旦昊賊猖獗調發旁午公私窘絶迄今未復以今事勢較之徃日則不侔甚矣萬一或有警急何以取濟且邊陲者四肢也河朔者心腹也幸而外無邊陲之虞河朔塗炭如此是防手足未然之患而自潰其心腹也則朝廷安可不深慮而務救之之䇿乎若上下協心更張措置如反掌之易而有泰山之安又何憚而不為哉欲望宣諭兩府執政大臣應沿邊及近裏州軍兵馬除合留防守外其屯駐駐泊諸軍悉令歸營就糧諸軍分屯於河南諸州率三年一代遇有邊事即時起發不旬日可到也其逐州公用錢除沿邊及人使路分州軍量與増添外諸路一切禁止並不得回易則國用民力漸可完復惟陛下務念元元斷在必行若更令逐路相度則互執所見益無涯矣分屯事訖不行諸州以公用錢回易遂罷居數月拯徙為髙陽關路安撫使因籍一路吏民積嵗所負公錢十餘萬悉除之徙知瀛州在七月戊申今并書戊申權知開封府龍圖閣直學士起居舍人李絢同提㸃在京諸司庫務絢治有能名然喜飲酒晨朝奏事酒未解帝曰開封事劇豈可酖於酒耶改命兵部員外郎知制誥何中立權發遣開封府事己酉詔禮部貢舉庚戌置廣惠二州提舉捉賊一員録江津尉王育才子涇為太廟齋郎育才捕盜鬬死故也辛亥鄜延經畧使狄青言延州保信軍弓箭手押官以上皆給身分田欲自十将至指揮使量其家口數更等第益以閒田從之壬子觀文殿大學士吏部尚書知陳州陳執中為集慶節度使同平章事判大名府武勝節度使同平章事判大名府程琳為鎮安節度使赴本鎮尋詔琳出入如見任二府儀琳前後守魏十年持重不擾嘗度要害繕壁壘增守禦備植木數萬曰異時樓櫓之具可以不出於民矣人愛之為立生祠出入如二府儀乃四月辛巳今并書甲寅詔䖍州知州提舉南安軍雄州兵甲公事自今盜賊屛息政治有聞嵗滿當旌擢之其吉撫饒信宣歙等知州及吉州吉水歙州婺源饒州浮梁樂平洪州分寧臨江軍新喻等知縣自今令審官院並不以次選人任内無遺闕亦旌擢之時韓絳等自淮南安撫還言江西人繁賦重州縣長吏多不得人故以難治之地特著此條慶厯初王琪等增江淮兩浙荆湖六路糶鹽錢及絳還自淮南言鹽估髙民無以食既而諸路皆以為言於是琪等所増錢皆罷復故此據本志附見不得其時禁鄜延路漢户以田産與蕃官賣買者丙辰蠲江南東西路民所貸種糧初上謂輔臣曰頃江南嵗饑貸種糧數十萬斛且屢經倚閣而轉運司督索不已如聞民貧不能盡償非遣使安撫逺方無由上達其蠲之己未詔大理寺舊制大事限三十日中事限二十日小事限十日審刑院遞减半今炎暍之際恐待報淹久起四月盡六月案内有禁囚者減限之半其益梓利䕫廣南東西福建荆湖等州軍即依急案例斷奏卒酉御崇政殿録繫囚壬戍出内藏庫絹十萬下三司以助軍費至和元年八月可考癸亥詔天下請南郊軍賞湏前一年九月内發衙前上京限次年三月輦至逐州軍先是外處迫郊日始差人請軍賞折支既不及事又急遽多至破逃河北河東尤苦其役故條約之丙寅河東陜西都部署司言郭諮所進獨轅衝陣無敵流星弩可以備軍之用詔弓弩院如様製之諮獻弩在皇祐元年三月尋以諮為鄜延路鈐轄給所製弩五百募土兵教之既成經略使夏安期言甚便詔置獨轅弩軍此據本志聫書諮為鄜延鈐轄乃至和二年十月丁夘遣官祈雨戊辰上謂輔臣曰開封府奏婦人阿齊為祈雨斷右臂恐惑衆不可以留京師其令徙居曹州本志以阿齊事繫之慶厯四年今從實録全州團練副使監郴税唐介為秘書丞辛未詔雜買務自今凡官禁所市物皆給實直其非所闕者毋得市初上謂輔臣曰國朝監唐世宫市之患特置此務以京朝官内侍叅主之且防擾人近嵗物非所急者一切收市其擾人亦甚矣故降是詔夏四月戊寅禁内宿臣僚聚㑹先是内出欹器一陳於邇英閣御坐前諭丁度等曰朕思古欹器之法試令工人製之以示卿等命以水注之中則正滿則覆虛則欹率如家語荀卿淮南之説其制度精好度等列侍觀之帝曰日中則昃月盈則虧朕欲以中正臨天下當與列辟共守此道度拜曰臣等亦願無傾滿以事陛下因言太宗常作此器真宗亦嘗著論庚辰帝製後述以賜度等詔去冬修河兵夫逃亡及死者甚衆盖官吏不能撫存自今宜㑹其死亡數而加罰之河北都轉運使右諫議大夫天章閣待制李柬之為龍圖閣直學士知秦州金部郎中邵飾為淮南江浙荆湖制置發運使命下未赴皆為御史所弹壬午改命龍圖閣直學士吏部郎中知徐州孫沔代柬之兵部員外郎李徽之代飾以柬之知澶州飾知潭州丙戍契丹國母遣順義節度使右監門衛上将軍蕭昌右諫議大夫劉嗣復契丹遣彰信節度使蕭昱益州防禦使劉士方来賀乾元節其國書始去國號而稱南北朝且言書稱大宋大契丹非兄弟之義帝召二府議之叅知政事梁適曰宋之為宋受之於天不可改契丹亦其國名自古豈有無名之國又下兩制臺諌官議皆以講和以来國書有定式不可輙許乃詔學士院荅契丹書仍舊稱大宋大契丹其後契丹復有書亦稱契丹如故詔學士院乃辛丑日令并書初契丹使来知制誥韓綜為館伴契丹使欲復書如其國但稱南北朝綜謂曰自古未有建國而無號者契丹使慙遂不復言其後契丹使来朝廷擇館伴者綜時已卒帝曰孰有如韓綜者乎此事附見初儂智髙貢方物求内屬朝廷拒之後復貢金函書以請知邕州陳珙上聞亦不報智髙既不得請又與交趾為仇且擅廣源山澤之利遂招納亡命數出敝衣易榖食紿言峒中饑部落離㪚邕州信其㣲弱不設備也乃與廣州進士黄瑋黄師宓及其黨儂建侯儂志中等案宋史作儂志忠日夜謀入冦一夕焚其巢穴紿其衆曰平生積聚今為天火所災無以為生計窮矣當拔邕州據廣州以自王否則兵死是月率衆五千沿鬱江東下攻破横山寨寨主右侍禁張日新邕州都廵檢左班殿直髙士安欽横州同廵檢右班殿直吳香死之詔自今技術官勿除遥郡㑹要皇祐四年四月事當考五月乙巳朔儂智髙破邕州執知州北作坊使陳珙通判殿中丞王乾祐廣西都監六宅使張立初賊圍城珙令乾祐守来逺門權都監三班奉職李肅守大安門指使武吉守朝天門張立自賓州来援既入珙犒軍城上酒行而城破珙立乾祐及節度推官陳輔堯觀察推官唐鑑司户叅軍孔宗旦皆被執兵死者千餘人智髙閲軍資庫得所上金函怒謂珙曰我請内屬求一官以統攝諸部汝不以聞何也珙對嘗奏不報索奏草不獲遂扶珙出珙病目不能視惶恐呼萬嵗求自効不聽并立乾祐輔堯鑑宗旦害之立臨刑大罵不為屈逾月得其尸如生而李肅武吉武緣令梅㣲之支使蘓從與賊黄師宓有舊獲免當智髙未反時邕州有白氣出庭中江水溢宗旦以為兵象度智髙必反以書告珙珙不聽宗旦言不已珙怒詆之曰司户狂耶及智髙破横山寨即載其親桂州曰吾有官守不得去無為俱死也既而賊執宗旦欲任以事宗旦叱賊且大罵遂被害宗旦魯人始官京東與李道徐程尚同等四人為監司耳目號為四􅀈人多惡之然其立節乃如此楊安國𫝊四􅀈作四瞪已見慶厯四年今兩存之智髙既得邕州即偽建大南國僣號仁惠皇帝改年啟厯赦境内師宓以下皆稱中國官名㑹要云改年端懿今從正史孔宗旦𫝊云及智髙破横州即載其親桂州按五月一日邕州破宗旦被殺後八日乃破横州傳誤也當作横山寨盖因曽鞏書亦稱横山寨不云横州不知何以如此誤今改之丙午太常丞致仕代淵為祠部員外郎淵導江人性簡潔事親以孝聞嘗舉進士甲科得清水主簿歎曰禄不及親何所為即還家教授坐席嘗滿王拱辰安撫兩川遺書欲起之託疾不徃見楊日嚴知益州又薦之遂致仕謝絶諸生著周易㫖要老佛雜説十篇於是翰林學士田况上其書詔優加兩官淵晚年日菜食巾褐山水間自號虛一子長吏嵗時致問澹然與對略不及私初樞宻使鎮海節度使兼侍中王貽永以疾求罷手詔撫諭遣太醫診視車駕臨問頒尚方珍藥及面取糜粥食之貽永自言寵禄過盛願罷樞筦解使相印還第帝冀其愈也丁未聽貽永罷侍中改彰信節度使同平章事樞宻使如故戊申録江津主簿尹林宗子君平為太廟齋郎以林宗捕盜鬬死也庚戍詔國子監直講自今選通經有行實年四十已上者為之時侍御史梁蒨言近臣薦楊忱為學官而忱年少輕肆不可用故降是詔忱偕子也壬子詔諸路掌機宜官自今代還止與近地差遣當入近地者與優便初陜西宿兵邊臣領安撫使以其子弟或親舊掌機宜及府罷率陳請升陟故裁約之癸丑儂智髙入横州知州殿中丞張仲回監押東頭供奉官王日用棄城丙辰入貴州按原本作費州考宋史地理志廣南西路無費州乃貴字之誤今改正知州秘書丞李琚棄城庚申入龔州知州殿中丞張序棄城辛酉入藤州又入梧州封州知藤州太子中舍李植知梧州秘書丞江鎡並棄城知封州太子中舍曹覲死之封州人未嘗知兵士卒才百人不任鬬又無城隍以守或勸覲避賊覲正色叱之曰吾守臣也有死而已敢言避賊者斬麾都監陳曄引兵迎擊賊封州令率鄉丁弓手繼進賊衆數百倍曄兵敗走鄉丁亦潰覲率從卒决戰不勝被執賊戒勿殺猝使拜且誘之曰從我得美官付以兵柄以女妻汝覲不肯拜且罵曰人臣惟北靣拜天子我豈從爾茍生耶幸速殺我賊猶惜不殺徙置舟申覲不食者兩日探懐中印章授其從卒曰我且死若求間道以此上官賊知其無降意害之至死罵賊聲不絶投其尸於江時年三十五壬戍智髙入康州知州太子右贊善大夫趙師旦監押右班殿直馬貴死之師旦稹從子也賊既破邕州順流東下師旦使人覘賊還報曰諸州守皆棄城走矣師旦叱曰汝亦欲吾走耶乃大索得諜者三人斬以徇而賊已薄城下師旦止有兵三百開門迎戰殺數十人㑹暮賊稍却師旦語其妻取州印佩之使負其子以匿曰明日賊必大至吾知不敵然不可以去爾留死無益也遂與貴部士卒固守城召貴食貴不能食師旦獨飽如平時至夜貴卧不安席師旦即入卧内大鼾遲明賊攻城愈急左右請少避師旦曰戰死與戮死何如衆皆曰願為國家死至城破無一人逃者矢盡與貴俱還據堂而坐智髙麾兵鼓譟爭入脅之師旦大罵曰餓獠朝廷負若何事乃敢反耶天子發一校兵汝無遺類矣智髙怒并貴害之癸亥智髙入端州知州太常博士丁寳臣棄城寳臣晉陵人也歐陽修王安石作寳臣墓碑皆稱寳臣嘗出戰有所斬捕卒不勝乃去蓋飾説也今不取乙丑幸慈孝寺朝謁章獻太后神御殿以嘗有盜神御物故也丙寅儂智髙圍廣州前二日有告急者知州仲簡以為妄囚之下令曰有言賊至者斬以故民不為備及賊至始令民入城民爭以金貝遺閽者求先入踐死者甚衆餘皆附賊賊勢益張丁夘詔制置發運使司六路轉運仍舊以公牒徃來先是許元欲廣收羨餘以媚三司憚諸路不從請以六路轉運司自𨽻皆令具状申發運司唐詢既自江西徙福建他轉運使相繼論列於朝卒罷之資政殿學士户部侍郎范仲淹以疾求潁州詔自青州徙行至徐州卒贈兵部尚書諡曰文正初仲淹病帝嘗遣使賜藥存問既卒嗟悼者久之又遣使就問其家既𦵏帝親其碑曰襃賢之碑仲淹内剛外和性至孝以母在時方貧其後雖貴非賓客不重肉妻子衣食僅能自充而好施予置義荘里中以贍宗屬泛愛樂善士人多出其門下雖里巷之人皆能道其名字死之日四方聞者莫不嗟惜為政忠厚所至有恩邠慶二州之民與屬羌皆畫像立生祠及其卒也羌酋數百人為舉哀於佛寺號之如父齋三日而去壬申詔奏補殿侍非父祖死事者年十六始廪給之命崇儀使知韶州陳曙領兵討儂智髙癸酉韶州永通監卒殺知監都官員外郎鄧驤屠其家權都監右侍禁韋貴捕斬之即命貴為都監加閤門祇候朝廷初聞儂智髙反詔進奏院不得輙報知制誥吕溱言邊防有警急一方有盜賊宜令諸路聞之共得為備今欲人不知非計也六月乙亥起復前衛尉卿余靖為秘書監知潭州案宋史作湖南安撫使知潭州前屯田員外郎直史館楊畋為廣南西路體量安撫提舉經制賊盜靖及畋各居父喪先是靖與知韶州者結輯農兵完葺堡障共為守禦計朝廷聞而嘉之又以畋素習蠻事故有是命既即喪次命靖後七日改為廣南西路安撫使知桂州後十日畋召至都門外辭以喪服不敢見上賜以所服御巾入對便殿即日加起居舍人同知諫院而遣之靖知桂州日庚辰畋除起居舍人知諌院日丙戌今并書徙知齊州太常博士王綽提㸃江南西路刑獄庚辰命同提㸃廣南東路刑獄内殿崇班閤門祇候李樞與知桂州崇儀使陳曙同捉殺蠻賊仍令廣南東路轉運鈐轄司發兵應援之尋以曙為廣西路鈐轄曙為廣西鈐轄日壬午今并書辛巳如京使資州刺史張忠為廣南東路都監甲申徙知廣州兵部郎中天章閣待制仲簡知荆南朝廷但以簡能守城故有是命不知廣人怨之深也是日廣端都廵檢髙士堯擊儂智髙於市舶亭為賊所敗乙酉祠部員外郎直秘閣判吏部南曹范鎮上書曰陛下制樂以事天地宗廟以揚祖宗之休兹盛徳之事也然自下詔以来及今三年有司之論紛然未决蓋由不議其本而争其末也竊惟樂者和氣也發和氣者聲音也聲音之生生於無形故古人以有形之物傳其法俾後人叅考之然後無形之聲音得而和氣可導也有形者秬黍也律也尺也籥也鬴也斛也算數也權衡也鐘也磬也然十者必相合而不相戾然後為得今皆相戾而不合則為非是矣有形之物非是而欲求無形之聲音和安可得哉謹條十者非是之驗惟裁擇焉按詩誕降嘉種維和維秠誕降者天降之也許叔重云秬一稃二米又云一秬二米後漢任城縣産秬黍三斛八斗實皆二米史官載之以為嘉瑞又古人以秬黍為酒者謂之秬鬯宗廟降神惟用一尊諸侯有功惟賜一卣以明天降之物世不常有而可貴也今秬黍取之民間者動至數斛秠皆一米河東之人謂之黒􅔋設有真黍以為取數至多不敢送官此秬黍為非是一也又按先孺皆言律空徑三分圍九分長九十分容千二百黍積實八百一十分今律空徑三分四釐六毫圍十分三釐八毫是圍九分外大其一分三釐八毫而後容千二百黍除其圍廣則其長正七十六分二釐矣説者謂四釐六毫為方分古者以竹為律竹形本圓而今以方分置算此律之為非是二也又按漢書分寸尺丈引本起黄鍾之長又云九十分黄鍾之長者據千二百黍而言也千二百黍施於量則曰黄鍾之龠施於權衡則曰黄鍾之重施於尺則曰黄鍾之長今遺千二百之數而以百黍為尺又不起於黄鍾此尺之為非是三也又按漢書言龠其状似爵爵謂爵琖其體正圓故龠當圓徑九分深十分容千二百黍積實八百一十分與律分正同今龠乃方一寸深八寸一釐容千二百黍是亦以方分置算也此龠之非是四也又按周禮鬴法方尺圓其外深尺容六斗四升方尺者八寸之尺也深尺者十寸之尺也何以知尺有八寸十寸之别按周禮璧羡度尺好三寸以為尺璧羡之制長十寸廣八寸同謂之度尺既以為尺則八寸十寸俱為尺矣又王制云古者以周尺八尺為步今以周尺六尺四寸為步八尺者八寸之尺也六尺四寸者十寸之尺也同謂之周者是周用八寸十寸尺明矣故知以八寸尺為鬴之方十寸尺為鬴之深而容六斗四升千二百八十龠也積實一百三萬六千八百分今鬴方尺積千寸此鬴之非是五也又按漢書斛法方尺圓其外容十斗旁有庣焉當隋時漢斛尚在故隋書載其銘曰律嘉量斛方尺圓其外庣旁九釐五毫羃百六十二寸深尺容一斛今斛方尺深一尺六寸二分此斛之非是六也又按算法圓分謂之徑圍方分謂之方斜所謂徑三圍九方五斜七是也今圓方而以方法算之此算數非是七也又按權衡者起千二百黍而立法也周之鬴其重一鈞聲中黄鍾鬴斛之制有容受有尺寸又取其輕重者欲見其薄厚之法以考其聲也今黍之輕重未真此權衡為非是八也又按鳬氏為鐘大鐘十分其鼓間以其一為之厚小鐘十分其鉦間以其一為之厚今無大小薄厚而一以黄鍾為率此鐘之非是九也又按磬氏為磬倨句一矩有半其傅為一股為二鼓為三蓋各以其律之長短為法也今亦以黄鍾為率而無長短薄厚之别此磬之非是十也前此者皆有形之物也易見者也使其一不合則未可以為法况十者之皆相戾乎臣固知無形之聲音不可得而和也請以臣章下有司問黍之二米與一米孰是律之空徑三分與三分四釐六毫孰是律之起尺與尺之起律孰是龠之圓制與方制孰是鬴之方尺圓其外深尺與方尺孰是斛之方尺圓其外庣旁九釐五毫與方尺深尺六寸二分孰是算數之以圓分與方分孰是權衡之重以二米秬黍與一米孰是鐘磬依古法有大小輕重長短薄厚而中律不依古法而中律孰是孰不是定然後制龠合升斗鬴斛以校其容受容受合然後下詔以求真黍真黍至然後可以為量為鐘磬量於鐘磬合於律然後可以為樂也今尺律本末未定而詳定修制二局工作之費無慮千萬計矣此議者所以云云也然議者不言有司論議依違不决而顧謂作樂為過舉又言當今宜先政令而禮樂非所急此臣之所尤惑也儻使有司合禮樂之論是其所是非其所非陛下親臨决之顧於政令不已大乎昔漢儒議鹽鐵後世𫝊鹽鐡論今方定雅樂以求廢墜之法而有司論議不著盛徳之事後世将何考焉願令有司人人各以經史論議條上合為一書則孰敢不自竭盡以副陛下之意如以臣議為然伏請權罷詳定修制二局俟真黍至然後為樂則必得至當而無事於浮費也詔送詳定所鎮説自謂得古法然集賢校理司馬光數與之論難以為弗合世鮮鍾律之學卒莫辨其是非焉鎮説自謂得古法以下並據兩朝律厯志丙戌知越州給事中魏瓘為工部侍郎集賢院學士知廣州初命工部郎中王逵為太常少卿直昭文館代仲簡而言者以今嶺外方用兵逵非撫禦才罷之遂改命瓘自儂智髙反所過輙破獨廣州城守不下朝廷追論瓘有築城功既加爵秩又給禁卒五千使徃且聴以便宜從事洛苑副使兼閤門通事舍人曹脩為廣南西路同體量安撫經制盜賊脩琮子也詔諸州軍理正押司録事已代而令輸錢免役者以違制論先是王逵為荆湖南路轉運使率民輸錢免役得緡錢三十萬進為羡餘朝廷既降詔奨諭由是諸路競為掊克欲以市恩至破產不能償所負朝廷知其弊故條約之此據實録本志但稱荆湖慶厯元年八月自湖南漕責䖍州五年三月為江西漕尋改湖北八年二月自湖北改河東不知本志所稱荆湖是南路或北路也詔學士院試人據所試文字依公考定不得假借優等㑹要四年六月十三日事丁亥太子太師致仕王徳用為河陽三城節度使同平章事判鄭州時将相王姓者數人而閭閻婦女小免皆號徳用黒王相公徳用雖致仕乾元節上壽預班廷中契丹使語譯者曰黒王相公乃復起耶帝聞之遂更付以方鎮彰信節度使知延州狄青為樞密副使御史中丞王舉正言青出兵伍為執政本朝所無恐四方輕朝廷左司諫賈黯言國初武臣宿将扶建大業平定列國有忠勲者不可勝數然未有起兵伍登帷幄者今其不可有四外蕃聞之有輕中國心不可一也小人無知聞風傾動翕然嚮之撼搖人心不可二也不守祖宗之成規而自比五季衰亂之政不可三也青雖材勇未聞有破敵功失駕御之術乖勸賞之法不可四也御史韓贄亦以為言皆不聴時青面湼猶存帝嘗敕青傅藥除字青指其面曰陛下擢臣以功不問門地閥閱臣所以有今日由此湼爾願留此以勸軍中不敢奉詔戊子知宜州文思副使宋克隆為禮賓使知邕州仍詔克隆招輯亡㪚繕完城池以慰安人民己丑詔知廣州桂州自今並帯經略安撫使庚寅廣惠等州都大提舉捉賊西京左藏庫副使武日宣惠州廵檢左侍禁魏承憲擊儂智髙於廣州城下死之壬辰秘書丞監郴州税唐介為主客員外郎通判潭州甲午龍圖閣直學士起居舍人李絢知蘓州鹽鐵判官祠部員外郎秘閣校理石楊休知宿州初絢為開封府楊休為推官有盜慈孝寺章獻皇太后神御服器者既就縶以屬吏榜掠不得其情輙釋去及何中立代絢知府事人執以來中立曰此真盜也窮治之卒服絢楊休皆坐誤縱盜及於責丙申北作坊使忠州刺史知坊州蒋偕為官苑使韶州團練使廣南東路鈐轄詔廣南東西路經蠻賊蹂踐處夏税未得起催禮賓副使王正倫權廣南東路鈐轄己亥置廣南東西路湖南江西轉運判官各一員庚子知宿州司門員外郎朱壽隆提㸃廣南西路刑獄朝廷懲嶺表無備命完城貴州守者虐用其人人不堪命壽隆馳至州械守送獄奏黜之州人為立生祠壽隆台符子也
