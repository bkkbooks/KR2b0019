body:
  text: 續資治通鑑長編巻一百二十一宋李燾撰仁宗寳元元年春正月癸夘元昊請遣人供佛五臺山乞令使臣引䕶并給舘劵從之元昊實欲窺河東道路故也刑部貟外郎直史舘同知禮院宋祁上疏曰臣伏見頃嵗以來災眚數見依類託寓異占同符天本視法而尊乃有躔離流薄之變地當安固而靜乃有都國震動之占陛下奉承郊丘嵗豐月潔當䝉介福翻致大異何哉得非事有召姦法有階隙天於宋室諄諄存顧先幾豫慮以啟聖心欲陛下據易圖難縁㣲警著奮揚剛徳固執主威猒銷未萌以光丕業也臣伏讀前史五行志以騐於今累威重譴不可不察若乃羣星流散則民人蕩析之象也月行黄道地震州邑則邉戎窺間臣下擅恣后妃將盛年榖阻饑之兆也去年火焚興國寺浮屠延燔藝祖神御殿已而盗壞宗廟釦噐者再則神不昭格之意也自昔災異之發逺者十數年近者三四年随方輙應類無虚已陛下何不暫攄清慮推求其端方今典刑設張上下禔穆而臣便論危事必難取信然陛下試一念之假有蕩析以何策固安假有饑空以何理賑救脫致窺間可任之将謂誰儻令擅恣可防之姦有幾災異不騐國之福也茍其遂騐則陛下禦之之慮得不素具於彀中哉然請先言其要臣聞君以操柄為重臣以奉命為㳟柄捨之則重者反輕命竊之則恭者更僭伏惟陛下騐爵賞之典刑罰之權雖覽群言一决宸慮無委成假借以開貴近牽制之私若夫後宫戚里祈恩丐賞者日月不乏陛下且當斷而不聼以示至公内省黄門給事左右亦宜數加訓敇使思不出位此皆助陽抑隂之術也臣聞伯禹三王之長逄辜引慝宣王成周之良遇患側身故能感徹神祗収還威怒囘沴氣為太和化已衰為中興陛下覽照古今至詳至熟今變眚日著中外暴聞而罪已之問不形於詔書思患之謀不留於詢逮委逺天戒虚而未答踰時越月羣下黙然間者但引緇黄晨齋夕唄修不經之細祀塞可懼之大變人且未信天胡可欺臣誠至愚竊恐銷伏之間未為得計也伏望陛下不以災之未應遂為宴安不以嵗之屢豐便忘荒饉普詔百職各貢所懐庶幾天下條貫粲然先見惟陛下留神省閲甲辰雷丙午以災異屢見下詔求直言曰朕躬之闕遺執事之阿枉政教未臻於理刑獄靡協於中在位壅蔽之人具官貪墨之吏仰諫官御史搢紳百僚宻疏以陳悉心無隠限半月内實封進納朕當親覽靡及有司擇善而行固非虚飾庚戌命翰林學士丁度等權知禮部貢舉乙夘大理評事監在京店宅務蘇舜欽詣匭通疏曰臣聞河東地大震裂涌水壊屋廬城堞殺民畜幾十萬歴旬不止始聞惶駭疑惑竊思自編策所紀前代衰㣲䘮亂之世亦未嘗有此大變今四聖接統内外平寜戎夷交歡兵革偃息固與夫衰㣲䘮亂之世異何災變之作返過之邪且妖祥之興神實尸之各以類告未嘗妄也天人之應古今之鑒大可恐懼豈王者安於逸豫信任近狎而不省政事乎廟堂之上有非才冐禄竊弄威福而侵上事者乎又豈施設之政有不便於民者乎深宫之中有隂教不謹以媚道進者乎西北羌夷有背盟犯順之心乎臣從逺方來不知近事心疑而口不敢道也所怪者朝廷見此大異不修闕政以厭天戒安民心黙然不恤如無事之時諫官御史不聞進牘鋪白災害之端以開上心然民情洶洶聚首横議咸有憂悸之色臣以世受君禄身齒國命㴠濡惠澤以長此軀目覿心思驚怛流汗欲盡吐肝胆以拜封奏又見范仲淹以剛直忤姦臣言不用而身竄謫降詔天下不許越職言事臣不避權右必恐横罹中傷無補於國因自悲嗟不知所措既而孟春之初雷電暴作臣以為國家闕失衆臣莫敢為陛下言者惟天丁寜以告陛下陛下果能霈發明詔許羣臣皆得獻言臣初聞之踴躍欣抃旬日聞頗有言事者其間豈無切中時病而未聞朝廷舉而行之是亦収虛言而不根實效也臣聞惟誠可以應天惟實可以安民今應天不以誠安民不以實徒布空文增人太息爾將何以謝神靈而救弊亂也豈大臣䝉塞天聽不為陛下行之豈言事者迂濶無所取不足行也臣竊見綱紀隳壊政化闕失其事甚衆不可槩舉謹條大者二事以聞一曰正心夫治國如治家治家者先修身修已者先正心心正則神明集而萬務理今民間傳陛下比年稍邇俳優賤人燕樂踰節賜予過度燕樂踰節則蕩賜子過度則侈蕩則政事不親侈則用度不足臣竊觀國史見祖宗日日視朝旰昃方罷猶坐於後苑門有白事者立得召對委曲詢訪小善必納眞宗末年不豫始間日視事今陛下春秋鼎盛實宵衣旰食求治之秋而乃隔日御殿此政事不親也又府庫匱竭民鮮蓋藏誅歛科率殆無虛日三司計度經費二十倍於祖宗時此用度不足也政事不親用度不足誠國大憂臣望陛下修已以御人洗心以鑒物勤聽斷舍燕安放棄優諧近習之纎人親近剛明鯁正之良士因此災變以思永圖則天下幸甚二曰擇賢夫明主勞於求賢而逸於任使然盈庭之士不須盡擇在擇一二輔臣及御史諫官而已陛下用人尚未遴擇昨王随自吏部侍郎平章事超越十資復為上相此乃非常之恩必待非常之才而随虚庸邪謟非輔相之器降麻之後物論沸騰故疾纒其身災仍於國此亦天意愛惜我朝陛下鑒之哉且石中立頃在朝行以詼諧自任士人或有宴集必置席間聽其語言以資笑噱今處之近輔不聞嘉謀物望甚輕人情所忽使災害屢降而朝廷不尊盖近臣多非才者陛下左右尚如此天下官吏可知也實恐匈奴輕笑中國宜即行罷免别選賢才又張觀為御史中丞髙若訥為司諫二人者皆登髙第頗以文詞進而温和軟懦無剛鯁敢言之氣斯皆執政引㧞建置欲其緘黙不敢舉揚其私時有所言則必暗相闗説旁人窺之甚可笑也故御史諫官之任臣欲陛下親擇之不令出執政門下臺諫官既得其人則近臣不敢為過乃馭下之策也臣以謂陛下身既勤儉輔弼臺諫又皆得人則天下何憂不治災異何由而生惟陛下少留意焉舜欽本傳稱康定中河東地震舜欽詣匭上疏蓋誤也康定中則王随等罷久矣今據舜欽集見之此年正月十八日丙辰詔曰比者善氣勿效隂𤯝屢見地大震動雷發不時推原天譴之所由豈吏為貪弛苛虐使狴牢淹繫而賦調繁急歟或受賕鬻直下情壅蔽以虧和致戾歟轉運使提㸃刑獄其案所部吏以聞宋祁又上䟽曰臣聞賞罰操决天子之權也奏請可否以佐上操决則百度乂寜一人尊強竊見陛下臨視庶政深執謙徳不自先斷専委大臣使大臣人人如臯陶家家為后稷尚且不可况有託國威而肆忿寄公爵以植恩者哉臣請粗陳其要且如陛下自欲有所㧞擢大臣以為不可陛下從而罷之又如自欲有所黜去大臣以為不可陛下從而任之如此則權常在臣政不在君昭然可見矣陛下何所忌憚而不累加裁詰遂使中材之人料時之如此欲自結於朝者還附於權黨欲自徇於公者反入於私門威柄寖移人心何繫此將來可慮一也臣聞忠臣之事君造膝而言詭辭而出所以啟心防患也陛下亦宜隠袐其語保全其人儻露主名則為所譏刺者皆切齒而思報矣興誹造謗不退不止一旦罹患而後來者傳以為戒皆茍容偷合背公入黨則陛下雖有盈庭之士朱紫雜襲誰肯與權貴立敵進言而取禍哉此無異挈仇以授姦人自閉其耳目也臣比見兹事以騐於前伏望深思大易失臣之義無襲春秋陽處父之枉此將來可慮二也臣伏惟陛下春秋鼎盛皇嗣未立後宫所御當魚貫序進廣求螽斯之福伏望豫示敇誡詔判貴賤使上下有制不相踰越讒謁毁間明垂防禁數詔后妃習知謙退和柔之懿無令僭妬得萌其中此將來可慮三也諫官御史本所以選進鯁亮震肅權綱為天子之耳目也今則不然有勢者其姦如山結舌不問無援者索疵吹毛飛文歴詆未及滿嵗已干宰司希兼職而求進秩矣如此則宰司有失諫官御史肯為陛下盡言乎臣故曰諫官御史由宰司之進㧞者非陛下之利也夫輕授重責難以得人但賞不罰難以肅下今若令居是官者終嵗不言及言而不當坐不任職退挾持私意有所囬慝而坐故縱誅不畏强禦議論嚴正者陛下自意擢之無令有司得與此亦救阿黨之一也傳曰正其本萬事理又曰人存則政舉人亡則政息苟使天子持柄於上羣臣事職於下如臣前所陳者大猷幾務將交修畢舉矣安有政未臻理刑靡協中乎至於海縣浩繁官不悉善或察亷無狀或貪冐公行或民窮無訴或事紛未治大且抵死小則逺官案章一下交手受械事輕人末曷足應天變而關國體乎要災異之發政教之本在朝廷君臣之間耳臣聞徒善不足為政徒法不足自行天之感物不為偽動今陛下惕然自反已降徳音羣臣將畢精竭慮随事納説必有可采伏望朝廷開許施行然臣尚有所慮者今臣下凖詔例得獻言言不深切則事不明白或恐有昧儀矩罔識禁忌論安危則便云泰山累卵指宴飲則直曰酒池肉林伏望陛下納汙含垢一切裁赦兼容博聽以取其長勿令有坐狂言而得罪者則聖徳愈光大矣庚申除并代忻州壓死民家去年秋稅甲子賜新知忻州禮賔副使髙繼元甲馬一匹上封者言自變茶法嵗輦京師銀絹易芻粟於河北配擾居民内虛府庫外困商旅非便丙辰命權御史中丞張觀侍御史程戡右司諫直集賢院韓琦與三司别議之丁夘比部員外郎師仲說致仕故事當與一子官上以仲說嘗知金州失入死罪特罷之直史舘蘇紳上疏曰星之麗天猶萬國之附王者下之畔上故星亦畔天精氣所感先示其象陛下既祗畏天戒則宜推原其本而預修其偹若生民之疾苦未復郡縣之刑辟未平者願推所以拯䘏之在位有背公懐私害直醜正相為比周不顧亷節者願思所以懲艾之據名藩専使領有因循亡效守邊防擁重兵有方略不聞者願議所以更置之西北諸戎久恃信好有强悍自恣獷驁慢上者願求所以伐其謀左右近習久處親信有狎侮不戒狃寵怙恩者願思所以杜其萌草澤庶士有負非常之才而上不知知而未用者願思所以觀其行盡其能凡此數者幸留聽而察焉天者陽之氣地者隂之體其有越隂之體侵陽之政則應以變動故書曰臣無有作威作福害於而家凶於而國是也今大異若此得非任事之臣踰常分乎朝廷事無大小委之政府至於黜陟之柄亦或得専夫一二大臣平居之日所宜辨論官才使陛下周知在位之能否及有除擬則可以随才而任用使進擢之人知恩出於上則威福不外分也今則不然每一官闕但閲其履歴附以比例而陛下無復有所更故競進之徒趨走權門經營㨗徑靡所不至是恩命未出於上而請託已行於下矣祖宗時擢用要官惟才是用臣下莫得而先知不牽制於一切故被擢之人咸思自厲此無他也講求之有素而大權不在於下也雷者天之號令所以開發萌芽辟除隂害萬物須雷而解須雨而潤惟人君崇寛大順春令則應節否則動於冬今方春而雷發聲天其或者欲陛下出號令以震動天下宜及於早而矯臣下舒緩之咎凡朝廷事無鉅細無内外取其先急者悉闗聖慮而振肅之不可緩也夫星變既有下畔上之象地震又有隂侵陽之證者天意若曰夷狄將有畔上之釁恐陛下未悟也又以震雷警之欲陛下先事為備則禍患消而福祥至矣直史舘葉清臣上䟽曰昔杜欽有言子為父隂臣為君隂妻為夫隂外國為中國隂臣以今日之事推之陛下嗣位十六載尚虚儲宫宗室諸㓜無所用事子之隂不能沴父也中宫柔順不奸外朝戚里族屬不及以政妻之隂不能沴夫也四夷讋服邊候不聳外國之隂不能沴中國也獨大臣秉政専制刑爵陛下馭臣之術未合治體臣謂此正臣之隂為沴爾陛下纉御之始母后臨朝天資仁孝推而弗有天下之人不以為過知陛下奉先志而尊母訓也明道以後政歸明辟進退輔弼廢置閹寺杜私謁禁斜封當此之時天下之人驩然傾心知陛下晦於昔而顯於今也然患在持之不久未能勵精庶政遂使招權之人日嘗月伺乗上寛仁自用於下陛下猶臨朝淵黙垂拱仰成事無大小有議皆可使輔相之臣竭忠無私皆如蕭曹房杜則可一有不及才或非倫則誤陛下事多矣臣聞王者之所以横制六合撫有萬民者在握刑賞之權不授人以柄而已故舉一善有爵禄之賜黜一惡有斧鉞之誅使人尊如天親如地仰其明如日月畏其威如雷霆今則不然有一進㧞則曰宰相某人之親也舊也嘗逰其門而善者也被一抑黜則曰宰相某人之嫌也隙也跡踈而不被其遇者也爵賞刑罰陛下所有也比及於人則天下之人族談囂然不曰自陛下出而曰由宰相得非臣隂之盛而易天地之序者乎此非一日之事也堅氷之漸其来久矣京房曰臣事雖正専必震使正而専猶且震况専而不正安得不凟隂陽之氣而致天地之變乎此地震之所由至也昔祖宗臨御親攬權綱進賢退不肖發在宸斷孜孜求治朝夕訪對孤臣下士皆得納忠小大之事無不知刑賞之行無不當今陛下昕旦視朝僅了常務未嘗講議大政考求得失晝日燕居深處穆清未甞延召多士諮諏未悟此陛下所以馭臣之闕而執事得以阿枉在位得以壅蔽也臣願陛下用天之髙明剛健法太祖之英武肅果太宗之神睿聦察先皇帝之精勤哲明然後官人以材如周文以法繩下如漢宣招諫遷善如文皇若此何懼災患之不消福慶之不臻哉校書郎張方平陳七事一曰宻機事二曰用威斷三曰廣言路四曰重圖任五曰正有司六曰信命令七曰示戒懼御史中丞張觀亦言承平日久政寛法慢用度漸侈風俗漸薄以致災異因上四事一曰知人二曰嚴禁三曰尚質四曰節用實録本紀四月並無求直言詔按張觀傳言正月詔求直言蘇紳傳云星流地震方春而雷詔求直言又韓琦家傳論宰相疏亦云陛下引咎詢求讜言而葉清臣傳又云清臣疏論地震㑹詔求直言復上疏是月必有詔也實録本紀偶脫之臣燾先用宋祁集奏議所注月日追書仍取王氏㑹要詔文具載於正月九日蘇舜欽等疏有實日者追附其日獨蘇紳葉清臣張方平張觀等仍於月末附見二月戊辰朔詔天下貢舉人自今止令逐州解頭入見時舉人羣見進止多不如儀而民有緱化隆髙惟志者又輙闌入殿庭獻封事也舉人進止多不如儀據司馬光記聞增入庚午詔自今復日御前殿視事用蘇舜欽之言也三司言山場𣙜務自今火焚官物其直萬緡以上者監官並勒停主吏刺配别州牢城從之壬申詔罷遣投洞府金龍玉簡内臣止差殿侍齎送本處令知州或通判嚴潔致醮投之癸酉罷奏舉縣令初中書言天下縣令闕有限而舉縣令者日益多比來銓司擬注不行故罷之甲戌賜鄆州學田五頃壬午詔瀛州百濟河上通滹沱河遇夏秋暴溢而所屬官司能完固隄防者與理為勞績若致衝決則加罪之甲申廣南西路鈴轄司言安化蠻冦宜融州據杜杞傳安化蠻冦邊殺知宜州王世寜朝廷出兵討之實録不詳詔内臣為走馬承受代還如使臣例與改官景祐五年中按景祐止四年五年即寶元元年此稱五年實悞嘗有是詔今復申明之右司諫韓𤦺上疏言有虞至聪也成湯至明也其命相猶咨於岳選於衆不敢以獨鑒自决於上必命衆而舉之始居其位故得百工信其治而不仁者逺於朝未有衆以為非才上獨以為可任付以大柄信其操執而望萬化可成衆功盡羙者也臣職在諫諍志無囘隠自去秋迄今累上封奏指言陛下丞弼之任未得其人蓋以宰臣王随登庸以来衆望不協差除任性褊躁傷體廟堂之上不聞長才逺略仰益盛化徒有延納僧道信奉巫祝之癖貽笑中外而自宿疹之作幾渉周星安卧私家備禮求退方天地有大災變陛下責躬訪道之際不思抗章引避而不朝君父扶疾於中書視事引擢親舊怡然自居暨物議沸騰則簡其拜禮勉强入見面求假告都無省愧之心固寵慢上寡識不恭之咎自古無有今聞所患再加不能復詣中書養疾陛下優遇之禮既已備矣彼人貪禄竊位之計亦已窮矣次則陳堯佐男述古監左藏庫官不成資未經三司保奏而引界滿酬奬之條擢任三門白波發運使况程琳任三司使日曾定奪監左藏庫吳守則雖界滿出剰而帳厯慿由不能依限結絶尚猶不應酬奬條敇保明之官已重窴其罪以此較之則述古之授是為欺罔聖明參知政事韓億初乞男綜不以資序囬授兄綱將朝廷要職從便退換如已家之物紊亂綱紀舉朝非笑此二事若陛下忽令而小之因循不問彼則曰我營私若是而上不之責矣言事者疏我之罪而上不之聽矣則必愈任威福公然為不善更無畏矣又石中立本以藝文進居近署兼領常局事尚不能少有建明但滑稽談笑之譽為人所稱處於翰墨之司固當其職若參决大政則誠非所長伏見仍嵗以來災異間作衆星流隕躔次不順河東地震壓覆至多雖厯代所書譴告之事未有如斯之大也而又冬無積雪春首霆震寒燠之序未甚均協考天戒之自則爕理之任正當其責而在上獨使陛下引咎敷詔詢求讜言繼日臨朝孜孜政道在外則降敇天下偏責刺舉牧長之吏各修其職於政府之臣則以為過不在已泰然自處於臯䕫稷契之右臣僚欲廣陛下之徳乞頒前詔於天下而罷立期限則皆抑而不從蓋臣事専而君道弱之明應也陛下用輔臣如此不惟使四方觀望寖成弛慢之風必恐外國聞之亦有輕視中國之意如望天責可消而福自來則又不可得也陛下倘以為退免大臣其事至重非下所宜輕議孰若以祖宗八十年太平之業坐付庸臣恣其隳壊乎今下至閭里之人猶能揚言而非之投書而謗之又况陛下置臣於言責之地可知而不言哉臣是以不避斧鑕屢有奏論乞從罷黜以慰具瞻之望於已非私也於彼非有嫌隙也所切者以陛下有堯舜之資而為在位壅蔽一思開發睿明以濟亨運無他意也然慮陛下以臣過有詆訐疑在離間是故久而不行伏望出臣此疏明示中書委御史臺於朝堂集百官㑹議正其是非如以為臣言不謬則乞陛下公而行之若以為輔弼等前件事於朝政無損國體無傷只是臣發於狂妄則誅戮貶竄之罪臣無所逃矧遇陛下勤政荅天申明賞罰之秋特望判其邪正以塞群議上嘉納之三月戊戌朔門下侍郎平章事王随罷為彰信節度使同平章事户部侍郎平章事陳堯佐罷為淮康節度使同平章事判鄭州户部侍郎參知政事韓億罷歸本班禮部侍郎參知政事石中立罷為户部侍郎資政殿學士初吕夷簡罷宻薦随與堯佐二人為相其意㧞引非才居已下者用之覬他日上意見思而復相已及随與堯佐億中立等議政數忿争於中書隨尋属疾在告詔五日一朝日赴中書視事而堯佐復年髙事多不舉時有中書翻為養病坊之語又轉運使王軫求三路於随随以閭閻鄙語罵之一日随方膳堂吏白事忤意随食未及下咽而遽斥之羮汚其面中外恥笑㑹災異仍見𤦺論随等䟽凡十上堯佐亦先自援漢故事求策免於是四人者俱罷王巖叟作韓魏公遺事録云公言天下事不能必如人意仁宗時王随陳堯佐為宰相皆老病又不和中書事多不决韓億石中立二人又頗以私害公公時為諫官屢疏不納後物議益喧公復上章乞廷辨上廹於正論罷四人者當時天下之望在王沂公吕申公杜沂公范希文而公亦引薦之及宣麻日乃張士遜昭文章得象集賢宋庠晁宗慤參政天下大失望公曰事固不可知人意亦不能必也按巖叟此録繆誤宋庠參政在寳元二年十一月晁宗慤參政在康定元年九月不與士遜得象同入中書明甚宗慤此時在翰苑纔二年庠實初除翰苑然上意本用庠偶以讒止更一年餘卒用之或傳聞疑似致此而范希文二年前權知開封坐䜛落天章閣待制去冬補外方自饒徙潤猶未復職驟遷政府恐亦無此例魏公自言必不差巖叟聼之不審又不加參考遽筆之於書耳又汪藻書陳堯佐舊事云文惠陳公相仁祖每内批夜下不過十刻忽夜分有御封至私第公不啟封來日袖至榻前屏奏曰今中宫虛位張貴妃有寵恐姦人附㑹請正母儀非陛下本意有不得已者若誠此事臣不敢啟封以示同列仁祖首肯曰姑置之貴妃即追册温成后也當時於墓刻神道碑不敢書公薨百餘年公之曾孫右中大夫直秘閣兖始録以示人嗚呼兹舉也天下之治亂係焉文惠公不動聲色開悟轉移於談笑之頃一旦致其主於漢唐賢君之上使當時有秋毫容説之心其失可勝計哉可謂仁人君子而一言興邦矣自古妃匹之愛父不能得之子君不能得之臣所謂難言骨肉之間者也文惠公及此固社稷之臣非吾仁祖有從諫之聖亦安能容其臣如是之大乎後世於此可以觀一時君臣之盛而為萬世法矣按文惠以景祐四年四月拜相寳元元年三月罷温成以康定元年十月自御侍遷才人距文惠罷相凡二年餘雖當時已被寵幸不應諛臣便有正位中宫之請汪藻所見恐文惠之孫飾説非事寔也今不取山南東道節度使同平章事判河南府張士遜為門下侍郎兼兵部尚書平章事户部侍郎同知樞宻院事章得象以本官平章事户部侍郎知樞宻院事盛度加寜武節度使檢校太傅度位本居得象上而得象超為宰相故度亦特進秩右諫議大夫同知樞宻院事王騣龍圖閣學士工部侍郎權知開封府李若谷並為參知政事龍圖閣直學士給事中權三司使王博文龍圖閣直學士工部侍郎知永興軍陳執中為右諫議大夫並同知樞宻院事初韓𤦺數言執政非才上未即聽琦又言曰豈陛下擇輔弼未得其人故耶若杜衍孔道輔胥偃宋郊范仲淹衆以為忠正之臣可備進擢不然嘗所用者王曾吕夷簡蔡齊宋綬亦人所屬望何不圖任也上雖聽琦罷王随等更命士遜及得象為相士遜猶以東宫舊恩或言又夷簡宻薦之得象入謝上謂曰往者太后臨朝羣臣邪正朕皆嘿識惟卿忠清無所附且未嘗有干請今日用卿由此也夷簡又薦士遜據陳釋拜罷録當考户部尚書知應天府夏竦為三司使刑部貟外郎知制誥宋郊為翰林學士上初欲用郊為右諫議大夫同知樞宻院事中書言故事無知制誥除執政者乃先召入翰林左右知上遇郊厚行且大任矣學士李淑害其寵欲以竒中之言於上曰宋受命之號也郊交也合姓名言之為不祥上弗為意他日以諭郊因改名庠庠更名在十二月乙未今聫書之己亥發邵澧潭三州駐泊兵七指揮赴宜融州討捕蠻賊庚子吏部侍郎參知政事程琳加尚書左丞辛丑安徳節度使知樞宻院事王徳用為宣徽南院使定國節度使依前知樞宻院事甲辰彰信節度使同平章事王随判河陽乙巳翰林學士李淑為翰林侍讀學士仍罷判禮院避其父若谷執政也詔舉人該去年十一月癸丑詔免解而赴試不及者將來更與免解戊申資政殿學士宋綬為資政殿大學士葉夢得云王欽若始為大資政其後向敏中李廸王曾皆以前宰相為之非宰相而除者惟綬一人詔外夷入貢所過州縣令廵檢縣尉䕶送之己酉許潁州立學潁非藩鎮也於近詔不當立學知州蔡發有請特從之庚戌龍圖閣待制王舉正復為知制誥甲寅御崇政殿試禮部奏名進士乙夘試諸科丙辰試特奏名庚申賜進士揚州吕溱等二百人及第一百十人同出身特奏名一百六十五人同諸科出身及為諸州長史辛酉賜諸科四百十四人及第并出身其特奏名被恩賜者又九百八十四人瓊林宴初賜大學篇先是上以開封府所解鎻㕔進士陳博古等嘲謗籍籍宻詔博古及韓億四子并兩家門下士范鎮家靜試巻皆勿考鎮成都人靜眉山人考官奏鎮靜寔有文久馳聲塲屋非附兩家之勢而得者乃聽考而降其等級鎮禮部奏名為第一故事禮部第一人賜第未有在第二甲者雖近下猶升之吳育歐陽修殿庭唱第過三人亦抗聲自陳鎮獨黙然至第七十九人乃出拜退就列無一言衆以是賢之禮部第一人在第二甲自鎮始初薛奎知益州還朝與鎮俱或問奎入蜀所得奎曰得一偉人當以文學名世也
