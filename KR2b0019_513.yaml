body:
  text: 續資治通鑑長編卷五百九宋李燾撰哲宗元符二年夏四月辛卯遼國汎使蕭德崇李儼等辭置酒于紫宸殿授以報書曰載書藏府固和好於萬年使節馳軺逹誠心於二國既永均於休戚冝共嫉於兇姦惟西夏之小邦乃本朝之藩鎮曲加封植俾獲安全雖於北嘗豫婚姻之親而在南全居臣子之分涵容寖久變詐多端爰自累嵗以來無復事上之禮賜以金繒而不已加之封爵而愈驕殺掠吏民圍犯城邑推原罪惡在所討除聊飭邊防稍修武事築據要害扼控犇衝輙於去歲之冬復驅竭國之衆來攻近寨凡渉兩旬自取死傷數以萬計糧盡力屈衆潰宵歸更為詭誕之詞徃求拯救之力狡獪之甚於此可知采聽之間固應洞曉必謂深加沮却乃煩曲為勸和示以華緘將之聘幣禮雖形於厚意事實異於前聞緬料雅懷誠非得已顧於信誓殊不相關惟昔興宗致書仁祖諭協力蕩平之意深同休外禦之情至欲全除使無噍類謂有稽於一舉誠無益於兩朝祖宗詒謀斯為善美子孫繼志其可弭忘今者詳味縟辭有所未諭輙違先㫖諒不在兹如永念於前徽宜益敦於大信相期固守傳示無窮矧彼夏人自知困蹙哀祈請命屢叩邊關已戒封疆之臣審觀情偽之狀儻或徒為空語隂蓄姦謀暫示柔伏之形終懷窺伺之志則决須討伐難議矜容若出自至誠深悔前罪所言可信聽命無違即當徐度所宜開以自新之路載惟聰逹必諒悃悰方屬清和冀加葆嗇續遣使人諮謝次又回白劄子曰夏國自李繼遷之後建國賜姓莫非恩出當朝所有疆土並是朝廷郡縣之地昨自元豐以來累次舉兵犯寨中間亦曽赦其罪戾加以封冊許令朝貢兼歲賜金帛又遣官與之分畫疆界而狡詐反覆前後於陜西河東作過不一無非母子同行舉國稱兵攻圍州軍城寨去冬又於涇原路攻打城寨近二十日攻城之人被傷殺者不啻萬數勢窮力屈方肯遁歸比之日前愆過不為不重所以逐路邊城各須出兵討逐捍禦及於控扼賊馬來路修築城寨禦其犇衝夏人自知罪惡深重乃更締造詭詞飾非文過干告北朝求為救助縁南北兩朝百年和好情義至厚有同一家夏國犯順罪惡如此北朝所當共怒兼詳慶厯四年慶厯四年七月癸未耶律元衡來告西征實録具載其書與此小有不同興宗皇帝致書仁宗皇帝云蠢爾元昊早負貴朝疊遣林牙齎詔問罪尚不悛心近誘去邊民三二百户今議定秋末親領師徒直臨賊境又云恐因此軍深入却附貴朝或再乞稱臣或依常作貢緬惟英晤勿賜允從又慶厯五年書云慶厯五年正月耶律宗睦來告西征回實録不載其書兩朝誓書冊内有之當考元昊縱其兇黨擾我親隣屬友愛之攸深在蕩平之亦可又云藩服亂常敢貢修之不謹親隣協力務平定以永綏又皇祐元年再報西征云皇祐元年三月己未蕭惟信來告西征實録具載其書元昊伺窺邊事特議討除再幸邊方欲殱元惡而夏國馳告元昊云亡嗣童未識於矜存狡佐猶懷於背誕載念非縁逃户可致親征孰料兇頑終合平蕩茍有稽於一舉誠無益於兩朝至皇祐二年報西征回則云爰自首秋親臨戎境先驅戰艦直濟洪河尋建浮梁洎成戍壘六軍蓄鋭千里鼓行又云專提騎旅徑趨梟巢羣物貨財戈甲印綬廬帳倉厫䭾槖之屬焚燒殆盡螫毒尋挫噍類無遺非茍竄殘旅全除必矣又云兼於恃險之津已得行軍之路時加攻擾日蹙困危雖悔可追不亡何待載想同休之契頗協外禦之情深惟北朝興宗皇帝敦篤勸和情義兼至方夏人有罪則欲協力討除及西征勝㨗則馳書相慶慮彼稱臣修貢則欲當朝勿賜允從自今來兩朝歡好歳久契義日深在於相與之心宜加於前日今乃以夏人窮蹙之故詭詞干告既移文計㑹又遣使勸和恐與昔日興宗皇帝書意稍異况所築城寨並無與北朝邊界相近之處即非有違兩朝信誓必料北朝臣僚不曽檢㑹徃日書詞及所立誓約子細聞逹尋具進呈奉㫖據夏人累年於當朝犯邊作過理合討除况今來止是驅逐備禦於兩朝信誓及久來和好殊不相干兼夏人近以事力困窮累次叩關請命且云國母䘮亡姦臣授首欲遣使告哀謝罪縁夏國久失臣節未當開納今以北朝遣使勸和之故見令邊臣與之商量又縁夏人前來曽一靣修貢一靣犯邊慮彼當計窮力屈之時暫為恭順以款我邊備邊臣審察見得情偽若依前狡詐内蓄姦謀俟後少蘇復來作過則理須捍禦及行討伐若果是出於至誠服罪聽命亦相度應接許以自新先是館伴所言汎使以白劄子云西人悔過謝罪許以自新則是全不干北朝遣使之意兼未見答休退兵馬還復疆土八字徃復久之未肯收受詔二府改定進呈布録此叚在乙丑今附此遂改定云夏國罪惡深重雖遣使謝罪未當開納以北朝遣使勸和之故令邊臣與之商量若至誠服罪聽命當相度許以自新上稱善初章惇云夏國作過未已北使雖來勸和亦須討伐若能服罪聽命雖北朝不來勸和亦自當聽許布曰如此止是厮罵却了事不得遂如布所定衆皆以為然再對具以白上上亦以為不可既而館伴所又言此叚布録在丙寅今附此汎使得改定白劄子亦不肯受乞與增特停征討四字布曰蔡卞已嘗言欲添與特免征伐四字正與此同然恐未可數改遂詔蔡京令不得輕許以増改語言京又乞削去聽其反覆偏詞是責其主恐彼難収受遂與刪改云夏人詭詞干告既移文計㑹又遣使勸和是日惇卞不入惇深以刪改為不須也此叚布録在丁卯今附此後四日丁卯後四日庚午惇謂布汎使終未肯受白劄子蓋是前來不合與添北朝勸和意待却取來依前所草定言語與之衆皆默然惇又謂布曰公毎事且道定著布曰自議邊事以來語言未嘗不定却不似他人一坐之間説得三般兩様公適來之説使不得如布所見他既堅云不得回答八字不敢受兼汎使語最無禮處是云肯抽退兵馬還復疆土要一分白文字若不肯亦要一分白語言方敢受此極無禮當答之云朝廷既許以自新夏人又不作過即自無出兵討伐之理其建置城寨係僅禦奔衝之處兼是本朝郡縣之地决不可還復如此答之看他待如何惇曰如此亦得布曰這箇須道定著但恐下來不如此答他必不肯去諸公更有髙見及更生異論恐無以易此語惇曰恁地好前來言語更不須説布曰不可公適已言為布欲添勸和之意致敵人不肯受劄子今公議論如此布所見如此若不盡陳於上前取决於上即無由有定論既對上曰敵人堅不肯受劄子且勿恤更住數月亦不妨布曰陛下聖意已定臣下足以奉行蔡京輩館伴以來分付得劄子敵人未辭是職事未了義不自安既得朝㫖令堅執前議更無可商量又聖意如此何疑之有布遂悉以惇語白上上曰莫難布又言惇以為臣不當添勸和一節致敵人不受卞曰此是衆人啇量不須分辯布又具道布所見如前所言上曰極好然且候半月十日間未受時却如此指揮亦可布曰如此無不可者惇曰如聖意且更令住數月亦不妨是月甲戍四月一日館伴所言汎使兩召㑹食不赴云事未了不敢飲酒聽樂如前日劄子只得自新兩字北朝所言八字並不曽答雖餓殺亦不敢受此劄子蔡京又疑汎使不肯造朝已而如期造朝上又言恐起居時要唐突令宻院且勿退既起居訖便出一無所陳上問何以處之布持議如前後四日後甲戌四日丁丑也館伴所又言汎使未受劄子欲増抽退兵馬還復疆土之語衆議欲明諭以夏人聽命伏罪朝廷許以自新即豈有更出兵討伐之理其邊臣進築城寨以禦其奔衝兼係本朝郡縣境土及藩臣作過理須削地無可還復以此答之不妨上不以為然是日汎使造朝跪於庭下云所得白劄子只得自新兩字未分白乞更賜増添上令張宗禼答以事理已盡無可更改使者再有所陳上欲以前語答之而宗禼不敢再表遂又呈嘉祐熈寧北界打圍亦皆批斫林木然熈寧六年於西山打圍七年便遣蕭禧理辯地分十年分畫畢元豐二年又坐冬於西京初諸路探報北人於邊界作圍場及於西京坐冬惇以為不足恤布曰必恐生事蓋蕭禧理辯地界如鴻和爾山解子平一帶河北地分尚未了縁此生事未可知上亦以為然故檢尋舊邊報以證其舉動非無故也後十日丙戍也後丁丑十日同呈館伴所語録共八件撰定對答汎使之語如前議納於上前又蔡京言汎使遣二書吏來傳語要於自新字下略添得些小抽退兵馬之意亦可受兼白劄子内多説興宗皇帝書意似未便及言朝廷郡縣之地恐生剙京答云自身已是分白無可更改只是汝兩人誤他使住許多日數白劄子只説與興宗書不同却不似北朝容易輕出語言便云有違先㫖那箇是輕重若言本朝郡縣之地興州靈州銀夏綏宥不是朝廷地是誰地此地皆太宗真宗賜與李繼遷如何是生剙兩人者皆無答但云不由人吏是簽樞未肯受觀其詞氣頗已屈服翼日遂受白劄子翼日丁亥也乞朝辭己丑日館伴所又言汎使欲改大遼國信所為北朝字從之以元祐中因敵使授生餼劄子欲改大遼為北朝既降㫖從其所請又令今後却提空南朝字彼亦不敢違館伴所亦難以北朝白劄子内有南宋字汎使云西人之語非本朝所稱遂已蔡京初受詔館伴對崇政殿上曰北人以何辭解和夏國京曰彼必以尚主為詞蓋仁宗朝有書答北朝曰既論聨姻之舊當寛問罪之師上曰仁宗有書如此彼何以答之京曰彼興宗有書報仁宗屬友愛之尤深在蕩平之亦可又曰茍有稽於一舉終無益於兩朝是彼嘗欲蕩平夏國也上曰善可具録進入德崇儼留京師凡三十七日乃歸舊録云先是敵遣汎使差蔡京館伴京對崇政殿至具録進入新録削去今復存之蔡京曹誘别有語録然亦更無可入長編者詔應勘鞫徒以上罪乞不結案及審録覆奏斷遣已申奏者以違制論先是臣僚言右軍廵院鞫前兖州萊蕪縣尉張天錫訛言詔特處死更不結案審録仍不覆奏不惟中有疑惑兼恐異時挾情鞫獄以逃省寺譏察非欽恤用刑之意請今後獄具並須依條差官審録故有是詔張天錫事及臣僚姓名為誰當考詔㫖元符三年九月陳瓘論章惇殺張天悦之徒以鉗衆口張天悦見紹聖四年閏二月丙戍朔或即是張天錫事或别事當考朝請大夫管勾玉隆觀顧臨卒癸巳武安軍節度使開府儀同三司永寧郡王偲改鎮安集慶軍節度使進封睦王朝散郎中書舍人郭知章充回謝北朝國信使東上閤門使文州刺史曹誘副之上初欲用范鏜方以制獄隔朝參黄履力為曾布曰恐賞罰未明兼朝廷何至如此乏人又鏜嘗拜受香藥酒似難為使布且陳於上遂改用知章已而誘不行改差東作坊使兼閤門通事舍人宋深四月二十一日癸巳閏九月十二日辛巳知章等乃行知章等既受詔河北諸州數言遼主今歲必於西京坐冬及於河東對境多作圍場屯兵聚糧以俟受禮又言遣人徃解子平圍恐必造端生事章惇屢以為不足恤上頗不然之曰安能保其不生事但當思所以待之爾知章等申乞下雄州移文問遼主受禮處從之布録此叚在辛丑四月二十九日上問知章等到北界對答語言如何布曰以臣所見若但云不知恐無以塞其請若説與聞西人已叩關請命朝廷已許収接章表若彼更不作過必無更用兵討伐之理如此明白足以慰安遼人反側之意有何不可惇與許將皆以為不然布曰韓縝沈括奉使時亦但云來回謝及再三有所問亦須答惇等又曰沈括當時徃商量事與此不同上曰莫須與一指揮布曰知章等方欲奏請候見文字草定進呈取㫖如此紛紛爭論亦無補此叚布録在五月十二日甲寅知章等行次相州雄州言涿州報遼主已入秋山不納回謝使副奏狀須十月一日過界布録在六月二十一日壬辰尋詔知章等赴闕期至乃行布録在七月八日己酉仍以真珠蹙金閙裝鞍轡遺遼主不封角答玉帶及小繫腰也布録在閏九月十二日辛巳郭知章不知果以十月何日行十月二十六日甲子罷中書舍人除集賢修撰知和州指揮度此時知章猶未回也按甲子原本作己酉誤知章至契丹蕭德崇謂知章曰南北兩朝通好已久河西小國蕞爾疆土還之如何知章曰夏人入冦邊臣擇險要為城柵以守常事也德崇又曰禮數歲賜當且仍舊知章曰夏國若恭順修臣子禮本朝自有恩恤豈可豫知但累年犯邊理當致討本朝以北朝勸和之故務敦大體為優容今既罷問罪令進誓表即無可復問也知章至契丹以下並據知章本傳要不當附此進誓表在十二月五日提舉開修菱芡等河李仲言祁州深澤縣程昉先所開河見行滹沱河水河槽淺澱恐為塘濼之患今踏逐得祁州南有新河一道自定州界唐河一枝流與永寧軍沙河相合欲自永寧軍界鐵登竿村别開河一十九里斗門引道沙河清水至深州界合入程昉先開河下節行流從之七月四日可考保信軍留後仲遷卒贈開府儀同三司仍追封惠國公甲午寶文閣待制知武德軍髙遵惠為試户部侍郎朝奉大夫集賢殿修撰江淮荆浙等路發運使張商英為權工部侍郎布録十二月戊午論商英可考奉議郎守監察御史鄧棐為殿中侍御史五月十一日改禮部外詔朝奉郎水部員外郎分司南京睦州居住黄隠爾以諸生常被先帝㧞擢不思圖報厚恩而逮更元祐託附姦黨非毁法度偷合取容雖分務於别都未克諧於僉論可特責授平江軍司馬南安軍安置前知保州西上閤門使副張赴罰銅十斤展三年磨勘以不覺察婦人阿劉等出入北界故也孫路乞進築齊訥納森東楞摩等處令便進築餘路更相度地勢從長施行環慶奏乞進築駱駝巷萌門白豹及乞罷之字平等處進築詔駱駝巷白豹依奏萌門恐不須築之字平係控扼清逺軍界恐不可罷令相度聞奏七月十八日却築萌門三岔八月二日畢工是日詔依知寧化軍王棫所請與宫觀棫奏自云預建儲之大議曾布白上棫為閤門祇候尋醫安得預此大議章惇曾云此乃邢恕之言爾上亦曰輕易因言邢恕反覆不平隠常自以定策為功在元祐中上書則云先朝屛斥不用又云司馬光等進用可謂千載一時與今日在朝廷議論殊不類布曰恕頗有文學然天資反覆利欲多端所操守不常自紹聖初因章惇力引故進擢其後觀望有所黨附則攻病惇無所不至毎戒惇以生厎事少做及恕有所開陳無非生事一事未已又生一事略不肯安静以至於臣前議論司馬光等與章惇等處所論全然不同此皆陛下所知也上云天資不静小人小人乙未三省宻院同進呈令孫路進築喀羅蓋章惇意也喀羅卓羅宻邇邈川路欲繫橋渡河築一寨惇力欲成之曽布與同列皆以為不可曰如此青唐必驚疑生事西夏未了又生一敵國布因為上言臣自有邊事以來常以為但得遼國及青唐不驚則西事可了若一方小驚則無所措手足青唐一動則熈河應接不暇何暇經營齊訥納森以通涇原也今事已垂成可惜壞了上曰如此且已遂進呈訖詔前復州景陵縣主簿趙隨賜帛三十匹米三十碩以本州言隨守母墳篤孝故旌賞之詔宣義郎新除通判蘄州城珣降授承奉郎以元祐訴理不當故也詔河東新築端正平寨名曰寧逺布録乙未三月十一日四月七丙申樞宻院言漢蕃官弓箭手并諸蕃兵等功未經酬賞或已賞而不經親授身亡或陣亡子孫弟姪等合該承襲推恩者舊例不一内漢蕃弓箭手於舊職名承襲蕃弓箭手蕃官並於新職名承襲顯未均當欲有功未賞或已賞未授身亡止於舊職名上推恩應承襲者凖此其未賞未授功毎合轉一資支賜絹二十匹内功狀優異臨時取㫖從之鄜延奏西人説話次第已降㫖令明示以開納之意於是令保安軍先與収接章表仍邀約以送還漢界陷沒官員軍民及執送自來作過近上首領來獻方敢申取朝廷指揮就委惠卿選文武官兩員同將寨官專切應答西人語言節次録奏布録丙申已而鄜延奏恐西人未齎到章奏詔令先與収接公牒布録辛丑二月十一日四月七日五月六日合參照丁酉詔河東路經略安撫使知太原府孫覽差提舉崇禧觀先是覽上表請宫觀其詞有陛下既未能察臣區區而不自披露則終莫能動陛下之聽語渉不恭特落寶文閣待制御史中丞安惇再言責之太輕故有是命正月二十一日先除林希知太原後九十餘日覽乃責布録云正月丁卯先有㫖降一官既而御史有言遂命奪職候林希到行下元符元年五月二十九日降寶制二年正月二十一日降一官畢仲游墓誌覽上表謝降職曾布曰謝語不䖍可謫遂奪職奉祠降職在元年五月二十九日降一官在二年正月二十一日奪職奉祠在二年四月二十五日皆坐表語不恭先謝降職後乞宫觀仲游并言之今依實録兩存鄜延路經略司言近於安塞堡北威戎殄羌中路踏逐地名博羅特觜可以修築守禦城寨控扼得賊馬來路尋指揮都鈐轄苖履等統制兵馬進築了當已凖朝㫖賜名威羌寨今修築納木囊山地青髙山并盧關及赤幈峯堡寨並已畢其納木囊山殄羌寨令保明苖履等功狀詔等第與官減年支賜殄羌元年五月四日賜名威羌十三日賜名環慶路經略安撫司言新築定邊城日有西夏來投蕃部縁本城所據川原廣濶土脈饒沃是舊日西夏儲蓄之地今投來之人源源不絶可以就本城管下摽撥田土使之耕種本路舊蕃弓箭手散居諸寨隨地分𨽻諸將今除舊人並依舊外將定邊新城已後歸順之人就本城管下給田更不散行分𨽻乞置總領蕃兵及同總領各一員揀選諳熟蕃部事體深曉邊情能弓馬之人充從之三月十二日定邊畢工詔孫路且進築齊訥納森欲留秦鳳兵馬及一併築東楞摩㑹州恐向去暑熱難以久留又秦鳳兵馬迂路赴役并保甲車乗等般運應副不前於軍情民力不便令再相度具奏路再奏便欲城㑹州以打繩川為六百歩寨與素議不同兼西路兵馬方自涇原進築歸盛夏久留役使恐不便故丁寧詰之布録丁酉有此五月二日甲辰更詳之又五月十二日甲寅路墓誌云初元符元年八月二十七日移帥熈河西城利害路知其素方定計䇿而坐収夏國降書降授待制二年二月十五日路益自奮勵究心邊事㑹涇原路城西安州詔路統萬衆牽制路曰青石峽控扼㑹州路而兵不得前取之斯其時也因以其衆趍㑹川城别遣驍將徑築㑹州遂復瀕河之壤包秦鳳而通涇原矣西上閤門副使知雄州張赴知涇州降授供備庫副使定州路都監知保州劉方兼閤門通事舍人權𤼵遣雄州成都府利州路鈐轄閻仁武權發遣定州路鈐轄知保州赴久病不任事而未有可代者章惇欲令劉何換官為之曾布不可布欲用王獻可上不許於是以保遷雄州蓋故事也己亥奉議郎崔俞言乞將校節級侵冒合招弓箭手地土者論如盗耕官田法將官城寨官干繫人知情與同罪不切覺察減犯人三等許人告毎畝賞錢三貫至五十貫止犯人財産不足勒干繫人均備從之賜涇原進築洒水平秋葦川帥臣而下銀合茶藥候進築鼐摩㑹成更賜一次布録詔勿受宰臣章惇乞解機務章奏御集二十七日先是章惇留身乞退徑出居僧寺其家已先出日加午上乃有㫖令不得般移其日甲午也二十二日翌日二十三日乙未上諭曾布曰惇請去甚堅布曰惇久有此言上曰章惇今日豈可令去布曰聖意堅留惇亦何可去上曰已封還文字宣召矣是日早遣御藥劉友端徃翌日二十四日丙申惇入不奏事留身退押赴都堂徑出上又問惇去意甚堅何故布曰惇自言久有去意陛下恩禮既厚惇何敢不留又翌日二十五日丁酉惇復被召赴都堂惇乞别班起居奏事皆如所請上諭三省宻院云惇請去甚堅昨日對蘇珪乃至泣下又有劄子極説事不知何以如此堅求去許將蔡卞黄履等曰惇自言惇不似他人道去便須去昨日亦有簡與臣等令助以一言布曰臣亦得惇簡見在此容進呈上笑曰此惇自書衆曰然三省所得簡大意類此既至都堂布等見之惇曰决須去仍不肯坐都堂止於暖堂中相見遂上馬布再對請於上曰劄子中説事莫及臣等否上曰無之只是説在下人却不及執政是日二十七日己亥惇又乞别班起居奏事亦如所請尋押赴都堂遂復視事上對三省宻院又問惇去意何其確然也衆對如前布再對又問仍曰惇自言多面斥士人罪慝故衆怨歸之布曰士大夫無不罵惇者惟是得差遣遲乃不見賔客與衆執政不同爾其他亦何能為惇於同列但有過於遜屈事事隨順人不能與人違戾以此稍稍有去意兼祖宗以來以一相當國者幾務任不輕亦不得不然爾上默然布又對三省嘗云此地非久安之所臣等待罪於此歳月已久亦毎不自安非獨惇有去志也元年末及此年九月二十五日鄒浩云云辛丑右正議大夫知河南府李清臣知成德軍朝請大夫直龍圖閣權知鄆州胡宗愈權發遣江淮荆浙等路發運使陜西轉運副使邵䶵知鄧州詔廣南西路帥臣孫覽胡宗旦特罰銅三十斤監司程節齊諶梁子美方䝉徐常譚掞程遵彦孫賁王錫罰銅二十斤以察訪董必言知廉州姚舜舉等以贓敗覽等坐謬舉故也樞宻院言近西人差使詣闕訃告兼附謝罪表狀朝廷雖未聽許縁諸路新舊城寨形勢利害不同其烽臺坐團口鋪及人馬廵綽卓望所至去處各未經㸃檢措置如涇原路進築天都鼐摩㑹鹻隈了當即須廵綽至葫蘆川東北及竒魯朗口以來環慶路定邊城須自星哈羅隴宗至西安界横山寨即目之字平青崗峽至清州逺軍界戬章㑹板井以來一帶熈河路修築東楞摩㑹州打繩川一帶城寨即須至或經山一帶及沿黄河擺置東西關堡以來及金城關以外皆是合要安置烽臺堡鋪及人馬卓望廵綽所至之處鄜延河東路亦合依此相度修置務占據得横山寨及河南一帶𦂳切要害去處於邊防控扼守禦經久利便詔陜西河東逐路帥臣選委近上兵將官從長相度修置仍具所置烽臺堡鋪及廵綽所至地名著望去處及與極邊新舊城寨相去地里逺近圖貼以聞館伴使蔡京等言竊實修華戎信録自通好以來事無不載粲然可觀而所載止於元豐六年後來未經編録伏望委官續成從之
