body:
  text: 續資治通鑑長編巻三百宋李燾撰神宗元豐二年九月丙寅朔鄜州路經畧使呂惠卿言諜知西界㸃集臣酌度緩急躬行近便城寨接應及廵邊按兵乞命官攝州事及應副軍須詔陜西轉運使李稷權州事丁夘知都水監丞主客郎中范子淵為金部郎中陞一任同判都水監入内東頭供奉官寄禮賔使遥郡刺史宋用臣為寄六宅使遥郡團練使給寄資全俸入内東頭供奉官王修已等三十七人各進一官功優者減磨勘年或指射差遣選人循兩資餘官減磨勘三年者九人二年者五人三司軍大將等遷兩資者五十六人遷一資者八十一人仍等賜錢以子淵用臣首議導洛水入汴及築隄捍河畢工故優奬之餘皆董役有勞也詔前京西轉運副使屯田員外郎李南公減磨勘三年餘十一人遷官減磨勘并陞名次有差以固䕶大河南岸勞也詔鄜延第四將崇儀使髙永能進一官餘轉資減磨勘年賜帛有差七月西賊入冦綏徳城大㑹平永能等戰敗之賞功也減下卸司監官一員時增至二員以事簡故減戊辰詔淮南東路提㸃刑獄林英江南路提舉常平等事謝仲規同鞫前知江寧府吕嘉問以嘉問訴前鞫未盡也己巳上批三司認還羣牧司舊支劵馬縻費錢昨雖裁損嵗折絹七萬緡而遷延固吝未肯備償蓋裘絹仰官㑹校故彼此時有争辨可差太常丞吳安持限一月根磨未罷劵以前五年諸費用紐見錢畫一與三司當職官連書以聞庚午録韶州岑水場坑爐户湯潮為下班殿侍廣南東路鈐轄司指使以潮數出私錢捕獲强盗故也辛未左藏庫副使喬叙言奉詔權發遣瀘州乞躬廵縣寨兵甲及審觀主兵官吏能否宻議討賊方畧詔叙審度事宜如須躬行按視可量帶兵甲至縣寨毋得騷擾張皇更生邊事考平蠻記此乃叙欲打誓也三年三月己巳打誓事具四月十五日又此年十二月十七日當考壬申上批近差都水監勾當公事錢曜檢定諸埽樁料聞二都大司已計夫二十餘萬外尚有五都大司及諸河工料如此則來嵗雖起三四十萬夫未能應副公私財用枉費過當深為可惜錢曜新作水官未厯河事恐為沿河冒利者所罔不能究悉底裏可差本監主簿陳祐甫代曜檢定以聞癸酉以國子監直講著作佐郎滿中行為館閣校勘上批昨監生虞蕃訴學官上下共為姦贓欺罔事狀不一洎朝廷付有司推治乃蕃言不妄而中行所履潔廉不涉吏議且雜處衆人傾側撓法之中而能修身檢行如此求於方今士人寡耻之習已為鮮得又羣汚朋枉日與之分職聯事卒不能移其操守尤屬可嘉宜少奬之以勵風俗故有是命中行金鄉人也權發遣户部判官李琮言奉詔根究逃絶稅役有蘇州常熟縣天聖年簿管逺年逃絶户倚閣稅紬絹苖米丁鹽錢萬一千一百餘貫石匹兩本縣據稅合管苗田九百一十九頃有竒今止根究得一百九十五户共當輸苗米三百五十三石紬絹五十一匹綿五十三兩其餘有苗米八千四百石紬絹一千二百匹綿一千九十兩丁鹽錢九百文外並無田産人户亦無請佃主名蓋乆失推究姦猾因之失陷正稅乞差著作佐郎劉拯知常熟縣根究歸著他縣有類此者亦乞選官根究從之拯南陵人也食貨志元豐三年九月詔三司户部判官李琮專究江南東兩浙路逃絶户虧陷稅役等錢琮言蘇州常熟縣天聖中簿得乆逃絶户倚閣稅紬絹苗米丁鹽錢萬一千一百餘貫石匹兩今止百九十五户當輸苗米三百五十三石紬絹五十一匹綿三十五兩餘田産人户請佃主名皆亡蓋乆不推究姦猾因之失陷正稅請凡類此者皆選官根括從之乃詔轉運司提舉琮所究江浙路一百二十七縣逃絶户計四十萬一千三百三十二為書上之三年正月丙戌除琮淮南轉運副使復令究逃絶户稅役琮乃辟置官屬更移令佐大究治之淮南東西兩路州軍縣共八十有八几得逃絶詭名挾佃簿籍不載并闕丁凡四十七萬五千九百六十五户丁正稅役并積負凡九十二萬二千二百四十六貫石匹兩琮又言虧陷稅役乃官司造簿舛誤已乆請隨夏稅附納詔令簿失收稅役錢物特蠲除之内侍押班石得一乞專差勾當皇城司官提舉教習親從親事官弓箭手武藝從之詔得一提舉訓練鄜延路經畧使呂惠卿言綏徳城花佛堡把截三班差使楊永慶以出廵為名引所部入西界取蕃部八人首級詐言西賊犯邊斬獲乞以永慶前後軍功量奪兩資令於邊上効用詔追毁永慶出身文字送京西編管詔五路禮部進士與新科明法人通理人數均取甲戌詔開封府界馬軍雍邱捧日第五軍第一指揮五百人尉氏驍猛第一指揮四百人步軍減半天武第一指揮雄勇第一指揮襄邑雄威第二指揮陳留雄威第六指揮各五百人河東馬軍太原府吐渾第三指揮潞州吐渾第六指揮忻州廣銳第六指揮嵐州廣銳第十九指揮各三百人步軍潞州神銳第十四指揮四百人自今闕額勿補候人數不多即併廢以開封府界河東廵檢司既用義勇保甲畨上以代禁兵而廵檢司舊用兵數府界三千五十四人河東千六百三十一人皆當省故也丙子䕫州路轉運司言乞盡今年十一月終放罷瀘州縣寨防拓黔州義軍歸就耕作從之修完京城所請賃官地創屋與民為麵市收其租下開封府相度乞如其請從之乃詔自今空地募人租賃行訖以聞其後御史丁執禮以為言詔取行遣看詳而修完京城所有言令磨户及熟食人於城東西房廊作麵市收衆磨户錢入官即無行遣公案執禮奏遂寢後開封府又請牙人磨户私以麵貿易者杖一百許人吿捕五斤以上賞錢三千十斤以上十千從之朱史削去以為事小今復存之執禮為御史在此後六日丁丑詔提舉河北糴便糧草司按並邊被水州縣如軍食有備權住糴賜末鹽錢二十萬緡付河東轉運司市軍儲三司言南郊所用銀乞自選官督發剗刷上供錢帛詔三司指揮發運司於隔路差官催促仍次第以聞詔前國子博士陳世儒并妻李婢髙張等十九人並處斬婢髙凌遲妻李特杖死婢單等七人貸死杖脊分送湖南廣南京西路編管世儒宰相執中子執中嬖妾張氏淫悍不制生世儒未乆而執中死詔張氏為尼世儒既長迎歸與妻李事之不謹李龍圖閣直學士中師女母吕氏夷簡孫也世儒知舒州太湖縣庸騃不樂為外官與李諷諸婢謀殺張欲以憂去諸婢以藥毒之不死夜持釘陷其腦骨以䘮還京師為諸婢吿發而李辭屢變凡三易獄始得實於是元勘官皆得罪知大理卿事崔台符權發遣大理少卿寋周輔楊汲各罰銅十斤權大理寺丞賈種民二十斤三年正月庚寅葉武送審官二月己未種民衝替戊寅詔資政殿學士鄜延路經畧使吕惠卿兼措置陜西縁邊四路邊防事諸路措置未了事各令勾當公事官齊送惠卿看詳以聞庚辰以祠部員外郎集賢校理兼知宗正丞趙彦若為國史院編修官辛巳太常博士集賢校理丁執禮兼監察御史壬午詔翰林學士李清臣所撰大理寺記凡朝廷修廢官事之本末小大無不該載惟崔台符等首被選掄考舉墜典而能剸遣滯訟獄無淹囚獨不得掛名其間尚為闕漏宜送清臣增入又詔御史推劾太學欺弊事近半年餘司獄晝夜勞苦其令元勘官保明量與酬奬癸未徳音降潁州死罪囚徒以下釋之元豐元年終以前見欠夏稅及今年夏殘稅并縁納租課並與蠲免八月二十四日升節度兩級並書降囚罪甲申西南龍蕃來貢方物詔東南諸路上供雜物舊陸運者委三司增置漕舟並從水運詔權知邕州莊宅副使兼閤門通事舍人劉初等二十六人遷官減磨勘年賜銀絹有差以團結邕欽州峒丁為指揮隊凡十萬餘人録其勞也己丑進婕妤朱氏為昭容詔以永興路常平倉榖十九萬石給鄜延路九將守禦之用餘令轉運司以漸計置以鄜延路言嵗計軍食二十七萬餘石而常平無餘故也洮東安撫司言皇城使榮州團練使岷洮州蕃部都廵檢使包順乞用南郊赦書封贈父母上批順自熈河開拓之初率衆來附又秉心忠義前後戰功為一路屬羌之最雖舊無此例可特依所乞廼并其妻封之庚寅知制誥張璪判將作監以上批璪見領審官東院國子監朝廷方議增嚴太學規非乆頒降須頼主判之官以時督察庶幾成就東院注擬差遣檢省修例職事頗多宜改差璪同判將作監令專意推行學制兼惠以公宇使稍便安私家也命馬軍都虞候權管勾步軍司燕達管勾差使剩員所詔順州武陵峒麻仲福黄敷各杖脊編管仲福鄆州敷青州勒家屬隨行追奪元補官職宣命仲福等同儂智春冦順州故也詔諸路州縣吿捕獲盗速依條限給賞委提㸃刑獄等司半年一次取索州縣所獲盗數及給若干錢數上中書以州縣給賞稽留無以激勸吿捕者故也辛夘賜發運司糴本錢百萬緡令糴榖如逐路嵗計未足以所糴充數上供報轉運司令依和糴最髙價并計輦運之費限一季償錢壬辰内出教閲格行之步射執弓發矢運手舉足移步及馬射馬上使蕃槍馬上野戰格鬬步用標排皆有法凡千餘言使人人誦之其後中書樞宻院又請河北陜西義勇保甲皆如諸軍誦教法從之舊紀書内出馬步射教法之象頒諸軍使誦習之新紀書出馬步射格鬬教法頒諸軍本志云内出教法格幷圖其象頒行之步射執弓發矢運手舉足移步及馬射馬上使蕃槍馬上野戰格鬬步用標排有法象凡千餘言使軍士誦習焉癸巳樞宻都承㫖韓縝副都承㫖張誠一檢詳兵房文字范育上諸路清野備敵法詔頒行之今傳清野備敵十五條乃云元豐二年十月十三日月日與此不同不知何故甲午西南羅蕃來貢方物詔自今送檢正官定奪文字令執政稱事立日限以户房檢正官稽滯司農寺三司互奏坊場錢文字上簿因有是詔司農寺上元豐司農敕令式十五巻詔行之詔鬻官監場務錢屬三司外鄉村場務買名錢依舊入司農寺時三司言人户買撲官監及非折酬衙前場務所增收錢並合入三司帳而司農寺以謂官監場務外皆是新法拘收錢不當入三司乞存留以助募役兼嵗入百萬緡於市易務封樁若失此錢恐不能繼爭辨乆之乃從司農之請河東都轉運使陳安石乞本路犯西北兩界青白鹽者並依皇祐敕斷罪仍不以首從編配從之皇祐敕刑名比今為重又法非興販三分得一分之罪時安石方行鹽法於河東以希功利故欲峻其禁也朱本削去皇祐敕比今為重以下數語今復存之禮院言每遇祠祭太祝奉禮差審官東院待次官攝案唐六典郊社令掌五郊社稷明堂之位祠祀祈禱之禮郊社令不預祠事乞依典故令攝太祝或奉禮遇小祠不差監察監禮即令省視牲幣禮器從之復孟州汜水鎮為縣舊紀書復縣冬十月丙申朔西南石蕃來貢詔軍器監出黑木四風羽紅木四風羽白木四風羽弩箭總百三十萬賜開封府界京東西將下各五萬詔修定州城以明年合起民夫及河北路兵二千兼州兵充役丁酉參知政事蔡確言御史何正臣黄顔皆臣任中丞日薦舉臣今備位政府理實為嫌乞罷正臣顔御史於是權御史中丞李定言臺官雖令官長薦舉然皆陛下召對以為可者然後命之取舍在陛下不在所舉今欲廻避不過以為恩有所在夫舍公義而懐私恩此小人事利者之所為今選為臺官者必以其忠信正直足以備耳目之任儻以區區之嫌遂使廻避則是以事利之小人待陛下耳目之官此尤義理之所不可者也詔不廻避召輔臣觀稻于後苑戊戌上批保州增展關城非乆興役聞邊上修城土工極為滅裂無科直取凖法度宜下修完京城所選曉解土工小壕寨二人指教工作己亥以詳定郊廟禮文朝㑹儀注所檢討文字著作佐郎何洵直為祕閣校理上批洵直資性超敏强記多聞故擢之録北界歸明人武備為下班殿侍江南東路指使備嘗為邊臣伺敵中動静事泄懼罪來歸故録之詔内殿承制賔州駐泊都監劉洪安徙潭州不僉書公事賜田三頃洪安自交阯來降廣西經畧司乞徙官湖南也都大提舉導洛通汴司言汴河綱船乆例附載商貨入京致重船留阻兼私載物重四百斤以上已抵重刑今洛水入汴不至湍猛欲自今商貨至泗州官置場堆垜不許諸綱附載本司置船運至京令輸船脚錢從之詔自泗州至京民間載穀船官悉籍記自今毋得增置收力勝錢視舊增三之一導洛司船增至千五百艘泗州堆垜場始此三年三月二十四日京城外亦置庚子廣南西路經畧司言昨安南師興軍士有避征役者乞限百日首身除罪從之補供備庫副使權發遣順州王景仁子宗儒為三班借職景仁援知邕宜州得官其子例自陳也辛丑權發遣司農寺都丞吳雍言淮浙連嵗豐稔榖賤乞借逐路積剩免役坊場錢就並河州縣鎮增價糴秔米常與别司倉儲兌換如向去價稍髙兌充上供下司農寺請如雍議先以常平所留之半并散不盡錢充糴本次以坊場錢留半免役錢留二年從之權江淮等路發運使沈希顔言淮南轉般倉泗州最為近便雖有南北兩倉纔可貯榖一百五萬餘石揚州廢倉三百餘間約貯榖百萬石乞徙置泗州從之河北西路提舉司言熈寧詔書災傷縣權罷方田乞通一縣不及三分勿罷司農請不及一分勿罷從之壬寅詔權荆湖北路轉運判官降授奉禮郎馬珹勒停江陵府通判虞部郎中王伾都官員外郎周之純各追一官勒停僉書判官衞尉寺丞周常衝替珹坐為監司以省錢借江陵府公用之純常坐公使庫違法也癸夘詳定朝㑹御殿儀注所言案周禮木路建大麾以田鄭氏曰大麾不在九旗中以正色言之則黑夏后氏所建禮記曰有虞氏之旂夏后氏之綏鄭氏曰謂注旄牛尾於杠首所謂大麾書曰王右秉白旄以麾孔頴達曰虞世但注旄夏世始加旒縿西京雜記漢大駕有前黄麾崔豹古今注麾所以指麾乘輿以黄諸公以朱刺史二千石以纁開元禮義羅曰太宗法夏后之前制取中方之正色故制大麾色黄今禮有黄麾其制十二幅開寳通禮義纂曰黄中央之色此仗最近車輅故以應象取其居中導達四方含容光大也今鹵簿黄麾以夏制言之則狀不類旗以漢制言之則色又不黄伏請製大麾一注旄於干首則法夏后氏之制其色正黄則用漢制以十二幅為旗則取唐制以一旒為之則取今龍墀旗之制當元㑹陳仗衞建大黄麾一於當御廂之前以為表識其當御廂之後則建黄麾旛二并上大黄麾黄麾旛制度上批黄麾制度考詳前志終有所疑今鑿而為之植於大廷天下共瞻之地或為博聞多識者所譏宜且闕之更俟討求黄麾旛仍舊志載此差詳但上批語當考三司乞下河北路嵗市小綾二萬匹以備禁中須索及包子春冬衣等從之初嵗下河北市小綾二萬六千一百八十匹至是用不足增其數又詔濵棣徳博州嵗織細法大綾五百匹於嵗市綾數除之詔立水居船戸五戸至十戸為一甲相糾察救助法從福建提㸃刑獄司請也詳定禮文所言國語王耕一墢庶人終于千畆廪于藉東南鍾而藏之自漢迄唐皆有帝藉神倉今乆廢不設凡祭祀之所用皆索諸市非所以致潔誠欲乞於京城東南度田千畝為藉田置令一員仍徙先農壇於其中立神倉於東南並從之以郊社令辛公佑兼藉田令公佑請於玉津園之南因舊鏺麥殿規地十一頃有竒為田及築壇置倉引惠民蔡河水灌其中取卒之知田事者刺為藉田兵給其役五穀之外並植果蔬冬則蔵水凡一歲祠祭之用取具焉先薦獻而后進御有餘則貿錢以給雜費錢有餘則輸内藏庫著為令兩紀並書置藉田權發遣福建路轉運使兼提舉鹽事賈清言賣鹽錢撥還轉運司外乞别封樁以聽移用又言州縣稅務監官内有增羡數多及捕盗官獲私鹽最多者望於常法外論賞從之甲辰給事中集賢殿修撰知審刑院蘇寀卒丁未詔諸路轉運司支移科折二稅並具行下月日上中書以中書言熈寧八年詔支移二稅於起納半年前行下而轉運司多逼近起納方行如開封府界五月十五日起納夏稅五月十二日方下諸縣妨民以時輸納故也志有詔東頭供奉官閤門祗候權發遣廣南西路都監張吉應天府左軍廵判官權管勾廣南路經畧司機宜文字劉子民莊宅副使順州都監楊元卿各官一子元卿仍與遺表恩吉等皆以職事殁於順州也戊申詔寛衣天武把門行長行自今以十人為額熈河路經畧司言于闐國來貢方物而無國主表章法不當納已諭使去詔如堅欲奉貢可聽之廣南西路經畧司言交阯歸所掠二百二十一人詔納之廢順州以其地畀交阯初李乾徳遣使入貢且以廣源等州為請知桂州趙卨請留弗與嵗戍以三千人十損五六不可守上曰乾徳犯順故興師討罪逵等不能討滅垂成而還今順州荒逺瘴癘之地朝廷得之未為利豈可自驅戍兵投之瘴土一夫不獲朕尚閔之况使十損五六邪轉運副使苗時中亦言順州所築堡寨深在賊境饋運阻絶戍卒死者十常八九不如棄之然廣源州舊𨽻邕管覊縻本非交阯有也卨欲留廣源等州本傳及神道碑皆無之此據朱本新舊紀並書交阯歸所掠人以順州賜之時政記云元豐元年八月壬寅朔中書進呈知桂州趙卨奏奉手敕為處置交阯分畫地界事宜卨乞留順州思浪州不與歲戍兵三千人十損五六不可以守禦上曰朝廷比以乾徳犯順焚刼三州故興師討罪郭逵不能誅滅其國垂成而還今順州荒逺瘴癘之地朝廷得之未為利交阯失之未為害豈可自驅戍兵投之瘴土一夫不獲朕尚閔焉况使十損五六邪政記繫此語於元豐元年八月一日恐此時未有此語今附棄順州時墨本於實録末巻紀聖徳處載廢順州事云既見廣源州知桂州趙卨以為用兵三千十死五六不可守上曰朝廷以交阯犯順故興師討罪郭逵不能剪滅垂成而還今廣源瘴癘之地我得之未為利曰彼失之未為害一夫不獲朕尚閔之况十死五六邪乂安南之師死者二十萬朝廷當任其咎朱本既移卨所言入此且改卨所言不可守為乃可守今從朱本附此其云不可守則從墨本詔太常丞集賢校理兼天章閣侍講同修起居注直舍人院管勾國子監沈季長落職勒停右正言知制誥兼侍講知諫院同修國史詳定郊廟奉祀禮文宗正寺修玉牒官吿院判國子監黄履免追官勒停聽贖銅除侍講外差遣並罷樞宻直學士陳襄罰銅十斤季長坐受太學生竹簟陶器陞補内舍生不公及聽請求履坐不察屬官取不合格巻子及對制不實襄坐請求皆因虞蕃上書御史臺鞫得其罪也己酉以太皇太后不豫不視事成都府路轉運副使司封郎中李之純為轉運使再任初蜀部疾疫之純入境括户絶産未售者與死而未瘞者命吏分瘞調度出府庫錢不足以常平錢佐之售其産以償具以聞詔可之著為令成都歲出官米六千斛下其直以糶貧民議者為幸民而損上詔下其議之純曰成都蜀部根本民待此為生百年矣茍奪之將轉徙無所不至願仍舊貫議遂格利州路轉運判官太常博士程之才䕫州路轉運判官職方郎中徐師旦兩易其任以利州路轉運使劉忱與之才有嫌求避也題名記運判無徐師旦姓名三年五月六日之才又自利移梓恐師旦元未到官而之才復還當考庚戌以太皇太后服藥徳音降死罪囚流以下釋之詔太皇太后違豫日乆命輔臣等入禱天地宗廟社稷及都内神祠仍於宫觀寺院建道場七晝夜五嶽四瀆并諸靈跡處令通判凖此仍令開封府訪善治風虛疾者以名聞壬子詔以太皇太后不豫詔度在京宫觀寺院童行年四十長髪童子年三十五以上三帳及十年者為僧尼道士令御藥院於啓聖院作大㑹以度牒授之詔麟府二州鄉村户毋出役錢韓絳言麟府豐三州上番義軍已免輸役錢而並邊土薄鄉村户貧乏宜亦蠲之事下司農寺以為豐州初無役錢麟府州鄉村户歲輸二千餘緡請如絳奏而以太原汾澤晉絳寛剩役錢補之定州路安撫使韓絳言北界崔士言屢至安肅軍刺事結東京商人蘇文圖寫河北州軍城圍地理士言為本軍百姓誘至閻臺村南兩界首執之詔士言未過南界遽已捕執慮别致引惹自今緝知北界姦細須誘入省地方許收捕仍詔吿捕蘇文賞錢千緡班行内安排詳定禮文所言今祭祀既用三代冕服而加以秦劔殊為失禮伏請去劔又言奏事郊廟不當脫舄履應儀注内設解劔脫舄履褥位并或内佩劔納舄履等並行改正從之二年十月十七日依奏比以禮文增入更詳之癸丑詔自今秦鳳路告發坑冶轉運司一季不興置即令經制熈河路財用司管轄樞宻承㫖司言㑹計減罷開封府界廵檢縣尉下兵員弓手請受雇錢等以給大保長教藝錢從之令承㫖司立教閱法更支府界坊場錢二萬緡給保甲乙夘太皇太后崩于慶夀宫百官入班宫庭時宰臣吳充以疾不至王珪陞西階宣遺誥園陵制度依昭憲明徳皇太后故事施行上事后致極誠孝所以娛悅后無不至在宫中從后行必扶掖視膳定省惟謹后待上慈愛天至上御朝退稍晩后必自至屏扆候之或自持飲食以食上始終十餘年外庭無由備知本朝故事外家男子未嘗得入謁后既髙年多疾弟佾亦老上為后言宜數召見以自慰懌后輙不許請遷佾官亦不許一日佾因侍上從容上固為之請得入謁后乃許之上自與佾同至后閤坐少頃上先起令佾得伸親親意后遽謂佾曰此非若所當留也趣遣隨上出后有逺祖葬河南墓垣乆毁遣内侍持鏹募工葺之仍戒以謹宻不可分毫擾州縣將訖事人無知者既而内侍死於墓所鄉耆以聞人始知之成都運判楊國寳為河南尉親見此為吕陶言之及崩上哀慕殆不勝喪后卧内緘封一匱上發視之則舊合同寳也仁宗時因火失寳更鑄之後淘井得舊寳故藏之匱中而人無知者元祐六年二月監修國史吕大防奏禀慈聖光獻傳内后有書一匱常嚴鐍置卧内人莫知其為何等書也嘗因疾病以其匱送上所戒曰至大故乃啟之數日后瘳謂上曰前匱啟乎上曰不也后曰甚善即復收藏之上仙後上開后所緘匱則垂簾時事非世所得聞又一籍則后殿中物無大小皆書之案籍不差毫釐右史官得之傳聞未審虛實欲乞批降指揮慈聖光獻傳内后有書一匱事此一事乃是仁宗朝舊合同寳一面因大内火災失去仁宗别鑄造合同寳一面乃今合同寳是也舊寳後因淘井得之后常收藏嚴宻不欲使外人知之是也即非垂簾時事此史官得之未詳此並據吕大防家所收詔札及批降文字元豐三年十月慈聖光獻皇后上仙既殯乆之上親至慶夀宫閱視后遺物得一奩緘封甚宻舉之頗重左右取以進上命啟封凡發緘數重復以牛革縵罩甚固破之出其函既啟鑰得奏書一通上取讀之乃英宗不豫時宰臣韓琦奏請于皇太后乞尊立帝為太上皇之疏也上覽之意極不懌始知琦當日之謀頼后明聖不從其請緘祕其書以詔後人文潞公私記有此事其信否不可知當時史官奏禀必此事也今所修慈聖光獻傳已用批降指揮修立此事不復見光獻太皇太后元豐四年春感疾以文字一函封鐍甚宻付神宗曰候吾死開之惟不可因此罪人帝泣受后疾愈帝復納此函后曰姑收之是年十月后上仙帝開函皆仁宗欲立英宗為皇嗣時臣僚異議之書也神宗執書慟哭以太皇太后遺訓不敢追咎其人故帝宫中服三年之喪盡禮盡孝者知慈徳之不可報也此據邵伯温聞見録第三巻與文彦博私記畧相似既有吕大防奏禀及批降指揮則當以實録為正今姑存之于此縁批降指揮獨大防家藏真本臣燾實親見亦已從成都轉運司繳進矣伯温稱四年春誤也蓋是二年春丙辰百官朝晡臨于慶夀宫三日止又朝臨四日止初禮院言昭憲皇太后故事百官朝晡臨三日止詔加朝臨四日宗室朝臨至成服止禮院又言明徳皇太后故事京城内外禁樂至皇帝釋服如舊詔過卒哭丁巳詔后弟昭徳軍節度使兼侍中佾入臨仍被髪行服子姪誦評諭誘誌讀並凖子為母䘮服免朝參不釐務見任俸給並如舊時評為遼國信副使令乘驛還闕以西京左藏庫副使兼閤門通事舍人河北沿邊安撫副使劉琯代之命雄州止以評疾報北界戊午詔易園陵為山陵新舊紀並載詔書命參知政事蔡確撰哀冊文同知樞宻院吕公著撰諡冊文翰林學士章惇撰諡號文龍圖閣直學士韓縝書哀冊諡冊諡寳文己未命韓縝為大行太皇太后山陵按行使昭宣使入内都知王中正副之庚申詔大行太皇太后山陵非乆修奉可預戒三司斟酌轉移應副毋得寛剩計置除京西路轉運司自合供辦其諸道非抛降毋得妄有進助辛酉命宰臣王珪為大行太皇太后山陵使判太常寺陳薦為禮儀使御史中丞李定為儀仗使知開封府錢藻為橋道頓遞使同判太常寺陳襄為鹵簿使後襄辭疾以翰林學士蒲宗孟代之時中書言本朝命儀仗鹵簿二使或因闕官或縁誤例御史中丞皆得領之今案昭憲明徳皇太后例差御史中丞兼儀仗使天聖二年南郊差御史中丞薛奎為鹵簿使㑹要引故事御史中丞當為儀仗使國初尚依此制其後中丞或闕以他丞郎為之其職掌猶用臺吏如故儀仗使無專掌但令憲司督促諸司而已天聖明道皆有中丞以為鹵簿使非舊制也新紀書命王珪為山陵使舊紀不書又命入内副都知李憲為山陵都大管勾入内東頭供奉官寄六宅使慶州團練使宋用臣為都大提舉修奉皇堂是日百官拜表請聽政詔答不允自是七上表乃詔竢終易月之制有司定日御殿新舊紀並書七上表禮院言昭憲明徳皇太后故事内有年歲深逺禮制不全欲乞參詳比類山陵案例申請施行從之壬戌命馬軍都虞候金州觀察權管勾侍衞馬歩軍司燕達為山陵修奉總管專管禁軍䕶役宋用臣等專令總役兵修奉兩司毋得侵越三司言自今押汴河及江南荆湖路綱運請以七分差三班使臣三分差軍大將殿侍從之初詔以三班使臣在班常不下三四百員有至一二年方得差遣者而三司軍大將不足庫務綱運闕人管押令三司議以使臣代之仍定理任歲限賞罰之法三司乃言汴河糧綱舊法不限分數差使臣其江南荆湖四路許差使臣五分并舊不差使臣路分若悉以使臣代之禄食視軍將所費為多故有是請癸亥雨土新舊紀並書今削去甲子為太皇太后成服于慶夀宫百官成服于内東門外入奉慰于慶夀殿之東廂慰皇太后皇后於宫門外
