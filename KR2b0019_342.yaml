body:
  text: 續資治通鑑長編卷三百三十八宋李燾撰神宗元豐六年八月甲戌朔永興等路提舉司言安撫司近出公據錢二十萬緡召人入便每百緡貼納錢十千本司相度除緣邊州軍外欲依安撫司例施行從之户部言開封府界諸縣積缺坊場錢雖令賣産抵當纍嵗無買者乞拘收見缺三分以上産業估價折納入官從之陜西轉運司言同州韓城縣山鐡礦苗脉深厚可置錢監及渭州華亭縣博濟監因循廢罷欲於黃石河鑄治務復置監廢秦隴州鐡監從之嘉州刺史任澤卒上幸其第奠之贈昭信軍節度使諡恭僖後又賜澤墳寺為旌孝禪院嵗度僧二人紫衣或師號一人乙亥知貴州熊本言提㸃刑獄彭次雲所乞禁馬戰之術不使入外域及招馬軍貴保詢鄉貫並乞令雍州馬軍於桂州習學輪赴雍州防托竊詳馬戰之法所從來逺交址果有馬可用未禁以前應用馬戰桂州至雍州十八驛不惟道途往復勞費南方夏秋毒暑煙瘴使之涉歷山川人馬俱敝恐不可施行乞自今本路招刺馬軍依近降五路招軍法從之六月戊申七月辛亥詔今後執政官除拜赴景靈宫恭謝差閣門祗候或看班祗候一員禮直官一名隨逐入殿引揖祗應密記八月二日詔丙子詔開封府界河北東西河東路團教保甲宜自來年為首依畨次遣官案閲仍每至正月具當案州縣都保先下提舉保甲司專責文臣豫納所用銀絹以備行賞不得臨時乞於他司假借水部員外郎王諤言滑州河水正向南岸魚池掃所以每嵗危急乞於北岸開展簽隄於河道使濶則水勢順詔都水監丞陳祐甫相視以聞已而祐甫言開展簽隄馬頭地步稍濶即難繫浮梁今掃後舊有直隄一道若就來嵗春夫修築使加髙濶以禦向著水勢實為長利從之權發遣鄜延路經略安撫司公事劉昌祚言比有寨主部將等闕無得力官可差乞下吏部選曾經邊事使臣三十人至本司許量人材次第奏差從之詔御史勘公事權罷本職不得與在外官吏往還從中丞黃履奏也履言本臺推鞫公事至有逾年而後畢者迂為行遣以致淹久欲自今本臺獨勘或外官同勘並令宿直仍罷本職不與在外官吏交往而吏人食直隨獄大小立以三等為之給式大者三十日中者二十日小者一十日過此雖獄畢亦不給而官員食緡亦少裁損詔尚書省立法送中書省取㫖食直當考行否又詔以四后升祔禮畢賜陪祠羣臣宴於尚書省新記於丙子日書宴升祔陪祠官舊紀不書已卯太白晝見兩紀並書此知河陽太中大夫張問言齒髮遲暮乞提舉崇福宫上批如藩郡見今無闕即依所請乃徙之潞州詔定州新倉月糴糧數甚多恐推行糴法未至及監糴官非其人可速下本司檢察詔聞契丹遣人使夏國及總噶爾慮是西人干求契丹欲因和解董戩可下李憲選使臣開諭董戩鄂特凌古以契丹與總噶爾相去極逺利害不能相及令監守前後要約協力出兵攻討西賊江淮等路發運副使蔣之竒言長淮洪澤河實可開治願亟興功詔陳祐甫相視以聞十一月己巳祐甫云云陜西轉運副使范純粹奏準朝㫖指揮令河東路轉運判官蔡曄每年入中或移稅糴從便計置粗細色斛斗一十萬石於吳堡寨永寧關樁積今轉運司計置腳乘津般前去米脂寨等處吳堡僻在河外又深近賊界往來雖逺未便今永寧關自開拓邊面已來却在近裏本關自有橋渡與河東晉絳石隰州相望若令河東轉運司於石隰晉絳等州擇與本路順便處就近支撥斛斗除五萬石依舊永寧關納外將合赴吳堡寨納五萬石由永寧關赴青澗城納一則免侵近賊界一則免雇腳般運之費上批純粹奏請允當宜火急與指揮此據御集九月七日己卯更詳之庚辰上批聞有百姓朱六言河北轉運使寋周輔建議於河北借支元豐庫官錢修倉却於在京降度僧牒撥還其管勾官先以牒賖賣與賈人湯七而周輔子承務郎逢辰乃與湯七以官錢為子本販易令御史臺照㑹施行先是少府監修製官宋世隆攬載定州糴買糧草錢輒移易自用而承辰復私貸錢於世隆有㫖送大理寺推勘尋以獄官妨礙移御史臺及是復有言逢辰貸度牒事者故就令劾之十月丁丑翟思劾周輔二子禁錮癸巳獨承辰責當考自先是以下朱本增入新本削去兩浙轉運司言犯盜徙五百里外州軍無放還法乞比移鄉人例故從便從之上批鄜延路第七將李師古奏出師城築山界有大害者三乞赴闕面論事其狀已降付三省樞密院宜速處分令具所欲論事狀親書入急遞聞奏此據御集要見竟如何湖北轉運都鈐轄司奏為權知誠州周士隆乞先且抄劄新割過地林大由楊溪古鐡胡耳等處户口别作一等量行犒賞外其西道候胡耳等處了當方行抄劄撫納兩司保眀委是利便從之密記七日事要見胡耳西道經始附此胡耳西道已見五年十一月辛巳將作監丞宋彭年為將作少監上以彭年能發蒲宗孟修西府事特擢之詔濮安懿王任夫人父贈左監門衛將軍周贈寧國軍節度使母仙源縣太君張氏封遂國夫人兄守固贈資州防禦使守沂贈昭州防禦使詔差府界第二將京西第四將赴鄜延路京西第三將赴河東路以兩路言諜報邊警乞增兵也仍令劉昌祚王居卿如邊警未急即且以所差將兵於近裏易得糧草州軍駐劄以備勾抽鄜延路經略司勾當公事曹輔乞陜西諸路戶絶及官田産不出賣選官置局與民分種下陜西轉運提舉司同具利害以聞既而不行熙河蘭㑹路經略制置司李憲言本路雖有九將之名其實多闕數緩急不給驅策又漢蕃兵馬雜為一軍今未論出戰而其它為害己多蓋由漢蕃語言不通部分居止以至飲食悉皆不便非李靖所謂蕃落自為一法之意臣今至熙州己各定五軍將副及都同總領蕃兵將用逐州軍正兵漢弓箭手各為一軍其蕃兵亦各為一軍臨敵之際須至首用蕃兵次用漢兵繼之庶氣勢相臨雖遇堅敵亦無退却之患兼不妨漢蕃迭相為用欲乞將本路正兵漢弓箭手只為五將所貴軍分整足兼可減并將副及部將員數從之詔按閲開封府界將兵賞物并支封樁禁軍闕額錢陜西轉運司言凖樞密院劄子陜虢華耀曽經運糧入界收身不到并被傷身死人兵等並第賜絹緣本路闕少物帛欲乞支賜價錢從之壬午劉昌祚言已牒副總管姚兕領兵駐延州龍安寨又慮賊揚聲出本路而或欲由它路入冦己令逐將伺候若賊分兵往别路即令出其不意㑹合攻討詔昌祚分兵駐劄人數畸零若西賊併兵為冦恐不足枝梧可用吕惠卿分將條約各定戰守之兵無令勢分見露寡弱遇賊入冦須度衆寡戰必取勝或但能堅壁使賊無所侵略亦足困敵兵以此戒敇諸將上批吏部尚書李清臣依先靣諭編進本部見𨽻籍承務郎已上鄉貫出身歷任及所歷差遣功過目為備選具員凡十册於朝廷官使人材實亦有助宜令依本録上中書省照用詔自今户部考較提舉官功過係上下等送中書省取㫖癸未宣德郎陳師錫寋序辰承事郎太僕寺丞趙㞦並為監察御史㞦以父抃年髙無兼侍乞免從之序辰周輔子師錫建陽人也甲申手詔付劉昌祚得卿奏布置本路禦賊次第甚善巳發開封府界兩將兵往賊若更無和意必欲竭盡死力爭占新疆則勢終不可安帖用兵特有遲速爾卿宜博訪昨經永樂圍閉之人索賊方略意外大作隄防料賊非舉國之衆安敢輕入萬一分兵圍守新寨以徑騎數萬直趨延州則兵將分部隔絶或失常山之勢又將副人材能否不齊若輕舉動為賊所沮即傷一路士氣滋賊凶焰宜更圖長策賜河中府度僧牒二百八十修浮橋隄岸權發遣河北轉運使吳雍言糴便及創行鹽法須官吏協力乞許不拘常制奏名選差從之提舉經度制置牧馬司言已遣官往諸路選買牝壯馬上京乞逐路專責監司一員提舉從之令諸路差提㸃刑獄官開封府界差提㸃官知麟州訾虎等奏乞豫指揮如西賊果入冦令諸路乘虛進討詔麟府路軍馬司指揮如本路及别路關報委有賊馬犯邊即依所奏乙酉詔付劉昌祚所策西人舉國入冦本路及朝廷措置已悉惟憂緩急賊至將官希功輕出擊賊若有挫衄則所繫不小切宜痛自戒約蓋賊之㸃集在彼極不易為力狂謀僥幸一勝大有虜略乃可自償我能堅壁清野使賊空來不如欲而退則在我已為全勝矣更可嚴敇諸將勿希竒功前行去宥州牒本止是經略司凖朝㫖許夏國通和後本司行遣不謂西人以為朝廷處分致使人冘豫不進卿更宜多方開釋之但得使者入界遷延嵗月則彼師可老我稼既登乃朝廷意也經略司牒宥州當考奉議郎試起居郎蔡京為遼主生辰使西上閣門使狄詠副之承議郎駕部郎中吳安持為正旦使供備庫使趙思眀副之北面黃旗事可附此蔡絛北征紀實云建北面黃旗者昔當元豐初魯公以起居郎借諌議大夫副以西上閣門使狄詠奉使遼國行聘禮畢而遼人老主令喻使人皇孫出閣時所謂皇孫後乃天祚也遼主嫡子死所以欲傳其孫有曲燕俾南朝使人預之魯公即力辭曰使人將聘幣以講兩國之好禮既畢矣則不當與北朝事再三力邀不已魯公詰其故則曰桑攀老矣北人自來呼其主桑攀獨此皇孫今亦欲分付南朝也魯公始曰北朝既有親仗大國患難相救疾病相扶持之意則使人敢不聽焉及使回未至國門國信所語録先上神宗皇帝讀之大喜且謂得使人體即降內批卿等來日可上殿來及朝見登對神宗深加稱奬因問彼國事如何可取否魯公奏曰以臣所見似未可取神宗曰聞彼方刷水鬢爭佩撚金香袋奢淫若此安得不亡卿以謂未可取何也魯公對曰臣聞國之將亡禮必先顛臣在彼時見其野外有奚車數輛植葦左右繫一小繩然過者必趨騎者必下臣詢謂何則曰太廟行宫也觀其上下禮法嚴肅猶如此況號令必行故臣以為未可也神宗皇帝默然信宿見蔡忠懷丞相確即語魯公曰吾弟前日對上謂蔡某却為北人遊說吾弟已有落職知安州之命矣魯公即以所奏語白忠懷忠懷愕然曰吾弟不知只十餘日前降出一黃旗題曰御容中軍旗第一靣是上有親征意魯公即對以疏逺誠不知朝廷機密但據所見直以為對爾忠懷又曰吾弟可少安翌日為魯公奏留而神宗可之曰必是蔡某得安石議論安石臨行嘗戒朕以此魯公後每曰實未始聞介甫之語也故黃旗事獨上舊悉之他人亦多不知也此事必絛飾說姑存之詔湖北已許招置巡檢土兵令湖南鈐轄轉運提㸃刑獄司同議依湖北例招置可否以聞前桐城縣尉周諤上書言四事其一言朝廷已赦西夏許修職貢戒邉吏勿妄出兵慮戎人冦邊吏或守詔書不出禦敵其二言都城已為崇墉深池非百步之間設為樓櫓則不足以備不虞其三欲罷試太學博士止選於教官教官則選試於上舍內舍及改科以來有出身進士其四乞嚴太學補試之法士嘗豫鄉書者不必補而後入詔中書省記姓名上日閲匭函小臣所言利害無不詳覽如此都提舉汴河隄岸司奏修置水磨畫一乞禁止茶鋪户入米豆外料等伴和末茶募告者一兩賞三貫及一斤十貫至五十貫上從之此據鹽冊八月十二日敇要考初置水磨月日故特書此元豐六年二月二十七日似初置月日又七年二月六日六月一日紹聖元年九月二十八日丙戌知荆南謝麟言麟以七月十七日除荆南代孫頎八月七日頎仍舊知荆南八日麟改涇州雍宜欽亷州及沿邊堡寨屯戍之地皆無二年之蓄乞乘此豐嵗更給度僧牒付廣東廣西湖南轉運司令應副宜州蠻事之餘於廣西等路近便州縣糴糧沿流運往廣西封樁從之其度牒每嵗止給五百限五年止其應副蠻事止付廣西路經略司十月七日可考真定府定州路都總管司走馬承受陸中言祁定州差禁軍防送罪人有違配法手詔朝廷新造法度頒行之初既已眀悉若有司尚敢不遵禀理須痛與懲治以肅慢令之人宜下提㸃刑獄李寧劾違法官吏縱逢非次赦恩不原十月二十一日吕公著降官先是定州以教保甲修城池建太倉中使旁午於道吕公著預戒有司謹飭餼勞然公著素靜重寡言接對有常禮初無所假借以是至者多不樂中被㫖市絲五萬兩供尚方已而中復獻計增市詔以付定州公著停其詔上言曰前所市者皆先期給緡錢故民力猶可辦今已涉深夏民間漸就機織以備輸納若倉卒再行收市人將受其害上悟即詔公著寢其事中又受㫖專董倉役日使人持梃立城西門民有以車乘輦薪蒸鬻城中者皆强致之倉所以供陶甓城中幾廢㸑公著命擒中所遣卒盡杖之一城歡呼公著之未至也中受命經始倉役即壞民居毁僧舍民有葬於倉西者中故築垣直其域中民號泣發其墓持喪而去其所占地蓋廣矣然不足於素慮者猶二百五十二楹中因請别度地建小倉以足之公著曰今二大倉所受已不資若又益一小倉徒費公私無益也奏罷之中既數被沮因借是以報怨云詔自今小祠亦供氷鑑從監祭白帝御史翟思請也丁亥權河北緣邊安撫司李諒言今嵗緣邊秋稼倍稔宜乘此賤價廣儲蓄實邊而近覩措置司所得朝㫖乃令每年止糴二麥外自餘并住糴仍禁民間私糴臣竊詳立法之意但欲盡歸新倉況中下之家田收至少盡赴二州中糴則所得贏餘不償腳乘仍禁民間私糴則慮因緣為姦分散糧穀出外不若乘此秋盛逐州軍廣謀收糴封樁欲更與糴官講求利害條奏詔措置河北糴便司如比去嵗糴價賤三分之一即於緣邊以時廣糴廣南西路經略司言乞優恤澄海十將馬雅妻子詔馬雅子求賜絹百匹初雅為交人所獲脫身走與追兵鬬得歸已推恩遷三資未受命而死故也戊子手詔劉昌祚據牒報西賊㸃集甚衆邈川一帶舊於蘭州報事主入蕃部例赴㸃集計賊衆三四十萬理必有之雖不悉為可戰之人衆寡十倍不可戰眀矣羌賊喜分輕兵誘近裏軍馬將官等僥幸小勝多食彼餌前逢大敵便致覆軍卿宜深戒之但令分布堅守俟彼師老氣墮然後雲合諸將奮擊仍慮賊馬既衆意在必得新復數寨多為畨次晝夜攻圍盡城中矢石以為困我之策則凖備之方卿更宜善圖之權提㸃秦鳯等路刑獄吕溫卿言臣近權秦州㸃檢將下軍馬武藝生踈人材尫弱多不可出戰及本州自今年正月至七月禁軍逃亡三百八十二人詢考其故蓋廂軍皆團結而自今嵗差蕃落等禁軍接送防護當直者計千餘人神勇等禁軍防送罪人者計二千餘人邊州物貴行路縻費尤甚用此預借請受破用軍裝飢瘦逃亡轉為冦盜臣謂朝廷置將領養士卒費不為少本以備邊而乃役使勞苦以至罷敝如此欲乞應陜西路諸州軍並許常留廂軍二百人節鎮三百人以備差使其諸州將下土兵並令逐路經略安撫司委將副親選分二等以人材武藝髙强膽勇有功者為一等不許差出材藝低下而嘗有過者為一等即依條差使各結為隊伍如此則勇者知勸懦者知勉嵗月之間軍聲必振從之令本路先施行辛卯詔中大夫尚書左丞蒲宗孟守本官知汝州工部侍郎王克臣將作少監鍾浚各罰銅二十斤工部郎中范子竒員外郎髙遵惠將作監丞韓玠各罰銅十斤宗孟坐違法繕治西府克臣子竒遵惠承都省批狀修造不經左右僕射書押乃即施行浚坐違法不分緊慢修造而玠為從及不趣行遣故有是責於是宰臣王圭蔡確各罰銅八斤右丞王安禮罰銅十斤皆以案後收坐㑹赦特㫖也圭等初皆納尚書省印家居待罪詔遣內侍復以印付圭等乃出視事先是宰執同對上有無人材之歎宗孟對曰人材半為司馬光以邪說壞之上不語正視宗孟久之宗孟懼甚無以為容上復曰蒲宗孟乃不取司馬光耶司馬光者未論别事其辭樞密副使朕自即位以來惟見此一人他人則雖迫之使去亦不肯矣又因泛論古今人物宗孟盛稱揚雄之賢上作色言揚雄著劇秦美新不佳也他日宗孟又因奏書請官屬恩上曰所修書謬甚無恩宗孟又引例書局儀鸞司等當賜帛上以小故未答王安禮進曰修書謬儀鸞司等人恐不預上為之笑罷朝安禮戲宗孟曰揚雄為公坐纍舊紀書宗孟治府第違法罷知汝州新紀不書因依尚書右丞王安禮為尚書左丞朝散大夫吏部尚書李清臣為中大夫尚書右丞端眀殿學士知鄆州曾孝寬為吏部尚書詔朝散大夫前知徐州趙鼎勒停坐以買箔為名差人般載家屬應徒二年私罪㑹赦特責之趙彥若志鼎墓云鼎知徐州發滕蕭倉粟以救飢人所全活甚衆轉運使吳居厚獻計𣙜利國監鐡嫌鼎沮議索綱船中得菴籠誣以成獄坐免御史翟思言大理寺勘斷告捕竊盜案問减等不給賞謂宜立法令告捕竊盜雖案問减等並隨减至所斷罪各給賞從之壬辰奉議郎劉拯宣德郎廣安安惇並守監察御史拯前已見上批聞開封府界巡檢下所用器仗鈍弊不可應敵宜令提舉官范峋具析合用名件以聞環慶路經略使趙卨乞神臂弓二千箭二十萬詔止給其半癸巳詔東頭供奉官致仕胡格落致仕為廣西路經略司凖備差使以經略司薦格計議辨正歸化順安州疆界有勞也甲午宣德郎南豐朱京為監察御史京言御史臺假之則重略之則輕今耳目之司屢進屢却則是言者不若靜默之為賢直者不若柔從之為知偷安取容雖得此百數何與國事耶他日入見上勞之曰昨覽奏疏其補多矣凡臺臣每奏事必豫告閣門得班然後入既請對以名聞矣翌日有截班入覲者乃退還臺及引見羣臣問朱京安在左右以實對有詔促之辰漏且盡留仗良久此據朱京傳增入傳云擢監察御史未踰月詔許專言事是時中執法與它御史相繼以言罷按中執法謂舒亶也它御史則不知孰謂又京為御史時察官皆得言事不待詔㫖眀年二月乃不許察官言事傳誤也詔宣德郎前鄜延路經略司管勾機宜文字徐勳特除名文思副使前鄜延路走馬承受揚元孫右侍禁安撫司管勾文字劉航左班殿直閣門祗候种朴各追一官勒停朴仍落閣門祗候文思使李圭內殿崇班李彥申東頭供奉官安合右侍禁楊逹右班殿直劉伯初宣義郎監延州鹽稅鍾正範各罰銅有差勳以虛詐鄜延經略使种諤未病困已前奏狀與李彥申等差遣仍僞學諤書名及盜用印元孫私役人航朴各奏事不實圭等各告囑差遣并報上不實大理寺上其獄故責及之於是安合等已得差遣恩例亦令改正四月二十一日丙寅五月十八日癸巳一日上蚤坐震怒謂輔臣曰朕通夕不寐思與卿等相見种諤死鄜延其屬有徐勳者盜用經略使印調發兵馬奏舉官吏幾何而不為亂也可命所在斬之王安禮曰矯用印宜若有罪當帥臣新亡其處報機急容有前期草定而未發者一旦用之以追成其志與夫竊發於平時以規其私者則有間矣願下於理以從吏議上曰卿獨安取此豈以勳文吏故且大臣有薦之者而善為之地然則韓存寶何罪安禮曰臣不識徐勳而存寶之罪所未諭也陛下以存寶為非罪而就戮則如勳者尚可效尤耶上歎曰朕平生未嘗作快意事如卿兄安石不斬沈起至今有遺恨章惇曰快意事豈宜作於是遣御史即勳所在繫獄既又敇御史曰敢出勳罪者以重論之安禮曰臣欲有所請願於詔語出字下增一入字則於文為完其後勳坐抵罪止於奪一官蔡確伺上意請投諸荒裔安禮曰陛下察知勳情付之於法而確有此舉不過乘陛下前日之怒耳確赧然恨之田晝作王安禮行狀云爾徐勳奪一官與實録不合當考録文思副使張仲謀子建補入內髙品以仲謀隨軍出界死事故也詔軍頭司自今諸路解發到武藝髙强兵級雖有減退如尚在同解發武藝最下之人上者並依元豐令施行賜環慶路經略司度僧牒千令貿錢十三萬緡别封樁陜西轉運司言軍興後初經郊賞望於本路所管封樁錢并銅錢監本錢內支見錢二十萬緡既而户部止乞支永興軍鑄錢監封樁銅錫本錢十萬緡如不足貼支華州陜府錢監銅錫本錢仍不為例從之乙未詔都水使者范子淵追一官知河陽張問罰銅二十斤先是子淵獻議役五萬人開修溫縣大和陂直河以回河流既而雨水瘴疫繼作死亡者甚衆問奏人夫艱苦乞罷役而子淵乃抵言全不艱苦及漏奏死亡夫數不實於是詔御史臺取勘而問所奏亦有誤故并責之禮部言國子監擅令主簿管勾錢庫收支監丞葉祖洽既準本監牒請監視開閉庫又再申令主簿管勾詔司業通直郎朱服丞奉議郎葉祖洽主簿承議郎王元各降一官差遣如故祖洽仍罰銅二十斤又言朝奉郎胡宗炎言伏見永安陵畢功又增修永昌諸陵竊聞陵寢無修造法乞寢罷凖朝㫖令本部太常寺祕書省太史局詳議檢㑹唐故事有修營之理今永安陵下宫修造更自朝廷詳酌詔依前降指揮興造丙申詔梓州路昨因瀘州邊事隨軍般運工築正夫之家依曲赦放免役錢外其餘雇人工役之家放一料役錢五分沿流州縣被差夫與騾馬外更差雇舟船水手之家加放一分從轉運提舉司請也丁酉以皇城使榮州團練使和斌為西上閣門使知雍州兼東南第十三將正月二十日二月十四日此可削詔廣南西路髙梧貴州澄海指揮各增招百人朱崖軍二百人並以四百人為額戊戌姚麟言昨開噶平摧鋒破陳將郝英隊下使臣孫茂宗及騎兵乞推恩詔郝英遷一官孫茂宗等十二人各減磨勘二年騎兵百人各支絹五匹太常寺言祠令嵗以春秋仲月奉祀帝陶唐氏於鄆州以司徒卨配而鄆州堯帝廟乃無陵寢亦無古跡乞從知濮州范子諒所言移兩祭於雷澤縣堯帝廟從之己亥知成都府吕大防言嵗額上供錦豫支絲紅花工直與機户雇織多苦惡缺負昨創令軍匠八十人織比舊費省而工善今先織細法錦及透背鹿胎樣進呈乞換充本府機院工匠詔成都府創用軍工織錦比較以前機法精好兼省工直並依所奏朱本以為事小不足紀削去庚子詔提舉保甲司三路比轉運司提舉視轉運使同提舉視副使同管勾視判官開封府界比提㸃司提舉視提㸃官同提舉視三路同管勾官並為監司其人從舉官恩數等並依所視職任內武臣教閲文臣催驅收支錢物各不得侵紊提舉河東路保甲王崇拯乞自今差使民兵以武藝優劣髙下立為力役之制逐司不得擅差撥詔樞密承㫖司著為令其後承㫖司言五路保甲非次欲差使乞關本司相度指揮訖奏仍須量人材所宜稱事差撥若擅差者徒二年從之詔聞知豐州王餘應非守邉之才令河東路經略司體量緩急堪與不堪倚仗以聞前河北都轉運使兼措置糴便寋周輔言司農寺市易淤田水利等司自來所計置糧榖並散在緣邉及近裏州縣其間七分白米然各去定瀛州逺難運入新倉今緣邉州軍闕米轉運司見收糴乞以此米兌糶與逐司令還價錢却令措置糴便司依舊糴九分白米從之神宗云米便要用當檢付已附靖國元年十二月二十七日定州路安撫使吕公著言河朔秋稔異於常嵗定州所修衍積寶盈二倉已成乞申敕措置糴便司比在市量增直參用見錢文鈔廣糴然據新倉見糴白米須九分以上太求精鑿則民難入中及訪問若不留一二分榖則易損壞況本倉已糴米復用人功攬拌今若止糴八分細米經年退去榖殼已是九分以上緩急支用不須舂變不惟省官錢糴數多兼可經久詔措置糴便司相度已而糴便司奏檢㑹糴法除年計合收糴九分己上白米外其封樁白米止要及八分以上與公著今所奏事理不殊當依已降朝㫖施行從之詔借軍須錢五萬緡與陜西轉運司支闕食漠蕃弓箭手賜涇原路經略司度僧牒千為常平錢禮部言已給過所立年額詔特給之熙河蘭㑹路經略安撫制置使司言本路諸將各闕馬昨被㫖令提舉陜西買馬監牧司選馬五千匹均填本路將下禁兵民兵闕數然今方撥得一千九百餘匹欲乞止令支馬價付五將樁管令自依買馬司所定格尺價直選買其所買即充買馬司年額之數從之八月熙河蘭㑹路經略安撫制置司言本路諸將禁兵民兵皆闕馬奉詔於買馬司選馬五千已給一千九百其未給者請以馬價付五將依格自市以其數充買馬司年額從之本志只如此修或即用之上批京都所造軍器動以萬計雖廣求制樣尚恐未殫衆善或不適用徒費工力聞鄜延路經略使劉昌祚屢諳戰鬭精於騎射而留心兵仗所用多窮要理委走馬承受霍丙諭昌祚令具所習用兵步戰器并目擊士卒禦賊可用利械入遞進呈九月十五日賜昌祚軍器本志誤以鄜延為涇原今從實録詔南郊式有皇帝稱臣遣使所遣官不稱臣自今依舊稱臣舊儀皇帝稱臣遣官亦稱臣熙寧五年沈括上南郊式以為被遣官亦稱臣不應禮改之至是復舊刑部乞應吏部補授大理寺左斷刑官先與刑部大理寺長二雜議可否然後注擬仍取經試得循資以上人充正闕以丞補丞闕以評事補詔刑部吏部同立法著為令其後著令司直評事闕選尚書及侍郎左選人丞闕止選尚書左選人仍經任司直或評事係親民資任者以上二件其初改官應入知縣人亦選正闕丞或司直評事見係通判以上資任者以上所選仍不限見任授訖未赴即曾失入徒以上罪已決或死罪若私罪情重者贓罪或停替後未成任各毋得入選都水使者范子淵言導洛通汴將及五年昨興役之初大河北徙距清汴逺列為隄掃以障遊波臣今相視水勢大河有可徙之理及上塞河兵夫物料數詔子淵詳度從南岸漸進鋸牙約水勢入新河具合行事以聞已而子淵奏於武濟山麓至河岸并嫩灘上修堤及壓掃堤并新河南岸築新堤計役兵六千人限二百日成開展直河長六十三里廣一百尺深一丈役兵四萬七十人有竒限三十日成合費梢草竹索為錢一十七萬緡有竒並從之詔自今强盜應捕者諸路下提㸃刑獄司開封府界下提舉賊盜巡檢公事司更不下他司辛丑户部言在京賣買鹽鈔場買鈔本錢支盡乞借末鹽錢二十萬緡買客鈔從之依元豐四年三月十八日詔買候價平奏取指揮㑹要九月二十八日事實録無之當考
