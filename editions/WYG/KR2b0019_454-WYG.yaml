body:
  text: 續資治通鑑長編巻四百五十宋李燾撰哲宗元祐五年十一月壬戌開封府推官王詔與知真州孫賁兩易其任孫賁即文彦博私記所云與韓忠彦交結言路者易任不知何故當考據蘇轍論冬温無氷詔實坐失入徒罪故罷府推四方館使隨州防禦使張利一為雄州團練使知滄州十月十三日可考先是九月間三省宻院共議以張利一張守約為軍帥進擬既允因有宣諭曰聞王文郁有邊功好作軍職吕大防曰實如聖㫖若將來更要人即到文郁縁今厯任九次皆未及二人也并諭及姚兕亦聞忠實可用退批聖㫖而許將揣上意即不書字宻具論列謂利一者誠一之弟刑人之家不可親任請用文郁於是三省宻院奏知為簽書不圓未可施行後二日簾前請許將劄子諭曰方疑此差除却得許將文字不若别商量遂罷既而外皆喧傳籍籍不一劉摯謂此事失於無所執持義當再進大防須分明辨理云此係聚㕔商量衆人元無異論不委將有宻啟如此如近日傳堯俞已簽畫過文字施行之後却不肯認亦依隨改之摯恐朝廷日輕綱紀浸廢欲以此語大防而不敢深言之不能無嫌也利一事今日再進欲依向日所擬上猶疑之遂以利一為正任知藩郡皆大防徇人無所執持故也延福宫使寧國軍留後入内都都知勾當皇城司張茂則再任給事中范祖禹言太祖時以聶崇義所撰三禮圖畫於國子監講堂伏見太常博士陳祥道専以禮學所進禮書一百五十巻比之聶崇義圖尤為精宻乞送學士院及兩制或經筵㸔詳如何施行請付太常寺與聶崇義圖參用詔送兩制㸔詳以聞御史中丞蘇轍言蘇轍劄子稱二日今附本日臣竊謂執政大臣所以代天理物範儀百辟陛下選於羣臣特舉一二人而用之其任可謂重矣臣竊見近日管軍闕人諸執政共議欲度越資級用張守約張利一此二人者才品俱下其實不允公議陛下一見知其不可而右丞許將即於簾前自破本議諸人退而進擬雖渉専恣而將隂入劄子意懐傾奪外議沸騰以為大臣相傾頃所未有昔公孫宏與汲黯同議奏事及至上前即背其説令狐峘隂受楊炎請求而公奏其事或為清議所鄙或為朝廷明主所黜臣知其漸不可長即行論奏曽未㡬日復聞樞宻副使韓忠彦欲取中書舊斷官員犯罪公案事干邊防軍政者樞宻院取㫖諸執政俱無異論各已簽書被㫖行下而中書侍郎傅堯俞徐自言初不預議為衆所欺求付有司推治與忠彦更相論列謹按祖宗故事文武官斷獄一出中書取歸宻院盖本院官吏欲分奪中書重權實為侵官然已經簽書徐知不便以見欺自觧若其他軍國機務事有得失皆以此為辭豈不誤國臣竊見陛下以至仁至公臨御天下雖海隅蒼生罔不知化而執政大臣務為傾奪紛爭無復禮義何以朝夕相規其餘諸人目覩其非皆以事相牽制不能糾正若非陛下特辨此二事曲直使知所畏憚此風浸淫朝廷何頼焉臣官在執法知而不言臣亦有罪惟陛下特賜裁斷孫升三章附二十七日癸亥草土曹諭等乞以先臣佾遺表恩澤二名併授與孫女夫黄持一官理選詔依前降指揮初諭等累以佾遺表奏陳乞持官不行後又乞以二名併授太皇太后終以異姓撓法不許四年七月二十九日甲子環慶路經畧司言寜慶州戍守保甲乞免今年冬教樞宻院言陕西縁邊事勾抽戍守保甲頗見勞費詔提舉永興軍秦鳯等路保甲司指揮應縁邊事差出本縣界保甲特與免今年冬教内一都保差出人及一半已上者其餘雖不差出縁係畸零不成隊伍亦與免教仍各具免教州縣都保人數申樞宻院先是許將以臺章居家待罪内降將自辨劄子云臣初與衆議不合進呈日亦言不可退而進擬亦不敢簽書即非變本議今既招人言乞行罷黜是月初四日甲子進呈臺章及將劄子吕大防叙差除利一事云許將元無論止曽言恐超資宻院再檢有例遂將上若一人未同豈可以進呈將止是迎合反覆臨時觀望却非有傾奪之意諭曰記得上来時將曽言不可料亦無他大防又言臣等踈拙承人乏而已其為無補實皆知罪然亦不至作姦衆人論議不同乃是相濟劉摯因曰古人以為上下雷同非陛下之福若人人相順從却不是好事但得各有公心雖小有不同而公言之是乃同歸于善也此乃劉摯日記増入乙丑門下後省言重祿人因職事取受財物及係公人於重禄人因本處事取受人財物故放債収息及欺詐不滿一百文徒一年一百文加一等一貫文流二千里一貫加一等共受併贓論徒罪皆配鄰州流罪五百里十貫配廣南家人有犯減正身罪二等坐之正身知情依本法其引領過度者減受贓人罪二等徒罪皆不刺面配鄰州本城者依别條罪輕者杖八十若許而未得减本罪一等徒罪鄰州編管十貫配千里即便借及買賣有剰利并賖欠各依取受法還訖事發減五等罪止杖一百並許人告即不枉法應配廣南者配千里應配千里者配鄰州應配五百里及鄰州者並依地里編管應編管者免告重禄法雖不枉法應減編配並準格給賞能自首給賞亦如之並候事狀明白日報所屬限三日先借官錢代支後以取與引領過度入家財充不足者除放告重禄法賞錢徒罪五十貫流罪一百貫配廣南二百貫從之新書並同或可削御史中丞蘇轍又言轍劄子稱五日今附本日臣近面奏樞宻副使韓忠彦改易祖宗舊法取官員犯公案事干邊軍政者樞宻院取㫖諸執政各已簽書被㫖行下而中書侍郎傳堯俞徐自言初不預議為衆所欺求付有司究治與忠彦更相論列臣竊謂大臣傾奪忿爭無復禮義非朝廷之福乞明辨曲直使知所畏尋䝉陛下以臣言付三省而堯俞忠彦皆晏然不以為畏臣竊惑焉謹按舊法官吏犯罪斷在中書刑政大柄非宻院所得専祖宗分職治事各有分限惟元豐七年十月十四日聖㫖應縁保甲事元係樞宻院降指揮取勘及保甲司乞特斷公案令刑部申院今年七月七日聖㫖應樞宻院降指揮下所屬體量根究取勘者亦令刑部申院取㫖據此二條令樞宻院得専斷官吏已係侵紊官制然猶止言元係本院所行及指保甲一事今忠彦縁此遂變舊法志求侵官既已不直而堯俞雷同簽書自知失職謂衆見欺求賜推治使衆人誠欺堯俞則衆誠有罪使衆誠非欺而堯俞以自觧豈得無過臣備位執法既劾其事陛下試下臣章若皆無過則臣為妄言安敢逃責若果有罪二人豈可黙然而已哉方今二聖聼政幃幄之中謙恭退託委政於下當此之時大臣側躬畏法避逺權勢猶恐不及今乃以貴故輕易臣言臣忝御史長官朝廷風憲所在輕易臣實有輕易朝廷之意臣恐綱紀自此廢壊伏乞再下臣章使各以實對臣非敢自重所以重朝廷也十二月末轍又論斷罪條丁邜轍又言臣聞人才不同明闇異冝剛柔異禀人君總覽多士無所不收隨其所長皆可施用惟有傾險小人見利忘義不媿反覆公行背誕一有此心無施而可寘之列位猶且敗羣久在近輔豈不害政故在周易有之曰開國承家小人勿用而孔子贊之曰小人勿用必亂邦也聖人遺戒百世不刋臣今月二日面奏尚書右丞許將近因進擬除管軍臣僚與同僚初無異議及至上前窺伺聖意賣衆自售退而隂入劄子情渉頗僻乞降聖㫖明辨曲直使知所畏憚將自知過惡彰露上章待罪臣博采公議皆言將隂狡好利出於天性自居要近此態不衰久留在朝所害必衆况今二聖聼政幃幄萬幾決於大臣若事干軍國要務安危所係而將毎於共議輙先符同臨事觀變徐施詭辨以要大利則腹心之地自生機穽其誰安意肆志為國謀事衆人危懼皆不自安伏乞因其所請早賜施行以厭公論戊辰渠陽奏㨗此據劉摯日記増入其詳具十一月丙午己巳詔勿受傳堯俞韓忠彦許將乞觧機務章奏此據御集及政目政目不載許將庚午四方館使果州防禦使姚兕為通州團練使十月十三日可考壬申御史中丞蘇轍又言臣近奏論傅堯俞韓忠彦許將三人事内堯俞忠彦以職事忿爭至相論列失大臣之體臣備位執法理當詰問今既杜門請罪陛下矜而貸之臣不敢更加彈奏惟有許將先與同列共議進擬管軍臣僚及至上前窺見聖意即背始議以求希合退為除目若將不同亦當明言於衆俟别日再上取㫖今乃隂入劄子以傾衆人用情險詖意不由公而與堯俞忠彦得同押入視事公議驚怪以為罪既不倫而例䝉恩貸衆心不伏若使將毎事先且雷同及至簾前伺候上意徐乃異論以為忠直則今後誰敢安意肆志為國謀事况今太皇太后陛下聼政幃幄皇帝陛下恭黙自養當此之時左右前後冝得重厚正直之臣託以心腹寧使靖重椎魯有不及事之憂不容隂邪險躁有相傾奪之害今將之為人見得忘義頃自擢居丞轄常欲賣衆自售包藏禍心遇便輙發今幸社稷之靈因此一事使臣早發其姦陛下若又包涵不忍斥逐使之久在政府萬一事有重於差除管軍利有大於陷害同列將得伺隙竊發以要大利臣雖欲効愚忠言已無及矣伏乞陛下為社稷逺慮除此佞人以弭中外之患臣䝉被聖眷擢冠言路若見姦而不擊則負陛下多矣鈇鉞之誅所不敢避貼黄稱許將前後奏對外人本不知之縁將自以為功對其親舊稱述有胡宗囬晁端彦二人為臣具道子細盖將之輕脱如此又貼黄稱唐令狐峘為禮部侍郎宰相楊炎屬峘為故相杜鴻漸子封求宏文生峘謝使者曰得公手書峘得以識炎不疑書送之峘即日奏曰宰相廹臣以私從之負陛下不從則害臣帝以詰炎炎具道所以然帝怒曰此姦人無可奈何欲殺之炎苦救貶衡州别駕本朝至道二年李繼遷衆萬人㓂靈州上召宰相吕端等出手詔付之曰靈州孤絶救援不及賊遷猖獗未就誅夷令各述利害來上時上有意棄靈州既而悔之吕端奏曰張洎不過希陛下意欲棄靈州耳及洎奏上果引漢棄造陽朱崖事勸上上怒以其奏還之謂吕端曰張洎有奏果如卿料已還之矣古今明主所以深惡臣下反覆希合者為其借公議行私意所懐深嶮不可測知不早除去誠貽後患故也侍御史孫升言臣近同中丞蘇轍靣奏執政大臣専恣不務協心廢國紀綱其事寖多不可滋長内差除管軍一事中外傳播日久實傷國體臣等職在風憲官為耳目上負國恩方二聖髙拱仰成之時是輔相一徳同心之日而尚書右丞許將預議廟堂明見可否既知除命未允固當執議不回而乃陽則聼從隂有窺伺迎合上意變異前言自謂獨持至公欲使過歸同列反覆貳心何異市井傳聞對衆宣言意在收恩掠美臣竊以管軍之臣乃人主爪牙所以自衞雖推擇之議當參詳於執政然除授之恩必使歸之人主今許將上乃迎合主意中則傾覆同列下欲收恩爪牙大臣懐姦如此朝廷何所頼焉伏望二聖詳察早賜處分又言竊觀自古姦臣皆以貪利忘義不信不忠為國大患盖貪利則必忘義不信則必不忠苟為後義而先利不奪不厭未有不信於朋友而能忠於君父者也許將昔年成都買金已彰貪利之名今日廟堂賣友足見忘義之實既不忠於同列安能忠於陛下乎方今二聖至誠待人天下之事付之五六大臣治亂安危之所繫苟容姦臣在其中非社稷之福也伏望聖慈辨之以早去之不疑又言為臣之義善則稱君過則歸已故書曰爾有嘉謀嘉猷則入告爾后於内爾乃順之於外曰斯謀斯猷惟我后之徳則是歸美於君不為己有者乃大臣之事也廟堂之論軍國之機漏露宣泄患害隨之不可不謹故易曰君不宻則失臣臣不宻則失身㡬事不宻則害成是以君子謹宻而不出也則是國論可否謹宻不出者乃君子之㡬也今尚書右丞許將為陛下股肱心膂之臣所與共天下之事同心一徳者不過四五大臣而已况差除管軍為國重事必湏累經三省樞宻院聚議固非出於一日倉卒之間也若一人議論不同則無由進擬於上且張利一姓名既已經進擬之後許將方反覆異論不簽除目獨入文字乞不降出假使許將之言一出於己雖不免賣友面欺之惡名然猶當稱美於人主使環衞爪牙之臣知歸恩之地又况聖語先有宣諭許將方從而反覆則元不出於許將本心而出於陛下聖意明矣今許將乃自以為功對衆宣言漏泄國論收恩掠美以為己有内則環衞爪牙外則搢紳士大夫莫不宣傳其説乃至胡宗回晁端彦軰逹其言於御史中丞則是張利一差除本末良由許將漏露自誇所以中外人人詳知也臣謹按許將身為大臣面欺同列漏泄國論收恩掠美既不能歸美於君失大臣之義又不能謹宻不出亡君子之㡬懐姦反覆不信不忠何以任二聖股肱心膂之託乎伏望聖慈省察臣心檢㑹前奏早賜施行則天下幸甚殿中侍御史上官均言請六曹寺監編集體例各分門類令吏部刪修右選條格左選置選人名籍詔吏部詳度以聞均集有全章今但從舊録存其畧殿中侍御史岑象求言秀州嘉興縣民數千詣縣訴水灾知縣王岐主簿王旊不為收接因此百姓喧閙致踏殺四十七人本州又減數申監司仍庇䕶令佐歸罪百姓詔王岐王旊先次衝替并秀州干繫官並令本路提㸃刑獄司取勘具案以聞三省言元祐五年秋季入流一百二十八人四年秋季入流一百三人五年比四年多二十五人今以前次科埸大禮奏薦轉員換授人數以三年分為十二季酌算内一季約一百五十四人有竒并元祐五年秋季入流一百二十八人合為二百八十二人復以身亡致仕刺配改歸田里勒停丁憂尋醫侍養假滿落籍分司及叙用服闋尋醫等參部人比折外其事故多二十一人詔開封府司録檢校庫人戸抵當滿二年不抽依條估賣依四抵當所例詔臣僚曽賜金帶後至不該繫者在外許繫政目同元豐五年正月二十九日又四月二十七日又紹聖元年十一月十二日又崇寜二年七月二十五日四年二月十三日大觀二年五月十七日當并考甲戍提㸃河北西路刑獄張商英為江南西路轉運副使提㸃永興軍路刑獄孫亞夫為比部郎中比部郎中錢曜為河北西路提㸃刑獄㤗寜軍留提舉醴泉觀李珣知邢州從其請也給事中范純禮駮珣錄黄詔珣與小處政目十八日李珣與小處當考盖縁范純禮駮奏也劉摯日記十八日給事中范純禮駮珣録黄今亦附此詔河北罷撫養回易錢河東陕西撫養毎季申都省此據政目十四日所書増入當考河北又注三州當并考是日御史中丞蘇轍侍御史孫升同奏臣等今月二日面奏尚書右丞許將近因進擬管軍臣僚前後議論反覆希合聖意傾害同列盖其為人見利忘義難以久任執政乞行降黜尋奉聖㫖未以臣等所言為然臣等竊以明君用人順己者未必喜逆己者未必怒要在察其誠心所從來而已今許將與同列商量進擬皆無異言及至簾前因聖意宣諭即時附㑹意欲以此自竊守正之名而陷同列於不忠欺罔聖明固結恩寵而已伏惟二聖睿知清明照見羣下情偽動推至公必不以順己為悦將之嶮詖中外共知今所以遲遲而不決者正由當時進擬之初衆人議論可否之實未逹於上前爾臣欲乞指揮宰臣以下詳具於是何月日商量進擬管軍臣僚當時何人以為可用何人以為不可用仍具可否之語自後直至進呈之日凡更㡬次商量并具有無可否之人若許將於前商量之時無異議但於簾前探測聖意徐為異同則其反覆傾嶮更無可疑自當責降若將從初實有異議而宰臣以下不俟僉諧直便進呈則事屬専恣亦合有罪如此推究而將與宰臣以下率皆無過則臣等職在耳目而誣罔大臣瞽惑聖聼國有常憲所不敢逃伏乞出臣前後章䟽盡付三省施行但令將及宰臣以下及臣等一處明受責罰則中外釋然而公議允矣况二聖臨御以來本以公平無私深服天下今豈以一許將之故坐失衆望臣等區區志在為國振紀綱辨邪正惟陛下裁察貼黄稱許將不簽書者乃是簾前進擬後來不簽除自别入劄子即不見未進擬以前將曽有無異論乙亥尚書省勘㑹通判舊許舉選人改官自熈寜元年因臣僚上言磨勘人數壅併并令權罷昨來却許通判奏舉致今來復有待次改官人數稍多詔通判毎嵗合舉改官人數權改作奏舉職官仍自元祐六年正月一日為始候改官待次人稀空令吏部具狀申尚書省丙子詔來年正旦權罷大慶殿朝㑹戊寅左朝議大夫寳文閣待制新知荆南張頡被命至國門求覲未及對暴得疾卒按臺諫章䟽方垂簾而對者帥臣不與焉恐此乃誌頡墓者妄言傳因之當削去措置湖北邊事司奏言渠陽道路梗塞日久差管當公事官余卞與統制諸軍胡田有勞乞賜推恩詔胡田特遷六宅使余卞特改宣徳郎餘人分為三等内功効尤異别立優等保明以聞専切措置邊事官并本路轉運使及應在軍前官員使臣歸明班行等各等第賜銀合茶藥諸軍并召募効用人賜錢有差詔監臨主守以官物私自貨而㑹恩者元犯罪至死配本州不至死計贓五十匹者鄰州編管正議大夫致仕李徽之卒己卯御史中丞蘇轍言臣竊見尚書右丞許將賦性姦回重利輕義昔在先朝所至不聞善狀及知成都貪恣不法西南之人所共嗤笑還朝未㡬擢任執政中外驚怪不測所以是時諌官范祖禹吳安詩皆論將忝冐不可用之實不幸祖禹安詩繼罷言職故令將叨竊重位遂至今日臣自備位執法常欲為陛下除此佞人但以未有所因言無從發今因其商量差除管軍先與同列共議畧無異言及至上前探測聖意違背前説上以布合聖意下以擠排衆人人之無良一至如此正是市井小人販賣之道而寘之廟堂之上久而不去使貫得此便自謂得計見利輙發則其所賊害漸不可知故臣至此力言其惡而不知止也且臣自今月二日面奏劄子言傅堯俞韓忠彦及將三人將自知罪惡有狀即先待罪然端坐東府不返私第朝廷不遣一人畧加存問恩禮至薄前後五日方畧遷居及堯俞等倉卒就第朝廷方一例遣使押下將亦畧無媿恥隨衆視事都人指笑以為口實其貪利無恥至於如此今陛下但以曽經任使雖有過惡終欲蔽之曽不念朝廷名器皆祖宗所付畀而以私一許將乎伏乞檢㑹臣前後所上章付外施行丁亥刑部言犯外界青白及顆鹽一兩杖八十一斤加一等過徒一年十斤加一等一百斤皆配五百里本城一百二十斤絞再犯杖鄰州編管再犯徒一犯流皆配本城結集徒黨持杖興販依興販物法一百二十斤皆絞即非興販者二分以一分定罪罪止流三千里罪至流配本城二百四十斤配五百里本城親入外界博買者不以首從及興販非興販一斤徒三年三斤加一等四斤配千里七斤配二千里並本城十斤配廣南二十斤絞以上並許人捕罪至死者奏裁從之新舊並同或可削御史中丞蘇轍侍御史孫升殿中侍御史岑象求監察御史徐君平同奏臣等近奏論尚書右丞許將因進擬管軍臣僚議論反覆意在傾奪前後章疏除已䝉降付三省施行外皆留中不出凡臣轍所上四章臣升所上三章臣象求所上三章臣君平所上一章凡將平生貪猥之迹與今日背誕之情畧盡於此矣而天聼未回中外傾望疑陛下有欲保全之意臣等竊惟二聖聼政不出幃幄今日事體與祖宗不同祖宗親決萬幾廢置在已雖使左右或有姦佞亦未能妨害大政然或不幸有之按騐有實即皆逐去以今日太后仰成大臣皇帝恭已淵黙將之險詖情狀已露而猶遲遅不決此臣等所以憤悶而不能已也今御史與諌官相繼上章若非公議所嚮勢不能爾言已出口義無中輟若非許將罷去或言者得罪必不徒止也惟陛下稍紆聖心畧賜鑒察檢㑹前後奏請付外施行戊子二十八日輔臣晩集議陳安民事是日早中書出一奏狀欲差安民詣河北東西府界㳂河與州縣同括民間冒佃河灘地土使出租衆已簽圓劉摯留狀白衆曰此一事大擾須三二年未可竟徒為州縣鄉耆河埽因縁之利數十州百姓有驚騷出錢之患吕大防曰此頃年亦曽為之漕司今以兩河嵗計不足須當取此以助其費摯曰括田取租固未敢言不可但恐遣使不便不若下轉運司令州縣先出牓令河旁之民凡冒佃河田者使具數自首釋其罪據頃畆自令起租嚴立限罰若限滿即差官同河埽司檢按重立騷民受賄條法如此亦須年嵗可見次第今朝廷専遣使臨之其弊不可勝言大防曰甚好待别議行遣此據劉摯日記増入陳安民當考是何官資又不知别議後竟如何當并考六年四月六日安民以軍器監丞為利州路轉運判官此時或在軍器監為丞
