body:
  text: 續資治通鑑長編巻一百五十七宋李燾撰仁宗慶厯五年八月丙辰詔升祔二后依元徳皇后故事改題神主龍圖閣直學士起居舍人知秦州田況遭父喪辛酉詔起復況固辭遣内侍持手詔敦諭況不得已乞歸葬陽翟託邉事求見泣請上惻然許之帥臣得終喪自況始真宗封禪後不復校獵廢五坊之職鷙禽走犬悉放山林於是兵部貟外郎直集賢院李柬之言祖宗校獵之制所以順時令而訓戎事也陛下臨御以來未嘗講修此禮願詔有司草儀撰日命殿前馬歩軍司互出兵馬從獵於近郊壬戍詔樞宻院討詳先朝校獵制度以聞癸亥蕃官供備庫副使慕恩為洛苑副使内殿承制趙明為東染院使三班奉職李元成為右侍禁先是樞宻院副使丁度請下陜西旌擢蕃官之材勇者以勸其種人而環慶經略司言恩等數有戰功又為部族所服故特遷之甲子右正言知制誥楊察為契丹國母生辰使東上閤門使新州刺史王克忠副之戸部判官祠部郎中張堯佐為契丹主生辰使西上閤門副使張希一副之度支判官祠部貟外郎集賢校理李昭遘為國母正旦使供備庫副使閤門通事舍人李璋副之監察御史包拯為契丹正旦使閤門通事舍人郭琮副之克忠承衍孫希一耆子璋用和子也琮未詳契丹館伴者謂包拯等曰雄州新開便門乃欲誘納叛人以刺候疆事乎拯曰欲刺知北事自有正門何必便門也本朝豈嘗問涿州開門邪敵折不復言及拯使還具奏臣昨奉命出境敵中情偽頗甚諳悉自創雲州作西京以來不輟添置營寨招集軍馬兵甲糧食積聚不少但以西討為名其意殊不可測縁雲州至并代州甚近從代州至應州城壁相望只數十里地絶坦平此漢與遼古今所共出入之路也自失山後五鎮此路尤難控扼萬一侵軼則河東深為可憂不可信其虛聲弛其實備兼聞代州以北累年來蕃戸深入南界侵占地土居止耕佃甚多盖邉臣畏懦不能畫壕禁止今若不令固守疆界恐必日加滋蔓窺伺邉隙寖成大害銀坊城等亦縁此而致切不可忽也况即今邉上將帥尤在得人昔太祖經營四方選勇幹忠寔者分控西北邉皆一任十餘年不遷卒獲其效今則不然蒞事未㡬即圖遷徙又何暇於訓練備禦乎臣欲乞今後應㳂邉要衝之處專委執政大臣精選素習邉事之人以為守將其代州尤不可輕授如得人責以寔效雖有微累不令非次移替所貴軍民安其政令緩急不致敗事銀坊城事當考歐陽修論侵界已附五月末是年十月己巳詔劉湜諭北使令依誓約毁去銀坊城此時拯使北未還其上此䟽當在明年春間今因拯出使先附見之庚午資政殿大學士吏部尚書知亳州夏竦為宣徽南院使河陽三城節度使河東都部署經略安撫使判并州是日荆南府岳州地震辛未以升祔二太后神主遣官告天地宗廟社稷及永定陵二太后陵癸酉詔夏國比進誓表惟延州保安軍别定封界自餘皆如舊境其令陜西河東嚴戒邉吏務守疆土毋得輙有生事甲戌降河北都轉運按察使龍圖閣直學士右正言歐陽修為知制誥知滁州太常博士權發遣戸部判官蘇安世為殿中丞監泰州鹽稅入内供奉官王昭眀監壽春縣酒稅修既上䟽論韓琦等不當罷為黨論者益忌之初修有妹適張龜正卒而無子有女寔前妻所生甫四歳以無所歸其母擕養於外氏及笄修以嫁族兄之子晟㑹張氏在晟所與奴姦事下開封府權知府事楊日嚴前守益州修嘗論其貪恣因使獄吏附致其言以及修諌官錢明逸遂劾修私于張氏且欺其財詔安世及昭明雜治卒無狀乃坐用張氏奩中物買田立歐陽氏劵安世等坐直牒三司取録問吏人而不先以聞故皆及於責安世開封人也獄事起諸怨惡修者必欲傾修而安世獨明其誣雖忤執政意與昭明俱得罪然君子多之修論奏日嚴㨿何郯章疏第錢明逸劾修據修與蔣之竒辨第六劄雜録三有修八劄乙亥唐鄧等州都廵檢使禮賔副使宋吉荆湖南路捉殺蠻賊丙子詔廣南西路轉運司與鈐轄司體量邕欽廉近海三州宜融柳近溪峒三州知州兵馬監押寨主廵檢使臣罷懦不任事者别舉官以聞庚辰徙鄜延鈐轄内侍押班史志聰為涇原鈐轄知延州梁適言志聰與本路部署周美有舊隙故也鄜延經略司言夏國未肯明立封界詔保安軍移文宥州令遵守誓約指揮腰斬永寧軍雲翼軍士王宗齊䦨等十一人初宗與闌等謀刼庫兵為亂其從劉金因他罪自陳宗等既誅金亦當坐死特貸之永寕軍即永定軍天聖七年改名壬午監察御史李京言竊聞去年保州軍亂之後縁邉兵驕小不如意則譁言動衆近又永寧軍士潛謀竊發邉氓逺近不安嘗觀唐自至徳以後河朔兵驕鎮魏尤甚易主謀帥僅如置棊濟以姦臣跋扈朝廷威令不行斯盖不早制之失今縁邉主兵之臣既不遴擇其人及軍士作過不問亂所由起一槩被罪遂使驕兵増氣動要姑息守臣審前覆以避禍但務因循亂由是長今不早制之將復有至徳之弊也宜下兩府按邉吏罷懦不任事及綺紈子弟一切罷之如素練師律則使之久任其有軍士作過本非長吏生事者只坐召禍之人所貴驕卒畏威而革心守臣竭節以專事此非特張紀律之本亦所以制機事之先也九月癸未朔翰林學士王堯臣等言奉詔詳定選任館閣官欲請自今遇館閣闕人許帶職大兩省以上舉官有文學行實者二人在外舉一人更從中書采擇召試其進士及第三人以上自如舊例詔凡有臣僚奏舉並臨時取㫖丙戍詔審官院自今京朝官嘗為監司體量及半年無顯狀者具元奏上中書此叚當考不然削去庚寅詔文武官已致仕而所舉官犯罪當連坐者除之從翰林學士張方平之請也方平言坐繆舉而許首免盖責其當察所舉者之不法也致仕官既謝事不當與在職者同責遂著為令辛卯以重陽曲宴近臣宗室于太清樓遂射苑中癸巳復校書郎宋敏求為館閣校勘王堯臣等上其所緝唐武宗以來至哀帝事為續唐録一百巻故也詔近臣考先朝正史實録為景徳禦戎圖録故雄霸州縁界河廵檢内殿承制李用子宗定為下班殿侍仍著為例丁酉詔判并州夏竦軍事不及中覆者聼便宜行之湖南安撫使劉沆言與提㸃刑獄楊畋等八路入討蠻猺破蕩挑油平能家等處巢穴廣勇副都頭夏吉等四十八人諸軍十將至長行共八百八人各捕斬首級有勞請遞遷一資仍加支賜從之其應募進士區有鄰等十四人並録以官官區有鄰等在十一月丙戌今再書戊戌詔河東陜西縁邉州軍有以堪造軍器物鬻於化外者以私相交易律坐之仍編管近裏州軍庚子置南京留守司御史臺壬寅詔河東經略轉運司佃官地歸明人並蠲其差役其别自營創者如令癸卯詔河北河東陜西路鈐轄自今初除遥郡者其俸廪並依縁邉帶遥郡例給之甲辰徙江南東路轉運按察使兵部貟外郎楊紘知衡州紘常言不法之人不可貸如使肆貪殘於一郡一邑害良民千萬家不若去之不利一家爾聞者望風解去或及期不敢之官然竟坐苛刻下遷紘億從子為億後其為江東轉運按察使富弼所薦也紘已見丁未殿中丞李寔言自今臣僚所上章䟽凡迂誕詞語乞不行下四方從之此據㑹要當考冬十月甲寅遣入内供奉官康徳用為河東經略司走馬承受河東舊無内臣承受判并州夏竦特請之竦又言欲遣人齎土物招擕藏才諸蕃部詔前不係西北所屬及於誓詔無礙乃可竦在并州嘗以私僕侵盗産利杖殺之侍御史吳鼎臣言竦為天子大臣而貪暴不法如此願下有司正其罪不報鼎臣棣州人也吴鼎臣劾夏竦附見乙卯契丹遣林牙保靜軍節度使耶律翰樞宻直學士中書舍人史館修撰王綱來獻西征所獲馬三百匹羊二萬口又獻九龍車一乘契丹附傳正傳並不載耶律翰等來使惟實録本紀㑹要載之亦不知報聘者誰也當考戊午詔如聞湖南猺賊餘黨欲降其令本路罷出兵攻討及告諭逃匿者復歸舊處仍令州縣存撫之時唐和等猶未就執也辛酉祔章獻明肅皇后章懿皇后神主于太廟大赦前一日文徳殿奉安寳冊帝服通天冠絳紗袍執圭太常奏樂百官宿朝堂是日有司薦享諸廟日加寅帝復詣正衙宰臣行事官賛導冊寳至大慶殿廷發冊出宣徳門攝太尉賈昌朝陳執中並受寳冊升輅陳儀衛鳴鼔吹赴奉慈廟上寳冊告遷二神主皆塗太字大赦天下諸路轉運使昨帶按察之名比聞過為煩苛吏不安職至有曉諭州縣俾互相告論有傷風化無益事體其並罷之時執政沮改范仲淹富弼所行事因肆赦遂有此命去年八月乙夘以劉湜包拯等言但降敇約束包拯又欲因郊赦權罷茶鹽増課竟無施行今此升祔遂削去按察之名不知是誰申請當考初議者請覃恩百官且優賜軍士參知政事吳育曰無事而啟僥倖誰為陛下建此議者請治之已而帝語輔臣曰外人怨執政宜防諠譁育曰此必建議者欲以動揺上聴願毋慮臣既以身許國何憚此耶帝嘗遣中使察視山東盗賊還奏盗不足慮而言兖州杜衍鄆州富弼山東尤尊愛之此為可憂帝欲徙二人淮南育曰盗誠無足慮然小人乘時以傾大臣非國家之福議遂格甲子成州防禦使楊景宗為徐州觀察使仍給留後俸二后既升祔上念章恵故驟賜景宗也以延州馬蹄川新築城為安定堡安定堡見周美傳已附二年四月戊子戊辰契丹歸明人安忠信李文吉並為三班奉職淮南監當仍賜忠信銀三百兩文吉百兩初文吉等嘗為契丹刺事雄州至是來歸特録之己巳詔送伴契丹使劉湜北界近築寨於銀坊城侵漢界十里以其誓約諭使人令毁去之六月癸丑十月己巳當參考庚午上御内東門賜從官酒三行奏鈞容樂幸瓊林苑門賜從官食遂獵於楊村燕幄殿奏敎坊樂遣使以所獲獐兎馳薦太廟既而召父老臨問賜以飲食茶絹及賜五方軍士銀絹有差宰臣賈昌朝等言陛下暫幸近郊順時畋獵取鮮殺以登廟爼所以昭孝徳也即高原以閲軍實所以􅊰武事也問耆年而秩飲所以養老也勞田夫而賜恵所以勸農也乘輿一出而四美皆具伏望宣付史館從之王安石志孫抗墓云上大獵于城南衛士不及整而歸以夜明日將復出有雉隕于殿中抗奏䟽即是夜有詔止獵按仁宗以五年十月獵于楊村六年十一月獵于城南之東韓村七年三月即有詔罷獵而抗六年三月已罷御史其諌當是五年冬然五年冬不歸以夜又不在城南其在城南歸以夜乃六年冬事何郯奏議可考恐安石誤也今不取辛未始班歴于夏國戊寅太常博士監察御史裏行孫抗為荆湖南路體量安撫己卯責授右監門衛大將軍允廸宻州觀察使以赦牽復也庚辰罷宰臣兼樞宻使時賈昌朝陳執中言軍民之任自古則同有唐則命樞臣專主兵務五代始令輔相亦帶使名至於國初尚㳂舊制乾徳以後其職遂分是謂兩司對持大柄寔選才士用講武經向以關陜未寧兵議須一復茲兼領適合權宜今西夏來庭防邉有序當還使印庶協邦規臣等願罷兼樞宻使既降詔許之又詔樞宻院凡軍國機要依舊同商議施行十一月癸未邇英閣讀三朝經武聖略上曰真宗時李至言鄭文寳建議禁西界青鹽為失策如何侍讀髙若訥奏青鹽之禁西人至今失其厚利乃策之得至言殆偏見也上然之樞宻院請自今進退管軍臣僚極邉長吏路分兵馬鈐轄以上並與宰臣同議從之丁亥燕宗室於崇政殿辛卯詔提㸃京東路刑獄司體量太子中允直集賢院石介存亡以聞先是介受命通判濮州歸其家待次是歳七月病卒夏竦銜介甚且欲傾富弼㑹徐州狂人孔直温謀叛捜其家得介書竦因言介寔不死弼陰使入契丹謀起兵弼為内應執政入其言故有是命仍覉管介妻子於它州初徐州人告直温等挾妖法誘軍士為變而轉運使不受亟詣提㸃刑獄屯田郎中吕居簡居簡令勿言有不受者復與轉運使合謀捕直温等直温等既就誅濮州復有謀叛者民相揺驚潰居簡馳往得其首惡誅之大閲兵饗士姦不得發居簡䝉正之子也石介附傳正傳並云介詐死北走契丹先往登萊結金坑凶惡事富弼朱墨史附傳乃有往登萊結金坑惡少事附傳盖依弼叙前後辭免恩命辨䜛謗劄子按下詔京東體量介存亡在今年十一月辛卯此時弼猶在鄆州七年五月始移青州體量介存亡寔録但有此五年十一月辛卯一詔爾七年五月後不聞别下詔也弼劄子則云在青州再體量盖寔録不詳今别見七年六月末也時亦詔下兖州劾介死虛寔知州杜衍㑹官屬語之衆莫敢對泰寧節度掌書記龔鼎臣獨曰介平生直諒有是耶願以闔族保其必死衍悚然探懐中奏藁語之曰老夫既保介矣君年少見義必為安可量哉鼎臣髙苑人也國子監直講孫復責監䖍州稅孔直温敗索其家得遺復詩故也孔直温反寔録不記按體量石介存亡㨿石介𫝊為直温家有介書也然則直温反必在此年今附見復貶官事歐陽修墓誌云復貶在七年恐誤壬辰詔刑部應貶官人經恩赦敘授諸處行軍司馬副使上佐司士文學参軍不願之任者聴甲午邇英閣講詩角弓篇上曰幽王不親九族以至於亡楊安國對曰冬至日陛下親燕宗室人人撫藉豈不廣骨肉之愛也上又曰書載九族既睦平章百姓此帝堯之盛徳也朕甚慕之詔天下歳進甲仗須知一本仍令三司先為程式頒下樞宻直學士禮部郎中知延州梁適為翰林學士適告歸治塟事過京師得入見自陳前為朋黨所擠遂有是命侍御史梅直等奏彈不巳乃以適為侍讀學士知澶州知澶州在庚子日今并書之乙未邇英閣講詩都人士篇上曰古人冠服必稱其行今冠服或過之行未必如古人也又讀經武聖略至真宗朝李繼和上言國初李漢超在闗南以私錢貿易佐公用人或繩奏之太祖反令盡除所過稅上曰任人如此孰不盡力哉詔以邉事寧息盗賊衰止知鄆州富弼知青州張存並罷安撫使知邠州范仲淹罷陜西四路安撫使其寔䜛者謂石介謀亂弼將舉一路兵應之故也仲淹先引疾求解邉任是日改知鄧州是年十一月十四日罷安撫使據㑹要富弼劄子云即日罷弼安撫使按初十日有詔體量石介存亡後四日乃罷弼安撫使弼稱即日盖乗筆快於事不能無少差爾詔河東陜西經略司自今内屬蕃部毋得侵擾西界犯者當以軍法論如西界人馬先犯境方聽出兵捍禦之丙申降梓州路轉運使司封貟外郎崔輔知汾州轉運判官太常博士張固小知處州初輔等言欲於廣安軍魚子䥫山采礦炭置監於合州以鑄錢及銷舊小錢鑄减輕大錢未得報乃先牒合州度地置監合州奏其事特降之丁酉西南夷龍特以下七百一十九人來獻方物初翰林學士葉清臣居父喪言者請起復為邊帥既而不行至是免喪宰相陳執中與清臣有隙不欲清臣居内乃申用其言庚子改除翰林侍讀學士知邠州司馬光記聞云陳執中之為相葉清臣為翰林學士草其制詞少所褒美慶歴六年夏清臣以翰林侍讀學士自揚州移知邠州道過京師䄂麻詞草于上前自陳曰臣代王言不敢虚美當執中為相才徳寔無可信執中以是怨臣故盛夏自揚州移臣邠州水陸數千里臣誠無罪唯陛下哀之因改知澶州至官未逾月改知青州明年夏資政殿學士程琳自知永興軍移青州執中復奏移清臣永興軍清臣官時為戸部郎中上命遷諫議大夫執中云故事兩制自中行郎中遷左右司郎中今遷諫議大夫太優乞且令兼龍圖閣學士上許之故事新除知永興軍者當有錫賚執中復曰清臣近已得賜遂不與清臣愈恨過京師復于上前力言執中之短上命與之錫賚亦不受既而終赴長安上遇執中亦如故或曰往者執中自諫官左遷乘舟東下清臣自兩浙罷官歸道中相遇争泊舟之地遂相忿罵坐是有隙所由來乆矣按執中以慶歴五年四月拜相而清臣以三年七月丁父憂執中制詞安得是清臣所作記聞誤矣執中拜相制詞甚美决非清臣作也又按執中以寳元元年三月同知樞宻此時清臣未知制誥康定元年三月執中罷此時清臣知制誥已半年或清臣作執中罷樞宻制詞少所褒美記聞誤記又慶歴元年五月清臣自知制誥出知江寧其出知江寧乃吕夷簡惡之三年三月召入翰林七年丁父憂五年十一月免喪除知邠州記聞所稱盛夏亦誤且初免喪未嘗知揚州也六年三月將赴邠州過京師改知澶州若清臣自訴云盛夏自蘇州遣臣知邠州則可盖清臣蘇州人也今並不取辛丑命翰林學士張方平侍讀學士宋祁再修景祐廣樂記壬申殿中侍御史劉湜為禮部貟外郎兼侍御史知襍事議者謂湜探宰相意深致尹洙罪故得優擢甲辰右領軍衛大將軍致仕髙志寧左屯衛大將軍致仕趙振上陣圖賜絹各五十疋振落致仕為許州都監志寧特改殿中監致仕從所乞也振改官據韓𤦺墓誌振落致仕在十二月今並書皇祐元年六月又落致仕當考誰薦振者乙巳詔河北安撫司如聞自保州兵叛多務姑息恐軍情益驕其宻諭主兵臣僚常加撫御如敢輙犯軍律者亦聽法外施行丙午賜在京修十方監役卒衲襖丁未進士宋康濟為三班借職康濟親捕齊州賊十三人特録之己酉詔河北知州軍諸司使副以上舉殿直至供奉官武勇有謀略堪軍陣驅策者各一人曽任兩府舉二人仍一月以聞庚戍詔秦州六縣保毅指揮目今如敢私役者以計庸律論初涇原都部署程戡言陜西諸路舊有保毅軍詢諸邉人不知所置時逐指揮不計人數元不刺手靣父死子承籍不可脫原其初置之意盖欲緩急集扞邉陲近年唯充州縣夫役無復責以武藝比經㸃刺為保㨗軍而家猶不免有保毅之籍今皆孤弱下戸既應役不住即將田産析賣與人所買之家以分數助役至五七家共負一夫之役臣昨權知秦州見本處保毅軍毎斬材伐薪修城築堤未嘗暫息以至僦庸日不下三二百錢加有都將歛率誠可矜念况諸路已有鄕軍縁邉又有弓箭手請悉罷保毅指揮下陜西都轉運司議經久利害而通判永興軍太常博士邵良佐言陜西保毅軍舊制遇邉上有警暫集以守城事已則放歸農今鄜延環慶涇原三路别不占他役獨秦州賊馬未嘗至境其保毅四指揮僅三千常供役本州貧悴之民久廢農業乞朝廷重約束之故降是詔十二月壬子朔詔延州自今夏國有合議邉事先具經畫利害以聞其常事聴一面移文宥州癸丑宣州觀察使知潞州郭承祐為殿前都虞候并代副部署兼知代州始杜衍奏罷承祐軍職至是復之其後監察御史包拯還自契丹上言臣近者累奏河北㳂邉將帥未甚得人特乞精選其代州尤不可輕授縁代州與雲應等州相去至近路又坦平古今最是難控扼之所太宗朝以驍將楊繼業守之繼業殁以給事中張齊賢為代其重用人如此自後邉鄙無事然亦用武臣中有材略者今朝廷委任郭承祐必恐敗事按承祐累任無狀朝野僉知物議喧然以為不可且北敵請命歴年多矣然恩過則生驕安久則忘備理之常也况西北二冦古嘗惡其連朋協勢况釁端已兆此廟堂之上所宜窺之未萌而為國家逺慮也今天下不患乏人患在不用用人之道不必分文武之異限髙卑之差在觀其人如何爾必當考以應敵制勝之略詢以安邉禦衆之宜觀辭氣之瓌竒舉動之方重者擢而用之則取人之要無大於此况河北河東同時地震變異如是不可不懼臣先進劄子言之頗詳其承祐乞早令召還别用能者㳂邉守將畏懦不勝任者亦乞速賜移易若不預為之具緩急圖之則無及矣惟陛下特留聖意則天下幸甚麟州言西界人馬至屈野河西尋令指使殿侍魏智等引兵約回智遇伏為西人所執知州領衆逐賊至銀川寨賊遁去詔河東經略司累戒逐路務遵誓詔今西人本無鬬意而以兵逼逐為邉生事其邉吏並劾罪以聞以雪寒賜諸班諸軍薪炭乙卯賜澧州朱亶同進士出身亶居澧陽持父母喪負土成墳天聖中嘗有詔存撫至是州復舉亶孝行應袝廟赦書特旌録之丙辰詔廣南東路轉運司募人入交趾以刺㸃兵事冝俟得寔即優賞之時李徳政將以兵伐占城朝廷未知故也丁巳詔諸路縁邉經略司無得招誘西界蕃部己未詔河東經略司經制豐州一帶疆土毋令西界侵争先是桂陽蠻猺唐和等復入冦與禮賔副使胡元右侍禁郭正趙鼎三班差使殿侍王孝先戰於藍山縣華陰峒隘口元等死之十朝網要徐州人孔直温等謀反伏誅庚申以右諫議大夫劉䕫為龍圖閣直學士荆湖南路安撫使知潭州壬戌降知潭州龍圖閣直學士右諫議大夫劉沆知鄂州提㸃刑獄太常博士楊畋知太平州楊畋降知太平州據本𫝊寔録無之㑹要降畋在十一月二十一日降沆在十二月十一日今并書之癸亥知益州文彦博言本路兵久不習戰鬬請立法訓練詔先教以弓弩俟民間習見即又以刀鎗閲試之甲子賜司封貟外郎分司西京趙希言三品服仍賜錢十萬樞宻使王貽永副使龎籍丁度奏希言常侍講禁中年八十而家貧故也乙丑詔鄜延經略司西界首領楊守素欲過界自陳事宜其令保安軍引伴至延州如止是理索在漢人戸即以夏國元進誓表諭之戊辰河東經略司言比奉詔蕃部内冦即許出兵捍禦若西界人馬至境不許出兵詔如西界輙入先放箭射官軍即領衆掩殺之壬申賜延州東路修築安定等三堡吏卒銀絹有差癸酉新知潭州劉䕫言唐和等比經胡元敗後益聚衆生疑恐轉為邉患乞降空頭宣命十道欲行招安與補逐處溪洞首領從之䕫是月庚申乃除潭帥不應便有此請當考甲戍范仲淹言前涇原都廵檢禮賔副使孫用借公使錢瓦亭寨主左班殿直閤門祗候張忠過取職田課入並坐法勒停其人頗有武勇乞稍復官資責其効用詔以用為供備庫副使忠為右班殿直閤門祗候並極邉任使鄜延經略司言西界先擄過黄族軍主黄伊特等四十九人今投本族住坐詔經略司却遣過界其元受接人仍劾罪以聞已而經略司言黄伊特等畏誅與其族人各勒集兵馬願同死漢境况其投來在朝廷未降約束之前恐不當遣去以快西賊之欲從之鄜延經略司奏留黄伊特乃六年二月己未今并書之梁適以五年三月知延州沈邈以五年十一月三日自陜西都漕知延州代梁適留黄伊特必沈邈也梁適墓誌乃云適招還金明屬戸三千餘帳元昊日前所掠蕃生口有誓詔兩不復還矣遣人屢索之然卒不遣適本傳亦同恐即黄伊特事但沈邈不應明年二月未到延州適墓誌或誤今不取乙亥詔樞宻院自今翰林司皇城司不許陳乞丙子改諡崇信節度使錢惟演為文僖惟演嘗請章獻章懿二后祔真宗廟由此左遷既諡曰思及二后祔廟禮畢其子曖等訴於朝故復改諡丁丑契丹國母遣左領軍衛大將軍耶律觀祕書少監趙靈龜契丹遣左千牛衛上將軍耶律同崇禄少卿馬公壽來賀正旦戊寅開封府判官祠部貟外郎益都周沆為荆湖南路轉運使代周陵經畫蠻事也五年八月丙寅周陵已自封外除度判恐沆所代非陵也是歳天下上戸部主戸六百八十六萬二千八百八十九口一千五百二十六萬三千八百九十九客戸三百八十二萬五十八口六百三十九萬二百六十四
