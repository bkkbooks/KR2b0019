body:
  text: 續資治通鑑長編巻二百七十三宋李燾撰神宗熈寧九年二月丁亥朔廣南西路轉運司言討伐交趾差夫極衆桂州九縣籍定保丁止八千五百附保及單丁客户共九萬一千二百有畸今欲每差保丁兩畨即於附保人内差夫一畨各量給錢米及本司所勾抽官員差使欲望以官錢犒設從之仍特支公使錢五百千戊子觀文殿大學士知許州韓絳知太原府宣徽南院使雄武軍留後判太原府郭逵為安南道行營馬歩軍都總管招討使兼荆湖廣南路宣撫使改趙卨為副使仍罷李憲先是趙卨上言朝廷置招討使副其於軍事並須共議至於節制號令即乞歸一於是李憲銜之已而語卨令邊事止奏禀御前指揮更不經中書樞宻院卨對以朝廷興舉大事若不經二府恐類墨勑於事未便憲又言將來若至軍中御前有指揮事當何如卨曰事若未便軍中不聞天子詔當從便宜爾二人由是交惡屢紛辨於上前王安石白上中人監軍唐叔世弊事不可踵上因問卨若憲不行誰可代憲卨言逵老邊事上曰卿統帥令副之奈何卨曰為國集事安問正副臣願為裨賛上諾之始吴充與安石爭伐交趾利害安石言必可取充謂得之無益上竟用安石言罷憲而遣逵及卨安石雅不喜逵及有是命亦充所薦也神宗史交趾傳云王安石薦趙卨為主帥吴充因卨之奏罷李憲也以郭逵嘗害熈河事為安石所黜故薦逵代卨安石乃去位充果相逵逗遛駐兵不進卨欲早出師逵不從哲宗實録郭逵舊傳云王安石與吴充爭伐交趾事安石以為可取充曰得之無益及逵行充以書抵逵曰經久省便為佳逵由是玩兵不進按二書皆私意非公言也其實充不欲伐交趾而逵所以得用雖因卨薦或充實主之今參取修入罷憲出安石此據哲宗實録憲舊傳而新傳乃刪去按神宗以安石言罷憲司馬光亦記此事新傳刪去頗無謂今復存之其實卨不願與憲俱行安石因請罷憲故神宗從之若止是卨言憲亦未必罷也太常丞集賢殿修撰兼侍御史知雜事張琥罷侍御史知雜事知許州尋改河陽此月甲寅改河陽琥罷知雜事必有故當考又罷後遂不除知雜明年正月蔡確乃為之亦必有故當考詔占城占臘乆為交趾冦擾今王師伐罪可乗機㑹協力蕩除事平之日當優賜爵命酬賞乃聞彼國户口多為交趾所俘已委招討司檢括遣還惟占城舊王勢難復歸本國當召令赴闕撫以厚恩仍遣容州節度推官李勃三班奉職羅昌皓齎勑書賜二國藥物器幣交趾占城王事在熈寧三年二月乙巳又詔司農寺於秦鳯等路本寺銀絹或見錢内更賜錢十萬緡付轉運司令熈河路市糧草己丑熈河路經略司言總噶爾酋領果莊領衆自河州山後入冦至棟棟谷駐寨轉入鄂摩克谷焚略順漢族帳蕃官李楞占納芝等率衆邀擊斬首四百七十餘級奪馬三百餘疋詔有功蕃官首領各賜錦袍銀帶所獲首級依先降結隊法賞格如當轉資并合賞人令經略司具等第以聞又詔荆湖南北廣南東路轉運司各計度錢榖以備廣西軍興移用仍令廣東轉運司備二萬人九月軍糧庚寅知秦州司封郎中直龍圖閣張詵為天章閣待制再任以選人程夀孫等九人為安南招討司九軍主簿從招討司請也詔刑部郎中天章閣待制集賢殿修撰沈起責授檢校水部員外郎郢州團練副使本州安置不得簽書公事祠部郎中直史館劉彛責授檢校水部員外郎均州團練使隨州安置用御史蔡承禧之言也先是承禧奏風聞外議皆以沈起任桂州違詔招交趾降人并取其慈恩州引惹交人攻破州郡天下以為有罪聖語以為無疑中外士人皆謂已有聖㫖削籍編管而詔㫖中格又付周沃體量未知是非若實有此臣不敢黙臣聞漢武帝所以能成北伐之功者何也始王恢建議旣無功於馬邑而王恢戮周世宗之所以能有强兵拓土之功者何也樊愛能敗軍而愛能誅彼二主者雖不足以語道皆以必罰信賞訖致盛强臣伏覩近世治平之乆天下之紀綱文物故在也而國勢日卑臣職日壊由朝廷不以威斷四方得以窺望文吏可以髙下故也夫以法守者有司也以道揆者朝廷也朝廷不度於義而一之於法則法吏㡬何而不侮憲也有司不本於法而議以道揆則天下㡬何而不偽辨也故周禮所謂曰柄曰統者歸之天子以道揆者也曰法曰式曰則曰計曰成者責之臣下法守者也今若情法之未盡者陛下少以道揆則如起之罪不容於誅今欽廉既破邕管既危數郡髦倪縁生事幸進之臣横䝉屠害雖陛下德音中降而使節外馳想其事端憂未艾也今平交之師十萬方事之始罰不自信何以威懐其沈起伏乞不以屬吏特降前詔其劉彛亦乞先行國典以誡貪夫急進之人而慰二廣生靈之意南征將校知陛下行法之明有以聳動則其功不勉而成矣於是起彛俱責實録以為起彛並責因承禧有言然載其言甚略今取全章入之正月二十二日邕州已陷承禧稱既危則猶未知已陷也付周沃等體量在十二月二十四日再付招討司在今年正月初九日承禧又言廣南東路轉運使陳倩精神昬短乞别選材臣代倩從之代倩者不知何人當檢附是年六月初一日倩猶以廣東運副論事十年二月一日倩乃以廣東運副權發遣三司開折司實録於此便云從承禧所言必誤也姑存之詔以交趾犯順其應配廣南東西路罪人並權配三千里外知辰州皇城使陶弼為忠州刺史依舊皇城使再任賞修築下溪州城寨之勞也詔逐路共募武勇萬人赴廣西效用廣東五千人福建二千人江西三千人廣東委知廣州劉瑾轉運副使許彦先福建差内殿承制謝季成江西差御前忠佐馬歩軍都軍頭馬昌昌仍換文思副使於是樞宻院縁昌換官稍優因議轉員軍校換官有由行伍有功不乆已轉至團練使者上曰祖宗以來制軍自有意凡𨽻在京殿前馬歩司所統諸指揮置軍都指揮使都虞候分領之凡軍中之事止責分領節制之人責之既嚴則遇之不得不優至若諸路則軍校不過各領一營爾不可比也吴充等以本大末小為對上然之因言周室雖盛至成康之後寖已衰微本朝太平百有餘年由祖宗法度具在豈可輕改也贈荘宅副使廣南西路都監張守節為成州團練使供備庫副使邕州左江提舉兵馬賊盗温元裕為皇城使海州團練使内殿承㫖湖南都監張卞為皇城使横山寨主林茂昇為皇城使恩州刺史東頭供奉官權邕賔州同廵檢許譽永平寨同管轄兵甲蘇佐並為左藏庫使西頭供奉官邕州監押儂日新柳象賔州同廵檢王鎮宜州監税權太平寨監押郭永元並為文思使左班殿直太平寨同管轄兵甲伍舉為左藏庫副使右班殿直欽州抵掉寨主張首為文思副使三班差使欽州如昔峒廵防伍環前經略司指使劉昇並為内殿承制三班借差都鈐轄司指使康明殿侍柴齊經略司指使封嗣元並為内殿崇班皆以廣西與交賊戰死事故也又贈供備庫使廣西都監于辛為耀州觀察使西京左藏庫副使經略司凖備差使張渙為皇城使懐州防禦使供備庫副使知亷州路慶孫為皇城使舒州團練使内殿承制知欽州陳永齡為皇城使忠州刺史欽横州同廵檢梁竒為皇城使德州刺史容白州都廵檢潘若谷為皇城使恩州刺史東頭供奉官亷州㳂海廵檢李仲荀為左藏庫使西頭供奉官亷州監押周宗奭權欽州監押文良並為文思使三班奉職欽州監押吴福經略司指使李安並為西京左藏庫副使借職欽州㳂海廵檢蔣瑾權亷白州同廵檢沈宗古並為供備庫副使殿侍欽州指使宋道丁遂亷州指使吳宗立並為内殿崇班欽州簽書軍事判官大理寺丞梁克輔為司農少卿軍事推官李完為比部郎中司户叅軍錢世京為駕部員外郎司理叅軍劉昌宗前鬰林州司理叅軍曹可亷州合浦縣主簿梁楚並為比部員外郎欽州監税攝州歐陽戭亷州司户參軍蔡接司理參軍陳諫並為虞部員外郎皆為交賊殺害故也辛卯詔自今應官員及子弟并舉人非見有熈河路本貫輙至彼中納糴請官物者徒二年官司知情與同罪許人陳告賞錢二百千又詔中書樞宻院比較應副熈河路錢物數以聞比較竟如何當考市易司言昨被㫖本司以末鹽鈔錢貸河北耕人至秋成日償以米粟積為軍儲今乞差官於定州受敵州軍支納上批可指定州軍行下不湏張皇明言受敵壬辰詔賜陜西永興秦鳳等路轉運司折二錢各十萬緡市芻粟詔御史臺劾陜西額外剰納解鹽錢一百九萬八千餘緡違法官司以聞仍令三司止住額外出鈔多出鈔沈括有論奏在十年二月志同癸巳詔廣南荆湖福建京西南路轉運提舉司各協力應副軍興如稍誤邊計官吏當重黜責仍特借常平錢十萬緡賜廣南西路轉運司市糴買芻粟詔廣東福建江西募兵令更簡黥徒壮勇者别為一軍合所募兵萬人以備招討司濟師是日七日癸巳詔管勾東府使臣不得令王安石家屬行李出府以安石固辭機務也此據中書時政記當考乙未詔安南招討司陳述利害之人並随中軍仍毋得過十人安南招討司言行營九軍合用鐡蒺藜三十二萬四千以山險减半從宣撫司請也河北縁邊安撫司言雄州両屬户累值災傷採薪芻市蔬菜者乞不禁從之趙卨言鄜延路自今乞市白草與稈草相兼支給從之定國軍留後前知青州向經卒于淄州上廢朝三日命内侍徃迎其喪皇后成服于第喪至又哭于國門之外贈侍中諡康懿将葬上出郊奠之周視其匶明日皇后臨之前葬之三日又臨于墓下上篆其碑額曰忠勤懿戚之碑命參知政事王珪為文經所至勤於吏事筦庫米鹽簿書期㑹皆親之故事州鎮刺史以上别賜公使錢例得私以自奉去又盡入其餘貲經一切付主吏惟供饗勞賔客軍師之用無一毫他費嘗因太祖忌百官班開先殿下皇后召經班中見行幄勉經盡忠朝廷經亦以善事三宫為言皆不及家事乙未案乙未日􅃨見疑有悮上批河北分畫地界其天池一頃近韓縝等己嘗申明奏請朝廷雖已回降指揮恐亦未至明顯縝等到彼不免又須逐旋奏禀必是復致稽緩可檢㑹近降指揮再議與一處分仍令縝徃寧化軍按視聞奏此據御集九年二月九日下今追附本月日丁酉賜廣南東路轉運司錢五萬緡修浚州軍城壕禁臣僚公服黑紫色嘉祐二年十月二十二日戊戌中書言治平四年二月詔陳國公主降王師約不升行及行舅姑之禮今韓國大長公主降錢景臻其行舅姑禮請依此上曰大長公主朕宫中每見必拜雖皇太后亦叙姑嫂之儀不可與朕諸妹等也宜止依兖國公主出降之禮詔湖南廣南轉運司如諸路運糧未到或支未足許糴於畜積之家毋得過五分其願入中過五分者聽是日社先是王安石等以南方事宜恐有急速處分乞賜對上批别無處分事如有奏陳可請對已而安石等亦不復請己亥詔罷春燕以出師南方故也改新知廣州祠部員外郎史館修撰劉瑾知䖍州兼江南西路安撫鈐轄其洪州權罷鈐轄司候南事平日依舊令蘇宷依舊知廣州初朝廷以交趾入冦嶺外騷然疑宷不能辦故以瑾易之既而聞宷備禦有條例乃不復易劉瑾傳云與樞宻院論戍兵不合改䖍州今從蘇宷傳詔陜西河東見選募赴安南馬軍不俟秋凉起發慮招討司至彼而交賊尚未出境湏援兵故也賜安南招討司公使錢萬緡令郭逵未至本司以前制置事趙卨一面施行辛丑詔以廣西軍興令京西南北路轉運司常輪一員應副軍湏南路唐州北路許州候事平日仍舊趙卨入辭上諭卨用峒丁之法先湏得實利然後可以使人不可以甘言虛辭責其效命如鄜延㸃教蕃兵若非卿有以制之使輕罪可决重罪可誅違西夏則其禍遠違帥臣則其禍速合於兵法畏我不畏敵之義茍無實利則欲責其效命也難矣今卿可選募精勁土人一二千擇梟將領之以脅峒丁諭以大兵將至從我者賞不從者殺若果不從即誅三兩族兵威既立先脅右江然後脅左江此等既歸順則攻劉紀巢穴不難也郭逵性吝嗇卿宜諭以朝廷不惜費兼逵好作崖岸不通下情將佐莫敢言卿至彼為言之毋得輕敵詔知廣州蘇宷與本路轉運司同制置備禦交賊犯境通判梓州秘書丞馮山言聞御史中丞鄧綰舉臣臺官䝉召赴闕上殿臣生長遠方復乆外任未嘗知朝廷事體少識中外人物素與鄧綰迹踈今雖公舉恐不知臣之愚拙竊慮到闕或令充職有誤任使臣數任州縣惟簿書期㑹漸已諳曉梓州節鎮九縣户口民事稍多臣見管勾常平等事亦能為陛下推行詔條宣布恩惠乞免赴召從之山普州人也詔近賊合清野處令廣西經略安撫司選委使臣官員召集保正令團集民户搬運糧蓄如力不足即據所闕數配同保如有户内無物可搬者可添顧直令與他户搬運並令運置近裏處仍湏度城郭及山林險阻决可保守之地免使聚糧資賊若民願以儲蓄寄所在官倉或就近供軍却於近裏州軍請領或中糴入官者亦聽廣南西路經略司以蘇緘死事聞上嗟悼為之不食詔贈緘奉國軍節度使諡忠勇賜京城甲第一區鄉里上田十頃聽其家自擇官其親族七人以其子前桂州司户參軍子元為西頭供奉官閤門祗候奪服充召募舟師副將賜對便殿上撫諭甚至且曰邕州若非卿父守禦如欽亷二州賊至而城破乗勝奔突則賔象桂州皆不得保矣昔唐張廵許遠以睢陽蔽捍江淮較之卿父未為遠過也改授子元殿中丞通判邕州次子子明子正及孫廣淵直温與緘同死皆優贈之詔邕州城中死事者并其家屬並令經略司以名聞州城令安南招討司相度修完邕州城樓櫓戰具令廣西經略司於㳂江州軍近便儲備須大軍至日津置前去贈殿侍孫言内殿崇班以言為廣南西路經略司指使押兵赴欽州遇交賊死之故也交趾之圍邕州也王安石言於上曰邕州城堅必不可破上以為然既而城陷上欲召兩府㑹議於天章閣安石曰如此則聞愈彰不若止就東府上從之安石憂沮形於辭色王韶曰公居此尚爾况居邊徼者乎願少安重以鎮物情安石曰使公徃能辦之乎韶曰若朝廷應副何為不能辦安石由是與韶始有隙此據司馬記聞壬寅以壽州契丹直等五指揮赴䖍州權駐泊以備廣南東路鈐轄司追呼令䕫州路轉運判官董鉞募黔州義軍千人赴安南招討司詔天下舉人慶歴六年以前禮部試下進士兩舉諸科三舉不限年進士一舉諸科兩舉年六十以上進士五舉諸科六舉曾經殿試下六舉諸科七舉禮部試下年五十以上進士七舉諸科十舉禮部試下年四十以上内河北河東陜西進士諸科各减一舉並委本貫保明當職官審實其開封府國子監令各召保官二員當議推恩詔荆湖北路轉運司北江下溪州已納土其每户合納丁身粟米自熈寧十年為始提舉市易司言在京酒户嵗用米三十萬石比江浙荐饑米價翔貴本司欲選官徃出産處預給錢至秋成折納從之十一月四日罷郭進孫三班差使開為三班借職以開自陳豫國朝尅復河東之功乞換文資故有是命癸卯三司市易司言同詳定開封府界陽武酸棗封丘考城東明白馬中牟陳留長垣胙城韋城縣曹濮澶懐濟單解州河中府等州縣官場可賣解鹽從之九年二月十七日并四月二十八日可參考志無此詔永興等路提㸃刑獄劉定提舉常平等事馬域除本路經費錢外並輦置近邊州軍召商人及市易司於熈河二州入中糧草賜下溪州新築城寨名㑹溪城黔安寨其城寨官恐人少肯就者依沅州城寨使臣等酬奬從荆湖北路轉運司請也城寨名實録已書之八年末又書之九年二月十七日又書之七月八日凡三見今并書之新紀於七月八日書築下溪州以為㑹溪城其誤又甚矣㑹溪黔安今屬辰州詔罷開封府界東西路廵檢二員以提舉常平司言府界縣各有廵檢又有都廵檢分總兩路遇盗賊至十人以上始出兵近諸縣已教習保甲各有廵檢專職與縣尉廵捕其都廵檢可以减罷故有是詔甲辰賜郭逵銀絹各千乙巳詔權增桂州公使錢至七千緡潭州至六千五百緡詔市易司河北路糴榖貯州倉如數多即分於祁保永寧安肅廣信軍别貯之詔熈州制置司以官鹽鈔等物賒借與持服人胡淵等用結糴為名賈販拖欠及提舉河北西路常平司奏賑濟不實宜並差官劾治以聞熈州事時逈舉發河北事當考四月戊子蔡確徃熈河丙午旬休假以宣徽南院使雄武軍留後郭逵見特御延和殿上問逵所以平安南逵曰兵難遥度願馳至邕管圗上方略又問軍行所湏逵曰願悉得河東鄜延舊所將吏士哲宗舊録傳云又問度幾何人逵曰大固足用語既不了了又新傳及范祖禹誌墓皆無此今不取軍頭司言御龍弩直十將寗德自陳為父死事邕州城下乞捐軀報讎詔與招討司隊將候立功回日換班行已而殿前司言德係殿廷管押衛士輙敢唐突乞不令差出仍重行决配詔宜依前降指揮中書門下奏廣西軍興其糧草雖以次第降指揮備辦縁随軍移那猶藉人專切計置奉㫖令宣撫使司奏舉官一兩員充隨軍計置糧草軍須仍令趙卨等專切提舉及令三司更切契勘催促應副御批其專切計置縁諸路已自有官司今來宣撫司特置官二員可止充随軍催驅糧草趙卨令都大提舉應干計置糧草路分轉運司朝廷差去官如有失辦集並令都大提舉司一面取勘施行宜依此改定疾速行下丁未詔安南宣撫司副使趙卨都大提舉計置糧草癸丑熈河路經略司言董戩以旗號蕃字至洮疊州誘脅順漢部族為冦洮東安撫司遣蕃官三班差使溪斯多特等應援與總噶爾蕃部交戰其溪斯多特與殿侍諾爾斯多軍使阿烏弓箭手杜彦德各獲一級及蕃勇敢察納喇勒智等各嘗奪賊馬并傷中詔溪斯多特與奉職諾爾斯多阿烏各轉兩資杜彦德察納喇勒智等六人各轉兩資賜絹五百令經略司等第均給權知鄜州王文郁通判麻元伯言西界右廂把邊頭首耀宻楚美以下三十餘人乞納土歸順詔夏國方納欵恭順令文郁等毋得妄招納生事仍改差麻元伯監在京進奏院涇原路經略使馮京言副總管苗授准勅就差兼知鎮戎軍案授性行詳實且嘗立戰功乞留以副臣兼鎮戎一將之任易於得人從之仍改差西上閤門使張守約知鎮戎軍上批聞淮南開河役兵夫不少計工人日須開百二十尺南人綿弱多不能辦語言藉藉人情咨怨雖名召募實多差僱主役者急於成就但肆威虐殊不省察役兵雖病劇亦須令輿赴役所呈騐徃徃道斃深可憫傷於是詔淮南東路轉運使蹇周輔體量以聞張頡後坐責當以此事在四月三日詔安南行營犒設將佐及其餘支費如公使不足許以封樁錢給之中書言新淮南西路轉運判官汪輔之被㫖詣永興秦鳯等路選四色錢乞差勾當公事八員欲依所乞上批朝廷比以本路官司不足委信故特遣輔之躬行省驗今乃多辟官屬代行甚非元遣本意兼聽任事小而屬官員多宜與裁减此據御集二月二十七日事今附見四月丁亥當考六月二十五日周尹云云更詳之甲寅詔河北河東陜西將官並以三年為一任委經略安撫司與監司於未替半年前具治状保明聞奏其職事修舉者令再任或特奨擢詔郭逵等交州平日依内地列置州縣乙卯雨雹三月丙辰朔進仁宗婉容周氏為賢妃許國大長公主為韓國大長公主並行册禮詔賢妃周氏率宫闈掌事送韓國大長公主出降至第故事皇后當出送今以居父朞服故也詔廣南西路轉運司聽復豫聞邊事先是知桂州沈起奏罷之以交賊入冦令復舊制丁已詔廣南西路捕獲交賊生口並未得殺聽招討司相度以為鄉導令安南招討司進發日量帶馬軍兩指揮充衙隊其餘人馬期以七月初進發庚申上論人才以臣下登對多窺測人主意為迎合之説其不中理者朕因加詰難欲使知上意所向背然亦慮縁此有不敢言事者輔臣對曰唐太宗之威嚴魏徵切直終優容之其後不悦徵者盖不當以諫草示人也上曰書云爾有嘉謀嘉猷則入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之德人臣當然也魏徵以諫草示人非揚主之惡特好名爾安南都大提舉計置糧草司言軍興糧草最為大計今提案路分稍多全籍官屬催驅乞於行營官及偶以罪廢情輕實有才幹之人選差從之詔招集欽亷邕三州敗散軍人皆釋其罪上批詔廣東江西福建募人効用慮姦細在其間令招討司指揮將官常加覺察又詔廣東路州軍雜犯配軍其間甚有少壮人材令經略司差官揀選赴廣州每五百人團為一指揮以新澄海為名如廣西之法是日郭逵辭宴垂拱殿賜中軍旗物劎甲以寵之三月五日辭宴據㑹要餘並據墓誌辛酉御集英殿䇿試進士詔邕欽亷州死事文武官見存骨肉令廣西經略轉運提㸃刑獄司速訪求具所在人數以聞三州陣亡骸骨令經略司遣官葬祭之仍於桂州佛寺設水陸道場供僧千人交賊蹂踐之地及避賊失業者與免今年二税壬戌䇿試特奏名進士及武舉進士詔河北已廢諸監廨宇草場等許民租賃雄州言全屬南與兩屬人户并縁邊州軍累值災傷物價騰踴民甚饑窘乞撥軍糧三二萬石與常平榖减價以日記口數糶與歸信容城兩縣全屬南及兩屬户詔雄州支軍糧米三萬與常平倉封樁外餘依所奏施行其全屬南及兩屬人户仍令雄州差官監糶公人乞取並以倉法坐之是日上諭輔臣曰邕州死事之臣非可與欽亷州比也自為賊圍閉堅壁月餘竭力捍禦而外援不至賊以火攻城中水竭守死一節忠義不衰録其子孫宜加死事者一等士卒倍􅉠其家贈通判州事著作佐郎唐子正為司農少卿觀察推官譚必為職方郎中録事參軍周成為虞部郎中宣化知縣歐陽延為駕部員外郎縣尉周顔知武縁縣事萬玩並為比部員外郎前攝瓊州臨髙縣主簿權都監司指使趙世卿郊社齋郎蘇廣淵並為虞部員外郎廣西全轄左藏庫副使髙卞為台州防禦使廣西都監供備庫副使薛舉為皇城使果州團練使都監西頭供奉官劉師古吳希甫並為文思使三班奉職蘇子正為西京左藏庫副使右班殿直陳琦為文思副使借職丁琦蘇直温並為供備庫副使三班差使邵先梁聳蘇子明並為内殿承制殿侍指使李翔何泌劉公綽並為内殿崇班癸亥詔邕亷欽三州進士内韋堯詢與本州文學免試注權官馮雄等六人並令轉運司與攝官堯詢等各預本州解發值交趾入冦其家俱遭焚略自言無所歸故特録之廣南西路轉運使李平一言乞調廣東丁夫修邕州城池詔以路遠難差發令招討司同議止於側近州軍優給錢米差僱上批廣平勾當公事李舜舉先有㫖特與上等支賜宜令三司勿行此據御集己巳蔡河撥發催綱屯田員外郎韓宗師言臣父絳知太原府無人兼侍乞分司西京於太原府居住詔宗師特差提舉河東常平等事既而宗師再乞侍飬乃改提舉崇福宫注本年九月三日宗師為撥發壬申詔知定州新樂縣大理寺丞王平甫權知保州百姓遮道負戴留之不令出縣監司以聞故也詔福建廣南人因商賈至交趾或聞有留於彼用事者自今許其親戚於所在自陳令招討司招諭如能自歸者與班行皇城副使曹評為東上閤門副使評太皇太后姪也磨勘當遷因有是命甲戌御集英殿賜進士徐鐸以下并明經諸科及第出身同出身同學究出身總五百九十六人鐸邵武人也林希野史載放牓甚備且云館職校書皆入殿侍立此例乆廢張芻請之當考乙亥賜特奏名進士明經諸科同學究出身試監作主簿守州軍府長史助教總五百九十三人丁丑命權江淮等路發運副使盧秉兼權管勾真楊通泰等開運河時中書言判都水監侯叔獻在淮南按督河役感疾乞差醫官徃及令秉攝事上批遠道醫官至必無及可勿遣而秉有是命詔以廣西進士徐伯祥為右侍禁欽亷白州廵檢先是交賊自邕州驅略老小數千人將道廣州歸伯祥募得數十人輙追躡其後而所斬獲亦數十級於是所略去老小因得乗間脱免者至七百餘人經略司以聞故有是命熈寧中朝廷遣沈起劉彛相繼知桂州以圖交趾起彛作戰船團結峒丁以為保甲給陣圖使依此教戰諸峒騷然士人執交趾圖言攻取之䇿者不可勝數嶺南進士徐伯祥屢舉不中第隂遺交趾書曰大王先世本閩人聞今交趾公卿貴人多閩人也伯祥才略不在人後而不用於中國願得佐大王下風今中國欲大舉以滅交趾兵法先人有奪人之心不若先舉兵入冦伯祥請為内應於是交趾大發兵入冦陷欽亷邕三州伯祥未得間徃歸之㑹石鑑與伯祥有親奏稱伯祥有戰功除侍禁充欽亷白州廵檢朝廷命宣徽使郭逵討交趾交趾請降曰我今不入冦中國人呼我耳因以伯祥書與逵逵檄廣西轉運司按鞫伯祥逃去自經死此據司馬記聞元豐元年二月辛未伯祥事敗荆湖路安撫司奏徽誠等州鎮聞官兵至本路殺牛犒設為備禦計今皆潰散已曉諭各令著業安居仍宻為備禦詔安撫司專委提㸃刑獄朱初平招撫優許與官職請受候出漢公參日以名聞六月八日蔡􅁮言諸楊必以死拒命當與此相闗并十月二十一日皆合參照戊寅命樞宻副都承㫖張誠一同修内諸司式賜新及第進士等錢五百千諸科錢二百千造小録等以修貢舉勅式練亨甫言熈寧八年賜新及第進士期集錢三千緡諸科七百緡多假設名目送遺游士其餘以資胥吏乞止賜三百千罷期集詔加賜二百千廣南西路提㸃刑獄司言欽亷邕州被害土丁之家夏料役錢乞蠲放從之判將作監謝景温言竊見朝㫖為贈侍中向經起獻堂碑樓等令同判監向宗儒提舉宗儒經族子小功親見領将作使之就便提舉即非别置一司今宗儒惟將帶八作司監官王昭遘徃彼前後定圗様及檢計功料並未闗本監而八作司使臣乃一面兼管顯為侵越望改正施行詔宗儒具析以聞四月六日宗儒責己卯詔宥州公牒内理索人口有已經兩三次者令諸路經略司宻契勘如實有投來者即依理送還不得張皇右騏驥副使閤門通事舍人王光祖為西上閤門副使賞渝州討夷賊之功也光祖為梓䕫路鈐轄賊犯南川詔熊本體量安撫以内藏庫使楊萬成都府路鈐轄賈昌言及梓䕫路都監王宣與光祖討蕩而皆聽命於本本疑光祖不為用於是料兵賦鎧仗獨與三人謀之餘且遣與萬等三路進討分前中後軍並聽中軍鼓聲而發光祖為後軍比發日已暮本命光祖道出黄沙坎且戒明日與萬等㑹衆以杖索塗至相推挽以前夜漏半徹絶頂黎明賊大駭曰此地其可夜至耶賊勢携一擊而潰殺獲甚衆徐治道以㑹萬等而萬等阨於松谿本亟命光祖應之取石門路以敓其嶮促黔州義軍先登賊爭嶮因襲其助賊遂棄去光祖夜泊松嶺上旦始得萬等即與俱還城安穏寨本愧謝上其功第一故有是賞光祖遷官實録四月十七日又重出盖誤也八年冬渝州夷賊反恐賈昌言此時未為成都鈐轄御集九年五月八日差賈昌言充成都鈐轄替郭固昌言前資當考按熊本集熈寧七月春本在江安已檄召成都鈐轄賈昌言領兵入界矣恐御集所云乃再差非始差也詔自今禮部奏名第一第十人以上放牓日至第四甲未唱名者取㫖西蕃十朝綱要云總噶爾首領果莊冦鄂摩克谷熈河鈐轄韓存寳等敗之詔存寳子三班奉職資與轉一官候年及參班日補閤門祇候知河州鮮于師中兄閬州文學師民為試將作監主簿免試注官餘遷官給賞蕃官殿侍以上仍更與支賜上批京師馬食粟荳見在不及年支其廣濟河元額嵗漕京東斛斗可速委官修完埧閘此據御集增入詔聞今歲畿内夏苖茂盛京師軍食比向時頗减耗東南蝗旱上供米又多已截留可令司農寺於府界屯兵縣分廣糴撥與三司以東南諸路折納錢帛漸償之庚辰西京左藏庫使帯御器械髙居簡西作坊使嘉州團練使帯御器械王中正並為内侍押班大理寺丞景思誼為内殿崇班秦州都監思誼思立弟也時丁母憂以思立故特有是命新知岷州种諤言並邊招置弓箭手外有荒閑地欲不拘蕃漢兵民權招耕種依鄉原例平分無牛具者令於回易息錢内支借候收熟撥還從之詔南平軍欲留義軍防托慮人情遠戌不便令熊本相度以聞已而本奏成都府路比蕃賊冦擾人户兵力寡弱乞權留防守從之辛巳屯田郎中周尹兼侍御史當考是誰薦雄州言北界於兩屬費家莊六村各差彊壯六十人置弓箭手每夜更宿欲移文涿州詰問從之詔雄州歸信容城知縣尉近累與北人鬬敵射傷人口令王道恭嚴約束仍具析因依以聞内殿崇班德順軍静邊寨主田璟言邊事之作未有不由熟户者平時入西界盗孳畜人户等及夏人來理索却反稱有西人入漢界為盗邊臣或未曉彼情或希功賞增飾事状更致掩殺無辜且蕃部盗孳畜人户未有酋首鄰族不知者但上下䝉蔽積乆以成邊隙欲乞指揮逐寨如有入西界作賊重立賞格許人陳告庶絶引惹於是詔諸捕獲入西界竊盗者依常法倍賞之詔殿試進士初考官翰林學士陳繹集賢校理孫洙王存崇文院校書練亨甫范鏜審官東院主簿陸佃各罰銅二十斤覆考官翰林學士楊繪龍圗閣直學士宋敏求同修起居注錢藻秘閣校理陳睦崇政殿説書沈季長權檢正中書刑房公事王震各罰銅十斤並坐考校第一甲進士不當也壬午詔均州團練副使隨州安置劉彛追毁出身以來告勅送涪州編管以御史中丞鄧綰言沈起劉彛雖已降責尚有未盡乞治彛張皇之罪重行誅戮故也朱本改墨本云尚有未盡及沈起所言劉彛張皇之罪乞重行誅戮簽貼云以中書時政記添修新本云此朱史私意今依舊文樞宻院言開封府界保甲令提舉司自今每嵗十二月引呈一縣仍先於十一月内具逐縣人數申樞密院取㫖㸃定舊紀云詔閲京畿保甲嵗一縣新紀不書癸未西京左藏庫副使楊從先為安南道行營戰棹都監先是從先言從海道出兵為便欲冒大洋深入西南隅繞出賊後擣其空虛因以兵邀㑹占城真臘之衆同力攻討上是其言遂授此職令募兵以徃此據郭逵所受詔劄增修都水監言故工部郎中侯叔獻道死乞優給􅉠詔錄其子擇中太廟齋郎賜絹三百疋
