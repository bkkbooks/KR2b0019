body:
  text: 續資治通鑑長編卷一百十六宋李燾撰仁宗景祐二年春正月庚寅詔嘗給事東宫及資善堂不限存沒並以名聞於是馬軍都虞候封州防禦使通川張潜等四十餘人並加秩吏士増俸遷資者又踰百人甲午殿中侍御史裏行髙若訥言甲戍赦書選人滿十二考並磨勘引見今猥進者多請以歴任無贓私及非昏耄者乃聼改官仍具與監當一任詔湏嘗有人奏舉者方得施行從之壬寅徙江東轉運使蔣堂為淮南轉運使兼發運司事時上封者屢以廢發運司非便堂言裴耀卿劉晏第五𤦺李巽裴休皆嘗為江淮河南轉運使兼領發運司事而嵗輸京師常足詔用其議堂在淮南嵗薦部吏二百員曰十得二三亦足報國矣度支判官工部郎中許申為江南東路轉運使凡鑄銅錢用劑八十八兩得錢千重八十兩十分其劑銅居六分鈆錫居三分皆有竒贏鑄大鐡錢用鐡二百四十兩得錢千重一百九十兩此其大法也申在三司景祐元年十月丁巳朔申始以工中權度判乃建議以藥化銅雜鑄輕重如銅錢法而銅居三分鐡居六分皆有竒贏亦得錢千費省而利厚因入都内知閻文應以納説朝廷從之即詔申用其法鑄於京師然大率鑄錢雜鈆錫則其液流速而易成雜以鐡則流澁而多不就工人苦之初命申鑄萬緡逾月才得萬錢申性詭譎自度言無效乃求為江東轉運使欲用其法鑄於江州朝廷又從之詔申就江東鑄百萬緡無漏其法中外知其非是而執政主之以為可行然卒無成功就江州鑄百萬緡實録在三月今并書明年十二月甲申自江東徙湖南先是鹽鐡副使任布請鑄大錢一當十而申欲以銅鐡雜鑄朝廷下其議於三司程琳奏曰布請用大錢是誘民盗鑄而䧟之罪唐第五琦嘗用此法訖不可行申欲以銅鐡雜鑄理恐難成當令申試之申詐得售盖琳亦主其議故也琳傳載此事於天聖五年以前誤也當是景祐元年五月琳再為三司使時王子融云布請鑄大錢行之京城程琳集官議子融時判度支曰今軍營半在城外獨行大錢城中可乎事遂寝與琳𫝊異今不取天章閣待制孫祖徳言偽銅法所禁而官自為之是教民欺也固爭之不從遂出知兖州祖徳出知兖州在二月癸未今并書於此丙午詔太常禮院孟冬祭神州地祗宜如祭天地遣内臣降香春秋朝諸陵及諸祠有特祈觧者亦如之侍御史韓瀆言天下賦役之繁但存催科一簿一有散亡則登耗之數無從鈎考請復置實行簿下三司議請如舊丁未詔再閏一造之又詔山澤之民擷取草木葉為偽茶者計其直從詐欺律凖盗論仍比真茶給賞之半戊申詔京東西陕西河北河東淮南六路轉運使檢察州縣母得舉戸鬻産徙京師以避徭役其分遣族人徙他處者仍留舊籍等第極貧下户聼之己酉改長寜宫為廣聖宫宫在禁中前殿有道家天神之象後起觀閣以奉真宗神御占宫城之西北隅庚戌詔自横隴河决嘗下河北京東西路以民租折納梢芟五百餘萬今河决處自生淤灘可省工費其三路未輸梢芟並權停癸丑置邇英延羲二閣冩尚書無逸篇於屏邇英在迎陽門之北東向延羲在崇政殿之西北向是日御延羲閣召輔臣觀盛度進讀唐詩賈昌朝講春秋既而曲燕崇政殿甲寅詔凡禁中須庫物非有闕者母得下雜買務市之乙夘詔帶御噐械自今母得過六員二月丙辰朔以春寒特賜諸軍班薪炭燕肅等上考定樂噐并見工人戊午御延福宫臨閲奏郊廟五十一曲因問李照樂何如照對樂音髙命詳陳之照乃建言王朴律凖視古樂髙五律視禁坊樂髙二律撃黄鍾則為仲吕撃夹鍾則為夷則是冬興夏令春召秋氣盖五代之亂雅樂廢壊朴創意造律凖不合古法用之本朝卒無福應又編鐘鏄鐘無大小輕重厚薄長短之差銅錫不精聲韻失美大者陵小者抑非中度之噐相傳以為唐舊鐘亦有朴所製者昔軒轅氏命伶倫截竹為律復令神瞽協其中聲然後聲應鳯鳴而管之参差亦如鳯翅其樂傳之夐古不刋之法也願聼臣依神瞽律法試鑄編鐘一簴可使度量權衡協和有詔許之仍就錫慶院鑄庚申太常博士直史館宋祁上大樂圗義二卷先是詔廢洺州廣平兩監合於安陽羣牧諸監王承勛言廣平嵗産千餘駒且先朝所建不可廢又言馬尚多牧地少癸亥詔復存廣平一監母以賦民既而河北轉運使言舊監悉巳賦民請割趙州界草地二千頃權𨽻相州安陽監以牧馬從之甲子詔吏部流内銓自今保舉選人湏見任知州通判陞朝官都監都司副使以上始聼之其在京不帶職員外郎非曽任知州諸司副使非曽任路分都監毋得舉丙寅免江浙淮南三路災傷州軍牛稅丁夘龍圗閣學士給事中知兖州范諷責授武昌行軍司馬不簽書事新廣東轉運使祠部貟外郎龎籍降授太常博士知臨江軍東頭供奉官呉守則追一官又降都官貟外郎判刑部李遜知濰州祠部貟外郎知信州滕宗諒監饒州稅屯田貟外郎知宿州董儲通判吉州光禄寺丞館閣校勘石延年落職通判海州殿中丞知安吉縣范拯為和州司馬仍下詔以諷罪申飭内外先是籍為御史數劾諷宰相李廸佑諷弗治反左遷籍籍既罷益追劾諷不置且言諷放縱不拘禮法茍釋不治則敗亂風俗將如西晉之季不可不察㑹諷亦請辨乃詔即南京置獄遣淮南轉運使黄揔提㸃河北刑獄張嵩訊之籍坐所劾諷有不如奏法當免諷當以贖論諷不待論報擅還兖州吕夷簡疾諷詭激多妄言且欲因諷以傾廸故特寛籍而重貶諷凡與諷善者皆絀削延年嘗上書請章獻太后還政諷任中丞欲引延年為屬延年力止之竟坐免人謂籍劾諷不置實夷簡隂教之云諷請辨據王珪所為籍神道碑他書並無有也戊辰工部尚書平章事李廸罷為刑部尚書知亳州先是上御延和殿召宰臣吕夷簡参知政事宋綬决范諷獄以廸素黨諷不召廸惶恐還第翌日遂罷相制辭略曰姻聨之内險詐相朋靡先事而上言頗為臣而有隐然廸性純直實不察諷之多誕也龍川别志載李廸既貶王曽在外宋綬為曽告吕夷簡求復相且云宜善待曽勿如待廸按廸以是年一月十三日罷政即命曽代之况曽為樞宻使已半嵗不得云在外若謂夷簡初與廸不相能欲傾之因薦曽為樞宻使擬廸後或先議逐廸將遣曽過中書故綬云云則庻乎可也今皆不取樞宻使吏部尚書同平章事王曽為右僕射兼門下侍郎平章事集賢殿大學士門下侍郎兼吏部尚書平章事吕夷簡加右僕射戸部侍郎参知政事王随為吏部侍郎知樞宻院事樞宻副使禮部侍郎李諮為戸部侍郎知樞宻院事樞宻副使檢校太保王徳用為奉國留後同知樞宻院事刑部侍郎参知政事宋綬為吏部侍郎樞宻副使給事中蔡齊為禮部侍郎参知政事翰林學士承㫖端眀殿學士兼翰林侍讀學士禮部侍郎盛度為参知政事御史中丞韓億為工部侍郎同知樞宻院事己巳改新知亳州李廸知相州庚午復改授資政殿大學士兼翰林侍讀學士留京師仍班三司使上詔嵗九大祠故事以宰相攝事自今以参知政事尚書丞郎奉祀直集賢院賈昌朝請以鄭司農所注月令復入禮記第五其李林甫所注自為唐月令别行從之仍詔唐月令以備四孟月宣讀庚辰降資政殿大學士兼翰林侍讀學士刑部尚書李廸為太常卿知宻州始廸再入相自以受不世之遇盡心輔佐知無不為及吕夷簡繼入中書事頗専制心忌廸潜短之於上廸性直而踈不悟也既坐范諷姻黨罷政怨夷簡因奏夷簡私交荆王元儼嘗為補門下僧恵清為守闕鑑義夷簡請辨上遣知制誥胥偃度支副使張𫝊即訊乃廸在中書時所行夷簡以齋祠不預廸慚懼待罪故貶然補恵清實夷簡意廸行文書顧謂夷簡獨私荆王盖廸偶忘之他日語人曰吾自以為宋璟而以夷簡為姚崇不知其待我乃如是也壬午龍圗閣學士給事中馮元為禮部侍郎翰林侍讀學士兼龍圗學士始元坐監䕶章懿塟事不職罷翰林學士出知河陽國子官屬為上書請留執政欲進白弗遣元自匄行於是王曽言元東朝舊臣不宜以細故棄外乃復召之樞宻直學士右諫議大夫知天雄軍杜衍為御史中丞衍奏中書樞宻古之三事大臣所謂坐而論道者也止隻日對前殿何以盡天下之事宜迭召見賜坐便殿以極獻替月不過數事足矣若末節細務進糓帛様閲甲胄弓矢㸃馬補試吏貟特有司之職耳陛下何必親决三月丙戌鹽鐡副使兵部郎中任布為右諫議大夫知成徳軍時議省河北兵布言西北二邉方包藏禍心以窺中國備未可弛也省河北兵或因去年五月程琳之請當考己丑以御史中丞杜衍權判吏部流内銓先是選補科格繁長主判不能悉閲吏多受賕出縮為姦衍既視事即𠡠吏取銓法問曰盡乎曰盡矣乃閲視具得本末曲折明日曉諸吏無得陞堂各坐曹聼行文書銓事悉自予奪由是吏不能為姦利居月餘聲動京師後改知審官院其裁制如判銓法審官在八月今并書知蘇州左司諫祕閣校理范仲淹為禮部貟外郎天章閣待制仲淹自外驟居侍從必有故史無其説或縁富弼上疏也今表而出之詔鎮戎軍嵗比不登其弓箭手五十八指揮共貸以粟六萬斛殿中丞通判齊州張宗彛言大名府新作金堤可以捍横壠决河水勢請今緩修塞之役詔河北轉運使繪黄河至海圗上之太常禮院言侍御史劉䕫請去章獻眀肅太后章懿太后所加太字葢入廟稱后繋於夫在廟稱太繋於子然二太后奉安别廟凖禮未應去太字上以䕫不習典故詔本臺諭之䕫崇安人也辛夘羣臣以章獻太后大祥上表請聽樂不聼表五上詔須禫祭畢乃聼之壬辰詔選人十二考無舉主者特許参選乙未賜亳秀濮鄭四州學田各五頃丁酉詔國子監直講一員兼領監丞主簿事詔京西轉運司每嵗宗室内人上陵及遣官朝拜或𠡠𦵏所湏什物並官為辦置無得擾民從知河南府李若谷之言也又詔開封府自今舊城内民舎復有侵官街者令左右軍廵街司覺察仍許人告之辛丑修西凉殿殿在禁中嵗乆摧壊而上不欲興土木之役至是有司屢以請乃聼修之癸夘賜天崇軍修金堤役卒緡錢戊申出宜聖殿庫真珠付三司以助經費壬子加贈保慶皇太后二代詔權停貢舉夏四月丙辰鎮國節度使駙馬都尉李遵朂判許州民方輸租倉官不時至遵朂馳徃受所輸倉官惶恐叩頭民大恱轉運使料卒補水兵不問習否强以𨽻籍遵朂曰强人以不能將何用命部校按之去不習水者十七八丁巳李照言奉詔製玉律以候氣請下潞州求上黨縣羊頭山秬黍及下懐州河内縣取葭莩從之賜故鎮東軍節度推官毛洵家帛五十匹米五十斛洵吉州人進士及第又中書判㧞萃科其父國子博士應銓與其母卒於竇州洵徒跣䕶䘮歸𦵏里中負土成墳毁瘠而卒特䘏之己未翰林學士承㫖章得象天章閣待制燕肅與翰林侍讀學士馮元詳定刻漏集賢校理知宗正丞事趙元規言太廟薦新之禮乆廢不行詔禮官議定十二月所薦蔬果禽魚凡二十六品詔恭依良規安仁子也庚申翰林學士承㫖章得象等言奉詔定司天監生于淵役兵單訓奏祀九宫貴神止用一局失逐年飛宫法案郄良遇九宫法有飛棊立成圗每嵗一移主九州災福事天寳中術士蘇嘉慶始置九宫神壇一成髙三尺四陛上依位置九小壇東南曰招揺正東曰軒轅東北曰太隂正南曰天一中央曰天符正北曰太一西南曰攝提正西曰咸池西北曰青龍五數為中戴九履一左三右七二四為上六八為下符於遁甲此則九宫定位也每嵗祭以四孟位隨歲改故謂之行棊自乾元以後止依本位祭遂不飛易仍减冬夏二祭國朝因乾元故事而未嘗有所更今于淵等所請即合天寳初祭之禮又合良遇飛棊之圗然九宫之法本自術家時祭之文經禮不載昔漢室祠官所領多本於方士牲幣壇場之數嵗時昏曉之節薦配鼓舞即用其方故有黄帝用梟武夷用乾魚之類是則為民請福無文咸秩寜有過立非執一隅議者或謂不必飛宫若日月星辰纒次周流而祭有常此則定位之祀所當從也推數於囬復候神于恍惚因方彌沴随氣考祥則飛位之文固可遵用請依唐禮遇祭九宫之時遣司天監官一員詣祠所随每年貴神飛棊之方以定祭位仍自天聖己巳入厯太一在一宫嵗進一位飛棊廵行週而復始詔可辛酉詔諸路提㸃刑獄司事有寃濫而繋人命者雖未經轉運司亦聼受施行甲子契丹遣林牙保大節度使耶律庻㡬政事舎人劉六符来賀乾元節戊辰命宰臣吕夷簡王曽都大管勾鑄造大樂編鐘参知政事宋綬蔡齊盛度同都大管勾集賢校理李照勾當御藥院鄧保信專監鑄造仍以入内都知閻文應提舉始照既鑄成編鐘一簴以奏御遂建請改制大樂取京縣秬黍累尺成律鑄鐘審之其聲猶髙更用太府布帛尺為法乃下太常四律照自為律管之法以九十黍之量為四百二十星率一星占九秒一黍之量得四星六秒九十黍得四百二十星以為十二管定法淮南轉運副使吴遵路請於真楚泰州髙郵軍為斗門十九以畜泄水利從之賜楚州州學九經庚午詔中外臣僚洎草澤之士有知雅樂音律得失測候之法者許所在薦聞或自言官司將校試之侍御史劉䕫言樂之大本與政化通不當輕易其噐願擇博學之士以補卿丞凡四方妄獻説以要進者一切罷之帝善其言然亦不果從也帝善䕫言據新傳今附見其實不能用也王偁東都事畧詔曰雅樂之作治道所基郊丘宗廟之祠朝廷饗侑之禮人神和㑹茲實重焉爰命有司考正鐘律壬申詔曹利用諸子先從降黜者並聼還京師尋詔給以所沒舊地四之一給居地四之一乃十月壬子今并書之癸酉詔天下官司毋得擅發馬遞若機宻事當入馬遞者許實封送所屬州軍發之違者付受皆論罪初定州龍泉鎮監酒右班殿直折惟寜擅奏章付馬遞既坐罪衝替因條約之戊寅命翰林侍講學士兼龍圗學士馮元度支判官集賢校理聶冠卿直史館同知太常禮院宋祁同修樂書太常丞直集賢院吕公綽同判刑部自言父夷簡為宰相而刑部事多闗中書請徙避之庚辰命公綽權判吏部南曹環慶路副都部署歩軍都虞候永州防禦使劉平為饒州防禦使落管軍知同州走馬承受入内供奉官于徳源降一官平被酒擅破鏁入甲仗庫轉運使蘇耆奏劾而徳源初不以其事聞並鞫于御史臺及平請與耆置對㑹耆已卒雖免劾特責之録曹脩古之姪覲為試将作監主簿仍聼為脩古後覲傳云天章閣待制杜杞請以覲為脩古後授覲建州司户参軍按杞待制天章間乃慶厯八年四月𫝊誤矣詔臣僚以劄子奏事者惟中書樞宻院聽如舊制餘悉著銜位姓名初知制誥丁度進劄子不着姓禁中誤付参知政事盛度故條約之辛巳審刑院大理寺言奉詔詳定衝入禁衛條按禁衛凡五重親從官為一重寛衣天武官為一重御龍弓箭直弩直為一重御龍骨朶子直為一重御龍直為一重今比附律令請以衝入從外第一重徒一年毎重加一等罪止徒二年誤者减二等從之壬午賜博州修河役卒緡錢五月甲申朔詔曰王者奉祖宗尚功徳故禋天祀地則侑神作主審諦合食則百世不遷恭惟太祖皇帝受天命建大業可謂有功矣太宗真宗二聖繼統重熙累洽可謂有徳矣其令禮官考合典禮辨崇配之序定二祧之位中書門下詳閲以聞王偁東都事畧於是禮院言我太祖經綸草昩遂有天下功宜為帝者祖太宗勤勞制作真宗財成治定徳宜為帝者宗三廟並萬世不毁至於升侑上帝自今以太祖為定配二宗為迭配将来皇帝親祠請以三聖並侑中書門下奏請如禮官議詔恭依乙酉詔臣僚入川所将人馬噐械舊皆給公據以檢姦偽如聞漸弛禁防自今陸行至劒門水行至江陵府其令所司参驗公據每月上樞宻院丙戌録河西節度使桑賛孫慶為三班奉職慶本親從官因試武技而自陳其家世特録之賜原武縣築河堤卒役緡錢庚寅禁縷金為婦人首飾等物李照上九乳編鐘圗鐘舊飾以旋蟲改為龍并自創八音新噐又請别鑱石為編磬辛夘命内侍挟樂工徃淮陽軍治磬石照又言既改金石則絲竹匏土革木亦當更制以備獻享乃鑄銅為龠合升斗四物以興鐘鏄聲量之率六百三十黍為黄鐘之容合三倍於龠升十二倍於合斗十倍於升既改造諸噐以定其法俄又以鑄之容受差大更増六龠為合十合為升十升為斗名曰樂斗及潞州上秬黍照擇大黍縱累之檢考長短尺成與太府尺合法愈堅定判大理寺司徒昌運言本寺詳斷大事二十日小事十日審刑詳議各减半而不以案内有無繋囚恐炎暍之際待報淹久請自四月至六月案有繋囚者减日之半兩川廣南福建湖南如急案例斷奏從之癸巳後苑新作觀稼殿成甲午廣南東西路並言妖獠㓂邉髙竇雷化等州廵檢許政死之遣左侍禁桑懌㑹廣桂二州都監討捕懌前尉郟城㑹河南諸縣多盗轉運使奏移懌澠池羣盗保青灰山時出剽攘道路患之有宿盗王伯久不獲朝廷每授廵檢使必疏姓名使捕之懌至官廵檢出偽宣頭示懌謀招致之懌不知其為偽也挺身入賊中與伯同卧起十餘日伯遂與懌出至山口為廵檢伏兵所執懌㡬不免懌曰廵檢懼無功耳即以伯與廵檢使自以為功械伯送京師而懌不復自言朝廷知之為黜廵檢使擢懌右班殿直永安縣廵檢眀道末京西旱蝗有惡賊二十三人樞宻院召懌至京師授以賊名姓懌曰盗畏吾名必潰潰則難得矣宜先示之以怯至則閉柵戒軍吏不得一人輙出居數日其下不知所為請出自効輒不許夜與數卒服盗服迹盗所嘗行處入民家老小皆走獨一媪留為具飲食如事羣盗懌歸閉柵三日復徃自携具就媪饌而以餘遺媪媪以為真盗乃稍就與語及羣盗媪曰彼聞桑殿直来皆遁去近聞閉營不出知其不足畏今皆還矣某在某處懌又三日往厚遺之遂以實告曰我桑殿直也為我察其實勿泄後三日復來於是媪盡得居處之實以吿懌眀日部分軍士盡禽諸盗其尤强梁者懌自馳馬取之還京師樞宻吏求銀為致閤門祗候懌不應吏匿其功狀止免短刺而已乙未省徳州安陵縣丙申御崇政殿録繋囚己亥詔嘗任二府而為知州者辟通判幕職官一員大兩省以上知天雄成徳軍益州泰州並許辟通判一貟其永興軍河南府延杭廣梓州通判並令審官院選差人賜天雄軍金堤澶州横壠埽役卒緡錢庚子太常禮院言王者建廟祏之嚴合昭穆之綴祖一而巳始受命也宗無預數待有徳也由宗而下等之為疏戚以為迭毁之制後世雖有顯揚褒大猶不得與祖宗並列所以一統乎尊古之道也皇帝陛下躬孝治發徳音永惟三后之盛烈際天接地而推奉之禮有所未稱眀發悼懼圗維厥𠂻使有司得稽舊章開群議攄懿鑠闡孫謀将脗合靈心垂榮無極非淺學之臣所能及已竊以太祖皇帝誕受寳命付畀四海鋪敦爕伐潜黜不端夷澤潞之畔兼淮海之昧東焚呉輿右困蜀壘湘楚閩禺請吏入朝當此之時天下之人去大殘䝉更生此萬世之業也太宗皇帝提神略席下武恭行天討底定太原由是謹九刑之辟藝四方之貢信賞類能重食勸分官無煩苛人無恫怨又引縉紳諸儒講道興學炳然與三代同風矣真宗皇帝乾粹日昭執競維烈重威撫和休寕北方順斗布度先天作聖遂考夏諺紹虞廵祕牒岱宗育榖冀壌翕受瑞福普浸黎元肖翹蚑行罔有不寜百度已備眷授眀辟洪惟一祖二宗之烈歴選墳誥未有髙焉者也昔成湯為商之祖太甲大戊武丁實號三宗后稷為周之祖文王武王庸建二祧髙帝為漢之祖孝武特崇兩廟皆子孫世世奉承不絶我太祖經綸草昧遂有天下功宜為帝者祖太宗勤勞制作真宗財成治定徳宜為王者宗三廟並萬世不遷宣布天下以示後世至於升侑上帝裒對先謨本之周道克厭典禮者太宗親郊奉宣祖太祖配真宗肇祀奉太祖太宗配今二宗同躋不祧之位則禮無異等伏請自今以太祖為定配二宗為迭配稱情適事理實無嫌其将来皇帝親祠且請以三聖皆侑上顯對越之盛次申遹追之感聖人之能事羣臣之大願此後迭配還如前議昔唐髙宗之上封也以太武皇帝文皇帝配昊天明皇之封也以髙祖配天睿宗配地開元之著禮也以髙祖配方丘太宗配神州此二宗迭配之前比垂拱開元之間髙祖太宗髙宗同配昊天真宗登介丘降社首並以太祖太宗崇配天地此三聖皆侑之眀凖其嵗時常祀則至日圎丘仲夏皇地祗配以太祖孟春祈榖夏雩祀冬祭神州配以太宗孟春感生帝配以宣祖季秋大饗配以真宗伏請皆如禮便中書門下言伏以禮之為大則必以宗祏居先徳之所尊則不隨昭穆而毁此有國之丕律而饗親之通義是以嚴父配天實因心之本惟聖饗帝乃至孝之宗非夫濬哲聰眀曷能舉百王之闕逸恭惟陛下膺神明之噐馮積厚之基明發孝思周咨舊史仍俾丞凝之列重詳今古之變若是則七世之廟咸一徳而可觀三后在天雖百代而不毁至於配侑之則並申寅奉之崇逺以襲商周之儀近以㳂漢唐之制廣矣大矣無得而名真百王之盛舉也請如禮官所議付外施行詔恭依要見當時禮官姓名今宋祁集有此奏議與實録同必祁主此也癸夘詔大兩省以上自今滿四年與改官其有殿罰者増一年又詔常参官毋得輙上章及詣中書妄求選任令御史臺紏効之又詔施州義軍如聞多雇人代戍既不時教閲復私加役使其令監司察視違者以私役兵防論甲辰賜博州修金堤役卒緡錢戊申以大暑降天下囚罪一等杖以下釋之諸路令轉運使提㸃刑獄開封府界遣殿中侍御史裏行髙若訥蕭定基踈决之定基廬陵人也丁未東頭供奉官閤門祗候知貴州田丙言得宜融栁州同廵檢麥仲舒報冝州管下鎮寜州蠻莫陵等七百餘人内㓂遣西京作坊使郭志髙東頭供奉官閤門祗候梁紹熈捕討之庚戍詔知廣州兼廣東路鈐轄知桂州兼廣西路鈐轄及權増置東路駐泊都監一員西路鈐轄一員時髙竇雷化四州蠻獠㓂邉去朝廷逺事不可申覆故令廣桂知州兼鈐轄以便宜從事也開封主簿樂誥宰相王曽外孫也或諷同提㸃府界符惟忠使薦之惟忠不從曰誥無善状安可以勢使我既而誥果以贓敗是月壬辰惟忠除府界提㸃因附此事惟忠𫝊又稱呉奎為長垣尉惟忠厚遇之奎白府共薦之按奎傳未嘗歴長垣尉或恐傳略之今亦不取六月癸丑朔詔澶州輸梢芟授官者免本戸徭役物故者勿免其遷至七品自如舊制丁巳詔幕職州縣官初任未成考者毋得奏舉先是侍御史知雜事郭勸言睦州團練推官栁三變釋褐到官才踰月未有善狀而知州呂蔚遽薦之盖私之也故降是詔廣西提刑司又言髙竇妖獠陳友眀等㓂海上遣左侍禁閤門祇候侍其洙右侍禁米光濬討捕之辛酉以親郊並侑三聖及真宗為不遷之主遣官吿於太廟左司諫姚仲孫言伏聞議者欲改制雅樂俾協純音謂舊律太髙裁之就下以髙形下人固知之然或制之未得其精損之必差其度臣盖不知其得於何道而輙變更聞其所為率多詭異至如鍊白石以為磬範中金以作鐘又欲以三辰五靈二十四孝為樂噐之飾臣雖愚昧竊有所疑自祖宗以来考正大樂薦之郊廟垂八十年洪惟先朝備行盛禮燔柴岱嶽瘞玉汾睢振前王乆墜之風舉歴代難行之典蕆事之際斯樂具陳固以格眀神昭景貺先儒審議曽靡間言若一旦輕用新規全黜舊制臣竊以為不可望特詔罷之止用舊樂時帝既許照制噐業已為之且欲究其術之是非故仲孫之章卒不下有司焉仲孫上言據㑹要乃六月九日今附見辛酉癸亥詔諸路走馬承受公事毋得受州郡餽遺違者以贓論尋有詔若餽遺飲食者聽受之先是太常鐘磬毎十六枚為一簴而四清聲相承不撃乙丑李照言十二律聲已備餘四清聲乃鄭衞之樂請於編縣止留十二中聲去四清鐘則哀思邪僻之聲無由而起也馮元等駁之曰前聖制樂取法非一故有十三管之和十九管之巢三十六簧之竽二十五絃之瑟十三絃之筝九絃七絃之琴十六枚之鐘磬各有取義寜有一之於律呂専為十二之數也且鐘磬八音之首絲竹以下受而為均故聖人尤所用心焉春秋號樂總言金奏詩頌稱美實依磬聲此二噐非可輕改今照欲損為十二不得其法於古臣竊以為不可且聖人既以十二律各配一鍾又設黄鍾至夹鍾四清聲以附正聲之次原其四清之意盖為夷則至應鍾四宫而設也夫五音宫為君商為臣角為民徴為事羽為物不相凌謂之正迭相凌謂之慢百王所不易也聲重大者為尊輕清者為卑卑者不可加於尊古今之所同也故列聲之尊卑者事與物不與焉何則事為君治物為君用不能尊於君故也惟君臣民三者則自有上下之分不得相越故四清聲之設正為臣民相避以為尊卑也今若止用十二鐘旋相考撃至夷則以下四管為宫之時臣民相越上下交戾則凌犯之音作矣此甚不可者也其鐘磬十六皆本周漢諸儒之說及唐家典法所載欲損為十二惟照獨見臣以為如舊制便帝令權用十二枚為一格且詔曰俟有知音者能考四鐘協調清濁有司别議以聞廣西轉運司言儋州獲妖獠百餘人其餘黨方會兵掩捕之乃詔賊中有能斬首來降者除其罪仍遣内侍史志聰張徳眀分賜討賊軍士土丁緡錢丁夘出内藏紬絹一百萬下三司市糴軍儲己巳以都官貟外郎曹修睦為侍御史修睦修古弟用中丞杜衍之薦也復太常博士知臨江軍龎籍為祠部員外郎福建轉運使罷秦州所造上供弓弩三年辛未御崇政殿召輔臣觀新樂先是帝親製樂曲以夾鐘之宫黄鐘之角太簇之徴姑洗之羽作景安之曲以祀昊天更以髙安祀五帝日月作大安以享景靈宫罷舊真安之曲以黄鐘之宫太吕之角太簇之徴應鐘之羽作興安以獻宗廟罷舊理安之曲景安興安惟乗輿親行則用之以姑洗之角林鐘之徴黄鐘之宫太簇之角南吕之羽作祐安之曲以酌獻五帝以林鐘之宫太簇之角姑洗之徴南吕之羽作寜安之曲以祭地及太社太稷罷舊靖安之曲於是制詔有司以太祖太宗真宗三聖並侑乃以黄鐘之宫作廣安之曲以奠幣彰安之曲以酌獻又詔躬謁奉慈廟章獻皇太后之室作逹安之曲以奠瓉厚安以酌獻章懿皇太后之室作報安之曲以奠瓉衍安以酌獻皇帝入出作乾安罷舊隆安之曲常祀至日祀圎丘太祖配以黄鐘之宫作定安以奠幣英安以酌獻孟春祀感生帝宣祖配以太簇之宫作皇安以奠幣肅安以酌獻祈榖祀昊天太宗配作仁安以奠幣紹安以酌獻孟夏雩上帝太宗配以仲吕之宫作獻安以奠幣感安以酌獻夏至祭皇地祗太祖配以㽔賔之宫作恭安以奠幣英安以酌獻季秋大饗明堂真宗配以無射之宫作誠安以奠幣徳安以酌獻孟冬祭神州地祇太宗配以應鐘之宫作化安以奠幣詔安以酌獻又造冲安之曲以七均演之為八十四皆作聲譜以授有司冲安之曲獨未施行作景安四曲興安四曲祐安五曲在元年十月乙亥作大安曲在元年十一月癸丑今並見於此獨無所謂寕安者當考乙亥章得象等上所脩一司一務及在京編勑四十四卷並賜階勲及噐幣有差廣西提刑司言蠻賊莫陵等自詣桂宜州廵檢李仲政請降省渠州天竹縣丁丑入内都知閻文應為入内都都知廣西轉運司言蠻賊莫陵本與邉人覃敵争田互相讎殺其衆才百餘人而宜融栁州同廵檢麥仲舒妄言七百人今既請降已勒誓狀放還鎮寜州詔莫陵等嘗殺害官吏而轉運司擅釋之并仲舒妄増賊數并劾罪以聞己夘命廣西路提㸃刑獄金部貟外郎魏瓘為本路運使仍詔諭瓘莫陵等既降宜令還所略人口若不從命即併兵追討之邕州獠戸縁逋責没婦女為庸者二千餘人瓘悉奏還其家劉銀時計口以税雖船居皆不免至是雷化欽亷髙州猶未除瓘為除之又减桞州無名役四百人三事附見度支判官刑部貟外郎直集賢院叚少連為兩浙轉運副使舊使者所至郡縣索簿書不暇殫閲徃徃委之吏胥持以為貨少連命郡縣上簿書悉緘識遇事間指取一二自閲摘其非是者按之餘不及閲全緘識以還由是吏不能為姦而州縣簿書莫敢不治部吏有過召詰曰聞子所為若此有之乎有當告我我容汝自新茍以為無吾不使善人被謗即為汝辨眀矣吏不敢欺皆以實對少連毎得其情諄諄戒飭使去後有能自改過者猶保任之秀州獄死無罪人時少連在杭吏畏恐聚謀偽為死者服罪欵未及綴屬少連已拏丹入城訊獄吏具服請罪以為神眀是時龍圗閣直學士鄭向守杭無治才訟者不服徃徃自州出徑趨少連少連一言處决莫不盡其理向陳留人也
