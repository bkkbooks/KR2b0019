body:
  text: 續資治通鑑長編巻一百九十五宋李燾撰仁宗嘉祐六年閏八月乙酉復以成都府為劒南西川節度己丑遣官祈晴户部郎中知制誥張瓌為契丹國母生辰使如京使朱克眀副之度支判官刑部員外郎集賢校理宋敏求為契丹生辰使西染院副使閤門通事舍人張山甫副之司封郎中楊佐為契丹國母正旦使供偹庫副使李宗副之鹽鐡判官度支員外郎集賢校理王益柔為契丹正旦使内殿崇班閤門祇候王淵副之辛夘詔定州修北岳廟壬辰以久雨賜諸軍班特支柴薪甲午翰林學士胡宿龍圖閣直學士楊畋御史中丞王疇侍御史知雜事王綽同考校諸路轉運使副提㸃刑獄課績丁酉遣官謝晴降龍圖閣直學士右諫議大夫知瀛州王䞇為吏部郎中知池州坐失保任也徙知亳州刑部郎中直史館李徽之為淮南江浙荆湖制置發運使既而臺官言徽之前為制置𤼵運使坐事罷去不當復除即改命徽之直龍圖閣知河陽河北轉運使司勲郎中直史館李繡之為制置發運使庚子工部尚書平章事集賢殿大學士韓琦加昭文館大學士監修國史樞宻使禮部侍郎曽公亮為吏部侍郎平章事集賢殿大學士右諫議大夫参知政事張昪為工部侍郎加檢校太傅充樞宻使上既許富弼終䘮乃遷𤦺首相或謂𤦺曰富公服除當還舊物公獨不可辭昭文以待富公邪𤦺曰此位安可長保比富公服除𤦺在何所矣若辭昭文以待富公是𤦺欲長保此位也使𤦺何辭以白上聞者亦是𤦺言此段據記聞或移見富弼拜樞宻使時辛丑参知政事孫抃樞宻副使歐陽修趙槩包拯並進官一等仍改修参知政事翰林學士兼端眀殿學士翰林侍讀學士左司郎中知制誥史館修撰胡宿為左諫議大夫樞宻副使宿既謹静及當重任尤顧惜大體羣臣方建利害多更張庶事以革宿弊宿獨厭之曰變法古人所難不務守祖宗成法而徒紛紛無益於治也甲辰参知政事孫抃歐陽修樞宻副使趙槩包拯並上表辭所除官從之乙巳詔給前宰相富弼月俸之半弼固辭不受丙午皇第十三女薨贈楚國公主其生才六十一日云丁未司馬光奏臣昔通判并州曽三章乞陛下早定繼嗣以遏亂源當是時臣疎逺在外猶不敢隠忠愛死數陳社稷至計况今日侍陛下左右官以諫諍為名切惟國家至大至急之務莫先於此若舍而不言専以冗細之事煩浼聖聴厭塞職業是臣懐姦以事陛下罪不容於葅醢伏望陛下取臣所上三章少加省察或有可取則斷自聖志早賜施行如此則天地神祗宗廟社稷羣臣百姓並受其福惟在陛下一言而已光既具劄子復面請之上時簡黙不言雖執政奏事首肯而已聞光言沈思良久曰得非欲選宗室為繼嗣者乎此忠臣之言但人不敢及爾光曰臣言此自謂必死不意陛下開納上曰此何害古今皆有之因令光以所言付中書光曰不可願陛下自以意諭宰相是日光復言江淮鹽賊事詣中書白之宰相韓𤦺問光今日復何所言光黙計此大計不可不使𤦺知思所以廣上意者即曰所言宗廟社稷大計也𤦺喻意不復言詔轉運使副提㸃刑獄每嵗終定部下知州軍一人能否尤著者為優劣如連二考俱在優劣等即具以聞當議特行賞罰此據㑹要治平四年十二月十八日考課院言追附六年閏八月末九月癸丑詔三司如聞河北秋稼甚登其出納藏庫緡錢一百萬助糴軍儲甲寅詔轉運判官其位本路通判及兵馬都監之上知州則以官序之丙辰磁州防禦使承亮為眀州觀察使仍封昌國公故事皇族本宫之長封國公物故則以次受封至是徐國公贈安定和懿王承簡卒而承亮於秦悼王後為最長故以命之承亮徳雍子壬戍知諫院楊畋司馬光等言故事凡臣僚上殿奏事悉屏左右内臣不過去御座數步君臣對問之言皆可聴聞恐漏泄機事非便詔自今止令御藥使臣及扶侍四人立殿角以備宣喚餘悉屏之庚午占城國獻馴象丙子宫苑使忠州刺史知雄州趙滋為龍神衛四廂都指揮使始滋捕殺界河鹽運者契丹以為言知瀛州彭永河北轉運使燕度皆劾滋生事請罷之朝廷更以為能就加軍職轉運使本傳并稱唐介按此時介未在河北也今削去尋又遷天武捧日四廂都指揮使司馬光言臣先曽論趙滋為人剛愎不可管軍朝廷不以為信臣以是恐聞聴未審不敢復有所陳自後又聞滋對契丹使人禮貎驕倨不遵舊式近者又聞本路帥臣奏滋任意行事恐致引惹切以景徳以前契丹未和親之時戎車嵗駕疆場日駭乗輿暴露於澶淵敵騎凴陵於齊鄆兩河之間暴骨如莽先帝深惟安危之大體得失之至計親屈帝王之尊與之約為兄弟嵗捐金帛以彌之聘問往来待以敵國之禮陛下承統一遵故約夫豈以此不辱㢤志存生民故也是以兵革不用百姓阜安垂六十年今契丹所以事中國之禮未有闕也為邊臣者當訓士卒繕器械以戒不虞厚饔餼謹威儀以待使者内不失備外不失好以副朝廷之意而已今滋數乗客氣以傲使人爭小勝以挑强敵茍為夸大於目前以求一時之虛名而不顧國家永久之患臣恐釁隙一開則朝廷未得髙枕而卧也昔孫蒯毁缾而曹衛交難鄫人漚菅而魯國䘮邑涉他捘手而晉失諸侯女子争桑而吴師入郢故禍常起於細微而事或生於所忽凡二國所以相交之道不可以不謹也雄州當敵之衝平居則行李之所往来有事則戎馬之所出入典州之将不可不精擇其人滋禀性狂狠不可久寘於彼乞落軍職徙之内地無使邊将相效為國生事實天下幸甚不報滋六年九月擢龍神衛廂主十二月遷天武捧日廂主八年五月又遷歩軍都虞候光所論不得其時或在滋再遷軍職之後今即附初除軍職時更俟考詳丁丑命太原府代州副部署郝質内殿崇班閤門祗候同管勾河東沿邊安撫司事郭靄脩豐州城是月司馬光復奏臣前乞㨂㑹臣并州所上章早定繼嗣事陛下即垂聴納凡所宣諭皆非愚臣所能及乃天地神祗保祐皇家實萬世無疆之休也臣意陛下朝夕發徳音宣告大臣施行其事今甫一月未有所聞豈陛下以兹事體大精選宗室未得其人将左右之人有所間沮熒惑聖聴臣皆不得而知也臣聞為之後者為之子也著於禮律皆有眀文漢成帝即位二十五年年四十五嵗未有繼嗣立弟子定陶王欣為太子今陛下即位之年及春秋皆已過之豈可不為宗廟社稷深思慮㢤臣愚亦不敢望陛下便正東宫之名但願陛下自擇宗室仁孝聰眀者養以為子官爵居處稍異於衆人天下之人皆知陛下意有所属以係逺近之心他日皇太子生復使之退歸藩邸有何所傷此誠天下安危之本願陛下果斷而速行之初韓𤦺既黙喻光所言後十日有詔令與殿中侍御史裏行陳洙同詳定行户利害洙與光屏人語曰日者大享眀堂韓公攝太尉洙為監察公從容謂洙曰聞君與司馬君實善君實近建言立嗣事恨不以言送中書欲發此議無自發之行户利害非所以煩公也欲洙見公逹此意爾於是光復具奏且面言臣向者進説陛下欣然無難意謂即行矣今寂無所聞此必有小人言陛下春秋鼎盛子孫當千億何遽為此不祥之事小人無逺慮特欲倉卒之際援立所厚善者爾唐自文宗以後立嗣皆出於左右之意至有稱定䇿國老門生天子者此禍豈可勝言㢤上大感悟即曰送中書光至中書見𤦺等曰諸公不及今議異日夜半禁中出寸紙以某人為嗣則天下莫敢違琦等皆唯唯曰敢不盡力洙尋具奏乞擇宗室之賢者立以為後既發奏状謂家人曰我今日入一文字言社稷大計若得罪大者死小者貶竄汝輩當為之備下奏状者未返洙得疾暴卒御史中丞王疇等乞優加賻贈與一子官賜錢十萬此據司馬光奏議并陳襄所作洙墓銘洙卒在九月十五日御史臺記云洙仰藥死當考時知江州吕誨亦上言曰臣竊聞中外臣僚屢有宻疏以聖嗣未立請擇旁繼指斥祖宗分别裔緒臣子之心詎當如是盖憂懼隕穫𤼵於忠誠而不虞機㑹之失也雖然宗属有親疎天資有賢愚委付親賢當出聖慮人臣安得陳露事機以萌非冀唯陛下思忠言奮獨斷遏未然之亂無使後時此防微之深慮也又聞日官近奏彗星纒心宿請備西北謹按天文志三星天王之正位中曰眀堂前為太子後為庶子星直則失勢眀則見祥質之知星者以謂既直且闇而妖星所犯變見之騐恐不在西北臣又聞自夏及秋京師滛雨諸路水潦數州地震江河泛溢民户墊溺斯隂盛之徴固有冥符唐神龍初洛水暴盛宋務光曰自登皇極未建元子非所以守器承祧養徳賛業姻戚之間謗議所集積疑成灾厥罰斯至乃已然之眀騐有以知皇天愛陛下之深數以灾異感動若尚不加警悟殆非畏天保國之深慮也臣又聞近宗室中訛言事露流傳四方人心驚疑是以隂沴之應窺覦之心不可不知其漸伏望陛下念根本之重為宗廟之計檢㑹前後臣僚奏議延對大臣周爰忠讜審擇宫邸以親以賢稽合天意况宗枝蕃茂豈無賢徳上副聖念脱或宸謀已定當使天下共知以安久系萬一姦民隂有附㑹陽為忠實以緩上心此最為患之大者不可不察也漢成帝惑王根邪説捨中山而立定陶及孝安之際梁冀姦謀貪樂安冲􅏊而畏清河嚴眀卒至於亂向用正人讜論則東西二京基祚可量㦲惟陛下思祖宗造宋之艱難監成安隳漢之基祚窒姦臣附㑹之漸絶後世窺覦之患早為定斷慰安人心天下大幸按神宗朱墨二録誨附傳並云誨上疏請早建皇嗣韓𤦺以誨及司馬光疏遂立議用英宗知宗正寺而司馬光墓志銘獨不載其事誨奏議又不存不知何也誨之孫謹嘗為誨補傳乃有此疏亦不知何從得之今擬取附見九月末右監門衛大将軍文州刺史叔韶進所業召試學士院中格遷領辰州團練使叔韶見皇祐元年六月冬十月庚辰朔駙馬都尉李瑋言奉詔舉官為将領而臣家有賔客之禁無由與士人相親聞柴宗慶等當時得禁近往還輙援例而請之詔具凡所接賔客以聞辛巳贈故客省使眉州防禦使張亢為遂州觀察使故兵部郎中張夏為太常少卿先是權御史中丞王疇言朝廷新考課之法将視州郡守長之能否而升降之盡力之吏茍於職有所施設雖沒而其勞績因事以見亦宜少追録之頃張夏守泗州取土石為城隄以拒長淮之暴又為堰岸以防汴水之入其補壊増舊之制則又著為條令而刻之於石使後人遵而不敢廢其後淮水屢漲而常賴以無虞又嘗為兩浙轉運使作石堤以防浙江之流杭人懐夏之功廟而祭之堤上至今思之又張亢在河東以麟州逺於水泉向時冦至民㡬不能自存乃築月城以包有之又瀛州之城雖堅而小緩急不足以守亢因舊基而増大其制異日或有風塵之警民得以清野入堡者非此曷恃乎亢勤職偹患實恵二州之人今夏與亢既死願陛下特加褒贈或録其子孫以勸官吏之盡心而使知朝廷察臣下之勤勞死而不忘其功亦用人之術也故䘏及之壬午樞宻院請自今前後省内臣入仕並理三十年磨勘已經磨勘者理二十年其以勞得減年者毋得過五年從之自祖宗以来内臣未嘗磨勘轉官唯有功乃遷至景祐二年九月詔内臣入仕三十年累有功勤經十年未嘗遷者奏聴㫖盖猶未有磨勘定格慶厯以後其制漸隳黄門有勞至減十五年而入仕才五七年有遷至髙品以上者兩省因著十年磨勘之制而減年復在其中至是患其幸進者不已故釐革之知諫院楊畋獨言文臣七遷而内臣始得一磨勘其法不均宜如文武官例増其嵗考乃詔入内髙班以上仍舊理十年磨勘其無勞績有􅂍私罪若公罪徒已上者倍之畋為言事官顧以士人比閹寺議者譏其失職景祐二年九月指揮實録無之㑹要具有畋言乃十一月乙丑今并書初沙苑闕馬秦州置場以劵市之内侍李繼和領其職不數月得馬千數梁適荐之詔減磨勘三年舊制内侍入仕至二十年始得磨勘自是有以勞進官者皆引繼和為例繼和事附見梁適以至和元年八月知秦州嘉祐二年八月徙永興其荐繼和當在至和嘉祐間也詔太常禮院修諡法初本院言今所用諡法乃雍熙年中所定其間字數比賀琛沈約王彦威所録多舛誤請别編修從之甲申河中府進士南宫魯為試将作監主簿以都轉運使彭思永言其文行推于鄉里也丙戍詔京東西淮南江浙荆湖南北路比年水灾盜賊仍起其令逐路安撫轉運提㸃刑獄鈐轄司於控扼之地相度増置都廵檢以聞壬辰起復前右衛大将軍岳州團練使宗實為泰州防禦使知宗正寺按宋史宗實為泰州防禦使知宗正寺書於七年正月辛未與此互異初司馬光既以所上章送中書内復出知江州吕誨章宰相韓𤦺等與同列奏事垂拱殿讀光誨二章未及有所唘上遽曰朕有此意多時矣但未得其人因左右顧曰宗室中誰可者𤦺曰此事非臣下敢議當出自聖擇上曰宫中嘗養子二人小者甚純然不恵大者可也𤦺請其名上曰宗實者今三十許嵗矣議定将退𤦺復奏曰此事至大臣等未敢施行陛下今夕更思之来日取㫖眀日奏事垂拱殿又唘之上曰決無疑也𤦺曰事當有漸容臣等商量所除官時宗實猶居父䘮乃議起復泰州防禦使知宗正寺上喜曰如此甚好琦又曰此事若行不可中止陛下斷以不疑乞從内批出上曰此豈可使婦人知之只中書行可也遂降此詔至和末上得疾文彦博富弼劉沆與王堯臣勸上早立嗣上許之㑹疾愈寢其奏既而言者相繼司馬光所言尤激切其餘不為外知者不可勝數包拯為御史中丞又力言之上未許如是五六年言者亦稍怠琦獨嘗請建學内中擇宗室之謹厚好學者升於内學冀得親賢可属大事欲以此感動上意乗間即言宜早立嗣上曰後宮一二将就館卿且待之後皆生皇女一日𤦺取漢書孔光傳懐之以進曰漢成帝即位二十五年無嗣立弟之子定陶王為太子成帝中才之主猶能之以陛下之聖何難㦲太祖為天下長慮福流至今况宗子入繼則陛下真有子矣盛徳大慶傳之萬古孰有踰陛下者願陛下以太祖之心為心則無不可者於是因光等言卒成上初意然宗實猶固辭之韓𤦺新舊傳云包拯范鎮交章論述每輙留中按嘉祐元年范鎮最先建議司馬光次之包拯此時尚在江寧十二月召為開封拯本傳亦不云與鎮交章論述及拯自開封遷御史中丞始乞豫建太子盖嘉祐三年六月事矣今畧加刪潤使不失事實又韓𤦺傳稱誨疏與司馬光疏同自内出然光疏則光自納于中書矣若謂同日進呈則可也今亦畧加刪潤更俟考詳癸巳諸王宫侍講屯田員外郎編校書籍王獵為宗正寺伴讀獵為宫僚凡十三年於宗實有輔導功故首用之初吴奎在翰林荐獵可任經筵文館之職宰相韓琦指獵名謂執政曰惟此人與孟恂不通私謁足見其有守獵長垣人也恂時為都官郎中遂與獵並除編校書籍孟恂邑里未詳乙未樞宻院言勘㑹兩省使臣磨勘條例欲除景祐二年九月詔并入内省自来黄門轉髙班例依舊外並依今年十月三日指揮其餘條例更不施行詔合該改轉髙班已上内元因勞績者及無勞績有公罪杖已下者並理十年磨勘無勞績有􅂍私及公罪徒已上者並理二十年磨勘内私罪情理輕取㫖餘並從之丙申詔知宗正寺即管勾本司事遇祠祭許見官属馬軍司言咸平縣就糧武騎帶甲剰員四指揮共管一百二十人不成隊伍虛占營壘欲乞并為一指揮從之丁酉詔磨勘選人歴任曽失入死罪未决者俟再任舉主應格聴引見其已決者三次乃許之若失入二人以上者雖得㫖改官仍與次等京官戊戍以太廟南舊府司為知宗正寺廨宇十一月丁巳起復右衛大将軍泰州防禦使知宗正寺宗實宗實上表請終䘮帝以問韓𤦺𤦺曰陛下既知其賢而選之今不敢遽當者盖器識逺大兹所以為賢也願固起之宗實表四上乃從其請戊午環州蕃官右侍禁蘇恩貸命送湖南編管仍分所管蕃部為八族各推首領以主之恩本為五門蕃部廵檢領各道鎮定邊平逺二寨部族為最盛初渭州遣指使沿邊市羊為宻覺族邀射奪其所乗銀鞍既而指使告于平逺寨官繫其族二十餘人蕃衆遂圍寨恩言其族願得放所繫人本寨既聴還而經略使韓絳令恩復追恩止推其首為過者六人至慶州絳不許遣部署馬懐徳領兵随恩大索其族皆叛去未㡬復出降絳因奏恐其後難制遂夷宻覺族恩既坐竄而五門蕃部廵檢自兹廢矣冦平逺寨在七月戊戌庚申左騏驥使嘉州防禦使入内都知史志聰落都知提㸃集禧觀志聰市後苑枯木私役親從官木仆折足而死殿中侍御史韓縝言親從布列宿衛所以奉至尊戒不虞也使主者為私役則禁衛之嚴弛矣事下開封府故事府有獄司録参軍必白知府乃敢鞫治於是多為志聰地者司録恭軍吕璹獨窮竟之志聰坐此黜璹南安人也癸亥以夀星觀新作真宗神御殿為永崇殿先是上清官灾而夀星殿獨存遂建為夀星觀或言夀星殿像則真宗御容也於是别建神御殿天章閣侍講吕公著言都城中真宗既有三神御殿矣營創不已非祀無豐暱之義請罷其役不許江休復雜志云夀星觀塑像内官以肖聖容後差省判范寛之相度别建一殿謂之夀星神御殿眀年九月改名崇先殿己巳夏國主諒祚言本國竊慕漢衣冠今國人皆不用蕃禮眀年欲以漢儀迎待朝廷使人許之庚午校書郎章衡為太常丞直集賢院大理寺丞羅愷權知淮陽軍更候一年與轉官愷第二人及第既召試而考其賦落韻也辛未於潜縣令編校祕閣書籍孫洙為館閣校勘從新制也編校書籍二年得補校勘自洙始詔如聞諸處逃軍藏匿民間或在山谷寒餓轉死者甚多其令開封府及轉運司出榜曉示限兩月首身除其罪乙亥樞宻院上所編機要文字一千一百六十一冊自初纂集訖成書凡四年餘戊寅新廣南東路鈐轄文思使康州刺史李樞願還新除官以封贈父母從之光禄寺少卿張叔詹致仕初叔詹知夀州值水災監司奏叔詹非才詔移蔡州司馬光言蔡夀之民皆陛下赤子叔詹若為政無状於民有害移彼置此有何所殊况蔡州封部闊逺户口繁庶土饒山林素多盜賊地望之重過於夀州牧守之任尤湏擇人豈有因不才被斥更得善處若叔詹實有才能恵及于民則當治本路監司罔上誣賢之罪使叔詹仍居舊任不復移易今臧否不分進退無據衆口籍籍皆云未允臣前上言為治之要在於擇人精賞罰當此亦擇人不精賞罰不當之一事也况叔詹資性庸下老而益昏本無片長授任過分其為忝冒人盡知之使之從政所至為害伏乞朝廷直令致仕或授以冗散之職勿使親民庶㡬黜陟眀白無損政體詔改叔詹知衛州叔詹遂乞致仕從之十二月丙戍詔新復豐州其擇武臣為知州置兵馬都監及監押二人徒以上罪送府州杖以下聴决之丁亥内殿崇班閤門祗候同管勾河東沿邊安撫司事郭靄為内殿承制知豐州司馬光等言伏見國家復修豐州故城仍差人知州此誠河西險要之城修之甚便然其地勢孤絶外廹冦境曏者王氏知州之時所部蕃族甚衆有永安来逺保寧三寨皆以蕃族守之慶厯初元昊攻䧟州城民及三寨蕃族盡為所虜掃地無遺今州城之中但有邱墟瓦礫環城數十里皆草莽林麓而已若建以為州則湏設寨備置官吏廣屯兵馬多積芻糧皆應調𤼵内地之民以奉之勞費甚大此所謂徇虛名而受實弊也頃年朝廷欲修豐州城河東經畧司嫌其單外廼於其南數十里築永寧堡其地窪下居兩山間疏惡難守今既修豐州則永寧堡深在腹内無所復用臣等以為不若遷永寧堡於豐州故城其兵馬芻糧不更増益但擇使臣有材略者使守之不必假以知州之名仍召募蕃漢之民使墾開近城之田俟民物繁庶皆如其舊然後升以為州亦未晚也庚寅詔諸路部署司自今諸軍各置随軍功過簿以偹遷補太常禮院言眀年正旦大慶殿當受朝賀其三日上辛祈榖于上帝前三日不作樂請如慶厯元年故事用次辛從之慶厯元年正月辛亥朔御大慶殿受朝二年正月丙午朔不受朝㑹要稱慶厯二年誤也當作元年甲午殿前都指揮使建雄節度使許懐徳卒贈侍中諡榮毅懐徳年八十猶生子筋力過人朝㑹上下馬必就平地以示尚壮在宿衛十四年數乞身上以其精神未衰不許懐徳曰臣年過矣儻為御史所彈且不能善罷即詔為減數嵗懐徳無他長自初擢守邊連以畏懦被謫已而與功臣並進典軍及坐請託得罪去而復還遭時平保寵終禄盖有天幸云辛丑三館祕閣上所寫黄本書六千四百九十六巻補白本書二千九百五十四巻遣中使詔中書樞宻院合三館祕閣官即崇文殿賜宴以嘉其勤仍詔兩制看詳天下所獻遺書擇其可取者付編校官覆校寫充定本編校官常以一員専管勾定本甲辰契丹國母遣林牙左鎮軍衛大将軍蕭傳泰州觀察留後魯昌裔契丹遣長寧節度蕭輦崇禄卿王正辭来賀正旦乙巳安化州蠻来貢方物是嵗天下上户部主户七百二十萬九千五百八十一口一千五百八十七萬五千五百八十客户三百八十八萬一千五百三十一口六百八十萬七千五百三十二
