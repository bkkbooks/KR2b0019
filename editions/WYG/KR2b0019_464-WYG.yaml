body:
  text: 續資治通鑑長編巻四百六十宋李燾撰哲宗元祐六年六月丙午御史中丞趙君錫言近論列臣僚堂除差遣已䝉出牓朝堂緣今來歸吏部者既衆其闕次至注擬不足欲除清𦂳繁劇須由朝廷除授外餘闕次並送吏部詔見今堂除闕内單利耀温州知州覇州石州順安軍通判並送吏部差注三月十五日可考尚書省言諸司提㸃刑獄每半年具賊盗火數欲上半年於秋季内下半年於次年春季内奏聞違限不奏者杖一百從之新無詔蘇軾撰上清儲祥宫碑御集十八日先是知熙州范育言王巖叟云蘇轍論范育生事繫六月十八日臣近據權發遣通逺軍姚雄四狀乞修城寨已具析利害奏聞去訖臣竊以朝廷昨詔本路與夏國分畫自定西以北二十里與秦州隆諾特界一抹取直及智固勝如堡外亦打量二十里本路再陳努扎形勢及一抹取直等處各乞隨本路利害分畫亦䝉朝廷許令與夏人商量然夏賊自去年六月中舉兵攻智固勝如二堡朝廷姑務函容止令婉順商議後來又降指揮令赴延安㑹議夏人輒敢拒違朝命妄稱延州無可斷之理及稱本國所差官已令發赴熙河蘭岷路就六處城寨界首相㑹又指延安府所差官就智固勝如等堡及隆諾特取直等事以為翻覆及南朝昏賴又云如南朝實有就和之意請勿再說及隆諾特堡上取直及二堡之事其言詞簡慢不遜全無恭順之體朝廷方且指揮許令遣官赴熙河商量而夏賊遂舉兵十餘萬衆入冦臣先期起遣崖巉老小孳蓄為清野之計及戒諸寨堅壁以守又姚雄出兵奔衝要路賊遂駐兵蟾牟山卜結隴川一帶攻毁並邊崖巉殺守巉人聞熙河岷州兵已集一夕遁去野無所掠其弓箭手人口尋各復業然而崖巉既毁未有所歸不毁者亦未得安居臣雖委官與姚雄相視舊巉又擇要便之地重行修葺然恐崖巉雖成終非禦賊之計竊觀此賊所毁諸巉皆在一抺取直之内料賊之謀自以其地係今來所執去處肆行毁撤以示必爭又如去歲毁智固勝如兾朝廷不與之較及本路更不修葺自為得計爾然智固勝如内無居住人户外無耕種地土止是差弓箭手留宿及廵檢往來廵邏為守據之計賊既攻毁則未可興工起兵遽復修築今定西以東一帶崖巉盡係弓箭手居住其傍地上皆係弓箭手耕墾各已著業歲月既乆所衣食者千有餘家無慮數千口孳蓄萬計固不可不再行修復以保邊面為今日修復之計與却開崖巉不若遂建堡寨計其人工而使邊勢獲安賊雖再來攻犯無復前曰之可毁則為上䇿也兼臣䇿料賊本為爭占此地遂行攻毁若今日修復必再萌犯邊之計恐乗此秋成因糧入冦若崖巉規模止仍舊貫勢可復毁則臣恐數千生聚不得保居稍失枝梧遂資賊手故臣所請條寨之利正在今日蓋不可緩也臣再慮朝廷猶以夏賊入訴于朝指為所執之地然爭地之體止當上遵朝命遣官來延安府或熙州以理商量雖復數四堅執不回無不可也豈可遽逞兇謀亟舉師衆肆行攻殺觀賊氣勢若我無先備則刼掠之暴將何所不至蓋其逆理犯順悖道違命之極也今以理論之彼以言詞來爭我則以禦扞應之宜不為過也豈可憚而不為之乎故彼毁二堡我修李内彭努扎以禦其來彼毁定西以東崖巉我修數堡寨以禦其來皆非自我生事蓋彼先動而我應之爾故臣願行之無疑也又竊計本路邊防利害非特為熙州之重實繫西邊一方之重西方一邊實計天下之重不可不察也何哉臣觀夏賊之為國自奄有西凉開右廂之地其勢加大後熙河既復則固已斷其右臂又得金城之險固定西之形勝據其上游可以控其腹背而臨制其國其智固勝如之於金城定西以東川谷之於定西又足以全其形而壯其勢矣臣觀金城北臨大河西邊之地偪隘南有臯蘭馬銜山之阻惟康古智固勝如平沃且有泉水可以灌溉古稱榆中其地肥美不誣矣定西以東平原大川皆膏腴上田其收畝十餘斛昨朝廷遣官相視伻圖以上可按而考也况熙河數郡之地皆屬國所占其在官者十無一二是以民兵未衆墾田未廣榖未甚積兵未甚彊今二堡定西之田無慮一二萬頃可置弓箭手僅萬人以布列二邊自占其地則此二州有金湯之固而熙河一路亦減屯戍永無邊鄙之患又歲得榖無慮數百萬斛人食其半官糴其餘則價益賤内饋亦省矣非獨爾也臣甞究知夏國之閒田彌亘山谷動數百里未悉墾闢今其爭占固非在此數十里之地其意直欲毁吾藩籬使金城定西有難守之勢異日可圖然後賊計乃遂蓋無智固勝如則金城必危無定西以北之地則定西必危金城危則熙州有奔衝之虞定西危則通逺有扼亢之患二州危則賊可攘臂於中河岷焉得而守也熙河一路危則中國無臨制之形而夏賊有跋扈之勢臣恐兵不得而解人民不得而安其患浸淫於中國故臣以謂繫天下之利害者此也恭惟神宗皇帝奮神武之畧資天下富强之勢開置熙河數郡當其經營之始不無勞人費財之患積累于今二十餘年其郡邑既已雄盛人民既已富庶法令既已整備邊勢既已盛彊兵日益減費日益省榖日益賤其規模之宏逺可以保萬世之安矣然二州藩籬有未安者輔成之䇿修葺之計正在今日故願朝廷深計而明斷之臣非不知朝廷方務鎮撫外藩消弭兵革然今日若徇夏賊之意棄其地而不與之爭臣恐此賊遂其狡謀或抑其求以大中國之威靈亦未必不悛懼而知悔回心而聽命故臣伏望朝廷無茍以今日之不用兵為可以息民而深慮異日之兵未息也無茍以今日禦賊為利害事而逺計異日之邊未可安也臣愚不勝惓惓所建修築堡寨利害乞賜詳酌早降指揮是日蘇轍云明日面奏其㑹議㨿王巖叟錄乃十七日也執政㑹都堂議育奏請事蘇轍謂呂大防曰今欲議此事當先定議欲用兵邪不欲用兵邪大防曰如合用兵亦不得不用轍曰凡欲用兵先論理之曲直我若不直則兵决不當用朝廷頃與夏人商量地界欲用慶歴舊例以漢蕃見今往坐處當中為界此理最為簡直夏人不從朝廷遂不固執蓋朝廷臨事常患先易後難此所謂先易者也既而許於非所賜城寨依綏州例以二十里為界十里為堡鋪十里為草地非所賜城寨蓋指延州塞門義合石門呉堡蘭州諸城寨通逺軍定西城要約才定朝廷又要於西寨界首相望侵係蕃地一抹取直夏人黽勉見從要約未定朝廷又要蕃界更留草地十里通前三十里夏人亦又見許凡此所謂後難者也今者又欲於定西城與秦州隆諾特堡相望一抹取直所侵蕃地凡百數十里隴諾祖宗舊疆豈所謂非所賜城寨邪此則不直致冦之大者也今雖欲不顧曲直一面用兵不知二聖謂何從來大言斷送用兵不過范育姚雄狂生一二人耳今西人壓境姚雄引兵於榆木坌堡中藏避不出王文郁擁三萬人於通逺軍閉城三日雖强弱不敵然亦足見此輩非如古人能以少擊衆可恃以制敵者而朝廷信其妄言輕結邊釁難矣劉摯曰持不用兵之說雖然美事有須用兵者亦不可固執轍曰相公必欲用兵須道理十全敵人横來相加勢不得已然後可耳今吾不直如此兵起之後兵連禍結三五年不得休將奈何乃定議不從育計明日面奏之轍曰夏人引兵十萬直壓熙河境上不於他處作過專於所爭處殺人掘崖巉此意可見此非西人之罪皆朝廷不直之故大防曰朝廷指揮亦不至大叚不直轍曰熙河帥臣輒敢生事奏乞不守誠信乗夏人抽兵之際移築堡寨臣以為方今保寨雖或可築至秋深馬肥夏人復引大兵來爭此否大防等皆言今已不許之矣轍曰臣欲詰責帥臣耳若不加詰責或再有陳乞皆曰竢其再乞詰責未晩太皇太后曰邊防忌生事宜早賜約束大防等乃聽退就都堂行約束轍欲多為詰責語王巖叟曰當職官論列職事有何惡意彊敵在境上又沮之教如何作乃止増顯屬生事一句巖叟蓋主育議者故云耳戒敇熙河蘇轍遺老傳記此事甚詳今從之但無月日今取王巖叟繫年錄依所錄用日附見巖叟議論不復詳載要亦不出轍所記但載巖叟辨轍多為詰責語一節王巖叟繫年六月十八日子由出班論范育欲移堡寨以此生事乞於今日文字中添入約束指揮簾中曰聞說邊上多是引惹余曰西賊無故十數萬人入冦邊殺戮老小安得不為禦捍計非生事也今已不從子由又曰蓋因朝廷道理曲呂相曰朝廷道理不曲且如今日報賀坤成人使延安過界又却十數萬兵在境簾中曰外地不識好惡貪取無厭退就都堂添約束語子由欲為責問語余曰當職官論列職事有何惡意强敵在境上又沮之教如何做遂止増一句而已密院進呈西人初報十五日過界既而寂然無耗至十九日忽然却來計㑹蓋每歲不來界上必令人去體問招呼今歲預戒邊臣如不來則勿問所以令自至太母曰不計㑹甚好丁未吏部郎中岑象求為兩浙路轉運副使左承議郎楊瓌寳為轉運判官仍賜米百萬斛錢二十餘萬緡從蘇軾所奏令象求等賑濟災傷也樞密院言應排連長行充承局押官者先取年五十五以下有戰功公據者仍以戰功多少得功先後傷中輕重為次事等而俱無傷中則以事藝營名第之詔可舊錄特詳今從新錄己酉于闐國遣使貢方物左朝奉大夫林邵為都官貟外郎引進使嘉州團練使狄諮差充館伴遼國賀坤成節人使副使以病臂乞免詔温州刺史向宗回代之三省言沿邊州軍得替官貟將俸餘職田錢願就本處入納赴京請領者不得入過所請之半委本州契勘的實一半合剰錢數入納附朝廷封樁帳外附訖方得書填合用公據給付牒在京𣙜貨務以末鹽錢支還仍限當日申提刑司李終𣙜貨務提刑司各依條具帳逐一開坐申其非俸餘職田錢及受請囑而詐冒入納若請囑之人並杖一百許人告以所詐入錢充賞錢從之新本削去樞密院言將副丁憂元是軍班換授并現任沿邊給假十五日不得解官及離本任即欲奔喪或扶喪前去假内可以往還者聽理為在任月日仍依取送家屬差人乞解官者奏候朝㫖從之辛亥户部言今後新城諸門透漏私錫入門貨賣百斤以上依出産地分廵捕官司不覺察私置爐烹煉法百斤展一年磨勘選人殿半年參選二百斤展二年磨勘選人殿一年參選從之新無壬子詔以暑熱權停在京工役三日詔除名人趙仁恕特送陳州編管以言者論其刑名未當罪也初四日約法十六日彦若乞祠二十八日罷侍讀給事中范祖禹言張亞之差權發遣開封府推官楊増差權知開封府司錄參軍竊以亞之為性酷虐増天資刻薄不可用詔並罷張亞之以知泗州除府推在十九日楊増未見甲寅知潞州苖授為右衛上將軍提舉崇福宫從其請也劉摯云授昔在西邊諂事李憲以軍功欺罔寖貴遂授節鉞領殿帥然諰諰常懼人擿其惡又家富洛下生理已成居第甲於洛蓋所謂史館園者官窮家富故日為去計不復有意於報効前年託疾得潞州今乞宫觀而䕶節不納遂得此除金吾與左右衛異於諸衛但俸六十千而品與節使同班仍在其上亦優命也元祐三年七月十三日為殿副武泰節度户部請河東路諸州軍合用糴本錢内預先約降四等交引一半計八萬貫空定州軍降付本司分擘與逐處趁時糴買候轉運司㸃勘申到合用交引依數折除從之新無吏部請官貟係朝廷差出除在任人及非在任人如緣軍期邊事刑獄及往水土惡弱處各理為在任外若朝廷差委幹當事務如無稽違許以二日折一日理為考任及三年以上者申尚書省樞密院審察事體重者取㫖或與理為一任從之鄂特凌古進馬一百七十九疋詔户部逐匹估價於都數内増二分回賜是日樞密院進呈西人初報十五日過界既而寂然無耗至十九日忽然却來計㑹蓋每歲不來界上必令人去體問招呼今歲預戒邊臣如不來則勿問所以今日自至太皇太后曰不計㑹甚善此據王巖叟日錄附見更須刪削又進呈北人到雄州三接人從爭三揖就坐自來皆三揖今欲止一揖意為雄守王崇拯及接伴宇文昌齡堅執俾如例大皇太后曰須放㱔劣相雄州事要不須載記得與宇文昌齡有相涉更檢語錄看乙卯吏部言犯私罪徒或姦贓及失入死罪磨勘改官後事發並申改正餘犯凖幕職州縣官所展考任法展年磨勘情重者奏裁犯罪改官後來事發而於法合改正已經轉官者免改正其私罪徒及姦贓不在磨勘之限失入死罪展年磨勘情重者奏裁從之詔以田思和為銀青光祿大夫檢校國子祭酒兼監察御史充溪洞都廵檢武騎尉以其祖忠海死命承代其故官也丙辰皇城使李嗣徽為鄆州鈐轄從京東西路安撫使蔡京辟也呂大防言昨得御前劄子以蘇軾撰上清儲祥宫碑頒示修宫費用皆出自禁中此事近臣雖或知之而外庭鮮有知者因此令中外具知甚便太皇太后宣諭曰上清儲祥宫本先帝所建意為皇嗣今來正欲成其願凡百費用皆本殿收拾錢物應副無分毫侵損國用比來亦有一二言者蓋不知也御史中丞趙君錫言臣伏見近日臺諫官論列斷趙仁恕罪名不當及趙彦若詆誣監司等事臣取到仁恕按巻看詳委有勘鞫未盡事理昨所降朝㫖雖是朝廷矜恤干繫人等不欲暑月追逮然濶畧仁恕重罪處以輕典公議不平兼未經辨理須他日飜覆自訴而彦若不能教子失為父之道公肆詆誣上欺君父無近臣之體置而不問實累聖治欲望出於睿斷早賜施行六月二十二日君錫奏此監察御史安鼎言臣近三上封章彈奏趙彦若罪犯臣之愚誠以謂天下之惡無甚於欺詐施之鄉黨朋儕猶有刑辟之禁况罔惑朝廷搖撼大獄撓天子之威柄欲使良善受害姦惡徼幸者乎此風浸長則人不得安居法不常行凡人主之所憑恃者不為重且固也今按彦若之罪具有此情臣前後論列其誠至懇到矣其言至明切矣而天聽髙逺終未聽納臣反覆思索未識其由豈謂臣卑微不足信耶不然陛下左右有為彦若之黨者挾私好曲為游辭以蔽惑明聖也審如臣言不足信則乞出臣前後章疏宣示朝堂以稽合衆論審彦若在朝有黨則是朋比之漸臣下預威福之迹已著尤宜謹察而深防之也况彦若心性隂狠精神滯闇徒有記誦之學而不識義理真所謂書簏及畫地餅爾故施於行事無聞焉及至任情冒法則與市井小民無異此何足以煩朝廷排衆論沮公議而宥之邪臣伏乞陛下奮然獨斷早以彦若付吏書罪重賜黜責以警天下之輕妄也六月十三日監察御史虞策言臣近曽三次具狀彈奏翰林學士趙彦若為其子仁恕在官酷虐贓汚事發輒緣飾巧言欺罔朝廷指論監司不實等事乞特行黜責至今未奉俞㫖臣伏以風憲之職是謂耳目耳則司聞目則司見茍不聞其詳不見其實則雖一言誠不可妄加於人既聞其詳又見其實言雖再三不敢有所避也今彦若誣罔之罪表裏悉露是以皦然公義弗與無所逃刑有言責者其可乎且田里小人不可責以行誼者也紛然訟爭於令長之庭言茍不實刑必隨之彦若朝廷近臣乃敢無所愧恥􅑀㺯權勢肆為欺誕上書天子快私忿怒誣罔不實輕犯典刑此與田里小民所為何以異朝廷獨置而不問中外疑惑不知厥繇若謂彦若以其子之故而上書為可恕邪則是凡有子犯法者父皆可得而欺君也若謂彦若止是慮鍾浚挾情攟拾為王安禮報怨為可恕邪則是為姦言巧辭誣下罔上以撓法者其人皆可得而無罪也臣謹按彦若之為人外示淳厚中實狡詐何則方其子初繫獄則上書訟監司挾情攟拾為人報怨此其意不惟以姦言巧辭營惑朝聽其實以形勢敢爭無憚示人隂欲撼搖之此彦若之狡計也及其子已除名彦若自知罪不可逃則又上書併為自訟以幸朝廷憐其知過而或恕之此彦若之狡計也反覆顛錯如此天下觀聽其可欺邪縱朝廷置而不問尚使危冠大廷接武多士入直玉堂侍經上前一切如故彦若獨何面目哉論思清切之地師儒之臣而其人物如此臣恐取笑四方玷辱聖朝伏望陛下早賜指揮檢㑹臺官前後封章發震耀之斷正欺罔之誅重行黜責以懲姦倖以正賞罰以肅紀綱臣不勝惓惓之至六月二十五日策奏此殿中侍御史楊畏言臣訪聞近者知潁昌府陽翟縣趙仁恕犯法本路提㸃刑獄鍾浚發其事仁恕之父翰林學士彦若論浚不公以謂浚為前執政王安禮報怨乞移鄰路取勘及差宿州符離知縣孟易勘到仁恕情罪錄問孟正民疏駮易所勘情節與元勘不同朝廷重於移獄更不重勘止依大理寺約定刑名仁恕追兩官除名勒停彦若放罪者臣近到臺訪問諫官御史累具論列竊謂朝廷必有施行今涉日稍乆未聞睿斷勘㑹仁恕宰執之親近臣之子受贓殺人敢行不忌鐵枷石匣木驢蒸餅擦皮取血之類近世酷吏所不敢為前後强僱部民女使不少又有因緣自縊之人及不覺察妻阿龎買物虧價一切違法罪犯品目不可勝數大理寺止約赦前供已僱人搬家屬錢五貫八百五十五文足重罪外其大約職田筵㑹供已生日支散之類正入已贓約計三十貫有零未甞併計朝廷止依大理寺約法追仁恕兩官除名勒停議者雖識朝廷仁義以大暑重於移獄而竊謂所以治仁恕者猶未當罪蓋以聖朝平時愛民之意有一情理貪暴如仁恕之罪必須特㫖施行今仁恕罪大惡極如此而朝廷止令取重罪約法有司乃觀望滅裂遂止取此一項餘皆以謂罪輕或情節未圓一切畧而不問朝廷從而行之臣實未知所謂也且朝廷務出寛恩而囚辭未服時移事乆證左不備仁恕出而自陳則是適足為仁恕啓異時欺誕之路臣初傳聞彦若自訴之語謂其父子天性之愛亦足可憫又考仁恕殘虐貪暴付吏按治又皆有實而彦若不能引義自克肆情罔上然後以謂治仁恕之罪不可以不盡而所以罪彦若亦不可以已也竊慮朝廷重於冐暑移獄害及平人勘敇以下趙仁恕恐已歸在京師欲乞勾赴御史臺據按引問仁恕若服則據罪論刑如或不服審有可疑即乞朝廷别差朝臣一名詣潁昌府推治要之必使仁恕服罪不使他日可以幸免而後已其彦若素寡識慮自干典刑猶居從官出入勸講甚非所以塞公議伏乞先賜罷黜以戒有位貼黄勘㑹二罪已上俱發以重者論惟犯贓法當併計今仁恕自盗搬家屬錢外自有正入已贓不少一皆不治則殘忍贓吏何幸而朝廷恕之何深伏望聖慈特賜睿照六月二十五日畏奏此侍御史賈易言臣聞公義勝則天下治公義廢則天下亂非獨人事實天道也竊惟仁聖之君垂拱於上忠良之臣丞弼於下至誠求治惻恒愛民之意雖格於天地交於鬼神可也奈何蔽於小不忍之言而亂天下之法正使罰不懲惡而人皆輕犯夫豈治天下之道乎以趙仁恕之貪虐殘賊彦若之誕謾欺罔臺諫論列罪惡著明終緣私恩尚抑公議人神共憤物論沸騰臣請究陳其事覬回天聽特正典刑按仁恕闒冗下流而敢慢侮國威肆為不法蔑絶人理賊殺無辜則以平人鞏辛勘作賊徒令座木蒸餅仍加絣吊慘毒備至死而復生終致脊骨曲跌脚紐筋急永為殘疾又暗加杖數决殺王宗郭徳每遇决遣罪人更用瓦片擦其瘡出血數升而後已殘酷之狀不可勝計聞者為之痛心疾首其攘竊贓汚則侵盗贓賜賞罰銅諸色官錢凡數百貫事發之後令其妻男燒毁草歴又强取民家女使數十人賤買紅羅數十匹却將貴價出賣强勒等第人户出錢二百餘貫買書箱收在後㕔用贓罰銀打大酒升行用致大量過官酒計虧官錢二千餘貫自餘公取自盗之贓莫知其數監司畧按發本州結證所招情罪十未二三其父彦若明知所犯罪在極典不自引咎乃復徼幸茍免頓忘君父之尊有不欺之大義而巧飾詐辭誣奏提刑鍾浚以為非理攟拾仁恕蓋其不肖之心有所憑藉故無忌憚如此亦既差官别勘使干連數百人横道追擾禁繫經年愁嘆嗟呼頗傷和氣實彦若為之臣甞論其不可赦之惡乞行推鞫究其實犯然後議罪定刑以示天下大公無私之政如聞仁恕止令陳州編管乃更便於仁恕曽何損哉彦若依前放罪事出無名中外喧傳益歎不平之甚也且如仁恕所犯非死不足以謝無辜被害之人設以聖朝寛恩貸其殘喘猶當配流嶺表以戒不法小人彦若則黜於散地使自省循庶乎上下肅然莫敢不情以事君父是謂罰當罪則姦邪止亦所以信於天下也臣獨不知陛下何疑而不行意者必有挾姦言為彦若之地者獨以為一𤯝謂不足揜其所長如臣考於士論則謂彦若腐儒素無他長徒以區區記誦之學冒切清顯用過其實曽何小補顧有違經賊義罔上不忠之大惡尚可忍哉是乃底裏皆露洞見肺肝復何忠信仁義之有又况刑賞之設在乎勸沮善惡帝王所以治天下之法故雖長孫無忌勲戚兼重而不使阿容撓法矧如彦若硜硜鄙夫顧可屈撓治朝之正典而累陛下無私之徳乎伏望聖慈深鑒古今治亂之原謹守祖宗太平之法赫然獨斷以暢公議貼黄彦若闒謬乖剌如此虧損聖朝寵任之明已甚加有欺天犯義之大惡雖覆載并容未行顯戮庸可乆汙論思清切之地乎使彦若血氣心知不異於人顧何施面目入侍帷幄出入禁塗又况口談先王仁義之言而躬行市井諼詐之行誠恐鬼神亦得而誅之也今若黜於散地聊示薄責是乃睿慈保全之也又貼黄仁恕所犯極典今既滅裂不加考究必開異日辯訴以為寃抑又推勘官孟易觀望事勢出入人罪公然市獄為姦亦宜顯罰然則再行推鞫之請未可廢也如或以為干連人衆追呼搔擾則明降指揮所差官除陽翟縣人吏與仁恕同情作過及後來傳道獄情改變事節之人外其餘百姓等更不得勾追如合取問照證只令就州縣供狀封送勘院施行六年六月二十六日是日詔翰林學士兼侍讀趙彦若罷兼侍讀用臺諫官之言也十六日乞祠不允十月四日十二日降黙實錄云詔翰林學士趙彦若罷兼侍讀以言者論彦若蔽子之惡誣人罔上故有是命今悉取言章依月附見于前劉摯曰記載彦若罷侍讀事尤詳今附注此摯云彦若有長子仁恕為許之陽翟令貪虐不法有狀提刑鍾浚按發之勢甚暴彦若上書言臣往為諫官甞劾王安禮浚實安禮黨恐挾此暴怨獄有不平願移獄改推内批依奏遂於隣路淮南差官止於許州制勘獄成錄問官駁以謂失重罪法當再勘自去年十月始制獄於是已半年餘矣知許州韓維奏曰此獄連逮三百八十人今前勘可斷者已决四十二人餘人尚多方此盛暑若依朝㫖移於亳州置獄即地逺冒暑淹繫可矜仁恕之妻子已病危篤士人家尚爾細民可知願止就本州别推呂大防與二三公議曰仁恕案内自盗贓無所駁正可約此重斷足矣召法寺刑部約法於都省時六月三日也明日將上仁恕贓至追兩官除名勒停更不再勘敇下言者交章或謂仁恕斷輕失其大罪或謂前勘未經伏辨異時可訴須當再推或謂如不欲再興獄而押仁恕赴臺取一審狀其意大抵以摯與彦若㛰姻家事在嫌疑故力論不已又皆痛詆彦若為前不合妄乞移獄是上書不實又云為浚報仇是誣告乞重行責摯聞諸公於上前說彦若以從官誠不宜輒上言子有罪聽官司治之可也然彦若以父子之情廹切而言止乞移推爾謂為不實誣告非也言者既不止遂増仁恕以陳州編管彦若三不允而請宫觀不已至是乃有此命言者惟賈易楊畏安鼎皆言仁恕恃親黨作過意謂摯也此事摯首曽面奏以親嫌恐招言者指日文字不敢與聞故終始不知其議每奏及此先下殿七月四日并十二日摯又云各附注本月日刑部侍郎韓宗道為户部侍郎禮部侍郎彭汝礪為刑部侍郎劉摯自敘宗道甞為摯言汝礪之父為饒之州吏昔范希文守饒也汝礪父引其長子願係名時年十五六汝礪兄也視其眉目秀因曰何不令學吏曰貧甚本白屋修學非分也希文强之置于庠仍給錢米資之年歲間頗有進益時汝礪年方童丱日持飯以餉其兄每留之教以書遂就學至於成汝礪既登科過許時希文之子純禮簽州事汝礪輒詣致敬敘恩地純禮莫喻其故而汝礪自道如此以謂家本不學由先公之教遂易其業不惟知學今乃成就門户與士大夫齒此恩為不報范氏賢汝礪謂他人狀元登科豈復肯道他人所不知衆人所恥言之事以謝人哉摯曰汝礪誠可貴也宗道因謂摯曰公知汝礪何不還其舊物摯可之汝礪本乞兵部以避梁燾而兵部王汾苦足疾憚禮部之多祠事故不可對易㑹户部范純粹除延安宗道時以刑部權户部遂正除之而以汝礪補刑部禮部不置貳自無所闕聞汝礪亦不薄刑部如此則諸曹粗定以次延頸而望者又少息也三省樞密院奏温錫沁獻馬與文彦博舊例送經畧使官答賜馬納官今取㫖太皇太后令以馬賜彦博王巖叟曰陛下若降一詔書賜之亦朝廷美事初呂大防劉摯與同列議送馬事於崇政殿欲只用帥臣例韓忠彦曰方疑面生同列皆無言既呼班巖叟謂宜賜彦博以詔蘇轍蘇頌難之傅堯俞曰朝廷賜馬亦常事有何不得賜巖叟曰可諷二相及延和庭下始諷達然上意開端已曉便有賜意既而樞密欲具本末劄與彦博知又令范育一面牽送巖叟曰劄子太輕須降詔遂添入令學士院降詔六字再奏知仍先呈三省乃下是月趙彦若為子仁恕待罪放罪蘇轍避兄請外不許文彦博辭子及進職許之劉摯謂三事皆當降詔乃皆不用朝廷典章廢矣此據摯十二日所記摯為右相乃有此言不知誰當任此責者姑存之月末更竢考詳
