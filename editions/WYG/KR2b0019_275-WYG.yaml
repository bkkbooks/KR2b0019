body:
  text: 續資治通鑑長編巻二百七十一宋李燾撰神宗熈寜八年十二月己丑命輔臣祈雪皇第三女封淑夀公主祕書丞直賢院同提舉三司勾院磨勘司王安禮知潤州先是吕惠卿言安禮任館職狎遊無度於是安禮乞出即從之王安石猶以惠卿昔居憂在潤州欲使安禮求其過失故也此據司馬記聞光禄寺丞司農寺勾當公事唐義問言朝廷遣司農官五員管勾河東路糴納臣亦在遣中體問本路久被災歉今歲雖薄收未足償積歳之苦而體量司轉運司出錢爭糴物價踊貴下户益困願罷司農官須豐年計置又懷代二州秋稼不登民失伸訴前次累年欠負一旦舉催百姓徃徃逃徙願一切倚閣而懷州更紓償納之期稍寛民力詔如義問奏其懷州常平錢期至來年夏納更有其餘災傷州郡倣此施行義問介次子也詔司農寺以河北兩路坊塲錢或借免役寛剰錢二十萬緡給河北水利司計置澶州芻豆内免役寛剰錢仍以他塲錢償之初詔都提舉市易司借内藏庫錢而本庫言見闕錢應付乞將市易司合還本庫銀絹令水利司兊借計置故有是詔翰林醫官秦廸賜紫章服治王安石疾有勞也此據御集庚寅起居舍人知饒州曾布知荆南吕惠卿既罷上以手札問王安石曰或言卿欲擬奏召曾布赴闕復任以事未知信否可宻具奏然安石訖不召布也布未赴荆南改知潭州以光禄卿直史館張靖知荆南上問安石據御集一百五十一巻不知安石如何具奏布訖不召當是布子䊸所云陛下無以其刀筆小才忘其滔天大惡或政在此時移潭州乃此月二十三日今并書曾䊸紹興初為言官韓璜所擊為其父作釋誣云先公以不從王吕為聚歛刻剥之事所以唆謫至落三職但以右正言知饒州是時銓曹謹檢舉之法從官半年檢舉凢八經檢舉始復直集賢院熈寧末神宗復用先公為北門學士王荆公奏云陛下無以其刀筆小才而忘其滔天大慝盖以論市易事不同而去其惡之深如此也璜不知前人出處本末一至於此按安石此語必因答手札問召布信否故云云䊸所載或不實但䊸記其父累歴殊不詳審神宗手札問安石當在吕惠卿去後又非熈寜末然安石云云亦未在除布荆南時既不得其實月日姑附見此當攷按實録熈寜六年九月七日翰林學士右正言曾布為起居舍人七年二月九日翰林學士起居舍人曾布權三司使七年八月十七日翰林學士起居舍人權三司使曾布落職以本官知饒州八年十二月三日起居舍人知饒州曾布知荆南八年十二月二十三日知荆南起居舍人曾布知潭州十年二月二十三日知潭州曽布為集賢院學士知廣州此皆實録所書布罷翰林學士三司使以本官知潭州本官即起居舍人也布子䊸作釋誣乃以本官為右正言誤矣布自右正言遷起居舍人已見六年九月七日又翰林學士及三司使但兩職爾不知䊸以何為三職䊸又云凢八經檢舉始復直集賢院按布以起居舍人知潭州元不曾帯職及自潭移廣始復集賢院學士盖未嘗除直集賢院䊸云從官半年檢舉凢八經檢舉始除直集賢院按布以七年八月十七日落職十二年十二月二十三日除集賢院學士首尾渉二年半既是半年一檢舉即不應二年半間經八次檢舉此皆䊸所記不詳審者吕惠卿八年九月十六日目録云只有箇曾布安石未曾喚來内裏八月十五日中書聚聼言他數件大惡臣曾說與王珪云相公曾說曾布事來呵此可參考御集所問召布虛實也太子中舍提舉成都等路茶塲兼熈河路市易司同提舉買馬李把管勾鳳翔府太平宫把以疾自陳也提舉河北措置牧地所言侵冒牧地法許人告每畝給賞錢千至三百千止後蔡確嘗請立限兩月許冒佃人首與免納己首前租種依舊佃種至今無肯首者况河北牧地根究未見者五千七百餘頃乞自今首依侵冒諸軍牧地法仍先借租牧地錢募人告從之兵志同江南西路轉運判官太子中允直集賢院吕升卿落職降授太常寺太祝監無為軍酒稅升卿對上言得解進士李籍不識字中書取籍試巻視之應格詔升卿分析升卿言不識字者猶言不别菽麥也法寺當以對制不以實追兩官初升卿於上前言練亨甫以穢德為王雱所昵且曰陛下不信臣有老母敢以為誓於是臺諫言王安國非議其兄吕惠卿謂之不悌放歸田里今升卿對陛下親詛其母比安國不既重乎於是重責之升卿親詛其母此據司馬光記聞寔録但書李籍事或當時但以李籍為名其寔坐此也升卿十月一日除江西轉運副使蔡承禧兩章可考詔諸路舉人集京師並令國子監覺察有違進士檢者依學規行罰或申中書量輕重殿舉及勒出科塲違法重者送開封府施行權發遣熈河路經略司髙遵裕言本路新復未有租稅之助而所在倉廪空虛商人絶跡轉運司計置不行乞權停買馬以川茶付轉運司變錢計置芻束上批熈河二州及外城寨糧草闕乏己極萬一别有事變於邊計所繫不輕中書樞宻院可速議權宜措置遂詔秦鳳等路都轉運司發義勇運近裏州軍芻粟應副所支口食薪菜錢依已降指揮辛卯刑部員外郎集賢殿修撰熊本知制誥本既平南川獠賊執政議除天章閣待制上曰熊本之文朕所自知當遂令掌制誥遣中使迎勞賜茶藥而有是命實録於辛卯書命權御史中丞直學士院鄧綰知貢舉知制誥鄧潤甫直舍人院蒲宗孟同知貢舉此明年正月八日事寔録誤編入此太常丞集賢校理兼直舍人院管勾國子監李定為集賢殿修撰知明州李定乆不遷兹又補外當坐徐禧罰銅事也光禄卿直昭文館提舉玉隆觀潘夙致仕夙年七十一為察訪蒲宗孟劾奏除玉隆觀而夙猶自辨不己故有是命詔京西提㸃刑獄國子博士陳升送審官東院坐體量知唐州蘇㳙不當也權御史中丞鄧綰言竊見章惇有舉官私邪奏功妄冒吕升卿有進對面欺肆為姦慝以致李定徐禧沈季長之徒皆有連朋結黨兼相庇䕶對制不實之罪伏乞各廢黜除削仍乞按吕惠卿執政之日欺謾事迹議法而流竄之朱本削去簽貼云進呈訖今復存之詔前都指揮使郝質言廣勇軍士竇元李秀率衆擅離教塲不伏教閱詔元秀處斬餘九人杖脊配廣南牢城將校降一資與開封府界近下禁軍詔三司昨衝替右侍禁陳吉降逺小處監當三司官吏不申樞宻院聼㫖令開封府劾罪先是吉押鹽綱稽留發運司申中書乞衝替吉仍降逺小處監當状下三司不以聞輙牒發運司依所申及牒三班院照㑹吉還自辨故劾之涇原路經略司言治平寨蕃部阿克節探報西界人騎燒劫投漢蕃部有實詔補阿克節為本族副兵馬使仍賜絹二十疋九年二月四日改宣今附此已而經略司言阿克節付身宣内備元刺事状縁本人部族與西界宻邇所以偵事得實今於宣内明說恐西人知之或致讐害乞别降宣及自今探事人轉補宣不顯其事又言蕃部探事利在錢帛若探事得實便與職名他日得實須更轉資職名稍高即恐不肯用心乞自今量事實輕重止與賞絹從之自九年二月四日移入此壬辰上批河北河東三路義勇保甲上畨及聚教合用錢糧并放罷弓手兵級所省僱錢添支口食其令樞宻都副承㫖中書都檢正官㑹計増減實費以聞判揚州陳升之言真揚等州開河用工四百餘萬傳聞今冬先役兵夫縁淮南苦寒或值雨雪必多死亡乞候至正月役兵二月興民夫詔開淘真揚楚通泰等州運河所相度施行仍候春暖方調民夫又詔三路州軍愆雪已遣使分禱更令轉運司訪名山靈祠委長吏祈晴癸巳上批付韓縝等今月二日據雄州繳到北界來牒坐到牙帳指揮仰依韓縝等所立旗表去處於麻谷以北界分畫尋已令樞宻院劄子付卿等去訖可疾速細詳北界牒内事節如見禧頴更切和㑹商量勿致譸張庶早見了絶此據兩朝誓書冊内十二月六日御札韓縝等言北界理辨疆界蕭素梁頴已歸牙帳乞暫赴闕奏禀詔縝案視畫圖齎赴闕七月十八日注當考廣南西路經略司言交趾以舟師駐湖陽鎮謀以兩路入㓂欽廉已陷矣十一月二十日陷欽州十二月二十日奏方到廉州當是十一月二十三日陷十二月二十二日奏到乙未上批永興秦鳳兩路連歳災傷財用艱闕幸今邊鄙無事尚可厝置中書樞宻院宜速議屯駐軍馬量減就糧兵歸營應不急冗費宜一切省罷翰林侍讀學士陳繹龍圖閣待制權御史中丞直學士院鄧綰並為翰林學士丙申詔贈太師尚書令兼中書令英國公錢惟演孫景臻尚許國大長公主贈安化軍節度使兼侍中曹琮孫詩尚邠國大長公主並授左領軍衛大將軍駙馬都尉詔武舉人罷祕閣試令止就貢院别試所考試都提舉市易司言宗室賖請物乞三人以上同保經大宗正司出歴赴務約度并息不得過兩月料錢之數如輸納違限取料錢歴批上剋折限半年輸足又言歲買商人茶從本司貿易乞以三百萬斤為額庶使商人預知定數不雜麤惡草木務令中賣數多並從之實録於此丙申已書詔李公義用鐵龍爪范子淵用濬川杷䟽濬黄河自河隂下至海口新記因書丙申浚黄河復云此書當在五月據實録明年九月丙辰所書與時政記合今繫之十二月九日誤也合削去仍附注此樞宻副使王韶言熈河路軍食闕乏人心未安權轉運判官馬瑊專以捃拾熈河官吏報復私讐為意致一路重擾乞罷瑊歸闕詔熈河經略司具瑊捃拾實状以聞九年四月十五日瑊移江西朱本簽貼云取到係進呈訖無施行事合刪和州同廵檢西頭供奉官李士宣坐不法并殺子刺配沙門島永不收叙權御史中丞鄧綰言前光禄寺丞李德芻贓汚廢黜自請尋醫昨編修㑹要所輙舉德芻檢討近又聞得㫖與在京差遣况德芻庸騃孱猥不讀書無出身外議皆云德芻韓氏之甥吕氏之壻與編修㑹要官連親親黨多為之干謁請屬乞罷德芻與在京差遣指揮從之詔判都水監侯叔獻同提舉開修淮南運河仍令發運司留上供物應副以劉瑾覆視奏至故也丁酉交趾圍邕州初沈起經略廣西妄言被㫖謀討交趾又擅撫納恩靖州儂善美及於融宜州疆置城寨殺人以千數交人震擾詔以劉彜代起冀使招輯之而彜乃更妄意朝廷有攻取謀欲以釣竒立異為功始遣官入溪洞㸃集土丁為保伍授以陣圖使歲時肄習繼命指使因督鹽運之海濱集舟師寓教水戰故時交人與州縣貿易一切禁止之七年三月三日命彛體量起八年十二月彛聼㫖於是交趾益貳大集兵丁謀入㓂知邕州蘇緘伺知其實以書抵彜請罷所行三事如故無使交人興師有名彜不聼反移文劾緘沮議又責令不得輙言邊事於是交人果大舉衆號八萬十一月抵海岸未旬日陷欽廉二州破邕之太平永平遷陸古萬四寨緘聞賊且至閱郡兵得廂禁卒并老弱才二千八百人召官吏與郡人之才勇者授以方略使以部分地自守州民震驚將竄逃者不可勝數緘悉出官帑及私財示之曰吾兵械素具畜聚亦不乏今賊衆已薄城下惟有堅壁固守以待外援可以坐勝若一人舉足則羣心動揺大事先去矣汝軰幸聼吾言兾䝉厚賞或不聼而出當先并其孥斬之大校翟積隂欲出奔緘使人伏門外梟其首以狥由是上下脅息聼命緘復募死士得數百人拏舟邕江與賊逆戰斬首二百餘級殺其巨象十數賊遂圍城緘日夜行勞士卒以神臂弓仆賊殪象不可勝計賊為攻具四面瞰城城上發火箭焚其梯衝前後殺傷萬五千餘人城中人心益固雖老㓜皆謂救至在刻漏圍即解矣墨本蘇緘傳以移文劾緘事皆屬之沈起朱本改之今從朱本盖墨本誤也己亥遣官謝雪復置三司開折司初章惇為三司使廢開折司入三部至是沈括以為失闗防㸃檢故復之樞宻院言熈河駐泊就糧本城共五十三指揮一萬六千六百餘人内七千一百餘人在城九千四百餘人差出今欲定以七千四百為在城人額從之仍令減屯泊兵歸營先是上批契勘熈河路除本處住管及就糧分畨土兵外其自京并他路差徃屯泊軍馬見管若干數目疾速進入故也其軍馬數目見御集十一月二日今并書庚子熈河路經略司言熈河開壕用二十六萬八千餘工及修棟棟鄂摩克谷二堡各六萬二千餘工北闗堡十四萬九千餘工通逺軍三面城除已役外有三十三萬七千餘工南川堡八萬七千餘工賛長堡六萬五千餘工噫碩克闗五萬九千餘工多農谷堡九萬四千餘工安鄉城十八萬餘工及勘㑹保寧三千人自今年二月十六日終十月五日共役六十餘萬工欲依所計工先後修築詔先修通逺軍城餘以逺近次第興工荆南湖北路轉運使孫桷言沅州招納偽地林錦等十三州歸明得户三千九百十丁六千四百四十一逐州分認歲入課米以鹽酬之州界逺者六十里近者四十里請補知州等官詔授地林錦州楊昌蠻等十三人為班行軍將桷又言古城州楊昌銜等願罷進奉授官請補昌銜右班殿直弟姪男等十人為三班奉職借職差使下班殿侍土軍都頭並從之新記書林錦等十三州内附盖因舊紀也舊紀又云古城州水峒蠻内附新紀不書水峒蠻當考河東經略使郭逵言如北人强來侵奪封疆未知聼其建立舖寨或以兵焚毁詔分書未定如北人强來即先以理約攔不聼即審觀機便或即時應敵或候彼人馬歸焚毁九年十月二十五日戊申又申明此指揮詔鄜延環慶涇原秦鳳路經略司同本路轉運司相度如緣邊錢糧闕乏即量減上畨就糧兵歸營賜權監察御史裏行蔡承禧緋章服承禧數言事人多危之上獨稱其忠故有是賜面諭承禧曰聊以旌卿讜言耳蘇頌作承禧墓銘云承禧為御史論大臣之任事佔權者放用親黨遍布要路非國家之福章言廷争前後數十神宗悟為之罷免并其黨者數人又論用兵交趾不可與争旦夕利而所遣北軍難以深入及不宜用中人主兵柄唐季之事可用鑒也此皆近臣所難言者人危之而上獨稱其忠藎而賜緋衣銀魚謂曰聊以旌卿讜言耳承禧論李憲副趙卨南征出命不自二府見九年正月末又論憲不當為陜西統帥是九年十二月十九日當賜章服時未嘗論憲也蘇頌云云當考辛丑都大提舉䟽濬黄河范子淵言懷衛州界沿堤林木甚多欲選材剏四百料船二百隻以給濬河之用從之仍以五十隻給李公義詔歲支錢五百千給范子淵李公義令量兩司供給人數均分充本司公用詔職方員外郎張祥宋璋各追兩官勒停祥等為諸王宮教授宗室令戚令志等皆從受業因薦就試受其家白金為謝事覺法寺以贓論故也壬寅以翰林學士兼侍讀學士判太常寺兼羣牧使工部侍郎元絳參知政事龍圖閣直學士起居舎人兼樞密都承㫖同羣牧使曾孝寛為樞密直學士同簽書樞密院事詔故司農卿趙尚寛知唐州日興復水利功甚博可於遺表外特與親屬堂除差遣一次御史蔡承禧言手實之法搔擾民户已詔廢罷而司農張諤輙移諸路轉運司令未得盡廢開封府界民欠負委是貧闕展限一年作兩料納而司農寺令諸縣實貧闕方得保明展限諸縣慮保明失實遂各催理乞下所屬施行十月二十三日罷手實承禧奏議有此全章今附注此臣伏以當今之弊莫大於上下之情不通若下情不通而主恩不宣則天下之事殆矣臣聞國家近日以手實之法搔擾人户遂行廢罷而司農張諤却牒帖諸路運司令未得盡行罷廢聼候當寺指揮臣又聞中書劄子聖㫖指揮以府界人户欠負委是貧闕展限一年作兩料送納而司農寺行帖令諸縣保明必須實有貧闕方得依此展限諸縣官員若欲抄劄貧闕人户恐或起動搔擾若欲依聖㫖指揮盡與展限又慮保明失實遂各一面且行催理是朝廷之實惠遂為空言而不及民伏乞下所屬勘㑹其張諤實有此乞與施行其司農寺實令諸縣保明諸縣不曾展限亦乞勘逐今來人户枷錮笞箠監逐如此而無以供納必是貧闕乞且依聖㫖與展限一年作兩料送納一年之中與免追呼催理所貴帝澤實及於下民四方咸荷於聖意又言先嘗論知亳州俞希旦前任兩浙轉運使以轉運司職田交易江隂職田地利未見收附并以船横江道縱舟人受賂并妄作知常州徐九思知縣郭暨等事未聞行遣乃如大藩聞希旦與兩浙轉運使張靚是親若下本路體量必不得實今又聞開常州運河日希旦以轉運使廵歴蘇常州自諭吏令已與部役官一例破開河食錢共數百緡入已乞再根究仍先罷希旦亳州之命詔蘇澥章岵案實以聞朱史簽貼此一項無施行又非朝廷急務合刪蘇澥兩浙轉運使十月二十六日除章岾兩浙轉運使十月二十六日已除又言聞大理寺丞方澤當吕惠卿與鄭膺連結張若濟於秀州華亭縣姓朱姓湯人借錢買田之時澤亦挾惠卿勢借錢數百緡惠卿又以錢七百緡令姓王人販紗羅已納千餘緡而惠卿責索無厭致自經死孤遺二子養於澤家其人與澤是親緣此惠卿於衆親中力為薦舉遂得為提舉官根究施行詔送根究公事所朱本云方澤不曾勘斷係無施行事合刪又言鄂州新城縣令曹登為手實之法趣功過甚措置苛酷乞下隣路根究詔江西轉運司案實以聞承禧奏議有劾曹登全章今附注此臣伏聞鄂州新城縣今曹登為手實之法趣功過甚措置苛酷用民桑柘量丈尺計所養蠶多少紐為貫伯令出役錢仍自令人出榜岳州之類令依其式様為知岳州周岳取其榜繳納察訪司察訪司亦不聞舉劾登作新城縣廨宇民間被害每一條木即令連納數條為手實之法每一出鄉笞撻遍野酷暴如此本路察訪司并提轉司並不舉劾以至本人善替伏乞隣路監司體量根究如得實乞不以去官赦降並行停替察訪提轉司並令取㫖所貴逺方之民有所控告不為暴吏殘虐癸卯置提舉太醫局所從太常寺主簿單驤請也御史蔡承禧言户房檢正官徐禧母黄氏私其婿莫秀才者禧頃在洪州迎之不至再三懇求遂與莫偕行舟至池州建德縣莫溺死議者謂禧與弟祕耻莫亂其母飲之以酒舁置大江未知虛實詔江南東路轉運司案實以聞朱本云體量得無實事刪去甲辰權荆湖南路轉運副使太常丞蔡煜廣南西路轉運使司封郎中李平一兩易其任尋有詔増權廣南西路轉運使一員仍以平一為之權増一員乃二十三日事今并書賜荆湖南路上供米十萬石試監主簿齋郎補牒州助教敕摠十五道以察訪蒲宗孟言本路被災傷為甚乞賑濟故也翰林學士陳繹楊繪並兼侍讀乙巳皇子景國公僴卒年四歲僴未晬能誦經握筆書畫識二十餘字傅母數試之不差廢朝五日不視事又三日贈太師尚書令冀王諡冲孝按僴以七年六月始生八年十二月薨安得云年四歲實録必誤當考丁未上始聞欽州陷廣西經略司奏至也内殿承制謝季成供備庫副使張述為廣南西路經略司凖備將領詔自京至邕桂以東置急脚遞鋪差内侍一人㸃檢係闕人處即差人貼鋪上批交趾攻陷欽州未即退恐須沿海東窺廣州不可不思審處置其廣西兵屯既寡弱又己支分捍禦若不且責以城守恐徒沮軍聲滋長賊勢遂詔廣南西路經略司命逐州軍但嚴城守毋輕出戰詔江南西路亦有災傷州軍穀價踴貴令江淮發運司同本路轉運司體量有實即許更於上供米支十萬石付本路廣南西路經略司乞差使臣十數人凖備從軍詔蔡煜於湖南選差又乞運致軍器及并差峒丁應副軍興及暫移經略司徃象州並從之遣内侍楊梲麥文炳管押安南行營什物器械先取水路前去遣入内供奉官勾當内東門司劉惟簡徃廣南西路體量勾當公事己酉廣西經略司言交趾陷廉州改知宣州衛尉少卿直昭文館石鑑知桂州詔知桂州劉彜聼㫖於潭州七年三月三日命彛體量沈起八年十二月二十四日别命周沃蔡􅂱詔廣西經略司相度交賊所向州縣鎮寨城郭不完兵備寡弱度必不可守處聼官吏據險保守東路經略司依此施行仍令兩路經略安撫使轉運提㸃刑獄提舉司如有錢帛糧草等相度指揮勿以資賊既而上批前降指揮令廣西州軍不足守捍者並仰官吏糾率兵民保險棄城自便再詳一路人情已不安若所在官司盡有奔逃之計則民聼愈惶擾可速追還前詔經略司臨事随宜指揮毋得一概行下又詔支廣南東路鑄錢監錢十萬緡及進納齋郎助教等補牒為錢五萬緡應副西路轉運司中書言欲差官諸路轉運司計置斛斗著作佐郎任廸計置廣南東路米五七萬石豆十萬石大理寺丞許選計置廣南西路米五七萬石泗州推官蹇序辰計置荆湖南路米三萬石祕書丞范峋計置福建路米三萬石並許截留上供及借諸色錢物支用仍計㑹廣南西路運至於合支用州軍輸納其廣東福建湖南常平斛斗權止支散以備移用兼令及時收糴序辰周輔子商人王震等言熈河路入中芻糧多是閑官舉人及四方浮浪之人結糴有經年方輸到或以物折納類皆伍次輕弱久之不能結絶又言邊上買馬若不用匹帛折色止支見錢或折算川茶則馬價可減二分詔措置熈河路財利孫逈根究以聞又詔廣南西路經略司選募丁壯三二千守邕賓等州城不足即選土丁從其請也又詔廣南西路經略司遣使臣分諸州軍選配軍少壯有膽勇堪披帯者赴桂州每約五百人團成一指揮教閱以新澄海為名不及即據數收管日支口食候及半年教成即依教閱澄海給請受委經略使覺察如作過凶惡即於法外重斷庚戌祠部員外郎史館修撰相度淮南水利劉瑾知廣州代蘇寀也九年二月十三日瑾改䖍州寀復故發河北第三十五將赴桂州第十九將駐潭州以備廣西經略司勾抽䇿應詔廣西官吏與交賊戰殁者經略司訪求其家倍加存恤願歸嶺北者選人䕶送之又詔翰林醫官院選治嵐瘴藥方五七種下合藥所修製又詔荆湖南北路製木弓弩七千以給廣西詔聞知潞州髙賦處事乖方令河東轉運司體量已而轉運司以状聞乃差光禄卿史炤代之明年正月十三日乃除炤今并書上批淮南江浙荆湖路今歲災傷頗甚向春艱食賊盗可虞宜下逐路轉運提㸃刑獄鈐轄司體量廵檢縣尉怯懦不職者以名聞雖職事未見曠闕而資性疲軟不任鬭捕者亦與對移監當差遣如違原體量監司當重黜不以赦降去官原免墨本於明年正月庚午又載此今削去中書言江淮等路上供米累詔截留賑救災傷欲委官䟽濬廣濟河増置漕舟依舊運京東米上供從之仍以殿中丞張士澄都大催遣輦運公事天聖六年七月熈寜七年十月可參考中書言都提舉熈河路買馬司奏每年額外買官馬委李把買塲估買欲令本司據所買馬并茶錢并撥與秦鳳等路都轉運司糴買糧草從之詔太常博士黄中庸編管亳州坐恃酒罵黄州麻城縣官及毁文書也辛亥寳文閣待制兼樞宻都承㫖李承之知延州閏四月十九日知瀛州並不行十年二月二十八日復入為都檢正蔡承禧云云可考龍圖閣待制韓縝為樞宻都承㫖兼判兵部羣牧使命知延州天章閣待制吏部員外郎趙卨為安南道行營馬歩軍都總管經略招討使兼廣南西路安撫使昭宣使嘉州防禦使入内押班李憲副之龍神衛四廂都指揮使忠州刺史燕達為副都總管光禄寺丞温杲管勾機宜文字初上批令卨交職事與皮公弼乗驛赴闕中書言恐公弼出旁郡欲令以職事付轉運或提㸃刑獄官上批延州當夏國徃來其於應接須量審諳熟邊事緩急或有生剏乃能與奪不致引惹今本路監司除公弼外葉康直劉定皆新進全未歴事難以倚仗可止依批降指揮明年正月十六日以公弼病未能赴延州且令卨交與次官速赴闕劉定永興憲閏四月十九日除葉康直永興運判五月二十五日除詔聞儂善美歸明因沈起令薛舉遣人招誘及劉彞後來處置亦自乖方遂致交趾入冦令知桂州石鑑廣南西路轉運判官周沃同蔡煜究實以聞二十二日彛聼㫖明年正月九日又付招討司王安石上再撰詩闗雎義解詔并前改定諸詩序解付國子監鏤板施行九月十二日安石云云可考詔河東經略司指揮緣邊州軍候北界來増置舖屋即對境臨邊亦安置舖屋招弓箭手壬子上批廣西兩日無奏報可下經略轉運司日具邊事動息以聞癸丑遼主遣安東軍節度司耶律世通太常少卿昭文館直學士李仲咨遼國母遣奉國軍節度使蕭逵給事中王籍來賀正旦詔曰眷惟安南世受王爵撫納之役寔自先朝函容厥愆以至今日而乃攻犯城邑殺傷吏民干國之紀刑兹無赦致天之討師則有名已差趙卨充安南道行營馬歩軍都總管經略招討使兼廣南西路安撫使李憲充副使燕達充馬歩軍副都總管須時興師水陸兼進天示助順既兆布新之祥人知侮亡咸懷敵愾之氣然王師所至弗迓克奔咨爾士庶久淪塗炭如能諭王内附率衆自歸執俘獻功㧞身効順爵禄賞賜當倍常科舊惡宿負一皆原滌乾德㓜稚政非已出造廷之日待遇如初朕言不渝衆聼毋惑比聞編户極困誅求已戒使人具宣恩㫖暴征横賦到即蠲除冀我一方永為樂土王安石之辭也時交趾所破城邑即為露布掲之衢路言所部之民亡叛入中國者官吏容受庇匿我遣使訴於桂管不報又遣使泛海訴於廣州亦不報故我帥兵追捕亡叛者又言桂管㸃閱峒丁明言欲見討伐又言中國作青苗助役之法窮困生民我今出兵欲相拯濟安石怒故自草此詔安石最不信洪範災變之說於彗星乃推之交趾云此據司馬光記聞并鮮于綽傳信録按敕榜以八年十二月二十五日下張守節敗在九年正月四日而記聞乃云交人露布云張守節等輙相邀遮士衆奮擊應時授首盖誤也今削去此叚或交人露布不一守節敗後復有之但不應在敕牓先耳王安石親作敕牓當時因露布言及苗役故也詔交趾為冦朝廷已議水陸攻討占城占臘於賊素有血讐委許彦先劉初同募海商三五人作經略司委曲說諭彼君長豫為計置候王師前進協力攻討平定之日厚加爵賞劉初廣西安撫都監五月二十七日落衝替許彦先八年三月三日除廣西憲五月二十六日改廣東運副都水監言孫賈斗門之西汴河北岸共八處可置虛隄滲水入西賈陂並淤田司欄水開河一道引水透入減水河下注霧澤陂為五丈河上源乞差楊琰管勾修置陳祐甫提舉從之甲寅中書言廣南西路轉運司奏經略司不住發兵徃欽州䇿應捕殺交賊本司支糧米五千石以奏禀不及已牒横州募人負載如無人可募即乞從上三等户差夫每夫日給錢已奉㫖依奏今㸔詳當此急難夫力必須倍邀價直兼三等以上至少恐因此破壞資産欲止令本路随逺近畨次差保丁充夫日量給錢米為便從之又詔自京至廣西轉運司已指揮逐程各凖偹兵二萬馬三千一月芻糧可更令自京至邕州逐程各凖偹兵十萬其自京至廣州止凖偹兵二萬逐程一月糧並限來年正月齊足許借常平錢糓應副以漸撥還中書言刑房刪立職司資序以上及帯館職人降差遣者欲令每任取㫖從之判都水監侯叔獻言劉瑾相度淮南合興修水利僅十萬餘頃皆並運河乞候開運河畢工以水利司錢募民并運軍鹽軍修築圩垾又昨䟽濬汴河自南京至泗州一概䟽深三尺至五尺惟虹縣以東有礓石三十餘里䟽濬不行乞以安撫司賑濟米募民開修詔運河委叔獻汴河委都水監遣官相視及未放水以前檢計工糧以聞熈河路經略司言知原州种古奏熟户蕃部大半貧乏所有地土數少百姓以於法許典賣多重疊放債冀使充折恐以故生邊患乞依舊條禁止詔依陜西一路舊敕詳定已而詳定一司敕所乞諸典買租賃合種蕃部地土者徒二年内人材少壯者配本州蕃落餘配近裏州軍近上本城從之三班借職陳景言天下州軍都知兵馬使年滿解發赴闕授班行至大將者大約三年有二百餘人舊日牙前數多比及解發無不及四十年者近年裁減人數至少遷轉歲月計須減半今在京百司吏新法皆三十年以上出官不可使外州軍優於省寺乞都知兵馬使入仕及三十年方許解發從之熈河路經略司言摩宗城首領結布投總噶爾誘定𦍑城熟户日珠族青斯巴皆徃青斯巴不從潜斬結布首來獻乞優補官職詔補青斯巴下班殿侍本族廵檢賜安南行營司公使錢三千緡上批河北等路及開封府界在京開修無用不急溝河及築隄枉占人兵處來年一切權罷以所役廂軍應副安南征討乙卯察訪荆湖路常平等事蒲宗孟言鼎澧道路之間已有殍餓流離之民尚催納秋稅及五分以上並令倚閣從之丁巳上批河北諸州軍城壕訪聞甚有乾淺者可契勘那輟諸河合起人夫早令開治了當又批契勘河北諸將下馬歩軍元額及畫日已有見闕都大人數疾速具奏是月復雲安軍雲安監置舒州同安監京兆府華耀陜州鑄錢監及置河州闊精堡興元府茶塲實録於八年十二月末載置辰州㑹溪城黔安寨此八字合除去城寨賜名在明年二月十七日改秦州和爾揚寨為堡廢真定府靈夀縣延州延水縣隴州隴西寨並為鎮實録於此月末又書廢綿州寨及招諭縣人沅州麻陽縣已於二月末書訖此削去夷人獻長寧等十州地𨽻瀘州淯井監此據實録是歲宗室子賜名授官者五十一人天下上户部主户一千六十八萬二千三百七十五丁一千五百八十九萬六千三百四客户五百萬一千七百五十四丁七百九十一萬八百六十一斷大辟一千三百九十七人自熈寜三年始制天下吏禄而設重法以絶請託之弊其年京師諸司支吏禄錢凢三千八百三十四貫有竒及沈括為三司使當熈寜八年其年支吏禄凢三十七萬一千五百三十三貫有竒京師舊有吏禄者及天下吏禄皆不預此數云此據沈括筆談附見年末當考
