body:
  text: 續資治通鑑長編巻二百四十七宋李燾撰神宗熈寜六年九月辛丑朔判司農寺曾布權御史中丞鄧綰權知審刑院崔台符並兼詳定一州一縣一司一務敇詔自今廵教使臣校殿最雖以十分為率其第一等事藝及八分或射親不及三分雖入最不行賞提舉詳定編敇宰臣王安石等言新修編敇雖已經審刑刑部大理寺殿前馬歩軍司等看詳尚慮事理未盡欲更送中書樞宻院再詳看籖貼及付在京刑法司律學官吏等各具所見申中書送提舉詳定官㸔詳如當改正即改正刋印頒行從之上批賜河州沿邉安撫司錦綵令招撫蕃部五月四日初置洮西安撫司王安石白上宜專委王韶先是上論景思立王韶事上以為王韶作縁邊安撫司事體與景思立不同至是安石為上言陛下前用王韶為沿邊安撫司以羌事成敗專責王韶當是時若陛下即用王韶為經略使則洮河事成疾二三年惟其用王韶為沿邊安撫别置帥此韓縝所以出違異之言郭達所以起矯誣之獄也今沿邊安撫司非專任洮河成敗者與王韶事不類即每事當令聽王韶不如此軍政不一上下更生釁隙害國家邊事上曰武臣自來安敢與帥臣抗安石曰先朝以來任帥臣如此非失計但置帥臣非其人乃是失計馮京曰孟徳基止因經朝廷言利便不由王素王素移令監教閱幾欲自殺安石曰若置帥即部内利便人爭自言何至乃令經朝廷自獻只縁置帥不善故有此又為上言邊事得失在幾微之中不可不察如房琯賀蘭進明事乃致睢陽不守其本甚微其末甚大安石自叙云蔡挺方主景思立害王韶故以此警上孟徳基當考王素作帥時任何官安石又因論鹽事言两浙近立廂軍額少不便乃至令衙前自雇人送綱上曰祖宗時廂軍數少安石曰帳籍既不可知又祖宗時事不同上曰祖宗時官少故占廂軍少安石曰亦恐不止為此臣耳目所接尚見圓融門内户夫修造及送綱多令鄉戸衙前自雇夫脚諸夫力縻費出於民力而不出於兵力者甚衆自韓琦富弼執政以來即稍禁止此事非但近歲差役法以來禁止也恐如此之類亦是占使兵士多供役不足然此事實可愛惜得民力若以公私為一體即稍費廂界不為害也壬寅知熈州王韶言河州平有隨軍百姓三十餘人殺降人略財物已斬之詔韶宻推究殺降兵級及降人被略殺傷數并詳度部押使臣人員合與不合勘劾仍命内臣梁從政宻體量以聞朱本削去新本同朱本今復存之先是王韶亦以書抵王安石言殺降事安石白上部轄使臣將校宜按劾不如是無以明紀律後難復用上難之安石又論其當治之狀乃有是命上既難治殺降事又問王韶所言或指涇原人安石曰韶奏狀并熈秦亦有上乃怪韶不當遽受其降以為殺傷涇原人衆矣而遽受降故士卒發憤安石曰若不受降即城未必遽下上曰奏云掘城城欲透安石曰城中尚有二千人必不肯坐死即殺傷又非特二千人而已今受降極善豈可復以為非耶荆湖北路轉運司言辰州南江將官楊萬等與蠻鬬敵有功詔楊萬夏方遷两資餘遷資減磨勘年賜絹有差相度两浙路水利沈括言浙人以治田為生所入甚廣急於得錢賤糶於有力人家迨春夏闕食又從有力之家貴糴今欲立斂散法且於一二州置和糴倉候其成緒以漸推行庻不至傷農從之管勾鄜延路經略司趙卨言自今遇大閱漢蕃陣隊且以萬二千五百人為法旌旗徽幟各隨方色先鋒策先鋒為一色左翼一左翼二為一色右翼一右翼二為一色殿後策殿後為一色内中軍所建六纛五方旗外餘亦為一色戰國之時大將之旗以龜為飾葢取前列先知之義今中軍亦宜以龜為號其八隊旗則繪天地風雲龍虎鳥蛇天地則狀其方圓風雲則狀其飛揚龍虎則狀其猛厲鳥蛇則狀其翔盤之勢以備大閱而樞宻院以為陣隊旗號若繪人物慮士衆難辨而其間亦有無形可繪者遂詔大閱旗幟止依方色仍異其形制令勿雜而已癸卯以前權江隂軍判官邵竒為太子中允知秀州華亭縣竒召對稱㫖詔遷合入官與差知两浙有水利縣王安石薦之也安石初言竒有才略欲令赴熈河凖備差遣至是乃言恐竒不肯為朝廷振舉法令姑嘗試之乃命以此賜虞部郎中趙至忠絹三百至忠本契丹歸明數言契丹舊事故有是詔至忠初見慶厯元年又嘉祐二年熈寕二年上批付樞宻院勘㑹河北河東陜西江淮京東西湖廣福建川峽等路見在都副總管鈐轄都監并三路縁邉都同廵檢職位姓名及到任再任年月日作揭貼冊進入乙巳詔趙卨詳度權移一將兵及河東秋戍馬軍七指揮就内郡糧草以鄜延年榖不登並邉艱食故也於是王安石又言趙卨欲支弓箭手糧草誠非計上曰卨但為弓箭手必無他意楊蟠姦險小人安石曰陛下付蟠以一路若蟠姦險有狀宜劾正其罪豈可但已上又曰蟠踰違考素行必不如趙卨安石曰楊蟠踰違脚色已經進呈非中書蔽覆然少年踰違自大臣以下皆所不免便以此一事斷其君子小人以為忠信不如趙卨竊恐未可今陛下所尊禮之人恐亦未免少年有踰違之行若謂其姦險小人即臣未見其狀乞陛下以所知事狀付臣等推究施行上又言卨所擘劃甚善安石曰陛下既以為善何故不行臣既備位宰相不敢不布所懐若陛下不以臣言為可何必用臣言决事上又欲令借弓箭手以草料安石曰今諸路已行借助法何須别借上曰借助法但支錢米無草料安石曰借與錢豈不能自買糴上曰無可糴買故也安石曰若私下散行糴買尚患其無即鄜延見草不支數月卒然兵馬食盡如何令轉運司買糴此臣所以不敢不言若陛下要支與有何不可何必黽勉從臣所言也八月二十六日可考丙午詔諸軍校雖已老而諳部轄者當優假之自今體量簡選雖小有疾而精神未退两目見十五歩手足不妨武藝能上下馬年未七十堪部轄差使者姑與存留即雖該退簡而不知部轄者隨處以聞當議改充廂軍將校辰州南江歸明溪峒硤州軍衙頭首指揮使向眞贈内殿崇班以章惇言眞說論蠻人有勞後為蠻舒光旦等驅略并屠其家故也丁未翰林學士右正言曾布為起居舍人工部郎中龍圖閣待制鄧綰為兵部郎中權知審刑院崔台符權發遣大理寺少卿朱温其等九人升任遷官循資有差並以修編敕成故也賜提舉王安石銀絹各五百降詔奬諭㑹要熈寜六年八月七日提舉編敕宰臣王安石上刪定編敇赦書徳音附令敇申明敇目録共二十六巻詔編敕所鏤版自七年正月一日頒行先是詔以嘉祐四年已後續降宣敇刪定命大理寺法直官劉賡左班殿直張寀充檢詳官刑房堂後官劉衮充㸃對官祕書丞胡瑗太子中舍陳偲大理寺丞張巨光禄寺丞虞太寜充刪定官權大理少卿朱温其充編排官翰林學士曾布龍圖閣待制鄧綰權知審刑院崔台符充詳定官安石提舉至是上之戊申入内都知張若水提㸃内弓箭南庫張茂則都大提㸃内弓箭軍器等四庫上批内弓箭南庫係新創置貯内降御前物色其軍器監及提㸃内弓箭器等庫並不得統轄七月十三日淮南東路轉運司言眞揚州民逐熟於泗州見賑救及兩浙提㸃刑獄司言潤州旱甚乞發省倉或量給度僧牒及紫衣師號敇募人入粟以備賑濟詔各撥常平司糧三萬石募飢民興修農田水利二十一日又詔辛亥御崇政殿試武舉進士八月二十一日閤試十七日推恩凡武舉初試義策於祕閤武藝則試於殿前司及殿試則又試策於廷於是詔武舉人策入優等武藝又入優等與右班殿直武藝次優與三班奉職末等與三班差使減磨勘二年策入平等武藝優等與奉職武藝次優與借職次等與三班差使减磨勘二年末等三班差使贈慶州柔逺寨蕃官西京左藏庫使趙餘慶成州團練使大順城蕃官文思使趙餘徳果州團練使賜其母巢氏冠帔巢夫明有武力為夏人所畏而餘慶兄弟屢有戰功繼死㑹詔諸路各遣有功蕃官赴闕巢對使者泣以被召者多其夫子部曲感二子之不得見至尊獨有畵像願與使者俱達朝廷雖死不朽上憐其意故有是命癸丑以鹽井川所築城為鹽川寨𨽻通逺軍按六月二十三日髙遵裕已於鹽井川築城寨此但賜名耳實録云置鹽川寨殊不詳今略刪潤之御史丁執禮言度支郎中皮公弼昨任發運使奏開黄池江計夫六十萬實用七十萬益以運兵三千仍令丁夫夜作逃死者千餘人乞重降貶詔淮東轉運提㸃刑獄司體究是日輔臣奏事已上顧王安石曰聞卿子雱乆被病比稍愈否安石曰雱病足瘍下漏徧用京師醫不效近呼泰州瘍醫徐新者治之少愈上曰卿子文學過人昨夕嘗夣與朕言乆之今得稍安良慰朕懐也甲寅莊宅使帶御器械知鎮戎軍張璛為右騏驥使提㸃鳯翔府太平宫璛有戰功以病請退故也張璛已見二年六月丙辰引進使眉州防禦使李端慤言朔望御文徳殿祁寒盛暑數煩清蹕紫宸之朝歲中罕御欲乞朔日御文徳望日御紫宸所貴正衙内殿之朝儀並舉從之賜屯田員外郎侯叔獻太常丞楊汲府界淤田各十頃叔獻等引河水淤田決清水於畿縣澶州間壊民田廬塜墓歲被其患他州縣淤田類如此而朝廷不知也此墨史所書朱史簽貼云取問到前史官並無照據即無田廬墳塜歲被其患之事顯是前史官誣罔合行刪去添入王安石日録内語按朱史所刪去新史已復存之日録内語仍載於四年五月十一日林希野史云原武等縣民因淤田浸壊廬舍墳墓又妨秋種相率詣闕訴使者聞之急責其令追呼將杖之民即謬云詣闕謝爾使者因代為百姓謝淤田表遣吏詣皷院投之狀有二百餘名但二吏來投之爾安石大喜上亦不知其妄也希不記何年今附注此又附七年正月甲子丁巳賜武舉進士文煥及第注两使職官熈河路凖備差遣侯抱眞而下二十三人授以三班奉職借職差使縁邊差遣後復賜煥進士及第為梓夔路察訪司凖備差遣據日録文煥黔州武進士當考十一日御試戊午王韶言大首領轄烏察等以岷州來獻賜行營將士特支錢有差轄烏察者摩正諸弟也居岷州雖有部族無文法今年春冦臨江洮山寨至是乃降朱墨二本十一月八日丁未又書轄烏察來降與此相重今移彼附此辛酉命宰臣王安石為奉安太一使樞宻使陳升之参知政事馮京王珪樞宻副使吳充蔡挺為前導官龍圖閣直學士孫固管勾鹵簿儀仗入内都知張茂則都大管勾初進呈奉安故事當差宰臣上欲止差参知政事以為郊始用宰臣為使王安石曰太一即天帝上乃差宰臣前導用御容例即差两府上令差两制安石言恐合依御容例上曰天神也仍差两府前導環慶路蕃官内殿崇班䝉布為内殿承制閤門祗候䝉布累有戰功故引見而命之詔三司委官比校淮南等七路酒稅課利増虧以聞淮南等路發運使羅拯言两浙淮南東路災傷民多流移恐向寒益致飢殍乞行貸䘏詔増賜两路常平糧斛各三萬石並依戊申詔㫖施行内两浙仍令沈括提舉戊申八日壬戌御史蔡確言聞京東河北路提舉鹽稅王伯瑜於所部商販逐利奏事赴闕及出廵至近畿販京東河北帛入京師復以京師帛賈濵棣間往往與本部公人秤子交市家有數機更自織造伯瑜人物至下幸䝉任使以案察為職而身不奉法貪恣之聲流於道路乞遣官窮究其事重行絀責以戒搢紳詔京東河北轉運提㸃刑獄司體量以聞其後逐司言伯瑜在職審有不公事狀詔送京西北路差官劾之伯瑜坐追四官勒停唐州安置又言孫坦自河東轉運使除度支副使物論不以為允但奉使諸路最為無狀前後刺舉乖實上頼朝廷清明不容坦之誣罔官吏每皆得脫寃濫坦之不公暗繆中外莫不詳知忽䝉召還参掌大計不惟坦之冒竊將誤任使而天下職司無以勸沮乞置之散地以協衆望不報據朱史簽貼云無施行刪去今依舊存之但云不報王韶入岷州轄烏察及本琳沁來降韶諭以不討虜無所得食两人各獻大麥萬石牛五百頭羊二千口并甲五十領於是王安石請償其價上疑此犒軍物不須償安石曰攻而取之服而有之既有之則不宜徒受其獻償其價乃所以懐慰新附也上從之九月二十二日癸亥樞宻院言諸司副使兼閤門通事舍人及十年遷閤門副使并中等使額本條雖言經邉任及朝廷委寄顯著勞能者方遷即不定邉任職局所在亦不分勞能大小等差及以何使額為中等故王咸有得以滑州鈐轄為寄任王易王澤李瑊皆自宫苑副使轉南作坊使十五資使額為中等良以立法之初不至詳備欲自今諸司副使兼閤門通事舍人如充職及十年曽歴四路沿邉路分都監或縁邉知州軍或安撫都監副使同安撫或自轉大使臣後以勞績曽遷官者皇城宫苑副使並除閤門副使雖不歴縁邉又無勞績但及十二年者亦遷閤門使副其餘副使並據使額遷五資依舊兼職若不願兼職及遷正使者並罷兼通事舍人其舊條曽經邉任及朝廷委寄顯著勞能兼轉中等使額自今更不行用從之王咸有事日録因程昉轉官略見其端當考詔故長寜州土刺史㪷盖子㪷辣為長寜州土刺史隴厲村首領㪷始該為廵遏使以措置夷事熊本言㪷辣族距淯井監十里領山前十二村夷衆未嘗為冦昨以一馬七牛吉刀等結㪷始該攻討三里夷賊來効首級㪷辣乞與父時封爵隴厲村亦控制諸夷水陸形勢之地縁始該𨽻南廣州土刺史李行從難即使之同列故有是命戊戌手詔聞河北近置獄甚多捕繫亦衆無辜吏民頗苦追擾可令監司提舉司速具見置獄所勘罪狀及禁繫官吏以聞仍先催促結絶無令枝蔓分命輔臣祈雨察訪梓䕫路常平等事熊本言近制漢户典買夷人田土者聽今訪聞戎瀘州縣分前此漢人亦多私典買夷人田土者皆出情願即無競爭但不敢經官印契謂宜許令齎契赴官陳首如無交加即印契給還其元無稅租地土不以敕前後並令量認租稅從之五年九月三日詔陜西縁邉蕃部土地許典賣租賃今年五月二十九日又聽典買夷人田土判將作監向宗儒乞罷蔡河木岸從之初議者乞置木岸已而計功所用梢樁夫力頗大故罷之止令修完土岸而已是月廢眞定府井陘河中府永樂濵州招安相州永和祁州深澤冀州新河陳州南頓縣並為鎭據九域志省鄴縣當附此年實録本紀並係之五年五月當考上謂王安石曰奉先寺進新種稻極佳賜與一道紫衣王安石曰陛下每以勸農事為急甚善初蔡河既作重閘有餘水乃教河側人種旱地為稻而奉先率先種稻上曰蔡河雖作重閘而未嘗閉者水有餘故也若教人廣引蔡水種稻則蔡河乃不患水多安石曰鄧艾得并水東下營田者以不頼蔡河漕運故也自來頼蔡河漕運故欲并水東下作鄧艾遺跡不可得今蔡河作重閘無所用水則欲并水東下無所不可若相旱地為塘多引溝洫作水田則陳潁數州自足食餘及京帥矣此須擇一能幹事人方了此陳瓘論曰以農事為急又急於勸農神考聖政不掩也然臣考日録之内牴牾誣訕之言臣不能無疑焉造神考之言曰只是修水利又不似王繼恩平得西川又撰安石之對曰民功曰庸乃先王之所甚貴何必平西川也嗚呼是則掠美於已非則斂怨於君吕誨之言可謂不誣矣只是修水利又不似王繼恩平得西川見七年二月九日冬十月庚午朔提舉在京市易務言市易上界先借内藏庫本錢百萬緡乞三年還從之仍以今年當撥錢三十萬緡借為杭州市易務本軍器監言遣著作佐郎朱伯虎等齎精利軍器付逐州軍為式製造從之六月二十七日可考知貴州沈起言招到融州溪峒蠻人乞籍為王民開通道路建置州縣城寨詔具當補首領職位及所經制事以聞十二月十三日可并此又詔知熈州王韶籍殺傷河州降人者以名聞如委難推究即勘㑹王君萬等捕斬人元管使臣及同作過人條具來上初圍河州蕃部開門請降諸軍既入夜殺降者二千餘人軍前匿之不奏上聞之曰禍莫大於殺已降故命考實其後韶究殺傷已降蕃部等數詔景思立不賞趙簡等十三人候韶到闕取㫖熈河路經略司言乞許人投換義勇以地給之起立稅額詔以官地招弓箭手仍許近裏百姓彊勇者占射依内地起稅排保甲即義勇願投充及民户願受蕃部地者聽之其頃畆令經略司以肥瘠定數本志同辛未江淮等路發運使太常少卿羅拯為左司郎中天章閣待制留再任改提舉在京市易務為都提舉市易司應諸州市易務𨽻焉荆湖南路察訪章惇言三路進兵討懿洽州蠻已平綱要云斬蠻酋田元猛司農寺奏請白馬韋城胙城管城新鄭五縣保甲依畿縣例於廵檢縣尉司上畨教閱從之光州刺史駙馬都尉張敦禮乞立春秋學官不許先是上以敦禮不識王安石遣敦禮詣中書見之敦禮求獨見安石安石辭以不曽被㫖與衆見之是日上問安石見敦禮否安石對如前上曰卿嘗以春秋自魯史亡其義不可考故未置學官敦禮好學不倦於家亦孝友第未知此意耳敦禮但讀春秋而不讀𫝊春秋未易可通馮京等曰漢儒初治公羊後乃治榖梁左氏最後出上曰漢儒亦少有識見者壬申權三司使薛向言凖詔根究陜西財用闕乏因依乞遣度支判官鄭民憲乗驛㸃磨秦鳯等路其永興軍路就委提㸃刑獄張穆之從之十一月一日罷省牒取索文字王安石言近得章惇書辰州屢獲首級新附之民爭先思奮葢恐功在人後上曰近者諸路士氣甚振凡兵以氣為主惟在朝廷養之耳馮京曰陛下賞之厚上曰慶厯日用兵賞非不厚然兵勢沮敗不能復振此可為鑒也安石曰誠如聖㫖若令數敗即雖厚賞之何能振其氣要當制置令勿敗耳上以為然因言李牧事曰古人役不再籍糧不三載葢養士氣以一决成功安石曰此所謂其節短也一鼓作氣再而衰三而竭亦是意也詔河州安鄉城黄河渡口置浮梁築堡於河之北上曰安鄉城鄯廓通道也濵河戎人嘗刳木以濟行者艱滯既甚何以來逺故命景思立營之又詔延州永寜關黄河渡口亦置浮梁永寜關與石隰州跨河相對嘗以芻糧資延州東路城寨而津渡阻隔有十數日不克濟者故又命趙卨營置以通糧道兵民便之是日王安石因進呈瀘州事言得熊本書以為甫望箇恕晏子可羇縻初本在京師臣與言當如此本不以為然及今乃知須合以爵命羇縻縁甫望箇恕羈旅能畧有生夷自立必粗有才畧或是豪傑若不羇縻任其并吞以彼生夷不難并制遂致強大即為一方邉患今乗其未然以爵命羇縻旁近諸夷各隨所部加以爵命既各有爵命並為内屬部落即難相并吞縱欲如此即諸部各待王命彼亦畏中國討伐又懐恩命自然并吞之心息此所謂為大於細圗難於易也上悅曰已令熊本經制他日可如此安石曰本云且有奏請僉議除瀘守上曰專令熊本經制却令本自舉一人知州事更求人必未及本安石曰此甚善癸酉詔諸軍排聫長行遷節級應取功勞者取两次以上人功勞等以先後先後等比重輕重輕等以金瘡多者為先甲戌相度两浙路水利事沈括言常潤二州歲旱民飢欲令本路計合修水利錢糧募闕食人興工從之併龍衛三十九指揮為二十指揮乙亥詔淮南東西两浙路災傷州軍當職官有弛惰不職不能存恤振救飢民者選官對移仍體量事狀以聞知桂州沈起言邕州左右江溪洞前此職司未嘗廵歴今轉運判官杜璞獨往慮諸蠻以故驚疑詔璞依故例出廵其入洞㸃檢教閱兵甲即令經畧司差官丁丑秦鳯路經略司言發弓箭手彊人二千駐岷州詔於水洛城及於永興軍屯兵内差人代歸本路上以邉人調發頻數慮民力不堪故寛之也詔布衣李復王諶聽往川峽募人分耕畿縣荒地以為稻田元豐元年十月乙夘復諶推賞所募耕者閩人亦任焉不但川峽也戊寅三班奉職申翊為右班殿直閤門祗候武學教授初三班使臣入仕年已及格當調官者雖有法式尤草畧至是命立新格程其能否而進退之翊弓馬策問皆入髙等特擢之又詔熈州大威徳河州徳廣禪院歲各賜錢五十萬設道場為漢蕃陣亡人營福王韶奏収復岷洮等州乞優賜諸軍特支錢從之庚辰分命輔臣祈雪秦鳯路都轉運使天章閣待制蔡延慶為龍圖閣直學士本傳云云已附注十一月二十五日詔三司出紬絹二十萬付王韶買熈河路蕃部餘田又詔岷州置廣銳武衛本城廂軍各一指揮熈河路走馬承受人内東頭供奉官李元凱為六宅副使寄資元凱以經略司㨗奏詣闕故也初王韶既城河州獨将兵至馬練川降轄烏察進攻宕州㧞之通洮山路岷州本琳沁以城降遂入岷州分兵破青龍族於綽羅川通熈州路疊州策凌扎卜洮州卦斯敦皆相繼詣軍中以城聽命巴珍覺亦以其族自歸軍行凡五十有四日渉千入百里復州五闢地自臨江寨至安鄉城東西千里斬首三千餘級獲牛羊馬以數萬計吕惠卿墓誌云於是西直黄河南通巴蜀北接臯蘭幅員踰三千里當考惠卿誌韶墓國史多因之惠卿又云降其名王二葢轄烏察及巴珍覺皆王也史既削去今亦從之王韶収復五州皆無端的月日據日録八月二十六日韶奏洮州降九月十七日奏至馬練川十八日奏轄烏察等獻岷州其他皆無所考見今依本𫝊并書于此是役也人皆𫝊韶已全師覆沒及奏㨗上乃大喜葢洮岷疊宕連青唐瑪爾巴山林木翳薈交道陿阻不可行韶欲為兵除道乃先遣人以伐木為名令青唐羌為衛以大兵駐谷口鎮之至是可連數騎以行而鹽井平川初既築城又據青唐咽喉之地王安石謂韶謀中機㑹故所至克㨗云辛巳宰臣王安石等以修復熈州洮岷疊宕等州幅員二千餘里斬獲不順蕃部萬九千餘人招撫大小蕃族三十餘萬帳各已降附上表稱賀上觧所服玉帶賜安石遣内侍李舜舉諭㫖曰洮河之舉小大並疑惟卿啟廸迄有成功今觧朕所御帶賜卿以旌卿功安石再拜固辭曰陛下㧞王韶於疎逺之中恢復一方臣與二三執政奉承聖㫖而已不敢獨當此賜上又令舜舉諭㫖曰羣疑方作朕亦欲中止非卿助朕此功不成賜卿帯以𫝊遺子孫表朕與卿君臣一時相遇之美也安石受賜常日御垂拱殿是日以受賀故再御紫宸知熈州樞宻直學士禮部郎中王韶為端明殿學士兼龍圖閣學士左諫議大夫秦鳯路副都總管捧日天武四廂都指揮使昭州刺史張玉為宣州觀察使知通逺軍權熈河路總管西上閤門使榮州刺史髙遵裕為岷州刺史知岷州引進副使張守約知通逺軍初議賞王韶以節鉞王安石曰優與轉官職可也節鉞宜待後功韶奏乞與黄察換武官令知岷州上曰岷州當付髙遵裕用察非所宜王安石曰誠當如此乃使守約代遵裕上又欲令遵裕帶沿邉安撫使曰王韶嫌景思立事權重若復以此命遵裕則足以抗思立事權安石曰甚善翌日又言陛下欲經略四夷則須明軍中紀律太祖遣兵伐江南諭曹彬但能斬次將即能為大將葢知長子帥師弟子輿尸之義故也今王韶為大帥髙遵裕則陵慢於東景思立則陵慢於西昨與思立分路乃令思立自擇要去處其後約與思立㑹合思立乃不肯來即止令苖授以下來不得已而來然亦不至所期處而止臣聞如此問之李元凱果然若將佐乖戾不相承禀如此則大將威名不立於境内如何欲加敵國今韶幸有功臣謂陛下宜稍别異令髙遵裕景思立軰知所忌憚則韶威名宣著邉境大將威名宣著即勝之半也如其不然恐緩急有大舉動必誤事耳是日上論及天下户口之數王安石等奏户口之盛無如今日本朝太平百年生民未嘗見兵革昨章惇排定湖南保甲究見户口之衆數倍前日葢天下舉皆類此上曰累聖以來咸以愛民為心既未嘗有大征役又無離宫别館繕營之事生齒蕃息葢不足怪因言三代盛時諸侯一遵法度及其衰法制弛壊不可復振為天下者正當以大公之心以正朝廷使紀綱號令上下有守雖更數千百年安有怠忽之弊又論邉將因言李廣程不識之為將謂廣得士心不識有節制已能勝敵之半勾當御藥院李憲為遥郡團練使寄資給全俸景思立攻下阿納城憲監其軍故有是命壬午賜岷州公使錢歲千五百緡癸未内藏庫使提舉熈河路蕃部王君萬為皇城使英州刺史賜絹五百匹走馬承受六宅使李元凱為禮賔使寄資大理寺丞汲逢遷两官餘推恩有差賞収河州之功也詔三班使臣先給事英宗者並與指射差遣一次甲申朝獻景靈宫丙戌遣司門員外郎趙約之自京至河州提舉編排馬遞鋪及補帖兵級季一替仍令河北監牧司給馬配塡以上批聞秦州以西至河州遞鋪闕兵士及馬故也募在京廂軍赴河州人支錢千賜袍一秦鳯路轉運使蔡延慶言比差三班奉職伊懐寳管押糧草出洮西而懐寳以前日部糧草得賞輕乃求隨軍如奏功望毋推恩以誡徼倖上曰此亦人之常情管押糧草何人不可懐寳亦勇士正堪行陣葢延慶使之非當耳又曰岷河蕃部族帳甚多儻撫御咸得其用可以坐制西夏政所謂以蠻夷攻蠻夷若於陜西極邉㑹合閱練為用兵之勢以形敵人彼必隨而㸃集以應我頻年如此自致困敝兵法所謂佚能勞之者也王安石曰朝廷但當先為不可勝聚糧積財選兵而已新附之羌厚以爵賞収其豪傑賜之堅甲以激其氣使人人皆有趨赴之志待我體完力充鼓行而西將無不可馮京王珪曰儻如聖策多方以誤之彼既疲於㸃集而我無攻取之實一二年間必不我應自爾舉兵若蹈無人境矣上曰此乃昔人取吳之策也夫欲經營四夷宜無先於此賜两浙淮南東路常平米各五萬石付轉運司以賑飢民丁亥熈河路經略司言邈川蕃部都廵檢使温納木扎爾潁沁薩勒乞授官給俸詔授莊宅副使依漢官請給時温納木扎爾潁沁薩勒居河州之北所管二十八部族有兵六萬餘人西接董戬南距黄河勺家族東界咱家族北鄰夏國所居至河州四驛今與夏國通和聞河州既下遣次首領和爾阿木都四十三人請命故寵之上批歩軍司虎翼右第二軍第三指揮人員三百四十六人引見呈試弩槍刀轉資賜銀有差廵教使臣以下皆推恩時在京諸軍出戍還營教閱多廢忘上初置内教場訓練有法旬一御便殿程其能否而勸沮之人人奮勵五年九月癸亥舊紀書始御便殿旬校諸軍武技而勸沮之新紀同葢誤也合削彼存此皇城使馬偁言河北禁軍自立牙教陣法訓練已成序惟馳驟野戰未精臣竊見涇原路土兵最號精銳乞選弓馬出衆之人赴河北教習從之手詔河北災傷其境内盗賊委安撫司酌情處斷今淮南歲飢可檢㑹依此指揮詔常州武進晋陵湖州歸安烏程長興五縣各増丞一員杭州鹽官於潛湖州徳清武康秀州崇徳五縣各増主簿一員以事劇從轉運司請也庚寅两浙轉運鹽事司乞益兵千人詔發開封府界京東兵各五百人時以鹽法未行盗販者衆故也食貨志熈寜四年分遣大理寺丞盧秉著作佐郎曽黙往淮南两浙詢究利害異時竈户煑鹽與為市鹽場不時償其直竈户益困秉先請儲發運司錢及雜錢百萬緡以待買鹽者而鹽場皆定鹽竈火仗盤數以絶私煮之弊自三竈至十竈為一田而煮鹽地什伍其民以相稽察及募酒坊户願占課額取鹽於官賣之月以錢輸官毋得越所酤地而又嚴捕盗販者於是两浙鹽事司請益兵千人詔發開封府界京東兵各五百人王安石為上言曰两浙自去歲及今歲各半年間所増鹽課四十萬今又増及二十五萬緡而本路欲用四萬募兵増置廵檢甚便樞宻院蔡挺以為不可皮公弼馮鼎者希望沮其事安石曰夫以所増鹽課十分之一二足以多招廂軍使私煎者絶則無復犯刑其利一也沿海之地有戍守之兵可以待不虞其利二也鹽課大増其利三也且又不販鹽自須反本尤為大利今杭蘇鹽課虧乃私販不禁故有鹽賊淮南鹽課増以私販者絶故無盗朝廷若謂鹽禁當弛曷不盡弛之若其未可即當禁絶私販然後人不䧟於刑殺今議者知鹽禁不可弛而但欲寛其禁是陥人於刑殺也於是卒如两浙奏蔡挺以五年二月十六日自渭州召入為樞副不應四年便與王安石異論本志稱四年必誤合從實録係之六年十月二十一日今但附注于此盧秉五年二月十八日以檢正吏房殿中丞權發遣两浙憲仍專提舉鹽事七年五月改淮東憲六月仍以浙憲轉一官八年五月以太常博士遷祠外升一任浙鹽増課故也上曰裁併軍營凡省軍員四千餘人此十萬軍之資也若訓練既精人得其用不惟勝敵兼亦省財王安石等曰累歲以來陛下選用使臣專令訓練間御便殿躬親試閱賞罰既明士卒知勸觀其技藝之精一人可敵數夫此實國家安危所繫也安石又言併營練卒事既有効凡此皆無害於人而不逞者乃妄相扇動上曰須漸定去安石曰今已帖息矣兵志第五巻併營篇熈寜二年始併廢營陜西馬歩軍營三百二十七併為二百七十馬軍額以三百人歩軍以四百人其後總兵之撥併者馬歩軍五百四十五營併為三百五十五而京師之兵類皆撥併畿甸諸路及廂軍皆㑹總竒零各定以常額凡併營先為繕新其居室給遷徙費軍校溢員者以補他軍之闕或隨所併兵入逐指揮依職次髙下同領上嘗謂輔臣曰天下財用朝廷稍加意則所省不可勝計迺者銷併軍營計减軍校十將以下三千餘除二節賜予及僕從廪給外計一歳所省為錢四十五萬緡米四十萬石紬絹二十萬匹布三萬端馬藁二百萬束庻事若此邦財其可勝用哉志所載上謂輔臣云云别見七年六月十九日章惇與王安石書言誅舒光貴得馬軍力安石為上言之上亦以為南方宜用馬軍安石曰彼止有歩人我兼馬歩固宜勝上曰今馬軍多不精一營或止有數十匹馬安石曰此自當省併上曰見已省併安石曰洮河異時可以牧馬若團結訓練鼓舞蕃部為用即不患無精騎可使因言王韶已令汲逢團結蕃部支散常平及養馬上曰須武人乃可任此安石曰要用兵須武人平時團結即須文吏今因散常平團結成什伍就令酋長管轄使沾息錢之利即酋長樂為用緩急擇其材勇者以功受賞則衆必爭奮矣辛卯河南監牧使司封郎中劉航權河北西路轉運使河北路都轉運使祠部員外郎史館修撰劉瑾為河北東路轉運使賜三司勾當公事李杞緋章服以被命提舉陜西錢帛之勞也鄧州置教閱忠果两指揮請受賞給視京東忠果王韶言摩正子烏丹烏沁與補一官詔補三班奉職賜姓籛名懐義又詔河州置武衛安鄉城置蕃落各一指揮仍差鄜延環慶秦鳯路走馬承受各就本路選募上曰洮岷蕃族繁盛俟召王韶至令議團結庻它日可用王安石曰羌夷之性雖不可猝化若撫勸得術其用之也猶可勝中國之人上曰昔商之頑民本居中國又以畢公主之尚書既歴三紀世變風移况蕃夷乎但日漸月摩庶幾有就耳日録二十一日對語與此相類又重叠六月四日所書今止用墨史舊文亦改朱史六月四日所書但存日録對語縁朱史参取别修語意又重叠也刑部侍郎致仕觧賔王卒壬辰權發遣廣東轉運判官許彦先請應銅錢路通行折二錢詔除在京并開封府界外諸路并通行四年三月十四日七年七月十八日可考两紀並書壬辰行折二錢明州言髙麗入貢上批本州遣諳識海道人接引轉運司委官用新式迎勞髙麗自國初皆由登州來朝近歲常取道明州葢逺於遼故也上慮州縣供頓無前比因以擾民故命立式仍一切取給于官又詔髙麗不通華言慮規利之人私與交易令所在宻止約又詔引伴禮賔副使王謹初等與知明州李綖訪進奉入貢三節人中有無燕人以聞詔宗室女僕嘗生子者不得再雇入有服属位甲午上謂輔臣曰梁從政自河州至言黄河水極清泚不與中國比前書所謂黄河之源淺可渉葢不誣也然河之本源未見所出禹貢但言導河積石至於龍門不言導河自積石以此知出積石者特其下流耳王安石曰按西域𫝊河有两源合注蒲昌海其水停居冬夏不増皆以潛行地中南出積石為中國河陛下所考禹貢導河不言所自非臣等所及詔五岳四瀆所在長吏祈雪賜章武軍留後承選芳林園宅地一區官為營造賜涇原秦鳯路經略使張詵王廣淵各銀絹五百以収復河岷應副軍湏有勞故也上批武成王廟自乾徳二年用唐故事建於都南以郭子儀升殿復以李晟補其闕詳開元十九年剙廟之始李靖李勣已與圗象昨以堂廡頽廢命官修完今已工畢其令禮官議先朝功臣勲烈著於簡策可配祀典者以名聞後不果行丙申知桂州沈起言已遣兵防托蠻賊慮辰州討賊将卒不分有無罪惡一例殺戮乞下章惇約束從之上批聞河州修城禁軍弓箭手廂兵自興工五十餘日縁身衣装漬裂殆盡雖日得雇錢而募人助役尤為勞費可量與支賜禁軍人給絹一匹弓箭手廂兵人給錢千仍候分屯日給之賜江南東路常平米七萬石賑濟災疫詔都水監司農寺提舉在京諸司庫務自今並許直牒閤門上殿沈起言交趾劉紀欲歸明不納必恐如儂智髙上問執政交趾事僉以為未可許劉紀許劉紀交趾必争王安石曰聞温杲已來乞候温杲到商量取㫖上曰交趾可了但恐沈起了不得安石曰起自以為易了然兵事至難誠恐起未易了馮京曰交趾安能一心但恐其人相與之固不如羌人爾安石曰交趾所任乃多是閩人必其土人無足倚仗故也二十七日事丁酉權三司使薛向請止絶秦鳯路轉運使蔡延慶置場减價出賣鹽鈔從之先是延慶言熈州築城寨一役方興屯戍甚衆洮岷大兵費用日廣臣已權一時之急以東南鹽鈔依市價募商人入中見錢雖所賣價稍虧元數而為利甚厚至是向言始有㫖以陜西觧鹽歲入不過三百萬緡分於两路州郡秦鳯歲當一百七十一萬緡今秦鳯未滿歲而入中錢已四百六十餘萬緡溢两路之額而延慶更欲權宜損價非獨輕動舊法兼已溢定額為害不細故詔止絶熈河路經略司言収復河岷洮等州逐處蕃部各懐震怖當職官吏因此往往擅發蕃部及雇牛驢負載官物乞誡約之詔熈河路諸州城寨官司應當差牛驢負載官物並禀於經略司如緩急邉冦聽一面差發仍以正兵兼蕃兵其擅差及科配者並從違制論提舉官不覺察奏裁仍許人告厚賞之上批熈河一路自用兵以來誅斬萬計遺骸暴野逰魂無依朝廷子視四海所宜哀矜可遣勾當御藥院李舜舉往収瘞弔祭之仍設水陸齋為死者營福焉舊紀書遣内侍掩熈河暴骸新紀但書詔不書遣内侍詔施州蠻聽以金銀平估實直質官糧米如七年不贖即變易之初施州蠻因災傷以金銀倍估直質米于官官司不能禁至是始令估實直以易之詔中書自今命官過犯及編配人所犯情理分輕重次輕次重四等刑名著為定例戊戌于闐貢方物两紀並係之年末詔通判河州太常博士李山甫送審官東院與監當坐徧與執政書飾言邉事蔽覆河州官兵違節制殺降故也畵天下州府軍監縣鎮圖所上十八路圖一及副二十巻上言四夷但訓練兵精不常屯守有警乃應今中國反不如王安石曰比來中國誠不如四夷今四夷又不如古中國若盡什伍其人使隨處有以待敵乃古中國之法也太子中允館閣校勘黄履權監察御史裏行是月廢梅州入程鄉縣𨽻湖州省熈州馬騌寨新紀於此月末書占城降於交趾舊紀無之今不取詔都大提舉大名府界金隄范子淵等開修直河此據㑹要七年六月所載増入其詳具七年六月末六年六月十七日十一月八日七年一月五日十二月十一日並當参考汴河隄岸司言汴水添漲其京西四斗門分減不退以致開決隄岸今近京除孔固斗門減水下入黄河雖有孫賈斗門減水入廣濟河然下尾窄狹不盡吞伏乞萬勝鎮舊减水河汴河北岸修立斗門開淘舊河剙開生河一道下合入刁馬河役夫一萬三千六百四十三人一月畢工從之此據河渠志六年十月事今附月末
