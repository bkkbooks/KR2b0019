body:
  text: 續資治通鑑長編巻八十六宋李燾撰真宗大中祥符九年春正月壬子延州界碩爾族廵檢殿直李文真與蕃兵轉戰斬濟裕勒太保首級命遷一資仍賜錦袍銀帯丙辰置㑹靈觀使以參知政事丁謂為之仍加刑部尚書以馬軍副都指揮使張旻為宣徽南院使兼樞宻副使仍領昭武軍節度殿前都指揮使曹璨領武寕軍節度歩軍副都指揮使王能為都指揮使領静江軍節度殿前都虞候蔚昭敏為馬軍副都指揮使領鄜州觀察使先是旻被㫖選兵下令太峻兵懼謀欲為變有宻以聞上召二府議之王旦曰若罪旻則自今帥臣何以御衆急捕謀者則震驚都邑此尤不可上曰然則奈何旦曰陛下數欲任旻以樞宻臣未敢奉詔今若擢用使解兵柄反側者當自安矣上從其言故諸帥皆逓遷軍果無他上語左右曰王旦善處大事真宰相也實録云丁謂加刑部尚書張旻為南宣徽副樞宻加檢保換昭武節度使曹璨加檢尉換武寧節度使皆奨修内之勞若奨修内之勞則如丁謂曹璨加官徙節可矣擢升両府與丁曹異此必有他故今取遺事録所載附益之當考又按㑹要云曹彬以平江南功為樞使不罷旄鉞十九月而罷及張旻為樞副亦依舊領旄鉞己未上詣㑹靈觀焚香命有司定朝拜之禮著為式此據㑹要辛酉同玉清昭應宫副使林特上㑹稽録詔奨之仍付秘閣特前為三司使奉詔纂大中祥符八年天下户口財賦凡户八百四十二萬二千四百三口一千八百八十八萬一千九百三十計入兩税錢帛糧斛二千二百七十六萬四千一百三十三絲綿鞋草二千二百八十三萬六千六百三十六茶鹽酒稅𣙜利錢帛金銀二千八百萬二千癸亥發内蔵錢五十萬貫給三司先是太常博士秘閣校理聶震丁所生母憂而嫡母在禮官按周制庶子在父之室則為其母禫晋解遂問蔡謨曰庶子喪所生嫡母尚存不知制服輕重荅曰士之妾子服其母與凡人喪母同又胡澹所生母喪自有嫡兄承統而嫡母存疑不得三年問范宣荅曰為慈母且猶三年况所親生乎嫡母雖貴然厭降之制父所不及婦人無專制之事豈得引父為比而屈降支子南齊禇淵遭庶母郭氏喪葬畢起為中軍将軍後嫡母呉郡公主薨葬畢令攝職即令震解官震時校冊府元龜樞宻使王欽若總其事言震嫡母在當免持服事下禮儀院奏云若特有奪情之命望不以追出為名自今顯官有類此者亦請不稱起復第遣釐職甲子詔震依舊赴宣徽院校冊府元龜盖從宜之制也乙丑總噶爾嘉勒斯賚埒克遵等遣使貢謝恩馬五百八十二匹復賜以器幣緡錢總萬二千計初輔臣參議答賜咸曰埒克遵貪狡不識事機往因冦凖輕信賜與過厚致其増氣今當約所貢直以給之或求華靡之物止可賜金塗銀器上曰來使自云埒克遵不法或不如所望回必見殺此不足聽疑有教導之者曹利用曰埒克遵所為不法甚多皆可詰責以抑僥求上曰或言以敵冦攻敵冦朝廷之利也向敏中曰趙德明今方納欵何用嘉勒斯賚加兵况未能平設能平之其勢益大又須存撫之也王旦曰頃覩奏章稱立文法統衆三十萬朝廷亦疑其所為故遣使深入察之及楊承吉還其趣向惟貪財殺人人既不附上下胥怨又無逺慮何由成功或假以恩寵則小小種落必遭凌脅若知朝廷不加信用則當自相殘戮矣上然之己巳令樞宻院每季上軍馬總數省月奏之煩也興州團練使德文言子侍禁承顯赴起居請依贈河州觀察使德鈞子承裕例班在贈鄂州觀察使惟忠子從恪之上從恪於承顯雖姪行而拜職在前遂詔宗正寺定宗室班圖以聞宗正言按公式令朝參行立職事同者先爵爵又同者先齒今請宗子官同而兄叔次弟姪者並虗一位而立德文又言爵同先齒當叙尊卑為之等列上曰朝廷班制以授官先後為次不可易也徳文少好學凡經史百家手自抄撮工為辭上以其刻勵如諸生嘗因進見戯呼之曰五秀才由是宫中悉稱之盖徳文秦悼王第八子其兄三人蚤卒徳文於次為第五也上封泰山祀汾隂幸亳徳文必奏賦頌上每賜詩輒令屬和嘗有痁疾更數醫未效或曰有善治者在江南上為驛召醫至曰藥用生牛乳詔有司日給一器疾已為賞醫者以官又嘗因疾獻詩十三篇上悉為和之數言願得名士為師友特命翰林學士楊億與之游惟忠魏懿王徳昭第四子也庚午詔傳法院以太宗妙覺集為妙覺秘詮御製法音集為法音指要摹印頒行從兵部侍郎趙安仁之請也度支貟外郎知河中府勾克儉妻悍戾與豪家往還因縁納賄克儉不能禁辛未降克儉知寕州壬申雨雪放朝以工部郎中張士遜為户部郎中直昭文舘左司諌直史舘崔遵度為户部員外郎直史舘如故並充夀春郡王友賜襲衣犀帯緡錢又賜遵度金紫作詩寵之時王将受經命中書擇耆德方正有學術者為府官士遜時為河北轉運使以其平雅和謹歴外任著治聲澹於榮利遵度同修起居注踰十年立殿墀上常退匿楹間慮上見之搢紳推其長者即召士遜赴闕而並命焉初宰相将用士遜等為翊善記室上曰翊善記室府屬也王皆受拜故以王友命之令王每見答拜示賔禮之意士遜嘗謁王旦稱王學書有法旦曰公為王友職止於是耶士遜媿謝歐陽修以此事為責諭德二年八月始建東宫崔遵度魯宗道實為諭徳時王旦已死矣今止從遺事録發内蔵錢二十萬貫令三司預市紬絹以濟京東西路之乏時青齊間絹直八百紬六百官給絹直一千紬八百民極以為便自是紬絹之直日増後數歳遂皆倍於昔時云此據王皥百一編云祥符八年禁庭火左蔵庫内蔵庫皆然來年降㫖州郡預支紬絹之直民間每歳蠶績既登青齊間絹直八百文紬又减二時官中支錢一千紬八百文自兹紬絹價日増數歲後皆倍于昔也又國老閑談云王旦在中書祥符末内帑災縑帛幾罄時三司使林特請和市于河外表三上而旦悉抑之頃而特率屬僚訴于宰府旦徐曰𤨏㣲之帛固應自致奈何彰國弱於四方居數日外貢併集受帛四百萬盖旦先以宻符督之也今不取乙亥詔京朝幕職州縣官求致仕者令審官院吏部銓檢勘歴任具有無贓以聞是月詔三司多于逺年帳案内捜尋名件直行指揮下諸州府根逐磨勘年月深逺案籍不全勾追照驗頗成煩擾自今不得復然違者仰逐州府将所下文字實封進納如州府自敢輙便行遣即委轉運提㸃刑獄司覺察聞奏補樞宻院守闕主事馬崇素為西頭供奉官閤門祗候書令史馬崇至為左班殿直馬崇慶為右班殿直貼房馬用和為借職從樞宻副使張旻陳乞崇素等皆旻妻族也二月丁丑朔以左驍衛將軍致仕趙懐忠為文思副使懐忠太平興國初為黄門嘗從太宗出征得執盖奔走左右太宗憐之前以疾致仕至是疾愈故有是命詔在京勾當庫務臣僚有以公事上殿取㫖者並與同官參議平允具體例以聞違者坐之初監官上殿多以獨見奏禀進止而所陳非當故命條約㑹要二月一日事戊寅以度支員外郎權知宗正寺事趙世長知孟州太子右贊善大夫趙廓權宗正丞事初本寺言陵廟行禮闕官令文宗正卿一員少卿丞各二貟主簿一員時止趙安仁兼卿世長知寺事上因謂王旦等曰安仁嘗參宰府與世長列銜非便旦曰請自今命京官兼主簿郎中已下兼少卿丞郎已上兼卿以為永式然世長知寺數年忽降兼丞亦似無謂王嗣宗嘗言世長父用成坐贓棄市不當使之司宗望授外郡别擇官以備宗職上從之仍詔月給宗正寺公用錢五十千庚辰上謂輔臣曰提舉諸司庫務藍繼宗言𣙜貨務去年茶引錢一百五十萬緡比新額殆虧十萬緡丁謂曰比逓年及新額雖少比未改法則利且倍矣自大中祥符已後嵗及二百萬緡六年至三百萬緡七年又増九十萬緍故八年止有此數然以今年正月比去年已贏三十萬緡由是校之改法非不便也翌日中書復以三司嵗校茶利數聞上曰從初嵗利幾何至於前代與今孰多王旦等曰元和國計茶税歲不過四十萬緡朝廷自克復江浙總山場㩁務共獲錢四百餘萬緡太平興國初並實錢也自後西北急於軍糧入中之際添估加耗入粟之地與出茶之區不相應㑹以是實直盡為虗錢舊法弊極難於行用故須改法今若守而不變則三百萬緡嵗利可以不失本志以王旦對上語並出丁謂今從實録壬午徙知河南府冦凖判永興軍知永興軍李廸為陕西都轉運使癸未詔御史臺推直官自今以二年為滿不舉職者換他官依資外任時殿中侍御史金陵李餗援高弁俞獻卿例求補外郡中書言弁固庸人無它能然在職将二嵗以親老求歸侍特命知淄州獻卿累更任使得知潁州餗才通判一任入䑓始周歳與弁輩不侔初詔以三年為限若限其半特繫宸㫖因降是詔詔廣南綱運悉令官健送至闕自今至䖍州代之乙酉上與宰相語唐開元天寳政治優劣因曰姚崇宋璟真名相也明皇委之不疑誠為至當而過信國忠林甫誠可惜也王旦曰姦邪之人誣陷良善其言似忠人主難辨而外人罕敢極言以取禍故國忠林甫得以專陷人人君若能察陷人而自進者十可見其七八唐室顛危數矣而人歸唐德者頼祖宗仁恩浸厚也上曰陸贄言德宗英睿有獨御寰中之志且天下至大人君何由獨治也丙戌知秦州曹瑋言州民多訟田者及追取契要皆云亡失若召集鄰保頗為煩擾盖買地之初未嘗税契改户以是牒訴繁委臣即移告屬縣舊無契者限兩月詣官首露輸税印劵凡得新户一千六百二税錢四千二百三十貫訟訴頓息慮諸路亦多此類望徧行條約從之丁亥監修國史王旦等上兩朝國史一百二十巻優詔答之戊子加旦守司徒修史官趙安仁晁逈陳彭年夏竦崔度並進秩賜物有差王欽若陳堯叟楊億嘗預修史亦賜之己丑修國史院言兩朝實録事有未備望降赴本院増修從之辛卯以陕西民飢發廪粟賑之壬辰命修景靈宫副使同玉清昭應宫副使戸部侍郎林特詣兖州景靈宫太極觀設醮以營建畢故也宫觀總一千三百二十二區詔奨監修内臣賜工卒緡錢甲午詔築堂於元符觀南為皇子就學之所賜名曰資善上作記刻石堂中命入内押班周懷政為都監入内供奉官楊懐玉為夀春郡王伴讀仍面戒不得於堂中戲笑及陳玩弄之具庶事由禮使王親近僚友丙申以後宫崇陽縣君李氏為才人丁酉上封者言延州蕃部闕食正當農時望發鄰州廪米貸借從之已而轉運使言延州見貯軍糧二十七萬請出五千石賑給俟豐熟歛以還官詔可戊戍中書門下請自今休假並放朝日兼乞後殿不坐凡再表固請詔自今上已端午重陽二社及大雨雪放朝更不視事自餘如舊其事須奏禀者即時請對又請旬休日不御便殿視事從之壬寅詔揚州公費錢每嵗加給二十萬從知州薛映之請也癸卯召近臣於翔鸞閣觀太宗御書及御製聖文神筆頌玉宸殿記等上作詩命從臣和又幸流杯殿泛觴登象瀛山翠芳亭宴玉宸殿殿在苑中宻邇宫禁上優寵宰輔每大禮慶成從容一召至焉後兩制皆預特恩也甲辰修景靈宫使丁謂請選軍士三百𨽻兖州景靈宫太極觀給掃除之役詔可詔明州自今有新羅舟飄至岸者據口給糧倍加存撫俟風順遣還三月乙巳朔詔自今旬假更不視事遇合覆奏公事即詣便殿請對㑹要三月一日詔秦州蕃郡尚揚丹者嘉勒斯賚之舅也斯賚使與熟户卦斯敦謀立文法於哩旺族謂斯敦曰文法成可以侵漢邊復蕃部舊地曹瑋知之厚結斯敦嘗解寳帯予焉斯敦感激求自效謂瑋曰吾父何所使欲得吾首猶可斷以獻瑋察其誠謂曰我知尚揚丹時至汝帳下能為吾取尚揚丹乎斯敦愕然曰諾後十餘日果斬其首以至丙午瑋請加爵命上深嘉瑋功欲顯賞斯敦又慮嘉勒斯賚以瑋潜遣人害其親族為言或致紛擾賜瑋詔令詳度之瑋方議築南市城奏斯敦獻地宜賞乃授斯敦順州刺史南市本曰南使蕃語訛謂之南市西南距州百五十里東北距籠竿城八十里秦渭相接扼西戎要處也瑋請用秦渭五州兵及近寨弓箭手城而居之異日戍兵代還則别募勇士三千為南市城弓箭手上以瑋静而集事手詔褒美據實録授斯敦順州刺史在三月初二日至二十一日始詔瑋詳度瑋奏斯敦獻地方行誥命行誥命當又在二十一日後也盖初二日始除斯敦為刺史元未行出須瑋復奏故二十一日後乃行出實録但記始除耳今取前後事並書之城南市實録又在二十五日今亦附見戊申召宗室觀書玉宸殿己酉復召宗室宴射苑中前召觀書從容移晷不暇置宴故復召焉上問諸王以經史悉能應對分閲巻目皆不差互上甚悦遣使廵撫温處州發廪粟賑貧民因按視杭州江岸京兆府言民飢詔賑之選内侍三班各一人為秦州縁邊走馬承受公事時曹瑋請以本路駐泊都監王懐信為安撫都監有機事則副使都監更迭入奏上不許而置是職樞宻使王欽若上新校道蔵經賜目録名寳文統録上製序賜欽若及校勘官器幣有差尋又加欽若食邑校勘官階勲或賜服色初東封後令兩街集有行業道士修齋醮科儀二年七月壬申命欽若詳定成羅天醮儀十巻八年正月丙申又選道士十人校定道蔵經二年八月辛夘明年於崇文院集官詳校欽若總領鑄印給之舊蔵三千七百三十七巻太宗嘗命散騎侍郎徐鉉知制誥王禹偁太常少卿孔承恭校正冩本送大宫觀欽若增六百二十二巻又以道德隂符經乃老君聖祖所述自四輔部升于洞真部欽若自以深逹教法多所建白時職方員外郎曹谷亦稱練習欽若奏校藏經未幾出為淮南轉運使奏還卒業詮整部類升降品第多其所為也令著作佐郎張君房就杭州監冩本初詔取道釋蔵經互相毁訾者皆刪去之欽若言是年是月老子化經乃古聖遺迹不可削去又言五年十二月九天生神章玉京通神消災救苦五星祕授延壽定觀内保命六齋十直凡十二經溥濟於民請摹印頒行從之此叚縂載或已有入長編者當檢討刪去曹谷即驗汾隂靈文者七年五月癸丑欽若上洞真部六百七十巻壬子給事中填從吉削一任翰林學士給事中錢惟演罷學士初咸平縣民張贇妻盧訴姪質被酒訽悖張豪族也質本養子而證左明白質納賄胥吏從吉子大理寺丞鋭時督運石塘河往來咸平為請求縣宰本縣斷復質劉姓而第令與盧同居質暨盧迭為訟縣聞于府㑹從吉權知府事命户曹參軍吕楷就縣推問盧之從叔虢略尉昭一納白金三百兩於楷楷乆而不决且以俟追劉族為名即還府盧兄太子中舍文質又因進士吳及納錢七十萬于從吉長子大理寺丞鈞以其事白父而隱其受賄之状盧又詣府列訴即下其事右軍廵院昭一兄澄嘗以手書逹惟演云寄語從吉事逮鈞鋭請緩之時及已亡命軍廵請捜捕且曰未得及則獄不具從吉亟召軍廵判官祝坦至㕔事後詢之毁所請状又令鋭宻問坦獄情何若頗自疑懼因宻作奏請付御史臺未報紏察刑獄王曽趙稹詣便殿以聞且言事渉從吉慮軍廵顧避稹方知雜請不以付臺乃命殿中侍御史王竒户部判官著作郎直史舘梁固鞫治仍遣中使譚元吉監之逮捕者百餘人獄成奪楷鈞二官配𨽻衡州郢州鋭坦文質皆奪一官坦貶濠州參軍盧澄者陳留縣大豪也嘗入粟得曹州助教殖貨射利侵牟細民頗結貴要以是益横劉綜知府日嘗犯法綜憤其豪横䋲之奪官配郢州仍請後有過不以贖論詔可其奏至是與昭一並决杖澄配𨽻江州昭一特除名從吉惟演並坐責自餘决罰有差情重者配𨽻外州樞宻直學士右諌議大夫知益州王曙前知開封嘗舉楷於是坐降為左司郎中職任如政王曙降官在七月庚戌王竒臺記有傳無州里癸丑詔官吏犯􅂍被劾有故延歳月以俟赦宥者自今法寺勿以赦原乙卯以四方館使奨州刺史李允則為引進使領叙州團練使依前知雄州兼本州部署允則久在邊城勤於其職至是赴闕復増秩遣之既而允則言契丹國主名緒境上書牒往來嫌名非便遂改高州戊午禮儀院言郊廟署祝板及大祠祭玉置於齋房禮神所用頗渉輕慢望自今祝板并祭玉並押置齋宫之㕔行禮前一日太尉與監察御史監禮博士同開太祝習讀庶盡嚴恭之道又每歳冬至郊祀昊天上帝神坐止令兵健陳設望自今遣内侍及司天監官各一員躬親布置仍於神坐側増設燭籠燎臺以禦勁風又按禮例南郊籩豆饌物並於壇下設幔自來有司饌造既畢即實籩豆有經宿者望令起屋俟饌造畢即納匵中将行禮時分實籩豆仍選内侍二員俟公卿㸃饌既畢專主饌造監察同視行禮次令親事卒十人於壇壝外察視又郊祀壇值雨雪止就太尉齋㕔設望祭之禮既為宿舍而祗祀上帝未協嚴恭望即齋宫門内建望祭殿諸司齋房亦量增其數舊例大祀止太府寺供香今常祀天地宗廟望内降御封香並從之又製漆匱付光禄司農寺毎祠祭命判寺官緘置禮料送祠所庚申詔奨廣濟河催綱殿中丞任昭先是歳運糧十萬石昭在職一歳運四十五萬石故也辛酉上與輔臣言及尚書省制度因曰今惟銓選典故稍存而幕職州縣官中亦有才俊不宜輕之王旦曰吏部與諸司不同但不能舉職爾上曰言事者屢請復二十四司之制楊礪嘗言行之不難但以郎中諸司使同領一職則漸可改作旦曰唐設内諸司使悉擬尚書省如京倉部也皇城司門也禮賔主客也雖名品可效而事任不同當時諸司所行惟京邑内外爾諸道兵賦各歸藩鎮非南宫一郎中員外郎所能制也朝廷所得才三分之一名曰上供其它留州送使之名皆藩鎮所有其後諸帥䟦扈由藩鎮彊大也今之三司即尚書省故事盡在但一毫所賦皆歸於縣官而仰給焉故蠲放則澤及下賜與則恩歸上此國家不易之制也上曰何承矩嘗請以五等封爵給其户賦旦曰唐藩鎮富貴驕蹇往往陷於不道者良由姑息之過也每易一帥罕有帖然奉命者周世宗召襄州節度使安審琦即馳驛至世宗大喜寵以厚禮國家自太祖變革制度迄今藩鎮提兵在邉防兼相位者每被召則奔命而至此制御之大要也好談古者恐思之未至上然之以西蕃總噶爾族李遵為保順軍節度使賜襲衣金帯器幣鞍馬鎧甲等遵一名埒克遵一名郢城琳布且初為僧後自還俗佐嘉勒斯賚裁制蕃族甚有威名屢祈朝廷爵命於是又求稱嘉木布曹瑋言春秋許夷狄不一而足嘉木布可汗號也使遵一言得之則何以處嘉勒斯賚耶且復有求漸不可制請如斯多特例授官可也上與輔臣議其事王旦曰遵輙求嘉木布欲居嘉勒斯賚上而斯賚顧無所求遵驕恣甚矣然不可不納遂從瑋請宜州言撫水蠻冦天河寨詔潭州都監内殿崇班李守睿往招撫之如敢違拒即發兵掩殺壬戌詔自今文武羣臣舉官犯􅂍舉主同罪不至追官既經恩原降者仰審刑院具情理奏裁當議量貶官秩或降差遣如前所舉官間有貪濁亦許陳首自今必擇亷能乃形公舉更不在陳首之限癸亥宗正卿趙安仁言唐朝玉牒首載混元皇帝今請以御製聖祖降臨記冠列玉牒及修皇朝新譜如唐天潢源𣲖譜並以降臨記冠篇仍别製美名又請以知制誥劉筠夏竦並為宗正寺修玉牒官從之名新譜曰仙源積慶圖仙源積慶圖據安仁本傳附見藝文志云屬籍嘉名為皇宋王牒事在六年其八年趙安仁上仙源積慶圖與此不同當考丁丑著作郎高清杖脊黥面配沙門島清知太康縣民有詣府訴家産者清納其賄時已罷任即逃避他所知府填從吉請對言其子鋭先假清白金七十兩望傳詔捕繋仍置獄遂命駕部貟外郎劉宗言監察御史仲甫推勘清匿于進士丁禹家白官擒得之且搜其家獲財貨甚衆衣服有侈靡違禁者因揭牓許民告首并得他􅂍状獄具法寺以所受􅂍不分枉直改命屯田貟外郎丁謹修覆按清枉法當死上特貸之清庫部郎中士宏之子景德中進士宰相冦準以弟之女妻之冦卒李沆家復取為婿歴官以賄聞頗恃姻援以欺蠧小民務自驕縱被服如公侯家初鋭就清假貸清以多納賄事将敗遂諾之求其為助時方鞫盧氏獄王曽為紏察力庇清從吉發此事欲以自解鋭素狡獪始假清銀欲為庇護及聞有訟即以還之前以盧氏事已奪一任至是又坐請求削衛尉寺丞從吉坐首露在已發後又奏報不實用官减當罰金詔以從吉累犯憲章合當黜竄特追右諌議大夫免其安置鋭配單州自餘决罰配𨽻者數千人宗言仲甫以鞫獄失實並黜監物務府界提㸃虞部貟外郎姚潤之内殿崇班閤門祗候王承謹坐不能察舉復保任清並免所居官詔自今文武官舉三班使臣其同官及舉主未歴外任者不在行用之數丙寅置梓州遞舖先是命民丁𫝊送今革之也曹瑋言秦州管戍兵多闕營屋至有寓民舍者頗或擾人臣令役卒採木陶瓦為屋千四百區今並畢功上曰此州郡切務深可嘉也戊辰改定州保州順安軍營田務為屯田務從李允則之請也庚午亳州言明道宫成總四百八十區詔遣内侍設醮犒官吏賜兵匠緡錢夏四月戊寅詔京朝官年六十已上勿差監在京諸倉時國子博士雍文載年六十五受敕上言求免上曰京倉自受納至給畢殆六七歳若此輩一任則老於掌庾矣因著式焉己卯洛苑使高州團練使藍繼宗責授如京使坐預修荘穆皇后陵至是隧道墊陷故也其使臣軍校第降罰之庚辰司天監言周伯星再見景徳三年五月朔日當參考乙酉詔罰武勝留後駙馬都尉柴宗慶金二十斤宗慶從幸瓊林苑坐次命左右取水飲之為閤門所紏故也丙戌御製景靈宫贊頌刻石曹瑋言縁邉舊無壕塹致蕃部屢有侵略今規度自永慶寨西城掘壕塹至咱爾隆凡五十一里已召集廂軍寨户赴役二十二日而畢咱爾隆蕃部要害地也詔奨之其董役使臣将校並賜器帛景德三年五月瑋鑿鎮戎塹當參考丁亥陕西轉運副使張象中言安邑解縣兩池見貯鹽三千二百七十六掩計三億八千八百八十二萬八千九百二十八斤計直二千一百七十六萬一千八百緡竊慮尚有遺利望行條約上曰厚地阜財此亦至矣若過求増羡必有時而闕不可許也己丑司天言太隂當虧占主大臣災詔王旦建道場於玉清昭應宫既而雲隂不見壬辰以工部郎中龍圖閣待制張知白為右諌議大夫權御史中丞知臼自青州歸朝表求判國子監上曰知白豈倦於處劇耶宰臣言知白更踐中外未嘗為身謀亦可嘉也時執憲乆闕特命授之乙未詔三京諸路大辟罪獄既具而非理致死者委紏察提㸃刑獄官察之丙申賜天下酺東京五日西南京三日諸州軍監一日嘉勒斯賚遣使來貢丁酉禁江南民賣􅤽膠三年三月但禁䖍州戊戌廣西轉運使俞獻可言撫水蠻數冠邉知宜州董元已不善綏撫先是曹永吉知州蠻人饑來質餱糧者永吉優其槩量皆忻愜而去元己未嘗饒假又縱主者尅削蠻人請赴闕貢奉元已驟沮其意遂使忿恚為亂絀元已以潭州監李守睿代之詔可樞宻使同平章事陳堯叟以足疾請遜位詔不許堯叟乆在告庚子車駕幸其第勞賜加等辛丑知永興軍冦凖言所部豪民多貸錢貧民重取其息歳償不逮即平入田産望降詔㫖許人紏告嚴加科責上曰秦雍去冬物價翔踊此詔若下必訴訟紛起且貧民飢乏孰肯貸假乎其諭凖俟豐歳行之令入内内侍省定羣臣與諸宫院婚聘財物之數先是連姻戚里者冗費過甚每納采成禮之日多領傔從其家供給飲食動踰千萬或有破産者上曰國家宗支漸廣此不可不限其制度於是多所差減且賜金帛給其費焉唐相元稹七世孫照上稹長慶中誥命壬寅以照為台州司馬是月詔三京及諸路轉運司除川峽州軍外並據所管縣分弓手每人借弩一枝其弓箭槍劔令各自置辦以簿拘管逓相交割委令尉常加教閲先是止降詔河北轉運司太常博士張希顔言復州有弓手置弓刀以捕冦者本州引私置衣甲器械律坐其罪皆杖脊配𨽻本城上因令徧下諸道
