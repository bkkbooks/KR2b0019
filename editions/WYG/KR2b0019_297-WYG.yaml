body:
  text: 續資治通鑑長編巻二百九十三宋李燾撰神宗元豐元年冬十月壬寅朔觀文殿大學士集禧觀使王安石言江東轉運判官何琬奏江寧府禁勘臣所送本家使臣俞遜侵盜錢物事已經年吕嘉問到任根治累月案始具今深恨俞遜飜異故加以論訴不干已罪如琬所言則是嘉問為臣治遜獄事有姦臣與嘉問親厚交利而已竊恐陛下哀憐舊臣不忍暴其汙行故不别推究如此則臣與嘉問常負疑謗不能絶琬等交鬬誣罔望特指揮以江寧府奏劾俞遜事下别路差官重鞫詔送樞宻院下兩浙轉運司鞫之陳瓘尊堯餘言載瓘上封事言熈豐大美今日之所當述臣下䝉蔽而不言者有二事焉其一逐鄧綰其二知江寕府吕嘉問與江東運判何琬互論公事王安石在閑居中訟琬而黨嘉問神考怒嘉問而沮安石是非明白天下欣聳威福在上人莫敢干熈豐大美此其二也及封事别奏云臣聞元豐元年知江寧府吕嘉問與本路轉運判官何琬互論公事王安石閑居中入劄子救嘉問神考不以安石為是也批送安石劄子付琬琬因而奏辯不已神考於是直琬所奏而嘉問奪官謫知臨江軍安石餞送嘉問賦詩以贈之琬又盡録其詩而奏之曰諷刺交作神考不以何琬為過也嘉問乃蹇序辰之妻父此二人者皆蔡卞之腹心而鄧洵武之宻友也何琬之事孰敢為陛下言之乎臣故曰䝉蔽熈豐之大美者由卞等也提舉成都府等路茶場司乞與轉運司同狀奏舉朝臣一貟充興元府通判如資序未合入者帯權字從之此據中書時政記岳州言賊詹遇與其黨入金場縱火殺人刼掠財物已遣捕盜官募敢勇士同力掩殺詔専委轉運使孫頎督捕所用兵卒令於團結内選募有不用命聽行軍法品官械繫聴㫖仍三日一具已獲人數以聞命知定州韓絳提舉營置保甲等處經制水塘初有㫖借定州封樁錢萬緡委同提㸃制置屯田閻士良買保州東楊等村淤下地種稻作塘陂扼西山路令安撫使司通管後士良罷詔知保州張利一管勾薛向提舉至是向被召故以命絳癸夘判大名府文彦博言編録九軍庫經等其在京樁管應副名件及見造闕數乞下軍器監照㑹從之以神衛剰貟王舉為翰林醫官賜紫及絹三百以治太皇太后疾有著効也司馬記聞云太皇太后得水疾御醫不䏻愈㑹新知邠州薛昌朝乆病水疾得老兵士王麻胡療之數日而愈上聞之遣中使召麻胡入禁中療太后病亦愈上喜即除麻胡翰林醫官賜金紫仍賜金帛直數千緡荆湖南路提㸃刑獄司言賊詹遇已轉入洪州詔孫頎速依前降指揮不以本路别路並監督官兵襲逐仍具立告捕賞格關牒諸處㑹合捕殺甲辰詔大理寺丞知綿州彰明縣宗大章差替先是提舉茶場司行劄子督本縣茶場買茶大章繳奏以為中書樞宻院奉行聖㫖乃有此式中書批送茶場司具析而茶場司言本司置局在鳳翔府依本路轉運提舉司於諸軍州行牒諸縣行帖本轄場務行劄子皆用乆例兼在外官司若經畧總管安撫司經制司羣牧司皆行劄子非轉運提舉司獨敢僣越今大章賣直釣竒得本司劄子若得異貨即具聞奏用此排擊官長於理未順况茶場兼監官本非奏事官司其意葢謂本司茶法憸人不便與敵者衆皆有致螫之意因此指摘必欲中傷以取媚姦黨望特賜弹壓故有是命司農寺請自今年八月降朝㫖後諸路因行役法實用軍人請受比較所代役人雇食等錢嵗終具數申寺撥還從之命􅄁知政事元絳参定𫝊法院新編法寳録先是譯經僧日成死同譯僧慧詢等皆不䏻繼乞罷譯場乃詔令在院習學續修寳元以後法寳録候有通逹義理梵僧依舊飜譯而絳因有是命乙巳詔兵部以貢舉敕式内武舉敕條再於諸處索文字刪類成武舉敕式以聞兩浙路轉運副使殿中丞蘇澥改國子博士以應副奉使高麗行李辦濟故也以左侍禁賈裕為閤門祗候追毁其已轉官宣命裕逵按原本誤作達今依宋史改正次子也先是逵以經畫鄜延邉事其長子祐得閤門祗候後逵除殿前副指揮使以例乞除裕閤職而詔止遷一官至是逵再乞上批祐向所與閤職乃以遣逵經畫鄜延邉事特推與之非恩例今逵所乞乃除殿帥恩例可依所奏故有是命裕除閤職在治平四年十月詔江南東路轉運提舉司鞫吕嘉問事其提㸃刑獄王安上不許廻避令依前降指揮同鞫都提舉市易司言乞以見錢於河北出絲蠶州縣俟三司和豫買綢絹足日如民願請價錢委令佐續支給其收歛並依和買條施行從之丁未重修都城畢工詔知制誥直學士院孫洙撰記刻石南薫門上城周五十里百六十歩髙四丈廣五丈九尺外距隍空十五歩内空十歩自熈寧八年九月癸酉興工以内侍宋用臣董其事役羡卒萬人剏機輪以發土財力皆不出于民初度功五百七十九萬有竒至是所省者十之三後洙卒改命知制誥李清臣撰記新紀書丁未畢修都城凡周五十里戊申都水監言自來前冬至三十日閉汴口今嵗閏月較之常年已是深冬慮大河凌牌為患乞先期閉口詔限冬至前半月己酉詔兖州常以省錢修葺宣聖祠廟上批瀘州軍前兵士皆自逺遣委韓永武侯討賊還日賜禁軍等特支錢庚戌詔司農寺令諸路提舉司應常平金帛絲綿促令依條變轉如市價賤即以本州逐色元價以貴賤滚同紐計所虧不及一分并許出賣不得抑配如出賣不售即具如何經畫申寺相度或兊充上供錢數其餘物準此詔在京校試諸軍武藝馬歩軍弓弩以加斗石為三等歩射弓馬射驟馬直射背射歩軍弩射以箭中多少為三等床子弩砲以中多少為三等賞銀椀楪有差槍刀摽排手以勝人多少為三等賞銀楪有差不合格者降等賞無等可降者不賞累中等者聴累賞兵志十月詔立在京校試諸軍校藝格馬歩軍弓加本軍上等二斗以及四斗弩加六斗以及一石三斗第為上中下三等馬歩軍歩射六發而三中為第一等二中為第二等一中為第三等馬射五發驟馬向堋直射三矢背射二矢中數第等如歩射法歩軍弩射自六中至二中床子弩及砲自三中至一中及等凡及等賜銀有差槍刀并摽排手角勝負計所勝第賞其弓弩墜落或縱矢不及堋斗挽弓破體或局而不張或矢不滿或弩蹠不上牙或擭不發或身倒足落並為不合格即射以中者賞餘箭不合格者降一等無可降者罷之合用本志舊録太簡朱本特繁詔賜侍禁仵全賻贈如死事例録其弟宣為三班借職以全無子故也全本𨽻荆湖南路鈐轄何次公下捕盜為先鋒至袁州萬載縣精進寺前與賊詹遇等鬬死之及是江南西路轉運判官彭汝礪言近縁廵歴至全死所其寺僧及居民稱全勇敢入敵賊初為之退却以無救援遂死臣觀自詹遇作過其奮不顧身為國討賊惟全一人竊謂當䝉襃贈上批全雖失於寡謀敗事然賊勢因全殺傷亦為小沮其忠勇身先深可矜惻宜比死事使臣優賜録其家汝礪又言全所部兵退避不赴援者請正其罪從之詔孫頎以逐處已獲賊徒量輕重依今分定三等刑名斷訖奏聞其持仗助賊同刼略不以有無􅂍並斬初見逼脅因而與賊為用手傷事主及捕盜人等或迎接賊勢掠取財物借助兵仗窩藏之類並决脊杖量情刺配本罪重者自從重或為賊驅廹齎持人口財物受賊􅂍不以告官之類並决情重者送五百里編管辛亥韓存寳破瀘夷後城等十三囤新紀于十月辛亥書此舊紀在十月甲申盖甲申奏到也今兩存之壬子御史中丞蔡確言竊聞江東轉運判官何琬言京師有以琬所列事宻報知江寧府吕嘉問者審如此則不可不痛繩以杜交通漏泄之姦乞令有司窮治如有實乞重施行詔除王安石書外餘並送御史臺根究都提舉市易兵部郎中王居卿言應賖市易錢貨許以金帛等物為抵當收息毋過一分二釐其不及年者月計之如願全請錢或欲以物貨兼給者並聴從之明年正月八日壬子又此年十二月二日壬寅當考詔奉使高麗回都轄西頭供奉官閤門看班祗候宋球遷一資充閤門祗候更減磨勘二年書狀官前襄州榖城縣令豐稷前衢州開化縣令鄭晞韓各循兩資其餘第賞有差命權同判刑部貟外郎吕孝亷司勲員外郎權大理少卿韓晉卿於同文館置司劾相國寺設粥院僧宗梵等事令勾當御藥院竇仕宣監之以上批宗梵縁其主僧行親擅用官給常住粥錢推其費錢之狀乃出前知祥符縣孫純借錢文字案法貣貸之人各合有罪而主司以純聯近臣之親特為停抑其辭仍累使人諭純止令私償所負可送無干礙官司根究先是純罷祥符縣得梓州路提舉常平官而行親者舊為純主治田産純欲之新任從行親督錢行親自借常住錢百千給純而宗梵告行親輒持百千出疑有姦權發遣開封府蘇頌曰宗梵告非干己事不當治錢𨽻常住非官給無貣貸法然純聞事覺即以錢償行親矣宗梵坐决杖或言純乃頌女婿堂妹之子頌故出純罪為皇城卒所告上以為輦轂之下近臣敢以情勢撓法審如此則不可不治故有是命詔韓村埽廵河左班殿直武繼寧追一官勒停餘官衝替罰銅有差坐大河以風雨溢㟁失于備預故也甲寅叙復勒停人張諤叙為太子中允監江寧府商税諤尋卒御史中丞判司農寺蔡確言常平舊敕多已衝改免役等法素未編定今除合刪修為敕外所定約束小者為令其名數式様之類為式乞以元豐司農敕令式為目從之詔三司司農寺各同罪舉升朝官五人充諸路提舉官限十日以名聞詔諸州縣修造係從來于公人圓融雖無文案照據者自今並保明支係省及免役頭子錢各一半詳定禮文所言今定十月丙辰朝謁天興殿依南郊前景靈宫薦享之禮皇帝褥位當設于殿東陛上洗當東霤南北以堂深東西直東霤皇帝立洗南北嚮盥詔禮院且依舊儀朱本削去今復存之按郊廟禮文載景靈宫太廟御罍洗不當東霤乞改正元豐元年九月十七日已得㫖依所定又三年八月四日又八月二十一日並稱依奏此當考乙夘端明殿學士兼翰林侍讀學士提舉崇福宫司馬光乞子康充編修資治通鑑所檢閲文字從之司農寺言進士李復王諶踏視府界官荒地募誘閩蜀民種稻有勞乞推恩詔李復王諶並與廣南路攝官李復王諶初遣時當熈寧六年十月丁丑鄜延路經略使吕惠卿乞以本司回易庫撫養士卒等本錢别置庫不得雜公使錢從經略司變易止充撫養士卒及賞覘事人如小事止支省錢諸路並乞依此從之詔昨岳州平江縣民户為詹遇等焚廬舍令孫頎牒所屬随區數等第給錢大理寺言散員都虞候萬州刺史全信乞取衛旦等錢物當追刺史罰銅六十斤降配詔依斷降充湖南本城都頭先是上批全信乞取本班長行衛旦錢物已奏案可速進呈裁斷庶軍中有以警勵至是樞宻院奏斷也戊午録左班殿直宋宻子為三班借差以使髙麗宻為管勾舟船廵檢而死于髙麗故也贈皇城使嘉州防禦使曹佺為同州觀察使佺駙馬都尉詩之父以上批特贈巳未以宣徽北院使檢校太傅中太一宫使王拱辰為檢校太尉宣徽南院使西太一宫使許居京師舊紀書此左蔵庫使昌州刺史曹誌提㸃萬夀觀其先差提㸃萬夀觀皇城使嘉州團練使劉永夀改醴泉觀以誌太皇太后之姪故也權發遣興州羅觀乞頒義倉法於川峽四路從之志有詔潭州瀏陽縣永興場采銀銅礦所集坑丁皆四方浮浪之民若不聯以什伍重隠姦連坐之科則惡少蔵伏其間不易譏察萬一竊發患及數路如近者詹遇是也可立法選官推行尋詔舉京朝官一員監場管勾本場煙火公事許斷杖以下罪又詔坑户限一月首納所蔵兵器限滿不首依私有法其保内有犯强盜殺人放火居停强盜及逃軍私蔵兵器甲弩知而不告各減犯人二等並押出場界情重者隣州編管不知情又減二等有該說不盡事令提㸃坑冶鑄錢司立法其本場地分排保慮未如法令朱初平依條編排癸亥置監官十一月甲戌禁私蔵兵器編排保甲今并書庚申判司農寺蔡確言諸路提舉常平司舊兼領于轉運司極有擅移用司農錢物自分局以來河北東路提舉司申轉運司所移用錢二十餘萬緡江東提舉司申轉運司所移用錢榖十二餘萬貫石盖轉運司兼領則不能免侵費之弊今川廣等路未有提舉官在假故并轉運司承例兼權欲乞提舉司闕官處止令提㸃刑獄兼權如􅇬舍稍逺即量留吏人照管官物等委知州或管勾官就便提轄其提舉官時暫在假亦委知州或管勾官權本司文字又言自今提舉官稱職者乞令乆任候有成效與遷提㸃刑獄及以上差遣皆從之詔廣南西路轉運司劾邕州不救火官吏其都監寨官並械送獄以上批邕亷州永平太平寨相繼遭火焚失錢糧器仗州寨皆邉要水陸巇嶮囏于運致一旦以吏懈弛所失動計數十萬其失火之人難繩以常法冝速根究主名斬訖以聞其當職官不救䕶亦可枷勘故也辛酉詔荆湖北路轉運使孫頎候㑹合諸處兵甲選募敢死之兵六百人擇材武使臣五六貟厚供給犒設令分兩項賈勇而前餘並遣回元差處如賊黨結集寖多㑹合官兵力不能制即相度量可存三二百人或増一二頭項訖奏其彭孫令部領元帯兵甲除選募合留使用外餘並令歸荆南本將壬戌詔應造簿路分如秋料災傷稅額放及七分以上處權免造並候次年軍器監言昨賛善大夫吕温卿言五路州軍近年増置壯城兵雖有教閱指揮而所習武藝全無實用如大名府城圍四十餘里砲手止有四人其他掛撘施放火藥全火等人亦皆闕盖舊無教閱格又無専㸃檢之官今欲令諸州壯城兵除修葺城櫓外並輪上下兩畨教習守禦以十分為率内留砲手三分餘並習掛撘施用拒守器械仍籍所習匠名每季委本州比試陞降嘗下五路安撫司而五路相度異同本監今参酌欲乞五路州軍壯城兵遇無修城池樓櫓功料即令安撫司以十分為率三分令習砲餘並習掛撘拒守器械其廣備十一作工匠並均付五路準備差使及指教施用每三年一替自來所習禁書作藝更不許𫝊習熈河路州軍亦依此從之又言温卿謂朝廷差官製造澶州浮梁火义其為防患不為不預然恐萬一冦至以火筏火船随流而下風順火熾橋上容人不多難以守禦不若别置戰艦以攻其後乞造戰船二十艘仍於澶州置黄河廵檢一貟擇河清兵五百以捕黄河賊盜為名習水戰以備不虞下大名府路安撫司相度本司言澶州界黄河舊無廵檢當北使路若増剏戰船竊慮張皇欲止選河清兵百人為橋道水軍令習熟船水可使緩急禦捍上流舟筏及裝駕戰艦本監欲依安撫司所陳從之癸亥于闐貢方物兩紀附年末詔遣翰林醫官邢慥邵化及秦玠醫高麗國王王徽内殿承制王舜封管押以徽嬰風痺因安燾等使還上表乞醫故也又詔舜封如徽病不能躬承詔命宜授其世子勲授徽世子勲詔命乃十一月丙戌今并書丙寅三司請榜在京諸色人納私小錢入官毁棄從之時以在市交易多以外方盜鑄濫惡小錢而商販頗以為患故也本志係此事于熈寜十年誤也當從實録詔孝惠皇后從孫賀安竦與班行先是安竦叙叔祖繼宣嘗以先朝后家恩與奉職未受而亡乞回授故也詔開封府界諸縣知縣自今差合入親民京朝官丁夘御史中丞蔡確言根究吕嘉問等事依條輪差三院御史或推直官承勘慮不専一乞専委御史黄廉舒亶根究詔止差黄亷同根究提轄修完京城所上修城部轄部役使臣等三十一人管勾年月詔管勾及四月而合以年磨勘者與減一年内十年十二年磨勘者依條比折其提轄官入内東頭供奉官宋用臣遷禮賔使遥郡刺史依舊寄資給寄資請受詔罷開封府界提㸃司勾當公事官二貟並専充提舉司管勾官其提㸃司管勾文字官遇河防保甲事許差出先是提舉司言本司専領二十二縣常平等事目至繁今提㸃司已罷兼領而管勾官二員尚仍舊兼提㸃司事恐職事不専一無由辦集司農寺以聞故有是命經制瀘州夷賊韓存寳言梅始吉胡斗但十村首領斗箇撒等降已打誓詔夷賊逃匿山林委存寳更多設方畧討蕩仍呼召甫望箇恕晏子等或遣人說諭令分布手下得力人及罷勇等囤生熟夷逼逐討捕夷賊每一名一級支絹二十匹如首級數多當議優轉職名并照㑹七月甲戌詔除老小婦女外依今此指揮施行甲戌七月二日戊辰詔罷左蔵庫副使霍舜舉西京左蔵庫副使王鑒提舉剶机黄汴等河榆栁止令逐地分使臣兼管及委都大官提舉先是程昉立法差官主剶机自熈寧四年為始及是八年都水監言事已就緒故有是詔元差二人事在熈寧六年五月十九日辛酉經制熈河邉防財用司言四川軍依朝㫖摽撥官莊田外乞于近城各更擇沃土上腴地二十頃為營田専差使臣等管勾從之五月九日六月十四日七月一日録遂州青石縣令李進卿子為郊社齋郎進卿部糧草為夷賊所掩投之于江後韓存寳求得其屍以聞故也詔應詹遇驚刼及經歴地方捕盜官不畫時捕殺令逐路提㸃刑獄司速劾罪不以赦降去官原免己巳録三班差使張簡子院喜為三班差使賜名忠并賜其家錢二萬絹二十匹以河北路轉運司言簡本保丁呈試授官為回河鎮廵檢下指使因夜廵邏望見刼盜張善等五人即先路馳馬逐賊戰死故有是命荆湖南路轉運司言湖北都監彭孫與詹遇等書意欲招降已招牒何次公等須得剪滅乞更賜指揮詔孫頎宻切體量如是實即候彭孫到任令具析準何指揮招呼賊黨以聞詔開封府判官徐大方推官許彦先並先衝替大方等坐宻諭孫純私以錢償僧宗梵故也復華州渭南鎮為縣
