body:
  text: 續資治通鑑長編巻一百六十九宋李燾撰仁宗皇祐二年八月乙卯朔詔罷祀前一夕警場先是帝謂輔臣曰眀堂直端門而致齋於内奏嚴於外恐失静恭之意下禮院議曰警場本古之鼓鼜所謂夜戒守鼓者也故王者師行吉行皆用之乗輿宿齋儀衞本縁祀事則警場亦因以警衆非徒取觀聽之盛若以奏嚴之音去眀堂近則請列於宣德門百歩外俟行禮時罷奏一嚴亦足以䖍恭祀事帝曰既不可廢則祀前一夕邇於接神宜罷之丁巳再降知亳州建武節度使郭承祐為許州部署承祐既落宣徽使言者謂不當更令知亳州故再降之戊午録權邕州同廵檢右侍禁李江子得用為三班借職以江與蠻賊戰沒也己未禮部員外郎兼侍御史知雜事何郯為吏部員外郎直龍圖閣知漢州郯以母老請之将行上䟽曰臣伏見三司使禮部侍郎張堯佐慶厯三年冬從開州來是時猶作南宫散郎自頃至今不五六年間遂歴盡要近迺尹京邑迺司計籍縁堯佐雖由進士登第歴官無他過然驟被寵用人情皆以止縁後宫之親不復以才能許之况三司使位望任使為二府之亞跂歩便至今堯佐充三司使已踰年若大饗訖事衆議謂陛下以酬勞為名必當進用堯佐在兩府果如衆議命行之日言事之臣必以死争當是之時陛下欲決用堯佐則當黜言者若聽用言者即湏罷堯佐酌之兩途必難並立然用堯佐而黜言者則累徳聽言者而罷堯佐則傷恩累徳則損歸聖躬傷恩則怨起近戚欲聖躬無所損外戚無所怨莫若富貴堯佐而不假之以權如李用和處之正得宜也前古外戚成敗之間其鍳不逺崇寵過當則不免禍咎抑損得所則必能安全禍咎安全不惟其家繫之抑亦國随而興衰也此書傳所載不可悉數陛下聰眀固宜監觀徃事以為社稷之計前嵗陛下備禮册命貴妃外廷紛紜已有物議然臣當時未嘗論列者盖以天子列嬪妃之位眀著典章若不干預政事置亦無害今用堯佐至三司使已是預政事况欲進處二府則天下之議當以為如何堯佐進用與否固亦未測陛下之意然而已進用而後言縱能追罷在人臣頗獲直名於陛下已損盛徳固莫若先事而言冀陛下審處其事使無過差則君臣上下之道兩得之矣臣以言責在陛下左右周旋四五年但事干朝廷大體及大姦大蠧無不論列䝉陛下多賜採納今以親老方将外補唯於堯佐一事心知不可而遂不建一言則異時臣負懐情不盡之責故於将行不敢黙黙而復布腹心焉伏望陛下幸採臣章俯從公論不徇一時之愛以全千古之名則雖盡南山之竹不足載徳美之盛與夫寵一人而失天下之心者不同日而論也又言臣伏見朝廷以文武官入流無限審官三班院流内銓皆除注不行故嘗詔羣臣博講利害以求省官之䇿今選人改官已増立年考胥史出職又議塞他岐唯貴勢奏薦子弟不加裁損則除弊之源有所未盡臣檢㑹文武臣僚奏薦親屬條制文臣自御史知雜已上武臣自閤門使已上每嵗遇乾元節得奏親屬一人諸路轉運使提㸃刑獄三司判官開封府判官推官郎中至帶館職員外郎諸司使至副使遇郊禋得奏親屬一人總計員數自公卿下至庶官子弟以廕得官及他横恩每三年為率不減千餘人舊制雖以服紀親踈等降推恩然未立年月逺近為限所以恩例頻數臣僚廕盡近親外多及疎屬遂致入仕之門不知紀極漢法保任唐制資廕本只及子孫他親無預又不著為常例今本朝沛澤至廣人臣多繼世不絶恩固甚厚然事久則弊生亦當改張以救其失臣欲乞今後文武臣僚官序合每嵗遇乾元節得奏薦親屬之人除子孫依舊外朞親候遇郊禋許奏一人其餘親屬再遇郊禋許奏一人其官序每遇郊禋得奏薦親屬之人除子孫依舊外朞親候再遇郊禋許奏一人其餘親屬候三次遇郊禋許奏一人如此等級裁減一年内可省入官數十人積年而計所省漸多則仕路之冗不澄汰而自清矣朝廷嚮來已曾更改資廕條制然而親子孫亦以限年釐革是致人心嗟怨遂即復故臣今所請以奏薦䟽數為等降皆縁人情盖人情於近親則恩甚厚於疎屬則恩漸薄今既許近親依舊制其疎屬止以年月逺近為限不盡隔絶酌於衆心計亦無怨惟聖眀斷而行之則官濫之源庶或可塞其邊臣及路分合得恩例即乞仍舊如許施行乞候過今秋大饗後為始郯論恩澤等級不知何時皇祐四年九月釐革舊制其後遂罷聖節奏補或自此始也今附見俟考辛酉著作佐郎直集賢院同修起居注判都磨勘司吕溱為右正言何郯言溱未嘗磨勘特遷之癸亥出内藏庫絹一百萬下河北都轉運司權易大名府路安撫司封樁錢市糴軍儲仍遣權度支判官屯田員外郎董沔往計置之乙丑命開封府判官侍御史張中庸往中牟縣修疊汴河堤岸知杭州資政殿學士范仲淹奏建昌軍草澤李覯撰眀堂圖義覯能硏精經訓㑹同大義按而視之可以興制今朝廷行此盛禮千載一辰而斯人之學上契聖作謹具録以進庶討論之際有所補助詔送兩制看詳稱其學業優博授試太學助教覯嘗舉茂材異等不中親老以教授自資學者常數十百人贈宣慶使入内都知麥允言為司徒又詔特給鹵薄丙寅福州草澤鄭叔豹上宗祀書三巻述眀堂制度及配饗冕服之義鄭叔豹當考不然削去丁卯以眀堂禮近罷秋宴龍神衛四廂都指揮使眉州防禦使李璋為起復雲麾将軍黔州觀察使歩軍都虞候西上閤門使李珣領文州刺史濵州刺史駙馬都尉李瑋為起復雲麾将軍保州團練使璋辭不拜己巳詔水災州軍令逐路轉運司體量蠲減租稅以聞初鹵簿使言眀堂大饗用法駕之數減大駕三分之一得兵部狀大駕用萬有八千二百五十六人法駕減其一用萬有二千一百七十人檢大中祥符元年封禪法駕人數即用萬有一千六百六十一人本部今無法駕字圖故本又文牘散逸雖麤有此數較之禮令未能裁決望令禮官與兵部官同共詳定乃定法駕鹵簿當用萬有一千八十八人辛未鹵簿使上所定字圖詔可知諫院陳旭等言屯田員外郎睦親宅都教授阮逸嘗建言作錢葆飾以翠羽具藉以鹿皮欲與錢兼行且錢幣為用天下之大命也其輕重有權與物適均乃能下流而不窮昔張湯為漢武帝巧製皮幣取譏後世况逸之譎怪尤甚豈可用之聖世以開姦詐之心哉上然之丁丑詔立冬罷祭神州地祗初禮院以黒帝及神州地祗皆當合祭於眀堂請罷立冬之祭上以四時迎氣不可輟故止罷祭神州地祗庚辰命觀文殿學士兵部侍郎丁度為軒轅位獻官資政殿學士吏部侍郎王舉正為炎帝位獻官先是禮官言眀堂五帝及日月天皇北極既升祀於堂接皇帝親獻之位請差清望官為獻官上以軒轅聖祖之别號炎帝感生之帝配故命二府舊臣分獻之壬午工部郎中天章閣待制李柬之為契丹國母生辰使西京左藏庫副使李綬副之戸部員外郎兼御史知雜事臨潁李兊為契丹生辰使供備庫副使李賡副之鹽鐡判官司封員外郎崇文院檢討孫瑜為契丹國母正旦使閤門通事舍人王道恭副之司勲員外郎判三司開拆司膠水冦平為契丹正旦使内殿崇班閤門祇候鄭餘慶副之是月深州言大雨壞民廬舍九月丁亥帝服靴袍御崇政殿召近臣宗室館閣臺諌官閲雅樂自宫架登歌舞佾之奏凡九十一曲徧作之因出太宗皇帝琴阮譜及御撰眀堂樂曲音譜并按習大樂新録賜羣臣又出新制頌塤匏笙洞簫仍令登歌以八音諸器各奏一曲遂召鼓吹局按警場賜大樂鼓吹令丞至樂工徒吏緡錢有差帝既閲雅樂謂輔臣曰作樂崇徳薦之上帝以配祖考今将有事於明堂然世鮮知音者其令太常益加講求辛卯詔眀堂禮畢並以襲衣金帶器幣鞍勒馬賜夏竦王徳用程琳李昭亮将相在外遇大禮有賜自此始癸巳詔近臣宗室及館閣臺諫官三司開封府推官武臣刺史以上赴迎陽門觀先朝御書丙申詔太子太保致仕杜衍太子太傅致仕任布陪祀眀堂令應天府以禮敦遣仍於都亭驛錫慶院優備供帳几杖待其至衍手䟽以疾辭布将就道始辭以疾並遣中使齎賜醫藥庚子揭御篆眀堂二字飛白眀堂之門四字仍詔祠畢藏於宗正寺皇城司上新作文徳殿門香檀魚契以左契留中右契付本司兵部員外郎知制誥嵇頴為翰林學士未及謝辛丑卒即其第賜告敕襲衣金帶鞍勒馬及眀堂賞物張貴妃之父堯封嘗從頴學所為文多納頴家及貴妃為修媛令其弟化基詣頴求編次堯封文藁為序以獻頴不答亦不以獻時積雨彌旬帝精禱禁中甲辰齋於文徳殿天日澄霽人情胥悦己酉朝饗景靈宫庚戍饗太廟辛亥大饗天地於眀堂以太祖太宗真宗配從祀如圓丘大赦文武職官故分司致仕官並特與轉官内臣入仕及十年亦與遷改即不為永例詔内降指揮百司執奏毋輙行敢因縁干請者諌官御史察舉之初議肆赦帝謂輔臣曰卿等廣詢民間利病著為條目務從寛大以稱朕勤恤之意又曰比有貴戚近習夤縁請託以圖内降雖頗抑絶然未免時有侵撓可於赦文中嚴切禁止庶澄清宿弊示信天下輔臣對曰陛下躬行大祀以新庶政闢至公之路杜私謁之蹊實天下幸甚然載之赦條恐未盡聖意仍别為手詔與赦同降陳旭𫝊稱執奏内降由旭建請當考先是屯田員外郎廬陵彭思永入為侍御史極論内降之弊以為斜封非公朝所宜有及祀眀堂前一日有傳赦書百官皆遷官者思永從駕宿景靈宫亟上言不宜濫恩時張堯佐以親連宫掖驟進王守忠以出入禁闥被寵參知政事闕貟堯佐朝暮待命而守忠亦求為節度使思永欲率同列言之或曰宜待命行思永曰寧以先事得罪命出而不可救則為朝廷之失矣遂獨奏陛下覃此繆恩無意孤寒獨為堯佐守忠故取悦衆人爾且言外戚秉政宦官用事皆非宗社之福䟽入上震怒詔詰思永安從得此諫官呉奎言御史許風聞事有非實朝廷能容容之不能容罪之可也若必窮主名則後無敢以事告御史者是朝廷自蔽耳目也中丞郭勸亦言思永納忠不宜深罪上寤不復致詰思永尋罷侍御史以司封員外郎知宣州而堯佐守忠之議遂格思永罷侍御史不得其時為司封員外郎乃十月丁卯也今附見此更湏考之郭勸傳云祀眀堂将加中外官勸就齋次帥羣御史求對不許又極論之思永傳乃云思永獨奏或是思永獨奏堯佐守忠羣御史但泛論羣臣不當加官也今兩存之先是宣慶使遂州觀察使入内都知麥允言卒贈司徒安武節度使又詔允言有軍功特給鹵簿今後不得為例同知禮院司馬光言昔仲叔于奚有功於衞衛人使之繁纓以朝孔子曰惜也不如多與之邑惟器與名不可以假人夫爵位尊卑之謂名車服等威之謂器二者人主所以保畜其臣而安治其國家不可忽也今允言近習之臣非有元勲大勞過絶於人贈以三公之官給以一品鹵簿其為繁纓不亦大乎陛下雖欲寵秩其人而適足以増其罪累也何則三公之官鼎足承君上應三台鹵簿者所以褒賞元功皆非近習之臣所當得者陛下念允言服勤左右生已極其富貴死又以三事之禮為之送終鼓吹簫鐃烜赫道路是則揚僣侈之罪使天下側目扼腕而疾之非所以為榮也惟陛下思仲叔于奚之傳垂意孔子之言則知名器之重不可加非其人况唐制羣臣於國立大功者婚葬則給鹵簿餘不在給限伏望陛下追寢前命其麥允言更不給鹵簿無使天下之人竊敢指目以為朝廷過舉不勝幸甚據㑹要允言以八月贈官司馬光奏不當給鹵簿在九月十四日今附九月末光奏之從否當考冬十月丙辰宰臣文彦博加禮部尚書宋庠加工部尚書樞宻使王貽永加鎮海節度使進封鄧國公河陽三城節度使兼侍中英國公夏竦為武寧節度使進封鄭國公保静節度使同平章事判澶州王徳用為集慶節度使封冀國公武昌節度使同平章事判大名府程琳為武勝節度使檢校太尉寧江節度使同平章事汝南郡王允讓為平江節度使兼侍中武康節度使北海郡王允弼為寧國節度使同平章事安徳節度使華原郡王允良為鎮江節度使同平章事樞宻使龎籍參知政事髙若訥並加戸部侍郎樞宻副使梁適加給事中初議覃恩髙若訥謂文彦博曰官濫久矣未有以節止今又啓之何也彦博不聽若訥卒亦以恩遷官癸亥景福殿使武信留後入内都知王守忠為延福宫使入内都都知實録但云都知本傳云都都知按守忠慶厯元年六月已為都知此必遷都都知實録偶脱爾當更考詳甲子宗室八十七人並遷官舊制金吾衞大将軍在左右衞大将軍之上今有自金吾遷左右衞者盖中書失之也兄十一弟六姪五十一孫十九人數更湏詳考丙寅大宴集英殿以眀堂禮成飲福也辛未詔宰臣文彦博宋庠參知政事髙若訥史館檢討王洙編修大饗眀堂記乙亥燕京畿父老一百五十人於錫慶院是月美人楊氏為婕妤景祐初聽入道居瑤華宫至是復進位號詔自今諸處毋得申奏及發遣念書童子赴闕寳元元年六月可考十一月乙酉召太子中舍致仕胡瑗赴大樂所同定鐘磬制度先是親閲大樂而言者以為鎛鐘特磬大小與古制度未合詔令改作而太常言瑗素曉音律故召之瑗本傳云并召阮逸實録無之案逸此時實教授睦親宅當考㑹要九月五日詔鎛鐘特磬未叶音律令鄧保信阮逸盧昭序同太常寺檢詳典禮别行鑄造而實録無此丙戌詔河東秋稼大豐其令三司廣糴邊儲戊子命權御史中丞郭勸天章閣待制知諫院包拯放天下欠負壬辰賜淮南江浙荆湖制置發運使金部員外郎許元進士出身上嘗謂執政曰發運使縂領六路八十八州軍之廣其財貨調用幣帛穀粟嵗千百萬宜得其人而久任之今許元累上章求觧朕思之不若奨勵以盡其才故特有是賜丁酉邇英閣講易无妄卦帝曰无妄之疾何云勿藥有喜楊安國對曰凡疾之所起由有妄而來九五居尊得位為無妄之主天下皆無妄而偶有疾非己所致病當自損可勿藥而有喜也若人主剛正自修身無虚妄而偶有災若堯湯水旱非己所招但順時修徳勿湏治理必欲除去不煩勞天下是有喜也然堯遭洪水使鯀禹治之雖知災未可息且順民心鯀功不成者災未息也禹能治水者災欲盡也是亦勿藥有喜之義也今河水圮决歴五十年役天下兵民耗天下財用未嘗息大河亦未嘗復故道也而兵民頓弊何啻百千萬計地財委盡何啻億萬萬計恐民不堪命國力不繼臣以為大河圯决自古為患當如堯舜務順民心順時修徳其災自息亦勿藥有喜也戊戌給事中權御史中丞郭勸罷為翰林侍讀學士勸初就眀堂齋次帥衆御史求對論羣臣不當遷官不許乃上疏極言之訖不從於是以老求解臺任許之召樞宻直學士給事中知益州田况權御史中丞况未至又命勸管勾御史臺事管臺事在二十四日丁未今并書勸以老求罷據御史臺記益州自李順王均再亂人心易揺守得便宜從事多擅殺以為威雖小罪猶并妻子徙出蜀至有流離死道路者况在蜀逾二年拊循教誨非有甚惡不使東遷蜀人尤愛之以繼張詠王安石誌况墓云蜀人以况繼張詠又謂况所斷治為未嘗有誤今從本𫝊削此等語庚子徙知徐州工部郎中王逵為淮南轉運使諫官包拯言按王逵累任荆湖南北路江南西路轉運使並所為惨虐黜降差遣昨任河東轉運使放恣愈甚於前未幾降知光州又改今任雖該霈澤棄瑕録用然惨暴之性難以悛改凡所行事布在朝列無不具知固非曖昧且陛下軫恤生靈惟恐不及豈忍以一方民吏俾王逵殘害伏望聖慈特追寢前命且令依舊知徐州不報拯又與陳旭吳奎相繼論列凡五奏訖不報是月詔觀察使已上自今依大兩省待制例經兩次郊禮許一次將弟姪子孫恩澤奏補異姓骨肉此據㑹要閏十一月丙辰出内藏庫緡錢四十萬紬絹六十萬下河北便糴糧草先是河北頻年水災朝廷蠲民税幾盡至秋禾稼將登而鎮定復大水縁邉尤被其害上憂軍儲不給故特出内府錢帛以助之丁巳内出手詔朕聞古者作樂本以薦上帝配祖考三五之盛不相沿襲然必太平始克眀備周武受命至成王時始大合樂漢初亦沿舊樂至武帝時始定泰一后土樂詩光武中興至眀帝時始改大予之名唐髙祖造邦至太宗時祖孝孫考定鍾律眀皇方成唐樂是知經啟善述禮樂重事湏三四世聲文乃定國初亦循用王朴竇儼所定周樂太祖患其聲髙遂令和峴減下一律真宗始議隨月轉律之法屢加按覈然念樂經乆墜學士罕專歴古硏覃亦未究緒頃博加訪求終未有知聲知經可信之人嘗為改更未適兹意宜委中書門下集兩制及太常禮樂官將天地五方神州日月宗廟社蜡祭享所用登歌宫縣審定聲律是非按古合今調譜中和使經久可用以發祖宗之功徳朕何憚改為但審聲驗書二學鮮並互詆胸臆無所援據慨然希古靡忘於懐於是中書門下集兩制太常官置局於祕閣詳定大樂翰林學士承㫖王堯臣等言天章閣待制趙師民博通古今願令預詳定及乞借參知政事髙若訥所校十五等古尺並從之置局乃丁卯日堯臣上言乃庚午日今從本志並書不出其日戊午河南府言前觀文殿學士尚書左丞張觀卒贈吏部尚書諡文孝觀初為秘書郎其父居業從事方州因上言願以官授父真宗嘉之以居業為京官及觀貴居業由恩至太府卿嘗過洛嘉其山川風物曰吾得老於此足矣觀於是買田宅營林榭以適其意觀蚤起奉藥膳然後出視事未嘗一日易也居䘮哀毁過人既練而卒己未三司使戸部侍郎張堯佐為宣徽南院使淮康節度使景靈宫使資政殿學士尚書左丞王舉正本官兼御史中丞改命田况為樞宻直學士權三司使是日詔后妃之家毋得除二府職任此據本紀庚申又加張堯佐同羣牧制置使辛酉賜貴妃張氏從弟衛尉寺丞希甫太常寺太祝及甫並進士出身堯佐之子也賜汴河治堰卒緡錢是夜秀州地震有聲如雷自西北起癸亥知諫院包拯等言陛下即位僅三十年奉承祖宗謨訓未有失道敗徳之事陛下固知之乃五六年超擢張堯佐羣臣皆竊議於下然而迹其過不在陛下在女謁近習及執政大臣也何以言之盖女謁近習動伺陛下之所為知陛下繼嗣未立而有所私莫不潜有趨嚮而附結之執政大臣不思規陛下以大誼乃從䛕順指髙官要職惟恐堯佐不滿其意使陛下有私昵後宫之過此豈愛君之心哉且以本朝故事言之昭憲皇太后誕生祖宗有基命之烈其諸弟杜審肇輩窮老纔有一得節度使者雷有終以工部侍郎討平西川得宣徽使李至於先朝有東宫之舊自工部尚書參知政事裁用為武勝軍節度使錢若水任樞宻副使李士衡以尚書左丞為三司使以及陛下之朝李維為翰林學士承㫖刑部尚書陳堯咨為翰林學士知開封府並止換觀察使夏竦歴兩府自三司使戸部尚書止得散節度使後二年方加宣徽使鄭戬亦曽任樞宻副使以資政殿大學士知并州後方得宣徽使又一年乃除節度使今堯佐謂之親孰若杜審肇兄弟乎謂之賢而功孰若雷有終李至錢若水乎而宣徽節度使并以與之若非内外協應䝉惑攘竊寧至此哉堯佐叨據如此慙羞不知真清朝之穢汚白晝之魑魅也况下制之日陽精闇塞天道固於人事不逺伏望陛下斷以大義稍割愛情追寢堯佐過越之恩必不得已宣徽節度使擇與其一仍罷羣牧制置使之命畀之外郡以安全之如此則仰合天意俯順人情而重新盛徳矣初執政希上㫖一日除堯佐四使又以王舉正重厚寡言同日授御史中丞朝議意舉正儒懦或迤邐退避動經浃旬則堯佐之命必遂行論諫弗及矣甲子舉正遂告謝上殿力言擢用堯佐不當其䟽曰臣伏覩張堯佐優異之恩無有其比均以堯佐素乏材能徒以夤縁後宫僥倖驟進國家計府須材以辦經費堯佐猥尸其職中外咸謂非據近者臺諫繼有論列陛下雖罷其使任而復加崇寵轉踰於前併授四使又賜二子科名賢愚一詞無不嗟駭夫爵賞名數天下之公器不當以後宫踈戚庸常之材過授寵渥使忠臣義士無所激勸且堯佐居職物論紛紜固當引分辭避而晏然恃賴曽無一言自陳叨竊居位日覬大用及異恩既出復託以假告未祗受其意尚若不足繼有邀求不䖍君命莫甚於此者昔漢元帝馮野王以昭儀之兄在位多舉其行能帝曰吾用野王後世必謂我私後宫親戚本朝太宗皇帝孫妃之父止授南班散秩盖保全後宫戚属不令事勢僣盛以取顛覆伏望陛下逺鑒前古美事近守太宗皇帝聖範追取堯佐新命除與一郡以息中外之議伏以陛下自臨御已來孜孜勤政無有失徳今忽行此事有損聖眀若濫賞必行則朝綱威柄由此遂紊四方駭任人之失三鄙萌輕國之心臣方叨司憲適覩除命事干國體不敢緘黙望聖慈開納速降指揮或臣言之不行即乞罷臣憲司出補逺郡䟽入不報戊辰朝退舉正留百官班廷諍復率殿中侍御史張擇行唐介及諫官包拯呉奎於上前極言且於殿廡切責宰相上聞之遣中使諭㫖百官乃退唐介傳云堯佐一日除四使介與諫官包拯等七人力争又請中丞王舉正留百官班卒奪堯佐三使所稱七人盖中丞王舉正殿中張擇行唐介諌官包拯陳旭呉奎餘一人未詳時李兊實為知雜御史而兊本傳不載兊嘗有言當考陳又張耒眀道雜志云嘉祐中嘗欲除張堯佐節度使秀公作中丞與全臺上殿争之仁宗初盛怒迎謂之曰豈欲論張堯佐乎節度使麤官何用争唐質肅公作御史裏行最在衆人後越次而前曰節度使太祖太宗皆曽為之恐非麤官上竦然而堯佐之命竟罷陳升之此時作左司諌不為中丞唐介實為殿中侍御史裏行張堯佐卒除節度使初除又不在嘉祐間耒所志差誤今不取熊克九朝通畧據是時乃王舉正為中丞堯佐罷宣徽景靈二使而節鉞如舊雜誌誤也己巳詔近臺諫官累乞罷張堯佐三司使及言親連宫掖不可用為執政之臣若優與官爵於體差便遂除宣徽使淮康節度使兼已指揮自今后妃之家毋得除兩府職任今臺諌官重有章䟽其言反覆及進對之際失於喧譁在法當黜朝廷特示含容其令中書取戒厲自今臺諌官相率上殿並先申中書取㫖時上怒未觧大臣莫敢言樞宻副使梁適獨進曰臺諫官盖有言責其言雖過惟陛下矜察然寵堯佐太厚恐非所以全之是日堯佐亦奏辭宣徽使景靈宫使乃詔學士院貼麻處分而取戒厲卒不行中書取戒厲據梁適本傳及王珪所作適墓誌今正史並改作戒諭雖稍文然恐失事實今特存本語詔諸路走馬承受如擘劃過邊上利便事件不得理為勞績仍令入内内侍省選差亷謹穏當之人兼不許指射㑹要閏十一月二十六日事十二月甲申朔詔班三品以上家廟之制初宰臣宋庠言慶厯元年赦書許文武官立家廟而有司終不能推述先典因循顧望使王公薦享下同委巷衣冠昭穆雜用家人縁偷襲弊甚可嗟也臣嘗因進對屢聞聖言謂諸臣專殖第産不立私廟寧朝廷勸戒有所未孚將風教頽陵終不可復睿心至意形於歎息臣毎求諸臣所以未即建立者誠亦有由盖古今異儀封爵殊制因疑成憚遂格詔書禮官既不講求私家何縁擅立且未信而望誠者上難必責徒善而設教者下或有違若欲必如三代有冡嫡世封之重山川國邑之常然後議之則墜典無可復之期夫建宗祏序昭穆别貴賤之等所以為孝雖有過差是過於為孝殖産利營居室遺子孫之業與民争利顧不以為恥逮立廟則曰不敢寧所謂敢於争利而不敢於為孝也以爵服承襲之間小違古因放而不復又所謂去小違古而就大違古也諸儒之惑不亦甚乎乃下兩制與禮官詳定審度而翰林學士承㫖王堯臣等定議官正二品平章事以上立四廟樞宻使知樞宻院參知政事樞宻副使同知樞宻簽書院事見任前任同宣徽使尚書節度使東宫少保以上皆立三廟餘官祭於寢凡得立廟者許嫡子孫襲爵世降一等死即不得作主祔廟别祭於寢自當立廟者即祔其主其子孫承代不許廟祭寢祭並以世數親疏遷祧始得立廟者不祧以比始封有不祧者通祭四廟三廟廟因衆子立而嫡長子在則祭以嫡長子主之嫡長子死即不傳其子而傳立廟者之子凡立廟聽於京師或所居州縣其在京師者不得於裏城及南郊御路之側既如奏仍别議襲爵之制其後終以有廟者之子孫或官微不可以承祭又朝廷難盡推襲爵之恩遂不果行戊子遣官祈雪己丑詔知制誥曽公亮李絢看詳諸州軍編配罪人元犯情理輕重以聞初戎州人向吉等操兵賈販恃其衆所過不輸物稅州縣捕逐皆散走成都鈐轄司奏請不以南郊赦除其罪從之逮捕親屬繫獄至更兩赦有詣闕訴者刑部詳覆官以為特敕遇赦不原者雖數赦猶論如法同判刑部孫錫獨奏釋之凡釋百二十三人舊制判刑部者多持事往决於中書錫獨不往視法何如耳錫真州人也孫錫事據王安石墓誌附見錫先見慶厯八年甲午知制誥胡宿言事神保民莫先祭祀比年以來水旱相仍竊意有所未至也望令天下具名山大川能興雲雨者增秩之春秋以時禱祀詔可戊戌邈川首領保順西河等軍節度使嘉勒斯賚遣使來貢方物丙午雪丁未遣官謝雪賜念書童子曾天麟等四人出身戊申契丹國母遣崇儀節度使蕭槩四方館使榆州團練使劉從正契丹遣昭徳節度使耶律素太常少卿李韓等來賀正旦是嵗天下上戸部主戸六百九十一萬二千九百九十七口一千五百四十九萬三千五百四十一客戸三百八十三萬四千九百五十七口六百五十六萬四千一百二十一
