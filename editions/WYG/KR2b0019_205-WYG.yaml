body:
  text: 續資治通鑑長編巻二百一宋李燾撰英宗治平元年夏四月辛未詔以河北州縣官吏補義勇不足令轉運使劾治都轉運使趙抃奏初受詔官多已罷吏多死徙今官吏多新至若皆治則新至者被罪請以嵗盡為限不足乃劾治詔從之其河灾州軍令漸補初抃至大名欲按視府庫賈昌朝遣其屬來告曰前此監司未有按視吾藏者公雖欲舉職恐事有不應法者奈何抃曰捨大名則列郡不服矣即徃視之昌朝初不悦及官吏不足當坐徒二年者八百餘人抃奏請寛之皆得免昌朝乃媿服知審官院王珪奏新編本院勑十五巻詔行之詔諸路緫管安撫鈐轄司有歩射弓兩石引弩四石五斗以上者試騐奏遣赴闕試中者等第推恩權御史中丞王疇欲車駕行幸以安人心丁丑乃上疏曰陛下初即位貴循祖宗之舊母少更改至於一動一豫所以慰羣心者亦不可廢也按真宗初有天下咸平元年春三月太宗小祥畢是嵗夏五月車駕出禱雨此皇祖舊典也然則䘮既逾年猶在諒陰中亦嘗有所臨幸但不為㳺燕之事爾陛下光有天下丕冐海隅不惟都城之人願瞻日月之光望羽旄之動乆矣雖四方之逺亦皆嚮風環首想聽輿馬之音以自慰也今日月遷速即過先帝小祥雖聖孝思慕未忍及於㳺幸然京師宫館所以奉真靈延福禧與列聖列后神御之宅臣愚恐宜於外朝聽斷之暇長樂奉飬之隙中外無事天體康寧時或有所享謁請禱以表陛下尊先奉神之心雖然在三年䘮期之間顧乘輿服御或亦未當全用常制乞預詔太常閲典故草具其儀即詔禮院詳定禮院奏今乘輿出入諸從駕人乞不服錦繡紅色其供奉皆用淺澹於是執政及諫官相繼亦有請上曰當與太后議之韓𤦺以白太后太后曰上疾新愈恐未可出𤦺曰上意亦自謂可出矣太后曰今素仗皆未具更少須𤦺曰此細事不難辦也乃詔有司擇日以聞先是司馬光言前代帝王升遐之後後宫下陳者盡放之出宫還其親戚所以遂物情重人世省浮費逺嫌疑也竊惟先帝恭儉寡欲清約執禮後宫侍左右承寵渥者至少而享國日乆嵗増月積掖廷之間冗食頗衆陛下以哀恤之初未忍散遣今山陵祔廟大禮俱畢臣愚謂宜舉前代故事應先帝後宫非御幸有子及位號稍貴并職掌文字之人其餘皆給與粧奩放遣出外各歸其親戚或使任便適人書之史冊亦聖朝美事也癸未放宫人三百三十五人司馬光又言王化之興始於閨門故易基乾坤詩首關雎前世皆擇良家子以充後宫位號等級各有員數祖宗之時猶有公卿大夫之女在宫掖者其始入宫皆須年十二三以下醫工診視防禁甚嚴近嵗以來頗隳舊制内中下陳之人競置私身等級寖多無復限極監勒牙人使之雇買前後相繼無時暫絶致有軍營井市下俚婦人雜處其間不可辨識此等置之宫掖豈得為便臣嘗念此不勝憤惋今陛下即位之初百度惟新嬪嬙之官皆闕而未備臣謂宜當此之時定立制度依約古禮使後宫之人共為幾等有幾人若未定之時且虛其員數既足之後不可更増凡初入宫皆須㓜年未適人者求乳母亦須選擇良家性行和謹者方得入宫傳之子孫為萬世法此誠治亂之本禍福之源不可以為細事而忽之也甲申御邇英閣上諭内侍任守忠曰方日永讀講官乆侍對未食必勞倦自今視事畢不俟進食即御經筵故事講讀畢拜而退上命毋拜後遂以為常上自即位感疾至是猶未全安多不喜進藥吕公著講論語子之所謹齋戰疾因言有天下者為天地宗廟社稷之主其於齋戒祭祀必致誠盡恭不可不謹古之人君一怒則伏尸流血故於興師不可不謹至於人之疾病常在乎飲食起居之間衆人所忽聖人所謹况於人君任大守重固當節嗜欲逺聲色近醫藥為宗社自愛不可不謹上納其言為之動容俛首後因輔臣奏事語及公著歐陽修曰公著為人恬静而有文上曰比於經筵講觧甚善司馬光言伏見權御史中丞王疇建言乞陛下循真宗故事幸諸寺觀祈雨朝廷雖從其請而講議選日已踰浹旬至今車駕未出衆論狐疑皆云事恐中輟臣愚竊以陛下踐位已踰朞年京城百姓未聞屬車之音重以嚮者聖體不安逺方之人妄造事端訛言未息若聞車駕一出則逺近釋然莫不悦喜况今春少雨麥田枯旱禾種未入倉廩虛竭閭里饑愁陛下為民父母當與同其憂勞祈禱羣神豈可晏然視之不以疚懐况詔命已降流聞四方若復遷延乆而不出則道路之人逾増猜惑不若嚮時初無此議也且王者以四海為家故稱乘輿或稱行在車駕暫出近在京城之内亦何必拘􅎩史之言選揀時日忘萬民朝夕之急殆非成湯桑林周宣雲漢之意也臣愚伏望陛下斷自聖心於一兩日之間車駕早出為民禱雨以副中外顒顒之望甲午祈雨於相國天清寺醴泉觀帝乆不豫至是士庶驩呼相慶己亥詔自今水旱命官禱於九宫貴神初胡宿上言竊見前書所載九宫貴神實司水旱雖不見經而當時尊次昊天上帝唐明皇肅宗嘗親祀之雖太和降為中祀至㑹昌即復其禮仍以宰相徃修祠事國家祗若舊典列於常祀至和中因修時祭光禄小吏慢祀而震死者二人威靈所傳耳目未逺今首夏垂盡而時雨尚愆有惻上仁徧走羣望昔宣王遭旱雲漢之詩曰上下奠瘞靡神不宗况水旱之神又可闕諸臣愚以謂宜因此時特遣近臣并祀九宫貴神詔禮院詳議於是禮官議以國朝舊制每嵗雩祀外水旱稍乆則遣官告天地宗廟社稷及諸寺觀宫廟九宫貴神今列大祀亦宜准此命官就壇祈禱詔從之案自此以下皆五月中事此條之首疑脱五月二字壬寅詔三班院使臣無私罪有勞績及有薦舉差使十年以上者許經本院叙述或吏幹可以理繁劇或武畧可以擒奸盗委主判官先騐材器可否如願試邊事時務䇿者量試一道如有可取即送宻院考覆取進止漸與試用仍每年不得過十人丁未命天章閣待制兼侍講吕公著集賢校理同修起居注邵必編集仁宗御製戊申皇太后出手書還政是日遂不復處分軍國事先是上疾稍愈自去年秋即間日御前後殿視朝聽政兩府每退朝入内東門小殿覆奏太后如初太后再出還政手書大臣以白上輙留之不出上既康復無他太后復降詔書還政韓琦乆欲太后罷東殿垂簾嘗一日取十餘事併以禀上上裁决如流悉皆允當琦退與同列相賀因謂曽公亮等曰昭陵復土𤦺即合求退顧上體未平遷延至今上聽斷不倦如此誠天下大慶琦當於簾前先白太后請一鄉郡須公等贊成之公亮等皆曰朝廷安可無公公勿庸請也於是詣東殿覆奏上所裁决十餘事太后每事稱善同列既退琦獨留遂白太后如向與公亮等言太后曰相公安可求退老身合居深宫却每日在此甚非得已且容老身先退琦即稱前代如馬鄧之賢不免貪戀權勢今太后便能復辟馬鄧所不及因再拜稱賀且言臺諫亦有章䟽乞太后還政未審决取何日撤簾太后遽起琦厲聲命儀鸞司撤簾簾既落猶於御屏㣲見太后衣也太后還政撤簾事據蔡氏直筆邵氏見聞録并參政韓𤦺家傳及王岩叟别録及家傳所載太后不樂還政等語皆虧損聖徳且非事實今並削去直筆誤云𤦺告樞相文彦博亦不取書按撤簾還政事宋史不載曺后傳云后命還政帝持乆不下及秋始行之亦與此不合嘉祐初琦與富弼同相或中書有疑事徃徃私與樞宻院謀之自弼使樞宻非得㫖令兩府合議者𤦺未嘗詢於弼也弼頗不懌及太后還政遽撤東殿簾帷弼大驚謂人曰弼備位輔佐他事固不敢預聞此事韓公獨不能與弼共之耶或以咎琦琦曰此事當如出太后意安可顯言於衆弼自是怨琦益深富弼怨韓𤦺事據司馬氏記聞邵氏見聞録稱富弼謂韓公欲致弼於族滅之地恐弼初無此言也吕誨上言恭聞皇太后罷同聽政謙尊之徳輝光益著在於聖世誠為慶事臣竊以陛下方隆孝治義切安親尊奉之宜當全恭順昔先帝㧞陛下於公族三十年中孰不知皇太后經營佐佑之助迨宣遺制力扶天歩不幸三日之外陛下違豫大臣協謀乃建是䇿比翊輔踰年政令平允於陛下之恩為至矣於廟社之計為深矣今遽宣詔命罔知其由在皇太后則為得之在陛下宜何如哉臣愚伏望宸𠂻特降詔音曲形遜讓至於再三感動羣情庶幾中禮追思先帝之顧託不失聖母之懽心克全孝恭斯為盡善中外明知無俾竊議盛徳於始終之際也誨尋又言帝堯受命不以位為樂而以天下為憂及其成功率由仁孝爾先帝在位四十餘年天下晏然非有他術仁孝而已矣一旦舉萬乘之業屬於陛下繼承安得不以仁孝為先且皇太后事先帝日乆稔詳治道方罷共政雖陛下至明燭理凡百宜闗白示未敢專之意則上慰慈顔所得多矣元元知陛下奉親盡禮孰不翕然從化帝堯之道斯不難至也庚戍上始日御前後殿如故御史中丞王疇上䟽曰臣伏思母后輔佐先帝垂三十年慈懿之範充被海内徃時國嗣未建而皇太后於陛下已有保養之勤母子之恩可謂舊矣乃嘉祐末先帝擇嗣未决而皇太后於陛下又有稱贊援引之力所以然者曹氏親黨之近知陛下仁聖必可任天下也陛下入繼未半年而先帝棄宫室皇太后手扶陛下升帝座恩徳之外又有大功陛下即位數日而疾作中外震駭揺動皇太后又肯從權以當天下之務内則調治醫藥以拯䕶陛下外則彈壓人心以濟先帝之終事内外兵民無纎毫之警使陛下得以深處清禁累月踰時而聖體遂寧則又有保佑之勞也今陛下既南向負扆以臨羣臣車馬出幸以慰都人之望復日御前後殿修祖宗舊制雖仁明聰哲足以感悦兆庶原其本始亦由皇太后擁翊顧復而然也其所成就如此而推避威福能以國柄專歸陛下可謂聖功之始終者雖古之賢后不能加也臣愚以謂母后風烈見於世者如此陛下當崇禮極情而答之於以示天下夸後世不可使慈孝之迹兩未光明願詔二府大臣講求所以尊崇母后之禮若朝廷嚴奉之體與嵗時朔望之儀車服承衛之等威百司供擬之制度他時尊稱之美號外家延賞之恩典凡可以稱奉親之意者皆宜優異章大以發揚母后之功烈則孝徳昭於天下矣是日詔中書樞宻院叅議尊崇皇太后儀範以聞辛亥上問執政積弊甚衆何以裁救富弼對曰恐須以漸釐改又問寛治如何呉奎對曰聖人治人固以寛然不可以無節書曰寛而有制從容以和又問前代宗室富弼對曰唐時名臣多出宗室呉奎曰祖宗時宗室皆近親然初授止於殿直侍禁供奉官不如今之過也朝廷必為無窮計當有所裁損知諫院司馬光言臣聞治身莫先於孝治國莫先於公孔子曰孝徳之本也又曰不愛其親而愛他人者謂之悖徳不敬其親而敬他人者謂之悖禮未有根絶而葉茂源涸而流長者也仁宗皇帝以四海大業授之陛下其恩徳之大天地不足以為比今登遐之後骨肉至親獨有皇太后與公主數人陛下所當盡心竭力供承撫養以副仁宗皇帝之意曏者皇太后聽政之時左右侍衛之人不敢不恪求須之物無所不備既委去政柄臣竊慮有無識之人隨勢傾移侍奉懈慢供給有闕則天下之責皆歸陛下不可不留意朝夕省察也又若有不逞之人於兩宫之間刺探動静拾掇語言外如効忠内實求媚以相搆間者臣願陛下迎拒其辭執付有司加之顯戮誅一人則羣邪自退納一言則百䜛俱進此乃禍亂之機不可不深察也臣聞國事聽於君家事聽於親臣愚以為陛下在外朝之時刑賞黜陟之政當自以聖心决之至禁廷之内取捨賜予事無大小不若皆禀於皇太后而後行陛下與中宫勿有所專如此則内外之體正尊卑之序明慈母歡欣於上臣民頌詠於下矣不然皇太后歸政之後若侍衛之人稍有怠惰求須之物小失供擬加以䜛邪妄興離間萬一有絲毫闕失流聞於外或皇太后憂思不樂内生疾疢則陛下何以勝此名於天下哉雖百善不能掩矣臣故曰治身莫先於孝也洪範於好惡偏黨之際正反言之重之至也周任曰為政者不賞私勞不罰私怨大學曰欲明明徳於天下者必先正其心有所忿懥則不得其正有所好樂則不得其正陛下奮發宫邸入纂皇極爰自濳躍至於天飛舊恩宿怨豈能盡無然今日即政之初皆不可置於聖慮以害至正也凡人君之安道在於進賢退不肖賞善罰惡而已爵禄者天下之爵禄非以厚人君之所善也刑罰者天下之刑罰非以快人君之所怒也是故古者爵人於朝與士共之刑人於市與衆棄之明不敢以己之私心害天下公議也今四海之廣百官之衆有賢有愚有善有惡比肩接迹雜遝並進臣願陛下少留聰明詳擇其間茍有才徳髙茂合於人望者進之雖宿昔怨讎勿棄也有器識庸下無補於時者退之雖親暱姻婭勿取也有勵行立功為世所推者賞之雖意之所憎勿廢也有懐姦犯禁為衆所疾者罰之雖意之所愛勿赦也如此則朝無曠官野無遺賢為善者勸為惡者懼上下悦服朝廷大治百姓䝉福社稷永安不然陛下若專居深宫自暇自逸威福之柄盡委大臣取過目前不為逺慮賢愚不分善惡失實不則所進者皆平生所親愛所退者皆平生所不快所賞者皆諂諛而無功所罰者皆忠諒而無罪如此則中外觧體紀綱隳紊羣生失所天下可憂矣臣故曰治國莫先於公也此二者榮辱之大本安危之要道臣願陛下審思而力行之壬子詔皇太后今稱聖㫖出入唯不鳴鞭他儀衛如章獻明肅太后故事有所取索本閤使臣録聖㫖付所司其屬中書樞宻院使臣具申状皆覆奏即施行司馬光言竊聞兩府議定皇太后於諸處取索物色令本閤使臣以皇太后㫖申牒逐處有司再具牓子奏聞候見御寳即便供應臣熟思此一節理恐未至稳便聞自來内中凡有所須止用御寳合同文字於諸司庫務取索諸司庫務即時供應過後方申三司覆奏及行磨勘今來皇太后有所取索若一一須待本閤使臣申牒逐處再行覆奏候得御寳方敢供應臣愚竊慮行遣徃復太為迂廻萬一使者懈慢有司泥文太后緩急欲得藥餌什器之類細小之物不能應時而至遷延經日有傷慈母之心則非陛下以四海奉養之意也事雖至㣲當此之際小有不足所係甚大禮王及后世子之膳不㑹蓋優尊者不可限以多少之數故也臣愚欲望陛下再令兩府大臣商量此事應皇太后所取物色並令本閤使臣行文字與合同司一如陛下聖㫖所取御寳合同文字下諸司庫務畫時供應仍令合同司每日将本閤使臣文字繳連實封别遣使臣進呈皇太后以防矯偽如此則尊卑之體正孝養之禮盡矣光雖有此書其從違當考丙辰上皇太后宫殿名曰慈壽加宣徽北院保平節度使判鄆州曺佾同平章事初議除拜上以問宰相韓𤦺琦曰陛下推恩元舅非私外戚也以問樞宻使富弼弼對如琦遂降制而太后持其制弗下上固請乆之乃許司馬光記聞載韓維説慈夀將歸政頴王謂維及孫思㳟曰慈夀欲為曺佾求使相二人不應王竟使王陶逹意於政府果得之他日二人獨見維以是戒王曰今陛下已親政内外上下事體已正當專心孝道均養三宫而已他事勿預也按實録佾制下太后猶持之不知使相果太后意否當考事具六月戊午學士院奏詳定改𠡠官文書與御名同者凡二十字餘令依此以音義改避從之壬戍以帝康復命輔臣謝天地宗廟社稷及宫觀癸亥宰臣韓琦等奏伏以臣聞出於天性之謂親縁于人情之謂禮雖以義制事因時適宜而親必主于恩禮不忘其本此古今不易之常也陛下奮乾之徤乘離之明擁天地神靈之休荷宗廟社稷之重即位以來仁施澤浹九族既睦萬國交歡而濮安懿王徳盛位隆所宜尊禮陛下受命先朝躬承聖統顧以大義後其私親欽之重之事不輕發臣等忝備宰弼實聞國論謂當考古約禮因宜稱情使有以隆恩而廣愛庶幾上以彰孝治下以厚民風臣伏請下有司議濮安懿王及譙國太夫人王氏襄國太夫人韓氏仙逰縣君任氏合行典禮詳處其當以時施行詔須大祥後議之司馬光上皇太后䟽曰去嵗仁宗皇帝捐棄萬方皇帝嗣統之初憂哀成疾殿下念社稷之重同聽庶政以安羣情今聖體復初四方無事殿下推而不居自取安逸動静之節無不合宜率土民臣孰不稱頌臣不自量度欲成殿下之全美猶以螢燭之㣲明仰禆日月之盛光伏惟殿下稍寛其罪而終聽其辭臣竊以治國家之道貴賤雖殊人情一也嘗觀天下士民之家其長㓜羣居長者或恩意不備衣食不豐㓜者或容貎不恭言語不遜若㓜者孝恭而不怨長者慈惠而不責則上下雍睦家道以興若㓜者以為怨長者以為責上下乖離家道以衰其始相失也甚㣲而終為禍也甚大又加以䜛人間之於是乎有父子相疑兄弟相疾亂虐並興無所不至者矣凡閨門之内子婦有以恭孝之心至者則尊親當歡然以慈愛之心接之若其有過則當以忠厚之心教之教之備矣而猶不聽則雖責之可也罪之可也及其既改則又當復以歡心接之不可以一忤顔色而終身惡之遂不觧謝也故骨肉之間有威怒而無憎疾有詰責而無猜忌此自古聖人所以御其親之道也臣竊惟皇帝皇后於殿下兼内外之親㓜䝉保育今日為萬民父母享天下富貴孰云非殿下之力臣謂殿下固宜撫存愛念情同所生周旋保䕶以終大惠不可偶以纎芥之失遂蓄乆長之怒棄生成之厚恩取踈絶之深怨愚知所同知也皇帝去嵗得疾之深容貎言辭誠或可疑得罪於殿下者臣固已嘗言於殿下云不可責有疾之人以無疾之禮也凡醉而有過醒猶可赦况有疾之人不自省知本非其意之所欲為豈可追數以為罪咎耶皇后自童孺之嵗朝暮㳺戯於殿下之懐分甘哺果拊循煦嫗有恩無威今既正位中宫得復奉膳羞盥帨以事殿下其意恃昔日之愛不自踈外猶以童孺之心望於殿下故或有所求須不時滿意則愠懟怨望不能盡如家人婦姑之禮殿下雖怒之責之固其宜也誰曰不可但事過之後殿下若遂棄之不復收恤憎疾如仇讎則臣以為過矣臣在闕門之外無由知禁廷之事竊聞道路之言未詳虛實皆言近日皇帝與皇后奉事殿下恭懃之禮甚加於徃時而殿下遇之太嚴接之太簡或時進見殿下雖賜之坐如待踈客語言相接不過數句須臾之間已復遣去如此母子之恩如何得逹婦姑之禮如何得施所以使之疑惑恐懼不敢自親者盖以此也臣竊惟殿下母儀天下踰三十年柔明之譽洽於中外皇帝龍潛藩邸進徳修業仁聖之望光於逺邇先帝以至公大義選賢建嗣海内之人皆謂繼統之日慈孝之風必自家刑國誠不意閭巷之民忽有今兹異論推其本原蓋由皇帝遇疾之際宫省之内必有䜛邪之人造餙語言互相間諜一則欲詐效小忠以結殿下之知僥求禄利二則自知過失素多畏嗣君之嚴有所不容三則欲竊㺯權柄畏長君聰明使已不得自恣是以日夜闚覘拾掇絲毫之失無不納於殿下之耳殿下雖至聰哲不能無疑雖至仁慈不能無怒皇帝以剛健之性屈於衆口無以自伸能不憤悒遂使兩宫之間介然相失乆而不觧流聞於外朝野之士有敢竊議其是非者深可惜也今天誘其𠂻殿下濬發慈㫖卓然逺覧舉天下之政歸之皇帝此乃宗廟之靈生民之福然臣竊料讒邪之人心如沸湯愈不自安力謀離間彼皆自營一身之私非為國家與殿下之計也臣願殿下深察其情勿復聽納斥逺其人勿置左右諭皇帝以向來紛紛皆此屬所為自今以後母子之間當坦然無疑皇帝必涕泣拜伏感激推謝然後兩宫之歡一皆如舊皇后進見之際殿下冝賜以温顔留之從容來往無時勿加限絶或置酒語笑與之欣欣相待如一家人之禮則殿下坐享孝養何樂如之心平氣和眉夀無疆國家乂安内外無患名譽光美垂於無窮與其信任䜛慝猜防百端終日戚戚憂憤生疾國家不寧禍亂横生譏謗之口流於後世二者得失相去逺矣且殿下既能以祖宗之業付皇帝又能以大政授之而獨于恩禮之際終不能豁然囘心息怒其故何哉方今宫闈之中殿下骨肉至親止皇帝皇后長公主及皇子公主數人而已其餘皆行路之人於殿下何有若親者尚不可結以恩信猜而逺之則踈者獨肯受殿下頋遇盡其死力終始無貳乎夫貴莫貴于為天下之母冨莫冨於受四海之養今殿下有此冨貴而不能自樂親其所可踈踈其所可親使受恩之子婦徬徨而不自安踧踖而不敢進雖内懐反哺之心而無以施展臣竊為殿下惜之臣父子皆䝉先帝大恩擢於常調之中置之侍從之列心非木石豈能暫忘今先帝晏駕之後臣唯不避死亡以進忠直之言庶㡬殿下母子和恱國家安寧是臣所以為報効也吕誨言于上曰事有至微關利害之大者冝為首務自古有天下者録小勞而賞之則有大功者無憂忘宿怨而用之則反側者皆安今日事疑有闕焉豈宸𠂻思之未暇将行之有漸也外議籍籍皆謂宦官軰多有反側得非疇昔所慿附為之易慢或經年以來伺兩宫間隙諛言得進自惟其咎不能無震慴之心是亦小人之常情爾在聖徳豈應念此臣伏望天慈曲為容覆向者所聞皆置度外左右給事經年以來雖齪齪勤謹亦得為勞當録之不遺必欲其去因以恩貸處之外任可也假借之過其來已乆前世禍亂冝為近監况制御之術甚易在陛下掌握而已唯不冝施於今日安其反側於體為便頋此類誠何足惜所係者朝廷之大患臣敢不罄愚直上干天聼唯明智察焉吕誨言于太后曰臣伏覩殿下近降手書以皇帝既安堅罷同政聖子恭孝遂成母徳雖前世有還政明辟之事亦未聞期月而成輔翊之功及形謙謙之美者休聲茂實當垂光於萬世矣然聞外議以符寶未歸於上前臣有以知非殿下之意焉何則國政猶不欲其乆而復眷留符寶哉萬一所司行遣之間稍有稽緩渉此議論無益於聖躬亦恐前降書㫖或未孚於中外則有累全徳始終之際不可不審臣所以瀝懇而言萬死無避唯祈鍳照天下幸甚太后之未還政也侍御史知雜事龔鼎臣殿中侍御史裏行傅堯俞上疏鼎臣䟽曰先帝以萬世根本之計推擇主上立以為子實殿下相之一日宫車晏駕殿下銜哀隱苦定策于頃刻間立主上為天子主上纒憂遇疾大臣無所取决請殿下共聼庶政從宫輔養數月自中都至四海奠枕如昔者皆殿下所賜也今主上聖躬既豫車駕兩出冝于此時詔罷兩府簾前奏事以終始天地之功則太姒太任之事何足道哉及是又上䟽曰伏覩手書還政殿下優㳺房闥尊安内朝人心恱舒天意調順昆蟲草木無不欣喜然自降手書今二十日矣惟御寶尚未致上前符寶之重與神器相須乆而未還益招羣論臣竊為殿下惜此冝戒職掌之吏速歸御用之寶不緩也十三日下手書還政鼎臣云今已二十日矣則閏五月初符寶猶未歸上前也今且以鼎臣䟽附五月末按治平二年二月戊午英宗云如龔鼎臣乃未嘗言事不知鼎臣本傳何從得此疏韓贄作鼎臣墓銘亦云勸太后捲簾還政本傳或因墓銘更有増餙也閏五月戊辰宰臣韓琦遷右僕射曽公亮遷戸部尚書樞宻使冨弼遷戸部尚書案宋史弼未嘗為户部尚書此疑誤張昪遷吏部侍郎上御延和殿召琦等入謝琦等辭以方陳避不敢入固召之既視事入復出御延和以俟琦等遂入謝命坐賜茶弼以不預定策懇辭昪以病在告不入叅知政事歐陽修趙槩為吏部侍郎樞宻副使胡宿吴奎為禮部侍郎己巳禮部奏鄉貢進士李嘉言等伯父為道士而死請比外繼降服大功九月許其應舉從之辛未詔御史臺閤門舊十日具文武細書班簿以進自今大書為册月上之又詔樞宻院年一進者亦令為册癸酉又録班簿以進是日冨弼具奏辭所遷官曰臣伏為今來恩命出於殊常面辭者三上文字奏免者再于今未聞報可此盖天聼髙邈愚𠂻未逹不避煩凟須至更盡區區伏惟聖明曲賜垂納非獨臣之幸也臣竊聞制詞叙述陛下即位時以臣方在憂服無可稱道乃取嘉祐中臣在中書日嘗議建儲以此為效而推今日之恩此乃當直學士執筆之際不得其詞遂巧為之說然迂逺已甚矣嘉祐中臣雖曽泛議建儲之事仁宗尚秘其請其于陛下則如在茫昧杳冥之中未見形象安得如韓琦等後來功效之深切著明假如取臣前議為勞此特絲髮之微何足加賞今陛下録臣先帝時微勞曷若報皇太后今日之大恩恭惟先帝無子立陛下為嗣中外皆知當時盡出皇太后宻論料陛下亦自知之又竊聞陛下初立為皇子召居禁中其時先帝為左右姦人所喋不無小惑内外之人以至陛下舊邸諸親無一人敢通信問者陛下飲食悉皆闕供皇太后亦不敢明然主之但曉夕惶恐百方為計偷送食物之類者甚多陛下豈不省之乎洎先帝晏駕之夕中外惶駭皇太后立陛下於倉卒中天位遂定無何三兩日後陛下以積憂成疾天下萬務無所取禀大臣列奏請皇太后權同聼政此决不是皇太后本意盖不得已從大臣之請也陛下纔康復皇太后即日還政退居深宫此天下之人有識無識盡知皇太后始終無所負于陛下也臣去歲六月初被召還朝充位樞府凡百機務先於陛下處奏定指揮次至簾前關白而已並無一字可否一依先得聖㫖如此者凡近一年此足見皇太后盡至公之心不以尊且親有所凌壓而輒生異同也臣又見皇族中於仁宗洎皇太后校其親踈與陛下同者多矣就衆多中獨取陛下為嗣今日貴為天子冨有天下其為恩徳可與天地比其髙大陛下如何報答則可以稱副而反於仁宗不能謹祭祀於皇太后不能偹孝養此皆人子常分尚多闕失况敢更望他有所報乎陛下向者服藥天下之人自不驚恠今陛下清明剛健専决萬務而祭祀孝養之闕殊無增加皆如故朝廷臣僚始知陛下孝心果不至非疾恙使之然也臣實不喻聖意何縁而若此若為仁宗嘗有小惑則陛下終不得立矣是所惑不能害陛下大事若為皇太后不當垂簾則又元因陛下服藥從大臣之請况復今來已盡還政于陛下矣垂簾終不能分陛下之權也臣潜料二大節皆陛下所不樂者不能慊於心也然今則二事已過盡可釋然豈冝蓄懐為恨而終不可觧耶谷風所謂㤀我大徳思我小怨者也此是刺周幽王詩陛下豈可忽虞舜之大孝慕幽王之亂風臣甚為陛下痛惜之皇太后垂簾日嘗謂臣與胡宿吳奎曰無夫孤孀婦人無所告訴臣等共聞此語實為傷心心料中書亦聞其說又向者竊聞先帝諸公主陛下易其所居以安己女此知者尤甚動心亦未嘗聞陛下略加恩煦恭惟先帝臨御天下四十二年仁恩徳澤入人骨髓以至徧及蟲魚草木臣事先帝亦三十餘年自布衣擢至首相其恩徳可謂至大今日不忍見其孀后幼女失所如此而臣反坐享陛下遷寵還得安乎仁宗與皇太后於陛下有天地之恩而尚未聞所以為報臣於陛下不過有先時議論􅁝髮之勞何賞之可加陛下忘天地之大恩録絲髮之小勞可謂顛倒不思之甚也大凡以仁恩道徳感人者其所感深以爵位金帛感人者其所感淺深則人至死不忘淺則人有時而移惟願陛下外則以仁恩道徳訓天下結人心内則以純孝恭恪奉仁宗事太后則臣雖歠菽飲水奔走陛下以死無悔茍未然也陛下雖日加爵位金帛之寵臣終不感恩亦萬無可受之理臣又念天下事粗存祖宗法制百官行之萬方奉之况陛下方在諒隂未煩聖慮其所急而冝先者惟是仁宗一后五女所謂孤遺而百官萬方力不能及其休戚只係于陛下一人之手者切在陛下照恤之恩憐之則天道助人情歸子子孫孫自然享福無窮也夫幽則有天道明則有人情陛下勿謂天㝠㝠而無所聞人蚩蚩而無所知遂不頋恩義畧無畏憚也臣謂幽明之間天人之道昭然甚可畏也自古盛明之君未嘗不欽天道順人情則國祚長逺昏亂之主未嘗不逆天道背人情則國祚短促禍福之來疾如影響陛下若都不以天道人情為急而但務從已之所為異日别致憂患則非所以主持宗社之計也恭聞陛下在藩邸時屏去聲色雜伎藝惟留心經史遂博通古今之學誠一代之英主也而何獨於仁宗皇太后孝心有所不至如此之甚乎臣賦性狂愚不識忌諱謹此辭免恩寵妄進瞽說惟聖慈矜容而納其一二不勝大幸奏入不報弼又奏曰臣願陛下奉仁宗祭祀盡恭謹之道事皇太后顔色極誠實之禮若勤勤不已則孝徳自然彰聞於外京師翕然歌詠傳逹天下遂成風教陛下可不勞而治此時推恩數倍今日臣自不辭譲君臣之際兩得其冝豈不美歟豈不盛歟奏至六七上乃優詔答焉弼復奏曰聖詔云鴻惟仁宗皇帝欲報之徳昊天罔極皇太后子育朕躬方以天下之養承顔于朝夕矧敢曰養之至乎臣謂天下為人父母者咸願陛下踐此說行此心盖家家欲其子孫化之而為孝子順孫也况近在陛下左右日夕輔導傾耳凝聼有甚于天下之人心也但聞陛下於仁宗祭祀皇太后孝養略有加于前則臣唱一為十傳逹於士大夫使轉宣布於天下以慰天下為人父母之心且以廣吾君至孝之徳于外遂成孝治之朝也所恨近日寂無他聞與服藥時所聞者都無小異此臣所以不得不竭盡肝膽思有補於聖明也又詔曰今既朂朕以事親之道而拒君命不受豈其言之戾耶此乃視草學士不盡見臣文字始末故有相戾之語耳臣累奏勸陛下盡事親之道如此之切反自違君命者盖有上之所說云爾豈可便謂之戾乎又詔曰朕初政而下反汗之命何以示天下臣謂帝王號令無故中輟誠為不可縁臣忝冠樞宻預執政八人之列已出陛下殊常之命然臣之來在陛下即位服藥後數月矣今陛下推恩策立勲臣七人者而獨遺臣在聖意誠必難處遂并臣及之此陛下固當然也而臣自知于陛下無分寸勞效輒懇辭之亦當然也若不自愧恥隨衆受之陛下天地為量必能恕臣之貪猥其如朝廷士大夫以臣為何如天下有識者聞之又以臣為何如臣位居百辟之上而為人指目如此豈不玷辱陛下命令乎命令至此而不反者是謂遂非是不能更化也以此乃知向之與臣遷拜是陛下不當行而勉行之後因臣再三辭避而罷之是理合追還不為反汗明矣韓𤦺等七人勲烈彰灼明如星月中外執筆之士歌詠之不暇况已批答斷來章伏望聖慈促令入謝以快羣望臣即乞速詔學士院允其所請兩皆得冝亦所以免頻䀨宸聼也弼又兩奏卒不聼弼乃受之癸酉詔録學士院具員御史臺班簿各一本以進歩軍都虞候端州防禦使知雄州趙滋卒贈遂州觀察使滋在雄州六年敵憚而惡之使人經過滋與飲勸酒皆不應異時􅃰州數以細故移文往來及是罕有至者敵常大飢舊米出塞不得過三斗滋曰彼亦吾民令出米無所禁邊人徳之馭軍嚴戰卒舊不服役滋役使如廂兵莫敢有言繕治樓櫓至於簿書米塩皆有條法性尤廉謹月得公使酒不以入家然傲愎自譽此其短也戊寅上問執政唐明皇治致太平末年何以至此冨弼對曰明皇初平内亂勵精求治委政得人所以治安末年任非其人遂致禍亂人主惟在擇賢决不可使姦人當國事故也吳奎曰明皇性豪邁無防檢用王忠嗣統制萬里如忠嗣忠純可矣如安禄山桀黠亦令統制萬里安得不兆亂乎上皆以為然己丑御史中丞王疇為翰林學士召樞宻直學士吏部即中知瀛州唐介為右諫議大夫權御史中丞上面諭介曰卿在先朝有直聲今出自朕選非由左右言也先是翰林學士馮京數請觧開封府事補外上問輔臣曰京曷為求去韓琦曰京領府事頗乆必以繁劇故求去爾又問京為人何如琦曰京在開封府嵗餘處事無過求之髙科中有足嘉者又問賈黯何如人歐陽修曰黯為人剛直但思慮或有不至爾琦因言羣臣邪正皆陛下所知至於進退實繫天下利害惟陛下以此為先不可不察也上然之此事據寶訓附見不審何月也
