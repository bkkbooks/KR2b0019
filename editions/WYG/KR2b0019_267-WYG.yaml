body:
  text: 續資治通鑑長編巻二百六十三宋李燾撰神宗熈寜八年閏四月壬辰朔司農寺言提舉秦鳯等路常平司状涇原渭三州推行保甲法而民流移稍多欲至五月人戸歸業以次排定上批故歲涇原災傷至甚宜俟今冬農隙編排提舉永興軍路常平等事章楶言鄜延路去年災傷歲饑知延州趙卨舍流民以空營募壯者築濬城壕自秋及春役二十二萬九千八百餘工人不乏食而城池皆葺於舊詔奨之癸巳權三司使章惇言昨増吏禄行河倉法蓋欲革絶私弊今聞却有以假借典質之類為名經隔月日方受財物者宜為防禁詔行倉法人因職事以借便質當為名受財者告賞刑名論如倉法詔河北河東義勇保甲候教成令上畨以代近邊廵檢戍兵從提舉義勇保甲曽孝寛及司農寺兵部請也宋本以此并附三月十四日今仍别出之司農寺言𨽻本寺錢物帳狀乞令屬官分路依三司判官㸃檢簽書置籍掲貼常見州縣收支見在之數其鈎考賞罰約束依三司帳司法又乞以諸鎮買撲酒稅人代衙前為鎮将並從之詔五路義勇保甲每三五州差在京有職事官一員兼提舉知制誥沈括大名府澶恩州提㸃在京倉草塲沈希顔眞定府深趙州開封府推官蹇周輔邢洺相州中書檢正中書戸房公事呂嘉問定祁保州永寜安肅廣信順安軍檢正禮房公事向宗儒瀛冀雄莫州保定軍曽伉絳隰州檢正吏房公事蒲宗孟濵棣徳博州度支判官楊景略滄覇州乾寜信安永靜軍都水監丞劉璯潞澤州威勝軍樞宻院檢詳兵房文字劉奉世太原府忻州平定軍張修嵐石州火山寜化保徳岢嵐軍檢詳刑房文字杜紘晉汾州直舍人院李定懷衛磁州定免以户部判官丁執禮代之各舉選人班行一員勾當公事聽不以時差出或親廵按中書樞宻院具條約以聞初王安石請合義勇於司農上曰司農事多如府界俵常平違法尚檢察不及若兼兵部則力有所不給須别置官故有是命沈括自誌云朝廷新伍民兵河北河東陜西得勁卒百萬謂之保甲河北三十餘萬先集詔扵從官中擇二人分領擬復周八柱國法使從官中領不以屬帥府歲一出按之括受命提舉河北西路保甲此事附見當考甲午龍圖閣待制兼樞宻都承㫖曽孝寛兼判兵部判兵部顧臨馬珫並罷上既不欲令司農兼兵部王安石言人才彼善於此則有之若判兵部馬珫雖專必不如張諤令判司農諤兼兵部可也上曰馬珫必不堪須議換易欲令沈括及孝寛判兵部安石言沈括壬人而義勇保甲獨臣剏議今既判兵部即中書不預此兵事固宜非中書所知然陛下擇主判須得一敢與宻院爭曲直者即不須令中書預其事沈括使河北隂沮壞新法有所希合事甚衆若令主判恐義勇保甲法難立上曰此大事須中宻同管罷沈括可也安石因言沈括壬人不可親近書畏孔壬難壬人以為難壬人然後蠻夷率服者壬人所懐利害與人主所圖利害不同人主計利害不審又為壬人所蔽則多失計多失計此蠻夷所以旅拒也天下事有疑而難明之處陛下意有偏而不悟之時以偏而不悟之意决疑而難明之事而壬人内懐姦利之心奨成陛下失計此危殆之道也上以為然稱括材能以為可惜安石曰如呂誨之徒必不能熒惑陛下如括者乃所謂可畏難者也陛下試以害政之事示欲必行而與括謀之括初必嘗試陛下若謂必欲如此括必向陛下所欲為姦矣果如此陛下豈得不畏難乎安石又言小人所懷利害與陛下所圖利害不同不可不察如文彦博豈是奮不顧身以抗契丹者而實激怒陛下與契丹爭細故乃欲起事以撓熈河而已陛下安可與此輩謀事言國家之利上遂不用括并罷珫及臨專以兵部委孝寛詔張琬奏乞移河州軍馬駐熈州熈州軍馬駐通逺軍緩急追呼䇿應以省極邊糧草其令熈河路經略司速相度施行又詔根究自置軍器監以來施行措置事有何實效及有無失計置事及熈寜五年後開封府界逐縣保甲呈試武藝酬奨以聞上言軍器監事不集且言非偏喜說軍器監政為事都不集王安石曰陛下雖累宣諭軍器監事不集然未嘗根䆒詣實欲根究施行次第奏聞上乃令根究五月十七日上批比較軍器監當考又詔判都水監宋昌言具析妄塞訾家口事初御史盛陶言汴河開兩口非便命昌言相度遂塞訾家口既而水勢不調屢開屢塞最後費六十萬工乃濟漕運論者歸罪於閉訾家口故也先是王安石欲令侯叔獻糴淤田麥上疑叔獻虛誕曰叔獻向論訾家口以為萬世不易之口既而不然安石曰此非叔獻虚誕蓋有作姦壊訾家口者上令根究故昌言有是命安石初主不閉汴口之議甚力馮京獨不以為然安石罷相數月昌言等請權閉而侯叔獻請勿閉其後卒使昌言閉之尋以汴水絶流更命程昉開撥時七年十一月己亥也叔獻素與昌言不協及安石復相叔獻因譖昌言附會馮京變易安石在相府時所行事安石怒會汴水復絶流叔獻屢言由昌言塞訾家口所致於是遣叔獻復通訾家口昌言懼求出得知陜州塞訾家口宋昌言新舊𫝊自不同司馬光記此事亦參差不合王安石所録又不可全信今考按實録前後所書及昌言新𫝊别加刪修更須詳究乃可御集熈寜六年六月十二日手札汴水數日忽然大叚减落河中絶流窑下䖏裁有一二尺訪聞下流公私舟船都不預知放水時日重船首尾减剥下及一例閣拆損壊不少復久留滯人情不安可令都水監應合干官司分析奏聞後提㸃府界吳審禮等言檢視舟船初無損壊者六年十一月一日手札權判将作監范子竒奏乞不閉汴口發運司奏乞展日開口中書門下奏欲令未閉塞相度申中書御批不閉口可與不可相度宜進呈取㫖詔今冬不閉汴口實録七年四月二十六日前提舉河隂輦運屯田郎中王珫遷一官虞部貟外郎勾當京西排岸司文彦璋减磨勘二年珫等以都水監保明不閉汴口隄岸無虞也於是馮京曰昨王庠等以積凌敗隄各已停替此不可不賞臣終以不閉口為未安每年雖减梢芟一二百萬然自汴口至泗州用兵夫數亦不少若苦寒一夕凌排大積如何施工呂惠卿曰若晚閉早開似亦為便上曰子細更詳與體問若藏得清汴即為萬世之利七年八月二十日同判都水監宋昌言李立之丞王令圖言汴口已生新灘秋冬之交必稍退背乞權閉汴口使水涸増修隄岸斗門畢再相度同判都水監侯叔獻丞劉璯乞不閉汴口於孔固斗門下權作截河堰使水入斗門候修隄岸畢即開堰詔如叔獻等所請七年八月二十九日侍御史知雜事張琥言侯叔獻乞不閉汴口創築横隄并置稍澾修舊斗門䟽洩水勢還河萬一深冬氷塞斗門滀水衝溢新堰大則都城可虞小則沿汴居民被害雖省一二十萬物料増置稍澾所費亦自不少乞依舊閉塞汴口不報七年十一月五日上批汴水依前阻絶可差程昉火急前去開撥早令通快十一月九日昉坐被㫖相度河事而不親徃罰銅八年閏四月三日詔判都水監宋昌言具析妄塞訾家口事初盛陶言汴河開兩口非便命昌言相度遂塞訾家口既而水勢不調屢開屢塞最後費六十萬工乃濟漕運論者歸罪於閉訾家口也六月十六日丙午判都水監李立之丞王令圖主薄李甫勾當公事陳佑甫各罰銅二十斤立之出知陜州前判監衛尉少卿知陜州宋昌言汴口官都官郎中王珫都官員外郎顔處恭左藏副庫史劉文應各降一官改昌言知丹州並坐閉訾家口不當也昌言附𫝊墨本云李立之王令圖閉訾家口不當昌言與之爭不得乞罷都水知陜州坐不以聞奪一官知丹州朱本云李立之王令圖議閉訾家口及請冬不閉汴口昌言與之爭不能得乞罷都水知陜州至郡坐前議奪一官知丹州正𫝊云侯叔獻議開訾家口冬不閉汴口昌言爭不能得罷知陜州已而會其費至六十萬復貶秩移丹州八年四月二十八日日録云欲令侯叔獻糴淤田麥上疑叔獻虗誕向論訾家口以為萬世不易之口也余曰非叔獻虗誕有自來作姦壊訾家口者上令根究閏四月三日日録前此上言侯叔獻虗誕以訾家口為萬世之利誠可長用但李立之等作姦閉塞上令根究至是根究宋昌言不合閉口事状甚明此乃馮京使其如此以余嘗奏訾家口可常用故也盛陶因索水漲乃云不合汴河開兩口今檢到水歴方是時汴水乃减四寸索水乃添六尺陶又言嘗溢岸勘會是歲乃無溢岸云不合開兩口乃自來多開兩口上曰宋昌言閉口不當一歲凡八次開閉汴口非特枉費人工物料又汴水不通阻滯綱運甚衆余曰陶前奏以淤田故兩日水淺靠閣損破舟船甚多京師惶擾及勘㑹得並無一船靠損及此八度開閉口勞弊公私舟船皆不通乃無言何也上曰不干盛陶却是薛向余曰向奏臣所不知盛陶即有劄子降在中書不知薛向為近臣如此誣罔聖聽合行法否誣罔如此而不治不知於義理何所當上但笑六月十六日録進呈閉訾家口官余請以汴口及宋昌言為一等奪一官李立之等為一等贖銅上曰却是劉璯說此事余曰誠如此兼璯前開訾家口有功欲以功免此一罰上曰好更令勘會侯叔獻勞績取㫖叔獻乃與璯同救得訾家口者也上又令李立之與郡珪言昌言專受指去相度宜更重余曰見王珫言昌言明說得執政意指須要閉珫屢爭不得上曰既如此不奏乃依違何名守官余曰此所以欲與昌言同罰然昌言誠當更重上乃令與昌言一郡余曰李立之即令替昌言知陜府上曰好司馬光記聞云祖宗以來汴口每歲随河勢向背改易不常其處於春首發數州夫治之應舜臣上言汴口得便利處可歲歲常用何必屢易公私勞費蓋汴口官吏欲歲興夫役以為己利耳今訾家口在孤柏嶺下最當河流之衝水必不至乏絶自今請常用之勿復更易或水小則為輔渠於下流以益之大則開諸斗門以泄之介甫善其議而從之擢舜臣權三司判官後數歲介甫出江寜會汴水大漲京師憂懼朝廷命判都水監少卿宋昌言徃視之昌言曰政府請塞訾家口獨流輔渠韓子華呂吉甫皆許之時監丞侯叔獻適在外不預議昌言至汴口牒問提舉汴口官王珫等二口水勢珫等報言訾家口水三分輔渠水七分昌言遂奏塞訾家口朝廷從之叔獻素與昌言不協及介甫再入相叔獻譛昌言附會韓呂塞訾家口故變易相公在政府所行事介甫怒昌言懼求出得知陜州會熈寜八年夏河背新口汴水絶叔獻屢上言由昌言塞訾家口所致朝廷命叔獻開之水既通流於是昌言及王珫各降一官昌言仍徙知丹州都水監衆官各以贖論叔獻以功遷員外郎判監李立之仍出知陜州以叔獻代之立之未離京師河背訾家口汴水復絶一如前日朝廷更命叔獻開之亦不罪也按七年七月十六日分命輔臣祈雨二十七日又祈雨八月十一日又以久旱祈雨記聞稱汴水大漲恐不然當是凌排衝溢隄岸耳六月甲午昌言等又責閏四月三日甲午上謂輔臣曰蕭禧才去便無人論北事須是大家惻怛憂邊王安石曰此乃臣朝夕所願望於陛下者君倡臣和若陛下不倡臣何由自效又論及邊糴以為得一小官肯惻怛任事者便可委安石曰去年呂嘉問計置河北邊糴李直躬即有論奏呂嘉問又有分析此兩人宜有一人不直不知陛下後來曽與不曽行法韓絳言臣不記得如何行遣呂惠卿曰已進呈訖安石曰如此等事曲直不分功罪不明此大臣所以莫肯惻怛如何得小臣乃肯惻怛又議契丹事安石曰卑而驕之乃是欲致其來如𫝊聞契丹甚畏我討伐若彼變其常態卑辭以交我不知我所以遇之将如何陛下雖未欲陵之邊臣必爭獻侵侮之計今彼不然故我不敢易彼由此觀之我不可示彼以憚事之形示以憚事之形乃所以速㓂也上曰彼必不肯已則如何安石曰譬如强盗在門若不顧惜家貲則當委之而去若未肯委之而去則但當抵敵而已更有何商量臣料契丹君臣有何智略無足畏者臣所畏者契丹作難則宜有受陛下委付與之抗者方其與抗之時乃有人獻異議於中陛下不能無惑因從中撓其機事則安危成敗深有可憂何則千鈞之重加銖兩而移兩敵相對是爭千鈞之重之時陛下從中着力撓之則非特加銖兩之力而已此乃臣所甚畏也若臨事無此則自有人為陛下任此責者乙未樞宻使禮部尚書同平章事陳升之罷為鎮江軍節度使同平章事判揚州通畧云封秀國公大敕列銜曹佾下出入如二府儀先是升之以足疾詔免前殿起居郊祀許不預累求罷於是得請知桂州劉彛言廣源州劉紀帥鄉兵三千侵略邕州歸化州儂智會率其子進安逆戰有功詔給智會俸錢授進安西頭供奉官仍令經畧司選差使臣募峒丁於近便處劄寨以為聲援日給口食如遇賊毎生擒一人獲一首級依見行賞格外更支絹十匹初彛奏曰智會能斷絶交趾買夷馬路為邕州藩障劉紀患其隔絶買馬路故與之戰又曰智會亦不可保使其兩相對互有勝負皆朝廷之利上曰彛既言智會能絶交趾買馬之路為我藩障而又以為勝負皆朝廷之利何也且人既歸順為賊所攻而兩任其勝敗則附我者不為用叛我者得志可謂措置乖方矣王安石曰誠如聖諭縱智會向化未純尤宜因此結納以堅其内附且乾徳幼弱若劉紀既破智會乗勝并交趾必為中國之患宜於此時助智㑹以牽制劉紀使不暇謀交趾乃中國之利上以為然故有是命是曰上又論王猛曰苻堅亦英明然一舉事遂顛覆如此何也安石曰王猛欲殺慕容垂令以子奔故見疑而不知乃所以深托垂於苻堅也上曰猛可謂忠矣安石曰如此為忠何補時事人臣要當以道開發其君使自悟而已方其未悟乃欲以計成事及其不察豈特辱身亦以危國此君子所以不貴詔提㸃開封府界諸縣鎮公事蔡確同外都水監丞程昉廢罷河北等馬監以聞廢罷上疑脫相度字更檢别本十六日罷太原等監七年二月廢東平監詔民戸馬死舊不納官處並報官直納皮筋從軍器監請也提舉淤田司言去年淤田五千六百餘頃詔提舉官減三年磨勘将作監言修三司畢工詔判監官監修使臣各減二年磨勘兵匠吏人等各賜銀絹有差志有知河州鮮于師中乞以未募弓箭手地百頃為屯田從之志有詔以榮州團練使趙思忠為秦州鈐轄不釐職依熈州例供給存恤教其諸子以中國文字思忠七年十二月四日已為秦鈐不應再除或去年實為熈鈐今乃改為秦鈐也其詳具注七年十二月四日上患人莫肯悉心赴功王安石曰陛下能盡見得人情賞罰當其實即人自悉心赴功上曰縱不盡見但得力亦可安石曰見得盡即盡赴功見得少即少赴功見得多即多赴功都不見即無赴功者矣假令見得盡若不随以賞罰即人亦不肯赴功上論宣王時無不自盡以奉其上呂惠卿曰宣王時如此而已未及文武也安石曰宣王盛時乃能如此及其用心差則我友敬矣䜛言其興善人君子方念亂不暇至念彼不蹟載起載行則豈復有自盡奉上之事此一人之事而前後不同如此用心當無差故也上曰宣王猶能終於考牧後世亦豈易及安石曰宣王用吉甫征伐則非張仲在内吉甫無以成其功詩稱吉甫以能明哲保身則宣王之徳薄於先王亦可知矣丙申樞宻使吳充兼羣牧制置提舉修軍馬敕眞定府路安撫司言禁山地若逐去居人愈難防守乞置北寨主薄及嘉祐鎮廵檢差大使臣從之先是沈括言縁邊禁地内居民漸多無繇譏察姦偽乞禁人居上下其議安撫司相度而有是請知沅州謝麟言招納溪蠻古誠等州峒二十三户二千七百一十九丁九千四百九十六願歲輸課米詔補知州楊光富右班殿直楊昌進等五人三班奉職又詔雄州移牒涿州沈括回謝不可以審行商議為名先是契丹欲改括使名為審行商議涿州已再牒雄州又同日牒稱括趁五月二十三日入見上與輔臣謀之王安石言彼誠有爭心則必不肯令括過界候改得審行商議指揮乃令括過界今同日牒令過界即其事非堅可知設若彼要括商議但答云受㫖囬謝不合預商議然南朝本自不欲爭小故務存大體所以不較曲直割地與北朝今北朝却要審行商議必是顧信義不欲無名受地但請遣汎使盡齎合照證文字來南朝理辨曲直庶早得了當縁契丹習見朝廷憚其汎使故每言難免徃復今明許其來來有何傷上以為然詔雄州牒涿州如安石言既而復令進呈牒本謂安石彼若果遣汎使來當如何安石曰彼以我為憚其汎使今示以無所憚彼或不遣示以憚遣則其來决矣汎使於我何苦而憚其來也上曰來此偃蹇不去如何安石曰鄉者蕭禧來陛下兩開天章閣議事又連遣使就商量地界乃所以長其偃蹇今若復遣汎使來待彼說一句即答一句若不說即勿語或不肯去即厚加館餼節次牒報契丹彼亦無所發怒何由使至交兵然邊探屢云契丹欲𫝊國與耶律濬濬好殺不更事恐為其國干賞蹈利之臣所誘或妄生邊隙不可不戒宜早為之備上曰善令只依前牒指揮安石曰前指揮雄州未得發牒今令依前指揮縁雄州機事從來不宻𫝊聞契丹或有以窺我謂宜少變前指揮使不測所以止住前牒之意乃改云候沈括過界數日即牒過御集前日擬囬涿州牒本可且留再議乃閏四月十日也是日安石在病告八日方進呈此㨿日録沈括有乙卯入國奏請并别録載使事頗詳當參考刪修今附注此四月三日甲子括等奏禀沿邉處置邊事與今來事體相妨事乞詳酌指揮等四項臣等今有合奏禀朝㫖事件具下項一河東察訪使李承之未回并河東河北京東沿邊官司或有處置邊事内有與今來朝廷遣臣等徃彼及差官擗撥地界意理不同却致事體相妨别生事欲乞賜詳酌指揮一今來所理會地界圖子恐到北朝尚有未曉地形界至與臣等理會欲乞出示圖子指説一臣等到北外或有事節可以對彼當面理㑹未審許與不許一北朝或别有商量堅欲再差汎使及欲與臣等同來赴闕未審許與不許四月二十日辛巳又奏申明於牒北界聞逹蕭禧宻札内添入未完字數樞宻院奏據館伴所申尋備録第三次聖㫖劄子請蕭禧承領分位翻驛後却要退還為閣中使臣到驛請蕭禧習朝辭儀館伴使到尋已下階守候國信使習儀其蕭禧只於㕔上倚柱立地屢遣人請喚不肯下階習儀直至三更二㸃却索歸位至次日亦是堅拒未肯習朝辭儀間䝉朝廷降到聖㫖劄子已差沈括等充國信使徃北朝面陳分畫地界事理今蕭禧别無商量如要朝辭即取索牓子或欲且留即豐厚管待牒與禧方始下牓子乞朝辭申聞本院檢㑹前兩次所降并今來文字蕭禧雖各曽将分位翻驛抄録慮廽歸不盡聞逹及蕭禧賫囬國書中雖已畧述大指又慮北朝不知得本朝邊臣久來慿用照證地界文字及蕭素等昨來自住留滯并蕭禧在此逐次降去聖㫖文字不肯承受朝辭因依欲令沈括等将朝廷數次劄與館伴所文字等事候到北朝備録與館伴所一一聞逹右中書樞宻院同奉聖㫖依奏劄與沈括等今連逐次文字共三道劄沈侍讀等候囬日繳納樞宻院熈寜八年四月十三日右臣等凖樞宻院劄子令沈括等将朝廷數次劄與館伴所文字等事候到北朝備録與館伴所一一聞逹臣等看詳第四次聖㫖劄子内一節稱蕭禧次日亦是堅拒未肯習朝辭儀問䝉朝廷降到聖㫖劄子已差沈括等充國信使副徃北朝面陳分畫地界事理令蕭禧别無商量如要朝辭即取索牓子或欲且留即豐厚管待牒與禧方始下牓子乞朝辭詳此語勢是蕭禧為見朝廷已令臣等徃北朝面陳分畫地界事理更不與禧商量方始朝辭臣等到彼恐北人須就臣等别要分畫地界文字臣等雖再三開陳縁牒去劄子内都不見次日因蕭禧未肯承當第三次聖㫖乃令臣等徃彼面陳後來又不見因蕭禧已受了文字却改差臣等作囬謝之意北人必堅執牒内文意至時難以口爭兼牒涿州文字内亦只云蕭禧已囬改差臣等充囬謝使副亦不說為蕭禧已受了擗撥地界聖㫖文字說别無商量方始改差之意臣等欲乞於上件繳奏劄子内亦是字下添入要退還上件聖㫖劄子九字於方始字下添入受了聖㫖四字所貴文理完備貼黄臣等近曽思慮北人若言語禮意恭順即疆事已是了當恐因牒與館伴却有酬答引起端緒牽連理會不已臣等累曽開陳今䝉降指揮令備録牒與更再三奏請其劄子内却不說次日猶互退囬第三次聖㫖便言令臣等徃彼面議縁蕭禧為見朝廷已差臣等徃彼面議遂便起發纔起發即改作囬謝乃似蕭禧令去深慮北人别生詞說今來既是牒與欲望許依前項奏陳添入蕭禧未肯承受第三次聖㫖乃令臣等徃彼面議後來蕭禧已承恩受了聖㫖乃改臣等作囬謝如此則文意方完遣使之名亦正伏乞詳察指揮又北人若有上項詞說臣等雖子細說與當初為蕭禧不肯承受第三次聖㫖乃差某官等來北朝商議後來蕭禧已受却聖㫖更無可商量遂改臣等作囬謝縁今來牒去劄子内却未有如此意度竊慮北人只憑文字不肯信臣等口說堅執蕭禧已收了第三次聖㫖只是未朝辭朝廷更差臣等徃彼面議分畫地界事理即顯是第三次聖㫖外别有分畫地界文字若不修令意完恐須堅有求索今来臣等已是在路無由面奏子細須至再白委曲敷陳伏望聖慈深賜詳酌特降指揮閏四月七日戊戍又奏乞将四月二十九日辛卯宻院劄内一節分明劄與雄州令回牒北界事檢會近凖北界涿州牒無雄州稱西陘寨鴻和爾山天池子一帯尚有占據及言可商議縁久來並係當界地分元初被南界将引數十兵衆强來占奪若是此起不再商量定奪了當已後終須難絶徃復即目却稱改差沈括等充囬謝國信使副必慮相次到闕别有推故不肯商議轉致遲延仰燕京留守司指揮涿州賫牒雄州疾速聞達指揮已差國信使副候到闕日凖前聖㫖審行商議其北界又於四月二十七日及二十九日兩次移牒雄州催促國報其二十九日牒内仍稱本來牒到國信使副今月二十一日到北京公文内依前該充囬謝國信使副臣等雖凖四月二十九日樞宻院劄奉聖㫖令沈括等如北朝說及鴻和爾山等處地界未係擗撥更要商量則答以南朝本為二國通好年深不欲以疆塲細故有傷事體故有此分畫若北朝猶以為言必是不欲無名受地須歸理會如此亦甚好然某差來囬謝其他商量斷不敢與聞但請北朝别差横使仍盡賫着實文據徃南朝逐一理會所貴速得了當臣等詳認北界累行公文必定須要見雄州回報如何方令臣等過界今有下項短見謹具奏聞如後一若雄州不與回報或雖有囬報内稱只是回謝更無可商量即恐北人未肯令臣等依例過界臣等必直在雄州等候萬一遲留大叚日久至時須有處置若令只在邊上伺候又縁卒無期程下面如何收結却囬闕将來如何了當預有定論恐日復一日漸成蹭蹬難為囬改一若囬報北界云已令臣等商議又縁疆界已定要無可商量既言商議北人必須要果决言語臣等若執舊說則北人必云聖㫖今來商量臣却只執舊說即是與聖㫖不同若只以今來聖㫖問答又恐疑是臣等推托遷延之語亦不依應得商議二字必謂臣等藏惜恩㫖以為己功必致多方邀索右謹具如前臣等看詳代州地界若只以蕭禧帯去文字下可移改則恐更難令審行商議若不與囬報或言更無商量又恐不納使人今來涿州牒稱凖北朝聖㫖恐於事理須着回報除朝廷别有處置自聽朝㫖外若只依蕭禧帯去事理欲乞将四月二十九日樞宻院劄子内但請北朝别遣横使仍盡賫着實文據至南朝理會所貴速得了當一節分明劄與雄州令囬報北界亦恐無妨雖然所受聖㫖令臣等如北朝說及鴻和爾山等處地界未係擗撥更要商量方今說與上項言語縁今來北界十月内三次牒來理會日後只有更深必無不說及之理備如臣等過界方說即與牒去事理無異但免致界首邀難徃復若下面不免回改即恐愈傷事體費力收拾伏望朝廷審賜詳酌早降指揮貼黄臣等今來有此短見蓋為到邊上所遇事理正與本職相關須合委曲陳述奏請伏望朝廷詳察又臣等近到雄州體訪得北人廵馬界口舖之類多般生事雖未必實欲作過竊慮曠日持乆事緒轉多彼此收攝不得别致爭競伏乞早察事機深賜詳處又北人逐次來牒雄州各即時奏聞臣等恐因近降到聖㫖文字請計會臣等看詳若事理全備即更且遷延囬牒等候臣等此状囬降朝㫖施行乞早賜指揮按括等此奏則元差括等報聘令徃北朝面陳分盡地界事理蓋未曽以囬謝為名及蕭禧辭乃改稱囬謝不知初以何名入銜實録於三月二十一日癸丑即云差沈括囬謝似非事實今不敢便憑括等奏請别修姑附注此更須詳考别録又載楊益戒云地界未了侍讀館使必須别帯得南朝聖㫖來此起須要了當今是聖㫖宣問不可隠藏况前來文字盡言差來審行商議兼令将帯照證文字來北朝理辨今來必須帯得照㨿文字來括答云南朝元差審行商議後來改作囬謝累有公文關報北朝照㨿文字元曽承受得後來改囬謝後朝廷却盡取去也其詳具注在六月二十二日壬子又詔三司具未置熈河路買馬塲以前買馬錢物歲支若干於何官司出辦自用茶博買後如何封樁申中書取㫖後不見如何指揮上批河東近多刼賊動成羣衆可專令經略察訪司精加體量都同廵檢内有疲懦不得力者速於監當人内選擇權對換勾當訖以聞此㨿御集知鄧州翰林侍讀學士滕甫知潤州甫遭父䘮不果赴丁酉端明殿學士翰林侍讀學士權判西京留司御史䑓司馬光提舉崇福宫詔試刑法人上七人差充法官餘循資堂除差遣免試其京朝官即比類推恩戊戍知岷州張守約言蕃部納土當給茶綵臣為其乏食以麥代給宜受專擅之罪詔釋之己亥上批聞趙州修城役兵病者已六百六十餘人外方難得醫藥雖董役官存卹備至而實無補死者可遣内侍賜夏藥及令翰林差醫官乗驛徃彼診治賜特支錢有差又批廣南東路以瘴癘近年數失監司新轉運判官宋球乞増差醫學邢慥宜許之御史盛陶乞出鄧綰奏陶資性端謹終始如一乞甄擢上目王安石及呂惠卿而笑王珪曰惠卿適改云資性頗邪終始如一安石曰綰為國司直其言事如此何止尸素而已上曰鄧綰兩制猶之可也如文彦博任遇更重乃舉劉庠屢陳讜論要治此等事不可勝治安石曰陛下欺羣臣臣等須力爭以為害天下事故也羣臣欺陛下陛下豈宜容忍上曰無虐㷀獨而畏髙明極難事安石曰天討有罪天叙有徳陛下非有私心奉承天之所為而已何難之有且任之重遇之厚則責之尤宜厚韓絳曰房杜有小過必朝堂惶恐謝罪安石曰備位大臣若有小過失或在所容如其欺罔即無可容之理上曰如蘇軾輩為朝廷所廢皆深知其欺然奉使者囬輒稱薦安石曰奉使言稱薦此輩即為羣邪所悦羣邪所悦則少謗議少謗議則陛下以為奉使勝其任若正言讜論即為羣邪所惡羣邪所惡則多譛愬譛愬多則陛下安能不疑又奉使一路安能無小過失因其過失上聞考覈有實即無所逃其罪此所以不敢不為邪以免羣邪誣陷也陶尋出為簽書随州判官陶為随州簽判㨿陶本𫝊十四日王安石云云庚子命龍圖閣待制曽孝寛兼權河北西路察訪司事沈括出使契丹故也壬寅睦州司法參軍練亨甫為崇文院校書以御史中丞鄧綰知雜事張琥薦之知制誥沈括上熈寜奉元厯詔進括一官司天監官吏進官賜絹銀有差初仁宗朝用崇天厯至治平初司天監周琮改撰明天厯行之監生石道言未經測騐不可用不聴至熈寜元年七月望夜将旦月食東方與厯不恊廼詔厯官雜候星晷更造新厯終五年冬日行餘分略具會括提舉司天監言淮南人衛朴通厯法召朴至五月九月召朴言崇天厯氣後天明天厯朔後天又明天厯朔望小餘常多二刻半以上蓋創厯時惟求朔積年數小減過閏分使然故求日月交食為踈崇天厯以熈寜元年交食視明天為宻然但見朔法而已以皇祐三年九月癸酉晷景與十二月甲辰參較差一寸一分半之以日法除得氣後天五十三刻其失皆在置元不當也詔朴改造自以已學為之視明天厯朔减二刻厯成行之賜朴錢百千至紹聖初又改厯元祐六年三月吕大防上神宗實録於此云行之至今蓋指元祐六年也紹聖三年上神宗實録則二年已用觀天厯矣紹聖史官務改元祐獨漏此今改至今作至紹聖初又改厯九年正月二十七日甲申沈括奏當參考舊紀於四月甲申書頒厯今不取提㸃秦鳯等路刑獄鄭民憲言於熈州南關以南開渠堰引洮水並東山直北通流下至北關并自通逺軍熟羊寨導渭河至軍溉田乞募夫開修詔民憲相度如可作陂即募京西江南陂匠以徃詔増給雄州歸信容城兩縣弓手私馬芻豆及七分從縁邊安撫司請也賜都大提舉䟽濬黄河司勾當官李公義内侍黄懐信官淤田各十頃賞濬河勞也詔在京酒戸見欠三司糶米塲錢展限半年癸夘宣徽北院使中太一宫使張方平判永興軍方平乞免宫使求近郡及有是命仍以疾辭詔依舊供職其後上欲用方平為樞宻使既批出王安石将行文書呂惠卿留之曰當晩集更議之因私於安石曰安道入必為吾屬不利翼日再進呈其事遂寢司馬光記聞云事在八年五月今附見方平辭使上欲用興後按陳升之以閏四月四日罷樞宻平或是此時未必在五月也更須考詳權監察御史裏行蔡承禧言省府寺監銓院等處舊無句朱簿者欲令置簿仍選官每員分三兩處提轄季或一月取索檢㸃如於理可行而故為留滯於文無害而煩為追逮或遷引日月而不即了絶或自當行遣而不與行下以違制科罪詔中書樞宻院取索諸處住滯事取㫖後惟三班院稽滯遂劾之詔分秦鳯路正兵二萬二百餘人參以弓箭手寨户蕃兵二萬四千餘人為四将副都總管燕逹為第一将鈐轄康從副之賈昌言為第二将熈河路訓練軍馬王振副之兼凖備䇿應熈河仍令達提舉都監白玉為第三将熈河路蕃漢都廵檢李師古副之都監劉昌祚為第四将階州駐泊都監皇甫旦副之從經略使張詵請也五月四日分環慶四将七月二十八日分涇原五将甲辰詔雄州進士焦渥與試銜判司主簿或尉以河北東路察訪使曽孝寛言渥陳邊議可采召試舍人院中等故也詔河北兩屬戸借常平榖免輸息權發遣環慶路經略使范純仁言舊陜西敕弓箭手百姓不許典買租賃蕃部田土至熈寜編敕則不禁臣今體訪環慶州諸城寨屬戸昨因災傷多以田土典賣與蕃部慮漸典賣與漢人縁熟戸以耕種為業恐既賣盡田土則無顧戀之心以至逃背作過緩急難以㸃集乞自今陜西縁邊屬戸蕃部地止許典與蕃部立契毋得過三年詔地連夏國界者用陜西一路敕餘用編敕録光禄寺丞吳辛子損為郊社齋郎以辛通判太平州出視廣濟圩溺水死故也乙巳諸縣有保甲處已罷户長壯丁其并耆長罷之以罷耆壯錢募承帖人每一都保二人𨽻保正主承受本保文字鄉村毎主戸十至三十輪保丁一充甲頭主催租稅常平免役錢一税一替保内被盗五十日不獲均備賞錢竊盗毋過二千彊盗毋過五千貧戸免輸如保内自獲以役錢代給凡盗賊鬭毆煙火橋道等事責都副保正大保長管勾都副保正視舊耆長大保長視舊壯丁法未有保甲處編排畢凖此二十三日上問此七年十月辛巳當考司農言保戸均出賞錢事上謂王安石曰既出錢免役又出賞錢如何安石曰賞錢自來不因役出兼每戸出錢一火强盗不過六十竊盗不過三十貧乏又免無所苦也比舊人情必悦上曰利害加天下極宜審之安石曰固應如此他日上又欲以役錢代賞且言二百五十家同任責非是當令二十五家均出寜厚無傷亦所以懲之安石請如聖㫖施行然不可厚也此據日録乃六月十二日事今并書知黔州内殿崇班張克明言領思費夷播四州又新籍蠻人部族不少語言不通習俗各異若一槩以敕律治之恐必致驚擾乞别為法下詳定一司敕所請黔南獠與漢人相犯論如常法同類相犯殺人者罰錢自五十千傷人折二支已下罰自二十千至六千竊盗視所盗數罰兩倍彊盗視所盗數罰兩倍其罰錢聽以畜産噐甲等物計價凖當從之中書言戸房比較陜西鹽鈔利害及定條約八事買鈔本錢有限出鈔過多買不盡則鈔價减賤及髙擡糴價支出實鹽前日西鹽是也故出鈔不可不立限一也出鈔雖有限入中商人或欲變轉而官不為買即為兼并所抑則鈔價亦不免賤兼邊境緩急即鈔亦有不得已須至多出故不可不置場平買二也和糴軍糧出於本路買鈔錢本出於朝廷所買鈔若賣盡即無所費若賣不盡毀抹雖已轉之邉上乃是朝廷分外資助本路經費其已毀鈔當於應副本路錢物内折除三也舊鈔因官失買致價賤已為商人中糧虧官即不妨市易司用市價買四也若止令市易司减價買而不置場以實價平之即一鈔為鹽一席所入糧少直其半即是暗損鹽價若官减價買盡固無所害縁官立買直商旅輒増之自難買盡近日買鈔是也官買其一私買其九則是所折鹽價商旅十取其九而官纔收其一也故不可以低價買鈔之故輒廢實價買鈔之法五也買鈔場既以實價買盡即他州軍緩急有减價賣所减亦不多前日東南鹽是也市易司雖買以市直所贏不多徒長虗􅎑之弊故新鈔不須買六也舊鈔額酌中歲出百六十六萬緡今雖計一歲賣鹽二百二十萬緡熈河自有鹽井用解鹽絶少鹽禁雖嚴必不能頓増五六十萬緡恐所在積鹽數多未可便為民間用鹽實數昨雖立定三百萬額縁分定逐路及各有封樁數止為熈河費用未定兼今又有交子即於實賣鹽數外不須過立數若所在渴鹽自可令市易司買鈔場依商人例以鈔請鹽自賣縱不如此商人亦必於官場買鈔即所在不至闕鹽為私鹽所侵七也西鈔失買致有虗擡之弊近官以賤價買民亦以賤價買今永興買鈔場若一槩收買乃是費用實錢買民賤價蓄買之鈔所買新鈔却致闕錢當令截曰收買兩路實賣鹽二百二十萬又増熈河一路若止與百八十萬鈔即自支費不足若兼支舊鈔即與出鈔何異然以加􅎑脚費不如止以當用鈔數立額却置場賣鈔飛錢為便八也今請永興秦鳯兩路共立二百二十萬緡為額永興路八十一萬五千緡秦鳯路一百三十八萬五千緡内熈河路五十三萬七千緡選官監永興軍買鈔場歲支轉運司折二銅錢十萬緡買西鹽鈔錢有餘封樁聽㫖依在京市易務賒請法募人賒鈔變易即民間鈔數稍多所買鈔難變易大書不用字送解池對元納遞牒毀抹於在京當應副逐路錢物數折除自今年五月十五日後鈔本場買十四日以前鈔聽市易司以市價買從之凡通商州軍在京西者為南鹽在陜西者為西鹽若禁地則為東鹽其詳具天聖八年十月食貨志八年中書奏户房較陜西鹽鈔利害及立法八事曰買鈔錢有限出鈔過多買不盡則鈔賤而糴貴故出鈔當有限一也雖限出鈔商人欲易錢而官不為買乃為兼并所抑則鈔價賤而邊境有急鈔未免多出故當置場平買二也和糴軍糧出於夲路買鈔錢出於朝廷鈔賣不盡則毀之而錢數轉之並邊當勿計於夲路常費三也舊鈔因失買而賤商人己私其利市易司當以市價買之四也市易司减價買而官場不以實價平之即一鈔為鹽一席所入糧當其半則隂摧鹽價今官减價以買商旅輒増之買不得盡則官買其一私買其九故實價買鈔不可廢五也既以實價買盡則他郡雖緩急自不得多減市易司雖買以市直而利薄徒長虚估之弊可毋買新鈔六也舊鈔額酌中歲出百六十六萬緡今雖歲増額為二百二十萬緡而熈河有鹽井不賴觧鹽安能頓補新額恐民間徒多積鹽安能實用此數請實賣鹽數外可毋過立數若須鹽者當令市易司以鈔請鹽賣之而商人亦且買鈔於有司私鹽未能間其乏七也近官以賤價買鈔民價亦賤今永興買鈔場若槩買之則是費實錢而買民賤蓄之鈔而市新鈔之直反有闕焉既増熈河之用則百八十萬不給當定買兩路實賣鹽二百二十萬以當用鈔數立額置場買鈔飛錢為便八也今請永興秦鳯兩路共立一百二十萬緡為額永興路八十一萬五千秦鳯路一百三十八萬五千内熈河路五十三萬七千永興軍遣官買鈔嵗支轉運司錢十萬緡買西鹽鈔又用市易務賒請法募人賒鈔變易或民間鈔多而滯則送解池毀之詔從其請正史刪修實録或只用正史龍圖閣直學士給事中李師中卒王安石言師中悉心奉公畏法勤事雖見識不髙然近臣如此者至少謂宜賻之加等上以為然此㨿十七日録不知如何賻師中也上論唐太宗能受人犯顔諫爭王安石曰陛下亦能受人臣犯顔諫爭此臣所以敢言不然則臣豈敢忘明哲保身之義唐太宗行義至不修陛下修身乃與堯舜無異然陛下不能使羣臣皆忠直敢言者分曲直判功罪不如唐太宗故也如程昉盡力於河北與萬三十貫修橋乃用此錢修橋了更修廨宇營房即日掠房錢八百文又置木植三萬七千貫所開閉河四處除漳河黄河外尚有溉淤及退出田四萬餘頃自秦以來水利之功未有及此以法論之十頃合轉一官即昉雖轉四十餘官可也乃并數處功與轉一官又令與韓宗師同放罪只此一事淤却田四十頃出却田二萬餘頃却以無罪令與韓宗師同放罪陛下放宗師罪已是屈法更抑程昉此是何政事臣恐非但今日天下非之書之簡䇿臣恐後世有以議聖徳呂惠卿曰當時早是與程昉轉得一官只為盛陶强彈奏不已安石曰程昉有如此合轉四十餘官只得一官更枉令放罪盛陶前後欺罔非一迹狀分明乃令與堂除差遣不知聖心思此事以為允當否陛下常以為欺罔事難得分明分明即可行法如陶前後欺罔竊料聖鑑洞照萬物之情必亦不以盛陶欺罔為不分明上笑曰䑓官只有罪絀無賞近日都無人可作安石曰正論則懼見猜嫌邪說又中書須爭曲直陛下亦未必從此所以難也不知唐太宗時人亦怕作言事官否閏四月八日盛陶乞出可考韓宗師論程昉在七年正月末丙午詔自今知諫院令綴兩省班時同知諫院范百禄綴兩省班御史䑓止之百禄上言謀其政必在其位今之修起居注行起居舍人起居即之事直舍人院行中書舍人之事同知諫院行司諫正言之事夲朝兩省官不必正員茍行其事必立其班所以明分職而勵官守也今修起居注直舍人院則綴於兩省同知諫院則絀而不與望詔有司裁為定式故有是詔丁未詔先帝潜邸漸營一寺歲給度牒三百為土木之費候七年取㫖罷給賜大理寺丞歐陽發進士出身發修之子以三司使章惇薦其有史學乞特加奨擢寘之文館故有是命上因問修所為五代史如何王安石曰臣方讀數冊其文辭多不合義理上曰責以義則修止於如此每巻後論説皆稱嗚呼是事事皆可嗟嘆也新夲自上因問修以下並削去詔罷太原等監依罷河南河北監牧指揮應河東監牧令提舉開封府界諸縣鎮公事蔡確河北監牧令都大提舉黄御河同管勾外都水監丞程昉專切了當四日差確同昉廢罷七年二月四日廢東平監今年九月二十五日當并考知河州集賢校理鮮于師中言州界有可興水利處至多乞轉委權鈐轄引進副使李浩審度興修從之戊申詔京西路募教閲忠果十指揮各以五百人為額唐鄧州各三指揮又詔武臣已有試換文資法自今不許臣僚舉換中書上解鹽通商地分縣鎮寨城條約詔頒之詔五路縁邉通判委中書不拘資序選差己酉大理寺丞張景温提舉出賣解鹽請給行移視諸路提舉常平官五月十一日相度占地淤田司馬光記聞舊制河南河北曹濮以西秦鳯以東皆食解鹽益梓利䕫四路皆食井鹽河東食土鹽自餘皆食海鹽自仁宗時解鹽通商官不復𣙜熈寜中市易司始𣙜開封曹濮等州及利益二路官自運解鹽賣之其利益井鹽候官無解鹽即聽自賣九年有殿中丞張景温建議請𣙜河中陜解同華五州官自賣鹽増重其價民不肯買乃課民日買官鹽随其貧富作業為多少之差有賣私鹽聽人告訐重給賞錢以犯人家財充買官鹽食之不盡留經宿重同私鹽法於是民間騷怨鹽鈔舊法每蓆六緡至是二緡有餘商不入粟邊儲失備朝廷疑之乃詔陜西東路轉運使皮公弼入議其事公弼極陳其不便有㫖令與三司議之三司使沈括以曏附介甫意言景温法可行今不可改不敢盡言其非雖不能奪公弼而更為别劄稱㨿景温申官賣鹽歲獲二十餘萬緡今通商則失此利再取㫖上復令公弼議之公弼條陳實無利於是罷開封河中等州益利等路賣鹽獨曹濮等數州行景温法益利賣解鹽七年八月二十一日沈括對語云云可考按司馬記聞考按有不合處張景温以八年四月提舉賣鹽非九年也官賣鹽㨿九年二月十七日并四月二十八日申請不但河中陜解同華五州也沈括以八年十月為三司使十年七月罷王安石以八年二月癸未復相九年十月丙午罷自九年十月至八年二月並不見罷開封諸縣及河中等處賣鹽九年二月二十八日中書但請将唐鄧等二十處通商其河中陜同華等州府界諸縣仍官賣鹽至十年三月十六日乃許府界十一縣河中陜同華界河陽六州府通商時安石已罷相實録會要亦不載縁皮公弼建議也更須詳䆒之若益利解鹽不許通商則始於劉佐事在九年四月周尹乞罷官運解鹽通兩路鹽禁在九年十一月御史陳睦言方盛夏時願嚴敕諸道監司分行郡邑察寃獄决繫囚吏不足使治獄與輒苛禁亡罪侵害善良即按劾之詔武臣遥郡刺史以上嘗歴五路路分鈐轄不因體量并有戰功曽經轉資歴路分都監以上差遣不以官資聽陳乞外宫觀是日韓琦奏倚閣預買紬絹賒買借貸斛斗倚閣稅今雖或七分熟須五七年拖帯送納王安石謂韓絳此不可行絳曰民納不得須着寛恤及進呈安石曰近嵗以來方鎮監司爭以寛恤百姓為事以希向朝廷指倉庫不足則連乞朝廷應副如預買紬絹自祖宗以來未嘗倚閣去年李稷乃乞行倚閣朝廷因亦從之若言災傷即祖宗以來豈是都不曽值災傷又賒賣銀絹本因配買傷民遂令供抵當情願賒買韓琦執政十餘年固嘗值災傷不知曽倚閣預買否不知曽配賣銀絹否向時配賣一戸或陪錢數百貫無災傷倚閣指揮今來取人情願賒買不知如何却須要五七年拖帯送納上欲下監司體量相度安石曰近歲監司惟以媚民為事却不斟酌有無河北西路監司乃李稷吳審禮韓宗道李稷固已擅倚閣預買吳審禮韓宗道亦必不肯違俗但恐其過為寛貸以媚民今方鎮意必不肯以用度不足故急民也且寛恤百姓固是美名好事人臣優為之然如近歲上下大小爭以此為事無復屯其膏者恐國用不繼緩急却不免刻剥百姓爾如去年體量放税所失至多但長僥倖何名寛恤昔蘇秦説齊厚塟以明孝髙宫室以明得意用破敝齊今方鎮用心有如此者陛下豈宜不察上曰韓琦用心可知天時薦饑乃其所願也前訪以此事乃云須改盡前所為契丹自然無事安石曰琦再經大變於朝廷可謂有功陛下以禮遇之可也若與之計國事此所謂啟寵納侮上曰初亦不意琦用心如此琦嘗對使人云先帝臣所立陛下先帝兒子做得好臣便面闊做得不好臣亦負慚愧因稱郭子儀事代宗以為忠順此叚㨿王安石日録論韓琦處當是託訓如陳瓘所言也今具載之更竢考詳四月十七日安石已論放税專斥馮京可參照庚戌檢正中書五房公事寶文閣待制河東路察訪使李承之知瀛州承之辭不行尋命為同羣牧使判兵部紏察在京刑獄承之改命乃五月一日今并書之十二月二十四日仍知延州十年二月二十八日復自延州為都檢正蔡承禧云云可考詔諸路近河北州縣令民輸税扵河北以足定州軍儲其借過税數令市易司於夲路糴還初市易司言被㫖糴定州軍儲數多榖價以故増長乞移大明澶州輔郡夏秋苗税徃彼以便搬輦既下開封府京東西路問地理逺近未報而上批三月中市易司奏乞移大名澶州輔郡夏秋苖稅與夲司見糴榖兊換徃逐處封樁以便搬輦及免併買價髙之患至今並不與指揮可檢元劄子進呈於是中書計移近河北州縣稅數可得十萬餘石遂從其請九月十二日吕惠卿謂吕嘉問不能辦此可參考上批詔定州路自春末至今闕雨夏秋榖麥無望其令知定州薛向躬禱北嶽壬子召輔臣觀麥于後苑修廢營六為馬軍教場𨽻殿前馬軍司詔聞永興等路亢旱其令轉運司訪名山靈祠委長吏精禱知岷州張守約請於古城西五里築岷州城詔聽㫖興工尋下髙遵裕相度遵裕請於舊城西白草平建築城圍二千歩從之賜右羽林軍大将軍秀州團練使世居死翰林祗候劉育陵遲處死試将作監主簿張靖腰斬司天監學生秦彪百姓李士寜杖脊並湖南編管大理評事王鞏追兩官勒停知瀛州祠部員外即天章閣待制劉瑾落職知明州前翰林侍讀學士禮部侍郎滕甫落職候服闋與知州世居子孫貸死除名落屬籍𨽻開封府官舍監鏁給衣食妻女子婦孫女並度為禁寺尼兄弟並追兩官勒停伯叔兄弟之子追一官停參劉育妻子分配廣南為軍員奴婢張靖父母妻决杖廣南編管大宗正司宗旦等劾罪以聞世居并子令少令嚳名去世字令字孫五歲以上聽所生母若乳母監鏁處鞠飬及五歲以上取㫖差御史䑓推直官監世居至普安院縊殺之中使馮宗道視瘞埋世居育靖並坐與李逢等結謀不軌彪以星辰行度圖與世居士寜收鈒龍刀及與世居飲甫瑾與世居書簡徃還鞏見徐革言渉不順而不告皆特斷也徐革五月十七日乃斷先是范百禄言徐禧論滕甫事過當上謂王安石滕甫不合移鄧州甫元無罪因禧有言故移安石曰甫移鄧州臣尚未至不與此議然甫姦慝小人陛下若廢棄之於田里乃是陟降上合帝心今令安撫一路而妻弟謀反於部中豈得無不覺察罪且因妻弟反獄在其部移與别路安撫有何所苦於公議有何不允上曰若明其平生罪状廢放可也不當因此事害之安石曰移鄧州安撫害甫何事上又言有言逆於汝心必求諸道有言遜於汝志必求諸非道安石曰此固然但恐以非道為道以道為非道即錯處置事矣翼日王珪吕惠卿進呈滕甫乃徐禧未言以前上令移之上又言劉瑾與世居徃還書簡比甫更多有不容居内之語安石曰不容居内是何意不知謂陛下不能容或謂執政不能容或謂簡汰不容皆不可知亦未可深罪瑾也上曰然要不可令作帥聞說瑾甚懼朝廷放棄安石曰宗室如此事近世未有瑾自宜恐懼呂惠卿又言王鞏與韓絳親戚取下状三日不奏王珪㸃檢方奏元状甚疑於知情後勘得乃無罪若使鞏與臣及王安石親戚三日取下状不奏因王珪㸃檢方奏即大渉嫌疑也上曰鞏情不佳安石曰鞏情亦無甚可惡上曰鞏見徐革言世居似太祖反勸令焚毀文書安石曰杜甫贈漢中王瑀詩云虬鬚似太宗與此何異令燒毀文書文書若燒毀即於法無罪既與之交游勸令避法禁亦有何罪罪止是不合入宫邸耳上問處置世居事安石曰世居當行法其妻及男女宜寛貸除屬籍可也今此一事既重責監司厚購告者恐開後人誣告干賞官司避罪将有横被禍者願陛下自此深加省察方今風俗不憚枉殺人命陷人家族以自營者甚衆上曰事誠不可偏重也及是斷獄如安石議士寜初議免真决韓絳力爭之遂依法韓絳力爭㨿二十一日日録嘉王頵以嘗奏劉育本府醫藥祗應待罪詔答曰執伎賤工取其方術非縁觀行之舉曷累知人之明奚煩抗章至自分咎可趨奉朝請如故癸丑太子中允直集賢院檢正中書戸房公事張諤兼直舍人院檢正中書五房公事初議用諤代李承之韓絳以為不可曰諤與承之不足遂沮其以田募役事王安石曰以田募役不便臣自江寜以書與呂惠卿言之不敢深言利害者以在外不欲極論朝政得失故也不任事者既以形迹不敢極言在職者又以爭之為罪即天下事何以得正理絳欲用沈括安石曰沈括亦自與李承之有隙如何可用上曰盍用呂嘉問絳曰嘉問亦資淺安石曰嘉問固無不可然張諤豈可以與李承之不足遂廢不用陛下向欲以田募役臣再論奏以為不便亦嘗與檢正思量恐更有理臣見得不盡承之所知也承之建議以希合聖意不顧利害之實張諤亦知聖㫖欲如此而力爭此正陛下所宜奨用上曰此非李承之獨言曽孝寛深以為善惠卿曰臣初亦以為善及行之乃見其不便而承之兩月連行遣下州縣催促施行又令分析因何住滯兩月内方行遣尚未到便令分析住滯臣乃疑其有意絳又言諤與承之有隙承之必以為諤傾擠上亦以為論事或出於好已勝未必皆忠安石曰若㨿理言事乃疑其好勝即須違理以從衆不知於陛下何利文王陟降庭止恐陟降如此非所謂直上乃令用諤安石又請除諤直舍人院上令且檢例惠卿又言馮京尤惡諤安石曰聞京惡諤以其正曽布罪故也絳又言諤無異人且非端士安石曰與李承之爭募役事又正曽布罪二事皆違衆從理即不見諤非端士翼日絳又言諤既資淺又無勞効陛下嘗言用曽布驟故終反覆安石曰用曽布驟恐非朝廷之失方以人望人誠無以易之又不見其罪如何不使及其作姦自當辨曲直行法而已自來任用何可追咎假令布實有勞能而未有罪臣等豈可奏論以為布恐将來為邪不可進用陛下亦豈有以無状之罪聽臣等而廢布惟當案見勞而賞案見惡而誅耳如張諤異時有顯罪臣與絳等自當奏治如今無罪即不可廢斥絳又言向宗儒等資深於諤安石曰修式獨諤了却陛下亦必知其吏文精宻其臨職事又肯爭議不避執政此所以宜進用在衆人先也絳言都檢正但不奏事與執政無異惠卿言李承之對臣等極不樂作帥以此也兼以臣自都檢正執政故人以檢正為要路上曰拔擢自繫朝廷如王雱自説書作待制朕自待雱别他人説書豈可便要作待制大理寺言洪州斷百姓周汝熊應坐徒而决杖汝熊餘罪㑹恩免官吏失出徒罪當劾中書堂後官劉衮駮議以謂律因罪人以致罪罪人遇恩者凖罪人原法議曰因罪人致罪謂保證不實之類洪州官吏因推罪人以致失出之罪自合從原縁法寺斷例官司出入人罪不用因罪人以致罪之法乞自今官司失出許用此法審刑院大理寺以謂失入人罪即是官司誤致罪於人難用因罪人致罪之法其失出人罪宜如衮議從之詔縁邊主兵武臣遭父母䘮法不許解官而䘮須歸塟者聽差廂軍送至塟所視迎送數減半毋過百人河北西路提舉常平倉司請於乞丐及流民中視疲羸老幼疾病廪給盡六月從之甲寅命中書檢正中書五房公事張諤檢正禮房公事向宗儒編修内諸司式入内供奉官馮宗道管勾商量先是上與王安石言修式之便且言合修處尚多又謂能吏文者極少安石曰陛下天縱於吏文自精審羣臣固難以仰望清光臣亦毎懼不能上副上曰吏文有條序皆由卿造始安石言欲修内諸司式宜使中人上曰中人少知吏文者安石曰令中人與外官同修可也故有是命録韓王趙普四代孫希魯為右班殿直以普之後不及䕃補特録之上批罷耆戸長壮丁條例係何人修定契勘進呈王安石以為此殆李承之譛張諤故有此問然上意亦素疑其未便及進呈上曰已令出錢免役又却令保丁催稅失信於百姓又保正只合令習兵不可令貳事安石曰保丁戸長皆出於百姓為之今罷差戸長充保丁催稅無向時勾追牙集科校之苦而數年或十年以來方一次催稅催稅不過二十餘家於人無所苦若謂保丁只可令教閲即周官什伍其民有軍旅有田役至於五溝五塗封植民皆有職焉若止令習兵不可貳事即不知餘事令誰勾當上曰周公之法因積至成王之時非一代之力今豈可遽如此安石曰先王作法為趨省便為趨煩擾若趨省便則至周公時極為省便然尚不能獨令習兵而無貳事則今日欲止習兵無貳事恐不可得乃詔司農寺條例司具應言廢罷耆戸長壮丁利害編冩成册納禁中罷耆户長壮丁在十四日編冩進入乃二十四日指揮後不知如何行遣此㨿御集又詔京西兩路轉運司剗刷財賦羡餘乘時糴榖之可蓄者封樁又詔聞真定府界旱甚其令孫固親禱名山靈祠乙卯分遣輔臣禱雨詔西南蕃五姓蠻聽五年一入貢不願至京聽就邕宜州輸貢物給恩賞館劵回賜錢物等遣之時廣南西路經略司言西南蕃龍羅方石張姓五族蕃部或四年或五年七年一入貢五蕃共遣九百六十人張蕃七十人出邕州路龍羅方石等蕃八百九十人出宜州路所貢惟氊馬朱砂徃來館劵供給并到闕見辭賜錢絹衫帶為錢二萬四千餘緡而他費不在此體訪五蕃徃來萬里頗憚艱苦若令止邕宜州賜以錢物可免公私勞擾且便逺人故有是詔又詔知定州薛向具民兵可用出戰人數以聞丁巳岐王顥嘉王頵言䝉遣中使賜臣等方團玉帯各一條凖閤門告報已著為朝儀臣等乞寶藏於家不敢服用不許上命工琢玉帶以賜顥等固辭不聽請加佩金魚以别嫌詔以玉魚賜之上嘗與二王擊毬戲賭玉帯頵曰臣若勝不用玉帶只乞罷青苖市易上不悦鮮于綽載王汾所言熈寜中神宗一日在内禁與二王擊毬戲賭玉帯荆王曰臣若勝不用玉帯只乞罷青苗市易神宗色稍不悦詔昨南郊赦書天下祠廟祈禱有應者當議加禮命諸路已奏到而至今尚未封崇令禮院速詳定以聞其後三十餘所並増爵秩五月末三廟六月二十九日三十廟並加禮命今并書之權檢正中書尸房公事呂嘉問言近制檢正官至員外郎許奏薦縁檢正官止是差遣見行條例無不計資序奏薦者乞於奏薦條刪去檢正官詔檢正官轉員外郎通判以上資序者許奏薦五月十八日韓絳乞罷相與此合相參戊午軍器監請選差内外禁軍廂軍或諸司役兵造軍器上批外處禁軍舊不抽赴京造作遂詔開封府界及諸路禁軍不差餘從之杭州言鹽官縣自三月至是月地産物如珠可造飯水産菜如菌可為葅饑民賴以充食置河南府河清縣錢監廢秦州定邊綏逺二寨為鎮𨽻隴州
