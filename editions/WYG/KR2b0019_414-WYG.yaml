body:
  text: 續資治通鑑長編巻四百十宋李燾撰哲宗元祐三年五月丙午朔翰林學士兼侍讀蘇軾户部侍郎蘇轍同轉對軾言三事其一謹按唐太宗著司門令式云其有無門籍人有急奏者皆令監門司引奏不許關礙臣以此知明主務廣視聽深防蔽塞雖無門籍人猶得非時引見祖宗之制自兩省兩制近臣六曹寺監長貳有所欲言及典大藩鎮奉使一路出入辭見皆得奏事殿上其餘小臣布衣亦時特賜召問非獨以通下情知外事亦以考察羣臣能否情偽非茍而已臣伏見陛下嗣位以來惟執政日得上殿外其餘獨許臺諫官及開封知府上殿不過十餘人天下之廣事物之變决非十餘人者所能盡若此十餘人者不幸而非其人民之利病不以實告則陛下便謂天下太平無事可言豈不殆哉其餘臣僚雖許上書言事而書入禁中如在天上不加反復詰問何以盡利害之實而况天下事有不可以書載者心之精微口不能盡而况書乎恭惟太皇太后以至徳在位毎加抑損以謙遜不居為美雖然明目逹聰以防壅塞此乃社稷大計豈可以謙遜之故而遂不與羣臣接哉方今天下多事饑饉盗賊邉塞之變民勞官冗将驕卒惰財用匱乏之弊不可勝數而政出帷箔决之廟堂大臣尤宜開兼聽廣覽之路而避専斷壅塞之嫌非細故也伏望聖慈更與大臣商議除臺諌開封知府已許上殿外其餘臣僚舊制許請問奏事出入辭見許上殿者皆復祖宗故事則天下幸甚其二凡為天下國家當愛惜名器慎重刑罰若愛惜名器則斗升之祿足以鼓舞豪傑慎重刑罰則笞杖之法足以震讋頑狡若不愛惜慎重則雖日拜卿相而人不勸動行誅戮而人不懼此安危之機人主之操術也自祖宗以來用刑至謹習以成風故雖展年磨勘差替衝替之類皆足以懲警在位獨於名器爵祿則出之太易毎一次科塲放進士諸科及特奏名約八九百人一次郊禮奏補子弟約二三百人而軍職轉補雜色入流皇族外戚之薦不與自近世以來取人之多得官之易未有如本朝者也今吏部一官闕率常五七人守之爭奪紛紜亷恥道盡中材小官闕逺食貧到官之後侵漁求取靡所不為自本朝以來官冗之弊未有如今日者也伏見祖宗舊制過省舉人御試黜落不少既以慎重取人又以見名器威福専在人主至嘉祐末年始盡賜出身雖文理紕謬亦玷科舉而近嵗流弊之極至於雜犯亦免黜落皆非祖宗本意又進士升甲本為南省第一人唱名近下方有特㫖皆是臨時出於聖斷今來南省第十人以上别試第一人國子開封解元武舉第一人經明行修舉人與凡該特奏名人正及第者皆著令升一甲紛然並進人不復以升甲為榮而法在有司恩不歸於人主甚無謂也特奏名人除近上十餘人文詞稍可觀其餘皆詞學無取年廹桑榆進無所望退無所歸使之臨政其害民必矣欲望聖慈特詔大臣詳議今後進士諸科御試過落之法及特奏名出官格式務在精覈以藝取人不行小恵以收虚譽其著令升甲指揮乞今後更不施行昔諸葛亮與法正論治道其畧曰刑政不肅君臣之道漸以陵替寵之以位位極則賤施之以恩恩竭則慢吾今威之以法法行則知恩限之以爵爵加則知榮恩榮並濟上下有節為治之要也唐徳宗䝉塵山南當時事勢可謂危急少行姑息亦理之常而沿路進𤓰果人欲與一試官陸贄力言以為不可今天下宴然朝廷清明何所畏避而行姑息之政故臣願陛下常以諸葛亮陸贄之言為法則天下幸甚其三臣於前年十月内曽上言其畧曰議者欲减任子以救官冗之弊此事行之則人情不悦不行則積弊不去要當求其分義務適厥中使國有去弊之實人無失職之歎欲乞應奏廕文官人毎遇科塲隨進士考試武官即隨武舉或試法人考試並三人中解一人仍年及二十五以上方得出官内以曽舉進士得解者免試如三試不中及三十五以上亦許出官雖有三試留滯之艱而無終身絶望之歎亦使人人務學不墜其家為益不小後來不䝉降出施行竊慮當時聖意必謂改元之初不欲首行約損之政今者即位已四年矣官冗之病有増而無損財用之乏有損而無増數年之後當有不勝其弊者若朝廷恬不為怪當使誰任其憂及今講求臣恐其已晚矣伏乞檢㑹前奏早賜施行轍言三事其一臣伏見本部一月出入見錢之數率皆五十餘萬貫罄竭所得僅給經費而已稍加他用輙干求朝廷方能辦事有司惴惴常有闕事之懼臣聞古之為國皆食租衣稅而足降及近世始有鹽鐵酒稅之利凡郊廟朝廷禄士養兵捍邊睦隣百色取具於此蓋天之所生地之所産足以養人自三代漢唐至於祖宗之盛未有舎此而外求者也今四海萬里耕稼相屬而以不足為憂臣實怪之孟子有言無政事則財用不足臣愚無知意者朝廷之政豈有所未立故耶臣觀諸道監司自近嵗以來觀望上下無復勵精之實妄意朝廷以不親細務為髙以不察姦吏為賢於是廵歴所至或不入塲務不按有罪郡縣靡然承風懦者頽弛權歸於吏貪者縱恣毒加於民四方嗷嗷㡬於無告其他害理而傷化者非臣之職臣不敢議也若夫兩稅征商𣙜酤無故虧欠者比比皆是此臣之職也欲乞陛下特降指揮令本部左曹具諸路去嵗征税増虧之數其非因水旱災傷特以寛弛不職而致虧欠者擇其最甚黜免轉運使副判官罰一以勸百上意所向下之所趨也如此施行庶㡬財賦漸可治矣其二臣聞漢以九卿治事唐以六曹為政漢非無尚書而唐非無卿寺也蓋事不在耳先帝法唐之政専用六曹故雖兼置寺監而職業無㡬量事設官其間蓋有僅存者矣頃元祐之初患尚書省官多事少始議并省郎曹所損纔一二耳而寺監之官如鴻臚将作舊不設卿丞者紛紛列置更多於舊中外之議以此疑惑以為朝廷為人設官非為官擇人此言一出為損非細其於治體非臣所當議也而至於京師廩給之厚出於本部故臣願明詔有司减去寺監不急之官以寛不貲之費而已其三臣聞財賦之源出於四方而委於中都故善為國者藏之於民其次藏之州郡州郡有餘則轉運司常足轉運司既足則户部不困唐制天下賦稅其一上供其一送使其一留州比之於今上供之數可謂少矣然毎有緩急王命一出舟車相銜大軍以濟祖宗以來法制雖異而諸道蓄藏之計猶極豐厚是以斂散及時縱舍由已利柄所在所為必成自熈寜以來言利之臣不知本末之術欲求富國而先困轉運司轉運司既困則上供不繼而户部亦憊矣兩司皆困故内帑别藏雖積如邱山而委為朽壤無益於筭故臣願陛下舉近嵗朝廷無名封樁之物歸之轉運司蓋禁軍闕額與差出衣糧清汴水脚與外江綱船之類一經擘畫例皆封樁夫闕額禁軍尋當以例物招置而出軍之費罷此給彼初無封樁之理至於清汴水脚雖損於舊而洛口費用實倍於前外江綱船雖不行打造而雇船運糧其費特甚重復刻剝何以能堪故臣謂諸如此比當一切罷去况祖宗故事未嘗有此但有司固執近事不肯除去惟陛下斷而行之則轉運司利柄稍復而上供有期户部亦有制矣丁未朝奉大夫大理少卿莫君陳知舒州君陳以疾自請也朝請郎知舒州黄履復天章閣待制知洪州履坐舉劉次荘再奪職至是期滿有司以聞故有是命三省言大理寺右治獄並罷請依三司舊例於户部置推勘檢法官治在京應干錢穀公事從之舊錄云元豐中董正治官省曹治文書行天下寺監治事止京師户部非治獄之官故釐為大理寺復古制也至是罷新錄辨曰户部治錢穀公事自是祖宗舊例在當時最便與元豐復古制設省寺監不相干渉自元豐中至是罷四十二字刪去詔陜西河東路經畧司如承他路報夏賊入㓂即審詳賊勢出兵牽制令賊顧慮不敢久留仍逺斥堠如無伏兵及有可乗之利方得進討務取萬全朝奉大夫倉部郎中王宗望為河東路轉運副使承議郎權河東轉運副使唐義問知荆南考功員外郎歐陽棐為著作郎實錄院檢討右正言劉安世言臣近聞大臣嘗薦棐謂有史才朝廷過聽遂用為著作郎中外喧傳皆謂大臣不當輕進姦慝誤陛下知人之明累公朝責實之政臣忝在言路義當論列不避委曲上煩聖聽按棐憑藉閥閲素無聲聞才既闇陋性復回邪造請權門不憚寒暑與程頤畢仲游孫朴楊國寳輩交結執政子弟參預密論號為死黨縉紳之所共疾清論之所不齒豈可更叨誤恩列職太史昔劉知㡬之論以才學識為史官之三長今棐諂佞淺薄背公成朋雖有口耳之學亦何足取臣竊謂朝廷不至乏才如此之甚伏望聖慈因其辭免追還新命非惟少抑奔競之風庶亦漸消朋黨之弊貼黄稱勘㑹著作郎之任典領國史清切嚴重非他官之比自來由此遂為兩制豈容小人輙爾冒處伏望别加遴選從之棐據政目初二日事十二日改集校己酉承議郎權開封府推官公事邵䶵為都官郎中朝散郎吏部郎中彭次雲為成都府路轉運使宣徳郎權成都府路轉運判官楊國寳為陜西轉運判官後二日次雲國寳皆罷罷在初六日今并書次雲國寳必有故當考國寳吕公著甥次雲六月二十六日以吏中為淮南漕御史中丞胡宗愈言竊惟朝廷外置諸路監司以為耳目之官提振綱紀天下官吏有貪墨而不亷者有違越而無操者有殘毒而害民者有偷惰而弛職者一切使之檢察其實以聞朝廷所賴以廣聰明於天下而行廢黜向來所擢監司多輕鋭殘酷之徒惟以矯激為務擊搏為能刻覈太深以希進擢而不恤朝廷為治大體以至攟拾微細以資苛察恣情尚氣凌辱衣冠朝廷畧行懲革以戒過當如江南西路提舉官曽孝亷之類是也訪聞近日天下貪濫殘酷偷惰之徒惟務此以藉口抗忽監司以為朝廷方行寛厚之政監司不敢按舉所在恣為不法不職為監司者有内無所守之人反務觀望不體朝廷用中之意坐視部下官吏貪惏違越肆為不法茍簡偷惰隳廢職業並不戒勵督察一向縱弛却致養成官吏過惡陷入深文以至事務不舉綱紀頽壞此風寖長深害治體書曰寛而有制不云姑息容姦欲望朝廷特降指揮明賜戒勅天下州縣官吏仍指揮諸監司常務平允覺察不得縱弛容長貪濫殘酷偷惰之輩傷民弛職庶㡬官吏人人勉勵不惟修舉職業不致廢務兼亦上下醇厚有助風化詔劄與諸路及府界監司仍令御史臺覺察并檢元祐二年十一月十二日孫覺所奏劄與御史臺并府界諸路監司孫覺二年十一月十二日奏實錄不載已於編錄冊内檢尋増入實錄載覺及宗愈奏亦甚畧今依編錄冊内所載増入四月六日宗愈已自中丞遷右丞五月二日行出此章蓋宗愈此章久已進入今乃行出耳監察御史趙挺之言御史所言多係省曹之失却降本部自屬妨礙請以臺官所言事付三省看詳若合立法及衝改舊法即乞下本部取㑹如可行從朝廷指揮從之户部言荆湖南北路鹽價相度自接連廣東及江南湖北州軍塲務以逺近均定庶貴賤不至相逺可絶私販從之四年正月己亥可考詔府界諸路舊納免役錢百貫以上户依單丁等户法輸納助役錢三省樞密院以軍國事目當關吕公著者定為令凡與三省同施行者一曰應差除并責降叙復二曰應三省并三省樞密院取㫖三曰邊防體大公案并體量取勘事四曰支移錢數多五曰諸軍班特支六曰差官按察七曰館伴入國接伴送伴八曰朝㑹九曰國書十曰近上蕃國若李乾徳鄂特凌古等受官襲封十一曰廢置州縣十二曰特立捕盗賞格其與逐省同施行者一曰省曹寺監所上事二曰體量賑濟三曰應縁大禮事四曰應科塲事五曰非泛祠禱六曰應干陵廟事七曰諸蕃國進奉差押伴官并進奉回賜八曰修書九曰創立改更法令十曰應縁河防事十一曰鑄造錢寳十二曰典禮儀制十三曰捉殺十人已上賊其與樞密院同施行者一曰除授差移管軍三路副都總管至副總管三路沿邊知州帶安撫使管勾安撫司同麟府路管勾軍馬兩省都知押班樞密院都副承㫖内臣招宣使已上二曰諸路添减軍馬三曰更改大法令四曰議論未决疑難事務五曰諸班直指揮使已上轉員六曰差文臣措置邊事七曰文臣換大使臣八曰處置邊防九曰辨理疆界十曰戰陣賞罰十一曰諸路𦂳切事宜十二曰國信十三曰民兵十四曰馬政初以太師文彦博平章軍國重事其所預事目曰除前執政尚書節度使翰林學士御史中丞曰除邊帥開封成都知府曰大典禮曰赦宥曰要切邊事曰軍馬河防措置事及公著平章乃去重字前所未有也此據公著家傳修入按吕大防奏藳元作軍國重事却抺去重字不知何故其後亦縁此致人言當考詔軍國重事及非常程事并臨時合與三省同議取㫖並關預簽書辛亥給事中趙君錫言盧秉落龍圖閣直學士充寳文閣待制差遣依舊臣已封駁又令臣依前降指揮行下秉之罪狀盡奪舊職猶為輕典臣愚不識大體輙守前議不敢奉詔謹再封進詔依前降指揮盧秉展二年磨勘右正言劉安世言臣近嘗進論盧秉昨在兩浙専主鹽事殘民害物遺毒累年廼者朝廷體量得實謂宜重貶而止落學士猶以待制提舉宫觀竊恐無以戒戢姦暴慰塞民情乞依吳居厚例特行竄黜伏聞續有指揮令展二年磨勘罰不當罪士論未平是敢罔避再三塵凟天聽按秉𣙜賣鹽貨峻刑虐民無辜流死以數萬計老稚轉徙號呼盈路比屋憤怨思食其肉上賴累聖徳澤深厚是以人心卒無異志昔呉居厚之在京東掊克太甚斂怨於民陛下踐阼之初責授散官逺郡安置天下傳播莫不欣喜秉之刻剥無異居厚而猛暴殺人則又過之不伏重誅已為寛典尚叨侍從何以示懲臣伏觀祖宗以來尤以失入為重彼執法之吏不明微意誤使一人入於深文大則追停小則降免今秉奉使故設苛法多殺平民非特失入一人比也而朝廷責命太輕未厭公議非所以示陛下仁愛元元之意伏望檢㑹臣前奏重行竄貶以慰民望又言臣近為體量到盧秉向在兩浙専主鹽事設法苛虐流毒一方而朝廷責命太輕未厭公議臣已兩具論列未聞指揮施行竊縁盧秉奉將使指専為掊克使無辜之民流離轉徙寃號之聲盈於道路蓋有甚於呉居厚者且兩浙京東皆陛下之民而秉居厚酷暴之狀相若一則貶為散官逺郡安置一則尚列侍從提舉宫觀同罪異罰恐非至公之道伏望聖慈檢㑹臣前奏比附呉居厚例重行竄黜以慰逺民之望又言臣近為盧秉責命太輕未厭輿議臣已三具論列未䝉朝廷施行如秉苛虐酷烈之實逺民愁苦寃憤之情前奏言之已詳不復條列而臣尚有未盡之意更為陛下陳之臣聞人君之柄莫大於賞罰而所以行之者必主於公平傳曰功同賞異則勞臣疑罪均刑殊則百姓惑蓋不能處之以至公則天下不能無疑惑之心也今秉之罪状顯著非在輕重疑似之間考之近例又有呉居厚散官安置之比諌官御史交章彈劾而不正典刑以謝東南之民可乎臣之所論非茍欲奪秉寄祿官而已蓋秉之殘民害物甚於居厚而尚為待制提舉宫觀罪均刑殊臣恐無以解天下之惑也伏望陛下檢㑹臣累奏事理削秉侍從之職以慰人望賜鄜延路第三第六将及塞門寨守禦軍兵特支有差以西賊犯順牽制及守禦有勞也米贇贈四方館使榮州防禦使郝普吕惟正各贈五資仍令經畧司取索兒男以聞贇等死事四月二十四日供備庫使徐鄂差充廣南西路兵馬都監辭免逺官詔送吏部與合入差遣壬子詔自今凶惡羣賊他處入界或經由已出界雖不曽在部内作過亦依賊發條限以聞癸丑樞密院言去冬西賊累求納欵朝廷並依趙卨所奏許令應答然至今不絶犯邊近梁伊特邁再遣人稱欲服罪講和今又聚兵犯塞門觀其情意實欲得和但於未成之間冀幸掩襲或有所得今既不勝必申前請若止如累降指揮率爾受之賊必謂中國苦其侵㓂意在速和詔趙卨如夏人再來有言先令把邊人重疊詰問虛實俟其意堅徐引至順寜寨問所欲言然後諭以反覆因依遣之仍逐旋錄所説語言疾置以聞若牒送到謝罪表匣或空牒請和亦令将寨官語以未敢承受如半月以外即云經畧司令先見公牒有可憑信即收接當奏取朝㫖舊錄云時上未親政姑息夏人無所不至為其輕侮殺掠尚為空言欺罔簾帷新錄云謂安邊為姑息而以密院所奏為空言欺罔簾帷非也自若牒至簾帷七十八字刪去若牒送到至取朝㫖新錄亦刪去今復存之趙卨行狀當刪耳朝請大夫祕書少監李周為直龍圗閣陜西路轉運使朝奉郎祕書校理權判登聞鼔院韓治為祕書丞太常博士常安民為太常丞國子監丞龔厚為太常博士二年正月二十二日為監丞實錄院檢討官著作郎兼侍講范祖禹辭免起居舎人按本傳云遷起居郎及召試中書舎人皆不拜又並在八月二十二日論權罷進講之後從之除右史在四月十二日祖禹三上章辭免不許又以吕公著親嫌為解公著亦於簾前納除目太皇太后曰祖禹擢用不縁相公可諭令就職知舊多勸祖禹受命祖禹曰此心未肯復上章并具状申三省乞敷奏得請乃已是夏權住進講祖禹言臣不侍經席已踰兩月陛下深居閒燕聖學日勤然臣等無由罄竭愚短輔助萬一昔唐憲宗不對學士兩月李絳奏曰為臣等竊祿偷安之計則便矣其如陛下何陛下嗣位於今四年幸賴太皇太后以至仁盛徳母臨天下垂拱無為海内晏然當今之務莫如學問之為急也陛下今日學與不學繫他日天下之治亂臣不敢不盡言之陛下如好學則天下之君子皆欣慕願立於朝以直道事陛下輔助徳業而致太平矣陛下如不好學則天下之小人皆動其心欲立於朝以邪諂事陛下竊取富貴而専權利矣君子専於為義小人専於為利君子之得位欲行其所學也小人之得位将濟其所欲也用君子則治用小人則亂君子與小人皆在陛下心之所召也凡人之進學莫不在於年少之時陛下聖質日長龍徳升進數年之後雖欲勤於學問恐不得如今日之専也臣竊為陛下惜此日月願以學為急則天下幸甚論語記聖人言行之要修身治國之道無不在焉尚書言帝王政事人君之軌範也論語雖已講畢望陛下更加詳熟尚書未講者亦願陛下先熟其文臣等以次講解及之則陛下聖意先已有得矣據范祖禹集勸學劄子自注云八月二十二日今合附此甲寅朝奉郎魯君貺行都水監丞為劉安世言章故書乙卯詔詳定重條一司一路一州一縣敕令委諸路轉運司府界提舉司各選官一員同本司屬官刪修令刑部看詳以聞丙辰以進士及第李常寜為宣議郎簽書鎮海軍節度判官㕔公事吕益柔為承事郎簽書保信軍節度判官㕔公事龔夬為承事郎簽書河陽節度判官㕔公事除官與前牓不同用龍飛牓恩例也詔以元豐北庫為司空吕公著廨舎其封樁錢物并就南庫以元豐庫為名専主朝廷封樁錢物正月九日五月十八日
