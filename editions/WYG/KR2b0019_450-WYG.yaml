body:
  text: 續資治通鑑長編卷四百四十六宋李燾撰哲宗元祐五年八月癸巳朔户部言歸明人所給田如有妨礙及瘠薄不可耕佃乞官為驗實别給從之甲午詔權侍郎並日參詔戸部員外郎穆衍往熈河蘭岷路代孫路措置弓箭手土田張舜民誌穆衍墓云元祐元年與孫路同徃熈河相度措置邊防財用時大臣有欲棄熈河者留議未決公同事已信其説謂公曰此行可以自致不然反為累也公徐對顧利害何如王事靡盬遑為身謀還朝請以經制事還漕司條罷為公私害者二十七事嵗減經費一百九十餘萬緡因與孫更論疆事略以謂蘭州棄則熈河危熈河棄則闗中揺動唐自失河湟吐蕃囬鶻一有不順則警及國門逮今二百餘年非先帝英武其孰能克復今一旦委之無厭之敵恐不足以止㓂徒滋後患耳熈蘭卒不棄繫公力也元年正月十二日路衍同被命此已附見本日四年夏人遣使入朝欲以還賜四寨及塞門寨朝廷患之未有以決命公押伴公折之以理辭屈而去其後夏人入賀興龍坤成節皆命公押伴敵使欲有發輙憚公而止據衍傳乃是欲以還賜四寨易蘭州此云及塞門寨蓋字誤也誌又云熈河分畫疆界議乆不決遣公徃視公還以謂智固勝如據兩川美田實蕃漢必爭之地自西闗失利遂廢不守宜界二壘之間城李内彭以控要害及納克密努扎淺井名隆諾特皆宜起亭障以通涇原之援明年築李内彭賜定逺城用公䇿也本傳依此乙未太皇太后手詔以皇帝納后有期令太常禮官檢詳古今六禮沿革參考通禮典故具其節文著為成式有司審當然後施行從宰相吕大防等議也户部言官員分移請受於他州請者召保官三員如本色官或不足即令召别色官從之新無刑部言軍大將充使臣差遣自來有法合該酬奬者並依使臣法減半如有法合該指射差遣陞名次及免短使之類亦乞依使臣條例從之提㸃廣南東路刑獄程之元言臣僚上言韶州郡縣官吏交給蔡碩於油糧主處毎一千照帖止以數百售之遂冒法越次給庫錢與碩獲剰利千餘緡下本路體訪詣實以聞臣詢究碩買韶州思溪宻賽等場鉛錫㑹子内有買爐戸未納鉛作詭名賣納其爐戸雖已立劵賣鉛與人合請五分之直而官無錢可給轉運司令支四分而碩乃請十分共一萬六千餘緡計獲剰利七千餘緡又金部言碩欠軍噐材料等錢萬餘緡金五十五兩銀六百三十八兩紗羅等詔碩所買鉛錫㑹子本錢並填納見欠官錢剰利錢七千餘貫沒官韶州官吏并額各令提㸃刑獄司取勘以聞政目五月十八日已書勘蔡碩八月四日又書廣刑程之元按蔡碩買支還四分價錢鉛錫㑹子三次請十分錢一萬六千餘貫贏官錢七千餘貫下本司勘將本錢還見欠官錢餘錢並納官不合支官吏勘奏五月十八日蓋縁孫升章八月四日程之元又具奏也丙申詔門下侍郎劉摯累奏乞外任已降詔不允可令合屬去處如再有文字無得收接投進此據御集殿中侍御史楊康國奏編類章疏八月四日臣竊聞門下侍郎劉摯避寵辭榮懇求外郡傳播京都人情上下莫不驚駭蓋摯髙材逺識公正不倚有以大過人者此不獨天下所共知亦為陛下所知久矣故自侍御史再遷為執政三四年間徧歴三省公望益隆自以眷厚責深勇於求退雖於摯為美於人為難其在朝廷事體甚重豈可輕聼其去臣聞楊綰居廟堂人心自化汲黯在朝淮南寢謀是則徳望大臣進退出處實繫國家休戚安可不謹臣愚職在言責乃陛下耳目之官有所見聞豈敢避罪畏縮而不言也伏望陛下更賜省察早降指揮令諸處不得收接摯乞出文字押摯依舊入省使與二三執政協謀同輔共致太平天下幸甚貼黄臣今日之言非為劉摯蓋為朝廷治體也更望陛下省察提㸃兩浙路刑獄王瑜為刑部員外郎九月二日孫升云云丁酉西南龍蕃貢方物刑部員外郎王柏為淮南西路提㸃刑獄戸部言買撲場務敗闕無人承買聼自陳差官體量減定錢數承納仍具減數出榜召人或添價承買無人投狀再差官減定若減及五分以上無人投狀即申提刑司差官與本州縣再減出榜如上法減及八分無人承買申提刑司審察權停閉訖奏從之新無戊戌三省樞宻院言禁軍闕額錢帛等舊𨽻樞宻院止是封樁未嘗支用乞依收租等錢遇非汎支使並三省樞宻院同取㫖施行從之是日八月六日門下侍郎劉摯復位視事如故摯之為中書侍郎初以吏額房事與左僕射吕大防議稍不合已而摯遷門下侍郎及臺諌共攻大防大防稱病不出摯毎於上前開陳吏額本末曰此皆被減者鼓怨言路風聞過實不足深罪大防他日語人曰使上意曉然不疑劉門下之力居多然而士大夫趨利者交鬬其間謂大防與摯因是有隙於是造為朋黨之論摯語大防曰吾曹心知無他然外論如此非朝廷所宜有願少引避大防曰行亦有請矣七月庚寅七月二十七日奏事畢摯獨留奏曰臣久處近列器滿必覆願賜骸骨避賢者路既退連上章出就外第期必得請上遣中使召摯入對太皇太后諭曰侍郎未得去須官家親政然後可去使者數軰趣入視事摯不得已受命未㡬大防辭位不許及摯遷右僕射與大防同列未滿嵗言者爭詆摯摯尋罷朋黨之論遂不可破其本蓋自吏額始此據劉仿等所編摯行實及劉安世序摯文集摘出附見摯新傳大率依劉仿等所編也仿等云摯以八月一日出就外第按摯自記乃七月二日今從摯自記摯為中侍乃三年四月六日為門侍在四年十一月十七日為右揆在六年二月二日吏額事具六月末并八月十八日别出劉摯日記云七月二十七日以孟秋朝享致齋本省是日早延和奏事畢留身請補外諭以不可哀祈切至再拜而退投表于通進司隨有㫖東府不許般出明日從上自景靈還至端門既入即返轡而南寓泊曹氏園聼命八月一日癸巳再表批不允近璫閻安自曹園押入隨班奏事畢少留再懇諭勞再三未有可㫖退再入劄子上馬是日有㫖諸處毋接外章奏五日五鼓封還所奏陳衍押入見衍于本省後堂見奏垂拱六日奏事已少留面對摯私記云吾之求去也豈苟然耶吾出於寒逺被擢四年矣實過其分於國既無顯勞而妨賢路宜知止此一可去也元祐政事更首尾者零落無㡬獨吾與微仲在餘皆後至逺者纔一年爾雖不見其大異然不得謂之趣向同也或漠然兩可或深藏其意為不可測或以異意隂入其害公肆詆諆摯近因中司一章論政有云願戒大臣共敦此義勿謂不預改更之事遂懐同異之心於是所謂後至者皆不樂不樂則意不得不生矣故政論不一隂相向背為朋而吕相亦自都司吏額事後於吾有疑心夫共政事者六人而有異志同利害者才二人而有疑心則豈獨孤立之不易實懼國事之有病也古人有安國之志全身之智者多引避之此可去二也去年六月范堯夫罷後至此闕右揆自安厚卿丁憂近又孫和父薨吾位遂在衆人上議者或以次遞見及勢豈得安此三可去也聞外籍籍以吾於廟議有不合而去又謂見微仲比數留身有所懼而去皆非也又以謂久闕不補恚而求去此無知之言也士大夫喜吾此舉者亦不一云此用摯日記増入餘已具上注摯所稱中司一章論政蓋指蘇轍六月二十二日所奏也己亥尚書省言官員不因罪犯體量離任若誤停替放罷之類别受差遣各願補滿前任月日者聼一月已後更不收使所補不及二年願再滿一任者亦聼應升改者自再任日與理所升改資序並申在京所屬内再滿一任未差替人者即與施行其新任係立界處應比較賞罰者候界滿日替並從之新無庚子召宰臣詣後苑觀糓閤門奏是日上殿班非急速不引詔勿隔上殿班御集詔諸路欠負許將斛斗増價折納政目八日事刑部定奪髙氏遂便不當郎官吏人罰銅都省中書吏特放政目八日事髙氏見三月五日河北路都轉運司狀據定州申勘㑹見闕防城器具松明一十四萬一千六十二斤半樺燭一百一十萬四千五十二條估定合用物料價錢二萬二千九百九十七貫二十七文乞分作三料計置并少闕造布幔布毬等布四萬二千尺乞行收買應副本司㸔詳前項所置防城器具等本州勘㑹到自元豐三年内准朝㫖本路安撫司奏定合用數目及元祐元年六月十五日朝㫖防城器具限三年製造了當本司雖已牒定州據見管工匠逐旋收買製造去訖縁本州所要松明樺燭等數萬浩瀚及布幔布毬合用布數不少今來難以一併計置若據見管人匠逐旋收買物料漸次製造亦慮動經年嵗别致損壊兼是不急要用之物况數目倍多竊慮枉費官錢及沿邊難得見錢以此未敢依數計置應副伏乞朝廷特賜詳酌指揮白帖子稱近准朝㫖節文二十將氊帳等為係不可停留之物權罷製造今來樺燭等與上件氊帳等事體一般乞指揮詔松明樺燭權罷計置製造外餘並依元降指揮施行諸路准此八月八日御史中丞蘇轍言前後四次論熈河處置邊事乖方乞移范育种誼差遣至今未䝉施行然臣前論止言見任措置之非未及已徃根本之失若黙而不言竊恐聖朝尚有未矚再三煩瀆罪合萬死臣竊觀朝廷前後指揮方夏人猖狂㓂鈔未已則務行姑息恐失其心及夏人恭順朝貢以時則多方徼求茍欲自利以此凡所予奪多失其宜何者元祐三年朝廷遣使徃賜䇿命而夏人公然桀敖不馴不遣謝使再遣兵馬蹂踐涇原朝廷方務遵養不復誅討於四年始復遣使奏乞以所賜四寨易塞門蘭州朝廷雖不聼其所乞然即為改易前詔不俟分畫地界先以嵗賜予之仍令穆衍以三省宻院意㫖開喻來使及言所納永樂陷沒人口既經隔嵗月或與元數不同並許據數交割及所立界至雖有自來逺近體例或山斜不等不許邊臣固執爭占凡此三事皆夏人奏請之所不及而朝廷迎以與之者也及鄜延路乞依夏人所請用綏州舊例以二十里為界十里之間量築堡舖十里之外並為荒閑近黄河者仍以河為界朝廷一一聼之臣竊見先朝分畫綏州之日界至逺近責令帥臣相度保明徃反審實乃從其説今所畫界首起鄜延經渉環慶涇原熈河四路朝廷更不委逐路審覆即以延安一路所見便利指喻夏人號令一布無由復反至今夏人執以為據此則臣所謂朝廷方夏人猖狂㓂鈔未已則務行姑息恐失其心者也至於熈蘭所請欲以蘭州黄河之北二十里為界臣竊謂過河守把勢已艱難侵占蕃地理尤不可仰料朝㫖必不敢依唯所言定西通西通渭等城外弓箭手耕種地逺者七八十里近者三四十里不可以二十里為界邊臣雖為此説然議者或謂蘭州毎遣弓箭手耕種此地輙為夏人所殺若言已有耕者則弓箭手必有名籍所得租課嵗入㡬何二説相違理難遥度要須以此先與夏人商議各從逐路之便不可以二十里一概許之朝廷既失先事籌量及號令已行乃欲追悔先後皆失遂生厲階而熈河帥臣與其將佐乃敢不候朝㫖於元請之外修勝如智固二寨二寨既於元豐五年廢罷具載九域圖志見今無使臣兵馬住坐而妄謂夏人舊係守把朝廷從而助之以九域圖志為差誤以吏部見差管二寨弓箭手道路廵檢使臣為守把臣謂苟以此誑惑中朝士人可耳若欲以此塞夏人之口而服其心恐未可也此則臣所謂朝廷方夏人恭順朝貢以時則多方徼求茍欲自利者也然臣竊妄料朝廷之意勝如智固二寨必難議再修定西通西通渭三寨二十里以上界至亦無以取必於夏國蓋朝廷嵗賜大利既於無事之時空以與人及此緩急無以為重所謂差之毫釐謬以千里者也然則地界之事要必相持不决遇有朝貢使介復來秋冬之交賊馬肥徤時出㓂掠受侮逺人何時已耶如臣愚見欲乞檢㑹前奏移降育誼置之他路别擇名將謹守大信且修邊備本路疆界之議實非見今守把者推以與之以信前約其他則令秉公心具長久計條例聞奏然後朝廷擇而行之則熈河尚可得而安也今臣觀朝廷初無定議方熈河邊釁之作也乃急召帥臣寘之戸部及臣言賞罰失當則急復遣育還帥熈河至如种朴本與育誼共造邊隙今乃移朴涇原獨留育誼若以召育為是則今遣之為非矣若以移朴為當則獨留育誼為失矣政令如此終安適從徒遣孫路穆衍之流徃彼相度朝廷大計豈可取决衍等之口萬一敗事雖戮衍等何補於國臣前上言唐李德裕議討劉稹同列有異議者徳裕請曰有如不利臣請以死塞責則今中外皆謂守信固盟中國之利若大臣有欲専任育等不顧邊患者臣願陛下以德裕之請要之若能如此則用其計事定之後案行賞罰今臣言已竭勢不能回不審陛下嘗以臣前説要之否邊事至重安危未可知惟陛下留神而已臣以孤忠誤䝉㧞擢不敢不盡所懐以孤任使然觸犯者衆死有餘責八月二日穆衍代孫路徃熈蘭轍面奏大臣庇育等附月末癸卯中大夫門下侍郎劉摯言臣有一事鬰鬱於心久矣不避鈇鉞之威須至陳説伏見昨來鄧温伯除翰林承㫖人言交興以至罷三四臺諌雖略加遷進皆不敢安職至今未得寜帖臣今一一陳其本末夫温伯為人粗有文藝亦别無罪狀但資質柔佞隨事俯仰人所共知昨來差除臣等同議以謂服闋之人還其舊職不見其不可兼曽䝉靣諭此是延安宫舊人故行之無疑及臺諌交章言其姦罪以謂必至變亂朝政此又别無實跡故臣等亦曽言臺諌所説過當然而陛下聼言納諌即改温伯為侍讀尋又改知南京仍䝉宣諭云記當却待他日别與差遣既而三省又進呈以謂前來承㫖告命及詔書已下遂得㫖却行前來翰林承㫖之命言路臣僚言既不行勢難安處從此遂至紛紛矣臣竊觀今來温伯久已就職梁燾等已别與差遣理合寜帖無事然而中外人情依舊未安蓋縁昨來言者説破温伯實王安石黨人故進退之際朋類甚衆邪正之辨君子小人消長之勢在此一舉既有此説則中外人情便有向背自三兩月以來士大夫洶洶于下造作語言更相窺伺人心不安皆將温伯及燾等去住隂卜朝廷意㫖才見温伯就職便為朝廷有意動揺政事邪佞之黨無不欣然得意見燾等罷言職便謂踈薄諫諍從来憂國之臣無不疑懼臣實知朝廷差除温伯本無他意自是服闋合還舊職而今來人情妄有猜議直至如此乃是温伯雖别無罪狀而其進退之間所繫亦不為小臣竊慮陛下止知差除温伯别無過當而不聞後來中外人情如此臣所以鬱鬱于心曉夕憂念臣再詳温伯本是常才雖懐姦心若陛下常能照察未必便為朝廷大患而燾光庭安世等若終不敢就職别除外任亦不妨他時任使但臣所憂者人情既將此事卜朝廷意㫖則去留之際中外便生觀望揺動事機無甚於此今陛下至明至聖不責燾等狂直之罪使之各就新職與温伯恩意兩全實為幸甚但人臣進退之義亷恥之節亦非小事數人身有言責言既不行反與所言之人同列朝廷不畏天下公議而温伯冒恥茍進且亦頗為公議所薄傍偟踧踖各不寧處况燾等數人皆忠諒純直之臣自小官拔擢養育成就以至今日方人材難得之時一旦因温伯之進而去之以快姦邪憎怨之人在此數人雖不足論而朝廷之體實可深惜又况内外人情洶洶未安極須彈壓臣望陛下深思熟慮詔大臣别作商量使邪正有所辨是非有所歸則天下服矣若兩存並留終似未安不免具此劄子伏乞留中詳覽不勝幸甚貼黄稱臣常時奏事難為一一條陳近日曲謝聖恩又不敢留身多時故不得面奏臣内懐區區若畏避不言實負任使故具此劄子乞賜留中又稱臣再詳温伯及燾等其勢必不兩立燾等力求外任而陛下終始保全不使出外恩禮雖厚而不敢就職蓋逐人未有可處之理也臣有愚見竊謂陛下何惜暫出温伯選一名郡委任去處使之補外温伯既動則衆人自然安職衆人既定則温伯便可復召蓋前後事跡既不相接則兩皆無嫌各得安處不惟成就二聖愛養忠直之德兼自可曲全温伯亷節不妨他時任使如䝉采納即乞於諸路帥臣合移那去處差温伯前去如此選任不為無名伏乞詳酌早賜批降指揮或靣諭三省施行又稱臣等從前同共進擬温伯差遣止見其人服闋召還舊職不為過當即不見得向後人情議論有利害如此今來實不能隱黙遂非上誤聖政兼為即今温伯及燾等差除已定多日三省未敢别改更須至密具奏陳上煩中㫖又稱臣參預輔弼非敢於逐人私有分别兼燾等已罷言路故言之無嫌數内梁燾實是臣之故舊朱光庭劉安世臣舊皆不識自是司馬光吕公著引用賈易則臣至今不曽相識鄧温伯則臣却與之故舊甚熟以兄拜之燾光庭十八日並出守安世奉祠賈易則七月八日已先除淮東憲摯雖有此論列訖不從也御史中丞蘇轍言蘇轍言戸部闕官不得其時附見八月十一日其從違當考或削去不用臣伏以戸部財賦出入之地天下之劇曹而民之司命也一日不治百日將亂今權尚書梁燾方辭免不出而兩侍郎皆新除未到獨一韓宗道以刑部兼權則是平日四人職事併在一人况刑部事繁宗道之入戸部止及半日而已本部官吏自來日出視事㡬至日沒而罷今既無所統領郎官多相隨早出及議論不一凡事無所取決以致文移壅滯囚禁稽留臣愚以謂方正官未到之間當更差一二人時暫權攝今學士給舍共有六人職事稀簡宜擇詳熟吏事者俾權其職庻㡬財賦重事不至曠廢五月二十六日梁燾權戸書六月四日李之純戸侍自成都召至二十八日范育戸侍自熈州召七月十二日罷七月十二日苖時中戸侍自陜西召甲辰提舉東流故道李偉言大河自五月後日益添漲始由北京南沙堤第七舖決口水出次於第三第四舖并清豐口一併東流故道河槽深三丈至一丈以上比去年尤為深快頗減北流横溢之患然今日已秋深水當減落若不稍加措置慮致斷絶即東流遂成淤澱伏望下所屬官司經畫沙堤等口分水利害庻免故道淤澱上誤國事詔都水使者吳安持與本路監司北外丞司及李偉案視具合措置事連書以聞舊錄云先是元豐四年因小吳大決議者欲復禹故道神考曰陵谷更變雖神禹復出亦不可拘此故道蓋水之就下者性也今止以州縣為礙壅遏水勢致不由其性此乃治水之事非治水之道若以道觀之水則未甞為患也乃下詔曰東行河道已填淤不可復修將來更不修閉小吳決口候見大河歸納應合修立隄防令李立之經畫以聞其干渉州縣修䕶城堤並聼立之處分元祐紛更唱東流之議竭河北民力以遂其非卒不能成終如先帝詔㫖新錄辨曰詔書己見神宗實錄不必重載既不載詔書其首尾語言無從收附此一叚並合刪去玉牒云詔河北路監司都水官按視東北二流分水利害措置以聞九月二十六日十二月二十二日資政殿學士中大夫守吏部尚書曽孝寛卒輟視朝一日贈右光禄大夫丙午殿中侍御史楊康國言昨論王鞏差除不當聞改差管勾太平觀衆論未允請送吏部詔鞏令吏部與差太平觀御史中丞蘇轍言臣伏以方今人才衰少求備實難凡有所長皆當不廢臣伏見右承議郎王鞏生於富貴志節甚堅好學力文練逹世務昔熈寧之初宰臣王安石用事屢欲用鞏鞏自知守正不合拒而不從毎上書言事多切時病吳充馮京器其為人嘗與議及國事及王珪蔡確執政李定舒亶為御史將傾充與京故起大獄廣加羅織欲以次及二人鞏由此得罪南行萬里三年而歸剛氣不衰言事如故時二聖臨御司馬光當國鞏復預光議論光極喜之言之朝廷擢任宗正寺丞方復欲進用而鞏狷介疾惡為衆所忌適㑹光物故衆人捃其微過因而排之臣竊悲光平日所薦今皆布列朝廷而鞏獨連蹇不遇罷官者再凡鞏之所長皆士人之所難能而其所短多暗昩不明或少年之所不免前知揚州謝景温與鞏共事嘗上章明辨其寃則愛憎之言未可偏信臣備位風憲區區之意毎欲為陛下掇拾遺材以備任使與鞏游從最舊知其所長伏乞陛下洗濯疵瑕稍加錄用必能上感恩造臨事捐軀以報萬一謝景温先以元祐二年六月二十八日除知揚州三年閏十二月二十五日權刑書其薦鞏必在四年也轍言不得其時因鞏再送吏部與官觀附此先七月四日罷鼓院送吏部鞏縁轍薦除宿州六年六月八日以言章罷轍薦鞏當在年十月後或移十月右正言劉唐老言伏覩大學一篇論入徳之序願詔經筵之臣訓釋此書上進庻於清燕之間以備觀覽從之詔自今開封府保正並與免冬教舊錄云改先帝保甲法三時務農一時講武冬教既免保甲無復更教事藝非先帝法也新錄辨曰詔保甲免冬教書法已備其下語言出史官私意非實錄自改至也三十一字合刪去王巖叟朝論云愚自為左司諌論乞罷府界保甲范堯夫為右相亦論羅適為府界提㸃亦論皆以厚卿梗之不能行愚元祐四年秋為樞宻都承㫖兼同知院勸罷之甚力而門下孫知甫侍郎又異議事遂寢五年秋再自中書舍人遷承㫖韓師朴同知院慨然欲論罷之愚進其意明日約三省同進呈師朴獨諌曰自陛下聼政以來罷保甲集教故人心安靜而欣悦府界毎嵗用災傷權罷冬教或一嵗豐稔驟復起教人心必驚疑不如遂終罷之太皇太后曰可五年八月十四日罷自元年凡四年而後決然保甲之名猶在爾户部言廣濟河糧綱有欠應折㑹者依汴河條嵗注於籍從之新無又言請受添給起支訖具例申戸部未有例奏聞其已申奏後應有増改者亦申部從之新無丁未奉議郎石諤言參選人依試進士法三人以上為一保承務郎以上及選人願試律賦者聼其考校試格等第並依舊法武臣試刑統義者亦減為一塲五道其考校粗通等第並依元豐法若廵舗官以臨時就試人多寡増損員數就試刑統義毎一百人差㸃檢官一員並從之
