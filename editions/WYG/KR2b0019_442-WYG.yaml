body:
  text: 續資治通鑑長編巻四百三十八宋李燾撰哲宗元祐五年二月丙申朔知鄭州資政殿學士曽孝寛知成徳軍政目在正月二十八日今從實録丁酉三省言看詳財利舊法所乞廢罷坊州礬務令河東轉運司認還陕西坊礬課利詔遣奉議郎舒之翰同逐路轉運司相度利害與户部參酌立法看詳財利舊法所何日建詔罷諸州軍通判奏舉改官從殿中侍御史孫升之請也升集乃無此章當檢龍圗閣直學士中大夫新知成都府李常卒是日都省吏蘇安静時惲許出職政目二月二日事又三月二十六日可考戊戍龍圗閣直學士左朝散大夫提舉靈仙觀孫覺卒已亥見䧟沒夏國人一百四十九以晋州進士邢逢原為本州文學賜袍笏兵馬使副都頭各賜衣帶其軍人願依舊充軍者禁軍與近裏一般軍分職名廂軍歸舊軍分如不願充軍者放歸本貫弓箭手蕃捉生並依舊指揮職名敢勇効用百姓放歸本貫並給賜衣物装錢有差先是永樂城失守逢原等為夏人所掠既遣使詣闕請罪至是具籍以歸元年七月八日四年六月九日十月二十六日并今年三月二日十八日當考邢逢原授官政目在八月十二日今從實録詔都水使者吳安持提舉開修减水河吏部言皇太妃遇明堂大禮合奏骨肉恩澤欲與舅侯偁班行縁皇太妃奏薦並依皇后例而侯偁於服紀無入官法詔比皇后奏小功緦麻女之子條補借職四年四月二十二日曽肇蘇軾論侯偁但云是皇太妃親屬不云是舅也禮部請諸陵修飭前一月申太常寺候差官告畢興工神臺諸殿及廊垣五十五工以下聼本陵擇日都監監視從之庚子溪峒人田忠進知土毛州莫世忍等九十一人加檢校官有差辛丑四方舘使李授為引進使以再任樞宻副承㫖及三年故有是命詔諸王府翊善侍講記室參軍請前任俸者聼詔三省樞宻院去冬愆雪今未得雨外路旱暵濶遠宜權罷修黄河從御史中丞梁燾諫議大夫朱光庭之言也實録云以燾及光庭言東北乆旱河役動衆恐妨農事故降是詔今取二人言章全載之并附范純仁云云燾言臣訪聞東北旱氣濶逺至今麥未出壠嵗事未有豐稔之漸恐詒聖憂臣竊慮河事大役人情勞怨調夫動衆妨奪農時其招災旱之由疑亦因此望聖慈詳酌權令住修河候秋熟日取㫖如聖意以為然伏乞批降指揮中書元定此月十二日興工若来日便得指揮猶未為晚貼黄如大臣有執奏即乞宣諭觀如此旱災不得不為憂也思省今来河事最是揺動衆心當此災旱又奪農時深為不便可且權罷大臣等亦冝憂國不可但狥偏見如賜允從即乞批降中㫖仍傳宣催促或聖意不欲如此伏望批出臣此章令疾速施行更不覆奏亦乞傳宣催促此事湏是陛下特為主張不惑外議庶可救東北傷農之患如降出此章此貼黄乞留中又言臣恭聞宣諭已令放夫直候豐熟日取㫖者十餘萬生靈得䝉聖恩此為陛下盛徳之事天下幸甚或恐執政大臣别作商量奏禀不盡放得十六萬夫十四萬差二萬雇伏乞傳宣催促盡令放散東流及故道見役兵工令盡撥併北流修復固䕶埽岸如向去緩急即如聖㫖逐旋差急夫人自無怨伏望睿慈令中使丁寜傳宣湏是於當日内馬逓行下敕㫖即不為晚乞留宸念貼黄方今農作之時正藉人力况農家一嵗之望正在寒食前後今夫役以三月十二日興工一月了當人夫得歸已是三月下旬耕種違時當此乆旱之際更重困民力罷去大役實慰羣情光庭言臣聞天人之應甚於影響人心和於下則天意得於上惟天愛人君之至每一舉動少違於理則必有應庶幾感悟轉災為祥易於反掌臣觀今日朝廷之上悉屏姦私田野之間悉去煩擾海㝢乂安而干戈不用刑罰閲實而囹圄屢空而又二聖憂勤以至仁覆養天下冝乎順氣之應風雨時若以致百榖豐登今或未然自冬渉春雨雪愆亢即今幾得二月中氣麥麰之望已可深憂何朝廷不思其所致之因也大凡天下之事不必為亦不必不為惟其當而已昨議修開大河北流天下之人皆謂北流就下不可强使之東更俟三二歳觀其水勢所向果有大過之勢因而導之豈不易哉朝廷審以為是遂權罷閉北流而水官元主議者殊不快所欲盖所欲本在於僥倖朝廷美官若一切罷去則遂無事矣故猶為減水河之䇿意在我之前議未為過失而又不得依舊廣占官吏事權在手一從私意臣愚不肖觀古今治亂之階未有不由任君子則治任小人則亂今修河一事只因用李偉一小人去嵗已嘗決堤口放漲水迄無成功徒使故道益增髙仰今朝廷不察李偉小人猶用之且減水河開與不開殊無利害設若只留堤漲水大則勢湏自過何湏更役人開濬哉訪聞開濬去處才開及三五尺已是泥濘今若湏要開及丈餘則數萬人於泥濘中勞苦為無益之事有傷和氣可為歎息今聞開減水河人夫尚使四萬又和雇二萬人并兵士應亦不下萬人大率計之共不下七八萬人以七八萬人為無益之役古者一夫失所天猶應之今七八萬人矣致一路騷擾天豈不憫哉是以膏澤未降者竊意在此臣愚欲望朝廷罷李偉小人職事悉减修河司官放罷見役開减水河兵夫只委都水使者與本路監司並州縣官吏将見修䕶急切埽岸合役人夫一靣循理施行如此則興事不妄人情妥安上天之應必降膏澤伏望聖慈特賜睿斷施行貼黄李偉輕佻小人向傾心事吳居厚殘害一路人民及聞朝廷将責居厚遂復百端暴揚其惡以免身過似此小人豈可付之修河大事又貼黄訪聞和雇人夫二萬人每人支官錢二百州縣名為和雇其實於等第人户上配差除官錢外民間尚貼百錢方雇得一夫凡二萬夫公私之費大約幾六千貫如此枉費朝廷豈可不察惟速行罷止宻䟽三月三日初范純仁既罷相知潁昌聞朝廷復議修河上疏曰臣聞堯舜之治不過知人安民知人則不輕信安民則不妄動小人之情希功好進行險生事於聖明無事之朝則必妄説利害覬朝廷舉事以求爵賞朝廷若輕信其言則民不安矣國家之弊常必由斯臣不敢逺引古昔只以近事言之國家自仁宗以前天下無事百姓安樂雖有元昊背叛獨陕西應副不易未聞四方匱乏百姓有嗟嘆之聲也自王安石輕信小人之言勸先皇更改法令而後承間妄作者紛然矣又用兵之謀至於勸興靈武之役而生民被害衆矣且以先帝聖明舉動故欲詳審然小人利口欺誤執政而致執政復誤朝廷也其勸更法令者則曰君臣千載一遇時不可失及勸興靈武之師者復曰將為北人所并時不可失臣前在政府又見欲回復大河者又曰河勢方東恐變改不定臣以前車之戒是以深畏其言故嘗屢有奏陳以謂百姓乆勞方賴陛下安養不急之務不可遽興䝉陛下專遣范百禄趙君錫相度歸陳回河之害甚明尋䝉宸斷宣諭大臣令速罷修河司臣預奉行詔㫖深以復見堯舜知人安民為慶三兩月来却聞孫村有溢岸水自然東行議者以謂可因水勢以成大利朝廷遂捨向来范百禄趙君錫之議復興回河之役臣觀今日舉動次第是用時不可失之説而欲竭力必成臣更不敢以難成及三五年間必有決溢為慮且只以河水東流之後增添兩岸隄防舖分大叚數多逐年防守之費所加數倍則財用之耗蠧與生民之勞擾無有已時更望聖慈特降睿㫖再下有司預約回河之後逐年兩岸埽舖防捍工費比之今日所增幾何及逐年錢物於甚處出辦則利害灼然可見若利多害少尚覬徐圗茍利少害多尤冝安静臣受陛下不次㧞擢之恩雖養痾補外不敢自同衆人坐視成敗所以罔避僣越之愆而伸補報之萬一區區愚誠惟聖聰憐察疏奏主河議者不悦遂寝而不行後十餘日太皇太后宣諭曰前日范純仁奏何在宰臣奏曰事體難從已鑿收矣案鑿收二字疑悮太皇太后曰純仁之言有理冝從其請遂又罷河役先是河上所科夫役許輸錢免夫縣令上下皆以為便純仁獨憂曰民力自此愈困矣或曰每嵗差夫一丁費萬錢今以七千免一丁又免百姓往回奔走與執役之勞更不便乎純仁曰每嵗差夫雖曰萬錢然携以隨身者不過三千又得一丁就食于官是民間未嘗有所費也今免夫所出七千盡歸於官矣民又儼然坐食於家盖力者身之所出錢者非民所有今捨其所無民安得不病此一事富民不親執役者以為便窮民有力而無錢者非所便也又况差夫必計其的確合用之數縱使所差倍其所役則力愈衆民愈不勞矣今若出錢以免夫雖三分之夫工亦可以取其十分免夫錢其弊無由攷察又從来差夫不及五百里外今免夫錢無逺不届若遇掊克之吏則為民之害無甚於此行狀云潁昌府科河役每輸七千則免一丁之行或以為便已奏得請純仁曰此有錢而出力者之便有力而無錢者何便之有且用民之力於古有限而今其逺不過五百里乃一概輸錢特在官者為上户地爾復奏罷之壬寅邇英閣講畢無逸篇詔詳録所講義以進今後具講義次日别進户部言災傷處令佐能賑貸救濟人户不致流移所推酬奬於熙寜敕係第五等於元祐敕係第四等即不分等第分數未盡立法之意請災傷五分以上與第五等七分以上與第四等從之癸卯詔時雨稍愆應五嶽四瀆州軍令長吏祈禱又詔南外丞司修河人夫及開濬京城壕雇夫並權罷二十三日蘇轍云云太師文彦博言前通判同州趙亢所管沙苑監馬數蕃息乞堂除有監處知州軍通判詔亢權知隴州甲辰都水使者吳安持言州縣夫役舊法以人丁戸口科差今元祐令自第一等至第五等皆以丁差不問貧富有偏輕之弊請除以次降殺使輕重得所外其或用丁口或用第等聼州縣從便從之丙午門下後省請㸃檢進奏官文書稽失送本院事理重者送門下後省應决者從本省送開封府從之新無丁未疎決四京府界諸縣繫囚除常赦所不原外雜犯死罪以下遞降一等杖以下釋之其後又詔䟽決應天下州府軍監縣等繫囚從給事中范祖禹之言也祖禹言臣伏見陛下以乆旱疎決在京及三京繫囚聖心焦勞欽恤庶獄祖宗以来赦過宥罪多䝉嘉應然今溥天不雨旱災甚廣恐刑獄寃滯以傷和氣者非止於四京臣願陛下因推惠澤以及四方詔諸路轉運提刑司官疾速分詣所屬州縣引問見禁罪人疎理決遣仍先徧行指揮疾速結絶無令淹延深戒官吏務察寃枉使朝廷徳意及逺感動人心庶可消弭災異乞留中特出聖意指揮又祖宗時遣使決獄或詔逐路監司踈決其例不一欲乞參酌施行從祖禹言據舊録仍增入祖禹全章并附梁燾云云御史中丞梁燾言臣伏見聖念閔雨申飭祈禱仁徳動天冝有福應臣聞隂陽之道宻與政通亦願敬修人事上應天心竊恐京邑之間下及四方郡縣留獄滯訟感傷和氣伏望聖慈特賜指揮差官㸃檢結絶其罪有可疑情非巨蠧者並聼從輕決遣在京京畿差臺省官諸路委監司分行庶恩澤下究羣情感悦和氣上通以致嘉雨燾嘗奏事延和殿進疏言旱暵踰時冝廣徳施恵以召和氣又乞用慶歴熙寕故事以旱罷免宰相修徳應天進賢退不肖省刑宥罪無間疎遠寛賦薄歛以恵細民用銷災異太皇太后曰旱澇自是時數燾對曰陛下之言失矣人主當上畏天威以為警戒今陛下未有畏天之實乃曰時數此意恐不出聖心必出左右取悦之言上惑聪明是深誤陛下也陛下愍物憂嵗懼災省已刻意至誠必有時雨之應若懐疑致惑歸之於數而不自責何以上當天心銷伏災變天去人咫尺應響如答湯以六事祝山川言未已而雨宋景公有人君之言三熒惑為之退舍陛下以母儀保佑官家親天下事至于言動便有史臣書載垂示萬世豈可不謹也願畏天之威順天之道從民心召和氣誠意如此何憂不雨也太皇太后是之戊申翰林學士蘇轍言臣於去年甞再具劄子論黄河漲水於孫村出岸東流本非東決而吳安持李偉等附㑹大臣欺罔朝聼欲因此塞斷北流東復故道差官調夫於今年春首興起大役臣竊疾之是以不避煩凟越職獻言以為河北生靈連嵗災傷不冝輕有舉動乞陛下斷之於心力止其事是時大臣固執前議天聼髙逺言不能回臣尋被命出使契丹道過河北見州縣官吏訪以河事皆以目相視不敢正言及今年正月還自北邊所過吏民方舉手相慶皆言近有朝㫖罷回河大役命下之日北京之人驩呼鼓舞以為二聖明見千里之外雖或巧為障蔽而天日所照卒無能為惟减水河役遷延不止耗蠧之事十存四五民間竊議意大臣業已為此勢難遽回既為聖鑒所臨要當迤邐盡罷今月六日果䝉聖㫖以旱災為名權罷修黄河候今秋取㫖大臣覆奏盡罷黄河東北流及諸河功役民方憂災旱皇皇之際聞命踊躍實荷聖恩然竊詳聖㫖不謂减水河必不可開而託名旱災曲全大臣不欲明指其過而大臣復請遍罷諸河以盖獨罷减水之迹上下相䝉體實未便何者北流堤防積歳不治近来南宫宗城等處決溢皆由堤防怯薄夏秋水漲勢不能支都水官吏竊幸其事因以為回河減水之説既不依常理興工貼築甚者又大計閉塞決口工料以形比孫村回河之費意謂彼此費用相若則孫村之役不為過當由此北流之患漫不禁止臣昨過瀛深洺等州界吏民皆言今年若不治堤數州之民受害尤甚至於東流故道地勢積髙必不可復所開減水河雖不開掘每嵗漲水必由此行嵗嵗淤髙往事可驗縱復開掘深廣河淤一上勢不復存於此施功顯是枉費國力而舍彼為此欺罔可知然臣之所憂非特在此何者河流之不可復東若使上下誠有不知誤興大役雖傷財害民為患不小而事有過誤於君臣之間逆順之際未為大不便也今者大臣之議違法悖理决不可為而協力主張膠固為一去歳所罷今歳復存順之者任用違之者斥去雖被聖㫖猶復遷就以便其私陛下之言上合天意下合民心因水之性功力易就天語激切中外聞者或至泣下而大臣奉行不得其半由此觀之則是大臣所欲雖害物而必行陛下所為雖利民而不聼至於委曲回避巧為之説僅乃得行君權已奪國勢倒植臣所謂君臣之間逆順之際大不便者此事是也董仲舒有言尊其所聞則髙明矣行其所知則光大矣今陛下既得其所聞知然未能尊而行之臣恐羣臣顧望有不為陛下用者矣故臣願陛下有所不知知之必行有所不行行之必盡黄河既不可復回則先罷修河司只令河北轉運司盡將一道兵功修貼北流堤岸罷吳安持李偉都水監差遣正其欺罔之罪使天下曉然知聖意所在如此施行不獨河事就緒天下臣庶自此不敢以虚誑欺朝廷弊事庶幾漸去矣臣待罪翰苑身無言責冒昧納忠譏訶貴近罪合萬死然念頃自初任知縣䝉二聖非次㧞擢首尾五年叨在禁近恩徳深重羣臣少比臣而不言天下無敢言者矣斧鉞之誅所不敢避貼黄稱訪聞修河司承受内臣鄭居簡近為黄河故道不可復行不敢虛占本職請受乞先罷任已䝉朝廷允許以此觀之顯是修河司不消復存其吳安持李偉尚自貪禄怙權未即引去伏乞早賜罷免所有修河司見管職事即依去年正月二十八日已降指揮令河北轉運司結絶又訪聞修河司妄舉大役略無所益而費用錢糧物料萬數不少河北災傷之後極不易應副縱是封樁錢物亦出自民力深可痛惜臣欲乞委河北提轉不干礙官具前後所費用過數目結罪保明聞奏所貴朝廷上下具知蠧害之實今後審於興作庚戌太師平章軍國重事潞國公文彦博為守太師開府儀同三司䕶國軍山南西道節度使致仕彦博自言嘉祐中封潞國公經今三十餘年為是鄉國乞不改封從之尋詔學士院麻制内特不用守字以彦博甞正任太師也不用守字在三月二日今并書壬子太師文彦博乞免冊禮詔允所請尚書省言承買場務三年為界滿前一年許自陳接續承買勘㑹無欠給帖有欠或不自陳即别召承買抵當家業最多人其次雖已業低小而願預納三年浄利錢者亦聼給若於法不應給已業抵當最多人無人投狀限六十日每經限滿准此從之新無丙辰于闐國遣使貢方物戸部貟外郎穆衍言六路茶法通商乆長稅錢無總數以較多寡之入租錢亦不見有無欠負請自今稅錢委逐州通判月終比較申州州嵗終比較申轉運司於次年具一路總數申戸部租錢委轉運司嵗終具理納大數申戸部如違慢許從發運司戸部奏勘從之丁巳知陳州資政殿學士胡宗愈知成都府詔知成都府廣桂州支賜全給不以任減政目二十二日事當考戊午詔府界路三萬貫以上課利場務二年併虧及監官不職許令轉運提刑司别舉官庚申歩軍都虞候康州團練使和斌卒特贈寕州防禦使壬戌太師文彦博乞免兩鎮節度使祗帶河東一鎮致仕從之甲子詔即玉津園宴餞太師文彦博宰臣吕大防主之三省樞宻院暨侍從官赴
