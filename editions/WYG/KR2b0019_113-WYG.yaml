body:
  text: 續資治通鑑長編卷一百九宋李燾撰仁宗天聖八年春正月己未契丹遣左監門衛上將軍耶律忠禮部郎中知制誥陳邈來賀長寜節癸亥詔河北轉運使視澶州埽岸如梢芟有備即議修塞或民力猶困則須冬月乃議之丙寅命資政殿學士晏殊權知禮部貢舉賜定州修城役卒緡錢壬申詔嘗舉人為京官而止改幕職及循資後或犯罪舉主並减同罪一等太常少卿知廣州狄棐加直昭文館棐代還不以南海物自隨人稱其亷甲戌真定府定州路都部署彰武節度使贈侍中諡武穆曹瑋卒瑋用士得死力平居意氣舒暇及行師多竒計出入神速一日張樂飲僚吏中坐失瑋所之明旦徐出視事數馘庭下嘗稱疾加砭艾卧閣㑹賊大至瑋奮起裹創被甲跨馬賊見駭奔將兵幾四十年未嘗少失利自三都之㨗威震西域嘉勒斯賚每聞瑋名即望瑋所出東嚮合手加顙契丹使過天雄部勒其下曰曹公在此毋縱騎馳驅也真宗重兵事凡邉奏必手詔詰難至十數反而瑋守初議卒無以奪後雖他將有論邉事者往往密付瑋處之渭州有告戍卒叛入夏國者瑋方對客奕棊遽曰吾使之行也夏人聞之即斬叛者投其首境上羌殺邉民入羊馬贖其死下令曰羌自相犯從其俗犯邉民者論如律自是無敢犯環慶熟羌田多為人所市致單弱不能自存因没虜中瑋盡令還其故田後有犯者遷其家内地所募弓箭手使馳射較强弱勝者予田二頃再更秋熟課市一馬馬必勝甲然後官籍之則加田五十畆至三百人以上團為一指揮要害處為築堡使自塹其地為方田環之立馬社一馬死衆出錢市馬属羌降者既多因署其首領為軍主或指揮使或副指揮使使統其族帳止于本軍敘進以其習知虜情與地利不可徙他軍也開邉壕率令深廣丈五尺山險不可塹者因其峭絶治之使足以限虜後皆以為法山東知名士賈同嘗造瑋客外舍瑋欲按邉即同舍邀與俱同問從兵安在曰已具既出就騎見甲士三千列立人音不徹舍同歸語人曰瑋殆名將也瑋為將不如其父寛然自成一家賈同臨淄人初名罔字公踈著山東野録七篇年四十餘同進士出身時大中祥符四年也真宗命改今名王欽若方貴盛聞同名欲致之固謝不往居八九年始調歴城主簿張知白薦為大理評事通判兖州綿州天聖初上書言自祥符已來諫諍路塞丁謂乗間造符瑞以欺先帝今謂姦既白冝明告天下正符瑞之謬罷宫觀崇奉歸不急之衛兵收無名之實費使先帝免後世議國家無因循之失又言冦凖忠規亮節疾惡擯邪自其貶黜天下之人弗見其罪冝還之内地以明忠邪善惡之分時太后臨朝而同言如此人以為難再遷殿中丞知棣州卒措置藩校已見祥符七年四月甲戌此當削去或兩存之亦可内殿崇班張繼恩遭父䘮請給假下太常禮院言齊斬三年並解官後唐應順元年敇内諸司使副帶東西班正官及供奉官殿直承㫖卒哭舉追今武臣例不解官又無給假日限乙亥詔武臣父母䘮卒哭聽朝叅丙子前良山縣令陳曜請于鄆滑州界䟽黃河入麋邱河赤河以分水勢詔京東河北轉運使與韓億等同規度之戊寅遣禮賓副使江徳源往澶州視古遥堤庚辰詔河北水災州軍募人入粟以賑貧民辛巳作三聖宫于永安縣訾王山仍更山名曰鳯臺殿中侍御史張存言比部員外郎知開封縣劉汀知祥符縣李宗簡各縁門地遂厠郎曹曽乏譽于中材猥庇身于大邑欲乞自今開封兩赤知縣依舊差館殿兼職及立朝知名者充自餘常流不在除授詔劉汀李宗簡候成資替劉汀李宗簡未見集賢校理彭乗以親在蜀懇求便官詔乗知普州蜀人得鄉郡自乗始普鮮知學者乗為興學召其子弟為生員教育之俗遂變此因乗遷校理附見知普州事不必在此月也詔諸道守任臣僚無得非時聚㑹飲燕以妨公務及假借民户什噐轉運司謹察其轉運使副廵歴所至除遇公筵方得赴坐㑹要八年正月詔二月戊子詔五代時官三品以上告身存者子孫聽用䕃仍須得保官三人復置韶州樂昌縣銀鉛場庚寅置彭州九隴縣采金場明道元年正月己丑髙覿責官可参考丙申上封者言自今選補僧官須經四十臘二十夏以上仍設六科考試詔開封府下左右街具奏以聞而卒無應格者乃命次補如舊乙巳詔文武官當磨勘而隠落公罪者以違制失論􅂍私罪以違制論公罪徒以上情重者仍聽奏裁先是右班殿直張從恩當磨勘而隠落公罪杖坐徒二年追兩官勒停上以所坐太重特免追官而更著此條三月庚申詔選人因避親成資放罷者許令叅選甲子御崇政殿試禮部奏名進士丙寅試諸科丁夘賜進士王拱壽等二百人及第四十九人同出身己巳賜諸科及第同出身者又五百七十三人拱壽咸平人也詔更其名曰拱辰詔應制科自今聽隨禮部貢舉施行廢鄭州新開索河斗門壬申幸後苑賞花釣魚觀唐明皇山水字石于清輝殿命從官皆賦詩遂燕太清楼毎歳賞花釣魚所賦詩或預備及是出不意坐多窘者優人以為戯左右皆大笑翌日盡取詩付中書第其優劣度支員外郎祕閣校理韓羲所賦獨鄙惡落職降司封員外郎同判冀州乙亥詔宗室嫁女擇士族之有行義者敢以財冒為婚御史臺街司察舉之己卯鹽鐡副使兵部郎中張若谷為右諫議大夫知并州先是麟府嵗以繒錦市蕃部馬前守輙罷之若谷以謂互市所以利戎落而通變情且中國得戰馬亟罷之則猜阻不安奏復市如故而馬入嵗増合見前守姓名度支副使刑部郎中唐肅為龍圖閣待制肅清直亷儉於仕進恬如也在度支㑹官糴麥京師數且足有豪姓欲入官者以數十萬石因權幸干掖庭太后面命肅肅曰麥貯於倉率不過二歳多則朽腐不可食况撓法耶卒不受嘗得知洪州艤舟南康不即赴或問之肅曰職田以四月為限今遽往得無趨利之譏乎踰月乃上肅不受豪姓麥正傳削去今追載之不知正傳何故也肅與鍾離瑾梅詢三人者共拜今但記肅庚辰詔河北被水州縣毋税牛先是諸州軍遣承引官客司衙前赴三司補軍大將者例免里正之役詔自今罷勿遣三司言方建太一宫及洪福等院計須材木九萬四千餘條乞下陜西市之詔可通判河中府范仲淹言昭應夀寜天戒不逺今復侈土木破民産非所以順人心合天意也冝罷修寺觀减定常歳市木之數蠲除積負以彰聖治尋徙陳州又言恩倖多以内降除官非太平之政願以上官賀婁為戒事雖不行上以仲淹為忠諫買木據仲淹奏議乃天聖八年三月末事願以上官賀婁為戒據富弼墓誌在徙陳州後正傳即係之河中府誤也夏四月癸未朔復中書舍人宋綬翰林學士綬前以昭應宫災落學士綬時同修國史詔免赴舍人院當直于是復入翰林癸巳契丹遣左千牛衛上將軍耶律育都官郎中知制誥吳克荷來賀乾元節甲午徙京西轉運使工部郎中王彬為河北轉運使部吏馬崇正太后姻家滑橫不法彬發其􅂍罪下吏忤太后意復徙京東徙京東未得其時附見丙申禮部郎中知制誥徐奭為翰林學士權知開封府奭俊邁有才然鋭于進取在西掖幾四年未遷乃由内降入翰林領開封時議薄之不半載暴卒辛亥武勝軍節度使同平章事判許州錢惟演來朝惟演以疾求赴京師也五月甲寅賜信州龍虎山漢天師張道陵二十五世孫乾曜號虚靖先生按宋史本紀賜號澄素先生以其孫見素為試將作監主簿仍令世襲先生號蠲其租課乙卯詔三班使臣本文吏子孫年二十五以上許量試筆札讀律與換文資丙辰大雷雹戊午詔審官院京朝官任廣南西川而當遷官者文字已至院雖罷任亦許磨勘以聞先是太子中舍知大寜監尹仲宣自陳改官自去秋已滿三年雖齎閥閱上有司于今不報如此則逺方官吏俟代乃得考校常引嵗月與詔限不相應因下此詔己未選諸州皷角匠置武嚴指揮𨽻太常辛酉御崇政殿録繫囚六月癸未朔命内侍右班都知楊守珍試武舉人弓馬于軍噐庫癸巳監修國史吕夷簡等新修國史於崇政殿初太祖太宗正史帝紀六志五十傳五十九凡一百二十卷至是修真宗史成増紀為十志為六十傳為八十總百五十卷故事史成由監修而下皆進秩而夷簡固辭之甲午修國史夏竦同修國史宋綬馮元編修官王舉正謝絳李淑黃鑑管勾内臣韓守英承受藍元用羅崇勲供書皇甫繼明並遷官職龍圖閣待制馬季良專督三司應報文字亦賜勲一轉又各賜衣物有差鑑浦城人也初真宗以京師刑獄多滯寃置糾察司而御史臺詔獄亦移報之于是御史言其非體乃詔御史臺獄自今勿復闗糾察司乙巳御崇政殿試書判㧞萃科及武舉人戊申以書判㧞萃人宣州司理參軍曲江余靖為將作監丞知海陽縣安徳節度推官河南尹洙為武勝節度掌書記知河陽縣武舉人張建侯等十二人補三班奉職借職差使殿侍詔禮部貢院治尚書周易二經者自今皆分場考試明法以七同以上為合格時言者謂書易本兩科先朝并為一每經各問義五道舉人或偏習一經對及五同已為合格又明法科所對止取六同書少而易習請益以一經故更定之賜和州刺史劉從徳敇書奨諭從徳知衛州辟屯田員外郎戴融為同判融楚人善謟佞因率州人以千數妄言治有異状乞刻碑記之朝廷雖不許以太后故猶降褒詔從徳羙之子也縣吏李熈輔者善事從徳乃薦熈輔于朝太后喜曰兒能薦士知所以為政矣即日擢熈輔京官從事河南鄭􅋮因縁從徳亦擢羙官時監司以太后故多假借從徳獨轉運使王立按舉無所容秋七月丙辰詔以冬至有事於南郊丁巳詔修史官修國朝㑹要慶厯四年四月成書戊辰羣臣請上皇帝尊號曰聖文睿武體天欽道仁明孝徳上皇太后尊號曰應元崇徳顯功隆運仁夀慈聖皆不許表三上卒不許又手詔賜輔臣備述謙慤之意癸酉以鹽鐡判官兵部貟外郎直史館張宗象為契丹后生辰使香藥庫使李渭副之宗象佶子也乙亥命翰林學士宋綬馮元為初考制策官翰林學士章得象御史中丞王隨覆考知制誥石中立鹽鐡副使鞠詠編排自是御試制科人率如此例丙子御崇政殿策試賢良方正能直言極諫太常博士成都何詠茂才異等富弼詠弼所對策並入第四等丁丑以詠為祠部貟外郎同判永興軍賜五品服弼為将作監丞知長水縣詠邑里據登科記當考詔開封府曹官取選人歴任四考以上方揀選舉奏八月丙戌詔翰林學士盛度御史中丞王隨與三司詳定陜西兩池鹽法丁亥召近臣及宗室觀三聖御書于龍圖天章閣又觀瑞榖於元眞殿從臣賦詩賜御飛白字各一軸遂宴蘂珠殿戊子詔流人道死其妻子願還鄉里者所在給食送之其不當還者勿遣癸巳資政殿學士晏殊言唐明經並試策問參其所習以較才識短長今諸科專取記誦非取士之意也請終塲試策一篇詔近臣議可否咸以諸科非素習其議遂寢戊戌詔京朝官自今得替前轉官已及三年者與磨勘其任川廣替至闕而及三年者亦許之未及者候次任滿三年庚子中書言近制知縣入通判通判入知州不以有無過犯並三任其有五人保舉者减一任然則三任而無過乃與有過者無異徒長奔競之風請自今更不用舉主皆兩任而陞改之其有私罪及三犯公罪若徒以上仍舊三任從之癸卯以知滑州太常少卿集賢殿修撰李若谷為右諫議大夫知延州州有東西二城夾河夏秋水漲岸屢崩費役不可勝乃制石版為岸柙以巨木後雖暴水不壊官倉據山而貯榖少患瓦木之無以増廣若谷令依山作土囤囤可貯二萬斛後他郡多倣之此不必載若谷初除月日附見可也甲辰詔葺并州平晉縣回鑾寺丙午詔長寜節賜百官衣丁未徙判許州武勝節度使同平章事錢惟演判陳州知江寜府刑部尚書張士遜知許州戊申工部郎中龍圖閣待制梅詢為契丹生辰使供備庫副使王令傑副之度支貟外郎祕閣校理户部勾院王夷簡為契丹正旦使西染院使竇處約副之開封府判官侍御史張億為契丹后正旦使禮賓副使張士宣副之處約冠氏人元賔子舜卿父九月壬子詔長寜節天下建置道塲及賜燕並如乾元節其貢物留本處止奉表附驛以聞癸丑復置諸路提㸃刑獄官仍令所至毋得送迎其吏人約舊數裁減之不十日又廢不行丙辰罷百官轉對言事者頗衆大臣不悦也故復罷之乙丑樞宻副使給事中姜遵卒始病車駕臨視賜白金三千兩及卒又臨奠之輟一日朝贈吏部侍郎劉美家婢出入禁中大招權利樞宻直學士刑部侍郎趙稹厚結之己巳擢稹為樞宻副使命未出人馳告稹稹問東頭西頭盖意在中書世傳以為笑癸酉河北轉運使給事中胡則權三司使侍御史知雜事鞠詠言則丁謂之黨性貪汚不可復以利權任之不聽丙子賜臨江軍玉笥山人朱旦號善濟處士仍授其子煥本軍助教旦以醫術得召見故也祠部貟外郎直集賢院通判河南府謝絳雖在外數論事嘗奏近嵗不逞之徒託言數術以先生處士自名禿巾短褐内結權倖外走州邑甚者矯誣詔書傲忽官吏請嚴禁止先以墨敇賜封號者追還之絳言不得其時附朱旦後當考冬十月壬辰奉安太祖御容于太平興國寺開元殿陜西解州解縣安邑兩池嵗為鹽百五十二萬六千四百二十九石五十斤以席計為六十五萬五千一百二十席席百六十斤初以給京師及西京南京京東之兖鄆曹濟濮單廣濟京西之滑鄭潁陳汝許孟陜西之河中陜解虢慶成河東之晉絳慈隰淮南之宿亳河北之懐衛及澶州諸縣之在河南者縂府州軍二十八皆官役鄉户衙前及民夫謂之貼頭水陸漕運禁人私鬻京西之襄鄧蔡隋唐金商房均郢光化信陽陜西之京兆鳯翔同華耀乾涇原邠寜儀渭鄜坊丹延環慶秦隴鳯階成保安鎮戎及澶州諸縣之在河北者縂府州軍三十七聽商賈販鬻官收其筭并邉秦延環慶渭原保安鎮戎徳順九州軍乂募人入中芻粟償以鹽凡通商州軍在京西者為南鹽在陜西者為西鹽若禁鹽地則為東鹽各有經界防其越逸而三京二十八州軍官自輦鹽百姓困於轉輸頗受其弊有上書言縣官𣙜鹽得利㣲而為害博兩池積鹽為阜其上生木合抱數莫可較請通商平估以售少寛百姓之力乃詔盛度王隨議更其制度隨與權三司使胡則盡通商五利上之曰方禁商時官伐木造船以給輦運而兵力罷勞不堪其命今無復其弊一利也始以陸運既差貼頭又役車户貧人懼役連嵗逋逃今悉罷之二利也又船運河流有沉溺之患綱吏侵盗雜以泥砂硝石其味苦惡疾生重膇今皆得食眞鹽三利也國之錢幣謂之貨泉盖欲使之通流而富室大家多蔵鏹不出故民用益蹙今得商人六十餘萬頗助經費四利也嵗减鹽官兵卒畦夫傭作之給五利也丙申詔曰池鹽之利民食所資申命近臣詳立寛制特弛煩禁以惠黎元其罷三京二十八州軍𣙜法聽商賈入錢若金銀京師𣙜貨務受鹽兩池此據本志或云上書者王景也景嘗言池鹽之利唐代以來幾半天下之賦太宗時法令嚴峻民不敢私煮煉官鹽大售真宗務緩刑罰寛聚歛私鹽益多官鹽日虧景時為選人始建通商之策大臣咸言其不便太后力欲行之謂大臣曰聞外間多苦鹽惡信否對曰惟御膳及宫中鹽善爾外間皆食土鹽太后曰不然御膳多土不可食或議通商何如大臣皆以為如是則縣官必多所耗太后曰雖棄數千萬亦可耗之何害大臣乃不敢復言故命盛度等與三司詳定利害卒行景策詔下蒲解之民皆作感聖恩齋此據司馬光記聞自是雖商賈流行而嵗課之入官者耗矣此據實録丁酉占城國遣使來貢方物己亥以内殿崇班閣門祗候趙振子珣瑜並為三班借職珣瑜善騎射舞鐡鞭召試崇政殿以其材勇絶人特録之壬寅置天章閣待制位龍圖閣待制之下命鹽鐡副使禮部貟外郎鞠詠兼侍御史知雜事權判吏部流内銓范諷為之癸卯以兵部郎中龍圖閣待制韓億為樞宻直學士知益州代程琳也琳在益州上元張燈州人夜聚遨逰琳先戒火備曰有火則隨救之勿以白已而果有火終燕人無知者或告振武軍變琳曰軍中動静我自知之茍有謀不待告也蜀民歳為社祠灌口神有妖人自名李氷神子置官属吏卒聚徒百餘琳捕其首斬之而配其社人于内地道路或以為寃事聞朝廷遣内侍張懐徳馳視懷徳視蜀既無事還奏得解益州故事歲出官粟六萬石糶貧民億至㑹歳大旱令先期倍數出粟予民又䟽九昇江口溉田數千頃億明年四月乃到益州出粟䟽江今附見詔三班使臣監當一任回别無遺闕並依舊條却與監押廵檢差遣所有天聖六年正月敇勿行權判流内銓王隨言在京文武臣僚奏舉幕職州縣官充京官奏状多無印記難辨真偽欲乞今後舉官並用舊條奏状年月邉貼黃明言使某處印其貼黃亦須用印記方許于閤門投進所貴乆逺有憑從之十一月乙卯西上閤門副使勾當翰林司郭承祐除名配岳州衙前編管父比部貟外郎世隆特勒停承祐從義曽孫娶舒王元偁女坐盗御酒及用上方金噐法當死特貸之世隆亦嘗受所盗物也戊午卭部川都蠻王黎在遣卑郎離滅等來貢方物丙寅朝饗景靈宫丁夘饗太廟戊辰合祀天地于圜丘大赦賀皇太后于㑹慶殿戚里有毆妻致死更赦事發者太后怒曰夫婦齊體奈何毆致死耶權知開封府冦瑊對曰傷居限外事在赦前有司不敢亂天下法卒免死十二月癸未加恩百官庚寅給江寜府學田十頃從張士遜之請也辛夘詔京朝官自今陳乞移替者其磨勘轉官無得以在任嵗月并計之壬辰以雷州司户參軍丁謂為道州司户參軍始南郊肆赦中外疑謂必將内徙刑部貟外郎兼侍御史知雜事劉隨言彼擅移于陵域将不利于君親只合取彼頭顱置諸郊廟殿中侍御史張鍚言謂姦邪弄國罪當死無可憐且大臣竄逐本與天下棄之今復還是違天下意由是止徙道州張唐英政要云劉隨以諫官論丁謂本傳亦具載于未出知齊州已前盖誤也隨罷諫官踰年矣今年十月乃由起居郎為貟外兼知雜御史歐陽修誌張鍚墓云鍚以監察御史論丁謂本傳因之不知鍚七年七月已遷殿中侍御史矣權知髙麗國事王珣遣御事民官侍郎元頴等來貢方物乙未詔長寜節百官上夀于崇政殿初上謂輔臣曰昨郊禮畢朕嘗率文武百官諸軍将校賀皇太后于㑹慶殿明年長寜節冝定百官上夀儀下太常禮院議而太后不欲御㑹慶乙未詔上夀于崇政殿既而復就㑹慶辛丑詔翰林學士宋綬天章閣待制范諷以七年五月庚午詔書考次國朝以來文武官之子孫合預推恩者以聞其曽任中書樞宻院及使相子並為校書郎或三班奉職弟侄孫為試寺監主簿少卿監以上為太廟齋郎節度使上将軍子為三班奉職餘為借職大将軍至刺史以上子為借職餘為下班殿侍三班差使推恩等第在九年五月今并附此癸卯契丹遣天徳軍節度使蕭昭古引進使竇振來賀皇太后正旦甲辰遣啟聖軍節度使耶律元吉少府監崔潤來賀正旦丁未定難節度使西平王趙徳明遣使來獻馬七十匹乞賜佛經一蔵從之詔自今御史臺官并三司判官開封府推判官差出勘鞫公事或已請驛料外並依舊支與本職添支
