body:
  text: 續資治通鑑長編巻三百四宋李燾撰神宗元豐三年五月癸亥朔權管勾熈河路經畧司趙濟言熈州雜支錢止六十餘千糴買錢止八百餘千馬料僅支兩月即其他州軍亦可槩見望敕轉運司豫計度上批可下熈州并轉運司各以見在倉庫錢糧對比去年李稷未到任以前數保明奏又詔潭全邵州民出修城夫錢減二之一潭州須歲稔興工全邵州以五年為限又手詔御史臺復六察案剏法之始職事甚劇無容久闕正官以稽功緒其見闕御史二人令李定限十日以名聞月增添支錢中丞二十千察案御史十千尋以司農寺丞王祖道知封丘縣豐稷並為監察御史裏行祖道福州人也祖道初為裏行乃六月一日今并書之江淮等路發運司言導洛通汴司已修狹河道更不置草屯浮堰從之時以汴水淺澁發運司請以草為堰壅水以通漕舟至是復自請罷云甲子禮院言司天監定九月辛巳有事于明堂詔恭依命宰臣王珪為明堂大禮使知樞宻院馮京為禮儀使同知樞宻院孫固為儀仗使參知政事蔡確為鹵簿使章惇為橋道頓遞使詳定禮文所言看詳明堂者王者之堂所以上事天下治人也其地在國之中王者嚴父配天於此而月吉以聽朔焉故孝經曰宗祀文王於明堂以配上帝而禮記曰天子聽朔於南門之外盖為五室十有二堂月令所謂青陽明堂太廟總章𤣥堂各有左右个天子分十二月居之而考工記匠人云夏后氏世室堂脩二七廣四脩一五室三四步四三尺九階四旁兩夾窻白盛門堂三之二室三之一殷人重屋堂脩七尋堂崇三尺四阿重屋周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵鄭氏謂世室宗廟也重屋路寢也夏舉宗廟商舉路寢周舉明堂互言之明同制也自漢武帝始作明堂出於詭說以茅盖之水圜宫垣為複道上有樓從西南入名曰崑崙違經背古其後議者紛紜至引天地四時風氣乾坤五行數象之類盖已不勝其誕矣遂令世主無所適從重於制作至於嚴配因寓郊丘本朝親祠明堂寓於大慶殿大慶路寢也然非明堂其有司攝事亦寓郊丘其五室十二堂九階縁後世不即以聽政及脩廣之度謂宜量時增損取適於世至季秋大饗以及嚴奉英考配天之義又言謹案詩周頌我將祀文王於明堂我將我饗維羊維牛維天其右之蓋祀帝於郊以天道事之饗帝於堂以人道事之以天道事之則雖配帝用犢禮所謂帝牛不吉以為稷牛是也以人道事之則雖天帝用太牢詩所謂我將我享維羊維牛維天其右之是也晉傅元推本此意而為之說曰於郊尚質於明堂尚文文質之變牲牢則異摯虞之議曰明堂之祭備物以薦三牲並陳籩豆成列禮同人理故配以近考宋書志亦曰郊以特牲明堂牛羊吉蠲雖同質文殊典惟梁儀曹郎朱异以為舊明堂皆用太牢五帝既曰天神理無三牲之祭而詩我將祀文王於明堂有維羊維牛之說周用三牲止為一代之制今斟酌百王明堂用特牛自此迄于隋唐皆用特牛非所謂以人道饗上帝之意也皇祐大享明堂用犢七以薦上帝配五方帝用豕各五以薦五人帝熈寧故事禮院參詳昊天上帝配帝各用犢一羊一豕一五帝五人帝共用犢五羊豕各五皆未應禮臣等看詳禮以角繭栗謂之犢角握角尺謂之牛犢者誠慤是以小為貴故凡犢則特薦之所謂祭天特又曰用犢者貴誠非可與羊豕相參也若牛與羊豕各一則謂之太牢宗廟賓客俱用太牢是也今來明堂親祠上帝配帝五方帝五人帝伏請各用牛一羊豕一禮文兩事皆無月日又未知從違按七月二十七日丁亥詔以英宗配上帝悉罷從祀羣神八月十二日壬寅又依趙君錫等議專配上帝今禮文所奏尚稱配帝五方帝五人帝則必不在八月十二日後或在七月二十七日前也五月二日甲子初降指揮今取此二奏並附五月二日指揮下更須考詳權御史中丞李定請增置臺主簿一員㸃檢六察文字從之二年十二月丙午增置臺官一員當考權都水監丞蘇液言分黄河八都大應管逐埽職事繪成圖令都水監倣此每歲首編進從之御史范鏜言開封府判官趙子幾知祥符縣唐彀皆癃病職事廢弛詔子幾與宫觀彀令提㸃司體量以聞彀遂罷翰林學士兼詳定禮文張璪言伏見天地合祭議者不一而臣竊謂陽生於十一月隂生於五月則陰陽之生天地致用之始先王於是順陰陽之義以冬日至祀天於地上之圜丘夏日至祭地於澤中之方丘以至牲幣器服詩歌樂舞形色度數莫不倣其象類故天地神祇可得而禮由此觀之夏日至祭地於方丘而天子親涖之此萬世不可易之理也議者以為當今萬乘儀衞加倍於古方盛夏之時不可以躬行乃欲改用他月不惟無所據依又失所以事地順陰之義必不得已臣以謂宜即郊祀之歲於夏至之日盛禮容具樂舞遣冢宰攝事雖未能皆當於禮庶幾先王之遺意猶存焉詔禮院速詳定以聞先是詳定禮文所言臣等看詳古者祀天於地上之圜丘在國之南祭地於澤中之方丘在國之北其牲幣器用歌詩奏樂亦皆不同凡以順陰陽因髙下而事之以其類也漢元始間以祀樂既各有合而禮又有夫婦共牢之文於是合祭天地以隆一體之誼後漢光武至魏之黄初與夫東晉元帝及唐武后以來皆因仍之非所謂求神以類之意本朝親祠上帝即設皇地祇位雖盡其恭事之誠而稽之典禮則有所未合詔詳定官具合更改禮文以聞而陳襄李清臣王存陸佃等各以所見列上襄言謹案周禮大司樂以圜鍾為宫冬日至於地上之圜丘奏之六變以祀天神以函鍾為宫夏日至於澤中之方丘奏之八變以祭地祇夫祀天必以冬日至者以其陽氣來復于上天之始也故宫用夾鍾于震之宫以其帝出乎震也而謂之圜鍾者取其形以象天也三一之變圜鍾為宫三變黄鍾為角太蔟為徵姑洗為羽各一變合陽竒之數也祭地必以夏日至者以其陰氣濳萌于下地之始也故宫用林鍾于坤之宫以其萬物致養于坤也而謂之函鍾者取其容以象地也四二之變函鍾為宫太蔟為角姑洗為徴南吕為羽各二變合隂偶之數也又大宗伯以禋祀實柴槱燎祀其在天者而以蒼璧禮之以血祭貍沈疈辜祭其在地者而以黄琮禮之皆所以順其陰陽辨其時位倣其形色而以氣類求之此二禮之不得不異也故求諸天而天神降求諸地而地祇出得以通精誠而迓福釐以生烝民以阜萬物此百王不易之禮也去周既逺先王之法不行漢元始中姦臣妄議不原經意附㑹周官大合樂之說謂當合祭平帝從而用之故天地共犢禮之失自此始矣由漢歴唐千有餘年之間而以五月親祠北郊者惟四帝而已如魏文帝之太和周武帝之建徳隋髙祖之開皇唐睿宗之先天皆希濶一時之舉也然而隨得隨失卒無所定垂之本朝未遑釐正恭惟陛下恢五聖之述作舉百王之廢墜典章法度固已比隆先王之時矣豈襲後世一切之禮乎是以臣親奉徳音俾正訛舛之禮首宜正其大者大者不正而末節雖正無益也况天地歲祀今亦不廢顧惟有司攝事而已誠未足以上盡聖人恭事之意也臣以謂既罷合祭則南北郊自當别祀伏請陛下每遇親祀之歲先以夏日至祭地祇於方丘然後以冬日至祀昊天於圜丘此所謂大者正也然議者或謂先王之禮其廢已久不可復行古者齋居近古者致齋路寢儀衞省用度約賜予寡故雖一歲徧祀而國不費人不勞今也齋居逺儀衞繁用度廣賜予多故雖三歲一郊而猶或憚之况一歲而二郊乎必不獲已則三年而迭祭或如後漢以正月上丁祀南郊禮畢次北郊或如南齊以正月上辛祀昊天次辛瘞后土不亦可乎臣竊謂不然記曰祭不欲疎疎則怠夫三年迭祭則是昊天大神六年始一親祠得無已怠乎記曰大事必順天時致之郊周公之制也舍是而從後王之失禮可謂法歟彼議者徒知茍簡之便而不睹尊奉之嚴也伏惟陛下鑒先王已行之明效舉曠世不講之大儀約諸司之儀衞損大農無名之費使臣得以講求故事參究禮經取太常儀注之文以正其訛謬稽大駕鹵簿之式以裁其繁冗惟以至恭之意對越大祇以迎至和以格純嘏庶成一代之典以示萬世清臣言恭惟本朝冬至祀天南郊夏至祭地北郊每歲行之皆合於古猶以有司攝事為未足以盡志於是三年一郊而親行之夫三年一郊而親行之蓋所謂因時制宜者也施之於今誠不可易惟合祭之禮在所當正禮曰魯人將有事於上帝必先有事於頖宫所以然者告祖為配之謂也又曰魯人將有事於河必先有事於惡池齊人將有事於泰山必先有事於配林所以然者先卑後尊之謂也臣推古以知今推諸侯以知天子欲乞再遇親郊七日戒後三日宿之時宿太廟以告宿北郊以祭宿南郊以祀所以先太廟者吿祖為配也所以先北郊者先卑後尊也雖然自北郊至南郊相去為逺則中道不可以無舍請為帷宫止而後進如允所奏乞下有司施行按後漢因祠南郊即祠北郊明堂世祖廟及太廟謂之五位唐因祠南郊即祠太清宫及太廟謂之三大禮本朝三歲郊祠必先及景靈宫及太廟蓋因前制然每歲夏至於北郊自有常祀兼常歲有司攝事於南郊亦不合祭天地其合祭之意止縁親祠欲徧及爾若親祠欲徧及之則因南郊回特告祭北郊自因舊儀亦不背違禮意近于可行伏乞更賜參酌存言按周禮以冬至祀昊天上帝於圜丘以夏至祭皇地祇於方澤各順其時皆天子親之至秦漢間先王之禮廢孝武粗定郊祀始至雍曰今上帝朕親郊而后土無祠則禮不答也遂幸汾陰祠后土由是甘泉太一汾隂后土三年親郊著為故事至元始間王莽建議乃合祀天地於南郊至比夫婦同牢而食後漢至唐因仍不革國朝承用舊禮有司未遑講議今既奉詔考詳得失則合祭非禮所當改正然王者父天母地奉事必均三年大禮不可加數既罷合祭則親郊止於上帝而不及皇地祇於義未盡國家用冬夏至遣官攝事於二郊葢用周禮未嘗廢也其三年一有事於南郊同漢制若間有事北郊則不失恭事天地之意先朝親耕耤田祫享太廟皆因三歲之期暫輟郊丘之祀此則已行之故事也况自宗祖以來雩祀祈穀明堂耤田祫享恭謝皆曠世大儀率已修舉北郊皇地祇未嘗親祭若因罷合祭非禮發自聖意而行之實希濶之盛事也三年親祠自漢以來以為非常之禮必備物而後動者不可以不相天時漢唐之間祀天有用正月有用二月有用三月有用四月有用八月有用十月有用十一月有用十二月祭地有用正月有用二月有用三月有用五月有用十一月有用十二月歴代祀天地之月日率皆不同蓋因時施宜不相沿襲祥符中真宗祀后土以二月至如神州地祇自前世以來皆祭以孟冬若國家時舉墜典間有事於北郊用孟冬純陰用事之月日理無不可乞自朝廷裁擇佃言看詳天地合祭非古也然古者因郊上帝别祀地祇則祀地又不可廢顧無合祭之禮爾盖地縁祀天以故特祠則雖祠地祇亦事天而已故中庸曰郊社之禮所以事上帝也三正記曰郊後必有三望春秋亦書不郊猶三望其傳曰望郊之細也以臣考之望祭或在郊之明日或以其日雖不可知然要之郊後必有望祭明矣書曰肆類于上帝禋于六宗望于山川望地祭也不言祭地祭地可知也今或冬日至親祠昊天上帝因即圜丘之北别祠地祇不崇朝而天地之祠畢舉考先王之意度當世之宜似或可行議者若謂祭地當在北郊則此因郊特祠本非正祭且春而朝日於東門之外則與夏至北郊祀地無異然大報天而主日配以月皆兆於南郊則皇地祇因天特祭自與夏至正祠不同祠之南郊禮宜然也陸佃以二年正月由光禄寺丞詳定說文兼詳定禮文此必在二月正月後佃等議未決璪又兼詳定因建此議張璪以翰林學士兼詳定在今年正月於是禮官請如璪議設宫縣樂文武二舞改制樂章用竹冊匏爵增配帝犢及捧俎分獻官廣壇壝齋宫修定儀注上之而判太常寺王存知禮院曾肇言今北郊常差中書門下官乃冢宰之任樂舞之類亦是開元開寳舊禮所載特近世廢闕二者皆有司攝事常行之典未足以代親祠之重必以為有所未備而欲悉行舊禮則天地宗廟之祀舉當釐正不可獨以三歲一施於方丘也大率古之祭祀或天子親行或有司攝事不過此二者而已今於攝事之中又分隆殺蓋古所未有也且遣官雖重終非親祠恐於父天母地之義有所未順璪本以合祭非禮欲革去之然其所陳於禮亦未見其可况今歲大享明堂固自不及皇地祇而於夏至之祭特有所隆此尤非所宜也今年夏祭皇地祇若依璪請即乞如前所陳天地宗廟之祀舉當釐正然今夏至日逼亦恐未可遽行即乞且依舊制其親祠之禮仍乞詔詳定郊廟禮文所精加講求裁定其當以正後世之失庶合先王之意判太常寺李清臣亦言天下大事莫過天地之祀萬世觀法未易輕言况本議親郊之歲當罷合祭則親祠不及地祇故璪欲於常禮之外獨隆北郊用補禮意之不足而今歲適明堂大享自非親祠南郊於皇地祇未闕常禮若今年夏至且用舊儀更使禮官從容講求俟獲義理所安然後舉而行之則其便甚明縱謂異日極論不過如此然夏至已近而樂舞未修樂章未製八變之音未及習齋祭之服未及成齋宫未及立壇壝未及廣牲犢未嘗在滌竊慮有司速於應辦或致滅裂有失嚴恭伏乞聖意更加詳酌上批張璪之議在今所宜固無以易考循舊典既親祠明堂則皇地祇自不及之可如清臣言逡廵以盡衆說遂詔禮院更加講求八月壬寅明年四月己巳當考佃又言謹按春秋僖公三十有一年夏四月四卜郊不從乃免牲猶三望左氏曰猶三望非禮也望郊之細也不郊亦無望可也據此不郊乃無方望則有遇祀天及地神而有方望之事明矣故禮三正記曰郊後必有三望先儒以為助天布功是以祭天及之皆於郊之明日且地之神以縁天徧祭則雖祭地祇實亦事帝而已故中庸曰郊社之禮所以事上帝也竊觀張璪所請陛下親郊夏日至祀地自如璪議其冬至祀天之明日准古方望之事因令祠地北郊而以海嶽四瀆山林川澤之神凡在圜丘壝陛舊從祭者皆得與享亦遣冢宰攝事並如夏至祀儀是則親行大禮合祭雖革而天地之神自得用類以禮從祀以昭陛下尊天親地之義然而郊後必有方望之事經證明白固當考復至於祠地雖未有顯據而臣以倫類求之方望且祠則地祇助天布功又其大者安得而遺也謹按舜典類有上帝而無日月星辰禋有六宗而無太祖望有山川而無大祇周官大宗伯祀有上帝而無五帝有司中司命而無司禄祭有社稷五祀而無大祇有嶽而無四瀆有山林川澤而無丘陵墳衍享有先王而無先公則祀所秩上下比義皆從可知故也恐臣末學所論尚不至乞以聖意裁之詔下詳定所而詳定所以為佃既稱未有顯據即於理難以施行詔右侍禁閤門祗候楊琰候二年遷一官初詔琰永不磨勘至是以修太皇太后皇堂故遷之也乙丑閤門言每歲盛暑御後殿便於決事乞自五月一日至七月終當御前殿日閤門取㫖如得㫖御後殿即放朝參詔自今三伏内五日一御前殿荆湖南路安撫司言知邵州關把議於溪峒徽誠等州鎮立城寨屯兵及守禦招納之䇿乞下轉運司相度詔謝景温朱初平趙楊相度利害及處置後經久不致生事保明以聞其後建置如把議八月四日如把議九月十六日可考編修學制所言奉㫖立勢要及國子監生太學官親屬許不以鄉貫就開封府應舉之法臣等看詳監以國子為名而無國子敎養之實恐未稱朝廷建學育士之意乞應清要官親戚並令入監聽讀以二百人為額解發毋過四十人從之丙寅詔市易務於封樁免夫錢内借支十二萬緡償景靈宫東所占民屋居價錢以修神御殿頗侵民居故也戊辰詔祕書監致仕劉几乘驛赴詳定禮文所議樂几前知保州年六十一遂致仕今十二年矣几嘗謂律主於人聲不以尺度求合古今異時聲亦隨變猶昔之衣冠使今人被之乃所不稱儒者泥古詳於形名度數之間而不知清濁輕重之用故求於器雖合諧於聲則不能入徒紛紛也嘗遊佛寺聞鐘聲曰聲澌而悲不利主者至夕主僧斃在保州聞角聲曰宫微而商離守臣憂之以秋為應至期而几疾其洞曉如此然所學多雜鄭衛已已祕書監髙賦罷知蔡州客户請射田追收已給關子以權提㸃京西北路刑獄張復禮奏賦括民契外地及奪下户閑田募客户自占境内騷擾也庚午宰臣王珪言弟職方郎中珫昨管勾大行太皇太后山陵使司牋表乞推恩詔以珫為蔡河撥發詔蠲故樞宻直學士陳襄所負侵用杭州公使錢五千緡以襄卒故不追詔知沅州客省副使謝麟再任遷一子官洺州平恩縣指使三班差使王奎乞解官持父䘮許之仍詔兵部自今有請如奎比者宜即聽許辛未詔中書别議措置三司帳法蘇轍元祐元年奏議當考又詔官司違慢應面奏者令御史臺中丞知雜同本察官上殿或具聞奏餘申中書初御史臺請非應奏從臺關所屬鞫罰吏人或改正不許也又請諸路提舉官提㸃刑獄已𨽻臺檢察開封府界提㸃提舉司發運輦運撥發提㸃鹽事糴便糧草市易鹽稅坑冶鑄錢茶塲淤田營田司及河北屯田司陜西制置解鹽司經制熈河路邊防財用司措置陜西縁邊四路邊防公事司外都水監丞司提舉買馬監牧司麟府路軍馬司諸路經畧總管安撫鈐轄司亦合𨽻臺檢察從之詔河北陜西路廵檢兵既代以義勇保甲其請給可依開封府界河東路封樁季具帳報樞宻院及兵部充義勇保甲廩給之費癸酉詔自今見任外官不許試刑法詔翰林學士李清臣罷知審官西院清臣以修兩朝史求罷兼局故也詔提舉敎習馬軍所見敎臣僚子弟并百姓步射弓一石力短箭前後手足皆應法者遇赴敎日可於封樁闕額禁軍米内人給三升御集一百二十一巻手劄熈寧七年九月十九日甲寅十年九月二十三日庚午元豐二年五月十四日辛巳三年六月十八日己酉五年十一月十七日甲午當并考詔增代州繁畤縣令一員仍以使臣為都監甲戌知廬州工部郎中韓宗道權發遣䖍州太子中允劉載各罰銅十斤楚州稅務監官並差替坐前在淮南轉運司以楚州市易務鬻民納稅綿絹作違詔不行及許稅務違詔稅市易竹木等故也乙亥詔自今上四軍歲滿止差中軍交替詔司農少卿前知衞州魯有開罰銅二十斤通判幕職官汲縣主簿尉並衝替廵河部役官追官勒停差替並坐河溢失救䕶也光禄寺丞知汝州襄城縣于右追毁出身文字除名編管衡州坐姦盗也九月十四日癸酉責舉主詔内東門裏進食門名曰㑹通詳定重修編敇所言見修敕令與格式兼行其唐式二十巻條目至繁又古今事殊欲取事可海行及一路一州一縣在外一司條件照㑹編修餘送詳定諸司敕式所從之十五日八月九日二年六月二十四日可考丁丑詳定重修編敕所言奉詔月具功課以聞縁參取衆議研究義理及照㑹牴牾重復遺畧正是難立課程之時乞免奏功課不許仍詔中書立式詔利州路轉運使劉忱徙梓州路代髙秉秉留本路聽㫖時方置獄劾王宣等陷没事也河東縁邊安撫司乞移牒止約北人縁邊創置舖屋上批如北人於分劃壕堠之北修建城池即是有違誓書若止增鋪屋毋得止約或於土門以東接真定界以南侵犯增鋪屋壕堠即先諭以理道不從即約䦨出界續詔若北人果有創增本界未有鋪屋合關防處相度增置先畫圖以聞麟府路走馬承受陵中言聞府州久良津賈胡疃有北人拆界壕石􅉹取水詔河東路經畧司宻體量當如何處置其本處斥堠不謹亦案劾之詔京朝官選人班行試經義律令大義上等一人減磨勘二年試法官人上二人差充法官第三人第四人差充習學公事第五至第七人循兩資下三人循一資餘以次推恩戊寅幸蜀國長公主第視疾次幸陳國長公主第己夘蜀國長公主薨主下嫁王詵詵母盧寡主居之第側膳羞必先擇珍異者致之盧有疾主日至榻下自和湯劑以進詵家姻黨皆周卹之中外稱賢主疾甚皇太后皇后臨問主初弗省皇太后慟哭久之主稍能言訴必不起因相持而泣上繼至見主羸瘠伏席而泣墮淚沾濕上自診主脉集衆毉詰所以治疾狀親持粥食之主為上强食翼日以不起聞上未朝食即駕往望第門而哭賜主家錢五百萬輟朝五日命入内副都知蘇利涉治䘮事禮視秦國大長公主毋拘令式追封越國諡賢惠主性不妬詵侍主疾與婢姦主旁婢數抵戾主有後言詵復與應和及薨乳母訴之上命有司窮治婢八人皆決杖配窰務車營兵主既葬詵奏俟罪上批詵内則朋淫縱欲失行外則狎邪罔上不忠長公主憤愧感疾弗興皇太后哀念累月罕御玉食職詵之辜義不得赦可落駙馬都尉責受昭化軍節度行軍司馬均州安置舊紀書五月己夘蜀國長公主薨詔貶駙馬都尉王詵昭化軍節度行軍司馬新紀不書庚辰毉官陳易簡罰銅六十斤沈士安三十斤杜壬追兩官國子四門助教楊文蔚追一官並勒停治疾無驗也辛巳詔潁昌府進士劉堂上制盗十策觀其為文雖未優長然頗知世務言不悖理有可嘉者茍所論由衷若試官以事或能以材自顯可召赴中書參考其實今本房檢正官以應干縣尉捕盗條付堂看詳尋録堂為徐州蕭縣尉癸未江陰縣主簿太學博士崇文院校書蔡卞為修國史院編修官初以林希為之尋命使髙麗不樂行被黜至是復召為編修官而御史何正臣以為言故以卞代之正臣又言近日舉官鮮以寒士為意利禄所厚多在貴游之家而市易為甚望詔中書取索在京應舉差或權差已到未上官有無本族外姻在朝食禄取㫖去留以示公義乞自今舉官並依舉京官縣令式具親屬詔劄與都提舉市易王居卿仍令中書立法權發遣鄜延路鈐轄曲珍乞奏請以徳順軍界祖父弓箭手地改正户名如不可則乞以錢輸官詔曲珍累有戰功其地四頃半特賜之權江淮發運副使盧秉言黄河入汴水勢湍激綱船破人數多今清汴安緩理宜裁減今定六百料重船上水減二人下水減二人空船上水減二人下水減三人餘以次差減從之朱本削去新本亦削去甲申命涇原路總管兼第一將四方館使忠州團練使韓存寳都大經制瀘州蠻賊事聽選本將及陜西并東兵萬人自隨其義軍弩手亦聽選揀舉使臣四十人候行兵日先諭兩屬夷户並令安居如願隨軍討賊亦聽本路官兵並受節制又命内藏庫使忠州刺使權發遣荆湖北路鈐轄彭孫提舉捉殺瀘州蠻賊聽舉使臣二十人選馬步三千自求便路進討如與韓存寳軍㑹聽存寳節制舊紀書涇原路總管韓存寳經制瀘州蠻賊新紀書復命詔改都大提舉導洛通汴司為都提舉汴河隄岸司二年二月二十一日初置導洛通汴司八年五月三日罷所收課利詔耤田令𨽻太常寺月給添支錢七千上批陳國長公主子王殊王殖可轉五資乙酉賜駕部員外郎管勾崇福宫孫京紫章服潁昌府父老等茶綵有差京等六百二十二人以陞潁昌府詣闕謝上召見勞問曰卿冒暑逺來䟦涉良勤故賜之梓夔路鈐轄司上瀘州路分都監王宣等所部親兵不救護主將分三等詔並免死決配第一等十八人廣南逺惡州軍牢城遇赦不還第二等四十七人荆湖牢城第三等十五人千里外牢城内重傷人免杖丙戌起居舍人龍圖閣待制知審官西院沈括知青州先是兩日括除知審官御史滿中行言括自小官不數年至翰林院學士不能終始一心盡事君之節乃陰附大臣傾害政事斥逐未久遽復從官中外固已疑駭今又召還朋姦射利之徒莫不觀望為之揺動欲望原其操行除一外任故有是命後七日改知延州中行又言聞衞州敎授蔡蹈因罰生員謝瓛乃簽書判官謝京之姪憑恃州官親屬慢罵師長蹈以學制屏斥京遂案州學買酒事以快私怨置獄踰年未決知州李端慤擅差禁軍監守蹈家絶其醫藥飲食又遣公人突入蹈家慢令陵政莫斯為甚望察端慤京情狀特行貶降詔轉運司催結正如端慤京該赦降或去官亦具情節以聞後端慤罰銅十斤謝京差替御史臺言㸃檢三司自熈寧八年盡去年官物文簿不結絶百九十事詔大理寺劾官吏失銷簿罪鄜延路經畧使呂惠卿言並邊堡鋪烽火止是直報本寨未嘗東西相報及報鄰寨上横烽法式詔諸路相度推行秦鳳路經畧司言近制馬軍自十月一日馳射野戰至穀雨日止縁塞上地涼乞自八月一日起五月一日止從之仍詔河東陜西諸軍凖此本志附此詔於二年五月今不取詔詳定重修編敇所詳律意先詳定案問欲舉條以聞其後詳定所奏犯罪因疑被執贓證未明經問具狀者聽准自首減等法至今行之此據朱本至今謂紹聖間也又詔中書户房三司并提舉帳司官先取京西路帳措置立法以聞詔蠻人知歸徠州乞弟作過傍近蠻族或兩屬蠻如能斬獲乞弟者若願知歸徠州即與本州刺史月給茶綵若願受漢官與内殿承制賜銀千兩絹千匹或能捕斬以次頭首即第賞其乞弟下蠻人如自能殺乞弟首及以次頭首亦凖此降赦榜於蠻人出入要路及遣招安將等深入以曉告之都水監丞言同外監丞并諸都大議黄河諸埽向着退背分三等㑹兵夫物料數乞令判監一員案視推行詔遣判監劉定三年正月十八日以兵部員外郎張唐民屯田員外郎權發遣河北提㸃刑獄劉定並權判都水監六月十五日又除提刑兼義勇保甲都大經制瀘州蠻賊事韓存寳言所領正兵萬五千人依九軍陣法分𨽻行營四將詔以皇城使雅州刺史涇原路鈐轄姚兕為第一將莊宅使權鄜延路都監吕真為第二將洛苑副使兼閤門通事舍人涇原路第五副將孫咸寧為第三將西京左藏庫副使涇原路第四副將郭振為第四將己丑知延州吕惠卿言修成五路條約乞許赴闕面奏以禀得失從之惠卿尋遭母䘮朱本於六月五日丙申特書詔吕惠卿赴闕按惠卿家傳惠卿母實卒于京師六月初惠卿乃聞之恐召惠卿不在六月今從墨本家傳載惠卿廵邊等事或稍刪取之然亦不足載也庚寅詔韓存寳彭孫毋以蜀中浮浪舉人自隨上批存寳昨討瀘州羅胡茍姓夷賊日常有約束毋收用浮浪舉人可劄與存寳孫故也詳定朝㑹儀注所言今定大慶殿之後門内東西設幄為閤又於殿扆左右設帟於東西房以為乗輿出入所由之地又言朝㑹所陳平輦逍遥舊設於西朶殿今宗室坐西朶殿賜酒欲移平輦等陳於東西龍墀上並從之青州臨胊益都石化為麫民取食之新紀書此
