body:
  text: 續資治通鑑長編巻一百宋李燾撰仁宗天聖元年春正月丙寅朔皇太后詔改元上讀詔號泣者久之謂左右曰朕不忍遽更先帝之號也庚午契丹遣鎮安節度使蕭師古咸州觀察使韓玉來賀皇太后長寜節宰相馮拯以疾在告上日遣内侍存問而拯數援山陵使故事上章求罷丁丑特遣入内副都知周文質齎手詔敦諭仍以所上章還之且戒有司勿受拯章壬午以度支副使兵部員外郎陳堯佐為知制誥史館修撰故事知制誥皆先召試於中書堯佐預修真宗實録特免試焉自宋興而吳蜀江南荆湖南粤皆號富强相繼降附太祖太宗因其蓄藏守以恭儉簡易方是時天下生齒尚寡而飬兵未甚蕃任官未甚冗佛老之徒未甚熾外無夷狄金繒之遺百姓亦各安其生不爲巧僞放侈故上下給足府庫羡溢承平既久户口歲増兵籍益廣吏員益衆佛老外藩耗蠧中國縣官之費數倍昔時百姓亦稍縱侈而上下始困於財矣權三司使李諮嘗奏事兩宫言天下賦調有常今西北寢兵二十年而邊餽如故他用寖廣戍兵雖未可減其末作浮費非本務者宜一切裁損以寛斂厚下鹽鐡判官俞獻卿亦言天下穀帛日益耗物價日益高欲民力之不絀不可得也今天下穀帛之直比祥符初増數倍矣人皆謂稻苖未立而和糴桑葉未吐而和買自荆湖江淮間民愁無聊轉運使務刻剥以増其數歲益一歲又非時調率營造一切費用皆出於民是以物價益高民力積困也陛下試以景德中西戎内附北敵通好最盛之時一歲之用較之天禧五年凡官吏之要冗財用之盈縮力役之多寡釋道之増減較之可知其利害也况自天禧以來日侈一日又甚於前夫巵不盈者漏在下木不茂者蠧在内陛下宜知其有損於彼無益於此與公卿大臣朝夕圖議而救正之上納其言癸未命御史中丞劉筠提舉諸司庫務薛貽廓與三司同議裁減冗費又詔中書樞密院同議塞滑州决河河入中國行太行西曲折由山間則不能為大患及出大伾走東北赴海更平地二千餘里禹迹既堙河并為一而特以隄防為之限夏秋霖潦百川衆流之所㑹時不免有决溢之憂然有司之所以備河者亦益工矣岸汨則易摧故聚芻藁薪條枚實石而縋之合以為埽凡埽之法若髙十尺長百尺其算以徑圍各折半因之得積尺七千五百則用薪八百圍史藁作薪五百圍芻藁二千四百圍所謂葦索心索底簍搭簍箍首索簽樁磕橛拐橛拽後橛其多寡稱所用若大小廣袤不同則隨時損益之而亦視此為率焉故凡置埽必仞水之深度岸之髙或疊二疊三四一埽之長居岸二十步而岸長或數百步或千餘步埽壞輒牽連而去又置埽以補救之其費動爲緡錢數萬凡埽初下水曰撲岸居上而捍水曰爭高闕地置之以備水曰陷埽埽實墊爲亡所患浮湍則危其巻埽之噐則有制脚木制木進木拒馬短長木籰大小石籰雲梯引橛推梯卓斧綿索鼓旗所以利工作而爲號令之節也凡度役事負六十斤行六十里爲一工土方一尺重五十斤取土二十步外者一工二十五尺上接邪高皆折計之水背向不常則埽各從地而易自河入中國至此皆因本志附此李清臣史藁載埽法尤詳本志刪取之國朝惟川峽廣南茶聽民自買賣禁其出境餘悉𣙜犯者有刑在淮南則蘄黄廬舒夀光六州官自爲場置吏總之謂之山場者十三六州採茶之民皆𨽻焉謂之園户歲課作茶輸其租餘官悉市之其售於官皆先受錢而後入茶謂之本錢又有百姓歲輸稅者亦折爲茶謂之折茶總爲稅課八百六十五萬餘斤其出鬻皆就本場在江南則宣歙江池饒信洪撫筠袁十州廣德興國臨江建昌南康五軍兩浙則杭蘇明婺處温台湖常衢睦十一州荆湖則荆潭澧鼎鄂岳歸峽八州荆門軍福建則建劔二州歲如山場輸租折稅餘則官悉市而斂之總爲歲課江南千二十七萬餘斤兩浙福建三十九萬三千餘斤皆轉輸要㑹之地曰江陵府曰真州曰海州曰漢陽軍曰無爲軍曰蘄州蘄口爲𣙜貨務凡民欲茶者皆售其官其以給日用者謂之食茶出境則給券商賈之欲貿易者入錢若金帛京師𣙜貨務以射六務十三場茶給券隨所射與之謂之交引願就東南入錢若金帛者聽入金帛者計直予茶如京師凡茶入官以輕估其出以重估縣官之利甚溥而商賈買轉於西北以至散於外地其利又特厚焉縣官鬻茶歲課緡錢雖贏縮不常景德中至三百六十餘萬此其最厚者也然自西北宿兵既多饋餉不足因募商人入中芻粟度地里逺近増其虚估給券以茶償之後又益以東南緡錢香藥象齒謂之三稅而塞下急於兵食欲廣儲峙不受虛估入中者以虚錢得實利人競趨焉及其法既弊則虚估日益高茶日益賤入實錢金帛日益寡而入中者非盡行商多其土人既不知茶利厚薄且急於售錢得券則轉鬻於茶商或京師坐賈號交引舗者獲利無㡬茶商及交引舗或以券取茶或收蓄貿易以射厚利由是虚估之利皆入豪商巨賈券之滯積雖二三年茶不足以償而入中者以利薄不趨邊備日蹙茶法大壊景德中丁謂為三司使嘗計其得失以為邊糴纔及五十萬而東南三百六十餘萬茶利盡歸商賈當時以為至論厥後雖屢變以捄之然不能無弊已上據本志丁亥詔曰三路軍儲出於山澤之利比聞移用不足二府大臣其經度之乃命三司使李諮御史中丞劉筠入内副都知周文質提舉諸司庫務王臻薛貽廓及三部副使較茶鹽礬稅歳入登耗更定其法遂置計置司實録丁亥日同以樞宻副使張士遜參知政事吕夷簡魯宗道總之計置司首考茶法利害奏言十三場茶歲課緡錢五十萬天禧五年纔及緡錢二十三萬毎券直錢十萬鬻之售錢五萬五千總為緡錢實十三萬除九萬緡為本錢歲纔得息錢三萬餘緡而官吏廩給不與焉是則虚數雖多實用殊寡因請罷三稅行貼射之法其法以十三場茶買賣本息併計其數罷官給本錢使商人與園戸自相交易一切定為中估而官收其息如鬻舒州羅源場茶斤售錢五十有六其本二十有五官不復給但使商人輸息錢三十有一而已實録三月辛卯㑹要同然必輦茶入官隨商人所指而予之給券為騐以防私售故有貼射之名若歲課貼射則官市之如舊園户過期而輸不足者計所負數如商人入息㑹要舊輸茶百斤益以二十斤至三十五斤謂之耗茶亦皆罷之實録二月其入錢以射六務茶者如舊制先是天禧中詔京師入錢八萬給海州荆南茶入錢七萬四千有竒給真州無為蘄口漢陽并十三場茶皆直十萬所以饒裕商人而海州荆南茶善而易售商人願得之故入錢之數厚於他州其入錢者聽輸金帛十之六至是既更十三場法又募入錢六務而海州荆南増為八萬六千真州無為蘄口漢陽増為八萬㑹要三年五月商人入芻粟塞下者隨所在實估度地里逺近増其直以錢一萬為率逺者増至七百近者三百給劵至京師一切以緡錢償之謂之見錢法願得金帛若他州錢或茶鹽香藥之類者聽實録五月甲子大率使茶與邊糴各以實錢出納不得相為輕重以絶虚估之弊朝廷皆用其說李諮等新立見錢法實録分載數處今悉從本志就正月癸未初命官日并書之朝廷用其說乃三月辛卯今亦并書實録分載有詳有畧今參以㑹要則本志所去取蓋得之不可不從也戊子遣鹽鐡判官張𫝊閤門祇候張永德安撫京東淮南諸州水災故也改施州暗利寨為寜邊寨初為蠻㓂所焚既葺之因易是名庚寅贈侍中劉美妻吳興郡夫人錢氏封越國夫人錢氏惟演妹也及卒輟視朝三日卒在五月乙丑今并書二月丙申鑄天聖元寳錢景靈宫有真宗御容將奉安於西京應天院丁酉命馮拯為禮儀使凡奉安御容多以宰相或近臣為禮儀使入内都知押班御藥管勾儀衛先迎御容至文德殿或㑹慶長春殿宿齋奉辭輔臣宗室前𨗳既而酌獻出則百官辭於近郊戊戌御承明殿閱試衞士遷補有差許總噶爾嘉勒斯賚埒克遵嵗一入貢太常博士丁誦大理寺丞丁說閤門祇候丁諌並與在外監當皆謂之弟也庚子發卒増築京城按此條原本誤寫於正月庚寅後今改正甲辰蠲畿内民所逋體量草畿内體量買草凡千萬束輸未及半而雨久不止上曰霖雨逾旬草價騰踴四等以下戸其悉蠲之丁巳命知制詔張師德奉安太祖太宗御容於南京鴻慶宫神御殿新成也樞宻直學士刑部侍郎知并州馬元方乞除代上以太原重鎮戊午加元方兵部侍郎留再任賜白金五百兩諭以委屬之意太常少卿知光州周起為秘書監知楊州郢州團練副使王曙為光祿卿知襄州庚申補西界内附萬資蘇爾格威三班奉職仍賜姓名李文順令居陳州初自祥符天書既降始建天慶天祺天貺先天降聖節及真宗誕節本命三元用道家法内外為齋醮京城之内一夕數處帝即位并太后誕節亦如之糜費甚重至是或以為言而宰相馮拯因奏海内久安用度宜有節帝及太后曰此先帝意也㑹寢疾不果行即詔禮儀院裁定禮儀院請帝及太后誕節本命宜如舊他節命八宫觀迭醮舊一歲醮四十九請損為二十大醮二千四百分請損為五百齋官第給湯茗詔増醮分為千二百餘悉可既而拯又請天慶等節應天河南大名河中鳳翔江陵興元江寜兖并亳舒洪杭潭福益梓夔廣桂二十一州府醮如舊青徐曹鄆宻陳許孟滑襄鄧直定澶邢相滄貝潞晉代京兆陜同華邠涇鄜延耀慶成楊廬夀宿真宣䖍蘇潤婺明越泉建彭綿漢卭蜀嘉眉遂利閬連賀潮韶惠邕容宜六十四州府醮用香燈花果山泉藥苖餘小州悉罷詔亦可之樞宻使錢惟演言真宗皇帝將祔太宫有司議以功臣配享臣先臣尚父秦國忠懿王俶勲隆奕葉位重累朝親率王徒平百年之僣偽躬持國籍獻千里之封疆忠誠格于皇天茂績昭于惇史所以太祖太宗命無下拜賜以不名洎先聖之纂承念遺勲而益厚舉諸殊渥萃此一門在乎皇朝誠居第一伏望依體降詔配享祖宗廟庭詔兩制與崇文院檢討禮官同共詳議以聞翰林學士承㫖李維等奏議請錢俶配享太宗廟庭奏入不下此據㑹要三月己巳禮儀院又請罷天慶等五節天下賜宴詔新定設醮州府賜燕如舊餘悉罷甲戌奉真宗御容于西京應天院丙子降西京囚罪一等徒以下釋之城内民八十以上免其家徭役賜茶人三斤帛二疋辛巳罷在京竹木務入中甲申詔自今傳宣營造屋宇並先下三司計度實用功料然後給以官物時上與皇太后宣諭輔臣曰比來諸處營造内侍直省宣傳不由三司而廣有支費且聞伐材採木山谷漸深輦致勞苦宜檢約之乃降是詔減玉清昭應宫景靈宫㑹靈觀祥源觀清衞卒以分配諸軍其工役送八作司兖州景靈宫太極觀清衞准此舊殿直以上雖㓜未任朝謁遇乾元長寜節皆賜服至是罷給以鎮州人侯日用為三班奉職睦化元張歸正王令從為定城望江來安縣主簿日用等頃陷契丹嘗補偽官至是來歸持録之歸明人後無他並可削前巻當准此三司减省所言在京四宫觀歲入錢帛貫疋六萬七千二百有餘皆本處使臣専其出納恐有侵弊乙酉以權户部判官王鬷閤門祇候劉懐德同主其事劉懐德未見判大理寺張師德言詳斷官誤引刑名而改正者自來更不坐罪請自今凡失出入徒以上罪雖改正亦奏劾聽裁又言本寺定奪公事多致稽留請如斷大中小事公案立限又言選人試律斷案其元斷刑名皆為府史預知請自今下御史臺考試並從之詔試法官日仍令知審刑院或判寺官與斷獄官同詣御史臺辰州言下溪州刺史彭儒猛子右侍禁仕漢狀稱向以父老兄亡遽留家屬西京潜歸本道與父鈐束溪民欲乞放還家屬詔河南府遣人部送赴闕以官舎居之丙戌再責祖士衡監江州稅言者以士衡在吉州不能修飾前責尚輕故也己丑詔審官院契丹使所過州郡通判選差人辛卯始行淮南十三山場貼射茶法茶法已具正月癸未初命官時今從本紀特書此以表事始司天監上新歴賜名崇天保章正張奎靈臺郎楚衍等所造也命翰林學士晏殊為歴序衍開封人奎未詳詔京朝官未歴任而因祠祭行事給俸者其見錢並折支三之二夏四月乙未詔審官院監在京諸庫務並選嘗歴任京朝官其補䕃子弟雖經監臨而失陷官物者毋得差又詔自諸行郎中至京官以出身歴任功過具為班簿進内己亥以吏部郎中龍圖閣待制薛奎權知開封府奎為政嚴敏擊斷無所貸人相與畏憚至私與俚語目為薛出油語上達帝因問奎謝曰臣知擊姦安避此上益加重辛丑中書言諸路轉運使副河北河東陜西部署鈐轄都監并奉使契丹臣僚辭見請並許上殿奏事從之初有詔但令兩府大臣附奏太常丞直集賢院判吏部南曹丁度言臣下外出必有所陳今一切令附奏非所以防壅蔽也故中書為言卒得請上初即位度上書論六事一増勸講官二増諫員三補䕃用大功以上親四選河北河東役兵補禁軍五籍令佐墾田為殿最六凡縁公事坐私罪杖者聽保任遷官又嘗獻王鳳論於皇太后以戒外戚云罷禮儀院從樞宻副使張士遜等所請也以知禮儀院翰林學士晏殊龍圖閣直學士馮元為判太常禮院同判太常禮院官為同知院判太常禮院典禮所出大中祥符中又増置禮儀院以輔臣領其事於是始罷禮儀院占公人二十三人歲費錢千七百餘貫非汎行禮支給在外日逐行遣祗應不多詳定儀制久來屬太常寺及禮院管勾今請停罷所有承受宣勅行遣公案諸般文字並付本院壬寅詔徐州仍歲水灾民頗艱食已嘗發常平倉及以種糧貸中下户又罷散蠶鹽常慮或致流徙其令京東體量安撫臣僚倍加拯卹甲辰契丹遣彰武節度使耶律唐古特寜州防禦使成昭文來賀乾元節丁未乾元節百官及契丹使初上夀於崇德殿己酉以京西轉運使祠部郎中孫冲兼權滑州河隂至泗州都大巡河東頭供奉官閤門祇候張君平簽書滑州事初議塞决河也少府監薛顔等薦刑部尚書林特從子克儉為閤門祇候上以克儉非有功狀雖已從顔等所薦乃詔自今臣僚奏舉使臣為閤門祇候三班院具勞績取㫖癸丑詔文武官奏䕃子弟者各從本資丙辰以歲饑權罷修西京太㣲宫白馬寺其修永定陵家役二人者免一人丁巳詔翰林學士至三司副使知雜御史各舉太常博士以上一員堪充諫官御史者以名聞先是上封事者言真宗常於門下省置諫院御史臺别置憲官後執政漸生畏忌乃優與職任而罷之近年以來貴近之臣多違憲法比至懲罰已損紀綱請復置諫官御史三五員國朝左右諫議大夫司諫正言多不專言責而御史或領他局天禧初詔兩省置諫官御史臺置侍御史以下各六員不兼務職毎月須一員奏事其後員闕不補故言者及之執政畏忌言官優與職任當是天禧三年五月乙亥辛巳日事要見上封者姓名及執政畏忌諫臺優與遷擢者是誰初丁度上疏論六事其一増諫員或即丁度天禧三年六月末范雍言可參照欽州深在山谷間土煩欝人多死瘴毒推官建安徐的獻策於轉運使請徙瀕水轉運使以聞且留的再任辦役辛酉詔從其請的短衣持挺與役夫均食築城郭立候樓為戰守備畫地居軍民治府舎倉庫溝渠㕓肆皆得所安臣僚上言竊覩自繼好以來毎差臣僚奉使必須經濟得人欲乞今後文臣令給事中以上武臣遥郡以上每至選差入國之次預行詔敇專委奏舉方得差充候廻别無曠職優賜擢任以旌勞効宰臣奏自今欲止令中書樞宻院選擇充使奏可五月癸亥朔太常博士鞠詠王軫法當磨勘審官引對上閱其治狀並除監察御史詠開封軫魏人也庚午詔禮部貢舉詔官名及州縣名與皇太后父名相犯者悉改易之辛未御崇政殿録繫囚雜犯以下逓降一等杖以下釋之甲戌命參知政事魯宗道按視滑州塞河功料詔承明殿垂簾日許三司開封府御史臺與屬官一員同奏事乙亥録故監乾寧軍獨流寨屯田務殿直耿達子信超並為下班殿侍以達捕賊鬭死也戊寅分東西八作司為兩司監官舊四員仍増二員景德四年六月併為一詔吏部流内銓人自今出官者並依長定格令歸司初殿中侍御史大名李孝若言百司吏頻經慶恩多减放選限出官甚速請加條約因令翰林學士晏殊等與流内銓南曹同詳定而降是詔四年三月王臻又有此奏請不知何故當考辛巳罷先天降聖節進延夀帯續命縷貸拱聖卒王美死杖配海州本城美逃走法當斬上以其新𨽻軍籍未嘗請月給思母而逃特貸之甘州輝和爾可汗王伊嚕格勒棟碩爾遣使來貢方物詔以棟碩爾爲特進歸忠保順可汗王上封事者言中人奉使江淮多乗官舡載私物營利州縣不敢檢察戊子詔自今内臣出外止給驛馬仍無得過三匹改保安軍子城為德靖寨詔賜朝官京官差充知州通判轉運使副提㸃刑獄監臨物務及幕職州縣官等朝辭日口宣戒諭仍令閤門祇候朝辭日分明宣諭兼令本官各録一本赴任㑹要天聖元年五月事實録無之今附月末六月丙申徙河陽保大節度使錢惟演知亳州張君平求免簽書滑州事專領修河仍乞増置都監且薦太常博士李渭庚子渭換授北作坊副使與君平俱為修河都監魯宗道用渭策欲盛夏興役孫冲謂徒費楗薪困人力雖塞必决乃徙冲知河陽既而役兵多渇死君平議減其功半渭不聽君平獨以聞乃斥渭不用君平亦徙他官河卒不塞渭河陽人也李渭附傳云魯宗道薦渭為修河都監樞宻院有惡宗道者排渭所議罷為鄂州都監當時曹利用張士遜張知白實在樞宻院不知惡宗道者是誰當考今但從孫冲正傳甲辰罷江寧府溧水縣采丹砂戊申河南府言永定陵占民田十八頃凡估錢七十萬上曰營奉先帝陵寢而償民田直可拘以常制耶特給百萬乙卯禁毁錢鑄鐘鄭州防禦使環慶路副都部署田敏在邊多不法上以其嘗有戰功不欲重致於理戊午降為左屯衛大將軍昭州防禦使詔舊制幕職州縣父母年七十以上無兼侍者權注近官自今初赴銓集人當逺官者父母年及七十許用前例注近任秋七月戊辰置陜虢解同州巡檢使時解州盜賊嘯聚樞宻院言河中府同解鄜延丹坊州并西京陜虢河陽舊為兩路巡檢地逺難以分捕故於三州特置巡檢使一員詔禮部貢院舉人有期親卑㓜及大功以下服者並聽應舉己巳右侍禁閤門祇候嘉州犍為縣駐泊防遏邊界公事王䝉正請遇長寧乾元節就峨眉設齋及備土貢令子弟入貢仍請給館券從之䝉正與太后有連其女劉從德妻也庚午以徐州文學劉顔為任城主簿顔彭城人少孤好古學不專章句師事高弁舉進士第嘗知龍興縣坐法免久之授徐州文學居鄉里教授數百人採漢唐奏議為輔弼名對馮元劉筠錢易滕涉蔡齊等上其書故有此命顔在任城㑹歲饑發大姓所積粟活數千人壬申賜徐州修河役卒緡錢癸酉免戎瀘州虚估稅錢先是商旅乗舡過州合納稅外復估虚價而重輸錢故禁止之戊寅詔河朔歲豐其選朝臣一員縁邊提舉便糴糧草又詔天下職田無令公人及主戸租佃召客人者聽所收租仍不得加耗若水旱其蠲租如例己卯以崇儀副使任吉復知施州先是吉坐蠻冦剽刼暗利寨罷知州命未至而入溪峒討捕有功故復命之仍降敇奬諭壬午命知制誥張師德侍御史知雜事蔡齊詳定三司蠲納司應在及放天下欠負應在者名物雖著於籍而實未嘗入官也時上封事者言真宗初嘗遣使江浙蠲放逋欠因以即位赦恩而命師德等自是更赦命官除欠負遂為例丙戌龍圖閣待制知開封府薛奎為契丹妻蕭氏生辰使西上閤門使郭盛副之己丑給事中集賢院學士㓂瑊知鄧州初上封事者言瑊與丁謂厚善故自成都代還特黜之上謂王曽曰瑊有吏幹毋深譴也乃有是命都官員外郎黃震為廣南東路轉運使廣南歲進異花數千本至都下枯死者十八九道路苦其煩擾震奏罷之庚寅詔殿前都指揮使保定節度使蔚昭敏以足疾特聽入朝不拜
