body:
  text: 續資治通鑑長編巻二百八十四宋李燾撰神宗熈寧十年八月戊寅朔定武軍留後承裕為寧武軍節度使詔河北路體量安撫安燾應被水灾民並就髙阜賑濟安存令提㸃刑獄韓正彦同張茂則劉璯先相度曹村决口下流利害以聞月末河又决滎澤䧏權廣南西路轉運使司封郎中李平一為屯田郎中監廬州鹽礬務前太常丞直集賢院蔡􅁮落職為太子中允服闋與監當權發遣福建路轉運判官太子中允周沃為光祿寺丞送審官東院並坐師出安南措置乖方及漕運不職也朱本移去年十一月癸酉詔入此以為平一等被罪之因今依墨本盖平一等被罪不但縁此詔所指運夫未足一事也詔前權判将作監范子竒向宗儒各展磨勘二年丞徐大方曽孝宗提舉監修使臣王範等五人並奪元授恩衝替坐修中太一宫正室殿柱朽壊也初子竒等欲宫速成以濕木為柱至是易腐損者凡三十上批訪問河北州軍諸軍以營房為水壊移於他處存泊或已遷入營者人賜米有差即壓溺死者賜其家錢有差不能瘞者有司主之己夘詔河北京東轉運提舉司體量被水民户未納夏税并諸欠負役錢當倚閣蠲減數及水退給借糧種次第以聞又詔安撫司賑卹并察刑獄繫禁開封府界准此辛巳兩浙提㸃刑獄司言廖恩千餘人在信州界未獲今調發保甲防托凖備捕殺及於逐路保甲分畨戍守上批東南之民雖近聨以什伍然未嘗教之武事驅以扞賊實難收功徒廢生業並令放散江南福建路亦依此入内東頭供奉官勾當御藥院李舜舉言先差隨安南行營大兵進討䝉改兩官今宣撫使副皆被責乞罷臣職任重行黜責詔舜舉追所轉兩官更奪寄資一官東頭供奉官劉惟簡韓永式以走馬承受囬各轉兩官亦追一官賜塞胙城縣韓村决河役兵特支錢初都水監言滑州韓村埽河溢水行隄外已牒同判監劉璯丞耿琬勾當公事陳康民提舉固䕶至是功畢也壬午遣監察御史裏行黄㢘鞫前知慶州范純仁于寜州以永興軍路鈐轄种古言前知環州嘗與純仁爭辨蕃部等事因此遂挟情捃拾嘗配流編管人邁布等防送過慶州遂留住於寜州置獄而知寜州史籍乃純仁累曽薦舉者必恐别致誣陷故命㢘劾實亷亦以常被純仁薦辭乃遣御史彭汝礪又以母老辭以御史臺推直官遂寜馮如晦代之元豐元年五月戊戌獄竟秦觀送馮如晦為陜西提刑序云上即位之明年有詔侍從之官各舉部使者二人故龍圗閣直學士滕公與二三耆老皆以馮侯叔明應詔即日除陕西路提㸃刑獄公事觀嘗問於滕公曰馮侯何如人公曰有守君子也觀曰何以知之公曰昔髙平范公之帥環慶也環将种古以寜守史籍變其熟羌獄上書訟寃且言髙平公不法者七事朝廷疑之即寜州置獄而馮侯以御史推直實奉詔徃訊是時髙平公言事去執政有惡之者欲中以危法乆矣此獄之起人皆為懼及馮侯召對神宗曰帥臣不法萬一有之恐誤邊事然范純仁有時名卿宜審治所以遣使者政恐有差誤耳即賜緋衣銀魚馮侯拜賜出執政謂曰上怒慶帥甚君其謹之馮侯曰上意亦無他因誦所聞徳音執政不悦及考按連逮熟羌之獄實不可變而古所言髙平公七事皆無状附置以聞執政殊失望㑹史籍有異詞詔遣韓晉卿覆治執政因言范純仁事亦恐治未竟願令晉卿盡覆神宗曰范純仁事已明白勿復治也獄具如馮侯章於是籍古皆得罪而髙平公獨免執政大不快未幾髙平公復為鄰帥所奏謫守信陽而馮侯失用事者意亦竟罷去繇是言之非有守君子而何范純仁言行録云環州太守劾熟羌為盜獄具朝廷貸其命流南方罪人聲寃帥府曰我實非為盜者公送他州辨治果非盜環守避罪訟公挾私情以變獄意欲朝廷不按治而逐公神宗遣臺官就寜州置獄劾治甚峻卒無私状可推環守自坐誣告抵罪公雖得辨鄜延帥隂奏公擅囬宥州牒有違慢情罪坐是落直龍圖閣知信陽軍八月五日御集永興軍路兵馬鈐轄种古奏前任知環州其經畧使范純仁挾情捃拾於寜州興獄知寜州史籍受純仁舉薦必恐别有非辜乞移於别路州軍根勘御批可差御史黄亷并近付提刑司取勘事於寜州置司一處根究勘劾具案聞奏時政記五日知潁州岷州團練使髙遵裕知慶州前知慶州范純仁遣監察御史裏行黄亷就寜州置司取勘以永興軍路兵馬鈐轄种古言前知環州嘗與純仁整會錯了蕃部公事共七件純仁因此遂挟情酬嫌捃拾耳因配流編管人邁布等防送過慶州留住遂於寜州興獄其知寜州史籍又是純仁部下累被薦舉必恐别有非辜故專命亷以劾實也岷州團練使知潁州髙遵裕知慶州司封員外郎集賢校理權知曹州劉攽太常丞集賢校理提㸃京東路刑獄李清臣並為國史院編修官既而御史蔡確言攽昔在館中擲帽為戯不可任史職宰相為辨之持奏不下攽亦以久廢筆硯為辭乃換開封府判官換開封判官乃八月二十五日今并書詔已獲廖恩促王中正赴闕七月九日遣中正九月二十三日到闕癸未遣權判三司都磨勘理欠慿由司黄堯允同河北轉運判官汪輔之救䕶澶州有奏禀不及者便宜施行以河决逼城也詔入内副都知李憲權遣秦鳯等路轉運副使趙濟同經制熈河路邊防財利許舉勾當公事文武官五員如事干經畧安撫司即連書以聞十二月八日鄜延路經畧使吕惠卿言準樞宻院札子環慶路經畧司牒根究並無擄畧夏國孳畜廽宥州未當令追還聴㫖前此廽牒已付西界詔新知慶州髙遵裕詳宥州牒宻追捕作過首領禁劾其随從蕃部並免罪存撫勿致生事根括所畧西界孶畜并命價歸之元豐元年閏正月丁酉可考二年五月二日遵裕坐責此時遵裕未到慶州龍神衛四廂都指揮使燕達言昨為安南副都緫管蒙授榮州防禦使權領歩軍司乞追寝詔安南征討措置乖方緫制軍事專在郭逵燕達聽主帥節制及攻取廣源州决里隘富良江各有戰功不許辭録左班殿前令修己子命奴為三班奉職賜名求應以安南招討司言修已攻廣源州過兜頂嶺遇賊數千苦戰破之攻决里隘率先鋒竒兵與賊鬬斬六十六級後以病死故也太原府司法参軍館閣校勘中書刑房習學公事范鏜為大理評事權檢正刑房公事以編修貢舉𠡠式畢也詔提舉三司帳司勾院磨勘司擇資任稍深者秩在判官之上又詔福建路體量安撫檢正中書孔目房公事屯田員外郎劉定送審官東院差通判衢州權發遣提㸃兩浙路刑獄太常博士楊景略降一官定坐久於衢州稽留朝命景畧輕率張皇既賊非本路擅揭榜許人殺併故責及之五月丙子定體量福建十一月庚戌劄與定罪狀賜知定州薛向及都緫管劉永年等奨諭勑書特減磨勘年及賜絹有差以修完准備九軍十萬人甲仗了畢故也四月三日丙戌詔河北東路京西路體量安撫安燾改河北路以中書言兩路盜賊衰止仍被水災宜各委官賑卹故燾專安撫河北續詔監察御史裏行黄亷為京東路體量安撫舊紀書監察御史黄亷體量安撫京東路新紀不書亷嘗言都檢正俞充結納中人徼幸富貴不宜使佐具瞻之地并言王中正任使太重恐為後憂又面論之甚切上曰人才盖無類顧駕馭之如何耳亷對曰雖然漸不可長聖人長駕逺馭故四㐫在朝不廢時雍彼皆才噐桀然過人任使稱意為後世慮故放殛之耳上曰且置此事河决曹村京東尤被其害今以累卿亷既受命條舉百餘事大畧䟽張澤濼至濵州以紓齊鄆而濟單曹濮淄齊之間積潦皆歸其壑郡守縣令能救災養民者勞來勸誘使即其功發倉廪府庫以賑不給水占民居未能就業者擇髙地聚居之皆使有屋避水囬逺未能歸者遣吏移給之皆使有粟所灌郡縣蠲賦棄責流民所過毋得征筭使吏為之道地止者賦居行者賦糧憂其無田而逺徙故假官地而勸之耕恐其殺牛而食之故質私牛而予之錢棄男女於道者收養之丁壮而饑者募役之初水占州縣三十四壊民田三十萬頃壊民廬舎三十八萬家卒事所活饑民二十五萬三千口壮者就功而食又二萬七千人得七十三萬二千工給當牛借種錢八萬六千三百緡歸而論薦士大夫後多朝廷所收用云此據黄庭堅所為行状或自今以累卿下並削去只作注字附見可也縁各隨月日如張澤䟽治乃係明年六月七日不應緫載於此上批手詔川茶一司創置雖久未能就緒儻非得材智詳敏之人益以事權延引嵗月不惟坐失厚利兼恐必無所成昨自一二姦囬造意傾揺其法愈更隉杌賴朝廷隨事懲艾得就小安觀方今在彼人情亦未肯服職退聽茍不大為考察措置經久必壊近雖差李稷代劉佐領其事風力强果固已可仗然權勢輕小必未能勝為邪害公之朋可依李杞例兼三司判官仍委權不限員舉劾違法奉法官吏俟一二年課入登羨事有條理却與裁節庶一方邊費有以取辦毎嵗不假度支供億戊子樞宻院委張茂則劉璯選便道口岸繋橋以河水壊澶州橋故也茂則等言北使驛路可以出澶州之西黎陽由白馬縣北可相度繋橋從之詔給河北東路坊場錢十萬緡付轉運司增修霖雨所損州縣城倉庫等後又賜體量安撫司齋郎助教𠡠牒十五修完又賜常平榖三千石賑濟避水第四等以下户權發遣兩浙轉運副使蘓澥言今徃界首提舉防托投首兇賊廖恩等體問得正賊始初不多後來旋添人數若是自有家業田疇可以度日即必願為良民皆縁日給不足逋欠官私債負或小竊私鑄及興販私商違禁之物常蹈此險途所以揺足即入賊黨一旦若出投降不免却作舊態其販茶鹽私鑄及小盜即動罹禁網逋欠者例遭决撻枷錮由此且在賊中庶幾日得飽食以理推之無圖闕食之人惟患賊人不納若賊人多有糧斛即徒黨極易倡率乞下安撫司於災傷地分厚加賑卹及令州郡問民疾苦倚閣逋負并賊黨先投降人立定賞格支與錢米或有日前負犯皆與放免詔髙遵一取問賊徒有無欠官物具析聞奏此據時政記十一日事髙遵一後來如何具析當考鎮南軍節度使同平章事王安石再上表請以本官充集禧觀使詔荅不允仍遣安石弟權發遣度支判官安上賫詔徃賜之己丑召輔臣觀榖于後苑秘書監集賢院學士蘓頌為遼主生辰國信使西上閤門使英州刺史姚麟副之太常博士集賢校理劉奉世為正旦國信使内藏庫副使張世矩副之故事使北者冬至日與北人交相慶是嵗本朝厯先契丹一日契丹固執其厯為是頌曰厯家筭術小異則遲速不同謂如亥時節氣當交則猶是今夕若踰刻則屬子時為明日矣或先或後各從本朝之厯可也北人不能屈遂各以其日為節使還奏之上喜曰朕思之此最難處卿對極得宜因問契丹山川形勢人情向背頌曰通盟嵗久頗取中國典章禮義以維持其政令上下相安未有離貳之意昔人以為匈奴直百年之運言其盛衰有數也上曰契丹自耶律徳光至今何止百年頌曰漢武帝自謂髙皇帝遺朕平城之憂雖久勤征討而匈奴終不服至宣帝呼韓單于稽首稱藩唐自中葉以後河湟陷于吐蕃憲宗毎讀貞觀政要慨然有收復意至宣宗時乃以三州七關歸于有司由此觀之北方之叛服不常不繋中國之盛衰也此據詔㫖頌傳附見新傳削去當考上批英州編管人鄭俠元犯無上不道情至悖逆貸與之生已為大惠可永不量移以刑部用赦請量移中書奏移俠鄂州故也於是檢正中書刑房公事劉奉世展三年磨勘校正提㸃五房公事及刑房堂後官㸃檢房並等第上簿罰銅展年降名仍詔中書自今入奏勑劄批状並候印畫出方得書押判刑部司封員外郎胡援前權同判刑部太常丞王子韶並降一官援并法直官成珣衝替坐俠叙理援等定俠所犯為稍重當量移鄂州中書不俟畫可輙行故皆責之庚寅秦鳯等路轉運司言秦州學田瘠而嵗課不入乞易營田以贍學者從之詔定公主遇大禮奏薦條此據㑹要八月十三日事當考辛夘上謂新知潭州謝景温曰已令張山甫於潭州團練五千人且湏招填足之南方少得力兵官廖恩小冦廵檢縣尉以數千人守之無向前者賊本不至此皆玩冦所致也知衛州司農少卿魯有開言本路值黄沁兩河為災民乏食已用緩急闕乏條借給常平錢榖乞與免息詔自今寛剰役錢毋得給借有開違法貸民特釋罪有開宗道從子新法初行有開知南康軍代還宰相問江南新法如何有開曰新法行未見其患其在它日也坐所言乖異使通判杭州詔輪差開封府界京東西三將軍馬赴秦鳯熈河路駐泊代在京戍兵歸營候及三年却以在京元差人承替自今准此互差壬辰賜滎澤埽治河役兵特支錢詔永興秦鳯路各借熈寧十一年分鹽鈔三十萬貫熈河路二十萬貫付轉運司乗嵗豐廣置邊儲乙未詔提㸃福建路刑獄太常少卿徐緫送審官東院坐不能督官吏剪除賊盜及奏報誕妄也丙申詔知雄州四方館使王道恭罰銅二十斤通判殿中丞趙燮䧏一官坐兼領屯田司職不豫計蓄稻田水及放水入塘濼故也詔開封府界提㸃司河北東西路體量安撫司視州縣水災多寡人户未納税役倚閣或令貸借及應予賑卹刑獄禁繋差官吏等事並相度施行修國史院編修官知諫院黄履言伏覩宰臣吴充奏修史官以下不得獨上文字即不説言事官伏縁臣係知諫院未委合與不合隨例獨上文字詔除諫職言事外其干修史事即依修國史院已得指揮時政記十九日事己亥提舉捉殺福建路盜賊彭孫言廖恩等已降除安撫司釋其脇從外賊黨凡九百八人管押赴京次詔恩徒黨有不願赴闕者令江南福建路提㸃刑獄司給公據放内凶惡不可留本路或嘗殺人難以還鄉者分派江北就糧本城願填雜犯軍分者聽捕盜人等暴露在外鬬敵有勞者保明以聞諸路提㸃刑獄官别無㑹議事更不前去右賛善大夫剗刷發運司錢帛吕温卿言觀河北分為東西路其於監司廵按㸃檢甚便至於通融移用之法則不能無害如東路出絲綿紬絹西路饒材木鐵炭而有無不得以相通用度不得以相補欲乞如江淮發遣使之法於北京特置河北京東西路都轉運司選重臣以領使事應合通融移用財賦課利按察郡縣事件等委四路都轉運司通管專以經制邊計為任北邊之財庻可以充足時政記庚子詔國子博士開封府推官宋靖國知宻州以御史知雜蔡確言靖國人物庸下衆所輕鄙因縁附託久官京師乞别與一閒慢差遣故也三司請今後御前及太皇太后宣㫖内䧏取索事干急速及常湏噐用酒醴茶藥之類先次施行以條覆奏從之辛丑分命輔臣祈晴保州保塞縣増置縣丞一員時政記賜知濮州屯田郎中閭丘孝直奨諭𠡠書以曹村河決濮人不前知一夕注城下孝直倉卒率官屬役禁兵築䕶城隄救䕶有勞故也即以孝直提㸃福建路刑獄權發遣三司使李承之言三司近嵗以來財貨匱乏為甚計月支給猶懼不足以承平百餘年當陛下緝熈庶政之日國用如此可不深慮夫國無三年之蓄國非其國况無兼月之備乎此則有司失職因循茍且之罪也惟深思邦計之重詔股肱大臣謀所以理財經乆之術詔三司使副同講求理財經久之術具利害條畫以聞其後三司言在京官司應支用係省錢物並令關由三司發運轉運提舉鑄錢鹽事等司及州縣於三司所統者違慢不職許行勘劾事理重者奏乞先行衝替若職事修辦乞行奨擢諸路上供不足或年計不備許選官體量或因朝廷差官出入許就委㸃檢錢榖公事並從之新本自其後以下並削去以為三司所言並非理財利害也詔築廣州東西中城壬寅前西染院使李寔復舊官録其子為三班借職賜名渥以與廖恩戰死也詔潭州置一将及増武臣一員駐全州提舉訓練全邵永州准備應援廣南西路軍馬癸夘知兾州庫部郎中宋昌言判都水監書此可見前貶之誤甲辰詔内外待制以上及臺諌官發運轉運使提㸃刑獄轉運判官各舉文臣才行堪升擢官一員令中書審察隨才試用毋得舉館職及兩府若已之親從監察御史黄亷奏請也亷以為一人之智不若十人十人之智不若百人此有餘不足之辨也成天下之務莫急於人才願責兩制近臣監司郡守各薦所知一人陛下因所舉而任之於其能否成敗之際亦足以知天下之大吏所以事陛下者上用其言故有是詔於是應詔者百餘人亷又言勢孤地寒逺跡下僚者既得名聞於上願詔中書審察其能而用之則急才之詔不虚行於天下新紀云詔侍從臺諫監司各舉文臣有才行者一人毋得舉館職及兩府若已之親舊紀但止一人字以下不書黄亷以為一人至於天下皆行状語或削去權京東轉運使王居卿乞改製連三竈用薪芻至少而見功多乞下其法諸路從之乙巳詔左班殿直平逺勒停免追官右班殿直劉贇衝替先是郭逵言在富良江苗履報蠻賊遁去尋約束管押先鋒竒兵東頭供奉官王進候繋浮橋畢以次進兵進等急切即以栰渡江致兵勢斷絶衆寡不敵為賊壅落江岸顯違節制平逺劉贇不能䇿應於法當誅縁王師攻廣源州破决里隘逺贇先入賊有功故有是命丙午詔三司借支錢三十萬緡於京師置場買賣鹽鈔以制置觧鹽使皮公弼請復范祥舊法平準市價故也權御史中丞鄧潤甫言福建路羣盜竊發殺掠人民州縣不能逐捕卒煩朝廷出兵遣将既又為之蠲賦息役以安一方甚大惠也然臣竊聞閩粤之地山林險阻連亘數十里無賴桀㸃輕死冒利之人比於他路為多大抵以販鹽鑄錢為業故能結連黨與動以千數州郡兵衛寡弱莫能抗禦今朝廷儻以廖恩為己降因遂泰然不顧則恐桀黠之人乗間投隙将復有躡恩之迹而發者此不可不預慮也乞下本路監司博詢衆議措置鹽法利害或許通商至於鑄私小錢亦多為禁防其控扼州軍宜少宿兵衛務以消散惡黨惠安元元或以監司為不足獨任自可遣使專緫其事詔福建轉運使蹇周輔相度經久利害以聞元豐元年六月二十九日周輔云云是月河决鄭州滎澤埽此據本志附見月末九月己酉提舉成都府等路茶場司李稷乞應干本司職務措置申請辭訟等事他司毋得干預如處置有屈抑許經監司申理從之仍不𨽻都提舉市易司其茶場司亦罷兼秦鳯路市易司詔東自信安保定軍雄霸莫州西至順安按原本作安安今據宋史地理志改正廣信安肅軍保州塘濼民有漁船者並置籍給牌蠲其日納錢庚戌詔河决泛濫民田者官為疏畎被災縣放税賦老㓜疾病不能自存者日給口食贈棣州團練推官邵雍秘書省著作郎賜粟帛以知河南府賈昌衡言雍行義聞於鄉里乞贈卹也宰相吴充請於上賜諡曰康節要録雍為人坦夷不為絶俗之行自天地運化隂陽消長皆以數推之雍初與常秩同召雍竟辭不起士大夫髙之按雍子伯温記雍卒後十年韓綘知河南府為雍請諡諡議則歐陽棐所作與朱史本傳不同當考辛亥詔岐王顥為南郊亞獻嘉王頵為終獻壬子詔宗室嫁娶不得與雜類之家為婚雜類謂舅曽為人奴僕姑曽為倡并父祖係化外及見居縁邊兩屬之人其子孫並不許與皇家袒免以上親為婚此據政和㑹要熈寧十年九月五日事實録於明年八月二十四日乃書但比此尤詳是或申明也正月九日權監察御史裏行彭汝礪言訪聞徐州進納人石有隣以男與宗室同管勾宗正事宗惠女二人議婚有隣以財雄於鄉其母倡也乞賜停罷加責宗惠詔京東東路轉運司體量詣實以聞五月二日權監察御史裏行彭汝礪言訪聞有㫖罷宗惠石有隣婚事宗惠近屬職在宗正恩榮備極宜思所以表正宗室以對列聖之休寵而嗜利茍賤貽朝廷羞伏乞特賜貶責以懲貪冒先是同管勾宗正事宗惠有女嫁徐州進納人石有隣之子其母倡也御史彭汝礪奏乞停婚并責宗惠詔京東路轉運司體量既得實遂罷之汝礪又奏乞深責宗惠因言皇族雖服屬已踈然皆宗廟子孫不可使閭閻下賤得以貨取願立法禁止故有是詔曽肇誌彭汝礪墓云同管勾宗正事宗惠有女嫁徐州進納人石有隣之子汝礪乞停婚加責宗惠時政記在正月九日幷五月二日與墓誌稍有不同今参取修入八年十一月甲申世開嘗建請今乃降詔以舊司農寺賜故燕王曹玘家癸丑録蕃官皇城使榮州團練使包順子東頭供奉官嘉卜卓為内殿崇班詔諸河倉納粟至次年支給一石破耗一升嵗加一升至八升止知延州吕惠卿請以經略司封樁錢二十一萬餘貫乗時糴斛斗許以錢依價兊支其錢却依舊封樁從之甲寅都大提舉在京倉場沈希顔奏熈寧三年河倉所支糧料凡三百六萬二千斛至九年支四百五十萬上批可令檢正官子細取索排年比較近嵗増多縁由以聞遂差畢仲衍此據御集不知仲衍後来比較如何乙夘環慶路經略司言慶州西谷寨稱有人侵入西界殺奪人馬今欲落下殺奪人馬事止據西人侵入漢界射傷熟户因依囬牒宥州從之詔諸官司承准傳宣内降與奏請及面得㫖事無條式者申中書樞宻院覆奏例不應申而輙申者准直批聖㫖𠡠科罪諸房失檢勘受而施行者亦如之上殿進呈文書並批送中書樞宻院不得直批聖㫖送諸處違者承受官司繳連以聞即非理干求恩澤及乞原減罪犯者中書樞宻院奏劾之舊紀書詔應傳宣從中批降及面得㫖事無法者中書樞宻院覆奏若有所干求規免仍劾奏之新紀同詔供備庫副使李孝孫東頭供奉官閤門祗候管偉録子孫外各更與一人三班借職以赴安南行營病死也賜京東西路轉運司軍儲五萬石辛酉詔鎮戎徳順軍各置都監一員詔在京權住修造七年八年二月丙戌已有權停七年指揮當考壬戌上謂新知慶州髙遵裕曰元昊不於環慶作過非為險阻盖以烏池在彼藉青鹽以助費今但謹備不可專恃險固遵裕留京師半月上批令閤門只今催押出門催押出門十月三日御集侍御史知雜事蔡確言定勘䟽濬黄河運河事推究本未事連諸州縣河埽官吏不少若盡繩以法不惟所劾者衆亦難結絶乞不問罪從之五月庚午確初受命定奪衛州運河及䟽濬黄河恐此奏請但乞不問衞州運河官吏耳不及䟽濬官吏更湏考詳或只是免河埽官吏運河乃程昉所作熊本墓誌可考元豐元年正月己巳熊本責癸亥以屯田郎中侍御史周尹提㸃荆湖北路刑獄先是尹上言成都府路置場𣙜買諸州茶盡以入官最為公私之害初李杞倡行敝法奪民利未甚多故為患稍淺及劉佐攘代其任増息錢至倍無他方術惟割剥於下而人不聊生矣大抵在蜀則園户所苦壓其斤兩支錢侵其價直在熈秦則官價太髙而民間犯法不可禁止又搬運不逮糜費歩乗堆積日久風雨損爛棄置道左同於糞壤兼所至不通客旅惟資無賴小民結連羣黨持仗私販虧失征税茶司認虚額又侵盜相繼刑罰日滋致數千里之害可為深慮臣頃在京師傳聞其事既未詳盡安敢輕議今受命入蜀所至體問乃知買茶為害甚鉅有知彭州吕陶知蜀州呉師孟等論奏可以參騐徃者杞佐繼陳苛法即信用其言曽不略加參考今議者條其刓蠧悉皆明白未即采聴何勇於興利而怯於除害乎臣願勅有司速究𣙜茶之弊俯徇衆論寛西南之慮又曰竊詳朝廷之意未欲遽罷茶禁者必以熈河路買馬年計茶最為急耳但通商之後舊來諸路茶稅年額錢緫二十九萬餘緡先已復故即可委逐路轉運司一面管認赴熈河路外有見今官茶所在州縣堆積極多足支數年買馬自今商旅販秦州熈河路茶必能有備臣體問廢罷改革事皆商旅所願望速下本路逐處根究臣之所陳有實即乞罷𣙜茶之法許通商買賣以安逺方尹還未至都而有是命吕陶奏已附五月二十一日吳師孟奏當考今師孟墓誌亦不載此本志云是時蜀人侍御史周尹以非茶法罷之甲子廣南西路經略使言邕州遷隆鎮監押鄧甫稱疾擅離官守乞遇赦降不原從之乙丑知太原府韓絳乞精選才臣令與臣及監司置局於太原府講求和糴利害詔權發遣户部副使陳安石乗驛同轉運司講求利害以聞元豐元年閏正月一日遣陳安石綘始建議在熈寧九年十二月十四日詔改名汴河上流北門曰宣澤舊汴河下流水門南曰上善北曰通津上流水門南北皆曰大通故改今名五丈河下流水門曰善利而上流水門舊無名賜名曰永順御史彭汝礪言聞七月廖恩渉貴溪信歙及饒皆警本路提㸃刑獄蘓澄畏恐避去盡室趨金陵宿留廣德冦歸乃反案提㸃刑獄職專治賊澄蒙朝廷寄委不能䕶衛疆境冦至先遯乞根究施行詔江東轉運司體量汝礪又言近論列俞充罪惡承詔俾加審察竊聞充居親䘮造州官擁妓沾醉依威怙勢與在位相首尾多售官莊嫌於貪墨復托他人姓氏轉以質易又彊假富民錢不歸鄉人銜之争相匿名投状訴其罪于州巧事中官以盜名譽乞詳酌施行詔令俞充分析充分析在十月九日中書時政記具載或可刪取七月二十四日壬申俞充都檢正十月十四日令兩浙監司體究十二月五日充徙他官詔秦鳯路喀木及莽約克諜報事令經略司量大小給賞戊辰涇原路經略司言德順軍捕獲西界裕勒藏喀木使來賣馬蕃部薩沁等十四人詔經畧司估直給錢安慰遣之或言薩沁等非賣馬實為間也蔡延慶曰彼疑故來覘執之是成其疑也卒遣之己巳前兩浙轉運使屯田郎中俞希旦降一官知淮陽軍前秀州華亭縣主簿陳良孺等四人並衝替坐究治張若濟事不實也賜闊閃弓一千劈陣刀二千付鄜延路經畧司備軍行使用從經畧使吕惠卿請也詔真定府路安撫司專一提舉修盖諸州軍摧塌城壁其人工物料令轉運司疾速應副庚午遣入内都知張茂則判都水監宋昌言權判都水監劉璯塞曹村决口利州路轉運司言乞廢罷茶場司許依舊通商令四路封樁毎年茶税并客人貼納歇䭾錢年終具數依茶場司所收息錢變轉金帛助熈河路博馬詔提舉茶場李稷比較以聞元豐元年五月甲戌張宗諤張升卿坐責朱本并入明年五月甲戌今依新本復存之東上閤門使狄諮同提舉教習馬軍先是詔選教内臣及馬軍武藝以諭諸軍令王中正提舉教習及中正将兵討廖恩命諮權提舉中正既還仍命諮兼同提舉實録載提舉教習馬軍事始末不具但於九月二十三日書狄諮同提舉盖因御集也今用御集一百十巻十年九月二十三日手札増修又宻院時政記三月八日改差王中正提舉教習馬軍當即是初命也元豐三年二月二十五日己未亦云熈寧十年三月始命中正提舉正詔選教内臣及馬軍武藝以諭諸軍此據舊録王中傳新録削去今刪取之中正以七月九日討廖恩八月五日召還熈寧七年九月十九日甲寅十年九月二十三日庚午元豐二年五月十四日辛巳三年二月二十五日己未三月十一日甲戌五月十一日癸酉六月十八日己酉十一月三日辛夘五年十一月十七日甲午六年二月五日辛亥舊録王中正傳福建路劇賊廖恩嘯聚剽掠久未擒詔中正捕戮中正分兵水陸並進示以恩信恩等勢蹙乃觧甲出降詔提舉教閱在京馬軍中正悉以所製弓弩諸兵噐及撃刺施用與歩射教法上之既試咸可用詔頒行之遷防禦使詔選教内臣及馬軍武藝以諭諸軍提舉教習軍馬所教臣僚軍班子弟及武學生員凡數百人既成引見陞補有差元豐元年提舉教閱開封府界諸縣保甲教諭府界将兵營陣武藝兼都大提舉開封府界賊盜廵檢復獻民兵互保法且請於附近村疃建團教場在縣置集教場以時教習詔悉從之未踰年便殿臨閱以武藝出倫補班行者百數餘以次賞金帛自此以其法下河北陜西河東三州路而置使提舉如府界焉自中正悉以至詔頒行之凡三十三字新録削去又自詔選教内臣至陞補有差四十五字新録削去壬申詔近范子淵奏用杷濬滎澤埽河北岸灘觜觧南岸危急圖状可並付定奪所照㑹上既令蔡確等定奪熊本及子淵是非又令馮宗道監視子淵用杷濬汴宗道測量汴流有深於舊者有為泥沙所淤更淺於舊者有不増不減者大率三分各居其一宗道日具實以聞上意稍寤治獄㣲緩㑹滎澤河隄将潰詔判都水監俞充徃治之充奏河欲决賴用濬川杷䟽導得完子淵因圖状自明上喜於是治獄益急矣癸酉詔福建等路見鞫賊發及被刼地分不即捕逐并見賊逗撓當職官洎賊黨鄉里所在最多州縣長吏等雖遇将來郊赦並不原權判都水監俞充言汴口近經裁減矯革過中事難濟辦乞自今差大使臣勾當汴口小使臣一人夾河廵檢京西都大司差部役使臣二人河清廣濟指揮増為公百人汴口嵗差廂軍千五百人從之詔開封府界提㸃先自豐稔畿縣立義倉之法舊紀云初立義倉新紀云立義倉自畿内始元豐元年三月庚戌乃降詔自畿内始降權發遣福建路轉運副使屯田郎中李竦一官衝替以本路盜發不即赴任也甲戌彰德軍節度使同平章事濮國公宗樸為兼侍中進封濮陽郡王大敕繋銜文彦博下宗樸久病以篤聞上批宗樸先帝邇屬忠謹寡過可除兼侍中爵郡王制命宜令今晩進來日降制後五日宗樸卒輟朝臨奠贈太師中書令追封康王諡僖穆其後又給彰德軍節度使牌印隨葬宗樸十月七日卒今並書之舊紀書宗樸兼侍中封濮陽郡王新紀因之中書都水監丞范子淵言准朝命䟽濬汴河蒙差官累行試騐功利灼然臣欲乞候今冬䟽濬汴河了畢将杷具舟船等盡分與逐地分使臣令於閉口之後河道内先檢量淤澱去處至春水接續疏導所貴河道上下通流不致阻遏仍免别差官屬占破役兵就便集事下都水監監司乞依所請施行從之㑹要九月二十八日事權發遣河北西路提㸃刑獄丁執禮言今之縣邑徃徃故城尚存然摧圮斷缺不足為固乞擇令之明者使勸誘城内中上户出夫以助工役以漸治之詔諸路轉運司委知州知縣檢視計度合修城壁功料於豐嵗勸誘五路除縁邊外擇居民繁庶及當衝要縣諸路即先自大郡修完初執禮自館閣校勘出為提㸃刑獄是年七月也上宣諭曰朕惟河朔重地遴選監司故以舊御史為之又曰卿職刑獄盜賊然盜賊最急宜用心督捕上宣諭云云此據㑹要七月五日事今附此詔以福建路新經盜賊全藉監司綏撫措置蹇周輔宜仍舊福建路轉運使王居卿京東路轉運使初命周輔與居卿兩易其任故也詔遣北京在城廵檢内殿崇班張禧修明州城乙亥詔樞宻院程昉所買修清汴木未斥賣者令主管官司盡付宿泗川買石叚入内供奉官曹貽孫管押上京増修諸門又詔近劉舜卿乞留投來北人科格依於代州辨彼國刺事人己如其所請再詳本州宻邇戎境事無巨細彼悉知之前嵗所留色格已可準騐今既存留必引惹争理可令發遣赴太原候有捕獲姦人依舜卿奏令審辨真偽丙子詔沅州置歸逺一指揮以五百人為額其新置静江指揮更不招塡黄河諸埽龍女廟並以靈津為名封神濟夫人
