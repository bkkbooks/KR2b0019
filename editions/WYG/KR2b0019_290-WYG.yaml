body:
  text: 續資治通鑑長編巻二百八十六宋李燾撰神宗熈寧十年十二月丁丑朔廣東轉運司奏占城國進象辛巳以太常丞直史館檢正中書五房公事俞充為集賢殿修撰都大提舉市易司兼在京諸司庫務不知誰代充為都檢正七月二十四日壬申初除都檢正御史彭汝礪有言十月十四日令兩浙監司體量壬午詔自明年正月朔旦改元為元豐權發遣福建路轉運使蹇周輔乞移路分都監一員駐建州從之詔南郊禮畢在外學士韓維王陶孫永陳薦皆東宫舊臣依陪祠例給賜又詔贈太師尚書令兼中書令武功郡王髙遵甫追封衛王定國軍留後贈侍中向經贈太傅中書令河間郡王廣濟河輦運張士澄以催運有勞減磨勘三年本不當書以初復廣濟河運故特書之七年十月丁夘士澄初修廣濟河詳定一司勅所以刑部勅來上其朝㫖自中書頒降者皆曰勅自樞宻院者皆曰宣凡九門共六十三條從之中書時政記十二月六日詳定一司勅所言凖朝㫖送下編到刑部勅二巻共七十一條令将所修條并後來勅劄一處看討其間事屬别司者則悉歸本司若兩司以上通行者候将來修入在京通用勅已有條式者更不重載文義未安者就加損益合與海行勅相照者己申中書及牒重修編勅所兼詳皇祐一司勅係皇祐四年九月八日頒降令於逐條後目為降勅日其後來聖㫖劄子批状中書頒降者悉名曰勅樞宻院頒降者悉名曰宣共修成一巻分九門緫六十三條已送刑部審刑院大理寺律學看詳後申中書門下看詳訖其改更條件屬樞宻院内事體大者亦已申禀如得允當乞降勅命以熈寧詳定尚書刑部勅為名下本部雕印頒降仍乞與律令格式編勅兼行如與本部勅文意相妨者許依本部勅未降新勅日前已用舊勅與奪之事不得援引新勅追改其熈寧十年六月終已前條貫已經編載者更不行用内本部見用舊法升補出官人吏新勅無文者並依舊條施行候無合用舊法人吏其條更不行用舊條内合入别勅不係衝改者未頒降新條間且依舊施行所有熈寜十年七月一日以後條目為後勅詔刑部依此施行時政太詳實録太畧㑹要當用給度僧牒一百三賜福州船户以其被募征安南船有損壊故也甲申手詔比楊琰髙靖檢河道回具所見條上可召審問參質利害庶被災之民不致枉有勞役初河决曹村命官塞之而故道已堙髙仰水不得下議者欲自夏津縣東開簽河入堇固䕶舊河七十里九十歩又自張村埽直東築隄至龐家荘古隄袤五十里二百歩計用兵三百餘萬物料三十餘萬而琰等以為口塞水流則河道自成不必開築以糜工役上重其事故令審問仍詔侍御史知雜事蔡確同相視以聞既而以確母病改命樞宻都承㫖韓縝後縝言漲水衝刷新河已成河道河勢變移無常雖開河就隄及於河身剏立生隄枉費功力欲止用新河量加増修可以經乆從之縝言在明年正月今依朱本移入此又詔經制熈河路邉防財用司條上利害事内有可行者宜先行下庶於田事未興可及時經畫以助邉費時以熈河用度不足仰度支供億於是命入内都知李憲領經制財用司中書具憲所條上可施行者凡十四事如所奏行之八月六日文武百官並以南郊赦書加恩殿前虎翼軍都指揮使張崇換文思使以秦鳯熈河路計議措置邉事司攻討山後生羌所部獲級數多故也詔内外責降官侍從之臣委中書宗室委大宗正司武臣委樞宻院具元犯取㫖詔西蕃董戩已遣使朝貢舊係秦州解發今既建熈河一路委本路帥府解發并給茶綵詔集慶軍節度使同平章事宗諤崇信軍節度使同平章事判大宗正事宗旦各賜毬文金帶乙酉明州言日本國遣僧仲囬等六人貢方物丁亥皇子傭為天平軍節度使均國公价為武勝軍節度使建國公上批遂州西南重鎮鈐轄一道兵甲朝廷常遴擇守臣今梁端資齒庸邁恐不足任事可别選官乃差范純禮差純禮據御集明年正月二十五日乃為河東路提舉常平當考梁端墓銘張舜民作入内東頭供奉官勾當御藥院劉有方乞罷職事詔除東作坊使仍帯御噐械以勾當御藥院嵗乆及逮事先朝故也賜京西兩路捕盜賞錢五萬緡付河北東路轉運司為塞河之費以秦鳯等路提㸃刑獄駕部貟外郎霍翔兼同管勾經制熈河路邊防財用事其提舉官荘及營田弓箭手公事並罷悉歸本司時政記載經制司奏請條日甚詳今但依實録八月六日戊子以西蕃邈川首領保順軍節度使董戩為西平軍節度使詔知饒州駕部貟外郎范子明移鄰路差遣以提㸃刑獄司言其苛察也編修院言奉詔編修官王存林希編修㑹要存等日討論國史難以專修乞差光祿寺丞李徳芻試校書郎陳知彦修㑹要從之仍於崇文院置局詔南劔州知州通判邵武軍知軍簽判自今並堂選如職事修舉無盜賊驚擾與堂除差遣一次上批故宣慶使昭州防禦使李神福㓜事晉邸及即位給事左右親信特異中禁宻務咸委辦之今裔孫舜舉以家藏宸翰十餘幅來上可賜神福墳寺為褒勤禪院毎二年度一僧毋得為例又批河北縁邉米價騰貴轉運使糴司尚増錢召人入中不惟使逐熟細民艱食又糜公錢以資豪右可速指揮如軍糧可支二年即權住收糴詔開封府界諸路累年災傷積欠二税常平免役錢權行倚閣及減放河北京東路河決水災人户役錢以被災分數為差己丑詣太平興國寺啓聖院萬夀觀神御恭謝庚寅詣慈孝寺神御殿恭謝遂幸中太一宫集禧觀大相國寺癸巳徳州防禦使李珣為宣州觀察使知相州以上批珣自改防禦使及今已二十年宜以章懿太后近戚之故特遷一官韓縝等上與遼人徃復公移及相見語録并地圗詔縝同吕大忠以耶律榮等齎來文字館伴所語録及劉忱等案視疆場與北人論議及朝廷前後指揮分門編録以聞大忠服闋判兵部遷宻院檢詳不知當此時任何官涇原路經略司言鎮戎軍熈寧寨經乆可守禦乞且存留從之以皇城使登州防禦使趙令晏提舉在京諸司庫務此據朱本宗室書姓與常例不同當考甲午知諫院黄履言近因陪侍郊祭竊觀禮樂之用以今準古有未合者盖自秦至於周文章殘缺有不可考故也然臣聞禮者義之實也協諸義而協則禮雖先王未之有猶可以義起况因其有而正之乎伏望命有司并羣祀考正其大略而歸之情文相稱詔履與禮院官講求以聞明年二月戊午置詳定所右正言直集賢院兼侍御史知雜事蔡確知制誥以上批確可召試故也知桂州趙卨言邕欽州峒丁訓練未至欲先委安撫都監劉初因提舉團結徃逐寨鎮選武藝精彊上等人籍姓名外其中下等人委逐州峒知州等訓練至嵗終教習増及三分本州峒首領各置所管人數與轉資減磨勘年等第給賜從之詔近下經制熈河路財用司畫一治田等事聞所降指揮已入遞付熈州治所縁本司官李憲見在京師宜别録中速劄下庶令及時早得行遣八月六日經制熈河路邊防財用司李憲言奉勅差專切經制熈河路經乆邊防及財用條陳置司事一曰備戰蕃兵春秋逐族畨休勾抽㸃閱犒設二曰弓箭手以萬人馬以六千匹為額以漸減戍兵於要害處築護耕堡農隙委官㸃閱三曰熈河岷州通逺軍各置𣙜場貿易百貨以來逺人獲利助邊四曰一路城壘依緩急先後興功修築以簡中保寜指揮充役五曰於本路擇水草便利䖏約以古法置監牧養牛羊等詔㩁場以市易司為名餘令立法以聞丁酉龍神衛四廂都指揮使昌州團練使知河州苖授知雄州西上閤門使果州團練使秦鳯路鈐轄劉昌祚知河州劉昌祚知河州朱本乃於明年正月九日别書今止從墨本知制誥知審官西院蔡確知諌院兼判司農寺詔三司於永興秦鳯兩路支年額鹽鈔錢三十萬緡付羣牧司買馬知桂州趙卨乞専委横山寨主監押招誘蠻人買特磨道等戰馬從之辛丑遼主遣賀正旦國信使長寧軍節度使耶律孝淳副使太常少卿史館修撰李儼來賀正旦客省使達州刺史熈河路鈐轄王君萬兼同管勾經制本路邊防財用事君萬言乞推示恩信誘結董戩等部族首領詔熈河路經略司應董戩般擦到本路即令開諭首領有願補漢官者保明以聞君萬兼經制財用朱本乃於明年正月九日别書今止從墨本樞宻院言東作坊使知乾寧軍向綽上簽書樞宻院事曽孝寛問候書不合叙說到恩州故城村有一賈家係保正在村恣横號截道虎州縣囬避保甲作賊因依已差替詔與駐泊或州都監差遣此據宻院時政記詔以諸路禁軍闕額數多遣大使臣七貟於開封府界京東西陕西荆湖路與長吏及當職官招簡填補増徐州彭城縣丞一貟於利國監又詔經制熈河路邊防財用司兼秦鳯路財利事及置市易務不𨽻都提舉市易司其熈河秦鳯路市易務並罷明年正月癸亥當考癸卯河北路體量安撫安燾言乞河北兩路被水災户第四等以下放稅及七分者望許赴常平倉借請糧以口率為差又流民所至當行賑救宜許於常平省倉或封樁糧借支以度僧牒所兊米數撥還如不足則勸誘力及之家出備即毋得於數外掊斂從之河北東路經略使韓絳言殿中丞權通判代州趙咸根括地畢乞推恩詔趙咸遷一官陞一任經制熈河路邊防財用司言州軍城寨各有蕃部弓箭手官荘營田水利等事務繁多乞依常平司逐州軍差通判或職官一貟逐城寨選使臣一貟充管勾官從之詔南劔汀建邵武四州軍自今為重法地分從轉運使蹇周輔請也元豐元年六月二十九日可考宣政使李憲為宣慶使詔彭汝礪所言俞充事訪聞係虞部貟外郎宋均國說與臺官令均國分析聞奏時政記十二月二十七日事明年正月二十三日均國分析到訖無行遣甲辰詔鑄錢司並以元豐通寳為文又詔禮院講求親祠太廟而不及配享功臣禮例以聞明年閏正月壬午配享是嵗宗室子賜名授官者五十四人斷大辟三百八十九人天下主客户一千四百二十四萬五千二百七十口三千八十萬七千二百一十一此據王珪㑹要増入實録無之司馬光以書與吴充言光愚戇迂僻自知於世無所堪可以是退伏散地茍竊㣲祿以庇身保家而已近聞道路之人自京師來者多云相公時語及姓名或云亦常有所薦引未知虛實光自居洛以來仕宦之心乆已杜絶在少壯之時猶不如人况年垂六十鬚髪皓然視昬聽重齒落七八精神衰耗豈復容有干進之心但以從遊之乆今日特蒙齒記感荷知己之恩終身豈敢忘哉顧惟相公富貴顯榮豐備已極光踈冗之人無一物可以為報惟忠信之言庶㡬仰醻盛徳之萬一耳伏惟明主厯選周行登用人傑以毗元化以光不敢忘知己之心知相公必不輕孤於明主也竊見國家自行新法以來中外恟恟人無愚智咸知其非州縣之吏困於煩苛以夜繼晝棄置實務崇飾空文以刻意為能以欺誣為才閭閻之民迫於誅斂人無貧富咸失作業愁怨流離轉死溝壑聚為盜賊日夜引領冀朝廷之覺寤弊法之變更凢幾年于兹矣相公聰明豈得不聞之邪今府庫之實耗費殆竭倉廪之儲僅支數月民間貲産朝不謀夕而用度日廣掊斂日急河北京東淮南蠭起之盜攻剽城邑殺掠官吏官軍已不能制矣若不幸復有方二三千里之水旱霜蝗所在如是其為憂患豈可勝諱㢤此得謂之細事保其必無而恬然不以為意乎賈誼當漢文之世以為譬如抱火厝之積薪之下而寝其上火未及然因謂之安若當今日必謂之火已然而安寝自若者也昔周公勤勞王家坐以待旦䟦胡疐尾羽敝口瘏終能為周家成太平之業立八百之祚身為太師名播無窮子孫奄有龜䝉與周升降王夷甫位居宰輔不思經國專欲自全置二弟於方鎮以為三窟及晉室阽危身亦不免然則聖賢之心豈皆忘身徇物不自為謀哉盖以國家興隆則身未有不預其福者也顧衆人之識近而聖賢之慮逺耳如相公之用心固周公之用心也今若法弊而不更民疲而不恤萬一䑕竊益多蠭䘍有毒則竊恐廟堂之位亦未易安居雖復委逺機柄均逸外藩外藩固非息肩之䖏乃至投簮解紱嘯傲東山東山亦非髙枕之地也然則相公今日救天下之急保國家之安更無所與讓矣救急保安之道茍不罷青苗免役保甲市易之息征伐之謀而欲求其成效是猶惡湯之沸而益薪皷橐欲適鄢郢而北轅疾驅也所求必不果矣欲去此五者而不先别利害以寤人主之心則五者不可得而去矣欲寤人主之心而不先開言路則人主之心不可得而寤矣所謂開言路者非如曏時徒下詔書使臣民言得失既而所言當者一無所施行又取其稍訐直者隨而罪之此乃塞言路非開之也為今之要在於輔佐之臣朝夕啓沃惟以親忠直納諫諍廣聰明去壅蔽為先務如是政令之得失下民之疾苦粲然無所隠矣以聖主睿明之資有賢相公忠信之助使讜言日進下情上通則至治可指期而致弊法何難去㦲夫難得而易失者時也今病雖已深猶未至膏肓茍制治於未亂保邦於未危尚有反掌之易失今不治遂為痼疾雖邴魏姚宋之佐將莫如之何必有噬臍之悔矣相公讀書從仕位至首相展志行道正在此時茍志無所屈道無所失其合則利澤及於四海其不合則令名髙於千古丈夫立身事君始終如此亦可以為無負矣充代王安石為相知天下不便新法欲有所變更嘗乞召還光及吕公著韓維蘇頌又薦孫覺李常程顥等十數人皆安石所斥退者故光遺以此書而充不能用光亦卒不起光與充書不知何時據光書云年垂六十充以熈寧九年十月代王安石為相光是年五十八其明年當熈寧十年光年五十九因取光書附十年末張方平上書言臣聞好兵猶好色也傷生之事非一而好色者必死賊民之事非一而好兵者必亡此理之必然者也夫惟聖人之兵皆出於不得已故其勝也享安全之福其不勝也必無意外之患後世用兵皆得已而不已故其勝也則變遲而禍大其不勝也則變速而禍小是以聖人不計勝負之功而深戒用兵之禍何者興師十萬日費千金内外騷動殆於道路者七十萬家内則府庫空虚外則百姓窮匱饑寒逼迫其後必有盜賊之憂死傷愁怨其終必致水旱之報上則將帥擁衆有䟦扈之心下則士衆乆役有潰叛之志變故百出皆由用兵至於興事首議之人冥謫尤重盖以平民無故縁兵而死怨氣充積必有任其咎者是以聖人畏之重之非不得已不敢用也自古人主好動干戈由敗而亡者不可勝數臣今不敢復言請為陛下言其勝者秦始皇既平六國復事逺畧戍役之患被於四海雖拓地千里逺過三代而墳土未乾天下怨叛二世被害子嬰被擒滅亡之酷自古所未嘗有也漢武帝承文景富溢之餘首挑匈奴兵連不解遂使侵尋及於諸國嵗嵗調發所至成功建元之間兵禍始作是時蚩尤旗出長與天等其春戾太子生自是師行三十餘年死者無數及巫蠱事起京師流血僵尸數萬太子父子皆敗故班固以為太子生長於兵與之終始帝雖悔悟自克而沒身之恨已無及矣隋文帝既下江南繼事西北煬帝嗣位此志不衰皆能誅滅彊國威震萬里然而民怨盜起亡不旋踵唐太宗神武無敵尤喜用兵既已滅突厥髙昌吐谷渾等猶且未厭親駕遼東皆志在立功非不得已而用其後武氏之難唐室凌遲不絶如綫盖用兵之禍物理難逃不然太宗仁聖寛厚克已裕人㡬至刑措而一𫝊之後子孫塗炭此豈為善之報也哉由此觀之漢唐用兵於寛仁之後故勝而僅存秦隋用兵於殘暴之餘故勝而遂滅臣毎讀書至此未嘗不掩巻流涕傷其計之過也若使此四君者方其用兵之初隨即敗衂惕然戒懼知用兵之難禍敗之興當不至此不幸毎舉輙勝故使狃於功利慮患不深臣故曰勝則變遲而禍大不勝則變速而禍小不可不察也昔仁宗皇帝覆育天下無意於兵将士惰媮兵革朽鈍元昊乗間竊發西鄙延安麟府涇原之間敗者三四所䘮動以萬計而海内宴然兵休事已而民無怨言國無遺患何者天下臣庶知其無好兵之心天地鬼神諒其有不得已之實故也今陛下天錫勇智意在富彊即位以來繕甲治兵伺候鄰國羣臣察見此指多言用兵其始也弼臣執國命者無憂深思逺之心樞臣當國論者無慮害持難之識在臺諫之職者無獻替納忠之議從㣲至著遂成厲階既而薛向為横山之謀韓絳効深入之計陳升之吕公弼等隂與協力師徒䘮敗財用耗絀較之寳元慶厯之敗不及十一然而天怒人怨邊兵叛背京師騷然陛下為之旰食者累月何者用兵之端陛下作之是以吏士無怒敵之意而不直陛下也尚賴祖宗積累之厚皇天保佑之深故使兵出無功感悟聖意然淺見之士方且以敗為恥力欲求勝以稱上心於是王韶作禍於熈河章惇造釁於横山熊本發難於渝瀘然此等皆殘殺已降俘纍老弱困敝腹心而取空虛無用之地以為武功使陛下受此虛名而忽於實禍勉彊砥礪奮於功名故沈起劉彞復發於安南使十餘萬人暴露瘴毒死者十而五六道路之人斃於輸送貲糧噐械不見敵而盡以為用兵之意且少衰而李憲之之師復出於洮州矣今師徒克㨗銳氣方盛陛下喜於一勝必有輕視四裔陵侮敵國之意天意難測臣實畏之且夫戰勝之後陛下可得而知者凱旋㨗奏拜表稱賀赫然耳目之觀耳至於逺方之民肝腦屠於白刄筋骨絶於餽餉流離破産鬻賣男女薫眼折臂自經之狀陛下必不得而見也慈父孝子孤臣寡婦之哭聲陛下必不得而聞也譬猶屠殺牛羊刳臠魚鱉以為膳羞食者甚美見食者甚苦按蘇軾文集作死者甚苦使陛下見其號呼於梃刄之下宛轉於刀几之間雖八珍之美必将投筯而不忍食而况用人之命以為耳目之觀乎且使陛下将卒精彊府庫充實如秦漢隋唐之君則既勝之後禍亂方興尚不可救而况所任将吏罷軟凡庸較之古人萬萬不逮而數年以来公私窘乏内府累世之積掃地無餘州郡征稅之儲上供殆盡百官廪俸僅而能繼南郊賞給乆而未辦以此舉動雖有智者無以善其後矣且饑疫之後所在盜賊蠭起京東河北尤不可言若軍事一興横斂随作民窮而無告其勢不為大盜無以自全邊事方深内患復起則勝廣之形将在於此此老臣所以終夜不寐臨食而歎至於慟哭而不能自止也且臣聞之凡舉大事必順天心天之所向以之舉事必成天之所背以之舉事必敗盖天心向背之迹見於災祥豐歉之間今自近嵗日食星變地震山崩水旱疫癘連年不解民死将半天心之所向背可以見矣而陛下方且斷然不顧興事不已譬如人子得過於父母惟有恭順静黙引咎自責庶㡬可解今乃紛然詰責奴婢恣行箠楚以此事親未有見赦於父母者故臣願陛下逺覽前世興亡之迹深察天心向背之理絶意兵革之事保疆睦鄰安静無為為社稷長乆之計上以安二宫朝夕之養下以濟四方億兆之命則臣雖老死溝壑瞑目於地下矣昔漢祖破滅羣雄遂有天下光武百戰百勝祀漢配天然至白登被圍則講和親之議西域請吏則出謝絶之言此二帝者非不知兵也盖經變既多則慮患深逺今陛下深居九重而輕議討伐老臣庸懦私竊以為過矣然而人臣納說於君因其既厭而止之則易為力迎其方銳而折之則難為功凡有血氣之倫皆有好勝之意方其氣之盛也雖布衣賤士有不可奪自非智識特逹度量過人未有能於勇銳奮發之中舎已從人惟義是聽者也今陛下盛氣於用武勢不可囬臣非不知而獻言不已者誠見陛下聖徳寛大聽納不疑故不敢以衆人好勝之常心望於陛下且意陛下他日親見用兵之害必将哀痛悔恨而追咎左右大臣未嘗一言臣亦将老且死見先帝於地下亦有以藉口矣惟陛下哀而察之書辭盖方平託蘇軾為之上頗為感動訖不從也至永樂敗乃思其言云十朝綱要云是嵗以提舉茶場司李杞言始盡𣙜蜀茶
