body:
  text: 續資治通鑑長編巻九十九宋李燾撰真宗乾興元年七月戊辰朔降丁謂子太常丞直集賢院珙為太子中允落職監郢州税珝玘珷各追一官並勒停隨父知河南府薛顔素與丁謂厚善庚午命知應天府趙湘與顔易任辛未馮拯加司徒曺利用加武寧節度使王曽加中書侍郎平章事吕夷簡為給事中魯宗道為右諫議大夫並參知政事宗道為人剛正嫉惡少容遇事敢言不為小謹為諭徳時居近酒肆嘗微行就飲肆中偶真宗亟召使者及門久之宗道方自酒肆來使者先約曰即上怪公來遲何以為對宗道曰第以實對使者曰然則公當得罪曰飲酒人之常情欺君臣子之大罪也真宗果問使者具以宗道所言對帝詰之宗道謝曰有故人自鄉里來臣家貧無杯杓故就酒家飲帝以為忠實可大用嘗以語太后太后識之於是并夷簡皆首蒙擢任壬申玉清昭應宫副使翰林侍讀學士刑部尚書林特落職歸班禮部郎中知制誥史館修撰祖士衡落職知吉州降侍御史知宣州章頻為比部貟外郎監饒州酒税淮南江浙荆湖制置發運使禮部郎中蘇維甫知宣州權戸部判官工部郎中黄宗旦知袁州權鹽鐵判官工部郎中孫元方知宿州周嘉正知金州戸部判官度支貟外郎上官佖知晉州金部貟外郎權磨勘司李直方知淄州並坐丁謂黨也元方嘉正未詳佖濟隂人禮儀院言大行山陵禮畢莊穆皇后郭氏嘗母儀天下禮當升祔莊懐皇后潘氏本從藩邸追命止當饗於后廟詔集議尚書省學士承㫖李維等請如禮儀院所定詔恭依癸酉以翰林學士左諫議大夫知制誥晏殊為給事中上即位殊已進官太后謂東宫舊臣恩不稱特加命焉甲戌召前都官貟外郎黄震赴闕震前為淮南江浙荆湖制置發運使與李溥共事嘗發其私及為溥所訴免官中外皆稱其枉後屢更赦宥以溥丁謂之黨不敢自直謂既貶大臣為言乃召之復官饒州乙亥戸部郎中直史館劉鍇為皇后回謝契丹使客省副使曺儀副之工部郎中趙賀為皇帝囬謝使内殿承制閤門祇候楊承吉副之楊承吉未見丙子樞宻副使錢惟演為樞宻使惟演舊位王曽上曽既入相亦正惟演使名故事樞宻使必加檢校官惟演但以兵部尚書充使有司失之也太平興國六年九月石熈載初以文資正官充使不知帶檢校官否當考戊寅詔真宗陵名曰永定始丁謂請名陵曰鎮陵及謂貶馮拯謂三陵皆有永字故易曰永定陵然永定乃縣名也宣祖陵止名安陵又不知翼祖已名定陵於是復改翼祖陵為靖陵議者譏拯不學當時無正之者譏拯不學此據㑹要己卯降工部貟外郎直集賢院權判鹽鐵勾院潘汝士知䖍州汝士謹修子丁謂女壻也殿中丞集賢校理知開封縣錢致堯落職監池州酒税始丁謂知江寧致堯為府從事及謂入相擢為館職知赤縣倚謂勢納賂謂敗并黜之錢致堯未見輔臣三上表請皇太后遵遺制每五日一臨便殿依先定儀注許令中書樞宻院奏事與皇帝共加裁酌皇太后不許復上皇帝表乃從之先是女道士劉徳妙者嘗以巫師出入丁謂家謂敗逮繫徳妙欵通謂嘗教言乃所為不過巫事不若託老君言禍福足以動人於是即謂家設神像夜醮于園中雷允恭數至請禱及真宗崩引入禁中及因穿地得龜蛇令徳妙持入内紿言出其家山洞中乃復教云上即問若所事何知為老君苐云相公非凡人當知之謂又作二頌題曰混元皇帝賜徳妙語渉妖誕辛卯再貶謂崖州司戸叅軍諸子並勒停玘又坐與徳妙姦除名配𨽻復州籍其家得四方遺賂不可勝紀其弟誦説諫悉降黜仍以罪狀布告中外始謂命宋綬草冦準責詞綬請其故謂曰春秋無將漢法不道皆證事也綬雖從謂指然卒改易謂本語不純用及謂貶綬猶當制即草詞曰無將之戒舊典甚明不道之辜常刑罔赦朝論快焉謂初逐準京師為之語曰欲得天下寧當㧞眼中丁欲得天下好莫如召冦老不半歲謂亦貶人皆以為報復之速天道安可誣也謂竄崖州道出雷州準遣人以一蒸羊逆之境上謂欲見準準拒絶之聞家僮謀欲報仇亟杜門使縱博毋得出伺謂行逺乃罷壬辰詔中外臣僚有曽與丁謂往來者一切不問時遣侍御史方謹言籍其家得士大夫書多干請闗通者悉焚之不以聞世稱其長者謹言莆田人也以學士院試到諸州賀登位貢奉人曽舉進士者為試大理評事曽舉諸科者為祕書省正字餘並為試祕書省校書郎不就試者並補太廟齋郎其州縣官與加階齋郎試䘖并出身人各減三選以上滿者並與家便三班使臣亦與家便指使殿侍與三班差使牙校加恩詔國忌日聽決杖罪從知泗州楊居簡之請也癸巳御崇政殿閲諸軍轉貟凡三日而畢樞宻副使一貟宿本院三日進宣而給之國朝殿前司捧日天武馬軍司龍衞歩軍司神衞謂之上四軍軍各左右廂每廂各有都指揮使一貟廂各三軍每軍五指揮一軍又各有指揮使一貟都虞候副之捧日天武龍神衞又有第四軍處所退年髙者無都指揮使止有都虞候殿前司又有神勇宣武驍騎各上下軍軍十指揮又有寧朔驍勝各十指揮虎翼左右各五軍軍十指揮並有都指揮使都虞候馬軍司則有雲騎武騎各十指揮歩軍司則有虎翼左右各五軍軍十指揮每軍各有都指揮使一貟都虞候副之每遇大禮後各以次遷補凡軍校遷至軍都指揮使又遷則遥領刺史又遷為廂都指揮使遥領團練使員溢即從上落軍職為正團練使刺史之本任或為他州部署鈐轄其老疾若過失者為御前忠佐馬歩軍都軍頭副都軍頭𨽻軍頭司甚者黜為外州馬歩軍都指揮使甲午輔臣請皇太后皇帝五日一御承明殿凡軍馬機宜及臣下陳乞恩澤並呈禀取㫖若常事即依舊進入候印畫付外或事從别㫖有未可行者即於御前納下再俟處分從之先是諸州軍長吏往往擅刺配罪人丙申下詔禁止若情渉巨蠧者須奏待報又詔諸路按察官取乾興赦前配𨽻兵籍者列所坐罪狀以聞自是每下赦書輙及之後詔乃八月甲寅今依本志聫書之八月壬寅以禮部郎中知制誥張師徳為契丹妻蕭氏生辰國信使西京左藏庫副使趙忠輔副之契丹妻生辰專遣使始此趙忠輔未見試校書郎前知臨海縣館閣校勘錢仙芝為大理評事故事試銜雖覃恩無改官者以仙芝帖職文館特遷之乙巳上與皇太后御承明殿埀簾決事始用王曽議也宰相率百官拜表稱賀太后哀慟久之令内侍宣諭曰候上春秋長即當還政馮拯等言太后臨朝葢先帝顧命之託也拯繼丁謂為相頗欲躡謂故迹王曽獨曉以禍福且逆折之拯不敢肆自是事一決於兩宫初謂定太后稱予謂敗中書與禮儀院叅議每下制令稱予而便殿處分事稱吾太后詔止稱吾王曽折馮拯此據富弼所作曽行状辛亥詔蘇州仍歲水災令長吏賑卹之乙卯復祕書丞陳詁為祕閣校理詁嘗用王欽若辟簽書河南府判官事坐欽若擅離任落職監襄州酒税至是援赦復職差遣如故詁晉江人也涇原路總管司言西蕃總噶爾與趙徳明相攻掠請益兵為備從之辛酉環州言洪徳寨巴特瑪族巡檢順州刺史慶桑領蕃部咱隆等十八人紿稱西賊冦邊供奉官閤門祇候胡寧戰死于歸徳川其本族三百餘户相繼叛去雖即招還然尚有百餘戸在西界恐潛相結約復入為患其慶桑及諸族首領欲特行處置所部人即令肅逺寨界上威尼族巡檢叙州刺史敏珠爾主之詔遣内殿承制史崇信體量以聞不見崇信後來體量如何詔樞宻院每歲送契丹禮物耶律宗信亦以襲衣金帶賜之宗信即王繼忠也契丹封吳王改今姓名任中行等使還宗信亦以名馬來賀登極宗信獻名馬在九月己巳今并書之癸亥命吏部貟外郎劉曄西京作坊副使郭志言屯田貟外郎王鬷西頭供奉官閤門祇候劉懐徳使契丹賀其主生辰及正旦也丙寅中書請如天禧舊制審官三班院流内銓引見人日不過兩司詔勿以為拘九月己巳詔伎術官自今不得如京朝官用考課遷陟先是司天監丞徐起等言遇先帝御極及上即位止遷一官願如京朝官例遷兩官朝廷惡其倖遂條約之己卯上與皇太后諭輔臣曰前後所降天書皆先帝尊道奉天故靈貺昭答今復土有日其刻玉副本已奉安於玉清昭應宫元降真文止於内中供養則先意可見矧殊尤之瑞專屬先帝不可留於人間當從葬永定陵以符先㫖用王曽吕夷簡之議也天書從葬永定陵據國史實吕夷簡建議魏泰東軒雜記則以為王曽今兩存之庚辰詔分司致仕官表章許在所通奏從太子賔客分司西京韓援所請也戊子召輔臣出政要十巻泣而示之曰朕躬閲先帝聖政紀掇其事之要者纂為此書將以納於皇堂也辛卯靈駕發引禮官言故事内外並吉服上不忍遽易雖左右内侍亦縗服如故輔臣固請始命翌日釋之將發引上不視事者十日其後雖視事猶御便殿初有司請悉壞靈駕所經道路城門廬舍以過車輿象物侍御史知雜事謝濤言先帝東封西祀儀物大備猶不聞有所毁撤且遺詔務從儉薄今有司治明器侈大以勞州縣非先帝意願下少府裁損之太后不可上時與太后俱坐閤中乃言曰城門卑者當毁之民居不當毁也太后以為然冬十月己亥左諫議大夫集賢院學士知泉州陳靖為祕書監致仕靖雅善丁謂及謂貶黨人皆逐提㸃刑獄御史王耿乃言靖老病無政事不宜久為鄉里官故有是命知邵武軍江拯知興化軍楊令聞亦責監杭州樓店務南劒州酒税皆坐耿劾章也王耿已前見未知邑里壬寅契丹遣左伊勒希巴刑部尚書耶律僧隠髙州觀察使韓格來賀上登極己酉𦵏真宗文明章聖元孝皇帝於永定陵禮儀院請避皇太后父祖諱詔唯避父彭城郡王諱仍改通進司為承進司己未祔真宗神主於太廟樂曰大明之舞以莊穆皇后配饗仍詔立莊穆忌初太后欲具平生服玩如宫中以銀罩覆神主參知政事吕夷簡言此未足以報先帝也今天下之政在兩宫惟太后逺姦邪奬忠直輔𨗳皇帝成就聖徳則所以報先帝者宜莫若此辛酉徳音降東西京囚罪一等杖以下釋之蠲山陵役户及靈駕所過民賦租宰臣馮拯以山陵禮畢援唐故事請罷詔不許甲子上與皇太后始復御承明殿翰林學士晏殊等言先朝楊億再為學士班錢惟演上今新除學士劉筠天禧中已入翰林請如故事序班臣等之上從之其後率如此例乙丑以祠部郎中直史館楊岫判尚書祠部先朝普度天下僧道嘗令三司使林特總其事因請侍御史判鹽鐵勾院張及兼領之至是及言勾院闗防天下錢穀而祠部掌天下僧道帳籍亦繁乃復以還尚書省十一月丁卯朔樞宻使錢惟演罷為保大節度使知河陽初惟演見丁謂權盛附離之與為婚姻謂逐冦準惟演與有力焉及序樞宻直學士題名石獨刋去準名曰逆準削而不書謂禍萌惟演慮并得罪遂擠謂以自觧馮拯惡其為人因言惟演以妹妻劉美實太后姻家不可預政請出之乃出惟演為鎮國留後即日改今命惟演至河陽嘗請曲賜鎮兵特支錢太后將許之侍御史知雜事蔡齊曰賞罰者上之所操非臣下所當請且天子新即位惟演連姻后家乃私請偏賞以自為恩必揺衆心不可許即劾惟演罷賜錢戊辰以李沆王旦李繼隆配饗真宗廟庭是日宴百官於崇政殿山陵禮畢故也上初即位三司使尚書左丞李士衡屢以足疾求罷職太后諭曰先帝稱卿全曉金穀利害以比髙熲劉晏宜少安於位俟畢山陵當遂大用及是又固以請庚午授同州觀察使知相州尋改知陳州翰林學士劉筠為御史中丞先是三院御史言事先白中丞筠舉舊儀榜三院門令臺屬各舉紏彈之職毋白丞雜知翰林學士承㫖李維等言準中書送下太常丞祕閣校理同判禮儀院謝絳狀伏覩本院與崇文院檢討官詳定以宣祖配感生帝竊尋宣祖非受命開統因循配祀義或未安臣以謂三代兩漢之際經禮雖著而事逺難法請以唐典明之髙祖武徳初定令每嵗圜丘雩祀並以景帝配祈穀大饗並以元帝配太宗初以髙祖配圜丘明堂北郊之祀元帝專配感生帝髙宗永徽二年祀髙祖於圜丘太宗於明堂兼配感生帝又以景元二帝稱祖萬代不遷遂停配祀以符古義臣以謂景帝厥初受封為唐始祖推於事實葢與宣祖不侔宣祖於唐是為元帝之比唐有天下裁越三世而景元二祖已停配祀之典且有宋受命于兹四聖而宣祖配侑因而未停與唐非合請依永徽故事停宣祖配享仍用唐太宗故事宗祀真宗於明堂兼配感生帝若據鄭康成説則曰五帝迭王王者之興因其所感别祭於南郊以祖配之今若不用永徽故事則請以太祖兼配正符鄭説而論者以宣祖比周之后稷又惑焉詳鄭之意非受命始封之祖則不配故因后稷配靈威仰之義為證惟太祖始造基業配感生帝據理甚明若以配祈穀與感生帝祠日相妨則當以太宗配祈穀太祖配雩祀亦不失尊嚴之㫖臣以謂宣廟非為不遷而迭用配帝於古為疑禮祖有功而宗有徳但非受命之祖親盡必毁而况配享乎臣維等謹按禮記祭法有虞氏禘黄帝而郊嚳祖髙陽而宗堯夏后氏亦禘黄帝而郊鯀祖髙陽而宗禹商人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王正義曰郊謂夏正建寅之月祭感生帝於南郊此則崇配之文也絳所陳以為宣祖非受命開統不當郊配則何以鯀冥非夏商受命之君而皆宗配感生帝竊惟感生比祈穀禮秩差輕宣祖比太祖功業有異今禮官請以太祖配祈穀宣祖配感生帝稱情立文於禮斯協况至道三年敕上辛祀感生帝已定宣祖配今請依禮官嚮所定祈穀祭神州地祗以太祖配雩祀圜丘皇地祗以太祖太宗配祀感生帝以宣祖配大饗明堂以真宗配親祀郊丘以太祖太宗配其謝絳所上議伏請不行詔恭依辛未詔保大節度使錢惟演班静難節度使柴宗慶之上惟演宗慶並檢校太傅而宗慶先為節度使上以惟演嘗歴樞府特升之癸酉命翰林學士承㫖李維翰林學士晏殊修真宗實録尋復命翰林侍講學士孫奭知制誥宋綬度支副使陳堯佐同修仍令内侍諭以一朝大典當謹筆削之意甲戍涇原部署司言總噶爾嘉勒斯賚埒克遵遣蕃部嘉木磋沙卜哩齎文字及馬一匹至本司欲求内附然埒克遵素多狡計未可以為信已遣蕃僧一人及先附得謀者摩壘與來使同入總噶爾兼令刺探所與西界用兵勝負庶預為邉備乙亥以皇太后生日為長寜節中書言前一月百官就大相國寺建道場罷日賜㑹於錫慶院禁刑及屠宰七日前三日命婦進香合至日詣内庭上夀三京度僧道比乾元節三分之一而罷奏紫衣師號詔進奉上夀候真宗喪制畢餘從之初輔臣及禮官請一如乾元節例而太后多所裁損故中書更為此奏禮儀院奏制太后所乘輿名之曰大安輦具太后出入鳴鞭儀衞凡御龍直總五十四人骨朶直總八十四人弓箭直弩直各十四人殿前指揮使左右班各五十六人禁衞皇城司二百人寛衣天武二百人儀衞供御輦官六十二人寛衣天武百人其侍衞諸司應奉悉如乘輿戊寅詔紏察在京刑獄并諸路轉運使副提㸃刑獄及州縣長吏凡勘斷公事並須躬親閲實無令枉濫淹延詔開封府諸縣兵馬都監自今應係縣郭烟火盜賊軍人與百姓鬭爭公事並須同縣司施行會要十一月事今附此庚辰判國子監孫奭言知兖州日於文宣王廟建立學舍以延生徒自後從學者不減數百人臣雖以俸錢贍之然常不給自臣去郡恐漸廢㪚伏見宻州馬耆山講書太學助教楊光輔素有經行望特遷一官令於兖州講書仍給田十頃以為學糧從之遂以光輔為奉禮郎諸州給學田葢始此辛巳始御崇政西閣召翰林侍講學士孫奭龍圗閣直學士兼侍講馮元講論語侍讀學士李維晏殊與焉初詔雙日御經筵自是雖隻日亦召侍臣講讀王曽以上新即位宜近師儒故令奭等入侍上在經筵或左右瞻矚或足敲踏床則奭拱立不講體貎必莊上亦為竦然改聽史多載此事於天聖未今移見此帝意或不在書必初年其後聖徳日新决不然矣壬午以翰林侍讀學士尚書右丞張知白為樞宻副使國子監舊制皆用近臣及宿儒典領近歲頗任貴游子弟之初仕者與管庫資序略均壬辰始命馮元同判國子監仍詔自今毋得差補䕃京朝官癸巳置隨商均金隴丹保通永郴道衡辰全峽洋資榮合文戎雅開逹集施利䕫瀘渠渝潮循南雄英連韶惠容宜劍亷蒙等四十三州光化慶成平定乾寧威勝永定髙郵淮陽漣水廣濟江隂無為廣徳建昌臨江興國南康南安漢陽雲安懐安永康邵武興化等二十四軍録事叅軍各一員替見任司戸司法兼録事叅軍闕詔諸處奏到見禁文狀并斷訖公案自來承進銀臺司先送中書後送刑部㸔詳虛滯日數宜令承進銀臺司自今更不送中書直送刑部詔近降舉官約束或慮選人因小可私過致有滯淹應合該舉官臣僚等自今所舉選人歴中有私罪止是杖以下許轉運或提㸃刑獄二人同罪保舉即依舊施行如轉運或提㸃刑獄一員即更候朝臣二人同罪保舉如無轉運提㸃刑獄即許朝臣七人同罪保舉聞奏方與磨勘十二月丙申朔御史中丞劉筠言比歲京朝幕職州縣官乞換右職皆以父母年髙規免持服自今須皆亡者乃聽從之戊戍滄州言鹽山無棣二縣海潮溢壞公私廬舍溺死者甚衆詔賑卹之甲辰召輔臣崇政殿西廡觀侍講學士孫奭講論語既而上親書唐賢詩以分賜焉自是每召輔臣至經筵多以御書賜之京城穀價翔貴戊申出常平倉米分十四場賤糶以濟貧民庚戌中書言審官院嚮以貟多缺少三年而代者減一年三十月而代者減十月請復如舊制從之辛亥以西頭供奉官閤門祇候曺克己為辰澧鼎州縁邊都巡檢使兼辰澧鼎峽施等州安撫以順州蠻田彦晏焚刼暗利寨故也江隂軍屬縣有利港久廢知軍崔立教民濬治既成溉田數十頃又開横河六十里通漕運降詔奬之乙卯詔應典賣田産影占徭役者聽人告以所隱田三之一予之鄉村不得増置酒場其已募民主之者期三年他人雖欲増課以售勿聽主者欲自増課委官吏度異時不至虧負然後上聞初上封者言州縣力役煩重多典賣田産入形勢之家以規避徭役又天下酒課月比嵗増無有藝極非古者禁羣飲教節用之義故條約之酒場事叅取本志修入會要禁民増置及剗奪乃七年八月二十七日今不取戊午詔自今司天五官正毋得差監在京庫務太常卿知濠州王欽若為刑部尚書知江寧府衡州團練副使李廸為祕書監知舒州容州觀察使左衞大將軍知萊州曺瑋為華州觀察使知青州庚申詔三司開封府殿前馬歩軍司自今歲旦四立二分至及庚戌己巳毋得斷極刑㑹要乾興元年十二月二十五日詔開封府及三司殿前馬歩軍司自今毎遇國忌及庚戌己巳歲旦天慶等五節四立二分二至日不得斷極刑實録不載國忌及天慶等五節不知何故當考兩朝史刑法志云國忌日舊亦禁刑天聖初聽决放罪其後又詔真宗忌如天慶節釋杖笞情輕者久之亦罷契丹遣右伊勒希巴兵部尚書耶律仙寧給事中知制誥史克忠來賀正旦是歲改徴欠司為蠲納司開封府判官王博文初喪父其母改適人及母死博文謂古之為父後者不為出母服以廢宗廟之祭也今喪者皆祭無害於行服乃觧官而服議者以䘮而祭非禮云博文以天禧四年十月為開封府判官其觧官行服不知何時據本𫝊服除在天聖二年二月則觧官行服必當是歲今附見歲末
