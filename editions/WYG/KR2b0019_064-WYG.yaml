body:
  text: 續資治通鑑長編巻六十宋李燾撰真宗景德二年五月戊申朔幸國子監閱書庫問祭酒邢昺書板㡬何昺曰國初不及四千今十餘萬經史正義皆具臣少時業儒觀學徒能具經疏者百無一二盖傳寫不給今板大備士庻家皆有之斯乃儒者逢時之幸也上喜曰國家雖尚儒術然非四方無事何以及此先是館閣博聚羣書精加讎校經史未有印板者悉令刋刻或言三國志乃姦雄角立之事不當傳布上曰君臣善惡足為鑒戒仲尼春秋豈非列國爭鬬之書乎先是印書裁截餘紙皆鬻之以供監中雜用昺請歸此錢於三司禆國計自是學者公費不給講官益厭其寥落云或附此於昺卒時宣徽北院使雷有終倜儻自任不拘小節歴任藩閫能撫士卒豐於宴犒公費不足則傾私帑給之或言其無亷稱然奉身甚薄止有銅鞍勒京師崇仁里第本其父德驤所創有終在蜀嘗借用庫錢數百萬奏納第以償優詔蠲免於是自并州入為宣徽使上知有終家無餘財己酉命特給亷鎮公用錢二千貫王繼英時掌樞宻頗忌有終進用屢言其在蜀及守邊厚費以收士卒心上終保䕶之居數月卒身後宿負猶不啻百萬㑹要言有終貪墨事當叅考知雄州何承矩言契丹新城𣙜場都監劉日新致書遺氊羊酒詔承矩受之答以藥物初李繼隆遺奏親属牙校等凡三十人有司請援曹彬潘美恩例上曰繼隆乃太后兄可引杜審進為比因求其案籍具得之於是繼隆子姪並超等遷秩至於疎属給使輩咸收叙焉其弟洛苑使繼和耻受延賞不列於遺奏庚戍特拜西上閤門使先是賊有王長壽者本亡命卒有勇力多計慮聚徒百餘抵陳留剽攻郡縣捕之不獲朝廷専遣使益兵追逐於澶濮間㑹契丹南侵夾河民庻驚擾長壽結黨愈衆人皆患之磁州刺史許均自永興帥所部兵赴行在至胙城長壽與其徒五千餘入縣鈔略均部下兵袒裼與鬬設方略生禽長壽梟獲惡黨皆盡上以方禦戎冦未欲因捕賊奨均但賞其所部兵被傷者賜帛遷級焉於是追叙前勞擢為本州團練使覇州言得北界永清都監牒部民李加興先以錢二十千贖得南界掠來婦人阿杜為妻近同至覇州鬻席為前夫齊鸞擒去請追捕還付加興本州以杜本鸞妻難復追還已牒報訖上曰此乃修好前所掠或再有求索當官為出所贖錢以還加興詔河東諸州軍兵馬都監監押有二員者省其一辛亥詔陜西縁邊州軍蕃部罰納獻送羊馬悉著籍以供公費先是蕃部有罪納貲為贖及守臣出處更代多以畜産為賀並入於長吏至有生事以邀其利者使之不寧上亷知其弊欲遽止之復慮戎人犯禁無以為戒乃降是詔殿前都虞候寧州防禦使張凝忠勇好功名累任西北善訓士卒繕完噐仗所至常有奮勵効報之志前後賞賜甚厚多以犒師家無餘貲京師無居第上嘗與近臣論將帥曰選用武臣實難儻未嘗更歴則不能周知其才太宗所擢甚衆而優待者唯凝與王斌王憲等數人每賜與絶殊倫輩乃知先帝知人之明也於是凝為髙陽闗副都部署卒上甚惜之賻贈加等遣中使䕶其喪歸𦵏王憲未見王斌有傳在天禧元年四月陽翟人自有事二邊戍兵寖廣師行饋運仰於博易有司務優物估以來輸入河北有水運而地里差近亦有京師輦送者其入中大約人糧㪷増六十五錢馬料増四十五錢西鄙回逺及渉磧隂運載甚難其入中之價靈州㪷粟有至千錢以上者自餘州率不下數百邊地市估之外别加擡為入中價無定皆轉運使視當時緩急而裁處之如粟價當得七百五十錢者交引給以千錢又倍之為二千切於所須故不吝南貨初商人以鹽為急皆競趨焉及禁江淮鹽又増用茶當得十五六千至二十千輙加給百千又有官耗隨所饒益其輸邊粟者非盡行商率其土人既得交引持詣衝要州府鬻之市得者寡至京師京師有坐賈置鋪𨽻名㩁貨務懐交引者凑之若行商則鋪賈為保任詣京師㩁務給錢又移文南州給茶若非行商則鋪賈自售之轉鬻與茶賈及和好罷兵邊儲稍緩物價差减而官給交引虛錢之名未改既以茶代鹽而買茶所入不充其給交引停積故商旅所得茶指期於數年之外京師交引愈賤至有裁得所入芻粟之實價者官私俱無利於是命鹽鐡副使林特與宫苑使劉承珪崇儀副使李溥就三司悉索舊條制詳定特呼豪商問訊别為新法其於京師入金銀綿帛直錢五十千者給百千實茶河北縁邊入金帛芻粟如京師之制而増茶十千次邊増五千河東縁邊次邊亦然而所増有八千六千之差陜西縁邊亦如之而増十五千次邊所増如河北縁邊之制其三路近地所入所給皆如京師仍約束山場園户謹其出納議奏集三司官視其可否咸言其便詔如所議壬子以溥為制置淮南江浙荆湖茶鹽礬稅兼都大發運事委成其事實錄於九月壬戌書三司請許商賈於河北河東陜西州軍依在京例納見錢金銀毎實錢五十五貫給海州茶准百貫從之今從本志并書于此實録但云兼都大發運事㑹要乃云發運使按景徳四年八月溥以發運副使遷發運使則初除必非使今從實録又景德三年二月馮亮初除發運使㑹要及本志並云景德三年復置發運使一人盖發運自此始立使名馮亮為使李溥為副使也儀州言前制勝闗寨主郄勲貿易侵漁蕃部强市諸軍給賜物有軍士與部民爭鬬决訖令荷校示衆者二百七十餘日至是為部民所訟上曰人固不易知勲徃時多奏臣僚不法事以是或稱其盡公稍加任用敢爾貪暴轉運使亦不能按舉何也宜以兹事徧諭諸路劾勲罪以聞癸丑遣淄州團練使康進虢州團練使慕興濮州刺史郭自明濰州刺史冦達乾州刺史樹超並還本任以嘗䕶邊無聲績故罷其兵職郭自明冦達樹超未見以太常博士張檢知趙州國子博士張紳知洺州上慮河北列郡以邊鄙寧謐懈於武備故遴選守臣因宻詔檢等凡城壘池塹防扞之具常加完葺張檢張紳俱未詳知天雄軍府趙昌言奏所部冦竊未除已下令軍民有能告賊者賞以金帛及署牙校鎮將遷補軍職下其状樞宻院王繼英曰鄉閭小有攘竊不當擅為賞格從之非便上曰然則昌言所下令反為虛語使長吏失信於天下政教何以興行可使易其文止云當為上言請行旌賞而已知鎮戎軍曹瑋言軍境川原夷曠便於騎戰非中國之利請自隴山而東縁古長城鑿塹以為限從之又言邊民應募為弓箭手者皆習障塞蹊隧解羗人語能寒苦有警可參正兵為前鋒而官未嘗與噐械資糧難責其死力請給以境内閑田永蠲其租春秋耕歛出兵而䕶作之詔人給田二頃出甲士一人及三頃者出戰馬一匹設堡戍列部伍補指揮使以下校長有功勞者亦補軍都指揮使置廵檢以統之其後鄜延環慶涇原并河東州軍亦各募置給田蠲租在甲子日今并書秦翰傳云先是西鄙無藩籬之固翰為涇原儀渭鈐轄規度要害鑿巨塹計工三十萬役卒數年而成不煩民力有詔嘉奨此必與瑋事相闗當考又祥符七年四月瑋掘緣邊壕五十一里更詳之或可附塹壕尺度及給田市馬法光禄卿分司西京李昌齡請致仕中書進擬上曰昌齡素無清譽不可牽復丞郎甲寅授秘書監致仕詔葺西京大内及諸司廨舍將朝陵故也將朝陵從㑹要翰林學士承㫖宋白翰林學士梁周翰年衰思減書詔多不稱㫖乙夘並罷白為刑部尚書集賢院學士判院事周翰為給事中判昭文館事以起復右諫議大夫知制誥晁逈起居舍人知制誥李宗諤並為翰林學士宗諤在舍人院嘗牒御史臺不平空中丞呂文仲移文詰之宗諤答以兩省與臺司非統攝文仲不平聞於上有詔辨析宗諤引八事證其不相統攝且言中書門下兩省自正言以上皆天子侍從之官立朝叙班不與外司為比故在正衙則與宰相重行而立於通衢則與中丞分路而行常參則師傅入於兩省之前朝㑹則臺官次於兩省之後地望特峻職業有殊官局之間不相統攝御史臺每牒本省並不平空所以本省移報亦如其儀而文仲止慿吏人之言遽有聞奏且無典章為據伏惟臺憲之職所宜糾察姦邪辯明寃枉廷臣有不法之事得以奏彈下民有無告之人得以申理而於文牒之内爭平空與不平空其事𤨏細烏足助於風威哉卒如宗諤所言守職者韙之以起居舍人直昭文館种放為右諫議大夫放謝病乞㳺嵩山詔許之仍命河南守臣常加存撫召對賜宴賦詩餞行恩禮甚厚刑部員外郎知制誥丁謂為右諫議大夫權三司使事仍詔謂内殿起居立知制誥上丙辰陜西轉運使請繕治金湯白豹等鎮以處投降蕃族上慮勞民弗許先是上以天文地理隂陽術數之書率多舛誤乃命司天少監史序等同加編次掇其精要以類分之為乾坤寶典四百一十七卷丁巳序等上其書上作序藏秘閣蠲道州永明縣民逋租交州黎桓死其仲子龍鉞嗣立龍鉞兄龍全刼庫財而遁其弟龍廷殺龍鉞自立龍廷兄明䕶率扶䦨寨兵攻戰國信使邵􅁮駐嶺表以其事聞戊午就命曄為廣南西路縁邊安撫使聽以便宜設方略桓子明提先入貢還在路詔送伴使臣倍加安撫國史交趾傳載黎桓死乃以為明年事誤也邵􅁮除縁海安撫使時桓既死矣國史便文因失事實今改之㑹要於明年二月始書桓死亦誤也詔雄州契丹請㩁場市易者優其直與之詔麟府鈐轄司自今蕃部歸投不須發兵接引己未詔三司每歳較天下稅簿登耗以聞從度支判官黄世長之請也䕫州路轉運使薛顔等言投降蠻人首領皆已自署職名請因而命之上曰向者川峽屢擾多擅補廵檢將頗桀驁縱恣今蠻人所署復有此名不可從也苐令次補牙校詔殿前侍衛軍校十五年已上不遷者具名引對先是詔禮部貢院别試河北貢舉人其曽援城者進士雖不合格特許奏名諸科例進二場至三場者許終場五舉及經御試并年五十者並以名聞雖不更城守應七舉年六十及瀛州有勞効者亦如之庚申上御崇政殿親試凡七日得進士范昭等五十一人賜及第四十五人出身諸科賜及第同出身并試秩署州助教者六百九十八人特奏名進士諸科賜及第出身至攝助教𨽻殿侍者六百六十二人上以去歳河北用兵民甚驚擾其乘城捍冦奮勇力者多出士人欲廣示甄采所問經義有兩出者或具引為對考官將黜去上親為發明焉特奏名進士李正辭論文武先後以為文者本乎靜武者本乎動動以止亂而主乎靜則先後可知上嘉其近理將擢上第㑹有言其嘗犯杖刑遂補三班奉職撫州進士晏殊年十四大名府進士姜盖年十二皆以俊秀聞特召試殊試詩賦各一首盖試詩六篇殊属辭敏贍上深歎賞宰相冦準以殊江左人欲抑之而進盖上曰朝廷取士惟才是求四海一家豈限遐邇如前代張九齡輩何嘗以僻陋而棄置耶乃賜殊進士出身盖同學究出身後二日復召殊試詩賦論殊具言賦題嘗所私習上益愛其淳直改試他題既成數稱善擢秘書省正字秘閣讀書仍命直史館陳彭年視其所學及檢察其所與㳺者壽春縣主上言其夫兄掌芻藁之職以廢職為有司所舉請宥之上不許使正其罪主楚王元佐女也戊辰權三司使丁謂言徃者川峽諸州屯兵調發資糧頗擾而積鹽甚多募南人輸粟平其價償之以鹽今儲粟漸充請以鹽易絲帛詔諸州軍糧及二年溪洞州及三年者從其請己巳詔自今諸州官吏雪活得人命者並理為勞績先是著作佐郎曹定言官吏雪活乃其職分不當論課最於是太子詹事判刑部慎從吉言誤失用刑率皆受責雪活寃獄曽不霑恩懲勸之間恐未協理望頒新制以朂盡心從之時承平日久掌財賦者法禁愈宻悉籠取遺利凡較課以祖額前界遞年増之㩁務連歳有羡餘三司即取多收為額上以其不俟朝㫖或致掊克癸酉詔増額皆奏裁甲戌以前知興元府太常博士趙湘前知通州殿中丞趙稹同判宗正寺上以宗正職奉陵廟其任至重簡擇宗姓朝臣有才望者領其事以申嚴恭之意聞湘等有治聲故驛召而命焉比至並賜緋魚白金二百兩月俸皆見緡仍别給錢十千稹宣城人也詔幕職州縣官例當免選者有贓罪及行止踰濫並俟選滿日注官内縁酒食計贓者不在此限乙亥知雄州何承矩言將來契丹使入界欲令暫駐新城俟接伴使至迎於界首從之承矩又言使命始通待遇之禮宜得折中庻可久行乃悉條上手詔嘉納仍聽事有未盡者便宜裁處凡契丹使及境遣常參官内職各一人假少卿監諸司使以上接伴内諸司供帳分為三畨内臣主之至白溝驛賜設至貝州賜茶藥各一銀合至大名府又賜設及畿境遣開封府判官勞之又命臺省官諸司使館伴迓於班荆館至都亭驛各賜金花銀灌噐錦衾褥朝見日賜大使金塗銀冠皂羅氊冠衣八件金䩞鞢帯烏皮鞾銀噐二百兩綵帛二百匹副使皂紗折上巾衣七件金帯象笏烏皮鞾銀噐一百兩綵帛二百匹鞍勒馬各一疋其從人上節十八人各練鵲錦襖及衣四件銀噐二十兩綵帛三十匹中節二十人各寶照錦襖及衣三件銀噐十兩綵帛二十匹下節八十五人各紫綺襖及衣四件銀噐十兩綵帛二十匹並加金塗銀帯上節中節又加絲鞵就館賜生餼大使秔粟各十石麫二十石羊五十法酒糯米酒各十壺副使秔粟各七石麫十五石羊三十法酒糯米酒各十壺承天節各别賜衣一襲遇立春各賜金塗銀鏤幡勝春盤又命節帥就玉津園伴射弓賜來使銀餙箭筒弓一箭二十其中的又賜錦窄袍五件金束帯鞍勒馬在館遇節序則遣近臣賜設辭日長春殿賜酒五行賜大使盤毬暈錦窄袍及衣七件銀噐三百兩綵帛二百匹副使紫花羅窄袍及衣六件銀噐二百兩綵帛一百匹並加金束帯雜色羅錦綾絹百匹從人各加紫綾花絁錦袍及銀噐綵帛將發又賜銀缾合盆沙羅注椀等又令近臣餞於班荆館開封府推官餞於郊外接伴使副復為送伴沿路累賜設初命内侍右班副都知閻承翰排辦禮信議者欲以漢衣冠賜契丹使者承翰曰南北異宜各從其土俗可也上從承翰所議承翰又請徙在京渤海契丹諸營於外上曰南北通好重勞人也遽此煩擾則非吾意不許命承翰排辦禮信㑹要在五月而實録無之今并書于此月末六月丁丑朔詔應進士諸科同出身試將作監主簿者並令守選故事登科皆有選限近制及第即命以官咸平三年初復廷試賜出身者亦免選至是䇿名之士尤衆多設等級以振淹滯雖藝不及格悉賜同出身試秩解褐故令有司循用常調以示甄别又下詔勸學權停貢舉二年時命兩制各撰勸學詔趙安仁所作最切於科試之病特俾用之申禁行濫物帛戊寅詔忻代州縁邊諸寨自今北界齎牒至者並送代州仍准條給物以其囬報裁處類例不一故也己夘刑部大理寺三司法直官令吏部銓選流内官一任三考以上謹幹無過工書判者具名引對試斷案五道中格者授之三司大理寺一年刑部三年無私罪者授京官先是悉自令史遷補端拱中冦準判銓奏用士人至是復舉前詔京東諸州蝻蟲生庚辰遣使掩捕仍精潔致祭知永興軍府兼提舉諸州兵甲向敏中請徙環渭戍卒屯涇慶州以省邊用從之辛巳有司言契丹清朔禽戎剰員軍士十八人老病當停詔殿前司詢問無親属者許仍舊願停者從其便上以異域歸順之人老而擯退或無所依故也司天言星文有災在呉越之分詔益昇洪杭福州屯兵令六宅使康繼英等四人分任駐泊都監提舉本路諸州兵馬廵檢事安肅軍言部民數輩私至北界易州州將執之送還詔諭邊臣如北人擅至封内亦登時執送壬午監察御史臨川崔憲言前知廣德軍有祠山廟素號靈應逺近之民多以耕牛為獻自偽命已來聽鄉民租賃每一牛歳輸絹一匹供本廟費近者絹悉入官望給四百匹完葺祠宇上曰如載在祠典有益於民則當官為崇餙何必租絹因令本軍葺之癸未詔諸州商稅年額及三萬貫以上者令審官院選親民官監莅仍給通判添支丁亥以盛暑减京城役課夏州趙德明遣牙將王旻奉表歸欵賜旻錦袍銀帯遣侍禁夏居厚齎詔答之曹州民趙諫與其弟諤皆㓙狡無頼恐喝取財交結權右長吏多與抗禮率干預郡政太常博士鄭人李及受詔通判諫適來京師投刺請見及拒之諫大怒慢罵而去因帖牓言及非毁朝政及得之以匿名事未敢發㑹大理寺丞任中行本諫同鄉里盡知其姦慝宻表言之上即遣中使就訪京東轉運使施䕶知曹州謝濤并及皆條諫兄弟醜迹乃逮繫御史獄又詔開封府曹州吏民先為諫諤恐喝者得自首露釋罪命搜其家得朝士内職中貴所與書尺甚衆計􅂍鉅萬己丑並斬於西市黨與决杖流嶺外與之㳺熟者並坐降黜因詔自今訟不干已事即决杖荷校示衆十日情理切害屢訴人者具名以聞仍配𨽻逺處上初欲窮治與諫交㳺者内出姓名七十餘人付獄中丞吕文仲請對言逮捕者衆或在外郡茍悉索之慮動人聽上曰卿執憲當嫉惡如讎豈公行黨庇耶文仲頓首曰中司之職非徒繩糾愆違亦當顧國家大體今縱七十餘人悉得姦状以陛下之慈仁必不盡戮不過廢棄而已但籍其名更察其為人置於冗散或舉選對揚之日擯斥之未為晚也上從其言施䕶未見庚寅詔自今宗廟忌日西京及諸節鎮給錢十千防團州七千軍事州五千以備齋設無得率斂辛夘鄜延路鈐轄張崇貴言趙德明已奉表歸欵令河西蕃族各守疆界詔諸部如德明無所侵擾則勿縱兵出境癸巳召知鄭州太常博士管城段曄入朝賜五品服遣還任􅁮前通判鄆州㑹知州丁謂入權三司使即以曄知州事謂且薦曄之才故有是命甲午張崇貴自延州入奏詔諭以繼遷昔時變詐之状今當使德明自為誓約納靈州土疆止居平夏遣子弟入宿衛送略去官吏盡散蕃漢兵及質口封境之上有侵擾者稟朝㫖凡七事則授德明以定難節度使西平王賜金帛緡錢四萬貫匹兩茶二萬斤給内地節度使俸聽回圖徃來放青鹽之禁凡五事仍遣閤門通事舍人焦守節偕徃呼德明親信示之如能順命即降恩制既而德明使張浦詣崇貴等靣議及致書疏但多徼求不肯自為誓約也乙未賜殿前都指揮使髙瓊板本經史從所乞也上崇尚文儒留心學術故武毅之臣無不自化髙品陳延慶言監修亳州太清洞霄兩宫事畢遣使致醮増具什物給兵灑掃丙申令開封府察受納夏稅場無使遲滯寧州山水泛濫壊民舍軍營命中使馳傳存撫給錢糧溺死者官為埋瘞葺其居定州軍城寨言得契丹西南靣飛狐安撫使牒請諭採木民無越疆境命轉運司與本州據部民取材之所召其疆吏同立標幟以示衆辛丑以西上閤門使孫全照為東上閤門使領英州刺史全照形短精悍知兵以嚴毅整衆然性剛使氣専任刑罰中書初進擬嚴州上曰全照深刻常慮人以嚴察謗已今授此州似渉譏誚乃改命焉朝廷每歳准禮例修馬祖先牧馬社馬歩之祭於是羣牧司請令内外坊監擇地建廟立四神像每歳四仲月委本院致祭詔崇文院詳閱典故檢討官杜鎬上言四神各有本壇以時奉祀唯物不備乃詔自今每祀用一羊其置廟罷之壬寅令司天監始置監生選厯算精熟者為之詔自今僮僕盗主財五貫配本州牢城十貫配五百里外二十貫以上奏裁改咸平六年之制慮其淹繫也是月上謂輔臣曰殿前侍衛司禁兵老疾者衆盖久從征戍失於簡練比因抽移至京師雖量加閱視亦止能去其尤者今多已召還宜精加選擇雖議者恐其動衆亦當斷在必行昔太祖亦常患其若此遂盡行擇閱當時衆情深以為懼而厥後果成精銳樞宻使王繼英曰禁旅比昔時數今已踰倍若乘此息兵簡退疲冗實甚便上曰然苐以北界請盟西戎納欵若即行此則軍旅之情必謂國家便謀去兵惜費不若先從下軍選擇勇力次補上軍亦可鎮壓浮言使衆不惑也其老疾者俟秋冬遴簡將臣令悉蒐去之殿前侍衛司上言開封府追取禁兵證事皆直詣營所事頗非便上曰朕察此意盖止欲就本司决遣耳有唐之弊方冊可視自今除逮捕證佐悉如舊制軍人自犯杖罪以下本司决遣至徒者奏裁上嘗戒軍校曰犯法者須以軍法治之然憫惻之意不可不存其間置濵州通判一員以刺史周緒赴本任也上謂武人多不閱政理非通判亷幹則民受弊乃詔應防團刺史在本任及知州處見任通判令轉運司宻具能否以聞秋七月己酉改勾當制置羣牧司事為羣牧副使以内侍左班副都知閻承翰為之制置羣牧使去制置之號但為羣牧使庚戌羣牧使趙安仁言按唐制馬有左右監各以土地為名遂改諸州牧龍坊悉為監賜名鑄印給之辛亥上封者言刑部舉駮外州官吏失入死罪准斷獄律從流失入死罪者减三等徒二年半公罪分四等定斷官减外徒三年為長者追官餘三等徒罪止罰銅伏以法之至重者死人之所保者生儻官司不能盡心則刑辟乃有失入傷和平之氣違欽䘏之仁盖幕職州縣官初歴宦途未諳吏事長吏明知從罪不至追官但務因循不自詳究又雍熈三年七月敕權判刑部張佖起請失入死罪不許以官當贖知州通判並勒停咸平二年編敇之時輙從刪去致長吏漸無畏懼輕用條章臣以為若以格法舊條似虧懲勸或准張佖起請又未酌中欲望自今失入死罪不致追官者斷衝替候放選日注僻逺小處官連署幕職州縣官注小處官京朝官任知州通判知令録幕職受逺處監當其官髙及武臣内職奏取進止詔可丙辰羣牧判官王曙上羣牧故事六巻詔藏於本司丁巳詔以十一月十三日有事於南郊戊午閱神勇軍士習戰於崇政殿己未詔詣闕訴事人須因州縣理斷不當曽經轉運使訴理月日皷司登聞院乃得受庚申重鑄門下省等五十四印先是印文皆有新鑄字因判刑部慎從吉上言改易之甲子詔復置賢良方正能直言極諫博通墳典達於教化才識兼茂明於體用武足安邊洞明韜畧運籌决勝軍謀宏逺才任邊寄等科令尚書吏部傳告諸路許文武羣臣草澤隠逸之士來應委中書門下先加考試如噐業可觀具名聞奏時上謂冦準等曰方今文武多士豈無才識優異未升進者耶至於將帥之任尤難得人前代試以制䇿觀其能否用求材實亦為國之逺圖也因出唐朝制科之目采其六用之景德復置六科盖用盛度議其詳具天聖七年復置六科時田錫亦先建請當考安國軍節度推官李宏上言諸路每置院鞫囚或值夏月望令十日一滌杻械如州獄之制從之李宏未見丙寅詔以廬山太平興國乾明寺田租十之三充葺寺宇經像令江州置籍檢校選名行僧主之張知白使還言寺僧不謹故也己巳詔八月一日已後持仗强盗遇南郊恩赦不在原免之限庚午大理寺言郊禮在近諸州奏案多不精詳冀於覆駮延留以俟寛宥請自今有侵損贓私事状明白公然抗拒當駮退者即具情由定斷以絶僥倖詔可又詔諸謀殺人不至傷殺而情理兇惡不可留本處者具獄以聞辛未羣臣三上表請聽樂詔郊廟用樂如禮事畢復􅃦軍頭司引對員僚直二十九人年老當𨽻剰員上以其嘗經戰陣特令月給錢五百壬申詔减江浙荆湖福建廣南等路得替官送還公人數有差從殿中丞趙稹之請也癸酉宰臣等固請誕節用樂上曰若以北使之故其至日作樂於外可也宰臣復上表陳述終不許甲戌遣御前忠佐八人分徃京東西路教閱諸軍丙子龍圖閣待制戚綸與禮部貢院上言今歳諸道進士僅三千人諸科萬餘人其中文理紕繆以及經義十不九不者甚衆茍非特行立法約束必恐益長因循又慮官吏坐此殿罰因而避事全不薦人竊惟取士之方合垂經逺之制今請諸色舉人各歸本貫取解不得寄應及權買田産立户諸州取發寄應舉人長吏以下請依解十不人例以科罪其開封府委官吏覺察犯者罪如之鄉里遐逺久住京師者許於國子監取解仍須本鄉命官委保判監引騐乃得附學發解日奏請差官考試近年進士多務澆浮不敦實學惟鈔略古今文賦懐挾入試昨者廷試以正經命題多懵所出舊敕止許以篇韻入試今請除官韻略外不得懐挾書䇿令監門廵鋪官潛加覺察犯者畫時扶出仍殿一舉咸平三年詔㫖進士就試不許繼燭每歳貢院雖預牓示然有達曙未出者今請除書案外不將茶厨蠟燭等入如酉後未就者駮放之仍請戒勵専習經史自今開封府國子監諸路州府據秋賦投状舉人解十之四如藝業優長或荒繆至甚則不拘多少開寶通禮義纂請改為義疏今後通禮每場問本經四道義疏六道六通為合格本經通二義疏通三亦同今歳秋賦止解舊人新人且令習業西川廣南舊取解舉人並許免解今後及第三史通禮三禮三傳除官日比學究明法望授月俸多處貴存激勸上以分數至少約束過嚴恐沮仕進之路乃詔兩制知貢舉官同詳定以聞於是翰林學士晁逈等上議令諸州約數解送或自來舉子止有三兩人者欲聽全解或其間才業卓然不羣者别以名聞南省引試前一日分定坐次榜名曉諭勿容移徙逺人無籍者令召命官保識就京府取解文武陞朝官嫡親許附國學先寄應令還本貫者不得叙理前舉尚書周易學究明法經業不廣宜各問疏義六道經注四道六通為合格三禮三傳所習浩大精熟尤難請問經注六道疏義四道以疏通三以上為合格餘如戚綸等條奏從之本志既於此載逈議又於祥符四年五月重載之其議並同盖因實録致誤按祥符四年四月則諸道貢舉人初未到闕逈安從知其數且其數即與此年合其誤審矣今削去
