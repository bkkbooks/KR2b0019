body:
  text: 續資治通鑑長編巻四百七十宋李燾撰哲宗元祐七年二月丙辰詔吳泰伯廟以至徳為額先是知蘇州黄履言吴泰伯以禮義變蠻荆之風今廟貌雖崇而名號未正故有是詔詔商賈許往外蕃不得輙帶書物送中國官丁巳詔温國長公主下降日皇太妃送至第外命婦免從占城國首領表言應大朝討蕩交趾乞率兵協力掩襲時以占城交趾有舊怨交趾見今入貢不絶臣節難議興師令學士院候將來降占城國勑書依此回答殿中侍御史楊畏言臣竊聞以左朝議大夫魏廣為徐王府侍講除命既傳人言未協訪聞廣齒髮雖髙行治不著碌碌無可言者或謂其稍擅辭藻而毎有投獻以干貴位審如是其無老成自重之風可見朝廷方欲謹選厚德而近時由王府官者又多進㧞如廣常才遂為此官搢紳之論所以為未協也伏望别選清望重德之士以輔賢王右正言姚勔言竊以王府侍講宜用經術文學履行修潔之人以充其選今廣人材猥下學問空踈但以自來浪㳺市㕓熟諳邪徑慣習里巷羣小之事既無行誼可稱亦無經術可取所為凡惡豈堪勸講之官伏望特寢成命以協公論廣尋改軍器少監改軍器少監在三月十八日今并書之已未禮部郎中葉祖洽知海州先是右正言姚勔再劾奏祖洽而御史亦言祖洽貪鄙無狀滛縱悍妻薄於事父不可令汙省闥故也舊錄云御史言祖洽貪鄙凡下亷節不立不可令汙省闥故有是命按元祐宻疏右正言姚勔言祖洽兩章其一乃六年十二月三日其二乃七年正月十二日叙祖洽貪鄙無狀不持亷節厚於妻妾薄於事親等節目極詳但辭多猥俗不足具載却不見御史姓名今别修如上詔沿邊諸路遇差總管統制軍馬出入許依例以走馬承受使臣一貟從軍樞密院言諸路探報多不實縁賞輕無以激勸欲令陜西河東經略司各以本司封樁或軍資賞錢物給充探事支用其沿邊州城堡寨將副舊得支用者亦約數均給若探報有功或報不以實並量事輕重隨冝賞罰事理極重合從朝廷賞罰者奏聼指揮從之刑部言兩犯贓罪杖各經勒停若與一犯人同期叙用輕重未稱欲乞兩犯正入已贓罪杖並經勒停於初叙用期限上展二期叙用武臣凖此犯在今來展期已前者聽依舊法從之庚申權陜西轉運使李南公言銅鐵錢界首輕重不同欲乞以興州銅商虢州黒錫運至陜州鑄錢監毎年鑄錢且以二萬貫為額應副陜州及陜右兩驛支遣及換易鐵錢使用兼銷減得商虢州積下黒錫從之辛酉太府少卿祕閣校理王古為祕書少監少府監晏知止知潁州右中散大夫陳紘為少府監左中散大夫程嗣恭為太府少卿左朝議大夫李之紀為屯田郎中左朝請大夫劉淑為祠部郎中先是環慶路經略使章楶奏凖元祐七年正月十三日樞宻院劄子章楶奏檢會樞密院元祐六年十二月二十四日降下劄子付逐路帥臣處置邉防機要畫一事件數内有與臣到本路後行下約束條目大意雖同而其間措置小異合具奏稟臣竊謂西賊狡獪未敢專執施行伏乞朝廷詳酌指揮樞密院勘㑹昨降下御前劄子大槩令諸路遇賊併兵入㓂堅壁清野俟賊氣惰覔便掩擊今來所奏本路已行約束事件除係隨機應變自繫帥臣處畫施行外㸔詳西賊既舉大兵入㓂即本地分漢兵自是衆寡不敵若令將寨官分領人馬據險觀望竊慮西賊探知底裏先遣輕兵散行打劫誘致官軍向前接戰别發重兵併力拒敵或扼截元駐兵髙險歸路萬一官軍勢力不加又節制不得入城未審令出戰兵馬如何退避或相持累日賊勢未散不悉兵食如何廩給如此是與不是堅壁之計兼一路帥府去邉面地里各有逺近若放令賊兵粘綴直至帥府城下㑹合重兵則恐將官使臣等承此節制之後遇賊入㓂觀望避事不肯向前惟務退却至帥府㑹合不惟被㓂地分闕人出戰兼使近裏籬落必遭殘害又有去帥府相逺地分將副可與不可亦令至帥府㑹合劄付臣更切詳審前項事理從長講說十全利便措置施行仍具已施行事將入急遞以聞於是楶復奏臣契勘近凖朝㫖十月十八日詔當考凖擬西人恐大舉併兵前來作過但能堅壁清野保守城寨無虞已為全勝臣竊謂往年賊犯鎮戎軍及去年侵略河外非不堅壁清野而民被塗炭不少此已然之事兼熙寧年西賊侵犯慶州攻圍沿邉九處城寨是時兵將束在城寨勢不能出致賊分遣輕騎入近裏剽略更無忌憚竊恐今日已後將兵既堅壁居内盡遭圍閉無由得出外復有長驅深入之患臣遂申請上件事理况本路並邉一帶山谷深阻最得勝勢今簡閱諸將次等兵馬分擘在諸鎮城寨充守禦將精銳人馬出戰差定將官統領如遇西賊入㓂即令出戰將官帶領人馬出城亦不使便當賊鋒令逐將與使臣蕃官分領人馬擇利駐劄髙險逺望即不聚一處賊馬追逐又令引避使賊知官軍戰兵在外豈不慮山險之處各有伏兵欲攻城則畏腹背之患欲鈔略則官軍隨其所向出竒設伏覔便梢擊何由敢散行打劫欲戰則或引避或據險而不與之爭鋒何由得誘致扼截此盖正慮賊以大兵入㓂衆寡不敵所以須合令戰兵分布在外使彼深入吾地戰則不能攻則不敢鈔掠則無獲不過三兩日自當引去縁出戰人馬所齎乾糧自可以支十日就使未退我為主彼為客我軍既在村野固不憂食彼合則諸將之兵得以伺隙而擊其虛彼分則險要地利莫非官軍先據可以坐待其老大抵戰兵在外則守兵乃敢堅壁如外無戰兵而但務堅壁則長驅深入一路均被其患臣之所慮正以為近裏籬落計也且將官在城寨中有畏懦之人則可託以遭圍閉不出兵觀望避事若其在外雖怯懦之人無以為辭况今所差出戰將官並是選閱膽略可委之人其所以令抽那退避直至帥府與重兵㑹合止謂萬一有須至如此令相度事勢而為之非謂一槩並合如此兼被㓂地分衆寡不敵雖將兵在城豈暇出戰况本路環慶州沿邉近裏城寨共約三十餘處假令賊舉國併力入㓂本路度賊勁兵不過二十萬衆分兵盡圍城寨則大小相除每城寨不滿萬人官軍既在外而賊兵每處雖滿萬人豈敢公然深入寧不慮官軍躡其後若不敢盡圍則諸將之兵自可互相應援賊既見官軍散布要害自不敢深入就使賊敢深入正堕我計中據險邀擊絶其歸路可以鏖殺使無噍類彼既腹背不支自當殱潰何暇更肆剽略豈非十全利便今凖前項朝㫖縁此止是約束將官大略其餘纎悉臨機措置臣見更從長講議施行次黄貼子堅壁清野盖自古良將禦戎之䇿然不可以只循一軌使賊知我無變通之路反為賊所制伏見元祐二年内鎮戎軍遭圍閉十一將兵盡在城内蕃衆擄掠三百里以上如行無人之境所幸者賊不相知虛實若更深入擄劫則害尤大盖官兵盡在城内無以制之及其將去也於所劄寨内如常日燒起煙火量以兵圍守一夕而遁城中比知賊退已是第二日出兵前去追襲不見一人一騎此專用堅壁而外無兵將已試之騐去年九月内犯河外大率不異於此又慶州係帥臣所治今契勘慶州見管土軍客軍六千餘人又差在諸縣廵檢下并在城窠坐諸官貟當直盡在六千人數内邠寧耀州下番人兵共四千人若除留逐州及將東兵緩急别添與沿邉城寨充守禦外不滿五六千人共屯在近裏籬落豈不慮西賊長驅深入之患若只用慶州所屯兵馬可以差出不過三四千人豈能捍禦西賊所以令沿邊將分抽摘下出戰人馬以漸退避與帥府人馬㑹合應援聊以張大聲勢爾若按事勢須帥府屯宿重兵方能表裏相應所以累奏乞添一兩將軍馬至今未䝉朝廷施行伏乞照㑹又如遇西賊大舉入宼雖將沿邊部族人口及將兵盡行收入城寨止是邊寨為堅壁清野之計况近裏三二百里之内居民盛密若預行起遣則必須勞擾驚疑若不起遣又縁近裏更無重兵應援所以將沿邊兵將分布出戰守禦假如一寨有兵萬人最患者無外人照望不知賊兵進退就使賊兵引退亦須詳審探望方敢出兵又城内之兵據其城門只可並行人馬拽兵萬人須及半日以上方可齊集前去追襲賊兵過界逺矣豈能害賊又勘㑹熙寧三年内西賊侵犯本路攻圍城寨亦如元祐二年入寇鎮戎軍之比七年二月八日楶奏此今附本月日要當删修壬戌樞密院言熈河路遇西賊於别路入宼本路合出兵牽制縁蘭州限隔大河緩急濟渡有無船栰曾與不曾豫計置以備緩急欲下本路經略司勘㑹如别無凖備即疾速計置從之甲子成都府路轉運司言簡州進士鄧宗古閭里稱孝親歿負土累墳甘露頻降生事死𦵏始終一節乞賜奬諭詔賜絹二十匹詔武臣丁憂者見任管軍處或充路分總管軡轄都監知州縣城關使縣尉都監寨主監押同廵檢廵檢駐泊廵防駐泊及管押綱運大使臣係軍班換授小使臣非䕃補并武舉入官者及差使借差並不解官内係縁邊任使并押綱者給假十五日餘一百日其應不解官而願解官行服者除縁邊任使奏候朝㫖外聼之乙丑詔編修樞密院條例官就編經武要略初熈寧中樞密使文彦博等言請置局編修經武要略自國初至熈寧四年功未畢而罷至是復命官編修俾終其事詔今後府界諸縣手力本等合差戸空閑不及三年者以助役錢募人充應依本役年限候滿日有空閑及三年人戸即行差罷制置發運司言兩浙路每年合發額斛各凖朝㫖將五千萬石折納見錢並令收買金銀紬絹起發候至年終收買支錢不盡即據剩錢起發上京欲乞應有樁下折斛錢並不得别作借兊支使從之丙寅温國長公主進封曹國長公主陜西河東六路經略司各賜錢五十萬貫政目十四日事當考丁夘權陜西轉運使李南公除直祕閣引進使嘉州防禦使權樞密院副都承㫖李綬為隰州防禦使罷副都承㫖以忠州團練使曹誦代之步軍都虞候信州團練使定州路副都總管劉斌權同管勾馬軍司先是樞密院以步軍副都指揮使劉舜卿卒環衛闕人欲進補先奏知太皇太后曰更有闕皆多時不補亦不妨否將相非小事豈得容易王巖叟言祖宗以來三帥不曽闕兩人盖殿帥若闕難為從下便超補今姚麟是殿前都虞候合陞作步軍副都指揮使又劉斌本以不才令出今不得已却欲召入令與麟相兼管從之太皇太后又言管軍須是有邊功衆人所服方可巖叟對曰臣等所遷即此等人陛下如此重名器甚善然合用者亦須迤邐進之令就近緩急方得使若大叚疏逺亦難應用太皇太后曰須要擇人對曰非敢超躐亦止欲循次稍進耳詔官軍出塞募能發掘西賊窖榖將官騐受分給人馬充食糧每斗支錢一百五十文足馬料每斗支錢一百文足並給係省錢樞密院言勘㑹陜西縁邊見各有𦂳切控扼賊馬道路以自來夏國講和未曽修建堡寨今既絶彼貢奉可以乘時踏逐地基修築奉聖㫖令詔陜西河東諸路經略司疾速選官帶領合用人馬親詣漢界及並漢地生界内選擇形勢要害堪作守禦寨基去處先據漢蕃地内𦂳要處選定兩處約度每處城圍地步大小并去見今城寨四至逺近著望去處及多少月日可以畢工子細畫圖開說聞奏仍先行計置一處合用樓櫓材植物料等百色名件應干支費錢糧候見實數具狀聞奏所有興工下手先後月日即聼朝廷别降指揮此據章楶奏議乃七年二月十四日指揮當時遍下諸路即實錄所刪取者今具載本文仍以實錄附注於後詔陜西河東並邊今夏賊自絶冝乘時進築擇形勢要害可作守禦城寨毎路先選定兩處約具城圍大小役工月日及所去旁近城寨四至逺近繪圖開說仍先計置一處合用樓櫓材植物料應干支費錢糧實數以聞其興工先後月日即聽朝㫖玉牒云二月詔以夏人自絶命陕西河東路集築即此月十四日詔也後六日樞密院言竊慮諸路所遣官不量事勢縁此深入賊境却致落彼設伏姦便詔逐路經略司除漢界寨基依前降指揮外止作本司意度嚴𦂳約束所遣官如入生界踏逐仰只於並漢界側近去處相度地利按視選擇即不得輕易深入此亦據章楶奏議乃二月二十日指揮今并附十四日後月末議築汝遮五月定逺城畢功己巳樞密院言近涇原環慶路經略司以邊事未寧乞増置部隊將已降指揮每將權各増一貟部將令經略司奏差隊將令吏部選候邊事息日罷從之鄜延秦鳳熙河蘭岷路準此四月丁巳可考庚午詔將來納后令禮官將近降六禮儀制等送學士院參詳修定合用辭語辛未殿前都虞候威州團練使姚麟為定州觀察使充步軍副都指揮使從樞密院所進擬也見十四日壬申詔温國長公主進封曹國更不行册命之禮令學士院降詔從其請也乙亥曹國長公主下降駙馬都尉韓嘉彦後二日同知樞密院事韓忠彦奏事已留身曲謝因乞避嫌遂出就私第尋押入視事如故丙子詔以隰州為次邊以本州言所𨽻上平永寧兩關俯逼西界經久備禦不可緩故也先是内降付三省樞密院皇太妃兄西京左藏庫使帶御器械朱伯材特除遥郡刺史依舊帶御器械又皇太妃姪寄班祗候左侍禁朱孝孫特添差幹當右騏驥院候任滿更不補人吕大防等皆以為不可及進呈大防曰此雖特恩要之無名將來納后禮畢以非常之慶施恩於外家差似有名况亦不爭數月事今先與之至時更與則重疊不與又不近人情太皇太后曰亦嘗語太妃以無例不可行雖太皇太后及皇太后家俱不可也既不得已遂降特㫖大防曰不如待數月間庶幾有名於事體為允太皇太后曰且只外面收却文字大防等皆稱善既退樞密院奏事太皇太后又宣諭曰適已說與三省為朱伯材轉官事將來温國下降所生母合轉一官今太妃無官可轉回授與親弟除遥刺亦似有名韓忠彦王巖叟曰如此尢穏便太皇太后又曰此須是邊上有功方合除忠彦曰名器當重惜巖叟曰朝廷推恩常務有名自然人服退見三省曰太皇太后宣諭更有一意以納后推恩外家無故事不欲髙氏亦預耳其盛德如此於是伯材孝孫二除命皆寢據此已云二除皆寢而伯材於丁丑獨加榮刺盖伯材但以曹國下降太妃回授恩不用前批特㫖也丁丑西京左藏庫使帶御器械朱伯材加榮州刺史以曹國公主下降推恩也龍川别志伯材奏門客事在九年京西路轉運司言河陽南北岸年例脩河樁木石並是支本司見錢召人户中賣候科降春夫依舊於南北路科出免夫錢撥還工部看詳河陽本造石堰以代木岸即無二堰並設之理若令作石堰即當回改木岸工費充用從之詔都水監於稍慢地分内減罷都大兩貟却奏差大使臣兩貟令通容提轄管勾南北兩丞地分栽種穿杌榆栁其不係栽種穿杌月分仍兼提舉照檢兩丞埽岸收買物料及沿河勾當己夘詔勿受同知樞密院事韓忠彦乞外任章奏庚辰環慶路第七將折可適統兵八千九百餘人入生界討蕩韋州監軍司賊衆斬首七十級生禽四人獲馬牛羊駱駝等凡二千一百三十餘口此據章楶奏議増入辛巳熈河蘭岷路經略安撫司言于闐國進奉人三番見在界首内除逹斯滿楞伊肆昌斯吉一番已準朝㫖特許解發外今來兩番進奉人縁已有間嵗許發指揮欲只令熈秦州買賣訖納回本蕃從之詔環慶等路經略司如遇事宜合要勾抽保甲守禦先次以輜重人儧那應副如尚不足即於第四等以上戸兩丁内差仍秪得於鄰州充役先是㳺師雄乞自蘭州李内彭東抵通逺軍定西城與通渭寨之間建努扎納克密聚卜結隆三寨及置䕶耕七堡以固藩籬此據張舜民誌游師雄墓云奏疏不報考范育參詳狀則非不報也不知舜民何故云爾穆衍又乞於智固勝如二壘之間城李内彭以控要害及言納克迷努扎淺井隆諾特皆冝起亭障以通涇原之援此據穆衍墓誌及本傳詔以師雄所言令范育參詳范育言㳺師雄相度本路修築堡寨十一處數内蘭州合修納克密寨大栁平努扎峗堡共三處通逺軍修聚卜結隆寨一處係與去年十月二十三日朝㫖定西城東至隆諾特堡中間及定西城西至李内彭中間兩下各修置守禦堡寨一坐照䕶小堡子二坐共為六坐及與本路措置利害並同外有通逺軍合修努扎寨一處係與朝㫖於努扎元踏地基上修一䕶畊堡子去處亦同惟㳺師雄乞作七百步本路乞修六百步城圍小有不同其㳺師雄相度到通逺軍合修哲圗博錫若蘭贊占蟾牟山堡等六處即與朝㫖及本路相度到聚卜結隆峗花川堡兩處地名利害委有不同臣今勘㑹昨來本路建修築之議盖為自蘭州已東至定西城自定西城已東至秦州隆諾特堡三百里之間戎馬奔衝之地止有定西一城外更無邊面籓籬之固賊可長驅深入故極陳利害欲漸完城壘以捍賊衝以固邊勢幸䝉朝㫖采納乗去秋賊既聚復散勢未可集之時立詔本路趣城定逺及令條畫諸堡寨次第臣謂朝廷留意邊防大計深中事機自兹本路遂有安強之勢足以制賊保邊息民有日矣臣是以累奏欲乘今春青草未生馬瘠賊兵難聚之時先修要害之城乘時量力不勞而集及更遵朝命省工減費貴於速就至今未奉朝㫖臣已具後時乞候今秋或來春别乘機㑹修築聞奏去訖臣今再詳㳺師雄所奏有與本路同者五不同者六推原所以同不同之由盖亦有說竊縁本路建議之始其說有四其一據要害其二䕶居民其三相接應其四守信約如定逺之保金城扞熈州控大川努扎之基石硤固定西扼賊路所謂據要害者也定逺之衛康古智固勝如納克密之蔽裕勒藏六族聚卜結隆川之保弓箭手所謂䕶居民者也大栁平努扎峗花川東西在本寨之中所謂相接應者也智固勝如常設據有城郭居室定逺建於其内努扎在第二寨之南聚卜結隆川亦在諸巉之間其外皆弓箭手耕種之地以臣常建與夏人議乞以見今耕種崕巉卓望口舖為界故營度諸寨皆在其中非有涉於賊境是本路所守無相侵軼信與直之道也又去年九月八日朝㫖不得將修移立堡侵出蔡駰齎出商量畫界至之外此又遵依朝㫖雖異日貸夏賊侵陵之罪而與之分畫終持一定之議所謂守信約者也蔡駰使陜西在六年七月二十四日凡此四者足以固藩籬保邊勢又不失全信義以制夏人臣之區區實出於此臣又聞聚卜結隆川西人語謂十八為聚卜結謂谷為隆盖言諸谷共凑一川爾故㳺師雄欲每於賊馬出入之路據其要害建為一堡如此則聚卜結隆川一帶悉無㓂患然其地多在一抹取直之外縁臣之議論遵於朝命不踰官守未免拘攣之失在其中矣若㳺師雄將君命圖利害不得不為朝廷極言而究陳之此所以有異同之論也然異時夏賊納欵一切將循舊約則臣之前議無時而不可用若正其犯順干紀之罪一新大號則師雄之論乃邊防之至計若又能捨區區之守破拘攣之議則六堡之外盖有不勞而制賊者此又臣之不可得而言也臣觀十一堡寨之議固有緩急大小其十姑置之則猶可已獨努扎之利大言之則雖欲掃天都復㑹州定河南盖不可不城者也小言之則守已然之信約完一面之藩籬亦不可不城也臣又嘗訪努扎之利盖努扎既建雖其西不為納克宻三堡寨其東不為聚卜結隆川三堡寨止於未相照應然猶可制邊患茍努扎不建則其西别建納克密三堡寨可保䕶裕勒藏諸族又須於閃竿灘篤羅川一帶别建堡寨三數以遏賊路其東雖建聚卜結隆川三堡寨止可保䕶耕民又須如游師雄所議於賊馬來路建設諸堡以制賊衝如此則功費益大守禦益多殆非據要易從之術脫盡不為之則幸西賊無謀即已或姦謀一啟彼且長驅數萬之師出石硤過努扎趨閃竿灘逕犯熟羊渭源則熈州危矣據蟾牟山襲通渭過三岔分兵掠永寧來逺直趨通逺則一路揺矣本路之兵分守三百里邊面其勢不能合以禦賊奔命則勞守株則弊臣恐不足以制㓂此最本路之深憂臣所以夙夜皇皇饑不及食寢不敢安經營板築之計冀朝廷之必從今既失其時後日事機盖不可必臣為朝廷守禦不能竭力必爭就此大計臣恐他日熙河之患有不可勝言者臣愚不勝憤懣伏望朝廷深計而熟謀之再念臣智識淺昧才術迂踈猥當帥任固有不逮伏望朝廷選能臣體究利害圖建長久之利庶幾不誤邊防大計張舜民作㳺師雄墓誌云自朝廷棄西寨之後熙河與夏人分疆至是未服命公往視之具利害以聞由是形勢之地皆為我有六年夏賊㓂涇原復入熈河殺掠甚衆公上疏曰元豐以拓土為先故進築之議略元祐以和戎為務故進築之議廢今蘭州距賊境一里而通逺軍不及百里又非有重山複嶺為限障犬羊之勢得以潜窺而輕突邊民不安其居者屢矣宜自蘭州定逺城東抵通逺軍定西城與通渭寨以固之間建努扎納克密聚卜結隆三寨及置䕶耕七堡所藩籬此邊防無窮之利也䟽入不報於是王巖叟與吕大防等議進築努扎等堡巖叟以為自開熈河至今籬落未全故屢遭侵掠之患民不得安居邊臣力以為言數遣使按覆又皆以為當先努扎次納克密等諸堡西方來者萬口一詞而韓忠彦以謂十年不作何害萬一版築之際為賊所梗不能成功則責在廟堂大防初難之既而却令就努扎之地為小堡以問邊帥帥曰為小堡無益等為之不若遂為守禦寨扼其要以絶後患又詰樓櫓材植凡一城之費有無已備答曰有又詰曰雖備在何所答曰備於其側某城某堡耑使又以為言理皆切至巖叟請大防早降指揮付其帥令伺便而作忽變議曰俟一作過一進築以為懲艾巖叟曰今夏賊既負恩作過乘此可修籬落以塞後患萬一年嵗間來請和遂不復能作則是自家籬落為他殘害壊却新籬落不曽作得一事無能為復與之和受弊如故此可恨惜耳大防曰得彼和後不作得亦不柰何蘇頌蘇轍以大防之言為然忠彦又曰吾軰嘗罪王珪蔡確勸先帝開拓今彦霖乃亦欲開拓巖叟曰非開拓也欲據險為自全之計耳不作良便但在廟堂不與了却合了底事恐未免譏議王巖叟争進築努扎等堡繫年錄在二月二十四日今附見月末十四日已詔諸路擇形勢進築而巖叟二十四日猶有此言不知何也今并游師雄穆衍范育論奏附見梁燾行狀云云或附此然燾此時未執政為左丞在六月九日熙河請築努扎等堡寨邊臣請漢先據則勝秦鳳帥又請為聚卜結隆堡樞府請先治秦鳳其熙河所修皆西人必争之地未可築也尚書左丞梁燾曰治邊所以制伏敵人當先其所急而後其所緩今乃先秦鳳而後熙河是緩其所當急制勝必據要害以取形勢西人犯順數侵邊境正當治築非無事時也此不可失之機㑹無可疑也遂下諸路更不用以前畫定地界各據要害去處乘時修築延安府李南公奏保安軍申夏國請貢衆言許之燾以牒内不當引北界解和之語恐懐詐不誠未可遽聽且使邊臣諭令退換牒文更伺其意如果效順誠實不詐許之未晚持之累日未決㑹燾在告遂如南公奏明日燾出至上前力陳自割棄要地一失之後𦍑人屢犯邊内侮朝廷恩信不行威勢不立豈可今日更失處置西賊既謂納欵貢奉乃引北朝解和為端此最害事恐開他日生事之漸不可不慮况北人從來未嘗豫西事也願追止已降指揮且令退換牒文更使探伺誠實之意事雖稍遲庶無後悔此注當移入八年正月去年十月七日可考是日門下省進呈入流數政目二十八日事當考壬午鄜延路經畧使范純粹奏凖樞密院劄子節文權發遣涇原路經畧使謝麟等奏相度到牽制應援備禦利害伏乞朝廷詳酌指揮看詳前項所奏事理委鄜延與環慶涇原逐路可與不可依此互為掎角奉聖㫖從長講究經久利害聞奏者臣近曾奏陳諸路毎遇探報𦂳急事勢稍大即預將内外邊兵團結部隊衣甲器械各經擐帶乾糧什物一一具備使人人自為猝行之計西賊既聞漢界諸路㸃兵各有出討之勢賊必分兵拒守雖犯一路自是賊勢已分纔遇他路横烽報賊令擐甲束装引至塞上於順便處駐兵以俟被㓂路分文檄之至况逐路經略司須於平日探知對境有無賊馬人戸次第既得被㓂路分文檄知賊所在若有利可乘則固可深入討蕩借使無利可乘亦當出塞大作聲勢盖賊之精兵大衆必在所㓂路分其别路對境所留之衆勢必不重與之决戰理或不難則謝麟等所謂掎角之術在其中矣伏乞朝廷檢㑹更賜詳酌貼黄昔趙元昊引兵過渭州之東有長驅邠雍之謀是時先臣守環慶總引衆兵徃援涇原賊乃退散自後朝廷遂立應援之法實用其䇿至元豐間因吕惠卿徐禧等措置邊防及朝廷議論遂令諸路不得應援雖有永樂之役臣是時奉使陜西曾有論列䝉降朝㫖䟽問不行至臣守環慶日元祐元年二月間再申前議兼陳牽制之利至於數四方䝉朝廷再許牽援是年賊四十萬㓂鎮戎而張之諌以十一將兵馬閉關城中縱賊大掠環慶臣聞報之日即遣兵二萬出塞三百里為擣虛制賊之計又别以萬兵聲言五萬往鎮戎為援賊即解圍而去竊謂以一環慶援隣尚使賊有後顧若每於防秋或探得賊中聚兵之時令六路嚴兵作備纔聞一路有㓂而五路皆出則為利可知顧誠心為與不為耳乞朝廷深察純粹七年二月二十九日奏此今附本月日
