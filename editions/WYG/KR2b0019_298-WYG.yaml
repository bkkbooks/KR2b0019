body:
  text: 續資治通鑑長編巻二百九十四宋李燾撰神宗元豐元年十一月辛未朔以翰林學士兼侍讀知審官西院兼提舉在京諸司庫務許將權發遣開封府以蘇頌干渉孫純等獄事且自請罷職故也尋詔如頌當参對特免追攝免追攝乃癸酉詔今并書新知潤州吕嘉問言昨案發江寕府簽書判官張偓佺違法事竊知權簽書判官潘令先夜入右司理院取去見勘偓佺案及帯偓佺舊㕔公人并見禁罪人親戚赴右司理院併浄牢獄竊虞誘脅變亂情實乞下别路差官詔潘令先具析又言何琬自準朝㫖劾臣追臣所使令殆遍若臣有違法理必難逃觀琬行遣多不循理法必是令部内官吏協同鍜煉乞早賜移勘及許臣檢取照用文字以備辯答詔送江南東路監司提舉司又言準勅令臣具何以知琬案發事九月中前江寧府通判杜行送人回府稱行宻令白臣昨在東府客次見衆人談學士妄用公使錢修造為監司所案發及進士呉愿言見提舉官朱炎子浚明說琬言臣為門僧教化拆鎮淮橋修精義堂及不造監司商量公事而數至王安石之門安石亦厭其來又得在京市易務監華申甫書所報如愿言臣皆未敢為信尋聞有朝㫖下轉運司案劾臣謂提㸃刑獄王安上當知其詳遂詢其兄安石安石稱聞琬所言亦相連及上批慮有事干渉中書吏人可實封送御史臺根究公事所壬申詔諸路都總管司所在本州官及過往止令本州供給兵官使臣軍員令總管司供給仍令都副縂管同主管如副縂管司錢少即于本州公使錢内添給之詳定禮文所言郊祀壇域當依儀注設三壝撤去青繩又言郊祀天地席當以稾􅀈配帝以蒲越撤去黄褥緋褥又言享宗廟當用制幣及依儀注焫蕭又言遇雨望祀當服祭服仍設樂又言分獻官不當先期升壇當依儀注又言南郊式監祭監禮俱立于壇南非是請分監祭立于壇之西北東向監禮立于東北西向此二事據禮文皆十一月五日依奏實録不取今増入又言景祐中裁定衮冕制度已與古合今少府監進様不應禮請改用朱組為紘玉笄玉瑱以元純垂瑱以五采玉貫于五采藻為旒以青赤白黄黑五色備為一玉每一玉長一寸前後二十四旒垂而齊肩其表裏皆用繒又言服裳皆前三幅後四幅今以八幅為之不殊前後又佩玉及綬并章服皆不如古制當改正又言百官雖不執事以朝服侍祠非是當並服祭服如所考制度修製五冕及爵弁服各正冕弁之名又言天子六服自鷩冕而下今既不親祠廢而不用則諸臣攝事當依周禮從王所祭之服又言六冕並用赤舄六冕並用赤舄禮文在四年十月六日今并入此又言景靈宫太廟南郊儀注並云祀前三日儀鸞司鋪御坐黄道褥黄道褥設于郊廟非是詔黄道褥不設餘皆從之郊廟禮文自有本書今但舉其要而削其繁辭實録于三年七月十六日丁丑乃書郊廟不設黄道褥今兩存之禮文三年八月十一日又詔明堂不設黄道褥實録亦不别出今附此癸酉分命輔臣祈雪江寧府制院言鞫吕嘉問等事恐推拒拖延乞先斷王覺􅂍濫并官吏踰違等罪其嘉問事别為一案根治詔王安上朱炎已不許回避令同繫書以聞甲戌詔大宗正司見監守鎻閉皇族克頌免鎻閉其監守如故經制熈河邉防財用司言近有㫖許岷州以舊錢本回易管設蕃部縁河岷州已有公使錢外更有管設錢乃惟岷州許回易乞更賜指揮詔罷岷州回易其河岷州管設錢舊各二千緡令岷州更增二千緡河州半之並給經畧司錢専犒設蕃部探刺邉事仍不得别支用都水監言乞下京西差夫一萬赴汴口限一月開修河道詔止差七千人乙亥宣徽南院使王拱辰乞依二府例賜墳寺敇額嵗度僧一人詔㫖以拱辰歴事三朝累經内外清要繁劇特從其請不得為例又賜方團金帯拱辰辭之辭帯十六日丙戌事今并載此劉摯行狀亦并載兩事為異禮獨不云辭帶也提舉廣南西路常平等事劉誼言近準朝㫖下提㸃刑獄司劾本路轉運使張頡頡由此忿躁凌辱官吏甚于前日桂州司理􅄁軍沈竦因白公事頡罵竦為賊怒竦分説以至令軍士捽抑之詔張頡罷任於潭州供答文字及具析劉誼所奏事理以聞經制熈河路邉防財用司請移岷州滔山鎮錢監于岷州置鐡錢監及通逺軍威逺鎮錢監改鑄銅錢比之冶鐡嵗收浄利十四萬餘緡仍乞取永興軍華州鐡監作匠教習詔移滔山鎮錢監依奏外餘令本路轉運司相度以聞其後轉運司所奏未至而財用司復列十事來上通逺軍威逺鎮改鑄事即其一也乃從之熈寧九年五月置滔山監詔近分配殿前歩軍司摽排手教頭五十九人可令逐司所管槍手均選蹻㨗輕健堪教之人每名各教九人令阮根往來廵視指教賈逵燕逹案閱候教成日取㫖引見後賈逵燕逹等言近降東南隊法五人為一小隊一人排手二人槍手二人弩手五小隊為一中隊兩中隊為一大隊今阮根反以八人為一隊又減大排一増小排二減弩一増弓二與東南所用器仗不同乞止依東南隊法以弩手代小排若去敵稍逺則施箭鑿近則左手持弩如小排架隔次第右手執刀劈斫庶與長兵相兼從之仍令槍手兼習摽本志十月賈逵燕逹等言近議者増損東南排弩隊法與東南所用兵械不同請止依東南隊法以弩手代小排若去敵稍逺則施箭鑿近則左手持弩如小排架隔右手執刀以備斬伐長兵相参可以為用詔可其槍手仍以摽兼習西頭供奉官曹㬇為閤門看班祗候先是看班有闕樞宻院擬西頭供奉官向縡而令㬇候闕詔宜先差㬇以縡皇后之叔雖先得㫖而㬇乃太皇太后之從孫也甲申分命輔臣祈雪賜度僧牒千為修完都城諸門瓦木工直之費令三年印給又詔江南東路監司提舉司見同鞫吕嘉問等事其何琬以有嫌不預宜令江南西路提㸃刑獄李茂直同劾上批捕詹遇兵暴露日乆冒歴山險實甚勞苦今賊已敗獲各分屯歸所在宜各賜特支錢諸効用人比類給之又詔詹遇等昨自潭州􅇡洪筠袁吉復犯湖南郴衡兩州近據逐處奏彭孫等已全火殺獲宜令孫頎牒所屬監司遣官體量應賊所經歴地分為賊殺略焚蕩民戸等第蠲税其免役錢亦倚閣或量蠲減已經倚閣者更展限其常平錢榖準此内貧闕民户仍與接續賑貸應收獲賊内刼財物孳畜速召人識認責保給付其被驅率婦女令放逐便人給路費錢千無親屬收認者遣人轉逹其家有嘗受寄賊贓之家掲榜限半月首納西上閤門使忠州團練使涇原路馬歩軍縂管都大經制瀘州夷賊公事韓存寳言九月辛夘二十日討夷賊至十月辛亥十日回軍攻破賊後城等十三囤除歸降外並已焚蕩斬首級五百七十餘獲生口百餘得猪牛及銅鼓摽排噐甲各千餘見領兵赴瀘州相度分屯上批存寳已討蕩夷賊令速上功狀又批涇原路所遣兵馬非乆分屯並與特支路費錢其隣路所差義軍藥箭弩手視廂軍之數乙酉皇第八子生遣嘉王頵告于太廟四年五月薨賜名倜舊紀書皇子倜生新紀不書太學生鍾世美為試校書郎睦州軍事推官太學正世美以内舍生上書稱㫖下國子監保明在學行義亦飭故也或刻世美書印賣上批世美所論有經制四夷等事𫝊播非便令開封府禁之世美何許人又詔聞京西河北陜西諸路自冬無雪並邉山田麥苖已旱令轉運司訪名山靈祠委長吏祈禱又詔聞熈河路商貨所至州軍並市易司權買令提舉成都府路茶場司李稷體量後稷言熈河岷州通逺軍等處商販匹帛等經制司實令市易務拘買乃詔李憲具析以聞衛尉寺丞知三泉縣莊黄裳言本縣當益梓利夔四路之衝昨議者請廢北路復襃斜故道以減程驛且寛漢中輸納之勞今日較之為害乃甚于前日其川茶自行法以後興利搬運不行幾二萬馱望下陜西及利州路轉運司并提舉茶場司相度詔委劉忱李稷同比較利害以聞初三泉縣之金牛鎮有東北兩路北通陜西秦鳳熈河京西諸州東通梁洋熈寧七年提㸃刑獄范百禄建言廢北路復襃斜路乆之鳳州以為往來迂險官私受弊乞裁河池兩當二里三驛復河池舊路而陜西路都轉運司秦鳯路經畧安撫司亦皆以為言至是黄裳䟽其利害甚悉廼委忱等比較後忱等言新路視舊路雖名減兩程其舖兵逓馬皆增于舊又卒亡馬死相尋官吏驛劵給請亦倍舊路雖號十程比新路纔逺八里且多平易新路雖減科發洋州税米四千餘石及移撥興元府鳳州税米二萬餘石按此處疑有脱文今若行河池舊路遷復馬逓舖官舍亭驛略加完整即自如故兼可減河池兩當二里三驛詔三驛不減餘並從之詔知揚州鮮于侁知滁州蔡延慶權知戎州吕開權廣西轉運副使苖時中右賛善大夫蔡朦各罰銅二十斤權知唐州范百禄知寧州盧洪洋州興道縣令安漸各罰銅十斤並坐嘗建此議故也元豐三年八月二十五日侁等乃罰銅朱本入此今從之詔未差教授州軍及縣學有講書并職掌處委長吏及本學管勾官共選有學行舉人充教授其學糧依舊以贍生徒時河北轉運司請以無教授處學糧増助有處給用下國子監相度而有是詔詳定禮文所言古者大帯天子諸侯大夫士采飾單合皆不同今羣官助祭服一以緋白羅為之無等降之别又言中單亦殊不應禮並乞據禮改正詔送禮院中单送詳定所再詳定乃元豐元年十一月五日詳定所具奏則無月日大帯亦並無月日今并附十一月五日更徐考之白虹貫日丙戌三司言寳文閣學士陳薦請給未有例寳文閣學士在天章閣學士之下樞宻直學士之上今欲就天章閣學士例載之禄令其直學士待制亦増入從之提舉成都府路茶場司言欲割永寧寨額茶一千五百馱立為河州茶場額仍分年額酬賞與河州監官及本司近分官茶往諸州所総縣鎮出賣其酬賞亦乞准此所有階州水洛城其餘未曽立額賣茶場務監官乞候年終並以熈寕十年課利比較從之丁亥新權發遣永興軍等路常平等事李孝博言秦熈州自置市易乃提舉官汲逢専領從初措置絶無統紀今本務欠錢十二萬餘緡無主名已送所司推治及聞逢母與母族亦嘗貸借不容逢有不知兼元驅磨官楊清卿稱逢有虛増錢數七萬餘緡詔汲逢先勒停令開封府遣人押送秦州制院孝博于陕西路選差獄官與衛尉寺丞知三泉縣莊黄裳同鞫之因徙孝博提舉秦鳯等路常平仍令提舉催促本路州軍諸處官司應干市易本息借與人戸見欠錢物徙秦鳯乃戊子日事今并此河東路經畧司準中書送下權同管勾河東縁邉安撫司王崇拯言豐州永安保寧三寨地昨與西界首領商量分定以沙阿為界委官標量合耕地三十頃有畸乞下本司更令按視募弓箭手耕治本司今欲依崇拯奏施行從之韓存寳言羅胡茍姓作過夷賊係八母姓共五十六村除已討殺及投降外有四十七村内四十二村累次各以銅皷器甲水牛等銜草乞命投降及獻逐村地土嵗認租稅尚有斗忙箇斗等五村未降據招安將楊方簡等稱各攜其家人逺遁今見官軍在納溪寨實驚懼未敢出漢今且以降夷村分頭領彊壮老小人口山坡水㽪地土逐年認納租税仍各令打誓歸業依舊住坐訖詔請降夷人舊來納税租者聴量納其已納者止依舊額二十四日戊子詔自今非次替罷合登對官毋更令上殿上批重修敕編所修海行敕令未成書又將委官刪定一司敕不惟次序失倫二書交舉亦廣占官吏去取難于照類或致遺落切要事或與海行𠡠令相妨則人功廩賜亦所宜惜可令且併力修海行敕令俟成書以一司敕相繼照㑹編修二年六月二十四日當考御史舒亶録問同文館制獄亶奏案情未圎慮致出入人罪詔知制誥蒲宗孟往制勘院同元勘官看詳所駮情節重推勘左諫議大夫史館修撰安燾言東海之神已有王爵獨無廟貌乞于明州定海昌國兩縣之間建祠宇往來商旅聴助營葺從之仍令為屋百區司農寺請應以田宅借人及保人物産用為抵當諸縣緩急錢物并米有不依限償納民戸欲别展限半年限滿不足以元供抵當平價召人買之官收其價錢如一年無人買即沒納所抵當償官尚有少數依條催理有羡聴給本主其沒納抵當依賣户絶田産法從之己丑命龍圗閣直學士史館修撰修國史宋敏求權御史中丞蔡確西上閤門使樞宻副都承㫖張誠一同修起居注直舍人院權同判太常寺李清臣詳定正旦御殿儀注先是令敏求同閤門御史臺㸔詳上批以逐處官多議論難一恐曠日持乆不䏻畢宜于御史臺閤門太常禮院各差一員與敏求詳定故也中書言大宗正司言宗諤狀稱孫女夫丁禧病狂乞罷親取嫁資及授官宣命本司㸔詳即無以夫病聴離條例詔特聴離丁禧更不追官河東路經略司言本路編排置辦兩九軍兵仗準詔専委權提舉河東路常平等事趙咸提舉别無詳經略司参豫明文詔經略司同提舉編排直學士院錢藻撰進遣押醫官賜髙麗國王王徽詔上批宜令許將孫洙更各撰一本以進尋命洙為翰林學士洙為學士在丙申今并書右龍武軍大將軍郴州團練使吴國公宗絳為光州刺史右龍武軍大將軍温州團練使宗漢為慶州刺史以上批宗絳吴王元儼之孫宗漢濮安懿王㓜子皆特推恩也御史何正臣言安燾陳睦使髙麗日以所得布馬易銀及於髙麗界使人索驛料算直害義辱命啓侮外藩望案治其罪追還所與恩命仍詔髙麗諭以使者失職之狀以慰逺人詔劄與燾睦令知癸巳權發遣江淮等路發運副使寋周輔兼提舉措置福建路賣鹽及賊盜事三年四月賣鹽司官吏並推賞詳定正旦御殿儀注所奏正旦朝㑹用黄麾仗及以車輅輿輦充庭乞先頒降以本所祗應職掌及諸司排儀仗班次等人赴大慶殿豫審度容布儀仗輦路等地具圗以聞詔車輅未設餘依所請都水監言自曹村决溢後諸埽物料遂無年計外準備乞支見錢二十萬緡趂時市梢草封樁如來年河埽無事自可兊充次年從之荆湖北路轉運司言辰州界􅍹賊二十餘人焚刼叙浦縣民戸聞係丁先鋒殘黨沈七丁翼等未出首身居深險山峒臨髙據隘官兵無由禦備乞立賞錢募猺人首領及諸色人捕掩如䏻殺獲丁翼等每級賞銀瓶三隻牛三頭鹽五十斤其次賊黨每級牛一頭鹽二十斤即能招降比類逐等十支二分兼猺賊雖屬辰州縁接沅州界乞令知州謝麟亦遣兵誅討從之甲午提㸃倉場司沈希顔請嵗撥糴本錢二十萬緡付廣濟河輦運司糴糧赴京師如及四十萬石特與酬賞詔三司相度以聞提舉福建路鹽事司言邵武軍鹽出賣甚易但闕兵夫運致乞支係省錢或役錢雇人從之韓存寳言夷賊斗忙箇斗等五村續乞降已令歸業詔存寳分移斗忙箇斗九人往近裏州軍覊管如存寳已起離即具處置次第牒鈐轄司施行後存寳言作過首領不止九人若依詔㫖恐其餘降人驚疑乞且依先處置從之十七日乙未詔在京官司見監催欠罰銅錢並除放韓絳言北人郝景過南界㩁場聞􅀞地圗已宻遣人收捕詔定州路安撫司及河北縁邉安撫司指揮所遣人須察知姦細實狀方得收捕推鞫無致引惹生事澶州言靈平下埽閉口隄南實墊摧動隄身乞下都水監修完已牒澶州都大司併力固䕶及十月甲寅本埽火夜起見檢所燒木㟁地歩續奏詔權同判都水監楊汲相視隄防有合修處即具功料及火發次第以聞其放火賊令河北轉運司立賞錢五百千募人告捕丙申軍器監言准敕應副陜西路將下并守禦軍器皆歩乗運致聞闕少人車積下綱次所發軍器浩瀚若縁路散漫暴露枉有損壊又日發綱運亦慮積壓數多乞委官京西陜西轉運司府界提㸃司趣發從之丁酉著作佐郎御史臺主簿何洵直兼詳定正旦御殿儀注所檢討朱本削去云小差除不當載權江南東路轉運判官何琬言吕嘉問奏報漏泄臣體量嘉問違法事月日異同乞别根究詔送御史臺根究公事所朱本削去云琬所言嘉問事各已具載此逐時小可奏陳不必盡載提㸃倉場司沈希顔乞以宗室百官等合支草並給錢令開封界第四等戸體量納草錢於本縣詔三司相度朱本削去云事小兼方相度不須載戊戌京西第一將劉元等乞馬軍教習不成退充歩軍又不成退充廂軍上批在京例且與展限限滿尚不䏻學即如所奏京東西開封府界諸將下准此荆湖南路安撫使謝景温言看詳轉運司乞以邵州武岡等縣保丁於界上置舖堡及木柵内弩手已發往關硤等寨者乞就本縣差填所置舖堡並在辰州地界百里之内欲許保丁依條置合用器甲以備保聚教習詔舖堡保丁事並從之其置兵器非在蠻界百里内者不用此法己亥知制誥直學士院錢藻為樞宻直學士詔軍器監戒勵弓作監官令三司遣官驅磨作匠有無稽違工限減刻物料先是軍器監進弓上疑不如法式因命取教習馬軍所弓十張較其輕重長短與元付様頗重而斗力弰閃又皆不同故也十二月六日丙午席延賞衝替可并此宰臣吴充王珪参知政事元絳言功臣非古始唐徳宗多難之餘乃有奉天定難之號不應盛世猶襲陳迹况陛下即位以來上徽號至數十而不許臣等何功乃例䝉恩乞於銜位之中悉減罷詔答曰唐之中世時屬多虞制為功臣寵厥將吏因仍弗革稱謂實繁溢美過情空名眩實施之近世或適權宜襲於來今固非通制卿等為國丞弼悃愊無華帥先臣鄰願罷功號朕用嘉歎其敢弗從宜如所請於是知樞宻院馮京等繼請從之遂詔管軍臣僚以下至諸軍班銜内帯功臣者並罷新舊紀並書罷賜功臣號都大提舉市易司言本司遣官以物貸往諸路變轉乞十萬緡以上限二年二十萬緡限三年如一年内索及二分依逓年比較推恩限滿索及八分以上與理為任過限不及立定分數者不在酬奬理任之限仍先停支官吏請給從之
