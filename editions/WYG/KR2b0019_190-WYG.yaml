body:
  text: 續資治通鑑長編巻一百八十六宋李燾撰仁宗嘉祐二年六月壬子以汝州龍山孔􅌈為校書郎致仕絳州稷山韓退為安逸處士翰林學士承㫖孫抃薦􅌈退有行義也自趙彦若制䇿不入等閲四年遂無應科者上曰豈朕待之不至耶此據張唐英政要丁巳詔朝廷設制科以取天下美異之士嘗以推恩過厚而難其選故所取不過三二人甚非所以廣詳延之路也其令兩制以上同議之既而抃等言太常博士以下至選人草澤人應制科者並聽待制以上奏舉無得自陳内草澤人亦許本路轉運使奏舉其試文淺陋及履行不如所舉並坐舉者其進用差次不得引舊例超擢從之草澤人許本路轉運奏舉據㑹要而實録削去戊午夏國主諒祚遣人來謝弔祭丙寅進封福康公主為兖國公主仍令所司擇日備禮册命戊辰淑妃苗氏為賢妃兖國公主之母也公主將出降故有是命國朝公主受封降制有册命之文多不行禮只以綸告進内于是翰林學士胡宿言竊聞兖國公主議行册禮然于事體頗有未便前未有此禮祖宗以來公主長公主未有行者昔漢明帝封皇子悉半諸國明徳馬皇后曰諸子食數縣不已儉乎帝曰我子豈敢與先帝子等也唐貞觀中太宗長樂公主將出降帝令有司資送倍于永樂公主魏徴曰不可引漢明帝之言為對且曰天子姊妹稱長公主加長字是有所尊崇或可情有淺深無容禮相踰越太宗然其言入吿長孫皇后后遣使賜徴金帛陛下即位以來累曽進封楚國魏國二大長公主亦不曽行册禮今施于兖國公主是與大長公主相踰越兼以貴主之故賢妃亦䝉殊典有㫖令進綸告若不行册禮是母子之間一行一不行禮意尤不相稱書于史册後世將有譏議必謂陛下偏于近情虧聖徳之美臣願陛下采漢明之言開文皇之聽遵祖宗舊典如國朝公主曽行此禮行之且無嫌如其不曽則宜且罷臣以陛下好忠諫納至言臣職在論思不敢緘黙不從邢州觀察使李璋為鎮海留後祁州團練使李珣為均州防禦使濮州團練使駙馬都尉李瑋為均州防禦使秋七月丁丑特贈賢妃苗氏三代為東宫三少官辛巳詔河北諸道部署司分遣兵官提舉教閲所部諸軍庚寅詔辰州築外城山猺候功畢人給鹽三斤辛卯令翰林學士承㫖孫抃御史中丞張昪磨勘轉運使及提㸃刑獄課績初知諫院陳旭言生民休戚繫郡縣政之得失今天下州三百縣千二百其治否朝廷固不得周知必付之十八路轉運使而預選者自三司副使省府判官提㸃刑獄或以資序或以薦引才不才固已混淆一旦付以一道按察之寄雖知不勝其任必重退之是重抑一人希進之心而輕一道生民之命今選用不精又責任無法考課不立其間非闇滯罷懦則凌肆刻薄十常八九所以下之疾苦不得上聞而重其愁嘆憔悴也朝廷有意天下之治宜自轉運使始今輒上選用責任考課三法其選用法曰以公正明斷恵愛為本公正可使糾肅官吏明斷可使决治煩劇恵愛可使䘏民之隠茍無數者之長即以補它職其禄賜恩典視轉運使可也其責任法曰唐虞四嶽十二牧三代方伯連帥漢部刺史皆今轉運使之任今居職者非其人專以辦財賦為職業故郡縣之政不修獨掊歛刻暴之令行而民受其弊葢典制不立所致也今舉其􅋀務有五一稱薦賢才各堪其任二按劾貪謬修舉政事三實户口増墾田四財用充足民不煩擾五興利除害仍令嵗終具條所施行者以聞其考課法曰故事轉運使給御前厯子嵗滿上審官院考校之三司亦嘗立考課升黜條其後卒不行葢委計司則先財利而忽民事在審官又因循常務而無課第之實按漢世御史中丞外督部刺史今宜付御史臺考較為三等仍與中書門下参覆其實其上等量所部事之劇易而褒進之中等退補小郡若風績尤異即擢以不次其職事弛廢不俟嵗滿明行黜削于是以嵗滿所上功狀分殿最為上中下三等用唐考功四善之法以稽行實其等亦如之故以命昪等然卒亦無所進退焉無所進退據孫抃𫝊六年八月丁丑詔書更詳之壬辰賜諸軍雨壊營舎不出軍都虞候至十將軍士米五石至二石其虞候及入營者半之乙未禮官言禮閣新儀公主出降前一日行五禮古者結婚始用行人告以夫家采擇之意謂之納采問女之之名歸卜夫廟卜而獲吉以告女家謂之問名納吉今選尚一出朝廷不問納采又公主封爵已行誕告不待問名而卜之若納成則既有進財請期則有司擇日宜稍依五禮之名存其物數俾知古者婚姻之事重而夫婦之際嚴如此亦不忘古禮之義也欲俟公主降日令李瑋主婚之家具合用鴈帛玉馬等陳于内東門外以授内謁者進入内中付堂事者受之其馬不入從之丁酉兖國公主受册百官拜表稱賀已亥詔河北陜西河東經略安撫使舉文武官堪將領者各二人按宋史詔經略安撫舉文武官在是月丁酉又作堪將領者各一人與此小異壬寅知麟州六宅使帶御噐械武戡除名江州編管坐與西人戰斷道塢而棄軍先入城也八月乙巳朔降知襄州兵部員外郎知制誥賈黯知郢州黯初迎父之官而父有故人在部中遣直㕔卒致問黯輒笞卒父恚一夕歸鄉里它日疾且亟黯内懐不自安請徙郡及解官就養不報乃棄官去而御史呉中復等言黯輒委州印撓朝廷法通判胡揆不待命而承領州事請並劾罪以聞既降黯而揆特釋之詔編集樞宻院機要文字樞宻副使程戡提舉初樞宻使韓琦言歴古以來治天下者莫不以圖書為急葢萬務之根本後世之模法不可失也恭惟我宋受命㡬百年矣機宻圖書盡在樞府而散逸蠧朽多所不完臣比到院因北界争寧化軍土田令檢北界朔州移寧化軍天池廟係屬南朝牒累月檢之不獲及因西人理㑹麟州界至又尋慶厯中臣在院日與西人商議納欵始末文案亦已不全以此知機要文字從來散失甚矣請差官于諸房討尋編録一本進内一本留樞宻使㕔以備經久之用于是自建隆以來以嵗月先後事類相從而纂集之六年十一月乃成書慶厯誓書三本樞宻院既不復存大理寺丞周革但于廢書中求得杜衍手録草本因具載焉革平棘人也此據司馬光記聞丁未韓琦又言天下見行編敕自慶厯四年以後距今十五年續降四千三百餘件前後多抵牾請加刪定乃詔宰臣参知政事曽公亮同提㸃詳定編敕戊申兖國公主出降己酉駙馬都尉李瑋入謝燕于禁中庚戌韓琦言朝廷頒方書諸道以救民疾而貧下之家力或不能及請自今諸道節鎮及并益慶渭四州嵗賜錢二十萬餘州軍監十萬委長吏選官合藥以時給散從之按宋史賜錢合藥在己酉日琦又言醫書如靈樞太素甲乙經廣濟千金外臺祕要之類本多訛舛神農本草雖開寳中嘗命官校定然其編載尚有所遺請擇知醫書儒臣與太醫参定頒行乃詔即編修院置校正醫書局命直集賢院崇文院檢討掌禹錫等四人並為校正醫書官禹錫郾城人庚申御崇政殿録繫囚雜犯死罪遞降一等徒以下釋之癸亥䇿試賢良方正能直言極諫祕書丞王彰材識兼茂明于體用明州觀察推官夏噩彰所對不入等噩入第四等授光禄寺丞噩磨勘自當改著作佐郎宰相富弼以親嫌而裁之噩越州人也噩越州人據登科記王彰不詳邑里降前知麟州西上閤門使張希一知儀州六宅使王守忠為輅州鈐轄以知并州龎籍言希一等前在麟州不恤邊患致西人侵占屈野河外禁地也丁卯置天下廣恵倉初樞宻使韓琦請罷鬻諸路户絶田募人承佃以夏秋所輸之課給在城老㓜貧乏不能自存者既建倉乃詔逐路提㸃刑獄司專領之嵗終具所支納上三司十萬户以上留一萬石七萬户八千石五萬户六千石三萬户四千石二萬户三千石萬户二千石不滿萬户一千石有餘則許鬻之戊辰知諫院陳旭言比日内降營求恩賞者甚多雖許執奏而有司時有奉行自今請令中書樞宻院推劾以正干請之罪從之仍牓御史臺閤門旭奏在皇祐二年九月己巳鹽鐵副使刑部員外郎郭申錫為契丹國母生辰使西京左藏庫副使王世延副之右司諫吕景初為契丹生辰使西京左藏庫副使張利一副之度支判官祠部郎中直祕閣王疇為契丹國母正旦使西染院使李瑊副之殿中侍御史呉中復為契丹正旦使東頭供奉官閤門祗候宋孟孫副之庚午賜右監門衛大將軍柳州刺史克循銀三百兩絹三百匹克循徳彛孫也初上不豫克循日夜齋戒徧為禳禬之事又鏤佛書身自禮頌上聞之欲進以官中書裁而賜之壬申知并州龎籍言經略司已令殿中丞孫兆議定横陽河為府州界然後三分許一分與夏國若不聽即絶之請嚴禁陜西和市從之仍詔定新立封堠里數繪圗以聞三分許一葢當時夏人侵界六十里只令退四十里也吕誨疏第七巻論此頗詳明年九月己巳朔詔河東具利害更考此議竟從與違是月翰林學士歐陽修奏疏言臣聞天下之難言者不敢冀必然之聽知未必聽而不可不言者所以盡為忠之心况臣遭遇聖明容納諫諍言之未必不聽其可黙而不言臣伏見自去嵗以來羣臣多言皇嗣之事臣亦嘗因災異竊有奏陳雖聖度包容不加誅戮而臣愚懇至天聽未囬臣實不勝愛君之心日夜區區未嘗忘此思欲再陳狂瞽而未知所以為言今者伏見兖國公主近已出降臣因竊思人之常道莫親于父子之親人之常情亦莫樂于父子之樂雖在聖哲異于凡倫其為天性于理則一陛下嚮未有皇嗣而尚有公主之愛上慰聖顔今既出降漸踈左右則陛下萬幾之暇處深宫之中誰可與語言誰可承顔色臣愚以謂因此時出自聖意于宗室之中選材賢可喜者録以為皇子使出入左右問安侍膳亦足以慰悦聖情臣考於史書竊見自古帝王雖曰至尊未嘗獨處也其出而居外也不止百司公見奏事而已必有儒臣學士講論于閑宴又有左右侍從顧問語言其入而居内也不止宦官宫妾在于左右而已其平居燕寢也則有太子問安侍膳于朝夕其優游宴樂也多與宗室子弟懽然相接如家人計一日之中未嘗一時獨處也今陛下日御前後殿百司奏事者徃徃仰瞻天顔而退其甚幸者得承一二言之徳音君臣之情不通上下之意不接其餘在廷之臣儒學侍從之列未聞一人從容親近左右入而居内則至于問安侍膳亦闕于朝夕是則陛下富有四海之廣躬享萬乗之尊居外則無一人可親居内則無一人得親此臣所以區區而欲言也伏念陛下荷祖宗之業承宗廟社稷之重皇子未降儲位久虛羣臣屢言大議未决臣前所奏陳以謂未必立為儲貳而且養為子既可以徐察其賢否亦可以待皇子之降生于今為之亦其時也言狂計愚伏竢斧鉞翰林侍讀學士兼侍講學士吏部郎中王洙被病踰月上遣使問病少間否能起侍經席乎九月甲戍朔洙卒賜諡曰文御史呉中復言洙官不應得諡乃止乙亥殿中丞權發遣鹽鐵判官雷簡夫體量辰澧州盜賊公事先是彭仕羲納其子師寳之妻師寳忿恚遂與其子師黨舉族趍辰州告其父之惡言仕羲嘗設誓下十三州將奪其符即并有其地貢奉賜與悉專之自號如意大王補置官屬謀為亂于是李肅之與宋守信合議率兵數千深入討伐以師寳為鄉道兵至而仕羲遁入内峒不可得俘其孥及銅柱官軍戰死者十六七肅之等皆坐貶朝廷更委王綽竇舜卿經制之間遣吏諭㫖許令改過自歸輒不聽官軍久無功又出御史朱處約徃視仕羲乃自陳本無反狀其僣稱號補官屬特逺人不知中國禮義而然守信等輕信師寳之譛擅伐無辜願送還師寳等復貢奉内屬宰相文彦博將許之樞宻使韓𤦺曰師寳等還則為魚肉矣必先與約毋殺師寳等乃可聽故再命簡夫體量簡夫葢琦所薦也正𫝊附𫝊序討蠻事都顛倒今略加刪改使不失次第庚辰詔内臣為鈐轄都監者逐路止置一員李復圭記聞云嘉祐之前毎路兵官内臣或至三四員循法者少復圭奏請毎路止限一員詔如所請遂為定制復圭自紀如此朱墨附𫝊及墓誌並不及之按此時復圭實知涇州不知此詔果是從復圭所請否當考乙酉樞宻院言自今舉使臣須本路安撫轉運使提㸃刑獄知州通判方理為舉主其在京文臣非知雜御史武臣非觀察使以上所舉無得施行從之丁亥以契丹歸明人郝永言為鄧州司士参軍給俸仍賜田二頃庚寅樞宻院言河北陜西河東路分都監自轉崇班以上三任親民及有本路經略安撫轉運使前兩府五人同罪奏舉者方得差其京東減親民一任舉主二人若有戰功者勿拘乙未詔真定府定州髙陽闗路安撫都部署添支如陜西四路例並支五十千庚子契丹遣樞宻使右金吾衛上將軍蕭扈宣政殿學士禮部尚書吳湛來再求御容且言當致洪基像冬十月甲辰朔三司使張方平等上新編禄令十巻名曰嘉祐禄令遂頒行之己酉翰林學士兼侍讀學士工部郎中知制誥史館修撰胡宿為囬謝契丹使禮賔使李綬副之且許以御容約因賀正使置衣篋中交致焉張唐英云遣張昪送御容契丹具儀仗拜謁驚嘆按張昪非送御容者今不取甲寅以内園使閤門通事舎人夏詮為西上閤門副使仍詔自今閤門通事舎人經十年無贓私罪者與除閤門副使即毋得陳乞乙丑都官員外郎陳昭素勾當三司修造案公事侍御史丁詡言三司勾當公事罷才數年今河渠司勾當已有兩員若修造案又置一員乃是廢二員而置三員也詔以去年及今夏霖雨修造併多須修造稍稀即行減罷更勿差填江休復雜志云陳昭素勾當三司修造案半年減十五萬議者云可罷陜西買米一年今附見當考康定元年十二月三司初置勾當公事兩員審官院言永興軍秦延渭慶鎮定并鄆青益廣杭州荆南江寧府及三京留守通判自今並差知州資序代還無過陞半年名次從之時以在院知州員多闕少故也丙寅詔翰林醫官院自直院以下定以一百四十二人為額己巳詔昨因儂智髙入㓂坐棄城罪編配人知龔州張序等十四人聽自便庚午鎮海留後李璋罰銅二十斤璋求内降除節度使知諫院陳旭引近詔劾奏之也辛未贈太尉兼侍中劉平諡曰壯愍本傳云壯武㑹要與實録同今從之十一月癸酉朔置江淮南荆湖制置司勾當運鹽公事一員初三司言商旅于𣙜貨務入見錢筭東南鹽嵗課四百萬緡諸路般運不足而課益虧請選官置司以主之歐陽修有詩可考丙子詔提舉在京諸司庫務司汰諸司人老疾不堪執役者仍自今三年一汰之詔廣南東路經略司蕃官普延曾經捕殺蕃酋又親獲蠻將一人其月給錢五千丁丑禮部員外郎兼侍御史知雜事馬遵為吏部員外郎直龍圖閣以疾自請也遵尋卒録其子姪二人遵性樂易善議論其言時政得失不為激訐故多見推行杜衍范仲淹皆稱道之己卯河北提舉便糴糧草虞部員外郎薛向提㸃河北刑獄仍兼提舉便糴糧草當河北大水民乏食詔輟太倉米六十萬斛以賑之向以為北人不便食秔且漕路囬逺不時至請出本司米四十萬石以代之向任便糴凡四年糧草石束以千計者凡六百湖北轉運司言彭仕羲㓂西平寨主右班殿直李宗奭擊走之癸未徙知慶州給事中龍圖閣待制崔嶧知同州諫官言嶧年髙非治邊才也實録于此但書以給中龍知崔嶧知同州又于明年十二月癸卯書自慶州徙同州葢誤也按嶧以至和二年二月除知慶州嘉祐二年八月先除傳永三年四月又除劉湜八月又除劉沆安得十二月嶧猶在州今止存此仍取明年十二月所書增入更須考詳丙申三司使張方平言觀文殿學士王舉正等甞参知政事請殿門外叙班在舉正之下入殿庭自依名位從之詔三司使副體量在省判官才否以聞初知諫院陳旭言今三司乃前代尚書省卿寺之職而無振舉綱轄之官轉運提㸃刑獄代還不問才否例補判官請自今擇在部有風迹者為之其常才且令主判南省諸部或與閑郡庶大計之司無容濫入故下此詔戊戍昭徳軍節度使知并州龎籍為觀文殿大學士户部侍郎知青州初司馬光建議築堡籍檄麟州如光議及郭恩等敗沒詔侍御史張伯玉按鞫籍匿光初所陳事故光得以去官免責而籍為御史劾奏由是罷節度使光不自安守闕三上書乞獨坐其罪不報李師中上籍詩註云言事者怨執政日曽罷彼風憲職于是奏收籍節鉞不知言事者姓名當考己亥屯田員外郎宋咸上所注論語司封員外郎吳祕上所注太𤣥經及音義度支員外郎集賢校理何渉上所著治道中術三十篇並降敕奬諭殿中丞國子監直講孫復治春秋不惑𫝊注其言簡易明于諸侯大夫功罪以考時之盛衰而推見王道之治亂得經之本義為多既疾樞宻使韓琦言于上選書吏給紙札命其門人祖無擇即復家録之得書十五巻藏祕閣特官其一子復卒又賜錢十萬復惡胡瑗之為人在太學常相避瑗治經不如復其教養諸生過之賜澶州修河役卒緡錢十二月丁未西平州黔南道王石自遣首領貢方物先是上封者言四年一貢舉四方士子客京師以待試者六七千人一有喧噪其徒衆多勢莫之禁且中下之士徃徃廢學數年才學之士不幸有故一不應詔沉淪十數年或累舉滯留遂至困窮老且死者甚衆以此毁行冒法干進者不可勝數宜間嵗一貢舉中分舊數而薦之王洙嘗侍邇英閣講周禮至三年大比大考州里以賛鄉大夫廢興帝曰古者選士如此今率四五嵗一下詔故士有抑而不得進者為今之計孰若裁其數而屢舉也下有司議而議者乃合奏曰臣等謂易以間嵗之法無害而有利不足疑也使舉子不幸有疾病䘮服之故者不至久沉且程文偶不中選旋亦遇貢舉則下無滯才之嘆而天下所薦數既減半禮部主司易以詳較得士必精矣近年挾書代筆𫝊義者多因使權貴富豪之子得以濫進葢由人衆有司無繇檢察若人少則諸偽濫勢自不容使寒苦藝學之人得其塗而進戊申詔自今間嵗貢舉進士諸科悉解舊額之半進士増試時務䇿三條諸科増試大義十條又别置明經科其試法凡明兩經或三經五經者各問墨義大義十條兩經通八三經通六五經通五為合格兼問論語孝經十條䇿三條分八場出身與進士等以禮記春秋左氏傳為大經毛詩周禮儀禮為中經周易尚書穀梁傳公羊傳為小經其習禮記為大經者許以周禮儀禮為中經習春秋左氏傳者許以穀梁傳公羊傳為小經舊置説書舉今罷之其不還鄉里而寓户他州以應選者嚴其法毎秋試自縣令佐察行義保任之上于州州長貳復審察得實然後上本道使者類試已保任而後有闕行則州縣皆坐罪若省試而文紕謬坐元考官又用孫抃奏諸州解試額多而中程少者不必足額説書舉在天聖四年九月王洙講周禮乃至和元年九月壬申今依本志移見于此明經試法實録在明年三月辛巳及七月辛酉今依本志并書之庚戌遣官祈雪辛亥詔學士院承内降處分自今並以闗白中書樞宻院施行先是澶州言河流損壊浮橋後數日而修完之遂下本院降敕奬諭中書言官吏䕶視不謹法當劾罪既令免勘而詔亦追罷之知諫院陳旭言比來館閣選任益輕不足以備天子顧問而堪公卿之事近制舉之進用不得専守舊比進士髙科者且循常調試其才可然後升擢欲望朝廷約館閣在職人數限為定員其因任使特受者不以充數應二府及近臣毎有論薦並令中書門下籍其姓名若員有闕即取其間文學行義傑然為衆所推者方得召試仍不許大臣縁恩例試補親屬庶㡬清途無濫者癸丑詔大臣所舉館職自今令中書籍記姓名候在官員數稍少即選文行為衆所推者與試其考校無得假借等第皇祐元年六月二十六日旭言可参考己未觀文殿學士翰林侍讀學士禮部尚書王舉正為奉安明徳章穆皇后神御禮儀使三后神御皆在普安院為大水所壊徙于啟聖院既修完故還奉安于本殿也乙丑命近臣分禱天地宗廟社稷及遣官詣五嶽四瀆祈雪丁卯契丹主國母遣左千牛衛上將軍耶律世逹諫議大夫知制誥張嗣復契丹遣臨海節度使耶律兖引進使張挺來賀正旦戊辰置街道司指揮兵士以五百人為定額己巳契丹國母蕭氏卒
