body:
  text: 續資治通鑑長編巻三百八十宋李燾撰哲宗元祐元年六月辛丑詔尚書左右曹各輪郎官一員宿直其省寺監官輪宿除秘書省大理寺國子都水監依舊外餘並罷以刑部郎中杜紘言宿官夜無職事而有燈燭之虞也壬寅禮部言坤成節上夀合用乾興年故事權罷止合拜表其在京并諸州軍依故事賜宴不作樂從之又言蘇轍奏請明堂用皇祐典禮奉詔禮部太常寺同議以聞今詳皇祐明堂雖嘗徧祀然嘉祐末已經仁宗釐正至元豐三年宗祀英宗於明堂以配上帝專用孝經嚴配之文最為得禮之正蓋宗祀大典更累聖乃定將來季秋大饗明堂宜遵元豐三年定制從之轍奏見五月六日誡約西蕃邈川首領河西軍節度使鄂特凌古詔曰昨得卿父董戩文字稱身有重患必是身死蕃家國土事已教男鄂特凌古管勾朕以卿祖考忠順朝廷世受封爵已降制命令卿襲封及賜衣帶支給請受等卿繼世之初人情未一固當推廣恩信惠養一方今聞卿自管勾以來頗峻刑殺部族之衆諒不遑寜雖出傳聞未忘憂想卿宜以繼承為重以仁厚為先無恃寵榮務安種落副朝廷所以封立之惠思前人所以付與之心當畧出降詔端由夏國遣間使春約勒阿拉雅賽進貢以刑部郎中杜紘押伴司馬光言臣近具劄子奏乞於今月八日隨執政赴延和殿進呈文字復䝉聖慈遣中使封還令依前降指揮臣不敢再三固違聖㫖然臣區區之心所以欲於八日入對者竊見夏國宥州有牒稱已差人詣闕計㑹所侵疆土城寨竊慮其日進呈上件文字此乃邊鄙安危之機生民休戚之本不可不察臣自今年二月初以來累曾上言乞因新天子即位西人恭順之際早下詔書赦其罪戾待遇如故則控縱在我天子之體正休兵息民夷夏之心安即不幸敵人或有一語不遜一騎犯邊則此詔不可復下無何臣在病假不得面論人心不同為衆所奪日復一日遷延至今敵先遣使來直求侵地指陳兵端辭意侵慢前所議詔書已不可下矣既失此機㑹即日使者至應答亦難若悉從其所請則彼益驕而無厭若悉拒而不從則邊患由此而起今就二者之中寜為百姓屈己少從所請以紓邊患不可激令憤怒致興兵犯塞以困生民所以然者靈夏之役本由我起新開數寨皆是彼田今既許其内附豈可猶靳所侵地而不與彼必曰我自天子新即位卑辭厚禮以事中國庶幾歸我侵疆今猶不許則是恭順無益不若以武力取之彼小則上書悖慢大則攻陷新城當此之時不得已而與之其為國家之恥無乃甚於今日乎以小諭大譬如甲奪乙田未請而與之勝於請而後與若更請而不與則彼必興鬬訟矣此是非利害明若白黑臣竊慮進呈之際羣臣猶有見小忘大守近遺逺惜此不毛無用之地結成覆軍殺將之禍兵連不解為國家憂伏望陛下决自聖志勿聽浮言為兆民計文彦博輔佐四朝熟知敵情此可謂軍國重事願陛下詢彦博以决之既而彦博論與光合衆不能奪光行狀云論西戎大畧以和戎為便用兵為非時異議者甚衆光持之益堅其後太師文彦博議與公合衆不能奪不知彦博議與光合是何月日今附見此七月八日范純仁畫三策以進亦言彦博與執政論疆事當即是七月初也紹聖二年八月七日罷分畫舊録載彦博議棄四寨以謂邊臣欺罔為國生事第恐不能持久却須自棄不如推恩給與當求全本增入更檢月日附此詔應差禁軍係將兵不係將兵並衮同差使新無廣南西路經畧安撫司言請邕州將兵與不係將兵差往寨鎮都同廵檢等處防托歳一代從之新無尚書左僕射司馬光舉奉議郎張舜民通直郎孫凖河南府右軍廵判官劉安世尚書右僕射吕公著舉朝奉郎孔平仲承議郎畢仲游孫朴中書侍郎張璪舉承議郎趙挺之梅灝宣義郎陸長愈同知樞宻院事安燾舉承議郎盛次仲太學博士王柄蘄州録事參軍廖正一尚書左丞李清臣舉宣徳郎陳察太學正晁補之常州晉陵縣丞李昭玘尚書右丞吕大防舉奉議郎趙叡劉唐老黄陂縣令李籲同知樞宻院事范純仁舉宣徳郎楊國寶承議郎畢仲游太學博士張耒並堪館閣之選詔候過明堂令學士院試其在外者召赴闕四月十四日初有此詔張舜民邠州人孫凖瑜子爽孫劉安世航子孔平仲文仲弟畢仲游仲衍弟孫朴固子趙挺之諸城人梅灝熙六第三甲蘇州人陸長愈熙三第四甲開封人盛次仲嘉六第四甲開封人王柄熙六第三甲開封人廖正一豐三第三甲安州人陳察熙九第三甲開封人晁補之李昭玘趙叡熙六第四甲開封人劉唐老忱子李籲熙九第四甲開封人楊國寳仲元子張耒淮隂人尚書省言應寺監事合具申㑹應報從之御史中丞劉摯言臣伏覩近制陞朝官各舉進士經明行修一人及陞等推恩理為舉主過犯同罪等事臣竊原朝廷之意患程試考校徒得文詞故更立此制以進實行天下幸甚臣退而熟計及考學士大夫之議以謂法則善矣然使陞朝官舉之不若使州郡以上舉之便臣謹條上利害按國朝舊制臣僚任通判知州乃得舉官蓋知人實難非行已謹閱事久誠未可責以保任今陞朝官無職罪若私罪重此外不計資任不察能否諸科刀筆之吏一切得薦士此不可一也經術深淺問而可知也至於行義汙潔非鄉里庠序羣居久處毁譽素著誰能知之不拘路分但非有服親皆得奏舉臣恐流離之人虛偽見售此不可二也天下陞朝官無慮幾二千人則所薦士亦如之積累歳月不被薦者無幾矣人人陞等推恩無以示勸此不可三也議者謂朝士固皆選擇可任使之人然品流不一員品猥衆今勢利相市必有受賕造訟以撓陛下之法者臣誠淺薄不敢臆度朝士大夫以為必然亦不敢以為不然然則選舉之利未見而奔競之俗先成此不可四也傳曰十室之邑必有忠信計今天下之士一郡一邑隨其衆寡必有善士考鄉里之行詢庠序之論其勢親其事察無如州郡之吏至於監司則朝廷所任以按察臺諫侍從亦朝廷所倚以議論故臣願每遇科塲詔下委逐州長吏奏舉經明行修進士一名仍以應舉實數二百戶為率不滿二百人聽舉一名每二百人加一名至三人止監司轉運判官以上於本路在京臺諫以上於開封府國子監各許奏舉一名非鄉貫及不經學校或無可應詔並聽勿舉自餘陞等推恩理舉主同罪犯等事並依元降朝㫖又言臣愚以謂三代鄉舉之制未易遽復欲少倣古則諸侯歲貢之法莫此為近伏望詳酌施行乃詔朝官通判資序以上人許舉保四月二十四日初詔癸夘右司諫蘇轍言臣五月二十六日上殿劄子乞明降詔書戒飭監司長吏使知朝廷愛惜鄉差役人與神宗朝愛惜雇募役人無異應係日前約束官吏侵擾役人條貫使刑部録出具委無漏落雕印頒下令一切如舊出榜州縣使民知之仍常加督察有犯不赦應監司所部有犯不能覺察致因事發露者重其坐至今多日未䝉施行伏念臣前作此奏為聞近日諸縣曹吏有因差役致富小民被差充役初參上下費錢有至一二十千者州縣官吏亦有以舊雇役人慣熟多方陵虐所差之人必令出錢作情願雇募又有以新差役人拙野退換别差必得慣熟如意而後止者天下官吏不能皆良如此等事所在不一雖非目見可以意料民被其害如遭湯火竊意此奏朝上聖心惻怛不待終日而行不意遷延至今不以為急臣愚竊恐朝廷始復差役議者妄謂差法一行更無患害聞臣此奏未免不信臣謂改雇為差實得當今救弊之要然使聞害不除見善不徙則差役害人未必減於免役伏乞聖慈檢臣前奏早降詔書具言所聞差役官吏情弊仍備録前後禁約曉諭中外使知朝廷深意則天下幸甚貼黄稱臣訪聞近日頗有上書言差役不便䝉降付㸔詳役法所臣推原其意皆由州縣施行差法别有騷擾以致人言者若不早為禁約深為不便伏乞指揮於役法所檢取民間前後言差役不便文字畧賜省覽即見詣實御史中丞劉摰言臣近者劾奏吕惠卿去年公違陛下即位赦文約束於四月出兵侵討西界乞正典刑未䝉處分風聞或者之言云惠卿曾奏禀臣以謂曾與不曾奏禀固非臣之所能知然奏而出兵不奏而出皆是違廢制詔其罪一也借如赦後奏請不過以虚為實張皇邊患以取必於朝廷且是時神宗皇帝新棄天下梓宫在殯而皇帝陛下太皇太后陛下哀迷在疚此何時也而惠卿忍不恤國家大故乃敢違格詔㫖以謀動師旅為請欲遂其貪功幸進之意是豈復有臣子之道哉赦書明言靜守疆場不得侵擾外界乃陛下即位之始欲以安靜四夷况邊鄙本無一事惠卿何至廢敕而請之使陛下初臨萬國命令反復不能著信義於四夷豈不重可歎哉當惠卿奏請之時朝廷不能愛惜命令亟行誅責既己失矣今來諫官御史交章彈論中外指議罪狀明白又以二三之言滅裂寛貸指事不原其心議法不當其罪則何以救命令失信之患何以開外夷向化之心何以為天下姦雄擅興者之戒伏望早賜睿斷按惠卿罪重行誅竄貼黄稱使惠卿於赦後誠有奏請即不知當時朝㫖以何辭報之臣竊料朝廷必不於大喪哀戚中許其出兵侵討外界自廢赦令也若惠卿在去年三月六日赦前舊曾承受指揮使之侵討縁三月六日赦書係是後赦自合遵禀元祐元年六月十七日二十二日再彈甲辰四方館使果州刺史環慶路鈐轄兼知邠州謝麟換朝議大夫直祕閣知潭州朝議大夫祕書少監劉攽為直龍圖閣知蔡州攽以病自乞也給事中孫覺胡宗愈中書舎人蘇軾范百禄奏䟽留中不報詔太學置春秋博士一員令本監長貳奏舉資政殿大學士正議大夫提舉崇福宫呂惠卿落職降為中散大夫光禄卿分司南京蘇州居住以諫官蘇轍等言惠卿姦惡及知太原府日違登寳位赦敕出兵西界故有是命轍等䟽在初八日政目但稱轍言右正言王覿言近制通議大夫己上皆通行磨勘故自推行官制以來或以特恩或以磨勘而轉一官比舊有實轉兩官以至三四官非所以愛惜名器也請自京官至太中大夫以上毋以磨勘轉官詔文臣磨勘待制太中大夫己上至通議大夫止餘官至中散大夫止其中散大夫已上勞績酬奬合轉官者只許囘授與子孫特㫖陞遷不在此限中書省言故髙兖王妻韓越國太夫人李氏乞推恩門客進士周汝楫依楊備馬驤試監簿理選限出官例吏部言按元豐薦舉令門客因䕃補而授官者並不許參選新無殿中侍御史林旦言平江軍節度行軍司馬監南嶽廟張靚自陳罪犯乞送訴理所㸔詳按靚輙敢以真罪實犯累經勘正事狀文姦欺罔朝聽伏望罷所領嶽廟送吏部令授合入監當差遣從之張靚元係呂惠卿責官監察御史韓川言朝廷更市易之法捐减所收息數宿逋放釋殆盡自罷賖賣以來實用錢物交易日入過三百千收一分之息月得九百千又未必滿一分也慮貨之陳積但及五釐足以免罰則亦出之是月息纔四百五十千而倉務共占官六員專副書吏庫級等不減百人月給俸食幾千緡所收之息不補所費之半竊惟市易之設雖曰平均物直而其事則不免計較以取利使獲其利實足以佐用尚不可而又所收不補所費顧可為邪請於市易務監官監門内各留一員及實用公人催納欠負外結絶見在物貨畫日更不收買從之仍令戸部條析合措置事件以聞右正言王覿言臣聞糴甚貴傷人甚賤傷農古今之通患也故李悝耿夀昌為平糴常平之法以救其弊不惟當時人以為便而後世有賴焉神宗臨御之初柄臣建議廢常平舊法以散青苖錢縉紳之公論莫不以為非而主議者持之甚堅先帝聖明心知其故初雖重違之而至於數年之後乃奮然獨斷令常平錢斛存留一半遇斛斗價貴减市價出糶收成時添市價收糴此有以見先帝知常平舊法之不可廢也然青苖錢未遂全罷者以主議之大臣猶在附㑹者膠固其說未可以遽破而已今二聖臨御善政無不行弊事無不革宜有以成先帝之志矣今年閏二月九日勑應係提舉官錢穀委提㸃刑獄主管依舊常平倉法命下之日四方歎頌以陛下聖徳隆厚前古之良法先帝之素志信可以行之於今日矣曽未數月遽復更易而所謂青苖錢者方且著為新令以重其事物論深以為駭而莫知其故臣竊料議者不過曰青苖既不立額而取人情願坐而得息有利而無害云爾果如此議臣且言其不然也夫取便出息貧下無知之人所甚欲也初無故而得錢孰非情願迨乎收斂之際即須追呼督促脅以鞭笞威以枷錮而後本息可得也且又將新蓋舊積累太多則以逃亡自捐之虐及妻孥累及司保者相望於道路矣當太平無事之時而使其民無辜陷溺有至於此可不為之痛惜哉然則青苖之所謂利者果在於利民邪非民之所利則其説既見於前矣如曰利國則自古以來利不及民而國能獨利者未之有也必民利而後國利焉此惟常平舊法有之而非青苖錢之所能致也夫糴甚貴傷人甚賤傷農人傷則離散農傷則國貧乃必然之理也人果傷而離散矣區區青苖之錢能使之不離散乎農果傷而國貧矣𤨏𤨏二分之息能使之不貧乎故不若穀賤不至於傷農而民敦本民敦本則田野闢而賦稅增也穀貴不至於傷人則民樂業民樂業則百貨出而無求不得也夫如是則下何假於借貸之物而上何慕於二分之息故曰民利而後國利惟常平舊法有之而非青苖錢之所能致也臣竊惟先帝存留常平一半錢斛以行舊法誠務在於平穀價矣然今天下郡縣猶不免樂歲粒米狼戾價甚賤而不售凶年榖價騰踴民阻饑而死亡者何邪蓋郡縣之吏妄意朝廷之法惟急於為利故於青苖新令則競務力行於糶糴舊條則僅同虚設而又常平錢斛既分以為青苖之本則可充糶糴者自己不多是以穀價低昂而終未見其平也臣伏望朝廷罷散青苖錢依今年二月九日勑行舊常平倉法以成先帝之素志無使郡縣之吏以利心期朝廷而廢善法也惟聖慈詳酌蚤賜指揮施行貼黄稱先帝用大臣之議行青苖之法偶以一二言事臣僚所論過差常行降黜及行法數年之後左右前後之人及諸路監司守令等豈復有議青苖法者哉惟頌贊之言則日聞於前矣然先帝乃奮然不謀羣臣令常平存留一半錢斛以行糶糴舊法者蓋深知青苖錢之為弊而察糶糴舊法之為善也若其後臣僚有能將順乞盡罷青苖行常平舊法則先帝豈不聽從以存留一半錢斛之意而觀之可知也惟聖慈詳察覿自注云六月十八日乙巳左司諫王巖叟言臣昨十六日上殿奏事䝉陛下語及張璪臣力言璪邪巧多行私意不可以久在中書䝉陛下再三宣諭已盡知璪所為且留待除服後教去令休著文字臣便合恭禀睿㫖置不復言然靜而伏思臣任諫諍天下之事可諫諍者莫急於佞人在君側而不去孔子曰佞人殆殆者危也言佞人不去天下之危道也今佞人在陛下之側可不懼哉此臣之所以不敢自安而切切為陛下言也蓋其朝夕得以惑亂聖聽賊害政事黨庇姦惡讒譖善良將無所不至最腹心根本之大患也此而不諫更諫何事臣非不知今日不言上可以順承陛下之意下可以恱媚姦臣之心於臣之私甚為得計然臣安忍便臣之私而忘國家之便哉臣所以不避死亡之誅而犯逆鱗以告陛下必期陛下感悟早逐姦臣為社稷福也陛下又以璪嘗預受遺不欲責去臣謂陛下與其小不忍以容姦蠧傷家國曷若大有為而去佞光顯祖宗此則陛下之孝也豈可反以眷留欺罔先帝之人為奉承遺志惜大體哉可留而去之害義也可去而留之害政也若璪可為害政矣按璪奴事安石死交惠卿羽翼王珪之佞唱和章惇以倚其外强隂結誠一以資其外援惟一唱一和交縱詭隨協為䝉蔽賈百姓之怨以歸朝廷不聞一言忠於先帝謂陛下所宜憤疾肆諸市朝以雪先帝之恨不謂陛下反容而留之鬱天下之公議也兼其今日循黙保位惶恐畏罪猶或可容而敢乗間伺便為私不已以招人言致命令已出而復退法制既行而又改推其由來皆璪唱議恩則斂歸私室怨則移在朝廷又中書機要之地尤當謹嚴靜宻璪乃漏泄上㫖攘竊主恩習為常態每三省差除或方都堂商量或在簾前凖擬先請召其人靣自語之其美者則不以為出於人主而以為出於己其不美者則曰此非我意又或言事官言其黨人則立召至其第以章疏中語告之使得奔走經營彌縫於上下其背公向私㺯威福以賣朝廷乃敢如此豈可以為大臣處要地以腹心託之哉陛下未知則可既知而容之則姦臣將安於為私無復畏憚矣自古人君患在蔽惑不知其為姦邪而誤用之今陛下聰明洞徹幸深知其姦邪矣而猶用之不已此臣所以為陛下惜也皇帝陛下春秋方富太皇太后陛下不出房闥大臣尤當小心恭謹外不敢為姦以易朝廷内不忍懐私以欺陛下乃忠臣之義也觀璪之心乃幸兩宫聽政簾下而得以肆其姦行其私耳以謂宜以大不恭不忠論安可容而恕之邪陛下亦宜自固主權不可放與姦臣令侵侮也伏惟陛下即位以來無改更一事不協人情無進退一人不合公議求言若渇從諫如流何獨於璪靳靳如此也臣愚區區深恐累吾君全徳之美陛下亦何得不自惜此清明之政邪伏望聖慈早賜罷黜以為姦臣懐私事君之戒天下幸甚小貼子稱臣聞璪近曾留身獨對必有自營之言惑亂聖聽竊計或佯為求去以探陛下之情或推過於衆以寛陛下之意誣忠言為讒論反私意為公心詭辭百端以求安身固位而已願陛下深察之又稱陛下至聖至明照察人情無所不盡須體量臣等違陛下之情極是難事殆非大義所迫繫國家利害則臣等何敢不承順聖意故欲犯顔以取罪戾蓋國家之事有所未安而諫諍之職不敢自安也陛下以此察臣則臣之心宜可恕臣之言宜可取矣巖叟集自注云六月十九日上此丙午司馬光言臣近曾三次具劄子奏乞與執政赴延和殿進呈文字皆䝉聖慈遣中使封還云候秋涼雖聖恩矜憫隆厚無窮然臣既待罪宰相豈可不於簾前參陪國論况今已立秋兼臣自體當得筋力差勝於前可以支吾只是無人扶掖全拜起不得欲乞如臣前奏候垂簾日許令與諸執政赴延和殿常起居同進呈文字并乞降指揮令臣每遇殿上問聖體及謝恩等合拜之時特令免拜若在殿下常起居許令臣男康扶掖仍乞傳宣閤門每遇臣入朝許令臣男康隨入殿門從之丙午司馬光言請自今遇延和殿垂簾日赴起居奏事從之仍以足瘡詔許乗轎起居特免拜及令男康扶掖入殿此舊録所修也新録從舊尚書省言近有司奏差踏逐官吏短使不以閑劇倒置乞不拘常制至有直闕吏部擬差多非其人請自今除軍期邊防非常賊盜先有不拘常制並依舊例外其餘已得不拘常制指揮並罷自今並令依條奏舉應合差短使亦如之如違委御史臺彈奏從之左司諫王巖叟言臣竊以人得於表裹不疑則可任事出於上下相應則易成此諸府之辟召羣司之奏舉所以不可廢也自辟舉之法罷而用選格可以見功過而不可以見人材中外患之於是不得已而有踏逐奏差甲差之格踏逐者隂用舉官之實而明削同罪非善法也選才薦能而曰踏逐非雅名也必當擇人之地而不重用人之道非深計也委人以權而不容舉其所知非通術也臣伏望聖慈特賜指揮復内外官司舉官法以允公議巖叟所言附見於此當詳考左司諫王巖叟左正言朱光庭右司諫蘇轍右正言王覿等言臣等伏見近降朝㫖以臣寮上言呂惠卿罪惡責授惠卿中散大夫守光禄卿分司南京竊以執鯨鯢於漏網稍正邦刑蓄虎豹於近郊終貽後患謹案惠卿在熙寜中恣行不義創立弊法上以詿誤朝廷下以殘害海内計窮力詘黜居藩郡猶復妄希功賞輕用甲兵結怨西戎貽憂先帝罪狀顯白已不容誅至於私行險詖人所不為始與安石結刎頸之義終與王氏為㝷戈之仇忠義蔑然詭變難測今雖自知罪大不容於世然猶詐稱疾病濳伺間隙譬如蝮虵猛獸雖蹔爾弭伏而㐫性終在遇便即發若不深為圏檻投畀無人之境臣等恐其防閑稍緩竊出害人不然臣等豈不知降四官落一職為分司官在於常人不為輕典乎蓋以堯之四凶魯之少正卯既非常人不當復用常法治也况復陛下即位之初明下赦書戒敕邊吏不得侵擾外界務要靜守疆場是時惠卿任河東帥被遇先帝恩徳最深自聞遺制略無哀慼日夜㸃集兵馬為入界討蕩之計及其遷延未發恐為敵所覺知遂令兵馬司借赦書不得侵擾之文曉諭將佐以欵賊計仍於四月十五日具奏上件事由於二十一日出界夫登極赦書國之大信所以綏靖中國懐來四夷人臣奉行敢有輕議今惠卿公然違戾出師伐國而又借用其文設詐欺敵侮玩朝廷殊無忌憚推其心則出於無君論其罪則入於大不敬積其前後所犯皆在不赦朝廷縱欲貸而不誅只乞檢臣等前奏投之四裔以禦魑魅臣等與惠卿初無仇怨但以為國去凶義不可已惟陛下特賜裁斷王覿自注此奏云子由撰六月八日巖叟言惠卿用兵五月十九日六月八日轍言惠卿罪惡五月二十一日光庭言六月二日十六日覿言用兵丁未兵部言董戩果莊進奉大首領李沙勒瑪等各乞官職詔李沙勒瑪補充本族副軍主歲支角茶十斤大綵十疋餘並依元豐七年故例大首領已有軍制職名之人轉兩資其小首領各轉一資戊申吏部尚書孫永等議按商書兹予大享于先王爾祖其從與享之周官凡有功者名書於王之太常祭於大烝司勲詔之國朝祖宗以來皆以名臣侑食清廟歴選勲徳實難其人恭惟神宗皇帝以上聖之資恢累聖之業尊禮故老共圖大治輔相之臣有若司徒贈太尉謚文忠富弼秉心直亮操術閎逺歴事三世計安宗社熙寜初訪落眷遇特隆匪躬正色進退以道愛君之志雖沒不忘以配享神宗皇帝廟庭實為宜稱詔從之初議或欲以王安石或欲以吳充太常少卿鮮于侁曰勲徳第一惟富弼耳本朝舊制雖用二人宜如唐朝止用郭子儀故事只以弼一人配享議遂定吏部言欲將八路季闕從吏部與轉運司隨季互使從之政目同八年十月二十六日吕大防云云此年四月十八日詔又五年四月十八日吏部云云監察御史上官均言臣竊見吏部昨因大名府助教鄧無方等陳狀言八路指射勞逸不均事朝廷依本部相度將八路季闕吏部與轉運司互使竊縁昨自熙寜三年降八路差官敕推行已十五年大槩其弊有七諸路選人得替赴部須候春秋試法預選者方得差遣八路則不須試法隨意指射此不均之弊一也諸路赴部待試中否須經一年既差遣又須三年待闕必經七年方成一任八路則在任去替一年便許指射川峽廣南七年之間遂歴三任此不均之弊二也又八路在任犯罪停替或體量罷任並許再指射差遣而見在吏部待次之人至有歴任無過尚須試法候及一年方有注擬此不均之弊三也選人俸給替則隨罷待次一年方得差遣待闕三年方得赴任是四年之外方受廪禄其八路士人雖有待次亦許權攝差遣禄無虚日此不均之弊四也八路本土係特奏名得官人既免試法又就家便多只於本路指射大率多年六十以上學術凋疎精力疲耗又無人薦舉不復有向進意往往貪冒營私職事不舉民受其病其弊五也八路仕宦之人逺者十餘年近者六七年居住既久知識漸多又本土之人就本路指射鄰州比縣不無親故任情囑託變移曲直監司耳目豈能盡察其弊六也八路監司逺於京師傲睨一路無敢忤者逐路官員雖例許指射然運司往往任情差定不復計功過先後之次逐官既就本路仕宦豈敢更自辨直以觸恚怒故以曲佞希合稍有權勢者多得先次優便差遣而孤寒忤意之人坐引歲月不得注授其弊七也臣竊惟熙寜三年八路差官之意本因選人守任逺方有往來迓送之勞故立此法又省赴任選還雇錢之費然行之十有五年事久姦生弊多利少八路闕多而待闕之人少吏部闕少而待闕之人多見今選人到部該參選者七百餘人就殘零闕者共四百八十餘人員多闕少至有候一年以上方得差遣既得差遣待闕須近三年七年之間方成一任居閑之日多而禄仕之日少貧匱難進誠可嗟憫以八路方之實為僥倖雖曰惠逺官之人而諸路之仕者實為不便則是惠者少而病者多其法不得不改也今有司立法八路季闕吏部與運司互使是前日不均之弊其半尚存自餘弊事如臣之所陳未能去也竊聞按送雇錢以每歲通計數不甚多自可以坊場河渡錢支給不至闕事臣欲乞將八路選人依昨來指揮京朝官大小使臣員闕並歸吏部庶使天下仕者厚薄均一吏部差注不至壅併選人待闕不至留滯深為利便昨來指揮當考左正言朱光庭言累赦應編管覊管人州縣尚有拘留者乞委監司檢察致免稽滯從之詔登極大赦己前因虧少課利罰俸見今尅約未足者蠲之熙河蘭㑹路經畧司言旺羅什族蕃部斯多格等探報西界信實携老小前來歸順乞與推恩詔斯多格與副軍主鄂鄂爾與都虞候禮部言太原府交城縣民褚文自唐義聚九世二百餘年詔旌表門閭御史中丞劉摯殿中侍御史林旦監察御史韓川言臣等近者各劾奏吕惠卿罪乞賜誅竄伏聞已有指揮止於降官分司竊恐謫不當其罪國法不正人情不厭須至先事再有論列縁惠卿巨姦宿惡暴於天下方陛下御極之始憂恤深至此豈勤兵逺舉之時况赦書丁寜使之靜守疆場無得侵擾外界而惠卿無戴承陛下謹始息民之意於神宗棄天下月餘内興師二萬深入羌境屠殺老弱希功幸進借曰曾有奏禀已是廢違赦敕謀為擅興借曰赦後朝廷曾有可報亦是因其欺罔奏請則惠卿終是兵首矣致陛下即位詔命失信義於四夷則後日將何以令天下此臣等所以不得不言也夫惠卿㺯兵作威既已無人臣之禮則原心議罪所宜合天下之公案惠卿天資凶邪勇為不義怙勢以殖産造法以害民引置姦憸傾害良善興起犴獄以快私而報仇生事邊境以妄意而求合外則脅制州縣内則欺謾朝廷無毫髪報國之忠有桀驁無君之意臣等以其實跡前已歴言夫欲去惡草不抜其本根而徒芟薙之以平目前則他日必有滋蔓之害欲除惡獸不亟殺之而徒置於圏檻是使其養爪牙而積怨毒一旦分裂而出則噬人必矣今惠卿官為中散大夫守光禄卿就而起之何所不可異時復出臣等知衣冠之禍生靈之害有不可勝言矣非徒衣冠生靈而其患必及於朝廷此又臣等之所以區區而不能已也陛下比徳天地務在包覆然人臣之過有大小於其可赦而赦則謂之恕若置巨蠧而不問謂之養惡虞舜至仁也若共驩苖鯀不竄不殛縱其惡於天下何以循堯道而為至仁是以行之而無疑伏望稽考虞舜誅四凶之用心據惠卿罪狀去邪勿疑别賜誅竄以安天下貼黄稱惠卿智謀險薄天資嚚頑又朋黨布列中外根芽盤固今來制命若不明指姦惡以告天下必須怙終飾非騰起怨訟熙寜中挾勢殖産詔獄窮治姦贓已露一旦僥倖使有過之弟併當其責士大夫至今不平推其所為不可不虞也又貼黄稱今降官分司於惠卿都無所損是徒撩之使其中心怨憾益深異日患禍益大反不若不謫之為愈也元年六月二十二日奏此第二疏在十七日兩浙轉運使許懋為祕閣校理知福州己酉復汝州龍興鎮桂州永寜場為縣陜西路轉運司言請熙河蘭㑹路糴買糧草與經略司同共計置從之辛亥吕惠卿責授建寜軍節度副使本州安置不得簽書公事從諫官王巖叟等四人所奏也内批付三省云惠卿罪惡貫盈雖已施行而臺諫彈糾不已難居善地可竄逐一逺小處以允公議始惠卿責授光禄卿分司南京蘇州居住中書舎人范百禄草制有云朕承先帝大烈懼弗克勝而法獘不可以不更張民勞不可以不振徳稽其所自汝為厲階右僕射吕公著以手簡諭百禄云恐彰先帝之失宜刪去之百禄如公著所諭但以人言孔多為説及是中書舎人蘇軾草制曰凶人在位民不奠居司㓂失刑主有異論稍正滔天之罪永為垂世之規吕惠卿以斗筲之才挾穿窬之智諂事宰輔同升廟堂樂禍而貪功好兵而喜殺以聚斂為仁義以法律為詩書首建青苖次行助役均輸之政自同商賈手實之禍下及雞豚茍可蠧國以害民率皆攘臂而稱首先皇帝求賢如不及從善如轉圜始以帝堯之心姑試伯鯀終然孔子之聖不信宰予發其宿姦謫之輔郡尚宜改過稍畀重權復陳罔上之言繼有碭山之貶反覆教戒惡心不悛躁輕矯誣徳音猶在始與知已共其欺君喜則摩足以相歡怒則反目以相噬連起大獄發其私書黨與交攻幾半天下姦贓狼藉縱横江東至其復用之年始倡西戎之隙妄出新意變亂舊章力引狂生之謀馴致永樂之禍興言及此流涕何追迨予踐阼之初首發安邊之詔假我號令成汝詐謀不圖渙汗之文止為欵賊之具迷國不道從古罕聞尚寛兩觀之誅薄示三危之竄國有常典朕不敢私王巖叟朝論云十九日右司諫蘇子由首言吕惠卿罪惡二十一日左正言朱公掞繼之六月二日右正言王明叟得惠卿在太原擅興兵討蕩西界事甚詳論列之十七日愚繼焉十八日有命奪惠卿資政殿學士落四官以中散大夫守光禄卿分司南京二十日四諫官㑹於興國之戒壇列章再論罪大謫輕公議未厭乞重行誅竄二十日只於諫章後批出云吕惠卿罪惡貫盈雖已施行而諫官彈糾不已不可令處善地宜貶竄一逺小處以塞公議十八日告詞范子功行十九日門下進入畫可諫章上二十一日送連前告降出二十二日蘇子瞻行告二十三日進呈除建寜軍節度副使本州安置不得簽書本州公事議者方以為快政目云王巖叟等言惠卿責命未厭詔特責建寜節度副使本州安置詔諸將下遇大教弓弩槍刀摽牌野戰格鬬無給賞其排日教閱自依將法壬子前户部尚書李承之為樞宻直學士知青州政目無此詔府界三路保甲應色役除法該免教者遇冬教三丁以上之家正身赴以餘丁代役第四等以上兩丁戶非保正者役日權免新無交趾郡王李乾徳言下邑有勿陽勿惡二峒八縣與省壤接連前後被守土人叛去委身歸明其勿陽於丙辰年䝉收入省勿惡於壬戌年䝉收設通康隘雖此等彈丸之地尤切痛懐常不離夢寐者誠以先祖臣平昔誅擒僭逆衝艱冒險畢命之所致也今末造不能嗣承豈敢備數於藩垣偷生於頃刻也甲子年廣西經略司嘗為申奏先朝以宿桑二峒六縣賜臣主領按宿桑等見屬下邑非今兹陳請之地不敢拜命伏遇陛下一新宇内謹具表以聞詔答曰廼者邊臣言卿首領侵我疆陲先皇帝務在寛仁申頒詔諭俾從辨正亦既驗明特割康隘之區用示君恩之賜徳音如在詔墨猶新固宜追體包荒恪遵分畫何期累奏尚執前迷仍指新界之疆更為己物之舊無厭至此事上奚觀諒卿意之豈然殆人言之致惑况兹州峒久為王民自昨克復廣源之時以至給賜順州之日與彼田土本無交侵卿其務盡至誠祗循先詔益謹撫封之守勿從生事之謀勉副眷懐永綏寵禄仍令廣西經略使苗時中移牒折難大宗正司言右武衛大將軍康州團練使叔盎四次唐突已累放罪顯無畏憚詔叔盎特展二年磨勘詔陜西路轉運司收糴斛斗充縁邊五年之蓄元年二月二十九日三年四月六日紹聖元年十二月三日詔河北路監司分詣諸州以義倉常平穀賑濟被水闕食人戸禮部言應須索官物合日下應副及有㫖更不覆奏者行訖並乞奏審隨事降付三省樞宻院照據從之殿中侍御史林旦言臣昨論列賈種民罪犯猥惡資性傾邪刻薄乞罷駕部員外郎送吏部與合入差遣使累有過犯不經責罰之人少知懲戒久之朝廷方差種民權知臨江軍知臨江軍在五月二十八日種民通判資序就使未遂有司亦不當假以軍壘士論洶洶臣以朝命已行不欲再有論奏今聞改知通利軍殊不曉所以聞吕公著以臣前章曾語及增添御史臺案外情理八節誣陷蘇頌吕公著以此引嫌屢曾營赦不欲正其罪惡以致優假軍麾今來又移改近地臣之所言乃以公論為朝廷逐邪佞清流品不知吕公著何為屢引私嫌欲廢公議遂使種民夤縁僥倖再有陳請以便其私如此則無行小人但能誣罔執政不患不得美官善地不知如此施行有何義理伏乞聖慈特賜指揮檢㑹臣前奏早正種民於法不然且令速赴臨江軍本任免士論别有譏議邪佞略無懲誡不報初御史彈奏種民嘗持虛劵冒奪人産業又嘗寓夏伯孫家以乞假不如意鬬其兄弟諷令析居元豐中任大理官為蔡確鷹犬專中傷善良詔黜為通判已而吕公著靣奏曰方種民為獄官臣亦與被誣陷今臣方在相位而種民得罪恐所懲者小所損者大非所以示天下乃寢前命及退就殿廬批㫖門下侍郎韓維固執不肯書明日奏曰種民罪惡衆所共知奈何以吕公著故屈朝廷公議公著復為請乃有臨江之命於是又改通利軍實録載種民責漢陽軍在五月二十八日按六月八日乃復漢陽軍不應旬日前已差知軍據吕公著家傳初差知臨江非漢陽也今從家傳林旦章別本亦稱漢陽今并改之家傳又稱初黜種民通判而實録不載今附見傳又稱六月八日靣奏㝷自臨江改通利案實録六月二十八日乃復通利軍則二十八日以前不應便差知軍今附此事於未降詔時并改二十八日復通利軍為是月而不出其日庶不相牴牾御史中丞劉摯言准今年閏二月八日聖㫖内一項提舉官累年積蓄樁作常平倉錢物委提㸃刑獄主管依舊常平法臣伏詳常平財用既歸提刑司又言依舊法則自是合依熙寜以前提刑司所行常平糴糶之法事理分明續准四月二十八日勅命因中書省檢㑹遂將前項制㫖内依舊常平法指執以為青苖散斂取息之法申明行下命令反覆天下失望尋聞臣僚累有論奏其事利害臣不復詳言今來伏覩吕惠卿責降制詞有首建青苖之語夫以建議者為罪則是朝廷知青苖之不可為也茍知其不可為又坐首議之罪矣而獨安然行之此臣之所以未喻茍以為此法誠有利於天下則何故明於制詔坐以為蠧國害民之罪哉自青苖之議行而天下以聚斂疑聖㫖者將二十年矣幸而有閏月八日指揮行之未久遽已移奪今又幸而有惠卿責詞此亦足以知聖主哀念疲民未嘗輙忘於懐故因事輙見之詔令既明布天下不可重斂伏望深究利害特降睿㫖常平錢物並依閏月八日敕㫖仍申明敇内舊常平法為熙寜以前常平糴糶之法以幸天下以伸號令貼黄稱青苖之法可行則難指以為建議之罪知建議者可罪則青苖之法不當行二者不可並立也然二者之中是非易見伏望速罷青苖之法以解天下之疑慰萬民之望又貼黄稱臣固知國用亦或有頼於此然往者常平舊法以時之豐荒物之貴賤為糴糶之制若典領得其人出納給貸盡其法則非獨補凶歲平物價而已至於公家之利未必減於青苖鞭朴之所得也又貼黄稱雖云不抑勒召情願然民間以舊欠所逼每歲須至再請勢不得遂其情願也新陳相壓此民之所以困今若罷之則民間舊欠亦須寛作料限送納所貴易於了足摯奏所稱四月二十八日敕命實録並無有據王巖叟四月末奏亦止稱四月二十六日再立常平錢穀給斂出息之法蓋二十八日當作二十六日字或誤耳實録稱三省同建請摯稱中書檢㑹其實一也摯遺藁此奏以六月二十六日上今附本月日又一奏乃七月二十一日上是日二十六日壬子内出手詔付三省樞宻院曰向者朝廷講求法度務以寛厚愛民而搢紳之士往往不原朝廷本意速希功賞有誤使令或議法失當或掊斂毋節或姦囘附勢或講事飾非或多結權貴或力舉邊事殘民蠧物久益知弊致使羣言交攻不已茍無澄肅必紊紀綱止以其罪顯者廼行竄逐自餘干渉之人夙夜怵惕不無憂虞予當新政務存大體一切示以寛恩更不追劾咸使改過自新各安職業可倣此意作詔書布告中外
