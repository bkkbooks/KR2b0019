body:
  text: 續資治通鑑長編巻二百七十五宋李燾撰神宗熈寧九年五月丙辰朔詔邕州緣邊州峒來降首領宜多方存䘏無令失所時交賊已退溪峒首領儂廣琳等皆求效順故也上批付王中正茂州管下恭靜州等蕃部作過已剪滅其脅從蕃族如能悔過歸順令倍加存撫仍出牓曉諭諸路地接蠻夷州軍及外城寨應有合措置事逐路選委監司一員案視度其逐處城圍大小高低厚薄壕壍深淺濶狹幾處受敵緩急側近人户可與不可容其入保井泉足與不足汲用城壕淺深濶狹之處合與不合增展開浚如合興修即畫圖計工料當如何規度計置工夫幾年可畢樓櫓守禦之偹如合增置其材具於何處取用人夫於何處差發保甲土丁未經教閱緩急必難使如作畨次於廵檢縣尉下廵防因以勸習武藝有無不便仍節略開封界及五路見行保甲上畨條約令看詳器甲如不精利及有少數於要便州軍差官簡選以備移用或本處難得即於逐路都作院漸次製造今特行選委其逐官毋得以為常事鹵莽供報須親按視及體訪利害條析以聞令中書樞宻院看詳取㫖施行以接伴遼使主客員外郎朱温其知舒州先是遼使耶律孝淳問温其南蠻有何事温其曰南蠻為㓂已遣人討伐又問兵一二萬乎温其曰無止一二千爾又問誰為將曰郭逵趙卨以不豫禀朝廷故温其坐黜而以户部判官度支員外郎秘閣校理安燾代之丁巳遣權發遣淮西東路轉運副使寋周輔乗驛同蔡確鞫熈河路結糴違法官吏後遣周輔鞫華亭獄改差淮南西路轉運判官汪輔之代之日錄二十三日并十四日新差權發遣秦鳳路轉運判官孫逈乞令熈河路經畧司與提舉弓箭手司轉運司同選弓箭手可以代正兵乏人從之中書門下言給事中集賢殿修撰程師孟乞罷杭明州市舶司只就廣州市舶司一處抽解欲令師孟赴三司同共詳議利害以聞三司言今與師孟詳議廣州明州市舶利害先次刪立抽解條約詔恐逐州有未盡未便事件令更取索重詳定施行戊午宴遼使于崇政殿勾當皇城司内侍押班王中正罰銅三十斤坐狂人孫真衣紙衣夜越皇城登文德殿屋誦佛經為妖言故也真宿州民以心疾特杖脊配沙門島守衞兵級人輕重决杖經歴官吏兵級並令開封府劾罪御史蔡承禧言臣伏聞宿州百姓孫真夜踰宫墻至登文徳殿屋是夕繇内而外廵徼察視寂無所聞日上幾午乃聞誦經之聲衞士僅始登捕文德外朝秘省甚邇而守衞縱弛何以防閑事下府獄久矣未傅刑典外議或云皇城禁間皆在譴累欲緩月日以冀疎决釋放臣伏乞催促早令結絶其一行干繫人并皇城主管經由出入去處職掌守衞有官者先止朝謁悉屬以法不用疎决之原以嚴外防用肅宫省今若聖慈寛縱則宸居之嚴周廬之謹繇此侵慢漢家莽何之猝唐氏張韶之警可以深戒此宜長慮而又不以事微骫法者也承禧章附此要考孫真事希八年正月鄭俠書云云或即孫真事更詳之據林野史載孫真事甚備乃九年四月丙戌朔與鄭俠所言絶不相闗野史真作珍今附注此希野史云丙辰四月丙戌朔聞喜宴就坐酒方行一忽宣陳繹云早有人坐於文德殿脊又遶簷行誦經聲聞衞士始覺捕取之身衣破以紙補綴問其所來云宿州虹縣孫珍佛遣二青衣送我來衞士急以猪血灌之送于開封呼陳繹治之又云太后於内束門送長王上檐子遥見之乃自修城處入城從左藏庫厠屋而下以一瓦加厠墻驗之果然由左昇龍門㳂屋至文德云修城人不見我我亦自由心王使我來經由地分親事官凡追二百人入府以遼國母卒賀同天節使於紫宸殿朝辭告哀使未至未輟朝故不辭於崇政殿案上云宴遼使于崇政殿此條又云告哀使未至未輟朝故不辭于崇政殿宋史本紀未載且甲寅遼遣耶律孝淳來告喪既經成服發哀又輟視朝七日則是告哀之使已至此條云云未詳辛酉詔諸保甲可依新降隊法結隊并印新結隊圖付兵部每一都保給之一圖結隊之法三人為一小隊三小隊為一中隊五中隊為一大隊并引戰一人居前擁隊一人執刀居後傔二人居左右執旗一人居中凡五十人皆選士也有馬人與無馬人各為隊隊中兵械或純用一色或雜用弓弩刀斧槍楯皆於結隊時商定教習元豐三年末弓箭手隊法依此涇原路經畧司言百姓杜貴等盗西界馬二疋詔堡寨使臣及地分廵檢不能禁戢令經畧司劾之熈河路經畧司言蕃官趙思忠乞與李竒崖印信及洮西安撫司請以李竒崖為部落本族同廵檢勘㑹竒崖有功前已推恩詔自今蕃官有勞當旌奬並從經畧司保明聞奏毋得因藉首領保薦以立私恩河東路經畧司言北界人稱燕京日閱火砲令人於南界𣙜塲私買硫黄焰硝慮緣邊禁不宻乞重立告賞格於是審刑院大理寺申明舊條行之都提舉市易司言本司統轄抵當官錢然檢校庫自𨽻開封府若本庫留滯差失無緣檢舉乞撥屬本司其事關開封府即仍舊𨽻府其餘應干事務並歸本司統轄從之壬戌梓夔路察訪熊本言黔州義軍尤為得力若分屬兵官即與軍士争强弱不肯為用上令劄與茂州王中正王光祖癸亥知制誥熊本提舉太醫局大理寺丞單驤管勾太醫局後詔太醫局不𨽻太常寺專置提舉一員判局二員其判局選知醫事者為之每科置教授一員選翰林醫官以下及上等學生為之亦許本局察舉在外醫人素有名實者以聞願充學生者略試驗收補勿限員常以春試取合格者以三百人為額太學律學武學生諸營將士疾病輪差學生往治各給印紙令本學官及本營將校書其所診疾狀病愈及死經本局官抑或診言不可治即别差人往治候愈或死各書其狀以為功過歲終比較為三等上中書取㫖等第收補上等月給錢十五千毋過二十人中等十千毋過三十人下等五千毋過五十人其失多者本局量輕重行罰或勒出局其受軍營錢物以監臨彊乞取論其諸學病人願與者聽受毋得邀求中書時政記八日知制誥熊本提舉太醫局大理寺丞單驤管勾太醫局仍以舊司農寺充醫學公宇先是市易務具到賣藥名件中書奏欲移入太醫局改為醫學置官主判知醫事至是詔令止充太醫局更不𨽻太常寺專置官提舉故以今名命本等兼領並按實錄十四日所書又與此稍異當考舊紀云罷太醫局生立比較功過法每廂選醫生二人以治商旅窮獨被疾者與實錄所書略不同疑有脫誤當考新紀削去給本志云太醫局有丞有教授九科醫生額三百人月以祿分治國子監三學生及諸營卒并商賈窮獨被疾病者㑹其全失而定賞罰詔應减放兵級弓手教閱義勇保甲地分廵檢縣尉令審官西院三班院流内銓選差其不得力廵檢縣尉委提舉轉運常平司選官對移訖聞奏從樞宻院副都承㫖張誠一請也樞宻院言廣源州劉紀等昨雖隨交賊為㓂而紀等素有歸向朝廷之意但為交趾所驅廹無路自新兼累據諸處探報交趾但為自守之計將來王師所過紀等先當誅鋤詔郭逵趙卨遣人招諭紀等許令効順如即今未可投附但宻通誠欵俟大軍到出降當議申奏優與官爵田宅及金帛之賜又言廣南西路緣邊左右江州峒團結丁壯以􅊀攻討農耕及時人力不足詔兩江丁壯除老弱令農作其强壯並追集人日支糧二升錢二十於要害控扼處立寨柵分畨訓練武藝精者優賞與正兵合力􅊀禦其老弱如闕乏亦賑濟之六月三日王安石云云并四月十九日可考甲子荆湖南路轉運司言計置運錢穀應副廣西軍興實無人可和雇恐致闕誤見已牒潭衡等州依敇差雇人搬運詔具所差人夫每名地里脚錢以聞廣西經畧司言邕州下雷峒儂盛德常領丁壯固守隘路交賊遣人招誘不肯附賊乞與轉官酬奬詔儂盛德與三班借職丙寅詔復分兩浙為二路初從沈括分路之請不半載復合之於是復分明年五月復有詔合為一路盖以財賦不可分又已責監司分定廵歴諸州縣嵗遍故也初分在七年四月二十六日癸巳其年九月十二日丁未復合至九年五月十一日丙寅復分十年五月復合今附此丁卯詔茂州城令知成都府馮京相度乗兵勢修築仍差軍馬防托如有侵占蕃部地即買之戊辰熈河路經畧司言正月癸酉生戸隆吉卜等領兵圍郭莽寺蕃僧巴勒斯丹首領哲卜尊等率蕃兵拒却之獲十三級其得功蕃官蕃部皆新歸附之人而能自效如此乞推恩奬之詔賞格外逐等加賜帛十匹已而經畧司又奏得功人乞并補三班差使内巴勒斯丹充本族廵檢哲卜尊巴勒濟郢城同廵檢並從之癸酉正月十六日上言外方按吏多用私内臣李友詢買泗州塔下物計贓數亦已招伏乃因王古弟王愷買物不得言與沈括按之泗州通判買物至多反不問王安石曰陛下既聞此豈可不治曰不欲因内臣言安石曰人主以天下為體何内臣之辨但言有理則行言無實則治之可也欲召至中書取狀按問使其言信則足懲外姦使其言妄則治其妄言足懲左右之誕上許令取狀遂召問即具伏罪通判者雖常買物無違法上亦批出問得友訽如此不須更按治己巳提㸃淮南東路刑獄周約兼權發遣本路轉運司公事仍根究運河事以聞遣司農寺主簿郟亶往熈河路相度營田利害詔罷熟藥庫合藥所其應御前諸處取索藥等及所减吏人並𨽻合賣藥所仍改為太醫局此據實錄與八日所書事差不同當考根究公事所言參知政事呂惠卿弟温卿等託張若濟貸富民朱庠等六家錢四千緡於部内買田等事又御史中丞鄧綰言昨惠卿事敗罪惡上聞小則䜛慝私邪大則害政殃民欺天罔上以前代及祖宗之法處之當即時重誅逺竄然中外之議皆謂朝廷所以未即行者葢俟推究交結張若濟王利用事王利用華亭縣吏人此據熈寧十年正月二十七日時政記所載鄧綰章亦已見八年九月今聞惠卿黨人徐熈尹政等尹政葢三司吏人據中書時政記十年正月二十七日鄧綰章䟽可見庇䕶不究情實又全無體訪惠卿等其他罪惡中外失望嗟憤不平竊恐朋邪之計遂行營救之言漸進誤陛下流共放驩之舉重為聖政之累兼其弟温卿亦罪狀已明而久居一路按察和卿才兩考選人一無所能而張諤等詐欺以手實法保明改京官既妄冒事發亦未即追奪且賞罰天下公共朝廷必不以私姦欺負國之人然久稽施行未允中外之議且四凶象恭之誅豈須檢法兩觀偽辯之戮無事計贓今朝廷依違除姦去凶必俟吏議則舜之共工魯之少正卯可以肆行於今而無害矣乞先檢㑹惠卿詐妄諸罪早議誅責其餘出張若濟死罪等事自當根治温卿賈販庸下亦乞早責降追奪庶以消沮黨人慰塞公議中書時政記於十年正月二十七日載綰及承禧䟽極詳今但依實錄又御史蔡承禧言去歲中丞鄧綰言吕惠卿等以勢脅借華亭縣民湯倫等錢物結張若濟買田事臣言方澤穢行以惠卿薦得提舉官實錄及時政記并承禧奏議皆云方澤以王完得惠卿薦舉按承禧前章附八年八月十六日亦無王完姓名今並不取朝廷差官體量所差官雖欲掩覆而事皆有跡然勘司皆不研究情實致難論法若朝廷必以為本人悉已謫去餘事不須勘鞫此則惠卿兄弟等貪惡之跡塵穢天下而猶處衣冠或尚居宻近使指實無以沮勸四方也其惠卿妹壻殿中丞郭附為兩浙轉運司管勾公事事皆干渉乞先廢罷然後按劾或止責情各行屏廢以肅衆多詔淮南東路轉運副使蹇周輔往秀州置司推勘罷賛善大夫吕温卿河北東路轉運判官郭附送審官東院蔣靜作吕惠卿家傳云於是罷惠卿政事以本官知陳州又上猶降詔封示承禧章惠卿亦條析上之凡承禧所言二十有一條無一實者宗道等既究治田事無如綰承禧言者窮無自解則又上言禧為朋黨公然庇䕶乞併案之而惠卿弟温卿以賈販庸下尚居一路按察之任乞早賜降責初綰之言惠卿借錢買田也惠卿自辨無之而弟温卿居憂時嘗於秀州買田質貸於富人家亦既償矣惠卿方䕶䘮歸葬泉州初不與知也事既辨明當路者必欲害惠卿乃言雖已根究而干連人未麗於法當置勘有㫖温卿先次衝替而遣蹇周輔置勘於秀州御批除五月二十一日有罪官吏依法禁勘外其餘干渉百姓如昨根究所推究到事狀已是明白即不得更致滋彰追逮而上亦廷諭謂惠卿無一事既而中書降勑不用御批之語猶以勘惠卿為名而並坐綰承禧再言之章於前日導證左使得飜異無罪惠卿前後十四上章辨中書降􅎁之文與御批元差周輔意指不同乞罷遣周輔更置大吏與左右信臣取根究所奏牘詳考而蔽於上前周輔雖卒遣而朝廷不得已以為出勑差誤罰檢正官等而加遣李竦參治之自始根究至是歳餘逮繫千人而周輔酷吏吹毛洗垢無所不至卒不能以一毫私衊也按差李竦在六月七日罰檢正官在六月十三日權開封府界提㸃諸縣鎮公事蔡確言府界提舉司乞專差官一員更不令司農寺丞兼領從之同知太常禮院林希言伏見故事遣官朝拜諸陵宣祖太祖太宗三陵共遣官一員真宗及章獻章惠三后陵共遣官一員並以太常宗正卿充孝明皇后以下九陵别遣郎中或清望官二員分拜太常宗正卿或闕即以尚書省四品兩省五品以上或大卿監又闕即差以次官仁宗時獨永定陵輪差宗正寺及太常禮院官一員春秋朝享仍令㸃檢祠事以陵臺令陪位若非時祭告即止差朝臣自永昭永厚二陵復上之後審官院依諸陵例增差朝臣二員而已又凡陵官陳設執事之人並𨽻宗正寺及太常寺禮院逐時所差朝臣暫令統攝例多惰慢諸陵祭器多已損弊因循久不修完臣以謂方今永厚陵宜如先朝奉永定陵故事輪差宗正寺及太常禮院遍至諸陵㸃閱祠事有不如法案舉施行器服或有損壞移牒本陵修換行事日仍以陵臺令陪位若遇非時祭告則自如舊差朝臣以往又陵宫奉祀牙床祭器等祀畢但置於獻殿内暴露日久易致腐剝况諸陵宫門各有東西闕庭專藏牙床祭器遇行禮畢即收藏從之是日上謂王安石曰王韶疑卿廹之力求去恐復如吕惠卿韶幸無他冀後尚有可任使卿宜勉留之又言韶論事時不燭理然不忌能平直安石曰韶緩急足用誠亦豪傑之士王珪言昨緣馬城高遵裕事必不悅安石曰高遵裕害馬城既不見聽遂乞自引避城以為非我莫能守熈河朝廷竟移城江西若監司才守法便為方鎮傾害則國家紀綱敗壞矣此臣所以不敢阿韶所奏臣與韶無他陛下所知又熈河事臣始與聞開拓之議今所以治遵裕等正欲成就本議不貽國家後患而已他日韶又言于上以為熈河宜且靜候年歳不然有踈失臣豈免責上曰治作過官吏使來者不敢復然省浮費實邊備乃所以使熈河無疎失也安石曰今按作過官吏及浮浪之人於熈河安危何所繫若擾蕃部不撫結使嚮漢則熈河危若使犯法官吏知恐懼浮浪人不敢往乃所以靜熈河且人常言省靜省乃能靜煩而能靜難矣此據日錄五月十四日并二十三日所書略刪取之庚午召輔臣觀麥于後苑鄜延路經畧司言延州懷寧寨綏德城界西人侵占兩不耕生地乞移文宥州詰問其耕過地依舊存留永為界隔從之四月二十三日可參考辛未成都府路轉運司言鈐轄司己牓示有物力人户願以人丁隨官軍往茂州助討蕃賊者候事平日奏聞加賞上批蜀人既素不習武事所募必亦不多徒為張皇使人情驚動可速令止罷又批茂州已得安帖前募環慶兵可罷止令王中正募秦鳳兵以往時蔡延慶命范百常復與蕃部和􅊎故也茂州已得安帖罷環慶募兵此據御集復與蕃部和􅊎此據司馬光記聞今附見十六日御集乃十五日事王中正以四月三十日出門時已在道矣詔省兵部勾當公事官五員四月庚戌選留五員指揮可考壬申詔罷開封府界溝河司以其事𨽻都水監時以開治修濬漸成故省專官也詔安南諸軍過嶺有疾病寄留者令所寄州軍專選官管勾醫治提㸃刑獄往來提舉如能用心醫治痊損數多候師還日比較分數當議優奬癸酉中書言欲令三司支銀絹折算錢十五萬緡赴熈河路市糧草又言陜西諸處未搬交子本錢二十六萬二千餘緡欲就近支與秦鳳兩路轉運司糴軍糧仍令以今日後所鑄錢支充納換交子錢從之大理寺丞新差同提舉兩浙路常平等事王古提舉開封府界常平等事存此要見華亭獄事本末或削去此月十四日并二十一日可考兩浙路提㸃刑獄晁端彦潘良器並衝替待鞫於潤州初提舉常平韓正彦罷歸道遇體量安撫使沈括自首與端彦及轉運使張靚王庭老等違法赴杭州同天節豫教妓樂燕㑹靚庭老坐張若濟事已先罷而端彦良器有是命前提㸃刑獄陳睦令轉運司體量以御史中丞鄧綰言睦事連張若濟也是日上謂執政曰以耒耜養生以弧矢防患生民之道如此而已王安石曰天子敇諸侯稼穡匪懈如何新畬羣臣戒天子張皇六師無壞我高祖寡命克詰戎兵以陟禹之迹則生民所務誠如陛下所言而已然非眀於道術則不能役羣衆孰與成此功者上又論范仲淹欲修學校貢舉法乃教人以唐人賦體動靜交相養賦為法假使作得動靜交相養賦不知何用且法既不善即不獲施行復何所憾仲淹無學術故措置止如此而已安石曰仲淹天資明爽但多暇日故出人不遠其好廣名譽結遊士以為黨助甚壞風俗上曰所以好名譽止為識見無以勝流俗爾如唐太宗亦英主也乃學庾信為文此亦識見無以勝俗故也無以勝俗則反畏俗俗共稱一事為是而已無以揆知其為非則自然須從衆若有以揆其為非則衆不能奪其所見矣安石曰不易乎世大人之事故於乾卦言之上又論道必有法有妙道斯有妙法如釋氏所談妙道也則禪者其妙法也妙道不可以智知不可以識識然尚有法可以銓之則道之粗者固宜有法也安石曰陛下該極道術文章然未嘗以文辭奬人誠知華辭無補於治故也風俗雖未丕變然事於華辭者亦已衰矣此於治道風俗不為小補上因言讀經者須知所以緯之則為有用不然則不免為腐儒也新本云此一叚無所照據假神宗論答之語實寓安石之私以范仲淹好名敗壞風俗豈不惑後世並刪去今復存之後世亦安可惑也甲戌御史臺言大理寺前斷祕書監王端知鄭州日以倒死官柳木入已估贓絹二匹三丈五尺當除名勒停而法官元斷廽避詐匿不輸顯有不當端見年七十詔免除名勒停降授太常少卿致仕元斷官崔台符等各展二年磨勘八年三月七日初斷追一官與宫祠端本𫝊云端御下肅猾吏病之在鄭日同吏取枯柳供㸑御史劾其自盗坐奪一官丙子詔秀州推勘院除有罪官吏許禁勘其所連逮百姓推究事狀已明白令即時出之如與前所對辭異同並免罪新本刪去以為一時指揮今復存之十四日云云可考大理國貢方物詔中書淤田水利市易司計置澶定州北京軍糧令立法以聞戊寅知辰州皇城使陶弼以本官充康州團練使知邕州如京副使張述權發遣宜州時邕州新破遺民逃山谷不敢歸弼單騎從百餘人先入左江峒招諭民始翕然歸業因㸃集舊所籍丁壯得二萬七千餘人分三等以二萬𨽻諸將凡踏白開道及輦輜重皆峒丁也餘以自隨詔安南宣撫司於兩江團結彊壯日支食錢訓練武藝如米穀難運即兼以見錢銀絹如左江州峒先已順賊即多方招喚不從即相度討蕩若賊界州峒可宻結約及乗虛攻討亦從便施行仍速選兵募彊壯總及五六千人令兩江團結兵力相濟詔新知渭州龍圖閣直學士蔡延慶降授天章閣待制以不能措置茂州邊事也先是上謂王安石曰昨以御前劄子寛慰延慶彼無兵固宜敗衂且善撫存百姓勿令驚擾持重以待秦兵至乃攻賊安石曰陛下慰安延慶甚善延慶怯既敗軍又畏朝廷譴責必惶擾失度得陛下寛慰乃始有精神處事如延慶最知享上不敢有他其才不足無奈何雖責之何補人主最欲識人臣享與不享也此據日錄十八日事既而王中正欲自以茂州事為功監司皆附之因言延慶措置乖方遂有此命延慶須馮京到乃赴渭州此時猶在成都云據成都題名六月二十四日乃離成都巳卯以前桂州錄事參軍李時亮為供庫副使知亷州時亮嶺南人當改著作佐郎換武當為内殿承制知亷州但當改一官以廉州新為交賊所破特命之上言真宗時交趾可取乃失機㑹王安石曰儂善美内附交趾不敢堅索當是時乾德初立中外未附國人皆懼中國來討又言有畧賣在交趾者因隨賊至邕州得脫召問昨入冦六萬人衆内多婦女老弱略賣得脱者其主人一家六口五口來隨軍一口不能動故留前日蘇子元亦言一家八口七人來一人病不能行故留然則交趾舉國入㓂其國乃空無人也失此機㑹誠可惜安石又論茂州事既與蕃部打􅊎乃欲討之失信上以為然令説與軍前恐自今後失信外蕃無以復與之要約但令因兵勢措置軍前事安石曰甚善乗兵勢措置經久可以控扼制服蠻夷事則勝於討殺若拒我措置則討之不為失信如其不敢拒自不須討時蔡延慶已奏靜州下首領董珍巴等來降故也庚辰詔成都府利州路鈐轄司更相度所遣兵將本欲討蕩侵略蕃部既已打誓則難失信然乗此兵勢有合處置經久邊防利害如修築城寨開平險阻或遷出首惡之人使就城邑羈縻或令遣子為質亦足杜將來邊患如尚敢抗拒即可見其反覆之情就兵將在彼足以措置詔福建廣東湖南和糴配糴括糴指揮令提舉糧草司詳度如不須施行即一面指揮訖奏諸路軍糧有餘故也辛巳河東路體量程之才言河東和糴之法獨異諸路民間所輸一石纔及和市一斗之直乞以嵗給和糴之數减一分外以九分均入兩稅更不給和糴價錢中書言近奉詔檢前後言和糴文字立法河東和糴患在數多及貧富户所出不均若欲减數即須本路年計别有所出若欲均即須先體量見今不均次第當如何均定今欲令本路安撫監司提舉司同體量相度然後選官覆行相度立法取㫖從之詔淮南路常平司於二麥豐熟州軍及時兌糴出散不得積留以致陳壞提舉淮南常平等事王子京言提舉開修運鹽河自泰至如臯縣共一百七十餘里日役人夫二萬九千餘此據㑹要子京子韶弟八年九月二十六日呂惠卿家傳云云可考癸未西頭供奉官閤門祗候蘇子元為將作監丞令持服從其請也是月置岷州滔山監元豐元年十一月乙亥可考命判都水監程師孟兼權都大提舉京東西淤田師孟提舉淤田據食貨志特書之八月二十八日師盂建遣耿琬云云續資治通鑑長編巻二百七十五
