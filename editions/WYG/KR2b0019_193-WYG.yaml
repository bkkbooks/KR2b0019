body:
  text: 續資治通鑑長編巻一百八十九宋李燾撰仁宗嘉祐四年春正月丙申朔日有食之遣官祭社知制誥劉敞言臣前論先期避殿不中典未䝉省察今又聞遣官祭社稽之於經亦未見此禮葢社者上公之神羣隂之長故曰日食則伐皷于社所以責上公退羣隂今反祠而請之是屈天子之禮從諸侯之制抑陽扶隂降尊貶重此乃日之所由改變非承天戒尊朝廷之意也且禮者先王訓民事君不可不謹前事之失習俗未久茍爲因循則憲章廢矣惟陛下稽古正名審所施爲毋以禮假人也楊畋傳云嘉祐三年冬河北地震明年日食正旦畋復上䟽請早立皇嗣以答天戒按正史實録河北地震乃二年二月而三年冬無河北地震事今不取右正言呉及言日食者隂陽之戒在人事則臣陵君妻乘夫四方有不庭今大臣無姑息之政非所謂臣陵君失在陛下淵黙臨朝使隂邪未盡屏也后妃無權横之家非所謂妻乘夫失在左右親倖驕縱亡節也羗戎順服非所謂四方有不庭失在將帥非其人爲敵所輕也因言孫沔在并州苛暴不法燕飲無度龎籍前在并州輕動寡謀輒興堡寨屈野之衂爲國深耻沔卒坐此廢五月丙午當考丁酉羣臣表請御正殿復常膳不許三請乃許之自去年雨雪不止民飢寒死道路甚衆詔遣官分行京城視孤窮老病者人賜百錢小兒五十畿縣委令佐賑以糜粥知開封府歐陽修言三元放燈不由典禮葢自前世習俗所𫝊陛下俯徇衆心欲同民樂勉出臨幸非爲嬉遊若乃時嵗豐和人物康富以爲樂事亦是人情今自立春以来隂寒雨雪小民失業坊市寂寥寒凍之人死損不少薪炭食物其價増倍民憂凍餓何暇遨遊臣本府日閲公事内有投井投河不死之人皆稱因爲貧寒自求死所今日有一婦人凍死其夫尋亦自縊竊惟里巷之中失所之人何可勝數昨日聖恩差官俵錢正為如此目下陰雪未解假使便得晴明坊市不免泥淖聖駕所厯衝冒風寒况方以日蝕避殿減膳聖心憂畏中外所知欲乞特罷放燈所有常年酌獻之禮若至日未得晴和亦乞差大臣攝事見今供擬遊幸及修道路寒凍兵士並乞放罷庶幾上副陛下畏天憂民之心從之辛丑契丹使辭命宰相韓𤦺押燕於都亭驛以上未御殿也本紀云辛丑御正殿復常膳按此則未也當考固按復常膳御正殿宋史俱載辛丑日此云未御殿與本紀参差然是書丁酉日已載許羣臣表請御殿復膳矣則一書前後又矛盾也註亦未細檢壬寅賜在京諸軍班特支錢始賜孤窮老疾之民用錢千萬或言於上曰今百姓已受賜而不及諸軍諸軍其觖望矣故復有是賜凡用一億五千萬三司使張方平上所編驛劵則例賜名曰嘉祐驛令初内外文武官下至吏卒所給劵皆未定又或多少不同遂下樞宻院取舊例下三司掌劵司㑹萃多少而纂集之并取宣敇令文專為驛劵立文者附益刪改凡七十四條上中下三巻以頒行天下三年三月始編甲辰翰林學士胡宿權知貢舉太子中允天章閣侍講管勾太學胡瑗病不能朝戊午授太常博士致仕瑗歸海陵諸生與朝士祖餞東門外時以爲榮及卒詔賻其家集賢校理錢公輔率太學諸生百餘人即佛舎爲位哭又自陳師䘮給假二日巳酉祠部郎中崇文院檢討官吕公著爲天章閣侍講公著以疾辭乞改命直祕閣司馬光度支判官王安石不報觀文殿大學士左僕射陳執中屢以疾請老不許自亳州徙河南又徙曹州皆不行道京師稱篤乃賜告就第上遣使賜以名藥二月丁卯授陳執中司徒岐國公致仕遇大朝㑹許綴中書門下班出入如二府儀議者謂執中前惡杜衍一章遂從所乞富弼矯其失累表乃許之戊辰度支副使户部員外郎唐介爲天章閣待制知諫院介乞解言職見皇祐五年十月今復領言職足以表仁宗切於聽言故特書此其他不同此始命韓絳陳旭吕景初即三司置局議弛茶禁其十月三司言茶課緡錢嵗當二百四十四萬八千嘉祐二年才及一百二十八萬又募人入錢皆有虛數實爲八十六萬而三千九萬有竒是爲本錢才得子錢四十六萬九千而已其輦運之費䘮失與官吏兵夫廪給雜費又不與焉至於園户輸納侵擾日甚小民趨利犯法刑辟益蕃獲利至小爲弊甚大宜約至和之後一嵗之數以所得息錢均賦茶民恣其買賣所在收筭請遣官詢察利害以聞詔遣司封員外郎王靖等分行六路及還皆言如三司議便三司奏茶課嵗入數及遣使察六路利害本志在去年十月而實録不云今附見於此己巳詔曰古者山澤之利與民共之故民足於下而君裕於上國家無事刑法以清自唐建中始有茶禁上下規利埀二百年如聞比来爲患益甚民被誅求之困日惟咨嗟官受濫惡之入嵗以陳積私藏盗販犯者實繁嚴刑重誅情所不忍是於江湖之間幅員數千里爲䧟穽以害吾民也朕心惻然念此久矣間遣使者徃就問之而皆驩然願弛其禁嵗入之課以時上官一二近臣件析其狀朕猶若慊然又於嵗輸裁減其課使得饒阜以相為生剗去禁條俾通商利歴世之弊一旦以除著為經常弗復更制損上益下以休吾民尚慮喜於立異之人縁而為姦之黨妄陳奏議以惑官司必寘眀刑無或有貸初所遣官既議弛禁因以三司嵗課均賦茶户凡為緡錢六十八萬有竒使嵗輸縣官比輸茶時其出㡬倍朝廷難之為損其半嵗輸緡錢三十三萬八千有竒謂之租錢與諸路本錢悉儲以待邊糴自是唯臘茶禁如舊餘茶肆行天下矣五年三月末歐陽修劉敞云庚午廣南經略司言交阯冦欽州思禀管壬申降提㸃河北刑獄祠部郎中龎汝弼知華州坐甞知遂州補書工陳乂為傳神學究也癸酉詔吏部流内銓嘉祐二年同進士出身及諸科同出身並放選甲戌廣西安撫都監蕭注言交阯冦思禀古森貼浪等峒掠十九村人畜不可勝數欲下廣州截留進奉異獸人候取索人畜數足遣還本道茍不聽命即發兵深討詔本路安撫使蕭固轉運使宋咸提㸃刑獄李師中同蕭注處置乙亥詔三司以天下廣恵倉𨽻司農寺逐州選幕職曹官各一人專監毎嵗十月别差官檢視老弱疾病不能自給之人籍定姓名自次月一日給米一升㓜者半升毎三日一給至明年二月止有餘即量諸縣大小而均給之河東經略安撫使孫沔請廢府州西安靖化宣威清塞百勝中侯及麟州横戎神林恵寧肅定鎮川臨寨等十二堡寨使臣其兵馬糧草令旁近大寨畨遣人守䕶之復創麟州西裴家垣寨積糧草以應接麟州詔存府州中侯百勝清塞麟州鎮川寨餘從之丁丑工部郎中董沔爲刑部郎中沔嘗爲京西轉運使捕劇賊二十人特遷之置館閣編定書籍官以秘閣校理蔡抗陳襄集賢校理蘇頌館閣校勘陳繹分昭文史館集賢院祕閣書而編定之抗挺兄頌紳子繹開封人也初右正言祕閣校理呉及言祖宗更五代之弊設文館以待四方之士而卿相率由此進故號令風采不減漢唐近年用内臣監館閣書庫借出書籍亡失已多又簡編脱略書吏補寫不精非國家崇尚儒學之意請選館職三兩人分館閣人吏編寫書籍其私借出與借之者並以法坐之仍請求訪所遺之書乃命抗等仍不兼他局二年一代别用黄紙印寫正本以防蠧敗熙寧八年二月四日編校四館書畢巳卯詔如聞陜西民間多濫鑄大錢以至市易不通其以見行當三大銅錢大鐵錢並當小鐵錢之二本路官員巳支三月俸者即計其數貼支先是議者欲變大鐡錢當一提㸃刑獄祠部員外郎集賢校理陸詵言民間素重小銅錢而賤大鐡錢他日以一當三猶輕之今令與小錢均直則大錢必廢請以一當二則公私所損無㡬而商賈可以通行兼盗鑄計其物直無贏則必自止而陜西舊藏饒州大錢聞縁民間久不敢用今既無盗鑄則亦可以兼行四者皆便又言既更錢法前日民負官緡者法應如數追納望三分蠲其一詔悉行之此據陸詵傳自是盗鑄乃止然令數變兵民耗于資用類多咨怨久之始定此據本志丙戍減罷京東西路鄆齊等七州軍管界廵檢及駐泊兵士以知制誥劉敞之言而本路安撫轉運司相度以爲便也實録云置廵檢今從㑹要丁亥廣南西路轉運使屯田郎中宋咸上所注揚子及孔叢子賜三品服戊子降吏部郎中天章閣待制知隨州劉元瑜爲禮部員外郎知信州坐失舉也詔減諸路指使使臣皇祐元年敕十人者今留七人不及七人留四人四人留三人三人已下如舊庚寅詔禮部貢院進士曾經御試五舉諸科六舉進士省試六舉諸科七舉年五十以上者具名以聞癸巳御崇政殿試禮部奏名進士及明經諸科及特奏名進士諸科三月戊戍命翰林學士韓絳權知開封府陳旭天章閣待制唐介與三司減定民間科率以聞巳亥三司使吏部侍郎張方平爲端明殿學士兼龍圖閣學士尚書左丞知陳州先是京城富民劉保衡開酒場負官麴錢百餘萬三司遣吏督之保衡賣産以償方平因買其邸舎保衡得錢即輸官不復入家㑹保衡姑訟保衡非劉氏子亡頼豪縱壊劉氏産下吏按騐具對以實御史中丞包拯遂劾奏方平身主大計而乘勢賤買所監臨富民邸舎無廉耻不可處大位故命出守尋改知應天府端明殿學士兼翰林侍讀學士吏部侍郎集賢殿修撰宋祁爲三司使辛丑諫官呉及言執政之臣毎因遷拜奏所帶人吏數多以至補班行尚留私家給使請自今宰臣至樞宻使以上奏本㕔人吏五人樞宻使以下三人止陞名次無得過三人從之丁未御崇政殿賜進士鈆山劉輝等一百三十一人及第三十二人同出身諸科一百七十六人及第同出身特奏名進士諸科六十五人同出身及諸州文學長史授官如三年閏十二月詔書本紀云賜進士諸科及第同出身三百三十九人其數不合壬子徙知揚州馮京知廬州京前爲館職與劉保衡鄰居嘗以銀噐從保衡貸錢保衡無錢轉以銀噐質於人代之出息又嘗從保衡借什物以供家用獄辭連及之京宰相富弼壻也聞之自劾乞徙小郡故有是命實録云及京本傳並不載此今從司馬氏日記戊午翰林侍讀學士吏部郎中呂溱爲禮部郎中知舒州河北轉運使李参提㸃刑獄薛向劾溱前守真定甞令指使回易公用挾私物擅取官米麴造酒并違法過收餽贐也溱以母前卒舒州不欲徃改知和州巳未新三司使吏部侍郎宋祁爲端明殿學士翰林侍讀學士龍圖閣學士集賢殿修撰知鄭州右諫議大夫權御史中丞包拯爲樞宻直學士權三司使先是右司諫呉及言祁在定州不治縱家人貸公使錢數千緡及在蜀奢侈過度而拯亦言祁益部多游宴且其兄庠方執政不可任三司累論之不已庠因自言身處機宻弟總大計權任太重乞除祁外官故命祁出守而拯代居其位翰林學士歐陽修言臣聞治天下者在用人知先後而已用人之法各有所宜軍旅之士先材能朝廷之士先名節軍旅主成功惟恐其不趨賞而爭利其先材能而後名節者亦勢使之然也朝廷主教化風俗之薄厚治道之汙隆在乎用人而教化行於下也不能家至而諄諄諭之故常務尊名節之士者知廉耻修禮讓不利於茍得不牽於茍隨而惟義之所處白刃之威有所不避折枝之易有所不爲而惟義之所守其立於朝廷進退舉止皆可以爲天下法也其人至難得也至可重也爲士者當貴名節以重其身而君人者亦當全名節以養成善士伏見陛下近除包拯爲三司使命下之日外議諠然謂朝廷貪拯之材而不爲拯惜名節然猶冀拯能執節守義堅讓以避嫌疑而爲朝廷惜事體數日之間遽聞拯已受命是可惜也亦可嗟也拯性好剛天姿峭直然素少學問朝廷事體或有不思至如逐其人而代其位雖初無是心然見得不能思義此皆不足怪若乃嫌疑之迹常人皆知可避而拯豈獨不思哉昨聞拯在臺日甞自至中書詬責宰相指陳前三司使張方平過失怒宰相不早罷之既而臺中僚屬相繼論列方平由此罷去而以宋祁代之又聞拯亦曽彈奏宋祁過失自祁命出臺中僚屬又交章力言祁亦因此而罷而拯遂代其位此所謂蹊田奪牛豈得無過而整冠納履當避嫌疑者也如拯材能資望雖别加進用人豈間言其不可爲者惟三司使爾非惟自渉嫌疑其於朝廷所損不細臣請原其本末而言之國家自數十年來士君子務以恭謹進退爲賢及其弊也循黙茍且偷墮寛弛習成風俗不以爲非至於百職不修綱紀廢壊時方無事固未覺其害也一旦黠冦犯邊兵出無功而財用空虗公私困弊盗賊並起天下騷然天下感悟思革其弊進用三數大臣鋭意於更張矣於此之時始増置諫官之員以寵用言事之臣俾之舉職由是修紀綱而繩廢壊遂欲分别賢不肖進退材不材而久弊之俗驟見而駭因共指言事而非之或以爲好訐隂私或以爲公相傾陷或謂沽邀名譽或謂自圖進取羣言百端㡬惑上聽上賴陛下至明察見諸臣本忘身徇國非爲已利䜛間不入遂荷保全而中外之人久而亦漸爲信自是以來二十年間臺諫之選屢得讜言之士中間斥去姦邪屏絶權倖拾遺救失不可勝數是則納諫之善從古所難自陛下臨御以來實爲盛徳於朝廷補助之效不謂無功今中外習安上下己信纎邪之人凡所舉動毎畏言事之臣時政無巨細亦惟言事官是聽原其自始開發言路至於今日之成敗豈易致哉可不惜哉夫言人之過似激訐逐人之位似傾陷而言事之臣得以自明者惟無所利於其間爾而天下之人所以爲信者亦以其無所利焉今拯并逐二臣自居其位使將来姦佞者得以爲説而惑亂主聽今後言事者不爲人信而無以自明是則聖朝用諫之功一旦由拯而壊夫有所不取之謂廉有所不爲之謂耻近臣舉動人所儀法使拯於此時有所不取而不爲可以風天下以廉耻之節而拯取其所不宜取爲其所不宜爲豈惟自薄其身亦以開誘他時言事之臣傾人以覬倖相習而成風此之爲患豈謂小哉然拯所恃者惟以本無心爾夫無心者藏於中而人所不見迹者示於外而天下所瞻今拯欲自信其不見之心而外掩天下之迹是猶手探其物口云不欲雖欲自信人誰信之此臣所謂嫌疑之不可不避也况如拯者少有孝行聞於鄉里晚有直節著在朝廷但其學問不深思慮不熟而處之乖當其人亦可惜也伏望陛下别選材臣爲三司使而處拯他職置之京師使拯得避嫌疑之迹以解天下之惑而全拯之名節不勝幸甚臣叨塵侍從職號論思昔甞親見朝廷致諫之初甚難今又復見陛下用諫之效已著實不欲因拯而壊之者爲朝廷惜也䟽奏拯即家避命不許久之乃就職初王禹偁奏天下僧尼日滋月益不可卒去宜詔天下州軍凡僧百人得嵗度弟子一人久而自消之勢也詔從之至和初陳執中執政因乾元節聽僧五十人度弟子一人既而言者以爲不可復行舊制賈昌朝在北京奏京師僧寺多招納亡頼遊民爲弟子或藏匿亡命姦人自今乞皆取鄉貫保任方聽收納詔從之京師僧尼大以爲患至是有中㫖復令五十僧度一弟子及京師寺弟子不復更取保任僧徒大喜爭爲道場以答上恩此據日記當在三月丁已而實録無之按王禹偁所請亦不見於國史當考日記稱陳執中因南郊赦聽五十僧度一弟子按至和元年二月戊午有此指揮不縁南郊且至和凡二年並無南郊及降赦事日記誤矣今改之有上封者論義勇爲河北伏兵以爲古者兵農一體有事則集于戰陣無事散歸田里以時講習無待儲廪今河北義勇是也惜其束於列郡遺其大用而議者但以爲城守之備誠能於河北邢冀二州分東西兩路命二郡守臣分領義勇部署兩兵官爲鈐轄都監嵗以各季廵視兵噐閲習行陣萬一敵人猖狂入冦即兩路義勇之師翔進赴援傍出掩擊彼腹背受敵曷以枝梧如是則河北二十餘所常伏鋭兵敵之望我何恃而不懼哉朝廷下其章河北路帥臣等議時大名府李昭亮定州龎籍真定府錢明逸髙陽闗王贄等上議曰前代之制車乘甲卒皆賦於民四時蒐狩農隙講事行師臨敵振旅䇿勲皆布在方䇿兹事已逺且以唐言之澤潞留後李抱真籍户丁男三選其一農隙則分曹角射嵗終都試以示賞罰三年皆善射舉部内得勁卒二萬既無廪費府庫益實乃繕甲兵爲戰具遂雄視山東是時天下稱昭義歩兵冠於諸軍則近代之顯效而或者謂民兵秪可城守難備戰陣誠非通論也但當無事時便分義勇爲兩路置官統領以張用兵之勢外使敵人疑而生謀内亦揺動衆心恐非寓兵之術也姑令在所㸃集訓練三二年間武藝稍稍漸習行陣遇有警得將臣如抱真者統馭制其陣隊示以賞罰何戰之不可哉至於部分布列量敵應機遣用之地繫於臨時便宜亦難預圖况河北河東皆邊圉之地自置義勇州縣以時按閲耳目已熟行固無疑詔如所議嵗教閲以新舊籍并闕數聞此據本志不得其時按李昭亮以嘉祐元年十一月知大名五年二月徙定龎籍以嘉祐三年十月知定州錢明逸亦以嘉祐三年十月知真定獨王贄知瀛州在嘉祐四年二月今附四年春末夏四月丁卯詔以孟冬詣太廟行祫享之禮凡諸恩賜皆如親郊例戊辰封澶州安瀆祠龍女曰善利夫人詔諸路提㸃刑獄朝臣使臣並帶兼提舉河渠公事從判都水監呉中復請也壬申河中府言端明殿學士兼翰林侍讀學士龍圖閣學士户部侍郎集賢殿修撰李淑卒贈尚書右丞特贈黄金百兩淑警慧過人博習諸書詳練朝廷典故凡有沿革帝必咨訪在内外制作誥命頗爲時所稱其他詩賦碑記多裁取古語駢偶之務爲竒險僻奥能文者不之愛也既喜傾詖故屢爲言者所斥訖不得志抑鬱以死初著作佐郎何鬲以皇嗣未立上䟽請訪唐周苗裔備二王後下禮院議曰古者立二王後不爲繼絶兼取其名徳可法五代草創載祀不永文章制度一無可考上取唐室世數已逺於經不合惟周則我受禪之所自義不可廢宜訪求子孫如孔子後衍聖公授一京官爵以公號使専奉廟享嵗時存問賜之粟帛牲噐祭服毎遇時祀並從官給其廟宇亦加嚴飾如此則上不失先王尊徳繼絶之義度之於今簡而易行癸酉詔有司取柴氏譜系於諸房中推最長一人令嵗時親奉周祀如白身即與京主簿若爲班行者比類換文資仍封崇義公與河南府鄭州合入差遣給公田十頃専管勾陵廟應縁祭享禮料所須皆從官給如至知州資序即别與差遣却取以次近親襲爵授官永爲定式實録載何鬲䟽及禮院議其文甚多依本志只如此載王偁東都事略詔曰先王推紹天之序尚尊賢之義褒其後嗣賔以殊禮豈非聖人稽古報功之大典哉國家受命之元繼周而王雖民靈忻戴厯數允集而虞賔將遜徳美丕顯頃者推原本始褒及支庶恩則厚矣而義未稱時上采姚姒之舊略循周漢之典詳其世嫡優以公爵異其仕進之路申以土田之錫俾寢廟冇奉庶㡬乎春秋通三統之義厚先代之制矣其以柴氏最長一人封崇義公與河南鄭州差遣給公田十頃以奉周祀至知州資叙即别與差遣却取以次近親人襲爵永爲定式乙亥契丹國母遣右監門衛上將軍耶律偘起居郎知制誥王觀契丹遣彰聖軍節度使蕭拱崇禄卿馬堯咨来賀乾元節丙子吏部郎中天章閣待制何郯同知通進銀臺司兼門下封駮事時封駮職久廢郯上言本朝設此司實代給事中之職乞凖王曽王嗣宗故事凡有詔敕並由銀臺司從之癸未司徒致仕陳執中卒上幸其第臨奠贈太師兼侍中執中在中書八年人莫敢干以私四方問遺無及門者禮官韓維議其諡曰執中幸得以公卿子遭世承平因縁一時之言遂至貴顯皇祐之末天子以後宫之䘮問所以𦵏祭之禮執中位爲上相不能總率羣司考正儀典以承答天問如治䘮皇儀非嬪御之禮追册位號與宫闈有嫌建廟用樂踰祖宗舊制皆白而行之遂使聖朝大典著非禮之舉此不忠之大者閨門之内禮分不明夫人正室踈薄自絀庶妾賤人悍逸不制此又治家無足言者夫宰相者當秉道率禮以爲天子正身齊家以儀百官執中不務出此而方杜門深居謝絶賔客曰我不私也我不黨也豈不陋哉謹按諡法寵禄光大曰榮不勤成名曰靈執中出入將相以一品就第可謂寵禄光大矣得位行政不爲不逢而賢士大夫無述焉可謂不勤成名矣請諡曰榮靈判太常寺孫抃等議曰執中在先朝時爲小官以大本未立獨先羣論章聖皇帝覽䟽稱歎擢置諫列既合上意終受大禄屬今上聽政之始追章聖知臣之美志切圖任待以卿輔其制則曰一言爲萬世之福直道貫三代之行又曰納忠先帝有功朕躬自進陟宰相兼秉将鉞其勁正方重有大臣之風及居守伊洛懼筋力不能奉陵寢願易小郡迨乎晚節年甫七十即告還君事可謂終始不渝矣謹按諡法不解于位曰恭執中甞以公自處少私於人雖寵數益隆而夙夜是畏非不懈于位者乎請易名爲恭判尚書考功楊南仲覆議曰祖宗之有天下弟及而子世者再𫝊矣今上聖徳夙成天命固已有在羣下欲位分之蚤定而先帝晚年大臣重忤上意無敢言者執中時年少位下忠義感發一言而定東朝之位置生靈於大寧者四十年爲宋福祚其有窮哉故其遷拜甞以是而申於書賛者所以彰先帝知人之明而示無言不酬之義也自頃景徳休兵海内無事輔相之臣務將順上徳中外奏歌頌而已朝廷求直言而責言事官以循黙者詔書屢下而無其人執中獨以小官不溺時俗不諱用事之臣専爲國家慮時事陳宗廟大計以取上知致身兩府者二紀再爲相者出入八年其所選用爲不少矣死之日無感槩其私恩者其一於公不使士大夫知出其門也如此其諡曰恭固宜焉而助安社稷太常之議既首及之所以易其名者盍并舉乎謹按諡法曰因事有功曰襄請諡曰恭襄詔諡曰恭維累疏論列以謂責難於君謂之恭臣之議執中政以其不恭因乞罷禮官不報既而上又爲執中篆其墓碑曰褒忠執中嬖妾張氏驕恣毎凌蔑其妻謝氏執中既死之五日謝氏具奏乞度爲尼詔許之即柩側髠送城南資聖院賜名勤省莫不稱快此據江氏雜志及司馬光記聞巳丑後宫董氏生皇第九女董氏開封人四嵗入宫稍長爲御侍性和厚喜讀國史能道本朝典故侍帝左右未甞有過失皇祐中封聞喜縣君帝甞感疾恍惚夜持寳刀自鄉董氏在側遽前爭得之㡬至斷指寳刀自鄉此據正傳不知何時當是嘉祐之初也翰林學士胡宿言開寳六年太宗封晉王淳化五年真宗封壽王乃升壽爲大國在晉國之下景徳三年詔書壽宋梁趙四國自今更不以封而晉又不在禁封之科至道中郊祀覃恩魏仁浦追封晉王冦凖嘗曰晉是陛下藩邸舊封今以爲贈典非所宜乾興元年乃封丁謂爲晉公葢有司過也昔陛下建國於昇猶列次國非所以重始封之地宜進昇爲大國而與晉皆無得封從之辛卯詔曰居室噐用冠服妾媵葢有常制所以别貴賤杜奢僭也比者流風蕩靡無復等威犯干有司鮮聞用法自今中外臣庶有違者其察舉之必罰毋貸從監察御史裏行沈起所言也王偁東都事略其令中外各遵守前後詔條違者御史臺及開封府糾察以聞諸路即委轉運使提㸃刑獄及長吏如詔施行壬辰御崇政殿録繫囚雜犯死罪以下遞降一等徒以下釋之知制誥劉敞言疏决在京繫囚雖恩出一時然在外羣情皆云聖意以皇女生故施此慶澤恐非王之令典也去年閏月已曽減降尚未半年復行此恩稱民之多幸則於國不幸一嵗再赦好人喑啞前世君賢臣論此詳矣雖成事不説臣願朝廷戒之又聞多作金銀犀象玉石琥珀玳瑁檀香等錢及鑄金銀爲花果賜予臣下自宰相臺諫皆受此賜臣謂無益之費無名之賞殆無甚於此若欲夸示奢麗爲世俗之觀則可矣非所以軌物訓儉也宰相臺諫以道徳輔主爲職柰何空受此賜曾無一言然遂事不諫臣願朝廷戒之伏惟皇天祐聖徳故後宫有多子之祥陛下當明審政令深執恭儉以答上天之貺建無疆之基不宜行姑息之恩以損政體出浮冗之費以墮儉徳臣雖鄙賤竊獨惜此故敢觸冒陳聞惟賜裁幸五月戊午周氏又生女江休復雜志云公主誕慶三日宰臣以下包子有金銀玳瑁犀角檀香象牙錢三舎人獨二人權修注得之四待制三講筵得之劉敞何郯不與向侍郎亦不霑臺中自獨坐至監察一等受賜館中惟呉及正言得之葢内官懼臺諫也五月乙未以御侍聞喜縣君董氏爲貴人其父安始𨽻禁衛即除内殿崇班戊戌詔曰君臣同徳以成天下之務而過設禁防疑以私慝非朕意也舊制兩制臣僚不許詣執政私第執政甞所薦舉不得爲御史其悉除之始用包拯議也巳亥工部郎中天章閣待制李昭遘卒上以昭遘母老特賜絹百疋庚子詔入内侍省内臣員多其權住進養子入内始用呉及議也㑹要以爲從翰林學士韓絳之奏須更詳考治平元年十一月十七日始有㫖聖節南郊許奏薦知常州度支員外郎集賢校理沈康權管勾南京留司御史臺時言者以康爲不才康遂自請營葬里中因許之辛丑屯田員外郎通判安州安保衡責授昭化軍節度副使監髙郵軍酒税以御史知雜事呉中復言保衡訴其父取雜户任氏奏授邑號其父死時保衡尚㓜及今三十年豈無保養之恩此人情之所不忍請行廢黜也丙午徙知并州觀文殿學士禮部侍郎孫沔知壽州時御史中丞韓絳監察御史沈起言沔守杭及并所爲多不法諫官康介呉及繼有論奏詔兩路轉運使提㸃刑獄司體量未報先徙之初􅄁知政事王堯臣死帝問沔所在欲召用而未果樞宻使田况病帝復屬意沔言者遂力攻罷之此據王珪畢仲游所作碑誌辛亥詔諸路同提㸃刑獄及府界同提㸃刑獄並選歴任無贓私及不曽出入人罪有舉主五人并轉大使臣後經三任親者爲之其知軍州歴路都監一任以上毋得差其當差者仍先與小處知軍壬子遣都官員外郎髙訪標定河北牧馬地其餘募民耕佃之度支判官祠部員外郎王安石累除館職並辭不受中書門下具以聞詔令直集賢院安石猶累辭乃拜樞宻使禮部侍郎田况暴中風瘖久在病告十上章求去位丙辰罷爲尚書右丞觀文殿學士兼翰林侍讀學士提舉景靈宫故事樞宻使出入皆降麻自皇祐五年髙若訥罷始舎人院降制今復失之丁巳詔淮南東路揚州西路廬州江南東路江寧府西路洪州湖南路潭州浙東路越州福建路福州並兼本路兵馬鈐轄就置禁軍駐泊禁軍三指揮越州福州置禁軍二指揮其新招禁軍以威果爲額請受如宣毅例毎指揮毋得過四百人逐路選甞歴任武臣二員爲兵馬都監浙東福建路一員並置公廨於本州以専訓練毋得差出若招置不足聽揀本路廂軍填之知福州燕度言閩故多盗請少假事權經制一路遂加兵馬鈐轄此據度本傳恐縁度建請遂遍及他路也當考戊午後宫周氏生皇第十女初董氏及周氏有娠内外皆冀其生皇子内侍省多具金帛噐皿雜物以備賜予所費不可勝紀又修潜龍宫潜龍宫者真宗爲開封府尹時廨舎也既而皆生皇女其賜予之數猶數倍於兖國公主出降時監察御史裏行沈起言乞今後河北陜西等處擇人充走馬承受免使勞擾州郡詔令逐路管經略軍馬廵檢等司今後走馬承受得替令逐州軍保明無違越事件以聞方得酬奬㑹要五月二十五日今附月末祠部郎中吕公孺自户部判官出爲京西轉運使御史中丞韓絳言公孺父夷簡執政日公孺兄公綽受四方賂遺徃徃爲公孺恐喝奪之又與公綽女姦不可以任監司六月癸亥朔降公孺知安州公孺自訟為絳所誣乞置獄考實詔不許趣令之官六月按五月自乙未至乙丑已三十一日則此為六月矣下巻即接七月此處顯係脱簡今増乙丑詔應乞墳寺名額非親王長公主及見任中書樞宻院并入内内侍省都知押班毋得施行丁夘以御侍安定郡君周氏為美人自温成之沒後宫得幸者凡十人謂之十閤周氏董氏及温成之妺皆與焉周董既以生皇女進秩諸閤皆求遷改詔中書出敕誥中書以其無名覆奏罷之求者不已乃皆以手詔授焉温成之妹獨固辭不受初進才人加賜銀五千両金五百兩固辭不受上曰鄉也月俸二萬七千今也二十萬何苦而辭退對曰二萬七千妾用之已有餘何以二十萬為卒辭之同知諫院范師道上疏云禮以制情義以奪愛常人之所難惟聰明睿哲之主然後能之近以宫人數多出之此盛德事也然而事有繫風化治亂之大而末以留意者臣敢為陛下言之竊聞諸閤女御以周董育公主御寳白制並爲才人不自出中書誥而掖庭覬覦遷拜者甚多周董之遷可矣女御何名而遷乎才人品秩既髙古有定員唐制止七人而已祖宗朝宫闈給侍不過二三百居五品之列者無㡬若使諸閤皆遷則不復更有員數矣外人不能詳知止謂陛下於寵幸太過恩澤不節爾夫婦人女子與小人之性同寵幸太過則瀆慢之心生恩澤不節則無厭之怨起御之不可不以其道也且用度太煩需索太廣一才人之俸月直中户百家之賦嵗時賜予不在焉况誥命之出不自有司豈盛時之事耶恐斜封墨敕復見於今日矣師道䟽附此當在己卯出宫人後戊辰光禄卿直祕閣同判宗正寺趙良規言父昭子穆祀典所先宗徳祖功王業之本國家承百年之運崇七世之靈追孝不爲不嚴奉先不爲不至然而祭祀之秩舉間以公卿而攝行雖神主有合食之名而太祖虛東嚮之位且號爲大祭所以萃羣廟之神要之至公豈可昧正統之緒伏請博詔多士講求定儀爲一代不刋之法乃下太常禮院議而言曰切尋歴代典故由漢而下立廟制祭與三代不同至於尊東向之位先儒議論非一縁宗廟事重非有司所敢専決乃詔待制已上及臺諫官同議而觀文殿學士禮部尚書王舉正等議曰大祫之祭所以合昭穆尊卑必以受命之祖居東向之位本朝太祖實爲受命之君然僖祖以降四廟在上故毎遇大祫止列昭穆而虛東向魏晉以来亦用此禮今親享之盛謂宜如舊爲便詔恭依己巳宰臣富弼等請加尊號曰大仁至治詔不許故事毎三嵗躬行大禮畢輒受羣臣所加尊號自康定以来罷之至是執政復舉故事以請知諫院范師道言比災異數出而崇尚虛文非所以答天戒范師道言據司馬光記聞知制誥劉敞言尊號非古也陛下尊號既云體天法道欽文聰武聖神孝徳盡善極美矣復加大仁不足増光而曰至治則有若自矜且今天下未可謂至治也陛下不受徽號二十年柰何一旦増虛名而損實徳上曰朕意亦謂如此故弼表五上卒不許敞時兼領禮部名表當撰表辭先勸弼以不宜爾弼憮然曰適已奏聞乃是上意欲爾不可止也敞不得已爲撰五表仍宻奏三䟽罷之遣司封員外郎朱處約督江南西路兵討䖍州鹽賊戴小八等聚黨攻剽殺䖍化知縣趙樞故也太子中允王陶大理許事趙彦若國子博學傅卞於潜縣令孫洙並爲館閣編校書籍官館閣編校書籍自此始三館祕閣凡八員詔及二年者選人京官除館閣校勘朝官除校理陶萬年人卞莒人洙廣陵人也彦若已見應制時毎館各二員此據㑹要㑹要有太常博士陳洙姓名而實録無之按本志云又選京朝官州縣官四人編校所稱四人葢王趙傅孫也今依實録不書陳洙㑹要傅卞除編校在八月十八日癸酉詔諸路安撫轉運提㸃刑獄各於所部舉見任文資行實敦樸而有政事之才可備升擢者三人前兩府臣僚許通舉内外官其已帶職及見任兩府與自已親戚毋得舉丁丑詔諸路轉運使凡隣路隣州災傷而輒閉糴者以違制坐之初諫官呉及言春秋之時諸侯相傾竊地專封固不以天下生靈爲憂然猶同盟之國有救患分災之義凡外災則不書莊公十一年書宋大水昭公十八年書宋衞陳鄭災皆外災也所以書者是承赴告之辭而患難相恤之謂也又莊公二十八年臧孫辰告糴于齊魯語之文以鬯圭玉磬如齊告糴曰不腆先君之敝噐敢告滯積以舒執事齊人歸其玉而與之糴僖公十五年晉侯及秦伯戰于韓獲晉侯𫝊云晉飢秦輸之粟秦飢晉閉之糴故秦伯伐晉諸侯無稱獲之例而經書曰獲晉侯貶絶之也戰國之世王道如線不絶一有閉糴而春秋誅之陛下恩施動植視人如傷然州郡之間官司各專其民擅造閉糴之令一路飢則隣路爲之閉糴一郡飢則隣郡爲之閉糴夫二千石以上所宜同國休戚而班布主恩坐視流離又甚於春秋之時豈聖朝所以子育兆民之意哉故有是詔戊寅賜築新舊京城役卒緡錢是夕月食㡬盡巳卯放宫人二百一十四人修隂教以應天變也按司馬氏日記云六月巳卯以去夜月食出宫女百餘人以應天變修隂教而實録乃於辛卯日書此事恐誤也今從日記甲申賜沿黄河諸埽役卒衫袴若願給錢者人五百乙酉詔入内内侍省自今選内臣年五十以上無過犯者勾當内中諸閤分巳丑省内牛羊司西北棧圏官四員天僖四年六月可考文思副使内侍押班甘昭吉爲内侍右副都知昭吉開封人初以内殿崇班爲京東路都廵檢齊州武衛小校馮坦率營卒二百突入州聽事欲爲變昭吉單騎馳徃戒所從將士操兵在外先獨見亂卒諭以禍福令推首惡自贖衆疑沮不敢動已而操兵者皆入即共執十餘人告曰此誘我者也昭吉立殺之縱其餘去州以無事特遷供備庫副使帶御噐械後内侍押班闕上記前功特以授之於是又遷副都知昭吉初爲押班獨不記月日今附此
