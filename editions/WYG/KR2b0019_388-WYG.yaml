body:
  text: 續資治通鑑長編巻三百八十四宋李燾撰哲宗元祐元年八月丁亥刑部言寶文閣待制章衡知真定府衡以罪落職法當檢舉詔更候二期取㫖吏部尚書孫永言故天章閣待制周孟陽事英宗藩邸神宗朝嘗為侍從死京師貧不能歸葬一子定民進士出身至不時調官詔以人船還其喪至揚州敕本州量事應副又令吏部先次注定民本州合入官詔今後蕃官不許充漢官差遣先是河東路提刑兼權管勾經略司公事范予諒言國朝置蕃官必於沿邊控扼之地賜以土田使自營處官資雖髙見漢官用堦墀禮所任不過本部廵檢之類平居無事氣志懾服故緩急之際易為驅䇿近歲蕃官有換授漢官而任内地次邊去處甚者擢為將副與漢官相見均禮於事體未順故有是詔范純粹先有此奏當考司馬光劄子勘㑹常平倉法以豐歲穀賤傷農故官中比在市添價收糴使蓄積之家無由抑塞農夫須令賤糶凶歲穀貴傷民故官中比在市減價出糶使蓄積之家無由邀勒貧民須令貴糴物價常平公私兩利此乃三代之良法也曏者有因州縣闕常平糴本錢雖遇豐嵗無錢收糴又有官吏怠慢厭糴糶之煩雖遇豐歲不肯收糴又有官吏不察知在市斛斗實價只信慿行人與蓄積之家通同作弊當收成之初農夫要錢急糶之時故意小估價例令官中收糴不得盡入蓄積之家直至過時蓄積之家倉廪盈滿方始頓添價例中糶入官是以農夫糶穀止得賤價官中糴穀常用貴價厚利皆歸蓄積之家又有官吏雖欲趂時收糴而縣申州州申提㸃刑獄提㸃刑獄申司農寺取候指揮比至囘報動渉累月已是失時穀價倍貴是致州縣常平倉斛斗有經隔多年在市價例終不及元糴之價出糶不行堆積腐爛者此乃法因人壞非法之不善也熈寧之初執政以舊常平法為不善更將糴本作青苗錢散與人户令出息二分置提舉官以督之豐歲則農夫糶穀十不得四五之價凶年則屠牛賣肉伐桑賣薪以輸錢於官錢貨愈重穀直愈輕朝廷深知其弊故罷提舉官令將累年蓄積錢穀財物盡樁作常平倉錢物委提㸃刑獄交割主管依舊常平倉法施行今歲諸路除有水災州軍外其餘豐熟處多今欲特降指揮下諸路提㸃刑獄司乗有此糴本之時委豐熟州縣官員體察在市斛斗實價多添錢數廣行收糴如闕少倉厫之處以常平倉錢添蓋仍令少糴麥豆多糴穀米其南方及川界卑濕之地有斛斗難以乆貯者即委提㸃刑獄相度逐州縣合銷數目抛降收糴纔候將來在市物貨價比元糴價稍増即行出糶不得令積壓損壞仍令州縣各勒行人將十年以來在市斛斗價例比較立定貴賤酌中價例然後將逐色價分為三等自㡬錢至㡬錢為中等價錢㡬錢以上為上等價錢㡬錢以下為下等價錢令逐處臨時斟酌加減務在合宜既約定三年價仰自今後州縣每遇豐歲斛斗價賤至下等之時即比市價相度添錢開場收糴凶年斛斗價貴至上等之時即比市價相度減錢開場出糶若在市見價只在中等之内即不糴糶更不申取本州及上司指揮免有稽滯失時之患仍委提㸃刑獄常平提舉覺察若州縣斛斗價及下等而不收糴價及上等而不出糶及收貯不如法變轉不以時致有損壞并監官不逐日入場致壅滯糶糴人户並取勘施行若州縣長吏及監官能用心及時糴糶至得替時酌中價錢與斛斗通行比折與初到任時増剰及十分中一分以上許批書上歴子候到吏部日與升半年名次及二分以上許指射家便差遣一次所貴官吏各各用心州縣皆有儲蓄雖遇荐饑民無菜色又得官中所積之錢稍稍散在民間可使物貨流通其河北州縣有糴便司斛斗見多縁邊州縣轉運司見糴軍糧處更不糴常平倉斛斗若今來指揮内有未盡未便事件委提㸃刑獄司逐旋擘畫申奏施行從之其後王巖叟言臣伏覩昨降朝㫖文雖詳而未通四方來者更言其未便臣按常平舊法但遇年豐物賤即於市價上添錢收糴如年儉物貴即相度在市實直價例特減錢出糶此所以為常平今既限以價賤至下等方許收糴價貴至上等始得出糶乃是必待豐歉十分而後行法稍不及等即官司拘文束手坐視而不敢糶糴臣恐乆之天下救災之備寡而傷農之患深失常平本意逺矣臣乞依舊法不分立三等仍更不申取本州及上司指揮外餘約束新降朝㫖別行修定頒降貼黄稱朝廷近遣官淮南賑濟已降指揮雖係十年中價或比常平價稍髙亦權收糴即見三等之法未便兼訪聞諸路州縣自被㫖後來徃徃不敢施行伏望詳酌速賜指揮王巖叟論奏不得其時附見俟考遣官淮南賑濟可考其時也七月二十九日蘇轍論淮南災傷十一月二十八日十二月十八日巖叟又論災傷七分已上方許貸穀第四等以下方免出息非是户部尚書李常建言伏見見今常平坊場免役積剰錢共五千餘萬貫散在天下州縣貫朽不用利不及物竊縁泉貨流通乃有所濟平民作業常苦幣重方夏蠶畢工秋稼初斂絲帛米粟充滿㕓市而坐賈畜家巧以賤價取之曾不足以酬其終歲之勤而未免飢寒之患良可愍也臣愚欲乞命有司議於天下州縣各置平糴一司以選人領之縣欲令主簿兼管倣古常平糶糴之法於夏蠶秋稼之時就其直賤也加數分而斂之及其價騰也裁數分而出之但無虧兊價靡求贏息無事酬賞惟以利農桑之民為務庶乎貨泉流通四海蒙福三代之仁澤也貼黄稱臣今所謂雖與前日置常平司名同而實異常平平糴之法古者所以利農桑佐貧弱盖志䘏下而利人則為良法志在於斂財而害人則為惡政今積錢至五千萬貫而坐視農夫紅女賤易穀帛而未免飢寒殆非仁術也又稱方其糴買時雖加以數分其價終賤及糶賣日雖減至數分其價終貴然則設官一員置吏數人以其贏餘足以贍給而不耗縣官之經費又於吏部可増闕數百處因以消積滯冗員又稱今除見錢外見在穀帛復有二千八百餘萬石疋等如朝廷未欲盡支動見錢且以一千萬貫兼此穀帛等置司亦可以施行不報李常乞置平糴司據本集附見司馬光三等糴價後既無施行雖不載亦可然要知當日所管常平錢帛數須具存之御史中丞劉摯言舊例舉官皆有定員惟京朝官大小使臣陞陟每歲不限其數請應在京臣僚依外路比類限定員數詔吏部立法以聞刑部言大理卿王孝先奏吏部考功因京朝官選人大小使臣磨勘并闕陞或注授差遣㑹問本寺有無過犯公案在寺如係笞杖已該恩去官及舉覺自首原免者欲乞並不作公案在寺囘報令吏部且與依例差注磨勘後有特㫖即從改正從之詔河陽剏修北使驛亭温縣宿頓以至徳河陽縣中頓以清沇汜水縣中頓以行慶館為名玉牒在丙戌右司諫蘇轍言臣伏以天下之治寄於守令守令之衆朝廷不能盡知其要寄於監司方今民力凋殘疲瘵未復見議差役措置未定正冝使監司得人以督察州縣朝廷近日沙汰殘刻之吏多係提轉等官民間承望此風思見循吏然臣竊觀近日所命頗未得人博采公言略見一二如李之紀楚潛王公儀皆碌碌凡材無善可名不知何以獲用至於餘人又加以過惡如孫路奴事李憲貪冒無恥程髙諂附賈青借名買珠鍾浚天資邪險累作過犯張公庠為事刻薄不近人情張璹乆領市易與牙儈雜進而皆擢自稠人之中付以一道之政陛下誠欲尊重朝廷愛惜民物則如此輩人皆未可輕用也或言朝廷近令侍從以上博舉監司名姓既聞率皆注籍每有員闕執政不復遴選一切掲簿定差是以賢愚並進人物雜亂竊惟中外侍從其徒實煩被詔舉官初無旌別承舉即用近於麤踈而欲待其不職乃坐舉者天下之廣監司得失朝廷未必一一詳知民獨何辜枉被塗炭自古用人實無此類臣欲應自前所用監司令執政更加審議其尤不可者當與改差今後差除須名迹著聞公議共許然後擢用庶幾監司稍得良吏不至害民此最當今之急務也李之紀三月二十八日廣東憲楚潛六月一日廣西漕王公儀七月二十二日夔漕孫路七月十二日陜西漕程髙七月二日夔漕鍾俊六月二十三日鑄錢張公庠六月八日廣東漕張璹七月十三日京東漕五月十二日范純仁薦璹司馬光言光辨韓川所論不得其時附初二日蘇轍下臣竊見御史韓川言諸路監司不當拘限資格専任舉主當令宰相自加選擇竊縁常調之人不可不為之立資格以抑躁進塞倖門若果有賢材朝廷自當不次遷擢豈拘此制凡年髙資深之人雖未必盡賢然累任親民歴事頗多知在下之艱難比於元不歴親民便任監司者必小勝矣朝廷執政止八九人若非交舊無以知其行能不惟渉徇私之嫌兼所取至狹豈足以盡天下之賢才若采訪聲譽則愛憎毁譽情偽萬端與其聽逰談之言曷若使之結罪保舉故臣奏設十科以舉士其中一科公正聰明可備監司誠知請屬挾私所不能無但有不如所舉者其舉主嚴加譴責無所寛宥則今後自然審擇不敢妄舉矣至如楚潛等雖無聲名安知其無實用俟其到官無狀廢職并舉主坐之亦未為晚是月六日簾前對韓維言光太拘資格更參詳御史上官均言前詔侍從舉堪為諫官各二人又詔薦中外之臣以充監司之選夫愛憎好惡者天下之常情好則相譽而忘其不善惡則相毁而忘其所可稱方陛下臨御之初人情未敢營私繆薦竊恐法乆弊生背公徇已薦舉之人惟親與舊則公路塞而真才棄矣願以所舉盡報御史臺臣等得以盡知得失所薦非才顯加譴罰則真才實行可坐而得而踈逺寒畯之士無不用之歎矣元豐八年十月舉諫官元祐元年二月舉監司三月二十三日均始為察官此言不得其時附見韓川云云後均集有此全章更詳考之已丑朝請大夫直龍圖閣張頡為户部侍郎右司諫蘇轍言頡猜險邪佞狡愎闇刻具此八徳了無一長除目初下中外驚疑臣非敢風聞臆度謹具實狀如左一頡為廣南運使日朝㫖那移兵馬就食全永經略使趙卨為見順州戍兵年滿合替遂差兵戍順州却令順州替兵就食全永頡但知出納之吝恐往來戍兵縻費錢糧一日之間四次移牒故作行遣申奏趙卨不肯移兵又奏卨暗添韶州雇夫錢六萬貫又奏卨違法差衙前朝㫖令卨分析乃是頡判狀令差卨曽具元判狀繳奏其餘所奏更無一事稍實因此挾恨遷怒詬罵桂州官吏作緑衫下包个奴婢名呼趙卨仍罵作賊提舉官劉誼曽具事狀奏聞有㫖罷轉運使一頡為轉運使日有安南般糧夫數千人逃還已經曲赦放罷每人只有欠官米錢七百後來頡欲差人徃全州般糧遂召陽朔縣令魏九言臨桂縣令李譯勒令差兩縣逃亡夫徃全州般糧仍令九言取本縣百姓莫飯奴等七人狀云所欠官錢七百情願徃全州般糧填還其七人中有三人不係逃亡只取四人情願狀便差數千人况欠錢止於七百而全州水路二千餘程豈有情願之理因此溺殺人不少致人户經提舉司過状亦是劉誼具事由聞奏方始住差一頡為桂州經略使日有安化州首領以本族飢饉依舊例借糧於冝州頡指揮冝州不借一粒致夷人作過於省界偷牛因此夷漢互相讎殺頡更無方略直令冝州興兵討之致本州官兵陷沒頡遂發數千人令供備庫副使費萬徃討之全軍皆沒頡又遣路分都監王竒知冝州仍以數千人入討全軍覆沒事聞朝廷先帝為之旰食遣謝麟將數萬人費百餘萬貫竟以招降而定頡既措置乖方致陷兩將兵馬而費萬王竒之死又不以實奏因轉運使馬黙等論列朝㫖差賔州推官朱恂取勘因此落職奪官知均州右臣所論三事皆有文案可以覆驗據頡處事乖刺致㓂覆軍與沈起劉彛同罪理合誅竄所以累次常獲寛宥者盖其家素富本以行賂得進鄉近辰錦多蓄竒砂嘗以獻遺前宰相王珪珪每出示親客云此砂張頡所獻以此曲為盖庇今來縱未黜廢豈可特膺非次擢用兼臣訪聞三省執政本不知其人失於採聽為薦者所誤若置之户部必害民物伏乞追寢前命以厭公議詔付三省進呈不行轍又回奏皆留中不出轍又具申三省卒不行第二狀十一第三狀十二第四狀十八第五狀二十三申三省二十六朝議大夫直龍圖閣江淮等路發運使蔣之竒為集賢殿修撰知廣州吕大忠除發運當是代之竒而實録失不載十四日朱光庭云云可考詔雄州雲翼兩指揮依舊存留各以三百人為額太常寺言將來明堂景靈宫應行事􅉟事導駕儀仗内押當官宗室遥郡禁軍都虞候以上並赴陪祠立班餘不赴詔三省官寺監長貳非明堂行事者亦令陪祠立班又詔大禮在近諸處奏到公案經歴去處慮有住滯並令進奏院自今至降赦如逓到公案即時投下本處當日進呈訖連送大理寺有住滯經歴處當議勘責經赦不原禮部言將來明堂景靈宫皇帝親行儀注凖朝㫖復設小次縁近儀設皇帝版位於阼階之上今來小次合於明堂阼階之東丹墀之上西向陳設從之五日事移入此司馬光劄子乞約束州縣抑配青苗錢曰檢㑹先朝初散青苖本為利民故當時指揮並取人户情願不得抑配自後因提舉官速要見功務求多散諷脅州縣廢格詔書名為情願其實抑配或舉縣勾集或排門抄劄亦有無頼子弟謾昧尊親錢不入家亦有他人冒名詐請莫知為誰及至追催皆歸本户朝廷深知其弊故悉罷提舉官不復立額考校訪聞人情安便昨於四月二十六日有敕令給常平錢穀限二月或正月只為人户欲借請者及時得用又令半留倉庫半出給者只為所給不得輙過此數至於取人户情願亦不得抑配一遵先朝本意恐州縣不曉朝廷本意將謂朝廷復欲多散青苗錢穀廣收利息勾集抑配督責嚴急一如向日置提舉官時今欲續降指揮令諸路提㸃刑獄司告示州縣並須候人户自執狀結保赴縣乞請常平錢穀之時方得勘㑹依條支給不得依前勾集抄劄强行抑配仍仰提㸃刑獄常切覺察如有官吏似此違法騷擾者即時取勘施行若提㸃刑獄不切覺察委轉運安撫司覺察聞奏詔從之録黄過中書省舍人蘇軾奏曰臣伏見熙寧以來行青苗免役二法至今二十餘年法日益弊民日益貧刑日益煩盗日益熾田日益賤穀帛日益輕細數其害有不可勝言者今廊廟大臣皆異時痛心疾首流涕太息欲巳其法而不可得者况二聖恭已惟善是從免役之法已盡革去而青苗一事乃獨因舊稍加損益欲行紾臂徐徐月攘一雞之道如人服藥病日益増體日益羸飲食日益減而終不言此藥不可服但損其分劑變其湯使而服之可乎熙寧之法本不許抑配而其害至此今雖復禁其抑配其害故在也農民之家量入為出縮衣節口雖貧亦足若令分外得錢則費用自廣何所不至况子弟欺謾父兄人户冒名詐請如詔書所云似此之類本非抑勒所致昔者州縣並行倉法而給納之際十費二三今既罷倉法不免乞取則十費五六必然之勢也又官吏無状於給散之際必令酒務設鼓樂倡優或闕撲賣酒牌農民至有徒手而歸者但每散青苗即酒課暴增此臣所親見而為流涕者也二十年間因欠青苗至賣田宅雇妻女投水自縊者不可勝數朝廷忍復行之與臣謂四月二十六日指揮以散及一半為額與熙寧之法初無小異而今月二日指揮猶許人户情願請領未免於設法罔民便快一時非理之用而不慮後日催納之患二者皆非良法相去無㡬也今者已行常平糶糴之法惠民之外官亦稍利如此足矣何用二分之息以賈無窮之怨或云議者以為帑廪不足欲假此法以贍邊用臣不知此言虚實若果有之乃是小人之邪說不可不察昔漢宣帝世西羌反議者欲民入穀邊郡以免罪蕭望之以為古者藏於民不足則取有餘則與西邊之役雖户賦口斂以贍其之古之通義民不以為非豈可遂開利路以傷既成之化仁宗之世西師不解盖十餘年不行青苗有何妨闕況二聖恭儉清心省事不求邊功數年之後帑廪自溢有何危急而以萬乗君父之尊負放債取利之謗錐刀之末所得㡬何臣雖至愚深為朝廷惜之欲乞特降指揮青苗錢穀今後更不給散所有已請過錢斛候豐熟日分作五年十料隨二稅送納伏乞聖慈念其累歲出息已多自第四等以下人户並與放免庶使農民自此息肩亦免後世有所譏議兼近日謫降吕惠卿告詞云首建青苖力行助役若不盡去其法必致姦臣有詞流傳四方所損不細所有上􅟢録黄臣未敢書名行下庚寅御史中丞劉摯言臣近以呂惠卿責降告詞有首建青苖之語而青苖之法未罷曾具論列不蒙采納理有未安義難茍止盖天下之理惟有是非而已陛下謂青苖之政是耶非耶茍以其法為是也則首議者無可責茍以其議為非也則此法不當行二者甚易曉也夫青苖之害繇熙寧以來至于今日論者不知其數幸蒙陛下修復政事哀惠疲民茍以此時不罷此法則生靈困窮之患無時可免況已有今年二月敕命用常平舊法施行故天下已嘗鼓舞矣不意復有四月申明翻以謂舊法者青苖斂散之事也而人失望然而法行如故遲遲不改此何義哉且賞罰黜陟要以當其功罪則人心服號令所以信天下非罔天下也今一事而兩用之其用之於責人則以為非其用之於取息則以為是名實不應深累國體臣恐四方有以窺朝廷而罪人豈得無詞乎詔書既已明布天下矣使青苗真是良法國用真有所頼陛下猶當不惜改罷棄利就義以布信於天下況於詔語自指以為蠧國害民之事哉伏望聖慈再加究察速令檢㑹依今年二月敕命用嘉祐常平舊法申明施行以一政令使民蘇息被罪者懾伏貼黄稱青苗散斂嵗利不少誠可以少佐用度臣非不知上體朝廷理財之意但以詔命與政事不同為國之累須當捨小利以就大信兼此法困民今雖約束不得抑勒譬如疾病根本既存它日興利之臣復出據本根而張大之則天下窮竭之患是今日遺之也可不惜哉又貼黄稱朝廷若見得國用須頼此錢必不可罷而惠卿告命當如何解釋以取信於天下而杜罪人之詞臣亦夙夜求其說而不可得然青苗之法有情願有抑勒始者陜西之法先觀稼之厚薄察嵗之豐凶而散斂之民皆情願故無大害至熙寧取此以為補助之法而惠卿之徒乃隨事增虐意專在利校歲額多寡立官吏殿最遴選使者刼而成之於是抑勒之禍生以至發七難以詰責韓琦布告天下則青苗之患實惠卿為之昨者降詞豈非責惠卿首議假法以興抑勒之事哉雖然詔語不曾如此分别而但云首建青苖而已則此理何縁申明今不若翻然掃去餘敝以幸天下以昭聖朝重信輕利之政元祐元年八月五日左司諫王巖叟右司諫蘇轍左正言朱光庭右正言王覿言臣等屢有封事乞罷青苗皆不蒙付外施行伏以王安石吕惠卿創行此法以來天下之士惟王吕黨人欲以青苖進身者則以其法為是其它士大夫上自韓琦冨弼中至司馬光呂誨范鎮下至臣等輩人未有一人以為便者方安石惠卿用事忠言壅塞不得施行小民無告飲泣受害今者二聖臨御盡革衆弊天下欣欣日望青苗之去而近日刪立舊法益滋中外狐疑不曉聖意竊聞近日左右臣僚有以國用不足欲將青苖補其闕乏者聖心未察是以為之遲遲臣等雖愚以為自古為國止於食租衣稅縱有不足不過補以茶鹽酒稅之征未聞復用青苖放債取利與民争錐刀之末以富國强兵也藝祖太宗之世四方未平中國至狹嵗嵗用兵其費不貲及真宗東封西祀遊幸亳宋造立宮室仁宗結好契丹平定西戎翦滅南冦此皆非常大費而常賦之外無大増加未聞必待青苖以濟國用今二聖恭儉安静無為四海之富與宗祖無異何憂何慮而欲以青苖富國乎臣等以爲皇帝陛下富於春秋未嘗接見多士太皇太后陛下覧政帷幄未能博聽羣議聽納之道於斯實難竊謂臣下每有獻言冝一切折以公議彼既欲散青苖而臣等以為不可陛下受其所言而臣等封事遂留中不出臣等不知陛下何以斷其是非而信之如此之篤乎陛下必欲決此深疑即當盡出臺諫所言付之三省使之公議得失不當隠忍不辨是非而陰用其言也如衆議必以罷之為是即乞早賜裁斷以慰民心必以罷之為非亦乞顯行黜謫以懲臣等狂妄又以状申三省曰巖叟等伏見熙寧之初始行青苖士無賢愚皆知其不便是時建議之臣盡力主張者不過一二人而賢士大夫極言其失者非異人也盖今之執政嘗論之矣忠言讜論播於天下至今傳誦以為口實小民呻吟欲聞更張亦已乆矣伏自二聖臨御革去弊法而青苖之議獨無所變者但今取民情願不立定額州縣或散或否事體不一天下固已疑之矣中間修成本法使科納者減半出息中外喧言朝廷欲依舊放債取利此聲流傳極損聖政巖叟等備位諫官不敢黙已遂與臺官前後上言僅數十章皆不蒙施行傳聞大臣奏對有以國計不足疑誤聖聽者遂致此議乆而不決巖叟等雖愚竊所未喻也盖聞古者聖人在上食租衣稅而已凡所以奉事郊廟禄飬官吏蓄兵備邊未嘗有闕也後世鄙陋乃始益以茶鹽酒稅之征然亦未聞放債取利若此之甚也今茲二聖在上恭儉無為度越前世選用執政將致太平巖叟等與天下士民尚冀朝廷能寛酒稅之𣙜損茶鹽之入以復三代之政不意今者乃欲以青苖冨國失天下之望也王安石呂惠卿既以此負國使朝廷被此聲於天下今者又復以此誤二聖此巖叟等區區所深痛也近日朝廷責降呂惠卿告命之出首以青苖為罪天下傳誦人人稱賀奈何詔墨未乾復蹈其故轍乎且青苖之法其所以害人者非特抑配之罪也雖使州縣奉行詔令斷除抑配其為害人固亦不少何者小民無知不計後患聞官中支散青苖競欲請領錢一入手費用横生酒食浮費取快一時及至納官賤賣米粟浸及田宅以致破家一害也子弟縱恣欺謾父兄鄰里無頼妄託名目嵗終催督患及本户二害也逋欠未納請新盖舊州縣欲以免責縱而不問三害也常平吏人舊行重法給納之賂初不能止今重法既罷賄賂公行民間所請得者無㡬四害也四事為害雖復除抑配之弊亦無如之何而况抑配未必除乎巖叟等職在言責目覩弊事黙而不言則上負朝廷下負民物若未得請决無中止之議伏乞盡取前後章䟽看詳施行以允公議辛卯司馬光劄子昨於四月二十六日降指揮令於正月二月支散常平倉錢􅂖竊慮州縣多不曉朝廷之意將謂却欲廣散青苖錢多收利息嚴行督責一一如未罷提舉官時勘㑹青苖錢利民甚少害民極多臣民上言前後非一今欲遍行指揮下諸路提㸃刑獄司自今後其常平錢穀只令州縣依舊法趂時糴糶其青苖錢更不支俵所有舊欠二分之息盡皆除放只令提㸃刑獄契勘逐州縣元支本錢隨見欠多少分作料次隨稅送納詔從之舊録云詔府界諸路提㸃刑獄司自今後常平錢穀令州縣依舊法糴糶其青苖錢更不支俵先是御史中丞劉摯言乃者朝廷患免役之弊下詔改復差法置局設官以議施行之叙施之倉卒改而立雇募之議繼又為招募之法朝廷患常平之弊並用舊制施行曽未累月復變青苖之法其後又下詔切責首議之臣而歛散之事至今行之如初此二者大事也而反復二三雖近侍謀議之臣曽不敢必知法將安出尚何以使天下信之而中書舍人蘇軾亦言青苖錢斛今後更不給錢其已請者俟豐熟日分作五年十料隨二稅送納或自第四等以下人户並蠲放之左司諫王巖叟右司諫蘇轍左正言朱光庭右正言王覿又繼言屢請罷青苖皆不蒙付外乞盡出臺諫所言使三省公議得失如衆議以罷之為是即賜裁斷以慰民心以罷之為非亦乞顯行黜謫以懲狂妄始先帝追法先王修補耕助歛之法司馬光劉摯之徒争議至以為放債取利先帝斥而不用至是相反在位挾怨改革是時天下已被其患羣聽駭焉新録但刪去始先帝至駭焉等語餘悉用舊文按當時罷青苖前後議論最多不可不盡載今悉檢討追附紹聖史官誣罔固難以欺後世而紹興史官亦略不與辨若謂不足辨則所失有甚於此者矣又司馬光蘇軾及臺諫官等議論倘不盡載必遂因循放失可不惜乎玉牒辛卯詔常平糴便依舊法罷支青苖錢初同知樞宻院范純仁以國用不足建請復散青苖錢四月二十六日指揮盖純仁意時司馬光方以疾在告不與也已而臺諫共言其非皆不報光尋具劄子乞約束州縣抑配者蘇軾又繳奏乞盡罷之光始大悟遂力疾入對於簾前争曰不知是何姦邪勸陛下復行此事純仁失色却立不敢言青苖錢遂罷不復散王巖叟等言所稱大臣實指純仁也韓瓘録劉安世語云温公與黄門公道合志同無異同之論但范堯夫欲行七色錢稍復免役温公方病自力而出簾前對言小人欲以乏財動朝廷稍復免役之法不知謂誰堯夫失色却立卒不敢出言後來堯夫之去盖因安世章䟽且及前事也據劉安世元祐四年五月末劾范純仁䟽則純仁盖乞令州縣於存留一半常平錢斛之外依舊散青苖息錢非欲行七色錢及稍復免役也韓瓘誤記今不取四月二十六日指揮具注在本日呂本中雜說神宗病甚不能言宣仁謂曰我欲為汝改某事某事凡二十餘條神宗皆㸃頭應獨至青苖法再三問終不應熙寧初神宗與二王禁中打毬子上問曰二王欲賭何物徐王曰臣不別賭物臣若贏時只告陛下罷了新法太皇太后諭輔臣曰臺諫官言近日除授多有不當司馬光言朝廷近詔臣僚舉可任監司既令各舉所知必且試用待其不職然後罷黜亦可并坐舉者吕公著曰舉官雖是委人亦須執政審察人材擇可用者試之光曰自來執政只於舉到人中取其所善者用之餘悉棄去何嘗審擇韓維曰光所言非是朝廷極士大夫之選擇執政七八人豈可謂掄選無益而直信舉者之言且刑罰者但可施於已然之後今不先審察待其不職而罰之甚失義理李清臣曰若待其不職然後罷黜人必有受其弊者公著曰近來除用多失亦由限以資格維又言光持資格太謹若掄選失人而空守資格欲以何用光又曰資格豈可少維又曰資格但可施於叙遷若升擢人材豈可拘於資格吏部侍郎兼侍講傅堯俞以職煩目病乞罷侍講司馬光請改堯俞為侍讀而用著作郎范祖禹兼侍講祖禹吕公著之壻也請避嫌光奏宰相不當以私嫌廢公議韓維奏朝廷遴選執政本以進達賢能為職今乃以執政妨用人不可方今人材難得幸而有可用之人又以執政故退罷若七八執政各避私嫌甚妨賢路且多存形迹非大公之道遂以祖禹兼侍講右正言王覿言臣伏見今年閏二月五日敕勘㑹元豐八年三月六日赦恩已前命官諸色人被罪今來進狀訴理據案已依格法慮其間有情可矜恕或事渉寃抑合從寛減者委官看詳聞奏并今年三月十五日敕應係赦前命官諸色人被罪合行理訴限半年進狀臣竊聞自有上􅟢朝㫖置局以來凡有情可矜恕事渉寃抑獲申雪者甚多中外人情既知朝廷哀矜寃抑故見今陳訴者未已而旦夕半年之限將滿竊恐踈逺銜寃之人聞詔後時未及自陳者尚衆臣欲乞指揮下訴理所更與寛展日限庶㡬銜寃之人皆得洗雪可以推廣聖恩感召和氣貼黄稱檢㑹元豐公式令諸赦書許官員訴雪過犯自降赦日二年外投狀者不得受接即是常赦許官員訴雪刑部猶限二年若該元豐八年三月六日赦恩者刑部自須至來年三月六日方不接狀所有今來理訴所日限欲乞依前項令文展至元祐二年三月五日終如此則凡經刑部定奪不該雪除者理訴所該看詳施行也詔展訴理所日限至元祐二年三月五日終舊録云先是詔至元豐八年三月先帝上賔之日議者切齒姦臣欲彌縫其失故又改焉新録辨曰前此訴理所事截自哲宗登極大赦之前既而赦後復有訴理者故更展二年此事甚明以為先帝上賔之日非也自先是至改焉三十一字並刪去按展訴理限自是從王覿奏請新録似未詳考今明著之户部言按察成都府等路茶事司奏乞先次廢罷成都府在城博賣都茶場止令産茶州縣元置場處依未置都茶場日前任便販賣從之太僕寺言本寺主簿二員止是勾考簿書並無職事欲乞令通管寺事從之其餘寺監准此内太常寺國子監主簿只通管雜務詔將來明堂禮畢御宣徳門肆赦所有諸班馬隊御龍直歩隊為未聽樂更不呈引詔鄜延路經略司如夏國有首領傳道信息意欲歸漢即說諭以夏國已恭順納欵必不收接若將領部族投來亦依此婉順說諭約囘如人數衆多不肯聽從即量以人馬約出漢界并下逐路經略司依此指揮舊録云夏人歸國舊許收納故得不死自是約回多不全存焉新録已削去今從新録
