body:
  text: 續資治通鑑長編巻二百六十宋李燾撰神宗熈寧八年二月癸亥朔河北第八副將内殿崇班李偁追一官仍勒停坐與將官劉慶不和理曲也時方置副將而偁首不協故特絀之以勵其餘河北東路察訪使曾孝寛言試中義勇保甲授三班差使借差以上者請差充本路都廵檢下指揮使凖備捉賊其殿侍軍大將差充本鄉都副保正從之仍詔西路察訪依此施行知諫院鄧潤甫言竊聞朝㫖下将作監檢計京城募流民修築乞罷之既而開封府上流民數及不願應募之家其事遂寝甲子詔酒户貸市易司糯米自去年中限至末限息錢並減半初市易司權糴糯米以貸酒户收息犯者聽人告賞錢至三百千米沒官商人以官糴賤不至又值嵗儉京師糯米少價益髙本息錢厚故有是詔司農寺言奉詔每二年引見都副保正補班行毋過二十五人今定開封府界毋過五人河北兩路各四人河東路五人永興秦鳯等路候編排了日據人數均定每及一年聽以元數之半保明引見從之仍詔府界河東路各毋過六人永興軍等路轉運司言見管私鐵錢轉運司九萬餘緡常平司十一萬餘緡并買民間私鐵錢數十萬斤并當改鑄省様錢欲除永興華河中陜西銅錢監添匠鼓鑄外更於商虢洛南増置三監耀鄜權置兩監共九監改鑄永興鄜耀河中陜去鐵冶逺第改鑄偽錢一年可畢商州洛南華虢最近鐵可以乆行鄜州等五處候改鑄罷工匠併入商州等四監然後專鑄大錢從之仍委皮公弼縂制營辦先是安撫轉運司出牓收買四等私錢一切禁斷舊通用錢而以銅錢易之以官庫見管并換到通用私小鐵錢重行鼓鑄而熊本以為如此則公私未便乃下逐司申明前後條約推揀闕薄漏貫字様不明等私錢犯者依法施行入官銷毁應自來通用錢並令行使如故其官庫不堪用鐵錢等即别置錢監増圓物料比省樣微加别異鑄熈寧重寳封樁俟向去豐熟奏取指揮乃詔逐司具官司合改造錢數各計若干及如何措置以聞至是轉運司條具來上故有是詔熊本奏請墨史見七年九月二十七日壬戌朱史并入八年二月二日甲子今兩存之七年十二月十一日熊本體量吳中復等八年正月二十四日皮公弼云云又三月四日云云可考新紀書増陜西鐵官改鑄大錢食貨志第六巻八年皮公弼又言今已得私鑄大鐡二十餘萬緡并買民間私錢亦數十萬斤皆應以省橅改鑄請商虢洛南増三監耀鄜權置兩監通永興華河中陜舊監為九以給改鑄永興鄜耀河中陜去鐵冶逺請改鑄一年罷之商洛南華虢最近鐡可乆行五監罷並其工作歸四監專鑄大錢皆公弼首議命専領之而詔鑄大鐵錢才令補所廢偽錢及可以待交子所用即止志所稱私鑄大錢二十餘萬緡與實録不同實録但稱九萬餘緡當考或用志即削去實録所書更詳之太常寺太祝王安士為右贊善大夫權發遣度支判官安士安石幼弟也鄧綰劾章惇云惇與吕惠卿商量欲擢用吕和卿則先薦王安士為例此當考乙丑詔去年災傷州軍賑給乞丐不能自存之人聽展限終閏四月如米不足許以常平米續給毋過元數一倍都提舉市易司言乞以諸路市易務𨽻本司許本司移用錢物度人物要㑹處分諸路監官置局隨土地所産商旅所聚與貨之滯於民者皆得收歛從之詔樞宻使陳升之提舉修馬軍司勅以權知審刑院崔台符等言奉詔修馬軍司𠡠縁軍政事重仁宗時命樞宻使田况提舉乞依故事以樞臣縂領故也十年二月壬申勑成丙寅皇子僴授鎮安軍節度使封景國公蕃官皇城使包順子嘉卜卓補三班奉職熈河經略司言其隨父戰尨公川有功也濟州防禦使李瑋復為彰信軍留後駙馬都尉瑋以荘孝大長公主薨故謫至是復之詔成德軍懷衛磁相邢洺趙等州災傷為甚昨差黄河役夫三萬可減半滹沱葫蘆河役夫五千可減二千賜館閣校勘林希集賢校理梁燾銀絹各三十匹兩以編校四館書籍畢也嘉祐四年二月丁丑初編校四館書丁卯手詔乳母崇國夫人張氏可特進封魏國安仁保祐夫人前曲陽縣尉權軍器監主簿吕和卿為奉禮郎知軍器監丞先是和卿兄惠卿令和卿建議行手實法至是判軍器監章惇請以為丞仍特改官七年七月十九日初行手實法河北東路轉運司乞賜緡錢五六十萬於澶州或大名府市糴芻糧備緩急支用詔三司支銀絹各十萬匹兩如轉變未得聽於常平司易錢給其賞戊辰詔免歸明人之子孫之為義勇者止令附保華州言前年華山崩壓胡岳兩村𠡠建寧山禪院為壓死人祈福乞嵗度僧詔每二年度一人己巳上批近令樞宻院移諸路屯駐兵歸營州縣廵防之人從此必減少方今諸處災傷盗賊可慮宜取索見管弓手數委官㸃檢選其彊壮斥去疲弱厚其旌賞訓齊武事以佐守備乃詔提舉常平司選弓手疲弱者别募人充詔應募充軍将因押綱等酬奨轉三班使臣者不作流外出身禮院言自今輟朝遇假日即以次日連值假日即候假開日從之知永興軍龍圗閣直學士給事中吳中復降授右諫議大夫永興軍等路權轉運使皮公弼提㸃刑獄張穆之提舉常平等事章楶各罰銅三十斤中復等嘗言永興軍路州軍民流移甚衆未流移者不得安居乞選官行蓄積之家籍其粟數計口給本家外許災傷民賖糴官為給券就給及乞於有力之家權典質民牛畜驢馬等及諸縣弓手近經減省乞輪差第三等以上義勇在縣日給錢米同弓手捕盗執政遣使按驗謂中復等所奏多不實及所乞措置乖方若遂施行必致騷擾雖㑹赦特責之中復尋罷永興軍提舉玉隆觀從所乞也玉隆乃閏四月十一日指揮今附見中復本傳云闗右大旱人多流亡中復與監司奏請賑䘏而執政遣使案驗誣以不實奪一官實録不載遣使案驗但稱違㫖事頗踈畧今刪取増入四月二十九日王安石對語可參考庚午上批延和殿閱麟府路所買馬三百匹格尺小弱加以羸瘠少堪配軍者比之熈河路市價復甚貴可罷博買止令軍馬司依常收市右驍衛大将軍秀州刺史仲軻等言父宗說在外二十餘年今七十嵗乞納出身以來告勅贖宗說歸宫或乞許臣并弟姪兒孫就宗說同居侍養詔許輪子孫一人在彼供侍宗説明年八月庚子卒廣南東路轉運司乞蠲南雄州民無田産有稅錢而例出役錢者從之辛未翰林學士提舉諸司庫務楊繪權發遣開封府知青州翰林侍讀學士滕甫知齊州天章閣侍制李肅之兩易其任時治李逢獄以甫娶逢妺故也尋命甫知鄧州肅之知齊州如故甫改鄧州二十一日今并書壬申詔聞河東災傷州軍至人相食其令察訪轉運司體量虚實具賑恤次第以聞其後具到實有之各已賑恤同商量河東地界吕大忠言臣與劉忱再㑹北人大黄平蕭素梁頴詞理俱屈雖議論反覆迷執不回竊原其情技亦止此為今之計莫若因而困之伏望就除劉忱一本路差遣置地界局於代州以蕭士元為副來則與之言去則勿問在我則逸在彼則勞嵗月之間庶可决議乆寓絶塞人情皆非所堪速希成功實恐有害機事而臣方在哀疚棄几筵以将使事今者素頴言必顧惜歡好决無倉卒起兵之端臣之去留似無所繫乞聽臣罷歸以終䘮制又言北人窺伺邊疆為日乆已始則聖佛谷次則冷泉村以致牧羊峰瓦窑塢共侵築二十九舖今所求地又西起雪山東接雙泉盡缾形梅家兩寨繚繞五百餘里蔚應朔三州侵地已經理辨更無可疑惟瓦窑塢見與北界商量蕭禧未過界時臣先奏論乞朝廷主此定議禧至又皆許之今西陘以東皆有明據此地不能固争它處亦恐難保竊料敵情有可動者一有不可動者五狃於包容侵侮中國今若必校或激怒心此可動者一嵗得金帛與地孰利萬一絶好所失則多此不可動者一也彼兵雖衆脆弱驕惰應敵者鮮非咸平景德間可比此不可動者二也城池不固械器不精以守必危以戰必敗此不可動者三也山後之民乆苦虐政皆有思中國之心邊釁一開必防内變此不可動者四也北人最畏西夏復有逹勒逹之變果欲驅豈無牽制之慮此不可動者五也彼主柔而少斷母老子孱縱有諫臣恐未能用今者彼使再入必未肯先輸屈伏之言俟其情意稍開且以胡谷義興冶大石舒克悦麻谷五寨治平二年侵築十五舖度山勢立界或更増以瓦窑塢如王僅靳宗臣之議則我無屑就之愧彼有可去之名蕭禧使還不遂其意萬一張大兵勢測我淺深乞指揮諸路帥臣但為備禦計一切勿校大忠自去年十二月求反䘮服至是以起復官與劉忱同入對又固請逾月乃許之王僅靳宗臣所議當考朱史簽貼云吕大忠所言時政記等處皆不見只是劉忱供到難憑虛實又事理無可取刪去今依新本復存之大忠三月十七日乃罷商量地界反䘮服舊録云二月十日聽大忠反喪服恐不然也癸酉觀文殿大學士吏部尚書知江寧府王安石依前官平章事昭文館大學士始安石薦韓絳及吕惠卿代已惠卿既得勢恐安石復入遂欲逆閉其途凡可以害安石者無所不用其智又數與絳忤絳乗間白上請復相安石上從之惠卿聞命愕然翼日上遣勾當御藥院劉有方齎詔往江寧召安石安石不辭倍道赴闕安石復相實録不詳今參取魏泰邵伯温吳幵所記修入更俟考求魏泰云王荆公秉政更新天下之務而宿徳舊人議論不協荆公遂選用新進待以不次故一時政事不日皆舉而兩禁臺閣内外要權莫匪新進之士也洎三司論市易事而吕參政指為沮法荆公信以為然堅乞罷相神宗重違其意自禮部侍郎昭文館大學士改吏部尚書觀文殿大學士知江寧府既出吕嘉問張諤持荆公而泣公慰之曰巳薦吕惠卿矣二子收淚及惠卿入參有射羿之意而一時之士見其得君謂可以奪荆公矣遂更朋附之既而鄧潤甫枉状廢王安國而李逢之獄又挾李士寧之事以撼荆公又言熙寧編敇不便乞重編修及令百姓手實供家財以造簿又欲給田募役以破役法其它夤縁事故非議前宰者甚衆而朝廷綱紀幾扵煩紊天下之人復思荆公天子斷意再召秉政鄧綰懼不自安欲弭前迹遂發張苦濟事返攻吕惠卿朝廷俾張諤為兩浙路察訪以驗其事諤猶欲掩覆而鄧綰復觀望意㫖薦引匪人於是惠卿自知不安乃條列荆公兄弟之失凡數事面奏意欲上意有貳上封惠卿所言以示荆公故荆公表有忠不足以取信故事欲其自明義不足以勝姦故人與之立敵盖謂是也既而惠卿出知亳州鄧綰落御史中丞以本官知虢州張諤落直舍人院降官停任其它去者不一門下之人皆無固志荆公無與共圗事者又復請出而再鎮金陵故詩有紛紛易變浮雲白落落誰鍾老柏青盖謂是魏泰記此事殊失次序今但取其合者忠義不足乃七年乞出第三表立敵殆指曽布非吕惠卿也卲伯温云吕惠卿既得位遂叛荆公出平日荆公私書有曰無使齊年知齊年謂馮公荆公與馮公皆辛酉生又有曰無使上知神宗始不恱荆公也惠卿又起李逢獄事連李士寧士寧者蓬州人有道術荆公居喪金陵與之同處數年意欲併中荆公也又起鄭俠獄事連荆公之弟安國罪至追勒惠卿求害荆公者無所不至神宗悟急召荆公公不辭自金陵泝流七日至闕復拜昭文相惠卿以本官出知陳州李逢之獄遂解其黨數人皆誅死李士寧止編管嗚呼荆公非神宗保全則危矣按嘉祐驛程江寧府至京二十二程此云泝流七曰而至恐未必然當考按實録云滕甫移鄧州臣尚未至甫移鄧州乃二月二十二日也惠卿出無使上知書當是出知陳州後伯温所聞恐誤吳幵云予元祐間見臨渙令李洪言王安石既罷相以韓絳代已吕惠卿叅知政事持其法度時謂絳為傳法沙門惠卿為䕶法善神惠卿既得志起李逢獄捕李士寧欲以危安石絳惶恐懇上復召安石一日宣制惠卿以為已得相麻制箱過班惠卿跂而望之閤門吏呼為王安石惠卿愕然予得其語十餘年任太學博士入文德聽麻乃知洪所言有大謬者凡宣制前一日晚御史臺報百官次早入至殿門麻至即自中出其上題姓名以箱按置閤門道上凡在庭者無不知矣豈有執政必待過班呼名而知之大抵傳聞不可信按此事但有惠卿望白麻聞呼安石名乃愕然或失實所說安石復相由韓絳白上當得其實也正月十七日蹇周輔往徐州鞫李逢獄二月十一日復相安石三月四日乃命沈括范百禄赴御史臺鞫世居獄縁世居獄乃捕李士寧方吕惠卿時士寧與世居交通事迹未覺也魏泰邵伯温吳幵等記録皆云吕惠卿起李逢獄捕李士寧以撼安石考其月日似不然今不取司馬光記聞亦載李士寧事獨不云惠卿欲以撼安石也記閒士寧事見二月十七日虞部員外郎吕嘉問太子中允吳安持各陞一任餘官各减一年磨勘吏人轉資減年出職有差以詳定行户免行法成也詔私有及私造神臂弓者論如私造弩法録故刑部侍郎李受孫㐮為郊社齋郎受常侍英宗潜邸用遺表恩已官其孫一人而其子又乞恩特有是命詔權廢罷左右天廏坊甲戌上批聞河東路旱災百姓多流入外界邊吏縱弛漫不之禁自寧化軍一路入北界者已千餘户恐它郡亦逃亡令轉運安撫察訪提㸃刑獄司速體量以聞議所以賑恤之詔移河東屯戍兵馬五千歸營以其餘糧賑恤饑民具次第以聞三司言在京官局多援例指射官屋軍營修廨舍并乞破賃宅錢轉相倣傚有増無減宜一切禁止從之乙亥詔河東路災傷州縣第四等以下户去年秋稅及第三等以下户和糴糧草除已倚閣外尚理殘零數其令轉運司不限災傷分數並與倚閣又詔近賜河東路度僧紫衣牒易粟以備賑濟今察訪使李承之言潞州威勝平定等軍災傷尤甚其令司農寺更出常平粟十萬石接續賑濟丙子廢在京雜賣塲三司請如勾當官王頥奏廢塲嵗省官吏廪禄二千餘緡故也十月辛亥又從三司請復置詔河東轉運司依前詔鑄錢七十萬緡外増鑄小錢三十萬緡又詔司農寺出米貸河北饑民真定府五萬石邢洺磁相趙州各三萬石户毋過兩石至夏熟輸官仍免出息丁丑定國軍留後提舉景靈宫向經知青州經入辭延和殿命坐賜茶既行官給車徒三宫遣使饑送甚盛不一嵗以病召還召還乃明年正月十六日羣牧使李中師等言乞立殿前馬軍司在營填馬分數詔填七分詔陜西都轉運司與都提舉市易司協力興治銀銅坑冶以其所入為熈河糴本從王韶知熈州日請也詔憲皇后族孫杜震補三班借職震自言特録之戊寅上批見校試七軍營陣以分數不齊前後牴牾難為施用可令見校試官撫其可取者草定八軍法以聞初詔樞宻院唐李靖兵法世無完書雜見通典離析譌舛又官號物名與今稱謂不同武人将佐多不能通其意可令樞宻院兵房檢詳官與檢正中書刑房王震提舉修撰經義所檢討曽􅌈中書吏房習學公事王白管勾國子監丞郭逢原校正分類解釋令可行後可差樞宻院副都承㫖張誠一入内押班李憲與震逢原行視寛廣處關殿前司差馬軍二千八百人教李靖營陣法以步軍副都指揮使楊遂為都大提舉誠一憲為同提舉震逄原參議公事夏元象臧景等為将副部隊将勾當公事凡三十九人誠一等初用李靖六花陣法約授兵二萬人為率為七軍内虞候軍各二千八百人取戰兵一千九百人為七十六隊戰兵内每軍弩手三百弓手三百馬軍五百跳盪四百竒兵四百輜重每軍九百是為二千八百人上諭李憲等曰黄帝始置八陣法敗蚩尤於涿鹿諸葛亮造八陣圗於魚復平沙之上壘石為八行晉桓温見之曰常山蛇勢文武皆莫能識之此即九軍陣法也後至隋韓擒虎深明其法以授其甥李靖靖以時遭久亂将臣通曉其法者頗多故造六花陣以變九軍之法使世人不曉之大抵八陣即九軍九軍者方陣也六花陣即七軍七軍者圓陣也盖陣以圓為體方陣者内圓而外方圓陣即内外俱圓矣故以圓物驗之則方以八包一圓以六包一此九軍六花陣大體也六軍者左右虞候各一軍為二虞候軍左右廂各二軍為四廂軍與中軍共為七軍八陣者加前後二軍共為九軍本朝祖宗以來置殿前馬步軍三帥即中軍前後軍帥之别名而馬步軍都虞候是為二虞候軍天武捧日龍神衛四廂是為四廂軍也中軍帥總制九軍即殿前都虞候專總中軍一軍之事務是其名實與古九軍及六花陣相符而不少差也今論兵者俱以唐李筌太白隂經中所載陣圗為法失之逺矣朕嘗覽近日臣僚所獻圗皆妄相惑無一可取果如此輩之說則两敵相遇須遣使預約戰日擇一寛平之地仍夷阜塞壑誅草伐木如射圃教塲方可盡其法耳以理推之知其不可用也決矣今可約李靖法為九軍營陣之制然李筌之圖乃營法非陣法也朕採古之法酌今之宜曰營曰陣本於一法而已止則曰營行則曰陣在竒正言之則營為正陣為竒也故有是詔沈括筆談云風后八陣大将握竒處扵中軍則并中軍為九軍也唐李靖以兵少難分九軍又改製六花陣并中軍為七軍子按九軍乃方法七軍乃圓也筭術方物八褁一蓋少隂之數并其中為老陽圓物六褁一乃老隂之數并其中為少陽此物之定形真數不可改易者既為方圓二陣勢自當如此九軍之次李靖之後始變古法為前軍策前軍右虞候軍右軍中軍左虞候軍左軍後軍策後軍七軍之次前軍右虞候軍右軍中軍左虞候軍左軍後軍揚竒備伏先鋒踏白皆在陣外跳盪弩手皆在軍中又云熈寧中使六宅使郭固等討論九軍陣法著之為書頒下諸帥府副藏秘閣固之法九軍為一營陣行則為陣住則為營以駐隊繞之若依古法人占地二歩馬四歩軍中容軍隊中容隊則十萬人之陣占地方十里餘天下豈有方十里之地無邱阜溝澗林木之礙者兼九軍共以一駐隊為籬落則兵不復可分如九人共一皮分之則死此正孫武所謂縻軍也又占陣法有面面相向背背相承之文固不能解仍使陣間士卒皆側立每兩行為一巷令面相向而立雖文應古說不知士卒側立如何應敵上疑其說使予再加詳定予以為九軍當使别自為陣雖分别左右前後而各占地利以駐隊外向自繞縱越溝澗林薄不妨各自成營金鼔一作則巻舒合散渾渾淪淪而不可亂九軍合為一大陣則中分四衢如井田法九軍皆背背相承面面相向四頭八尾觸處為首上以為然親舉手曰譬如此五指若共為一皮包之則何以施用遂著為令今營陣法是也沈括自誌云上使六宅使郭固討論古制為陣法其說以李靖教旗法為主頒下諸帥府既而議論未厭上亦以固之說為不然再使括為之始離九軍為九陣别自為營而靖之法始明則今祕府邊州陣法是也王安石日録八年三月十九日上用李靖法作陣圖隊為四部将居中有親兵而無部前此吕惠卿極論其不可安石亦為上言其非是是日又進呈僉順上意以為善獨安石與惠卿共難而王珪不言安石曰先王伍法恐必不可改今作四部即兵以分合為變不知四部分則大將在中何所依附若附四部中則一部乃有兩人大将若不附四部中則大将反無以自衛如何待敵上黙然乃且令試教恐安石所難即五月九日所稱五軍陣當考㑹要陣圗篇八年五月九日詔諸路並權住教五軍陣止教四御陣舊紀於戊寅書製八軍法新紀削去己卯詔聞河東路賑濟饑民多聚一處太原府舍以空營約及萬人方春慮生疫癘其令察訪轉運司諭州縣據人所受糧計日並給遣歸本貫即自它州縣流至而未能自歸者分散處之以聞司農寺言京東路監司選差造五等簿官過多恐致煩擾乞自本寺遣官一員徧詣體量有不當者許令改正從之詔罷制置涇原秦鳯等路軍馬糧草司令逐路經略轉運司管勾初軍馬糧草司王韶領之韶既召還故罷將作監丞胡宗回言河北東路倉務當修者四千六百楹費緡錢九萬詔澶州北京置倉貯糧澶州三百五十萬石北京四百五十萬石期二年修畢賜度僧牒五百給其費宗回宿子也十一月庚午宗回乞罷修倉可考庚辰光禄卿直昭文館知鄂州潘夙提舉玉龍觀以荆湖察訪蒲宗孟言夙有足疾年已七十乞令致仕或與宫觀差遣故也手詔外國刺事人令都亭驛開封府宻遣人迹捕告獲一人賞錢千緡仍與班行即居停知情人能告首原罪外亦與酬賞時北人泛使将至慮有姦人竊覘中國也引進使眉州防禦使李端慤為沂州防禦使先是端慤坐冀州事再展二年乃除正任及今尚餘數月詔特除之此據御集契勘端慤自得轉年指揮後至今已及多少月日遂詔减所少年月除正任中書言堂後官王衮等編定命官四等過犯乞付有司更不置詳定命官過犯及看詳編配罪人所兩局遇赦令刑部比例定奪上中書施行從之辛巳歩軍副都指揮使威武軍留後宋守約卒贈安武軍節度使謚勤毅癸未詔諸路經略司籍効用人姓名分𨽻諸将非在籍者不得輙以自隨又詔兵官出入許以親屬自隨即毋得以功狀與将士一例陳乞功賞如勞効殊異衆所共推者委帥臣審察以聞甲申上手詔河北東西路近申奏文書多發馬遞兩路舖兵已疲於犇走不惟駭人觀聽若萬一實有邊事未知人力何以支梧其下監司以條約申訪之詔代州西陘寨主内殿崇班秦懷信移合入差遣以契丹議地界於大黄平即車場溝口施帳幕在懷信所部不即時約闌故也四月五日所書當考車場溝見十二月二十八日先是敵以河東地界議久不决復使蕭禧來詔太常少卿向宗儒皇城使兼閤門通事舍人王澤接伴於是宗儒等言蕭禧至雄州白溝驛不肯交馬䭾欲至城北亭非故事上批蕭禧於白溝住幾十日至今未聞起離向宗儒等雖再三執以舊例禧殊未有順從之意欲更遷延深恐彼情愈肆彊忿或出不遜之言或以廵馬擁送南來益難處置䧺州使人約攔又致喧争萬一擾攘或傷官吏恐不可收拾去嵗蔡確接伴去嵗接伴蕭禧使太常少卿蔡確副使皇城使兼閤門通事舍人李惟賓此據國信名銜實録不書也向宗儒王澤職位亦據國信名銜已許馬䭾依常使車乘例於雄州交割今必難却其情可詳度上作朝廷據接伴奏特許依去年例作兩節交換庶幾稍通其情於疆事易為商議又批北使久留白溝已經累日自通好以來無此事朝廷處置實不可緩蓋所争者小而所顧者重議者若為恐北人因此得以占據兩屬之土是甚不然且北人前後執作證據以為屬彼者豈獨一事如春秋二稅借地蓋館雄州門則搭立標竿及廵馬不住徃來之類不待更増交割馬䭾一節乃可占據况人夫一半已扵白溝代還在理委無深害可速議指揮遂遣内侍諭㫖人夫負擔於白溝交割其馬䭾即比常嵗車乘聽至城北亭三月甲寅宗儒等罰銅詔比令以寛剰錢買田募役須契勘凖災傷等支用無得妨闕其價髙處罷買以兩浙路轉運使王庭老言衢州西安縣買山田價髙用錢十二萬緡乃足募一縣之役既放省稅又失免役牙稅官錢司農寺言恐不獨兩浙所費如此欲改法故有是詔蘇軾元祐元年四月六日奏議當考王安石八年四月三日日録安石論有田募役有十餘害上曰茍如此初何以有此議議者必有所利翌日檢初議乃李承之言募弓手宜如弓箭手為便遂作此法餘無所利安石曰只以田募弓箭手已不如募弓手之便弓箭手雖選強壮然即取足於一家茍可以為強壮則弗却也弓手乃選強壮於無方其所募皆得真強壮者上乃令廢以田募役法按罷以田募役法在四月十二日此但詔勿買髙價田耳乙酉以蕃官三班奉職長摩薩格為右侍禁餘為本族軍主指揮使遷資賜絹有差熈河路言長摩薩格先為果荘所略既而聞總噶爾首領溪鼎諳邦復欲入㓂率所部邀擊有功故賞之詔河北東路増募教閱廂軍十五指揮以崇武為名尋罷之朱史簽貼云六月指揮不招刪去今并存之録虞部員外郎董元亨子堯問為試将作監主簿元亨死事貝州而子孫無食禄者大名府路安撫司為言故録之河北察訪使曽孝寛言慶厯八年嘗詔河北州軍坊郭第三等鄉村第二等毎户養被甲馬一匹以備非時官買乞檢㑹施行户馬法始於此墨史記馬法始於此朱史簽貼云先帝倣三代寓兵於農意立保馬法法未完遭變前史官以為户馬法始於此實為妄誕刪去朱史但務謟諛不知史法新史已復存之今從新史新紀云初行河北户馬法沈括論中國長技不在馬事附八月四日丙戌知桂州都官員外郎直史館劉彛為祠部郎中以廣南西路提㸃刑獄司言彛不磨勘僅十年故也捧日天武四廂都指揮使岷州團練使知熈州髙遵裕為熈河路總管依舊知熈州五年十月戊戌遵裕初權總管詔諸路市易委轉運司提舉仍置同提舉官從都提舉市易司請也尋詔同提舉官任滿更不差人令轉運司官提舉更不差人乃二十五日詔今并書詔京城内外除修造倉場庫務店務課利舍屋外自宫殿園苑以至百司廨舍寺觀等並權停過七年取㫖十年九月辛酉又降權停七年指揮當考同管勾外都水監丞程昉等言嘗乞以京西三十六陂為塘瀦水入汴通運其陂内民田欲先差官量頃畝依數撥還或給價錢又采買材木遥逺清汴牐欲作三二年修仍選知河事臣僚再按視措置詔翰林侍讀學士陳繹入内都知張茂則與昉等覆視以聞其後繹等言奉詔覆視清汴水源管城新鄭宻縣界數處泉源甚壮将來引水入汴預須䟽導可濟行運詔開封府界提㸃司京西北路轉運司計工料以聞繹等又言若於正月開汴口取一河未渾之水即閉汴口䟽古索水金水蔡水三水入汴已見清汴必成之理其置牐疎宻土工物料見令楊琰等計置詔候相度畢具合行事節以聞繹相度到乃三月二十日今幷書朱史刪取大畧今具存之丁亥詔自今宗室緦麻親願出官者将軍以下聽㫖都提舉市易司言乞借奉宸庫象牙犀角真珠直總二十萬緡於𣙜場交易至明年終償見錢從之出常平米萬石賜蘇州賑濟饑民以常熟縣民田災傷故也己丑上批軍行營設拒馬於車隙布列以禦鐵騎犇軼最不可闕今河北多以竹為之輕脆易壞令軍器監速於前降樣造三萬副送北京澶定州看詳編修中書條例李承之等上禮房條例十三巻并目録十九冊詔行之司農寺言今州司士參軍葛德出私錢修水利已除司士參軍乞更酬奨詔賜度僧牒十庚寅詔倚閣廬夀濠和光州無為軍見欠秋稅内殿崇班趙永圖言奉詔許以翼祖保州舊居地建資果院守䕶祖墳嵗度僧一人乞遇同天節於内東門進功德疏别度一人從之仍免進功德疏辛夘祕書丞館閣校勘王安禮直集賢院罷檢正中書孔目房公事避兄安石也審刑院詳議官殿中丞朱大簡等言昨定審官西院差澶州都廵檢康昺不如法御史臺劾大簡遷延不决㑹赦衝替縁大簡欲赴中書樞宻院廵白以故稽期非弛於職而樞宻院按置以法詔審刑院大理寺自今中書樞宻院送定公事依條定奪毋得廵白制置永興秦鳯兩路交子事趙瞻言乞令東路都轉運使謝景温西路轉運判官劉定各兼制置交子事從之七年九月二十六日可考八年正月二十四日皮公弼云云又三月五日云云九年正月二十七日罷交子屯田員外郎通判澶州趙楊權知邵州舊差武臣時本路轉運司薦楊故特可之仍詔自今互差文臣又詔籍元年至七年終増減武臣員弁俸給數以聞鄜延路蕃部凌羅策木多伊克沁威值嵗饑走外界㑹赦法當斬詔以情理可憫杖脊配湖南牢城是月河北西路察訪使沈括言竊詳兵家之利攻其不備出其不意臣晝夜講求本路邊防素不為備者數事當先事有以制之乞賜詳酌其一本路防邊事重兵皆在定州言邊備者惟以北平為兵衝其保州杜城以東有唐水之難謀者未嘗為意臣以謂敵人講求中國邊防虛實向背者非一日萬一為冦必須出於不意道途險易講求不得不盡近歴視邊境竊見保州順安軍以西有平川横袤三十餘里南北逕直並無險阻不經州縣可以大軍方陣安驅自永寧軍以東直入深冀行於無人之地定州但守杜城以西兵未及移則敵騎已越髙陽矣或敵人自定州入冦定兵必依西山扼其歸路彼則束甲徑趍順安定人雖衆兵不及施而敵已出塞此不可不慮也通途曠野蕩然四逹謀者不此為慮而區區過憂北平之衝臣竊駭之西山洞道連屬可以伏竒進則定州當其前退則保州廣信議其後敵人敢入北平則不知順安者也使其知順安之易則北平雖無備且當委而不顧况其有備也相度得保州至西九頃塘度七里以來及保州東陽村堤以東至臧村堤度三十里慶厯中皆曽築堤壅水遺跡尚存若少加補完西納曹鮑諸水則杜城以東塘險相屬敵騎出入惟有北平一路定州之兵依險為陣犄角牽制滹沱横濼為難則可以制其前唐河之流可决則足以斷其後有以待敵而致其來此必勝之術也今具圗進呈其詳悉地步别具條上詔屯田司閻士良馳往相度而士良言檢視保州西九頃塘及保州東陽村堤以東至臧村堤若増接修完櫃蓄諸河以成險阻委實利便然舊基蓋官中隳廢二十餘年悉委民間究詳九頃塘東及楊村堤其間亦有官地臧村堤一帯乃有徐河預完堤坊更伺夏秋雨漲水不日成功内交互民田漸而收買其孫村堤西至楊村堤地勢汙下曽支官錢收買其後有保州牙吏李智自陳上件地土本係官牧羊地趙滋知保州日遂却追還元給價錢地資倖民其地内亦可尋舊屯田分水河㳂河種稻漸成險固或當緩急壅决諸河以制奔突詔可其奏内有侵著民間地土即将係官田土撥還或給其直仍先具所占民田頃數目以聞沈括議據㑹要附八年二月實録俱無之括自誌云翁察訪河北西邊講修邊備易其舊政者數十事際邉自蒲城以東至邊吳淀五十餘里按圗名徐村淀淀泊相屬其實皆町衍大陸無復陂澤之跡戎馬可以直抵深州翁請决徐鮑諸水為塞下屬諸淀上覧奏駭曰圖籍無實如此安用守臣遂决意為之近臣有言塘水可决者翁應之曰横五十里以為壑敗堤洩之非一月不能涸水之漸潰當數百里注於敵中塘間沮洳不容徒騎此足以困敵非中國之患也使翁自遣官營之再嵗而塘成此即㑹要所載也再嵗而塘成則當考括自誌云察訪河北凡三十一事奏可屯田議依舊附此餘並附八年八月四日癸巳廢羇縻懐逺軍古陽縣為懷逺寨述昆縣為鎮省鎮寧州禮丹縣入環州思恩縣並𨽻宜州廢沅州招諭縣及錦州寨入麻陽實録七年八月書併辰州麻陽縣入錦州寨𨽻沅州此月末又書省辰州招諭縣入沅州按七年八月錦州寨已𨽻沅州安得更稱辰州今從九域志實録于十二月末又書廢錦州寨及招諭縣入麻陽今亦不取
