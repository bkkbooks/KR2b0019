body:
  text: 續資治通鑑長編巻九十四宋李燾撰真宗天禧三年秋七月戊午崇儀副使史瑩責授供備庫副使坐所治惠民河隄決壊民廬舍故也本志作崇儀使當考詔河東路不許擕家赴任州軍有官員挈屬在彼者並令發遣離任辛酉知河南府馮拯言父老僧道舉人等列状願赴闕請車駕封中嶽上曰兹事體大未可輕議令拯慰遣之詔河北州軍民有越北界市糧及不係禁物為北界所捕送者並决杖一百釋之三司假内藏錢五十萬貫絹十萬匹學士院言凖詔大理評事胥偃與試偃乃盛度壻又錢惟演親戚欲乞下别處詔送舍人院試自是有親嫌者並如例壬戌責授勾當翰林司入内都知宫苑使張景宗為左騏驥使皇城使王遵度為翰林使崇儀使李昭慶為西京左藏庫使勾當皇城司韓守恩周懐政藍繼宗並罰金悉依前充職坐翰林司藥童挾刃入本署殺其同類故也王遵度宫邸攀附者不詳其里邑見王繼忠𫝊李昭慶繼隆長子後改名昭亮癸亥以久雨命近臣詣廟社宫觀佛寺神祠祈禱甲子京東西河北轉運使言河决壊民田輸税難阻詔應經水州縣夏税許從便送納田産壊者特倚閣之丙寅光祿少卿薛顔言滑州自今月三日雨五晝夜未止河水増漲北岸逼州城請權徙甲仗錢帛置通利軍其軍民聽從便遷徙詔顔規度固䕶必不可則如所請考究竟曽徙與不丁卯詔福建州軍偽命已前部民子孫别籍異財今祖父母已亡詣官訴均分不平者不限有無契要並以見佃為主官司勿為受理尋詔江南諸州軍亦如之戊辰詔以十一月十九日有事于南郊命向敏中為天書儀仗使南郊大禮使冦準為天書同儀仗使丁謂為副使李廸為扶侍使翰林學士承㫖晁迥為南郊禮儀使學士錢惟演為儀仗使太子賔客王曙為鹵簿使權知開封府馬元方為橋道頓遞使入内副都知周懐政為天書扶侍都監自封禪已來特命輔臣兼五使之職及是始復舊制歩軍都虞候英州防禦使馮守信自言占籍滑州頗習隄防利害即命為修河都部署知滑州崇儀使入内押班鄧守恩為修河鈐轄内殿崇班楊懐吉為都監命内殿崇班閤門祇候張綸赴辰澧鼎州安撫招捉蠻人知辰州史方知澧州曺克己辰澧鼎州都巡檢使柴忠荆南駐泊都監趙振同其事供奉官閤門祇候張元晉赴施州安撫招捉蠻人知施州劉永崇同其事尋命綸知鼎州其安撫招捉蠻人事悉罷張元晉未詳何許人綸知鼎州在七月庚辰今并書招捉蠻人事亟罷本史㑹要並不詳當考范仲淹誌綸墓云公之典辰溪也彼蠻人中彭姓一族稱其強占溪洞數州署兄弟以為守國家因其請焉後乃驕叛邉鄙既襲城邑朝廷患之公至築蓬山館理新興掤以要其道且省戎兵條舉十事不及四五而有平凉之行蠻又侵我帝復召公曰僉謂彼可殱焉朕惟弗忍汝往圗之公再拜稽首曰惡草雖㣲天地不能絶其類先王敺之無猾夏爾帝曰俞惟康厥民居公馳傳以臨謂彼蠻者不威不懲不見利不勸廼以諜夫駭其族曰天家使且至方檄兵四道焚若山林毁若巢穴弗滅弗已蠻乃大懼請命公曰納爾爵秩歸我老孺天子聖且仁吾為若請蠻如其教乃疾置以聞詔原之復其命數貢賜如平日生齒之還者對以刀布作石柱刻蠻人之誓揭于疆首自茲威懐迄今將二十年蔑復為患詩云式固爾猷淮夷卒獲翩彼飛鴞集于泮林食我桑椹懐我好音謂蠻如惡禽亦感而化仲淹誌或指此也柴忠未詳趙振雄州歸信人殿前都指揮使忠武節度使曺璨被疾上親幸其第臨問壬申命翰林草制改節度河陽加同平章事制入而璨卒車駕即臨奠之贈中書令諡武懿以其子西上閤門副使儀為引進副使又録其二姪外孫官璨起貴胄以孝謹稱皆自奮勵以世其家習知韜略好讀左氏春秋雖無攻戰之效然累歴邉任領禁衞十餘年善撫士卒忠厚謙静未嘗有過國朝以來重世將相非恩澤進者惟璨一門徐許二鎮又皆世官時論以為榮晩節頗傷吝嗇物議少之璨母常閱其家帑見積錢數萬召璨謂曰汝父履歴中外未嘗有此積也信汝不及父逺矣三司假借内藏錢帛二百四十五萬戊寅賜歙州婺源縣民汪正爵公士蠲本戸差役以捕獲強盜故也己卯羣臣表上尊號曰體元御極感天尊道應真寳運文徳武功上聖欽明仁孝不允凡五上從之庚辰屯田員外郎鍾離瑾言竊見諸州長吏才境内雨足苖長即奏豐稔其後霜旱蝗螟災沴皆隱而不言上罔朝廷下抑氓俗請自今諸州有災傷處即時騰奏命官檢視如所部豐登亦須俟秋成日乃奏如奏後災傷者聽别上言隱而不言則論其罪從之八月乙酉朔交州李公藴遣其弟鶴來貢方物丁亥以天書再降于乾祐縣大赦天下常赦不原者咸除之諸軍並與特支屯駐在外舊無例特支者皆給與賜乾祐縣民秋租十之五並度諸道釋童行廣南官吏聽挈家之治所制曰朕寅奉丕基撫寧中宇慶靈積厚髙明博臨受河洛之秘書開聖真之鴻緒陳嘉牲於崇巘沈瑄玉於隆睢順拜文􅄢之壇恭薦鏤瓊之版儲精淵妙敷化醇醲矧惟咸鎬之區是為神明之奥名山之内福地在焉載嚴曲宻之都式佇鴻濛之駕清心昭格璿極鑒觀由茲鶉首之封薦錫龍綈之檢諭朕以輔徳朂朕以愛民告臨降之先期述延洪之景祐介子孫於千億保宗稷於大寧而又乃顧皇儲繼頒寳命昭其仁孝之志示以報應之祥齋莊載披惕厲彌至考諸冊牒允謂殊尤昔燧皇握機但有蒼渠之刻虞舜負扆止觀河渚之文豈若祚乃菲躬慶及元嗣膺茲繁祉實冠皇圗思與萬邦共均純嘏仰答髙旻之貺用推肆眚之恩郊恩宻邇忽降大赦葢以乾祐天書再降故也及周懐政朱能等敗史官諱之遂改易制辭自恭薦鏤瓊之版以下但云迨茲二紀馴致小康邦本既寧天休允集顧惟隂騭奚獨在予思與萬邦共膺純嘏遂大赦天下臣燾初讀實録國史固疑此赦之必有所為也檢㑹要云以天書而赦文殊不及之因令於諸州所編録建隆以來赦文内尋出全本則其辭蓋昭然且朱能等偽造天書實録正史皆略之惟此制辭差詳恐其亡逸今特著于此原史官所以深諱者為過舉也過而能改善莫大焉此尤可見真宗之盛徳也若乃未𤼵其事竄改其辭使後人漫不可曉既失史官之職又沒帝王改過之善臣燾所以不敢從也此㑹要乃三朝㑹要今五朝㑹要已改云以天下小康故降赦蓋從史也孫奭等諌疏或在此赦後然三月末已載之不復遷改且天書實再降則奭等於初降印上諫疏亦不可知爾命樞宻直學士王曙客省副使焦守節馳驛詣滑州與馮守信京東河北轉運使等議修河夫役時日功限以聞既而守信言河水湍急未可興作請俟來嵗正月詔至時以軍士六萬七千丁夫二萬充役守信所言在壬寅今并書戊子以光祿少卿薛顔為少府監知江寧府邏者晝刼人反執平人以告顔視其色動曰爾真盜也械之果引伏三司言白波發運司采梢三百萬計用船二千隻望遣内官一員於泗州已來撥借公私船供應詔止以官船充用滑州言龍見于決河辛卯太白復晝見乙未徐州言河决水大至城不沒者四版鄜延路副都部署曺瑋以兄璨卒請暫赴京師優詔不許初彰徳軍留後馬知節以疾病留京師踰年表求外任命知貝州兼兵馬部署将行請對上閔其羸令歸本鎮上黨大名之民争求迎謁所苦寖劇遣其子將太醫往診視俄求還京師復遣其姪乘傳齎詔俞其請至則已卒遺命諸子令辭詔塟上深軫悼之贈侍中諡正惠賵賜加等官其子孫四人知節習兵事以方略自任頗涉文藝每應詔亦為詩詠所與遊接必一時名士為治專務抑豪強䘏孤弱性剛直敢言無避未嘗少自卑屈求之武人蓋鮮儷云己亥大㑹道釋于天安殿凡萬三千八十六人先是建道場是日上親臨視以藥銀鑄大錢面賜之釋開封府繫囚杖以下罪壬寅詔謀殺故殺刼罪至死因丁亥赦原者諸州並依強刼賊例刺配本城情重不可宥者部送京師自今著為定式丙午三司使李士衡言京西河北轉運司計度於河東晉絳州發糧儲三十萬赴滑州山路險峻慮或愆期請止於滑州通利軍入中優給其直從之戊申自瓊林苑迎奉天書入内庚戍遣使安撫水災州軍度支員外郎判度支勾院方仲荀京東路右正言判戸部勾院劉曄京西路鹽鐡判官監察御史劉平河北路有合寛䘏改更事件與轉運使副所在長吏㑹議施行詔倉草場令司天監依先降指揮差人監門以替使臣仍自今有犯贓罪者永不得差九月乙卯供備庫使侍其旭言廣州多蕃漢大商無城池郛郭雖有海上巡檢又往復不常或有剽刼則乏禦備請徙廣恩州海上巡檢一員廨於廣州市舶亭南所冀便於防遏從之庚申三司假内藏金二千七百兩壬戌命吏部郎中直史館兼太子左諭徳崔遵度為契丹生辰國信使西京左藏庫使王應昌副之三司鹽鐵判官監察御史劉平為正旦使供奉官閤門祇候張元普副之是日重陽賜宴苑中宰臣向敏中暮歸暴中風眩亟命中使挾太醫診問乙丑詔徐州民僦居官舍者免其直賜大理寺丞王質進士及第質旦之猶子獻文召試故也詔割澶州公用錢百萬分給衞州通利軍俟河平日仍舊時轉運使以河流注溢澶州路絶使車皆由二州軍故有是詔庚午以滄州樂陵縣尉郭上行為本縣令賜緋旌捕賊之勞也三司使李士衡言京師每嵗所用材植並令陜西州軍給錢配買農民重費逋欠尤多請自今聽民採斫入中官置場納之給以文引詔可仍悉蠲所逋欠甲戌以河北轉運使戸部郎中段􅁮為太常少卿知廣州尋加右諫議大夫曄頗精吏事素與丁謂善故謂亟用之及歸自南海而謂已敗故亦不復處要劇云詔自今應犯贓注廣南川峽幕職州縣官委逐路轉運使常加紏察再犯贓罪者永不録用時司勲員外郎梁象言川峽幕職州縣官曽坐贓左降者多復恣貪踰以擾逺民請自今犯贓者不注川峽官並除廣南逺惡州軍上以廣南亦吾民也且非自新之道故特有是詔丙子詔宗室輔臣學士三司使副尚書丞郎給諫舍人待制直龍圗閣于清景殿觀御製賜皇太子元良述六藝箴承華要略十巻授時要略十二巻又以國史兩朝實録太宗文集并御集御覽羣書賜皇太子遂宴從官辛巳給事中參知政事兼太子賔客李廸言昨日東宫賜宴臣獲陪侍皇太子舉動由禮言不輕發視伶官雜戱未嘗妄笑左右瞻仰無不恭肅上曰常日居内庭亦未嘗妄言也冦準曰皇太子天賦仁徳嚴重温裕復禀聖訓勤道力學實邦家之慶也登州言髙麗遣禮賔卿崔元信來貢元信至秦王水口遭風覆舟漂失貢物人多溺死詔遣中使存撫之又令登州凡入使物色官給脚乘津遣赴京壬午徐州張旻言伏覩辛亥制書罪無輕重咸赦除之又覩近詔官典犯贓奏裁伏以渙汗之恩出則不復絲綸之命審乃惟行弛而復張民不為信願守一成之法免煩三尺之科詔從之冬十月丙戌以知秦州太常少卿李及為左司郎中樞宻直學士依前知秦州秘書監知禮儀院判秘閣太常寺楊億丁内艱時方講郊祀以億典司禮樂之任未卒哭起復工部侍郎令視事丁亥詔益梓利䕫州路縁邊界人銅器許於邊界用之州縣勿責其違禁其内地百姓齎入邊界鬻者即論如法先是富順監言始姑鎮邊人家有銅鼓子孫傳秘號為右族而朝法所禁故有是詔中書言應保舉幕職州縣官充京朝官請俟所舉將及五人即以名聞庶懲濫進從之令保安軍築子城從鄜延部署曺瑋之請也壬辰召宗室近臣於後苑觀西天緑豆小香占城稻上作詩使之屬和甲午免衞州民三年科率以蝗旱流移新復業故也乙未三門發運判官殿中丞王直為監察御史充三司度支判官直上書言河決事稱㫖故奬之丙申禁興劒利等州三泉縣白衣師邪法己亥禁京師民賣殺鳥獸藥庚子詔西京分司官太府卿裴莊職方郎中韓昌齡將來郊禋各許奏䕃一子時莊等上封陳乞中書言分司官無此例上閔其年髙特有是命韓昌齡初見咸平四年七月先是滑州浚減水河畢功設祭有鹿隨流而下獲之孟州河隂縣水次獲龍卵皆以獻辛丑召輔臣觀於後苑己酉知審刑院盛度言在京及諸路止有斷案三道值降聖節不奏自餘絶無刑牘請宣付史館冦準曰漢文帝唐明皇時皆幾乎刑措蓋當時諸侯專殺有聞於朝廷者有便宜而行者今幅員萬里徒流以上合聞逹者皆奏牘以此較之則聖朝刑訟清淨過古昔矣此陛下以徳化民精意欽卹所致臣等不勝大慶再拜稱賀詔奬度等庚戌免京城和市修河芻藁辛亥詔滑州修河兵夫方屬凝寒宜令官吏常切存撫無令失所御史中丞馬亮建言士民父祖未塟毋得輙析從之此事不得其時因亮為中丞即附見詔紏察刑獄司自今免鞫劾公事如有定奪即仍舊先是紏察官吕夷簡言本司累奉詔㫖勘鞫定奪公事或止將公案詳閲亦無妨礙若勘鞫公事即動須追逮罪人辨證詞理顯是兼置刑獄不便故令止之中書言三司判官轉運使副秩滿當遷者但進士及第或帶館職者皆欲授名曺從之景祐元年六月癸丑可参考十一月乙卯詔自今犯酒麴銅鍮等有死刑者去之中書參詳請令所在杖脊黥面配五百里外牢城詔可丁巳吏部流内銓言本司令録稍多員闕甚少請權借審官院京朝官知縣闕注擬一任詔審官院以五千户以下縣借之又言舊格廣南西川幕職州縣官偶有假故三二十日或一兩月即不叙為資考赴調日再任逺地請自今一兩月以下偶有私故不滿任者並為成資更不再注逺任從之戊午詔翰林侍讀學士刑部侍郎張知白序班在玉清昭應宫副使林特之上時知白自天雄軍徙應天許便道朝覲故也己未張知白言河北提舉捉賊司指使殿侍王應捕賊有勞身中重創命補三班借職辛酉閤門太常禮院上大禮稱慶合班圗皇太子序位在宰相上太子懇讓上以諭輔臣冦準等面陳儲副之重不可謙抑望遵儀制凡再請乃許詔自今給事中諫議大夫中書舍人母妻並封郡君初止封縣樞宻直學士給事中王曙冦準女壻也因改舊制議者非準専私而不忌專私不忌據掖垣叢志戊辰翰林學士錢惟演言正陽門習儀皇太子立於御坐之西左右以天氣暄煦持繖障日太子不許復遮以扇太子又以手却之文武在列無不瞻覩有司設馬臺於太廟内太子乘馬至門命移出蕭屛外下馬步進及南郊壇前驅者觧青繩將入外壝太子亟止之將及外壝即下馬伏以太子英叡之徳既自天資謙恭之志實遵聖訓雖漢儲被詔不絶馳道五官正服以見侍臣比茲巨美不可同日而語矣昔桓榮以儲宫專精博學謂之國家福祐書于史冊今太子持謙秉禮發自至誠士民傳説充溢都邑伏望宣付史館以彰盛徳詔奬皇太子仍優答惟演己巳謁景靈宫庚午饗太廟辛未合祭天地于南郊大赦天下非刼殺鬭殺已殺人十惡至死偽造符印持火盜官物官典入已贓咸除之鬭殺可閔者奏裁河北河東陜西縁邊監當京朝官使臣幕職州縣官自今並許擕家赴任川峽廣南監押廵檢駐泊捉賊監當使臣並與二年一替川峽幕職州縣官得替不押綱運者並給倉券供奉官以下充閤門祇候者自今五年考課其三班使臣合磨勘者雖外任亦許施行見在銓曺幕職令録未注擬者兩任五考以上無贓罪者皆以名聞乃詔翰林學士盛度樞宻直學士王曙左諫議大夫王隨與判銓陳堯咨宋綬同試身言書判優者與京官次則幕職循資令録與幕職又次者皆補近便大處自是每有郊恩悉然知應天府王曽言府民五戸共撲買酒場歲課三萬餘緡逋欠積久其兩戸已破産三戸累嘗披訴而計司慮虧歲課不肯與奪乞賜蠲減上謂輔臣曰南京太祖興王之地比他處尤當優卹豈可靳茲小利重困吾民乃詔依東西京例令民取便買麴醖酒其三戸逋欠悉除之是日夜漏未盡二鼓大風揚沙寒甚壊青城就陽門幔屋日出乃止甲戌皇太子言於玉清昭應宫建殿置經藏以資聖筭功畢有詔褒答賜殿名曰長生崇夀丁丑謁玉清昭應宫還御天安殿受冊尊號己卯崔元信率東西女真首領入見别貢中布二千乞佛經一藏詔賜之還其布以元信覆溺匱乏别賜衣服繒綵焉女真首領又言各以本土馬來進貢中途皆失詔特給其直庚辰禮儀院言自今文武官丁父母憂起復不赴宴㑹外自餘服制式假滿日並赴奏可契丹遣使工部尚書蕭霞哩副使尚書左丞馬翼來賀承天節中書言諸道租賦欺隱至多官私土田侵冐亦甚欲條貫畫一專委逐處提㸃刑獄管勾從之此據㑹要天禧三年十一月事當考詳十二月癸未朔賜自京至滑州馬遞軍士絹綿袍丙戌富州蠻酋向光澤表納疆土上曰朝廷得之安用當是其親族不相容爾命轉運司察之果然辛卯右僕射門下侍郎平章事向敏中加左僕射中書侍郎兼吏部尚書冦準加右僕射通王元儼為保平定國節度使進封涇王敏中以病不與祀事奉表辭所加官又繼表求觧皆不許宣徽北院使知樞宻院事檢校太尉曺利用吏部尚書㕘知政事丁謂並為樞宻使時輔臣以郊恩俱進官故事嘗為宰相而除樞宻使始得遷僕射乃以謂檢校太尉兼本官充使樞宻使舊兼御史大夫自利用謂始去之兼御史大夫據㑹要當考太平興國六年九月石熈載始用文資正官充使賜宰相御製正説奉道詩各十巻歲時新詠三巻癸巳以同知樞宻院事任中正周起為樞宻副使乙未三司奏凖詔與内藏庫議自今擬鹽税錢及歲别出錢六十萬赴左藏庫給用從之熈寧五年二月十七日改此制當考丙申謁啓聖院太宗神御殿令西京増給應天禪院常住錢日三千從馮拯之請也戸部員外郎知制誥晏殊等言舍人院書籍殘缺帷帳什物多敝公錢至少望賜國子監印本經書令儀鸞司供帳冬季三司給炭乃増月給為三十千餘從其請戊戌謁玉清昭應宫景靈宫壬寅幸㑹靈觀祥源觀上清宫開寳寺乙巳詔諸路州府軍監都知兵馬使年滿委轉運使閲才質書札堪班行差使即令赴闕其不堪者並送本所依舊例補攝長史司馬丙午翰林學士錢惟演上言伏見每賜契丹髙麗使御筵其樂人詞語多渉淺俗請自今賜外國使宴其樂人詞語教坊即令舍人院撰京府衙前令館閣官撰從之既而知制誥晏殊等上章援引典故深詆其失乃詔教坊撰訖詣舍人院呈本焉戊申契丹遣使左武衞上將軍耶律繼宗副使衞尉卿鄭去瑕來賀明年正旦辛亥淮南轉運使言宿亳等十六州軍仍歲旱其來年第三等已下民戸蠶鹽請權罷給從之是月河中府處士李瀆陜州處士魏野皆卒詔各贈秘書省著作郎賜其家帛二十匹米三斛州縣常加存卹二税外蠲其差役瀆性嗜酒人或勉之答曰扶羸養疾捨此莫可從吾所好以盡餘年不亦樂乎預知死期因促家人置酒與諸子訣野與瀆有連瀆訃至野哭之慟謂其子曰吾不可去去必不至第遣其子赴之才六日野亦死時甚異焉野善王旦冦準每贈詩必勸以早退旦準皆不能用識者髙之供備庫使郭懐玉為金部員外郎提㸃中書五房公事是歲天下戸八百五十四萬五千二百七十六口一千九百四十七萬一千五百五十六
