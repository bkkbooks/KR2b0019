body:
  text: 續資治通鑑長編卷四百十七宋李燾撰哲宗元祐三年十一月丙午三省言在京堂除差遣累有増改尚書吏部闕少官多今裁定門下中書省正言尚書省左右司六曹郎中御史臺監察御史祕書省正字館職校理以上寺監長貳丞太常博士正録侍講説書開封推判官府司録開封府祥符咸平尉氏陳留襄邑雍邱知縣登聞鼔院檢院王府翊善侍讀侍講記室小學教授知大宗正丞事諸王府講書記室睦親廣親宅講書左藏庫三京留司御史臺商税院進奏院並中書省差寺監主簿太常寺太祝奉禮光禄寺太官令元豐庫牛羊司京東排岸司諸宫院教授太康東明考城長垣知縣並吏部差俸錢依在京分數從之戊申刑部言河北東路提㸃刑獄司奏請遇有凶惡及羣黨賊盗委通判提舉捉殺許差禁軍十二人給器械随行詔差三十人歸任日罷庚戌詔新除工部員外郎高士英改為權先是士英自太僕寺丞除尚書郎言者論士英資淺因士英辭免故有是命初一日除工外十二日改府界壬子中書舍人彭汝礪言臣准禮部牒奉㫖令兩制兩省同共看詳修立到考校詩賦并格式聞奏臣伏念自井田之法壊學校之教廢弛鄉舉里選之法不行朝廷取士非古其陋至於用詩賦極矣先皇帝受天明命悼道之鬰滯奮於獨斷初用經術造士以革數百千年之弊士知本且向方而議者獨病辭章之不工欲踵隋唐之弊法狎玩經説耗蠧道真學者疑之不知取舍夫六經之說更伏羲堯舜禹湯文武周公孔子十數聖人而後備大窮天地之變微盡萬物之理其要則人心而已古之君子所以治身所以治天下國家未有出不由户何莫由斯道也周衰典籍棄而不用漢興訪遺書立博士置弟子員公卿大夫以儒雅縁飾吏事雖已非古而文章温厚號令爾雅猶有三代之遺風焉其流至於桓靈士以節義自高不為死生禍福屈漢亡而後猶更數世自晉逮唐又不能及漢治亂之本推原可知詩賦不經可以無辨是猶滑稽俳優之戲門巷謳唱之辭而已而議者欲以此教人欲以此取士臣考於心驗於古参於今反覆曲折終未見其可天之生斯人也其聰明知慮皆可有為也惟上之所以養之而已昔者以詩賦取人故人亦巧於對偶以經術取人故人亦巧於議論使取之以徳行亦将為徳行矣昔罷詩賦從經術是将引而進之也其至於徳行也猶㳂河而至於海沛然莫之能禦如復用詩賦是所謂下喬木而入幽谷也夫善治者因人心人心之所欲因而行之人心之所惡不敢强也士既為大人今抑而為小人既進矣又却而止之非所以養成人才也先皇帝立政造士非臣下所能窺測深淺高下小大法之未完或乆而有弊變而通之推而行之實有所待臣愚以為今學校選舉宜一用元豐條約因今經明行修賢良方正之科而稍加損益焉盖亦庶幾矣如詩賦决當寝罷臣渉道淺陋不足以單辭獨見咈衆人之所同是若朝廷以已行之法必未能改為更乞下學士大夫詳議可否以求其中庶㡬是非好惡有所歸宿黄貼子稱伏自朝廷有復詩賦議論學士大夫知其不可者衆難遂施行比見催督太學即用此考校又有乞殿試三題者而朝廷不以為非乃知欲復詩賦不疑夫天下之所恃以治者人才也人才惟上所養而已天下治亂廢興所由風俗盛衰厚薄是繫今制為名聲列為爵位引之以雕蟲篆刻無用之文敗壊人才為甚此其所繫者大臣實不敢不言而使朝廷終負謗議於天下後世惟陛下裁察此據雜録第四冊元祐三年十一月初十日奏汝礪集亦有此但無月日要見令兩制兩省同共看詳考校詩賦格式指揮的是何日實録於二年十一月十二日庚申書令禮部立詩賦格式但不書令兩制兩省看詳事議用三題乃九月九日指揮已附十月末李常等三奏附閏十二月末元年閏二月二日詔禮部與兩省學士待制御史司業集議并四月三日蘇轍上官均議當考右正言劉安世言伏見近除太僕寺丞高士英為工部員外郎臣以不知士英歴任次第不敢妄論繼聞御史臺列奏稱勘㑹到資序有違新制復降指揮令添權字深維義理有所未安輙具開陳庶禆聖徳之萬一臣伏觀陛下聼政以来未嘗少以名器私於外家此固天下之人所共稱頌今士英除命必恐止是執政掄才進擬本非陛下之意况寺監丞之出例為監司以士英乆佐太僕除一郎官固不為過然朝廷今年六月二十八日新立法制須得第二任通判或雖初任而實歴外任親民二年之人方得用為員外郎及開封推官盖是三省進擬之際失於檢勘遂致錯誤今乃重廢已行之命而創添權字則是執政依違遷就因人變法恐非所以成陛下無私之政臣竊惜之伏望聖慈特降中㫖别授士英一合入差遣示天下以至公之道豈勝幸甚甲寅詔新除工部員外郎高士英提㸃開封府界諸縣鎮公事太皇太后慮違新格故易之右正言劉安世言臣近以韓玠不當除利州路轉運判官兩具論列未䝉施行玠雖甚㣲固不足頻煩天聼然而苛虐暴急見於已試同時省罷無過之人今為通判往往未復差遣玠實有罪茍免竄出河東未乆遽還使節輕重倒置有害政體故敢陳奏乞罷新命繼聞臺臣亦有章疏而朝廷沮遏公議不為追寝臣固疑之詢諸縉紳果有異論皆謂執政之間有玠姻家隂為之地是以臺諌之奏抑而不行信如此言公道安在况近者三省奏擬高士英為權工部員外郎竊聞獨出睿斷以為終是撓法遂行追改中外無不傳誦聖徳心悦誠服今執政大臣凡是姻戚之家即不避嫌疑更相汲引及言事官明據罪状論列即不恤義理極力主張甚非所以稱陛下至公擇人之意也伏望聖慈詳覽臣兩奏事理特降指揮罷玠新命以抑僥倖當考韓玠竟罷利漕否宣義郎簽書濠州判官包綬為少府監丞綬拯之子文彦博言綬能世其家恬静自守不茍求進乞用吕誨劉庠例特加奨擢故也吕誨子由誠劉庠子敦夫皆以父故特加奨擢當考右正言劉安世言臣伏見朝廷立法内外臣僚保薦之員嵗有定數而兩制侍從以上又得用十科之目使之引類其於求才之道固已備矣乃自近嵗以来漸開巧進之路屢見近臣連名薦士臣聞名器爵禄人之所趨使之積勤而後遷則衆各知難而守分今若多為捷徑容使躁求人懐覬覦何所不至而况被舉之士未必皆賢朝廷不復銓量往往即加擢任遽離常調遂得美官後進小生不安義命奔競相效無復亷恥非有懲革将敗風俗伏望聖慈特降睿㫖今後除依法奏舉之外不許近臣列薦所貴少抑僥倖之徒上裨忠厚之化詔自今臣寮特有薦舉毋得列銜聞奏丙辰權知廣徳軍賈易權發遣江南東路提㸃刑獄詔左右中散大夫以二十員左右朝議大夫以五十員為額樞宻院言諸路所奏夏國主物故今威明噶勒藏管勾國事國母更不管勾頗相符合惟鄜延路不同慮賊中自有變故用此遷延以疑邉備詔趙卨范純粹選信實之人體訪有無變異鉤索西人情偽参驗事實以聞詔辰州知州自今互差文武臣己未宣政使内侍右班副都知嘉州刺史劉有方領榮州團練使承議郎陳次升為兵部員外郎此據實録庚申吳安持為都水使者此據政目十八日事安持前資當考詳増入六年十二月二十六日再任辛酉樞宻院言湖北都鈐轄唐義問奏多星堡般運金糓毁撤屋宇殆盡其城壁若存舊址慮蠻人聚集為姦詐詔苖時中謝麟唐義問已廢罷堡寨城壁量度毁撤其沅州渠陽寨先廢堡寨如有城壁尚存者亦相度施行訖以聞苖時中知桂州元豐七年六月元祐二年十月再任謝麟知潭州元祐元年五月舊録云先帝拓土列置城寨外靖邉圍皆已就緒無故毁撤新録辨曰罷渠陽事前已辨之今刪去壬戌録故蕃官且星男吹達爾濟吹邁並為三班借職甲子前奉議郎校書郎司馬康為著作佐郎兼侍講康初免喪即召用之乙丑詔宰臣執政官廕補初遇大禮奏本宗及異姓親各一人次遇大禮許奏本宗或異姓無官人授官有官人轉官循資或陳乞差遣各一人仍不得轉入朝官循入支掌即應奏承務郎殿直以上許換升一任不得升入通判其餘官應遇大禮合廕補者初遇次遇並依舊三遇許奏有官人舊條應奏兩人止者次遇止奏有官人後遇大禮廕補其隔間資次並凖此即被廕白身人未出官亡没許以應奏有官人恩澤補奏已致政官遇大禮合廕補者不得過兩次宰臣執政官給使人應得恩例並四分減一三省六曹臺省寺監諸司吏人四分内逐等各以三分為額其餘分並各不減候有闕毎四人補三人減至額止其後三省以四人補三人選不行及餘分不減指揮未明詔今後隔間轉減先補一人次減一名係試補者凖此限定人數就試者權増一倍後减至正額日依舊其餘分不减新本削去宰執給使以下政目二十三日裁減宰執遇大禮第一次依第二次内一名奏有官者餘官第一第二依舊第三依前次遇凖此致仕不過兩次並以元祐四年大禮為第一宰執給使恩例四分減一省臺寺監人吏四分以三分為額餘分不減玉牒云減定大禮廕補二府給使思例及省臺寺監諸司吏額本紀獨不書此不曉其故上官均奏請已附元年八月二十六日二年二月末政目十二月又書是月比較入流四年正月行又閏十二月太皇太后云云并紹聖元年十月十三日詔合與此參考韓駒云元祐八年詔减任子恩澤應已經奏薦者今嵗並停許陳乞差遣或轉官或循資升任不得過通判轉官不得升朝循資不得過支掌惟陳乞無限並以元祐八年為始按減任子恩乃元祐三年十一月也駒云八年誤矣御史中丞李常言臣伏見尚書吏部四選官共三萬四千餘人入流名品幾七八千數官濫員冗無甚於今竊以内外闕次固有常限入官注擬浩然無窮守候差遣須近二年方得一闕交承期限復又二年有餘投状争訴日有數十士檢凋壊職此之由不澄其源日益以甚臣愚欲乞詔有司取入流名目審行裁定徼幸濫進稍加懲革凡身以藝能及勞效入仕與因人授官者有間矣自當别為兩塗兩塗之間又當判異流品以立條約如此則官雖濫員雖冗不難處矣若應舉及進獻文字軍功告補人吏出職之類以藝能及勞效入仕者也諸色奏薦之類因人授官者也雖然其流有清濁所因有貴賤誠能就其品目比類較量各定以年限立為止法則濫官冗員有時而減矣果如所請其效猶在數年之後恬不加慮為弊滋深茍不及此時特加裁約異日愈難整治近者雖降指揮裁損執政官而下奏薦人數然入流之冗不止於此非逐一講究各立條約恐終未盡善丁卯大食麻囉㧞國遣人入貢詔嵗以十月給望火廵城兵衣裘戊辰中書舍人曽肇言臣今年春奉使契丹歸嘗奏論河北開孫村口減水河未便乞更講求利害事人微言輕不能仰動天聼後聞止用兵卒興功彌年未見成效繼聞召都水使者王孝先河北轉運使謝卿材判官張景先赴三省詢訪利害而三人所論不同朝廷未敢臆决遣官行視然詔書但令相度開孫村口有無未盡利害如孫村口不可修即於不近界河踏逐一處則是雖日遣官行視而必欲回河之意已定於廟堂之上矣不惟如此又下河北路計置舊堤梢草一千餘萬且令先置五百餘萬論者以為既治舊堤則是决為回河之計然則朝廷遣二近臣從數十官吏銜命而出不知果何所為也臣雖愚懵意朝廷必謂梢草之類不可倉猝而具一日所遣官還奏可以回河則來年先治舊堤開減水河爾時旋營梢草公私必受其害不可不預行計置此誠先識逺慮非衆人所及也彭汝礪云云已見十一月二日然臣竊有私憂過計須至不避斧鉞披露腹心為陛下言之夫河之利害與夫可復不可復之勢既已遣官行視則當俟其還奏然後可决此固臣所不敢妄論也至於事有可以坐而知者今日之民力是也盖自數年以來河北京東淮南數路災傷為甚今嵗河北並邉稍熟而近南州郡亦皆亢旱京東即今米價斗百餘錢盗賊並起京西災儉尤廣淮南秋田粗收而春夏麥價甚貴百姓饑殍未蘇瘡痍未復正當寡求省事以休息人力若來年雖未大興河役止令修治舊堤開減水河亦須調發丁夫本路不足則及鄰路鄰路不足則及淮南陛下視今日之民力果可以堪之乎民力未堪則雖有回河之䇿及梢草先具将安施乎陛下若以河患為大必欲興作驅數路之民聚之河上暴露風雨饑凍所廹弱者羸瘠死亡強者逋竄或轉為盗賊縣官何以禦之又况一人在官一家廢業行者齎居者送方春農時害其耕作來嵗水旱之變雖未必有而人力不至田為汚萊饑饉之災可以前知矣陛下豈忍驅此數路之民納諸溝壑之中乎不惟民力如此方今縣官財用日蹙河朔尤為貧敝徃時積榖雖多因去年遣使賑濟務在大發倉廪雖不甚災傷地分與上等優足之家例皆賑貸儲蓄殆空即今州軍倉儲有不及數月庫錢有不能支吏俸一月者今嵗開減水河用工不多已費四十餘萬貫若更大興工役修六七百里之舊堤且謀閉塞决口回復故道不知其費㡬何雖以先朝所蓄餘錢或可以支後将何以繼之乎大抵縣官不足必取於民臣恐異時百姓有困於征斂者矣其源甚微流弊甚大此不可不察也陛下臨政以來愛恤斯民可謂至矣奈何於災傷疲瘵之餘興此大役以重困之歟臣知聖心豈忍出此必謂河之為患有大於此者故不惜勞民力費國財以成乆逺之利耳盖今之言河患者不過曰壊御河堙溏濼害民田此猶其小者爾河漸北注失中國之險最莫大之患也雖臣之愚亦不敢謂此為不足患也然竊以為壞御河堙溏濼害民田特數州之患耳至於失中國之險則又未然之事有無盖未可知而其患逺者也豈若舉數路疲瘵之民以任莫大之役使之暴露饑凍離鄉失業又有死亡逋竄之憂其為禍博且近矣豈特數州之患而已乎民者國之本也根本一揺豈不甚可畏乎臣愚非敢謂河必不可回故道决不可復也姑願陛下徐徐云爾愛養民力至於充實經理財用使之有餘在天時無水旱之變在人事無不順之理然後可擇利害按視形勢見其可為一舉而收成功豈不善哉伏望陛下因臣此言審思博訪速下詔書罷買梢草戒飭行河之官務要利害得實俟其還報果有可為亦須一二年後以漸興役如此則民力無傷事功易就為今之計莫過於此臣備位侍從義當體國知而不言則為失職言而不盡則為不忠惟陛下察其誠而恕其狂妄幸甚幸甚又言臣材薄望輕自知所言難以取信惟恃陛下聖明特賜省察盖河决而北已㡬十年未應一旦便致大害而休養民力愛惜財用乃是今日先務實繫國家大體論者或謂河勢變决恐失此時别有移改臣竊以為河若果有移改雖一面興役豈能遏之使住若工役既興而河有退背不免罷役物料人夫尤為枉費盖大河非人力可回其來已久惟稍緩之審度利害最為得䇿若非出自聖斷臣恐論議無時而定又言臣具奏已久日俟朝廷自有施行至今多日未聞指揮須至再凟天聼伏望聖慈察臣所陳益採聼公論若一言欺罔甘俟誅竄是月右正言劉安世言臣昨於十月十二日上殿陳奏胡宗愈匿宰相之私親盗中司之要任欺罔人主之聼隳廢祖宗之法加以徇私立黨毁滅亷隅誠不足以副陛下體貌之意慰四海具瞻之望自後繼進三疏極言其罪至今未䝉施行臣雖至愚不能窺測聖藴然竊嘗深慮陛下所以力遏衆論未賜指揮者豈非謂胡宗愈進用方踰半年今遽罷斥恐人譏議以為自信不篤用人不終者乎若清衷所有萬一如此臣竊以為過矣祖宗以來登用大臣何嘗不考合僉言採察人望茍衆心未服公議不與寜使詔令有反汗之嫌不容小人乘君子之器著之信史可以稽考至如神宗皇帝時尚書左丞蒲宗孟公宇擅有修葺為御史中丞黄履所劾亟令罷免王安禮以閨門私故為侍御史張汝賢彈奏尋亦去位陛下踐阼之後優禮輔弼去年李清臣以不甚治事為御史中丞傅堯俞等一言亦便外補豈若宗愈上則欺君亂法下則背公成朋不恥無義置之廊廟實累聖明自古及今未有任君子而不治用小人而不亂者盖甘言美辭足以感移人意小節偽行足以欺惑世俗及其得志茍患失之隂引奸邪廣布腹心根深蔕固牢莫可破則其為國家之害将有不可勝言者矣故陸贄之論以謂操兵以刄人天下不委罪於兵而委罪於所操之主蓄蠱以殃物天下不歸咎於蠱而歸咎於所蓄之家此言雖小可以喻大伏望陛下曲回天聼詳覽衆言進有徳以尊朝廷黜有罪以服天下早以臣等言宗愈章疏付外施行不勝至願又言臣昨所奏陳胡宗愈罪状十二事非敢誣捃皆有實状可以按視凡在廷之臣有一於此已可斥逐而宗愈積累巨惡至於十數言者交攻半年不止偃然居位略無畏心凌蔑風憲毁棄亷恥豈不負朝廷體貌之意累二聖知人之明臣伏見宗愈之除中丞在吕公著秉政之日雖是姻戚隠而不言外託用才之名中為立黨之實使宗愈貪權懐惠不復糾繆繩愆以此營私何所不可䝉蔽人主之聼隳廢祖宗之法人臣之罪莫大於此今公卿士民盡知二人之欺罔而臺諫官多出公著之門終無一語敢及此事陛下試取衆人言宗愈之疏一一省閲則知臣今日所奏為不妄矣公道陵替昔賢所憂豈謂聖朝目覩斯弊嵗月寖久恐非國家之福此臣所以夙夜憤懣痛心疾首而不能自己也伏惟陛下審察衆情詳觀事理若原心定罪則公著宗愈均是欺君宜正典刑以示中外或聖意未欲以一眚遽廢老臣即宗愈他罪尚多伏乞特行罷免以慰天下忠臣義士之望又言臣自四月後凡一十二次奏疏論列胡宗愈罪状至今未䝉付外施行臣夙夜思念不遑寜處竊謂祖宗以来臺諫官之論執政者多矣果中其罪則大臣無不罷免或所言失實則臺諌官亦須降黜盖進退之義不可不正是非之理不可不明未有君子小人并容於朝廷者也今宗愈以姦邪之才據紀綱之任欺君亂法背公營私肆行貪婪毁棄亷恥臣等前後章奏至於十數陛下一切留中無所可否邪正並立枉直兩存上違累聖之舊章下失萬邦之屬望臣之於此何以為心見惡不撃則非忠畏禍中輟則非義使邪黨漸登於要路大姦久處於廟堂寖生厲階害及天下臣恐異時之公議追咎今日之言官雖伏重誅豈能塞責臣所以不避煩凟之罪屢陳迫切之言伏望聖慈特垂省察若宗愈之罪惡既皆得實即乞早行罷免以慰中外之望若臣之所奏稍渉誣罔亦乞重行降黜以為妄言之戒惟冀早施睿斷明示天下不勝幸甚
