body:
  text: 續資治通鑑長編巻三百七十五宋李燾撰哲宗元祐元年四月丙申吏部言應大小使臣磨勘投納文字内有不圓但有照驗並依承務郎以上條貫委尚書相度並不取索從之陜西轉運司言本路近嵗賊盗多出商山乞将商虢二州及永興軍乾祐縣山居百姓並依重法地分施行詔强盗三人已上並依重法地分施行右司諌蘇轍言臣近奏乞招河北保甲充禁軍聞已有朝㫖令逐州軍長吏等優給例物寄招在京禁軍去訖臣竊謂京畿諸縣保甲事體與河北無異而所在闕額禁軍尚多欲乞指揮京畿諸縣一依河北已得指揮招募施行臣又聞河北河東舊有義勇自來每年冬教以為邉備民所習慣不以為怪畿内百姓非邉民之比今來保甲雖罷按閲而未免冬教民情未安亦乞特與放罷十一月二十六日可考蘇轍奏請從違當考二録無之王巖叟朝論奏乞罷教畿内保甲云畿界舊來無義勇今教之人心不寧不如罷之為便當與蘇轍所言並考戊戌朝奉大夫集賢校理鄭穆為國子祭酒集賢校理己亥看詳訴理所言應係内降探報公事於法不合受理者如内有情可矜恕即逐旋具事理申奏從之朝奉大夫范純禮為吏部郎中八年六月末司馬光薦純禮職方郎中李周為太僕少卿承議郎右司郎中張汝賢為直龍圖閣江淮等路發運副使勾當皇城司内侍押班劉有方令再任詔揚王顥荆王頵遷外第賜銀絹各五千每年各添公使錢五千貫並特支與實數仍給見錢本府提舉官翊善侍講記室㕘軍内知客入位使臣醫官直省官楷書殿侍書表宅案司通引客司管勾手分等各賜銀絹緡錢有差詔内外待制太中大夫以上舉第二任通判資序曽歴親民差遣堪充轉運判官者各二員餘依今年二月二日舉監司指揮到官之後才識昏愚職業堕廢薦才按罪喜怒任情即各依本罪大小并舉主並加懲責施行御史中丞劉摯言伏見狄諮劉定並與外處宫觀差遣反以清局優俸養之伏請别行黜責詔狄諮降授四方館使劉定降一官差遣並依舊初責在三月乙亥諮定責詞蘇軾所草其畧云公肆其下曲法受財收聚毫末與農圃争利使民無所致其忿至欲賊殺官吏朕以更赦置之閑局而公議未厭吕公著掌記狄諮與劉定同領保甲而諮為惡不至如定之甚昨並責與宫觀特以諮家在京故令本處居衆謂責諮太重貶定太輕謂諮可令任便居住三省言中書省諸房承受到尚書省取㫖文字如有進呈訖留俟呈後并不行文字並限三日内報知尚書省其勘㑹未圓須合再行取㑹者亦限半月一次具見取㑹未絶事目報尚書省諸房各置送中書省文字簿候報到勾銷從之前此尚書省言令中書省諸房各置尚書送本省取㫖簿隨事𦂳慢闗㑹舉催復有是請前此以下新録削去詔應係因給納常平免役事添置丞簿並行省罷内縣丞如委是事務繁劇難以省罷處令轉運司存留保明以聞右諫議大夫孫覺言去冬以來天乆亢旱無大雨澤麥已不收春種失時人方闕食陛下側躬䘏災無所不至親御便殿慮問囚徒所犯非死例從寛减憂勞之至而聖澤未至浹洽者或有所在减降之恩雖出自聖意然獄吏治囚根究未見本末或㑹問在逺州縣候事畢議法始引减降得從輕坐臣以為在京左右軍廵司録司乞差兩制官一員畿内諸縣差諫官御史一員分視獄囚已殺人及重傷守辜外皆酌情約法减降區斷應照驗未圓㑹問未到者並許召保押出知在以稱聖恩蕩滌之意詔在京並開封府界諸縣見禁罪人内有根究未見本末或㑹問結絶未得者在京差左司諫王巖叟開封府界諸縣差監察御史孫升親往逐處分視獄囚與當職官同看詳除已殺人及重傷守辜外餘并酌情約法一面區斷内府界諸縣徒罪已下不該刺配者亦許一面斷遣訖奏應照證未圓㑹問未到者並召保知在聽候斷遣新録但云親徃分視獄囚約法斷遣與當職官以下並削去工部侍郎王克臣提舉修盖景靈宫神宗皇帝神御殿以孫永遷吏部尚書故也都水監言廣濟河以京索河源轉漕京東嵗計今若依舊即於宣澤門外置槽架作通流入咸豐門裏由舊河道復廣濟河源應接漕運從之三月十九日十二月二十二日禮部言太常寺狀真宗皇帝仁宗皇帝英宗皇帝配享功臣並於山陵前下兩制定議當寺謹按唐配享功臣如肅宗以苖晉卿裴冕憲宗以裴度髙崇文李愬皆多歴嵗年方詔配享及國朝配享功臣太祖皇帝以趙普曹彬太宗皇帝以薛居正潘美石熈載並咸平二年制下所有將來神宗皇帝神主祔廟所議功臣配享今參詳故事在前縁仁宗皇帝配享功臣係於山陵前下兩制定議英宗皇帝配享功臣係在山陵後降朝㫖以司徒韓琦太師曽公亮配享今来神宗皇帝神主祔廟所議配享功臣合自六曹尚書以下若待制以上及太常秘書省長貳同議從之權發遣秦鳳路經畧安撫司公事范育言熈寧八年三月十九日朝㫖知秦州張詵奏諸城寨弓箭手寨戸蕃兵稍覺闕食欲將秦州省倉陳次斛㪷借支接濟候夏秋熟日常平倉撥還今秦州外城寨省倉年計亦有剰處經畧司常平公據糴買糧草亦有樁管之數乞將來如遇本倉糧斛賑濟不足許以省倉年計之餘陳次麤色斛㪷借支并將經畧司常平公據糴買糧草約度存留凖備緩急移用外逐急支貸或量减市價出糶從之户部言民庶上言每三年重定鄉村坊郭等第人戸隠落家業乞展限十日許人告論看詳欲依元豐令日限將嘉祐編敕内一月改為六十日從之吕陶嘗論坊郭附五月末左正言朱光庭言昨宋用臣差曽孝廣根括西京永安縣沿河百姓地土拘納入官欲下京西轉運司將拘到地土給還舊日人户江西湖南路按察司言蹇周輔般賣廣鹽每嵗増額雖多所收净利徒有其名今相度裁减鹽額出賣并省到錢數比較不多可以革去兩路前日之弊户部欲並依所奏施行從之先是資政殿學士新知潁昌府曽孝寛言乞下吏部取官制以前舉官名數委官裁定可以仍舊者著為法吏部勘㑹見使罷舉窠名及許奏并權暫奏差朝㫖縁無見在京并外路事務繁簡恐該載不盡難以立定成法詔應沿邉州軍城寨廵檢都監監押寨主廵防諸路捕盗官及課利係三萬貫已上場務舊係舉官員闕處許依舊奏舉如數内今來事務稀少不消奏舉及事務繁劇合舉官去處具因依窠名各限一月聞奏孝寛元奏請在閏二月丙申今并入此吏部言衝替大小使臣經昨來三赦逓减有只用一赦或兩赦减至輕者尚有展年昨來申請隨所减至重輕展年聲説未盡見妨磨勘欲將大小使臣三赦前犯贓私公罪衝替事理稍重及私罪輕用三赦各逓减至便與差遣之人只將本罪條添展便與磨勘内私罪差替之人該今來三赦無可逓减更不添展並從之臣僚劄子奏竊見涇原路蕃兵人馬分𨽻諸將每遇㸃集緩急應敵並與正兵錯雜部隊一處使喚竊縁蕃兵本外夷之族素性反覆存在陣隊之間有似未便兼又自來不經訓練或臨㓂敵多是不明號令又慮紛亂行伍因致誤事欲乞今後凡遇㸃集驅使之事委自將副臨時分那一員專切總領别作頭項若遇畸零緩急使喚即委所𨽻將官選差深曉蕃情部隊將使臣亦分别頭項管押遇敵使令在前首當賊㓂師退使令居後用防追襲如此則無紛亂之慮詔令涇原環慶鄜延秦鳳路經畧都總管司相度聞奏環慶范純粹言相度得蕃漢兵馬委是不可雜用須合别行更制雖然若依臣寮所奏須遇㸃集驅使臨時分那將副選差使臣管押即恐人情素不相諳緩急遇敵之際不相為用冝於逐將下選擇亷勇有心膽曉蕃情使臣一兩員專充蕃兵部將使於平日鈐束訓練凡有出入便令部領外仍輪那將副一員統領使喚其遇敵之際或令居先或令在後難以預立條約並繫統領將帥臨機處畫如此施行頗得允便四月十二日范純粹奏純粹又言昨凖兵部符相度欲乞應蕃漢官非相統轄者並依官序相壓其城寨等管轄蕃官即依舊在本轄漢官之下詔依兵部所乞契勘諸路蕃官不繫官職髙卑乆例並在漢官之下此所以尊中國而制外夷也行之永乆人情安熟雖蕃官之甚黠狡者亦不敢有覬望等輩之心盖分義體勢不得不然上下遵承自無争較况蕃官職名雖髙只是管勾部族人馬凡部族應有公事並須從漢官彈壓理斷及戰鬬亦並用漢官使臣統制驅策故於平日必使名分相殊體勢相異則緩急之際不失統御今若無故忽更舊制悉依漢官之法便與不相統轄之官依品序位即邉上使臣及京職官當在蕃官之下者十有八九而沿邊將副使臣纔遇替移或於他處出入相值坐席相同便合在舊管蕃官之下人情之間豈能堪此况外夷之性兇狡尚氣當務裁抑驕慢之心豈可輙啟契勘沿邉使臣任滿多是就擬鄰近城寨差遣他日或再相統攝即漢官使臣中必有攄憤報怨之人而蕃酋之徒既以等輩自處必生嫌恨致統制官司煩于處置開端生事為害不小防微杜漸實在于此伏望朝廷詳酌特賜指揮諸路蕃官各依乆例不得與漢官叙班並在漢官之下所貴不失中國外夷尊卑之限絶蕃酋驕慢覬望之心統制有常不為後患貼黄上件朝㫖元因兵部擬定降㫖施行本司前此已曽論列䝉朝廷只送兵部不曽再禀朝廷指揮亦無議論利害却只符下本司令依元敇施行臣以事繫邉防漸不可長須至執議伏乞下送本部或雖送本部亦乞令勘㑹申都省乞自朝廷詳察指揮四月十二日奏此十月十日得請庚子看詳訴理所言刑部等處送到官員諸色人犯罪進狀理雪公案其間有一案干連數人内有情犯一般者並合一體施行縁係不經進狀之人故未敢便行一處看詳聞奏詔令一處看詳聞奏右司諫蘇轍言伏見閏二月十五日聖㫖詳定役法所奏諸路衙前先以坊場河渡錢依見今合用人雇募不足方許掲簿定差臣竊聽中外之議謂此法頗為穏便盖見今諸路每年所入坊場河渡錢共計四百二十餘萬貫而毎嵗所費衙前支酬及召募押綱錢共計一百五十餘萬所費止用所入三分之一縱使坊場河渡價錢别行裁减不過比見今三分减一則是所費亦不過所入之半而免却民間衙前最重之役其為利民不言可見續凖閏二月二十七日聖㫖詳定役法所狀再詳雇募二字改招募字附見閏二月十五日竊慮諸路承用疑惑將謂依舊用錢雇募充役欲乞改雇字為招字衆謂此法既不以錢雇人空行招募必是招募不行要須一例差撥未審毎年所得坊場河渡錢四百二十餘萬貫除支酬衙前重難及雇募押綱錢物其餘欲將何處支用又熈寧以前諸路衙前多有長名人數只如西川全係長名故衙前一役不及鄉户淮南兩浙長名减太半以上其餘路分長名亦不减半今坊場既已拘收入官必無人願充長名則應係衙前並是鄉户雖號為招募而上戸利於免役方肯投名與差無異上等人户既充免役衙前以次人戸須充以次色役如此則下户充役多如熈寧以前方今人户乆為苖役所困物力比熈寧以前貧富相逺而差役之法比舊特重此衆議所以未服也然臣竊聞西邉熈蘭等州及安疆米脂等寨每年費用約三百六七十萬貫此錢太半出於苖役寛剰今苖役既罷故議者欲指坊場河渡錢以供其費致使衙前須至並差鄉户臣謂朝廷養民備邉雖有内外之别而其實一家之事耳若備邉之費實未有凖擬則坊場等錢存以待之亦不得已之計也今邉防之計詳定役法所必未能周知其詳而暗指坊場等錢以備其費則其養民之計亦已疎矣臣欲乞朝廷宻切指揮户部與詳定役法官㑹議先計上件新置城寨嵗費幾何若干係四川茶錢若干係經制司錢若干係闕額禁軍錢若干係内藏庫錢似此諸般科名内尚有不足數目若干若此數目不至絶多臣乞計其所闕三年之數於元豐庫及崇政殿庫錢内樁出訪聞此庫錢物山積本先帝所蓄以備邉事今於此支用正合先帝本意臣訪聞蘭州等處道路險逺决為難守朝廷見議棄捐以安中國三年之後邉境已定即非乆逺不絶之費所用錢雖多亦有限量其坊場河渡等錢既别不支用即乞依閏二月十五日聖㫖指揮雇募衙前施行若朝廷重惜二庫錢物未欲專行支給即乞將坊場河渡等錢除雇募衙前等外量將剰數添助邉費所貴養民備邉兩不失所貼黄稱朝廷方議息民不宜為邉費奪坊場錢專差衙前以困民力臣竊見諸路州縣累年積下青苖息錢及免役寛剰錢數目不少亦可以助西邉新置城寨三二年之費所貴留得坊場河渡錢雇募衙前令民間無重役之患則朝廷恩徳及民深矣左司諫王巖叟言臣伏以國家之所急在人材而人材之難不可以倉卒得必及其閒暇廣聰明以求之則一日有用隨取隨應無顛沛之患矣求而得之宜優異寵榮以發其光華雍容嵗月以涵濡其徳美而養其望使人人有以見於天下而後進而用之則朝廷尊名器重天下之人信且服矣臣伏觀祖宗所以盛儒館之選萃天下之賢而育之者胥此道也故巨公名卿莫不由此途出今秘書之官限員太狹不足盡天下英豪之選充國家緩急之求臣竊惜之伏望聖慈依治平故事詔執政各舉可充館職者五人既以收羣才之美且以觀大臣之能方陛下新聖政以光明先業之時臣以謂求材養賢最先務也惟陛下留神采納巖叟又言臣聞荀子曰下臣事君以貨中臣事君以身上臣事君以人故歴古以來明主莫不以求賢為急忠臣莫不以薦士為先臣雖甚愚輙慕此義伏讀先帝御集治平四年十一月十二日戒敇二府薦士手詔所以警厲大臣求材責實之意曲盡事情亦非創有指揮乃本祖宗故事後因王安石專權任已不欲薦舉出於他人故此舊章廢而不用至今公論以為歎息陛下修復典常追祖宗之美有利國家無所不講獨此先務尚爾缺然臣竊惜之伏望聖慈特依先帝詔書令二府凖例各舉所知者三人庶廣陛下汲汲求賢之意少盡臣子區區事君之願貼黄稱臣前所引治平詔書在神宗御集第六巻辛丑詔曰朕惟古之君子能長育人材則天下喜樂之矣詩曰既見君子樂且有儀今蘭臺延閣皆圖書秘記之所藏而校讎論譔位序多闕永維祖宗樂育賢雋嘗詔二府薦士置之秘府養其徳器以待試用朕甚慕焉執政大臣吾之所甚重也冝各舉文學政事行誼之臣可以充館閣之選者三人亟以名聞朕將考觀其材器而甄升之六月十六日舉官少府少監韓宗古為職方郎中八年九月十四日為少府少監朝奉郎太常丞張商英為開封府推官朝奉郎賈易為太常丞詔三路知州帶安撫使者許奏辟本州官二員餘路知州帶安撫使大中大夫以上帶一路鈐轄及知河南府應天府不以官叙知雄州各許奏辟本州官一員使相及曽任執政官添舉一員雖不係合辟官處亦許奏辟本州官一員仍各結罪保舉聞奏即不得奏辟通判及權陞職任係承務郎以上許替見任官成資闕選人替年滿闕若已差下替人及半年者亦不得衝移三省樞宻院言景靈宫自來宰臣執政官遇國忌行香其抱香合係差閤門祗候看班祗候并宰臣親王執政官赴宫祠禱行事其本宫開門係依内門時刻致次日趂赴起居奏事不及兼自來齋宿亦係只於本宫行廊上旋設幕次詔今後國忌抱香合只選差太常卿賛者如遇本宫行事合齋宿并於道院齋宿及次日早兩刻開宮門尚書省言欲今後軍期河防賑救傷災之類畫録黄並從本省直降劄下諸處施行訖其畫録黄付本曹并該載難盡但係急速不可稽緩并事體重者亦依此施行從之又言除拜官職差遣縁畫録黄已經由門下省如辭免恩命中書省既得㫖令降詔不允欲乞只從中書省批送學士院進詔更不重出録黄從之復曹州定陶縣為廣濟軍揚州髙郵縣為髙郵軍軍器監計置材料竇長裕言乞復貢劵馬詔陜西路轉運司相度的實利害如何施行即具合措置事條畫以聞左司諫王巖叟言在京解鹽鈔頓减常價商旅患之望出緡錢為權其價以救一時之弊詔令户部相度以聞門下省言自來中書省樞宻院擬進文字如得畫並作奉聖㫖具録白過門下省再入文字覆奏得畫方始行出乞應中書省樞宻院凡係擬進得㫖文字今後並於録白内聲説某日得畫奉聖㫖云何門下省看詳如别無差失合舉駮更改事件更不入文字繳覆落去得畫貳字依式作奉敕録送所屬施行訖每日具事目用頭簽劄子奏知詔從之仍送中書省取㫖國子監言武學上舍生劉貫公試弓馬策義累入優等比科場策義俱優之人自為異等乞詳酌施行詔劉貫特與三班差使候武學諭有闕與差河北轉運司措置糴便司言凖敕據合留員數選留管勾文字官王滌等四員欲今後通行差出外勾當將來如有員闕並從本司奏舉從之新無泗州并本路監司及江淮發運司言本州最當衝要之地軍資庫出入錢物浩瀚比之他郡事體不同欲乞依真州例添差專監軍資庫一員令録事參軍專管州院公事從之詔今後殿侍係歸明徭人尋醫侍養各不限年許參班内有已授下差遣或在任人却依元路分與合入差遣壬寅京東路轉運司言本路昨凖朝㫖以見錢十萬貫依常平支俵及遇闕乏不拘時月許人户願請領收息充捉賊賞錢支用今本路合支捉賊賞錢常移那别錢應副所有俵本收息毎年所得不多尚以收息為名亦非永乆可行之事伏乞住罷仍將元賜本錢依舊樁管從之户部言市易務并市易南場四抵當所買賣鹽場石炭場已降指揮以供到見在錢物立為定額其今來立額合存留事件令本部措置奏聞尋行下太府寺并逐場務取索據逐處取㑹參詳措置合存事件欲乞施行從之新削甲辰詔守太師文彦博到闕朝見日止令四拜起居所有謝對衣等禮並特免拜户部言諸綱兵士逃死押綱人等科罪從之國子監言太學生員犯屏出學情輕滿三年及告假踰限除籍者自來並各依條補試入學今來該登極大赦其犯學規未得入學人情理可矜者取朝廷指揮依舊入學本條即無試補之法反輕於告假踰限除籍之人未得均一又縁所犯内有與同保連坐之人元非自犯情理至輕兼同坐之法今已除去若更令補試入學於理未安欲乞為兩等其身自犯者仍依學令補試入學其係與保人連坐者更不補試從之乙巳詔宰臣司馬光特賜告治疾給俸如故仍録指揮付光光言臣以假滿百日自四月以後不敢勘請俸給聞近有聖㫖特再給臣寛假將治其俸給等接續支給臣自正月二十一日以病在假乆而不愈亦曽陳乞宫觀以養衰殘聖恩不許更除左僕射臣惶恐失圖不敢復言自爾日望痊平入覲丹扆靣陳至誠庶得極竭疲駑且供舊職以補報萬分而藏府雖寧瘡瘍未愈肌體羸瘠足力全無歩履甚難拜起不得以此無由朝參計告假不管本職公事及一百二十餘日入覲之期未能自定竊以百日停俸著在舊章况臣當表率百僚豈敢廢格不行臣聞孔子曰先事後得詩云不素餐兮今雖聖澤優厚曲加矜恤而使臣違先事之義重素餐之罪四海指目何以自安伏望聖慈許臣依條百日外住支請受候參假日依舊庶使臣得安心養疾保全㣲軀不允十九日又有詔令録指揮付光二十一日光辭不允今并附此詔自今尚書侍郎除改别曹免入謝及進馬仍不用初除恩例其給事中遷侍郎如在一年内除入謝外餘凖此又詔八路選人員闕除有專條并奏差及一時指揮并水土惡弱及自來差攝官處并依舊外餘歸吏部差注八年十月二十六日吕大防云云又此年六月二十二日吏部云云又五年四月十一日吏部云云又詔除大理寺左斷刑丞外其餘寺丞簿並中書省差詔吏部尚書孫永充端明殿學士兵部尚書王存充樞宻直學士吏部侍郎陸佃充天章閣待制兵部侍郎趙彦若充龍圖閣待制中書舎人錢勰充天章閣待制用乙酉詔書見任職事官並帶舊職也勰舊未見帶天章閣待制當考王巖叟五月二十一日六月一日戊子所言并二日己丑内批可考三省言奉㫖轉運使副提刑今後選一任知州以上轉運判官選通判一任實曽歴親民差遣並所至有政迹人詔監司許降一等授如曽任監司見係通判資序以上亦許差河東轉運司言昨來優賞支過錢物望賜見錢二十萬貫下本路以備將來郊賞又廣南西路轉運司言本路闕少預俵和糴今年南郊賞給來年諸軍春衣錢共一十五萬餘貫望依每年例下廣東韶惠二州於鑄到錢或於本路寛剩役錢内支撥應副詔各於本路常平錢内支錢一十五萬貫與轉運司詳定役法所言凖敕官員授差遣在二月七日敕赴任前九十日限内者並給雇錢若以限後更不支雇錢則諸路役人復苦迎送之勞深為未便欲乞應官員舊差公人合請接送等雇錢者並依元豐令施行其錢以免役剰錢支給候役法成書即别行詳定於出賣坊場等錢内應副其八路選人員闕已降指揮除水土惡弱及有專條并差攝官等處依舊並歸吏部差注詔八路選人接送雇錢依詳定役法所奏朝散郎太僕寺丞吴安持為校書郎進士出身徐積為揚州司戸參軍充楚州州學教授用右正言王覿御史林旦之薦也徽録乃於元符三年四月十八日載此誤甚矣紹聖三年積又特改利州防禦推官元符三年乃以利州防禦推官知夀春縣事新楚州州學教授特改宣徳郎林旦言前御史中丞鄧綰人質猥下天性憸佞先帝聖明察見綰之情状正其罪而黜之今綰復待制又復龍圖閣直學士自鄧徙揚而頑然無知尚懐不足伏望特出聖斷重行誅殛詔以綰知滁州旦又言公議之所在者天下也道天下之公議者諫官御史也今臣舉公論而摘大姦陛下何惜一鄧綰不以慰天下之望邪臣前論姦邪之状乞賜誅殛乃奉行先帝批詔以章先帝之明借使今日盡削官職逺投荒裔固未能壓塞衆議柰何止罷揚州而已且先帝知綰頗僻姦回自御史中丞翰林學士盡奪其職而逐之其後執政大臣與綰為地出力援引固非一人先帝聖鑒洞見終不容隂施其巧故初復待制為諫官鄧温伯奏駮而罷官制初行又欲除綰侍郎先帝不許他日又進擬給事中韓忠彦執而不行去年除帥永興又因言者論列改知鄧州今朝廷方進賢退不肖賞善罰惡豈可令姦邪小人尚得列從官典方面况綰不顧羞耻惟知阿附權利臨事動皆乖繆今因彈奏但移小郡小郡之民奚罪焉乞盡削官職置之散地終身不齒以謝天下詔綰依舊綰未去鄧州尋卒綰卒在二十八日乙卯今并書之綰自鄧改揚乃初四日同知樞宻院范純仁言臣昨自簾前奏陳為言事官彈奏鄧綰責降臣謂鄧綰貶出後來累經赦宥牽復至此自鄧州移揚州蓋為曽孝寛所衝且非進用自是言者不須更有論奏朝廷亦不須再行貶責况陛下臨御以來先朝舊臣雖有往咎皆䝉天恩含貸豈獨綰可深罪徒使人心反側不能安職無益清浄之化伏望聖慈特降指揮其鄧綰已經先朝責降今來臺官文字更不施行如此則聖度包荒廣如天地負徃咎者咸得悛改懐反側者皆可自安所繫朝廷治體不細伏望聖慈留神采納天下幸甚又言鄧綰罷罪既行之後中外乆已無言而臣寮忽然再有論奏亦望陛下謹於聽納却恐事無定止致朝廷録人之過太深有虧徳政臣在先朝曽除知襄州因鄧綰奏罷其後降知小郡今臣所陳不為鄧綰實惜朝廷事體伏望聖慈詳察昨日已䝉聖訓奬納尚恐執政進呈之際有與臣所見不同不免再具奏聞庶可詳覽上遣中使宻賜手詔曰覽卿所奏鄧綰事誠為允當朝廷以向者附㑹掊克中最顯者已行放黜盖當時希世茍合言利進身者甚衆朝廷若人人而責則事無窮已似非安静之術使向來附㑹干渉之人日夜恐懼不能自安欲降一詔書一切示以寛恩更不行遣當各安職業改過自新欲作此意度行下如何卿更子細相度具可否親書實封進入純仁奏曰臣拙暗無堪驟䝉簡㧞置之樞府預聞機政故當竭愚盡慮少圖報効前日所奏止是以朝廷冝厚於録功薄於記過又人情各欲安静陛下冝因而鎮以厚恩臣不量淺薄輙敢上裨萬一乃䝉聖慈特賜奬納己為天下之幸仍䝉聖意更欲降詔干渉之人釋其徃咎咸俾自新此甚盛徳雖堯舜宥過無大成湯克寛克仁無以過也臣伏讀詔㫖忻懽感歎之不暇豈復更有愚見可助睿明便望只以此意付之詞臣更使敷衍潤色以成訓誥之美垂之萬世永為帝範愚臣不勝幸甚六月末乃降詔言者紛然或附彼時不然此時已欲降詔縁言者紛紛至彼時乃復施行也須考詳劉摯三䟽或附此林旦上官均王覿詔銅錫鍮石依舊禁𣙜有犯并私造作及與人造作器用罪賞依嘉祐編敕法除諸軍官員器用鞍轡及寺觀士庶之家古器佛道功徳像鐘磬鐃鈸鈴杵相輪照子等許存留外餘銅器限一百日赴官送納毎斤支錢二百文限滿不納杖一百物没官從左正言朱光庭之請也新紀云乙巳禁以銅鍮石為器七月末劉摯云云五年正月二十四日又立禁光庭又言欲乞選官置局取索户部天下一嵗之所出入與三年郊賞四夷嵗賜凡百經費並行㑹計内可省者則從而省之量入為出著為令式詔朝廷累行戒飭中外財利之臣不得擅歛侵民其邦賦之入盖有常制若不裁減浮費量入為出深慮有誤國用大計冝令户部尚書侍郎同相度裁減條析以聞新紀云詔户部裁冗費著為令三年閏十二月八日門下中書後省言六曹條可以限内編修了當其寺監條取自朝廷指揮所有三省秘書殿中省理檢院尚衣庫條貫乞一處照㑹其六曹限一季編修所有擬進格斷例係置局在後乞量給寛限詔寺監秘書省條及擬進格斷例令門下中書後省限半年編修餘更不修定詳定役法所言成都府路轉運判官蔡朦奏陳差鄉户衙前及便行助役錢等事本所看詳綿漢州既非舊法曽差衙前之處今來慿何條例用多少人數為額遂差鄉户衙前使其單丁女戸等出錢指揮司馬光元奏若有妨礙即具利害擘畫州縣亦多言其不均者朦獨不詳敕意便令隨貧冨等第均出役錢按朦身備監司知朝廷謹重民事博謀盡下而内懐觀望多引無用之文牽强傅致以成邪說違失明詔伏乞朝廷特行顯黜詔蔡朦差知廣濟軍仍將役法所奏請劄下諸路舊録云時光變免役法為差役民弗以為便朦因論列遂責新録辨曰蔡朦以詳定役法所言朦不詳敕意便令隨貧冨等第均出役錢故有是命非縁論民弗以為便自時光至遂責二十字並刪去宣徳郎知安化軍諸城縣事劉永錫父元年一百四嵗特與承奉郎致仕永興軍路提㸃刑獄司言凖朝㫖相度虢州盧氏縣欒川朱陽縣銀煎百家川兩冶和買及抽分利害今乞依舊抽收二分和買三分以五分給主兼銀煎冶百家川等處入官分數與欒川冶一同並乞如舊從之殿前馬歩軍司言禁軍排連欲且依熈寧編敇施行從之詔李憲特降節度觀察留後一官提舉明道宫王中正特降遥郡團練刺史兩官提舉太極觀並本處居住石得一降為左藏庫使管勾崇福宫宋用臣降為皇城使差遣如故得一用臣三年六月四日展一期叙用臣元豐八年十一月十四日以宣政登防降皇城滁酒今又落登防仍滁酒也先是御史中丞劉摯言臣竊以陛下臨御以來運動政機以時弛張述成先帝制治立法之意使光昭于天下利興害除四方鼓舞至於清明朝廷分别邪正斥逺姦佞鋤去彊梗皆睿慮神斷優游閑暇不出於喜怒不見於顔色而天下之善惡已辨是非已正矣何其盛歟於此時臣竊怪天地之和氣尚或未應忠臣義士之論尚或未平此其故何也臣嘗究之盖天下之元惡猶有稽誅天下之大姦猶有漏網而國法猶有未正此中外所以猶未厭也國之失政莫大於使姦惡幸而免今論其大者則前日之四五宦官是也臣待罪風憲雖知觸權幸言出而患入然臣有言責貪報恩遇則何卹乎身之危哉謹為陛下言之王中正元豐四年將王師二十萬由河東入界計其隨軍齎運役兵民夫通數十百萬衆矣中正徘徊於境上殆半月而後出翺翔乎疆外頓沙漠而不進公違詔書不赴興靈㑹師之約天寒大雪士卒饑凍坐使物故十之七八古之將帥固有無功而還者然猶當保全師旅歸報於國今精兵勁騎一無所施自取狼狽死亡殆盡按之軍法宜即顯誅中正略不自劾請罪而先帝以天地之量無所譴訶又遣使賜予問勞然後中正徐徐求閒局厚俸自佚而去此國法未正者一也李憲之於熈河貪功生事一出欺罔朝廷之威福柄令持於其手官吏之廢置用舎出於其口監司帥守而下事憲如父兄而憲之頥指氣役之也如奴𨽻縣官財用聽其取與内之府庫金帛轉輸萬里外之生靈膏血漁歛百端傾之於憲如委諸壑出没呑吐神鬼莫見而一切不㑹于有司興靈之役憲首違戒約避㑹師之期乃頓兵以城蘭州遺患今日及永樂之圍憲又逗留不急赴援使十數萬衆肝腦塗地罪惡貫盈然不失於總兵一路此國法不正者二也宋用臣奮其私智以事誅求𣙜奪小民衣食之路瑣細毫末無所不為使盛朝之政幾甚於敝唐除陌間架搨地之事傷汚國體不卹怨讟其出入將命㨗若風火務以巧中取悦事無不諧動畫宻㫖故擅作威福侵陵官司冒昧貨財更無案籍都城為之憔悴商旅所以不行瘡痍蠧害至今棼然而莫能理然亦不失享禄于善地此國法不正者三也石得一領皇城司夫皇城司之有探邏也本欲周知軍事之機宻與夫大姦惡之隠匿者而得一恣殘刻之資為羅織之事縱遣伺察者所在棊布張穽而設網家至而尸到以無為有以虛為實上之朝士大夫下之富家小户飛語朝上而暮入於狴犴矣有司無古人持平守正之心以謂是詔獄也成之則有功反之則有罪故凌辱箠訊慘毒備至一無所問而大小臣被其隂害不可勝數於是上下之人其情惴惴朝夕不敢自保而相顧以目者殆十年皆得一發之今不失厚俸安坐此國法不正者四也石得一領皇城司事見元豐五年六月四日又紹聖二年二月四日是四人者權勢烽焰震灼中外毒流於民怨歸于國宰相執政知而不以告于上諫官御史懼而不敢論其非幸而出於聖人在上之時以先帝神武英氣鎮壓其姦不然其為禍患豈不若漢唐之宦官哉以堯之聖不免四凶之在其朝至舜起而後誅投之孔子為魯司㓂七日而誅少正卯先帝未及肆諸市朝而以遺陛下陛下所宜以舜之事自任今閲嵗時尚不聞以典刑詔有司臣未諭也伏望聖慈以臣章付外議正四罪暴之天下而竄殛之以明國憲以服天下摯又言臣近以内臣王中正李憲宋用臣石得一四人大罪未正曽具彈劾未䝉詔㫖謹按中正等罪状已列前奏皆古之所謂元惡大懟流毒至今内外歎憤御史以觸邪繩愆為職臣而不言誰肯忤權要招怨仇為陛下言哉夫四人之惡陛下固已知其詳今若止於禠奪一二官資或罷差遣逐人擁髙貲大第志得氣佚雖使之致仕居家亦適所以遂其所欲而已臣見内臣甘承立昨於荆湖擾民近日陛下睿斷更不勘結投之遐荒逺近人情莫不欣快陛下謂中正等殺人傷財殘民害物其罪與承立誰為輕重若不將四人比類承立行遣乃是國家大公之法獨行之於承立一小官而屈之於中正等四貴臣也事繫政體伏望聖明法舜之治四凶行流放竄殛之事以成先朝之志明國典而謝天下元祐元年四月十八日殿中侍御史林旦亦言憲等妄作故責之舊録云憲等皆先帝嘗所任使御史中丞劉摯殿中侍御史林旦言其妄作故責新録辨曰劉摰論李憲王中正石得一宋用臣罪不容誅使彰露於熈豐之時豈能逃竄殛哉若以謂先帝嘗所任使則凡經任使者雖有罪皆當不問乎今刪去七字當考李憲等見所居官新録因舊録太踈略也政目但書石得一降左藏庫使崇福宫宋用臣降為皇城使不書憲及中正當考三年六月四日中正用臣展一期叙右正言王覿奏據編類章䟽係元年四月十八日伏覩召文彦博外議皆謂虛右相之位將以中書長官處之臣竊不以為然若更煩以機務則不惟禮意之薄而或致政事㣲壅裁决小差而同列者順從則將誤朝廷紛辨則有傷國體言責者緘黙則廢人臣盡忠之義彈劾則違陛下貴老之心伏望採前世故事使彦博以太師任職數日一赴講筵訪以經術朔望一對便殿問以大政樞宻院奏應諸州縣窠坐禁軍日分其半赴教窠坐者月替州界廵檢半年縣鎮等守禦季替遇出戍並當日替換歸營看詳訴理所言本所胥吏雖行倉法尚慮别有𫝊逹漏泄乞並依漏泄察案事條施行從之復西京福昌鎮為福昌縣
