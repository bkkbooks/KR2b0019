body:
  text: 續資治通鑑長編巻三百三十四宋李燾撰神宗元豐六年三月丙子朔詔河北轉運判官吕大忠罰銅三十斤以黄河溢不即救䕶也詔權發遣陜西路轉運使通直郎李察權發遣京東路轉運副使朝奉郎吴居厚各遷一官以措置鹽事有勞也京東轉運司言比較本路及河北賣鹽場自行新法已及一年半凡収息錢三十六萬緡故有是命三年六月二十五日六年三月十日置徐州寳豐監嵗鑄錢四十萬緡丁丑文思副使曹貽孫内殿承制張寛西頭供奉官閤門祗候楊琰各遷一官賜銀絹百以營葺京東物貨場也詔定西城已興功而西賊近在熈河嘯聚慮防托軍馬未足支吾委李憲逺置斥堠樞密副都承㫖客省副使張山甫等奏伏見團教保甲朝廷立定三等事藝賞典優渥按閲之際其間或令家丁及以别都保人冒名代試亦無由辨認兼正長所教事藝及第一等至九分以上即補班行名目其欺偽容蔽亦合為之關防欲乞特降指揮重立告賞之法庶幾經久杜絶姦弊奉㫖今後按閲並先委廵教官封臂冩記保分候按訖拆去密記三月二日事己卯詔御史臺察官察諸司稽違皆按法舉察諸司所施行失當雖無法亦聽彈劾以聞日本國僧快宗等一十三人見於延和殿上顧左右曰衣紫方袍者何日所賜都承㫖張誠一對曰熈寧中從其國僧誠尋對見被賜今再入貢上曰非國人入貢也因其瞻禮天台故來進見耳並賜紫方袍詔借支河北提舉司寛剰錢三十萬緡付轉運司預買紬絹詔開封府第三等見教保甲户去年以前逋負權住一年從提舉教閲保甲劉琯請也詔秘書省長貳毋得與著作修纂日厯事進書奏状即繫書其關防漏洩並依舊編修院法詔陜西河東經略司緣邊城寨自今有招納或投順西人収接地分據人口以至日即給食知安肅軍潘孝綽言朝廷昨用開封府判官杜常議諸路妄通卒即所在州軍刺填廂軍竊謂禁軍逃亡首獲妄通可以幸免流配廂軍負罪逃亡妄通終不發覺避重役則走赴輕處避逺惡則自通近地借支錢糧因此失陷州城作匠漸致闕人乞下有司以杜常言與臣議詳定立法詔下工部辛巳太學正馬希孟為太學博士以上批自景靈新宫成羣臣獻謌頌者以十數獨希孟之文可觀也禮部奏有司攝事祀昊天伏請初獻曰帝臨嘉至之舞亞終獻曰神娭錫羡之舞太廟初獻曰孝熈昭徳之舞亞終獻曰禮洽儲祥之舞從之刑部言舊刑官詳斷官分公案斷訖主管論議改正注日方過詳議官覆議有差失問難並於檢尾批書送斷官具記改正上主判官審定然後判成録奏自二司並歸大理斷官為評事司直議官為丞所斷案草不由長貳日者斷案類多差忒欲乞分評事司直與正為斷司丞與長貳為議司凡斷公案先上正㸔詳當否論難改正簽印注日然後過議司覆議如有批難具記改正長貳更加審定然後判成録奏從之御史王桓言聞户部尚書安燾近緣住滯綱運事避匿已罪報上不以實法應隔朝恭而陛下優恩特令免隔比聞獄具有司依條報燾不應釐務燾於此時自當杜門屏息以俟謫命而乃不忌典刑傳呼入省燾可謂犯義而不知恥矣陛下屈法以寵近臣可也其如天下相率為燾何詔劄與燾詔北使經過處知州曽借朝議大夫者依舊自今更不借官令權服金紫不得繫金帯其押賜御筵官仍互借先已借朝議大夫即借中㪚大夫並許繫金帯不佩魚壬午京東轉運副使吴居厚言自置鹽税司近二十年置鹽税司近二十年據御集増入當考商人負正税錢七萬六千餘緡及倍税十五萬二千餘緡皆周革提舉日失於拘催乞依市易務例除放倍罰錢百千以下限三年百千以上限五年止令納正税上批宜依所奏作朝廷直降指揮癸未詔秀州團練使駙馬都尉錢景臻法該磨勘可依王師約近例下有司檢舉施行自今駙馬都尉及七年令尚書吏部磨勘更不取㫖乙酉詔京東推行鹽法已見成效轉運副使吴居厚雖非首議官而自付委以來悉心共事以迄成就兼其他職事頗見宣力一路財用自贍饒足未嘗干叩朝廷近已遷官宜更賜紫章服丙戌上批种諤病甚速令范純粹徃延州權管勾經略安撫司事如純粹近所奏感疾未安即且令李察徑馬前徃丁亥江淮等路發運司言江湖荆浙六路轉運司有未發今年額糧四百一十萬石錢帛雜物稱是詔六路轉運司當認年額如於嵗前拖欠違滯委蔣之竒隔路選官案罪以聞己丑手詔封丘縣賊焚刼庫兵殺傷人防䕶軍噐車乘虎翼兵級王何劉順侯玉殺獲凶惡賊一人及禦捍軍噐如法王何等各遷兩資均賞錢百千後又手詔封丘縣刼賊先敗獲徒黨繫獄日久或瘐死不施眀刑限十日結案捕人三日内擬賞又手詔開封府鞫封丘縣刼賊張再興等已指揮處斬梟首封丘庶警攝姦兇伸快善良及被苦之家又詔封丘之賊在民間固當有之但偶入縣城行刼情為巨蠧所以嚴捕如此今李宜之不識事體張皇行牒於數千里外出告捕榜心雖欲得姦人無所逃跡然行遣乖方驚動逺近傳播外境不便可誡止李宜之何官當考御集元豐六年三月八日入内黄門韓詵奏臣管押胙城縣保甲軍噐在縣下有刼賊三十四人入縣衙打刼臣閉驛門其刼賊放火燒甲仗庫入驛殺廵檢下軍員并長行共三人防䕶兵士三人御批勘㑹封丘縣去京咫尺因何提舉賊盗司並不以時廵察致上件兇徒結集羣黨如此全無忌憚白晝直入縣衙焚刼甲仗庫及傷殺管押軍噐防䕶兵員仰李舜聦限指揮到火急躬親前去趕逐捉殺并逐旋具捉殺到人數外其廵檢即先次衝替仍令楊景略疾速前去監催捉殺不知即是己丑十四日事否韓詵奏稱胙城御批乃云封丘當考李舜聦時提舉府界賊盗四月二日云云辛卯詔自今擘畫創立課利嵗収每萬緡遷一資許官吏均受著為令詔廣西邊事申經略司處置失當及有未盡許轉運提㸃刑獄司具事理聞奏熈河蘭㑹路經略安撫制置司言凖朝㫖修築恭噶關昨開復之初規畫草創其城基止是因險峻削兼土多沙壁壘不堅已差苗履别擇地形増展城守詔蘭州圍解其城守將士降授四方館使階州刺史熈河蘭㑹路副緫管李浩率將士衛城有勞復隴州團練使優等西上閤門使王文郁募兵披城接戰及上城守宿遷東上閤門使與一子官第一等十二員係王文郁召募接戰得力十四員守城得力各遷一資第二等十九員係守城二員驅率蕃兵於馬家谷守隘力戰退賊減磨勘三年蕃官蕃兵百九十三第一等遷一資願賜絹者二十匹第二等十五匹第三等十匹諸軍弓箭手四百六十敢勇等三十六第功遷資賜絹如蕃官其獲級重傷人别格重者自從格時賊圍蘭州城六日浩上其戰守功也舊紀三月辛卯夏人冦蘭州副緫管李浩敗之新紀亦書三月辛卯夏人冦蘭州按三月辛卯乃賞功解圍非始入冦也壬辰以提舉河北路保甲四方館使榮州刺史狄諮為嘉州團練使朝㪚郎集賢校理劉定為朝請郎監教使臣三班差使孟斌等所教武藝及九分各遷一官保甲司勾當公事左蔵庫副使李元濟内殿承制狄璋東頭供奉官閤門祗候孫文各减磨勘三年指使右班殿直張彦孫等各减二年案閲河北集教保甲司上等二畨集教功狀也二月十一日入内供奉麥文昞言宜州舊有駐泊廂禁軍三十餘指揮及忠敢五指揮不減萬人蠻賊犯境忠敢當前安化蠻甚畏其鋒後改併忠敢悉為澄海州峒易之所以去嵗犯邊乞下廣南西路經略司專委宜州長吏依舊招忠敢五指揮為二千五百人及增副將訓練詔廣南西路經略司相度門下省言覆奏中書省録黄下京西路提㸃刑獄監捕封丘縣賊誤用御寳詔誤用寳宫人已責罰河北路緣邊安撫司許嵗舉大使臣及承務郎以上安撫使七員副使都監五員提舉開封府界保甲劉琯言諸縣保甲毎起夫役不計家産厚薄但以丁口均差故下户常艱於力役伏望令有司立法諸縣調夫不計丁之多少而計户之上下不惟國家力役之政大均而臣所訓保甲亦得安居就教詔開封府界諸路監司與提舉司同相度御史張汝賢言彈奏之文宜存大體有司議罪欲察細微乞自今察案劄子徑坐要切因依具彈辭進呈别録照用情節條貫在後以備聖問從之詔解鹽司錢引非朝㫖擅支借者以擅用封樁錢法論從制置司請也詔六曹條貫改差門下中書後省官詳定四月癸亥并入濵州奏渤海縣保長劉思累設方略捕獲盗賊望補一班行名目上批特補下班殿侍乙未旬休特御延和殿引同提㸃成都路茶場陸師閔奉議郎徐發已下八員進對師閔賜緋章服兩紀並書此丙申皇城使嘉州團練使劉永夀為青州鈐轄以上批永夀章獻皇太后之後可特差也河東路經略司言左蔵庫使薛義出界敗賊於葭蘆西嶺詔遷皇城使伊珠先鋒引路遷兩資賜絹五十奪印諸軍依輕傷格門下繳覆義所部三千三百四人除折亡失并老小外計獲六十九級詔義止减磨勘三年丁酉上批太學博士員闕進呈以劉槩黄裳為太學博士此據御集二月二十二日神宗改正官制員闕多歸吏部以謂不可毫髮増損曽孝寛以吏部尚書對戒飭甚峻孝寛云適有一事欲奏禀比有太學博士闕一人臣以為可以預選而無恩例一人臣以為不可為以恩例當得法行之初不敢申請故欲面禀蓋可預選者狀元葉祖洽乃無恩例不可占射不可為者獲賊改官人董希以恩例當在祖洽之上神宗黙然即日批付中書太學博士並堂選此據曾氏南遊記舊當考詳今附見八月十六日乃自鄆州召孝寛為吏書此時未也又八月二十二日祖洽見任國子監丞罰銅記舊必誤或誤黄裳為祖洽也韓嗣云官制成神宗謂已盡善初太學官寺監丞簿並許吏部注授曾孝寛為尚書上與語及官制孝寛曰固善然臣到未幾見太學博士闕二人争得之其一人董希以捕盗改秩其一人葉祖洽以進士第一為京官兩人方争此闕在吏部格當與董希此非有司所敢定也神宗眀日批寺監丞簿太學官並堂除戊戌宣徽南院使判大名府王拱辰為安武軍節度使判大名府官制不置宣徽使拱辰因冄任改命舊紀書拱辰以南宣徽改武安節度新紀不書内園使管勾麟府路軍馬郭忠紹出界外撃賊於宻内部二千七百六十七人獲七百二十九級納降户二百十七口一百三十一走馬承受入内殿頭賈宗元躬監將兵力取全勝皇城使折克行部千四百二十一人獲四百五十九級招降户十六口六十六河東第六副將崇儀使張永昌部千三百四十六人獲二百七十級招降户十一口六十五詔折克行領榮州團練使郭忠紹為皇城使張永昌為六宅使賈宗元遷一官兩紀並書戊戌郭忠紹敗夏人于宻内而舊紀仍書管勾麟府路軍馬新紀改作麟府將開封府界提㸃司言陽武縣尉權知縣張繹昨黄河漲水注縣凡七處水決繹身先勞苦率衆用命救䕶縣城公私以濟乞不依常制令權知本縣吏部言張繹以奏舉縣令見待闕開封府界知縣法不許借注詔繹特改合入官知陽武縣己亥陜西轉運判官通直郎趙濟直龍圖閣知熈州吏部言端眀殿學士曾孝寛九年不磨勘若通理月日當改三官緣本司未有此比詔聽通理磨勘復龍圖閣直學士劉庠為朝請大夫庠先以舉官不當被追朞滿復之也詔除名人前權梓州路轉運副使朝奉郎董鉞叙宣義郎權管勾荆湖廣南江南西路提㸃坑冶鑄錢事鉞坐韓存寳得罪削籍至是上書言瀘南之師出討無功臣冒昧使指以轉輸糧餉而軍事不得預也行營兵夫蓋五萬渉賊境為日六十有竒而霖霪者殆居其半臣之所任糧餉未嘗一日闕供逗撓怯避責在主將與夫與軍事之人而臣不能自脱於罪戾既更赦宥非特賜哀憐則誰或為臣言者故有是命河東路經略司上左蔵庫副使髙永翼出界遇賊於珍勒魯部五十二人率先破賊斬三十級親獲一級詔永翼除左蔵庫使知封丘縣奉議郎李士燮為承議郎减磨勘二年招軍及格也責授温州團教使沈起乞叙理詔起所犯情重永不叙用庚子詔加上仁宗英宗尊諡至十六字於大禮前擇日行詳定禮文所言儀禮曰夫婦一體故昬禮則同牢而食合卺而飲終則同穴祭則同几是夫婦一體未有異廟者也惟周人以姜嫄為禖神而帝嚳不廟又不可下入子孫之廟乃以别廟而祭之故魯頌謂之閟宫周禮謂之先妣自漢以來凡不祔不配者皆援姜嫄以為比或以其微或以其繼而已蓋其間有天下者起於側微而其后不及正位中宫或已嘗正位矣有不幸則當立繼以奉宗廟故禮有祖姑三人則祔於親者之説則立繼之禮其來尚矣始微終顯皆嫡也前娶後繼皆嫡也後世乃以始微後繼寘之别廟不得伸同几之義則非禮之意夫婦天地之大義故聖王重嫡所以重宗廟非始微終顯前娶後繼所當異也恭惟太祖孝惠皇后太宗淑徳皇后真宗章懐皇后實皆元妃而孝章皇后則太祖之繼后當時議者或以其未嘗正位中宫而不許其配或以其繼而不許其配若以為未嘗正位中官則懿徳皇后配太宗矣若以為繼則孝眀皇后配太祖矣而有司因循不究其失皆祭以别廟在禮未安伏請升祔太廟以時配享詔恭依於大禮前擇日以典禮奉之詳定禮文乃五年四月十五日成書此議蓋五年四月以前所上及今方施行耳他准此十月十二日祔廟學士院言本院久例親王使相公主妃并節度使等除授并加恩並送潤筆錢物自官制既行已增請俸其潤筆乞寢罷并中書省亦言文臣待制武臣横行副使及遥郡刺史已上除改自來亦送舍人潤筆乞依學士例罷之並從之詔開封府界五路保甲輒投軍者杖八十還充本色立告賞法餘丁投軍而應充保甲者准此其五路保甲餘丁願充弓箭手者不在破丁之限熈寧舊條杖止六十於是增為八十并立告賞法提舉保甲言投軍者多乞申眀約束故也詔罷銀臺司取索舉奏令故事銀臺司凡奏狀諸處已施行者有著令得取索行遣㸔詳若有不當聽舉劾時官制行封駮悉歸門下省故罷之辛丑上批早來擬奏配軍畫一法内稱刺充某指揮配軍恐於上軍稱呼有嫌可諭修法官改云某指揮雜役時犯罪法應配流者其罪輕得免配行盡以𨽻禁軍營為雜役然禁卒素憚配法嘗恥言之故也上於人情至微無不曲盡配軍畫一蓋張誠一等所更定也凡犯盗流以下皆配本州為雜役軍以省禁兵䕶送其人與所𨽻將校相犯論如奴主相犯律與營卒相犯加減凡人二等此據神宗史刑法志増入本志但稱其後略無年月今掇取附此誠一時為樞密都承㫖客省使秀州防禦使熈寧三年八月二十一日初議改舊配法元豐八年九月四日依舊配行曾布日録紹聖二年三月九日再對呈元豐編敇所欲以役代配及承㫖司立季送之法以寛配𨽻及省䕶送之勞先帝並以為難行遂定以配三千里以上罪人充諸營雜役軍有犯依上禁軍法餘自千里而上皆配本處牢城本城元祐初以為不便一切復舊近諸路多言禁軍防送勞敝因而逃亡作過者多乞立法上一覽未及開陳即云以役代配嵗滿釋放及以凶惡人充雜役軍皆未安布云誠如此然先帝欲寛配𨽻之法乃仁政羙意非獨可省䕶送之勞兼配𨽻之人不去鄉閭逃亡者必少亦免道路困苦死亡之患此法為利者多上云且與三省議定進呈當考究竟如何癸卯監察御史頓起王桓言大理寺劾臣不覺察舒亶違法支用厨錢臣備位御史職當奉法而上項詔獄臣各居家待罪望先次罷絀詔起桓供職荆湖南路提㸃刑獄司言入内供奉官謝禋牒奉詔本路買桑木弓材五萬各長三尺八寸濶二寸五分厚一寸已下州縣収買續凖禋牒送弓材様長四尺二寸濶三寸四分厚一寸八分雖即行下緣先降様已採斫及數乞下弩作如亦可用即乞先上供詔止依元降様其續送様令問謝禋所被受指揮以聞御史王桓言吏部牒報宣徳郎通判覇州唐坰已到任臣聞坰之為人猖狂浮躁不安分義遷謫雖久漫不知省武臣守覇州通判實專州事使坰得自任必不循理伏望移坰近裏州差遣上批宜依所奏上從朝廷取闕改注淮南一合入差遣乃以為無為軍通判乙巳降授皇城使涇原路鈐轄知鎮戎軍姚麟為西上閤門使從經略司盧秉薦也夏四月丁未權禮部侍郎王克臣罰銅八斤郎中林希員外郎王子韶各十斤以御史察承受筭學比類文武律學立法文字施行稽違繆誤也詔封丘縣羣賊情理凶惡已立重賞許人告捕將來捕獲不用恩原免三月十四日入内髙品曽處厚言準朝㫖徃韶惠等州根磨内蔵庫上供錢竊見廣州勘畨禺縣尉石大受有自盗􅂍買物不償價錢拷決死無罪人轉運副使孫迥黨庇不治及權知廣州捕獲舶船不經抽解犀聽綱首王遵贖銅又死商銅船賈二千餘緡聽綱首素拱以二百千買之及市三佛齊溺水臭腐乳香乞差官案實詔審如處厚言則逺方使者舞法不忌情已可誅況耗散官錢上欺朝廷下罔已利尤不可赦宜差大理寺丞郭槩乘驛就案若有罪即劾罪以聞王臨時知廣州閏六月戊戌詔詰迥七年四月十七日孫迥降官詔前知鄧州南陽縣曽阜知穰縣陳知純並勒留在本縣同見任官催納積欠以提舉司言阜任内失催坊場河渡錢五萬緡常平錢八百千知純任内欠坊場河渡錢四萬緡常平錢九百千也湖北轉運司言誠州開修潭溪等溪峒直抵廣西都懐寨若通北路中徹融州實可扼三路溪峒之喉衿望下廣西協力經營詔熊本應副無得譸張致失機㑹三日又十二日可考又十月十八日十一月三日詔攻米脂城義勇保甲重傷賜絹三十匹稍重减半輕傷十匹至七匹河東路經略司上知麟州西京作坊使訾虎出界功狀詔虎部獲分數法應遷一官建畫討賊又斬獲多特遷内園副使康州刺史詔梓州路轉運司昨緣軍興差雇舟船騾馬工役之家曲赦所不該者其二税蠲五分戊申熈河蘭㑹路經略安撫制置使李憲乞支静邉寨别籍樁管米三萬石見錢公據百萬緡從之同提舉成都府等路茶場陸師閔言李稷殁於王事按稷領治茶事於五年間除百費外収獲淨利四百二十八萬餘貫伏望以稷成就茶法之功賜之土田又言文州與階州接界而兩路茶法不同階州係禁地見有博馬及賣茶場文州係通商地分兼龍州界亦係相連乞以文龍二州並為禁地依秦鳯等路條法施行仍下轉運司除博馬外不得將所買茶於文龍州别有支用又言秦州支用錢物有侵過本錢収付尚未齊足乞下秦州本司令差官一員攅造支錢文帳又言永興等路惟是金州所出及影帯透漏山南私茶或南方雜偽末茶其價髙貴陜西之民良以為苦乞計置川路餘羨茶貨徧入陜西路諸州軍出賣並依秦鳯等路禁茶地分條貫施行又言成都府據川陸之㑹茶商為多常患物貨留滯不免賤入居停之家乞於成都府置博賣茶都場許隨宜増價出賣及博易諸般物貨却行變轉其所増利息並依川路賣食茶及陜西博易條施行又言本司昨奏依客例買鹽入川變轉每年不得過一萬席凖朝㫖不得令州縣出賣及有抑配竊緣官物浩瀚若不令州縣干與則其間情弊何所不至乞許本司就委逐處税務監專管勾依市價増减出賣並不妨客旅興販詔並依師閔所奏李稷賜潁川官田十頃初蜀茶額嵗三十萬至稷加為五十萬及師閔代稷為百萬云食貨志自熈寧七年至元豐八年増廣茶法蜀道茶場四十一京西路金州為場六陜西賣茶為場三百三十二熈寧七年税息錢四十萬緡元豐五年五十萬七年増羡至一百六十萬緡詔定以百萬緡為嵗額除充他官經費外並儲陜西以待詔用師閔又言自買馬司兼領茶場而茶法不能自立伏望如買馬司用茶並以錢帛對交不許别司取撥詔蒲宗閔與師閔同具利害以聞六月辛亥可考詔諸課利場務監官比祖額見虧者早入暮出候敷及祖額依舊即依卯入申出從大理少卿吕孝亷請也御史翟思言法有漏泄察事者杖一百臺分言察正欲使察官案法而治其稽違而法所不及理容可議則責有在於言官蓋言察理勢相須宜不與别司同體況朝夕同見丞雜議事豈有所不聞則事勢之實果亦不能自異臣欲乞除見推司事雖言事官不許與聞外其餘言事官通知不為漏泄從之都水監丞李士良自劾滄州清池埽舊以御河西岸作黄河新隄隄薄地下不能制水已相度用御河東隄治為黄河大隄奏俟朝㫖昨為春夫已至役所臣遂令都大廵河官創築生隄一道簽上御河東隄有不待朝㫖專輒之罪詔釋之河東路經略司言差蕃部伊特凱等入西界刺事為賊所害詔伊特凱等四人各推恩其子比父職名升一資承襲廣西經略使熊本奏準密院劄子湖北轉運司奏照㑹誠州見抄劄潭溪等處溪峒地方直抵廣西都懐寨今若開修得上件道路通徹融州實為扼據三路溪峒咽喉伏望指揮下廣西協力經營以南一帯道路奉㫖宜依所奏專劄下熊本仰協力應接不得厝置譸張有失機㑹引惹生事本司今準上項指揮及知誠州周士隆状稱惟有楊晟嚮并手下百姓以向日作過未肯從衆臣若便行招諭令納土或致驚疑其晟嚮等見得彼中招諭次第須漸革心縻之嵗年勢必自効臣已牒知融州錢師孟詳上項事理密切體訪外臣一面厝置相度聞奏從之二日并十二日此當刪修己酉朝獻景靈宮辛亥遼主遣崇儀軍節度使蕭固衛尉卿乾文閣待制楊執中來賀同天節韓駒云北使舊乗船渡黄河元豐間稍桀驁欲就橋詔許之毎嵗十二月即繫浮橋六年二月梁壊而北使將及境賀同天節也令范子竒自工部郎中督役二十八日橋成成三日而使至上甚喜及坤成節在七月水怒漲不可橋詔復乗船彼不得已聽命乞與接伴同舟而濟龍神衛四廂都指揮使文州刺史种諤卒諤善撫馭士卒臨敵制變然性詐誕殘忍視人如草芥在軍中列白刄于前士卒有犯者立而劈之或出其心肝乃斬坐客掩面而諤飲食自若蓋其目近視不見也敵亦畏其敢戰故所部頗數有功自熈寧初諤首興邊事後再討西夏皆諤始謀卒致永樂之敗議者謂諤不死邊事不已壬子江淮等路發運司言江東轉運司去冬並不計置糴納糧斛乞取問轉運判官郟亶所因仍令據未足糧斛額一併運致淮南詔轉運司專以經理財用供辦嵗計為職今亶曠弛如此宜令發運司選官劾罪先是亶數上書獻均税圖事目叢脞上以亶不修職事專務求竒希功久欲罷絀故因劾之東頭供奉官新邕州永平寨主龍逹言累任邕州鎮寨遭交趾殺害臣母妻子弟今永平寨極邊復日與交人相見乞免差遣從之熈河蘭㑹路經略安撫制置使李憲言近䝉朝廷支錢一百萬緡令張承鑑計置前去恐不能應接急用欲望依此數别賜見錢公據每道止以十緡為率仍加息一分庶速得支用詔更賜續起常平坊場積剰錢五十萬緡限十日出給公據仍差使臣齎至經制司如積剩未至以元豐庫鄜延路入便見在錢借支癸丑詔提㸃梓州路刑獄何琬令吏部與鄉便差遣前此琬因奏對上以為疎濶不可任使及是因其有請故罷之提舉陜西保甲司言河中府姚用和齎慶歴八年黄勑言姚栖雲十世同居孝行可法賜旌表門閭二税外免差徭欲乞與免保甲從之丙辰左蔵庫副使曹貽孫為皇城副使供備庫副使張寛為西京左蔵庫副使東頭供奉官閤門祗候楊琰為内殿崇班依舊閤門祗候貽孫等以都大提舉汴河隄岸司奏京東物貨場課績増羡故也户部言根究淮南路逃絶税役等李琮奏累年虧陷税役乃是造簿錯誤官司失於㸃檢積成玩弊欲令人户逐年依料次隨夏秋二税帯納本部欲依琮所乞以今簿内失収税錢物特與除放從之此段疑有脱誤朱墨本同丁憂人前朝㪚郎試中書舍人曽鞏卒丁巳廣西經略安撫司奏據融州溪峒司狀申據王口寨申洪元州楊昌依楊聖照楊昌首楊聖生楊聖判等狀近準誠州差人前來招諭昌依等緣本州首領人各不願前去誠州今昌依等頭領五人并船夫六人共一十一人前來到寨欲乞指揮申解昌依等赴州取覆溪峒事宜及據楊昌兵二狀冩録在前州司再行責據昌依等狀竊緣昌依等係洪元州自來係屬融州每年出來融州買賣及赴聖節於元豐五年十月内準誠州㳂邊溪峒帖勾追昌依等前去納土今來昌依等各不願前去誠州納土情願依舊屬融州每年易為出來州寨買賣并赴聖節楊昌兵狀乞買耕牛州司帖商税務依自來條例施行去訖勘㑹近準朝㫖湖北轉運司奏誠州抄劄開修溪峒道路直抵廣西都懐寨界令臣協力應接臣已牒知融州錢師孟體訪利害并具奏聞去訖今據融州狀申據溪峒洪元州知州楊昌依等狀準誠州勾追前去納土今昌依等各不願前去情願依舊屬融州每年易為出來州寨買賣并赴聖節臣已再牒錢師孟密竊體問相度措置不得譸張引惹生事去訖詔劄與湖北轉運司指揮誠州照㑹密記十二日事二日并三日當考詳别修戊午西上閤門使果州團教使涇原路緫管劉昌祚為昌州刺史龍神衛四廂都指揮使知延州壬戌詔劉昌祚鄜延小大政事為种諤所壊舉皆玩弊朋私䝉蔽盗竊朝廷名噐財用者不可勝數卿擢自諸將緫帥一道視事之始其懲創前人之愆以公滅私痛革其俗凡百毁譽置之勿卹當有殊擢以須成功上批勾當皇城司官數多可除兩省都知押班外取年深者減罷止留十員自今毋得員外増置廣南西路走馬承受王懐正上邕州展白塔泉井圖上批茍如繪圖頗似便利恐更有委曲利害可委熊本相度以聞後本言展白塔井泉如懐正議便乞度僧牒三百下邕州以來年秋冬興工從之國子司業朱服言相度入律學命官公試律義斷案考中第一人乞許依吏部試法注官其太學生或精於律義斷案就律學公試中第一與比私試第二等注籍從之贈太尉劉從廣妻普寧郡主趙氏乞依曹誦妻延安郡主例増俸詔吴王元儼女皇家尊親同行存者止此一人可特給月俸百千春冬衣各増十匹生日増銀五十兩癸亥詔前宰臣執政官宫觀差遣添支依知大藩府禄令給之又詔陜西河東路緫管並罷兼將給事中韓忠彦等言奉勑詳定六曹條貫乞以詳定六曹條貫所為名詔宜稱中書門下外省三月壬辰大理少卿劉衮言竊見自來赦書云某年月日昧爽以前緣非次恩霈人難豫期欲乞依徳音例以赦到日為限從之工部狀陜西路轉運司言舊管使副判官止四㕔職田而昨因軍興逐路増員乃至十二雖職事一等勞苦而餘八員乃無職田乞許以四㕔所収均給從之甲子知潁昌府資政殿學士通議大夫韓維提舉崇福宫曽鞏既坐草制罰銅維數引疾求罷於是從其請詔自今見任官召赴闕上殿訖限次日朝辭回任聽候指揮禮部郎中林希上兩朝寳訓賜銀絹二百兩紀並書林希上寳訓是日李浩敗夏人于巴伊克谷舊紀有此新紀因之當考丙寅上批鄜延路經略使种諤四月辛亥卒病篤之際必神識昬憒前死數日陳奏尤多未知出於何人裁處詔純粹體量以聞五月十八日癸巳八月二十一日甲午西京左蔵庫使果州刺史内侍押班張允誠卒贈奉國軍留後賜錢千緡絹百五十匹皇太后贈錢二百緡推恩六人丁卯永興軍等路安撫司言近者賊盜屢發其禁軍逐路勾抽上邊全闕正兵差使乞有賊盜許令所在官司量事勢追呼已集教大保長捕殺詔遇有彊盜及十五人以上量人數暫勾抽日支錢米候敗獲即放還戊辰大理寺上宜州下班殿侍指使吴道土丁指揮使程洪都頭韋聦等遇賊不力戰致殺都監費萬該赦應原詔各杖脊二十程洪刺配三千里韋聦等二千里權發遣鄜延路經略司范純粹言本路都監禮賔使王愍從李憲奏移蘭州乞且令仍舊上批純粹遇事不茍雖權領帥司而存心公家旁無顧慮求於方今主邊之臣不可多得宜依所乞其後熈河蘭㑹路制置司言愍已至本司乞依舊充本路都監詔賜愍裝錢二百千速發赴鄜延本任詔皇城使丹州刺史張藻収夏州功應遷三官令回授子孫子雲需孫堯夫三人並與三班奉職熈河蘭㑹路制置司言準詔劾李浩罷蘭州猶帯本路鈐轄擅奏赴闕罪狀而浩自言雖奏赴闕實未離任詔浩於法當以擅去官守論然以未離本路及近出塞有功可罰銅二十斤己巳左右司言御史臺察開封府不置承受條貫聚聽供呈歴據刑部編勑所定奪各言所察允當然㸔詳勑意止為州縣立法故令案察官㸃檢於開封府既無案察官司於上條似無所礙其因臺察後輒旋置歴乃是御史所當察詔依刑部編勑所定開封府官吏令大理寺劾罪以聞尚書省左右司所申顯有觀望右司郎中劉摯衝替係事理重居數日詔改為事理輕時王安禮言摯以觀望罷黜陛下必以臣嘗知開封府故摯於開封府不置供呈條貫歴不敢指以為罪上曰非為如此摯亦嘗為開封府判官安禮曰開封府不置歴之罪止於應行下不行下爾失減從減之外法或不及知府兼臣與摯同時在府既皆去官又所坐皆在赦前恐别無觀望上曰論法至輕觀望未必有劉摯衝替可改作事理輕王珪曰欲改作稍重上曰既無觀望豈宜更作稍重所謂灼見三有俊心者當欽識百辟享亦識其有不享今執政既為開陳眀知其非罪不當不與辨正也安禮曰摯在都省每白公事必至聚聽處未嘗間見執政此一事已可稱章惇曰事固未嘗有兩可者其鹵莽極當責若以為觀望則實無之臣見蔡確言此事皆吏人盧宗彥執覆確亦嘗詰難宗彥然則摯應坐不能詰伏宗彥此事可責而情可矜也摯為人平直不反復前此左右司皆間見執政摯止於都堂白事蓋與宰府掾屬持兩端以取容者有間矣安禮曰摯實有行義為士大夫所知忽被此惡名而去臣若自以小嫌不為辨直使賢者之行不為眀主所察臣不忍也蔡確曰摯固善士但嘗異論爾上曰異論是昔時事惇曰摯自被逐不復異論人豈不容改過確曰臣前日已嘗論奏此狀實出於吏人爾故有是命左右司郎官舊以執政分㕔時間見白事日暮不徧或事急速又歴造私第議設有異則徃反傳逹事多留壅摯以問吏吏對曰前時郎官願如此摯乃白執政請以都堂聚時禀事可否靣決無傳言留壅之弊其例熟體細房吏請筆如故事皆曰諾自是事皆公決上下便之然他郎官不敢間見執政執政私意亦無所授隂不樂者甚衆摯罷去郎官復分㕔白事如故河東提舉保甲司言唐髙祖後徐王宗子李禋等狀乞依唐氏之後乾州李有方例免保甲從之庚午宣慶使武信軍留後入内副都知熈河蘭㑹路經略制置使李憲為景福殿使降授四方館使隴州團練使李浩為引進使髙州防禦使皇城使環州刺史李忠傑領光州團練使皇城使商州團練使苗履領吉州防禦使左騏驥使趙醇忠為皇城使榮州刺史六宅使王贍為皇城使洛苑使康識為左騏驥使莊宅使阿雅卜為右騏驥使供備庫副使韓緒趙惟吉董行謙包正並為西京左蔵庫副使内殿崇班焦頴叔為内殿承制以憲上浩等出境功狀計首級推賞也大理寺言商税院送客人尹竒於隰州博緑礬引外有剩數乞移河東路勘結而正杜純乞以所剩礬六百斤没官仍釋尹竒罪詔大理寺勘結施行其杜純越職論事付御史臺劾之已而上批大理正杜純近以不守業職妄論私礬事已付有司案治日者大理長貳上殿面問楊汲等純在寺其它治狀乃知供職以來造姦不一數與長貳紛紜據汲等奏陳三四皆純理不直意在取説聾俗沮壊法令探其用心罪在不赦可先衝替仍下本寺具純前後異議事狀送御史臺同根勘五月十九日提㸃秦鳯路刑獄吕温卿言秦州物貴人飢乞暫住糴至麥熟日從之辛未通直郎監察御史王桓為右正言官制行除諌官始此先是命中書門下外省官同詳定尚書六曹條貫是日給事中韓忠彦等以職事對上顧謂曰法出於道人能體道則立法足以盡事立法而不足以盡事非事不可以立法也蓋立法者未善耳又曰著法者欲簡於立文詳於該事陜西轉運司乞令通直郎通判解州吴安憲就移延州上批緣邊軍民之大者雖多屬經略司處置然干渉州務事亦不少人必得敏眀之選乃無敗事兼即今本州内外興役修葺城壘方頼以次官分頭幹治可依所奏速差據范純粹奏議安憲通判延州乃純粹奏辟也新舊紀並於辛未日書雨土今削去壬申御邇英閣蔡卞講周禮至司市上謂卞曰先王建官治市獨如此其詳何也卞對曰先王建國靣朝而後市朝以治君子市以治小人不可略也上曰市衆之所聚詳於治聚故也詔宣徳郎武學博士蔡碩罷博士專編修軍噐什物法度仍支舊任職錢先是監察御史王桓奏近武學補上内舍生其博士蔡碩以修軍噐法製權罷職事乞權差官考試案碩自元豐四年以兼編修除本學直日外餘悉不復緫領已一年有餘且博士職專教導而碩一月之間詣學者不過七八碩知力不能兼當辭其一而乃利其俸入不自析免者蓋恃兄確為宰相而人莫敢議故也如此何以示天下故有是命宫苑使榮州刺史勾當軍頭引見司時君卿為皇城使嘉州團練使提舉醴泉觀上以君卿昔事濮邸先帝遇之甚厚故也癸酉户部言恩州至滄州等處見有寄糴糧斛約八十餘萬石欲乞下河北路都大提舉糴便司令隨本處州縣人户賖借内第三等不得過兩石第四等第五等不得過一石即不得抑勒候次年夏秋収成日輸納其已有賖欠者勿給從之甲戌大理寺斷宗室三班奉職子徇與妺姦法皆處死詔並除名永不叙用子徇仍於本宫鎻閉妺於禁寺度為尼熈河蘭㑹路經略安撫制置使司乞毎嵗下茶場司就熈河州樁管茶萬䭾於經制司年額見錢内除豁充蘭州博糴從之陜西轉運副使權鄜延路經略司范純粹奏今月二十八日準四月二十三日樞密院劄子鄜延路經略司奏近據保安軍申封送到宥州牒夏國欲遣使副赴闕進奉已指揮本路㳂邊諸處不得小有輕發人馬擅去侵犯夏國却致有害講議大事竊慮諸路不知夏國欲遣使副詣闕進奉事理亦牒河東環慶涇原秦鳯熈河蘭㑹路經略司詳本路已行事理一靣相度施行去訖三省樞密院同奉㫖夏人欵狀亦未知情偽其范純粹所指揮除鄜延路自當遵行外餘路未須如此輕易施行仰范純粹疾速追還别聽朝㫖如已至逐路即仰不得下司劄付臣疾速依詳朝㫖施行者臣近準詔㫖攝帥鄜延領職之初檢經略司前後所得朝㫖一一詳味庶知朝廷處置邊事之意内有御前劄子二道令諸路帥臣勘的兵將可使萬全必勝者時遣出塞伺敵積聚所在討撃或西人有請和使人至塞上則切不得更有施行臣時得宥州文牒果有貢使之請緣諸將及城寨各有探刺皆已聞知臣慮捍邊使臣輕信弛備别致疎虞凡三次嚴行指揮丁寧諸將已下嚴整兵甲過作隄備及臣親書誡約頗已周至又契勘得自种諤領帥以來許諸將遣發人馬侵入西界淺攻近掠謂之硬探臣慮邊將復如此時妄有舉動不惟於夏人乞盟之際事闗體勢兼是有違前項切不得更有施行指揮遂兼誡將吏遵奉朝命不得更有施行臣竊謂本路雖已如此誡備若鄰路不知夏人遣使請命尚有舉動即於手詔切不得施行之意豈不違戾國事所繫臣不敢以鄰路彼我為間遂依久來闗報邊事體例移文諸路照㑹不請下司去訖今準前項聖㫖以為輕易伏緣臣所闗牒諸路止是慮諸路不知夏國欲遣使進奉略具大槩闗諸路照㑹相度施行庶於邊機各相照應即非敢以夏人請和為信輕易移文以弛諸路之備伏望聖慈更賜詳察所有元初發去諸路闗牒已是不請下司緣臣所遣牒已逾十日實恐追趕不及臣之用意實在於此純粹奏以六年四月二十九日今附本月日詔純粹張皇輕易五月六日可考
