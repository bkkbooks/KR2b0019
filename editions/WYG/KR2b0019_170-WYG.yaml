body:
  text: 續資治通鑑長編巻一百六十六宋李燾撰仁宗皇祐元年春正月甲午朔日有食之戊戌左司諫錢彦逺言武臣自殿直以上皆當赴内朝而日至殿中者無幾請以通事舎人一貟察於殿門三次不至者舉劾以聞從之己亥命度支副使刑部貟外郎吳鼎臣洛苑使眉州防禦使入内副都知藍元用徃澶州經度治河工費庚子徙河北都轉運使施昌言知兖州昌言議塞商胡決河令復故道與賈昌朝不合故徙之以吴鼎臣為天章閣待制河北都轉運使昌言尋又改江淮荆浙發運使辛丑命翰林學士趙槩權知貢舉甲辰復禮部侍郎知瀛州王拱辰為翰林侍讀學士兼龍圖閣學士知蔡州桞植為翰林侍讀學士刑部郎中知河中府程戡為樞宻直學士四方館使榮州刺史王徳基衛州團練使引進副使知保州王中庸為西上閤門使御史中丞張觀知雜事何郯皆言拱辰及戡才略足為名臣舉張得一罪薄故與植等俱脱譴籍戡女嫁宰相文彦博之子郯又乞不下中書商量恐彦博避嫌也戊申以河北水災罷上元張燈車駕朝謁停作樂庚戌太傅致仕鄧國公張士遜卒車駕臨奠翌日謂宰臣曰昨有言庚戌是朕本命不宜臨䘮朕以師臣之舊故不避文彦博曰唐太宗辰日哭張公謹陛下過之逺矣贈士遜太師中書令諡文懿御其墓碑曰舊徳之碑士遜生七日䘮母育於姑既長事姑甚謹姑亡為之行服徒跣扶柩以𦵏特追封南陽縣太君辛亥龍圖閣直學士兵部郎中權知開封府張堯佐為端明殿學士給事中提舉在京諸司庫務乙夘兩浙轉運司請自今杭州專管勾一路兵馬鈐轄司事如本路軍人犯法許鈐轄司量輕重指揮從之宋選為兩浙憲奏請置杭州鈐轄司比益州得便冝從事𫝊在神錄七十九必與轉運司所請相闗但此都不及憲司當考丁巳詔凡邉警盗發逓角者斬戊午定州路安撫使韓琦言邉人嚴政者嘗使刺事契丹今其家忽為契丹捕去必盡遭屠害乞補政為三班差使殿侍從之御史中丞張觀言諸處起請文字中書樞宻院批状下兩制令與御史臺同共詳定學士院告報議事月日承例御史臺官盡赴學士院連書聞奏竊縁御史臺官務在彈奏朝廷班序座立不同盖古者使異其局專其職欲乞今後免同兩制議事從之己未詔河北流民貧無種食賜緡錢二十萬市榖種分給之令佐能招輯勸課考實以聞辛酉詔曰自古為治必戒苛察近嵗風俗爭事傾危獄犴滋多上下暌急傷累和氣朕甚悼焉自今言事者非朝廷得失民間利病毋得以風聞彈奏違者坐之殿中侍御史張祹言不當禁諫官御史風聞言事不報祹餘杭人也王安石誌祹墓七月乙未祹以侍御史出知安州癸亥鑄皇祐元寶錢二月丁夘彗出虛晨見東方西南指歴紫微至婁凡一百一十四日而没此據本志實錄㑹要及本紀並無之當考詔自今月五日不御正殿其尚食所供常膳亦宜減省中外臣僚極言當世切務皇祐元年二月四日丁夘彗星出惟天文志有之本紀及實錄㑹要俱不載而㑹要乃於皇祐二年十二月二十四日載此詔其詔文云逾歳於兹上天謫見良由時事乖舛政化堙鬰果惻天心遽垂星變按二年冬無星變雖十二月嘗以愆亢减膳十九日得雪即復常細考之此詔乃元年二月四日詔也㑹要誤以元年為二年二月為十二月初四日為二十四日耳前刑部貟外郎張友直為史館修撰用其父士遜遺奏也御史何郯言史館修撰故事皆試知制誥友直素無學術不當得乃改集英殿修撰改集撰乃三年四月戊子今并書之戊辰以河北疫遣使頒藥權三司使葉清臣言三司緫天下錢榖贍軍國大計必藉十七路轉運司公共應副仍湏有材幹臣僚方能集事近年荆湖等路上供斛斗虧欠萬數不少皆是轉運司無所禀畏致此弛慢茍不振舉久逺上下失職號令不行損失財用有誤支計臣伏見提㸃刑獄朝廷以庻獄之重特置考課一司專考提刑朝臣進退差遣臣欲乞今後轉運使副得替亦差兩制臣僚考較分上中下六等若考入上上與轉官陞陟差遣上下者或改章服或升差遣及中上者依舊與合入差遣中下者差知州下上者與逺小處知州下下者與展磨勘及降差遣仍每到任成考並先供考帳申省闗送考課院今具考課事目如後一户口之登耗二土田之荒闢三鹽茶酒稅統比増虧遞年租額四上供和糴和買物不虧年額抛數五報應朝省文字及帳案齊足户口増田土闢茶鹽等不虧文案無違慢為上上考户口等五條及三以上為中上考若雖及三以上而應報文字帳案違慢者為中下考五條中虧四者下上考全虧及文帳報應不時者為下下考詔從之仍令磨勘提㸃刑獄院一處施行不見上下考疑此或脱此據㑹要皇祐元年二月五日事獨考提刑課不及轉運未詳己巳龍圗閣直學士右諫議大夫劉䕫為給事中樞宻直學士知鄆州兼京東西路安撫使時民流京東盗賊多起帝將益兵為備問誰可守鄆者宰相以䕫對遂擢用之䕫至鄆發廪賑飢民頼全活者甚衆盗賊衰止賜書褒諭辛未知青州資政殿學士給事中富弼為禮部侍郎初河北大水流民入京東者不可勝數弼擇所部豐稔者五州勸民出粟得十五萬斛益以官廪隨所在貯之擇公私廬舎十餘萬區散處其人以便薪水官吏自前資待闕寄居者皆給其祿使即民所聚選老弱病者廪之山林河泊之利有可取以為生者聽流民取之其主不得禁官吏皆書其勞約為奏請使他日得以次受賞於朝率五日輙遣人以酒肉糧飯勞之人人為盡力流民死者為大冢𦵏之謂之叢冢自為文祭之及流民將復其業又各以逺近受糧凡活五十餘萬人募而為兵者又萬餘人帝聞之遣使慰勞就遷其秩弼曰救災守臣職也辭不受前此救災者皆聚民城郭中煑粥食之飢民聚為疾疫及相蹈藉死或待次數日不食得粥皆僵仆名為救人而實殺之弼所立法簡便周至天下𫝊以為法弼墓誌神道碑朱墨史附𫝊並云弼先以救災加禮侍辭不受又以捕齊兵再加禮侍亦不受考其事迹盖顛倒也先加禮侍在去年三月乃捕齊兵後加禮侍則救災之故盖河北大水實縁去年六月河決商胡民流當夏秋間若春時河北固未嘗有大水也今悉正之詔發京師禁軍十指揮赴京東西路駐泊以備盗賊京東西路鈐轄並兼本路安撫都監京東安撫使富弼言本路遽増屯禁軍慮揺人心欲量増一兩指揮詔兵已就道俟將來歲豐令還京師户部副使包拯言拯言不得其時因増京東西禁軍附見臣聞京師者乃天下之本也王畿之内列營屯聚此彊本之兵也而國家近年以來邉陲有警乃一例調發恐非固宗社脩禦備之長䇿臣以為畿兵雖有大故不可多調發所謂京師者天下之本也彊本者畿兵爾本固且彊兼濟中外天下何所患焉若調發不已則耗其財力而弱其根本不惟隳祖宗之制獨不念唐天寶建中之事乎今河北河東沿邉兵寡財匱招置卒難惟有民兵可用徃年嘗籍之矣籍之未甚得策又從而釋之河朔之民皆禀氣勁悍義勇奮發生習邉鄙之利害素諳敵中之情偽他路校之不逮逺矣且向時㸃閲捨客取主又責以户下戸上以是籍之所得幾何竊見唐李抱真民兵之制事頗相近故當時昭義一軍雄視山東將適今之宜可取抱真之制約而行之一則不費供饋二則羣情樂為其處置訓練之法即有祖宗舊制民兵既壯禁軍留實京師則内外安矣今北敵聲言西討修築城柵㸃集軍馬乗此而制邉防亦宜宻為繕完而議者但持盟約殊不設備萬一邀求不已稍不如意伺釁而發曷以禦之况邉任武將未甚得人將者人之司命而邦國安危所繫可不審擇審擇之道不當限以名位髙下但辨其能之可否茍得實材則擢而用之專而委之必有成功若不素為之具緩急旋求之必無所及矣甲戌河北轉運司言黄御二河決並注乾寧軍請遷其軍于瀛州之屬縣詔止徙屯兵馬于瀛州志云河合永濟渠注乾寧軍宣徽北院使武昌節度使判延州程琳請代己夘加同平章事再判延州琳嘗獲戎酋不殺戒遣之諸戎部亦相告毋捕漢民久之夏人詐以五百户驅牛羊扣邉請降言契丹兵至衙頭矣國中亂願自歸琳曰契丹至彼帳下當舉國取之豈容有來降者吾聞夏人方捕叛者此其是耶不然誘我也拒不受己而賊果將騎三萬臨境上以捕降者為辭琳先諜知之閉壁倒旗戒諸將勿動賊以為有備遂引去郭勸等言與京西轉運使徐起河北轉運使崔嶧自横壠口以東至鄆州銅城鎮度地高下使河復故道為利明甚凡濬二百六十三里一百八十歩役四千四百九十萬四千九百六十工議雖上未克行也徐起鄄城人庚辰召近臣至諫官御史宗室自刺史而上赴迎陽門謁三聖御容河北沿邉安撫司言北界侵據銀防城數移文不報請因敵使來諭以誓約之意令毁去從之慶厯五年十月己巳詔劉湜諭北使令依誓約毁銀防城又五年八月包拯使契丹及還又言銀防城事不知契丹竟肯毁此城否當考梓䕫路鈐轄司言淯井監蠻百餘人内冦初監户負晏州夷人錢而毆傷斗落妹其衆憤怒欲報之知瀘州張昭信勸諭既已聽服而淯井監復縶婆然村夷人細令等殺長寧州落占等十人故激成其亂詔知益州田况發旁郡卒令梓䕫路鈐轄宋定親捕討之辛巳詔見任臣僚如敢於邉郡入中芻糧者以除名之罪坐之其以公使錢入中者以違制論若告者三百貫以下全給之監官知而容者與同罪契丹與夏人相攻聚兵近塞遣使來告邉候稍警帝御便殿訪近臣以備禦之䇿權三司使葉清臣上對曰契丹聚兵近塞邉郡稍警此據包拯𫝊清臣上對不得其月對有仲春之語因附此月末陛下臨御天下二十八年未嘗一日自暇逸而叛羌􅃛冦頻歲為患顧上無失徳朝無闕政而敢爾者豈非將相大臣不得其人不能為陛下張威徳而攘夷狄者乎昔王商在廷單于不敢仰視郅都臨代匃奴不敢犯邉今内則輔相寡謀綱紀不振號令不一賞罰不均處事依違惟務迎合猝有大事其誰與謀此黠冦得以輕漢也外則兵不素練將不素蓄士卒驕悍而不可用帥領怯懦而事姑息此强冦得以内侮也慶厯初劉六符來執政無術略不能折衝罇爼以破賊謀六符初亦疑大國之有人藏姦計而未發既見表裏遂肆陸梁只煩一介之使坐致二十萬物永匱膏血以奉之此有識之士所以為國長太息也今詔問北使詣闕以西伐為名即有邀求何以荅之臣聞誓書所載彼此無求况元昊叛邉累年致討契丹坐觀金鼓之出豈有毫髪之助今彼國出師輙求我助奸盟違約不亦甚乎若使辯㨗之人判其曲直要之一戰外破其謀契丹自通好以來久漸禮義我直彼曲豈不憚服茍不知咎敢肆侵凌方河朔災傷之餘野無廬舍我堅壁自守縱令深入其能久居既無所因糧則亟當遁去然後選擇驍勇遏絶歸師設伏出竒邀擊首尾若不就禽亦且大敗矣詔問輔翊之能方面之才與夫帥領偏禆當今孰可以任此者臣以為不患無人患有人而不能用爾今輔翊之臣抱忠義之深者莫如富弼為社稷之固者莫如范仲淹諳古今故事者莫如夏竦議論之敏者莫如鄭戩方靣人才方重有紀律者莫如韓琦臨大事能斷者莫如田况剛果無顧避者莫如劉渙宏逺有方略者莫如孫沔至於帥領偏禆貴能坐運籌䇿不必親當矢石王徳用素有威名范仲淹深練軍政龎籍久經邉任皆其選也狄青范全頗能馭衆蔣偕沉毅有術略張亢倜儻有膽勇劉貽孫材武剛斷王徳基純慤勁勇此可補偏禆者也至若威禦綏寧則竦戩尤其所長詔謂朔方災傷軍儲闕乏此則三司失計置轉運使不舉職盖非一日既徃固己不咎來者又復不追臣未見其可也且如施昌言承久敝之政方欲竭思慮辦職事一與賈昌朝違戾遂被移徙軍儲何由不乏自去年秋八月計度市糴而昌朝執異訖今仲春而尚未與奪財賦何縁得豐先朝置内帑本備非常今為主者之吝自分彼我緩急不以為備則臣不知其所為也至如粒食之重轉徙為難莫若重立爵等少均萬數豪民詿誤使得入粟以免杖笞必能速辦夫能嗇以省費漸致於從容徳音及此天下之福也比日多以卑官躐等請厚俸或身為内供奉有遥刺之給或為觀察使占留後之封僥倖之門日開賜予之物無藝若令有司執守率循舊規庶幾物力亦獲寛弛詔問戰馬乏絶何䇿可使足用臣前在三司嘗陳監牧之弊占良田九萬餘頃湏費錢百萬緡天閑之數才三四萬急有征調一不可用今欲不費而馬立辦莫若賦馬於河北河東陜西京東西五路上户一馬中戸二戸一馬養者復其一丁如此則坐致戰馬二十萬不為難矣三月甲午東染院使荆湖南路鈐轄楊畋為屯田貟外郎直史館知隨州畋自陳在嶺表捉殺蠻賊因得瘴霧之疾願還文資知近北一小郡故有是命丁酉詔許州知州通判自今兼郡牧事知忻州郭諮獻獨轅衝陣無敵流星弩諮有巧思嘗自為兵械皆簡要可用此據諮本𫝊刪修己亥邢州觀察使李端愿奪一官坐私其父婢并嘗殺驢以享客為人所告也庚子御延和殿召輔臣觀新造渾儀木様按宋史天文志作木様此作本様誤今改正時命日官舒易簡于淵周琮等參用梁令瓉李淳風舊制改鑄渾儀也監察御史陳旭言近來所差接伴及入國使副多是權貴之家未嘗歴事年少子弟或縁恩例陳請乞應差入國使副於武臣中擇曾歴邉任或履踐繁劇有才幹者充詔今後子細擇人此據會要三月八日事八日辛丑也就包拯出使書先是户部副使包拯答詔所問禦邉之䇿曰三路素為控扼之所中則梁門遂城南入真定西則鴈門句注南入并代東則松亭石闗南入滄州然松亭以南數百里水澤艱險自北界而出者則塘水足以限其來路惟鴈門句注背長城而南東西地里稍廣中與外古今所由出入之路也或有侵軼此最可虞今河北沿邉卒驕將惰糧匱器朽主兵者非綺紈少年即罷職老校隐蔽欺誕趣過目前持張皇引慝之說訓練有名無實聞者可為寒心謂宜委中外大臣精選其有實材者擢而任之其庸懦者黜而去之若不速為一旦緩急旋圖之則無所及矣且河北者國家根本之地存亡繫焉近年黄河決溢水災尤甚飢殍過半公私窘廹雖累下聖詔矜䘏賑救使命相望而農畆荒廢流亡未復倉廪虛竭不支數月此乃前日主計者之過也臣頃歲嘗奉使送伴及出疆回日凡三上言乞支撥錢帛徃河北當榖賤時廣謀計置以備凶荒終以位䟽言賤不賜施行方今粒食翔貴之時有司雖竭力營辦而財用不足何以取濟若更因循不為處置恐非宗社之福惟陛下特出宸斷鋭意亟行之免成後患臣嘗讀漢書宣帝以西羌未平京兆尹張敞建議願令諸有罪非盗受財殺人及犯法不得赦者皆得以差入榖贖罪欲乞下有司議罪犯可以贖者條約事件差定入榖多少俾河北州軍得以贖罪此亦權宜濟用之一端耳兼三路官員甚衆伏見真宗皇帝朝以河北荒歉減省京朝官使臣幕職七十五員其逐路部署押陣使臣軍職自觀察使而下悉罷赴闕此先朝令典願陛下遵而行之臣又聞河北屯兵無慮三十餘萬然備邉防嚴武事不可闕也老弱者衆緩急又不可用當此艱食之際供費寖廣萬一糧儲不繼勢必生變望令本路轉運安撫司揀退老弱以寛物力且老弱去則精鋭者勇物力寛則贍養者足其近裏兵伍即令漸次抽那於有糧儲州軍就食不然則物力俱竭為患不細臣聞頃歲於鄆州同州置二馬監各侵民田數千頃乃於河北監内分馬徃逐處牧養未逾一歲死者十有七八迄今為二州之害議者謂不若依舊歸河北諸監以其地給民則馬無所損民得其利矣縁馬事屬羣牧司逐州官吏不得統轄利害無由而知今若委轉運使兼領則廵按察視可以革去積弊磨以歲月必致増羡又何患戰馬之不足哉臣前所條陳皆國家之常務而言事者多及之臣謂今之切務者在擇政府大臣敢當天下之責獨立不懼而以安危為己任者委以經制四方庻幾可弭向者之患而紓陛下之憂矣他日又言屯兵備邉古之常制所患民賦有限兵食不充必湏廣為經度以給用度或歲有凶歉或冦至益兵則暴斂横取何所不至民既困矣敵何禦焉此亦必然之事也河北自失山後六州之險無所固守則畜兵積粟嘗患不足只如頃年敵忽生變雖復請和終非久逺之計兼沿邉沃壌又盡為陂塘租税既無所入皆仰給縣官雖竭天下之財以贍一隅無事之時日常窘廹無數歲之備若少有屯集如何取濟豈可坐觀其弊不務云捄之䇿哉欲望特出宸斷宣諭執政大臣應沿邉及近裏州軍兵馬除合留防守外其屯駐駐泊之軍悉令歸營就糧諸軍悉分屯於河南兖鄆齊濮曹濟等諸州况地利富實糧儲易給率三年一代遇有警即時可發不旬日可到寧有後期不及者且前代防邉之兵三時務農一時教戰公私自足未有冗而且衆糜費廪食虛國疲民如今日之甚者然執干戈預警備固不可闕在食之教之得其術則上下無困乏之患緩急用之則下有餘力矣議者若以戍兵不可全減即有徃年義勇强壯一十八萬餘人以充其數縁河朔之民禀性勁悍生習邉鄙之利害素諳敵國之情偽校之南兵絶為精鋭一則不費供饋二則羣情樂為訓練之法則有舊制存焉若謂兵食粗足和好方堅趣過目前以為成算憚於更張措置臣恐日朘月削中外益以殫竭一旦用兵則重加暴斂民必怨叛肘腋之下皆為仇讎豈暇禦㓂哉此乃國家根本之患若不表裏協心鋭意而速圖之臨事無及矣又言慶厯年中朝廷於河北諸州軍元抄㸃到鄉兵内揀得少壯者約一十八萬餘人作兩番教閲毎畨三箇月自九月一日起教至二月終罷續准樞宻院劄子只委自逐縣令佐分為兩畨教閲自十月至正月終更不支口食訪聞後來因循不教恐非紓患預備之長䇿也雖議者欲省資糧以為惜費之一端又况鄉兵十八萬餘人若分為兩畨毎人月支口食九斗鹽二斤共約支糧斛三十二萬餘石鹽七千餘斤乃河北一州之賦耳以河北地方千餘里三十餘州軍若以一州之賦給鄉兵一十八萬餘人比屯駐駐泊就糧十二月之費則甚寡校其利則至博兼土人生而勁悍若訓練稍足可代戍邉禁旅分屯内地此則利害灼然望特賜指揮檢臣前進劄子立賜裁處施行辛丑命拯徃河北提舉計置糧草癸邜徙判大名府山南東道節度使同平章事賈昌朝判鄭州翰林學士户部郎中權三司使葉清臣為翰林學士知河陽初河北轉運司失計運儲清臣自以汴漕米七十餘萬給之又請發大名庫錢以佐邉糴而昌朝格詔不從清臣固争且疏其跋扈不臣宰相欲兩中之因有是命契丹聚亡卒勇伉者號投來南軍邉法卒亡自歸者死昌朝奏除其法歸者貸罪稍遷補於是歸者衆因以刺知契丹事契丹遂拒亡卒黜南軍不用邉人以地外質契丹敵稍侵邉界昌朝為立法質地而主不時贖人得贖而有之歲餘地悉復清臣天資爽邁遇事敢行奏對無所屈郭承祐妻華王元偁女封郡主給俸及承祐為殿前副都指揮使妻以不加封請増月給清臣執奏不可上曰承祐管軍妻又諸王女當優之清臣曰是終為僥倖遂巻其奏置懷中不行清臣至河陽未幾卒判延州武昌節度使同平章事程琳為河北安撫使判大名府兼北京留守司判河陽宣徽北院使武寧節度使李昭亮為陜西安撫使判延州端明殿學士給事中張堯佐權三司使定州路安撫使韓𤦺言比朝廷欲禁近邉山林不許斬伐以杜戎人入冦之路當時并近裏淺山耕種之地槩行禁止致邉民遽然失業今薪炭翔貴翻令敵人乗時以取厚利臣嘗遣官行視可禁之處去敵尚五六十里亦可廣為防蔽已别定可禁之地揭牓諭民非令所禁者任采伐之先是楊懐敏管勾河北屯田溏泊奏禁定州西北山林不得樵采既而督州縣自御河以北巡邏日益嚴犯者輙寘於法邉人或徙居他處至琦除其禁人莫不便之御河一本作聒河家𫝊亦作聒河當考以會要邉防部書三月十一日知定州韓𤦺言本州界北乞一槩禁止採斫從之與實録所書不同當考乙巳御崇政殿試禮部奏名進士丙午試諸科庚戌禮部侍郎季淑復為端明殿學士兼翰林侍讀學士癸丑賜進士馮京等一百七十四人及第一百六人出身二百九人同出身於崇政殿京江夏人也甲寅賜諸科及第并出身五百五十人于觀文殿丁巳御崇政殿録繫囚雜犯死罪以下遞降一等杖以下釋之詔徙河北闕糧處土兵及戍兵於近南州軍候經置邉儲有備復令還屯從包拯之言也包拯所言已附是月辛丑前按拯本𫝊乃云拯先建議徒兵不報後為河北都漕復請之事卒不行拯為都漕在皇祐四年三月𫝊與實録不同當考州是年六月己巳又徙莫深博三州兵於真定府祁澶實録亦稱從拯之言不知拯傳何故事卒不行豈𫝊以所徙兵數不多非拯初議故邪當考廣平二監牧馬共占邢洺趙三州民田萬五千頃前已廢其一然漳河沃壌民猶不得耕拯請悉以賦民從之此據拯傳附見不得其日月按慶厯七年三月已廢洺州廣平監拯復有此請盖廣平元置兩監也己未契丹遣樞宻副使按遼史作北院樞宻副使遼興軍節度使蕭惟信復來告西征庚申翰林學士權知開封府錢明逸為回謝契丹使西上閤門使榮州刺史向𫝊範副之𫝊範敏中子夏四月甲子御崇政殿閱知澶州供備庫副使宋守信所獻衝陣無敵流星弩拒馬皮竹牌火鐮石火鋼三刄黒漆順水槍山字鐡甲野戰拒馬刀弩寨脚車衝陣劒輪無敵車大風翎弩箭八種仍以所差本州都知兵馬使李錫為三班差使殿侍庚午命户部副使包拯與河北四路安撫司轉運司議省冗官及汰軍士之不任役者以聞壬申改邕州管内溪洞波州為安平州癸酉契丹國母遣林牙保静節度使蕭祐起居舎人知制誥姚景禧契丹遣昭徳軍節度使耶律逵衛尉少卿李仁友來賀乾元節新知鄭州賈昌朝過闕入覲乙酉授祥源觀使留京師丁亥右司諫錢彦逺上勸農䟽曰農國家急務所以順天養財禦水旱制蠻夷之本源也唐開元户八百九十餘萬而定墾田一千四百三十餘萬頃今國家户七百三十餘萬而定墾田二百一十五萬餘頃其間逃廢之田不下三十餘萬頃是田疇不闢而游手多也勸課其可不興乎本朝轉運使提㸃刑獄知州通判皆帶勸農之職拜敕結銜正在督課而徒有虛文無勸導之實謂宜置勸農司以知州為長官通判為佐官舉清强幕職州縣官為判官先以墾田頃畆及户口數陂塘山澤溝洫桑柘著之於籍然後委勸農官設法勸課除害興利俟歲終農隙轉運司考較而賞罰之上嘉納焉錢彦逺上勸農䟽實録不載據㑹要乃四月二十六日今别取附見政要云仁宗覧䟽曰堯舜三代皆以為治天下之本其令依此必行賞罰庻幾海内家給人足然卒不見行此今但云上嘉納焉始恩州妖賊謀叛清河縣尉馬登先捕其黨陳友等二十餘人送州張得一不能窮治之以至竊發於是河北安撫使為言庚寅擢登西頭供奉官五月壬辰朔昭宣使眉州防禦使高陽闗路鈐轄楊懐敏兼管勾河北沿邉安撫司慶厯六年乙亥百官表已書懐敏兼管河北沿邉安撫司而實録無之皇祐元年三月壬辰實録乃書此而百官表亦具載今兩存之恐必有故當攷癸巳賜太常博士張碩五品服先是高陽闗路安撫使王拱辰得契丹宗真所下遺令上之朝廷以為疑而碩言此乃隆緒死時所頒者蓋邉人規賞而妄陳之爾驗視果然故有是賜丁酉祠部貟外郎任顓為河東轉運使上以河北嘗賜内庫金帛令亦以五十萬濟河東闕乏顓辭曰朝廷始命使委以經制財用而遽乞金帛以徃非是上善之附𫝊云使西夏還上治戎精要除直史館河東漕按實録五月除漕六月貼職今并書實録以河東為河北盖誤也吏部侍郎兼御史中丞張觀自言父居業年高多病請便郡庚子授觀文殿學士知許州翰林侍讀學士兵部郎中郭勸為右諫議大夫權御史中丞右班殿直權磁州管界巡檢張居實為閤門祗候以嘗親捕賊二十二人特擢之内午幸後苑寶岐殿觀刈麥顧謂輔臣曰朕新作此殿不欲植花卉而歲以種麥庶知穡事之不易也丁未遣官祈雨改新判大名府河北安撫使程琳為大名府路安撫使判延州陜西路安撫使李昭亮為鄜延路經略安撫使戊申録果州同廵檢右班殿直張懷普子忠順為三班借職以懷普與夷人戰死也癸丑詔建寧留後楊景宗特給節度使俸毋得為例宰相龎籍言殿中丞館閣校勘范鎮有異材不汲汲於進取丁巳特遣直秘閣庚申復置麟府路走馬承受公事内臣一貟六月甲子蠲河北民復業者租賦二年乙丑以太子右清道率府率叔韶為右領軍衛將軍仍賜進士及第尋加文州刺史叔韶嘗獻所著文召試學士院入優等特遷之入謝命坐賜茶謂曰宗子好學無幾爾獨以文章得進士第前此盖未有也朕欲天下知屬籍有賢者宜勿忘所學叔韶頓首謝既退又出九經賜之後以圖書賜正刺史以上叔韶不當得獨賜及之叔韶徳恭之曾孫也㑹要以叔韶為宗室召試之始叔韶嘉祐六年九月又遷詔梓䕫路鈐轄司乃者淯井監夷人内冦嘗募藥箭弩手白艻子弟隨軍其所貸錢糧悉蠲之己巳徙莫州馬軍十指揮于真定府深州馬軍兩指揮于祁州博州歩軍兩指揮于澶州從包拯之言也據包拯奏議仍移冀深博三州屯兵實録以冀為莫㑹要亦同奏議則徙冀州所屯十指揮于真定府大名府懷州衛州實録但稱真定府又實録㑹要俱云為三州經水闕食據拯奏議不為經水也今姑從實録㑹要以冀為莫但削去經水闕食字更須考詳甲戍山南東道節度使同平章事祥源觀使賈昌朝為觀文殿大學士判都省朝㑹考中書門下視其儀物觀文殿置大學士自此始仍詔自今非嘗為宰相毋得除戊寅詔中書樞宻非聚議按宋史作詔中書樞宻非聚議母通賔客原本作非聚㕔誤今改正毋得通賔客御史言殿前副都指揮使郭承祐屢謁宰相陳執中於本㕔坐久不退也壬午詔管軍臣僚自今麾下軍士非有戰功毋得請遷𨽻上軍右諫議大夫權御史中丞郭勸遷給事中勸辭所遷官乞追贈其祖萊陽縣令寧詔贈寧為祠部員外郎祖母張氏為清河縣太君左屯衛大將軍解州防禦使趙振落致仕為鄧州鈐轄初振子右班殿直璞試武藝於崇政殿與振偕入璞既得閤門祗候振因自陳嘗在邉有勞而筋力未衰故復起之振慶厯四年四月致仕五年十二月落致仕皇祐元年六月又落致仕凡兩落致仕而本傳但載其一不知何也或不足記則兩者並削去改命同刋修唐書翰林侍讀學士宋祁為刋修官乙酉起居舎人同知諫院李兊禮部員外郎侍御史知雜事何郯監察御史陳旭等言比歲臣僚有繳奏交親徃還簡尺者朝廷必推究其事而行之遂使聖時成告訐之俗自今非情渉不順毋得繳簡尺以聞其於官司請求非法自論如律從之丙戌光祿少卿分司南京余靖為左神武大將軍雅州刺史夀州鈐轄尋請以舊官侍養許之有司議斷祿賜詔不許丁亥監察御史陳旭言竊以三館職事文儒之高選近時無復典故用人益輕遂為貴游進取之津要慶厯中嘗有詔㫖今後見任前任兩省及大兩省以上官不得陳乞子弟親戚入館閣職事然撓於横恩復寢不用美官清秩為國者所以礪世磨鈍之具今委以私權貴之家天下寒畯何所勉進朝廷賢才何所教育望申明前敕嚴為科禁澄汰濫進必清其選使在位皆得文行充實之人然後舉用故事特因閒燕延備訪問則於治體不為無益詔今後近上臣僚援例奏乞子孫得試者如試中只與轉官或出身更不除館閣㑹要皇祐元年六月二十六日事實録無之嘉祐二年十二月十一日旭又建議旭所云撓於横恩當考戊子太子少傅致仕李若谷卒詔以子淑在近侍優贈太子太傅後毋得為例己丑翰林侍讀學士吏部郎中梁適為同羣牧使羣牧使舊止一員翰林學士彭乗已領之適盖員外置也
