body:
  text: 續資治通鑑長編巻一百六宋李燾撰仁宗天聖六年春正月丁酉朔馬軍副都指揮使武昌節度使彭睿卒上幸其第臨奠輟一日朝贈侍中遣官監䕶葬事法當得諡其家避都省集官之費而固辭之庚子上謂輔臣曰大臣之䘮遣官監䕶葬事蓋出於恩禮而近歲䘮家過有所費况祥符詔書自使相以下皆有定數今冝稍増其舊踰者令閤門御史臺金吾街仗司紏之其不願敕葬者亦聽詔閤門祇候自今經歴邊任及中外委使者特與五年磨勘餘並具功過奏裁辛丑契丹遣左千牛衛上將軍耶律阿果起居郎知制誥李奎來賀長寜節己酉罷兩川歲貢乾元長寜節織成佛詔自今南郊軍賞有闕其三司官吏並劾罪以聞先是南郊賞賜軍士而汾州廣勇軍所得帛不逮他軍一軍大譟捽守佐堂下刼之約予善帛乃免城中戒備遣兵圍廣勇營轉運使孫冲適至命解圍弛備置酒張樂推首惡十六人斬之遂定初守佐以亂軍所約者上聞詔給善帛使者至潞冲促之還曰以亂而得所欲是誘之亂也卒留不予既而上以軍賞事訊三司三司言汾州舊以淮南紬絹比折給軍士紬絹不足又令以土絁布代之故廣勇軍作亂首惡既坐誅餘悉配𨽻他州而降是詔實録載汾州事與孫冲傳略不同今從冲傳甲寅司天秋官正楊可言熒惑行近天街當犯而不犯請付史館從之然議者謂五星凌犯見於占測非筭數所知今日官言當犯而不犯非也戊午詔諸路提㸃刑獄朝臣使臣交割本職公事與轉運使副使仍令轉運使條所省事件以聞或言提㸃刑獄官過為煩擾無益於事故也庚申上封者言三司判官開封府推判官近歲數遷易又多權要陳乞請自今並選有材幹而嘗更任使者為之俟二年以上方除外任監司京朝官知縣兩任為通判又兩任為知州三班使臣一任監當入監押巡檢資任太速請各増一任若有顯効及累被薦舉者令審官三班院以名聞又進士及第本以辭藝進而比來多乞賜子孫科名又閤門祇候太宗朝其貟至少真宗置提㸃刑獄副使因詔近臣舉歴官有勞者授之其後又益舉者至七人以艱其進今權要之家比援恩例而濫進者多請一切罷之諸路走馬承受歲滿當除閤門祇候止與遷一官並從之仍著為令癸亥免河北州軍災傷人戸夏秋稅折變一年詔天下應在官物令諸路轉運使選所部同判或幕職官期三年内悉除之百萬以上歲中除十之八者升陟不及百萬而歲中悉除者録其勞過期者劾罪以聞甲子建州觀察使康繼英請以南郊所加恩囬贈其祖再遇一官詔優贈之二月辛未以知揚州祠部貟外郎杜衍為刑部貟外郎先是衍提㸃河東路刑獄寜化軍守將鞫人死罪不以實衍復正之守將不伏訴於朝詔為置獄果不當死於是有司言法當賞衍特遷之宰臣王曽等言真宗忌自大祥後禁刑不視事前後各三日禁樂各五日然歲月漸逺禮有可殺之文詔自今禁刑不視事各兩日禁樂各三日詔太常寺四郊齋官常行視完葺之少府監祠服遣吏齎赴祠所以給祠官光禄寺進服令監祭使封題同進判太常寺孫奭言皇地祗等十八壇皆有外壝而南郊獨無樵牧之人徑至壇下有凟嚴恭按圓設三壝今請築外壝仍於壝外築短垣四面各置櫺星門俟皇帝親郊則以青繩柱表其三壝以合郊丘之制從之同知禮院王皥言諡者行之表也善行有善諡惡行有惡諡蓋聞諡知行以為勸戒六典太常博士掌王公以下擬諡皆迹其功徳而為之褒貶職事官三品以上散官二品以上佐吏録行狀申考功下太常擬諡訖申省擬定聞奏近日臣僚薨卒雖官品合該擬諡其子弟自知父祖别無善狀慮定諡之際斥其繆戾皆不請諡竊以諡法自周公以來垂為不刋之典蓋以彰善癉惡激濁揚清使其身歿之後是非較然用為懲勸今若任其遷避則為惡者肆志而不悛欲乞今後凡有臣僚薨謝不必候本家請諡並令有司舉行如此則隠慝無行之人有所沮勸若謂須佐吏録行狀申乞方行擬諡臣略觀方册别無明證惟春秋衛公叔文子卒其子戌請諡於君曰日月有時將葬矣請所以易其名者謂春秋之時周徳下衰於是禮壊樂缺公叔之卒有司不能明舉舊典故致將葬始請諡於君且周制太史掌小䘮賜諡小史掌卿大夫之喪賜諡讀誄以此知有司之職自當舉行明矣又言兄弟同朝如遇覃恩俱該封贈父母除中書樞宻院外乞許令列狀陳請仍於告身具列兄弟職位特比常例優與推恩詔並從之據㑹要皥論諡法及論封贈皆在五年十月今並從實録蓋皥所論先下禮院乞如所請施行故也降内園副使王世融為内殿承制監虢州稅初世融女嫁東頭供奉官承詡不相能世融託妻病奏詔承詡過其家被酒乃與三子毆之法寺議世融上書詐不實當追官勒停上特寛其罪亦勒承詡朝叅承詡徳鈞子世融承衍子也甲戍詔永興軍涇陽知縣兼管勾三白渠先是都官貟外郎監正陽鎮酒稅李同言三白渠冝立約以限水因擢同知縣而有是命丁丑詔上御藥供奉藍元用張懐徳羅崇勲並落供奉為上御藥戊寅上謂輔臣曰登州採金歲益數千兩其官吏冝降詔褒諭王曽對曰採金既多則農民皆廢業而趨利不當更誘之上曰誠如所言然官吏勤事亦不可不勸也庚辰大風晝暝甘州可汗王寳國伊嚕格勒遣使貢方物壬午工部尚書平章事張知白卒知白在相位惜名器無毫髪私常以盛滿為戒雖顯貴其清約如寒士然體素羸憂畏日侵在中書忽感風眩輿歸第帝親問疾已不能語卒為罷社燕贈太傅中書令太后臨奠之其家以貧辭敕葬詔送終之具悉從官給且諭王曽等令共恤其家禮官謝絳議諡文節御史王嘉言以為絳止因車駕臨問覩其寢處儉素為之動容乃引好亷自克為諡似略其大而録其小以知白守道徇公當官不撓可謂正矣請諡文正王曽曰文節美諡矣遂不改嘉言禹偁子也或言知白與虞部貟外郎楊儔者善自西川罷歸知白欲令審官先與除授曽不可曰百執事釐務自有次序儔安可先也未幾曽以疾謁告叅知政事魯宗道迎知白意議先與儔官知白忻然從之後宗道乃對上發其事知白驚惋自失退而引咎謝曽因之抑鬱數月而沒故知白不喜宗道常語人曰銓曹中取一最不材選人軍巡獄中求一最無行者亦當優於此人矣先與楊儔官據王子融言行録惡魯宗道據子融百一編然知白素號賢相宗道亦雅有直聲恐未必爾也更須參考之丙戌詔江淮鹽糧綱卒歲一代之毎歲十一月放還營至春如舊丁亥益州路轉運使狄棐言雅州地僻請如維茂黎三州例舉本路知縣人為知州從之去年六月辛卯上諭三司曰太平興國寺太宗所建歲乆隳摧其以諸塔廟所施錢亡僧衣鉢増葺之開封富民陳氏殺傭作者而誣以自經死事覺輙逃匿不獲判官侍御史李應言指其豪横結權要請嚴捕之壬辰出應言知河陽而事遂緩應言尋徙夀州慶歴三年七月李應言有附𫝊但無邑里定王府記室参軍刑部郎中康孝基言前後宫僚例帶館職望稽典故俾登深嚴㑹要六年二月二十六日事實録不載孝基自陳癸巳命知制誥徐奭龍圖閣待制孔道輔除放三月欠負詔乾元長寜節禁決大辟前後各二日餘罪惟正節日權停甲午雄州言民妻張氏戸絶田産於法當給三分之一與其出嫁女其二分雖有同居外甥然其估為緡錢萬餘當奏聽裁上曰此皆編戸朝夕自營者毋利其沒入悉令均給之宰相王曽参知政事吕夷簡魯宗道咸贊曰非至仁何以得此也三月丙申朔日有食之辛丑詔陜西河北京西民困災傷流移者免所過渡錢壬寅召輔臣崇政殿西廡觀侍講孫奭講尚書戊申太后幸贈侍中劉美第左司諫劉随奏䟽勸止太后納其言自後不復再駕此據宋祁所作隨墓銘傳云太后不宜數幸外家恐誤也今改之己酉京西轉運使楊嶠言澶州浮橋用船四十九隻自温州歴梁堰二十餘重凡三二歲方達澶州請自今於秦隴同州伐木磁相州取鐡及石炭就本州造船從之嶠礪子也辛亥詔歲調鄆曹濮等州丁夫以治澶州河堤頗妨農業自今發鄰州卒代之又詔河北縁邊安撫司契丹歸明人嘗授偽官者勿留追號江南處士史虚白為冲靜先生虛白有髙節善屬辭五代亂離隱居巖谷李氏累聘不起至是其孫虞部貟外郎温已以虛白文集來上特追旌之張知白既卒上謀所以代之者宰臣王曽薦吕夷簡樞宻使曹利用薦張士遜太后以士遜位居夷簡上欲用之曽言輔相當擇才不當問位太后許用夷簡夷簡因奏事言士遜事上於夀春府最舊且有純懿之徳請先用之太后嘉其能讓壬子樞宻副使張士遜為禮部尚書平章事從利用之言也曽加吏部尚書利用改保平節度使進封鄆國公張耆改泰寜節度使封岐國公叅知政事吕夷簡加戸部侍郎魯宗道加禮部侍郎樞宻副使夏竦加給事中王曽曹利用薦相見江氏雜志又據馮氏御史臺記張知白既卒月餘王曽留身議命相后欲用士遜且言士遜位夷簡上曽曰相當以才昇不以位次后許用夷簡是日晚兩府復奏事夷簡因留身讓士遜后卒相士遜今参取二書癸丑以右諌議大夫知永興軍姜遵為樞宻副使遵長於吏事其治尚嚴猛所誅殘者甚衆時人號為薑擦子太后遣内侍曾繼莘於永興軍營浮屠遵希太后㫖悉毁漢唐碑碣以代甎甓而又佐繼莘躬自督治既成乃得召用云繼莘尋死於塔所人謂鬼誅之也丁巳詔諸河押運殿侍犯杖罪令轉運發運司依三軍大將例勘決施行戊午以試中身言書判掌禹錫等八人為京官餘六十四人第遷如故事禹錫郾城人也己未龍圖閣直學士右諫議大夫權三司使公事范雍為樞宻副使仍班姜遵之上辛酉以樞宻直學士右諌議大夫知益州薛奎為龍圖閣直學士權三司使公事右諫議大夫權御史中丞程琳為樞宻直學士知益州成都歲市布織縑數十萬以給秦隴軍用吏多隱剋為姦奎令民自相保任預貸其直以期㑹輸官民便之有掘地得偽蜀時中書印者貯錦囊中夜挂城西門閽吏晨取以白從而觀者以萬計皆恟恟以為異奎顧主藏吏藏之略不取視民婦訟其子不孝詰之乃曰貧無以為養奎出俸錢予之戒曰若復失養吾不貸汝矣其子母遂如初上元然燈與僚吏夜燕佛寺有戍卒殺人於市市人皆奔走奎宻遣捕殺之坐客莫有知者其臨事持重明決多類此壬戌詔於順天門外八角鎮建西太一宫司天言五福太一在黄室宫呉越分凡四十五年今當自黄室宫趨黄庭宫梁蜀分故也夏四月丙寅朔降詔恤刑上因謂輔臣曰天乆不雨天下刑獄其有枉濫乎卿等不可不察也戊辰詔審官三班院吏部流内銓軍頭司各引對公事自帝為皇太子輔臣叅决諸司於資善堂至是始還有司庚午詔審官三班院吏部流内銓磨勘人並前一日具歴任功過進内候批出方於崇政殿引對仍令主判官看詳有合覆奏者先奏聽裁邕州七源州權寨主三班借職李緒與交趾戰死録其子和為三班借職李公藴雖遣李公顯來入貢又令其子弟及壻申承貴率衆内冦也壬申知澶州宣州觀察使駙馬都尉李遵勉辭置酒長春殿故事觀察使辭不置酒特寵之詔河北縁邉先落蕃人有來歸者量給錢使還故里丙子契丹遣安東軍節度使耶律錫利州觀察使劉雙美來賀乾元節丁丑遣開封府推官監察御史王沿左侍禁閤門祇候郭立往河北災傷州軍體量安撫降敕牓逃户歸業者免今年田稅官為貸種食縣鄉毋得追擾其邢趙滄瀛懐衛等州民飢尤甚亟發廩賑救之戊寅詔渭州鎮戎軍新招弓箭手湼其左手背以别之仍給新開壕内田歲所收租半予之餘充本處公用又詔鎮戎軍原渭州蕃落指揮近升為禁軍其依廣銳勁勇軍例官給錢市馬此叚只須記湼手背恐是事始不然并可削去庚辰除潞州民食鹽錢析鄆州張秋埽為三百步埽増巡䕶使臣一貟三百步其地名也癸未命龍圖閣待制燕肅直史館康孝基同議蠲減三司歲所科上供物凡中都歲用百貨三司視庫務所積豐約下其數諸路諸路度風土所冝及民産厚薄而率買謂之科率諸路用度非素蓄者亦科率於民然用有緩急物有輕重故方上所須輕者反重賤者反貴而民有受其弊者肅等既受命建言京師庫務所積可給二年者請勿復科買詔從之後下赦書數以為言勿復科買在九月乙未今并書之甲申旦有星大如斗自北流至於西南光照殿庭有聲如雷尾長數丈乆之散為蒼白雲乙酉鹽鐡判官太常博士直史館蕭貫為京東轉運使時提舉捉賊劉舜卿者善捕盗號劉鐡彈恃功為不法前後畏其凶悍莫敢治貫至發之廢為民丙戍改新知永興軍胡則為陜西都轉運使涇原路鈐轄兼知渭州劉平自言則丁謂之黨臣與謂有隙今𨽻則部慮掎摭致罪詔徙平知汝州然則亦竟不赴陜西也戊子以星變命輔臣分詣寺觀禳祈庚寅徳音以星變齋居不視事五日降畿内囚死罪流以釋之罷諸土木功賑河北流民過京師者時命僧道禬禳於文徳殿殿中侍御史李紘奏曰文徳殿布政㑹朝之位毎災異輙聚緇黄讃唄其間何以示中外右司諌劉隨因星變言國家本支蕃衍而定王之外封䇿未行望擇賢者用唐故事増廣嗣王郡王之封以應祖宗意監察御史鞠詠條上應變五事又言太子少保致仕晁迥雖老而有器識冝䝉訪對其必有補五月丙午盩厔縣尉孫周翰杖脊刺配廣南牢城坐因市物决人至死也丁未詔權停貢舉庚戌詔温鼎廣等州歲貢柑不得以貢餘為名餉遺近臣始王曽言於上請斷貢餘上曰貢且勞矣况其餘乎亟命罷之樞宻副使姜遵言咸陽民元守亮歲貢梨朝廷給賜常倍其直守亮族素豪毎恃此誇其里中因以凌弱請絶其獻上曰朕不知守亮敢恃此以横也辛亥詔罷之遵自長安入樞府乃言此事本傳載於未召用前蓋誤今從實録及寳訓贈禮部尚書諡安恵周起卒壬子知青州李廸請以泰寜節度推官劉顔為青州觀察推官從之乙卯河北京東蝗丁巳以樞宻直學士工部侍郎李及為御史中丞及時知河南召用之杜衍提㸃京西路刑獄及與衍㑹為具甚踈薄他日中貴人用事者至亦無加品衍歎其清徳及妻張氏性悍妬及嘗生子鞠之外舎張固請保養之一日㑹親屬以子擊堂柱碎其首及遂無子記聞章獻太后臨朝内侍省都知江徳元權傾天下有弟徳明奉使過杭州時李及知杭州待之一如常時中人奉使者無所加益僚佐皆曰江使者之兄居中用事當今無比榮枯大臣如反掌爾而使者精銳復不在人下明公待之禮無加者意者明公雖不求福獨不畏其為禍乎及曰及待江使者不敢慢亦不敢過如是足矣又何加焉既而徳明謂及僚佐曰李公髙年何不求一小郡以自處而乆居餘杭繁劇之地豈能辦邪僚佐走告及曰果然使者之言甚可懼也及笑曰及老矣誠得小郡以自逸庸何傷待之如前一無加既而徳明亦不能傷也時人服其操守按及以乾興元年三月知杭州天聖元年九月徙南京在杭州才一歲餘不當云乆居此蓋誤也今不取樞宻院請擇諸班之識字者以備邊吏之闕得内殿直都知任冝等十人己未授冝作坊副使餘皆優擢之廣南西路轉運使言交趾入冦已令都同巡檢領兵及發溪洞丁追取所略戸口詔如不盡還所略即與邕州知州㑹兵討捕之時文思使焦守節知邕州遣人入交趾諭以利害公藴拜章謝守節事附見賜光禄寺丞集賢校理李淑進士及第時淑預修史同修史官劉筠等列奏淑夙負詞學時稱俊敏召試學士院䇿論甚優而有是命六月丙寅除戎瀘等州榖稅錢新汾西縣令雄文雅言父永昌縣尉可則先沒於王事乞納所除縣令回贈之丁卯贈可則大理寺丞文雅除縣令如故賜延州修城平川寨役卒緡錢戊辰以契丹故沃野縣主簿楊從簡為北海縣主簿從簡安徳人嘗舉明經後并其母陷契丹以本科及第至是挈族來歸而父無恙上矜而録之周虢州刺史柴貴世宗弟也其孫肅自陳求官上問王曽曰肅果柴氏之後乎曽對曰得貴吿身驗之信然上曰世宗開拓土宇為吾國家也後裔其可忘哉命為三班奉職寳訓既有肅名又有元亨名今但依實録存肅名當考寜州防禦使李允則卒允則自雄徙鎮又自鎮徙潞在河北前後踰二十餘年事功最多其方略設施雖寓於逰觀亭傳間後人亦莫敢隳至於國信往來費用儀式多所裁定晚年居京師漢人有自契丹亡歸者皆命舎允則家允則既死始寓樞宻院大程官營甲戌賜防河卒衫袴其後率以為常率以為常據本志己卯廣西轉運司言靜海節度使同平章事安南都䕶南平王李公藴卒諸子爭立乞増飭邕欽廣三州兵備詔桂宜等州巡檢都監領所部兵於近界防扼事定即還乙酉出内藏庫緡錢二十萬下京西轉運司市糴軍儲丁亥以太常丞直史館馬季良為龍圖閣待制先是太后欲擢季良侍從王曽難之㑹曽移疾太后諭中書令亟行除命執政承順且遽故季良止以三丞充待制蓋三丞未有預内閣清職者朝論譁然益重曽之守正云己丑追復太常少卿戚綸為左諫議大夫綸以責死天禧間其子舜舉上綸平生奏議詔復之詔光州權置通判一貟以武臣石普知州故也秋七月甲午朔淮南江浙荆湖制置發運副使張綸領昭州刺史前淮南轉運使主客郎中胡令儀為金部郎中捍海堰成故有是命四年八月丁亥初修堰乙未詔翰林院自今醫學祇候嘗有過者及十年毋得還開封府監察御史王沿為河北轉運副使沿上言本朝制兵刑未幾於古自北人通好三十年二邊常屯重兵坐耗國用而未知所以處之請教河北强壯以代就糧禁卒之闕罷招廂軍以其冗者𨽻作屯田行之數年當漸銷減而強壯悉為精兵矣古者刑平國用中典而比者以敕處罪多重於律律以絹直代之律坐髠􅎂而役者敕黥竄以為卒比諸州上言謫卒太多衣食不足願勿復謫者七十餘州以律言之皆不至是是以繁文罔之而寘於理也誠願削深文而用正律以錢定罪者悉從絹估黥竄為卒者止從髠􅎂此所謂勝殘去殺無待百年者也此䟽附見不必在初除漕時當考己亥度支副使工部郎中唐肅為契丹后生辰使内殿承制閤門祇候葛懐敏副之乙巳以戸部判官左司諫劉隨知濟州隨在諌職前後所論甚衆帝既益習天下事而太后猶未歸政隨請軍國常務專禀帝㫖太后不恱㑹隨請外因命出守賜延州城平川新置寨名曰承平内園使連州刺史知代州劉文質卒詔厚賻其家録其三子渙為將作監主簿滬為三班奉職濬為借職文質以簡穆親又父死事故前後賜與異諸將真宗嘗問保塞之舊文質上宣祖太祖賜書五函上亦五以書賜之然性剛喜評刺短長於貴近無所遜故不大顯此據正傳正傳亦采蘓舜欽所為文質墓銘壬子江寜府揚真潤三州並言江水溢壊官私廬舎甲寅遣度支判官太常博士直史館髙餗西頭供奉官閤門祇候劉永証為江淮兩浙體量安撫其因水損失官物悉具數以聞被溺之家三口以上給錢二千不及者半之丙辰以翰林學士兼侍讀學士蔡齊為龍圖閣學士知河南府羅崇勲趣齊上修景徳寺記曰参知政事可得也齊故遲其記不上崇勲怒䜛於太后命齊出守参知政事魯宗道固爭留之不能得尋以親老易宻州太后諭宰相取記齊上之命内侍蔡齊卿等存問江淮兩浙水災州軍人兵被溺之家不能收殮者官為瘞埋之詔髙餗等所至毋得燕逰及令官吏送迎重為煩擾時杜衍在揚州營䕶有勞州人懐之使者還對見未及他語太后問杜衍安否使者以治上對太后歎曰吾知之乆矣賜樞宻使張耆常樂坊第一區辛酉監察御史王嘉言言信州民程尚獻石緑末青二萬五千兩助修在京䕶國禪院遂得免徭役竊恐四方之民競縁貢獻而致僥倖漸不可止詔程尚但免役二年開封府言有民馮懐信嘗放火其妻力勸止之他日又令盜摘鄰家果不從而脅以刃妻懼告夫准律告夫死罪當流而懐信乃同日全免上曰此豈人情耶乃詔懐信杖脊刺配廣南牢城其妻特釋之壬戍知制誥徐奭等言詳定三司欠負凡放二百三十六萬是月雄霸州大水命駕部貟外郎閻貽慶等浚廣濟河此據㑹要七月事八月癸亥朔賜河北修河防城役卒緡錢甲子省澧州同判一貟乙丑詔河北水災州軍免今年秋稅初上謂輔臣曰比令内侍往縁邊視水災如聞有龍堰於海口故水壅而不泄可遣官致祭王曽曰邊郡數大水蓋洪範所謂不潤下之證海口恐非龍可堰也冝寛民賦以答天災故有是詔丙寅户部副使度支貟外郎王鬷為河北縁邊水災州軍安撫使六宅使康州刺史劉承顔副之積水害民田處令日具増減以聞民轉徙他州者免所過稅諸繫囚與長吏從輕遣决官吏貪暴者劾之己巳祠部貟外郎直集賢院丁度為京西轉運使司天言永昌陵有白氣請改築以厭不祥詔度按視度奏神道貴靜陵廟事大不可用術者言輕議増損乃止永昌陵白氣恐自有時日則此條不必載屯田貟外郎陳貫知涇州督察盜賊禁戢不肖子弟簿書筦庫賦租出入皆自檢覈嘗謂僚屬曰視縣官物如已物容有姦乎州人憚其嚴於是徙為利州路轉運使㑹歲飢自以職田粟賑飢者又率冨民令計口占粟悉發其餘所活㡬萬餘人詔書褒諭上復命殿中丞陳執中為右正言壬申以執中知漢陽軍復官才五日也天禧中曹利用壻盧士倫除福建轉運使憚逺不即行利用為請乃改京東執中時在言職嘗劾奏之及是利用方用事言執中資淺宜試治民乃命出守甲戌淮南江浙荆湖制置發運使文思使昭州刺史張綸知秦州綸天禧末為發運副使時鹽課積虧者十年綸乃奏除通泰楚三州鹽戸宿負官助其器用鹽入優與之直由是歲増課數十萬復置鹽場於杭秀海三州歲入課又三百五十萬居三歲増上供米八十萬在江淮踰六年為民興利除害甚衆性喜施與漕卒多凍餒道死者綸見之歎曰此有司之過非所以體上仁也推俸錢市絮襦千數衣其不自存者乙亥澶州言河决王楚埽凡三十歩李􅌫十朝綱要發夫卒塞之丁丑三佛齊國王室離疊華遣使蒲押陁羅歇及亞加盧等來貢方物舊制蕃國使入貢賜以間金塗銀帶時特以渾金塗帶賜之戊寅翰林學士承㫖兼龍圖閣學士劉筠以龍圖閣學士知廬州筠三入翰林意望兩府及為承㫖頗不懌嘗移疾不出或戯筠曰服清凉散必愈蓋兩府乃得用青凉傘也筠前嘗知廬州愛其土遂築室城中駕閣藏前後所賜書上為飛白書曰真宗聖文祕奉之閣及再至即營冢墓作棺自為銘刻之後三歲竟卒於書閣筠初為楊億所識㧞後遂與億齊名時號楊劉性不茍合臨事明達而其治尚簡嚴然晚為陽翟同姓富人奏求恩澤清議頗少之樞宻直學士給事中冦瑊為契丹生辰使内殿崇班閤門祗候康徳與副之殿中侍御史判三司開拆司朱諫為正旦使供奉官閤門祇候曹榮副之開封府判官殿中侍御史張逸為契丹后正旦使左侍禁閤門祇候劉永釗副之榮仍改名英英改名當是避契丹諱更考之甲申詔錢惟演以下至御史知雜五十五人舉殿直以上材武方略曉邉事者各一員其未厯親民及兩府親戚走馬承受閤門祇候者毋得舉晏殊之出也上意初不謂然欲復用之㑹李及卒乙酉召殊於南京命為御史中丞仍令班翰林學士上唐中書令張九齡九代孫錫以九齡告身及明皇批答來獻上謂輔臣曰九齡唐名相也冝旌其後即授試國子四門助教王曽曰安禄山反狀未萌九齡獨先見請誅之明皇不聽及禄山反乃自蜀遣使致祭於曲江雖悔無及也今録其後足以勸忠矣丁亥詔審官院選官知真楚泗三州賜南京修溝河役卒緡錢樞宻院言諸軍將校中頗有因循不能禁戢軍士者欲召殿前馬歩軍副指揮使楊崇勲夏守贇等宻令體量具名以聞别取進止時將轉貟故也九月壬辰朔省廣桂二州幕職官各一貟丙申河北轉運使王沿言乾寜信安軍霸州公人逃去者隨輙差人水災之後重困於民請俟歲豐如舊從之己亥詔近制京朝官三任知縣入同判又三任入知州自今任内嘗有五人同罪奏舉者減一任辛丑西太一宫成壬寅免雄霸等州被水家蒲魚稅錢詔審官院選官知興元府及利州癸卯幸西太一宫甲辰詔河北災傷民嘗以桑土倚質與富人者悉歸之候歲豐償所貸錢乙巳詔河北城壁為水摧圮天下州軍器械乆不繕完者其遣使臣十七人往諸州提㸃修葺之河北即委轉運使巡所部舉行丙午太常少卿直昭文館陳從易為左司郎中兵部郎中集賢院修撰楊大雅並知制誥自景徳後文士以雕靡相尚一時學者鄉之而從易獨自守不變與大雅特相厚皆好古篤行無所阿附天禧初大雅提㸃淮南刑獄循江按部過金陵境上遇風舟覆得榜卒拯之及岸冠服盡䘮時丁謂鎮金陵遣人遺衣一襲大雅辭不受謂以為歉王欽若為宰相亦不恱之朝廷欲矯文章之弊故並進從易及大雅以風天下大雅初名侃以犯真宗藩邸舊諱詔更之按寔録從易大雅蓋與度支判官右司諫直史館同修起居注張觀三人者並為知制誥今但從正史載二人事迹削觀不著戊申御崇政殿閱諸軍轉貟凡三日庚戍詔御書院待詔出職者自今不得為文資癸丑以才人張氏為美人時張氏已被疾後五日卒益州鈐轄劉承顔言商旅入川無公憑者多由葭萌私路往請如劒門置闗仍令逐處給公憑至者察驗之詔從其請詔天下酒場利薄歲課不及百緡者自今勿復増課從御史中丞晏殊之請也冬十月壬戍朔析荆湖北路安州京西路先是京西轉運使言本路供億費多而賦入少故有是請從之戊辰進封乳母南康郡夫人林氏為蔣國夫人壬申都大巡檢汴河堤岸康徳輿言行視陽武橋萬勝鎮冝存斗門其梁固斗門三宜廢去祥符界北岸請為别竇分减溢流悉從其請勾當汴口王中庸請増置孫村石限亦從之此據本志志但云勾當汴口康徳輿明年乃為都巡檢與實録異今官名從實録癸酉詔開封府以太宗真宗尹京日所判符牒上禁中河北轉運司言天下場務歲課三千緡以上者請差使臣監臨上謂輔臣曰歲入不多而増官得無擾乎甲戌詔歲課倍其數乃増使臣丁丑詔武臣毋得補富民為教練使衙内知客子城使其隨行人聽補㑹要於五年十月載臣僚申請差詳今但從實録癸未貶知鄆州考功郎中杜堯臣為濟州團練使堯臣性殘酷其下被箠扑死者甚衆市物郡内虧價假富民車牛輦瓦木以營私第故貶之甲申除福州官莊錢初王氏據福州時有田千餘頃謂之官莊自太平興國中授券與民耕歲輸賦而已天聖二年發運使方仲荀言此公田也鬻之可得厚利遣屯田貟外郎辛惟慶領其事凡售錢三十五萬餘緡詔减緡錢三之一期三年畢償監察御史朱諌以為傷民不可詔復為貧弱者寛期既而期盡未償者十二萬八千餘緡知州事章頻具以聞上曰逺方民貧而官司督責甚苦其悉除之頻傳數不同又載事不詳首尾實錄亦然今取本志及㑹要増修之乙酉罷河北縁界河買撲酒稅名額十一月壬辰免雄州歸信容城縣兩地供輸人户為衙前軍將庚子詔陜西部署司縁邉蕃部使臣首領等因罪罰羊並令躬自送納毋得却於族下科斂入官犯者重斷之壬寅三司言巡捉私礬其賞罰請如私茶鹽法從之詔如聞京草場受納民輸多有邀滯宜令三司開封府遣判官推官各一貟日詣場檢視但堪秣馬速受之癸卯翰林學士宋綬等上所撰天聖鹵簿記十巻初郊祀綬攝太僕卿陪玉輅帝問儀物典故占對辯給因使綬等集官撰記帝歎其詳備詔等第賜物益州獻異花似桃四出而千百苞駢聨成朶蜀耆舊言此花不開六十餘年矣上頗異之後因目為太平瑞聖花甲辰詔審官院䕃補京朝官監當及八年而無私罪者不以課利増虧與親民乙巳廢福州連江羅源寜徳長溪四縣官煎鹽場以鹽田賦貧民癸丑太常博士集賢校理聶冠卿言天下奏狀雖杖笞並申覆而徒流非繫獄者乃不以聞非所以矜恤刑罰之意請自今罷覆杖笞罪自徒以上雖不繫獄亦附奏從之丁巳奉安太一神像於西太一宫宰相張士遜為奉安使是月京西言榖斗十錢以故太尉王旦孫三班奉職恪為無料錢京官從旦子雍所陳也十二月癸亥幸西太一宫甲子以大理評事范仲淹為袐閣校理初仲淹遭母䘮上書執政請擇郡守舉縣令斥逰惰去冗僭遴選舉敦教育飬將材實邉備保直臣斥佞人使朝廷無過生靈無怨以杜姦雄凡萬餘言王曽見而偉之亦知仲淹乃晏殊客也於是殊薦人充館職曽謂殊曰公實知仲淹捨而薦此人乎已為公置不行宜更薦仲淹也殊從之丙寅廢西京洛陽馬監丁卯賜故杭州處士林逋諡曰和靖先生仍賜其家米五十石帛五十匹逋臨終賦詩有茂陵他日求遺藁猶喜曽無封禪書之句既卒州以聞上嗟惜之故有是賜初逋嘗客臨江李諮方舉進士未有知者逋謂人曰此公輔器也及逋卒諮適為州守為素服與其門人臨七日葬之刻遺句納壙中己巳詔審刑院自今舉嘗参官曽歴在京刑法司者為詳議官大理詳斷官刑部詳覆官法直官舉幕職州縣官看法令者為之壬申右諫議大夫權判吏部流内銓胡則坐失保任降為太常少卿知池州戊寅御史中丞晏殊言諸州都監都巡檢閤門祇候及内殿崇班以上嘗為公人僕𨽻者自今毋得與舊所事官接坐若職事相闗即移徙他州其三班使臣以下監臨物務者並聽公参從之辛巳上封者請稅緡錢以助經費上曰貨泉之利欲流天下而通有無何可筭也不許癸未除應天府書院地基稅錢乙酉契丹遣保安軍節度使耶律遂英衛尉少卿王承錫來賀太后正旦丙戌遣彰聖軍節度使蕭素右千牛衛大將軍馬保永來賀正旦丁亥詔自今京朝官選舉人家狀内合具本貫外其寄貫别州者仰更朱書某州軍戊子詔汴口清河卒月給錢三百是月詔所差諸路走馬使臣多不得人冝令三班院自今選曽有臣僚同罪奏舉及曽經兵馬監押或廵檢寨主知縣不曽犯贓私罪者充廣濟河導菏水自開封歴陳留曹濟鄆其廣五丈亦名五丈河是歲駕部貟外郎閻貽慶言河出濟州之合蔡鎮通梁山泊近者大河决蕩溺民田壊河道由合蔡而下漫散不通舟請治夾黄河引水注之因敕貽慶與勾當溝河李守忠同京東轉運使度工費立橋梁置埧堰踰年而畢遷貽慶官凡所更縣委令佐專察䕶淺則濬治岸薄而圯則増築之植榆柳為固而輦運使總按其不如法及幹績而可紀者濬廣濟河據㑹要在天聖六年十月而本志不書月合依㑹要附七月末熈寜七年十月三日復浚廣濟河
