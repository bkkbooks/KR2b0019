body:
  text: 續資治通鑑長編巻六十五宋李燾撰真宗景徳四年春正月己亥朔御朝元殿受朝徳音降京畿流罪以下囚遣工部尚書王化基乗驛詣河中祭后土廟用大祠禮告將朝陵也據會要在正月而實録不書今附見于此甲辰以知樞宻院事陳堯叟為東京留守乙巳以權三司使事丁謂為隨駕三司使鹽鐡副使林特副之丁未以皇城使勝州刺史劉承珪勾當皇城大内公事癸丑贈河州觀察使安鄉侯徳鈞卒廷美第五子也其夕上元中宫将召命婦觀燈遂罷之甲寅詔武信節度使惟吉序班在鎮安莭度使石保吉上惟吉保吉並兼同平章事而保吉先拜上令史官檢討故事具言唐武徳中詔宗姓在同品官上故行之丁巳以工部員外郎邵􅁮為兵部員外郎􅁮安撫交州事畢奨之也􅁮初奉使假官錢八十萬市私覿物及改命安撫巳償其半餘者詔除之己未車駕𤼵京師庚申次中牟縣除逋負釋囚繫賜父老衣幣所過如之壬戌河陽莭度使同平章事王顯卒贈中書令遣内臣䕶葬以在途更不輟朝甲子次鞏縣罷鳴鞭及太常奏嚴金吾傳呼或獻洛鯉上曰吾不忍食也命放之丙寅齋于永安鎮行宫太官進蔬膳丁卯夜漏未盡三皷上乗馬却輿輦繖扇至安陵外次易素服歩入司馬門行奠獻之禮次詣永昌永熈陵又各詣下宫凡上宫用牲牢祝冊有司奉事下宫備膳羞内臣執事百官皆陪位又詣元徳皇太后陵奠獻又於陵南設幄殿祭如下宫禮上每至陵寢望門而哭初有司具儀止常服上特制素服禮畢徧詣孝明孝惠孝章懿徳淑徳明徳皇后陵又至莊懷皇后陵遂單騎廵視陵闕以内臣從及親奠䕫王魏王岐王恭孝太子鄆王周王安王諸墳辰後暫至幄次更衣復詣陵奉辭有司以朝拜無辭禮上感慕哀切未忍遽去故復往焉及午而還左右進繖上却之度昭應水乃許進至行宫始御常膳又遣官祭一品坟皇諸親墓徳音降西京及諸路赦流罪以下囚釋逋欠賜畿縣民租稅有差官吏應奉者有司考上課績建永安鎮為縣改永熈陵副使守當都監為三陵副使都監度兩京及孟鄭州僧道籍有名者每五人放一人不及者每院與一人二月戊辰朔車駕遂如西京夕次偃師縣始復奏嚴上猶服鞾袍不舉樂初朝拜前連日隂晦及禮畢天地澄廓氣候晏温咸以上仁孝之感龍圗閣待制陳彭年請以事付史官及頒示中外從之陳堯叟言獄空詔奨之堯叟居守雖大辟罪亦止面問状亟决遣之未甞留獄上曰堯叟素有裁斷然重事宜付有司案鞫詳察因宻加詔諭焉己巳至西京始奏樂道經漢將軍紀信冡司徒魯恭廟詔贈信為太尉恭為太師辛未命吏部尚書張齊賢祭周六廟詔從官先塋在洛者賜告祭拜壬申上謂輔臣曰前代内臣恃恩恣横蠧政害物朕常深以為戒至於班秩賜與不使過分有罪未嘗矜貸此輩常亦畏懼王旦等曰前代事迹昭然足為龜鑑陛下言及此社稷之福也内侍史崇貴嘗使嘉州還上言有知縣王姓者貪濁有佐官名昭度者亷幹乞擢為知縣上曰内臣将命能採善惡固亦可奬然以其宻侍扃禁便爾賞罰外人未為厭伏當湏轉運使審察之寳訓作平羗知縣昭度廉幹犍為知縣王固貪猥與故事不同今從故事癸酉就西京建太祖神御又置國子監武成王廟甲戌詔賜酺三日乙亥詔罷西京𣙜酤官賣麴如東京之制命翰林侍講學士邢昺等編集車駕所經古迹丙子加號列子為冲虛至徳真人戊寅刑部尚書知陕州㓂準来朝召之也留浹旬還任己夘上幸龍門覩巖崖石佛甚多經㑹昌毁廢皆已摧壞左右曰非官為葺治不能成此勝蹟上曰軍國用度不欲以奉外教恐勞費滋甚也上因覽西京圗經頗多踈漏庚辰令諸道州府軍監選文學官校正圗經補其闕略来上命知制誥孫僅等總校之僅等言諸道所上體制不一遂請創例重修奏可辛巳以唐刑部尚書致仕白居易孫利用為河南府助教常令修奉墳塋影堂上之次鞏縣也太子太師吕䝉正輿疾来見不能拜命中使掖之以進賜坐勞問甚久壬午幸其第賜襲衣金帯器幣藥物上尊酒悉如宰相例乙酉遣宰臣王旦祭告三陵吏部尚書張齊賢告諸后陵車駕將還東京也初西京父老懇祈駐蹕上因謂宰相曰周公大聖人建都據形勝得天地正中故數千載不可廢但今艱扵餽運耳丁亥詔應還京扈從軍馬無得傷踐田稼戊子詔有司葺周六廟増封唐大歴中孝子潘良玉及其子季通墓仍禁樵採庚寅詔河南府置五代漢髙祖廟辛夘車駕發西京謂輔臣曰歸途陵闕在望雖已遣官祭告朕豈安然而過乎壬辰上乗馬至孝義鎮東訾村設次與親王望陵祭奠近臣於幄殿東望拜每進酒食上執爵舉匕箸哀感涕泗甲午次鄭州乙未遣使祀中嶽及周嵩慶懿陵丁酉𤼵鄭州遣就賜隠士楊璞繒帛令吏部銓注其子從政近官以便侍飬三月己亥上至自西京辛丑詔昨因朝拜分屯近郡禁兵悉召還之壬寅詔北面縁邊趨境外徑路自非𣙜場所歴並令轉運使因案部規度斷絶之涇原都鈐轄秦翰請令本路承受入内髙班王克譲赴鎮戎軍同涖兵事上曰承受止當奏事若預聞兵政非所宜也罷其奏尋有詔縁邊承受使臣無得受部署鈐轄差領軍馬以圖功賞實録在十月今移入乙巳以户部副使水部員外郎崔端為契丹國母生辰國信使侍禁閤門祇候張利用副之賜錢俶守冢三户蠲其徭役太清樓藏太宗御製及墨跡石本九百三十四巻軸四部羣書三萬三千七百二十五巻是日上召輔臣對􅁐中遂登樓閲視又至景福玉宸殿翔鸞儀鳯閣上置酒作詩王旦等皆賦馬知莭辭以不能上不許亦賦焉因賜食樓下玉宸殿乃上宴息之所中施御榻帷幄皆黄繒為之無文采之飾殿東西聚書八千餘巻上曰此唯正經正史屢校定者小說它書不預焉其後羣書増及一萬一千二百九十三巻太宗御集御書又七百五十三巻丙午西南蠻羅瓮并都指揮使顔士龍来貢丹砂士龍種落遐阻未嘗入朝今始至詔館餼賜與如髙溪州丁未上謂輔臣曰頃者朝陵車輿所過並從官給其不得己或假借於州縣朕潜遣使詢訪民間皆云無所騷擾此甚慰朕心也王旦曰朝廷每舉大禮或議廵幸小民無不擾動比聞羣情妥貼信不擾所致王欽若曰車駕所至居民但忻聞輿馬之音鼓舞道路豈復有所勞擾耶辛亥斬散指揮卒張傑散員卒王政於本班院傑等以博戯相毆重傷特命戮之以肅禁衛癸丑命兵部貟外郎邵􅁮擇三班使臣一人堪知㢘州者具名以聞是州炎瘴尤劇數年間守土淪没者四人上甚憫之時􅁮縁海安撫還又本連州人上以其諳彼土事故令舉官既而􅁮奏殿直袁繼遷詔授閤門祇候遣之趙徳明遣牙吏貢馬五百槖駞二百謝給俸廪詔賜徳明襲衣金帯器幣舊制貢物謝恩止給來使緡帛上以徳明進奉頻仍特加賜焉徳明又請因進奉使赴京市所湏物從之上謂王欽若等曰徳明屢言西凉府元属部内見各納質及人使往来且繼遷因攻西涼為其所斃今徳明意將阻絶六谷使不得預縁邊属户朝廷若不綏撫則徳明足以復讎近秦翰譯六谷蕃書来上但言為徳明所侵略無寧日見蒐兵警備可以六谷書付張崇貴令諭徳明甲寅大宴于後苑賞花釣魚上賦詩從臣皆賦吏部尚書張齊賢刑部尚書温仲舒工部尚書王化基以久在外任求免應制不許是夕京師大風黄塵蔽天自大名府歴京畿害桑稼唐州尤甚丁巳詔天下收瘞遺骸仍致祭鎮安節度使石保吉入奉朝請既逾年陳州民列上其政績乞許復還本鎮己未詔奬保吉仍可其奏庚申蠲河南府倉庫吏逋欠芻糧緡帛四十五萬曹瑋言鎮戎軍蕃部兵最為精鋭其列校皆朝廷補署多已衰老願省去擇本軍人充職從之鄜延鈐轄張崇貴言趙徳明輸欵請吏貢奉之使道路相属望依北面例擇官有吏幹知邊事者為縁邊安撫使疆塲事務聽以便宜上曰西鄙寧靜别無經營苟徳明能守富貴無慮朝廷失恩信也増置官属徒為張皇不若委卿静制之乙丑以西上閤門副使曹瑋為西上閤門使賞其扞邊之功也瑋在鎮戎甞出戰少㨗敵兵去已逺乃驅所掠牛羊輜重緩還頗失部伍其下憂之言於瑋曰牛羊無用徒縻軍不若棄之整衆而歸瑋不荅使人候敵兵敵去數十里聞瑋利牛羊而師不整遽還襲之瑋行愈緩得地利處乃止以待之敵軍将至使人迎謂之曰蕃軍逺来必甚疲我不欲乗人之怠請休憩士馬少旋決戰敵兵方苦疲甚皆欣然嚴軍而歇良久瑋又使人諭之曰歇定可相馳矣于是各皷軍而進一戰大破敵師敵遂棄牛羊而還徐謂其下曰吾知彼已疲故為貪利以誘之比其復来幾行百里矣若乗鋭便戰猶有勝負逺行之人若少憩則足痺不能立人氣亦䦨吾以此取之此據筆談未知何時今附見拜官後當考是春詔尚書省諸司并寺監京百司自今每收私名人並湏召有行止無踰濫及不礙本州縣色役人責保試驗申牒御史臺候併及十人已上令中丞知雜提㸃試驗書札得申牒本司收録紕繆者退落令别召人其每年就試補正名闕一依元勅指揮有額外者量减其數其自前已收係人並令依舊候將来或有事故及轉填却上項人即依今来減定數為額㑹要景徳四年正月事今附春末夏四月戊辰詔聞鄜州率民馬棚大木而常納者復多選退使罷其事仍劾官吏擅賦之罪己巳徙河東兵代鄜延戌兵以北邊徹警故也辛未上曰比詔河東募土人為廣銳神虎諸軍就置營寺蓋以契丹未平此等皆勁勇且習知山川道路故帥臣每患其少嘗許續募今邊防罷警若遂令減去即為弛備然豈可嵗増不已乃詔以見存為定額闕則補之壬申給單州皇甫陟復二年初州有强盗數輩官司不能捕里人患其凶暴無敢言者陟誘而禽之故奨焉上覽外郡奏官吏事因謂輔臣曰頃者石普張崇貴相繼奏供奉官曹信弛慢廢職朕宻使廉之果言崇貴以信善琴一日軍中宴集令彈之信以乆廢為辭他日普復逼之又固辭由是共摭其過大抵常人不能無愛憎不可不察也癸酉詔嶺南官並於春夏除授聽秋冬赴治以避炎瘴甲戌户部貟外郎直集賢院判太常禮院李維言天下祭社稷釋奠長吏多不親行事及闕三獻之禮甚非為民祈福尊師設教之意也望令禮官申明舊典詔付有司且言按五禮精義州縣春秋二仲月上丁釋奠並刺史縣令為初獻上佐縣丞為亞獻州博士縣簿尉為終獻若有故以次官通攝又云祭社禝與釋奠同牲用少牢禮行三獻致齋三日今請悉如故事詔從之丁丑上謂王欽若等曰近覽唐實録敬宗即位坐朝常晩羣臣班於紫宸殿有頓踣者拾遺劉栖楚切諌叩龍墀不已宰臣宣諭乃退敬宗為動容遣中使慰勞諌臣舉職深可奨也而史臣以逢吉之黨目為鷹犬甚無謂也今所修君臣事迹尤宜區别善惡有前代褒貶不當如此類者宜析理論之以資世教武勝莭度使駙馬都尉吳元扆自陳願出領征鎮上曰元扆繼守藩郡御衆撫俗頗著聲績今已分并代禁軍屯澤潞可因以任之乃詔元扆知潞州初并代澤潞分轄禁軍後并於太原上以地廣兵衆茍失機㑹或致生事又簡士閲馬禀命尤逺故析澤潞晋絳慈隰威勝七州軍戎籍不復𨽻并代委元扆専總焉實録載提轄七州軍兵馬事在此年七月癸未按上於此月已云分太原兵屯潞州矣今并書之己卯詔自今五月二日至八月一日鑄錢止收半功每嵗量支錢以備醫藥辛巳皇后郭氏崩周悼獻王后所生也王薨后悲感生疾遂不起后性謙約寛仁恵下尤惡奢靡族属入謁禁中或服飾華侈必加戒朂有以家事求言於上者后終不許兄子出嫁以貧欲祈恩賚但出装具給之上甞使觀宜聖殿諸庫后辭曰國之寳庫非婦人所當入陛下欲惠賜六宫願量頒之妾不敢奉詔上尤加禮重焉壬午上謂輔臣曰皇后自東宫事朕至正位中壼小心遜順有内助之勤降年不永深所嗟悼因言后之二兄皆年三十二而卒今后亦至此豈修短有數耶禮官奏皇帝七日釋服知樞宻院事王欽若請用朞周易月之制十三日釋服宰相召崇文院檢討陳彭年問其故事彭年云唐徳宗皇后王氏崩太常博士徐乾議周景王有后之䘮既𦵏除服準禮七月而𦵏帝得以七日而除又徳宗朝禮官栁冕等議皇后為父母服十三月其禀朝㫖十三日而除㑹昌五年武宗為恭宗母義安太后十三日釋服即無帝王為后朞周易月故事王旦等以聞既而上謂王旦等曰七日釋服蓋遵典禮但隂陽有所避忌湏至改易乃詔特用十三日釋服隂陽有所避忌不審所謂王欽若奏請必因此惜㑹要不能紀其詳也乙酉上謂王旦等曰后崩合遣使赴告契丹否旦等曰命使赴告或邊臣録詔告之皆可上曰於禮宜有赴告然每嵗命使頗聞供億勤至今又専使則自兹兩國凡有大故各湏軺傳交馳益増煩擾矣乃詔邊臣俟北境遣人詢問即録詔報之仍諭此意有司言歴代皇后上僊無服内不視事之文唐徳宗王皇后成服日於延英門接見藩臣明服内聽政望百官釋服後皇帝視事於便殿皇帝釋服後即復常儀其攅殯及皇帝釋服日並請不視事從之庚寅詔四川鹽井户先因逋欠課程籍其廬舎並給賜之上手詔令禮官議朔望上牙盤食于后䘮當廢與不禮官以明徳皇后故事對翌日上特遣内侍詣太廟后廟上食壬辰徙新衣庫以其地為内藏西庫庫物羡溢故也甲午令修奉園陵役兵日午則休息之值風雨權停宰相王旦因對言淮南𣙜酤屢有奏報且言諸路各置轉運使復遣官檢舉酒税競以増益課利為功煩擾特甚上曰醖醸當有定制旦曰諸州雖各有元定酒數然隨時増益不已上曰地産財賦及民間費用固不能相絶課利豈可嵗嵗増益此特官吏務貪勞績不恤民困朕甚閔之乃詔三司取一年中等之數立為定額自今中外勿得更議増課以圗恩奨上聞京師民僦官舎安居乆復為増直者奪賃謂左右曰此豈不太刻先帝屢曽止絶今當申戒有司無使復然此據寳訓附定酒額後不得其時也王偁東都事畧詔曰𣙜酤之利素有定規過求羨贏是縦掊克自今中外不得増課庶以息民乙未宰相王旦為大行皇后園陵使五月丙申朔日有食之丁酉詔河北縁河州軍綱運自今以軍士充役勿差部民以髙州刺史田彦伊子保順郎将承寳為寜武郎將髙州土軍都指揮使田思欽為安化郎將趙徳明母罔氏卒邉臣請遣使弔問王欽若曰此特邊臣奏耳徳明未甞來告上曰夷人何知禮不若使邊臣諭之俟其奏至即遣使弔祭起復賻贈亦準藩臣例也欽若曰聞徳明諸母甚多異時安可一一推恩王旦曰徳明今自稱草土臣若朝廷不降制起復則徳明於禮難安上然之授徳明起復鎮軍大將軍左金吾衛上將軍員外置同正員餘如故命殿中丞宣城趙稹為弔贈官告等使徳明以樂迎告至其母柩前明日衣禫衣受賜泣曰蕃夷母䘮䝉天子弔贈起復之命寵榮極矣上謂輔臣曰國家捜訪圗書其數漸廣非時平無事安能及此也乃詔分内藏西庫地以廣秘閣庚子以盛暑賜河北黨城川採木軍士錢自是嵗以為例雄州李允則於城外䟽治渠田邊臣奏渠通界河慮為戎人所疑陳堯叟請亟罷之上曰決渠障邉乃防遏所湏然誓書舊約不可不守也壬寅詔自今縁邊城池依誓約止行修葺外自餘移徙寨柵開復河道無小大悉禁止之實録㑹要寳訓三書載此事皆略不同今參取刪修上與輔臣言及朝士有交相奏薦者王旦曰人之情偽固亦難知或言其短而意在薦揚或稱其能而情實排抑唐劉仁軌甞忿李敬元異己將以計去之乃稱其有將帥材而敬元卒敗軍事此皆不以國家為慮者也上曰若然則險偽之輩世所不能絶也癸夘大食占城國皆遣使來貢占城表請頒戎器其使者自言本國舊𨽻交州後奔于佛遊北去舊所七百里詔並優加館餼之禮許徧至苑囿寺觀遊覽及還賜物甚厚甲辰詔天下繫囚除近降徳音不赦依日限奏斷外自餘令審刑院大理寺約法以聞時奏案數至百餘上慮其淹緩故有是詔謂左右曰比見奏案斷某州㩁務虧額定知州為私罪乃云即合日至㩁務且長吏區處州事㩁務止當提轄耳一加私罪累及終身乃知法官當簡擇平允通明者若但能誦文習法尤泥於事不足尚也戊申詔以皷司為登聞皷院登聞院為登聞檢院命右正言知制誥周起太常丞直史館路振同判皷院樞宻直學士吏部侍郎張詠判檢院檢院亦置皷先有内臣勾當皷司自此悉罷諸人訴事先詣皷院如不受詣檢院又不受即判状付之許邀車駕如不給判狀聽詣御史臺自陳先是上謂王旦曰開廣言路理國所先而近日尤多煩紊車駕每出詞状紛紜自至披詳無可行者故有此更置焉起鄒平人也上嘗謂近臣曰登聞院每進䟽有言機宻而狂妄者皆付京府鞫罪前日一僧即處徒坐昨日一僧乃以疾為觧當諭有司常加察舉無令駢日之内同罪異罰以疑于衆此事據寳訓在四年今且附見癸丑并代都鈐轄韓守英等言本路芻糧煩民饋運今邊方寧静欲量留騎兵萬餘人悉屯河東上曰邊臣有此經度盖深體䘏民之意宜可其奏令諸路部署準此施行丙辰斯多特遣六谷十八首領来貢戊午詔兖州増二十户守孔子墳又詔鄭州以三户守唐裴度墳詔訪聞自京至永和縁路州縣以皇后園陵有期率民除道属兹盛暑且奪農功宜速令放散至時量以軍士給役辛酉三司及提舉司上重定在京諸司庫務八十二處公人員數請給例望永為定制從之甲子歸義莭度使曹宗夀遣使來貢實録扵此書𤓰沙州遣使来貢閏月己夘又書歸義莭度使曹宗夀遣使来貢按𤓰沙即歸義也㑹要及本傳是年止一入貢今但一書之乙丑詔曰朕精求政治延訪臣工咸欲盡規所宜無隠乃有上封而論事輒乞留中而匿名多渉巧誣頗彰欺詆既虧公議當革弊風自今文武羣臣表䟽不得更乞留中事渉機要許上殿自陳如或舉奏官吏能否亦湏明上封章當行覆驗中書樞宻院總核衆職宜盡公詢訪可奨可黜以属在廷諸路轉運使諸州長吏辨察官属有不法者事發不言當加譴責有治狀者亦勿隠蔽諌官御史務遵職業無或懈慢令尚書都省糾舉之先是上謂王旦曰臣僚升殿奏事劄子有不列已名請留中者皆攻人之短發人之私茍偏聽之即不可信若顯絀之又重違其意比令杜鎬陳彭年檢上封宻諌故事可著條約并警有位令各舉其職乃降是詔五朝㑹要以此事繫之咸平四年誤也今不取祠部員外郎知滑州朱搏責授湘隂令搏前上章言五緯當合于星張周分也請以今夏幸洛都封中嶽至秋乃還朝洎朝陵詔下又言朝陵當用寒食且謁拜邱墓家之私也不足以動星辰其所述大抵多厭勝事至是復言昨車駕駐洛止二十餘日還京踰月乃有中宫之䘮愚言多所預中且妄自誇誕以求信用上盡出以諭輔臣王旦曰朝陵帝王之孝豈為私耶搏言狂妄可責也故黜之搏行至太平與知州何䝉㑹飲又出䟽草示䝉為䝉所奏再貶州别駕䝉洪州人也禁諸路承受使臣販鬻規利及役使工匠豪富公人往来違者重置其罪州郡臣僚有干求恩澤奏状母得收接是月初置雜賣場詔如聞店宅務將人户乆賃屋増僦錢但成勞擾速罷之閏五月戊辰詔差減劔隴等三十九州軍嵗所貢物䕫賀等二十七州軍悉罷之每嵗正旦止令具表以聞諸州長吏毋得以土貢為名因縁配率此有詔書治平四年四月可參照㑹要詳列物名更詳之河北轉運使刑部員外郎盧琰上言領職六年願歸闕許之己巳擢琰為吏部員外郎賞其勞也詔京城内外諸廟比差軍廵邏監察敓攘之輩如聞以覘事為名取求財物宜令開封府偵捕嚴斷仍委殿前侍衛司常加約束辛未太常丞通判孟州李邈上言乙丑詔書文武官凡上章䟽不得更乞留中並當付外施行者若帝王省決章䟽不得留于禁中四方聞之以謂天子禁中留一紙書亦為敕文所束帝王必盡知天下之事若升殿論奏不聞小臣之言博訪得失何以輸盡忠懇茍機宻之事不可示外者豈得胥令行下臣聞唐憲宗時李絳靣請奨納規諌憲宗曰卿所陳至公有補於我今韋處厚路隨甚有諌書言極忠益恐卿不知則當時諌書亦有留中之制且忠臣亦欲以欵誠結明主陛下亦欲盡審諸臣才器若悉付外則何人復敢獻言願追寢前詔以開言路上曰邈未明朕意前詔但為禁詆訐誣罔之輩爾儻軍國機宜大事不可付外者即不在此限也因以手詔諭之李邈又見祥符二年二月壬申御崇政殿試賢良方正著作佐郎陳絳溧水縣令史良文丹陽縣主簿夏竦先是上謂宰臣曰比設此科欲求才識若但考文義則積舉者方能中選茍有濟時之用安得而知朕以為六經之㫖聖人用心固與子史異矣今䇿問宜用經義參之時務王旦曰臣等每奉清問語及儒教未甞不以六經為首邇来文風丕變實由陛下化之上因命兩制各上䇿問擇而問焉絳竦所對入第四次等擢絳為右正言竦為光禄寺丞竦徳安人承皓子也甲戌以户部員外郎直集賢院李維為兵部員外郎著作郎直史館王曽太子中允直集賢院孫僅皆為右正言知制誥先是上謂宰臣曰李維王曽孫僅文行可稱並宜召試翌日覽所試曰曽頗得詔誥之體而書翰兼美是其精勤不怠也因並命焉丁丑詔自今中書所行事闗軍機及内職者報樞宻院樞宻院所行事闗民政及京朝官者報中書時中書命祕書丞楊士元通判鳯翔府樞宻院命士元監内香藥庫兩府不相知宣敕各下遂有此詔楊士元未見甲申上閲開封府囚簿有囚累月械繫案下法寺而未報者數人指示王旦等曰此何故旦對曰法官於刑名間有所詰難故也然臣嘗領審刑見案牘稽滯或踰百日蓋法官考限將滿則妄生詰難延日俟替以避斷奏上曰但處法平允何湏顧避乃詔主判官常加約束無使復然丙戌延州部署司言得趙徳明牒稱保安軍修葺驛舎邉民疑懼不安願罷其事從之詔三班使臣頗有負材能者朝廷雖加旌擢恐未周悉宜令吏部尚書張齊賢以下三十人各保舉供奉官侍禁殿直有謀畧武勇知邉事者二人當議優加進用庚寅上與輔臣談五代事因曰馮道歴事四朝十帝依阿順㫖以避患難為臣如此不可以訓也遣使詣御史臺三司開封府殿前侍衛司編類繫囚壬辰上御崇政殿慮問多所原減龍圖閣待制陳彭年上言請令有司詳定考校進士詩賦雜文程式付禮部貢院遵行又請許流内選人應宏詞㧞萃科明經人投状自薦䇿試經義以勸儒學詔貢院考較程式宜令彭年與待制戚綸直史館崔遵度姜嶼議定餘令彭年各具條制以聞癸巳詔先是中書樞宻院三司奏事得㫖即日覆奏惟開封府得㫖或即付外施行刑名決遣慮未詳審自今如三司例甲午詔以封疆罷警宜息轉輸應河東陕西諸州軍今年夏秋稅並止送本所六月丙申中書門下樞宻院上言伏覩近詔宰執近臣咸令旌别淑慝其如中書樞宻院接待賔客屢經條約未得允當盖樞機之任誠務謹嚴而政事之間亦資詢訪若早暮接納慮機務因兹􅆡留如或延見艱難亦利害無由啟露又分㕔言事或有異同将狥至公願頒永式欲請自今外任得替到闕及在京掌事官有公事許已前至中書樞宻院聚㕔相見其事闗急速者不在此限非因公事不許到㕔詔從之己亥鄭州言滎水暴漲漂滎陽縣居民四十二户有溺死者詔給其家廪粟委長吏存䘏之乙巳以盛暑減京城役工日課之半第賜緡錢丙午詔淮南轉運司揚州民採荻柴官中承例十稅其二自今除之丁未蒲端國王遣使来貢令翰林侍讀侍講樞宻直學士各舉常參官一人充御史戊申上謂輔臣曰近詔諌官御史各令舉職言事昨右正言陳彭年請條制貢部復宏詞科采經術士侍御史賈翔使還奏宿州買綾擾民此皆可行中書宜置籍記之自彭年翔為始仍具案覆可行及不可行者嵗終以聞若有改轉即不俟嵗終録奏賈翔未見己酉賈翔言國子博士通判台州龔綬治家無状不能制悍妻準敇斷離取笑朝列不當親民詔徙監場務趙徳明遣使貢馬百五十疋助修皇后園陵邠寧環慶都部署周瑩言準詔遣神勇戍卒還營縁本道兵數非多不敢奉詔上曰西邊難得芻糧每嵗役民輸運今兹罷警理當并減瑩庸懦不曉事乃復固執無心息民亦可知矣辛亥徙瑩知澶州命西上閤門使曹瑋代瑩為邠寧環慶都鈐轄兼知邠州瑋除邠州實録在癸丑今依本傳并入此三班院以幽州歸明三班奉職張希正為賓州監押上曰南北風土異宜此行必非所樂可改任荆湖北路州軍詔諸州牙校嵗滿者例補三班借職自今藩鎮特補奉職壬子司天言五星當聚鶉火既而近太陽同時皆伏按占云五星不敢與日爭光者猶臣避君之明也歴千百載所未曽有望付史官以彰殊事從之癸丑以樞宻直學士户部員外郎劉綜知并州同管勾并代兵馬事初上謂馮拯等曰太原地控北門今邉境雖安亦要大臣鎮撫如張齊賢温仲舒皆可任但以其甞歴樞近受命之後或有固辭又湏改易宜召至中書詢問願則受之及召齊賢問之對曰并州重鎮并領鴈門兵馬朝廷腹心之寄也但前知荆南青社皆是内地尚為近臣所䜛欲置於曠散今若守邉鎮領武事安敢自保無過耶然報國之心死而後已異時有急難之地敢不盡力復召仲舒問之對曰藩方重鎮非敢有辭但任尚書班已十年又晚有嗣息年皆㓜稚若得改官端揆許挈家而往賜以都部署添給敢不承命拯等以聞上曰齊賢言為人所䜛斯過矣是皆不欲往也勿彊之乃命綜焉上又謂拯曰齊賢仲舒每言朝廷當選任英俊勿使沉滯下位及令舉官不即應詔洎迫之亦後於衆人豈不畏言行之戾耶并代都部署昭徳莭度使葛霸昏耄不治詔徙霸耀州以鄜延路副部署石普為并代副部署詔給公使錢二千五百緡普援雷有終例請嵗給五千緡樞宻院言有終初無此例普又言李漢超在河朔時嵗給動以萬計今并代屯兵多不足以備犒設上不納詔鎮趙等州民田近所増稅悉除之先是轉運司遣官按視逐年田畆第増税賦上慮其擾民故罷焉乙夘𦵏荘穆皇后于永熈陵之西北初定謚命宗正卿告廟王欽若疑其事因對具言王旦曰國朝故事昭憲之諡太尉率百官告廟孝明之諡止宗正卿告廟今當以孝明為比上顧欽若曰皆有故事不足疑也雄州安肅廣信軍人饑戊午詔河北轉運司減價糶米萬斛以濟之鄧州及南劔州言水災並遣使存撫己未上覽銀臺司進諸州奏狀見西京南山採造務役卒日有逃亡謂王欽若等曰此輩或力役太煩或衣食不給可速遣使馳𫝊察其事實庚申知樞宻院王欽若以五星聚東井慶雲見奉表稱賀詔付史館案紀志五星並無聚東井事不知欽若何據或即壬子司天所奏乎當考樞宻直學士吏部侍郎張詠􅅑生於腦頗妨巾櫛求知潁州上以詠公直有時望再任益州著聲績不當莅小郡令中書召問將委以青社或真定使自擇詠辭不就又問金陵詠欣然請行辛酉以詠知昇州詔京城四郊田園曠土許貧民耕種知延州向敏中言先是夏州民劉嚴等二千餘人来歸詔以延川縣曠土給之今各有蓄積而所居當綏州要路向者徳明部族入㓂多為所禽戮實鄜延之捍蔽也徳明近屢移牒求嚴等復還若遣往必罹塗炭而嚴等亦願輸租賦𨽻延川縣籍上曰邊防優䘏此輩比調兵遣戍即費省而功倍也詔從其請租賦止輸三之一是月徙敏中知河南府兼西京留守司事甞有僧暮過村民家求寄止主人不許僧求寝於門外車箱中許之夜有盜入其家自墻上扶一婦人并一囊衣而出僧適不寐見之自念不為主人所納而彊求宿宿而主人亡其婦人及財明日必執我詣縣矣遂亡去不敢循故道走茅草間忽墜眢井則婦人已為人所殺先在其中矣明日主人捜訪亡僧并子婦尸得之井中執以詣縣掠治僧自誣云與子婦姦誘與俱亡恐為人所得因殺之投井中暮夜失足亦墜井中贓在井旁亡失不知何人所取獄成上府府皆不以為疑獨敏中以贓不獲疑之引僧詰問數四僧服罪但言某前生當負此人死無可言者敏中固問之僧乃以實對敏中因宻使吏訪其賊吏食於村店店嫗聞其自府来不知其吏也問之曰僧某者其獄如何吏紿之曰昨日己笞死於市矣嫗難曰今若獲賊則何如吏曰府己誤决此獄矣雖獲賊亦不敢問也嫗曰然則言之無傷矣彼婦人者乃此村少年某甲所殺也吏曰其人安在嫗指示其舎吏就舎中掩捕獲之案問具服并得其贓一府咸以為神先是舊相出鎮者多不以吏事為意㓂準雖有重名所至終日宴逰所愛伶人或付與富室輙厚有所得然人皆樂之不以為非也張齊賢儻蕩任情獲刼盜或時縱遣之所至尤不治上聞之皆不以為善惟敏中勤於政事所至著稱上曰大臣出臨方面不當如向敏中耶向敏中徙河南乃癸丑日今附于此詔臣僚上章如係機宜刑獄急速公事並令實封以聞是月併東西八作司街道司為一司天聖元年五月復分為二司
