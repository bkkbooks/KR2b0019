body:
  text: 續資治通鑑長編巻四百五十六宋李燾撰哲宗元祐六年三月庚申朔御邇英閣宰相呂大防奏曰仁宗所書三十六事禁中有否上曰有大防請令圖寫置坐隅以備觀覽從之四月壬辰可考辛酉中書舎人鄭雍為左諫議大夫右朝奉大夫張修為光祿少卿度支貟外郎田子諒為右司貟外郎左司諫楊康國為吏部貟外郎政目在四日祕閣校理右正言劉唐老為兵部貟外郎四日鄭雍云云徐王府翊善陳軒侍講喬執中並為秘閣校理王以例請故也禮賔使邢佐臣為西上閤門副使大名府路副總管從安撫使張璪辟也四月八日當并考知府州折克行通判梁子雅繕葺城壁兵民安居賜詔奬之給事中朱光庭言近除劉定為京西南路提刑按定天姿刻薄罪惡不一向任河北路提舉保甲一路被害衆所共知豈可更擢監司復為一路之害詔依前行下光庭又言竊以監司為一路表率必擇公正仁厚者為之則人人受賜定之姦惡安得預兹選詔劉定為江淮荆浙福建廣南路提㸃坑冶鑄錢事定改命乃三月十六日今并書定初除在正月十八日是日尚書右丞蘇轍押入隨班奏事已轍留身乆之又遣中使閻安押入省楊康國劉唐老皆罷言職為尚書郎劉摯自言論者皆欲分别是非以正黜陟此誠為國之要務所以服天下然有不可為者以朝廷進退大臣不當用一二人言而罷若遂謂言者為不當而黜之乎則二人之言非盡為失外議一詞率以二人為是矣以二人為是遂罷大臣乎則所指之事未足以為大臣重輕而於國體未便兼亦可否在宸𠂻開陳之際不能無嫌故止於兩平既以全上恩進任大臣之體又以保二人養忠直之氣難哉難哉中書舎人鄭雍申三省禀康國當作何詞呂大防批云作平詞摯謂大防曰東臺又如何指朱光庭也大防曰已有嫌迹恐不敢作光庭昨為轍所彈故云爾此據劉摯日記増入癸亥進神宗皇帝實錄上東嚮再拜然後開編宰臣呂大防於簾前披讀未乆簾中慟哭止讀令進王巖叟朝論云三月四日常朝起居升延和左相前奏以今日進神宗實錄不奏事遂東下於幕次兩宫引公事退入進饍先引實錄十一床床一函幕凡三百巻各列東廂乆之更衣黄帕垂簾丞相而下再奏聖躬萬福西廂東向立候修實錄官翰林趙彦若給事范祖禹著作黄庭堅起居畢同升殿序立上幞頭服淺色袍烏靴皂帶從西間出俯堦迎實錄第一函置案卓對設案啓封兩拜焚香又拜復入簾故事如此今皆用故事左相提舉修與彦若對展表讀之取第一帙讀開編兩宫皆哭侍臣掩涕少之上勸太母曰天寒休哭且聽讀讀盡四板上曰進入遂止趨下再拜又召賜茶茶起右相已降先就次左相再拜奏修書官推恩事既而促彦若軰謝恩乃出劉摯日記四日忌前假假日班朝延和不奏事以今日進呈神宗實錄進神宗實錄再坐宣宰執同觀先立班宣名奏萬福宰執面東少立俟修撰編修官起居謝畢同升殿三省密院由右階修撰官趙元考范純夫黄魯直由右階升立定取第一册置簾前案上左相讀數行兩殿舉哭上勉太母曰天寒恐飲冷氣且止哭聽讀讀四板宣諭曰可止只進入衆下殿提舉已下告謝移班禮畢退立摯同余執政别班告謝曰伏䝉聖慈以編修院進神宗實錄宣召臣等使觀覽不任云云移班如之宣賜茶摯獨升右階茶畢退左相獨奏事再升不乆下自再坐立班前行二僕射左右自皆分立如故後行聞班然止移右省侍郎為右班首密院不過何也王巖叟從容勸上讀書曰古人多早讀經午間讀史及諸子或唐人有諷諫底詩篇上云如何得入道深對曰讀書要入道深自有訣須將先聖之言一一著心承當便如先聖專為陛下說此事則承當得有力讀書方濟事其善者受之以為法其不善者受之以為戒如此則便如終日與先聖先賢說話聖徳日新矣上論射進曰此讀書之餘聊以適性則可然非帝王之所學也不宜專留神以妨聖學就射之中亦有修身治天下之道禮記有射義一篇說射之法進退周旋必中禮内志正外體直然後持弓矢審固然後可以言中此可觀徳行矣陛下若取射之義以臨天下凡於事皆平心正已審而後發則發而無不當矣又曰射求諸已正而後發發而不中不怨勝已者反求諸已而已矣此乃聖人因射以教人每事惟求在已不以責人又陛下不可將習射便為帝王之武春秋左傳論止戈為武言能止定干戈使之不作則為武也武有七徳禁暴戢兵保大定功安民和衆豐財為七徳陛下常以七徳為心則陛下之武無敵於天下矣願留神省納幸甚中書舎人鄭雍言左司諫楊康國除吏部貟外郎按故事臺諫官言事稱職甚者不次進擢其次亦敘遷美職或謬妄不職則明示降黜今康國除貟外郎謂稱職而遷則貟外郎在司諫之下謂以妄言而黜則未見降黜之因詔康國改為郎中韓川亦封還劉唐老除兵部貟外郎詞頭云不見所以罷免右正言之故唐老與康國卒俱出守出守在三月二十六日元祐八年五月黄慶基言劉唐老疏蘇軾與趙卨交通誣罔之迹當考楊康國章已見二月四日并十八日康國魏人劉摯銘其父墓朝安錄唐老康國皆論蘇轍故也甲子詔皇太妃姪右侍禁朱孝孫特與閤門看班祗候左門殿直朱孝章寄班祗候乙丑監察御史徐君平為度支貟外郎君平自言累論簽書樞密院王巖叟差除不當不䝉聽納願從黜逐故有是命己巳御集英殿䇿試禮部奏名進士庚午䇿試特奏名進士及武舉壬申試明經諸科經律科并諸科特奏名人癸酉詔右正議大夫端明殿學士禮部尚書鄧溫伯朝請大夫翰林學士知制誥趙彦若左朝奉郎給事中范祖禹左朝請郎寳文閣待制知應天府曽肇左朝奉大夫天章閣待制知杭州林希各遷一官龍圖閣待制知潁州陸佃為龍圖閣直學士著作佐郎黄庭堅為起居舎人都大管勾入内内侍省都知張茂則與男一各遷一官承受入内内侍省内侍押班文思使嘉州刺史梁惟簡入内内侍省内東頭供奉官管當御藥院寄供備庫使陳衍供備庫副使郝終吉内殿承制馮珣各遷一官内陳衍寄資溫伯等並以神宗皇帝實錄書成賞功也佃庭堅二十六日二十八日可考劉摯十四日記云實錄修撰官推恩提舉官從别制外餘不以歲月乆近在内外例増入一秩諭中書令十六日進熟狀殿中侍御史岑象求為金部郎中以避蘇轍親嫌也詔御史中丞舉堪充殿中侍御史二貟翰林學士至諫議大夫同舉堪充監察御史二貟以聞三省言武舉絶倫人辛育等十六人弓應法弩射得與三班借差減五年磨勘邊上指使差遣依令支賜弓不應法弩射不得欲且令溫習事藝内借職郭彦卿弓應法欲減三年磨勘特賜袍帶靴笏從之乙亥權發遣河東路轉運使林旦面辭賜三品服面辭當考詔入内内侍省都知張茂則與孫或姪有官人一名遷一官前詔勿行又詔神宗皇帝實錄書成其修撰官錫賜令入内内侍省取㫖内故提舉官司馬光呂公著各賜銀絹各三百匹兩並付其家殿中侍御史岑象求言右朝奉大夫宋彭年向知邢州穢濫不檢郡政頽廢乞朝廷委官體量或投之散地或授以閑局詔河北轉運司體量詣實以聞鄜延路經畧使趙卨言若西人來延安府商議分畫熈蘭界至一向倔强要還本國未審如何回答不致阻絶詔趙卨以前後指揮敷演節次令所委官婉順應折如堅不聽從便欲歸國即徐云此來開諭於理當然今既全不相聽即當具此申覆樞密院以俟指揮或西人須要暫歸本國亦聽其便仍諭以使副到本國亦須更與近上首領詳悉商議若申覆樞密院後萬一别有處分當令人於界首相招即請來延安府商議務要覊縻西人不致阻絶其西人未肯聽從合申覆事令趙伋赴三省樞密院禀議始卨連檄宥州俾遣首領來聽疆議乆之不答既而順寜砦捕得生虜葉烏瑪乃所使出入漢邊達言語通事類者卨厚予金帛俾以朝廷懷柔意歸諭葉普曰朝廷令夏國遣人來聽疆議非憚汝也特以和好垂成不忍遽自絶爾葉普欲和即來不欲從汝自便移書徃反不若遣使面議之詳汝甞為行人非寇也汝歸以吾言告葉普時葉普方集數萬衆於密木開將以某日冦熈蘭烏瑪至賊期乃緩遽遣親信威眀瑪烏葉結凌丹來卨呼前誥拆開曉累日瑪烏等辭窮曰公言無不是皆為民為國奈我家不利何正月十二日丙子太中大夫守尚書左僕射兼門下侍郎呂大防特授正議大夫實錄成大防當遷通議大夫其祖諱通執政同進呈請超遷之大防固辭不許先是一日延和奏事畢大防面奏臣近有劄子乞罷實錄提舉官推恩决望允從竊聞有㫖中書具推恩例伏乞用近例許免奏訖先退右僕射劉摯及兩省以例進呈真宗實錄并正史成提舉並轉官後來仁宗英宗實錄并兩朝正史成提舉韓琦曽公亮王珪並辭之但賜器幣有差珪又増一子六品服諭以大防官尚卑可勿聽辭今晩可鎻院摯奏兼神宗實錄功緒甚大實宜増秩然大防當遷通議大夫通字犯其祖諱理當避官制以前祖宗比例首相多是超轉今可改兩官為左正議大夫不為過又諭曰避諱自來如何對曰若百執事則寄理官資候再磨勘日轉兩官今大防首相恐難用此諭曰甚善又奏宰臣轉官須宣召學士面授㫖難擬熟狀容中書具轉官及加恩等事奏入乞留中作中㫖施行可之退如所奏具狀進入草制者中書舎人直學士院韓川也此據劉摯日記増入丁丑殿中侍御史岑象求言王安禮向在青州縱恣不法節度推官倪直侯者助其為惡掌公使出納不明及發露遂匿其籍陽為尋訪終不獲穢濫不悛吏民具知請下本路體量果有實狀乞致之法詔本路轉運司體量以聞中書舎人韓川言新除陸佃龍圖閣直學士按佃為人汚下無以慰天下之望詔命詞行下初四日除先是佃及黄庭堅除命下中書川並封還是日呂大防不入川過都省禀議劉摯諭以佃為侍從十餘年昨乞外任自當加職是時方以言者有所及故降㫖候實錄成不轉官加職今書成行前㫖爾言者所指後制獄根究無罪也川曉然而去庭堅方議之此據劉摯十八日所記増入韓川同繳佃及庭堅除目今先行佃詞庭堅竟罷在二十八日丁亥詔河外麟府豐州上畨四將並兼都同廵檢與堡寨使臣同管邊面及賊盗公事更不下番依極邊堡寨使臣及陜西將官賞罰仍廢罷河外都同廵檢六貟上番兵馬從河東帥臣范純仁請也辛巳左中散大夫晏知止為少府監正月二十二日以主客知蔡州壬午御集英殿賜進士諸科馬㳙以下及第出身同出身假承務郎文學總六百有二人㳙閬中人也宗室八人子漪自第四甲陞第二甲餘逓陞一甲宗室自英宗増置教官及講課之法神宗又廣出官之制人競為學今遂與寒俊羣校進退蘇頌有孫象先在三甲王巖叟有子摭在四甲二人并諸宗室皆下殿謝故事兩制以上方謝也此據劉摯日記増入癸未賜特奏名進士諸科劉必以下同出身假承務郎京府助教文學三百二十三人武舉進士賈君文等二十三人乙酉御延和殿太皇太后宣諭曰今歲御試考較定後兩日方唱名於内中火禁非便其令自今後見考試次第旋定唱名日龍圖閣學士前知杭州蘇軾言臣近䝉恩詔召赴闕庭竊以浙西二年水災蘇湖為甚雖訪聞已詳而百聞不如一見故自下塘路由湖入蘇目覩積水未退下田固己沒於深水今歲必恐無望而中上田亦自渺漫婦女老弱日夜車畎而淫雨不止退寸進尺見今春晩並未下種鄉村闕食者衆至以糟糠雜芹蓴食之又為積水占壓薪芻難得食糟飲冷多至脹死並是臣親見即非傳聞春夏之間流殍疾疫必起逐州去年所糴常平米雖粗有備見今州縣出賣米價不甚翔踊但鄉村逺處飢羸之民不能赴城市收糴官吏欲差船載米下鄉散糴即所須數目浩瀚恐不能足用夏秋之間必大乏絶又自今已往若得淫雨稍止即農民須趁初夏秧種車水耕耘之勞十倍常歲全藉糧米接濟見今己自闕食至時必難施功縱使天假之年亦無所望公私狼狽理在必然臣去歲奏乞下發運司於江東淮南豐熟近便處糴米五十萬石準備浙西災傷州軍搬運兊撥出糶賑濟尋䝉聖恩行下云已降指揮令發運司兊撥合起上供並封樁等錢一百萬貫趁時糴買斛斗封樁準備移用送户部依已得指揮餘依浙西鈐轄司所奏施行聖㫖既下本路具聞農民欣戴始有生意而發運司官吏全不上體仁聖恤民之意奏稱淮南江東米價髙貴不肯收糴勘㑹浙西去歲米價例皆髙貴杭州亦是七十足錢收糴一斗雖是貴糴猶勝於無米坐視民死今來發運司官吏親被聖㫖全不依應施行以米貴為詞更不收糴使聖主已行之命頓成空言飢民待哺之心中塗失望却便指凖前年朝㫖所撥上供米二十萬石與本路内出糶不盡米一十六萬七千石有零充填今來五十萬石數目外只乞於上供米内更截撥二十萬石與本路相兼出糶竊緣上件出糶不盡米一十六萬七千餘石乆已樁在本路臣元奏乞於發運司糴五十萬石之時已是指凖上件米數支用外合更要五十萬石今來發運司却將前件聖恩折充今年所賜吏民聞之何由心服臣已累具執奏未奉聖㫖今來親見數州水災如此飢殍之勢極可憂畏既忝近侍理合奏聞豈敢為己去官遺患後人更不任責伏望聖慈察臣微誠垂愍一方特賜指揮發運司依元降指揮除己截撥二十萬石外更兊撥三十萬石與浙西諸州充出糶借貸如發運司去年元不收糴無可兊撥即乞一面截留上供米充滿五十萬石數目却令發運司將封樁一百萬貫錢候今年秋熟日收糴填還若朝廷不以臣言為然待飢饉疾疫大作方行賑濟即恐須於别路運致錢米雖累百萬亦恐不及於事貼黄稱發運司奏云淮南宿亳等州災傷米價髙處七十七文江東米價髙處七十文竊緣臣元奏乞於豐熟近便處收糴訪聞揚楚之間榖熟米賤今來發運司却引宿亳等州米價最髙處以拒塞朝㫖顯非仁聖勤恤及臣元奏乞本意又貼黄稱若依發運司所奏將出糴不盡一十六萬七千有餘石充數外猶合撥三十四萬石方滿五十萬石數今來只撥二十萬石顯虧元降聖㫖一十四萬石而况上件出糶不盡米已係前年聖恩所賜發運司不合指凖充數顯虧三十萬石又貼黄稱如䝉施行乞下轉運司多撥數目與蘇湖州如合賑濟更不拘去年放稅分數施行又貼黄稱若又行下有司反覆住滯必不及事只乞斷自聖心速降指揮自此方得請留檢詳修入去年十一月末起居郎孫升權中書舎人提㸃淮南東路刑獄賈易為侍御史王巖叟繫年錄云三月二十八日聚都堂見賈易除侍御史除日初易以言鄧温伯不行乞出得淮東憲公議甚以為惜而用事者不恱獨與鄭州梁况之乆不召因中憲舉易補御史未及進呈太母諭曰賈易好臺官可侍御史諸公語皆塞此事當考直龍圖閣文及為集賢殿修撰管勾西京留守司御史臺右朝奉郎文貽慶為兵部貟外郎四月二日孫升言及五月二十四日貽慶改除左司諫楊康國知衞州右正言劉唐老知絳州監察御史徐君平權知鄆州以康國等累乞罷新除從外補也康國尋改相州康國改相州在二十九日今并書王巖叟繫年錄云二十八日入劄子乞留君平當考是日輔臣奏事太皇太后諭以賈易能言事可除侍御史僉謂聖明知臣每如此可喜也楊康國初除磁州既而韓忠彦謂呂大防曰康國磁州太甚比唐老絳州殊不類劉摯本亦謂康國此除不平然唐老有主之者故摯不欲摘之今早漏舎但畧云磁州動著見任并已除共兩人大防曰不奈何摯即黙黙蓋深惜事體不欲有異至是因忠彦語即好言曰誠是誠是康國乆在言路今自左司諫改吏部郎中得磁州比唐老為右正言半年改兵部貟外郎得絳州差不同莫改一州與絳比者足矣大防欣然曰甚好遂改衞州康國自言昔官於衞死亡者五願換相或懷因以相授之摯謂康國辭衞可也惜乎其指名以有求也此據劉摯日記増入給事中朱光庭言神宗皇帝實錄書成修撰官陸佃除龍圖閣直學士按祖宗事例當進官未當加職詔依前行下江淮荆浙等路發運使晁端彦奏請應汴河糧綱每歲如搬運八千石已上或不滿八千石抛欠滿四百石押綱人差替綱官勒充重役滿六百石軍大將殿侍差替使臣衝替外各展二年磨勘若行一運已上不以運數將一年搬過斛斗都數以八千石為一運每八千石遞加一百二十石凖此若加外有剩不及八千石即以一千石上當欠一十五石㑹計其千石已下零數更不收使如至住運不限斛斗數但抛欠通及一千五百石除該差替衝替外更展三年磨勘其初運但有抛欠仍無故稽程至罪止者亦行差替重役從之丙戌措置荆湖北路邊事司言相度誠州知州闕合遷補子孫承襲詔自今後誠州知州同知州合承襲人知州與供備庫使誠州刺史同知州與供備庫副使丁亥御延和殿太皇太后宣諭曰皇帝每於内中看讀餘暇頗亦習射人君自當兼治文武皇帝敏於事業纔執弓矢即已精熟近日已射數斗力弓矣户部郎中葉伸為殿中侍御史伸辭不拜詔知大宗正丞事安鼎為監察御史祕書丞姚勔為右正言伸為左中在四月十四日劉摯云伸乃故吏甞薦為監司其人至公清修廉明有學問才長於斷但恐傷於隘少容耳鼎聞亦讀書不妄作一鄉夫子耳孫固稱之勔有學行摯同年生既及第以母老不仕甘貧二十年元祐初朝廷起於致仕純靖端良不茍之士也顧臨知之摯評三人者如此初伸鼎並用舉者除臺官摯謂執政曰伸舊所舉於例當避鼎恐不協人望然竟用鼎而伸以摯故改他官先是中書舎人韓川言新除黄庭堅為起居舎人伏以左右史職清地峻次補侍從而黄庭堅所為輕翾浮艶素無士行邪穢之迹狼籍道路封還除命封還除命見此月十八日呂大防必欲用黄庭堅請再下太皇太后曰恐再繳不如只依例改官乃詔庭堅行著作佐郎劉摯謂庭堅能文於詞掖為宜故廟議畧其他𤯝為官擇人懲近時詞令不振之弊然庭堅少年之過耳顧不為公論所赦惜哉始摯為門下侍郎甞謂大防曰兩省闕官甚多恐須早補西掖當以豐稷次遷大防曰然螭頭可補陳軒否摯曰固可然猶不若孔武仲黄庭堅並補大防曰誰可補司業摯曰軒可也大防曰極好但庭堅恐招人言摯曰二人有文故朝廷用之若言者誠有理朝廷從其言而罷亦非朝廷遺人也乃擬除目稷自起居舎人遷郎武仲自司業遷起居舎人軒自徐王府翊善遷司業除目既定其日晩集大防又曰稷不若便遷詞掖更以庭堅補足螭頭摯曰此固從來所議甚善來早可白知諸公時五年十月七日也翌早大防纔至漏舎即召三省既坐大防展除目語傅堯俞曰稷宜使補西掖却别補一吏許將遽起身以手指除目攙曰陳軒可也大防愕然已入其語顧堯俞曰以軒補之摯疑其故以相示即曰初不聞此商量大防面發赤曰軒莫亦得將曰軒髙科遲却此官已二十年矣是將同牓也頌亦曰軒有文行曽與之同官摯素聞堯俞及將以軒干大防非一日而大防固已媕娿許之至是忽為將猝然鈔說刼之以軒故氣塞無能可否黽勉遂之及聞摯所對則又不能無莽蠆故見于色尋呼班入殿門摯就語大防曰忘昨議庭堅乎大防呿而已既對堯俞欲出此除目大防目之曰且未進下殿行語諸人曰待商量黄庭堅翌日又聚議補螭頭事大防為堯俞及將所干逼决欲用軒摯告之曰此官非他比若不為官擇人初除猶未覺可否異時一遷遂見其弊誰無同年誰無鄉里於國家名器可以徇人而不擇乎大防笑曰公未免分别南人南人如軒莫粗可用摯曰非分别也向所議武仲及庭堅豈非南人軒非不可用也恐於此官非宜耳摯料大防許之已堅因曰今若不得已當與軒然使相公於差除甚難既欲協公望又要應付人情誠不易不易大防面發赤大笑曰休休且與了之然訖未了也豐稷六年正月二十六日仍自右史為少常此除目竟不進呈故也居月餘大防又謂摯曰螭頭乆闕須與了之摯曰極是大防曰莫且依前時所定摯曰不記誰何曰黄庭堅與孔武仲誰資深又曰陳軒且與館職為司業雅宜也又曰岑象求亦好司業摯曰象求固好但方到臺無名遽移大防曰且與陳軒摯唯唯而已大防又曰只是難保摯因曰更請相度已而三人皆不遷大防此時雖欲除軒司業然卒不除六年三月二日乃自翊善加祕校七月八日除起人及是因實錄成六年三月始用庭堅為起居舎人既而罷之三月二十八日居四月武仲乃與軒並為左右史七月八日武仲以集校司業兼侍講除左史軒以祕校翊善除右史此叚專以劉摯日記増修可見當時除官之不易也擬左右史自五年十月至六年七月乃定御史中丞趙君錫言髙麗國三佛齊國進貢使副已下擅入棘盆觀看奉詔館伴押伴官等並特放罪臣竊惟逺人入貢有司當守著令今館伴官等廼敢輒於觀燈之夕公然廢越法制辱國誤朝宜在不赦詔館伴押伴官並罰金六斤始蘇轍為御史中丞論回河三事其一乞存東岸清豐口其二乞存西岸披灘水口其三乞除去西岸激水鋸牙朝廷下河北監司相度惟以鋸牙為不可去轍既執政於殿廬中謂呂大防曰鋸牙終當如何大防曰無鋸牙則水不東水若不東北流必有患轍曰分水雖善其如北京百萬生靈每歲夏秋常有决溺之憂何且分水東入故道見今故道雖中間通流兩邊淤合者多矣分水之利亦自不復能乆劉摯曰今歲歲開撩正為此矣轍曰淤却一丈開得三尺何益若於漲水過後盡力修葺北流隄防令能勝任漲水撤去鋸牙免北京危急之患此實利也摯曰河朔監司皆不如此言為之奈何轍曰外官觀望故爾何以言之張璪雖言鋸牙當存而乞大修北京簽横隄所費不訾則凖備鋸牙激水之患矣大防曰河事至大難以臆斷轍曰彼此皆非目見則須以公議言之也及至上前大防摯皆言以分水為便轍具奏上語太皇太后曰右丞只要更商量耳轍曰朝廷若欲審重乞候漲水過見得故道轉更淤髙即併力修葺北隄然後撒去鋸牙如此猶且穩便既至都堂大防摯令批聖㫖並依都水監所定轍謂堂吏適已奏知乞候漲水過别行相度摯大不恱大防知不直意稍緩明日改批不得添展而已此據龍川别志及潁濵遺老傳附三月末
