body:
  text: 續資治通鑑長編巻二百七十二宋李燾撰神宗熈寜九年春正月戊午朔不視朝己未廣南西路轉運司言交賊攻邕州効用人禦敵殺傷賊頗衆詔降東頭供奉官空名宣與經略司書填以賞獲首級及别有功之人餘優與支賜辛酉廣南西路都監張守節為交賊所敗於崑崙闗先是蘇緘遣使詣桂州請救劉彛遣守節徃援守節聞賊衆十倍逗留不即行復迂取貴州路駐兵康和驛以觀勝負緘又遣使持蠟書告急於提㸃刑獄宋球球得書驚且泣以便宜督守節進兵守節惶遽不知所為移屯火夾嶺回保崑崙闗猝遇賊不及陣一軍皆覆守節死之癸亥詔廣南西路經略轉運司應控扼州軍并修城處土丁並給錢米修城者分畨赴役非控扼處教閱滿一月罷上批自廣南西路有邊事東路並不聞設備其令監司分定州軍嚴修守備遍作防禦是日六日癸亥上批河東分畫地界公事韓縝李評候北使辭訖可降與今來合分畫去處文字仰遵守施行仍早令起發此據御集熈寜九年正月六日下去年十二月二十九日有御批云韓縝等見㸔詳文字處閒雜人不令放入又今年正四月御批云見議代北疆事文字甚時可了存此要見縝時在京師去年十二月二十四日縝除都承乙丑雨木冰翰林學士權御史中丞鄧綰權知貢舉知制誥鄧潤甫集賢校理同修起居注直舍人院蒲宗孟並權同知貢舉實録於去年十二月辛卯書此恐誤也丙寅遣著作佐郎陳大順計置廣南西路芻粟試將作監主簿歐陽濟言乞於京西沿江州縣輟榖二十萬石應副廣南西路不足即糴於民從之仍遣濟計置詔安南招討司同石鑑周沃體量沈起劉彛妄生邊事詣實以聞先是手詔中書沈起昨在廣西妄傳宻受朝廷意㫖經略討交州又不俟詔擅委邊吏招接恩靖州儂善美及於融宜州溪峒强置營寨虛奏言蠻衆同附既興版築果致叛擾殺土丁兵校官吏以千數今交賊犯順宜獠内侵使一道生靈横遭屠戮職其致冦罪悉在起了無疑者朕為人父母視此逺方無辜之民横罹災害深所哀悼沈起可貸死削奪在身官爵送逺惡州軍編管未行而中書樞宻院言劉彛亦相繼生事請罷屯扎兵致所招之人未堪使并造戰船止絶交趾人賣買不許與蘇緘相見商量邊事及不為收接文字令疑懼為變事恐不獨起而亦有可疑者乃並下招討司更訪其實焉去年十二月二十四日付周沃等二月四日起彛俱責司農寺言熈寧七年九月詔民兩經倚閣常平錢者罷支十一月詔改兩經為已經畿内去年災傷一經倚閣於法當罷矣然今春雨雪應時宿麥皆茂乏困之民若不賑貸則殆將失所請依前詔再倚閣者乃罷支上批今天下常平錢榖十常七八㪚在民間又連歲災傷倚閣迨半若止務多給計息為功不計督索艱難豈惟官物虧失兼百姓被鞭撻必衆可且依後詔行之七年九月二十六日云云又此年正月二十三日云云合參考殿前侍衛馬歩軍司言諸班人員經安南招討司乞効用非便詔招討司召募三班使臣差使借差并殿侍軍大將及諸色人等充効用其諸軍班人員兵士别聽㫖熙河路經略使司奏河州山後首領朗格占古勒察卜巴覺言果莊令朗格占等攻河州朗格占等心欲内附與其甥斯班同謀殺果莊未發而果莊覺走歸塔南城朗格占率本族首領百二十一人來降上批朗格占等相率出降仍斬不順蕃部首級及同謀殺果莊不克河州雖已犒賞恐未足酬勞思順歸附衆心可優與官資庶山後諸𦍑聞風相率内附河州邊備稍得解嚴乃以朗格占為内殿承制其餘首領補班行及蕃官有差己巳同管勾都水監公事范子淵言北京第六埽許村港連二股河恐向去漲水復致漫溢為患今欲自南岸魚肋埽接治水埽増築一隄從之詔罷檢計清汴庚午命皇城使涇原路鈐轄姚兕引進副使熈河路鈐轄李浩右騏驥副使秦鳳路都監兼知甘谷城兼第二將張之諫内藏庫副使權發遣通逺軍楊萬左藏庫副使權環慶路都監兼第三將雷嗣文鄜延路都監兼副將吕真供備庫副使環慶路都監兼第四將李孝孫内殿承制鄜延路都監兼副將曲珍閤門祇候權發遣豐州張世矩内殿承制河北第二十將狄詳西頭供奉官閤門祇候京西第四副將管偉河東第七副將王愍並充安南行營將副仍令招討司以見今差定軍馬分擘統領其舊將副且於駐兵州軍管勾訓練兕本傳兕將中軍珍本傳珍為第一將六月三日實録乃以珍為左第二副將置熈河岷州通逺軍永寜寨買馬場詔江池等州鑄錢監於合入内藏庫錢八十六萬三千五百賜三十萬緡付安南招討司充軍賞餘付廣南西路應副軍興新知廣州劉瑾言乞於江西及本路募射生户及勇力亡命者軍前効用所過州軍亦許選募强勇以行詔送安南招討司仍令瑾不依常制舉將官文臣共十人宣徽北院使王拱辰上平蠻雜議十篇詔送安南招討司是日詔蘇緘兼廣南西路經制賊盗溪峒公事温杲同經制种諤添差廣南西路鈐轄諤尋以主帥嫌隙不行改知岷州緘死於邕州杲亦罷經制此據正月十三日又三月五日又三月三十日御集并种諤傳辛未幸集禧觀中太一宫燕從臣幸大相國寺御宣德門召從臣觀燈是日上雖遊幸猶御便坐宣輔臣奏事以化外蠻知蘇茂州韋守安知門州黄金滿儂順零並為供備庫副使劉紀為左藏庫副使岑慶賓為内殿崇班此條當考盖先出官告以招納之彼未嘗來也郭逵傳云逵至長沙督諸路進兵復邕州遣欽州將任起率郡兵峒丁三道進討永安州㧞之左右江悉效順門州首領黄金滿岑慶賓降按黄金滿岑慶賓降當在八月九月間今姑存此仍於二月十一日攻㧞門州下具注賜空名告四十内殿崇班大理寺丞評事將作監主簿告各十付安南招討司壬申上批聞代州城壕乾淺可浚令深三十尺闊二十五尺以皇城副使兼閤門通事舍人劉舜卿為西上閤門副使知代州舜卿知代州乃十七日御集即以浚壕事付舜卿今附見編修貢舉敕式練亨甫言京東陜西河北河東京西到省舉人并府監諸路諸科改應進士人欲各作一項考校以分數均取從之詔判都水監工部郎中侯叔獻減磨勘二年以開引揚州陳公塘放水撥出淮南重綱之勞也其元失擘畫官令轉運司奏劾以聞癸酉詔趙卨且交割延州事與以次官速來赴闕皮公弼病故也此據御集甲戌右千牛衛將軍令扁令志並為右監門衛大將軍令扁等以學士院試文論合格也詔河北路市糧草於定州百里内納賜安南行營副都總管燕達公使錢千五百緡八軍將副逐軍五百緡乙亥中書言中書主事以下三年一次許與試刑法官同試刑法第一等升一資第二等升四名第三等兩名無名可升者候有正官比附減半磨勘餘並比附試刑法官條例從之詔赴安南行營諸軍過嶺者禁軍人特支錢千廂軍七百不過者禁軍七百廂軍五百九將軍馬除三將已行三將令随招討司徃三將令招討司至潭州度逺近追呼司馬記聞云交趾正月二十一日焚邕州二十三日回本峒今王師前軍三將已達桂林一將暫戌長沙置局後軍三將分屯荆鼎澧三州一將辰州不知是何月事今附注此當考丙子詔安南招討已差定馬歩禁軍其在京虎翼即未嘗依隊法團結兼恐陜西河東應募兵拆洗元結隊伍可並令依隊法團結聞奏内軍員係都虞候已上者更不團結並選充隊將詔熈河路營田司洮西弓箭手單丁所耕種不盡閒田權差廂軍官置牛具農器人給一頃令堡寨使臣道路廵檢以時督其耕種收成輸官歲終與弓箭手較優劣賞罰如弓箭手可以耕種即令依舊仍差管勾河州農田水利鈐轄李浩均度地土措置以聞丁丑詔權増廣州公使錢至七千緡桂州至五千緡候邊事寜日仍舊戊寅賜秦鳳等路常平坊場免役剰錢十萬緡赴熈河市芻粟又賜三司銀十五萬兩江南兩路常平錢十萬緡赴廣南西路轉運司以備軍須己卯荆湖北路轉運使太常少卿集賢殿修撰孫桷為右諫議大夫知桂州降詔奨諭以桷言招撫下溪州刺史彭師晏并天賜州知州等投降及領兵修築下溪州城堡畢工也於是師晏等十八人赴闕詔授師晏禮賓副使京東州都監不簽書兵馬事餘皆補班行有差新紀書下溪州刺史彭師晏及天賜州降舊紀不書三年十二月二十七日置鎮溪寨察訪廣南路常平等事檢正中書禮房公事太子中允集賢校理徐禧權發遣荆湖北路轉運副使禧與王古馮宗道至華亭鞫獄方具即有此除詔兩浙提舉市易孫廸遷一官賜錢百千兼提舉轉運使王庭老減二年磨勘勾當公事曹彦候及三考日循一資官吏依在京市易務給賞以提舉市易司言比校廸等全年課息有羡故也詔比者廣西軍興有本路已投状指射差遣而反擅離本路者依擅離官守條候事平日不用此法權發遣熈河路經略司高遵裕言邈川温錫沁見欲來降諜知夏人已在邈川之北若温錫沁畏其廹逐而來拒之則非平日懷撫之意納之則夏人必有詞不敢專决詔温錫沁乃受夏國俸給之人可勿招納定州安撫司言䝉賜度僧牒三百回易收息以賞武藝兵士保甲乞更賜二百從之庚辰遣同知太常禮院鄭雍祭告南岳陳侗祭告南海以討交趾師期中書奏乞常平錢榖歲給有餘而民有緩急闕乏許以已若保人物産為抵而貸之詔常平錢榖若給外有餘又誘致人賖請是不容倉庫稍有存積必使盡㪚在民間如此徒有蕃息虛名甚不副元法國之財用取具本意自今倉庫常留一半餘方給散如有餘即遇民間非時闕乏許以物産為抵支借依常平限納七年九月二十六日九年正月九日并此月合參考司馬記聞云云具注七年九月二十六日中書奏乞實録乃不書今以本志増入詔廣南東路令許彦先福建路令徐億差顧􅔓舶船載兵甲每路約可載萬人至秋末齊集候事平日優與船主酬奨詔廣南東西路知州見闕處如無人願就即許硬差候得替與減磨勘二年仍堂除差遣是日二十三日交賊陷邕州蘇緘死之張守節敗生獲於賊者數百人賊知北軍善攻城啗以厚利使為雲梯既成為緘所焚又為攻濠洞䝉以生皮緘俟其既度縱火焚於穴中賊計盡稍欲引去而知外援不至㑹有能土攻者教賊囊土數萬向城山積頃刻高數丈賊衆登土囊以入城遂陷緘猶領傷卒馳騎苦戰力不敵緘曰吾義不死賊手乃還州廨闔門命其家三十六人皆先死藏尸于坎縱火自焚賊至求緘及其家遺骸皆不能得殺吏卒土丁居民五萬餘人以百首為一積凢五百八十餘積并欽廉州所殺無慮十萬餘人並毁其城以填江邕州被圍凢四十二日緘率厲將士固守糧儲既竭又歲旱井泉皆涸人饑渴汲漚麻汙水以飲多病下利死者相枕而人無叛者緘憤沈起劉彛致㓂彛又坐視城覆不救欲盡䟽以聞屬道梗不通乃列起彛罪牓於市冀達朝廷初緘子子元為桂州司户參軍挈家徃省父將還適聞有交賊緘以郡守家屬出城見者必以為避賊則人有去心獨遣子元還桂州而留其妻孥至是俱死緘既死交賊謀復㓂桂州前鋒行數舍或見大兵自北南行呼曰蘇皇城領兵來報交趾之怨賊帥懼遂引歸其後邕人為緘立祠歲時禱之司馬記聞云正月二十一日賊破邕州二十三日遂回本峒按實録乃二十三日破邕州今從實録獨不記賊用何日回本峒當考戊按交阯陷邕州之日宋史作辰東都事畧與此合辛巳宣徽北院使王拱辰為中太一宫使詔熈州舉人如户貫實及七年自今解額二人河州一人壬午詔趙卨非久至京其家屬可特許借同文館居止尋詔郭逵亦如之逵詔二月九日又詔修京城役兵提轄部役使臣増給食錢總十二萬緡恐三司常費外難辦可出度僧牒千分三年給賣以充用此據御集乃正月二十八日事今從實録御集云契勘見修京城合用役兵及提轄部轄部役使臣添支食錢一十二萬餘貫若命三司支給緣係常費之外恐難出辦可出給空名祠部一千道作三年支給依修清汴收買木植仍付提轄所出賣收錢充用又詔潭州凖備兵四萬人七月錢糧仍令發運司截留上供錢二十萬緡米五十萬石豆麥十萬石先計㑹荆湖南路轉運司除本路移用外闕少數應副餘並赴廣南西路合封樁處下卸内潭州限四月廣西限六月以前運畢仍不依常制差官催促詔市易司自今不得賖請錢貨與宗室及官員公人前相度淮南路水利劉瑾言體訪揚州江都縣古鹽河高郵縣陳公塘等湖天長縣白馬塘楚州寳應縣泥港射馬港山陽縣渡塘溝龍興浦淮隂縣青州澗宿州虹縣萬安湖小河夀州安豐縣芍陂等可興置除古鹽河萬安湖小河已令司農寺結絶餘欲令逐路轉運司選官覆案施行從之詔諸路差使臣赴招討司其家屬令所在州縣厚加存恤諸將副有新官承替者其家屬委州縣居以官宅給其使令詔安南行營官吏雖已第支賜其緣路驛券可更特支癸未安南招討司言發兵八萬當備十月乾糧八千萬斤詔轉運司相度如所造作可存留即依數辦集於桂全州又詔三司令江南兩浙路封樁上供錢二十萬緡許商人入便於廣南東路詔欽廉州死事文武官並贈十資武臣贈至刺史以上者取㫖甲申權發遣三司使沈括言前提舉司天監嘗奏司天測驗天象已及五年䝉差衛朴等造新厯後考校司天所候星辰晷漏各差謬不可凴用其新厯為别無天象文籍參驗止據前後厯書詳酌増損立成新法雖已頒行尚慮未能究極精微乞令本院學士等用渾儀浮漏圭表測驗每日記録候及三五年令元撰厯人以新厯參較如有未盡即令審行改正已䝉施行今若測驗得此月望夜不食及逐日測驗過日月五星行度晷漏之類乞下司天監逐旋付衛朴參較新厯改正從之先是奉元厯載今月望夜月蝕不驗詔問修厯推恩人姓名至是括有是奏元豐二年閏正月十九日乙未朴罷歸沈括筆談云開元大衍厯法最為精宻代用其朔法至熈寜中考之厯已後天五十餘刻而前世厯官皆不能知奉元厯乃移其閏法熈寜十年天正元用午時新厯改用子時閏十二月改為閏正月四夷朝貢者用舊厯皆未欵塞衆論謂氣至無顯驗可因沈括論新厯事下有司考定凢立冬晷景與立春之景相若者也十二景短長不同則知天正之氣偏也凢移五十餘刻立春立冬之景方停以此為驗論者乃屈元㑹使人亦至厯法遂定括所云當考元豐元年閏正月十九日乙未所書又治平二年五月乙巳熈寜元年七月乙酉八月乙丑十一月甲午並合參照八年閏四月十一日壬寅初行奉元厯詔在京官司非廨舎所在者雖親戚毋得入謁三司開封府司農寺審官東西院流内銓兵部軍器都水將作監提舉在京諸司庫務提㸃倉場司市易司商稅院開封祥符縣左右勾當公事編修敕令式條例官非假日毋得出謁及接見賓客開封府司軍廵院假日亦不許接見賓客止許出謁内中書樞宻院檢正檢詳習學公事刑部大理寺審刑院官雖假日亦禁之其後應在京司局非假日亦毋得出謁違者并接見之人各徒二年又詔陜西交子法更不行官吏並罷已支交子委買鹽官納換先是措置熈河財利孫逈言緣邊交子價錢商人自永興軍載錢赴秦州以來買販多贏官錢又永興軍秦州相去不逺商人貪販交子少肯買鈔故鈔價更減今以秦州脚户載錢及百姓買賣交鈔文字較量官支交子比般錢每千折錢二分以上比未行交子以前鹽鈔每席減價一千以上若出交子不已則官折錢無窮而朝廷初立法意本以運錢費多及向來錢賤故用交子行錢兼助鈔法今此運錢既有折耗又深害鈔價秖足以資兼并商販之人况熈河路將來年計未辦固宜愛惜見錢故有是詔七年六月二十六日推行交子至此罷吕惠卿日録有論交子法三叚今附注此熈寜八年八月十三日進呈皮公弼乞錢收糴事上曰皮公弼奏言交子事莫却言得是余曰莫是如此交子合㪚於諸州軍則是却是趙瞻要如此石曰到了妨鹽鈔上曰交子自是錢對鹽鈔自以鹽對兩者自不相妨石曰怎得許多做本上曰但出納盡使民間信之自不消本僉曰始初須要本俟信後然後帯得行余曰自可依西川法令民間自納錢請交子即是㑹子自家有錢便得㑹子動無錢誰肯將錢來取㑹子石曰終是妨鹽鈔緣鹽每歲凶豐不常又督察捕鹽有緩急即用鹽多少不定若太多出鈔即得若少出即暗失了賣鹽課利可惜許以此須多出些鈔印置場平賣余曰不然歲雖有凶豐用鹽多少不爭多此不比酒乃是民間常用之物縱饒酌中立法豐歲所添亦不多若覺民間渴鹽少鈔之時即旋出鈔不難自然鈔常重矣鈔常重即糴價不虚擡矣故不如少出鈔即以交子行使為便石曰陜西有銅錢有折二錢弊太多又做交子余曰昨來為消了私錢多交子不虚出留下錢却出交子八年九月五日余曰王安石欲廢交子已令檢正官做了文字將上臣且留不㸔已做得一文字待送與安石㸔且說交子如文字上所說上曰交子與鹽利自不相妨豈須廢了今若又廢將來更行不得余曰此交子與向來不同向來明於敕上言候三二年邊事定疊却依舊却令人户納錢換交子如此怎行得此回只為趙瞻只於永興軍置場不便皮公弼不便與本又受趙瞻為客人扇惑人稱官無本錢買交子曉示告捉却不肯簽似此所在未信須得一曉事底人分付此法與行信後即可減却虚鹽鈔合與鹽相對上曰九折博直是可廢但用見錢與交子糴買却將客人所收似衙前重難一般打抹支給余曰如此極好須是行得交子信始得但恐此輩見朝廷議論不同却有觀望又理㑹不得不能如法意推行上曰須是考校若是行不如法未可廢法直須行盡法始得余曰候與安石商定進呈上曰好八年九月十六日進呈添鹽鈔廢交子事只如鹽鈔他初來便要添作三百萬文字說得煞過當臣更與節下方將上陛下果是不然其說臣却别與做一副當文字且就他只作二百二十萬然其實舊鈔尚多終是不便元初交子只因人起說陛下說及適㑹韓綘亦曾行此事便商議要行阿誰又須主張他來若是宰相道不便怎行得却不如罷了然陛下既見得此叚豈得茍随他昨來皮公弼趙瞻極有理㑹待報文字得㫖令立法檢正官却做状稱無錢行不急之法是甚玩人言語臣即時條折分送安石又送檢正做文字到今未見此法陛下已盡見更不須多說按惠卿於八年九月二十六日云安石欲添鹽鈔而廢交子惠卿以為不便即此三叚是也今因廢交子并附注此庶可考究利害之實云上批大軍南行方當盛暑萬里責之征討朝廷顧恤所宜特倍於常可與添賜錢候自潭州起發過嶺日更與特支乙亥詔廣南西路經略司選募峒丁於近便處駐寨如遇賊每擒一人獲一級除依賞格外更各支絹十疋如斬獲首領仍具事状取㫖詔比者廣西軍興朝廷賜三司司農内藏庫等錢以供軍須聞湖南京西等路過軍糧草或賤估直科擾居民令提㸃刑獄提舉司覺察以聞詔向者是熈河每歲糴軍糧二十二萬石馬料一十萬石買草八十萬束以本路市易茶鹽場息錢并酒稅課利充糴本可具自來糴買次第聞奏仍更具析違朝㫖支公使錢致不足因依以聞要見究竟如何又詔安南招討司經由州縣鎮用物並官給毋得假借科率於民舊紀於甲申日書詔安南軍所經州縣無賦民即此事新紀仍係之乙酉日御史蔡承禧言伏覩近日命趙卨為安南招討使李憲為之副外議紛紛皆云不自二府此雖陛下擇才之明亦必與大臣商議又云憲所陳請多不經由二府徑批聖語下招討司此果有之乎是非之間臣未易以臆决風傳之事或難盡信然若無其由安得此語臣職居風憲義不可隠茍有聞見宜悉以陳臣竊以人君之職在知言以言任人既難偏用則先參驗其平日之素行又考察其今日之所能凢所言所能已先參考則曰功曰效從可類求自小官而至大吏自大吏而至大臣及夫參預政機與圖樞要任既重矣察亦至矣故古之知治之君不以疑大臣為嘉言以擇大臣為重事若夫道不足以簡人君之心行不足以孚天下之衆所措乖戾所為諂邪則敷告外廷去之可也殺之可也至於使居其職而不責以所任之事使充其位而不責以所行之言内計定而外言得以轉移近習進而輔政之語得以侵奪或文符直行而不領屬於公府或論議隂進而不闗决於樞庭則滅裂紀綱何莫由此諒朝廷以為事之大者必須僉謀已令大臣詳論事之小者不欲迂滯秪使小臣開陳或患其宛轉而虚有留難或以其廹急而不暇詳問夫王言之出尤在謹微其初小不留神其後遂為故事某日某事稍繫政經已嘗不下二府某日某事不繫國體何緣却闗外司樂便疾於一時忘幾微於後日一啓其漸寖難改更况於邊庭休戚至重且命大臣者所以同安危而繫休戚者也今至煩莫若邊鎮至重莫若將臣而有不預焉則大臣之能知其任者必成自疑而莫敢安其處矣既不敢安其處則同心同德之義虧矣大臣之罷軟者必曰勢位崇極矣上已為之而又以言爭則獲專權之咎矣大臣之不勝其任者必曰此出於聖㫖我何預哉是與其能者為自疑之端不才者為容身之地積此而徃豈國家之利耶而又君逸臣勞勢自當爾主憂臣辱仕者固然未有君宵旰於上而使臣得燕安於其官主憂勞於中而使臣乃恬怡於下者也臣不必逺引古今以國朝言之章聖皇帝責謂李穆天旱如此盈車載殍於汝安乎可謂能知責輔弼之方矣太祖以王著醉於玉堂而悉逐御史此可謂能責彈劾之臣矣蓋平日不侵其所職則後日可責以有成臣伏覩近世朝廷所以責臣下者至輕羣臣所以自任其責者猶鮮二府侵寺監之職寺監侵外任監司州縣之職方今之弊在所革除豈可相承上下如此臣恐權綱一紊拯之則難臣欲乞除命大臣臺諫之外事無巨細非經二府者不得施行其乞不下兩府者悉傅以法其大臣或可疑若不堪其任者速令罷免如二府之論或有異同陛下總攬其成裁斷其可而後行庶盡五帝容下之美大臣無諉上之咎人人自任其責君臣之間各盡其道承禧章不得其時今附正月末李憲罷在二月二日更須考詳或移李憲罷後
