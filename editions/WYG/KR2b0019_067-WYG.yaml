body:
  text: 續資治通鑑長編巻六十三宋李燾撰真宗景德三年五月壬寅朔司天言日當食上避正殿不視事百官各守其司既而陰翳不見上語宰相曰此非朕德所致但喜分野之民不被其災耳司天奏周伯星見羣臣上表稱賀知雜御史王濟乘間言於上曰瑞星實符聖德然唐太宗以家給人足豐年為上瑞臣願陛下日謹一日居安慮危則天下幸甚上嘉納之㑹要四月二日周伯星見及是司天乃奏今從實録祥符九年四月庚辰事當參考斯多特遣其安化郎將魯哩努来貢魯哩努病於館特詔尚醫視療及卒上憐之厚加贈給趙德明遣其兵馬使賀永􅈿來貢馬甲辰德明又遣其兵馬使賀守文來貢先是向敏中及張崇貴與德明議立誓約久未决德明雖數遣使修貢然於七事訖莫承順累表但云乞先賜恩命徐議之時已有詔許德明毋納靈州既又賜敏中等詔諭德明止遣子弟宿衛及毋得攻刼西路進奉蕃部縱有爭競並取朝廷和斷他約悉除之然亦不聽回圖徃來及放行青鹽之禁乙巳敏中等言二事茍不如約恐乖前議請皆與之上以德明變詐難信儻務姑息必貽後患復賜敏中等詔令熟計復奏丙午命知樞宻院王欽若陳堯叟同修時政記每次月十五日送中書度支副使李士衡言闗右自不禁解鹽已來計司以賣鹽年額錢分配永興同華耀四州軍而永興最多於民不便請减十分之四詔悉除之先是内帑歳出緡錢三十萬助陜西軍費及士衡為轉運使言歳計可自辦遂罷給上將幸洛士衡獻粟五十萬斛又以三十萬斛饋京西朝廷以為材故召令佐三司士衡傳云上謁陵寢因幸洛士衡獻粟五十萬斛又以三十萬斛助京西故得度支副使按士衡除度支副使乃景德三年三月丙申謁陵寢幸洛實四年正月二日事本傳誤矣今畧加刪潤使不相牴牾有王太冲者初以専經中第罷宜黄主簿赴選調命為流内銓主事擢授大理評事時知制誥楊億知通進銀臺司兼門下封駮事即封還詔書以為丞史之賤不宜任清官不聽既而太冲居職累歳無所裨贊丁未送審官院令釐務外州楊億本傳載太冲事與實録小不同今參取刪修初潤州造羅務工人舊限十二日成一匹及王子輿為江淮制置使勒減一日日限既促工人不能充課歳終頗多笞箠上聞之謂左右曰貪功邀進之人為國生事豈可長也乃詔復依舊限仍命劉承珪察京師庫務有類此不便事條列以聞萊蕪監判官歐陽冕求應賢良方正而大言自薦以姬旦臯䕫為比且云使臣日試萬言一字不改日覽千字一句不遺由是促召赴闕令中書試五論三頌諸詩四十首共限萬言題既出冕惶駭自陳止應賢良不應萬言幸假貸乃以所上表示之冕不敢復言至晡但成五論一頌共三千字既奏御上令問表中所陳條目冕伏躁妄之罪責授連州司户參軍冕廬陵人也左諫議大夫陳省華卒省華辯智有吏幹妻馮氏性嚴訓諸子尤力堯叟既貴孝謹益不衰本富家禄賜且厚然不許諸子事華侈堯叟掌樞宻時弟堯佐直史館堯咨知制誥與省華同在北省諸孫任官者十數人宗親登科者又數人榮盛無比客至堯叟等皆侍立其側客多不遑引去舊制登樞近者母妻即封郡夫人堯叟初拜以父在朝止封其妻而母但從夫邑封堯叟表讓朝廷以彛制不聽省華卒既逾年上欲褒封其母以問王旦旦曰雖私門禮制未闋公朝降命亦無嫌也乃封為上黨郡太夫人後進封滕國年八十餘尚無恙戊申詔河北轉運司及諸州軍每詔赦事闗機宜者謹宻行之勿付胥吏致其漏洩虎翼軍使李緒屯青州御下素嚴所部卒龎德自以多過憚其痛繩乃詣闕誣緒令小校繕兵器訪山川道路謀為㓂盗上疑其詐遣閤門祗候侍其旭械德至青州與通判魏昇鞫之且戒旭事如不實即斬德以聞至則具伏矯妄且言本謂朝廷不復窮詰緒亦云部下所告罪名至重非聖上明察使得詳辨則緒豈全要領感慨雨泣旭具以聞上謂左右曰大凡獄訟無小大須為明辨免及無辜也又以緒治軍嚴整即擢為本軍都虞候知青州張齊賢奏旭擅戮人上曰不爾無以安被告者辛亥詔羣臣上殿奏事日不得過五班如事干急速者詣崇政殿尋又詔閤門祗候以上任西北縁邊川峽廣南監軍者聽上殿自餘有公事令實封以聞閤門詔在八月十三日今聯書之京東頗有羣盗依阻山河為民患遣使與轉運使張知白等相視所部州軍分為五路各置廵檢司令督捕之府州折惟昌言威尼族大首領眀葉從父星結族先為李繼遷所擄授白池軍主近宻遣使諭眀葉云德明雖外託修貢之名而㸃閱兵馬尤急必恐刼掠山界眀葉以告上嘉之降詔撫諭就賜錦袍銀帯仍令本路常加守備涇原儀渭都鈐轄秦翰知鎮戎軍曹瑋等各請出兵討賊上以德明累遣使修貢慮失誠信不許德明初請命于朝瑋言繼遷擅河南地二十年邊不解甲使中國西顧而憂今方其國危子弱不即禽滅後更盛彊難制願假臣精兵出不意捕德明送闕下復以河南為郡縣時不可失朝廷方欲以恩致德明寢其書不報癸丑詔國子監學官月俸自今並給見錢丙辰詔東京赤畿知縣令審擇其人月給冝從優厚各増其俸有差詔以畫龍祈雨法付有司鏤板頒下又詔自今每遣使祈報悉給南海上等香以致精意給香前此矣今附見戊午知樞宻院事陳堯叟起復故官堯叟表請終䘮不允上封者言諸路廵檢當擇武勇心力彊明者乞不用福建荆湖江浙川峽及衙前省職文資出身人領其事上謂王欽若曰人之勇怯豈限南北若此區别非任人之道也㑹要以事繫十七日衡州防禦使樂平郡公德恭被疾上再臨視見其羸瘵憂形於色其子承慶割股肉以食焉己未德恭卒上臨哭之慟贈保信節度使封申國公庚申西凉府康古蘭家宗家咱隆當宗章宻等十族來貢向敏中等言德明終未推誠恐難盡副元約但令遣長子親弟宿衛京師及貢結誓表章自今毋得攻劫内屬蕃部縱有爭競亦當奏裁如詔書所指三事頗為要切候其親弟到闕并得誓章則先許五事悉願與之姑務羇縻以緩爭戰可也上意許焉又慮德明空接續進奉肆其徼求在彼固無虧損而我漸失機㑹復賜敏中等詔令亟圖之并以邊臣及蕃部所奏德明廹脅攻劫事狀付敏中等且言所掠去蕃口縱不能給還亦當重作要約絶其後犯因促賀守文等入辭徃詣敏中等靣受詔書歸諭德明辛酉撫州獻白烏詔還之給其道里之費壬戌詔從行為盗非元謀造意巨蠧者並奏裁癸亥斯多特遣使言蕃部多疾乞賜白龍犀角硫黄安息香白紫石英等藥并求弓矢皆可之藥同而名異者令驛人辨說給付使者感悅而去乙丑又以斯多特所奏族帳李貝通等四十九人為檢校官充本族首領及郎將有差戊辰三司言富商大賈自江淮賤市秔稻轉至京師坐邀厚利請官糴十之三不許先是三館職事官多不時進用及上即位郊祀止加階勲故有累年官不遷者己巳詔京朝官任館職自至道三年至今不遷官及衣緑二十年者悉以聞於是直集賢院宋臯賜緋魚直昭文館陳充直史館張復直集賢院李建中石中立皆以久次叙遷臯平棘人綬之父充成都人建中洛陽人也渭州言宻鄂克延家碩克威等族率三千餘帳萬七千餘人及羊馬數萬欵塞内附詔遣使撫勞之賜以袍帯茶綵仍授結彭族首領實布格順州刺史充本族都軍主先是數大族者遣使詣鎮戎求援將㧞其部人來歸諸將皆猶豫不敢應知軍曹瑋曰德明野心今不折其羽翼而長養之其飛必矣即日領騎士出石門薄天都山凡再宿悉徙其族帳以還都鈐轄秦翰疏論瑋功有詔嘉奨庚午河北安撫使何承矩等言昨准詔縁邊人户自修好後未復業者令安撫司招誘之臣慮北境猜忌以為招誘䧟敵之人事體非便輙増水旱逃移等語使彼不疑上覽之謂王欽若等曰可諭承矩自今宣敕如有未便非機宜急速當具事疾置待報欽若因曰朝廷比置安撫司固將招誘流民俾復農業而承矩等不能勤官思職兹又擅改詔文援漢汝南太守蟲皇柔及太常周仲居不收赤仄錢故事請罪承矩等上以承矩任邊有功特優假之六月辛未朔詔川峽民為盗配軍者再犯至徒及情理難恕並部送出界配諸州牢城壬申詔諸路部署司禁兵逃亡捉獲及首身所在州軍不得裁遣並送本司丙子䕫州路轉運使薛顔上新徙䕫州圖且言居民占射官地請令歳輸地課錢二萬三千貫又言城中創造官舍或侵民田詔地課錢特免一萬貫所侵民田具頃畝以聞當除租給直禁諸路轉運使副諸州長吏與部内官屬結親違者重寘其罪丁丑京東轉運使右正言直史館張知白上疏曰司天奏周伯星見此聖德動天而辰象昭瑞也臣聞皇王之道在乎戒謹休祥荐至則抑畏滋甚蓋懼亂者治必興焉思危者安必久焉昔之君天下者患不恤黎元之疾苦不知軍旅之勤勞奢侈無窮田逰無度聲樂不節政事不勤壅蔽不除諫諍不納凡此八患陛下悉皆無有固已超絶於百代矣誠能日新其德雖休勿休則瑞星不出臣亦賀鴻祚愈隆而青史増光茍異於是則瑞星雖出臣亦不敢同衆人之賀也自古以還仗富彊之基居隆盛之運怠於政事以啟危亂者不可勝數况今西北二隅雖罷征戰之役然而比夫古者屈膝稱臣欵塞内附則亦事異而禮殊矣得不慮哉上覽疏嘉納謂輔臣曰知白以諫官在外而乃心朝廷可謂知所職矣特詔奨諭之趙德明復遣左都押衙賀永正等來賀戊寅詔東西兩川商稅鹽酒課利所納二分金宜罷之其願納者聽先是計司請令半輸銀帛外其二分入金上聞其地或不産故有是命増開封府司錄及六曹官月俸己卯放河北修城軍士休息以暑甚故也令諸路轉運副使所至揀閱州兵老疾者籍其數以聞壬午除兩浙州軍稅鵝鴨年額錢癸未詔通犀金玉帯除官品合服及恩賜外餘人不得服用内諸司使已下出入内庭不得服皁衣違者論其罪戊子知制誥朱巽上言朝廷命令不可屢改自今有陳述利害更張法制者請先付有司議其可否如經久可行者行之不可者止之茍罔辨是非一切頒布恐失重謹之道上謂宰相曰此甚識治體卿等志之且事有可否執政者所宜盡言無有隱也詔三班院考較使臣以七年為限嘗有徒以上罪者自赦後理年考課庚寅以殿中丞王旭同判吏部南曹旭旦之弟也自旦為政旭避嫌不復釐事至是虞部員外郎王矩言旭前宰緱氏亷白有政績但以兄任宰弼遂使不用於時上謂旦曰旭之幹敏朕亦素知且屢有言其才堪任京府僚佐者旦以避嫌懇辭上曰前代兄弟並居要重者多矣朝廷用才不可以卿故使之淪滯旦曰必不得已且令主判南省閑司上復欲授三司判官又固讓上重違其意故有是命後數日旭引對選人上靣賜緋魚謂旦曰朕失照管不知卿弟猶衣緑也先是有詔知廣州凌䇿與縁海安撫使卲曄等同設方畧經度交趾事宜辛卯䇿等言黎桓諸子爭立各聚徒衆散施寨栅官屬離析人民猜懼頭首黄慶集黄秀巒等千餘人以不從驅率戮及親族來奔亷州乞量出軍馬平定交趾慶集等願為先鋒克日攻取臣等㑹議若朝廷允其所乞止發本道屯兵益以荆湖勁卒三二千人水陸齊進立可平定上曰黎桓繼修職貢亦嘗遣其子入覲海隅寜謐不失忠順今聞其死未能弔恤而遽伐其喪此豈王者所為力詔䇿等撫安之慶集等仍計口給衣食賜田署職務從優厚􅁮承詔遂貽書交趾諭以朝廷威德如有自相魚肉久無定位偏師問罪則黎氏無遺種矣明䕶懼即奉龍廷主軍事於是詔􅁮即以黎桓禮物改賜新帥􅁮上言懐柔外夷當示誠信不若竢龍廷貢奉别加封爵而寵錫之上嘉納焉朝廷每克諸國必蠲省苛賦之甚者厥後屢條其弊而減去之自餘有司或因其利而不易先是京畿每歳受納民户稅帛皆别置場命官與司録參軍同掌其事事畢有羨餘悉與京府官均分亦有縁此多取於民者上嘗尹京府知其事壬辰詔自今悉以公錢給之舊制樞宻院吏皆以年勞叙遷未嘗校其才藝有至主事而懵其職守者是日内出公事三條令主事以下詳决之命樞宻副都承㫖張質與禮房副承㫖尹德潤宿御書院考第翌日上親閱視是日由主事遷諸房副承㫖者四人補東頭供奉官者八人補左班殿直者三人書令史為守闕主事者三十一人遷令史者十一人餘増衣賜補三班奉職有差所試不中程由主事授内殿崇班者一人令史補西頭供奉官者一人仍日給見錢與住程差使人賜馬一匹以質為左屯衛大將軍加俸依前充職德潤為左領軍衛將軍諸房副承㫖尹德潤未見是歳殿前侍衛司奏孔目官以下闕人乞行遷補上亦令樞宻院試以公事擢其可者用之甲午汴水暴漲命宣政使李神福東上閤門使曹利用與馬軍副都指揮使曹璨歩軍副都指揮使王隱廵䕶隄岸中夜河溢于城西毁外隄壞廬舍即時完塞乙未遲明車駕臨視勞勉役卒賜緡錢是日應天府又言河决南隄流亳州合浪宕河東入于淮即遣使馳詣河隂督都監錢昭晟等塞汴口仍劾昭晟等罪貶其秩又命内園使李神祐乘𫝊經度工料悉令縣官供給無得擾民丙申復遣中使詣應天府開倉具舟援救流徙給以糧餉收瘞溺者俟河復故道乃還上居明德太后喪外雖從易月之制而宫中縞素三年自非凱還郊廟不舉樂羣臣屢以為請戊戌始許之趙德明屢修貢即戒邊臣各守地分是月有伊實潘保薛等四族來投鎮戎軍秦翰出兵援之德明訴其事于朝願舉刑章翰言四族本皆熟户兹還舊居非新有所招納也乃詔翰與張崇貴移牒報德明自今勿復侵擾境外上封者言盜賊多縁私憾妄引無辜官司因而追擾又重禁者拲其手令小兒哺食多受饑渴不問所犯小大同繫一牢上憫之秋七月辛丑朔詔諸路州府應鞫盗賊無令妄引徒伴以時飲食有疾者醫療之仍分輕重繫别房知益州張詠歳滿朝議欲以兵部員外郎直史館任中正代之中正前知梓州又新自契丹使還上恐其憚於逺適令中書召問中正曰益部重地國家委使敢不竭誠以報上嘉其自効壬寅擢拜樞宻直學士工部郎中知益州酒務舊委牙校而三司許州豪増課奪之中正為論於朝詔復委牙校如故仍特遣使諭㫖在郡凡五歳遵詠條敎人用便之宰相王旦初擬中正代詠議者多云不可上亦以詰旦旦曰非中正不能守詠規矩他人徃徃妄有變更矣上是其言久之衆乃服旦能用人也此據范鎮東齋記詔發鄜州就糧兵歸本營其自京遣戍鄜延路者徙屯鄜州及鄰近有芻糧處趙德明既輸欵西邊稍安故也癸卯上謂宰臣京府浩穰吏民狡猾當官者倍須防閑朕尹京日有醉犯夜者問之乃豪家傭力之人朕以所犯蓋豪民常態非傭力者所為雖已引伏潛遣人察之移司别鞫犯者果其主也又承前當直司止分左右廂未嘗更代朕始令每季一替蓋不欲其久於事而生姦耳河東轉運使宋摶等薦代州承受使臣王白上曰朝廷置此職欲令視軍政察邊事况頻入奏報固已詳其行止無假論薦因詔諸路無得奏舉承受使臣初撫水蠻諸酋長一歳中凡五詣闕輸器甲誓不犯邊既而侵軼如故於是䝉填詣冝州自言乞入覲謝前過冝州以聞丁未詔守臣諭䝉填如盡還所掠民貲畜乃從其請交州既定黎龍廷自稱靜海節度使開明王移牒廣南欲遣其弟詣闕進奉卲曄等惡其稱號不敢報具以聞上曰窮荒異俗不曉事體安足怪也即詔􅁮等諭意令削去偽官乃得入貢趙德明又遣使貢馬百五十匹謝前答賜之物賜襲衣金帯及器幣等答焉乃詔張崇貴諭其使自今答賜勿復謝恩己酉遣使祭汴口庚戌詔渭州鎮戎軍向以收獲蕃牛犒設自今用羊豕易之蕃牛悉送内地給農民上謂王欽若曰河北就糧馬軍累有將帥言其捍邊素著勞績但軍校有闕即自軍中轉補此殊未便乃詔自今副兵馬使至副指揮使聽本軍補授指揮使已上則自京選差上又謂王欽若曰馬歩諸軍累經簡閱闕額漸多今雖承平武備亦不可廢或請選近甸丁壮朕念取農民以實軍伍蓋非良䇿惟軍伍之家悉有子弟多願繼世從軍但慮父兄各𨽻一軍則須分别以此不敢應募今可曉諭許𨽻本軍欽若曰此軰常從父兄征行兵甲位伍熟於聞見又免廢農畝而奪耕民真長久之畫也辛亥命審官院選京官一員知西京留守判官事俾代通判廵行属縣從知留守司事邊肅之請也忠武節度使髙瓊卧疾上欲臨幸其第知樞宻院王欽若恨瓊附㓂準且沮澶淵之功因言瓊雖久掌禁兵備宿衛然未嘗有破敵之功凡車駕臨問所以寵待勲臣施之於瓊恐無以示甄别乃止及卒有司言當輟一日朝上以瓊未嘗有過特廢朝二日因謂左右曰軍壘之政尤當輯睦公共髙瓊典禁軍未嘗與副將言及軍事瓊雖識理道亦多任情嘗有軍卒𨽻本廂都指揮使者次當他役本廂留而不遣不當次者不服俱見瓊瓊問之叱曰當日即須應雖無决罰軍衆是之後數日忽召本廂主吏傳㫖杖之以其狥本廂都校之意又嘗因他事途出軍營營小校不時出候即行捶撻如王超典軍時亦有小校不及候營外者左右請罪之超曰若閱習廵按不以時至者罪之可也今休沐私行豈得加罪於人若此最為中理王欽若恨瓊附冦準此據王珪所作瓊神道碑然珪亦云欽若勸上南廵準叱之則已嘗辨其不然今畧加刪潤庶不相牴牾瓊本傳云宰相止上問疾按欽若此時未為宰相傳誤矣或當時史官隂為欽若諱也壬子賜廣南聖惠方嵗給錢五萬市藥療病者丁巳福州言長樂縣民王粲莫征擒獲强盜十二人舊制當補鎮將上以逺俗非可樂按此句疑有脫字並賜爵公士人賚錢二萬給復三年樞宻院言諸路部送罪人赴闕者軍頭司引對頗為煩碎望止令本司依例降配上曰朕慮其間或有寃濫及情理可矜者宜令銀臺司自今取審狀送樞宻院進擬付司施行其渉屈抑者即令引見上既用李溥林特劉承珪等所為折中新法猶恐未盡其要命樞宻直學士李濬劉綜知雜御史王濟與三司同取舊法較其利害時新法方行商人頗惑不敢以時貿易然㩁務所納金帛其數已多於前嵗矣庚申特承珪請罷比較仍乞不議酬賞從之辛酉參知政事馮拯言孟秋攝事薦享太廟有司供帳未盡恭潔守奉人宿于殿上頗致喧瀆詔别製廟庭帟幕什物付宗正寺掌之其守宿人止於廊廡不得升殿諜言趙德明集諸族兵馬欲畧麟府内屬戎人向敏中奏其事上以涇原地最要害屯兵且衆舊止有鈐轄都監二員壬戌増置駐泊鈐轄一員命六宅使封州刺史李重誨為之敏中又與鄜延路部署石普皆言蕃落將稱德明為信約未定㸃集蕃部科率器械敏中請選帥臣鎮邊郡普求入奏機事詔李重誨曹瑋秦翰同商度便宜以防侵軼應軍須儲峙委轉運使一員徃彼供億又令翰諭意西凉府斯多特戒諸蕃部嚴斥候以備之縁海安撫使邵曄上邕州至交州水陸路及控制宜州山川等圖上以示輔臣曰交州瘴癘宜州險絶祖宗開疆廣大當謹守而已不必勞費兵力貪無用之土也如封略之内有叛亂者則須為民除害爾實録本紀並稱廣南轉運使卲􅁮稽古録獨稱縁海安撫使按􅁮本𫝊亦不云改除轉運也今從稽古録令有司鑄尚書内省出納印初宫禁市物每給緡錢用内侍省都知司印因循為弊改為御寳至是兵部員外郎黄世長上言出納細務不當用御寳乃更鑄焉黄世長未見乙丑詔河北轉運使副自今迭出廵行州軍先是邊臣患其數至或兩員俱到屢有陳奏上曰使者按部是其職也第令互徃焉丙寅大風上恐傷稼遣内臣視之言無損賜翰林侍講學士邢昺白金千兩又詔其妻樂氏對宫庭賜寶冠霞帔故事外命婦非諸親者惟中書樞宻院節度使始有是賜昺前侍講東宫至是年七十餘前一日得對便殿上與語久之且嘆當時僚屬淪没殆盡唯昺獨在故特示褒錫昺亦恃舊恩多所干祈嘗為亡妻求追封時人嗤之先是内侍趙守倫議自京東分廣濟河由定陶至徐州入清河以達江湖漕運役既成遣使覆視繪圖來上上以地有龍阜而水勢極淺雖置堰埭又歴吕梁灘磧之險非可漕運丁卯罷之三司請依制置司所定増江南食茶價不許罷天雄軍修城丁夫以鄰近州兵十指揮給役己巳以應制舉人所納文巻付中書詳較初命翰林學士晁逈等考定又命侍讀學士吕文仲吕祐之龍圖閣待制戚綸陳彭年重考上猶慮遺才故復委輔臣裁擇尋詔趙宗古陳髙陳絳令狐頌陳漸陳貫等就試中書浚儀尉初房未就試先卒詔特賜其家錢五萬宗古等試中書當有奏報而實録無之疑闕庚午以宰相王旦為明德皇后園陵使詔自今修繕河隄無得更减功料上聞林特劉承珪條制茶事過為嚴急謂宰相曰園户採擷須資人力所造入等則給價直不入等者既不許私賣亦皆納官若令一切精細豈不傷園户耶又傭力者多貧民儻斥去之安知不聚為冦盗此等事宜即裁損務令便濟詔諸州職田上得召客户佃蒔按宋史食貨志云詔諸州不堪牧馬閑田依職田例招主客户種蒔此處所載疑有脱誤如有災傷並準例蠲租㑹要七月事先是惟天地感生帝宗廟用樂親祀用宫懸有司攝事止用登歌自餘大祀未暇備樂上既罷兵埀意典禮八月辛未朔詔大祠十四祭並用樂知樞宻院事王欽若言壽星之祀肇自開元伏以陛下光闡鴻猷並秩羣祀而蕭薌之祭獨畧此祠搢紳之談皆謂闕典加以周伯星出實居角宿之間天既埀休禮罔不答伏望特詔禮官俾崇祀事乃詔有司詳定遂請以秋分日享壽星及角亢七宿為壇南郊其禮例悉準靈星奏可癸酉河北轉運使言德博州有蝗不為災种放既歸終南教授山中表求太宗御書及經史音疏悉與之因謂輔臣曰近中使還言放居草屋食野菜喬麫而已如此淡薄亦人所難也契丹移文北平寨捕為盗者寨遣人與俱往或言其不便甲戌詔邉臣自今當自禽逐畀付勿使外境人同詣鄉村上御崇政殿張宫懸閱試李宗諤等新習雅樂召宰相親王臨觀宗諤執樂譜立侍先以鐘磬按律準次令登歌鐘磬塤箎琴阮笙簫各二色合奏箏瑟筑三色合奏迭為一曲復擊鐘鎛為六變九變又為朝㑹上壽之樂及文武二舞鼓吹導引警夜六周之曲舊制巢笙每變宫之際必換義管然難於遽易樂工單仲辛改為一定之制不復旋易與諸宫調皆協上甚悅賜宗諤等器幣有差自是樂府制度頓有倫理矣上以兩署見用樂詞非雅乃命兩制别為之乙亥代州言先奉詔契丹界有公人徃來止令當州出入緣契丹西路距此稍逺承前文牒許至寧化軍望如舊例從之丙子原渭州鎮戎軍上新開方田圖且言戎人内屬者皆依之得以安居上出示輔臣曰曹瑋等能幹其職甚可嘉也丁丑上謂王旦等曰凡裁處機務要當知其本末朕每與羣臣議事但務從長雖言不盡理亦優容之所冀盡其情也若惟以果决行事豈足為難昔周世宗固是英主然用刑峻急誅殺過當卒之享祚不永豈不由於此乎戊寅詔川峽戍兵二年已上者悉代之與元年三月詔蓋不殊當考詔緣邉州軍自今彊竊盗入北界如􅂍屬北界但追見存者已費用者勿追工部侍郎董儼性貪躁急於進用先是工部員外郎黄觀罷益州路轉運使歸闕儼問觀張詠疾狀觀曰稍損又問詠求替否觀曰益州人傳董侍郎或丁諌議來不聞詠求替也儼從子為知雜御史王濟女壻儼因託濟言於觀求薦已知益州俄而觀復除陜西轉運使得對便殿儼謂必薦己他日見上遽陳性本孤直不為權要所容且言黄觀知識庸淺雅無特操恐執政者妄使薦臣俾臣逺適惟陛下察之辭甚懇切殊不知觀未嘗言也上不之詰數日濟入對長春殿言儼乃姻家預請不與儼同事因述儼嘗有私託且言儼性矯詐臣語觀不可許之上不欲暴揚其事但出儼知青州是年六月戊戌儼既辭復請對自陳忽授外任慮為權要所譖上但慰遣之儼久不去上乃謂曰爾自告黄觀求知益州復有何人排斥儼即矍然涕泗交下曰觀與濟嘗議益州須得臣徃彈壓上怪其辭不類因令條析以聞即遣使問觀具述儼託濟求薦及濟戒觀勿許等語且言儼素待臣非厚臣亦知儼猥濫寧當許其彈壓藩鎮初淳化中儼為度支使觀為判官儼知觀不能飲酒一日聚食親酌以勸觀觀為彊飲之有頃都監趙贊召觀議事觀即往贊熟視曰飲酒耶觀以實對翌日儼與贊宻奏觀嗜酒廢職故觀因是及之乃詔樞宻直學士劉綜與御史雜治儼引伏庚辰責授山南東道行軍司馬不署州事儼俊辨有材幹然不學無操行所至厚納貨賂嘗令引贊吏改製朱衣每夕納儼第而潛易以輕帛所製命胥吏市物及請其直則呵責之廣畜姬媵頗事豪侈用傾狡圖位卒坐是敗士大夫醜之辛巳風琶蠻王曩莎又遣使烏怕等來貢且言咸平初已霑朝命願改官秩於是以曩莎為歸徳將軍烏怕等四十六人第遷郎將司階司戈癸未詔以來年春朝謁諸陵初司天言嵗在酉戌乃可行上曰朕遵用典禮意已决矣王旦曰春候和暖亦可順動惟行宫損壊要須修葺上曰如此亦勞民矣乃詔所至州縣但増飾館驛不得更建行宫侍從臣僚并百司供擬及供御之物並令减省禁縁邊河南州軍民於界河捕魚時契丹民有漁於界河者契丹即按其罪移牒安撫司因命條約乙酉諸王府侍講孫奭轉對言牧民之官不可用有勢援者又請减修寺度僧上曰朝廷用人但問才不才耳設有才可用豈得限以世家如其敗事曠職自有常典至於道釋二門有助世教人或偏見徃徃毁訾假使僧道士時有不檢安可廢其教耶奭又言周禮卿大夫之喪太史賜諡讀誄皆於𦵏前祖奠之日𦵏後定諡實自有唐衰亂之政近者宰臣畢士安樞宻使王繼英亦皆𦵏後議諡非典故也請如周禮詔可丁亥出禁衛歩騎兵分屯近京河陽澶州各三千人曹滑徐許陜州白波各二千人陳汝懐虢州各千人仍選使臣充監押命御前忠佐同管轄詔扈從百司所須之物並從水運至西京勿借民車乘上封者言契丹國主取十月於幽州受册宜因輦運邊儲以兵數千聲言援送且為守塞之備上曰若此則自生事不許詔涇原路縁邊長吏自今奏補蕃族官秩者並與部署司商度同署以聞戊子提舉修造司請以錢俶故第為司天監上曰此太宗所賜無得輕議不許向敏中等與趙徳明議朝廷所降要約事德明累遣人告敏中等云遣親弟宿衛上世未有此例其他則願遵承仍欲以良馬槖駞千計入貢辭意懇切己丑敏中等具其事以聞且言要約未備故不敢請行封爵上曰逺方之俗本貴覊縻耳乃詔諭敏中等如德明再遣人至果不欲令親弟宿衛則所乞回圖徃來及放行青鹽之禁朝廷並不許然不阻其歸順之志也陳堯叟言青鹽如置㩁場官亦不可買之蓋平夏青鹽甚多若官買必須官賣既亂禁法且解州兩池鹽不復行矣上曰德明如遣子弟宿衛則許放行青鹽豈是不亂禁法也今㩁場既不為買當先以文告諭之若異時德明復有懇請則當令搉場量定分數收市按五月十九日詔以要約三事付敏中令與德明議至此月十九日敏中始復奏首尾凡九十日蓋議此事必再三徃返故非一時可决耳㑹要載敏中此奏於七月十三日與實録不同然其事則不異恐㑹要誤也徳明後此四旬始進誓表實九月二十八日而㑹要以為七月二十七日若七月二十七日既進誓表何故歴九月至十月一日始行封爵乎㑹要必誤今並從實錄庚寅詔河北河東陜西所屯禁軍令部署鈐轄都監等常加訓習上聞河東効順第一軍屢經逺戍頗歴勞苦欲升奨之乃抽赴京簡閱以補虎翼名闕壬辰府州折惟昌言有堂叔陷契丹其二子素不檢束令轉運司送赴闕乞量加録用上曰彼生於邊郡一旦離去鄉井寜免失所可嚴加誡約復優賜遣還乙未令河北縁邊不得焚牧馬草地丁酉上謂王欽若等曰累有人言西路縁邊州軍有能梟取為惡蕃族首級者賞給素有條約然恐因此害及平人朕思之逐處雖有次第部署之人豈得容此枉濫然言者既多亦宜過為防檢乃詔自今斬獲蕃族首級須辨問的實當行殺戮者許依前詔給賞如其非理即以軍法論戊戌詔殿前侍衛馬歩軍司典級自今毋得求授外職為其主掌禁軍簿籍或致漏落非便也是月詔開封府今後内降及中書樞宻院送下公事罪至徒以上者並須聞奏先是御史臺言開封府前勘天清寺僧契如及故左丞吕餘慶孫男歸政止節略劄子聞奏致不絶詞訟乞自今應干分割田宅及僧人還俗事並令結案録問方得聞奏上曰豈止僧歸俗與私家分財邪因有是詔
