body:
  text: 續資治通鑑長編巻四百四十九宋李燾撰哲宗元祐五年冬十月癸巳導河水入汴玉牒有此實録無之詔罷都提舉修河司蘇轍又言臣近奏乞罷修河司并責降李偉尋凖九月二十六日聖㫖李偉權發遣北外監丞提舉東流又凖十月二日聖㫖罷都提舉修河司臣以為修河司雖罷而李偉不去與不行臣言無異謹按李偉屢以姦言動揺朝廷興起大役於去年八月中獨奏稱大河見今已為二股分行然須當於第四舖地分更行開廣河槽只得兵夫二萬於九月興功至十月寒凍時畢功因而引導河勢豈止二股通行而已亦将遂為囬奪大河之計凡偉所言大率狂妄不疑如此由此朝廷信以為實為之發兵調夫差官吏聚梢茭騷擾河北京東西三路吏民為之不聊生者半年朝廷中覺其妄遽罷其役是時中外公議皆望朝廷立行誅竄明其欺罔以謝天下而因循不决任偉如故既而給事中范祖禹封還制書乞罷偉差遣朝廷猶復隠忍於四月五日降聖㫖李偉差遣候過漲水取㫖今漲水已過中外又謂陛下必責降偉以信前命而反擢授監丞仍提舉東流曽未數日復罷修河司葢朝廷之所以罷修河司者謂囘河不可復行故也囘河既不可復行則偉罔上誤國之罪審矣今乃以初任知縣權發遣都水監丞則是有罪之人更得違法進擢此公議所以不服也且修河司雖罷而李偉不去姦言時至河事變更不定河朔生靈無時得安此又公議之所以深憂也且朝廷號令貴於必信四月五日聖㫖指揮者在有司今棄而不用使天下皆得竊議以謂朝廷虛設此言姑使給事中奉行制命及制命已行則棄為虛語曽不顧䘏大臣何惜一偉而輕犯此謗哉臣不勝區區伏乞檢㑹前奏速賜流竄偉若不黜公議終不止也貼黄去年八月偉始奏乞囘河朝廷用其言差官吏兵夫収買梢茭開掘河槽築馬頭鋸牙功役至大於今觀之皆是虛費臣乞差不干礙官局一一磨算費用之實若只據此偉之流竄自有餘責而况欺君誤國臣子之大惡耶去年八月二十八日侍御史孫升言臣竊以爵賞所以録有功刑罰所以誅有罪無功而受賞則臣下不知勸有罪而不罰則姦惡無以懲此為國之大患也謹按宣徳郎李偉狂妄懐邪欺罔誤國既獨奏二股囘河之議有乘時建立大事之言内挾文彦博之勢權外假呉安持之㳺說大臣為之揺動朝廷如是聼從力役既興公私被害既不能通行二股况可以全復大河方李偉姦言既行内外士大夫莫不以言囬河為諱有識之士為之嘆息自非二聖獨斷照見欺罔權罷修河則其患害何可勝言也近日都大修河司既罷十月二日則李偉欺罔之罪益明今來朝廷不獨不行李偉之罰而又授李偉以外監丞之命如此則是無功受賞有罪不罰臣竊恐非二聖明賞罰勵臣工之意也伏望聖慈詳察李偉欺罔之罪早賜罷黜以厭服中外之心貼黄李偉為知己有四月五日指揮李偉差遣候過漲水取㫖惟恐一旦放罷是以日夜經營造作故道減水之功誑惑朝廷也升又言臣近奏論李偉輕儇小人前後欺罔乞行放罷専付北外監丞司管勾故道竊聞李偉遂就除九月二十六日權北外監丞提舉東流孫逈提舉北流如此則河事興役不息河北生靈困弊無有休息矣臣深為朝廷惜之今東流故道止是欲分減夏秋漲水果若故道可以通行則一北外監丞孫逈管勾足矣不知何以須待李偉乃能照管也臣竊聞姦臣誑惑朝廷以今嵗漲水北流無患者以東流分減之功也殊不知自來専以囬河為議其北流隄防全不修築昨自去秋後來朝廷稍知大河決不可囬遂専令鄭佑照管北流故隄防稍稍完葺所以今秋漲水不為北流之患朝廷若将東流枉費物料工力一併修治北流向著地分處隄防髙闊堅實則無深冀之患矣今年漲水東則北京危急㡬不可保南則魚池墊塌人皆寒心者良由閉斷三河置截河堤馬頭與止水鋸牙壅過漲水北流不決又擗刺大河一向直注東岸此北京魚池所以㡬決也呉安持李偉止以分減漲水有功以誑惑朝廷而不論北京魚池之危㡬至不保而所費物料工夫倍於修固北流隄防之費也伏望二聖照察愚臣之言放罷李偉専責北外監丞官司庶㡬河事漸有休息之期以絶北河生靈困弊無窮之患貼黄近都水使者與本路監司相度囬奏云臣等今奉朝命只是相度逐官所陳恐大河生淤有妨分流合如上項事理所是将來河勢次第更有合措置事自當從有司施行臣雖至愚竊詳所奏若本路監司見得李偉措置有十全無患之計則不當於奏状内聲說河勢次第更有合措置事自當從有司施行也且知利害莫如本路監司猶不保明李偉措置而朝廷乃篤信李偉如此深可惜也伏望二聖照察魚池危急之際南嚮京城行道之人為之寒心而北京横堤之外𣺌如江海若當時風不止雨不息則必至疎虞北都有力之家多已遷移而獨以倉庫兵防委之試險今論者猶以李偉分減北流漲水之功上惑豈不過哉伏願二聖照察李偉輕儇小人貪冒無恥往年呉居厚誅剥京東百姓偉與有力焉今在廷豈無諳知河事老成練習之人如李偉而必須用一狂妄後生者葢李偉凴權勢衆皆為地今若不罷李偉則河事興作不息河北生靈困弊無有休已伏望二聖以河北生靈為念出自聖意放罷李偉呉安持呉安持與本路監司按視事在八月十二日升又言李偉去年八月奏陳大河要切利害云今來大河已是分流即更不消開淘因昨來一決之後東流自是順快渲刷漸成港道見今已為兩股約奪大河三分已來今只得夫二萬於九月便興工至十月寒凍時已自畢因而引導河勢豈止為二股通行而已将遂為囬奪大河之計今來既因擗刺東流修葺鋸牙當迤次増進一埽取一埽之利比至來年春夏之交遂可全復故道乞復置修河司司存既正凡百悉有條理可以乗時建立大事朝廷遂以為信並依所奏施行後來耗費國家財用民力不可勝計逺近騷然河北生靈為之困弊其二股通行已即淤澱故道全復顯為欺罔上頼二聖察見狂妄遂罷修河司然建議之人一切不問李偉猶以照管故道為名依舊存留在任縁李偉係合入知縣之人既飾姦言以欺罔朝廷冐竊任使請給之類並依外監丞偉既僥倖如此惟恐一旦罷任日夜營求興作河事不顧朝廷利害不恤國家費用不愛生靈性命専為身謀臣伏聞近日李偉又奏請大河若不於口地稍加措置慮致斷絶即東流遂成淤澱朝廷遂令都水使者呉安持前去與本路監司相度呉安持等相度囬奏仍云縱未保入冬常流次第亦未至大叚淤澱豈有任事之臣相度利害奏上之言全無一定且既未保入冬常流則淤澱必矣豈當云未至大段此乃呉安持李偉二姦臣為來春復興二渠之役張本也臣愚深為朝廷痛惜之且故道河埽自有北外監丞管勾李偉若不多端擘畫興工動衆則何能乆於其任故偉日夜營求作河事以誑惑朝廷臣愚以謂若不放罷李偉則河北生靈困弊無有休息之期仰惟二聖聖明無逺不察無幽不燭而北京去天庭咫尺二聖必能察囬河二股不可為李偉去年八月所奏大河利害通行二股全復故道曽經聖覧從後無一可信照驗甚明二聖必能燭李偉之欺罔伏望聖慈以河北生靈為念出自聖斷放罷李偉其照管故道自付外監丞司管勾以絶河北生靈困弊無窮之患貼黄李偉去年八月奏陳通行二股奪大河三分春夏之交全復故道皆是欺罔然依舊存留在任則萬一來春果又興二渠之役困弊公私彼将何顧惜也願二聖深察臣言早賜放罷又李偉輕儇小人貪冐無恥徃年呉居厚誅剥京東百姓偉與有力焉今在廷豈無諳知河事老成練習之人如李偉而必須用一狂妄後生者葢李偉凴恃權勢衆皆為地今若不罷李偉則河事必興工作不息河北生靈困弊無有休已伏望二聖以河北生靈為念出自聖意放罷李偉又昨來囬河之役村揚郡樊河門至今閉斷並置立暑字坊截河堤并止水鋸牙馬頭依舊存留近又於内黄第一埽第二舖荒字號坊内修槐花村小堰一道大河水勢一向直注北京東岸日近漲水流溢北京簽堤危急㡬至衝決上頼二聖徳感天地風止雨息不然北京豈可復保此非大河為北京之患乃李偉造成北京之患也北京獲存者出於天幸爾宻疏有此今仍之五年九月二十三日按十月二日始罷修河司不應數日前臺臣已言宻疏月日必誤或是十月二十三日今且移入十月二日後升又言臣累具奏論李偉囬河欺罔乞行罷黜終未䝉朝廷施行惓惓愚忠不能自已臣向縁奏對親聞徳音謂河不可囬則囬河利害二聖固已詳知不待臣言而後知也去年李偉奏聞聖聼謂大河已奪三分顯有全囬之勢可以乗時建立大事及霜降水落則故道生塵然大臣猶主張李偉而未罷今春復興減水之役名為減水實作囬河其止水鋸牙馬頭截河堤皆囬河之具也夏秋水漲之時呉安持倡言於朝謂大河已過乗勢可囬大臣並以為信今日水既伏槽孫村口地又復生淤矣李偉呉安持二年欺罔無効二聖固已盡見不待臣言而後見也臣伏念陛下明知河不可囬而主議者不以為然陛下明見李偉等欺罔而主議者不以為罪如此則是大臣有所主雖人主且不可易矣此愚臣所以不避冒凟至於再三也伏望聖慈奮獨斷之威正欺罔之罪罷黜李偉以厭服中外之心又言臣等累曽奏論宣徳郎李偉囬河欺罔乞行罷黜近日雖有指揮罷李偉北外監丞然依舊存留在任提舉東流及移那兩處工夫物料如此則名為罷外監丞其實事權依舊與不罷何異臣等伏以二聖深知囬河之為害而東流故道决不可復徒使一方生靈困弊騷擾昨來所以放夫罷役罷都大修河司皆出聖斷而李偉狂妄欺罔中外共知何獨留連而不去李偉小臣不繫輕重豈足以煩朝廷論議而臣等所以至於再三不已者非止為李偉有罪而不誅亦非為李偉冒竊禄仕而不去葢李偉首建囬河之議大臣為之揺動方偉之姦言得行内外士大夫莫不以言囬河為諱及河北轉運使謝卿材河北都轉運使范子竒皆縁與李偉異議而罷自兹以後雖有深知河事之人皆箝口結舌無復敢言故河北之人以李偉去留視河事之動息觀朝廷之向背若李偉且留河上則必妄生計畫興造河事以實前說待其大敗患惡顯然而後去固已晩矣伏望二聖以河北生靈為念罷去李偉别擇經歴老成之人付以河事不獨使河北之人有休息之望人人自安庶㡬深知河事之人敢為盡言則中外幸甚罷偉外監丞當考日月政目十月十二日賈種民為北外丞或是代偉也更詳考之是日詔導河水入汴玉牒於五年十月癸巳書導河水入汴也書並無之故附見此須考詳四年冬末梁燾奏乞復置汴口依舊引大河一支啟閉以時或移彼入此曽布日録云云合考布以五年正月二十四日自太原移河陽其年十二月二日改青州乙未詔今次奏應舉制科日限且依舊制限十月終權知開封府王巖叟言每年贓銅錢内支錢一千緡充捕盗支用縁遞年所支多寡不一若有餘數乞依次年額外支使從之别試所言考校到宗室試藝業合格人左監門率府率士稷右千牛衛将軍士註令晙令璹右監門衛大将軍令剸右監門率府率叔閎右千牛衛将軍公緬詔士稷遷右千牛衛将軍士註令晙令璹令剸叔閎公緬並減五年磨勘政目云舊條並轉官奉㫖士稷轉官餘減五年磨勘鄜延路經畧司言宥州移牒稱先為定畫疆界有詔漢界留出草地十里蕃界依數對留欲於蕃界令存留五里為草地夏國於所存五里界内修立堡舗今擬到囬牒云朝廷務敦恩信特從所乞應見今分畫界至處許於蕃界内存留五里空為草地漢界草地亦依此對留五里為兩不耕地各不得於草地内修建堡舗從之丙申吏部請避親法注文添入或妻之大功以上姊妹之夫及其子一十四字從之丁酉定州言州有韓琦祠乞載於祀典從之詔應廵檢下土兵如願充禁軍者委監司每年分詣逐處與當職官揀年四十以下依逐指揮等様添塡新無右司貟外郎王古為祕閣校理太府少卿太府卿李杲卿為衛尉卿衛尉卿劉忱為太府卿太府少卿程博聞為司農少卿司農少卿亷正臣知滑州吕大防劉摯以杲卿老而怠於事素頼博聞古既非彊明又不勤敏而太府事劉忱雖老猶精審故易之此據劉摯日記増入知梓州周尹為直祕閣再任再任以政目増入戊戌秀州團練副使沈括為左朝散郎守光禄少卿分司南京任便居住禮部言降到空名假承務郎州助教敕齋郎補牒以千字為號印訖發下所屬官司仍具注給降事因去處候申到給訖因依即行銷注應敕牒並置籍拘管以事因注簿訖關送吏部即行銷簿應敕牒不得下司當職官畫時交㸃道數實封印押收掌出牓召人進納當職官躬親書塡給付具姓名鄉貫三代年甲字號及年月因依并見在道數申吏部應敕牒如客販賣者指定所詣州毎道給公據照牒以字為合同號印押其照牒實封入遞敕牒付客召合進納人承買經州投状依上法勘騐書塡給付其照牒公據批鑿毁抹訖限兩日具姓名鄉貫三代年甲敕補牒上字號報元承受處從之殿中侍御史岑象求言十月初七日臣近有状論列知青州資政殿學士王安禮疎縱不檢事迹上凟聖聰今續采訪得王安禮在任買絲勒機户織造花隔織等匹物妄作名目差役兵般擔偷謾一路商稅上京貨賣贏掠厚利不止一次近於九月内有百姓張牙人将青州生花白隔織三百二十匹於界南頭孫師顔鄭孝孫趙良祐三人舖内稱是城北姜殿直出賣臣體問得有青州書表司張僅見在城北蔡市橋姜殿直店内安泊是王安禮令張僅别作縁故押當匹帛前來託姜殿直貨賣收買囬貨兼買首飾綾裹售用家事其姜殿直舊在安禮門下出入安禮素來照管家富於財見開四所正店伏乞陛下特降聖㫖下開封勾追張僅及姜殿直細加劾問得見情實仍行根究妄作名目差人般運數目及謾昧沿程商稅侵擾機户等逐件事盡法施行以懲大吏貪饕恣意不法之罪元祐五年十月初七日右正言劉唐老又言伏聞知青州王安禮在任汚穢不法人有仇之者作賦以紀其事詭用名氏在京雕印因兹流行衆議甚洶以安禮之事迹自當窮治斥責然而造作語言中傷之事此風亦非可長若利害交惡之際茍欲償怨競為匿書如是則遞相傾危臣恐人情之間将有不安者矣風俗所繫於此至重今日之漸寜可啟之臣今欲将王安禮事状從臣僚上言盡理根治外其作賦雕印之人下開封府立賞告捉施行己亥資政殿學士知蔡州王存與知青州王安禮易任存改揚州在二十一日龍圖閣待制知越州錢勰知瀛州寳文閣待制知瀛州張頡知荆南御史中丞蘇轍言臣伏見朝廷以置渠陽軍為不便議欲棄之者乆矣然自去年以來欲棄而不得羣蠻猖蹶南邊至今為梗者何也任非其人而棄之無術故也唐義問文俗吏耳無他才畧昔被朝廷命直入羣蠻之中欲棄此城既為蠻衆所圍用胡田之計欺詐羣蠻茍脫性命既歸不敢以其實聞凡有㓂盗皆指揮不得申報朝廷不察其實而任之不替則既一失之矣及今夏以來蠻㓂大作以至覆軍殺将臣屢以為言而朝廷屬任義問之意不衰訪聞大臣但以臨敵不可易将為詞終欲庇義問不恤邊人肝腦塗地之苦及今已将半年則既再失之矣今者朝廷除張頡知荆南頡自瀛徙荆誠不為超遷然近降朝㫖令單馬赴任外人始知朝廷欲以頡代義問葢義問之所以敗者闇而自用狠而失衆今頡猜險闇愎又甚於義問而朝廷復加任則又三失之矣臣竊悲湖北之人外遭羣蠻騷擾不安其居内䝉用三失未知息肩之所是以不避煩凟冒進瞽言昔元祐二年朝廷除頡户部侍郎臣時為諫官前後具頡八事乞行罷免時雖不從然用頡未逾年知其不可卒出之外任及今未㡬而遂付以邊事邊事重大又與户部不同葢臨敵統衆兵民性命所係不可不謹竊聞大臣謂頡本貫鼎州意其習蠻事是以遣之然不知人才各有短長未必生於其鄉必善其事臣但恐頡任情恣行出於天性老而不改必致敗事頡昔為桂州經畧使始因靳吝小費終以措置乖方事具臣昔言頡八事遂致宜州夷人背叛賊殺本州兵官頡尋遣費萬全王竒二将繼往攻討率皆陷沒先帝震怒差官取勘遂落職奪官降知均州又元豐三年除頡知熈州是時臣僚言頡天資􅄶躁動多猜忌頡在廣南忿爭互論州郡官吏為之不安乞賜追寢新命尋奉聖㫖令依舊知滄州然則頡之不可付以邊事著自先朝非獨今日臣言之矣所有臣昔具頡八事皆非虛言並有按據謹别具録奏聞乞令大臣㸔詳罷頡新命或但無令豫聞邊事别擇諳練用兵之人責之成効貼黄張頡資任已深除知荆南不為過當臣今所言但以頡為性猜險所至不得衆情不可令管邊事耳從違當考昭宣州和州刺史内侍右班副都知趙世長為宣政使左侍禁閤門祗候東南第九将雷瑜特遣閤門祗候勒停坐託疾不赴邵州䇿應也太常博士王念言近詣唐州淮瀆長源王廟祭告伏見本廟祭器形儀不中制式仍有闕數及三獻官無冠冕祭服止用常服乞諸嶽瀆見行儀制詔有司議造祭器名數及三獻奉禮太祝冠冕祭服付本廟以備祭享從之癸邜龍圖閣待制知廣州蔡卞知越州知荆南朝奉大夫路昌衡直祕閣知廣州中書舍人韓川言昌衡鄙惡若以直閣領帥二三年間例為侍從繳詞不草乃詔罷館職特轉一官知廣州罷職轉官在十月日今并書提舉出賣解鹽孫逈知濮州五月八日梁燾云云六年四月六日當考三省言舊置編修院専掌國史實録修纂日厯元豐四年廢罷本院入史館奉行官制𨽻屬祕書省國史案縁史事最為機宻付之祕書省未便詔移國史案就見今置局處専掌國史實録編修日厯以國史院為名𨽻門下省更不𨽻祕書省見權著作官除改抹樂詞等及供檢非機宻故事迎候車駕并輪宿依舊外只於本院供職詔近除權付郎並依諫議大夫及待制例户部員外郎穆衍為右司員外郎八月二日衍以户外使熈河及今兩月餘遷右司度此時衍猶未還也十二月二十七日又遷郎中屯田郎中陳安期知濟州安期乞補外故有是命樞宻院言禁軍弓弩箭手事藝出等如年四十以上㪷力減退或年未及而偶因傷閃手足並給限半年教習不及元等者委本營將校保明當職官驗實聽量减㪷力仍不得減過本軍上等從之新無甲辰御史中丞蘇轍言臣伏見管軍臣僚見闕三人頃者竊聞大臣議除張利一張守約陛下以為二人者皆資任淺下用之則為躐等又利一張耆之子而誠一之兄故不可用特出聖意欲用王文郁姚兕大臣既退輙寢文郁兕而進擬利一守約右丞許將既隨衆簽書而復奏論其不便因此進擬文字為聖㫖所却經今一月有餘廢不復議臣竊以祖宗故事凡用管軍皆以資任前後相壓未嘗輕有移易自非戰守功效尤異豈可超授今利一守約資淺才下别無出衆勞效而利一家世又如聖㫖所諭大臣力行已意必欲進擬其為不便不言可見許將既知其失自合與衆人公議止其進擬今乃外行簽書内行論奏反復之狀殊非大臣之體由此互相疑沮遂使差除之政廢不時舉以臣愚見實恐専擅之跡與窺伺之風交行於上浸滛不止皆非朝廷之福也况自祖宗以來以管軍八人總領中外師旅内以彈壓貔虎外以威服邊荒職任至重豈以大臣商量未得如意闕而不補臣欲乞指揮以朝廷故事參近日聖㫖茍非邊功尤著衆所推伏罪惡顯白世所共棄且當循資守格速加除授以允公議貼黄稱訪聞利一任定州總管日曽入教場廵按以不得軍情諸軍並不唱喏因此移眞定總管據此事狀實難以令管軍其後率用守約及文郁而利一與兕不與焉王文郁以熈河蘭岷副總管除沂州團練使捧日天武四廂都指揮使仍升副都總管張守約以知涇州為昌州刺史龍神衛四廂都指揮使充鄜延副都總管乃十二月二十四日甲寅事今附此元祐五年十一月二日利一以雄州團練使知滄州尋改大名路總管知澶州五年十一月十日兕以通州團練使為環慶總管六年正月十二日十四日乙巳改涇原利一紹聖元年二月二日又除軍職尋罷之乙巳昭宣使康州防禦使入内副都知梁從吉卒贈感徳軍節度使諡敏恪丙午朝獻景靈宫檢例㸔恐不合書丁未吏部言宗室本宗袒免以下親於職事有統攝更不迴避餘親依外官法從之詔荆湖北路見在軍前及渠陽貫保兩寨守禦廂禁軍暴露日乆賜錢有差詔應干邊機文字並不許御史取摘此必有故當考三省言通逺軍申乞添置倚郭一縣以隴西為名差選人充尉兼令簿從之侍御史孫升言臣檢准元祐四年八月二十八日敕據兩浙轉運副使葉温叟言申請有䕃之人犯酒至三犯特許眞决無䕃之人依法斷罪外隨所犯輕重勒令遷徙别州縣居住滿一年不再犯申所屬施行臣訪聞兩浙西路州縣見今縁此指揮逢迎葉温叟意應犯私酒不分輕重盡令移郷至有讐嫌之人多端架搆以斗升之酒誣陥良民遷徙失業道路嗟怨臣伏見朝廷向懲盧秉所立監法移鄉之弊已行廢罷今復從温叟之請使一路之人遷徙失業恐傷二聖忠厚之政况犯私酒於前後敕自分輕重有徒杖配流之法法外滋張徒生姦弊伏望聖慈特降指揮所有元祐四年八月二十八日兩浙路所犯私酒移鄉指揮更不施行庶使一路生民各獲安堵元祐五年十月十六日奏從違當考巳酉知大宗正丞事徐君平荆湖南路轉運判官虞策並除為監察御史以御史中丞蘇轍翰林學士承㫖鄧温伯薦也范祖禹手記徐君平乆從荆公學當國時不隨子由稱其文學似龔原又虞䇿元祐五年十月與兩省同舉御史自荆湖運判除監察徽録大觀元年三月有䇿傳餘杭人轍又言新除順安軍王世安前任都大提舉河埽日差河清兵士掘井灌園雖罷知軍仍擢為京西南路都監乞追囬新命下所屬按治詔世安罷京西南路都監其違法事令都水監依條施行若不該責降却與樞宻院差遣庚戍尚書省言桂州奏官員差役人充白直不足乞依舊例差舖兵士從之殿中侍御史岑象求言臣今月七日具狀言知青州王安禮在任踰濫不法乞行根治尋䝉朝廷改差知蔡州更不推鞫其罪臣竊以為朝廷行之有所未當也何則君之取臣進退黜陟必須掲其賢否功過明示於朝此所謂與衆共之不自私於一人也今大臣有罪於法當付有司按劾而朝廷止降守次等藩郡又不禠其職名不惟在朝廷之士未之信服仍使被彈之人以為曖昧不平歸過言者足以藏庇姦跡文飾穢行也臣竊見嚮者蒲宗孟在鄆州止因禁戢賊盗用刑太峻朝廷奪其職授以郡守宗孟戢盗峻刑比安禮踰濫不法公私之際所犯不倫而原情降罰輕重如此朝士未之信服豈足怪哉伏乞聖慈特降睿㫖速行按治顯賜黜責以符天下公議五年十月十七日象求奏此象求又言臣近者上言知青州王安禮踰濫不法及買絲配機户織花隔織妄作名目差人般擔偷謾一路商稅上京貨賣贏利入已等事已䝉朝廷行遣推治更有因縁生出事節臣並皆畧去免干連追捕别人却成勞擾姑欲上為清朝按舉擯逐縱恣姦貪之吏而已然臣續又訪聞得安禮在任曽將本家錦一段并椅棹二十副賣與公用庫大算官錢入已兼於諸縣勾收不係省雜錢數千百貫令曹官收掌非理費用臣欲隠而不言又慮官錢不見均實下落被人侵欺盗用則臣有庇姦失職之罪所以不避煩紊再具陳其事臣竊謂安禮作過跡狀甚多又暴白如此織匹興販非止一次以致機户逃竄百姓沈大被非理决責枷錮出錢交還趙五以致破壊家産本路監司無由不知顯是畏懼安禮凶狠或被安禮以事染汚不敢舉發上負陛下委寄使一方吏民受昏亂之弊臣不勝憤激伏乞陛下聖慈特將臣所陳事節宻付本路新到任監司或不干礙官體量果有上件情狀即乞置司推勘盡法施行兼臣聞得王存是安禮妻之姊妹夫見移知青州竊慮吏民畏避不敢依實通吐更乞朝廷詳酌指揮十月二十一日象求奏此二奏並須刪修左司諫楊康國言五年十二月二十一日竊詳諸道帥臣朝廷委之節制一路其任非輕當先謹守法令表帥列城以寛朝廷方面之憂近聞知青州資政殿學士王安禮贓狀穢跡傳播京城竊聞朝廷已賜窮究謹按王安禮昔作先帝輔臣已坐踰違罷去今為陛下東帥又以贓汚著聞自謂姦雄不改故態顯見凌蔑公法侮慢朝廷大臣若斯可不深治聞開封根緝興販事狀已見來歴前後不一勘㑹新知青州資政殿學士王存與安禮同是謝終之壻竊恐將下本州體量必是顔情葢庇䝉昧朝廷伏望睿明特賜指揮嚴責本路轉運或提刑司依公盡理按騐確實重賜施行以正朝廷使安禮黨與恣横不法侮玩詔條之人稍稍知懼壬子新知青州王存改知揚州知青州在初八日専切措置荆湖北路邊事唐義問乞朝廷豫降約束候進兵明有勝㨗即分官建築邊面詔義問候進兵明有勝㨗入急遞以聞癸丑詔近制府監發解省試舉人經義毎道不得過五百字䇿不得過七百字如過七分雖合格並降一等諸發解舉人依此詔自今同文館髙麗人出外置到物並檢察有違礙者即婉順留納以雜支錢給還價直若係時政論議及言邊機等文字即問元買處開封府檢奉敕條曉示進奉人到闕關司録司曉示行人情願將物入館交易仍具姓名關本館照㑹監門不得阻節日聼十人畨次出館遊㸔買賣仍各差親事官一人隨願乗馬者於諸司人馬内各借一匹並牧馬兵士一人至申時還仍責隨馬人所往處狀進奉使乞差伎藝人教習申取朝廷指揮蘇轍具北使西使髙麗使條約乞行裁酌今所具四事皆舊條約非今創立但舊日聼下節二十人畨次出館今減為十人耳轍所言初不盡用故轍再言雖十人亦不冝聼出館不知後竟何如實録並以此四事為從轍之言葢誤也今改之仍取轍言附於後先是御史中丞蘇轍言臣伏見髙麗北接契丹南限滄海與中國壤地隔絶利害本不相及本朝初許入貢祖宗知其無益絶而不通熈寜中羅拯始募海商誘令朝覲其意欲以招致逺人為太平粉飾及犄角契丹為用兵援助而已然自其始通及今屢至其實何益於事徒使淮浙千里勞於供億京師百司疲於應奉而髙麗之人所至遊觀伺察虛實圖冩形勝為契丹耳目或契丹常遣親信隠於髙麗三節之中髙麗宻分賜予歸為契丹㡬年之奉朝廷勞費不貲而所獲如此深可惜也今其復至既朝廷本欲遽絶謂當痛加裁損使無大饒益則其至必疎而我得其便矣竊見近日已降朝㫖自明州以來州郡待遇禮節率皆減舊而京師諸事未加裁定臣以謂朝廷交接四鄰莫如遼夏之重而目前所以遇髙麗者其比二國多或過之非獨於本朝事有不便儻使二國知之亦為未允况髙麗之於契丹大小相絶有君臣之别今館餼之數出入之節或皆如一或更過厚其於事體實為不便臣欲乞凡館待送遺並量加裁抑其人從出入即依西北人使舊例其留住日月非汴水未通仍立定限日如此施行自不為薄也貼黄稱髙麗人使見今必已至浙江路所定裁損條約乞不干省部只自朝廷指揮免有稽緩失事及至轍又言臣近奏乞裁損同文館待髙麗條約除近降聖㫖畧施行外有一項下節日聽二十人畨次出館游㸔買賣止减為十人竊縁外國之懐挾姦詐情不可知許令游覧都城大則察採虚實宫闕倉庫營房衢道所在曲折事極不便小則收買違禁物貨機宻文書及作為非妄治之則傷恩不治則害事聽之出入無一而可舊法雖令親事官監視然而小人貪利㣲加贈遺何所不從其實無益若是朝廷全然不䘏前事則雖日令二十人出入可也若以可為慮則止許十人實亦未便伏乞再降聖㫖全令禁絶從違當考據十二月乙未劉摯云則轍言葢從也乙卯新知青州龍圖閣學士右光禄大夫滕元發卒贈右銀青光禄大夫諡章敏特賜錢三十萬權知開封府王巖叟言元發卒於都城之外家無餘貲乞加優䘏也劉摯云云今附注此劉摯云初命元發與王安禮對易韓川封還元發詞頭以為病不可為帥過都門二十日不敢求覲其病無疑元發磊落有氣節毎不為任事者所喜故擠逐流落㡬二十年方少被眷奨有所任之而老矣苦脚疾他無甚病然其志未能無所望既摧頽不能支又為後生軰指㸃議者疑其邑邑以死也亦可哀矣丁巳樞宻院言修將官敕書成編修官都承㫖劉奉世韓川王巖叟副都承㫖李綬詔賜銀絹有差自官制後刑名並上尚書省取㫖者送中書不上察院事有繫邊機及軍政或本自察院畫㫖下所在取當降特㫖有所懲戒者宻院皆不見同知院韓忠彦具其事與三省集議凡斷獄係前項依舊上宻院斷已三次議衆無異言乃同入文字十月十四日畫可施行既逾旬中書侍郎傅堯俞忽獨具奏官制行之已乆不可遽改昨不曽商量吏人呈押臣以為尋常文字遂簽書然臣實昏亂不能守官乞從顯黜所有十四日指揮乞不施行内降堯俞劄子付都省堯俞即於都堂變色出語侵忠彦衆皆愕然堯俞素非好辨者衆疑其為中書刑房吏人所誤也後數日堯俞又入劄子云都堂聚議臣實不知畧加究詰必見詣實然殊不言及曽簽書文字吕大防謂劉摯曰欽之事當與畧修潤已降指揮然欽之此舉極誤不惟使外之邪黨窺伺幸吾曹有間亦令簾中有所疑謂吾黨欺欽之欽之堯俞字也遂改十月十四日指揮云公案係邊防者文臣上都省武臣上宻院同取㫖是日二十六日丁巳進呈大防言此事乆來聚議恐是堯俞不聼得今改云云堯俞進曰如此則允當初堯俞欲留身白此事大防等諭以不須留但對衆陳之可也劉摯謂堯俞既簽書文字却有所訴謂已不知直以為衆人欺謾取其簽書故劄子自云昏亂其欲留身葢將就簾前嫁其欺謾之罪於衆人頼大防等曉其說而止之徐聞激堯俞使為此者實給事中范純禮也堯俞純禮於韓氏皆連親事多宻咨純禮大防既信堯俞堯俞又多謀於純禮一二軰所以差除間多用洛人及韓氏姻舊云此據劉摯日記増入十一月二日蘇轍云云可考已未刑部侍郎韓宗道為寳文閣待制知青州尋復為刑部侍郎復為刑侍乃十一月二日今并書蘇轍云云十二月二十二日壬寅劉摯記此事云宗道自刑部侍郎除寳文閣待制吕大防實主之初莫曉其故昨撰除目後疑其然因博詢乃知宗道有求於傅堯俞小封干大防故忽發謂衆人猝猝不能可否也蘇頌亦韓姻為此委曲者獨謾摯及許將耳宗道為正侍郎才三月摯因晚集以宗道事問大防曰何故除外任大防曰外面難得可移之人宗道已多時摯曰宗道雖乆乃是權侍郎改為正侍郎及今方百餘日大防愕曰是是然終須作待制只是差早爾摯曰不然只恁觀之不為過若比衆人即太優陸佃為正侍郎五年才得待制知潁州梁燾兩為諫議大夫又為中丞又為權尚書請郡止得待制知鄭州天下公議亦可畏不知外人如何說此差除也大防黙然乆之踰月宗道仍歸故官葢大防畏公議因事改前過也此據劉摯日記増入右正言劉唐老言臣伏覩貢舉條制考進士試巻以四埸工拙定去留髙下竊詳此法葢以分經取人有多寡幸不幸之異故使程文均取更不分經考校然而主司以其四場通定之文復於去取議論所主不一或以經義或以詩賦或以䇿論各隨習尚互為升黜縁舉人所繫利害大者在於得失而髙下又其次焉須其去留髙下之間二者分為約束如治平以前詞賦取士則去留主詞賦熈寜以後經術取士則去留主經術其論䇿二場惟以品第髙下今既經術詞賦别成兩科須理各有所主治經者必以義對為先作賦者當以章句為重臣欲乞將治經者以大義定去留詩賦而兼經義者以詩賦主取舍䇿論止於定髙下不預去留之例依舊更不分經考校如此則主司議論既各有適從士子得失亦不誤所習伏乞朝廷詳酌施行從之宻䟽五年十月二十八日得㫖在十一月二日今并此舊録十一月二日右正言劉唐老言請治經舉人以大義定去留詞賦而兼經義者以詩賦定去留並以論䇿定髙下仍依舊分經考校從之按元祐宻疏唐老以五年十月二十八日奏此十一月二日得請今並取唐老全疏及十一月二日指揮附此又以上官均一疏具列於後殿中侍御史上官均言臣竊見朝廷近縁臣僚上言頒行貢舉條制治經之人以大義定去留論䇿定髙下詞賦而兼經義者以詩賦定取舍經義論䇿定髙下新制一出士大夫皆以為朝廷不復更取經義䇿論學者相語以専事詩賦不須考閲經史葢以進士應舉以得失為重髙下次之今以詞賦定去留則學者必盡力於詩賦以幸有司之選何暇以髙下為計邪臣竊觀今次科埸以兩科均取進士府學試經義者纔十分之二以利害計之將來學者必皆趨習詩賦天下之士皆應詩賦而有司又執新制以定去留臣恐自此學者為文誦書惟一意於詩賦不復治經閱史探考義理之學歴代成敗之跡雖試義問䇿僅如昔時帖墨耳竊以朝廷昨來復添詩賦葢縁自改經義以下學者茍簡不該他書不曉聲律故令兼習詩賦與經義並行以四埸通定去留髙下非薄經義而尊詩賦如朝廷之意欲卑抑經義當時又豈復以經義為第一場又以四場通定髙下去留耶言者不知朝廷之意乃欲潜消經術専進詩賦黜理而尚詞遺實而取華不亦過歟臣竊聞太平興國八年太宗下詔曰進士舉人只務雕刻之工罕通緗素之學不曉經義何以官人宜令禮部貢院特免貼經只試墨義二十道較其能否以定黜陟天禧元年魯宗道言進士所試詩賦不近治道諸科對義惟以念誦為工罔究大義真宗日前已定進士兼取䇿論諸科能通經者别加考校至和貢舉條詩賦論䇿四件並上上為第一等三件並上次以上一件中上為第二等上二件上次以上二件中上為第二等下熈寜四年罷詩賦以經術時務義理文詞通定去留髙下由此觀之自祖宗以來固欲兼用詩賦又以䇿論通定去留髙下未聞専以詩賦去留也而言者以為治平以前詞賦取士則去留主以詞賦熈寜以後經術取士則去留主以經術又以為縁不分經考校故當時定四場通取之制不亦過歟言者以為主司以有四埸通定之文所主不一各隨習尚互為升黜臣以為學者所習各有所長四場程文各有優劣惟所主不一取其優長故無遺才雖各隨習尚互為升黜又何害耶今就専以詞賦去取若賦不合格則經義䇿論雖精深閎贍不可復取如此則博學能文之士所失多矣又詞賦之學最為難工治平以前學者乆習精者猶鮮况新復此科進士尚以病聲為患文理疎畧非前日之比况専以詞賦去留不免彊取疎繆之文以應法充數則是詩賦雖繆以法而不得不取經義䇿論雖精以法而不得不黜黜其所可取取其所可黜實非朝廷取士求才之本意伏望依元祐二年條制以四場通定去留髙下庶使無失人之弊又言臣昨具奏論科舉條制不當専用詩賦去留乞依元祐二年指揮以四埸通定去留髙下未䝉施行臣竊以朝廷之務莫重於建官建官之原莫先乎取士取之有術則天下之士知所學而不流於淺陋取之非其道則學者日趨於卑近而以茍得為意夫士之所學以知道燭理為主而文辭次之知道所以立已燭理所以應務能文所以逹意此三者士之所學不可偏廢也朝廷自熈寜未改經義以前祖宗相循以詩賦䇿論取天下之士詩賦取其雅麗清新恊比聲韻以文辭為主䇿論取治經習史曉逹世務以知道燭理為本以此四者㕘定去留髙下故天下之士泛觀博習以求應選不敢専一技以希幸得故歴朝以來名臣間出勲徳相望代不乏人者良由取士有法未聞以詩賦専定去留也夫法之所取士之所向法之所黜士之所捨今以詩賦去留天下之士則為師者惟以詩賦為教為友者惟以詩賦為習父以詔子兄以詔弟無不一出於詩賦是天下之士惟文辭之為習不復治經閱史研究理致講求世務雖有經義䇿論殆為虚文爾十年以後新學後進漫不知有義理之學風俗日靡入於卑陋淺薄固非細累國家列聖相繼升平百有餘年教化涵養嵗積日靡士之所學冝益純正士之所習冝益成就今乃偏尚詩賦潜消義理之學非所以奨養而成就之也仰稽祖宗之制則非順下原學者之心則非便又非朝廷近年兼用詩賦之本意伏望陛下詔執政大臣審計得失追改新制以正取士之法天下幸甚均後疏稱以十一月二十六日上前疏今并附劉唐老建請之後更不出其月日庚申講書終篇賜御筵於東宫宰臣執政講讀修注官預
