body:
  text: 續資治通鑑長編巻四百三十宋李燾撰哲宗元祐四年秋七月己巳朔冀州南宫等五埽危急詔撥提舉修河司物料一百萬應副庚午朝奉大夫岑象求為考功郎中辛未中書省言内外官再任及六曹郎官於本曹易部並係降誥縁元除已給請今後止降黄牒從之壬申吏部言祕書省官三年為一任復置館閣校勘正字四年成任任滿除祕閣校理校書郎任滿除集賢校理並謂陞朝官知縣已上資序之人餘且除館閣校勘候及上項官資序改校理校理以上資任依官制以前法到館一年與通判一任回并到館三年與知州已係通判資序即二年與知州祕書省官闗陞不用舉主著作郎佐郎祕書郎並除陞朝官知縣已上資序人餘如舊制任滿日著作郎除直集賢院佐郎祕書郎除集賢校理從之樞宻院言新復諸監牧馬元祐三年經春大雪苦寒已特免一年比較其人員兵級欲取死亡最多最少者賞罰從之詔三京縁賊盗按舉許留守司行遣外其縁軍馬将兵按舉及差官事令逐路安撫司行遣從京西安撫司請也甲戌右諫議大夫范祖禹為中書舍人兼侍講左諫議大夫梁燾左司諫劉安世右司諫吳安詩同奏乞留祖禹依舊供諫職而祖禹亦請追還告命詔其告命令閤門繳納從祖禹等所乞在十二日今并書歩軍都虞候姚麟權殿前司事其馬軍司并新舊城廵檢令以次官分領之明堂禮儀使知樞宻院事安燾奏近為母患病乞罷明堂禮儀使及知樞宻院事除一在京宫觀差遣詔特給假候母疾稍安日供職其禮儀使司公事令就家行遣右諫議大夫范祖禹言臣伏聞安燾以母病在假孫固以老疾求退聞燾母病已危惙固年踰七十必是筋力漸難支持臣竊慮執政又有闕貟不敢不先事而言執政與人主同執天下之權其任至重必有才徳公正無邪可保其不欺謾為天下所服者乃可登用不可止以勲舊亦不可止以科第進也樞宻院必得曉知邉事多所更歴之人門下侍郎資任最隆皆次宰相伏乞深留聖意詳加選擇陛下自去年以前所用執政多協人望其間雖非全徳亦有所長可稱惟近日所用二人殊不類前後差除臣昨於簾前奏陳料陛下必盡記憶今若有闕不可更不得人重失天下所望也此奏仍乞留中乙亥左諫議大夫梁燾言臣竊以都城之役程工浩瀚開廣池隍最為大事全如受敵邉備動揺人心盡發封樁官錢蠧耗國力毁撤廬舍生者不得安掀剔墳隴死者不得息棄土山積旁無曠地稍已堙没園林浸至壅閼道路近郭居民深以為勞兼冒寒暑怨通幽明累徳損政莫甚於此言者相繼指擿明白日聽蠲罷邈未䝉省弊病之跡横在十目愁怨之聲達于四聰未諭朝廷何憚不革且以糾殊異之情久則難齊任困苦之事極則生變羣疑不解理有可虞今若但省工料别議嵗月未免久勞終是無益臣愚欲乞聖慈特降指揮放散見雇人夫只留廣固軍兵壕塹㨿已開處令結絶了當城壁㨿未堅處令漸次修築除冗費之患去妄作之擾使民情安悦而氣和人力舒暇則功倍輦轂之下先見安静誠今日聖政之所冝為也伏望深留宸念貼黄城圍既竣三面自合周全壕池已開兩隅不須通鑿况丈尺甚廣用力艱難未見一利己集衆害雖欲遂成勢亦不可茍於就功終恐生事伏望聖慈斷在不疑罷此煩役已行之後乞賜採聽當知逺近人情上下安悦臣聞先帝朝知開封府王安禮以修城發掘民間墳墓數多羣情愁怨因此建言先帝惻然即日指揮裁罷人用安寜惠浹幽顯以此見先帝聖意愛民深切但臣下䝉蔽不言故有所不知知則未嘗不曲軫念慮亟為措置也若聞今日之事當立有處分如陛下納用忠言憫恤民害能罷得開壕以慰都人是能承先帝之意何嫌而不為也伏望聖慈早賜指揮廣固指揮自有三千餘人毎年更有差到廂軍一千人自是入役四年千餘人已為不少可以責辦工料漸次修治元管使臣十貟可以分頭管勾燾奏此以七月六日先奏以六月六日范祖禹云在五月末十月十八日開浚壕河事撥屬京城所是日知樞宻院事安燾以母䘮去位此㨿政目增入丙子天章閣待制樞宻都承㫖劉奉世為户部侍郎光禄卿直龍圖閣范育為樞宻都承㫖左諫議大夫兼權給事中梁燾言劉奉世除户部侍郎范育除樞宻都承㫖竊以西羌納欵奉世首豫此事習知本末不可更易育權領户部頗能盡心閱日寖久冝見成效二臣之材各有所用使安其職足以濟物所有録黄謹具封還詔劉奉世先次依前降指揮行下奉世先次依前詔事在十二日今并書右正言劉安世言范育昨知河中府甞有闕行嬖人用事干撓政刑子弟失教閨門不肅醜聲流聞道路君臣之間有不可言者使育實有過人之才義難終棄猶抑之散地更加嵗月磨滌瑕垢漸次任用或為清議所容今育之學術知能無以異衆而前日之惡播在僉言此方外除已玷卿列曽未席煖擢寘宥宻臣恐修潔之士恥與比肩流蕩之徒無所懲戒甚非所以稱陛下旌别淑慝長育人才之意伏望聖慈深賜省察罷育新命以允公議詔育權發遣熈州改育熈州在十一日今并書朝請郎比部郎中劉宗傑知郢州放謝辭令御史臺差人押出門宗傑舊以獄事坐廢任郎官後累狀聞奏大赦前制院事已除落元斷私罪輙於别司案内録元文字再将大赦前事論奏故有是責孫升云云在明年三月二十九日亳州司户參軍徐州教授陳師道候大學正有闕日差從左諫議大夫梁燾薦也詔復置外都水使者令河北路轉運使謝卿材兼領六月二十四日卿材再任河北二年二月末曾肇言四年二月四日范百禄言可考殿前都虞候寜國團練使知熈州劉舜卿為徐州觀察使步軍副都指揮使知渭州七月十五日梁燾云云馬軍都虞候忠州防禦使李浩為黔州觀察使永興軍路總管歩軍都虞候威州團練使姚麟為殿前都虞候龍神衛四廂都指揮使康州團練使和斌為步軍都虞候皇城使果州團練使帶御噐械吕真為衛州防禦使捧日天武四廂都指揮使依舊鄜延副總管皇城使亷州團練使劉斌為信州團練使龍神衛四廂都指揮使詔陕西河北河東路逐年封樁保甲冬教賞物自今後免封樁其合用賞物令轉運司應付仍令保甲司秋季約度錢數闗轉運司預排辦於教前足備如違保甲司以聞當議重行黜責丁丑遼國遣使保静軍節度使蕭寅副使朝議大夫太常少卿充朝文閣待制牛温仁來賀坤成節殿中侍御史孫升言臣竊以殿前三帥之任所以侍衛禁嚴統率士旅惟威名足以弹壓羣衆惟勇健足以懾伏悍彊非其人難受兹寄伏見殿前副都指揮使苖授久艱歩履屢廢朝參乃即家居以治軍政且侍衛禁嚴豈冝安坐燕私而統率士旅不當自負至此况明堂日近伏望聖慈早賜處分以安中外苖授三年七月十二日為殿副己夘殿前副都指揮使武泰軍節度使苖授為保康軍節度使知潞州歩軍副都指揮使冀州觀察使劉昌祚為武康軍節度使充殿前副都指揮使詔諸司應奉明堂限八月中旬以前申請畢從大禮使之請也范祖禹言臣竊聞韓嘉彦已選尚公主此先帝遺意而陛下成之韓琦勲在王室其子尚主天下之人誰曰不冝此於太皇太后陛下為至慈在皇帝陛下為至孝然臣伏見國朝以來祖宗諸公主婚姻之家皆無預政事者今嘉彦已選定宣繫而忠彦執政此非祖宗故事不可為子孫法使後世姻戚預政自陛下始臣竊惜之陛下一言一動當以祖宗為法况執政繫安危治亂最為大事一開此例後不可止陛下自聽政以來於親戚無毫髮之私天下之人無不服陛下之至公今獨於韓琦家如此非所以報功也陛下念琦之功冨貴其家可也至於執政必選天下之望不可專以勲舊如趙普曹彬之孫何嘗執政豈是祖宗不念功乎自用忠彦以來外議籍籍至今未已今國家既與之為婚罷之有名陛下欲富貴之但使曽歴執政與之前執政官無所不可若必待其有過然後黜之則已傷恩是欲厚韓琦之家反薄之也不若保全忠彦無使致於滿盈顛覆臣今已䝉除新職罷言職不當更論執政然臣前上殿已嘗面論今又變祖宗故事所繫甚大雖已去職不敢不為陛下一言臣與忠彦是親素無嫌隙但不忍上負陛下任使不欲陛下有所不知耳今在朝廷之人多出於韓琦之門雖知忠彦不恊人望以琦之故皆莫肯言亦乞陛下知察祖宗以來無彊族根㨿朝廷今忠彦執政弟尚公主恐權威太甚冝防其漸此㨿祖禹家所藏奏藁盖七月十一日所上御史中丞傅堯俞言伏見近除韓忠彦為尚書左丞繼又以其弟嘉彦尚主物議籍籍以為未當臣不敏不敢臆度其是非臣竊謂李徳裕實唐之名相建言舊制駙馬都尉與要官禁不往來開元中訶督尤切今乃公至宰相及大臣私第是等無他直洩漏禁宻交通中外耳請白事宰相者聽至中書無輙詣第當時防禁如此今乃萃於一門議者之言良可取也况君舉必書而書事必謹其始陛下自臨御以來勵精政事未有過舉而首開此塗異日援以為比其弊將深且書於史册云始於陛下使後世指為譏議顧不惜哉願陛下深思之陛下用臣輩為聰明臣茍知而不言負陛下之罪不容誅矣堯俞言附祖禹後八月一日忠彦乞罷不許庚辰夏國遣使賀坤成節門下侍郎孫固為明堂禮儀使中書侍郎劉摯為儀仗使同知樞宻院事趙瞻為鹵簿使尚書左丞韓忠彦為橋道頓遞使以禮儀使知樞宻院事安燾丁母憂故也後十日詔安燾候卒哭起復特給宣借兵士十二人左司諫劉安世言臣竊謂國朝以來初革五代之弊用宰相以主文事參知政事以為之貳命樞宻使掌武備則設副使簽書以為之佐雖貟數名品時或不同而文武二柄未嘗專付於一人也今安燾以母憂去職本兵之地惟有趙瞻竊聞又以私故見在式假方西戎納欵南蠻入冦邉防兵畧正務講求差之毫釐遂失機㑹所繫甚重恐不可全然闕官伏覩英廟亦甞命宰相韓琦兼樞宻院事國史具載最為近例若陛下謹擇人才未欲輕授伏乞且依故事命大臣兼領所貴緩急不誤大計左諫議大夫梁燾言臣竊以樞宻院朝廷機要之地兵政邉事所繫尤重今但以獨員領之於國體誠未為安伏望聖慈特出中㫖委一執政兼權事干大計願留宸念貼黄若以目前淺近言之則偶闕一大臣未必便有闕政似不足議論若為國家深逺計慮則事體至大不可不言盖宻院之政動干機要祖宗以來多用三二貟執政謀謨詳博處置精審仰惟聰明洞照至理伏望深加省察早賜指揮宰相以下至右丞同是執政皆可兼樞只在聖意所命不須全用故事但得宻院常有兩貟執政便是朝廷法制樞機之地直須謹重伏乞聖明俯加採納此事合自清衷處置不須更有訪問外臣或致牽制難行有損國計右諫議大夫范祖禹薦馮京趙卨可任樞宻曰臣伏見馮京在神宗朝為參知政事與王安石論議不合其後與吕惠卿同執政為惠卿所傾因鄭俠獄罷政事及安石與惠卿為仇惠卿繳進安石私書其一紙云勿令齊年知京與安石同嵗故安石謂之齊年神宗因此知京不欺故安石再相之日即召京於成都知樞宻院趙卨守邉素有威畧神宗一見卨委以西邉之事討伐安南雖無大功然處置南事多卨之力今卨久在延州於國實有勤勞若置在樞宻則西北二邉及蠻方之事皆可訪問臣僚中熟知邉事實未有如卨者京雖有女嫁蔡確然趨向各異如文彦博亦與蔡確為婚姻吳充亦與王安石為親家何甞相黨若趨向皆同縱不為親自是黨也祖禹又言臣伏見陛下罷免范純仁獨任一相古者三公官不必備盖充此位者未易得人陛下重惜如此古聖帝明王之意也然竊恐自此天下之事未免益勞聖慮太平之期未可望也何以言之臣觀今日大臣未有可副陛下任使倚信而不疑如司馬光吕公著者也吕大防未為執政以前人望不及純仁自居大位純仁頓失人望是以大防比之差少過失然其為人麄踈果敢好立崖岸簡於接物士大夫多不親附夫自六曹尚書侍郎兩省侍從皆朝廷所與共為治者也天子所頼者大臣大臣所頼者賢士大夫百官昔司馬光為相欲知選事問吏部欲知財利問户部凡事皆於衆人講求便者存之不便者去之此天下受其惠也比年以來未聞宰相召一人問以本職事亦未聞召一賢士大夫問以政事得失人民疾苦其監司知州自外来者亦未聞召一人問以州縣利害文書成於吏手官曹不敢爭執物情不接上下相䝉但聞專任吏人而已若有差失為害必甚臣望陛下特出聖斷以儆飭輔臣無使大防得專制朝權無使臣下得乗間窺聖意陛下深居帷幄皇帝未親庶政尤不可使宰相權重冝防其漸劉摯本以鯁直敢言陛下所自㧞擢自居中書人多言其有窺伺相位之心與同列議論多洩其語與言事官相表裏范純仁好用親戚摯不與之爭洩其語於言事官使攻之吕公著甞與臣言摯若進徳修業何患不為宰相何須如此摯之此心同列亦多覺之夫宰相者不得已而為之當以為憂若以此心得之必無善政矣然則朝廷何所頼天下何所望哉又鑒别人物更不及純仁純仁上則為大防所制下則數為摯所中懦而不立以至於罷夫陛下極天下之選取於千萬人之中得此數人而猶如此臣以此知人才之難也昔神宗以陳升之有才智既用為相問於司馬光光言升之才智誠如聖㫖但恐不能臨大節而不可奪爾昔漢髙祖論相以陳平智有餘然難獨任真宗用王欽若丁謂亦以馬知節参之凡才智之人必得忠直之人從傍制之此明主用人之法也今陛下専任大防而劉摯有欲相之心必與大防協同此非相參之人也近用左右丞二人又皆人望素輕風節不立陛下臨御以来所用執政惟韓縝作相不合公論餘皆大惬天下之望其間雖非全徳亦皆有可稱近所用二人殊不類前後差除以臣料之自此廟堂議論必無異同朝廷政事一决於大防與摯無有敢違之者如此則公道何由得立臣權安得不盛恐非國家至計此臣之所深憂也惟陛下稍自攬權綱無使威福之柄漸移於下臣非敢離間君臣陛下以諫官為耳目若有所聞見不以告陛下則上負任使若朝廷政事自此日勝一日豈獨大防有賢相之名乃祖宗生靈之幸萬一如臣所慮豈不可使陛下預知之哉臣不勝憂國惓惓之心又言蔡確罪惡初逹朝廷大臣皆不以為意及諫臣論奏陛下巳怒然後大防奉而行之純仁與王存則固執議論立異此所以不同耳夫大臣乗人主喜怒以起勢立威則皆畏之人主惟見其順巳而不自覺權移於下古之彊臣皆成於此惟陛下深戒喜怒無使臣下得乗其便而作威福也祖禹本章如此或為劉摯隐輙有刪削祖禹家傳又從而増飾失祖禹意甚矣今具載本章仍以家傳所録附見此後劉摯終為賢相雖具載此瑜瑕固不相掩云執時吕大防獨當國眷注甚重祖禹因言吕大防未為政以前人望不及范純仁自居大位純仁頓失人望是以大防比之差少過失然其為人麄踈果敢好立崖岸簡於接納士大夫多不親附夫自六曹尚書侍郎兩省侍從皆朝廷所與共為治者也天子所頼者宰相宰相所頼者士大夫比年以来未聞宰相召一人問以本職事陛下深居帷幄皇帝未親庶政尤不可使宰相權重冝防其漸夫以陛下極天下之選取於千萬人之中得此數人而猶如此知人才之難也昔神宗以陳升之有才智既用為相問於司馬光光言升之才智誠如聖㫖但恐不能臨大節而不可奪爾昔漢髙祖論相以為王陵少戅陳平可以輔之平智有餘然難獨任真宗用王欽若丁謂亦以馬知節参之凡才智之人必得忠直之人從傍制之此明主用人之法也今陛下專任大防而劉摯與大防協同此非相參之人也近用左右丞二人乂皆人望素輕陛下臨御以来所用執政惟韓縝作相不協公論餘皆大惬天下之望其間雖非全徳亦皆有可稱近所用二人殊不類前後差除以臣料之自此廟堂議論必無異同朝廷政事一決於大防與摯無有敢違之者如此則公道何以得立臣權安得不盛恐非國家至計惟陛下稍自攬權綱毋使威福之柄漸移於下陛下以諫官為耳目有所聞見何可不以實告若朝廷政事自此日勝一日豈獨大防有賢相之名乃宗社生靈之福萬一如臣所慮豈可不使陛下預知之哉左右丞乃韓忠彦許将也當范祖禹子冲作家傳云謹按晋趙孟問秦醫和曰誰良臣和曰子相晋國於今八年晋國無亂諸候無闕可謂良矣汲郡吕公在元祐為相八年四夷無事中國晏然年榖豐登家給人足可謂有功社稷矣至於減任子省吏額嚴資格抑僥倖身當天下之怨而無私焉亦已難矣忠宣范公熈寜元豐間數與王荆公爭新法流落在外逮元祐初以公議人望爰立作相蔡確之貶忠宣以謂不宜長告訐之風及紹聖中大貶元祐諸公忠宣獨以救確得免乃上表乞放還大防等其言哀切聞者無不感動坐是謫置永州嗚呼仁人之用心也先公之於二公非故相戾也而當時數論列其過失者不惟責備以謂宰相所為人主不可不盡知之要當察其不善而成就其賢宰相之業盖為朝廷計也後之人當知先公之意盖出於此左諫議大夫梁燾左司諫劉安世右司諫吳安詩言臣等伏見章惇在蘓州日强以賤價買朱迎等抵當田産自去年十二月後来右正言劉安世累次論列䝉朝廷下江淮發運司體量皆有實狀日近竊見敇斷罰銅十斤臣等按惇甞備執政固冝奉法循理尊君愛民而氣燄凶悖刼持州縣貪利無厭使人失職原其不畏國法之意盖有陵蔑朝廷之心而所責太輕未厭公議况惇與蔡確黄履邢恕素相交結自謂社稷之臣天下之人指為四凶若不因其自致人言遂正典刑異日却欲竄逐深恐無名伏望聖慈深賜詳察明降指揮候惇服闋特行廢置所貴姦豪屏息永絶後患不報新録因舊録以此章繫之七月十二日且畧加刪潤所云無恤反汗之嫌自遺養虎之患按劉安世集此章具存初無此二句也其意則固然矣今仍用安世本章實録云詔留候然安世等後數上章云累月未䝉施行則留候之詔元不降岀也今但云不報六月已嘗辨之八月二十二日候惇服闋與宫觀詔内外文武官及宗室内侍官應支賜賻贈絹布米麥錢羊並四分減一應官貟丁憂亡殁式令無賻贈者不得引舊例陳乞所屬亦不得奏請從户部之請也辛巳宣義郎韓嘉彦以選尚温國長公主為左衛将軍駙馬都尉祕書少監直龍圖閣葉均提舉洞霄宫以疾自請也右司郎中林旦為祕書少監吏部郎中晁端彦為左司郎中考功郎中孫路為吏部郎中三年十月十八日路為考功六年十月二日改徐講也承議郎祕閣校理提㸃秦鳯路刑獄張舜民為考功貟外郎中散大夫集賢校理蔡河撥發王晢為直祕閣提舉崇福宫壬午中書省言三班奉職陳永和状親妹美人出殯開聖院永和與弟姪等係朞親乞掛服守靈詔不允癸未左諫議大夫梁燾言臣風聞劉舜卿知熈州威信行於羌虜邉部頼之以安盖今日之良帥也伏見除授歩軍副都指揮使知渭州渭城帥府然未若熈河之衝要用材所先蕃漢素服舜卿之名况今黠敵欵塞變詐不易窺測舜卿思慮深宻皆得賊人虚實必有擒縦謀畫以奪其姦心當此之際未可移易雖朝廷加意掄選得人代之後来者初至未練情偽不如久居之安習其事也伏望聖慈詳酌指揮加以新恩且仍舊治以重國體以固邉計上寛清衷西顧之憂貼黄舜卿治邉誠為有勞然歴嵗未久累有恩除朝廷待之固已厚矣且令控守衝要更責後効俟羌人納欵三二年間貢奉如禮西略安静即别加任使亦未為晚甲申坤成節羣臣及遼使上夀于崇政殿詔除三省樞宻院外其六曹等處不得押貼子勾喚人吏如有合㑹問事許押貼子取索仍令實封齎還御史臺合要人吏指説即依原條丁亥樞宻院言湖南安撫鈐轄司奏邵州城歩寨蠻人刼掠人户乞添差兵甲詔逐司體度如蠻人尚敢潜伏結連令多方捕殺若結集數多攻圍城寨即選兵将分頭掩殺勿令深入己丑樞宻院言湖南蠻賊攻圍邵州闗硤城歩寨詔安撫鈐轄司體度差兵将官救援仍措置以聞庚寅權吏部侍郎王巖叟為天章閣待制樞宻都承㫖朝散大夫權江淮荆浙等路制置發運使范純禮為光禄卿将作監趙令鑠兼權太僕卿新兩浙轉運使朝散郎直龍圖閣孫覽為發運副使朝散大夫度支郎中葉温叟權兩浙路轉運副使朝奉郎知大宗正丞事燕若古為度支貟外郎權給事中梁燾言臣竊聞吳居厚為京東都轉運使以聚斂刻急害民至今瘡痍未補若古實附其事得罪清議方朝廷判白善惡清明政體斥逺居厚姦吏濟惡之黨不當甄用况今吉士盈廷流滯者衆郎闈髙選冝任端良輕以授人未恊輿論所有録黄謹具封還其錄黄内有范純禮等差除乞依例先次行下詔若古别取㫖㝷改權發遣開封府推官改府推在二十八日今并書别取㫖㨿政目增入乃二十四日事詔京城五龍廟以㑹應為額辛夘吏部言選人任知縣縣令事務繁重舊法令監司知州通判毎嵗限定人數舉充己是暗陞一資若到任有改官舉主二貟又得循資及比常調復減舉主一人改官近有不由縣道仍帶奏舉資序如諸州教授之類顯屬僥倖欲今後教授并特許奏辟差遣如係奏舉職官知縣縣令資序候得替合該磨勘並依常調本資考第舉主升改官資如願罷只就奏舉知縣縣令者聽其吏部選注奏舉職官知縣縣令人所充差遣條更不施行詔除縣丞及開祥兩縣尉係縣官外其帳司官及江寜府等處八十九員錄事參軍非元舉職事並依格注常調令禄其應差奏舉職官知縣縣令條貫並罷縣令到任有改官舉主二人又得循資比常調復減舉一人改官要見此指揮自何月日始壬辰詔監司帥守今後薦舉官並於状内具在任事迹及素來行業方與上簿記錄或有任用更加詳察從太師文彦博請也改新除國子監丞王讜為少府監丞讜宰臣吕大防子壻諫官言其不恊公論而大防亦自請改除故也㨿五年六月末蘓轍奏則論讜不當進用者諫官吳安詩也安詩甲子罷諫官按是年十月四日為直集賢院兼侍講猶帶右司諫或自此遂罷樞宻院言鄂特凌古妻溪遵允丹已封安化郡君男溪邦貝昌弟索諾木納木扎勒並為銀青光禄大夫檢校國子祭酒兼監察御史武騎尉充本部都軍主果莊男結斡磋按宋史作結咓齪為銀青光禄大夫檢校工部尚書鎮州刺史月給茶綵有差今以進奉人未到請給宣告下經畧司差人持入蕃令鄂特凌古給付仍别寫蕃字告論結斡磋已有恩命之意從之五年六月末范育奏可考甲午修實錄院檢討官朝奉郎行著作郎黄庭堅為集賢校理丙申龍圖閣直學士工部侍郎蔡延慶為吏部侍郎龍圖閣待制知揚州蔡卞知廣州以新江淮荆浙等路制置發運使龍圖閣待制蔡京知揚州寳文閣待制提舉崇福宫何正臣知洪州言者論正臣為吏酷虐罷之罷洪州在八月二日今并書八月二十四日又除饒州左司諫劉安世言臣昨以王子韶路昌衡差除不當前後十三次論列日近雖䝉朝廷以子韶出守滄州而昌衡新命猶未追改臣既有言責實畏公議累煩天聽盖非獲已竊謂二廣之地控制百蠻祖宗以來選委尤重然嶺外瘴毒人所憚行故凡命帥恩例特厚或貼以職或進以官悉有舊章可以推考今昌衡為子不孝為吏酷虐附㑹王珪蔡確屢興大獄違經亂法天下怨疾得免廢棄已為厚幸比叨擢任尋致人言既罷五羊之行猶冒直閣之寵捨煙瘴之逺得湘潭之便使昌衡自為之計不過如此况因弹劾而所授反優於前日輕重倒置何所懲勸臣聞惟名與噐不可以假人今館職帥權世謂髙選若容邪黨輙爾濫處臣恐邪黨羣小以茍得相矜而正人端士以同受為耻陛下厲世磨鈍之具遂為虚名此尤不可以不謹也伏望聖慈檢㑹臣累奏事理追寢昌衡過嶺貼職處之散地非惟使不孝酷虐之類無以覬幸誤恩亦足以示朝廷好惡風化天下詔朝散郎路昌衡依舊江淮荆浙等路發運使其新除直祕閣知潭州告繳納朝議大夫新除直龍圖閣知廣州謝麟再任知潭州都水監言黄河為中國患久矣自小吳決口後來泛濫未著河槽朝廷前後遣官相度非一終未有定論盖新河隄防與故道金隄殊絶若以為北流無患則前二年河決南宫下埽去三年決上埽今四年決宗城中埽豈是北流可保無虞以為大河卧東則南宫宗城皆在西岸以為卧西則冀州信都恩州清河武邑或危或決皆在東岸顯是大河千里未見歸納經久之計所以昨來相度第三第四舖分決漲水少紓目前之急而繼又宗城決溢向下包蓄不定雖欲不為東流之計不可得也河勢未可全奪故為二股之䇿今監勾當公事李偉状相視新開得第一口水勢湍猛發泄不及已不候功畢更撥沙河隄第二口減泄大河漲水因而二股分行以紓下流之患雖未保冬夏常流已見有可為之勢在國家為無窮之利必欲經久遂作二股仍須増添役夫乃為長利然未下監司州郡外使者北外丞司看詳即今所修較之利害孰為輕重詔令河北路安撫司監司外使者北外丞司限十日具析保明以聞八月九日蘓轍言李偉張皇申報二十八日置修河司著作佐郎兼侍講司馬康言王者以民為天民以食為天自古禍亂之興皆由饑饉為國必有九年之蓄乃可以備水旱比年以来旱暵為虐民多艱食若今秋不稔則公私困竭盗賊可虞昔魏李悝為平糴之法國以富彊東漢永平初以後水旱十年和熹鄧太后臨朝用征和故事徙置饑民於豐熟諸郡躬自減省以救災厄故天下復平唐太宗貞觀初天下連嵗災害太宗勤而撫之民雖東西就食未嘗嗟怨至四年天下大稔流散者咸歸田里米斗不過三四錢自古聖賢之君非無水旱之災惟有以待之則不為甚害如漢唐之䇿已非處處皆有蓄積故令東西就食此策之下者也魏文侯舉國四境悉令平糴所以有儲此䇿之中者也三代而上國有九年之蓄此策之上者也今臣願陛下先為漢唐之下策以濟目前之艱俟及豐穣乃為魏文侯之中策積以嵗月漸及三代之上策乗今秋熟令州縣廣糴民食所餘悉歸於官今冬来春令饑民就食俟郷土豐稔乃還本土夫國家積財惟以安國民安則國安故凡為國者一絲一毫皆當愛惜惟於濟民則不當吝陛下誠能捐數十萬金帛以為天下大本則四海幸甚夫實倉廪使百姓足非獨可以消患太平之化由是而興措刑之本無先於此矣左司諫劉安世等言臣聞國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國盖先王之制三年耕必有一年之食以三十年之通則可以有十年之備故堯湯水旱至於累年而無捐瘠之民者用此道也三代而下井田廢缺利民之法無善於常平由漢迄今莫能變易惟自近世有名無實凡所以養民之具日計不足何暇議一年之蓄哉是以嵗或不登民輙菜色彊者轉而為盗賊弱者不免於餓莩保民之術如此亦已踈矣臣等竊謂自罷青苖錢後来天下州縣皆有積鏹朝廷雖更立常平之制條目甚詳而上下因循未甞留意既無統屬以糾其乖謬又無賞罰以為之勸沮加之轉運司茍紓目前之急多端借貸日朘月削殊無償足之期非有懲革将不勝弊伏望聖慈特降睿㫖取今日已前應干常平勅令嚴責近限專委户部删為一書付之有司悉俾遵守仍先行指揮將天下見在常平錢乗今秋豐稔之時令五路糴粟一色其餘路分並相度逐處可以久留斛斗廣行收糴仍以本司錢修盖合用倉廪将一路所有錢滚同應副一路之中不得偏聚一州一州之境不得偏聚一縣各隨户口之多寡以制糴之大數毎遇凶歉依法出糶糴糶之法常比市價増減如此則官本常存物價不能翔踊或遇旱乾水溢之災則民有所濟不至流散朝廷之惠澤可繼而無乏絶之患相因日久漸至九年之蓄太平之策莫大於此惟陛下推至誠惻怛之意明詔執政恊力施行所有官吏殿最亦乞參酌修定将来頒降之後或有違犯州縣委監司監司令户部御史臺覺察奏劾庶使二聖恤民之仁不為徒善之政傳之萬世天下幸甚劉安世盡言集此章注云與右諌議大夫朱光庭同上按安世以四年六月自右正言遷左司諫十月自左司諫為諫議大夫朱光庭以四年九月自侍御史為右諫議大夫若如集注則此章當在九月後然七月二十八日詔令諸路提刑司下豐熟州縣依條量添錢廣行收糴及覺察違慢又令諸路封樁斛斗若轉司要用先封樁錢方許兊發并闕少本錢處令提刑司於本路那移及以頭子修盖倉敖大畧與此章陳請一般然則此詔必因此章也集注恐誤今不取若云御史朱光庭則可右諫議大夫范祖禹亦言今嵗秋成可望收熟之處必多年榖稍豐則公私逋負督廹民間速欲得錢必至甚賤此農民所以豐凶皆困也今諸路提刑司積常平錢猶多竊恐自罷散青苖錢以来常平之法尚未修復如舊欲乞速降指揮諸路提刑司盡以所有之錢増價收糴使不至於甚賤傷農来春榖貴則減價出糶使不至於甚貴傷民若止以常平錢收糴亦恐未廣陛下誠能出内庫金帛數萬以本糴本專以備水旱凶荒發斂以時則官本常存而民被惠澤無窮祖宗置内藏庫本以備軍旅非常之用仁宗常出錢一百萬以助常平糴本夫財出於民復以濟民但使民存不至流亡今年散之明年復有何患乎無財也詔户部指揮諸路提刑司下豐熟州縣依條量添錢廣行收糴仍覺察違慢又詔永興軍秦鳯河北河東京東京西淮南兩浙提刑司㨿見管封樁錢除已係計置糴糧草并合起發上京及朝㫖指定窠名指使錢數外将的實見在錢支撥一半於本路趂此秋成及今後遇豐熟去處廣謀計置米麥榖豆内淮南兩浙路只於沿流其餘路於沿流及要便并屯聚軍馬去處别項封樁以封樁斛斗為名若内有收糴得處闕少本錢許逐司於本路有錢去處那移如轉運司要用許依元糴價先樁錢訖㨿數兊撥提刑司候到具見在合糴買錢數計置次第申尚書省其頭子等錢亦於帳内别收如有倉敖損處即以頭子錢修仍令户部立法政目云三路京東西淮浙七路封樁錢以一半糴榖為封樁斛斗為永法樞宻院言邵州蠻人作過已令湖南安撫鈐轄司處置慮去邵州遥逺詔謝麟體度蠻事如尚未寜息即交割潭州公事與次官量帶兵甲前去卲州專一措置候事平日歸任詔刑部今後有覆大辟不當並先次下本處分析後到開具以聞丁酉以故知溪峒順州彭儒福男仕誠為銀青光禄大夫檢校國子祭酒知順州兼監察御史武騎尉曹佾子諭言佾有親孫女壻太學内舍生黄持欲乞於遺表骨肉恩澤十人内與文資依都承㫖張山甫奏女夫陶臨例授持假承務郎詔持於佾係異姓無服兼所引並難行御集七月二十九日是月詔令保安軍牒宥州應立界處恐山斜不等仰所委官隨宜分畫政目有此當考詳殿中侍御史孫升言臣聞法待人而後行此古今不易之理也先帝患百司職事不舉故建三省六曹以治庻政然人樂因循衆習茍且弊隨事生茍無按覈鈎考之術則必至於頽壞又置六察考察六曹行遣稽違及輪委御史㸃檢三省簿書差失可謂詳且盡矣蓋六曹寺監二百四十餘案胥吏一千七百餘人其他官司二百七十餘處内外之事填壘紛委而舊以察官六貟書吏十有四人鈎考按覈雖使人人心力强明智術精敏安能周見其故而六曹百司之事不至於頽弊者頼有六察以為之警察爾兹所以見先帝規模宏逺追迹三代也朝廷近年察官既不補足而比因浮費所建言更不自本臺立法直行減罷書吏六人止存八人分治六察吏貟既少則所擇尤須精審且以八人按察二百餘案千有餘人胥吏二百餘處官司而又更不精所擇若止欲名存實亡則可矣必欲救六曹之弊成先帝之志則臣雖甚愚知其無益也近凖七月十六日朝㫖改修到本臺令乃止因一察案貼司陳述務欲自便遂為改法書吏舊法滿六年通入仕及十五年出借職試貼司及四通者方收補今來改法貼司試及二通便補察書吏吏滿十年通入仕及二十五年方得出職出職既艱則内外已有名目曉法令亷勤謹畏之人不樂就此别圖進身所試貼司既易則見在抄冩無能無過之人例皆應選適所以為六曹百司人吏廢弛相容之地非所以為朝廷補救頽弊之術也伏望聖慈詳察深惜六察乃先帝補救六曹頽弊之志特降指揮下中書省重行立法中外幸甚所有新舊令文謹錄白連粘在後貼黄六察官吏係㸃檢三省六曹文書稽違差失衆所嫌怨惟務廢壊其法伏望陛下詳察早賜施行升奏稱七月十六日朝㫖因附月末其從違當考升又言臣聞法行自貴近始者先王之政也伏見朝廷患入官之冗則上自至尊外戚減損恩例懲吏祿之浮則下至庫務胥吏裁去冗占可謂至公矣獨三省樞宻院添溢吏貟暗増恩例多帶請給人人知其僥倖莫敢誰何執政官姑息而莫問言事者畏避而不論中外憤欎為之不平安有盛明之時至尊以身率天下躬自減損乃容此曹挾朝廷之勢自肆如此臣誠孤㣲忝耳目之寄遭遇聖明在上竊不自量為陛下言之且舊中書提㸃堂後官主事共十七人今三省錄事都事主事共三十人舊錄事主書守當官二十九人今三省令史書令史守當官共一百四十三人舊守闕守當官四十二人私名八十五人今三省守闕守當官二百六十四人破食貼房近五百人不在其數入流之濫近世所未有也其間多帶請給暗増恩例根源深宻在外官司不可得而知近者在京諸司推究違法帶請給過兩處者皆行根治獨三省人吏多帶請給有至數處既知物議不平中外洶洶近於今月十六日降指揮下户部申明比諸司事體稍異其新舊請給不得過三處其見破添給三處以上者依舊支破既言稍異則三處已上者合裁減豈有諸司過兩處則行勘治三省人吏三處已上却依支破則是朝廷命令與奪皆狥此曹私意而出何以示至公於中外臣深為陛下惜之伏望聖慈少加省察出自睿斷差委諫官御史之長各一人專一取索裁定或有隐藏漏落事件厚立賞錢許知次第人陳告仍於犯人名額内便行收填候裁定人吏請給恩例編修成冊進呈禁中留一本三省樞宻院各付一本户部吏部御史臺各一本今後應有増損並須相闗朱書批鑿著為永式昭示至公以絶僥倖以慰中外人心又言臣近曽論列三省人吏多帶請給等事以謂朝廷命令與奪皆狥此曹私意而出竊恐天聽高邈未賜省察今録白到今月十六日申明行下户部白劄子簽貼在前可見三省人吏挾情自肆之意伏望聖慈詳察出自睿斷早賜指揮施行孫升言不得其時今附七月末傅堯俞云云在八月十六日升又言臣聞書曰威克厥愛允濟愛克厥威允罔功此先王治軍之法也盖軍令嚴肅則恩信易感而事可濟軍政姑息則驕惰無厭而功罔成恭惟祖宗深得治軍之法設三衛管軍之官付以流配之權自非死刑不付有司按覆故朝廷撫養此曹易於懷悦絶驕惰無厭之心是威行於下而恩歸於上如郝質軰治軍嚴肅作過軍人一經徒流鮮有生者質所坐卧寂不聞人喘息聲其嚴憚如此臣訪聞管軍自苖授相承習為姑息以収恩而和斌劉斌繆懦為甚諸軍驕惰自肆無所忌憚其漸不可不戒也伏望聖慈詳察宻諭大臣其管軍之官相承姑息者則戒飭之繆懦縱弛者則更易之使威行於下而恩歸於上以絶驕惰無厭之患則中外幸甚貼黄日近虎翼軍人退嫌小麥敢爾輕率良由軍政不肅統轄不嚴所致其弊不可滋長也四年七月八日和斌為歩虞劉斌為龍神廂主升言不得其時今附於七月之末
