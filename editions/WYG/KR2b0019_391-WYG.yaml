body:
  text: 續資治通鑑長編巻三百八十七宋李燾撰哲宗元祐元年九月丙辰朔正議大夫守尚書左僕射兼門下侍郎司馬光卒光為政踰年而病居其半每欲以身徇社稷躬親庶務不舎晝夜賔客見其體羸曰諸葛孔明二十罰以上皆親之以此致疾公不可以不戒光曰死生命也為之益力病革諄諄不復自覺如夢中語然皆朝廷天下事也既沒其家得遺奏八紙上之皆手札論當世要務太皇太后聞哭之慟上亦感涕不已眀堂禮畢皆臨奠致哀輟視朝贈太師温國公襚以一品禮服謚曰文正贈銀三千兩絹四千匹賜龍腦水銀以歛命戸部侍郎趙瞻内侍省押班馮宗道護其䘮歸𦵏夏縣官其親族十人篆表其墓道曰忠清粹徳之碑光在相位遼人夏人遣使入朝與吾使至彼地者彼必問光起居而遼人勅其邊吏曰中國相司馬矣切無生事開邊隙及卒京師之民皆罷市徃弔畫其像刻印鬻之家置一本飲食必祝焉四方皆遣人求之京師時畫工有致富者及𦵏四方來㑹者盖數萬人哭之如哭其私親蘇軾嘗論光所以感人心動天地者而蔽以二言曰誠曰一君子謂軾知言軾又嘗載光語語晁補之曰吾無過人但平生所為未嘗有不可對人言耳史臣曰傳所謂㣲之顯誠之不可揜詩所謂相在爾室尚不愧於屋漏光實有焉始光當國悉改熈寧元豐舊事或謂光曰舊臣如章惇吕惠卿軰皆小人他日有以父子之義間上則朋黨之禍作矣光正色曰天若祚宋必無此事遂改之不疑君子謂光之勇孟軻不如若曰當參用熈豐舊臣共變其法以絶異時之禍實光所不取也左司諫王巖叟言臣伏觀陛下即位之初首副天下之望用司馬光執政信行其言以革天下之弊惟光憂國愛民之誠心信於上下信於内外故陛下一用之而天下之心安四夷之心安陛下之心亦安今不幸光薨臣知陛下之心漠然矣臣竊聞百姓相與憂曰吾君能不忘光之言乎能求其類而用之使持循其法乎又憂曰姦人無乃復將為朋動搖正論以欺吾君乎無乃竟為身謀不䘏國家之急以病斯民乎誰復以吾君之心為心以吾民之意為意夙夜盡瘁以遺其身如光者乎吾君方倚光以圖治而天遽奪之其何意耶臣願陛下益厲乃心益事乃事益重所付不可泰然以忘憂也今宜先有以釋民之憂而安其心者惟當果於去姦審於進賢二端而已爾夫大忠在朝姦人雖未去猶有所忌而不能為也光薨姦人今不可少留矣此臣之所言陛下當果於去姦也朝廷輕重天下安危生靈休戚在用人而已今天下將觀陛下用人以卜否泰此臣之所以言陛下當審於進賢也去姦進賢皆有以恊天下之望則百姓何疑而憂哉惟陛下圖之天下幸甚貼黄稱自古人臣因妬賢嫉能之心而遂害國事者無世無之臣光之賢上則見信於陛下下則見信於百姓人人自耻為不及也臣恐此後必有妬光者隂以妄言毁短光之所為以踈陛下之心俟間隙一開則將入其邪說行其姦謀以壞善政陛下不可不察也臣平生未嘗與光接又未嘗受光恩非私於光也惟恐小人或誤陛下耳今天下事大定矣民心安且樂矣此治道之成而聖功之著也惟在陛下持之益堅信之益篤勿有所移則天下幸甚中外之人皆望大禮後罷張璪軰二三佞邪無狀之人何意璪軰未去而先失忠臣此中外之心以為歎恨之深者也今若璪軰自請願陛下早賜從之别命忠賢以重朝廷以為國家倚頼以慰服天下之心尤不可更容遲久玷辱廟堂使蒼生失望四夷不安也戊午齋於垂拱殿太常寺言司馬光薨適在眀堂散齋日内嚴父配天國之大典固不可廢至於御樓肆赦恐亦難罷惟紫宸殿受賀一節縁慶賀之事比之宗廟之祭為輕方聖情軫悼元臣而羣官拜舞稱慶恐於禮義人情未爲宜稱詔眀堂禮畢紫宸殿文武百官並依班次起居更不奏祥瑞稱賀并樓前行肆赦儀外其稱賀並罷己未薦享景靈宫辛酉大饗眀堂上詣大慶殿行禮畢改常服御紫宸殿宰相百官起居御宣徳門肆赦鬭殺罪至死雖犯在約束内情理稍輕者减一等刺配千里外輕者五百里並牢城斷訖録案聞奏應諸司人每歳該試而經十試者將來未得黜落别作一項聞奏應官員犯杖罪以下依條不以赦降去官原减者許於刑部投狀本部具元犯因依聞奏其未斷者仰大理寺案後聲說以上情輕者取㫖應見貶謫官未量移者與量移勘㑹自復差役法其民間積欠免役錢已與减放一半餘分限三年随夏稅帯納訪聞上件積欠既當差役輸納不易其未放錢數令帯納者並特與免放開封府界諸路人户見欠及未納常平息錢並特與除放其本錢與限三年随稅帯納應内外欠市易錢人户見欠錢二百貫以下並特與除放開封府界諸路塲務先為實封投狀争添價錢買撲致後來敷納不前除已收納扺當産業外見於欠人及干繫人處催納者權住催理委逐路監司同共開拆保眀聞奏當議等第特行蠲放其出限罰錢及人户調發春夫因河防急夫開修京城壕及興修水利免夫罰夫錢並與除放應在京諸路房園課利今日以前逾限倍罰錢並特與除放應民間典賣田宅有出限未納稅錢印契者自赦至限百日許自陳首與免納倍稅其罪發在赦限百日内者凖此應産茶路分茶園户所輸茶租錢積欠見行監理者特與除放應天下欠負官物元非侵盗不以有無抵當雖係侵盗本家委無抵當財産并見勒干繫保人攤納者及失催若誤支見令干繫人均賠者因水火損敗及綱船遭風水抛失或被盗騐實各無欺弊者梢工兵士因綱運欠所般物元無欺弊見尅請受者寳貨塲冶以坑窟不發及不顯侵欺係欠課利見催理者冐佃官田及户絶田土屋業并諸般隐陷租稅見理納積年稅租課利等委已貧乏無可償納者仰本属於赦到一月内看詳除放訖保眀申轉運司提㸃刑獄司類聚聞奏以上或有專條遇赦及指定許放分數並依今來赦書指揮施行開封府界諸向推行重禄法其縁受乞引領過度編配之人如經今赦未合放逐便者並具元犯保眀聞奏元祐元年眀堂赦書與前赦不同者附見吕公著家傳云文靖公之當國也每搜訪四方利害有可以施舎便民者手筆記録因大赦而行之多至數十事其後文靖罷便民事浸益少至是始盡貸青苖市易息錢及其它逋負貧不能償者凡蠲放數百萬官吏坐違法用一切之制不得理去官及以赦原者並聽收叙總校前赦凡増一十七事四方歡呼以為新天子赦令首以憂民為意無不稱慶不知所増十七事即是此掇出與前赦不同者否當考然王巖叟論奏止乞㸔詳嘉祐以來赦文則嘉祐以前便民事固不如嘉祐家𫝊乃稱文靖罷後便民事浸益少殆失之誣矣今不取巖叟論奏見三月十六日鄜延路經略司言夏國主秉常七月十日卒詔太常寺檢㑹禮例施行壬戌詔司馬光薨在諒闇中更不舉哀成服吕大中雜說司馬公之䘮眀堂行事畢蘇子由為諫官欲徃哭之正叔力止之曰方行吉禮不可弔䘮子由不從曰只有哭則不歌何嘗有歌則不哭王鞏為大宗正丞亦上章論正叔之非由此遂罷建中靖國間鞏初牽復得通判西京將行滎陽公以正叔属之使無念舊怨鞏答簡云我軰視大地衆生猶如一子况先生者乎太皇太后從叔父高遵約妻壽昌縣君呉氏封永嘉郡夫人皇太后親妺通直郎程竒妻永嘉郡君特封同安郡夫人宣徳郎李擴妻同安郡君特封丹陽郡夫人西頭供奉官趙思行妻延安郡君特封文安郡夫人右侍禁李衮妻安康郡君特封髙平郡夫人太僕寺奏王存奏議載都省劄子係九月七日王覿奏議乃係九月九日當考乞應干本寺事並依羣牧司法仍只隸尚書省或依舊𨽻樞宻院并乞内外馬事並𨽻本寺施行詔内外馬事並𨽻太僕寺直達尚書省更不經由駕部王存奏具列于月末癸亥御史中丞劉摯言臣竊惟輔弼之進退皆繫國家大體人君不可以不謹也進之必以其道退之必以其理則天下莫不為宜矣今大饗禮成風聞中書侍郎張璪同知樞宻院事安燾尚書左丞李清臣皆欲上章辭位夫此三人者並受神宗顧託之命一旦同時求退臣疑陛下必有所難之也雖然臣以為無難也俱去之則難俱留之則難盖俱留之則害天下而屈公論俱去之則傷國體而惑人情今於三人之中察事考迹權其輕重則有必宜去者不必去者臣請論之璪以傾邪柔佞竊位最久朋姦害政賣恩營私前後言者累疏其罪臣曽上殿亦屢䝉宣諭以為璪過大禮必聼去自此臣更不復論列今大饗已畢璪之引退乃其時也陛下許之亦其時也璪得掩其姦惡以禮罷去盖已幸矣朝廷雖有失刑漏網而得其不在要路不為政事之害斯亦足矣此臣謂必宜去者也若乃燾及清臣則稍異於璪皆不以節行自厲齪齪在位然而比於璪軰未有顯罪陛下若特以其受遺之故且為留之實有其名亦無甚害此臣所謂不必去者也恭惟神宗皇帝棄天下今未大祥若顧命之臣盡去不存誠恐小人私害為國生患臣之區區在此欲望聖眀照察於三人中罷璪所以安天下留燾與清臣所以眀陛下不忘先朝受遺舊臣之意全國大體以鎮羣下考之公議誰曰不然臣䝉被厚恩有所見不敢避犯分非職之誅庻補萬一貼黄稱退執政非臣所宜預知也然辱在言路事干國體者理合上聞不敢自為形迹昨者本候上殿面奏新過大禮未有班次又慮稽緩不及於事故具簡牘伏望鍳察省覧訖特賜留中又貼黄稱臣非謂燾與清臣宜在執政也又非私於二人為之游說也但以其被先帝顧託又今年未大祥恐須且留之假借二人成就朝廷事體更俟徐徐漸作次第罷之未晚也非如蔡確章惇及張璪皆罪惡暴著先當去之工部郎中王欽臣為太僕少卿加直祕閣從文彦博之請也御集九月八日丙寅詔中書省今後太僕卿少丞簿並選差應外監事令本寺依舊羣牧司法施行王存奏乃以外監依舊羣牧司法指揮係八月二十三日當考當時兵部符下諸路亦稱八月二十三日御史中丞兼侍讀劉摯言臣伏見左僕射司馬光薨逝朝野人情驚悲一詞皆曰天不遺此一老以大濟我國家而奪之速此何理也臣恭惟陛下以至眀至聖首識光志置諸左右舉天下聽之而光亦以大忠直道忘身徇國雖姦謀異心百端排沮而横身當之夙夜盡瘁以死圖報其純誠至公足以薦天地而貫鬼神真所謂社稷之臣矣然非陛下信任之眀仰成之篤則光亦安能以自行其志故天下不獨嘉光事君之盡節而以陛下任賢勿貳為難能也今光云亡兩宫車駕即日臨奠賻襚之典有加故常下至縉紳善士閭巷鄉野之人罔不為哀歎而惟是姦邪之黨醜正惡直之徒頗已相與有竊喜之意盖小人從來鞅鞅不快於新政藏情匿跡日夜窺伺常幸有非意之變以冀治之不能成今其臆度以謂陛下既失光之助則前日求治之志必稍變懈遂可以乘便投隙熒惑而動搖此其所以喜也且陛下為政以來收拔衆正布列上下制國之法除民之害雖節文潤色有未齊者至於大本已定十之八九矣惟陛下益加之意常以辨别邪正保邦愛民為念堅守此指終始如一而已己行之令持循無變則治道成矣廟堂之上必有如光之事朝廷者臣實懼陛下悼光之後謂誰助我者而意稍有間則邪謀隂計或起而乗之此臣之所以為私憂而獻其說也抑臣又有過計之言盖今上宰虚位竊惟不日制詔命相矣此尤不可以不謹外論籍籍謂文彦博必代光之任臣固知不然然於萬一之中不可以不言彦博年逾八十爵位窮極於天下矣前日陛下假其威望以為朝廷之重其官則天子之師傅其職則平章軍國之重事陛下之禮元老尊崇優佚可謂得其體也今若任之以為相則三省有職守矣其成敗之責豈師臣之所宜當其繁悉之務豈老人之所宜辦殆非所以處彦博也又彦博於知人非其所長賢士大夫罕出其門近日有所薦論衆皆傳之為笑若居上相引用人物每每如此今日引一二眀日引三四積而至於百十常材列於朝路非小害也其人重其位高有所薦者若陛下違其言則傷恩皆從之則害政又非所以安彦博也臣昨四月中巳曽建論此事矣故今日之命相實繫天下之安危與善政之成敗可不重哉伏望陛下詳考歴選得其人而任之以尊廟社以厭公議臣不勝隕越待罪之至惟陛下赦其愚而察其忠貼黄稱臣又聞彦博薦馮京為相而或𫝊言陛下已遣使詣京所矣臣得風聞未審虚實京向因疾病遂成昬耗事多健忘更乞聖慮周詢詳察命相大事不可輕舉本注云元祐元年九月十三日今附十一日王覿奏前右正言王覿言臣近者伏見左僕射司馬光以疾不起中外人情所共痛悼乗輿親奠恩禮甚渥固其宜也光社稷臣也執政朞年之間興利除害進賢退不肖功業赫然著於天下凡有識之士不以光得行其志為難而以陛下特逹拔擢用光于閑退之中而信任不疑為難也然光之薨上自聖情次及賢士大夫下至於民庶莫不嗟惜而姦邪傾險之人則方且私相慶快也非徒慶快之而已又幸非光比者入而為相則庶㡬得以復逞其私焉然則陛下命相可得而不謹哉或者竊謂太師文彦博且將代光執政矣臣愚决知不然也何則陛下前日既知彦博耆老當尊禮之而不以三省細務攖之矣今日豈復用以代光執政哉陛下以師臣處彦博最為得體仍俾之平章重事此曠世殊禮也人臣之榮無以加矣彦博以耆徳重望而當此殊禮誰曰不然固足以尊朝廷而鎮四境也惟不當專委以政夫三省事務之繁既非年逾八十之人能任且又政事之要莫甚於用人而彦博素無知人之譽故比者入朝首薦崔台符而次引楚建中縉紳傳以為笑陛下聼覽之所及也臣固知陛下必不委彦博以為政也或者之所謂乃私憂過計而已臣又聞中書侍郎張璪將乞補外而適當大禮之後執政大臣必更有求去者或者深疑朝廷以求去者之多既不可以皆聽則璪將亦縁此而留矣臣愚亦以為不然也夫璪之不安其職自以彈劾者衆私慝暴著公議不容而求去焉與夫無故而求去者異矣朝廷禮意何可以均一也自祖宗以來執政大臣於大禮之後請去者非一或聽或否繫於臨時顧其人之如何耳若璪者雖無請猶當去之况其有請哉臣故知陛下必不以請去者多而璪亦得留也或者之所謂亦私憂過計而已臣又見侍從之間久次之人其材能趨向鮮有同者陛下將以補執政之闕尤不可以不謹也夫知臣莫若君惟不限以資秩前後而視其大公至正之心能為陛下消危疑厚風化興利除害進賢退不肖而用之則有補於聖政矣陛下勿謂司馬光既薨之後更無其人也臣願陛下左右大臣必深察詳擇之既知其可用矣則禮遇之信任之無忽焉異日必有盡忠於陛下如光者出矣茍非其人而有蠧於國則去之何傷故曰任賢勿貳去邪勿疑也此臣之所陳陛下皆有已行之效者聖心慮之當已熟矣何必臣言然臣之區區以為陛下惟能終始於此則可以成太平極治之業而無媿於堯舜三代之君也惟聖慈詳酌覿自注云九月十一日今附本月日丁邜中書舎人蘇軾為翰林學士范百禄為刑部侍郎錢勰爲給事中太常少卿鮮于侁為左諫議大夫侁七月六日已遷大理卿今乃復以少常除左諫大夫盖七月十二日罷大理卿復少常故也太常少卿梁燾為右諫議大夫右司諫蘇轍為起居郎吕氏家塾記云元祐初蘇轍為直舎人院有司檢舉自官制行舎人院廢今舎人職事乃在中書後省於是改權中書舎人遂為故事附注當考十月二日丙戌轍以權中書舎人論梁惟簡左司諫王巖叟為侍御史十月十六日巖叟入謝與劉摰同對左正言朱光庭為左司諫右正言王覿為右司諫覿知人安民䟽或附此已附正言初蘇轍言伏念臣頃自踈外擢居諫垣衰廢之餘才力耗竭黽勉嵗月無所建眀近因朝廷除張頡為户部侍郎杜紘為右司郎中公議紛然謂非其人臣繼上封章極言其事杜紘雖才性鄙佞玷辱華要而罪惡未著臣亦不敢力言至於張頡為性嶮躁臨事乖方歴任以來罪狀山積臣以為事既明白是以前後五次上言不知頡久事要權植根深固一為左右之保任遂致聖意確然不移臣屢獻狂言誠不量力雖聖恩寛貸未賜譴訶豈敢冐昧寵榮復塵要近言不稱職臣猶自知當黜反遷衆必指笑伏乞特回誤恩除臣一外任差遣俾臣得免清議不勝幸甚詔不許轍又言君父之命所當敬從臣實何人敢有固執特以臣前言張頡除户部侍郎不當前後五狀不䝉施行頡之罪名著在案牘傳於公議而大臣主之愈力朝廷用之不疑則是臣謗毁忠賢眩惑天聽狂妄之誅所不當赦臣今不敢復論其事但以言為職言既不用理當廢黜銜媿冐寵義實不安伏乞檢臣前奏除臣一外任差遣以全臣進退之分所有起居郎告命不敢祗受詔不許自朱光庭王覿遷右司諫後正言久闕不除明年六月乃除丁隲為右正言王巖叟論奏附眀年六月詔神宗皇帝神御殿令學士院撰名戊辰内外官並以明堂赦書加恩奉議郎刑部員外郎杜純為大理少卿新除大理少卿王振依舊為刑部郎中王覿乞與振遷少監當八月二十七日劉摰有言承議郎監察御史陳次升權提㸃淮南路刑獄新權知蘇州吳安持為將作少監以安持言母老多病從其請也知代州東上閣門副使髙遵一母亡奏乞解官持服詔不允令遵一弟遵惠䕶䘮至京庚午太師文彥博言乞罷臣男貽慶與理轉運判官資序居中免差宗正寺簿詔居中依所乞仍舊西京勾院貽慶不許辭免八月二十八日辛未起居郎修實録院檢討官林希為中書舎人右司諫王覿言竊聞起居郎林希召試中書舎人希雖薄有文藝素號憸巧當王珪用事之際希謟奉之無所不至與其不肖子弟日相親昵及韓縝作相希復為其鷹犬今中書侍郎張璪傾邪著聞士人之稍自重者莫不耻逰其門而希與之深相交結不畏譏議何可使代言禁掖入侍近班兼聞希已有章乞免召試伏望聖慈指揮除希一外任差遣所重朝廷名噐不濫邪正有别貼黄稱林希親弟旦見為殿中侍御史與臣同在言路臣不敢以旦之故隐其兄之惡以負陛下言責惟聖慈詳酌又言張璪久知公議不容自春夏以來宣言於縉紳欲求退至秋初即云俟過眀堂大禮今已過大禮不聞其請復入中書視事揚揚自若貪戀榮利曽無媿耻若更以林希為舎人二姦相濟為害益深伏望聖慈出希外任以翦巨蠧之爪牙罷璪重權以絶朋黨之根本此天下之幸也昭宣使嘉州刺史内侍右班副都知劉有方為宣政使幹當皇城司任滿當遷也責授右屯衛將軍曹詩復舒州團練使駙馬都尉右監衛將軍王詵復登州刺史駙馬都尉宗正寺言既許主簿通管寺事竊恐亦各依太常寺國子監例止通管雜務其編纂國書乞依舊例丞專修從之中書舎人蘇軾言凖吏房送到詞頭朝散郎吳荀除廣南東路轉運判官者臣聞孟子觀逺臣以其所主近日朝廷進監司全用舉主如呉荀者名迹無聞而舉主三人乃吕惠卿楊汲黄履履之為人朝論不以正人待之如惠卿汲窮姦積惡不待臣言而知今乃擢其所舉使臨按一道臣實未曉其說有所告詞未敢撰吳荀除廣東運判實録在九月十六日據蘇軾奏議乃稱三月十六日必奏議誤以九月十六日為三月十六日也今依實録附九月十六日然為九月十六日軾已除内翰矣或已除内翰猶未罷西掖故有此論列也詔中書舎人時暫闕官依門下尚書省例只批送本省官兼權王覿論奏在十一月八日此據覿疏附見
