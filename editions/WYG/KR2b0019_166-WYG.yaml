body:
  text: 續資治通鑑長編巻一百六十二宋李燾撰仁宗慶歴八年春正月辛未夏國主曩霄卒曩霄凡七娶一曰黙特氏舅女也生一子以貌類他人殺之二曰索氏始曩霄攻􅈊牛城傳者以為戰没索氏喜日調音樂及曩霄還懼而自殺三曰多拉氏早死四曰宻克黙特氏生子阿哩謀殺曩霄為鄂桑格所告沈于河殺宻克黙特氏于王亭鎮五曰葉勒氏約噶從女也頎長有智謀曩霄畏之戴金起雲冠令他人不得冠生三子曰寧明喜方術從道士路修篁學辟榖氣忤而死次寧􅇒噶曩霄以貎類己特愛之以為太子次錫哩蚤死後復納摩伊克結星女營天都山以居之葉勒之族宣言吾女嫁二十年止故居而得摩伊克女乃為修内曩霄怒㑹有告約噶兄弟謀以寧凌噶娶婦之夕作亂曩霄遂族約噶綱朗凌沁布等三家既而葉勒氏訴我兄弟無罪見殺曩霄悔恨下令訪遺口得約噶妻閻于三香家後與之私通葉勒氏覺之不忍誅約噶妻乃出為尼號宻藏大師六曰耶律氏七曰摩伊克氏初欲納為寧凌噶妻曩霄見其美自取之號為新皇后寧凌噶憤而殺曩霄不死劓其鼻而去匿黃羅滂家為羅滂所殺曩霄遂因鼻瘡死年四十六宻藏氏初為尼寓于偽興州之戒壇院既娠而曩霄死曩霄遺言立從弟威噶爾寧其大酋威尚對宻香碩克威朗布葉木朗羅與宻藏羅滂議所立宻藏大族也羅滂為之長衆欲如遺言立威噶爾寧羅滂獨弗許曰威噶爾寧非子且無功安得有國威尚對曰國今無主然則何所立不然爾欲之乎爾能保有夏土則亦衆所願也羅滂曰予何敢哉夏自祖考以來父死子繼國人乃服今宻藏尼娠先王之遺腹幸而生子則可以嗣先王矣誰敢不服衆曰然遂立宻藏尼偽號太后曩霄既死三月諒祚生案宋史諒祚小字寧􅓸噶以慶歴七年二月六日生至八年正月方期歳即位據此編則寜􅇒噶又是一人而諒祚乃遺腹也未詳孰是以毛惟昌髙懐正之妻更乳之而政在宻蔵氏惟昌懐正皆漢人本約噶帳下故親待之已而懐正貸銀夏人惟昌竊衣曩霄所與盤龍服皆為羅滂所族甲戍度支副使工部郎中鄭驤權河北轉運使仍就貝州經度軍須乙亥明鎬言貝州距闉火斬守闉三班奉職李興初貝州城峻不可攻乃謀築距闉度用工二萬人期三十日可與城齊而賊亦於城上設戰棚與官軍相當名曰喜相逄距闉將成又為賊所焚火三日不滅既斬興乃用軍校劉遵計即南城鑿地道而日攻其城以牽制之貝州民有汪文慶郭斌趙宗本汪順者自城上繫書射眀鎬帳約為内應夜垂絙以引官軍既納數百人焚樓櫓賊覺率衆拒戰初官軍既登欲專其功斷絙以絶後來者及與賊戰兵寡不敵與文慶等復縋而下是夜城㡬克丙子授文慶斌西頭供奉官宗本順右侍禁丁丑右諫議大夫參知政事文彦博為河北宣撫使本路體量安撫使樞宻直學士左諌議大夫明鎬副之鎬督諸將攻貝州城久不下帝憂之問輔臣策安出彦博乞身往破賊故遣彦博宣撫而改鎬為彦博之副先是樞宻使夏竦惡明鎬恐其成功凡鎬所奏請輙從中沮之彦博既受命因言軍事中覆不及願得專行戊寅詔許彦博以便宜從事彦博請用將作監主簿鞠真卿等三人掌機宜文字許之明鎬所奏辟殿中丞王起等四人仍聴隨軍入内供奉官李繼和為走馬承受賜貝州城下軍士特支錢辛巳詔士庶之家所藏兵器非編敇所許者限一月送官如故匿聴人告捕之貝州賊謀竊出要刼契丹使明鎬諜知之遣殿侍安素伏兵西門壬午賊果以三百人夜出伏發皆就獲之是日江寧府火初李景在江南大建宫室府寺其制皆倣帝京時營兵謀亂事覺伏誅既而火知府事右諫議大夫集賢殿學士李宥懼有變闔門不救延燒㡬盡唯存一便㕔乃舊玊燭殿也尋責宥為祕書監直令致仕宥奏火事云不意禍起蕭墻變生回禄㑹新有衛士之變朝廷惡其言故責特重宥責官在三月乙巳今并書奏表辭據司馬光記聞癸未命翰林學士宋祁權御史中丞魚周詢定奪陜西河東銅鐡錢利害以聞具六月末乙酉降空名告勑宣頭劄子三百道下河北宣撫使以備賞戰功是日彦博至貝州城下此據甘陵伐叛記先是刑部員外郎知諫院吳鼎臣言朝廷方與契丹保誓約而楊懐敏増廣塘水輙生事民或怨叛雖斬懐敏無及矣戊子命鼎臣為河北體量安撫使令經度塘水利害而鼎臣更顧望依違不能决也詔給建寧軍留後勾當軍頭司楊景宗公使錢三分之一他不得援例近制刺史以上公使錢非外任不給景宗縁章惠太后故特給之庚寅詔舉官陞陟及換右職者非依編敇及御札無得施行時言者以為近嵗薦舉多濫亦有負罪不可湔滌之人得更職率為朋黨以市私恩不可不革也癸巳東頭供奉官閤門祗候張忠為崇儀副使忠攻貝州先登而身被重創特擢之忠本龍猛軍士開封人也乙未日赤無光戊戌工部郎中傅永為陜西轉運使永考城人前為梓州路轉運使夷獠㓂合江鈐轄司檄兵掩擊永馳至案知合江吏冐取播州田衆怒乃叛永以吏配嶺南夷獠聞之散去轉運使職田在廣安軍嵗入米四百斛軍遣四校變貿得四千緡永止令凖市估鬻之文彦博自成都還言其治狀進永一官於是改使陜西刑部貟外郎王逵為河東轉運使書此為葉清臣條對甲寅詔問張本按逵墓誌自河東責光州當檢月日詔諸州軍祠祭在城外者長吏及兵官聴不親行監司夜過者無得輙開城門違者以違制坐之本閏月庚子詔今移入此嫌與貝州事相亂也官軍攻貝州城北甚急賊盡鋭禦之而南城所穴地道潛達城中賊初不知也閏正月庚子朔文彦博夜選壯士二百銜枚由地道入右班殿直曹竭等𨗳之既出登城殺守陴者埀絙引官軍賊縱火牛軍稍却軍校楊遂援槍中牛鼻牛還走賊衆驚潰王則開東門遁閤門祗候張絪縁壕與戰死之王信捕得則餘黨保村舍皆焚死則自反至敗凡六十五日遂開封人也辛丑文彦博遣李繼和來告貝州平賜繼和錦袍金帶彦博請斬王則於大名府夏竦言恐所獲非真盗當覆視之乃詔以檻車送則京師彦博附𫝊云牢城卒董秀劉炳請穴地以入貝州記聞與附傳同按實録始謀穴地者劉遵也今從實録附傳云帳前虞候楊遂請由地道先入據實録乃曹竭也記聞亦稱楊遂與實録不同今從實録楊遂盖能以槍中牛鼻者亦從竭入地道爾甘陵伐叛記載攻城事甚詳張忠田斌二人盖先登者又與附傳及實録異當考三月辛酉以右班殿直董秀為閤門祇候據此則秀非牢城卒也附傳誤矣王則之以貝州反深州卒龎旦與其徒謀以元旦殺軍校刼庫兵應之前一日有告者知州王鼎夜出檄遣軍校攝事外邑而陰為之備翼日㑹僚吏置酒如常叛黨愕不敢動鼎刺得實徐捕首謀十八人送獄獄具俟轉運使至審决未至軍中恟恟謀刼囚鼎謂寮吏曰吾不以累諸君獨命取囚桀驁者數人斬於市衆恐失色一郡帖然轉運使至囚未决者尚半訊之皆伏誅壬寅升冀州為安武軍甲辰曲赦河北賜平貝州將士緡錢戰没者官為𦵏祭之兵所踐民田除夏秋税改貝州為恩州乙巳詔恩州置旌忠寺以追福戰没軍士又設水陸齋於京師普安院丁未祠部貟外郎祕閣校理張瓌為兩浙轉運使瓌十年不磨勘遷官朝廷奬其退静故用之此據文彦博皇祐三年五月奏瓌本傳獨不載此戊申右諫議大夫參知政事文彦博為禮部侍郎平章事樞宻直學士左諫議大夫明鎬為端明殿學士給事中馬軍都虞候象州防禦使王信為威徳軍留後入内副都知宫苑使眉州防禦使麥允言為昭宣使遂州觀察使西京作坊使資州刺史王凱為澤州刺史東上閤門使榮州刺史知恩州髙繼隆為引進使陵州團練使崇儀副使真定府路都監張忠為西染院使資州刺史自餘兵官各以功次遷京朝官及選人預軍期者六十人都虞候至士卒八千四百人第其功為五等第一等一百六十人轉五資第二等三百人轉四資第三等三百人轉三資第四等六百人轉二資第五等一千八百人轉一資其餘賜緡錢有差贈馬遂為宫苑使遂開封人初𨽻龍衛軍補散直改三班奉職為北京指使聞王則叛中夜叱咤晨起詣留守賈昌朝請擊賊昌朝因使將牓入城招賊降則盛服見之與飲茶遂諭以禍福輙不答遂將殺則而無兵仗自隨時張得一在側遂欲其助己目得一得一不動遂奮起投桮抵則扼其喉擊之流血而左右卒無助者賊黨攅刃聚譟至斷其一臂猶詈則曰妖賊恨不斬汝萬叚賊執遂縳而支觧之則猝被毆傷病數日乃起事聞上歎息久之則既誅乃追贈遂封其妻為旌忠縣君賜冠帔官其子五人後得殺遂者驍㨗卒石慶使其子剖心而祭之壬子復置三門白波發運使乙卯武勝節度使檢校太傅同平章事判大名府兼北京留守司賈昌朝為山南東道節度使加檢校太師進封安國公以恩州平也翰林侍讀學士楊偕言賊發昌朝部中至出大臣乃能平昌朝為有罪不當賞弗聼辛酉降河北轉運使兵部郎中皇甫泌監青州税提㸃刑獄祠部員外郎田京監鄆州稅前知恩州四方館使昭州刺史裴徳輿追三官為池州團練副使前恩州鈐轄皇城使李昭度追三官為濠州團練副使恩州都監内殿承制馮文吉除名長流梅州監押右侍禁趙惟一杖脊配沙門島泌京坐賊發所部徳輿昭度並以妖黨結集久而不察也文吉惟一皆懦怯棄城而文吉後頗宣力得以减死論是夕崇政殿親從官顔秀郭逵王勝孫利等四人謀為變殺軍校刼兵仗登延和殿屋入禁中焚宫簾斫傷内人臂其三人為宿衛兵所誅王勝走匿宫城北樓經日乃得捕者即支分之卒不知其所謀樞宻使夏竦言于上請御史同宦官即禁中鞫其事且言不可滋蔓使反側者不安參知政事丁度曰宿衛有變事闗社稷此而可忍孰不可忍固請付外臺窮治黨與自旦爭至食時上卒從竦議爭獄事據孫抃所作墓誌并司馬光記聞甲子降勾當皇城司建寧軍留後楊景宗為徐州觀察使知濟州皇城使康州刺史入内副都知鄧保吉落副都知為潁州鈐轄左藏庫副使通州團練使入内副都知楊懐敏為文思使賀州刺史北作坊使亷州團練使劉永年為洛苑使英州刺史蔡州都監洛苑使眉州防禦使趙從約領陵州團練使為濮州都監供備庫使榮州刺史帯御器械王從善落帯御器械為曹州都監從善等五人皆外遷獨懐敏領職如故樞宻使夏竦庇之也劉永年從徳子王從善未詳先是有詔釋景宗等罪御史中丞魚周詢侍御史知雜事張昪御史何郯等言殿廷所置宿衛本為人主預備非常今衛士自生變故所為兇悖意不可測兼後來獲餘黨最為要切聞累傳聖㫖令未得殺死而全不依禀盖是本管臣僚懼見捕獲之後勘鞫得情理深切所以容縱手下衆人毆死以圖滅口欲輕失職之罪情狀如此理無可恕太祖朝酒坊火發本處兵士因便作過太祖以本坊使副田處巖等不能部轄並處極法今乗輿咫尺賊亂竊𤼵兇惡之状無大於此居職者既不能察舉當宿者又不即擒捕未正典法何以塞公議深恐朝廷威令從此寛弛伏乞斷自聖意特降指揮將應係勾當皇城司及當夜宿直臣僚並等第重行黜降用振威罰所貴禁近之司不敢曠慢從善等既外遷郯等又再具奏乞罷黜懐敏且言未審臣等所奏留中不曽付外為復中書樞宻院不為施行伏縁衛兵竊發兇悖至甚懐敏適居官守不能先發姦謀致盗入宮闈驚駭御寢未行譴責深屈典章乘輿所繫至重今文武多士以朝廷獨寛懐敏有心者無不憤激有口者無不驚嗟以至里巷愚民亦皆騰沸國家用刑當示公共不可以一近習致失衆心尋有詔懐敏落入内副都知與在京差遣郯等又言懐敏與鄧保吉俱是勾當皇城司賊發之夜懐敏正當内宿責其曠職得罪合重一等今保吉等例授外任懐敏獨留京師刑罰重輕頗為倒置中外聞見尤所不平伏乞特從聖斷一例責授外任上令中書召郯等諭以獨寛假懐敏之故郯等又言人主所以享天下之重盖由法令等級明辨使人不敢凌犯然後極其尊爾故法令行則朝廷以之彊法令偏則紀綱以之紊至於宫闈之變下人輙敢謀亂者前代間或有之皆由人君失徳所致陛下撫恤禁旅未嘗以喜怒妄行刑誅雖甚無識寧不愛戴今衛士持刃直入禁庭欲凌犯乘輿是匹夫而有窺伺之意此有司不舉職法令寛縱所生也為大臣者宜為陛下深責有司失察之罪如楊景宗等並當誅戮以謝天下若以其過非自取止可貸其正坐並宜流竄以戒不職景宗等罰既甚輕懐敏又獨異衆盖兩府大臣畏陛下左右之怨怒不能堅執祖宗之法也若當賊發之際懐敏能於後殿即時捕獲猶可贖罪今賊已入禁庭兩夕之間陛下被此震驚固亦甚矣懐敏縱有先報之効其可贖失察之罪乎且以人主之尊寛一懐敏罪固亦細事茍於國體無傷臣等何必苦更論列所惜者祖宗之法爾太祖朝元舅杜審肇知澶州只坐界内河决免官歸私第太宗朝椘王宫火災廢楚王元佐為庶人以懐敏職在近侍孰與元舅諸王之親以懐敏失察賊亂孰與誤河决火災之備利害大小較然可知而審肇元佐重責如彼懐敏寛假如此伏望陛下舉祖宗之法以塞公議正左右之罰以示無私不惜出一懐敏慰中外臣子之望則天下幸甚又言昨者河北恩州賊發之時提㸃刑獄田京率先奏報轉運使皇甫泌先至城下朝廷不為末减各已責降監當今賊至殿内比恩州事體不同懐敏若以先報减罪即是逺近異法威令不行天下觀聴何以厭服兼恐曽與交結之人宻為營救妄稱懐敏有功不可同等黜降伏望特排邪議一例責授外任以協公論上語輔臣以宫庭之變美人張氏有扈蹕功樞宻使夏竦即倡言宜講求所以尊異之禮宰相陳執中不知所為翰林學士張方平見執中言漢馮媫妤身當猛獸不聞有所尊異且皇后在而尊美人古無是禮若果行之天下謗議必大萃於公終身不可雪也執中聳然從方平言而罷張氏此時未為貴妃墓誌及附傳皆云貴妃誤也初諌官言江寧上始封之地守臣視火不謹府寺悉焚宜擇才臣繕治之命司農卿林濰代李宥濰固辭不行乃命濰知袁州改命龍圖閣直學士吏部郎中張奎為右諌議大夫知江寧府奎既至簡材料工一循舊制不踰時復完丙寅磔王則於都市知洪州太常丞直集賢院李絢為荆湖南路轉運使時五溪蠻㓂湖南擇轉運使帝曰有館職善飲酒者為誰今安在輔臣未諭帝曰是往歳城邠州者其人才可用輔臣以絢對遂除之絢乗驛至荆湖戒諸部按兵無動使人諭蠻以禍福蠻悦罷兵受約束初元昊犯延州並邉皆恐絇通判邠州城卑不完絢方攝守即發兵治城寮吏皆謂當言上待報絢不聴帝聞之喜因詔他州悉治守備城邠州當是元昊犯延州時今附此丁卯誅張得一其弟兄悉坐降官妻子論如律得一以西上閤門使知恩州視事八日而亂作賊置得一州􅇬之西日具食飲初賊取州印語曰用訖却見還毎見賊必呼曰大王先揖而坐坐必東向又為賊講僭擬儀式賊平得一付御史臺劾治獄具朝廷議貸死中丞髙若訥謂守臣不死自當誅况為賊屈乎得一坐棄市得一既誅其第當没官翰林學士張方平言得一父耆真皇寵臣也此第本恩賜今得一妻子免縁坐耆在且子衆輙没其第於法不類詔還之此據方平附傳然與實録不合當考是日臣僚上言皇城司在内中最為繁劇祖宗任為耳目之司勾當官四貟多差親信有心力人近年員數倍多並不選擢乞今後只差四員選經歴有心力沉厚之人勾當更不許人指射陳乞如違並以違制論從之
