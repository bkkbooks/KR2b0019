body:
  text: 續資治通鑑長編巻四百十二宋李燾撰哲宗元祐三年六月丙子朔詔鄉户衙前役滿未有人替者依募法支雇錢如願投募者聼仍免本户身役不願投募者速召人替吏部言熈寜敕知州通判川廣以二年為滿元豐敕川廣以三十月元祐敕知州通判並以三十月為任即不分川廣請川廣知州通判除有專法指定及酬奨外不論見仕新差官並二年為任其使闕滿替悉依本法從之丁丑朝請大夫天章閣待制知杭州楊繪卒舊録云繪嘗薦屬吏王永年御史蔡承禧言其隂為姦私通饋賂下有司而永年自言繪嘗納真珠許薦為閤門祗候獄具而永年前死坐貶荆南節度副使新録辨曰永年獄未具而死事難辨明當略其詞移入楊繪卒時己卯詔王中正宋用臣並展一期叙政目初四日宋用臣監滁酒實録無之元祐元年正月十四日又四月十八日四年八月四日六年閏八月二十四日可考詔待制以上落職期滿檢舉者今後並量元犯取㫖舊録云舊制侍從官落職期滿檢舉例復職至是韓川為左司諫以前所貶官於法當叙恐其復用故先事建言而有是詔新録辨曰舊制侍從官得罪於法當檢舉者不過叙官復職而已用與不用自繫朝廷韓川安能預知其復用而先事言之自舊制以下四十四字合刪去詔諸宫學教授闕選所舉學官及可為師表可備講讀科充不足則三省選差仍取升朝官以上有出身年四十以上者中散大夫鴻臚少卿龎元英知晉州庚辰詔將來一次科塲如有未習詩賦舉人許依舊法取應解發合格人不得過解額三分之一應解二人者均取即有零分及解額一人者並通取文理優長之人此據諸州編録條貫冊元祐三年六月五日聖㫖今移附本年月日舊録并入二年十一月十二日新録因之且云令禮部立詩賦格式以聞按當時所頒降文字並非立詩賦格式盖令禮部議差官等法本部以為不須别立但立此一法奉聖㫖依奏不知舊録何故却云令禮部立詩賦格式按三年十一月十一日彭汝礪奏禮部牒奉聖㫖令兩制兩省同共㸔詳修立到考校詩賦并格式聞奏又不知此聖㫖是何月日降或即舊録所云自别有月日而舊録并入二年十一月十二日乎斟酌其時令兩省兩制㸔詳格式必當在此六月初五日後也四年十二月二十四日實録載禮部申明此條亦無令禮部立詩賦格式指揮二年十二月已立四塲法辛巳詔勿收知樞宻院事安燾乞解機務文字癸未詔左右司諫正言殿中侍御史監察御史以升朝官通判資序實歴一年以上人充初太皇太后宣諭曰近時臺諫官多是新進未甚更事所論不知朝廷大體近於求名可依祖宗故事選用歴第二任通判人充司空吕公著言近制舉官不以資序因檢㑹舊制而有是詔王巖叟有章論舉法太嚴乞除去實歴一年之文從違當考巖叟章附五年四月八日詔三省同得㫖事就中書諸房選差三省本房人吏兼同行遣依條由給舍進呈得㫖者並依已得畫㫖更不覆奏直送曹部等處施行仍具奏知三省各録留為底餘依舊政目云三省同得㫖事就中書房三省同行直送曹部朝奉郎知襄州邢恕除直龍圗閣差遣如故初恕由起居舍人出知随州改汝州又改今任用期檢叙也自随改汝政目在元年十一月二十四日直龍圖閣在四日詔保甲補借差以上者初該磨勘有本轄官二員同罪奏舉陞陟聼如常法磨勘即無舉主或不足或犯贓若私罪徒即展二年應别格合展者並累展其元豐元年以後補授人雖經磨勘改轉内歴一任先無舉主或不足者將來磨勘亦如之甲申罷潭州安化縣博易塲其人户欠息特行除放趣納本錢從荆湖南路轉運司請也詔刑部應天下奏到大辟案除疑慮可憫及依法奏裁自合依舊取㫖外但情理稍有可議者亦具因依取㫖丁亥詔賜北京恩冀州界修河役兵夏藥特給錢詔經明行修黄杲卿黄穎並特與應天府助教以被舉不至御史中丞孫覺請各就除一官教導後進故有是命詔今後諸蕃國貢物估直與舊例相近者並如例即所估髙下増減不同申禀尚書省工部言嘉州豐逺監歳鑄錢八萬有竒止以職官兼領請依舊置監官一員於本路選舉具姓名申吏部從之戊子詔河岷蘭州緣邊今後諸蕃客般擦入漢買賣回日許由城寨搜檢不得帯錢入蕃若在漢界聼其便庚寅日有食之辛卯四方館使嘉州團練使狄諮復引進使壬辰詔命官犯罪有虧名教雖無特㫖者並申尚書省奏裁癸巳龍圖閣待制知越州熊本知杭州尋罷之尋罷據政目當考上批訪聞見修黄河役兵死損逃亡不少顯是本處飲食衣服醫藥不至如法當職官吏不切用心照管及聞役兵病患稍重多是作發遣歸廻本州名目避免損折分數當此暑熱道途轉運更多損失可速降指揮嚴與約束施行仍勘㑹逐處所役人兵元初若干自工役後來損失若干具詣實聞奏御集六月十七日手札丁酉龍圖閣直學士祕書監吕公孺為刑部侍郎刑部侍郎孔宗翰為寳文閣待制知徐州宗翰以疾求補外也翌日宗翰卒舊録宗翰傳上即位知兖州道除司農少卿未就職遷鴻臚少卿司馬光方銳意紛更法度宗翰曰新法便於民者公勿遽也光黙然新録辨曰宗翰徒為此言無益於利害之數今刪去朝請郎林旦為右司郎中詔坤成節崇政殿上夀文臣待制武臣觀察使皇城團練使以上並赴百官表賀於内東門詔邢趙州知州今後互差武臣從安撫使滕元發請也朝奉郎知徐州杜純為淮南路轉運使尋詔純依舊知徐州純必有故當考十月十八日改陜西運使己亥侍御史盛陶言責降官情理重檢舉者請量所犯取㫖從之詔在京都商稅院以天聖年所收歲課為額元祐初户部用五年併増法立新額歲課不登官吏多坐責罰言者論之而有是詔以夏熱權停在京工役三日中散大夫少府少監鍾離景伯知夀州辛丑夏人㓂塞門寨詔陜西河東經略司嚴戒城寨當職官増完守備如夏賊攻犯非逼近城下决可取中勿多施放自致闕誤夏人以四月二十四日㓂塞門不知此段所書果在何日恐不應再㓂當考朝散郎吏部郎中彭次雲為淮南轉運使五月四日除益漕尋止壬寅龍圖閣直學士光禄大夫致仕韓贄卒癸卯詔今後應除六曹郎中選第二任知州以上資序實歴知州或曾任監司官六曹員外郎校理臺諫官開封府推官並滿二年人充少監員外郎府推官選第二任通判以上資序或初任通判曾歴外任親民二年人充寺監丞選第二任知縣以上資序人充右正言劉安世言臣昨自四月後來三次論奏胡宗愈操行汙下毁滅廉耻貪得患失背公狥私誠不足以輔佐人主參預國論欲乞出自聖斷特行罷免今已兩月未䝉指揮臣風聞宗愈任御史中丞日稅周氏之第以居每月僦錢十八千自去年七月二十一日後至今年二月終止償兩月之直其業主三班奉職周知哲累次令人乞請餘緡而宗愈每加罵辱並不支給遂於二月一日經官申訴乞差人追索及發遣起離開封官吏畏避權勢不為依公施行而遽寢其事中外傳播實駭耳目臣聞中丞之任紀綱所繫檢察非違糾正百辟官之雄峻莫與為比宗愈既長憲臺不能正身以率下而恃權貪利罔顧義理僦人之居不給其直行已無恥辱國已甚况宗愈更踐華要月俸至優近嘗奉使大遼又經押賜親王禮物所獲甚厚加之鄉里有高貲之名非不足於財乃敢挾風憲之威肆貪鄙之行輦轂之下暴横自若將以表率在位風化四方此而可赦國法廢矣伏望陛下特降睿㫖以周知哲所陳文狀付所司推究明正典刑其開封府官吏挾情違法之罪亦乞特賜指揮施行朝奉大夫權開封府推官林邵提㸃河北西路刑獄朝奉郎江南西路轉運判官田子諒為開封府推官秋七月丙午衛尉少卿直龍圖閣文及為光禄少卿案文及即彦博之子及甫岳珂寳真齋法書賛載及甫盛暑帖署名止稱及以為避宣仁后父諱今仍其舊皇城使知邠州張若訥為環慶路鈐轄知環州詔今後監司及帯職人因罪追降官資差遣或落職并特㫖責降人並檢舉申都省其不應取㫖之人若與應檢舉人同犯責降者依此殿前都指揮使武信軍節度使燕達卒舊録燕達傳元豐八年神宗寢疾益甚㑹蔡確母入禁中皇后使諭確外託主兵官燕達等輔立皇太子逮神考升遐宿衛於内東門百官朝晡臨繇垂拱殿入皇族親王繇内東門入達謂人曰天子新即位我坐甲於此以備非常萬一有姦人隨皇族而入則事起不測又豈能人人辨之將入上奏人或止之曰皇族之事非所當言言之恐被罪達曰我䝉先帝大恩㧞擢常在衆先言之茍當雖死何憾遂奏上因大嘉歎之新録辨曰蔡確誣謗事朝廷已具正其罪託燕達輔立皇太子事合刪去移注立皇太子時丁未詔有司檢㑹元豐八年定皇太妃出入儀注以進戊申皇叔荆王頵卒年三十三上為輟朝成服再幸其第賜錢三百萬贈太師尚書令荆徐二州牧追封魏王謚端獻王暴得疾左右不以聞太皇太后不及問及卒口鼻流血又或止之亦不果臨奠此舊録所載新録削去舊録載方國危疑頵獨為宗社計此誣罔固不當存如太皇太后不及問疾臨䘮安可没其實也須參考别修舊録云神宗疾徐王顥有覬倖意每侍疾褰幕直入頵屢挽止之遇蔡確數以言促確曰延安郡王太子也不立何待確猶豫未决頵曰晚則他人是有神宗疾甚顥欲留宿禁中頵奏得弗宿太子立頵助居多逮元祐初始賜第咸宜坊曰親賢宅居之仍賜國子監書諸子自勝衣以上皆進官自太皇太后聼政頵非大朝㑹未嘗進見間遣使宣召頵曰未復辟不敢徃暴得疾左右不以聞太皇太后不及問至薨口鼻皆流血又或止之亦不果臨奠方國危疑皇嗣未立頵能不負神考奮不顧身為宗社計雖古之所謂臨大節而不可奪者何以加諸新録辨曰此正蔡確等傅㑹一時之說謗誣宣仁者實録元豐八年三月上即位事辨之詳矣此一節合刪去蔡惇直筆宣仁諭范純仁等一兒一女死皆不得見事在元豐八年此可參考六日朱梁追官己酉故大理寺丞王安國特追授宣德郎仍復祕閣校理定州觀察使贈開府儀同三司追封尹國公諡恭孝克柔卒庚戌詔以荆王䘮罷大宴貶𣙜易副使兼翰林醫官副使熊日嚴而下六人坐醫治荆王不效入内東頭供奉官朱遘梁和各追兩官坐荆王疾奏聞不以時致太皇太后臨問不及故也日至酉初一刻赤如赭辛亥賜鄂特凌古詔曰省所差人進奏及乞今後依舊差般擦上京進奉事具悉惟爾祖先世篤忠孝本與夏賊日尋干戈亦惟恃我朝廷爵秩之隆用能保爾子孫黎民之衆肆朕命爾嗣長乃師而自承襲以來強酋外擅爾弗能禁恣其所為遂據洮城以犯王略隂連夏賊約日盗邊朕愍屬𦍑之無辜出偏師而問罪元惡俘獲餘黨散亡山後底平河南綏服朕惟率豪酋而捍疆埸乃爾世功叛君父而從仇讎豈其本意庶能改過未忍加兵今除己招納依舊許般擦徃來買賣及上京進奉爾宜約束種類共保邊陲期寵禄於有終知大恩之難再勿使來欵復為虛言卿所進真珠生金犀並各回賜錢銀綵外今特賜卿對衣腰帯銀器衣着等具如别録至可領也癸丑遼主遣使長寧軍節度使蕭孝恭副使中大夫守太常少卿充乾文閣待制劉慶孫來賀坤成節太皇太后手詔皇帝嗣位于兹四年中外來同天地並應而皇太妃以恭儉之德鞠育之恩雖典冊以時奉行而情文疑有未稱皇帝以祖考之奉尊無二上而吾惟春秋之義母以子貴其推天下之養以慰人子之心宜下禮部太常寺討論如於典故有褒崇未盡事令開具以聞政目在八日丙辰左中散大夫直祕閣諸王府翊善王汾為祕書少監朝奉郎集賢校理杜常為左司郎中國子司業盛僑為揚王府侍講朝請大夫直集賢院諸王府侍講鄭穆為揚王府翊善考功郎中周尹知梓州皇城使漢州刺史廣西路鈐轄張整内殿承制閤門祗候知融州温暠各降三官張整就添差監江州稅温暠就差監歙州茶鹽酒稅右侍禁權邵州臨口寨主鍾仲仁左侍禁管勾融州臨溪堡事兼地分同廵檢杜震各降兩官衝替仍今後各不得差充廣南荆湖路差遣整暠坐擅斬蠻人楊進新等十有九人仲仁震坐誘致進新等以邊事未寧特免究治殿前都虞候雄州團練使權發遣涇原路經略安撫司公事劉昌祚為冀州觀察使歩軍副都指揮使馬軍都虞候寜州團練使權發遣熈河蘭㑹路經略安撫司公事劉舜卿為殿前都虞候忠州防禦使太原府路副都總管李浩為馬軍都虞候並差遣依舊捧日天武四廂都指揮使威州團練使兼權馬歩軍司姚麟為侍衛親軍歩軍都虞候東上閤門使榮州團練使永興軍路馬歩軍副總管和斌為康州團練使龍神衛四廂都指揮使丁巳歩軍副都指揮使威武軍留後苗授為殿前副都指揮使武泰軍節度使六年六月二十六日納節戊午承議郎都官郎中邵䶵為駕部郎中劉安世云云或削去庚申坤成節詔罷上夀羣臣及遼使拜表稱賀於内東門以魏王頵在殯故也環慶路經略使范純粹奏檢㑹元祐二年十一月二十五日樞宻院劄子節文賞功格非部隊將單身獲級漢蕃使臣近例並用士卒法每獲一級與轉一資㸔詳漢蕃使臣自來多不願部人盖單身獲級承例每級皆得轉資既本非責戰之人又單身自在易於買乞首級至有自借職奉職三五年間累轉至遥郡及横行者僥倖無甚於此理須立法以革久弊依下項非部隊將漢蕃使臣每獲一級借差已下與轉一資差使已上漢官與減二年半磨勘効用人依本條蕃官給公據通兩級與轉一資殿直已上賜絹二十匹内願請絹及加賜並依餘人獲級法捉强壯生口凖此臣契勘諸路邊事以來漢蕃使臣妄冒納級積累授官僥倖已極理須裁抑故朝廷更新格法以懲舊姦臣竊詳今降上條雖大槩已得詳具而其間小有未盡尚須論列謹具於後一上條非部隊將漢蕃使臣每獲一級借差已下與轉一資差使已上與減二年半磨勘臣㸔詳三班借差與差使資品不逺各未係使臣名目功同賞異人情未厭欲乞借職已上與減二年半磨勘差使已上並與轉資如此則功賞均稱一上條殿直已上賜絹二十匹臣㸔詳軍行之際漢蕃使臣係殿直已上者比比皆是除手下有所部人馬之人固可以身先督戰立功自効外其手下元無所部人馬之人若戰敵之際真有所獲則豈可不以為功而上條一例賜絹則是更無遷官之賞竊原人情之所以捐軀効命不顧一死幸脫生於鋒鏑戈㦸之中者豈二十縑之為哉盖爵賞在前能使其忘死也今不計所獲功力遂絶進身之望臣恐凢殿直已上今後無復有奮身捐軀為朝廷破賊者矣過猶不及恐非朝廷勸功之意若謂欲痛懲妄冒之弊惟當嚴將帥保明之刑若謂欲深革積累遷官之弊惟當限以止法兩級與轉一官仍一官止餘級並止賜縑如此則賞行不濫而人情稍饜右謹件具如前伏緣防秋廹近日備戰鬭須宜預定賞法使人具知庶有激勵赴功之人内蕃官一色不比漢官使臣盖本路全少正兵惟藉蕃兵使喚自䝉朝廷改更上件賞格其蕃官首領係殿直已上者多有不係部衆之人具知獲級更無轉資之賞遂絶進身之望衆意闕然深恐緩急之際利誘不重不肯用命即其餘蕃兵决無効死之理事干勸沮所係不輕伏望朝廷深賜省察再加修潤早降指揮貼黄鄜延路日近因賊馬侵犯將官米贇戰没訪聞得良由人力不齊以致困陷人言紛紛不可不察更乞朝廷採訪又勘㑹去秋夏賊大㓂涇原臣尋差曲珍統兵牽制其一行漢蕃使臣甚有殿直以上手下元無所部人馬之人各曽獲到首級後來止䝉賜絹充賞頗失衆望訪聞至有垂涕之人臣不敢隠所以須至開陳純粹三年七月十六日奏此從違當考米贇事在四月二十四日壬戌詔應大臣奏舉館職並依條召試除授其朝廷特除不用此令先是右正言劉安世言伏見祖宗初定天下首闢儒館以育人材累聖遵業益加崇奬處於英俊之地而厲其名節觀以古今之書而開其聰明廪食太官不任吏責所以成就德器推擇豪傑名卿賢相多出此途得人之盛無媿前古然自近歲以來寖輕其選或緣世賞或以軍功或酬聚斂之能或狥權貴之薦未嘗較試遂貼職名漸開僥倖之門恐非祖宗之意伏望陛下明詔執政無俾輕授必求文學行誼有聞於時審察其才實可長育然後一依近降條制召試而命庶使名器漸重不容幸得循致賢能以備官使至是安世又言近嘗奏請今後館職欲乞並依元立條制召試而授已奉聖㫖施行然臣伏觀所降指揮尚有未盡輙復論列庶幾小補臣嘗謂祖宗以來新進入館之人鮮有不試而命者惟是搢紳宿望治政顯著或累持使節或移鎮大藩欲示優恩方令貼職今陛下過聼臣言追復舊制雖云大臣奏舉到館職並依條召試方得除授而繼云其朝廷特除者不在此令則是不問人材之如何資歴之深淺但非奏舉皆可直除名為更張弊源尚在臣愚欲乞特降指揮依倣故事約自轉運使以上資序特除者不得用此制庶能塞僥倖之門重館職之選癸亥樞宻院言夏賊見㸃集軍馬雖聲言欲㓂涇原熈河路慮賊計先俱屯集在兩路對境側近一旦移兵竊㓂秦鳯城寨或因而妄動以圖深入緣秦鳳久不被㓂近裏城寨户口稍多若遇緩急賊衆侵犯須藉鄰路兵力應援可保無虞當先事處置以待姦謀詔葉康直詳此措置令將寨官逺斥堠廣探伺務要詳知賊界舉動先事為備決保萬全仍令劉昌祚劉舜卿於本路各選兵將涇原路須及萬人於德順軍熈河路及五七千人於通逺軍接近秦鳯邉面順便堡寨駐劄以為犄角之勢丙寅承議郎祠部員外郎翟思為殿中侍御史從翰林學士蘇軾許將給事中顧臨趙君錫中書舍人曽肇劉攽彭汝礪所舉也職方員外郎黄景為揚王府侍講盛僑依舊國子司業僑自司業除揚王府侍講國子監奏留從太學生之請也詔升次國徐鎮益鄧邠為大國小國定相瀛慶宻為次國熈河蘭㑹路經略司言夏賊㓂龕谷寨本寨及東闗堡廵檢使臣等以鬭死傷者百九十有五人不曽掠人口孳畜詔劉舜卿子細體量逐地分元透漏因依見賊鬭敵次第及夏賊軍馬的數開析以聞丁卯朝獻景靈宫正月十一日又四月十八日十月十五日戊辰詔緣洛口堤澾口遇漲水監輪官徃來檢察今後每遇春首令工部取㫖下吏部依舊例差使臣取索牢固文狀申尚書省新無詔遇災傷放稅及六分已下其帯納欠負即随放稅分數催納若放稅七分已上並行倚閣録故三班借職趙進男忠為三班借職褒死事也庚午詔諸路提㸃刑獄司已覆大辟案每路摘取三分已上審覆季具已覆情節刑名申尚書省其流配罪摘覆不計分數不當者並奏裁温州團練副使沈起卒實録新舊傳並合别修癸酉詔以魏王薨停宗室婚嫁百日
