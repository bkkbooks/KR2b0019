body:
  text: 續資治通鑑長編巻一百七十五宋李燾撰仁宗皇祐五年秋七月壬寅詔以冬至有事于南郊癸卯詔廣南西路安撫使司比留禁兵四千戌邕州其月給錢三百季給鞋錢乙巳詔荆湖北路災傷州軍先發常平倉以賑饑民如聞司農寺復行催理甚非朝廷賑䘏之意其並給之己酉詔曰朕思得賢才故開薦舉之路虚心納用皦然弗疑而比年以來率多謬濫或人材庸下而褒引乖實或宿負醜愆而亟請湔洗或職任疏逺而推授過重考其心迹非衒鬻崇私何以臻此不知而言兹曰蔽知而言之兹曰罔以此事上予何頼焉自今所舉非其人者其令御史臺彈奏當寘於法見任監司以上毋得薦論會要云嘉祐六年正月御史臺乞申明此詔詔本臺每於歲首舉行庚戌上謂輔臣曰如聞諸州軍嘗於夏秋之際先奏時雨霑足田稼登茂後或災傷遂不敢奏致使民稅不得蠲除甚非長吏愛民之意宜申飭之辛亥作鎮國神寳命宰臣龎籍篆文參知政事劉沆書碑先是上謂籍等曰奉宸庫有良玊廣尺而厚半之蓋希代之珍也不欲以為服玩且天子八璽其一曰神寳遂令參知政事梁適撰寳名而刻之寳成以進召近臣宗室觀于延和殿太常禮院因言唐六典次序曰一神寳二受命寳冬至祀南郊大駕儀仗請以鎮國神寳先受命寳為前道遂著為式及籍罷相改命陳執中篆文籍罷相改命陳執中篆文乃閏七月事今附此癸丑詔羣臣毋得因郊祀請加尊號宋㑹要五年七月十六日詔以民力尚困農望屢愆間有水旱之災加以螟螣之害方圖大報以佇善祥無假虚稱以重不徳蘄州判官李虛一上溉漕新書四十巻其間頗言修六塔之便詔送河渠司備檢閱虛一特遷一資戊午詔太常比定諸臣諡止據行狀而多文過溢功殊失懲勸之典自今並須直述事實毋得虛美兵部員外郎王田為京東轉運使御史俞希孟言田昏耄不勝任尋罷之己未幸後苑召近臣館閣臺諫省府推判官觀瑞蓮庚申莊宅副使趙滋兼閤門通事舍人權并代鈐轄慶厯初滋以右侍禁為涇原儀渭鎮戎軍都廵檢嘗諭降徳勝寨叛兵賞弗及范仲淹韓琦經畧陜西薦之乃得閤門祇候時京西軍賊張海久未伏誅命滋都大提舉陜西京西路捉賊數月賊平後為京東東路都廵檢富弼為安撫使舉再任登州乳山寨兵叛殺廵檢州將誅首惡數人不窮按滋承檄驗治馳入其壘次第推問得黨與百餘人付獄衆莫敢動在京東五年數獲盜不自言弼為言乃自東頭供奉官超授供備庫副使定州路駐泊都監嘗因給軍食同列言粟不善滋叱之曰爾欲以是怒衆邪使衆有一言當先斬爾以徇韓琦聞而壯之以為真將帥材滋有是命從琦所奏也甲子詔國子監如聞監生或以補牒質鬻於人使流寓無行之士冐試于有司其加察之乙丑詔臣僚行狀本家自撰及為人撰者並須摭實不得虛美如檢勘失實者坐其罪從侍御史吳祕之請也此據編錄條貫冊増修閏七月戊辰朔置邕州城外沙頭和市場詔内侍省自今内侍供奉官至黄門以一百八十人為額吳及疏或可自至和元年末移此更考詳之又詔廣南經蠻冦所踐而民逃未復者限一年復業仍免兩料催科及蠲其差役三年從體量安撫周沆所奏也先是民避賊多棄田里逺去吏以常法滿半歲不還者聽他人占佃沆曰此豈可與凶年逃租役者同科乃奏延期一年已占佃者仍奪還之貧者官貸以種糧初帝以廣南地惡詔沆非賊所踐州縣不必徃沆曰逺民新罹荼毒不可不究宣天子之澤遂遍行州縣辛未徙知青州文彦博知秦州知秦州張昪知青州時方城古渭州昪議不合故也御史中丞孫抃言朝廷昨日築城境外衆蕃之心已皆不安今又特命舊相臨邉事異常例是必轉増疑慮或生他變况聞知永興軍晏殊秩將滿朝廷必藉彦博才望不若遣鎮闗中兼制秦鳯事宜庶蕃部不至驚擾在於國體實為至便張昪前徙青州蓋坐不欲城古渭爾本傳云劉渙誣奏郭恩多殺老稚遂徙昪青州按昪徙青州乃閏月初四日後十三日渙與恩俱上破賊功八月十三日復秦州當閏月初四日渙安得預奏恩多殺老稚也此𫝊必誤蓋昪帥秦州半年間几一次徙一次罷本傳并兩事為一事故不合今改正之昪罷在十二月庚子實錄又不載因張方平始見之詔廣南西路戍兵及二年而未得代者並罷歸其鈐轄司所遣土兵歲一代之自儂智髙亂駐泊禁軍及桂州等處雄畧忠敢澄海軍凡二萬四千四百四十一人分戍諸州至是皆罷還禁軍但戍以土兵壬申户部侍郎平章事龎籍以本官知鄆州案宋史宰相表以京東西路安撫使出知鄆州初齊州學究皇甫淵獲賊法當得賞錢淵上書願易一官道士趙清貺者籍甥也紿為淵白籍而與堂吏共受淵賂淵數詣待漏院自言籍乃勒淵歸齊州有小吏吿清貺等受賂事籍即捕送開封府清貺及堂吏皆坐贓刺配嶺外行至許州死諫官韓絳言籍隂諷府杖殺清貺以滅口又言事當付樞宻院不當中書自行故罷之然謂籍隂諷開封覆之無實集慶節度使同平章事判大名府陳執中為吏部尚書平章事昭文館大學士監修國史給事中參知政事梁適為禮部侍郎平章事集賢殿大學士癸酉徙判許州賈昌朝判大名府甲戌贈秘書監致仕胡旦為工部侍郎仍賜其家錢三十萬令襄州為營葬事衛尉少卿知州馬尋言旦家貧久不克葬故䘏及之尋項城人以明習法律稱其在襄州會歲饑或羣入富家掠囷粟獄吏鞫以强盜尋曰此迫於饑爾其情與强盜異奏得減死論遂著為例尋事附見或自有日月乙亥詔諸路知州軍武臣並須與僚屬參議公事毋得專决仍令安撫轉運提㸃行獄司常檢察之丙子祠部貟外郎集賢校理李中師為淮南轉運使中師入辭上謂曰比聞諸路轉運使多獻羡餘以希進然遇災傷不免暴取于民此朕所不取也其戒之上語乃壬午日今并書出内藏庫緡錢十萬紬絹二十萬綿十萬下河北助糴軍儲至和元年八月可考丁丑詔司農寺廣南西路常平倉錢榖被賊焚刼者並除之戊寅賜延州修城役卒緡錢庚辰秦鳯路經畧安撫司言古渭寨雅爾峽綱威嶺諸蕃部數出擾邊道阻不通尋令部署劉渙為中軍鈐轄劉温潤都監郭恩為先鋒知鎮戎軍郭逵為䇿先鋒都監吳賁崔懿為殿後走馬承受周世昌隨中軍捕討之渙得首二百四級温潤得五百六十五級恩得九百二十五級逵得四百五十九級賁得二十八級世昌得二十七級辛巳渙自澤州團練使遷防禦使温潤自禮賓使領英州刺史恩自内殿承制閤門祗候為崇儀副使逵自内殿承制閤門祇候為禮賓副使賁自内殿承制為供備庫副使懿自西頭供奉官閤門祇候為東頭供奉官世昌自西頭供奉官為東頭供奉官其有功軍校係轉貟軍分遷一級仍升一等非轉貟軍分遷一級郭恩獨不遷官疑實錄偶脫據恩本𫝊恩自内殿承制閤門祗候為崇儀副使今追填之詔開封府災傷縣分其令佐體量減稅更不差官覆視仍減今年體量和買草三分之一戊子詔禮部貢院自今諸科舉人終塲問大義十道每道舉科首一兩句為問能以本經注疏對而加以文辭潤色發明之者為上或不指明義理而但引注疏備者次之並為通若引注疏及六分者為麤其不識本義或連引他經而文意乖戾章句斷絶者為下並以四通為合格九經止問大義不須注疏全備其九經場數並各減二場仍不問兼經又詔開封府國子監進士自今每一百人解十五人其試官親嫌令府監互相送若兩處俱有親嫌即送别頭己丑詔古渭寨修城卒權給保㨗請受仍以蕃官左班殿直訥芝臨占為本地分廵檢月俸錢五千候一年能彈壓蕃部即與除順州刺史臨占世居古渭州宻邇夏境夏人牧牛羊於境上臨占掠取之夏人怒欲攻之臨占懼力不敵因獻其地冀得戍兵以敵夏人范祥欲立奇功亟往城之臨占先世跨有九谷後寖衰僅保三谷餘悉為他族所據青唐族最强據其鹽井日獲利可市馬八匹臨占白祥此本我地亦乞漢家取之祥又多奪諸族地以招弓箭手故青唐及諸族皆怒舉兵叛祥既坐責黜張昪請棄古渭勿城夏人復來言古渭城本我地今朝廷置州於彼違誓詔遣傅永制置糧草專度其利害永言今棄弗城夏人必據其地更為秦州患且已得而棄之非所以强國威按臨占父祖皆授漢官其地非夏人所有明甚但當更名古渭寨不為州以應誓詔爾即召青唐等族酋諭以朝廷今築城實為汝諸族守衛而汝叛何也皆言官奪我鹽井及地我無以為生永曰今不取汝鹽井及地則如何皆喜聽命遂罷兵永乃割其地四分之三以卑青唐等族卒城古渭始加臨占以爵秩此叚實録正史極不詳今悉用司馬光所記稍刪潤之辛卯以尚書禮部侍郎集賢院學士判西京留司御史臺吳育知陜州壬辰降翰林侍讀學士刑部郎中吕公綽為龍圖閣學士知徐州侍御史吳祕知濠州提㸃淮南路刑獄度支貟外郎集賢校理孫錫知太平州度支貟外郎王礪知信州初諫官御史言公綽前知開封府受龎籍旨决趙清貺杖近脊下故清貺不至配所死公綽遂得罪而錫坐前為推官礪為判官祕亦獨不彈奏故皆責及之既而公綽上章自辨乃詔知開封府楊察按其事具言杖清貺實在判官㕔非公綽所臨然其命已行但令劄示公綽而已癸巳詔嘗任二府出知州者毋得奏辟通判止許増辟幕職官一貟從御史中丞孫抃所請也若前知州歳舉人數已足聽歲中别舉之知州歳舉人数未見當考八月丁酉朔詔災傷之民訴於轉運司而不受聽逐州軍繳其狀以聞壬寅追封皇后乳母榮國夫人周氏為魯國夫人兵部貟外郎天章閣待制兼侍講趙師民累請補郡癸卯除龍圖閣直學士知耀州師民嘗講論語帝問修文徳對曰文者經天緯地之總稱人君之道撫之以仁制之以義接之以禮講之以信皆是也帝曰然其所先者無若信也曰信者天下之大本仁義禮樂皆必由之此實王道之要復問鑚燧改火曰古之聖王舉動必順天時變火隨木性近世漸務茍簡以為非治具而遂廢之至於萬事皆不如故又問子夏子張所言交道孰勝曰聖哲之道含覆廣大與天地參善者有以進徳惡者俾之改行子張之言為優他日讀漢紀問長安城衆莫能知共推師民因陳自古都雍年世舊址所在若畫諸掌帝曰何直所記如此在經筵十餘年甚見器異盛夏屬疾家居帝飛白書團扇為和平字賜以寄意將行帝自寫詩送之目以儒林舊徳師民性極慈恕州民有以鹽鐵抵禁者一切不問嘗太息謂其子彦若曰此賈誼所謂善人怵而為姦邪愿民陷而之刑戮者也安得不寛之甲辰詔今歳南郊三聖並侑自後當復如舊禮詔黎雅州控阨蠻詔為西川之屏蔽自今後宜擇武臣諸司副使以上知黎州仍益屯陜西兵三百人雅州二百人置駐泊都監一貟丁未主客貟外郎通判潭州唐介為殿中侍御史裏行知復州戊申觀文殿大學士吏部尚書新知秦州文彦博為忠武節度使知永興軍兼秦鳯路兵馬事始用孫抃之言也遣鹽鐵判官都官貟外郎燕度往陵渠等州定奪鹽井利害以聞時言者謂前後甲午蜀再亂憂明年復有變故特遣度徃治鹽莢因預為之防度至蜀察其民俗還奏曰今甲午必無事已而果然傅永言古渭寨方發兵戍守不宜更易主將己酉命新知青州張昪復知秦州張昪傳曰既城古渭羌人據綱威嶺絶餉道禆將劉渙帥兵不時進擊昪舉郭恩代之賊乃潰去渙以得城之功不在已因紿奏恩所殺皆老稚由是徙昪青州按徙青州乃閏七月初四日後十三日經畧司始上斬級姓名渙及恩俱在焉昪所以徙當是議不合爾不縁舉恩代渙也且渙與恩俱斬級渙少恩多恩實未嘗代渙本傳必誤辛亥度支副使工部郎中周沆為契丹國母生辰使左藏庫副使錢昞副之起居舍人知諫院韓贄為契丹生辰使供備庫副使彭再昇副之户部判官刑部貟外郎張去惑為契丹國母正旦使内殿崇班夏僖副之右正言直集賢院賈黯為契丹正旦使左侍禁閤門祗候王咸宣副之壬子太子太傅致仕杜衍為太子太師資政殿大學士禮部侍郎知河陽富弼為户部侍郎觀文殿學士資政殿學士兼翰林侍讀學士禮部侍郎知陜州吳育為户部侍郎資政殿大學士皆以二府舊臣特遷之翰林侍讀學士吕公綽言弟都官貟外郎知單州公著頃因先臣致仕恩例乞試䝉候得替取旨後經三任十年未曽有所干請詔公著充崇文院檢討㑹要皇祐五年八月十六日事實録無之癸丑詔知州理轉運使資序者自今止給知州添支初知諫院李兊言轉運使主一路兵食户税經費財用故優以賦廩今或因彈劾罷免或以年高自求便郡者多得理轉運使資序而竊厚禄非朝廷勸沮之意故裁酌之禁化外蠻人過嶺北者甲寅詔南郊且用舊樂其新定大安之樂常祀外朝會用之翰林學士胡宿言自古無並用二樂之理今舊樂髙新樂下相去一律難並用且新樂未施郊廟先用之朝會非先王薦上帝配祖考之意帝以為然戊午詔益梓州路轉運使司漸修築諸州軍城池毋致動民言者謂蜀之城池久廢不治甲午再亂不可不豫為備也庚申新知復州主客貟外郎殿中侍御史裏行唐介為殿中侍御史充言事御史遣内侍齎敕吿賜之介貶斥不二歳復召議者謂天子優容言事之臣近古未有也辛酉御崇政殿䇿試賢良方正能直言極諫太常寺太祝趙彦若及試武舉人彦若所對疎濶下有司考不中等而罷之先是制舉就秘閣試者凡十八人有司獨取彦若於是又被黜去議者謂宰相陳執中不由科第以進故隂諷有司專抑儒士非彦若實不能也陳執中諷有司此據政要詔秦鳯部署劉渙每半年一廵古渭寨以撫輯蕃部壬戌詔自今南郊三聖並侑初太常禮院言奉詔再詳定三聖並侑事伏以配侑之法前代不同古則一主而後或兼配皆是變禮彌文廣申誠愛也國朝景祐二年曽下詔書今次郊禋三聖並侑其後以太祖定配二宗迭配明堂大禮亦三聖並侑今陛下濬發徳音欽明大孝况是本朝舊禮已再躬行於義無爽故有是詔湖南安撫司言邵州嵠峒野光銀捍賊有勞請於本峒置中勝州從之乙丑武舉五十一人授官有差前詔罷武舉今所擢皆秘閣舊經試者云前知常州祠部貟外郎集賢校理邵必落職監邵武軍酒坐在任日誤斷犯鹽人髙慶徒刑知江隂縣殿中丞陳合重勘誤斷公事復收髙慶供析不實再決杖刑合勒停前提㸃刑獄度支貟外郎蘇舜元同提㸃刑獄内殿崇班閤門祗候常鼎提㸃刑獄屯田郎中苗振免勘各罰銅十斤髙慶常州特支十千此㨿會要乃皇祐五年八月二十九日事實録無之其後范鎮趙抃皆有論列今追附此九月丁卯朔詔審官院京朝官已授差遣及半年未赴者毋得以堂除人衝改之從御史中丞孫抃奏請也己巳屯田貟外郎黄贄兄賔為國子四門助教仍不理選限贄願囬所遷官以禄其兄而許之詔内殿承制崇班有被按劾或昬耄或病不能􅊩事衝替而求致仕者更不錄用子孫諸司副使則比舊減一等推恩庚午東上閤門使忠州團練使錢晦知河中府上問晦家所𫝊鐵劵欲見之晦並三朝御書以進上皆親識其末還之又賜飛白安民字因戒曰陜西兵方解民困久矣卿為朕愛撫無縱酒作樂使人謂為貴戚子弟晦頓首謝壬申降侍御史知濠州吳秘為屯田貟外郎坐失舉也既而中書按所舉乃非用秘章遷改復還其官秘復還故官乃戊寅日今并書詔臣僚毋得以子孫恩請弟姪任四川職田處官壬午權三司使翰林學士兼龍圖閣學士給事中田况為禮部侍郎三司使癸未錄京東舉人周端為郊社齋郎本路安撫司言端捕强盜十四人而親禽者七人特錄之乙酉崇政殿召近臣宗室臺諫官省府推判官觀新樂先是鐘律之音未合古法詔中書門下集兩制及太常禮官與知鐘律者考定其當議者各安所習久而不決乃命諸家各作鐘律以獻親臨視之然古者黄鍾為萬事根本故尺量權衡皆起於黄鍾至隋用累黍為尺而制律容受卒不能合及平陳得古樂遂用之唐興因其聲以制樂其器無法而其聲猶不失於古五代之亂大樂淪散王樸始用尺定律而聲與器皆失之故太祖患其聲髙特減一律至是又減半然太常樂比唐聲猶高五律比今燕樂高三律上雖勤勞制作未能得其當者有司失之於以尺生律也自先是鐘律之音至尺生律也並范鎮所論本志削去今姑存之然鎮所論亦畧見於四年六月所上書矣當考又觀新作晉鼓三牲鼎鸞刀以補禮器之闕初賈昌朝侍經筵帝問鼎卦聖人亨以享上帝今郊何以無鼎昌朝不能對曰容臣退而講求於是詔禮官議以為郊有亨牲進熟遂命阮逸胡瑗鑄銅鼎制鸞刀帝親書鼎名曰牛鼎羊鼎豕鼎皆署而刻之牛鼎其容一斛羊鼎五斗豕鼎三斗鸞刀亦親書刀名而署之有司皆篆刻其下至元豐元年詳定郊廟奉祀禮文所議圓丘用犢不設羊豕鼎及俎奏罷之賈昌朝以下此據帝學附見於此於史官蒲宗孟李清臣曰世號太常為雅樂而未嘗施燕享豈以正聲為不美聽哉夫樂者樂也其道雖微妙難知至於奏之而使人恱豫和平此不待知音而後能也嘗竊觀於太常其樂縣鐘磬塤箎摶拊之器與夫舞綴羽籥干戚之制蓋皆倣諸古矣逮振作之則聽者不知為樂而觀者厭焉豈所謂古樂其聲真若此哉孔子惡鄭恐其亂雅亂之云者似是而非也孟子亦曰今樂猶古樂然今太常獨與敎坊樂音殊絶何哉昔者李照胡瑗阮逸改鑄鐘磬處士徐復笑之曰聖人寓器以聲不先求其聲而更其器其可用乎照瑗逸制作久之卒無成蜀人房庶亦深訂其非是因著書論古樂與今樂本末不逺其大畧以謂上古世質器與聲樸後世稍變焉金石鐘磬也後世易之為方響絲竹琴簫也後世變之為筝笛匏笙也攅之以斗塤土也變而為甌革麻料也擊而為鼓木柷敔也貫之為板此八音者於世甚便而不達者指廟樂鎛鐘鎛磬宫軒為正聲而槩謂胡部鹵部為滛聲殊不知大輅起於椎輪龍艘生於落葉其變則然也古者以俎豆食後世易之以桮盂古者簟席以為安後世更之以榻案雖使聖人復生不能舍桮盂榻案而復俎豆簟席之質也然則八音之器豈易於此哉孔子曰放鄭聲鄭聲滛者豈以其器不若古哉亦疾其聲之變爾試使知樂者由今之器寄古之聲去其惉懘靡曼而歸之中和雅正則感人心導和氣不曰治世之音乎然則世所謂雅樂者未必如古而教坊所奏豈盡為滛聲哉數子紛紛改制鐘律而復庶之論指意獨如此故綴其語存之以俟知音者焉庚寅光禄寺丞國子監直講胡瑗為大理寺丞復勒停人阮逸為户部貟外郎内侍押班左騏驥使英州團練使鄧保信為榮州防禦使入内供奉官賈宣吉為内殿承制並以制鐘律成特遷之壬辰入内都都知延福宫使武信軍留後王守忠為入内内侍省内侍省都都知諫官韓絳言宦官兼判二省國朝所未有也不報御史俞希孟乞自今更不除前後省都都知奏可絳𫝊云罷守忠判内省事蓋因神道碑也其實守忠為兩省都都知如故詔内臣有自陳勞績而求遷者自今並下入内内侍省定奪當否令樞宻院奏聽㫖其明合賞格者即與施行罷三司提舉司勾當公事官從宰臣陳執中所奏也康定元年十二月置是月入内都知張惟吉等言備貟中省與閤門著望頗同奏子恩止從諸司使例乞比閤門使例每遇聖節南郊奏子右班殿直兄弟姪孫奉職堂兄弟姪孫借職詔如遇南郊奏子一名與右班殿直餘不許此據㑹要及成都府編錄冊龍圖閣學士判流内銓張方平言昨聞重定二省都知押班等著望在閤門使之上物議雜起深以為非當時有司無人論執茍從其請既已失之今又聞二省陳乞奏授子孫恩澤於視秩上更加一等此事若行不惟違越祖宗法度隳紊朝廷典章必致陛下有私近習之名大臣有阿親倖之醜内侍有恣橫之議諫官御史有隱黙之尤且都知押班地處親近宜為朝廷愛惜事體動循軌度孜孜徇公如此倖求何以示外易曰履霜堅冰至言當戒其漸也漢唐之事臣嘗為陛下言之矣伏乞聖斷深賜察納其都知押班奏䕃恩例伏乞一仍舊制重定二省都知押班位次事在慶厯元年五月壬戌方平論諫不得其時今附見張惟吉等陳乞恩例之後按方平皇祐五年閏七月壬戌以龍圖閣學士判流内銓十月甲寅判太常寺今既取論諫附此因以龍圖閣學士判流内銓為論諫時職任更湏考詳其從違又不知竟何如也殿前都虞候隴州防禦使權管勾歩軍司事王凱乞給大例請俸詔以凱攝歩帥特從之冬十月丙申朔日有食之知耀州趙師民上疏曰太陽食於正朔此雖是陰陽之事亦慮是天意欲以感動聖心臣非瞽史不知天道但率愚意言之其月在亥為水水為正隂其日在丙丙為火火為正陽月掩日隂侵陽下蔽上之象也詩曰十月之交朔日辛卯又曰彼月而微此日而微謂以隂奸陽失其序也又曰百川沸騰山冢崒崩高岸為谷深谷為陵謂下陵上侵其權也又曰皇父卿士畨維司徒家伯維宰仲允膳夫棸子内史蹶維趣馬楀維師氏謂大小之臣有不得其人者也宗周之間時王失徳今而引喻蓋事有所譬固當不諱凡怠慢奢侈縱放不師古姑捨是何失道之有今聖心慈仁恭勤儉約自檢動循典禮如此自非下䝉上邪撓正使主恩不下究而誰之咎歟望陛下朝夕咨於丞弼心膂之臣洎左右近侍耳目之官其忠而純者與之遴選内外百執以及州縣牧宰使主恩究於下不為羣邪所蔽塞則億兆之幸也詔三司使田况班内朝依石位如門外序班即在觀文殿學士之下舊制三司使内朝班學士之右獨立石位殿門外亦班其上至是况以觀文殿學士王舉正二府舊人固推之戊戌徐州錄事參軍路盛追一官勒停盛馬斃怒廐人芻秣失時杖之令抱巨石立五晝夜又杖之大理寺斷杖八十私罪上以盛所為苛暴貴畜而賤人特貶之賜嘉州草澤魏翔粟帛翔年七十餘本州表其行義故賜及之己亥户部侍郎知鄆州龎籍為觀文殿大學士龍圖閣學士刑部郎中集賢殿修撰知徐州吕公綽復為侍讀學士公綽以趙清貺之死自辨於朝上察其情故并籍皆復舊職於是知諫院韓絳力争不報絳家居待罪上遣使慰勞之尋除禮部貟外郎罷諫院絳為禮外乃十一月甲申今附見判大宗正司允讓言宗室養子須五歲然後賜名受官毋得依長子例不限年從之寳元二年七月丁巳日見更詳之丁未奉安明徳元徳章穆皇后神御於普安禪院重徽隆福二殿壬子詔三司自今京師百萬倉左藏庫都商稅務𣙜貨務東西八作司文思院事材場南北作坊店宅麴院内香藥庫裁造院作坊料物庫西染院陜西折博務解州鹽池縁邊便糴糧草諸茶場𣙜貨務轉般倉米倉銀銅坑冶場鹽井監仍舊舉官監當其餘場務課利不及七萬貫者悉罷之令有司選差人從宰臣陳執中所奏也癸丑罷諸路提舉催綱撥發官丙辰御延和殿召輔臣觀指南車丁巳殿中侍御史唐介為工部貟外郎直集賢院介始入見無一言及遷謫上曰聞卿遷謫以來未嘗有私書至京師可謂不易所守矣介頓首謝後數論得失因言於上曰臣繼今言不行必將固争争之急或更坐黜是臣重累陛下願聽解言職許之御史中丞孫抃奏留介或補諫署不報尋以為開封府判官介為府判乃明年三月介後以章制知諫院特見嘉祐四年二月戊辰詔自春渉夏蝗旱為災其令監司諭親民官訪民間利害以聞戊午河北轉運使禮部郎中集賢殿修撰陳升之為天章閣待制都轉運使癸亥左衛大將軍絳州防禦使宗禮為成國公右屯衛大將軍光州團練使世永為和國公宗禮允升長子世永守節長子也甲子避神寳名改鎮國軍為鎮潼軍十一月丁卯朝饗景靈宫戊辰饗太廟奉慈廟己巳合祭天地于圜丘大赦先是端明殿學士兼龍圖閣學士張方平言王畿賦斂之重於是詔開封府諸縣兩稅於原額上減三分永為定式丁丑加恩百官戊寅詔秦鳯經畧司本路所補蕃官七百餘人多懦弱不能統制部族自今選少壯有勇力者為之鎮東留後李端愿先受命知越州未赴其從者毆人死御史余希孟劾之丁亥改知襄州賜川峽西路修城役卒特支錢戊子翰林學士曽公亮御史中丞孫抃放天下欠負己丑翰林學士錢明逸龍圖閣直學士張揆看詳編配罪人庚寅罷荆湖南路江南西路廣南東西路轉運判官辛卯權管勾司天監事周琮上軍中占三巻詔送秘閣十二月丁酉廣西安撫司言捕獲儂智高母阿儂及智高弟智光子繼宗繼封詔䕶送京師阿儂有智謀智高攻䧟城邑多用其䇿僣號皇太后天資慘毒嗜小兒每食必殺小兒智高敗走阿儂入保特磨依其夫儂夏卿收殘衆約三千餘人習騎戰復欲入冦余靖督部吏黄汾黄獻珪石鑑進士吳舜舉發峒兵入特磨掩襲并智高弟子皆獲之庚子端明殿學士兼龍圖閣學士給事中張方平加翰林侍講學士知秦州代張昪也初昪命部署劉渙討叛羌渙逗遛不進昪奏以郭恩代之恩既多所斬馘渙疾恩出已上遂紿奏恩所殺皆老稚爾朝廷疑焉故罷昪而遣方平徃帥亦徙渙涇原方平力辭曰渙與昪有階級今互言而兩罷帥不可為也昪以故得不罷尋命方平知滑州昪𫝊云渙以得城之功不在已故紿奏恩多殺老稚按渙與恩俱進兵恩獲級最多爾是役也渙實受賞安得謂功不在已耶蓋昪初以渙不時進擊因奏乞用恩代渙奏未報而渙已與恩俱破賊矣渙怨昪將使恩代已且疾恩獲級多遂誣奏恩并及昪故朝廷欲兩罷之也昪徙青州則在此前與此實兩事本𫝊並兩事為一殊不可考今參取方平墓誌刪修乙巳録忠効指揮使周忠子陳留為茶酒班殿侍三班差使忠與蠻賊戰死故也戊申詔軍士逃亡捕獲未斷再逃亡止一次科罪已斷未決而再逃亡者累科之庚戌詔諸路轉運使副提㸃刑獄毋得淹繫罪人又詔南郊赦書第四第五等户殘欠稅物並與倚閣自今須納七分以上方為殘欠仍著為定式癸丑詔入内内侍省都知押班非年五十以上歴任無贓私罪者勿除丙辰詔川峽人刺配為内地軍兵者遇揀停自今毋得放歸其令闗津常譏察之丁巳詔廣西安撫司以廉州𨽻容龔州提舉戊午詔曰轉運之職本以澄清官吏綏撫人民豈特事誅求以剥下乎有能盡歲入以致増盈者留為本路移用毋得進羡餘務寛民力以稱朕懷己未參知政事劉沆提舉中書五房續編例冊前編當是宋緩既云續編必有初編會要亦止此緩事在景祐二年九月庚申太常博士吳中復為監察御史裏行用中丞孫抃所薦也中復興國軍人嘗知犍為縣有善政抃未始識其面即奏為臺屬或問之抃曰昔人恥為呈身御史今豈薦識面臺郎邪按張唐英政要乃以為仁宗親問然政要多誤今不取辛酉契丹國母遣林牙臨海節度使左衛大將軍耶律庶忠夏州觀察使兼東上閤門使李仲僖契丹遣始平節度使耶律祁崇禄卿周白來賀正旦契丹使來請曰願觀廟樂而歸上以問宰相陳執中曰樂非祠享不作請以是吿之樞宻副使孫沔曰此可吿而未能止也願吿之曰廟樂之作以祖有功宗有徳而歌詠之也使者能留與吾祭則可觀上使人吿之使者乃退有中人嘗任外官率他武臣上書乞遷上曰法不可得也訴不已上以語沔沔曰臣請退而問之乃召問曰曩汝在邊某軍當給帛汝不時給何耶對曰帛官物也不敢妄以與人又問曰某人戰當奏功汝不時奏何耶對曰是幸賞也故不奏沔曰而能知此而反自為何耶皆惶懼再拜趨出此據孫沔墓誌及神道碑初賈昌朝建議漢唐都雍置輔郡内翼京師國朝都汴而近京諸郡皆屬他道制度不稱王畿請析京東之曹州京西之陳許鄭滑州并開封府摠四十二縣為京畿帝納之壬戌詔以曹陳許鄭滑五州為輔郡𨽻畿内置京畿轉運使五州各増鈐轄一貟曹州更増都監一貟留屯兵三千人以時教閱若出戍即於開封府近縣或鄰州徙兵足之天章閣直學士吏部郎中王贄為樞宻直學士京畿水陸計度轉運使是歲天下上户部户口主户六百九十三萬七千三百八十口一千五百五十九萬七千四百五十客户三百八十五萬五千三百二十五口六百六十九萬五千四百一十一左司諫賈黯建言天下無事年榖豐熟則民人安樂父子相保一遇水旱則流離死亡捐棄道路發倉廪以賑之則糴不給課粟富人則力不贍轉輸千里則不及事移民就榖則逺近交困朝廷之臣郡縣之吏倉卒不知所出則民饑而死者已過半矣夫水旱之災雖堯湯所不能免今不思所以備災之術而歲幸年榖之熟則是求出於堯湯之所不可必者也臣嘗讀隋史見所謂立民社義倉者取之以時而藏之於民下足以備凶災而上實無所利焉願倣隋制詔天下州軍遇年榖豐熟立法勸課畜積以備災此孟子所謂樂歲粒米狼戾多取之而不為虐者也况取之以為民耶下其説司農寺且命李兊與黯合議以聞乃下諸路度可否而以為可行者纔四路餘或謂賦稅之外兩重供輸或謂恐招盜賊或謂已有常平足以贍給或謂置倉煩擾於是黯復上奏曰臣嘗判尚書刑部見天下歲斷死刑多至四千餘人其間盜賊率十七八原其所自蓋愚民迫於饑寒因之水旱枉陷重辟故臣請立民社義倉以備凶歲今諸路所陳類皆妄議若謂賦稅之外兩重供輸則義倉之意乃教民儲積以備水旱官為立法非以自利行之既久民必樂輸若謂恐招盜賊則盜賊利在輕貨不在粟麥今郷村富室有貯粟數萬石者亦不聞有刼掠之虞且盜賊之起本由貧困臣建此議欲使民有貯積雖遇水旱不憂乏絶則人人自愛而重犯法此正銷除盜賊之原也若謂已有常平倉足以贍給則常平之設蓋以凖平榖價使無甚貴甚賤之傷或遇凶饑發以賑救則既已失其本意而常平之費又出公帑方今國用頗之所蓄不厚近歲非無常平而小有水旱輙流離餓莩起為盜賊則是常平果不足仰以賑給也若謂置倉廩斂材木恐為煩擾則臣聞以佚道使民雖勞不怨義倉之設本為百姓曉諭誠至約束誠謹則下民雖愚宜無所憚况今州縣修治郵傳驛舍皆斂於民豆於義倉獨畏煩擾人情可與樂成不可與謀始如臣言可采願自朝廷斷而行之然當時牽於衆論終不果行
