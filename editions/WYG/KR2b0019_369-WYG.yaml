body:
  text: 續資治通鑑長編巻三百六十五宋李燾撰哲宗元祐元年二月庚申朔辛酉詔京東西淮南安撫轉運提刑司體量廵檢縣尉老疾不任職之人選官對移或奏差具因依以聞又詔大名府自經水災民田多渰浸耕種未得人户艱食向雖賑濟尚慮官司拘制使被災之民未䝉恩澤可委大名府安撫使韓絳詢訪賑濟館伴高麗使言高麗人乞開寳正禮文苑英華太平御覧詔許賜文苑英華詔軍器監將諸路未造軍器如有須合製造即以聞新録削去樞宻院奏請諸軍年七十若病患假滿百日或不堪醫治差使者諸廂都指揮使除諸衛大將軍致仕諸軍都指揮使諸班直都虞侯帶遥郡除諸衛將軍致仕諸班直上四軍除屯衛拱聖以下除領軍衛仍並以有功勞者為左無功勞者為右從之樞宻院言非將官駐劄處軍馬欲乞府界京東西路差本處都監或監押一員充訓練官依將勑施行仍選留押隊一員餘並减罷遇全將差發許本將指名奏差小使臣二人權充歸營日罷從之又言府界五路保甲巳罷團教應保甲赴教日止用民間衣裝不得勒令别造從之講筵所乞借實録詔只令取㑹政目吏部郎中張汝賢言奉勑差福建路按察并臣僚上言本路轉運副使王子京買蠟茶事今相度乞並依熈寧五年二月六日朝㫖除依舊禁𣙜州軍外並放通商從之熙寧五年二月六日朝㫖未見今以元祐鹽法冊増入元豐七年七月十七日王子京始建請𣙜臈茶八年二月七日并𣙜通商地分新淮南等路提㸃坑冶鑄錢事李深言坑冶鑄錢舊𨽻一司至元豐二年以荆廣淮浙分為兩路韶州岑水等場自去年以來坑冶不發欲乞兩路提㸃鑄錢通為一司從之詔每路特借錢一十五萬貫左正言朱光廷奏此據編類章疏増入二月二日臣竊觀天意未和葢縁人心未悦人心所以未悦葢縁政事未修政事所以未修盖縁忠賢未安忠賢所以未安盖縁姦邪未去夫所謂天意和者何以形容三光明寒暑平風雨時而已所謂人心悦者何以究知惟家給食足民無札瘥而已所謂政事修者何以明辨惟上有道揆下有法守而已所謂忠賢安者何以表見惟同心一徳直道而行而已所謂姦邪去者何以舉錯惟去其甚者惡類亦消而已故姦邪去則忠賢安忠賢安則政事修政事修則人心悦人心悦則天意和此不易之理也臣常論姦邪則指蔡確章惇韓縝為之先論忠賢則以司馬光范純仁韓維為之先去姦邪任忠賢惟先者為急伏望陛下上觀天時如此愆亢將為災嵗矣臣願陛下早賜睿斷以順天意若以蔡確章惇韓縝久為大臣進退以禮因此愆亢假之禮數俾均逸外藩禮固不薄矣陛下擢任忠賢彌加信任待以不次蔡確既去乞以司馬光補其闕韓縝既去乞以范純仁補其闕章惇既去乞以韓維補其闕盖此天下大任惟天下大賢可以當之非張璪已下備位之臣所以堪任也陛下果去姦邪信任忠賢上合天意下合人望則和氣充溢於上下變災為祥天之膏澤不旋踵而當降矣伏望聖慈斷在不疑早賜施行以召和氣以幸天下貼黄司馬光今已疾矣陛下早屏去姦邪専任忠賢天意助順就陛下太平功業司馬光必安惟願陛下早賜睿斷施行又貼黄臣竊惟陛下臨御以來聖政日新冠越古今然而今日去姦邪進忠賢其勢甚易若蔡確韓縝章惇之姦邪天下所願去者也司馬光范純仁韓維之忠賢天下所願進者也非臣之私言也陛下因天下所願而行之天意既和則膏澤自降太平可立而待惟陛下留神天下幸甚侍御史劉摯言臣竊以天下雖有極治之政而不能使民不為盗也然要能禁其為盗而已歴世以來法嚴則盗衰法寛則盗熾國朝自近嵗差役用募法而官㢮捕盗之禁保甲行教法而民滋為盗之心前來滑州之單安商州之王冲以村野之人逃亡之卒有一呼嘯遂能横行蹂踐鄉縣殺害官吏以至煩遣兵將重為騷擾大勞大費僅能散撲皆由防禁寛縱賞罰不明而寒飢猖狂之人附之者衆故也近日制㫖既薄斂輕賦稍還其衣食之路又復置弓手縣尉廵檢而察捕賞罰並從舊典所以防備姦惡安養善良之意可謂甚厚然訪聞州縣不甚究心召募弓手至今殊未就緒廵檢兵級多未差填見今河北陜西京東西所在常有盗賊攘刼抄竊殆無虛日鄉野閭井人頗不安盖前來保甲廵檢既有更不管勾指揮則其意固以不在於捕盗而新復官吏又未就職此盗之所以乗間而作也累嵗以來民間豐稔今尚如此自去冬大旱二麥失望積榖之家觀望不發人已艱食臣慮將來冦盗更有甚於今日欲乞指揮逐路監司為備盗之計督促州縣速招弓手及差撥廵檢兵級嚴責近限早令數足以時訓齊准備緩急及再乞指揮吏部所差注廵檢縣尉略加選擇催遣赴任近制新復弓手所用器甲營房令所屬應付訪聞諸處廵檢自更改後來其廨宇營房往往闕少或只於鄉縣寺舍安泊欲乞一就下所屬移那營葺仍委轉運提刑司候招募弓手差填兵級及應付事件了畢節次具數足及已了月日申奏若州縣明有稽違乖方便仰提刑司取勘聞奏臣近論役法乞除衙前依熈寧法用坊場錢召募外其餘弓手等役人並乞用祖宗差法今來雇召又須候七分方行勾抽竊慮妨闕伏乞檢詳前奏早賜指揮詔檢㑹元豐八年五月十四日已降指揮府界三路廵尉弓兵並依保甲未行以前復置其上件三路廵尉速行差赴弓兵速行招填此據呂大防政目増入摯奏據本集正月七日二十二日可考壬戌詔上殿班自閏二月遇垂簾日引一班應上殿及特㫖令上殿者閤門前一日闗入内内侍省尚書六曹御史中丞同侍御史或殿中監察御史一員開封府知府輪屬官一員諫議大夫司諫或正言一員同對監察御史王巖叟言臣竊以納忠之道貴乎盡論事之體貴乎宻不盡則不足以感動聖心不宻則不足以成就機事人主待臣下雖無間而臣下自立不能無不同既不同則不能無忌礙而言有所不盡事有所不宻言之不盡事之不宻非有益於朝廷之道也古之人有以告於君者父子之間不以相語况可使他人聞之哉伏望聖慈察臣之言特賜指揮依久來故事臺諫官只令一人上殿庶使各盡其忠而無不宻害成之失又言臺諫官天子耳目之任當使各盡其見聞以告主上豈可却使互相窺察常得志同道合之人則可若有懐私意持異見者如何與之共論於上前此不可不察也故事臺諫官論事不相通議亦不闗白官長盖欲以各盡其忠豈可上殿却使兩人同也又言六曹開封府有司之事皆有定法所以官長與屬官同奏對今臺諫官須二人同上則似與六曹開封相類恐非體要如䝉允臣所奏只乞作出自宸𠂻批出指揮二月二十八日又有指揮臺諫並許二人上殿則巖叟此章訖不從也司馬光言臣伏見神宗皇帝以夏國主趙秉常為臣下所囚興兵致討奮揚天威震蕩沙漠彼􅂝其種落竄伏河外諸將收其邉地建米脂義合浮圖葭蘆吳堡安疆等寨此盖止以藉口用為己功皆為其身謀非為國計臣竊聞此數寨者皆孤僻單外難以應援田非肥良不可以耕墾地非險要不足以守禦中國得之徒分屯兵馬坐費芻糧有久戌逺輸之累無拓土闢境之實此衆人所共知也王師既收靈州不克狼狽而還卒疲食盡失亡頗多西人知中國兵力所至自此始有輕慢之心是以明年邉臣築永樂城彼潜師掩襲覆軍殺將塗炭一城久之又舉一國之衆攻圍蘭州期於必取將士堅守僅而得全敵自是鋭氣小挫不敢輕犯邉矣臣聞此數寨之地中國得之雖無利敵中失之為害頗多何則深入其境近其腹心常慮中國一朝討襲無以支吾不敢安居是以必欲得之不肯棄捨一年前敵嘗専遣使者詣闕深自辯訴請臣服如故其志無他止為欲求其舊境而已朝廷既許其臣服敵求請舊境朝廷乃降指揮其前則云所以興舉甲兵本欲執取罪人救㧞幽辱非有意侵取疆場土地而已其後乃云止將已得些小邉土聊示削罰豈可更有陳乞還復之理此則朝㫖首尾已自相違又興師本為振㧞秉常拒命者國人之罪豈可更削秉常之地於理差似未安王者以大信御四海羌戎雖㣲恐未易以文辭欺也於是敵既失望憤怒怨懟移文保安軍辭理不遜云今來賀正旦人使難議發遣自是正旦生辰乃至陛下繼明皆不遣使入賀其不臣大矣然而去嵗四遣使者詣闕弔慰祭奠告其母䘮并進遺物禮雖不備稍示屈服臣竊料敵意不出於三一者猶冀朝廷萬一赦其罪戾返其侵疆二者陽為恭順使中國休怠隂伺間隙入為邉患三者久自絶於上國其國中貧之使者往來得賜賚之物且因為商販耳昔衛貳於晉晉取戚田及衛人既服郤缺曰日衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懐非威非懐何以示徳遂歸戚田于衛今西人所為如此朝廷既不能拒絶勿受其使又不能招納與之更始彼來則迎送館榖以賔客待之不來則一無所問日復一日將踰二年臣竊意朝廷謂西人勢已衰弱心實内附故來則不拒去則不追置之度外不以為慮殊不思去年前王師大舉深入將士所過烈於猛火割其疆場屢請而不還彼怨毒欲讎報之心窺窬欲乗釁之意日夜不忘若渴者不忘飲盲者不忘視也譬如有虎狼在屋側垂頭熟寢人豈可見其不動狎而侮之循其頭躡其尾耶臣每思之終夕寒心以臣愚於今為之止有二䇿一者返其侵疆二者禁其私市何為返其侵疆凡天子即位天地一新滌瑕蕩穢小大無遺昔趙佗自稱南越武帝倔强嶺南漢文帝即位赦其大罪遣單使往諭之佗稽首請服累世為臣李繼遷俶擾西陲十有餘年關中困弊真宗皇帝即位赦其大罪割靈夏等數州除其子趙徳明為定難軍節度使由是邉境安寧者四十年此乃前世及祖宗之成法非無所依據也今秉常之罪不大於繼遷也米脂等寨不多於靈夏陛下誠能於此踰年改元之際特下詔書數其累年不來賀正旦生辰及登寳位等不備之禮嘉其弔慰祭奠告國母䘮進遺物之勤曠然推恩盡赦前罪自今以後貢獻賜予悉如舊規廢米脂義合浮圖葭蘆吳堡安疆等寨令延慶二州悉加毁撤除省地外元係夏國舊日之境並以還之其定西城蘭州議者或謂本喀木所居趙元昊以女妻之覊縻役屬非其本土欲且存留以為後圖猶自有名禦敵人者不一而足俟其再請或留或與徐議其宜亦無所傷至於㑹州尚在化外而經略司遽稱熈河蘭㑹敵常疑中國更有闢境之心不若改為熈河岷蘭經略司如此則西人忽被徳音出於意外雖禽獸木石亦將感動况其人類豈得不鼓舞抃蹈世世臣服者乎議者或曰先帝興師動衆所費億萬僅得數寨今復無故棄之此中國之耻也昔漢元帝棄珠崖詔曰朕日夜惟思議者之言羞威不行則欲誅之通於時變則憂萬民萬民之飢餓與逺蠻之不討危孰大焉遂棄之此乃帝王之大度仁人之用心如天地之覆幬父母之慈愛盛徳之事何耻之有國家方制萬里今此尋丈之地惜而不與萬一西人積怨憤之氣逞凶悖之心悉舉犬羊之衆投間伺隙長驅深入覆軍殺將兵連禍結如曏日繼遷元昊之叛逆天下騷動當是之時雖有米脂等千寨能有益乎不惟待其攻圍自取固可深耻借使敵有一言不遜而還之傷威毁重固已多矣故不若今日與之之為便也此國家大事伏望陛下留神熟慮更與執政詳議以聖意斷而行之不可後時失此機㑹悔將無及何謂禁其私市西夏所居氐羌舊壌所産者不過羊馬氊毯其國中用之不盡其勢必推其餘與他國貿易其三面皆敵人鬻之不售惟中國者羊馬氊毯之所輸而茶綵百貨之所自來也故其人如嬰兒而中國乳哺之寳元慶歴間元昊負恩僣亂屢犯邉境大入則大利小入則小利中國未嘗蹈其境破其軍擒其將屠其城有害於社稷也而首尾六年元昊遣使因縁邉吏卑辭納欵頓顙稱臣雖其惡積罪盈欲懐音革面原其私心亦未必不貪中國之財思私市之利故也舊制官給客人公據方聼與西人交易𫝊聞近嵗法禁踈闊官吏㢮慢邉民與西人交易者日夕公行彼西人公則頻遣使者商販中國私則邉鄙小民竊相交易雖不獲嵗賜之物公私無乏所以得偃蹇自肆數年之間似恭似慢示不汲汲於事中國由資用饒足與事中國時無以異故也陛下誠能却其使者責其累年正旦生辰及登寳位皆不來賀何獨遣此使者拒而勿内明勑邉吏嚴禁私市俟其年嵗之間公私困弊使自謀而來禮必益恭辭必益遜然後朝廷責而赦之許通私市待之如初然邉民與西人交易為日積久習玩為常一旦禁之其事甚難何則若以常法治之則有司泥文動循繩墨追問證佐逮捕𫝊送之人停匿之家奏裁待報動涉半年如此則徒使邉民麗刑者衆獄犴盈溢而私市終不能禁也夫三尺之限空車不能登峭故也百仞之山重載陟其上陵夷故也今必欲嚴禁邉民與西人私市須權時别立重法犯者必死無赦本地分吏卒應廵邏者不覺透漏官員衝替兵士降配仍許人告捉獲賞錢若干當日内以官錢支給更不以犯事人家財充如此則沿邉六路各行得一兩人則庶㡬可以聳動人耳目令行禁止人不敢犯矣然人存政舉此事全在邉帥得人昔龎籍為河東經略使下令禁邉民與西人私市有熟戸犯禁籍斬於他處妻孥皆送淮南編管一境凛然無敢犯者其後施昌言為環慶路經略使亦禁私市西人發兵壓境昌言遣使問其所以來之故西人言無他事只為交易不通使者懼其兵威輙私許之法遂復壊若邉帥未能盡得其人則此法恐未易可行不若前䇿道大體正萬全無失也光又手書與三省樞宻院曰不和西戎中國終不得高枕光所上芻蕘果有可采否縱未欲遽以侵地歸之且早下一詔數其不賀正旦生辰及登寳位臣禮不備諭以天子新即位務崇寛大曠然赦之自今貢奉賜予冝皆復舊規但不責其必來獻地分畫疆界而已令保安牒與如此則彼此相彌縫且有名又不失大體不乗此際為之萬一彼㣲為邉患或更出不遜語愈難處置願諸公算其多者癸亥試御史中丞兼侍講黄履為翰林學士兼侍講履自乞罷中丞故也履除内翰制不知誰作略云方頼執法以糾正遽覽囊封而請更履此遷必有故而新舊録都不載當考正月二十二日劉摯論蔡確四當去以為確遷門下隂使言者申請改三省奏事法言者即履也履本確黨故摯論此履先罷中丞或由此閏二月二日確乃罷然改三省奏事法呂公著固嘗申請矣事具元豐八年九月乙巳此月二十八日朱光庭云云可考提㸃淮南東路刑獄専切提舉鹽事閭邱孝直知蘄州以言者論其失覺所部售鹽違令也詔臣僚上殿劄子於簾前進呈訖並實封於通進司投進即不得直乞批降三省樞宻院詔淮南東西路提舉常平司體量飢歉以義倉及常平斛㪷依條賑濟訖奏樞宻院言按閲遍開封等縣團教保甲提舉官客省副使劉琯等今既減罷難議依法全賞詔減半酬奬内有已行賞者依此改正及府界三路去年所按該補名目保正欲依元條遞降一等元補殿侍者支錢四十貫從之正月末司馬光書可考乙丑命宰臣蔡確提舉修神宗皇帝實録以翰林學士兼侍講鄧温伯吏部侍郎陸佃並為修撰官左司郎中兼著作郎林希右司郎中兼著作郎曽肇並為檢討官入内都都知張茂則都大提舉管勾詔工部尚書孫永入内都都知張茂則修景靈宫神宗皇帝神御殿朝議大夫太常少卿趙瞻為直龍圖閣知荆南尋復故復為少常在閏二月六日今并此詔以未得雨澤權令罷修黄河其諸路兵夫並放歸元來去處此據王巖叟奏議増入實録無之趙鼎臣河渠書云閏正月李常等言故道高仰還河非便從之然則罷修河盖常等使回奏請也實録獨闕之初遣常等在去年十二月十四日鼎臣書月日或與實録不同姑附注當考四月六日常等乃建議乞増置水官然則鼎臣此云還河非便恐誤也監察御史王巖叟言臣所領工察正預河事伏覩今降指揮此陛下以實應天仁民愛物之深意也然臣竊有所疑不敢遂黙陛下以為大河之役勞民動衆而未必有成功不雨之災實在於此此天意也不若罷之便然臣聞救災䘏難天之道也陛下豈不思北流横潰河北生靈被害者不可勝數日夜嗷嗷未獲安堵其愁憂無聊之氣亦足以感天道致災變乎臣願陛下念之勿忘更勑大臣講利害計輕重使河北生靈得免大患以成王道無偏之美以全陛下兼聽博覽之善巖叟奏并梁燾奏附二年四月二十六日詳注見二年二月八日詔三省元豐八年九月十八日後來増置職級逐省從上各留録事都事兩人後永為定額更不得増置其以次合遞遷之人依舊外餘並放蘓轍龍川别志云自元祐五年五月末可考侍御史劉摯監察御史王巖叟言竊惟天下㴠濡太平之恩久戴白之老不識兵革者非一日矣事方繁夥民務増衍議者謂益置郡縣以分治之乃其所也而比者聚歛之吏茍欲減役人收役錢以附今日率爾之間遂行併廢不復問事體之何如人情之樂否盖廢併之後州縣相遼濶有山嶺重複江河阻絶逺者數日近者五七宿不能一徃來於官者以言爭訟則百姓赴愬難以言賦税則百姓輸納難以言豪强則官司彈治難以言盗賊則官司警捕難以言死亡則官司檢視難以言期㑹則官司追呼難不獨如此而已也且有據㑹要扼津渡四方百姓莫不引領以望城邑之復其故而欣然願出力役以奉公上臣愚乞自免役以來併廢過州縣軍監凡可復者皆復之以便民又言自來併廢州縣雖省得役錢以為封樁之利然酒課税額虧失者不可勝計今復添官三數員禄廩至㣲酒税之利自足備用亦於公家無所侵耗臣昔嘗親見廢相州永和縣為政之初永和之民相與號訴於官曰不知官中歳所利者幾何百姓願計其數均認之随二税以納幸留吾邑不廢也官不敢受其詞竟廢之陛下以此觀廢邑之人情宜復否也又親見恩州漳南鎮百姓告于州乞自備材植出工力修廨宇完倉庫復置本邑又親見大名府永濟縣自廢為鎮累遭羣盗驚刼民居破散無復生意劉摯奏藁有此章王巖叟集亦有之今並附兩人朱光庭奏議亦有此更須考詳詔廢併州縣令諸路轉運提㸃刑獄提舉常平司同相度合與不合廢併以聞玉牒乙丑詔諸路相度廢併州縣先是司馬光言臣竊見免役之法其害有五舊日差役之時上戸雖差充役次有所陪備然年滿之後却得休息數年營治家産以備後役今則年年出錢無有休息或有所出錢數多於往日充役陪備之錢者此其害一也舊日差役之時下戸元不充役今來一例出錢免役驅廹貧民剥膚椎髓家産既盡流移無歸弱者轉死溝壑强者聚為盗賊此其害二也舊日差役之時所差皆土著良民各有宗族田産使之作公人管勾諸事各自愛惜少敢大叚作過使之主守官物少敢侵盗所以然者事發逃亡有宗族田産以累其心故也今召募四方浮浪之人充役無宗族田産之累作公人則恣為姦偽曲法受贓主守官物則侵欺盗用一旦事發則挈家亡去變易姓名往别州縣投名官中無由追捕官物亦無處理索此其害三也自古農民所有不過榖帛與力凡所以供公賦役無出三者皆取諸其身而無窮盡今朝廷立法曰我不用汝力輸我錢我自雇人殊不知農民出錢難於出力何則錢非民間所鑄皆出於官上農之家所多有者不過莊田榖帛牛具桑柘而已無積錢數百貫者也自古豐歳榖賤已自傷農官中更以免役及諸色錢督之則榖愈賤矣平時一㪷直百錢者不過直四五十文更急責之則直三二十矣豐年猶可以糶榖送納官錢若遇凶年則榖帛亦無不免賣莊田牛具桑柘以求錢納官既家家各賣如何得售惟有拆屋伐桑以賣薪殺牛以賣肉今歳如此來嵗何以為生是官立法以殄盡民之生計此其害四也提舉常平倉司惟務多歛役錢廣積寛剰以為功效希求進用今朝廷雖有指揮令役錢寛剰不得過二分竊慮聚斂之臣猶依傍役錢别作名目隐藏寛剰使幽逺之人不被聖澤此其害五也陛下近詔臣民各上封事言民間疾苦所降出者約數千章無有不言免役錢之害者足知其為天下之公患無疑也以臣愚見為今之計莫若直降勑命應天下免役錢一切並罷其諸色役人並依熙寧元年以前舊法人數委本縣令佐親自揭五等丁産簿定差仍令刑部檢㑹熙寧元年見行差役條貫雕印頒下諸州所差之人若正身自願充役者即令充役不願充役者任便選雇有行止人自代其雇錢多少私下商量若所雇人逃亡即勒正身别雇若將帯却官物勒正身陪填如此則諸色公人盡得有根柢行止之人少敢作過官中百事無不修舉其見雇役人候差到役人各放逐便數内惟衙前一役最號重難曏者差役之時有因重難破家産者朝廷為此始議作助役法然自後條貫優假衙前諸公庫設厨酒庫茶酒司並差將校勾當諸上京綱運召得替官員或差使臣殿侍軍大將管押其麄色及畸零之物差將校或節級管押衙前苦無差遣不聞更有破産之人若今日差充衙前料民間陪備亦少於曏日不至有破家産者若猶以為衙前戸力難以獨任即乞依舊於官戸僧道寺觀單丁女戸有屋業每月掠錢及十五貫莊田中年所收斛㪷及百石以上者並令随貧富分等第出助役錢不及此數者與放免其餘産業並約此為准所有助役錢令逐州樁管據所有多少數目約本州衙前重難分數每分合給幾錢遇衙前合當重難差遣即行支給然尚慮天下役人利害逐處各有不同欲乞於今來勑内更指揮行下開封府界及諸路轉運司謄下諸州縣委逐縣官看詳若依今來指揮别無妨礙可以施行即便依此施行若有妨礙致施行未得即仰限勑到五日内具利害擘畫申本州仰本州類聚諸縣所申擇其可取者限勑書到一月内具利害擘畫申轉運司仰轉運司類聚諸州所申擇其可取者限勑書到一季内具利害擘畫奏聞朝廷候奏到委執政官再加看詳各随宜修改别作一路一州一縣勑施行務要所在設法曲盡其宜是日乙丑六日三省樞宻院同進呈得㫖依奏初議役法蔡確言此大事也當與樞宻院共之故三省樞宻院同進呈按光集自注以正月二十二日上此劄子尋得㫖依奏舊録於二月六日載之盖二月六日方得㫖依奏耳光二十一日謁告次日即論此豈非光所云四害不除吾死不瞑目故如是汲汲乎又按閏二月一日章惇駁議却稱光此劄子係二月三日與光自注不同盖二月三日降出此劄子耳二月三日降出此劄子四日三省乞與審院同進呈五日聚㕔商量六日進呈得㫖惇乃徐上駁議也今先載光劄子不著月日於二月六日云得㫖依奏庶免牴牾新録於舊録大率所因者多亦縁史官弗暇深考耳舊録於此日略載司馬光所言云云從之别書初神考患差役害民多至破産有鬻子孫及自經拆居避役者乃出錢募人免其身役人得樂業戸無繇役之苦司馬光在熙寧中力言役法非便故得罪神考至是登用遂倡首詆毁成法欺惑簾幃鼓帥羣邪喧然助之臣報君怨於義可乎差役今既下州縣鈎召農民應官府之役追擾紛然各失生業或差或募卒不克定焉於是附㑹者爭言變法御史劉摯言乞以坊場錢募衙前外其餘役人並用祖宗差法殿中侍御史劉次荘言伏見熙寧以來變新役法其意欲以均恵利民盖以富厚之家安享佚休而貧民日入於困之欲乞指揮下諸路轉運提舉官合郡縣之議究心斟酌裁畫上聞監察御史王巖叟言乞罷免役法復差法如嘉祐勑獨於衙前大役立本等相助法以盡變通之利一切非理資陪悉用熙寧新法之禁時議者不一民大失望新録辯曰免役施行之初論者不一司馬光嘗力言其非便及是執政復申前説且下其議監司郡縣意在便民而已謂光欺惑簾幃臣報君怨可謂厚誣除司馬光劉摯等所言别列於後餘並刪去新録辯誣别載光摯所言固善矣猶恨討論弗詳於次莊巖叟所言但依舊録所載數語耳今移摯次莊巖叟所言先見於正月九日仍於二月六日特書三省樞宻院同進呈得㫖依奏庶不失事實呂大防政目二月六日詔行司馬光役法役錢並免役人揭簿定差又劉摯奏乞以坊場詔衙前外役人並差又王巖叟奏乞鄉户主官物役人並差摯巖叟奏已見正月九日玉牒云乙丑詔改役法丙寅侍御史劉摯奏臣近者累具彈奏宰臣蔡確知樞宻院章惇乞行罷黜章十餘上日夕祗聼尚未聞報臣以孤賤綿薄雖區區忠憤而不能感悟天心臣誠死罪然而察安危之機考邪正之辨以聖眀天日之鑒豈有難者所以睿斷遲遲而不發者臣竊料聖意其説有二其一則陛下必曰凡此執政皆受遺有功故不欲遽有去留其二則陛下必曰今日朝廷宜安靖無為以鎮天下未可變移執政臣以謂不然請為陛下言之恭以皇帝陛下之立乃承祖考次序太皇太后陛下於神宗進藥之日已有定命當是時上無危疑之勢下無睽貳之論則大臣奉承而已何功之有也非如古昔之時付託艱難故成敗可否在大臣也况自去年以來恩賞大臣亦已不薄進其官爵則過越故事賜之金帛則莫知紀極固已無負於大臣矣今已逾年改元龍徳日盛聖政日新廟社之安於㤗山上繫太皇太后陛下之保祐則尚何頼此一二姦人哉若夫今日宜安靖之治則誠是也然所謂安靖者謂疲民不可復擾也謂邉事不可復作也謂法令不可煩苛也謂土木未可興也如此之類而已非謂容姦邪也若國之安危民之愁苦士之忠邪一切不問而曰我欲為安靖之治則大誤矣今大姦大猾持權當路豈可牽於受遺之説而留之乃是以厚恩養禍患也正人憂畏邪黨横行又豈可牽於安靖之説而不問則是以無事養朋黨也譬如毒虵齧手壯士必斷其腕盖所去者小而所全者大也今確與惇矜功肆惡而陛下恐傷前日受遺之小恩而容之使為後日國家之大患則無乃異於壯士之取舍乎豺狼在門必急逐之若拱手安坐憚於舉動則彼得無所畏憚伺便揺尾而入矣今確與惇朋邪害政凶熖日熾而陛下包含覆盖欲守安靖之説不察緩急之勢使姦謀日深後不可動天下受其害則又無乃類於不逐豺狼者乎確之與惇天資姦偽㧞於常調小官十餘年間遂至輔弼則神宗皇帝之於二人其恩徳可謂大矣然猶以不忠事之則於今日豈有至誠大節以事陛下也陛下以生民困敝故今於政令有所更張而確等勢不得已承命改為然不知陛下能保其後日之心乎臣逼於公議彈擊大臣論其名分則臣賤也彼貴也臣孤寒也彼權勢也若論其至公大議則臣備耳目之任自視其言可以貫天地而質神明則陛下豈終不察臣之忠乎伏望聖慈降臣前後章疏付三省早奮剛斷罷確與惇以幸天下貼黄今忠義士見姦邪魁黨對据要路故皆不自安有避禍欲去之意使忠義引去則陛下誰與立天下善政乎臣所以日夜憂恐不避煩凟聖聽再三以告陛下伏惟裁幸又貼黄臣前後所論確等事皆是輕慢君父欺罔中外不忠不恭營私害政之大罪非指其小事也非訐其隂私也伏望再賜省覽臣前後章疏然後降付施行元祐元年二月七日第九疏刑部言荆湖南路轉運司狀邵州蒔竹縣歸明人戸龍仁米殺人未獲乞依誠州立賞捕殺從之舊録有此新録刪去樞宻院言京西第一將等狀為申明與所在知州知縣同管將下公事令詳轉補排連差使窠坐旬呈給假比拍揀人之類及申奏兵帳自合同管其不下司將勑虎符除收掌依舊外虎符遇發兵亦合與知州知縣合符不下司將勑因公事合要照使即與將副聚㕔開讀其約束合依將副法施行又將副廵教有事藝生疎者止令本將科决其州縣日有公事難與將副分廵教閲止合時徃提舉若每旬聚㕔呈驗人馬之類非將副駐劄處申發文字並知州知縣同管從之丁卯詔曰朕紹承聖緒總攬庶政永惟四方萬里之逺其能使吏稱其職而民䝉其澤者以監司得其人故也然非左右侍從之臣各舉所知則安能盡得天下之才而用之哉孔子曰如有所譽者其有所試矣朕將考核能否而進退誅賞焉應内外待制大中大夫以上限詔到一月各舉曽歴一任知州已上聰明公正所至有名堪充監司者二人委中書籍記遇轉運使副提㸃刑獄有闕選差若到官之後才識昏愚職業堕廢薦才按罪喜怒任情即各依本罪大小并舉者加懲責司馬光正月末咨目所言薦舉資格今乃施行也政目係之初二日承議郎章元方言兩浙每嵗舊買鹽本錢常以三十萬貫為額近來不下四十萬貫雖本數有加而計利葢寡刑嚴賞重私鹽盗販州縣積壓巨萬欲乞廢罷諸處買鹽場將見管亭戸召情願分等第令每月納淨利錢許依舊亭池煎鹽出賣餘人願納錢煎鹽者聼仍許通商於所過州縣輸税詔本路轉運司相度以聞新本削去今復存之監察御史王巖叟奏編類章疏二月八日臣聞孔子之戒曰逺佞人言佞人不可近也盖其巧言令色久而親之必使人有以喜者喜則䜛邪可得而行䜛邪既行則忠正日踈忠正日疎則君徳損而治道衰矣天下之勢有不可言也故聖人直以逺之為戒其所以防佞人慮豈不深哉今佞人在陛下之旁持天下之權預天下之事者非一二人而皇帝陛下富於春秋太皇太后陛下不出房闥是佞人易欺而難覺得行其志之時也臣職當指佞義在進忠伏見蔡確章惇佞人之傑也天下之人見其欺罔先帝無所不至而今日猶在廟堂親近陛下莫不共以為憂臣前後疏其姦惡不為不多皆敗壊紀綱陵夷風教有害國家之大體當行竄黜者而陛下含容未施威斷臣竊計陛下不知二姦在上威福足以動人朝廷之士有以甘言寵利誘而去者有以隂機凶􅆋脅而去者誘脅之餘中立而為陛下用者其能有幾既姦臣之黨日益以盛則朝廷之勢日益以孤將不敢有人言其惡矣他日陛下雖欲聞之不可得也陛下安可不深思而早圖之况歴朝已來進退大臣亦是尋常陛下不須以為大事也臣伏觀仁宗用王隨作宰相陳堯佐韓億石中立作參知政事因諫官韓琦言王隨不才中書行事多有滯留陳堯佐韓億有挾私之事石中立惟好滑稽談笑一日之間罷四執政天下莫不服仁宗納諫之善能斷之美朝廷清明而無所蔽百官警懼而不敢私所以能成天下之盛治者其要在此而已天下之人皆以仁宗之政望陛下陛下固當以仁宗行事為法副天下之望今大臣之惡過於當時而陛下斷之緩於前日且王隨疎謬寧同蔡確之姦邪中立滑稽豈比章惇之凶劣至於陳堯佐韓億所犯止縁一事渉私亦無其他謟惡仁宗尚不少容而四人同時俱罷陛下今日罷二人有何難事惟在陛下一言而已伏望聖慈早賜睿斷出臣前後章疏付外施行貼黄臣為勑差在太學公試院監試即無印使用又貼黄陛下如欲見仁宗罷王隨等四人本未乞指揮中書檢韓琦章疏王巖叟疏又見二十五日今從元祐宻奏殿前都指揮使武信軍節度使燕逹等言試驗到太原府曲陽縣大保長劉用事藝應法詔劉用與三班差使賜衣帶令歸吏部别承差遣韓維言臣竊見光禄大夫致仕范鎮徃在仁宗朝常為諫官是時仁宗皇帝春秋漸高國嗣未立中外臣庶咸以為憂獨鎮率先羣臣首倡大議擇宗室之賢預建儲副以安國本凡上章者十九貽執政書者二獻大合祭賦者一所言忠切至忘其身言未見用則乞罷諫職又乞放歸田里又乞降知小州除知雜御史又固辭不受惟以安宗廟社禝為憂自此大臣始繼有論奏英宗皇帝遂自藩邸入繼大統先帝追録忠言如文彦博富弼皆身被褒寵賞延其嗣劉沆王堯臣雖已殁猶推恩官其子而恩賞獨不及鎮鎮之為人忠實靜黙未嘗以此事語人人亦莫為言者盖顔淵之無伐善介子推之不言禄鎮皆有焉臣竊傷鎮抱大忠發大計當先帝褒叙忠勲遺不見録遭遇陛下惟新之政耆舊退廢之人畢見收採而鎮老矣不及於用伏望聖慈察鎮先識首議有勞宗社特降明詔褒顯厥功使天下知朝廷之行信賞雖久而不廢人臣之抱忠計雖隂而必録足使為善者勸上助風化司馬光以病在告亦移書三省趣同列進呈維疏優與推恩光書在正月二十八日己巳以光禄大夫范鎮為端明殿學士致仕仍以鎮子蔡州平西縣令百揆為宣徳郎監西京嵩山中嶽廟尋又賜鎮對衣鞍轡馬賜衣馬乃二十二日舊録有之新録削去今附見於此呂大防政目於初二日載此事又載職方員外郎張述與一子官皆以嘉祐中乞建皇嗣今從實録見初十日張述事當考鎮十月十六日庚子落致仕二十二日乙巳又降詔召十一月二十四日戊寅提舉崇福宫初英宗登極祔仁宗神主而遷僖祖及神宗即位復還僖祖而遷順祖鎮上言太祖起宋州有天下與漢髙祖同僖祖不當復還乞下百官議不報及上即位鎮又乞遷僖祖正太祖東嚮之位時年㡬八十矣鎮此議當求全本附載初議見熙寧五年十一月二十三日戊辰此年十一月二十四日鎮辭提舉中太一集禧兼侍讀改崇福宮先是鎮嘗具奏太祖皇帝自宋州有天下國號大宋得禮之變與漢同符英宗皇帝亦嘗祧遷僖祖熙寧一二大臣建議復還僖祖而遷順祖是太祖不得東嚮為宋太祖也豈所以稱建業垂統以貽萬世子孫之計哉又今大樂君臣民事物皆失其位臣在先朝屢嘗建言雖送有司而未改正定議陛下新即大位所先者禮樂而禮樂之不可不正者如此伏惟追復英宗皇帝祧遷僖祖之禮正太祖皇帝東嚮之位改定大樂以為初政之美而副天下之望臣不勝大願又奏臣先帝時嘗奏太廟自遷還僖祖而太祖不得東嚮非子孫所以奉承建業開國之意又言太常樂君臣民事物皆失其位至今未見施行伏惟太祖是為百世不遷之祖安可以僖祖易之又大樂以薦天地宗廟社稷不當如此乖誤竊縁五使按警惕閲素隊在近又將發引皆用此聲不可不慮自祖宗以來每升祔虞主必先講議祧遷伏乞因此時復太祖東嚮之位及正大樂之乖誤則禮樂之正寔萬世之典也鎮時年㡬八十矣神宗升祔在去年十一月丁酉鎮兩奏必在去年十月乙酉前今因鎮加端明具載此兩奏其初奏僖祖不當復還在熙寧五年十月二十三日若載鎮此兩奏則自初英宗云云八十矣並合換去更詳之英宗登極祔仁宗神主而遷僖祖此墓誌所云然考實録則雖有此議既而不果遷也治平四年九月英宗祔廟乃遷僖祖熙寧五年十一月始復還為始祖墓誌盖小誤耳案注中五使按警惕未詳右羽林軍大將軍郢州防禦使令廓嗣封越國公侍御史劉摯言臣數日來𫝊聞前知徐州王説除倉部郎中又云差知荆南臣謹按王説昨在徐州見前政趙鼎相度鑄錢不便違忤轉運司意遂為吳居厚捃拾勒停説以此曲意取容迎合附㑹興置錢冶科買調歛困民殘物勞費逼廹無益公家一方之弊説實成之昨者朝廷治居厚掊刻欺妄之罪而不及説者盖聖恩以寛厚安人心謂州郡有所受於監司而已説之獲免幸矣今又從而進之恐無以為是非善惡之辨况説資材闒茸淺陋一無所長而有朋比姦佞之跡先帝正官名嚴省闥之選今於任人宜加選擇荆南帥守節制一路皆非説之所宜伏乞除説一外任合入差遣以允公議貼黄言臣得於風聞須至先事而言萬一無此不過為妄言又言吳居厚於京東妄有興作凡州縣誰敢違抗今固不可一一罪之但説於其間尤為過當随事增革以諂居厚如於鄉戸逐等科炭最為害民今來又遽有遷擢臣所以論之非謂奉行居厚事者皆可追治也摯遺藁此章以初九日上今附十日嫌與范鎮事相亂也王説除倉部郎中在二月一日尋出知宻州在閏二月四日又閏二月末蘓轍奏可考庚午詔陜西河東經略司應今後與夏國人私相交易若取與者一錢以上皆配江淮州軍牢城妻子詣配所情重及至罪止者皆斬妻子送江淮州軍編管許人告捕賞有差其透漏官司及地分廵察人知情者與同罪用司馬光次䇿也正月二十二日朱光庭言可考都大提舉成都府永興軍路𣙜茶公事陸師閔言先准朝㫖每年支撥茶一萬䭾與熈河路經制司充折嵗額錢乞施行詔依舊每嵗應副經制司錢三十萬貫所有支茶充折不行其别應副經制司錢六十萬貫即依元豐七年九月四日指揮嵗支錢二百萬貫以本司十案息錢二十萬提舉㩁茶司熙河路嵗收息并應副經制司茶折剰錢共六十萬川路計置物帛赴鳳翔府樁坊場錢三十五萬川路常平免役積剰錢二十萬仍依坊場錢例計置物帛及陜西三銅錢監銅錫本脚錢二十四萬八千貫在京封樁錢劵馬縻費錢一十萬貫裁减錢一十萬二千貫續起常平等積剰錢二十萬充自元豐八年為始内茶及物帛以熙河路價理數其從京所支錢仰戸部每年依例印給公據闗差使臣齎送候至元豐十年終令經制司具逐年實支見在數目奏取指揮正月一日巳改元此不應更稱元豐十年恐誤編入此當在未改元前可移入元豐八年年末復晉州和川鎮為縣辛未朝請郎守侍御史劉摯試御史中丞新除左司諫唐淑問改差管勾靈仙觀淑問初未供職以疾匄閑許之淑問傳言亟上䟽言十事不知何事也當尋或有當追附者詔起居郎舍人依舊制不分記言動先是起居郎蔡京言舊修起居注官二員不分左右故月輪一員修纂今起居郎舍人分𨽻門下中書兩省所以備左右史官則左當書動右當書言而乃尚仍舊制毎月輪修盖其職事未之有别恐未足以稱朝廷正名責實之意欲乞今後起居郎舍人隨左右分記言動元豐中已詔可門下中書兩省言禮記雖有左右史分記言動之文然歴代即無分記言動故事但云事為春秋言為尚書今觀尚書不免兼載言動今若止以制誥為言則猶可分記若臨時宣諭處置可否之類即須有因依始末欲乞且依舊制故有是詔詔每遇忌辰臣僚赴西上閤門奏慰訖詣内東門奉慰太皇太后從禮部奏請也復成都府𨗳江縣為永康軍樞宻院言西蕃邈川首領河西軍節度使武威郡王董戩文字稱被病且死其蕃族國土事已令男鄂特凌古管勾兼鄂特凌古稱董戩已死今代父主蕃族進奉按治平三年董戩承襲嘉勒斯賚進奉赴闕除官今鄂特凌古進奉已於二月九日到京詔鄂特凌古承襲仍除節度使先是鄂特凌古既代董戩領青唐事元豐六年十月末然猶不敢以承襲告朝廷徐聞董戩死未知孰立詔邉臣宻偵之時元豐七年六月也及是踰二年矣因鄂特凌古來告隨加爵命除節度使起復在十八日司馬光言臣於今月三日上言以西人未服中國不得無憂而備邉不敢少㢮不自揆其狂妄獻二䇿上䇿欲因天子繼統曠然赦之歸其侵地與之更始下䇿欲嚴私市俟其屈服然後赦之然禁私市甚難立法極嚴又邉帥得人然後能行不若前䇿之道大體正萬全無失也今竊聞執政用臣下䇿止令禁私市又立法不嚴邉帥未盡得人若邉吏拘文獲一漏百私市滔滔如故或此路禁絶而彼路放行如隄防一存一亡将何所益如此適足以激怒西人使益發悖心安肯屈服萬一㣲犯邉境或表牒中形不遜語朝廷轉難處置悔之無及不若用臣上䇿早相彌縫縱未欲還其侵地且下詔書責而赦之使彼此安心時難得而易失不可忽也况本欲因天子繼統蕩滌其罪今日行之已為大晚若更遷延則赦之無名兹事繫國安危若俟執政論議僉同恐失機㑹誤國大事伏望聖意獨斷行之勿復有疑天下幸甚若有執政立異議乞令其人自入文字若依從其議他日因此致引惹邉事當専執其咎十六日又言左正言朱光廷奏此據編類章疏増入二月十三臣竊以堯舜帝之盛也文武王之盛也豈獨運聖智而至於此邪盖資賢臣輔翊而然也觀詩書所載臯䕫稷契與夫周召呂畢之徒其嘉謀精忠見之行事固彰彰已恭惟朝廷今日聖政之隆思欲天下元元入於仁夀之域乃堯舜文武之用心也然而輔弼之臣忠邪混淆其懐私意肆邪説冐寵榮偷安持禄者不一是豈臯䕫稷契周召呂畢之事業何足以奉承聖政康濟天下者哉臣已累具奏論願陛下早賜睿斷亦嘗備論天下之忠賢願陛下専隆信任至今未䝉施行夫以道事君者大臣之事也難進易退者大臣之節也若蔡確之進本以滋章獄事章惇之進本以妄興邉事韓縝之進本以附㑹地界是豈以道事君之事哉今日確以故事當去而不去懐私自營偃然安處惇之肆為辨説復懐觀望以固寵禄縝之冐處大任内有賢兄不知引避顧豈有難進易退之節乎恭惟陛下睿智日新發為善政將繼堯舜文武之盛烈而輔弼之臣懐私挾邪冐寵之如此彼雖不畏清議强顔固位寧不自愧於心乎况司馬光之賢已為陛下信任范純仁韓維今進在講筵是三臣之賢者皆有志於臯䕫周召事業願陛下進此三人以代蔡確韓縝章惇之任其張璪已下皆持禄備位之臣固不足以當此伏望陛下别白忠邪斷在不疑早行黜降以幸天下今日雖更張法度以惠斯民然彌綸補葺正在輔弼皆得賢人共濟聖治若去彼姦諛進此忠赤則天下萬事無復憂者陛下垂衣拱手以享天下而已光庭又奏乞以程頥為講官此據政目十二日事當求光庭奏附此八年十一月二十七日以汝團除西京國子教授元年閠二月十八日承奉校書三月十四日召對二十四日通直説書
