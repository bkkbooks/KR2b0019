body:
  text: 續資治通鑑長編卷四百八十六宋李燾撰哲宗紹聖四年四月辛丑吏部言工部侍郎王宗望等奏乞黄河向着隄埽巡河并監物料場官並許都水使者内外丞依舊輪舉欲依所乞從之刑部言太僕寺主簿李撰知皇太后行幸輒於御路東行馬合罰銅九斤詔特罰銅三十斤衝替撰蘇州人三省言勑諭同進士出身劉溥狀法合銓試方許出官念溥父年九十四欲得早霑禄養詔特與免試注官是日故追貶建武軍節度副使呂公著特追貶昌化軍司户參軍故追貶清海軍節度副使司馬光特追貶朱崖軍司户參軍公著制詞曰量罪加刑有國常訓為臣背義雖死必誅以爾被遇先朝擢居樞府迨予纂服復任宰司宜竭忠謀協贊王室而乃廢體國之大義忘事君之小心隂結姦臣私懐異意謗訕先烈變亂舊章積惡終身久益暴露孽實自作刑難幸逃雖嘗示於小懲尚未符於衆議是用追貶嶺表降秩州掾庶期幽顯知有所畏光制詞曰爾以詆訕宗廟迷誤朝廷戮有餘辜死未塞責久稽罪罰追正典刑而隠慝愈彰公言難掩嘗與凶黨實藏禍心至引宣訓衰亂不道之謀借喻寳慈聖烈非意之事興言及此積慮謂何雖免嚴誅載加貶秩庶幾來世永有創懲先是邢恕為章惇言元豐八年神宗晏駕三月二十七日范祖禹自西京赴召司馬光送别於下浮橋船中光謂祖禹曰方今主少國疑宣訓事不可不慮宣訓者北齊武明婁太后宫名也婁太后廢其孫少主殷立其子常山王演恕專謗宣仁聖烈皇后有廢立意又偽造光此言以信已説然祖禹實以七年冬末赴召雖惇亦知其誕妄故不復窮究但借此以罪光謂光志在傾揺猥用齊武明事擬宣仁聖烈皇后并吕公著復追貶之惇常稱司馬光村夫子無能為吕公著素有家風凡變改法度皆公著教之也吕公著司馬光再追貶司户實録不書據光舊𫝊四年二月己未貶清海副使四月辛丑再貶朱崖司户己未二月四日也實録既書之辛丑四月十八日也實録獨不書不知何也今追書之光新𫝊又刪去月日故必以舊𫝊為據又宣訓事新録但於宣仁𫝊後因叙邢恕傾危略載之要當以邵伯温辯誣刪修公著光責詞據紹聖邸報邵伯温辯誣云宣訓事者邢恕為章惇説云司馬光亦疑宣仁后有廢立事元豐八年神宗晏駕三月二十七日范祖禹自西京赴召司馬光送别於下浮橋舡中光謂祖禹曰方今主少國疑宣訓事恐或有之盖宣訓者北齊婁太后宫名婁太后廢其孫少主殷立其子常山王演恕妄以謂司馬光亦有是言以實宣仁后有廢立之意使天下信之恕初不考校元豐七年秋司馬公因資治通鑑成薦修書范祖禹於神宗遂除秘書省正字伯温見司馬公公曰范純夫金玉也自其未第已從某學今十餘年如一日既登科甲從某修書又十五年略無留滯寂寞之意故因書成薦之此溫公為伯温言者范祖禹以十二月赴召時冬暖洛水不氷乘漕司官舡以行伯溫與留守韓相之子宗師士大夫朱光庭田述古數人同送不見温公也恕謂三月二十七日范祖禹赴召温公送至下浮橋船中以日月計之正神宗崩司馬光赴臨京師時也恕之誕妄如此後伯温見祖禹族弟祖述言純夫以元豐七年十二月赴召次年上元入朝以神宗寢疾免見方范祖禹赴召時神宗猶在御也恕乃云司馬公有主少國疑之語可見其誕妄如此章惇得邢恕之言反謂司馬温公以宣仁聖烈皇后比婁后遂追貶崖州司户參軍又以吕申公同時為相亦追貶昌化軍司户參軍蓋章惇以謂吕申公教司馬温公退出元豐大臣改變熙寧元豐法度惇常有語曰司馬公村夫子不解此吕公著素有家風教之也建中靖國元年八月邢恕申實録院狀云恕為御史中丞為章惇所擠與同知樞宻院事林希皆以本官罷職恕遂出知汝州數月移知南京時哲宗亦徐知希與恕俱罷希有罪名而恕無明白罪名惇恐恕復用即檢尋出恕元祐初因罷中書舍人責知陶州日曽於簾箔有疏自辯然箔中固未嘗聽責命遂下其後再責永州監當首尾九年皆在謫籍並因國事即不縁私而惇悉置不論至元符元年冬乃取下三年前章疏抉摘疑似上欺哲宗聖聽降恕三官責知南安軍章疏中止於自序敭歴本末未嘗干及朝政乃具述神宗皇帝追惟遇臣疇昔之言察臣本末記其姓名乃復召還館閣又云至於神宗皇帝末年能察知臣以為忠信遂除尚書省官則於責詞中並削去不言特著其熙寧初忤㫖罷館職之言以巧相誣詆恕時以簾箔未相知恐以為前此嘗違道干進故云及臣除尚書職方員外時司馬光亦除資政殿學士其日月可考也惇即見詆云自謂與司馬光同被收擢又恕時有故與韓維相連所以云韓維素有名徳及與司馬光吕公著為一等惇見詆云指權臣為名徳此皆見於訓詞之言足為顯據而去年六月間惇尚當國責恕均州分司反以司馬光吕公著追貶海外之日由恕所擠公著之貶海外責詞具在罪名可見與司馬光所坐口語並無分毫干涉惇之貶光已是厚誣至同貶公著海外當時之人尤知其無名然則公著與恕略不相干事理灼然至貶光海外則縁光在元豐八年春與范祖禹曽説今上皇帝已嗣位然婁后事猶可慮祖禹先到京師恕因與祖禹閒言哲宗方十嵗比至還政須更十年中間事亦有可慮祖禹即道光之言時司馬光尚未起不能深知宣仁之用心故有此言然其於哲宗之意則忠也祖禹與光深相知所以與恕説者正以光為善意非惡也恕曽説與蔡確章惇亦以光言為有憂國愛君之意爾當是時朝廷方嚮用光欲以為相又簾箔在上光言於簾中乃有形迹恕特宻與確等説則豈以光意為不善有陷光之意哉及至紹聖間章惇疑恕恐其不為己用每以光公著為言欲見把持至云恕是吕公著上客又云恕昔時常托司馬光在手掌裏凡紹聖間侍從臣僚無不聞知則惇方貶光公著之日豈容恕知其謀也因葉祖洽論王珪事林希本出珪門下又是親戚惇既與希為黨以希之故隂欲庇珪而祖洽論珪事乃引光公著與珪為此謂光公著已貶節度副使則珪豈可置而不行時王珪之貶因祖洽屢有章疏至光公著則已貶節度副使其後並無人言又別無事因特因祖洽之言所激遂同日與珪皆貶則惇豈嘗見問恕亦何嘗聞知但既貶光公著後恕徐聞惇於哲宗前以光言婁后事猶可慮乃以為幸其如此兼觀光責詞謂其實藏禍心則其㫖可知也至於吕公著責詞則與責節副詞大節皆相表裏其後別無罪名然不知惇當日因何與光並責也惇既貶光知其別無事因即於貶光之日旋畫㫖下編類所應事干臣僚並仰本所直行取㑹仍備坐若有隠匿増減漏泄並科除名之罪貶光後五十二日編類所方行牒來止於取㑹司馬光語言而已與吕公著了無相干也恕即回牒具坐元豐八年夏范祖禹與恕説曽與司馬光同在洛河官舡中説及先皇帝已嗣位然婁后事猶可慮恕尋曽説與左僕射章惇及故左僕射蔡確委是詣實回牒今在編類所案卷中可以檢照恕止云光言猶可慮則是憂慮恐有此事如何惇以可慮之言乃反指為禍心也兼當年二月初責光為節度副使時責詞中已有濳懐睥睨之邪計欲快傾揺之二心此兩句固已指光猶可慮之言以為邪計二心但其言不甚別白爾至貶光海外之日則云乃與凶黨實藏禍心至引宣訓衰亂不道之謀借喻寳慈聖烈非意之事興言及此積慮謂何止是更注解邪計二心之詞而已即知惇再貶光公著有激而然也其下積慮二字乃惇狡獪欲該載光言慮字在其間爾然光所謂猶可慮者直是憂恐之言固無幸願之意與惇所謂慮者文義語脉理自不同惇雖强欲牽合不免益見其撰造也若惇以光言為明有惡意則當日責辭何不實載光可慮之言以為有幸災之意如此即是著光本語惇知果爾則不足以誑惑天下人必有詞故匿光本語飾以己意然則誣陷光者特出於惇事理甚明恕牒又云尋説與惇及蔡確則顯見非紹聖後語惇也其言出於范祖禹祖禹與光至相厚固非談光之惡恕傳祖禹之言固無陷光之意今聖明方辨光公著之寃而惇實陷光不自執咎乃反嫁禍於恕與前責恕南安辭云自謂與司馬光同被收擢指權臣為名徳者前後蓋不類也况惇將責光之日恕若與惇符同則惇必先令恕供析然後行遣豈有先貶光海外後行取㑹之理蓋惇知恕與已不同若先來取㑹即恐恕或有𨼆匿或為光解釋即却難以撰造所以惇先用己意織成光罪既貶光後更畫聖意以除名之罪見脅方來取㑹而恕所答牒辭如前則不肯𫝊㑹章惇符同責詞灼然可見兼責光海外後半年恕方除御史中丞時林希與惇相為表裏謂恕為公著黨人欲以此相脅持恕恐此言必達哲宗之聽遂曽因事奏陳云惇嘗以臣為素與司馬光吕公著厚欲以此制臣先時惇常云賢常托司馬光在手掌裏臣答惇云光素有賢名方元豐以前天下之人孰不稱其賢者固不能逆知光後日為相改更太過也至於神宗皇帝末年亦嘗特進光資政殿學士然則神宗豈不賢光哉惇它日又面折臣云賢是吕公著上客臣答以臣為吕公著上客固不可欺相公但當元祐間恕與吕公著進退禍福自不同方吕在元祐間進時恕却退方吕為簾省所知得福之日恕掇簾箔之怒乃得禍這箇却不同惇云若不恁地即却須厮隨着過嶺去也恕既具為哲宗道此二事且云恐惇今日以此持臣欲其順已臣自顧昔者實曽稱道光公著然臣本公言非有私也臣若為惇所持則御史臺可廢矣哲宗面諭云卿既與他進退不同不妨莫信所謂莫信者令莫信惇也使恕果先傅㑹惇證明光罪貶光海外則惇希寧復以此更見脅持但乞照驗恕責南安告詞猶云自謂與司馬光同被收擢指權臣為名徳則知方恕為御史中丞日惇以恕與光等素厚見詆可知矣程頤貶涪州亦是林希與章惇以為恕素師事頤故遂於哲宗前陷成頤罪未從貶頤乃於執政大臣聚㑹處見詆云師既如此為弟子者當如何恕尋聞其説亦曽對哲宗皇帝開陳云程頤之貶臣不知以何罪臣於頤昔者實以師友之間處之但自元豐三年頤曽到京師與之相見後至今二十年不曽相㑹元祐間與頤又不同進退然則惇雖罪頤焉能中臣但惇縁希故挾情用刑則天下安得心服理當奏知哲宗云㑹得希之見詆先朝大臣皆聞其言則恕對哲宗面辨其事可知希為惇謀猶欲以程頤見中則其於司馬光吕公著又可知也今來實録當具載光公著之貶則罪光本末宜得其實乞賜照㑹劉跂辨謗録載張舜民説建中靖國元年正月二十二日跂詣舜民相見舜民時任吏部侍郎言去年秋四次登對皆乞早辨宣仁疑謗則諸臣僚家誣搆事皆釋然上謂當日誣謗自不分明今日却不用分明辨之問曽見邢恕責詞否此乃辨宣仁也對未曽見後來又責周秩廣徳軍上又云亦辨宣仁也舜民又説婁后語言本是章惇説出指以為邢恕所言恕曽上章乞與賊臣惇各被五木對辨於御史府不降出舜民曽乞降此章付外上不允按舜民所言恕乞與惇各被五木對辨婁后事他書並無之當考壬寅詔范純仁元祐四年罷相恩例不追奪其已追奪並給還王巖叟依吕大防等例追奪司馬光吕公著遺表恩例並依例追奪又詔趙卨追原任大中大夫中大夫兩官並歴任職名所有贈官亦行追奪更有似此者依此施行因吏部刑部有請也環慶路走馬承受李兊蓋横言體訪得張存到三角川遣銳兵先入鹽州討殺燔燒族帳回西賊邀擊王師疲乏上高原卓歇間西賊縱火來攻殺蕃官承制趙宗銳使臣趙景浮及亡失漢蕃兵六百七十人斬獲首級除抛棄外只收三百八十二級經略司言張存領兵入鹽州殺戮三千餘人驅擄到老幼婦女五百餘口路逢西賊人馬追襲累次鬬敵其所獲首級并驅擄人口往往將帯不行詔環慶路經略司張存元領將佐及漢蕃士卒多少出界至是何地名逢賊鬬敵見今還塞將佐及使臣士卒各若干保明以聞朝廷當議别委官按覆次仍具陣亡漢蕃使臣職位姓名當議優與推恩八月二十二日甲辰詔成都府路産茶州軍復行禁㩁禮部言毎遇臨幸藉田合差官祭告先農壇詔太常寺詳定儀注二十六日上所定儀注禮部又言故相蔡確妻乞以舊宗子學為賜第從之三年九月十七日初有㫖賜第靖國元年四月九日可考吕惠卿言浮圖寨畢功乞賜美名詔以克戎寨為名仍差内臣等押賜吕惠卿已下銀合茶藥正月二十六日二月二十三日三月二十七日詔鄜延路進築聲塔平新寨其士卒除近修築浮圖寨已特支外縁暴露日久更給特支錢有差章楶言前於石門建城一所好水河建寨一所及置烽臺等並已畢工乞特賜名詔石門城以平夏城好水寨以靈平寨為名章楶自朝散大夫集賢殿修撰除左朝議大夫樞宻直學士本路并諸軍暴露日久兼班師之際西賊舉衆侵犯各能捍禦戰敵廣有斬獲詔應曽出戰軍兵不以無斬獲各與特支四年二月十五日并二十八日初建議楶初除知渭州請至樞府閲邊奏曰兵事難懸度願至本路圖上方略至渭之八日即上言他路所營地水草俱乏非形勢所在城之不足為中國重輕獨葫蘆河川濵水路乃寇出入道東帯興靈西趣天都可蓄收耕稼且居形勝地今往城之平夏國可歲月幾也帝重其議曰諸路多懸度而楶所論皆按圖可考勢必能成悉從之楶乃陽言寇比敢犯鄜延當繕修邊壁令所部數十城皆相先後興築衆懼生邊患楶曰吾老能怯守而已不知其他或有知而止楶者曰葫蘆河川扼賊吭背茍有事焉彼必以死爭且川平地闊寇至難禦兵不易守比夏人營石門峽出吾境纔三十里探騎莫敢近今乃欲一旦奪而有之必不可為也楶陽謝之而隂具畚鍤轉芻糧治樓櫓械器凡戰守之用兩月而備且告師期願下諸路練將出討者皆張虛聲以形之惟涇原隠然為守計寇不能測專備他路乃以三月及熙河秦鳳環慶四路之師出葫蘆河川築二城於石門峽之口好水河之隂凡二旬有二日而畢先是楶豫分兵扼其險要比興役寇衆嘯聚日乘高下瞰久不能投間而出乃驅其衆直趨我軍我軍敗之斬首千八百級奏至帝大嘉賞諭輔臣曰章楶到未一旬即畫此䇿不八旬而成功諸路因此可舉矣既而環慶鄜延河東熙河皆植城堞屹然並立夏人愕視不敢動故諸路之城戎地實自涇原始也此據章楶𫝊附見趙挺之崇寧邊略云太僕寺丞張匋言章楶在涇原進築二寨朝廷賜名平夏靈平盖合五路之兵夫凡七十餘萬民有雇夫以代其役者日直三千自正月起役至四月而罷所費不貲未可以千億計也戎人素有謀略皆逺引不出疑若坐困我師乘利而出爾匋又言前日涇原奏築二寨工畢同知樞宻院林希語宰相章惇率百僚入賀惇不從惇因奏事獨對曰前日涇原奏功林希欲臣率百官入賀臣以為此功未足為陛下慶俟不久生縳梁葉普卓賀夏主乾祐等至闕臣等當奉觴上陛下夀為未晚匋又言章楶涇原出師嘗䘮正兵三千人楶不為上奏蓋欲掩其本路䘮失之多也然三千人皆有父母妻子居營壘間遂不得死事之賞此一事大失士心士不復為用矣挺之崇寧邊略又云新知廣徳宋淵言今西邊進築城寨其去敵國益近去大朝邊徼益逺逺者轉輸為愈勞近者時出擾之為易若敵人大縱兵以入則越城寨長驅以行城寨堅固者第能保守而已其不堅固者平蕩如拉朽詔鎮戎軍管下新建平夏城靈平寨邊面闊逺今後鎮戎軍知軍兼管勾涇原路沿邊安撫司公事章楶言前石門好水河新建城寨乞創置將副各一員以涇原等十一將兼提舉兩城寨及招置漢蕃弓箭手為名石門城乞差官八員知城一員以大使臣充都監監押共三員以大小使臣互充巡檢四員以小使臣充好水寨乞差官七員寨主一員以大使臣充都監監押共三員以大小使臣互充巡檢三員小使臣充其城寨官巡檢各令輪日將帯人馬分頭巡綽把截賊馬來路照管耕牧縁係新開拓地分全籍同心防守捍禦乞並以二年為一任除依本路極邊城寨官廵檢令得酬奬外每員更與特轉一官内將官升路分都監副將升正將如元係正將差遣亦依正將例知城寨官升副將兩城寨各乞置酒税官一員寨主簿各一員與城寨官通管錢穀給納及防守捍禦昨奏大城寨嵗給公使錢一千緡小城寨五百緡今好水寨比石門寨雖小縁所置官比石門所減員數不多乞每歲添作一千緡為額詔並從之乙巳詔陜西府河東路降徳音依第五等格鄜延路經略司言元豐五年新復米脂等寨招到弓箭手每名借農器牛具錢五貫糧種五石以經略司常平錢斛充今新展格虎山聲塔平新寨事體一同已令逐寨招到弓箭手依此借支錢糧從之新無丙午右司員外郎安惇試秘書少監禮部員外郎曽改為右司員外郎太常丞劉逵為禮部員外郎開封府推官李廷寧為倉部員外郎御史蔡蹈言吏部差注新賜進士諸科及第官用元豐三年指揮司法闕先注新科明法次注明法人竊詳先朝既廢罷明經學究科特設新科明法以變革舊業故優為恩例使趨新習以至賜第之後率先進士並注法司蓋變法之初所以示勸經今二十年舊人為新科者十消八九恩例之優宜亦少損欲乞明法與其餘判司闕衮同從上差從之丁未徳音制曰朕綏御九有懐柔四裔蠢兹西戎蕞爾小國弗茹其力敢拒大邦申命邊臣奉將薄伐方共武服已奏膚公闢疆復境者九城盡要害膏腴之地折馘執俘者萬計皆精鋭驍勇之人役不淹旬㨗無虛月而財靡殫衆力非調民因其天亡之時成是席巻之勢然念士卒有暴露之苦雉堞有版築之勞宜渙覃恩以慰邊俗應陜西河東路州縣限徳音到日已前見禁罪人流已下遞降杖已下釋之於戲武之所加者廣則澤之所及者深尚暨乃心克平兹土播告有衆咸使聞知三省言元豐八年二月二十九日御史中丞黄履奏訪聞兩府大臣嘗議奏請皇子就傅建儲事王珪輒語李清臣云他自家事外廷不當管他蔡確章惇聞之對衆窮其所立珪不得已方云上自有子確惇乃宣言於衆其議遂定臣又聞王珪隂交高遵裕嘗招其子士充𫝊達語言臣伏思陛下推大公至正之心以槐位處珪以鼎餗養珪凡十有六年今聖躬偶感微疢而珪已懐二心此而可容何以示懲勸於天下黄貼子近有高士英者輒至臣家稱上服藥中若皇太后或皇后權同聽覽則𫝊命者審臣正色答之以為豈可私議臣忝位中執法士英尚敢率爾如此發言今珪無故輒自招士充又對清臣有如此言竊慮必有姦謀至三月初履又言大臣體國休戚一均事有權宜自合奏禀豈得私有所召及稱不當管他此而可容何以懲勸臣於左僕射王珪議儲之際既聞其然不敢不論今已累日未見施行臣伏思之使臣之言果合於義則珪不可以無責使臣之言無補於政則臣不可以無罪今皇太后權同處分建立儲位以安天下臣雖萬死猶生之年伏望朝廷早賜指揮又紹聖二年十一月内右正言劉拯奏先帝寢疾宰臣王珪持二心為姦臣僚嘗具彈奏蔡確等定䇿受顧命輔翼陸下已而權臣擅政確等繼被逐又慮他日復用為已禍也於是因事誣陷擠之廢死之地而後移定䇿之功於王珪珪之薨也賜宅贈官錫子𠡠葬特厚而確死投竄之地雖䝉昭雪贈復官爵而恩例比珪甚薄且父子繼世雖有定體神器輕重亦繫一時功罪不明孰大於此今為忠者被禍為姦者受賞何以教天下示後世伏望聖慈究珪之罪録確之功優加恩典又今年二月宫苑副使西京第七副將高士京進狀稱先臣遵裕當先帝服藥危疑之際有故宰相王珪召臣親弟承議郎士充宻議取決於先臣欲知皇太后意所欲立蓋為是時先臣為高氏之長又知先為宣仁聖烈居常聽用故來相問時先臣泣下大怒曰姦臣敢如此况國家自有正統何決於我遂叱罵故弟士充如敢更往即杖汝死尋將此意指説於先辟機宜官王棫自可照證竊念先臣昨因攻取靈州師老糧匱大河不凍故不能上奉聖訓責置散官遂先朝露其後雖䝉朝廷稍加牽復然未嘗别加贈典今來有此忠義又不獲伸訴於陛下欲乞朝廷詳酌優賜褒贈高士京本末在新録四年十一月二十三日今移入王珪貶司户曽布自叙後又給事中葉祖洽言先皇帝所以待王珪可謂厚矣自翰林學士承㫖擢為參知政事尋又擢為右相復擢為左相在政府凡十六年蓋祖宗以來人臣遭遇委任之久者無一二人又擢其子為館職自珪之身及其兄弟子孫皂𨽻凡受朝廷恩命者臣不知其數然則先帝之於珪可謂無負矣當先帝違豫至於大漸儲位未正中外惶惶延頸以望珪為上相衆目所視所宜率先建議首定大計以慰宗廟珪乃持疑顧望含餬不決至於同列以大義迫之不得已而後應不知珪意安在使同列不切責之則珪將遂無言豈不誤事天下至今罪之雖先帝澤及人深天下屬意陛下之久然名實未定忠臣義士安得無憂臣於是時適在朝廷親聞士大夫之論籍籍罪珪已而珪死天下莫不快之然是時朝廷所以賻贈周恤恩禮過厚仍賜甲第一區莫非異數臣聞特恩賜第所以待元勲異徳珪為臣不忠何以得此伏乞特下有司正珪之罪以戒天下不忠不孝之臣使知治世典刑無前後之私也祖洽又言臣嘗論王珪悖逆不忠之罪已經兩月未見施行中外洶洶不知所謂若以珪之事為無實迹則當時二三執政尚在及見今侍從間甚有知其詳者皆可考正其事黄履為御史中丞嘗論之於前劉拯為右正言又論之於後近日高士京又極陳其狀伏惟陛下察臣之言出於公論稽合羣情決於獨斷以慰中外詔王珪遺表恩例並行追奪其子孫與次逺監當差遣仍永不注近京路分所賜宅拘收入官故承議郎高士英特追毁出身以來文字制曰臣無二志戒在懐姦國有常刑義難逃罪其申後罰以正往愆故金紫光禄大夫守尚書左僕射兼門下侍郎贈太師王珪竊文華之上科躬柔險之詖行馴致顯位遂居冢司先帝優容臣隣務盡禮意掩覆瑕慝多歴嵗時邱山之恩毫髪未報屬在彌留之際是謂憂疑之時欲豫安於人心當蚤正於國本矧復昭考與子之意素已著明太母愛孫之慈初無間隙而乃妄懐窺度專務媕阿指朝廷為他家用社稷為私計同列誚詰久無定言隂持兩端不顧大義僅免生前之顯戮更叨身後之餘榮公議弗容舊疏具在反復參驗心跡較然使其免惡於一時難以示懲於萬世貶從散秩追正誤恩庶令官邪咸知警憲可特追貶萬安軍司户參軍樞宻院奏事上宣諭曰葉祖洽累有文字論王珪事云先帝不豫珪為首相數召高遵裕之子士充與語及同列問以大計答云教某道甚後方云上自有長子又言彼時黄履為中丞三月末巳有文字論珪事朕以宣仁聖烈於社稷大計聖意素定自是内外羣小妄有窺度朕嘗諭章惇等如先后乃婦人之堯舜也已令作告命明述此意仍先令進呈然後行下曽布等言陛下推述先后徳音如此明白當書之簡册以示後世此舊録所書繫之四月十八日新録因之按曽布日録上宣諭時王珪已貶萬安軍司户珪貶萬安軍司户乃二十四日不應六日以前已有成命六日後方行出疑舊録繫之十八日者誤也今移附珪後兼用布所録及邵伯温辯誣别加刪修庶後世詳見本末新録但因舊録無所改正於理殊未安耳先是樞宻院奏事上宣諭王珪當先帝不豫時持兩端又召高遵裕子與議事當時黄履曽有文字論列及同列敦迫其後方言上自有子曽布曰此事皆臣等所不知但累見章惇邢恕等道其略不知黄履章疏在否上曰有布等聞禁中無此章疏履曽於紹聖初録奏比三省又令履録私藁以為質證上又言高士英者詣黄履問誰當立者此亦履貼黄中曽論列布與林希曰天命何可移易但小人妄意窺測爾兼宣仁亦必無此心上曰宣仁乃婦人之堯舜也外則珪等内則梁惟簡輩妄為此紛紛爾布曰徳音如此臣復何言然願諭三省於告詞明述此意使天下曉然知朝廷誅責大臣而陛下推明太母徳音如此則誰敢復議當書之典册以示後世希進曰臣謹當著之時政記上曰告詞當令進呈然後行下布與希皆稱善已上並庚子日及珪告詞出布欲於國本下増四句云先帝付托羣臣所知太母睿明聖徳無爽希稱善仍督布以白章惇布亦慮詔令之出中外有疑於形迹宣仁者遂録以示惇惇不得已但改云昭考與子之意素已著明太母愛孫之慈初無間隙希大喜以為微布發之何以有此使人知上徳仁孝於宣仁無疑此乃於國體為便進呈上指所増四語云極當此並用曽布十七日庚子及十九日壬寅所録増修布又嘗自叙云三省先論司馬光等隂謀廢立故不逾兩旬再行降制追貶於是又發揚王珪觀望以明定策之功追貶王珪又言巖叟等其意初不在蔡確特借此以感動上耳自謂不避怨怒敢誅戮謀逆者以為忠藎故上亦欣然納之凡作姦無不如意或有異論即指名逆黨欲以鉗天下之口吁可畏也布但悒悒為之寢食不安而已林希亦語布曰貶竄者未足道但設此言以離間宣仁使上於宣仁不能無疑致其骨肉間有芥蔕此尤為可憤又蔡京曽言仁宗時嘗欲以庶人禮葬章獻然考之國書實無此事京輩大槩毎欲如此京又言車駕不可幸楚邸又言上比來已覺悟楚王二壻盡罷翰林司御厨此輩豈可使居此地此論殊可駭又曰京嘗言天下根本未正意謂不誅楚邸則未安爾是時楚王未薨故有此言及被詔作墓銘乃固辭亦此意也此據曽布日録自五月十九日掇取附四月末其言信否當考欲著蔡京等惡逆情狀故表而出之然布當時位冠樞府獨不能為哲宗精言之可怪也或者疑布所録多假託撰造之詞固亦不可知楚王顥以紹聖二年十月十九日自冀改楚二年十一月三十日宣仁䘮除三年九月二十九日顥卒曽布紹聖四年五月十九日壬申日録云近日三省以大防等有廢立謀逆之意及發揚王珪觀望以明定䇿之功故痛貶大防珪等又言巖叟等意不在確皆欲以此感動上意及為上誅戮凶逆之人不避人怨怒以為忠藎故上亦為之欣納凡所欲為姦無不如意者萬一有異論之人則指以為逆黨欲以鉗天下之口吁可畏也布又語林希曰布毎以越職犯分喋喋為戒然義不能自已者噤嘿不言則上必以為三省所行無不當者故寧為强聒不敢自已又幸與子中共事意趨頗同故無所顧避然衰拙亦必難久於此爾布是日悒悒為之寢食不安不勝憤惋而已希亦云貶竄者未足道但為此言以離間宣仁使上於宣仁不能無疑致其骨肉間有芥蔕此尤為可憤兼蔡京曽云仁宗時嘗欲以庶人禮葬章獻然考之圖書實無此事京輩意大槩毎欲如此殊可怪京又嘗言車駕不可幸楚邸又常云上比來已覺察楚王二壻盡罷翰林司御㕑此輩豈可使居此地此論殊可怪又云京嘗言天下根本未正意謂不誅楚邸則未安爾是時楚邸未薨故有此論及被詔作墓銘乃固辭亦此意也先是五月十三日丙寅章惇不入布因言王珪事蔡卞乃云此事但他人不知不敢以為無布答曰此衆所共知也朝廷方施行必有考據證佐他人既不知其狀孰敢以為無此所以無敢論者此叚已附四月二十四日丁未後或仍附此於五月十三日及十九日更詳之上之嗣位邢恕與蔡確等自謂有定䇿功既而確死貶所恕亦斥不用心恨之日夜圖報復黄履舊與恕深相得恕誣謗宣仁聖烈皇后履與其謀元豐八年二月三月乃追為之非當日所奏曽布亟請于上蓋知其妄也高士京者遵裕假子士京為將官嘗與恕同官士京庸暗恕一日置酒從容問士京曰公知元祐間獨不與先公推恩否士京曰不知又問有弟兄無士京曰有兄士充死恕曰此乃𫝊王珪語言之人也當是時王珪為相欲立徐王遣公兄士充𫝊道語言於禁中知否士京曰不知恕因誘士京以官爵曰公不可言不知當為公作此事第勿以語人因合所親信王棫崇飾誣詞為士京作奏上之珪由是得罪遵裕最愛少子士育病且死士育未嘗離左右士育每為人言初不見士充來告遵裕以珪所問事也其後士京恨所得官爵不稱意屢欲自陳虛妄高氏諸族皆惡之絶不與通此參取新録紹聖四年十一月二十三日所書邵伯温辨誣録稱恕因帥中山士京為將官按恕自紹聖元年五月復職知徐州八月改河陽二年三月除寳制知青州尋自青州入為刑侍未嘗帥中山也今但云嘗同官庶不相牴牾邵伯温辯誣曰邢恕誘高士京上書論其父遵裕臨死時屏左右謂士京曰神宗彌留之際王珪遣高士充來問我曰不知皇太后欲立誰我斥士充去恕又不考究高遵裕既坐知慶州日建議取靈武事敗遵裕責散官以宣仁故免安置留京師宣仁后尢不喜雖經哲宗登位覃恩亦不許叙又安能預䇿立大計惇卞但欲誣罔宣仁遂贈遵裕節度使遷上京皇城使特追貶王珪崖州司户參軍貶高士充散官至元符末高士育上書自稱遵裕幼子其父最愛父病且死未嘗離左右不見士充來説王珪所問之語士京亦不在父所時欽聖后垂簾特與士育改文資除環慶路經略安撫司幹辦公事蓋察其言之實也伯温見高公諌言士京乃遵裕假子士育實遵裕幼子士京既為邢恕所誘作此事恨章惇不甚進用之屢欲自陳虛妄南北宅高氏皆絶之靖康初諸王府贊讀江端友上書論士京事甚詳端友與高氏子孫相熟也邢恕又言黄履在元豐末曽有章疏言宣仁后欲立徐邸事伯温後在同州於曽布之子絣處見曽布手記當時事一編云禁中元無黄履文字黄履家出藁草入獄為證黄履與恕自未第而交遊相善恕亦與履同謀也王棫京師人有口辨好議論熙寧中為熙河路走馬承受致仕家富㳺公卿之門與邢恕為死黨伯温嘗見王棫尚洙李洵於恕所皆妄人也後章惇因恕薦落棫致仕除知北平軍未幾棫死其子直方不以父為然毎為士大夫言父晚年病心直方後將死無子與晁載之相善以平生所收書盡歸載之觀直方所留書畫於其間得王棫與邢恕往來書一通皆共謀誣造諸人廢立事者靖康初諸王府贊讀江端友上書辨宣仁誣謗其略曰初元豐中高遵裕大敗於靈武責散官安置未幾神宗崩哲宗嗣位宰臣蔡確以謂遵裕者宣仁族叔也即建請牽復以悦宣仁之意而不知宣仁之不私其親也宣仁簾中宣諭曰遵裕䘮師數十萬先帝縁此震驚悒悒成疾以至棄天下今骨未寒吾豈忍遽私骨肉而忘先帝乎即日批出曰遵裕得罪先帝今來垂簾凡高氏推恩獨不可及遵裕確謀大沮後確責知安州作詩譏訕坐貶新州而邢恕乃確之腹心也偶與遵裕之子士京中山同官遂以垂簾時不推恩牽復事激怒之使上書言王珪曽遣遵裕之子士充來議䇿立事遵裕斥去之士京庸懦不識字實恕教之為書士充踈逺小臣素不識珪珪安得與之議及社稷大計又何從輒通宫禁語言且上書時珪士充遵裕亦皆死矣何所考按臣竊聞元豐八年時政記即確所修也其載三月中䇿立事甚詳何嘗有一疑似之言恕之本心但謂不顯王珪異同則難以歸功蔡確而不知厚誣聖母之罪大也恕之為人非獨有識之士無取其子居實亦不樂其父所為也天下皆知之章惇排斥元祐者也在簾前奏事悖傲不遜都堂㑹議以市井語誚侮同列豈忠厚君子哉尚云極力以消除徐王覬覦之謗惇與王珪蔡確同為執政受顧命使當時果有異同豈肯復為此言乎則恕之謗可謂欺天矣縁此紹聖中蔡卞獨唱追廢聖母之議賴哲宗仁孝不聽其説不然人神痛憤失天下心為後世笑悔可及乎王鞏甲申雜見云武臣王棫為邢恕教令上書誣宣仁於哲宗有異心及教蔡渭等上書論元祐及元豐末年事其書一箧悉在皆恕手筆其間塗竄者非一棫於哲宗朝論之得閤門職名既卒其子直方持出其書以示親宻自元豐末至宣仁上仙無不被誣者而禹玉尤甚蔡奉議蕃嘗謂直方曰使王氏子竭産亦願得此書也蔡倅潤過高郵為予言之王居東京九龍廟側劉跂辨謗録載李清臣説章惇元符末因奏事自言王珪司馬光劉摯梁燾等行遣皆是邢恕説與臣恕坐此責恕上章乞與惇各被五木對吏章不降出跂録凡十餘叚已附注元符元年五月辛亥及七月庚午戊申西上閤門副使苗履權知蘭州兼管勾沿邊安撫司公事履權知蘭州已見三月七日元符元年二月二十七日覆復知蘭州代王舜臣御批近詣景靈宫行朝獻禮宗室遥郡班止有六員趂赴今據閤門奏大宗正司勘㑹到並無不赴之人看詳數内稱以闕乏人馬為名者即不見得合依是何條令仰疾速子細開具聞奏不得容庇御集紹聖四年四月二十五日下大宗正司開具聞奏究竟未詳己酉臣僚言文徳殿視朝輪官轉對蓋襲唐制其來舊矣建隆御札曰今後内殿起居應文班朝臣及翰林學士等並依舊例轉對故祖宗以來每遇轉對侍從之臣亦皆與焉元祐間因臣僚建言乞免侍從官轉對續有㫖職事官權侍郎以上並免自此轉對止差卿監郎官而已臣以謂侍從之臣皆文學極選以備顧問公卿之材繇此塗出乞自今視朝轉對依元豐以前條制從之權禮部侍郎范鏜等言國朝故事園苑觀稼係屬遊幸今車駕親臨藉田即繫典禮先農壇係元豐中移就藉田建置臣等參詳每遇車駕臨幸合差官祭告乞遣太常卿於至日質明行禮用御封香祝文禮料並如常儀又藉田所稼皆以為楶盛之實車駕臨幸則取新薦獻當在所先乞俟刈麥訖以所進麥約合用數先以黄絹袋封貯付所司令變造禮食於臨幸次日薦之太廟其遣官禮料並如逐時薦新之儀然後進供頒賜並如故事秋觀刈禾亦合準此又刈麥稼穡係同一時今乞候觀麥禮畢車駕移幸稻池綵殿以觀稼詔可二十一日令定儀注庚戌于闐國貢方物初三日已見當存一去一壬子知原州李澄知岷州兼洮東沿邊安撫司公事吏部言今次科場進士出身人内宗室非袒免親注官詔趙季同趙不慘趙子仁依吏部令於本甲上名注擬子璪依𠡠開名次
