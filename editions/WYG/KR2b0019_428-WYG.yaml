body:
  text: 續資治通鑑長編巻四百二十四宋李燾撰哲宗元祐四年三月乙酉知廣州寳文閣待制蒋之竒為江淮荆浙等路制置發運使朝散郎江淮荆浙等路發運副使路昌衡為直祕閣權知廣州右正言劉安世言竊惟南海之地控制蠻獠風俗輕悍易動難安祖宗以來擇帥尤重必有綏懐之德濟以肅服之威使之統臨乃能鎮靜臣按昌衡人品鄙下資性殘刻清議不齒為日已久方陛下嗣膺大寳驅逐羣邪昌衡與蹇周輔軰均號酷吏在所廢斥素為蔡確鷹犬極力主張屢叨要官衆謂幸免今嶺表之寄事任非輕豈兹小人可稱簡㧞又言臣近嘗論列路昌衡除知廣州不當初聞尚書省勾収告命搢紳莫不欣恱今日乃知却有指揮令進奏院依例發下三數日内予奪反覆中外疑惑實損國體臣按昌衡天資峭刻狡獪誕謾昔熈寜中知相州安陽縣不修士檢醜聲流聞本路監司将行按發昌衡遽乞㝷醫因得幸免然而内疑指使劉龜年暴揚其事後來陜西用兵龜年適在秦州夕陽鎮為監押昌衡乃指名抽差部押糧草欲縁軍事中以危法而泄其私怒是時龜年具以因依訴於趙濟遂留而不遣其事喧騰無不知者臣又聞昌衡執親之喪寓居南京曾無哀戚之容反為匪僻之行有武人劉振孫者候其㣲服歩入倡家遂痛毆之為人所救僅得逃逸及昌衡為陜西轉運副使振孫又知寜州挾其舊怨勇於報復乃用匿名之書移振孫為原州都監且匿名文字於法不當受理而昌衡違法受之振孫事状甚輕曾無免所居官之罪借令當移亦無降等之理昌衡任情刺舉不畏公議一路澄清之寄将何頼焉臣又聞昌衡治余行之獄輙廢録問違經亂法天下以為酷吏然而行之舊逰王珪之門昌衡既於案牘之間隠落其事又宻告於王珪以市私恩仍與蔡確隂相交結故珪確用事之日駸駸華要陛下即政之初澄汰姦慝昌衡以死黨在朝獨免廢放嵗月未㡬頻易劇任當時士論固已上譏廊廟下責臺諫今南海之地控制百蠻推擇帥才尤宜謹重以昌衡之罪惡如彼而朝廷之委付如此臣恐豺狼之性毒烈貪暴必不能為陛下布宣惠澤鎮安逺民異日生事悔将無及伏望聖慈速降睿㫖収還昌衡誤恩别擇良守以式南國豈勝幸甚二十八日昌衡改潭州詔在京禪僧寺院今後士庶之家婦人非遇開寺不得輙入逰觀及不得禮謁参請其官員入寺不得衣童行服及於僧人坐下禮拜侍立官員委御史臺餘委開封府紏察以聞從殿中侍御史孫升奏請也升集有奏議政目云詔在京禪僧寺院非開寺不許婦女輙入官員不得衣童行衣拜僧新録削此詔録孫甫男儔為郊社齋郎以甫妻程氏叙甫遭遇仁宗任侍讀本家無人食禄故有是命政目云甫孫三省樞宻院言編排神宗皇帝御製所請聖製神宗皇帝文集序從之右正言劉安世言臣伏見去冬迄春雨雪愆期夏苗将槁秋種未布雖陛下至誠惻怛祈禱備盡霈然之澤終未告足竊惟故事春有大宴方兹久旱民憂阻饑伏望聖慈深加軫䘏特罷宴樂以示憫雨之意庶㡬天人感悦早獲嘉應御史中丞李常亦請罷春燕執政進呈不行此據曾肇奏議中書舍人彭汝礪同曾肇言臣伏見去年諸路灾歉京西陜西人至相食冬間屢得嘉雪宿麥甚茂饑民嗷嗷待此以濟而雨不時應旱氣以成麥苖萎黄勢将槁死雖収成之處所得固已無多若饑饉荐臻公私受弊有不可言者此正君臣側身畏懼憂䘏百姓之時而恬然莫以為意此臣之所未諭也皇帝太皇太后畏天愛民海内所知豈忍生靈轉徙溝壑恐是上下䝉蔽茍寛聖心但云雨澤小愆未至害事九重深逺何繇盡知臣等承乏從官不敢雷同隠黙敢效小補仰禆萬一伏見已定今月十七日春燕臣愚竊謂天菑方作民食未充乃於此時君臣相與飲食燕樂恐無以消復天變導迎和氣伏望特降德音為罷春燕使百姓咸知陛下之意人心既悅天意亦順自有膏澤應聲而至猶足以捄垂死之苖獲豐登之望蓋輟一日之適而成終嵗之功在於聖心宜無難者惟留神無忽天下幸甚貼黄稱臣等非不知燕日已廹言若後時反覆思念自春亢旱雨作輙止豈非人事有所未至累年饑饉使今年麥復不収則公私之憂有不可勝言者故不能黙然以負陛下罷一燕雖小事然足以知二聖至誠惻怛所以畏天憂民者無所不盡天髙聴下日監在兹昔宋景公一言而熒惑退舍况二聖盛德其應宜不旋日如䝉採聽伏乞出自聖斷即降指揮丁亥詔罷春宴翰林學士蘇軾為龍圖閣學士知杭州從軾請也既踰月軾言臣近以臂疾堅乞一郡已䝉聖恩差知杭州臣初不知其他但謂朝廷哀憐衰疾許從私便及出朝參乃聞班列中紛然皆言近日臺官論奏臣罪狀甚多而陛下曲庇小臣不肯降出故許臣外補臣本謂滿盈力求閑退既獲所欲豈更區區自辨但竊不平數年以來親見陛下以至公無私治天下今乃以臣之故使人上議聖明以謂抑塞臺官私庇近侍其於君父所損不小此臣之所以不得不辨也臣平生愚拙罪戾固多至於非義之事自保必無只因任中書舍人日行吕惠卿等告詞極數其凶慝而弟轍為諌官深論蔡確等姦回確與惠卿之黨布列中外共讎疾臣近日復因臣言鄆州教授周穜以小臣而為大姦故黨人共出死力架造言語無所不至使臣誠有之則朝廷何惜竄逐以示至公若其無之臣亦安能以皎然之身而受此曖昧之謗也人主之職在於察毁譽辨邪正夫毁譽既難察邪正亦不易辨惟有坦然虚心而定其言顯然公行而考其實則真偽自見䜛誣不行若隂受其言而不考其實獻言者既不䝉聽用而被謗者亦不為辨明則小人習知其然利在隂中浸潤膚受日進日深則公卿百官誰敢自保懼者甚衆豈惟小臣此又非臣獨為一身而言也伏望聖慈盡将臺諫官章疏降付有司令盡理根治依法施行所貴天下曉然知臣有罪無罪自有正法不是陛下屈法庇臣則雖死無所恨矣夫君子之所重者名節也故有捨生取義殺身成仁可殺不可辱之語而爵位利禄蓋古者有志之士所謂鴻毛敝屣也人臣知此輕重然後可與事君父言忠孝矣今陛下不肯降出臺官章疏不過為愛惜臣子恐其萬一實有此事不免降黜而不念臣元無一事空受誣蔑聖明在上瘖嗚無告重壊臣爵位而輕壊名節臣竊痛之意切言盡伏俟誅殛貼黄稱臣所聞臺官論臣罪状亦未知虛實但以議及聖明故不得不辨若臺官元無此疏則臣妄言之罪亦乞施行又貼黄稱臣今方逺去闕廷欲望聖慈察臣孤立今後有言臣罪状者必乞付外施行從之曾肇行軾杭州制云方冀納忠於朝夕遽祈飬疾於東南章却復來告滿輙賜力固難強義所重違詔新除太常少卿王子韶别與差遣從劉安世之言也二月十二日三月二十六日詔諸軍應排遣長行闕六人以取陣教頭係長行一人上名一人各年未五十充應及五年者依取武藝髙强人法體量仍滚同拍試如得中升在諸色武藝人上安排如不中但及本軍第一等事藝亦與額内從下収補内上名即候再經排遣依此新本削去熈河蘭會路副總管姚兕徙環慶路代曲珍也􅈿卒在三月五日己丑詔今後毎遇大禮更不上尊號承議郎著作郎范祖禹為中書舍人仍賜金紫初祖禹召試中書舍人懇辭有㫖降誥免試祖禹又辭曰辭記注而特召辭召試而直除則何以厭服人言荅揚聖選從之此月十四日召試五月二日除右諫議大夫辛卯日中天晴四方有雲午時有流星自東北方向西北方急流入濁沒月末劉安世云云可考本紀云畫有星出扵東方志却不書此當考癸巳疎決在京繫囚雜犯死罪以下逓降一等至杖釋之以時雨稍愆也詔以三佛齊進奉使皮襪為懐化将軍乙未左僕射吕大防為明堂大禮使右僕射范純仁為禮儀使知樞宻院事安燾為儀仗使門下侍郎孫固為鹵簿使中書侍郎劉摯為橋道頓逓使政目云差明堂五使並執政官朝請郎禮部員外郎呉安詩為右司諫政目在十八日以朝散郎權發遣江南東路提㸃刑獄賈易為禮部員外郎賈易為禮部在丁酉日今并書之罷幸瓊林苑金明池丁酉龍圖閣直學士知太原府曾布知成德軍龍圖閣直學士知成德軍滕元發知太原府朝散大夫太常少卿王子韶為衛尉卿右正言劉安世言臣前四具狀論列王子韶差除不當比聞已得指揮别與差遣今早伏覩除目授衛尉正卿反覆思之不得其說須至辨析上煩天聽臣累奏子韶罪状皆天下之所共知未嘗有一語敢渉疑似朝廷使之追改則是不以臣言為妄前日少常之命既非所宜今七寺正卿又在太常少卿之上豈可因人弹劾更得超遷予奪重輕悉皆倒置是非好惡衆且何勸開羣小僥倖之門啟大姦窺伺之隙政事如此臣竊憂之伏望陛下總攬權綱重惜名噐懲子韶之朋附亟令外補或謂即今若無顯過則乞依舊處以衛尉少卿惟斷自宸𠂻無惑衆口庶㡬公道不至淪廢又言臣聞主王子韶者謂官制後來太常少卿最為清選今若不容子韶冒處七寺卿列乃是麤官捨彼與此别無僥倖臣請有以折之勘會太常少卿之美選者或為侍郎或為給諫前日之李常趙瞻梁燾鮮于侁趙君錫是也七寺卿則不然崔台符楊汲自大理孔宗翰自鴻臚韓宗道自太府不作給諫便拜侍郎安得謂之麤官而少貶於太常也况太常少卿係從五品諸寺正卿乃從四品子韶自衛尉方及一年才擢少常又正卿列平日不掛貶議之人當有驟遷之路以子韶之罪惡顯著而力排公論必欲超擢朝廷政事豈宜如此臣自忝諫列進言多矣然未嘗以決不可行之事要君近名惟是公道陵夷小人浸盛是以不避煩瀆天聽須至再三論辨况陛下勵精求治長育人才去一老姦無損於國惟祈睿斷早賜施行五月二十二日子韶知滄州前通判揚州王鞏知海州此據政目二十六日事六月八日又改宻州六年六月八日劉摯云云可考詔諸路闕雨中嶽西嶽江瀆河瀆淮瀆委逐處長吏選日躬詣本廂精潔祈禱戊戌詔諸路監司除近便州軍躬親外餘各於轄下選官分詣諸州軍将見禁公事與當職官逐一躬親引問除死罪於法合聽㫖及重傷守辜外餘並疾速放訖以聞己亥朝議大夫直祕閣知潭州謝麟為直龍圖閣知廣州新除知廣州朝散郎直祕閣路昌衡知潭州右正言劉安世言臣近二次曾具状論列昌衡除知廣州不當今日雖聞指揮易守潭州而貼職誤恩尚未追改考之公議咸謂未安須至開陳上瀆天聽臣前章所奏昌衡罪惡固已詳悉而情理之尤不堪者莫甚於執親之喪而為匪僻之行昔陳夀居父憂之中使婢和藥當時士論尚且鄙棄豈若昌衡不念顧復之德肆行邪穢之事臣聞父子之道天性也事親孝則忠可移於君今昌衡違犯名教絶滅人理於所厚者其薄如此陛下亦安用之况所貼職名本為南海重寄欲寵其行前命既罷即合追寝兼長沙守臣從來亦無帯館職之制使昌衡舍煙瘴之逺得湘潭之便又貼黄直閣坐制一方天下姦慝何所懲沮惟陛下留神省察速降睿㫖追還昌衡新命别與閑慢差遣庶㡬善惡明辨少厲薄俗朝奉郎直龍圖閣知河陽邢恕為集英殿修撰知滄州恕時已遭喪去河陽矣邢恕孫繹録恕言行云吕公著欲復引恕作中書舍人令門下侍郎孫固發端公著從而賛之獨劉摯云恕到河陽亦未久且除集撰作帥如何同列皆不答遂罷是日宣仁亦有召恕意摯不能奪故姑以集撰塞韶此事蓋飾說也然移恕滄州且加官必有故合考邵伯温辨誣云元祐三年春申公辭相位拜司空平章軍國事吕大防自門下侍郎拜左僕射范純仁自同知樞宻院拜右僕射邢恕自襄州移知汝州特徃鄧州見蔡確再謀定䇿功恕又移知河陽次年春吕申公薨時知漢陽軍呉處厚得蔡確在安州日題車蓋亭詩十首箋注奏上以為謗訕蓋處厚自寺監丞確辟為山陵司掌牋奏官既罷處厚欲確以故例除館職確不薦而出之以此怨確先是温公之子康服除赴任邢恕招之由河陽入朝伯温素知恕之謀乃謂康曰公休免喪未見君不可枉道先見朋友康純德之士以恕出温公門下又同年登第信之不疑謂伯温曰已諾之矣伯温曰若事不可者公休或從之必為異日之悔康卒徃恕見康盛稱確䇿立大功不可掩勸康作書稱確之功為它日全身保家之地康果不能違作書如恕之言留恕所蓋恕意欲得司馬温公之子尚得稱確功足以取信朝廷天下之士矣是時梁燾自温州以諌議大夫召燾已取温縣路赴任恕亦使人要之出河陽燾與恕有舊燾既至連日夜論說蔡確定䇿功不休恕果以司馬康與確書亦稱其功為證燾不悅燾還朝適㑹呉處厚奏確詩至遂與司諫呉安詩正言劉安世侍御史朱光庭等論確罪亦言司馬康與蔡確書事朝廷下康分析康方悔之此事當附邢恕責永州時御史中丞李常言臣伏見今日政令之最大而施設未安致人情不和者役法是也役法之大溥及四海窮邊逺徼山農野叟無不繫其利害休戚今自改更以來日見未便户部雖巧為損益以求可行猶朽木糞土本根不善終不能必當四海之人形聲靡和嗷嗷莫訴而陛下曾未之察也執政大臣曾未之䘏也觀望百執事鉗口奉行曾莫之告也然則陛下之明有所蔽而不徧照乎四國矣威刑狎玩而有所弗讋矣號令差忒而施設失當矣德澤不及乎黔黎而欲時雨之應期何可得邪臣請詳言力役之為民患差與雇利病重輕之不同者夫耕農之人儻身常在野而不見官府入城市天下之情所同願也且自租庸調法廢版籍不明役法寖敝國朝因仍前代雖加損益不免就版籍隨重輕等第差科然破家産廢農業非一日之積矣熈寜中講知差法之敝天下州鎮凡因色役害民之事例皆裁減如衙前管勾厨庫承符散從手力充場庫子接送之類也就其不可減者悉使召雇而賦錢平民平民隨力出錢無事於公家之役遂得以身常在野不見官府入城市孰便於是邪雖然方是時奉令之臣取民過多務於贏積遂有輸錢不逮之歎農民愈貧之憂而不聞其免徭役而事農業於家為病也陛下即位之初採納羣言念嵗嵗輸錢為非農人之事又不供力役以為非古道一切罷之復行差法方詔㫖初下愚民未知被差之為害臣於是時亦未能盡知其如此四逺之人蓋嘗懽呼而相慶矣行之既久始覺其患有加於嚮日何也蓋差法之廢十有餘年版籍愈更不明宜重役者輙輕宜輕役者反重交相紏結獄訟紛然吏縁為姦公行賕賄鄉寛户多者僅有休息之期鄉狹户窄者頻年在役况今無限田之制上等極力之人昔輸錢有嵗百貫至三百貫者今止差為弓手嵗雇弓手一名以代身役不過用錢三四十貫中下人户舊出錢不過三貫至二貫而雇承符散從手力之類不下三十貫以是校之勞逸苦樂殊為不均至相倍蓰矣然則今所改法能使上等人户優便安閑而第三第四等困苦日甚詩云哿矣富人哀此惸獨正謂是也昔者臣待罪户部嘗獻議曰法無新陳便民者良法也論無彼已可久者確論也既而典司邦憲亦屢以此干冒聖聰有司収格曾莫之省以臣料之人情豈甚相逺哉不過謂業已施行憚於改易殊不知茫茫四國仰訴無由蚩蚩民命相顧待敝聚為不和之氣上動天鍳豈國家之盛事邪臣前所奏尚欲令富者輸錢貧者出力折𠂻二法而為書今也博訪輿言詳究民瘼在上者既無寛剰之求則下户皆願輸錢矣而又四方風俗或不同利害或不一當差而願雇者有之當雇而願差者有之誠使四方隨俗以為法不以一偏之好惡示四方官吏四方官吏不得觀上所好惡而講法其歸主於寛民便俗上下均一無有偏重而已今示以一偏之意而為法使四海沸騰細民窮困朝廷晏然不知慮卿士大夫畏忌不敢言况希合之人為監司與夫守令哉持之不以介諸懐使陛下致天怒於上人怨於下豈國家社稷計邪臣繆司典憲陛下許其察利害言得失復有所顧避而不言則臣上負朝廷下辜百姓罪不容誅矣伏望聖慈憫民力之愈敝察天意之甚㣲特詔一二詳練民事臣僚使與賤臣就差雇二法取便百姓者修完之無牽新書無執舊說吾民以為善斯善矣庶乎灾變可消和氣可格天下幸甚天下幸甚常奏稱四月按劉安世三月劾常請復行雇役今移見安世劾章前附之月末然常請復行雇役不但此一奏矣是月右正言劉安世言臣伏自去年胡宗愈竊據丞轄不協人望臣忝備言路累具彈劾而聖德寛大務全體貎遷延經嵗未賜指揮臣以公議不平難於中輟廼者上章極言論奏并申三省乞請留中之疏付之外廷明辨曲直雖發於忠憤不敢愛身而退循率易方俟譴逐今既半月威命不至繼聞宗愈已罷政事乃知陛下不特赦臣之罪又能聽臣之言恩出望外感極以泣陛下仁厚容諌如此而臣内懐區區未盡之意若不披瀝肝膽上逹天聽則於職事猶為有媿是以願終言之臣伏見御史中丞李常侍御史盛陶得性柔邪秉心不一昔蔡確用事之日隂相交結故常自太常少卿擢為禮部侍郎旋遷天官遂拜户部尚書陶自瀛州通判得替用為太常博士㝷擢考功郎中皆由閒冗之中寘諸要劇之任才能政事無足稱者為確主張人不敢論以至今日並居承雜而又相與連親不使廽避阿䛕朋黨殊無公道臣不敢廣引細𤨏上煩聽覽止以近事之尤顯著者試為陛下陳之臣聞蔡碩盗用官錢事發下獄當罪大辟陛下以天地父母之德赦而不誅又免真决刺配止送韶州編管僅能周嵗確乞内徙朝廷屈法申恩移置黄州曾不旋踵確又陳乞潁昌縁國朝故事應左降官雖曾任宰相而未復職名猶是謫籍既係有罪之人固無自便之理確之冒昩陳請御史即合紏弹而常陶身任臺綱隂借姦慝目覩亂法終無一言其事一也按謝景温係王安禮之妻兄昨除刑部尚書衆議以為不可而常素與安禮兄弟親善陶及安禮昔嘗同官於大名府交契甚厚是以見景温之誤恩並不論列其事二也章惇在蘇州公違條法強市田産使無辜之民被刑失業故朱迎等四人不逺數千里赴愬省部御史臺明知上件事實亦不懲治假借姦豪徼倖異日其事三也王安石輔政累年曾無善状殘民蠧國未見其比安石之死人皆稱賀王汾無言責而能上書陳述義理乞賜惡諡以為後來之戒搢紳之論莫不多汾有憤世嫉邪之意而常等惡傷王氏嫉之若讎及汾除諌議大夫遂率全臺肆為醜詆然汾從來别無過惡止言其口吃滑稽之類一二小事乃令報罷中外之論至今不以為直臣日近聞常等所以擊汾之由主於請王安石之諡操心如此豈復主公其事四也陛下即政之初知免役出錢為民之患故復用祖宗差役之制常在户部不能講究補完而協助邪說請復雇募及為中丞猶聞奏乞施行懐姦狥私大害聖政其事五也先帝已知經術取士久而有弊因欲復用詞律昨者有司請於經義之外加以詩賦朝廷採納已為定制而安石之黨必欲沮撓常以屢乞改用經義其徒翕然譽之頼陛下聖明主執不輕變易而常等言之不已背公死黨其事六也保甲之害衆所共知陛下變法以來農民方遂休息而陶乃建言乞重編排朝廷若行其說天下豈不大駭率情妄作其事七也臣起於小官誤䝉擢用非不知雷同鉗黙足以取容然而期年之中歴犯權貴旁人為之憂恐而臣處之自如者實以陛下推至誠樂善之心有舍己從人之德是以不量力薄思效涓埃而况二聖臨御以來逮今五載遵守祖宗之法曾無毫髪之累諌臣之職足以優為惟是君子小人消長之機實係天下國家治亂之本故臣自拜命以迄於今獻納之間尤以人物為務蓋朝廷之有君子如人體之有元氣元氣盛實則膚革充盈血脉榮暢寒暑疫癘不能投間以干隂陽之和則為安彊之人矣至於真守不固氣血将敗内無以養根本外不能謹起居一日遘疾雖和扁再生莫知所救天下之勢何以異此使君子衆多小人勿用然後綱紀振舉政教修明姦邪隂賊不能伺隙以亂聖人之治成太平之功矣其或聽納之間不辨枉直任用之際不察忠邪黒白混淆是非雜揉日復一日浸生亂階雖堯舜復見亦不能治臣竊聞近日執政奏事之次親奉德音思與大臣共為廟社長久之計毎患異日小人在側眩惑人主敗亂國政憂深慮逺固非愚臣之所跂及然臣夙夜寒心而不敢以為無事者正以風憲之地乃有常等皆王安石蔡確之黨人隂持兩端寝害正論使漸引其類並據要津則陛下累年憂勤所立之政事必将復壊於羣小之手可不痛哉臣恐陛下之所憂不在異時而其兆已見於今日也况二人挾邪之迹固已著明久而不去必有後悔惟陛下以臣所陳七事特賜詳覧若非誣罔必有實状乞慎擇忠厚端正之人以代常等不勝幸甚安世又言臣伏見陛下即位以來于今五載承天順地仁民愛物德澤洋溢施乎方外元元鼓舞歌頌不暇固宜隂陽順序風雨時若諸福協應百嘉蕃昌而嵗比不登和氣堙欝饑饉流徙灾傷頗衆今春旱暵為虐京畿西洛二麥失望農民嗷嗷且有菜色雖陛下惻然軫念靡神不宗踈決繫囚降從寛典而霈然之澤終未告足又陜西河北屢聞地震大星晝殞其光燭地旬月之間巨異仍見臣聞天人之際精祲有以相盪善惡有以相推者事作乎下象動乎上隂陽之理各應其感隂變則靜者動陽蔽則明者晻水旱灾異譴告警懼使之兢兢修省而不至於失道之敗也臣竊謂上天之體雖髙而聽卑明主所應惡文而尚實與其為祈禳之小數不若圖消復之大方臣願陛下夙夜祗畏側身修行特下明詔以示罪已又許中外臣民極言政事之闕失専委近臣考求其當以施有政庶㡬下情不至壅塞其諸路灾傷州縣流民所至並委守令多方賑濟無俾捐瘠申敕沿邊帥臣及捕盗官吏常切警備以戒不虞今日已前内外營造土木之役茍非要切並乞停罷分命監司按視留獄公卿輔弼同寅協恭以思天變開衆正之路杜羣枉之門誠備灾之善經應變之至務也昔宋景公七國之諸侯爾有不忍移禍之誠出人君之言三熒惑為之退舍以陛下之明聖發於至誠以精意感通何求弗獲臣待罪諫列日聞焦勞輙効愚𠂻庶裨萬一惟冀聖慈少賜採納不勝幸甚二十二日辛卯日中天晴四方有雲午時有流星出自東北方向西北方急流入濁沒即安世所指巨異之一也地震未詳
