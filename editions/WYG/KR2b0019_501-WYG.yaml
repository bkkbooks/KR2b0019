body:
  text: 續資治通鑑長編巻四百九十七宋李燾撰哲宗元符元年夏四月己夘朔上批宗室右侍禁士寔修進藝業可特授承務郎庚辰鄜延路經畧使吕惠卿言修築開公堡畢工乞賜名詔賜名開公堡三月十九日奉國軍留後安定郡王世開卒輟朝臨奠贈開府儀同三司追封信王謚獻敏辛巳三省言宣州涇縣主簿邱鄜江寧府右司理參軍吉觀國辰州司理參軍王天倪試宏詞科中選詔鄜循一資觀國教授河中府天倪華州鄜和州人也布録辛巳同呈環慶慕化獲人畜數斬首百級驅牛三百壬午朝獻景靈宫至於癸未禮部尚書蹇序辰言昨準朝㫖編類貶責司馬光等事状候編類畢欲繕寫一本進入以備省覽從之此據元符三年四月二十七日徐鐸奏請進書序辰初乞編類在紹聖四年三月二十五日京西排岸司言西河石炭綱有欠請依西河柴炭綱欠法從之新削樞宻院言請軍營創立廟宇者徒一年稱靈異動衆者加二等廟宇未立各減二等止坐為首之人本轄將校節級不止絶與同罪從之甲申上幸東宫莘王府簡王府因幸睿成宫二十二日推恩乙酉環慶路經略使孫路言美利寨相近有之字平可以建置城寨乞從臣體度邊情進築詔孫路審度從長措置無致輕易敗事仍節次具措置次第以聞曽布日録云路言自進築以来止用廂軍保甲般運軍器不曽和雇車乗衆莫不稱之附見當考樞宻院言鄜延路進築羅古谷嶺堡寨河東路進築榆木川寨詔軍兵等賜錢有差正月四日奏乞城榆木川四月十一日賜名羅古谷嶺堡四月十二日畢工十四日賜名惠卿家傳不載此鄜延奏已差王愍苖履統制擾耕涇原奏進築没煙前峽乞秦鳯環慶兵各萬人從之續令環慶輟騎兵五千秦鳯三千仍選精銳又令秦鳯整頓其戰士及餘丁以竢熈河㑹合兩項並據布録乙酉日事附入當考丙戍修國史提舉官尚書左僕射兼門下侍郎章惇等進神宗皇帝正史紀二冊詔化州安置梁燾卒不許歸葬家屬令韶州居住四年八月十六日紹聖四年十一月二十七日梁燾卒於化州州屬廣西距京八十一程卒既百日朝廷乃知也五月四日諸子並勒停禮部太常寺言奉詔詳定㳂寳法物禮儀謹按國朝㑹要元日五月朔冬至並行大朝㑹儀今奉上傳國寳欲用五月朔朝㑹行受寳之禮㳂寳儀物各依上尊號寳冊儀為祇受之禮兼按淳化元年因元㑹而行冊禮今五月朔於故事當大朝㑹乞就大朝㑹日以禮祇受前期有司預行製造㳂寳法物并寳進納入内俟降出權於寳堂安奉前三日差官奏告天地宗廟社稷前一日上齋於内殿上服通天冠御大慶殿降坐受寳羣臣上夀稱賀從之鄜延路走馬郝平言塞門北有故蘆關乞修復作守禦堡寨平以為西賊入漢界至蘆關百三十里乃有水水源在蘆關若據之則西賊往還二百六十里無水詔經略司詳定保明以聞布錄云鄜延走馬郝平奏乞進築蘆關云差中人馬入漢界至蘆關百三十里乃有水水源在蘆關若據之則西人往還二百六十里無水詔令鄜延相度聞奏先是孫路言鄜延進築蘆關烏延口環慶築恰伊克定邊則横山非賊所能有矣頗與平所陳合上亦稱平曉事已移熈河走馬詔府界京東京西河北東南路將下押隊依元豊舊制差置押隊人數令本將依材武格踏逐委本路經略安撫鈐轄司府界委提舉將兵所審察保明以聞下吏部勘當申樞宻院銓量施行從韓忠彦請也户兵部言請監司官出外合破擔擎人先差廂軍不足差逓舖若本處實無人可差欲比附紹聖免役令和雇施行其雇錢即於封樁廂軍或馬逓舖闕額請給内支仍每季申提刑司差不干礙官㸃檢如有人可差却支雇錢者依封樁廂軍請給條内别將移用法從之新削是日利珣奏熈秦路兵馬至淺井以来雖無水而適有雪以此無渴死者然水每擔七百雪半袋四五百而戰馬以附糧及器械太多脊背多創損詔令將佐如法療治具因此死損數申宻院布録要見後来如何又詔吕惠卿孫覽於葭蘆榆木川米脂中路修堡障以通兩路聲援布録丁亥三省言周國大長主奏男西染院使錢忱年十六乞除一使領赴朝参詔特遷莊宅使文州刺史詔重修熈寧日歴官周穜所進熈寧夏季日歴差錯重複罰金八斤樞宻院言故自毁傷而詐稱傷中或無功而詐稱雜功如率先入賊衝陣破賊苦戰力敵之類冐求恩賞者罪有差保驗官司從坐不以䕃論命官比類取㫖告者有賞從之詳定一司敕令所言擅借轉運司錢物及借之者干繫官吏各徒二年從之己丑詔京西路官自賣鹽及應縁申請指揮勿行其借過鹽鈔及見任錢物並令本路提刑司拘收封樁内已般到鹽數令提刑司變易見錢封樁樞宻院言河東路進築榆木川寨畢工詔孫覽已下賜物有差覽言鑿井有青蛇如金色水甘泉源壮乞賜美名詔賜名神泉寨三月四日奏請四月七日進築六月二十一日賞功玉牒既於此書築神泉寨六月二十一日又書誤也可考庚寅樞宻院言鄜延路進築羅古谷城寨畢工詔統制官劉安已下賜物有差三月四日四月七日進築十四日賜名樞宻院言河東路兵馬出界討蕩回又就便修築第九寨工役暴露日乆詔入役軍兵各賜錢有差三月九日修築府州第九寨西上閤門使樞宻副都承㫖同管勾客省四方館提舉中太一宫兼集禧觀宋球卒賻贈外特賜絹二百匹福州觀察使贈開府儀同三司追封滕國公諡温仲翩卒辛夘瀘南安撫司言瀘州義軍乞於冬十月農閑之際各赴所屬犒設以便夷衆應逐縣寨推排到舊新添義軍職級人數亦乞委自本司出帖收補其每年合支衣物乞據數品量給與逐處所管義軍職級庶係籍夷人均故恩賜從之壬辰詔中大夫同知樞宻院事林希罷同知樞宻院事知亳州御史中丞兼侍讀邢恕罷御史中丞兼侍讀知汝州以希私積怨憤宻較口語囬互輕重志在中傷恕隂懐怨憎揚言排擊妄意進用不計後先故並黜之先是恕以三月戊辰劾希希入朝如故恕繼奏䟽曰臣昨䝉恩除御史中丞臣自知此官若不上負陛下寄委則必下犯専權結黨大臣之怒所以臣嘗面辭至於再三時未有除命前因對先䝉宣諭除日所以面辭仰䝉聖訓宣諭時䝉宣諭以朕必主張也不敢固辭遂勉就職孤立一意惟知事君而已故不量其孱弱欲為聖朝一清姦黨而彈擊林希章䟽纔上已為希妄造平日對客常談欲以因説命數億度之言誣為差除事實之語是非之理燦然可見中外傳播共知希之矯誣而宰臣章惇隂主林希助其聲勢臣非有罪隔朝参之人但以既䝉根治所牒訊不可身為御史中丞安坐臺中􅌤顔應荅恐虧國體故權引疾居家而希乃妄造事端之人又已有臺諫官章䟽彈擊而外挟章惇等奥助上欲欺罔聖明下以鎮壓人情公然造朝殊無忌憚朝列駭笑而臣日困根治所牒訊沮辱不少蘇駉與臣供析大意略同已節次具解析一一奏知而數月已前對客閑談初不經意又大㫖已同其餘皆是小節兩下供析並是逐旋省記初無文簿筆記何由字字合同若必求字字符同則不免𫝊㑹却非實情欲望聖慈念臣効忠有素今来所治語言又已見得别無情意乃為林希不忠誣欺之人所見困辱而又俗吏之所頓挫誠宜在所矜憐兼臣職為御史中丞又出於陛下之所親擢今為林希合宰相大臣為黨共見擠䧟則惟特望聖慈主張而已欲望特降睿㫖付根治所若大意已同止於小節不圓即令疾速結絶所有臣彈林希罪惡與今来所治事全不相干亦望早賜施行如臣言無理亦乞便行罷黜貼黄稱林希日日造朝盖要與其朋黨相見合為姦謀上惑聖聽下脅人情若更稽留必有竒巧非臣一身綿力所當今来治希事只乞以希第一次文字為據後来若别入文字即出於章惇等衆人為謀飜覆之辭不足為憑希實傾險小人前後黨附不忠之跡當已不逃聖鑒知臣言為不誣矣又貼黄臣今為御史中丞欲為朝廷破私黨而宰相大臣合為私黨欲傾天子執法近臣其事乃上繋國家安危非獨臣之私計也伏望聖慈詳賜披覽既而林希以私忌不入三月二十七日丙子上謂曽布曰林希不入渠前日所陳邢恕云無此語非病心安得有此又云希言恕以撰公著貶辭故報怨恕云張商英攻公著臣乃舉自代此可見其妄又云恕言乆欲擊希適下手遲爾恕并兩御史已有文字攻希甚急云希是王珪門下士嘗對黄履云朝廷行遣珪太過又云先帝所不喜皆有之否又曰希此舉非大臣體布曰遊珪門下熈寧元豐中已有此謗黄履所言臣實不知上曰莫是不樂行遣珪否布曰亦恐有之先帝曽召對不用其後又嘗遣使髙麗不願行貶杭州粮料院則不喜亦可知也上曰貶樓店務又問先帝初何以不喜布曰臣嘗見王安石言希乃陳升之所薦及奏對所言多與升之同先帝顧升之云林希昨日對是卿所薦但冷笑而已升之色變然不知希所言何也上曰人言希出珪門下珪與吴充不協希欲謁呉充先造珪出東府北門却從南門入謁是否布曰此亦臣所不知希附珪則有之紹聖初亦附章惇衆論所不與然自在政府議論無不向正未見其有闕失士類亦共稱之更望聖慈采察主張此事要之出於兩人不相得故爾紛紛上曰但恐言者不已又曰章惇深主林希布曰惇於恕亦不薄方恕之初除待制及召還孰以為可者非惇力引何以至此上深然之又曰希此舉非大臣體希為大臣若搆造語言欲罔聖聽其罪固不容誅然身為大臣日侍清光以人情言之度不至如此若恕無此言則蘇駉誕妄爾此事全繫獄官願更賜戒飭勿令變亂事實庶不誤朝廷施行上曰好好先戒諭待更戒飭時三月丙子也是日丁亥安惇等以根治所職事上殿林希不入上因為曽布曰希今日不入又言臺中擊之甚急且言其方根治及聞臺章皆不顧造朝治事如常上又曰輔臣自来稍有人言便當家居聽命布曰臺章不出希無繇得知兼此事他人難言須自處乃可上曰李清臣當時亦如此卿等諭之乃不供職布曰臣初亦不敢言而章惇以謂不可不告遂共以語之清臣已封印聞此遂上馬當時文字皆在中書而清臣獨員不可不避與希亦少異上曰家居聽命乃是布曰希今日聞根治官上殿遂不敢入上曰言者又云希為旦作墓誌有怏怏於先帝不用之語布曰臣不曽見上曰刻石人往往有本布曰墓誌無不刻石石本必亦有之但臣不曽見爾上曰希附王珪必有之布曰此恐不免也上又曰恕輕率多言章惇云以針線縫却口亦須喋喋布曰恕每於人前有欲擊希之語又欲劾之令自圖去就希不能平故得此言遂以上聞上曰大臣豈當如此布曰衆議亦訝其輕發然方今政府闕人其下人材未見可繼者上又曰恕言乆欲擊希只是下手遲布曰此言亦未為可上曰此言誠非理上又曰不知根治虛實果如何恕堅云無此語若與希語果不同須取問布曰執政官自来恐無此故事上曰略問莫不妨布唯唯未敢力陳是日晚希遣其姪虙來謁布則云已有問目矣希欲避位布勸希造朝面陳然後家居聽命希㝷遷出恕先在假既而参假仍乞上殿上甚訝之謂布曰恕無忌憚如此本欲隔下又不欲爾只待問他云上殿来為甚恕方立廷下侍班上又曰恕揚然自若輕忽小人又曰恕每多言章惇云古人謂三緘其口如恕者須以針線縫合方不至喋喋布曰朝廷方付吏議曲直未分林希方遷出恕便参假趍朝上殿衆論亦無不駭之者上曰林希亦失體當兩絀之又問外議如何布曰衆論亦謂林希此舉非大臣體然所以致希如此乃縁恕語言乖謬若兩絀之外議必以為允上曰必兩絀之議已定矣上又曰恕言欲置蔡京兩府駉亦言有例云富弼與晏殊同在政府布曰此是異姓親未聞有兄弟同在政府者若異姓親則不獨殊弼王安石與呉充文彦愽與程戡許將與林希俱是親家如此者甚多上曰林希初奏云待教過三省劄子却云意欲布曰似亦無所校上曰待教與意欲煞不同布曰亦聞更有且教及若得兩字不同縁俱是口語雖經根治未知孰為虛實上曰誠是如此但希面奏與劄子不同即無疑爾布曰陛下必記希面奏之語上曰然布又曰希已兩經取問前日聖問及此臣未及詳陳是日便聞取問恐祖宗以来無此故事縁希尚在政府獄官押問自取問希須以状申大理少卿似於體貌非宜上矍然曰已失更不令問布曰此事已往無可言者願更留聖意上曰甚好上又曰路昌衡言恕常與京密語他人莫得聞雖不同一幕次往往於隔幕私語無得聞者蘇駉既就吏恕聞其言有與希不同者疑章惇黨希反歸罪於駉即又奏䟽曰原希妄造事端本要先䧟天子耳目近臣虛妄既露則必將歸罪蘇駉如此即希謀效臣受其祸希謀不效則蘇駉當其罪希果如此侮慢朝廷即良由朋黨衆盛所致臣聞蘇駉初追赴都堂取狀當是之時駉亦未知事因如何别無向背仍聞章惇嘗厲聲色面諭以聖㫖則駉所供狀安得不實若駉後来到根治所供析前後不同則罪乃在駉即與都堂所供狀無異則希虛妄之罪復何所逃昨蘇駉所供若與希同而臣却稱駉誣臣臣未必無理也然不知用事大臣肯聽臣言罪駉否書曰三人占則從二人之言今兩人既同而其理又在不疑則希尚何辭伏望聖慈特垂照察又貼黄今若朝廷聽希罪蘇駉則他日章惇林希意欲䧟害者即便誣告引一好進小人為證符同則為福不同則為禍劫以利害誰敢不從如此則但其所惡者皆可逐去臣恐惇威遂成無所為而不可固非聖朝之福亦恐為惇之禍也此事尤當深留聖念又貼黄臣前已陳章惇方與聖主爭權希去則權歸陛下希㽞則權歸宰相此非臣激發之辭事理灼然如此乞檢臣近疏更賜披覽後二日恕又造朝庚寅四月十二日布再對上語布曰恕今日又入布曰昨對甚久布亦深訝之不知云何上曰只是分訴仍云恕極毁章惇云王珪有恩於惇又以希故遲却三年乃行遣珪又云惇專權用事人畏之如虎莫不至如此否又云惇欲重行遣蘇駉因以立威駉至都堂惇厲聲詰問云是聖㫖取問布曰此言誠過當臣自與惇共事但見其痛罵王珪人皆以為太甚不聞其有庇珪之意兼惇與恕輩皆欲深罪珪以大已功恐無此若謂專權人畏之如虎尤恐不然惇為相無術人無畏之者往往反畏同列但口快多取人怨罵士大夫孰不極口罵之未聞有畏之者若能使人畏之而不畏人乃是惇能有為相操略也至於問駉稱有聖㫖乃當如此豈可使駉不知為聖㫖取問上悉以為然且曰惇恕輩自揚己功太過布曰此衆所共誚但不敢言不謂聖意亦察見其如此陛下先帝長子自當嗣位恕等何功之有上曰當時亦是能守正論布曰太母初無異意但王珪觀望不敢先啓口爾今惇為左相黄履右丞恕為中丞報之亦已豐足至於恕以元祐引文彦愽亦以為己力謂其引彦博在朝有保佑之意此尤為欺罔元祐之人欲招彦博為助豈恕之所能為上亦然之布又曰恕在紹聖初誰以為可在朝廷者非惇力引何以至此上亦深以為然布又曰恕知惇可擊前此何以不言上曰恕自作中丞便數毁短章惇却不獨今日布曰恕亦以惇數面辱之故怨於是兩人皆絀布謂惇曰恕絀極佳且使傾邪媚附者無效惇曰此不可漏恐恕别為姦慝也或曰恕為中丞惇實薦之布亦有力焉而亟與惇異每上殿移時不下惇固疑之矣始惇置希西府盖疑布間已故使希察布而希卒為布所誘遂叛惇惇乃因蘇駉事并逐希恕布雖數為希解然訖不免也并三月十九邵伯温云邢恕既為惇旦卞起獄不成每上殿移時不下惇果疑之出其元祐初謫隨州上宣仁后自辨書稱宣仁功德有宗廟大計旬日之前因已先定之語遂入元祐黨謫知南安軍恕怨罵惇不已惇畏之復直龍圖閣至元符末上皇即位欽聖后垂簾韓忠彦拜左僕射忠彦不平恕之誣罔謫恕均州安置按恕責南安乃十月十六日事伯温又云惇使希察曽布既而希為布所誘遂叛惇其罷當坐此今参取之御史蔡蹈凡四章論希其一曰臣嘗讀書昔先王聰明齊聖小大之臣咸懐忠良其侍御僕從罔匪正人然則古明王於侍御僕從不敢用不忠不良邪僻之人况左右大臣参訂國論典司機宻者乎臣伏見林希天資傾險詭躁􅄶急競利爭進無大臣體頃在先帝擢置文館養之有漸非不見用及選使髙麗輙敢託故不行先帝命黜監杭州樓店務後雖稍遷纔得為郎而已然希事王珪最為親宻珪前後薦論凡累數十先帝知其姦邪終不信用先帝棄天下未久黨附韓縝浸有超擢縝出復事吕大防蘇轍及交通梁燾燾亦傾心結納嘗引希及弟旦以自代數年之間雖嘗以言者斥外而汲汲干進常不自安其知潤州日因藉河渠事獻書大防㝷除天章閣待制由此巧計得行遂躋顯要以至今日若非希能以邪心異意求合大防轍等何以致此臣又按希性多猜忌善人吉士非出其門則䜛毁萬方卒以中傷若其昆弟子姪皆縁要職坐布京師其迹甚明臣又嘗聞希知杭州日承蘇軾之後軾所為政一無善狀希尊奉賛詠見於文墨題其所築西湖堤曰蘇公堤刋石於亭揭示州人無不知者盖天下之人皆曰陛下誠能繼先帝之志者也希終先帝世不見異擢故甞自為其弟旦墓銘謂旦坐論李定事經十五年間無敢道吾家姓名者觀其言觖望可知今陛下進之右府實主機宻邊陲多事議論不一必得端亮一節計安宗社之人審處成計庶幾有助若希者辭難擇事昔猶不為先帝用今肯任陛下事乎此陛下繼志之善有所未盡臣待罪言責不敢循黙欲望聖慈罷希機政特賜顯黜慰塞羣言天下幸甚其二曰臣今月二十五日具奏林希傾邪詭躁􅄶急競利争進無大臣體等事乞特賜黜罷至今未䝉施行臣竊見希自小官以至顯要無非阿附權貴以為梯媒既以恩出其門遂亡朝廷公論王珪之惡屬者士大夫口語籍籍皆謂削奪後時獨希游談要路欲以盖藏背公营私隂滅大義為臣如此顧雖下僚小吏不可一朝居也况左右大臣乎且希以珪能累數十薦力為㧞引至吏部尚書翰林學士天地之造父母之德豈復有大於此者乎由此見希亡愛君報國之心明矣希之姦邪其狀不一獨盖藏王珪尤害朝廷大義其它交通梁燾舉希自代及吕大防蘇轍引為天章閣待制其為姦黨亦甚著明盖朝廷二三年間誅斥元祐羣姦自謂幾盡乃不知希實餘黨而反在天子左右此天下士大夫議論所以喧騰而未息也臣愚欲望陛下斷自聖意檢㑹前䟽早賜施行其三曰臣竊以祖宗以来執政大臣致臺諫官上章論列者即日私家待罪俯伏憂懼如此者所以嚴朝廷風憲之體存人臣進退之義也臣近者再具奏論林希姦邪等事雖未䝉施行而希身為大臣亦合恐懼憂畏家居俟命而乃安然造朝氣熖自若倨傲無耻士論不平若非挟黨怙姦孰敢輕視陛下風憲之司若此其甚欺天慢上近代罕聞臣昨又聞希之纎巧以㝷常客語締造事端上惑宸聰隂中言路原其措意自以邪惡播聞慮有彈擊計窮勢廹知不可奈何而先為釁隙障塞人言庶幾偷安以固寵禄希之險薄於此洞見表裏而尚欲巧為盖覆無耻可知恭惟陛下至誠求治進賢退姦雖逺在千里之外朝聞而夕行惟恐後時至於希為傾邪近在陛下左右而臣數露章疏今已踰旬未聞睿㫖施行中外疑惑臣愚伏望發自聖斷詳希罪状速賜罷黜然後逐臣以戒擊姦後時廣置言職少慰天下公論其四曰伏覩敕命罷林希同知樞宻院事依前官知亳州有以見陛下賞善罰惡大公至信雖左右之臣不敢以私此陛下繼天紹祖之盛德也然臣愚竊以林希姦邪陛下所素聞先帝所深知臣等區區効死言路不顧人㣲屢上章疏皆有據案付外施行今者竊讀告詞止以私積怨憎宻較口語回互輕重志在中傷為罪而它無一言及希姦邪士大夫議論喧然殊未厭慰今不昭示衆聽使天下知希不專以口語被黜則希之它日復進有以藉口者矣如此而欲戒官邪不可得也臣愚欲望睿慈省察斷自聖意少加誅責天下幸甚蔡蹈章雖無取然不可不載以見一時議論二十四日曽布云可考大理寺言應奏斷公事乞依開封府專條不許諸處取索從之鄜延路經略使吕惠卿言進築羅古谷嶺新寨畢工詔賜名臨夏寨四月七日十二日尚書省言大理寺擬立到有㐫惡及羣黨賊盗提刑司專委本處通判抽差近下禁軍三十人量支器甲提舉捉殺如别有勾當及歸任日所差人並放下不得妄作名目占留從之癸巳轄正男溪嘉斯博邦貝昌為銀青光禄大夫檢校國子祭酒兼監察御史充本族副都軍主詔龍圖天章閣賫治平元年閏五月二日耀州所獻受命寳玉檢赴都堂参驗國史編修官周穜言本院昨於王安石家取到安石手記載熈寧初君臣遇合相與論議天下之事然稱當時臣寮多只一字以記其姓名深恐異時難為曉解請降付國史院重㸔詳編纂成書庶幾進御易於觀覽從之陳瓘云云尚書省言宗室宫院遺火宗正司取勘聞奏宗室及同居尊長展磨勘年罰俸給有差祇應當直人若女奴失火同保人不覺察或同祗應人不即救應勾當使臣不切鈐束等第坐罪從之樞宻院言就糧禁軍闕額委都總管安撫鈐轄司於十月上旬選官分詣逐處與當職官於廂軍内揀選年四十以下者依軍分等様添填限至正月終揀遍從之鄜延路奏第七將擾耕獲九十六級布録癸巳乙未吏部言請下兖州於孔子家衆議擇承襲之人俾奉祀事以聞從之河東經略司言修築第九寨畢工詔賜名寧川寨三月九日初役工布録云賜名寧川以遮護皇甫川耕牧故也丙申詔建閣藏神宗皇帝御集以顯謨為名二月十八日初令兩制撰名詔五月朔受𫝊國寳命宰臣章惇書寫玉檢恊律郎周注年言寳璽靈光翔鶴之瑞願詔詞臣撰樂章付太常寺應奉朝㑹之用詔學士院修撰䕫州路轉運判官黄逺言請知縣人勿令差往别州縣勾當公事從之詔陜西河東路監司官如往極邊勾當合差人馬防護處即令本地分將佐城寨官量差馬歩軍防護毋得過五十人騎仍逐地分遞相交替如隨軍出界并走馬承受即委都總管或統制官臨時量事勢差與防護兵馬一兩隊其經略司監司屬官不與統制官監司同行者亦如之毋得過三十人騎詔陜西河東諸路禁采伐新疆林木詔海行敕并紹聖免役令抵當出賣條合刪去未售而贖者聽一節先是太府寺奏請抵當估價未售而聽贖即恐開冐名收贖之弊故有是詔新無丁酉詔𫝊國寳檢以天授傳國受命之寳為文鄜延路經略使吕惠卿言威戎城押送到西界歸順密吹等詔補内殿崇班刑部立到武臣降叙格第二等贓盗姦私罪借奉職初叙守闕軍將再叙軍將殿直初叙軍將第三等贓罪借奉職初叙軍將從之舊特詳今從新宋球既卒曽布言承㫖司闕官無可代者上亦患無人曰曹誦與觀察使作都承㫖可否布曰誦數乞罷管軍姚麟之次惟誦而已若令作承㫖無不可然在誦則為失職上深以為然且曰不唯誦失職兼其次便是王恩未可峻遷然承㫖誰可為者布曰臣常以為承㫖乃陛下左右親信任使之人當出自聖意選擢然外廷無可選者正任中有人否上曰誰可者布曰曹詩亦曉事上曰不可不若用王師約布曰師約老成厚重非詩之比先帝亦嘗任使但臣不敢及之爾兼須與三省同取㫖上曰且更俟詳思少緩不妨布唯唯布録四日壬辰它日布又言承㫖亦有職事不可久闕上曰只王師約莫可用異時不免須與節鉞且令作承㫖布曰外廷無可備選者更自聖裁擇退以語章惇惇亦稱善曰縁此除節鉞則他人不可攀援也四月乙未己亥布請用師約上乃疑之問王貽永作何官布曰樞宻使同平章事上曰自仁廟以後無此例布曰先帝常以師約判三班院是時貴主尚在師約赴局終日適與王詵隣居詵日作樂與貴主宴聚甚歡師約家貴主至泣下遂罷職因言詵之薄劣如此上亦哂之訖不用也四月己亥庚子詔以幸睿成宫先朝從龍官並等第推恩初六日幸宫宣慶使榮州防禦使入内押班梁從政為入内副都知昭宣使康州團練使内侍押班吴靖方領萊州防禦使西上閤門使周宥為東上閤門使内殿承制閤門通事舍人張忠為供備庫副使馬琪劉永安並為西京左藏庫副使内殿承制穆絢杜能張士宗為供備庫副使東頭供奉官鹿用之為内殿崇班内朱有章與白身兒孫一名恩澤亡没者賜銀絹兩省都知押班共二百匹兩諸司使副至崇班共一百匹兩東頭供奉官已下共五十匹兩並付其家户部言發運司奏額解帳狀乞限次年九月終撥發輦運司限六月終如違依稽程官文書律罪止杖一百本司官減一等從之詔西蕃轄正下進貢大首領已有職名人與轉兩資未有職名人與副軍主首領已有職名人各與轉一資未有職名人並與都虞候每年各支茶綵有差詔秦鳯環慶兵將至涇原出界進築並聴主恩節制布録辛丑三省言六曹人吏俸元豐條令並支見錢元祐例皆裁捐詔除吏部告身一案依見行則例其餘曹部並依元豐條工部言請復置都提舉汴河隄岸司乞應縁河事經畫奏請等事並須關報本部從之復置都提舉汴河隄岸司要見的是何年罷元豐八年五月三日止罷隄岸司所收課利環慶走馬盖横奏种朴出界斬首百餘級獲駝馬牛羊共數千布録辛丑涇原奏三遣人硬􅊥一次奪馬八匹一次二十五匹一次三十匹遂令孫文將萬騎出没煙討擊布録辛丑五月四日辛亥當考壬寅右諌議大夫安惇為御史中丞權禮部尚書蹇序辰兼侍讀户部言樓店務每年所收課利錢十分内樁留五釐充修造省房支用其樁留錢及材植磚瓦等輙他用者以違制論從之舊特詳今從新是日曽布再對又言承㫖司闕人極妨事因言臣再三思之雖得王師約未為允如趙挺之輩豈易得在陛下采擢而已此等人於容止詞令雖不免暫時生踈然習熟則亦無難者上終未决布曰承㫖司闕人且如此今御史臺中丞侍御史殿中皆闕朝廷紀綱之地豈可付之蹈棐輩上曰亦未乆布曰已旬日矣此地豈可一日闕人上曰便差只是差中丞布又言左右史乆闕沈銖已病必去西掖亦闕人願更留聖意今大臣意各有所偏章惇主周穜蔡卞主鄧洵武此兩人者亦相若陛下以無心處之俱進亦可俟見其頗邪逐之未免盖史院自來是進擢之地蔡卞趙彦若等皆繇此進今業已處之於此而穜又在經筵諒不可遺人材大約不相逺在御之如何爾兼既處之侍從則隨材任使靡所不宜如李南公路昌衡若初欲處之從官人必驚駭以為不可今既作兩制及任使之際人亦不復有言方今人材闕乏大臣各有所好惡人人更相毁其所知則遂無全人矣此亦衆論所惜上但諦聴而已癸卯中書舍人沈銖以疾再乞宫觀詔除龍圖閣待制知宣州龍神衛四廂都指揮使吉州刺史王愍為熈河蘭岷路副都總管從張詢奏請也四方館使祁州團練使苖履權鄜延路都鈐轄八月二十七日改熈河路環慶奏五月自當進築不可更應副涇原兵馬詔從之仍戒以不得妄託故甲申詔自今學官増試兩經仍分兩場每試一經大義三道三省言户部狀比較到紹聖三年分上供金帛錢物數目京東路最兩浙路殿詔京東轉運使黄寔判官趙竦各減二年磨勘兩浙轉運副使張綬判官陳安民各展二年磨勘乙巳國子監言乞今後科場及太學公私試所存留三分解額均作十分通融先取二禮合格之人不得過五分次取他經從之丙午詔西南龍羅蕃進奉人龍延騫為歸德大將軍龍異㑹為安逺大將軍龍以邱為歸德將軍龍異闔為寧逺將軍龍延特龍以徽二人並為武寧將軍羅以増等二十二人並為奉化郎將龍延覔等九人並為安化郎將羅元象等七人並為保順郎將丁未詳定刪修軍馬司敕例成書賜詔奬諭知樞宻院事曽布知定州韓忠彦仍賜銀絹有差樞宻院言重修到禁軍春秋大教法事藝髙彊人轉資賜帛免晚教接送防送有差舊錄詳今從新
