body:
  text: 續資治通鑑長編巻八十四宋李燾撰真宗大中祥符八年春正月壬午朔備鑾駕詣玉清昭應宫太初殿奉表奏告尊上玉皇太天帝聖號陳設如大祀惟三進酒飲福並用金醆羣臣朝服陪列諸方客使貢舉人蕃夷酋長道釋耆夀坊市民悉集宫門外舊儀皇帝殿上再拜羣臣不拜以躬率臣庶有司定上再拜内外皆拜令諸州皆建道塲設醮奏表臣庶家悉置香臺上香望拜官司檢察之是日遂奉安刻玉天書於寳符閣塑御像冠服立侍上升閣備登歌酌獻還御崇徳殿受賀大赦天下非十惡枉法贓及已殺人者咸除之内外文武官滿三年者有司即考課以聞緣河江淮兩浙民田經水災者悉蠲其稅丁亥賜玉清昭應宫國子監印本經書各一部己丑樞宻院言凖詔定承天節南郊奏䕃子弟恩例宰臣樞宻節度使帶平章事子授東頭供奉官弟姪孫左侍禁樞宻使參知政事樞宻副使宣徽節度使子授西頭供奉官弟姪孫右侍禁左右僕射太子三少御史大夫文明殿學士資政殿大學士諸行尚書子授左侍禁弟姪孫左班殿直三司使翰林資政殿翰林侍讀侍講龍圖閣樞宻直學士左右常侍上将軍統軍太常宗正卿御史中丞左右丞諸行侍郎兩使留後觀察使内侍省使子授右侍禁弟姪孫右班殿直給事諌議中書舍人知制誥龍圖閣直學士待制三司副使防禦團練客省引進四方館閤門使樞宻都承㫖子授右班殿直弟姪孫三班奉職大卿監帶職少卿監諸州刺史子授三班奉職弟姪孫借職南郊刺史以上如承天節例其諸衞大将軍少卿監諸行郎中帶職員外郎内諸司使樞宻諸房承㫖子授三班奉職弟姪孫借職諸衞将軍諸司副使子授借職樞宻諸房副承㫖子初命授同學究出身再經恩授借職景徳四年十一月有詔是日中書進呈御史中承一馮極應詔舉太常博士知桂州王專大理寺丞河南府軍廵判官趙喻上曰此所舉官當與常異並令轉官専與轉運使副喻與通判差遣王旦曰王專前後十六人保舉轉官亦已三年誠如聖㫖處分趙喻近得京官欲止升差遣今後舉官欲并以考第歴任進呈上然之庚寅宴近臣於㑹靈觀以玉清昭應宫奏吿禮畢也置禁軍左右清衞二指揮在雄武弩手之上月俸錢五百以奉宫觀洒掃之役三班奉職袁昭慶上其祖彦周朝所授吿敕中有二聖名諱壬辰詔遷昭慶官以告敕付修史院詔玉清昭應宫判官自今赴宴班在龍圖閣待制之下甲午命兵部侍郎修國史趙安仁知禮部貢舉翰林學士李維知制誥盛度劉筠同知上覽諸道貢舉人數減於常嵗因曰外郡官吏未體朕意耶比者詔命累下但戒其狥私爾若能精擇寒畯雖多何害又曰聞所試諸科六通已上巻中小有㸃汚粘綴若記驗者即駮放茍實緣誤失亦可憫也當諭主司勿即駮放次場面試以辨其真偽是嵗始置謄錄院令封印官封所試巻付之集書吏錄本諸司供帳内侍二人監焉命京官校對用兩京奉使印訖復送封印院始送知舉官考校置謄錄院實錄未見疑本脱當考其月日初秦州民家子趙抱一牧牛田間一夕有扣門召之者以杖引行杖端有氣如煙其香可悦俄至山崖絶頂見數人㑹飲音樂交奏與人間無異抱一駭而不能測㑹廵檢使過其下聞樂聲疑羣盗讙聚集村民梯崖而上至則無所覩抱一獨在援以下問之具言其故凡經夕若俄頃自是不喜熟食凡火化者未嘗歴口茹甘菊栢葉果實井泉間亦飲酒貌如嬰兒素不習文墨口占辭句頗成篇詠有道家之趣遂不親農事野行露宿上祀汾隂嵗至京師猶丱角得召見賜名度為道士自是間嵗或一至京師常令居太一宫與人言多養生事無方外竒説於是又詔蠲其家租税乙未謁玉清昭應宫前一日命從臣悉屏葷茹因幸上清宫開寳景徳寺王旦等以車駕詣宫寺焚香必百拜因請自今正殿再拜外諸殿令宰輔分拜上不許再表以請乃詔禮儀院詳定差減其數焉是日上幼女妙妙入道丁酉加天書刻玉都監内殿承制入内押班周懷政為如京副使摹勒官御書院待詔盛亮等各進秩初刻玉既成上欲自王旦而下咸遷官旦等固讓且言懷政等尤勤其事請行賞典從之戊戌上自滋福殿奉玊皇聖號册文赴朝元殿後幄刋刻命周懷政専掌其事上封者言自今文武官授川峽任其家屬有所依而輙携赴者請不許首罪從之徙棣州城先是河北轉運使李士衡張士遜等言河流髙於州城者丈餘朝命累年役兵修固葢念徙城重勞民力而去冬盛寒尚有衝注若凍解必致決溢為患滋深今請於州之北七十里陽信縣界地名八方寺即髙阜改築州治以今年捍堤軍士助役則永久之利詔可令權度支判官張績内侍押班周文質乘傳與士衡士遜等同莅其事三月而役成時故城積糧甚多或者病其難徙士遜視瀕河數州方歉食即計其餘以貸民期來嵗輸新治公私便之孫冲既徙知襄州復上䟽論徙州非便且著河書以獻既而大水没故城丈餘據孫冲本傳云河決棣州知天雄軍冦凖請徙州滴河命冲徃按視還言徙州動民亦未免治堤不若塞河為便遂以知棣州自秋至春凡四決口皆塞之及凖為樞宻使卒徙州陽信而冲坐守護河堤過嚴民輸送徃來堤上者輙榜之為使者論奏徙襄州按實錄㑹要及本志則滴河之議乃王曙李應機所建非出於凖也曙即凖女壻豈當時議果出於凖耶及是則曙已去矣衆見凖在樞宻棣州卒徙因以為徙州實凖初議恐未必然也冲既徙襄州猶争徙州不便然故城没水丈餘則州豈可不徙耶冲傳不究其本末似因當時人所作碑誌行状畧刪潤之耳葢不可信當考詔如聞諸軍亡卒毎擒獲多妄引同軰嘗共賭愽逮捕既衆豈無濫刑自今有司勿更窮究止用本罪論決甲辰中書以准敕舉官姓名進呈請以歴任及為人所舉多者入大藩知州提㸃刑獄為一等大藩通判小郡知州為一等幕職州縣官年限及元敕歴任無大過者令銓司注替磨勘引見從之㑹要八年正月二十三日事戊申分遣侍臣禱雨於玉清昭應宫廟社諸神祠庚戌詔王欽若陳堯叟馮拯趙安仁及林特等各舉供奉官至殿直有武幹者一人先是秦州遣兵深入戎境創建寨栅而州之亡命卒有為鄉導以侵畧邉戸者鈐轄岑保正上言欲與知州同廵邉王欽若議從其請上曰朕聞秦州每嵗廵邉事體甚重所以專任守臣者葢有説也若與鈐轄皆行則藩部禀令不一久必生事乃詔諭保正事無大小皆聽參議惟廵邉止令知州獨徃事有便宜即行訖報部署鈐轄司㑹要係此事于正月若正月則王欽若不當與議欽若議乃寳訓所載恐未必是欽若或當移入欽若再秉樞後以西上閤門使夏守贇都大提舉草塲先是守贇任崇儀使與閤門祗候劉承渥李居中同提㸃倉塲至是遷秩故命差降之仍令承渥等每公事謄申守贇不得連簽二月癸丑三司言陜西入中糧斛交抄併多富民抑其價值既賤市之又稽留之有害商旅致入中艱難須有釐革用懲其弊元定百貫交抄官給十九千今請依市所買毎百貫有加擡者官給十二千無者官給十一千收市之上慮其奪民利止令權宜行之不得著為定式㑹要𣙜易門以為七年二月今從實錄據本志亦有不同當考甲寅占城國遣使來貢宗正寺火有司奉玉牒屬籍置他舍得免判寺官並坐責黜命鹽鐡副使叚曄擇地營宗正寺自今判寺官不得携家屬居之因詔諸司庫務益嚴火禁詔内侍省選官為太廟宫闈令嵗滿無遺闕者當與甄奨䕫州路轉運使言黔州西南宻州蕃族張聲進遣使貢馬詔許赴闕既而又言聲進至南寧州龍漢􅚜邀而刼之遂相讎殺不已乃降敕書安撫焉降敕安撫乃閏六月今并書然則張聲進所貢竟未曽入也實錄正史皆以西南宻州為南寕州今姑從㑹要按九域志黔州領覊縻四十九州獨無宻州當考京西轉運使陳堯叟議開滑州小河以分水勢河北轉運使李士衡以為流患魏愽請罷之上曰各庇所部非公也丙辰命户部副使李及西上閤門使夏守贇視河利害及等還言開河為便於是規度自楊村北治之復開汊河於上㳺以泄其壅塞詔可詔諸科舊舉人宜復塲後引試考較經御試者終塲引試考較西番首領嘉勒斯賚埒克遵温布且摩羅木丹並遣牙吏貢名馬估其直約錢七百六十萬詔賜嘉勒斯賚等錦袍金帶供帳什物茶藥有差凡中金七千兩他物稱是丁巳詔禮部貢院官暴得疾者委監門使臣與無干礙官視其所苦速令歸第三司借内藏庫錢十五萬貫玊清昭應宫言太初明慶殿惟朝命乃建道塲其皇親近臣許於紫微殿寳符閣下餘人止於諸小殿及道官廨宇醮設從之壬戌給涇原路籠竿城公用錢嵗二十萬時都鈐轄曹瑋等言本城民鬻酒嵗二百三十萬請以其羡數給公用故有是賜瑋又言涇原界掌事蕃僧哩碩琳布齊等四人乞賜紫方袍師號詔從其請丙寅以楚王元佐為天䇿上将軍興元牧賜劔履上殿詔書不名唐及後唐天䇿上将軍並開府時元佐久病特加褒號不開府仍結銜在功臣上帝謂宰臣曰楚王加恩興元府必遣人來重於煩擾宜速止之府牧自此始淮南兩浙民飢丁卯遣知制誥陳知微戸部判官虞部員外郎袁成務等四人分路廵撫所至按視儲糧闕乏處規度轉給因察訪廵檢使臣能否有弛職者換易以聞増澶州公用錢嵗五十萬從知州靳懷徳之請也上嘗謂王旦曰懷徳涖官㢘勤不張事勢河上夫役躬親廵察有歛乞者立就衆中區斷由是下無敢犯近城小圃内侍過之詢灌園者且云舊納蔬州廨自懷徳至即罷如此謹畏可委煩重且曰懷徳經學出身通方幹濟年迨七十彌精吏事誠可奨也戊辰詔申禁諸司奏事取進止而疑似兩取指揮者先是吏部銓引選人中書以累有論薦勘事未行坐誤入人死罪准敕原放命與小處官銓曹奏取進止上曰此自當從敕處分因申明舊敕禁約之三月十七日事此據㑹要當考癸酉親謁玉清昭應宫幸開寳寺上清宫祈雨甲戌令登州於八角鎮海口治官署以待髙麗女真使者乙亥詔淮南路廪粟為糜粥以濟飢民遣兵戍揚楚泗廬潤五州州一指揮警盗也丙子詔禮部貢院進士六舉諸科九舉以上雖不合格並許奏名知永興軍龍圖閣直學士陳堯咨好以氣凌轉運使樂黄目表陳因求解職詔不許己卯徙堯咨知河南府兼留守司事上聞堯咨多縱恣不法詔黄目察之盡得其實上不欲窮治止落職徙知鄧州他日上謂宰相曰或言黄目在陜西條約邉事雖主将亦罕饒假王旦曰太祖朝邉臣横恣或得一儒臣稍振紀綱便為稱職上曰近聞外官多事依違黄目茍能如此亦可嘉也然不可過當生事宜宻戒之堯咨徙鄧乃四月壬申今并書之庚辰大雨上作甘澤應祈歌賜近臣三月辛卯中書上羣臣應詔所舉官上覽之曰皇甫選人言其好談民政陳絳亦聞有吏幹王旦等曰選好師慕古人而臨事迂濶無益於用絳制䇿上等外任有聲而性多簡倨時李永錫亦在舉中旦等言永錫即頃年妄陳封事被絀者上因曰搢紳之士多恣毁訾近日頗協附有位久則便成朋黨深宜絶其本源也旦等曰唐文宗朝二李各樹朋黨迭相升黜晚年自不免禍職由此也甲午上又作諸岳祭吿文皆遣使刻石於廟中丁酉賜邕州公用錢二十萬以其地管蠻洞備犒設也戊戌趙安仁等上禮部合格人數姓名上顧謂宰相曰今嵗舉塲似少謗議安仁等適對朕亦以此語之矣王旦曰條式備具可守而行至公無私其實由此癸卯上御崇政殿覆試多所黜落又疑所㸃抹者或未當命宰相閲視之旦曰考官過為艱難公在其中矣於是得進士蔡齊以下百九十七人並賜及第六人同出身又賜六舉以上特奏名進士七十八人同三禮出身賜諸科三百六十三人及第同出身試将作監主簿除官如元年之制齊等既考定上顧問王旦等曰有知姓名者否皆曰人無知者真所謂捜求寒俊也故事當賜第必召其髙第數人並見又參擇其材質可者然後賜第一時新喻人蕭貫與齊並見齊儀状秀偉舉止端重上意已屬之知樞宻院㓂凖又言南方下國人不宜冠多士齊遂居第一上喜謂凖曰得人矣特召金吾給七騶出兩節傳呼因以為例凖性自矜尤惡南人輕巧既出謂同列曰又與中原奪得一状元齊膠水人也上之親試進士也召崇文舘檢討馮元講周易泰卦元因推言君道至尊臣道至卑必以誠相感乃能輔相財成上説特賜五品服甲辰詔増鎮戎軍公用錢嵗二十萬初本軍嵗給一百三十萬地當極邉軍屯頗衆故増焉仍賜白金千兩以備器用又賜鳳翔河中府青潭州長吏添支錢有差乙巳詔緣邉諸州士卒為蕃界所部送官者如實投蕃即依元敕區斷若因緣避役即決𨽻本指揮名下從知鎮戎軍李餘懿之請也夏四月辛亥以殿中侍御史廖安世知太平州庭試舉人日安世為封彌官不時請覲覬望恩寵故出之癸丑召宰相觀書玉宸殿閲御製皇王帝覇五臣等論遂臨水軒賦詩各賜衣帶器幣吏部尚書王欽若户部尚書陳堯叟刑部尚書馮拯兵部侍郎趙安仁預焉乙卯宴近臣於長春殿鎮定路都部署歩軍副都指揮使振武節度使王能來朝故事節帥陛見必賜宴掌兵者則不及至是特令用藩臣例有司言能既赴坐而殿前馬軍帥曹璨等皆當侍立品秩非便乃詔璨等皆預坐自是掌兵者率以為例令翰林學士陳彭年以趙安仁等知貢舉起請事件著於式詔陜西緣邉鎮寨都監監押寨主知蕃兵侵㓂熟户即時部兵䇿應違者重行朝典先是懷衛濱州以部内官屬少進士登科者因聚數州進士都試之乃詔自今諸州發解如乏試官宜令轉運司選隣州官充不得移舉人就他州併試丙辰詔知荆南馬亮發潭州虎翼軍五百人屯鼎州俟辰州有警則徃赴之以辰州言溪蠻擾動故也於是知辰州張綸請入陳利害加兵翦除亮亦請濟師王旦曰此蠻賊之小者不足以煩天誅但當備禦剽竊勿使得至境上杜其無厭之來即安静矣上曰觀綸此奏必能撫綏深入之議特須裁制不可行也十二月乙酉命東染院使平州刺史曹克明知辰州或移此段於彼戊午丁謂言㑹靈觀頌記望賜御製御書從之邠寧副都部署王守斌言西界蕃部指揮使朗宻囊瑪魁孟雙二人投環州歸順詔先有熟戸蕃部逃亡為西界所納者可移牒追取俟其遣還乃以朗宻囊等付之辛酉賜宰相御製良臣正臣忠臣姦臣權臣論壬戌以樞宻使同平章事冦凖為武勝軍節度同平章事先是凖惡三司使林特之姦邪數與忿争特以河北嵗輸絹闕督之甚急凖頗右轉運使李士衡而沮特且言在魏時嘗進河北絹五萬而三司不納以至闕供請劾主吏以下上勉從其請而用赦釋之葢京師嵗費絹百萬而凖所助才五萬而已凖又以三司放駞坊軍士不俟給装錢為特過特方有寵上不悦謂王旦等曰凖年髙屢更事朕意其必能改前非今觀所為似更甚於疇昔旦等曰凖好人懷恵又欲人畏威皆大臣所當避而凖乃以為己任此其所短也非至仁之主孰能全之凖之未為樞宻使也旦嘗得疾久不愈上命肩輿入禁中使其子雍與直省吏扶之見於便殿勞問數四因曰卿今疾亟萬一有不諱使朕以天下事付之誰乎旦謝曰知臣莫如君惟明主擇之再三問不對上曰張詠何如不對又問馬亮何如不對上曰試以卿意言之旦强起舉笏曰以臣之愚莫若㓂凖上憮然有間曰凖性剛褊卿更思其次旦曰他人臣所不知也臣病困不任久侍遂辭退及凖為樞宻使中書有事闗送樞宻院礙詔格凖即以聞上謂旦曰中書行事如此施之四方奚所取則旦謝曰此實臣等過也中書吏既坐罰樞宻院吏皇恐吿凖曰中書樞宻院日有相干舊例止令諸房改易不期奏白而使宰相謝罪既而樞宻院有事送中書亦礙詔格吏得之欣然以呈旦旦令却送與樞宻院吏白凖凖大慙翌日謂旦曰王同年大度如此耶旦不荅旦毎見上必稱凖之才而凖數短之一日上謂旦曰卿雖談其美彼専道卿惡旦謝曰理固當然臣在相位久政事闕失必多凖對陛下無所隐益見其忠直此臣所以重凖也上由是愈賢旦及凖自知當罷使人私於旦求為使相旦大驚曰使相豈可求耶且吾不受私請凖深恨之既而上問旦凖罷當為何官旦曰凖未三十已䝉先帝擢置二府且有才望若與使相令處方面其風采亦足為朝廷之光也及制出凖入見泣涕曰非陛下知臣何以至是上具道旦所以薦凖者凖始媿歎出語人曰王同年器識非凖所可測也司馬光記旦薦凖事以為旦将卒時且云時張詠馬亮皆為尚書按詠死於祥符八年八月亮時但為工部侍郎雖旦卒時亮亦未為尚書也果問詠即當在八年以前凖未使樞宻時凖所以得使樞宻則由旦此薦也其後復入中書則距旦之卒幾三年矣記云旦殁嵗餘上卒用凖葢誤爾凖使樞宻由旦此薦則問張詠固當前此若前此則馬亮方為給事中知洪州上未必有意擢置兩府恐不當遽問或問他人而藍元震聽聞不審司馬光亦姑記之乎事皆參差不合然旦扶病入對上問張詠及旦薦凖必不誣也但決非臨卒時爾今輙附見凖罷樞宻時更須詳考之所載馬亮亦仍其舊司馬光記旦入對延和殿按延和殿本承明殿祥符七年始建景祐元年改名當時未有延和殿也今止稱便殿本傳云旦将罷相獨對滋福殿令左右掖扶而升薦賢士大夫十數人自此以前未嘗云旦得獨對也今輙以薦凖事為凖未使樞宻時者旦素體羸多疾其扶掖入見恐不但将罷相乃如此爾若将罷相乃得獨對則與司馬光所記差同但張詠歿既數年上不應更以為問也且殿名滋福不名延和豈旦亦嘗獨對承明不止滋福耶據實錄本紀則天禧元年六月旦兩得召對一在崇政殿一在滋福殿而本傳不備載則承明獨對本傳固不書而本紀實錄亦有所脱畧未可知也承明獨薦凖滋福所薦又十數人疑實兩事要不敢決然上問張詠及旦薦凖藍元震所聞決不誣顧時之先後有可疑并問馬亮亦所不曉爾以吏部尚書王欽若戸部尚書陳堯叟並為樞宻使同平章事令緣邉知州軍廵檢月徃諸軍營宇廵敎増絳州公使錢嵗五十萬從知州錢惟濟之請也甲子上謂王旦曰上封者言中書不言事罕接賓客政令頗稽滯旦等曰中書當言者惟進賢退不肖四方邉奏郡縣水旱官吏能否刑法枉直此數事日奉徳音動遵睿㫖外人不知者是臣等無漏言也罕接賓客誠亦如之如轉運使副提㸃刑獄邉要藩郡守臣及非次将命羣臣陛辭之後未嘗不見或齎到劄子者觀其所述可以詳悉洎復詢問即渉徼求大約中書庶事動守程式不敢隨意増損行遣疾徐日有奏籍然思慮不至事或有未便未免重煩聖斷是臣等過也皆再拜上慰諭之王珪㑹要以此事繫之三年十月今不取上又謂旦等曰朕毎有所聞於中書無隐必宣示之而臣僚言事多請不付中書恐貽怨責然或漏露何也王旦曰臣等毎奉徳音或有施行至視事閣中盡屏左右親錄進止授本房吏外無知者或慮舍人草詞筆吏謄本之故當益戒令嚴宻然朝廷命官如轉運使副三司判官之類不出藩郡知州久經事務者外人或能預料十得五六茍能擬議符合則無所逃謗上曰此事不免有之但心存至公亦無所害朕孜孜博訪欲在位盡公致天下人安無他意也乙丑兵部侍郎趙安仁兼宗正卿權判都省改判宗正寺朝廷以陵廟事重司宗者位卑不稱故有是命丙寅詔曰自我京畿逹於淮泗倉庾相望轉輸至多若無増損之欺寧有羨餘之積俾均出納以便公私應装納倉敖之處及在京諸倉監官等並須兩平受納不得侵削所收羨剰不理為勞績但一界幹集别無逋負即依元敕施行先是監百萬倉國子博士夏侯晟等收到出剰乞行酬奨有司以咸平條制凡倉庾所收出剰不為勞績至是申明之晟嶠子戊辰昭徳軍節度使信都安簡王徳彛卒徳彛娶王顯孫既納采而女未歸也上疑其禮以問翰林學士陳彭年彭年曰按禮娶女有吉日而女死壻服齊衰而弔既葬而除之今請女服斬衰於室既葬或攅而除之上然之詔忠彭州彭文綰自今嵗賜錦袍又賜下溪州刺史彭儒猛奨詔以辰州言其捕獲蠻㓂故也己巳賜戎瀘州富順監聖恵方各一部以其地多瘴疫也辛未以監察御史李仲容為右司諫直史館上之親試進士也内出詩賦論題先令考官析其義仲容所對頗詳備上嘉之特命中書召試而有授焉壬申榮王元儼宫火自三鼓至翊日亭午乃止延燒内蔵左蔵庫朝元門崇文院秘閣是日上為信都郡王徳彛制服發哀羣臣進名奉慰不及成禮王旦等請對於内東門之便殿上曰祖宗所積朕不敢妄費一朝殆盡誠可惜也旦等曰陛下富有天下財貨不足憂慮政令賞罰有所不當耳臣等備位宰輔天災如此謹當罷斥竊聞主蔵者收救錢帛諸班軍校皆戮力争前人百其勇上曰朕所憂者惟軍儲耳錢帛所傷不多至於大禮賞給亦可以漸致若軍儲不足須至累民此朕所甚憂也遂下詔罪已令文武百官上封論事無或隐蔽命參知政事丁謂為大内修葺使殿前都指揮使曹璨馬軍指揮使張是入内都知秦翰同管勾修葺公事賜救火諸軍親事官緡錢戊寅以比部員外郎判三司都磨勘司王膺通判道州膺准詔言事辭理荒謬有乖詔意故出之王膺當考五月辛巳朔刑部員外郎兼侍御史知雜事王隨言准詔劾榮王元儼宫遺火事本元儼侍婢韓盗賣金器恐事發遂縱火其知情干連人悉具以聞詔韓氏斷手足令衆三日凌遲處死知情人處斬餘並等第決配先是當死者甚衆王旦獨請對言曰始失火時陛下以罪已詔天下而臣等皆上章待罪今乃過為殺戮恐失前詔意也且火雖有迹寧知非天譴邪上欣然納之由是減死者幾百輩當失火時固已知自榮王宫矣命官勘劾事理當然非因大臣建議也旦所以諫葢慮緣坐者衆或及無辜爾若云不宜罪人則恐失實歐陽修神道碑乃由旦子素遺行錄略加刪潤耳今取參考修入秦翰言内臣端午時服望權住給賜從之壬午安静武信軍節度使榮王元儼奪武信節度使降封端王出居故駙馬都尉石保吉第記室參軍崔昈坐輔導無状亦謫官詔西來輝和爾齎碙砂係禁物並釋其罪以蕃部未知條約故也禁緣邉人收市夏州貢奉使所乘馬癸未詔罷貢舉一年中書門下樞宻院請罷給月俸不許又請罷賜端午時服許之甲申命冦凖知河南府兼西京留守司事乙酉上幸東華祥符左銀臺昇龍等門及朝元殿賜役工緡錢占城國王遣使波輪訶羅帝來貢訶羅帝自言有弟陶珠頃為交州所掠押馴象赴闕今幸得見欲携以還蕃許之仍賜陶珠衣幣装錢辛卯河北轉運使李士衡等言管内諸軍准備支用外有錢四十萬貫紬五千匹絲三千兩布二十萬匹請悉以上供優詔褒之其錢帛令本路貯積勿更輦致壬辰詔於右掖門外創崇文外院别置三館書庫時宫城申嚴火禁甚峻上以羣臣更直寓宿寒沍之月飲食非便乃命翰林學士陳彭年檢唐故事而修復之廢内侍省黄門其髙班内品改為前殿祗候髙班内品癸巳上御崇政殿親慮繫囚死罪情輕者貸之以瀛州圑練使李延渥為右領衞大将軍演州圑練使棣州圑練使陳直為右監門衞将軍誠州圑練使皆久病莅官無状故也詔自宫禁迨臣庶之家一切服玩皆不得以金為飾嚴其科禁自是遂絶王偁東都事畧詔宗室皇親及外廷臣庶之家不得銷金戧金金線之類為衣服用知制誥錢維演獻其父所賜禮賢宅優詔奨之賜維演錢五千萬令均給六房仍各賜宅一區乙未西涼府斯多特遣使來貢詔契丹國信物舊用金為飾者並易以錦繡己亥詔近禁銷金慮北境人至𣙜塲未知條式或賣違禁物與近邉商旅貿易宜令知雄州李允則以意諭北境仍錄所降詔付之庚子放宫人一百八十四人壬寅中書門下請以庫藏燻損匹帛雜物給所請月俸及衣賜五分折支文武百官學士而下相繼拜章以請詔不許章再上乃許之甲辰妖人谷隐黥面配瓊州牢城遇赦不還靳重榮汀州靳有方沙門島仍以詔諭解州民庶自今無得傳習隐術隐先坐罪編管解州因用妖術惑衆重榮師事之有方嘗紿取隐資財甚衆至是付御史鞫劾而謫焉丁未禮儀院詳定自今大禮皇帝位褥依舊例及别敕用紅紫羅外其非時詣宫觀寺院焚香並用黄紬褥羣臣行事齋醮宴設謝恩拜表並用紫紬褥永為定式先是儀鸞司乞改製錦褥上謂三司使林特曰朕内庭未嘗踐錦繡此褥止外庭雜用殊無愛惜自今當詔禮官止用黄紬紫紬褥可也因言儀鸞司什物如道塲中錦繡供具本奉真聖而掌事者輙自取用或至踐履衞紹欽嘗掌儀鸞一夕朕聞外黄門語喧乃私取錦褥為紹欽奪去又衞昭易掌御厨内侍數移換食而昭易執不與雖小事當官執守亦大不易國家一毫之用盡出於民典司者能各惜費乃是薄賦之原也詔江淮兩浙駐泊及廵檢兵士並遣習水者徃以舊兵不習水難使捕冦故也六月己酉朔日有食之詔自今吏部選人有罪犯者銓司未得定入官資叙並具考第及所犯取㫖先是銓司請今後曽經追停人再理考限及格乃得令入錄上曰如是則沉滯者衆矣朕近見一選人淳化中及第二十餘年無公私事故至今未及十考由是而言不宜更加考數因條約之㑹要六月一日事壬子丁謂言修葺大内諸殿畢功癸亥詔弓弩院所造戎器用金飾者以他物代之白波發運判官林濰請自今開浚汴口令有司先事以聞朝廷遣官祭告從之濰特之子也又詔自今汴水汎漲踰七尺五寸即發軍士三千人防守河隄又遣内臣分掌京城門鑰如汴水汎漲防河軍士至彼並即開闗㸃閲放過甲子改乾元門曰正陽門朝元殿曰天安殿日華月華門曰左右太和門又避太宗舊名改含光殿曰㑹慶殿天光門曰大寧門乙丑新授杭州觀察推官朱昌符等四百六十人入謝上顧謂輔臣曰其中才不才未可盡知王旦等曰選衆㧞士十得二三亦為多矣然遭逢盛時登此科級儻才行兼全則亨途何逺因言昌符即台符之弟上曰台符有文學其著述可採甚嗟念之給事中知荆南馬亮言竊見天下庶官職田過為優厚請三二年間權住支給聊助經費臣今嵗所得米麥四百二十餘石已牒本府納官訖詔奨之辛未令諸州以御製七條刻石從䕫州路轉運使陜人臧奎之請也
