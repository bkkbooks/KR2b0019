body:
  text: 續資治通鑑長編巻五百十四宋李燾撰哲宗元符二年八月壬申龍圖閣待制知瀛州盛陶知河南府寳文閣待制知河南府陸師閔知瀛州言者論陶昨在元祐中詆誣先烈恊比權臣排毁舊弼詔陶知和州知和州在初五日今并此七月二日鄒浩言師閔可考朝奉郎提舉措置出賣晉隰州礬事髙昌庸提舉京東河北鹽税要考此二事提舉官係何年月置涇原奏折可適姚古已領兵馬二萬進築㑹州城鹻隈未畢功料令將官雷勝通判原州种建中繼成之布録壬申詔陜西河東保甲雖不經調發並免冬教先降徳音須經調發乃免而近嵗以邊事例皆免放故也布録壬申癸酉宰臣章惇翰林學士承㫖蔡京大理少卿劉賡進呈新修海行勅令格式惇於上前讀所進表畢取勅令格式一帙進讀其間有元豐所無而用元祐勅令修立者上問惇等元祐亦有可取乎惇等對取其是者修立上又問所取元祐條幾何惇等對有數遂進呈新書所取元豐元祐并參詳新立件數上曰可於冊内逐條貼出上又問元祐勅令何人修惇等對蘓頌提舉惇等又讀太學生聼贖上問新條耶舊條耶京對臣等參詳新立盖州縣醫生尚得聼贖太學生亦當許贖又讀祀令致齋條上問新文舊文惇等對皆舊文次進呈格式件數上曰元豐止有賞格元祐都無惇等對曰然惇又言所進看詳册稍多乞止進浄條入内餘付有司上令皆進入紹聖元年九月二十七日章惇安燾提舉右中散大夫都水使者鄭佑知峽州朝奉大夫權提㸃河北東路刑獄李仲權知蘓州朝奉郎北外都水丞李偉通判秦州用元符邸報増入此必縁河事下遷當考九月十六日罷祐等兵部侍郎黄裳言南郊大駕諸旂名物除用典故制號外餘因時事取名伏見近者璽綬元符日垂重象太清道氣呈祥武夷仙鶴迎詔此其顯者臣請制為旂號曰玉璽曰寳符茅山之上日有重輪號曰重輪太上老君眉間發紅光號曰祥光武夷君廟有仙鶴號曰祥鶴詔可環慶路經畧司言定邊城蕃部廵檢趙世良懐安鎮廵檢吹寧擒到逃叛蕃部博裕勒并妻吹瑪寜詔趙世良特轉一官吹寧减三年磨勘仍各賜帛有差涇原走馬奏昨進築兩堡子得㫖與特支今止築一堡未敢喝賜詔以昨進築正是炎熱之際特依已降指揮支給餘一堡子將來進築已秋凉更不喝賜堡子元無例特支也布録癸酉朝請大夫賈青奏望立法將合舉官臣僚毎嵗所舉官分為上下半年奏舉從之樞宻院言梁從政申元豐七年朝㫖親事官教頭揀中親從官依舊赴親事官營充教頭諸營相去多遠徃來作過不便乞别選教頭上曰此誠不便曾布曰雖是元豐七年指揮乃因石得一申請故從之爾上曰此自當改布展紙尾已擬定元豐七年指揮更不施行上曰甚善布因言近嵗姦憸之立朝者多以元豐之法為不可改一有議論及此則指以為異意欲以羅織善類又或挾此以遂其私意近科詔下有司檢近例欲以國子監解額許開封府舉人就試盖士人有且養且耕者私計多不能入太學又他處無户貫即不得應舉衆皆以為未便獨蔡卞堅執元豐七年先期已罷不可改同列自章惇而下議數四終莫能持惇歎曰此豈先帝所為此時正足下及舒亶朱服軰力主此議耳聞者莫不然之既而諫官鄒浩上章極論上亦以元豐已罷拒之盖先入之言也卞自此専政益甚於前日矣甲戌太原府地震詔大河水勢十分北流將河事付轉運司責州縣共力救䕶北流隄岸尋又詔東流所管都大官員廵河物料場使臣選擇差那徃北流向着埽分照管勾當布録甲戌涇原奏苖履已赴㑹州進築吕恵卿奏西人欲於舊界首約囘人馬遂以新定廵綽處鼐旺井諭之尋即聼命布録甲戌丙子章惇等言請將申明刑綂律令事已收載衝改者更不用外勅令事未經去取衝改者合依舊施行及請自二月後至頒降前續降相照添入或尚有未盡及合刪修事件類聚以聞至來年正月一日施行從之淮南路轉運副使李孝廣知同州丁丑朝奉大夫吏部員外郎王祖道為左司諫著作佐郎崇政殿説書周常為起居舍人布論常在元年八月甲辰太常丞陸𫝊為考功員外郎戊寅録故供備庫副使張徳男璉琚女夫劉威王竒並三班借職以徳死事也河東奏朔州同知爭賈胡疃事宜寧息北人自去嵗欲遷東偏頭税埸於賈胡疃徑入久良津買賣朝廷以創改事端令邊吏移文拒之云久例於東偏頭村徃來買賣難議創行改移後數移文至不肯收受又於賈胡疃創建税場屋宇及開石墻越漢界於天澗及黄河取水至以兵仗擁䕶取水人過界射傷廵卒林希日一奏以為北人恐因此生事又云欲以黄河分水為界又云聚兵數千欲據漢界取水朝廷亦令折克行相度應接曾布數論希以為探報皆虛聲建税場破石墻過界取水皆同知者麄暴妄作不足恤希憂恐不已既而果無事仍奏云更不發日奏上亦哂之涇原進築鹻隈畢工賜帥臣以下銀合茶藥詔熈河依界道圖様以十里為一方取見今城寨地名考尋古驛程相去里數畫西蕃圖聞奏是日賢妃劉氏生皇子閏九月二十四日卒己卯以皇子生差官奏告天地宗廟社稷及諸陵詔袁州仰山木平山石塔各賜額仰山曰瑞慶木平山曰㑹慶舊本特詳今從新本熈河蘭岷路經畧使孫路言七月二十五日王贍已收復邈川城按邈川係古湟中之地東北控夏國右廂甘凉一帶西接總噶爾青唐巢穴部族繁庶形勢險要南距河州一百九十餘里東至蘭州二百餘里請建為湟水軍詔路詳累降約束指揮施行舊録云元祐中嘗恐夏人合邈川青唐為邊患至是武功遐暨一舉而盡有其地新録辨曰易曰君子以思患而豫防之元祐中恐夏人合邈川青唐遂為邊患不為過也人主務安邊保民至於用兵盖不得已耳夸大武功非所宜也刪去二十八字先是曾布言王贍纔得邈川一處便乞建軍恐將來乞剏置郡縣不一非朝廷累降約束令於邊防經久簡便可行及不得增廣邊費之意此請未可從章惇力欲從之同列亦皆依違無定論上曰洮州須置州恐亦須有合置州軍處布曰洮州當置州乃臣所論先朝以熈河洮岷為一路今乃方得洮州又先朝以熈河蘭㑹為一路今乃方得㑹州皆所以成先朝之志也蔡卞曰若如此即一般布曰不同若於邈川青唐皆置州郡臣恐未易饋餉孫路嘗告諭西蕃部族云一邱一隴地不要他底今剏置州軍官吏將佐兵馬戍守之費皆須朝廷饋運應副經久未易支梧兼朝廷所少者非土地一向貪荒逺之地但疲敝中國爾先朝剏熈河一路元祐之人皆以為財力不給可棄今乃更於熈河之外剏置州縣豈易供給上曰元祐之人云窮天下之力以奉熈河一路又以為可棄此言皆不當莫不足取惇卞紛然以布為非先朝而是元祐布曰元祐之人以熈河為縻費財力不可經久於時政記中具道其非亦嘗納陛下前陛下必記憶臣今日之論但謂於黄河之外青唐邈川剏置郡縣則為不便非以熈河為非也兼惇嘗言得青唐邈川則如臣之説置一都䕶總領最為稳便今若剏置州郡則自有知州知軍更安用都䕶莫與惇初開陳之語不同否然此皆紛争之語不足煩聖聼臣以為當俟一切撫定河南邈川之後然後據地理𦂳慢畫一措置甚處係最要害合建置州軍甚處係以次合差兵將人馬戍守甚處只令以本處首領心知向漢有力量者守把住坐俟奏到朝廷折􅇆乃可定卞曰適三省論議亦待如此布曰臣愚慮如此亦不曾聞三省議論亦不曾説與三省但適方於陛下前開陳爾衆皆以為當然上亦稱善遂依此降指揮再對布又言臣適及熈河事盖以為先朝措置熈河如此尚不免後人論議今若於青唐多置州軍廣戍守兵馬則未易供饋何以免後人論議臣於措置邊事不敢不為朝廷逺慮故不敢詭随衆人望陛下裁察上頗忻納上始言洮州不可不建州惇遂曰曾布初不肯築㑹州只要築伽羅淺井亦如今日事布曰臣不曾言不築㑹州不知在甚處説有何人見惇曰蔡卞以下俱見上目卞卞曰不記得布曰如此是臣無此語當時經營靈平平夏即有築天都及㑹州之意及鍾𫝊築淺井便議黜逐皆臣首建議何縁有不築㑹州之語惇黙然於是布又言初引章楶作帥是李清臣陛下必記此事上曰記得布曰初命章楶作秦帥楶願就涇原乃是欲經營天都之事臣亦以此丁寧諭楶令次第經營楶既到官是年春遂興此役臣何縁有不築㑹州之語今孫路與王贍争功衆論猶以為非矧在廟堂却欲争占進築㑹州不出他人是出已意此與孫路何異如此豈不取笑中外上極哂之布又嘗對三省言臣向曾論西事欲且畫河為界章惇以臣為雜賃院子裏婦人之言今日又自天都㑹州遂收斂邊事章惇亦稱善昨罵臣時三省所共見衆皆然然布又曰臣得事陛下已五六年前後議論無不可復却不似他人一日説得一般上笑而已布録丁丑事十六日移路河南府庚辰詔今後應國戚命婦人入内如輒敢將帶曾納内中放出及作過經斷宫人入内者並以違制論許諸色人告詔封東嶽天齊仁聖帝長子為祐靈侯第二子為恵靈侯第四子為静鑑太師第五子為宣靈侯以本路言父老相𫝊嶽帝有五子惟第三子後唐封威雄大將軍皇朝封炳靈公其餘諸子並無名爵故有是詔辛巳以皇子生權侍郎已下稱賀徳音降天下死囚流以下釋之太平州司法參軍詳定三司勑令所刪定官陳彦恭授宣義郎新本削福建路轉運提刑提舉司奏舉鮑祗江公望江東轉運提舉司奏舉吕柷耿樞䕫州路轉運提刑提舉司奏舉劉襄李公彦堪備擢用詔並乗𫝊赴闕令閤門引對江公望新定人泉州永春知縣詔今後諸王府并大長公主以下諸宅都監入内勾當使臣三年任滿並不許陳乞再任涇原路經畧司言脩築鹻隈寨畢工詔以定戎寨為名西人謂鹽為鹻謂窪下處為隈有鹽池長十里産紅鹽白鹽如解池可作畦種云布録在乙亥今附此七月二十五日進築八月一日畢工環慶路經畧司進築萌門三岔新城畢工詔以寧羌寨為名賜帥臣以下銀合茶藥四月二十二日七月十八日八月二日河東築河外四寨堡畢工再賜帥臣以下銀合茶藥六月二十六日樞宻院言熈河蘭㑹路收復邈川嘉木卓等城并接納大小首領部族不少其將佐漢蕃士卒暴露甚勞詔軍兵等各特支有差將佐俟經營措置了日具功狀以聞是日苖履言進築㑹州於㑹州川口興功三日孫路移文於巴寜原進築而巴寜原地形險惡枯燥不可建州履不敢從詔孫路候進築㑹州了日取㫖五月二日路乞築巴寜原十六日路改河南府十十日姚雄知㑹州九月一日㑹州畢工時路已替矣可案元符二年五月癸卯孫路言王愍踏逐到巴寜㑹進築詔路審度六月丁亥路言巴寜㑹可以置州已依朝㫖計置材植實據苖履踏逐今苖履又言險惡枯燥不可建州前後不相符又此段俱作巴寜原亦與前異布録與此正同賜收復邈川城軍兵特支布録辛巳乙酉尚書省言熈河路近撫納西蕃一帶部族内邈川河南皆已歸漢詔賜錢一百萬貫計脩葺新收復衝要城寨材料并糧草支用涇原奏鹻隈與打繩川分畫地界事干兩路議論不同乞斷自朝廷詔以打繩川係熈河路合進築處令熈河管認地分進築布録乙酉九月十九日詔免河北被水保甲冬教布録乙酉丙戍戌文閣待制知熈州孫路措置邈川事乖錯移知河南府以寳文閣待制知慶州胡宗囘知熈州九月十二日宗囬初至熈州隴右録孫路以元年八月二十七日自慶州改熈州二年閏九月七日改瀛州始孫路疑王贍狡獪難制其招納邈川贍實將先鋒王愍䇿應盖使愍監贍也贍與愍次羅格隆珠黒城將趨邈川贍忌愍分其功紿曰晨朝食畢而行愍以為然贍乃夜半𫝊發平明入邈川愍徐覺之整陣而行日加午始至則贍已據府庫矣處愍於佛舍而遣蕃將宻下老哈黙布納木宗三城路尋召愍至河州與之同還熈州贍留屯邈川時八月辛未朔也其五日乙亥總噶爾大酋色欽覺克求内附贍遣使臣王詠等將五十騎赴之及愍以贍據府庫事告路路素已不樂贍因是檄贍如河州督糧贍實首議取吐蕃朝廷委信之初復邈川即經營總噶爾青唐而路遽奪其兵權又以愍為都綂領贍為同綂領衆弗謂可而贍亦具訴於朝廷王詠等既入總噶爾諸羌連結為亂白晝攻刼倉庫色欽覺克不能止王詠等登子城樓去其梯以自固馳書告急經畧司勾當公事王厚時在邈川與同總領蕃兵將髙永年謀之永年曰此青唐成敗之機勢不容緩若待安撫還自河州則無及矣安撫謂贍也永年請以千騎徃厚許之永年遂同蕃官李楞占訥芝等如總噶爾李楞占訥芝者李尊之孫總噶爾乃其部人也己卯過星章峡詠等復遣人來趣永年等即日至諸羌為亂者聞之皆踰城遁去收見糧得四萬餘斛因自總噶爾至邈川置流星馬開星章峽路乙酉愍先引麾下兵出星章峽入總噶爾城贍尚駐邈川更與愍交訟朝廷方主贍不直路奪其兵權曰首議者贍也路欲揜其功所以令愍徃邈川招納又令贍悉聼愍指揮既而却擕愍歸熈州留將官馬用誠李忠代愍肆為姦欺故移路守河南而使宗囬帥熈河蘭㑹仍罷愍都綂領章惇初主孫路數與曾布争論既而知路不可主乃言路對人多不語及獨坐乃語如病心狀布即具以白上於是上曰孫路果是失心惇亦毁之上曰路如此須行遣布曰賴轄正溪巴烏相持未决故遷延反覆如此未至敗事不然豈不誤邊計也此據髙汪二録增脩汪云路使愍綂制軍馬而贍副之贍將前軍愍將後軍按初舉兵入青唐贍將先鋒愍策先鋒未始分前後軍也其命愍為都綂制而贍為同綂制乃克邈川後檄贍督糧河州時在八月初五六間髙云初十日路始改命亦恐誤汪云胡宗囬至熈州即以都綂制還贍汪又誤按髙云宗囬至熈州乃九月十二日而愍受朝㫖罷都綂制實八月二十一日盖朝廷既移路守河南相繼即還贍都綂制不待宗囬至熈州矣今參取其合者曾布日録丙戍同呈王贍申經畧司勾追河州總噶爾首領方乞歸漢已遣使臣部五十餘騎徃㨿總噶爾而經畧不肯應副兵馬恐溪巴烏旦夕入青唐遂得㫖孫路知西京胡宗囬帥熈河髙遵恵帥環慶青入唐既亂溪巴烏入錫勒噶爾王贍首經營招納遂渡河邈川城孫路欲掩其功乃令王愍申云經畧司指授令前去邈川招納仍令王贍一聼王愍指揮既而却擕王愍歸熈州今又以將官馬用誠李忠招納邈川部族遣王贍歸河州撥發糧草盖欲歸功經畧司而逐贍使不得與事朝廷察其為姦欺累降㫖令専委王贍經畫詔㫖未到間路前後指揮不一乖錯日甚一日章惇初主之數與布争論既而理屈乃云章縡曾言孫路對人多不語及獨坐即自語言如病心狀布對三省亦嘗以此語奏知是日上云孫路果是失心惇亦力毁短之再對上又云孫路如此須行遣布云賴轄正溪巴烏相持未决故遷延反覆如此未至敗事不然豈不誤邊計孫路墓誌云時青唐部族自相殘戮巨酋畢斯布結以河南來歸路遣兵迎取之而邈川之酋率衆内附於是焚星川章棧道絶青唐之援斷納木宗險要遏夏冦之路而邈地數百里衆數萬人皆為我有朝廷賜名為湟州自此青唐單弱轄正遂舉土以降衆論謂宜厚予金繒以嘉其來路曰羌部亂離去危就安理之常也當以中國威福撫諭之使復其故居而已耳昔漢武帝納渾邪王十萬之衆可以為戒衆又謂尚有隆賛未出可據青唐為展綏定計路曰亦非也當據總噶爾城招來大酋森摩乾等數輩則隆賛自出而青唐定矣衆皆歎服其䇿事方經始移守西洛邈川降在七月二十五日丙寅以邈川為湟州在閏九月四日癸酉路移河南乃八月十六日丙戌也户部侍郎髙遵恵為寳文閣待制知慶州代胡宗囬也丙戍日事翌日詔宗囬進築環慶路城寨畢又加寳文閣直學士丁亥日事始蔡卞言髙遵恵以元祐中言事可采召還户部未幾又補外朝廷雖以擇帥故不得已令去外議但云遵恵以攻賈種民忤執政故逐去上曰别有何人可差章惇曰亦曾商量無可帥者曾布曰若稍加旌寵足以解衆疑亦與三省議但改龍圖閣待制黄履曰只要是待制上曰與寳文閣直學士蔡卞曰甚好上曰與龍圖閣直學士亦不妨衆皆以為好布因言遵惠進職則胡宗囬不可不除職宗囬築五城寨昨復待制只速得兩月上顧衆執政曰合與否衆黙然惟惇與許將曰當推恩遂除寳文閣直學士此據布録丁亥所書進職實録具之丁亥詔修復㑹州就差四方館使秦州刺史知鎮戎軍姚雄知㑹州兼管勾㳂邊安撫使充熈河蘭㑹路兵馬都監五月乙卯初詔經營九月庚子朔畢工東上閤門使威州刺史知徳順軍姚古權管勾鎮戎軍兼管勾涇原路㳂邊安撫司公事兼第五將其㑹州合置通判職官曹官都監監押廵檢等並依西安州例施行除㑹州通判堂除外其餘員闕令經畧司一面選差官權管勾詔王贍招撫到西蕃部族不少及已收復邈川城特與復禮賔使權知河州管勾洮西㳂邊安撫司公事又詔西安州靈平寨妙娥山湫神以靈祐廟為額戊子監察御史兼權殿中侍御史石豫言竊聞闞村水漲其勢不至湍悍若加救䕶可無决溢之患而有司坐視不救意謂上流决溢則下流减殺盖河口易以閉塞僥倖逃責以致今日全河北流渰浸人户田苖成此大患望根究詣實重行朝典以誡欺罔詔王祖道體究以聞舊録云監察御史石豫言聞闞村水漲不甚湍悍尚可救䕶而有司坐視意謂上流决溢則下流减殺盖河口易以閉塞僥倖逃責至於今日大河北流浸民田廬望根究黜責以誠欺罔詔王祖道體究以聞河順下北流先帝已降詔㫖而豫以為欺罔誤也新録辨云大河流溢非細㣲可隠之事既按視之必得其實若果如豫言浸民田廬則黜責有司以戒欺罔宜矣今不論事之虛實而即以豫言為誤盖私意也令刪去十九字鮮于綽𫝊信記論北流事附紹聖元年三月二十二日可考樞宻院言近降朝㫖令孫路苖履相度㑹州依蘭州金城闗例跨河為浮梁修置闗城今㑹州進築甫畢慮事力未及詔經畧司指揮苖履如委是未曾修建闗城即疾速權暫繫橋於黄河外擇地修築􅇏臺及廵綽所至之處明立界堠包占合修闗地基在内二十四日詔諸上殿進呈文書並批送三省樞宻院不得直批聖㫖送諸處違者承受官司繳進以聞是日青唐大酋森摩乾展及董戩妻契丹公主鄂特凌古妻夏國偽公主輝和爾偽公主等遣酋長李阿旺以下六人賫寳玉至總噶爾城通欵王愍諭以朝廷招撫之意及賜袍帶等物即日遣還十八日戊子青唐主轄正既為乾展等逼逐移居青唐新城棄其印於舊城而去先有蕃字來乞補漢官尋與妻子削髪為僧尼入城西佛舍時七月庚午也盖蕃俗為僧尼者例不殺轄正但欲逃死耳此亦參取汪髙二録增修詔安州雲夣縣楚令尹子文祠封崇徳侯己丑宣政使萊州防禦使内侍押班呉靖方為内侍右班副都知後數日上謂曾布曰靖方久在前省合與遷後省仍曰先帝曾任使布曰先朝與梁從政同列在前省誠已嵗久上又曰毎語及先帝即流涕被面布曰此衆所共知乃出於至誠也上曰待批出與後省遂除入内副都知入内副都知在乙未二十五日除割安西城以北六寨𨽻㑹州布録乙亥鄜延奏繳宥州牒本云人使未見赴闕已是疑阻又諸路修築城寨擄掠人口未已請止絶答以諸路進築係西夏作過已來先得朝㫖本路難議移文止絶人使已於二日赴闕候到朝廷必有處分布録己丑苖履奏熈河硬探人殺星多實鐘斬首不及為西人奪去但得其所乗驄馬及器甲等實鐘乃貝中弟挺身出戰衆殺之章楶奏乞致仕詔候來春取㫖辛卯熈河蘭㑹路經畧使孫路言近總噶爾大首領等獻納本城已指揮王贍差使臣一兩員并蕃官李楞占訥芝同共將帶合用蕃漢人馬前去守把又據蕃官李楞占訥芝稱青唐森摩乾展青珪倫正結等將文字來請心白旗頭巾歸漢今來青唐部族離亂人心不定若差人馬來青唐首首即便出漢已差都鈐轄王愍綂領熈河岷州漢蕃將兵赴總噶爾城應接招納詔熈河蘭㑹路經畧司如王贍在總噶爾城即令王愍在邈川已來照應若王贍已入青唐須王愍附近應援即指揮徃總噶爾城又言李楞占訥芝遣人將文字稱青唐遣人前去迎轄揚烏前來青唐為主今聞青唐已亂遣去人未敢囬歸又縁轄正已遷在青唐外城萬一轄揚烏乗虛領衆徑入青唐其勢方盛未必肯歸漢既未歸漢即河北總噶爾一帶部族勢必須歸轄揚烏灼然之理無可疑者轄揚烏初領衆來邈川住坐本望漢家與之為主借助聲勢平復嘉勒氏故土今已失望雖通歸漢之意心懐疑貳未必有决然出漢之期方在疲困兵勢未盛之時宜速處置不可少緩亦未見招納次第觀今青唐事勢已是離貳轄正决須歸漢若更添差人馬應接前去總噶爾張耀聲勢大事必集詔熈河蘭㑹路經畧司指揮王贍且在邈川總噶爾青唐城已來招納未出漢部族及具措置事件申經畧司相度施行事畢如可以歸河州即禀經畧司措置經畧司奏所稱轄揚烏即溪巴烏次子隆賛時朝廷已有詔罷王愍都綂制而愍未受詔也青唐録載二事並依實録但稍刪潤其文耳然實録並在二十一日青唐録乃云八月十九日不知何故河東路經畧安撫都總管司言麟府嵐石路進築大和谷彌勒川星隆嶺奎蘓嶺寨瑪克宻年小紅崖精愛格葉嶺堡並已畢工詔大和谷賜名大和寨彌勒川賜名彌川寨星隆嶺賜名通秦寨奎蘓嶺賜名寧河寨瑪克密年賜名大和堡小紅崖賜名彌川堡精愛堡賜名通秦堡格葉嶺賜名寧河堡添置第十三將令管勾通秦寧河彌川寨至接連麟府地分第九將管勾葭蘆吳堡神泉烏龍寨至接連鄜延路地分其第九將舊在烏龍寨駐劄移於葭蘆寨副將在神泉寨駐劄移於烏龍寨新置第十三將差莊宅副使張世宗於寧河寨駐劄副將差降授供備庫副使凖備將領李偀於彌川寨駐劄所建三寨戍守兵馬於麟府路軍馬司保徳軍及烏龍神泉葭蘆吳堡㳂河津寨勾抽攅那上畨及駐泊兵馬赴諸處戍守并弓箭手等並𨽻第十三將訓練所有第三副將舊在神木寨駐劄今本寨已係近裏移於大和寨其第九將部隊依舊𨽻本將外部將供備庫副使賈逵供奉官閻浩隊將苖昌借職髙俊軍將郭惟忠改𨽻第十三將第九將以七千人第十三將以六千人為額令都總管司以本路漢蕃近便兵馬充如不足量合要戍守人馬數目於駐泊軍馬内差填又詔以大和寨𨽻麟府路以通秦彌川寧河三寨𨽻嵐石路以通秦堡𨽻通秦寨寧河堡𨽻寧河寨彌川堡𨽻彌川寨大和堡𨽻大和寨其逐堡使臣請給人馬糧食草料並於所管寨支請所有將官寨主監押部隊將并把截廵檢任滿酬奬並依神泉烏龍寨三交堡已得指揮施行令河裏堡寨並廢守禦其舊來合差逐州弓箭手捉生蕃兵守把去處各已廢罷别無差使所有上件人馬分作三畨其嵐州所管弓箭手等輪差於第十三將上畨分擘於彌川寧河二寨其石州所管弓箭手等輪差於第九將上畨分擘於通秦神泉烏龍寨自河東路至賜寧河堡可用舊本自以大和寨堡至烏龍寨可用新本今并列於此新録河東路經畧司言麟府嵐石路進築大和谷等四寨瑪河克密年等四寨並已畢工詔賜寨名大和彌川通秦寧四堡各附寨為名以大和寨堡𨽻麟府路通秦彌川寧河寨堡𨽻嵐石路添置第十三將令管勾通秦寧河彌川寨至麟府地分差莊宅副使張世宗為第十三將於寧河寨駐劄降授供備庫副使李偀為副將於彌川寨駐劄以第九將勾當葭蘆吳堡神泉烏龍寨至鄜延地分其第九將移葭蘆寨駐劄副將烏龍寨駐劄第三副將移大和寨駐劄第九將以七千人第十三將以六千人為額以本路漢蕃兵馬充如不足於駐泊兵馬内差填其河裏堡寨舊來合差逐州弓箭手捉生蕃兵守把處各已廢罷可分此人馬作三畨嵐州所管弓箭手等輪赴彌川寧河二寨石州所管弓箭手管輪赴通秦神泉烏龍寨林希𫝊云希至踰月經盡石之神泉麟之銀城通道兩間而出敵境選將士分行相視且遣其屬㑹麟府嵐石軍馬於境外圖其地凡二百十四里以聞合兩路之師凡十萬進築十有三日而八城畢哲宗覽奏奬其神速以諸路進築雖多未有城八壘於旬日之間者也此傳頗夸希盖因孫覽所經畫乃能速成也畢仲游誌覽墓可考希𫝊詳見二十五日大觀元年四月折克行𫝊云時詔河東進築八寨通道鄜延帥遣秦希甫至議築先後克行請以兩路兵同時深入先築逺者出賊不意囬兵治近則固已在吾腹中矣希甫曰由近及逺進築法也克行曰不然事有竒正今八城已定乗士氣之鋭利在神速若徐圖之士氣怠矣希甫執不可克行并上二議帥用克行䇿卒城之八寨成諜言賊至諸將皆戒嚴克行請解嚴衆曰邊訊甚急克行曰彼自擾耳已而果然此事當考詳增入吕恵卿奏乞許西人依例遣使遺進及行弔祭令奏聼朝㫖布録二十一日辛卯二十五日乙未許收接廣西經畧司言宜州溪峒申有安化蠻人約三千餘人攻圍徳謹寨與官兵鬬敵敗散歸峒斫到賊頭七級已差權知宜州鈐轄雍斌等領兵馬前去照應詔經畧司嚴切指揮宜州溪峒并差兵將及城寨官等體探蠻賊結集次第虛實過作隄備如蠻人再來作過即整兵乗機掩殺壬辰以皇子生宴羣臣於集英殿王愍駐總噶爾城孫路數移檄促愍入青唐愍與諸將欲以輕兵入之髙永年曰青唐自廢其主必有姦雄得衆心者今雖通欵其衆未必悉從須重兵以臨之厚賂以結之恩威並行乃可也不然事必不濟永年又説愍曰王贍始未經營今不預行恐致後悔愍納其説是日愍被㫖罷都綂領未行大酋青珪倫正結等四十九人來降翌日癸巳轄正挈其子及親信數十人趨總噶爾愍出城受其降翌日遂以轄正如邈川初轄正既舉家削髪為浮屠以紓死尚聞綽爾結等謀迎立溪巴烏恐難未已又知官軍已入總噶爾地近故跳奔後九日王贍自邈川歸轄正于熈州二十二日王愍受詔罷都綂領還河州癸巳左朝議大夫寳文閣待制知潁州章衡卒甲午樞宻院言河東路經畧使司林希奏稱先帝元豐中於鄜延路進築米脂葭蘆吳堡三寨以葭蘆吳堡𨽻河東路自是嵐石之人始戍河西然賊境在目欲出不可宻睇麟府猶迂十舍自前年復葭蘆去年築神泉今年築烏龍通接鄜延稍相屏蔽今又北自銀城南自神泉幅員數百里間樓櫓相望鷄犬相聞横山之腴盡復漢土斥堠所及深入不毛秦晉士馬更為聲援自此嵐石遂為次邊麟府不為孤絶實自先帝經始葭蘆以為今日通道之根本望建葭蘆為軍賜羙名以彰元豐之聖烈詔葭蘆寨特建為晉寧軍九月十四日分路九月二十五日添兵曾布日録云同呈熈河王贍等奏事宜又呈孫路奏前後招到西蕃大小首領蕃僧等三千餘人又河東奏乞建葭蘆為軍詔以葭蘆寨為晉寧軍以知軍為嵐石路㳂邊安撫使兼嵐石隰州都廵檢使石州知州更不兼都廵檢知軍以下聼經畧司奏舉一次置通判職官都監曹官主簿共六員所省廢㳂河津寨官十八員今晉寧并八堡寨置官十九員所増者知軍一員而已嵐州减通判職官各一員故除大和寨堡𨽻麟府路餘六堡寨并神泉烏龍吳堡皆𨽻於晉寧孫路奏前後招到西蕃大小首領蕃僧等三千餘人布録甲午苖履奏㑹州城去河三百餘歩矢石不及不可繫橋又河中有灘磧自中灘至河北岸五里懸崖陡岸無可置闗處布録甲午十七日此案此奏已見七月戊辰注處􅃨出乙未端明殿學士中大夫河東路經畧安撫使知太原府林希為太中大夫資政殿學士以進築大和等八堡寨畢工也孫覽以四月二十五日罷太原林希正月二十一日實先自杭州除端明徃代之朝奉大夫提舉崇禧觀孫覧為寳文閣待制知光州以前知太原進築烏龍神泉寨畢工也布録是日以諸路進築了當吕惠卿移鎮林希改資政仍遷太中大夫孫覽復寳制與小郡上云覽只恐人言未已初欲與轉官既而令與復職恵卿移鎮在丙申林希𫝊除端明殿學士知太原府奏河東新邊募弓箭手乞専置提舉官以董訓之希内取僚吏外分遣將佐事無巨細皆親裁决文書夜下皆切中事機合兩路之師凡十萬進築十有三日而八城畢希奏曰臣所築四寨四堡地形險固綿亘三百餘里控制賊馬路四十餘處其西即沙磧地而本路包占横山已盡前此葭蘆祗麟府徃返渡河動輒旬日今徑其外一有追呼晝夜可至又直接鄜延聲援相應河外邊面始得通完乞賜立堡寨名以壯邊圉哲宗覽奏奬其神速以諸路進築雖多未有城八壘於旬日之間者也進資政殿學士太中大夫各堡寨賜名大和彌川寧河通秦云希復奏建葭蘆為晉寧軍悉以八堡寨𨽻焉於是省並河堡寨置津渡越河為梁以徙戍兵又奏新邊地置營田司募兵民以耕朝廷遣較邊實嵗得粟十餘萬石鄜延奏宥州牒西夏欲以國母亡遣使遺進吕恵卿言西人恭順不虛乞與收接表狀及行弔祭之禮詔令受宥州牒諭以候奏得朝㫖牒報布録二十五日乙未二十一日辛卯初令聼㫖詔熈河速相度築打繩川布録乙未内侍副都知吳靖方為入内副都知孫覿云呉靖方三朝随龍徽宗踐阼止帯左藏庫副使與前省押班當考是日樞宻院再對上謂曾布曰中書舍人闕殊未有可除者布曰以次補則起居郎舍人皆當遷上曰周常近方除孫傑如何人布曰職事亦頗振舉但未知文采如何耳上曰論賈種民事亦皆當布曰髙遵恵論種民事亦當上曰遵恵又補外布曰臣初欲引為都承㫖如遵恵詳熟曉事豈易得上曰誰可帥者布曰實難得人孫覽始復職又未可便擢上曰且候布又曰詞臣尤難得人如前日龍喜宴朝廷慶事樂詞無一堪者不足以稱揚朝廷慶喜之意上曰殊無可道文字極少只數句爾布曰只如皇子慶誕降一徳音乃與四方同慶詔語亦殊不足稱副盛事上大笑極以為然因言蔣之竒如何布曰之竒文字雖繁然却有可道亦時有好語非蔡京可比上曰蔡京誠不可比之竒布曰何以逃聖鑒因言文學之士雖為難得然以天下之大文物鼎盛之時豈可謂無人但以執政好惡人材隔塞者多如陳瓘輩文采作舍人有餘然執政不肯用陛下向排衆論擢葉濤沈銖等莫不稱職今如濤輩未見其人上曰郎官中有能文者否布曰三省所稱但如葉棣輩爾上曰鄧棐如何布曰臣不識之亦不知文采如何只如昨舍人闕三省用劉拯權及制詞出取笑中外上又問劉逵如何布曰亦不知逵有文采否然如逵人物亦恐可進擢陛下以中外闕官為念誠今日急務只如陜西河東河北三路皆闕提刑陜西止有孫賁一員又已體量到三路皆冬教保甲之處豈可全闕又如淮南兩轉運使俱罷亦不除人如此諸路豈不闕事望更留聖慮上再三然之孫賁體量到在閏九月三日丙申保寧軍節度使鄜延路經畧安撫使兼知延安府吕恵卿特授檢校司空武勝軍節度使加食邑實封以進築暖泉寨金湯城畢工也故入内押班贈昭化軍留後劉惟簡特贈節度使以随龍恩也此㨿布録惟簡卒在紹聖三年三月二十八日環慶奏張誠以下冒賞詔將佐及蕃官與免降資借職以下依熈秦冒賞人例以殿侍軍將効用等名目降資布録丙申丁酉詔宗女夫亡服闋歸宫改嫁者聼樞宻院言王贍等申招納青唐王子轄正并大首領旦夕出漢乞降招納推恩支賜詔轄正與舊官仍依初除并遣使例支賜對衣金帶銀器紬絹其溪巴烏與轄正一等推恩第一等謂如森摩乾展結斡磋之類與正任刺史銀絹錢各三千第二等與諸司使帶遥郡刺史銀錢絹各二千第三等諸司副使銀絹錢各一千第四等與内殿崇班銀絹錢各五百第五等與左侍禁銀絹錢各二百並賜錦袍刺史與金帶諸司使已下與鍍金帶一條如有帶到弟姪兒孫及手下勾當人亦當比類官職安排小首領已下並令經畧司斟酌事力相度比類於軍主已下至副使兵馬使職名安排該説未盡奏聼朝㫖比類推恩新本刪修云樞宻院言王贍等申招納青唐王子轄正等并大首領旦夕歸漢乞降招納恩賜詔轄正與舊官仍賜對衣金帶銀器紬絹溪巴烏與轄正一等推恩第一等如森摩乾展結斡磋之類與正任刺史次與遥郡刺史至左侍禁各賜金帛袍帶有差餘人該説未盡並令經畧司奏聼朝㫖比類推恩轄正既來降綽爾結更説森摩乾展等與契丹夏國公主以騎二百迎立溪巴烏次子隆賛為國主河南大酋濟實术將百騎身送之戊戍入青唐始綽爾結謀奉杓賛而逐轄正不克遂怵王贍以經營吐蕃轄正卒被乾展等廹逐綽爾結自謂已志得行遂不欲屬漢故復奉隆賛青唐録云八月二十八日森摩乾展與契丹夏國公主以騎三百迎溪巴烏入青唐立其子隆賛為國主夏人亦引五千餘騎攻斯桂鼎南宗堡王贍以蕃兵擊走之詔苖履康謂李澄選兵馬同王贍入取青唐曾布云云事具九月八日布録丁酉同呈王厚申轄正森摩乾展等皆有歸漢之意得王愍王贍兵馬早列則青唐旦夕可定乞降招納例物而王贍十五日奏云已到邈川而王愍人先馳五十騎徃總噶爾城云愍與西蕃人情不熟萬一情未順不可退縮乞詳酌指揮又云轄正森摩乾展等昨累遣人欲歸漢既而孫路令贍歸河州却聞森摩乾展與契丹夏國公主已遣馬二疋一載虎皮錦袍綵服一載閙裝鞍轡徃迎溪巴烏隆賛父子入青唐人心已是中變見招納次孫路又奏乞錦襖子二千領銀帶一千交椅凉傘二百詔令户部如數製造差使臣押送經畧司并指揮王愍依十九日指揮就近照應王贍不得違越誤事又令以賞格招納轄正等轄正與舊官溪巴烏與轄正一等推恩森摩乾展等與正任刺史賜銀絹錢各三千餘以次與遥郡諸司使副崇班侍禁等賜金帛亦有差是日夏人五千餘騎入宼斯桂鼎南宗堡王贍擊走之九月十五日奏到副是月當遣北使九月辛酉布錄云曹評生辰使李希道正旦副使十月丁巳希道死致和八年正月韓彦粹𫝊可考或是絽聖三年四年元符元年更詳之是月舒州言揚州制勘所牒前發運使吕温卿願徃舒州居住聼勅癸酉到州翌日卒此據邸報增入温卿凶人特存之
