body:
  text: 續資治通鑑長編巻一百四十七宋李燾撰仁宗慶厯四年三月乙丑以殿中侍御史㑹稽王絲為荆湖南路體量安撫提舉捉賊代張庚也諫官歐陽修言臣伏見近出内庫金帛賜陜西以救饑民風聞江淮以南今春大旱至有井泉枯竭牛畜瘴死雞犬不存之處九農失業民庶嗷嗷然未聞朝廷有所存䘏陛下至仁至聖憂民愛物之心靡所不至但患逺方疾苦未達天聰茍有所聞必湏㽞意下民疾苦臣職當言昨江淮之間去年王倫蹂踐之後人户不安生業倫賊纔滅瘡痍未復而繼以飛蝗自秋至春三時亢旱今東作已動而雨澤未霑此月不雨則終嵗無望加又近年以來省司屢於南方歛率錢貨而轉運使等多方刻剥以貢羡餘江淮之民上被天災下苦盗賊内應省司之重歛外遭轉運之誅求比於他方被苦尤甚今若不加存䘏将來繼以凶荒則飢民之與疲怨者相呼而起其患害不比王倫等偶然狂叛之賊也臣謂民怨已久民疲可哀因其困時宜速施恵不惟消弭盗賊之患兼可以恱其疲怨之心伏望聖慈特遣一二使臣分詣江淮名山祈禱雨澤仍下轉運司并州縣各令具逐處亢旱次第奏聞及一面多方擘畫賑濟窮民無至失時以生後患丙寅遣内侍詣两浙江淮祠廟祈雨丁邜金部員外郎天章閣侍講楊安國為直龍圖閣賜三品服宗正丞崇文院檢討崇政殿說書趙師民為天章閣侍講賜五品服初上謂輔臣曰安國師民久侍經筵其行義淳質乃先朝崔遵度之比因以褒擢之己巳職方員外郎同判登聞皷院張堯佐提㸃開封府諸縣鎮公事諫官余靖言外議皆云堯佐識見淺近依託後宫嬪嬙之勢已得内降指揮改賜章服又從内批與省府差遣大臣依違不能堅執遂與府界提㸃伏惟陛下近嵗以來每事思治損節淫貨放減後宫絶斜封之官無私謁之寵此皆日來親行至羙之事安得更使外議籍籍如此臣深為陛下惜之大凡嬪御親姻但多與財帛足表恩意如堯佐進士出身自當隨其才望與之差遣何必躐等以騰物議府界提㸃比省府判官固是降等然吕公弼前亦辭三司判官就此差遣未及半年早已遷陟議者不論其才但云故相之子所以進用太速将來堯佐若循此例升進外議亦必謂斜封私謁之類竊恐上累聖徳若陛下必欲愛之不若與有職田一近郡足以表陛下屈已從公之徳於堯佐資叙亦無所損也又言堯佐修媛之世父進用不冝太遽頃者郭后之禍起於楊尚不可不監上曰朕豈以女謁進人盖因臣僚論薦而後用爾如物議不允當更授一郡耳上雖有此言堯佐竟不出明年閏五月除户判詔嘗經戰沒及為盗所殺其子孫補班行而年㓜者並給以俸辛未省廣濟河催綱朝臣一員仍減嵗漕軍儲二十萬石壬申詔國家設廵檢縣尉以佐郡邑制姦盗也朕每念其勤勞而俸入未優可以責其盡力乎自今巡檢縣尉月俸並特給見錢更不折支癸酉祠部郎中集賢校理錢仙芝貸命決配沙門島坐知秀州受枉法贓罪當死特貸之前兩浙轉運使王琪降知婺州兩浙轉運使邵飾降知洪州並坐按發仙芝在諫官奏劾之後也琪飾降官在五月庚午今并書甲戌命鹽鐡副使户部員外郎魚周詢宫苑使周惟徳往陜西同都轉運使程戡相度鑄錢及修水洛城利害以聞先是韓琦以修水洛城為不便奏罷之鄭戩固請終役琦還自陜西即罷戩四路都部署戩既改知永興又極言城水洛之便役不可罷命劉滬董士廉督役如故知渭州尹洙及涇原副都部署狄青相繼論列以為修城有害無利議者紛紛不決故遣周詢等行視戩初命涇原都監許遷将兵為修城之援及戩罷統四路洙亟召遷還又檄滬士廉罷役且召滬士廉蕃部皆遮止滬士㢘等請自備財力修城滬士亷亦以屬户既集官物無所付又恐違蕃部意别生變日增版趣役洙再召之不從洙亟命瓦亭寨都監張忠往代滬又不受洙怒命青領兵廵邉追滬士亷欲以違節度斬之青械二人送徳順軍獄時周詢等猶未至也蕃部遂驚擾争收積聚殺吏民為亂又詣周詢等訴周詢具奏詔釋滬士㢘令卒城之據尹洙乞與鄭戩下獄狀劉滬董士㢘先送徳順軍獄後有㫖送邠州獄又覆奏李京劄子狀董士㢘繫獄二十餘日但不知是何月日耳參知政事范仲淹言涇原路走馬承受趙正奏内殿崇班劉滬著作佐郎董士㢘被狄青枷送司理院次切縁此二人元禀四路都部署節制往修水洛城即非是二人擅興及四路罷後本路部署司抽下軍馬其人即合依禀罷修不合堅執拒抗臣料其情盖本人在彼相殺得功降下周回蕃部又已下手修築城寨懼見中輟之後本路責見其經畫不當故以死拒抗一面興修意望成功亦求免罪始末可見非有他意況劉滬是沿邊有名将佐􅇰有戰功國家且湏愛惜不可輕棄恐狄青因怒輙行軍法則邊上将佐必皆銜寃謂國家負此有勞之臣人人解體誰肯竭力邊事其董士亷是朝廷京官即非将佐亦将一例枷勘盖狄青麤人未知朝廷事理萬一二人被戮逐家骨肉必來訴于闕下亦更多有臣僚上言紊煩聖聽雖知将帥行得軍法即非用兵進退之際有違節制自是因争利害致犯帥威昔陳湯矯􅇉命以破敵王濬違節制以下呉皆釋罪封侯以勸将列伏望聖慈特遣中使乗驛往彼委魚周詢周惟徳􅂑勘劉滬所犯因依情罪聞奏仍送邠州拘管聽候朝㫖一則惜得二人不至因公被戮二則惜得狄青尹洙免被二家骨肉稱寃致訟倘允臣所奏事可兩全彰陛下保庇邉将之恩使武臣效死以報聖徳賜荆湖南路捕擊山猺軍士緡錢仍遣内侍齎手詔體量捉殺次第以聞諫官歐陽修言臣風聞湖南蠻賊近日漸熾殺戮官吏鋒不可當新差楊畋銳於討擊與郭輔之異議不肯招降又王絲去時朝廷亦别無處分慮絲到彼與畋同謀盖蠻賊止可招携卒難剪撲而畋等急於展效恐失事機今深入而攻則山林險惡巢穴深逺議者皆知其不可若以兵外守待其出而擊之則又未見其利盖以蠻所在依山在衡永道州桂陽監之間四面皆可出冦若官兵守於東則彼出於西若官兵守於南則彼出於北四面盡守則用兵太多分兵而邀之則兵寡易敗此進退未有可擊之便也今正蠻已為鄧和尚黄捉鬼兄弟所誘其餘山民莫猺之類亦皆自起而為盗竊聞常寜一縣殆無平民大小之盗一二百夥推其致此之因莫猺之俗衣服言語一類正蠻黄鄧初起之時捕賊官吏急於討擊逢蠻便殺屢殺平人遂致莫猺驚惶以此言之則本無為盗之心固有可招之理然欲諸盗肯降必湏先得黄鄧昨邵飾等邵飾先為湖南憲慶歴三年四月遷兩浙漕不知飾殺黄捉鬼果是何時去年九月因桂陽監奏蠻猺作過已畧載其事當是三年四月以前捉鬼被殺也按余靖五月疏云知衡州陳執方殺捉鬼修乃云邵飾等修既云邵飾等則陳執方在其間矣初招黄捉鬼之時失於恩信致彼驚逃尋捕獲之斷其脚筋因而致死今鄧和尚等若指前事為戒計其必未肯降如云且招終恐難得必湏示以恩信之事推以感動之恩若得黄鄧先降其餘指揮可定今深入而攻既不可待其出而擊之又不可且殺且招又不可以臣思之莫若罷兵曲赦示信推恩庶㡬招之可使聽命臣亦廣詢南方來者云我若推信彼不難招鄧和尚等大則希一班行其次不過殿侍足矣正蠻版者得一團主之名亦足矣莫猺之類使安耕織而嵗輸皮粟得為平民乃彼大幸今若撃之不已則其為害愈深況漸近夏暑南方瘴濕士卒不習水土湏慮死傷仍恐廹之太急則潭郴全邵諸寨向化之蠻皆誘脅而起則湖南一路可為國家之憂臣欲乞速令兩府大臣深究招殺之利害共思長筞決定廟謀若遷延後時致彼猖熾不幸官吏頻遭殺害則朝廷之體難為屈法而招彼以其罪既多必恐不能自信則兵久不解害未有涯伏望聖明斷之在早脩又言臣風聞楊畋近與蠻賊鬬敵殺得七八十人首級仍聞入彼巢穴奪其糧儲挫賊之鋒增我士氣畋之勇略固亦可嘉然朝廷謀慮事機宜思久逺竊恐上下之心急於平賊聞此小㨗便謂兵勝不能鎮静外示輕脫其間二事尤合深思一曰不待成功便行厚賞二曰謂其可殺更不肯招茍如此則計之大失而事之深害也今湖南捕賊者殺一人頭賞錢十千官軍利賞見平人盡殺平人驚懼盡起為盗除鄧和尚李花脚等數大頭項外其餘隨大小成夥者不可勝數今畋所擊止一洞所聚已二千餘人於二千人中殺七八十人是二十分之一其餘時暫鳥散必湏復集臣見自古蠻蜑為害者不聞盡殺湏是招降昨縁邵飾等失信於黄捉鬼遂恐更難招誘今若因畋小勝示以恩威正是天與招服之時機不可失若令畋自作意度招􅂑大頭項者因􅂑小勝𫝊布㨗聲其餘諸處結集者分行招誘藉此聲勢必可盡降旬日之間湖南定矣若失此時漸向夏熱以我病暑之兵當彼慣習水土之賊小有敗衂則彼勢復堅不惟為害湖南必慮自此貽朝廷憂患今於未了之間便行厚賞則諸䖏廵檢捕賊官等見畋獲賞争殺平人而畋等自恃因戰得功堅執不招之議朝廷亦恃畋小勝更無招輯之心上下失謀必成大患其楊畋等伏乞且降敕書奨諭授與事冝俟彼招安便行厚賞今湖南賊數雖多然首惡與本賊絶少其餘盡是枉遭殺戮逼脅為盗之徒在於人情豈忍盡殺惟能全活人命多者則其功更大仍乞明說此意諭與楊畋其賞典宜少遲㽞庶合事體余靖言訪聞荆湖南路州軍以羣盗之故去山二十里禁民不得耕種即不知出自何人指揮此乃驅民為盗耳竊以中民以下素無蓄積朝夕之費盡出耕桑一嵗不耕飢寒並至今賊既焚燒其廬舎劫掠其資榖官又禁其耕種蕩然無所歸矣欲不為盗不可得也且衡郴道永相去僅千里皆山也賊之初起往來山中百人耳自官吏舉兵驅逐而近山之民皆殺之其不殺而幸存者又禁其耕千里之民皆失其業若不歸賊将何所歸故半年之中聚至三四千是知欲擒賊而遂驅民為賊者也伏乞特降指揮切責湖南監司帥臣并諸州長吏疾速出牓告諭人户並令依舊任便耕種其先曽窩盤賊人及驅率在賊中者亦令招輯倍加安撫其先降宣命招收賊徒自依前來指揮又言訪聞湖南初以錢絹購斬蠻賊首級軍人利於厚賞道上逢人即以為賊而殺之至有頭插標識以免官軍之害者由是標識者賊人殺之無標識者則官軍殺之其中等以上民猶能携家屬入城郭以避害中民以下入城則食盡故亡入賊中今又頓兵九疑以盡殺為期則一方之民永陷塗炭矣伏乞朝廷特推恩意抽廻九疑之軍其蠻人首領許以官封平民各令歸業以示陛下含忍之徳又言臣所奏湖南捉賊兵士等貪得厚賞枉殺平民尋聞楊畋殺賊有功已推賞典楊畋五年二月己亥乃轉太常博士賜五品服此時未聞靖云已推賞典恐是當時嘗有此議既而不行其不行或縁歐陽修之言當考恐謂臣言迂闊未即施行又恐以楊畋到後必無此事伏縁賊自可殺民自可生賞功罰罪兩不可廢臣之所聞皆出南來士人之口自楊畋到湖南後乃支斬賊賞錢所以軍人冒利貪殺不分玉石感傷和氣伏乞特降宣敕指揮凡民不持兵噐非與官軍鬬者皆不得殺輒敢持民首以冒賞者以故殺罪罪之知而不告從所部犯法不告之條仍坐主将以肅軍令又言風聞湖南蠻賊攻燒城郭為害不止者竊以賊本山獠居在巖險嘯聚亡命出行抄掠數年以來未甚為害去冬今春氣焰漸盛其故何也盖縁官軍枉殺良民以貪厚賞近山百姓皆入賊中楊畋等攻賊巢穴意在蕩除由是賊出攻城以争死命雖聞朝廷屢令招撫而楊畋鷙勇但欲浄盡賊徒臣愚以為憑朝廷之力取數千之賊勝之未足為武不勝適足為羞今來民皆逃亡賊無蓄積必湏急戰乃見勝負若能盡賊但恐百姓亦盡臣竊料賊勢已窮欲降久矣但縁楊畋固執前議賊亦恨之畋不罷去賊必疑貳臣謂冝因楊畋待罪之際楊畋待罪或因孤漿峒之敗也當考敗在何時别與差遣假此為說招諭蠻人但言畋不曉朝廷素來招納之意多行殺戮今専委良将恵懐吾民百姓因此可以復歸山獠因此可以綏撫事定之後用畋不遲臣累奏官軍枉殺平民朝廷未信今來廣南東路亦奏連州土丁因備湖賊事枉殺鹽商四十餘人推此可知湖南之害伏乞朝廷詳酌大計不可重惜楊畋而輕荆南一路百姓范仲淹等意欲復古勸學數言興學校本行實詔近臣議於是翰林學士宋祁御史中丞王拱辰知制誥張方平歐陽修殿中侍御史梅摯天章閣侍講曾公亮王洙右正言孫甫監察御史劉湜此八人姓名據李清臣史藁等合奏曰伏奉詔書議夫􅂑士當求其實用人當盡其才今教不本於學校士不察於鄉里則不能覈名實有司束以聲病學者専於記誦則不足盡人材此獻議者所共以為言也謹參考衆説擇其便於今者莫若使士皆土著而教之於學校然後州縣察其履行則學者修飭矣故為設立學舎保薦送之法夫上之所好下之所趨也今先筞論則文詞者㽞心於治亂矣簡程式則閎博者得以馳騁矣問以大義則執經者不専於記誦矣其詩賦之未能自肆者雜用今體經術之未能亟通者尚如舊科則中常之人皆可勉及矣此所謂盡人之材者也故為先筞論次簡詩賦考式問諸科大義之法此數者其大要也其州郡彌封謄録進士諸科帖經之類皆苛細而無益一切罷之法行則申之以賞罰如此養士有本取才不遺為治之本也乙亥詔曰儒者通天地人之理眀古今治亂之源可謂博矣然學者不得騁其說而有司務先聲病章句以拘牽之則吾憂英俊竒偉之士何以奮焉士有純明朴茂之羙而無斆學養成之法其飭身勵節者使與不肖之人雜而並進則夫懿徳敏行之賢何以見焉此􅂑士之甚弊而學者自以為患議者屢以為言比令詳酌仍詔政事府參定皆謂本學校以教之然後可求其行實先筞論則辨理者得盡其說簡程式則閎博者可見其才至於經術之家稍増新製兼行舊式以勉中人煩法細文一皆罷去明其賞罰俾各勸焉如此則待才之意周取人之道廣夫遇人以薄者不可責其厚也今朕建學興善以尊子大夫之行而更制革弊以盡學者之才教育之方勤亦至矣有司其務嚴訓導精察舉以稱朕意學者其進徳修業無失其時凡所科條可為永式其令曰州若縣皆立學本道使者選屬部官為教授三年而代選於吏員不足􅂑於鄉里宿學有道業者三年無私譴以名聞士湏在學習業三百日乃聽預秋賦舊嘗充賦者百日而止親老無兼侍􅂑保任聽學于家而令試于州者相保任所禁有七曰隠憂匿服曰嘗犯刑責曰行虧孝弟有状可指曰明觸憲法兩經贖銅或不經贖罰而為害鄉黨曰籍非本土假户冐名曰父祖犯十惡四等以上罪曰工商雜類或嘗為僧道皆不得預進士試三塲先筞次論次詩賦通考為去􅂑而罷帖經墨義又以舊制用詞賦聲病偶切立為考式一字違忤已在絀格使博識之士臨文拘忌俯就規檢羙文善意鬱而不伸如白居易性習相近逺賦獨孤綬放馴象賦皆當時試禮部對偶之外自有義意可觀冝許倣唐體使馳騁于其間士子通經術願對大義者試十道以曉析意義為通五通為中格三史科􅂑其明史意而文理可采者明法科試斷案假立甲乙罪合律令知法意文理優為上等此即仲淹等十事其三曰精貢舉也畧已見三年九月丁邜戊寅延州蕃官廵檢右班殿直折保忠為右侍禁保忠舊名馬山賜今名龎籍在延州委之防托青澗川用其部族為蕃捉生即綏徳廢縣置營居之累以功補殿直時西賊數百騎突境上保忠率兵拒鬬獲其首級噐甲甚衆特遷之尋又封其母李氏為福昌縣太君籍言李氏頗知義訓故也封李氏乃七月庚辰今附見詔開封府吏受賄雖㑹踈決毋以例原己邜上於邇英閣出御書十三軸凡三十五事一曰遵祖宗訓二曰奉真考業三曰祖宗艱難不敢有墜四曰真宗愛民孝思感噎五曰守信義六曰不巧詐七曰好碩學八曰精六藝九曰謹言語十曰待耆老十一曰静進退十二曰求忠正十三曰懼貴極十四曰保勇将十五曰尚儒籍十六曰議釋老十七曰重良臣十八曰廣視聽十九曰功無迹二十曰戒喜怒二十一曰明巧媚二十二曰分希㫖二十三曰從民欲二十四曰戒滿盈二十五曰傷暴露兵二十六曰哀鰥寡民二十七曰訪屠釣臣二十八曰講逺圖術二十九曰辨朋比三十曰斥諂佞二十一曰察小忠三十二曰監迎合三十三曰罪已為民三十四曰損躬撫軍三十五曰一善可求小瑕不廢顧丁度等曰朕觀書之暇􅂑臣僚上言及進對事目可施於治者書以分賜卿等度及曾公亮楊安國王洙等拜賜因請注釋其義帝許之庚辰降知潁州翰林侍讀學士給事中桞植為右諫議大夫知黄州坐不能察軍賊張海發所部也録唐尚父郭子儀裔孫元亨為永興軍助教壬午太子中允國子監直講石介直集賢院兼國子監直講樞宻副使韓𤦺乞召試詔特除之癸未詔禁軍料錢滿五百有犯階級者自今毋得作情理可閔奏聴裁甲申免衡道州桂陽監民經蠻刧掠并土兵入山捕蠻者賦役一年兩朝史諸蠻𫝊云時蠻所至殺掠居民縱火刧財物被害者甚衆詔被害者并入山捕蠻土兵蠲復有差余靖等䟽或附此乙酉上問輔臣春秋三𫝊異同之義賈昌朝對曰左氏多記事公羊榖梁専解經㫖大抵皆以尊王室正賞罰為意然三𫝊異同考之亦各有得失也上然之丙戍丁度等上答邇英聖問一巻帝覽之終篇指其中體大者六事付中書樞宻院令奉行之答聖問者即所釋前賜三十五事也其序曰伏奉宣示御書文字十三軸仰窺聖㫖皆陛下上念祖宗下思政治述安危成敗忠邪善惡之事詢謀下臣使進禆補敢不竭愚竊思自古求治之主靡不欲興理道安邦國納忠正退姦邪廣聰明致功業然行此數事在明與威斷爾明則不惑威則善柄斷則能行總是三者守而勿失非聖人孰能為之臣等嘗讀唐書見憲宗英悟留心庶政宰臣陳說政要必往復詰問既盡其理則曰凡好事口說則易躬行則難卿等既為朕言之常湏行之勿空陳而已李絳對曰非知之艱行之帷艱陛下今日處分可謂至言然臣絳亦以天下之人從陛下所行不從陛下所言唯願毎言之則必行之憲宗深所嘉納今臣等親承聖諭敷明治要亦願陛下日與輔臣舉此事目推而行之無使唐之君臣専羙前代也是日五䑓山寺火丁亥謂輔臣曰朕毎令講讀官敷經義于前未嘗令有諱避近講詩國風多刺譏亂世之事殊得以為監戒章得象對曰陛下留思六經能逺監前代興亡之迹此誠圖治之要也江西轉運使移屬州凡市末鹽鈔毎百緡貼納錢三之一通判吉州李虞卿受賕免貼納事覺大理将以枉法論知審刑院丁度曰枉法謂於典憲有所阿曲虞卿所違者轉運使移文耳遂貸虞卿死度喜論事舊制轉運使及藩鎮之臣辭謁皆賜對上初即位詔中書樞宻院附奏之度言臣下出外必有所陳今一切令附奏非所以防壅蔽也又以内臣治詔獄為不可因援唐制三司參按故事請任御史罷内臣丁度以此月辛巳知審刑院此事不得其時附見此月末賜對治獄二事亦附見其行與否當考李虞卿神録一百十四巻有𫝊亦説及貼納但未嘗倅吉當别一人也諫官余靖上疏曰伏見陛下屢降手詔令兩府大臣條舉當今可行急務此盖陛下久􅌅因循之言思樂興起之治所以頻廽清問用佇嘉謀固欲極意更張大去頽弊大臣雖時進謀畫未副陛下之虚懐或煩為條目徒取衆人之忿怒寜且顧慮而不敢作事者其故何哉臣竊思自古帝王必因大災變大患難然後明君側身賢輔恊力增修治道以拯時危既有非常之才亦因可為之勢此皆慮始最難之事也以今之天下事勢今之大臣所藴今之衆賢所議臣料必不能副陛下之望何者自寶元之初元昊僣擬契丹驕驁當此之時洶洶惟憂隕越而不能得非常之才因可為之勢以修國度以興治道人皆歸過於張士遜呂夷簡責其惟能私徇不識權變自夷簡病去陛下􅂑章得象晏殊而任之又不能因此時修舉法度以副天下具瞻今既逾年人心無所冀矣若元昊既和之後猶有可因之勢寛民役完國用􅇰其先也臣以為國家之務京城擇諸司之長邉鄙擇将帥之材牧民選循良之官理財委明察之吏則兵農刑政庶職皆修矣去冗兵惜冗費謹山海之禁則國用足矣省配率恤有無去侵漁之吏則民力完矣常謹此事民可致於小康皆當因事行之不必日陳細碎之務以取譏誚也夫人主之所以服天下者威令耳威無不懾令無不行臂指相制罔有違者今之士人名路相軋不顧憲章各懐倔强如此風俗之弊不冝崇長古者賢智之士為王者羽儀材武之臣為王者爪牙漢之九卿登為三公唐之十六衛出領旄節此皆儲其才於待用之地也今之臨事無聞皆儲其才領京師職任緩急有大謀議遣大将帥欲誰使者臣愚以為當今為陛下計者但能自攬威權大臣公行賞罰内擇百官外擇将帥沮蠻夷之氣塞賊盗之原寛民力足國用則天下乆安之勢也余靖疏稱呂夷簡病去今已逾年按夷簡以三年罷相故附此疏於四年三月末靖諫草稱擇􅂑人望而任之張英政要則云章得象晏殊今從政要先是參知政事范仲淹言乞於翰林院選醫師三五人於武成王廟召京城習醫者教以診脉并修合藥餌至於針灸亦别立科候及三年選試髙等者入院充學生仍自今不由師學者不得入院如外間能醫者湏有朝臣三人奏舉得同比試更委宣徽院覆試優者方許入院若内中及諸宫院使不由官學之醫雖有功效只與支賜祗應及十年以上累有功效者乃與助教或殿侍三司軍将安排即不得入院其諸道州府已有醫學博士亦令所在教習選官専管委監司提㸃其生徒精通兩部醫書與免户下諸色差配累有功效保明以聞與助教安排所貴天下醫道各有源流詔宣徽院並依奏施行㑹要正月事今附三月末是月國子監言儒者講學之地不冝令醫官對列竊見唐制太常寺有八局太醫𨽻焉有博士以教之其考試登用如國子監之法乞令太常寺管勾施行所有合借經書即令本寺移文於當監􅂑索應副詔付太常寺已而太常寺言近置太醫局令屬本寺作令權就鼓吹局講説今招到諸科生已八十餘人其鼓吹局三間窄隘兼副南郊每日教樂講説不便欲乞移就武成廟從之此據㑹要乃三月二十五日及八月二十二日事今并附三月末湏别加刪去范仲淹言臣竊見尹洙才業操行縉紳所推由䑓閣進用便可直入兩制若邉城驟遷則有未便縁去年春是太常丞在路分都監許遷張肇之下去年秋轉司諫管勾經畧司公事在鈐轄安俊之上纔方半年若就除待制又遷在部署狄青之上既不因功勞又不改路分徧受寵權衆情非便於體未安如湏合進擢即今将入夏邉上無事且乞召尹洙赴闕令條奏邉事觀其陳述可采即與改職却令馳往邉上亦未為晚既因啓沃面受殊恩邉臣聞之不為越次洙竟不召亦不遷詔權停貢舉
