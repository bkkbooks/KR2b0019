body:
  text: 續資治通鑑長編巻一百五十二宋李燾撰仁宗慶厯四年九月辛酉田况奏保州平壬戌詔保州官吏死亂兵而無親屬者官為殯殮兵官不從賊被害及戰没並優賜其家近城民田遭蹂踐者蠲其租河北都轉運按察使工部郎中天章閣待制張昷之落職知虢州降轉運按察使刑部郎中直史舘張沔為工部郎中知汝州提㸃刑獄司勲員外郎王儀知澤州縁邊安撫使兼知雄州四方館使榮州刺史王徳基為西上閤門使同提㸃刑獄東頭供奉官閤門祗候王秉安撫都監東頭供奉官閤門祗候趙牧並為西頭供奉官走馬承受入内西頭供奉官宋有言為入内殿頭大名府路都部署程琳以嘗調發兵馬真定府路都部署李昭亮縁邊都廵檢楊懐敏嘗領兵至保州並特免罰初昷之聞保州亂自魏馳至城下召諸將部分攻城使人謂懐敏曰不即來當以軍法從事既至就坐又以兵自衞昷之曰諸將方集獨敢以兵隨左右豈欲反邪因叱去衞者故懐敏深恨昷之嘗宻奏殺昷之則賊降矣㑹富弼力為昷之辯上意解猶坐前事落職富弼乞免責降河北監司奏議在第五巻張記聞云初懐敏與昷之不協宻奏賊於城上呼云得昷之首我即降願賜昷之首以示賊宜可降上從之遣中使奉劔往即軍中斬昷之首以示賊宣撫使富弼遇之亟遣中使還且奏曰賊初無是言必恐讎者為之藉令有之若以叛卒故斬都轉運使頭此後號令何由得行上乃落昷之待制降知虢州按以叛卒故斬都轉運使頭本朝故無此事况仁宗之盛徳乎今不取若謂懐敏深譛昷之欲令重貶則可爾知定州皇城使賀州刺史王果降知宻州坐攻保州城多殺傷士卒也詔諸路廵檢禁軍指揮使特添支錢月一千副指揮使七百副都頭以上五百廂軍指揮使七百副指揮使五百副都頭以上三百乙丑龍圖閣直學士右正言知成徳軍田况為起居舍人歩軍副都指揮使感徳軍留後李昭亮為淮康軍留後知定州洛苑使普州刺史入内内侍押班楊懐敏領通州團練使賞平賊之功也昭亮初以叛卒女口分𨽻諸軍而輙有私入其家者保州通判馮博文等亦效之都轉運使歐陽修捕博文繫獄昭亮惶恐立出之修因劾昭亮上置不問西界内附蕃官莽布賽為右千牛衞將軍居汝州當考丙寅贈故西京左藏庫副使保州廣信安肅軍縁邊廵檢都監王守一為成州團練使録其子三班借職懐懿為西頭供奉官保州縁邊走馬承受劉宗言為左千牛衞將軍録其子景賢為右班殿直丁夘以右侍禁郭逵為閤門祗候升保州無敵第五指揮為雲翼指揮戊辰鄭州言太尉致仕許國公吕夷簡卒帝見輔臣涕下曰安得憂公忘身如夷簡者贈太師中書令諡文靖自上初立太后臨朝十餘年内外無間天下晏然夷簡之功為多其後元昊反四方乆不用兵師出數敗契丹乘之遣使求關南地頗頼夷簡計畫選一時有名之臣報契丹經畧西夏二邊以寧然建募萬勝軍雜市井小人浮脆不任戰鬬用宗室補環衞官驟增俸賜又加遺契丹嵗金繒二十萬當時不深許之至于後世費大而不可止夷簡當國柄最乆雖數為言者所詆帝眷倚不衰然所斥士旋復收用亦不終廢其於天下事屈伸舒巻動有操術後卒配食廟廷為世名相始王旦竒夷簡謂王曾曰君其善交之卒與曾並居相位後曾家請御篆墓碑帝因慘然思夷簡書懐忠之碑四字以賜之此據夷簡新傳執史筆者頗為夷簡道地當别刪修乃可吕氏家塾記云皇祐初王沂公家始乞御篆碑額仁宗同日自製二碑名親書以賜二家沂公曰旌賢碑文靖公曰懐忠碑各三字王子和乞上為沂公親書碑額上曰吕夷簡何故無請左右曰非故事也遂親書懐忠碑賜之以墳寺為懐忠薦福院為改馬亭鄉為懐忠春明退朝録云懐忠踵沂公而賜誤也實録云賜懐忠之碑四字亦誤今不取庚午刑部尚書平章事兼樞宻使晏殊罷為工部尚書知潁州殊初入相擢歐陽修等為諫官既而苦其論事煩數或面折之及修出為河北都轉運使諫官奏留修不許孫甫蔡襄遂言章懿誕生聖躬為天下主而殊嘗被詔誌章懿墓没而不言又奏論殊役官兵治僦舍以規利殊坐是絀然殊以章獻方臨朝故誌不敢斥言而所役兵乃輔臣例宣借者又役使自其甥楊文仲時以謂非殊之罪云蘇轍龍川别志云晏殊作相八大王疾革上親往問疾王曰叔乆不見官家不知誰作相上曰晏殊也王曰此人名在圖䜟胡為用之上歸閱䜟得成敗之語并記章懿誌文字欲重黜之宋祁為學士當草麻詔爭之乃降二官知潁州詞曰廣營産以殖私多役兵而規利以它事罪之殊免深譴祁力也按元儼以此年正月十二日乙亥薨殊以九月十二日庚午罷自春初至秋末凡半載有餘乃罷殊相此蓋妄云然諸書亦多有是說今並不取降權保州都監西頭供奉官韋貴為右侍禁監岳州茶鹽酒稅監保州倉草塲權保州兵馬監押左班殿直侍其臻為右班殿直監曹州倉徙監保州屯田務右侍禁賈世永監鄆州倉保州廣信軍管界廵檢右侍禁史克順澤州管界廵檢保州指使三班奉職張瀆决脊杖二十刺配沙門島貴本劉從徳家奴也從徳卒恩補班行累遷西頭供奉官權保州廣信軍安肅軍縁邊廵檢至是權保州都監㑹兵叛貴雖不能死節然屢發奏城中又日趣亂軍降及城門開居民頼貴不甚被殺害臻父知安肅軍領兵㑹城下城中疑為内應屢欲斬之求哀得免世永廨舍在南關城裏偶入城遇亂遂被留及田况以勅牓招諭世永為亂卒遣出城見况欲得走馬宋有言入城乃開門有言既不去嘗令世永復入城諭亂軍克順廨舍在東關門是日領兵與亂軍格鬬矢中其胷瀆府谷人應進士舉因府州防城免解授長史試方畧得三班奉職未仕時嘗犯徒刑韋貴既勸諭亂軍瀆乃言我嘗讀法書此非可赦之罪也御史包拯言韋貴罪大責輕如未欲便行嚴斷即乞於逺惡處編管不從户部判官殿中侍御史趙祐言近乞上殿奏事得㫖尋牒閤門須索申狀仍要出身文狀兩本比至引對已經七日切縁臺諫之官俱職言事臺官則具奏候㫖諫官則直牒閤門事體有殊欲望許依諌官例直牒閤門詔免供家狀此據㑹要九月十二日事今時見庚午當考辛未保州指使三班借職臧稹為奉職稹見保州兵亂走入甲仗庫被甲馳至定州吿變故賞之壬申參知政事賈昌朝言用兵以來天下民力頗困請下諸路轉運司毋得承例折變科率物色其須科折者並奏聽裁即雖有宣敕及三司移文而於民不便者亦以聞從之范仲淹奏乞置官專管每年上供併軍須雜物與昌朝所言畧同實録獨不載當考乙亥田况上保州城下官員有功者第一等三人詔遷兩資第二等三人遷一資第三等一十三人與減二年磨勘第四等二十八人第五等十五人並賜銀絹有差淮南江浙荆湖制置發運使工部郎中直昭文舘徐的為度支副使荆湖南路安撫使先是的自淮南受詔即湖外招輯叛蠻既至再宿㑹蠻酋相繼出降三司以郊祀近宜召還計事既還蠻復叛於是更遣的安撫的尋卒於桂陽不知的初往湖外是何月日據的傳云再宿而蠻酋出降蠻酋當是鄧文志黄文晟等也文志等授官在十月是出降必十月初的先自淮南至湖外時可以道里約度也歐陽修疏云王絲方在路又遣徐的王絲以三月三日受安撫之命其在路必是四月間則不應云再宿蠻酋出降蓋鄧文志黄文晟等出降乃十月初事又按余靖奏議五月間黄捉鬼嘗投衡州為陳執方所殺傳稱再宿蠻酋出降或指黄捉鬼也反覆推尋的先至湖外必是四月末五月初其再至必是十月或十一月也丙子殿中侍御史荆湖南路體量安撫王絲為侍御史廣南東路轉運按察使兼本路安撫初遣絲安撫湖南尋又遣徐的諫官歐陽修言臣嘗患朝廷慮事不早及其臨事草草便行應急倉皇常多失悞昨湖南蠻賊初動自昇州差劉沆知潭州授龍圖閣學士令專了蠻事沆未到湖南又差楊畋作提刑又令專了蠻事畋未到又差周陵為轉運使令專了蠻事周陵差勅未到又自朝廷遣王絲安撫令專了蠻事王絲方在路又自淮南遣徐的往彼令專了蠻事不惟任人不一難責成功兼彼數人一時到彼不相統制凡於事體見各不同使彼一方從誰則可若所遣皆是才者則用才不必人多若遣不才雖多適足為害此臣所謂臨事倉皇應急草草之失也今劉沆自守方面不可動楊畋周陵自是本路不可動徐的於數人中最才又是朝廷最後差去可以專委責成其間惟有王絲一人在彼無用可先抽回近觀絲有奏請欲盡驅荆南土丁往彼捉殺臣曾謫宦荆楚備知土丁仔細若果如此則必與國家生患朝廷雖不從之然絲處事可見矣若絲到彼黙然端坐並無所為一任徐的等擘畫則絲在彼何用自可召還若其自以身是臺官出禀朝命耻以不才黙坐於中强有施為切慮的等不能制絲又州縣畏絲是朝廷差去從其所見誤事必多臣尚恐大臣有主張絲者遂非偏執曲蔽於絲不欲中道召還彰已知人之失䕶其不才之耻未肯抽回即乞諭徐的等專了蠻事只令絲至一路州軍徧行安慰訖即速還庶無甚敗奏入不報而絲在湖南凡十月蠻既衰息乃徙廣東王絲竟了蠻事此據范仲淹所作絲墓表也墓表云慶厯中湖南蠻人亂攻刧郡縣言事者或請夷滅或議招納嵗時未决生民甚苦之朝廷選御史往究其事以絲為湖南安撫至則察訪利病而前之主者立重賞以誅蠻人一級萬錢士卒貪之往往害樵餉之人以為功絲下令曰得賊之首者必指其鬬地以為質其可擒者當生致之自是無枉戮者絲居軍中凡十月戎服葛􅋰與士卒同惟石硋鈐景二洞聚黨數千絲促官軍力破之斬首數百級招安三千人餘皆竄匿英連韶間自是衰息朝廷奬絲之勞遷侍御史賜金紫充廣南東路轉運按察使仲淹稱絲如此而修劾絲乃如此不知何故絲女婿馮京豈京有以欺仲淹乎今兩存之更竢考詳丁丑元昊復遣丁守素尹悅則等來議事按實録答契丹書云延州奏今月五日楊守素將誓文入界今月五日蓋九月甲午也丁丑乃十月十九日距甲午凡四十餘日不知守素於何處滯留逮今始到又前奏云楊守素此云丁守素不知守素是一人或是兩人又不知此來即是持誓文者否當考或丁守素即楊守素也辛巳降同提㸃兩浙刑獄崇儀副使柴貽慶為宣州都監坐不即按舉錢仙芝贓罪也錢仙芝以三月癸酉坐贓敗王琪邵飾五月庚午坐按發仙芝在諫官奏劾之後皆責官而柴貽慶至九月辛巳乃及於責不知何也當考癸未前鎮戎軍廵檢右班殿直閤門祗候李良臣為内殿承制閤門祗候鄆州都監更名泰定川之敗良臣為賊俘致契丹朝廷始以良臣死事嘗贈左千牛衞將軍梅州刺史後聞良臣尚在諫官田况請且存恤其家因封其母妻而録其二子至是脫身來歸上特貸而用之御史中丞王拱辰言良臣雖能終自拔前不死戰為俘實有罪今遽增六官復故職無以示後李廣漢名將陷匃奴得還議當斬贖為庶人蘇武不屈節白首歸漢才得典屬國古之馭將法義如此良臣宜待後効不聽甲申樞宻使吏部侍郎杜衍依前官平章事兼樞宻使衍務裁僥倖每内降恩率寢格不行積詔㫖至十數輙納帝前諫官歐陽修對見帝曰外人知杜衍封還内降耶凡有求於朕每以衍不可吿之而止者多於所封還也右諫議大夫參知政事賈昌朝為工部侍郎充樞宻使資政殿學士工部侍郎知青州陳執中為參知政事先是傅永吉以誅王倫故驟遷得入見上面奬之永吉謝曰臣非能有所成也皆陳執中授臣節度臣奉之幸有成爾因極言執中之美上益嘉永吉之讓且賢執中因問永吉曰執中在青州凡幾嵗對曰再嵗矣未幾謂宰相曰執中在青州乆可召之遂詔執中叅知政事於是諫官蔡襄孫甫等争言執中剛愎不學若任以政天下不幸上不聽諫官争不止上乃命中使齎勅吿即青州賜之且諭意曰朕用卿舉朝皆以為不可朕不惑人言力用卿爾明日諫官上殿上作色迎謂之曰豈非論陳執中耶朕已召之矣諫官乃不敢復言諫官蔡襄言元昊使人至已數日如聞誓書大體頗如朝廷約束兼余靖使北已有回奏别無齟齬之意臣切謂宜速行對冊今契丹舉兵西鄉在未勝負以前使使報之度其勢必不暇它議茍有所竢契丹幸而勝元昊則其志益驕或於齎謝之外輙有所求何以處之臣故謂莫如速之利也或報聘之禮已行契丹雖乘間生端則曲不在我况存元昊之和則契丹未敢輕絶中國而為患也揣度事機勢不可緩惟陛下速圗之始朝廷議封冊元昊而契丹使來即遣余靖報契丹而留元昊封冊不發靖見契丹主於九十九泉還奏臣竊聞契丹國書到闕議者紛紜以不請深入為敵中微詞不敢與元昊誓書緩行封冊之禮以觀敵變此皆游談之過慮也臣昨在敵中預聞書意敵主親與臣言如行封冊不請遣使深入軍前恐契丹軍馬到彼誤有殺傷即别無微意臣又詳觀二敵形勢唯有速行封冊使元昊得以專力東向與契丹争鋒二敵兵連不解此最中國之利設若二敵交兵雖有勝負契丹不能止我之和謀已先定故也假如契丹戰勝元昊伏罪則我與元昊通和契丹自以為功又如契丹戰敗則我與元昊通和在前固非觀望加以契丹意在讎賽元昊豈復妄怨於我此皆理之必然者也儻或朝廷懐猶預之意謀不早定則事乆變生非我之利竊以元昊天生凶狡非獨今日知之且以契丹强盛尚敢侮慢况於中國數戰屢勝徒誘於利乃肯和爾豈是心服若知我逗遛以待其變則翻然屈服於契丹而專力肆忿為患於我未必輕於契丹也臣之愚慮以謂封冊元昊在二敵勝負未分以前則元昊有以為恩契丹無以為詞今若謀慮未定二敵交兵萬一契丹戰敗而遣使堅來止我之和元昊亦遣使堅來求和元昊已納誓書不可違契丹兵敗不可違未知朝廷此時何以處置臣愚以為及楊守素等未出邊境先降勅命差定夏國封冊使俾其知之以堅西賊之心專圖北敵此則鬬二敵之䇿也唯早圖之詔從靖言仍令延州先移文夏人丁亥詔宗室宴太清樓射于苑中冬十月己丑朔黎州卭部川山前山後百蠻都鬼主牟黑遣將軍阿濟等三百三十九人來獻方物初元昊以誓表來上其詞曰兩失和好遂厯七年立誓自今願藏盟府其前日所掠將校民户各不復還自此有邊人逃亡亦無得襲逐悉以歸之臣近以本國城寨進納朝廷其栲栳鎌刀南安承平故地及它邊境蕃漢所居乞畫中央為界於界内聽築城堡朝廷嵗賜絹十三萬匹銀五萬兩茶二萬斤進奉乾元節回賜銀一萬兩絹一萬匹茶五千斤賀正貢獻回賜銀五千兩絹五千匹茶五千斤仲冬賜時服銀五千兩絹五千匹及賜臣生日禮物銀器二千兩細衣著一千匹雜帛二千匹乞如常數不致更改臣更不以它事干朝廷今本國自獨進誓文而輙乞俯頒誓詔蓋欲世世遵承永以為好儻君親之義不存或臣子之心渝變使宗祀不永子孫罹殃庚寅賜誓詔曰朕臨制四海廓地萬里西夏之土世以為服今乃納忠悔咎表於信誓質之日月要之鬼神及諸子孫無有渝變申復懇至朕甚嘉之俯閲來誓一皆如約所宜明諭國人藏書祖廟辛夘詔河南府前令官屬通領留守司事如聞事有未便宜復領之檢前詔附見此不必兩載熈寧四年九月二十四日復通管贈司空兼侍中諡文惠陳堯佐卒甲午詔河北縁邊安撫司械送契丹駙馬都尉劉三嘏過涿州初三嘏惡其妻淫亂遁至廣信軍而知軍劉貽孫聽其自還嘗留所賦詩及余靖使回燕京留守耶律仁言劉三嘏尚在漢界蓋其去累日復携其子與一婢從間道走定州匿望都民楊均慶家至於北界又移文督取故有是命先是輔臣議厚館三嘏以詰契丹隂事諫官歐陽修亦請留三嘏帝以問杜衍衍曰中國主忠信若自違誓約納亡叛則不直在我且三嘏為契丹近親而逋逃來歸其謀身若此尚足以謀國乎納之何益不如還之乃還三嘏壬寅録故大名府安成縣尉張允明子續為郊社齋郎姪復為深州安平縣主簿以允明捕賊鬬死也祕書丞直史館同修起居注知諫院蔡襄以親老乞鄉郡己酉授右正言知福州襄與孫甫俱論陳執中不可執政既不從於是兩人俱求出而襄先得請時甫使契丹未還也庚戌范仲淹言西界努瑪族太尉香布以其族十八人内附詔以香布為右千牛衛將軍本族廵檢香布子團練使瑪爾布為右班殿直瑪爾布授官乃十一月壬戌今并書先是羣臣䘮遇假日輟朝在聞訃數日外禮官曾公亮引唐崔龜從奏輟朝之禮所貴及哀自頃以來輟朝於奏請之時備禮於數日之後雖遵常例未本人情是時中書覆奏古有當祭吿䘮之儀若過時而戚非所以為君臣之義宜因韓億䘮特正此禮凡聞哀之明日不以假休並計輟朝日數如值大㑹朝或有大政須御前殿自可畧輕從重更不輟朝即值契丹使見辭若春秋大燕已吿有司者亦不可去樂禮院以為公亮所請恐遂廢輟朝有虧恩禮請自今有值此日更以次日輟朝又定中書樞宻宣徽院節度使殿前馬步軍都副指揮使及曾任中書門下平章事致仕上將軍皇親觀察使及追封郡王親王夫人皇后父母駙馬都尉公主並差官攝鴻臚卿䕶葬嘗有大功雖官爵不該臨時聽㫖内中大夫宗室戚里係有服紀合差使臣勾當如例官給葬家除本墳合給外諸䘮未經葬無得官給若雖該官給葬而家不願者聽定勅葬乃八月甲辰日今依本志并書壬子范仲淹言據麟府路兵馬都監張岊狀西界唐龍鎮嘉舒克順等族去漢界不逺可因西北交争之際量援以兵馬而預為招納之兼體問得七族蕃部舊屬府州比因邊臣不能存恤逃入西界在今府州東北縁黄河西住坐其地面與火山軍界對岸昨西賊大掠麟府界人户悉居於彼遂分為十四族近有内附首領香布言契丹領兵在寧仁静㓂鎮待河凍即過唐龍鎮劫之若契丹遂取七族則府州河外又生一契丹兼七族既有驚疑之心必逃入火山界契丹因而襲逐入漢地則一帶畨漢人户必盡遭驅虜又麟府殘破難以守禦今若因此機㑹先行招誘使七族率其所掠麟府屬户復自來歸納之不為無名已令張岊與府州部署王凱折繼閔等商議宻行招引今先次畫到七族地圖以聞時元昊已進誓表詔仲淹更審計利害仲淹亦言契丹與元昊今復解仇則七族更無憂廹之心自難招誘先有投來一百六十三口本漢界蕃户爾其議遂罷奏罷招誘乃十一月二十八日乙酉今并書仲淹又言麟府二州山川回環五六百里皆蕃漢人舊耕耘之地自為西賊所掠今尚有三千餘户散處黄河東涯自來所修堡寨只是通得麟府道路其四面别無城寨防守使邊户至今不敢復業地土既荒故糧草湧貴官中大費錢帛糴買河東百姓又苦饋運之役今重屯不解乆則自難供億此實西賊困中原之䇿謂如靈武必須棄之今二州之人皆願修起城寨若只以河西兵馬糧草般移應用自可辦事况折氏彊盛之時府州只屯漢兵二千今雖殘破兵馬常及萬餘如向去招輯蕃漢人户從而安居强人壯馬又可得數千却減屯漢兵兹誠守禦之長計也仲淹因奏張亢前所增廣堡寨宜使就總其役詔既下而明鎬持不可屢牒止亢亢曰受詔置堡寨豈可得經畧牒而止耶坐違節度所甘心堡寨必為也每得牒置案上督役愈急小堡或一日而成卒事乃發封自劾朝廷不問蕃漢歸者數千户嵗減戍兵萬人河外遂安皇祐中韓琦經畧河東案堡寨處多北漢名將楊業所度者益知亢有逺畧云張亢事附見七月乙夘亢始兼河東縁邊安撫使張岊傳載岊擅易安豐寨地坐責降當考岊責降時然亦不必書知潭州劉沆大發兵以勅榜至桂陽監招降叛蠻二千餘人使散居所部癸丑以蠻酋鄧文志黄文晟黄士元並為三班奉職是月太子中允直集賢院兼國子監直講石介通判濮州富弼等出使讒謗益甚人多指目介介不自安遂求出也介去太學實録不記其暗今據尹洙與田况書云蔡石相次補外因附見十月末更考之契丹夾山部落岱家族八百户歸元昊契丹主責還元昊留不遣契丹主遂親將至境上各據山嚴兵相持元昊奉巵酒為夀大合樂折箭為誓乃罷契丹夜以兵刼元昊元昊有備反以兵拒之大敗契丹主入南樞宻蕭孝友寨擒呼圖克駙馬契丹主從數十騎走元昊縱其去尋復與契丹解仇如故契丹兵敗于元昊史並不記其時當考
