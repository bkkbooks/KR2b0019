body:
  text: 續資治通鑑長編巻四百十四宋李燾撰哲宗元祐三年九月丁未給太醫局教授楊文蔚假令往南京視太子太保致仕張方平疾中書侍郎劉摯為之請也樞宻院言府界累年災傷夏田又多不熟雖今方秋成縁民力未甚寛舒乞詔開封府保甲特免今年秋冬教從之戸部言瀘州江安縣夷稅户自來不曾差役自第三等以上願依舊輸役錢仍從漢戸單丁法減半第四等以下並免從之戊申翰林學士兼侍讀蘇軾言臣今日邇英進讀寳訓及雍熈淳化間事太宗皇帝每見時和嵗豐雨雪應時輙喜不自勝舉酒以屬羣臣又是日熒惑與日同度太史奏言當旱既而雨足嵗豐臣讀至此因進言水旱雖天數然人君修徳可以轉災為福故宋景公一言熒惑退三舍元豐八年熒惑守心逆行犯房又逆而西垂欲犯氐氐四星后妃之象也方是時二聖在位發政施仁惟恐不及臣視熒惑退舍甚速如有所畏不敢復西以此知天人之應㨗於影響太宗皇帝親致太平而每遇豐年若獲非常之福喜樂如此豈非水旱不作自是朝廷難得之事乎書曰天聰明自我民聰明匹夫匹婦有不獲其所猶能致水旱而况政令之失小及一方大及四海其為災沴理在不疑自二聖嗣位於今四年恭儉慈孝至仁至公可謂盡矣而四年之中非水則旱日月薄蝕五星相凌淫雨大雪常寒乆隂之類殆無虚月此豈盛徳之報也哉臣愚無知竊謂陛下身修而政未修故監司守令多不得人百姓失職而無所告訴謡怨上達以傷隂陽之和所以致此者盖由朝廷賞罰不明舉措不當之咎也臣請略而言之去年熈河諸將力戰以獲果莊此竒功也故增秩賜金涇原諸將閉門自守使賊大掠而去若渉無人之境此罪人也亦增秩賜金賞罰如此何以使人廣東妖賊岑探反圍新州差將官童政救之政賊殺平民數十其害甚於岑探朝廷使江西提刑傅燮體量其事爕畏避權勢歸罪於新州官吏又言新州官吏却有守城之功乞以功過相除愚㺯上下有同兒戲然卒不問岑探聚衆結謀經年乃發而所部官吏茫不覺知使一方赤子肝腦塗地然亦止於薄罰童政凶狡貪殘非一日之積而監司乃令將兵討賊以致數千人無辜就死亦止降一差遣二月二十八日乙巳童政坐擅殺六十餘人處斬不知軾何故云止降一差遣當考近日溫杲誘殺平民十九人寃酷之狀所不忍聞而杲止於降官監當蔡州捕盗吏卒亦殺平民一家五六人皆婦女無辜屠割形體以為丈夫首級欲以請賞而守倅不按監司不問以至臣僚上言及行下本路乃云殺時可與不可辨認白日殺人不辨男女豈有此理乃是預為凶人開茍免之路事如此者非一臣不敢盡言特舉其甚者耳如此不過恩庇得無狀小人十數人正使此等歌詠愛戴不知有何補益而紀綱頺弛偷惰成風則千萬人受其害此得為仁乎大抵為國要在分别是非以行賞罰然後善人有所恃頼平人有所告訴若不窮究曲直惟務兩平則君子無告小人得志天下之亂可坐而待此臣所謂賞罰不公之咎也黄河自天禧以來故道漸以淤塞每決而西以就下耳熈寜中決於曹村先帝盡力塞之不及數年遂決小吳先帝聖神知河之欲西北行也乆矣今强塞之縱獲目前之安而旋踵復決必然之勢也故不復塞今都水使者王孝先乃欲於北京南開孫村河欲奪河身以復故道此豈獨一方之安危天下之休戚也古者舉大事謀及庶人上下僉同然猶有意外之患今内自工部侍郎工部侍郎蔡延慶也事見鮮于綽傳信記都水屬官外至安撫轉運使及外監丞皆以為故道髙仰勢若登屋功必無成而患有不可測者以至河北吏民無賢愚貴賤皆以為然獨一孝先以為可作臣聞自孫村海口舊管堤埽四十五所役兵萬五千人勾當使臣五十員嵗支物料五百餘萬自小吳之決故道諸埽皆廢不治堤上榆桞并根掘取殘零物料變賣無餘官吏役兵僅有存者使孫村之役不能奪過河身則官私財力舉為虛棄若幸而復行故道則四十五埽皆已廢壊横流之災必倍於今孝先建議之初略不及此近因人言沸騰方牒北外監丞司云四十五埽並屬北外監丞司地分令一面相度枝梧又云因檢計春料便令計置今來欲興修四十五處已壊堤埽凖備河水復行故道此莫大之役不貲之費也孝先當於建議之初首論其事待朝廷上下熟議而行今孝先便將此役作常程熟事行下北外監丞司令一面管認意望敗事之後歸罪他人其為欺罔實駭羣聽其餘患害未易悉數但臣採察衆論以為此役不可不罷若今嵗罷役不過枉費九百萬物料虛役二萬兵工若更接續興修則來嵗當役數十萬人仍費三千餘萬此外民勞之極變故横生嗟怨之聲足以復致水旱若將三千萬物料錢作數年因水所欲行之地稍立隄防增畢培薄數年之後必漸安流何苦徇一夫之私計逆萬人之公論以興必不可成之役乎此臣所謂措置不當之咎也臣竊見仁宗朝名臣歐陽修為學士日有修河議狀二篇雖當時事宜而其所畫利害措置方略頗切今日之事臣以為可用故輙繕冩進呈自祖宗以來除委任執政外仍以侍從近臣為耳目請間論事殆無虚日今自垂簾以來除執政臺諫開封尹外更無人得對惟有邇英講讀猶或親近清光若復瘖黙不言則是耳目殆廢臣受恩深重不敢觀望上下茍為身謀謹備録今日進讀之言上塵聖鑒臣無任恐栗待罪之至貼黄稱臣為衰病眼昬所言機宻又不敢令别人冩錄書字不謹伏望聖慈特賜寛赦蘇轍誌軾墓云嘗讀寳訓因及時事歴言今賞罰不明善惡無所勸沮又黄河勢方西流而强之使東夏人冦鎮戎殺掠㡬萬人帥臣掩蔽不以聞朝廷亦不問事毎如此恐寖成衰亂之漸當軸者恨之按賞罰不明强河使東即九月五日奏不問鎮戎事乃閏十二月四日奏墓誌并言之己酉龍圗閣直學士刑部侍郎吕公孺權知開封府朝奉郎監察御史楊康國權發遣開封府推官劉安世十月疏云康國以執政𤓰葛之戚移府推庚戌龍圗閣待制權知開封府錢勰知越州朝散大夫倉部郎中范子諒知蘄州朝奉大夫新提㸃河北西路刑獄林邵知光州仍各罰銅二十斤内勰展三年磨勘坐奏獄空不實也八月二十七日上批可考右正言劉安世言臣伏見御史臺舉劾開封官吏將大辟罪人寄廂妄奏獄空致朝廷誤推恩賞始聞已降指揮錢勰止令罰金出知越州林邵范子諒並與小郡其餘官吏特免改正雖門下省嘗具封還准朝㫖惟展磨勘此乃陛下至仁至厚不欲窮治而勰等所犯情實欺君考之公論皆謂責之太薄罪名不正事闗國體須至論列臣聞人主所以鼓動天下制馭臣民之柄莫大於賞罰使賞必及於有功罰必加於有罪則四海之内竦然向風而無不心服者矣惟其無功者虚受有罪者幸免遂容僣濫而其弊將至於無所勸懲然則為天下者安可不以至公而審用之乎今開封官吏以大辟之囚權令寄廂敢肆誕謾謂無一人在獄朝廷信用其奏亟推厚賞進官錫服幾二十人下至胥吏亦霑恩賜播傳天下書之史册何可掩也繼而臺臣抗章彈其謬妄陛下付之執政按見實迹縱不容論以全罪猶當奪其誤賞之官少為天下誣罔之戒而乃一切仍舊復得名藩使勰善去不過如此今實有罪何以示懲陛下若明正典刑則虚偽之迹固在勰等茍謂已行之命憚於追改則好名之咎遂歸朝廷傳之後世實累聖徳伏望陛下特徇公議追勰誤賞之官黜置小郡其餘官吏亦令改正使天下知公朝之名器不可以倖得非惟塞小人奔競之路亦助成陛下無私之政臣所以詳論之者盖欲救正國家之大體非特區區為一錢勰而發也伏惟留神省察早降指揮政目云詔錢勰等展磨勘勰三年林邵杜天經邵䶵二年勰知越州餘小郡詔毋得受文彦博告老章奏辛亥御史中丞孫覺戸部侍郎蘇轍中書舍人彭汝礪祕書省正字張績考試應賢良方正能直言極諌科舉人詔熈河蘭㑹路經略安撫使于闐進奉人回以元祐二年十月十八日間嵗一解發赴闕朝㫖丁寜諭說令報本國樞宻院言果莊已除陪戎校尉鄂特凌古并溫錫沁進奉人合赴起居詔令果莊就當日先於殿門謝令進奉人於幕次觀見别日赴内東門謝九月八日古令鄂特凌使人與果莊相見八月二十四日除果莊校尉范純仁言臣竊見昨日文彦博與樞宻院堅欲令鄂特凌古來使與果莊相見欲其子結斡磋得知父在審實可以繫累其心臣愚以為不然果莊是西蕃驍將身繫其國輕重未擒之前敢與中國相抗既擒之後遂便狼狽納欵則其要藉果莊灼然可見然其謝罪之始既以推過本人雖與劉舜卿蕃字中曾乞放還未敢便於朝廷陳請今若得與其使相見其心必猜朝廷别有意謂歸國却須生心或請放果莊歸國如夏國乞還城寨之類至時必須堅拒却致嫌怨復生若更於不與之後忽然病死則必謂朝廷因其請而殺之尤可為鄂特凌古舉兵之名則是今日使見未必為利適可為他日之害也又况大國舉動當使外蕃難測使其知存足以示恩使其知亡不能生怨今區區欲悅其子悉使見我之情恐生輕慢之心亦似有虧大體若陛下以大臣之言須至依從則乞候將來常貢之使因事漸通消息則亦足以使知陛下容貸之恩伏望聖慈更將臣言子細審詳庶於機事無害果莊就擒已乆彼國自己絶望故於納欵蕃字之内一切歸罪果莊若却使之相見深恐復生覬望之心結斡磋等既知朝廷顯示其父必以得見為期後若不遂其心而死却恐嫌隙復生更乞聖意深加詳察責授建寜軍節度副使本州居住吕恵卿徙宣州居住恵卿乞改蘇州不報政目八日云吕恵卿宣州居住恵卿家傳亦云九月移宣州恵卿以私計自陳乞改蘇州不報舊録乃於十二月二十八日書恵卿徙宣州今不取壬子引進使嘉州團練使新差永興軍路鈐轄狄諮提舉崇福宫從所乞也詔尚書侍郎學士待制兩省御史臺官國子監長貳詳議殿試用三題法奏議具十月末癸丑朝請大夫知廬州蹇周輔卒甲寅詔問神宗實錄何日成書修撰官言若併功修撰約來年冬可畢御集乙卯給事中顧臨為刑部侍郎殿前副都指揮使苗授奏依殿試格引試驍騎事藝合格該賞人内弓箭手十將郝貴射一石力弓馬歩射通中垜十一箭賜絹二十五匹御批内十將郝貴馬歩射一十一箭並上垜可於支賜絹外特與更轉一資御集三年九月十二日事丁巳熈河蘭㑹路經略使劉舜卿言夏國若遣人齎文字議和許與不許收接詔許收接仍令於鄜延正路計㑹魏王諸子秀州團練使孝貽等八人遷官有差朝奉郎兵部郎中葉祖洽提㸃淮南西路刑獄承議郎太府寺丞陳祐之提舉河北糴便祐之與囘河相闗故特書此或削去醫官秦廸等七人勾當御藥院陳衍等三人本殿使臣張士良等二十人以太皇太后康復推恩轉官減年有差錄死事右班殿直吳猛弟祐為三班借職己未户部尚書李常為御史中丞御史中丞孫覺為龍圗閣直學士提舉醴泉觀兼侍講覺引疾求罷故有是命明年正月二十二日又書孫覺免侍講依舊提舉醴泉觀仍權免朝參覺以疾請也劉安世言去年五月中臺臣劾胡宗愈未䝉施行孫覺楊康國相繼解職而丢當考安世章附四年三月七日紹聖元年六月周秩言劉摯初與邢恕合論謂司馬光當容蔡確恕薦摯為侍御史既在言路與光及吕公著通謀排去確等因以事逐恕諫議大夫孫覺論稍異於摯光遂超擢摯為中丞又為執政七月周秩言司馬光因邢恕以奉蔡確嘗致書求用一日得志確恕皆以議論持平被逐孫覺李常亦以持平之論忤光不䝉引㧞秩言固不可信姑存之鄜延路經略司言宥州差人來延州陳述事理已令至日差官引伴赴州詔令趙卨除依詳前後所降朝㫖應答外雖西人言語倔强邀乞意堅亦節次婉順以理開諭即不得一起折難遽然阻絶務要遷延不絶其意以緩入冦之謀簽書樞宻院事趙瞻言臣不才備位宥宻惟是邉機兵政職事所重外當方面則委將佐内嚴師律乃統環衛進用其才率參圗議大抵每除一官必須熟揣舊吏博訪所知謀之僉同冀協公議盖皆儒臣罕接武弁况欲採㧞行伍之人安得詳其本末臣向日累歴監司惟務選擇人物循行郡縣接見官吏即嘗宻察文武才否籍為等級各度其能驅策考校極詳尚有誤失今多不知雅素乃徒一識其面暫聼所言遂將聞於朝廷亟加擢進豈能果稱厥職悉允衆望欲嵗下諸路帥臣及監司令各訪察本部總管已下使臣宻籍其才能定為三等於逐名下明言所長可當如何任使不令下司具册奏聞降付樞宻院緘封本院常檢㑹上中人數内參考所聞因擬差遣間抽三兩人赴闕觀其人才器識取可用之人以備次補要職庶盡擢才之法免於緩急闕人所條才能方略精敏器量沉逺人材雄壯論事條理識見明穎才力精幹戰鬭勇决志氣忠實諳練軍政曉達蕃情藝能殊絶節操堅正如此之等即取數多者為上等能偏者次之為中下詔今後諸路帥臣監司文臣知州帶一路鈐轄嵗終各察所部諸司使以下大使臣可備選擇之人不限軍班雜出身並明具材行事狀之實宜充如何任使不拘員數實封保明聞奏委樞宻院置簿參覆其人以備隨材擢用若所奏不當以繆為能論如貢舉非其人法新本削趙瞻奏狀但載詔語至非其人法從簽書樞宻院事趙瞻所請也今依舊錄傅堯俞作趙瞻墓碑云因進對言機政所急人才而已今選武官難遽盡知請詔諸路安撫轉運司舉使臣科別其才第為三等籍之以備選任范祖禹神道碑同案本傳載此事與墓碑同但繫之四年同知院事後庚申大宗正司言内臣出入宫掖若與宗室聫姻非便欲乞宗室不得與内臣之家為親從之辛酉知河南府資政殿大學士張璪知定州知河陽資政殿學士李清臣知河南府知定州樞宻直學士韓忠彦為戸部尚書知襄州朝奉郎直龍圗閣邢恕知河陽朝奉大夫直龍圗閣太府卿葉均為秘書監差除太府卿在九月六日今并此癸亥承議郎校書郎孔武仲充集賢校理録皇城使雄州刺史帶御器械米贇男右班殿直世道為西頭供奉官世雄為三班奉職弟質姪世隆並為三班借職以贇死事故也甲子詔永興軍耀同解華陜州河中府今年秋災傷保甲不以分數並權免冬教如内有本戸不係災傷者亦與免放尚書省言命官犯罪有情狀乖惡肆為不法至於編配者其舉主自來只依常法斷放亦有該恩全原者是於保任之法全無懲誡詔今後舉官得罪如被舉人犯贓私罪特㫖編配者舉主雖該恩並取㫖乙丑鄂特凌古落起復詔省律學博士一員學生不給食舊録云往時仕者慢不知律及聽獄訟則諮於吏以決事遂建律學置博士員給食學者使學而後從政司馬光初以為非至是建明故有此詔新録辨曰方是時司馬光之薨乆矣乃云光以為非至是建明大抵稍革前日之事必以光為稱首皆私意也今删去三省言故宰相執政官子孫乞分財産者所屬官司體量乞分人貧乏方聽分割其居宅墓地仍不在分限今詳上條即未及以次近臣之家兼未有許占田以供祭祀指揮欲參立太中大夫觀察使以上每員許占永業田十五頃官給公據改注稅籍不許子孫分割典賣止供祭祀有餘分贍本族如輙典賣依卑㓜私輙典賣法仍不得無故毁折及斫伐墓地内林木從之政目云詔太中大夫觀察使以上永業田十五頃丁卯上御集英殿試賢良方正能直言極諌科謝悰己巳賜悰進士出身除初等職官右正言劉安世言臣伏見朝廷近復制科祕閣所試之人皆不應格陛下方務進人材不欲並行黜落曲收謝悰以為天下學士之勸而悰廷試之策往往不能奉承清問率意妄言固多疎略有司考覆既不入等陛下特賜進士出身擢為輔郡幕職聖恩優異極踰涯分臣亦上體朝廷之意不敢别有論列而近見悰申尚書省辭免新命狀乃云有敕告未敢抵授以祗為抵以受為授虛薄寡聞一至於此昔唐之省中有伏獵侍郎為嚴挺之所譏而罷今陛下方當右文之代初復制舉豈容有抵授賢良乎又聞悰祕閣程文已不合格而有司特為奏請乞與假借陛下曲加收録為後進之勸而廷試策紕繆益甚考官范百禄有章疏歴陳其尤亡狀者凡數條臣恐傳播寖廣實累修潔博習之舉伏望陛下懲其淺陋稍收誤恩追寢悰進士出身以塞公議兵部言涇原路隴山一帶係官地土不少自來為衆人指占量輸租課夤縁侵冒别無色役累准朝㫖令招刺弓箭手其人戸侵冒嵗乆財力富强奸弊日深上下因循未依朝㫖最是邉防大利害若非禀自朝廷置局招置摽撥無以杜絶奸弊從之政目云隴山田招弓箭手辛未詔文彦博章奏非陳乞致仕者仍許受進壬申户部請立明狀増錢買坊塲從之閏十二月十四日罷此法劉安世云云是月右正言劉安世言臣伏見御史臺彈尚書右丞胡宗愈任中丞日不償房緡及開封官吏受周知哲之訴而挾情違法不治其事臣亦嘗與左司諫韓川累具論列乞正其罪而章皆留中未䝉付外中間御史臺又申三省催促前奏比聞已得指揮更不施行臣竊謂陛下優容執政務全大體則可耳要之以天下公議而為朝廷逺慮則非也臣職在諌列義難緘黙輙冒誅譴再伸前論惟陛下察焉臣聞御史之任紀綱所繫而中丞者又為肅政之長固宜正身率下以厲風俗而宗愈貪冒不法以至興訟姦邪之人方為之游說曰此非大惡何足以罷執政是乃朋黨之論不可不察也今上自公卿下至匹夫粗能以廉節自好者豈肯稅人之居不給其直况宗愈身備從官職任憲長而貪鄙之行過於閭巷之人玷辱國體無大於此錢勰之在開封常以不畏彊禦為己任及周知哲陳訴則抑而不行茍非憚宗愈之權勢忽知哲之柔弱豈容滅裂如此之甚臣竊謂以常人觀之則未至大惡以禮義亷恥而責大臣則宗愈之貪濁錢勰之狥私何可逃於吏議臣既在言路目睹宗愈之不法而不加彈劾則是曠職以負陛下今宗愈所犯事狀明著臺諌交章置而不問若臣等所言出於誣捃則宜竄黜以明宗愈之無罪茍臣等所論既有實迹朝廷安可曲為容貸以沮天下之公議乎國家設御史六察本以彈劾有罪今御史舉事而不得行臣等論列而不䝉聽納如此則諌官御史遂可廢矣諫官御史廢則祖宗之法度朝廷之綱紀復何望哉臣固知論斥大臣非全身保禄之計然臣自孤逺小官䝉陛下不次擢用毎思自竭圗報萬分豈謂廟堂之間乃有如宗愈者其姦佞無恥朋邪罔上臣前後章疏言之已詳非特此不廉之一節而已也况宗愈竊位以來渉歴半嵗苐聞昬繆無所建明誠不足以當輔弼之任重朝廷之勢矧邪正並立枉直兩存臣恐忠賢解體天下失望惟陛下留神省察為宗社之大計罷免宗愈按劾開封府官吏使法之所行自貴近始豈惟臣區區之望實天下之幸也安世論明狀買坊塲或附此
