body:
  text: 續資治通鑑長編巻一百四十二宋李燾撰仁宗慶歴三年秋七月丙寅朔徙知澶州龍神衛四廂都指揮衛州防禦使郭承祜為真定府定州馬歩軍都部署丁卯詔殿前都指揮使李用和馬軍副都指揮使曹琮選諸軍班都虞候以下善弓馬曉文字堪将領者以名聞兵部員外郎兼侍御史知襍事方偕請文武官以罪謫監當者轉運提㸃刑獄司毋得差權知州軍通判知縣監押廵檢詔從其請戊辰翰林學士禮部郎中知制誥史館修撰蘇紳為龍圖閣學士知河陽先是王素歐陽修等為諫官數言事紳忌之㑹京師憫雨紳請對言洪範五事言之不從是謂不乂厥咎僭厥罰常𤾉盖言國之號令不専於上威福之柄或移於臣下虗譁潰亂故其咎僭又曰庶位踰節兹謂僣刑賞妄加羣隂不附則陽氣勝故其罰常𤾉今朝廷號令有不一者庶位有踰節而陵上者刑賞有妄加於下者下人有謀而僣上者此而不思雖禱于上下神祗殆非天意紳意盖以指諫官也㑹除太常博士馬端為監察御史紳所薦也修即上言端性憸巧往年常發其母隂事母坐杖脊端為人子不能以禮防閑陷其母於過惡又不能容隠使其母被刑理合終身不齒官聮豈可更為天子法官臣不知朝廷何故如此用人縱使天下全無好人亦當虗此一位不可使端居之况剛明方正之士不少臣求其故盖是從初不合令蘇紳舉人紳之姦邪天下共惡視端人正士如仇讎唯與小人氣類相合宜其所舉如此也端之醜惡人孰不知而紳敢欺罔朝廷者獨謂陛下不知爾此一事尚敢欺惑人主其餘䜛毁忠良以是為非又安可信伏乞寢端成命黜紳外任不可更為人主侍從紳由是黜端尋復以太常博士通判延州換内蔵庫副使知丹州端換官事在十月按范仲淹奏議是年四月二十八日舉端堪充館閣職事或知劇郡煩重任使端時再任通判延州蘇紳既舉端御史六月命下至十月仍以太常博士通判延州換官則是端御史之命雖下尋以修論列竟不曽入䑓也己巳徙宣徽南院使忠武節度使夏竦判亳州竦之及國門也上封章䟽示焉竦既還鎮言者猶不已㑹韓億致仕竦請代之故有是命竦又自請納節還文資仍不帯職乃除吏部尚書知亳州改除吏部在此月二十一日丙戌後此十七日今并書之既至亳州因上書自辨㡬萬餘言上書自辨㡬萬餘言此據正𫝊竦有集百巻獨無此書當考詔付學士批荅孫抃為之辭略曰圖功效莫若罄忠勤弭謗言莫若修實行竦得之甚恨語人曰恨於孫素無嫌而批荅見詆如此何哉此據孫抃行状御史中丞王拱辰請遇朔望日退御後殿召執政之臣賜坐以講時政得失上曰執政之臣朕早暮所與圖事者至於從容開述雖至中昃朕何怠焉又何朔望之拘也辛未詔自今中書樞宻院臣僚除常程奏事外如别有所陳或朕非時特留對者不限時刻范仲淹韓𤦺言臣等竊見陜西永興軍同耀華州陜府等處今夏災旱得雨最晚民間秋稼甚無所望官中倉廪亦無積貯若不作擘畫即百姓大段流移殍亡者衆兼軍食闕絶臨時轉漕不及臣等欲乞朝廷速降指揮委本路都轉運使孫沔速相度上件州軍向去救濟飢民及辦給軍食有何次第如難為擘畫即便於黄河内般輦自京以来斛米往彼應副仍速行相度㳂路如何計綱即不至艱阻事状聞奏候到乞朝廷早賜施行癸酉詔三班奉職以下換文資者歴官無􅂍罪雖三代非文資而有親叔伯弟兄見任者亦聽甲戌以太常丞直集賢院知涇州尹洙為右司諫知渭州兼管勾涇原路安撫都部署司事四方館使果州團練使知渭州張亢為引進使并代州副都部署時鄭戩統四路亢與戩議不合故也戩尋發亢在渭州過用公使錢監察御史梁堅亦劾奏亢出庫銀給牙吏往成都市易以利自入亢竟坐奪官奪官在四年正月詔自今三司副使以上非領邉寄而遭父喪並聽觧終制仍以月俸續之武臣非在兵而願觧官者亦聽初言者請臣僚遭喪並持服下太常禮院議而言禮記父母之喪無貴賤一也又曰三年之喪人道之至大也請不以文武品秩髙下並聽終喪上以武臣入流者雜難盡令觧官特裁定之乙亥太常禮院言祀昊天上帝當用蒼璧感生帝用四珪有邸近制乃同用四珪又祠髙禖比不設弓韣皆不應祀典請考正之奏可本志乃余靖奏靖奏議亦有此江淮制置發運使言捕殺軍賊王倫於和州倫初起沂州欲冦青州不得入遂轉掠淮南所向莫敢當京東安撫使陳執中遣都廵檢𫝊永吉追之制置發運使徐的督諸道兵合擊倫知歴陽兵敗被殺歴陽縣壯丁張矩等得其首級的具以聞丙子給事中叅知政事王舉正為禮部侍郎知許州初御史䑓舉屯田員外郎李徽之為御史舉正與徽之友壻格不行徽之因訟舉正妻悍不能制何以謀國事而諫官歐陽修余靖蔡襄咸言舉正懦黙不任職樞宻副使范仲淹有宰輔才不宜局在兵府願罷舉正以仲淹代之舉正亦自求罷上從其請徽之迪子也丁丑以樞宻副使右諫議大夫范仲淹為参知政事資政殿學士兼翰林侍讀學士右諫議大夫富弼為樞宻副使仲淹曰執政可由諫官而得乎固辭不拜弼直携誥命納於帝前口陳所以牢避之意且曰願陛下坐薪嘗膽不忘修政上許焉乃復以誥命送中書弼因乞補外累章不許戊寅遣使陜西河東簡閲諸軍六宅使帯御器械鄧保信永興軍環慶鄜延路左藏庫副使王懐政涇原秦鳳路西京作坊使帯御器械李知和河東路先是韓𤦺范仲淹言臣等竊見用兵之處諸軍内若有指揮使員僚得力則不唯訓練齊整兼臨陣之時各能将領其下士卒方肯用命若人員不甚得力則向下兵士例各驕惰不受指縱多致退敗顯是軍氣强弱繫於将校今来邉上諸軍人員甚有年老病患全不得力之人兼更有見闕人數不少若不早行選擇則恐将来依前誤事臣等欲乞朝廷於都知押班及近上内臣内選差諳歴邉事者三員内二員往陜西路一員往河東路計㑹逐處經略部署司勾集管下屯駐駐泊就糧諸軍人員同共揀選如内有年老脚手沉重并疾患尫弱不堪披帯及愚戅全無精神不能部轄者並開坐申奏内屯駐駐泊人員一靣發遣赴闕别與安排所有就糧指揮人員即更於逐人名下各令指射願管廂界去處聞奏仍勒在本營聽候朝㫖候揀選畢即據指揮見闕人便於諸軍十将以上揀選曽有功勞者并武藝髙强得力之人升一兩資給帖權管候将来轉員却依本資叙遷所貴将得人士卒増氣仲淹又言臣竊見去年以来自京差撥禁軍往陜西邉上屯戍内有諸處鄉軍雇到經販之人并向南諸處廂軍揀上添填逐指揮内有小弱怯懦之人道路指笑及到邉上不堪披帯閲教虗破禁軍諸般請受支賜今来又差𤼵兵士五千人往秦州添屯并續有諸軍發往邉上替換欲乞指揮下殿前馬歩軍司應在京及畿内諸軍今来并向去合起發往邉上兵士並須逐指揮依次勾来本司子細揀選下小弱不堪披帯之人更不令發往邉上其揀下小弱人數内元係在京諸司庫務并外路廂軍如却願歸本處舊指揮者並令送還内有身材比舊等樣小兩三指却少壮得力者即不得揀下所有年老患病之人即等第與剰員安排其逐指揮人員年老疾患不得力者亦便揀别與安排却於本指揮向下人員十将内揀選得功并武藝髙强人升一兩資權管勾當候轉員日依本資施行如本指揮人員十将内無可選揀即於以次指揮内選揀令權管補填勾當所貴在路便有幹了軍員部轄各得齊整不至依前作過他所兵士本營在外府軍者即委逐處長吏都監監押依此揀選起發仍乞指揮諸路部署司将去年秋後差到屯駐駐泊并令後差到兵士並依此揀選施行訖逐旋開坐聞奏所定武藝髙强湏以弓弩别定斗力及射親格式知諫院歐陽修言朝廷以郭承祜為鎮定都部署臣聞此除夙夜思維國家用兵已五六年未有纎毫所得挫盡朝廷威勢困却天下生靈細思厥由其失安在患在朝廷守常例不肯越次擇材心知小人付以重任後雖敗事亦終不悔今每有除擬人或問於大臣則曰雖知非材捨此别無人甚者欲塞人言則必曰爾試别思有誰可用乎臣亦常聞此言每退而歎息夫所謂别無人者豈是天下真無人乎盖不力求之爾今不肯勞心選擇越次而用但守常循例輕用小人寜悮大計一悮不悔後又復然至如葛懐敏頃在西邉天下皆知其不可當時議者但曰捨懐敏别未有人難為換易及其戰敗身亡横屍原野懐敏既不復生亦須别求人用臣謂今日任承祜亦猶當時用懐敏也况如承祜者凡庸奴𨽻之材不及懐敏逺甚頃在澶州只令築城㡬至生變豈可當此一路臣謂朝廷非不知承祜非才議者不過曰例當叙進别無人此乃因循之説爾方今强敵狂謀禍端已兆中外之士見國家輕忽邊患弛武北方人皆獻言願早為備忽見如此除改誰不驚憂前六符之来朝廷忍恥就議盖為河朔無可自恃難與速争須知屈意茍和少寛禍患今幸得此自紓之計所宜多方汲汲精選将臣先為禦備猶恐不及豈是因循守例任小人之日耶其郭承祜欲乞早移與一不用兵處知州或召還别與一間慢職秩若欲録其勲舊優其戚里間官厚祿足可飬之不必須令居此要任伏願陛下深思大計不憚改為則天下幸甚實録云修奏入不報據八月癸亥余靖所言則承祜已罷鎮定部署九月甲戌又改知相州非不報也今削不報二字辛巳詔諸路犯罪人自今不得配𨽻河北縁邉州軍范仲淹韓𤦺言臣等竊見陜西昨来興置營田本欲助邉以寛民力除㳂邉有空間膏腴土地可以開墾外其近裏州縣官吏不能體朝廷之意将逺年瘠薄無人請佃逃田抑勒近隣人戸分種或令送納租課又自来人戸租佃官莊地土每畆出課不過一二㪷今亦勒令分種每畆須収數㪷致貧戸輸納不前州縣追擾無時暫暇縁人戸自用兵以来科率勞敝至於已業尚多荒廢實無餘力更及營田其所出租課多是抱虗送納竊覩編𠡠指揮不得将逃戸田土抑勒親鄰佃蒔盖恐害民况今嵗災旱尤甚理當優䘏不可非理煩擾使之重困臣等欲乞特降指揮應陜西近裏州軍營田一切廢罷如元係租佃即令依舊額出課如元係逺年瘠薄逃田舊税額重無人請佃者即與減定税額召人請佃所貴疲民受賜歸感睿仁詔罷陜西内地州軍營田甲申樞宻副使任中師為河東宣撫使范仲淹為陜西宣撫使仲淹既辭参知政事願與韓琦迭出行邉上因付以西事而仲淹又言河東亦當為備中師嘗守并州上即命使河東兩人留京師第先移文兩路云乙酉元昊復遣吕尼維定興舎僚禮旺約特和爾與邵良佐俱来所要請凡十一事其欲稱男而不為臣猶執前議也諫官歐陽修言元昊再遣使人至闕和之與否决在此行竊計廟謀合思成筭臣謂此最大事天下安危繫之今公卿士大夫愛國者人人各為陛下深思逺慮惟恐廟堂之失策遂落敵國之姦謀衆口紛紛各有論議一曰天下困矣不和則力不能支少屈就之可以紓患一曰恐元昊詐和而不敢罷兵則與不和無異是空包屈就之羞全無紓患之實一曰請和之後不過欲退而休息訓兵選将以為後圖然以河朔料之纔和之後因循廢弛為患轉深一曰縱使元昊稱臣西邉減費然猶有大可憂者北方必攬通和之事以為已功過有邀求遂興兵革是暫息小患於關西復生大患於河北臣忝為耳目之官見國有大事旁采衆論雖有異同然大抵皆為就和則難不和則易不和則害少和則害多然臣又不知朝廷之意其議云何臣見漢唐故事祖宗舊制大事必湏集議盖以朝廷示廣大不欲自狹謀臣思公共不敢自擅故舉事多臧衆心皆服自兵興以来常祕大事初欲不使人知及其處置乖違豈能掩蔽臣謂莫若採大公之議収衆善之謀待其所言無可採自用廟謀固亦未晚元昊事乞於使人未至之前先集百官廷議必有長策以裨萬一此疏實録繫之七月甲午甲午二十九日也按實録已於此月庚寅載修請以班行侍西使庚寅二十五日也考其文意集議疏當在前班行侍西使疏當在後今移此繫之乙酉日余靖言臣竊見朝廷每遇契丹遣使到闕元昊差人来朝大臣商量惟欲祕宻兩制兩省御史中丞已下雖名侍從供奉之官當時並不聞知及處置既了縱或不便無由論列臣伏思國家建置侍從之官以救闕失盖欲舉無過事謀無遺䇿且書不云乎謀及卿士謀及庶人謀及卜筮是事有大疑謀欲其廣也漢武帝征伐四方開置邉郡侍從之臣数屈丞相漢史稱之以為美談今柄臣宻議外不得聞一慮或失救之不及勢之可憂者也伏乞宣諭大臣凡此北敵西戎之事繫之安危者侍從諫諍之官悉令聞之使陳利害不為漏洩𫝊云謀之欲多斷之欲獨此御國之要也惟陛下裁擇余靖疏不得其日月附見歐陽乞集議西事後己丑度支副使戸部員外郎施昌言為天章閣待制河北都轉運按察使初張存以龍圖閣直學士兵部郎中知成徳軍擢右諫議大夫付漕事存辭之乃復歸故官知成徳而遣昌言出使時言事者以為濵棣等六州河可渉宜有城守如邉以待契丹詔昌言與内侍押班楊懐敏往視懐敏以為當城昌言曰六州地千里又河數移徙城之甚難而無利今縱契丹渝盟當以計屈之不如是而先自困非便也朝廷以昌言所奏為然城濵棣六州據昌言傳附見昌言十月庚戌改使河東傳乃脱之今依實録别見於彼庚寅詔廣南運使諸配軍有累犯情渉凶惡者許便宜處斬以事聞知保州東染院使封州刺史康徳輿為真定府定州路兵馬鈐轄朝議将罷郭承祜都部署而難其代故暫以兵事付之徳輿也實録承祜九月甲戌始罷鎮定知相州據歐陽修論李承亮䟽則除康徳輿為鈐轄時已罷又據八月癸亥余靖所上䟽論承祜固欲得鎮州然則承祜罷都部署果不待九月矣不知實録何故不同今從修靖䟽附此當考先是歐陽修言竊知元昊所遣来人将欲到關風聞管勾使臣須索排比次第甚廣又聞纔至欲賜御筵管領臣知昊賊此来意極不遜臣料朝廷必欲要其臣服方許通和如此則須有以挫之方能抑其驕慢乃可商量今若便於禮数之間過加優厚則彼謂我為怯知我可欺議論之間何由屈折若果能得其心則待議定之後稍加禮數亦未為遲仍湏杜漸防㣲常為挫抑之計豈可一事未成先虧國體其元昊一行来人伏乞凡事減勒無令曲加優厚若因此得其挫抑而臣伏則吾計無失如其必不伏則免至虗虧事分也於是修又言聞朝廷欲以殿中丞任顓館待元昊所遣来一行人等臣竊知元昊此来全無好意不肯稱臣索物太多其志不小乃是欲以强相迫脅爾朝廷既不能從則待其来人凡事不可過分至於禮數厚薄賜與多少雖云小事不足較量然事體之間所繫者大兵交之使来入大國必須窺伺将相勇怯覘察國家强弱若見朝廷威怒未息事意莫測必内憂斬戮次恐拘留使其偶得生歸自為大幸則我弱形未露壮論可持今若便損國威過加厚禮先為自弱長彼驕心使其知我可欺則議論愈益難合必欲成就其事尤須鎮重為先况其議未必成可惜空損事體前次元昊来人至少朝廷只以一班行待之今来漸盛遂差朝士若其後来者更盛則必須差近侍矣是彼轉自强我轉自弱况聞邵良佐昨来往彼僅免屈辱而還則彼雖僻陋不謂無謀今其来人必須極騁强辭以圖相勝若能先薄其禮以折之亦挫賊之一端也其元昊来人欲乞更不差官管待送置驛中不須急問至於監視饋犒𫝊道語言一了事班行足矣臣料國家今若不能曲從其意即使首寵来人厚加禮遇元昊不免出兵攻冦逞彼忿心等是不和何必自虧事體不若急修邉備以圖勝筭修雖有此議然朝廷竟不從也余靖言風聞西驛勾當使臣與如定等下行舖収買物色太多此非國家之意臣竊以朝廷含育西戎㤙過天地元昊累世飜覆性同禽獸盖縁從前豢飬過厚以致今日䟦扈難制非恩意不足也昨者賀從朂来朝廷賚賜逾禮在賊常分固宜感恩今者如定之来乃形割地之辭不肯易朝服又知賊意輕侮中國甚於前時朝廷待之尤當減於從朂始合事體今若恣令買物過於契丹之使儻此回謀議未合使人復来不知復以何禮待之惟朝廷每事裁損庶存大體則國家之幸也辛卯祠部員外郎集賢校理李昭遘為直史館知陜州歐陽修言陜為關中要地昭遘無治劇之才不宜遣乃以提㸃陜西刑獄祠部郎中王居白為直史館知陜州居白珪九世孫也沔知陜州刑部郎中直史館張沔為河北轉運按察使初葛懐敏敗關中震驚兵少不足自守朝議不暇逺徙詔中使即崤澠之間遮四路歸師悉還補其闕士卒乆出塞自以得生歸復驅之就死地人以言相激㧞刀彍弩且欲絶河橋為變中使無如之何馳入陜以詔書屬沔而去吏人大駭将奔逃沔騎出郊矯詔諭之云賊已出境有詔令諸軍趨還營毋得差池衆見沔之易也皆帖然就道莫敢喧譁范仲淹經略陜西梁適奉使延州皆奏沔權宜合變消亂止禍當厚其賞不報此據御史䑓記及劉敞誌沔墓誌也著作佐郎邵良佐為著作郎仍賜五品服以使夏州之勞也癸巳韓琦范仲淹並言陜西河東縁邉州軍及城寨主兵武臣例皆五年磨勘既與内地勞逸不均故多不願就邉任以此将佐而下常患之人况戰守之地責其死節苟循常規将何以勸望令陜西河東縁邉州軍及城寨主兵武臣在任滿三年者並特轉一資如經改官而舉留再任者滿日更與轉一資並不隔磨勘從之元昊既未肯臣如定等来又多所要請兩府􅌅兵欲姑從之獨韓𤦺以為不可屢奏對於上前晏殊曰衆議已同惟韓𤦺獨異上顧問𤦺𤦺歴陳其不便上曰更審議之及至中書𤦺持不可益堅殊變色而起𤦺退復上章曰今西界遣人議和其患有三昨朝廷曽逹意契丹欲令元昊納􅅃其荅書云梁適口陳夏䑓之事已差右金吾衛上将軍耶律祥彰武軍節度使王惟吉齎詔諭元昊令息兵况其先臣徳昭北朝曽封夏國主仍許自置官屬至元昊亦容襲爵自来遣人進奉每辭見燕㑹並陞坐於矮殿今兩朝同一家若元昊請罪其封冊禮待亦宜一如北朝臣觀邵良佐賊中語録乃云賊言朝廷議和必往問契丹昨昊賊先遣人至保安軍言為朝廷差梁諫議適往北朝令本國議和北朝亦差耶律祥等至本國故遣賀從朂等持書而来是昊賊因契丹逹意而来及與良佐語反不承納又所求稱號即與契丹書中事體相違此是固有可疑若朝廷且務休兵許其不臣契丹聞之必然别索名分既不可屈則恐因此為名再隳誓約此一患也若只許冊為國主略増良佐所許嵗遺之數朝廷更不差人只令来人齎詔而回恐賊未副所望則謂朝廷已與之絶必忿而興兵契丹亦謂阻其来意縁此生事此二患也若再使人齎詔諭以封冊之禮不可異於北朝更優増良佐所許之數賊既從命則契丹以為已功遣使来賀或自尊大或頻有邀求乆則難從此三患也朝廷始欲假契丹以制元昊事未可知而三患已形不得已則莫若擇其輕者行之其欲呼為烏珠及自稱年號又遣使到彼參於殿上與陪臣為列此豈終為便望且令中書樞宻院再三論難使朝廷得大體契丹無争端以此議和庶為得䇿諫官蔡襄言元昊始以烏珠之號為請及邵良佐還乃欲更號吾祖足見羌賊悖慢之意也吾祖猶言我翁也今縱使元昊稱臣而上書於朝廷自稱曰吾祖朝廷賜之詔書亦曰吾祖是何等語耶余靖言元昊所遣如定等已於紫宸殿朝見竊聞元昊所上書中有吾祖之稱今遽令来人朝見臣初慮朝廷之意厭苦用兵恐其乗秋侵擾邉鄙所以僶俛曲從但云夷狄不足與争得其稱臣則不惜呼為吾祖臣朝夕思之此乃西賊侮玩朝廷之甚古者有稱單于可汗之類皆夷夏共知若從其俗固無嫌今賊昊無端撰此名目且彼稱陛下為父却令陛下呼為我祖此非侮玩而何賊又言九州十三縣是其故土况靈鹽綏宥皆朝廷舊地若辨封域猶當歸之國家許蠻夷者不一而足惟陛下留神磨以嵗月則天下幸甚歐陽修言伏見如定等来西賊欲稱吾祖嚮聞朝議已不許之今日風聞議却未定不知虗的深切驚憂且吾祖兩字是何等語便當拒絶理在不疑安有未定之説哉夫吾者我也祖者俗所謂翁也今匹夫臣庶尚不肯妄呼人為父若欲許其稱此號則今後詔書須呼吾祖是欲使朝廷呼蕃賊為我翁矣不知何人敢開口且蕃賊撰此號時不過欲侮玩中國而已今若得其稱臣此二字尤須論辨今自元昊以下名稱官號皆用夷狄若蕃語烏珠華言吾祖則今賊中每事自用夷禮安得惟於此號獨用華言而不稱烏珠且彼於我稱臣而使我呼為祖於禮非便故當以此折之可也朝廷自有西事已来處置乖方取笑於人者多矣未有如此事之可笑也竊慮小人妄有議論伏乞拒而不聽修又言竊聞朝議不許賊稱吾祖必欲令其稱臣然後許和此乃國家大計廟堂得䇿盖由陛下至聖至明不茍目前之事能慮向去之憂斷自宸衷决定大議然數日前風聞頗有無識之人妄陳愚見不思逺患欲急就和臣雖知必不能上惑聖聰然亦慮萬一少生疑沮則必壊已成之計臣職在言責理合辨明伏自賊請和以来衆議頗有同異多謂朝廷若許賊不稱臣則慮契丹别索中國名分此誠大患然臣猶謂縱使賊肯稱臣則契丹尚有邀功責報之患是臣與不臣皆有後害如不得已則臣而通好猶勝不臣然於後患不免也此有識之士憂國之人所以不願急和者也今若不許通和不過懼賊来冦爾且數年西兵遭賊而敗非是賊皆善戰盖由我自謬謀今如遣范仲淹處置邉防稍不失所則賊之勝負尚未可知以彼驕兵當吾整旅使我因而獲勝則善不可加但得兩不相傷亦足挫賊鋭氣縱仲淹不幸小敗亦所失不至如前後之謬戰此善筭之士見逺之人所以知不和害小而不懼未和也臣謂方今不羞屈志急欲就和者其人有五一曰不忠於陛下者欲急和二曰無識之人欲急和三曰姦邪之人欲急和四曰疲兵懦将欲急和五曰陜西之民欲急和自用兵以来居廟堂者勞於斡運在邉鄙者勞於戎事若有避此勤勞茍欲陛下屈節就和而自偷目下安逸他時後患任陛下獨當此臣所謂不忠之臣欲急和者也和而偷安利在目下和後大患伏而未發此臣所謂無識之人欲急和者也自兵興以来陛下憂勤庶政今小人但欲苟和之後寛陛下以太平無事而望聖心怠事因欲進其邪佞惑亂聰明大抵古今人主憂勤小人所不願也此臣所謂姦邪之人欲急和也屢敗之軍不知得人則勝但謂賊来常敗此臣所謂懦将疲兵欲急和此四者皆不足聽也惟西民困乏意必望和請因宣撫使告以朝廷非不欲和而賊未遜順之意然後深戒有司寛其力役可也其餘一切小人無識之論伏願聖慈絶而不聽使大議不沮而善筭有成則社稷之福也甲午樞宻副使韓琦上疏曰臣聞漢文帝襲髙恵承平之後躬行節儉國治民富刑措不用時賈誼上書言事尚以為可慟哭太息豈其過哉盖憂深思逺圖長乆之計欲大漢之業垂千萬世而無窮者今陛下紹三聖之休烈仁徳逺被天下大定民樂其生者八十餘載矣而臣竊覩時事可謂晝夜泣血非直慟哭太息者何哉盖以西北二敵禍釁已成而上下泰然不知朝廷之将危宗社之未安也臣今不暇廣有援引請粗陳其大槩竊以契丹宅大漠跨遼東㨿全燕數十郡之雄東服髙麗西臣元昊自五代迄今垂百餘年與中原抗衡日益昌熾至於典章文物飲食服玩之盛盡習漢風故其氣愈驕自以為昔時元魏之不若也非如漢之匈奴唐之突厥本以僻逺自處與中國好尚之異也近者復幸朝廷西方用兵違約遣使求關南之地以啟争端朝廷愛念生民為之隠忍嵗益金幣之數且固前盟而尚邀獻納之名以自尊大其輕視中國情可見矣又元昊父祖以来蓄飬姦謀招納亡命雖外示臣節而内完兵力至元昊則好亂逞志併甘凉諸蕃以拓境土自度種落强盛故僣號背恩北連契丹欲成鼎峙之勢非如繼遷昔年跳梁於銀夏之間爾元昊累嵗盜邉官軍屢衂今乗定川全勝之氣而遣人約和則知其計愈深而其事可虞也議者或謂昨假契丹𫝊導之力必事無不合豈不思契丹既能使元昊罷兵豈不能使元昊舉兵乎比来辭禮驕抗殊未屈下契丹之言既已無騐亦恐有合從之䇿以困中原朝廷若軫西民之勞暫求休飬元元且以金帛啗之待以不臣之禮臣恐契丹聞之謂朝廷事力已屈則又遣使移書過邀尊大之稱或求朝廷不可從之事隳其誓約然後以舉國之衆直趨大河復使元昊舉兵深冦關輔當是時未審朝廷以何術而禦之或西鄙稱藩専事契丹陛下親御六師臨澶淵以待之即未知今之将卒事力與環衛統帥比真宗北征時何如欲駐蹕北京以張軍勢臣恐契丹由徳博渡河直趨京師則朝廷根本之地宗廟宫寢府庫倉廪百官六軍室家所在而一無城守之略陛下可擁北京之衆却行而救之乎臣所以謂可晝夜泣血者誠憂及于此冀陛下一寤而急為拯救也朝廷若謂今之盟約尚可固結則前三十年之信誓朝廷何負二國而一旦違之哉彼無厭之心見利而動又可推誠以待之乎夫得于先見預為之防則功逸而事集若變生倉卒駭而圖之雖使良平復生為陛下計亦不能及矣臣是以夙夕思之朝廷若不大新紀律則必不能革時弊而弭大患臣輙盡當今所宜先行者七事條略以獻其大略一曰清政本樞宻院本兵之地今所主多苛碎眇末之務中書公事雖不預聞恐亦類此謂宜詔中書樞宻院事有例者著為法可擬進者無靣奏其餘微𤨏可悉歸有司使得從容謀議賜對之際専論大事二曰念邉事今政府循故事纔午即出欲稍留則恐疑衆退朝食罷忽遽簽書而去何暇議及疆事哉謂宜須未正方出延此一時以専邉論三曰擢材賢自承平以来用人以叙遷之法故遺才甚多近中書樞宻院求一武臣代郭承祜聚議累日不能得謂宜倣祖宗舊制於武臣中不次超擢以試其能四曰偹河北自契丹通好三十餘年武偹悉廢近慢書之至騷然莫知所為宜選轉運使二員宻授經略責以嵗月使營守禦之備則我待之有素也五曰固河東前嵗昊賊陷豐州掠河外屬戸殆盡麟府勢孤絶宜責本道帥度險要建城堡省轉餉為持乆之計六曰収民心祖宗置内蔵庫盖偹水旱兵革之用非私蓄財而充已欲也自用兵以来財用匱竭宜稍出金帛以佐邉用民力可寛而衆心安矣七曰營洛邑今帝都無城隍之固以偹非常議興葺則為張皇勞民不若隠葺洛都以為遊幸之所嵗運太倉羡餘之粟以實其廪庾則皇居壮矣繼又陳八事大略謂當今救弊之術不過選将帥明按察豐財利抑僥倖進有能之吏退不才之官去冗食之人謹入官之路然数事之舉謗必随之願委信輔臣聽其措置雖有怨謗斷在不疑則紀綱漸振而太平可期二敵豈足為國之患哉上嘉納之𤦺此疏正史實録俱不載據家𫝊以為𤦺既入樞府即上此疏條列七事繼上八事李清臣行状亦不載此疏却云𤦺以九事對天章閣之後繼又獻七事當是此疏所條列者然開天章閣乃九月初三日𤦺自樞府出使陜西實八月十八日恐開閣時𤦺已不在京師行状未可信也若初入樞府此疏即上則又恐太早疏云中書樞宻院聚議求一武臣代郭承祜不能得而七月二十五日康徳輿初授鎮定鈐轄按歐陽修論李昭亮劄子則徳輿實承祜之代也今隠度附七事疏於七月末所稱八事與行状九事不殊今依家𫝊并附此范奏議河北七事與韓同在四年六月辛邜朔更詳之八月乙未朔封皇第四女為寳和公主後五日薨追封越國公主生始三嵗其母張修媛也丙申右正言知制誥田况為陜西宣撫副使范仲淹請選近臣同使陜西每事議而後行庶無差失詔以命况天聖編敕既施行自景祐二年至今所増又四千七百餘條丁酉復命官刪定翰林學士吳育侍御史知雜事魚周詢權判大理寺杜曽知諫院王素歐陽修並為詳定官宰臣晏殊參知政事賈昌朝提舉既而修言曽嘗盜父妾生子遂出知曹州皇恐㬥卒據實録曽以十月丙辰出知鄧州不載歐陽修有言今從本𫝊戊戌詔諫官日赴内朝先是知制誥田况言有唐兩省自諫議大夫至拾遺補闕共二十人毎宰相奏事諫官随而入有所闕失即時規正其實皆中書門下之屬官也今諫議大夫無復職業自司諫正言知諫院皆遺補之任而朝廷責其言如大夫之職矣而地勢不親位序不正在朝廷間與衆人同進退非所以表顯而異其分也今筦庫冗散之吏尚赴内朝豈諫諍之臣不得日奉朝請臣前在諫院每聞一事皆諸處采問比及論列或至後時今若今諫官得奉内朝則可以日聞朝廷之事矣兼王素歐陽修蔡襄皆以他官知諫院居兩省之職而不得預其列於禮未便欲乞今後並令綴兩省班次所貴名體相稱副陛下選求之意詔送兩制詳定學士承㫖丁度等參詳規諫之官號清望之選宴閒紬繹最為切近欲乞今後比直龍圖閣及修起居注例令日赴内朝從之况嘗靣奏事論及政體帝頗以好名為非意在遵守故常况退而著論上之其略曰名者由實而生非徒好而自至也堯舜三代之君非好名者而鴻烈休徳倬若日月不能纎晦者有實美而然也設或謙弱自守不為恢閎睿明之事則名從而晦矣雖欲好之豈可得耶方今政令寛弛百職不修二敵熾結凌慢中國朝廷恫矜下民横罹殺掠竭瀝骨血以資繕備而未免侵軼之憂故屈就講和為翕張予奪之術自非君臣朝夕恥憤大有為以遏後虞則愈可憂矣陛下若恐好名而不為則非臣之所敢知也陛下儻奮乾剛明聽斷則有英睿之名行威令懾姦宄則有神武之名斥奢汰革風俗則有崇儉之名澄冗濫輕㑹斂則有廣愛之名悦亮直惡諛媚則有納諫之名務咨詢逹壅蔽則有勤政之名責功實抑僥倖則有求治之名今皆非之而不為則天下何所望乎抑又聖賢之道曰名教忠誼之訓曰名節此羣臣諸儒所以尊輔朝廷紀綱人倫之大夲也陛下從而非之則教化㣲節義廢懐詬無恥之徒争進而勸沮之方不行矣豈聖王率下之意耶己亥出内藏庫紬絹三百萬下三司以助經費用韓琦之言也詔諸路走馬承受公事非本職不得輙言他事辛丑詔陜西河東經略轉運司應本路有䇿試方略并南省特奏名授官未該恭選長史司馬文學助教不理選限人未至疲老願入縁邉官者並以名聞從范仲淹韓𤦺奏請也丁未以樞宻副使右諫議大夫范仲淹為参知政事資政殿學士兼翰林學士右諫議大夫冨弼復為樞宻副使弼猶欲固辭㑹元昊使辭羣臣班紫宸殿門上俟弼綴樞宻院班乃坐且使宰臣章得象諭弼曰此朝廷特用非以使敵故也弼不得已乃受晏殊以弼為女壻引嫌求罷相上不許又求觧樞宻使亦不許修媛張氏寵愛日盛冠于後庭忽感疾進白帝曰所以召災者資薄而寵厚也願貶秩為美人庶㡬可以消咎譴帝許之戊申以修媛為美人己酉起居舎人知制誥孫抃為契丹國母生辰使洛苑副使馮行已副之鹽鐡副使工部郎中張昷之為契丹生辰使西頭供奉官閤門祗候丁億副之戸部員外郎兼侍御史知雜事魚周詢為契丹國母正旦使閤門通事舎人李惟賢副之工部郎中李鉞為契丹正旦使東頭供奉官閤門祗候趙牧副之仍詔惟賢權更名寳臣億為意以避契丹諱諫官歐陽修言伏見差孫抃等使契丹臣謂朝廷新遭契丹侮慢凌辱之後必能發憤每事掛心凡在機宜合審措置及見抃等被選乃知忘忽慮患依舊因循今西賊議和事連契丹中間屢牒邉郡来問西事了與未了今専使到彼必先問及應對之間動關利害一言茍失為患非輕豈可令抃先往抃夲蜀人語音訛謬又其為性静黙自安軍國之謀未嘗與議凡關機事多不諳詳臣聞古者遣使最號難才不授以辭許其専對盖取其臨事而敏應變無窮今抃既不可預教以言則将何以應變茍一踈脱取笑四方其孫抃欲乞不令出使或恐中書不能逆抃人情尚守前議即乞别令一人言語分明稍知朝廷事者先往貴不悞事且契丹君臣頗為强黠中國常落其計不是不知今欲雪前耻雖知未能其如後患豈可不慮伏望聖慈早令兩府别議不報辛亥賞捕殺王倫之功以和州通判都官員外郎李熙古為職方員外郎知鳳州京東同提舉都廵檢左班殿直閤門祗候傅永吉為禮賔副使兼閤門通事舎人沂州廵檢三班借職宋璘為右侍禁閤門祗候指使散直長行鄭安為三班奉職差使殿侍李九臯為三班借職和州編管人前西頭供奉官閤門祗候趙鼎為供奉官和州歴陽縣壮丁張矩為三班奉職陳明尚亨並為三班借職軍校許千等遷擢凡七人淮南江浙荆湖制置發運使兵部員外郎徐的亦以功加工部郎中直昭文舘的遷工中直館乃十一月己丑今并書的𫝊云以殺倫故加工郎中以𤼵滯鹽政又加直舘寶録俱不載但於己丑日并書今從之諫官歐陽修言臣近因軍賊王倫等事累有奏論為見天下空虗全無武偹指陳後漢隋唐亡國之鍳皆兵革先興而盜賊繼起不能撲滅遂至横流又見國家綱紀隳頽政令寛弛賞罸不立善惡不分體弱勢危可憂可懼欲乞朝廷講求禦盜之術峻行責下之法兼聞搢紳之内憂國者多有封章皆論賊事臣但謂朝廷見己形之患聞衆多之言必動於心略知恐懼及聞樞宻院戒勒進奏官不使外人知事方認兩府厭苦獻言之人又見自和州奏破王倫之後更不講求禦賊之策又認上下已有偷安之意殊不知前賊雖滅後賊更多今建昌一火四百餘人桂陽監一火七百餘人其餘池州觧州鄧州南京等處各有强賊不少皆建旗鳴皷白日入城官吏逢迎飲食宴樂其敢如此者盖為朝廷無賞罰都不足畏盜賊出沒不能禁止臣恐上下因循日過一日國家政令轉弱盜賊威勢轉强使畏賊者多向國者少天下之勢從此去矣臣竊聞京西提㸃刑獄張師錫為部内使臣與賊同坐喫酒及廵檢縣尉不肯用心曽有奏論其言甚切臣舊識師錫其人恬静長者遲緩優柔不肯生事今尚有奏論則天下無賢愚皆為國家憂之獨不憂者朝廷爾嗟夫古之知士能慮未形之機今之謀臣不識已形之禍以患為樂以危為安見盜賊雖多而時有敗者遂生翫冦之心見言事者衆而聽之已熟遂有忽人之心臣近曽求對便殿伏䝉陛下語及賊事憂形于色及退見宰輔間暇從容天下之事深可憂矣今建昌桂陽賊数不少想其為害尤甚王倫在逺更合留意今自京𤼵兵則道逺不及外處就撥則處處無兵欲乞嚴敇大臣鍳此已成難救之患速講禦盜之法頒行天下使四方漸為偹禦仍早擘畫剪撲諸處見在賊数自有賊以来羣臣上言者皆為自来寛法所以不肯用心捉賊皆乞峻行法令近見池州官吏各罰銅五斤乃知言者皆不䝉聽納臣謂大臣為國計者寜厭忠言之多不厭盜賊之多乃如此行事爾前後上言賊事文字不少仍乞類聚擇其長者講定法制今大臣不肯峻法以繩官吏盖由陛下不以威刑責大臣此乃社稷安危所繫陛下之事也伏望留意而行之知諫院蔡襄言已差范仲淹宣撫陕西近又除参知政事未有廵邉之日竊以西賊遣使入朝其言驕慢必無可從之理原其狡心本無欲和之意朝廷既罷遣之其勢必湏舉兵况使人在此未知和與不和而縁邉繼奏西賊㸃集兵馬時候漸寒邉事益起安危之機在此一舉仲淹乆留邉郡威名在敵若早令将陛下之威經制事宜則關中百姓有休息之期如或堅守城寨使賊逺来無所虜掠亦足以挫賊之鋭氣邉将雖多莫如朝廷輟柄臣以臨之柄臣之中莫如仲淹自行望於西人未行之間早遣廵邉無使後時以失大計壬子皇第五女薨進封鄆國公主生甫二嵗母曰御侍馮氏癸丑樞宻副使右諫議大夫韓𤦺為陕西宣撫使先是范仲淹及任中師分路宣撫踰月皆未行琦言于上曰賊請和無他則二人遥領宣撫事可矣彼若未副所望必乗忿盜邉當速遣仲淹河東則臣方壮可偹奔走中師宿舊大臣毋勞往也乃詔𤦺代仲淹宣撫陕西而中師卒不行歐陽修言風聞如定等不乆放還竊縁此来議論必未諧和須慮驕賊猖狂忿兵致冦凡關邉偹正要枝梧伏覩朝㫖已差范仲淹田况等為宣撫使副今日風聞韓琦以仲淹已作参政欲自請行不知是否以臣愚見不若且遣仲淹速去𤦺與仲淹皆是國家委任之臣材識俱堪信用然仲淹於陕西軍民恩信尤為衆所推服若仲淹外捍冦兵而𤦺居中應副必能共濟大事庶免後難若陛下以新命仲淹責其展効則且令了此一事俟邉防稍定不三兩月可以還朝既先弭於外虞可漸修於闕政今邉事是目下之急不可遲緩以失事機伏望斷自宸衷趣仲淹速去以偹不虞大理寺丞張子奭為秘書丞與右侍禁王正倫使夏州子奭宗禮子齊賢孫歐陽修言臣竊聞昊賊来人議論數日全無遜順之意朝廷又欲遣子奭復往賊中仍聞且只令在延州伺候賊意待其来迎方敢前進不知果有此議否若實有之大為不便臣謂方今兩議未决正是各争名分之時尢不可自虧事體元昊既見朝廷議論不合必料邉防須為准偹其偽以好辭来迎子奭使我望和而少弛然後出不意以攻子奭或被拘留或遭虐害以為中國萬世之辱則悔何及焉雖不如此使子奭端坐延州不来省問欲歸則又慮来迎乆待則寂然無報進退不得何耻如之盖元昊已與中國三次商量必知難合子奭之往又别無議論未盡之事彼必不急求相見則於臣二説慮有一焉臣不知朝廷以昊賊為可臣乎若其可臣則自當以重兵壓境仍選忠厚知謀之士直入賊中説令臣服如其不可則何必遣人或但欲遷延嵗月不拒絶之則止當因如定之囬賜以甘言許其厚賂諭以若能遜順則使通意邉臣俟得其實然後定議乃是未絶其來之意也不可令使臣待賊命而進退萬一遭其拒絶或被拘執則於事無益空損國恩為今計者不若速遣范仲淹嚴偹邉境徐放如定等還當自為謀以求勝筭乙卯監察御史蔡禀言周制四時饗親之禮有九今寺觀則車駕一嵗再臨未嘗薦獻非奉先教民之意上謂輔臣曰朕三嵗一祠郊廟而賚及天下今若嵗親行之則人皆有覬賞之心朕朝夕奉三聖御容于禁中未嘗敢怠也禀齊弟也詔閤門祗候曽任知州軍提㸃刑獄公事者依七品例贖銅丙辰以度支判官司封員外郎鄭驤權陕西轉運按察使兼三門發運使司封員外郎判鹽鐡勾院夏安期為京西轉運按察使兼白波發運使舊制三門白波發運使治河清縣議者以置使煩而比嵗漕益耗故令陕西京西兼領之驤河南人安期竦子也本志云舊有三門白波黄渭河水路𤼵運使一人判官一人慶歴三年罷𤼵運使其發運使事分𨽻陕西京西兩路轉運使猶存三門𤼵運判官一員以白波𤼵運判官兼知西京河清縣事而添置河隂𤼵運判官兼知孟州河隂縣事丁巳給空名宣頭百道下陕西宣撫使韓𤦺以偹賞功戊午罷武學改武學教授太常丞阮逸兼國子監丞其有願習兵書者許於本監聽讀既立武學議者以為古名将如諸葛亮羊祜杜預裴度等豈嘗専學孫吳立學無謂故亟罷之此據張唐英政要劉敞集有議論當檢附熙寕五年六月復置辛酉詔陕西比有賊張海郭豹山羣行剽刼州縣不能制其令左班殿直曹元喆張宏三班借職黎遂領禁兵往捕之按明年三月庚辰知潁州栁植坐軍賊𤼵所部降官知黄州植時領京西安撫使故也此云陕西恐誤或張海等自陕西轉入京西爾韓𤦺家𫝊云附此年末可参考又何郯乞不除桞植蔡州奏議云植前知鄧州張海在界内始圖結集未甚猖熾通判職官建議請行擒捕植略不聽飬成賊勢焚蕩却京西數處州縣然則張海實起京西也太常禮院言四時薦饗太廟奉慈廟皇后廟酌獻升降樂章廟皆别辭唯送神則通用之其奉慈及后廟送神樂章請下學士更撰從之知永興軍龍圖閣直學士兵部郎中吴遵路被疾猶决事不輟手自作奏請判西京留司御史䑓優詔不許及卒上甚悼之遣官䕶喪還京師遵路事母孝立朝敢言既殁室無長物范仲淹分俸賙其家壬戌翰林侍讀學士左司郎中楊偕知越州時元昊乞和而不稱臣偕以謂連年出師國力日蹙宜權許之徐圖誅滅之計諫官王素歐陽修蔡襄累章劾奏偕職為從官不思為國討賊而助元昊不臣之請罪當誅陛下未忍加戮請出之不宜留處京師帝以其章示偕偕不自安故求外補未至越州改杭州癸亥贈御前忠佐馬軍副都頭朱進為蘄州防禦使進死事故也諫官余靖言朝廷啗契丹以金繒與之再盟所以恵寛生靈也今日報山外事乃西戎借勢欲就過求之謀契丹恃衆必生非意之變方此之時處置論議動干利害一失不中為患非輕且今之鄉兵最近古制而楊偕奏請罷去此議者之不臧也河北之将惟劉貽孫王果數人而已近聞貽孫乃為李昭述所奏欲加之罪此按察之非當也又聞王果為鄭戩辟移永興都監果諳河北人情今乃徙之關中關中急河北豈不急耶而徒為此紛紛也又劉渙知滄州刺一逃軍轉運使以為恣暴而降之郭承祜罷鎮定部署而固欲得鎮州其偃蹇如此而朝廷略不加罪欲望威行而事舉其可得乎願陛下不以邉事為略而審裁之
