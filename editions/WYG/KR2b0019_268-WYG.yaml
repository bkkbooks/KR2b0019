body:
  text: 續資治通鑑長編巻二百六十四宋李燾撰神宗熈寜八年五月辛酉朔䟽決開封府繫囚雜犯死罪以下第降一等杖以下釋之府界及諸路亦如之詔監司提舉司於察訪體量官並申狀吏人有習法令錢榖卓然可選用者察訪體量官具名上中書軍器監言在京及諸路造大名府澶定州軍器什物欲分遣官催促仍委逐路職司一員往来提舉從之詔御史臺劾世居本宫尊屬最長者以聞甲子詔分環慶路兵五萬二千六十九馬六千四百七十六為四將副總管林廣為中軍將都鈐轄梁從吉副之鈐轄种古為第二將董頴叔副之都監雷嗣文為第三將知大順城竇瓊副之都監李孝孫為第四將慶州北路都監廵檢孫昭諌副之閏月十一日分秦鳯兵為四將七月二十八日分涇原五將新紀不書獨書此分環慶兵為四將誤也舊紀見三月一日詔腰斬進士李侗坐與世居李逢等謀不軌也丙寅命輔臣禱雨于天地宗廟社稷淮南節度使守司徒兼侍中判相州韓琦改為永興節度使再任琦自去秋累上章請致仕章毎上必遣近侍齎詔慰諭不許於是又力請而有是命琦時已病不及拜也太常丞集賢殿修撰御史知雜事張琥兼判司農寺王安石言司農欲令定州煮粥散饑民此非便向已修條貫令及未困募之興利而諸路多且如舊不肯推行上曰河東煮粥李承之云須至如此人得米乃食生米安石曰人食生米未知虚實不知何故有米乃不能炊煮假令有此亦由官司失於措置若聚人毎大口日給一升小口給半升即饑民須廢業待給如此則容有不暇炊煮者今救饑俵飯凡半年若以作飯之米計口俵與令各歸營生官所費無加而饑民得實惠不妨經營衣食猶勝於聚而俵粥飯不能救死徒成疫癘也詔知大宗正司官及十年取㫖仍嵗與一子若孫遙郡刺史以下官減二年磨勘又詔三司判官杜訢展二年磨勘檢法官賈種民特衝替坐斷犯倉法人從杖罪中書以為不當故也監管趙居親的骨肉陳惟和言居有乳母姨㜮乞配度為尼從之又言已籍記其家貲詔均給其妻焦氏等令大宗正司給訖具數以聞丁夘太學進士楊伋權武學𫝊授候一年召試伋撰述李靖兵法并上圗議特録之判大名府文彦博言昨以范濟口分減御河水勢嵗有勞費故改作石堰欲經久堅完而用工累年數月輙壊其被賞官吏望賜追奪從之監察御史裏行蔡承禧言前日趙居之獄徐禧乞不簽書而鄧綰范百禄故在也朝廷即令二中使就審其誠否乞自今大獄有疑或勘官異同精擇侍從或録問官以往事已之後明辨曲直又聞禧百禄為李士寧刑名封章互上乞降二人書辨之不報朱史簽貼云無施行合刪今後存之但云不然案孝寛琥被命㦯因承禧有言也豈得謂無施行詔曽孝寛張琥㸔詳監察御史裏行徐禧同知諌院范百禄互奏李士寧文字劾理曲者以聞先是百禄與鄧綰徐禧雜治趙居獄士寧以術游公卿間嘗遇居母以詩遺之有耿鄧忠勲後門連坤日榮之語初以為士寧所為既而内出仁宗御集乃賜曹𫝊挽詞士寧亦以此自解百禄詰士寧贈詩之意士寧對曰彼乃太祖之後帝子王孫是甚差事百禄謂士寧熒惑居以致不軌之禍且疑知居逆謀推問不服居及李逢亦以士寧為不與謀也禧語百禄豈有人十七八年前率意作詩便欲加罪百禄以為不然禧乃奏士寧贈詩未為狂悖彼亂人挾借解釋何所不至而百禄之意以為士寧嘗在王安石門下擅増損案牘必欲鍛錬附致妖言死罪廹勒引諭屢通屢却夫挾大臣故舊以枉陛下之法與借人死命以増己之疑者相去幾何臣皆不忍行此乞免簽書差公平官結勘詔不許卒論士寧徒罪於是百禄奏士寧詼詭誕謾惑世亂俗終身隠匿一旦顯敗此王制之所必誅而不以聽者也向士寧未到時禧嘗謂臣曰若士寧罪不至死禧須奏乞誅之及見本人何遽翻覆如此臣竊謂禧之所存固非仁於士寧其意必欲承此間隙收恩掠美使執政大臣愛已而惡人耳禧御史而敢昌言於朝挾詐罔上此風寖長陛下將何恃耶今案牘分明囚人尚在請據禧章治其虚實如臣果有廹勒引諭屢通屢却鍛錬附致之狀則臣甘從放棄不齒士論若臣實無之而禧率爾言則是懐邪黨姦不憚欺罔以誤朝聽以媚大臣恐不足以當陛下耳目風憲之任乃詔孝寛琥辨其曲直始禧奏乞免簽書上即令内侍李舜舉馮宗道推問士寧謂王安石曰百禄意亦無他兼未結案禧遽入文字似有意傾百禄人心難知朕雖見禧曉事然豈保其心安石曰如此則百禄素行忠信必能上體聖意禧必為邪有所黨附上曰士寧便有罪於卿何預况今所坐並無他安石曰士寧縦謀反陛下以為臣罪臣敢不伏辜然内省實無由知亦無可悔恨然初聞士寧坐獄臣實恐懼自陛下即位以來未嘗勘得一獄正當臣言非誣皆可驗覆也今士寧坐獄語言之間稍加増損臣便有難明之罪既而自以揣心無他横為憸邪誣䧟此亦有命用此自安然陛下以爲人心難知亦不至此若素行君子必不為小人素行小人豈有復為君子上曰如曽布卿亦豈意其如此安石曰曽布性行臣所諳知方臣未薦用時極非毁時事臣以其材可使故收之及後宣力臣傾心遇之冀其遂為君子非敢保其性行有素也布且如此陛下豈可不知其故若陛下以一徳遇羣臣布知利害所在必不至此陛下豈可不思他日又言臣昨論奏范百禄徐禧事不顧上下禮節犯陛下顔色者誠以激於事君之義也子路行行如也然孔子教之事君曰勿欺也而犯之子路雖行行然至於衛君以正名為迂於孔子則欲以門人為臣未免為欺也然則不欺而犯人臣之所難臣所以如此徒以報陛下故爾陛下於徐禧䓁事何須遽有適莫此兩人相訟自當有曲直陛下有適莫小人承望便於曲直有所撓曲直有所撓即害朝廷政事臣備位執政政者正也今曲直有所撓即害臣職事此臣所以不免犯顔論奏如向時曽布事臣屢奏力爭願陛下勿倉卒倉卒即上下承望所推事皆失實陛下不聽不知後来事果如何及孝寛琥受詔百禄竟得罪戊辰定州路安撫司言北人引兵焚掠廣信軍新河口舖及擄却廣信安肅軍界居民詔知廣信軍狄詠斥堠不嚴知安肅軍郭忠嗣失覺察各罰銅二十斤軍士鬬敵傷重遷一資不願者賜絹二十疋傷輕十疋其遂城安肅兩縣尉委安撫司選舉使臣代之詔三司選官往江淮發運司趣上供糧綱令張頡具滯留因依以聞己巳三司言乞責發運司漕今嵗上供及積欠須及六百萬石従之是日詔諸路並權住教五軍陣止教四御陣此據㑹要乃五月九日詔王安石實録云上用李靖法作陣圗隊為四部将居中有親兵而無部呂惠卿極論難其不可王安石亦為上言其非及進呈僉順上意以為善獨與惠卿論難而王珪不言安石曰先王伍法恐必不可改今作四部即兵以分合為變不知四部分則大將在中何所依附若附四部中則一部有兩人大將若不附四部中大將反自無以衛如何待敵上黙然乃且令試教此據實録三月十九日事今附見恐所謂四御陣者即此也二月十六日定八軍陣法當參考辛未詔提舉出賣解鹽張景温相度鹻地可淤溉處以聞閏四月十八日初提舉賣鹽録草澤朱唐為内殿崇班賜錢五百緡潘若沖為右侍禁朱庠王純為左班殿直賜錢二百緡沂州左一將潘顥徐州彭城縣弓手楊坦為下班殿侍餘各賜錢有差皆以告發捕捉李逢等推恩也右班殿直閤門祗候申詡為左班殿直上批詡人品庸下祗應生踈故罷其閤門事壬申詔寳文閣待制李承之罷紏察在京刑獄以承之言兄立之等各主刑獄故也詔自今駙馬都尉改官及七年取㫖先是駙馬都尉初無改官法至是始著為令後又詔及七年令尚書吏部磨勘更不取㫖五月十日王師約遷汝防癸酉詔中書禮房言欲令諸科舉人試斷案大義者以六場通考定去留髙下不與其餘諸科比量分數據合格人盡數解發従之又詔檢正中書五房公事官綴中書省班官卑者次起居舍人坐知雜御史下侍御史上上批付韓縝等勘㑹昨朝辭日曽面論卿等候卿到邊上先約與北人於水峪地分相見分畫訖將以次地分商量今得卿等今月十九日奏與禧潁相見因何却將東自團山舖西至瓦窑塢一起並與北人議定遂致貪婪麻谷地分不肯了當可速分析奏聞其水峪以次地分不管更致促廹須候一處開壕立堠一切了當方得躬親往披按視分畫此據兩朝􅊎書册内五月十三日付韓縝等是日因進呈福建茶事上謂王安石曰財利須因物勢自然輔之以法乃可從若彊以法制即不可久安石曰輔萬物之自然而不敢為乃聖人所以治天下非特財利事而巳上曰薛向多作小抄賣解鹽不知久則壅而不泄亦非通曉解鹽本末者安石曰非薛向不知解鹽乃朝廷不察薛向故向以此欺朝廷爾上曰由此言之須久任則如此不得安石曰要官有闕則才者當進遷豈可以其材更留滯而不使進上曰如陳恕堪執政以其曉財利令依參政恩例且主計可也安石曰若能分别是非邪正以大德役小德則人臣雖在事一日亦不敢為欺若其不能則雖久任孰與照姦上曰要在上之人曉事安石曰若但曉事而不免有養望持禄之心則雖見如薛向者安肯㸃檢上曰以此要知序徳乃能序爵甲戍同判都水監屯田員外郎侯叔獻為度支員外郎陞一任以都水監言汴口自去秋河流退背取水淺澁度開濬當役五萬五千人而叔獻親帥二萬人治之有成功故也呂惠卿日録熈寧八年十四日進呈楊汲功過上曰功過多少安石曰莫可以相折除不須升任令再任余曰楊汲即是臣之無服表親臣舊薦與王安石韓絳今来淤田此人却有守曽公亮親外甥汲初淤田時公亮謂汲曰有多少好差遣却與他管勾恁地事是他堅不従臣亦佳其有守絳曰淤田却是汲擘畫上曰却是李璋擘畫余曰擘畫不獨李璋然當時人淤田只要泛淤汲隨地形築堤逐方了當以此免渰浸之患遂有成功上曰昨来已賜田及已有酬奨余曰侯叔獻元是祕書丞汲是著作叔獻今為兵部員外郎上曰叔獻後来多以功遷余曰多以淤田然臣所以陳首恐陛下他日要人使如汲輩亦可用安石進前後再任不升任例安石曰金君卿元為廣西了役法不得君卿去了得故特與升一任昨来王庭老必是錯引此例余曰亦不得用與不用此例當時進呈庭老要移别任陛下以監司得力寧與轉官或陞任不欲頻移任故升一任差遣上曰此只是就任増秩余曰此乃増秩賜金之義安石曰只因升了庭老孫珪亦縁此升任李之純又却只落權字李之純却是錯王庭老自熈寧三年兩淛首尾今已六年昨来朝廷初行新法差張詢王醇林英勾當不得遂差庭老創初施行升一任亦不為過已上並呂惠卿日録所載縁檢楊汲事未獲因此侯叔獻遷官姑附此堂後官右賛善大夫周清為文思副使管勾堂後官公事清以宣州法司嘗被杖召為堂後官至是當改殿中丞乞換官許之元豐元年正月清駮相州獄司馬光記聞以為江寧府司法與此不同當考入内東頭供奉官寄昭宣使嘉州防禦使李憲為入内押班時入内副都知張若水久病在告闕官憲以有功洮西故超授之上批付韓縝等今月十三日據走馬承受所奏有陽武石砆所寨續起遣弓箭手三百餘户一千餘口見無處安存及卿等與禧潁相見日逐不住添展地土致北人旋旋侵逾不肯休止等事未如上項弓箭手因何又有起遣及添展地土有何道理是不是慶厯中撥與後來却有侵過之處疾速勘㑹聞奏此據兩朝􅊎書册内三月十四日御札乙亥詔李承之參定蕃兵法初上閱樞宻院所擬定措置蕃兵法條目未詳手詔以為此法初未書契勘見修條約及諸路團結補職次序而遽頒之則當有抵礙無疑儻旋用諸處奏請改更乃所以啟有司奉行滅裂不謹之意朝廷號令數易如此非便故有是詔禮院言今年四月太廟禘祭排列神位已依𠡠命尊始祖居東嚮之位自順祖而下昭穆各以南北為序自今如遇禘祫著為定禮詔恭依補蕃僧李巴占為三班差使本族蕃廵檢巴占居黄河北領部族甚衆地接西夏為所誘脅故以職名羈縻之從洮西安撫司請也詔發運轉運提㸃刑獄提舉司州縣吏及衙前不犯徒若􅂍罪能通法律聴三嵗一試斷案轉運司以八月差官如試舉人法毎路取毋過三人本司具名并試巻以聞委中書詳覆次年二月并在京諸司吏願試者同差官比試取毋過十人補御史臺主推書吏以次補審刑院紏察司書令史試不中者軍廵院人與三司大將諸路人委試官再取轉運司試巻及見試巻看詳若有可采具名聞與轉官補司天監生石道為靈臺郎道嘗言明天厯未經測驗不可用坐是奪官既而月食與厯不協厯官皆抵罪乃還道保章正仍為監生至是與修奉元厯成故又有是命閏四月壬寅可考賜權發遣開封府推官蹇周輔紫章服周輔以御史臺推直官往沂州治李逢獄還上以為精敏可屬事改開封府推官入謝又有是賜精敏可屬事據周輔舊傳周輔往沂州見三月丙申都提舉市易司言昨商稅院奉詔流民物貨不多免稅錢今已豐熟而諸門放稅如故慮失嵗課請如舊制從之㑹要五月十五日事丙子涇原路走馬承受公事郭逢等言渭州行鐡錢未便詔本路錢有不可行者令秦鳯等路轉運司銷變毋得支用二月二日増鑄大錢提舉市易司舉劉佐佐前在市易司坐法衝替事理重代佐者不知買賣次第比較所收息大不及佐王安石欲許之韓絳固爭以為佐未合與差遣安石曰市易務自来舉官不拘條制且七八萬貫場務須付之能者絳固爭以為如此則廢法上曰且令勾當候合受差遣方許理任如何絳猶以為不可再拜乞辭位曰如此則宰相不可為上愕然曰兹小事何必爾絳曰小事尚弗能爭况大事乎安石曰劉佐之罪只為拆換却官文字然無避事之罪此何足深責如杜純者陛下親選擇令勘王韶事韶受陛下一方邊寄為郭逵所誣若不獲辨雪則壊陛下事不細純既受命宻院即擢以為檢詳特遷一官臣問宻院與杜純轉官用何條貫曰無條貫用何例曰無例有何意義但曰奉聖㫖而已臣當是時固疑純必不直及見韶無罪乃云文籍證據皆不分明不可勘反奏劾王韶討殺蕃部不當中書將前後奏報畫一條析有文籍證據可以勘得事状行下蔡確所以不能易情節而王韶獲雪如杜純欺罔如此亦是衝替事理重韓絳亦不候合受差遣便奏差在㑹計司此與差劉佐亦何異若比劉佐則純為罪重情理難恕絳曰只候局了却令入審官授差遣安石曰例須有酬奨如何並不推㤙却直送審官恐如此施行不得絳曰劉佐違條貫甚多不合奏舉又吕嘉問到中書專欲捃舊事改更前来聖政臣所以住不得臣若不去又是一馮京安石曰韓絳用心必與馮京不同但此一事所見與臣異爾呂嘉問若非理捃舊事自可條列進呈陛下必有處分綘曰如何更一一條列安石曰嘉問只是言朱温其恩澤事乃是臣令作文字言檢正官不合奏薦臣亦以既往止之嘉問遂自入奏然此事嘉問亦不為無理綘又固求去位安石曰綘若能以去就之義守職臣亦何敢忘義屈而從綘且須論道理未湏言去就因為上言路适不職佐前有績效方令理財不可緩綘曰臣嘗領三司亦何嘗闕乏安石曰鄭州枷栲百姓令賤賣産以給軍賞大臣近臣乃或賤買民産此韓綘所見絳曰其時誠是闕乏然小人喻於利不可用安石曰市易務若不喻於利如何勾當且今不喻於義又不喻於利然尚居位自如况喻於利如何可廢檢正官奏薦事在四月二十六日此言朱温其恩澤未詳五月十八日絳乞罷翼日安石又為上論呂嘉問程昉盡力然為衆所攻陛下不察而問之則天下事孰肯為陛下盡力上曰如程昉非不勾當得事但不循理安石曰程昉舉呂公孺誠為不識理分然於國事有何所損如文彦博去位舉劉庠陳升之去位舉林旦旦勾當進奏院乃四月二十六日當考乃可責陛下待遇此兩人如何此兩人有何功利及國而所舉人如此此放誕無忌憚之甚陛下不務責此而乃責昉恐非所急昉亦何可如此責備但以其有功盡力在陛下所保而已上曰如文彦博等纔舉人不當便責安石曰如彦博等雖未可厚責亦未足尊寵上曰彼皆先帝時爵禄已尊貴安石曰如此則嗣君於先王之臣不復行法恐無此理舊人既如此近日新進又不肯為用陛下豈可不察上曰何為其然安石曰職事廢曠但以孤危訴於陛下則必見保於陛下大臣以形迹之嫌亦安肯復究治其盡力如吕嘉問程昉則必為衆邪所攻不肯安職不知人臣何為而盡力上曰如程昉數年間致位至此昉亦足矣安石曰昉功狀比衆人合轉數官即才轉一官若一有疑罪即數處置獄豈得謂足且陛下前日宣諭程昉恃中書知察方能盡力臣比見昉數處置獄被劾但能令人嘆息而巳昉乃為臣言不須為昉深辨但令昉得罪追一兩官或被停廢蔡諌議自然息怒不然即紛紛未有了時昉但得為朝廷了公事利澤及民足矣若因此停廢昉亦能營生必不寒饑相公不湏過憂其言如此乃非恃中書營救故敢自肆也今忠邪功罪未盡照明則事功何由興起如臣者若欲尸禄保位可也若欲行義以逹其道未見其可也蔡諫議當考丁丑詔罷涇原蕃部養馬先是令德順軍蕃部養馬費多而得駒及格者少亡失責備償蕃部苦之故罷又詔諸路保甲及江南西路槍手並依義勇置籍詔前餘姚縣主簿李逢河中府觀察推官徐革凌遅處死武舉進士郝士宣腰斬李逄妻為逄久棄出外免没官度為尼男女没官為奴婢逢叔司農少卿禹卿姪分宜縣主簿􅊞汝州推官毅前永濟縣主簿顔並免真流兄袐書丞逵免没官並除名勒停逵送湖南編管姪龔免決配江東編管徐革妻男女弟並没官為奴婢叔配湖北編管郝士宣父左侍禁賁除名勒停潮州編管母妻分配廣南編管本路轉運提㸃刑獄司并沂州干繫官司理院勘鞫不當官吏及知彭城縣陳惕尉竇士隆並劾罪以聞内知情不告人並編管逢革士宣坐與趙居結搆謀不軌朱唐告發逄等謀而惕等不受及蹇周輔推治得失故也又詔京東西路轉運副使太常丞趙濟降一官東路轉運判官太子中舍李察展磨勘四年提㸃京西南路刑獄國子博士張復禮降一官前通判沂州司門貟外郎周禹錫勒停判官楊緯推官王中正司理參軍鄭延各追一官知彭城縣殿中丞陳惕追兩官並勒停軍器監奏自置監以來比之舊額軍器數十倍少亦不减一兩倍漸見倫緒惟是在京上等人匠並差在御前生活所以此有妨製造今據中書批問事件謹具分析下項添修創造衣甲共七千八百五副比未置監已前共増造四千八百九件人工一十四萬七百餘工御前生活所不係本監統轄乞自朝廷取索人數比較造箭一百三十八萬四千餘隻比未置監已前増造箭三十三萬三千五百隻多一萬七千五百餘工内儧剰工二千一百二十一工并擘畫添起逐色造箭工限向去所省工料不少弓弩造到工限比未置監已前増得二萬九千二百餘工上批中書樞宻院可再子細㸔詳軍器監所具析未知依與不依得朝廷問目其有内稱即向去所減工料不少之類不審是何成績及即目如何考驗今且於其中比較軍器監與御前生活所所造鞍轡軍器監毎副二百六十一工八分七厘九毫九絲御前生活所六工六分四釐五毫六絲已上見御集第六十七巻五月十七日王韶言陛下如此恐内外相傾成俗向来軍器監㸃檢内臣折剥弓弩自此成隙今却以内臣比較按軍器監則内外相傾無已上曰比屢說軍器監事若不比較見事實即中外更以為聽小臣譛愬今比較見事實行法乃以明曲直王安石曰誠要如此若毎事分曲直明信誕使功罪不蔽則天下治久矣上曰如程昉敢向前勾當亦為中書察知故敢盡力如昨来衛端之該減降只合科杖罪放特追兩官内小臣有罪行之必不肯少貸安石曰外臣若如衛端之壊却許多官物亦未嘗有科杖罪放却者如程昉亦恃陛下以公道主張故敢盡力然比茍簡偷惰之衆人則其危殆亦已甚矣凡如昉者衆之所疾有十件罪發未抵别人一件縁别人更相容庇如昉則衆共攻之若非人主保庸即何由自立不知大臣執政於内外庶官有何適莫但内臣即要深行非内臣即便末減如此用心必是姦人内懐愛惡利害欺罔人主不知如此人陛下何故使之執政上曰如卿有道豈肯如此然他人豈免如此已上見日録五月十五日今并書王韶又言軍器監事不須比較上以為事不比較無由見枉直安石曰誠然庭者直也朝廷治事惟欲直而已若不考校何由知其枉直若為其有勞且欲含容亦須待考校見曲直然後計其勞與罪孰多加恩末減可也不然則無罪之人或䝉䜛謗乃誤受含容之恩而實遭誣汙之累矣已上見六月三日今并書他日又進呈軍器監比較文字上曰如御前生活所改變橋瓦省功豈是有指揮令軍器監不如此改變安石曰自祖宗以来只是用全木為橋瓦今御前改用木合成即未經外庭試驗經久牢固比舊如何假令比較與舊牢固一般又省費即御前生活所可奬軍器監官員未為有罪以所造橋瓦是祖宗以来承用法式故也如昨来三司有人言造三竈留滯言事人二年甚困苦而不為之定奪及中書差官試驗果有利如此乃可以責三司然朝廷亦不責三司也今橋瓦事又未嘗有人言此利便於軍器監而監官沮抑不行若比三司尤不可責也已上見日録六月二十一日今并書上曰周道如砥其直如矢匹夫亦須令自盡况勾當生活所使臣安石曰御前生活所使臣何縁不獲自盡中書既比較了便送與㸔詳彼自不肯㸔詳不知令比較官如何措置陛下若尚疑未盡即容臣等檢尋文字子細進呈上疑比較不盡蓋比較官向宗孺與生活所宋用臣有隙故也上曰如生活所支食錢只令依實比較然却言縁生活所支食錢乞朝廷詳酌指揮便取工匠狀若支食錢亦乞依得生活所便慿虛比較安石曰若謂御前生活所使臣皆陛下近習當依違之則誠如聖㫖陛下於宮中國中宜為一體陟罰臧否不宜異同即有司如此比較不為過當且軍器監自然支得食錢即亦造得如何抑亦辭以為造不得若依所乞支與食錢待彼造不得然後重罰彼亦何辭若未見其造不得即令用其說比較兼已依實比較然後别更作一節聲說如此比較非不平直也翌日進呈比較文字照驗甚明上乃大悟已上見日録六月二十四日今并書比較軍器監事其張本在閏四月初三日今取御集五月十七日并日録五月十五日又六月三日又二十三日又二十四日前後所書並加穿聮刪削附見五月十七日御集第九十八巻有問比較鞍轡取捨意一道可考四月二十八日上批斬馬刀局云云可考御史蔡承禧言臣訪聞自昔軍器惟𨽻三司胄案一局近嵗遂立軍器監以專之自昔修造之局惟𨽻修造案而近嵗以將作監專之故三司之財用固已多為二局之所靡然以已成官局粗有條理日月寖深不可移改而又聞有鞍子所斬馬刀所御前生活所之類凡百司之所取索至物用之所經營所𨽻不領於外廷而所靡實難於㑹計訪聞其間不過製造軍器而已夫所謂御前者講道徳於上決邪正於下釐天工熈庶績乃其地也以今生活工巧而悉出於上則御前之所為何小兼小臣動以御前為名百司莫敢違拒工料過有罷勞斬馬刀之局殺監官者數矣盖由小臣獻議因令蒞之日趣工程不計勞敝臣伏乞授以法式悉付所司庶使課定之科皆有常限財不耗靡人寡勞怨其後承禧遷開封府判官又言臣竊聞開封府凖雜買務牒送赤石子行人郭文徳狀一行人赴府行遣為不供應御前生活所須索羖䍽羊毛長一尺一千斤開封府雖稱市中無此羊毛牒還本所此雖小事誠不足論臣伏覩陛下即位十餘年間徳澤於天下無量毎興一利害官吏不曉法意微有侵擾悉皆必行無有寛略以此天下之吏不敢擾民而民得安於吏治今都城之内求長一尺之羊毛者千斤此必無有不言而喻臣深慮其託御前生活之名廹索所無之物於市中行人畏懼因縁為姦害物者大臣欲乞今後御前生活所下行索物並下三司選官一員相度合用并京師所有之物奏覆方許下行收買所貴所司不以無有之物困苦下民承禧十年五月罷御史除府界元豐二年二月改府推三年六月遷府判承禧自注任府判日宻㫖令奏所聞故有此狀狀稱陛下即位十餘年間必在熈寧末元豐初也今并附此四月二十八日可考戊寅成州團練使駙馬都尉王師約為汝州防禦使用壬申詔書磨勘也工部郎中直龍圗閣謝景温為江淮等路發運使景温辭行留判將作監改判將作在七月十一日今附此呂惠卿云云見九月二十六日知曹州劉攽言知濟隂縣羅適以磨勘時當展考追還著作佐郎告罷知縣事適治縣有政績乞就除職官知縣從之後復以監司薦改官再任元豐元年閏正月戊寅攽又薦適上批河東一路間於外敵其民風俗素號忠厚加之力穡勤儉習尚材武朝廷若稍加奨勵緩急足以自扞一方比来災旱相繼民力憔悴殆無生理即今饑民不少自四月後官罷糶米散粥人情皇皇日就死所若不多方賑濟豈惟數十萬民命可惜縁此一路户口必致離析蕩散將来何計可得完復其速議所以措置條目進呈廼遣太子中允檢正中書禮房公事曽伉祕書丞知司農寺丞程之才體量措置仍出内藏庫銀絹各二十萬易司農粟賑給之并以賑河北西路饑民是日韓絳請去位稱疾不出王安石白上宜罷劉佐勉慰綘就位上難改佐事安石曰後有大於此則不可容此監當小臣若固爭致綘去位臣所不敢安也上乃聽罷佐遣使持手札諭綘令就位綘復起呂惠卿欲出宣撫諸路上不許固言今府界事多不治且治府界為天下法足矣己卯提舉熈河路買馬司言虞部員外郎汲逄西京左藏庫副使王崇拯買馬及萬四千六百餘匹詔各進一官辛巳太原府司法參軍崇文院校書范鏜睦州司法參軍崇文院校書練亨甫並為中書習學公事兼修條例熈寧政録鏜刑房亨甫戸房七年四月二十五日詔中書自熈寜以来剏立改更法度令具本末編類進入五月二十一日詔属樞宻院者令中書取索一就編類此即熈寧政録也入内押班李憲勾當皇城司詔雄州増募歸信容城縣弓手以五百人為額其本州雲翼兩指揮自今更不招填候人數減及四百人并為一指揮江東鈐轄司言信州弓手楊超與賊呉笋鬬超棄槍走衆潰中書擬配超汀州牢城上批因其退走致死傷人不少可配廣南逺惡州軍遂配瓊州壬午王安石進呈曽布案言布合追四官據案甚明而法官但追兩官尚有兩事各合追兩官而勘官不坐月日不知事發先後若事發更為即又合各追兩官呂嘉問乃無一罪可書韓絳言此勘不盡安石曰若勘不盡如何却勘不合書罪之事又妄引刑名斷罪聞韓絳㸔此案問難甚悉絳非滅裂此獄但衆姦協比絳不察見爾又進呈馬珫范純粹所爭絳為純粹釋解上不聽令送御史臺取劾珫純粹所爭何事甲申熈河路安撫司言蕃官殿直竒默特與母伊囉勒謀并家屬走西夏其竒默特乞於蕃市凌遅處斬竒默特妻巴特瑪廹脅就道合原乞以巴特瑪并其家貲賞告捕者以誡蕃部從之河北第八副將臧景言馬射六事詔景即武學召殿前馬軍司教押馬軍使臣諭以所陳六事并下五路經畧司及將官依此教習軍馬六事者一曰順騌直射二曰背射三曰盤馬射四曰射親五曰野戰六曰輪弄景各為說以曉習射者乙酉戸部判官兵部郎中直史館陳汝羲提㸃醴泉觀初御史蔡承禧嘗言汝羲庸下凡近不可任三司判官既而汝羲自請罷故有是命是日三司使章惇奏屯田郎中李陟可代汝羲上批今早中書方得指揮除汝羲宮觀何故三司已舉官遂寢其奏詔諸路州學教授不職委國子監奏劾司農寺言未行役法以前衙前舊重難分數錢雖已降度僧牒紫衣􅎁及賣馬凖折償之大約十未還及二三卒當用見錢給還欲降指揮許以在京市易務金銀物貨及中外官司物之不妨用者移挪兌借其常平積斛斗亦許於闕乏時月凖此支酬従之右班殿直勾當修内司楊琰言開封陳留咸平三縣種稻乞於陳留縣界舊汴河下口因新舊二隄之間修築水塘用碎甓築成虚隄五步以来取汴河清水入塘灌溉詔琰管勾罷勾當修内司依舊兼廵䕶惠民蔡河京索金水河斗門隄岸河道令開封府界提㸃司提舉俟灌溉有實保明以聞丙戍命知制誥沈括寳文閣待制李承之詳定一司敕初議差王安石提舉安石辭以無暇請用括及承之上曰善司勲員外郎范子竒為河東轉運使王安石前擬不可至是乃依所擬太常少卿劉忱知鄧州淮南東路提㸃刑獄太常博士盧秉為祠部員外郎陞一任以前提舉兩浙路鹽課増羨也六年六月十九日已陞任轉官七月九日權發副宣慶使利州觀察使入内都知張茂則為景福殿使入内供奉官宋用臣直批聖㫖下將作監差兵匠三百五十拆修殿前班有司請劾罪翊日詔用臣傳宣非直批聖㫖㸃檢進發文字司鹵莽上簿朱史削去以為事小今復之詔興修水利工役大者聽守臣申監司交割公事與以次官訖躬詣彼案驗具往復日數以聞従知舒州朱公綽請也丁亥命王安石提舉國子監翊日詔罷之上曰立學校變貢舉法將以造士今判國子監亦自相乖異士人不務為忠厚則他時風俗復何所望顧王安石曰卿與提舉則士人自然化服安石固辭上固令為之翊日又固辭乃寢其命寳文閣待制李承之罷同羣牧使改判將作監中書言同州朝邑縣界因都水監丞王孝先淤田約水不住壊民田苗乞候將来酬奨日取㫖仍蠲被水戸夏稅従之御史蔡承禧言聞知頴州孫永以馬一匹入市騏驥院元直六十千而請官直百六十千或言永虛立班行名賣與班行班行自賣入官事雖不明乞考實詔羣牧司根究以聞究竟當考三司言兩浙轉運司寛弛鹽法鹽息大虧乞委官取逐官到任後鹽課比遞年虧損即貶降詔三司取熈寧八年上半年前鹽課對比前界提舉鹽事司増虧以聞詔廣南西路安撫都監劉初落衝替先是經畧使沈起遣初引兵趨正誠州置城寨開道路既至蠻人出與官兵格鬬互有殺傷其後劉彛代起奏初蠻事時不親䇿應怯懦避事已詔初衝替而起以初嘗有功且㑹赦為初辨明宜收功補過故有是詔御史蔡承禧言呂升卿招權慢上并及呂惠卿是日進呈二十七日上曰經義所辟檢討劉谷谷必通經義惠卿言其人有學問有行王安石曰臣亦聞其有行但不識之上曰檢討須有補於修經不然雖有行何補有行之士自别有用處時承禧言升卿辟谷與官俸令教小兒而已安石與惠卿俱對上顧安石稱其獨無私前此亦屢有此言盖為惠卿發也明日惠卿求去韓絳王珪不入安石獨奏事上曰卿任事無助極不易韓絳須令去不然扇動小人若無己大害政事安石固留絳請待其復旅拒絀之未晚上又以為惠卿不濟事非助卿者也安石曰不知惠卿有何事不可於意上曰忌能好勝不公如沈括李承之雖皆非佳士如卿則不廢其所長惠卿即毎事必言其非如括言分水嶺事乃極怒括安石曰惠卿於括恐非忌能如括反覆人人所知真是壬人陛下當畏而逺之雖有能然不可親近惠卿屢為陛下言之非不忠陛下宜察此上曰大抵兄弟惣好勝忌能前留身極毁練亨甫亨甫頗機警曉事觀惠卿兄弟但才能逼己便忌嫉安石曰升卿等亦屢為臣言練亨甫臣亦屢勸彼令勿如此逆欲廢人但見彼作姦明白則正論自不容若于未有事時但疑其將爲惡遽廢棄恐無此理因為上稱吕和卿温良曉事又為上言承禧言升卿乃相忿惡在升卿亦無他但不免輕肆往往閑論議及承禧故致其如此不然則承禧所彈何至如此深切乃言履霜之戒可謂寒心其言深切如此必生于忿惡也又為上言人材如惠卿陛下不宜以纎介見於辭色使其不安上曰何事安石曰如對惠卿數稱臣獨無適莫獨無私則惠卿何敢安位國家所賴恐不宜如此遇之上因令安石敦勉惠卿就位安石曰此在陛下陛下不加恩禮臣雖敦勉何補也又明日進呈升卿分析上曰升卿材能難得安石曰據分析事實亦無他上曰聞承禧嘗往見升卿升卿拒不見安石曰升卿致人怨誹但如此類餘亦無他上因言欲令升卿作方靣如何安石曰升卿材能何所不可然都未曽作官且更委以事令其練習乃佳他日上又謂安石曰承禧言升卿言令惠卿堅卧十日朝廷自逐臺官果否安石曰果如此承禧何自知之此必妄說耳七月二十三日升卿乃罷國子十月一日升卿始出詔應武舉人丁憂許就試㑹要五月二十七日事戊子罷修經武要畧詔川陜四路知州通判四路人差授不得以本路人為代己丑詔永興軍等路轉運判官葉康直往鄜延環慶路賑濟饑民詔殿前司教馬軍使臣不許諸處舉充外任差遣御集九十七巻可參考七年九月十九日詔衛尉寺丞都大提舉䟽濬黄河司勾當公事李公義言先乞用船三百隻濬大河中流令水行地中今且乞用船五十隻鐡爪五十副役兵四百人自北京至海口驗一過之功乞遣官打量河道深濬果如所陳即増船至二百隻詔都水監應副九年九月丙辰中書云云是月改岷州馬務堡為鎮
