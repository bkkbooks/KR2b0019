body:
  text: 續資治通鑑長編卷四百七十六宋李燾撰哲宗元祐七年八月壬子朔詔諸軍已自毁傷避征役者不以首免中書舍人孔武仲言臣伏見前日近臣論奏乞罷侍從官轉對而專責以朝夕論思之効朝廷尋已施行臣以謂論思者侍從之事然茍不持之以法度則責無所歸言與不言各從其意論思之効果安在也昔唐太宗聞直諫則奨激之久不言事則誚薄之風聲所感羣下自勵是以終貞觀之世中外無壅蔽之事朝廷無佞媚之臣政理之効優出近世仁宗皇帝嘗御迎陽門親策羣臣又嘗開天章閣召執政八人賜坐授以紙筆使條陳政事之要嘗謂輔臣曰近日上封章言政事得失者何其少也豈非言路壅塞所致乎英宗皇帝嘗謂范純仁曰近日風俗可嘉羣臣能屢來言事如此人君日有益矣仁祖英宗汲汲求人言如此是以至和嘉祐治平之政至今稱頌昨日陛下親御經筵講讀官進對凡預講讀者不過五六人陛下聞其規戒之言亦多矣况侍從官不止五六人其能言天下之事固多患在未有以率之而已伏望逺稽唐太宗及仁祖英宗勤求人言之義近推經筵許侍臣進對之意輪流侍從官一人以次進對令各陳所見擇其是者推行之則轉對之法雖廢而論思之責猶在也五月十八日八年正月二十一日録猺人田忠穩男洪照為銀青光禄大夫檢校國子祭酒知京賜州癸丑都水監南外丞李孝博言黄河埽岸夏秋水漲由徃來偷折梢木遂成墊陷今欲乞毎埽各置二百斛船兩隻般運修河物料遇夜於埽下廵視詔南北兩丞地向著埽岸毎埽各置船一隻餘並從之新無遣中使賜修河官兵特支茶藥政目二日事甲寅秦鳳路經畧司言秦鳳州逹隆堡安逺寨守禦人足用請罷鳳州梁泉縣差來保甲從之管勾成都府等路茶事閻令言熙州獲人户趙世亨造假名山茶二千餘斤從不應為重斷罪不足懲艾欲乞應於禁茶地分造偽濫茶許人告捕除依治平陸行路通啇茶法斷罪理賞外其犯人送禁茶地分鄰州編管從之新無乙卯知大名府資政殿學士張璪為資政殿大學士知揚州吏部尚書資政殿學士王存知大名府存自揚州召入為吏部尚書才朞嵗時在廷朋黨之論寖熾存言人臣朋黨誠不可長然不察則濫及善人東漢黨錮之獄是也慶厯中或指韓琦富弼范仲淹歐陽修為朋黨頼仁宗聖眀不惑今日果有進此説者願陛下察之由是復與任事者不合請老不許求補外既除大名辭之改杭州存改杭州在十二日今并書存論朋黨據本𫝊盖因曽肇墓銘也樞宻直學士趙彦若為國史院修撰七月十七日巳有修史之命召輔臣觀穀于後苑丙辰詔宗室犯私酒尊長應取㫖者止坐本位同祖尊長尊長自犯即坐本宫同祖尊長蘇轍為中丞時嘗有論列臣僚言伏見法寺斷大辟失入一人有罰失出百人無罪斷流徒罪失入五人則責及之失出雖百人不書過常人之情能自擇利害誰出公心為朝廷正法者今乞於條内添入失出死罪五人比失入一人失出徒流罪三人比失入一人從之記得此有駁論者當檢附蘇軾言凖元祐三年八月二十四日敕陜西轉運司奏凖敕節文賣鹽并酒稅務增剰監專等賞錢更不支給本司相度欲且依舊條支給所貴各肯用心趂辦課利户部狀欲依本司所乞並從元豐賞格依舊施行檢㑹元豐七年六月二十四日敕賣鹽及稅務監官年終課利增額計所増數給一釐鹽務専副秤子稅務専欄年終課利增額計所增數給半釐及檢㑹元豐賞格酒務監官年終課利增額計所增數給二釐酒務專匠年終課利增額計所増數給一釐具如右臣聞之管仲禮義亷恥國之四維四維不張國乃滅亡今鹽酒稅務監官雖為卑賤然搢紳士人公卿胄子未嘗不由此進若使此等不顧亷恥决壞四維掊歛刻剥與專欄秤匠一處分錢民何觀焉所得毫末之利而所敗者天下風俗朝廷綱維此有識之所共惜臣至淮南體訪得諸處稅務自數年來刻虐日甚商旅為之不行其間課利雖已不虧或已有増剰而官吏刻虐不為少衰詳究厥由不獨以財用窘急轉運司督廹所致盖縁有上件給錢充賞條貫故人人務為刻虐以希嵗終之賞顯是借關市之法以蓄聚私家囊槖若朝廷憫救風俗全養士節即乞盡罷上件嵗終支賞條貫仍乞詳察上件條貫於稅務施行尤為切害先賜廢罷况祖宗以來元無此格所立場務増虧賞罰各已眀備不待此條方為勸奨臣竊見今年四月二十七日敕廢罷諸路人户買撲土産稅場命下之日天下歌舞以至深山窮谷之民皆免虐害臣既親被詔㫖仰縁德音推廣聖意具論利害以候敕裁從之元豐七年六月辛卯初從京西漕司請詔稅務年終課利増額依鹽酒務賞格軾此奏盖得請紹聖又改之據軾奏狀八月五日上時猶稱知揚州軾七月二十日已除兵書但未受命故但以知揚州論事也今削去知揚州三字丁已祕書丞吕希純為著作郎充國史院編修官希純以父名著及修國史范祖禹乃親妹之夫辭詔依舊祕書丞充編修官此以栖畆志増入左朝散郎韓治為太常丞十六日吳立禮云云太常丞孫諤權利州路轉運判官十六日吳立禮云云熙河蘭岷路經略使范育言措置河南蕃族利害樞宻院看詳有未盡事理其一河南所乞歸順部族有無結斡磋所管族分結斡磋願與不願歸漢若其人與鄂特凌古同意本不知族下有謀萬一手下自有兵馬必須用兵相敵乃是河南從此未得安静未委可與不可先以轄揚烏爾事開説結斡磋使曉知禍福令其屬漢毋助鄂特凌古然後河南可以不招而定結斡磋其父被擒終有怨漢之意若未能聽服即河南部族如何可以招納其二鄂特凌古境内雖聞携貳終未得的實若便招其部族有無事體未安其三假令不問結斡磋强弱鄂特凌古存亡便築城招納願順之人縁夏賊未順若兩賊相合以撓熙河何以枝梧其四順漢首領皆因包順送到蕃字撫定之後本人必望主領河南一帶奏乞包順充都首領縁今來河南一帶地分兵勢可與不可專委一員管勾兼河南一帶見係結斡磋管勾萬一結斡磋果肯順漢若並𨽻包順即於結斡磋未安或止令結斡磋依舊管勾又於包順未便當如何措置可以誘激包順用心勾當又使結斡磋樂為漢用其五約度到今來所費不過三十萬貫縁向去撫定應部族首領以下請給犒設之類及剏添城寨兵將諸色費用且以通逺軍熙岷等州蕃部請給比較嵗約添㡬何既無鹽井坑冶等課利又無民兵營田地即向去經費如何可以應副其六今來招撫河南部族係令輸誠順漢所乞築城止是洮州及以東地内今若如規畫之間一切撫定則地分大叚闊逺不委将來合為界處四至相望并去見今州城堡寨約多少地里内岷州地里必更遼逺未委用與不用更置城寨就近統制彈壓其七河南見屬西蕃大小族分都計若干著望各在何處有是何族分已曾送欵是何族分未有歸漢之意各别繪圗以聞舊録云樞宻院自元年經畫西羗掇拾前人遺迹條畫計畧卒為空言致此益不循服夏人尢察其虛文數犯邊殺畧不可勝計終元祐不能定新録辨云上文是樞宻院看詳范育措置河南蕃族利害有未盡事理因為七説問之務在審度事勢招納降附今史臣忽如此詆之殊不可曉范育在紹聖間獨以元祐時守邊有勞不附姦臣受賞此書載樞宻院看詳文字必其間有范育措畫已經施行者如云卒為空言益不循服是育與有罪也此言本以樞宻院而實附范育其自相牴忤為多合刪五十二字要見范育荅此七問九月一日育云云却非此荅二十八日已卯育再具事件可考已未東上閤門使知蘭州种誼領保州團練使再任詔諸路經畧司宻諭諸将除嚴設隄備以防㓂至外並仰廵護人民先逺次近併力収穫若别無西賊侵犯不得貪逐小利輕易出兵却致引惹損壞田稼先是有詔許諸路擇利淺攻而邊将頻出兵討擄多殺老小慮諸路貪功致㓂故因防秋復加條約太常寺言修廣聖宫畢工所有真宗皇帝御容合行告遷歸殿詔以禮部侍郎曾肇為禮儀使六月十八日肇為禮侍七月二十二日禮書胡宗愈為禮儀使不知何故改差當考内勘内臣黎元佐等政目八日事當考白劄子撥還泛差軍馬請受政目八日事當考庚申工部言都水監奏今後一年起夫一年免夫等事臣僚及諸路監司相度到有稱出錢免夫便或稱不便者今欲乞去役所有八百里外更不科差五百里内即起發正夫八百里内如不願充夫願納免夫錢者聽縁納錢日限内一半係正月一半係六月仍乞令人户據六月合納一半錢數隨夏稅送納如出限尚未納錢數與免倍納罰如次年合當夫役須得正身前去更不許納錢免夫及都水監乞河防毎年額定夫一十五萬人溝河夫在外今相度除逐路溝河夫外欲乞額外定諸河防夫共一十二萬人或工少夫多並於逐路量分數均减如緊急工多分布不足須合額外增數令内外丞别作一状具着實利害保明以聞所有本路溝河夫數並於管下以逺州縣均差䟎那近裏州縣夫應副河埽役使詔科夫除逐路溝河夫外其諸河防春夫毎年以一十萬人為額河北路四萬三千人京東路三萬人京西路二萬人府界七千人如遇逐路州縣災傷五分以上及分布不足須合於八百里外科差仰轉運司保明以聞仍自科元祐八年春夫為始餘並從之新本刪要壬戍鄜延路經畧使范純粹言契勘本路蕃官自來有因歸順或立戰功朝廷特賜姓名以示旌寵如威明沙克為趙懷順均凌凌為朱保忠是也後來有蕃官無故自陳乞改姓名經畧司不為止遏據狀申陳省部亦無問難遂改作漢姓如伊克為白守忠鄂欽為羅信是也亦有不曾陳乞衷私擅改作漢姓如羅凌之子為周俊眀是也見今更有蕃官攀援陳乞盖是自來未有禁約致蕃部無故自便衷私撰改漢姓竊詳古者賜姓命氏皆朝廷所以酬功德别忠勤也今乃使外蕃種類無故自易姓氏混雜華人若年嵗稍逺則本源汨亂無由考究漢蕃弗辨非所以尊中國而别族類也兼蕃族既自能改易漢姓即不以得姓為重朝廷旌寵之意恐有時而不行須至奏陳乞立法止絶者欲諸路蕃族除係朝廷特行旌寵賜與姓名外即不許陳乞改作漢姓所有今日以前不因朝廷賜姓之人並行追改各令依舊如允所奏只乞朝廷訪聞立法行下從之純粹以七年八月十一日奏此二十三日得請實録於二十三日畧載此奏今全録之仍移得請并附見此癸亥兵部狀檢凖元祐貢舉敕寺監長貳各許奏舉武舉一人今來御史臺等處牒到祕書少監二員即係秘書省官本部看詳稱省者在寺監之上兼逐官亦係少監今相度秘書省長貳欲並闗報各許保奏武舉一人從之法冊八月十二日敕乙丑江西轉運司言諸路監司承朝㫖差官置司推鞫其所差官仍躬親被受合為制使以制勘為名所有監司被受朝㫖下本司差官置司勘公事合以推勘院為名從之户部奏凖度支闗凖元祐七年八月一日敕節文戸部狀梓州路轉運司奏本路合預俵元祐八年分和買紬絹等價錢乞借撥常平錢奉聖㫖許借常平錢三萬貫其買到紬絹令提刑司拘管候轉運司收簇到錢對行交撥闗請施行者本部檢凖戸部右曹令諸他司借用錢物雖奉朝㫖亦執奏今來所借常平錢有礙上條伏候敕㫖八月十四日奉㫖特依前降指揮降授通議大夫章惇知湖州惇知湖州此據政目十四日所書實録無之六年八月十八日惇復正議大夫朱光庭繳還詔候一朞取㫖今将滿一朞亦未復官但除郡耳八年十二月始復職眀年四月二十一日猶以降授通議大夫復左正議大夫拜相云尋復提舉洞霄宫此據惇行状附見不得其時行状云服闋再除洞霄宫不載湖州應是惇辭湖州復請宫祠也更須詳考之八年十二月十六日復資政是日詔太廟復用牙盤食先是毎行祀事並於禮料外設常食一牙盤元豐中罷之吕希純為禮官嘗建議曰竊考禮經先王之於祭祀皆備上古中古及今世之食鄭康成解禮運以薦其血毛腥其爼為薦太古之食以熟其殽薦其燔炙為薦中古之食然後退而合享體其犬豕牛羊實其簠簋籩豆鉶羮為薦今世之食又曰今世之食於人道為善也荀子曰饗尚元尊而用醴酒祭嚌大羮而飽庶羞貴本而親用也宋有天下距商周之世千有餘年凡飲食器皿先帝先后平日之所饗用者與古皆已不同則於宗廟之祭不可專用古制亦已眀矣故所設古器禮料即上古中古之食也荀子所謂貴本者也牙盤常食即今世之食也荀子所謂親用者也而議者乃以為宗廟牙盤原於秦漢陵寢上食殊不知三代以來自備古今之食而荀子有貴本親用之言竊慮議者又以為景靈原廟自薦常食則宗廟之祭可以專用古禮臣竊以為國家既建宗廟嵗時奉祀必求祖宗顧享非以為虚文也况如僖祖及孝惠等四后有但祭於太廟而不祭於景靈者乎國家於宗廟之祭非不尊且重也六官百司奔走承事然其所薦之饌乃非今人之所能食如此則望祖妣之來享後嗣之䝉福不亦難乎臣欲乞今後毎遇皇帝親祀及有司攝事並依祖宗舊制毎室除禮料外各薦常食一牙盤庶於禮義人情咸得允當於是始從希純之議云紹聖元年七月十九日罷牙盤據蔡絛㑹要乃是元祐七年八月十四日從希純奏始設之今追書希純奏仍據希純栖畆志増入丁卯以權兵部郎中杜純充皇帝賀遼國生辰使六宅使郝惟幾副之權刑部侍郎王覿充太皇太后賀生辰使皇城使忠州刺史張藻副之惟幾更名惟微避其國諱也殿中侍御史吳立禮充皇帝賀正旦使内殿承制閤門祗候向縡副之太常少卿宇文昌齡充太皇太后賀正旦使供備庫使曹讀副之純以目疾辭權户部侍郎范子竒代之二十二日子竒又以足疾辭行太府卿劉忱代之二十六日尋改差忱館伴髙麗使人以刑部侍郎豐稷代之九月二日左奉議郎集賢校理陳察為江東路轉運判官八年四月十四日為户外殿中侍御史吳立禮言臣伏覩知樞宻院韓忠彦長子治昨自左朝散郎秘閣校理丁母憂服闋朝見未數日即除太常丞三省以其執政之子必欲擇一優便見闕授之特為之罷一見任太常丞孫諤出為利州路轉運判官其先授下本路運判陳察仍指揮别與差遣除目初下士論沸騰且太常居九寺之首以議論典禮為職平日揀㧞人材最為重選孤逺寒士未易得之今孫諤到任曾未數月不聞自請補外而無故出之陳察亦係見任館職待次已及數月将欲赴任而無故罷之去二寒士而用一勢家搢紳之士所以為之不平伏望寢罷韓治新命改授一閑局或且令在館供職以避親嫌太常丞集賢校理陳察權利路轉運判官在三月二十六日集賢校理左奉議郎陳察權江東轉運判官在八月十六日韓治除太常丞在八月六日已已詔河東陜西弓箭手自今應排轉承襲承替補職付身文字除十将以下從經畧司一面給帖外餘悉令兵部勘當上樞宻院都虞候以上降宣指揮使以下降朝㫖令經畧司給牒遼國令涿州移牒雄州稱奉遼主㫖夏使告乞應援縁南北兩朝通好年深難便允從委􅃰州牒雄州聞逹南朝相度施行詔雄州回牒􅃰州具夏國犯邊事状聞逹照㑹壬申御邇英閣侍讀顧臨讀寳訓至王沿論引漳水灌溉王軫以為不可讀畢上問顧臨曰沿軫所論孰長臨奏釋沿軫所說意上曰是何説可行臨曰沿說可行上宫中恭黙不言唯講讀時𤼵問他日右僕射吕大防進曰臣側聞顧臨讀寳訓引漳河灌溉事臣謂大抵河渠利害最為難明朝廷不可不詳知本末如本朝黄河持議者有三説一曰廻河二曰塞河三曰分水今議者欲以兩河四堤分减水勢兩河築四堤一河用二堤勞費雖少後必决溢兩河四堤勞費稍増乆可無患如漢武帝時河决瓠子築堤障塞僅可支七十餘年本朝昨有二股河分流水勢粗免河患後因閉塞一股併入一股合流遂至决溢分水之利從可知矣今為四堤二河分减水勢實為大利舊録云先帝順水之性北行故道大防主廻東流故有二隄四堤之議使吳安持罷河北民力積土木為堤五年而成捍水東行未幾卒决而趨北大防輙因經筵肆言河事鈔法縱意穿鑿率無按據盖由不學無術妄亂建明故立異意輕揺政本新録辨曰上文議河三説大防之意以四堤為分水二堤合為回河四堤為是二堤為非今史臣以四堤二堤合為回河又兼鈔法詆之似不相類兼後來臣寮論吳安持等事已備載章䟽此書乃專怒大防故凡有建明必䝉醜詆然其語太甚合刪九十一字癸酉兵部尚書龍圖閣學士蘇軾兼侍讀七月二十三日除兵書今又加侍讀不知己入朝未也當考詔令御史中丞侍御史并翰林學士中書舍人各同舉臺官二員以聞户部言成都府等路茶事司奏先被㫖於本司錢内撥二百萬貫充額定本錢太少詔令撥三百萬貫充其餘剰錢物除年例合該支使應副外餘並以金銀見錢闗本路提刑司拘収封樁毎季依條具帳供申鄜延路經畧使范純粹言第三将皇城使解元忠部兵至星布部與賊鬭敵獲級一釐以上将還為賊所追衆兵爭路奔潰元忠單馬間道還寨歸罪所獲生口斬之不報帥司又移易公使錢詐作犒設支用及分遺王普以下囑其勿言詔解元忠為累立戰功免勘特追兩官勒停仍初叙展一期乙亥左司諌虞䇿請詔沿邊帥臣宻戒将官撫養士卒凡軍中裒剥一切横費為士卒害者止之又言西賊萬一大入一路之力不足枝梧而諸路帥臣勢均力敵不能相援望嚴敕帥臣牽制䇿應他路並先精講必勝之策悉力一心迭相為用若實有牽制䇿應之利不能精慮悉力将官依法帥臣降黜從之廣西經畧司言前東頭供奉官邕州永平寨監押蘇佐自交趾與故邕州駐泊都監供備庫副使曹春卿妻李氏等一十七人泛海逃歸詔蘇佐并家屬等九人令廣西經畧司候審問訖給還遞馬驛劵優與盤費差指使一名伴押上京餘八人令在彼安泊優加存恤仍具合如何安排以聞十二月二日佐等授官元陷沒時當檢丁丑召河東節度使致仕潞國公文彦博太子少師宣徽南院使致仕馮京太子少傅致仕韓維入陪郊祀戊寅吏部言見使闕内諸宫院教授一十一處自來少得應選之人致差注不行詔令後諸宫院教授闕並歸中書省差開封府言凖勅遇大寒風雪之日支俵乞丐人錢特就官私貧院支俵縁此凍餒病悴之人頼以全活者甚衆然措置條約有所未備今相度欲乞十月以後下諸廂抄劄人數給散牌子執收毎遇支散月分乞下吏部預選差定經任小使臣二十人凖備與諸廂使臣等分定地分如遇合支俵月分自早親詣貧院逐處俵散約限至午未時已前了當如有死亡及逐時増添人數並畫時申報本廂使臣抄上姓名照㑹從之新無荆湖南路轉運提刑司言體訪得本路役兵盖因裁减人額請受則例後來役使頻併廹扵饑寒或差出他路不支請受或兵官不能舉職使勞役不均是致逃亡雖有法禁多不遵守詔諸軍差出合請口劵或分擘請受者雖在别路並聽挨排月日勘請官司以時給遣己夘熙河蘭岷路經畧司言得齊暖族供備庫副使烏戩新雅克状聞鄂特凌古惡温錫沁向漢以邈川獻與夏國方使人召錫沁令赴青唐又鄂特凌古疑森摩族黨叛己者殺其大首領溪魯爾羅巴等三人朝廷以温錫沁與鄂特凌古乆巳不協外雖徃來内實猜貳常疑錫沁為漢間已其所𫝊􅊥雖未必的實縁錫沁先已許至鄂特凌古處及鄂特凌古方憂内潰欲陰結夏賊自固萬一錫沁為鄂特凌古以訃拘留或為羅巴等陰有殺害夏賊乗之以襲取邈川則西賊展界遂至河州從此漸窺河南諸𦍑為患不小詔范育約度温錫沁如未徃青唐即以勾當别事為名差人至錫沁處仍以所聞作帥臣意宻委差去人面諭錫沁令自謹備毋輕易出入以防他虞并令范育相度若夏賊果攻邈川救之則阻河不救則錫沁素忠於漢難以坐觀不為應援又失邈川益生邊患仰深計熟慮豫為方畧宻具以聞范育再具到洮州青藏等處修城招納河南部族未盡事件樞宻院言鄂特凌古近累乞漢家乆逺不侵占蕃家地土文字經畧司已委曲回荅云汝但不於漢界作過我漢家自是於蕃界别不生事方西夏未順日嚴邊備若先自違約招納河南生𦍑不惟失信於外國又與西蕃生釁徒使兩賊相藉合謀腹背為患深為不便除洮州界修建城寨自合依本司奏候夏國疆界了當西蕃部族一向寧息别議興修外詔范育疾速誡約縁邊不得擅便招納西蕃部族却致引惹生事如有宻諭誠欵之人即仰多方存恤以意羈縻婉順發遣依舊住坐育尋遣使諭邈川未至而温錫沁溪巴烏遂徃青唐果為鄂特凌古拘留青唐録載此事於六年六月誤也今改之青唐録又云漢使未至青唐温錫諭沁溪巴烏已為鄂特凌古拘留范育所差人盖徃邈川温錫沁父子勿徃青唐也今稍刪潤修入八月六日丁已七事可考知㐮州集賢殿修撰章衡知河陽二十八日江淮荆浙等路發運使楊汲知㐮州十一月二十四日改越州太僕卿直龍圗閣謝卿材為江淮荆浙等路𤼵運使是月詔降授皇城使管勾靈仙觀宋用臣叙遥郡刺史外州任便居住中書舍人孔武仲繳還詞頭不行此據政目二十二日宋用臣叙遥郡外州住二十四日孔武仲繳用臣詞頭按武仲及用臣傳並不載此今姑於八月末著其畧須細考之六年閠八月庚辰紹聖元年七月丁卯合参照
