  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0019_WYG_300-1a, image: WYG0319/WYG0319-0107a.png}
body:
  text: 續資治通鑑長編巻二百九十六宋李燾撰神宗元豐二年春正月癸酉詔北京澶定州封樁糧六百七十餘萬石草千七百餘萬束今後如與轉運司兊換即對見在數交割仍委安撫司専領之乙亥西上閤門使韓存寳為四方館使忠州團練使初薛向與吕公著並命入樞府向事公著甚恭既乆公著亦稍親之議論頗相左右存寳將陜西兵平瀘州叛夷上欲優進官秩以勸立功者向曰瀘州本無事今優賞存寳後有立功大於存寳者何以加之公著曰薛向言是也上從之罷岢嵐火山軍市馬先是邊臣建議二軍市土産馬以廣戰騎既而北界移文稱邊人多盜馬過界中賣故罷之丙子詔舊眀州括索自來入髙麗商人財本及五千緡以上者令眀州籍其姓名召保識嵗許出引發船二隻往交易非違禁物仍次年即回其發無引船者依盜販法先是禁私販髙麗者然不能絶至是復與中國通故立是法光禄寺丞詳定説文陸佃兼詳定郊廟奉祀禮文己夘命翰林學士權知開封府許將權知禮部貢舉知制誥蒲宗孟天章閣侍講兼直舍人院沈季長權同知貢舉天章閣待制李肅之權發遣開封府肅之辭疾以樞宻直學士錢藻代之藻命在丁亥今并書遣判都水監王令圖往視河役以是嵗役夫倍多也詔利州路轉運使劉忱選官劾梓州路轉運判官程之才與知瀘州任伋互論訟事伋以不能撫遏措置蠻事仍先差替伋再任瀘州熊本薦也始之才欲用兵討羅茍夷伋以為羅茍本熟戸因求骨價侵擾境上與生夷反叛不同可招納之若遽加以兵彼窮廹無所竄伏轉投生界則甫望箇恕諸部更相連結益鴟張難制邊患自此始矣之才不聽因檄伋無得與兵議伋遂疏之才不法事闗瀘州十五條上之既而乞弟果入冦之才遽劾乞弟過江安時伋不即掩撃并他不法事朝廷疑之於是先罷伋而委忱究兩人曲直伋見元年二月二十四日二年二月十三日减磨勘年秦觀集可考詔以提舉出賣解鹽司錢十三萬八千二百四十餘緡給開封府提典司糴軍儲詔市易司罷立保賒錢法已出錢立輸限如半年内輸本息足者蠲其出限罰息錢物力雖薄而有營運者量力支借毋過舊數三之一令元體量檢估官分認催收限三年結絶嵗具所收錢數比較賞罰専委勾當公事官一員催驅其自今用産業抵當者並拘留契書嵗收息一分半檢估官吏如容増直冒請以違制論不以去官赦降原减其賒請物且如舊法檢估本家物力所請不得過所有之半去年十一月十一日壬子王居卿已甞建議又十二月二日壬寅詔當考市易舊法聽人賒錢以田宅或金銀為抵當無抵當者三人相保則給之皆出息十分之二過期不輸息外每月更罰錢百分之二貪人及無頼子弟多取官貨不能償積息罰愈滋囚繫督責徒存虛數實不可得於是都提舉市易王居卿建議以田宅金帛抵當者减其息無抵當徒相保者不復給自元豐二年正月七日以前本息之外所負罰錢悉蠲之凡數十萬緡負本息者延期半年衆議頗以為愜此據司馬光記聞二月十九日當考詔舊𨽻三司寺監承受斷遣或送府司軍廵院禁勘公事并提㸃倉塲司四排岸司徒以下罪及合追究公事舊送三司者送大理寺從本寺請也詔陳士儒母被害事送大理寺以御史黄亷言開封府不劾正士儒知情移勘故也初送開封元年六月是年八月壬子又移御史臺詔樞宻都承㫖韓縝副都承㫖張誠一可檢㑹供職嵗月取㫖縝尋除龍圗閣直學士誠一除四方館使御集正月九日事詔樞宻副都承㫖張誠一已差都大提舉宴設諸司其上元節車駕登門及行幸燕所並令提舉㡬察詔以太皇太后服藥有効醫官朱有章秦廸亢常沈士安各與一子若孫遷官陳易簡授遥郡刺史壬午馬軍副都指揮使容州觀察使楊遂為殿前副都指揮使寧逺軍節度使舊紀書此太常博士檢詳樞宻院禮房文字王伯虎為館閣校勘御史何正臣言赴太廟監察攝太尉豫章郡王宗諤遣吏𫝊言有負屈事案宗諤親則近屬爵為郡王安得更有抑屈事就使有之不訴於廟廷而訴於臣且方齋祠輙語及此望付有司治其罪詔大宗正司劾罪後大宗正司言宗諤三問不承詔罰銅二十斤梓夔路鈐轄司言知歸徠州甫望箇恕死請以其子乞弟承襲從之癸未詔知沅州謝麟監督討捕湖北路猺賊甲申詔司農寺市易淤田水利司封樁糧斛並兊換與河北糴便司更不計置本志係此事於五年恐誤也今依實録四年三月八日戊戌可考丁亥以知府州折克柔弟西頭供奉官克行為禮賓使知府州先是克柔以目病乞致仕仍乞以克行承襲詔克柔與宫觀差遣而有是命克行繼閔子也封皇太后乳母永嘉郡夫人賈氏為燕國夫人詔諸路修城於中等以上戸均出役夫夫出百錢其役廣戸狹處以五年分五限餘以三年分三限送官官為相度募人或量増役兵兼築如錢不足預具數以聞遇災傷及三分年仍權住輸錢詔宗室大將軍以下願試者本經及論語孟子大義共六道論一首大義以五通論以辭理通為合格二紀並書立宗室試經義論法知大理卿崔台符言乞自今大理勘事内有情法不稱者許以三司條例斷奏事若重宻仍依審刑院三司開封府例上殿奏裁從之降右諫議大夫蘇頌為祕書監集賢院學士知濠州司門員外郎徐大方奪兩官虞部員外郎孫純奪一官並勒停降國子博士許彦先監吉州酒稅初同文館鞫純私貸官錢事頌坐失出杖罪御史舒亶駮奏以謂純與頌實為近親不可以失論故雖㑹降當釋特責之大理少卿韓晉卿吕孝亷坐理斷不當各罰銅二十斤晉卿等罰銅乃三月二日庚午今并書舊紀書右諫議大夫蘓頌蔽官屬貨僧錢罷知開封府降為祕書監知濠州新紀不書戊子手詔大理寺日者修舉墜典釐正職業俾治官府獄事前代章程湮滅嵗乆不可復知今所圗􅀞皆以義起椎輪規摹不少寛假必難稱辦茍官吏各懐顧忌於驅遣之際或致逡廵則稽留弊害無異前者其本寺承事勘鞫可且依准制院又御史臺例不供報糾察司斷訖徒以上旬具犯由申中書樞宻院刑房俟置司及一年别取㫖其後及一年乃復詔依開封府例供報糾察司御史何正臣言熈寧元年禮部試上舍生並於試巻印特免字恐於考較不合公議今上舍赴禮部試乞更不印號從之己丑資政殿大學士右諫議大夫知杭州趙抃為太子少保致仕辛夘權發遣利州路提㸃刑獄太常博士吕開權知戎州開自利路提刑知戎州必有故當考無則削去大理評事元耆寧為崇文院校書同知禮院以上批參知政事元絳子耆寧訪於士人多其孝謹觀所為文頗亦典贍故也先是上元張燈執政諸子皆出遊而耆寧少多病獨不出上喜察聽外事對輔臣稱奬之以為好學勤篤因有是命上批侍衞歩軍并軍頭引見司所管東京司備軍借事聞自來差科無優重之别勞逸偏頗一出於主轄官受禱私意間雖有守公之人亦患無法守以拒干請宜依昨詳定剰員差科例委燕逹具約束條目送承㫖司看詳聞奏頒降其備軍借事仍並𨽻歩軍司差使詔荆湖南路轉運司罷置潭州樓櫓其修城限五年全邵州限三年畢工役兵不足許募民夫上批直翰林醫官院沈士安醫學吴有成治嘉王頵疾有勞士安候遷副使減磨勘二年有成特遷一官壬辰詔三司出銀紬絹及末鹽錢二十萬緡賜河北轉運司以糴軍儲癸巳上批聞陜西河北京東自去冬無雪可令轉運司訪名山靈祠祈禱又批聞階成州去後災傷難食之民流者未止官司初不經畫賑濟可下司農寺并本路提舉司速施行三司請應増禄行倉法人但有職事在手如敢詐欺財物及借使錢物典質之類罪賞並依倉法内被詐者不坐如能自告亦依重法賞之詔詳定重修編𠡠所立法編𠡠所言應行重法人借使錢物之類當依取受科罪若本職相干公事雖有過之後而受者亦合依重法施行其因賣買以取剰利并借使之類還訖而事發者尚未有法今定依取受條還訖事發減五等家人減身犯二等坐之其監司吏人委逐司互覺察從之甲午詔安南瘴死官吏物令轉運司具數及物主名以聞詔辰州叙浦縣置龍潭堡差戍兵及土丁各五十人廵檢使臣一員從湖北路都鈐轄司請也京兆府學教授蔣夔言春秋釋奠以孔子為先聖顔子為先師先聖之樽在西先師之樽在東肆祭器實牲體盥手濯爵奠幣讀祝拜跪登降進退之節與孔子無少異而九人之像坐于兩旁樽酒豆肉不及焉臣愚不識為是禮者何以處之且孔子師也顔子雖大賢與九人者徒也今推顔子以配享孔子而其禮均九人者獨不與享以孔子為先聖顔子為先師而師名故不及於孔子蓋縁唐開元禮爾開元禮因革損益之不得其當者非徒此也乞下臣議於禮官取開元釋奠儀詳定可曰兖國公顔子毋稱先師毋讀祝其祭器牲體薦享祝獻之儀一切降殺毋擬於其師而進九人亦在祀典顔子降於孔子九人降於顔子以正開元之失禮詔禮院詳定禮官言唐顯慶二年長孫無忌議按永徽之令改周公為先聖孔子為先師顔回邱眀並為從祀謹案禮記凡學春官釋奠于其先師鄭康成注先師若漢禮有髙堂生樂有制氏詩有毛公書有伏生可以為師者又記曰始立學釋奠于先聖鄭注曰若周公孔子也據禮為定昭然自别聖則非周即孔師則偏善一經漢魏以來取舍各異顔回夫子互作先師宣父周公迭為先聖所以貞觀之末親降綸言今請改令從詔於義為允從之今看詳孔子顔子稱號厯代各有據依難輒更改並配享正享禮意本一儀物祝獻亦難降殺所乞進九人亦在祀典盖州縣舊釋奠儀未有十哲從祀之文檢㑹熈寧祀儀十哲皆為從祀各設籩二豆二爼簋簠爵各一命官分獻一奠而止乞自今三京及諸州文宣王廟十哲像春秋釋奠並凖熈寧祀儀從之朱本云蔣夔言事並無施行亦無義理合刪去今依墨本乙未寳文閣待制權三司使李承之為龍圗閣直學士上批承之赴司供職已及一年八月特有是命承之少鞠於兄肅之及長事之如父愛其子如已子凡恩補率先及之及是懇辭學士乞以授肅之且曰臣兄為待制二十年矣上曰卿兄弟孝友足勵風俗肅之亦當遷也居五月授肅之龍圗閣直學士肅之授直學士在六月傳云即並命之誤也詔諸州軍祠祭齋醮祈禱舊差長吏出城經宿者自今以通判代行丙申上謂輔臣曰向以陜西用度不足出鈔稍多而鈔加賤遂建京師買鹽鈔之法本欲權鹽價飛錢於塞下而出鈔付陜西無止法都内凡出錢五百萬緡卒不能救鈔法之弊盖新進之人輕議更法其後見法不可行猶遂非憚改王珪曰利不百不變法上曰大抵均輸之法如齊之管仲漢之桑𢎞羊唐之劉晏其才智僅能推行况其下者乎朝廷措置經始所當重惜雖少年所不快意然於國計甚便姑静以待之新進輕議改法當考或與沈括相關本志甚畧已附注熈寜十年二月二十七日今用實録正文并寳訓以鎮南軍節度推官彭持為著作佐郎持提舉兩浙市易司嵗餘收息錢十九萬緡特賞之丁酉置大理寺勾當公事官二員以大小使臣充詔大理少卿資任視三司判官丞視轉運判官文彦博言騎㨗副指揮使李成往年破貝州功第一兼武藝精熟乞令詣闕呈試換一前班從之詔閤門祗候趙戡押賜夏國主中冬時服輒收接蕃書令開封府劾罪戊戌左藏庫使李希一為永興軍路鈐轄希一初授本路都監自陳乞一路分鈐轄上批希一累經外任恐自當陞鈐轄可具資序進呈遂命之賜度僧牒百修眀州城相州安陽縣民叚簡以父兩目失眀斷臂取骨髓飲父父目復常二月庚子朔詔保州作院募民為工匠其給銀鞋錢及南郊賞賜視廂軍以諸州軍作院所給舊並係廂軍投換故也辛丑經制熈河路邊防財用司言蕃官内蔵庫使李楞占納支等乞助築熈州外城從之仍日給運土人米一升毋得抑勒科定赴役人數眀年築河岷州蕃官趙醇忠趙結成瑪皆以夫助城亦給之馬軍都虞候燕達言内外諸軍拍試教閱弩乞許用鐡臂鉤踏射不用包指鐵臂鈎在手脫之上踏硬取力比之包指頗加斗力便於施放仍遇敵相近執持刀杖無所妨礙從之後詔諸軍用鐵臂鈎踏射者各於斗力外加三斗壬寅詔自今帶御器械遇獨員差内侍押班兼權進媫妤宋氏為充媛上批審刑院刑部乞因併差詳議詳斷官入試院積未斷公案凡五百餘道罪人幽繫囹圄日夜待命豈宜淹滯留壅如此其自今月三日後官吏並勒宿癸夘詔聞濵棣徳博州盜發相仍令提㸃刑獄汪輔之督捕無致結集如捕盜官弛慢劾罪以聞又詔定公使錢三司開封府嵗萬緡司農寺三千五百緡將作監三千緡都水監二千五百緡羣牧司軍器監都提舉市易司各二千緡兵部千五百緡刑部除舊大理寺月支錢外千緡國子監七百緡並自今年始其不該裁定處依舊甲辰詔威茂黎三州罷行義倉法初知興州羅觀乞置義倉於川峽四路許之既而成都府路提舉司言威茂黎三州夷夏雜居稅賦不多舊不推行新法嵗計軍儲皆轉運司支移彭蜀州稅米就輸及募人入中恐不可置義倉故有是命又詔諸王宫教授自今不許過兩任又詔近已罷都大提舉在京諸司庫務司其所𨽻庫務令三司副使判官勾當公事分季㸃檢申中書乙巳審刑院刑部請以審官東院地為審刑院太常禮院地為刑部詳斷司從之太常丞集賢校理顧臨權發遣開封府推官太子中允直集賢院開封府推官范育依舊為樞宻院檢詳官十七日臨罷府推吕公著云云詔河北東路提舉司借常平錢四萬緡分給大名府澶州糴軍糧丙午河東經畧司言大山軍廵檢韓渭擅領兵士入北界與北人相射及誘致蕃部至廨宇待以客禮詔渭衝替令轉運司劾罪詔皇太后姪禮賔使榮州刺史髙公紀乆疾在告可罷勾當三司衙司差提㸃崇先觀免日赴起居丁未詔知南劒州萬公儀追一官免勒停通判黄子春知邵武軍周約簽判李上儐各罰銅二十斤差替其餘廵檢廵茶鹽縣令尉追官勒停罰銅衝替者凡二十九人並坐賊廖恩經所部不覺察及討捕無功雖㑹赦降去官猶責及之太常丞程顥判武學十五日顥罷吕公著云云庚戌計議措置邊防公事所言以環慶路正兵漢蕃弓箭手强人聫為八將第一將駐慶州第二將環州第三將大順城第四將淮安鎮第五將業樂鎮第六將木波鎮第七將永和寨第八將邠州從之詔梓州路轉運使髙秉判官程之才各陞一任以討瀘州夷事饋運有勞也詔聞濵棣滄州昨因災傷至今民尚乏食其令提舉官李孝純存䘏有合行事行訖以聞事體稍重者奏聴㫖察知縣縣令有不職者權對移辛亥知越州給事中集賢殿修撰程師孟降為右諫議大夫坐前知廣州失入市易牙人杖罪及斷割牙錢不當也荆湖北路都鈐轄司言辰州本斗堡斬獲蠻賊十首級其餘殺戮甚衆殘黨窮廹亡散類皆卑弱其有能自歸者欲誡約遣還以示威信詔自歸者貸其死毋給賞令仍舊住坐詔聞齊兖濟鄆州榖價貴甚斗直㡬二百囏食流轉之民頗多司農寺其諭州縣以所積常平倉榖通同比元入價斗虧不及十錢即分場廣糶濵棣滄州亦然三司又言齊淄等州榖貴春夏之交慮更艱食請輟廣濟河所漕榖二十萬石減價出糶所糶錢發上京理為年額從之詔禮部下第進士七舉諸科八舉曽經殿試進士九舉諸科十舉曽經禮部試年四十以上進士五舉諸科六舉曽經殿試進士六舉諸科七舉曽經禮部試年五十以上者聽就殿試内三路人第減一舉皇祐元年以前禮部進士兩舉諸科三舉凖此仍不限年其進士一舉諸科二舉年六十以上者特推恩又詔開封府國子監間嵗考場以前到禮部進士五舉諸科六舉年五十以上許就殿試又詔朱墨本並於三月一日重出今削去上批京東淮南兩浙路應副髙麗貢使什物可逐路委一監司主領禁毋他用壬子梓州路轉運司言去年十一月蠻乞弟率衆犯邊縱火掠人雖已遁歸慮復來冦乞増禁軍及召施黔州義軍赴江安縣納溪寨為守備候團結夷人子弟可用及邊事帖息漸減放從之仍令留黔州義軍二百人月給糧米一石職方郎中知瀘州任伋減磨勘二年以韓存寳言討夷人仍宣力故也正月九日伋已差替今猶以知瀘州減年當考端眀殿學士兼翰林侍讀學士提舉崇福宫司馬光言同編修資治通鑑范祖禹已改京官罷任乞留在局編修從之詔開封府界提㸃提舉司京東河北路轉運提舉司權住催理第四等以下戸逋負俟夏熟日輸納仍令河北轉運司具災傷州縣見催殘零逋負各是何官司錢物所負若干數以聞癸丑復太常少卿知澶州韓璹為右諫議大夫仍再任璹先坐失舉人追官一期當叙而知諫院黄履言璹治郡又治決河最有功故有是命上批瀘州蠻乞弟雖蕞爾小醜不足深憂然彼方武備不修兵力疲軟守具殘缺使賊知我虛實猖狂豕突過江即便至瀘州城下或守吏寡謀小有差跌則一路惶駭旁郡兵既難於救援邂逅之間遂成巨患今雖從京已發歩軍兩指揮然道里遼逺到未有期可就近選發秦鳳路下畨土軍歩人兩指揮甲寅罷程顥判武學以御史何正臣言顥學術迂濶趨向僻異故也後二日又罷顧臨開封府推官令仍舊判武學臨受命踰旬顥才八日也同知樞宻院吕公著言臣聞臯陶陳謨以知人為難孟子論道以知言為要所謂知人則哲能官人何憂乎驩兠何畏乎巧言令色孔壬者知人也詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮者知言也故曰帝王之徳莫大乎知人而成敗之機在於察言是以堯舜在上眀目達聦詢四岳以難壬人命納言以聖讒說使惡直醜正者不能亂天下之俗服讒蒐慝者不能遷人主之意然後四門穆穆而朝廷清眀權歸於上而天下無事臣向䝉陛下擢在樞府中謝日不敢縷陳細務輒論及判別忠邪之道甞謂陛下勵精為治十年不懈小大政事日欲増葺而朝廷之間邪説尚勝大抵小人之害君子必求要切之語以中之使之不能自解方朝廷修改法度之初凡在朝野孰無論議陛下聖度兼包豈悉記録而小人賊害指目未已茍昔有異同之論而今不為言者所容則必指以為沮壊法度之人不可復用非陛下加意省察則端人良士類遭排格當時粗陳此論陛下頗賜開納近日除顧臨開封府推官程顥判武學搢紳聞之皆以為顥昔任御史嘗有所言陛下不以為過而稍用之知朝廷用人不終遺棄必料𫝊之四方士人無不欣仰然命下數日復因言者而罷去則知臣前所陳者其風猶未殄也臣實不佞嘗為一二識者私道陛下聖徳竊以為陛下春秋鼎盛履崇髙之位操生殺之柄而記人之功忘人之過極天地山海之量此羣下所以愛戴而人人願立於朝也小大之臣雖姦回頗僻如鄧綰者猶降責不踰年遽復侍從授以方面則是盛眀之世本無棄絶之人邪正賢不肖亦未易以一言而定也臣愚以謂今日公卿士大夫嘗於朝廷法令有所可否然其愛君許國之心愈乆而益眀者甚多其唱和雷同承迎附㑹而姦言汚行卒為陛下所照者盖亦不少然則人固未易知士亦不可忽也况如顥者陛下早自知之其立身行已素有本末講學論議乆益疏通且其在言路日時有論列皆辭意忠厚不失臣子之體使得復見用於聖世其奮身報國未必在時輩之後兼所除武學差遣亦未為仕宦之要津而小人斷斷必以為不可者直欲深梗正路廣沮善人其所措意非特一二人而已臣區區所慮者讒説殄行之徒日以熾盛則守正向公之士愈難自立其於聖政不為無損臣受恩與常人不同茍有所當言者不敢顧避緘黙以負陛下優遇惟陛下幸察詔大理寺官屬可依御史臺例禁出謁及見賔客成都府路提舉言漢州自熈寜七年災傷戸絶之家有暴骸未𦵏者三十四戸九十八人乞人給錢二千收瘞鬻絶戸田宅以償官從之朱史簽貼云此事至小兼賣本人戸絶田産收𦵏自有編敕正條合刪去新史復存之日中有黒子如李凡十日乃散舊紀書此新紀不書散日志同乙夘詔乞弟如再犯省地委王光祖與捕盜官分兵進討令有所懲艾毋得縱其焚掠仍令轉運司協力經制又詔兖鄆齊濟濵棣徳博州飢甚艱食之民頗多可遣官分往諸州益募民為兵以補開封府界京東京西將兵闕額上批殿前馬軍司同提舉教習軍馬所已拍試限滿依前不入等兵級可並與本軍合入退軍以楊遂等言捧日龍衞三十二指揮内二百一十人展季已滿所習弓箭猶未入等故也命左藏庫副使張克眀簡奉先兵級以補轉員軍分克眀任永定陵都監回建言乞升簡故有是命知大理卿崔台符言流以下罪長貳親録問决遣其大辟罪乞牒御史臺選差曽任親民常參官一員審問即特㫖推勘罪至大辟或命官即臨時取㫖差官詔大辟罪牒御史臺差官赴糾察司審覆餘如所請後又詔報御史臺差官同糾察司就寺審覆舊紀書詔大理决重辟御史臺同糾察司審覆新紀不書丙辰判國子監李定言直講以𫝊授經術為職乞不令管規矩事從之詔解池鹽嵗以二百四十二萬緡為額自眀年始其嵗増錢十二萬緡半令三司封樁半與陜西轉運司移用先是解鹽鈔分東西西鹽止得賣於所定地又並邊州軍市芻糧給鈔過多故鈔及鹽皆賤而難售商旅不行官價自分而為二於是三司及制置解鹽司言東鹽價重西鹽價輕請放西鹽得自便而増其價與東鹽等以平鈔法嵗可増十二萬緡後給鈔更不分東西關渡西鹽約束悉廢省並從之解池鹽鈔舊以二百二十萬緡為額至轉運使皮公弼請増十萬以助邊糴至是為二百四十二萬三司又言商人已請出西鹽宜令貼納虧官錢使與新法價平亦如其請食貨志載此叚自先是以下與實録同已附注熈寧十年二月七日沈括自誌為鹽蠧者其説有四此其第三説也四説已附熈寜十年二月二十七日按括自誌則為三司使實行其説今括於十年七月九日罷實録乃載此事於元豐二年二月不知何也丁巳詔河北京東河東陜西久不雨可分遣禮官禱於東西北嶽五臺山著作佐郎司農寺主簿黄顔為太子中允兼監察御史裏行贈馮翊郡君連氏為美人連氏仁宗朝内人也詔成都府鈐轄寄任頗重與他路不同其知府處置鈐轄司職事自今並須參議於接待儀範並依蔡延慶未到任以前體例毋輙裁損座次與監司依熈寧附令敕施行仍罷與本路通判序官指揮初成都兩鈐轄謁知府止循廊及退即㕔堦上馬至蔡延慶以帶都鈐轄仍令趨堦仍不上馬馮京以前執政帶安撫使其禮遇頗殺或以為言故降是詔墨本趙抃馮京以前執政為安撫使故見鈐轄儀稍殺朱改之今刪取修潤馬軍司言雲騎軍闕二千一百十五人詔於雲㨗等軍選補又詔川峽四路武寧指揮本教閱廂軍昨升為禁軍其於廂軍舊額除之戊午詔應置市易務處賒請錢並依在京市易務法聽以金銀物帛抵當收息毋過一分二釐正月九日詔并王居卿云云又三年九月五日皆當考庚申詔近詔北界歸眀人守官致仕分司及牙校軍民僧人各具所在并元歸眀年月見今職位姓名奏上其西界投來及送到人口凖此所有西北界入漢地作過編配人數亦令具年月及所在以聞詔入内東頭供奉官宋用臣不須候盧秉押米運到京及今河水未通先往案視導洛通汴利害以聞元年十二月六日初遣安燾二年三月二十一日罷盧秉又詔諸路方春闕雨慮生蝗蝻害田其令河北陜西京東西等路監司常戒州縣撲滅毋致滋生乙丑知滄州張問言民飢至相食今州倉大豆四萬九千餘石可支五年漸有陳腐乞留支二年外斥其餘以賜飢民可活良民三萬口上批可下提舉常平事李孝純速相度施行訖聞奏戊辰詔増監察御史裏行何正臣舒亶同鞫太學獄綱要云生虞蕃不許接見賔客從御史臺請也太學獄初送開封在元年十二月五日不知何時移御史臺此年三月一日五月十七日可考經制熈河路邊防財用司言十事乞收熈河岷州通逺軍官員職田以募弓箭手視逐官元給頃畝每頃嵗給本司錢十千一也已拘收三州一軍公使醋坊歸本司資助請以逐處月収課利約定監官三等食錢月終紐計於醋坊净利錢内納給二也岷州鹽官鎮通逺軍鹽川寨兩鹽場近撥屬本司嵗入増羡乞自今年别立界嵗終較其登耗以施賞罰三也鳳翔府増置市易務與秦熈等五市易務相為表裏移用變易四也本路州軍嵗遣官置場和糴遇榖價貴即出糶收息乞視所收息錢萬緡以上與減磨勘一年内選人免試與優便差遣每二萬緡循一資五也四市易務各増監官一員兼領市糴可減罷本司凖備差使四人六也通逺軍威逺寨錢監改鑄銅錢罷鳯翔府郿縣剏置錢監七也秦鳯路坑冶如不許本司經制乞令轉運司撥還已興置本錢如許經制乞發遣陳述坑冶選人楊徽赴本司其坑冶如係本司剏置並乞𨽻屬本司八也岷州􅔋川荔川閭川寨通逺熟羊寨乞置牧養十監募兵為監牧指揮其營田乞依官莊例募永濟卒二百人其永濟卒通以千人為額以十六官莊四營田工役其請給並從本司自辦九也遇急乞依茶場司例許權差待闕得替官勾當十也又言乞築河州西原北河堡並從之廢鼎州白塼黄石二寨
