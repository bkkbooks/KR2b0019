body:
  text: 續資治通鑑長編巻四百四十一宋李燾撰哲宗元祐五年夏四月丁酉詔龍圖閣直學士鄧温伯兼侍讀提舉醴泉觀其新除翰林學士承㫖告繳納温伯告命既出言者論駮不已故有是詔王巖叟又封還詞頭奏曰臣昨封還温伯除翰林承㫖詞頭伏奉指揮令以次舍人撰詞臣以所言無取兩乞罷職未䝉俞允今日别承温伯改除侍讀詞頭臣不敢輙行縁臣本論人才之邪正不争名職之髙下伏以陛下富于春秋方以進學為急正當選擇正人日侍經帷以輔養聖徳之時而進佞邪以置左右正人懼焉書曰昔在文武其侍御僕從罔匪正人荀卿曰君子居必擇鄉遊必就士盖所以防邪僻而近中正也夫僕御之官㣲賤者也朝夕左右給役事而巳恐其一言或邪遂誤君徳猶必用正人况勸講之臣乎庶士猶知近中正而防邪僻况萬乗之主乎温伯姦邪事迹猥多不能徧舉舉一事陛下親所見者以為眀驗垂簾之初陛下下詔求直言欲以知天下之事而温伯草詔隂合姦臣之意陽承陛下之㫖名為求言之詔實乃禁言之書使天下無一人敢應詔者逮司馬光具以此意陳于陛下别作詔文于是天下之情始得以上達姦邪如此豈可令侍言帝幄預親近之列乎臣粗知愛君何敢奉詔伏望収還新命俾易善藩庶不累日新之徳獲允至公之論貼黄稱元豐八年五月五日下詔求直言乃是兩宫盛徳之舉惟温伯與蔡確協謀蔽塞顛倒其說将求言之詔隂藏六事為距言之文若非司馬光極口論列乞行别草詔書陛下何由得知欺罔天下之人何由曉達聖意姦臣為害如此己見眀迹今若置之經筵日承顧問深恐佞邪惑亂聰眀上累君徳臣輙節録温伯元行詔本及司馬光論列乞别草詔書奏状望賜省覽庶見姦臣邪心未易防察不可一日令在左右詔以温伯知南京既而復從初命鄭雍新舊傳並云雍封鄧温伯侍讀除命復除承㫖雍乃草制按丁酉詔云其新除承旨告繳納則承㫖告已嘗行出矣當是時在西掖者三人鄭雍顔復王巖叟也初繳還承㫖詞頭必送以次舍人不知復及雍孰為之今令繳納者即此告也雍若先曽草制則後必不更草豈今所繳納者或顔復所為辛丑再除雍實為之然顔復時已病不當直按辛丑詔云依三月十四日除命復為承㫖自不須别出告既不别出告而傳稱雍遂命詞頭所不可曉盖巖叟繳還詞頭即送雍雍命詞訖更除侍讀雍已論列因用雍前所撰告命給付而傳誤云爾也巖叟繫年録記此事頗詳今從之雍四月十日遷中大夫舊録有之新錄削去不知雍以何事遷也當顔復五月六日自西掖改章制侍講祭酒翼日遂卒或除温伯時復已病不必當制也據王巖叟五月十八日自西掖改龍制都丞蘇轍云言温伯者皆美遷按巖叟嘗以章制為都丞矣豈以遷龍制為美乎當考三省言自春以来時雨未足民間諸般欠負恐未能償詔府界諸路監司應雨澤未足處人户合催理繫官欠户權住理納候豐熟日依舊樞宻院言轉貟馬軍指揮使已下至副兵馬使人數溢額轉遷不行詔權置下名軍使一百七十人副兵馬使一百七十五人詔大理寺合存火限官員出局即時洒熄夜宿行遣文書聚於宿官一處專切提舉如不洒熄及至遺漏並依尚書省諸房法初元豐七年尚書諸房不以時熄火及遺漏者罪當徒至是以元豐庫接大理廨垣而本寺未有火禁故降是詔新本削去户部言乞于請官物條内添入充官用之物過限具因依報所屬别出憑由帖旁從之舊無限或閱嵗不請難於檢察故也新削戊戌熈河蘭岷路經略司言乞委城寨使臣同召募少壯堪耕戰之人刺充弓箭手毎員招及三百人著業及一年减磨勘一年百人减半仍委知通提舉毎及六百人各與减一年磨勘三百人减半從之己亥提㸃京東東路刑獄劉􅆳為刑部郎中詔宣使和州刺史内侍押班趙世長為本省右班副都知樞宻院言軍人差發往川峽路屯駐者内有曽犯徒經斷并逃亡捕獲或無家屬若配軍并降到人並隔下權移本州或隣近以次州禁軍指揮管轄差使候軍回却歸舊指揮収管從之新本削去庚子詔李偉差遣候過漲水檢舉取㫖從范祖禹三月辛未駁奏也辛未三月六日此據蘇轍九月末奏増入辛丑詔鄧温伯依三月十四日命除翰林學士承㫖其四月二日提舉醴泉兼侍讀除命勿行始太皇太后諭執政令以温伯知南京既而曰且記取便與遷及退尚書右丞許将謂同列曰簾中語殊未婉順盍再将上中書侍郎傅堯俞和之吕大防以為然時鄭雍聞王巖叟再封還詞頭亦上䟽乞辨邪正曰朝廷頓除温伯為學士承㫖而衆言交攻一旦改命乃使日侍天子左右得以納說臣不知以温伯為邪而退之或以為無過而用之也於是執政并雍䟽進呈卒從初命而有是詔雍前所撰承㫖告猶在閤門乃促温伯拜受新舊録于此始載王巖叟封還温伯詞頭詔送以次舍人又不載以次舍人為誰今移封還詞頭事見三月十四日仍取劉安世言章偹載之餘人更須捜討編入王巖叟紀年録云鄭雍䟽盖文過之辭語鄭穆曰此䟽同進呈必害事已而果然左諌議大夫劉安世言臣伏見朝廷除温伯為翰林學士承㫖初則中書舍人繳還詞頭繼又給事中兩次封駮臣竊謂至公之朝必無遂非之理遷延累日未敢論列比聞傳報前命復下搢紳相顧莫不失色何者陛下即位以来未嘗沮抑公論今兩省給舍舉職如此盖是公議以為失當朝廷略不聼納持之益堅臣再三思之不得其説及觀告詞乃知陛下以攀附之故遂加恩寵臣獨疑其不然須至辯正前代創業之主經綸草昧乃有豪傑之士用為佐命之臣謂之攀附可也繼體之君或由儲貳或自藩邸春宫王府咸備僚屬以其有保傅之恩調䕶之效謂之攀附亦可也恭惟陛下初自妙齡未遑出閤誕膺天命遽登宸極中間温伯惟曽暫掌牋記何嘗得望清光而遂以攀附加之循名考實顯為非據況温伯姦邪反覆天下所知隂假王言内交蔡確此實有罪茍逭典刑更䝉誤恩尤駭物聼伏冀陛下審察清議斥逺佞人収還詔除以慰衆望又言温伯資禀姦邪貪附權利熈寧中王安石吕惠卿勢均力敵更相傾陷温伯始終反覆出入兩黨巧鬬側媚情態萬状元豐間蔡確用事悉心附託召自成都置之翰苑及陛下纂承天極褒賞輔弼温伯草王珪麻制則曰預定議于禁塗為確命詞則曰尤嘉定議之功臣聞太皇太后之立孫神宗皇帝之與子上當天意下符人望聖心先定不假外謀考經稽古無一不合確實何力敢貪天功就如姦人之言出於大臣之䇿亦當先推上相方及次輔而温伯隂受邪説稍絀王珪乃於確制特為溢美重輕顛倒欺惑天下盖小人之深計将徼幸于異日温伯預聞其事故欲以此為張本原心定罪宜䝉顯戮茍逃誅竄已出大恩豈可塵汚玉堂奉承玉㫖况中書舍人繳納詞頭給事中再曽封駮成命之下則御史全臺兩省諌官並曽論列物情駭動未見如今日之甚者以此卜之則公議所棄不可不去也伏望聖慈察君子小人消長之機為宗廟社稷永逺之慮早出臣奏付外施行又言臣兩曽論奏鄧温伯差除不當至今未奉指揮臣聞朝廷之務莫先於用人君子進則治之本也小人用則亂之階也王者深居九重不能盡知臣下之邪正是以設諌官御史之職俾司耳目之任而採中外之公議是非可否惟衆之從故蔽賢之言不能害君子黨姦之論無以助小人眀君無所用心而賢不肖自辨知人則哲其道不過如此今温伯姦邪反覆惟利是嗜交結蔡確臣節不忠自聞詔除甚駭物聼臺諌論列乞寢成命今已累日未聼俞音事繫消長不避誅譴伏望陛下以言官累奏付外施行勿以姦人先定之語而廢天下至公之論又言臣前日以職事進對因及治亂安危之大計伏䝉聖慈特賜開納感激抃蹈莫能自勝最後論列温伯差除不當陛下諭臣曰卿等須體朝廷之意天下事豈可盡由臺諌亦當出自宸𠂻臣雖已具義理開陳退而深思猶有未盡輙布悃愊上凟天聼惟陛下不憚煩而試聼之臣嘗讀國語以謂天子聼政使公卿至於列士獻詩瞽獻典史獻書師箴䏂賦矇誦百工諌庶人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉是三代之前上則公卿大夫朝夕得以納忠下則百工庶民猶執藝事以諌故忠言嘉謀日聞于上而天下之情無幽不燭無逺不通所為必成所舉必當者諌諍之效也後世之事不務獻納於君而多為自全之謀正論逺猷鮮有入告於是設貟置職而責之以諌矣進言者益少而聼言者不知此天下之治所以終愧於先王之盛時也神宗皇帝考古揆今更新官制以朝廷者政事之所自出乃用有唐六典之法置舍人於中書省凡詔令之未安法度之未便皆得抗之庶協厥中萬一差失則設給事中於門下省委之封駮猶恐人之謀慮不能盡善則又命諌官論議御史糾彈上下維持紀綱詳宻誠使此地卒皆得人交修職業而朝廷不治者未之有也今天下方制萬里獲覩陛下之清光者億兆之中僅有一二就獲覩之中得接言議者又千萬無一焉自二聖臨御以来羣臣無非次之對上則六七執政下則四五言官而已陛下所與謀議者其寡少如此臣若更不以體朝廷為事知公議之不可而不以告于陛下則黎民疾苦萬務闕失邪正之消長中外之情偽何以盡達於聖聼乎昔唐太宗之朝三日不諌則責侍臣盖髙卑之勢既已遼絶上下之情常若不通虚已招來猶或不至倘示厭薄人誰盡忠書稱堯之徳則曰稽於衆舍己從人語舜之功則曰眀四目達四聰序禹之所以興則曰益贊于禹禹拜昌言述湯之所以王則曰用人惟已改過不吝惟其諌而能聼聼而能改此古帝王所以為聖人也伏望陛下開廣聰眀延納忠臣言或逆耳則求諸道語或遜志則知其惡任賢勿貳去邪勿疑使懐姦者無隙可乗履正者樂告以善陛下廣覽兼聼日新聖徳與堯舜禹湯並驅争先不其偉歟臣待罪諌垣曽乏善状惟是盡誠無隱庶幾報塞大恩更願陛下察其愛君之心恕其狂妄之罪少賜採擇不勝幸甚又言臣近四次論奏鄧温伯差除不當今未奉指揮臣不敢逺引前古上煩天聼止以祖宗故事更為陛下開陳庶幾愚忠或䝉採納臣伏觀太祖以和㠓貴家子能業文甚寵待之欲召入翰林謂近臣曰㠓眸子眊眊然胷中必不正不可以居近侍其命遂寢景徳三年樞宻院言次補禁軍列校王繼英奏曰藩邸給事之人尚在職者皆聚議騰謗謂臣䝉蔽不言於上致其留滯真宗曰此等皆不自省循茍求僥倖本以因縁際㑹倘加升擢必須有名方塞輿議先朝時有一散從官李榮在藩日曽預給使後十餘年但𨽻名尚食局嘗随流軰預選先帝見而詢之乃知榮也止遷隊長嵗餘漸擢為小校盖國家爵位不可輕授也臣毎㸔至此輙廢書歎息何者祖宗不吝官禄惟以待天下之賢茍非其人未嘗輕假名器豈特畏天下之議而已盖将詒謀於後世也且藩邸之吏預執事之勤雖軍校之㣲猶不欲無名與之况玉堂禁近事更有大於此者乎祖宗之朝猶重學士每欲命人必審其才器之邪正盖将求賢以自輔非專取其文藝而已如和㠓者固未有過惡之迹但觀其眸疑非端士遂不復用則選掄之意豈欲以小人在側耶今温伯姦邪反覆皆有顯狀早入安石恵卿之黨盜取榮寵晩附蔡確輕用王言貪天之功僥倖異日非特和㠓之比也但以暫掌牋記遂叨攀附之名俾長禁林奉承宻㫖又非小校之類也臣竊謂太祖雖愛和㠓之才恐非正人乃輟翰苑之命陛下知温伯之姦邪而寘於論思之地太宗真宗于合推恩之人猶不輕授陛下未嘗出閤温伯本非宫僚今乃無名假寵如此臣竊為陛下惜之陛下亦當為祖宗惜之也况詞頭初下中書舍人已嘗繳納成命既降給事中再具封還朝廷皆不聼從然後御史全臺兩省諌官相繼論列茍粗合于公議豈至如此紛紜伏望陛下上體三聖之心下為萬世之法因温伯之辭免収還新命使小人之道不能寖長以消朝廷異時之患天下幸甚又言臣向者累具論列鄧温伯差除不當乞行寢罷未奉指揮間臣以疾病在告不復更進章䟽日近竊聞温伯将受新命臣雖伏枕危殆日夕憂懣何者陛下即位以来振起正道登用賢俊天下之情翕然歌誦今温伯之姦邪反覆中外所知攘奪太皇太后社稷之功以歸蔡確此戴天履地之所疾况臣誤被恩擢列職諌省豈敢容縱姦慝以為朝廷異日之患乎自唐以来為翰林學士承㫖者鮮有不登宰輔蘇頌是也今温伯既置此位異日豈敢保其不至執政耶臣大病之餘三次勞復自度疾勢恐不得再望清光若姦人不去朝廷雖死目不瞑矣臣不能自書謹口授臣男具録上進惟陛下哀而聼之貼黄稱臣聞温伯差除本不出於聖意止由吕大防留身薦引故有是命然大防之意非特欲成就温伯以自結於羣姦而已盖昨来都司擬定任永夀等酬賞不當臺諌官屢有彈劾大防切齒惡之無以泄其憤怒是以眀知温伯之罪公然提㧞意謂言者必須力争則欲假此為名以逐臣等皆是宰相之隂謀願陛下聖眀深賜省察若謂温伯曽掌牋記欲示恩禮即乞朝廷優與職名處之藩鎮則陛下所以待温伯者不為不厚而小人無寖長之勢惟乞出自聖斷早賜施行先是御史中丞梁燾言臣伏見兩宫閔雨至誠惻怛眀飭政令以召和氣聖徳應天之實無所不至今屬臺諌官分責六曹臣等見根究諸司壅隔稽滯之弊臣以為治之道在先正本清源而三省政事之本命令之源也其休戚所繫誠非有司之比恐不能獨無留滯闕失之事也臣愚欲望聖慈面詔大臣總持綱要協輔至公各誡屬官分察滯事如門下省委給事中中書省委舍人尚書省委都司親閲簿書㸃檢結絶候了日具總目聞奏庶幾大小之政上下修舉以副宸𠂻求治之意貼黄三省合進呈事至多其間不無留滯欲乞聖慈指揮除事干要速及法當取㫖外並令别具條目擬進施行即不得與熟事衮同進入四方申尚書省待報文字不少法須勘當類成留滯欲乞聖慈指揮将見到申請更不送逐處勘當並疾速相度行下即事連他司或干文法須合取㑹者勒令合干人吏暫齎文書赴都司照㑹仰都司白執政請限結絶其見勘當未了者立限申都司訴訟詞狀准此癸夘詔三省自去年十月一日至今承受到文字門下省給事中中書省中書舍人尚書省左右司郎中親閱簿書㸃檢結絶新録削去盖不知梁燾曽有奏請此亦救旱之一事也今偹載之詔乆愆雨澤開寺觀令士庶燒香此據御集詔給事中鄭穆中書舍人王巖叟左右諌議劉安世朱光庭同舉監察御史二員以聞巖叟言臣伏覩元祐三年六月八日指揮左右司諌左右正言殿中侍御史監察御史並用陞朝官通判資序實歴一年以上人臣竊以取人之法雖不可以不循資格而資格太嚴亦為取人之害自立此制求士極艱上下之情以為公患今日前所用皆是舊人曽未有一人應詔舉而用者則立法太嚴其弊己見茍不就資格之中稍寛其制恐非通方避礙之道臣愚欲乞除去實歴一年之文但取正理通判資序人庶于乏材之時略廣進賢之路巖叟又嘗言臣以謂天下之事度而知之不如耳聞其説耳聞其說不如目覩其真今四海之大萬里之逺民情之利害不可以槩言風俗之美惡不可以凡舉人才之賢不肖不可以互知竊以陛下所賴以察四方之事達四方之情者言路得人而已而專用一方之人非所以廣聰眀於天下也臣願陛下當於言路參用四方之士天下幸甚巖叟論資格太嚴及言路宜參用四方之士皆不得其時亦不知從違何如姑附見此更須考詳言路專用一方之人必有年月易尋究者五年五月二十八日劉唐老為右正言六月四日司馬康為左司諫或唐老與康俱家洛陽更詳之王巖叟言己見元年九月末或當附此詔果荘子索諾木節為右班殿直仍月給茶綵以能撫帖部族故也甲辰宰臣吕大防等因時雨不足乞罷免職任詔答不允二十一日蘇轍云云月末梁燾云云可考右光禄大夫知樞宻院事孫固卒輟朝臨奠贈開府儀同三司賜神道碑額曰純亮遺表恩澤例外更與三人差遣孫固舊傳云固在熈寧元豐間以藩邸舊恩馴致顯位其論議雅與司馬光等合晩節實與元祐之政紹聖四年追正光等罪惡詔固遺表恩澤與二人餘悉追奪列于姦黨元符二年以固嘗薦河南尹才特授虢州司户參軍後才曽在垂簾時上書乞召宗子入繼大統才已死詔追毁出身以来文字永不仕宦而奪固所贈官盡追遺表恩澤以為臣子之戒大觀二年以固係神宗皇帝隨龍人及舉尹才時才未曽上言特出籍新傳削去尹才事亦無辯誣當考尹才以元祐元年十月十三日得官不知用何日上書丙午兵部言進奉人所賜名目出告外更給黄牒其溪峒知州蠻官賜名目只出官告其例不一詔化外人依官制前合給敕告者今後除因進奉及立功補授合帶授階散及將軍郎將司候司階司戈等依元給告及出文牒外餘承襲合授告之人只給告命新削吏部言八路乞依吏部差注之法從之吕公著掌記已行遣事罷八路差遣其一也元豐八年十二月二十六日吕大防云云元祐元年四月十八日詔又六月二十二日吏部云云戊申户部言在京香藥象牙乳香日乆許客人於三路入納見錢給鈔沿邉加饒二分次邉近裏州軍並加饒一分到京算清從之新削太師文彦博言䝉聖恩候臣出門日於瓊林苑賜餞送御筵縁前日孫固薨昔臣與固在三省供職義均休戚乞罷詔至日三省樞宻院官於瓊林苑㑹餞送更不用樂金部員外郎張元方提㸃京東路刑獄癸丑詔講讀官今後每遇經筵退留講讀官各一員於邇英閣奏對此事當考也詔新通判岷州郭逢原權通判磁州新知夀州楊蟠别與差遣以給事中鄭穆范祖禹累有論駮故也湖南轉運司言應金銀銅鉛錫興發不堪置場官監依條立年額課利召人承買而地主訴其騷擾請先問地主如願承買檢估已業抵當及所出課額利錢數已上即行給付如不願或已業抵當不及即依本條施行從之新無丙辰户部言處台婺衢銀坑興發乞逐州應管合發上供及無額官錢並就截應副買銀上京從之新無學士院言諸蕃初入貢者乞令合屬安撫鈐轄宣撫等司體問其國所在逺近大小與見今入貢何國為比保眀聞奏庶待遇之禮不致失當從之以邈黎國初入貢故也翰林學士蘇轍言臣伏見去冬無雪今嵗春夏時雨絶少二麥不収秋種未入旱勢闊逺嵗事可慮伏惟太皇太后陛下皇帝陛下聖心焦勞請禱偹至發倉粟留上供米以救饑饉茍可利民無所愛惜而天意未回旱氣日甚臣實憂之竊惟古之眀君遇災恐懼内既竭其誠心嗇用勸分以濟民厄外必避殿減膳廣求直言以答天意今二聖既勤其内而外事未修五月之旦将御文徳朝羣臣臣恐九重之祕憂惶之實民莫得知徒見陛下晏然坐朝臨御大衆民愚無知或謂陛下不畏天災不恤民瘼人心一疑天意勿順以此救旱所損大矣臣愚伏願陛下舉行祖宗故事眀詔有司罷朔㑹避正殿損常膳令百官吏民皆得上封事指陳時政闕失如此施行雖未得雨而人知陛下寅畏天戒不吝改過羣情悦服神亦佑助以此救旱非小補也近日執政大臣雖曽奏乞觧罷職任以答天變而所請未力無益於事今若陛下既自引咎則大臣勢難獨止雖未可遽從若且例降一官竢得雨而復君臣協心災變可止臣偹位禁林心有所見不敢緘黙或加采納乞不出臣此章只作聖意行下於體尤便丁巳詔曰朕奉承統業於今五年臨御崇髙未達庶政夙夜祇懼若渉淵氷常恐徳之弗類無以下慰民望上當天心今者冬雪不效春雨弗若逮此孟夏旱災如焚麥不充食禾未出土嵗事凛凛民且狼顧雖禱祀偹至而神莫之答惟循省自克則災或可消意者政令寛㢮吏或為害而莫之懲歟役賦失當民病於事而莫之察歟忠言壅而未達賢材有抑而未用歟念之雖勤行則未至昭眀恐懼之誠意庶幾隂陽之不違可自今月二十三日後減常膳不坐前殿及将来五月一日罷文徳殿視朝朕上奉東朝深愧常珍之日缺下臨庶尹猶冀嘉言之上聞茍利于人其無不可蘇轍之詞也王巖叟墓誌巖叟亦嘗建言且云日當食朔盖六年事也提㸃梓州路刑獄李傑為金部郎中詔宣使恵州刺史入内押班馮宗道為遥郡團練使西京左藏庫使嘉州刺史入内押班梁惟簡為文思使太師致仕文彦博言䝉恩以臣致仕依條與五人恩澤外曽孫常乞特授一近下名目外餘乞罷詔常特與假承務郎外不許並三月二十四日戊午詔開封府賞錢除各支贓罰不係省頭子錢外遇闕據申尚書省於在京抵當并熟藥所息之内及吏禄剰數錢内支給新無辛酉保寧軍節度使知大名府馮京改授彰徳軍節度使再任知大名府以西南龍畨進奉人安化大將軍龍以利為安逺大將軍保順郎將龍延舜等為安化郎將奉化郎將龍以委等為武寧將軍龍延間等為保順郎將壬戍吏部言大理寺并太學正録等官及編修敕令式之類應不用舉主轉官者乞差承務郎以上除祕書省正字太學博士大理寺官外從之是月令保安軍牒報宥州智固勝如建置年月宥州牒蘭州所管至第三寨取直令保安軍牒蘭州地界請計㑹熈州此並係政目四月末事當考御史中丞梁燾言臣聞大臣以道事君不可則止不聞懐私挾邪竊禄偷安以固位而不去者也謹按宰臣吕大防暗謬偏滯庸懦忮忌幸同列之私忘事君之志無經國之逺慮乏濟物之通才驟䝉拔擢之恩上誤仰成之意搢紳君子閭里小人指議鄙笑以為口實陛下喜安静而為動揺陛下喜公正而為私曲陛下喜謹重而為輕妄陛下喜亷儉而為貪侈黨䕶姦邪崇長峭刻行已無平直之操事上無純一之徳夫相者助也所以助成君徳陛下修徳清眀之如此大防詭隨患失之如彼將何以居相助之地其不勝任也眀矣且沴氣為旱政理不平所當恐懼修省上助寅畏乃敢歸之隂陽之數備禮連章再請而止不獨輕易主威又復簡忽天戒此尤當眀其罪而去之者也伏望聖眀以宗社為計以天下為念伏乞罷免大防相位以慰中外之望又言臣伏見陛下眷遇大臣極其恩禮不忍聞其過惡輙奪其位使傷其進退之名所以委曲覆容真有天地之賜為大臣者何以副陛下之深仁乎祖宗之時宰相率二三年以禮去今之宰相率二三年以罪去禮去者顧義重雖有功而必去罪去者顧利重非有罪則不去以禮去者可以復用以罪去者不可以又來盖祖宗之大臣皆以名節自重一舉動必存大體必副人望不敢專寵禄以自愛不敢挾權勢以自強日思以得罪為憂以妨賢為懼故率三二年自引避位朝廷褒答自有恩數其優者為使相其次猶須超進數官為大學士其去位也名益重望益髙眷益厚一旦復用則中外之民莫不以為宜皆為朝廷喜此所以重朝廷也其間亦時有貪鄙之人當去而不去以固位戀禄清議已不容以之招致人言暴著過惡從而罷遣之殆不過一諌官一御史論之則已不能安矣如臺諌合攻連擊者甚少一有之則終身不得復用故以禮去者多以罪去者少大臣既法小臣從而亷士大夫化之皆磨礪振潔以節操相髙風俗純美由此道也比年以来大臣皆以竊禄偷安為計寖以成風雖有大過猶巧自掩盖恐其失位一二人言之不知引去臺諌官共言之又不肯去至於紛紛不已上不能止其言竟出其章䟽然後請退聖恩因而聼之公議為之鄙薄私交為之歎惜䘮其節守敗其名譽冐其過咎終以踈絶朝廷雖以乏人而欲用之疑其姦心之不測畏其清議之不容卒不敢用既以其罪不可復用其以次者安得人才衆多而為用乎朝廷将無人而用矣此不可不畏也祖宗之時輔相之才非不多也然而進者必以其賢退者必以其禮去而復来所以用之有得也今輔相之才亦非不多也然而進之不必以其賢退之必以其罪去而不可來所以用之不足也臣近嘗建言乞陛下許吕大防以自請罷去相位者正為其如此若䝉陛下許吕大防令以禮去不惟大防且掩覆其罪状不為言臣之所擿不為公議之所指不容使之養望于外他日用之人必無敢議者設有議者其跡以無罪而去陛下主張之無累知人之眀矣於是大防真有天地之賜足稱陛下眷禮之本意也非獨以安大防也又以示後来之人皆思以禮去位而漸以名節自重如祖宗之大臣也朝廷由是尊矣伏望聖慈以安危為計以治亂為念以養大臣之譽望為意以勵搢紳之亷隅為術保完大防今日之去存全大防他日之用敬謝旱烈之譴銷壓愁怨之氣上承天道下順民心中不失君臣之恩一舉而三善得豈不美歟伏惟聖人采納天下幸甚梁燾劾吕大防兩章不得其月日因燾稱沴氣為旱又稱敬謝旱烈之譴故附見四月末又按四月九日大防等以旱乞罷詔不允二十一日蘇轍言所請不力然則燾劾大防必在四月也五月二十六日燾已遷吏書蘇轍代為中丞當四月間攻大防者必不止燾一人臺諌官皆與焉此月八日以前左諫議大夫劉安世言大防為臺諫攻任永夀等故特用鄧温伯欲因此以逐臺諫然則安世亦必有劾章但未見其本耳其他更須考詳大防眀年五月九日又乞外任燾已不在言職八月十八日遂出知鄭州燾又言朋黨起而國政傾䝉蔽作而主聼壅强悍容而君道失此三者有天下之大患自古人主莫不以為憂而終少辨者人臣莫不以為戒而或自蹈之此三者之患臣恐未銷于今日也臣竊懼之伏願陛下持大公以照之守至正以治之毎於政事之間常加意以察其深㣲使朋黨不能快其謀䝉蔽不能行其私强悍知懼而自戢然則主威可立而國勢以強中士無幸進朋邪之心正臣有不懈匪躬之節事繫安危乞留宸念貼黄臣偹位耳目之官懐欲言之志而不盡致陛下有所不知則非所以上廣聰眀與朋黨䝉蔽之罪無以異是負聖恩也臣今日之言誠有深㫖伏乞留神省察如在位尚不知懼猶須他日面論臣死不敢隱也燾論朋黨不得其時必當吕大防劉摯理㑹吏額房之際今附之四月末燾又言秩俸之厚所以崇賢能養亷隅至於衰末倉猝之際或議刻削助其不給故唐徳宗屢因兵難不得已而為貞元之事陸贄為翰林學士争之不得眀年兵罷贄且為相更議増百官俸以掩前失夫艱難倉猝之間國用不足豈暇顧朝廷大體然賢相知其大者猶以為不可盖所以養士君子固宜禮意隆厚也今朝廷財用雖屈其傷才蠧國之實不在百官俸廪况所得毫髪細㣲不足以少助費當此清眀之時蹈彼衰末之跡彼從權以要一時之利固已陋矣此著令以為常行之法豈不悖哉士大夫深為朝廷惜之合此議未定之時宜一切罷去以全國體燾論減俸不得其時更附四月末俟更檢詳
