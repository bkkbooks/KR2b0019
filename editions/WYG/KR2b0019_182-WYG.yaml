body:
  text: 續資治通鑑長編巻一百七十八宋李燾撰仁宗至和二年春正月丁卯奉安真宗金像於萬夀觀初以神御帳損徙别殿及是帳成奉安如故徳音降畿内輔郡囚罪一等徒以下釋之賜諸軍緡錢戊辰荆湖北路鈐轄轉運司言知龍賜州彭師黨以其族來歸詔本路常加存撫之仍議所與官及所居處與授田頃畆之數以聞師黨師寳子也師寳父仕羲奪師寳之妻師寳忿恚故與師黨皆叛事具嘉祐二年九月乙亥邕州言蘇茂州蠻内冦命廣南西路經畧司發兵捕擊之仍令三班院武勇使臣七員為指使辛未幸奉先資福禪院朝謁宣祖神御殿先是議者謂上特行此禮因欲致奠溫成陵廟御史中丞孫抃言陛下臨御已來未嘗朝謁祖宗山陵今若以温成特行此禮虧損聖徳莫此為大翰林學士歐陽修亦論諫上從之不復至温成陵廟劉攽作韓絳行狀云絳嘗言此李清臣神道碑亦云而傳不載今但記抃丙子徙知吉州司封員外郎蕭固為廣東轉運使庚辰威武節度推官劉抃為司天監丞抃嘗挾術數言人禍福多遊公卿之門於是當改官判流内銓賈黯以為言故有是命韓絳傳亦稱絳之請蓋因劉攽行狀然李清臣神道碑不載今但存賈黯姓名北京留守推官周豫為館閣校勘宰臣陳執中所薦也定州郷貢進士趙肅上兵民總論十巻詔特免將來文解省試雖不合格令貢院特以名聞丁亥觀文殿大學士兵部尚書晏殊卒始殊病寖劇乘輿將往視之即馳奏曰臣老病行愈矣不足為陛下憂已而卒帝雖臨奠以不視疾為恨特罷朝二日贈司空兼侍中諡元獻旣葬篆其碑首曰舊學之碑殊剛峻簡率盜入其第執而榜之旣委頓以送官扶至開封府門即死雖早貴然奉養清儉累典州吏民頗畏其狷急善知人如孔道輔范仲淹皆出其門而富弼楊察皆其壻也初命張方平知益州未行而程戡已先入為參知政事轉運使高艮夫攝守事西南夷有卭部川案宋史蠻夷傳作卭部州首領者妄言蠻賊儂智高在南詔欲來冦蜀良夫聞之大驚移兵屯邊郡益調額外弓手發民築城日夜不得休息民大驚擾爭遷居城中男女婚㑹不復以年賤鬻榖帛市金銀埋之地中朝廷聞之發陜西部騎戍蜀兵仗絡繹相望於道詔促方平行且許以便宜從事方平言南詔去蜀二千餘里道險不通其間皆雜種不相役屬安能舉大兵為智高冦我哉此必妄也臣當以静鎮之道遇戍卒兵仗輙遣還入境下令卭部川曰冦來吾自當之妄言者斬悉歸屯邊兵散遣弓手罷築城之役㑹上元觀燈城門皆通夕不閉蜀人遂安已而得卭部川之譯人始為此謀者斬之梟首境上而配流其餘黨於湖南西南夷大震方平以去年七月甲戍除二月己丑朔増置益州外城廵檢一員專管勾城池壬辰汾州團練推官郭固為衛尉寺丞初知幷州韓琦言固嘗造車陣法今以固所說就民車約古制為之臨陳遇敵緩急易集其車前銳後方上置七槍以為前後二拒此馬燧戰車以刺㦸於後行載兵甲止為營陣者也古者鹿角車以戈㦸在前故有鹿角之號今前後俱挿槍者擬此又以民車之箱増為重箱高四尺四寸前後二户高與箱等用革鞔之吳起所謂革車掩户輓輪籠轂是也箱置床子弩一車上容五人弓二弩二其一人擊金鼓以為一車進止前轅置䝉䡴一以障牽車者古所謂䧟車也其車周回悉覆以氊以備矢石火箭也凡一車二十五人車上五人前挽後推十四人執器械六人凡車乘均以歩騎多少隨之三軍所止橫列直布以為寨脚夜則聨制鐵索以撅陷地制其兩車之間用人五十其車相去不過五尺行止挾轅以為駐隊所謂伍承彌縫也唐李靖嘗引漢魏之法五車為陣僕射一人十車為帥率長一人凡車十乘將吏二人以法凖之則跳盪為騎兵也戰鋒隊歩騎相半也駐車兼車乘而出也臣琦以為可用於平川之地一則臨陣以抑奔衝二則下營以為寨脚今令固自齎車式詣闕進呈旣試用之而有是命廣州司理叅軍陳仲約誤入人罪死有司當仲約公罪應贖帝謂知審刑院張揆曰死者不可復生而獄吏雖暫廢他日復得敘官可不重其罰癸巳詔仲約特勒停㑹赦未許敘用給事中崔嶧受詔按治陳執中縱嬖妾殺婢事嶧以為執中自以婢不恪笞之死非嬖妾殺之頗左右執中甲午授龍圖閣待制知慶州代何中立也知諫院范鎮言陜西四路安撫使並以三年為滿今中立才二年遽使嶧代之恐諸路攀援寖成僥倖乞追寢嶧成命令中立滿三年不報乙未龍圖閣直學士左司郎中張昪兼侍讀昪以老固辭上曰不為讀書但留經筵備顧問爾乃詔免進讀御史毋湜言自今諸路帥臣及縁邊部署知州軍未赴任不許奏辟武臣俟至本部如有昏懦老疾者以其狀聞朝廷再行體量許别奏辟官從之丁酉錄濠州團練判官李克勤子惟一為太廟齋郎克勤自陳歸朝歲久歴官無他過也皇城使陵州團練使内侍押班武繼隆領果州防禦使書此為三月丙子范鎮有言庚子殿中侍御史趙抃言臣近累次彈奏宰臣陳執中興廢制獄乞正其罪嘗言執中不學無術措置顛倒引用邪佞招延卜祝私讐嫌隙排斥良善狠愎任情家聲狼籍八事伏恐陛下猶以臣言為虚至今多日未賜省納臣若不槩舉一二明白條陳即是臣自為安全茍且之計旣負陛下耳目澄察之任又得憲臺瘝官失職之罪臣不忍為也輔弼之任須通古今寡識少文則取誚中外至如去年春正以後制度禮法率多非宜蓋執中不知典故惟務阿諛熒惑宸聰敗壞國體又祖宗朝除翰林學士素有定制豈宜過多今執中旣不師古又不詢訪博識之士惟愚暗自用遂除至七員此執中空疎宜罷免者一也朝廷差除動守規範執中賞罰在手率意巻舒至如劉湜自江寧府移知廣州最處煙瘴重難之地而湜被命遠行待制之職仍舊及向傳式自南京移知江寧府旣是優安近便之任乃轉傳式龍圖閣直學士又吳充鞠真卿摘發禮院生代署文字等事人吏則贖金免决吳充鞠真卿並降軍壘此執中繆戻宜罷免者二也中外委寄當擇良才館閣清宦豈容纎巧而執中樹恩私黨不顧公議至如崔嶧非次除給事中移鄭州尋罷而給事中不奪所以今崔嶧治執中之獄依違中罷以酬私恩又執中嘗寄嬖人於周豫之家而豫姦諂受知執中遂舉豫召試館職此執中朋附宜罷免者三也夫宰輔事業聖君倚毗宜為國家廣納賢善而執中之門未嘗待一俊傑禮一才能所與語者苗達劉祐劉希叟之徒所預坐者普元李寧程惟象之軰奈何處台鼎之重測候災變窮占吉凶意將奚為衆所共駭此執中偏僻宜罷免者四也攸司之法天下公共執中輕重出已喜怒任權至如邵必知常州日詿誤决人徒刑旣自舉覺復㑹赦宥又該去官遷官執中素所惡必乃罷必開封府推官落館職降充邵武軍監當後來有汀州石民英勘入使臣犯贓杖背黥面配廣南牢城本州訴雪悉是虛枉却只降民英差遣以邵必比之民英則民英所犯絶重而斷罪遂輕邵必所犯甚輕而斷罪反重搢紳議論至此無不嗟憤扼腕此執中舞法宜罷免者五也夫正人讜議邦家之光執中隂險中傷欲人杜口結舌吕景初馬遵吳中復彈奏梁適適既得罪出知鄭州吕景初軰隨又逐去有行行及我之語馮京疏言吳充鞠真卿刁約不當以無罪外黜充等尋押發出門又落馮京修起居注使朝廷有罪忠拒諫之名者由執中也士夫諠譁于今未息此執中嫉賢宜罷免者六也夫仁澤之及昆蟲不遺自陛下仁聖臨御三十餘年常恐一物失所而執中人臣之家恣行虐害雖臧獲甚賤亦性命不輕如女奴迎兒才十三歲旣累行箠撻從嬖人阿張之言窮冬祼凍封縳手腕絶其飲食幽囚扃鏁遂致斃踣又海棠者因阿張打决逼脅遍身痕傷既而自縊後來又女使一名髠髪杖背自經不殊亦係開封府施行凡一月之内殘忍事發者三名前後幽寃聞固不少因而興獄尋自罷之厚顔復來無所畏憚三尺童子亦悉鄙誚此執中酷虐宜罷免者七也夫正家刑國明哲所為非禮能言古今共恥執中帷簿醜穢門閫混淆放縱嬖人信任胥吏而又身貴室富藏鏹巨萬視姻族軰如行路人雖甚貧窘不一毫賑䘏搢紳語及共所赧慙道塗喧傳相與嗟惜此執中鄙惡宜罷免者八也今執中有是可罷免八者奈何不識廉恥復欲居廟堂之上其意非他是欲恩所未恩讐所未讐上損仁明下快私忿而然爾方今天文謫見未退朝廷綱紀未立財用匱乏官師衆多敵驕無厭河決未復兵伍冗惰民力疲敝當此之時正是陛下進賢退不肖之時也臣不勝大願願陛下留神為祖宗社稷計為率土生靈計正執中之罪早賜降黜取中外公論天下之所謂賢而有徳業者陟在公台之位委以股肱心腹之寄同徳一體謨猷出納布號令宣風化俾四方元元洗耳拭目聞見太平之政豈不善哉豈不盛哉尋有詔邵必復職知高郵軍吳充鞠真卿刁約吕景初馬遵召還馮京候修注有闕吳中復候臺官有闕並牽復此據趙抃南臺奏藁注字云爾當各有日月今且依奏藁附此御史中丞孫抃言嘉慶院詔獄本縁陳執中特上奏章乞行制勘朝廷前後差官四員充制使獄體之重未嘗有如此者而執中務徇私邪曲為占庇上昧聖徳下欺寮寀凡所證逮悉皆不遣致使獄官無由對定罔然案牘喑黙而罷顯是執中要行則朝廷雖近侍之臣亦須差去按問要罷則本家雖女僕之類不得畧行追取欺罔悍頑一至於此雖陛下至仁如天至聖如神以君臣之分勉而容之如國體何如朝法何如公議何如廟社何如四方何臣恐天下聞之有輕朝廷心蠻夷聞之有輕中國心古語曰善觀國者觀其紀綱而已矣其陳執中伏乞特行責降以正本朝典法此據孫抃奏藁係第二章不得其時今附趙抃列執中八事後癸卯西上閤門使李惟賢言禮賔副使郭逵上殿奏事至已刻尚未退請自今上殿臣僚奏事春分前毋得過辰正春分後毋得過卯初若敷陳未盡令實封進内或須靣對令後殿再引違者閤門揖下近臣臺諫官即勿拘從之甲辰殿中侍御史趙抃言臣近累次彈奏乞正宰臣陳執中之罪未䝉施行風聞同知諫院范鎮妄行陳奏營救執中縁鎮始自常調不次遷陞小人朋邪不識恩出陛下但知徳由執中今乃惑蔽聽斷肆為誣罔伏望陛下開日月之明判忠邪之路取内外之公議立朝廷之大法則天下幸甚先是知諫院范鎮言去年十二月熒惑犯房上相未㡬陳執中家决殺婢使議者以為天變應此臣竊謂為不然執中再入相未及二年變祖宗大樂隳朝廷典故縁葬事除宰相除翰林學士除觀察使其餘僭賞不可悉紀陛下罷内降五六年來政事清明近日稍復奉行至有侍從臣僚之子亦求内降内臣無名超資改轉月須數人又今天下民困正為兵多而益兵不已執中身為首相義當論執而因循茍簡曽不建言天變之發實為此事陛下釋此不問御史又專治其私捨大責細臣恐雖退執中未當天變乞以臣章宣示執中宣示御史然後降付學士草詔使天下之人知陛下退大臣不以其家事而以其職事後來執政不敢恤其家事而盡心於陛下職事於是鎮又言臣竊聞御史以諫院不論奏陳執中家事乞加罪諫官者今張擇行疾病在第臣已奉使還京臣為諫官不可不辨臣去年十一月八日韋城奏吳充鞠真卿事十二月九日衡水奏石全斌事二十四日到京二十五日上殿陛下諭臣路中文字盡收得又加勞臣臣奏使天下之人議陛下此是執政大臣之過又問陳執中家事臣奏臣新從外來未知子細陛下言臺諫官不識體好言人家私事臣奏人命至重臺諫官不可不言然不可用此進退大臣進退大臣當責以職業所貴有所勸勵吳充石全斌等事是也自是臣復送伴河北至今月九日還京又聞御史中丞已下皆言執中乞置詔獄却不遣干連人赴制院此誠執中之罪也又聞執中狀奏女使有過指揮决打因風致死而外議謂阿張决死臣再三思維就使阿張下獄自承非執中指揮是阿張自决打致死有司亦未可結案須執中證辨乃可是為一婢子令國相下獄於國之體亦似未便所以不敢雷同上言然臣有不言之罪二而御史不知初朝廷為禮直官逐禮官而臣再奏論列以正上下之分及為一婢子困辱宰相而臣反無一言臣之罪一也臣不及衆議未定時辨理執中至執中去勢已决始入文字臣之罪二也臣雖有不雷同以存國體一事不足以贖二事乞以臣章下御史臺牓於朝堂使士大夫知臣之罪頒於天下使天下人知臣之罪付於史官使後世人知臣之罪臣雖就死無所憾也若欲論執中才否及所行政事則臣去年八月一日劄子十月九日論兵民疏及温成葬事吳充鞠真卿石全斌等狀已具之矣鎮又言伏見陛下進退大臣不以職事而以私事故言事官大率急人私事而緩其職事設有急其職事必觀大臣進退之勢而後言之今御史言陳執中無學術不知典故等事是也執中一為參知政事再為宰相無學術不知典故有素矣至為决一婢死而後及之此臣謂御史觀大臣進退之勢而言事也御史旣知執中素惡邵必方執中之婢未死時不言邵必以非辜被重罰而臣嘗言之今陛下已許執中罷去而臣為執中辨理是臣不顧大臣進退之勢而言事也臣又聞御史言臣奉使河北中路奏理執中是報執中之恩然御史居常自待如此故亦以此待臣此不足以責御史也臣之才否與臣立朝之本末與出入執中門下與不出入執中門下御史知之矣而御史言此者近於誣臣非獨近於誣臣亦近於自誣若臣中路奏理執中有無文字則陛下知之臣不復言也凖律諸主毆部曲至死者徒一年故殺者加一等其有愆犯决罰致死及過失殺者各勿論昔之造律之人非不知愛人命而造此律直以上下之分不可廢也今執中之婢正得有愆犯决罰致死無罪當勿論而御史繩之如此又言臣報執中之恩以疑陛下以中傷臣此無他直恐臣使不言爾臣為諫官為御史所恐而遂不言非所謂為諫官也就使造律者出於執中婢死之後即御史亦須謂之報執中恩也此律為諸人設爾况國相乎賈誼曰人主之尊譬如堂羣臣如陛衆庶如地蓋明等級而尊天子也今為一婢子辱宰相陛下之堂毋乃易凌乎陛無乃太卑而近地乎非特太卑而近地也其勢反在地中何者諸人决婢死得勿論而宰相反受困辱此臣所以憤悶而太息也臣無賈誼之才而持賈誼之論為不知量也直以方今事勢正與賈誼之論同故不得隱黙乞以臣章宣示中書樞宻大臣降付御史臺幷臣前狀依臣所奏一處施行鎮又言臣兩奏乞與御史辨陳執中事仍乞牓朝堂及今十餘日未見行下臣竊以賞罰當否在於辨是非是非不辨則賞罰隨而廢矣陛下向諭臣樞宻院本欲留陳執中畏御史之言遂不敢留樞宻院以御史之言是而畏之耶將以為非而畏之也以為是而畏之則可以為非而畏之殆非陛下所以任之之意也今陛下不以是非自專而以責中書樞宻大臣中書樞宻大臣又不敢主是非主是非者御史爾而御史是非謬戾如此御史中丞知雜御史又左右之夫所謂謬戻者棄法律而牽於浮議也任私情而不顧公道也務已勝而專於逆詐也陛下何不敕大臣以法律處之以古所行之事折衷之則是非辨而賞罰當矣漢宣帝時魏相為丞相其侍婢有過自死於是趙廣漢為京兆尹疑丞相夫人妬殺之即上書吿丞相罪魏相亦上書自陳妻實不殺婢相自以過譴笞出至外第死而司直蕭望之亦劾奏廣漢摧辱大臣傷化不道廣漢幷坐賊殺不辜等數罪腰斬於市吏民守闕號泣者數萬人亦願有代廣漢死者皆不聽宣帝明主也廣漢能臣也吏民守闕數萬人非特御史中丞知雜御史一二之為助也然而卒斬廣漢者以為嚴上下之分戒險薄之俗不得不然也臣言此者非欲陛下斬御史如廣漢比也直欲陛下知古人嚴上下之分戒險薄之俗如此其決也以臣章并御史所奏宣示中書樞宻大臣詳正是非如以臣章非是則乞免臣所職終身不齒以御史所奏為非亦乞依公施行范鎮累奏不得其時今附見趙抃劾章後乙巳觀文殿學士户部侍郎知河陽富弼為宣徽南院使判并州丙午徙知并州武康軍節度使韓琦知相州琦以疾自請也先是潘美帥河東避冦鈔為已累令民内徙空塞下不耕號禁地而忻代州寧化火山軍廢田甚廣歐陽修嘗奏乞耕之詔范仲淹相視請如修奏尋為明鎬沮撓不克行及琦至遣人行視曰此皆我腴田民居舊迹猶存今不耕適留以資敵後且皆為敵人有矣訂鎬議非是遂奏代州寧化軍宜如岢嵐軍例距北界十里為禁地餘則募弓箭手居之會琦去即詔弼議弼請如琦奏凡得户四千墾地九千六百頃開耕禁地實録於此年四月丙申始載琦奏今移入此琦訂鎬議非是及弼請如琦奏並據兵志第二志云慶厯中河東都運使歐陽修上言代州岢嵐寧化火山軍被邊地㡬二三萬頃請募人墾種充弓箭手詔宣撫使范仲淹議仲淹以為便遂以岢嵐軍北草城川禁地募人拒敵界十里外占耕得二千餘户歲輸租數萬斛自備弓馬湼手背為弓箭手時并州明鎬沮議事乃中止至和二年韓琦奏訂鎬議非是曰昔潘美患契丹數入冦遂驅傍邊耕民内徙茍免一時失備之咎其後契丹講和因循不復許人復業遂名禁地歲久為敵人侵耕漸失疆界今代州寧化軍有禁地萬頃請如草城川募弓箭手可得四千餘戸下并州富弼議弼請如琦奏詔為條視山坡川原地均給人二項其租秋一輸川地畆五升坡原地畆三升毋折變科徭仍指揮即擇山險為社以便居止備征防毋得擅役先是麟府豐州以閒田募置人給屋貸口糧二石而徳順軍靜邊寨壕外弓箭手尤為勁勇夏人利其地數求爭朝廷為築堡戍守此兵志所書也耕岢嵐事與食貨志第一及慶厯四年所書稍異今附見更俟考詳初翰林學士吕溱上疏論宰相陳執中外雖强項内實姦邪朝廷故事多不諳練除改官序常至差錯平居不接士人惟隂陽卜祝之流延入臥内干預政事又歴數其過惡十餘事上還其疏溱進曰若止用口陳是陰中大臣也請付執中令自辨於是溱改翰林侍讀學士知徐州辭日特賜燕資善堂遣使諭曰此會特為卿設可盡醉也仍詔自今由經筵出者亦如例詔乃三月丙寅今并書宰臣劉沆言面奉徳音凡傳宣内降其當行者自依法律賞罰外餘令二府與所屬官司執奏蓋欲杜請託僥倖之路也因陳三弊曰近臣保薦辟請動踰數十皆浮薄權豪之人交相薦舉有司以之貿易遂使省府臺閣華資要職路分監司邊防實任役非公選多出私門又職掌吏人遷補有常而或减選出官超資換職堂除家便先次差遣之類乃是近臣保薦官吏之弊一也審官吏部銓三班當入川廣則求近地入近地則求在京并堂除陞陟省府館職檢討之類乃是近臣陳匄親屬之弊二也其敘錢榖管庫之勞捕賊雪活之賞有司雖存常格已經裁定尚復有僥倖之請以法則輕以例則厚執政者不能守法多以例與之如此之類乃是敘勞干進之弊三也願詔中書樞宻凡三事毋得用例餘聽如舊事既施行而衆頗不恱未㡬復故實錄既於二月丙午書劉沆靣奉徳音云云又於三月丙子書沆所言三弊按三弊即靣奉徳音所禁者不應重出今刪削附此復故在五月辛酉庚戍西南蕃龍以烈龍異靜入貢詔以進奉首領等九十三人為大將軍至郎將辛亥詔入内内侍省應内臣曽犯罪停降復得敘名職者不許通計舊勞以覬恩賞乙卯流内銓引對前雍邱縣主簿陳琪改京官上謂判銓賈黯曰琪雖無他過而歴三任皆因縁陳乞不由有司奏擬琪乃龎籍女壻今保薦多至二十四人得非專欲諂附大臣故爾耶且與募職官知縣琪鹽鐵副使洎之子也舉者二十四人據劉攽作黯行狀上有此言蓋黯發之也知諫院范鎮等言恩州自皇祐五年秋至去年冬知州凡換七人河北諸州大率如此欲望兵馬練習固不可得伏見雄州馬懷徳恩州劉渙冀州王徳恭皆有材勇智慮可責以辦治乞令久任從之
