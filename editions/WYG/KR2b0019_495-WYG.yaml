body:
  text: 續資治通鑑長編巻四百九十一宋李燾撰哲宗紹聖四年九月辛亥朔司農少卿王得臣管勾崇禧觀吏部郎中韓治為秘閣校理知邢州治避親也左司諫郭知章言兩浙歳旱淮南又不全稔乞下夲路監司按視如須賑給即早行措置詔兩浙路轉運提舉常平司相度應今合舉行事件及預行那移凖􅊀合用賑濟粮斛并相度夲路如有運河溝瀆淺澱合行開修將來優給雇直召募人夫開淘江寧府言奉詔敦遣茅山道士劉混康詣闕夲府已促行詔轉運司賜錢百緡付混康為路費可并六月十四日壬子批旨付三省天垂變異彗出西方災譴為大朕實懼焉可避正殿損常膳罷秋宴公卿各宜悉心修政輔朕不德仍許中外臣僚等直言朝政闕失朕將親覽具此意令學士院降詔處分詔曰朕以菲德奉承大業夙夜戰栗不遑康寧惟恐不及以仰當天心以羞先帝聖德乃仲秋之夕彗出西方推原典經兹謂大異永惟其咎未燭厥理豈非庶政之失以悖三光之明譴告之來朕實祗懼書不云乎惟先格王正厥事已避正殿損常膳罷秋宴公卿其各悉心修政輔朕不德應中外臣僚等並許直言朝政闕失朕将親覽虛心以改庶㡬以銷天文之變焉又詔中太一宫設醮開啓罷上日遣執政官一員詣宫燒香是日彗入天市垣輔臣早朝上顧問見彗否皆以實對上曰長丈餘且曰初起於氐掃巴星天變甚大當避朝損膳求言肆赦以荅天戒又曰已於諸處建道埸當更於文德殿設醮曽布因言熈寧肆赦自有故事又言熈寧乙夘歳十月在翼軫呉楚分野之外尋有交州之變光芒掃長沙明年春民大饑疫死者相枕籍自丙辰春出師討交趾丁巳春師還死者數十萬今掃巴星則巴蜀亦不可不慮臣等當更講求兵偹兼星在氐𦍑邉事誠不可不戒臣素言涇原籬落未葺須至營築堡障其他版築當且休息未可舉動上皆深然之退語章惇以肆赦不可已惇曰元豐三年不曽赦布曰七月星變九月明堂宜其不赦也是日布又白上熈寧七年南郊八年冬再赦在大禮後一年今去大禮尚逾年適相似上曰天變更何必議歳月又曰熈寧赦不獨為星變更以華山崩之類布曰去歳江表大旱溪河皆涸竭今歳兩浙運河亦斷流因此一沛不為過昔東海孝婦以寃死一方為之大旱一婦人寃死足以致災變況天下乎今政事有未便於人刑罰有過當此大臣所當修省改更以稱陛下寅畏天變之意上深嘉納詔諸路提舉官闕即令提㸃刑獄司權府界即令夲司属官權轉運司府界提㸃司闕官令提㸃刑獄提舉司官權新夲削去兵部言以車營致逺務駞坊運送官物官車畜馱載私物或雖係官物而夲不應差破官脚乗私自馱載者論如乗官馬牛車馱載律畜過杖八十車過徒一年各二十斤加一等並罪止徒二年物沒官其畜産因負重致死者杖八十仍勒犯人及知情干繫人均偹許人告捕笞罪賞錢三貫杖罪五貫徒罪十貫從之新夲削去癸丑裁定六曹寺監文字所言諸州起納夏秋稅賦每月令具元額已納見欠稅物名數申省部㸃騐如限滿有欠即令轉運司依編敕施行若轉運司不為行遣即省部㸃檢舉察從之大理寺言乞都轄使臣三年為一任右治獄都轄使臣任滿不曽出入徒以上罪兩次并犯贓私罪减二年磨勘從之詔今後歸明人未給田聽權借官屋居住大宗正司言宗室叔諄以罪鏁門其子與所生母皆無俸給欲比附孤遺貧乏條特加存恤計口給賜錢米候叔諄復官日減罷如叔諄未復官問女出嫁男釐務亦乞計口除去從之熙河蘭岷路經畧司言苖履展築金城關畢工詔賜履等銀絹有差四月十一日二十七日甲寅三省言聞懐衛州今歳豐稔米榖價賤恐盡歸并兼之家詔河壮轉運司措置糴便司西路提舉常平司以時計置糴足乙夘大赦天下權殿中侍御史蔡蹈言臣伏以近者星文示變陛下恐懼見於詔命至於避朝損膳咨訪直言可謂勤矣然猶以為未也復肆赦天下仁恩滂沛蕩宥囚繫此誠古昔哲王所以應天敕命之實也臣伏讀赦文闘殺罪至死猶且得生而田野良民乃不霑潤聖澤是惠及有罪而不及於無罪與其生而未厚其所以生也臣愚伏見元祐大臣欲變先朝良法思有以干百姓之譽故凡民所欠負一切蠲免今且以市易一事言之初民間以物産抵當請貿錢米乆而不償物産自合入官用事者欲為異恩無故還所抵當民間既得己物恣行典賣紹聖以來察見用事者之姦却行催理今已累年空有姓名掛於文書追擾紛紛終無益於事此非民之罪也而前自朝廷無故蠲放使有今日之弊罪在用事者臣愚欲乞陛下詳酌特詔有司契勘今年旱傷地分見今負欠市易錢物人户若已經根究不見抵當或有典賣過展轉經歴兩户以來業主不知情或正欠及干繫保人不在而其子孫貧苦不給委無可送納者等第量與减放庶㡬澤及困窮咸遂生理亦足以召和氣而塞變異也蹈言附見從違當考三省言陜西路沿邉州秋田收成慮闕糴夲詔於元豐庫支封樁錢四百萬貫令户部依例印給解鹽引付陜西轉運司分委諸路乗時廣行糴買丙辰熙河蘭岷路經畧司奏西界歸附帶牌天使穆納僧格法當補内殿崇班詔穆納僧格為係䧏敕牓後率先歸順首領特與禮賔副使充蘭州部落子廵檢仍賜金帯銀器丁巳宰臣章惇等以星變上表待罪詔答不允表三上乃已詔今月五日赦前犯事經斷人應合叙用者依該非次赦恩與叙應承務郎已上大小使臣不因贓罪降充監當者如後來别無贓私過犯候到任及二周年與依條牽復差遣應見貶謫命官使臣除元祐餘黨及别有特㫖之人外未量移未得與差遣使臣並仰於所屬投状依例施行命官使臣令刑部将昨經明堂人各具已經赦數并今月五日赦與理一赦申尚書省樞宻院移放已上並依揀放條約施行應衝替命官係事理重與减作輕係輕者便與差遣使臣比類施行曽布日録庚申關樞宻院除元祐餘黨及已有特旨人外並依非次赦與理三期移叙然議者尤莫曉餘黨之說意恐其紛紛未巳也既而曰餘黨止為安燾鄭雍輩爾今附此當考涇原路經畧使章楶言㳺師雄元祐中獨見事機首議進兵之䇿遂破洮州擒果荘今其淪没乞官其一子詔録師雄子或孫一名為郊社齋郎詔降授供偹庫副使廣西經畧司準備差使胡田向為左騏驥使循州刺史知鼎州以乞罷廢棄渠陽等寨降官及差遣其牽復差遣並特不用叙法詔國信使副自今依熈寧條許帯親属一名充小底其元祐法勿行從國信使范鏜請也御史䑓言應非察案人無故入察案門者乞依入六曹法從之新削三門白波都大提舉輦運使上言請都大司綱運乞比附行􅀈綱法從之新削戊午三省言近詔府界諸路提舉司一季根刷元祐年并已前應承買場務除已拘收自已財産并保人抵當填納外據見今的實拖欠合納浄利并罰錢分作三年催納詔元限外更展三年工部言防城樓櫓戰具現責知縣令管勾交割修葺其賞罰得替並依都監寨主等法從之是日曽布言陛下以天變恐懼德音丁寧未嘗不以修政事不憚改過為戒自古聖帝明王用心誠無以加此然政事有未安刑罰有未當大臣還肯因天變為陛下改更否正人端士天下之所欲進而大臣素所不欲還肯因天變為陛下收用否䜛邪不正之人正在要路衆人所惡而大臣素所黨與還肯因天變為陛下斥逐否以臣觀之必無此理臣恐未有以稱陛下修省之意也上聞之矍然見於色布又言陛下方下詔求直言比聞論者已有恐士大夫因天變欲動揺政事如此則誰敢言者今陛下欲廣求天下之士而先為此言以拒塞之使陛下先有疑怒言者之心則雖有言者亦無望於收采也臣自秉政以來見䑓諫官言事未嘗有一言曽施行者數年之間豈得無一言可取況方今在言責者皆不附麗執政為衆所稱不應如此小官能不附麗大臣已不可得況其所言日與執政為敵此豈易得也言既不行又不遷徙使之慙沮無以見士大夫殆無以自立然此輩非陛下主張則何以安位其欲斥逐者數矣然置之於此使負羞辱亦所難堪如周穜鄧洵武輩三兩月一遷何其異也今使從官舉御史皆莫敢舉葢衆所稱則大臣不悅大臣所欲則非衆所稱以此故不敢舉林希曰陛下但以公議擢三兩人置之言路不必謀之於執政則必有補矣先是布嘗言高科中唯陳瓘張廷堅王渙之三人可稱皆斥逐在外張廷堅無故罷職事與漢州通判仍待二年闕此尤可怪臣衰殘自知不能乆事陛下然毎以赤心報國傾竭肝胆無有所隠如論及言事官他人或避嫌不敢啓口臣度無與言者交通之迹亦不敢有所避其所以反覆開陳冀陛下省察上甚悅己未詔應在京諸宫寺院今月十日後特開五日並建為民祈福道場仍以其間一日為休務彗犯天市垣宦者庚申彗犯天市垣帝座玉牒云庚申彗滅誤也滅在戊辰辛酉詔以今年府界諸縣秋田不熟民户體量草不易納其願就夲縣依例送納見錢者聽户部歳計草如支用有闕許兌封樁草支遣新知揚州程嗣恭言乞今後吏部差遣縣令遇有以資考入而無主簿處不許流外人充尉詔都司立法法見元符元年正月辛未壬戍詔諸路帥臣敢於非萬全及道路難險處輙進築以軍法從事先是曽布奏事上以星變多主兵革深虞吕惠卿輕動敗事又言章惇多以私書與将佐卓克索婁之役安可爲朝廷無指揮可信私書當以軍法戒之布遂擬詔進呈惇始視詔草欲更增即不得爲見有此指揮却於萬全處亦觀望不進築如違亦當重行典憲上一見即曰此必是所増也布自夏秋以來數陳進築城寨雖爲困敵之計然般運財植芻糧不免差保甲雇脚乗即吾民已先困矣當且休息愛養公私事力如卓克索婁在河外水陸輦運皆未可保其必通快懸師深入真可險也上每以爲然比以星變益惻怛欲必行然惇殊不以天變爲可懼云十一日辛酉先降詔二十一日考壬申又降詔卓克索婁之役當六月甲辰曽布云章惇銳意經營卓克索婁三年八月十八日戒熙河城努扎須萬全乃得舉指揮内有云議者又欲因數路之兵討定伽羅和淺井外一帶建置堡寨符通涇原熙河兩路邊靣不知伽羅即卓克索婁否又元元年三月十一日所稱淺井伽羅斯伯勒俱合參照癸亥詔當職官吏輙費用架閣庫文書及專管官吏散失架閣文書者並依元豐法斷罪其元祐敕勿行從尚書省請也是日曽布獨奏事因言自星變以來臣累曽喋喋以人材政事爲言冒凟聖聽多矣葢以陛下寅畏惻怛冀有以禆補萬一然臣度章惇蔡卞必不能為陛下更修政事進退人材以稱聖念上曰人言莫止是在内者為急布曰從官䑓省多不稱人望最所急者言路今諫官殿中皆止一人恐須増置上深然之布又言臣昧死更有一事欲上干聖聽上曰何事布云吕大防劉摯初貶淮南湖北至昨來明堂赦方逾年故有不得遷叙指揮今皆在嶺表惡地與前日不同今以天變肆赦謂宜稍徙地足以感召和氣上笑曰劉摯等安可徙布曰臣所見如此更在陛下裁擇編刺配𨽻罪人亦分廣南與逺惡處為兩等若稍徙之於端康英連之界亦是嶺表似亦未為過上極難之又云葢自今春以來三省數陳司馬光等有傾揺之意又言范祖禹劉安世欲加惡於上皆有姦心浸潤日乆上詢之禁中亦以為有此迹故皆痛貶既而又貶王珪高士英三省之言寖及宣仁矣又蔡渭繳文及甫書言摯有司馬昭之心乃及甫得之於父其事愈可信而邢恕嘗為布言方王珪含糊之時確惇因恕以通語言力主定䇿之議及惇将去韓縝亦已不安位恐光等遂有傾揺之意恕遂共謀說吕公著引文彦博董以保祐主上既而彦博來摯及王巖叟等力攻之雖不能奪然終以平章重事處之實奪其權也彦博既去及甫以書抵恕云云及甫既就究問所言皆與恕言同葢恕等欲假此以明保祐之功而多方引及甫等以為質證及甫又以彦博不為元祐之人所與欲以此解紛故其言不得不同爾上嘗宣諭西府以及甫等所言為可信又云惇亦曽以書招彦博殆與恕所言脗合然則摯等何可有望於寛貸也布又曰惇又嘗語布以王巖叟曽白太母上有過惡當宣諭大臣布曰誠有此則懐廢立之意明矣然不知此語何從得之惇但曰人皆知之布日録先稱吕大防等後乃云劉摯等按四月十六日大防卒七月二日已有詔大防歸葬此猶言大防等誤也若指劉摯等則可摯以十二月三日卒今改作劉摯諫官殿中皆止一人諫官郭知章紹聖三年六月為左司諫四年十二月改工侍殿中陳次升紹聖二年十一月為殿中四年十二月遷司諫乙丑廣南東路轉運副使傅爕為司農少卿西上閤門副使苖履為鄜延路都監權殿中侍御史蔡蹈言臣伏見近降除命以朝請大夫朱彦博為江淮荆浙福建廣南路提㸃坑冶鑄錢事臣謹按彦博天資傾邪習尚狡詐喜争好訟中傷善良蒞官所至遺害民吏元豐年曽任江西監司蘇轍在其部内轍嘗以事被朝廷亷按彦博力為掩護竟以幸免轍既得志彦博倚以為助故其知䖍州日欲以巧計中傷提刑李閲因閱至䖍州彦博令属縣差水手等牽挽其舡既而奏閱違法差水手并令弓手勾集耆壮土兵等及置獄推劾衆證其妄三問不承理當追攝而彦博拒抗不赴致干照人枉在刑禁淹延半年獄官具奏而朝廷指揮亦止取干證人為定便行斷放終不能屈致彦博而提刑李閱乃按發之官曽無片言未實而一切罷任若非彦博倚轍以為助而轍務報私恩則朝廷議法不公未應如此其甚也天下士大夫聞之靡不扼腕臣再詳彦博承詔守土尚敢凌蔑監司今使之自列監司則所属官吏將不勝其害也臣今所論一事而已若其在官貪汚奸詐無恥不可悉數在廷之臣無不知之提㸃之職實闗諸路況今坑冶多事必得向公奉法潔亷詳敏之人乃能舉職付之彦博未協衆論臣愚欲望斷自嚴衷追寢已行之命别求吉士天下幸甚詔以彦博知虢州蹈又再列彦博罪狀乞送吏部與合入差遣不聽舊録刪取蹈章今合載其第一奏仍附注舊録于後權殿中侍御史蔡蹈言新除江淮等路提㸃坑冶鑄錢事朱彦博天資傾邪習向狡詐喜爭好訟中傷善良蒞官所至遺害民吏提㸃之職實關諸路付之彦博未協衆論詔以彦博知虢州蹈又再言之乞送吏部與合差遣不報十月五日吕公雅之以新提錢改齊州或彦博尋别與差遣但實録不詳耳丙寅權工部侍郎王宗望為集賢殿修撰權知鄆州翰林學士承旨蔡京等奉詔究文及甫事已見次第縁事渉不順及甫止聞其父言别無他人證騐欲望别差官赴所同行審問詔蹇序辰審問仍差入内内侍省近上使臣一員同徃八月十六日元符元年二月三日四月十七日三月四日七月九日詔自今彊盗并持杖廂軍禁軍逃亡捕獲之人亦依地里配行新削丁夘三省言兵部侍郎黄裳言今九域志所載甚畧願詔職方取四方州郡山川風俗民事地物古跡之類講求其詳集為一書以偹九域志之闕詔秘書省録山海經等送職方收藏以偹檢閲戊辰監察御史鄧裴言大理寺勘到大學士蘇天民受財代高茂補說竊以代筆傳義貨賂公行敗壊士風世所憎惡朝廷嚴刑重賞必期禁絶而天民等乃敢冐禁典無所畏憚若縁恩霈原免恐後來無以懲戒乞特行編管㑹赦不免則庻㡬此風可以變革詔大理寺依公結勘具案聞奏是日彗消散不見吏部尚書兼侍讀邢恕進讀五朝寳訓至仁宗嘗論輔臣其大㫖以謂人君當修舉政事至於日月薄蝕星辰變見為不足慮恕因白上此仁宗一時之言不知聖意以為何如上曰莫也不得恕即曰陛下聖訓及此乃宗社蒼生之福若謂政事修則星辰變見不足慮則自古及今人主孰肯自謂不修政事者如此則天變遂廢矣上曰㑹得恕退又上䟽推言人主所以事天猶子之事父則天亦祐助之正如父之視子凡數千言上嘉納焉恕言不得其時附見彗滅後己巳觀文殿大學士左光禄大夫中太一宫使蘇頌上表乞致仕詔頌為太子少師依舊觀文殿大學士致仕蔡興宗云前宰相致仕官至僕射者進位三師三公官至尚書者除太子太傅丞郎除太子太保優恩例除太子太師章惇用時遂以私意廢舊典頌前宰相致仕仍除東宫三少近時尚遵用之庚午大理寺言京城内外詐稱官遣追捕人而毆縛取財物以不持仗强盗論至死者減一等流罪皆配千里徒罪皆配五百里即所轄若地分合干人受計㑹而知情者與同罪從之辛未詔供偹庫副使劉永安令吏部添差揚州都監永安以先朝隨龍人有請故有是命壬申羣臣上表請御正殿復常膳詔答不允表三上乃允之丁丑乃御殿復膳鄜延路經畧使吕惠卿言杏子河新寨修築畢工詔以平戎寨為名遣内臣押賜惠卿以下銀合茶藥仍詔諸路妄動當從軍法唯涇原後石門九羊谷及熙河攧耳關以通接涇原邉面如有利可乗即聽進築初輔臣同呈鄜延走馬利珣奏吕惠卿遣王愍等出塞於杏子河進築取九月二日下手上深訝之曽布曰果然乃永樂事也章惇曰或但揚虛聲果然則敗矣布曰珣奏甚詳上亦曰必是已作布曰如此則天奪其魄遂降詔詰問是月甲寅也後四日利珣又奏杏子河已進築聞更欲於第五第六將地分進築新寨自今春以來士卒勞苦及賊方㸃集乞候來春興工上深訝之曰如此必敗事布因極陳邉事未可輕動今來已開拓疆境如平夏靈平一帯籬落未周則後石門九羊谷理須進築今冬或來春必須為之其他於利害無所繫須且休息其次則通熙河涇原兩路邉防利害不細亦可漸次經營為收歛計如卓羅去金城一百二十里欲泝黄河運糧至喀羅然後度河討定卓羅及該珠城一帯部族中間有黄河兩㟁皆石崖無車路處苖履云不可開鑿而鍾𫝊遣張照踏逐云可以簇釘椿橛牽舟又云有車路可行昨平夏城去邉界三十餘里用太平車數千小車萬兩及駝馬牛驢般運一日才能足一日之費今道路險逺如此水路既不可行陸運還有爾許車乗否兼卓羅該珠鍾𫝊自未知可攻可守如此是行險以冀幸萬一恐未可為上曰誰令如此為之但降指揮主帥妄動敗事當行軍法則必不敢再對上又及卓羅事曰此乃章惇以私書令鍾𫝊如此經營朝廷元無此指揮豈得稳便但戒以必行軍法朕亦當以御前指揮戒之先是杏子河之役上已問莫是章惇令吕惠卿為之否布曰惇有簡與臣云此必是惠卿失心又與惠卿書云永樂之事可為寒心前鑑不逺不知何以如此倉猝也并以示臣封訖入宻院逓以此觀之恐非惇意上頷之於是惠卿奏進築畢工既賜名即降是詔已而惠卿自是杏子河進築無違戾朝旨曽布曰惠卿於防秋之際進築幸而不敗遂自以為得計衆皆言此舉誠可憂若素計知其無虞何不先奏上亦以為然唯章惇頗為之揮解曽布日録在九月甲申今附見六月十六日戊戌七月二十八日戊寅可参考始惠卿進築杏子河工方興而樞宻院謂當西賊㸃集未知所向之際五寨興役深慮敗事朝旨下惠卿决保萬全無虞方得舉動惠卿乃言臣詳方秋月戎馬肥壯㸃集未知所向之際不可以進築尤不可以深入討敵然夲路所以有宥州努扎宻壘杏子河之投首葢諸路探報多言敵人併兵欲㓂涇原及夲路㑹到縁邉將兵緩急精銳可以㑹合者歩騎一萬一千七百七十三人散屯險阻則深入奔衝有勾呼不至之憂聚扼要衝則分兵抄掠有䇿應不及之患而城寨守兵少者乃至二三百人已嘗條列上聞與諸將㑹議萬一為其併兵所先未有全計可為者兵法虛而示之實實而示之虛弱而示之彊彊而示之弱夲路戰守之兵如此不可謂之彊實則難為藏形匿聲示以弱虛而致其來所以乗其秋月恃人馬方壯㸃集未知所向謂我不敢舉動之時深入其屯守之間而破其州郡族帳又築其要害之地以示我有彊實庻㡬以伐其併兵之謀皆自率狂瞽謂宜如此即非諸将貪功敢有擅為者兼涇原雖有聚兵而西賊非有數倍之衆必不敢出然以寡敵衆亦兵家之所難萬一彼或得志則夲路之憂猶未艾也臣所以當其方集之時而為宥州努扎宻壘杏子河之舉非特為夲路謀亦以分涇原之敵分涇原之敵乃所以為夲路謀也又杏子河正與烏延口等處宻邇若似此進築一兩處則夏宥之人俱無所耕牧當自來歸杏子城圍一千七百餘歩為工十二萬有竒十二日而成惠卿自謂興舉神速未有如此癸酉詣中太一宫為民祈福燒香户部言諸軍時暫差出特給口食米豆不得以别色斛斗充折如願請見錢者據在市新米實價支給其家粮更不許分擘從之新削丙子彭信軍節度使濟隠郡王宗景復開府儀同三司丁丑御殿復膳四方館使成州團練使王湛為引進使誠州團練使東上閤門使威州團練使王文振領雄州防禦使皇城使昌州刺史秦貴領果州團練使皇城使知德順軍姚雄為東上閤門使領秦州刺史文思使權知原州姚古為西上閤門使領威州刺史以涇原路進築平夏城靈平寨鬬敵得功也平夏城靈平寨賜名在四月二十一日侍御史董敦逸言考功郎中方澤新除大理少卿議論如沸葢澤嚮由常調濫入省曹近遷考功才數十日今又有此命不惟資淺望輕非厚德之士不稱其任兼先帝時常提舉差役事以其不職送審官東院乞追新命以協公議詔澤仍舊為考功郎中曽布謂章惇曰罷澤甚善惇曰澤反覆何可保也澤除大理少卿在二十一日今并書刑部言原州勘到皇城使誠州防禦使折可適涇原路進築充同統制官聽王文振節制可適擅遣文思副使曲充作先鋒繼領人馬追賊失一百三十三人獲一百六十級勘官通判朝請郎李之儀根勘鹵莾都縂領通逺軍蕃兵辛叔獻照應折可適等輕易出寨致亡失士馬熙河路同統制官苖履増差人騎致傷折數多詔以兩經赦宥可適叔獻特追諸司副使已上官勒停候合叙日叙見存官外更不用叙法曲充特䧏兩官李之儀特差替苖履依赦合叙四方館使吉州防禦使以功補過通叙轉四方館使遥郡團練陞夲路鈐轄經略使章楶為失㸃檢結勘折可適不當特罰金二十斤可適兵敗事在四月十一日甲午初折可適兵敗包誠等皆未知存亡上深訝之章惇白上可適便當行法曽布曰須且寛貸上曰此豈可寛惇曰當編配布曰臣所謂寛正謂貸其死爾惇曰與配牢城却令夲路効用布曰朝廷自當行法若夲路乞留即可聽上深然之曰卿等當以書諭帥臣爾布録四月壬辰事後兩日上知包誠等皆沒深惜之即曰可適可斬惇曰欲且置之島上上曰體問得亦未是大段得力將官布曰雖如此然死者不可復生且置之島上勿留効用可也上未甚然之布曰俟案到取㫖前此布以簡白惇云存寳之事可鑑勿使後悔惇許以島上故有是語已而苖履言弓箭手指揮雲成齎權將官戰殁王道兩箭稱可適誤熙河人馬入西界却自遁歸惇及黄履皆曰可適情重可斬布曰可適得功先歸王道等自深入取敗恐未足以重可適之罪上曰斬之亦不足惜布曰却不問足與不足惜行法不可不當一死不可復生兼祖宗以來重惜人命恐未可必誅上曰只為䘮失人命布曰臣自聞包誠等䧟没累日寢食不安然論可適之罪不敢草草惇曰不須問其他只違節制自可斬布曰若如此即昨日便當以為可斬若因雲成一言加重其罪則未見其可上又顧同列云斬之不害衆皆唯唯惇執論如初而履以為情重布曰雲成之言未可輕信俟勘到取旨上曰章楶不即斬可適而令取勘便欲平反想必不肯如此勘布再對又與林希陳可適情有可疑未可必誅反復甚乆上頗釋然此見布録甲午乙未四月及涇原勘到可適案乃王文振遣行無違節制罪惇惡其輕欲再置獄重劾此見六月布録戊戍布爭以為不可惇甚忿曰如此即師行更無紀律矣布曰祖宗以來凡所起詔獄未嘗得情葢以在上者意有所偏故獄多不直今再劾可說無他但嫌輕爾如此則勘官務一切加重而已及三省對惇白上涇原勘可適太輕未欲别置獄上曰置獄不妨布再對因及此事上曰再勘莫不妨此乃章楶庇之布曰事或有此然再劾但嫌輕爾再劾必加重還可信否可適不違節制有證左甚明如此却恐失實臣適與惇言不須再劾可適為統制官見熙河兵將深入身自退而不追還以致彼覆没自可重行勝於變獄詞以就法上曰不勘如何坐罪布曰此罪状甚明不須再劾上頷之布退又致簡曉惇曰今日之事保全新疆最為急務乃於防秋之際起獄將佐皆追逮則喪氣解體邉事殆矣惇亦從之布録六月己亥遂同呈可適案欲酌情斷罪而惇終以為輕乃曰宻院疏案中不圓事故明白然終恐可適不伏兼朝廷捨案而用看詳斷罪恐不可以為法衆皆曰事狀甚明只如此斷亦簡便上與惇意素欲重可適罪頗難之布曰如章惇之論極好朝廷捨獄案不用而以政府看詳輕重出入人罪誠不可啓此風然方防秋之際豈可起獄兼宻院看詳說如此即再勘官不過依此結案而已恐無補於事惇欲且送隴州知在候過防秋再勘布曰如此愈淹延之不便若恐可適不伏即差官取問可適結伏罪狀如不伏即再勘未晚也遂差大理正許公孫開封府司録曹調就原州取問可適圓結公案聞奏而有此命結案聞奏布録在七月己未庚申尋從章楶請留可適涇原効用凖偹使喚留為効用凖偹使喚在十月二十一日辛丑今并書不别出章綡編其父楶奏議其營救篇叙楶救可適事今附此楶奏太繁更不録章楶李初㑹涇原熙河秦鳯師徃葫蘆河川約束諸将曰賊兵在環慶四路之近相度前去掩擊不得輙過百里諸將意皆欲逺追窮討謂先公曰自元豐以來問罪西夏曷曽萃四路士馬於一道今乃得之兵力盛大如此何向不撓何為不成願先攻取而後版築先公不以為是及此約束之行熙河主將苖履進曰掩擊賊㓂而拘以百里不太蹙乎願更令曰百里内外先公笑謂之曰如所言即逺走興靈亦在百里外矣慙忸而去然諸君逺討之意猶在也軍行五六日後可適使人白統制官云慕化逢賊乞以兵援報未至與曲充出師統制官徐又調𤼵熙河千騎亦云照應慕化而黄履輙發二千騎其徃也與涇原之師行不相遇戰不相須可適充逄賊鏖闘殺獲相當而還熙河遂大衂履等懼擅興千騎之罪乃移禍可適令戰士雲成偽言所䧟将王道遣詣幕府持四矢為信曰道逄可適趣熙河人馬接戰比賊兵衆至而可適軍則遁歸因是敗北其實熙河兵元不與相接貪功直前又昧於道路風塵蔽日自堕没煙後峡崕谷而死先公料知諸将之情他路将士不欲窮治但罪可適首事罷其兵柄押赴原州委官鞫治意其詞所連逮事當自正朝廷以熙河将士䧟没方深悼惜無所歸罪而丞相申公聞雲成語則大怒先公不即軍中斬可適以謂無将帥畧有老姥態書四五反又教以殺所愛将當垂涕泣以示恩殺之以行法屡言於後堂必斬可適然後可以督勵将士遂制遣官結正其事先公知必深文㣲為辨白既乆又乞不再行鞫治以私書歴抵政府明其誣薦其才此論决也幸得保全其首領止於削奪而已復剡奏願留涇原俞之明年遂俘二酋立大功言近世名将者稽焉章楶奏昨進築平夏城靈平寨所有首先與臣議論并應副粮草等官逐路主將兩將兩城寨提舉官並係功效顯著宣力尤多乞優賜推恩詔等第轉官循資減年陞擢差遣進士特與假承務郎不理選限内皇城使已上轉官減年人回授與有官兒男如未有人食禄候有官日施行減年人令所属出給公據年限不同者依條比折布録云平夏靈平賞功受賣者八十餘人而熈河将佐未與焉戊寅吏部侍郎葉祖洽等言伏見侍郎左選凖元豐朝㫖類姓置簿左右選理宜一體而右選獨無亦乞置簿拘轄功過從之己夘婉儀劉氏進位賢妃樞宻院言禁軍将校軍頭十将應轉補者委當職官體量依監禁軍法如無病及弓弩及等搶牌習熟者並特與轉補有病或精神銷愞若年及或轉補後曽犯罪贓情重者並隔下禁軍長行犯杖罪若徒配或陞軍分而無過者並聽排連從之舊夲特詳今從新夲是月上以星變屡戒大臣以修政事又下詔求直言曽布因奏事白上狂狷之人雖不求言無所不道其間狂妄者固多今詔求直言則有識之士或有所陳望陛下省覽然則間有姦言亦不可不察聞林希言方天若者登舟欲行聞詔復留上書其所陳不過更欲誅戮元祐之人且欲掃除邪黨異論者既而聞林自果有此論而御史鄧棐遂以此應詔以掃除異意之人足以應除舊布新之象棐乃卞黨京所薦也其言多類此林希因進曰陛下寅畏如此未知大臣能奉行聖意否上遽曰不畏天變豈非章惇比來上毎以惇論邉事為不然且病其多大言無謹戒之意惇嘗奏公孫路有書來言區區志在滅賊上深不然之謂布等曰賊何可滅也布曰臣素曽開陳以謂敵未可輕今秋或未舉動亦未可便以為困弱或有深謀未可測兼朝廷所開拓進築之地不過近邉數十里未有以得其要領何可保能滅賊也如鄜延進築四城寨但與綏德寨開東西相直爾於羌人未見有所深害兼民力已疲士卒勞敝聖意毎以為戒真當如此上亦深以為然林是時為正字十一月十一日小著奉議郎權通判通逺軍李深上書曰臣近凖詔書以仲秋之夕彗出西方推原經典兹為大異應中外臣僚並許直言朝廷闕失詔下之日匹夫匹婦莫不相慶皆謂太平之業指日可見也臣天資樸拙學術淺陋雖奔走數千里之外而寤寐不忘魏闕之下愛君之義不敢嘿嘿謹獻愚忠上冐斧鉞伏惟陛下赦其萬死臣伏覩陛下親政以來于今五年夙夜翼翼惟欲寡過而上天猶以變異警告陛下臣於此見天愛陛下之德欲保定安樂之無所不至也變異之見今未累日陛下發德音下明詔戒邉臣弗許妄作申飭中外不諱直言損膳輟燕避殿肆赦臣於此見陛下畏天之威而恐懼修省無所不至也天人相與如此則災異之來將一變而為祥理矣六事克己比迹成湯反風起木繼美成王天下幸甚天下幸甚縱觀自古賢智之君下詔求言而小大之臣能自獻其直者不為不多然人君能虚以受之者為難耳虛以受之雖難而果以行之為尤難也陛下聖詔曰朕將親覽虛心以改則逺過百王之上臣豈敢自愛其身顧其子孫而不為陛下盡言之耶臣聞乾為君坤為臣君為陽臣為隂日者太陽也故為人君之象星則麗乎隂者也故為人臣之象今妖星示變為隂盛之災臣恐天所以警陛下者不在四海萬里之逺而在陛下左右前後也臣竊揆當今之闕失莫大於主道太柔而臣道太盛陛下柄用大臣委信仰成未嘗疑貳愛臣之仁至矣盡矣馭臣之義似未施也今天下人材不乏皆願自効犬馬以佐聖時然或聞陛下欲進一二人而近臣所不喜而忌之者必再三沮抑使不得進而後已陛下欲退一二人而近臣所喜而私之者必左右衛䕶使無所損而後已人有好謟佞善詭隨朝夕奔走於近臣之門者雖迂下必進之士有特立獨行正直不回踈於請謁者雖衆所推服必退之陛下視諸臣無有踈戚不作好惡而近臣親黨布滿要路快意於恩讎私用其喜怒如入無人之境天下憤悶扼腕噤不敢言臣請薄陳事實之一二願陛下擇之臣竊謂陛下廣覽兼聽欲聞所未聞者惟用臺諫立風憲之地為耳目之官爾祖宗故事凡進退言事官雖執政不得與聞葢以杜絶䑓諫私於宰執也比年蔡卞已執政乃使其兄蔡京得薦䑓官既被其兄之薦者能不私其弟乎況嘗聞陛下命黄履蔡京各薦可充御史者三人而履所薦者二人不召一人雖召亦為監司而已正月十七日命履京薦各一人及林希京之所薦三人皆召對而二為御史一為監司四方瞻望願登蔡氏之門者惟恐不及然則執政過惡陛下安得聞之乎陛下遣監司按察諸路欲知下民之疾苦官吏之美惡雖逺方萬里如在目前無不知者故著令應職相統攝及事之相干者必使避親葢欲監司與所部無蔽欺也今章楶為涇原帥乃用其婿劉何攝事又使之専應副涇原軍須前日進築平夏城為賊所抄而奏報不到朝廷則他可知矣然則帥臣之乖謬或軍湏之乏絶陛下安得聞之乎陛下賞功罰罪進退羣臣以勸沮天下宜無毫釐失實也然今之邉帥如鄜延以一路兵勢一路民力進築三城而毎賞不過於進官一等而已涇原章楶以四路兵勢三路民力亡失甚衆纔築安西城一寨而所與賞典則官自朝散而遷朝議職自修撰而加宻直陛下於鄜延何薄於涇原何厚無乃以章楶為宰相章惇之兄而固優之乎陛下分命監司應副諸路芻粟如邵䶵於鄜延則親臨飛輓至其功成賞不過一官而已五月十八日張詢於熙河泰然安枕未嘗一至沿邉而金城之賞乃自權發遣運副一進而為都轉運使又加秘閣之直四月十一日陛下於鄜延何䟽而於熙河何親無乃以張詢為宰相章惇之妹夫而特異之乎此陛下賞功之失也陛下鼓舞人物厲之以名引之以美是謂日新之政也故文臣之美名以兩制為榮武臣之美名以横行為榮冠儒冠者必有大學術或大才能嘗為侍從之官或邉帥發運使副累年者乃可得兩制列武弁者必有大功勞或大資望為朝廷所親信者乃可謂横行臣比見吕嘉問移發運正月十九日未數月不緣奏計登對不緣六曹貳卿遂除待制五月十五日天下皆謂嘉問之子娶王雱之女蔡卞娶王雱之妹又嘉問蔡卞結為死黨乆矣去年無故出户部郎何婉者蔡卞為嘉問報仇也臣不知嘉問之驟為兩制果出陛下聖意乎臣又見張赴近自左藏庫副使不因賞功又無他長遂以閤門副使為雄州帥天下皆謂張赴乃章惇之妻弟元豐末以章惇執政因得稍進比自章惇入相未三載間差遣屡易莫非要郡與兵權也臣不知張赴之超為横行邉帥果出陛下聖意乎八月十九日章惇為小官有李参者當薦惇今参之子孫李冲李延嗣悉為監司李冲先以不職罷今遽除河北運判李延嗣方在監當中遂除淮東提舉官此人人知章惇之報私恩也蔡卞為安石壻有鄧綰者薦卞於先帝欲以媚安石先帝察其邪怒而逐之德音指為奸回天下至今傳誦今綰之子洵仁洵武同時召對一為校書郎一為提舉官洵武又兼為修史檢討此人人知蔡卞之報私恩也臣恭惟陛下蒞政之始内修政事外撫要荒天下之幸莫大於此陛下復行免役夲以寛民而取於民者不輕陛下留神安邉夲以飬民而害於民者先至原其所以然者以用蔡京為詳定用章楶為帥臣為不得不然也何哉蔡京於簾幃聽政之初實知開封府事方朝廷更改雇役蔡京即奉行差法為天下倡是時章惇劄子所謂祥符縣役人一千一百餘人不數日間申差撥了當者實蔡京主其事也然則如京者其可使之詳定乎故役書未下之際京乃獨入劄子乞人額雇直並依元豐庶以掩昔日之故又隂造誣言謂同列兼行差法議論紛紜稽期遷令語言失當為天下笑及役書頌行陛下雖詔諸路許條析利害上於朝廷而蔡京之力能進退監司孰敢犯彼之怒乎此所以役法未全而上違陛下夲意也章楶於元祐中為陜西轉運使當鄜延棄米脂浮圖二寨之時楶於綏德城召諸將佐置酒高會作樂相慶又上表稱賀以棄地為盛事進為慶州帥遇賊兵侵犯而措置乖方殺掠人民不可勝計朝廷遣使按驗事跡甚明然則今如楶者其可使之為帥乎故楶此赴渭州方半月間遽請進築庶以贖前日之罪又奏辟趙髙之子為幹當公事官欲以鉗其口倉卒無備上煩朝廷起環慶秦鳯熙河涇原四路軍馬以為防托又驅熙河秦鳯涇原三路車秉人夫以充漕運輦置百物勞費萬端而中道復止夲路園林墳墓斬伐無筭而終亦不用老㓜怨嗟徧滿道路兵夫死亡將佐䧟没婦子哭泣其聲相聞今歳雍華一不豐而農民流離未易安集者特以涇原進築勞民動衆鄰路畏其追騷之相及未敢復業耳此所以邉事未息而上貽陛下深憂也蔡京為役法之罪人章楶為邉防之罪人天下共知朝野共怒而人不敢言者特以京為蔡卞之兄楶為章惇之兄孰肯言之以取禍乎諫諍之臣自上官均孫諤以言事補外之後敢論近臣者必亦鮮矣臣聞衆賢和於朝則萬物和於野九官濟濟為堯舜之盛今大臣論事於黼座之前有至喧辯不已時於政事堂中或以惡語相侵陛下未加誅責固為大度包函然朝廷紀綱不肅為之奈何宰執各有心則豈能同寅協恭以圖國事天下瞻仰謂如何耶孔子曰天下有道則禮樂征伐自天子出比年邉陲舉事乃征伐之大事也陛下不自專可乎論邉臣之要兵權之要則河北莫如雄州陜西莫如涇原熙河今雄州用宰臣之妻弟涇原用宰相之兄熈河用宰相之妹夫熙河雖曰權攝而實領帥事踰年矣三帥皆宰執之親凡有指揮邉事但用私書而已陛下能不為萬世慮患乎祖宗故事有此者乎一歳之内春則熙河地震秋則禁中大災又彗出西方皆隂極之異陛下不可不慮也臣前件所陳特舉一二實事以質於聖聽而已若夫王雱心疾而為館軄三年十月三日邵材病忘而出知越州梁之美提㸃刑獄三年四月六日周之道為刑部侍郎七月十七日似此之類莫非宰相私意不可以計數不敢縷述上瀆聖覽此皆陛下待遇近臣過於仁柔為所制也書曰惟辟作福惟辟作威孔子曰惟名與器不可以假人伏願陛下上念祖宗積累之艱難親收人主威福之大柄選擇正直之賢士以備諫諍委任公忠之賢佐以為賛襄駕馭英雄使之樂盡其力屏斥奸佞使之無所施其巧如此則天地應和災害不作符瑞沓至年糓屡豐天文之變不足患矣臣又觀彗星示變未踰旬浹而太陽掩之遂不復見陛下如日人臣如星陛下自收威福而損屈大臣之權使主道日益隆臣道日益㣲則太陽掩妖星之應也伏惟陛下留意劉何五月六日以永興提刑轉一官邵䶵閠二月十七日自河北副除陕副五月六日以陕副轉一官張詢二年十月八日以發運除陕副四年十一月除直祕閤陕西都運吕嘉問正月十九日自鄆州除發運五月十五日除寳制青州張赴八月十九日除閤使雄州李仲閏二月二十一日以承議除提舉開修御河三月二十四日改河北運判李延嗣四年十二月二十六日以淮南東路提舉常平為成都府路轉運判官鄧洵仁元符元年三月八日以河東提舉改荆南運判鄧洵武三年五月十四日以右史為秘少王雱二年十月三日為正字邵材八月六日為刑外梁子美三年四月六日以湖南提舉除廣西提刑周之道七月十六日除刑侍
