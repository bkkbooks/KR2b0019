body:
  text: 續資治通鑑長編巻一百七十九宋李燾撰仁宗至和二年三月辛酉詔知廣州劉湜捕擊蠻冦緩急有不及奏覆者聽便宜從事湜練土兵葺兵器作鐵鎻斷江路有盜據山勅貸罪招之不出湜知並山民居資之食即徙民絶餉路盜困蹙乞降廣人安之乙丑邇英閣講周禮視祲上謂講官盧士宗曰妖祥之興皆由人事君人者必在修徳以承天意乎丁卯詔修起居注自今每遇邇英閣立於講讀官之次初賈黯請左右史入閣記事上賜坐於御榻西南至是修起居注石揚休言恐上時有宣諭咨訪而坐遠不悉聞因令立侍焉辛未昭宣使果州團練使内侍右班副都知鄧保吉為入内副都知書此為范鎮有言乙亥詔雄州探事人補三班差使殿侍者並以為本州指使鄜延經畧司言西界阿克阿等二百餘人内附詔約還之丙子宫苑使榮州防禦使入内副都知任守忠昭宣使果州團練使入内副都知鄧保吉並為宣政使左騏驥使英州刺史入内副都知史志聰領忠州團練使宮苑使利州觀察使入内押班石全斌為入内副都知皇城使果州防禦使内侍押班武繼隆左騏驥使榮州防禦使内侍押班鄧保信並為内侍副都知文思使果州團練使内侍押班王從善為北作坊使彭州刺史内侍押班鄧宣言為洛苑使榮州刺史内侍押班于徳源為北作坊使知諫院范鎮言伏覩近降指揮自今傳宣除依法律賞罰外餘並仰中書樞宻院及所屬官司執奏今一日之中内臣無名改轉者凡五六人俱是過恩不合法律中書樞宻院大臣並不執奏臣竊謂陛下近降指揮可為萬世法曽未一月而大臣輙廢不行大臣在陛下左右號稱執政而廢法如此欲行法四方安可得哉夫天子言出而為令大臣廢令在法不赦伏乞明正中書樞宻院大臣之罪以示天下知陛下之法不可輕廢内臣改轉凡九人此云六七人應是任守忠鄧保吉史志聰王從善鄧宣言于徳源六人遷官餘止遷職武繼隆遷官又在二月丁酉故云六七人也繼韓絳傳云押班武繼隆遷官絳封還詞頭陳其罪出隆為鄆州鈐轄按繼隆二月丁酉以皇城使陵州團練使内侍押班領果州防禦使今又遷内侍副都知不知何時出為鄆州鈐轄當考詔封孔子後為衍聖公初太常博士案宋史祖無擇本傳作入直集賢院闕里文獻考同此云太常博士疑誤祖無擇言文宣王四十七代孫孔宗愿襲封文宣公按前史孔子之後襲封者在漢魏曰襃成襃宗案闕里文獻考無襃宗之名惟載東漢永元四年封襃亭侯魏黄初二年封宗聖侯原本疑有脱字尊聖在晉宋曰奉聖後魏曰崇聖北齊曰恭聖後周及隋並封以鄒國唐初曰襃聖開元初始追諡孔子為文宣王又以其後為文宣公然祖諡不可加後嗣乞詔有司更定美號乃下兩制定更封宗愿而令世襲焉丁丑以旱除畿内民逋芻二十七萬及去年秋逋税已卯邇英閣講周禮大罍王洙曰祠天地之器以質信為本帝曰曹操不事質信而多詐忌何以事上帝乎洙曰天地之徳非至誠之道至質之器何以動之張揆讀後漢書應劭議刑揆曰當漢獻帝亂世有司猶能守法今天下奏獄或違法出罪負寃不伸水旱之災未必不由此也帝曰祖宗以來多用中典奏讞者往往貸之豈欲刑罰之濫乎翰林學士羣牧使楊偉等言判官殿中丞王安石文行頗高乞除職名中書檢會安石累召試不赴詔特授集賢校理安石又固辭不拜此據會要辛巳知諫院范鎮言臣伏見去冬多南風今春多西北風乍寒乍暑欲雨不雨又有黒氣蔽日此皆人事之所感動也黒氣隂也小人也日陽也君象也黒氣蔽日者陰侵陽小人惑君也欲雨不雨者政事不决也陳執中為相不病而家居者百日矣陛下以御史之言決一婢死而欲退宰相為是即乞速退執中以解天意以御史之言為非乞敕執中起視事無使天意久不決也寒暑者賞罰也乍寒乍暑者不當賞而賞當罰而不罰也鄧保吉有過於法不當為内侍都知鄧宣言不歴邊任於法不當為内侍押班為内侍押班未㡬而又改官石全斌不當為觀察使未㡬而又為内侍副都知其餘攀援遷改皆不應法律賞罰是不當賞而賞也陛下有旨不應法律賞罰聽中書樞宻大臣執奏而中書樞宻大臣不執奏是當罰而不罰也冬而多南風春而多西北風皆逆氣也風主號令主思慮陛下思慮若有為小人所惑而號令數變易也天變之發或發于未然之前或發於已然之後皆所以覺悟人君也修人事以應天變則災異可為福祥也陛下如欲應黒氣蔽日之變則莫若逺小人近君子絀小人之言而用君子之言陛下如欲應乍寒乍暑之變則莫若追還鄧保吉等過恩而明正中書樞宻大臣之罪也陛下如欲應欲雨不雨之變莫若速定陳執中進退之勢以决中外之惑陛下如欲應冬多南風春多西北風之變莫若精其思慮而不數變號令也凡此皆古聖賢通天人之術著於經史使後世為人君者視之以奉天為人臣者法之以事君者也非人臣之所臆説也陛下無以臣非才廢臣所陳先聖賢之言則臣之幸也天下之幸也社稷之福也惟妖星之變及今一年誠消息之所先至也今春諸路無麥苗禾種不入而山東尤甚山東盜所起處萬一盜起陛下將何以待之妖星之變殆恐為此此臣所以居言責之地而不得黙黙也此疏實錄亦具載之癸未龍圖閣直學士起居舍人權知開封府蔡襄為樞宻直學士知泉州以母老自請也襄工筆札上尤愛之御製李用和碑文詔使襄書後又勅襄書温成皇后父清和郡王碑襄曰此待詔職也卒辭之詔諸路久不雨民頗艱食宜令轉運提㸃刑獄當職官司出常平及軍糧借貸之其積欠科率折變之物及興修工役一切蠲罷務以寛民詔三司韶州岑水場銅大發其令轉運司益募工鑄錢丙戍邇英閣王洙講周禮典瑞含玉上曰若使人用此而骨不朽豈如功名之不朽哉丁亥知審刑院張揆言知虢州周日宣妄言澗水衝注城郭當坐不實之罪上曰諸郡多奏祥瑞至水旱之災或抑而不聞今守臣自陳墊壞官私廬舍意亦在民當恕罪也翰林學士歐陽修言朝廷欲俟秋興大役塞商胡開横隴回大河於故道夫動大衆必順天時量人力謀於其始而審然後必行計其所利者多乃可無悔比年以來興役動衆勞民費財不精謀慮於厥初輕信利害之偏説舉事之始既已倉皇羣議一搖尋復悔罷不敢遠引他事且如河決商胡是時執政之臣不審計慮遽謀修塞凡科配梢芟一千八百萬騷動六路一百餘州軍官吏催驅急若星火民庶愁苦盈於道塗或物已輸官或人方在路未及興役尋已罷修虛費民財為國斂怨舉事輕遽為害若斯今又聞復有修河之役聚三十萬人之衆開一千餘里之長河計其所用物力數倍往年當此天災歲旱民困國貧之際不量人力不順天時知其有大不可者五蓋自去秋至春半天下苦旱而京東尤甚河北次之國家常務安靜賑䘏之猶恐民起為盜况於兩路聚大衆興大役乎此其必不可者一也河北自恩州用兵之後繼以凶年人户流亡十失八九數年已來稍稍歸復然死亡之餘所存無㡬瘡痍未斂物力未充又京東自去冬無雨雪麥不生苗將踰春暮粟未布種農心焦勞所向無望若别路差夫又遠者難為赴役一出諸近則兩路力所不任此其必不可者二也往年議塞滑州決河時公私之力未若今日之貧虛然猶儲積物料誘率民財數年之間始能興役今國用方乏民力方疲且合商胡塞大決之洪流是一大役也鑿横隴開久廢之故道又一大役也自横隴至海千餘里埽岸久已廢頓須興葺又一大役也往年公私有力之時興大役尚須數年今猝興三大役於災旱貧虛之際此其必不可者三也就令商胡可塞故道未必可開鯀障洪水九年無功禹得洪範五行之書知水潤下之性乃因水之流疏而就下水患乃息然則以大禹之功不能障塞但能因勢而疏決爾今欲逆水之性障而塞之奪洪河之正流使人力斡而回注此大禹之所不能此其必不可者四也横隴湮塞巳二十年商胡決又數歲故道已平而難鑿安流已久而難回此其必不可者五也臣伏思國家累歲災譴甚多其於京東變異尤大地貴安靜動而有聲巨嵎山摧海水揺蕩如此不止者僅十年天地警戒宜不虛發臣謂變異所起之方尤當過意防懼今乃欲於凶旱之年聚三十萬之大衆於變異最大之方臣恐災禍自兹而發也况京東赤地千里饑饉之民正苦天災又聞河役將動往往伐桑毁屋無復生計流亡盜賊之患不可不虞宜速止罷用安人心夏四月癸巳兵部員外郎知制誥吳奎知夀州奎前使契丹會契丹主加稱號邀使者入賀奎不為往因别設次令就觀比還道與契丹使遇其國本以金冠為上服紗冠次之而使人輙欲以紗冠邀漢使盛服奎不許殺其禮見之既而契丹言每北使至南朝遇盛禮皆入賀奎坐是出郭逵副奎亦坐是責汾州都監事見逵傳實録不書蓋畧之也今亦削去甲午遣官祈雨潭州上瀏陽縣所得古鐘一送太常寺丙申上封者言有䕃子孫犯杖以上私罪情理重者令州縣批所犯於用蔭官誥之後若三犯奏聽裁從之丁酉京東西路安撫司言兩路兵甲盜賊專督在本司而别司又帯提舉事權不一請皆罷之詔南京留守司仍舊外餘從之己亥契丹國母遣歸徳節度使左驍衛上將軍蕭知㣲永州留後王澤契丹主遣保安節度使左監門衛上將軍耶律防殿中監王懿等來賀乾元節并獻契丹主繪像李􅐉十朝綱要己亥契丹主遣使以其畫像來獻求易御容以代相見篤兄弟之情庚子賜夏國大藏經宰臣陳執中初為御史所劾即家居侍罪不敢出庚戍復入中書視事此據趙抃奏藁辛亥罷諸路里正衙前先是知并州韓琦言州縣生民之苦無重於里正衙前自兵興以來殘剥尤甚至有孀母改嫁親族分居或棄田與人以免上等或非命求死以就单丁規圖百端茍脱溝壑之患殊可痛傷國朝置里正主催税及預縣差役之事號為脂膏遂令役滿更入重難衙前承平以來科禁漸宻凡差户役皆令佐親閲簿書里正代納逃户税租及應無名科率亦有未曽催納已勾集上州主管綱運及每郷被差疎宻與物力高下不均假有一縣甲乙二鄉甲鄉有第一等十五户每户物力及三千貫乙鄉有第一等五户每户物力及五百貫即甲鄉十五年一役乙鄉五年一役富者休息有餘貧者敗亡相繼豈朝廷為民父母之意乎請自今罷差里正衙前只差鄉户衙前令轉運司將逐州軍見勾到里正衙前人數立為定額令本縣令佐將五等簿於一縣諸鄉中第一等選一户物力最高者為之如更差人亦倣此若甲縣户少而役繁即權許於乙縣户多而役稀處差簿書未盡實而願抉取他户者亦聽其税賦只令户長催輸以三年一替於是下京畿河北河東陜西京西轉運司相度利害而皆請如琦所議便又知制誥韓絳言臣嘗安撫江南東西路見兩路衙前應役不均請行鄉户五則之法又知制誥蔡襄言臣嘗為福建路轉運司見一縣之中所差里正衙前各於逐縣有三十年或五七年輪差一次者有一百貫至十貫皆入十分重難者請止以産錢多少定其所入重難之等乃命韓絳蔡襄與三司使副判官置司同定奪遣都官員外郎吳㡬復往江東殿中丞蔡禀往江西與本路長吏轉運使相度因請行五則法凡差諸州郡郷户衙前以産錢與物力從多至少置簿排定户數分為五則其重難差遣亦分等第凖此若第一等重難十處合用十人即排定第一等一百户若有第二等五處即排定第二等五十户以備十次之役其里正更不差人所置簿封在通判㕔每遇差人即長吏以下同按視之轉運使提㸃刑獄廵歴至州即取簿㸃檢仍察其違失者施行遂更著淮南兩浙荆湖福建之法下三司頒行之其法雖逐路小有不同然大率得免里正衙前之役民甚便之甲寅并代鈐轄蘇安靜上八陣圖降敕奬諭録鄭戩孫伋為試將作監主簿以獻其祖所著文集也乙卯詔三司出米京城諸門裁其價以濟流民知諫院范鎮言伏見今歲無麥苗朝廷放税免役及以常平倉軍食拯貸存䘏之恩不為不至矣然而人民流離父母妻子不能相保者平居無事時不少寛其力役輕其租賦歲雖大熟使民不得終歲之飽及少歉雖加重施固已不及事矣此無他重斂之政在前也今特一榖不熟爾而流民如此設使九榖皆不熟朝廷將如之何臣竊以水旱之作由民之不足而怨民之不足而怨由有司之重斂有司之重斂由官冗兵多與土木之費廣而經制不立也又聞許汝鄭等處蝗蝻復生亦由貪政之所感也天意以為貪政之取民猶蝗蝻之食苗故頻年生蝗蝻以覺悟陛下也春秋書秋初履畆冬蝝生説者以為縁履畆而生此所謂貪政之感也國家自陜西用兵増兵以來賦役煩重及近年不惜高爵厚禄假借匪人轉運使復於常賦外進羡錢以助南郊其餘無名斂率不可勝計此皆貪政也貪政之發發於掊克暴虐此民所以怨也所以干天地之和也水旱之所以作也臣前此言官冗兵多民困者屢矣未䝉報下伏乞陛下敕大臣檢臣前所上章考今官數兵數與賦入之數立為經制又罷土木之費使民得足食而少休息則天地之和至矣古之言太平者止於使民之足食也今誠能立經制省官與兵節土木之費使民足食陛下高拱深居而太平可坐致顧陛下責任大臣何如爾翼日鎮又言伏見周制冡宰制國用唐宰相兼鹽鐵轉運或判户部或判度支然則宰相制國用從古然也今中書主民樞宻院主兵三司主財各不相知故財已匱而樞宻院益兵無窮民已困而三司取財不已中書視民之困而不知使樞宻减兵三司寛財以救民困者制國用之職不在中書也而欲隂陽和風雨時家給人足天下安治不可得也欲乞使中書樞宻院通知兵民財利大計與三司量其出入制為國用則天下民力庶㡬少寛以副陛下憂勞之心此非使中書樞宻大臣躬親繁務如三司使之比直欲令知一歲之計以制國用爾真宗時内外兵九十一萬二千宗室吏員受禄者九千七百八十五寳元以後募兵益廣宗室蕃衍吏員歲増至是兵百二十五萬九千宗室吏員受禄者萬五千四百四十三禄廩俸賜從而増廣又景徳中祀南郊内外賞賚緡錢金帛總六百一萬及饗明堂増至一千二百餘萬故用度不得不缺自天聖以來帝每以經費為慮命官裁節者數矣臣下亦屢以為言而有司不能承上之意牽於習俗卒無所建明議者以為恨焉此據食貨志附見丙辰殿中侍御史趙抃言臣昨自二月二十日以前累上章疏乞正宰相陳執中之罪又條奏執中可罷免者八事伏䝉陛下省納開悟宣付政府施行執中退處私第不赴朝請前後數月雖兩次大宴并乾元聖節亦免上夀赴會外議以謂陛下禮貌大臣雖執中罪惡彰著不即降黜是欲使全而退之故臣不敢再三論列懼成喋喋煩凟宸聽也此月二十二日執中遽然趨朝再入中書供職如舊中外驚駭未測聖情臣雖至愚不能無惑臣固不知陛下以臣向來之言為是耶為非耶復不知陛下以執中之罪為有耶為無耶陛下若以臣言為是而以執中為有罪即乞陛下早正朝廷之法而罷免相位以從天下之公議陛下若以臣言為非而以執中為無罪亦乞陛下正朝廷之法而竄臣逺方宣布中外以誡後來臣孤危樸忠不識忌諱伏望陛下將臣前來累上章疏再賜觀覽則臣之言是非執中之罪有與無豈逃聖斷也是月殿中侍御史趙抃又言王拱辰報聘契丹行及鞾淀未致君命契丹置宴餞宋選王士全拱辰等遂窄衣與會自以隨行京酒換所設酒痛飲深夜席上聨句語同俳優選及士全因醉與敵使爭及契丹主自彈琴以勸拱辰酒拱辰既不能辭又求私書為已救解失禮違命損體生事乞加黜降宋選尋坐罪責通判宿州朝廷獨不問拱辰抃乂言拱辰比吳奎罪惡為大兩府惡奎即逐之乃隂庇拱辰不顧邦典頃年韓綜坐私勸契丹主酒落職知許州去年契丹泛遣使欲援綜例上夀頼接伴楊察以朝廷曽黜綜以吿之敵使乃止拱辰既輙當契丹主彈琴送酒之禮今若不責拱辰異時敵使妄欲援拱辰例則朝廷將何辭拒之詔拱辰罰金二十斤放此據趙抃奏藁追書宋選責宿倅選傳有之實錄乃畧去五月戊午朔汝南郡王允讓子右領軍衛大將軍宗師為康州刺史北海郡王允弼子右監門衛將軍宗喬為右領軍衛大將軍皆以父領大宗正久因乾元節推恩特遷之後毋得為例會要云今知大宗正司每歲有與子减磨勘恩例乃縁其例也允讓允弼初領宗正在景祐三年七月已未御崇政殿錄繫囚死罪以下逓降一等流以下釋之庚申雨賜喜雨宴於中書辛酉詔中書公事自今並用祖宗故事施行初宰臣劉沆建言中書不用例而議者皆以為非便左司諫賈黯奏罷之二月丙午沆初建言癸亥右屯衛大將軍叔韶領賀州刺史上書求試繁劇特遷之叔韶賜第皇祐元年六月已見先是久不雨帝問翰林侍讀學士吕公綽何以致雨公綽曰獄久繫則旱帝親慮獄已而大雨時公綽受命知河陽既數月乙丑詔留侍經筵知諫院范鎮言比奉使河北還伏見河北連歳招兵未已皆是坊市無頼及隴畆力田之人冐為軍營子弟誠是軍營子弟則今日詔下明日自當投牒豈有及今一年尚未盡至其為坊市無頼隴畆力田之人明矣况今田甚曠民甚稀賦役甚重國用甚不足所以然者正由兵多也先朝用兵時兵才四十餘萬今不用兵而兵已倍之臣不知大臣以何見而為此議也必以為備契丹也今塘水東西三百餘里多於先朝也歳予金繒五十萬禮聘又十餘萬亦多於先朝也以多於先朝之塘水多於先朝之金繒以備契丹而與之和也宜省兵以息民而反多兵以困民者臣所以深惑也契丹自知顧塘水之限貪金繒之利而不敢動者五十年於今矣方契丹貪利而不敢動之時其民宜富實而反日以困國用宜饒足而反日以蹙此無他兵多而民稀田曠而賦役重也使契丹而有一日之警將何以繼之哉大臣終不知念此而但以多兵為有備此臣所以深惑也今契丹五十年不敢南入為冦者貪金繒之利厚也就使棄利為冦則大河以北婦人女子皆是乘城之人其坊市無頼隴畆力田者又將焉徃况契丹貪利而不敢動而顧畜養之以困斯民乎夫取兵於民則民稀民稀則田曠田曠則賦役重賦役重則民心離寓兵於民則民稠民稠則田闢田闢則賦役輕賦役輕則民心固與其離民之心以備契丹契丹未至而民力先已困國用先巳匱孰若固民之心以備契丹契丹雖至而民力有餘國用有備其利害若視白黒若數一二而大臣以為難者臣所以深惑也昔漢武以兵困天下者用兵以征匈奴至漠北得所欲也今陛下以兵困天下者不用兵以至是也非以快所欲也何苦而為是乎五口之家尚知量入以為出况天下大計其可以不校出入其可以無經制乎臣伏見今之世有失入徒罪若流死者陛下必加罪有司其在選人必加停殿後雖用之不得遷改此所以見陛下䘏民之心至矣今大臣舉天下之民而困之豈特失入徒罪死罪之比而陛下畧不加問是捨所大而急所細也臣愚豈得黙焉陛下誠罷今招兵敕大臣使具太祖時賦入若干兵若干官若干太宗時賦入若干兵若干官若干真宗時賦入若干兵若干官若干陛下天聖中賦入若干兵若干官若干約今賦入之數兵數官數酌取中道立為經制以賦入之數十分為率以七分給郊廟宫省諸費三分留備水旱及緩急非常為之十年僅可以言治古者國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國今自京師至天下州郡大率無二年之蓄邊城甚者或三數月矣不幸有連二年之水旱將何以養此兵乎此兵不足以養則其憂不在契丹也此臣所謂言責也陛下所宜留念大臣所宜盡心悉力之時也伏乞下臣章中書樞宻大臣并臣前奏看詳若不以臣非才而信用其言先罷招兵然後量今天下賦入以為國用使上下寛裕非獨臣之幸也乃天下之幸也辛未左屯衛大將軍從湜為右神武軍大將軍妻父王貽永為請而遷之從湜已見景祐元年詔河東轉運司今春殞霜殺桑其被災州軍夏稅絹聽以中價輸錢乙亥右神武軍大將軍睦州團練使宗諤自陳生太宗宫中及上所藏真宗御容特遷左龍武軍大將軍宗諤已見皇祐五年六月戊寅詔曰朕祇紹駿謨厲精庶政眷兹文武之列所謂邦家之基惟古今治忽之常繫上下義利之分吁惟近歳洊至煩言以為參顧問者間怵於私尸言責者或失於當蒞官無匪懈之恪專覬謬恩薦士乖責實之誠時容私謝至於命令之下以及詔除之行論議所移綱條益紊朕惟舜徳之盛股肱有賡載之和周道之衰朝廷多讒怨之愬咨爾周行之士適逢至治之期與其渉險以徼榮曷若飭躬而馴致爰伸戒吿以勵俊明茍迷修省之方寖長澆浮之俗必從吏議以正邦彝時上封者言古之取士以徳行故淳明樸茂之人用後世取士以詞章故浮薄纎巧之人進望條例弊事申戒百官故降是詔禮部員外郎知制誥韓絳為吏部員外郎知河陽從所請也絳尋自言伏覩詔書申戒在位臣不敢輙承謬恩乞罷所遷官從之御史中丞孫抃與其屬言臣等近以宰臣陳執中家杖殺女使事有詔置獄勘不盡情理虧朝廷之法各曽具狀彈奏乞正執中之罪至今道路騰沸未蒙施行竊聞多有大臣及近侍臣僚曲為黨扇上惑宸聽伏縁黨扇之人盡是交結朋附樹恩壞法伏望陛下特從聖斷早賜指揮正執中之罪以塞中外公議據孫抃奏藳此係第四章又言執中誣罔朝端輕廢詔獄縁嬖昵之私愛屈公平之大議内則滅家法外則隳國綱又其作為全是虛詭當居官之日則務揚聲言乞引退及待罪之時則多説事意宻圖召還罔上欺心忠實何在陛下姑全大體不念逺謀尚傳天音留住宰府人人相目憤憤不平况執中少不讀書壯不稽古及其寖老遂暗而荒事之十端顚倒七八物議以為必不可更當大任臣等屢曽論列總是人言所隔致兹聖意未回紀綱一差紛不可整且朝廷之法是陛下之法陛下之法即祖宗之法祖宗之法乃一天下平元元之大本臣等可戮此法不可屈其陳執中伏乞特行責降以正本朝典章不報於是抃與知雜事郭申錫侍御史毋湜范師道殿中侍御史趙抃同乞上殿閤門以違近制不許壬午詔孫抃等輪日入對知諫院范鎮言御史臺全臺請對陛下何不延問聽其所陳别白是非可行則行不可行亦當明諭不可之故使知自省今拒其請非所以開言路也御史中丞孫抃侍御史知雜事郭申錫入對言臣等昨以宰臣陳執中杖殺女使事外議皆謂嬖人阿張打殺致開封府檢騐推窮其執中既自乞差官勘劾朝廷遂起詔獄洎至勾追干證奴𨽻之人却又拒抗不遣尋又入劄子乞不枝蔓其制院從而希旨鹵莾結絶樞宻院亦是無所建明所以制獄之興由執中而興制獄之廢亦由執中而廢家聲醜穢物議喧騰不䘏中外之言復壞朝廷之法欺公罔上愧心厚顔豈宜更居台司使輔國政其措置無狀職事不修臣等前後屢曽彈奏伏乞陛下特賜宸斷正執中虐殺㓜弱違拒制獄欺公罔上之罪使朝廷之法不壊則宗廟社禝之幸據孫抃奏藳此係中丞知雜上殿第六章抃又言前日詔獄言事官屢有彈奏未聞陛下特降指揮臣僚中亦有解救者伏慮陛下因而疑惑臣愚竊以彈奏之言為朝廷為法為綱紀解救之語為宰相為身為利禄二途事意黒白可驗昔唐憲宗時五坊使楊朝政擅拘平人以蠲財物御史中丞蕭俛及諫官上疏論列裴度崔羣因延英對極言之憲宗曰且欲與卿等商量東軍此小事我自處置度奏曰用兵小事也五坊追捕平人大事也兵事不治止憂山東五坊使暴横恐亂輦轂憲宗悟遂置於法况今相臣輕侮朝柄詔獄廢置議皆自我顧其所為何止暴横陛下縱全君臣之分免其責罰亦當罷去以懲不法之罪奈何優游遷延固執不下臣恐而今而後宰相得欺朝廷大臣得罔君上居近列者得報私恩而毁公議為獄官者得捨實狀而結虛案紛紛讒寃望風而起陛下何以止之方今憸言得行正道差塞事若寖弛人將不安願陛下聖治之閒一講祖宗遺範公賞公罰再清朝路俾共成大業永永無窮臣不勝懇悃之至據孫抃奏藳係第八章不得其時今附此甲申右武衛大將軍永州團練使宗懿上所撰詩賦右屯衛大將軍克修自言㓜時嘗侍上禁中特遷宗懿領和州防禦使克修領貴州刺史宗懿允讓長子克修徳恭孫也罷河北河東陜西三路知州兼路分鈐轄都監其正任團練使以上只為本州部署諸司使以上為本州鈐轄餘管勾本州駐泊兵馬公事其員多處將來有闕更不除翰林學士歐陽修言京師近有雕市宋賢文集其間或議論時政得失恐傳之四夷不便乞焚毁從之乙酉殿中侍御史趙抃言臣伏覩近降詔書有居言責者或失其當之語臣以為自朝廷至舉天下自輔相至百執事孰為忠義孰為姦邪孰為賢正孰為欺詐陛下念堯舜知人之難欲别白真偽而進退之莫若取中外之公議欲聞中外之公議莫若信風憲之直言故徳音丁寧遽然下詔今御史臺陛下耳目之司當是職者既能言之又不失其當則陛下固宜聽之不疑斷之不惑聽斷之必行焉雖朝廷至舉天下雖輔相至百執事某忠義某姦邪某賢正某欺詐無所逃遁莫不悉知之矣知忠義賢正既進任之知姦邪欺詐既退黜之夫如是則天子尊而天下安矣伏惟聖宋基業僅百年祖宗繼承使紀綱不破壞者有禮法而已扶樹禮法而不使破壞者有宰相而已今宰相陳執中居廟堂之上自去年春正以來處置大臣違越典故先意希旨動成乖謬身為大臣既破朝廷之禮而私門之内信縱嬖人殺虐無罪陳乞置獄復自廢之情渉誣罔託疾歸第不赴大宴不赴聖節上夀一旦昂然復入中書殊無廉恥不恤人言身為大臣而又壞朝廷之法宰相既破禮又壞法御史不言之不可也御史之言既無不當陛下不斷之不可也臣昨二月中曽疏奏執中可罷免者八事臣自省臣之言無不當也陛下前日之詔謂言之失當者固已敕戒之矣若言之無不當者願陛下聽之於不疑斷之於不惑其朋附執中之人救解熒惑之偏説不足信也臣愚伏望早賜宸斷正執中之罪復朝廷之禮法振中外之紀綱念祖宗繼承之艱難廣社稷百年之基業天子得以尊天下得以安亦以示詔書之出不徒然也
