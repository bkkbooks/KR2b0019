body:
  text: 續資治通鑑長編巻三百六十三宋李燾撰哲宗元豐八年十二月丙子左正言朱光庭奏伏以忠賢進則治之表姦邪任則亂之階自古及今不易之道也臣䝉遇聖恩擢在諫列以言為職敢負上知臣竊見左僕射兼門下侍郎蔡確先帝簡㧞位至宰相送終殊不盡恭臣昨祗奉陵事迎接神宗靈駕目覩確之舉動深可歎嗟確為大禮使自當如人子之送慈父既發引在道則須躬親與扈從臣僚不逺前後周旋相視安徐而行竊慮稍不中節則神靈為之不安而確不務此每於靈駕發引則馳馬先去數十里之逺直趨館舎以就安眠後面靈駕一行並不照管當此之際有如路人為臣不恭莫此之甚送終大事尚不盡心責其他事盡節必無此理向聞不赴殿宿已是不恭憲臣有言確殊不以為懼至於送終又更簡忽裕陵事畢自合引去而確未嘗堅請輙已安居揆其所為不恭如此大臣之節當若是乎節既不足觀則遇事私意詎可量乎豈可使竊據大位秉國之鈞乎則確之宜去者也又竊見知樞宻院章惇素來輕易多言方聖政有為之際比屋漸見蘇息惇為大臣當上體朝廷同心一志輔之翼之以就太平而惇乃謂先朝之事不可遽更肆為辨説沮抑聖意殊不知朝廷一家之事烏有前後異同之説但事未安於理則必更張務求其至當上以廣宗廟無疆之福下以納生民安樂之地而惇挾邪肆辨復為顧望不以朝廷生民為慮大臣若此非姦而何此惇之宜去者也又竊見右僕射兼中書侍郎韓縝閥閲之盛自昔罕有父兄之敎固久而嚴然縝内行不修外無素望偷安冐寵所補缺然久居鼎鼐殆恐覆餗此縝之宜去也聖恩寛厚進退大臣以禮察其不恭挾邪冐寵之如此不足以勝大任當其釁惡之未彰宜令解機任而善去廼君臣安全之義也恭惟宵旰之勤以生民為念興治補弊適此其時必得公忠正直之臣並在左右前後則可協熙庶績以代天工昨自朝廷召門下侍郎司馬光天下翕然知所向矣宜更進之宰輔以盡猷為知慶州范純仁近已召為侍讀純仁者乃公忠正直王佐之才天下士大夫未見其比願聖慈待以不次直進之宰輔俾與司馬光協濟庶務則聖治可不勞而成資政殿學士侍讀韓維天下之賢才宜置之宥宻寔允公議臣願聖慈深察臣言特出宸斷退三姦於外以清百辟進三賢於内以賛萬㡬則自然朝綱不紊聖化得行太平之風自兹始矣權管勾熙河蘭㑹路經略司公事趙濟奏西蕃鄂特凌古差首領結斯濟特齎到蕃字譯稱蕃家王子扎實拉木噶巴勒布沁鄂特凌古文字送與熙州趙龍圖探得滿裕克家㬠㸃集人馬告漢家邊上做大凖備早奏知東京阿舅官家着臣却寫文字送與蕃家王子鄂特凌古亦探得滿裕克家㬠㸃集已着將官做了大凖備更體探滿裕克家待於甚處作過報來詔趙濟回答鄂特凌古文字不先奏及便稱為蕃家王子特放罪其今後往回文字即依已回報稱呼宻記十六日丙子丁丑詔諸路轉運提㸃刑獄開封府界提㸃司與提舉將兵嵗分州縣閱視諸將軍須戊寅鎮江軍節度使開府儀同三司新判大名府韓絳加食邑實封絳前為西京留守應奉山陵禮畢故也吏部侍郎陳安石為天章閣待制知永興軍承議郎起居舍人邢恕朝請郎起居郎胡宗愈並為中書舎人二十七日恕罷左司郎中滿中行為起居郎禮部郎中蘇軾為起居舎人中大夫太僕卿李之純直龍圖閣知滄州朝請郎吕陶為司門郎中奉議郎孔武仲為正字侍御史劉摯言臣近者累具封章論奏宰臣蔡確乞行罷黜未䝉指揮施行須至再有陳列臣之於確素無仇嫌但以其人懐邪徇私不恭無禮久居相位無益國家公議所不容王法所宜治確自京官不十年至輔弼非以學術選也非以徳義進也特以累治大獄鍜鍊誣陷緣此以進身是以任風憲則專以䕶持苗役法令為公論居廟堂則專以聚剝生靈膏血為相業天下安危久逺大計不以經心民間困苦若胡越人之不相問至於排斥忠良引置黨類深阻而不可勝數臣今且舉大者一事試言之夫百官差除從祖宗以來中書門下省同共進擬所以合同衆論自壬戌官制改更三省分治之後其事盡歸中書是時確為右僕射兼中書侍郎中書之權既已偏重進退人物隨意在手門下尚書省審察奉行而已天下莫不知其非而但以確在此位畏之者不敢言附之者不肯言故三省不得而合也及皇帝陛下太皇太后陛下臨御之日御史臺禮部閤門同定垂簾儀制其時衆論欲因此合三省班次以正其事者而或恐忤確之意乃言官制不可輒改遂且如故無何適㑹王珪薨謝執政遞遷確以左僕射進兼門下侍郎以謂去中書之位則無差除之權不便也即時隂令御史中丞黄履上言以為請朝廷從之於是差除方歸三省合班取㫖矣三省合班差除誠是也乃所謂公道也乃所謂善政也然以確在中書貪權之故使朝廷公道善政不得行者凡三年設使王珪不死確不遷門下則此事未必容改正非止三年而已也朋附確者亦未必肯以為言也上下之情以利相市以私相成至於如此無人達于聖聽豈不可為歎息也哉臣願陛下試察此一事足以見確之存心常要大權隨已則為公邪為私邪又足以見朋黨之附確而為其用者其効如此則為邪耶為正耶自今春以來詔恩屢下勤恤疲民稍更革法度未便者此皆確之所不欲其心忌而耻之者也然陽為協順將一二小事依應増損者此非真能奉宣聖意也蓋欲以此安其身為不去之計而已今陛下不深察其矯偽而聽其自留陛下誤矣使確置身既定立足既牢必須領袖邪黨專權肆志小人之道日盛君子之道日消朝廷將不能制同列亦不能勝天下無由終被仁聖之澤矣然則確之去不去天下安危生民休戚之所繋也伏望聖慈早發睿斷罷黜一確上足以安朝廷下足以安生民而慰忠臣義士之望臣不勝憤懣憂國愛君之至貼黄試因確進對之際陛下宻察其語言所向及差除所主張之人則足以見其心之公私邪正矣又貼黄自冬以來雨雪不降亢陽為厲臣按五行志以為政舒緩之所致恭惟聖慈於大臣仁恩太厚包容太過至公之法都不行於貴近此乃和緩之效故其政冬温而無雪伏望振剛明之斷深體天道罷去確位則和氣必應又貼黄確與章惇張璪為黨自知公議所嫉疑言路或有文字訪聞逐人各令親信於内臣中出入稍親近者探伺訪求虚實伏望聖慈亦賜訪察摯遺藁此係第四䟽八年十二月十八日上奉議郎太常丞王覿為右正言覿首上疏論知人安民曰臣聞自古聖治之極莫過堯舜當舜承堯治之後忠賢之在朝者宜已多疾苦之在民者宜已少然禹臯陶相與謀於大舜之前而惟以知人安民為務以謂惟帝其難也况後世聖治之機或未及堯舜之時其於安民知人之道又可後哉臣伏覩陛下臨御以來進㧞忠良擯斥姦惡修完制度剗革蠧弊而四方萬里手舞足蹈以慶盛徳之舉以觀無前之烈此陛下知人之哲安民之惠亦已至矣然臣竊以謂前日進用擯斥之人修完剗革之事多公論之舊著聖聽所素聞嫌疑之人未及騁其謀譸張之説未得肆其惑故知之無難而行之尚為易也今陛下臨御漸久權綱漸著人之謀身者將諂諛以取合巧佞以害正而事之隠伏者將壅蔽而不聞浸淫以成患則知之不易而行之浸難此不可以不深察也故大舜當攝政之時已舉十六相放四凶族可謂能知人矣又嘗慎徽五典五典克從納于大麓烈風雷雨弗迷可謂能安民矣然及其即位之後禹臯陶方且以知人安民之道吁俞問難講明其説以告於舜者誠以知人安民有天下者之所至難也彼咻之者既多蔽之者既衆則不能無惑而為知人安民之害故禹臯陶不以舜之歴試者為已足而又須賛襄警戒使兢兢業業日謹一日然後可以始終􅈒惠而黎民懐之也故臣伏望陛下不以今日政事為已足而孜孜汲汲以安民知人為先務而不可須臾忘也夫情偽萬端邪正不一聽用之際安危治亂之所係也不廣覽兼聽而求所以知之臣未見其可也陛下深居九重所與共圖政事者執政大臣而已非執政大臣而得以職事進見者未嘗有也夫諫官御史皆陛下耳目之官曽不使一人登君之陛以論天下之事非所以明目達聰也今天下民力凋弊無古所謂九年三年之食也中稔之嵗猶有父母凍餒兄弟妻子離散而轉乎溝壑不幸加之以師旅因之以饑饉雖欲安之術已難矣其尤甚者北有黄河横流之患西有邊城戍餉之勞洮河蘭㑹嵗費無算生靈膏血將有時而盡矣此安可以不早為之計深為之慮也臣故以為安民知人正今日之首務也然知人者陛下之所自任廣覽兼聽以資之可也至於安民之道則因執政大臣進見之際垂問熟講焉無使舜禹臯陶專美於唐虞之際則臣之願也天下之幸也奉議郎國子司業翟思知南康軍思進神宗挽詩失韻故有是命思前為御史嘗論韓縝過惡議者謂縝因是以報怨蘇轍劾韓縝章云云孫升論朱服翟思章更詳之詔旬閱試諸軍令軍頭司具策開析兵員提舉教閱官及都教頭人數技藝并所得恩例以聞罷増置鑄錢監十有四十月十三日甲戍初令戸部减省増置十四監當考其名辛已大食國遣人入貢壬午以愆雪開京師寺觀侍御史劉摯言臣伏覩神宗皇帝神主既祔太廟竊計景靈宫當依祖宗神御别建廟殿伏緣宫中地歩今已隘迫若或開展民居則理有未安臣惟原廟之説始見于西漢而其制度則不傳而無聞今景靈之聚神御也固有祖於原廟之意然帝之與后各建殿室蓋緣前來神御散在諸寺故依舊各建殿室乃出於一時規畫别無義據臣愚以為既曰廟貌則禮當倣宗廟之制而帝后宜同御一殿如此則今日神宗所御無所事于興作矣奉遷昭憲皇后于宣祖殿合配而復大始殿易名而為神宗之殿非徒簡節勞費便於時而已也考之禮典則無違質之人情則為順此大事也伏望聖慈更賜可否或詔三省兩省禮官雜議有無不便詳處其當以待聖斷臣淺陋妄議合即嚴誅十一月七日神宗祔廟摯此言不得其時因修蓋神御殿先出之詔神宗皇帝神御殿用景靈宫治隆殿後棖子園修蓋劉摯又言近具狀乞罷蹇周輔及其子序辰見任各令外補候體量到事狀别聽指揮至今多日伏緣周輔等首於江湖増剏鹽額配賣害民數千里之人破産被刑咨嗟怨讟實不聊生與吳居厚王子京輩掊刻希進情理無異居厚等才行體量先次移罷獨周輔父子出入朝省如故臣以朝廷政事命令不一罪同而行遣異不足以服人心故有論列終不䝉施行臣所未喻今公論不安皆有疑議以謂周輔昨知開封府根勘軍器少監蔡碩借貸官錢公事周輔以碩乃宰相確之弟也故附合觀望滅裂不盡公理反以重罪坐舉發之人實有恩於蔡氏所以今日宰相確力主周輔父子不令罷去欺謾聖聽損公法以報私恩臣以謂若果如衆論所損不細惟望聖慈詳酌何惜罷周輔等且令外任聽候朝命庶㡬政令無二三偏黨之疑以報天下以解大臣之謗伏望速賜施行十一月十八日第一章十二月三日第二章二十二日第三章明年二月二十二日乃鐫責詔増講讀官職錢為三萬御集云侍講侍讀月各特賜錢三十千戸部言府界諸路耆長户長壯丁之役並募充等第給雇錢其舊以保正代耆長催稅甲頭代户長承帖人代壯丁並罷勘㑹諸州縣坊郭舊有坊正昨行減罷於主户兩丁以上輪充甲頭催稅租常平等錢物今合依舊雇募坊正替罷甲頭欲乞申明下府界諸路提舉司應州縣舊係坊正後來改輪甲頭並依今降朝㫖雇募坊正其舊以甲頭代坊正並罷從之甲申龍圖閣待制兼侍講趙彦若提舉萬夀觀朝奉大夫户部郎中范純禮為京西轉運副使元年四月十二日復為侍中延福宫使寧國軍留後入内都都知張茂則為内侍省都都知以太皇太后手詔昨建儲及祗奉皇帝即位有勞故也乙酉遼國賀正旦使永州觀察使蕭洽利州觀察使蕭嘉副使中散大夫守太常卿充史館修撰李炎朝議大夫守衛尉少卿趙金見太皇太后于崇政殿次見上于紫宸殿承議郎殿中侍御史黄降為國子司業蘇轍明年閠三月六日言韓縝初拜相臺官黄降言縝平生過惡不堪大用陛下業已用縝未欲即罷縝畏降復言乃除降國子司業雖云遷擢實奪其言事之權也實録不著降前官是年七月二日降猶以殿中侍御史論罷保馬司勾當官今増入元祐元年十月末二年正月十八日八月十二日可考丁亥承議郎起居舎人邢恕權發遣隨州太皇太后手詔以恕除中書舍人賜紫予以恕驟遷過當恕多出入權門全非檢謹可罷新命與外任知州軍也此據政目十二月二十七日事實録於明年正月五日乃書之恕除中書舍人在十二月十八日恕嘗敎髙公繪上書乞尊禮太妃為髙氏異日之福太皇太后呼公繪問曰汝不識字誰為汝作此書公繪不敢諱并以恕藁進既罷恕新命又絀之恕敎公繪上書據邵伯温辨誣邢恕之孫繹作其祖父言行録云欽成皇后為皇太妃自山陵回御藥吳靖方窺伺宣仁意㫖以太妃過失為獻謂隨靈駕曽發笑韓絳以故相留守西京親至境上迎迓引見皇太妃絳拜殊不為禮亦無慰勞之言公聞之朝路與宣仁猶子公繪相遇因及此公言曰太妃昔為先帝之妃今乃主上之母小人間諜漸不可長公繪瞿然遂宻奏疏以為宜加尊禮仍引書語切直過當不止如公所言宣仁覽視訝公繪太忤知公繪與公素厚前此公繪屢有宻補太母無不欣納往往以為得之於公也直遣人詰曰誰敎汝為之莫是邢某與汝做來若不實說即根治公繪迫急即吐實云入疏時邢某實不知臣自為之然邢某之意亦如此也韓縝微聞之因而媒孽無所不至劉拯縝客也乃亦入劄言公闗與政事交遊執政遂以此為名罷中書舍人以本官知隨州温公即有簡與公曰和叔此行出於意外光居政府不能為和叔别白負愧誠深蓋以中㫖有交遊執政之言恐益為和叔累故也其後明堂前一兩月温公檢公被責一宗文字欲將上辨白諸公勸之以為不若待至赦後而赦前兩日温公薨矣時吕公亦在政府與温公意合而林希素忌公其弟旦方為言官初且祝公欲為省郎未及白用希薦於韓乃為工部貟外郎遂除殿中侍御史恐公遂還朝乃於赦後未開假日入疏論公曰吕公著素與邢某厚善今來既經明堂公著必須復引邢某還朝乞未得令還自是申公避嫌不復敢言然希旦由此亦不為公論所容未㡬兄弟相繼逐去時申公方盛旦既犯申公衆論不與非特為公也繹所載如此盡多妄說姑附見劉拯元豐六年八月為監察御史八年十二月十四日已出為江東運判矣吕大防政目元豐八年二十七日邢恕知隨州以手詔恕除中書舍人予以本人驟遷過當恕多出入權門全非檢謹可罷新命與外任知州軍也按恕除中書舎人在今年十二月十八日罷新命當是十二月二十七日大防政目必審不知舊録何故於元祐元年正月五日乃書而新錄又因之恕既罷中書舎人即上書曰臣聞安危治亂之機在分邪正别白君子小人而已然而邪正交相詆君子小人交相毁此世主之所以眩惑而分别為難也臣請得而辨之其術有三焉考其平日素行無玷缺在朝廷嘗有忠言直聲事迹顯著不然必有改過遷善之實一也毁詆之言無所不可要在窮究其事實推原其情理則加誣之說不得獨行二也朝廷之上必有令聞令望之臣則公議之所在可以詢諮質其是非三也如此則邪正分君子小人之分白而邪不能害正小人不能勝君子則安而治以君子譽而進以小人毁而退今日以十人之言指以為是明日以一人之言指以為非而無三術以分别則毁譽是非淆亂邪正不分君子小人之分不白而邪得以害正小人得以勝君子則危而亂此雖堯舜之盛未嘗不加意而深察也臣竊自惟當熙寧初王安石吕惠卿用事臣時得召對先帝詢及二人者臣不敢欺具道安石之短惠卿之姦卒見非嫉坐此擯斥者八年此天下所共知非臣所敢欺也其後吕惠卿與王安石結怨互相攻訐先帝追惟愚臣疇昔之言無所欺愧記其姓名召還館閣而臣介然自守不易故意嵗在丙辰庚申先帝凡再下詔求直言而臣再以狂妄應詔未嘗敢為阿諛之辭大抵皆矯拂時政其書固在禁省可以求訪閱視也先帝雖含容不加誅然臣止在儒館不他遷者七年當彼之時臣已寂寞自守分甘終身棄置閑散豈復更冀今日之遭遇臣之處身前後十五年間粗有本末内外備知至於先帝末年頗察知臣以為忠信未寢疾之前兩月始用臣為職方貟外郎不閱月亦以司馬光為資政殿學士其日月皆可考按也㑹逢皇帝陛下繼統太皇太后躬聽斷並用忠良僉去敝蠧臣於此時首蒙㧞擢為尚書右司貟外郎職為宰相屬官與聞政事臣以為千載之一時可以忘身徇國故不復畏避形迹慨然以分别邪正興利除害為己任朝廷進見執政大臣未嘗有一毫及私計也其中不樂臣者固亦有之然以太皇太后在上每事務在公道而臣論直理是故無如之何耳今七八人者皆在左右因其同進見時當無敢為私言者故可質證也以此姦邪小人之意不自安與不得志者指臣為仇敵而見詆以此職為招權者有之矣左右司見執政論時事乃其職業然臣始謂不辭招權之名而後得以質問今日之時事果是也果非也所用人物君子也小人也使今日之時事果是所用君子則臣前假使實招權於國家乃為有補庸何傷邪且朝廷自尚書職方貟外郎除臣為右司貟外郎又除臣為起居舍人此必有譽臣者既已為起居舍人則除中書舍人在國家為擢用而於格乃為次補故事修起居注例遷知制誥無遲速之限近者或兩月逺者率不過周嵗今起居院有題名可一一覆視也即以臣為不當與胡宗愈並試則自官制之行凡三年中書舎人不必皆闕而同試者三矣曽鞏趙彦若陸佃三人同試一也王震蔡京兩人同試二也錢勰楊景略二人不試而並命三也即以貟闕論之則中書舎人定制六貟近例蔡京王震錢勰楊景略同省四人也今論事理雖如前所云然臣豈不知爵祿予奪皆在朝廷人臣之義無自以為當得之理但果一切出於太皇太后聖意則臣固宜退省以待照察今竊聞除臣與宗慰告命出而復入則臣固知本非太皇太后之意是必有毁臣者竊惟聖人之心務在開進言路故凡言事之臣其言雖未中理莫不容納此誠太皇太后盛徳美意天下幸甚然臣昔者固常請廣諫貟以謂必先審擇其人然後採用其言矣今即太皇太后親政以來所薦用臺諫官則固皆端良之士如使有言及臣則臣固當引咎自責太皇太后亦宜垂意納用其言若昔日臺中則君子之與小人固相淆雜近已沙汰安惇劉拯二人外補矣劉拯即嘗論韓維不當除資政殿大學士者韓維端諒名徳乃與司馬光吕公著一等此太皇太后之所知也必以臺官之言毀譽可信則劉拯之言太皇太后不用也今惇拯雖去但緣近制止令減去二人耳臺中如惇拯者蓋尚有一二臣固不欲指其姓名彼皆素無名行隂忌善良顧惇拯之去有不自安之意其人固非太皇太后臨制以來薦舉援用之人其人姓名蓋皆賢士大夫之所不知或知之者必指以為匪人也臣竊意今兹肆為誣欺者必出於此曹了無疑也臣既為彼所詆所議而反論其素無名行指其為匪人則疑不足以取信於世然今朝廷之上固有忠賢之人名徳顯著太皇太后可以信而不疑者試以其人姓名宻加訪問彼不指以為匪人則必曰不知其何如也不然乞下其章付臺諫議之辨其人嘗著忠節或有賢名乃出於太皇太后臨政以來方被薦舉狀内黄貼子稱即去年正月已前所舉邪正大抵未分則臣言為欺君罪當誅斥不止不敢冐進而已即如臣言則小人而誣君子邪黨而詆正士固不逃於聖鑒矣凡臣為此言固非區區一身計也直以邪正是非之際乃天下國家安危治亂之所繋故臣不敢避鼎鑊逃鈇鉞得一極陳之使其言少有補於國則臣雖誅死萬萬無恨况于進退去就之間哉不報元符初竟坐此書責知南安軍元符元年十月二十六日庚子恕責南安舊錄載恕此書云元祐元年正月上今附恕罷時己丑太常寺言來年正月朔拜表太皇太后權同處分軍國事遼國人使當赴内東門立班稱賀從之司馬光言臣伏見陛下自臨政以來夙夜孜孜以憂百姓安國家為事蓋善治疾者必究其所來攻其所急救之欲速去之欲盡臣觀今日公私耗竭逺近疲弊其原大槩出於用兵夫兵者凶器天下之毒財用之蠧聖人除暴定亂不得已而用之耳自有唐中葉藩鎮䟦扈降及五代羣雄角逐四海九州瓜分麋潰兵相吞噬生民塗炭二百餘年太祖受天明命四征弗庭光啟景祚太宗繼之克成厥勲然後大禹之迹悉為宋有於是載戢干戈與民休息或自生至死年及期頥不見兵革吏守法度民安生業雞鳴狗吠煙火相望可謂太平之極致自古所罕侔矣及神宗繼統材雄氣英以幽薊雲朔淪於契丹靈夏河西專於拓拔交阯日南制於李氏不得悉張置官吏收籍賦役比於漢唐之境猶有未全深用為耻遂慨然有征伐開拓之志於是邊鄙武夫窺伺小利敢肆大言秪知邀功不顧國患爭賈餘勇自謂衛霍不死白面書生披文按圖玩習陳迹不知合變競獻竒策自謂良平更生聚歛之臣捃拾財利剖析秋毫以供軍費專務市恩不恤殘民各陳遺利自謂研桑復出相與誤惑先帝自求榮位於是置提舉官强配青苖多收免役以聚貨泉又驅畎畆之人為保甲使捨耒耜習弓刀又置都作院調筋皮角木以多造器甲又奏置保馬使賣耕牛市駔駿而農民始愁苦矣部分諸軍無問邊州内地各置將官以領之自知州軍總管鈐轄都監監押皆不得闗預捨祖宗教閱舊制誦射法效急装機械陣圖競為新竒朝晡上塲罕得休息而士卒始怨嗟矣置市易司强市㩁取坐列販賣増商稅色件下及菜果而商賈始貧困矣又立賖貸之法誘不肖子弟破其家又令民封狀増價以買坊場致其子孫鄰保籍沒貨産不能備償又增茶鹽之額賤買貴賣强以配民食用不盡迫以威刑破産輸錢又設措置河北糴便司廣積糧穀於臨流州縣以備饋運教兵既久積財既多然後用之而承平日久人已忘戰將帥愚懦行伍驕惰加以運籌决勝者乃浮躁巧偽之士不知彼已妄動輕舉是以頓兵靈武力疲食盡自潰而歸執兵之士荷糧之夫暴骨塞外且數十萬築堡永樂怠忽無備縱冦延敵闔城之人翦為魚肉曽未足以威服敵人而中國先自困矣先帝深悔其然厭截截諞言思畨畨良士乃下哀痛之詔息兵富民奄棄天下此臣所為痛心疾首泣血追傷者也伏惟皇帝陛下肇承基緒太皇太后同聽庶政首戒邊吏毋得妄出侵掠俾内外兩安今契丹繼好秉常納貢乾徳拜章征伐開拓之議皆已息矣則前此置提舉官散青苖斂免役錢㸃教保甲置都作院養馬置將官市易司封狀買場坊増茶鹽額措置河北糴便司皆為虛設陛下幸詔臣民各言疾苦其已至千有餘章未有不言此數事者知其為天下公患衆人所共知非臣一人之私言也利害著明皎如日月各言疾苦而羣臣猶習常安故憚於更張雖頗加裁損而監司按堵將官具存保甲猶教閱保馬猶養飼邊州屯戍不減軍器造作不休茶鹽新額尚在差役舊法未復是用兵雖息而公私勞費猶未息也如此因循不知改轍數年之後萬一遇水旱大饑盗賊羣起其為國家憂患豈敢盡言哉伏願陛下斷自聖志凡王安石等所立新法果能勝於舊者則存之其餘臣民以為不如舊法之便者痛加釐革雖非一日可行之事欲乞陛下宣諭執政令因臣民上封事熟議利害進呈以聖鑒裁决而行之昔夏遵禹訓商用湯法周循文武之典蓋剏業垂統之主貽厥孫謀後世所宜謹守不可失也若凡百措置率由舊章但使政事悉如熙寧之初則民物熙熙海内太平更無餘事矣議者必曰革弊不可倉猝當徐徐有漸此何異使醫治疾而曰勿使遽愈且勿除其根原使盡也其為醫者謀則善矣其為疾者謀奚利哉侍御史劉摯言臣聞朝廷正則百官理又曰衆賢和於朝則萬物和於野今夫上之人誠能同徳一心徇公憂國則必有和善之政而下無朋比之士茍人懐異意轉相非疑則必有僻違之政而下有向背之俗於是民被其害矣臣伏見昨者皇帝陛下太皇太后陛下聽治之初惠綏天下去民之所不安至於振淹滯絀貪刻發政施命無有虚日故近自畿甸逺至於海隅莫不鼔舞承風傾耳以聽太平而近者一兩月以來政事號令之見於施行者曠然稀闊中外顒顒無所聞見深求其故皆以謂執政大臣情志不同議論不一之所由致也有隂拱以坐觀者有陽合而内睽者有強横以肆鷙者有忍耻以懐咎者滯事積前相顧而不發故仁澤屯于上而不下庶事壅于朝而不行以至文書稽留人情隔塞聖人之化雖曰久於其道而後成然固有緩急之勢今事至輕小明有此例或止於一法令之増損一官吏之廢置猶不肯倡端而主論則方今邊鄙之大利害賦役之大是非百姓之大困苦如在倒垂而望解者當誰任其責何時而議也幸遭聖明哀愍元元為廟朝大計而謀國之人方身是䘏方私是圖坐玩嵗月亦可謂不仁矣况今皇帝陛下以盛年居諒闇太皇太后陛下以垂簾而稱制於此時也而輔弼不咸相恨相激非獨政事壅積而已誠恐疑貳漸深分曹固黨使傾險之士煽於其間上下乖戾何事不生此又臣之所為深憂也伏望聖慈深察事變防微杜漸特詔輔臣當務同寅協恭相示以信去其貳志以濟國事應今來政事之稽滯未决者􅃐令條上取㫖則望聖明發自睿斷别白施行以幸天下貼黄稱如永興闕帥臣及陳州明州見闕已乆各不除人蹇周輔父子累有言事官彈奏並不施行又稱臣今所奏皆執政姦謀私意也臣非不知歴詆其狀臣迹甚危但上報任使不敢自惜然若明示臣章必恐轉相激發愈更乖戾欲望只作聖㫖宣諭催促壅滯文字所貴有所畏憚却肯了事此章候經聖覽乞留中使臣孤迹稍安則小有聞見必以自竭庶補萬一摯又言伏見自入冬以來並無雨雪亢陽為厲被災甚廣羣情嗸嗸驚憂四顧考原經典可謂大異夫人之氣與天地隂陽之氣相為出入流通而往來者也人情和於下則天道順於上人事乖於此則天變效於彼是謂天人相與之際也故聖人之事天也知其在上不逺應以類至則凡祈禳消伏以為末節小數而專修政事以應之竊以陛下委國仰成與之均休戚同榮辱者不在三省樞宻院執政之臣乎今廟堂之上大臣八人情志乖睽謀謨不一無同心同徳之節有分曹懐貳之意故議政之際排陷依違相激相閙其語往往播在中外所以政令壅格而不下文書稽滯而不行官爵濫於無名而不應於典故公道屈於貴近而獨施於踈逺私邪朋比上下隔否况當皇帝陛下淵默諒闇之日太皇太后陛下制出房闥之時朝廷政權盡在大臣而大臣不咸如此故天下但聞頗僻之事而不見和善之政政不和則人情不和人情不和則天地之氣繆沴而生此變也書曰肅時雨若五行傳以謂冬旱政令舒緩之所致也今上下可謂不肅朝廷之政可謂驕慢廢弛號令可謂二三不振矣古者災異水旱咎在爕理隂陽之官故策免三公以塞其譴今嵗已窮盡旱暵如此宿麥在野無潤澤之入春氣相乗有疫癘之變生民一嵗之大命豈可不念之哉又一月以來日𤯝無光風霾昏翳考之占驗皆非小變而上之人恬不以為怪此中外之所以恐懼而不寧伏望聖慈深省上天儆告之意俯察朝廷乖戾之變特詔大臣修飭政事凡賦斂之害人者法令之未安者大解而更張之至於决獄訟之私枉趣諸司之稽違進忠良退阿諛通雍蔽去疑貳務以至誠實事上塞天譴下救生民則和氣之應將不旋日而得之矣摯又言外議皆謂朝廷自升祔後來政事懈弛不及日前此蓋有以召之非虛言也摯又言臣曽具奏乞先次令言事官上殿未䝉施行竊聞候開年降指揮故不敢頻有申請今已嵗盡伏望早賜聖㫖先次許臺諫官上殿奏事所貴公議人情不至隔塞得以詳悉開陳上達天聽是嵗宗室子賜名授官者八人斷大辟二千六十六人
