body:
  text: 續資治通鑑長編巻一百十五宋李燾撰仁宗景祐元年秋七月己丑權停解州鹽池種鹽三年庚寅詔淮南災傷州軍為盗而非殺人者限兩月自陳除其罪少壯者刺𨽻本城若有武勇即部送京師與𨽻近上禁軍辛卯翰林學士承㫖盛度等上所定學士舍人院召試人等第以文理俱髙為第一文理俱通為第二文通理粗或文粗理通為第三分上下文理俱粗為第四分上下紕繆為第五凡七等先是考校舊規有優稍優堪稍堪平堪低次低七等而品第髙下未明至是度等約禮部式更定之壬辰胡旦妻盛氏上旦所撰續演聖論録其姪拱辰為太廟齋郎太常博士監察御史裏行髙若訥為主客貟外郎殿中侍御史裏行殿中侍御史裏行始此若訥衛州人也乙未御崇政殿召近臣觀景祐乾象新書初命同判司天監楊惟徳等以周天星宿度分及占測之術纂而為書成三十卷至是上之惟徳等皆遷官翰林學士承㫖兼端明殿學士盛度召對承明殿西廡問以邉計退而條十事上之又兼翰林侍讀學士翰林侍讀學士兼龍圖閣學士右諫議大夫范諷為給事中依前龍圖閣學士知兖州諷性倜儻好竒節不拘細行雅善李廸嘗與張士遜議事不合諷曰世謂大事未易可議小事不足為所為終何事耶為中丞力擠士遜援吕夷簡入相又合謀廢郭后欲夷簡引已置二府然夷簡憚諷終不敢薦也諷建議朝廷當差擇能臣留以代大臣之不稱職者夷簡聞而惡之權三司使半歳以疾免管勾祥源觀又徙㑹靈觀既久不得意憤激求出又在上前數毁短參知政事王隨因奏外人謂臣逐隨將取其位願先出臣臣為陛下引姦邪去而朝廷清矣及將行復謂上曰陛下朝無忠臣一旦紀綱大壊然後召臣將何益夷簡愈惡之故尋被譴黜己亥詔諸路監司案所部官吏不法者須宻切體訪毋得出榜召人首告此詔徧下諸州今在處法司有之實録所書比元詔稍異今參取修入與熈寜四年七月二十六日指揮相闗又詔州縣刑獄須證逮者速决遣之慮久繫妨農事也徙濟州鄆城縣於盤溝店樞宻使吏部侍郎檢校太傅王曙加同平章事庚子詔諸處承凖宫闈教㫖未得施行内有該合上殿處仰次日審奏取㫖不該上殿處即當日内具事由實封申中書樞宻院取㫖辛丑詔諸路提㸃刑獄朝臣使臣自今毋得互相薦論乙巳隨州言崇信軍節度使錢惟演卒特贈侍中命官䕶𦵏事惟演始以父歸國故亟顯然自以才能進文辭清麗名與楊億劉筠相上下嘗曰翰林學士備顧問司典誥於天下之書一有所不觀何以稱職故益儲文籍侔祕府又多藏古書帖名畫喜奨勵後進歐陽修尹洙皆出幕下雖官兼将相階勲品皆第一而終不歴中書故嘗謂人曰吾生平不足者惟不得於黄紙尾押字耳天下常平倉置已乆領於司農寺壬子始詔諸路轉運使與州長吏舉所部官專主常平錢粟既而淮南轉運副使吳遵路言本路丁口百五十萬而常平錢粟才四十餘萬嵗饑不足以救䘏願自經畫增為二百萬他毋得移用許之吳遵路上言乃景祐三年四月今從本志聨書之樞宻直學士杜衍亦嘗建議曰嵗有豐凶榖有貴賤計本量委散滯取嬴冝究其術若官以法平之則農人有利粟有所洩今豪姓蓄賈乗時賤收而拙業之人旋致罄竭水旱則稽伏而不出須其翔踴以牟厚利而農民貴糴九榖散於穣嵗百姓困於凶年雖勸課官家至日見亦奚益於事哉蓋常平制度不立有名而無實謂冝量州郡逺近户口衆寡時有饑熟取賤出貴嚴以賞罰課責官吏出納無壅増損有冝公糴未充則禁争糴以規利者糴畢而儲之則察其以供軍為名而假借者夫香象珠璣久藏府庫非衣食之急若州郡闕無錢願勅賣以賜之補助其乏衍傳載常平議在衍為中丞後今掇出附見衍為中丞蓋明年二月也甲寅冬官正張奎言自今朔若遇蔀首請勿避上令中書詔司天監參議而判監丁謹言請如舊制避之詔卒從奎議蓋太一者天皇之使常在北極之旁執計上下統元奉命循行八宫十九年為一章四章為一蔀凡月朔與所入蔀首支干同即主有兵事也澶州言河决横壠埽乙夘命户部副使王㳂供備庫使孫昭等視之孫昭未見先是慶州柔逺蕃部廵檢威布領兵入夏州界攻破後橋新修諸堡是月趙元昊率萬餘衆來㓂稱報仇縁邉都廵檢楊遵柔逺寨監押盧訓以騎七百戰於龍馬嶺敗績環慶路都監齊宗矩走馬承受趙徳宣寜州都監王文援之次節義烽通事蕃官言虜多伏兵不可過壕宗矩不聽伏兵發宗矩被執久之以宗矩還詔永興軍劾宗矩等敗軍状以聞八月乙未罷京東安撫使知青州禮部尚書夏竦加刑部尚書賜轉運使刑部郎中楊日嚴兵部貟外郎張存三品服以所部嵗饑而賑濟有勞也庚申遣入内供奉官周惟徳往環慶路體量邉事以趙元昊數入冦也徙知定州龍神衛四廂都指揮使永州防禦使劉平為環慶路副使部署上初擢平主四廂謂左右曰平所謂詩書之将也平在定州嘗建言臣前在陜西見元昊車服僣竊勢且叛矣冝嚴備之不聽及是又戒平曰知卿有将畧故委以邉寄卿其勉之加賜錢百萬資政殿學士户部侍郎薛奎卒始奎以病罷政上手書禁方賜之㑹小間入見即歸疾復作遂不起贈兵部尚書諡簡肅奎在政府謀議無所迎避或時不得如志歸輙嘆咤不食家人笑曰何必如是奎曰吾仰慙古人俯愧後世爾尤善知人范仲淹龎籍明鎬自為吏部選人皆以公輔許之後卒如其言歐陽修王拱辰皆其女婿也辛酉河陽三城節度使同平章事判陳州楊崇勲落平章事知夀州崇勲子閤門祗候宗説監濟州税先是内侍押班周懷信言兄懷政天禧中給事東宫最取親信姦臣謀危皇嗣心懷忠憤議除憸黨為崇勲及楊懷古誣告被誅今懷古雖死而崇勲尚居将相乞正其事以慰幽䰟故有是命懐古弟供備庫使懐志子閤門祗候永孚入内髙班永徳入内黄門永誠永遷並坐降絀知制誥李淑言太常博士直集賢院黄鑑嘗同修三朝寳訓書垂就而死請録其嗣詔以鑑子敏為郊社齋郎壬戌有星孛于張翼長七尺濶五寸十二日而没癸丑樞宻使吏部侍郎檢校太傅同平章事王曙卒贈太保中書令諡文康曙方嚴簡重有大臣體嘗言人臣患不節儉今居第多踰僣服玩奢侈僕妾無數冝有經制及貴顯故深自抑損喜學浮屠齋至蔬食泊如也子益㳟以䕃為衛尉寺丞性淡於榮利慕唐王龜為人數解官曙始參知政事治第西京既成益㳟作書陳止足之義勸曙謝事退居𨗳引服食以養夀命曙為詩答之然卒不果去益㳟終父喪遂以司門貟外郎致仕日閲古書竒畫自適間與浮屠隐者出逰洛陽名園山水無不至云甲子宰臣吕夷簡等上表請立皇后詔涇原環慶秦鳯鄜延路部署鈐轄司察縁邉堡寨都監監押廵檢有畏懦不任事者以名聞參知政事宋綬以帝富於春秋天下無事慮燕樂有漸乃上言自古守成之君皆兢兢抑畏不忘顧省何者人心逸於久安而害生於所忽故立防於事之始銷變於未萌之前若事至而應不亦殆與臣願飭勵羣司勿以承平自怠又馭下之道有三臨事尚乎守當機貴乎斷兆謀先乎宻能守則姦莫能移能斷則邪莫能惑能宻則事莫由變斯安危之所繫願陛下念之至若朝務清暇深居閒燕聲味以調六氣節宣以順四時愛養玉躬使不至傷過乃保和平無疆之福也戊辰上不豫己巳賜環慶路經戰卒緡錢庚午天平節度使檢校太師同平章事王曽為吏部尚書同平章事樞宻使南京留守推官奉符石介貽曽書曰伏聞驛騎走西洛召相公入為樞宻使社稷幸甚皇上聰明神聖英威武睿即位十有三年不好逰畋不近聲色恭儉之徳聞於天下觀去年自四月一日之後陞任賢俊黜退姦慝發號施令風行雷動可謂尸居而龍興水黙而神竦惟幾也成天下之務惟深也通天下之志惟神不怒而威不疾而速矣睿知類乎唐太宗資才髙於漢武帝是時四夷側耳震駭海内聳目鼓舞人人自以為逄堯舜家家自以為登太平正月以來聞既廢郭皇后寵幸尚美人宫庭傳言道路流布或説聖人好近女室漸有失徳自七月八月來所聞又甚或言倡優日戯上前婦人朋滛宫内飲酒無時節鐘鼓連晝夜近有人説聖體因是嘗有不豫春秋傳曰是為近女室疾如蠱非鬼非食惑以䘮志斯不得不為慮也太祖太宗真宗三聖人以天下相傳授至於陛下陛下當復傳於子傳於孫以至於億萬世也今聖嗣未立聖徳或虧血氣未定戒之在色湎滛内荒萬一成蠱惑之疾社稷何所屬乎天下安所歸乎今見變異人心憂危白氣徹霄凶災薦嵗此天地神靈所以示勸戒警悟於陛下也見災而懼猶或變禍為福若日不悛災益深而禍益長也為國家者可不為深慮相公昔作元台今冠樞宻中外更踐華夏具瞻社稷安繫於相公社稷危亦繫於相公相公久去近侍方自外來聖眷至深君心所屬當此之時即冝以此為諫諫止則已諫不止則相公請辭樞宻之任庻幾有以開悟聖聰感動上心也若執管仲不害覇之言以嗜慾間事不可極争則遂啟成亂階恐無及矣伏惟相公留意焉勿謂狂夫之言不足採聽斯乃國家計也相公或罪其狂訐賜之誅戮固所甘心既疎賤在外不得極陳一言受斧鉞於天子之前以狂訐得罪於相府亦其死所也辛未以星變大赦避正殿減常膳出内藏庫錢優賞在京將士詔輔臣延和殿閣奏事其諸司事權令輔臣處分壬申詔净妃郭氏出居於外美人尚氏為道士洞真宫楊氏别宅安置曩者母后臨朝臣僚戚屬多進女口入内今悉遣還其家長秋之位不可久虛當求徳門以正内治郭后既廢尚楊二美人益有寵每夕侍上寢上體為之癯或累日不進食中外憂懼皆歸罪二美人楊太后亟以為言上未能去入内都知閻文應早暮侍上言之不已上不勝其煩乃頷之文應即命氊車載二美人出二美人泣涕詞説云云不肯行文應搏其頰罵曰宫婢尚何言驅使登車翼日降是詔初蔡齊力争削遺誥中太后參决軍國大事之語吕夷簡嘆曰蔡中丞不知吾豈樂為此哉上方年少恐禁中事莫有主張者爾及二美人争寵恣横卒頼太后排遣之或謂夷簡意實在此然議者以為人主既壮而母后聽政自非國家令典雖或能整齊禁中而垂簾之後外戚用事亦何所不至齊之力爭不為失也逐二美人據記聞吕夷簡論蔡齊據龍川别志度支判官兵部貟外郎直集賢院謝絳為契丹生辰使内閣承制閤門祗候李守忠副之度支判官刑部貟外郎直集賢院叚少連為正旦使供奉官閤門祗候杜賛副之契丹法天太后專制其國用蕭氏兄弟分監南此蕃漢事蕭氏奴團練防禦節度觀察使者至四十人范陽無頼輩以故多占名為蕭氏奴契丹主以上尊酒銀帶賜樂工太后怒鞭樂工契丹主疑内品告太后使左右殺内品一人太后愈怒下吏雜治語連契丹主契丹主曰我貴為天子乃與囚同答状欎欎不平即與耶律憙孫謀率兵逐太后以黄布車載送慶州守聖宗冢遂殺永興宫都總管郭沁格及内侍數十族命内庫都提㸃王繼内侍都知趙安仁等監南北面蕃漢臣僚每嵗遣使賀契丹主生辰正旦并及其母於是罷之聖宗乃隆緒廟號王向子直嘗以契丹降人田瑋所言書敵事載契丹徙其母於博蕩沙中恐即此也然考按多不合今不取甲戌司天言孛星不見降六宅使從演為六宅副使東八作副使從湜為内殿承制仍絶朝謁母莒國夫人何氏坐不能導訓自今毋得入内右侍禁尚繼斌左班殿直尚繼恩繼能並除名從演嘗以婢遺尚美人從湜受美人所寄金又為訪求其父繼斌故皆責之丙子編管繼斌於鄧州繼恩湖州繼能滁州從演從湜皆徳芳孫也踰年乃復從演從湜官仍許朝謁廢信州寳信縣為鎮壬午降皇城使英州刺史王懐節為左驍騎将軍坐其弟懐徳婦持貨私遺尚美人求管軍上以其父繼忠嘗䧟契丹不欲重貶之殿中侍御史龎籍言故駙馬都尉吳元扆從子東頭供奉官守則近與尚繼斌結婚前權三司使范諷遺以金鞍勒守則監左藏庫諷為矯奏羡餘改一官請付臺鞫其事宰相李廸雅善諷寢不報乙酉籍與左司監滕宗諒並坐言宫禁事不實改祠部貟外郎出籍為廣東轉運使宗諒知信州宗諒嘗以上體多疾奏疏諫内寵其略曰陛下日居深宫流連荒宴臨朝則多羸形倦色决事如不掛聖懐語太切直故出宗諒疏據記聞始上不豫侍醫數進藥不效人心憂恐魏國大長公主薦翰林醫學許希診曰鍼心下包絡之間可亟愈左右争言不可諸黄門請身試之無所害遂以鍼進上疾愈九月戊子授希翰林醫官仍賜緋衣銀魚及噐幣希拜謝已又西嚮拜帝問其故對曰扁鵲臣師也今者非臣之功殆臣師之賜敢忘所師乎乃請以所得金創扁鵲廟為築廟於城西隅封神應侯其後廟益完學醫者歸趨之因立太醫局於其旁希開封人也己丑羣臣上表請御正殿復常膳表三上乃從之辛夘樞宻院言陜西縁邉戍兵多為大將選置麾下及偏禆臨陣鮮得精鋭自隨請自今以全軍𨽻逐将毋得擅有占留從之壬辰羣臣上表請䨇日不視朝從之仍詔中書樞宻院䨇日有合奏事亦許便殿請對十二月末孫沔云云癸巳詔毎嵗十月遣宗室正刺史以上一貟朝拜諸陵先是孟冬拜陵止令内司賔往滄州觀察使守節言非所以致䖍恭也請以身先之詔從其請丁酉帝康復御正殿復常膳降司農少卿王貽慶在京監當初貽慶子渙知鉅野縣坐納賂貶汝州長史貽慶姪女為宗室從湜婦貽慶嘗私使請於禁中下開封府劾其罪既責貽慶徙渙虢州范仲淹知睦州不半嵗徙蘓州州比大水民田不得耕仲淹疏五河導太湖注之海募㳺手興作未就又徙明州轉運使言仲淹治水有緒願留以畢其役庚子詔仲淹復知蘓州免天下第九等户攴移折變辛丑免舒州懐寜縣民輸折役茶從范仲淹安撫淮南時所請也太子少傅晁逈既與太清樓宴後復召對延和殿閤問洪範雨暘之應逈據經以對帝出逈甞所上神僊可學致篇面令剖析既而獻斧扆恤刑箴大順審刑無盡燈頌凡五篇忽感疾絶人事屏醫藥具冠服而卒年八十四詔罷一日朝贈太子太保諡文元逈樂易純固服道履正雖貴勢無所屈嘗言歴官臨事未嘗挾情以害物危人以自進生平修身謹行如免膚髪之傷真宗數稱逈長者楊億謂逈所作書命無過褒得代言之體喜質正經史疑義摽括字類無一日廢學不喜術數有以命術語之者逈曰自然之分天命也樂天不憂知命也推理安常委命也何必逆計未然乎江休復雜志云逈不信天書本傳無所見今附此尚楊二美人之出宫也帝令參知政事宋綬面作詔云當求徳門以正内治既而左右引夀州茶商陳氏女入宫綬諫曰陛下乃欲以賤者正位中宫不亦與前日詔語戾乎後數日樞宻使王曽入對又奏引納陳氏為不可上曰宋綬亦如此言宰相吕夷簡樞宻副使蔡齊相繼論諫兼侍御史知雜事楊偕同知諫院郭勸復上疏卒罷陳氏或曰陳氏父號陳子城者始因楊太后納女宫中太后嘗許以為后矣至掖庭將進御勾當御藥院閻士良聞之遽見上上方披百葉圖擇日士良曰臣聞陛下欲納陳氏女為后信否上曰然士良曰陛下知子城使何官上曰不知也士良曰子城使大臣家奴僕官名也陛下若納奴僕之女為后豈不媿公卿大夫耶上遽命出之士良文應子也此據司馬光記聞甲辰詔立皇后曺氏贈尚書令冀王彬之孫女也郭后廢始聘后入宫乙巳命宰相李迪為册禮使參知政事王隨副之宋綬撰册文并書册寳有司奏用冬至日行册禮監察御史裏行㑹稽孫沔言章獻三年之䘮未除請終制而後行祕書丞曲江余靖亦為言不報王巖叟元祐繫年録云吕相白太后曰亦聞仁皇罷陳子城親事否太母曰仁皇聖明御藥閻安説得子細其父士良當時正親近一日仁皇曰你何不賀我士良曰賀甚事曰賀我尋得皇后士良曰誰家曰陳子城家士良曰子城官職乃奴𨽻也冨民用錢買到仁皇遽曰幾乎錯了明日以語吕夷簡夷簡賀聖明人言吕夷簡先言非也却是仁皇説與聖明如此余曰願陛下體此意吕相亦云然太母又問日當時因甚去明肅服内納后大臣怎肯神宗曽問不知何故如此便及臣庻家也不肯吕相等皆不知所對樞宻先下余語師朴曰適來事先令公嘗説及今上再欲奏既復對師朴奏適來聖問明肅服内納后事先臣却曽説與王巖叟余曰臣嘗聞韓𤦺説此事當吕夷簡作宰相范仲淹作諌官仲淹語琦曰吕相又勸上做一件不是當底事也須共理㑹仲淹往見夷簡面責夷簡曰固知非禮司諌却不知裏面事上春秋盛妃嬪已雜進不早立后無以制非所以愛上仲淹無以折復見韓𤦺曰吕相幸自不是被他有説後没可奈何太母笑曰元來却是恁地師朴又曰應是恐妃嬪中進起來作后太母曰那門識甚君臣識甚事體余曰須立后則事體自然正按立曹后時范仲淹已責在睦州詰吕夷簡者必非仲淹也巖叟誤記賜西京嵩山草澤李退夫清逸處士退夫居嵩山辟榖守道本京上聞故賜之後以事追奪丁未樞宻副使李諮言天聖初行新定茶法而議者沮毁之吏人王舉等皆坐黥配今三司言嵗課益虧請復用天聖初定法舉等顯為非辜乞與優叙之詔舉等先依三司出職例各遷一資諮頃在三司陜西縁邉數言軍食不給度支都内錢不足支月俸太后憂之命輔臣與諮經度其事諮以謂舊法商人入粟邉郡算茶與犀象緡錢為虚實三估至用十四錢易官錢百坐困三司乃請變法以實錢入粟實錢售茶二者不得相為輕重既行而商人果失利怨謗蜂起諮尋以病請外相繼坐變法譴絀踰六年乃再入三司遂登西府時三司説法蠧耗日甚議者皆言諮前枉被譴絀将復用見錢法故諮先有是請戊申詔入内内侍省以所估尚氏等值金帛二十餘萬貫賜三司給軍費壬子詔名皇太后所居殿曰保慶宫自今並以保慶皇太后為稱癸丑除宿州無户食鹽錢冬十月庚申罷淮南江浙荆湖制置發運使仍詔淮南轉運使兼領發運使司事其制置茶鹽礬税各歸逐路轉運司此必有獻議者當考蔣堂亦其一人也見明年十月辛酉詔䖍州留上供米三萬斛减價出糶以賑貧民改崇信節度使贈侍中錢惟演諡曰思先是太常博士祕閣校理同知禮院張瓌議曰惟演歴清華升宥宻博學業文此其所優也自母后助治逮主上躬政而附援求益迎合輕議為執法所紏左降偏郡夫位兼将相不為不達矣任易中外不為不用矣冝引滿覆之誡而貪慕權要釁生不足此其所劣也前史稱沈約昧於榮利有志台司元稹大為賂遺經營相位惟演之謂矣諡法敏而好學曰文貪而敗官曰墨請諡文墨其家訴於朝詔判太常禮院章得象等覆議以惟演無貪黷状而晚節率職自新有惶懼可憐之意取諡法追悔前過改諡曰思詔可仍詔自今定諡須禮院集官衆議之初大名府言自河决横壠而徳博以來皆罹水患請早行修塞即詔王㳂等相視㳂等以為河勢奔注未定且功大未可遽興癸亥復遣侍御史知雜事楊偕入内押班王惟忠閤門祇候康徳輿同往視度既而偕等言欲且興築兩岸馬頭令縁堤預積芻藁俟來年秋乃大發丁夫修塞從之新廣東轉運使龎籍言昨為御史奏彈吳守則范諷交通尚繼斌事諷既出守兖州乃紿言家貧假翰林銀噐數千兩自隨而増産扵齊州市官田虧平估請併行按劾詔諷以所假銀噐還官乙丑詔閤門祇候自今須尚書貟外郎諸司使以上及本路轉運使或提㸃刑獄一貟共七人舉之方許引對丁卯詔中書提㸃五房公事及堂後官自今以八貟為定制仍參擇選人為之趙元昊自襲封即為反計多招納亡命峻誅殺以兵法部勒諸羗始衣白窄衫氊冠紅裏項冠後垂紅結綬自號威眀烏珠凡六日九日則見官屬其偽官分文武或靴笏幞頭或冠金帖鏤冠緋衣金塗銀黒束帶佩蹀躞穿靴或金帖紙冠間起雲銀帖紙冠餘皆禿髪耳重環紫旋襕六垂束帶佩觧結錐短刀弓矢韣乗鯢皮鞍垂紅纓打跨鈸拂民庻衣青緑用此以别貴賤元昊初制禿髪令先自禿髪及令國人皆禿髪三日不從令許衆殺之每欲舉兵必率酋豪與獵有獲則下馬環坐飲割鮮而食各問所見擇取其長是嵗春始冦西邉殺掠居人下詔約束之居國中益僣竊私改元曰開運既逾月人告以石晋敗亡年號也乃更廣運黙穆氏族人尚實謀殺元昊事覺元昊酖其母殺之沈尚實之族於河遣使來告哀詔起復鎮軍大将軍左金吾衛上將軍員外置同正員以内殿崇班閤門祇候王中庸為致祭使兵部員外郎兼起居舍人郭勸為弔贈兼起復官告使元昊賂遺勸等百萬勸悉拒不受既而元昊復立額蔵渠懐氏為威尼威尼者太后也己巳頒諸州軍土牛經前詔日官取舊文删校重複為四篇知制誥丁度撰序刋印其牛色及策人衣並以嵗日支干納音相配云癸酉以浄妃玉京冲妙僊師清悟為金庭教主冲静元師美人楊氏聽入道賜名宗妙並居安和院仍改賜院名曰瑶華宫詔天下獄有重繫獄官不得輙預㳺宴送迎乙亥詔諸路募民掘蝗子一升給二十錢丁丑命有司還先所籍没周懐政家財産辛巳賜舒州學田五頃壬午命龍圖待制燕肅集賢校理李照直史館宋祁同按試王朴律凖肅時判太常寺建言舊太常鐘磬皆設色毎三嵗親祠則重餙之嵗既久所塗積厚聲益不協故有是命帝親閲視律凖題其背以屬太常肅等即取鐘磬剗滌考擊用律凖按試其聲皆合癸未户部貟外郎兼侍御史知雜事楊偕為契丹生辰使謝絳以父疾辭也甲申以選納皇后賜在京諸軍班特支乙酉詔太常禮院祭皇地祗神州地祗舊皆常參官攝事非所以尊神也自今命大兩省以上官奉祀之丙戌慶州縁邉都廵檢使西頭供奉官閤門祇候楊遵寜州都監左侍禁閤門祇候王文並落職走馬承受右侍禁趙徳宣柔逺寨監押右侍禁盧訓並降左班殿直為諸州監押又降環慶路副都部署馬軍都虞候端州防禦使張守遵汀州防禦使陜州部署落管軍環慶路鈐轄西作坊使李惟熈為西染院使知隰州前環慶都監内殿承制閤門祇候齊宗矩奪兩官廬州編管治龍馬嶺及節義烽敗兵之罪也守遵惟熈坐不能料敵故并責之張守遵李惟熈權度支判官李申言廣南蕃舶多毁錢以鑄銅器請自今陳告者皆倍給賞錢公人遷一資從之十一月己丑册皇后乙未進封乳母髙陽郡夫人為崇國夫人甲辰徙涇原路部署兼知渭州解州團練使張敏知冀州轉運使言敏為治無善状惜隨軍錢不以犒士故徙之詔京舊城内侵街民舍在表柱外者皆毁撤之遣入内押班岑守素與開封府一員專其事權知開封府王博文之請也増置泰州通判一貟戊申贈皇后二代祖彬進封魯王父玘為太傅兼侍中己酉詔親祠郊廟乃用御所制樂章其有司攝事樂章令宰臣吕夷簡李廸分撰之御所制樂章具明年六月除滁州舒城縣贍軍茶嵗七千三百五十斤蓋沿江南偽主時課民所輸范仲淹使淮南請除之庚戌封皇后祖母唐氏為延安郡太夫人辛亥詔太常寺自今享先農釋奠文宣王武成王並用登歌樂令學士院撰樂章詔西京留守司與河南府事如藩鎮節度觀察兩使例通領之南平王李徳政遣静海節度判官陳應機掌書記王惟慶來獻方物馴象二詔以應機為太子中允惟慶為大理寺丞並賜三品服東上閤門使榮州刺史曹琮為衛州團練使琮女兄為后禮皆琮主辦於是奏曰陛下方以至公厲天下臣既備后族不宜冐恩澤亂朝廷法族人敢因縁請托願寘於理時論稱之尋出為環慶路部署知邠州十二月己未歩軍都虞候康州防禦使涇原路副都部署曺儀為耀州觀察使落管軍皇后既立儀自乞罷軍職從之丁卯幸開寳寺上清宫祥源㑹靈觀祈雪屯田員外郎張亢者奎弟也豪邁有竒節嘗通判鎮戎軍上言趙徳明死其子元昊喜誅殺勢必難制冝亟防邉論西北攻守之計章十上上欲用之㑹丁母憂或傳契丹聚兵幽􅃰間河北皆警癸酉命亢為如京使知安肅軍因入對曰敵嵗享金帛甚厚今其主孱而嵗歉懼中國見伐特張言耳非其實也萬有一倍約臣請擐甲為諸軍先知安肅軍據本𫝊實録無此當考或恐此時但換官未知安肅軍也然四年十二月亢知安肅軍移知瀛州則知安肅軍亦必在此時也朝廷欲大發軍為邉備輔臣迭議上前參知政事蔡齊畫三策料契丹必不渝盟已而果契丹祭天幽州以兵屯境上爾己巳知制誥李淑言幕職州縣官舉充京朝官者别差官與判銓官同試判望自今更不逐次奏請差官只委自判銓官考定優劣如詞翰稍優或刑名全否者即令貼黄進呈詔吏部銓詳定以聞後請如淑議從之癸酉雪賜近臣宴於中書趙元昊獻馬五十匹以求佛經一藏詔特賜之實録於此既書賜經明年十二月又書獻馬求經特賜之當是一事誤重出爾今止見於此丁丑陞鄭州為節鎮賜軍額曰奉寜以大兩省官知州省解州鹽池都廵檢内臣一員戊寅幸開寳寺上清宫祥源㑹靈觀謝雪己夘宣慶使忠州防禦使入内都知藍繼宗為景福殿使邕州觀察使罷都知以老疾自請也繼宗事四朝謙謹自持毎領職未久輙請罷家有園池退朝即亟歸同列或留之繼宗曰我欲歸種花弄逰魚為樂耳景福殿置使自大中祥符五年至今授者才三人劉承珪韓守英及繼宗也辛巳契丹遣左千牛衛上将軍耶律師古東上閤門使劉五常來賀正旦癸未以天雄軍部署萊州團練使邵復為都大修河部署供備庫副使王遇為澶州部署右侍禁閤門祇候王昭序為滄州部署並兼修河事三門白波𤼵運使文洎言諸埽須薪芻竹索嵗給有常數費以鉅萬計積久多致腐爛乞委官檢覈實數仍視諸埽𦂳慢移撥并斫近岸榆栁添給免采買搬載之勞因陳五利詔三司詳所奏遂施行之洎介休人也此據本志附見仍取㑹要増修㑹要乃十月事也監察御史裏行孫沔言臣聞主聖臣忠朝有直言之士下情上達外揚進善之旌前王思廣於聰明庻政莫能於壅塞尚慮諫臣顧禄竊位懷安故於觀闕之前專設匭函之制言之無罪誠不間於卑㣲來者可追庻獲聞於讜議時加激賞猶避深譏或致嚴科實為止善今竊見上封事人同安縣尉李安世輙因狂悖妄進瞽言不識朝廷之儀惟摭市井之事毁欺日月干犯雷霆死有餘辜身不容責兼聞下吏審問支辭致詰飛聲推窮敗類然極索姦之理或傷招諫之仁雖曰狂愚猶勝謟佞况自道輔仲淹被黜之後龎籍范諷置對已來凡在縉紳盡思緘黙又慮千里之外四方之人不知安世訕上犯顔将謂安世獻忠獲罪豈有至聖猶忌危言自逺流傳為議非美覆巢之卵其類惡傷彈雀以珠所惜者大伏望俯廽造化貸以寛恩特免竄投以勵全節使彼偷安之士永懷内愧之心况臣與其人素匪交親未甞識面縱干大典絶不相因惟恐史官直書於簡牘可嗟言路重誤於難危伏乞少霽天威用存國體後七日景祐二年正月六日責知潭州衡山縣沔集自注此疏以十二月二十九日上正月初六日責衡山沔未知有責命復上書曰沔集自注云正月三日上書七日復責陛下基紹寳圖務敦淵静韜曖英謀竭伸孝愛而内闈輔政朝制弗經宦寺弄權海宇側目女謁交馳大通行賂陛下山藏無違日覆不照洎章獻上僊萬機獨斷躬親大政勵精為理投羣閹之巨黨罷内降之私恩陞擢諫臣黜退竊位毎旦聽政舊邦惟新庭宇載清幅貟忻戴將以執之若金石行之若軏輗希陶唐之風襲文景之跡為一代之宏規冠千篇之良史豈不大哉比及周嵗頗異曩時内寵豔興中宫傾易楊尚恃恩權勢特盛事由請行言自詖出君子小人腹誹竊議幸頼陛下神明義斷廢黜外宫雖合正家之道未遑刑國之冝功業弗彰簡編安在累嵗已來和氣猶欎水旱相薦蟲螟屢生粟麥不登田疇幾廢九夏多寒三冬無雪星變上天河决東郡疾疫流離生靈困􅉵民乏兼日之食廪無卒嵗之儲既庻而富曷其若是正當不足之時豈曰無為之化陛下不可謂時無兵革乃號太平政奉簡書便為端拱竊恐禍生所忽亡有其存漸至陵夷將無逸豫有唐天寳可謂覆車前春伏見詔書布下每旦親政故天下之民謂吾君憂勤率仁之化翹足可待去秋以聖體愆和臣心啟沃愛君有從冝之制䨇日伸不坐之請交泰之誠遽臻有喜宴安之戒豈可為常且一月之中適减其半慶辰嘉節休沐受釐三分之日復廢其一是則一嵗之中率無百餘日視事宰臣上殿奏事止於數刻天下萬務得不曠哉漢帝五日一朝則有伏蒲入閤據厠與語唐制三日一坐則有便殿更畨浴堂延對今退朝之後深宫之中侍左右者刀鋸虧殘之餘悦耳目者綺紈艶冶之色扄鑰九重呌閽千仭宸禁森嚴乗輿大逺固未見欵召名臣請問外事詢祖宗之紀綱質朝廷之得失徒修簡易之名未益承平之化臣恐其未可也况今之政失於寛而蔽於姑息今之士弛於務而幸於因循是養其惰也夫天下之本在民民之豪者皆兼并而貧者無置錐天下之大在兵兵之下者負饑寒而驕者不敢役郡守縣令臧否無别冗食萬千蠧耗靡窮邪佞退而復興忠諫黜而未用此害之大者也設欲止之於未發救之於将然莫若振綱舉目杜漸防㣲勤儉為先剛斷為急權之一去安可再得豈冝崇尚寛大自從清宴若謂怡神養性之方且非耄期倦勤之際臣復以為不然也今陛下春秋鼎盛氣志如神釋習常之蔽加致知之心觀禹湯克己之規敷文武勤教之㫖振三祖之基為百世之法則垂鴻自我豈不盛歟願因嵗首正朝之始霈然下令誕告多方毎旦恭已辨色居位推擇大臣講求古道降以温顔俾之極論精思品藻督責賢否外則逐刺史縣令無状老懦貪殘之軰以利於民内則罷公卿大夫不才謟佞詭誕之士以肅於朝掖廷之中簡去幽曠以求鍚羡之慶宦寺之内抑損重任以防昵近之私發號施令必審其有害賞功罰罪必思其未平則可使教敦于上民悦於下足以招天地之協氣致國家之豐隆皆目前可見之事惟陛下力行而已書奏再責監永州酒正月七日責監酒今並書於此實録殊不載沔再責事可謂疎畧此據沔家集及畢仲㳺神道碑是嵗天下上户部主户六百六萬七千五百八十三口二千一十二萬三千八百一十四客户四百二十二萬八千九百八十二口六百八萬一千六百二十七
