body:
  text: 續資治通鑑長編巻一百八十一宋李燾撰仁宗至和二年九月丙辰朔詔為契丹主輟視朝七日禁在京河北河東縁邊音樂七日仍擇日成服舉哀令禮院詳定以聞丁巳左武衛大將軍克悚為右千牛衛大將軍以克悚求試學士院而命之皇祐五年六月詔臣僚進家集自今量與支賜更不推恩詔河北天下根本而官吏多非其人懼緩急敗事四路安撫司其體訪知州及主兵官之才否具以名聞戊午契丹遣右宣徽使忠順節度使左金吾衛上將軍耶律元亨來告哀上為成服于内東門幄殿宰臣率百官詣東横門進名奉慰辛酉右衛大將軍郢州防禦使宗顔卒贈昭信節度使遂國公諡昭裕特給鹵仗殯之以其母甞乳上故也癸亥詔學士舍人院自今召試未有科名人復試三題丁夘詔自商胡之決大河注金隄寖為河北患其故道又以河北京東嵗飢未能興役今勾當河渠司事李仲昌欲約水入六塔河使歸横隴舊河以舒一時之急其令兩制以上臺諫官與河渠司同詳定開故道修六塔利害以聞戊辰詔提舉醫官院自今試醫官並問所出病源令引醫經本草藥之州土主療及性味畏惡修製次第君臣佐使輕重竒偶條對之每試十道以六通為合格丙子歐陽修言伏見學士院集議修河未有定論豈由賈昌朝欲復故道李仲昌請開六塔互執一說莫知孰是臣愚皆謂不然言故道者未詳利害之原述六塔者近乎欺罔之謬今謂故道可復者但見河北水患而欲還之京東然不思天禧以來河水屢决之因所以未知故道有不可復之勢臣故謂未詳利害之原也若言六塔之利者則不待攻而自破矣且開六塔者說云減得大河水勢今六塔既已開而恩冀之患何為尚告奔騰之急此則減水未見其利也又開六塔者云可以全回大河使復横隴故道今六塔止是别河下流已為濵棣德博之患若全回大河顧其害如何臣故謂近乎欺罔之謬也且河本泥沙無不淤之理淤澱之勢常先下流下流淤髙水行漸壅乃决上流之低處此勢之常也然避髙就下水之本性故河流已棄之道自古難復臣不敢廣述河原且以今所復之故道言天禧以來屢决之因初天禧中河出京東水行于今所謂故道者水既淤澁乃决天臺埽尋塞而復故道未幾又决於滑州南鐡狗廟今所謂龍門埽者其後數年又塞而復故道已而又決王楚埽所決差小與故道分流然而故道之水終以壅淤故又於横隴大決是則決河非不能力塞故道非不能力復所復不乆終必決於上流者由故道淤髙而水不能行故也及横隴既決水流就下所以十餘年間河未為患至慶歴三四年横隴之水又自海口先淤凡一百四十餘里其後㳺金赤三河相次又淤下流下流既梗乃決於上流之商胡口然則京東横隴兩河故道皆下流淤塞河水已棄之髙地京東故道屢復屢決理不可復不待言而易知也昨議者度京東故道工料止云銅城已上地髙不知大抵東去皆髙而銅城已上乃特髙爾其東北銅城已上則稍低比商胡以上則實髙也若云銅城以東地勢斗下則當日水流宜決銅城以上何縁而頓淤横隴之口亦何縁而大決也然則兩河故道既皆不可為則河北水患何為而去臣聞智者之於事有所不能必則較其利害之輕重擇其害少而為之猶愈害多利少何况有害而無利此三者可較而擇也又商胡初決之時議欲修塞計用梢芟一千八百萬科配六路一百餘州軍今欲塞者乃往年之商胡則必用往年之物數至於開鑿故道張奎所計工費甚大其後李參减損猶用三十萬人然以五十歩之狹容大河之水此可笑者又欲増一夫所開三尺之方倍為六尺且闊厚三尺而長六尺是一倍之功在於人力已為勞苦若云六尺之方以開方法算之乃八倍之功此豈人力之所勝是則前功既大而難興後功雖小而不實大抵塞商胡開故道凡二大役皆困國勞人所舉如此而欲開難復屢決已驗之故道使其虚費而商胡不可塞故道不可復此所謂有害而無利者也就使幸而暫塞以紓目前之患而終於上流必决如龍門横隴之比此所謂利少而害多也若六塔者於大河有减水之名而無减患之實今下流所散為患已多若全回大河以注之則濵棣徳博河北所仰之州不勝其患而又淤澁上流必有他決之虞此直有害而無利爾是皆智者之所不為也今若因水所在增治隄防䟽其下流浚以入海則可以無決溢散漫之虞今河所歴數州之地誠為患矣隄防嵗用之夫誠為勞矣與其虚費天下之財虛舉大衆之役而不能成功終不免為數州之患勞嵗用之夫則此所謂害少者乃智者所宜擇也大約今河之勢負三決之虞復故道上流必決開六塔上流亦決河之下流若不浚使入海則上流亦決臣請選知水利之臣就其下流求入海之路而浚之不然下流梗澁則終虞上決為患無涯臣非知水者但以今事可驗者較之爾願下臣議裁取其當焉蘇轍作修神道碑云河決商胡賈昌朝留守北京欲開横隴故道回河使東有李仲昌者欲道商胡入六塔河詔兩府臺諫集議陳執中當國主横隴議執中罷去而宰相復以仲昌之言為然宰相蓋指富弼也今附此丁丑詔審官院京朝官曽犯贓私罪若公坐至徒者毋得差監在京倉塲庫務辛巳龍圖閣直學士右諫議大夫李柬之言古者建官設爵所以待賢才濟萬務非以車服祿廪供人之欲給人之求而已古者上自公卿大夫下及抱關擊柝皆有定員故官無茍得人無他覬漢儒謂爵祿者皆天下之砥石聖王所以礪世磨鈍又曰爵祿者人主之操柄葢聖王制世御俗其於爵祿也謹重之如此國家四聖接統治安百年聲明文物比隆三代其如吏員雜冗上下繁名若不澄其源復加數年則益難淘汰今選舉之路未精補䕃之門太廣恩倖之路未塞因縁之弊未除唐制明經進士及第每嵗不得過五十人今三四年間放四五百人校年累舉不責詞藝謂之恩澤者又四五百人因陜西用兵保恩二州卒叛廣南儂賊冦掠而逐路舉人悉加録用荒唐淺陋被恩命者不可勝數諸科雖專記誦責其義理一所不知加之生長畎畝不習政術臨民治衆能曉事者十無一二嵗亦放五百餘人此所謂選舉之路未精也西漢吏二千石以上視事滿三嵗得任一子為郎王吉尚謂今使俗吏得任子弟率多驕矜不通古今今文武官三司副使知雜御史少監刺史閤門使以上嵗任一子帯職員外郎諸司副使以上三嵗得任一子文武兩班可任子者比之祖宗朝多逾數倍遂使綺紈子弟充塞仕途遭逢子孫皆在仕宦稚兒外姻並霑簮笏之榮而又三丞已上致仕者任一子况七十致仕古之常制少登仕宦晚至三丞恩惠未見及民功業未聞及國至其退罷更令任子退一老者進一孺子甚非國家優賢取士之道也此所謂任子之恩太廣也漢宣帝躬親庶務王吉上疏謂外家及故人可厚以財不宜居位蓋以位者待材用之宅不可以恩私得也位無髙下皆當愛惜外家故人尚當若此况嬪嬙近列宗室之外親乎嬪嬙之侍宗室之妻有邑視品者皆得奏弟姪又皇親納壻皆得白身受官行賂求婚多得市井浮薄之人以汙宗室以至内臣之家因縁事任奏授甚多此所謂因循之弊未除也入仕之門雜補進之路多士大夫皆以為患而言者不為少事未宣行而物論交興者何也蓋僥倖厚者未嘗裁損恩澤薄者先議减除如向來孔道輔等止欲釐革百司吏人故也往年减省補䕃近臣之家靳惜厚恩務全已欲但於服屬䟽者舉數事而已使天下議論多不厭伏者率由措事之未公也大凡立法自貴者始則人無怨心請先自嬪御宗室及兩府大臣以至帶職員外郎諸司副使以上及内臣之家一切裁减之十年當見成效尚循舊貫不圖改為而欲望起治道清仕途不可得已於是中書先請自二府宣徽節度使遇南郊仍舊奏二人而罷每嵗乾元節任子餘詔兩制臺諫官定議以聞壬午三司言諸州軍回易解鹽為公用頗侵商人請行禁止從之本志范祥鹽數可考皇祐五年四月甲申翰林學士承㫖孫抃等言奉詔定黄河利害其開故道誠為經乆之利然功大不能猝就其六塔河如相度容得大河使𨗳而東去可以紓恩冀金隄患即乞許之議開故道者賈昌朝也陳執中主其議執中既罷文彦博富弼乃主李仲昌議欲修六塔故抃等答詔如此殿中侍御史趙抃言臣伏見近年朝廷非次除節度使宣徽使頗為煩數竊以二者使額在唐季則付與容易屬聖朝即授受艱難職任絶優事權實重臣僚設非勲舊名器安可輕假謂宜謹重賞格得以關防倖門須有定規庶禆至治臣愚欲乞指揮今後宣徽并節度使内文臣須是曾歴中書樞宻院任用加之徳望為人推服武臣曾經邉鄙建立功業者方許除拜兼宣徽使元額只是兩員至如使相之任體貌尤重更當謹惜豈宜輕議嘗聞太祖皇帝朝命曹彬收復江南功成凱還雖賜與則多終不授彬使相臣以謂此等官職平時無故等閒除授臣僚亦以等閒得之不以為貴四方向去萬一有緩急事宜必有賢智豪偉之人為陛下制變禦武立功立事當此之際朝廷行爵賞恩賚之議則以何官職處之乆逺之制須今日思之重之惜之不可不謹也伏望陛下特賜聖㫖以臣所請付兩府議定執中施行上以遵祖宗之法下以重爵位之賞則中外幸甚詔中書樞宻院自今有如此除授或未允當即檢詳執奏據㑹要在元年十二月今從趙抃奏藁附二年九月二十八日十月乙酉朔詔江南西路新置教閲忠節子弟指揮其令轉運司選習知軍陣使臣一員往逐處訓練之丙戌録唐長孫無忌裔孫宏為永興軍助教宏上其家譜及唐朝告敕故也殿中侍御史趙抃言京東路青鄆二州各帶安撫使近年差兩制前兩府臣僚以鎮撫之今曹佾知青州李端懿知鄆州御史言其不便乞檢㑹改差有才謀經任使兩制已上臣僚詔劄示佾端懿至和元年六月佾自澶徙青嘉祐元年八月自青徙許三年六月端懿除鄆州嘉祐五年二月自鄆徙澶己丑罷京畿轉運使及提㸃刑獄其陳許鄭曹滑各𨽻本路為輔郡如故初從賈昌朝議置五輔郡屬畿内號為拱輔京師而論者謂宦官謀廣親事親從兵欲取京畿財賦贍之因以收事柄御史范師道力奏非便遂復舊制乙未出内藏庫錢一百萬下河北市糴軍儲丙申主客員外郎吴中復為殿中侍御史裏行此蓋從趙抃之言臺官有闕牽復也戊戌監修南京鴻慶宫内臣請於本宫隙地建皇帝本命殿上曰建宫觀所以為民祈福豈可勞民自為耶其遇本命道塲日止令設版位祠之己亥開封府判官殿中侍御史俞希孟為言事御史御史中丞張昪等言伏聞再除俞希孟充言事御史竊縁希孟早自入臺以來論事私邪動多迎合今略舉一二事衆所共聞者以言之前年中以國朝故事内臣不得遷至刺史已上官資王守忠意望節旄知物議未允既為前後省都知又欲請節度使俸給漸開其端以圖節鉞是時諫官韓絳力言不可家居待罪欲望朝廷聽從希孟不顧國家紀綱不思朝廷大體輒敢上言稱恩命已行只乞後人不得為例忘祖宗之乆制取宦者之歡心又中書劄子下御史臺同刑法寺衆定百官行馬失序事同時聚議皆云臣子起居辭見對君父失儀尚䝉矜恕不作遺闕豈為偶近兩府行馬趨朝既已贖銅又作過犯希孟承望大臣風㫖不顧君臣輕重之分不肯回署奏状而乃獨入文字乞理為過犯此皆憸邪迹状明白兼後來因全臺上殿奏事陛下親發徳音靣責希孟不踰兩月自言事臺官除為開封府判官中外喜快咸謂朝廷公明忠邪判别今却自府判除充言事臺官士人相顧失望特謂朝廷故用此私邪之人况本人資性已定不改前非隂巧蔽欺熒惑朝廷所損不細國家置御史臺葢欲執法司直肅正天下必得端亮公正之士同心協力維持綱紀以重朝廷又陛下精擇輔相以求至治必在澄清中外動協衆心豈宜風憲之司雜用姦邪之輩又言事御史舊雖二員自來多是止除一員或亦全闕今來毋湜雖入諫院見有馬遵一員未至闕事伏乞别與希孟一差遣希孟議行馬事在皇祐五年六月壬寅改希孟為祠部員外郎荆湖南路轉運使癸夘侍御史梁蒨言近制兩府大臣遇假休日方許一見賔客非所以廣朝廷聰明也其開禁使接士如故從之御史臺記云蒨欲結文富故上言乞舉班迎故事朝議哂之又希執政意上言乞兩府私第不許接見賔客蒨性謟䛕所言大抵類此按實録十月癸夘所書則蒨乃乞開兩府私第見客之禁與御史臺記不同恐馮潔已亦私有好惡也今不取此雖云從蒨所請然賈黯明年自知制誥出知許州猶以客禁為言則蒨所請初亦未從也當考乙巳禮部貢院上刪定貢舉條制十二巻丁未邇英閣讀史記龜䇿傳上問古人動作必由此乎孫抃對曰古有大疑既決於已又詢于衆猶謂不有天命乎於是命龜以斷吉凶所謂謀及乃心謀及卿士謀及庶人謀及卜筮葢聖人貴誠不専人謀黙與神契然後為得也上善其對初禮部奏名進士諸科各以四百為限又請雜問大義僥倖之人悉以為不便欲揺罷詔法諸科問十義九經不責記誦皇祐五年閏七月戊子詔惟禮部奏名限四百不見此指揮選舉志稱皇祐四年恐誤具注嘉祐元年四月巳酉知制誥王珪言唐自貞觀訖開元文章最盛較藝者嵗千餘人而所收無㡬咸亨上元中嘗增其數然亦不及百人國初取士大抵習唐制逮興國中増闢貢舉之路其後寖以益廣無有定數比年以來官吏猥溢於常員故近詔限數四百近詔未見嘉祐元年四月丙辰可考兹誠所以懲仕進之弊也取士惟進士明經諸科明經先經義而後論䇿三試皆通為中第其大略與進士等而諸科既不問以經義又無䇿試之式止以誦數精粗為中否則其專固不達於理安足以長民治事哉前詔諸科終場問本經大義十道九經止問義而不責記誦皆已著之于令臣慮言者以為難于遽更而圖安于弊也惟陛下申敕有司固守是法毋輕易焉而尚書屯田員外郎朱景陽又奏謂禮部試日以廵捕官察士子挾書交語私相借助而貴逰子弟與寒士同席父兄持權趨附者衆廵捕官多佞邪希進之人為之庇葢莫肯糾舉都堂主司縱而不詰上下相䝉寒士寡徒獨任臆見譬如戰鬬是以一夫之力而當數百人也請令寒士與鎻㕔者同場别考則勢均力敵可絶偏私奏寢不報而申嚴廵捕官不察之法朱景陽據本志附見當自有月日庚戌翰林學士刋修唐書歐陽修言自漢而下惟唐享國最乆其間典章制度本朝多所參用所修唐書新制最宜詳備然自武宗以下並無實録以傳記别説考正虛實尚慮闕略聞西京内中省寺留司御史臺及鑾和諸庫有唐朝至五代已來奏牘案簿尚存欲差編修官吕夏卿詣彼檢討從之夏卿晉江人也大食國首領來貢方物壬子邇英閣講周禮祭祀割羊牲登其首王洙曰祭陽以其首首主陽祭隂以其血血主隂也神明不測故以類而求之帝曰然天地簡易非已誠其能應乎又講左氏傳鄭人鑄刑書洙曰子産以鄭國之法鑄之於鼎故使民知犯某罪有某罰也帝曰使民知法為亂可止不若不知而自化也癸丑荆湖北路轉運司言下溪州蠻彭仕羲舉衆内寇詔本路發兵捕之先是轉運使李肅之等因彭師寳為鄉𨗳擊仕羲不克故仕羲數擾邊也十一月丙辰出内藏庫絹三十萬下并州市糴軍儲詔河北州軍契丹葬日毋得舉樂丁巳詔陜西轉運司同州鐡冶自今召人承買之初虞部郎中薛向言河北糴法之弊以為被邉十四州悉仰食度支嵗費錢五百萬緡得米粟百六十萬斛其實才直二百萬緡爾而嵗常虚費三百萬緡入於商賈蓄販之家今既用見錢實價革去三百萬虚加之弊矣然必有以佐之則其法可行故邊榖貴則糴澶魏粟漕黃御河以給邊新陳未交則散糶價以救民乏軍食有餘則坐倉收糴以待不足使見錢行而三利舉則河北之榖不可勝食矣於是詔置河北都大提舉使糴糧草及催遣黄御河綱運公事巳未以向為之壬戌詔流内銓南曹自今舉官文臣知雜御史少卿監武臣閤門使以上并江淮發運使諸路轉運副使提㸃刑獄朝臣使臣開封府權判官府界提㸃更不限贓私罪其餘犯私罪杖已上不理為舉主若私罪笞者聽之乙丑宣徽南院使判延州吴育言國家總挈萬幾惟在綱要小大之務各有攸司若朝廷職舉而事簡則坐制天下不勞而治矣今尚書省是其本也自唐末五代因循茍且雜置他局事無本末不相維持使天下之大有司廢為閒居凡細𤨏之事動干朝廷遂致君相焦勞日不暇給如百川浩蕩而不治其本源萬目開張而不得其條領雖欲盡力其勢莫可以正也臣前判尚書都省見其官司局次燦然具存且如有大論議當下衆官雜定以質所長乆廢不舉今惟定諡時一㑹都堂是行其小而廢其大論者深惜之竊謂乆廢之職豈能一日盡其美當隨宜講舊漸復之請且於諸學士中分命知六曹尚書事其舍人待制及兩省官即知左右丞諸行侍郎事其餘館職有名望朝士即知郎中員外事仍於舊相及前任兩府重臣中除一二人判都省然後各使檢詳典故度其可行者奏復之其次諸司寺監從而舉之至於金榖之計見屬三司者亦無相妨並湏仍舊事不驚俗體皆有宜嵗年之間此制一定有所責成則髙拱無為之治可以馴致矣事下兩制定而言者謂尚書省職局今並入三司及諸司分領事難遽更乃罷之丙寅邇英閣讀太史公傳上謂李淑曰太史公欲行其道而不果身未免於禍深可悲也顧其是非不繆於聖人真良史之才矣丁夘詔河東路上供木植及并州先欠和糴斛斗嵐州合河第三津渡課錢并除之己巳安南王李徳政之子日遵遣使告徳政卒仍進奉遺留物及獻馴象十癸酉贈徳政侍中南越王賻賚甚厚命廣西轉運使屯田員外郎蘇安世為弔贈使乙亥授日遵靜海節度使安南都䕶交阯郡王右班殿直張安世為閤門祗候麟府并舊豐州縁邊同廵檢專管勾屈野河西北界以宰相富弼言安世河東土人有武勇特命之嘉祐二年二月甲戌載西人侵耕屈野河西事與此相關増置開封祥符縣尉各一員詔審官院編修皇祐三年以後衝改條貫慶厯四年二月十二月乙酉參知政事程戡言前知益州聞風俗所傳嵗在甲午當有兵起而民心不安葢淳化中李順狂逆之年請禁民間私習六十甲子歌從之丁亥中書奏自商胡決為大名恩冀患先議開銅城道塞商胡以功大難卒就緩之則憂金堤汎溢不能捍也願備工費因六塔水勢入横隴宜令河北京東預完堤埽并上河水所占民田從之始用李仲昌議也戊子知澶州天平留後李璋為修河都部署河北轉運使兵部郎中天章閣待制周沆權同知澶州都大管勾應副修河公事宣政使果州團練使入内副都知鄧保吉為修河鈐轄殿中丞李仲昌都大提舉河渠司内殿承制張懐恩為修河都監尋以北作坊使果州團練使内侍押班王從善代保吉周沆有論列附明年六月庚寅降知廬州龍圖閣直學士刑部郎中包拯為兵部員外郎知池州坐失保任也壬辰龍圖閣直學士給事中施昌言為都大修河制置使提㸃開封府界諸縣鎮公事度支員外郎蔡挺都大提舉河渠司勾當公事太常博士楊緯並同管勾修河昌言辭之不許丁酉詔武臣有􅂍濫無得轉横行其有戰功者許之初閤門通事舍人柴貽範乞遷閤門使御史臺言其嘗坐濫事免官不可以例除也己亥廣南安化州蠻來貢方物詔以知州䝉全㑹為三班奉職監州姚全科為借職故翰林學士王禹偁孫延已上所藏太宗皇帝賜其祖御書詩一軸詔賜錢一萬以御詩還其家庚子契丹遣右宣徽使左金吾衛上將軍蕭運翰林學士給事中史館修撰史運來獻遺留物辛丑詔國子監學官自今以三年為一任願留者許之仍不理資考甲辰賜左屯衛大將軍克敦錢三十萬克敦進所為文求試及試學士院乃乞以兩日分試詩賦論既從所乞因罷推恩而賜之克敦德均兄也侍御史梁蒨以病乞解言職改刑部員外郎直史館知襄州蒨罷言責必有故劉摯銘蒨墓云自乞解言責御史臺記云遷起居舍人知諫院以病乞補外郡按蒨未嘗入諫院臺記誤也以病乞補外郡當得之然臺記毁蒨太過未可全信摯云請裁減任子恩自宰相始恐蒨出亦不縁此今並不取己酉契丹國母遣林牙保靜節度使蕭衮文州觀察使知客省使杜宗鄂契丹遣崇儀節度使耶律達益州觀察留後劉日亨來賀正旦又遣林牙右領軍衛上將軍蕭鏐歸州觀察使冦忠來謝冊立辛亥歐陽修又言朝廷定議開六塔入横隴故道中外之臣皆知不便而未嘗極言其利害者何哉葢其說有三一曰畏大臣二曰任小人三曰無竒䇿今執政之臣用心於河亦勞矣初欲試十萬之人役以開故道修六塔未及興役遽又罷之已而終為言利者所勝今又復修然則其勢難於復止也夫以執政大臣銳意主其事而有不可復止之勢固非一人之說可回此所以雖知非便而罕肯言也李仲昌小人利口偽言衆所共惡今執政大臣既用其議必主其人且自古未有無患之河今河侵恩冀即日之患已形回六塔將來之害雖大而其害未至夫以利口小人為大臣所主欲與之爭未形之害勢必難奪就能奪其議則言者猶須獨任恩冀為患之責使仲昌得以為辭大臣得以歸罪此所以雖知非便而罕敢言也今執政之臣用心太過不思自古無無患之河直欲使河不為患若能使河不為患雖竭人力猶當為之况聞仲昌利口詭辨謂費物少而用功不多不得不信為竒䇿於是决意用之今言者謂故道既不可復六塔又不可修詰其如何則無竒䇿以取勝此所以雖知非便而罕肯言也衆人所不敢言而臣今獨敢言者臣謂大臣本非私仲昌也直欲興利除害爾若果知其為害愈大則豈有不言也哉至於顧小人之後患則非臣之所慮也且事貴知利害權輕重有不得已則擇其害少而患輕者為之此非明智之士不能也况治水本無竒䇿相地勢謹隄防順水性之所趨耳雖大禹不過此也夫所謂竒䇿者不大利則大害若循常之計雖無大利亦未至大害今言修六塔者竒䇿也然終不可成而為害愈大言順水治隄者常計也然無大害不知為國計者欲何所擇哉若謂利害不可必但聚大衆興大役勞民困國以試竒䇿而僥倖有成者臣謂雖執政之臣亦未必肯為也况河水未始不為患今順已決之流治隄防於恩冀者其患一而遲塞商胡復故道其患二而速開六塔以回今河者其患三而為害無涯自河決横隴以來大名金隄埽嵗嵗増治及商胡再決金隄益又加工獨恩冀之間自商胡決後議者貪建塞河之䇿未嘗留意於隄防是以河勢浸溢今若專意併力於恩冀之間謹治堤防則河患可禦不至於大害所謂其患一者十數年間下流淤塞則上流必有決處此一患而遲者也其患二者今欲塞商胡口使水歸故道治堤修埽功費浩大勞人匱物困弊公私此一患也幸而商胡可塞故道復歸髙淤難行不過一二年上流必決此二患而速者也其患三者今六塔河口雖云已有上下約然全塞大河正流為功甚大又開六塔河道治二千餘里堤防徙一縣兩鎮計其功費又大於塞商胡數倍其為困弊公私不可勝計此一患也幸而可塞水入六塔而東横流散溢濵棣徳博與齊州之境咸被其害此五州者素號富饒財用所仰今引水注之河北一路坐見貧虚此二患也三五年間五州凋弊河流注溢乆又淤髙流行梗澁則上流必決此三患也所謂為害無涯者也今為國悮計者本欲除一患而反就三患此臣所不喻也至如六塔不能容大河横隴故道本以髙淤難行而商胡決今復驅而注之必横流而散溢自澶至海二千餘里堤埽不可卒修修之雖成必不能捍水此士無愚智皆共知不待臣言而後悉也且河水天災非人力可固惟當治隄順水為得計不必求竒䇿立難必之功以為小人僥倖冀恩賞之資也惟朝廷熟計亟罷六塔之役時宰相富弼尤主仲昌議䟽奏亦不省壬子新修醴泉觀成即祥源觀也因火更其名慶厯初淄濰青齊沂宻徐淮揚八州軍既弛鹽禁兖鄆亦相繼許通海鹽自是諸州官不貯鹽而嵗應授百姓蠶鹽皆罷給然百姓輸蠶鹽錢如故是嵗始詔百姓輸蠶鹽錢以十分為率聼減三分云此據食貨志但云至和中不得其時實録㑹要俱無之今改至和中作是嵗附至和二年末葢至和三年九月方改元嘉祐也
