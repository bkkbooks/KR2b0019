body:
  text: 續資治通鑑長編巻四百六十一宋李燾撰哲宗元祐六年秋七月己未熙河蘭岷路經畧使范育言鄂特凌古蕃字稱果荘年老若在者乞遣回已死即付骸骨詔以鄂特凌古恭順朝廷結斡磋代父管勾部族寧靜特從所請令西京焚果荘屍收骸骨付進奉人其鞍馬分物等並給還仍令育諭之侍御史賈易言臣竊以天下大勢可畏者有五而旱乾水溢日星謫見無所與焉一曰上下相䝉而毁譽不以其真二曰政事茍且而官人不任其責三曰經費不充而生財不得其道四曰人才廢闕而教養不以其方五曰刑賞失中而人心不知所向夫毁譽不以其真則主聽惑主聽惑則邪正無别君子之道日消小人之黨日進政化陵遲亂之所由生也言上下相䝉則是人主聰明壅蔽下情不上達之謂也可不畏乎夫官人不任其責則萬事隳廢􅂜倫攸斁惡吏市姦而自得良民受弊而無告愁嘆不平之氣充溢乎宇内以干隂陽之和災害所從而起也言政事茍且則是無復有治道而姦吏蠧賊靡所不至也可不畏乎夫生財不得其道則公私困弊衣食之源日蹙用之於無事之時且有患矣不幸倉卒多事則必狼狽窮廹而禍敗至矣言經費不充則是一切用度皆匱乏而歛散屈伸無及時預備之計人情易搖而根本有微弱之虞也可不畏乎夫教養不以其方則士氣寖弱士氣寖弱則節義凋喪偷合茍容之俗滋長背上忘君之風益甚將誰與立太平之基而寧王國者哉言人才廢闕則是士君子無賢智可用之實而愚不肖充位於朝天下所從而否也可不畏乎夫人心不知所向則以非為是以黑為白更相賊害爵之以髙位而不加貴僇之以顯罰而不加懼人君之刑勢無以鼓動四方徼利茍免之姦冒貨犯義之俗何所不有言刑罰失中則是人無所措手足姦宄由是而莫禁可不畏乎臣獨恨二聖焦勞念治而天下之勢乃如此之弊任事者不以為憂是猶寢於積薪之上火未及燃而自以為安也然則興廢補弊持危扶衰豈無䇿乎欲知毁譽真偽之情則莫若明四目達四聰使下無壅蔽之患讜言直論日至乎前而讒說殄行無以遁其情則賢佞邪正皦如白日中心湛然如止水如定鑒孰敢欺蔽以售其偽耶書曰知人則哲能官人能哲而惠何憂乎驩兠何遷乎有苖何畏乎巧言令色孔壬此之謂也欲官人皆任其責而政事修明則莫若詢事考言循名責實故四郊不治則責郡邑之臣以其無敦本務農之効五品不遜則責師帥之官以其無承流宣化之績四裔畔援則責之邊帥獄訟煩苛則責之士師盗賊多有則責之警尉羣司百官因任而原省之黜幽而陟明著以一定之制則賢能者樂運其才而疲懦不肖者不敢貪位而尸祿詩曰無競惟人四方其訓之不顯惟徳百辟其刑之此之謂也欲生財不逆其道則莫若敦本業抑末作崇儉約廢奢僭使四方之民各守其業不見異物而遷講明先王制國用量入為出之法行之天下將使公私富足而九年之食不匱大學曰生財有大道生之者衆食之者寡為之者疾用之者舒則財恒足矣此之謂也欲教養人才必以其方則莫若闢四門以廣詳延之路縻好爵以厲㢘遜之節明詔公卿大臣使各舉其所知召對延問以觀其能否善者隨宜而用之不善者一切報罷然後巖穴無幽隱之賢朝廷多譽髦之彦矣書曰九徳咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝此之謂也欲人心皆知向正則莫若賞以勸善刑以懲惡不以親疎貴賤為之重輕與天下為畫一故為善於家者䝉賞於朝為不善於幽闇者被罰於顯明所以風動四方而信於天下也如此故民志一定而放僻邪侈之行不作書曰徳明惟明徳威惟畏此之謂也舉是數者一切以至誠惻怛力行而無倦則太平極治之功何為而不成何求而不獲哉此疏附見要可削辛酉故知南州向從元弟從政為銀青光祿大夫檢校國子祭酒兼監察御史武騎尉知南州詔翰林學士趙彦若為寳文閣學士提舉萬壽觀彦若累請避言者故有是命劉摯謂彦若四奏乞外祠今得在京疑其未敢安也是日内降五章其間安鼎楊畏皆言彦若賈易乃别論常事前日易與鼎對後章不即下人彦藉藉謂論彦若因及摯今日方降出則無所及摯又謂若篤學有純徳若不能言而中甚剛然暗世故一切不治人事與人少意長厚君子人也救仁恕事雖出於一時廹切妄作要是父子之愛難深責之而言者急攻不釋獨以摯故耳作責詞者極口詆之殊非正言無一人辨之者六月二十八日彦若先罷侍讀今又罷學士劉摯云云已附注六月二十八日摯七月四日所記仍附注此草責詞者當考姓名十二日彦若乂降密直詔薛向元豐三年明堂奏薦恩澤依見任執政官先是吏部言向昨以罪罷同知樞密院知隋州亡歿已被㫖依正議大夫例而其子紹彭有請故有是詔壬戌工部言監司及當職官貟吏人并州縣在任官貟或吏人公人各不得承買官估賣之物及請佃承買官田宅違者徒二年即本州縣吏人公人非當職及管而請佃承買官田宅者各杖一百吏人公人仍許人告估田宅物價三分中給一分充賞其請佃及買而未得者各减三等從之新無癸亥三省言張方平元係宣徽南院使檢校太傅太子少師致仕元豐官制行罷宣徽使元祐三年復置儀品恩數如舊詔太子太保致仕張方平依前太子太保充宣徽南院使致仕蘇軾誌方平墓云拜太子少師以宣徽使致仕官制行罷宣徽使獨命方平領使如舊今上即位執政輒罷方平使以太子太保致仕當考輒罷緣由是月八日韓川云云閏八月十六日辭免熙河蘭岷路經畧安撫使范育言森摩温吉等四人昨同果荘捕獲巴朗古卓斡病死有森摩温吉二人見留熙州今鄂特凌古既通和恭順欲遣還以示恩信從之仍令育諭送還之意翰林學士承㫖兼侍讀蘇軾言臣聞朝廷以安靜為福人臣以和睦為忠若喜怒愛憎互相攻擊其初為朋黨之患而其末乃治亂之機甚可懼也臣自被命入覲頻干一郡非獨顧衰命為保全之計實深為朝廷求安靜之理而事有難盡言者臣與賈易本無嫌怨只因臣素病程頤之姦形於言色此臣剛褊之罪也而賈易頤之死黨專欲與頤報怨因頤教誘孔文仲令以其私意論事為文仲所奏頤既得罪易亦坐去而易乃於謝表中誣臣弟轍漏泄密命緣此再貶知廣徳軍故怨臣兄弟最深臣多難早衰無心進取豈復有意記憶小怨而易志在必報未甞一日忘臣其後召為臺官又論臣不合刺配杭州㓙人顔章等以此見易於臣不報不已今既擢貳風憲付以雄權升沉進退在其口吻臣之綿劣豈勞排擊觀其意趣不乆必須言臣并及弟轍轍既備位執政進退之間事關國體則易必須扇結黨與再三論奏煩瀆聖聽朝廷無由安靜皆臣愚昧不早廻避所致若不早賜施行使臣終不免被人言而去則臣雖自顧無罪中無所愧而於二聖眷待奬與之意則似不終竊惟天地父母之愛亦必悔之伏乞檢㑹前奏速除一郡此疏即乞留中庶以保全臣子貼黄稱臣前在南京所奏乞留中一狀亦乞更賜詳覽施行又貼黄稱臣從來進用不緣他人中外明知獨受聖眷乞賜保全令得以理進退若不早與一郡使臣不免被人言而出天下必謂臣因䝉聖知故遭破壞所損不細矣又貼黄稱臣未請杭州以前言官數人造作謗議皆言屢有章疏言臣二聖曲庇不肯降出臣尋有奏狀乞賜施行遂蒙付外考其所言皆是羅織以無為有只如經筵進朱雲故事云是離間大臣之類中外傳笑以謂聖世乃有此風今臣若更少留必須攟拾似此等事雖聖明洞照有無而黨與既衆執奏不已則朝廷終難違其意縱未責降亦須出臣勢必如此何如今日因臣親嫌之請便與一郡以全二聖始終之恩若聖慈於臣眷眷不已不行其言則又須騰謗以謂二聖私臣曲行庇蓋臣既未能補報萬一而使浮議上及聖明死有餘罪矣伏乞痛賜憫察早除一郡甲子户部奏立役人差出五百里外借食錢法違戾者令提刑司檢察從之舊錄特詳今從新錄乙丑宰臣吕大防等言納后儀注昨兩制禮官集議各具所見皆有典據今日恐難盡行臣等尋已參酌修定進入太皇太后曰前議已曽省覽其間有可行者有不可行者蓋取其便於近事不必拘泥古昔也大防等曰誠如聖諭欲望明示可否然長秋乆未建立中外極不遑安不審内中已有定議否外間以為在京臣僚之家皆䝉取索家狀惟髙向二族獨未取索衆議深以為鬱太皇太后曰采擇近百餘家猶未有契合者髙家不聞有人向家亦曽取索尚未供到然此非小事固難輕議大防等曰太皇太后深自損抑聖慮髙逺固非臣等所能擬議然為國家計則自當付之公議况自古選后多岀勲戚之門漢之隂鄧是也而當時亦不以為嫌望早降聖㫖下二家依例供進太皇太后曰若是神宗皇帝時則無所不可今若自詔外家誠亦非便大防等曰今禮物悉備惟太皇太后脫畧小嫌特留聖㫖使大婚早定下慰四海之望太皇太后曰待更相度大防等曰臣等不勝願幸八月二日宣諭二族無可者寳文閣待制知應天府曽肇起居郎孫升並為中書舍人翌日劉摯謂王巖叟曰肇除命幾閣住若值韓原伯必封還賴值孫君孚原伯川字君孚升字也巖叟曰君孚與肈親又肈甞為君孚行詞甚美因謂摯曰何故復進此人摯曰不欲添兩制故用舊人耳巖叟曰若求正人從下添有何不可摯曰如此豈不佳顧正人難得巖叟曰求之必有後十數日肈卒罷集賢校理國子司業兼侍講孔武仲為起居郎秘閣校理徐王府翊善陳軒為起居舍人太常少卿豊稷為國子祭酒左朝奉大夫知晉州盛陶為太常少卿陶與劉摯同年自舉子相從劉摯甞論陶熙寧末為御史每事必言之而志不堅果應數而已乆之去通判隨州瀛州代還落寞不得調甚乆摯時自右司得罪數相見自云與蔡確王安禮善冀有獲焉摯勉令至吏部自不妨堂除陶不肯又乆之乃得太常博士元豐六年也八年摯自滑州還朝陶為省郎相次為右司元祐三年冬為侍御史明年蔡確事起陶雖有一章意持兩端隂欲右確改太常少卿諫官論擊之去知汝州一年改晉州遂召以今任陶儒雅有文行而心喜進畏患故不能彊有力在臺日為李常翟思王彭年趙挺之軰所制外又為彭汝礪所咻故志不伸蓋陶性和善可與為是亦可與為非非全不知理者要之善人君子也若用之文詞之任為宜惜乎其將老矣此據劉摯八月二十八日所記増入陶初除少常時秘閣校理工部貟外郎張舜民為左司貟外郎左朝奉郎温益為工部貟外郎左承議郎曹輔為職方貟外郎中書舍人韓川言太子太保致仕張方平依前太子太保充宣徽南院使致仕臣聞宣徽使之名祖宗以寵勲臣班資恩數與現任執政均與樞密副使同知樞密院事尤切相等而皆未甞令帶以致仕且文武異列不合混并宣徽使武官也太子太保文官也豈可使官號混淆合從改正詔依前㫖行下劉摯謂方平舊甞為宣徽院使以官制罷宣徽院後因覃恩轉太子太保落宣徽使前年復置宣徽院近已除馮京為使故復還方平川乃云文官不當兼武官又云宣徽比樞密副使若宣徽可帶致仕則樞密亦可為致仕官又云朝廷欲以俸優其人緣本官謝事已乆又云元豐八年已有不帶指揮川似都不曉此事文彦博以太師為節度使致仕文不兼武乎宣徽但許綴樞密班耳宣徽自可帶以知州樞密豈有帶出者可帶以知州則可帶以致仕矣致仕官自請本官俸錢方平有太子太保俸豈可更請宣徽俸如此則彦博遂請節度俸矣所謂元豐八年不帶本為巳廢宣徽院故也今復置院又除馮京矣川此繳殊無理於是令依前㫖而當制乃孫升也升既書行詞頭却送川故事制誥雖輪直然文書猶簽本房舍人時并曽肈詞頭皆送川川狀云方平制昨甞論列肇亦曽在言路日有彈劾今皆妨礙房吏白摯云川已詣兩給事必有所言此據摯日記修入然范祖禹及朱光庭卒無論列方平亦再辭再降詔不允八月十四日方平再降詔不允辭免今附此詔調發諸路出戍軍兵自今係三月四月五月替於二月差六月替於七月差樞密院言每遣戍即承用從來月分昨六月差替人聞有中暍足病者多極非便請更此制遂著為令新錄云樞密院言調發諸路出戍軍兵前一月差人替換從之尚書省言將銅錢出中國界者三路及餘路立徒流編配首從等法及許人捕捉告賞錢及知情停藏與官司不覺察之罪即蕃人有犯除河北路外並奏裁從之舊錄特詳今從新錄三省言陜西制置解鹽司舊專設官總領後來方令轉運使一貟兼管致職務不專有害鈔法乞依舊差官充制置解鹽使更不令轉運使副兼領從之給事中范祖禹封還錄黄曰伏見仁宗慶厯中范宗傑為制置解鹽使行禁𣙜法公私大受其弊於是范祥請變法至八年乃以祥為陜西提㸃刑獄兼制置解鹽事盡革宗傑之弊課入亦増祥初建議當時論者爭以為非而韓琦包拯等皆以祥法為便請乆任祥以專其事乃擢為陜西轉運使及李參代祥官課遂損嘉祐中張方平包拯請復用祥祥之鹽法至今稱之及祥卒薛向繼其後祥與向皆號為能言利豐財之人然皆以提轉兼領由此觀之鹽事修舉在於得人不在置使也設官置吏别為一司權輕則不足以動州縣權重則是又増一監司州縣承禀無不煩擾又提轉之外别置使者以主財利無不好相侵奪各求自便此人情之常也若每事專設官則轉運使遂無用尚何以主錢榖為職哉古者利不百不變常朝廷方欲省官惜費茍無大利害則不若且如其舊臣竊謂作事謀始所宜謹重故未敢行下不從祖禹繳奏政日在七月二十二日今附此八月二十二日乃復置丙寅遼國遣使長寜軍節度使耶律純嘏副使朝議大夫守太常少卿充乾文閣待制韓資睦來賀坤成節戊辰刑部請廣南恩端潮等州縣瀕海船户每二十户為甲選有家業行止衆所推服者二人充大小甲頭縣置籍錄姓名年甲并船櫓棹數其不入籍并櫓棹過數及將堪以害人之物并載外人在船同甲人及甲頭知而不糾與同罪如犯强盗視犯人所犯輕重斷罪有差及立告賞沒官法從之己巳夏國遣使來賀坤成節三省言諸州衙前舊行募法日除依優重支酬外未有差使者並月給食錢昨降指揮以舊日所支雇食錢量添入重難分數即今來招募到衙前其空閑月分既無舊日所支錢數竊恐遂致闕乏詔令户部下逐路轉運提刑司隨州縣土俗於所用支酬額錢内參酌立定優重分數及月給錢其錢不得過舊募法所支數户部請諸州衙規内十分闕一分已上招募未足處以元祐元年罷募法日所用優重支酬雇食等都計錢數為額闕一分已下及招募數足處以新定優重支酬等都計錢數為額如合増損並聽本州當職官勾勒衙衆公共相度隨宜増損即不得過上項額數其合係額外増分數者具利害申監司考察保明申部從之又請諸路投名衙前並依三路已得朝㫖除依條本户合差耆長不免外其餘色役並免詔應諸路投名衙前與免本户第二等以下色役其見役鄉差人户令並招募人投名替放了當如鄉差人願投充長名者聽政目修衙司條左諫議大夫鄭雍言趙仁恕罪名約法斷放其獄既難追正獨當稍重彦若之責侍御史賈易言彦若不顧義理肆其誣罔今除寳文閣學士提舉萬壽觀是旌其變詐而被以特恩右正言姚勔言近例翰林學士非因責降别與差遣者除閣學士所謂龍圖寳文者雖殊其為閣學士一也今彦若豈當與無過之人等詔趙彦若為樞密直學士提舉萬壽觀劉摯云彦若辭寳文閣學士不受且言者猶未已故有是命然仁恕初敗官彦若以鍾浚之嫌乞改推而已不知言者何故指以為罔上不實又以為姦邪狡詐又以為誣告也若彦若不曽言王安禮而浚非安禮黨則可以謂之誣罔矣今罷翰林又罷經筵又罷史院又降差遣而又降職名是當何等罪也摯以連姻不敢言他日必有辨之者既踰月詔許彦若任便居住復有㫖差兵級二十人送彦若還青州并催給所當得船摯女為彦若次子婦摯子路又娶彦若女摯每稱彦若善人篤學乆侍經帷無過特以純柔為衆惡少擠之無一人為言之者殊非祖宗崇奬淳厚眷遇侍從之意惟蘇頌咨嗟嘆息之而已彦若内自立不肯復留亦不以一毫干人稅客舟飄然而去朝廷風體薄矣此據劉摯八月二十八日所記今并八月十四日許便居掇取附七月十二日鄜延路經畧司言宥州牒南界於邊界修起封子八箇係鎮戎軍營界已行毁拆請勿再修乞且依舊如西人向去恭順再來理㑹即令毁去詔令作本司意稱委官按視候見實狀别具闗報次措置湖北邊事司言沅州最處極邊戍兵不習水土例多死亡乞以辰州雄畧第十五二十五兩指揮兵貟更戍免戍他路仍於本州添置有馬雄畧第八指揮以四百人為額候招配人及五分奏乞支馬仍今後馬軍犯罪該配者並免特刺充沅州雄畧馬軍不許差出從之兵部言兵部格掌蕃夷官授官主客令蕃國進奉人陳乞轉授官職者取裁即舊應除轉官者報所屬看詳主客止合掌行蕃國進奉陳乞事體其應緣進奉人陳乞授官盡合歸兵部若舊來無例創有陳乞皆令主客取裁誠恐化外進奉陳乞授官事體曹部執掌未一乆逺互失參照欲乞今後不以曽與未曽入貢舊來有例無例其應緣進奉人陳乞授官加恩並令主客闗報兵部從之新本無此己巳翰林學士承㫖兼侍讀蘇軾言伏見浙西諸郡二年災傷而今歲大水蘇湖常三郡水通為一農民栖於邱墓舟栰行於市井父老皆言耳目未曽聞見流殍之勢甚於熙寧臣聞熙寧中杭州死者五十餘萬蘇州三十餘萬未數他郡今既秋田不種正使來歲豐稔亦須七月方見新穀其間饑饉變故未易度量呉人雖號柔弱不為大盗而宣歙之民勇悍者多以販鹽為業百十為羣往來浙中以兵杖䕶送私鹽官司以其不為他盗故畧而不問今人既無食不暇販鹽則此等失業聚而為寇或得豪猾為之首帥則非復廵檢縣尉所能辦也恭惟二聖視民如子茍有可救無所吝惜凡守臣監司所乞一一應副可謂仁聖勤恤之至矣然臣在浙中二年所行荒政只用出糶常平米一事更不施行餘策而米價不躍卒免流殍蓋緣官物有限饑民無窮若兼行借貸俵散則力必不及中路闕絶大悞饑民不免拱手而視億萬之死也不如并力一意專務糶米若糶米不絶則市價平和人人受賜縱有貧民無錢可糶不免流殍蓋亦有限量矣臣昨日得杭州監稅蘇堅書報臣云杭州日糶三千石過七月無米可糶人情洶洶朝不謀夕但官場一旦米盡則市價倍踊死者不可勝數變故之生恐不可復以常理度矣欲乞聖慈速降指揮令兩浙轉運司限一兩月内約度浙西諸郡合糶米斛酌中數目直至來年七月終除見在外合用若干急遞奏聞候到即指揮發運司官吏并轄下諸路封樁及年計上供錢斛内擘畫應副須管接續起發赴浙西諸郡糶賣不管少有闕絶仍只依地頭元價及量添水脚錢出到賣米脚錢並用支買金銀還充上供及封樁錢物所貴錢數流通不致錢荒所有借貸俵散之類候出糶有餘方得施行以此計置雖是數目浩瀚然止於糶賣不失官本似易應副但令浙西官場糶米不絶直至來年七月終則雖天災流行亦不能盡害陛下赤子也如䝉施行即乞先降手詔令監司出榜曉諭軍民令一路曉然知朝廷已有指揮令發運司將上供封樁斛斗應副浙西諸郡糴米直至明年七月終不惟安慰人心破姦雄之謀亦使蓄積之家知不乆官米大至自然趁時出賣所濟不少惟望聖明深愍一方危急早賜施行貼黄稱臣去歲奏乞下發運司於豐熟近便州軍糴米五百萬石䝉聖慈依奏施行仍賜封樁錢一百萬貫令糴米而發運司以本路米貴為詞不肯收糴去年若用貴價收糴不過每斗七十足錢盡數收糴猶可得百餘萬石則今年出糶所濟不少其發運司官吏不切凛遵之罪朝廷未甞責問習玩號令事無由集今來若行臣言即乞嚴切指揮發運司稍有闕誤必行重責所貴一方之民得被實惠所下號令不為空言
