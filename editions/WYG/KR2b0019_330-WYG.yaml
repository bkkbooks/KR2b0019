body:
  text: 續資治通鑑長編巻三百二十六宋李燾撰神宗元豐五年五月辛巳朔御文德殿視朝新除職事官未正謝者許立班詔尚書省左右僕射丞合治省事初議左右分治及進呈始命合治舊紀書詔僕射丞治事則不分左右又詔自今宰臣上馬樞宻院次之諸司又次之左右丞上下馬處並同兩省侍郎大理寺國子監官差承務郎以上如無即差選人充正官立行守試請受法惟外任用前資是日中書省奏事上曰自官制之行嘗訓敕近臣當至誠惻怛輔成治道無或徇私毁上附下君陳曰嘉謀嘉猷惟我后之德古之賢者發明其君之德蓋以躬率羣臣正君臣之分如其自美則是倡亂也郭子儀再造唐室貴盛莫比代宗用楊綰為相止清德而已子儀為之减音樂五之四非畏綰也欲成代宗之美以率羣臣由此黎幹亦减騶馭崔寛亦毁池觀可謂得大臣之體也詔内外闕額禁軍例物元减半或全不支處並依式全支已全支處權增千錢以封樁禁軍闕額錢給詔苗授趙濟本路財糧極為艱急所修堡鄣處多占防拓軍馬近塞又多警急既不能時省費以待不虞及於農事方作調發力田之民甚非得計不可不惻怛體度邊費上為朝廷愛惜財用吏部尚書李清臣言久當史職國史今已成書冩録進册將畢止是㸃對裝標功亦不多縁臣等近各有職局欲乞自五月一日廢罷修國史院官吏量留楷書等候進册了放歸本處外臣勘㑹中書舎人趙彦若職事頗簡元係編修官可以不妨本職催促㸃檢進巻如有㸃對出事節合令元分修官改正即乞令計㑹修立從之壬午詔先王以道在天下列而為事陳而為法人各有分然後安官各有守然後治三代以降累世相仍寖迷大原遂亂名實餘弊斯積其流及今朕閔古弗還因時改造是正百職建復六聨先後重輕粗獲條次小大貴賤迭相維持差擇羣材分委成憲佇觀來效共致丕平敢有弗欽將底厥罪新除省臺寺監官詳定官制所已著所掌職事如被選之人不循守敢有僭紊其申諭中外違是令者執政官委御史臺彈奏尚書以下聽長官糾劾以聞龎元英文昌雜録云此詔自内出非學士之辭也當考兩紀並載此詔但各有刪潤今具載之政和二年十月十七日揭牓六曹寺監長官㕔手詔詳定官制所日有應報所置官司事件不少其李清臣已下應新除職事官之人並令依舊又詔今後四方實封奏除内降指定付三省樞宻院及中書門下尚書省外餘並降付中書省可從本省分送所屬曹省癸未詔尚書省得㫖合下去處並用劄子通直郎中書舎人陸佃兼侍講奉議郎起居舎人蔡卞兼崇政殿說書放翁家世舊聞楚公為太學直講累年既去而太學獄起學官多坐廢元豐中侍經筵神宗從容曰卿在太學久經行為士人所服卿去後學官乃狼籍如此公曰學官與諸生乃師弟子今坐以受所監臨贓四方實不以為允龔原王沇之等皆知名士以受鄉人紙百畨筆十管斥廢可惜願陛下終哀憐之且臣為直講時有親故來亦不免與通問使未去職亦豈能獨免昔蘇舜欽監進奏院以賣故紙錢置酒召客坐自盗贓除名當時言者固以為真犯贓矣今孰不稱其屈臣恐後人視原沇之等亦如今之視舜欽也雖不見聽然上由是益知公長者蒲中行為太學官獄成獨以不絓吏議被賞楚公歎曰此賞豈可受也由是薄中行為人手詔朝廷議更官制本欲覈正吏治非徒膠古希竒而已比命官置司修講逾年迨今頒行尚爽條理若爾者分撥事類仍前糾紛不免啟侮四方貽譏來世事繫國體二三執政可不究心其詳定官恐須益得深曉文法之人御史中丞徐禧可同詳定官制如頃所論體統令以此意著為式令蓋上嘗論蘇綽建復官制上自朝廷下至州縣悉分為六曹財賦如一今先自京師候推行有序即監司州縣皆可施行矣墨本與朱本並同詔如聞官制新行諸司不知所屬可一切申尚書省其舊官司如殿中省翰林院之類有見任官者令依舊治事候新官上即對罷其妄稱疑廢託故避事以擅去官守律論是日中書奏陜西邊事未息欲廣調軍須上曰秦居關中止以一方事力尚能并一九州今天下之大十倍於秦逺取東南財賦以贍關中更得名將練兵則何為而不可顧未有其人爾甲申詔訴訟不得理應赴省訴者先詣本曹在京者先所屬寺監次尚書省本曹次御史臺次尚書都省次登聞鼓院六曹諸司寺監行遣不當並詣尚書省詔遼人不可禮同諸番付主客掌之非是可還𨽻樞宻院詔環慶路經畧司欲建環州百魚平白草原木𤓰平堡寨及廢肅逺寨計費十千萬津置又當不貲今邊城財力艱急物價翔貴如可以開疆制敵固當不愛今費以除後憂今所建堡寨乃在邊壕以裏財力餘時尚不足為况邊事未息豈可坐開自屈之計其罷之詔引戰環州弓箭手都指揮使王隱舊病右目因奪隘力戰箭中左目與三班借職俸禄終其身并與引戰支賜仍許子孫承襲上批知樞宻院孫固以私喪合給式假未有所給日限官司處分可從中書省依舊例施行今後執政官給假準此乙酉范純粹奏臣伏見朝廷聚兵一道以事西討將修築堡寨䟎積芻糧為進攻必取之計臣以非才職專餽餉雖前後累與同職官條具事狀仰煩聖聽然其所論皆區區餽運職事之所當言者至於攻討得失之勢城堡利害之實師期之緩急民情之休戚所以繫朝廷天下之體者則非臣之職而前此未之言也臣愚以謂畎畆不忘君者蓋臣子之常守况臣世荷國恩久叨器使今事有所覩而心有所懷詎當以非職為嫌而隱黙自欺此臣所以自信不疑而欲言者也臣竊聞去年邊事之初議者謂夏人惽亂囚辱其長衆怨親叛席巻可平朝廷大治兵師諸道並進所向力戰而賊巢不拔則是與夫議者之言有間矣今朝廷㑹兵涇原欲為且城且戰之計臣以謂精騎二十萬聚於一方聲勢重大彼必清野以避我鋒决於他路犯邊以為牽制萬一乘虚入冦則事有可憂兼涇原進築之衆所食糧米日將萬斛所築城堡不過一二而地理漸逺餽運無可繼之䇿時日漸久丁夫有奔潰之虞於此之時勢必中罷豈不負陛下興舉之意而繫敵人觀望乎矧所成堡障深在賊疆存守久長豈敢自保此又不可不慮者也朝廷休養民力充實府庫久矣去嵗兵師一出而公私困弊若此其甚今者再議大舉人氣事力大非去嵗之比若今嵗事功不就即來嵗又將如何國財民力將何以繼此臣所謂攻守得失之勢城壁利害之實者也臣凖制置司牒坐到發諸路兵馬之期皆在六月竊計出兵之日决是初秋去嵗涇原環慶兩路各以九月出兵比至中冬漸已還塞然猶士卒疾凍十亡四五今七月行師方是苦暑以二十萬之衆冒犯炎日或被堅禦冦或負重力役渇飲難周瘧痢多有復當大雨時行之月豈無霖潦之虞臣恐疾病傷殘有甚前日内外重兵上繫國體此臣所謂師期之緩急者也臣竊見去年調夫出界其近上等第人户有至獨出數十夫之家其貧下户人亦須數户共出一夫雇直至及百貫又諸路轉運司接續調發至于再三其間凍餒艱苦遇賊被害死亡凋弊久未可完今兹再籍百姓已諳事勢人心駭畏頗有逃散麰麥在隴秋禾將耘妨奪農時適於此日縁軍大計動須人力臣等䝉朝廷誡以軍法責令趨辦若人户大段流移關内騷動根本之地事有可憂異日言者必以臣等為歸咎之地一身之責無足自愛其如國事何此臣所謂民情之休戚者也臣竊謂朝廷興舉計當萬全而不當幸一時之無事發而無成前車可鑒臣切與老於川事之人曲折講議事可寒心而中外之臣妄意朝廷謀身畏禍無有為陛下言者臣獨何人特以忠義所激不復以職事為嫌寧受盡言之罪於今日而不忍被不言之罪於他時故敢以所得衆人之論昧死以聞伏惟聖慈優容採擇天下幸甚貼黄臣非不知危言横議自速罪悔竊以謂今日盡言蓋無負於陛下雖即鼎鑊何以愧心若雷同衆人公肆欺罔茍幸目前之無事使昭昭公議壅不上聞貽朝廷他日無窮之患非臣所知也今日之論誠若迂誕陛下異日當以為忠言純粹去年十二月責官已具注是月十一日今年四月末又與李察同論事此獨奏並據純粹集丙戍降授承務郎新差監邕州受納鹽米倉張舜民言昨從髙遵裕管勾環慶路機宜文字隨軍出界與遵裕始因商議裁减供給不合自爾事無大小未嘗采納竊惟朝廷委任本在帥臣幕府地卑止於裨賛進則不聽一言退則首當重責微忠泯黙俯仰無從臣今掇拾追記自日軍中嘗陳述裨賛事條件上聞伏望追察上批送宇文昌齡究實以聞舜民令開封府選人伴送至鄜州供答朱本移十月二十三日六月一日詔可參考舜民初責邕州當考月日詔兩省樞宻院時政記侍郎同知樞宻院事修尚書省左右丞遞修三省同得㫖及宣諭事門下侍郎修宣諭仍於當日記録鄜延路總管曲珍及走馬承受楊元孫言四月己卯官軍出界行至婁相直貝旺川劄寨全軍夜驚已即時撫定于詔本路諸軍自用兵已來未嘗因出界寨中夜呼深慮人情或有憚勞不欲行者可急體量人情慘舒欣怠依詳去年用兵之始朝命處分士卒止合効力勿使費財每遇舉動常令薄有霑潤勿玩習以為細事有傷軍中樂於公戰之心或致譸張朝廷至時必有深責又詔沈括體䘏士衆須令心自奮勵樂於戰鬭若未便人情且須安養鼓勵或作番休出入毋得頻有驅牽别致生事其修葭蘆寨軍馬更加應接照管丁亥詔應定衝替官事理輕重並歸尚書省林廣上討蕩蠻賊軍員等部領獲首級并權隊將獲首級人功狀詔成隊二十分與轉六資内一資絹十五匹其餘分釐並依部隊將例不成隊人依陜西格推賞給事中舒亶言舊制應差除及更改事件到封駮司限當日抄録關報御史臺諫院新制撥封駮司歸門下省為封駮房如合依舊關報御史臺諫院不知以何官司為名恐内省無關報外司之理詔更不關報戊子詔開封府界保甲三丁内一丁充太常樂工者免餘二丁又詔河東轉運司昨所借功賞絹二萬匹招納蕃部特蠲之己丑承議郎試御史中丞徐禧試給事中先是龍圖閣待制鄧綰知永興軍禧言永興故為浩穰其民鬬暴加以兵政所寄千里折衝於今人才闒茸偷惰無居綰右者伏乞移綰内郡别選才望之臣詔知青州龍圖閣直學士劉庠與綰對易上謂執政曰徐禧舉孔武仲邢恕為御史如何王安禮曰武仲與恕志趨豈可為御史張璪曰此兩人皆異論者上曰徐禧論事其意漸可見大率懷吕惠卿之恩尤欲進異論之人蓋惠卿已叛去王安石故多結附徃時異論之人欲以為黨唐坰乃上書薦惠卿天下竒才蓋坰適過揚見惠卿其事可知禧自為中丞昨日方請對情狀已露王珪曰頼陛下早辨上曰履霜堅氷至由辨之不早辨也豈宜更在此位張璪曰今日即欲别除一官安禮曰禧號能治邊或授以帥為宜上曰雖稍加進寵與外任無害安禮曰事君者不可以貳茍貳焉無所不至禧尚是知縣資序陛下拔擢過分宜何以為報而懷姦若此上曰禧何曾有資序自布衣即擢至此禧事惠卿如父如禧今日殺身可也豈知論報安禮曰禧論鄧綰非才不當除知永興軍上曰此亦用惠卿之意也故雖改綰青州亦罷禧中丞仍詔中書省命詞止云門下省關掌出納命令之重故選才換授勿言禧不當處言職也命詞㨿御集詔新除左右僕射用壬辰日赴尚書省行禮上儀王珪言故事中書進熟進草惟執政書押今官制門下省給事中獨許書畫黄而不得書草舒亶疑之因以為請上曰造令行令職分宜别給事中不當書草著為令三省言九寺三監分𨽻六曹欲申明行下上曰不可一寺一監職事故分屬諸曹豈可專有所𨽻宜曰九寺三監於六曹隨事統屬著為令詔河東都轉運使陳安石前奏請施行和糴鹽礬坑冶之類已成倫序今召除尚書户部侍郎其職事委莊公岳蔡曄恊心委力奉行安石在河東盡用薛向鹽法告捕嚴宻鹽課增羡又奏更河東和糴法官不支錢五嵗一弛以予民當安石使事時公家有入而無出及安石去遂不弛和糴也朱本削去安石盡用薛向鹽法已下數十字以為前史官載此意謂兩取於民然無照㨿新本亦從朱本今復存之辛卯起居舎人蔡卞兼權國子司業樞宻都承㫖張誠一兼權太僕卿東上閤門使曹誦兼權軍器監以手詔近縁差除罷主判處新官未到如太學之類可速差官權領恐無官總治官局廢事也上欲以蔡卞為侍御史知雜事蔡確王安禮皆以親嫌為請上曰嘗面諭卞卞亦以此辭其人有守必不肯比附張璪日卞識義理誠如聖諭上曰君臣之義報施而已古人待我國士我故國士報之至於豺獺亦有報施如徐禧者可謂不知報施矣王安禮曰禧志行如此已為陛下所察莫若明示貶斥使天下之人知陛下好惡所在蒲宗孟曰若只令為給事中恐不足以懲勸上曰且待其不悛當在顯黜上因言昨陜西初有師期李稷奏運糧夫已備及師行夫數甚不足蓋稷所奏文具耳無實也稷所言多欺妄幾誤朝廷大事稷吕惠卿所薦人物甚似惠卿可誅好大言無誠實外似剛直質極汚邪王珪曰稷深為惠卿所知惠卿奏乞避蔡承禧乃言執政知臣與承禧有隙授以淮南意在撓臣不知承禧之除出於陛下安禮曰承禧何足畏惠卿居喪有何事令承禧得以報怨上曰惠卿性極貪鄙閒居不免私汙干擾州縣慮為承禧所持所以心不自安上因議陜西兵食謂執政曰康定中西鄙用兵契丹乗閒有所要請仁宗御延和對輔臣至於感憤涕泣朕為人子孫守祖宗神器每念付托之重宜如何也因改容泣下羣臣震恐莫敢對上批自頒行官制以來内外小大諸司及創被差命之人凡有申禀公事日告留滯比之舊中書稽延數倍衆皆有不辦事之憂未知留滯處所可速根研裁議早令快便大率止似舊中書遣發可也於是三省言尚書省六曹如吏部尚書左右選舊係審官東西院流内銓三班院户部左右曹係三司司農寺舊申中書省今合刺都省其應奏及本部可即施行者並如舊内外諸司皆凖此可申明行下已上朱本與墨本同上以命令稽緩語輔臣頗悔改官制蔡確等慮上意遂欲罷之乃力陳新官制置禄比舊月省俸錢二萬餘貫上意遂止此㨿蔡惇官制舊典附申禀留滯下詔秘書省殿中省内侍省於三省用申狀尚書六曹用牒不𨽻御史臺六察如有違慢委言事御史彈奏其尚書六曹分𨽻六察詔沈括李憲苗授㨿環慶路經略司奏蕃官阿齊言夏國母自三月初㸃集河内西京府羅彭界甘肅𤓰沙十人發九人欲諸路入冦人馬已發赴興州及四月丁丑西賊二萬餘人騎侵犯淮安鎮自去嵗興師以來惟患羌賊廻避官軍致不能大有尅獲賊今果如所報則中國正得良便機不可失惟要探報得實凖擬有素以本路兵馬合成大陣守控要害伺其深入痛行掩殺則我用力少而收功多矣癸巳召輔臣觀麥于後苑新舊紀並於癸巳書作尚書省當考二月五日命宋用臣當并考分命大理少卿王衮斷刑韓晉卿治獄河東經備司言豐州屯駐神銳指揮千餘人薛義所部照應修葭蘆寨王安等百餘人鼓動軍衆擅還豐州及恐喝指揮使張臻言不遜内捕獲十六人張世矩已陵遲處斬其餘人見捕逐詔續捕獲人但嘗逼嚇指揮使出不遜語證左明者並處斬更不得推究為首人家屬應縁坐者押赴豐州處斬其同居骨肉依編配法其後經略司言安等已斬莫知為首者而安有母年六十二上特貸之詔沈括可移報曲珍如本路兵馬自足防捍勿與薛義一將相近恐因而黨扇有壞紀律詔京東路轉運司聞徐沂二州去年已災傷失於檢放今夏旱災本司亦未容百姓陳訴分析以聞甲午降授通直郎權管勾河東路轉運判官蔡􅁮權發遣河東路轉運判官實録如此疑冇誤字或權管勾又下權發遣一等當考吏部尚書李清臣等言今月壬辰賀僕射上尚書省百官方就班臺吏相繼趣臣等就列三院御史及中丞久不至臺吏復至臣等立位前賛云且歸幕次在庭觀者亦或竊笑按御史中丞班品在學士下合班即對引無先令學士尚書侍郎就列然後報引中丞之儀况三院御史班品不同竊慮立班不應在尚書之後乞送臺吏付有司根治詔吏人令御史臺勘罰御史臺言尚書左丞蒲宗孟右丞王安禮賀僕射上尚書省於都堂下馬檢㑹三省執政官上下馬儀範尚書左右僕射許至都堂左右丞於本㕔今官府雖寓局縁各有擬定聽事案宗孟安禮身為執政當朝廷董正名分之初宜身先百執遵行憲度乃率先違法犯分羣工庶尹何以觀仰請付有司推科安禮爭論上前以為今日置左右丞為執政官不應有厚薄左右丞於都堂上下馬自此始上謂輔臣曰雖周之盛時亦以為才難惟能以道汎觀不拘流品隨才任使則取人之路廣茍不稱職便可黜逐不可為已與之官禄反以係吝而難於用法如臣下有勞朝廷見知雖有過失亦當寛貸若吳居厚使京東治財數百萬設有失陷官錢二三千緡其功自可除過故律有議賢議勞之法亦周之八柄詔王之遺意然有司議罪自當守官誅宥則繫主斷如此則用人之道無難矣六月十六日居厚自運判改運副乙未三省言侍郎闕官王安禮曰聞張問雖老精力尚不衰或可任上曰問好為異論知滄州上言本路嵗饑民有流移者茍免常平助役之苦以得流亡為幸蓋論議多出於韓琦所以如此太常丞闕王安禮曰王古如何上曰古亦好異論張問知滄州在熙寧十年二月詔除杭睦蘇湖秀常潤温明台十州買撲場務積欠淨利過月錢三萬餘緡從司農寺丞韓宗良請也詔三省樞宻院自今應入進文字自來用押字者並依三省例書臣名又詔直翰林醫官院至祗候依舊更不改換其現在太僕丞至流外主簿並罷仍今後更不除授令詳定官制所立法以聞先是官制所定到改醫官院為翰林院惟使副尚藥奉御依舊外直院而下𨽻大醫局今復如故六月癸亥翰林醫官院改為翰林醫官局副使以下如舊詔應支給軍前漢蕃士卒特支犒設并醬菜錢等如三日不支其轉運司及合支官司並當除名又詔逐路走馬承受凡遇差發軍馬出入仰常切體量人情如士卒私自賠費及將官措置乖失並仰宻具事由聞奏如敢不獲時聞奏致朝廷察訪得知當與所犯人均責丙申司天監言七月辛巳為出兵吉日詔進兵日依李憲所奏初憲言五路軍馬㑹合之地逺近不齊不可一一擇日雖擬七月辛巳中軍起發為凖竊慮未協全吉乞下司天監詳定故也㨿宻院時政記十四日乙未李憲奏五路軍馬㑹合欲定七月二日進發恐選擇未協全吉乞下司天監再加詳定十六日丁酉太史局奏今集衆官定奪將本京六壬加臨得七月二日日辰辛巳具出兵吉日同三省奉㫖進兵日依李憲所奏實録並載二事稍與時政記不同姑附注此知淮陽軍奉議郎趙卨知徐州丙午罷涇原路制置司言牒鄜延路四軍環慶路兩軍火頭並於禁軍歩人内差其傔役輜重無廂軍以義勇保甲充恐未肯依應乞降朝㫖從之詔陜西都轉運司運糧應副軍興於諸州差雇車乘之人所過州交替人日支米二升錢五十至縁邊止運糧出界止差廂軍仍曉諭人户知手詔沈括聞官兵往葭蘆寨城界前知甚有逃竄部落止在寨外三兩程存泊若不大布恩信廣行招徠深慮大軍引還結集入寨作過可令曲珍多方展轉開導恩意招安許與依舊住坐仍首領等第補置官職丁酉奉議郎試起居舎人兼崇政殿說書蔡卞試侍御史知雜事卞力辭之復為起居舎人卞力辭據卞𫝊并書之十一日可考詔河東路經略司指揮軍馬并麟府豐州刺得西賊實屯聚處即量力大小選兵將掩擊如蕃户非時自被抄略願讎賽者聽詔五品已下官應得㫖改官並為敕授手詔沈括所上邊略可畫圖二本逐一貼出一繪即今賊界地形戍壘一繪將來成就邊形務要得實異時悉可案圖考驗不差勿得增飾减損戊戍上批御史不可久闕新除蔡卞知雜未就職縁闕員甚多不可悉令奏舉宜詔兩省官各舉敏明不撓可為御史宣德郎以上員各二人限一月聞奏新紀書戊戍詔兩省官舉御史各二人舊紀不書己亥詔翰林學士兩省官見執政官議事並繫鞋六曹尚書以下見執政官並靴笏辛丑詔陜西路都總管司涇原進築城寨財用雖已略具尚須措置諸路團結兵馬已令制置司未得勾抽先差發將兵並就近裏歇泊縁涇原事所差文武官並發歸原差來處初陜西轉運司以役兵不足用下諸州和雇運夫永興軍奏凖詔諭民不復調夫出寨今漕檄雇夫非科差不可從之則違詔不從恐誤師期詔如前詔而使者亦還奏其不可進築遂議罷兵故也朱本簽貼云時吕大防為使院提舉而大防甞知永興軍故前史官妄載此語並無照據合刪新本從之按吕大防行狀有此今復具載給事中舒亶言吏房前後發李規王務民奏鈔令臣書讀侍郎王珪已書省審坐違式舉行但勘罰令史縁奏鈔皆王珪書名自合省問豈容但稱不知歸罪令史自非執政大臣怙權擅事輕蔑朝廷即是吏史憑附大臣沮壞法令陛下新正官名而上下横厲如此不治其微實恐陛下復古建事之意或成虚名為天下後世所議詔承行吏人送門下省别加重罰同提舉成都府等路茶場蒲宗閔言成都府路産茶縣及利州路興元府洋州已有𣙜法今相度巴州等産茶處亦乞用𣙜法從之詔新築葭蘆吳堡寨其合用兵馬并戰守器具糧草等並令河東路經略轉運司管認以客户寨已裏堡寨事力那移應副其見闕寨主監押等使臣仰經略司速選差五月二十一日辛丑太原府路鈐轄薛義等奏凖朝㫖部領兵馬照應鄜延路總管曲珍沿路累逢西賊接戰鬭敵臣等驅遣軍兵殺退西賊斫獲首級及焚蕩族帳奪到牛馬羊畜器械等奏聞事今檢㑹近曲珍奏已修葭蘆寨了當同三省進呈奉㫖令張世矩指揮薛義等歩領軍馬放歸元差來去處更不前去照應薛義見十三日當考六月四日甲寅奉㫖鄜延路昨修葭蘆寨將帯軍馬興工救築與客户寨隔河相對自可體採照望其薛義等自合便取直路往彼豈可迂囬却尋葭蘆故城前去及稱不見鄜延軍馬却囬顯是觀望不進及奏上不實仰河東轉運司依前降指揮即速取勘結案聞奏其張世矩及薛義下得功使臣等令疾速具功狀聞奏六月十七日丁卯專管勾麟府路軍馬公事張世矩奏新修葭蘆寨乞將客户寨使臣二員并本處兵馬及石隰司都廵檢那移在葭蘆寨駐劄防托其張璨却乞依舊且令在石州駐劄照應葭蘆地并元舊沿河守把去處等事奉㫖葭蘆吳堡寨已令經略司管認仰軍馬司更不干預二十一日辛未太原路鈐轄薛義等奏凖轉運司取勘臣等照應修葭蘆寨觀望不進等事臣勘㑹先部領人馬前去入界累逢西賊鬬敵到葭蘆故城不見曲珍兵馬為所附糧料將盡去回入界準本路經略司牒方知於客户對岸修葭蘆寨又般請糧料前去本寨見曲珍留下將兵李儀等㑹合訖臣等元初只知修葭蘆故城若知於客户對岸修築只縁黄河取直路倚曲珍兵勢易為㑹合豈却領孤兵深入賊巢日逢戰鬬避易就難乞委官取問一行使臣軍馬必見詣實同三省奉㫖送河東轉運使照㑹如委是詣實前降指揮更不施行薛義事當修入此皆宻院時政記所書也更詳之或依實録削去癸卯詔六曹寺監長貳以下如有公事已見不同許獨至執政聚㕔處具事狀申議環慶路轉運判官范純粹乞日嚴邊備又言至寧州見當職官言本州駐劄兩將自軍回後死者過五百餘人及有二百餘人疾病逃亡亦過二百餘人本將不敢盡申尋勘㑹寧州歇泊將兵係開封府界第七將京西第二將詔本將分析仍令本路經畧司體量朝散大夫降天章閣待制王克臣知單州克臣前知太原朝廷聞其不能盡心同力軍興沮抑有功將校姑息逃亡軍人縁邊五十餘次被西賊冦鈔並無措置將吏迕意即隂使捃摭過犯及他處事乖方奏事不實下河東轉運提㸃刑獄司體量得實故也雖㑹降免劾特降之詔葭蘆吳堡寨已敕河東路管認戍守縁隔大河慮西賊侵犯仰鄜延路經畧司以兵馬照管應援甲辰通直郎試給事中權直學士院舒亶試御史中丞詔涇原路經略司給封樁軍賞絹二十萬匹與轉運司凖備築城修堡鄜延路經略司言蕃官髙永能自言祖父知綏州日有已業田乞支撥上批永能忠勇有功可令自擇墳廟所在撥賜田三十頃仍令沈括摹其祖廟碑文來上永能伯祖文岯舉綏州來降祖文玉獨留居延州舊紀於甲辰書遣給事中徐禧内侍押班李舜舉鄜延路計議築堡障新紀但書遣禧丙午涇原路轉運副使通直郎李察權發遣陜西路轉運使同提舉成都府諸路茶場蒲宗閔乞自秦州至熙州量地里逺近險易置事車子鋪二十八招刺兵士從之鄜延路經略沈括副使种諤言凖朝㫖條具制賊方畧仍畫一具所乞城山界事今者涇原方議進討賊必未敢捨巢穴而固山界本路正當可為之時令具大意臣等厯觀前世本路戎狄與中國限隔者利害全在沙幕若彼率衆度幕入冦則彼先困我度幕往攻則我先困然而西戎常能為邊患者以幕南有山界之粟可食山界之民可使有山界之水草嶮固可守我師度幕而北則須贏糧載水野次窮幕力疲糧窘利於速戰不幸堅城未㧞大河未渡食盡而退必為所乘此勢之必然也所以興靈之民常晏然高枕而我縁邊城寨未嘗解嚴者地利使然也今若能使幕南無粟可食無民可使無水草嶮固可守彼若贏糧疲師絶幕而南頓兵沙磧仰攻山界之堅城此自可以開關延敵以逸待勞去則勿追擊則惜力治約之勢在我而委敵以空野堅城之不利又山界既歸於我則所出之粟可以養精兵數萬得彼之牧地可以蕃戰馬鹽池可以來四方之商旅鐡冶可以益兵器置錢監以省山南之漕運彼之所亡者如此我之所得者如此而又絶和市罷嵗賜驅河南之民聚食於河外彼將何以自贍更使之賂契丹結董戩乃所以交困之也山界既城則下瞰靈武不過數程縱使堅守必有時而懈縁邊修戰備積軍食明斥堠待其弛備發洮河之舟以塞大河下横山之卒擣其不意此一舉可覆也兼梁氏與䝉愛首為悖亂使一國之民肝腦塗地彼寧不猜怨獨以兵威刼束勢不得動耳急之則并力緩之則自相圖此曹操所以破袁紹也其當措置事候得朝㫖别具條奏又言昨條具制賊方略非謂展拓邊面而已蓋欲窮困賊勢窺其腹心須當盡據山界若占據山界不盡則邊面之患猶在沙幕尚為彼用若占盡山界則幕南更無㸃集之地彼若入冦須自幕北成軍而來非大軍不可如此尚當先擇嶮要之地立堅城宿重兵以為永計今按視塞北古烏延城正據山界北垠舊依山作壘可屯士馬東望夏州且八十里西望宥州不過四十里下瞰平夏最當要衝土地膏腴依山為城形勢險固欲乞移宥州於此舊宥州地平難守兼在沙磧土無所出先於華池油平築堡以接兵勢川路稍寛可通車運聚積糧草器具事事有備併力烏延先補山城山城完乃築平城此地膏美去鹽池不逺其北即是牧地他日當為一都㑹鎮壓山界屏蔽鄜延其銀夏州可置鹽監鐡冶錢監馬牧因險控扼候烏延工畢漸次計置仍乞將塞門寨以北石堡背水油平羅圍鹽池一帶為中路𨽻宥州米脂浮圖葭蘆義合吳堡銀州一帶為東路𨽻綏德以金湯長城領德靖順寧寨一帶為西路𨽻保安軍除本路九將外更增置四將以新招土兵分𨽻縁邊八將駐劄邊面次邊三將駐於金明青㵎城延州近裏兩將在鄜州河中府其縁邊八州𣙜客鹽自賣交鈔本為禁止青白鹽立法將來青白鹽池既歸我八州軍自可不食解鹽乞以鹽州𨽻本路就收鹽課應副縁邊兼糴買糧草除新克復州軍各係創增課額外舊來八州亦减得地里增饒錢貫萬數不少所有合計備事除本路及轉運司可以那移外乞朝廷應副錢萬緡廂軍萬五千人工匠千人遞馬百匹乞於近裏州軍應副生熟鐡五萬斤牛馬皮萬張車二千乘本司及轉運司備義勇保甲萬人應副以代禁軍有事役者又言朝廷若定議城守山界即乞趁涇原兵馬牽制及本路屢㨗之後乘勢興修若遲留月日即恐西賊有謀費力平蕩將來興修鳥延畢當復夏州則東西相望控扼山口其中路以東城寨盡在腹内來則制其衝去則斷其後七月七日丙戍并九日戊子云云并當考於是詔給事中徐禧内侍省押班李舜舉往鄜延路議邊事限受命後五日上道新舊紀遣禧往係之甲辰日手詔沈括近奏乞盡城横山占據地利北瞰平夏使彼不得絶磧為患朝廷以舉動計大未知利害之詳遣禧等往審議可深講經久所以保據利害以聞新知徐州趙卨依舊知淮陽軍以上批昨差趙卨知淮陽軍受命有日聞止在管城近改差徐州亦復偃蹇不赴卨安南敗事寛貸不誅尚懷觖望若不懲治則慢令之風將鼓動在位故也丙申趙卨知徐州丁未通直郎試吏部侍郎何正臣為寳文閣待制知潭州正臣為吏部職事疎畧所注擬多牴牾事聞正臣以制法未善為辭王安禮曰法未善有司所當請豈可歸罪於法故罷之田晝作安禮行狀載安禮論正臣姦囘汚衊士類今附見於此更須考詳先是上問安禮曰近事有可言者乎安禮曰朝廷建文昌一代官制以法先王當遴簡人材以處之顧有姦回如何正臣者乃得周旋其閒豈不汚衊士類上頷之他日上臨朝謂近臣曰何正臣如何人也王珪曰臣不知其為人安禮曰王珪為元宰而二三從官安得不知且正臣姦回天下能道之而珪曰不知者何也上曰可黜知宿州正臣主蔡確確時以祀事出齋珪曰請與確議確入改知潭州何正臣傳云其在長沙也詔州縣募民常課之外願以貲輸官鹽者聽而吏或推行失指正臣疏利害上之謂鹽事施於湖南不徒無益於民亦不足以佐邦用詔可其奏俗便安之戊申詔陜西都轉運司已支司農寺錢二百萬緡内藏庫銀三十萬兩鹽鈔二百萬緡可均給諸路鄜延環慶涇原路委轉運司秦鳯路委都轉運司熙河路委經濟司乘夏熟於縁邊市糴軍糧封樁以須軍事庚戍詔諸司供報修注事自今不供起居院直供編修日厯所其關報日限依二年王存所請安化州蠻䝉全聖羅世念等帥衆攻德謹寨知宜州王竒領兵至天河寨禦之期翌日與蠻戰是夜裨將費萬竊出黄泥隘遇伏力鬭箭盡墮江而死竒汾州人也七月五日甲申奏萬以五月三十日庚戌戰死今附本日六月辛酉丁卯己巳
