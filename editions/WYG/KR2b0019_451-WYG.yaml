body:
  text: 續資治通鑑長編巻四百四十七宋李燾撰哲宗元祐五年八月庚戍龍圖閣待制樞宻都承㫖王巖叟權兵部侍郎范純禮為賀遼主生辰使引進副使王舜封莊宅使張佑副之吏部郎中蘇注戸部郎中劉昱為正旦使供備庫使郭宗顔西京左藏庫副使畢可濟副之巖叟以親老純禮以病辭改命中書舍人鄭雍權工部侍郎馬黙黙又以病辭改命吏部侍郎天章閣待制劉奉世奉世復辭又改命太僕卿林旦最後郭宗顔亦病詔西頭供奉官閤門陸孝立代徃二十四日改命鄭雍馬黙二十八日又命劉奉世九月一日又命林旦十月二十六日又命陸孝立代郭宗顔今并書之戸部尚書梁燾給事中朱光庭累乞外任左諌議大夫劉安世乞宫觀詔以燾為龍圖閣待制知鄭州光庭為集賢殿修撰知同州安世為集賢殿修撰提舉崇福宫光庭尋以妨嫌改知亳州改亳州在二十二日今并書初除安世中書舍人安世言代言之任素號才難如臣空踈實為虛受而又向者屢曽論列鄧温伯罪惡不當復在朝廷累月于今未䝉開納方俟譴逐乃叨遷陟臣之自處固已難安盈廷公言何可不畏况臣久嬰疾病氣體衰羸已當奏陳乞一宫觀差遣伏望聖慈收還誤恩檢㑹前奏早賜俞允以安愚分所有告命不敢祗受詔不許辭免安世又言臣待罪諫列曽無善狀既有言責義在盡忠而自春迄今論事不效旋以疾病久廢職業謂宜罷斥以副清議更䝉褒擢實累政體伏惟陛下黜陟多士務存至公任用羣臣不違所學願察孤危之志俾全出處之宜又不許安世又言臣固執鄙陋未即奉承者其説有二自昔臺諌論事必以邪正為先蓋君子小人消長之機繫天下國家治亂之本臣論列温伯至於累章卒不能囬是為失職固當罷免以戒曠官更被褒遷重得罪於清議此臣之所不敢也舍人之任實代王言分押六房預聞機務非博學能文逹於政事者孰宜為之臣屬辭非工訥於應用記聞衰落不練舊章一旦叨居必速官謗此臣之所不能也既有所不敢又有所不能惟是二者義難冒處伏望陛下察臣至懇追寢誤恩檢㑹累州事理除一宫觀差遣庻安愚分不累明時又不許仍遣中使問勞賜食諭令就職安世固不受詔閤門以中書舍人告就賜安世仍放謝安世固不受詔令依前降指揮安世又言臣聞賈誼之論以謂上設禮義亷恥以遇其臣下不能以節行報其上者則非人類也陛下之待臣者至矣而臣之所以報陛下無有他能惟思砥節礪行進退出處之際不為天下清議之所棄庻㡬無負兩官㧞擢之恩爾臣論事亡狀方俟黜幽久病未瘳自宜避位更䝉進職愈重不遑是以屢凟天聰願寢新命聖慈容貸累加諭訓臣若於恩禮勉强奉承行不顧言利勝於義則報上之節䘮矣陛下亦安用之自來臣僚凡有除授分所當得惟以禮辭朝廷必使受之無不可者如臣今日所請直以義有難安寜伏稽慢之重誅不敢順命而茍止貼黄稱臣竊慮朝廷以臣嘗備從官不欲遽置散地必假一郡以示恩禮然臣卧病累月身心衰耗實難彊勉以修職事兼臣母老多病不能出京俟君命已行旋且辭免深恐愈成煩凟伏幸聖慈曲從臣請止除一宫觀差遣任便居住庶得上供親養下就醫藥詔不許安世又言今朝廷之姦邪尚在愚臣之疾病未瘳豈敢更竊寵榮干犯清議惟陛下全臣節於今日責臣報於異時於是詔從安世所請與梁燾朱光庭同出燾光庭所以乞外任皆為鄧温伯故也梁燾朱光庭辭免尚書給事累奏當檢附燾初逼以禮恩受命顧於義未安既經坤成上燾退即伸前請甚力光庭始不為此計而衆責交至遂繼之輔臣於簾前先擬燾直學士至光庭安世吕大防曰此二人若除待制恐優欲與修撰劉摯曰於法自侍郎至諌議大夫若除他官或外任者並换待制大防曰鮮于侁自諌議大夫换修撰摯曰舊法在一年内者如此於時未有並换待制之法今則有正條大防曰恐今後皆訐直以取美官而去摯曰如此則是以言事責降縁已經昨來一畨升遷燾為尚書二人為給舍矣大防曰誠如是恐稍優則二三人必未肯受又辭免紛紛太皇太后諭曰誠是誠是且除修撰不乆别與差遣許將進曰二人既罷待制則燾獨除學士如何大防曰亦須比類一般遂改待制既奏他事畢摯再奏曰未委三人作平詞作責詞諭曰豈可作責詞摯曰且如此只作平詞相次别改職名遂退此用劉摯日記増入摯嘗自叙云去年秋八九月間摯為中書侍郎内降一角付中書省乃尚書省畫可二狀其一裁减宗室冗費其一裁定六曹吏額户房請封送尚書省摯曰當時文書作録黄過門今封送何也曰尚書省如施行已乆尋常奏狀後帖云乞付尚書省今忘帖故降中書爾摯曰畫可付中書不依敕令行之便否曰欲問過尚書省當如何許之本房帖子云内降二狀云云未委作録黄直送都省都省類此事者見今用何法如何施行初自上臨政以來凡賦取於民皆有藝向之官吏横斂重賦一切罷之然國之用度尚如故有不給之憂故議裁節冗費置局於户部及令門下中書後省减定諸司吏額後省取索禀議逾年事垂成矣都省封樁房令史任永夀者强明有心計元係外司吏人指取入省素與三省吏不相能而深嫉其朋黨故宻具内外諸姦弊囊槖根株投諸宰執而遂大為吕大防委信乃令専總裁省之事永夀有知慮恐孤不可立即拔都事時忱吏房主事蘇安静守當官時惲同領其事盡收户部後省之所上置吏額一房於都省指射司空府為局其所裁定誠為詳允但二三人性資邪狡又事權寖熏灼數數挾寵作勢出語以脅衆於是人皆惡之毎入文字永夀持至兩省畧指說大槩請同書進入乞付尚書省本省用白敕行下至是得中書貼子後三日永夀至曰得丞相㫖令兩省各差人吏赴吏額局同行遣摯始覺永夀有交鬭即語之曰本為内降二狀未知合如何施行故令問之豈是欲與兩省吏人為地使就都省分功邪誣妄之語間相公帖子如不欲報即留下永夀恐曰不敢如此内降二狀依常行不妨遂作録黄行出居二日永夀又特一劄子藁至曰吏額房文字昨來為要謹宻而速故如此直行然未有法令欲作三省同請應吏額房裁省事依致仕官文書行遣例所貴得一指揮遵守摯曰昨為乞致仕者經厯迂滯多使不及被受而亡故去年門下直付都省貴行之速也今裁省事恐不必務速而廢法若曰欲謹宻則一省豈獨不謹宻乎候與三省面議又累日大防袖此劄草示摯曰此事且與了之摯曰諾而猶不知大防之見疑也未㡬中書奏留得替法司劉唐叟已得㫖而右司晁端彦王古與令史任彦妄以此獻大防以為方議减吏而留之是増吏也而不知有法也大防得此喜執詣都堂聲色俱厲見問摯徐答之曰中書依條耳乆之曰待别商量既去右司以帖子問唐叟願不請劵則可唐叟規於在職待遣無所計兼亦知其意遂不敢辨供狀只就本俸尚書省再畫㫖如此非法也摯於是知大防怨之深用是見報爾既見報摯又不校一切事定矣未㡬摯遷門下而吏額事畢四人論功考功依條以减年有差上之而都司皆不用擅擬優例永夀即前後功換班行忱改官安静减三年先次補都事惲减年磨勘於是外議沸騰以謂吏額自是後省行遣逾年畧已有序臨欲成就而永夀軰欲去所以兩月而畢雖比後省有所増損而原根本在後省其成十之八九矣今酬奨太優中丞梁燾諌官朱光庭劉安世御史孫升賈易次第交章論其非四吏者皆被裁止用考功元擬於是大防疑滋甚蓋言路三四子皆昔摯臺中所與故也頼三四子不知摯之嘗所爭者本為敕令不經中書門下給舍皆不預聞耳而止彈忱軰怙權賣威都省聼其邪說以優賞徇之如此而已繼又擊都省不守法與吏同姦請斥之積數十章其言寖惡稍上及宰相日奏不已六曹等處被裁之吏又爭有所訴案此句下原本誤接蘇轍奏議中山溪重複云云共一頁餘其以永夀軰有私句以下共四頁餘誤左己未詔南北外之下前後錯簡今互審文義校正以永燾軰有私摯於上前委曲陳說以為冗吏冗費理合裁省今吏額所定粗得平允惟是被减之人不能無憾故造作謗議然事初如此乆則定矣忱軰誠不堪然本是置局主裁省者也今若痛治忱等以及郎官則不惟快怒者之心而今後徼幸不復可制一切當姑息有害政體常以此意奏之然簾中盡知忱軰從來之惡必欲逐之故四人皆出而忱安静猶得堂除都司皆無恙訴者皆不行大防見摯於此事有力則喜屢為四都司及對客曰兹事非劉門下不易平出此言欲摯之知也然訴者亦因摯而不行怨有歸也摯之拙常如此事雖已定然大防怒言者刻骨思甘心焉而未有以發議者亦以謂言路之禍自此始衆口一詞未㡬有温伯之事及今日制下外論曰可謂一網盡之獨孫升者前此上諭謂其忠直能言事可遷侍御史以故雖與衆同事晚方請罷亦不切故不去欲其去者亦不甚擠之前論都司升語最直故曰能言事殆以此及進呈孫升再乞黜温伯狀其貼黄曰風聞文彦愽臨行遍語宰執曰温伯之召却是彦博屬中書侍郎擬進今既人言不受莫若罷之有以知温伯之命非二聖意也孫升狀見六月辛丑自燾等遷尚書後凡言温伯者章皆不下忽降此章大防與傳堯俞亟入一劄乞辨明亦付外初議籍籍以西京韓縝與温伯議姻患於相逺故抵書堯俞俾召温伯堯俞韓氏壻故也縝家有乳媪出售於從官家漏說此事又云黄景丁憂居彦博之第常見彦愽景故善温伯屢請曰温伯冝召還故彦慱以語堯俞彦愽非欲温伯歸特以景所屬也又云喬執中有女許温伯之姪姪孤從温伯執中累以干堯俞積三禱於懐故敢倡端而升之言蓋得其粗也今日堯俞避此事告假既進呈大防說欲詰升以言之所從來此蓋又有疑心簾中屢笑而不答乆之曰彦愽曽與宰執說否大防曰何曽說此摯曰彦愽果有所禱於人則彦愽豈肯與人說諭曰此不消理㑹許將亦曰誠無可根問又二日堯俞乞辨明狀進呈諭曰外議有多少般數言事官出於風聞必料無此事堯俞即曰既䝉辨察臣更無所論摯與大防辨吏額房事已附五年六月末先據蘇轍遺老傳龍川畧志并奏議及劉仿王知常所編摯行實編修後得摯日記叙此事尤悉今並存之雖文字重複兩見之要無傷也御史中丞蘇轍侍御史孫升言燾等不當出轍一奏升三奏升言伏見梁燾朱光庭劉安世三人並從外補三人極言切諌者意在愛國尊君明至公大義於天下後世而已臣不量螻蟻之力冒凟天聰至於再三與三人之意無異也今三人者既去則㣲臣豈能自安伏望聖慈憐察孤忠罷臣言職少慰公議皆不報一奏三奏據王巖叟繫年録升言増入王巖叟繫年録巖叟封還鄧温伯除名不效臺諫交攻不已巖叟乞辭中書舍人五月十八日除龍圖待制樞宻都承㫖二十六日以梁燾為權户部尚書朱光庭給事中劉安世中書舍人殿中侍御史賈易國子司業諸人皆不受命賈易以中間引避子由為獨坐與三人少異先除淮南提刑三人辭之再三一日遣中使押况之公掞受告器之以在告遣使賜食問勞况之公掞既至殿門又遣御藥陳衍宣諭特諭况之語良乆二人不得已受命又押赴省供職况之即於謝劄便言候過坤成再有所請八月况之出以龍圖閣待制守鄭公掞以集賢殿修撰守亳器之以集賢殿修撰提舉崇福宫留京師侍御史孫升獨不去然亦論之至再三御史中丞蘇轍一論遂已閤門言景徳祥符寳元熈寜中朝廷委近臣梁顥李宗諤陳彭年張知白李淑宋敏求同閤門官修定儀制行之已乆頗為詳備至元豐四年諸司敕令式所釐為儀式令敕比之舊儀不無闊略請委官與閤門官以舊儀制圖䇿并見行儀式令敕司㸔詳修定不分儀式令敕仍舊為閤門儀制詔樞宻院都承㫖王巖叟祕書少監王欽臣同閤門官修定舊録云先帝分修法體制曰禁於已然之謂敕禁於未然之謂令設於此而待彼之至之謂格設於此而使彼效之之謂式敕令格式由是始明元祐百度更張閤門亦附㑹廢革新録辨曰敕令格式已備載神宗實録閤門附㑹何足為一時輕重皆不必書今刪去兵部言將副押隊差赴别路權駐劄者其般家人比赴任接候人數三分减一仍並差廂軍從之新無甲寅前東京路轉運副使范鍔督捕軍賊有勞特詔奨之七月二日鍔已除金中吏部言官員犯私罪若老疾差替者依近敕便令罷任外其公罪差替願罷者聼從之乙邜吏部言官員在任除差出應副軍期及河防危急等事外應差出州界毎考通計過百日者所餘月日並不理為考任從之丙辰客省使嘉州刺史王光祖為太原府路副總管先除知邢州以御史中丞蘇轍言光祖昔知瀘州用刑惨酷買金虧價不可以長民故有是命著作佐郎兼侍講司馬康直集賢院管勾崇福宫以病請也六月四日除左司諌病不能拜九月六日卒十六日贈諫議専切措置湖北邊事司言第七副將内殿承制案原本作丞制考宋史職官志無此官名當是承字之誤今改正王安父子領兵攻破銅木賊寨更入歌新峒皆為賊所殺伏望優與推恩以勵效死之士詔王安贈皇城使遥郡防禦使諸子與六資恩澤賻贈有差令鈐轄司差人送其家屬歸郷刑部言提刑司上下半年申奏諸州盗賊帳狀内開說獲未獲比折等事乞著於式從之新無御史中丞蘇轍言九月末再論渠陽蠻事劄子云前月二十四日面進劄子論義問處置乖方即此劄子也今附本日臣竊見朝廷近差唐義問處置渠陽寨夷人事議者以為義問文吏無他才能不習邊事去年受命廢渠陽軍為夷人所圖窮困危蹙計無所出時知沅州胡田在圍中為設詭計詐欺諸夷言義問當為奏復軍額及乞為酋長改官夷人信之聚聼事前監令發奏義問假此僅得脱歸尋遣急遞追還前奏言既不驗諸夷具知其詐後來毎毎作過義問指揮沿邊不得申報今來朝廷復以邊事専委義問七月六日委義問専切措置邊事深慮無益有損是時臣以未知義問為人既見朝廷再加選用疑亦可使今訪聞邊奏沓至義問所遣東南第七將王安入界陣亡其所陷沒將校非一臣方知衆議果信不妄兼訪聞得見今作過揚晟臺等手下兵丁雖止五六千人然種族蟠踞溪峒衆極不少晟臺桀黠屢經背叛慣得姦便加以山溪重複道路嶮絶漢兵雖有精甲利械勢無所施若措置得所本無能為或經畫乖方實亦未易撲滅義問前來舉動已為蠻中所輕今復經敗衂實難倚仗蓋古今命帥必因已試之效内為兵民所信外為敵人所畏威名已著故功效可期今警急屢聞死傷已甚謂冝别加選任以遏㓂攘臣竊見知潭州謝麟屢經蠻事頗有勤績溪峒之間服其智勇衆議皆謂欲制羣蠻未見有如麟者伏乞指揮宻院檢㑹麟前後履歴功狀如衆言不虚乞賜委用庶㡬蠻㓂可速平定臣區區憂國輙採公議以補萬一貼黄湖北渠陽與湖南蒔竹本覊縻徽誠州也訪聞昔雖置為州縣然與沅州等處事體不同蓋沅州等處昔皆用兵誅鋤首領或徙置内地蕩平巢穴故所置州縣乆逺得安今渠陽蒔竹雖名州縣而夷人住坐一皆如故城池之外即非吾土道路所由並係夷界平時軍食吏廪空竭兩路今欲舉而棄之實中國之利也然其兵民屯聚商賈出入金錢鹽幣貿易不絶夷人由此致富一朝廢罷此利都失此其所以盡死爭占而不已者也自來廢罷堡寨全䕶兵民捍禦追襲其事非易况今夷人阻截道路兵未得進若不得良將處置實恐為患不淺又其種族遍據諸洞跨陟湖南北廣西三路凡有措置當使三路同之只如渠陽蒔竹唇齒相依若渠陽先廢羣夷併力以攻蒔竹勢難獨存今朝廷獨使湖北處置疑其事有未盡今若别遣官經制宜令通管三路邊事所貴諸處利害不至牴牾丁巳刑部言犯罪㑹恩及去官應原而特㫖猶推者雖又㑹恩及去官推奏如㫖從之又言捕盗官比折條内強盗及殺人如係朝廷専立賞收捉者除徒黨外其為首及以次兇惡之人並許理賞仍不比折者聼從之大理寺言寺丞有闕乞於司直内通行差權從之仍於承務郎已上選差己未詔南北外都水丞並三年為一任按都水丞以下原本誤在蘇轍奏議中慣得姦便加以字下今校正御史中丞蘇轍言臣伏見今月三日詔書節文以皇帝尚虚中壼令太常禮官参考古今典故著為成式臣謹按通禮納皇后最為嘉禮之重自天聖以來逮今六十餘年在朝官僚及太常官吏無復親經其事者兹禮至大宜加謹重竊見近嵗議太皇太后皇太后皇太妃寳冊冠服儀衛等事皆令翰林學士兩省給舍與禮官同議今來皇帝昬禮所以承宗廟奉兩宫子四海其事甚重伏乞仍令翰林學士以下共加詳議蓋謹始所以敬終而正家所以齊天下不可忽也庚申中書省請令翰林學士以下共議詔翰林院學士御史中丞兩省給舍與禮部太常寺官同共詳議詔遣陪戎校尉果荘於秦州居住詔河陽總管彭孫為潁昌府總管從其請也御史中丞蘇轍言臣近者面進劄子以唐義問處置渠陽蠻事前後乖方致東南第七將王安入界陣亡恐邊患滋長乞速選差諳知用兵之人往代其任又聞義問兵敗之後奏乞棄捐城寨與夷人講和其為暗弱謬妄取笑外國如此其事已著伏計朝廷必不復用然外人竊見召還彭孫妄意朝廷欲付湖北邊事兼彭孫亦以此自任羣議洶洶皆所不曉謹按彭孫刼竊之餘賊性不改前後委任欺罔貪盗靡所不為今若付以兵柄深恐塗炭湖北非州縣所能禁止蓋蠻人背叛不過侵撓邊城若使彭孫作過腹心郡縣並遭其毒前日誤用義問止於敗事今者若用彭孫凶嶮多端事有不可知者以臣愚見雖知朝廷必不肯輕用此人然衆所共憂不敢黙已若待用而後獻言實恐於事有損伏乞聖慈檢㑹臣前奏早賜施行貼黄臣竊以邊臣處事乖方軍民性命所繫差之頃刻所害不小今義問謬妄有跡敗衂已見而朝廷重難易置乆而不決邊民何辜坐受塗炭若非聖慈憫惻早與指揮臣恐湖北之憂未有涯也轍此劄子云前月二十四日面奏劄子論唐義問處置乖方既稱前月則此劄子必是九月所進今因彭孫移任即附見仍削去前月二十四日上云近者庶不相牴牾彭孫事未必是此當考御史中丞蘇轍言臣七月二十四日今月八日兩次面奏熈河路范育种誼等違背大信貪功生事以速邊患乞移降他路更選帥臣俾之鎮守臣方奏對間䝉太皇太后再三宣諭以臣言為是然至今多日但見种朴一人移涇原路勾當公事至於育誼並未見移動臣竊伏思念人臣言事不患聖意不囬患在聖意已囬而大臣固執事輙中止何者聖意不囬惟當再三開陳期於必悟若聖意已囬而大臣不可事不得行則是君權已移上下倒置雖欲納忠何益於事此臣所以晝夜憂懼欲言而復止者也昔齊桓公游於郭問郭公之所以亡其父老對曰以善善而惡惡桓公曰善善而惡惡此賢君也而何故亡父老曰善善而不能用惡惡而不能去此其所以亡也今陛下以臣言為是而不用以大臣為非而必聼臣竊惑之且陛下雖處帷幄之中實攬人主之事今依違退託専聼大臣事有未安誰受其弊故臣以為居其位而不任其事任其事而不斷其是非者古今未嘗有也臣以非才誤䝉擢用盡忠獻言上牾大臣下牾邊吏其所以再三論列不為身計者誠以為外可以利民而内可以報國故也今所言不從空結怨怒無補於國臣雖狂愚何苦而為此哉臣恐忠臣自此結舌不敢復以至言聞於陛下矣去年之冬陛下知囬河之失深詔大臣罷東流之役天語惻怛中外具聞而大臣奉行不得其半雖罷囬河之名仍存減水之實鋸牙馬頭率皆如故意幸漲水之至河或可囬然今日觀之終復何益是以衆議皆謂陛下聖明察物照見千里之外而號令不行未見成效是時臣奉使契丹還奏其事此章具在可覆視也今熈河邊事大畧類此若使聖意又為大臣所沮則君權愈奪臣勢愈張養之不已後將益甚及其事極難忍而後制之則傷君臣之恩失朝廷之體不若今制其漸使事無所失而臣亦獲安之為善也臣不勝區區為國逺慮觸冒忌諱甘俟斧鉞蘇轍遺老傳云初夏人來賀登極相繼求和且議地界朝廷許之本約地界已定然後付以嵗賜乆之議不决明年星多貝中以兵襲涇原殺掠弓箭手數千人而去朝廷隠忍不問即遣使往賜䇿命夏人受禮倨慢以地界為詞不復入謝且再犯涇原四年乃復來賀坤成節且議地界朝廷急於招納疆議未定先以嵗賜與之尋覺不便乃於疆界事多方侵求不守定約而熈河将佐范育种誼等又背約展築智固勝如二堡夏人隨即平蕩育等又欲以兵納趙醇忠及擅拒蕃部千餘人朝廷却不受西邊騷然轍力言其非乞罷育誼更擇老将以守熈河宣仁后深以為是而大臣主之擅招蕃部千餘人朝廷却之當考初太皇太后以轍累奏欲罷范育种誼等而大臣不以為然轍又面奏曰此軰皆大臣親舊不忍壞其資任雖其同列亦不敢異議陛下獨不見黄河事乎當時徳音宣諭至深至切然非大臣意至今不行人君與人臣事體不同人臣雖明見是非而力所不及須止且止人主於事不知則已知而不得行則事權去矣臣今言此蓋欲陛下收攬威柄以正君臣之分而已若専聼其所為不以漸制之及其太甚必加之罪只如韓維専恣太甚范純仁阿私太甚皆不免逐去事至如此豈朝廷美事故臣之意蓋欲保全大臣非害之也太皇太后極以為然訖不能用給事中兼侍講范祖禹上帝學八篇且言三皇之時至質畧矣伏羲始開人文神農以下皆有師聖人之徳莫大於學在易乾之六爻龍徳變化皆聖人也九二曰見龍在田孔子曰龍徳而正中也由學以聚之問以辨之故天下文明九三曰君子終日乾乾孔子曰進徳修業欲及時也至於九五飛龍在天則與天地合其徳日月合其明與四時合其序與鬼神合其吉凶先天而天不違後天而奉天時聖人之徳莫盛於此由學以致之也九二九五皆曰利見大人蓋非學則不能為大人故堯舜稽古垂衣裳而天下治聖學之效也揚雄曰學之為王者事其已乆矣堯舜禹湯文武汲汲仲尼皇皇其已乆矣學始於伏羲至於成王易詩書所稱聖人所述為萬世法由漢以下其道不純故可稱者鮮自古以來治日常少亂日常多推原其本由人君不學也恭惟本朝累聖相承百三十有三年四方無虞中外㡳寜動植之類䝉被涵養徳澤深厚逺過前世皆由以道徳仁義文治天下人主無不好學故也陛下廣覽載籍厯觀前世創業之主守文之君有如祖宗之皆好學者乎由三王至於五代治安長乆有如本朝之百年太平者乎今人有寳器且猶愛惜之恐其傷缺况祖宗百三十餘年全盛之天下可不務學以守之乎臣又聞學則必問問然後為學中庸曰君子尊徳性而道問學致廣大而盡精㣲極髙明而道中庸皆所以為天下法也堯有衢室之問舜有總章之訪動必咨於四嶽孔子稱舜之大智曰好問仲虺戒湯曰好問則裕學者聖之先務也問者學之大方也文王詢於八虞而諮於二虢度於閎夭而謀於南宫諏於蔡原而訪於辛尹重之以周召畢榮所以能成其聖也武王訪於箕子成王問於尹佚四聖維之衆賢翼之是以為太平之君子能持盈守成夫豈由他道哉惟彊於學問而已今臣所録八篇上起伏羲下訖神宗伏望陛下憲道於三皇稽徳於五帝軌儀於三代法象於祖宗集羣聖之所行體乾健之不息則四海格於泰和萬年其永觀矣范祖禹進帝學在五年八月今附月末
