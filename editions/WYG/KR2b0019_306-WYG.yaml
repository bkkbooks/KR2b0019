body:
  text: 續資治通鑑長編巻三百二宋李燾撰神宗元豐三年春正月乙丑朔開封府界第六將言差襄邑縣防河兵闕二百餘人已添差訖上批今汴流京岸止深八尺五寸應接向東重綱方得濟辦若便差人防䕶則無時可以放散况今水流調緩不須過為枝梧詔提㸃司相度據彼處堤去水所餘尺寸更行增長方聽上河己巳御史舒亶言銓院事無正條止憑吏人檢到例因縁或致姦弊乞委官一例刪定為例策詔銓院合施行事並編入敕令格式吉州言奉詔市箭笴三十萬既非土産及民間素蓄之物乞豫給錢限一年和市從之送伴遼使李琮等言大行太皇太后未葬恐使人以故事邀過白溝置酒作樂詔勿過白溝橋給樂人例物如故事辛未詔大理寺鞫罪人依開封府例報稽察司後大理寺乞旬具徒以上事報糾察司許之開封府凖此仍詔糾察司如察訪得雖非徒以上而出入不當許索文案㸃檢詔陜西諸路經畧安撫司差人深入體探夏人㸃集作過次第嚴飭守將過為隄備以上批聞夏人今春㸃集頗衆雖聲言欲討邈川及犯鄜延縁賊計多姦所向難測可處分諸路嚴飭守備故也廣南西路經畧司言劉誼已奏脩邕州城乞免土丁今年教閲以備來年差雇詔候脩築日被雇土丁與免教閲河北轉運判官孫迥言界河内北人魚船三十餘艘白晝肆行未有約束詔縁邊安撫使體量如數稍多即婉順止約癸酉池州司法參軍監中書制敕庫孫諤坐失察吏人漏落進呈條貫與外任合入差遣自今制敕庫監官依舊堂後官兼勿差外官熈寧八年八月二十三日諤監制敕庫楊時誌諤墓云諤自監制敕庫除吏房習學同編條中書條例習學一考當即真未閲歲丁父憂去職服除㑹罷習學官再監制敕庫仍多攝五房職事因議司農法駮其不當者大臣力主之諤猶反覆論不已忤其意又常叱堂吏語有所侵大臣聞而疾之造為訕上語以聞頼神宗仁聖察其無根得不坐㑹庫吏編進條目漏常程劄子三道諤已自陳再進矣大臣交詆之出為睦州司理參軍此墓誌所云罷習學官及駮司農法叱堂吏皆當考詔升許州為潁昌府張舜民云神宗自潁州郡王即位熈寧初升潁州為潁昌軍乆之知其誤遂升許州為潁昌府按升潁州為潁昌軍乃元豐二年八月二十四日九月十八日徳音非熈寧初也神宗初為忠武節度淮陽郡王後封潁王忠武即許州軍額郡王則封淮陽非潁州舜民誤也舊紀書升許州舊鎮為潁昌府新紀削舊鎮兩字詔大行太皇太后鹵簿不用䂍矟内臣二十四人捧梓宫上批聞陵下役兵至今未得特支及使臣添支亦過時不給致有質賣衣服者可下京西北路提㸃刑獄司體量有實即劾當職官吏以聞乙亥以大行太皇太后梓宫在殯罷朝謁祖宗神御分遣輔臣行事著作佐郎館閣校勘國子監直講滿中行為太子中允權監察御史裏行大理評事管勾崇福宫吕升卿復館閣校勘權判登聞皷院詔秦州鞫市易事除牽連得罪情輕外餘並不用去官赦原經制熈河路邊防財用言置司以來實收利入元豐元年四十一萬四千六百二十六貫石二年六十八萬四千九十九貫石朱本削此今從墨本詔開封府界京東西將副内各選一員赴闕傳授新降教格後又詔教大保長就王中正處看閲教法丙子徳音降潁昌府死罪囚徒以下釋之新舊紀並書龍圖閣直學士韓縝以河東分畫地界文字來上詔録付河東經畧司令帥臣親掌詔諸路將官滿三年無監司保明治狀差人承替中書堂後官周清言凖律謀殺夫者皆斬又條妻毆夫死者斬又十惡條四曰惡逆謂殺夫議曰自伯叔以下即據殺訖若謀而未殺自當不睦之條八曰不睦謂謀殺緦麻以下親凖敕其十惡中惡逆以上四等罪請凖律用刑其餘應合處絞斬刑並決重杖一頓處死審刑院刑部自來奏斷妻為從謀殺夫已殺案問自首變從故殺法者引舉輕明重法斷入惡逆斬刑詳律議妻謀殺夫已殺合入惡逆以案問自首變從故殺法合用妻毆夫死法定罪縁妻毆夫死者斬不言皆斬乃係相因為首從合依首從法減死止科流刑蓋為發心謀殺夫便得皆斬所以舉謀殺未傷是輕明故鬬已殺是重理同謀而未殺之法伏縁十惡條謀與故鬬殺夫方入惡逆若謀而未殺止當不睦既用舉輕明重合從謀而未殺法止入不睦條非是惡逆以上四等罪依敕當決重杖處死恐不可復得殺夫全罪却入惡逆斬刑乞加詳議申明下審刑院刑部㕘詳請如清議從之詔司農寺給坊場錢十萬緡下成都府造大駕鹵簿儀物先給五萬緡不足故也戊寅上太皇太后諡曰慈聖光獻新舊紀並書此辛巳詔改國子監直講為太學博士每經二人詔前䖍州瑞金縣尉張格放歸田里令開封府押歸本貫坐妄訟三司吏部及􅃒執政馬喧誖也監察御史丁執禮權監察御史裏行舒亶何正臣自劾赴景靈宫誤乘馬入偏門詔釋之執禮等固乞行法上批可依所乞從違令贖銅而命卒不下龍圖閣直學士韓縝言伏以為治之法圖籍為本臣竊覩陛下臨御以來内則講求典禮總一制度流斡財幣審核庶獄外則團結兵將討伐違傲開拓疆境經制邊用凡所措置悉該聖慮一有奏禀皆出宸斷及縁邊州軍與外界移文往往執為争端官司奉行之外初無編録之法官吏一易即不知本末臣愚欲乞應朝廷置局及專使被受朝廷措畫行遣事節可遵守檢用者并縁邊州軍與外界移文各令元差或見任官分門編類責以期限投進中書樞宻院檢舉嚴立漏落之法置籍拘管收貯詔嚴立中書樞宻院諸房遺失官文書法縝又言乞以分定地界壕堠鋪舍照用文字降付河東路經畧司從之保州言北界屢有移文理㑹修城乞自今三兩次移文回答一次從之上批髙麗國王每朝貢回賜浙絹萬匹須下有司估凖貢物乃給有傷事體宜自今國王貢物不估直回賜永為定數壬午詔左諫議大夫知陳州安燾赴闕押賜髙麗進奉使朝見罷御筵仍借給事中降前知江寧府司封員外郎吕嘉問知臨江軍嘉問前坐監司按修造違法等事奪職至是上書自辯又坐對制不實㑹恩止降差遣前勘官太常博士范峋太常丞彭汝礪坐推鞫不盡雖㑹恩各特奪一官元豐元年九月壬申朔嘉問自江寧改潤州十二月癸夘江東提舉司乞罷嘉問潤州二年四月庚戌罷潤州今乃以前知江寧責不知何故癸未增國子監嵗賜錢萬五千緡以國子監言嵗費錢三萬七千緡而所入纔二萬三千緡也又增開封府公使錢千緡録光州牢城兵士徐靖為三班差使殿侍充京東路多賊盗州縣廵檢下指使賞錢三百千靖執劇賊闞温特録之詔提㸃淮南東路刑獄范百禄罰銅二十斤坐知揚州江都縣王觀枉法受財轉運司遣官鞫劾而百禄擅止之也審官東院言大理寺丞申天規昨乞長吿訪求其父今已迎歸侍養乞許天規不候嵗滿朝見從之天規少失其父至是訪得之年百嵗矣乙酉御史中丞李定兼直學士院賜故知瓊州俞瑊家銀五百兩本路言瑊在海外六年不得代而死故優卹之髙麗進奉使栁洪等以海行遇風飄失貢物上表自劾詔降敕書諭以風波不虞開釋罪戾之意今據見存物投進仍詔明州先借髙麗主船兵工劾罪以聞館伴髙麗使所言使人以大行太皇太后在殯欲入見日繫黑帶上批巳易吉服在理難更再變若使人實有禀請委王存等婉順開諭止之詔北朝賀同天節使過界如在百日外聽作樂丙戌詔龍圖閣直學士樞宻都承㫖韓縝依權三司使例免赴崇文院宿直司封郎中提舉京東河北路鹽稅周革權河北轉運副使兼提舉鹽稅仍陞一任要考鹽稅事革初提舉當檢四月八日合㕘考都官員外郎李琮權發遣淮南路轉運副使去年九月八日琮治匿稅可掇取附此或巳附四月十二日可并入丁亥兩浙轉運司言温州民首納海中收得髙麗貢布等上批海洋飄溺之物理或漬濕破損豈能致匹帛短少蓋並海小民侵盗宜下賈青蘇澥於沿海州縣榜諭如𫉬髙麗貢物輙敢𨼆藏指揮後十日不盡首許人告十分給三分賞犯人計􅂍加凡盗二等隣保知而不糾減犯人二等賜保州錢千五百緡給犒設戊子詔審刑院刑部斷議官自今嵗終具嘗失入徒流罪五人以上或失入死罪者取㫖連簽者二人當一人京朝官展磨勘年幕職州縣官展考或不與任滿指射差遣或罷本年斷絶支賜去官不免先是熈寧十年嘗詔嵗終比校取㫖而法未備故也詔秦鳳路勇敢依鄜延路以百人為額隨正兵訓練每季升降仍依諸軍都敎頭格簡試收補己丑髙麗國謝恩兼進奉使栁洪副使朴寅亮等百二十一人見於垂拱殿賜物有差要録云初髙麗國人常至明州商販詔發運使羅拯經畫拯遣人浮海往諭其國王於是入貢命知制誥張璪詳定郊廟禮文詔世經等五人先以趙居逆節縁坐勒任朝叅今累經赦宥宜聽以見降官赴起居白虹貫日兩紀並書庚寅命檢正中書户房公事蔡京兼編修諸路學制詔都官員外郎知大理寺丞葉武送審官東院以御史中丞李定劾奏武同賈種民劾蘇頌種民增移事節而武不能察故罷之二年四月乙丑大理少卿寋周輔丞葉武賈種民同黄顔鞫事并此年二月己未壬戌手詔勒停人前梓州司户㕘軍姜適狂妄上書請還復大行太皇太后可保萬嵗比令有司主管供給以驗其方而逾所期日卒無少效罔上惑衆法固宜誅以其情非有他特示寛貸可除名勒停郴州編管適辟榖自謂有長年術館于金明池其方不驗故也詔京西差禁兵二百人守大行太皇太后陵江淮發運司乞自洪澤以南至龜山蛇浦以北創開新河詔權管勾都水監丞陳祐甫再相度計工以聞辛夘于闐國大首領阿凌典桑温等來貢方物詔國子監莊田屋租並𨽻逐路轉運司開封界提㸃司依錢穀數認見錢嵗送監羣牧司言收廢監租課等錢共百一十六萬緡有竒詔羣牧使韓縝副使張誠一並賜銀絹各三百餘共賜錢五千緡令樞宻院均給官吏太常丞充集賢校理黄㢘上編修南郊增損式壬辰詔羣牧廢監及諸軍班牧地租課積年逋欠遣太常博士路昌衡祕書丞王得臣與逐路轉運司開封府界提㸃司案租地依嚮原例定租課據嵗輸之物酌三年中界為凖及合納租見錢付逐司為年額若催趣違滯以擅支封樁錢法論癸巳熈河路經畧司言邈川城主温納木扎爾穎沁遣首領阿道等欵塞乞補官職詔補温納木扎爾穎沁為㑹州團練使邈川蕃部都廵檢使温錫沁為内殿崇班温僧拉摩為右班殿直並邈川蕃部同廵檢阿道為本族副軍主僧羅卜藏為羅斯結族都虞候月給茶帛有差新舊紀於嵗末乃書温納木扎爾穎沁内附詔給歸明人宫苑副使儂智㑹全俸以智㑹年老有功也禮院言大行太皇太后啟菆故事前三日在京禁樂祔廟畢仍舊所過州府縣鎮候虞主回京仍舊又言明道中山陵文字首稱莊獻明肅皇太后莊懿皇太后即是當年一時之議别無經見今大行太皇太后雖已有諡號然山陵未畢俟掩皇堂題虞主去大行稱慈聖光獻太皇太后祔廟題神主稱慈聖光獻皇后並從之三司言發運司歲發頭運糧綱入汴舊以清明日自導洛入汴以二月一日今自去冬汴水通行不必以二月為限從之豫章郡王宗諤不覺家婢燒坼屋三百間詔釋其罪白虹貫日此從新紀蓋己丑癸巳兩日皆然舊紀但書己丑二月丙申詔權同判司農寺太常博士周直孺陞一任丞主簿各減磨勘三年仍賜銀絹有差以修司農勅成也詔大行太皇太后靈駕發引日聽髙麗使陪位并館伴所言髙麗使栁洪等乞遇奉慰入寺觀燒香比羣臣服黑帶從之仍以帶賜之己亥詔大行太皇太后皇堂創為地宫非嘉祐治平故事安厝梓宫須别為規度可命都大提舉修奉宋用臣專一管勾辛丑命輔臣祈雨詔改諸王宫侍講為講書太子中允館閣校勘范鏜為監察御史裏行岐王顥言府知客西京左藏庫副使李真致仕乞録其孫為三班借職有司謂其孫於法止得陳乞差遣詔依法河東都轉運司言憲州静樂縣民請射石神慢坡塢荒地千餘頃置弓箭手五百人嵗輸租米三千石今據静樂縣尉案行止有百二十三頃即今林木蕃茂乞禁采伐養成良材以備官用從之壬寅提㸃永興軍等路刑獄駕部員外郎王孝先知邠州孝先上淤田營田司自熈寧七年至十年費錢十五萬五千四百餘緡此事當考不知淤田費用與孝先知邠州有何關涉今但依實録附此當考詳朱本云事小削去詔髙麗進奉使五日一赴崇政殿起居班常起居後癸夘命權御史中丞李定判國子監張璪管勾國子監范鏜同蔡京編修諸路學制詔國子監罷書庫官復置主簿增監㕑使臣各一員增嵗賜公使錢并舊為千緡太學正録三年為任通計六考聽改官三考與循資并增廵宿剩員并舊為二百人並從看詳學制所請也乙巳權御史中丞李定言朝廷更置大理寺設官數十專治諸司獄訟所以防寃滯省刑罰也卿丞皆典獄之官理當躬親聽治比聞公事多委丞訊鞫而卿則畧引問而已至于增損情節卿或不知竊恐前後斷獄不能無濫欲望改易官吏修立成法遴擇其人而付與之不聽朱本簽貼云前史官以言者有斷獄不能無濫之語故載於此以明上聽之失縁無施行亦無寃滯文字照據刪去新本已復存之案定所言蓋指蘇頌吕公著獄也獄官後皆被責罰朱史刪去殆私意耳詔司農寺借坊場錢十萬緡給開封府教大保長之費以銷減退軍六指揮請受錢償之丙午翰林學士右正言知審官東院章惇為右諫議大夫參知政事兩紀並書知陳州左諫議大夫史館修撰安燾知審官東院仍為濮安懿王夫人遷䕶使三司言駙馬都尉李瑋昨責授郴州團練使陳州安置誤給見任團練使俸禄當追納詔蠲之詳定朝㑹儀注所言唐尚書户部主貢物大朝㑹則陳之國朝舊儀元正朝賀所陳貢物僅存其名蓋有司之闕謹稽案圖誌推原州郡物産之所宜輕重多寡稍為條次又言夏書冀州以帝都入榖不貢異於餘州唐書地理志京兆河南府皆有貢今開封府雖不列於諸州亦宜復土貢並從之仍詔貢物應買者給省錢偶無者聽以他物代並遞夫傳送都大提舉導洛通汴宋用臣言洛水入汴至淮河道甚有濶處水行散漫故多淺澁乞計工料修狹從之後用臣上狹河六百里為二十一萬六千步詔給坊場錢二十餘萬緡仍伐並河林木以足梢樁之費五年十月畢工丁未詔權御史中丞李定兼職頗多宜罷詳定重修編敕以安燾代之詔六宅使髙陽關路副總管兼河北第六將丌贇訓練有勞復帶御器械令赴闕以梓䕫路鈐轄東上閣門使王光祖代之戊申髙麗使栁洪以國主之命貢日本國所造車賜詔答之洪以禮諸侯不貢車不敢與貢物同進而館伴使以聞詔許之乃進御史中丞李定知制誥張璪李清臣並為翰林學士太子中允集賢校理權監察御史裏行舒亶同修起居注罷御史改知諫院屯田員外郎劉宗傑權發遣三司都勘理欠憑由司宗傑言昨任京西轉運判官日案發鄧州官吏鞫斷私醖酒富民事及改換文案所坐罪未當乞下御史臺或差官看詳詔御史臺看詳以聞三司使李承之等言三司負羣牧司劵馬縻費錢百二十八萬二千七百緡自熈寧五年至元豐二年費三司芻粟錢五十一萬七千五百七十緡外合償錢七十六萬五千一百二十緡奉詔蠲其半猶負錢三十八萬二千五百六十緡下三司限三年撥還自元豐三年後三司嵗當償羣牧司劵馬縻費錢二十一萬三千七百八十緡除芻粟錢六萬四千六百九十緡外計錢十四萬九千八百緡詔嵗以十萬緡償羣牧司餘特除之初自熈寧五年後嵗四月至八月京師諸班直諸軍馬不出收嵗費三月芻粟自五年至元豐二年為錢五十一萬餘緡三司請取於羣牧司既命官校定而羣牧司嵗罷劵馬以嘉祐五年六年八年治平二年三年四年熈寧五年七年八年凡九年通計之嵗省三司錢二百萬緡計所費芻粟錢外定三司當償羣牧之數庚戌詳定禮文所言謹按記曰薦其血毛腥其爼鄭氏曰皆所以法於太古也又曰毛血吿幽全之物貴純之道也孔頴達曰血是吿幽之物毛是吿全之物告幽者言牲體肉裏美善告全者言牲體外色完具所以備此吿幽全之物者貴其牲之中外皆善也蓋當納牲之時王親執鸞刀啟其毛而祝以血毛詔於室故國語曰毛以示物血以吿殺未嘗有以血毛與肝膋俱燔者也今親祠太廟儀注諸太祝取毛血奠於神坐既而取毛血肝膋出户燔於爐炭毛血與肝膋俱燔此則誤也當改正儀注云諸太祝以毛血薦於神坐訖徹之而退其舊制燔毛血伏請除去又薦血之器禮所不載惟周官玉府云若合諸侯則共珠槃玉敦鄭氏注曰古以槃盛血以敦盛食賈公彦曰槃以木為之以珠為飾按特牲少牢皆無敦盛血之文然則取血以吿殺當以槃盛之也唐崔沔議亦曰毛血盛於槃宋書志南郊以二陶豆盛毛血開元禮開寳通禮及今儀注皆以豆盛之禮豆盛菹醢登盛羮而已其薦毛血當以槃乞於舊文改正從之三年二月十六日依奏又言謹按儀禮尸九飯主人進聽嘏少牢饋食禮尸十一飯二佐食各取黍於一敦上佐食兼受摶之以授尸尸執以命祝祝受以東北面于户西以嘏於主人周禮膳夫祭祀徹王之胙爼說者謂若特牲少牢主人受尸酢尸東西面設主人爼於席前司几筵祀先王胙席鄭氏曰胙讀曰酢謂祭祀及主受酢之席尸卒食王酳之卒爵祝受之又酌授尸尸酢王於户内為疏義者亦曰在户内之東西也今儀注親饗太廟飲福位乃詣東序又俟八室俱一獻訖受胙並不應古義伏請諸廟各設莞筵紛純加繅席畫純于户内之東西面皇帝親行三獻禮成於此受嘏詔候廟制成日施行三年二月十六日詔書辛亥祕閣校理何洵直言按禮遂適殯宫三虞鄭氏曰虞安也既葬迎精而還祭之於殯宫以安之士虞禮云側亨於廟門外廟則殯宫之謂也凡宫有鬼神曰廟故說者以虞卒哭在寢春秋左氏𫝊曰反哭於寢杜預云既葬日中自墓還虞於正寢蓋古者之葬近在國城之北故可以平旦而往日中即虞於寢所謂葬日虞弗忍一日離也後世之葬其地既逺則禮有不能盡如古者今大行太皇太后葬日至第六虞自當行之於外如舊儀其七虞及九虞卒哭謂宜行之於慶夀殿且虞以安神卒哭以告祔必就殯宫蓋即其平生居處之地則神靈之所憑依而來寧故也又按士虞禮主人酳尸之後有亞獻三獻大畧與饋食禮同其所變於吉者吉事尚左此則尚右如設洗于西階西南及陳鼎于西階前之類是也唐儀注虞祭大尉亞獻如不親行事則宗正卿亞獻光禄卿終獻皇帝素服太尉司徒以下祭服羣官皇親諸親皆素服臣以為虞祭當用亞獻終獻如親祠其服宜比附叅酌施行又按春秋公羊傳曰虞主用桑何休注引士虞記曰桑主不文後漢書志亦曰桑木主不書諡夫栗主書諡為禘祫之時别昭穆若虞主瘞于兩階之間則諡安用書舊儀題虞主伏請罷之下禮院以為洵直所引虞禮乃士禮左氏傳乃諸侯之禮若朝廷禮則經無所見况嘉祐治平故事並虞于集英殿宜如近詔虞主回奉安於集英殿又餞尸酳尸並為事尸之禮後世既不設尸難用此禮宜且仍舊又嘉祐治平故事虞主已不書諡今欲如洵直所請從之三月四日奉安虞主于慶夀殿甲寅大行太皇太后發引上自慶夀殿歩導梓宫且行且哭至宣徳門外立班俟時號慟不絶聲王珪等及雍王顥曹王頵更進開釋不能止百官士卒感慟悲咽髙麗使至於出涕靈駕既行上衰服還内百官辭靈駕於板橋退改常服入門明日詣閣門進名奉慰又慰皇太后于内東門上自庚戌不視事丙辰始御崇政殿至祔廟乃御前殿命翰林學士李清臣權發遣開封府時錢藻為山陵頓遞使故也詔聞京東京西河北河東陜西路闕雨其令轉運司訪名山靈祠委長吏祈禱權御史中丞李定請知諫院舒亶同結正周沃事從之周沃事初在二年八月此年八月責官丁巳命輔臣祈雨詔自今奏舉太常博士先取所業進入己未禮院言慈聖光獻皇后祔廟前二日吿天地社稷太廟皇后廟如故事至日奉神主先詣僖祖室次翼祖室次宣祖室次太祖室次太宗室次太宗皇帝懿徳皇后明徳皇后同一祝次饗元徳皇后慈聖光獻皇后異饌異位異祝行祔謁之禮次真宗室次仁宗室次英宗室禮畢奉神主歸仁宗室如此則古者祔謁之禮及近代徧饗故事並行不廢從之詔罷提舉教習在京馬軍所初熈寧十年三月詔入内副都知王中正提舉敎習馬軍至是中正言敎習及三年各已精熟故罷之熈寧十年三月八日始差中正此年三月十一日當考詔光禄寺丞權發遣大理寺丞賈種民衝替知大理卿崔台符少卿楊汲權監察御史裏行何正臣各罰銅十斤大理初鞫陳世儒獄并治世儒妻李母吕氏嘗干其叔父公著請求於知開封府蘇頌公著未嘗以語頌而種民挾情於上殿劄子增易語言事節傅致其罪公著自辨移御史臺推治時頌已坐孫純事謫知濠州追還參對得實種民坐罪而正臣嘗坐監勘與台符汲各不舉察故也并正月庚寅是月壬戌四月丁酉辛酉判司農寺李定等乞開封府界諸縣鄉村第四等第五等户敷出役錢不聽朱史簽貼云役錢隨所在民力敷出户多民富則出錢不至第四第五等而已足户少民貧則須出至五等各不同李定所言非是兼不施行合刪去新本云此可見李定小人掊克之態復存舊文今從新本又舒亶傳云亶判司農寺朝廷推行新法亶言役法未均責在提舉官神宗曰提舉官未可責也近臣僚有自陜右來者欲盡蠲免中下之民朕謂不然夫衆擎易舉天下中下之民多而上户少若中下盡免而取足上户則不均甚矣朝廷立法但欲均爾卿可更講求以聞按亶判司農在元豐四年亶傳云云已附見四年六月今復注此可證其妄也詔權三司使李承之知制誥王安禮各罰銅十斤安禮嘗提舉三司帳司與承之互奏帳司事不當故也二年十二月二十四日戊午令李定等根治壬戌詔以國馬未備令開封府界京東西河北陜西河東路州縣物力户自買馬牧養坊郭户家産及三千緡鄉村及五千緡養一匹各及一倍增一匹至三匹止須四尺三寸以上及八嵗以下令提舉司注籍仍先下逐路具民户家業第等及各養馬數以聞從王拱辰請也户馬從王拱辰請朱墨本同當考六月二十七八月二十二又二十七本志云又有物力户養馬今者自元豐三年詔以國馬未備其令開封府界京東西河北陜西河東路州縣物力户各計資産市馬坊郭户家産及三千緡鄉村通及五千緡以上者並養馬一匹各及一倍增一匹至三匹止馬以四尺三寸以上齒及八歳以下至十五嵗則更市如初提舉司籍記之七年二月七日罷詔知濠州祕書監集賢院學士蘇頌歸班羣牧判官都官郎中龎元英送審官東院大理評事吕希亞贊善大夫晏靖並衝替頌坐前知開封府鞫陳世儒事而元英詣頌伺問頌嘗酬對但言其情狀極醜惡刑名未可知法寺當頌元英以不應為從重希亞靖亦嘗伺問後坐報上不實始頌鞫世儒獄具輙為法官所駮或謂頌欲寛世儒夫婦上詰頌且曰無縱有罪頌對事在有司臣固不敢諭之使重詔移獄於大理大理因言頌嘗受吕公著請求遣官即訊於濠州而世儒獄又移付御史臺頌自濠赴臺置對御史曰君素長者必以親舊之情不能違速自言毋重困辱頌曰誣人以死不可為若自誣以得罪雖甚重不敢避遂手書數百言付獄吏上覽奏牘疑之詔御史求實狀御史反覆究治無得乃詰大理獄吏所得公著請求之說吏窮吐實曰此大理丞賈種民增減其辭為之也今其藁尚在取而視之信然於是種民抵罪而頌得辨明猶坐酬對元英等為泄獄情故罷濠州此據元符詔㫖内蘇頌附傳及曾鞏墓銘刪修四月四日當叅考詔權發遣提舉京西北路刑獄胡宗回罰銅十斤免衝替坐越職治提舉司事也
