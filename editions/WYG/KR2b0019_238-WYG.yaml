body:
  text: 續資治通鑑長編巻二百三十四宋李燾撰神宗熈寧五年六月己酉朔中書門下言檢㑹外官發運轉運使提㸃刑獄提舉司經畧安撫總管鈐轄監牧司府界提㸃司知大州並已中書置簿記録合要考察逐司功過事外其常調知州又各有逐路職方考定優劣自來考課院只是據逐路區别到等第聞奏考校職司課績殿最即開坐逐人區别到部下官吏等其採訪行實但稱採訪到逐官行實合為中等全無實狀無補扵事其考課院顯見虚設欲乞廢罷從之此據㑹要淳化四年四月初以考幕職州縣官為審官院選舉志云方是時上勵精政事至誠惻怛之意見於命令毎第課考等髙者遷官進擢而為治無状則罰必行若老不任事則至使之解印以歸監司失考亦加降黜故四方為吏者益加勸沮矣復詔中書籍記中外官司功過嵗終及應除用比較進擬又命提舉司考管勾官司農寺考提舉官各從所𨽻遂罷考課院而釐正其事歸扵統屬之司遇遣使採訪則令條具所至吏劾知州通判上中書縣令上司農寺注籍以相參考提舉官司農丞闕則選令課尤異者用之閥閱俱優則遽加擢任惟監司等入上下即取㫖升黜而侍從官守郡者聽不以考法從朝廷察治焉熈寧三年七月十八日詔中書籍記内外官功過辛亥幸集禧觀大相國寺祈雨壬子河陽三城節度使守司空兼侍中曽公亮遷守太傅致仕特告謝故事致仕官不入謝上以公亮三朝故老特加禮仍給見任支賜入謝乃十八日詔今附此林希野史云公亮自永興召歸御史劉孝孫劾奏公亮不職公亮不得已乞致仕此當考司封郎中謝景初追兩官都官郎中李杲卿一官勒停並坐前任成都府路監司踰濫故也杲卿先服罪景初未服詔利州選差官就成都置勘馮京曰景初常提㸃刑獄在一路吏民之上今令萬里往舊治所就獄恐有辭便乞伏罪賈誼言當養人臣以㢘耻宜止就隣路近處上曰景初自無㢘耻如此更困辱之亦無傷所謂刑不上大夫者既刑即不可使復為大夫賈誼所言恐非是兼景初在本路桀驁不奉朝廷法令其自為乃如此何足恤王安石曰若悉力公家奉行詔令即私行有缺尚有可矜今既犯令陵政又所為自無耻且就獄辯對虚實扵景初固無可耻若隣路勘使無罪證見之人受弊却不便也詔増定諸路州軍公使錢及宗室正任刺史以上公使錢除去虛數令三司止具實數附禄令舊制邉任全給内藩三之一而宣名猶著全數至是始釐正之癸丑上論河北兵不可用王安石曰忘戰必危好戰必亡當無事之時作士氣令不衰惰乃所謂不忘戰也人心排下進上若鼓旗明麗噐械精善壮勇有技者在衆上即士氣雖當無事之時亦不衰惰也上恱因言人謂今日朝廷邉事勝慶厯中此甚不然秉常豈諒祚比也安石曰誠如此然慶厯中范仲淹非有過人智畧粗知訓練持守元昊已不能侵犯上曰方仲淹為帥時元昊已困安石曰雖然當是時惟仲淹為見稱述即仲淹亦粗勝一時人仲淹為帥元昊所以不能犯者為主客勢異仲淹務自守故也上又論水洛城事言歐陽修議状極無理趣安石曰尹洙主此議洙實不曉事妄作向背而有時名為人所傾向如此等人最害世事上曰韓琦亦非水洛事安石曰琦尤嚴重洙王珪言狄青亦尊洙安石曰青但以洙有時名能毁譽人可因以致名譽取利禄故推尊洙非實以洙為可宗師也青所以獲譽扵世又多得爵禄者洙亦有力也上以為然甲寅王安石白上西人雖未降誓詔然邉備便可弛如已降誓詔今西人所甚惜者綏州二十里彼今已與我我所甚欲者環慶地我今既已與彼即餘處更無所争何縁更肯與興兵前一日論西事僉以為未降誓詔則防敵不可緩安石謂彼不能犯境上曰彼羣臣但憂秉常長大追究其罪誰肯為戎首者安石曰新送李崇貴韓道喜來中國已屢許其和彼羣臣豈不自計為戎首或不免如韓李被執送以解急難上曰又恐彼不思筭妄舉動安石曰如此即取亂侮亡何所不可我所懼者彼有謀而已無謀而妄動非所懼也乙卯禮院言中太一冠服依東西太一而東西太一惟五福君綦服冠通天冠大遊以下皆冠道冠案史記天神貴者太一太一之佐曰五帝又方士言十太一皆天尊神伏請並用通天冠絳紗袍從之權陜西轉運副使趙瞻言邉事息寧宜分戍兵為三常依一分就糧於内地延州可移於鄜州及康寧軍保安軍可移於坊州環州可移於彭原縣慶州可移於邠寧渭州可移於涇州及鎮戎徳順諸城寨原州可移於長武寨可以減省邉費庻二三年間餘一年之食欲乞下諸寨具逐年合移兵之數措置以為定法詔送樞宻院詔慶州荔原堡都監内殿承制竇瓊内殿崇班朱辛各奪一官衝替管勾蕃部司公事任懐政罰銅十斤以失覺察蕃官章威等投西界故也初諸路降羌皆分屬城寨上毎諭敕官吏拊循懐輯并資給廪食及是致章威等逃歸故特加譴黜四月二十三日可考先是慶州投降蕃部往往為西人誘納上欲令牒宥州理索王安石曰慶州地已約屬我我以其欲地即速與之詔捉到西人欲歸即給賜遣還今却誘納我投蕃部須理索乃立得綱紀若不肯送還即未降誓詔彼自急和我無所急上以為然癸亥送還威布等名字不同當考并十七日給田事參考遣入内供奉官李憲環慶路勾當公事賜蕃官軍主以下絹米有差上問治軍王安石曰御将帥以道使皆向上然後訓練募兵什五三邉百姓鼓舞以好惡利害便皆精彊陛下難遽令三邉盡如此即先試之河東河東之民受困敝最多人尤勁悍好武除其困弊而布其便利誘以所好其勢甚易但将帥不向上則為此難丙辰詔諸路以新法募役民不願而輙抑勒者官吏並以違制論雖去官遇赦不原丁巳謝雨己未中書言欲下閤門今後紫宸殿上夀親王宗室駙馬都尉欲並依故事赴坐從之以李評論列閤門儀制欲改此法故也王安石初言評所定儀制不可行上心主評議安石既力爭而上終右評安石因言評為欺害政事評先坐擅改易樞宻副使蔡挺文字上令取評戒厲評復訴于上前以為吏未嘗明言已經樞宻副使更定故輙用己意改易數十字實有鹵莽之罪上謂評本心實無他但於職事不敢茍且理宜矜假遂批付樞宻院免評罪於是安石指此事證評為欺上曰評自言不知安石曰奏章有樞宻院使副押字豈得言不知人盡以為吏畏評不敢證評上曰就令改易何妨若有差失評有罪安石曰名分有上下如臣為參知政事衆以為過當然曽公亮所批判臣但有不著字與公亮反覆論可否豈敢改公亮文字臣若改公亮文字即左右攻臣者必衆陛下必極以為臣不可臣職任於公亮乃是等夷如李評乃是宻院吏人若為事闗李評便可改抹即貼房亦可改樞宻使文字如此即豈有上下陛下若為李評可倚仗不如便以李評為樞宻使且評所改文字非特蔡挺文字從前所改至多評乃以為不知此其為欺甚矣陛下要推問是非不難見但恐承前宻院被改文字不能正心為耻更共蔽覆即不可知如評非忠良恐陛下誤上曰豈以評為忠良但人難求備如評肯盡力亦少安石曰既非忠良上慢下暴而隂與近習相為朋比欺陛下耳目豈可畧不檢察又言評造掲貼簿無補又不見剩員數即以為無上曰朱明之乃以造掲貼簿為非見用此差撥兵士豈可言無用以不見剩員數為無即不可知但恐是外處不申到耳正批付宻院據御集乃五月十三日與改正閤門官吏放罪指揮同日今附見此它日安石又言評所修儀制大率乖繆難以責閤門一一申明今不申明尚有罪元修儀制乖繆豈可得無罪評修儀制既乖繆乃奏閤門才失提掇便致失事漸成敝壊其姦罔一至此陛下見其㸃檢事便以為盡力臣竊謂誣其同類以自為功乃是姦罔小人不當謂之盡力上曰此小事已降指揮安石曰此小事然陛下三降手詔當是疑臣於此事不直有所左右臣備位大臣當為陛下分别枉直若親為陛下左右小人所欺不能自直即難以安職若陛下謂為欺使去此位固無所復議若未許臣去位即當容臣辨正以中書所奏下閤門令中外知事枉直上乃從安石議而降是詔壬戌權三司使司勲郎中天章閣待制薛向為右諫議大夫明堂禮成有司誤遷向官詔罰中書吏而遷向官如故罰中書吏而不奪向官此據向本傳當考詔河北都轉運司劾雄州官吏以聞舊例嵗賜北界絹於白溝交大數而已時北人欲遍閲之上疑其疎惡乃遣使覆視果得穿穴者數百匹而雄州未始以聞故有是詔癸亥知制誥王益柔兼判禮部貢院試法分四塲除第三第四塲䇿論如舊其第一塲試本經五道第二塲論語孟子各三道試官毎一人試巻各分一塲考校考畢衆官參定髙下去留仍許同差官三兩員㸃檢雜犯其諸路州軍舉人如五百人以上亦許差官一員㸃檢新紀書詔以四塲試進士舊紀無此詔權通逺軍都監王存等五人各減磨勘三年初奄東熟户久不順命招呼不至王韶遣存等破蕩而秦鳯路經畧司以聞故賞及之初議賞王安石曰方欲創事宜加厚文彦博曰打族帳與軍賞格不同難用軍賞上曰惟賞無常輕重視功蔡挺曰比捉賊賞未為厚以此比捉賊則其勞績豈不過於捉賊乎上曰王中正言洮河以西未有朝廷明降指揮許招納蔡挺曰乘今機㑹破竹之勢正可厚以金帛官職招納然王韶新經摧沮不敢開濶擘畫須朝廷諭意乃令中書宻院諭意王安石言将帥事事指教闗防不得必得有智畧自肯建功人乃可使為将帥上曰如何得如此人安石曰豈患無人但患知人未盡若陛下盡知人之道御制不失理則人才自出如王韶被朝廷三度疑其為盜若尚氣節自免去久矣安肯復黽勉到今功名如夢幻氣節之士豈肯摧氣節以就功名朝廷遇人如此即未有以致豪傑之士上曰既被人誣罔須與辨明安石曰被人誣罔須與辨誠是然陛下前出手詔専委宻院指揮令市易司息錢别封樁蕃户料錢以省錢支陛下以為人言市易司全無息錢言此事者必有其人陛下後來既知言此者非實即未見陛下行法若為陛下建立事功之人為衆人沮害忌疾及其為人言即推究其罪有罪陛下固不容無罪即誣罔之人未嘗詰問建功盡力者寡為邪者衆寡已不勝衆而陛下又不惡其為邪則人何為不茍比周以養交黨乃欲出死力犯衆人所忌惡為陛下立事上曰郭逵便行遣安石曰郭逵若但膚受浸潤雖百年無害今所以不免行遣乃是逵自作孽至於不可復容故也臣以謂人主用威福所以操制姦罔不必待其自猖獗不可復容然後行法也陛下所以優容此軰不過欲廣耳目若其言盡實即可廣耳目若敢為欺罔乃是自蔽塞聰明何利之有陛下必欲開廣耳目但忠信則賞之欺罔則刑之不患蔽塞也詔内殿承制蘇濬永不與親民差遣以濬先任戎瀘資榮富順監同廵檢使私役戰卒故也上以主兵官例多私役而法制不嚴不足以懲艾故重責之仍令自今私役教閲兵犯徒以上者依此環慶路經畧司言夏人送還荔原堡逃去熟户威布等七十八人先是夏人未嘗以逃户來歸至是欲請和故也其兩户乃新招到曽體問不願歸者其十五户盖治平間所招不經體問者王安石言訪得王廣淵既退還西界礓石納斡堡地給田與熟户數少故逃去馮京曰西人或有謀當是怨彼背叛故送來令我殺之安石曰西人不候理索送來乃得計上問所以措置文彦博曰兩户新經體問自合依法十五户除頭首外可矜貸配近裏安石曰兩户誠合依法然法皆斬謂宜貸其女弱若彊壮要走女弱何緣不隨徒行誅戮有損仁政餘十五户必廣淵措置乖方給地不足致其逃叛此事但可責廣淵恐十五户不須行法上曰若釋之今後逃叛何可復禁安石曰但顧我恩信方畧如何不在誅戮此數十口然後能使人不逃叛上曰西人将銀綵來招去亦未必是廣淵措置乖方安石曰此事難根問然付以一路若能檢御何縁致得人走投外界但根問必見詣實上曰已令李憲體問且指揮未得斷遣候李憲體問到商量安石曰十五户必然措置失所故叛並合責廣淵若體問見失所之状因而撫存此蕃户給足田土只令在邉居住彼既為西人執送必無復叛之理既自謂必死蒙恩更生則必有如報秦穆公食駿馬之志兼其餘蕃户見朝廷待之如此豈不感恱不然徒誅戮此輩有傷仁政於邉防大計實無所補上恱李憲後來體問如何當考甲子詔河北軍馬畨上河東屯戍者二年一替舊制河北軍馬不出戍上慮其驕惰乃命更去於河東駐泊而減更期一嵗以優之賜江南東路轉運副使韓鐸新權提㸃刑獄張稚圭銀絹二百以提舉開江寧府張公凸上欒家磯馬鞍山河道故也仍降詔奨諭乙丑權鹽鐵副使兵部郎中陳經知潤州度支郎中同知審官西院王克臣權發遣鹽鐵副使經以病求出王安石請用羅拯代之上欲且留拯為發運使曰克臣可代經也安石曰善詔近遣董詵相度添填河東馬遞舖兵士趙子幾蔡天申相度京西差役及案視水利並令體量逐路監司提舉司有措置不如法及弛慢不職事以聞董詵是何人何官當考詔環慶荔原堡大順城降羌毎口給地五十畆首領加倍不足以裏外官職田及逃絶田充又不足即官買地給之王安石以環慶奏章威等給田圖進呈曰雖見圖然無由知章威等所得地足與未足據所給價錢即似非良田恐未足存濟今章威等自㧞内附若令失所即恩信不孚於邉事所損不細臣以謂倍以錢買蕃户地多給與頃畆須管優足未買得地即且振以糧食令無失所况見在人只數百口不及千口就以千口計之毎口除見地外嵗給兩石物一嵗所給才二千石倍價買地不過費數萬緡或疑無地可買安石曰若以倍價買必可買料邉人亦必有典賣地者今以倍價招之何患無地上以為然曰須明說與王廣淵彼不知朝廷意如此即不敢如此擘畫此月七日十五日十七日知雄州張利一言遼人修城隍㸃閲甲兵必有奸謀宜先事為備上曰彼或為自防之計王安石曰誠如此無事而使人疑之殆也若因此更示以繕完㸃閲之形則彼以我為真有謀彼之心更生其計惟静以待之彼将自定也此十七日事丙寅詔西作坊鑄京師諸門銅符契三十四令三司給左契付諸門右契付内鑰匙庫依法勘同請納其開朝門牌六面亦隨銅契發放上以京城門禁不嚴素無符契命樞宻院約舊制更造銅契中刻魚形以門名識之分左右給納以戒不虞而啟閉之法宻於舊矣兩紀並書此丁卯詔太子中允館閣校勘陳侗同判登聞鼓院罷樞宻院檢詳以御史張商英言侗行能不足宫邸有妻族之親毎休沐相從宴飲無度故也試國子四門助教張延年換額外翰林醫學特免試從岐王顥請也詔自今陳乞醫官院職名不許免試上以醫官免試容有倖進故申嚴舊制王安石惡李評必欲去之既辨其上夀新儀不可用謂閤門吏不當劾而閤門吏因言評所修新儀率不可用遇不可即擅改非一於是中書取新儀㸔詳其間如改元㑹殿前三帥起居等皆非是及三帥論其不可評乃擅令用舊儀而不奏至中書責問仍廹取吏人状云使副已令申舉然至今不曽申舉吏又云實未嘗見使副指揮又沈衡判刑部評已令告謝及杜紘判刑部評乃止之中書詰其故輙抵云儀制在中書無所檢用方欲申禀然中書先所取儀制乃其副也安石具以白上曰評誕謾大抵類此前改蔡挺文字猥云吏人不言臣聞評擅改使副文字多矣陛下以為不可即歸咎吏人不言上曰評所改皆非使副簽署者昨改蔡挺文字則吏人状謂評果不知安石曰吏人状安可為據大臣尚畏評中傷不敢與校何况吏人豈敢證評不直上曰人中傷評者却多如御史言評與吳充結親評與充乃不成親安石曰御史言事誠疎畧又非特此一事然漢元帝以劉向京房疎畧遂信石顯為忠今評欺罔状明甚陛下但推鞫即評雖巧說亦必不能自蔽上曰第恐評有說安石曰陛下若偏聼則評必有説若推鞫即明見欺罔之状上曰元㑹事已多時安石曰事固多時中書久未進呈者政為無因耳而評乃因杜紘事反誣中書久留儀制故不得不以聞評欺罔如此又安可縱上曰此誠有罪令送宣徽院取勘已而上批閤門失㸃檢三事尋召問評等更無他辭並各引罪縱加推鞫不過如此其狄諮張誠一止是偶失㸃檢罪可矜恕皆由評故致此滋蔓若不罷去事必愈多煩費推求何日窮已可令評更不管勾閤門事餘悉放罪七月戊戌當考要録云安石曰評所定閤門儀制不可行上心主評議安石力争上終右評評擅改樞宻副使蔡挺文字安石指此證評為欺上曰豈以評為忠良但人難求備如評肯盡力亦少安石曰既非忠良蔽欺陛下耳目豈可不畧檢察必破去之至是上乃令評更不得管勾閤門己巳王安石謁告上令馮宗道撫問安石因附表劄請解機務上復令宗道齎手詔封還表劄趣安石入見大食勿廵國使辛押陀羅進助修廣州城錢糧仍乞統察蕃長司詔勿受其状令廣州相度所乞以聞是年月勿廵國入貢大食國不與焉辛押陀羅乃勿廵使者不知何故却稱大食勿廵㑹要於大食國亦載此時政記同當考辛未詔雄州兩地供輸户凡有科率名件並依舊例不得令帶納椓箔及増他賦詔荆湖路轉運副使孫珪江南東路轉運副使韓鐸等可並降敕奨諭初諸路廂軍沿五代舊制軍額參雜請給不一上命樞宻院合併而鐸等以兩路廂軍合為一軍最先成書故也是日王安石入見上怪安石求去安石曰疲疾不任勞劇兼任事久積中外怨惡多又人情容有壅塞暫令臣辭位既少紓中外怨惡又上下或有壅塞陛下可以察知若察知臣不為邪異時復驅策臣所不敢辭也上曰卿從來豈畏人怨惡者人情有何壅塞卿心别有所懐何不道安石曰臣所懐具此上曰得非為李評事評自言閤門事偶失提掇便致失事今既有失檢㸃事固合勘安石曰臣所懐具如奏状所陳非有他也上曰卿無乃謂朕有疑心朕自知制誥知卿屬以天下事如吕誨比卿少正卯盧把朕固知卿不為誨所惑豈更有人能惑朕者朕於卿斷無疑心即不須如此安石曰臣平生操行本不為人所疑在仁宗朝知制誥只一次上殿與大臣又無黨及蒙陛下㧞擢曽未及一兩月初未曽有施為吕誨乃便以方盧杞就令臣所存如杞亦須有所施為其罪状明白乃可比杞今既未有一事便以比把此不待陛下聰明然後可知其妄若任事久疑似之迹多而讒誣之人材或過於吕誨即臣未敢保陛下無疑也上曰吕公著與卿交遊至相善然言韓琦必以兵討君側惡人朕亦不為公著所惑安石曰公著此言亦非特陛下聰明然後可辨明明在上豈有如此之理上曰卿知性命之理非有心於功名爵祿然君臣之義卿必不廢朕於卿未有失卿又實無病何縁便有去就安石曰臣非敢言去就但乞均勞逸而已上曰卿之所存雖朋友未必知至於衆人見朕於卿相知如此亦皆不知其所以朕與卿相知近世以來所未有所以為君臣者形而已形固不足累卿然君臣之義固重於朋友若朋友與卿要約勤勤如此卿亦宜為之少屈朕既與卿為君臣安得不為朕少屈安石曰臣荷陛下知遇固當以死報陛下誠以疾病又古今異宜大臣久擅事未有無釁者及其有釁然後求去則害陛下知人之明又傷臣私義此臣所以不免違忤陛下上曰周公為成王所疑故逃居東及成王不疑則歸周縱朕於卿有疑今既相見無疑卿亦可止又曰如亢瑛至㣲賤尚敢言卿上下何由壅塞卿不須慮此安石固乞退上固留之比三四退上又固留約令入中書不復乞安石曰日旰不敢久勞聖體容别具奏至中書遂出復具劄子乞罷上令馮宗道齎手詔封還劄子曰卿已許朕何故又入以卿素守豈可食言也安石復具奏而閤門等處皆有㫖不許收接安石文字陳瓘論曰熈寧八年安石再為宰相其年七月頒三經義考天下當是之時安石與吕恵卿同在中書已反目而不相語矣明年神考以御史中丞鄧綰姦囘頗辟怒而出之安石求去亦不留也觀其人讀其書不論其時可乎臣今取三經義考安石及雱解經之微意先論其時然後以日録合之譏薄之言藏於經義詆誣之語肆於私史追思神考所以眷待安石之意臣能流涕而已矣雱所撰書義以謂聖人君子不可疑而逺之也疑而逺之則違天矣又以謂人君不明可惑以非義則於周公忠聖不能無疑又以謂成王不明為小人所惑故疑周公又謂成王易惑疑忠聖之人而安石所撰士師八成義以謂守正特立之士以邪誣而不容于時此禍本之所注而大盜之所以作也蔡卞繼述之說其本在此守此意者謂之守正不然則指為邪朋立此說者謂之特立不然則指為流俗非我類者皆邪朋也異我說者皆邪誣也於是用其所謂守正特立之士廢其所謂邪朋邪誣之人從而喜曰禍本消矣大盗息矣此卞之所謂國是也人主不得違同列不敢議惇布在其術内而不知也臣昨在諌省嘗進中說一巻但論蔡卞力主安石及觀日録然後知罪乃始於安石王雱假詩書以文其姦安石托聖訓以肆其詆三經日録誣偽相應盖雱以易惑之語誣薄神考所以甚明其父之忠聖而不可疑也安石自聖遂以其詐悖之身僭比周公而以含糊不分明之語上詆先烈者不可一二數聖主繼志述事事亡追逺三經包藏之說目録誣訕之言其亦忍聞之乎向使安石不著日録則私意之在三經及他書者未盡露也今三經日録前唱後應枝葉粲然非無文義而大理舛逆奸名犯教習用其說者終為身患臣於王氏之學安敢無改往自新之意也陳瓘尊堯餘言曰臣竊考日録安石書神考聖訓曰所以為君臣者形而已形固不足以累卿朕既與卿為君臣卿宜為朕少屈嗚呼果自神考之訓乎託訓如此縱而不辨臣恐自今已後事君以形者顰笑進止皆無眞實之心矣自尊大者驕狠傲上皆有難屈之氣矣此等託訓之言為臣子者安可以不辨哉壬申上又令勾當御藥院李舜舉召安石入見安石欲附舜舉表劄舜舉不可乃已癸酉安石自齎表入見上不肯視復以授安石敦譬令就職曰朕自得卿文字累日惶惑卿且念朕如此安石固請弗許是日早出屯田員外郎髙旦罷将作監丞送審官東院以御史張商英言旦不治職事多遊權門故也晁補之銘旦墓成都府利州路走馬承受潘孝和言屯駐雄威兵樂昇王慶告神勇兵楊進等謀奪縣尉甲為亂鈐轄司斷配進等沙門島及廣南乞特遷昇一資詔鳯翔府斬進首送成都府令衆餘配沙門島昇與下班殿侍仍賜錢三百千王慶二百千舊制告變者賜袍帶遷十將上以逺方屯戍至衆賞之宜重故特命之扵是上謂執政曰朝廷改成都便宜行事法吳中復屢乞復行及楊進結衆為變而中復乃止刺配之若付以便宜不過反是妄配平人為多有何所補也甲戌權御史中丞鄧綰言知瀘州張宿庸惡貪殘乞改差文臣知州從之仍詔本路轉運司體量宿以聞七月二十四日改文臣京西提舉常平司乞留先借轉運司紬絹十四萬緡為常平本錢從之墨本於此日附郭逢原書誤也今移見七月末是日王安石見上曰陛下不許臣去臣不敢固違聖㫖然臣實病若更黽勉半年不可彊即須至再煩聖聽上曰卿許朕就職甚善如何却半年後又乞出且勿如此先是上曰卿所謂小人朕亦何嘗暱之安石曰臣私計於小人無所憚陛下遇臣如此縱有小人浸潤臣不過去位而已然所以不願陛下近小人者但以虧損聖徳無以觀示四方而已上曰知卿不欲朕近小人者是為朕計也安石又曰陛下所以眷眷留臣者欲臣助成天下之務臣愚以謂成天下之務在陛下不在臣欲成天下之務在通天下之志若不能通天下之志即不能運動天下變移風俗則何由成天下之務上曰朕不明誠是有所不見毎事須頼卿扶持安石曰陛下至明非臣所能仰望然於事機亦時有不見臣愚以謂自古聖賢之君亦頼股肱耳目所以慮無遺策陛下左右前後誠為乏人陛下憐其愚無他而容之者多矣能啟廸陛下聰明者殆無其人然則陛下不可不深考前王所以維御天下大畧自為龜鑑陛下好察細務誠由聰明有餘然恐不能不於大畧却有所遺臣願觀古興王所以運動天下變移風俗如何即見陛下今日得失事固難一一盡言臣請試言郭逵王韶事陛下以郭逵誕謾故許其辭秦州既而逵微譖王韶陛下又不寤而從之逵知陛下可欺然後使劉希奭入奏因而遊說窺伺陛下意向陛下又為其所惑故逵敢放肆為王韶之獄今杜純奏王韶討崦東事陛下以為何如上曰又不合如此安石曰純為勘官於崦東事了不相闗又輙如此誣罔妄奏小人敢無忌憚者陛下當求其所以然此不在他人在陛下而已陛下誠能照姦而斷以義則無人敢如此上曰只為事難得分明者安石曰事何嘗不分明但是陛下不窮究到底前後小人為欺豈是盡無形迹但以陛下含糊不窮究到底豈有不分明之理二十八日安石又辭位先是杜純勘王韶市易司事奏韶出納官錢不明韶答勘院置辭率抵讕驕慢有云委不曽依諸塲務出納致有差互韶私家物却上公使歴乞根問是與不是韶發意侵盜又韶先奏元瓘稱臣見欠瓘錢二百六十貫未歸著若勘得是侵盜只乞以功贖過貸臣死其它多類此故純奏韶欺狡事難究治乞依韶元奏候滿三年磨勘又因韶不發遣王君萬對獄遂及韶討殺崦東蕃部謂韶生事邀功王安石見純奏大怒自為畫一問純何以證韶於官錢不明令韶具析上曰文歴差互韶或不免初疑韶為侵盜耳韶亦必不至侵盜九十餘貫錢安石又言韶討殺蕃部於純所勘事初無與純本樞宻院屬官久知宻院惡韶觀望利害輙敢誣奏其情意可見今當别遣人推鞫上以為然時純己丁父憂去官朝廷權純大理寺丞檢詳樞宻院吏房文字命未下也乙亥樞宻院言仁宗時嘗建武學既而中輟慶厯三年五月丁亥置武學八月戊午罷之乞復之詔於武成王廟置武學選文武官知兵者為教授凡使臣未參班并門䕃草澤人許召京朝官保任試騐人材弓馬應試武舉合格者方許入學給常膳習諸家兵法教授官纂次歴代用兵成敗及前世忠義之節足以訓者講釋之願試陣隊者量給兵伍𨽻習在學及三年則具藝業保明考試等第推恩未及格者逾年再試凡試中三班使臣與三路廵檢監押寨主白身與經畧司教押軍隊準備差使三年無遺闕與親民或廵檢如至大使臣有大兩省或本路鈐轄以上三人保舉堪将領者並與兼諸衛将軍外任回歸環衛班仍遣兵部郎中韓縝判學内藏庫副使郭固同判賜食本錢萬緡新舊紀並書乙亥置武學通畧仍以天章閣待制孫固判武學初除韓縝縝尋使河北遂改用孫固初宻院修武舉條令不能答策者止答兵書墨義王安石曰今三路武藝入等義勇第三等以上皆已有㫖録用陛下又欲推府界保甲法於三路即須毎嵗解發合試人赴闕録用如此則錄用武力之人已多又廣開武舉一路恐入官太冗兼近方以學究但知誦書反更愚魯不曉事廢之今又置武舉墨義一科其所習墨義又少於學究所取武藝又不難及則向時為學究者乃更應武舉若收得如此人作武官亦何補於事先王收國之勇力之士皆令屬於車右者盖亦不使此軰委棄於民伍且以備禦侮之用也既所取在於勇力禦侮而已則令誦書答墨義復何為也上曰朕亦語宻院以墨義不可用至是再進呈武舉條制乃悉從中書所定閏七月五日當并此安石因言四方有逸材之人朝廷當留意收拾上曰止軍校中甚有部轄勝總管鈐轄者此軰止是官大爾亦何嘗有智安石曰臣在外州軍見毎處軍校必有三兩人得力者今一切以階級遷轉更無分别宜如選人於軍校中薦舉有才畧者則不惟㧞出可使之材亦足勸将校競修職業也上曰如此誠好止是今将帥兵官不過取有利口及能為幹私事者薦之此所以難行也上謂王安石曰早欲了西事别措置邉事安石曰西事了與未了何妨措置邉事自古人君興造功業皆以有事之時惟有事乃可興造功業昨者西事自是陛下失在不詳慮熟計也若陛下詳慮熟計即無可悔之事仍有因事措置之功陳瓘論曰臣伏見熈寧四年三月十七日内降徳音曰朕徳不明聽任失當外勤師旅内耗黎元秦晉之郊重罹困擾使人至此咎在朕躬其推惻隠之恩以昭悔過之義臣毎讀此詔未嘗不流涕也韓絳邉事罪在安石神考推恩悔過未嘗責安石也安石著書欲掩前罪乃鋪陳誣偽之語於韓絳敗事之前然後於韓絳敗事之後歸過神考其所鋪陳凡有四語其一曰臣非怯而憚事以謂陛下且當柔逺而修中國之政其二曰豈宜不以生事為憂其三曰今災異衆闗中旱正是欲静邉鄙之時其四曰闗中騷然豈宜更有可悔之事夫造作邉事本由安石所為何嘗畏災異而憂生事哉四語誣偽可謂甚矣日録載韓絳之言曰王安石忠於陛下所以盡言又曰安石所言皆是陛下但聽之三四年後便見效又曰安石所陳非一皆至當之言可用陛下宜省察及韓絳求去安石則曰韓絳不宜如此如此則遂無一人同正論以此觀之絳與安石可謂合矣神考以昭文殿大學士超命韓絳而位之於安石之上者以與安石無嫌故也至於許其便宜節制諸路皆安石所肯然後施行及韓絳敗事安石則曰臣自接侍清光以來陛下固未嘗許韓絳以智畧一旦陛下舉一方之事屬之則邉事自宜如此四年五月二十六日又曰陛下失在不詳慮熟計五年六月二十七又曰陛下於一切小事勞心於大事獨誤今日國事亦猶前日邉事也四年六月十二日夫計慮不熟以誤大事眞是安石之罪歸過宗廟乃以為西事之初不敢先事極争五年正月初九安石議事果是不争之人否又謂慶州兵變不當歸咎於保田淤田四年五月二十保田淤田尚不可况歸咎於宗廟乎丙子王安石又辭位上引劉備託後於諸葛亮事曰卿所存豈愧諸葛亮朕於卿君臣之分寧有纎毫疑貳乎二十六日安石已入見詔知雄州張利一等措置北界廵馬事令依累降約束以理約欄出界及移文詰問未宜輕出人馬以開邉隙先是利一等奏北界差兵過拒馬河廵欲候其來即遣官領兵驅逐示之以彊彼乃帖服王安石曰恐不宜如此上曰彼兵直過河距雄州城下數里不驅逐非便安石曰雄州亦自剏添弓手過北界廵即彼兵來未為大過今戎主非有倔彊但疆吏生事正須静以待之若争小故恐害大計就令彼廵兵到雄州城下必未敢攻圍雄州若我都不計較而彼輙有鹵掠侵犯即曲在彼我有何所害上乃令戒利一等無得妄出兵文彦博因言李牧急入收保事上笑曰惟李牧乃可如雄州官才出城便舉家哭又安可比李牧也詔聞畿縣及輔郡民被旱災而官司以出條限不許披訴令開封界提㸃司京東西轉運司體量合放稅分數以聞廢兖州鄒縣邢州任縣鎮入仙源南和河溢北京夏津此據本志
