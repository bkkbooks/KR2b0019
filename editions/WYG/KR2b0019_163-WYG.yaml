body:
  text: 續資治通鑑長編巻一百五十九宋李燾撰仁宗慶厯六年秋七月壬午監察御史唐詢言近者京師雨雹地震此隂盛陽微外國侵侮中國之象今朝廷以西北講和寖弛二邊之備臣嘗默以為憂願下聖詔申飭守邊之臣其於兵防敢有慢隳者以軍法論從之甲申賜越州進士貝元眉州進士孫詔粟帛並以本路轉運使言鄉里推其孝行也三司使王拱辰言太祖時兵十二萬太宗時十八萬章聖時四十萬今遂倍之兵在精不在衆冗數坐食非計也三司雖總財用大計而事實在外請諸道帥臣并任其責乙酉詔判大名府夏竦知并州鄭戩知永興軍程琳並兼本路計置糧草事從拱辰之言也遣主客員外郎宋選徃河東殿中丞陳榮古徃河北路收糴軍儲選湜從孫詔如聞百姓抵輕罪而長吏擅刺𨽻他州朕甚憫焉自今非得於法外從事者毌輙刺𨽻罪人賜廣南東路戍兵特支錢丁亥參知政事宋庠上所撰紀年通譜庠取十七代史并百家雜說凡正偽年號括為一書詔送史館庚寅河東經略司言大雨壊忻代等州城壁供備庫副使兼閤門通事舍人李璋為西上閤門副使壬辰詔諸路指揮使三班使臣殿侍及散直并減三分之一其係軍校者罷歸本指揮乙未施州寧逺寨主西頭供奉官田居用為東頭供奉官仍賜銀五十兩時益州進士王臯避罪竄嵠峒居用以所服銀帶遣峒人田承昌誘而獲之丙申右正言知制誥知吉州余靖為將作少監分司南京許居韶州初靖為諌官嘗劾奏太常博士茹孝標不孝匿母喪坐廢靖既失勢孝標因與知諫院錢明逸言靖少遊廣州犯法受笞明逸即劾奏靖不宜在近侍靖聞之不自安求侍養去㑹朝廷下廣州按得其實靖初名希古舉進士未得解曲江主簿善遇之知韶州者疾主簿捃其罪無所得唯得與靖接坐主簿既以違勅停任而靖受笞後乃更名取解它州及第案牘具在故有是命靖受笞縁由據司馬光記聞己亥河北縁邉安撫使乞降北界誓書一本以備報應邉事從之辛丑洪福禪院火即詔以院之莊産邸店並賜章懿皇太后家壬寅上謂宰臣曰前日除李用和子璋為閤門副使今次子珣求為通事舍人朕以諭之曰朝廷爵賞所與天下共也儻戚里之家兄弟遷補如已所欲朕何以待諸勲舊乎賈昌朝對曰母后之家自昔固多䝉恩澤今陛下能重惜爵賞不肯輕授非惟示天下以至公抑亦保全外戚之福也明年四月乙丑内殿承制閤門祗候李珣為通事舍人癸卯馬軍副都指揮使遂州觀察使許懐徳為安靜軍留後言事官上章論奏者相繼御史中丞張方平言懐徳除命誠出非次縁懐徳自在邉城為將領素乏勞効比諸儕軰尤無材譽去歳自防禦使改觀察使自殿前都虞候遷馬軍副都指揮使今者妄援體例僥倖陳乞隳紊軍制干撓朝章又聞殿前副都指揮使李昭亮詣兩府敘陳頗駭物聴帥臣失和事體非便規萌杜漸盍有所處仍知續有𫝊宣應三路邉臣功重賞輕者令開坐聞奏自有事於西鄙覆軍殺將者數矣朝廷未嘗行法正刑一􅋀容貸姑息而已其論功行賞有濫無遺由此觀之則邉臣功重賞輕者莫之有也此命一下人人延首以待賞徧賞則無名偏賞則徒召怨而衆不服此因一懐徳之濫遷更推而及於衆也若朝廷修明紀律振舉憲章其許懐徳伏乞奪軍職付環衛或除一郡則内外不戒自肅而軍政立矣或朝廷以成命新行疑於追奪則其續𫝊宣命乞寢不行猶庶㡬防遏其泛濫先是監察御史包拯言近降條貫應係臣僚上殿不得陳乞恩澤並令閤門告報如違仰御史䑓彈奏者竊見臣僚殊不遵禀例以奏覆公事為名因而僥求者多矣昨兵部郎中馬絳差知越州因上殿敘述乞改官續又羣牧判官吕昌齡自河北牧馬回上殿亦乞省府差遣雖各有䑓諫官論列然並免勘罰致今來馬軍副都指揮使許懐徳上殿乞轉觀察留後縁懐徳近授觀察使累任别無顯效而不顧邦憲冐瀆聖聰人之寡廉一至於是欲望特賜取勘施行仍乞今後但是臣僚因奏陳乞恩澤者或有彈奏並乞依條勘劾重行朝典庶使僥妄之軰稍知警懼拯言既不從懐徳遂遷留後方平又言之訖不從也五年閏五月懐徳初除觀察使乙巳户部副使夏安期等言與鄜延經略使沈邈已減罷官貟使臣四十四人九月庚寅所書可參考丙午降堂後官贊善大夫張用和為大理寺丞監潭州糧料院用和嘗以事干慈孝寺主僧文旦不從㑹詔諸佛寺有祖宗神御者遇乾元節益賜紫方袍而用和獨不以慈孝載敇中故貶之真宗賢妃法正悟真大師杜氏卒八月戊申朔贈貴妃太常禮院言准令為内命婦二品以上一舉哀而止今貴妃雖一品又縁入道難用貴妃禮詔罷輟朝舉哀以明真大師朱賢妃例用一品儀仗葬之己未刑部貟外郎知制誥王琦為契丹國母生辰使六宅使嘉州刺史錢晦副之右司諌知制誥錢明逸為契丹生辰使内園副使閤門通事舍人楊宗説副之户部判官侍御史王平為契丹國母正旦使左班殿直閤門祇候王道恭副之金部郎中判三司勾院許宗壽為契丹正旦使内殿承制夏元吉副之詔臣僚子孫恃廕無頼嘗被真刑者如再犯私罪更毋得以贖論時邵武軍言故祕書監致仕龔曙之孫屢犯屠牛法當以廕免上特命加真刑而更著此條又詔河東陜西經略司應在邉兵官及指使使臣累有戰功者具出身及逐次因勞遷官歴任有無贓私罪送樞宻院以備選使壬戌詔陜西河東經略司西人雖納欵稱臣然元昊之心詭譎難信恐諸路乘罷兵之後漸弛邉備其益務練士卒完城壁常若㓂至有不如詔者亟以名聞癸亥御崇政殿策試賢良方正能直言極諫太常博士錢彦逺及武舉人彦逺策入第四等擢祠部貟外郎知潤州武舉授三班奉職者兩人借職者十七人補三班差使殿侍者二十四人彦逺易之子明逸之兄也宋興以來父子兄弟制策登科者錢氏一家而已彦逺至潤州上䟽曰陛下即位以來内無聲色之娛外無田漁之樂而前歳地震雄霸滄登旁及荆湖幅貟數千里雖往日定襄之異未甚於此今復大旱人心嗷嗷天其或者以為陛下備㓂之術未至牧民之吏未良天下之民未定故出譴告以示之茍能欽天之戒増修徳業則宗廟社稷之福也古者外國言語衣服與中國不同其來也不過驅老弱掠畜産而已今契丹據山後諸鎮元昊盗靈武銀夏衣冠車服子女玉帛莫不用之往時元昊内㓂出入五載天下騷然及納欵賜命則縁邉長吏不復銓擇髙冠大裙耻言軍旅一日契丹負恩乘利入塞豈特元昊之比邪湖廣蠻獠刼掠生民調發貲歛軍須百出三年於今未聞尺寸之效惟陛下念此三方之急講長久之計以上答天戒則天下幸甚賜宰臣賈昌朝等并從官御飛白書人一幅庚午詔自今翰林醫官院犯事並依七品例以贖論癸酉右諌議大夫參知政事吴育為樞宻副使樞宻副使工部侍郎丁度參知政事育在政府遇事敢言與宰相賈昌朝數爭議上前殿中皆失色育論辨不已乃請曰臣所辨者職也顧力不勝願罷臣職因與度易位度為樞宻副使在龎籍後籍女嫁參知政事宋庠之子庠固言於上以親嫌不可共事故越次用度始昌朝與育爭上欲俱罷二人御史中丞張方平將對昌朝使人約方平助已當以方平代育方平怒叱遣之曰此言何為至於我哉既對極論二人邪正曲直然育卒罷世皆以方平寔為昌朝地也此據方平墓誌及本傳然誌謂育卒罷而髙若訥代之盖此年三月事非此時也又若訥代育寔為樞副非參政墓誌似委曲為方平諱今不取甲戍監察御史唐詢為工部郎中直史館知湖州竟以宰相親嫌罷也乙亥太平興國寺重修太祖神御開先殿成上飛白書榜迎天章閣神御奉安命宰相賈昌朝為禮儀使九月戊寅朔改新知邢州郭承祐知相州知諫院錢明逸言承祐昔嘗知邢州而為百姓所納今復命之則州人無以自安故易之知并州鄭戩言麟府二州有並塞閒田可招弓箭手一二萬人計口給田以為疆塲之防從之庚寅戸部副使工部郎中夏安期為天章閣待制陜西都轉運使安期與諸路經略安撫司議捐邉費凡奏省吏員及汰邉兵之不任役者五萬人八月乙巳所書可參考時數有災異戸部貟外郎兼侍御史知雜事梅摯引洪範上變戒曰王省惟歳謂王總羣吏如歳兼四時有不順則省其職今日食於春地震於夏雨水於秋一歳而變及三時此天意以陛下省職未至而丁寧告戒也伊洛暴漲漂廬舎海水入台州殺人民浙江潰防黄河溢埽所謂水不潤下陛下宜責躬修徳以回上帝之眷祐陰不勝陽則災異衰止而盛徳日起矣又言權陜西轉運使張堯佐非才由宫掖以進恐上累聖徳及奏減省資政殿學士貟召待制官月議政復百官轉對上謂大臣梅摯言事有體以為戸部副使本傳以摰言災異為摰任殿中侍御史時盖誤也按災異皆今年事今因摰遷官附見張堯佐權陜西漕是月即真摰言亦必在是月惟奏減資政殿學士員請召待制議政及百官轉對恐别有月日當考辛卯知青州葉清臣言登州地震不止請増屯禁軍以防兵㓂之變從之夏國主言先以兵馬收獲承平川一帶境土既分賞得功将校今邉臣故有所爭未協累年之議甲午遣刑部員外郎張子奭與夏國所遣人面議仍以詔諭夏國主壬寅以延州髙平新修堡為安塞堡甲辰登州言有巨木浮海而出者三千餘條乙巳戸部判官祠部郎中崔嶧為荆湖南路體量安撫時蠻猺未平特命嶧往議討除招安之策嶧長安人詔入内殿頭李繼和為擘劃劵馬等勞績於轉官年限内與减四年仍不理入仕及三十年自今有酬奬勞績並依此此據㑹要九月事無其日冬十月丁未朔詔比遣張子奭往延州與夏國議疆事其豐州地當全屬漢界或所議未協聴以橫陽河外嚮所侵耕四十里為禁地若猶固執即以橫陽河為界初夏國既獻鄂尚綳烏伊特恰布等九寨又納豐州故地欲以牟尼拉等處為界下河東經略使鄭戩而戩言牟尼拉等處並在豐州南深入府州之腹若如其議則麟府二州勢難以守直宜以横陽河為界上乃以戩所上地圖付子奭往議之壬戌詔黄河諸埽官吏如經大水抹岸嵗滿並與逺地官湖南轉運使周沆言指使卒景賢招降道州蠻黨五十六戸二百五十九人詔其首領以次補授職名仍令所部常拊存之癸亥賜湖南討蠻猺軍士特支錢甲子詔三司比舉選人監在京新城門如聞所舉者多權富干請無益於事其罷之賜延州保安軍等處屯駐駐泊廵檢軍士特支錢辛未知桂陽監宋守信言猺賊唐和嘯聚千餘衆為盗五六年卒不能克者朝廷不許窮討故也今衡州監酒黃士元頗諳溪峒事願得敢戰士千引路土兵二百優給金帛使之逐捕必得然後己并令本路鈐轄亓贇等合力以進彼既勢窮必將欵附詔如其策於是大發兵討之壬申詔知廣州魏瓘與本路轉運使專提舉捕討蠻猺若中覆不及者聽便宜從事甲戍上謂輔臣曰山東連歳地震又有巨木浮海而出宜防未然之變其下登州嚴飭武備仍具所蓄兵械名數以聞御史中丞張方平言臣伏見諸路地震自荆湖川峽山東河北河東陜西至於嶺表相繼未止比者忻州地震於後兵難及今適定此際登萊山崖摧圯災異所示恐不徒然歴考前志之言盖地主陰陰者臣道也民也四裔也推之今事凡任内外之重即無權强之臣則今事之可憂者外備四裔而内撫民爾西北二敵朝廷以為大患故於守備素為用心至於湖湘之間蠻猺作梗一方塗炭七年未觧近日衝突稍及嶺外如或不即平殄事亦不可輕忽而又海南交趾氣炎漸張路接邕容頗連溪峒南方之事理須經略昔唐室之盛屢有中原之難蕃戎再入京城而王室尋復寧定至懿宗時安南都䕶李琢失於撫禦蠻㓂侵擾遂致用兵度支困於饋食方鎮疲於更戍因而有徐州龎勛倒戈之變天下縁此以致危亂則知事常起於細微禍常成於所忽也至於京東西兩路中國根幹畿甸屏蔽緩急所資常須安靜以鎮天下然毎患冦賊淵藪其中所幸嵗得豐穣必不大至連結若因之以邉警加之以饑饉法不勝於姦宄亂必始於鄕閭何以言之自慶歴初遣朝臣分往京東西等路招刺强壯弓手充宣毅軍俄又聴其傭人自代於時臣知諫院固爭此事朝議已行不為停罷今民力所以大困國用所以一空盖由此一舉之失也其諸州宣毅悉聚游惰不逞之民非有材力技勇之所選也縁光化軍軍賊竊發朝廷條約失體姑息過當如養驕子轉生怨懟臣比在審刑諸州奏到宣毅兵士文案無日不有大則謀欲殺官吏刧倉庫小則謀欲刧民戸入山林多至三五十少亦一二十數以告賞之利重故有謀輙被告發間雖閲習乃同兒戯無益軍國坐竭官私不征不役居惟念亂儻乗釁隙必有響應之勢此其亂階一也初㸃定强壯已屢經教閲槍刀弓弩各嘗習學及後招刺之時既傭人充代而其强壯本身並有身力例各不紹農業遂樂惰游攪擾里閭侵凌細弱趍坑冶以逐末販茶鹽而冐禁儻縁凶歉扇惑流民結為賊盗必先此類唐之巢譲由此起者此其亂階二也又京東西之民多信妖術凡小村落輙立神祠蚩蚩之氓惑於禍福往往奔凑相從聚散逓相蔽匿官不得知惟知畏神不復憚法寖使滋蔓恐益成俗漢中平元年黄巾賊天下同日起凡三十六萬衆各有部率由積妖而成也晉盧循軰乃歴代常有之事此其亂階三也所謂地震之異儻在民與四裔此其最可慮哉潭州劉䕫清素士也恐非應務之才邕桂長吏尤宜推擇才略宣毅冗兵漸謀消汰之術民之先在强壮籍者其干法冐禁謂須别立峻防頗聞民間猶多當時教閲兵仗亦合嚴降約束收納入官村落神堂令在所毁拆宻加察捕民之習妖者此亦思患豫防之大略伏冀採納施行詔磨勘選人歴任内曽失入死罪未决者候再任舉主應格聴引見其已决者三次乃計之若失入二人以上者雖得㫖改官仍與次等京官㑹要六年十月事十一月丁丑朔詔天下旬設其無公使錢處自今以係省錢給之己卯遣著作佐郎楚建中往延州同議夏國封界事張子奭道病故也建中時管勾鄌延經略司機宜文字與夏人楊守素議地界有衆暴至二輕騎疾前引滿向建中建中披腹使射曰吾不憚死懼禍西國衆服其量此據泰陵録附傳當考壬午責鄜延蕃官洛苑副使劉化基為太子右内率府副率京西監當初化基掠蕃部威布等婦女羊馬又以官鈔易馬與蕃部收息錢二百九十九千法當死為其嘗有戰功特貸之癸未廣東轉運司言湖南猺賊千餘人㓂英韶州界朝廷既用宋守信策大發兵討猺賊賊遁入郴州黄莽山由趙峒轉入英韶州界依山自保時出抄掠乙酉詔知青州葉清臣經制瀕海州郡當備禦兵㓂之事以聞丁亥上謂輔臣曰猺賊侵擾州縣官兵多暴露之苦其宻諭主將務加安䘏戊子翰林學士兼龍圖閣學士權三司使王拱辰為侍讀學士兼龍圖閣學士知亳州從拱辰所請也翌日内降指揮留拱辰侍經筵而中書執奏不行拱辰因請改知鄭州從之侍御史賈漸監察御史何郯等劾拱辰營求内降乞正其罪不報拱辰自三司使出知亳州及中書執奏史皆不詳至和二年七月趙抃劾拱辰舊掌記司以舉豪民鄭旭得罪被絀當考改知鄭州乃十二月己酉今并書何郯奏議云侍御史賈漸已曽論列今附見右諫議大夫權御史中丞張方平為翰林學士權三司使河北鹽務在滄濵二州滄州務三濵州務四嵗課九千一百四十五石以給一路舊并給京東之淄青齊三州淄青齊通商乃不復給自開寳以來河北鹽聽人貿易官收其筭嵗為額錢十五萬緡上封者嘗請禁𣙜以收遺利余靖時為諫官亟言前歳事宜以來河北之民㨂㸃義勇强壮及諸色科率數年之間未得休息臣嘗痛燕薊之地陷於敵中㡬百年而民忘南顧之心者敵國之法大率簡易鹽麴俱賤科役不煩故也昔者太祖皇帝特推恩意以恵河朔故許通鹽商止令收税今若一旦𣙜絶價必騰踊民茍懐怨悔將何及伏縁河朔土多鹽鹵小民税地不生五榖惟刮鹻煎之以納二税今若禁止便須逃亡鹽價若髙犯法必衆邉民怨望非國之福伏乞且令仍舊通商無輙添長鹽價以鼓民怨其議遂寢河北初議𣙜鹽實録不載余靖諫章獨存此奏及王拱辰奏立𣙜法時靖絀責久矣盖先有建此議者靖論其不可故罷既而拱辰使三司復議舉行又為河北漕臣所沮而河北漕臣乃别議増筭拱辰更立𣙜法未下而張方平亟奏罷之實録國史並疎畧今参取靖諫草及食貨志并方平墓誌修入及拱辰為三司使拱辰是年正月戊子以翰林學士兼龍圖閣學士權三司使復諫議悉𣙜二州鹽下其議於本路都轉運使魚周詢亦以為不可本志以為都轉運使夏竦誤也竦五年八月判并州六年二月改大名拱辰十一月戊子罷三司使出知亳州張方平代之方拱辰在三司時竦無緣為都轉運使㨿何郯奏議為都轉運使者乃周詢也王巖叟元祐初奏議亦誤以魚周詢為夏竦且言商人販鹽與所過州縣吏交通為弊所筭十無二三請敕州縣以十分筭之聴商人至所鬻州縣併輸筭錢歳可得緡錢七十餘萬三司奏用其策上曰使人頓食貴鹽豈朕意哉於是三司更立𣙜法而未下也方平見上問曰河北再𣙜鹽何也上曰始議法非再也方平曰周世宗𣙜河北鹽犯輒處死世宗北伐父老遮道泣訴以鹽課均之兩稅錢而弛其禁世宗許之今兩稅鹽錢是也豈非再𣙜乎且今未𣙜也而契丹尚盗販不已若𣙜之則鹽貴敵鹽益售是為我歛怨而使敵獲福也敵鹽滋多非用兵不能禁邉隙一開所得鹽利能補用兵之費乎上大悟曰卿語宰相立罷之方平曰法雖未下民已户知之當直以手詔罷之不可自有司出也上大喜命方平宻撰手詔下之河朔父老相率拜迎於澶州為佛老㑹七日以報上恩且刻詔書北京其後父老過詔書下必稽首流涕食貨志云三司奏用其策仁宗曰使民頓食貴鹽豈朕意哉下詔不許若不許三司之請則不湏下詔今既下詔盖已立法而未行墓誌當得其寔今從之食貨志不載方平事盖踈略也熙寧八年六月章惇又議𣙜鹽監察御史何郯亦言臣伏見河北諸州所産鹽貨自太祖開寳年降詔罷禁通商止令收稅於今多年民享其利昨聞臣僚擘畫欲𣙜買滄濵鹽入官召商旅入中邉上糧草筭請且欲𣙜滄濵鹽即湏禁止諸州小鹽不禁則侵官中課利若禁則十數州軍從此民必受弊何者河北一路除滄濵出鹽外其深冀邢洛等十數州地多鹹鹵不可耕殖民唯以煮小鹽為業衣食稅賦皆出於此若果禁斷一旦窮民失業散而為盗則所虞非細近因朝廷指揮下本路都轉運司相度事雖未行民心已甚疑惑况本路諸色鹽官中久來各已定起稅額毎年所入課利數亦不少今雖改用𣙜法或商旅未信不來􅄸請所得年課未必増多兼聞都轉運使魚周詢已具條利害論列亦謂𣙜法不可行而止乞増稅臣竊謂此舉於河北事體利害最大其臣僚所請𣙜鹽且乞停罷如朝廷已議定不行猶恐彼處民或未知亦乞指揮下本路諸州軍告諭人民以朝廷今來並用舊法不復行禁𣙜之意使一方之人各安生業癸巳以講詩徹宴近臣宗室及講讀官於崇政殿辛丑獵於城南東韓村自玊津園去輦乘馬分騎士數千為左右翼節以旗鼓合圍塲徑十餘里部隊相應上按轡中道親挾弓矢而屢獲禽是時道傍居民或畜狐兔鳬雉驅入塲中上因謂輔臣曰畋獵所以訓武事非專務獲也悉令縱之至棘店御帳殿召問所過父老子孫供養之數土地種植所宜且歎其衣食麄糲而能享壽人加慰勞還次近郊遣衛士更奏技駕前兩兩相當掉鞅挾槊以决勝負又謂輔臣曰此亦可觀士之才勇也免所過民田在圍内租税一年時交趾李徳政適遣使祕書丞杜文蔚等獻馴象未見上特召預觀賜紫袍塗金帶十二月丙午朔遣官祈雪己酉詔保安軍鎮戎軍𣙜場嵗各市馬二千匹博買羊一萬口壬子雪詔京東路知州通判兵官並如三路州軍選差人丙辰命入内押班張惟吉等修南京鴻慶宫三聖御容殿己未詔三元節夏至臘日自今並休務庚申詔伎術人自今毋得任畿内兵馬都監監押丙寅安化州蠻䝉光速等來貢方物辛未契丹國母遣懐化軍節度使耶律洞崇禄卿石右契丹遣昭徳軍留後耶律宜少府監韓運來賀正旦壬申置京東兩路提舉廵檢捉賊各一貟以沂宻州淮陽為一路登萊淄青濰州為一路
