body:
  text: 續資治通鑑長編巻三百四十九宋李燾撰神宗元豐七年冬十月丁夘朔詔支末鹽鈔三十萬緡付河東路轉運司市糧草詔湖南邵州武崗縣减將下防托拏手二百以其錢糧募土人入溪峒從鈐轄司請也御史寋序辰乞令諸路提㸃刑獄司毎季具以論决詳覆大辟事狀以聞付刑部注籍㸃檢案治失誤詔提㸃刑獄司季申刑部戊辰㸃檢諸陵噐物所言安陵東有青龍河越數小澗用透槽行水可以徧及三陵下宫於熈陵之西退入白虎澗逹于洛下太史局以為不可從之詔景靈宫管勾内品雷廸罰銅十斤送西京洒掃班坐欲移用美成殿奉祠物及應宿不直也己巳駙馬都尉錢景臻對因謝父知鄆州暄除寳文閣待制上曰暄為郡有聲朝廷自以才用又謝子忱賜名上曰主賢冝有子也其勉以學九月戊午中散大夫知鄆州錢暄除寳制同經制熈河蘭㑹路邉防財用馬申言糴買全在冬春之交乞十月後印給次年鹽鈔限正月至本路戸部言若本路豫得鈔招誘入中牽制秦鳯等四路鈔價乞依秦鳯等路吏部差使臣於正月下旬押赴經制司從之詔涇原鄜延兩路發赴城寨堡鎮防秋諸軍比諸路特早並與特支錢十一月四日可考庚午大名府路安撫司言近以修閉水口發徳博州夫萬二千今水口已塞欲因此夫修廂軍營及築上下水關詔食庫館驛舍等令轉運司依先降指揮其修城令安撫司具實用人功以聞權開封府界提㸃范峋等言諸縣尉專捕草市賊盗及通管縣務歲下鄉常以百數若省縣尉恐一主簿不能辦事乞依舊存留從之吏部言宗室子漪換通直郎年十八宗室授殿直者二十聽出官無文資法詔子漪候年二十許出官詔支錢鈔二十萬緡付河北轉運司市糧草壬申詔河東經畧司近諸處雖有牒報即非大㸃集其葭蘆吳堡塞守禦保甲可放散是日西賊犯涇原民多以火死二十二日奏先是殿中侍御史翟思言知樞宻院韓縝受知石州文思副使燕復所遺馬一匹市價二百千縝償以四五十千開封府界保甲司勾當公事右侍禁楊嵩亦嘗遺縝馬一匹價直與復之馬等而縝亦以三四十千買之以與兄絳詔縝分析於是縝言知石州燕復嘗為臣買馬令其子孝嗣言元買劵直絹四十匹臣先以銀十兩償孝嗣道里費許償以山東絹八十匹又侍禁楊嵩自言入西界得一馬駒欲賣為路費臣諭通直郎李士京以三十千買之後士京云馬不可乗又患疥瘙今欲各付其主手詔縝因買馬以致人言辨析厥初契約咸在朕豈以一𤯝督過大臣宜特釋罪後三日思罷侍御史試國子司業翟思言縝在九月二十六日改司業在此月九日并書之是日十月六日壬申西賊冦静邉寨將官彭孫擊却之此據御集追書仍附注御集二事涇原路將官彭孫下初六日静邉砦捍賊有勞曾出戰漢畨兵員可等第與特支禁軍七百文人員增上廂軍兵民蕃兵五百増上凖此仍降指揮下走馬承受龎卞喝賜所有得功人仰經畧安撫司疾速保明聞奏元豐七年十月十五日下又賜劉有端勘㑹今月六日涇原路静邉寨駐劄將官彭孫等禦捍夏國大兵功狀顯異兼熈河路定西城守禦人兵不多及經畧安撫制置司已有排辦下准備賞賜銀碗不少可以支用得足仰限指揮到除将帯去銀碗二千隻依已得指揮俵散外餘三千隻更不得卸納依舊用元打角車子裝載躬親前去涇原路計㑹盧秉推排當日諸將元出戰馬軍人給一隻依熈河路俵散令裝載以賞異功即不得夾雜無勞人在内仍宣諭盧秉静邉若非經畧安撫司預備有方必不能致是推沮賊鋒安静一道候宣諭俵散訖疾速赴闕甲戍詔石州葭蘆吳堡兩寨各置水軍一指揮以百人為額詔供備庫副使知㑹溪城王令宣追一官勒停坐擅殺官牛與蠻立誓取公使庫無名額錢悔過以償也乙亥給事中韓忠彦為禮部尚書忠彦入謝上諭曰先令公之勲朕所不敢忘卿復盡忠朝廷此未足以酬卿也文彦博私記云王珪謂遷忠彦太峻蔡確獨左右之上曰此特為其父故不可為例也且云忠彦方許確婚故得確助此當考中書舍人兼侍講蔡卞試給事中朝奉郎守起居郎楊景畧朝散郎守左司郎中錢勰並為試中書舍人免召試景畧勰奉使髙麗方還在道並擢之詔應歿於王事補授人並許依舊條指射差遣又詔内藏庫支紬絹各五十萬匹於熈河經略司封樁涇原路經畧司言蕃官吿諭部族買戰馬賞絹撫養庫闕錢詔於鳯翔府封樁李元輔經制絹内給萬匹詔劉昌祚西賊大兵已㓂熈河路其鄜延路守禦保甲速詳度放散以聞新紀書乙亥夏人冦熈州舊紀不書丁丑吏部言經制變運川峽路常平積剰錢所增息錢二百三十二萬緡乞推恩詔李元輔遷兩官史君俞張茂先候改官日各遷一官减磨勘年有差詔殿前司馬軍年四十以上武藝不及二等者給限一季習學限外藝不進轉支馬與闕馬教頭詔諸路封樁闕額禁軍錢榖並依元豐令隨市置變易其不得减過元糴納價法除之光禄卿吕嘉問言近者牛羊司典吏李璋犯乞取贓已論决竊惟朝廷捐數十萬緡行一重法於天下欲得吏清政平待之固已至矣而無忌憚之吏已漸弛於法行之初盖由本法與錢之人纔減取錢之人二等乞定河倉法斷遣刑名自陳告首之賞與引領過度一切如舊外其行用者止以不應得為坐之下刑部恭詳其與若許者依律得罪或依在京請求非法公事條得罪重并官員在京行用非請求曲法不坐并輸税人行用非攬納及行求枉法者不坐之類並依本條外乞如嘉問所定從之戊寅詔廣西經略司勾當公事連州軍州推官譚掞特改京官權通判邕州經略使熊本薦也賜軍噐監度僧牒千市材料詔定西城守城漢蕃諸軍并百姓婦女城上與賊鬭敵者人支絹十匹運什物者七匹城下供饋雜役者男子五匹婦人三匹庚辰詔廣西進士黎易從陳䝉特免將來文觧以入黎峒說諭陳被被等歸明故也張頡傳有陳被事迹當考詔饒州童子朱天申對於睿思殿賜五經出身天申天錫再從兄禮部言天申年十二試誦十經通也四月丁丑天錫見辛巳朝獻景靈宫癸未宻州商人平簡為三班差使以三徃髙麗通國信也福建路轉運副使王子京言建州臘茶舊立𣙜法商賈冒販利甚厚自熈寧三年官積陳茶遂權聽通商自此茶戸售客之茶甚良官中所得惟常茶稅錢極㣲南方遺利無過於此乞仍舊行𣙜法建州嵗出不下三百萬斤南建州亦出二十餘萬斤欲盡買入官度逐州軍民戸多少及約鄰路民之數計置即官場賣嚴立告賞禁建州賣私末茶借豐國監錢十萬緡為本並從之所乞均入諸路𣙜賣委轉運司官提舉福建王子京兩浙許懋江東杜偉江西朱彦博廣東髙鎛御集載子京奏云𣙜賣臘茶所收净利不减鹽課當考八年二月七日并𣙜通商地分元祐元年二月二日依舊通商食貨志第五巻七年福建路轉運副使王子京言建州舊𣙜臘茶而商賈冒販獲厚利熈寧三年官茶陳積乃聽通商自此茶戸以善茶售賈人官所得皆下稅錢為耗請𣙜之便建州歳出茶不下三百萬斤南劒州亦二十餘萬官盡買之度逐州及鄰路當用數為多寡均與𣙜賣委轉運官一員領之以助經費園戸亦便假豐國監錢十萬緡為本並從之如是兩浙江東西廣西路皆委官而福建以委子京其法盡索種茶民使自占嵗造茶數悉賣於有司而重禁福建兩浙江南東西廣西之鬻建茶者明年戸部言子京又請禁兩浙江南廣東茶詔惟畿南陜西路通商餘皆為𣙜茶地云乙酉上批知青州鄧綰言本路夏秋豐稔米斗直五七錢未知虛實宜令京東西路提舉司具州縣米榖市價以聞既而綰言昨以秋成故奏菽粟斗六七錢今慮提舉司奏物價稍增乞照察上以綰佞知其初奏不實也禮部貟外郎何洵直言伏見永昭陵下宫帝后神御同幄朔望上食時節並同薦獻安陵合祔昭憲皇后其下宫惟有宣祖神御及永昌永熈永定陵下宫各無諸后神御大節帝后異宫酌獻朔望上食等特酌獻帝一位而諸后皆不豫饗乞並於下宫同幄奉安詔諸后止設位牌同酌獻樞宻言西賊近冦熈河涇原勢已敗北深冬苦寒必不能大舉奔衝涇原秦鳳防秋軍馬並在極邉坐耗芻粟欲委經畧司審度抽兵各歸近裏從之以陜西轉運司言賊退乞減邉兵也丁亥詔應職事官以除授先後為序同日除者以寄禄官上批今月丙戌大理寺開封府見禁罪人以千數勘結濡滯乃如此歲將大寒可令晝夜結絶無乆繫㽞先是賜獄囚食有司以數聞故申敕之戊子敕交趾郡王乾徳省廣南西路經畧司奏昨凖朝命安南奏以溪峒勿惡勿陽等州峒疆至未明令本司計㑹本道差職官辨正今准安南報差黎文盛等至邉界已辨正乞降詔㫖付安南遵守事向觀奏牘陳叙封疆特命邉臣計議辨正卿保膺寵禄世載忠純欽奉詔音申飭官屬分畫州峒本末以明勿惡勿陽二峒已降指揮以庚儉邱矩呌岳通曠庚巖頓利多仁勾難八隘為界其界外保樂練苖丁放近六縣六縣下恐有脫字時政記亦然宿桑二峒並賜卿主領卿其體此眷私益懐恭順謹遵封約勿縱交侵初熈寧十年乾徳言乞詔囬大兵即遣使謝罪奉職貢詔從其請令安撫司遣人畫定疆界而宣撫使郭逵以為昨大軍至富良江交趾納欵日偽文思使矯文膺已甞議定大兵所至即是封疆令太平寨主成卓徃分畫元年乾徳遣陶宗元入貢乞四州土詔令交趾盡歸所略邕欽亷三州人口即給廣源等州而交趾所送人口二百有六年十五以上額刺曰天子兵二十以上面刺曰投南朝婦人左手刺曰官客安撫司復索三州官吏婦人而交趾固稱無有以故乆之不决五年九月交趾知上源州楊夀安㓂歸化州宿兵謀入順安等七州峒歸化州故勿陽峒穴也而知邕州西京作坊使劉初以為皆廣源州故地開寳中廣源道坦綽儂民富願以管下古耽覆和十州比七源蠻内附輸稅朝廷授民富以官知廣源州事後雖因劉紀納土朝廷以通儂州賜智㑹智㑹民富之宗也交人無厭失信妄動不若因此處置以息將來邉患而交人以為昨采銅於勿陽峒即不知有歸化州經畧使能本亦言嘉祐中儂宗旦以勿惡等峒歸明賜名順安州治平中儂智㑹以勿陽峒歸明賜名歸化州今儂氏所領州峒初不𨽻南平而歸化等州係右江控扼咽喉之地制御交趾大理九路白衣諸蠻之要路乞詔交趾詰其侵犯歸化州之故及令盡還略去生口絶其長惡未萌之心是歲成卓鄧闢乃與南平使黎文盛阮陪定議如十月己巳詔書而黎文盛寓書熊本曰成卓言上電下雷温潤英遥勿陽勿惡計城貢渌頻任峒景思苛紀縣十八處從南畫界以為省地陪臣小子惟命是聽不敢爭執然儂氏所納土皆廣源之屬也幸遇聖朝萬政更張何愛此磽确瘴癘之地不以囬賜本道存庇外臣或曰昨王師所取者當還其守吏挈而歸明者難復也文盛以為土有主屬守吏挈而逃去盗主之物也主守自盗不赦之􅂍盗物寄􅂍法亦不許况可汚於省籍乎而本及卓以文盛雖有求地之言然又言惟命是聽不敢争執以為大意已定故降詔焉六月四日壬申八月二十一日可考舊紀書戊子詔安南地瘴癘戍守者多死其分畫交趾界以六縣二峒賜之新紀但書詔分畫云云宻記時政紀有辨正事四節今附此七年八月七日令熊本勒成卓等供析黎文盛等公牒及面議並不曽言儂宗旦所納州峒等更不敢爭占今來便稱各得歸着了當有何照據及因何便乞降詔并恩錫具詣實聞奏八月十七日熊本奏成卓申黎文盛牒内稱些小溪峒若係省地請供申經畧使衙聞奏朝廷惟聽囬詔指揮等事擬定欲令熊本子細看詳成卓等前後所申或本官已到本司即當司審問及詳黎文盛累次公牒并對答詞意如有可執據委是分明交人将來得詔不致反覆即具結罪保明聞奏八月二十日熊本奏成卓等申黎文盛將出公狀於勿陽順安等處從南畫斷地界等事同奉㫖擬定將隘外八處縣峒給賜交趾詔書并賜黎元盛阮陪物色敕書進呈八月二十三日昨為歸化順安州峒本道未悉本末因依令經畧司差官辨正及詔乾徳遣人分畫今據廣西經畧司奏差成卓與交趾差來官黎文盛等辨析指諭已見本末乞降詔今已安南恭順分畫已定其呌岳隘外保樂練苖丁放近六縣宿桑二峒共八處特賜交趾主領依此降詔開諭等事同三省奉㫖令學士院依此草詞侯廣西經畧司勘㑹到隘名修冩其黎文盛等並賜細衣著文盛二百匹阮陪一百匹詔宗室孀婦與子孫於所請俸料從一多給子孫二人以上者通此涇原路經畧司言今月壬申西賊犯境燒柴草積民多火死者詔給死者男丁絹七匹小兒五匹詔諸路兵官緣邊都監武臣知城縣堡寨主如尚書左右司禁謁法己丑手詔李憲累得奏以夏賊大入定西城地分攻圍城壘及分兵康谷燒毁族帳事繼聞羌衆並已遁散其禦賊得功傷中漢畨兵民已下本司保明及已差内侍劉友端乗騎徃本路支散茶藥及喝賜銀絹去訖宜契勘賜人預准擬合用之數於側近排辦無令乏少有輕重傷中等於格該别賞之人可依詳之降朝㫖取近日隨功狀輕重大小保明聞奏勿令差漏遺落朱本庚寅中書省言樞宻承㫖司𫝊宣事已得㫖如别無奏禀合作録黄過門下省覆奏本省更不入進文字從之㤗寧軍節度推官知大名府莘縣晁端禮追三任官罰銅二十斤勒停千里外編管坐以官錢貸進士閻師道及師道請求豫借保甲錢買弓箭為提舉保甲司所劾也辛夘樞宻院奏乞以自來御前批降指揮備載於冊以為樞宻府龜鑑從之癸巳手詔李憲得所論夏賊即今國中虛實形勢彊弱用事首領舉動妄謬之狀甚善賊情大槩其盡於此矣然夏羌自祖宗以來為西方巨患厯八十年朝廷傾天下之力竭四方財用以供饋餉尚日夜惴惴然惟恐其盗邊也若不乗此機隙朝廷内外並力一意多方為謀經畧除此禍孽則祖宗大耻無日可雪四方生靈賦役無日可寛一時主邊將帥得罪天下後世無時可除俯仰思之所以今日有此申諭昨得涇原奏體訪去興靈州迃直道徑方知蘭州渡河去賊巢甚邇今若於四五月間乗賊人馬未健加之無㸃集備我之際預於黄河西上以蘭州營造為名廣置排栰尅期放下造成浮橋以本路預集選士健騎數萬人一發前去蕩除梟穴縱不能擒戮大憝亦足以殘破其國使終不能自立未知其計如何宜宻謀於心具可否令至親謹宻之人親書奏來無或少有洩露昔王濬取吳髙熲平陳曹彬等下江南莫不出此計卒皆能立竒功除一時巨患爾宜親閲其實加意潛謀審念之又得譯録到温錫沁等蕃字及遣來蕃僧羅卜藏口陳邊謀甚悉茍直如來約實大利也不知羌酋信誕所在爾更冝加意置心經營盖時者難得而易失古今通患其星多哩鼎若委如所謀從中而起外以漢兵如今月二十一日所諭合勢而東則大事成矣惟在爾多方以智圖之則巨患可除國憤紓有日矣朱本有此墨本無之今月二十一日所諭當考熈河蘭㑹路制置司言九月乙丑西賊圍定西城等五副將秦貴等奮死禦賊乞推恩第上蕃官左藏庫副使堅多克等雜功六百二十三人詔秦貴照管定西城遷一官賜絹三十匹貴子賜絹十五匹内殿崇班韋萬等十八人分地救護南北門釣橋韋萬崔綱李忠冦士元各遷一官閻倍等十人各减磨勘二年陳臨等四人各減一年餘賜有差甲午户部言廣西轉運判官劉何乞𣙜買桂州修仁縣等處茶前此官司未甞經畫欲且施行候及一年就緒令提舉官立法所乞借常平錢及差官一貟提舉當候詔㫖提舉官差劉何其借提舉司錢限三年還元祐元年閏二月二十二日罷此詔樞宻院說與陳睦如到北界見髙麗舊曽相接或祗應人等若附近可以語言相通即與問勞宻記二十八日乙未御史中丞黄履言御史黄降彈察編敕所受朝㫖兩項不依條錄報其編敕所稱一時所受事不為條貫開封府定奪乃以為當臣伏詳若以一時指揮為暫行事誠有未安詔門下外省定奪竟如何當考涇原路經畧使盧秉言西賊入静邊寨攻第十六堡彭孫等併兵敗賊無所傷折殺其首領星多哩鼎乞加倍賞彭孫郭振總領將兵出塞遇賊邀逐有序措置精審姚麟等雖不見賊總兵張大聲援雜功將副十五人部將等三百七十九人詔彭孫通磨勘并先出界未賞功除果州團練使本路都鈐轄郭振遷三官就差本路都監雜功下盧秉委彭孫分三等以聞兩紀並書乙未夏人冦静邉寨涇原路鈐轄彭孫敗之蔡絛叢說云西羌嘉勒氏乆盗有古凉州地號青唐傳子董戩死其子弱而羣下争強遂大患邉一曰星多哩鼎一曰青宜結果莊而星多哩鼎最黠果莊其亞也元豐末神廟詔諸将星多哩鼎俶擾王土既擅其國則彼用兵之際若旌麾之屬豈無獨異其狀者宜募猛士如能殺之或生捕得若卑官或白衣並拜觀察使不半歲有禆將彭孫者果臨陣踴躍而斬星多哩鼎以其首獻詔封彭孫觀察使於是果莊之勢􅉃未幾又生得之屬元祐初也遂以其事奏吿祐陵焉擒果莊之功盖得一時名臣文士歌詠因大流播然世獨不知殺星多哩鼎此乃青唐所以亡絛通畧臣謹據神宗國史星多哩鼎者乃西夏首領而以為青唐將恐誤按絛所云彭孫殺星多哩鼎事在七年十月乙未自元豐四年十二月丁夘責金州監當五年七月甲辰權涇原鈐轄知欽州七年六月辛巳以從姚麟出塞歸自内藏庫使忠州刺史遷皇城使十月乙未通磨勘并先出界功除果州團練使初未賞除觀察使也不知絛何所據殆妄說也其意似欲抹殺元祐擒果莊之功賊子敢爾姑具注此故供備庫副使致仕翟儀子元建言父任澶州廵檢元豐四年十二月乞致仕澶州失盗乃五年三月轉運使寋周輔奏父儀避責罰乞致仕朝㫖依衝替人例乞定奪刑部考實如元建所言詔翟儀落衝替周輔罰銅十斤成都府利州路經制買馬司奏請雅州碉門靈闗嘉州中鎮等寨各選委官置塲買四尺二寸以上堪配軍馬其茶馬禁法並依元奏施行所有逐州蕃蠻因來賣馬將到物貨並乞依黎州所得朝㫖博馬從之此據嘉州編錄冊増入乃七年十月二十九日敕也九月二十八日王存云元祐元年七月二十一日罷提舉陜西等路買馬監牧公事陸師閔奏勘㑹成都府利州路經制買馬司昨准朝㫖於雅州靈闗嘉州中鎮等寨置場買馬數内雅州靈闗寨並無蕃蠻馬元未曽置場外其嘉州中鎮寨雖曽置場亦無買到馬數今來未敢廢罷奉㫖令成都府利州路鈐轄司相度聞奏本司今相度雅州靈闗嘉州中鎮等寨置場買馬可廢罷從之乃元祐元年七月二十一日聖㫖此據嘉州編録冊今依本月日増入初置場在元豐七年十月二十九日
