body:
  text: 續資治通鑑長編卷四百二十三宋李燾撰哲宗元祐四年三月壬申朔監察御史王彭年言月朔四孟臘享太廟及奏吿諸室羣官執事循奉典禮殫竭精恪惟恐不嚴其在交接神明之際先則祼地次則獻爵為獻官躬行之事而瓚之實鬱鬯爵之實齊酒今皆遣有司酌之又以入於室獻官始受而祼獻且有司賤𨽻安得䙝近祼獻之實交乎堂室之間按開寳禮按鬱鬯醴齊四句係開寳禮文下云開元禮亦然則為開寳無疑原本俱作開元今改正鬱鬯醴齊惟親祠侍中贊酌之遣官行事則太尉親酌之開元禮亦然未聞一委之有司也望詔禮官博士討論故常舉酌酒奉爵之儀稱嚴祀欽奉之意及郊壇諸祠酌酒奉爵禮文皆請脩定從之詔融州管下舊係皇祐勑差置全家成丁係籍之户每年遇教閲並三丁抽一丁兩丁之家亦抽一丁赴教其單丁者即二年一赴外户内餘丁依舊存留係籍以備邊防更不教閲從廣西經畧司請也東上閤門使嘉州刺史知雄州王崇拯為威州團練使俟任滿日令再任駕部郎中邵䶵權知鄭州甲戍詔録張知白族子沂為郊社齋郎吏部尚書兼侍讀蘇頌等奏臣等撰進漢唐故事得㫖分門編脩成册進呈詔以邇英要覽為名乙亥中大夫中書舍人劉攽卒丙子景靈宫衍慶殿亡北珠此據政目増入政目云勾當官行遣今附吕公孺云云削此五字事下開封府繫治甚乆知府吕公孺言殿成主者不一又物之名數代者未嘗交也且諱日宫嬪遝至今有所亡豈可盡指吏卒獄雖具顧非聖裁不可上深以為然時幕人遷黼坐誤毁其角當徒者數十人公孺奏狀而釋之此以吕公孺墓誌増入更詳考之戊寅詔以季秋擇日有事於明堂詔故朝請大夫趙鼎與一子郊社齋郎從吕大防請也鼎治平御史趙彦若誌其墓右正言劉安世言臣伏自去年四月後來凡十七次奏疏論列胡宗愈罪狀乞行罷免至今未䝉施行臣聞齊桓公之郭問其父老曰郭何故亡父老曰以其善善而惡惡也桓公曰若子之言乃賢君也何致亡父老曰不然郭君善善而不能用惡惡而不能去所以亡也臣每讀至此未嘗不掩卷太息以謂鄙夫固陋燭理不明人之所非反以為是衆之所惡復以為美此乃愚者偏暗之常態固不足論若夫能知天下之善惡如辨黑白而無疑惑之心豈非知者有所不及然而郭君反以此而亡國其故何也夫國君能知善之為善惡之為惡則不可謂之不智特以其見善而不能用使君子無以自立知惡而不能去使小人足以成朋因循積累其害遂至於國亡然則有天下者可不視此以為戒乎臣竊惟宗愈欺君亂法毁滅廉耻其罪惡顯著為中外共知者十有二事臣固已極言之矣自後相繼奏章申執前論惓惓之懇必已盡闗聖覽若臣言為妄言則是熒惑天聴誣陷大臣宜正典刑以威天下若宗愈之罪如臣所奏則是陛下知其惡矣知惡而不去此古人之所戒也臣官在言責實畏公議茍不能排斥姦慝振舉紀綱使羣惡盛强壞亂政事則臣雖受異日之戮亦無補國家之患惟陛下辨之以早斷之以獨出臣前後章疏付外施行不勝幸甚又言臣伏自去年四月以後凡十八次奏疏論列胡宗愈罪狀乞行罷免至今未覩施行夙夕慚悸如負芒刺臣自領職以迄于今知無不言每䝉聴納獨是宗愈累章未出竊惟聖慮所以兼容必謂日月已深艱於追褫是以特屈公議使之兩全萬一如此臣竊以為過矣臣嘗觀仁宗皇帝用陳升之為樞密副使是時吕誨方在言路指其私行極力彈劾仁宗初亦難之而誨論奏不已章至十八上涉厯數月卒罷升之而後已宗愈自始進用不協物望與升之無異臣言宗愈之疏其煩多與誨略同而宗愈冒昧居位又與升之月日不甚相逺豈仁祖能受盡言於昔而陛下不能聴之於今吕誨能逐姦人於前而臣不能去之於後以微臣之謭薄猶見賢而思齊如陛下之聖明豈知惡而不去若謂進退執政必有迹狀則臣按宗愈不無顯罪初除御史中丞與見任宰臣明是姻家隱而不言盗取要任當時幸人之不知而知者亦不以告陛下欺君亂法孰甚於此以至身任風憲不修廉節欠所居房緡不肯償還遂至開封争訟御史彈糾朝廷一切置而不問玷辱國體隳廢臺綱宗愈坐此二罪自合明行貶黜而况其餘姦慝事狀尚多陛下何故優容如此之乆臣又嘗考尋吕誨所論陳升之章疏不過以謂資歴甚淺聞望素輕尹京無狀遽叨大用疑其隂有趨附由徑而進及升之妻有重表疏逺之妹嫁於中官嘗與往還不避嫌疑若此之類止於數事蓋未有姦囘貪猥如宗愈之甚者臣備耳目之寄而使陛下股肱心膂之任容有此人叨據經年不能排斥尚何靣顔出入朝廷而以諫官自名乎臣若未至竄逐終不敢緘黙以負陛下㧞擢之意伏望聖慈早出臣前後章奏付外施行又言臣輙瀝血誠仰凟天聼事出廹切無復文飾惟聖慈留意省覽臣自去年四月初八日延和殿與右司諫韓川同奏胡宗愈姦邪朋黨不堪大任自後十九次上疏條陳罪狀而五月中臺臣亦有彈劾遷延至此未䝉施行向者孫覺楊康國相繼辭職而去獨臣與川始終論列未嘗敢置自十一月後川見陛下未賜聴納堅乞外補臣本欲歲前上殿更以公論開陳而川别有除命不復供職臣以左右省並無諫官拘礙文法不敢獨員乞對同時言事之人去之殆盡臣若更顧身計不為陛下亟辨邪正則臺諫之風日益衰替姦慝之勢日益盛强實於聖朝所損不細此臣所以憤懣感發而不能自己也臣厯觀祖宗以來言者彈擊執政未嘗有是非不决枉直兩存之理今御史中丞李常侍御史盛陶廹於衆議亦嘗以宗愈為言而依違觀望不敢深論臣竊料其意不過以謂陛下若逐宗愈則常輩將欺罔搢紳曰朝廷用我之言已罷執政矣若臣所論太過忤㫖獲譴則常輩初無切直之言又可免責進退無患足以竊位陛下用此等人為綱紀耳目之任亦何補於聖德乎臣非特患宗愈之汙廟堂又憂常等之壞風憲也臣伏觀陛下即政之初首開言路擢用忠良使在臺諫如劉摰王巖叟等論蔡確章惇之罪則陛下為之罷蔡確宰相罷章惇知樞密院又論張璪姦邪則璪罷中書侍郎孫覺等論韓縝不協人望陛下用縝為右僕射纔數月遽令外補傅堯俞等論李清臣無狀則清臣罷尚書右丞自是四海之内莫不歌頌厭服以謂陛下用人納諫有仁宗之風故三四年間公議得行大臣知畏姦人斂迹君子道長豈非用此道歟今宗愈自進用以來其朋黨之外無一人以為可者其懷姦為利與璪輩何逺其昏繆無補則又甚於縝與清臣豈陛下前日去此數人之易而今日去一宗愈為難哉臣讀魏鄭公之諫唐太宗曰貞觀之初恐人不言導之使諫三年以後見人諫諍恱而從之一二年來不恱人諫雖勉强聴受終有難色臣竊謂太宗之烈足以比迹湯武庶幾成康然責之以備則有媿於三代之隆者特在於不能終始如一而已詩曰靡不有初鮮克有終語曰有始有卒者其惟聖人乎願陛下以古聖之言為法以唐太宗之事為戒無使後之視今猶今之視昔也書曰有言逆于汝心必求諸道有言遜于汝志必求諸非道臣之狂愚逆陛下之心多矣惟求諸道則或有萬一之補伏望陛下以宗廟社稷為計早罷宗愈斷之不疑更擇忠厚端正之人置於言路以代常等庻幾協力上裨聖治天下幸甚貼黄稱臣叨被上恩不次擢用未能報塞萬一豈敢輕為去就然自來論列執政是非固難並立言之悃愊盡於此章若聖意確然不囘則是臣言無補須至援引故事自求貶黜况宗愈顧惜名位不知廉耻儻陛下務為優容俟其自請以理度之必無是事又慮聖慈不欲出臣之奏恐傷體貌臣已一靣申三省乞奏請前後章疏付外施行去訖伏乞早賜睿斷去邪勿疑以慰天下之望又以狀申三省云安世自去年後來凡二十次具狀論列胡宗愈除尚書右丞不協公議及以欺君冒進姦邪貪猥之罪十二事條列以聞乞行罷免至今未奉指揮重慮上件章疏不曾降出伏乞特賜奏請付外施行又言臣伏惟前後二十次論奏胡宗愈罪狀乞行罷免而聖德寛厚務全體貌章皆留中未䝉施行宗愈幸累疏之不出盗據丞轄包羞朞年辱國已甚臣忝居言路職在繩糾遂舉彈文之大畧以申三省宗愈並不避位視事自如中外指目無不鄙笑近世輔弼毁滅廉耻未見如此之極也臣竊伏思念輿情之所以共惡者不過責其無耻之一節而臣之所以深疾者特誅宗愈之意爾臣聞國家設諫官御史之職本欲肅正綱紀防察姦邪故風采振揚貴賤震恐非一二小臣敢作威福蓋朝廷上下之體待此而後嚴也今宗愈知臺諫之彈劾而力戰公議若無所睹惟其以言者為不足恤是乃陵蔑陛下之風憲為大臣而有輕視人主之心陛下縱欲赦之其如朝廷何其如天下何使宗愈實無它罪止有此事猶在譴訶之列而况欺君亂法姦邪貪猥罪狀顯著至於數十尚安足以預廟堂之論處具瞻之地乎伏望聖慈深加省察以臣前後章疏付之有司公行推究若宗愈之罪如臣所言即乞特賜睿斷早令罷出若臣所論無實亦乞重行竄逐庻分邪正以服天下己夘尚書右丞胡宗愈為資政殿學士知陳州劉安世言行錄云安世申三省凡二十次論胡宗愈乞請章疏付外翌旦三省奏事罷執政皆退簾中有語云右丞且住劉某有章疏言右丞知否宗愈對不知言臣何事宣仁曰章疏更不降出右丞宜自為去就遂罷政此事當考詳定製造水運渾儀所奏太史局直長趙齊良狀伏睹宋以火德王天下所造渾儀其名水運甚非吉兆乞更水名以避刑剋火德之忌案張衡謂之刻漏儀一行謂之水運俯視圖張思訓所造太宗皇帝賜名太平渾儀名稱並各不同今新制備二器而通三用乞特賜名以稱朝廷制作之意詔以元祐渾天儀象為名四年四月八日事附許將等言前翰林學士許將等言詳定元祐渾天儀象所先被㫖製造水運渾儀木様進呈差官試騐如候天不差即别造銅器今周日巖苗景等晝夜校騐與天道已得參合臣等試騐晝夜亦不差詔以銅造仍以元祐渾天儀象為名其後本所又言前所謂渾天儀者其外形如丸其内則有璣有衡其外形如丸即可徧布星度大率若本所造渾象之制其内有璣有衡即可仰窺天象大率若本所造渾儀之制若渾天儀則兼二器有之同為一器既言渾天則其為象可知然於渾象中設璣衡使人内窺天象以占測為主故可總謂之渾天儀其實兼儀象而有之也今所建渾儀渾象别為二器而渾儀占測天度之真數又以渾象置之密室自為天運與儀參合若并為一器即象為儀以同正天度則渾天儀象兩得之矣此亦本朝備具典禮之一法也乞更重作渾天儀從之詔罷石州葭蘆寨監酒稅官其商稅令寨主并監押輪監辛巳詔上清儲祥宫依圖修蓋和雇工匠此據政目三月十一日所書増入甲申尚書省言京西北路蔡潁州界近來驚刼賊盗稍多人民不得安居詔蔡潁州今後彊盗三人已上及窩藏人並權依重法地分施行候盗賊衰息取㫖詔保甲出身使臣昨添差充諸處指使除合管職事外不許别差權刑獄錢穀民政去處勾當編錄冊三月十三日聖㫖是日中書侍郎劉摯上書曰臣待罪近輔再厯年所日奏職事親聞德音退伏思念皇帝陛下以日躋之聖上資慈訓而太皇太后陛下以寛仁之德勤邦儉家四年之間用人立政施德布惠所以綏養天下上以昭祖宗之盛業下以為社稷無窮之休天下之幸萬世之頼也臣於此時得依日月之末光備位輔佐念雖殺身何以報稱然臣嘗讀西漢之書觀孝文皇帝承髙惠之後人心思治而上方躬仁履儉克勤率下當時民俗醇厚府庫充羡四方無犬吠之警亦可謂治安之世而賈誼之論乃謂方今之勢如抱火厝於積薪之上火未及然因謂之安及其忠憤之所發至於慟哭流涕臣嘗怪其論之過也其後不數十年而治亂之迹若合符契臣於是知居安慮危之心唯聖智乃能有之而私憂過計之論亦未可以迂而棄也臣近與同列奏事延和殿兩䝉宣諭大意今日朝廷之事固已盡心畧有成法唯以乆逺守之為念又聖慮深逺因論及它日還政之後任用左右常得正人則與今日用心無異若萬一姦邪復進熒惑動揺則反覆可憂然辨别邪正全在一人此乃持盈守成之大戒也而皇帝陛下深加省領臣退而歎息歡喜以謂愚臣平日之所懷為國逺慮者正在此事未及上達而陛下先知之矣區區之誠雖殫千慮何以及此臣今因得敷陳本末以畢其説惟陛下寛其罪試一覽之恭惟先皇帝以聰明睿知承累世承平之業思欲力致太平復見三代之盛以漢唐為不足道也當時之議以謂非國富則無以為也非兵强則無以為也非人才足用則無以為也是三者圖治之偉論也而當時輔臣如王安石呂惠卿輩不能副先帝委任之意乃奮其私智肆為乖謬大失先帝之本㫖其富國也則助役青苗變而為聚斂之法其强兵也則保馬保甲流而為殘擾之政其用人也則進辯給輕㨗之子以為適時退老成敦厚之人以為無用於是四海興議而先帝頗知其事故罷退安石等不用繼而王珪蔡確之徒尤不能將順主意踵事增患而先帝又知政令有未便于民者方將改作遽以棄天下忠臣義士至今長為先帝惜之者常在此也及皇帝陛下紹膺大厯太皇太后陛下同覽萬機臨御已來法度之難乆行者修完之臣下之害政者改易之正所以述成先帝之盛德美志傳於無窮可謂備矣自改更之後在陛下無所愧也天下公議正論以為當然也天下百姓莫不安樂以為當然也然陛下亦知有以為不然者乎臣雖至愚尚能臆度知之夫前日之事乃前日之人所縁而進者也政在則人存政異則人息今譬之芟草也枝葉雖除根株尚在能保其不復生乎前者二三大臣之朋黨皆失意怏怏自相結納睥睨正人腹非新政幸朝廷之失思欲追還前日之人恨不能攘臂於其間也今布列内外搢紳之間在職之吏不與王安石呂惠卿則與蔡確章惇者率十有五六此臣所以寢食寒心獨為朝廷憂也然臣之區區非欲陛下苦治黨也朋黨之大亦豈易治哉但欲陛下知其事常加防察不使得行其術則可矣臣亦常深計其術矣不過日夜窺伺間隙異日可以進説則造眩惑之謀文飾姦言以感激聖意動揺政事而已其所進之説臣竊料之其大者必為離間之計此最易入易聴而其禍亦最大不可不防其漸而深察之其次又有二説其一曰先朝造法為治而皇帝陛下以子繼父一旦聴臣民之言有所更改其二曰先朝之臣多不任用如蔡確等受顧命有定策之功亦棄于外此二説者自人情言之則淺近而易聴自義理考之則無所取也臣謹按天下之治有不可不因者有不可不革者可因者雖亂世猶因之故周武王克商反商政政由舊是也可革者雖父道猶革之故漢文除肉刑至景帝改之漢武造鹽鐵𣙜酤等至昭帝罷之是也自二聖臨政首進任司馬光其餘輔臣繼有出入者天下之人曉然知道之所在延頸跂踵以望新政而陛下又能虛已公心開廣言路延納忠讜於天下無有逺邇上章論事願改政令者莫知其數而聖慮深逺猶再三謹重有不獲已方取十之一二最大者詔講議施行之如青苗免役保甲保馬市易之類敢不改乎改之所以順人心救民命爾豈喜變更哉試考察今日百姓安與不安便與不便則改更是耶非耶立可見矣若謂凡繼體之君於先朝之政皆不可改則古聖帝明王繼政而有改者皆非耶我祖宗之法有乆而不便者先帝嘗改之矣亦可以為非邪知所宜因知所宜革是先帝之志也至如臣僚之進退蓋法既有改則昔日縁法而進者非已之便稍自引去而聖恩寛假各盡禮數獨有一二奉法尤無狀如呂惠卿呉居厚輩者方罷斥之天下之議莫不以為允是時蔡確身為上宰自請補外繼以家人犯法言者沸騰遂坐左遷章惇亦以悖慢忿戾無禮於君父而罷之此豈固欲不用父之臣哉蓋法者天下萬世之公也陛下縱欲以功而屈法如天下萬世何夫皇帝陛下乃先帝之正嗣承繼大統實天下之至公大義也方先帝違豫彌㽞之日與太皇太后陛下已有定命宣示大臣則大臣奉行而已何策之定哉豈可貪以為己功常誦于口假以謀進哉古之所謂定策者謂遭變之際未知所立大臣能於此時挺身忘禍有所擇而立之以安社稷則是策計由此人定之故曰定策古之人則漢霍光是也今之人則韓琦是也然霍光死才三年宗族犯法衰廢未聞古今之論以宣帝為忘功臣也故曰法者天下萬世之公也然則二説者豈足取哉夫立政而違民改之是也而異論者非之以謂改父之臣此豈公議哉是讒間之説也若昨者陛下坐觀政令未安姦邪當路生民咨怨而恬不為慮以避改易之小嫌則得為孝乎無乃負先帝所以傳授皇帝陛下顧託太皇太后陛下之心乎而况不聞天下有此嫌也大抵自司馬光不幸死亡之後朝廷之事肯不顧患禍身任其責者少矣此固不能逃陛下之聖鑒傳曰百年之計莫如植人夫所與共守天下傳之永乆非有同心一德守正不惑之人將誰託之嗚呼君子小人之辨何其難耶君子之進未嘗有心於害小人但逺之而已若小人進必欲盡覆君子所以今日邪正之士不可以不早辨也觀漢元帝之世宏恭石顯用事是時賢士如蕭望之劉向周堪之徒上雅知其才用之而忤恭顯終抵以罪或至於死此無他正人之勢不勝也仁宗皇帝慶厯中韓琦富弼范仲淹輩當代名臣一時並進其後未乆皆不免為小人讒毁排䧟相繼逐去然上頼聖明終得免大禍復被收進建立功業者内外多正人姦不能勝也故君子在上小人失志必為傾害之計今朝廷清明幸無恭顯之患而陛下聖哲好正直而惡邪佞臣之所憂者恐正人之勢不得如慶厯時能勝小人也小人之志趨利而已自二聖臨御以來開廓大度并包同異無所不容宜皆得其盡心為用而怏怏之人尚敢隂懷二心潛藏恚恨投隙害政依違觀望者彼誠見皇帝陛下淵黙謙恭未甚可否朝政不知聖意他時所屬將謂天下之事未大定也殊不知太皇太后陛下保佑輔翼之者罔不備盡而皇帝陛下虛心聴納灼見是非者蓋已乆矣臣載念人主以一身臨天下其動止語黙之微上係宗社之重下統生民之命雖皇帝陛下仁聖之德出於天禀而修心正身之道宜深有資於太皇太后陛下母儀之訓也昔者周公之輔成王復辟之後作立政以戒用人故成王宜民宜人見於假樂之詩作無逸以戒逸豫故成王持盈守成見於鳬鷖之詩後世稱三代之隆者必先焉霍光有功於漢室而姦臣上官桀與燕王等謀為姦變上書誣光之罪是時孝昭帝年十四察見忠之與詐誅滅桀等益信任光於是漢室幾危而復安臣不勝愚懇伏望太皇太后陛下深念周公所以戒成王之意擁佑開導以成就皇帝陛下之德凡人之才如何為正如何為邪事之理如何為是如何為非日夕講論以立萬世不拔之基伏望皇帝陛下深鑒古事體漢昭帝之明以辨忠邪使它日姦言異論不可得而入常思太皇太后陛下之言無疑于心無怠乎聴庻以永承祖宗之業天下幸甚臣孤外之臣䝉陛下拔擢不次由言路而進不敢避怨不敢希恩唯期循守公道以報萬一然前日失意之人其黨布滿内外皆與臣為仇也身跡惴惴危若累卵非陛下洞照愚直力賜保全安有今日故臣縁近日兩䝉宣諭之㫖輙為此言以推廣聖意若使涓塵有助海嶽則臣雖死無憾貼黄臣奏此書别無施行止為昨䝉宣諭故因而欲推廣聖意願無疑無懈常以辨别忠邪為心堅守今日政事庻免他日姦諛之言可以浸潤動揺臣書大意如此而已伏乞留中省覽使螻蟻之誠或補萬一又貼黄今内外異議之人日欲揺動陛下之政不可不察者昔時王安石所行事逆民而背理然人不敢揺者何謂也蓋有嚴刑峻責言之者有罰故人畏之敢言者少也今朝廷為政順民而循道然人敢言者何謂也蓋陛下寛仁大度招言納諫唯恐人之不言言之者無罪故姦人妄意而作也故役法一事自元祐元年改作差法乃是將祖宗差役法及先帝雇役法參而用之又令監司州縣博訪利害逐旋申明自後四方論列不一雖小官賤士肆口所言以申其憤今其法揺動改變者十之六七矣近日又將科場一事揺動熒惑昨元祐元年兩制侍從臺省臣僚講議定奪凡一年有餘又經聖覽方此施行亦是將祖宗先帝之法合詩賦經義為一科是萬世有利無害可行之法今人情已定止是安石之黨力要用經義臣願陛下堅守已行之法勿為浮議所動又貼黄科場事臣見與宰相已下參議必為陛下堅守此良法非乆必須進呈然為論列者不已故先奏知區區孤忠惟冀省察立進士試四場法在四月十八日戊午
