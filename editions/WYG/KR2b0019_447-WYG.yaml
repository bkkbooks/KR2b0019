body:
  text: 續資治通鑑長編巻四百四十三宋李燾撰哲宗元祐五年六月乙未詔諸路提㸃刑獄司毎半年奏諸州賊盗已獲未獲人數並按籍審覆即比折外未獲數稍多者劾奏從刑部奏請也丁酉資政殿學士知成徳軍曽孝寛為吏部尚書户部侍郎劉奉世為吏部侍郎知成都府寳文閣直學士李之純為户部侍郎著作佐郎兼侍講司馬康為左司諌范祖禹集有狀云有女許嫁康子乞避親注云五月二十六日今實録乃以六月四日書康除司諫當考政目亦在四日恐此集或誤耳知洪州天章閣待制黄履知蘇州司農少卿向宗旦知洪州詔秘書省見校對黄本書籍可添一員以眀州定海縣主簿秦觀充校對黄本始此辛丑太皇太后宣諭宰臣吕大防等曰皇帝春秋漸長將来納后儀式曽令入内侍省檢尋天聖二年納郭皇后景祐元年納光獻皇后行禮次第各為年深並無稽據兼其時只是降制進册不曽御殿禮甚簡略有司故事必有存者可以講尋大防等奏乞退而討論詔踈決在京并開封府界繫囚雜犯死罪以下第降一等杖以下釋之禮部侍郎陸佃權禮部尚書兵部侍郎趙彦若權兵部尚書十六日鄭雍論陸佃檢校太保知溪洞順州兼都廵檢使田忠俊為檢校太傅侍御史孫升殿中侍御史賈易言六月八日同賈易奏此據編類章疏臣近論列翰林承旨鄧温伯朋邪罔上之迹其甚者於麻制中獨推蔡確有定議之功以漢之周勃可屬大事誅諸吕立孝文為蔡確之比負國欺天莫大于此恭惟太皇太后保祐之功格於天地皇帝陛下仁孝之徳通于神眀先帝以萬世不易之理而與子太皇太后以大公至正之道而立孫天人同心上下一意當時豈有危疑之事如漢之諸吕頼蔡確而後定哉大事之屬若歸蔡確則危疑之罪將使誰當鄧温伯朋邪不忠止知文姦言以隂附蔡確不顧傳制命以欺惑後世臣竊觀自古邪正之不分是非之不定此禍患之所由生也今蔡確既貪竊定䇿之功披襟以當制命自謂足以比方於周勃為當今社稷之臣故敢發於怨望訕謗之詞以動天下而二聖寛容貸確誅夷之罪流􅇡逺方天下莫不以為是鄧温伯所為制命乃朋邪罔上以欺後世之言天下莫不以為非而温伯有負國欺天下之罪中外共知未加顯戮今朝廷一旦召温伯還其舊職預聞密命臺諌論列莫定是非如此則向之為是者未必是而為非者未必非也是非不眀異時姦臣得以藉口將有以危疑而被禍者矣陛下不可不為天下萬世慮而定是非於今日也臣非不知茍容緘黙可以持禄闔門待罪可以取名臣所以遲遲於兹冒犯天威罄竭愚直至於再三者竊慕古人事君之大節不顧一介潔身之小義萬一開悟眀主照見姦邪則朝廷清眀萬世無患惟願陛下定是非于今日絶禍患於異時則臣雖流􅇡誅殛死無所恨謹節録前漢書周勃傳在前伏望聖慈少垂省覽天下幸甚貼黄臣今来只乞朝廷定鄧温伯所為制命獨稱蔡確有定議之功比方周勃誅諸吕立孝文當時有無如此危疑之事温伯稱述蔡確果是與非以絶將来禍患使異時姦臣無以藉口然後臣甘從􅇡黜庶幾不負陛下擢任之意臣近日訪聞文彦博臨行之日曽遍於三省執政官處咨白云鄧温伯乃是彦博說與中書侍郎後進擬今日既是人言如此不如罷之審如所聞非出二聖本意眀矣又言臣前日曽再具狀奏論鄧温伯朋姦罔上褒臣貶主署在制詞乞檢㑹臣所奏劄子付外早定是非狀内黄貼子所言風聞事非論文彦博等之為私以眀非出二聖之本意也且舉所知用所舉乃大臣之職而知人堯舜之所難也審如所聞則文彦博止於知人之不眀而傅堯俞止於用人之不察二者非有意於為私也臣既得之風聞遂以為言者欲眀此非出二聖之意而已伏望聖慈審察愚臣區區之意不勝幸甚三月十六日五月二十九日六月八日七月二十四日可考月日皆從編類章疏貼黄載文彦博云云八月二十二日可考殿中侍御史賈易言臣昨在諌垣嘗論吕陶姦罔因及蘇轍朋邪害正之迹今轍除御史中丞臣為屬官理合避嫌詔易為度支員外郎度支員外郎田子諒為殿中侍御史子諒自言與劉摯親嫌後四日詔子諒為度支員外郎如故易為禮部員外郎上官均為殿中侍御史賈易二十八日又改司業田子諒與劉摯親嫌據政目實録但稱執政吕公著掌記田子諒吕晉伯王彦霖孫和甫極稱之北人又朱書已除轉運判官子諒易均改命乃乙巳十二日今并書劉摯云云附七月八日賈易為淮憲時侍御史孫升言臣伏見殿中侍御史賈易除度支員外郎賈易公忠直亮正色敢言向為司諌日以直言被責名聞天下昨自禮部員外郎除殿中侍御史如辨眀韓琦之功擊彈時忱軰不法權强切齒號為稱職中外所服此陛下所知也賈易孤立一身朝無黨援既為權强所惡幸其有請即欲排斥賈易近與梁燾劉安世朱光庭等論列鄧温伯姦邪未定是非而梁燾除權户部尚書乃在御史中丞之上劉安世朱光庭自諫議大夫除給事中中書舍人乃在左右諫議大夫之上賈易何負朝廷乃獨下遷為諸司員外郎若以為言事失職則竄之可也誅之可也義士可殺而不可辱賈易何罪乃獨下遷而辱之乎公議莫不惜直言之臣去而歎宰執髙下其手也自非陛下主張則孤忠之臣何以自立臣竊恐自此直亮之臣不復為陛下盡力矣伏望聖慈詳察出自睿斷特賜指揮中外幸甚二十八日易改司業甲辰户部言應殿侍差出管當事畢并替罷已承發遣而有違程不赴本班公參者其所破請受勿給從之禮部太常寺言奉詔議皇地祇祠典縁郊祀之禮國之大典乞與尚書侍郎兩省及侍從官以上同議從之五月十八日許將云云七年三月十八日禮部云云乙巳詔大長公主長公主女出適其女夫授官未曾修立條貫自今白身人武臣與左班殿直已有官人與轉兩官文臣授假承事郎御集六月十二日丁未户部言太皇太后宅管當三班差使程文静乞磨勘拘條不許按慈聖光獻太后宅掌牋奏梁惟清磨勘在今條之前太皇太后宣諭梁惟清係神宗皇帝為慈聖光獻宅管當許特磨勘今来難以攀援其程文静令吏部依條施行是日六月十四日户部尚書梁燾給事中朱光庭始受命初除在五月二十六日先是蘇頌既除左丞三月七日翰林學士闕三省議所補傅堯俞引鄧温伯劉摯曰嘗除吏部以駮而罷事甚近堯俞曰向者遷也今舊物爾衆皆曰然乃擬上太皇太后曰温伯兼是延安府牋記舊臣乃隨龍人也命既下王巖叟封還以温伯姦邪前草蔡確官制略曰獨嘉定䇿之功首相王珪制則曰與定䇿而已此確黨也太皇太后諭曰謂温伯確黨非也昔論相州獄事與確大異今且可罷承㫖以龍圖閣學士為侍讀四月二日而巖叟復封還之燾光庭及劉安世等皆繼論列謂温伯柔佞雖未能為大惡敗亂政事然素不與正人為黨而隂邪小人附之者不一近遂舉陸佃自代此又見其志漸恐引類不已消長之勢必自此始已而太皇太后諭曰四月四日言者必疑温伯别有進用所以如此争論然止是見得眼前事向後亦未可知安能今日扼温伯進也昨害民之事更改不少知他乆後如何毎思及此令人不可堪然臺諫之言不可不行遂以温伯知南京温伯知南京已附四月二日其實乃四月四日也劉摯進曰若不忘温伯異時是可任使即諭曰與記當待别除差遣既退坐殿廬将書聖㫖許将傅堯俞揣上所諭之意乃曰此湏再稟歸歩于廊吕大防宻語摯曰所諭如此奈何摯曰昨政事更改皆合人情無可論但失意之人無害于政者合進則與進之可也後二日六日大防與将及堯俞先集漏舍摯與韓忠彦後至将趨朝大防立語摯曰適漏舍議温伯當伸初命温伯用三月十四日初命復為承㫖乃四月六日進白太皇太后曰此除本出于執政進擬若見得允當固合如此執持又曰言事官當並與稍遷而燾等論温伯不已故皆移官安世累奏見四月六日餘未見五月二十六日燾安世光庭皆遷然燾等闔門不敢出者乆之太皇太后尋諭大防等曰燾等何乆不受命然亦思慮来必有所難今湏少加恩禮大防曰未審如何加恩禮諭曰欲遣人押令受命供職衆皆贊之於是遣内東門使臣押燾光庭赴閤門受命初至幕次又遣御藥院陳衍面諭二人遂命入謝而劉安世以病告未出亦遣使就其家諭以此意仍賜之食安世訖不受命八月十八日奉祠此據劉摯行年後記増入蘇轍言朝廷兼用邪正其議論盖自此始不可不詳記也己酉中書舍人鄭雍言新除禮部侍郎陸佃權禮部尚書按佃附㑹穿鑿茍容偷合其始進已為清議不容伏望更擇賢才處之髙位詔佃候實録書成日别取㫖佃乞補外乃以佃為龍圖閣待制知潁州佃出知潁州在二十八日今并書蘇轍言舍人二人相次封還佃命此但著鄭雍不知更一人為何當考御史中丞蘇轍言臣聞宰相之任所以鎮撫中外安静朝廷使百官皆得任職賞罰各當其實人主垂拱無為以享承平之福此真宰相職也臣竊見近者執政進擬鄧温伯為翰林學士承㫖除命一下而中書舍人不肯撰詞給事中封還詔書御史全臺兩省諌議皆力言其不可議論洶洶經月不定而執政之意確然不回温伯既仍舊就職而言者並獲美遷質之公議皆不曉其故若謂執政是邪則給舍臺諌並係所選豈其皆非若以論者誠非邪則不加黜責並獲優寵進退無據是以公議皆謂朝廷自知其非但重于改作而已今者謗議未息又復進擬禮部侍郎陸佃兵部侍郎趙彦若權本部尚書舍人二人復相次封還陸佃之命臣竊惟此二事本非朝廷急切之務勢湏必行者也上既不出於人主下又不起于有司皆由執政出意用人致此紛争内則皇帝陛下太皇太后陛下厭于煩言焦勞彌月下則侍從要司失其舊職綱紀廢壊至於賞罰顛倒頃所未聞臣不知為政如此得為鎮撫中外安靖朝廷者乎頃者謂六曹侍郎闕人朝廷始擢用諸卿監為權侍郎盖以不權侍郎則本曹功事闕官發遣如禮兵諸部事至簡少雖無侍郎但責郎官亦自可了况侍郎既具而復權尚書此何說也若謂侍郎乆次當遷尚書臣不知尚書乆次當遂遷執政乎此則為人擇官而非為官擇人之意也臣待罪執法竊慮聖意未經究察但見執政歴詆有司而自伸其意使羣臣無由自眀今後更有如此等事無敢守法為陛下眀白是非者是以區區獻言不覺煩凟罪當萬死庚戌宣政使榮州團練使案原本作圍諫使考宋史職官志無此官名當是團練之誤今改正内侍副都知劉有方為宣慶使辛亥户部言合住支請給所在官司取索劵歴限五日批抹繳申轉運司即在京所給并請他路物者申户部有分移者仍報見請准此繳申以上違者杖一百並給公據若差出歴不隨身者速報合屬官司從之癸丑大理寺言諸軍因差發過闕如有理訴者不得過十日從之新無乙夘直龍圖閣劉忱為衛尉卿衛尉少卿韓宗師為太僕少卿太僕少卿陳紘知陜州監察御史楊康國為殿中侍御史秘閣校理張舜民為金部員外郎舜民先除殿中侍御史以辭免故有是命五月二十二日舜民康國皆初除正字張耒為著作佐郎五年十二月四日加集校六年六月八日為秘丞六年十一月十六日以秘丞集校為史討詔御史中丞蘇轍侍御史孫升同舉監察御史二員以聞御史中丞蘇轍言臣竊觀元祐以来朝廷改更弊事屏逐羣枉上有忠厚之政下無聚斂之怨天下雖未大治而經今五年中外帖然莫以為非者惟姦邪失職居外日夜窺伺便利規求復進不免百端㳺說動揺貴近臣愚竊深憂之若陛下不察其實大臣惑其邪說雜進於朝以示廣大無所不容之意則氷炭同處必至交争薫猶共器乆當遺臭朝廷之患自此始矣昔聖人作易内陽外隂内君子外小人則謂之泰内隂外陽内小人外君子則謂之否盖小人不可使在朝廷自古而然矣但當置之于外毎加安存使無失其所不致憤恨無聊謀害君子則泰卦之本意也昔東晉桓温之亂諸桓親黨布滿中外及温死謝安代之為政以三桓分蒞三州彼此無怨江左遂安故晉史稱安有經逺無競之美然臣竊謂謝安之於桓氏亦用之於外而已未嘗引之於内與之共政也向使安引桓氏而置諸朝人懐異心各欲自行其志則謝安将不能保其身而况安朝廷乎頃者一二大臣專務含養小人為自便之計既小人内有所主故蔡確邢恕之流敢出妄言以欺愚惑衆及確恕被罪有司懲前之失凡在外臣僚例䝉摧沮盧秉何正臣皆身為待制而眀堂薦子止得選人蒲宗孟曽布所犯眀有典法而降官褫職惟恐不甚眀立痕迹以示異同為朝廷斂怨此二者皆過矣故臣以為小人雖決不可任以腹心至于牧守四方奔走庶事各隨所長無所偏廢寵禄恩賜常使彼此如一無迹可指此朝廷之至計也近者朝廷用鄧温伯為翰林承㫖而臺諌雜然進言指為邪黨以謂小人必由此彚進臣嘗論温伯之為人粗有文藝無他大惡但性本柔弱委曲從人方王珪蔡確用事則頥指如意及司馬光吕公著當國亦脂韋其間若以其左右附麗無所損益遇流便轉緩急不可保信誠不為過也若謂其懐挾姦詐能首為亂階則甚矣盖臺諌之言温伯則過至為朝廷逺慮則未為過也故臣願陛下謹守元祐之初政乆而彌堅擇用左右之近臣無雜邪正至於在外臣子以恩意待之使嫌隙無自而生愛戴以忘其死則垂拱無為安意為善愈乆而愈無患矣臣不勝區區博采公議而效之左右伏乞宣諭大臣共崇斯義勿謂不預改更之政輙懐異同之心如此而後朝廷安矣蘇轍遺老傳云自元祐初革新庶政至是五年矣一時人心已定惟元豐舊黨分布中外多起邪說以揺惑在位吕㣲仲與中書侍郎劉莘老二人尢畏之皆持兩端為自全計遂建言欲引用其黨以平舊怨謂之調停宣仁后疑不決轍於延和面論其非退復以劄子論之時宰相吕大防中書侍郎劉摯建言欲引用元豐黨人以平舊怨謂之調停太皇太后頗惑之故轍言此退後上䟽曰臣今月二十二日延和殿進呈劄子論君子小人不可並處朝廷因復口陳其詳以凟天聼竊觀聖意類不以臣言為非者然天威咫尺言詞廹遽有所不盡退伏思念若使邪正並進皆得與聞國事此治亂之幾而朝廷所以安危者也臣誤䝉聖恩典司邦憲臣而不言誰當救其失者謹復稽之古今考之聖賢之格言莫不謂親近君子斥逺小人則人主尊榮國家安樂疏外君子進任小人則人主憂辱國家危殆此理之必然而非一人之私言也故孔子論為邦則曰放鄭聲逺佞人子夏論舜之徳則曰舉臯陶則不仁者逺論湯之徳則曰舉伊尹則不仁者逺諸葛亮戒其君則曰親賢臣逺小人此前漢所以興隆也親小人逺賢臣此後漢所以傾頽也凡典册所載如此之類不可勝紀至於周易所論尤為詳宻皆以君子在内小人在外為天地之常理小人在内君子在外為隂陽之逆節故一陽在下其卦為復二陽在下其卦為臨陽雖未盛而居中得地聖人知其有可進之道一隂在下其卦為姤二隂在下其卦為遯隂雖未壯而聖人知其有可畏之漸若夫居天地之正得隂陽之和者惟泰而已泰之為象三陽在内君子既得其位可以有為小人奠居於外安而無怨故聖人名之曰泰泰之言安也言惟此可以乆安也方泰之時若君子能保其位外安小人使無失其所天下之安未有艾也惟恐君子得位因勢陵暴小人使之在外而不安則勢将必至反覆故泰之九三則曰無平不陂無往不復竊惟聖人之戒深切詳盡所以誨人者至矣獨未聞以小人在外憂其不悦而引之于内以自遺患者也故臣前所上劄子亦以謂小人雖決不可任以腹心至於牧守四方奔走庶務各隨所長無所偏廢寵禄恩賜彼此如一無迹可指如此而已若遂引而寘之於内是猶畏盗賊之欲得財而導之于寢室知虎豹之欲食肉而開之以坰牧天下無此理也且君子小人勢同氷炭同處必争一争之後小人必勝君子必敗何者小人貪利忍耻擊之難去君子潔身重義知道之不行必先引退故古語曰一薫一蕕十年尚猶有臭盖謂此矣昔先皇以聰眀聖智之資疾頽靡之俗将以綱紀四方追迹三代今觀其設意本非漢唐之君所能髣髴也而一時臣佐不能将順聖徳造作諸法率皆民所不悦及二聖臨御因民所願取而更之上下忻慰當此之際先朝用事之臣皆布列于朝自知上逆天意下失民心傍偟踧踖若無所措朝廷雖不斥逐其勢亦自不能復留矣尚頼二聖慈仁不加譴責而宥之于外盖已厚矣今者政令已孚事勢大定而議者惑於浮説乃欲招而納之與之共事欲以調停其黨臣謂此人若返豈肯徒然而已哉必将戕害正人漸復舊事以快私忿人臣被禍盖不足言而臣所惜者祖宗朝廷也盖自熈寧以来小人執柄二十年矣建立黨與布滿中外一旦失勢希覬者多創造語言動揺貴近脅之以禍誘之以利何所不至臣雖不聞其言而槩可料矣聞者若又不加審察遽以為然豈不過甚矣哉臣聞管仲治齊奪伯氏駢邑三百飯疏食沒齒無怨言諸葛亮治蜀廢廖立李嚴為民徙之邉逺乆而不召及亮死二人皆垂泣思亮夫駢立嚴三人者皆齊蜀之貴臣也管葛之所以能戮其貴臣而使之無怨者非有他也賞罰必公舉措必當國人皆知其所與之非私而所奪之非怨故雖仇讐莫不歸心耳今臣竊觀朝廷用舍施設之間其不合人心者尚不為少彼既中懐不悦則其不服固宜今乃直欲招而納之以平其隙臣未見其可也詩曰無競維人四方其訓之陛下誠以異同反覆為憂惟當乆任才性忠良識慮眀審之士但得四五人常在要地雖未及臯陶伊尹而不仁之人知自逺矣故臣願陛下斷自聖心不為流言所惑母使小人一進後有噬臍之悔則天下幸甚天下幸甚既待罪執法若見用人之失理無不言言之不從理不徒止如此則異同之迹益復著眀不若陛下早發英斷使彼此冺然無迹可見之為善也臣受恩深重輙敢先事獻言罪合萬死䟽奏太皇太后命宰執於簾前讀之乃宣諭曰蘇轍疑吾君臣遂兼用邪正其言極中理宰執從而和之自此兼用邪正之説始衰此據轍遺老傳自叙轍復上䟽曰徳音一發衆心渙然謂蘇轍疑吾君臣兼用邪正也此䟽依轍自叙附前䟽末臣聞聖人之徳莫如至誠至誠之功存於不息有能推至誠之心而加以不息之乆則天地可動金石可移况于斯人誰則不服臣伏見太皇太后陛下皇帝陛下隨時弛張改革弊事因民所惡屏去小人天下本無異心羣黨自作浮議近者徳音一發衆心渙然正直有依人知所向惟二聖勿移此意則天下誰敢不然衛多君子而亂不生漢用汲黯而叛者寢茍存至誠不息之志自是太平可乆之功此實社稷之福天下之幸也然臣以謂昔所柄任其徒實蕃布列中外豈免窺伺若朝廷施設必當則此軰覬望自消昔田蚡為相所為貪鄙則竇嬰灌夫睥睨宫禁僥倖有功諸葛亮治蜀行法亷平則廖立李嚴雖流徙邉郡終身無怨此則保國寧人之要術自古聖賢之所共由者也臣竊見今天下雖未大治而祖宗綱紀具在州郡民物粗安若朝廷大臣正已平心無生事邀功之意因弊修法為安民靖國之術則人心自定雖有異黨誰不歸心向者異同反覆之憂盖亦不足慮矣但患朝廷舉事類不審詳曩者黄河北流正得水性而水官穿鑿欲導之使東移下就髙汨五行之理及陛下再遣官吏按視知不可為猶或固執不從經今累嵗回河雖罷减水尚存遂使河朔生靈財力俱困今者西夏青唐外皆臣順朝廷招徕之厚惟恐失之而熈河将吏創築二堡以侵其膏腴議納醇忠以奪其節鉞功未可覬争已先形朝廷雖知其非終不眀白處置若遂養成邉隙闗陜豈復安居此二事則臣所謂宜正已平心無生事邀功之意者也昔嘉祐以前鄉差衙前民間常有破産之患熈寧以後出賣坊場以雇衙前民間不復知有衙前之苦及元祐之初務於復舊一例復差官収坊場之錢民出衙前之費四方驚顧衆議沸騰尋知不可旋又復雇雇法有所未盡但當隨時修完而去年之秋復行差法雖存雇法先許得差州縣官吏利在起動人户以差役為便差法一行即時差足雇法雖在誰復肯行臣頃奉使契丹道出河北官吏皆為臣言豈朝廷欲将賣坊場錢别作支費耶不然何故惜此錢而不用殫民力以供官此聲四馳為損非細又熈寧雇役之法三等人户並出役錢上户以家業髙強出錢無藝下户昔不充役亦遣出錢故此二等人户不免咨怨至于中等昔既已自差役今又出錢不多雇法之行最為其便及元祐罷行雇法上下二等欣躍可知惟是中等則反為害臣且借畿内為比則其餘可知矣畿縣中等之家大率嵗出役錢三貫若經十年為錢三十貫而已今差役既行諸縣手力最為輕役農民在官日使百錢最為輕費然一嵗之用已為三十六貫二年役滿為費七十餘貫罷役而歸寛鄉得閑三年狹鄉不及一嵗以此較之則差役五年之費倍于雇役十年所供賦役所出多在中等如此安得民間不以今法為害而熈寧為利乎然朝廷之法官户等六色役錢只得支雇役人不及三年處州役而不及縣役寛剰役錢只得通融鄰路鄰州而不得通融鄰縣人户願出錢雇人充役者只得自雇而官不為雇如此之類條目不便者非一故天下皆思雇役而厭差役今五年矣如此二事則臣所謂宜因弊修法為安民靖國之術者也臣以聞見淺狹不能盡知當今得失然四事不去如臣等軰猶知其非而况於心懐異同志在反覆幸國之失有以藉口者乎臣恐如此四事彼己黙識于心多造謗議待時而發以揺惑聖聼矣伏乞宣諭執政事有失當改之勿疑法或未偹修之無倦茍民心既得則異議自消陛下端拱以享承平大臣逡廵以安富貴海内䝉福上下所同所有衙前差役二事臣方根究詳悉續具聞奏臣不勝區區冐昧聖聼伏俟誅譴遺老傳云大臣怙權耻過終莫肯改丁巳賜越國賢惠大長公主墳寺額曰崇懿寳方御集戊午正議大夫致仕賈昌衡卒已未資政殿大學士提舉崇福宫韓維知潁昌府端眀殿學士知蔡州王存為資政殿學士寳文閣直學士知鄭州謝景温知真定府新知潁昌府龍圖閣待制蔡京知鄆州集賢殿修撰知潤州林希為天章閣待制左朝奉郎知徐州彭汝礪為集賢殿修撰先是給事中范祖禹言臣近准中書省録黄節文尚書省檢准元祐敕獄暑月五日一次湯刷枷杻其罪人以時沐浴奉聖㫖令刑部遍下諸路開封府界今後毎嵗暑月依上條施行者臣檢㑹祖宗舊制毎嵗冬夏降詔恤刑自太宗皇帝雍熈三年以来累聖遵行未之有改至熈寧三年編修中書條例所奏委逐路提㸃刑獄司毎嵗於四月十月檢舉牒逐州長吏訖奏臣竊惟祖宗欽恤庶獄特從朝廷降詔盖當盛暑大冬之月使溥天之下至于海隅狴牢囹圄之中皆知聖主深居九重而憫念及之此所以為仁恩也今令刑部遍下諸路雖重于提刑司檢舉然州縣奉承宣布及書之史册猶未若恤刑之詔臣竊惜之欲乞依祖宗舊制令學士院毎嵗冬夏降詔仍自今年十月為始以副陛下仁恤刑獄之意于是詔中書省毎嵗四月上旬檢舉降詔祖禹以六月四日上言二十六日從其請吏部言廣南東西路諸經略司准備差使二人以大使臣充准備指使三人供奉官至借差充委經略司奏舉如無官司可舉申吏部依常調發定差申樞宻院西路别差准備指使殿侍三人其請給當直人依本資序並從經略司隨宜差使或權閣官處各三年為任滿任酬奨比類保眀聞奏内有願就本路合入差遣者亦聼奏差廣南東西路准備差使指使給支賜逓馬驛劵逓舖兵士有差從之新無庚申右正議大夫致仕陳述古卒
