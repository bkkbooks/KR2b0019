  - {type: page-break, offset: 0, content: '', id: KR2b0019_WYG_285-1a, image: WYG0318/WYG0318-0725a.png}
body:
  text: 續資治通鑑長編巻二百八十一宋李燾撰神宗熙寧十年三月辛亥朔分命輔臣祈雨上批安南行營鄜延路應募非食祿蕃兵及首領去家萬里以瘴死者情尤可愍加賜絹有差内畨官自來陣亡有例承襲者即具合補職名聞奏餘但離陜西界雖未過嶺並依例支給甲寅贈宣慶使康州防禦使内侍右班副都知王守規昭武軍留後皇城使忠州防禦使入内都知藍元震檢身清修奉上勤謹十年左右始終不渝可並優贈故也戊午詔著作佐郎前崇文院校書張載歸館供職載前以尋醫去秦鳯路經略使吕大防請召還故有是詔按綱目云載自崇文歸與諸生講學吕大防薦之召同知太常禮院此云歸館供職秋七月乙卯始書其兼知太常禮院與綱目異侍御史知雜事蔡確言鄭滑舊為輔郡屏蔽京師頃因論者茍欲裁减役人廢以為縣所利者小所害者大東西兩京相望數百里大河之南直抵都城並無州郡為限雖有縣鎮形勢不彊非所以輔王畿重根本也臣以謂鄭滑二州皆宜復置兼州廢尚近完復亦易不報權御史中丞鄧潤甫言近聞增築廣源州選武臣為守願先下本路安撫司令與監司熟計其利害條列一嵗凡用甲兵若干資糧若干甲兵調於某所資糧取於某郡使兵足以勝敵食足以贍兵而無倉猝調發之艱則一方之民受賜而陛下無南顧之憂惟留意而審行之詔安南應募諸路兵與免本路畨戍一次廣南西路轉運司奏廉州言戰棹司舟船與賊戰鬬頗有殺傷詔廣南西路經畧司如楊從先一行舟船未至即選使臣量以兵援結從先亦言近收交趾偽命行軍招討使李繼元牒并克伏後屡與臣戰闘無恐懼詘服之意乞嚴敕邊備以制非常從先奏事乃此月二十五日今附此朱本以無施行削去新本已復存之詔自今川陜四路轉運提㸃刑獄提舉常平官不得兼差川陜人又詔諫官遇起居橫行諸處集㑹或有職事與臺官通議聽於側近幕次徃還臺諌舊不相通司馬光建儲帖可考相通或自此始更詳之詔安南新克復廣源思琅等州可差洪州等處威果等十七指揮徃防托上批前日指揮差張誠一都大提舉選差使臣教在京馬軍教頭可改差内侍副都知王中正仍以中正為入内副都知密記九月二十三日可考元豐三年二月二十五日罷己未詔邵州闗硤寨同管轄兵甲二班借職秦用和子瑜為借職以用和闢徽州等處道路為蠻人所害也詔特選虞部員外郎畢仲熊一官專切管勾興置順州等處坑冶從郭逵等所舉也辛酉分命輔臣祈雨於郊廟社稷仍詔開封府界京東西河北轉運提㸃刑獄司各訪名山靈祠委長吏請禱詔名文德殿南門曰端禮左右長慶隔門曰左右嘉肅安樂門曰含和崇政殿北横門曰通極拱宸門裏西橫門曰臨華詔入内供奉官吳靖方寄崇儀副使裴昱寄供備庫副使各降一官殿頭藍從熙以下八人各罰銅二十斤坐仙韶院火也著作佐郎范育權檢詳樞宻院兵房文字鄜延路走馬承受賈從禮奏本路蕃捉生弓箭手死於安南其子㓜乞量給口食詔大人日支一升小兒半升三年往支御史彭汝礪言太學試内舍生皆用科塲敕式仍乞就景德寺試物論紛紜雖學者亦不自安也且今日所以紛紛如此者恐考試不公耳學校風化之地所繫甚大竊聞太學考試舊法亦頗詳悉欲乞但因八年以前舊制稍令加嚴如在上舍更賜加察而以才行優異者寵進之詔國子監相度以聞科塲敇式誰所修此事當考朱本以為無利害又無施行遂刪去今復存之仍増以時政記丙寅賜皇第六子名傭哲宗舊名當附初生時賜名恐不須書詔廣源州及填乃等處金銀硃砂坑冶令廣南西路經畧司興置回易又詔太子中舍前權通判岷州黄察遷一官知福津縣郭造西華縣令李檝與改京官右侍禁張元方等五人循資減磨勘年賞鐵城敗果莊之功也權荆湖南路轉運副使朱初平言神田等團洞頭首楊光善等三人來降詔各補三班差使三司言相度及再體問商人自來出産小鹽及隣接京東河北末鹽地方澶濮濟單曹懷州南京及開封府界陽武酸棗封邱考城東明白馬長垣胙城韋城九縣令通商必為外來及小鹽侵奪販賣不行合依舊官自出賣仍召客人入中外其河陽同華解州河中陜府及開封府界陳留雍邱㐮邑中牟管城尉氏鄢陵扶溝太原咸平新鄭十一縣欲且令通商候逐月繳到客交引對比官賣課利不相逺即立為定法若相逺或趂辦年額不敷即依舊官賣從之本志刪潤亦可用已附注二月二十七日先是張景溫提舉賣鹽八年閏四月十八日頗增鹽價民不肯買則課民日買之隨其貧富作業為多少之差有買賣私鹽者重賞募人告以犯人家財充民買官鹽食不盡留經宿者同私鹽法民間騷怨鹽鈔每席舊直六千至是才二千有餘商不入粟邊儲失備朝廷疑之召陜西轉運使皮公弼入議其事公弼極陳官賣鹽為不便詔與三司議之沈括在三司雖不能奪公弼議然王安石方主景溫括希安石意乃言若通商則嵗失官賣緡錢二十餘萬雖乞將管城等十一縣并南京孟陜同華衞六州府通商而中書訖不行此見九年四月二十八日安石既去位括始與公弼共言官賣鹽不可不罷十年二月二十六日於是詔許孟陜同華解河中六州府陳留等十一縣通商餘官賣猶如故云司馬記聞載張景温賣鹽事雖多差誤然不可不入長編今考按前後刪取附見大抵官賣鹽事七年四月二十八日三司先有相度中書不行十年三月十六日再相度乃許河陽同華解河中陜六州府并陳留等十一縣通商皮公弼先於二月二十六日言官賣不得不罷今罷官賣者但此六州府并十一縣耳曹濮澶懷衞濟單南京并陽武等九縣官賣猶如故己巳試校書郎知崇德縣邢恕復為崇文院校書罷知延陵縣未及赴而縣廢改知崇德亦不赴乆之自陳乞開封府界監當差遣特復之初王安石行新法恕謂其子雱曰新法人皆不以為然子盍言之安石怒其罷校書由此也恕三年五月十六日罷校書實録所載與恕本傳不同今從本傳辛未録繫囚雜犯死罪降從流流以下第降一等杖以下釋之其雜犯死罪情理重並鬬殺情理輕者皆降决刺配千里外牢城詔權發遣荆湖北路轉運副使徐禧提舉兩浙路常平等事范峋同㑹計安南行營軍行實費錢帛以聞後禧等言軍事實費錢帛金銀糧草五百一十九萬貫匹兩石束河北西路提㸃刑獄司言洺州多盗賊最為難治知州萬頥年老才短乞選能吏以代從之仍詔濟單沂濠洺博淮揚知州軍並中書選差明年正月庚午頥落差替提刑韓宗道罰銅壬申詔時雨稍愆令開封府界洎諸路監司分察州縣檢舉除殄蝗蟲種子法施行無使滋生神龍衞四廂都指揮使燕達為鄜延路副都總管先是上批安南行營軍馬已節次放散可令達赴闕未至而有是命令燕達赴闕乃二月二十九日事此據御集除鄜延副總管本傳不書達尋留京師故也詔右騏驥副使權沅州東路都廵檢使張整右班殿直權西路都廵檢劉滋各遷一官西頭供奉官權東路同廵檢王潛等四人減磨勘年有差以捕殺崕誠等州狤狑蠻功也詔廣南西路經略司差官瘞安南丁夫輦運軍須死於道者仍加祭奠詔廣南路縁邊軍事増置遞馬鋪兵减半馬送羣牧司甲戌都大提舉疏濬黃河范子淵言近聞朝廷以濬川杷於汴河試騐有効乞候七八月間水湍急用䟽導汴流從之子淵所言試騐有効當是去年十月二十八日蒲宗孟霍翔等事也御史蔡承禧言翰林學士楊繪挾朝廷薦舉之令陰為姦利供奉官王永年監金耀門紙庫盗官錢百五十萬交結繪等繪為之奏舉豫許本人閤門祗候臣昨録問叔兼等罪已見其狀案繪禁掖近臣不以亷耻自檢未及進用而豫許小人職名所為如此有辱清班伏乞觧繪提舉翰林二職以俟推劾繪亦言近王永年持執臣受珠事臣雖曲盡辭理獄官必不肯信事無由明白者不幸在永年死後也臣舉薦匪人乆與之徃還受其酒食等物甘受誅殛至於身為侍從面受永年珠接而懷之臣亦不敢自明惟乞免追贓依所估錢計􅂍定罪逺貶重竄永年既死而其家言永年以官錢市珠遺繪引一從者為證云於牕隙窺見之獄官詰繪繪耻與吏䘚辨即引伏索其珠則曰焚之矣宰臣吳充言繪為近臣職在提舉而與永年非類徃還受其器玩用此自可貶謫若加疑似之罪繪今雖不辨安知他日無説遂置珠事不劾或言永年盗賣官文書得錢費於娼家畏其妻知之乃偽為籍曰買物若干遺某遺某其寔無有也縁繪及竇卞實嘗過永年家永年妻手掬酒以飲繪卞故兩人不能自明竟坐責絀或言據記聞及東軒録朱本簽貼云遍檢吳充家供到章疏無此語自有聖㫖令不問珠事及免追攝非用充言並削去今復存之詔諸路走馬承受任滿不許本路經畧安撫鈐轄司奏舉差遣先是李承之知延州乞以走馬承受内殿崇班史辯為西路都廵檢兼安塞寨主上不許仍降是詔十月庚寅又降指揮乙亥太常少卿集英殿修撰張芻為右諫議大夫時御史臺鞫王永年獄案其簿書云嘗以繒帛及酒遺芻芻不受上聞而嘉之故特遷芻此據司馬光記聞詔玉牒所皇子賜名如宗室名同并旁音相犯者更不改詔都提舉市易司變法後未賣鹽各依元買鈔價貼納鈔内餘錢令本司自今依舊賣權知開封府孫固言本府火朝廷當正典刑以懲不恪未敢即交職事詔釋固罪府推官吕希道責監陳州糧料院以火起希道家也高陽闗路走馬承受王延慶乞令縁邊安撫司精選職員使臣主掌刺事人樞宻院言熈寧七年朝㫖縁邊刺事人多互傳報徼倖賞物人數雖多於事無補可下河北縁邊安撫司選使臣牙吏有心力諳識敵情者裁定人數委長吏同募土著可以深入刺事人每事審實以聞量事大小給錢帛候有符騐再與優賜詔申明行下戊寅侍御史周尹言提舉賣鹽張景溫擅增鹽價禁賣蠶鹽苛細害民乞罷景溫職事悉歸之制置觧鹽司及依舊賞格詔景温具析以聞朱本云具析到進呈記無施行合刪今依新本復存之八月十三日景溫猶賣鹽四月辛巳詔復嵐州靜樂縣為憲州以知太原府韓絳言靜樂據汾河大川當岢嵐寧化四達之衝屏蔽太原當置郡屯兵故復之樞密直學士給事中知定州薛向為工部侍郎再任向辭所遷官降詔不允故事前執政辭官乃降詔兩省降詔自向始也初契丹求地之使乆留邸舎數出不遜語邊奏雲應集兵治涿易道謂北人渝盟有端累詔向察其實向還奏契丹欲速成地界議故多張虛勢以動中國使者懼朝廷不如其請故為嫚言徼幸取成且兵來不除道也後卒如向言新知延州呂惠卿乞入朝許之詔移慶州荔原堡都廵檢於大順城從環慶路經略司請也樞宻直學士陳襄等言太常寺主簿黃君俞力學篤行高出輩流博通諸經多所撰述向舉進士及試經義皆在高等擢為國子監直講昨以家艱去職除服復用為太常属官謹身率職其操彌勵乞置之館閣詔以君俞為崇文院校書詔以福州常平司檢校崇勝院糧三萬八千餘石賑濟漳泉州興化軍飢民癸未中書門下言新科明法及第出身人當年秋以本業試中明法至有循兩資者推恩太優况進士及第不許試經義武舉不許更試武藝今欲應明法及第人試中明法除入第一等合差充刑法官與依例推恩外餘只免試更不推恩銓試經義入等者自依等第推恩從之新知鄆州王克臣言本路號多盗賊乞許以便宜處置從之後詔大名府高陽闗京東路安撫司應彊盗聽便宜處置候盗息如故甲申詔罷茶場司官賣解鹽此盖從周尹之言尹言在九年十一月二十六日乙酉遼主遣奉國軍節度使蕭儀副使崇禄少卿鄭士謙來賀同天節法寺奏開封府司録司勘到宗室叔兼叔吳進士秦宏各為私有禁書不全及别制下問報上不實未奏减等係杖罪縁㑹踈决釋放從之詔秦宏送開封府鄢陵縣覊管丙戌詔諸路縁邊修城濬壕並令軍器監統轄詔訪聞昨水利司於淮南收糴下小麥萬數不少却欲出糶變錢於河北收糴封樁糧斛可契勘見在令即今管勾官計元糶價如可運致入京比都下市直猶賤即指揮水利司并淤田司將糴到數目令逐司並津置赴京出糶此或與五月一日王秀事相闗丁亥于闐國入貢辛卯上批聞諸路皆少雨可令轉運司訪名山靈祠委長吏祈禱已雨速具以聞監司察刑獄淹延或就近廵按詔知欽州西京左藏庫副使劉初邕州永平寨主供備庫副使楊元卿各遷七資賞招諭廣源蘇茂州首領功也詔今後客鹽入京並於市易務中賣本務依市價收買雖賤每席不得减十貫並畫時支還見錢其京城内外諸路販賣鹽人並於本務給印歴請買願立限賒請者聽如私自買賣許人告首等次給賞鹽没納入官㑹要有此實録無之二月二十八日四月二十四日當考本志刪修此段又詔商鹽入京悉賣之市易務毎席無得减十千民鹽皆買之市易私與商人為市許告没其鹽壬辰詔江南西路監司具鹽盗結集因依以聞癸巳梓州路提㸃刑獄司言文州蕃賊二千餘人冦邊已逐出界詔利州路提㸃刑獄司體量因依及城寨有無引匿是與不是疊宕州借助兵馬城寨使臣等毋得輕易别致生事若賊未退或兵甲實不足即闗成都府利州路鈐轄司差務文州與梓州路何預當考宻記亦同丙申命檢正中書戸房公事安燾體量京東河北官吏不職事以聞其官司行遣盗賊違法事一面施行如事體稍重即奏取㫖以兩路賊盗頗多慮州縣不能逐捕及施行違法故也詔福泉漳州興化軍諸縣第四等以下災傷五分以上戸去年秋科役錢並放知諫院黃履言伏見差郭逵判潭州逵至潭日曾布以敕命交割逵輙拒而不從及朝廷以布所奏令逵分析逵至鄂得之又寄敕於鄂而不受望正其專輒自歸之罪詔郭逵速赴任仍具析因依以聞要見後來如何或移附初除時詔軍器監置主簿及勾當公事官各一員丞主簿互差從判監范子竒請也詔知桂州趙卨應接外界邊事奏禀朝㫖不及者許一面施行丁酉雄州言北界追集兩地供輸南陽頂等五十八村首領及逃移歸業百五十四戸六百九十七人給賑貸錢千已牒涿州劾本縣官吏賑貸罪詔雄州體量上件所貸民戸如委闕食相度具當如何賑濟以聞尋詔兩地供輸人戸見欠賑濟米豆並除放五月乙卯事今并書賜熈河路山西軍回弓箭手蕃兵寨戸漢蕃勇敢特支錢戰殁者賜絹免夏秋稅支移折變如先有功者以子孫姓名聞因戰失馬者買馬給之詔禮部進士依舊試策五道又祖宗袒免親已授官者聽鏁應及非袒免親許應舉國子監及禮部别為一甲試兩塲五分為額發解所取不得過五十人殿試與正奏名進士試策别作一項考校累舉不中年四十者申中書奏裁量材録用戊戌入内東頭供奉官韓永式言廣源等州縣溪洞酋衆悉已降附乞各給朱記詔經略司具當給印記人數以聞經略司未報上尋棄其地未及給印棄地據朱史簽貼禮賔副使杜師益劉希古三班奉職梅懷德乞商各減磨勘二年楊斌三年以環慶路經略司言師益等有招安蕃部之勞也詔在京見欠市易及諸處官錢人免收禁聽責保追償提㸃兩浙刑獄司安撫張諤誣奏前知蘇州沈紳俵糴不如法獄訟滯留至䝉差替詔紳除落差替庚子遣官謝雨新知延州吕惠卿乞不拘常制舉文臣二員為經略安撫司凖備差遣從之詔判登聞鼓院秘閣校理陳睦衝替坐前任兩浙提㸃刑獄僱女奴及不按知華亭縣張若濟贓罪雖原赦特責之壬寅權河北西路轉運判官汪輔之徙東路以輔之與本路轉運使吳審禮相驗定州廪粟論議異同也始輔之按定州支糧封一百十三厫以為麄惡遣官剥估又對軍吏揚言以當貼支卒聞之皆有覬覦薛向曰輔之東南人不習河朔事糧米精麄分數皆故事也安可遽易乃預召諸將約束且使監官諭之曰汝等所支糧非一日也轉運判官妄有議論明日支請敢有一言者先斬衆皆帖然及朝廷委審禮等相驗䘚從輔之五月壬子具斛様當即此事知鄧州劉忱修鄧均等五州軍城畢降敕奬諭之三司言相度皮公弼鹽法今參酌前後兩池所支鹽數嵗入以二百三十萬緡為額自明年為始從之詔蠲河北東路轉運司所借常平錢糧二十三萬貫石以累年災傷故也内出蜥蜴祈雨法試之果驗詔附宰鵝祈雨法頒行之癸卯提舉在京諸司庫務言布庫監官李宗裔等擅離局乞差替上批宗裔等違慢不職可依所奏庻在京官司有所警厲詔故蕃部廵檢趙餘德子三班奉職宗彦殿侍宗傑宗彦等並特給俸仍録其㓜子宗祐為茶酒班殿侍以環慶路經畧司言餘德蕃官嘗有戰功子孫貧弱故也上批李舜舉面奏姚兕捕獲賀富殺人祭鬼證左甚明潭州推治滅裂全出其罪宜下朱初平取案牘看詳别選官劾之既而初平再劾所獲戸乃阿鄧之夫劉文非賀富殺人也乃止三司言近奉朝㫖將舊法東南鹽鈔委官於在京等七處置場每席三貫四百權於内藏庫借見錢二十萬貫應副收買候貼納到鹽錢逐旋撥還尋令市易務依此收買本務申客人擁併赴務投下文鈔據所買計用錢五十九萬三千餘貫省司全闕見錢深慮有妨鈔法欲將在京客人所乞中賣文鈔除單合用鈔别無收附對勘却退令於向西州軍官場就近勘合中賣外其餘鈔數盡行收買價錢内三分支還見錢餘七分依沿邊入中鈔價細筭合支價錢目給與新引所有合貼新鈔候降下指揮從省司牒三班院差使臣一員赴制置解鹽司取撥合銷新鈔赴市易務下界契勘書填給付客人令於解地請領鹽貨所貴買盡民間舊鈔兼客人換得新引請鹽趁時變賣從之其新鈔仍在熈寧十年合出鈔額㑹要有此實録無之二月二十八日四月十二日二十三日當考初詔京師置七塲買東南鈔而市易務言為錢五十九萬三千餘緡三司言闕錢頗還其鈔令賣之於西買者其三給錢其七凖沿邊價給新引庻盡得民間舊鈔而新引易於變易從之本志如此刪修或即用此甲辰詔市易務茶限二年結絶許客茶交易上令中書召嘉問面問之乃降是詔面問吕嘉問據御集又詔已差徐禧㑹計安南興師費用聞廣西民自供大役之餘極為殫弊令禧具可以寛恤賑補事以聞後禧上賑恤事一曰蠲賦稅減殺人二曰除欠負養孤遺三曰罷折變禁科買四曰放鋪夫省役人五曰計地里省科撥竝從之河東經畧使韓絳言嵐州合河津並無地與夏國接界乞減寨主量留廂軍五人及廢上下軍十七鋪又上平闗雖當把截津要亦阻黃河之險欲止留監押一員軍士三百人從之乙巳皇第七子賜名价詔戎瀘州沿邊地分夷漢人戸所居去州縣逺或無可取買食用鹽茶農具人戸願於本地分興置草市招集人戸住坐作業者並先於本州縣投狀保明申轉運司差官相度經乆可行以聞方許興置依例出納酒稅課利以本路轉運司所請也又詔邕州有馬雄略員寮趙秀妻男送湖北配本路軍營充奴婢秀嘗為賊定砲打邕州城也丙午定州路都監河澤言縁邊山口舗無捍禦之備近聞敵入滄州小南河寨殺傷老㓜剽奪器甲乞應縁邊堡寨委安撫司增築或北界來問即以小南之事為辭最為得策上批緣彼攻刼因而整完其於事機誠不可失令諸路安撫司相度施行丁未安南招討司言提舉先鋒竒兵將介定等保明富良江接戰及策應有功總三千七十人乞第轉資給賜從之内苖履所部兵嘗過富良江者令趙卨詳定履屯郭逵西六十里如月渡黄金滿導之過江禀于逵而行㨗路趨交州十五里逵追回將案軍法履具言得逵節制乃免交人屯諒州甲洞故履乗虛而行也後依卨所定履所部兵過江奪隘及先下江與賊戰四十人遷二資一百三十七人賜絹有差履授子也依卨所定乃五月二十四日事今并書之黄金滿事九年十二月十二日可考詔諸路五畝以下保甲更不輪差赴縣尉廵檢司仍免教閲又詔泰海絳耀華秀溫鄂汀唐知州初州保定乾寧永寧軍通判並令審官東院選差申中書審察詔以淮南東路坊場錢五萬緡借轉運司為今年冬衣及南郊賞賜鹽本錢以災傷故也司農寺言勾當公事王覺同江南西路監司提舉司相度興國軍永興縣民每稅錢一出役錢一今減二分詔減五分是月復冀州棗彊武邑二鎮為縣舊記但於丁酉書復武邑縣今從實録名瀘州小溪口新寨曰武寧
