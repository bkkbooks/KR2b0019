body:
  text: 續資治通鑑長編巻四百四十八宋李燾撰哲宗元祐五年九月癸亥侍御史孫升言近除兩浙提㸃刑獄王瑜為刑部員外郎瑜在兩浙日湖州武康縣民陳徳堯訴知縣韓宗堯不法瑜反送本縣施行轉運判官張璹已坐此得罪乞罷瑜除命詔瑜别與差遣仍令江淮荆浙等路發運司鞫治以聞王瑜除刑外在八月四日并見於此璹事在七月二十四日刑部言湖北轉運司申請和買紬絹並乞依封送二稅簿條施行從之戸部言請令大宗正司具合請生日支賜宗室及宗室女職位名稱并孫所生月日及合給支賜條例關太府寺從之乙丑右正言劉唐老言伏見諸路州縣有自來災傷倚閣稅賦候豐熟日起納今來秋稼已成竊慮官吏乗此登稔併行催索轉運司利於輸入不免督責施行伏念間者累年災傷公私逋負不少幸兹一稔稱貸之益苦無遺餘逼於催科之嚴反以收成為患臣今欲乞朝廷指揮諸路有倚閣稅賦合納去處以十分為率且令催納三分其餘候將來豐熟依條舉行所貴目下佃民實獲豐年之惠宻疏九月四日丙寅户部言自今後欠負官物磨勘畢立限監催須候納及二分方關理欠司如未納及二分及未關理欠司遇赦並不除放從之新無丁邜權知開封府天章閣待制顧臨為兵部侍郎兼侍讀兵部侍郎范純禮為給事中蘇轍云云在十二月二十二日壬寅孫升亦有言樞宻都承㫖龍圖閣待制王巖叟權知開封府殿中侍御史楊康國為左司諫國子司業集賢校理孔武仲兼侍講直秘閣起居郎黄亷為集賢殿修撰充樞宻院都承㫖殿中侍御史上官均言亷在元豐初嘗為御史與蔡確鞫相州獄亷曲意附確煆煉士人陥無辜於深刑不可使居要近乃詔亷依前職為陜西都轉運使陜西都漕十八日改除并見於此均集有兩章論亷甚詳今但從實録存其畧亷為左史在四年十月三日六年十一月十八日再詔為給事考功郎中岑象求為殿中侍御史蘇轍孫升言臣等近凖敕舉岑象求趙㞦充臺官已䝉聖恩除象求殿中侍御史竊見本臺兩院官共六員分領六察皆得言事元祐之初朝廷急於求治臺中闕員略無一二四方觀望皆知陛下勤於聼納爭效悃愊以補萬一今日監察御史併闕四員雖聖明開納之意無損於前而員闕不補中外疑惑今六曹寺監雖復閑地毎遇有闕猶未嘗不補况於人主耳目所係至重自非諱聞直言及有所壅蔽而聼其乆闕實非治世之事也况六察所治事務不少若稍有弛廢則寃抑者必衆亦非先帝設官之本意也伏乞特出聖㫖下本臺及兩制分舉八員陛下擇取四人用之使天下曉然知朝廷招求忠言與昔無異不勝幸甚十月十七日徐君平虞䇿為察院乃轍與承㫖鄧温伯所舉必因轍此章乞本臺及兩制分舉故從之但實録脫遺耳九月初監察御史並闕二十二日乃除裴綸綸十月十二日罷十七日始除徐君平虞䇿轍又言臣伏見唐制御史屬官皆大夫中丞自舉及本朝舊法亦皆丞雜及兩制舉人蓋以人主耳目之官不欲令執政用其私人以防壅蔽近自元祐三年六月八日聖㫖指揮殿中侍御史監察御史並用陞朝官通判資序實歴一年以上人自是以來雖時復令本臺及兩制舉官而終無一人應格可用何者士自選人改官經兩任知縣一任通判若稍有才名多為朝廷擢用其餘碌碌無取難以復堪臺官雖或間有沉淪未見知賞然亦已少矣今法限取此人已傷苛細而又縁此祖宗舉臺官舊法乆廢不用而執政以意選用舊人之例遂以成風近日雖聖意開悟復令臣等舉官然弊法尚存方人物衰少之時實患難以應法伏乞檢臣前奏稍改近制令臺官得舉陞朝第二任知縣及通判以上各半若謂知縣資淺乞依尚書侍郎例許權監察御史所貴稍存祖宗故事不致執政自用臺官雖方今君臣相信法度可畧而朝廷紀綱不可不經乆逺臣職在臺長臺中典章義當固守轍又言臣聞書稱堯舜之徳曰明四目逹四聰蓋人君居髙宅深其勢易與臣下隔絶若不務廣耳目則不聞外事無以預知禍福之原臣不敢復論前代請陳本朝故事毎當視朝上有丞弼朝夕奏事下有臺諫更迭進見内有兩省侍從諸司官長以事奏禀外有監司郡守走馬承受辭見入奏凡所以為上耳目者其衆如此然至於事有壅蔽猶或不免今自太皇太后陛下皇帝陛下垂簾以來毎事謹重羣臣得對於前者惟有執政及臺諫官而已然天下之事其是非可否既決於執政陛下欲於執政之外特有所聞者又獨有臺諫數人而已臣觀今日臺官三員諫官二員其間非執政私人特出聖意所用者又不過一二人孔子有言今吾於人也聼其言而觀其行陛下試取此五人言行之實而諦觀之則其邪正向背槩可見也昔漢成之世王鳯用事羣臣莫敢盡言惟劉向王章力言其惡無所顧避皆為鳯所不喜言卒不用或繼以死而鳯推薦其門人如杜欽谷永之流使上封論事欽等所言皆掩蔽鳯短専攻帝失由此直言不聞漢以不競今陛下深處帷幄耳目至少惟有臺諫數人若又聼執政得自選擇不公選正人而用之臣恐天下安危之計無由得逹於前而朝廷之勢殆矣惟陛下留神省察無忽臣言則社稷之福也臺官三員侍御史孫升殿中上官均岑象求諫官二員左司諫楊康國右司諫劉唐老此九月初臺諫員數九月末除裴綸察院十月罷權管勾歩軍司劉斌為秦鳯路副都總管權管勾馬軍司姚麟兼權管勾歩軍司己巳左藏庫副使趙覲特换右奉議郎與通判差遣以覲父師旦死事康州故也政目八日事詔開封府諸科額二百三十二已撥五十添解進士今就試人多特更撥一百五十此據政目八日事増入額數當考詳七月十二日已撥五十壬申户部言因娶宗室女并内命婦保申授官者並不免本户科配及第一等户娶妻以陣亡之家恩澤授官者亦如之又請在京酒户如不依限内納麴價錢並依外州縣催理公私所欠錢給限監理三限不足以所欠多少定罪並從之癸酉詔除三路外諸路轉運安撫鈐轄司三京留守司各權添差大使臣兩員充凖備差遣實録有此中吏部尚書右選官闕五百餘大使臣二千三百約四人守一闕此三選絶少故有是詔此據政目増入集賢校理葉祖洽為考功郎中朝散大夫郭槩為刑部郎中川十六日韓云云丙子定武軍留後贈開府儀同三司追封建國公諡章靖克繼卒丁丑詔復置集賢院學士又詔責授成州團練副使黄州安置呉居厚為左朝奉郎少府少監分司南京左朝奉大夫監常州茶稅賈青管勾洞霄宫右朝奉大夫監泰州酒稅吕孝亷管勾仙源縣景靈宫太極觀右朝請大夫監宿州酒稅吕公雅管勾鴻慶宫政目云呉居厚於舊官上降三官除朝奉少府丞分司南京許外州取便居賈青吕孝亷王子京吕公雅並管宫中書舍人韓川言近除朝散大夫郭槩為刑部郎中按槩才識鄙下不足塵玷郎位詔槩别與差遣十二日除槩刑中知蘄州莫君陳為刑部員外郎贈左奉議郎直集賢院管勾崇福宫司馬康為右諫議大夫官給葬事賻金帛有加六月四日除右司諫病不能拜八月二十四日直集賢崇福九月六日卒贈官據政目并墓誌増入紹聖四年閏二月追奪通議大夫王端卒庚辰刑部言請給歴品官宗室及宗女若係公之人滿四年餘人滿二年令一易以舊歴納户部檢勘關送比部㸔詳磨勘訖送度支檢勘架閣從之又言人吏疲懦若累有犯不可存留者具實狀體量申尚書省六曹門下中書後省體量人吏疲懦若累有犯不可存留者送中書省若都省審察六曹門下中書後省者降等出職年限未及者又降一等降至守闕軍將者免降未有合出職名者放罷從之賜荆湖北路封樁錢十萬貫為邊備政目十八日事壬午御邇英閣詔講讀官讀書講寳訓宰相執政講讀記注官各賜御書詩一首上親書姓名於其後癸未左朝散郎裴綸為監察御史尋改屯田員外郎裴綸不知誰薦又不知何故便改屯外改屯外在十月十一日今并書范祖禹手記云元祐五年除御史辭不就侍御史孫升言臣竊聞新除監察御史裴綸辭免除命甚堅議者皆言綸之擢用外廷不知所以被召因依夫未經試用之臣聲跡疎逺一旦為人主所知任之為耳目非縁近臣論薦則必有章奏感悟人主如唐之馬周也且觀逺臣以其所主進不以禮主或非人雖孔子猶見疑於衆人必待孟子以為之辨况裴綸言行未足以信於天下而召用未明冝乎綸辭避而不敢當其命也御史居耳目紀綱之地以正色敢言不避權彊為職其進也豈可不自重哉伏望聖慈詳察明降召用裴綸因依付外不獨使綸有以自明立朝無愧亦所以示天下後世用人之公也劉摯記裴綸及胡兢事云先是中㫖召綸及兢為言事官輔臣面奏候召到審察綸至一詣都堂其人亦清修之士惟蘇頌畧識之遂以綸為監察既而言者交章論列以謂人主用人固善但此二人何縁逹於上聼恐岐徑一開不勝其弊乞明降薦者章奏以公選授而綸亦懇辭故罷之終不諭以所薦又論兢嘗為瀛州學士罪惡有狀因并諭曰兢到别與差遣外議推求其端為說不一或曰綸前通判蔡州頌有子在其部犯法將敗綸力庇全之故頌宻薦又曰綸居許與諸韓善近宗師來多延譽於士大夫而致之於傅堯俞故堯俞宻啟或又云維所薦也兢則多謂陳衍薦之蓋嘗承受於髙陽與兢同時又雅相厚也初云韓忠彦劉安世所薦皆髙陽同官爾問二人皆不然按吕大防政目十月二十五日胡兢為宗正寺丞此即别與差遣也兢前資當考専切措置荆湖北路邊事司言渠陽寨主李備申蠻賊犯邊借差楊晟經等掩獲有功詔與等第轉資及補軍校應該賞人其借職以下令給付身文字依陜西例又言備及監押蔡義與蠻賊凡十餘戰乞加賜予詔賜金帛有差賜金帛在二十四日今并書之户部言冶户煽生鐵如有隠落不盡數上厯雖未出冶並許人告得實依漏稅法給賞從之新無甲申吏部言應在任判司簿尉舉移令職官知縣人如舉狀考第該就移其願罷任者具狀詣闕徑申所屬録申吏部以申狀到日作見闕注官承替訖許令罷任若申狀未到已有先注擬待闕人亦下待闕處促新官候到方得罷任從之新無詔刑部今後官員犯公罪杖已下依赦文及有正例别無違礙者關吏部施行乙酉吏部侍郎趙君錫為天章閣待制樞宻都承㫖兵部侍郎顧臨為吏部侍郎集賢殿修撰知徐州彭汝礪權兵部侍郎新知濰州周孝恭為刑部員外郎詔知秀州章衡知廬州楊汲並為集賢殿修撰衡知襄州汲知徐州左司諫楊康國言五年九月二十四日竊聞朝散大夫章衡除集賢殿修撰知襄州士論喧然皆為不當謹按衡之為人汚行醜名著聞天下語其穢惡之跡君父之前不敢縷陳豈可以嵗月叙遷進兼清職况郡守之寄師表千里民所取法考衡素履所至之郡識者見之莫不訝朝廷差任之失謂衡安可以化民也愚民見之則曰郡守尚爾我何為而不可哉當見夫不夫婦不婦男不男女不女矣敗壊陛下美俗無如衡之為甚也直可屏之逺方與衆不齒陛下必欲包荒未即遐棄但可止令散宫廟與禄贍家窮年終身不可復與民政臣之區區肝膽俱露無他實恐有辱聖朝治體伏望陛下省察早賜指揮追寢新命以清朝論詔措置河北糴便司職事令提舉河北糴便司一面管當結絶轉運司更不兼管政目同元年五月二日復置提舉紹聖二年四月二十七日復措置司三年四月十三日罷提舉户部言河北河東陜西郷差衙前據投名人所得支給等錢並减半給投名衙前除依條本户合差耆長不免其餘色役並免從之政目同丙戍黔州觀察使永興軍總管李浩降為忠州防禦使以浩前坐任熈州副都總管買諸軍交旁入中等雖㑹赦特有是命刑部請依元豐敕軍人赦前逃走經恩不首者雖再經恩不得原减從之新無户部言勘㑹給請給糧料院専管勾只得拖厯批勘案此處文義不明疑有訛脫餘並聼太府寺指揮仍令本寺指定依某年月日條式合支名目則例月分姓名貫百石斛錢數行下所屬糧審院勘驗批放如係無法式或雖有法式而事理疑惑不能決者即申度支取決不得泛言依條施行逐處亦不得承受已上違者徒二年仍不以赦降原減從之陜西制置解鹽司言應告捕獲私鹽除準價支賞外將别理賞錢如不及十斤倍之毎十斤加二貫至百貫止内本路仍乞據今來所添錢只用本司錢支充從之丁亥河北轉運判官陳佑之罷兼權北外都水丞提舉河北糴便糧草鄭佑罷提舉照管深州并焦家山公堤道右宣徳郎孫逈知北州都水丞提舉北流十月十二日又書新提舉出賣解鹽孫逈知濮州則是此日差除旋改易也當考右宣徳郎李偉權發遣北外都水丞提舉東流同共提舉北京黄河地分仍那移兩河人兵物料己丑如京使前福建路都監周士隆為左藏庫副使令吏部添差充京西州軍監當差遣坐知誠州日創建堡寨招納溪峒蠻人希冒功賞及福建罷任違條擅不赴闕徑歸本貫故有是命樞宻院言秦鳯等路提㸃刑獄游師雄奏親詣智固勝如堡體量西賊五千餘人攻毁兩堡其日烟霧不見烽火勝如堡有横空地道因此保全守據人祗有三人傷中又縁廵檢計守義執西賊四人所有智固堡四人為西人所殺廵檢王亨自合預行約束告示守據人勢力不敵即許囬避管當東關堡白遇劉文珪亦不預行隄防頗渉慢易詔王亨特降一官展一期叙白遇劉文珪各特展二年磨勘勝如堡使臣執到西賊四人特免責罰熈河蘭岷路經畧使范育知蘭州种誼並特放罪辛邜詔前任執政官應檢舉丁憂者持服月日許通理期限其罷執政官後因事落職降官令中書省依條施行責授散官正議大夫天章閣待制致仕楚建中卒御史中丞蘇轍言臣近再論唐義問處置渠陽邊事乖方致渠陽蠻㓂賊殺將吏乞早黜義問以正邦憲更選練事老將付以疆埸經今多日不䝉施行訪聞執政止以臨敵易將兵家所忌為說雖知義問處置顛錯至覆軍殺將猶復隠忍不即遣代比雖遣衡矩往視然矩凡人未曽經練戎事何益於算徒引嵗月坐致邊人肝腦塗地臣甚惑之謹按義問所謂蓋全不曉事留在邊上一日即有一日之害昔趙任亷頗以趙括代之則敗秦任王齕以白起代之則勝蓋臨敵易將顧代者何人耳今執政乃以虛文藉口終能庇之逺人何辜日被塗炭若非陛下哀矜四方亟命賢將往代則臣恐陥害生靈未有已也兼臣訪聞渠陽諸夷蟠踞山洞道路險絶中國之人入踐其地雖跬歩不得其便昔郭逹知邵州困於楊光僣李浩從章惇自沅州入過界即敗逵浩皆西北戰將然並有敗無成者地形不便也今聞朝廷已指揮諸道發兵數目不少然將非其人臣恐既不知戰又不知守老兵費財漸致腹心之患深可慮也今朝廷欲棄渠陽然其中屯戍兵民不下數千義無棄之俾為魚肉要須畧行討定使知畏憚肯出渠陽兵民然後為可臣訪聞湖南北士大夫皆言羣蠻難以力爭可以智伏欲遣間諜招誘必用土人欲行窺伺攻討必用土兵捨此而欲以中國彊兵敵之雖多無益然此可使智者臨事制置難以遥度也臣前者嘗以衆人言謝麟屢經蠻事頗有勞効乞行委任朝廷置而不用者蓋必有賢於麟者惟乞速遣以紓邊鄙之患至於義問决無可望幸陛下無疑也臣又聞渠陽諸夷與冝州羣蠻相接冝蠻部族衆多若與渠陽諸夷合謀作過勢益昌熾猝難翦滅亦乞指揮廣西預行招撫雖不得其用但勿與恊力亦不為無益矣轍前奏在八月二十四日是月御史中丞蘇轍言臣伏見大河北流經營十年以成河道毎年夏秋汎溢孫村地形低下漲水東出因此張問等軰欺罔朝廷建為河北之議自是北京生靈懐魚鱉之憂日夜求遷徙之計監司守臣及敕遣使者皆言其不便朝廷亦知其難矣而去嵗八月宣徳郎李偉輙敢獻言欲閉塞北流囬復大河力排衆議僥倖萬一私覬功賞朝廷為之置修河司調發民夫剗刷役兵差文武官吏收買梢茭百廢並舉河北京東西路公私為之騷動萬口一詞知其無成上頼陛下聖明照知利害然猶未盡罷其役始令且開減水河次因旱災令權罷修河放散夫役然修河司依前不罷李偉仍提舉東流故道後因給事中范祖禹封還敕命尋奉四月五日聖㫖李偉差遣候過漲水檢舉取㫖臣訪聞是時大臣面許陛下竢求得一人可代偉者即令偉罷去夫偉以欺君動衆害及數路據法即日當誅竄以謝天下今乃遷延至此况有前件聖㫖必非虛言理當檢舉施行以信大臣前說今漲已退而偉終不罷據今月三日聖㫖止是依呉安特等所請候霜降水落從北外丞司相度將梁村口至孫村河身内妨礙處取豁擗掠候氷凍消釋相地形順便隨宜開導務令深闊釃為二渠臣詳觀安持等說蓋猶挾姦意觀望朝廷欲徐為興動大役之計以固權利不然但略行開撥口地則北外丞司自可辦事自不須復存修河司仍留李偉使時進姦謀以敗大計也以臣觀之修河司若不罷偉若不去河水終不能順流河朔生靈終不得安居伏乞指揮大臣速罷修河司及檢舉前敕流竄李偉以正國法貼黄稱臣觀大河北流北京在其東軍民倉庫所在河朔之都㑹也昔人逺為漲溢之備於其西岸開三河門使漲水西流於空閑之地至館陶合入河身故北京可無大患今自李偉等閑空三河門築截河馬頭止水鋸牙激水東向仍於東岸第三第四第七舖開撥河道恣令漲水灌注北京之上今嵗八月漲水東流㡬與北京簽横堤平南望瀰汎五十餘里是時北京申若雨不止風不定本京必致疎虞今偉等申請皆沒此目前實害而深言北流深瀛汎浸之害以為不可不存東流以分減水勢據今年深瀛等州堤防新復未甚髙厚然皆不至決溢若將來嵗嵗増築使與從前河堤相若加以海口深快漲水不得停留縱有水溢必不至深害雖無東流未為患也故臣以為偉等皆妄言茍欲自便耳若不斥去則邪說無窮正論無由得伸最河防之巨蠧也
