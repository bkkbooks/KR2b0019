body:
  text: 續資治通鑑長編巻十二宋李燾撰太祖開寶四年春正月王師克英雄二州南漢都統潘崇徹來降崇徹傳云王師過馬徑乃降今從國史劉鋹傳及九國志鋹世家十六日癸丑二州㨗奏到據十國紀年克二州乃去年十二月今附正月初丙午詔諸道州縣自今並不得更差攝官凡有闕員即具聞奏當旋與注授前所差攝官皆罷之職事以見任官權管丁未右千牛衛大將軍桑進興棄市坐監陳州倉受賕故也辛亥禁諸場院以課利放債州縣勿為追理通判閬州殿中侍御史平棘路沖言本州職役户負恃形勢輸租違期已别立版簿於通判㕔依限督責欲望頒為條制詔諸州府並置形勢版簿令通判專掌其租禁河東諸州民徙内郡者私蓄兵噐戊午命知制誥盧多遜等重修天下圖經其書訖不克成癸亥殿中侍御史劉汝礪分判度支事開封府捕獲京城諸坊無頼惡少及亡命軍人為盗并甞停止三百六十七人詔以其尤惡二十一人棄市餘决杖配流契丹侵易州監軍任德義擊走之此事據本紀實録新舊並無之本傳亦無疑即乾德四年三月事本紀誤載於此今兩存之是月王師次瀧頭南漢主遣使請和且求緩師瀧頭山水險惡潘美等疑有伏兵乃挾其使而速度諸險甲子至栅口乙丑至馬徑甲子正月二十七日此據露布所言即郭崇岳列栅處也傳云去廣州十里盖誤九國志言栅口去廣州才百里王師所次去栅口又十里露布言去廣州只一程又言八十里槍旗競進當得其實也屯雙女山直瞰郭崇岳栅㳺騎數出挑戰崇岳本無將才所將多韶英敗卒鬬志皆盡植廷曉欲戰崇岳不從但堅壁自守晝夜禱祠鬼神而已南漢主取船十餘艘載金寶妃嬪欲入海未及發宦官樂範與衞兵千餘盗其船以走南漢主懼乃遣右僕射蕭漼漼未見案五代史作蕭漼宋史作蕭灌中書舍人卓惟休惟休未見奉表詣軍門乞降潘美即令部送赴闕漼等既入不反南漢主益懼復令崇岳戒嚴二月丁夘朔又遣其弟判六軍十二衞禎王保興率國内兵來距此據露布追書五代史九國志言保興率文武官屬來降王師不納與露布異國史鋹傳又言保興來降為郭崇岳所遏按崇岳本無鬭志豈敢更遏保興令不降也傳又言王師進攻崇岳保興領衆拒戰然則保興必不以降出今止從露布十國紀年亦云保興先師百官迎王師潘美以南漢主不至不納二月一日南漢主乃使保興拒戰植廷曉謂郭崇岳曰北軍乗席巻之勢其鋒不可當也吾士旅雖衆然皆傷痍之餘今不驅䇿而前亦坐受其斃矣庚午廷曉乃領前鋒據水而陣令崇岳殿後禦其奔衝既而王師濟水廷曉力戰不勝遂死之崇岳奔還其栅潘美謂王明曰彼編竹木為栅若篝火焚之必擾亂因其擾亂夾擊之此萬全䇿也遂分遣丁夫人持二炬間道造其栅㑹暮夜萬炬俱發天大風煙埃坌起南漢軍大敗崇岳死於亂兵保興逃歸龔澄樞李托與内侍中薛崇譽崇譽未見等謀曰北軍之來利吾國中珍寶爾今盡焚之使得空城必不能久駐當自還也乃縱火焚府庫宫殿一夕皆盡龔澄樞等傳皆云王師至白田澄樞等乃縱火焚府庫世家及千國紀年則云焚府庫之明日王師始至白田今從世家及紀年辛未王師至白田南漢主素服出降潘美承制釋之遂入廣州俘其宗室官屬九十七人與南漢主皆縻於龍德宫保興初匿民間後乃獲之有閹工百餘軰盛服請見美曰是㭬人多矣吾奉詔伐罪正為此等命悉斬之美以露布告㨗己丑至京師按露布當是行營所作而扈䝉傳乃云擒劉鋹䝉草露布稱㫖召對滋福殿賜金紫則似追為之矣當考庚寅羣臣稱賀遂賜宴凡得州六十縣二百十四户十七萬二百六十三新舊録州縣户數與本紀不同今從本紀辛夘赦廣南管内州縣常赦所不原者偽署官並仍舊無名賦歛咸蠲除之除開寶三年以前逋租亡命山林者釋罪招誘吏民僧道被驅率者官給牒聽自便民饑者發廪賑之諸軍俘獲悉還其主縱遣劉鋹父祖守墳宫人俊士竒才所在詢訪修辭挺節恥仕偽邦者長吏以名聞祠宇丘壠悉加營䕶大定録稱平廣南用周渭䇿然畧不見于史當考知制誥盧多遜權知貢舉進士合格者十人㑹要及登科記並係二十四日熊克九朝通畧進士劉寅等乙未幸飛龍院賜從臣馬上以令尉捕賊先定日限其已被批罰者或遂絶意追捕乃詔自今雖限外獲賊者令有司備書于籍以除其罰但不得叙為勤績其累經殿降法當停免者不用此制此據本志新舊録無之不得其日是月諸道幕職州縣官闕八百餘員堂帖促流内銓補填銓司奏近者選人絶少雖有判成資序又多相妨乃詔除已授西川官未赴任并西川前任歸明及兩經發遣不赴京兼敕賜及第人外自今日以前罷任諸色選人並特放選令於南曹投狀判成送銓司依次注擬三月庚子禁嶺南民買良人黥面為奴婢庸雇取直辛丑以蕭漼為太子中允卓惟休為太僕寺丞乙巳幸教船池又幸玉津園宴射甲寅殿中丞桑塤責授司農寺丞坐沿江廵檢私茶擅行廢置也丁巳改嶺南思唐州為司明州雄州為南雄州天下縣以唐為名者皆改之詔嶺南諸州長吏察偽政有害於民者以聞當悉除去王偁東都事畧開寶四年三月乙巳詔曰百粤之人久淪虐政其令嶺南諸長吏察偽政有害於民者以聞當悉除之詔前代帝王當給民奉陵者各增二戸南寜州蕃落使龍彦瑫卒其國人詣涪州以歸德將軍武才及八刺史狀請立彦瑫子漢瑭為嗣詔授漢瑭南寜州刺史兼蕃落使前右監門衞將軍案宋史及薛應旂續通鑑皆作左監門衞將軍趙玭既勒歸私第不勝忿恚一日伺趙普入朝馬前斥普短上聞之召玭及普於便殿面質其事玭大言詆普販木規利先是官禁私販秦隴大木普嘗遣親吏徃市屋材聨巨筏至京師治第吏因之竊於都下貿易故玭以為言上怒促閤門集百官將下制逐普詔問太子太師王溥等普當得何罪溥附閤門使奏云玭誣罔大臣上意頓觧反詰責玭命武士撾之御史鞫於殿庭普力營救上乃特寛其罰扶出之夏四月丙寅朔責為汝州牙校案宋史及薛應旂續通鑑皆作汝州安置丁夘三佛齊國遣使來貢方物己巳詔嶺南商税及鹽法並依荆湖例酒麴仍勿禁壬申以南面行營都部署潘美副部署尹崇珂同知廣州乙亥詔吏部流内銓於唐鄧隨郢襄均房復安申等州以南及荆湖諸州選見任令録兩考以上判司簿尉合入令録年五十以下者移為嶺南諸州通判得擕族之官滿三考即依資叙注擬更不守選戊寅改義州為南義州敬州為梅州癸未幸開寶寺戊子令諸州訪名醫轉送赴闕永興節度使同中書門下二品吳延祚來朝遇疾上親臨問命然艾灸其腹遣中使王繼恩監視之疾少間數日復發庚寅卒贈侍中官給塟事繼恩陜人也唐主遣其弟吉王從謙來朝貢且買宴珍寶噐幣其數皆倍於前壬辰監察御史閭丘舜卿棄市坐通判興元府盗用官錢九十萬故也發廂軍千人詣京兆修先代陵寢令勿復調民自今有當繕治者以鎮兵給其役以嶺南儋崖振萬安等四州𨽻瓊州令廣州擇官分知州事是月唐撫州元帥齊王景逹卒唐主縁烈祖之意贈皇太弟諡曰昭孝潘美遣使部送劉鋹及其宗黨官屬獻于京師鋹至公安邸吏龎師進迎謁學士黄德昭德昭未見侍鋹鋹因問師進何人德昭曰本國人也鋹曰何為在此德昭曰髙皇帝居藩日嵗貢大朝輜重皆歴荆州乃令師進置邸於此造車乗以給饋運耳鋹嘆曰我在位十四年未嘗聞此言今日始知祖宗山河乃大朝境土也因泣下久之既至舎于玉津園上遣参知政事吕餘慶劾問飜覆及焚府庫之罪鋹歸罪於龔澄樞李托薛崇譽上復遣使問澄樞等此誰之謀皆俛首不對諫議大夫王珪謂托曰昔在廣州機務並爾軰所專火又自内中起今尚欲推過何人遂唾而批其頰澄樞等乃引伏五月乙未朔有司以帛係鋹及其官屬先獻太廟太社上御明徳門遣攝刑部尚書盧多遜宜詔詰責鋹鋹對曰臣年十六僭偽號澄樞等皆先臣舊人每事臣不得自由在國時臣却是臣下澄樞却是國主對訖伏地待罪上命攝大理卿髙繼申引澄樞托崇譽斬於千秋門外釋鋹罪并其官屬禎王保興等各賜以冠帶噐幣鞍馬尋以保興為左監門衞率府率初議獻俘之禮朝臣莫能知乃遣使就問吏部尚書致仕張昭昭卧病口占以授使者咸服其該博遂用之是日大宴大明殿丁酉以潭州防禦使潘美領山南東道節度使朗州團練使尹崇珂領保信節度使同知廣州如故以右補闕王明為祕書少監領韶州刺史廣南諸州轉運使王師南伐明知轉運事嶺道險絶不通舟車但以丁夫負荷糗糧數萬衆仰給無闕每下郡邑必先收其版籍固守倉庫頗亦参預軍畫上嘉其功故擢用焉上使軍噐庫使楚昭輔校左藏庫金帛數日而畢條對稱㫖上嘉其心計授左驍衞大將軍權判三司辛丑宴劉鋹於崇政殿饒陽縣令孟貽孫上書稱㫖丙辰擢貽孫右贊善大夫孟貽孫未見辛酉幸教船池上欲遣翰林學士左散騎常侍歐陽炯祭南海炯聞之稱疾不出上怒六月辛未罷職以本官分司西京改命司農少卿李繼芳祭南海劉鋹先尊海神為昭明帝廟為聰正宫其衣飾以龍鳯詔削去帝號及官名易一品之服繼芳未見壬申初置市舶司於廣州以知州潘美尹崇珂並兼使通判謝玭兼判官丙子以故綏州刺史李光琇男丕禄為綏州刺史詔御史中丞劉温叟中書舎人李昉等重定開元禮以國朝沿革制度附屬之是日丙子初命修書而實録本紀遂言以書來上恐誤也六年書乃成命學士院試廣南偽官取書判稍優者授上佐令録簿尉初上征晉陽命宻州防禦使馬仁瑀率衆廵邉至上谷漁陽敵素聞其名不敢出因縱兵大掠生口牛羊數萬計己而車駕還京令仁瑀歸治所明年羣盗起兖州賊首周弼尤兇悍自號長脚龍監軍率兵討之為所敗詔仁瑀掩撃仁瑀領帳下十餘人入泰山擒弼盡獲其黨魯郊以寜庚辰徙仁瑀為瀛州防禦使仁瑀兄子因醉誤殺平民繫獄當死民家自言非有憾也但過誤耳願以過失傷論仁瑀曰我為長吏而兄子殺人此乃恃勢恣横非過失也豈敢以己之親而亂國法哉遂論如律給民家布帛為棺斂具升揚州髙郵縣為髙郵軍成都布衣羅居通喪親廬墓日誦佛書有芝草生甘露降守臣表其事於是以居通為延長縣主簿案宋史作延州主簿壬午以劉鋹為右千牛衞大將軍員外置封恩赦侯俸外别給錢五萬米麥五十斛鋹體質豐碩眉目俱竦有口辯性絶巧嘗以真珠結鞍勒馬為戯龍之狀尤為精妙詔示尚方諸工官皆駭伏上給錢百五十萬償其直因謂左右曰鋹好工巧遂習以成性儻能移於治國豈至滅亡哉鋹在國時多置酖以毒臣下一日上乗肩輿從十數騎幸講武池從宮未集鋹先至詔賜鋹巵酒鋹疑之奉杯泣曰臣承祖父基業拒違朝廷勞王師致討罪固當死陛下不殺臣今見太平為大梁布衣矣願延旦夕之命以全陛下生成之恩臣未敢飲此酒上笑曰朕推心置人腹安有此事命取鋹酒自飲之别酌以賜鋹鋹大慙頓首謝鋹獻鞍轡實録在五年五月今移入復州防禦使梁延嗣入朝上慰撫之曰使髙氏不失富貴爾之力也戊子改濠州防禦是月嵐州言破北漢軍於古冶村斬首數百級河决鄭州原武縣汴水决宋州榖熟縣上既平廣南欲行報謝之禮秋七月甲午朔詔以冬至有事于南郊乙未御史中丞劉温叟卒温叟為中丞十二年屢求解職上難其代終不許及被病上知其貧遣中使就賜器幣温叟性重厚方正事繼母以孝聞五代以來言好古執禮者推温叟馬父名岳非侍宴終身不聽樂皇弟開封尹光義聞温叟清介嘗遣府吏齎錢五百千遺之温叟不敢却貯㕔事西舎中令府吏封識以去明年重午復送角黍紈扇所遣吏即前送錢者視西舍封識宛然吏還以告光義曰我送猶不受况他人乎乃命輦歸府中他日光義因侍宴論當世名節士具道温叟辭錢事上歎賞久之温叟既卒上難其繼曰必得純厚如温叟者乃可命太子賔客邉光範兼判御史臺事居半嵗始真為中丞丙申詔廣南諸州受民租皆用省斗每一石外别輸二升為䑕雀耗先是劉鋹私制大量重歛於民凡輸一石乃為一石八斗轉運使王明上言故革之戊戌賜皇弟開封尹光義門㦸十四枝庚子幸新水磑賜役夫錢帛大食國遣使來貢方物丁未以其使李訶末為懷化將軍己酉令河南府及京東河北四十七軍州各委本州判官互徃别部同令佐㸃閱丁口具列於籍以備明年河堤之役如敢隠落許民以實告坐官吏罪先是詔京畿十六縣重括丁籍獨開封所上增倍舊額它悉不如詔上疑官吏失職使豪猾䝉倖貧弱重困故申警之給事中劉載權知鎮州與建武節度使何繼筠不協繼筠訴于上癸丑黜載為山南東道行軍司馬内侍養子多爭財起訟詔自今年滿三十無養父者始聼養子仍以其名上宣徽院違者凖前詔抵死豐州衙内指揮使王承美遣軍校言願誘吐渾突厥内附庚申以承美為天德軍蕃漢都指揮使知豐州事尋授豐州刺史除刺史在十二月癸丑今并書建武節度使判棣州何繼筠來朝癸亥卒于京師上親臨其䘮流涕謂左右曰繼筠捍邉有功朕不早授藩鎮者慮其數竒耳今領旄鉞未幾果至淪沒豈不哀哉即命中使䕶送䘮事别賜寶劔甲胄以塟繼筠深沉有智略與士卒同甘苦得其死力居北邉前後二十年善揣知敵情屢以少擊衆契丹人畏伏多畫像拜之繼筠自開寶二年八月領扈州節度仍判棣州三年十一月來朝復遣戍邉今復來朝遂卒本傳但言復遣戍邉不云戌何地繼筠既卒八月乙亥以左贊善大夫宋咸又知棣州則所謂戍邉者猶判棣州也但史文畧耳平晉軍使王懷美懷美未見言率兵攻破北漢孟園樂義二寨汴水决宋州宋城縣八月甲申羣臣奉表請加尊號曰興化成功詔答曰余雖以興化為心未能力致儻便以成功自大實所難安羣臣再奉表訖不允詔廣南道偽漢諸宫庫務所有課役户並還本屬州縣仍給復二年九月庚子殿中侍御史李瑩分判三司度支事禁偽造黄白金募告者賞錢十萬冬十月癸亥朔日有食之開封府捕得偽造黄白金王元義等十二人案問具伏己巳並决杖流海島因詔自今民敢復造偽金者棄市庚午太子洗馬王元吉棄市坐知英州受贓不法也本志及祖宗故事云元吉知英州月餘受贓七十萬上以嶺表初定懲姦吏掊克特詔棄市按受贓棄市者多矣不但元吉也又不縁嶺表初定乃有特詔今不取戊寅改鑄中書門下之印知邕州范旻奏劉鋹時白配民物十數事辛巳悉命除之邕州俗重祠祭被病者不敢治療但益殺雞豚徼福於滛昏之鬼范旻下令禁止出俸錢市藥物親為和合民有言病者給之獲痊愈者千計乃以方書刻石龕置㕔壁部内化之㑹偽漢所署知州宦官鄧存忠刼土人二萬衆攻圍州城七十餘日旻屢出與戰矢集於胷猶力疾督戰賊遂小却旻創甚乃堅壁固守遣使間道求援於廣州前後十五軰始得逹援兵至圍解旻疾未平詔令肩輿歸闕所過僦丁夫官給其直旻質之子也尹崇珂傳乃云容州都指揮使鄧存忠今從旻本傳甲申詔兩京諸道自十月後犯强竊盗不得預郊祀赦所在長吏當告諭下民無令冒法自後將郊祀必申明此詔寶訓載王旦言太宗時每議郊祀皆前下詔又慮强盗恃恩犯法乃詔不以赦原而史館日歴并言竊盗竊盗情輕不可與强盗同科今立刑法志宜在酌中而史官執稱不改日歴舊文真宗曰當如何書旦曰止可言强盗上曰理雖若此然不可輕改當從史官議庻幾傳信今刑法志所書實用真宗聖語云右補闕梁周翰上䟽言陛下再郊上帝必覃赦宥臣以天下至大其間有慶澤所未及節文所未該者宜推而廣之方今賦入至多加以可科變之物名品非一調發供輸不無重困且西蜀淮南荆潭桂廣之地皆已為王土陛下誠能以三方所得之利減諸道租賦之入則庶乎德澤均而民力寛矣上嘉納其言周翰因郊祀上此䟽不知的在何日今附見申戒强盗恃恩犯法之後周翰嘗監綾錦院杖錦工過差為所訴上怒甚召而責之曰爾豈不知人之膚血與已無異而忍肆其酷毒將亦杖之周翰自言臣負天下才名不當如是上乃止上初識周翰父彦温於軍中以周翰有文辭欲用為知制誥天平節度使石守信亦與彦温善守信入朝上因語及之守信㣲露上意周翰遽上表謝上不喜其命遂寢二事必不俱在此年無可繫著并書之郊祀推恩䟽之後丙戌詔嶺南諸州劉鋹日煩苛賦歛並除之平民為兵者釋其籍流亡者招誘復業詔應州有公使處知州與通判同上歴支破今附月末㑹要十月事十一月癸巳朔江南國主煜遣其弟鄭王從善來朝貢於是始去唐號改印文為江南國印賜詔乞呼名從之先是國主以銀五萬兩遺宰相趙普普告于上上曰此不可不受但以書答謝少賂其使者可也普叩頭辭讓上曰大國之體不可自為削弱當使之不測及從善入覲常賜外宻賚白金如遺普之數江南君臣聞之皆震駭服上偉度他日上因出忽幸普第時吳越王俶方遺普書及海物十瓶列廡下㑹車駕卒至普亟出迎弗及屏也上顧見問何物普以實對上曰此海物必佳即命啟之皆滿貯𤓰子金也普皇恐頓首謝曰臣未發書實不知此若知此當奏聞而却之上笑曰但受之無害彼謂國家事皆由汝書生耳固命普謝而受之二事不知的在何時談苑云開寶中李煜賂普記聞載吳越事不記年嵗與煜事相類故并書於從善入貢之後丙申吳越王俶遣其子鎮海鎮東節度使惟濬來朝貢戊戌罷嶺南諸州司倉司户參軍縣丞捕賊等官庚戌詔曰取才之道盖非一端近以諸道攝官悉令罷去又慮洊更民政或著吏能雷同遐棄良可惜也宜委有司按其歴任經三攝無曠敗即以名聞受偽署者不在此限河决澶州東匯于鄆濮壞民田上怒官吏不時上言遣使按鞫是日通判司封郎中姚恕坐棄市知州左驍衞大將軍杜審肇免歸私第恕博興人事皇弟光義於開封為判官頗盡禆贊嘗謁宰相趙普㑹普宴客閽者不通恕怒而去普聞之亟使人謝焉恕遂去不顧普由是憾恕及上為審肇擇佐貳普即請用恕光義留之弗得居澶州幾二年竟坐法誅投其尸於河恕家人初不知也偶於中流得其尸朝服故在後數日乃知恕所以死人謂恕罪不至此普實報私怨耳此據王子融百一編國史並無有也戊午親饗太廟始用繡衣鹵簿己未合祭天地于南郊大赦蠲開寶元年以前逋租庚申詔節察防團軍事判官推官軍判官等並依州縣官例給囬易料錢俸户節度防團副使權知州事節度掌書記自朝廷除授及判别㕔公事者亦給之副使非知州掌書記奏授而不釐務者悉如故給以折色壬戌命潁州團練使曹翰塞澶州決河濮州刺史安守忠副之初上擇偽蜀親兵習弓馬者百餘軰為川班内殿直廪賜優給與御馬直等於是郊禮畢行賞上以御馬直扈從特命增給錢人五千而川班内殿直不得如例乃相率擊登聞鼔陳乞上怒遣中使謂之曰朕之所與即為恩澤又安有例哉命斬其妄訴者四十餘人餘悉配𨽻許州驍㨗軍其都校皆決杖降職遂廢其班時内臣有左飛龍使李承進者逮事後唐上問曰莊宗以英武定中原享國不久何也承進曰莊宗好田獵務姑息將士每出次近郊禁兵衞卒必控馬首告曰兒郎軰寒冷望與捄接莊宗即隨其所欲給之如此非一失於禁戢因而兆亂盖威令不行賞賚無節也上撫髀歎曰二十年夾河戰爭取得天下不能用軍法約束此軰縱其無厭之求以兹臨御誠為兒戯朕今撫養士卒固不吝惜爵賞若犯吾法惟有劔耳禁軍民男女結義社十二月辛未召九經李符於内殿問經義賜本科出身符未見己夘兵部員外郎知制誥盧多遜以本官充翰林學士士午畋近郊丁亥前左驍衞大將軍杜審肇為左驍衞上將軍致仕仍食濰州刺史俸是嵗吳越廢王倧卒江南國主以太子太傅監修國史湯悦為司空判三司尚書都省占城闍婆大食國皆遣使致方物於江南國主國主不敢受遣使來上詔自今勿以為獻黎州定逺兵士作亂聚居庭角溪卭部州都鬼主阿伏遣其遊擊將軍卑吠等率衆平之詔賜阿伏銀帶錦袍以為歸德將軍
