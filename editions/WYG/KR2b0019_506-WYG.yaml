body:
  text: 續資治通鑑長編巻五百二宋李燾撰哲宗元符元年九月丙午朔詔法酒庫監官自今朝廷差人丁未詔以霖雨罷秋讌詔除破樞宻院探請過厨錢三千餘緡故事執政每員月支厨錢三十五千宻院嵗賜添厨錢一千七百緡自元祐三年以後西府修葺及造陳設什物冗費漸廣而厨吏數増物價有至一倍以上用度寖多遂探請至元符三年終而自林希罷政亦探請過三年前厨錢曽布欲回納上悉令除破布更欲立法令今後不得探請仍令量入為出不得支過嵗額錢數嵗終令承㫖具有無侵支錢數聞奏仍令承㫖司取索冗費看詳裁减上曰執政飲食之費不足校亦不可裁减削弱嵗終亦不須奏止令申樞宻院擬定修葺及行事之費皆令増一倍布自言三省主厨庫者方送大理寺根究乾没假貸錢僅萬緡宻院乃無此弊但所増物價寖髙故一食之費價倍於前日自是悉立定規例無復可過為侵盗三省喜謂布曰得此約束悉可遵用遂䝉成矣己酉中大夫知亳州林希知杭州朝請郎知汝州邢恕知應天府御史中丞安惇奏䟽論希恕除授不當䟽留中不出此據布錄試中書舍人趙挺之兼侍講是日三省擬周常葉棣曽􅌈呉伯舉為侍講而宰執各有所毁譽唯周常為黄履力薦而無毁之者詭得之矣上令具姓名呈及是上曰除趙挺之衆愕然盖非素議所及也上曰熈寧初首選為學官衆莫敢異既退章惇謂曽布曰挺之已除講官布曰得人履亦稱善又顧布曰更有一人質甚羙亦可用布曰亦聞之乃周常也先是上問布識周常否布曰臣不識之亦不知其如何上曰黄履力薦之以謂可在經筵布曰經筵乃在侍從最為親切要近之地所擢必得人望如常者衆人所未深知萬一誤擢為可惜不若只於從官中擇人如趙挺之乃熈寧初首選為學官莫如此人為宜上矍然曰好好布又言陛下聖質睿明出於天縱於邪正善惡無不洞照若挺之知章軰非出聖意擢用無縁得進外議孰不鼓舞稱頌經筵之選尤不可輕願更留聖意布錄在八月二十九日甲辰今附此常卒為說書在九月十八日癸亥龍圖閣待制新知杭州虞䇿為户部侍郎元符三年十月二十三日又以前户侍權户温州防禦使曹評為真定路副總管樞宻院初擬定與都鈐轄上特除副總管且曰先帝待慈聖家極厚此不足惜也詔孫把罷右司郎中與知軍差遣之命勿行先是御史中丞安惇論把察訪河北案舉失職故罷右司未幾杞卒於道遂有是詔十一月三日丁未鄧棐又云權吏部尚書葉祖洽言近劉摯梁燾諸子並勒停永不收叙仍各於元指定州軍居住伏見王珪罪惡比摯等最為暴著今罪罷輕重不侔何以慰天下公議詔王珪諸子並特勒停永不收叙詔開封府依舊勑每嵗冬月廵視京城内凍餒之人外吏部仍差待闕小使臣同職員分地分往救濟過人口交與福田院畢據實數申户部從監察御史蔡蹈言也詔奉議郎通判霸州侍其琮特追一官勒停坐避事出廵致北人侵入𣙜場人兵拆橋梁等也詔罪人應配五百里以上皆配陜西河東充廂軍曽布白上曰此漢徙人以實邊之遺法也上然之諸路經略司各二千人止庚戌追官勒停横州編管秦觀特除名永不收叙移送雷州編管以附㑹司馬光等同惡相濟也新錄削去以附㑹司馬光等同惡相濟也十二字供備庫副使王棫知寧化軍棫元豐二年中為閤門祗候尋醫從髙遵裕至靈州勾當公事遵裕貶棫亦降官與逺小監當遂以内殿崇班覃恩改承制致仕及邢恕言元豐末王珪問定䇿事於髙遵裕遵裕叱其子云此朝廷事不當與議時棫亦與聞遵裕贈官棫落致仕得供備庫副使七月二十五日落致仕除官而上諭曽布令與一郡遂除之布錄曽布再對上又問曽􅌈布曰臣論之多矣上又曰章惇不喜鄧洵武兄弟布曰惇與綰有隙衆所知然其斥恂武鄭居中葉棣呉伯舉輩則亦為公論所稱及薦引曽􅌈周穜軰則物論亦莫不罪之此乃天下之公議也上又曰謝文瓘如何布曰臣亦論之多矣上曰是布曰君子小人之分出天下公論多在下者以無情故也在上之人好惡各有所偏所引者皆其門下黨附之人故多不合公論如洵武穜􅌈軰是也臣嘗以謂君子小人名分不可易若令以小人為君子以君子為小人雖白刃鼎鑊在前亦不可奪雖君子小人論議不同然邪正之人以義理觀之亦不難分别且如今日在朝之人若善人君子則所陳無非忠厚之論每事循理守分不為過舉若邪慝之人則惟是攻毁元祐之人不已如邢恕之人才作中丞便攻劉奉世安惇作諫議大夫便攻鄭雍以至序辰軰平日所陳不過此等事但欲以此悅朝廷為進身之計然量朝廷亦已薄矣元祐之人詆斥先帝變亂法度孰不以為可罪然貶竄亦已至矣四五年間行遣不已豈惟中外饜飫聞聽臣竊料聖意必亦饜聞自古亦有此等事然嵗月漸乆則須漸寛未有愈乆而治之愈急之理且紛紛如此何時當已如劉奉世已在郴州更除一散官亦無所校在嶺表者已惡地更遷徙亦無益陛下方講復先帝政事修飾治具在朝之士能為朝廷議論禆補政事分别忠邪即於朝廷為有補徒爾紛紛誠無益也臣恐向所謂宰執薦引之人皆未足用適見三省言呉伯舉乃至告稅若置之經筵豈不取笑中外上亦笑曰却告稅布所開陳上頗諦聽之布又言臣愚直每不避喋喋盖聖問所及不敢不盡臣以為清選要地莫如經筵史院今經筵多非其人而史院尤甚無一人稱職者凡士大夫為祖考作一銘誌碑文猶須擇天下有名德之士為之以信後世先帝聖學髙明慨然大有為於天下豐功盛烈宜得名世之士為之譔述以發揚先帝志意事業以𫝊信不朽今乃以此軰為之何以信天下後世願更留聖意上黙然辛亥朝散郎劉拯守右司員外郎初黄履復欲置拯在言路章惇乗履奉祠亟有此除曽布謂惇曰上固嘗對林希言拯不可為言官惇笑曰此除且是矣盖謂希多以其差除為不然也新知潤州龔原特賜五品服詔應諸州通判並罷兼管勾官令提舉司依條於幕職官内選差京師雨乆不止拱聖第六營在安上門營中水至三尺五寸遂分五都送五營寄住内批依嘉祐例特支七百諸色人五百人員増上曽布言京師乆雨細民無以為生當有以恤之元祐中嘗賜錢而措置無術惠不及貧細今若令場務倉庫及應官局監官各就近分與坊巷令抄劄貧下人各以本局印印給帖子赴就近官局給錢如此則無濫冒之弊人吏各以本處人充量給與食錢有乞取減剋依重祿法則無敢作過者有不及者聽詣所屬陳訴則無不徧矣上從布言且曰細民誠不易兼軍營多損壞雨過便當為増修仍令内侍監督必可進築布先以賜錢恤貧乏語三省三省亦建請章惇曰上意更欲放房錢一次翌日上語布曰已再放房錢五十以下皆放仍放十日不妨但大姓不恱爾此不足恤壬子宣德郎鄒浩為右正言浩初得召對曽布謂上曰浩雖吕嘉問所薦然衆論甚稱之元祐以太學博士為来之邵楊畏所逐人以為寃上曰待子細詢問於是三省呈浩元祐間所上䟽陳科舉去留之法未當因及時事云人才所當急則云自古不乏才國用所當憂則云君子不言利邊備所當修則云在德不在兵凡十餘事皆深中當時議論者之病衆莫不稱之遂擢授諫職已而布曰上近日差除多出聖意人情無不恱服如趙挺之侍講適又聞鄒浩諫官皆叶公議上云鄒浩亦言在上者好惡不同故人才難進布曰此言誠中今日之病大臣與陛下共天位治天職當以天下為度無所不容以天下之公論致天下之人材為朝廷用乃其職臣嘗語同列以謂古人云有德者進則朝廷尊廟堂之上身任朝廷之事得天下之英才為朝廷用則是為我用也得天下之英才為我用則豈獨朝廷尊亦為我之尊榮也今大臣乃孜孜畏天下之士聞一人有氣節才為衆所稱則已望風疑之曰此人必與我不同必不為我用排斥詆毁必使之不得進而後已其所引者皆其門下奔走謟附之人如此等人豈有正人端士故每用一人天下莫不以為非盖未聞有為大臣而如此畏人者上亦嘆息曰身為大臣何畏人之有既退許將竊語布曰今日章惇不入上深毁短之且言其性分將因進說云當除以右相上深然之浩論惇當罷附年末呉敏中橋見聞錄云朱熈載言鄒志完任襄州州教授日聞襄有隐君子號先生既死乆矣冇一子號小先生然不能肖似也志完謁見問昔先生緒言餘論遺書皆不能道因問先生平日喜讀何書其子曰先生亦不多觀書頃嘗讀一常清静經志完因歸借清静經讀之忽若冇得翌日就邀其子出城徃拜先生之塔而作焚香頌歸来須是報師恩一炷清香塔下焚大地八風吹不動十方三世一時聞又言志完自貶所歸有謝表一語云昏昏瘴霧盡為受道之師餘不能記也叔夏言哲廟時陛對者多不能當上意者報罷髙者監司寺監丞類爾獨志完一見當即時改官除正言鄒浩奏臣聞君尊如天臣卑如地天地之氣交然後足以全萬物之生君臣之情通然後足以隆四海之治臣伏觀皇帝陛下躬覽機政以来自左右輔弼之外其因職而請對因舉而賜對者悉皆從容訪問盡其所言君臣之情固已通而無間然過是以徃竊慮其間不得上逹尚多有之臣願陛下審察壅蔽之端推廣聽納之路使四方萬里之逺無以異於一堂之上則天下幸甚天下幸甚浩此奏無月日附初除諫官時浩又嘗奏臣伏以設官之分雖臺官主於糾劾諫官主於獻納大率皆是以言為職然而諫官比之臺官除省曹依條合行關報事件外其餘並不預聞雖或聞之外議又緣取索諸處文字不得無由攷實難以論列臣竊見御史臺昨因奏乞在京官司被受朝㫖並依元豐四年以前指揮關報本臺至元符元年八月五日奏聖㫖依所奏立法施行伏望睿慈特賜詳酌令在京官司今後被受一司續降條貫及一時指揮亦依闗報御史臺法闗報門下中書後省諫官案所貴事得周知可以論列上副陛下虛懐聽納之意浩奏附見從違當考八月五日并靖國元年十月十一日當考御史中丞安惇言北京在澶州大河漲溢溺民田宅乞下本路提舉司委官抄錄被災人户速行賑濟户部尚書呉居厚言應起發官物並委本處當職官依法審量所募官員實可委付管押者即施行仍令保明申部若有移易侵用其元募官吏令本部具因依奏裁並從之新削丙辰朝奉大夫充秘閣校理孔平仲特落秘閣校理送吏部與合入差遣詔以平仲黨附元祐用事者非毁先朝所建立雖罷衡州猶帯館職故有是命平仲必有言者或因㸔詳訴理所文字也新錄辨曰元祐賢材之盛如平仲軰皆一時之望而吏官槩誣以黨附用事者自平仲黨附以下刪去今並存之但削上察知其人五字増詔以二字三省樞宻院同進呈鄜延奏苗履張守徳獲級詔令走馬審驗又奏已勾保甲别無𦂳要事宜即立便放散初蔡卞黄履曽布皆以謂乆雨收獲未畢遽此追擾殊不恤民力况邊報皆云㸃集徃涇原而鄜延所報亦然遽此調發殊無謂上亦深患之因言吕惠卿兄弟仕宦俱不能奉法循理亦無愛人恤物之意但狎侮相慢今玩法無所忌憚如温卿在東南廢法害物不可悉數詔使按劾雖送京東取勘不過遷延㑹赦爾上曰升卿性分亦然衆莫不以謂誠如聖諭升卿自云人勿犯我我兄弟直是報讐上亦駭之上比數諭布以人物布言邪正是非莫如公議公議出於無情故多在下如趙挺之郭知章軰進擢則人莫不喜如序辰軰一有遷除則人實不樂盖邪正之辨不可變亂有守之士於分别君子小人名分雖鼎鑊在前不可奪也丁巳尚書省言軍人及諸色人犯罪該配而不任征役者配充合配指揮小分并老疾憑恃收贖而情不可恕者並隣州編管新無是日蹇序辰安惇以訴理事上殿曽布言訴理事千衆人昨朝廷指揮令言有不順者具名奏中外皆以為平允但恐議論者更有所加願聖意裁察臣嘗以謂訴理之人本無可罪令刑部左右兩曹一主斷獄一主叙雪盖自祖宗以来以至今日凡得罪經斷鮮有不更訴雪者但一切付之刑部自有條格既前此或行或否皆自有司條上其間得雪除者比比而有元祐中用事之人當有形迹先帝之意故别置一司以張大其事若當時但如常日付之刑部則今日亦無復有此紛紛以此言之但用意造作之人為可罪訴雪者似不足深責兼人數衆多動衆失人心孰大於此者真宗踐祚有建議欲放天下欠負者真宗云先帝何以不放大臣云先帝留此以遺陛下以固結天下人心真宗欣然從之盖人心何可失也布又言訴理之人若於先朝言有不順此天下之所共怒自當行法臣今日所陳無他但願朝廷守已降詔㫖勿令議論者更有所増加爾上深然之已而聞序辰及惇所陳已紛紛矣戊午鄜延奏乞下涇原備禦又乞留苖履統制出入詔速發遣翌日再奏乞留亦不許十四日陳次升云云河東奏已築三交川堡二十三日賜名先是詔在京權侍郎以上各奏舉人材取㫖召對既而又得㫖凡被舉者悉召故曰有對者上數以詢近臣曽布言人材淑慝不可逃公論公論所在是非不可變臣每被聖問不敢不盡底裏然臣自得望清光首尾五年前後所陳不敢二三盖出於赤心也故是非之論終始未嘗敢有小變易聖意亦必洞察上欣然曰是是又冇說周常六行今别見薛昻上殿布言昻乃執政門下人衆論所不與上曰誰門下人布曰蔡卞上黙然是月對者多隨才任使獨昻斥不用是月以下布錄甲戍陳瓘云哲宗謂昻俗佞已附注紹聖四年十月二日壬午己未吏部尚書葉祖洽言近詔侍從官各舉所知聞所舉之人召與不召者伏望並令次第延見所有去取出自一時聖斷從之蔡蹈云云已附八月二十六日辛丑或移附此雄州奏乞雇禁軍及百姓修城詔河北沿邊並凖此引進使成州團練使王湛為鄜延路都鈐轄是日陳次升言樞宻院不當不從鄜延暫留苖履統制翌日同進呈上訝其太速問何以漏泄蔡卞曰臣等亦方訝之上令分析因何得知曽布退詢院吏云曽闗門下省再對遂奏云次升在左省縁曽闗門下省故聞之耳上曰職事不同何以知且令分析仍令不得隐諱退以語三省卞頗喜曰交割却門下省恰兩日章惇在式假卞權領也布曰若如此止是給事漏泄卞曰更好盖以范鏜駮朱服故深憾之爾已而次升分析云與范鏜讀宻院劄子故知衆皆以為無罪獨卞曰中書門下兩省漏泄之禁最嚴今若以為無罪則今後漏泄俱不妨上曰此豈得無罪布曰如此亦只是范鏜有罪卞曰更無事亦須放罪布曰放罪不妨上許之先是鏜上殿布是日再對上問鏜如何布曰鏜之初進人多疑其不正初舉吕升卿自代人以為附惇及繳趙叡文字則正戾惇意或疑其附卞及駮朱服之命則正與卞違未問舉措是非要之不為人所使上亦深以為然布錄癸丑今附此庚申詔朝散大夫張夀特令致仕夀前知䕫州例得對上察其老不任事罷之曽布言熈寧中河東分畫地界起遣弓箭手四十二人請以五臺山寺地處之又令僧毎人給二頃童行一頃餘悉以招弓箭手詔可布自言元祐二年帥河東奏乞四十二人依舊招到人有事故者以諸寨閑田招人逐旋撥還諸寺既從一元祐六年再降㫖如舊今陳敦逸以利害来陳遂得㫖如元祐二年朝㫖施行涇原路落蕃兵士歸報羌人㸃集百五十萬欲入漢界十程打刼諸路降羌及俘虜皆言羌人大㸃集决趨涇原詔章楶多方措置備禦楶以書遺曽布言賊不来則已来必墮吾䇿中布亦謂經營已乆宜其無所不備也辛酉御史中丞安惇言請自今開封府大理寺上殿公事不得輒乞不結案審錄及不覆奏如違雖允所請其元奏官並行責罰其刑名乞下刑部大理寺立法尚書右司言應勘罪具獄乞依條差官審録若係機宻即令所差官或差親近臣僚並就勘所審録仍取責不得漏泄文狀入案從之權殿中侍御史鄧棐言吕大防有子景山見任宣義郎乞依范祖禹等諸子勒停例施行詔大防諸子並勒停永不收叙壬戍皇第四女封懿寧公主太常博士周常言國家廟室之制猶有未備士大夫喪祭之儀猶有未明願令近臣諸儒與有司考求得失詔禮部太常寺講議以聞㸔詳訴理所言相州官吏失入馮言死罪計㑹請嘱法等元祐看詳作情可矜恕除雪罪犯事皆失實有害先帝治獄用刑之意及前任相州安陽縣尉李棠新録削去李棠姓名進狀内有銷除天下之寃以召和氣之語詔元祐除落指揮更不施行並令改正内李常特勒停又言光州司法參軍監安上門鄭俠上言謗訕朝政并王安國非毁兄安石等罪名元祐元年除雪不當及王斻王斿進狀内言父安國寃抑未除又云先臣不幸不得出於此時詔元祐指揮更不施行並令改正鄭俠追毁出身已来文字除名勒停依舊送英州編管永不量移王斻罷京東路轉運判官添差監衡州鹽酒稅王斿監江寧府糧料院斿責在十月二日丙子今増入先是曽布白上臣前日嘗言訴理事近降朝㫖已為平允不可更有増加乃出於公議實不知甥王斻亦預此事兼斻語既不婉順正犯詔㫖則臣之所陳本無他意上曰斻言不幸不得出於此時布曰此誠可罪然元祐中臣不在京師不知斻有此文字上曰斻是元祐二年狀布曰臣是元年二月出上曰卿必不知布曰臣前日適有此言望賜照察上亦然之是日許將謂布曰安中再禀斻逺近遂得㫖令與逺小處布問黄履以再禀履曰元度欲如此元度蔡卞也翌日章惇語許將曰更増此逺小指揮盡出卞意訴理事以斻為首盖序辰等慮布將有所開陳故塞其端云王安國獨不追改當考實錄十月二日丙子看詳訴理所言宣德郎王斿於元祐中進狀稱先臣寃抑罪名未除不幸不得出於兹時詔斿監江寧府糧料院王斻為京東運判在紹聖四年十二月二十八日詔文思院上下界監官除内臣外令工部少府監同共奏差詔陜西河東路經略司告諭將士自今出兵漢蕃將士臨陣用命有雜功自當保奏推賞不須虛上首級即有雜功而官司抑塞不為保奏聽於經略司或轉運提刑司訴委官究實其不為保奏及不受訴官司皆以違制坐之委走馬覺察知情與同罪不覺察亦重行黜責此用布錄刪修實錄殊不了了秦州制勘所言已勘李公緒所陳事狀不虛又乞追王舜臣等從之公緒事始具八月二十七日二年正月二十三日始涇原乞舜臣凖備使喚吏部言官員因朝廷直差若官司奏辟就移并合在外授差遣又再任應闗陞者並許所在州投狀錄白未經關陞文字差官㸃對仍取家狀一本連申吏部即願赴部闗陞者聽從之新削癸亥宣德郎太常博士周常兼崇政殿說書八月四日曽布云云朝奉郎知遂州程堂為駕部員外郎詔故相王安石就京師賜第百間以上陳瓘云云可考二年正月二十七日權知開封府吕嘉問言乞本府長吏到任舉推官一員許依舊法舉通判已上人充詔許舉第二任通判已上人新削都大提舉成都等路茶事司言請應買茶及以物貨博易而官司勾攔或抑勒者並徒二年茶價如合増减而官司不切體訪市價行遣失時並科杖一百客旅以物貨赴場博茶如不及擔數並許隨斤重博易若物價多茶價少許貼給物價物價少茶價多許貼給茶價内貼給錢不得過一分從之新削甲子樞宻院奏近據李忠傑畫到地圖若涇原路於天都額勒色克鼐摩㑹鹻隈等處熈河路於天都額勒色克齊訥納森東楞摩㑹州打繩川以来各進築得城寨即兩路邊面遂將通接但有間隙可乗即涇原路勾抽環慶路得力兵馬一萬五千人騎依上件地圖次第下手接續進築城寨向前相迎通接邊面昨雖已畫上件地圖降付兩路即未曽指揮逐路分認進築去處詔令章楶孫路詳此照㑹更切講究利害及先次計㑹相度舉動次第聞奏如有未盡事理亦仰子細條畫奏聞朝㫖候到果决舉動期日即别降朝㫖勾抽環慶秦鳯將佐兵馬等應副使喚此據章楶奏議附見布錄云詔章楶孫路各相度進築天都鼐摩及齊訥納森㑹州打繩川通接邊靣以環慶兵助涇原秦鳯助熈河各自舉動令條畫利害及舉動次第聞奏詔諸軍犯罪事干大理寺開封府先從重罪處受理布錄丙寅章楶奏乞孫路便道過渭州議事從之布錄淮南兩浙路察訪孫傑言江淮荆浙等路直置發運使吕温卿違條不往泗州排綱擅减衙前重難錢不依規法改正乗船過數令吏部抑置民居作宅基假立户名容縱公人軍兵於所在及廵歴州軍違法冐借請給毎一出廵逐州支借多至十餘貫石合要公案簿書等勾考取索不得温卿坐縱詭詐公違詔㫖乞下有司考正其罪詔罷温卿發運使於淮南州軍聽候朝㫖仍就近供答文字如有罪不以將来赦原既而上諭曽布仍曰温卿好貨布曰温卿家兄弟多貪和卿作郎官割米麥往邊州嘗被罰升卿等多為賈販之事此衆所知温卿之罷非自出聖斷必未肯爾東南之人少蘇息矣丁卯詔六曹權侍郎三年磨勘著為令新削詔梓遂州各増置武寧一指揮此用遂寧府編錄冊修改户部尚書吴居厚言公人被差勾當及隨官員不得借請兊錢物若官員容縱及勘給官司各杖一百内發運司公人仍勒停所借數多計贓重者坐贓論即官為判狀或指揮違法借兊者以違制論已上並不以赦降去官原减内勾當急速公事者仍不得乗船從之戊辰河東路經略司言神泉寨築堡三交川嶺畢工乞賜名詔以三交堡為名十三日築己巳許將乞罷政不許先是凡經訴理者皆改正而將亦在其間故求去以固留之乃己辛未太學博士吴師禮言乞每嵗申命近臣博求踈逺之士俾得進見以觀其志之所嚮器而用之將見異材軰出無異熈寧元豐之盛時天下幸甚詔每嵗令申中書省取㫖遂除師禮正字崇寧五年五月有師禮傳杭州人實錄師禮除正字在二十一日今附此壬申熈河蘭㑹路經略司言修築扎實嘉裕勒畢詔以通㑹堡為名皇城使威州刺史賈嵒除正刺史龍神衞四廂都指揮使權管勾馬軍司事左朝議大夫都官員外郎張公庠知晉州癸酉看詳訴理所言開封府府司官胡宗師等承勘周師立整㑹章喻賣田公事不當周之道傳逹増飾并撰造語言及取勘虛妄又祁定州官頓起等違條差禁軍防送元祐元年並作情理可矜恕任公裕進狀内有刑部一槩以特㫖遂稱難議施行以此排天下之幽寃使不得伸理國子司業朱服監丞葉祖洽主簿王元承凖朝㫖主簿専典簿書各於監視錢庫開閉收支互相違戾各特降一官葉祖洽仍罰金二十斤元祐並特除落今看詳訴理不當詔朝散大夫權刑部侍郎周之道朝請大夫權發運副使任公裕各特降一官任公裕改充發運判官元祐年指揮更不施行並令改正太學直講王沇之等受贓請嘱陞補生員除雪不當詔元祐年指揮更不施行並令改正鄒浩論任公裕云云甲戌上批在内諸門出入如因人請納官物呈報公事投送文字并御厨翰林儀鸞司非次祗應聽於近便門出入若不依所定門户出入者並以闌入論應差辦人物入皇城内應奉者並前一日具職次姓名人物數合經由門報皇城司除軍器頭刄外其依令合入及投送文書請納官物論在内諸司差人將帯頭刄火燭往来别地分祗應毎前一日具姓名數及經歴處所關皇城司新無朝散郎管勾玉隆觀孔武仲卒
