body:
  text: 續資治通鑑長編巻一百七十宋李燾撰仁宗皇祐三年春正月乙丑幸魏國大長公主第問疾庚午詔翰林醫官院日輪近上醫官一員總領諸科醫官以備應奉乙亥詔兩浙水災州軍四等以下户稅特與倚閣降大理寺丞譚異王鑑為幕職官逺小監當初異鑑自言赴銓磨勘當在祀眀堂前與閭邱孝修等一甲引見而為有司繼為二甲致改官不得與覃恩請如孝修例更遷一官上疾其倖求故降之丙子詔江寧府揚州廬州洪州福州並帯提轄本路兵甲賊盜公事益屯禁兵仍分淮南為兩路揚州為東路廬州為西路戊寅以辰州溪峒彭師寳知上溪州仍令乾元節貢獻如舊師寳仕羲之子也盖自咸平以來始聽溪峒二十州貢獻嵗有常賜蠻人以為利有罪即絶之慶厯四年仕羲以罪絶貢獻其後數自訴求知上溪州至是始許焉涇原經略司言自修徳順軍水洛城底石門堡而生户蕃族多出内附請逓補職名仍月給俸錢使為屬户以捍邊從之二月壬午朔以太子中舎致仕胡瑗為大理評事兼太常寺主簿固辭之審官院言通判員多闕少今定藩府州軍凡五十一處請各差京官一員為簽判及端封等二十二州知州邕桂宜三州通判舊制就移知縣人為之今請先用通判從之乙酉廣南西路轉運司言廣源州蠻儂智髙請内屬詔轉運使與本路提㸃刑獄鈐轄司具利害以聞初交趾發兵討智髙不克轉運使新喻蕭固遣邕州指使丌贇徃刺候而贇擅發兵攻智髙按原本脱徃刺候而贇五字文義未詳今㨿宋史蠻夷傳増入為所執因問中國虛實贇頗為陳大畧説智髙内屬乃遣贇還奉表請嵗貢方物朝廷以其役屬交趾未聽也固言智髙必為南方患願賜一官以撫之且使抗交趾詔問固能保交趾不爭智髙智髙終不内冦則具以聞固言蠻夷視利則動必保其徃非臣所能顧今中國勢未可以有事於蠻夷如智髙者宜撫之而已且智髙才武強力非交趾所能爭而畜也就其能爭則蠻夷方自相攻吾乃得以閒而無事矣朝廷訖不從固言蕭固云云㨿王安石墓誌増入丙戌文彦博等上眀堂大饗記二十巻紀要二巻上為之序鏤版以賜近臣編修官王洙加史館修撰仍俟知制誥有闕除之己丑詔徐宿泗耀江鄭淮陽七州軍采磬石仍令諸路轉運使訪民間有蔵古尺律者上之甲午詔曰韶夏濩武帝王殊稱漢樂曰大予唐舞為七徳制各象徳朕所慕焉前詔執事考正鐘律定一代之述作章祖宗之謨烈而稱號缺然未副其實其令兩制及禮官參稽典制議定國朝大樂名中書門下審加詳閱以聞初胡瑗請太祖廟舞用干戚太宗廟兼用干羽真宗廟用羽籥以象三聖功徳然議者謂國朝七廟之舞名雖不同而干羽並用又廟制與古異及瑗建言止降詔定樂名而己巳亥詔三司河北入中糧草復行見錢法初四税法止行於並邊諸州而内地諸州有司盖未嘗請即以康定元年詔書從事自是三税四税二法並行於河北未幾茶法復壊芻粟之入大約虛估居十之八米斗七百甚者千錢劵至京師為南商所抑茶每直十萬止售錢三千富人乘時收畜轉取厚利三司患之請行貼買之法毎劵直十萬北市售三千倍為六千又入錢四萬四千貼為五萬給茶直十萬詔又損錢一萬然亦不足以平其直乆之劵北售錢三千者才得二千徃往不售北商無利入中者寡公私大弊知定州韓𤦺及河北都轉運司皆以為言下三司議三司奏自改法至今凡得穀二百八十八萬餘石芻五十六萬餘圍而費緡錢一百五十五萬有竒茶鹽香藥又為緡錢一千二百九十五萬有竒茶鹽香藥民用有限𣙜貨務嵗課不過五百萬緡今散於民間者既多所在積而不售故劵直亦從而賤茶直十萬舊售錢六萬五千今止二千至香一斤舊售錢三千八百今止五百公私兩失其利請復見錢法可之仍一用景祐三年約束又懼好事者之横議也庚子下詔曰朕惟古之善為國者使變通不倦而公私相足比者食貨法壊芻粟價益倍縣官之費日長商賈不行豪富之家乘時牟利本末相横吏縁為姦故詔近臣考决大議今利害曉白尚慮輕肆之人仍舞空言幸揺其端夫利百而法乃變令下而議不起然後民聽不眩而憲度行焉自今有依前事為議者並須究知厥理審可施用若其事已上而驗問無狀者寘之重罰此並㨿食貨志第三巻與實録㑹要小異今但從志大抵食貨志第三巻叙茶法第四卷叙鹽法兩法或不相關徃往重出茶法貼買即鹽法對貼也鹽法對貼已具皇祐二年正月嘉祐元年閏三月辛丑又下詔戒妄陳濟邉之䇿詞意與此不異不知何也自慶厯八年十二月初用董沔言行四税法至是復行見錢法盖不滿三年志云不十年間恐誤今改云未幾初用鹽鐡判官董沔議河北便糴沿邊行三税法内郡行四税法國子博士監𣙜貨務薛向言祖宗之法塞下入粟三司出茶鹽香藥象牙雜物稱其直號三税法内郡則轉運司以常賦充今改用四税是嵗常倍出中都錢而茶鹽香藥象牙之物出多而用有極則價賤而不售官私兩失其利尋下其議而議者共主沔議向又作編年書述祖宗以來河北三税及見錢利害書奏不報不三嵗𣙜貨務積交引錢七萬貫未有以償而山場𣙜務茶江淮鹽中都香藥等物富商爭以財算而三邊之糴不行朝廷始命王堯臣等詳定向為檢閲文字乃黜沔補外郡而復見錢法且委向置場支𣙜貨務積交引錢以捄其弊詔擢向大藩此㨿范育所為薛向行狀及吕大防墓銘并向附傳王堯臣等詳定見皇祐二年正月薛向用見錢和糴在嘉祐元年十月丙午涇原經畧使夏安期上弓箭手陣圗初安期選弓箭手萬三千人分𨽻東西路都廵檢下屬嵗豐稔召至州大閱技擊精強且言可當正兵五七萬既圗上陣法乃降詔奬諭安期傳云簡弓箭手分三等得驍勇萬人為歩兵騎又半之教以戰陣之法由是土兵勝他路又籍塞下閒田募人耕種嵗得榖百萬石以備賑𤼵名曰貸倉戊申翰林侍讀學士兼龍圗閣學士給事中史館修撰宋祁坐其子與張彦方逰出知亳州張彦方者貴妃母越國夫人曹氏客也受富民金為偽告敕事敗繫開封府獄人𫝊以為語連越國夫人知開封府劉沆論彦方死不敢及曹氏執政以妃故亦不復詰獄具中書遣比部員外郎杜樞慮問樞揚言將駮正亟改用諫官陳旭權倖切齒於樞先是御史中丞王舉正留百官班論張堯佐除宣徽使不當樞乃出班問曰樞欲先問中丞所言何事而後敢留班舉正告之故樞曰用此留樞可也至是盖累月執政白以為罪黜監衡州税樞把之弟也杜樞事不得其時附見宋祁出知亳州後龍川别志云樞録問駮正特㫖不録問按本傳則樞未及駮正也盖先言之爾别志又誤以王舉正為包拯又謂宋庠奏樞越次妄言故坐責而正史但云執政不出庠名今並從正史先是開封府寡婦胡氏訴諸賈負息本錢因盡抱劵書至庭視之有其夫交逰書多知名士沆止為理所負欠而置其書不問及彦方獄沆又不問越國及所與交逰者諫官御史以為言上問之沆對胡氏夫七品正員官彦方舉進士嘗廷試雖交貴官與公卿子弟逰無害也顧臣乆在外偶不識之爾帝然其言左正言賈黯自以年少遭遇備位諫官果於言事首論韓𤦺富弼范仲淹可大用及杜樞貶黯言樞無罪且㫖從中出不因臣下彈奏恐自此貴幸近習言一得入則將隂肆䜛毁害及良善不可不察時言者或論事無狀輒戒厲窮詰黯奏諫官御史亦既疎逺未嘗預聞時政不免採於𫝊聞一有失實而詰難沮辱隨之非所以廣開言路請如唐太宗故事毎執政奏事聽諫官一人隨入又言執政患言事官旅進論議上前不肯止遂詔凡欲合班上殿者皆禀中書俟㫖今得進見言事者獨諫官御史若然言路將壅陛下不得聞外事矣請如故事便皆弗許追復右監門衛將軍恵州刺史李渭為四方館使渭前在延州與郭勸同得罪卒既十年於是勸為言而追復之三月壬子朔内侍省言今内供奉官有過且勒歸班給半俸候復赴内祗應方許全給從之乙夘命知亳州宋祁就州修唐書易史館修撰為集英殿修撰管勾國信所言自今通事殿侍與契丹私相貿易及漏泄機宻事者請以軍法論在驛諸色人犯者配流海島若博飲鬬爭欺凌及損壊官物書門壁者亦行配𨽻從之詔天下知縣縣令若差推勘刑獄及應副軍期或權知繁劇者具奏聞其閒慢處輒差而不奏者以違制故失論被差之官亦行責罰差出日月仍不理為資考慶厯七年六月八年五月可考證己未詔比年山場𣙜貨務嵗額寖虧其公私未便事令三司與詳定所更為條約及江淮發運司専事掊克使民被其患者令三司檢舉之諫官包拯吳奎陳旭言工部尚書平章事宋庠不戢子弟在政府無所建眀又言庠聞有劾章即求退免表既再上乃不待答復入視事庚申罷為刑部尚書觀文殿學士知河南府龍圗閣學士工部侍郎權知開封府劉沆為參知政事議者謂沆不敢窮治張彦方獄貴妃徳之坐此獲進諫官御史相繼論列帝不聽改瀘州三江寨為寧逺寨娑婆寨為安夷寨乙丑龍圗閣學士田況言鄉者淯井監夷人連年攻圍監城水陸不通益梓路鈐轄司官軍洎白艻子弟近二萬人討之兵戰死甚衆饑死者又千餘人盖由本監不得人致此請自今令轉運鈐轄司舉官為知監押代還日特遷一資從之戊辰邇英閣講易至山下有澤損君子以懲忿窒慾上曰人之情欲皆生於隂陽而節之在人楊安國對曰臣以為人有六情喜怒哀樂好惡天有六氣隂陽風雨晦眀故人之生天命之謂性而命人之所禀以生也性人之所賦以分也言情則性之移也語欲則情之肆也故六情相濫則喜生於風怒生於雨哀生於晦樂生於眀好生於陽惡生於隂故聖人取損象以懲忿窒慾也上然之壬申詔開封府曹官赤縣丞自今並除新改京官人任滿與免逺官初令銓司選用選人一年無過例改京官嵗乆改京官者甚衆故革之景祐三年三月令銓差選人充曹官癸酉廣南西路轉運司言儂智髙奉表獻馴象及生熟金銀詔轉運鈐轄司止作本司意答以廣源州本𨽻交趾若與其國同進奉即許之甲戌召近臣及館閣省府官觀瑞竹於後苑退而多為賦頌以獻者舊制羣牧判官不與時閤門使錢晦為羣牧都監殿中丞李復圭為羣牧判官復圭屬晦求與因召之後遂成例嘉祐五年乃釐正之復圭淑子也復圭屬晦此據江休復雜志嘉祐五年六月始復舊制據㑹要第一百四巻封通利軍齊賈埽寧津廟龍女為順濟夫人丙子黔州司户參軍栁材為校書郎簽書黔州判官事義軍都指揮使度仁義父子叛轉運司遣材等入蠻界招出而賞之置渠州隣水縣榮支鎮廣安軍渠江縣望溪鎮捉賊廵檢各一員是日魏國大長公主薨主太宗第八女母曰方貴妃主㓜不好弄未嘗出房闥太宗嘗發寳藏令諸女擇取之欲以觀其志主獨無所取太宗右諸女加諸王上於主尤所鍾愛容貎類太宗太宗崩宫中毎見主即起號慕不能勝下嫁李遵朂賔客皆一時賢士大夫毎有燕集主必親視饔饎之節嘗有盜入主第帝命官訊邑司皂吏主請出所逮繫人以私錢募告者後得真盜法當死復請貸之故事命婦皆服髮紒進見章獻眀肅太后命以珠錯羅巾縚之又賜金龍小冠辭不敢服他日固命之然誕節稱夀猶以髮紒入見太后於政事有所訪逮主多語祖宗舊事以諷有請以主教導六宫者主聞之曰吾無徳曷足稱是哉初遵朂出守許州暴得疾主亟欲馳視之左右白須奏得報迺可行主不待報而徃從者裁五六人帝聞遽命内侍督諸縣邏兵以衛主車其後居夫䘮衰麻未嘗去身日誦佛書有白鷰來巢服除不復御鮮華珍麗嘗燕禁中帝親為主簮花主辭曰自誓不復為此乆矣慶厯中因浴仆地傷右肱帝遣内侍責侍者主曰早衰力弱不任歩趨非左右之過由是悉得免主善筆札喜閲圗史能為歌詩尤善女工之事嘗誡諸子以忠義自守無恃吾以速悔尤其視他子與已出均及病目帝遣内侍挾太醫診視禳禬無不至自皇后貴妃以下皆至第候問進拜用家人禮奉藥茗進主甚恭車駕臨幸侍者掖主迎立帝命主先坐設御坐於西主固辭乃移榻東南鄉因親䑛主目左右皆感泣帝亦悲慟曰先帝伯仲之籍十有四人今獨存太主奈何嬰斯疾復顧問子孫所欲主曰豈可以母病而邀賞耶賚白金三千兩辭不受帝因謂從臣曰太主之疾儻可移於朕亦所不避也因命寢門垂簿使從臣問候又募天下能醫者授以官賜御書金字大悲千手眼菩薩又賜玉石金字太宗廟諡皆以祝主疾也主雖䘮眀平居隠几冲淡自若嘗誡諸子曰汝父遺令匶中無藏金玉時衣才數襲而已吾殁後當亦如是初以暴疾聞帝趣駕徃及道奏不起乃即主堂易服坐俟小斂訖再拜奠哭輟視朝五日追封齊國大長公主諡獻穆賜真珠飾棺帷并金銀供噐詔乾元節罷樂宰臣固請乃已常嵗誕節主入宿禁中俟旦稱觴是日帝追念之遣使持香藥醴饌置匶前制挽辭仍篆碑首曰襃親旌徳之碑夏四月癸未詔曰河北流民相屬於道而吏不加䘏乃飾厨𫝊交賂遺稱厚使客以取虚名非所以同朕憂也自今非犒設兵校一切禁之甲申知諫院吳奎言國家謹禮法以維君子眀威罰以御小人君子所顧者禮法也小人所畏者威罰也由文武二選為士大夫是皆君子之地也儻不以禮法待之則是廢名噐而輕爵禄也七十而致仕載之禮經臣下引年而自陳分之常也君上推恩而固留權之至也自三代以來雖衰㣲之世未有不謹斯禮以塞貪暴礪亷隅也近日光禄卿句希仲吏部郎中直昭文館陸軫等並以年髙特與分司初欲風動羣倫而在位殊未有引去者乞早以臣前奏施行二月癸巳光禄卿句希仲分司西京吏部郎中直昭文館陸軫分司南京先是奎及包拯皆言在官年七十而不致仕者並令御史臺以時案籍舉行知制誥胡宿獨以為文吏當養其亷恥武吏當念其功舊今欲一切以吏議從事殆非優老勸功之意當少緩其法武吏察其任事與否勿斷以年文吏使得自陳而全其節朝廷卒行宿言㨿胡宿本𫝊稱至今有之當考丙戌以獻穆大長公主子華州觀察使李端懿為鎮國留後越州觀察使李端愿為鎮東留後西京左藏庫使資州刺史李端慤領陵州團練使内殿承制李諒為供備庫副使内殿崇班李評李說並為内殿承制又以其壻東上閤門使貴州團練使錢晦領忠州防禦使詔淄青等州自春已来民頗艱食其軍儲留及一年餘盡以賑貸之丁亥御崇政殿閲諸軍轉員凡三日吏部尚書陳執中加觀文殿大學士廢九龍廟池先是廟楹摧圯詔許修葺而為𫝊池水能愈疾都人赴者不可勝計上以其惑衆而塞之辛夘契丹國母遣忠順節度使左金吾衛將軍耶律純利州觀察留後曹昌契丹遣懐徳節度使蕭果崇禄少卿劉永端来賀乾元節庚子邇英閣講易鼎卦上問九四之象施之人事如何楊安國對曰鼎為烹飪成新之噐上承至尊下又應物上承下施任重非據故足折而覆餗矣其猶任得其人雖重而可勝非其人必有顛覆之患上曰任人不可不謹也辛丑集慶節度使同平章事王徳用為太子太師致仕大朝㑹綴中書門下班龍圗閣直學士給事中張奎為樞宻直學士京東路安撫使知鄆州時京東盜起奎至數月盜悉平河北轉運使工部郎中直史館吕公弼為天章閣待制河北都轉運使公弼在職踰年通御河漕粟實塞下又置鐡冶佐經用減近邉屯兵使就食京東以省支移諸州増壯城兵専給版築以寛民役又蠲冗賦及民負責不能償者數百萬計而官用亦饒上以為能故加秩而因任之諫官陳旭言公弼藉父餘䕃干求薦引不當遽有此除公弼因是乞罷上謂輔臣曰古之君子貴夫幾諫今則務訐人隂私以沽直名朕不取也上以公弼為能據本𫝊云在部四年恐誤皇祐二年二月公弼始除河北漕三年四月遂除都漕在部才一年餘爾陳旭彈奏上云云則據寳訓也丙午江南東路轉運司言知江州林咸徳老昏而通判梅得臣又非才多病請擇人代之上曰一州軍民將何所寄乎其令咸徳致仕得臣罷歸丁未御邇英閣謂講讀官曰易㫖精微朕毎以疑難問卿等得無為煩乎曽公亮對曰臣等幸承聖問懼不能對豈敢言煩上曰卿等宿儒博學多所發眀朕雖盛暑亦未嘗倦但恐卿等勞爾丁度復進曰自古帝王臨御日乆非内惑聲色則外窮兵黷武陛下即位三十年孜孜聖學雖堯舜之聰眀不是過因頓首稱謝戊申詔比者齊鄆棣博等州㓂盜羣起其令巡檢縣尉㑹合捕討之其不任職者安撫轉運提㸃刑獄司察舉以聞己酉知諫院吳奎言太祖革唐末五代之弊削外諸侯威權専用文臣假守列郡名品雖下而眷待之意固異常僚故才者得以設施不才者難乎冐進太宗真宗欽承前憲遴選守臣責效既嚴敗官亦鮮故能措世於盛平陛下求治之意固祖宗所同也其如知州之選汎濫太甚京朝官為通判两任例皆除授不計人才雖於中書呈騐而卒無可否之意其顧待禄賜與通判知縣監押殊無所異又徃往待闕至一二年故士人厭薄有辭知州而求監當者請以天下州府軍監地望分為等數其推擇叙遷顧待禄賜考校沮勸誅賞之法更為條令而必行之御史中丞王舉正言河北朝廷根本而雄州又河北咽喉先朝用人如何承矩守邉累年官止遥郡刺史李允則幾二十年亦不過引進使今所用未盡得人而剋日待遷使後有功者何勸且言在許州應天府六年更轉運使十六人轉運使所使察官吏能否與民疾苦而數易如此豈能究宣朝廷徳澤乎舉正所言不得其時姑附吳奎論知州後當考刑部郎中知制誥兼侍講史館修撰曽公亮為翰林學士公亮自為集賢校理即預經筵凡十餘年上毎厚遇之及遷學士管勾三班三班吏世所賤薄老胥抱文書升堂取判者皆髙下在口異時長官漫不省察謹占署而已公亮盡取前後條目置座側案以從事吏束手無能為後至者皆莫能易五月庚戍朔詔恩冀等州旱其令長吏精䖍禱雨決繫囚無或淹滯仍令轉運司體量今年夏税以聞辛亥眉州彭山縣上瑞麥圗凡一莖五穂者數本上曰朕嘗禁四方獻瑞今麥秀如此可謂真瑞矣其賜田夫束帛以勸之丁巳詔中書堂後官自今毋得佩魚若士人選授至提㸃五房者許之丁夘召近臣館閣䑓諫官觀書於御書院庚午宰臣文彦博等言臣等毎因進對嘗聞徳音以搢紳之間多務奔競匪裁抑之則無以厚風俗若恬退守道者稍加旌擢則奔競躁求者庶幾知恥伏見工部郎中直史館張瓌十餘年不磨勘朝廷奬其退静嘗特遷兩浙轉運使代還差知潁州亦未嘗以資序自言殿中丞王安石進士第四人及第舊制一任還進所業求試館職安石凡數任並無所陳朝廷特令召試亦辭以家貧親老且館閣之職士人所欲而安石恬然自守未易多得大理評事韓維嘗預南省髙薦自後五六嵗不出仕宦好古嗜學安於退静並乞特賜甄擢詔賜瓌三品服召安石赴闕俟試畢别取㫖維令學士院與試安石維並辭不就安石臨川人維億之子也記聞又有曾公定姓名實録無有當考壬申初置河渠司𨽻三司命鹽鐡副使户部員外郎劉湜判官金部郎中邵飾領之太子中舎知長水縣孫復簽書南京㽞守判官事兼南京國子監説書初知諫院吳奎等言復坐狂人孔直温贈詩由國子監直講謫降再更大赦未復舊資况復素不與直温相識若遂沉棄恐知名士為姦徒所誣則善良難以自立故稍遷叙之實録云由諸王官侍講謫降按復本傳及墓誌未嘗為諸王官侍講也但為國子監直講爾乙亥頒簡要濟衆方𠡠長吏按方劑以救民疾丁丑御崇政殿録繫囚雜犯罪以下遞降一等杖以下釋之六月丙戌詔宗正寺春秋朝陵遣本寺官一員省視禮料及察行事之遺失者其軍人並給儀注衣帽無致凟慢丁亥無為軍獻芝草三百五十本上曰朕以豐年為瑞賢臣為寳至於草木蟲魚之異焉足尚哉知軍茹孝標特免罪仍戒天下自今毋得以聞戊子汝州部署楊景宗求為郡上謂輔臣曰景宗章恵太后之弟朕豈不念之然性貪虐老而益甚今與郡則一方之民受禍矣不許本𫝊云景宗願還眀堂恩所改官求為郡帝不許復授建寧留後按二年十一月丙申景宗以左監門衞大將軍汝州鈐轄復建寧留後本州部署實録已載並不載聖語于此始載之又不載景宗願還所改官事當考壬辰同判太常寺王洙言毎内降新物薦于宗廟有司皆擇吉日至渉三四日而物已損敗自今令禮院預行關報於次日薦之庶以稱奉先勤盡之意從之乙未給事中權知開封府魏瓘知越州初内東門索命婦車得賂遺掖廷物付開封驗治獄未上内降釋之知諫院吳奎言陛下前因祀眀堂下詔凡求恩澤若免罪内降指揮者所承官司毋得施行瓘敢廢格詔書請論如法瓘坐是出丁酉上謂輔臣曰近遣内待徃嘉州祈雨而本州具僧道威儀迎俟境上如此則逺人多擾矣其令轉運司禁止之詔威茂黎集壁等州及戎瀘州通判自今令轉運司舉本路京朝官知縣前任成資今任一年或前任一年今任二年者為之候滿三年理初任通判諫官包拯言臣讀先朝實録大中祥符中并益二州嵗滿當代先帝徧閲侍從官姓名謂輔臣曰此等各有所長然求其文雅適用可委方面者鮮矣毎念有唐名賢比肩而出何當時得人之多也王旦等曰方今下位豈無才俊或恐㧞擢未至爾然觀前代求賢不求其備不以小疵掩其大徳今兹立朝之士誰為無過陛下毎務保庇之然流言稍多則亦梗於任使大都迭相稱譽近乎黨過相糾訐近乎公鑒其愛憎唯托上聖誠哉是言至切至當緣近世之患正患如此四海之廣不患無賢而患在信用之不至爾且頃嵗以来凡有才名之士必假險薄之名以中傷之逮乎擯棄卒不得用議者迄今痛惜之欲望聖慈申命宰執應臣僚中素有才行先以非辜被譴如楊紘王鼎王綽等曽並叙用未復職任者並乞復與甄擢或委之繁劇必有成效如是則風化日益美賢傑聳慕積和之氣洽乎上下矣戊戌徙知越州刑部郎中楊紘為荆湖南路轉運使王鼎先自深州徙知建州尋亦除提㸃河北路刑獄鼎前在江東坐苛察免及復起治姦􅂍愈急所舉劾於貴勢無避眀年六月綽除江西憲惟鼎除河北憲不得其時今附此時盜鹽茶者衆鼎一切杖遣之監司屢以為言鼎不為變辛丑天章閣待制梅摯請復百官進對上曰今朝廷得失軍民利害自公卿至于士庶皆許指事而陳之縱渉繆妄亦未嘗加罪何用此紛紛也癸夘右屯衛大將軍克悚為左龍武大將軍克悚徳鈞孫也獻所為文召試學士院特遷之克悚父承鑒徳鈞子丙午改廣州南海縣為畨禺縣秋七月辛亥詔開封府齊國大長公主𦵏其踐蹂田稼者遣官檢視減其租壬子詔太學生舊制二百人如不能充數止以百人為限癸丑詔外任少卿監以下年七十不任釐務者其令轉運提㸃刑獄司以聞在京委御史臺審官院嘗任館閣臺諫及提㸃刑獄者令中書裁處待制以上能自引年則優加恩禮不湏用為定制甲寅賜陕州草澤魏閑清逸處士閑野子世有隠徳知州李昭遘上其行義故有是賜先是太常博士李夀朋言帝后諸陵薦饗皆有時獨昭憲皇后以合𦵏安陵不及時祭矧誕育二聖為國文母而二仲之祀不及於禮未安禮院言朝拜儀注牲牢並如太廟常饗例諸陵止奠一爵而安陵奠兩爵兩賛再拜但祭饌不兼設盖有司失之乙夘詔安陵昭憲皇后祝版幣帛御封香牲牢依太廟同室禮更造諸陵祭噐貯别庫夀朋淑之子也丙辰詔兖州仙源縣自國朝以来以孔氏子孫知縣事使奉承廟祀近嵗廢而不行非所以尊先聖也自今宜復以孔氏子孫知縣事丁巳翰林學士承㫖王堯臣等言案太常天地宗廟四時祠祀樂章凡八十九曲自景安而下七十五章率以安名曲豈特本道徳政教嘉靖之義亦縁神靈祖考安樂之故臣等謹上議國朝樂宜名大安詔曰朕惟古先哲王隨代立樂亦既制作必有稱謂緣名以討義繇義以知徳盖名者徳之所載有行逺垂乆之效焉故韶以紹堯夏以承舜濩以救民武以象伐𫝊之不朽用此道也國家舉墜正失典章交備獨斯體大而有司莫敢易言之朕憫然念兹大懼列聖之休未能昭掲於天下之聴是用申𠡠執事逺求博講而考定其衷今禮官學士迨三有事之臣同寅一辭以大安之議来復且謂藝祖之戡暴亂也安天下之未安其功大二宗之致太平也安天下之既安其徳盛洎朕之承聖烈也安祖宗之安安其仁厚祗覽所議熟復于懷恭惟神徳之造基神功之戢武章聖恢清淨之治沖人蒙成定之業雖因世之迹各異而靖民之道同歸以之播鐘球文羽籥用諸郊廟告於神眀曰大且安誠得其正恭依辛酉河決大名府館陶縣郭固口乙丑上諭輔臣曰近日職司以長吏不理聞者多矣中書未嘗施行且長吏者民之性命可不重乎宜擇其甚者罷之小者易之文彦博等慙謝而退於是自鄂州王開台州吕士宗等或以衰老或以弛慢而罷斥對移者凡十六人實録不載文彦博等慙謝及十六人姓名今從㑹要丁夘免天平軍節度推官沈起擅去官私罪初起因父疾請假不待報而歸法官論以私罪上曰若此何以厚風俗其除之起鄞縣人也己巳知制誥王洙直集賢院掌禹錫上皇祐方域圗志五十巻庚午宿州言百姓董奉者屢嘗獲強盜近又與盜鬬死其子海復獲所鬬盜三人請加甄賞上曰海非獨除去民害兼能復其父仇宜優賞之遂以為三班奉職賜袍笏銀帯就差本州廵捉盜賊先是虞部員外郎通判濮州井淵部夫張郭為羣盜所執已而得脱責監全州税淵清豐人也殿中侍御史張擇行言井淵身任按察為通判不能為國除盜而反至為盜所縳其辱命甚矣降充監當斯協公議知州聶世卿盜發所臨罪固有在今聞止移萊州亦乞降充監當癸酉職方員外郎知萊州聶世卿降知信陽軍世卿冠卿弟也㑹要皇祐三年七月二十五日書世卿責信陽軍今從之按實録於五年七月乃書井淵責全州監税盖誤也今附世卿未責前乙亥徙判澶州宣徽南院使彰信節度使李昭亮判成徳軍昭亮辭判澶州也知成徳軍樞宻直學士刑部侍郎李昭述為龍圗閣學士知秦州樞宻直學士刑部郎中吕公綽赴闕已而御史中丞王舉正知諫院包拯言昭亮素姦囬妄有所請昭述懦庸不宜付以重鎮公綽當其父夷簡執政時多所干預若遽令代還恐更圗進用乃詔各復任如故復任在八月壬午今并書公綽通敏有才然夷簡執政時多渉干請喜名好進者趨之時漏除拜以市恩時人以比竇申初龍圗閣直學士吏部郎中孫沔既除母䘮授陕州都轉運使沔求知眀州許之於是京東多盜乃徙沔知徐州沔眀購賞誅罰盜以故止降提㸃河北刑獄度支郎中席平知棣州以職業不修也丙子減湖南郴永桂陽監丁身米初馬氏科民採木不以貧富皆計丁取數國初量給其直令隨税輸米而重輕不等貧者苦之上命三司取最下數為凖凡嵗減十萬餘石韓贄使荆湖奏罷丁米贄本𫝊云爾然此時贄猶未出八月丙戌乃受命恐贄傳餙説今不取趙良規為湖南漕奏罷馬氏所賦丁口米數萬石良規本𫝊載此當考丁丑賜汴河役卒緡錢醫官使齊士眀等援例乞同管勾本院公事上曰士眀等輙敢違條妄陳以供奉藥餌有功效特免劾罪令提舉所嚴加戒勵
