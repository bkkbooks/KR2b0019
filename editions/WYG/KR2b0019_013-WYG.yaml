body:
  text: 續資治通鑑長編卷九宋李燾撰太祖開寳元年春正月乙酉朔按原本作辛夘朔誤今改正御乾元殿受朝庚寅詔吕餘慶歸朝以兵部侍即劉熙古為端明殿學士權知成都府壬辰左領軍衛上將軍燕國公劉重進卒重進無他才能徒善契丹語㑹耶律徳光滅晉遂授藩鎮歴環衛嘗從幸玉津園上召與語既退謂左右曰觀重進應對不逮常人前朝以為將帥何足重耶甲午發近甸丁夫増修京城馬歩軍副都頭王廷乂護其役丁酉遣使發廪賑陜絳懐等州饑民乙巳晉州言北漢偏城寨招收指揮使任守恩等案任守恩宋史作壬恩一百五十人来降是日大内營繕皆畢賜諸門名上坐寢殿令洞開諸門皆端直軒豁無有壅蔽因謂左右曰此如我心少有邪曲人皆見之矣二月癸亥詔曰三年有成前典之明訓一日必葺昔賢之能事如聞諸道藩鎮郡邑衙宇及倉庫凡有隳壊弗即繕修因循嵗時以至頽毁及僝工充役則倍増勞費自今節度觀察防禦團練使刺史知州通判等罷任其治所廨舍有隳壊及所増修著以為籍迭相付授幕職州縣官受代則對書於考課之厯損壊不全者殿一選修葺建置而不煩民者加一選庚辰改珍州為髙州從刺史田景遷之請也是月納皇后宋氏忠武節度使延渥之長女也延渥尋改名偓納后大禮也而本紀及新舊錄皆不書據后𫝊因長春節入宫故附見此月三月庚寅増修縣令尉捕賊功過令頒行之癸巳幸玉津園權知貢舉王祜擢進士合格者十人陶榖子邴名在第六翌日榖入致謝上謂左右曰聞榖不能訓子邴安得登第遽命中書覆試而邴復登第因下詔曰造士之選匪樹私恩世禄之家宜敦素業如聞黨與頗容竊吹文衡公噐豈宜斯濫自今舉人凡關食禄之家委禮部具析以聞當令覆試甲辰鎮州言百井寨兵出攻北漢馬鞍山寨斬獲數十人乙巳有馴象自至京師群臣表賀南漢西北面招討使潘崇徹以飛語見疑南漢主遣内侍監畨禺郭崇岳来覘其軍戒之曰崇徹果有異志即就誅之崇岳至桂州崇徹嚴兵衛以見之崇岳不敢發還白南漢主曰崇徹日夕領伶官百餘軰並衣錦繡吹玉笛為長夜之飲不恤軍政非有反謀也南漢主怒㑹崇徹單騎來歸南漢主釋不問但奪其兵權而己戊申唐主以樞宻使右僕射湯悅為左僕射兼門下侍即平章事悅素奬待清輝殿學士張洎洎能伺人主顔色善搆同列短長以悅四子布列三省樞宻院宻表云親切之地魚貫其間又言悅非經綸才不宜居相位國主以悅文學舊臣罷洎學士俄復故甲寅右拾遺梁周翰奪両任官坐通判眉州日决人至死也夏四月戊午成徳軍節度使兼侍中追封南康郡王韓令坤卒令坤有才略識治道與上同事周室情好欵洽鎮常山凡七年北邉以寧聞其䘮甚悼惜之丙子户部員外即知制誥史館修撰判館事王著復為翰林學士兵部即中知制誥盧多遜充史館修撰判館事多遜喜任術數善為巧發竒中上好讀書每遣使取書史館多遜預戒吏令遽白所取書目多遜必通夕閱覧以待問既而上果引問書中事多遜應答無滯同列皆服上益寵異之晉州言北漢軍校翟洪貴等二百餘人來降五月甲午詔諸道州府追屬縣租以籍付孔目官擅自督攝逋賦因縁欺詐破擾吾民自今令録事參軍躬按文簿本判官振舉之乙未詔諸道當輦送上供錢帛等舟車並從官給勿以擾民丙午建雄節度使贈侍中趙彦徽卒彦徽與上同事周世宗上嘗拜為兄及即位擢領旄鉞先是彦徽自鎮來朝上為開宴寵顧甚厚彦徽飲酒過度因致疾車駕幸其第賜錢百萬遽令歸鎮仍遣其子閑廐副使繼能侍行彦徽不恤民事専務聚歛私帑所藏鉅萬上聞之始薄其為人當疾革之際有雷震其室駭愕而終人以為隂譴云丁未賜江南米十萬斛民饑故也是月詔諸州通判糧料官至任並須躬自檢閱帳籍所列官物不得但憑主吏管認文狀主庫吏每三年一易從淮南轉運使蘇曉之請也此據食貨志唐主以勤政殿學士承㫖兵部尚書修國史韓熙載為中書侍即百勝節度使兼中書令熙載上䟽論刑政之要古今之勢災異之變及獻所撰格言唐主手詔褒答而有是命六月癸丑詔諸州民田經霖雨及為河水所漂没者蠲其租西川及山南諸州百姓祖父母父母在者子孫多别籍異財癸亥詔長吏申戒之違者論如律王偁東都事略詔曰人倫以孝慈為先家道以敦睦為美矧犬馬而有養豈父子之異居傷敗風化莫此為甚應百姓祖父母父母在者子孫無得别籍異財長吏其申戒之辛巳以右補闕辛仲甫權知彭州上謂之曰蜀土始平輕侈之俗未革爾有文武才幹是用命爾仲甫既至州兵燕環誘屯戍軍謀以長春節宴集日為亂仲甫初未覺也時民出郭拜墓仲甫率官屬廵邏於近郊見壕中草深恐其藏伏姦慝悉命燒薙之環黨懼謀泄遂有告者凡百餘人悉擒斬於市單州言單父民王美家龍出井中大風飄廬舍四百區溺死者數十人秋七月戊子水部員外胥昭盛責授左贊善大夫先是昭盛權知原州誤以蕃部入冦上言及騐之失實故有是命昭盛未見乙未中元張燈上御東華門賜從官飲殿前散員都虞候董遵誨為通逺軍使遵誨涿州人父宗本仕漢為随州刺史上㣲時嘗徃依焉遵誨憑藉父勢多所陵忽嘗謂上曰每見城上有紫雲如盖又夢登髙臺遇黒蛇約長百餘尺俄化為龍飛騰東北去雷電随之是何祥也上皆不對他日論兵戰事遵誨理屈即拂衣起上乃辭宗本去自是遵誨亦不復見紫雲矣及上即位遵誨累遷至驍武指揮使一日便殿召見遵誨伏地請死上令左右扶起因諭之曰卿尚記往日紫雲及龍化之夢乎遵誨再拜呼萬嵗俄而部下有擊登聞鼓訴其不法十餘事上釋不問遵誨惶恐待罪上諭之曰朕方赦過責功豈念舊惡耶汝可勿復憂吾將録用汝遵誨再拜感泣又問遵誨母安在遵誨曰母氏在幽州患難暌隔上因令人重賂邊民竊迎其母送於遵誨仍加優賜於是上以通逺軍西戎近邉命遵誨守焉遵誨既至召諸族酋長諭以朝廷威徳刲羊釃酒厚加宴犒衆皆悅服後數月復入冦遵誨率兵深入擊走之俘斬甚衆獲羊馬數萬夷落以定上喜其功就拜羅州刺史使如故遵誨嘗遣其外弟虞鄉劉綜来貢馬及還上觧所服真珠盤龍衣使齎賜之綜曰遵誨人臣豈敢當此賜上曰吾委遵誨方面不以此為嫌也丙午幸鐡騎營賜將士錢及羊酒遂幸玉津園賜從臣飲鎮州言北漢烏玉寨主胡遇等并家屬一百三十九人來降上自即位數出㣲行或過功臣之家不可測趙普每退朝不敢脫衣冠一夕大雪普謂上不復出矣久之聞扣門聲異甚亟出則上立雪中普惶恐迎拜上曰已約吾弟矣已而開封尹光義至即普堂設重裀地坐熾炭燒肉普妻行酒上以嫂呼之普從容問曰夜乆寒甚陛下何以出上曰吾睡不能著一榻之外皆他人家也故来見卿普曰陛下小天下耶南征北伐今其時也願聞成筭所向上曰吾欲收太原普黙然良久曰非臣所知也上問其故普曰太原當西北二邊使一舉而下則邊患我獨當之何不姑留以俟削平諸國彼彈圓黑子之地將何所逃上笑曰吾意正爾姑試卿耳於是用師荆湖繼取西川嘗因北漢界上諜者謂北漢主曰君家與周氏世仇宜不屈今我與爾無所間何為困此一方之人也若有志中國宜下太行以决勝負北漢主遣諜者復命曰河東土地兵甲不足當中國之十一區區守此盖懼漢氏之不血食也上哀其言笑謂諜者曰為我語劉鈞開爾一路以為生故終孝和之世不以大軍北伐按太祖云一榻之外皆他人家則此時猶未平荆湖也太宗以建隆二年秋尹開封開寳六年乃封晉王卲伯温見聞録云已約晋王者盖誤今改曰吾弟庶得其實又云始定下江南之議此尤誤若謂荆湖西川則可耳十國紀年北漢天㑹七年宋帝使邢州人盖留來謂帝曰君家自與周室有隙何預我事胡不改圖使一方之人困苦兵戰契丹多詐終不足恃君必欲中原何不下太行與君疋馬較勝負於懐洛川帝遣留歸曰為我謝趙君余家世非叛人欲存漢氏宗祀耳土地士馬不能敵君十一安敢深入君欲决勝負當過團栢谷來背城一戰宋帝笑曰存之何害終帝世宋帝不復北伐天㑹七年本朝乾徳元年也今因劉鈞死附其事於開寳元年文辭又與五代史不同今從五代史初北漢世祖女為晉護聖營卒薛釗妻生子繼恩漢髙祖典禁衛以世祖故釋釗軍籍館於門下釗無材能髙祖衣食之而無所用其妻常居中釗罕得見意怏怏因醉㧞佩刀刺之傷而不死釗即自裁其妻改適何氏復生子繼元而何與妻皆卒世祖以孝和帝無子復養繼恩及繼元皆冒姓劉氏繼恩皤腹多髯長上短下乘馬即魁梧徒歩即侏儒事孝和帝盡恭昏定晨省禮無違者及為太原尹選軟不治孝和帝憂之嘗謂宰相郭無為曰繼恩純孝然非濟世才恐不能了我家事將奈何無為不對是月孝和帝臥疾勤政閤召無為執其手以後事付之繼恩始監國無為與侍衛親軍使蔚進不協因出進守代州又建議漸斥去公族命繼恩弟繼忠守忻州繼忠亦孝和帝養子也自稱嘗使契丹得冷痼病定襄地寒願留養晉陽繼恩責其觀望趣令就道繼忠頗出怨語或以白繼恩尋縊殺之孝和帝殂繼恩遣使告終稱嗣於契丹契丹許之然後即位是月令諸州察民有饑者即發廪貸之八月甲寅詔以冬至有事於南郊乙夘按鶻於近郊還幸相國寺戊午又按鶻於北郊還幸飛龍院左監門衛大將軍趙玭既罷三司累上宻䟽皆留中不出嘗疑趙普中傷之乃詣閤門納所受誥命庚申詔勒歸私第玭請退居鄆州不許辛酉令合格選人到京者即赴集不必限四時及成甲次南曹銓司門下省三處磨勘注擬并㸃檢謝辭等共給一月限南曹八日銓司十五日門下省七日著為定式若别論理課績或負過咎湏至諸處勘㑹者即依例行遣仍具事以聞如無闕貟及資考未當注擬者不在此限丙寅命客省使盧懐忠等二十二人領兵屯潞州將有事於北漢也戊辰以昭義節度使案宋史及宋史記薛應旂續通鑑皆作昭化軍節度使同平章事李繼勲為河東行營前軍都部署侍衛歩軍都指揮使黨進副之宣徽南院使曹彬為都監棣州防禦使何繼筠為先鋒部署懐州防禦使康延沼為都監建雄節度使趙贊為汾州路部署絳州防禦使司超副之隰州刺史李謙溥為都監九月壬午詔曰舊禁銅錢無出化外乃聞沿邊縱弛不復檢察自今五貫以下者抵罪有差五貫以上其罪死癸未監察御史楊士達棄市坐通判蘄州日鞫獄濫殺人也羣臣三表上尊號曰應天廣運聖文神武明道至徳丁亥詔從之辛卯詔自今旬假日御講武殿近臣但赴早參宰相以下皆具鞾笏諸司使以下悉繫鞋其節假及大祠並如令式處分北漢主繼恩怨郭無為初與其父言不助已且惡其専政欲逐之而未果是月加無為守司空外示優禮内實踈逺之也繼恩服衰裳視事寢處皆居勤政閤其左右親信悉留太原府廨或請召入令翊衛繼恩弗聴於是文武百官皆進秩繼恩置酒宴諸大臣及宗子飲罷卧閤中供奉官侯覇榮率十餘人挺刃入閤反扄其户繼恩驚起繞書堂屏風環走覇榮以刃揕其胷殺之無為遣兵以梯登屋入殺覇榮并其黨迎立繼恩弟太原尹繼元繼恩立纔六十餘日覇榮者邢州人多力善射走及奔馬嘗為盗并汾間北漢世祖用為散指揮使戍樂平王全斌攻樂平覇榮率所部降之補内殿直未幾復奔北漢為供奉官於是謀殺繼恩持其首歸朝旋為無為所殺或謂無為實使覇榮作亂亟誅覇榮以滅口故人無知者繼元始立王師已入其境乃急遣使上表契丹且請兵為援又遣侍衛都虞候劉繼業馮進珂進珂未見亦未詳為何官領軍扼團栢谷以将作監馬峯為樞宻使監其軍峯太原人繼元妻峯女也繼業本名重貴姓楊氏重勲之兄㓜事北漢世祖遂更賜以姓名馬峯至洞過河朔記作銅鍋河應案宋史作銅温河宋史記作銅渦河薛旂續通鑑作銅鍋河與李繼勲等遇何繼筠以先鋒擊破之斬首二千餘級獲馬五百匹擒其將張環石斌遂奪汾河橋薄太原城下焚延夏門繼元遣殿直都知郭守斌領内直兵出戰又敗守斌中流矢退入城中是月二十日庚子繼勲奏到丁未北漢佐勝軍使李瓊来降初王師克郴州獲南漢内品十餘人有余延業者人質么麽上見之問曰爾在嶺南為何官對曰為扈駕弓官乃授以弓矢延業極力控弦不開上笑因問其國政事延業具言累世奢侈殘酷之狀上驚駭曰吾當救此一方之民於是道州刺史王繼勲言劉鋹肆為昏暴民被其毒又數出冦邉請王師南伐上猶未欲亟加以兵乃命唐主諭意令南漢主先以湖南舊地来獻唐主遣使致書南漢主不從國初縁舊制祭東嶽泰山於兖州西嶽華山於華州北嶽恒山於定州中嶽嵩山於河南府於是有司言祠官所奉止四嶽今按祭典請祭南嶽衡山於衡州東鎮沂山於沂州南鎮稽山於越州西鎮吳山於隴州中鎮霍山於晉州東海於莱州南海於廣州西海河瀆並於河中府北海濟瀆並於孟州淮瀆於唐州其江瀆准顯徳五年敕祭於揚州揚子江口今請祭於成都府北鎮醫巫閭山在營州界未行祭享從之其後望祭北鎮於定州嶽祠既而五鎮之祭復闕此據本志不得其時檢㑹要則關連四月五月七月悉附見秋末雅州義軍都指揮使權知黎州曹光實入貢京師因言州境安靜不須義軍廵警請罷之使歸業上喜謂左右曰此蜀之俊傑也令升殿勞問久之冬十月己未以光實為黎州刺史傳稱王全斌遣光實入貢全斌五年春巳貴隨州矣此𫝊誤也是日畋近郊還幸飛龍院甲戌屯田員外即雷徳驤責授商州司户參軍徳驤判大理寺其官屬與堂吏附㑹宰相擅増減刑名徳驤憤惋求見欲面白其事未及引對即直詣講武殿奏之辭氣俱厲并言趙普强市人第宅聚歛財賄上怒叱之曰鼎鐺猶有耳汝不聞趙普吾之社稷臣乎引柱斧擊折其上齶二齒命左右曵出詔宰相處以極刑既而怒解止用闌入之罪黜焉徳驤同州人也記聞載徳驤為御史中丞國老閑談載拾齒結帶事皆誤今依本𫝊稍取談苑及記聞删修之乙亥畋近郊丙子吳越王俶遣其子建武節度使惟濬来朝貢命知制誥盧多遜迎勞之是月上遣使齎詔至太原諭北漢主繼元令降約以平盧節度使授之又别賜郭無為馬峯等詔四十餘道許授無為安國節度使峯而下並與藩鎮無為得詔色動但出繼元一詔餘皆匿之自是始有貳志勸繼元納欵繼元不從初上遣諜者恵璘偽稱殿前散指揮使負罪奔北漢無為使為供奉官及王師入境璘即来奔至嵐谷候吏獲之械送太原無為知其諜也釋不問有招收將李超者嘗為上黨廐卒頗知璘姦狀因告馬峯請以璘屬吏無為怒并超斬之以滅口十一月辛巳詔以盜賊漸息減諸縣弓手有差令尉輙占留者重寘其罪癸已詔天下縣令佐自今檢苗定稅部役差夫鈐轄徴科區分刑獄凡關事務貴在公平如有違踰並冝論訴或令佐不相紏舉許吏民告得實者賞之有差先是上入太廟見其所陳籩豆簠簋問曰此何等物也左右以禮器對上曰吾祖宗寧識此亟命撤去進常膳如平生既而曰古禮亦不可廢也命復設之於是判太常寺和峴言案唐天寳中享太廟禮料外每室加常食一牙盤五代以来遂廢其禮今請如唐故事詔自今親享太廟别設牙盤食禘祫時享皆同之卲氏見聞録云太祖初即位朝太廟見其所陳籩豆簠簋則曰此何等物也侍臣以禮噐為對上曰我之祖宗寧識此命撤去亟令進常膳親享畢顧左右曰却設向来禮噐俾儒士行禮至今太廟先進牙盤食後行禮康節先生曰太祖之於禮也可謂逹古今之冝矣若據本志則牙盤食乃和峴所請且唐故事非太祖特行當是峴揣知聖意因獻此議而國史所載不詳見聞録又偶不及唐故事今並増益之朔記云上親享四室見牲體皆用生肉曰我祖考豈能食此耶命設牙盤食哭而祭之乃繫其事於乾徳元年亦誤矣今不取峴又言乾徳初郊祀上帝就望燎位而燎壇稍逺有司不聞告柴燎之聲臣時為禮官職當贊導親聞徳音令舉燭相應案史記封禪書秦常以十月郊見通爟火狀若桔橰欲令光眀逺照通於祀所望敕有司率循前制從之舊制太廟每室用一犢郊壇用犢十一周顯徳初太廟四室共用一犢乾徳初從禮儀使之請増太廟用三郊壇用五羊豕如令是嵗復減犢數如周制壬寅親享太廟癸卯合祭天地於南郊大赦改元蠲乾徳五年以前逋租御乾元殿受尊號册是月契丹以兵来援北漢李繼勲等皆引歸北漢因入侵大掠晉絳二州之境契丹兵至北漢境上此據九國志侵掠晉絳此據實録明年親征詔皆當十一月也初北漢主繼元妻叚氏嘗以小過為孝和后郭氏所責既而病卒繼元疑后殺之后方縗服哭孝和帝於柩前繼元遣其嬖臣范超執而縊殺之宫中嬪御遭罹逼辱無復嫌間世祖十子鎬錡錫獨有賢行北漢主聽羣小之譖幽囚之未踰年皆死惟銑以佯愚獲存唐主納后周氏昭恵后之妹也美姿容以姻戚往来先得幸於唐主昭恵疾甚忽見后入顧問妹幾時至宮后㓜未有所知乃以實對曰數日矣昭恵怒遂轉鄉而臥不復顧既殂后常出入禁中至是納以為后其夕宴羣臣韓熙載等皆賦詩以風唐主亦不之譴也初議婚禮詔中書舍人徐鉉知制誥潘佑與禮官參定婚禮古不用樂佑以為古今不相沿襲固請用樂又按禮房中樂無鐘鼓佑謂鉉曰窈窕淑女鐘鼓樂之此非房中樂而何后初見帝北齊禮有后先拜後起帝後拜先起之文盖冠禮所謂母答子竒拜者也鉉以為夫婦人倫之本所以承祖宗主祭祀請答竒拜佑以為王者婚禮不與庶人同請不答拜又車服之制多所駁異議乆不决唐主命文安郡公徐㳺詳其是非時佑方有寵㳺希㫖奏用佑議㳺尋病殂鉉戲謂人曰周孔亦能為祟乎佑廣陵人也散騎常侍處常子唐主既納周后頗留情樂府監察御史張憲上䟽其略曰大展教坊廣開第宅下條制則教人亷隅處宫苑則多方竒巧道路皆言以戸部侍即孟拱辰宅與教坊使袁承進昔髙祖欲拜舞胡安察努為散騎侍即舉朝皆笑今雖不拜承進為侍郎而賜以侍郎居宅事亦相類矣唐主批諭再三賜帛三十叚旌其敢言然終不能改也憲未見先是僧行勤逰西域上因賜大食國王書以招懐之十二月乙丑遣使来貢方物是嵗黨項結唐族首領多爾濟等引北漢人冦府州為守將所敗詔内屬蕃部十六府大首領吹裕勒與十二府首領羅阿帥所部誅多爾濟多爾濟懼挈族来歸乃以吹裕勒為歸徳將軍羅阿及多爾濟並為懐化將軍
