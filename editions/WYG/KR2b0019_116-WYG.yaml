body:
  text: 續資治通鑑長編卷一百十二宋李燾撰仁宗明道二年春正月壬申契丹遣右金吾衛上將軍耶律覇昭徳軍節度使韓橁來賀長寜節戊寅直集賢院李淑上耕耤類事五卷王后儀範三卷己夘詔淮南江浙荆湖𤼵運司比㽞上供米賑江淮貧民如聞流亡未巳今更以百萬斛濟之仍命翰林侍讀學士王隨入内供奉官鄧守恭入内殿頭江從瑩乗驛督視之罷館閣侍書初光禄寺丞盛申甫馬直方在館閣讀書自陳歳乆請一貼職上止令大官給食候三年與試因詔後毋得復置壬午上元節罷正陽門張燈以耤田禮近也權免淮南災傷州縣魚果税癸未詔三司鑄明道元寳錢甲申以侍御史孫祖徳為夏州祭奠使朱昌符道病故也祖徳北海人前通判西京方冬苦寒詔罷内外工作而錢惟演督修天津橋格詔不下祖徳曰詔書可稽㽞耶卒白罷役有司言近制皇帝寳册法物金用二千七百七十八兩皇太后寳册法物用金二百八兩銀一千七百六十七兩帝曰此雖舊制亦曠費也自今止依皇太后例叅用金銀己丑宰臣吕夷簡樞宻副使夏竦上所注御製三寳讃皇太后發願文以檢討注釋官直集賢院李淑為史館修撰集賢校理鄭戩直史館夷簡竦各與一子改官而夷簡請賜其子大理寺丞公弼進士出身從之庚寅詔三丞以上致仕無子者聽官其嫡孫若弟姪一人仍降子一等癸巳武勝軍留後陳堯咨言梁濼積水廢民田數萬頃不能䟽𨗳至鄆州徙城以避之嚮者臣守鄆孫奭守兖同相視自魚臺下杷鑿河四十餘里决泊水注河由徳博東入于海可以紓水患通漕于河北冝嵗調夫乗春濬之朝廷從其説然汚澤自具地形終不能大耗也甲午降䕫州路轉運使國子博士張正中為殿中丞知太平州初以國子博士蕭律代正中而劾奏正中在部苛察不公故降之乙未御端明殿閱左右騏驥院馬賜荆王元儼二匹諸宗室輔臣至三司副使以上各一匹二月戊戌司天監言含譽星見東北方其色黄白上有光芒長二尺然觀者皆以為彗云庚子詔淮南江南民被災傷而死者官為􅄟埋仍祭酹之先是南方大旱種餉皆絶人多流亡困飢或疫氣相𫝊死者十二三官雖作粥麋以餉之然得食輙死村聚墟里幾為之空甲辰皇太后宿齋垂拱殿乙巳服禕衣花釵冠乗玉輅以赴太廟改衮衣儀天冠内侍賛𨗳享七堂皇太妃亞獻皇后終獻受册文徳殿帝奉賀還宿天安殿遂赴東郊丁未祀先農行耤田禮禮儀使張士遜奏皇帝三推而止帝曰朕既躬耕不以古禮為式願推終畝士遜固請乃耕十二歩而止御觀耕臺三公以下咸推盡壟悉過五推之數禮畢御正陽門大赦太宗親耕耒耜命太僕寺永秘藏之民年八十以上毎遇長寜乾元節許赴州縣燕設其父毋年八十者與免一丁著為式權罷江淮𤼵運司今年春漕以濟飢民御天安殿受册嘉祐四年祫享赦書又申明免丁之令本紀於此年失不載遂以嘉祐四年為事始誤也辛亥上作耤田詩賜近臣詔耤田陪位舉人免將來文解壬子以兩川饑遣使體量安撫天章閣待制王鬷益利路户部副使張宗象梓䕫路上御藥楊承徳入内供奉官吕清分路走馬承受公事除富順監井户所欠燒煎籍鹽簟課利己未置蘓州清酒務指揮三百五十人以𨽻酒官辛酉詔在京勾當庫務官未嵗滿者毋得别陳乞差遣又詔諸官田重複出稅者除之三月庚午加恩百官初耕耤田泰寜節度使同平章事判河南府錢惟演求侍祠許之壬申命惟演為景靈宫使留京師癸酉幸洪福寺還賜道旁耕者茶帛己夘録開封府判官兵部貟外郎朱昌符子夀臣度支判官度支貟外郎戴融子荀並為三班借職融送伴契丹使昌符祭奠趙徳明皆道病死故䘏及之司封貟外郎知安州劉楚言本州仍嵗旱災流民亡者八十餘家丁夘赦書按前二月丁未祀先農禮畢大赦此稱丁夘赦書疑誤京東江南淮南災傷州軍逃移人户令歸業與免夏秋兩稅賦今已過敇限而流民不還深慮為富室并兼而貧弱者不能自歸州縣户口益以減耗欲請更展限半年仍免徭賦兩料從之塘水東起滄州界扼海岸黒龍港西至乾寜軍沿永濟河合破船淀滿淀灰淀為一水衡廣百二十里縱九十里至一百三十里其深五尺東起乾寜軍西信安軍永濟渠為一水西合鵞巢淀陳人淀燕丹淀大光淀為一水衡廣一百二十里縱三十里或五十里其深丈餘或六尺東起信安軍永濟渠西至覇州莫金口合水淀得勝淀下光淀小蘭淀李子淀大蘭淀為一水衡廣七十里縱五十里或六十里深六尺或七尺東北起覇州莫金口西南保定軍父母砦合糧料淀為一水衡廣二十七里縱八里其深六尺覇州至保定軍並塘岸水最淺故咸平景徳中契丹鈔河北以覇州信安軍為歸路東南起保定軍西北雄州合百世淀黒羊淀小蓮花淀為一水衡廣六十里縱二十五里或十五里其深八尺或九尺東起雄州西至順安軍合大蓮花淀洛陽淀牛横淀康池淀疇淀白洋淀為一水衡廣七十里縱三十里或四十五里其深一丈或六尺或七尺東起順安軍西邉吳淀至保州合齊安淀宜子淀勞淀為一水衡廣三十餘里縱百五十里其深一丈三尺或一尺起安肅廣信軍之南保州西北蓄沉苑河為塘衡廣二十里縱十里其深五尺淺或三尺曰沉花泊自保州西合雞距泉嘗為稻田方田衡廣十里其深五尺至三尺曰西塘泊自何承矩以黄懋為判官始開置屯田築堤儲水為阻固其後益増廣之凡並邉諸河若滹沱葫蘆永濟等河皆滙于塘天聖已後相承而不廢仍領於沿邉屯田司而當職之吏各從其所見或曰有甲兵將在敵來何所事塘且邉吳淀西望長城口尚百餘里皆山阜髙仰水不能至敵騎馳突得此路足矣塘雖距海亦為無所用夫以無用之塘而廢可耕之田則邉榖貴自困之道也不如勿廣以息民為根本或者則曰河朔幅貟二千里地平夷無險阻敵從西方入放兵大掠由東方而歸我嬰城之不暇其何以禦之自邉吳淀至泥姑海口綿七州軍屈曲九百里深不可以舟行淺不可以徒渉雖有勁兵不能度也東有所阻則甲兵之備可專力于其西矣孰謂無益論者自是分為兩岐而朝廷以敵性忽荒無常阻固終不可以廢也元年八月忻州團練使劉平自雄州徙知成徳軍是月壬午奏曰臣嚮為沿邉安撫使與安撫都監劉志劉志未見嘗陳備邉之略臣今徙真定路由順安安肅保定州界自邉吳淀望趙曠川長城口乃契丹出入要害之地東西不及一百五十里臣竊謂聖朝七十餘年守邉之臣何可勝數皆不能為朝廷預設深溝髙壘以為扼塞臣聞太宗朝嘗有建請方田者今契丹國多事兵荒相繼我乗以引水植稻為名開方田随田塍四面穿溝渠縱廣一丈深二丈鱗次交解兩溝間屈曲為徑路才令通歩兵引曹河鮑河徐河雞距泉分注溝中地髙則用水車汲引灌溉甚便願以劉志知廣信軍與楊懐敏共主其事數載之後必有成績遂宻敇平與懐敏漸建方田懐敏時為西路縁邉廵檢都監也侍禁劉宗言又奏請種木于西山之麓以法榆塞云可以限敵騎也此叚取本志附見劉平自雄州徙成徳乃去年八月丙辰其奏則據㑹要在此年三月十七日知成徳軍劉平言安肅廣信軍並保州各相去三四十里其間平原廣野乞自保州以西如稻畦掘作方田每年漸次開展乞専委西路沿邉廵檢都監楊懐敏相度可否建置方田必有成績詔令懐敏漸次興置稻田仍令劉平常切照管丁亥祈雨于㑹靈觀上清宫景徳開寳寺庚寅以皇太后不豫大赦除常赦所不原者募天下善醫馳𫝊赴京師僧道童行係帳京畿三年西京南京五年諸道七年並與剃度披帶乾興以來貶死者復其官謫者皆内徙丁謂特許致仕甲午皇太后崩遺誥尊太妃為皇太后皇帝聽政如祖宗舊規軍國大事與太后内中裁處賜諸軍緡錢乙未帝御皇儀殿之東楹號慟見輔臣且曰太后疾不能言而猶數引其衣若有所屬何也奎曰其在衮冕也然服之何以見先帝乎帝悟以后服歛即命吕夷簡為山陵使既宣遺誥閤門趣百官賀太后於内東門御史中丞蔡齊正色謂臺吏毋追班入白執政曰上春秋長習天下情偽今始親政豈冝使女后相繼稱制乎執政無以奪夏四月丙申朔下詔求助删去遺誥皇帝與太后裁處軍國大事之語遣東上閤門使曹琮告哀於契丹又遣使吿諭邉鎮出遺留物賜近臣有差丁酉羣臣上表請聽政不允五上乃從之庚子降詔䘏刑見輔臣于皇儀殿之東楹工部尚書李廸初自河陽還以國哀未得入謁至是特召見之尋命廸為資政殿大學士判都省命翰林學士章得象為大行皇太后遺留契丹國信使崇儀使安繼昌副之供備副庫使李用和持遺留物賜西平王趙元昊皇太后既崩左右始有以宸妃事聞者上號慟累日不絶壬寅追尊宸妃為皇太后甲辰詔改𦵏于永定陵大行皇太后山陵五使並兼追尊皇太后園陵使或言太后死非正命䘮不成禮上亦疑焉因易梓宫上遣李用和視之則容貌如生服飾嚴具用和入告上歎曰人言其可信哉乃於大行神御前焚香泣曰自今大孃孃平生分明矣改𦵏易梓宫李用和視之據龍川别志邵伯温見間録乃云上親視之盖不然也太常禮院言册皇太妃楊氏為太后請如咸平二年故事百官上牋曰殿下稱教㫖或懿㫖而不上表從之咸平二年故事已不入長編此亦當削不惟不入長編國史亦不載今附此戊申始聽政於崇政殿西廂并召對契丹賀乾元節使崇義軍節度使蕭逹客省使劉日省罷乾元節上夀庚戌以流人林獻可為三班奉職明道初獻可抗言請皇太后還政太后怒竄于嶺南至是特録之實録云獻可以天聖中上言按張存䟽則當在眀道元年又按蘇舜欽林書生詩乃元年五月間也已附見六月末獻可不知何許人皇祐四年末又見當考壬子羣臣上表請御正殿不允表三上乃從之詔内外毋得進獻以祈恩澤及縁親戚通章表若𫝊宣有司實封覆奏内降除官輔臣審取處分罷創修寺觀毋進乾元節香合及山儀帝始親攬庶政裁抑僥倖中外大悦癸丑以景靈宫使泰寜節度使同平章事錢惟演判河南府召知應天府龍圖閣學士刑部侍郎宋綬通判陳州太常博士祕閣校理范仲淹赴闕罷上御藥并上御藥供奉以上御藥楊懐志江徳用並為供備庫使楊承徳楊餘懿並為洛苑副使上御藥供奉蔡舜卿張懐信武繼隆任守忠楊安節並為供備庫副使以入内供奉官四人勾當御藥院如故事丙辰降文思使普州團練使入内副都知江徳明為西京左蔵庫使并代路鈐轄三陵副使東染院使羅崇勲為真定府定州路都監洛苑使楊餘懿為齊州都監楊承徳為同州都監供備庫副使張懐信為岳州都監楊安節為晉州都監武繼隆為蘄州都監任守忠為黄州都監蔡舜卿為潞州都監初大行皇太后輔政而徳明等交通請謁權寵頗盛叅知政事薛奎言不遂斥逐恐階以為亂上不欲暴其罪状止黜之于外楊懐志江徳明二人未見謫官當考己未門下侍郎兼吏部尚書平章事吕夷簡罷為武勝節度使同平章事判澶州樞宻使昭徳節度使右僕射檢校太師兼侍中張耆罷為左僕射檢校太師兼侍中䕶國軍節度使判許州尋改陳州樞宻副使尚書左丞夏竦罷為禮部尚書知襄州尋改穎州禮部侍郎叅知政事陳堯佐罷為户部侍郎知永興軍樞宻副使禮部侍郎范雍罷為户部侍郎知荆南府尋改揚州又改陜州樞宻副使吏部侍郎趙稹罷為尚書右丞知河中府尚書右丞叅知政事晏殊罷為禮部尚書知江寜府尋改亳州初荆王子養禁中既長夷簡請出之太后欲留使從帝誦讀夷簡曰上富春秋所親非儒學之臣恐亡益聖徳即日命還邸中蘓轍龍川别志云張方平奉敇撰夷簡神道碑其家欲言協和二宫事方平於上前質其虚實上不喜曰吾不能復記此良乆乃曰明肅章惠嘗自言夢周王祐來告将託生荆王宫中時允初始生二后欲取入宫養之夷簡争之乃止上所言如此則夷簡協和兩宫信有力矣按允初卒於治平元年年三十七其初生當天聖七年方平撰神道碑不記此獨本傳有養荆王子禁中既長命還邸與蘓轍所記不同不知本𫝊何據竊疑蘓轍所記得實今姑從本𫝊帝始親政夷簡手䟽陳八事曰正朝綱塞邪徑禁賄賂辨佞壬絶女謁疎近習罷力役節冗費其勸帝語甚切帝與夷簡謀以耆竦等皆太后所任用悉罷之退告郭皇后后曰夷簡獨不附太后耶但多機巧善應變耳由是并罷夷簡及宣制夷簡方押班聞唱其名大駭不知其故而夷簡素厚内侍副都知閻文應因使為中詗乆之乃知事由皇后云中書侍郎兼兵部尚書平章事集賢殿大學士張士遜加門下侍郎昭文館大學士監修國史或説吕夷簡知士遜不如已故薦以自代使上思已復召用之案士遜先為相今但自集賢遷昭文史館耳恐好事者飾説今不取然士遜先為相夷簡實引之也資政殿大學士工部尚書判都省李廸以本官平章事集賢殿大學士翰林侍讀學士户部侍郎王隨為叅知政事樞宻直學士禮部侍郎權三司使事李諮為樞宻副使歩軍副都指揮使福州觀察使王徳用為檢校太保簽書樞宻院事始太后臨朝有求内降補軍吏者徳用曰補吏軍政也敢挾此以干軍政不可與太后固欲與之卒不奉詔乃止興國寺東火近張耆宅耆乞兵防䕶徳用不遣太后崩有司請衛士坐甲徳用曰故事無為太后䘮坐甲者又不奉詔上閲太后閤中得徳用前奏軍吏事竒之以為可大用故擢任樞宻徳用謝曰臣武人幸得以馳驅自效頼陛下威靈待罪行間足矣且臣不學不足以當大任帝遣使者趣入院權御史中丞蔡齊為龍圗閣學士權三司使事天章閣待制范諷為右諫議大夫權御史中丞時有飛語𫝊荆王元儼為天下兵馬都元帥者内侍捕得三司小吏鞫之逮及數百人帝怒使齊按之迹其所來無端而上督責愈急有司不知所為京師為之恐動齊曰此小人無知非有他意不足治且無以安荆王䟽一夕三上帝大悟止笞數人而已先是諷出知青州時山東旱蝗前宰相王曾家多積粟諷發取數千斛濟飢民因請遣使安撫於是以御史中丞召其在青州不逾嵗也降龍圖閣直學士工部郎中馬季良為濠川防禦使赴本州始太后疾加劇侍御史孫祖徳請還政已而疾少間祖徳大恐及太后崩諸嘗言還政者多進用庚申擢祖徳為兵部貟外郎兼起居舍人知諫院太常博士秘閣校理范仲淹為右司諫仲淹初聞遺誥以太妃為皇太后叅決軍國事亟上䟽言太后母號也未聞因保育而代立者今一太后崩又立一太后天下且疑陛下不可一日無母后之助矣時已删去叅决等語然太后之號訖不改止罷其冊命而已富弼墓誌云上悟止存后號而止恐當日刪去叅决等語未必縁仲淹奏䟽今且附見罷其册命此據歐陽修神道碑降殿中丞知吉州方仲弓為太子中舍監豐國監仲弓嘗請如唐武后故事立劉氏七廟太后讀其奏怒曰不作此負祖宗事裂而擲之猶用是得知州上以累更赦宥止薄責焉真定府定州路都監羅崇勲主仲弓者也亦降為鄂州都監其後復降仲弓為汀州别駕崇勲為太子右監門率府率永州安置再降乃七月戊子今并書之壬戌始御崇政殿改命張士遜為山陵及園陵使癸亥上大行太后諡曰章獻明肅追尊太后諡曰章懿甲子以京東飢募民入粟以賑之實録於七月乙酉又書今止一書五月丁夘判河南府泰寜節度使同平章事錢惟演言毋以子貴廟以親升蓋古今之通義也章懿皇太后輔佐先帝誕育聖躬徳冠掖庭功流宗社陛下感深罔極追薦尊名既復寢園將崇廟室謹按唐武宗韋太后以追尊升祔穆宗之室皇朝孝明孝章皇后並祔太祖之室懿徳明徳元徳並祔太宗之室今真宗一室止祔章穆皇后典禮未稱請俟園陵畢以章獻章懿皇太后並祔真宗之室詔太常禮院詳定以聞惟演既罷景靈宫使還河南不自安乃建此議以希帝意戊辰詔禮部貢舉始章懿太后疾東染院使張懐徳押醫官楊可乆等入侍己巳追貶懐徳為夀州都監可乆等皆坐黜罰辛未屯田貟外郎龎籍為殿中侍御史籍奏請下閤門取垂簾儀制盡焚之又奏陛下躬親萬幾用人宜辨邪正防朋黨勿使受恩人主歸感權臣進擢近列願采公論毋令出於執政孔道輔嘗謂人曰言事官多觀望宰相意獨龎君可謂天子御史也籍與馬絳並命今獨記籍癸酉詔曰大行皇太后保佑冲人十有二年恩勤至矣而言者罔識大體務詆訐一時之事非所以慰朕孝思也其垂簾日詔命中外毋輙以言始太后稱制雖政出宫闈而號令嚴明恩威加天下左右近習亦少所假借宫掖間未嘗妄改作内外賜與皆有節柴氏李氏大長公主入見猶服髲鬀太后曰姑老矣命左右賜以珠璣帕首時陳王元份婦安國夫人李氏老髪且落見太后亦請帕首太后曰大長公主太宗皇帝女先帝諸妹也若趙家老婦寜可比邪舊賜大臣茶有龍鳯飾太后曰此豈人臣可得命有司别製入香京挺以賜之賜族人御食必易以鉛噐曰尚方噐勿使入吾家也常服絁襦練裙侍者見上左右簮珥珍麗欲效之太后戒曰彼皇帝嬪御飾也汝安可學晚稍進外家任内官羅崇勲江徳明等訪外事崇勲等以此勢傾中外又以劉從徳故絀曹修古等然太后保䕶帝既盡力而帝所以奉太后亦甚備太后常命工為帝結珠鞍帝心不欲之然不敢毁以寘真宗神御殿其恐傷太后意如此及太后崩言者多追斥垂簾時事左司諫范仲淹言於帝曰太后受遺先帝保佑聖躬十餘年矣冝掩其小故以全大徳帝大感悟乃降是詔乙亥樞宻副使李諮起復丁父憂也詔諸路去年災傷流民許半年復業者更展百日限出内蔵庫緡錢三十萬下三司助山陵罷羣牧制置使時上封者言羣牧既自有使而武臣以樞宻兼制置事不時决故罷之景祐二年十月十三日復置丙子命宰臣張士遜撰耤田及恭謝太廟記以翰林學士馮元為編修官直史館宋祁為檢討官既而祁言皇太后謁廟事不可為後世法乃命止撰耤田記帝始召宋綬將大用之為張士遜所沮丁丑以綬為翰林侍讀學士兼龍圗學士判都省兼判太常寺知審官院閤門言命婦奏状乞於登聞皷院投下乞令本官勾當使臣㸔詳無違條貫具印状繳連於閤門承進從之景祐四年十月十六日張逸奏可考戊寅御崇政殿録繫囚辛巳叅知政事王隨入内供奉官鄧守恭江從瑩上淮南運河圗此事當考恐是随前奉使淮南被詔所經畫及執政乃上之也或與嵗末鹽運五利相闗置并州管界廵檢一貟詔諸州無同判處其當直司事同幕職官决遣之癸未詔審官院東西兩川人自今毋得任本路知州同判丁亥權御史中丞范諷請䨇日視朝詔俟章獻皇太后百日聽㫖蓋自太后崩上猶循故事惟隻日視朝也己巳詔曰敇令者治世之經而數動揺則衆聽滋惑何以訓廸天下天聖所修敇令既已頒宣自今有司毋得輙請删改有未便者中書樞宻院具奏聽裁庚寅許大名府立學仍賜九經從王曾之請也六月甲午朔日有食之丙申詔制置發運使副都監自今並滿三年從内侍鄧守恭之言也戊戌詔罪人令衆者自五月盡七月十一月盡正月特免之己亥免河北災傷下户今年夏税先是配𨽻罪人皆奏待報既而繫獄淹乆奏請煩數壬寅詔有司叅酌輕重著為令録周世宗及髙季興李煜孟昶劉繼元劉鋹後祠部貟外郎李溥為直集賢院溥進士第三人及第其性昏狂朝廷不以文翰任之至是乆次援例自陳執政特為之請乃始帖職議者不以為宜也癸夘詔御史中丞范諷天章閣待制王鬷右司諫范仲淹同審刑院大理寺詳定天下當配𨽻罪人刑名甲辰詔文臣待制武臣團練使以上遇大禮已嘗奏薦異姓者毋得再有陳乞禮賔使李用和未有宅詔寓館芳林園固辭不敢處丙午以惠寜坊第賜之辛亥太子少傅致仕孫奭卒帝謂張士遜曰朕方欲召奭遂死矣嗟惜者乆之罷朝一日贈左僕射諡曰宣奭性方重事親篤孝父亡䑛其面以代頮疾甚徙正寢屏婢妾謂其子瑜曰無令我死婦人之手也甲寅許著作佐郎張充于館閣讀書前詔罷館閣讀書充宰相李廸壻廸特為請之仍詔不得為例戊午減天下嵗所貢物仍令諸州毋得以貢餘餉遺近臣從侍御史知雜事李紘之請也初以錢惟演議下禮院禮院言夏商已來父昭子穆皆有配坐毎室一帝一后禮之正儀開元肅明皇后始有並祔惟演引唐武宗母韋太后祔穆宗孝明孝章祔太祖故事按穆宗惟以韋太后配更無别名太祖未嘗以孝章配伏尋先帝以懿徳配饗太宗及明徳園陵禮畢遂得升祔元徳自追尊後凡十七年始克升配今章穆著位長秋祔食真宗斯為正禮章獻母儀天下與明徳例同若從古禮止應祀后廟章懿帝母之尊與元徳例同便從升祔似非先帝謹重之意况前代無同日並祔之比惟上裁之詔都省與禮院議皆以謂章穆位崇中壼與懿徳有異已祔真廟自協一帝一后之文章獻輔政十年章懿誕育聖躬徳莫與並退就后廟未厭衆心按周禮大司樂職奏夷則歌小吕以享先妣先妣者姜嫄也帝嚳之妃后稷之母特立廟而祭謂之閟宫冝於太廟外别立新廟奉安二后神主同殿異室嵗時薦享用太廟儀别立廟名自為樂曲以崇世享忌前一日不御正殿百官奉慰著之甲令詔恭依己未權知開封府程琳内侍副都知閻文應度地營建新廟辛酉以天章閣待制王鬷為樞宻直學士知益州戍卒有夜焚營殺馬脅軍校為亂者鬷潜遣兵環營下令曰不亂者歛手出門無所問於是衆皆出令軍校指亂卒十餘人戮之及旦人皆不知也右諫議大夫知制誥知曹州李仲容在兩掖八年次當補學士而不為張士遜所喜秋七月丙寅加給事中改集賢院學士知宻州尋改汝州又改許州士遜罷乃入判史館仲容正𫝊云復知制誥誤也降前咸平太康縣駐泊廵檢右侍禁張孚為廬山縣兵馬監押坐用劄子奏事也故事在外惟兩府在京惟大兩省方許用劄子奏事他官皆上表状云己巳殿中侍御史叚少連言國家毎有大事必集議於尚書省所以博訪論議審决是非近詳定章獻明肅皇太后章懿皇太后升祔事而尚書省官有帶内外制或兼三司副使多移文不赴且帶職尚書省官皆一時之選宜有建明而反以職任自髙輙不赴集誠未副朝廷博謀之意請自今毎有集議其帶職尚書省官如託事不赴者以違制論從之甲戌以户部副使刑部貟外郎陳執中為天章閣待制京東災傷州軍體量安撫使用范諷之言也乙亥詔諸州自今考試舉人並封彌巻首乃委轉運司所部選詞學並公勤者為考試監門封彌官丁丑權鎮海軍節度推官張龜年為著作佐郎再知富平縣仍以其治行風告天下張龜年不知何許人薦之當考朔記云吏民詣闕舉留戊寅楚國大長公主卒追封晉國諡和静公主降柴宗慶性妬無子後十二年宗慶死以兄之子為後庚辰詔開封府界京東西河北河東陜西蝗其除民田租仍免差官檢覆亟令改之同判流内銓李紘言近敇臣僚奏舉幕職州縣官充京官令銓司勘㑹如已成資抽來磨勘如未成資即候成資欲乞並許抽來磨勘引見詔及六考已上者令銓司更不候成資抽來磨勘引見㑹要七月十七日事辛巳供備庫副使楊安節東染院使張懐徳並除名配𨽻廣南伎術人張永信杖脊至配沙門島婁文恭至配儋州又将内侍髙品陳思忠為西京髙品上清宫道士韓文成配廣南初章獻臨朝永信文恭挾妖妄因安節懐徳偽為禱祠以規取金帛文成亦因劉美家婢及思忠請託禁中至是有司𤼵其奸状故皆坐之癸未降知永興軍陳堯佐知廬州為狂人王文吉所誣也堯佐罷政過鄭文吉挾故怨告堯佐謀反上遣中官訊問復以屬御史臺中丞范諷夜半被㫖詰旦得其誣狀上之堯佐猶坐是左降時復有誣諫官隂附宗室者宰相張士遜置二奏帝前且言憸人誣陷善良以揺朝廷若一開姦萌臣亦不能自保帝悟寘文吉于法誣諫官事亦不下時孫祖徳知諫院范仲淹為左司諫不知宗室謂誰當考先是右司諫范仲淹以江淮京東災傷請遣使廵行未報仲淹請間曰宫掖中半日不食當如何今數路艱食安可置而不䘏甲申命仲淹安撫江淮所至開倉廪賑之絶禁滛祀奏蠲廬舒折役茶江東丁口鹽錢饑民有食烏昧草者擷草進御請示六宫貴戚以戒侈心又陳八事其一曰祖宗時江淮饋運至少而養六軍又取天下今東南漕米嵗六百萬石至於府庫財帛皆出於民加之饑年艱食如此願陛下裁造務後苑作坊文思院糧料院取祖宗嵗用之成數校之則奢儉可見矣其二曰爵不尚徳則仁者逺賞不以功則勞臣怨國家太平垂三十年暴歛未除濫賞未革近年赦宥既頻賞給復厚聚於艱難散於容易國無逺備非社稷之福願陛下無數赦必欲肆赦推賞求典禮而後行之一則不壊於法二則不傷於財且祖宗欲復幽薊故謹内蔵務先豐財庶於行師之時不擾於下今横為隳費或有急難將何以濟其三曰天之生物有時而國家用之無度天下安得不困江淮諸路嵗以饋糧於租税之外復又入糴兩浙一路七十萬石以東南數路計之不下三二百萬石故雖豐年榖價亦髙官已傷財民且乏食至於造舟之費並以正税折充又饋運兵夫給受賞與毎嵗又五七百萬緡故郡國之民率不暇給啇賈轉徙度嵗無還禆販之人淹遲失業在京𣙜務課程日削國家以饋運數廣謂之有備然冗兵冗吏㳺惰工作充塞京都臣至淮南道逢羸兵六人自言三十人自潭州挽新船至無為軍在道逃死止存六人去湖南猶四千餘里六人比還本州尚未知全活乃知饋運之患不止傷財其害人如此今且銷冗兵削冗吏禁㳺惰省工作既省京師用度然後減江淮饋運以租税上供之外可罷髙價入糴則東南嵗省官錢數百萬緡或上京實府庫或就在所給還商旅商旅通行則𣙜貨務入數漸廣國用不之東南罷糴則米價不起商人既通則入中之法可以兼行矣其四曰國家重兵悉在京師而軍食仰於度支則所養之兵不可不精也禁軍代回五十以上不任披帶者降為畿内及陳許等處近下禁軍一卒之費嵗不下百千萬人則百萬緡矣七十嵗乃放停且人方五十之時或有郷園骨月懐土之情猶樂舊里及七十後鄉園改易骨月淪謝羸老者歸復何託是未停之前大蠧國用既廢之後復傷物情咸平中揀鄉兵人無歸望號怨之聲動于四野祥符中選冗兵無歸之人大至失所此近事之監也請下殿前馬歩軍司禁軍選不堪披帶者與本郷州軍别立就糧指揮至彼有田園骨月許之歸農則羸老之人亦不至失所矣其五曰沿邉市馬嵗幾百萬緡罷之則絶戎人行之則困中國然自古騎兵未必為利開元天寳間牧馬數十萬匹禄山為亂王師敗於凾谷曾何救焉且騎兵之費錢糧芻粟衣縑之類毎一指揮嵗費數萬緡其間老弱者尚艱於乗跨况戰鬭乎然西北戎馬不可不收既至京師宜多鬻於民間假其芻牧或有邉用一呼可集又重税以禁江淮小馬勿使至近裏州軍則西北之馬可行外慰戎心内為武備且减芻秣以億萬計其六曰江淮發運司嵗漕六百餘綱省貟殿侍並以嵗勞改班行若國家稍節用度則可减綱運酬奨之人其押汴綱嵗改職者欲止賞以緡錢諸州軍都知兵馬使嵗滿敇攝長史司馬如實亷幹湏令知州通判同罪保舉方與班行武臣薦子弟善弓馬可任邉防明書筭可幹錢榖者並令引見試騐其能否若無取及年㓜者止與奉職殿侍而已其七曰百司流外日以増冗崇文院祕閣龍圗閣皆本朝所置又有昭文館集賢院各補書吏尚書省六官二十四司加以九寺又増三司禮部太常寺典禮樂又置禮儀院太常禮院刑部大理寺典刑法又有審刑院假如常帶文館職事者並以直崇文院及本院校討校理為名其諸館人吏一歸於崇文院而罷招置三五年可去其半舊二百人者今以一百人為額其餘並移補諸司其八曰真州建長蘆寺役兵之糧已四萬斛棟宇像塑金碧之資又三十萬緡施之於民可以寛重歛施之於士可以増厚禄施之於兵可以拓舊疆矣自今願常以土木之勞為戒上嘉納之仲淹正𫝊云上捄弊十事而不載事目今從附傳及奏議所上止八事而不知正𫝊何㨿也今不取四方館使連州刺史王克明者承衍孫章獻太后姪婿也嘗令人入禁中言太后有災當禳除之遂得白金百兩至是御史發之降克明為左武衛大将軍夀州都監丙戌徙知𨽻州夏竦知青州兼京東災傷州軍體量安撫使徙知陜州范雍知永興軍是嵗饑疫闗中為甚雍親為賑恤至是得疾去戊子詔以旱蝗作沴去尊號中睿聖文武四字告于天地宗廟令中外直言闕政李􅐉十朝綱要京東西河東陜西蝗食草木殆盡宋朝㑹要詔曰比年以来蝗旱作沴郡國交奏日月相仍豈朕徳之不明将天時之適爾夙夜循省咎實在予嚮縁大禮之成勉徇羣公之請増予以睿聖之號加予以文武之稱内惟菲凉非所堪克其去睿聖文武四字仍擇日告于天地宗廟仍令中外各直言極諫京東體量安撫使陳執中言饑民多流亡請擇少壮者一切募為軍部送京師如不願聽𨽻本城從之庚寅賜故知制誥陳知㣲母絹五十匹米五十斛仍令髙郵軍常撫存之舊制集賢院學士在京始給實俸於是李若谷以集賢院學士知江寜府而自請之壬辰詔在外者亦給遂著為令
