body:
  text: 續資治通鑑長編巻五十一宋李燾撰眞宗咸平五年春正月丁酉朔御朝元殿受朝環慶路部署張凝領兵自白豹鎮入蕃界焚帳族二百餘斬首五千級降九百餘人毁芻糧八萬獲牛羊器甲二萬慶州庫嘉們等族桀黠難制凝乗其不備擊破之始凝出師轉運使劉綜懼飛輓不給問計於凝凝曰今當深入因敵儲蓄可無慮也壬寅謁啟聖院太宗神御殿初太祖太宗每嵗上元歴幸佛寺然後御樓觀燈上自畢諒隂以啟聖院太宗降誕之地聖容在焉不欲為燕逰之所故前期徃拜至望夕乃幸他寺遂為定制令河北廣銳戍卒三十指揮還河東以穀價騰涌省饋餉也甲辰以右僕射張齊賢為邠寧環慶涇原儀渭鎮戎軍經略使判邠州令環慶涇原兩路及永興軍駐泊兵並受齊賢節度專為經略使自此始開寶八年九月癸巳以昇州東南路行營都監内客省使丁徳裕為常潤等州經畧廵檢使使名不專非事始也䕫州路轉運使工部員外郎直史館丁謂加刑部員外郎賜白金三百兩以其綏撫有方蠻人安堵故也丙午以西上閤門使孫全照為石隰州兵馬鈐轄屯綏州經度修城事調發兵夫二萬餘給其役時虢州團練使慕興為石隰州部署全照宻言於上曰興性率望詔令一依臣規畫上以全照素剛執而興臨事多自任慮其不協方委全照乃命客省使麟府副部署曹璨與興兩換焉興定州人也丁未以户部員外郎直史館曽致堯為邠寧等路經略判官賜金紫始張齊賢欲引致堯自助致堯謂齊賢曰西兵十萬王超既已都部署矣公徒領一二朝士徃臨之超肯從吾指麾乎吾能以謀付與超而有不能自將乎若不得節度諸將無補也齊賢且告於上詔經略使得自發諸州駐泊兵而已致堯既受命乃不欲行因抗䟽言宰相向敏中以非功德進官臣論其不可用今臣受命未有效不敢冒章紱之賜朝論疾致堯狂躁詔下御史獄鞫其罪責授黄州團練副使奪金紫按實録云致堯除判官中謝日即賜金紫俄抗䟽自陳王安石墓銘歐陽修神道碑並稱致堯先辭行召賜金紫遂云云似飾説也致堯以丁未日賜金紫戊申日奪之其抗䟽則不得其日然致堯方中謝時實未始辭行既受賜乃悔因抗䟽盖将以釣竒取名耳此朝論所以疾其狂躁也大抵碑銘譽致堯過當而國史毁之亦已甚今叅酌刪修龍川别志云命致堯副温仲舒安撫陜西致堯於閤門納䟽言仲舒不足與共事輕鋭之黨無不稱快李沆在中書不喜也因用他人副仲舒而罷致堯按國史實録則致堯所副乃張齊賢非仲舒也恐别志或傳聞之誤然所稱仲舒不足與共事疑致堯實指齊賢故國史實録云致堯詞㫖狂躁雖齊賢嘗薦致堯不當如此報之既云狂躁則反覆背恩亦未可知也齊賢竟罷經略並坐此故耶然致堯墓銘乃専論向敏中未嘗及齊賢也國史實録皆不詳其事今但從墓銘初慶州發兵䕶芻糧詣靈州殿中丞鄭文寶素知西邉山川險易上言必為繼遷所敗已而轉運使陳緯果歿于賊三年九月事賊進陷清逺軍四年九月事文寶時居母喪服未除即命相府召文寶詢其策略文寶因獻河西隴右圗且言靈州不可棄於是遣王超西討乃詔復文寶工部員外郎同勾當陜西隨軍轉運使事戊申吏部郎中直集賢院田錫權管幹當通進銀臺司兼門下封駮事後三日錫奏臣昨見差張齊賢充經略使曽致堯為經略判官鄭文寶為轉運使臣讀孫子兵書云不盡知用兵之害者則不能盡知用兵之利今未諭張齊賢曽致堯鄭文寶等盡知用兵之利害否若盡知利與害動無遺策方可委之經略邉事臣讀漢書髙祖稱運籌帷幄之中决勝千里之外吾不如張子房今宰相樞宻使是陛下運籌帷幄之臣不知曽議沿邉利害然後定差張齊賢等否昨楊瓊等不副陛下任使致失清逺軍糧草既委棄不少人民殺戮驅掠去亦不少今方當春時興發兵師雖救患防虞自合權變然聖人動必順時則天道助順今西戎為患非細陛下宜召宰相樞宻使更訪以决勝千里之外籌謀不得輕敵翫冦致西戎謂中國無人也若是宰相樞宻使面言不盡即令直書利害必然之計畫一申奏必然謂蕃人至若干月必退若干月必來其來必勝其來必敗也若宰相樞宻使有所見不同又不敢果决敷陳必然之策又忌見同列則乞陛下於便殿從上一二人獨召與語使盡其所見臣去年五月六日内殿起居所進轉對奏狀言宰相不諳綀邉事今乞陛下檢尋再披閲又於去冬所進御覽第二巻曽引杜牧注兵書序引宰相不知兵之説望陛下亦重子細披覽况禮云四郊多壘卿大夫之辱也今邉境被敵人侵擾宰相樞宻使不知以為辱乎不知以為恥乎若不以為辱又不知恥是孤負陛下任用是安於廟堂之上而不知危亂之將至也望陛下速宣召樞相逐一人人訪問所貴盡其所見免陛下宵旰之憂也臣之此言言出患入陛下若不宻即失臣矣據錫奏議自注云正月十五日上今附此戊申十二月也所稱去年五月六日轉對狀未見錫再掌銀臺每覽天下章䟽有言民饑盗起及詔敕不便者悉條奏其事上對宰臣稱錫為得争臣之體此據本傳壬子天賜州蠻向永豐二十九人來朝貢甲寅契丹貴將蕭繼逺親吏劉澄張宻挈其族歸順並補三班借職賜袍笏緡錢增置廣㨗兵五指揮先是太宗聞南方多以標槍旁牌為兵器命有司制之上即位令内臣蕭延皓取廣德兵教習之至是試於便殿頗精練上以為可用捕賊守隘故增置焉仍選神威等兵充其數順安軍都監馬濟言請自靜戎軍東擁鮑河開渠入順安軍又自順安之西引入威虜軍以資漕運仍於渠側置水陸營田以隔敵騎上曰此渠若成亦有所濟可從其請而徐圗之梁顥等自河北使還言民有食野生牢豆者因持以獻上謂輔臣曰此豆乾硬苦澀何可食也又聞乾寧定逺等軍積水蔽田亦無此豆可采蚩蚩之氓益可憫念乾寧惠民倉有粟萬餘斛頗資賑捄耳乙夘石隰州部署言李繼遷部下指揮使鄂朗吉等四十六人來附詔補軍主賜袍帯茶綵令石州給田處之丙辰翰林侍講學士邢昺講左氏春秋畢召宗室侍讀侍講學士王府官宴於崇政殿賜昺等器幣衣服金帯加昺工部侍郎上謂輔臣曰南北宅將軍而下可各選純儒授以經義庶其知三綱五常之道也己未邛州言兵沈興等二十六人謀叛伏誅癸亥改命張齊賢判永興軍府兼馬歩軍部署罷經略使之職史不載其故當考甲子陜西轉運使劉綜言訪聞遷賊蕃部於赤沙槖駞路各置㑹貿易深慮誘熟户叛渙請令本路部署潛軍討之上曰邉界市易徃來若不戒而殺是暴也宜先諭民以條約如有違者即嚴譴之乙丑免陜西去年逋租上對宰相吕䝉正等於便殿謂曰每嵗防秋全師聚于定州此國家舊制也若散屯士馬分路進討又恐兵力不一難遏賊鋒去嵗㑹兵列陣逼近邉陲議者又稱飛輓芻粟不易偕行朕每遇將臣未嘗不與細論利害然多是衆所共知及已行之事未有能出竒策者國家兵甲之數卿等具知今已復春時汲汲經營至將來猶慮不及中書樞宻院可各述所見具今嵗防邉宜如何制置條列以聞丙寅正月三十日此㨿田錫奏議權管幹通進銀臺司兼門下封駮事田錫言臣今月二十五日所進實封為覇州乾寧軍死傷人户等自二十六日至今又據莫州奏餓殺一十六口滄州奏全家餓死一十七户雖有指揮下轉運司相度及减斛斗價賑糶即未見别行指揮若有司只如此行遣實未稱陛下憂勞之心也陛下為民父母使百姓餓死乃是陛下孤負百姓也宰相調燮隂陽啟導聖德而惠澤不下流王道未融明是宰輔孤負陛下也今陛下何不引咎如禹湯罪已略降德音下饑餓殺人處州府使民心知陛下憂恤然後賑廪給貸以救其死若倉廩虚而饋運邉備尚未足即日無可給貸則是執政素不用心所致昔伊尹作相恥一夫不獲今餓殺人如此所謂焉用彼相今陛下可將此事以理道略面責宰臣以下觀其何詞以對視其有無怍色有無憂色待三日後或浹旬以來不上表待罪不拜章求退是忍人也何良相之為乎既非良相而猶用之則是陛下不以百姓心為心也若不别進用賢臣臣恐危亂之萌將來滋蔓難圗也語云十室之邑必有忠信况今皇家富有萬國豈無人焉可於常叅官自來五日一轉對中觀其所上之言有逺大謀略經綸才業者可非次擢用若有其言而無其實退之以禮亦合理體不然則臣恐國家未能早致太平也豈唯太平之未能致其憂患不獨在邉防而叛亂在内地也此是陛下纘嗣先帝萬世基業之急務也所急之務莫先於此惟聖聰睿鑒詳㣲臣之言且可先降德音以禹湯責躬之意謝天以堯舜至仁之心待下使饑餓地分知陛下憂恤之心也錫自注云正月三十日奏今附本日二月戊辰遣中使詣雄覇瀛莫深滄州乾寧軍為粥以賑居民京城衢巷狹隘詔右侍禁閤門祗候謝德權廣之德權既受詔則先撤貴要邸舍羣議紛然有詔止之德權面請曰今沮事者皆權豪輩吝屋室僦資耳非有它也臣死不敢奉詔上不得已從之德權因條上衢巷廣袤及禁皷昬曉皆復長安舊制乃詔開封府街司約逺近置籍立表令民自今無復侵占㑹兇人劉􅁮僧澄雅訟執政與許州民隂搆西戎為叛者詔温仲舒謝泌鞫問德權監之既而按騐無狀翌日對便殿且奏其妄泌對曰追攝大臣獄狀乃具德權叱之曰必欲陷大臣耶若使大臣無罪而受辱則人君何以使臣臣下何以事君仲舒進曰德權所奏甚善上乃可之不知大臣謂誰今姑從本傳温仲舒時為禮書知開封謝泌去年十二月以主客郎中知登聞院今年春同知貢舉四月知銀臺司仲舒及泌鞫獄乃令德權監之未詳庚午户部使右諫議大夫王子輿奏事長春殿疾暴作仆地命中使掖之至第而卒上甚悼焉賻贈加等以其子道宗方幼詔三司判官朱台符撿校其家子輿止一子而三女皆未笄道宗尋卒家屬寓居楚州子輿妻劉還父母家子輿猶旅殯京畿後五年從弟上言願借官船載柩還鄉里鬻京師居第以錢寄楚州官庫備三女資送上憐而許之癸酉詔比司帑廩者多收羡餘以為課績盖出納之際有所重輕此可責而不可奬也宜令有司嚴加戒勵無使復然三司常言衣庫副使焦守節監香藥搉場院嵗課増八十餘萬當遷閤門副使上謂輔臣曰守節縁財利羡餘而遷横行何以勸邉陲効命者止以為宮苑副使孫全照至綏州乃言築城非便朝論亦多異同丁丑詔知天雄軍工部侍郎錢若水與并代鈐轄陳興乗傳詳度之儻有所利急令施功如其不然即可罷役先是契丹入冦前陣保州招收小校觧恕楊光美齊巒等奮不顧身摧鋒陷陣及大軍分退猶依山據險大詬殺賊以至䧟沒上嗟憫之優恤其家仍録其嗣己夘以折中芻糧事繁置原州通判一員知鎮戎軍李繼和上言昨自天麻川殺葉勒族後近界蕃部頗甚震懾即今自本軍西隴山外五百里已來諸族皆乞㸃集軍馬各於蕃界建立寨栅戍守要害然戎人之性本無仁義既資德澤亦用威懷若遷賊奔衝本軍量加殺戮則威令必振此輩益思助順如稍落奸計及被圍三五日出兵不及或抄取十族五族熟户則此輩亦因而解體豈復有連衡之心臣愚以為國家事勢宜令邉冦每來百里之外先懷畏怯一舍之間即須敗衂豈宜使目覩城隍更加攻守臣以為若移涇原一路部署於本軍屯戌最為利便何者蕃賊來徃急於風飈既兵數不充則難於接戰若兵衆力敵急於交鋒乗其困乏决可圗㨗勝又屯兵之所以糧薪水草為先今本軍薪水豐饒他處又部署司在此即内地州郡可减戌兵然後請移涇原儀渭隴五州二税及邠寧涇原儀渭州商旅入中併於環慶及本軍三處充贍芻糧又環州至本州裁五百里請於本軍熟户中開路直抵環州不過三百餘里如兩路有急便交相應援賊若輕來抄掠則本路部署司與州兵可同掩擊如賊稍衆則不踰旬日兩路可以㑹兵用此枝梧理無不勝更請於環慶開路以逹延州則横亘千里可以互相照應况延州去石隰去麟府各不至逺請令潛相期約遞入賊境使其疲於奔命則彼將自救不暇安能更犯疆場吞併蕃部如此則三二年間加之水旱衆心必離因而披攘則何冦不摧何賊不滅矣上曰繼和此奏頗亦盡心然其欲開環慶諸路相應慮僻逺難行也代州民李緒有罪亡入敵境州捕其家屬赴闕上曰聞緒本邉民頗有貲蓄儻行籍沒之法則緒無由歸况其罪亦未合縁坐亟遣還本州乙酉詔戍邉軍士疾病并戰沒者春冬衣聽給其家除果州官邸店本課外地鋪錢丁亥髙陽闗都部署殿前都指揮使保靜節度使王漢忠來朝己丑以漢忠為邠寧環慶儀渭州鎮戎軍兩路都部署東上閤門使李允正為鈐轄如京副使宋沆為都監領戍兵二萬五千人委漢忠分道控制詔除合州赤水巴川二縣長利謝市樓灘三鎮酒税錢以經冦殘弊也庚寅西面部署司請以涇原環慶騎兵之半易河北歩兵上曰西面惟涇原鎮戎軍川谷稍寛平餘多山險非騎兵所宜也即從其請甲午審刑院上秦州私販馬條例自今一疋杖一百十疋徒一年二十疋加一等三十疋奏裁其馬納官以半價給告事人從之先是侍御史知雜事范正辭嘗請於西北邉市馬樞宻院言冐禁不可許詔特以廐馬賜焉三月丁酉朔詔吏部選人憂制闕者並放選著于令己亥京西轉運使張巽言襄州置營田務煩擾非當詔罷之縱民耕蒔癸夘以右諫議大夫宋太初權管勾御史臺事時中丞趙昌言知雜御史范正辭坐事被劾故也先是案劾有罪必預請朝㫖太初以為失風憲體獄成然後聞上時論韙之甲辰御史臺上言右諫議大夫王化基先權中丞正衙常叅立中丞塼位内殿起居日立本官班今宋太初以右諫議大夫權臺事請定班制詔如化基例河北轉運使耿望言准詔開鎮州常山鎮南河水入洨河至趙州功畢詔褒之西京左藏庫使舒知白請於泥沽海口及章口復置海作務造舟令民人入海捕魚因察平州機事異日王師征討亦可由此進兵以分敵勢上曰此事朕屢嘗詢訪先置此務已云非便即廢之盖近海小民翻與戎人徃還數年前敵泛舟直入千乘縣亦疑有鄉導之者然何承矩近亦有此規畫宜下本路轉運司條上利害既而以為非便卒罷之知白元子也元見乾祐元年李繼遷大集蕃部攻陷靈州知州内客省使順州團練使裴濟死之濟在靈州凡二年謀輯八鎮興屯田之利民甚頼焉及被圍餉道絶孤城危急濟刺指血染奏求救大軍訖不至城遂陷戊申西面部署司以聞宰相等上表待罪詔慰諭之己酉以馬歩軍都虞候王超為永興軍駐泊都部署冀州團練使石普副之徙永興軍駐泊鈐轄六宅使順州刺史康繼英為慶州駐泊鈐轄與西面縁邉迭為應援入内副都知秦翰為環慶涇原兩路鈐轄與王漢忠李允正同其事備賊兵之侵軼也始超等至環州或云靈武已陷沒鄭文寶乃易冠服引單騎冐大雪間道抵清逺故城盡得其實遂奏班師庚戌比部員外郎直史館洪湛削籍流儋州工部尚書兼御史中丞趙昌言膳部郎中兼侍御史知雜事范正辭並削一任昌言責授安逺行軍司馬正辭滁州團練副使推直官殿中丞髙鼎主簿王化並削兩任鼎責授蘄州别駕化黄州叅軍先是有河隂民常德方者訟臨津尉任懿納賄登第下御史臺鞫得懿欵云咸平三年補太學生寓僧仁雅舍仁雅問懿就舉有知識否懿曰無仁雅曰我院内有長老僧惠秦者多識朝貴當為道逹懿署紙許銀七鋌仁雅惠秦私隱其二易為五鋌惠秦素識王欽若欽若時已在貢院乃因欽若館客寗文德僕夫徐興納署紙欽若妻李氏李氏宻召家僕祁睿書懿名於睿左臂并口傳許賂之數入省告欽若及懿過五場睿復持湯飲至省欽若遣睿語李氏令取所許物懿未即與而懿預奏名登科授官未行丁内艱還鄉里仁雅為文德惠秦輩所廹馳書河隂形於詛詈德方者賣卜縣市獲仁雅書以告昌言且得其事白請逮欽若屬吏先是欽若為亳州判官睿即其㕔幹及代歸以睿從行雖久事欽若而未除州之役籍貢舉事畢㑹州人張續還鄉里持服欽若託為睿解去名籍至是欽若自訴云睿休役之後始傭於家而惠秦未嘗及門欽若方被寵顧上謂昌言曰朕待欽若至厚欽若欲銀當就朕求之何苦受舉人賂耶且欽若纔登政府豈可遽令下獄乎昌言爭不能得乃詔翰林侍讀學士邢昺内侍副都知閻承翰并驛召知曹州工部郎中邉肅知許州虞部員外郎母賔古就太常寺别鞫得懿欵云有妻兄張駕舉進士識湛懿亦與駕同造湛門嘗以石榴二百枚木炭百斤饋之懿之輸銀也但慿二僧逹一主司實不知誰何至是昺等縁懿識湛以為湛納其銀湛適使陜西中途召還時張駕已死寗文德徐興悉遁去欽若近叅機務門下僕使多新募置不識惠秦故無與為證又欽若固執知舉時未有祁睿而懿欵已具遂以湛受銀為實議法當死特貸之懿杖脊配𨽻忠靖軍惠秦坐受簡及隱銀未入已以年七十餘當贖銅八斤特杖一百黥面配商州坑冶仁雅坐詛詈懿杖脊配𨽻郢州牢城是獄也仁雅雖坐詛詈懿索銀而不窮用銀之端初王旦與欽若知舉出為同知樞宻院事以湛代之湛之入貢院懿已試第三場畢及官收湛贓家實無物湛素與梁顥善假顥白金器乃取顥所假者輸官昌言等皆坐故入并及於責此叚實録所書專為王欽若諱今用司馬光記聞及欽若新傳修入甲寅詔鄭曹滑州今年秋税及去年逋租毋得科折己未上親試禮部舉人得進士益都王曽以下三十八人九經諸科百八十一人並賜及第以曽等五人為將作監丞通判諸州餘及九經為大理評事知大縣諸科判司簿尉先是貢舉人集闕下者萬四千五百六十二人命吏部侍郎陳恕知貢舉恕所取士甚少以王曽為首及是糊名考校曽復得甲科時議稱之舊制試經科復舊場第始議進退恕初試一場即按通否去留之以是諸州舉送官吏皆被黜責譴累者甚衆江南恕鄉里所斥尤多人用怨讟競為謡詠譏刺或刻木像其首塗血擲於庭又縛葦為人題恕姓名列置衢路過輙鞭之辛酉以環州蕃部都虞候王延順為本州馬歩軍都指揮使延順頗知蕃落間事或有訟訴輒先詣其居官吏多詢之然後裁决至是石普等上言請授供奉官兼蕃落監押上曰延順本部民一旦擢為廷臣使與本州抗禮恐難制也故命以都校癸亥遣使祭靈州陣亡將士贈裴濟鎮江節度使賵賻加等以其子國子四門助教德昌為太子右贊善大夫德基為著作佐郎德豐為太常寺太祝又以其兄信為太子左内率府副率致仕實録稱環州陣亡將士誤也今從本紀張齊賢上書曰今朔方陷沒所慮縁邉蕃族中有從來二心者因此轉更扇惑熟户致令向背賊遷因而乗之為患非淺則邉上要害城鎮且湏留兵鎮守以安蕃漢人心環州至慶州中間黙伯馬嶺以來城寨全然不堪今冬以前湏與修葺鎮戎軍以南髙店瓦亭雖近修完皆非固守之處彈筝峽内望早經度就可控扼處置一寨今朝那修寨處如堪守把即乞特令如法添修其潘原縣正當小爐谷蕃賊來路人户甚多亦乞特發兵民牢固修葺及掘斷谷口路若邉上城鎮各有屯兵要害處城寨又皆牢固遷賊醜類自然息心兼聞近年麟府縁邉失於撫御大族蕃部多已歸投繼遷如此則二三年間麟府州界蕃漢人户漸更衰耗只如朝廷每年買馬不補死數西北未平戰馬為急舊日女真賣馬嵗不下萬匹今已為契丹所隔臣聞賊遷聲言向西凉云我與彼蕃自來無事盖為萬山潛發人徃彼萬一實有此言若不和誘西凉以防後患即必今年秋冬來刼鎮戎軍蕃部若斷却六谷入京道路即大梁小梁蕃部無路向化以至隴山後蕃族勢亦難保臣昨於縁路見勾囬渭州賜六谷分物不覺寒心何者蕃部族盛兵多可以牽制遷賊者止一西凉而已不知何人畫謀恩澤已行為之中輟且西凉蕃部多是華人子孫例㑹漢言頗識文字渭州徃來與通事輩宻熟豈不知有此給賜已到渭州又却勾囬蕃部貪財尤重誠信朝令夕改豈可忽諸伏望深思邉計斷自宸衷結其歡心㗖以厚利但是西蕃馬價比常時特與優饒至於酒饌特設務令豐足内為戰守之計外加撫綏之恩西凉與近西小蕃惟恃賣馬獲利既受朝廷恩信縱被遷賊阻絶道途固當深結讎怨使之自戰其理甚明若不早加防虞即鎮戎軍亦恐難於固䕶矣夏四月丁卯宻本族開道使費州刺史尼瑪遣其子沁布入貢上嘉尼瑪數與遷戰鬬有勞授錦州團練使以其族弟吹資克為懐化將軍充本族指揮使沁布為歸德將軍充本族都廵檢使又令沁布籍其族酋長之數以聞出空名指揮使宣十五道軍主宣三道委知鎮戎軍李繼和填名給之己巳以捧日左廂都指揮使朱能為懷州團練使右廂都指揮使安贇為博州團練使天武左廂都指揮使元澄為瀛州團練使右廂都指揮使鄭誠為保州團練使殿前指揮使左班都虞候耿斌為雄州刺史右班都虞候周緒為濵州刺史並罷軍職尋以贇知貝州能知洺州澄知莫州誠知趙州斌知深州緒知冀州悉兼本州部署先是上謂輔臣曰元澄鄭誠耿斌人多稱之朕嘗召語觀其詞氣若有志操周緒亦頗知名止在宿衛無以見其才宜授郡符試之邉任庶盡其所長朱能安贇位元澄鄭誠之上素無能譽然不欲遽加罷斥姑例與遷擢如實不堪退亦未晚故並命焉朱能未詳贇太原人元澄未詳誠鄢陵人斌信都人緒真定人也庚午上謂知樞宻院周瑩等曰國朝之制軍職有闕但權領俟三歲乃一遷補未及期以功而授止奉朝請而已今闕員處多之人部轄須當亟與遷補即命瑩等按籍遞遷其屯戍於外及軍額在下素不該恩例者亦溥及之凡再旬而畢辛未濵州言學究冦賔王以粟三千斛賑饑民授試大理評事錢若水上言綏州頃為内地民賦登集尚須旁郡轉餉自賜趙保忠以來户口凋殘今欲復城之用工計百餘萬又湏廣屯戌兵倍于曩日且芻糧之給全仰河東其地隔黄河及大小鐡碣二山又城下有無定河緩急用師輸道艱阻且其城無險若修葺未備蕃冦奔衝則難於固守况此州城邑焚毁無尺椽片瓦所過山林無巨木不堪采用徒為煩擾絶無所利已罷其役若水復詣闕面陳其事上甚嘉納初若水率衆過河分布軍伍咸有節制深為戌將所服上知之謂左右曰若水儒臣中知兵者也尋復遣若水廵撫陜西沿邉諸州聽便宜制置邉事及還拜鄧州觀察使徙工部員外郎同勾當陜西隨軍轉運事鄭文寶為河東轉運副使代太常博士施䕶以䕶為陜西轉運副使時文寶議再葺清逺軍環慶涇原都部署王漢忠言其好生事上以文寶生事無顯狀止令䕶換任焉施䕶未見以知鎮戎軍李繼和兼涇原儀渭駐泊鈐轄初繼和慮緩急統帥不為應援累請濟師故令兼領四州兵其鎮戎戍卒部署亦摠之詔陜西民輓送縁邉芻糧者賜田租之半按宋史本紀載壬申詔陜西民輓送縁邉芻糧者賜租之半此載辛未日下疑脱去壬申二字癸酉命田錫以本官兼侍御史知雜事仍遣中使諭㫖曰卿每上章䟽所司不敢滯留朕皆一一親覽知雜之任朝廷甚難其人故以命卿仍不妨徐徐撰述或有見即具奏聞上封者言御史臺推直推勘官大理寺詳斷官皆本司長官奏薦糾按讞獄之任當防朋比丙子詔兩司官屬有闕令兩省五品以上保舉以聞丁丑知益州馬知節言州兵有不從王均為亂而能殺賊者已賜名忠勇升為禁軍而月給仍舊請選留其才勇者餘復退為州兵上曰此輩既名忠順安可斥退詔増其廪給如禁軍例又請令西州官吏勿留東人從之庚辰詔邉臣日具契丹事宜飛驛以聞三日遣指揮使臣入奏懲威虜斥堠之不詳故也壬午詔三司自令收掌簿書無使亡失其天下錢穀大數毎年比較於次年條奏先是詔取天下民籍户部不知其數及考其盈虚又稱亡失簿書故申警之仍令取天下户口見數置籍校定以聞甲申以殿前都虞候王繼忠為髙陽關行營副都部署乙酉鄆州城畢以知州右司諫姚鉉為起居舍人直史館京東轉運使奬其勞也時沿邉大浚河渠契丹頗撓其役又自威虜軍西入冦詔知雄州何承矩出兵以分其勢承矩慮敵知兵自本郡出即來修怨乃以無騎為辭止應詔遣小校楊萬金率卒五千自順安軍東出混泥城稱衆寡不敵而還上謂宰臣曰太宗朝翰林天文官孫士龍嘗請於北邉置方田及令民䟽溝塍可以隔礙戎馬當時為衆議所沮近有殿直牛睿者又言其事於卿等意何如呂䝉正對曰太宗已命方田使副而中外咸以為動衆勞費恐無所利當時武臣輩亦恥於營葺遂罷之上曰今若行此亦制敵之長策然河朔屢有差役不可重勞宜喻有司徐經度之丙戌賜深覇等九州民租有差水故也上以檢覆擾民俟奏稽緩但量其所傷而優復之戊子江南轉運使刑部員外郎直史館陳靖入奏賜金紫江南自李氏横賦於民凡十七事號曰沿納國朝因之而民困不能輸靖極論其弊詔為罷其尤甚者數事吏部郎中兼侍御史知雜事田錫言臣昨蒙聖恩授以憲職按六典及百司舉要御史臺故事自大夫中丞以下及三院御史沿革各有人數今闕班簿既無定員有侍御史三人有殿中侍御史一十二人有監察御史七人除邵曄在省司及施謂在患假餘皆差使在外却以他官在臺臣謂今之推直官僚乃是古之知推御史按唐㑹要興元元年敕知東推西推侍御史各一人臺司請令第一殿中同知東推第三殿中同知西推仍分日受事先所置推官二員請停又建中三年臺司奏其知推御史差使改移舊例有推直官今請置兩員與本推御史同推敕㫖依奏此盖隨時沿革因事廢興也今三院共有二十一人或命親民或委釐務憲司之職似是而非朝廷用人如此未審又准近敕臺寺勘斷官令大兩省已上保舉臣謂雖令保舉終是他官臣昨在銀臺司見諸道轉運司或廵撫使察訪外任京朝官功過具姓名聞奏有中書劄子下審官院今欲乞指揮審官院檢前後中書劄子應三院御史二十一人中曽有貪猥過犯者不得令在憲秩可改授他官其有清慎勤幹者不得令在外官可詔歸本職去推直因仍之號抽兩省保舉之敕所貴復臺司之故事存朝廷之舊規使百執事各正其名羣有司各親其職也錫奏議自注云四月二十三日上今附本日按錫以三月十二日授知雜御史己丑擇三班使臣熟西鄙山川要害者自秦州入蕃界招馬時或言縁邉有路可入夷落因遣視之也詔近日審刑院刑部大理寺每連署奏議不能執正多所依違且法憲之司選才而授委之叅讞當事詳明自今并須結奏癸巳以金明縣都監兼新寨解家河盧關路都廵檢供備庫使李繼周為西京作坊使永平寨界茭村軍主歸德將軍李繼福領順州刺史永平寨界小力鎮使李文真成平鎮使葉勒文義並為懷化將軍繼福等皆党項蕃族與繼周同嚮化故優寵之契丹新城都監种堅移文境上求復置㩁場朝議以敵情翻覆未之許知雄州何承矩繼以請且言㩁場之設盖先朝從權立制以惠戎人縱其渝信犯邉亦不之廢戎退商行似全大體今縁邉搉場因敵騎入冦即已停廢去嵗以臣上言於雄州置場賣茶雖貲貨並行而邉氓未有所濟望延訪大臣議其可否或文武中有抗執獨見是必别有良謀請委之邉任使施方略責其成功茍空陳浮議上惑聖聰只如靈州足為證騐况兹北敵又非平夏之比也於是聽雄州復置搉場承矩本傳載承矩請復置搉場與三年所上同一䟽按䟽指靈州為證若三年則靈州猶未陷沒豈當預言乎今移入此年庶免牴牾
