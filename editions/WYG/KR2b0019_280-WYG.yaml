body:
  text: 續資治通鑑長編巻二百七十六宋李燾撰神宗熈寧九年六月乙酉朔廣南東路轉運使陳倩言乞選差經水戰兵官以備舟師攻討詔師期不逺若自朝廷選人即已趨赴不及其令招討司選差及更博訪舟師利害施行二月四日蔡承禧言陳倩精神昏昧乞選材臣為代從之今倩居官如此則是承禧所言初不行實錄誤也又詔築邕州等要害城寨以峙芻糧又詔茂州事宜已得平安前此鈐轄司日奏平安可罷之此據御集可見後來王中正生事故具存之丁亥知太原府韓絳言河東夏秋大熟乞以封樁錢帛預散於民候收成入栗於緣邊次邊詔聽以一半配糴詔安南行營軍士如疾病將官宜親撫視嚴責醫療逐將月具平安及疾病死亡人數以聞詔成都府路邊事鈐轄司專制置梓州路轉運司與鈐轄司制置利州䕫州路轉運司與駐劄路分都監司同制置並許一面那移軍馬如邊事大須合鄰路兵力即利夔州路各申鈐轄司安南宣撫司言已差桂州都監儂宗旦等同㸃集右江丁壯討捕劉紀又差左第二副將曲珍都大提轄團結訓練詔儂宗旦雖乞自效頗見忠勇然有諸子見歸劉紀恐或懐去就可更選有謀畧使臣一員與宗旦等同將領仍令曲珍提轄軍行日給糧錢千或慮路費不足若作軍人日給口食不便即比類軍人給錢米務令充足其峒將首領至時有懐貳不伏㸃集及丁壯㸃集之後故有違犯即以軍法施行王安石言曲珍西人恐未諳溪峒情偽乞用温杲參制之不許他日上謂安石曰宣撫司言兩江溪峒不可令且附賊大是温杲之言大非安石曰方官軍未到雖不令附賊安能禁其附賊既不能禁其附賊因喻之使不反側堅心附賊又或為内應此不為失策上曰既附賊便為賊質其老弱反為賊用安石曰賊力能如此我雖不指揮安能禁其如此上曰不指揮即却不敢全附賊安石曰彼力能制兩江我又不能救則兩江何為不附賊上曰不如團結安石曰固已令團結上曰宣撫司自要團結温杲乃以為非曲珍向是西人却便入得兩江温杲與溪峒十親九眷却不敢入安石曰温杲事初便要去團結兩江深入攻交趾上曰何不去安石曰後來邕州破去未得杲初去時自云若邕州已破即去未得上曰杲何故云團結不得安石曰杲云人方耕作又無食所以難團結後來朝廷令厚給彊壯又賑贍老弱如此而温杲尚有言以為不可乃有罪初不如此而言難團結杲有何罪上曰宣撫司要支與錢米安石曰温杲來説難團結時未見説支錢米王韶言昨遣种諤時欲及春末夏初且攻擾交趾取其側近州峒至冬宣撫司往乃易為力上曰兵何由到得安石曰臣初以為賊尚攻邕州未下其國空可輕行襲滅則入冦之兵不攻自破後來邕州已破則襲滅之事更不可言然當交趾乾德初立州峒各欲内附此事不過募二萬精兵擇五六中材之將必了得交趾竊恐當時料有今日之不軌則亦不惜一舉四夷事若不圖大於細為難於易則勞師費財固其所也上曰前代興王欲有為須先練兵而後動安石曰舉事則材自練若不舉事亦難練兵但日夜教之坐作挽射不知遇敵氣果如何但舉事使嘗之而有功則人材不材自見材者見賞拔則不材者亦奮矣上曰舉事亦須自家兵馬可用若宣王征玁狁其飭治車馬如何也又須度力所可能勝安石曰譬如乾德初立時用二萬精兵足了以中國之衆募二萬人精兵豈患無之擇五七中材將帥亦豈患無之一舉滅交趾則威立矣以嘗勝之衆布之陜西則陜西之兵人人有勝氣以其氣臨夏國不足吞也吞夏國則中國之氣孰敢干撓此日錄六月六日事今附此諭溪峒今且附賦乃四月十九日事五月八日諭劉紀亦同此意是日上為王安石言熈河探報夏國欲用十二萬人取熈河六萬拒漢兵來路六萬攻取果如此奈何安石曰熈河城必非一日可拔夏國縱無後顧不知十二萬人守熈河幾日自來夏國大舉罕能及二十日熈河雖乏糧亦皆有半年以來枝梧恐無足憂者且夏國非急廹安肯出此出此則絶歲賜致諸路攻擾有何所利戊子供備庫副使張逖為西京左藏庫副使前乾寧軍司理參軍張適為大理寺丞逖等以外都水監丞程昉上修滹沱河及淤田之勞也㑹要云修滹沱河功畢詔比部員外郎權同判都水監劉璯減磨勘三年故工部郎中都水監侯叔獻長子上高縣尉時中與循一資以聞丁字河功畢也然河成而舟不可行尋復廢之於是王安石為上推言叔獻公忠盡力不忌能可倚仗以事俟淮南運河打量退出田即具前後功狀乞贈官上曰贈官殊無實利不如更推恩其家也究竟當考滄州言第九將下押隊下班殿侍朱琪與界河賊船鬬敵斬首十三級射賊五人墮水長行趙友等十二人殺賊有功詔朱琪轉三班借職趙友等各轉資每級賞錢六十千巳丑成都府利州路都鈐轄司言綿州都監王慶等救援茂州戰没詔王慶給賻外女俟出嫁夫與奉職子婦若生男與借職生女亦俟出嫁夫與借職崔昭用子瑾與奉職璘借職劉珪子仲安與奉職永安借職白身没陣二人王禹錫及崔昭用壻各賜其家錢五十千左侍禁張義有功没陣與贈官子宗望宗保及女俟出嫁夫並與借職劉珪初見六月五日又見十月十二日辛卯給事中知陳州吕惠卿奏往者鄧綰言臣丁憂日託張若濟貸部内錢聞推究所窮究首尾七月乃畢今朝廷復差蹇周輔推鞫其初遣使之指事本緣臣臣事既明更為何人置勘周輔乃綰鄉人嘗為御史推直官不惟有嫌於法亦礙乞别選官置院詔屯田郎中新權發遣秦鳳路提㸃刑獄李竦與蹇周輔同推鞫初以惠卿奏進呈王安石曰徐禧本惠卿所薦自布衣不旋踵為美官尹政亦惠卿與章惇所奬擢因何不言恐人疑其不盡今乃言周輔不可用不知周輔有何嫌上曰惠卿言綰已是罪人難更用其言安石曰綰為言事官縱不實無罪上曰綰言借錢事亦已有不實安石曰綰以根究為未實即未見其為罪况言事官許風聞言者自有主名安可遽以罪綰上曰惠卿必緣罷却温卿故云爾上又曰惠卿言觀宰臣氣焰必欲致臣於死於是安石因請改差人上難之安石請添差一人上許之遂以命竦安石既與惠卿交惡令徐禧王古等按華亭獄不得惠卿罪更使周輔按之安石子雱猶恐弗得切責練亨甫吕嘉問亨甫嘉問共議取鄧綰等所條惠卿事雜他書下制獄安石初不知也惠卿素結堂吏吏遽告惠卿於陳惠卿即自訴且訟綰及安石前後凡數十紙其略曰綰等入奏中書出敇如出一口又曰夕出於有勢之口朝書於言者之奏又曰安石盡棄素學而隆尚縱横之末數以為竒術以至譖愬脅持蔽賢黨姦移怒行狠犯命矯令罔上要君凡此數惡力行於年歲之間莫不備具雖古之失志倒行而逆施者殆不如此平日聞望一旦掃地不知安石何苦而為此也謀身如此以之謀國必無逺圖而陛下既以不可少而安之臣固未易言也雖然安石忌臣之心有甚而無已故其所為無所顧藉又曰今中書乃用罪人綰等之誣辭出降敇命又曰匿其忮心託情小事以脫誤詔令之出此皆姦賊之臣得以擅命作威於闇世者也奈何安石今日之所為乃與之同事耶又曰安石矯誣敇命以令勘官又曰前之矯誣必當彰敗又曰陛下既令安石任政若至於此而不稍裁抑猶恐非長久之道又曰安石必不敢以此為名而求去若以此求去是敢以不義要陛下也其可從乎又曰陛下平日以如何人過安石安石平日以何等人自任不意窘急乃至於此又曰君臣防閑豈可為安石廢也又曰臣之所論皆中其肺肝之隱上既以惠卿所訴事示安石安石謝無有歸而問雱雱乃言其情安石始咎雱雱先病疽忿恚增劇而嘉問等相繼得罪安石由是媿上數求去上待安石自是意亦稍衰矣惠卿訐綰及安石語據陳瓘尊堯集及尊堯餘言惠卿家𫝊云前後十四章自辨已附注五月十四日六月十三日罰吕嘉問等發李竦九年五月十九日以屯田郎中通判和州差權遣提㸃秦鳳刑獄十年四月八日乃改福建運副朱本於正月二十七日便云福建運副誤也御史中丞鄧綰言吕惠卿罪惡之人近因朝廷差官按治抗章自列尚敢凌蔑陛下股肱耳目之臣乞賜重行屏竄知諫院鄧潤甫亦言惠卿因朝廷差官案治抗章自解讕增飾詆誣大臣欲以致君之疑薄己之罪乞先行絀責禁絶章疏詔並候秀州勘畢取㫖丁憂人將作監丞蘇子元言乞依舊許欽廉雷等州民主管蜑戸各依海岸灣澳居止採魚為生遇有出入須令主户知其所往俟大兵進討即發蜑户及船隨軍庶免為賊偵候先是廣西轉運司言乞邊海州軍許土著富民養蜑户遇入海得珠則約價以償惠養之直所貴蜑户不為外夷所誘從之至是又詔廣西轉運司備錄前㫖牓於沿海州軍詔淮南江南廣南兩浙荆湖福建等路各給五路教閱格付安撫鈐轄司先看詳有無本路不可推行事及有當教習武藝今當如何此較賞罰開析以聞及差路分都監以時出廵㸃檢仍責當職官訓練長吏提舉歲終比較殿最升絀壬辰三司言奉詔折二錢可且未得支用别聽指揮前已詔諸路通行今未審止禁在京或令諸路並罷上批都下錢法自祖宗以來未嘗有改其新行折二錢不須取索此較利害宜直指揮京師并畿内並罷墨本此下有執政進呈不行六字朱木削去先是薛向鑄折二錢於陜西其後許彦先又鑄於廣南及廣南以償銅價既而有言折二錢民或不肯折用又諸路繼有如此者故始詔令府界不用後章惇乞并府界用之上曰府界既用即當令京師亦用之至是有言民以用折二錢不售訴於開封而被决者又言有訴於三司者以故上批欲罷之及中書訪問開封三司皆言無是事乃再以進呈上又云但恐經久富民藏小錢莫出爾王安石曰大錢亦無多富民豈肯藏小錢不出藏小錢不出於富民亦有何利上又曰恐四夷聞中國行兩等錢以為貧窘乃傷國體如何安石曰錢有二品自周已然何繫貧富且自古興王如唐太宗周太宗時極貧然何足為耻臣初不欲鑄折二錢今乃極論者葢朝廷舉動為四方所瞻稍有罅隙即為姦人窺伺愚弄將不能立國是又何能安天下國家也上乃令復行之然兩宫訖不欲用折二錢故折二錢未嘗進入禁中安石争不能得退遂移疾不出上使人諭之曰朕無間於卿天日可鑒何遽如此安石乃出先是至復行之據朱本安石移疾據司馬光記聞先是詔安南招討司招降楊光僭等於是招討司言蔡煜申楊光僭等必以死拒命恐未易招降頓兵挫鋭妨討交趾兼無故貪其地非義不如候招討司回兵討定王安石曰煜前遣趙楊諭光僭等内附又與蒲宗孟言煜不去一兩月須了今以大兵脅之乃云必以死拒又以取其地為不義却候回軍討定何其前後反覆也上曰煜在任自不能了今恐功在他人故如此其為人險簿大似其父安石曰迨天之未陰雨綢繆牖戸不及今脅取恐南師既行彼見中國無如我何因交趾未服間連結撫水更為湘潭之患兼恐南師歸日軍人有功者自欲就賞一歸而無功者意氣己索難更舉事上曰不知招討司㑹蔡煜意否安石曰郭逵對臣自云回軍日相度臣曾奏此事上曰今討定與回軍利害等耳彼見我軍勝呼之必至如韓信令燕從風而靡光僭必不能過燕安石曰燕無并吞天下之意則宜有所附非附楚則漢爾漢勝而招之宜必往况如韓信者燕若不附必不但已今兵鋭而無事之時乃不敢呵問光僭及軍回之日思歸之士不可久留光僭老賊諳識事機知南師思歸將帥又無堅忍之意逗留不肯遽出則南師自當捨之而歸且燕勢必有所附光僭志自擅而不出則與韓信燕事不同上又曰事定後蔡自可行遣安石曰便且令分析前後反覆意狀亦足以儆姦朝廷不宜數為憸人所愚弄也此日錄六月八日事按實錄三月二十二日専委朱初平招撫楊光僭等至十月二十一初平言諸楊出降葢未嘗借招討同兵力不知日錄何以有此或當時曽降指揮緣蔡俟申請遂罷亦不見蔡煜有無行遣今仍附見本日更考詳十六日辛丑詔付郭逵云云則是王安石所言訖不效也癸已賜布衣馮正符同進士出身與試銜大郡判司或縣主簿尉正符遂寧人以御史中丞鄧綰奏舉舍人院試中等也詔河北路廵檢縣尉已用義勇保甲土蕃其元管馬歩軍並於馬軍額除之所减廵檢兵級及弓手義勇保甲各教支費委監司一員拘收封樁季具數上兵部歲終以聞中書㸃檢凖備移用其兵額令樞宻院詳酌裁定宣政使耀州觀察使張若水卒詔用石全彬例贈天平軍留後丁酉權檢正中書五房公事吕嘉問檢正刑房公事張安國提㸃五房公事劉衮刑房堂後官張奕各展磨勘二年主事黄九臯以下各降罰有差以吕惠卿言推究弟温卿劄子誤帯出御史中丞等疏内因依下兩浙制勘院故也朱本取王雱𫝊所書附此云時方下兩浙制獄鞫吕惠卿未具而嘉問等乃以鄧綰乞責降其弟和卿疏雜他書行下執政初不知堂吏遽告惠卿於陳惠卿以聞特㫖罰之新本因朱本今但從墨本時政記與墨本同五月十四日惠卿家𫝊云云可考己亥疏决繫囚雜犯死罪以下第降一等杖以下釋之凡降釋罪人千七百二十六火總二千五百餘人分命輔臣禱雨詔上畨保甲人多處即大保全上人少處即小保全上從兵部請也是日六月己亥十九日也安南行營發潭州趨桂州此據郭逵家所錄征南一宗文字六月十日奏案張方平九事云潭州拒桂州十四程然則郭逵等到桂州必是七月初也辛丑安南招討司奏丁憂人將作監丞蘇子元言朝廷命將至占城占臘使牽制交賊廣東所備戰船海風不定必不能盡逹况占城畏交趾占臘未嘗至廣州貿易人情不通若舟師至而二國疑懼則事危矣乞令楊從先等止自欽廉海上進兵又言陸路進兵抵賊城下尚隔大江交人善水戰慮賊船據險大兵難濟遇夜奔衝必敗事乞下廣東經略轉運司委官選水兵募勇敢教水戰將來只自廣州沿海發船抵欽廉界泊岸俟大兵進討有期即令水兵徑入交州繫賊分船北岸以濟大兵本司據楊從先奏今水陸並進陸不過自邕州至左右江横山寨等路邊近甲峒廣源進兵水不過自欽廉等州發船然宻邇交趾無不設備若不以竒兵牽制何由指日克㨗今若自廣州進兵以九月發船乗北風徑趨占城占臘與宣撫司㑹邕欽師期同入交趾討蕩并據廣東轉運副使陳倩狀前此發􅔓舶至占城占臘各避九月至十二月颶風飄溺須正月初北風乃可過洋本司看詳楊從先之計誠疎蘇子元之說甚長乞朝廷詳酌指揮詔招討司從長施行郭逵𫝊云逵次桂州遣和斌楊從先督水軍涉海自廣東進諸將自廣西進此云令招討司從長施行不知所從竟何如觀七月十二日詔則從先冒大洋之計訖不從也又詔付郭逵等近累得卿等奏楊光僭事據勾當人申説雖無大叚兇悖然觀其意思終是負固未肯即便聼伏勾呼緣今來大兵南計本以交賊犯順如光僭小醜乃是因而措置餘事若却專用力經度甚非朝廷本謀及慮將來師期日逼此蠻叛擾反致綴留大軍深為不便卿等可及兵形未見間且依朱初平議羈縻安帖無令反側俟有隙可窺或敢肆叛誕加兵誅討未為後時逵言已依初平議覉縻安帖訖此據郭逵征南文字六月十七日御寶劄子今附此可并六月八日蔡煜所言七月十七日朱初平奏壬寅上批北人見爭理瓦窑塢地分可速降指揮下韓縝等令子細遍行檢視詳悉畫一地圖聞奏其堡鋪山川人戸莊并及水流所向並須一一貼黄聲説不得小有鹵莽漏落此據御集九年六月十八日下十一月二十五日可考癸卯秦鳳路提㸃刑獄鄭民憲言逃移弓箭手并營田地土昨多方設法召人請佃令認租課乞許就近於本城寨輸納仍特蠲免支移折變從之以水源峒蠻主儂賀部能峒蠻主儂境地弄縣蠻主儂華領馬峒蠻主儂淋並為定逺將軍賈縣蠻主儂夏安清水知縣儂凛馬柳上下叚知縣儂舒儂宿並為寧逺將軍髙陽闗路安撫司言信安乾寧軍塘濼昨因不修獨流决口至今乾涸乞於樸樁堰南引御河水注入上批聞近歲塘水有極乾淺處當職之官頗失經治可於兩路各選委監司一員以廵歴為名㸃檢具濶狹深淺畫圖以聞已而河北東西路提㸃刑獄韓正彦韓宗道各具淤澱乾淺處以聞詔送河北屯田司相度當興修所在計工料聞奏其官吏仍令東路轉運司劾之丙午詔以王雱病特給王安石假令在家撫視丁未詔河東將下軍兵民兵軍器什物令知太原府韓絳宻選委官除麟府豐州岢嵐寧化軍外遍詣逐州軍擇可用者依所降八陣法内九軍㑹數所用名物於太原府代州各備一九軍㑹數編排收貯委絳提舉仍令所差官須逐一簡選毋得止憑文字編排如不足當令軍器監製作應副非久專遣近臣閱視令絳先具庫屋數目修置次第畫圖以聞戊申衞尉少卿石鑑言昨交趾入㓂諸峒蠻族並是脅從多有欲歸投者乞因招諭并目覩邊界利害候到闕奏陳詔令石鑑赴招討司陳説訖赴闕己酉詔大軍南征邕州最為根本之地錢糧軍須皆在其中賊若計窮自海口由永安州路取欽廉走邕不數日而至雖城堅不可攻豈不虞鈔刼之患邀我糧道人心必揺回師北救則腹背受敵招討司應已有處置未見奏所以為備令本司宻以聞未見奏報如何太子中允天章閣待制王雱卒年三十三贈左諫議大夫手詔即其家上雱所撰論語孟子義雱性刻深喜殺常稱商君以為豪傑之士毎勸安石誅不用命大臣而安石不從也安石輔政時罷逐中外老成人㡬盡多用門下儇慧少年諸生一切以王氏經為師講官策試諸生論及時政皆罷逐及與惠卿交惡使人告發吕氏姦利事皆自雱發之侍御史周尹言臣聞錢幣之用古者或謂之泉欲其流而無滯或謂之布取其周遍而平均臣去冬奉使經由永興秦鳳路伏見盗鑄鐵錢不少市肆買賣交易多不肯行用官司雖有支出却不收納上下疑惑軍民愁怨問其本末葢是錢法用一當二鐵賤易得而民間盗鑄者費少利倍所以抵冒嚴刑不可止絶濫錢日以滋多臣今到京便欲具管見申述乞將兩路折二鐵錢只作一文行用自免盗鑄之弊又訪問得所在官中積貯者約有數百萬貫民間收藏者猶不在其數緣上件錢貨起初元以一當十後來减為折三近歲又作折二已於國家重貨十損其八若更作一文行用即又損一分所以不敢輙有奏請昨來朝廷差汪輔之往逐路揀選行用日近風聞却又以汪輔之所揀永興秦鳳路鐵錢萬數不多令三司指揮更不行用仍令逐路轉運司速行改鑄臣竊惜官中見成數百萬貫錢頓為棄物兼别行改鑄又費一重物料經隔歲月未能敷及元數就令改鑄務監每一日鑄及三千貫即一年之内除節假旬假實有三百日課程約只得九十萬貫以來計三二年間未滿數百萬貫况日課未必及三千貫之數也若改鑄之法或只仍舊作折二即民間盗鑄定亦不可止絶况即日本路經費寖廣財用窘之或更似此暗有失䧟即年計必致闕誤臣欲望聖慈重惜國家財貨無以臣言為輕不足採用特賜指揮將折二鐵錢更不别行改鑄亦不須揀選起自今後只作一文行用則盗鑄者所獲之利不充所費自然無復冒禁作過歲省重辟而農商交易獲泉貨通流之利且約官中所有止就四百萬貫言之若以二為一即猶得二百萬貫之數致力簡省便可行用公私之間必無疑阻比之改鑄勞而又費其利害灼然可見如允臣所奏即早降聖㫖下三司疾速施行免致虚有勞費周尹疏附見當刪取之其從違須考二月二十七日遣江輔之四月一日及公弼云云又七月二十二日又九月十六日辛亥詔自今應刪立海行條貫專委官詳定訖中書樞宻院同進呈取㫖類聚半年一覆奏頒行事應亟行者取㫖中書委檢正五房并本房檢正與制敇庫官樞宻院委都副承㫖并本房檢詳提舉宣㫖庫官司詳定以詔令數易故也先是中書同日奏修令式二事上批如上二事既非不得已須當改定可俟歲終或半年一次類聚頒行自今海行條式宜半年一修定進呈取㫖頒降毋更紛紛改易疑擾四方故有是詔壬子以進士權武學傳授楊伋為山隂縣尉以伋獻兵説可采令權傳授候一年與試至是舍人院試策復中中等故也是日上批付郭逵等代北疆事雖已分畫北人展轉邀索不已諜者多稱北人緣朝廷方事南討欲乘時牽制以此觀之安南之舉惟萬全速了為上卿等可更體國精加籌策博極羣議亟期殄滅以尊强華夏使四夷自此稍知歛戢此據郭逵征南文字六月二十八日御寶劄子今刪取附見神宗責望如此逵等竞坐責有以也夫是夏富弼言臣退伏草茅不預人事近者竊聞蠢爾蠻獠犯我疆封二廣作災五嶺嚴備雖為手足之患諒煩宵旰之憂然而命將得人出師有日上禀宸筭必成武功臣又竊聞淮南累歲尤為荒歉流亡餓殍賑濟難周今驟起數萬之徒間由諸路而往兵馬所到糧草須辦監提守宰惟務供軍府庫倉箱殆難足用既各求於集事恐必至於擾民復有按察之官繼行督責之令上下逼廹公私煎熬人心不寧實可矜惻臣又竊聞南方鄉村城郭重疊逋欠官司錢物其數浩瀚若監司州縣又相催理仍與此時贍軍所費一併取足則民不堪命無以為生嘯聚驚騷或難禁戢陛下天賦仁聖累降寛䘏之詔其如所在闕用出於無可奈何須至侵漁方能濟集而又官吏各思一時茍免罪責不暇為國家憂及後患而為長久之計也臣又竊聞諸處興修水利之類役人甚衆多或至於一二十萬此傷耗民財事亦不細伏願陛下降詔有司并下諸道切以寛民為務凡所逋欠可蠲者與蠲放理難蠲放者多分料次且令迤邐輸納及權罷諸般興作完聚民力一意專以破賊為急俟嶺南寧息歲時稍豐然後别上圖議以稱朝廷有為之心固亦未晩也臣杜門謝事祗如聾瞽但時得於四方之人𫝊聞者今錄以上奏茍有妄説惟陛下恕其愚而憐其心以來衆正之路又言臣近者因拜謝章輒敢略具南事附奏伏計愚懇尋逹天聽蠻㓂大擾即已竄歸然王師遂行必謀弔伐水陸並進威德兼施若夫討禦之方得失之際則非臣庸短之所預知也伏望陛下宻詔郭逵等候至二廣熟計攻守利害速具奏聞可往則往如不可往則令别圖去就以全王師之重海嶠阻逺恐難責其固必臣又竊聞秦隴之外數年用兵尅取熈河等五州别立一路闢地進境開拓故疆誠為國朝美事然而逺近共𫝊當時殺戮人命不可勝計費耗財用莫知紀極是皆主事者公為欺罔不以實數上奏致陛下無由得聞今既立成部分建置官屬屯兵守禦各有定制即須所得之地所出之物足以供贍一路不假外求然後可為長逺之利遂成開拓之益則向者人命不為枉殺財用不為虚費奈何罷兵後惟聞朝廷自京師輦運金帛監司從内地支撥糧草增添轉遞遞舖奔走不絶於道滔滔而去尚云不足一二年來又聞彼中米麥每㪷計錢四五百文賤亦不減三百以上公私遑遑汲汲日憂不逮若常如此豈不為枉殺虚費而又自此國家府庫如何供億民間物力如何出辦遂使官私俱困得之何用况陜西即今上下窮窘已甚事茍得實臣竊憂之伏願陛下親選無所畏憚公忠臣僚不與其時用事人為黨者往彼按視土地可耕否所收貨物足用否人情可安否久逺可守否俟得其實然後委二府㑹議方見經久利害如何若不審行考校但務竭力勞費臣以為末等之家有十金之産者且猶未肯如是况為天下之計哉惟陛下深切留意也唐宣宗朝此方亦曾自舉十數州内附未嘗少加攻取既而供饋闕之終却叛去唐亦不復顧惜更乞略賜檢詳亦可以為證矣臣又竊聞代北之地北人妄有爭占意在先發殊無義理朝廷以其倔强難制遂欲盡與此説傳播甚盛然終未知虛的萬一是的則聞者莫不憂駭何哉葢彼固婪貪後患彌大彼曲我直事甚明白且宜以理辨折未易可許昔趙欲賂秦六城大邑而虞卿不從東胡欲求匈奴甌脱而冒頓弗與觀於簡䇿足為龜鑑願陛下取此二説以今疆事反覆叅校始末輕重與二府議定决然利害奏禀而後行不須特出宸斷也臣又竊聞累年新法所行之事條目甚多陛下近各深見為害但虚懐隱忍未即更張此誠大得為君之道從容優裕而不欲廹急也然羣論所謂為害者皆害及天下之人被害既久則豈尚容舒緩哉度今事勢正如解倒懸之急惟恐解之不速也亦如人之感疾深則難愈木之受蠧深則難補惟陛下所見害事既明芽蘖己著宜早圖之必無太早之失更或稍緩則遂成疾蠧深患朝廷亦難奠枕矣况天下不以賢愚共知陛下始欲講求大治比迹唐虞前代帝王用心非所能及而不意為人所誤至此事皆成弊究其端由實非陛下之失惟是衆口共責為謀者恨不食其肉焉今聖情既已開悟稔知其罪而猶隱忍借䕶不速更張漸致事生却恐遂玷聖德也臣更願陛下左右臣僚中不以職位髙下常視其反覆狡獪者疎之純良方正者與之反覆狡獪者雖有姦才彊辯可以惑人其餘自取名位及援引親舊結成朋黨互相保庇表裏膠固牢不可破如此之類豈可置之左右而任之以事乎葢本無一定之志不耻不仁不畏不義不見利不勸必無忠藎慤實安肯内心於國家也純良方正者才辯誠有不及狡獪之人然其心不二持守堅篤中立不倚旁無朋比用之則直道而進捨之則奉身而退不為利回不為義疚忠亮一節至死不移不肯欺昧朝廷自求多福如此等終無妄誤必能為國家立事假有未能立事者亦不為害也陛下臨御既久當盡照見固難上逃聖鑑此尤宜常掛宸念恐非須臾可忽也緣誤用一二姦人則展轉援致連茹而進分布中外大為朝廷之害卒難救整唐文宗所謂破河北賊易破朋黨難者正為此也天子無職事惟辨别大臣邪正而進退之此其職也竊乞重之又重之臣狂瞽之説實有愛君憂國之心固無他志伏乞俯賜聽納早賜裁處又言臣荷聖眷特厚以老病休退無便不敢非時輒以愚誠上逹今因賀表復敢具所聞附奏惟願聖造斷在必行况造端已甚不煩更加訪問深恐問及意異者妄有飾説又惑聖聽也臣賦性愚戇不識忌諱既聞衆議萬口一詞竊慮左右前後之人交相䝉蔽臣實不忍緘黙上辜聖恩此劄子只欲陛下略知外事一二而已乞不降出庶免後悔也弼上言不得其時前論交趾云附謝章後論新法云附賀表今悉載於六月末謝章不知何事賀表當是同天節也更須考詳弼言陛下深見新法之害不知何所據或恐是王安石罷後張方平言交趾自李日尊以來貢職已廢朝廷濶略不問邊臣茍慢防禁益㢮㓙惡盗賊姦蠧之民諸配徙者不無逋逃頗從亡匿亦有士人頑嚚不逞投身亡命赴其招進教之治兵助為邪計故今乾德敢奸王命㐫黨用事多是華人往時遣使例抵其國見城中無居民府舍湫陋茅竹屋數十百區以為軍營兵器有弓弩木牌梭槍竹槍弱不堪用勢不能為中國患故逺而易之至景德中李氏竊此疆域及今七十餘年王人久不涉其地不復知其虚實今聞其城栅隍壍乃有數重兵力民衆必益充足頗略旁近占城等諸小國事勢設施比前為强大而嶺南長吏猶習故常本非經逺之才又忽不虞之戒狂妄輕脱為國生事蠻性狠悍有不能堪告訴不聽投書不受事情壅塞積成忿恨及其戰艦抵岸軍鼔叩城如入無人之境略無交鋒之備㓂兵所至城邑為墟遷致貨財係纍婦女封豕長蛇恣其酷毒傳聞其事可為痛心然此為既往之咎方當慮將來之策謹條九事列于左方一事即今淮甸兩浙江東西湖南北州縣仍歲旱蝗陂澤竭涸野無青草人戸流散窮荒極敝事可憂痛方當散利薄征緩刑弛役布德施惠以撫存保息而盗起南裔王師大興正出荆潭之路此時民力何以復堪賦發臣愚以謂今兹上策當以謀取不可以力勝謂宜且擇廣桂二守臣精宻毅重識略足任者屬之方面付以便宜使各選舉部下文武將吏其兩路職司官朝廷為之遴選令協力從事招集戸口各安本業為發禁卒以代荆湖見兵益令募本土丁壯分屯緣邊城邑使足以保守要害更相救赴則賊不敢復窺徼内自取殱夷峙糧積芻藁惟事事乃其有備揣情觀變臨事制宜歲年之時經營進取葢中國御蠻夷固有大體圖功宜審慮害宜深務在保威靈紓民力全士馬之用惜金帛之費先收多福以絶後虞此為全勝之筭經逺之道儻謂業已興舉難於散遣猶有中策具諸下條二事蠻㓂自入欽廉以至陷邕州殘暴黎庶踐食城邑既而席巻還其藪穴及今已累月朝廷旌死事者而錄其孤推恩厚矣然及民之惠猶有闕者春秋傳魯與齊戰曹劌請見魯公問將何以戰公曰小大之獄雖不能察必以情劌曰此可以一戰葢謂其重人命也謂宜特降德音下廣南荆湖以慰安逺人之情使知陛下哀痛傷惻之意凡四路百姓耗病之事加惠優恤之庶國家仁恩無所不逮至如宥釋罣誤以安吏卒之反側開設賞募以招溪峒之酋豪祭酹其亡魂掩藏其殘骼皆前代常行之事也夫文之所加者深即武之所服者大德之所施者博則威之所制者廣震耀殺戮生殖長育功用相承此天之道也三事東南六路災荒已甚官私匱乏莫相救恤又緣青苗助役市易之法農民困於輸錢工商窘於財利謂之錢荒人情日急今王師薄伐聚于荆潭調發賦輸即以軍興從事荐饑之際供億實勞臣聞安民豐財用兵之本也所有荆湖南北廣南東西四路青苗助役市易法伏望特賜先罷役法令復依舊制施行以此宣布德澤慰悦民心易曰悦以先民民忘其勞悦以犯難民忘其死悦之大民勸矣哉四事臣聞兵者國之大事死生之地存亡之道不可不憂深而思逺知天知地勝乃可全地者逺近險易廣狹生死也彼蠻之舉事非謂其衆可以抗王師非謂其智謀可以勝中國而敢為暴害至是者負山海之險林藪之深可以出為㓂患難以入與戰鬬乘我無備因而得逞傳聞蠻界其崖壑深阻處篁竹叢薄不通人行人有操持器仗者從横不得回轉頃年貢象治路劣容象行謂之象路象過尋復蓊塞蠻行如鳥獸穿竄山藪間自知其路外人不得而入也今業巳失備致㓂蠻又悉衆而歸王師于征是行天討非救急之兵也救急則欲速行討則要之致誅而已不計收功之緩當圖全勝之策今興師十萬日費千金鋭士不可久於瘴鄉驍騎不能馳於鳥徑營柵無所立糧道不能通長兵無所施行器無所用財殫力屈徒沮國威先有自困之形未見必舉之勢何也若士馬而得為用則螻蟻之衆何足平若士馬而不得用則熊虎之力無所展儻今冬蠻未撲滅則前春兵須抽退更圖後舉臣竊難之臣識闇志衰安知軍旅之事但以古今方冊亦足比測事宜向者嶺南有萬兵蠻何敢輕入竊謂今來弔伐兵在於精不在於衆可以計取難以力爭况淮浙江湖公私罄匱人至相食豈有畜積計置芻糧財費過倍若令諸軍日駐襄鄧將佐僚吏省去冗員隨行廂軍量留充役自餘浮食一切勒回以寛輸省齎送國財民力實為大計襄鄧間比年豐稔倉廪充實軍留就食足支歲月士飽馬肥暮秋引發乗鋭誅賊軍氣自振後無艱之方可圖功五事臣觀蠻事可以計取難以力爭葢交趾氣俗與諸蠻不類諸蠻貴種姓服從貴種義不可奪今交趾自國朝以來已易四姓皆由大校以權黨簒奪乃是唐末藩鎮遺風故其勢易為飜動竊聞乾德尚㓜諸酋共事而主謀者三人今入冦大獲金帛子女各得所欲蠻夷不義惟利是貪歸國爭功豈能相下如列其三郡分授三酋各為主領被之告命使逹蠻中事縱不行必生猜貳以至他日釁端常在多方以撓之則功易舉矣兵法曰軍莫親於間事莫宻於間非精知微密不能用間用間之術神妙之道也惟時㑹之為難得今實得其時㑹惟陛下深念所以可付之人誠上策也六事林邑國在交州南境本象林之地漢時列為郡縣後有功曹區連者殺縣令自立為王因别為國歴江南六朝嘗羈屬之隋仁壽中擊破其國尋而自復至唐朝貢不絶國朝以來為交趾所隔遂不復至然自晉宋歴代嘗侵冦交州南史以為林邑素無土田貪日南地沃常欲略之故乘釁即入日南九德諸郡輙留不去唐末亦是為羣獠揺扇以陷交州為中國患今揣能害交趾者惟林邑且林邑與交趾相去纔千里本共象州一州之地今桂州至邕州尚十四程則是林邑交趾之間比邕桂中間程途猶近意者募能使外國之人諭以討交趾事約之師期使自一面入㑹王師如能破交趾者以日南九德之地委之蠻夷貪重利必自為力亦伐國一竒也七事竊見安南後軍見在本府待師期所領南京一將外又涇原秦隴之兵約二千五百騎聞約取七月到本府正是六七月間在路到此又便南行夏秋盛熱比至桂州已行萬里臣前已陳蠻界山林崖壑之險不通人行馬實難用頃年儂賊作亂狄青破之聞在邕州西北適近山坡地勢寛平馬得施力故當時破賊馬軍之力為多今日行軍深入蠻地事與儂賊不同儂賊溪峒一首領入我郡縣之間止是劇盗擊破即糜爛矣今交趾自是一國竊有土宇恃其險逺主客勢殊秦渭馬軍弓箭手本備羗戎皆是捍邊鋭兵勁騎有到京師猶謂不伏水土輙生疾病而乃驅之瘴霧沮洳之中巉崿􅓕枿之地水多沙毒草無藁秸進又不可以馳突决勝其能還者無㡬矣况西北戎冦睢盱顧望如聞王師逺出邊騎多行忽起風塵來犯亭障東西往還萬里莫相赴應又不比海隅之失備矣凡言國家大事必曰軍馬軍馬者戎事之本不可忽也今邊塞簡選一鋭士調習一壯馬甚不易得盡心於國者方知之爾所有昨召邊要將官及騎兵願各遣還本道使荆湖多募丁壯蒐補諸土軍其將士服習土風諳識山川地利其騎亦只用南馬格式雖下筋力自壯慣行險隘安其水草使與中國之人相先後勢之便者也且使遼夏知朝廷之力一方有警邊備晏然不為動也八事伏見安南招討司期諸留兵以八月中旬悉至潭州潭州去桂州十四程竊聞嶺外嵐瘴八月九月尤甚謂之黄茅瘴草黄時瘴氣方盛十月以後氣候始肅湖南饑荒糧草難致久留就食實費供輸若便引行觸冒瘴毒士馬未用恐多病疫若展一月期㑹可省一月芻糧湖湘之民大寛事力比至其時新米已熟暮秋湖外風土調適免致人騎枉有損傷國計軍行兩為便利九事本朝祖宗有邊防大事亦嘗博採羣議今安南之舉興師十萬萬里討伐涉危度險利害甚多然聖志先定國論已協伏願特降璽書内外近職之臣各令獻策以示博訪之道使四方知陛下重謹之意三軍知陛下憂軫之懐觀其否臧亦以見羣臣之材識愚者干慮尚須有得採擇所長不為無補也方平所論九事亦必自此夏間今附見富弼疏後須更考詳郭逵征南文字五月二十六日奏云已於今月二十五日牒劄諸處促期勾抽陜西河東選募軍馬并在京留住兵馬南京後軍京西就食馬軍節次起發前來取七月下旬到潭州齋集團結方平八事乃云以八月中旬悉至潭州當是後來却有改移或是方平所奏八月字誤也
