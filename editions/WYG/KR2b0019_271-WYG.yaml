body:
  text: 續資治通鑑長編巻二百六十七宋李燾撰神宗熙寧八年八月庚寅朔司天監言日當食雲隂微雨不見詔聞嘉雅威茂州頃者雖時有冦畧然不至大患者蓋以山州險阻足恃故也今提舉戎黎等州買馬司乃役兵匠開隘通道甚非守圍之利又增價市良馬亦未見數其罷嘉雅威茂州開通險路具所市馬數以聞九年四月二十三日罷買馬司宋如愚劒南湏知有雲南買馬記可證此事今附注此嘉州峨眉縣西十里有銅山寨與而南生蕃相接界户不滿千俗呼為小道虚恨姓縣尉例以十月一日上寨守䕶謂之防秋至四月一日罷歸意者以水潦方溢而蕞爾虚恨無能為也虚恨固無能為行六七百里冇束宻束宻之西百五十里至苴咩城乃八詔王之巢穴也其地東南距交趾西北連吐蕃而旁靠蜀蜀自唐時常遭南詔難惟太平興國初首領有白萬者欵塞乞内附我太宗州為雲南八國都王然不與朝貢故乆不諳蜀之蹊隧焉熙寧六年陕西諸蕃作梗互相誓約不欲與中國貿易自是蕃馬絶迹而不来明年朝㫖委成都路相度募諸色人入界招誘西南夷和買峨眉冇進士楊佐應募自傾其家貲呼羣不逞佃民之强有力者凡十數人貨蜀之繒錦将假道于虚恨以使南詔乃褁十日糧貯醘醢鹽茗薑桂以為數月之計諸從行有蓑笠鐡甑銅鑼弓箭長槍短刀坐牌網罟佃漁之具人斬輕桐以檠橐重有餘材則束而賫之大抵皆先竅鑿聚勘如屋之間架然将以為寝處之備也每望日之景穿林箐而西遇摯獸先擊鑼以驚之或操弓箭執刀槍以竢㑹平林淺草長溪大澗即施網罟以從事于佃漁其徒常鮮食以飽日行纔四互十里未暮即相地架起桐材上下周匝徽索而纒之然後蔽以坐牌副以網罟将湊于其中必積薪于其側鑽燧火以待亱事然其地多暑或蒸而為瘴值山深木茂煙霾欎興欲雨而莫辨日之東西間或迷路竟日而不能逾一谷也初銅山為蕃漢貿易之場蕃人從漢境負大布囊盛麻荏以歸囊罅遺麻或荏既乆而藂生佐之徒躡麻荏生蹤前尋去路自逹虛恨界分十有八日而抵束宻之墟前此三四十里漸見土田生苗稼其山川風物畧如東蜀之資榮又前此五七里遥見數蠻鋤髙山俄望及華人遑遽呌號招羣蠻蚍聚佐乃具巾紵磬折而立命其徒皆俯伏母輙動湏臾有老髽自山而下問佐何來佐長揖不拜俾其徒素諳夷語者具以本路奉㫖招誘買馬事對徐以二端茜羅啖之老髽涕泣而徐言我乃漢嘉之耕民也皇祐中以嵗饑來活于兹今髪白齒落垂死矣不圖復見鄉人也乃為佐更好于束宻王乆之有馬十數騎來邀迎悉俾華人乗而入束宻王悦蜀之繒綿且知市馬之来其國也待佐等甚厚不惜椎羊刺豕夜飲藤觜酒蠻女嫠婦與人亂不禁惟已嫁姦者抵死故飲散輙擇其女婦徧匹華人抑所以重漢之貨也凡如此未旬浹㑹八國王亷得其狀遣使詰問何故與華人雜處束宻懼因悉以佐等所賫物偕行三驛趣苴咩城而獻諸都王王館佐于大雲南驛驛前有里堠題東至戎州西至身毒國東南至交趾東北至成都北至大雪山南至海上悉著其道里之詳審詢其里堠多有完葺者俄遣頭囊兒來館伴所謂頭囊者乃唐士大夫不幸為蠻賊驅過大渡河而南至今有子孫在都王世禄多聰悟挺秀徃徃能通漢語佐抵大雲南之翌日都王令諸酋長各引兵雄張旂隊佐等前通國信既諭市馬之實而都王喜形于色問勞贈送佐等各有差尋以陜西諸蕃就漢境貿易如初而西南市馬之議罷明年銅山寨申峨眉縣縣申嘉州州申木路鈐轄司以某日有雲南蕃人貢馬若干到寨乃楊佐者奉帥府命通國信招誘出來鈐轄司即下委嘉州通判郭九齡前視犒勞且設辭以紿之謂本路未嘗有楊佐也馬竟不留初佐受雲南八國都王囘牒歸投帥庭後縁頒示九齡遂掌在嘉州軍資庫蕃人知設辭相拒其去也頗出怨語元豐三年春三月生明日宋如愚東軒録壬辰命太子中允集賢校理檢正中書禮房公事徐禧察訪廣南路常平等事詔州學教授自今先召赴舍人院試大義五道取優通者選差在職有不法事委州郡監司體量以聞從中書户房習學檢正公事練亨甫請也上批勾當御藥院李舜舉服勤左右多歴年所檢身奉上最為慤謹令依舊供職候将來南郊依見寄官資奏一子官餘人母得援例先是舜舉常乞觧御藥院補外上留之以其已寄諸司副使而留則不預南郊奏薦故特有是命河東經畧司言准分畫地界所牒已差晋州麟州代州通判赴當所勾當公事及要使臣馬仲良等五人准備使喚已發遣去訖上批契勘分畫地界開壕立堠自有諸寨使臣及逐處廵檢未知用許多文武官作何使喚可劄與韓縝等令留合用勾當的確人外餘並放令歸本任詔收飬監裁减兵員其将校委歩軍司比類軍分移隷兵士依廢左右天廐坊例施行從羣牧司所請也八月三日癸巳定州路安撫司上相度到沈括所奏敵人出入道路合先據地利安置營寨事詔樞宻院籍記先是括察訪河北言定州北蒲隂滿城皆有廢壘若北騎入侵可以發竒遮擊故也括初至定州日與其帥薛向畋獵畧西山唐城之間二十餘日盡得山川嶮易之詳膠木屑鎔蠟冩其山川以為圖歸則以木刻而上之自此邊州始為木圖定州城北園有大池謂之海子括與向議展海子直抵西城中山王冡悉為稻田引新河水注之瀰漫凡數里使定之城北不復受敵議者或欲傍西山阻嶮為山寨以處避敵之民括以為不然曰民當使之同安逸共患難若縱其冦至而潰則君誰與守兼頓斃道路先自屠戮足以助敵勢非策也乃嚴為入保之法仍設關梁以止逃者設旗鼔興召之令舉河北西路可得丁百萬以臨邉圉皆兵也元氏銀冶發轉運司置官收其利括以為不可曰耕墾利于近商賈利于逺今開銀冶於極塞容聚之民一旦成市仰哺邊粟日耗軍食近寳則國貧其勢必然人衆則囊橐姦偽何以檢察朝廷嵗遺單于銀以數十萬以其非北方所有故價重而契丹利之昔日銀城縣坊城皆沒于契丹盖北人未知鑿山之利也若啟之使能自致則國中之幣益輕復何賴于嵗餉之物其勢必携鄰釁将自此始矣時契丹畧漢境民不安于鄙傅城自歸而真假莫能辨守者無敢納頼敵退鄙之人㡬肉于契丹括為講坊市法嚴為防禁使民各以鄕閭族黨相任分坊以處之謹啟閉之節坊有籍居有類出入有禁邉人為安河北阻于大河惟澶州浮梁属于河南契丹或下西山之材為桴以火河梁則河北界然援絶括請設火備無使姦火得發定州北境先種榆栁以為寨榆栁植者以億計括以謂契丹依之可蔽矢石伐材以為梯衝是為冦計也皆請去之時賦近畿户畜馬以備邉不可得民以為病括以為契丹馬所生而民習騎戰此天地之産也中國利强弩猶契丹之上騎也捨我之長技勉强所不能以敵其天産未聞可以勝人也户馬法始二月二十三日邉人之習兵者平日惟以挽强為格括以為挽强未必能貫革謂宜以射逺入堅為法如此詔可者三十一事自括初至定州以下至三十一事皆據括自誌刪改追附惟屯田議依㑹要繫七年二月末詔有蝗處委縣令佐親部夫打撲如地里廣闊分差通判職官監司提舉仍募人得蝻五升或蝗一斗給細色榖一升蝗種一升給麄色榖二升給價錢者依中等實直仍委官視燒瘞監司差官覆案以聞即因穿掘打撲損苗種者除其税仍計價官給地主錢榖毋過一頃新紀書募民捕蝗易以粟苗損者償之仍復其賦上批京城南張使者廟訪聞比嵗都下之民禱祠多得疾愈近以皇子僩經月不安曾遣使祈禱仍祝以茍有嘉應即當封爵今其疾日就痊除可特封嘉應侯御集四日事僩竟卒故録之甲午罷禮賔使權發遣河北緣邉安撫使沈披令監司案其不職事以聞既得實㑹赦免推治特依衝替人例降一等差遣衝替乃十二月四日事并書披三月五日方授任司農寺勾當公事杜常言裁減熈州隨軍蕃部公使三庫合支錢物詔常如所减數著為例冊申司農寺詳定仍詔常取河岷通逺軍公使數裁减以聞乙未徙太子中允權發遣開封府推官王欽臣為羣牧判官仍罰銅八斤坐知開封府陳繹出禱雨而欽臣擅判辭状繹劾奏故也禮院言皇第四子無品秩今葬永安縣欲依故事用一品禮從之都水監言河流變徙乞令䟽濬司因今河勢䟽濬詔外監丞司及程昉同相度合䟽濬處分上下両節䟽濬手詔聞陳潁州蝗蝻所在蔽野初無官司督捕致重複孳生自飛蝗已降大小凡十餘等雖自此漸得雨澤麥種亦未敢下盖懼苗出即為所食根亦隨壊若至秋深播種失時則來嵗夏田又無望矣公私之間實非細故其令京西北路監司提舉司嚴督官吏速去除之仍具析不督捕因依以聞詔河北路諸縣弓手依河東路留十五人或二十人充白直外餘以上畨保甲充數丙申工部郎中直龍圖閣判将作監謝景温為遼主生辰使文思使髙遵路副之太常丞集賢校理直舍人院李定為正旦使皇城使兼閤門通事舍人李惟賔副之太常丞集賢殿修撰侍御史知雜事張琥為遼國母生辰使皇城使姚麟副之刑部員外郎集賢校理同修起居注竇便為正旦使皇城使曹誦副之後定免行以祠部員外郎集賢校理孫洙代之麟遭母喪以東作坊使向綽代之遵路時知豐州召未至上批本州地控西北二敵㝡係極邉不可闕正官乃令遵路還任以文思使王崇拯代之熊本言經制獠賊乞差秦鳳鈐轄賈昌言量募兵効用從之詔䕫州路難得錢糧熊本處置邉州事所用大小使臣及軍兵等並湏精選詔熙河路有功使臣未有差遣借職以上並增差内地監當其三班差使以下願換禁軍将校者比附安排又詔三路臣僚奉舉武舉人雖非土著别州有户貫者並許收試又詔江淮等路發運使張頡専應接髙麗使入貢事先委發運使羅拯拯已罷故也詔聞淮南江東兩浙路災傷州軍米價踴貴其令發運司勘㑹斗錢八十以上處留上供米毋過百萬石量减市價予民斗毋過八十新紀書詔發運輸京師粟留無過百萬羡者與飢民詔官户輸役錢免其半所免雖多各毋過二十千两縣以上有物産者通計之兩州兩縣以上有物産者隨所在輸錢等第不及者併一多處以司農寺言官户减免錢數及人户兩處有産業者出錢不一故也墨史有此朱史削去云後已書盖九月二十二日司農寺云云似重出也今兩存之新紀于丙申日書减官户役錢之半舊紀無之丁酉翰林學士工部侍郎元絳復兼侍讀學士絳坐三司火奪職至是復之奉禮郎檢正中書刑房公事王震提舉邢洺相州義勇保甲太常博士檢詳樞宻院禮房文字王伯虎提舉絳隰等州義勇保甲别試所言武舉人試孫呉六韜大義六韜本非完書辭理訛舛無所考據欲止于孫呉書出義題從之詔参知政事呂恵卿罷提舉編修司農寺條例賜秦鳳等路轉運司銀二十萬兩募商人免税入中糧草熙河路洮西安撫司言熟户摩雅克族麥熟總噶爾引兵抄畧本司出兵千一百人防托經畧司亦遣兵千人為聲援今嘉木卓城一帯無事兵並放還詔賜防托兵特支錢有差環慶路經畧司言蕃官供備庫副使梅重信内殿承制閤門祗候蒙布等乞封贈父母妻詔依漢官例又詔河東陜西路縁邉州軍并外城寨受敵處依河北守城法戊戌右龍武軍大将軍均州團練使宗制卒相王允弼子也中書擬贈華州觀察使華隂侯手詔宗室名連宗字者皆太祖太宗諸王之後方今於皇家㝡為行尊属近比嵗淪亡相繼存者無㡬送終之典理宜加厚可贈彰化軍留後北海郡公著為例辛丑召輔臣觀糓于後苑詔江寧府倚閣四等以下户六年七年逋税以嵗旱故也權發遣荆湖南路轉運副使蔡􅂱言全邵州招誘平水等三十團峒首領楊晟進等納兵械歸明乞依例嵗輸課米從之壬寅詔諸州軍當留廂軍工役大名府瀛雄州八十人餘州軍五十人非朝㫖毋得抽差詔隴山一帯已經差官案視可耕官田徳順軍儀州四千八百八十八頃已募三千九百九十三餘户請佃四千一百七十三頃嵗輸租計萬三千一百餘石其令王廣淵籍佃户為弓箭手免所輸租不願者聽别募人具所籍人馬數以聞鄜延路經畧司言徳靖寨蕃官李徳平劫掠西界財畜已差官根究還夏國首領勘㑹西人時於界首出沒理索人畜别無大叚賊馬盖因慶州荔原堡蕃部擅入西界刼畧致互相讎報乞嚴戒荔原堡蕃部免致生事從之上批樞宻院見比較兵數及章惇所奏兵費事因何如此淹緩多日不見聞奏與限一月令了當此據御集當考詳日録七月十七日章惇論宻院添兵事上曰惇必别有意非特為添兵前乃乞留中不降出劄子因進呈兵數湏得宻有何義理此或與上批相關兵數湏得宻已見七月十七日癸夘詔韓琦子忠彦候服闋除直龍圖閣又詔孝彦純彦粹彦陞一任端彦遷一官賜孫治進士出身子嘉彦孫澡洽誠女之子王㡬道並文資安排用遺奏恩也中書言江淮等路發運使副並兼置茶鹽礬酒稅提舉逐路廵檢兵甲賊盗都大提舉江浙荆湖福建廣南路銀銅鈆錫坑冶市舶鑄錢等事職務至衆無繇辦集請以江淮荆浙等路制置塩礬兼發運使副結衘餘事毋得管勾從之㑹要繫之九月又畧不同今從實録㑹要云熙寕八年九月中書門下言欲乞發運使嗣除所管錢物斛斗就賤處入買貴處糶賣或就近便計置㸃檢綱運塩礬事及諸官吏因本司事有違法者許糾舉外其餘事並不得管勾仍只以江淮荆浙等路制置塩礬兼發運使結衘從之元祐三年十月三日崇寧三年九月二十日可考甲辰衛州言汲縣朝歌村保正裴公討為軍賊所虜弟公詳率衆追賊奪公討以還仍獲賊首詔以公詳代公討為都保正賜錢百千三司言州縣以絲綿為賦舊不收官耗及秤耗者請增收十之一舊收數多者自如舊從之詔熙河路以功補文學助教者召朝臣二人奏舉注權入官三年滿無遺闕嘗得觧者與注正官餘奏取㫖乙巳常州團練推官曾􅌈管勾福建路常平等事上前此固欲與改外任差遣六月十七日又十月十四日蔡承禧劾呂升卿又以􅌈為言故出之承禧言􅌈科場小生畧無聲實輕儇隂狡依倚城社吕恵卿寘在門下又令編修令敇職為檢討曽無論譔之補忽侮同列動有呵叱之辱謬為剛狷隂招權利臣初至京師嘗聞其人得為檢討慮有異才及遇與語其人才乃奴僕之下者頃嘗登對陛下之明已悉其人别無擢用臣欲乞下經義所并令敇所檢㑹曾􅌈檢討編修有何勞効若無所備乞下屏斥於是又言􅌈奴𨽻小物卑事恵卿左右依倚為姦利口工讒自及第後即入條例司不一二年即為提舉豈曰為官擇人提舉之命雖未為監司在京視之則眇然在外道則可以廢置官吏利害民庶動關國家調度所繋不輕若以庸下輕浮小人雜厠其間不惟有害於事亦使一路吏民無訴至於轉運提刑其勢足以相執或有恣意妄施喜怒行遣官吏難與之校伏乞送銓院與合入差遣提倉之命乞别選人十一月十四日􅌈罷先是大理寺丞方澤除江西路提舉常平承禧并言澤才識庸下縁呂恵卿妻黨以違得選人入條例司未及三二年不應便有此除又言澤為越州判司有不可言之穢行為人所訴㡬欲成獄本州庇覆得免豈堪臨長一路伏乞追寢除命送両浙轉運司下越州根究施行承禧言方澤先與曾􅌈同章澤除提倉實録不書今附此九年五月十四日承禧云云可考實録乃于八年十一月十一日載承禧言盖十一月十一日方有體量之命也今兩存之詔大長公主當出降其令内外兩制以上及諸路監司訪世族子弟性行温良儀状秀整可備選尚者以名聞在外令乗驛赴闕上批在京剰貟營房差沈希顔管勾以營房廹隘疲老失所依故也荆湖北路轉運使孫桷言知保静州彭儒武自言欲遣子歸順畏師晏邀阻乞發卒修辰州北江堡寨以備師晏仍乞差前管勾文字著作佐郎陳向太常博士秦中幹集及言權轉運判官周師厚沮邉事詔委桷専處置對移師厚鄰路以向及中為荆湖北路轉運司勾當公事居旬日師厚亦言欲因師晏等窮窘建城寨招納師晏等置於辰州然後進兵據其故柵詔桷相度施行周師厚所言乃二十七日事今并書不知師厚竟對移何處當考戊申詔内外宫觀寺院主首及僧道正舊降宣敇差補者自今尚書祠部給帖詔真定府路安撫司如北人移舖侵越疆界先以理道説諭止約或不從量以兵馬驅逐毋輙生事本路言探報北人欲移鋪屋故也詔鑄錢監所鑄錢毎緡熟錢重五斤若前代舊錢並聼行用其不堪上供者許留逐州雜支二月二日五月十六日詔災傷州軍獲彊盗該陵遲處斬或殺人或凶惡或軍人或三犯行劫並至死或曾犯盗至徒經斷而又三人以上持杖行刼至死或在重法州縣者聼用賞格餘降一等賞之刼榖食者又降一等軍噐監乞詔逐路轉運司應副材物於前五年取一年酌中錢數為額外收買聼於上供錢帛折除非上供路即朝廷降錢給還從之庚戌吏部侍郎平章事監修國史韓絳罷為禮部尚書觀文殿大學士知許州仍詔出入如二府儀大朝㑹綴中書門下班絳居相位數與吕恵卿異議王安石復入論政愈駮數稱疾固求罷而有是命絳本𫝊但云絳繼王安石為相請置局中書鈎考用度以均節邦計事滯留多不决數月以疾辭新舊實録並如此可謂踈畧矣今参取别修存其梗槩卲伯温見聞録云韓絳初以論助役與王安石同復拜史館相為吕恵卿所不容出知定州詔蠲鄂州失催茶稅錢嵗二萬五千七百餘緡仍令民自熙寧七年復認舊額輸納以三司言自嘉祐四年茶法通商至熙寧六年縂十五年失催錢至三十八萬五千六百三十餘緡故也中書言國學開封府諸科舉人孫義等訴所問題並挑摘三兩字至有重疊數十字者試院亦奏義等嘗於簾前言朝廷欲廢諸科乞預行曉示免使孤寒虚習勤苦詔並駮放内為首者殿一舉初義等既就試得所問義目擲試巻于地相率出外遮宰相自訴詔取義目進呈而有是命上批都城乆失修治熙寧之初雖嘗設官繕完費工以數十萬計今遣人視之乃頽圮如故若非選官總領曠日持乆不能就緒可差入内東頭供奉官宋用臣提轄修完有當申請事條具以聞仍差河北京東簡中崇勝奉化十指揮及廢監牧軍士五千人専𨽻其役軍士仍𨽻歩軍司應縁修城役使犯杖以下令提轄修城所决之合干追照仍送歩軍司毎五百人許奏選殿直以下至殿侍一人督役九月七日置廣固等地理志云熈寧八年九月癸酉完都城元豐元年十月丁未告畢初修月日與實録不同當考詔熙河及洮西縁邉安撫司自今月奏軍民平安初並旬奏至是以邉事平息也辛亥詔糴買糧草違法致虧官甚者監官及知州通判並取㫖降黜壬子命池州司法参軍孫諤編定省府寺監公使例冊條貫又命諤監制敕庫諤邵武人既舉進士試法中第一故以此命之制敕庫用士人自諤始監制敕庫以楊時墓誌増入九月二十四日為習學元豐二年正月六日可考又詔澶定州北京軍噐什物各為九庫司農寺言保甲之法主客户五家相近者為小保五小保為大保十大保為都保諸路皆凖此行之惟開封府界五路則除客户獨選主户有二丁者入正保以故小保有至數十家大保有至百餘家都保有至數百家人數過多地分闊逺一保有犯連坐者衆盖立法之初有所未盡欲令開封府界五路依諸路編排詔自今保甲三年一造簿編排開封府界五路候造簿日如所請施行權發遣鹽鐡判官提舉成都府利州秦鳳熙河等路茶場李杞言賣茶博馬乃是一事乞同提舉買馬嵗以萬千匹為額詔杞兼提舉買馬且以二萬匹為額二年取㫖詔河東路民田蠲税及八分以上並權倚閣司農寺言江東淮浙災傷當賑糴聞江南西路糓稍賤乞遣知咸平縣殿中丞呉居厚計置及於荆湖路兊糴應副居厚豫章人也又言本寺㸃檢諸路拘賣坊塲河渡鹽井碾磑之類簿書滅裂欠失官錢欲委提㸃刑獄司選官取自拘賣以來至今年終文案并敕條驅磨申寺㸃檢校其驅磨精麤案為賞罰從之河東路察訪使李承之言太原府十二州軍夏秋税外有和糴糧草最為弊法以其量支價錢雖遇荒歉無例檢放縱許倚閣亦次年催納雖官給錢布萬數不少而民所得㣲細全無所濟若直减一分而以錢布買一分糧草自可得足兼改為正税即送納割移事之簡便遇災傷例得檢放不煩逐時奏請倚閣詔河東都轉運司勘㑹以聞其後都轉運司言無例除放遂已朱本削去以為不曾施行新本從之今復存此癸丑司農寺言開封縣賖借粳米價錢六萬緡多失催理無簿籍案驗又失催常平錢四萬餘緡并所散坊場錢八千緡及不開修𦂳急溝瀆知縣胡宗堯乞差替詔宗堯衝替令司農寺具前府界提㸃呉審禮劉淑蔡確違法事以聞後淑審禮確坐各有失㸃檢諸縣違法事展磨勘二年淑又坐不肯簽書發摘祥符縣違法申司農状與堂除合入差遣仍令件析違法事以聞十二月十四日展年别與差遣今并書件析違法事後無所見又言咸平新鄭白馬酸棗等縣推行簿法均定役錢榜示民户並無辭訴聞諸路官吏多未通曉欲乞府界令佐造簿已畢通曉法意者從本寺遣勾當公事指教諸路造簿及推行常平給納新法催理舊欠常平免役坊場等錢榖候一路指教推行畢比較課最量材擢用從之仍候舉到官中書審察與差乙夘詔司農寺支坊場錢三十萬緡為鄆州市易本錢中書言審刑院詳議官大理寺詳斷官皆親書節案乞止令圈節付吏冩録并减詳議官一員詳斷官二員從之審刑院大理寺言有䕃人楊仲甫百姓賈沆等十一人傳謗訕時政文字罪當徒㑹赦詔仲甫沆刺配荆湖南路本城餘編管淮南京西路丙辰手詔先皇帝自齊州防禦使入繼統治平二年建為興徳軍今潜邸建佛寺宜以本封之鎮名之可賜額興徳襌院賜淤田三十頃又詔自今在京及開封府界聼行折二銅錢又詔絳州垣曲錢監封樁三司銅錫本錢并脚錢内以十萬緡借河東轉運司市糧草詔京朝官選人使臣等試經書律令大義斷案等上等第一人與循資在京刑獄司差遣中等堂除下等注官換官者凖此上批汴水漲甚見深一丈二尺可大急令都水監那官一員前去上流相度减放湏管旦暮退落已而中書進呈水尋退落訖丁巳提轄修完京城宋用臣言䕶龍等河逼城不可修築乞度地髙下開展河道從之詔初除團練使以上許陳乞親属一人優便合入差遣遷節度觀察留後以上更陳乞一次上批翌日教營陣可令曾孝寛暫徃觀視其法有無未安便者以聞二十八日上批要見後來如何舊紀丁巳聞八軍於城南實録亦在丁巳今從上批并入九月乙丑戊午二十九日上批問樞宻院程昉見造車在何處及已造成若干數目令昉具奏詔自今入内内侍省使臣寄崇班已上資序者並不得本省一面勘罰如禁中違犯即按舉具事状聞奏送樞宻院取㫖施行其有直奉㫖止令本省勘者聼臨時指揮御集係八月空日今附此中書進呈户房乞下兩浙提舉水利及轉運司各差官定騐兩浙興修水利不當事上曰沈括所差官即運司管不得運司所差官即在安撫使轄下可差侯叔獻去否王珪曰侯叔獻不可去王古今在河南乞就差古吕恵卿曰修隄岸極是好事如民間蓋屋是要宏壮是要低小必宏壮乃是隄岸要築得髙但湏量人力以漸為之蘇州臣等皆有田在彼一貫錢典得一畆嵗收米四五六斗然常有拖欠如兩嵗一次上田得米三斗斗五十錢不過百五十錢而令一畆田率二百錢有千畆即出錢二百千如何􅂸得此錢若興工當亦不為虚費又以五等法定田土功之法纔髙低三五寸便極争事田土豈能盡如砥平高田有低處低田有高處有取土逺處計料不盡便湏陪錢米始得兩浙要開涇洴因取土為隄最為便昨来陳納乞如此立法沈括不以為然上曰元立法誠有不盡處沈括言涇洴太深則難車水僉曰沈括妄説蘇州田皆在水中惟患水多豈怕難車水但開得深則旱嵗可以畜水淺則易乾然開深最難必取三兩尺浮泥然後可以取土前日見括意便待與張靚做頭底大抵人言事雖是一般違戾有沮壊朝廷法者不可一例看上曰出則無法家拂士者國常亡恵卿曰此事惟陛下深察之吕恵卿日録載此於八年八月二十九日今附見沈括體量安撫淮浙在八年七月二十三日張靚時為兩浙運副王古相度淮東役法因體量淮東及兩浙災傷在六月二十四日不知竟差古定驗水利否陳納事當考是月割昭州龍平縣𨽻梧州廢永州零陵寨
