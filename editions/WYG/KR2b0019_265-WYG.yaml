body:
  text: 續資治通鑑長編巻二百六十一宋李燾撰神宗熙寧八年三月癸巳朔詔分熙河路正兵三萬三千參以弓箭手寨户蕃兵為四將以都鈐轄王君萬為一將都監王崇拯副之鈐轄韓存寳為第二將李浩副之桑湜為第三將都廵檢王湛副之鈐轄劉惟吉為第四將都監馬忠副之仍詔湛權發遣本路都監其下畨軍馬隨地逺近分𨽻諸將令本將選官訓練經略司度無邊事即令正副將每季互往下畨州軍提舉教閲時遣樞宻院檢詳文字劉奉世同陜西諸路帥臣分兵置將先以熙河路來上也舊紀云分熙河秦鳯涇原環慶路兵為十七將提舉河東路義勇保甲司請五路州縣鎮寨城内居人並團保甲詔諸路察訪司與坊正同詳定以聞上批近沈括建議邊郡城中置坊設垣為門以備姦伏契勘熙河岷州新創民居未多宜易施行可先劄與經略司仰相度畵圖聞奏括議設坊附八月四日癸巳詔任管軍步軍副都指揮使以上死許借空閒官宅居止毋過三十楹服闋還官甲午命知制誥沈括同知諫院范百祿赴御史臺推李逢等公事蹇周輔鞫逢反謀得右羽林軍大將軍秀州團練使世居交通狀故有是命世居南陽侯從贄子也丙申中書言沂州鞫李逢等反逆結構有端而本路提㸃刑獄王庭筠等先奏逢無大逆謀告人妄希賞顯不當詔并劾庭筠先衝替見鞫李逢等更切研窮旋具情節奏知仍速具告發當酬奬人數以聞庭筠自縊而死捕世居及醫官劉育繫御史臺獄詔御史臺差官同中使即世居及育家索圖䜟書簡等朱史簽貼云取㑹别無自縊死因依前史官載此意謂詔獄逼人致死誣誕可知刪去新史復存之今從新本沂州言第三等以下户欠去年殘零秋稅乞權倚閣俟豐熟催輸從之丁酉虞部員外郎沈披換禮賔使權發遣河北縁邊安撫副使詔秦鳯等路都轉運司相度所鑄大鐵錢約補足所廢監錢數及充交子本錢外不須廣鑄委熊本總制營辦正月二十四日皮公弼云云二月二日委公弼營辦鑄大錢本志云詔鑄大錢才令補所廢偽錢及可以待交子所用而止九年正月二十七日罷交子賜兩浙路常平米二萬石賑濟潤州饑民戊戌知成都府龍圖閣直學士蔡延慶言本路盗頻發雖編敕再犯許配本州而川峽本城請受價優投軍者衆若犯盗配本城則是因盗得利盗必滋長又川峽計贓以鐵錢二當銅錢一加之案問欲舉率皆減等贓重者猶不至配法無所懲艾欲令情理重者申都鈐轄司詳酌配出川峽近東州軍從之知河州鮮于師中乞置蕃學教蕃酋子弟賜地十頃嵗給錢千緍增解進士為五人額從之詔自今得封三代者并妻追封以樞宻副使王韶子厚言韶妻亡獨不與封故也詔自今宗室換官并外居者並屬大宗正司廢都鹽院令外物料庫管勾支納煎造己亥上批沂州淮陽軍災傷特甚百姓不惟闕食農乏榖種田事殆廢粒食絶望糾集為盗實可矜憫若不優加賑恤恐轉致連結羣黨難於擒捕陷溺良民投之死地可速指揮遂詔京東東路轉運提舉司發常平錢省倉米等第散給及貸以和買絹錢孤貧户聽差待闕得替官就鄉村依乞人賑濟道殣無主官為收瘞之詔秘書監王端追一官與宫觀差遣坐前知鄭州伐園木為薪以自入及報上不實法寺當追官勒停而詔免勒停故也九年五月十九日竟坐除名勒停端本傳云端御下肅猾吏病之在鄭日園吏取枯枿供㸑御史劾其自盗坐奪一官權提㸃河東刑獄謝卿材請禁流民毋入代州火山岢嵐寧化軍界從之庚子遼主再遣林牙興復軍節度使蕭禧來致書見于紫宸殿書曰昨馳一介之輶傳議復三州之舊封事已具陳理應深悉期遵誓約各守邊陲至如創生事端侵越境土在彼則繼有於此則曾微乃者蕭禧才廻韓縝續至薦承函翰備識誠悰言有侵踰理須改正斯見和戒之義且無違拒之辭尋命官僚同行檢照於文驗則甚為顯白其舖形則盡合拆移近覽所司之奏陳載詳兹事之縷細謂劉忱等雖曾㑹議未見凖依自夏及冬以日逮月或假他故或飾虛言殊無了絶之期止有遷延之意若非再憑緘幅更遣使人實虞詭曲以相䝉罔罄端倪而具達更希精鑒遐諒至懐早委邊臣各加審視别安戍壘俾返舊常一則庶靡爽於隣歡一則表永敦於世契儻或未從擗割仍示稽違任往復以難停保悠長而豈可微陽屆候善嗇為冝三月八日庚子禧初入見四月五日丙寅禧辭留二十七日七月戊辰猶不行留二十九日行日未見閏四月三日甲午上云蕭禧才去便無人論北事更湏詳考上批付韓縝等聞蕭禧今日見罷歸館意甚不樂來日㑹食次卿等可且以歡和接之早來垂拱殿已曾再三諭卿等以自鴈門寨新舖以西直接石長城便是邊人指為分水嶺及蕭禧齎來劄子内地里亦合因何適來禧叩問南朝指分水嶺係近裏地分要得的確所在卿等可執定指示與禧令曉然凖信兩朝誓書冊内韓縝等館伴泛使所受御前劄子凡六道此第一道也不知是何月日姑附蕭禧入見後辛丑召輔臣對資政殿命兵部郎中天章閣待制韓縝西城閤門使樞宻副都承㫖張誠一乗驛往河東及遼人㑹議地界速結絶以聞縝初使乃七年三月二十七日舊紀云縝誠一代劉忱吕大忠遣開封府推官鄭遵度同宗正丞籍世居家財付管勾使臣主守乙巳大宴集英殿蕭禧預焉曾布云云丙午召輔臣對資政殿是日清明節也王安石云云上批河北教閲廂軍已議增置吳充嘗請推行保丁於廵檢下上畨條目可速相度果決施行恐緩急有失支梧於邊計實非小事先是充言河北民兵雖多而未見可用之實臣愚謂宜稍約京畿法分番在廵檢下教閲代禁兵歸𨽻諸將有事用為守城兩路正兵約五萬五千人若代以民兵夏季免上畨外嵗為三畨共四萬五千人以今民數計之七年有餘一當上畨遇上畨年與免冬教日給口食比招教閲廂軍嵗可減緡錢五十七萬不惟省費又民兵訓練不獨可守城而已既下提舉保甲司相度未報至是上批趣施行遂詔提舉義勇保甲曾孝寛與司農寺兵部先相度以聞其後孝寛等言乞候教閲精熟令畨休代近邊廵檢戍兵其分認地方上畨日限及諸條約令提舉官詳度聞奏從之閏四月二日孝寛等乃上言詔可朱本去彼存此新本兩存之誤也今從朱本然閏四月二日詔并及河東此乃無之當考江淮發運使羅拯言泉州商人傅旋持髙麗禮賔省帖乞借樂藝等人上批已令教坊按試子弟十人可借呼第四部給色衣裝錢作拯意奉詔遣往傳習畢早令還朝畫塑工俟使人入朝遣往樞宻院再進呈廼罷不遣朱史以為無足書刪去新史從之今從舊史戊申詔御史臺責醫者治世居疾又詔縁世居事應逮之人具年貌下諸路告獲一人賞錢三百千又詔乃十七日今并盡皆可削詔軍士祖父母父母老疾無男子兼侍而在他處應募者聽移就祖父母所在一等軍分從淮南西路提㸃刑獄司請也龍圖閣直學士提舉中太一宫孫永知潁州己酉上批昨日擬定廻付蕭禧劄子雖有已差官商量結絶之語尚慮禧以未有擗劃明白指揮不肯承受卿等可詳議中書樞宻院言北書既云早委邊臣各加審視别安戍壘俾返舊常審視見有無侵越逺近然後可别安戌壘今慮劉忱等堅執前議難有商量所以改差官令計㑹遼國所差官商量結絶即於北書之意别無違阻惟是蕭禧於北書意外堅求果决恐難狥從臣等議欲止依昨日擬定從之罷吕大忠河東路同商量地界先是大忠屢求罷上雖許猶須蕭禧還乃聽終䘮已而上召執政議大忠與劉忱俱入對上意頗欲從敵所請衆未及對大忠進曰敵他日若遣魏王英弼來盡索闗南地陛下將欲從之乎忱復進曰大忠所言社稷至計也願陛下熟思之上黙然於是改命韓縝令大忠反䘮服不知劉忱有何指揮當考按邵氏見聞録云熙寧七年春契丹遣泛使蕭禧來言代北對境有侵地請遣使同分畫神宗許之而難其人執政議遣太常少卿判三司開拆司劉忱為使對便殿曰臣受命以來在樞府考核文據未見本朝有尺寸侵彼地且鴈門古名寨雖跬歩不可棄奈何欲委百里之疆以資敵乎臣既辱使指當以死拒之惟陛下主臣之言幸甚帝韙之忱出疆帝手敕曰彼理屈則忿卿姑如所欲與之忱不奉詔以秘書丞吕大忠為副使命下大忠丁家艱詔起復未行忱亦使囘敵又遣蕭禧來開天章閣召執政與忱大忠同對資政殿論難久之帝曰凡敵争一事尚不肯已今遣兩使豈有中輟之理卿等為朝廷固惜疆境誠是也然何以弭患大忠進曰彼遣使相來即與代北之地若有一使曰魏王英弼者來求闗南之地則如何帝曰卿是何言也大忠曰陛下既以臣言為然今代北安可啟其漸忱進曰大忠之言社稷大計願陛下熟思執政皆知不可奪罷忱為三司鹽鐵判官實録亦略見獨忱事殊無可尋姑存此竢博訪之忱受命乃七年三月二十五日壬戌軍器監上所編敵樓馬面團敵法式及申明條約并修城女牆法式詔行之庚戌賜京東常平米五萬石以上批聞京東徐單沂州淮陽軍比嵗災傷雖今夏豐熟百姓尚饑可賜米萬石責監司以時募民修水利及完浚城塹庶人不乏食故也辛亥江南東路轉運司言宣城南陵兩縣災傷乞倚閣第三等以下户去年秋租納輸及八分者又言宣城縣化成圩去嵗旱蝗而令佐不受訴状乞檢放二分從之仍令轉運司劾令佐以聞又詔階州民經蕃賊焚廬舎者今年夏秋二稅悉蠲之河北西路察訪使沈括言􅇏臺髙下踈宻未便乞别定起納道路并舊􅇏臺圖上詔如括議仍令定州真定大名府路安撫司未得興工候有事宜併工修築括自誌乃無此㑹要可參考朱本云一時備預事不足書削去壬子召輔臣對資政殿癸丑右正言知制誥沈括假翰林侍讀學士為囘謝遼國使西上閤門使榮州刺使李評假四方館使副之蕭禧久留不肯還故遣括詣敵廷面議括時按獄御史臺忽有是命客皆為括危之括曰顧才智不足以敵愾為憂死生禍福非所當慮也即日請對上謂括曰敵情難測設欲危使人卿何以處之括曰臣以死任之上曰卿忠義固當如此然卿此行繫一時安危卿安則邊計安禮義由中國出較虛氣無補於國切勿為也沈括自有乙卯入國奏請并别録載使事甚詳須參考别修此月二十九日對資政閏四月五日論改使名合附此今注在閏四月五日或移入此詔兩浙路常平司續給米二萬石賑濟常潤州饑民甲寅改命太子中允開封府推官王欽臣假太常少卿送伴遼使皇城使兼閤門通事舎人夏伸副之代向宗儒王澤也宗儒澤仍各罰銅二十斤初宗儒等接伴蕭禧禧欲以行李至䧺州北亭交轄宗儒等止之禧有不能更去之語上恠宗儒等為國生事仍坐嘗奏請約囘泛使及在道問蕭禧是來理疆界否特罰之止蕭禧行李在二月二十二日上批今遣沈括等行而事有當豫慮者蕭禧未還止之不令過界一也接伴久不至二也過界三五程止之令俟蕭禧三也到敵帳先問來意直俟以分水嶺為界方得朝見四也雖得朝見延之穹廬中須令用分水嶺為界五也使人既來許以分水嶺為界即引兵拆移舖屋徐遣括等還持謾書來報云既商量不從己令兵馬往彼拆移訖使朝廷知既未是絶好如何為處六也使人至輙苦辱之或授以惡馬使顛仆於山谷中或詐為賊潜來傷害既不顯國中之意如何為處七也中書樞宻院其議應之所宜中書樞宻院言分水嶺既不可許蕭禧又未肯辭欲通兩國之情則泛使不可不遣彼以禧未還而不納或納而接伴未至容或有之然且遷延境上以示我無絶好之意於義無傷則彼亦難怪禧之稽留無由發怒若必邀使人以分水為界則許與不許豈使人所敢專就令屈從豈足為信若不候使還彊移舖屋前已詳議屈伸在我且為後圖本朝與之通好多歴嵗年使人之來禮義甚厚今雖未允所求固無激怒之事苦辱使人恐無此理上然之吕恵卿家傳云云附注在四月五日丙寅蕭禧入辭下或移注此北京留守司言西福順天王院舊有塼藏收瘞軍士遺骸一嵗度人為僧詔每三嵗度一人乙卯閲諸軍轉員三日止舊制捧日都虞候四人至是五人而馬軍都指揮使但闕驍騎一人以捧日一人補驍騎軍主餘四人如故則以次軍分皆不得遷乃補四人者並為馬歩軍副都軍頭又以龍衛拱聖驍騎武騎寧朔神騎舊百三十一指揮使後省五十指揮而見管馬軍指揮使以下已補八十一指揮正額外數猶有餘乃於所省指揮内未移併者四十三指揮且置下名指揮使副使各一人軍使三人以便第遷河東路察訪使李承之言饑民羸困老弱疾病及遺棄男女未有所歸雖日受官米力不能自食恐無以稱朝廷賑恤之意乞聽本司存養至閏四月終罷從之丙辰詔都提舉市易司遣官於麟府路博買耕牛給借環慶熙河路蕃部弓箭手沅州奏比建州學今聽讀者已多乞賜國子監書庶一變舊俗皆為禮義之民從之丁巳詔韋城縣至京廻送泛使龍衛虎翼軍士特給口食人日二升以上批蕭禧未行禁兵在外坐俟乏食或犯法故也詔聞諸路寄招兵士發遣赴京道路饑死者衆其令所過州縣遇有追同行人不及者日食别給小歴病疾遣人醫治戊午太白晝見己未詔河北西路常平司出米三萬石貸懐州武陟衛州共城饑民特免輸息史館修撰宋敏求言奉詔續修國朝㑹要乞差著作佐郎館閣核勘林希光禄寺丞李徳芻為編修官詔以希充檢閲文字徳芻有贓罪令刑部定是與不是入已贓以聞其後刑部言徳芻所犯係入已贓不復差詔北使所過州軍縣鎮監驛使臣不許差出是日上謂王安石曰小人漸定卿且可以有為又曰自卿去後小人極紛紜獨賴吕恵卿主張而已因稱吕恵卿兄弟不可得安石曰諸兄弟皆不可得和卿者臣初不知其人昨送臣至陳留道中與語極曉時事安石又曰臣父子䝉陛下知遇所以向時每事消息盈虛以待陛下深察誠欲助成陛下盛徳大業而已小人紛紛不敢安職今陛下復召用臣所以不敢固辭者誠欲粗有所効以報陛下知遇然投老餘年豈能久事左右欲及時粗有所効望陛下察臣用心上曰固所望於卿君臣之間切勿存形迹形迹最害事上問外事安石具道雖勝往時然監司未盡稱職上曰人材止如此安石曰誠是人材少然亦多觀望不盡力縁盡力則犯衆怨犯衆怨則中傷以法而朝廷或不能察不能察則反得罪不如因循偷惰之可以自安外官固未論如吕嘉問内則犯近習貴戚外則與三司開封日夕辦事以守職事行法至於置獄推究姦罔具得而嘉問乃以不覺察雜買務剰收入情願納息錢二貫降小處知州若剰收息錢可罪監官宜不免監官以去官獲免則嘉問是因罪人以致罪如何更有罪可科且自來提轄場務諸省寺之屬何嘗有坐轄下場務不覺察杖罪降差遣者天下皆見盡力為朝廷守法立事如嘉問者不容則孰肯盡力不為因循偷惰之行上曰嘉問已與復差遣安石曰李直躬之徒作轉運却令嘉問提舉便糴此豈官人之宜上曰與移一路轉運安石曰陛下必欲修市易法則須却令嘉問領市易上曰恐吳安持忌其來又復失安持心安石曰臣以女嫁安持固當為其審處今市易事重須嘉問與協力乃可濟不然他時冇一闕失必更上煩聖慮乂薦嘉問及張安國可為宰屬上皆以為可此據日録安石復相不知果用何日入對此乃第一事今備存之更竢考詳恐安石對上非第一事然觀上所云自卿去後小人紛紛及安石稱不敢固辭則似初見時所説也獨賴吕恵卿主張恐是安石託詞更須考詳李直躬去年十二月十二日自提舉糴便為淮東運使庚申詔陳留縣置龍衛帶甲剰員兩指揮雍邱縣置雲騎帶甲剰員一指揮各以四百人為額不給馬雲騎請給視武騎從樞宻院請以處龍衛雲騎退卒也中書言進士王致堯狀伏覩條制武舉比科塲開設自來進士唱名後四五月間方始差官兵部鎖試發解以此致進士兩處投下文字失解後旋看兵法權習弓兵意務茍進就試日多懐匿文字飾以虛辭弓馬不甚精習不惟有誤朝廷緩急使用兼使學者不專其業欲乞將來武舉與進士同時差官鎖試欲依所請詔自今武舉與進士同時差官鎖試此據㑹要增入元豐三年六月九日可考辛酉晦召廻謝遼國使沈括副使李評對資政殿括於樞宻院閲案牘得契丹頃嵗始議地畔書指石長城為分今所争乃鴻和爾山相逺三十餘里表論之是日百司皆出沐上開天章閣門召對資政殿喜愕謂括曰兩府不究本末幾誤國事上自以筆畵圖使内侍李憲持詣中書樞宻院切讓輔臣使以其圖示敵使議乃屈上遣中貴人賜括銀千兩曰微卿無以折邊訟實録繫召對沈括等於此三月二十六日戊午今移見二十九日辛酉晦此據括自志當考又王安石日録八年四月二日上怒劉忱與契丹議地界不分明余為上明忱無罪乃吕大忠作圖不分明有罪也不知大忠所圖如何不分明當考按戊午二十六日别無假故不知百司何縁皆出沐當考二十八日庚申亦無假故應是二十九日辛酉晦也今移見月末恐括先以二十六日奏此二十九日乃入對也韓宗武作韓縝遺事云沈括罷三司使余於城外叙别括曰君臣問難知素日前猶見許大用宗武歸具為縝道此縝曰安有此事三日前上云沈括誤朝廷三事謂厯法地界役法也此事當考括使還附六月二十二日壬子沈括乙卯入國奏請并别録今附注此三月二十六日奏乞宣諭館伴等俱曉分水嶺本末事云臣等竊聞昨夜蕭禧在驛與館伴將元執到白劄子商量王吉地義兒舖鴻和爾山石長城瓦窑塢等處已定只是尚執分水嶺未肯了當臣等今有所見雖不知是否或恐有助對答折難之意如後一蕭禧既承認鴻和爾大山北面為界則明知元不以雪山鴻和爾山牛頭山照望為界之意自鴻和爾之南界至已定乞令館伴通曉宜無稍及照望之語一蕭禧堅執以分水嶺為界臣等以謂若令館伴及定地界官依下項剖析得事理分明即除鴻和爾大山一處已經定奪不可改移外其餘雖悉許以分水嶺為界亦無所妨今具逐叚地分如後王吉地及瓦窑塢見今標與北人處已是分水嶺别無可争鴈門寨即今來移退義兒舖及三小舖處已是分水嶺别無可争西逕寨地分第一第二第三第四第五逺探白草舖一帶便是分水嶺當初本朝為執定長連城為界則分水嶺是近裏地分今來既自白草逺探等舖一帶照望石長城割與北人即已是用分水嶺竊慮館伴不見得此意度尚惑牛頭雪山照望為分水嶺多方廻避却致北人猜疑據三次國信文字北人之意元不至此欲乞子細宣諭館伴及定地界官令具曉本末但望指定白草舖一帶是分水嶺却明與此處以分水嶺為界不妨又三月二十八日資政殿進呈所争界至地名白劄子云一蔚州地分本朝元以秦王臺古長城為界北人稱以分水嶺為界所争地東西約七里以上一朔州地分往前已經定奪以鴻和爾大山北脚為界今來北人稱以鴻和爾大山分水嶺為界所争地南北約三十里一武州地分本朝以􅇏火舖為界北人稱以瓦窑塢分水嶺為界所争地南北十里以上一應州地分本朝以長連城為界北人稱以水峪内分水嶺為界其分水嶺即無山名元不指定的實去處後來因劉忱等累行問難須要指定分水嶺山名後來梁頴等對答稱自雪山照望鴻和爾大山牛頭山一帶分水嶺為界所争地南北約十七八里貼黄治平二年因北人侵越地分採木盖舖代州累曾移牒北界請嚴行戒約却凖順義軍牒稱勘㑹圖經元載西自雪山南邉嶺至鴻和爾大山東北照望牛頭山一帶分水嶺為界又上項治平二年順義軍牒内又稱貴州於當界地分赤泥泉叚家堡招誘户民請射住佃堡其長城自西陘口取鴻和爾大山北面過赤泥泉叚家並是當道近裏地方請先拆去上項村堡當道即於西陘鴈門口内長城北久逺安立舖形又日後凡係與北人言語文字且乞都不令渉着蘆芽雪山牛頭山照望之意却恐縁此引惹詞説又所争處地里只是略訪聞得定地界使臣口説别未有文字照證又耶律榮執到文字内有以石長城為界於地界第一册内簽出又蕭禧執到文字内有以石長城為界於地界内第一册内簽出又梁頴稱雪山照望牛頭山文字在河東路商量地界第五册内簽出臣等早來於資政殿進呈白劄子一道并續簽貼到事節謹具繳連進呈三月二十八日又奏云臣等伏見朝廷近以北人徼請地界累有文字據理折難斷在不與今來始聞聖慈為民敦好欲議俯從所降指揮若復具存折難之言然後與之萬一禧有難受之義改之則愈損事體不改又恐未即祗受且契丹㣲類但當藐之彼自不能窺測使詔辭稍近平易免致改易頻數則朝廷之體自重涿州牒䧺州議括等使名今附注在閏四月五日丙申與四月五日丙寅及六月二十二日壬子並合參考
