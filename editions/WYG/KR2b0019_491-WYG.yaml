body:
  text: 續資治通鑑長編巻四百八十七宋李燾撰哲宗紹聖四年五月甲寅朔御文徳殿視朝以及第進士何昌言為承事郎簽書武寜軍節度判官方天若為曹州節度推官胡安國為常州軍事判官三月十日乙卯知福州温益言京東姦民多匿深山窮谷之間時出為盗請應重法地分山谷僻逺處獨居無常産者並遣居近裏鄉村團結成保從之温益已見四月丙辰工部侍郎王宗望等奏凖敕北郊應縁祀事儀物及壇壝道路帷宫令計度盡圖聞奏今檢視西北隅逼近街道若修盖望祭殿委是窄狹今比類南郊青城掇移近東與本園南北門照直修盖事御批可並依擬定圖状疾速下將作監修盖仍存留見役添修玉津園兵匠等應副充役及差元同相度入内東頭供奉官勾當御藥院劉友端共管勾修盖内有圖状今来該説未盡事件即許随冝臨時施行丁已降授太子少保潞國公致仕文彦博卒詔特輟視朝一日後數日樞宻院奏事上顧曽布曰彦博已死布曰老而不死終被謫命乃即世上曰此人極不佳布曰臣常以為背負先帝莫如此人元祐中年已八十一此時但能不来足以保富貴既不免来又附㑹如此上曰非止附㑹語斥先朝甚不遜布曰如悔過還主之類殆非臣子之所宜言林希曰安燾亦曽面折此語上曰燾猶能折之况他人乎布又言朝廷近日施行元祐中人若事状曖昧非衆所聞者皆臣之所不知至於詆斥先帝非臣所宜言者雖肆諸市朝孰敢以為過但在朝廷以仁政優容爾因言彦愽皇祐中為唐介所擊是時介雖貶英州别駕然不乆便収用上問介所擊云何布曰為在成都時作燈籠錦獻貴妃以此進用事連宫禁故介亦痛貶臣適方與林希言祖宗朝侍從言事官以事黜謫不乆即召用未嘗有以一言終廢者如介作英州别駕不二三年却作侍從後遂為執政以至神宗時蘇頌為繳李定詞頭落職歸班後牽復便知開封府修言制又孫覺李常在熈寜初最為異論各曽痛貶然元豐中亦皆復召用盖人才難得不可以一言廢一人近嵗得罪外補之人一切不召恐未安願更留聖意上曰須俟年嵗間乃可又曰蘇頌孫覺李常終不堪布曰此輩固在所當謫然朝廷愛惜人材須恐如此元祐中孫覺論議雖有過當如李常亦頗平允亦曽言免役法不可輕改上頷之曽布日録此叚在壬戍日今附己未詔鄜延路聲塔平以威戎城為名四月二十一日進築舊録既於此書賜威戎城名又於八月十七日下再書誤也今止存其一新紀亦附八月戊戍今不取陜西路轉運副使邵䶵永興軍等路提㸃刑獄劉何權發遣提舉秦鳳等路常平巴冝各轉一官以進築聲塔平畢工故也吕惠卿特遷右銀青光禄大夫上於惠卿之除極難之初欲止遷左光禄大夫章惇曰太薄許將亦曰范雍當時自資政便建節舊例除宣徽或節度使者多上曰當除節度使否將不敢對衆唯唯曽布曰惠卿昨進築一寨便遷两官惠卿築平羌寨畢工在三月二十二日遷右光禄却未見月日當時若只遷左正議今日兩寨除左光禄即平允昨一寨遷兩官今兩寨遷一官故疑於薄惇曰惠卿二十三年不磨勘布曰恐未說得及此上曰兼昨改官不曽說此因依只是三寨轉却四官進築自是帥臣職事衆皆稱聖諭極當然事初且欲鼓舞衆人故近推恩帥臣皆太優厚自此雖有進築不須逐寨賞帥臣惇亦曰當如此但今来事初不同兼鍾傳等遷官職已優厚上遂勉從之樞宻院再對上又曰章惇終是照管惠卿布曰昨一寨遷兩官已不當故今日推恩過厚適聞聖諭以為此自是帥臣職事衆莫不聳服然惠卿無亷恥每事志於茍得只如進築城寨却令一子随軍及保眀状中乃云吕淵係臣男子不敢保明却令兵官吕真劉安等保明吕淵稱有勞可賞朝廷亦不免推恩臣亦曽作邉帥亦有兒子作書冩機宜然未嘗敢令與將佐往還况敢預邊事及兵政乎上極笑之布曰章惇去嵗因延安觧圍金明已破惠卿上表待罪但答詔足矣又賜銀絹一千然人言洶􅍅惠卿終不敢當至三請竟依所乞上曰記得布又言惠卿二十三年不磨勘中間自經竄謫如何可理嵗月大約紹聖推恩舊人多過當如蔡確李定軰既已復官職并遺表恩澤亦不减李定家京官三人林希曰不惟如此外方監司軰承望朝廷風㫖人人稱薦李景淵景夏軰要便収用罪廢之家便得京官已為僥倖却便欲不次升擢豈有此理布曰景夏昨曽進擬令上殿頼徳音不許爾上亦哂而頷之實録又於八月十七日再書賜名威戎城今削去惠卿遷官實録乃不書今取曽布日録附見涇原路經略使章楶言勘會臣到本路條上進築之䇿朝廷幸聼其計於三月二十三日會合四路兵建築平夏城靈平寨如期了當尋將逐處軍馬分屯放散去訖縁臣所陳後石門􅄶江川兩處形勢所繫利害尤重控扼好水西山諸谷賊馬来路占據得要害之處比趨九羊谷白草原尤為快便俯逼天都巢穴平夏靈平所占耕地遂免抄掠之患與葫蘆河川東西形勢相為表裏本司近指揮縁邊安撫知鎮戎軍种朴量帶人馬照管平夏靈平兩處官吏修緝次第因令由打破賊堡于後石門􅄶江川子細按視山川形勢道路險易有無水泉當如何措置修築今據种朴彩畫到地圖簽貼圎備臣尋將前所進藁照騐得委實尤為精確又縁夏賊㸃集頻併其力勞弊四月十一日舉國十餘萬衆驀来奔突諸將力戰賊遂敗去度其勢未能再有嘯聚若不乗此機會進築了當却寛嵗月其力稍全則是資㓂飬患邊防之憂未艾也今不避小有煩擾再舉師徒全補藩籬以成暫勞永逸之功臣仰荷國恩當此委寄不敢遷延復將重責遺與後人今且條畫後石門等處進築事件如後一於後石門川下建六百歩城一所正當九羊谷白草原趨天都大路控扼得塔子岔泥棚嶂賊馬来路東去平夏城約二十里一於創廸章建六百歩寨一所東由青沙峴好水河趨靈平寨及照應得石墻子拽木岔賊馬来路北去後石門約一十五里其密鄂克好水一帶山林悉皆包括在裏可以應急采斫使用一於舊􅄶東城下上建六百歩或四百歩寨一所東由密鄂克山桞隂河拽木岔趨葫蘆河大川西控木魚川入懷逺大路及照䕶得定川三川懷逺更無邊面北去創廸章約一十三里南去三川寨邊壕約二十里已上三處可以建築城寨其勢與平夏城靈平寨為表裏足以分據要害制夏賊之死命所有城圍大小及相去道里逺近乞從本司臨時更切相度措置或且先修後石門創廸章兩處其褊江城候事力稍辦方行進築黄貼子今状雖乞先修後石門創廸章兩處尚慮地里差逺見相度事力人情或先築後石門或先築􅄶江或且為一寨或便築兩寨並乞臨時許臣一面相度施行詔並依奏令章楶更切多方體探西賊動息次第委是有間隙可乗決保萬全方得舉動即不管輕易敗事并下劉何巴宜專一應副此據章楶奏議増入楶以五月六日上此其得㫖當别有月日更須徐考之六月二十四日􅄶江賜名鎮𦍑詔梁惟簡男弼陳衍男恂並特除名送瓊州編管户部状凖都省批送同管勾陜西坑冶鑄錢公事許天啟劄子奏奉使陜西經畫銅利京西川路亦許措置該括六路或躬自蹋行或委官相度凡有興發去處而人未協力盖由事權太輕難以驅䇿州縣本司職事今轉運司官兼領京西川路州縣别無條制統攝欲乞應自来鑄錢司所領職事更不令轉運使官兼領通陜西京西川路自為一司州縣約束並依本司陜西已得前後畫一指揮庶幾事權專一州縣之吏有法刺舉則功利可以速成所有其餘應干條制並乞依提舉常平司施行本部看詳鑄錢坑冶職事若同轉運司兼領縁事干本司財計恐有牽制及論議不同其運司人吏亦有畏避顯屬未便兼京西川路銅苖既有朝㫖許本官檢踏措置其逐路坑冶若不令專管亦恐難為集事本部今勘當陜西京西川路應干坑冶職事欲令本官同領餘依所乞事理施行從之此五月六日聖㫖據法冊増入當刪取其要尋申明行下應鑄錢司所領職事更不令轉運司兼領止為銀銅坑冶鼓鑄銅錢職事令許天啟通領所有鑄鐡錢職事自不合干預此六月六日聖㫖今附此字文昌齡云云可考六月十三日乃以京西川路入􅃷十二月十五日又改正刺舉指揮朝奉郎詳定重修敕令删定官孫傑大理寺丞吳景淵並權發遣開封推官庚申中書舍人蹇序辰請自今詞頭如有元行遣文書即同檢送當制舍人從之辛酉詔皇太妃近嘗服藥及雨澤稍愆農田在望宜頒恩宥以導嘉祥踈決應在京府界並三京諸縣罪人知永興軍寳文閣直學士謝景温知河陽詔張詢巴宜專根括安西金城膏腴地頃畝可以招置弓箭手若干人者具圖以聞熙河蘭岷路都總管提㸃熙河蘭岷路漢蕃弓箭手司言蘭州金城闗欲招置歩軍保㨗四指揮各以四百人為額馬軍蕃落一指揮三百人為額從之内蕃落排充第九十六指揮保㨗排充第一百一十九至一百二十二指揮壬戌龍圖閣直學士權知開封府蒋之竒為翰林學士試吏部侍郎邢恕權吏部尚書户部侍郎吳居厚權户部尚書試吏部侍郎李南公為寳文閣直學士知永興軍寳文閣待制知瀛州路昌衡權知開封府詔陜西路添置蕃落馬軍十指揮每指揮各以五百人為額並支馬七分於永興軍河中鳳翔同華州各置兩指揮並𨽻住營州軍將下統制訓練委逐路所屬都總管司選官招人初三省樞宻院同呈以太僕牧租錢於陜西置蕃落馬軍十指揮以五百人為額支馬七分初欲以牧地募民飬馬乆而未集曽布以為不若増騎兵為簡便兼土兵乃勁兵又諸路出戍者已竭及建此議衆翕然皆以為允上亦欣然從之盖牧租見存者七百萬嵗額一百七萬而十指揮之費二十五萬而已故可與募人飬馬之法兼行也甲子觀文殿大學士西太一宫右銀青光禄大夫韓縝乞致仕詔不允已而特授太子太保依前充觀文殿大學士致仕十六日葉祖洽云云曽布云葉祖洽言縝交結張茂則梁維簡及元祐時初附會改更法度事不當降詔不允遂除太子太保致仕不用受遺恩例也翰林學士蒋之竒兼侍讀詔陳衍男慥特送南恩州編管衍并梁惟簡屋宅産業園地錢物並根括籍没入官在京者撥與後苑房廊所京城外者撥與提舉常平司在外州縣者撥與轉運司如有隱漏减落許人陳告罪賞依户絶法舊録云詔陳衍男慥特送南恩州編管衍并梁惟簡屋宅産業園地錢物并根括籍没入官在京者撥與後苑房廊所京城外者撥與提舉常平司在外州縣者撥與轉運司如有隱漏减落許人陳告罪賞依户絶法以惟簡引用陳衍交通執政夑亂朝政也又新録曰交通執政變亂朝政之語意皆誣罔宣仁聖烈今刪去十六字改刪去詔陳衍男慥時送南恩州編管衍并梁惟簡並籍没物産左司諌郭知章言聞諸路守臣嘗於秋夏之間以雨足嵗豐為奏或災歉遂不敢以聞伏望特降睿㫖下諸路州軍嚴行約束雖已奏豐稔而或繼有非常水旱者並具災傷上聞從之朝奉郎安師文言近縁邉修築城寨西賊舉衆入㓂涇原敗衂而去今困於㸃集漸以窮蹙竊聞諸路廣行招納切中事機向日歸明朱智用乆已向漢然為夏國各有把截卓望口舖無縁遂逹中土後因事至邈川先與錫沁手下首領作般擦到熈州宻諭歸順之意後闔家間行歸漢盖邈川與吐蕃部落雜處又喀羅嘉木卓等處日有博奕人情狎熟易為𫝊道語言乞委熈河經略司差諳曉蕃情使臣告諭邈川首領及蕃商等如能誘至指引夏人歸順每名優給茶綵如此則右廂之人必自吐蕃而至者甚衆然自来吐蕃與西夏心相睽貳外示和好更乞宻行經畫詔熈河蘭岷路經略司宻切從長相度施行六月丁未曽布論師文上殿鄜延路經略司言保安軍順寜寨蕃官廵檢供備庫副使劉延慶遣使均凌凌詐投西界招誘到左廂密約歸漢元係左班殿直保安軍順寜寨蕃官元祐六年投蕃今復歸漢已書填空名宣補充右侍禁依舊住坐其劉延慶及均凌凌乞優與推恩詔劉延慶轉一官均凌凌與下班殿侍仍支錢十萬乙丑淮南轉運副使陳祐甫言嚮任外都水監值澶州小吳埽黄河抹岸臣與都水監丞蘇液均被罪黜後臣復叨任使官亦随進而液退居里閈不復出仕逮今十五餘年䝉聖恩擢提舉開封府界常平其寄禄官尚仍舊秩欲望檢詳蘇液轉承議郎迄今年月還其合該磨勘官叙詔令吏部併與磨勘新削丙寅詔以歸信容城知縣左侍禁廉嗣復為閤門祇候縣尉左班殿直王楹轉一官更减三年磨勘指使三班差使楊齊轉一官百姓張保桂竧並與三班借使先是有北賊三十餘人入界為擾保竧告嗣復等盡掩殺之故有是命樞宻院言陜西河東逐路經略司并提㸃熙河蘭岷等路漢蕃弓箭手教閲等事今看詳欲漢蕃弓箭手委將官及所屬州縣城寨官司常切訓練不限定所習事藝名目惟務精熟及習知出入戰陳次第其有馬者須調習馳驟每遇農隙委經略司選官或躬親推排㸃閲支賞又漢蕃弓箭手並令分為四等以膽勇武藝卓然者為竒兵有戰功武藝精熟人為第一等以未曽立功事藝精熟人為第二等以武藝生疎人為第三等委逐首領人員依格推排等第置籍抄記單名遇有増减於簿内開収又㸃閲止随所習事藝按試如第三等内出衆者陞為第二等候㸃閲訖等第支賞從之新本削去丁卯樞宻院言昨興復衛州淇水第二馬監潁昌府單鎮馬監日有死損費芻秣减租課官吏俸給所用不貲詔衛州淇水第二馬監潁昌府單鎮馬監並宜廢罷内淇水第二監馬盡數起發赴太僕寺單鎮監據現管馬均給永興軍秦鳯等路都總管司應副新招換蕃落軍兵所有牧地仰太僕寺措置以聞又言太僕寺樁留堪配軍馬五百匹凖備朝廷緩急支用院監見管合配軍馬八百二十三匹諸軍班闕馬不少太僕寺見管雜馬又過於樁留之數虛費人兵看管詔令太僕寺今後樁留堪配軍馬及雜使馬共四百匹每院各飬一百匹外仰盡數支使輙於數外占留者坐之新刪舊今用之涇原路都總管司言本路諸軍支填七分官馬外内新馬未堪披帶外曰有死損乞將諸路就糧馬軍權支填八分馬候事冝息日依舊條支填從之新無戊辰給事中葉祖洽為吏部侍郎江淮荆浙路發運使吕嘉問為寳文閣待制知青州正月十九日為發運九月末李深云云翰林學士林希言乞出官使臣亦依進士試䇿三道從之林希以學士改知樞在四年閏二月此不應猶稱學士當此時蔡京為承㫖蒋之竒為學士已已給事中葉祖洽言伏見韓縝在垂簾之初首被擢用位登宰相中外皆以為縝是張茂則梁惟簡所引若非隂有交結何以得此其迹著明當時物論已為不平縝當以罪廢遭遇先帝特加㧞擢致位樞長其恩可謂厚矣而縝不顧亷恥附會中貴遂於垂簾之初與司馬光並處台席光等更改先帝法度略不聞縝有力爭之言惟務謟事光等以持禄飬交可謂不忠於先帝也終縁言者排擊而去然縝終元祐之間保身將相窮極富貴莫敢指議若非内有所附聲勢足以動人豈能偷安如是之乆耶臣竊以士人在元祐間非與權要貴近有所干渉則美官要職從何而得臣嘗見紹聖時政記亦有此論故近来朝廷察當時有所附會而得差遣者雖寺監之類尚能罷去縝於是時出將入相風采氣熖終元祐之際不衰天下士大夫指以為漏網而朝廷待遇恩禮始終與元勲故老無異士之有識者莫不怪之夫附㑹司馬光等得寺監丞之類尚不容於今日而附會茂則惟簡之人致身將相却容幸免叅酌輕重典刑不均非公朝所以示天下也所有不允致仕録黄臣未敢書讀中書舍人蹇序辰言竊觀葉祖洽繳駮韓縝録黄謂縝専以姦慝保全名位乞特加削奪放歸田里臣不知朝廷以祖洽所論為是或以為非若以為非則因祖洽之言已罷降不允之詔矣若以為是則太子太保乃是前宰相致仕例所除官兼龎籍梁適舊不兼大學士而縝得兼之未有罪惡之大如祖洽所陳而恩命反過前比也臣以祖洽所言考朝廷所行名實義理俱為未稱是以未敢具草詔令沈銖命詞行下邵伯温云韓縝有心術章惇畏之凡元祐執政從官惇必以事中之獨不敢及縝方遷謫諸公時縝以節度使知頴昌觀文殿大學士領宫祠盖惇慮縝能害已也至縝死方使葉祖洽言不與贈謚而已新錄辨誣曰按韓縝雖致位將相無可紀述以為不顧亷恥附㑹中貴則無所據至云上人在元祐間非與權要貴近有所干渉則羙官要職何從而得意在譏切垂簾之政今並刪去三省言按梁惟簡陳衍在元祐時内挾黨類外交權臣邪謀詭計無所不至頼宣仁聖烈誠心徳意不能動揺皇太后皇太妃保祐擁䕶朝夕備至故惟簡衍不得逞其姦心原其罪惡族滅為冝陛下寛仁止從投竄然聞惟簡尚有親戚供職禁中此曹私心各懷危懼何可更充内侍伏乞聖斷索惟簡衍親戚并素所厚善者屏逐出外詔入内内東頭供奉官寄内殿承制蘇舜民入内内東頭供奉官馮章入内内侍殿頭韓侁劉淵入内内侍髙品曽燾内馮章曽燾各降一官並送吏部添差逺地監當入内内東頭供奉官寄内殿崇班鄧舜賢降見寄官送内侍省入内内侍殿頭蘇慥入内内侍黄門邵琦竇瑛入内貼祇候内品胡宗傑入内内西頭供奉官李世長馮説已上並本官送内侍省内侍省髙品楊偁追兩官勒停送全州編管張繼安與逺小處監當入内使臣黄定國王遘與依見寄官轉出霍肅王昭安周珣並以本官送内侍省舊錄云三省言按梁惟簡陳衍在元祐時内挟黨類外交權臣邪謀詭計無所不至頼宣仁聖烈誠心徳意不能動揺皇太后皇太妃保祐擁䕶朝夕備至故惟簡衍不得逞其姦心原其罪惡滅族為宜陛下寛仁止從投竄然聞惟簡衍尚有親戚供職禁中此曹私心各懷危懼何可更充内侍伏乞聖斷索惟簡衍親戚并素所厚善者屏逐出外新錄辨誣曰此一叚惟推尊東朝歸罪閹尹原其誣謗之意尤為深切今刪去七十六字舊錄誣謗孰不知今悉依舊錄曽布日錄丙寅許將以三省劄子示曽布云中人有與陳衍梁惟簡親黨及素相厚善者皆當斥逐上遂具十餘人姓名送三省自編管至送前省降官凡數等將云莫可同進呈否布曰三省列章安用西府同呈兼三省前後施行梁惟簡等宻院皆不預遂已既而又有四人者御批付宻院施行前後凡二十四人壬申布又同林希進呈三省施行中人事因言臣等昨凖御批梁惟簡陳衍兒男有尚居省籍可除名覊管臣等遂下兩省取索云各有一男随行外更無遂施行訖乃不知更有親黨及素相厚善者亦聞三省因陳慥者理㑹房錢於開封文字至都省遂將上籍没兩家貲産上曰亦知之又指數中已施行人曽燾馮章兩人令更降一官前此蔡卞又云前日因章惇留身退便令草此劄子亦嘗問之云必是相公曽奏惇曰然御集五月十三日手札兩道姓名與此同惟鄭詳以舊官送内侍省此獨無有庚午詔諸路沿邊州軍除帥臣所在外若公使於例册外饋送並依縁邊城堡鎮寨條施行朝廷遣使及監司例外受供饋者仍取㫖委經略安撫鈐轄轉運提刑提舉司常切覺察劾奏以三省言蘭州違法饋送也縁邉城堡鎮寨條見二年正月十八日
