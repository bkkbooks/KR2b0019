body:
  text: 續資治通鑑長編巻三百七十四宋李燾撰哲宗元祐元年夏四月己丑正議大夫守尚書右僕射兼中書侍郎韓縝為光禄大夫觀文殿大學士知潁昌府臺諫前後論縝過惡甚衆皆留中不出内批縝自以為不才恐妨賢路故乞出視矜功要名而去者為得進退之體故有遷官之異宜於制詞中聲説此意制詞畧曰至誠屢抗於封章自訟恐妨於賢路異乎矜功要名而去尤得艱進易退之體焉矜功要名蓋指蔡確章惇也矜功要名指蔡確章惇此據邵伯温辨誣命入内押班梁從吉齎詔賜守太師致仕文彦博曰卿踐更二府弼亮三朝名聞四夷功在天下注想元老渇見儀刑宜疾其驅副我虚佇詔書到日卿可肩輿赴闕并男貽慶居中隨侍令河南津置行李先是司馬光除左僕射固辭以疾乞召用彦博為侍中行左僕射事而已佐之不聽及将罷韓縝太皇太后以御劄付光曰卿前者所奏文彦博為相今韓縝乞罷欲如卿前奏除彦博太師兼侍中行右僕射事與卿協力贊善其合行恩禮次第卿相度條奏親書實封進入時三月庚辰也二十三日光奏彦博勲徳爵齒逺在臣前今恩制已除臣左僕射若以彦博行尚書左僕射臣守右僕射則事體俱正仍乞差内臣一員往西京宣彦博赴闕所有合行恩禮次第臣乆在外不一一諳悉乞候麻制下曰悉委有司檢詳典故聞奏翌日太皇太后又批付光曰卿憂國逺慮不為身謀其亦可知今若一旦使彦博居卿之上於予所以待卿之意深未允當卿更思之光又奏臣竊惟彦博光輔四朝勲徳著明官為太師年八十一臣向為京師官時彦博已為宰相比彦博乃是後進今若一旦使彦博列位臣下庸勲崇徳貴爵尚齒國之大倫也臣四者皆不及彦博而位居其上非所以正大倫也臣昨日所奏盖國體非臣飾小廉竊虛名惟陛下幸聽太皇太后卒不聽及韓縝罷即遣中使召彦博蓋用光奏云閏二月庚寅光授左僕射四月末又賜光御批云云可考召文彦博大事也史都不載緣由深為疎畧今特出之御史中丞劉摯言伏見陛下降詔遣使宣太師文彦博赴闕惟彦博以勲名之重翊亮四朝可謂社稷元臣宜乎陛下思見其人而加禮起之甚盛事也臣竊觀自古以來莫不貴徳而尚齒然宗工大老遇之必以禮而䖏之必以道故或尊之以為師保或養之以為三老五更或使之朔望一朝或間趨朝廷平章重事或有大政就而咨决考於前載故事俱存今彦博之來在聖謀神慮必有以處之将一見其儀形而已耶又将有所咨訪耶将留之朝廷以自輔耶又将任之以政耶今外議但見宰相虛位乆未除人皆以謂陛下必將以三省長官命彦博矣雖臣愚意亦不免出於此然臣竊謂誠若議者所料付以三省之政緣有官則有職有職則有事四海之大萬物之繁大小無所不總日夕裁决朝㑹陟降殆恐非八十餘年老臣之聰明筋力所能宜也有職事則不能無得失使任其責則傷恩釋而不問則廢法又非所以養元勲而尊舊老也彦博雖老矣然忠厚惇大足以慰士大夫之心其氣量足以彈壓强悍其威望足以鎮服蠻夷誠宜今日優㳺左右以為朝廷重古之人以老成有過於典刑盖為是也臣欲望聖慈詔彦博以本官朝朔望遇有軍國大事特賜宣召詢以籌策不須官政嬰之夫以三師之尊獨承天子清問獻納以决大議而不勞以事此陛下之所以尊禮舊徳者至矣不親於權以進强君道不疲於職以休養老境而無累於出處之際此亦臣子之可以處而安也恩協義稱無以易此伏望决自聖心使天下無異辭詔諸路災傷賑濟并賊盗公事令轉運司兼管其賊盗賞錢許於青苗息錢内支候役法了日奏取指揮御史中丞劉摯言河北轉運司昨者妄建河議欲為迎陽故道之役以奪大吳新河之勢乞許一靣經畫謂如此則新河下流數十州縣盡免水患及聞朝廷遣使按視遽變為孫村之說欲便施工今春了畢既而使者到部情見理得於是李南公范子竒飜然又盡以前所議為非其畧曰故道堤㟁盡已拆去靈平埽岸深占河身上下扼束必為大患又曰迎陽下矙京師孫村水勢不順兩處回河事節委實不便按南公等正月十八日状稱今來躬親相視乃是前此奏請之時未嘗親至河上而遽以非常之利害不貲之勞費上聞欲以僥倖有成設使朝廷以監司之言為可信而過聽之豈不誤大事歟南公等身任職司河事實在所部固宜考見底裏然後為言而乃慣習欺罔妄圖功利及見朝廷選差遣近臣知其必究事實自以前議鹵莽恐得罪咎故不待使者同行閲視已自奏陳公然反覆輕侮君父轉大議是非如反掌視一方安危如兒戲夫事君之道惟恭與誠南公等前言乃出於輕發妄作非恭誠也後奏乃欲以姦計求免非忠實也不有顯黜何以申明典憲少誡姦偽之人又殿中侍御史吕陶言向者知澶州王令圖輙有論奏欲於迎陽埽開濬舊河使水東注及乞於孫村地分金堤置約使河流徑歸故道河北轉運司並不計審利害繼有論奏欲朝廷先委王令圖相度自迎陽埽以下許令一面經畫纔候正月放水入舊河仍於大吳北岸修進鋸牙約束水勢歸復故道朝廷差李常馮宗道相視未至本䖏而轉運司范子竒李南公自知欺誕不可掩匿乃於正月十八日論奏又移牒李常稱迎陽孫村兩處囬河委是不便及常等相度俱稱不可已罷其役按河流囬覆自古及今最為中國之大事今緣令圖所言遽欲興役開舊塞新及朝廷遣使按視具見其實則方露底裏以為難成同異兩端情渉侮玩願付有司劾治子竒南公之罪以戒欺慢詔范子竒李南公各罰銅十斤展二年磨勘左司諫王巖叟言訪聞淮南旱甚物價踴貴本路監司殊不留意伏望選官措置詔發運司截留上供米一十萬石比市價量減出糶與闕食人户毎户不得過三石其糶到錢起發上京乂言廢罷諸路提舉常平及三路提舉保甲司減削逐嵗舉官状亡慮六七十紙竊慮寒素之士愈艱於進乞復通判舉官詔諸州軍通判每年許舉人一名幕職州縣官改官判司簿尉充縣令仍相間舉六月十三日改制當并此詔改太常寺太祝包繶妻夀安縣君崔氏特封永嘉郡君仍旌表門閭以保信軍言其節行著於鄉里繶拯子也河北轉運司言凖朝㫖沿河州縣依舊置場和買稈草㸔詳河防稈草萬數不少如無人願就埽場中賣不免人户上科買乞依舊條預給官錢其所估價並支見錢更不減二分從之宣徳郎劉誼言欽横二州毎年支移百姓苗米納於邕州太平諸寨廉州米納於欽州化州米納於雷州髙州米納於容州類皆陸行近者十程逺者二十程於民不便詔户部下本路轉運司具的確利害以聞尚書省言元豐五年二月一日通用條六曺諸司官非議事不得到部省又條事應禀議者倉庫官赴所轄寺監寺監官赴尚書本部即有異議者詣都省其庫務須詣尚書省者具事由申省待報今來六曺尚書侍郎以下見赴禀議外其六曹司官寺監屬官倉庫官有合議事件未有明文許赴所轄官曺部及左右司郎官㕔禀議亦合申明行下從之刑部言乞改六曹通用格應檢舉催促文書并郎官書押行下所貴逐曹侍郎稍得日力㸃檢予奪文字從之京西提刑司言省部條貫除直下外有諸州條貫付轉運司押牒入逓分送諸州率多遲滯欲乞應頒降新法以所下轉運司印本移送進奏院令本院坐省符連牒發送諸州諸路從之秘書省言三館秘閣内有係國子監印本書籍乞今後應有闕卷蠧壊并全不堪者並令國子監補印及别造有新印行書籍亦牒送逐館收藏免致逐旋申朝廷批降指揮從之尚書省言欲令六曹諸司於所轄應押貼子取㑹者並令親事承送人等封送徃來如或須要人吏指說即明具整㑹事件取本曹尚書侍郎處分聽暫赴郎官面説訖遣從之新削左司諫王巖叟奏編類章䟽元年四月二日法有為名則美而行之則艱事有用意則良而施之則戾者三舍是也三舍之法立雖有髙材異能未見能取而得之而犇競之患起犇兢之患起而賄賂之私行賄賂之私行而獄訟之禍興獄訟之禍興而防猜之禁繁博士勞於簿書諸生困於文法非復渾然養士之體而庠序之風或幾乎息此識者之所共歎也臣竊謂庠序者所以萃羣材而樂育之以定其志業養其名譽優游舒徐以待科舉也不必以科舉之外别開進取之門多岐以支離其心而激其争端使利害得失日交戰於胷中損育徳善道之淳意非所以篤教化成人材也臣愚乞鑒已然之弊罷三舍法開先生弟子不相見之禁示學士大夫以不疑講解之餘止以公私試第髙下如昔時自足以奬材氣而厲風聲使多士欣於從學則上庠宜復有雍容樂易之美為四方矜式矣乞下禮部及司業博士共議今來朱光庭集亦有此奏案編類章疏乃王巖叟第三件係之光庭必誤也新福建路轉運副使吕温卿知饒州知福州謝卿才直秘閣福建路轉運使温卿除郡必有故當考詔盗賊賞錢以青苗息錢支此據政目初二日事庚寅禮部言太學武學條乞一處相照修立貴不致牴牾從之資政殿學士新知潁昌府曽孝寛言應有曾獻財貨利便後已廢罷雖曾有課利入官者更不推賞從之荆湖北路轉運司言應沅州裏外糴買糧草并錢穀場務如遇本州闕官并許於見任或歸明指揮軍大将内選差權暫監當從之新削右司諫蘇轍言臣伏見禮部㑹議科塲欲復詩賦議上未决而左僕射司馬光上言乞以九經取士及朝官以上保任舉人為經明行修之科至今多日二議並未施行臣惟來年秋賦自今以徃嵗月無㡬而議不時决傳聞四方學者知朝廷有此異議無所適從不免惶惑懣亂盖緣詩賦雖號小技而比次聲律用功不淺至於兼治它經誦讀講解尤不可輕易要之來年皆未可施行臣欲乞先降指揮明言來年科場一切如舊但所對經義兼取注疏及諸家議論或出己見不專用王氏之學仍罷律義令天下舉人知有定論一意為學以待選試然後徐議元祐五年以後科舉格式未為晚也從之集議在閏二月二日光奏在三月五日㩀此月二十三日司馬光乞先舉經明行修則轍所言盖便得請也先是言者請兼用詩賦盡黜經義太學生改業者十四五監察御史上官均言經術以理為主詩賦以文為工以理者於言為實而所根者本以文者於言為華而所逐者末先帝去數百年之弊不為不艱而議者不計本末乃欲襲前日詩賦之獘未見其為得也源深流長事大體重張官置吏之原安危理亂之本願陛下詳聽而謹行之又言方陛下臨御之初士之趨操未定方引頸拭目以聽教令觀好尚正宜奬經術以厲學者之志進行誼以勵士大夫之操今遽厭薄經術崇奨詩賦有司以文辭取士學者以文辭應於有司及其乆也逐華而遺實徇末而棄本固非細累請令學者各占三經雜以論語孟子不必専用新義試策以二一問歴代一訪時務禁用釋典不得專援莊老比於參用詩賦使學者敝精神於無用之文得失固相逺矣章三上又為六說以闢言者其後詩賦與經義訖參用云三年十一月十日彭汝礪議閏十二月末中丞李常等議科舉此時均去䑓已一年半矣均議詩賦不可用取士據均家傳附見其後曾布專以此為均不與元祐同不可畧也但恐未必在此時當考均奏議具有此三章或更刪取之環慶路經畧使范純粹奏奉詔令陜西河東逐處經畧司相度如有西賊大衆入㓂攻圍城寨審度賊勢須合要隣路救援即關牒隣路經畧司差發援兵仰被關路分據所關賊勢相度合銷人馬發遣前去其被闗路分委託事故不為應副並當重行朝典有無未盡便具利害聞奏臣兩曾具狀叙述鄜延路永樂城被賊兵圍閉請援隣路了不及事乞朝廷檢㑹舊制修明隣路策應約束去訖今凖上項朝㫖臣子細㸔詳雖許闗隣路差發援兵固為便利然而若令被闗路分須候關報文字到彼方相度合銷人馬然後發遣即必不及事緣西賊前後作過雖是竭國大舉而所向去處罕曾乆留務為倐來忽徃之計多是分兵圍守城砦使兵不得出然後餘冦散之村落焚蕩漢蕃人戸廬舍抄刼人口孳畜搜掘坑窖積聚斛食於此之際若城砦堅守而聲援旁至即不日退散漫不可追若被冦路分自有兵力可以驅逐即固不用逺勞隣援萬一若必藉旁助即須是倉卒響應乃可及事况逐路安撫司兵馬未必皆在帥府屯聚必是散在逐地分城寨戍守若須候闗報到經畧司本司旋擘畫那移以至行遣文字傳檄外将告諭軍中以至授甲束装雖能星夜疾速比到被賊地分固已後時徒致拖拽隣路軍馬無補機事臣今相度宜於平日委經畧司選定策應兵馬将副使臣仍須兩畨其第一畨便以最相近處見屯泊兵将充仍以策應将為名其第二畨亦于次近處差定並擇去老弱衰遲不能負甲奔趨之人仍多用騎兵即舉動神速責令将副使臣常切誡諭士卒繕整器械凡軍行須用之物於平時一一備具常為猝行之計及令逐路修横烽之法若遇賊兵侵犯並舉横烽傳報隣路其策應路分才見横烽立便排促人馬凖備赴援即未得起發其被冦路分經畧司須審度事勢委是賊勢重大决非本路之力可以驅逐方得闗請隣道又須預設符驗以防姦詐其被闗路分經畧司據所闗事理知得賊兵所在畫時亦以宻號為驗飛檄第一畨策應将遣人馬選快便路逕火急前去那第二畨人馬徃第一畨元駐劄處凖備續有呼索節次遣發若本路兵力可以禦捍枉有拖拽隣路軍馬及被闗路分妄託事故不為應付自依朝廷約束施行如此則不惟事機之際可以應猝兼令策應軍兵於平日聞聽習熟人自為備緩急遣發不至紛擾臣愚所見如此更乞朝廷詳酌如其可採即行刪潤立法速降諸路早令施行庶将來防秋便可遵守純粹先以元豐五年十一月十一日奏再以元祐元年閏二月十一日奏又以元年四月三日奏此二年二月十四日乃降指揮辛卯詔應合試選人年五十以上歴兩任六十以上一任無贓罪及私罪情重並今任非停替者並與免試資政殿學士知潁昌府曾孝寛知鄧州龍圖閣直學士知鄧州鄧綰知揚州十八日云云朝議大夫鮮于侁為太常少卿著作佐郎范祖禹為著作郎樞宻院言新差東南第十三副将供備庫副使石宗永病告滿百日詔令吏部自落班簿後限一年方許朝叅仍於元豐假寜令添入大小使臣字又言夏國遣使鼎里旺裕勒寧等詣闕賀皇帝登寳位乞依例差官押賜登極支賜徃夏國詔以西京左藏庫副使王克詢押賜司馬光言臣先於二月中曽上言乞因新天子繼統下詔悉赦西人之罪與之更始雖未還其侵疆且給嵗賜待之如故此道大體正萬全無失既而執政所見各有異同沮難遷延遂屏棄不行臣竊聞今來西人已有闗報遣使副詣闕賀登寳位國家若於此際又不下詔開而納之萬一西人蓄怨積憤肆其悖心或有一騎犯邉或於表牒中有一語不遜當是之時雖欲招納乃是畏其陸梁傷威毀重何耻如之臣之前策亦不可行矣伏望陛下令三省樞宻院将臣二月三日十二日十六日并今來所上文字一處進呈臣愚欲為國家消患於未萌誠惜此機㑹夙夜遑遑廢寢忘食陛下若俟詢謀僉同然後施行則執政人人各有所見臣言必又屏棄凡邉境安則中國安此乃國家安危之機伏望陛下察臣所言甚易行而無後害可使華夷兩安為利甚大斷自聖志勿復有疑并上詔意曰朕聞王者奄有四極至仁無私靡間華夷視之如一夏國主秉常世守西土藩衛中邦自其祖彜興以來沐浴皇化職供時至率多忠勤仁宗皇帝加之寵名胙以大國錫予之數嵗則有常曏因邉臣奏陳云彼君臣失職及移文詰問曾無報應神宗皇帝乃出師命将拯彼阽危在於夏國主秉常實有大造而所部之人遽敢自絶侵軼我邉鄙䖍劉我吏民正旦同天皆不入賀國家包以大度置而不問但絶嵗賜以俟悛心不幸先帝遺棄萬國朕嗣守令緒祗承前志夙夜寅畏迨今期年宣廣恩澤無幽不振而夏國主秉常屢遣使者造於闕庭弔祭訃告浸修常職朕惟江海之大來則受之豈復追念徃昔計較細故宜捨其前日之不恭取其今兹之効順曠然湔滌與之更始自今申勅将吏嚴戢兵民毋得輒規小利擾彼疆場凡嵗時頒賚命有司率由舊章必使桴鼓不鳴烽燧無警彼此之民早眠晏起同底泰寜不亦休哉可布告中外咸使聞知范純仁行状云云或附此更詳之詔元豐七年七月二十日修立應典賣田宅私冩契書并不係籍定牙人衷私引領交易法更不施行復祁州深澤縣司馬光言臣竊惟鄉村人户播植百穀種藝桑麻乃天下衣食之源比於餘民尤宜存卹凡人情戀土各願安居茍非無以自存豈願流移他境國家若於未流移之前早行賑濟使糧食相接不至失業則比屋安堵官中所費少而民間實受賜若於既流移之後方散米煑粥以有限之儲蓄待無窮之流民徒更聚而餓死官中所費多而民實無所濟伏覩近降朝㫖令户部指揮府界諸路提㸃刑獄司體量州縣人户如委是闕食據見在義倉及常平米穀速行賑濟仍丁寜指揮州縣多方存䘏無致流移失所此誠得安民之要道然所以能使民不流移者全在本縣令佐得人欲乞更令提㸃刑獄司指揮逐縣令佐專切體量鄉村人戸有闕食者一面申知上司及本州更不候囬報即将本縣義倉及常平倉米榖直行賑濟仍據鄉村人五等人户逐户計口出給歴頭大人日給二升小兒日給一升令各從民便或五日或十日或半月一次齎歴頭詣縣請領縣司亦置簿照㑹若本縣榖米數少則先從下户出給歴頭有餘則并及上户其不願請領者聽候将來夏秋成熟糧食相接日即據簿歴上所貸過糧令隨税送納一斗只納一斗更無别息其令佐别有良法簡易便民勝於此法者亦聽從便要在民不乏食不至流移仍令提㸃刑獄司常切體量逐縣令佐有能用心存恤闕食人户雖係災傷並不流移者保明聞奏優與酬奨其全不用心賑濟致户口多有流移者取勘奏聞乞行停替庶使官吏有所勸沮百姓實霑聖澤三省進呈依奏降朝㫖在三月二十六日三省言吏部曾經堂除選人曾經省府推判官䑓諫寺監長貳郎官監司並歸吏部差注内不因罪犯替罷者合入逺與近合入近與先次指射差遣其朝廷特差者不在此限從之政目云堂除選人歸吏部升一等又言府界諸路乆旱夏苗災傷人户披訴訪聞州縣多不為收接使被災之民重困欲令戸部指揮府界諸路監司分詣轄下州縣有災傷處體量被災人户不問限内外曾與不曾披訴實災傷合放分數更不檢覆便行除放訖奏從之吏部侍郎李常勾當御藥院馮宗道言凖朝㫖相度黄河利害臣等所至歴覽其隄防全未髙廣物料亦有未備緣隄防之設全係水官物料之蓄責在本道今經渉嵗月尚爾未集以是知水官未得其人欲乞添置使者詔添置外都水使者勾當公事各一員比外都水丞𨽻外都水使者去年十二月十四日今年正月十四日二月六日九月二十三日十一月二十二日工部言京西轉運司奏北使經由道路近為浮橋須合解拆改入京西路由河陽至京昨凖朝㫖務要不見山陵須合剏置道路今來再相度得河陽南至偃師東由鳳䑓孝義次入鞏縣最為順便皆有亭驛道路止是望見山陵林木恐不須回避乞就上項驛路從之右諫議大夫孫覺言淮浙災傷米穀踊貴慮盗賊因緣而起乞差官體量廣行賑濟遍下諸路轉運提刑司災傷各以實言不實者坐之災傷雖小而言渉過當者不問如此則諸路不敢不言朝廷隨災傷之大小賑濟而防虞之則四海之内無倉卒之憂矣時災傷轉運等司並無奏報及宿亳州至甚詔令發運司體量災傷州縣闕食處仍令宿亳州分析並不申奏災傷次第及具見斛斗價例各疾置以聞新舊録並如此當考左司諫王巖叟言臣訪聞京東保馬司尚有餘弊宜在講陳可因而變之以成國家之利臣請條畫如左惟陛下裁擇其一臣愚博採識者之論皆以謂國家宜收馬以復監則公私兩得其利馬者兵之用國之所恃以為險者也有國以來未嘗無馬國多馬則强少馬則弱而能蕃息馬者牧監也昔廢監之初識者皆曰十年之後天下當乏馬緩急無所恃雖有智者不能為之謀矣後不待十年而天下之馬已不可多得此非國之利也臣乞盡收退還民間馬三萬餘匹復置監如故然不必置監牧使止委轉運使領之足治辦矣今鄆州之東平監北京之大名上下監元城監衛州之淇水監相州之安陽監洺州之東平監以至瀛定之間相望皆是棚基草地經界俱存牧養之方畫一盡在使臣猶有舊人可充選任牧兵尚餘太半略假招填指顧之間措置可定而百姓免納錢之害國家得牧馬之利豈不善哉或者曰借緡之多安可以盡蠲是不知今日蠲緡則有數而後日得馬之無窮也此臣之所以言可因而變之以成利者也其二自廢監以來牧地之在民者處處為害盖始者愚民利於一時請地之易不慮後日納租之難投状之初争立髙額而不知州縣又估髙價折納見錢遂致力皆不勝嵗嵗拖欠轉運司不論水旱與羣牧司認定此錢督責之嚴過於他事以至佃地百姓被禁錮受鞭撻者無日無之復願退而還官官中豈復聽許所在人情殊以為苦今若因復置監收牧地入官則百姓戴陛下之恩如釋重負脱沉疴矣此因變保馬之弊成牧馬之利而又有得焉者也仍乞先次指揮主養户未得擅賣所養馬候復置監了日就近分撥入諸監其京西事體既同乞並賜施行此㩀新舊録并元祐章疏増修巖叟集及遺藁乃無此舊録云先帝寓馬於民盡廢諸監省費不貲至是復之新録辨云保馬廢置事見臣僚章疏此不足盡之自先帝寓馬至是復之十八字並刪去詔諸軍致仕放停遺表合該兒男等恩澤若五年外始陳乞者更不推恩知大名府韓縝言路分兵官将官均不得出謁接見賔客恐非待將佐之體乞賜刪除禁約以示優恩詔諸路分兵官将副緣邉都監武臣知城縣及堡寨主非本處見任官不得徃謁及接見如職事相干並親戚並聽徃還其往謁及接見賔客違法并見之者各杖一百延福宫使武信軍留後永興軍路馬歩軍副都總管李憲言累具聞奏爲乆病乞半俸致仕及乞廻避轉運副使路昌衡詔就差提舉崇福宫仍令西京居住憲事當考十八日憲降官詔大理寺左斷刑架閣庫専委主簿管勾其餘䑓寺監有架閣處依此又詔府界諸路按試差募到弓手合造銀楪子並支坊場河渡頭子錢仍以一路通融應副依元豐令新削壬辰以時雨稍愆踈决在京繫囚雜犯死罪以下逓降一等至杖釋之癸已觀文殿大學士守司空集禧觀使荆國公王安石卒司馬光手書與呂公著曰介甫文章節義過人處甚多但性不曉事而喜遂非致忠直疎逺䜛佞輻輳敗壊百度以至於此今方矯其失革其弊不幸介甫謝世反覆之徒必詆毀百端光意以謂朝廷特宜優加厚禮以振起浮薄之風茍有所得轉以上聞不識晦叔以為如何更不煩答以筆札扆前力主張則全仗晦叔也詔再輟視朝贈太傅推遺表恩七人命所在應副葬事新録王安石𫝊辨誣曰王安石學術政事敗壊天下至於今日而舊録立𫝊多取安石私史之語以文之又云安石居金陵閲佛書恍然有得是所得不在六經而在佛書古之學者以其所得施之政事今安石以道自任而所得乃在為相之後顛倒如此今止以神宗實録前後事實採摭修改不敢以私言増損之陳瓘尊堯集叙略曰昔元祐更張之始方安石身沒之初衆皆獨罪於惠卿或以安石為朴野優加贈典欲鎮浮薄司馬光簡尺具存吕惠卿責詞猶在深懲在列曲恕元台凡同時議論之臣無一人指㸃安石徃往言章疑似或干裕陵致使卞以窺伺為心包藏而待潤色經史増汚忠賢凡愠懟曽布之言與怒詈惠卿之語例皆刋削意在牢籠欲使共述私書将以濟其大欲布等在其術内卞計無一不行良由議贈之初不稽其弊若使早崇名分何至横流司馬光誤國之罪可勝言哉臣聞熙寜之初論安石之罪中其肺肝之隠者呂誨一人而已熈寧之末論安石之罪中其肺肝之隠者惠卿一人而已呂誨之言曰大姦似忠大佞似信外視朴野内藏巧詐驕蹇傲上隂賊害物呂惠卿之言曰安石盡棄素學而隆尙縱横之末數以爲竒術以至譖愬脅持蔽賢黨奸移怒行狠方命矯令罔上要君凡此數􅁖莫不備具雖古之失志倒行而逆施者殆不如此平日聞望一旦掃地不知安石何苦而爲此也謀身如此以之謀圖必無逺圖而陛下旣以不可少而安之臣固未易言也又曰陛下平日以何如人遇安石安石平日以何等人自任不意窘急乃至如此又曰君臣妨嫌豈可爲安石而廢哉又曰臣之所論皆中其肺肝之隠臣竊謂元祐臣僚於呂誨之言則譽之太過於惠卿之言則毀之太過此二臣者趣向雖異至於論安石之罪獻忠於神考則其言一也豈可專譽呂誨而偏毁惠卿乎偏毀惠卿此王氏之所以益熾也元祐之偏可不痛鍳哉右諫議大夫孫覺爲給事中依舊兼侍講韓縝既罷覺乃亦遷中書舍人蘇軾詳定役法先是軾言臣竊見先帝初行役法取寛剰錢不得過二分以備災傷而有司奉行過當通計天下乃十四五然行之幾十六七年嘗積而不用至三千餘萬貫石先帝聖意固自有在而愚民無知因謂朝廷以免役為名實欲重斂斯言流聞不可以示天下後世臣謂此錢本出于民力理當還為民用不幸先帝升遐聖意所欲行者民不知也徒見其積未見其散此乃今日太皇太后陛下皇帝陛下所當追探其意還於役法中散之以塞愚民無知之詞以興長世無窮之利臣伏見熈寜中嘗行給田募役法初行給田募役法在熈寜七年五月二十四日辛酉罷在八年四月十三日癸酉其法以係官田如退灘户絶沒納之類及用寛剩錢買民田以募役人大略如邉郡弓箭手臣知宻州親行其法先募弓手民甚便之曾未半年此法復罷臣聞之道路本出先帝聖意而左右大臣意在速成且利寛剩錢以為他用故更相駮難遂不果行臣謂此法行之蓋有五利朝廷若依舊行免役法則每募一名省得一名雇錢因積所省益買益募要之數年雇錢無幾則役錢可以大減若行差役法則每募一名省得一名役錢色役既減農民自寛其利一也應募之民正與弓箭手無異舉家衣食出於官田平時重犯法緩急不逃亡其利二也今者穀賤傷農農民賣田常苦不售若官與買則田穀皆重農可少紓其利三也錢積於官常苦幣重若散以買田則貨幣稍均其利四也此法既行民享其利追悟先帝所以取寛剩錢者凡以為我用耳疑謗稍釋恩徳顯白其利五也獨有二弊貪吏狡胥與民為姦以瘠薄田中官雇一浮浪人蹔出應役一年半嵗即棄而走此一弊也愚民寡慮見利忘患聞官中買田募役即争以田中官以身充役業不離主既初無所失而驟得官錢必争為之充役之役永無休歇患及子孫此二弊也但當設法以防二獘而先帝之法决不可廢今日既欲盡罷寛剩錢将來無繼而繫官田地數目不多見在寛剰錢雖有三千萬貫石而兵興以來借支幾半臣今擘畫欲於内藏庫錢帛中支還兵興以來所借錢斛復全三千萬貫石於河北河東陜西被邊三路行給田募役法使五七年間役減太半農民富實以備緩急此無窮之利也今弓箭手有甲馬者給田二頃半此以軀命償官且猶可募則其餘色役召募不難臣謂良田二頃可募一弓手一頃可募一散從官則三千萬貫石可以足用謹具合行事件畫一如左一給田募役更不出租依舊納兩税免支移折變一今來雖有一頃二頃為率若所在田不甚良即臨時相度添展畆數務令召募得行但役人所獲稍優則其法堅乆不壊一今若立法便令三路官吏推行若無賞罰則官吏不任其責謬悠滅裂有名無實若有賞罰則官吏有所趨避或抑勒買田或召募浮浪或多買瘠薄或取辦一時不顧後患臣今擘畫欲選才幹朴厚知州三人令自辟屬縣令每路一州先次推行令一年中略成倫理一州既成倫理一路便可推行仍委轉運提刑常切提舉若不切推行或推行乖方朝廷覺察重賜行遣一應募役人夫大抵多是州縣百姓所買官田去州縣太逺即乆逺難以召募欲乞所買田並限去州若干里去縣若干里一出榜告示百姓賣田如係所限去州縣里數内仍及所定頃畆或兩户及三户相近共及所定頃畆數目亦可即須先申官令佐親自相驗委是良田方得收買如官價低少即聽賣與其餘人户不得抑勒如買瘠薄田致乆逺召募不行即官吏並科違制分故失定斷仍不以去官赦降原減一預先具給田頃畆數出榜召人投名應役第二等以上人户許充弓手仍依舊條揀選人材第三等以上許充散從官以下色役更不用保如等第及即召第一等一户或第二等兩户委保如充役七年内逃亡勒元委保人承佃充役一毎買到田未得支錢先召投名人承佃充役方得支錢仍不得抑勒一賣田入官須得交業與應募人不許本户内人丁承佃充役一募役人老病走死犯徒以上罪即須先勒本户人丁充役如無丁方别召募一應募人交業承佃後給假半年令葺理田業一退灘尸絶沒納等係官田地今後不許出賣更不限去州縣里數仍以肥瘠髙下品定頃畆務令召募得行一係官田若是人户見佃者先問見佃人如無丁可以應募或自不願充役者方得别行召募右所陳五利二弊及合行事件一十二條伏乞朝廷詳議施行然議者必有二說一謂召募不行二謂欲留寛剰錢斛以備他用臣謂有以應之富民之家以二三十畆田中分其利役屬佃户有同僕𨽻今官以兩頃一頃良田有税無租而人不應豈有此理又弓箭手已有成法無可疑者寛剩役錢本非經賦常入亦非國用所待而後足者今付有司逐旋支費終不能卓然立一大事建無窮之利如火爍薪日減日亡若用買田募役譬如私家變金銀為田産乃是長乆萬全之䇿深願朝廷及此錢未散立此一事數年之後錢盡而事不立深可痛惜臣聞孝子者善繼人之志善述人之事武王周公所以見稱於萬世者徒以能行文王之志也昔蘇綽為魏立征税之法號為煩重已而歎曰此猶張弓也後之君子誰能解之其子威侍側聞之慨然以為己任及威事隋文帝為民部尚書奏減賦役如綽之言天下便之威為人臣尚能成父之志今給田募役眞先帝本意陛下當優為武王周公之事而况蘇威區區人臣之孝何足道哉臣荷先帝之遇保全之恩又䝉陛下非次㧞擢思慕感涕不知所報冒昧進計伏惟哀憐幸甚詔送役法所軾議送役法所㩀上官均家傳按詳定役法在元祐元年二月二十八日又按軾元祐二年二月一日繳進此議云元豐八年十二月草此元未果上然王巖叟駮軾議則云復行差役方數日軾有此議按復行差役乃元年二月六日若軾元不上此議巖叟何從而駮之蓋軾八年十二月草此議未即上至元年二月六日後固已出之其送役法所當是二月二十八日後今因軾詳定役法附元年四月六日二年三月末王巖叟等駮議可考詔已降指揮守太師致仕文彦博赴闕獨班起居減拜令閤門取㫖興國寺戒壇院安下宰臣執政官班迎朝見日就興國寺戒壇院賜御筵起肩輿至下馬處子弟一人扶掖出入儀制依見任宰臣簽賜令客省依例賜十日人從大程官二十人從人二十人散從官一十人權差宣武兵三十人中書省言尚書省文書自來左右僕射輪日當筆緣未有體例詔令左右丞權輪日主印當筆樞宻院言在京開封府界禁軍闕額雖見招填尚未足數畿内保甲往往事藝成就可以召募添填詔令逐縣知縣都監專切招填仍委提刑司提舉管勾餘依河北路已得指揮及得上四軍等仗事藝者除例物外増錢有差又詔開封府界三路保甲已罷團教逐年更不差官按閲只令隨逐次拍試事藝淮南路轉運司言提㸃内藏庫奏乞下本司逐州軍依提舉司折算到見欠内庫錢帛承認起發補足年額候見本庫朱鈔却行除豁或與理後來年額之數欲望於見欠數内除豁寛立年限逐旋起發上京及除本路起發外見欠未起數目自今為始均作五年送納如将來根究得見内庫已納朱鈔即依元豐七年十月二十日朝㫖即行除豁或與理後來年額之數施行從之新録削此監察御史孫升言知興國軍楊繪簽書揚州節度判官㕔公事沈季長詿誤深刑情非故冒近侍義難自陳伏望特令理訴斷遣所取索元案㸔詳從之刑部言立聚集生徒教授辭訟文書編配法及告獲格從之甲午朝散大夫馬黙為司農少卿朝請大夫司農少卿范子淵知兖州中書舍人蘇軾言臣謹按子淵見為殿中侍御史吕陶彈奏為修堤開河縻費巨萬及䕶堤壓埽之人溺死無數自元豐六年興役至七年功用不成其罪甚於吳居厚蹇周輔乞行廢放今來差知兖州臣欲作責詞又緣呂陶奏状已進呈别無行遣其兖州又是節鎮自來係監司以上差遣即非責降有罪去處臣欲不為責詞又緣子淵無故罷司農少卿出領外郡似縁上件彈奏有此疑惑伏乞明降指揮卒草制云朕於士大夫未嘗求備也将歴試以事而收其長有司言汝治河無状耗國勞民而功不成朕惟水土之政與郡縣異其觀汝於牧民尚勉來效以蓋往愆三月二十八日乙酉實録已書馬黙司農少卿范子淵知兖州四月七日又書不知何故蘇軾集亦云二十八日今依實録止于四月七日見此㝷改知峽州其制亦軾所草云汝以有限之財興必不可成之役驅無辜之民置之必死之地横費之財猶可力補而既死之民不可復生此議者所以不汝置而朕亦不得赦原也子淵責峽州不得其日今附見賜鄂特凌古衣一襲二十兩金帶一條銀器二百兩衣著二百疋角茶散茶各一百斤又賜大首領李沙勒瑪紳阿達克凌錢二萬九千五百四十貫乙未朝奉郎左司員外郎髙遵惠為直龍圖閣太僕少卿元豐八年四月遵惠初為左司舊傳載遵惠上疏論法度更張事有當否如先帝施設未可輕議新𫝊因之今附見于此遵惠卒於元符二年十二月特贈樞宻直學士誥詞載遵惠元祐初論事甚少當考吏部郎中梁燾為太常少卿燾九月八日自工部遷吏部吏部郎中顧臨為秘書少監太僕少卿韓宗道為左司郎中司勲郎中趙君錫為右司郎中八年六月末司馬光薦君錫宗道燾三人詔開封府界及諸路提刑司交割到提舉常平司職事内如有可減省及合撥歸轉運提㸃司事令條具聞奏詔鄭滑州並𨽻京西路户部言吏部侍郎李常等奏被水百姓於新河兩堤之内灘地種麥庻幾一收以資窮乏體訪得本路及州縣理納税租督責欠負欲乞詔有司權與免放或遣御史同行按視欲下河北轉運司相度所奏具可否以聞其委官司取索并遣御史合取自朝廷指揮詔委官司取索令本部施行餘從之知成都府許将奏本府居住天章閣待制李大臨於儒臣中最為先進今既亡沒士論惜之望賜褒録及應副𦵏事詔特賜錢三百貫仍於成都府候葬事日量行應副大臨卒在二月辛巳吕公著掌記當行事云李大臨恐宜有以褒賞之江南西路荆湖南路按察司言興國軍管勾鹽事通判路适状内有鹽鋪户王臯稱本縣抑令投充本司牒使改正乃稱王臯等妄陳状詞顯是愚暗詔路适特差替詔保正長受乞財物依差夫團頭法編配條更不施行有犯依常法其緣上條已編配過人並特與放還從宣義郎劉誼之請也新無禮部言太皇太后坤成節已有朝㫖諸般恩禮並増一倍外其嵗時合供奉物色亦合増一倍供納乃乞下詳定敕式所編修施行更不増奉更不増奉必有脱誤新舊録並如此當考又言國子監太學條毎月私試丞簿一員封彌律學官廵鋪外舍自來闗内侍省差内臣一員及申朝廷封彌官二員廵鋪文臣二員看詳補外舍係附私試大義日止是别爲號其差官合依私試法從之新無荆湖南路轉運司言凖廣東提舉常平司牒依鹽法應副過廣鹽脚剩鹽本等錢牒本司買銀起發上京送納雖已下諸處收買至今買到銀數不多乞只将見錢添依元數起發上京送納其今後若無銀可以收買起發見錢從之新無門下中書外省言取到户部左右曹度支倉部官制條例并諸處闗到及舊三司續降并奉行官制後案巻宣敕共一萬五千六百餘件除海行敕令所該載者已行刪去他司置局見編修者各牒送外其事理未便順并係屬别曹合歸有司者皆釐析改正刪除重複補綴闕遺修到敕令格式一千六百一十二件并刪去一時指揮共六百六十二册并申明畫一一册乞先次頒行以元豐尚書户部度支金部倉部敕令格式為名所有元豐七年六月終以前條貫已經刪修者更不行用其七月以後條貫自為後敕又言上供錢物舊三司雖置吏拘催然無總領止據逐案闗到上簿如有不至遂相因習嵗月之乆官吏遷易無以稽考今户部雖有分職度支主嵗計金部以度支闗到之數拘催然漫無格法本省昨取索欲類以成書而諸案文簿無可考校已詢諸庫務求訪舊籍互相照驗修立為格其間不備事節雖據所見送本部㸔詳緣事干諸路尚慮有未盡不同事乞令本部取索㸃勘如有未盡不同事件即補正添入並從之河北西路提㸃刑獄司言凖朝㫖提舉官積蓄錢穀財物盡樁作常平倉錢物即不言衝改五路封樁移兊朝㫖户部按三路令諸常平免役場務錢穀以剩數兊往帥臣所在及邉要州封樁㸔詳逐色錢既有上項朝㫖即無剩數移兊詔前件令文更不施行户部左司郎中張汝賢言竊聞熈寜初廟堂之議始以國用不足大講理財之法其後利入浸廣費用隨増非復曩時之比也今既有所改為則自兹以往課入當復有限調度之費不可無節欲乞諸路轉運司㑹計自熈寜以前嵗入幾何嵗用幾何朝廷常供之外非泛所須者嵗幾何熈寜以後嵗入幾何嵗用幾何朝廷非泛所須者嵗亦幾何仍具出某事之費因某法而有今某法既改則某費可罷要以省不急之用量入為出則無異時不足之患從之舊録云先帝理財節用汝賢附㑹以為不急之用欲省之新録辨曰㑹計熙寜嵗用廣狹較之元祐出納應省者省之乃是遵神考理財節用之意以為附㑹非也自先帝理財至欲省之刪去十九字監察御史上官均言臣聞財用出於一司則有無多少得以相通差繆攘盗得以稽察故財無妄出之費而國無不足之憂然後可以裕民之財力而仁澤被於天下周之太府掌九貢九賦九功之貳受貨賄之入所以待王之膳服賔客祭祀賜予玩好之類皆總於太府嵗終㑹貨賄之出入可謂財用出於一故有無多少得以相通差繆攘盗得以稽察而國無不足之憂自漢及唐其理財設官不若周之條理詳備其計入為出不若周之法制詳宻則上下鰓鰓然常以不給為患不亦宜乎先朝自新官制蓋有意合理財之局總於一司故以金部右曹案主行内藏受納寳貨支借拘催之事而奉宸内藏庫受納又𨽻太府寺然按其所領不過闗報寳貨之所入為數若干其不足若干為之拘催嵗入之數而已至於支用多少不得以㑹計文籍舛謬不得以稽察嵗乆朽腐不得以轉貿總領之者止中官數十人彼惟知謹扃鑰塗牕牖以為固宻耳承平嵗乆寳貨山積多不可校至於陳朽蠧敗漫不知省又安能鈎考其出入多少與夫所蓄之數哉臣竊聞昨來内藏斥賣逺年縑帛每匹止二三百文夫自外郡之逺輸至内帑毎縑之直須近二千今斥賣之直止於十之一二此不知貿易移用之弊矣夫不知理府庫之財而外求於民不知節用之術而為多斂之計此有司之罪也臣以為宜因官制之意令户部太府寺於内藏諸庫得加檢察而轉貿其嵗乆之貨幣則帑藏有盈衍之實而無棄敗之患國用足而民財裕矣均奏斟酌附此不得其實月日及其從與不從也
