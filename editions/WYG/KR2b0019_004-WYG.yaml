front:
  text: 李燾進續資治通鑑長編原表臣燾言臣先於去年八月准尚書省劄子三省同奉聖㫖依敷文閣直學士汪應辰奏取臣所著續資治通鑑自建隆迄元符令有司繕冩校勘藏之秘閣臣尋於十四日䝉恩賜對面奉聖㫖令臣早投進遂除官郎省兼職史局續又准尚書省劄子奉聖㫖令臨安府給扎臣今先次冩到建隆元年至治平四年閏三月五朝事迹共一百八十年計一百八卷内建隆元年至太平興國元年太祖一朝事迹雖曽於隆興元年臣知榮州日具表投進已䝉降付史館後來稍有増益謹重别抄錄投進外餘治平後文字増多兼見修四朝正史未畢欲望聖慈特賜寛假臣更加整齊節次修冩投進踈逺微賤僭為此書罪當誅絶聖主不即麾斥乃過聽而兼收之臣死且不朽矣臣誠惶誠恐稽首頓首臣竊聞司馬光之作資治通鑑也先使其寮採摭異聞以年月日為叢目叢目既成乃修長編唐三百年范祖禹實掌之光謂祖禹長編寧失於繁無失於畧當時祖禹所修長編蓋六百餘巻光細删之止八十巻今資治通鑑唐紀自一百八十五卷至二百六十五巻是也故神宗皇帝序其書以為博而得其要簡而周於事臣誠不自揆度妄意纂集雖義例悉用光所創立錯綜銓次皆有依凴其間牴牾要亦不敢自保區區小忠前表蓋嘗具之仰惟祖宗之豐功盛德當與唐虞三代比隆乾坤之容日月之光繪畫臻極訖弗能近矧令拙工强施丹墨臣誠愚闇豈不知罪然而統㑹衆說掊擊偽辨使姦欺訛訕不能乗隙亂真祖宗之豐功盛德益以昭明譬諸海嶽或取涓埃之助顧臣此書詎可便謂續資治通鑑姑謂續資治通鑑長編庶㡬可也其篇帙或相倍蓰則長編之體當然寜失於繁猶光志云爾伏惟皇帝陛下煥乎文章固已經緯兩儀黼黻萬化如臣薄技又安足陳陛下徒以祖宗之孫謀彛憲往往在是遂委曲加惠之使前承命踴躍干冒來獻夤縁幸㑹得御燕閒千百有一儻符神指更擇耆儒正直若光者屬以刪削之任遂勒成我宋大典垂億萬年如神宗皇帝所謂博而得其要簡而周於事者則将與六經俱傳是固非臣所能而臣之區區小忠因是亦獲自盡誠死且不朽矣所有續資治通鑑長編一百八巻今寫成一百七十五冊并目録謹隨表上進干凟宸嚴下情無任戰汗屏營之至臣燾誠惶誠恐稽首頓首謹言
