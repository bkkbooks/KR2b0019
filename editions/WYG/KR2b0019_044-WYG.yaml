body:
  text: 續資治通鑑長編巻四十宋李燾撰太宗至道二年六月甲戌上遣中使賫飛白書二十軸賜宰相吕端等人五軸又以四十軸藏秘府字皆方圓徑尺吕端等相率詣便殿稱謝上謂之曰飛白依小草書體與𨽻書不同朕君臨天下復何事於筆硯乎中心好之不忍輕棄嵗月既乆遂盡其法爾向來有江浙人號能小草書因召問之殊未知向背但務填行塞白装成巻帙而已小草書字極難工亦恐此書遂成廢絶矣庚辰温州言永嘉縣民陳侃五世同居内無異㸑侃事親至孝為鄉里所稱詔旌表門閭賜其母粟帛上謂侍臣曰徳安陳旭一族孝友恭儉未見其比参知政事張洎奏曰旭家長㓜千餘口世世守家法孝謹不衰閨門之内肅如公府上曰近聞本郡嵗或小歉以官倉米二千石貸之但受其半且云省嗇而食可以及秋成或謂之曰曷不受而糶之可得善價旭曰朝廷以旭羣從聚居特出王賦貸私室豈可見利㤀義為罔上之事乎此深可嘉賞旭兢之從父弟也壬辰駙馬都尉魏咸信上言以其父仁浦郊祀覃慶自晋王封齊王私有所避乞改封他國上以問宰相吕端奏曰晋國之上唯秦國為大㓂凖對曰自來中書不與朝廷執紀綱如魏仁浦進封王爵當用三等以次追叙豈合便封晋國况晋國是陛下藩邸舊封用為贈典非允乃致邇來自晋封齊猶不滿望託以他故求改上曰可因此下詔以近世多故憲章隳壊不遵古道者若干事並從釐革有司不能遵守者許憲司彈劾既而宰相卒不能奉行上㫖云先是詔徙河北轉運使祠部郎中陳緯未見為陜西轉運使緯入對盛稱大名府通判著作佐郎濟隂任中正之才請以代已上曰朕自知之乃召見遷秘書丞乙未授江南轉運使賜五品服上以中正頎長自擇大笏又命内臣取緋衣長者賜之至部嵗大稔賦租平糴皆有羡盈發運使王子輿欲悉調餉京師中正曰東南嵗輸五百餘萬而江南所出過半今雖有餘而後或小歉則數不登将急取吾民乎子輿乃止秋七月庚申太常博士直史館陳靖上言曰先王之欲厚生民而豐其食者莫大於積糓而務農也臣早任計司判官每獲進對伏聞聖訓以為稼穡農耕政之本茍能勸課田畆康濟黎元則鹽鐡𣙜酤斯為末矣謹審天下土田除江淮浙右隴蜀河東等處其餘地里夐逺雖加勸督亦未能遽獲其利况古者强榦弱枝之法必先富實於内今京畿周環二三州幅員數千里之地墾者十才二三税之入者又十無五六復有匿里舍而稱逃亡棄耕農而事逰惰逃亡既衆則賦額日减而國用不充歛収科率無所不行矣逰惰既衆則地利歳削而民食不足冦盗殺傷無所不行矣又安能致人康俗阜天平地成乎望擇大臣一人有深識逺畧兼領大司農事典領於中又於郎吏中選才智通明能撫民役衆者為副執事於外自京東西擇其膏腴未耕之處申以勸課臣又嘗奉使四方深見民田之利害汙莱極目膏腴坐廢亦加詢問頗得其由昔詔書屢下許民復業蠲其常租寛以歳時然鄉縣之間擾之尤甚每一戸歸業則刺報所由朝耕尺寸之田暮入差役之籍追胥責問繼踵而來雖䝉蠲其常租實無補於捐瘠况民之流徙始由貧困或避私債或逃公税亦既亡遯則鄉里斂其貲財至於室廬什器桑棗材木咸計其直鄉官用以輸税或債主取以償逋生計蕩然還無所詣以兹浮蕩絶意言歸姦心既萌何所不至如授臣斯任則望錫以閒曠之地廣募逰惰之軰誘之耕鑿未計賦租許令别置版圖便宜從事酌民力之豐寡相農畆之磽肥均配畀之無煩督課令其不倦其逃民歸業丁口授田煩碎之事並取大司農裁决耕桑之外更課令益種雜木蔬果孳畜羊犬鷄豚給授桑土潜擬於井田營造室居便立於保伍逮於養生送死之具慶弔問遺之資咸俾經營並立條制俟至三五年間生計成立有家可戀有土可懐即計户定征量田輸税以司農新附之名籍合計府舊収之簿書斯實敦本化人之宏畧也若民力有不足官借緡錢或以市餱糧或以營耕具凡此給授委於司農比及秋成乃令償直依時價折估納之於倉以其成數闗白戸部上覽之喜謂宰相曰朕思欲恢復古道革其弊俗驅民南畆致於富庶前後上書言農田利害多矣或知其末而闕其本有其説而無其用靖此奏甚諳理可舉而行之正是朕之本意因召對奨諭令條奏以聞靖又言逃民復業及浮客請田者委農官勘騐以給授田土収附版籍州縣未得議其差役其乏種糧耕牛者令司農以官錢給借民輸税外有荒田願附司農之籍者民有牛嵗責以租課願𨽻籍受田者並聽其便因制為三品以膏沃而無水旱之患者為上品沃壤而有水旱之虞埆瘠而無水旱之慮者為中品既磽瘠復患於水旱者為下品上田人授百畆中田百五十畆下田二百畆並五年後収其租亦只計百畆十収其三一家有三丁者請加授田如丁數以給五丁從三丁之制七丁者給五丁十丁者給七丁至二十丁三十丁者為限若寛鄉田多即委農官裁度以賦之其室廬蔬韮及桑棗榆桞種藝之地每戸及十丁者給百五十畆七丁者百畆五丁七十畆三丁五十畆除桑功五年後計其租餘悉蠲其課令常参官於幕職州縣中各舉所知一人堪任司農丞者分授諸州通判即領農田之務又慮司農官屬分下諸州民頑已乆未能信服更或張皇紛擾其事難成望許臣領五官吏於近甸寛鄉設法招携俟規畫既定四方㳺民必盡麇至乃可推而行之吕端曰靖所立田制多改舊法又大費貲用望以其状付有司詳議乃詔鹽鐡使陳恕等於逐部擇判官一人通知農田利害者與靖同議其事恕與戸部使張鑑度支副使欒崇吉戸部副使王仲華鹽鐡判官譚堯叟未見度支判官李歸一共議請如靖之奏乃詔以靖為勸農使按行陳許蔡潁襄鄧唐汝等州勸民墾田以大理寺丞皇甫選光禄寺丞何亮副之選亮上言功難成願罷其事上志在勉農猶詔靖經度未㡬三司以為費官錢多方水旱恐遂散失其事遂寝靖為勸農使在八月辛酉今并書丙寅参知政事冦凖罷為給事中先是郊祀行慶中外官吏皆進秩凖遂率意輕重其素所喜者多得䑓省清秩所惡者及不知者即序進焉廣州左通判左正言馮拯轉虞部員外郎右通判太常博士彭惟節乃轉屯田員外郎拯嘗與凖有隙故凖抑之惟節自以素居拯下章奏列銜皆如舊不易凖怒以中書劄子升惟節於拯上切責拯仍特免勘罪拯忿曰上日閱萬㡬寜察見此細事盖冦凖弄權爾因上疏極言并及嶺南官吏除拜不均凡數事又封中書劄子以進而嶺南東路轉運使康戬亦具奏且言吕端張洎李昌齡皆凖所引端心徳之洎曲奉凖昌齡畏懦皆不敢與凖抗故得以任胸臆亂經制皆凖所為也上大怒凖適祀太廟攝行事召端等責之端曰臣等皆陛下擢用待罪相府至於除拜專恣實凖所為也凖性剛强自任臣等忝備大臣不欲忿争慮傷國體因再拜請罪上又曰前代中書有堂帖指揮公事乃是權臣假此名以威服天下太祖朝趙普在中書其堂帖勢重於敇命尋亦令削去今何為却置劄子乎劄子與堂帖乃大同小異爾張洎對曰劄子盖中書行邉小事亦猶京百司有符帖闗刺若廢之則别無公式文字可以指揮上曰自今大臣湏降敇命合用劄子亦當奏裁方可施行也既而凖入對前殿上語及馮拯所訴事凖抗言與端等同議除拜上曰若廷辯是非又深失執政之體矣凖猶力争不己上先已厭凖因嘆曰雀鼠尚知人意况人乎翌日凖又抱中書簿領論曲直於上前上益不恱遂罷之尋出知鄧州戬髙麗人附國子學肄業太平興國五年登進士第歴官以清白聞其為轉運使蘓易簡所薦也拯初責知端州言事不已嘗請遣使括諸路隱丁更制版籍及議鹽法通商凡十餘事又獻畨禺紀異集上欲召還凖素不悦拯乃徙知朗州道改通判廣州凖既罷拯以母䘮請内徙始命知江州拯本傳云拯知端州即上言十餘事太宗欲召還冦凖不可按拯以淳化二年秋出知端州凖以五年秋始参政太宗欲召拯而但稍遷之又左降焉則凖必在政府矣拯為端州盖前四年所言十餘事决非始至時即上疏也今畧加刪潤使不相牴牾閏七月庚午有司言諸州闕釐務官五十餘員詔尚書左丞李至等八十四人於州縣幕職官中舉亷恪吏幹者各一人以補之上謂宰相曰夫君子小人趣向不同君子畏謹務在不欺闇室執持名節造次靡渝小人則不然内荏外剛雖善談忠信而履行頗僻所以真偽難辨然乆而必敗其在官黷於貨賄罔畏刑辟及贓状露騐雖為小吏所持亦不恥拜以求解如薛智周為侍御史知婺州政以賄成士俗多以羅帛為獻智周聚歛不知紀極州民謂之羅端公即其為治可知矣卿等職在掄材今令朝廷舉官已是逐末更不擇舉主何由得人也别本見七月庚子今附舉官後辛未詔自今中書門下只令宰相押班知印其参知政事殿庭别設甎位次宰相之後非議軍國政事不得升都堂祠祭行香署敇並以開寳六年六月庚戍詔書從事先是内侍白承睿㸃檢三司所造衣物欠數甚衆上顧輔臣曰朕頃令三司毎端午初冬誕節所造衣物各為一界則帳籍即時可畢情弊無由而生今三司總為一界何也因言事得其要則簡而易理今三司但欲増置闗防以塞姦倖不知綱目既衆簿書愈多姦倖彌作朕欲并三司為一命官縂判及减省勾院磨勘理欠慿由支収行帳提㸃等司當令鹽鐡使陳恕議其可否張洎曰明王為政雖歩驟不同及其緝熈庻績莫先於簡國家乗五代之後百度陵遲三司掌邦計故多創司分以謹闗防果能刪繁就簡深合古道也於是恕准詔上奏曰伏以封域寖廣財榖繁多三司之中簿牒填委朝廷設法督責尤嚴官員吏人救過不暇若為三部各設主司擇才非難辦事亦易事辦過鮮不撓上心亦一時之良策也其勾院磨勘兩司出於舊制闗防之要莫加於此理欠凴由二司雖非舊制自逋欠失序凴由散落故設二司專令典掌綱目咸具制置有倫逋欠無失理之名凴由鮮流散之弊實亦要切不可廢若兩司並委一官方及判官一員公事其主轄支收早因從京支度財貨轉輸外地此除彼附照騐稽延妨滯京城得替主吏遂設此司專行檢轄凡是支撥官物便給除破文凴却於本司置簿紀録催刋収附文記即勾銷簿書取㨗之門亦為允當其行帳司近日權置了絶舊帳帳目告盡司額自除提㸃司是中㫖特置提振三司廢怠之事固非有司敢得擬議也癸未詔三司都凴由司理欠司宜併為一處命官兼判應諸道逋負官物令三司逐部理納理欠司但縂其所逋之數糾督之廢提㸃司餘悉從恕之奏恕峭直守公性靡阿順每便殿奏事上或未察必形誚讓恕歛版踧縮退至殿壁負墻而立若無所容俟上意稍解復進慤執前奏終不改易如是或至三四上察其忠亮多從其議嘗御筆題殿柱曰真鹽鐡陳恕當時言稱職者亦以恕為首焉别本在癸未八月審官院引大理寺丞宣城髙惠連面授朝官上欲肅清中外臨軒親擇官吏如有績用而無私累者必加奨擢焉江淮發運使楊允恭捕販私鹽賊三十九人送闕下上悉貸之因顧左右曰此等越逸江湖習性已乆固不能工作矣可團為一軍以備舟檝之役號曰平河九月右僕射贈司空謚惠安宋琪卒琪粗有文學頗諧給周知人之情偽尤通明吏術在相府每百執事謁見有所求請多面折之以是人咸怨焉已邜夏州延州行營言兩路合勢破賊於烏白池斬首五千級生擒二千餘人獲其酋鄂摩克軍主齊羅指揮使等二十七人馬二千匹兵器鎧甲萬數賊首李繼遷遁去先是上部分諸将攻討李繼隆自環州范廷召自延州王超自夏州歩軍都虞候容州觀察使潁川丁罕自慶州西京作坊使錦州刺史張守恩自鄜州凡五路率兵抵烏白池皆先授以方畧守恩令鐸子也師已有期銀夏鈐轄盧斌求對懇言曰畨夷之俗馬驕兵悍徃來無定敗則走他境疾戰沙漠非天兵所利不若堅保靈州於内地多積芻粟以師援送茍其至也㑹兵首尾撃之庻㡬無枉費且不失固圉之策上不從改授斌環慶鈐轄領兵三萬為繼隆前鋒斌謂繼隆由靈州趨烏白池月餘方至若自環州抵賊巢才十日程爾繼隆因遣其弟繼和馳驛上言赤檉路四邉之水請自青岡峽直抵繼遷巢穴不及援靈州上怒召繼和於便殿詰之曰汝兄如此必敗吾事矣因手書數幅切責繼隆命引進使周瑩賫詣軍前督之瑩至繼隆已便宜發兵不俟報既而與丁罕兵合行十數日不見敵引軍還張守恩見敵不撃率兵歸本部本部不知是何州縣當考獨王超范廷召至烏白池與賊遇大小數十戰雖頻克㨗而諸将失期卒困乏終不能擒賊焉時超子徳用年十七為先鋒部萬人戰鐡門闗斬首十三級俘掠畜産以萬計及進師烏白池敵鋭甚超不敢進徳用請乗之得精兵五千轉戰三日敵既却徳用曰歸師過險必亂乃領兵距夏州五十里先絶其險下令曰敢亂行者斬一軍肅然超亦為之按轡敵躡其後左右望其師整不敢近超撫其背曰王氏有子矣超等初抵無定河水源涸絶軍士病渇河東轉運使索湘亟輦大鍬千枚至即令鑿井衆頼以濟上初以方畧授諸将先閱兵崇政殿列陣為攻撃之状刺射之節且令多設强弩及遇賊布陣萬弩齊發賊無所施其技矢才一發賊皆散走凡十六戰而抵其巢穴悉焚蕩之賊中老弱不能走者繼遷悉埋於沙中但露其首部落降者皆曰人馬死者過半不能化矣夷謂活為化言不能自活也上因顧馬歩軍都虞候傅潜等曰此行合戰與還師之期悉如所料但諸将不能盡依方畧致此賊越逸朕自即位未嘗如此殺戮盖事不容已爾師興以來夏秋之際炎熱尤甚朕躬自謀度未嘗寜息大抵行軍布陣當務持重雖有勇者率數千人以先犯賊亦無能損益適足撓亂行伍朕每深戒之違令者必斬果無敢輕率者布陣乃兵家大法非常情所究小人有輕議者甚非所宜朕自為陣圖與王超令勿妄示人超回日汝可取圖觀之潜等拜謝而退初命五将出師衛州團練使河陽李重貴實為麟府路濁輪寨都部署得對便殿因言賊居沙磧中逐水草畜牧便於戰鬭利則進不利則走今五路齊入彼聞兵勢大或不接戰且謀逺遁欲追則人馬乏食将守則地無堅壘賊既未平臣軰何顔以見陛下上善之賜以御劍又屢遣使撫勞及諸将果無大功重貴還上思前言命為并代副都部署重貴為并代副帥不得其月日今附見甲午詔夀寧節賜翰林學士兩省五品尚書省四品以上一子出身先是近臣固誕節或以踈屬求廕補至是始為限制非其子孫及親兄弟多寝而不報乙未詔延州嵗貢龍鳯茶先是研茶丁夫悉剃去鬚髪自今但幅巾先滌手爪給新浄衣更敢違者論其罪冬十月已未詔以池州新鑄錢監為永豐監先是饒州有永平監兵匠多而銅錫不給知州馬亮請分其工之半别置監於池州詔從之於是嵗増鑄錢數十萬緡亮合肥人也始通判常州吏民有因縁亡失官錢籍其貲猶不足償妻子連逮者至數百人亮縱去緩與之期不踰月盡輸所負羅處約使江東以亮治行聞擢知濮州其後蘇易簡薦其才任繁劇自福州召還同提㸃三司都勾院磨勘凴由司乆之出知饒州州豪白氏持吏短長嘗殺人以赦免愈驁横為里閭患亮發其姦誅之部中懾服馬亮常州福州事皆不得其時因鑄錢附見甲子併三司勾院為一工部員外郎劉式専領之上靣命式曰以汝一人當三人之職宜勉盡力副朕所望式乆居計司深究簿領之弊江淮間舊有横賦積逋租至多奏免之人以為便然多所條奏繳駮過峻卒為下吏所訟免官據劉式家𫝊云李惟清為鹽鐡使其女壻盗用官錢數十萬吏畏惟清不敢劾式發其事惟清坐絀惟清由是怨而三司貪猾吏以欺誑為生疾式禁其業亦皆怨常狙伺欲共陷之太宗察其情毎坐朝輙對衆稱其才故毁不得入太宗崩真宗諒闇吏告之騐皆虚反坐惟清愈怒式既辨即出視事如它日惟清乃諷吏劾以不俟詔入朝免官家𫝊與本𫝊不同發舉惟清女壻事疑不然既辨之矣免官事當考十一月丁卯朔司天冬官正楊文鑑上言請於新厯六十甲子外更増二十年事下有司判司天監苗守信等議以為無所稽據不可行用上曰支干相承雖止於六十儻兩周甲子共成上夀之數期頥之人得見所生之嵗不亦善乎因詔有司新厯以百二十甲子為限初河東轉運使索湘遣憲州録事参軍永康胡則部送芻糧為一月計則曰為百日備尚恐不支奈何以一月計耶湘遣則以其事入奏上因問以邉策對稱㫖上顧左右曰州縣豈乏人遂令記姓名於中書及李繼隆討賊兵乆不解湘曰㣲子幾敗我事繼隆復移文曰兵且深入糧有繼乎則謂湘曰彼師老欲歸爾但以有備報之已而果然先是淮南十八州軍其九禁鹽餘則不商人由海上販鹽官倍數取之至禁地則上下其直民利商鹽之賤故販者益衆至有持兵器徃来為盗者發運使楊允恭以為行法宜一即奏請悉禁之而官遣吏王其事事下三司三司言其不可允恭固以請甲午詔從之允恭又請令商人先入金帛京師及揚州博務者悉償以茶自是鬻鹽得實錢茶無滯貨嵗課増五十萬八千餘貫禮部侍郎蘓易簡性嗜酒沉湎不巳上嘗因接見誡約深切易簡垂涕再拜翌日復具表稱謝上親批答以申奨又草書勸酒戒酒二詩賜易簡令對其母讀之自是每入直不敢飲或休暇在第賔客候之則已醉矣十二月乙已易簡卒上曰易簡竟以酒敗深可惜也辛亥有司言鳳州出銅鉚定州出銀鉚請置官掌其事上曰地不愛寳當與衆庶共之不許故事知制誥以先入者居上不繋於官次丁已始命工部郎中胡旦立於祠部郎中馮起之上非常例也戊午詔自今州縣官部内流民及亡失租調什之一者並書下考令民間所織縑帛非鬻於市者勿出算是嵗大有年天下户三百五十七萬四千二百五十七
