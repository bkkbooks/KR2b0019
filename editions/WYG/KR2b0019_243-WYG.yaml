body:
  text: 續資治通鑑長編巻二百三十九宋李燾撰神宗熈寜五年冬十月丁丑以太常丞檢正中書戸部公事鄧潤甫為集賢校理直舍人院同知審官東院初曾布舉潤甫經筵館職詔取潤甫應制科進巻至是始擢用之戊寅太子中允集賢校理吕恵卿為天章閣侍講同修起居注管勾國子監上初欲召見乃除差遣王安石請先除差遣上曰恵卿有吏材恐不須令在經筵安石曰恵卿經術明前已為説書今不當罷亦自不妨别主判欲令勾當國子監或令同檢正五房上曰且令專管勾國子監知華州吕大防言九月丙寅少華山前阜頭谷山嶺摧陷其下平地東西五里南北十里潰散墳裂涌起堆阜各髙數丈長若隄岸至陷居民六社凡數百戸林木廬舍亦無存者並山之民言數年以來谷上常有雲氣每遇風雨即隠隠有聲是夜初昏略無風雨山上忽霧起有聲漸大地遂震動不及食頃即有此變已檢録存恤死傷人户詔遣兵部郎中判太常寺王瓘乘驛致祭仍建道塲并賜陷沒之家錢有差其不能𦵏理者官為𦵏祭之又遣内侍馮宗道撫問此據吕大防集本志云華州鄭縣石子陂山摧地涌覆田百有餘頃壓死九百餘人庚辰詔陜西都轉運司應華州山谷摧陷地土涌裂處見存人戸地産如因變移不堪耕種者量口數給與戸絶沒官田如闕種糧牛具以常平錢榖貸之免出息寛為輸限仍人各别賜錢有差此即本紀所書附注九月二十一日詔麟府州歸投蕃部前以新附儲蓄未充所給口食如合住支可且減半至來年十月罷詳定編敇所開封府奏定奪沂州軍賊李則依條合斬刑上從按問欲舉自首減二等奉㫖依其沂州官吏失入李則死罪審刑院大理寺御史臺定奪不當官並取勘聞奏此據宻院時政記十月五日事十一月二十二日丁卯張商英責官當考辛巳荆湖南路轉運判官太子中允王子韶知髙郵縣御史張商英言其資性憸佞巧於自媒及不𦵏父母王安石曰子韶固不為端良但比其他憸人尚有尺寸之能又頑然為姦不變者尚多故亦且用之今罷去却當與一合入差遣遂有此命癸未檢正中書五房公事曾布等言近奉詔詳定恩例今具條上公主子與殿中丞孫光祿寺丞壻太常寺太祝外孫試銜知縣親王壻大理評事外孫初等職官監當女之子壻試監簿應宗室緦麻以上女壻試䘖知縣袒免判司主簿或尉從之本志初等職官下無監當字詔秦鳳路縁邉安撫司以官錢買鎮洮軍蕃部田置弓箭手王安石白上曰姚原古勘李定等故變易情狀其意有所附㑹而然也上曰勘見有情弊否安石曰情弊如何勘見但事理分明如此而故變易情狀又教道所推勘人作欵若無情弊何故如此上曰當得何罪僉曰杖一百該去官上曰與衝替情理輕安石曰詐欺如此似不宜作輕上曰於法已是無罪乃已安石又白上曰陛下遇君子小人不分明為天下須用君子若用小人必亂然則陛下於君子當厚雖有不及尚且寛假况其無罪若於小人即恐不當寛假陛下於小人每事寛假於君子乃不能無疑君子以禮義亷恥事陛下非為利祿也若為利即舍禮義亷恥何往而不獲利以禮義㢘恥事陛下而不免於疑不知君子何須為陛下致身竭力君子小人誠難知然忠信即君子誕謾即小人誕謾明白方更寛假不肯致法未嘗見其誕謾乃更懐疑所以小人未肯革面君子難為自竭陛下但有所疑即仔細窮究若究其誕謾便可致法若未見其誕謾即須以君子之道遇之不可遇君子以待小人之道如姚原古事陛下已是不能究窮作姦之本於作姦之末又務寛假此極為好惡不明然陛下好惡不分明非特此一事臣以謂陛下於君子小人宜加明察原古初見四月十七日甲申引進副使帶御器械髙遵裕為西上閤門使榮州刺史入内供奉官李憲為禮賔副使西京左藏庫使孫直為左藏庫使其餘使臣選人蕃官効用等改官減磨勘年賜銀絹有差以收復鎮洮軍之勞也十七日王安石論李憲可考賜秦鳳路縁邉安撫司錢一萬緡於鎮洮軍建僧寺以大威徳禪院為額丙戌上批樞宻院言四方賊盜朝廷近多不知問進奏院乃稱中書條約須十人已上又須强惡者乃許申提㸃刑獄司録奏故非十人及州縣奏者並退囘昨有徳州通封奏狀本院却收接進呈與樞宻院所言不同何故王安石曰舊例賊五人以上即取㫖降劄收捉中書乞自今奏到十人以上或雖不及十人情理㐫惡乃降劄收捉其餘依條合奏外仍付提㸃刑獄司類聚半年一奏中書㸃檢最多路分取㫖施行上曰如此則法更宻於舊進奏院如此必作姦馮京曰當是誤認新條上曰宻院又言為行役法後所以多盜賊故中書不令奏言京東多賊盜然京東元未行役法安石曰適㑹豐年故少賊盜若賊盜多臣亦未敢任責不知陛下推行得如何政事便要百姓皆不為盜賊也丁亥上批付王韶聞摩正殺李都克占父子都克占姪乞漢兵借助復讐可詳定如當乘此機㑹即以時經制上謂王安石曰文彦博稱市易司不當差官自賣果實致華州山崩安石以為官未嘗自賣果實也且曰華州山崩臣不知天意謂何若有意必為小人發不為君子漢元時日食史髙恭顯之徒即歸咎蕭望之等望之等即歸咎恭顯之徒臣謂天意不可知如望之等所為亦不必合天意然天若有意必當恕望之等怒恭顯之徒上因歎人臣多不忠信安石曰陛下勿怪人臣不忠信也有臣三千惟一心又曰予有亂臣十人同心同徳此周武王時也非特武王時如堯舜禹湯文武之時皆如此望之與恭顯更相譛愬乃元帝時趙憬裴延齡之徒傾害陸䞇乃唐徳宗時楊嗣復陳夷行之徒交相非毁忿争乃唐文宗時陛下能為堯舜禹湯文武所為即羣臣自當同心同徳若與漢元帝唐徳宗同道即不須怪人臣多乖戾不忠信也此事陛下但當自反而已安石又欲令諸司庫務係市易務行人買納上供物處令提舉市易司管轄上曰如此必致人言以為所買物不良安石曰不如此則庫務公人利於諸路科納必非理邀索揀退行人無由肯攬上曰今行人撲買上供物亦易爾前宋用臣修陵寺令行人攬買漆比官買減半價不知市易司何故乃致人紛紛如此豈市易司所使多市井小人耶安石曰市易司無小人一有違法便加案治雖有小人亦不敢為小人之事如陛下所稱乃是小人縁陛下於誕謾之人曲示含容所以小人之志得行安石又白上凡有奏中書者乞一一宣喻考核若架造事端動揺人情使怨怒即臣所無奈何如唐坰乃為人誑以臣已商量送審官與合入差遣此坰所以妄發如唐坰固不足惜如薛向即朝廷方收其用屢為人誑以臣商量差向出外向既不能無利心即不能無忿怒或因忿怒妄發即朝廷復失一薛向於國計乃為可惜上曰何故如此安石曰陛下御人臣之道未有以禁其如此上曰但要利害明耳安石所云誑坰及向者指馮京也戊子詔諸州軍駐泊鈐轄都監監押與知州軍同管駐泊軍馬在城鈐轄都監監押與知州軍通判同管屯駐就糧本城軍馬内屯駐就糧仍與駐泊兵官通管轄差使其河北河東陜西諸路帥府所在州軍即通判與在城兵官更不通管己丑詔秦鳳路縁邉安撫司以渭源慶平堡𨽻鎮洮軍鎮洮嵗賜公使錢三千緡可權增二千緡候有雜支錢即住支以經制之初費用不給故也庚寅朝獻景靈宫壬辰詔鎮洮軍造船置水手及壯城兵共以五百人為額先是王韶以洮水自北闗下結河泝流至香子城可通漕故有是詔詔提舉在京宫觀寺院自今武臣横行使及兩省押班以上為提舉餘為提㸃先是李若愚觧内侍押班樞宻院特令提舉慶基殿添支二十千王安石以為慶基殿舊無提舉官雖石全彬有軍功又以都知罷帶留後亦但為提㸃添支十千耳若愚朋比外廷為姦妄沮王韶事者也且内臣不宜崇長之恐須改正上曰竢即令宻院改正安石曰若愚姦邪尤難知其病去是天佑陛下聰明不然熒惑多端恐陛下未易察近日大臣以陛下聽信近習之故多撓法阿媚近習此事極非所以觀示天下於是創立此條它日安石白上曰學士舊多提舉宫觀陛下指揮罷差都知押班自祖宗以來只提㸃宫觀今却改為提舉月添支十千至二十千學士雖容有非其人然以道徳事陛下以論思為職事比都知押班不宜輕今學士即一概罷差宫觀都知押班却更每月與增十千至二十千臣不知都知押班禄賜為薄為厚若祿賜己厚何須如此上曰近習自祖宗以來如此如霞帔之類學士不得都知押班乃得之安石曰祖宗以來雖若此陛下欲躋聖徳及堯舜之道即不知此事在所消在所長祖宗時崇長此軰已是不當然只令提㸃宫觀陛下更改令提舉増與添支臣恐不須如此假如學士有以病退者陛下必不肯令提舉宫觀今若愚以病廢只令提㸃慶基殿已是過優又令提舉實為非理上曰此事乃宻院誤安石曰陛下以為誤中外觀聽孰不以為誤陛下必欲好惡是非出已必不欲為近習所移然陛下有所好惡近習能因事疑陛下心故令好惡不明陛下有所是非近習能因事疑陛下心故令是非不果陛下以近習故好惡不明是非不果此大臣不知義命以利害事陛下者所以不能不阿媚此軰也上曰事有因時宜如穆王命太僕亦非不重安石曰太僕官固不輕穆王所以命之者使之懐忠良使之正而已非假借名位禮數令躐等也上曰此軰豈盡小人亦必有忠良近日裁制已不少添支㣲末亦無分外親近左右使令之人不可使懐怨望安石曰此軰固有忠良假令非忠良若陛下御之以道即雖小人自當革面而為君子若陛下不能御之以道即今天下所望以為君子者變為小人多矣况此軰豈可保信若愚等差遣事陛下似未能御之以道臣所以未敢保此軰忠良近日法制雖裁制此軰徼幸事不少然此軰比外廷臣亦未為失所茍不以理分裁之則是後義先利不奪不厭茍以理分裁之則此軰未宜怨望如大臣最宜避其怨望要處之有義不使失所而已今一人以義事陛下以義裁制近習一人以利事陛下以利崇奬近習此所以激怒近習令生怨望陛下豈可不察陛下謂此軰亦有忠良臣亦謂如此然陛下當以道揆其言則所謂忠良者果非邪慝若不能以道揆即臣恐陛下所謂忠良者未必非邪慝也盤庚無敢伏小人之攸箴小人之言不可忽况此輩選擇親近所寄亦不輕非為小人也則其言豈可忽然古人以言為箴者為其由正道以治病故也若不由正道治病乃妄刺要害即箴亦能有殺人之理陛下受小人攸箴亦恐不可不審初程昉之再遷官也安石言昉功多賞不厚欲升昉資序上令與昉都鈐轄請受王珪乞且與鈐轄上曰昉自合入鈐轄既云酬奬當與都鈐轄珪曰宻院言内臣無作都鈐轄者昉亦止欲得鈐轄耳安石曰昉未嘗以資序為言也宋昌言往修河時稱昉資序深但為中書使昉故宻院不與勘㑹理資序上既批出與昉都鈐轄明日又令再進呈取㫖及再呈上曰聞宻院言路分都監無條例以資考平入鈐轄都鈐轄數任有功乃特遷今當何以處昉珪又乞與昉鈐轄安石曰昉資序自合入無以賞其買草之功欲且與鈐轄侯三年除都鈐轄上曰善上又言路分都監鈐轄於條都無著定資序安石曰雖無條然自有熟例如宫觀提舉提㸃宻院亦未嘗有條上曰李若愚提舉已令改正矣是日安石留身上問安石何以處陳升之安石曰升之故相位本在臣上陛下當自決非臣所敢預上固問之安石固辭上曰朕與卿計此卿勿辭安石曰陛下欲何如上曰中書必不可容與郡可乎安石曰升之以人望亦可驅使顧陛下御之如何爾恐不當與郡因白上李憲論功轉一官減磨勘三年足矣宻院乃擬定依諸司副使例更超轉一資前此未嘗有如此例也此於李憲所繫利害亦不多宻院所以如此者陛下知其說否憲遷禮賔副使在初九日此乃宻院與中書同進呈臣既論其不可方改定盖藉此為質驗激怒李憲以為宻院欲厚賞其功而中書不肯也以陛下崇信此軰故欲借其力沮害正論諸如此類甚衆陛下當審察不可使姦臣得計上曰近習亦有忠信者不皆為欺不可以謂皆如恭顯安石曰臣固以謂如此若為恭顯小人便謂近習之言都不可聽即為盧把李林甫小人便謂大臣都不可信可乎盖先王於君子小人之言無所不聽亦無所偏聽雖堯於舜亦詢事考言決其是非然事有難知此浸潤所以得行故先王難壬人畏巧言令色孔壬上曰小人不過以邪諂合人主人主有好邪諂即為其所中安石曰人主要聞道若不聞道雖不好邪諂好正直即有人如劉栖楚叩頭出血諌争却隂為姦私邪慝而無術以揆之亦不免亂亡自古惟大無道之君乃以恣睢致亂亡如漢元帝非不孜孜為善但不聞道故於君子小人情狀無以揆之而為小人所蔽陛下試讀石顯傳天下後世皆知其為姦邪能害當時政事然求其顯然罪狀即不可得自非人主聞道即不能見㣲不能見㣲即為此軰所蔽至於衰亂而不悟陛下不邇聲色憂勤政事可謂有至仁之資然要揆君子小人情狀決天下大計湏聞道茍能聞道即聲色玩好不能累其心不必强勉而後能勝也君子小人之情狀來接於我即有以應之不必勞耳目思慮而後能察也三公以論道為職者必以為治天下國家不可以不聞道故也陳瓘論曰宦者四星在皇居之側其人近至尊國家安寜則其身亦安尤當自異於疎逺之臣也故善為計者莫如愛國國以忠賢為本忠賢者兆民之命也䕶民之命則賢者亦必與之矣曹日昇方危難之時不顧萬死顔真卿深與其忠以一言助之共成王事巷伯有疾讒之心孔子取焉先聖之所取後賢之所與皆以其忠信而已矣神考謂近習亦有忠信者此聖主公平之訓也一於愛國之謂忠公議信之之謂信馬存亮非不憎宋申錫也而能救申錫一門之禍捨己愛憎存國大體其所為如此公議不以為信可乎魏𢎞簡之於裴度則既憎其人又沮其軍遂使巨盜不除為國之患其所為如此天下豈以為忠乎是故持正論者其類不同而同乎愛國為姦計者其類不一而一於圖私然則所謂沮害正論姦臣得計者果獨在於近習耶神考之取忠信豈非公平之詞哉吕強請赦黨人楊復光泣武周岌嚴遵美力辭兩尉張承業極諫横費如此之類皆忠於國家而信於公議者豈可謂古有恭顯曾害忠良便以為今日之人都無可聽者乎漢詔公卿子弟為郎以補宦官之職侍於殿上當時謀者正謂其人都不可聽故欲以此而代彼也新經義既取其說而日録又欲變亂舊䂓自以為此乃宗廟社禝久長之計嗚呼太祖皇帝規模宏逺保全内外國本強固私家亦寜一百五十年矣長久之計何以加此何為而忽欲變更也自有經義以來凡三十餘年而王氏學術始見窟穴計謀秘奥包藏深逺章惇不知也蔡京雖凶果敢行而亦不能深察其謀主此謀者蔡卞而已矣序辰洵武其腹心也隂挾計數用新經日録之術算人於談笑之中陷人於簡冊之内使人習之而不覺信之而不疑積日累年然後令人大悔恨也既往之事不可追矣未來之事豈可不以為鑑哉然則今當何鑑莫如忠信愛國而已矣癸巳秦鳯路縁邊安撫司言乞乗春築康樂城及作耳朶闗從之詔兩省以上致仕官毋得因大禮用子升朝叙封遷官先是王安石言中書失檢舊例誤放行李端愿李東之叙封當改正上曰如此則獨不被恩安石曰叙封初無義理今既未能遽革豈可更承誤遂為例如三公三師官乃因郊恩子孫叙授尤非宜上從之甲午詔提舉陜西路常平等事沈披降一官送審官東院坐前為兩浙路提舉官開常州五㵼堰不當也初法寺言披已去官及㑹赦罪當釋之上曰壊田八百頃民被害者衆豈可以去官赦降之哉涇州將官賈昌言景思立各罰銅十斤廵敎指使衝替堂引試日所部兵武藝不精故也丙申内藏副使王中正為禮賔使文州刺史帯御器械以收復鎮洮軍及招洮西降羌之功也樞宻院擬遷中正東染院使帯御器械上批中正可止與轉五資使額却除遥郡刺史詔知通遠軍王韶相度鎮洮軍獻地蕃户優與酬奬及涇原軍人弓箭手所獲作過蕃部牛馬估價分給元獲之人武學言宻州司法參軍蔡碩試治邉策詞理稍優授碩初等職官武學敎授碩確弟也詔知徳順軍景思立專以本將軍馬策應鎮洮軍初鎮洮之役上遣思立將涇原第六將軍馬并第一等弓箭手五千騎助之人皆精勇敢戰所向克捷時以摩正餘黨尚懐旅拒故有是詔上謂王安石曰御史言向經宅太侈軍士以為一次拜郊錢物止修得一區皇后父宅安石曰向經外戚至尊貴但賜一宅以臣所見甚不為侈若軍士輙有言小人陵上乃至此此風豈可長臣以為外戚使奉法順理不敢為非足矣若加恩賜宅如經有何不可上曰御史有此言耳未必軍士便有此言也二十一日事丁酉詔自順天門抵鎮洮運遞鋪兵人特支錢三百衲襖或皮裘一其闕兵處令轉運司府界提㸃司增填先是李憲奏比自鎮洮還見自京發銀絹綱甚多所在鋪兵轉般不足皆過所期鋪五七十里或百里極為勞苦及代回又無日食不免乞丐故有是詔戊戌改鎮洮軍為熈州以鎮洮為節度軍額分熈河洮岷州通遠軍為一路置馬歩軍都總管經畧安撫使所應制置事令經畧安撫使司詳具以聞熈河秦鳯路徳音到日罪人除常赦不原情輕奏裁外餘各降一等杖以下釋之熈河路應唐以來勲賢之後世系照證分明量加甄録知通遠軍右正言集賢殿修撰王韶為龍圖閣待制熈河路都總管經畧安撫使兼知熈州初議克復洮岷功賞上曰王韶當與何官王安石曰韶更遲一二年亦當除待制不如早除令其勢重易使人於經制邉事尤便上曰待制豈可知軍安石曰此事在朝廷措置如韶功除待制不過前後除待制要如此人即難得上曰固也但要措置穏當耳已而韶欲自知鎮洮令髙遵裕知通遠安石白上鎮洮便可建為州通遠鎮洮河州或併割階州為一路僉以階州為逺安石曰未要階州亦可上曰王韶意未欲便并河州恐動人情安石曰是或一說然如臣計便明下詔割河州屬鎮洮路示河州人以必取即人心自折不復首䑕摩正無由結合姦黨上以為然故有是詔西上閤門使榮州刺史髙遵裕知通遠軍兼權熙河路總管先是上謂執政曰王韶初經制鎮洮異議紛更之際獨髙遵裕能協力欲與一都鈐轄名目如何王安石曰縱與權總管亦無害蔡挺曰若如此即當罷知通遠軍葢自來無總管離帥府而知軍州者上曰有事宜即出駐劄使知軍亦何妨安石曰總管知軍與鈐轄何異亦不須論舊例有無也遂以命之詔知徳順軍景思立令久任又詔京西就糧武衛等指揮分畨戍永興軍路二年一替舊制京東西路就糧禁兵與在京諸軍一處差撥出戍上以兩路去河北陜西地里便近人情諳習故先以京東武衛專戍河北又以京西武衛戍陜西仍𨽻逐路都總管司閏七月二十七日可考庚子御史劉孝孫言臣聞二蜀去朝廷絶逺而成都府路又為劇繁俗習柔良小事輙駭故平日守帥嘗許便宜以應緩急之變葢以消伏彊禦鎮静一方而近嵗守臣任或非人資以為暴如王素張燾輩多非理黥流欲立名譽縁此詔令軍機邉防方許便宜從事然臣以為因噎廢食古人深戒儻朝廷妙選循良付以事權託之何害且况兵鬪民訟變故不常或有急難理當懲艾近聞趙抃嘗有所請未即允俞然遠方之事勢難中覆臣愚欲乞成都一路且依舊例施行使得隨事弛張應機彈壓以消未萌之患不報先是議諸路經畧鈐轄不得便宜斬配百姓趙抃時在中書乃言當獨許成都四路王安石執不可曰成都與諸路遠處何異㑹安石齋祠中書樞宻院同立法許之其後謝景初奏成都從來妄以便宜從事所釋誅多不當乃至有年十五已下犯法至輕皆先刺配候其長之配所於是中書復冊定敇文惟軍人犯罪及邉防并機速許特斷已而知太原府劉庠言弓箭手在極邉守望有犯乃不敢特斷奏乞改法安石曰極邉即是邉防明甚庠不應妄奏及抃移成都又請重立法編勅官曾布言止當申明云事合從權為機事出倉卒為速於是孝孫奏繼至安石曰孝孫既稱蜀人柔良則以常法治之足矣何故反欲彈壓又言事在倉卒倉卒即是速何用改法為也詔以曽孝寛根括河外荒地七百餘頃招弓箭手辛丑詔知都水監丞侯叔獻理提㸃刑獄資序周良孺與升一任以淤田有勞也同知諫院張琥言朝廷自推行新法以來迨今數歳州縣之吏多不能悉心惟藉監司督責使之施設不至違戾而近者監司所至方諳知利害又已移領他路使好進之人因縁茍簡不肯竭力以圖實效乞自今諸路監司並令久任顯有勞效即就加爵秩陞理資任上因謂輔臣曰官吏數易何以成治漢宣帝責任有勞者增秩賜金正得其要諸路監司但委任責成如其不材即與廢退則自當奮厲王安石等曰陛下累宣諭中書每有移易未嘗不思聖訓葢求材之難有不得已者耳詔熙河路依縁邉四路例置横烽遇賊入境遞相應接其在蕃部地者即以廂軍守之提舉市易司言晋州差衙前押進奉蒲萄而晋非所出盡買於太原欲令在京計置仍令澤州封樁價錢聽本司移用中書擬從其請上批蒲萄無用更勿收買癸卯詔追奉永昭永厚陵寺名曰昭孝同知諫院張琥言乞令臺諫館職及發運轉運副使判官提㸃刑獄各舉材行堪任升擢官一人從之八月十九日可考甲辰皇城使昭州團練使入内押班藍元震為入内副都知上批元震自擢領近職忠勤謹畏由内侍押班除入内押班今已五年有餘可與減殘零歳月特遷之也詔淮南兩浙江南荆湖成都府梓州路如有諳曉耕種稻田農民犯罪該刺配者除彊盜情理兇惡及合配本州鄰州沙門島人外並刺配熙州候及三百人止王韶言近洮可為稻田欲得善種稻者故也詔熙河路城寨大小使臣年滿得替依陜西縁邉四路城寨任滿酬奬減磨勘年仍免短使升三季名次詔河東屯戍東兵減十指揮仍令更於河外抽減就糧兵士歸營時西事已平又河外自慶厯用兵後部族未完非夏人冦掠之地故命減兵以省餽餉是月廢儀州為華亭縣及要化崇信𨽻渭州乾州為奉天縣𨽻京兆府永康為寨導江縣𨽻彭州青城縣𨽻蜀州
