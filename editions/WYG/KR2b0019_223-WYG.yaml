body:
  text: 續資治通鑑長編巻二百十九宋李燾撰神宗熙寧四年春正月丁亥朔上不視朝戊子种諤領兵次撫寧堡敵有迎降道傍者左右欲收其甲諤曰今為一家敵即吾人也聽以自隨己丑兵次婁城敵帥都勒瑪斡與其將四人聚兵婁城之北曰馬户川謀襲諤諤諜知之以輕兵三千潜出撃破之都勒瑪斡遯去復與其將三人駐兵立賞平諤遺以婦人衣三襲明日遣將吕真率千人斥候大風塵起敵驚曰漢兵至矣皆潰而走遂城婁凡二十九日而畢大小四戰斬首一千二百降口一千四百諤始出師知横山有積粟令民兵多輦版築之具往反三十五日所將步騎二萬食官米二斗二升芻六束餘悉因糧于敵據吕大防捷奏稱初五日伊都樞密多拉參政及鈐轄十三人領兵三千在馬户川初六日諤遣將擊走之斬首百餘級與范育誌諤墓所書小不同今悉従墓誌欲知諤婁城功效盡於此也二月四日庚申二月十八日甲戌可考三月十八日癸夘乃棄婁壬辰詔鬻天下廣恵倉田為三路及京東常平本其當賑濟即以廣恵常平等倉所貯粟麥給之初王安石言廣恵田可鬻以實三路常平曽公亮曰佃户或百年承佃有如己棄令鬻之則至失職非便上曰還令佃户買之則無不可者安石曰公亮所言盖官莊也若廣恵倉田乃本是户絶法自當鬻但因近置廣恵所積不多何能賑饑今已修常平法則㓙年固不患無所賑濟公亮終以為不可曰利不百不變法上曰但義理可行則行之自無不利安石曰利者義之和義固所為利也公亮曰亦有利於公家不利百姓者不可謂之義安石曰若然亦非人主所謂利也於是卒從安石議而有是詔乙未工部郎中兼侍御史知雜事謝景溫直史館兼侍讀景溫辭乃罷侍讀知鄧州王安石任事景溫初附之故攻蘇軾等其後言薛向非才不當超除待制及言王韶邉事誣罔寖失安石意故不得在言職仍補外哲宗舊録云神宗勵精政治起用人材景温不達政體言多躁輕上寖薄之故出今従新録林希野史云云附注五年二月一日罷陜漕時為陜漕在四年三月二十六日職方員外郎集賢校理鄧綰為兵部員外郎兼侍御史知雜事舊録綰傳云神宗舉良法革宿弊裁抑僥倖而中外洶洶共為一朋言官顧私計俯仰觀望議論無所適従上患之故用綰為知雜御史新録已削去今亦不取度支員外郎集賢校理陳繹直舎人院知審官東院判户部勾院繹直院三月四日可考天章閣待制知審官東院孫永知瀛州渝州南川縣廵檢供奉官李宗閔都監司指使散直李慶等領兵遇夷賊李光吉等於木藍寨沙溪界皆死之詔孫桷等處置妥帖無致滋張漸為邉患仍遣太常少卿江中行往䕫州路體量遂以中行為提㸃刑獄先是南川巴縣熟夷李光吉王衮梁承秀三族各有地客數千家間以威勢誘脅漢户不從者屠之沒入土田往往投充客户謂之納身税賦皆里胥代納莫敢督藏匿亡命人不敢詰數以其徒偽為獠人刼邉民數百家及官軍追捕則言獠人遯去習以為常邉民畏之不敢以實告厚賂州縣民覘守令動静光吉稍築城堡以自固繕修器甲逺近患之轉運判官張詵建議請誅之詔遣權度支判官孫桷為轉運使與詵共議時熈寜三年二月也桷詵宻以方畧授兵馬使馮儀牟簡杜安行使圖光吉等且於縁邉州縣儲軍需以待事聞報可桷初令儀等以禍福開諭光吉承秀地客納質聽命使各安生業復進兵窮討久未就誅㑹宗閔敗詔桷等厚賞開其自新又詔詵首議討捕光吉等今殺廵檢使臣多喪軍士且不得賊詵已任滿可令再任責之躬自討賊遂詔詵再任此段用孫桷張詵渝州熟夷傳并新舊録刪修桷附傳云為轉運使與章惇經制南北江同時此盖元祐史官之誤紹聖史官已改正入本傳詵附傳云為轉運使不累旬首惡盡獲亦誤也新録又承其誤今不取今詵再任在戊戌十二月今并書十八日甲辰復賔化縣檢正中書刑房公事李承之言天下所㫁大辟委提㸃刑獄司勾考刑部詳覆恐多踈畧容有寃濫又奏至不以時讞故久繫獄囚乞自今令刑部月具已覆過大辟案逐道申中書委檢正官覆詳大限十日小限七日如有不當或無故稽留者取㫖責罰從之戊戌出榷貨務錢五十萬緡助糴陜西軍糧令三司易内藏庫錢應副以京東封樁紬三十萬匹錢十萬緡償榷貨務陜西都轉運司裁定本路廂軍數詔減五千人以三萬人為額省邉州冗食也已亥河東經畧轉運司言宣撫司令計度運糧義勇夫所備數過多頗聞騷擾詔約實準備應副所運糧草仍給與近便倉場毋費民力轉運司又請借常平廣恵倉錢十萬緡助糴軍糧從之又言應副宣撫使科率民力已不堪上批若果然恐別致生事又慮轉運司過當處置隂欲揺動邉事遣御史范育乗驛體量以聞時韓絳使种諤將兵城婁雪中築撫寜堡調發倉猝闗陜騷然河東尤甚吕公弼具以聞或疑公弼等用意沮壊故令育往視遣范育御集在十八日今從實録育以二十一日起發見育集免臺職狀吕大防先奏事在闕下上已知种諤自將入生界迎河東兵深以逺道存亡不可知為憂手札付大防令速諭韓絳且緩圖麟府一帶新寨并促大防還司又批河東處置乖方一路民力今已乏竭儻别致生事與城婁相萬也此據吕大防家所藏御札不知日月其末有云今偶連假不及與卿相見且宜速去連假則是上元可知又御集第十九巻御批令大防早回中書欲令十七日對訖上道又批今日已遣人至大防處稱取来日前去此更不須指揮則大防所受御札即此是也存此亦足以見神宗憂邉恤民之盛徳云癸夘詔王慶民依舊專管勾麟府路軍馬蕭注於太原府聽㫖初以注代慶民注既行聞河東用兵乃自言本書生長於撫納而短於戰鬭恐不能辦麟府事㑹有言交趾為占城所敗衆不滿萬可計日取也因命注知桂州潘夙傳云夙陳交趾可取此云衆不滿萬或是夙所陳也當考六年正月注罷桂州上問注攻取之䇿注辭曰臣昔者意嘗在此方是時溪洞之兵一可當十器甲犀利其親信之人皆可指手役使今兵甲無當時之備腹心之人死亡大半而交人生聚教訓之又十五年矣謂其衆不滿萬恐傳者之妄也韓絳等言种諤領兵至婁城招納人畜并獲首級詔遣内侍軍前撫問王延慶延州蕭汝賢麟府州甲辰詔三司出銀十萬兩赴河東轉運司仍許商人入便本路見錢十萬緡以助軍費䕫州轉運使言渝州巴縣兵馬使杜安行等率土丁破李光吉等復賔化縣贈李宗閔文思使録其二子為三班奉職孫桷傳曰令杜安行募千餘人掩襲官軍繼之斬取秀遂焚二族所居衆保里崖嶺桷移黔州趫捷土軍三百来赴㑹夜使乗間道鼓譟以進光吉堕崖死衮自縛以其地建南平軍復扶歡榮懿二寨舊紀正月癸夘書孫桷平渝州叛夷復賔化縣新紀係甲辰乙已著作佐郎集賢校理編修中書條例張琥為太子中允同知諌院兼管國子監京西置提舉教閲官二員供備庫使宋亨西京河陽鄧汝均襄郢金房光化十一州軍左藏庫副使郭懐許鄭陳隨滑潁信陽七州軍樞宻院言諸路根括牧地煩擾請權罷以俟農隙從之丁未降太子中允權監察御史裏行林旦為著作佐郎知黄縣薛昌朝為大理寺丞知宿遷縣先是旦昌朝言李定當為所生母追服不報旦劾定始則以侍養便為行服之年及聞朝廷議令追服復稱仇氏非其所生本末反覆實避追服伏以禮法二事繫朝廷之大端定既墮敗人倫不能自請尚冀朝廷申眀以正薄俗豈可曲狥定之私説廢蔑大義復加擢用又奏按定初言眀知仇氏為母雖未行服但嘗解官侍養其情猶可恕者因朝廷再加審詰既避追服又懼得罪遂作為繆悠不可考實之言冀為終身之疑内欺其心上惑朝廷此則天下之所共惡者使定自請追服猶未能逃名教之責况朝廷覆問言者紛紜經渉時月曽無一辭以請安然自得略無媿畏便已背親賊害忠孝無甚於此朝廷方且遷官進職置在勸講臣實不知其可也又言父子相隠聖人以為直今李問閨門之私郜氏仇氏平時不正之偶縁定之故暴其宿醜喧布朝野彰父不義之惡忘母所生之恩又言宰相王安石以定素出其門力為薦引雖舊惡暴露猶曲折蔽護言事者敷陳義理一不省顧淮南轉運使劉瑾定隂相交結希合附㑹故作疑辭附下罔上表裏欺蔽致不孝之人擢為君側臣至中書安石謂臣言此事自出上意臣聞古之事君者善則稱君今衆人知仇氏為定母安石獨以為非衆人知定為不孝安石獨以為可而昌朝亦言仇氏死於定家定已三十七嵗無有不知之理人皆以定為不孝而安石獨以為賢定身負大惡而安石寘之勸講之地盖定素逰其門安石不顧是非專欲取勝言者故定合追服事理雖眀而猶再下淮南㑹問淮南轉運司既憚安石之勢又見中允恩命已行遂不考實作為疑辭安石不復質諸事理便以上惑聖聽使朝廷之上經筵之間寘一不孝之人何以刑示天下旦六疏昌朝七疏故有是命詔開封府東眀考城長垣縣京西滑州淮南宿州河北澶州京東應天府濮齊徐濟單兖鄆沂州淮陽軍别立賊盜重法從檢正中書刑房公事李承之請也戊申詔宣徽南院使郭逵歸院供職大理寺丞館閣校勘顧臨為太子中允荆湖南路轉運判官提舉常平等事臨喜談兵嘗召對問以兵學臨曰兵以仁義為本仁者愛人義者循理動静之機安危所繫也因條上十事及使湖南議論與執政違戾因乞解官侍養詔歸館閣供職踰年乃起兵部員外郎兼侍御史知雜事鄧綰判司農寺舊録綰傳云判司農寺於是常平免役水利保甲之政皆自司農頒矣時民困差役而衙前破産為甚綰首請行之府界一日而免衙前歸農者八百三十餘人諸路􅊖倣焉新録辨曰既行免役則被差衙前自當放免諸路莫不然豈得為綰功哉今自民困至倣焉三十八字並刪去吕恵卿三年五月十七日曾布三年九月八日已判司農綰傳所云常平之政皆自此頒恐綰非事始也合刪去又三年八月二十九日十二月九日可考范百禄云云可考權江淮等路發運副使皮公弼為陜西路轉運副使己酉太常博士集賢校理權發遣提㸃陜西刑獄趙卨為右司諫直龍圖閣權發遣延州新提舉廣東路常平等事都官員外郎游烈送審官東院以親老願徙便地也游烈除廣東常平乃二年閏十一月壬子今踰嵗猶未赴不知烈何人當考詔唐州泌陽縣令王友諒與兩使職官令再任舉主足聽磨勘以轉運司言友諒招誘流亡千餘户墾田數千頃故也王友諒究竟如何又詔宣撫司以軍興貸河東民錢轉運司速償之又詔諸州公使庫例以役人主之倍備縻費其令天下具公使錢及主吏輕重所當支酬數上司農寺詳定利害以聞其後司農定諸州所用公使錢奢儉各不中禮甚者或至非理掊克今當量入為出隨州郡大小立等嵗自二百貫至五千貫止若三京三路帥府成都杭廣自来所用多者增其數詔從之又詔發運司六路及京東轉運司封樁茶本租税錢易金銀綿絹上京知大宗正承事李徳芻言近據宗悌第状奏各為自嘉祐五年十二月内磨勘轉官至今年十二月已周一十年合依詔條磨勘轉官檢㑹先準至和二年八月詔先朝舊制皇族在班及十八年者具名取㫖今宜令中書樞宻院勘㑹皇族自明堂覃恩普轉後及十年者特具名取㫖當議依天禧元年二月宗正寺所定房院次第各與遷轉所有近因特恩改轉者即須候及十年别具取㫖今宗悌等稱依得詔條磨勘轉官看詳前項詔書出於一時特㫖即無今後指揮自嘉祐五年至今雖及十年又縁其間兩經覃恩普轉官資自覃恩後至今方及四年乞下中書看詳明降指揮詔自治平四年覃恩普轉後及十周年者特具名取㫖近因特恩轉者即須候轉及十周年取㫖此據㑹要四年二月二十三日事今附本月日或以為三年十二月十九日事誤也二月十八日更詳之實録但書詔自今宗室嘗經覃恩特恩遷官者十年後取㫖或只用實録亦可横海軍留後贈䕶國軍節度使河東郡王諡和恵承衍卒庚戌詔陜西已行交子其罷永興軍買鹽鈔場陜西都漕沈起奏行交子法見四月八日罷時三月三日文彦博所言可参考二年十二月五日撥錢十萬充買鈔本錢三年十一月二十二日増二十萬食貨志云四年詔行蜀交子法于陜西而罷市鈔或論其不便復如初三月十四日復買鈔辛亥刑部詳覆官殿中丞朱溫其為國子博士溫其駮正大辟案活五人特遷之著作佐郎朱明之為崇文院校書明之安石妺壻也二月辛酉及丁夘當参考知成徳軍起居舎人天章閣待制劉庠為河東都轉運使庠替何人當附見二月六日又除韓鐸三月二十一日張問陳汝義責内殿承制閤門祇候同勾當汴口李宗善為禮賔副使宗善明習水事在汴口十二年都水監請増秩再任故也宫苑使帶御器械程昉為都大提舉黄御等河同簽書外都水監丞内侍簽書職事非故事也朱本抹去墨本云内侍不簽書無出處合刪今依新録仍存之詔河東軍費不足其令三司借内藏庫銀二十萬兩付本路更不令商人入中見錢又賜度僧牒鄜延路經畧司二千道河東轉運司三千道以助邉費詔應奏舉大小使臣邉要任使仍舊樞宻院銓量才器其餘舉官及陳乞差遣送審官西院三班院定差軍員老病當降軍分送殿前馬歩軍司指定職名並申院降宣以樞宻院細務繁多故又省常事歸之有司宣撫使韓絳言鄜延路當築四寨已令种諤駐兵築婁城候畢功進兵築永樂川尚頗嶺二寨仍令遣都監燕達趙璞築撫寧故城又分荒堆三泉吐渾川開光嶺葭蘆與河東路修築通接道路各相去四十餘里壬子詔陳升之起復升之固請終䘮許之賜提舉成都府路常平司交子錢二十萬緡為青苗本錢上批渝州夷賊梁承秀雖已撲滅尚有李光吉王衮未能掃除聞梁氏一族雖衆而承秀其實選懦惟光吉衮㓙惡族人畏之頗為其用若不早謀破散其黨恐日乆養成邉患其獲承秀首級者令轉運司速給賞錢并特與頒行及承秀佃客投降亦厚撫存之使足以感動光吉之衆有功官吏及土丁等數速以聞三月五日詔更考之保州奏内殿崇班趙永圖言上皇墳園比奉敕建資果禪院乞撥田十頃以贍僧徒從之甲寅太子中允權監察御史裏行范育落御史裏行為崇文院校書育前後七奏李定不服母䘮及奉使河東又面論之且乞罷免臺職其言曰天下之惡當先治其大者而定諱䘮背母朝廷之法當先治其近者而置不孝之人在天子左右臣職在糾彈此為不正焉暇及他是以夙夜憂危發憤悶肆狂言而不知止也臣昨在本臺以定所供三狀案文求情知其先信而後疑先信發於誠心後疑生於巧避今王安石不信定之誠信而獨信其妄疑不為質其母而直為辨其非母不正其惡而反謂之善上誣天心下塞公議朝廷雖可惑李定之心安可欺臣言雖可抑而天下之心焉可誣伏願陛下以髙明照物情以神武㫁羣議或正罪李定或貶削臣職育既辭七日而有是命據育集乞罷状以二十日起發上諭樞宻院涇原路總管張玉鄜延路總管劉永年並令再任玉可與一子官永年止與支賜文彦博言兩人同再任而推恩不同臣等未諭聖意上曰玉累有戰功永年但以乆熟鄜延事未有代者若一槩推恩何以激勸仍令自今凡都副總管再任並臨時取㫖推恩詔三司應買撲酒麴諸坊場錢每千納税錢五十仍别封樁以禄吏翰林學士韓維等上文徳殿朔望視朝儀以入閤舊圖所載増損裁定之詔可
