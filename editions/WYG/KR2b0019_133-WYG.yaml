body:
  text: 續資治通鑑長編巻一百二十九宋李燾撰仁宗康定元年冬十月癸未以御侍河南郡君朱氏清河郡君張氏並為才人張氏河南人父堯封天聖初客南都依大姓曹氏曹以女妻之後擢進士第補石州軍事推官未行卒京師從兄堯佐將赴官于蜀而曹氏請以諸孤從行堯佐以道逺弗許曹益困堯佐母錢氏女也張是時八歲與姊妹三人由錢氏入宮寖得幸于上性聰敏便巧挾智數能探測人主意先後將迎上以其良家子待遇異諸嬪使累封清河郡君於是與朱氏並為才人朱氏開封人也慶厯元年八月朱氏生子曦張后本傳云慶厯元年封清河郡君誤也㑹要亦誤乙酉詔諸處盜賊以名捕者其令流内銓三班院募選人使臣有能設方畧或親擒獲者當議超擢之鄜延鈐轄朱觀等襲西賊洪州界郭壁等十餘寨破之此月三日㨿范仲淹奏議戊子詔自今内降指揮與臣僚遷官及差遣者並令中書樞密院具條執奏以聞上性寛仁宗戚近幸有求内降者或不能違故也上性寛仁以下據記聞己丑命翰林學士王居正知制誥王拱辰天章閣待制髙若訥於國子監考試方畧舉人侍御史掌禹錫彌封巻首斬神衞軍主昭州刺史杜安於鎮戎軍初賊冦鎮戎軍涇原路都監劉繼宗出戰而安擅離主將入城也辛夘鄜延鈐轄供備庫使忠州刺史朱觀為崇義使涇原鈐轄兼知鎮戎軍環慶鈐轄髙繼隆等出兵攻西賊經納旺穆等砦破之十月九日此亦據范仲淹奏議癸巳命館閣校勘刁約歐陽修同修禮書甲午賜涇州駐泊都監禮賔副使王珪名馬二疋黄金三十兩褁瘡絹百疋仍遣使撫諭之復下詔㬥其功塞下以勵諸將尋命為本路駐泊都監復兼行營勒金字處置牌賜之使得專誅戮乙未端明殿學士李淑等上所定銅符木契傳信牌下有司製之銅符之制上篆刻曰某處發兵符下鑄虎豹為飾而中分之右符五左旁作虎豹頭四左符一右旁為四竅令可勘合又以篆文相向側刻十干字為號一甲巳二乙庚三丙辛四丁壬五戊癸左符刻十干半字右符止刻甲巳等兩半字右五符留京師左符降部署鈐轄知州軍官髙者掌之凡發兵樞密院下符一至五周而復始指揮三百人至五十人用一虎一豹符五千人以上用雙虎雙豹符樞密院下符右符第一為始内匣中緘印之命使者齎宣同下宣云下第一符發兵若干所在取左符勘畢即發兵與使者復緘右符以還仍疾置聞所在籍下符資次日月及兵數無得付所司其木契上下題某處契中剖之上三枚中為魚形題一二三下一枚中刻空魚令可勘合左旁題云左魚合右旁題云右魚合上三枚留部署鈐轄官髙者掌之下一枚付諸州軍城寨主掌之部署鈐轄發兵馬百人以上先發上契第一枚貯以韋囊緘印之遣指使齎牒同往所在騐下契與上契合即發兵復緘上契以還仍報部署鈐轄其發第二第三契亦如之掌契官籍發契資次日月及兵數互為照騐傳信牌中為池槽藏筆墨紙令主將掌之每臨陣傳命書紙内牌中持報官兵復書事宜内牌中而還主將密以字為號騐毋得漏軍中丙申環慶部署忻州團練使兼知慶州任福為龍神衞四廂都指揮使賀州防禦使賞白豹城之功也尋命福兼鄜延路副都部署丁酉降渭州都監禮賔副使訾斌為内殿崇班逺處監當經畧使韓𤦺言斌領兵往鎮戎軍而怯於禦敵也按實録九月丁丑書涇原部署司言今月十七日西賊冦鎮戎軍本路都監劉繼宗李緯王秉訾斌戰敗於三川寨官軍没五千餘人及壬午韓𤦺奏三川諸將敗無訾斌名字今坐法於禦賊責降蓋訾斌未嘗戰敗也恐涇原部署司丁丑所奏蓋增訾斌名字爾故不取戊戌詔如聞諸路盜賊剽刼而官司匿不以聞其令轉運使提㸃刑獄司督廵檢縣尉以便宜施方畧捕逐敢有匿者以違制論其懦不任事選所部官代之庚子出内藏絹一百萬下三司助邊費初鴻慶宮災集賢校理胡宿請修火祀以閼伯對祭大火禮官議曰閼伯配火侑食如周棄配稷后土配社之比下厯千歳遂為禋祀祖宗以來郊祀上帝而大辰巳在從祀閼伯之廟每因赦文及春秋委京師長吏致奠咸秩之典未始云闕然國家有天下之號實本於宋五運之次又感火德宜因興王之地商邱之舊作為壇兆秩祀大火以閼伯配建辰建戌出納之月内降祝版留司長吏奉祭行事籩豆牲幣得視中祠雖非舊章特示新禮閼伯舊廟官給材費修飾乃上壇制髙五尺廣三丈四出陛陛廣五尺壝一重四面距壇各二十五步位版以黑漆朱書曰大火位配位曰閼伯位牲用羊一豕一器凖中祠歲以三月擇日長吏以下分三獻州縣官攝太祝奉祀胡宿議祀大火配以閼伯實録文太繁今從本志癸夘詔陜西河東河北轉運司各上本路地圖三本一進内二送中書樞密院甲辰以獻方畧人滕希仲為涇縣尉雷子元試校書郎成鋭太廟齋郎李遵等十人為郊社齋郎張恂等十人諸州司士參軍王嘉麟三班借職韓傑下班殿侍差使李頎等三十八人諸州文學嘗經南省下第而不願就文學者免將來文解不合格者賜錢十千罷歸仍自今毋得邀車駕獻文字丁未詔陜西經畧司遣人諭元昊界蕃漢職員首領能率部族及以本係漢界州郡來歸者並不次遷擢之十一月壬子朔降六宅使涇原鈐轄知渭州郭志髙為虞部員外郎監涇州百里鎮酒稅志髙本文職及知渭州㑹賊冦鎮戎領兵赴援而遷延不進故降之李師中傳云父緯為涇原都監屯鎮戎軍夏賊十餘萬犯鎮戎緯帥兵出戰而帥司所遣别將郭志髙逗遛不進諸將以衆寡不敵不敢復出緯坐降三官當考癸丑降涇原鈐轄供備庫使李知和為汾州都監秦鳯都監東頭供奉官閤門祇候石平監渭州德勝寨酒税並以安撫副使韓琦言其畏懦不任邊事也甲寅三門白波發運使梁吉甫言諸處盜賊結集而願捕者多為官所制不得盡其方畧請自今募人皆給以文符許自於鄉縣糾集而掩捕之捕之獲者當以賊隨身之物仍量人數别酬奬從之乙夘淮南江浙荆湖制置發運使張錫言沿江淮兩岸同廵檢縣尉舊皆中流為界自今請令通管江淮内捕賊公事從之簽書陜西經畧安撫判官事太常丞田况直集賢院丙辰内出御撰洪範政鑑審樂要記風角集占以示輔臣仍以風角集占賜陜西諸路部署司丁巳録光祿寺丞直集賢院孫暨子日新為郊社齋郎以侍御史知雜事張奎言暨在真宗朝舉進士第一人而日新再試禮部不中第特録之戊午詔判鄭州武成節度使同平章事柴宗慶還朝歲減公用錢四百萬部使者言宗慶貪刻且縱其下擾民也宗慶坐法當徒三年特貸其罪尋命判濟州仍令京東轉運司選通判一員以佐之宗慶稱疾不肯行御史臺劾奏詔悉停公用錢聽留京師養疾疾愈復除外任判濟州明年三月事今附見御史劾奏據朔厯孫沔兩奏劾宗慶贈延州塞門寨主内殿承制髙延德為慈州團練使録其子三班差使殿侍允文為右班殿直閤門祇候權兵馬監押右侍禁王繼元為右屯衞將軍忠州刺史録其子遵諒為右班殿直遵式三班奉職遵禮借職又録故延州西路同廵檢右侍禁張圭子懷暠為右侍禁懷英為右班殿直懷瑾為三班奉職並以與西賊戰没也壬戌有大星流西南聲如雷者三乙丑以判太常寺翰林侍讀學士兼龍圖閣學士李仲容兼禮儀事判太常禮院知制誥呉育天章閣待制宋祁並同判太常寺兼禮儀事先是謝絳判禮院建言太常寺本禮樂之司今寺事皆本院行之於體非便請改判院為判寺兼禮儀事其同知院凡事先申判寺然後施行其闗報及奏請檢狀即與判寺通簽於是始從綘言也丙寅徙知河中府樞密直學士狄棐知鄭州有中貴人過河中言將援棐於上前棐答以他語退謂所親曰吾湘潭一寒士今官侍從可以老而自汚耶賜延州縁邊戰士衲袍詔陜西都部署司體量縁邊兵官及城寨使臣其材幹膽勇有聞者候歲滿遷官令再任丁夘鄜延路部署司指使右班殿直狄青為右侍禁閤門祇候涇州都監青每臨敵被髪面銅具出入賊中皆披靡無敢當者尹洙為經畧判官青以指使見洙與談兵善之薦於副使韓𤦺范仲淹曰此良將才也二人一見竒之待遇甚厚仲淹以左氏春秋授之曰將不知古今匹夫勇耳青折節讀書悉通秦漢以來將帥兵術由是益知名戊辰降涇原都監西染院使曹英為左騏驥副使坐策應鎮戎軍無功也庚午詔諸州府軍監縣鎮闗津不得妄增無名稅額及搜索行人家属龍神衞四廂都指揮使象州防禦使劉謙卒謙初為環慶部署夏竦奏徙涇原㑹賊冦鎮戎軍謙引兵入賊境破其聚落以分賊勢㬥疾卒贈永清留後寳元二年十一月自環慶徙涇原康定元年八月庚戌擢象州防禦使龍神衞廂主涇原副都部署按西賊冦鎮戎乃九月半事謙以八月末擢象防及廂主副都部署非因鎮戎有功乃擢之誤也乙亥贈鎮戎軍西路都廵檢使内殿承制楊保吉為深州防禦使封其妻趙氏為天水縣君又贈其父入内供奉官守信為太子左衞率府率母蘇氏為襄陽郡太君以保吉與西賊戰死也初利州路轉運使張宗彞言西賊自文州有路直至益州城下請於龍州清川縣防守於是益州路鈐轄司上言乞增龍州戍兵三五百人選武臣知州逐季量遣兵往清川備禦廵察從之此據㑹要直至益州城下宗􅂜之言亦過矣姑存之丙子龍圖閣直學士知并州王㳂為樞密直學士知渭州河東都轉運使龍圖閣直學士楊偕為樞密直學士知并州有中官預軍事素横前帥優遇之偕至一繩以法命率所部從副部署赴河外戒曰遇賊將戰一禀副部署節度中官不服捧檄訴偕叱曰汝知違主帥命即斬乎監軍怖汗不覺堕笏翌日告疾未幾遂卒於是軍政肅然庚辰知制誥賈昌朝同判流内銓初銓法縣令俸錢滿萬二十千乃舉令昌朝以為如此則小縣終不得善令請槩舉令而與之俸如大縣從之㑹要在明年三月昌朝按撫河北建請是月浙東軍士鄂鄰等殺廵檢使張懷信聚兵剽刼湖南福建廣南諸州縣逃入海懷信内臣性苛虐衆號張列挈鄰等積怨憤遂作亂鄂鄰等作亂國史無之據富弼奏議稽古録載其事九月不知何據今從弼奏議張列挈據司馬光記聞増施州通判一員十二月癸未詔縁邊招討司戰士有市首級而冒賞者論以軍法出内藏庫絹一百萬下三司助邊費乙酉命端明殿學士兼翰林侍讀學士李淑知制誥賈昌朝同修起居注郭稹天章閣侍講王洙同詳定弓手强壯通制又命淑判兵部洙同判時諸路方籍鄉兵上兵部也河北强壯在籍者凡二十九萬三千河東十四萬四千此據本志康定年兩路强壯數今附見此弓手别出流内銓言選人試律斷案多是茍避選限乞自今止許試一次從之丙戌詔司農寺以常平錢百萬緡助三司給軍費自景祐末不許移用常平數年間有餘積矣而兵食不足故降是詔己丑契丹遣工部尚書修國史杜防來聘報郭積也杜防無副使當考庚寅徙環慶鈐轄洛苑使髙繼隆為梓夔鈐轄時任福以白豹功除管軍繼隆毁嫉之福以其事聞故徙繼隆癸巳知渭州王㳂兼涇原部署司事詔天下諸縣民撅飛蝗遺子一升者官給以米豆三升先是直秘閣趙希言奏禮天子七廟親廟五祧廟二據古僖順二祖當遷國家道觀佛寺並建别殿奉安神御豈若每主為一廟一寢或前立一廟堂以今十六間為寢更立一祧廟逐室各題廟號及銷毁沿寳神御物金銀萬八千餘兩甲午同判太常寺宋祁言周制有廟有寢以象人君前有朝後有寢也廟藏木主寢藏衣冠至秦乃出寢於墓側故陵上更稱寢殿而宗廟無寢蓋本於兹鄭康成謂周制立二昭二穆與太祖文武共為七廟此一家之説未足援正荀卿王肅皆云天子七廟諸侯五大夫三士一降殺以兩則國家七世之數不用康成之説僖祖至真宗方及六世不應便立祧廟自周漢每帝各自立廟晉宋以來多同殿異室國朝以七室代七廟祖宗相承行之已乆不可輕改又祖宗時神御法物尚少及厯三聖加崇奉之禮而寳盝釦床充滿二室周禮天府掌祖廟之守藏寳物世傳者皆在焉請别為藏自是室題廟號建神御庫於宗正寺西乙未徙知隨州右千牛衞上將軍王德用知曹州德用道過許州梅詢謂德用曰道輔害公者今死矣德用曰孔中丞以其職言豈害德用者朝廷亡一忠臣可惜也初晁宗慤等至永興議邊事夏竦等合奏今兵與將尚未習練但當持重自保俟其侵軼則乘便掩殺大軍蓋未可輕舉及劉承宗敗上復以手詔問師期竦等乃畫攻守二策遣副使韓琦判官尹洙馳驛至京師求决於上己亥入對崇政殿先有詔琦遷禮部郎中洙加集賢校理琦言臣以大計不俟召赴闕若僥倖進秩將不容於清議辭不拜壬寅韓琦言陜西經畧安撫司與部署司凡有行事大率相通止是經畧司有判官三員乞令經畧判官兼參詳都部署司事從之癸夘殿前副都指揮使寧逺節度使鄭守忠為安逺節度使知徐州馬軍副都指揮使威武留後髙化為建武節度使殿前副都指揮使步軍副都指揮使永清留後李用和為馬軍副都指揮使殿前都虞候英州防禦使孫廉為隨州觀察使天雄軍副都部署馬軍都虞候髙州防禦使方榮為容州觀察使步軍副都指揮使步軍都虞候洋州觀察使真定府路副都部署劉興為昭武留後捧日天武四廂都指揮使眉州防禦使鄜延副都部署葛懷敏為殿前都虞候龍神衞四廂都指揮使賀州防禦使環慶副都部署任福為馬軍都虞候寧州刺史鄜延副都部署許懷德為陵州團練使龍神衞四廂都指揮使皆未補人俟邊將有功者除之秦興宗官制舊典云管軍八位自比政府八公而武弁軍門乃號八披梯祖宗選用立格至嚴每分武舉世族及軍伍出身人無其人則闕故武舉世族四員常足而軍伍四員常闕蓋難其人而不敢廢祖宗法也按興宗所云其説蓋取諸此要亦不皆如其説今所見當考詔吏部流内銓選人以舉主兩員為縣令自今須用本部官一人方聽施行兵部尚書參知政事宋綬卒母尚無恙綬始得疾不視事母問之則曰小瘳矣又通賔客省問若且安者冀以紓母憂然條理後事甚詳雖家人不知也上幸其第臨奠輟二日朝贈司徒兼侍中諡宣獻綬性孝謹清介言動有常為兒童時手不執錢後博通經史百家文章為一時所尚朝廷有大議論多所裁定凡論前人文章必正其得失至當時之作則未嘗議也楊億嘗稱其文沉壯淳麗尤善鋪賦吾不及也藏書萬餘巻手自校讎筆札尤精好上嘗取所書千字文及卒多取其字帖藏禁中甲辰太常博士集賢校理知坊州李丕諒為崇儀使知鄜州左騏驥使鄜延鈐轄兼知鄜州張亢為西上閤門使改都鈐轄屯延州改都鈐轄屯延州實録無之此據本傳當考陜西河北河東制置青白鹽副使左侍禁王文思為閤門祇候初文思在延州擅入西界討賊坐奪職至是韓琦奏復之田况十四策云范雍屢使王文思先肆侵掠當即此事也乙巳詔鄜延涇原兩路取正月上旬同進兵入討西賊上與兩府大臣共議始用韓琦等所畫攻策也樞密副使杜衍獨以為僥倖出師非萬全計争論乆之不聽遂求罷亦不聽歐陽修墓銘云大臣至有欲以沮軍罪衍者不知大臣謂誰當考始晁宗慤即軍中問攻守策衆欲大舉經畧判官田京曰虜蓄謀乆矣未易亟破也今欲驅不習之師深入虜地與賊銳鋒争一旦之勝此兵家所忌師出必敗或曰宜與講和又曰賊兵未嘗挫安肯和也此事附杜衍不欲出兵後更須考之太子中允館閣校勘歐陽修上言曰元昊叛逆闗西用兵以來為國言事者衆矣臣初竊為三策以料賊情然臣迂儒不識兵之大計始猶遲疑未敢自信今兵興既乆賊形已露如臣素料頗不甚逺故竊自謂有可以助萬一者謹條以聞夫闗西弛備而民不見兵者二三十年矣始賊萌亂之初藏形隱計卒然而來當是時吾之邊屯寡弱城堡未完民習乆安而易驚將非素選而敗怯使其羊驅豕突可以奮然而深入然國威未挫民力未疲彼得城而居不能乆守虜掠而去可以邀撃其歸此下策也故賊知而不為外國侵邊自古為患其攻城掠野敗則走而勝則來蓋其常事此中策也故賊兼而用之若夫假借名號以威其衆先擊吾之易取者一二以悦其心然後訓養精鋭為長乆之謀故其來也雖勝而不前不敗而自退所以誘吾兵而勞之也或擊吾東或擊吾西乍出乍入所以使吾兵分備多而不得減息也吾欲速攻賊方新鋭坐而待戰彼則不來如此相持不三四歲吾兵已勞民力已疲不幸又遇水旱之災調斂不勝而盜賊羣起彼方奮其全鋭擊吾困敝可也吾不堪其困忿而出攻决於一戰彼以逸而待吾勞亦可也幸吾苦兵計未知出遂入通聘以邀歲時之賂度吾困急不得不從亦可也是吾力一困則賊謀無施而不可此兵法所謂不戰而疲人兵者上策也而賊今方用之今三十萬之兵食於西者二歲矣又有十四五萬之鄉兵不耕而自食其民自古未有四十五萬之衆連年仰食而國力不困者也臣聞元昊之為賊威能畏其下恩能死其人自初僭叛嫚書已上逾年而不出一出則其鋒不可當執刼蕃官獲吾將帥多禮不殺此其兇謀所蓄皆非倉卒者也奈何彼能以上策而疲吾吾不自知其已困彼為乆計以撓我我無長策而制之哉夫訓兵養卒伺釁乘便用間出竒此將帥之職也所謂閫外之事而君不御者也至於外料賊心之謀内察國家之勢知彼知此因謀制敵此朝廷之大計也所謂廟算而勝者也不可以不思今賊謀可知以乆而疲我爾吾勢可察西人已困矣誠能豐財積粟以紓西人而完國壯兵則賊謀沮而廟算得矣夫兵攻守而已然皆以財用為强弱也守非財用而不乆此不待言請試言攻昔秦席六世之强資以事邊卒困天下而不得志漢因文景之富力三舉而纔得河南隋唐突厥吐蕃常與中國相勝敗擊而勝之有矣未有一舉而滅之者然秦漢尤强其所攻者今元昊之地是也况自劉平䧟没賊鋒熾鋭未嘗挫衂攻守之計非臣所知天威所加雖終期於掃盡然臨邊之將尚未聞得賊釁隙挫其兇鋒是攻守皆未有休息之期而財用不為長乆之計臣未見其可也四五十萬之人坐而仰食然闗西之地物不加多闗東所有莫能運致棓克細碎既已無益而罷之矣至於鬻官入粟下無應者改法𣙜貨而商旅不行是四五十萬之人惟取足於西人而已西人何為而不困困而不起為盜者須水旱爾外為賊謀之所疲内遭水旱而多故天下之患可勝道哉夫闗西之物不能加多必通漕運而致之漕運已通而闗東之物不充則無得而西矣故臣以為通漕運盡地利𣙜商賈三術並施則財用足而西人紓國力完而兵可乆以守以攻惟上所使夫小𤨏目前之利既不足為長乆之謀非旦夕而可效故臣區區不敢避迂愚之責請上便宜三事惟陛下裁擇其一曰通漕運臣聞今為西計者皆患漕運之不通臣以謂但未求之爾今京師在汴漕運不西而人之習見者遂以為不能西不知秦漢隋唐其都在雍則天下之物皆可致之也山川地形非有變易於古其路皆在昔人可行今人胡為而不可漢初歲漕山東粟數十萬石是時運路未修其漕尚少其後武帝益修渭渠至漕百餘萬石隋文帝時沿水為倉轉相運置而闗東汾晉之粟皆至渭南運物最多其遺倉之迹往往皆在然皆尚有三門之險自唐裴耀卿又尋隋迹於三門東西置倉開山十八里為陸運以避其險卒泝河而入渭當時歲運不減二三百萬石其後劉晏遵耀卿之路悉漕江淮之米以實闗西後世言能經財利而善漕運者耀卿與晏為首今江淮之米歲入汴者六百萬石誠能分給闗西得一二百萬石足矣今兵之食汴漕者出戍甚衆有司不惜百萬之粟分而及之其患者三門阻其中爾今宜浚治汴渠使歲運不阻然後按求耀卿之迹不憚十許里陸運之勞則河漕通而物可致且紓闗西之困使古無法今有可為尚當為之况昔人行之而未逺今人行之而豈難哉耀卿與晏初理漕時其得尚少至其末年所入十倍是可乆行之法明矣此水運之利也臣聞漢髙之入秦不由闗東而通南陽過酈析而入武闗曹操等起兵誅董卓亦欲自南陽道丹析而入長安是時張濟亦是長安入武闗奔南陽則自古用兵往來之徑也臣間至南陽問其遺老云自鄧西北至永興六七百里今小商賈往往行之初漢髙入闗其兵十萬夫能容十萬兵之路宜不甚狹而險也但自雒陽為都行者皆趨闗東其路乆而遂廢今能按求而通之則武昌漢陽郢復襄陽梁洋金商均房光化沿漢之地十一二州之物皆可漕而頓之南陽自南陽為輕車輦而遞之募置遞兵十五六舗則十餘州之物日日入闗而不絶沿漢之地山多美木近漢之民仰足而有餘以造舟車甚不難也前日陛下深惜有司之勤内賜禁錢數十萬以供西用而道路艱逺輦運踰半不能畢工至於軍裝輸送多苦秋霖邊州已寒衣服尚滯於路其艱如此夫使州縣綱吏逺輸京師轉漕艱滯然後得西豈若較南陽之旁郡度其道里入于武闗至于京師逺近等者與其尤近者皆使直輸于闗西京師之用有不足則以禁帑出賜有司者代而充用其迂曲簡直利害較然矣此陸運之利也其二曰盡地利臣聞昔之畫財利者易為工今之言財利者難為術昔者之民賦税而已故其不足則鑄山煮海𣙜酒與茶征闗市而算舟車尚有可為之法以茍一時之用自漢迄今其法日增其取益細今取民之法盡矣昔者賦外之征以備有事之用今盡取民之法於無事之時悉以冗費而靡之矣至卒然有事則無法可增然猶有可為者民作而輸官者已勞而游手之人方逸地之産物者耕不得代而不墾之土尚多是民有遺力地有遺利此可為也况厯視前世用兵者未嘗不先營田漢武帝時兵興用乏趙固為畎田人犁之法以足用趙充國攻西羌議者争欲出擊而充國思全勝之策能忍而待其敝至違詔罷兵而治屯田田於極邊以游兵而防鈔冦則其治田不為易也猶勉為之方曹操屯兵許下時彊敵四面以今視之疑其旦夕戰争而不暇然用棗祗韓浩之計建置田官募民而田近許之地歲得數百萬石其後郡國皆田積穀數百萬隋唐田制尤廣不可勝舉其勢艱而難田莫若充國廹急而不暇田莫如曹操然皆勉焉不以迂緩而不田者知地利之博而可以舒民勞也今天下之土不耕者多矣臣未能悉言請舉其近者自京以西土之不闢者不知其數非土之瘠而棄也蓋人不勤農與夫役重而逃爾乆廢之地其地數倍於勞田今若督之使勤以免其役則願耕者衆矣臣聞鄉兵之不便於民議者方論之充兵之人遂棄農業託云教習而飲博取資其家不顧有無官吏不加禁父兄不敢詰家家自以為患也河東河北闗西之鄉兵此猶有用若京東西者平居不足以備盜而水旱適足以為盜其尤可患者京西素貧之地非有山澤之饒民惟力農是仰而今三夫之家一人五夫之家二人為游手凡十八九州以少言之尚可四五萬人不耕而食是自相靡耗而重困也今誠能盡驅之使耕于棄地官貸其種歲田之入與中分之如民之法募吏之習田者為田官優其課最而誘之則民願田者衆矣太宗皇帝時常貸陳蔡民錢使市牛而耕真宗皇帝時亦用耿望之言買牛湖南而治屯田今湖南之牛歲賈于此者皆出京西若官為買之不難得也且鄉兵本農也籍而為兵遂棄其業今幸其去農未乆尚可復驅還之田畆使不得羣游而飲博以為父兄之患此民所願也一夫之力以逸而言歲任耕廢田一頃使四五萬人皆耕而乆廢之田利又數倍則歲穀不可勝數矣京西之田北有大河南至漢而西接闗若又通其水陸之運所在積穀惟陛下詔有司移用之爾其三曰權商賈臣聞秦廢王法啓兼幷其上侵公利下刻細民為國之患乆矣自漢以來嘗欲為法而抑奪之然不能也蓋為國者興利日繁兼幷者趨利日巧至其甚也商賈坐而權國利其故非他由興利廣也夫興利廣則上難專必與下而共之然後流通而不滯然為今議者方欲奪商之利歸於公上而專之故奪商之謀益深而為國之利益損前日有司屢變其法法每一變則一歲之間所損數百萬議者不知利不可專欲專而反損但云變法之未當變而不已其損益多夫欲十分之利皆歸於公至其虧少十不得三不若與商共之常得其五也今為國之利多者茶與鹽爾茶自變法已來商賈不復一歲之失數年莫補所在積朽棄而焚之前日議者屢言三説之法為便有司既詳之矣今誠能服之使商賈有利而通行則上下濟矣解池之鹽積若山阜今宜暫下價誘羣商而散之先為令曰三年將復舊價則貪利之商争先而凑矣夫茶者生於山而無窮鹽者出於水而不竭賤而散之三年十未减其一二夫物之所以貴者以能為國資錢幣爾今不散而積之是惜朽壤也夫何用哉夫大商之能蕃其貨者豈其錙銖躬自鬻於市哉必有販夫小賈就而分之販夫小賈無利則不為故大商不妬販夫之分其利者恃其貨博雖取利少貨行流速則積少而為多也今為大國者有無窮不竭之貨乃妬大商之分其利寧使無用而積為朽壤何哉故大商之善為術者不惜其利而誘販夫大國之善為術者不惜其利而誘大商此與商賈共利取少而致多之術也若乃縣官自為鬻市之事此大商之所不為臣謂行之難乆也誠能不較錙銖而思逺大則積朽之物散而錢幣通可不勞而用足矣臣愚不足以知時事若夫堅守以扞賊利則出而擾之凡小便宜願且委之邊將至於積穀與錢通其漕運不一二歲而國力漸豐邊將漸習賊鋭漸挫而有隙可乘然後一舉而滅之此萬全之策也願陛下以其小者責將帥謀其大計而行之則天下幸甚丙午契丹國母遣左千牛衞上將軍耶律庶忠崇祿卿孫文昭契丹主遣崇儀節度使蕭紹筠西上閤門使維州刺史秦德昌來賀正旦丁未詔開封府京東西河東路括驢五萬以備西討從陜西經畧司所上攻策也括驢五萬孫沔奏議或可刪附魏泰東軒録云楚執中恣為滑稽謔玩無禮慶歴中韓魏公琦帥陜西將四路進兵入平夏以取元昊師行有日矣尹洙與執中有舊薦於韓公韓召之諭以入界事執中雅不欲為是行因問韓公曰虜之族帳無定萬一遷徙深逺以致我師無乃曠日持乆乎韓公曰今大兵入界則倍道兼程矣執中曰糧道豈能兼程耶韓曰吾已盡括闗中之驢以馱糧食驢行速可與兵相繼也萬一深入而糧食盡自可殺驢而食矣執中徐曰驢子大好酬奨韓公怒其無禮遂不使之入幕然四路進兵亦竟無功按括驢乃康定元年十二月事泰誤謂慶厯中今附見於此足明當時不欲大舉者不獨范仲淹也或於此附范仲淹待春深方入討議戊申屯田員外郎通判河中府皮仲容知商州兼提㸃採銅鑄鐵錢事仲容嘗建議鑄大錢一當十既而兩制及三司議其事謂可權行以助邊費故有是命初韓琦安撫陜西嘗言陜西産鐵甚廣可鑄錢兼用此據𤦺家傳於是葉清臣從仲容議鑄當十錢翰林學士承㫖丁度奏曰漢之五銖唐之開元及國朝錢法輕重大小最為折中歴代更法雖稍精密不能朞年即復改鑄議者欲繩於峻法革其盜鑄昔漢變錢幣盜鑄死者數十萬唐鑄乾元及重輪乾元錢錢輕幣重嚴刑不能禁止今禁旅戍邊月給百錢得大錢裁十不可畸用舊錢不出新錢愈輕則糧芻增價臣嘗知湖州民有抵茶禁者受千錢立契代鞭背在京西有强盜殺人取其敝衣直不過數百錢盜鑄之利不啻數倍復有湖山絶處兇魁嘯聚鑪冶日滋居則鑄錢急則為盜民間銅鈆之器悉為大錢何以禁止乎本志云軍興陜西移用不足始用知商州皮仲容議采洛南縣紅崖山虢州青水冶青銅置阜民朱陽二監以鑄錢按實録乃鑄鐵錢與本志不同當考孫沔奏乞罷鑄大錢當刪附將作監丞通判儀州耿傅供備庫副使知青澗城种世衡同計置陜西隨軍糧草傅河南人也權三司使葉清臣言新茶法未適中請擇明習財利之臣别以課校上以號令數更民聽眩惑乃詔即三司裁定務優販者然亦卒無所變也初明道二年復用天禧舊制聽商人入錢粟京師及淮浙江南荆湖州軍易鹽此據食貨志第四巻已附明道二年之末及景祐二年三司言諸路博易無利乃罷之而入錢京師如故此亦據食貨志第四巻景祐二年詔實録無之今且依本志附此是嵗又詔商人入芻粟陜西並邊願受東南鹽者加數予之此亦據食貨第四巻志云康定元年詔而實録亦無有今且附此㑹河北榖錢三司因請内地諸州行三税法募人入中且以東南鹽代京師實錢詔糴至二十萬石止此據食貨志第三巻其第四巻加數與東南鹽下又云河北用三税法亦以鹽代京師所給緡錢即第三巻所書也第三巻所書稍詳今用之
