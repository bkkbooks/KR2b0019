body:
  text: 續資治通鑑長編巻四百六十八宋李燾撰哲宗元祐六年十一月乙酉朔太中大夫守尚書右僕射兼中書侍郎劉摯為觀文殿學士知鄆州麻制以從摯所乞為辭工部言營造應納退材當官量長濶徑厚監修或主管人就役兵限五日送受納場務納訖限次日給鈔仍具収附物數申監掌簿人吏限一日勾銷如違各論如官文書稽程律至罪止者監修人降罰重難差遣主管人降一名監當或監修官届終不覺察三次理為遺闕從之新削户部言請廣南東西路應用大棹船興販私鹽告捕獲雖杖以下罪不以借賃運致其船並没官仍别估價給賣丁亥左朝散郎祠部郎中楊康國為京東路轉運副使左承議郎秘閣校理知絳州劉唐老提㸃秦鳯等路提刑唐老前與楊康國徐君平俱罷言職今與康國俱除監司當考左承議郎提㸃秦鳯等路刑獄㳺師雄為祠部員外郎左朝請郎河北轉運副使秦中為金部員外郎戊子翰林學士范百禄言臣前月二十九日奉宣召面奉聖諭右僕射劉摯累乞出除觀文殿學士知鄆州已凖宣告白麻至今月七日竊聞未曽降出誥命者縁臣初無奏禀今則敢不盡愚臣竊以自古聖明之君進退大臣未嘗不厚之以禮義亷耻之分以示人主體貎之所當然以全大臣始終出處之際如此者無他所以重堂陛之峻使國家等威朝廷理勢尊重而不陵也朝廷初以摯為賢哲以為公忠以為當為輔弼而授之以位任之以政矣及乎言者論其操行改前不克有終某事足以謂之過而審其不宜為輔弼則所授之位所任之政收還之可也如其所請而罷出之也賈誼所謂故貴大臣定其罪矣猶未斥然正以謼之也尚遷就而為之諱也今明詔臣以摯累乞出而有是命臣當是時謹奉徳音更不復有所奏禀者此也既而聞給事中封還麻制人人籍籍𫝊道其言以為制詞中不著其過失因請留之臣以為陛下始以為賢而相之今聞其非而罷之不欲累其過者足以為賢者諱也亦足以為朝廷重堂陛之峻増崇髙不陵之勢也是進退大臣之洪範也若必欲累其過而使四方聞之則是用相有失當而朝廷之體弗重也豈所以重堂陛之峻而増崇髙不陵之勢也哉臣竊議論其罪者則恨不行竄殛之罰欲其留者則恨不能為攀援之計恭惟明詔所處曲盡至當而無疑矣今或言曰如其有過則不當除學士是皆悠悠之談不足以禆國是而廣上徳也宰相拜罷繫朝廷用否而已豈以職名與大字為輕重乎是乃禮命之文而非所以寓褒貶之實也伏望聖慈深察至當之體固執己行之命炳如日月公如天地質之典故無可疑者伏望斷自聖意而行之天下幸甚壬辰給事中朱光庭知亳州初劉摯罷相麻制過門下光庭封還言摯忠義自奮力辨邪正有功朝廷擢之大位一旦以疑而罷天下不見其過言者若指臣為朋黨願被斥逐不辭御史中丞鄭雍言光庭朋黨乞正其罪殿中侍御史楊畏又言摯多朋黨必相救援一切勿聼於是光庭與摯相繼俱罷鄭雍舊𫝊云宰相劉摯用事久黨與中暌雍因劾摯威福自恣天下士争趨其門宜罷出以収主柄疏入不報不知舊𫝊所謂黨與中暌者指何等人當考雍新𫝊但云劾摯威福自恣宜罷去以収主柄又疏王巖叟等三十人以為摯黨不知雍所謂摯黨三十人者姓名已附十月十八日舊𫝊乃無此新𫝊盖縁元祐編類章疏光庭之封還麻制也吕大防嘗召光庭諭㫖光庭不至故但以本官出此據王巖叟日録朱光庭再知亳州吕大防以其召而不至又不恱其封還麻制故但以本官出簾中殊不怒也當考孫升行光庭亳州制詞云士之自信特立無媿俯仰行已所志若夫居官守職亦曰奉法循理而已爾雖篤于自信然制由中出命布外庭輕行舉駁則法所不與召之論議則拒而不至持特立獨行之志忘奉法循理之守宜還從槖出守舊邦體我矜容厲汝誠節寳文閣待制知亳州葉康直為兵部侍郎寳文閣直學士知揚州謝景温知夀州景温坐薦前通判王鞏及明其在官無過故責之此據景温本𫝊舊𫝊云再知揚州通判王鞏與宰相劉摯姻家朋附蘇轍等為姦邪還朝除知宿州人言在揚嘗贓濫罷之鞏自訴得宻州復以人言而罷景温薦其有政事材因明其在揚無罪坐是謫知夀州今從新本詔皇城使嘉州防禦使管勾麟府路軍馬張若訥皇城使太原府路都監知麟州孫咸寧皇城使象州防禦使知府州折克行近以斥堠不明及不豫為清野之備致西賊如蹈無人之境恣行刼掠張若訥降一官充鄜延路兵馬鈐轄孫咸寧降兩官衝替折克行罰金二十斤已而御史中丞鄭雍言麟路州界及諸城堡為賊殺擄人民孳畜燒毁田舍不少若訥等責輕臣恐邉臣觀望愈増弛慢望推原軍法明示威信少謝一方之民以為邉臣之戒詔咸寧降監當差遣若訥降充鄜延路兵馬都監克行降一官九月二十九日又明年五月二十五日又紹聖三年正月二十七日詔新歴以元祐觀天歴為名命工部侍郎王欽臣撰序癸巳觀文殿大學士右光禄大夫知河南府韓縝為武安軍節度使知太原府政目在十月初八日觀文殿大學士太中大夫知太原府范純仁知河南府政目同閏八月壬午當考詔免西京進奉政目九日事附此己亥吏部言武臣丁憂者給假一百日並不得離任即合給假一百日而欲奔喪或䕶喪前去於假内可還者聼仍理為在任月日從之舊録特詳今從新録庚子左朝請郎監察御史安鼎知絳州從其請也鼎劾蘇轍不當故出七年三月鼎責知髙郵軍可考云左奉議郎秘書丞集賢校理張耒為國史院檢討官二十一日為大著三省樞宻院言元祐六年秋季入流一百七十人六年比五年少四十六人又将前次科場大禮奏薦轉官換授人数比三年分為十二季以一季約一百五十四人有竒并元祐六年秋季入流共二百七十八人除身亡致仕勒停丁憂尋醫侍養分司假滿落籍叙用服闕尋醫年滿比折外其入流少一百三十五人秦鳯路經略司言乞應沿邉事權許從宜措置庻免緩急拘礙失事從之其陜西河東逐路經略司依此辛丑户部言諸州見役投名衙前所歴重難合得支酬見錢願留在官指買場務除見買樸人依合接續再買外餘並從投状依額錢指買願三兩人同状承買亦聼限滿先給衙前其經減錢場務召人添錢即限滿給賣價髙者如衙前與百姓價等亦先給衙前若已歴重難錢不及額數但及七分亦許指買所少額錢分四季納令家人勾當不妨本身差遣如願却交賣與人者不以錢数多少許衙前收為饒潤從之中大夫守中書侍郎傅堯俞卒太皇太后謂執政曰堯俞清直人又曰金玉人也可惜不至宰相對曰堯俞自仁宗時至今始終一節有徳望真可為朝廷惜上輟朝臨奠贈右銀青光禄大夫諡獻簡司馬光嘗謂邵雍曰清直勇三徳人所難兼吾於欽之畏焉雍曰欽之清而不燿直而不激勇而温尤為難矣時以雍之言為然舊𫝊云堯俞在位二年専以朋姦為安身計新傳削去壬寅左朝請郎秘閣校理守起居舍人陳軒左承議郎集賢校理守起居郎孔武仲並為中書舍人左朝議大夫集賢殿修撰范子竒為權户部侍郎八年二月八日仍以集賢殿知慶州左朝散大夫集賢殿修撰黄亷為給事中五年九月十八日為陜西都漕今召入七年正月就職左朝請大夫權户部侍郎馬黙為寳文閣待制知蔡州政目云黙徐州二十四日孔武仲繳黙詞與實録不同當考龍圖閣待制江淮荆浙等路發運使錢勰為工部侍郎工部侍郎王欽臣為給事中二十四日孔武仲駮奏可并此左朝奉郎直龍圖閣權管勾西京留守司御史臺文及為集賢殿修撰知河陽左朝奉大夫成都府路轉運副使吕陶為左司郎中朝散大夫集賢殿修撰知徐州楊汲為江淮荆浙等路𤼵運使左朝請大夫右司郎中穆衍權陜西路轉運使初西人自絶嵗賜沉然不知其謀諸路嚴戒備禦并􅃯乘隙淺攻為困賊計久之寂無所聞王巖叟議遣使同列皆云未湏遣巖叟宻告吕大防曰今日之事不可忽不知諸路所以備禦者果如何朝廷必皆知其實大敵在前而預遣一使非過舉也大防以為然及於簾前開陳巖叟和之議遂定初欲専遣兩使分五路衍既有是除乃議即令䘖命往涇原秦鳯熈河又就遣轉運判官張景元使鄜延環慶按實以聞凡事干經略司者與經略使有已見必欲面陳亦聼候衍回入奏尋詔衍不候搬家接人先𤼵又賜以金紫服此據王巖叟日録因穆衍謝趣令起𤼵乃二十六日事今并書賜金紫據政目乃十二月二日事亦并書置六曹凖備差遣官政目十八日事當考癸夘刑部言配沙門島人强盗親下手或已殺人放火計贓及五十貫因而强姦親毆人折傷兩犯至死或累贓滿三百貫贓二百貫以上謀殺人造意或加功而致死十惡本罪至死造蓄蠱毒藥已殺人不移配强盗徒伴殺人元不同謀贓滿二百貫遇赦移配廣南溢額者即配逺惡處牢城餘犯遇赦移配荆湖南北福建路州軍溢額者即配廣南牢城沙門島人遇赦不該移配并遇赦不還而年六十以上在島五年移配廣南牢城在島十年依餘犯格移配篤疾或年及七十在島三年以上移配近鄉州軍牢城犯状應移而老疾者同其永不放還者各加二年移配從之新本亦有却可無乙巳吏部侍郎韓川為禮部侍郎禮部侍郎彭汝礪為吏部侍郎汝礪以九月三日自刑部改禮侍其月十八日范祖禹又為禮侍與汝礪並立及是汝礪改吏侍韓川又為禮侍與祖禹仍並立明年六月十二日川乃出守政目汝礪吏侍在明年十一月六日左奉議郎秘書丞集賢校理國史院檢討張耒為著作郎六月十六日自小著改秘丞八年五月十六日黄慶基云戊申朝奉郎國子祭酒豐稷兼侍講權給事中孔武仲言王欽臣除給事中按欽臣天資淺薄溺於榮利彊忌好勝反覆任情給事中乃東臺獻替之職欽臣豈可居此詔寢前命欽臣十八日以工部除給事政目十八日馬黙知徐州二十四日孔武仲􅌳馬黙詞實録俱不載附見當考刑部言外州軍人逃亡於京畿首獲者流以下罪具録所招罪欵檢坐條格枷錮送住營或見差出處委本處收管依法施行若無别犯字號分明或逃亡罪無憑照並牒送元逃處勘斷畿縣住營外軍杖以下各凖此即應牒送人入京城門内其捕獲者有作賊鐶子并元是配軍及餘犯流以下並先從不應為輕重决訖牒送畿縣減二等本罪徒以上仍不併計已上未至本所逃走於京城内及畿縣捕獲者於元斷罪遞加二等内畿縣罪止杖一百仍具條牒報從之新削己酉左朝請郎梓州路轉運判官董敦逸左朝請郎黄慶基並為監察御史敦逸永豐人元符三年四月有傳慶基未詳邑里吕公著掌記云黄慶基袁州通判王荆公表弟荆公執政時深欲引用以議論不改沉𨼆至此近時運判未有能逮此人者又云鴻臚丞又云慶基人多知之尚書省言廣南西路經畧安撫司奏南丹州捕到强刼山猺賊潘美袁棖等願依格請賞乞依上祖莫彦殊例降敕告賜紫金魚袋付刺史莫世忍詔可環慶路都監張存第二将張誠第三将折可適等統兵出界攻討韋州辣韋彊安州川霄柏州及延州祖逋領不經掌等處賊衆獲首級千一百四十八生擒二人此據章楶奏議増入其出界以十一月二十五日也辛亥詔曰朕獲承至尊休徳託於王公之上蒙成慈訓海内晏安恭惟太皇太后有聖徳之徽懿居天下之崇髙保佑朕躬功及宗社人神俱歸天地並泰稽嵗甲還相之次當慶符本始之辰仰贊夀祺用致誠祝昔在神考有奉光獻之禮嘗以此懇請再三興言傷財面誡悉罷永惟大徳何報方求尊安之稱此而不圖将何以示孝欽於萬方而逹至感扵神明乎其以元祐七年太皇太后本命嵗旦日齋在京及天下州軍在城僧尼道士女冠一日内在京于中太一上清儲祥集禧建隆醴泉萬夀等六處宫觀大相國寺十禪院自正旦日各用僧道開建道場七晝夜宫觀罷散日設醮一坐在京外州軍自正旦日辦食設獄三日並支係省錢嘉與臣民共増吉禱庻幾中外均被餘禧先是太皇太后諭執政曰今日同皇帝聼政不可比光獻兼恐費國用吕大防曰所費亦不多太皇太后曰亦勿如此言韓忠彦曰陛下謙抑過甚王巖叟曰此乃皇帝一善事不須過有退託遂降此詔詔辭學士梁燾所撰也燾奏臣伏以今月二十三日學士院準中書省送到御批指揮以來年係太皇太后本命嵗依典故降詔施行事恭惟皇帝陛下仁明天縱聖孝早成愛敬之心懇至如此詔書一下四海風𫝊必使逺近之人歡欣戴仰忠臣孝子益知感勵此誠明主甚盛之舉也臣欲望聖慈親持詔書面陳於太皇太后然後付外區區愚忠願効小補惟陛下采察幸甚燾始撰詔進入上批令於保佑字上増一二句太皇太后曰為尊者意今詔辭有聖徳之徽懿居天下之崇髙盖後所増也御集載詔語云有増入處今附此御批來年係太皇太后壬申本命年依慈聖光獻皇后故事合預降詔修設齋㑹道塲設獄之類累奏太皇太后恭禀慈㫖恐費耗國用一切悉罷伏縁太皇太后居天下之尊復保佑朕躬功及宗社大徳何報又况有上件典故宜依慈聖光獻皇后故事修設施行學士院撰詔曰朕獲承至尊休徳託于王公之上䝉成慈訓海内晏然恭惟太皇太后保佑朕躬功及宗社人神俱歸天地並泰稽嵗甲還相之次當慶符本始之辰申贊夀祺用致誠祝昔在神考有奉光獻之禮嘗以前此懇請再三興言傷財面誡悉罷永惟大徳何報方求尊安之稱此而不圖将何以示孝欽于萬方而逹至感於神明乎其以元祐七年太皇太后本命嵗内外合行事件並依熈寧九年正月一日詔書體例施行御批所進入詔本甚得稳當只是於太皇太后序下保佑字上似少尊者之意如居天下之尊意度與添入一二句進入元祐六年十一月二十五日増曰有聖徳之徽懿居天下之崇髙户部言應兩户以上同状承買場務内有委實無力願退免自召人承續者並先詣官自陳限十日取問同買見開沽人如願承併限一月依數别供抵當若不願或限滿供通抵當不足許退免人别召人經官承續從之新無可削十二月乙卯朔禮部侍郎兼侍講范祖禹轉對言四事其一曰伏自祖宗肇造區夏剗削藩鎮分天下為十八路路置轉運副使提㸃刑獄有州三百州置守皆得専逹於朝廷有縣一千二百縣置令皆命于天子其始也收鄉長鎮将之權悉歸於縣收縣之權悉歸于州收州之權悉歸于監司收監司之權悉歸于朝廷監司者古州牧連帥之職也郡守者古公侯之國也縣令者古子男附庸之君也自本朝之法上下相維輕重相制民自徒以上吏自罰金以上皆出于天子藩方守臣統制列城付以數千里之地十萬之師單車之使尺紙之詔朝召而夕至則為匹夫是以百三十餘年海内晏然不惟祖宗仁恩徳澤深結於民亦由制置郡縣最得其道前世所未有也夫監司付以一路守臣付以一郡令付以一縣皆與天子分土而治者也其可以不擇人乎人之情能者不見異而不能者亦見容則自中人以下幾何而不惰是以議者多言監司職事不舉祖宗時有考課之法専考察諸路監司置簿於中書凡有奏請及功罪皆書之參之以衆言驗之以行事嵗終則較其優劣簡其能者亦簡其不能者而廢置之舉天下十八路監司不過數十人欲皆知之亦無難矣夫選天下郡守此大臣之職也古者天子親之國朝太宗皇帝嘗語宰相曰朕擇循吏俟選及三百人則天下何憂不理審官院上新所選京朝官充知州者二十餘人御前印紙歴子太宗親書以賜之其略曰恵愛臨民奉法除姦神宗嘗謂執政曰朕思祖宗百戰而得天下今以一郡付之庸人深可痛心今二聖垂拱悉以政事付之大臣然則今日擇郡守乃大臣之職也自京朝官以上功罪美惡無差吏部知之為詳臣愚欲乞先委吏部尚書取當為知州者具其功過舉主而擇可任者保明之以上三省三省召而審察之凡當召者使之言二事以上如轉對法或前任利害或朝廷得失若其言可㡳行及有功状與其舉主多名人則用無疑矣其不及者以次差之其否者與京府或藩郡通判其罷癃不能任職者與宫觀有罪者自依舊法降監當官既定其等然後使御史臺糾其不當者到官則委監司考其課毎及一年則以優劣聞而行黜陟焉如此雖未盡善得人必多矣未有監司郡守得人而縣令可以容貪虐昏闇之人也是故天子任宰相宰相察監司而已監司察郡守郡守察縣令朝廷據其所察而行賞罰此豈其難哉夫有考課而無黜陟與不考課同今吏部雖以上中下為等具文而已非有賞罰使人勸且沮也臣伏望陛下明諭大臣使謹擇監司而専考之使大臣代陛下擇郡守其監司郡守考課必行賞罰使監司郡守専察縣令庻使天下官吏漸多得人然後可以言治矣其二曰臣伏見近制舉殿中侍御史監察御史須通判資序實歴任一年以上人充臣當受詔與兩制同舉㑹議終日無一資序相當可充選者間有一人應格又衆論未以為允縁資格之設本以向者多不拘資序故立此法矯枉過正臣愚欲乞参酌前後條制裁處其中應舉監察御史取第二任知縣以上殿中侍御史取初任通判以上更不限實歴一年其寄禄官並以奉議郎以上所貴易得應格亦經久之通法也其三曰臣竊見朝廷常患将帥之才難得其人仁宗時毎帥臣闕或自禁近除授試之藩閫然後大用外任則都轉運使待制雜學士可用者常數人未嘗言乏才由朝廷養之有素也将帥之選多出于監司先自逺路漸擢至京東西淮南其資望最深績效尤著者乃擢任陜西河東河北三路及成都路自三路及成都召為三司副使其未可輟者或與理副使資序自副使出為都轉運使夫自初為監司至三路及三路副使者其人年勞已深資歴已多縁邉山川道路甲兵錢榖皆所諳知故帥臣有闕可備任使中才之人亦能勉强自王安石用資淺之人為監司使之推行新法是故才與不才兩皆廢壊而資序一切不用二聖臨御以來又未嘗以逺近為之資序毎邉帥有闕則不知可用者為誰由朝廷養之無素也臣愚欲乞復祖宗之時用監司之法邉臣有闕于此選授則可用之人必多矣今監司或初除即與近路及三路自三路却遷之逺地則人情已不樂在三路者或久而不遷其才能資望又不足備邉帥之任此所以人才常乏也今若復祖宗之法其提㸃刑獄轉運判官亦擇才能者與諸路更互為之使往來出入于三路者常多則知邉事者必衆矣其四曰臣聞自古重法以止盗者莫如五代之漢髙祖即位之年患四方盗賊衆多敇盗賊無問贓多少皆抵死仍分命使者逐捕宰相蘇逢吉草詔意云應盗賊其本家并四鄰同保皆全族處斬衆以為盗猶不可族况鄰保乎逢吉固爭不已但省去全族二字由是鄆州捕盗使者張令柔殺平隂縣十七村民其法可謂重矣然盗賊不為衰止至周太祖時竊盗贓滿三疋者猶棄市太祖皇帝代虐以寛稍輕盗法累聖仁厚遞加減貸故竊盗遂無死刑然編勅所定盗贓猶重于律三倍豈可更増重乎臣伏見熈寧四年中書檢正官奏請開封府東明考城長垣等縣京西滑州淮南宿州河北澶州京東應天府濮齊徐濟單兖鄆沂等州淮陽軍别立盗賊重法其後又有他州奏請乞比東明等處行重法者夫溥天之下誰非吾民今獨視此州縣如度外之人自行法以來二十餘年不聞盗賊衰止但聞其愈多耳古者開衣食之源立教化之官先之以節儉示之以敦朴有邪僻之民然後從之以刑豈有不治其本専禁其末又重法之地皆舉知縣必擇强健之吏奉法除盗視民如讎一切以擊斷為稱職此豈平世所宜為乎臣愚欲乞悉除重法改重法地分為舉知縣地分夫天下縣令不可不擇獨此諸縣已先舉吏則不可廢民多姦猾尤須良吏以治之選吏以養民不命吏以敵民也及今四方人情少安改峻法為平法庻可變惡俗為善俗止用常典足以禁姦惟陛下無以教化為不急無以峻法為足恃則民皆可使為善矣户部請将畿縣夏秋租及房園酒稅等課利應催驅比較事並専𨽻提㸃司從之工部言本部酬賞格小使臣任滿縁黄河洛口物料場監官免短差陞三季名次今㸔詳向著退背一等酬奨顯見不均欲令向著埽分依法推賞其退背處止免短使從之新削太子太保致仕張方平卒上輟視朝二日成服苑中贈司空方平戒其子孫勿請諡尚書右丞蘇轍為請之乃賜諡文定政目二日賜韓嘉彦弟穆衍金紫衍賜已附十一月十八日嘉彦當考丁巳詔三省樞宻院并六曹御史臺開封府大理寺人吏並許依舊法三年一試斷案次第推恩右正言姚勔言伏見禮部郎官葉祖洽貪鄙無状不持亷節昨自淮南得替入京沿路商販并多置蘆箔寄炭場官物及寺院堆垜貨賣又與開寳寺僧交往錢物不明借馬逾年逐月以倉麥換白麫及令梢工買木十條還錢虧價又買金銀銅器三􅤮盗稅入門就京販賣詔户部尚書劉奉世體量寄箔借馬換麥皆有實詔祖洽具析以聞明年二月六日祖洽知海州右宣徳郎權𤼵遣兩浙路提刑馬城状準吏部牒都省批䧏指揮勘㑹今有身在兩浙父已垂年而其子却用指射家便法授廣南差遣係何人具職位姓名申尚書省城令契勘得係右通直郎新差權知連州徐疇有父師民任中散大夫致仕見在本路蘇州居住其徐疇已于今年八月内起離前去連州赴任詔徐疇令吏部指揮罷任侍養令進奏官遍牒施行編録冊十二月三日聖㫖戊午遼國遣使保静軍節度使蕭倜副使中大夫守太常少卿史館修撰王初來賀興龍節户工部言應官員赴任川廣福建於半年前荆湖南路于一季前荆湖北路江南西路于兩月前江東淮南兩浙路于一月前其不及千里州軍於入半月並為見闕全差合破船數應差船乘載官員入京輙将所附官物妄作名目於府界諸縣寄納或併與别船并雖無官物已至汴河下鏁不由在京東排岸司差撥而承受别官司差占回歸者各杖一百從之新本削去刑部言應自陳是别宅所生子未嘗同居其父已死無案籍及證驗者不得受理從之新削庚申左朝奉郎知兖州翟思為國子司業䕫州路轉運判官程之邵為都大管勾成都府利州路茶事八年五月十六日黄慶基云云丙寅左朝散大夫守兵部侍郎葉康直卒戊辰詔皇太后親姪女三人並封郡君户部言乞今後應致仕官有戰功曽經轉兩官以上者並許支給全俸從之樞宻直學士朝請大夫知揚州李承之卒是夕開封府火府廨一空知府事李之純僅以身免翌日執政於講筵奏曰火通夕𫝊報必驚動上曰廹近原廟極可懼執政退相與歎曰言詞雅馴殊有裕陵之風此據王巖叟日録己已詔今後應歸明人乞尋醫侍養致仕之類令所在具奏聼㫖庚午詔禮賔副使楊光震為崇儀副使右班殿直楊光榮為左班殿直三班借職韋光澤為三班奉職以次首領楊貴昇等並從瀘南安撫司奏請補授借職至廵遏将瀘南沿邉安撫使張克明為嘉州團練使以生擒㺐賊功也御史中丞鄭雍言雨雪愆少農事不舉伏望申飭内外督促刑獄以導和氣詔在京委刑部郎中及御史一員開封府界令提㸃刑獄諸路州軍令監司催結見禁罪人内干照及事理輕者先次斷訖以聞内府界徒以下罪人罪状明白不該編配及申奏公事或雖小節不圓不礙大情並許决訖以聞御批十一月二十八日夜太史局等處奏有客星初出在參宿度參宿在晉分今河東是也竊恐昨夏賊打刼麟府路殺害人民擄掠人口孳畜不少朝廷雖體量賑濟亦慮體量不實賑濟未得仔細及将來本路糧食别致闕乏三省樞宻院商議合如何施行此亦應天一端也如合有施行即以尋常意度行遣上件星變事因更不行出是日十二月十六日三省樞宻院同進呈寢之此據御集増入十八日遣劉忱體量安撫恐此御集所云寢之誤也十二月末梁燾云云可考詔吕恵卿光禄卿分司權給事中姚勔封還罷之政目十六日書恵卿光禄分司二十二日書姚勔􅌳恵卿詞實錄並無之按恵卿家𫝊亦不載此却云六年十一月許任便居住今且因政目附見十六日當細考之三年九月自建寧移宣州八年十二月十六日復中大夫崇福官辛未御史中丞鄭雍言請今後按察官司元奏不當止依法令刑部具因依取㫖朝廷酌其太甚者懲責從之壬申直龍圖閣知鳯翔府謝麟權知渭州直龍圖閣太府卿劉忱為麟府路體量安撫先是三省樞宻院奏事太皇太后言及開封火宻邇景靈幸無風李之純幾不免已令人問之吕大防因言聞有客星在昴畢間臣等不敢呼日官問不知已退未太皇太后曰未退大防曰畢主敵兵恐是今有西事應見於天由此觀之人事不可不謹蘇頌曰畢主趙地恐事在北界亦不可知太皇太后曰已于上清作道塲祈禳王巖叟曰天道逺不可知變見果為何事但朝廷毎事修省天道當順應太皇太后曰天道安敢忽更在執政大臣同修政事大防曰全在修政臣等不敢不用意初河北被寇巖叟累言須遣使庻可以盡事情韓忠彦不以為然大防唯唯而已餘人皆無可否及庚午御批出忠彦首曰須遣使明日聚議大防寫元祐令中溺水給錢掩瘞等三事曰昨日文字行此可矣巖叟不答徐曰須遣使乃可應曰遣使亦得巖叟曰不如便議定誰可使明日進呈遂以劉忱為請巖叟又言遣使則可以示朝廷恩意盡邉上事實從之明年五月二十六日孫咸寧等責觀文殿大學士太中大夫知河南府范純仁言昨以禦戎失䇿累章待罪蒙恩罷帥移知河南府竊恐未厭公議望再行黜責詔范純仁降中大夫初議落職嫌太重欲止降官又以故事宰相必帶諌議大夫官制為太中大夫今降中大夫或疑之既而以純仁外任遂有此詔河北東路提刑司言請今後應河埽軍人犯强竊盗殺人放火刼囚及窩藏賊過致資給作脚指引借助器杖或聼漏落緝捕機謀之類合該刺配者並依配逺近刺配諸州軍牢城如違犯應配即依重役法勒充本指揮下名從之新無政目十八日根究開封府遺火今附見當考乙亥拂林國遣使入貢工部言河北京西府界三路今後所買河埽年計物料所差官止買及一萬束許支給食錢驛劵從之丙子户部侍郎韓宗道為寳文閣待制權知開封府寳文閣直學士權開封李之純為兵部侍郎宗道知開封政目在十八日御史中丞鄭雍言伏見吏部員多闕少堂除遷徙大數遲速不齊非常行之法乞今後吏部所差知州通判人並依舊以二年半為任六曹郎官除合非次遷進外並實以三年為任如以員多闕少即乞量減年月或以差除難定即令少延嵗時毎有闕員隨才進補不必遞遷如任滿朝廷考察顯有才效雖不次褒擢亦足以風勸在位其堂除知州及監司如非朝廷須合遷召並不以無名除改詔應内地知州通判除堂除人外並依元祐元年十月四日法差注户部言承買場務界滿有欠已根究承買人自已財産及保人抵當納官外尚有欠數承買人委無可納者如無情弊縣州監司次第保明除放訖申本部若已除放而場務尚無人承買者即權行停閉别召人承買從之工部言盗拆黄河埽緷木岸以持仗竊盗論其退背處減一等即徒以上罪於法不該配者亦配鄰州毎獲一人杖罪賞錢十貫徒罪十五貫流罪二十貫廵防軍人不覺盗毎次使臣三次合杖六十從之戊寅樞宻院言昨自元豐軍興以來御前降下陜西河東處置邉防機要處分多是直付邉臣親自收掌竊慮後來移替有失照據詔諸帥臣親收遵行不得下司毎遇替移親相交付七年二月八日章楶云云可考已卯遼國遣使寧昌軍節度使耶律廸泰州觀察使蕭仲竒副使中散大夫守太常少卿充乾文閣待制髙端禮東上閤門使廣州防禦使劉彦國來賀正旦庚辰詔都水使者吳安持再任三年十一月十八日初除八年六月二十八日改太僕先是執政奏事延和語及立后太皇太后曰又選十餘家皆不可吕大防曰若門閥不可雖有容色亦難取王巖叟曰須勲徳之家乃可以服天下人之心若太皇太后家有其人正協天下望不須以小嫌為辭太皇太后曰何由知此大防曰外間亦聞之太皇太后曰只為不堪髙家亦安有此福大防請召都知押班至閤子中問當許之少頃見馮宗道梁惟簡于内東門令奏髙公紀女年命乞降付據王巖叟日録已上乃十八日事是日二十六日執政㑹崇政殿門宗道惟簡來𫝊聖意云本朝未有一家二后嫌於太盛又恐人物不當上意却成難處既對大防具言之太皇太后因云不堪又宻勘得所妨甚重於是髙氏之門遂塞大防又言諸王家或有人聞蜀國長主之女前疾今已無他太皇太后曰未也又曰王詵不佳要是長主所出耳此據王巖叟日録乃二十六日事辛已鄜延路經略使范純粹奏臣伏覩朝廷委諸路帥臣時出輕兵為淺攻之計近因環慶涇原熈河各曽出師西人具曉此意今探得西界於諸沿邉對境百里之外各作頭項排布人馬東西相屬意欲毎一處漢兵入討即左右頭項人馬併合聚集足以拒戰以地里計較不過一兩日之内彼所聚兵必不下三五萬是彼有以待我也臣竊計漢兵入討一路人馬不過一萬既入賊境不下一二百里彼主我客衆寡相逺若不以術分彼兵勢則漢兵常少遇賊常多恐非全勝之道竊縁漢兵入討鄰路各不相知聲跡相疎有同秦越彼能併兵拒戰而我不能協力破賊則倒置乖方莫大於此臣願朝廷宻誡諸路邉臣凡有所經營俟謀議已定入討有日即令帥臣先期手作書簡以代文檄詳報左右四鄰謂如環慶欲出即東報鄜延河東西報涇原秦鳯無次鄰即據所報謂如河東欲出即報環慶鄜延欲出即東報河東西報慶渭告以决入之日其被報路分帥臣須管立便差選兵将於所定之日引至塞上大作深入之勢諸路平日必已探得自已對境有無賊馬人户次第若亦有利可乘須於所定日進兵深入如偶無利可取或近界有賊馬盤泊不可進向亦須嚴督兵將以其日出塞虚作聲勢不用深入務在牽留得對境賊兵不敢舍此之彼所遇賊兵無併力拒戰之患則四鄰之助豈小補也臣愚慮及此伏乞聖慈相度如何施行即乞速作朝廷之意下諸路遵守純粹以十二月二十七日奏此翰林學士梁燾言臣過被聖恩驅策得侍清光親聞徳音要使静而不擾安而無危内恵中國外綏四方隆謙廣問未嘗不及政事之得失臣同天下慶幸陛下聰明可謂知要已如君臣同徳共行此道數年之間必復見仁宗至治之時比觀朝廷之事似未副聖明之本意者臣甚惑之豈大臣不能将明徳美究宣睿澤以廣為宗社長久安寧之計歟或者聖意稍怠姦人伺隙得進邪説以眩亂聰明歟臣早蒙知遇擢在言路納忠補報難同衆人不忍不為陛下一言也願陛下察臣之志少加聼焉臣聞論者曰致天下之治難守天下之治易臣獨曰致之為易而守之為難也盖自古人主圖治之初莫不急於求賢渇於聞諫得一善惟恐未能行見不善惟恐未能去潛心于萬事幽微之無形用意于衆人思慮之不到兢兢業業不敢暇豫終至於安樂而無事此天下之治所以致之為易也亦既治矣或放其心氣日益驕志日益怠謂賢者得矣而忽于求謂善言盡矣而厭於聼謂事之微者為不足慮謂患之隠者為不足防姦生而不察禍萌而不悟故終致于敗亂而莫之救此天下之治所以守之為難也易曰君子安而不忘危治而不忘亂既濟卦之象曰君子以思患而豫防之盖安有危之理治有亂之機既濟而猶思禍患之潛伏此皆聖人戒懼于治安無患之時者也恭惟陛下臨御七年于今進賢去佞協天下之公興利除害同百姓之欲刑罰清平賦歛均節姦宄已銷兵革略戢嵗物豐穰民力寛暇可謂有治之漸矣守而勿失治道可成正是兩宫持守至難之際也恭惟皇帝陛下進學不倦臨政不忽無宫室之好無聲樂之玩無佛老之惑無用武之蔽所以守之者有道矣恭惟太皇太后陛下仁敬明謹濟以大公判别讒邪裁抑僥倖聼斷之間事明理盡照臨之下物無遁情此堯舜之用心也而臣之區區尚以為憂者竊恐陛下以未成之治為大治以小康之俗為可久包桑之慮日懈于心杇索之畏不及于前盖積累而成者為至難怠忽而敗之者為至易臣區區之忠盖已面陳伏望陛下不以臣言為愚謹思而審行之臣屢䝉聖恩降㫖開納臣未敢以為喜尚書曰知之非艱行之為艱又曰戒哉儆戒無虞願陛下必行可聼之言儆戒無虞之事延洪無疆之休天下幸甚貼黄竊以政事之本在於用人朝廷人材純一則政事自然安静但君子在内小人在外即是泰道如君子小人混而為一則泰道何縁得成君子小人不可並用猶氷炭之不可同噐一長一消自然之理也此在人君常用意於進君子退小人則治道可成而天下受泰矣伏望聖明留意于此小人而無材者雖未足畏然亦不可用也小人之性善于嫉善良為朋邪是不材者使之得路必又将引用小人之有材者以濟其姦終為國家之害此其不可用也决矣其理甚明願陛下察之人材純一則政事安静而朝廷無事陛下可以無憂無為矣人材雜揉則政事紛亂而朝廷多事陛下可得不慮不勞乎必使邪正判白而人材純一則中外安静朝廷清明矣此治道之要也竊以臣之為道在於盡忠忠之為字謂中心一則為忠也中心二則為患矣夫臣下有愛君憂國與上同徳同心而能奮然當怨排難無慮身顧家之憂者可謂中心一矣陛下察其有是心焉豈不為忠也可疎之乎臣下有外示愛君憂國而其中不與上同徳同心不肯當怨排難但務要收恩買譽切切於營私者乃中心二也陛下察其有是心焉豈不為患也可親之乎此用人之要也伏望深留宸念燾又言臣聞人主之徳莫大於知人朝廷之政無先於急賢徳以聰明為髙而政以忠厚為本夫能判别邪正斷之不疑使竭忠者皆盡節懐邪者不可亂正斯可謂之聰明矣用得其人則法度齊君子親近小人疎斥恩澤下於百姓歡欣逹于四海斯可謂之忠厚矣恭惟太皇太后陛下至公至正明而有斷皇帝陛下仁考荘敬静淵疏通閲天下之事日益多進天下之材日益廣講求祖宗治體日益熟察見中外人情日益詳然而聰明或有所遺而忠厚未至于成者臣竊疑之或者聖心未加意于執要乎今日為政之要在於辨邪正之實也唐李徳裕有言曰邪正相攻上惑主聼正人呼邪人固為邪矣邪人亦呼正人為邪人主何以辨之臣故曰在辨其實也元祐之初至於三四年間正人為陛下論邪正盖已多矣陛下辨邪正亦已明矣陛下能守之以定而巧言不能移則姦謀自破矣姦謀不行則邪人自消邪人既消則正人之道行而政事不臻於忠厚者未之聞也此獨在聖功之自强爾李徳裕嘗為唐武宗言曰舜有大功二十去四凶用十六相不必在武功也武宗甚恱武宗能欣納徳裕之忠言信是聰明之主矣陛下大度謙虛恐未欲遽就舜之大功顧武宗之欣納忠言誠不難及也臣願為陛下陳辨實之畧焉所謂正人之實者能推公其心以愛君憂國為計不附下不罔上樂進善類愛惜生靈臨大節而忘其身事兩宫而一其志為陛下常求長久安寧之計近思自左右宫庭之間逺慮至於中外海隅之際皆欲得其歡康無事上下一意其為安静其功如此者是正人也此類進則聰明開廣内外大安豈不為國家忠厚之福耶此類去則無政矣不可不辨也所謂邪之實者緩公急私復仇報怨外陽為忠直内隂懐姦曲其言似忠而其實欺罔也其氣似敢而其實凶嶮也自謂介特而其實朋黨也自謂純一而其實二三其徳也貪禄競進猜忍傾奪専以傷害善良為謀而又附託權要出死力為之鷹犬不憚不耻以肆其毒不恤國之憂危務伸其志不懼上之悔患務行其言其為傾揺多端如此者是邪人也此類進則聰明眩惑内外大恐豈不為國家忠厚之患耶此類去則無憂矣不可不辨也今聼其言而求其用心之微觀其行而考其處已之端其向背之異有無之殊雖未能盡究而亦可以概見矣陛下既辨其為邪即當速去之如未能即去之耶多用正人正人既用則邪人知難而或自退或行險以攻正人因其攻正人而去之以示大公因其引退而去之以示大恩二者隨其動而處之不煩掃除之力矣李徳裕又嘗為武宗言之曰陛下辨邪正專委任守之以定朝廷必理此真宰相之言也盖主意不能定則姦邪得以乘隙而進惑亂聰明也一移其意則憂患從而起尚何致理之望乎聖心從來知其為正人者固不多也惟願記其盡心宣力始終保全勿使小人揺動也如其離間毁敗誣䧟之言者此是揺動之計也願陛下自信素知之心而守之以定深辨姦詐之說而斷之以不疑斥其邪人以安正人正人知所依歸恃以無恐得以奮忠竭節畢身圖報則朝廷之理不難致也臣不勝惓惓納忠之至貼黄臣向在言路得侍清光伏見陛下照物必盡其情偽而量有包容論政深逹其義理而語有次序雖古之英主不能過也臣等累曽奏聞以謂邪正不可並用陛下深以為是知邪正之必相攻也今並用矣臣等又謂邪人在外正人在内則可治陛下亦以為是知邪人在内則害政也今邪人在内矣臣等又謂使邪人少正人多則可治陛下亦以為是知邪人之多則交相朋比損正人之道也今邪人多矣以在内衆多之邪人與寡少之正人並用勢自不敵豈能久安而終無憂悔乎奈何與日前之聖意不同邪必有姦人移惑聖意也如不悟則姦邪乘隙數數進計終至於成其禍此聖明所宜早辨勿為清𠂻他日之憂悔也又云伏見聖意欲得臣下之心純一而憂其二三之紛紛未定也臣謂欲齊羣臣之二三者莫若言路用純一之臣也願陛下用素所知之正人嘗在言職風采凛凜為中外所敬憚者處以言官之長其心一忠于兩宫其言大公于朝廷使四方仰之國勢増重姦邪小人望風自然消退大臣小臣肅然守正莫不純一無煩聖慮矣惟陛下早定聖意斷在必行可救今日之弊無出於此伏望深留宸念為宗社之福又云陛下自御政以來選用可信之臣能以忠孝報陛下之恩者今在朝廷不過數人羣小怨嫌隂結為朋力謀排䧟者不一人也其心欲盡去此數人則姦謀可行大姦有復來之望此數人者方以時事難守為憂孤立難安為懼若非陛下知其忘身忘家當怨去姦有愛君憂國之心力賜主張則豈能安全至于今日也在于今日之勢尤為難立仰頼聖造終始主張也此數人者亦未足深惜但恐小人復興攻撃轉多萬一如此則為太皇太后陛下即日之悔為皇帝陛下他日之憂此可為大懼也願聖明凝神深慮以杜其漸待其事起而後處則必勢强横難制縱終能制之憂勞亦已深矣今朝廷正人少邪人多誠意不一公道虧損聖意欲削朋黨而朋黨愈結聖意欲絶私邪而私邪愈行此所以政事紛紛未得安静也伏望聖慈毎當進擬人材之際丁寧審問謹重開按此處原本闕文可使私邪漸少朋黨自衰朝廷日有安静之望聖政日有清明之益此道既行可以緩憂矣小人姦言最是難辨盖其巧美似忠害善似直狠愎似敢誣罔似公人主聼之一誤則徳業俱損若不早辨則終致憂患故聖人曰惡利口之覆邦家者自古人君以為誡此聖明不可不察也又云有向來姦黨已用之人今復在要路者又有姦黨後進之人今在言路者又有小人之奔競僥倖者雖素非姦黨而今日屈意求助以濟其謀為自進之計隂相交通以白為黒以是為非以無為有有専欲惑亂聰明離間君臣傾害忠良此不可不察也其心亦甚易見陛下從來以為正人而有時望者小人必欲䧟害也姦黨漸漸復用在朝衆人皆知無一人為陛下言之也此是忠邪不忠耶公耶私耶曲耶直耶且以此一事驗之甚易辨也陛下既辨之亦須早為處分疎理如此則政事漸復清明可以上恱天心而還譴集祐矣又云言路必擇守正純一之君子則心公而言直判别是非有補聰明若誤用邪人心私言曲惑亂聖聰唯欲自濟其姦謀此不可不察也燾行状云七年有司奏客星見燾論之其畧曰客星初變久未退伏上軫聖慈至誠寅畏側席修省譴告之來必主于事事之所起必自於人今姦邪尚多正人至少主聼未専恐其占不特兵飢疾疫之間而已人主之徳莫大於知人朝廷之政莫先於急賢云云按燾論知人急賢即此奏也但奏稿乃無客星見等語耳又按御集十二月十六日三省樞宻院進呈十一月二十八日賑濟御札有十一月二十八日太史奏客星云云燾奏所稱客星必縁此也今并前一奏論奏聖意稍怠姦人伺隙得進邪説並附六年十二月末奏稱陛下臨御七年盖自元豐八年至元祐六年實七年也若元祐七年則不得云七年行状附之七年誤矣六年十一月一日劉摯罷相二十八日太史奏客星云云燾兩奏决在六年冬所稱邪正並用邪人多邪人在内與前日聖意不同必縁摯為楊畏等所攻故也又稱言路當用純一之臣其指楊畏等决然無疑更須詳考之十一月二十八日夜太史所奏客星出參舊録亦于十一月末書客星出參掩厠星明年正月末又書客星隨天運行入濁不見至三月辛亥奎宿問消伏新録並因之今兩朝天文志云元祐六年十一月辛亥二十八日客星出參宿度中犯掩厠星主有暴兵米貴晉分兵災壬子二十九日犯九㳺星十二月癸酉十九日行入奎星内主邉兵動至七年三月辛亥乃没是嵗宗室賜名換官者五十四人天下上户部主户千二百四十二萬七千一百一十一丁二千八百七十五萬四百五十五客戸六百二十二萬七千九百八十二丁一千二百七十四萬一千八百五十六斷大辟四千八百一人
