body:
  text: 續資治通鑑長編巻六十一宋李燾撰真宗景德二年八月丁丑朔以翰林學士李宗諤左諫議大夫張秉同判太常寺仍命内臣監修樂噐時殿中侍御史艾仲孺上言每監祠祭伏見太常樂噐損闇音律不調郊禋在近望遣使修飾及擇近臣判寺故以命宗諤等宗諤素曉音律乃令太樂皷吹兩署工較其優劣黜去濫吹者五十餘人宗諤因編録律吕法度樂物名數目曰樂纂又裁定兩署工人試補條式及肄習程課皆施行之戊寅羣臣復上表請郊畢聽樂如故宰相繼以靣請卒不許庚辰永興鳯翔節度使太傅兼中書令雍王元份薨贈太師尚書令追封鄆王謚恭靖上於元份友愛尤篤元份寢疾上時在澶淵聞之甚憂就遣太醫中使旁午於路及還京屢自臨省醫禱俱至元份母任氏早卒特贈太儀以慰其心既薨哭之甚哀他日見宰相語及再三雪涕舊制親王母為太妃公主母為太儀時不欲有妃號故特贈太儀辛巳詔諸州縣案帳要切文書鈔榜等委官吏上籍収鎻無得貨鬻毁棄仍命轉運使察舉違者重寘其罪時衛州判官王象坐鬻案籍文鈔除名為民配𨽻唐州因著條約癸未令諸路轉運使不得以京朝官使臣隨行指使三司言利州轉運司稱閬州素出甆噐請約所售價收其筭不許丙戌西川轉運使黄觀言益州将吏民庻舉留知州張詠詔褒之始車駕北征四方揺心詠慮逺夷乗隙為變欲出竒以勝之因取盗賊之尤無状者磔死於市衆皆懾服遂底嘉靖每訊牒便文久不得判詠率爾署决莫不允當蜀中喜事者論次其詞總為誡民集鏤板傳布上嘗遣使廵撫西川因令諭㫖曰得卿在彼朕無西顧之憂也詔以劉承珪新定權衡法附編敕實録㑹要皆云詔以承珪所定權衡法附編敕而不頒下案承珪新式自淳化三年已行用矣不知此所謂不頒下者果何法也㑹要云景徳中承珪重加參定其法益為精備所謂不頒下者豈此法耶其實與淳化所用不殊當是已行用故不復頒下而承珪新式及是始附編敕耳當考丁亥翰林學士右諫議大夫晁逈責授左司郎中依前充職初逈與給事中馮起等五人並為鄆王元份留守官屬王以獄逸囚驚悸得疾遂死逈等坐輔導無状并及於責戊子詔咸平編敕後續降宣敕所在編録二本一長吏主之一法司行用轉運使檢察無漏落命河北轉運使劉綜提㸃雄州㩁場孔揆等與諸州軍長吏共平㩁場物價以和好之始務立永制也己丑令三司抽筭商旅茶許民就西京白波鞏縣及緣河倉入粟博買從殿中丞京兆周實之請也庚寅令益梓利䕫諸州管内鎮將不得捕鄉村盗賊受詞訟全椒縣主簿知縣事王巘為歙縣令巘在全椒有清政轉運及使者連薦其能故移宰劇邑免秦州所逋博糴軍糧八千六百九十餘石通判鳯翔府王為寶請於興元府置𣙜茶務上以擾民不許上之駐蹕澶淵也樞宻使陳堯叟慮敵騎侵軼建議令縁河悉撤橋梁毁船舫稽緩者論以軍法河陽河中陜府皆被詔監察御史王濟時知河中獨持其詔不下曰陜西有闗防隔礙舳艫連属軍儲數萬奈何一旦沈之且動揺民心因宻疏奏寢其事上深嘉嘆遣使褒諭甲午詔拜工部員外郎兼侍御史知雜事賜金紫記聞載王濟事又云陜州通判張績時以公事在外州中已撤浮橋績聞河中不撤乃復修之冦準由是知此二人績亦以此為三司判官轉運使按是年十二月丙申實録書賜殿中丞通判滄州張績緋留權三司鹽鐵判官明年三月庚戌人書殿中丞張績為度支判官記聞稱陜州通判實録乃稱滄州通判不知何故當考或附九月壬戌日初鄆王元份娶崇儀使李漢贇之女性悍妬惨酷宫中女使小不如意必加鞭抶或有死者上每有恩賜詔令均給本宫而李盡取之罕所霑及元份既卧疾上親臨問見左右無人供侍因輟宫人為主湯劑女使因笞捶廢疾一日因謀燔爇衆救之而止始太宗上僊戚里皆赴宫中朝晡臨惟李多稱疾不至上不欲遂成其惡特於殿隅别設幄帟屢召始入又元份生日李以衣服噐用為壽皆飾以龍鳯元份薨李無戚容而有謗上之語上既盡知其所為以元份故為優容之及是復不欲顯究其罪状乙未命削國封置之别所丙申樞宻直學士兵部郎中邊肅知宣州坐與趙諫徃還故也先是大理寺斷禁軍逃亡在赦限内捉獲者斬赦限外即准律减等上曰此刑名殊非允當令赦限内不首者重去赦逺不首者輕乃詔詳議己亥詔亡命軍士及刼盗赦限内捕得罪至死者奏裁限外刼盗準法亡命軍士罪至死者杖脊黥面流沙門島情理重者奏裁罪不至死者不以赦限内外並依常法庚子詔應賊盗􅂍物自今委長吏通判官親付本主慮為下吏所罔致斷獄失實也詔府州蕃漢雜處號為難治宜令審官院銓司擇其通判録事參軍癸夘除戎州突儒渡錢甲辰三司請令京東以稅輸送河北諸州京西轉運使請於部内配糴芻糧皆不許河北轉運使劉綜請擇文學噐識之士通判縁邊州軍使其商度邊事及徃還北境文牒從之有星孛于紫㣲太常博士馮璉知光州璉前為廣南轉運使規畫乖當故責之乙巳徙兩浙轉運使陳象輿知饒州坐與趙諫徃還故也詔河南州軍所管鄉縣在河北者今年秋租許就便于德棣州輸送詔涇原儀渭等州蕃部所給馬價茶縁路免其筭九月丙午朔屯田員外郎陳奕兼武信軍節度掌書記賜緋時安定郡公惟吉節度武信闕掌書記上謂宰相曰惟吉知書當於朝臣中擇有詞學亷謹者為之審官院以奕名聞上令中書延見之畢士安等言奕如所舉乃召對便殿而有是命丁未上以趙德明誓約未定即命向敏中自知永興軍府改為鄜延都部署兼知延州使經畧之上封者言郊丘神位神板皆有司臨事題署多不嚴肅詔鹵簿使王欽若改造欽若言五方帝位板如靈威仰赤熛怒皆是帝名理當恭避望下禮官檢定禮官言按開寳通禮義纂靈威仰赤熛怒含樞紐白招拒叶光紀者皆五帝之號漢書注五帝自有名即靈符文祖之類也既為美稱不煩迴避詔可欽若又言壇圖神位升降未便漢書郊祀志五帝為天神之佐今五帝在第一龕天皇大帝在第二龕與六甲嶽瀆之類同處北極衆星所拱今與尚書大理之類接席帝坐為天市之尊今與二十八宿積薪騰蛇杵臼之類同在第三龕卑主尊臣甚未便也若以北極帝坐本非天帝葢是天帝所居則北極在第二帝坐在第三亦髙下未等又太㣲之次少左右執法子星之次少孫星天輹當為天福天記當為天紀望令司天監衆官參驗聞奏詔欽若與禮儀使太常禮院司天監同檢討詳定欽若言本因臣所陳情不可復同商𣙜許之既而禮儀使趙安仁等言得崇文院檢討杜鎬陳彭年狀按開寳通禮元氣廣大則稱昊天據逺視之蒼然則稱蒼天人之所尊莫過於帝託之於天故稱上帝天皇大帝即北辰耀魄寳也自是星中之尊易曰日月麗乎天百榖草木麗乎地又曰在天成象在地成形是明辰象非天草木非地則是天以蒼昊為體不入星辰之列又郊祀録壇之第二等祀天皇大帝北斗天一太一紫㣲五帝坐並差在行位前餘内官諸位及五星十二辰河漢都四十九坐齊列俱在十二陛之間唐建中元年司天冬官正郭獻之奏天皇北極天一太一准天寳中敇並合升在第一等從之貞元二年親郊令禮官詳定太常卿漢中郡王瑀與博士栁冕等奏開元定禮垂之不刋天寳改作起自權制皆方士謬妄之說非典禮之文請依禮為定詔復從開元禮仍為定制郊祀録又云壇之第三等有中官市垣帝坐等十七坐並在前開元禮義羅云帝坐有五一在紫㣲宫一在大角一在太㣲宫一在心一在天市垣即帝坐者非直指天帝也又得判司天監史序状天皇大帝一星在紫㣲勾陳中其神曰耀魄寳即天皇是星五帝乃天帝也北極五星在紫㣲垣内居中一星曰北辰第一主月為太子第二主日為帝王第三為庻子第四為嫡子第五為天之樞盖北辰所主非一又非帝坐之比太㣲垣十星有左右執法上將次將之名不可備陳故名太㣲垣星經舊載孫星而壇圖止有子星辯其尊卑不可同位天輹主鑾輿輦轂不當作福字天記一星在午堦第四龕别有天紀九星在寅堦第三龕壇圖並載不當合而為一竊惟壇圖舊定悉有明據天神定位難以躋升望依星經悉以舊禮為定詔從安仁等議欽若復上言舊史天文志並云北極北辰最尊者又勾陳口中一星曰天皇大帝又鄭元注周禮謂禮天者冬至祭天皇於北極也後魏孝文禋六宗亦升天皇列五帝之上此皆良史鴻儒所述豈皆方士謬妄耶古禮舊制未必全是至如九宫貴神天寳立祀在宗廟之上文宗初舒元輿輙率鄙見降為中祀厥後水旱作沴元輿果以覆族徃者陛下特頒明詔立為大祀靈心合荅景福並臻今若以方士為妄即九宫之祀可廢乎至若天市帝坐雖前代未有異論按晋書天文志帝坐光而潤天子吉威令行既名帝坐則為天子所占列于下位未見其可又安仁所議以子孫二星不可同位陛下方洽髙禖之慶以廣維城之基茍因前代闕文便為得禮實恐聖朝茂典尤未適中豈可信貞元之末學輕談略經史之羣儒讜論除執法天輹天記三星安仁已有典據今請如舊其天星北極帝坐孫星四坐臣已新製板位恭俟宸㫖詔天皇北極特升在第一龕又設孫星位于子星之次帝坐如故欽若復言帝坐止三在紫㣲太㣲者已列第二等惟天市一坐在第三等此人情所未安也又晋志大角及心中星但云天王坐實與帝坐不類詔特升在第二龕詔州縣官在任亷幹許州佐職官保奏其幕府官亦許知州通判奏舉皆令本路轉運使考察連坐上聞異時不如状一等寘罪在任不法亦如之河北轉運使劉綜請令近臣連坐於幕職州縣官内舉堪任京官知縣官各一員俾知天雄軍相州管内劇縣上曰河朔宰字尤藉得人然慮舉官或致稽滯當俟銓司引對常選人察其有績効無罪累者朕自擇之㑹要係九月事邛部川百蠻都王阿遒遣王子將軍百九十二人來貢方物詔授阿遒安逺將軍阿遒叔懐化將軍阿宥為歸德將軍逰奕將軍離歸為懐化將軍大判官懐化司候任彦德王子將軍部的並為懐化郎將判官任惟慶為懐化司候阿遒為安逺將軍實録㑹要並在明年正月今并書之詔興州青泥路依舊置驛其新開白水路亦任商旅徃來庚戌以淮南旱歉詔轉運使疏理管内繫囚辛亥詔諸司入流官選滿堂除資叙超異多違舊式自今並從銓曹投牒注擬准敇格施行除三泉縣東西及青烏嘉陵西津渡年額錢仍不得以部民為渡子壬子詔自今宴㑹宜令御史臺預定位次告示各務端肅無得喧譁違者殿上委大夫中丞朶殿委知雜御史廊下委左右廵察視彈奏癸丑趙德明始遣其都知兵馬使白文壽來貢甲寅免雍王府記室參軍兵部郎中楊澈削兩任祠部郎中朱協削一任以其輔導無狀藩邸左右人或踰矩未嘗聞達於主故也於是協兄昂致仕踰五年矣尚無恙乃以書招協協亦告老而歸兄弟皆眉壽時人比之漢二疏焉本𫝊因昂致仕即載其以書招協不知事相去乃五年後也今改之京西轉運使鄭文實請自京給大方茶晉絳州布依河東例博市軍儲知河南府温仲舒請等第配糴上以其擾民弗許所須儲蓄令三司經畫以聞詔舉放息錢以利為本偽立借貸文約者從不應為重科罪乙夘以户部判官屯田員外郎崔昈為都官員外郎曹國公府記室參軍賜金紫先是上謂輔臣曰元儼年少尤資贊導翊善戚維迂懦循黙不能規戒崔昈性頗純謹以之代維庻有禆益因召對而命之昈頌子也丁巳除越州天章寺田租戊午光禄寺丞錢易言竊覩文德殿常朝兩班不及三四十人前秋以朝官奉使者多權借館閣官常朝葢以凡掌職務止赴五日起居頗違舊章望令並赴常參詔應三館秘閣尚書省二十四司諸司寺監朝臣除内殿起居外並赴文德殿常參其審刑院大理寺臺直官開封府判官司録兩縣令司天監翰林天文官監倉場𣙜務等仍舊免常參易嘗通判蘄州奏疏言堯放四罪而不言殺彼四者之凶尚惡言殺非堯仁之至乎葢國之所謹莫先乎刑刑不可不本於法不本於法則刑黷而致暴刑黷而致暴則下無所措手足矣古之肉刑者劓㭬黥刖皆非死罪尚以為虐而絶之近代以來非法之刑斷截手足鉤背烙身見白骨而口眼猶動四體分落而呻痛未息以此示人故四方長吏益殘暴不已又婺州先斷賊手足然後斬之以聞壽州廵檢使以賊磔於闤闠之中其旁猶有盗物者使嚴刑可戒於衆則秦天下無一黔首之亂矣臣以謂非法之刑非所以助治也惟陛下除之上嘉納其言禁福建諸州軍寺院童行依僧尼真影出家者判刑部填從吉言目今遇有赦文頒下請差三司館閣官告院吏筆札精熟者書寫每本著其姓名集審刑詳議大理詳斷官校讀錯誤者罪之仍請令中使監莅詔可國家三年一修郊禮必有肆赦冦萊公嘗議模印以頒四方為衆所沮而止其後外郡覆奏赦書字誤沂公始舉冦相之議令刑部鎻宿雕字人模印頒行因之日官乞每年頒歴日亦雕板印行舊每歲募書寫人所費三百千每模印則三十千仍有沮議曰一本誤則千百本誤沂公語之曰不令一字有誤可矣自爾遵行不改此據王皥百一編當附王曽當國時辛酉太常寺請自今四時遣太祝奉禮郎二員徧廵行四郊諸壇齋宮有隳損則報寺整葺判寺官春秋躬視從之壬戌遣太子中允張績乘𫝊詣解州鹽池致祭時轉運司言夏秋霖雨有妨種鹽故老相傳唐朝每遇水災必遣使告祭乃不為害故上特親署祝文徃禱張績未見九月甲午注可考癸亥權三司使丁謂等上三司新編敇十五巻詔雕印頒行之有賀蘭棲真者不知何許人為道士自言百餘歲善服氣不憚寒暑徃徃不食或時縱酒遊市鄽間能啖腐肉至數斤始至嵩山紫虚觀後徙濟源奉仙觀張齊賢與之善於是上遣中使齎詔召赴闕及至作二韻詩賜之號宗元大師賚以紫服白金茶帛香藥蠲觀之田租度其侍者未幾求還舊居後五年卒時大雪經三日頂猶熱人多異之丙寅詔許河中府民齎鐵器過河於近郡貨鬻其縁邊仍舊禁斷以西京左藏庫使奬州刺史趙延信為滁州刺史延信有舊於宣祖歴事三朝以勤幹稱時出知和州占謝之際特有是拜延信未見丁夘令資政殿學士王欽若知制誥楊億修歴代君臣事迹欽若請以直秘閣錢惟演等十人同編修初令惟演等各撰篇目送欽若暨億參詳欽若等又自撰集上進詔用欽若等所撰為定有未盡者奉㫖増之又令宫苑使勝州刺史勾當皇城司劉承珪内侍髙品監三館秘閣圖書劉崇超典掌其事編修官非内殿起居當赴常㕘者免之非帶職不當給實俸者特給之其供帳飲饌皆異於常等始孟氏據蜀徙䕫州於東山以拒王師而居民弗便轉運使薛顔奏為復其故城又募民墾施黔等州荒田戊辰顔奏今歲獲粟萬餘石己巳以戸部判官李含章監朗州酒稅含章徇公潔已而臨事褊執羣吏以簿書稽滯為訟推劾得實羣吏决杖而含章亦贖金仍釐務焉辛未遣中使齎詔撫問种放於嵩山上閲開封府囚帳日繫二百餘人憫其苛留命給事中董儼直昭文館韓國華與知府張雍慮問情輕者即决之事須證佐者促成之壬申詔荆湖溪洞民為蠻人所掠而歸者勿限年月給還舊産癸酉羣臣三上表請加尊號曰崇文廣武應乾尊道聖明仁孝不允詔吏部銓常選人有疾者已經引對即依合入資叙注擬未引對者留合入員闕竢痊損施行徙刑部侍郎知天雄軍府趙昌言知鎮州洺州團練使知鎮州上官正改知潞州正累表納禄弗許又懇求小郡讓公費上念其勞舊皆不允於是授以近藩焉乙亥詔廣南西路州軍有縱火焚人廬舍情理兇蠧者依法决訖刺配五百里外牢城從太子中允盧幹之請也盧幹未見十月丙子朔屯田員外郎權判三司勾院杜夢證侍禁閤門祗候康宗元接伴契丹賀承天節使仍回日充送伴事已見五月末此或可前己夘詔縁河官吏雖秩滿須水落受代知州通判每月一廵堤縣令佐官迭廵轉運使勿委以他職又申嚴盗伐河上榆栁之禁本志並著此事於咸平三年葢誤也今從實録但無知通廵堤及申禁伐木二事今從本志并書之先是詔權三司使丁謂取戸税條目及臣民所陳農田利害編為書謂乃與户部副使崔端鹽鐡判官張若谷度支判官崔曙樂黄目户部判官王曽㕘議刪定成景德農田敕五巻庚辰上之令雕印頒行民間咸以為便行農田敕民間使之據稽古録當考其詳崔曙未見先是潭州攸縣令扈維翰坐弛慢轉運使劾奏衝替至是用元日赦書例獲引對有司言當復為令録上親閲課狀覩其昏耄乃授鄧州長史乙酉吏部侍郎平章事畢士安早朝至崇政殿廬疾暴作上聞之亟遣使撫問還奏疾甚上即步出臨視已不能言詔太醫診脉内侍竇神寳以肩輿送歸第而卒車駕即臨哭謂冦準等曰士安善人也事朕於南府東宫以至輔相飭躬畏謹有古人之風遽此淪没深可悼惜詔贈太傅中書令諡文簡録其子孫中使䕶䘮事給鹵簿葬丙戌遣度支判官太常博士周漸為契丹國主生辰使侍禁閤門祗候郭盛副之職方郎中直昭文館韓國華為契丹國母正旦使衣庫副使兼通事舍人焦守節副之尹洙誌國華墓云上令周漸張若谷凡事當問國華恐飾説今不取鹽鐵判官秘書丞張若谷為國主正旦使内殿崇班閤門祗候郭允恭副之自是歲以為常漸寔兄允恭從孫也凡契丹主生日朝廷所遺金酒食茶器三十七件衣五襲金玉帶二條烏皮白皮鞾二量紅牙笙笛觱栗拍板鞍勒馬二匹纓複鞭副之金花銀器三十件銀器三十件錦綺透背雜色羅紗綾縠絹二千匹雜綵二千匹法酒三十壺的乳茶十斤岳麓茶五斤鹽蜜果三十罐花果三十籠其母生日約此數焉正旦則遺以金花銀器各二十件雜色羅紗綾縠絹二千匹雜綵二千匹詔京東水災罷州縣不急之務駙馬都尉石保吉不時請對言僕人張居簡掌私財有所侵盗願賜重責上曰自有常典豈可以卿故法外加刑保吉又請於私第决罰亦不許保吉好治生射利尤吝嗇居常命僕人買針縷脂澤櫛沐猥細雜物置肆第中家人有所須則令就市之冀緡錢不出於外其鄙近如此戊子詔東京畿内和買芻藁比市價已令優給宜更増之詔嶽瀆廟宇自今所屬知州通判每季一徃案行有隳損者即時修葺庚寅以宫􅁐使劉承珪龍圖閣待制戚綸都大提舉諸司庫務時議者言輦下庫務其數踰百三十出納或致因循三司簿領繁多不能案視故特置此職掌舉察京城儲蓄受給監生能否及覆驗所受三司計度移用之事焉知審刑院查道權判大理寺尹玘權大理少卿傅珏審刑院詳議官梁象等四人贖金有差大理寺詳斷官仇象先等六人並削官一任坐議獄不當為外郡覆奏抵罪也𫝊珏梁象仇象先未見詔承天節羣臣所奏僧道紫衣師號自今具行業保任以聞時所薦多濫故也癸巳詔中外羣臣郊禋及承天節非親的族屬不得奏薦䖍州雜料場茶園率民採摘頗煩擾詔罷之甲午使臣自雄州入奏言𣙜場商旅貿易於北境契丹國主弟曰隆慶者受其饋獻必還其直又設酒饌犒勞之且言今與中朝結好事同一家道路永無虞矣上諭輔臣曰蕃戎之情兹亦可見然更宜慎擇疆吏謹守詔條也王旦曰孫僅嘗言國主氣濁而體肥隆慶瘦而剛果國人多歸之隆慶見本朝歲有贈遺屢勸行賞國中其志欲激動衆心也丙申詔自今盗賊黥面配牢城者並於千里之外從大理評事林陶所請也丁酉以故唐龍鎮將來懷順子閏喜補三班奉職來遵子守信補借職仍詔俟閏喜年長即令代父任且命其叔父懷正權主鎮事先是詔南郊壇行事官勿用老疾幼弱者秘書省正字晏殊上章願觀大禮上憐其意許之因詔京官年未及十五願赴南郊陪位者聽十一月乙巳朔鹵簿使王欽若奉神位板對于便殿壇上四位塗以朱漆金字自餘皆黒漆第一等金字第二等黄字第三等以降朱字悉貯以漆柙覆以黄縑帊上降堦觀之即付有司仍戒各謹其事禮儀使趙安仁上新定壇圖且言舊圖五帝五嶽中鎮河漢並在第三等檢詳儀注合在第二等望悉刋正奏可詔從祀行事官賜胙大禮使至太常寺卿十六段用羊犢使相至知雜御史五十二段用羊豕王欽若上鹵簿記三巻詔付史舘丙午河陽節度使王顯來朝請許趙德明稱藩不須納質但加錫以綏懷之又請通青鹽以濟邊民之用顯此議恐不因來朝時姑附于此更考之詔河北州軍百姓糶穀入官所給價錢出城門者勿禁戊申命翰林侍讀學士邢昺戸部侍郎張雍龍圖閣待制杜鎬諸王府侍講孫奭於京朝幕府州縣官中薦儒術該博士行端良堪充學官者十人以聞翰林學士李宗諤東上閤門使忠州刺史曹利用在京接伴契丹賀承天節使辛亥詔光禄寺自今宗廟大饗朔朢薦獻並令供御庖人造食務極精潔丙辰饗太廟丁巳合祭天地于圜丘大赦上自散齋即進蔬茹禮畢御樓始飲酒焉辛酉詔郊祀事有闕誤不恭者無得以赦原罪癸亥兵部侍郎平章事冦準加中書侍郎兼工部尚書楚王元佐加檢校太師右衛上將軍彭城郡王元偓為静難彰化節度使進封寧王安定郡王元偁為宣德保寧節度使進封舒王曹國公元儼進封廣陵郡王武信節度使安定郡王惟吉加同平章事樞宻使檢校太保王繼英加檢校太傅兵部侍郎參知政事王旦為尚書左丞工部侍郎參知政事馮拯簽書樞宻院事陳堯叟並為刑部侍郎自餘羣臣各以序進秩或加階勲爵邑有差乙丑命羣牧判官著作佐郎王曙假開封府推官吏部郎中俟契丹使至日持知府張雍書禮迎勞于郊是歲江浙大穰穀價尤賤舳艫銜尾入湊京都㑹汴水乾淺故輦下糧斛湧貴丙寅令減價糶官米以濟民戊辰以内殿崇班閤門祗候錢昭晟為崇儀副使是春昭晟計畫減修黄河工料歲終無餘故賞之己巳命屯田員外郎判三司勾院杜夢證假檢校秘書少監開府少尹餞契丹使於上德橋自後皆以府判官假少尹為餞送推官假判官郎中為接迓不復命他官五月末所書總例可考庚午河東轉運使鮑中和上言嵐州合河津嵗收渡錢二百八十餘貫自廢濁輪寨商旅止由保德沙谷大堡等津請依合河渡收課詔合河沙谷大堡等津並勿收渡錢癸酉契丹國母遣使左金吾衛上將軍耶律留寧副使崇祿卿劉經國主遣使左武衛上將軍耶律烏延副使衛尉卿張肅來賀承天節對於崇德殿留寧等將見館伴使李宗諤引令式不許佩刀至上閤門留寧等欣然解之上聞之曰戎人佩刀是其常禮不須禁以令式即傳詔聽自便留寧等感悦謂宗諤曰聖人推心置人腹中是以示信遐邇也又舊制舍利從人惟上等入見自餘拜於殿門之外上悉許令入見節日上壽班在諸王將軍之下大將軍之上十二月乙亥朔命知雜御史王濟與三司催欠司除放逋負丙子承天節羣臣上壽於崇德殿舊制中書門下樞宻院文武百僚内職既上壽詣大相國寺行香設㑹於資聖閣至是樞宻使而下前一日罷道場赴㑹是日樞宻與學士三司使副復集遂以為常己夘召輔臣於龍圖閣觀契丹禮物及祖宗朝所獻者自後使至必以綺帛分賜中書樞宻院果實脯腊賜近臣三館凡承天節獻刻絲花羅御様透背御衣七襲或五襲七件紫青貂䑕飜披或銀䑕鵝項鴨頭納子塗金銀裝箱金龍水晶帶銀柙副之錦縁皂皺皮鞾金玦束皂白熟皮鞾鞵細錦透背清平内製様合線縷機綾共三百匹塗金銀龍鳳鞍勒紅羅押金線繡方韉二具白楮皮黒銀鞍勒氈韉二具綠褐楮皮鞍勒海豹皮韉二具白楮皮裏筋鞭二條紅羅金銀線繡雲龍紅錦器仗一副黄樺皮纏楮皮弓一紅錦袋皂鵰翎羱角骲頭箭十青黄鵰翎箭十八法漬法麴麵麴酒二十壺蜜曬山果十梀櫺椀蜜漬山果十梀櫺帕克哩山梨柿四梀櫺榛栗松子郁李黒郁李子麵􅀥楞梨棠梨二十箱麵秔麋梨粆十椀蕪萸白鹽十椀青鹽十箱牛羊野豬魚鹿腊二十二箱御馬六疋散馬二百疋其正旦御衣三襲鞍勒馬二疋散馬一百疋其母又致御衣綴珠貂裘細錦刻絲透背合線御綾羅綺紗縠御様果實雜粆腊肉凡百品水晶鞍勒新羅酒青白鹽國主或致戎器鑌鐵刀鷙禽曰海東青之類承天節又遣庖人持本國異味前一日就禁中造食以進御云禮部貢院言昨詳進士所納公巻多假借他人文字或用舊巻裝飾重行或為傭書人易換文本是致考校無準請自今並令舉人親自投納仍於試紙前親書家狀如將來程試與公巻全異及所試文字與家狀書體不同並駮放之或假用他人文字辯認彰露即依例扶出永不得赴舉其知舉官亦望先一月差入貢院考較公巻分為等第如事業殊異者至日更精加試驗所冀抱藝者不失搜羅躁進者難施偽濫又言尚書周易學究近年并為一科欲請試本經日每十道義二經各問五道仍雜問疏義五道經注五道以為定式向來明法止試六場今請依尚書例試七場第一場第二場試律第三場試令第四場第五場試小經第六場試令第七場試律仍於試律日雜問疏義五道三禮三傳經業稍大難為精熟請每十道義中問經注六道疏義四道以六通及疏通二經注通三為合格詔翰林學士邢昺與國子監官同議可否昺等言尚書周易學究明法經籍不多望各問疏義六道經注四道六通者為合格其三禮三傳請如貢院所奏並從之貢院十二月己夘所言頗與八月丙子相重本志既兩載之今亦從本志辛巳以刑部侍郎資政殿學士王欽若為兵部侍郎資政殿大學士班在文明殿學士之下翰林學士承㫖之上上初見欽若班在翰林學士李宗諤下怪之以問左右左右以故事對欽若因訴上曰臣前自翰林學士為參知政事無罪而罷其班乃下故官一等是貶也上悟即日改焉資政殿置大學士自此始欽若善迎人主意上望見輙喜每拜一官中謝日輙問曰除此官且可意否其寵遇如此欽若以四月癸夘除資政殿學士後兩日即有詔序位在翰林學士之下及今始升改焉或云欽若既除資政自訴恐誤葢因上顧問乃進説耳癸未殿前都指揮使彰信節度使高瓊為忠武節度使馬軍都指揮使感德節度使葛霸為昭德節度使並解軍職老疾故也先是霸權步軍司事㑹在疾告令瓊兼領二司瓊從容言曰臣衰老儻又有犬馬之疾則是一將總此三職臣事先朝時侍衛都虞候以上常至十員職位相亞易於遷改且使軍伍熟其名望邊藩緩急亦可選用上甚然之嘗料簡兵卒諸班直十年者出補軍校年耆者退為本班剩員瓊曰此非激勸之道宿衛豈不勞乎自是八年者皆得叙補焉上聞有司給諸班糧米麤惡不與原様同諭權殿前都虞候劉謙令各赴倉換之諸班指揮使皆言米雖陳次然已多費用願不復换乃詔諸班各特賜米一斛倉司官吏抵罪有差謙前以馬軍都虞候潯州防禦使權令殿前都虞候既逾年意望即真而樞宻都承旨亳州團練使曹璨自鎮定高陽三路行營都鈐轄就拜殿前都虞候康州防禦使謙慨嘆形於顔色至是擢謙為殿前副都指揮使徙璨為馬軍副都指揮使謙領振武節度璨領天德節度焉先是南作坊使昭州團練使同勾當皇城司張耆坐與趙諫交遊受其金為人求薦於禮部責授供備庫使潞州兵馬都監耆請置對不許居三月事辨復歸故官上以耆前任并代鈐轄累上邊事一日召至宣和門閤中問太原險固耆既陳山川形勝因言雲應蔚朔四郡間遣人持文移至代州非覘邊虚實即欲習知道里宜盡窒諸間道獨留土石谷土墱路以示設險上然之於是擢拜馬軍都虞候英州防禦使詔武衛大將軍富州刺史李琪特與假養疾仍舊給月俸琪年八十餘去歲以老疾不任朝謁表乞五日一赴内殿起居詔可之俄為御史所劾令奉朝參至是再表請如前詔上憫而許焉乙酉河東轉運使鮑中和上奏河北河東陜西路供給邊備其知州通判幕職州縣官望令審官院吏部銓選年六十以下彊幹者充從之丙戌詔三班使臣知縣者給縣令俸其兼兵馬監押者本官俸外添給如例壬辰詔西北縁邊長吏不得舉官為通判幕職廵檢從河北轉運使劉綜之請也免辰州沅陵縣民歲輸楠木甲午右諫議大夫种放自嵩山來朝對於龍圖閣乙未命虞部員外郎權鹽鐵判官馮亮太常丞直史館陳堯佐内殿崇班閤門祗候高繼忠侍其振分詣開封府界提㸃刑獄錢帛繼忠瓊之子也嘗因對言開封府司録王簡遣人畿縣督事因縁乞取未審何人論薦得為京秩上笑曰簡無人論薦朕以其嘗鞠盛梁獄故有此授繼忠曰臣不識此人亦非受人意㫖但衆言貪黷尤甚上曰臣下如此言事甚嘉逾月簡罷實錄記此事但云景德中按㑹要則景德四年十二月始増置府界提㸃一人以武臣充疑繼忠因對言事即此提㸃刑獄錢帛時也今附見須考或是三年三月末事更詳之丁酉詔節度使葛霸為并州駐泊都部署時廷臣有𨽻麾下者頗擾軍民霸昏耄不能察上知之亟召還令霸勿復奏隨除海州朐山東海等縣民所逋去年賑貸及倚閣東苗鹽米京畿父老百三十人對於長春殿賜帛有差先與羣臣同上徽號雖不允其請特有是賜己亥荆湖北路轉運使言溪洞團練使彭文綰部送澧朗等州先陷漢口五十人來歸請加恩命賜牌印及許其歲貢方物詔授文綰檢校官知忠彭州事餘從其請庚子契丹遣使保静軍節度使耶律乾寧左衛大將軍耶律昌主副使宗正卿高正右金吾衛將軍韓橁奉書禮來賀來年正旦初有司將以南郊儀仗給鄆王出殯王欽若陳其不可癸夘欽若又言夫名與器不可假人位既不同禮亦異數故太牢以祭匹士為攘繁纓以朝聖人所惜况法駕鹵簿本奉至尊郊祀廟享俱為大事安可以羣臣凶禮參用吉儀既黷尊卑實違典法請令有司依唐六典令式别置王公以下車輅及皷吹儀仗以備拜官職朝㑹婚葬之用詔從其請是月趙德明又遣其教練使郝貴來貢此據㑹要國史實錄皆無之詔江淮荆湖南北路轉運司逐年所運上供糧儲自今如有出剩即與批書轉運使副厯子叙為勞績
