body:
  text: 續資治通鑑長編巻二十宋李燾撰太宗太平興國四年春正月丁亥以右補闕石熈載為兵部員外郎樞密直學士命太子中允直舍人院張洎著作佐郎直史館華陽勾中正使髙麗上初即位謂齊王廷美曰太原我必取之及議致討召樞密使曹彬問曰周世宗及我太祖皆親征太原以當時兵力而不能克何也豈城壁堅完不可近乎彬對曰世宗時史超敗於石嶺闗人情震恐故師還太祖頓兵甘草地中軍人多被腹疾因是中止非城壘不可近也上曰我今舉兵卿以為何如彬曰國家兵甲精銳人心忻戴若行弔伐如摧枯拉朽耳何有不可哉上意遂決宰相薛居正等曰昔世宗起兵太原倚北敵之援堅壁不戰以至師老而歸及太祖破敵於鴈門闗盡驅其人民分布河洛之間雖巢穴尚存而危困巳甚得之不足以闢土舍之不足以為患願陛下熟慮之上曰今者事同而勢異彼弱而我彊昔先帝破此敵徙其人而空其地者正為今日事也朕計決矣卿等勿復言乃先遣常参官分督諸州軍儲赴太原庚寅以宣徽南院使潘美為北路都招討制置使河陽節度使崔彦進攻其城東面彰徳節度使李漢瓊城南面桂州觀察使曹翰城西面彰信節度使劉遇城北面遇以次當攻其西面而西面直北漢主宫城尤險惡翰欲與遇易地自言我觀察使班宜在節度使下遇弗可翰必欲易之議久不決上慮將帥不協乃諭翰曰卿智勇無雙城西面非卿不能當也翰始奉詔八作使郝守濬充西面壕寨都監馬軍都虞候米信步軍都虞候田重進充行營馬步軍都指揮使西上閤門使郭守文判四方館事順州團練使梁逈監其軍信奚人重進幽州人也詔發邢貝洺澤等州軍儲赴太原著作佐郎張潤之掌其出納辛卯命雲州觀察使郭進為太原石嶺闗都部署西上閤門使田仁朗閤門祗候供奉官劉緒按行太原城四面壕寨閲視攻城梯衝器用癸巳以樞密直學士石熈載簽署院事仍賜宅一區簽署樞密院事自熈載始乙未宴潘美等於長春殿上親授方畧以遣之時劉鋹及淮海王俶武寧節度使陳洪進等皆與鋹因言朝廷威靈及逺四方僣竊之主今日盡在坐中旦夕平太原劉繼元又至臣率先來朝願得執梃為諸國降王長上大笑賞賜甚厚鋹詼諧類此丁酉命河北轉運使侯陟與陜西北路轉運使雷徳驤分掌太原東西路轉運事壬寅詔發齊汝蔡等州軍糧赴太原癸卯新渾儀成司天監學生巴中張思訓所創也置文明殿東南之鐘鼓樓以思訓為渾儀丞舊制日月晝夜行度皆人所運轉新創成於自然尤為精妙詔發曹單滑濰濱淄青鄆同耀華等州京兆河南大名府軍儲赴太原己酉命左屯衛大將軍張鐸為京城内外都廵檢車駕將北征也詔以同判刑部司門員外郎江直木大理正路承緒讞獄之勤賜錢各二十萬二月辛亥詔以此月内暫幸鎭州甲寅以皇子徳恭為貴州防禦使齊王廷美之長子也祠部郎中劉保勲為行在轉運使右補闕髙繼申副之起居舍人張去華專掌行在左藏庫繼申尋改留守判官丙辰命辛相沈倫為東京留守兼判開封府事宣徽北院使王仁贍為大内都部署樞密承㫖陳從信副之上欲以齊王廷美掌留務開封府判官吕端言於廷美曰主上櫛風沐雨以申弔伐王地處親賢當表率扈從若掌留務非所宜也廷美由是請行癸亥賜扈從近臣鞍馬衣服金玉帶有差甲子車駕發京師戊辰次澶州方渡河有持手版衣緑邀車駕者前驅斥之不退號呼道旁自言獻封事上令取視乃臨河主簿宋㨗上甚喜即以為將作監丞甕牖閒評云宋捷之事眞所謂以姓名而盗爵禄者也然載之談苑乃云太平興國中北敵侵邉太宗遂幸大名府方渡河有人持手版衣緑邀乗輿前驅斥之號呼道旁自言獻封事太宗令接取視之乃臨河主簿宋㨗太宗甚喜即以為將作監丞載之事實又云太宗征太原行次澶淵有太僕寺丞宋㨗者掌出納行在軍儲迎謁道左太宗見其姓名喜曰我師有必㨗之兆而劉繼元果降此二書所載各不同未知其孰是也己巳次徳清軍命行在轉運使劉保勲兼勾當北面轉運使事遣均州刺史臨洺解暉尚食使折彦贇攻隆州解暉傳作石彦贇按折彦贇十一月庚辰復見暉傳誤也三月一日又命尹勲攻隆州庚午次大名府壬申次洺州癸酉郭進自石嶺闗來朝于中路頓甲戍次邢州以唐州團練使曹光實知威勝軍事令調軍食光實入告願提一旅之衆奮銳先登上曰資糧事大亦足宣力也丙子以潞州都監陳欽祚知威勝軍實録於丙子書命威勝軍使米文睿赴太原𨽻曹翰麾下以潞州兵馬都監陳欽祚知威勝軍而曹光實本傳乃云車駕征河東以光實知威勝軍與實録不同然米文睿陳欽祚二人皆無可載因取光實事附見于此或因光實辭遂改命欽祚也當考契丹遣使尚書耶律伊埒摩哩奉書問起居丁丑見于臨城縣三月庚辰朔駐蹕于鎭州命郢州刺史尹勲攻隆州隆非古州北漢人依險築城以拒王師故先分兵圍之二月己巳先命解暉折彦贇攻隆州辛巳命鎭州馬步都監客省副使齊延琛洛苑副使侯美分兵攻孟縣癸未石嶺闗言陽曲寨民三百三十八口歸附引進使汾州防禦使田欽祚䕶石嶺闗屯軍與都部署郭進不協賊兵奄至欽祚閉壁自守既去又不追月俸所入芻粟多蓄之以竢善價而規其利為部下所訴詔鞫之欽祚具伏責授睦州團練使仍䕶軍丁亥分命太子中允扈華等十二人發安復唐鄧商坊徐宿兖海密蔡等州軍儲赴太原華未見郭進言破北漢西龍門寨擒獲千餘計獻俘行在戊子命六宅使侯繼隆攻沁州閤門祗候王僎攻汾州僎侁弟也侯繼隆未見壬辰復命淄州刺史太原王貴攻沁州是日宴從官及諸軍校遣劉保勲赴太原閲視轉運事乙未命知府州閑廐使折御卿監軍供奉官晉陽尹憲分兵攻嵐州郭進言契丹數萬騎入侵大破之石嶺闗南於是北漢援絶北漢主復遣使間道齎蠟書走契丹告急進捕得之徇於城下城中氣始奪矣丙申左飛龍使史業破北漢鷹揚軍斬獲甚多以俘百人來獻丁酉詔以太原軍前所送降卒五人𨽻歸明軍人賜錢三千庚子命通事舍人王侁軍器庫使劉文裕帥師分守石嶺闗癸卯河東城西面轉運使劉保勲為陜西北路轉運使代雷徳驤也徳驤調發沁州軍儲後期詔劾徳驤命保勲兼領之乙巳定難留後李繼筠言遣所部銀州刺史李光逺綏州刺史李光憲帥蕃漢兵卒縁黄河列寨渡河畧敵境以張軍勢詔泉州發兵䕶送陳洪進親屬赴闕所過州縣續食丙午命左補闕樂冲馳𫝊督諸州供軍芻粟北漢人潜師犯我軍鋒馬軍都指揮使米信擊敗之殺其控鶴指揮使裴正以首級來獻裴正事本紀實録無之今載于三月末上未至城下以前當更考之夏四月己酉朔折御卿等言攻嵐州破北漢千餘衆詔發河南鄆濟博棣澤潞懐汝同華虢等州軍儲赴太原庚戍齊延琛等言孟縣降詔發河中晉絳慈隰解齊徳曹單淄衞等州軍儲赴太原乙卯折御卿等破岢嵐軍殺戮甚衆禽軍使折令圖以獻庚申以樞密直學士簽署院事兵部員外郎石熈載為給事中樞密副使考功郎中范旻上書願從征太原召為右諫議大夫三司副使判行在三司事壬戌車駕發鎭州幸太原命定武節度使孟元喆為鎭州駐泊兵馬都鈐轄癸亥次天威軍作早行詩令從臣和甲子解暉等攻隆州西頭供奉官袁繼忠武騎軍校許均先登陷之均中八創殺三百餘衆禽招討使李珣等六人以獻繼忠前䕶隰州白壁闗屯兵前後入北漢境破三寨禽偽將校二人得鎧甲鞍馬牛羊生口數萬計近戍聞之懼無功受譴乃以誠告繼忠悉分虜獲使列奏焉繼忠太原人均開封人也丙寅次側口頓作聞㨗奏平隆州詩沂州防禦使張萬友決軍校郭贇致死鞫之具伏上方寵任武將戊辰詔釋其罪是日折御卿破嵐州殺憲州刺史霍翊按宋史本紀作郭翊禽䕫州節度使馬延忠等七人以獻庚午上至太原駐蹕于汾水之東辛未幸城四面按視營壘攻具慰勞諸將以手詔諭北漢主繼元傳詔至城下守陴者不敢受壬申夜漏未盡上幸城西督諸將攻城天武軍校荆嗣率衆先登手刃數賊足貫雙箭中手礮碎齒二上見之亟召下賜以錦袍銀帯嗣罕儒兄孫也先是上選諸軍勇士數百人教以劍舞皆能擲劍於空中躍其身左右承之見者無不恐懼㑹契丹遣使脩貢賜宴便殿因出劍士示之數百人袒裼鼓譟揮刃而入跳擲承接曲盡其妙契丹使者不敢正視及是廵城必令舞劍士前導各呈其技北漢人乘城望之破膽上每躬擐甲胄䝉犯矢石指揮戎旅左右有諫者上曰將士爭効命於鋒鏑之下朕豈忍坐觀諸軍聞之人百其勇皆冒死先登凡控弦之士數十萬列陣於乘輿前蹲甲交射矢集太原城上如蝟毛焉每詔給諸軍箭數百萬必頃刻而盡捕得生口云北漢主城中市所射之箭以十錢易一隻凡得百餘萬隻聚而貯之上笑曰此箭為我蓄也及城降盡得之田欽祚在石嶺闗恣為姦利諸不法事郭進不能禁止屢形於言欽祚憾之進武人剛烈戰功高欽祚數加陵侮進不能堪癸酉遂縊而死欽祚以卒中風眩聞上悼惜良久優詔贈安國節度使左右皆知而無敢言者命冀州刺史牛思進為石嶺闗部署思進無極人也有膂力常以强弓弦於耳引手極前張之令滿又負壁立二力士撮其乳曵之不動軍中咸異焉甲戌幸諸寨乙亥幸連城視攻城諸洞時李漢瓊率衆先登矢集其腦又中指傷甚猶力疾上促召至幄殿視其創傅以良藥上欲親幸洞屋中勞士卒漢瓊泣曰晉陽孤壘危若累卵諸將用命戰士賈勇矢石注洞屋如雨陛下奈何以萬乘之尊親徃臨之若不聼臣請先死上乃止丁丑幸西連城樓五月己卯朔幸城西南隅夜督諸將急攻遲明陷羊馬城北漢宣徽使范超來降攻城者疑超出戰禽之以獻斬於纛下既而北漢主盡殺超妻子梟其首投於城外辛巳幸城西北隅北漢馬步軍都指揮使郭萬超來降萬超來降實録在壬午今從本紀壬午幸城南上謂諸將曰翊日重午當食於城中遂自草詔賜北漢主夜漏上一刻城上有蒼白雲如人狀九國志云太宗駕至城下築連堤壅汾河灌城五月四日城東而隅壊水入注夾城中繼元大恐自督衆負土塞之然實録正史畧不載灌城事當考癸未幸城南督諸將急攻士奮怒爭乘城不可遏上恐屠其城因麾衆少退城中人猶欲固守左僕射致仕馬峯以病卧家舁入見北漢主流涕以興亡諭之北漢主乃降夜漏下十刻遣客省使李勲上表納欵上喜即命通事舍人入城撫諭夜漏未盡幸城北宴從臣於城臺受其降甲申遲明劉繼元率其官屬素服紗帽待罪臺下詔釋之召升臺勞問繼元叩頭曰臣自聞車駕親臨即欲束身歸命致陛下鑾輿暴露尚敢以孤壘拒戰盖亡命卒懼死劫臣不得降耳上令籍亡命者至悉斬之顧謂淮海國王錢俶曰卿能保全一方以歸於我不致血刃深可喜也北漢平凡得州十軍一縣四十一户三萬五千二百二十兵三萬國史云亡命卒數百人選其巨害者斬之餘悉分𨽻諸軍與九國志及實録皆不同今不取郭守文傳又云劉繼元弟繼文據代州依契丹以拒命守文討平之按九國志則繼文前死矣此盖守文墓誌所載國史因之今亦不取命劉保勲知太原府乙酉赦河東管内常赦所不原者並釋之諸州縣偽署職官等並令仍舊人户兩税特與給復二年王師所不及處給復一年從前所逋租調並與除放常賦外有無名配率諸州條析以聞分命常参官八人知忻代等州右賛善大夫臧丙知遼州祕書丞馬汝士知石州其後汝士與監軍不協一夕剚刃於腹而死丙上䟽言汝士之死非自殺願按其狀上覽奏驚駭遽遣使鞫之召丙赴闕問狀丙曰汝士在牧守之任不聞有大罪何至自殺若寃死不明宿直者又不加譴責則自今書生不復能治邉郡矣上善其言丙大名人汝士同年生也丙戍遣使祭戰没將士等録其子孫丁亥詔館劉繼元於行在所優其廪給命儀鸞使康仁寶監視之戊子命著作佐郎直史館石熈古還京師以平晉告宗廟熈古熈載弟也毁太原舊城改為平晉縣以榆次縣為并州徙僧道士及民高貲者於西京七年二月又徙陽曲劉繼元所署節度使蔚進盧遂以汾州來降己丑以劉繼元為右衛上將軍彭城郡公繼元所署司空平章事李惲為殿中監左僕射致仕馬峯為少府監馬軍都指揮使郭萬超為磁州團練使客省使李勲為右衛將軍餘悉授官有差上作平晉賦令從臣皆賦又作平晉詩二章令從臣和辛卯宴劉繼元及其官屬繼元獻其宫人百餘人上以分賜立功將校乙未遣康仁寳䕶送繼元親屬赴闕所過續食丙申幸太原城北御沙河門樓遣使分部徙居民於新并州盡焚其廬舍民老㓜趨城門不及焚死者甚衆丁酉廢隆州毁其城遣使按行諸州銀冶庚子車駕發太原詔以行宫為佛寺號平晉上自記之刻石寺中辛丑次新并州丁未次鎭州初攻圍太原累月饋餉且盡軍士罷乏㑹劉繼元降人人有希賞意而上將遂伐契丹取幽薊諸將皆不願行然無敢言者殿前都虞候崔翰獨奏曰此一事不容再舉乘此破竹之勢取之甚易時不可失也上悦即命樞密使曹彬議調發屯兵時車載簿籍阻留在道兵房吏張質潜計數部分軍馬及得簿籍校之悉無差繆質高唐人也王得臣麈史云富鄭公嘗為予言永熈討河東劉氏既下并州欲領師乘勝復收薊門始咨於衆参知政事趙昌言對曰自此取幽州猶熱􅆈飜餅耳殿前都指揮使呼延賛爭曰書生之言不足盡信此餅難飜水熈竞趨幽薊捲甲而還卒如賛言鄭公再三歎謂予曰武臣中盖亦有人矣按趙昌言参政在雍熈四年距此凡九年得臣誤甚又按太平興國四年薛居正沈倫盧多遜為宰相無参知政事曹彬石熈載則為樞密此言参政亦誤或呼延賛實有此言亦不可知然呼延賛此時但為鐡騎指揮使白進超實為殿帥崔翰為殿候所云殿前都指揮使得臣又誤也姑存此竢考六月甲寅遣使發京東河北諸州軍儲赴北面行營庚申車駕北征發鎭州扈從六軍有不即時至者上怒欲置于法馬步軍都軍頭趙延溥遽進曰陛下廵行邉陲本以外敵為患今敵未殄滅而誅譴將士若舉後圖誰為陛下戮力乎上嘉納之延溥晁之子也辛酉次定州遣使告祀北嶽上作悲陷蕃民詩令從臣和丙寅次金臺頓契丹據有之地也募其民能為鄉導者百人人賜錢二千遣東西班指揮使浚儀孔守正等先趣岐溝關守正夜踰短垣過鹿角臨斷橋説闗使劉禹以大軍且至宜開門出降禹解懸橋邀守正入聽命守正慰撫軍民還詣行在所丁卯上躬擐甲胄率兵次岐溝闗契丹東易州刺史劉禹以州降留兵千人守之東易州即岐溝闗也按孔守正傳先入岐溝闗説闗吏劉禹以城降不稱東易州實録本紀並稱東易州不云岐溝闗其實一也六月乙亥以八作副使綦延朗知東易州而守正傳云詔綦延朗守闗城召守正赴行在盖契丹名岐溝闗曰東易州耳劉禹或作劉宇今從守正傳然守正既入岐溝闗即還報明日又與傅潜同趣涿州本傳乃云詔綦延朗守闗城後守正始赴行在所盖誤也延朗守闗城實六月二十八日上距守正趨涿州凡九日豈守正既破涿州復來守闗城至二十八日延朗始代之乎然傳所載亦顛倒失序矣今不取東西班指揮使衡水傅潜與孔守正先至涿州擊契丹敗之生擒五百餘人戊辰上次涿州判官劉原徳以城降命供奉官張懐訓領其兵己巳次鹽溝頓民有得契丹之馬來獻賜以束帛庚午遲明次幽州城南駐蹕於寳光寺契丹萬餘衆屯城北上親率兵乘之斬首千餘級餘黨遁去契丹傳及㑹要云契丹聞王師至皆不敢居城中若不敢居城中又何竢攻圍也今止従實録本紀渤海酋帥達蘭罕率小校李勲等十六人部族三百騎與范陽軍民二百餘人皆來降召見賜錢帛以達蘭罕為渤海都指揮使壬申部分諸將攻城定國節度使宋偓南面河陽節度使崔彦進北面彰信節度使劉遇東面定武節度使孟𤣥喆西面命宣徽南院使潘美知幽州行府事契丹迪里都指揮使李扎勒燦以部下兵百二十五人來降詔索礮具八百期以半月成右龍武將軍頓丘趙延進督工造之八日而畢上親按試甚悅癸酉移幸城北督諸將攻城幽州神武㕔直并鄉兵四百餘來降村民奪得契丹馬三百餘匹來獻甲戍命殿中丞楊恭知涿州以劉原徳為右賛善大夫通判州事幽州山後八軍瓷窑務官三人以所受契丹牌印來獻乙亥命八作副使祁延朗知東易州祁或作綦薊縣民百餘人以牛酒迎犒王師各賜衣服錢帛遣使隨村墅安撫居民丁丑上乘步輦至城下督諸將攻城幽州諸縣令佐及鄉民百五十人來降秋七月庚辰契丹建雄節度使順州劉延素與官屬十四人來降辛巳上復至城下督諸將攻城壬午契丹知薊州劉守恩與官屬十七人來降癸未幸城西北隅督諸將攻城初命諸將攻城桂州觀察使曹翰與洮州觀察使米信率兵屯城之東南隅以備非常軍士掘土得蟹以獻翰謂諸將曰蟹水物而陸居失其所也且多足敵救將至之象又蟹者解也其班師乎甲申上以幽州城踰旬不下士卒疲頓轉輸囬逺復恐契丹來救遂詔班師車駕夕發命諸將整軍徐還江休復雜志太宗自并幸幽乗敵無備契丹主方獵遁歸牙帳議棄燕薊以兵守松亭虎北口而已裕恱時為舍利郎君契丹國中親近無職事呼為舍利郎君請兵十萬救幽州並西方薄幽陵人夾持兩炬朝舉兩旗選精騎三萬夜從他道自官軍南席巻而北又先以弱兵五千守幽州望風遁去我師遏之不得去遂堅守又我師已退或勸襲之裕恱曰受命救幽薊已得之矣遂不甚爭利今附見當考乙酉次􅃰州丙戍次金臺驛内供奉官閻承翰馳奏大軍不整南嚮而潰上令殿前都虞候崔翰將衛兵千餘人止之翰請單騎徑徃至則諭以方畧衆遂定反命不戮一人上甚嘉之承翰眞定人也戊子次定州定難留後李繼筠卒弟繼捧嗣其位庚寅命崔翰及定武節度使孟𤣥喆等留屯定州彰徳節度使李漢瓊屯鎭州河陽節度使崔彦進等屯闗南得以便宜從事上謂諸將曰契丹必來侵邉當㑹兵設伏夾擊之可大㨗也是日車駕發定州辛卯次鎭州丙申次邢州戊戍次洺州庚子次大名府辛丑次徳清軍壬寅次澶州乙巳車駕至自范陽初議伐北漢宰相盧多遜言西蜀逺險多虞若車駕親征當先以腹心重臣鎭撫之則無後憂給事中程羽藩邸舊僚嘗知新都縣及興州興元府有能名上即命知益州及上駐太原郫縣獲羣盜送府獄已具㑹有朝㫖强盜未再犯免死送闕下蓋用武之際急於壯勇之士也法吏援敕以請羽曰人之惡憚於始為姦凶聞是令皆將輕犯亂不可制矣判曰鑾輅省廵江山遐僻不除凶惡曷靜方隅並付本縣處死磔於市即論奏其事於是迄羽去無盜賊羽之在新都州遣牙校至見羽禮慢不數嵗羽領州任人為校懼羽至則擢校統戍守塞蓋其才可任也此據程珦所作程羽祠堂記羽知益州在二年五月今附見車駕還自范陽後八月戊申朔契丹蘇􅈒等二十八人來降賜以衣服錢帛配𨽻契丹直守中書令西京留守石守信從征范陽督前軍失律壬子責授崇信莭度使兼中書令將作監段思恭責授少府少監思恭前知秦州擅借官錢造器用又妄以貢奉為名賤市狨毛虎皮為馬飾為通判王延範所發延範江陵人也甲寅彰信節度使劉遇責授宿州觀察使光州刺史史珪責授武定行軍司馬皆坐從征范陽所部兵逗撓失律故也劉遇史珪𫝊載失律事亦不詳恐國史或有所避忌更須参考初劉繼業為繼元捍太原城甚驍勇及繼元降繼業猶據城苦戰上素知其勇欲生致之令中使諭繼元俾招繼業繼元遣所親信徃繼業乃北面再拜大慟釋甲來見上喜慰撫之甚厚復姓楊氏止名業尋授左領軍衛大將軍丁巳以業為鄭州防禦使據國史楊業傳乃云孤壘甚危業勸其主出降以保生聚繼元既降上遣中使召業得之喜甚以為領軍大將軍師還乃除鄭州防禦使制辭云百戰盡力一心無渝疾風靡揺迅雷罔變知金湯之不保慮玉石之俱焚定䇿乞降委質請命忠於所事善自為謀與九國志大不同按五代史垂涕勸繼元出降者但馬峯一人耳非楊業也若業勸降則當與繼元俱出見何用别遣中使召乎然當時制辭不應便失事實又疑制辭意有所在故特云爾今但從九國志更須考之癸亥命潘美為河東三交口都部署以捍契丹辛未辰州言民宋再均等六輩誘致生口闌出邉闗賣與溪州蠻取其直詔令杖脊黥面檻車送闕下自今敢違者並令本處杖殺所在督疆吏謹捕之甲戍宋州言河決宋城縣詔發諸縣丁男三千五百人塞之命八作使郝守濬䕶其役初武功郡王徳昭從征幽州軍中甞夜驚不知上所在或有謀立王者㑹知上處乃止上㣲聞其事不悅乃歸以北征不利久不行太原之賞議者皆謂不可於是徳昭乘間入言上大怒曰待汝自為之賞未晚也徳昭惶恐還宫謂左右曰帶刀乎左右辭以宫中不敢帶徳昭因入茶酒閤拒户取割果刀自刎上聞之驚悔徃抱其尸大哭曰癡兒何至此耶追封魏王謚曰懿此據司馬光記聞本傳云徳昭好啖肥猪肉因而遇疾不起今不取丙子邛部川首領牟昻諸族鬼主副使離韈等各以方物來貢是月以賛善大夫韋亶等十五人為諸鎮節度判官亶等太平興國初擢第即隨判諸州至是受代還朝上以兩使判官得資者尤鮮故多闕員乃以亶等為之且令繫歴觀其佐治之才也秩滿並復以通籍處焉作太清樓九月己卯衛州言河決汲縣辛巳詔忻嵐憲州縁邉諸寨無得縱軍士入蕃界刼掠若須酬殺者當竢宣命乙酉命内衣庫使張紹勍南作坊副使李神祐等率兵屯定州初劉繼元降之明日左拾遺大名宋白獻平晉頌上夜召至行宫褒慰且曰竢還京授爾書命之職丙戍與右補闕郭贄並為中書舍人宋朝要録李昉扈䝉李穆等皆遷官賞扈蹕之勞也戊子詔改京城内外二十五門名丁亥初置皇子侍讀以左賛善大夫楊可法為之仍賜五品服帶銀勒馬銀五百兩錢五十萬尋遷右補闕仍侍讀庚寅户部郎中侯陟為諫議大夫權御史中丞權中丞始此癸巳嘉州言夾江縣弱馮鎭民王詣得黒石二皆有丹文其一云君王萬萬嵗其一云趙二十一帝緘其石來獻丙申詔曰先是禁銅錢不得入劍南界宜除之自今兩川民許雜用銅鐵錢即不得出他境縁邉戒吏謹視之犯者論如法代州言契丹安慶府主安海進來求内附以蠟書賜之己亥幸建隆觀遂幸新城西南隅觀迪里軍人射强弩庚子荆湖南路轉運司言十洞首領楊藴求内附癸卯山後兩林蠻王歸化大將軍勿兒遣其王子祚遇以名馬來貢丙午右拾遺李瀚責授右賛善大夫瀚前知雄州㑹范陽班師軍士迸走投州城瀚閉闗不納因擾亂刼掠居民潰而為賊故有是命先是江南兩浙諸州以絹計贓絹價二疋當江北之一詔自今宜以千錢為絹一疋論罪契丹大入侵鎮州都鈐轄雲州觀察使浚儀劉延翰帥衆禦之先陣於徐河崔彦進潜師出黒蘆堤北縁長城口銜枚躡後李漢瓊及崔翰亦領兵繼至先是上以陣圖授諸將俾分為八陣大軍次滿城敵騎坌至右龍武將軍趙延進乘高望之東西亘野不見其尾翰等方按圖布陣陣相去百步士衆疑懼畧無鬬志延進謂翰等曰主上委吾等邉事蓋期於克敵爾今敵騎若此而我師星布其勢懸絶彼若乘我將何以濟不如合而擊之可以决勝違令而獲利不猶愈于辱國乎翰等曰萬一不㨗則若之何延進曰倘有䘮敗延進獨當其責翰等猶以擅改詔㫖為疑鎮州監軍六宅使李繼隆曰兵貴適變安可以預料為定違詔之罪繼隆請獨當之翰等意始决於是分為二陣前後相副士衆皆喜三戰大破之敵衆崩潰悉走西山投坑谷中死者不可勝計追奔至遂城斬首萬餘級獲馬千餘疋生禽酋長三人俘老㓜三萬口及兵器車帳羊畜甚衆冬十月庚午㨗書聞手詔褒之乙亥齊王廷美進封秦王宰相薛居正加司空沈倫加左僕射盧多遜兼兵部尚書樞密使曹彬兼侍中文武官預平太原者皆遷秩有差初行賞功之典也此㨿實録而田錫於六年九月上章猶云平晉之功未賞不知何也當考宋朝要録昭輔檢校太尉熈載遷刑部侍郎潘美檢校太尉王仁贍檢校太傅崔翰劉延翰米信田重進以觀察使為節度使初行平晉之賞也馬軍都虞候保順節度使米信親族多在塞外時兄之子金自朔州挺身來歸上召見厚加慰撫遣金乘傳詣代州伺間迎致其親屬發勁卒䕶送之既而金宿留踰年敵境斥候嚴終不能得信慷慨曰我聞忠孝不兩立受恩遇至重方思殺身報國安能復顧親戚哉北望號慟以訣戒子姪勿復為言十一月丁丑朔賜縁邉戍卒􅃭袴庚辰代州言契丹於代州鴈門西涇䕶國南川置寨折彦贇與都監董思愿劉緒廵檢侯美追擊大破之獲鞍馬器仗甚衆此據㑹要乃十一月四日事折彦贇已見二月己巳丙戍詔以明法科於諸書中所業非廣遂廢之學究併通三經諒難精至乃分為三科仍兼習法令又詔進士及諸科引試日並以律文疏卷問義己丑幸玉津園遂畋近郊辛卯以建州邵武縣為邵武軍上以鄭州防禦使楊業老於邉事洞曉敵情癸巳命業知代州兼三交駐泊兵馬部署上密封囊裝賜予甚厚己亥以河北轉運使高繼申為河北南路都轉運使起居郎郭泌為御河至闗南水路轉運使鴻臚寺丞王在田為陸路轉運判官著作佐郎崔邁為水路轉運判官按樊知古傳云都轉運使之名自知古始事在端拱元年十月據實録則髙繼申於太平興國四年十一月已為之必有一誤姑存以俟細考㑹要云太平興國初分河北南路雍熈中又分為東西後併焉分為南路或自此始當檢詳嵐州言三交口破契丹千餘衆辛丑忻州言破契丹數千衆斬首四十五級獲鞍馬鎧甲并生禽十六人以獻闗南又言破契丹數萬衆斬首萬餘級獲橐駞五十三頭詔分給軍校初西南夷不供朝貢冦鈔邉境刑部郎中許仲宣為西川轉運使親至大渡河諭其逆順示以威福夷人皆率服在職踰三嵗㑹有言仲宣當江表用兵時乾没官錢者是月召還令御史臺盡索財計簿鉤校嵗餘卒無欺隠乃以仲宣為嶺南轉運使仲宣有心計能辦大事江表用兵軍中須索百端仲宣皆豫儲蓄無闕曹彬怪之夜攻城因取陶器數萬事分給攻城卒然燈自照仲宣已豫料置如其數付之它物類此先是詔中使趙守倫優給價和市在京及諸州民間私馬於是得十七萬三千五百七十九匹本志載市馬事在興國四年按正月即出師恐在四年以前矣實録别本載趙守倫市馬數在四年十一月乙巳前今因之蓋市馬前此事及此乃上其所得之數也十二月丁未朔占城國遣使來貢方物拓拔首領日榮遣所部酋長拓拔琳沁十六府大首領囉朗吹裕勒遣所部蕃官結舒等並來貢以右賛善大夫鉅野夏侯嶠等十五人並為殿中丞皆嘗於太原范陽督飛輓之役賞其勞故也開寳中禁民賣假茶一斤杖一百二十斤以上棄市己未詔自今凖律以行濫論罪庚申詔自今登州有女眞貢馬其隨行物色仰給牒所在勘驗牒外物並没入之從供奉官盧襲奏也丁卯畋近郊詔改司冦參軍以司冦院為司理院令於選部中選歴任清白能折獄辨訟者為之秩滿免選赴集又置判官一員委諸州於牙校中擇有幹局曉法律高貲者為之給以月俸如舊馬步判官之例秩滿上其殿最以定黜陟有踰濫者坐長吏而下司理判官連坐别本實録在六年十月庚午今從本志并書之尋又詔諸州察司理參軍有不明推鞫致刑獄淹滯具名以聞蔽匿不舉者罪之雍熈二年八月庚辰詔或即此也更詳之是嵗命有司取國初以來勅條纂為太平興國編敕十五巻行于世曹鄆淄三州水蠲其租太平州飢賑之改市買司為雜買務先是内庭宣索及殿前賜賚移文庫務未有專領其事者於是始置合同憑由印命左藏庫副使劉䝉正供奉官郭延濬同掌焉䝉正熈古之子延濬廷謂之子也延濬傳云太平興國初按熈古𫝊太平興國四年熈古轉内蔵庫副使因附見此年末契丹主明記改元曰乾亨
