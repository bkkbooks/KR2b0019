body:
  text: 續資治通鑑長編卷一百十宋李燾撰仁宗天聖九年春正月辛亥詔諸路轉運判官貟外郎以上遇南郊聽任子弟癸丑契丹遣左監門衛上将軍蕭可親右散騎常侍趙利用來賀長寜節丙辰長寜節百官初上皇太后夀于㑹慶殿己未龜兹國沙州並遣使貢方物庚申資政殿學士晏殊言占城龜兹沙州卭部川蠻族往往有挈家入貢者請如先朝故事委館伴使詢其道路風俗及繪人物衣冠以上史官從之調畿内及近州丁夫五萬浚汴渠辛酉以刑部尚書知許州張士遜為定國節度使檢校太傅時士遜朝京師冀復入相天章閣待制鞠詠奏曰曹利用擅威福士遜與之共事相親厚援薦以至相位陛下特以東宫僚屬用之臣願割舊恩伸公義趣使之藩士遜乃赴許州丙寅詔京城救火而廵檢軍校未至者聽集鄰衆撲滅之丁夘祠部貟外郎集賢校理同修起居注晁宗慤為知制誥宗慤逈子也宋綬嘗謂自唐以來唯楊於陵身見其子嗣復繼掌書命今始有晁氏焉詔舒州調兵夫築長風沙堤辛未改新判陳州錢惟演判河南府始惟演託疾乆留京師既除陳州遷延不赴且圖相位天章閣待制范諷奏曰惟演嘗為樞宻使以皇太后姻屬罷之示天下以不私今固不可復用殿中侍御史郭勸亦請督惟演上道而惟演自言先壠在洛陽願司宫鑰遂命惟演守河南促其行他日諷入對太后謂曰惟演去矣諷曰惟演奴僕皆得官不去尚奚以為時惟演弟處州觀察使知定州惟濟亦遷武昌留後知澶州尋復知定州勸又言惟演不當為其弟求遷且就總兵權乞罷之不報翰林學士盛度請其子奉禮郎申甫于館閣讀書從之詔减畿内民租并沿納各十之一二月庚寅以試身言書判選人前奉國節度推官顧祥等六人為京官大理寺言自今舉詳斷官須有出身入令録募職官人曽歴録事叅官見任二年以上有監司一人若常叅官二人同罪保舉者其嘗乞試律者須及五考已上乃聽舉之凡試律義三道䟽二道以三同為合格二同亦留别試中小案三道毎道約刑名三條其斷重罪一同若二粗與除京官其一粗或書札稍堪引用可取者送寺試斷案三二十道保明以聞法直官試律義外以舊案三道計刑名十分為率以六分為格用法不及六分約律不及二同者罷之仍令審刑詳議官二貟判大理寺或少卿同試于御史臺從之尋詔刑部舉官凖此刑部舉官乃三月末事今附見壬辰詔亡命軍士妻子拘本營者經赦聽從便癸巳詔曰職田所以惠亷吏而貪者並縁為私侵漁細民滋益為害比詔有司罷職田如聞勤事吏禄薄不足以自贍朕甚憫焉其復給職田即多占佃夫若無田而令出租者以為枉法論先是下三司裒職田歳入之數計直而均給之未能即行上因閱天下所上獄多以賄敗者遂降是詔詔真宗忌前後各禁刑二日冝如天慶節杖以下情理輕者釋之己亥禁民間造朱紅噐庚子詔大兩省官出知外郡不得奏辟同判職官其諸處知州亦不得保舉見任同判乙巳以卭部川蠻王黎在為保義将軍又以其部族為郎将司戈司候凡三十餘人丙午登州言女真國晏端等百八十四人内附詔送濠州給田處之三月壬子禮部貟外郎天章閣待制鞠詠卒他日上燕近臣謂范諷曰卿與鞠詠並命今亡矣朕甚念之甲寅奉安太祖太宗真宗御容于西京鳳臺山㑹聖宫戊午詔館閣増募冩書吏五十人癸亥徙河北轉運使刑部郎中張宗誨知徐州河東轉運使金部郎中胡令儀知涇州殿中侍御史朱諫知耀州並坐調發擾民也初宗誨為開封府判官監察御史王沿奏宗誨嗜酒廢職至是沿丁母䘮在衛州宗誨乃發沿假官舟賈販朝廷惡之因以公事與令儀等俱絀范仲淹作令儀神道碑令儀為借民飛輓以實邉郡人或媒孽其不便朝廷惑之徙守回中既而代者復行前議令儀得辨改之鳯翔此事當考又不知朱諫何事當并考賜青州州學九經書從王曽之請也丙寅徙利州路轉運使屯田郎中李繹為河北轉運使時河北經費不續上問輔臣誰可任者參知政事薛奎薦繹才遂以命之繹若拙子也嘗知華州蒲城縣民李藴者訴盗殺其姪亡去繹問曰若有仇耶曰無曰若有失亡耶曰無曰吾得之矣若苐歸因使人宻刺之乃藴有隂罪懼其事暴殺以滅口也又為河北提㸃刑獄權知貝州㑹嵗旱百姓失業繹大市酒務嵗所用薪草使貧者得以樵採自給而官有餘積因罷防城火牛草嵗十餘萬民甚便之己巳翰林侍講學士孫奭試太常博士國子監直講賈昌朝祕書丞諸王府侍講趙希言殿中丞國子監直講郭稹左賛善大夫國子監直講楊安國講説于中書奭前判國子監㑹諸博士講説獨謂昌朝有師法他日書路隨韋處厚傳示昌朝曰君當以經術進如二公及試中書稹固辭而昌朝亦以叅知政事陳堯佐嫌報罷龍川别志云世謂奭知人然昌朝與路韋名位俱類矣而其邪正則不同若知其貴賤此但相師所能耳希言禹城人也詔權停貢舉夏四月戊寅貶屯田貟外郎同判隴州孫濟為雷州叅軍軍事判官李謹言推官李廓司理參軍嚴九齡隴安縣尉董元亨並除名配廣州衙前先是隴安縣民龎仁義誣馬文千髙文宻等五人為刼盗元亨即逮繫文千等仁義且教其妻妾認所盗􅂍既而文宻掠死獄中餘遂誣服文千父訴于州濟權領州事而不為理文千等既抵死而秦州乃捕得真為盗者濟等㑹赦當原上怒特逺貶之司理院獄吏仍杖脊配沙門島縣吏刺配廣南牢城文千等五家皆賜錢米復其役三年因下詔曰隴州論平民五人為刼盗抵死主者雖更赦已悉致于理自今親民掌獄官其務審獄情茍或枉濫必罰無赦辛巳三司請在京𣙜貨務入末鹽錢嵗以百八十萬三千緡建州市茶嵗以五十萬斤真州轉搬茶倉歳以二百五十綱為定額詔建州茶減五萬斤餘從之丁亥契丹遣左千牛衛上將軍蕭昇鎭國軍節度使姚居信來賀乾元節戊子詔近臣已用郊恩奏薦親屬者遇乾元節權罷置杭越秀三州廵檢一貟辛夘詔天下職田其土地肥瘠不等冝令所在具頃畆及嵗入之數批逐官歴子上審官三班院流内銓其嵗入已優者母更入優處丁酉詔太常寺太后御殿樂升坐降坐曰聖安之曲公卿入門及酒行曰禮安之曲上夀曰福安之曲初舉酒曰玉芝之曲作厚徳無疆之舞再舉酒曰夀星之曲作四海㑹同之舞三舉酒曰竒木連理之曲初命翰林侍講學士孫奭撰樂曲名資政殿學士晏殊撰樂章至是上之仍改厚徳無疆曰徳合無疆殊子祕書省正字居厚奭孫將作監主簿惟直並遷奉禮郎遷官在六月甲申今并書乙巳上與皇太后御承明殿閲大樂賜樂工錢帛有差先是太常寺以真宗景徳中嘗躬按大樂其後頗言増製故請臨觀焉祖宗時重盗剥桑柘之禁枯者以尺計積四十二尺為一功三功已上抵死殿中丞于大成請得以减死論下法官議謂冝如舊帝特欲寛之五月丁未朔詔至死者奏裁壬子詔如聞荆湖殺人以祭鬼自今首謀若加功者凌遲斬之募告者悉畀以罪人家貲官吏捕獲者其賞與獲全伙刼盗同癸丑徙知秦州龍圖閣直學士王博文知鳯翔府走馬承受賈徳昌入朝毁博文故徙知在秦州未周嵗也己未詔長寜節度僧道舊制三百人放一人者今増至四百人一百人放一人者増至二百人知府州折惟忠言本州俗雜蕃漢舊以牙校掌刑獄近詔以本州司法王定為司理參軍不能諳曉蕃情請且如舊制從之庚申以書判㧞萃選人李惇裕等四人為京官武舉人李贍為三班借職惇裕至從子也乙丑御崇政殿録繫囚戊辰詔國子監直講改京官及五年者聽補外官己巳祕書丞知陳留縣王冲配雷州編管初内臣羅崇勲就縣請官田不得使皇城卒虚告冲市物有剰利事太后令崇勲劾冲不能自明故重謫之冲弟審刑院詳議官殿中丞瀆謫監蔡州税從子著作郎直賢院堯臣出知澤州皆坐冲故也壬申詔曹利用没官邸店錢並給其家乙亥徙修史院于宣徽院初寓中書第一㕔及史成續纂㑹要故徙之六月丁丑朔詔諸州行軍副使上佐文學叅軍自今毋得擅去貶所令登聞皷院不得輙通奏状時貶降官多妄訴于朝既命監送本州復戒約之契丹主隆緒病消渴浸劇召東平王蕭孝穆上京留守蕭孝先使輔立其子珠卜衮且戒以無失朝廷信誓己夘卒于大斧河隆緒曉音律與帳下縱飲或通書夕自歌起舞嵗獻方物皆親閲視必使羙好中意守約甚堅未嘗稍啟邉隙立二十四年年六十一諡曰聖宗李塡十朝綱要契丹主隆緒殂在位五十年諡天輔皇帝廟號聖宗其妻號齊天皇后妾號順聖元妃齊天平州節度使蕭錫珪之女耶律隆運甥也有容色隆緒愛幸特甚事雅雅克尤謹雅雅克亦以隆運故深愛之雅雅克既死齊天預國事權勢威盛置宫闈司補官屬出教命加號仁慈翊聖齊天彰徳皇后生日曰順天節有子皆不育元妃生子長即珠卜衮次曰當逹里生女楚國公主燕國公主雅雅克以楚國公主嫁其弟蕭托郭斯為築城以居之曰睦州號長慶軍徙户一萬實之曰從嫁户齊天善琵琶通琵琶工燕文顯李有文元妃屢言其罪隆緒不治又為蕃書投隆緒寝中隆緒得之曰此必元妃所為也命焚之隆緒遺命以齊天皇后為皇太后順聖元妃為皇太妃元妃匿之自為皇太后與帳下醫耶律憙孫謀令人誣告齊天謀叛載以小車囚之上京未幾縊殺之殺其左右百餘人以庶人禮𦵏祖州白馬山初隆緒將死屬珠卜衮曰皇后事我四十年以其無子故命汝為嗣我死汝子母切毋殺之後珠卜衮逰獵過白馬山追感父言哭其冢徙𦵏按巴堅墓傍珠卜衮蓋隆緒第八子始封梁王後為皇太子既即位更名宗真改元景福軍國事皆其母專制之尋加號曰法天皇太后契丹毎歳正月上旬出行射獵凡六十日然後並塔魯河鑿氷釣魚氷泮即縱鷹鶻以捕鵝鴈夏居炭山或上京避暑七月上旬復入山射鹿夜半令獵人吹角效鹿鳴既集而射之賤他姓貴耶律蕭氏其官有契丹樞宻院及行宫都總管司謂之北面以其在牙帳之北以主蕃事又有漢人樞宻院中書省行宫都總司謂之南面以其在牙帳之南以主漢事其特哩衮宗室也伊勒希巴叅知政事也林牙翰林學士也額爾欽刺史也内外官多倣中國者其下佐吏則有敞史孟古古字疑作直字更詳之徳斯努庫爾達努哈分提兵馬則有統軍侍衞控鶴司南王北王奚王府五帳分提實哈東西都省太師兵又有國舅鈐轄耀尼詳衮諸司南北皮室二十部族節度本布拉珠堪漢人渤海女真五節度烏葉太師一百六百九百家奚内外官至一百六百九百家奚皆所増凡民年十五以上五十以下皆籍為兵將舉兵必殺灰牛白馬祠天地日及木葉山神鑄金魚符調發軍馬其捉馬及傳命有銀牌二百軍所舍有逺探攔子馬以夜聽人馬之聲每其主立聚所獲人户馬牛金帛及其下所獻生口或犯罪没入者别為行宫領之建州縣置官屬既死則設大穹廬鑄金為像朔望節辰忌日輙致祭築臺髙逾丈以盆焚食謂之燒飯十宫各有民户出兵馬按巴堅曰𢎞義宫徳光曰永興宫鄂約曰積慶宫舒嚕曰延昌宫眀記曰章敏宫托雲曰長寧宫雅雅克曰崇徳宫隆緒曰興聖宫隆慶曰敦睦宫隆運曰文忠王府又有四樓在上京者曰西樓木葉山曰南樓龍化州曰東樓唐州曰北樓凡受册積柴升其上大㑹蕃人其下已乃燔柴告天而漢人不得預有諢子部百人夜以五十人畨直四皷將盡歌于帳前號曰聒帳毎謁木葉山即射栁枝諢子唱畨歌前導弹胡琴和之已事而罷三歳一試進士貢院以二寸紙書及第者姓名給之號喜帖明日舉案而出樂作及門擊皷十二面云以法雷震正史載此叚于契丹傳末比實録但増内外官至六百五家奚凡百餘字耳今依實録仍附隆緒没後庚辰命内侍押班江徳明集司天官具厯法䟽密以聞翰林學士宋綬西上閤門使曹琮夏元亨上新編皇太后儀制五卷詔名曰内東門儀制禁建信二州用新錢初上封者言二州接壌而置場市銅復行新錢民間縁此盗鑄者多故禁之辛巳樞宻副使范雍免䘮落復起甲申殿中侍御史楊偕言金耀門外有沙廟又碧瀾橋側有木神人多禱祠皆假託鬼神以惑衆請行禁止從之偕中部人少從种放學終南山舉進士為漢州軍事判官道遇術士曰君知世有化瓦石為黃金者乎就偕試之既騐欲授以方偕曰吾方從吏禄安事化金哉術士曰子志若此非吾所及也出户忽失所在丁酉南平李徳政遣知峯州刺史李偓佺知愛州刺史師日新等來謝加恩以偓佺為檢校司徒驩州刺史安南静海行軍司馬日新為檢校司空珍州刺史安南静海節度副使戊戌謫廣南西路轉運使章頻知饒州頻先擿冝州守貪暴不法既罷去反訟頻子許嘗抵徒刑而冒奏為校書郎故坐謫己亥右屯衞大將軍權判右金吾街杖司李福分司南京李福屢見當考其事無他則削去辛丑雄州以契丹主訃聞輟視朝七日在京及河北河東縁邊亦禁音樂七日命御史中丞王隨為祭奠使西上閤門使曹儀副之龍圖閣待制孔道輔為賀登位使崇儀副使孫繼鄴副之龍圖閣待制梅詢為國母弔慰使昭州刺史張綸副之鹽鐵副使司封貟外郎王鬷為國主弔慰使内殿承制閤門祇候許懷信副之秋七月丙午朔契丹遣奉陵軍節度使耶律克實來告哀上為成服于内東門之幄殿引使者入左掖門歴左升龍門入朝堂之西側門至文徳殿門奉書博士賛導由西階至西上閤門階下北向跪以授閤門使閤門使授入内都知以進次引使者見于幄殿帝向其國五舉音而止皇太后舉哭如上儀遣近臣詣館弔慰常服黒帶繫鞵不佩魚丙辰詔河北諸州毋得以坊郭上等户補衙前軍将承引客司時上封者言河北多差役上户使掌公用宅庫至有破産者故條約之戊午命樞宻直學士冦瑊為賀契丹登位使改賀登位使孔道輔為契丹太后册禮使西染院使魏昭文副之契丹太后册禮使自此始丁夘降權三司使給事中胡則知陳州殿中侍御史王沿候服闋與僻小處知州初則為河北都轉運使沿嘗就則假官船販鹽又以其子為名求買酒場張宗誨摘發之朝廷雖責宗誨復下其事轉運司按得實故則與沿並坐責壬申録左侍禁全邵等州同廵檢使劉翰子守清為三班借職翰與蠻賊戰死故也癸酉以翰林侍講學士兼龍圖閣學士兵部侍郎孫奭為工部尚書知兖州帝每御經筵設象架庋書策外向以便侍臣講讀奭年髙視昏或隂晦即為徙御坐于閣外奭講至前世亂君亡國必反復規諷帝竦然聽之嘗畫無逸圗以進帝施于講讀閤帝與太后見奭未嘗不加禮三請致仕召對承明殿敦諭之奭以年逾七十固請泣下帝亦惻然詔與馮元講老子三章各賜帛二百疋以不得請求近郡故優拜焉仍詔須宴而後行甲戌權度支判官右正言陳執中罷度支判官諫院供職國朝承五代之弊官失其守故官職差遣離而為三今之官裁用以定俸入爾而不親職事諫議大夫司諫正言皆須别降敇許赴諫院供職者乃曰諫官八月丁丑太子少保致仕贈右僕射馬亮卒亮有智略敏于政事然所至無亷稱吕夷簡少時從其父為縣福州亮見而竒之妻以女妻劉恚曰嫁女當與縣令兒耶亮曰非爾所知也及卒時夷簡在相位有司諡曰忠肅人不以為是也辛巳以天章閣待制范諷為賀契丹登位使冦瑊病不能行故也諷過幽州北見原野平曠慨然曰此為戰地不亦佳哉北人相目不敢對壬午詔單州民劉玉特貸死决杖濟州編管初玉父為民王徳毆死而徳更赦免玉卒殺徳以報父仇法當論死特貸之丙戌出内蔵庫絹六十萬下陜西河北河東市糴糧草戊子詔節度行軍司馬簽書州事者在幕職官之上自今更不除負犯人壬辰知陳州給事中胡則為工部侍郎集賢院學士侍御史知雜事劉隨奏則姦邪貪濫聞天下比命知池州不肯行為三司使以罪去驟加羙職何以風勸在位殿中侍御史郭勸請追則除命皆不報録右侍禁全邵永州都廵檢使栗守直子化成為三班借職以守直與蠻戰死故也當與劉翰死戰事并考丙申賜殿中丞范亢同進士出身亢樞宻副使雍之兄嘗舉進士得同學究出身時審官院考課當遷雍為納所遷官求科名特賜之戊戌又出内藏庫緡錢五十萬河北市糧草辛丑詔秦州自今蕃户犯罪已斷而不悛者即掩殺之勿復奏禀九月丙午朔内殿承制閤門祗候都大廵檢汴河隄孫昭請自雍丘縣湫口治木岸以束水勢從之癸亥祠西太一宫賜道左耕者茶帛己巳樞宻直學士右諫議大夫程琳為給事中權知開封府冦瑊卒命琳代之王䝉正子齊雄捶老卒死妻與子以病告乞母騐屍琳察其辭色異令有司騐劾得捶死狀䝉正連姻太后家太后因琳對曰齊雄非殺人者乃其奴嘗捶之耳琳曰奴無自専理且使令與巳犯同太后默然遂論如法外戚吳氏離其夫李咸熈而挈其女姪歸咸熈訴府琳命還女吳氏曰已納宫中矣琳即請於帝且曰臣不言恐諍臣有以議陛下者帝亟命出之二事附見詔出内蔵庫絹六十萬下河北折糴軍儲自三等而上户計其税一石者糴五斗庚午以吏部尚書知天雄軍王曽為彰徳節度使仍知天雄軍契丹使者往還肅車徒而後過無敢大聲疾呼者人樂其政為畫像而生祠之癸酉以潞州紫巖澗卜從深所居為惠濟院仍以從深為僧嵗度童行五人初從深于紫巖澗飛橋二十丈築室三十餘間未嘗渉城市惟食草苗願以所築室為僧院故特賜之詔縁邉西𣙜塲州軍自今同判選歴任有心力清幹京朝官充冬十月戊寅詔館閣官自外代還未踰年無得請補外己夘以翰林學士兼侍讀學士宋綬為龍圖閣學士知應天府時太后猶稱制五日一御承明殿垂簾决事而上未始獨對羣臣也綬言唐先天中睿宗為太上皇五日一受朝處分軍國重務除三品以上官决重刑明皇日聽朝除三品以下官决徒刑今冝約先天制度令羣臣對前殿非軍國大事及除拜皆前殿取㫖書上忤太后意故命出守侍御史知雜事劉隨殿中侍御史郭勸並言綬有辭學當留在朝不宜處外不聽勸本傳并及杜衍且云衍在江陵此時衍方為户部副使及衍除知荆南則勸出矣故削不著劉隨留綬據隨墓銘壬午詔諸州知州同判位本州官之上兵馬都監若諸司副使以上聽與同判叙官内殿承制崇班閤門祇候位朝臣同判之下京官同判之上正貟長吏司馬别駕在録事參軍之上見長官六曹同佐官醫博士在攝司馬之下三班差使殿侍散貟外殿侍散貟外殿直在命官之下攝長吏之上權為軍校者自如軍校儀乙酉以度支貟外郎知制誥鄭向為契丹生辰使供備庫使郭遵範副之淮南江浙荆湖制置發軍使祠部郎中任布為契丹太后正旦使左蔵庫副使王遵範副之度支判官殿中侍御史陳琰為契丹正旦使西染院副使閤門宣事舍人王克忠副之侍御史知雜事劉隨言比年庶官僥倖請託或對見之際涕泗祈恩或績效甚㣲衒鬻要賞亦有藩翰之臣位尊職重表章不遜奏請靡厭按察之司晏安顧望以容姦為大體以舉職為近名以巧詐為賢以恬退為拙以至貪殘者瀆干貨財老疾者不知止足請行申儆丙戌詔曰公卿大夫所宜勵名節以厚風化而或枉已以近名行險以怙寵詆誣執政干撓有司藩臣多所徼求使者弛于刺舉營私冐禄朕何望焉凡在位之臣其務修警毋蹈邪枉以速邦憲乙未常參官已授外任者毋得奏舉選人為京官王偁東都事略朕遵列聖之謀荷慈宸之教于兹八年矣而搢紳之間名節罔勵矜勞者掠羙以近名希進者行險以徼寵詆誣執政干撓有司分屏翰者或奏請之靡厭主按察者或寛縱之為得貪而無恥姑務營私老而非材曾不知退繇亷耻之未飭故風化之靡醇此豈朕之所望哉用稽彛訓申儆羣倫茍少冐于官箴将自投于公憲布告遐邇體朕意焉壬寅罷益梓廣南路轉運判官詔長寜節天下蔵太宗御書寺觀合度僧道者如乾元節閏十月丙午降樞宻直學士給事中李諮為左諫議大夫㘴失保任也己酉契丹遣工部尚書蕭徳順崇禄卿李可封以隆緒遺留物來獻癸丑詔御史臺自今契丹使見辭遇假日及䨇日並為常朝丁巳除磁州民所貸廪粟庚申程琳言臣與趙諮並為樞宻直學士諮在先朝嘗掌内制乞令諮班臣上從之壬戌司天監上重修崇天厯癸亥鹽鐡副使司封貟外郎王鬷户部副使刑部貟外郎杜衍並為天章閣待制初馬季良建言京師賈人常以賤價居茶鹽交引請官置務收市之季良方用事有司莫敢迕其意鬷獨不可曰與民競利豈國體耶他日上見鬷勞之曰官市交引頼卿力言罷之甚善有司臨事當如是也薛顔死其家屬衍為墓誌衍却之及在三司因奏事上謂衍曰薛顔有醜行卿不與誌墓誠清識也自是有意大用寳訓謂上此言乃衍為户部副使時今附此戊辰知兗州翰林侍讀學士工部尚書孫奭辭曲宴太清樓召太子少保致仕晁逈及近臣皆預帝飛白大字以賜二府而小字賜諸學士獨奭與逈兼賜大小字詔羣臣即席賦詩帝問逈年及服餌之術對曰犬馬之年八十有一未嘗服餌金石不意衰朽冄覩天顔而臣之子宗慤又忝侍從同與燕樂千載之遇也因徙逈坐御史中丞之南太后時出禁中珍器勸奭及逈酒所以寵賚之甚厚翌日奭入謝又命講老子賜襲衣金帶鞍勒馬及行賜宴瑞聖園又賜詩詔近臣皆賦舊制賜宴則御史中丞不與王隨時為御史中丞曰此盛事也吾不可以不與上䟽請行詔許之王隨事更當考之此據記聞壬申施州言溪洞蠻覃彦綰等冦永寜寨十一月戊寅調丁夫浚曹州寃朐縣古清溝從京東轉運司之請也己夘詔河南府民墓田七畆以下除其税辛巳徙三館于崇文院先是三館祕閣在左掖門内左昇龍門外大中祥符八年大内火權寓右掖門外至是修崇文院成復徙之昭文館大學士吕夷簡奉表稱謝丁亥弛兩川礬禁渠州防禦使龍神衛四廂都指揮使孫正改沂州防禦使貝州部署落管軍御史言正衰老不任事也己丑祈雪于㑹靈觀壬辰雪乙未詔在京監庫務官毋得再任初蔡州團練使知相州劉從徳以病召還道卒年四十二贈保寜節度使封榮國公諡康懷太后悲憐之尤甚録内外姻戚門人及僮𨽻幾八十人從徳姉壻龍圖閣直學士馬季良母越國夫人錢氏兄惟演子集賢校理曖及妻父王䝉正皆縁遺奏各遷兩官屯田貟外郎戴融嘗佐從徳衛州為度支判官侍御史曹修古殿中侍御史郭勸楊偕推直官叚少連交章論列太后怒下其章中書大臣請黜修古知衢州餘以次貶太后以為責輕丁酉降修古為工部貟外郎同判杭州勸偕為太常博士勸監濰州稅偕監舒州税少連為祕書丞監漣水軍税修古尋改知興化軍少連開封人也龍圖閣直學士馬季良子將作監主簿館閣讀書直方為大理評事季良辭所遷官故以命直方也十二月丙午契丹遣廣徳軍節度使耶律勵四方館使髙惟翰來謝册禮甲寅詔吏部流内銓選人父母八十已上聽權注近官庚申左司諫龍圖閣待制孔道輔出知宣州尋改徐州又改許州道輔出守必有故當考明年二月改徐州三月改許州今附見辛酉大風三日止丙寅契丹遣昭信軍節度使耶律都西上閤門使馬保來賀皇太后正旦丁夘又遣彰武軍節度使蕭格左監門衛大將軍趙果來賀正旦詔河北河東沿邉安撫副使都監并同管勾安撫司公事使臣諸路承受使臣自今到闕奏事只得住十日令閤門内侍省催促進發如遇急速不在此限是嵗天下上户部户五百九十七萬八千六十五口一千三百二十一萬九百二十四客户三百四十萬二千七百四十二口五百七十二萬五千一百四十二
