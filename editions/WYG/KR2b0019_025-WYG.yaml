body:
  text: 續資治通鑑長編卷二十一宋李燾撰太宗太平興國五年春正月丙子朔上御崇元殿受朝庚辰遣供奉官閤門祗候王僎使高麗初劉繼元降其官吏將卒徃徃亡命山林久未歸服於是降詔撫諭令所在陳首悉與洗滌前罪等第給賜錢帛縣次續食傳送上都當令先問其所欲隨以處之上初即位閲諸軍戰騎多闕將北征詔諸道市所部吏民馬有敢蔵匿者死坊州刺史胡公覇甞有隂事為孔目吏所持頗衘之㑹吏有善馬公覇紿令匿之吏如其㫖土窖蔵馬其中既而具言狀公覇偽喜謂吏曰我為汝畫計汝當謹其事無使人知并累我矣一日閲官所市即大言曰吏某有善馬蔵某處令卒數軰取之捕吏繫獄按驗未具公覇亟斬之吏家人以吿徴公覇赴闕親詰於便殿公覇抗言以詔書從事非專殺上怒壬午授公覇右監門衛率府率國初但有左右飛龍二院以左右飛龍使各二人分掌之時諸州監牧多廢官失其守國馬無復孳息太祖始置養馬二務又興葺舊馬務四以為放牧之地分遣中使詣邉州歲市馬自是閑廐之馬始偹上既平太原遂觀兵范陽得汾晉燕薊之馬凡四萬二千餘匹國馬增多乃詔於景陽門外新作四廐名曰天駟監左右各二以左右飛龍使為左右天廐使閑廐使為崇儀使内廐馬既充牣始分置諸州牧養改崇儀使實録在甲申今從本紀并書之癸未歙州言稻再熟庚寅以禮部侍郎程羽為文明殿學士序立於樞密副使之下文明殿學士即端明殿學士也國初雖改殿名而學士領職如故於是并改焉文明殿學士自羽始丁酉命冀州刺史牛思進䕶闗南軍己亥命連州刺史任知杲虢州刺史許昌裔雄州刺史孫全興發諸郡丁夫治衛澶濮三州河堤左屯衛將軍李重進右千牛衛將軍鄭彦華右内率府率田浦治濟貝鄭三州河堤李重進田浦未見癸卯命右衛將軍史珪督畿内丁夫三萬人鑿尉氏縣界新河九十里數旬而畢居民利之分糧料諸司馬軍步軍為三院各命官主之二月丙午京西轉運使程能上言諸道州府民事徭役者未甞分等慮有不均欲望下諸路轉運司差官定為九等上四等户令充役下五等户並與免詔令轉運使躬親詳定勿復差官戊申改南辨州曰化州温州捕送養猫鬼呪咀殺人賊鄧翁并其親屬至闕下鄧翁腰斬親屬悉配𨽻逺惡處諸州馬多死殿直李諤坐監牧許州盗官菽二百五十石馬死者千五百匹械繫送闕下甲子并内侍梁守忠及主吏三人悉斬于市乙丑岢嵐軍言近界戎人二百六十餘户老㓜二千三百餘口歸附此從本傳及㑹要所書之數戊辰徐州送妖賊李緒等四十五人斬為首者七人餘配逺惡處壬申岢嵐軍又言戎人八十九户老㓜六百三十二口歸附廢順化軍三月甲戍朔詔江南諸州嵗貢乾蜂甚傷生而撓民宜罷之先是令有司詳定打毬儀戊子始用其儀召羣臣㑹踘於大明殿上獲多算贈太師南越王劉鋹卒輟三日朝癸巳潘羙言自三交口廵撫至代州㑹敵十萬衆冦鴈門令楊業領麾下數百騎自西陘出由小陘至鴈門北口南嚮與羙合擊之敵衆大敗殺其節度使駙馬侍中蕭多囉生禽馬步軍都指揮使李重誨獲鎧甲革馬甚衆重誨金城人也丙申上作喜春雨詩令近臣和閏三月甲寅上御講武殿覆試權知貢舉程羽等所奏合格進士得銅山蘇易簡以下百一十九人又得諸科五百三十三人並分第甲乙賜宴始有直史館陪座之制進士第一等授將作監丞通判藩郡次授大理評事知令録事諸科授初等職事及判司簿尉時劉昌言顔明逺明逺邑里未見毗陵張觀冝黄樂史等四人皆以見任官舉進士上惜科第不與特授近藩掌書記唐有勅賜及第以表特恩開寳以來御試中第一者皆稱之其文臣有不由科第者或因獻文别試亦勅賜進士及第或賜御前進士及第又有同進士及進士出身之目其後復賜樂史進士及第仍附是年第一等進士之下丁卯令荆湖嶺南等處以絹計贓如江浙之制己巳詔品官公罪徒以上去官事發所在鞫之以聞辛未甘沙州囘鶻遣使來貢方物斬宦官馮彦琛坐部脩軍壘擅没入官瓦木市取其直故也三交口言戎人二百三十四户老㓜五千三十七口歸附歸義軍節度使曹元忠卒其子延禄自稱權節度兵馬留後遣使脩貢夏四月丁丑詔贈元忠燉煌郡王授延禄歸義節度使又以其弟延晟為𤓰州刺史延端為牙内都虞候母封秦國太夫人妻封隴西郡夫人遣供奉官盧襲使交州時丁璉及其父部領皆死璉弟璿尚㓜嗣稱節度行軍司馬權領軍府事大將黎桓擅權因而樹黨甚盛漸不可制刼遷璿於别第舉族禁錮之代總其衆本傳云上聞桓刼遷其主始有弔伐意按交州之師侯文寳發其端恐此亦縁飾之辭今不取有趙國昌者求應百篇舉癸未上親試之出雜題二十字令各賦五篇篇八句逮至日旰僅成數十首率無可觀上以此科久廢特賜及第以勸来者仍詔有司自今應百篇舉約此為題戊子襄州言襄陽縣民張巨源五世同居内無異爨詔旌表門閭巨源嘗習刑名書特賜明法及第己丑代州言戎人二百三十五户二千四百二十四口歸附初劉繼元降上令殿前都虞候武泰節度使崔翰先入慰撫仍禁俘畧之物無得出城時秦王廷美以數十騎將冐禁出城翰呵止之廷美怨遂䜛於上壬辰翰罷為感徳節度使詔壅汾河晉祠水灌太原故城丁酉詔應勅除及吏部注授幕職令録司理判司簿尉自今除程給一月限其川峽嶺南福建路給兩月違者本州不得放上䕶送至闕當除籍不齒或被病則所在投牒長吏案驗給公據廢痼未損條其狀以聞淳化三年七月又下詔與此無異更不重出誠州十洞首領楊通寳來脩貢己亥以通寳為誠州刺史去年九月本紀書十洞首領楊藴今年實録於此書楊通寳未知孰是本傳亦兩存之是月初以禮賢宅賜錢俶俶獻白金三百斤為謝命有司定品官贖罰之令本志在四月因附見五月大霖雨命近臣分詣京城寺觀宫廟祈晴己未雄州團練使孫全興責授蘭州團練使坐摠戎捍邉畏懦不稱職也其事不詳乙丑内弓箭庫使順州刺史李福榮責授右内率府副率坐䕶邉兵失律也其事不詳丁卯作端拱樓六月丙子潁州言潁水溢壊民廬舍壬子高麗王伷遣使來貢方物己亥以江州白鹿洞主明起為蔡州褒信縣主簿白鹿洞在廬山之陽常聚生徒數百人李煜僣竊時割善田數十頃嵗取其租廪給之選太學之通經者授以他官俾領洞事日為諸生講誦至是起建議以其田入官故爵命之白鹿洞由是漸廢矣太常博士知邕州侯仁寳因其父益居洛陽有大第良田優游自適不欲親吏事其妻趙普之妺也普為宰相仁寳得分司西京盧多遜與普有隙因白上以仁寳知邕州按寔録開寳六年四月辛丑盧多遜使江南後十日辛亥仁寳知邕州時多遜未反也𫝊稱多遜參政即命仁寳知邕州恐誤今畧刪改之凡九年不得代仁寳恐因循死嶺外乃上䟽言交州主帥被害其國亂可以偏師取之願乘傳詣闕面奏其狀庶得詳悉䟽至上大喜令馳驛召未發多遜遽奏曰交阯内擾此天亡之秋也朝廷出其不意用兵襲擊所謂疾雷不及掩耳今若先召仁寳必泄其謀蠻冦知之阻山海預為備則未易取也不如授仁寳以飛輓之任因令經度其事選將發荆湖士卒一二萬人長驅而徃勢必萬全易於摧枯拉朽也上以為然秋七月丁未以仁寳為交州路水陸轉運使蘭州團練使孫全興八作使郝守濬鞍轡庫使陳欽祚左監門衛將軍崔亮為邕州路兵馬都部署寧州刺史劉澄軍器庫副使賈湜供奉官閤門祗候王僎為亷州路兵馬都部署水陸並進討庚戍全興等入辭命引進使梁逈餞行營將士於玉津園湜琰之子也己酉詔西川諸州民比者但犯鹽禁皆部送京師自今不滿十斤委所在州府依法區分十斤以上並依舊部送赴闕從轉運使聶詠所奏也庚申南州刺史向行猛遣使來貢方物己巳詔諸路轉運使諸州除舊編敕外所授宣敕並依次編録長吏以下職官受代日逓相交付從潭州兵馬監押馬知節所奏也濟州言金鄉縣民李延家自唐武徳初同居至今近四百年世世結廬守墳墓或父母病截指割股刺血書佛經詔旌其門賜以粟帛八作使段仁誨部脩天駟監築垣墻侵景陽門街上怒令毁之仁誨决杖責授崇儀副使吏部郎中邉珝自廣南轉運使代歸庚午以珝為右諫議大夫領吏部選事珝任廣南始至桂州㑹知州張頌卒頌濰州人舊制不許以族行州人藁葬城外僕妾利其財悉分匿之珝召官吏謂曰張使君没於逺宦身後之計吾儕安可不為致力乃委官追治其財并其䘮部送歸濰州人以此義之屬郡守與䕶軍有怨隙者但令易地未嘗寘之於法命知萊州殿中丞鄭濬文知單州左賛善大夫劉厚徳並通判本州事以刺史太原楊重進盧漢贇赴本任故也濬文厚徳漢贇皆未見八月甲戍鄉貢進士孟渝為固始縣主簿渝長沙人嘗著野史三十卷石熈載之在湖南與渝甚厚至是來獻所著書熈載為言於上故有是命宣徽北院使判三司王仁贍密奏近臣戚里多遣親信市竹木秦隴間聯巨筏至京師所過闗渡稱制免筭既至厚結執事者悉官市之多取其直上怒以三司副使范旻尸部判官杜載載未見開封府判官吕端屬吏旻載具伏罔上貴市竹木入官端為秦王府親吏喬璉請托執事者己丑貶旻房州載歸州端商州皆為司戸參軍判四方館事程徳元武徳使劉知信翰林使杜彦珪内侍武徳副使竇仁寳日騎天武四廂都指揮使趙延􅄎左衛上將軍祁廷訓皆坐責降駙馬都尉王承衍石保吉魏咸信各罰俸一年因詔自今職官不得輙入三司公署及不得以書札徃來請托公事門吏謹察之違者以吿信邢州人其母昭憲太后妺彦珪審瓊子也西南蕃主龍瓊琚遣其子羅若從并諸州蠻七百三十四人以方物名馬來貢戊戍幸錢俶第視疾賜俶銀萬兩絹萬疋錢百萬金器千兩又賜俶子惟濬惟治銀各萬兩九月甲辰史館上太祖實録五十卷實録於此月癸卯書交州遣使江巨瑝以方物來貢十一月庚子又書丁璿上表璿所上表則江巨瑝與王紹祚同皆以十一月庚子至京師不言先遣巨瑝後遣紹祚也疑實録誤實録亦自載璿所上表不知何故如此差異當考之今且以表及㑹要等為證此月癸卯不書江巨瑝來貢丁未京西轉運使起居舍人程能責授右賛善大夫判官右賛善大夫時載責授將作監丞坐縱程徳元等於部下私販竹木不以吿也賜三司副使李符銀三千兩詔有司徧告百官凡遇朝㑹皆務恭䖍每内殿起居日即須踧踖趨門雍容就列稍不端謹便當劾奏之懲䙝嫚也壬戍畋近郊太常丞宋琪前知大通監上召歸將遂擢用為盧多遜所沮丙寅授都官郎中出知廣州將行對於便殿面賜金紫上以藩邸舊僚不欲使之逺出因留不行尋令判三司勾院契丹以書遺豐州刺史王承羙令毋與中國市馬承羙不從具奏其事契丹怒率衆掠豐州闗以西部族三百餘帳冬十月戊寅命萊州刺史楊重進沂州刺史毛繼羙率兵屯闗南亳州刺史蔡玉濟州刺史上黨陳廷山屯定州單州刺史盧漢贇屯鎭州備契丹也繼羙玉未見甲申下元京城始張燈如中元丁亥杖殺陽武縣令張希永坐與主㩁酤吏趙賛前後盗取羡餘官錢二百三十四貫入已鞫之得實及賛皆抵法上將廵北邉己丑詔自京師至雄州發民除道脩頓甲午左拾遺韋務昇責授右賛善大夫坐為陜西北路轉運使日縱程徳元等於部下私販竹木不舉劾故也命馬軍都指揮使米信東上閤門使郭守贇弓箭庫使李斌儀鸞副使江鈞同䕶定州屯兵守贇斌鈞未見賜河北縁邉行營將校建茶羊酒是月始合三司勾院為一院此據㑹要十一月庚子朔黎桓遣牙校江巨瑝王紹祚齎方物來貢仍為丁璿上表自言徇將吏軍民之情已攝節度行軍司馬權領軍府事乞朝廷賜以眞命時孫全興等出師既踰時上察其意止欲緩兵寢而不報壬寅以夏州衙内指揮使李繼捧為定難軍留後契丹冦雄州實録本紀皆不載此事獨契丹𫝊十一月書此㨿龍灣堤龍猛副指揮使荆嗣率兵千人力戰奪路㑹中使有至州閲城壘者出郛外敵進圍之諸軍赴援多被傷嗣與其衆夜相失三鼓乃突圍走莫州敵為橋於界河以濟嗣邀擊之殺獲甚衆敵據雄州他書皆不詳獨荆嗣傳有此事今且刪脩附見更當考之丙午以秦王廷羙為東京留守宣徽北院使王仁贍為大内部署樞密承㫖陳從信副之己酉詔廵北邉壬子發京師癸丑闗南言破契丹萬餘衆斬首三千餘級即以河陽節度使崔彦進為闗南兵馬都部署丙辰次澶州丁巳次徳清軍戊午駐蹕於大名府雄州言契丹皆遁去開寳末右補闕竇偁為開封府判官與推官賈琰同事上琰便佞能先意希㫖偁常疾之上與諸王宴射琰侍上側頗稱賛羙詞多矯誕偁叱之曰賈氏子巧言令色豈不愧於心哉坐皆失色上亦為之不樂因罷㑹白太祖出偁為彰義節度判官至是上思見偁促召至行在癸亥以偁為比部郎中時方議北征偁因抗䟽請還都休士養馬徐為後圖上悦其言及至自大名以偁為樞密直學士偁儀之弟也十二月庚午宴從臣甲戍畋近郊因以閲武賜禁軍校及衛士襦袴時禁盗獵有衛士獲麞違令當死上曰我若殺之後世必謂我重獸而輕人釋其罪宴從臣於幄殿丁丑以鄭州防禦使楊業領雲州觀察使仍判鄭州知代州事業自鴈門之㨗契丹畏之每望見業旗即引去主將戍邉者多嫉之或潜上謗書斥言其短上皆不問封其書付業上因契丹遁去遂欲進攻幽州戊寅以保静節度使劉遇充幽州西路行營壕寨兵馬部署睦州團練使田欽祚為都監威塞節度使曹翰充幽州東路行營壕寨兵馬部署登州防禦使趙延溥為都監復命宰相問翰林學士李昉扈䝉事之可否昉等上奏曰比鄙邉兵自古為患乘秋犯塞徃徃有之陛下櫛風沭雨衝冐嚴凝親御戎衣以攘民患蠢兹醜類畏威而逃因而剪之易於拉朽况幽薊之壤久䧟敵人慕化之心倒懸斯切今若擁百萬横行之衆弔一方傒后之民合勢而攻指期可定其如大兵所聚轉餉是資且河朔之區連嵗飛輓近經蹂踐尤極蕭然雖幸遇於豐穰恐不堪其調發屬兹寒冽益復罷勞况今敵衆宵奔邊陲寧肅若親廵塞下震燿威容固足懼彼殘妖亦恐勞於大舉伏望申戒羽衛旋斾京都善養驍雄精加訓練嚴敇邉郡廣積軍儲講習武經繕脩攻具竢府藏之充溢洎閭里之富完朞嵗之間用師未晚上深納其説即下詔南歸玉壺野史載太宗將蒐漁陽李昉抗疏力諌其詞頗切直與此不同野史又云昉居常奏事但雍容和婉此疏上士論駭伏後北伐果無成太宗嘉之始厚賜之事亦與正史不同今從正史命曹翰部署脩雄覇州平戎破虜乾寧等軍城池開南河自雄州逹莫州以通漕運築大堤捍水勢調役夫數萬人拒敵境伐木以給用遣五駿騎為斥候授以五色旗人執其一前有林木則舉青旗煙火舉赤旗冦兵舉白旗陂澤舉黑旗丘陵舉黄旗先是契丹入冦必舉狼煙翰分遣人舉煙境上敵疑有伏即引去不敢近塞得巨木數萬負擔而還大濟用度數旬功畢召歸潁州庚辰車駕發大名府因校獵乙酉至京師辛夘交州行營言破賊萬餘衆斬首二千三百四十五級上既還京師議者皆言宜速取幽薊左拾遺直史館張齊賢上䟽曰方今海内一家朝廷無事闗聖慮者豈不以河東新平屯兵尚衆幽燕未下輦運為勞以生靈為念乎臣每料之此不足慮也自河東初䧏臣即權知忻州捕得契丹納米典吏皆云自山後轉般以援河東以臣料契丹能自備軍食則於太原非不盡力然終為我有者盖力不足也河東初平人心未固嵐憲忻代未有軍寨入寇則田牧頓失擾邉則守備可虞而反保境偷生畏威自固及國家守要害増壁壘左控右扼疆事甚嚴恩信已行民心已定乃於鴈門陽武谷來争小利此其智力可料而知也聖人舉事動在萬全百戰百勝不若不戰而勝若重之慎之契丹不足吞燕薊不足取自古疆塲之難非盡由於敵國率由邉吏擾而致之若縁邉諸寨撫御得人但使峻壘深溝畜力飬鋭以逸自處寜我致人李牧所以稱良將於趙用此術也所謂擇卒不如擇將任力不及任人如是則邉鄙寜邉鄙寜則輦運减輦運减則河北之民獲休息矣民獲休息則田業増而􅅙織廣務農積榖以實邉用且臣料敵人之心固亦擇利避害安肯投死地而為寇哉臣又聞家六合者以天下為心豈止爭尺寸之事角强弱之勢而已乎是故聖人先本而後末安内以養外人民本也疆土末也五帝三王未有不先根本者也堯舜之道無他廣推恩於天下之民爾推恩者何在乎安而利之民既安利則逺人歛袵而至矣陛下愛民利天下之心真堯舜也臣慮羣臣所聞多以纎㣲之利剋下之術侵苦窮民以為功能者彼為此效相習已乆至于生民疾苦見之如不見聞之如不聞歛怨速尤無大于此伏望審擇通儒分路採訪兩浙江南荆湖西川嶺南河東有偽命田賦歛苛重者改而正之因而利之使賦税課利通濟可經乆而行為聖朝定法除其舊獘天下諸州有不便於民事委長吏聞奏如敢循常不以聞自當嚴加典憲使天下耳目皆知陛下之心戴陛下之恵此以徳懐逺以恵利民則逺人之歸可立而待也國初以來犯死罪獲貸者多配𨽻登州沙門島通州沙門島皆有屯兵使者領䕶而通州島中凢兩處豪强難制者𨽻崇明鎮懦弱者𨽻東北洲兩處悉官煑鹽是嵗始令配役者𨽻鹽亭役使之而沙門如故
