body:
  text: 續資治通鑑長編巻四十二宋李燾撰太宗至道三年九月丙子上因言西川叛卒事輔臣或曰蜀地無城池所以失其制禦上曰在徳不在險儻官吏得人善扵撫綏使之樂業雖無城可也寳訓以蜀城為趙鎔之言然鎔時已罷樞宻矣今不取李允則傳載允則自蜀使回請如上官正議築城當别時事此時但朝議偶及此耳故不可並書初上命左藏庫使楊允恭等崇儀副使竇神寳等馳傳徃西邉圗上山川形勝是日上御滋福殿召輔臣以圖示之歴指州縣堡壁謂曰朕已令屯兵扵内地且簡其閑冗轉餉當遂减省矣允恭因建議自環州入積石扺靈武才七日程芻粟之運其䇿有三以人以驢其費頗煩而所載至少莫若用諸葛木牛之制載以小車令鋪卒分運每一車四人挽之旁設兵衛加戈刃扵其上㓂至則聚車扵中合士卒之力禦㓂扵外尋為議者所沮而止遣使圗西邉形勝真宗之意欲罷出兵自固吾圉非務攻略也寳訓乃云善用兵者必先相地利恐上意實不然今不取戊寅以長葛縣令孔延世為曲阜縣令襲封文宣公并賜九經及太宗御書祭噐加銀帛而遣之詔本道轉運使本州長吏待以賔禮延世孔子四十五世孫也壬午左正言直史館孫何表獻五議上覧而善之其一參用儒将曰将者人之司命國家安危之主晉漢至唐皆選儒臣統兵當時武臣未有出其右者五代始分事任交相是非古謂元戎無不統攝爰自近代又有供軍糧料随軍轉運之目使者往返託稱上㫖動必中覆實戾成算陛下扵文儒之中擇有方略之士試以邉任委之勿使小人撓其權閫外制置一以付之境内税租𣙜利一以與之監陣先鋒之類悉任偏将受其節度文武參用必致竒績其二申明太學曰士風偷薄世態稍頑賤古道扵儒官慕他岐扵天府闒茸之士始入泮林英豪之流例趨京兆而又兵戈繼起經制莫存絃誦之義皆亡郡縣之學盡廢盖以定令之初綱條踈闊六館升降總限門䕃之髙卑兩京薦論曾無科禁以釐革遂令淺俗扇以成風外地則絶無學生神州則悉號鄉貢下至工商雜類方逰太學廣文青青由是不歸擾擾扵焉興制近隆明制懲科塲之積弊立貢士之新規申命有司十取其二然臣以為尚有未盡者國家必欲開孤進之路闢至公之門莫若再舉令文復嚴經術使寒雋之士由鄉里以升聞世禄之家自成均而出仕太學不得補庶人之子神州不得貢鄉士之門貴介綺紈府送者有罪草莽韋布監收者黜官其在外郡或駢繁縣如富庶者皆按舊典重立學官俾選耆儒碩生為之博士助教精加課試公與薦延嵗終仍依新條限以人數發觧必有軼羣之異行㧞俗之英才匪由鄉庠亦許公議夫以文取士既已失之取之乖方弊将安救今士子名為鄉舉其實自媒投贄于郡府之門關節于公卿之第属詞比事合格者不過雕蟲任傳棄經入流者未逾章句若不收之學校選自州閭實慮他時益成薄俗兹事體大惟陛下特達而行臣出身之初亦自府觧豈敢忘本遽陳此謀盖目撃輕浮心知謬濫是以冒不測之罪罄狂夫之言焉其三釐革遷轉曰伏見國家撫有多方並建衆職外則郡将通守朝士代行關征𣙜酤使者兼掌下至幕府職掾之㣲咸自朝廷選補而授用人既廣推擇難精貢部上名動逾千計門資入仕又不在焉按宋史作亦及百人稍著職勞即陞京秩将命而出冗長尤多既躬祀圜丘誕敷霈澤無賢不肖並許叙遷至使評事寺丞纔數載而通閨籍賛善洗馬不十年而登臺郎竊計今之班簿䑓省宫寺凡八百員玉石混淆名噐猥濫異夫虞書考績周官計治之法也臣誠至愚竊所未喻有唐舊制每郊禋慶宥但進階勲而已今若十年之内肆赦相仍必恐京僚過扵胥徒朝臣多扵州縣豈惟連車平斗之刺亦有販材按宋史作敗財假噐之失况禄廪所賦必自地征地征所来須從民力何必空竭公藏附益斯人已授者朘削既難未遷者防閑宜峻古人所謂損無用之費罷不急之官正在此也伏願特降詔書自今郊祀群官不得一例遷陟必若績用有聞才名夙著自可待之不次豈祗歴階而升至扵省併吏員上繋宸􅇆與奪其四復制科曰唐室參古今之制取天下英俊失在禮部得扵制舉禮部則進士眀經觧詁句讀聲病偶對者也制舉則賢良體用等科財成制度寅亮經綸者也國家廓土闢宇立太平之基然而制舉未復諸途羙官惟進士明經逓資以升豈不念林壑非常之士有遺棄乎䑓閣所進之人有僣濫乎其五行鄉飲曰鄉飲之禮所以示尊卑長㓜賔主之序秦燔詩書其禮遂廢因循未復實有遺恨望詔禮官舉故事而行之監察御史王齊上疏陳十事一擇左右二分賢愚三正名噐四去冗食五加俸禄六謹政敎七選良将八練兵戎九修民事十開仕進其畧曰賢愚治亂之本也大賢則能盡治衆務兼通百職其次但懐一長負一竒亦可矣愚者不必塊然無慮蚩蚩為民葢守小謹者似徳懐怯懦者似恕容姦惡者似仁蘊謟䛕者似恭恣傾陥者似智好詆訿者似直樹朋黨者似義肆苛刻者似忠貪禄位者似勤若斯之流雖愚而類賢用之則速亂之基也又曰官不必備惟其人又曰位以徳舉不以序遷茍能慎選其人各守其官則綱紀必正又曰官多則事繁吏多則民殘欲事不繁莫若省官欲民皆安莫若省吏天下所以未極清浄者由官吏多之故也為陛下計宜减分局之官省監臨之數擇百司之吏選技術之工去纎巧之匠停老弱之卒汰緇黄之流自然無曠土無㳺民公庭肅而百事舉矣又曰官多俸薄不若俸厚而官少若盡去冗食復其全俸則二人之俸可以周一人之用衣食既足亷恥自興又曰今民政之闕者田税未均𣙜酤未寛土木未停督歛未平牧宰未良田税不均則兼并之家私土多而公田少剥上損下在扵此矣𣙜酤未寛則民多犯禁而為盗且山海酒麴之利皆民所共今盡奪之是與民爭利反害之也或少寛之國用未必乏而民且不犯矣土木未停則民困扵力役而國用多費且廣興寺觀意将祈福曾不知求福在乎修政又何土木之為夫督歛不平則民受刻削而刑禁濫施葢簿書舛謬遂至償納或祖父所負延及子孫或本非主守而均扵干繫或不自侵欺而類扵失陷彌年累嵗箠楚日加無益扵官徒傷扵衆夫牧宰不良則民受弊而政不行葢貪猥者貨賄公行殘暴者刑罸不節執滯者通變莫適怯懦者狡吏肆毒又曰銓選之門徒有其名莫責其實有殿者雖加厚罸有最者莫見明揚或驟遇寛恩則不限其功過靡逢舉薦則終困扵徒勞又曰貢舉不嚴則權勢爭前而孤寒難進必欲均之莫若令皇朝三品及見任文武升朝官子孫弟姪薦名扵兩監而未升朝官子弟及白屋之士薦名扵州郡然後升扵禮部第其可否亦兩分之若然則權勢異途孤寒自進矣刑部員外郎馬亮上疏言陛下初政軍賞宜速而所在不以時給請遣使分往督視又州縣逋負至多赦書雖為蠲除而有司趣責如故非所以布宣恩澤也國朝故事以親王判開封府地尊勢重疑隙易搆非保親全愛之道契丹仍嵗内㓂河朔蕭然請修好以息邉民凡四事比部貟外郎刁衎上疏言陛下纉圖伊始布政惟新所宜上順天心下從人欲邀善以去惡避毁而来譽道唐虞之治斥辛癸之亂私賞無及扵小人私罰無施扵君子任賢勿貳去邪勿疑開諫諍之門塞䜛佞之口愛而知其惡憎而知其善無以春秋鼎盛而躭扵逸逰無以血氣方剛而惑扵聲色若太祖之勤儉若大行之惠慈荅天地敷錫之恩思祖考艱難之業則周成漢文三宗之羙不可同年而擬議也庚寅閤門奏每月朔望群臣赴萬壽殿哭臨十月朔在壬辰請改用九月晦上問吕端曰此何禮也端曰隂陽家以辰日為哭忌上曰哀疚之情寧有所避乎不許先是壽州獻緑毛龜金文界道粲然上以為介蟲而毛天意或有所警戒令宰相詳考以聞扵是吕端等言曰臣等寡聞安能究知天意然嘗聞扵師曰聖人之意與天合符茍睿思徘徊属扵一物必神靈肸蠁有所啟焉今神龜所得之地地名壽春陛下頃升皇儲實自壽邸由是言之則是龜也特為陛下而生将使陛下後天而老既壽且昌乎又龜在水族義主扵隂介者剛物也毛者柔物也夫戎夷之類皆禀隂氣天戒若曰将有剛獷不賔之敵柔伏来庭乎且陛下自即大位首念西人困于飛輓繼遷兇羯亦降使推恩不問前罪且繼遷亡命日乆亦厭兵矣脅從之黨亦厭亂矣悛心革面匪朝伊夕北戎倔彊為患滋深部族携離復荐飢歉必恐相率懐柔願伸欵附望陛下欽若天意彌闡皇猷雖休勿休日慎一日則靈物之出豈徒然哉上曰卿等所陳甚為詳備然朕以為龜有毛者文理之象八卦蓋文理之實也附卦生毛文理之華也豈天意有所属乎卿等其悉心修輔慰朕意焉冬十月陳宋州並言先貸民錢千萬令市牛價納外所負尚多許随来嵗夏秋税輸送詔悉除之知益州張詠奏屯駐兵士所請錢乞依元降宣㫖銅錢一文與折支鐵錢五文是時陜路轉運使韓國華到闕又言川陜州縣幕職官等所請月俸銅錢一文止支錢二文望增加鐵錢分數帝令支銅錢一文易給鐵錢五文會要至道三年十月事咸平三年五月又五年七月可考己酉葬太宗神功聖徳文武皇帝扵永熈陵十一月甲子祔神主扵太廟太宗廟未見樂舞名當檢以懿徳皇后配又祔荘懐皇后扵别廟上初祀天地宗廟有司請署祝版上涕泗交下不能署者乆之靈駕發引上與諸王徒歩號慟從至乾元門禮官具禮遣奠畢改吉服上不忍哭踊盡哀縗服還宫及神主至京迎拜涕咽觀者莫不􅒣欷祔廟前霖雨至日頓止咸謂孝徳所感也先是上謂參知政事李至等曰神主至京朕欲親導及拜辭扵禮可乎至曰此禮前代所闕陛下行之足以為萬世法矣即具儀以聞時有建議請增損舊政者上曰先帝賜名之日撫朕背曰名此欲我兒有常徳乆扵其道也罔極之訓朕何敢忘因涕泣沾衣左右無不感咽此事出寳訓孝徳門云是咸平初因附見導迎神主之後本紀云請改御名與寳訓異丙寅徳音降兩京死罪以下囚縁山陵役民賜租有差復分三司勾院為三命官各判之以太常丞王欽若判三司都催欠憑由司欽若新喻人初為亳州判官監倉天乆雨倉司以糓濕不為受民自逺来輸租食糓且盡不得輸欽若悉命輸之倉且奏不拘年次先支濕糓即不至朽敗太宗大喜手詔褒答因識其姓名及開封府以嵗旱蠲十七縣民租時有飛語聞上言按田官司欲收民情所蠲放皆不實太宗不悦御史臺探帝意請遣使覆實乃詔東西諸州選官閲視亳州當按太康咸平二縣遣欽若行欽若覆按甚詳抗疏言田實旱開封止放七分今乞全放既而他州所遣官並言諸縣放税過多悉追収所放税物人皆為欽若危之踰年而上即位於是擢用欽若因以其事語輔臣曰當此時朕亦自懼欽若小官獨敢為百姓伸理此大臣節也欽若既為三司属虞部貟外郎母賔古謂欽若曰天下宿逋自五代迄今理督未巳民病不能勝僕將啟而蠲之欽若即夕命吏治其數翌日上之上大驚曰先帝顧不知耶欽若徐曰先帝固知之殆留與陛下收天下心爾上感悟卒從其言母賔古未見邑里按二縣税此據沈括筆談母賔古事歐靖聖宗掇遺及國老閒談皆有之新傳亦已収入本傳稱度支判官母賔古乃咸平元年四月辛亥賔古初以虞部貟外郎為度支判官而已己酉日遣使四出放欠葢行欽若之言也欽若雖因賔古乃建白然不必賔古在度支且賔古素有此議不必在度支乃發今但稱其官庶不相牴牾記聞稱欽若亳州秩滿太宗擢為京官按欽若本傳自亳州推官遷秘書郎監廬州税而附傳載欽若為亳州推官監司薦其才就除亳州判官改秘書郎監廬州税似不縁監倉被知也疑不敢著今但云識其姓名沈括筆談云首擢欽若為右正言為右正言乃二年二月事其初但為太常丞判催欠憑由司耳括誤也夏竦作欽若行状云欽若為亳州防禦推官属朝廷遣著作佐郎直史官曾㑹中使李如信察近郡風俗吏民状公政迹會等上之有詔褒諭就遷判官按此則曾會非守臣也沈括筆談云亳守曾會素以公輔期欽若故遣覆按二縣税臨行戒之與竦行状差殊今不取又云屯田員外郎舒雅薦欽若文藝可稱溫裕有素特改秘書郎司市徴扵淝上真宗即位就遷太常丞有詔舉三司判官給事中喬維岳薦之召判憑由理欠司王皥百一篇云計省故事凡禁中用度須索供億皆中覆所用給文憑支破王欽若判憑由司曰至尊中用度豈臣下所預乃建白設御寳憑由司扵是外不復冇所關防真宗始創法專意明察羣下不敢欺末年不豫日乆所費不貲迄今為弊攸司出納之吝無由施矣冀公由之大用寵任無比皥載欽若被知與他書絶異附見當考祥符元年三月詔御寳憑由不經三司與此相關已已詔工部侍郎集賢院學士錢若水修太宗實録若水舉官同修起居舎人李宗諤與焉上曰自太平興國八年已後皆李昉在中書日事史䇿本憑直筆若子為父隠何以傳信扵後代乎除宗諤不可餘悉許之是日同幹當審官院通進銀䑓司封駮事田錫又上疏曰臣昨七月二十五日所進封章為言地震之災是彰下動之象臣經宿思慮以其事非外人所可得而知非大臣不可與之議臣逹旦憂懼以所奏請陛下且留中不出乞陛下與大臣略言至二十六日再上封章所貴謹宻未審陛下曾以其事與大臣評議否不知大臣曾聞其事為陛下商較否今地震之災漸見下動之象已萌臣見銀臺司諸道奏報自九月初至冬節前申奏賊盗不少今不一一具奏慮煩聖聰且據其可言者一二而言之九月四日施州奏群賊四百餘人驚刼人戸十月七日滑州奏有賊四十餘人過河北十五日衛州奏有賊七十餘人過河北十九日絳州奏垣曲縣賊八十餘人殺縣尉成柄西京奏十月二十三日有賊一百五十三人入白波兵馬都監􅇬署並劫一十四家至午時奪州船往垣曲至河陽鞏縣界濮州奏群賊入鄄城縣單州奏羣賊入歸恩指揮營濟州奏群賊劫金鄉鉅野縣郭十九家永興軍奏虎翼軍賊四十餘人劫永興南荘今月二日西京奏王屋縣賊一百餘人白髙渡潰散軍賊六十餘人七日陜府奏集津鎮羣賊六十餘人並驚刼人戸至午時乘船下去峡石縣群賊自河北渡過河南八日西京奏草賊見把截土豪鎮官私往来不得豈有京師咫尺而羣盗如此邉防寜静而叛卒如是臣所謂地震之災漸見下動之象已萌臣為陛下憂之臣每見宣命指揮以諸處奏報但令廵檢使臣掩捕但令廵檢分地襲逐而安之討之未見其嘉謀備之禦之未見其逺慮若其勢漸盛而有謀者與之為謀其力難制而思亂者濟之為亂乃是國家失扵早圗乃是朝廷失扵輕事今地震之災漸見陛下何不早謀而杜其漸下動之象已萌陛下何不熟慮而防其萌臣七月所奏望再取披詳今所奏望必垂聽信防其萌正在今日杜其漸不可失時近京盗起既如此向西民困又如彼昨楊允恭請置糧草車三千輛要推車兵士一千人盧之翰兩状奏乞自京支撥錢四千五萬貫度支奏靈州五月下旬米每升一貫文要車子運糧是邉上倉廪素無儲備矣請自京支錢是關右帑庫素無積蓄矣奏米每斗十貫文即靈州軍民今已餓殍矣未審朝廷惜靈州有何所得棄靈州有何所失若因力役永息而中原難起制禦失宜而外方變生實謂所得不如所失也今陛下宜精扵所慮斷在不疑若惜靈州必然有益扵國家即乞明降𠡠書曉諭天下使天下知之棄靈州必然有損扵國家亦乞明降𠡠牓曉諭使天下知之曉諭之意以蘓息萬民為意取捨之謀以優卹萬民為謀令邉敵知取捨之謀使中外知損益之理示朝廷之大體表王道之至公此所謂陛下修徳以禳地震之災此乃是陛下早圖以防下動之象若賊勢漸盛民患未除而謀慮之不深翦滅之未得被賊輒據州郡僣稱公侯河北倉厫能先占取河西部落来與結連百姓力役之未休四方觀望而相效此事非細繫社稷之安危此事非輕係朝廷之治亂今廟堂之上必有嘉謀樞軸之間必有善計若言小小㓂盗不勞聖慮憂虞若以屢屢指揮只令使臣捕逐如此則羣盗終難翦滅如此則諸處終未平寧若賊徒聚得三二千人徑渡淮南往保呉越則運糧綱船不至京師矣若賊徒取得一二州郡善據要衝則上供錢帛不充國用矣因此則人情必有向背人情必有向背則軍情豈無動揺當此時北敵輙来騷邉陛下不得不憂西戎輙来犯塞大臣不得不懼臣今所言激切不為身謀所慮安危實為國計先是西鄙運糧詔以諸軍代民輓送已夘士卒亦令歸仍賜緡錢苦寒故也上御便殿閲殿前指揮使内殿直騎射鬭槊擢精鋭者十餘人先是彎弓二百斤放長箭者謂之大弓箭止能步射有王貴者自言能馬射於是馳鞚引滿綽有餘勇加賜緡錢乙酉廢理檢院是月有司言冬至祀圜丘孟夏祀雩夏至祭方澤請奉太宗配上辛祈糓季秋大饗明堂奉太祖配上辛祀感生帝孟冬祭神州地祇奉宣祖配其親郊圜丘奉太祖太宗並配詔可十二月甲午錢若水等言所修太宗實録自太平興國八年以前君臣獻替不著扵話言淳化五年以前親决萬㡬不聞扵䇿府請降詔㫖許臣等扵前任見任宰相參知政事樞宻院使三司使等處移牒求訪以備闕乏許之丙申追尊賢妃李氏為皇太后后䘮先殯扵普安院扵是議改卜園陵立忌建議有司言案周禮春官大司樂之職奏夷則歌仲吕以饗先妣先妣姜嫄也是帝嚳之妃后稷之母特立廟名曰閟宫晉簡文宣后即不配食築宫扵外嵗時享祭唐先天元年始祔昭成肅明二后扵儀坤廟又元宗元獻楊后立廟扵太廟之西稽扵前文咸有明據望令宗正寺扵后廟内修奉廟室為殿三間設神門齋坊神厨以備薦饗從之又言先逺之吉時序尚賖猶處殯宫未克進祔薦饗之制慮有闕如徧討禮經蔑聞前範稱情起義自我而初欲望自今朔望及諸節四時薦新並就攅宫權設幄殿命内臣奉事又從之辛丑詔諸路轉運使申飭部下令長勸課農桑先是上訪宰相以靈武事宜參知政事李至上疏曰伏以河湟之地夷夏雜居徃者唐都長安宻邇京邑陷復盟叛其事不常古先聖王置之度外唯驅除而已亦何必使禮義之鄉竭膏血以奉無知之俗較其勝負哉且賊繼遷蠢爾賊類騷動疆場然臍不足以弭怒擢髪不足以數罪然聖人之道務屈已含垢以安萬人葢所損者小所益者大耳臣不敢廣引前史上煩聖聰直以唐憲宗時一事明之王承宗據鎮陽叛命邀旄鉞未獲潜使客刺武元衡傷裴度其為罪逆大矣而憲宗以百姓之故下詔雪之伏自先帝厭代陛下肇位赦繼遷之罪厚推賜與降尺一之詔慰其反側命一介之使諭以綏懐此時中外之人皆曰陛下以元元為念不以大憝介意斯實元和之君不能逺過臣料彼脅從亦厭兵乆矣茍朝廷舎之不問待之如初以厚利啗之以重爵悦之亦安敢迷而不復訖扵淪胥哉至扵靈州自鄭文寳為國生事致朝廷旰食懐西顧之憂關輔生靈困轉輸之役積骸蔽野十室九空餓殍滿城邉氓盡沒巋然空壁老我師徒而張頥待飼者不下五千送糧四十萬而止獲六萬此則求欲固守不可得也臣料繼遷若急攻不已則城危可知今緩而来者意欲竭我財用困我民力堕彼之計也當此之時若不能改絃易轍則前日之患未艾也請粗言之鄉者鄭文寳絶其青鹽不入漢界禁其粒食不及蕃夷使彼有辭而我無謂此之失䇿雖悔何追扵是熟戸之人亦同叛渙今若復令禁止不許通糧恐非制敵懐逺不戰屈人兵之意也且獸窮則搏鳥窮則啄若乗秋入冦伺隙窺邉則朝廷安可不發兵以禦之師興矣必竭芻糧關輔之人又不堪命輾轉東夏則懐孟西洛亦無聊生陛下何不深思逺慮防未萌之患臣嘗見唐田承嗣乆拒王命代宗念百姓無辜罹患毎含忍之初興師討伐元載王縉聞魏州鹽價髙請扵要路加兵守捉禁鹽入彼以弱其人代宗曰朕意與卿全殊卿欲禁鹽朕欲開路從鹽入承嗣一人負朕魏州百姓何辜朕為之主不能䘏飬致使兵戰塗炭有愧良深焉得更扼喉命以重其禍尋而承嗣抗表束身歸朝臣謂陛下宜行此事以安邉境使其族類有無交易售鹽以資其利通糧以濟其命彼雖蕃夷必翻然向化互相告諭皆感恩服徳背逆助順則繼遷小子孤而無輔又安能為我蜂蠆哉今靈州不可堅守萬口同議非臣獨然皆以為移朔方軍額扵環州亦一時權道也且彼之戸口四千有餘今則不盈數百矣彼之租課四十五萬二千有餘今則無孑遺矣安可復守之俟我民庶完葺聖徳廣被流沙葱嶺皆為内地何止朔方一郡哉或曰靈州者咽喉之地西北要衝安可棄之反為敵有臣應之曰此謂咽喉者必金城湯池屯兵積粟四出以邀之多方以扼之今則閉壁而已自固不暇何咽喉之有哉且螫手斷臂事非獲已葢所保者大况繼遷之衆行逐水草居無定所豈有如漢兵守陴必不然矣又曰設使靈州既棄必為繼遷所據若且耕且戰足食足兵或求請無厭苦為應副或事勢轉大何以枝梧臣又對曰假如靈州不棄何以絶其求請何以弱其事勢且邀朔方而取張浦求請已多蓄戰馬而聚甲兵事勢已大但諸蕃和則事勢弱事勢弱則求請絶故臣前謂使其族類有無交易售鹽以資其利通糧以濟其命使曲在彼而直在我問有罪而罸有名天地亦所不容鬼神亦所共怒繼遷不日當自滅亡何耕戰兵食之云乎扵是李繼遷遣使修貢求備藩任上雖察其變詐時方在諒闇姑務寧静因從其請復賜姓名官爵甲辰以銀州觀察使趙保吉為定難節度使遣内侍右班都知張崇貴賫詔賜之甲寅又以張浦為鄭州防禦使遣還按宋史太宗以浦為鄭州團練留京師上初命翰林學士宋湜草保吉制湜知上意必欲歸其事扵太宗因進辭曰先皇帝早深西顧将議真封属軒鼎之俄遷建漢壇之未及眷兹遺命實付眇躬爾宜望弓劍以拜恩守封疆而効節上甚悦繼遷入貢正史實録會要並不著其月日不知何也制辭據朝野雜編與實録所載差異疑史官或加潤色耳雜編云真宗即位之次年又云張洎蘓易簡草制不稱㫖皆謬也今削去初刑部郎中知揚州王禹偁凖詔上疏言五事禹偁奏議云五月十八日上其一曰謹邉防通盟好使輦運之民有所休息方今北有契丹西有繼遷契丹雖不犯邉戍兵豈能减削繼遷既未歸命餽餉固難寝停關輔之民倒懸尤甚臣愚以為陛下嗣位之始當順人心宜𠡠疆吏致書敵臣使逹北庭請尋舊好下詔赦繼遷之罪復與夏臺臣頃在翰林見繼遷上表云乞取殘破夏州奉拓㧞氏祭祀先朝雖有批答允許鄜州繼遷本是反側之人豈肯束身歸國今嗣統之後大振皇威亦恐繼遷令人進奉因舉前事彼必感恩此亦不戰屈人之師也如其不從則備禦誅擒皆有方略且使天下百姓知陛下屈已而為人也或曰冨國強兵不可示人以弱此乃誇虗名而忽大計者也其二曰减冗兵併冗吏使山澤之饒稍流扵下伏以乾徳開寳以来國家之事臣所目覩當時東未得江浙漳泉南未得荆湖交廣朝廷財賦可謂未豐然而撃河東備北敵國用亦足兵威亦強其義安在所蓄之兵鋭而不衆所用之将專而不疑故也自後盡取東南數國又平河東土地財賦可謂廣矣而兵威不振國用轉急其義安在所蓄之兵冗而不盡鋭所用之将衆而不自專故也今誠能簡鋭卒去冗兵而委之将帥用恩威法令駕馭之資以天下財賦而曰兵不振用不豐未之有也臣愚以為宜經制兵賦如開寳中則可以髙枕而治矣且開寳中設官至少臣本魯人占籍濟上未及第時常記止有刺史一人李謙溥是也司户一人今司門員外郎孫貴是也近及十年朝廷别不除吏當時未嘗闕事自後有團練推官一人今樞宻直學士畢士安是也太平興國中臣及第歸鄉有刺史程廷山通判閻暐副使閻彦進判官李延推官李宣監庫沈繼明監酒𣙜税算又增四貟曹官之外更益司理問其租税减扵曩日也問其人民逃扵昔時也一州既爾天下可知冗吏耗扵上冗兵耗扵下此所以盡取山澤之利而不能足也夫山澤之利與民共之自漢以来取為國用不可棄也然亦不可盡也方今可謂盡矣何以知之只如茶法從古無稽唐元和中以用兵齊蔡始建其法唐史稱是嵗得錢四十萬貫東師以濟今則數百萬矣民何以堪臣故曰减冗兵併冗吏使山澤之饒稍流扵下者也三曰艱難選舉使入官不濫古者鄉舉里選為官擇人士君子修行扵家行推扵衆然後薦之扵朝故政和而民泰歴代雖有沿革未嘗逺去此道隋唐始有科試得人之盛與古為侔然終太祖之世科試未嘗不難每嵗進士不過三十人經學五十人重以周祖之後諸侯不得奏辟士大夫罕有資廕故有終身不獲一第沒齒不獲一官者先帝毓徳王藩覩其如此臨御之後不求備以取人舎短從長㧞十得五在位将逾二紀登第亦近萬人不無俊秀之才亦有容易而得臣愚以為數百年之艱難故先帝濟之以汎取二十載之霈澤陛下宜糾之以舊章伏望以舉塲還有司如故事至扵吏部銓擇官材亦非帝王躬親之事比来五品以下謂之㫖授官今則幕職州縣而已京官雖有選限多不施行太祖以来始令後殿引見因為常例以至先朝詞選之徒多求僥倖臣愚以為宜以吏部還有司依格𠡠注擬其四曰沙汰僧尼使民無耗夫古者惟有四民治民者士也故受養扵農工以造器用商以通財貨皆不可闕而兵不在其數葢井田之法農即兵也自秦以来以強兵定天下故戰士不服農是四民之外又生一民所以農益困然而執干戈衛社稷理不可去也漢明之後佛法流入中國度人修寺歴代增加不蠶而衣不耕而食是五民之外又益一而為六也唐韓愈諫憲宗迎佛骨表備言其事假使天下有萬僧日食米一升嵗用絹一疋是至儉也猶日費三千斛嵗用萬縑何况五七萬軰哉又富者窮極口腹一齋一衣貧民百家未能供給不曰民蠧其可得乎臣愚以為國家度人衆矣造寺多矣計其費耗何啻億萬先朝不豫捨施又多佛若有靈豈不䝉福事佛無效斯可知矣願深鍳治本亟行沙汰如以嗣位之初未欲驚駭此軰且可一二十載不令度人不許修寺使自銷鑠而去之亦救弊之一端也其五曰親大臣逺小人使忠良蹇諤之士知進而不疑姦憸傾巧之徒知退而有懼夫君為元首臣為股肱言同體也得其人則勿疑非其人則不用凡議帝王之盛者豈不曰堯舜堯舜之時百姓不親五品不遜契作司徒敷五教蠻夷猾夏冦賊姦宄咎繇作士明五刑伯夷典禮后䕫典樂禹平水土益作虞大哉堯之為君可謂委任責成而無疑矣或曰誠如是堯有何功徳耶臣曰有知人任賢之徳雖堯之道去世遼逺恐不可復臣以近世言之惟有唐之政可損益而行之元和中憲宗嘗命裴垍銓品庻官垍曰天子擇宰相宰相擇諸司長官諸司長官自擇僚属則上下不疑而政成矣陛下之明擇宰相數人猶有非其人者况臣之不佞擇數十人諸司長官常恐不逮若更擇庻官恐非致治之要當時識者以垍為知言願陛下逺取帝堯近覧唐宗既得宰相用而不疑使宰相擇諸司長官諸司長官自取僚属則垂衣而治矣古者刑人不在君側語曰放鄭聲逺佞人又曰浸潤之譛膚受之愬不行焉可謂明矣是以周文王左右無結韈者言皆賢也夫小人之徒巧言令色先意希㫖事必害正心惟忌賢非聖帝明王不能深察舊制南班三品尚書方得升殿比来三品奉職卑賤可知或因遣使亦可升殿惑亂天聽無甚扵此願陛下振舉紀綱尊嚴視聽在此時矣臣愚以為今之所急在先馭兵使衆寡得其宜措置得其道然後議吏使清濁殊途品流不雜然後難選舉以塞其源禁僧尼以去其耗自然國用足而王道行矣今若不去冗兵不併冗吏不難選舉不禁僧尼縦使减人民之賦寛山澤之利其可得乎疏奏即召禹偁還朝既用其䇿以夏綏銀宥靜五州賜趙保吉翌日命禹偁守本官復知制誥與兵部郎中史館修撰李若拙並命禹偁前以學士出在至道元年五月戊午秘書丞勾當京兆府三白渠孫冕上疏言九事一擇賢才二詢讜議三逺邪佞四務節儉五明賞罰六慎號令七重使介八審薦舉九推恩信賜詔奨之尋召試授直史館直館在明年九月今并書國初罷節鎮統支郡以轉運使領諸路事其分合别未有定制京西分為兩路河北既分南路又分東西路陜西分為陜西河北西南兩路又為陜府西北路淮南分為西路江南分為東西路荆湖兩路或通置一使兩浙或為東北路其西南路實兼福建劍南初曰西川後分陜路西川又分東西路尋并之是嵗始定為十五路一曰京東路二曰京西路三曰河北路四曰河東路五曰陜西路六曰淮南路七曰江南路八曰荆湖南路九曰荆湖北路十曰兩浙路十一曰福建路十二曰西川路十三曰陜路十四曰廣南東路十五曰廣南西路咸平二年三月戊辰荆湖南北路始置兩使凡租税有糓帛金鐵物産四類糓之品七一曰粟二曰稻三曰麥四曰黍五曰稌六曰菽七曰雜子布帛絲綿之品十一曰羅二曰綾三曰絹四曰紗五曰絁六曰紬七曰雜折八曰絲線九曰綿十曰布金鐵之品四一曰金二曰銀三曰錫鑞四曰銅鐵物産之品六一曰畜二曰齒革翎毛三曰茶鹽四曰竹木麻草芻茭五曰果藥油紙薪炭漆蠟六曰雜物至道末嵗收榖二千一百七十一萬七千餘石錢四百六十五萬餘貫絹一百六十二萬餘疋紬絁二十七萬三千餘疋絲線一百四十一萬餘兩綿五百一十七萬餘兩茶四十九萬餘斤芻茭三千萬圍蒿二百六十八萬圍薪二十八萬束炭五十萬秤鵝翎雜翎六十一萬餘莖箭榦八十七萬隻黄蠟三十餘萬斤此皆踰十萬數者他不復紀
