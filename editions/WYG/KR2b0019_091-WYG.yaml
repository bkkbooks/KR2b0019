body:
  text: 續資治通鑑長編巻八十七宋李燾撰真宗大中祥符九年五月甲辰朔詔以來年正月一日詣玉清昭應宫與天下臣庶恭上玉皇天帝聖號寳冊又以十七日有事於南郊行恭謝之禮諸軍賞賜並以内蔵物充三司勿催促諸路錢帛諸州軍監無得以修貢助祭為名輙有率歛令寧化軍葺天池神堂北界嵗遣使一祀因其頽圮北界請加繕治故也乙巳建皇親禮㑹院於新昌坊賜名嘉慶邠寧環慶部署王守斌言夏州蕃騎千五百來冦慶州内屬蕃部擊走之丁未殿中侍御史張廓言羣官有丁父母憂者多免持服非古道也伏望自今並依禮令觧官行服詔從之其官秩當起復及武臣内軄悉如舊制詔權停貢舉戊申廣西路轉運使俞獻可言撫水蠻拒命侵掠不已請益宜州戍兵從之即命東染院使平州刺史知辰州曹克明為宜融桂昭桞象邕欽廣白等都廵檢使兼安撫使殿直閤門祗候馬玉馬玉未見為同廵檢兼安撫都監並管勾溪洞事嵗給公用錢三十萬發潭州駐泊虎翼兵三百人付之初軍士與蠻鬭頗有中傷者王旦曰蠻衆無行陣非敢與官軍敵但潛伏山林要路施藥箭耳因賜宜州廵檢觧刀劍藥且戒其預偹克明等既至蠻酋請罷兵克明不許又獻藥一器曰谿洞藥箭中人可以此觧克明曰何以騐之曰請試以雞犬克明曰當試以人乃以箭刺酋股而飲以藥即死羣蠻慙懼而退蠻夲𫝊云獻可請以夲道澄海軍及募丁壮進討乃詔益以潭州兵五千人命曹克明王文慶馬玉楊守珍為安撫使及都監按守珍七月乃赴任此時未也王文慶六月初以修明道宫成轉内殿崇班亦不見除安撫都監不知傳何以云爾恐或差誤故兵數止從實録李溥言饒池江杭四州錢監毎嵗共鑄錢一百二十萬貫用銅四百五十三萬斤四監及産銅州軍見管銅共一百五十二萬一千二百餘斤又信州隂山等處銅坑自咸平初興發商旅競集官場嵗買五六萬斤採取既多其後止及二三百萬斤望酌中定額上曰甞記咸平中陳恕以江南銅多請官少市未㡬銅礦漸少迄今常若不豐如觧池鹽景徳中所收數倍本州亦欲少種不逾年雨旱驟減舊額是知天地所育皆貴濟用豈人心可料其増損耶庚戌御製元符觀頌刻石壬子玉清昭應宫景靈宫㑹靈觀請於見役兵匠中選三五百人以備繕修詔以二百人為額淮南江浙荆湖制置發運使李溥以嵗滿再任溥自言江淮嵗入茶視舊額増五百七十餘萬斤又言漕舟舊以使臣或軍大将人掌一綱多侵盜自溥併三綱為一以三人共主之使更相伺察是年初運米一百二十五萬石才失二百石云乙卯環慶路承受公事王從徳等言北界穆什族軍主朗宻郭咩族蕃官伽强楚宻克族蕃官馮伊特滿率其属千一百九十人牛馬雜畜千八百三十器械百一十四事來歸降詔撫之是數族者已甞内附後為夏州脅制背去至是苦其力役故復欵塞云王從徳未見丙辰以景靈宫㑹靈觀及兖州景靈宫太極觀成羣臣稱賀㑹靈觀宇區數夲志闕之當考徳音降天下死罪囚流以下釋之開封仙源奉符衡山華隂曲陽登封諸縣免今年夏税十之三東畿他縣及五州府餘縣免十之二丁巳命中書侍郎兼刑部尚書平章事向敏中為兖州景靈宫太極觀慶成使所至仍察吏治民隐聽以便宜從事辭日上賦詩寵其行戊午詔奨夀春郡王友張士遜等以王讀孝經徹章故也王初為詩即自成章有人心懐禮義之句上喜以語輔臣詔黄汴廣濟石塘河催綱廵河京朝官使臣自今毎嵗許一次入奏三門白波發運判官毎嵗許二人更畨入奏林特言兖州仙源縣募置軍士五百三十一人以給景靈宫太極觀洒掃之役望立為清衛左第三指揮從之己未河北轉運使李士衡獻助南郊絹布六十萬匹錢二十萬貫且言六十萬皆合上供者餘二十萬即本路羨餘請遣使臣起發先是毎有大禮士衡必以所部供軍物為貢洎計司檢勘其數多失實故是奏件析之有詔嘉奨因謂輔臣曰士衡應卒有材然事多忽略故人往往以虚誕目之然朝廷所須随小大即辦亦其所長也本傳以應卒有才等語為王旦對上之辭今從實録庚申景靈宫使向敏中修宫使丁謂並加兵部尚書副使以下皆進秩各賜衣帯器幣宫宇揔七百二十六區壬戌以黔州廂陽寨主右班殿直劉永為右侍禁軍校土丁寨将三十一人次第遷補仍賜緡錢以擊殺蠻㓂有功故也天平軍節度使贈侍中周瑩卒録其子孫凡四人瑩在樞近無他謀略及蒞軍旅以畏懦自全累厯藩閫多曠職有司初議諡忠穆時以為溢美即改元惠詔可故事大禮覃慶外藩無賜物例東封嵗瑩鎮澶淵車駕所經故特有襲衣金帯器幣之賜祀汾隂瑩知定州乃預上言禮成所賜望於治就給人多笑之甲子降詔奨曹瑋瑋增修弓門冶坊和爾揚静戎三陽定西伏羗永寧小洛門威逺等寨浚壕凡三百八十里皆以寨户廂軍給役無擾於民故也又詔嘉勒斯賚埒克遵有事宜至渭州者亦令瑋管勾初郭敏還自甘州即補借職復使賫賜其罕器幣入蕃至總噶爾埒克遵留之於是罕乃遣其首領李吉等九人送楊知進還埒克遵并留吉等遣輝和爾語輝和爾曰楊奉職往甘州五年今郭借軄往若更住則重煩朝廷取接輝和爾宜急寫領賜物表來就取所賜物當放吉等歸又語知進曰秦州大人部領軍馬直入咱爾隆慮蕃部有鬭諜者還日幸為我言願罷兵耳令蕃漢作一家即不輟貢奉也因遣其種人當貝實送知進逹境上并獻馬知進言埒克遵娶蕃部十八女為妻嘉勒斯賚又娶埒克遵姪女埒克遵御下嚴暴蕃部不樂嵗旱人多餓死止有質帳二三千其勢稍蹙矣是日左天廏坊草場火将士力救及焦灼者第遷資級餘賜緡錢因令京城草場以泥覆之乙丑以王旦為恭上寳冊南郊恭謝大禮使向敏中為儀仗使王欽若為禮儀使張旻為鹵簿使曹利用為橋道頓逓使又以旦為天書儀衞使欽若為同儀衛使丁謂為扶侍使又以謂為修奉寳冊及参詳儀制使同玉清昭應宫副使林特翰林學士陳彭年分為副使陳堯叟言以疾在告請停生日恩賜詔輟宴而賜物如例丙寅謁景靈宫宴從臣於明福殿賜宫使而下器幣緡錢有差分遣官以宫成告天地玉清昭應宫太廟后廟社稷㑹靈觀太一宫丁卯以淮南江浙荆湖發運使北作坊使奨州團練使李溥為宫苑使京東轉運使司封員外郎李湘為祠部郎中監察御史知兖州王臻為殿中侍御史奨修宫觀之勞也戊辰上謂輔臣曰法官毎定羣臣封奏多引往年詔敕云非有大益無改舊章所奏請不行王旦曰起請頻仍則詔令有礙是以法官重於更改丁謂曰近李溥請私鬻鹽茶随􅂍仗全給與人充賞者多稱假借却給原主頗容情弊望並納官法寺詳定已從溥奏上曰特從溥奏者正是惮其不伏爾下位有所見當詳究利害而行之辛未内出司天奏嵗星太隂失度太白髙主兵在秦分上謂輔臣曰秦地控接西蜀疆境甚逺軍中不逞輩慮忽聚盗宜警備之嘉勒斯賚與秦渭熟户結為釁隙曹瑋請益屯兵可如所請川陜長史監押廵檢有曠弛者代之壬申置景靈宫副使以尚書右丞趙安仁為之詔中書樞宻院三伏聽午時歸第著于令六月甲戌朔詔自今吏部選人有罪犯者銓司未得定入官資叙並具考第及所犯取進止先是銓司請曽經追停人再理考限及格乃得入令録上曰若是則沉滯者衆矣朕近見一選人淳化中及第二十餘年公私事故至今未及十考由是而言不宜更加考數因條約之丙子詔年豐物賤宜申諭民間無得輕棄粒食違者論罪戊寅幸㑹靈觀酌獻宴從官於祝禧殿辛巳比部員外郎知齊州范航坐受財枉法免死杖脊黥面配沙門島航為吏所在貪狠持人長短衆多惮之上之尹京也航宰東明民有訟其鬻虚鈔納物者事狀明白按劾已就府佐皆曰此凶人慮有反覆須結正堅固乃可上聞洎府臺覆按事果中變航止罰金而已後任河東提㸃刑獄表求知博州聊城縣雖云便於舉𦵏實以是邑富饒利於掊歛在齊州尤狡蠧不法笞箠無度彊取財物其子昭為太常博士直集賢院聞其醜聲走僕齎書諌勉航怒重抶其僕至是提㸃刑獄滕渉常希古發其姦􅂍又揭牓令民首露得罪狀數十條遣御史李餗就鞫得實而竄之昭時任江南東路提㸃刑獄及受代還至南京上言願身為邉卒贖父移善地宰臣言父子罪雖不相及然亦當降其職任遂令釐務從之昭責降在九月己未今并書之甲申李士衡言河北螟蟲多不入田畆村野間有蟻食之又蝗飛空中有身首斷而殞者有自潰其腹有小蟲食之者斯乃妖不勝徳而示兹異也乙酉權三司使馬元方言來春大禮於内藏庫假賞賜物准奉祀例内有雜色帛匹内藏庫言咸平景徳以來南郊悉不支撥慮他時為例王旦曰初降御札令内藏給諸軍賞賜時元方言職司豈無經度其賞賜且依舊借内藏金萬两錢七十萬貫紬絹一百萬匹餘則三司規畫上曰元方在三司謗議甚多何也旦等曰元方盡心公家然性卞急而寡思慮同僚異議多以醜言詆之此所以賈怨也上曰副使判官中亦有英俊豈宜輕待耶居嵗餘卒以苛碎罷丙戍秦州獨孤谷水壊長道縣鹽官鎮城橋及官􅇬民舎二百九十二區溺死者六十餘人賜被溺家緡錢丁亥知許州石普請於大流堰穿渠置二斗門引沙河以漕京師遣使按視又請廢段家鎮移於建雄鎮詔問知陳州馮拯拯言無害乃許農隙興事己丑詔自今遣官奉青詞祝版御封香往諸處祭告並令緘封䕶持毎至驛舎安置静處務極嚴肅違者重科其罪合遣使臣者即選奉職已上賫送先是殿侍張信乗傳賫香合祝版赴南海致祭信寘於馬上頗虧恭潔至中路震死其左右聞空中有言云無損祝版香合朝廷聞之因有是詔辛卯涇原駐泊都監周文質言嘉勒斯賚遣人至渭州緣邉扇揺熟户且令納質不爾則破其聚落此雖未可慿信然蕃戎之情或以類相嚮緣此等熟户夲依朝廷不知安撫恐惶惑無從忽致離異臣欲親至籠竿城已來告諭再令納質或有蕃兵侵掠則許其應援詔曹瑋裁定而行之癸巳京畿蝗命輔臣詣玉清昭應景靈宫㑹靈觀建道場以禱之令廣州出廩米萬石選官出糶以濟民榖貴故也丙申上謂輔臣王旦等曰邉城言契丹征髙麗敗衂姦人諜之謂朝廷北伐彼甚為備盖多知天文近象緯示變皆主敵分其下必當有兵因自疑爾旦等曰契丹或㣲弱則愈依朝廷必無負約之理所慮弟兄之間自相離異如漢宣時争先來朝皆由㣲弱也虞部員外郎張懐寳秘書丞韓庶户部判官著作郎直史館梁固分判三司鹽鐡度支户部勾院賜庶緋衣先是起居郎樂黄目判三司勾院三司使馬元方言其不稱職罷之上謂王旦等曰人言三司官不欲數易盖吏人幸其更移不能盡究曹事之弊耳又勾院乃關防之局官卑權輕難舉其職旦曰三部勾院為一司實為繁劇縱使重官為之徒益事勢於勾稽則愈踈矣若復分三部設官選才力俊敏者主之庶乎分減簿領稍得精意故命懐寳分領焉韓庶未見丁酉知陳州馮拯言境内有蝗尋遣官祭告焚捕已盡田稼無害近頻得雨麥菽滋茂上遣中使督諸州捕蝗至襄州知州孫冲不出迎中使怒乃奏蝗唯襄為甚而州将恝置無䘏民意上怒命即置獄冲得属縣言嵗稔狀馳驛以聞上悟為追使者笞之此據冲夲傳附見庚子罷都大提舉在京倉草場官止命使臣二員提㸃辛丑太常博士范應辰言諸路多闕係官材木望令馬遞鋪卒夾官道植榆桞或随地土所宜種雜木五七年可致茂盛供費之外炎暑之月亦足䕃及路人從之范應辰徳化人秋七月乙巳俞獻可言撫水州蠻累為㓂盜宣㫖招諭曽不悛革近復集衆鈔掠融州廂陽等寨害廵檢范明望許臣與曹克明以便宜掩殺詔從之丁未増築京新城戊申詔諭南丹州刺史莫淮辿以其素懐忠順慮為撫水蠻所誘脅且令俞獻可曹克明安撫之己酉殿直新欽州咄歩寨主王素配𨽻荆南是寨久闕官俞獻可言當溪洞衝㑹求擇人補之三班以素充選仍令馳驛赴任素以地方瘴毒不欲行託疾在道二百餘日至襄州又稱病甚求免故黜之庚戍知廣州陳世卿言海外蕃國貢方物至廣州者自今犀象珠貝揀香異寳聽賫赴闕其餘輦載重物望令悉納州帑估直聞奏非貢奉物悉收其稅筭毎國使副判官各一人其防援官大食注輦三佛齊闍婆等國勿過二十人占城丹流眉勃泥古邏摩逸等國勿過十人並往來給劵料廣州蕃客有冐代者罪之緣賜與所得貿市雜物則免稅筭自餘私物不在此例從之中使自嵩山來言蝗飛至山南遇雨悉殞於澗中殆數千斛河東轉運使言潞州致祭蝗悉飛出境鄰州或祭或驅皆漸殞散辛亥飛蝗過京城上詣玉清昭應宫開寳寺靈感塔焚香祈禱禁宫城音樂五日先是上出死蝗以示大臣曰朕遣人徧於郊野視蝗多自死者翌日執政有袖死蝗以進者曰蝗實死矣請示於朝率百官賀王旦曰蝗出為災災弭幸也又何賀焉皆力請之旦固稱弗可乃止於時二府方奏事飛蝗蔽天有堕於殿庭間者上顧謂旦曰使百官方賀而蝗若此豈不為天下笑耶執政皆頓首曰王旦逺識非臣等所及也此事不得其的日因是日實録書飛蝗過京城故附見是日辛亥初九日也癸丑上謂宰臣曰中使自兖州來言飛蝗所至不食禾苗唯豆葉殆盡仍折禾持至穗甚長大朕疑其不實審詰之具言大率若是可以覆騐京中蝗蝻頗多聞城西隅有田家粟止數畆覩蝗至相顧而泣俄悉飛去無傷亦有豪族設長塹埋瘞而益多者王旦曰今嵗蝗螣非有神物主張則蔬果林葉殆無遺矣延州言州洎定平安逺塞門栲栳四寨山水汎溢壊隄城賜相王元偓彭王元儼九經甲寅遣官分詣京城寺觀焚香以蝗災也詔前降徳音賜酺宜俟來春上覽河西節度使知許州石普奏狀用許州觀察使印以問宰臣王旦曰節度州有三印節度印随夲使使闕則納有司觀察印則州長吏用之州印畫則付録事掌用暮則納于長吏凡節度使在夲鎮兵仗則節度掌書記推官署狀用節度使印田賦則觀察判官攴使推官署狀用觀察使印符刺属縣則夲使判署用州印故命帥必曰某軍節度某州管内觀察等使某州刺史言軍則專制其軍兵言管内則揔察其風俗言刺史則涖其州事石普獨署奏章當用河西節度使印也乙卯分命内臣開封府河東淮南路各三人京東京西河北路各五人與轉運使諸州通判職官按視蝗傷苗稼以聞仍許即時改種悉除其租申禁京城音樂十日宜州言撫水蠻圍思立寨監押劉斌帥兵拒退之又攻懐逺軍亦弗克詔奨其官吏将士仍賜鹽綵緡錢賜奨詔在八月庚子今并懐逺軍書之丙辰謁景靈宫幸上清宫㑹靈觀開封府言祥符縣赤岡村蝗附草而死者數里擷其草來上戊午詔停京城工役河東轉運使陳堯佐言本路屯兵舊以两川輦運帛疋充衣賜今請夲路自備今年冬衣計省綿絹五十餘萬以為上供丁謂曰河東夲無綿絹非可籌畫此盖轉運司毎嵗大計其數故積羨爾此可見丁謂與堯佐不相能也三司假内藏錢四十萬貫辛酉詔彊劫賊人罪當死以赦降從流者决訖仍𨽻夲城癸亥以蝗災遣官祀九宫貴神上封者言蝗旱由大臣子弟恣横所致也詔諭宰相令學士院降詔以警在位詔曰朕勤遵治化用致洽和而近以螟蝝傷于稼穡考前書之所記由部吏之侵漁属者郡縣之官冒法不檢子弟之軰怙勢肆求民實怨嗟氣用堙欝俯從輕典恐長弊風自今士大夫各務敦修更思教朂姑從保家之美勿貽敗類之羞茍掇顯尤難從末減仍令所在官司謹察視之甲子詔禁京城音樂盡此月以入内東頭供奉官楊守珍為宜融等州權同廵檢兼安撫都監管勾溪洞公事乗𫝊之任乙丑殿前都指揮使曹璨知秦州曹瑋丁内艱並起復丙寅京兆府華州並言田穀滋茂蝗飛越境有自死者上曰諸州奏牘多云飛往西北朕慮聚於山谷蝻蟲滋多宜令河東轉運使陳堯佐規度焚窖無使復生詔自今天下羣官職田並須遵守元制無得侵擾客户遇災沴即蠲省之先是殿中侍御史王奇請籍納職田以助賑貸上曰朕以此田均濟官吏夲欲人各足用責其清謹耳奇未曉給田之理然朕毎覽法寺奏欵在外官属所占職田多踰往制不能自備牛種或水旱之際又不蠲省致民無告遂罷奇奏降詔申敕焉丁卯幸太一宫還過近城觀耕民賜以茶絹己巳中使任守忠言自河東至見榖黍豆莢穗皆堅宻而長行次潞州惟㐮垣縣有蝗飛度不為災又相州言安陽縣有蝗抱草而死者約十餘里磁華瀛博等州並言蝗不為災王旦曰臣本貫大名有家人言食苗殊鮮近者分遣中使按視周悉可見陛下軫憂至深祈禱盡禮或聞多御蔬食今奏報至可以上寛聖念矣任守忠未見辛未向敏中還自兖州八月壬申朔曹瑋言伏羗寨蕃部斯吉特布與總噶爾族李摩拉木私立文法臣領兵趨之悉皆潰㪚夷其城帳訖甲戌詔兩省官并龍圖閣待制三司使以上自祀汾陰後來未經遷改者並特與轉官於是翰林學士承㫖李維等十人並以久次進秩乙亥以左司郎中知制誥朱巽知應天府兼南京留守司事刑部員外郎知制誥王随為工部郎中知制誥知揚州先是上謂宰相曰随在南京為治太寛王旦曰馮拯為中丞時随掌臺雜拯言随臨事汗漫上曰聞随将有所為必先為人所料都㑹之地無以弹壓㑹知揚州薛映求代即以命之仍令巽諭㫖戒敕丙子以陜西都轉運使右諌議大夫李廸為翰林學士置㑹靈觀副使以廸為之又置景靈宫㑹靈觀判官以知制誥劉筠樂黄目為之崇儀使入内押班周懐政為玉清昭應宫都監西京左藏庫副使帯御噐械王承勛為司都監供備庫副使周懐信為景靈宫都監東染院使鄧守恩為㑹靈觀都監並逓宿宫觀懐政常在禁中故増一員懐信懐政弟詔諸路支移税賦勿至兩次仍許以粟麥蕎菽互相凖折其科買官物如土地不産具數以聞令江淮發運司嵗留上供米五十萬以備飢年賑濟禁京城殺雞戊寅上謂宰臣曰諸路使臣言飛蝗多不食苗王旦等曰前月蝗飛度河北郷民方備焚撲連夕西北勁風由是不及逺自澶以北少害稼者今麻豆堅實不復為慮矣有司謚故宣徽南院使贈尚書令追封譙王郭守文曰忠武詔可己卯中使張文昱等言分路檢視蝗傷民田河南府宻縣所傷千二百户偃師四百户永安三百户棣州順安軍不食禾博州通利軍以霜寒悉斃於田野間槩而言之十傷一二上曰朕始見飛集謂田畆一空自來諸州以不傷為言尚兾所收得半今此按視所傷殊尠旦曰陛下精𠂻念民即弭災為福上曰所定蠲税分數更加優厚輔臣退而相謂曰自季夏以來螟蟲為孽宣示諸路奏章上憂軫之意無時暫捨至於使者奉命出入皆能上體優恤所至詢訪民隐閲視禾稼或採掇苗稼千里而至或能紀録農事以逹上聽古者人君舉一善言災星退舎况日夜孜孜焉以祈天救民為意乎前代中貴出使惟負氣恣横官吏無得接對肯問民間疾苦耶非至徳化下何由及此翰林學士陳彭年等言先凖詔看詳新舊編敕及取已刪去并林特所編三司文巻續降宣敕盡大中祥符七年揔六千二百道㑹要云二千七百九十一道今從本志千三百七十四條分為三十巻其儀制敕書徳音别為十巻與刑統景徳農田敕同行其止是在京及三司夲司所行宣敕别具編録若三司例冊貢舉國信條制仍舊遵用上謂宰相曰彭年等刪去繁文甚為簡便然有夲因起請更相難詰駁改前後特留一敕者今既刪去恐異日或須證騐即無從得之宜令録所刪敕一夲别付館閣以備檢詳實録夲紀並稱同玉清昭應官副使林特上之然其後陳彭年等加㤙特不與焉今但從夲志及㑹要不著特名寳訓又稱别留刪敕緣劉綜起請今亦不取實録存刪去敇在六年六月戊子今依夲志附此壬午令京東轉運使及知兖州並兼管勾仙源縣景靈宫太極觀使樞宻使王欽若言宜州蠻人五月初既招安不旬日復叛擾夷性無厭習知朝廷多釋其罪故急則求歸緩則叛去望詔俞獻可曹克明等或得蠻人要領即以所虜人口資財付被刼家㰱血重誓乃釋其罪從之癸未以京師愆雨遣使分禱宫觀寺院詔自今屠耕牛及盜殺牛罪不至死者並繋獄以聞當從重斷時中使鄭志誠使洛回言道見鬻牛者甚衆慮不逞輩因緣屠殺故戒之宰臣王旦以衰病求罷詔不許仍斷來章甲申戎瀘資榮州都廵檢使張元普請城淯井監上慮擾人生事不許丙戍上親製奉上玉皇聖號冊文召輔臣同觀自禁中具儀仗迎導赴天安殿摹寫刻玉樞宻使同平章事陳堯叟罷為右僕射堯叟以久疾求領外任上遣閤門使楊崇勲至第撫慰且詢其意堯叟詞志懇確乃從之召堯叟子就賜告牒尋命判河陽月給實俸嵗賜公使錢百萬其河堤事令通判專領堯叟力疾求入辭肩輿至便殿許其子衛尉寺丞希古扶掖而升有詔勿拜賜坐久之别賚錢二百萬賜希古緋又作詩寵其行堯叟偉姿貌彊力奏對明辯多任智數久典機宻軍馬之籍能周記云秘書丞韓庶言諸州鞫獄多以勘官所部僚屬録問慮有寃濫不能明辯望於鄰州選官從之丁亥以向敏中使回宴近臣於長春殿不舉樂閔雨也王旦等曰昨偶蟲螟已優免民賦今稍亢時雨亦未妨農事物價甚賤陛下憂軫過深四方封奏一一親覽近者降詔㫖蠲京畿榷酤之民折輸芻藁中等已下殘欠夏稅又與倚閣生民受賜多矣天災流行從古所有陛下精祈懇至減膳蔬食臣等備位宰輔豈勝慙懼伏望稍寛宸念再拜以請上撫諭久之戊子詔以旱罷近臣社日飲㑹又罷秋宴知許州石普上平宜州蠻利害上以為迂濶罷之壬辰羣臣上表請以來嵗受尊號冊寳不許自是五上表乃許之癸巳詔諸路轉運使曉諭州府軍監長吏等凡有獄訟必須盡公審察務於平允其大辟罪如情輕可憫及理有所疑者並許奏裁以副欽䘏甲午審刑院上奏案有命官自蜀代還部綱京師私抉元封内繒帛其中遣郵置卒賫擔規免商筭知院孫僅等請以違制失論上曰此得謂之失耶僅不能對王旦曰律之詐欺百端皆是大率言失者須思慮所不到此公為詐欺非失也遂改從違制丙申江南提㸃刑獄王長吉等言南安軍上猶縣僧法端忿漁人索賣漁直遂令僧守肱殺其院狗即白官誣漁人盗去縣遣里胥捕漁者并父繋送院中守肱毆殺之又賂縣典集耆保掩捕漁者二弟並殺之又以刃傷漁者母因以殺獲刼賊聞於縣尉汲濟濟受吏請求騐尸之際令主者隐縻縳之迹并其家老㓜荷校送軍縣令孫凝覆視又以老眊為吏所罔因夲軍劾得實法端守肱坐死自餘咸以徳音原免今體量漁者夲家兄弟三人以捕漁為業餘皆乳抱今四人遭殺三人被傷察其事狀最為巨蠧欲望特降詔㫖並從重罰不以恩例末減詔杖濟脊配𨽻道州凝貶文學餘黥面配廣南逺惡州凡十五人以守肱私田五十九私給被傷家上封者言近者文武羣官所舉三班使臣多非素諳才器但受請屬到闕之後章薦交上頗非國家擇才之㫖望自今見任知州通判夲路鈐轄都監諸司使副以上乃得發奏所舉之人須經两任監押廵檢無遺闕者其舉主見在任即許行用如内有事故者不得理為舉人之數從之丁酉東染院使㑹州刺史入内副都知張繼能坐前護修莊穆皇后陵隧道摧陷降授西染院使四月己卯責藍繼宗戊戌命入内殿頭趙懐寳李允文率歩騎四百往并代州捕賊己亥丁謂面陳生日䝉降賜生餼酒樂令就私第宴㑹優異之禮非臣敢當况禁樂已來未甞陪侍逰幸兼在㑹靈道場齋宿望賜寝罷從之王旦曰臣等毎遇生日曲䝉恩賜又遣諸司供帳况兩制近者皆有兼掌並廢務一日以私妨公望特寝賜與所許集㑹止召親舊上可之自是賜酒餼如故但不設㑹庚子以刑部郎中直史館髙紳為史館修撰同判吏部流内銓紳與樞宻使王欽若親厚故引用之但令判銓實不掌修撰自是領修撰者須兩省五品以上乃掌修撰遂為例及明年紳求外任故事修撰不帯出復授直昭文館知越州復授直館乃明年三月癸亥今並書之中書以仲秋朝陵官少宗姓者欲用知雜御史趙稹上曰御史出入動有典制府縣事體甚盛楊礪常言五代以來御史出使氣陵藩屏周世宗在澶州目覩其事故稍减損稹若外使亦非便也
