body:
  text: 續資治通鑑長編巻一百七十一宋李燾撰仁宗皇祐三年八月己卯朔命太常博士崇文院檢討王純臣日厯所檢閲文字純臣堯臣弟也詔岳鎮海瀆廟宇之隳圮者亟修之知諫院呉奎言近嵗以來水不潤下盜賊横起皆隂盛所致陛下寅畏天命宜格善祥而反應以災沴其故何哉夫帝王之美莫大乎進賢退不肖賢者進則君子各以類升而陽勝而善祥可致也不肖退則小人各以其類伏而隂虧而災沴可消也今天下之人皆謂之賢陛下亦知其賢然不能進天下之人皆謂之不肖陛下亦知其不肖然不能退重以内寵驕恣近習阻撓西夏桀驁讒邪交傷隂盛如此寧不致大異哉且朝廷之過常在乎無事之時因循而不為有事之後顛覆而失錯中外臣僚平時建一䇿舉一官雖有可取皆抑而不行又從而媒孽謂之生事如河北河東盜賊行路之人皆已傳布大臣不以為事至執通判傷廵檢然後蒼黄於數路之間移易官守仍重賞功以購募之不亦晚乎事將有大於此者將如之何幸陛下留意河北河東盗賊執通判即井淵也傷廵檢當考辛巳特贈給事中孔道輔為工部侍郎時龍圖閣直學士王素入對語及道輔上思其忠故有是命四月辛丑王素自兖州移渭州不應此時方入對也今依道輔傳湏考之閤門言近日頻有臣僚陳乞上殿欲請除入内内侍省合奏事外其餘侍立祗應及無特㫖上殿臣僚今後不許約人奏事如有所見只許實封以聞從之此據㑹要八月三日事今附見癸未知定州韓琦加觀文殿學士再任初眀鎬引諸州兵平恩州獨定兵邀賞賚出怨語㡬欲譟城下琦素聞其事以為定兵不治將為亂及至即用兵律裁之察其横軍中尤不可教者捽首斬軍門外士死攻圍賻賞其家撫其孤児使繼衣廩恩威既信則倣古兵法作方圓鋭三陣指授偏將日月教習之由是定兵精勁齊一號為可用冠河朔京師發龍猛卒戌保州在道竊取人衣屨或飯訖不與人直至定即留不遣曰保州極塞嘗有叛者豈可雜以驕兵戍之易素教者數百人以徃而所留卒未踰月亦皆就律不敢復犯法嵗大歉為賑之活饑人數百萬詔書襃美隣城旁路刺取其政以為法視中山隠然為雄鎮聲動敵國自再任以下並據李清臣行状附見當考丙戌衛尉卿余靖落分司知䖍州詔遣使體量安撫諸路吏部員外郎兼侍御史知雜事李兊京東路西染院副使王道恭副之起居舍人同知諫院陳旭淮南兩浙路左藏庫副使李賡副之侍御史韓贄荆湖南路内殿承制鄭餘懿副之戸部判官太常博士直集賢院韓絳江南東西路内殿崇班翁日新副之是時七路艱食而長吏多非其人又轉運司頗肆科率民不聊生上因命中書擇使者按之鄭餘懿翁日新未見戊子詔判吏部南曹羣牧判官自今以朝臣歴一任知州館職一任通判為之即不得干託保薦及有陳乞庚寅徙江南西路轉運使司勲郎中劉緯知廬州臺諫官言緯庸懦不職方饑而剥下以收羡餘故徙之緯師道子也詔天章閣侍講自今並依館閣臣僚例宣召頒錫從知制誥兼侍講王洙請也辛卯淮康節度使同羣牧處置使張堯佐為宣徽南院使判河陽詔天下長吏未盡得人其令諸路轉運使提㸃刑獄除任两府臣僚外悉類次治狀能否以聞乙未翰林學士刑部郎中知制誥兼侍講史館修撰曾公亮為契丹國母生辰使西京左藏庫使郭廷珍副之工部郎中知制誥史館修撰兼侍講王洙為契丹生辰使閤門通事舍人李惟賢副之户部判官屯田郎中燕度為契丹國母正旦使内殿崇班閤門祗候張克己副之太常博士直集賢院同修起居注王珪為契丹正旦使東頭供奉官閤門祗候曹偓副之使至鞾淀契丹使劉六符來伴宴且言耶律防善畫向持禮南朝寫聖容以歸欲持至館中王洙曰此非贍拜之地也六符言恐未得其真欲遣防再徃傳繪洙力拒之御史中丞王舉正言近以張堯佐再除宣徽使臣僚嘗論奏且人君御天下維爵賞為大公受授非當則天下竊議堯佐本常才但以夤縁後宫叨據非分自去年冬罷三司使除宣徽使制命方出中外莫不駭聽其時臣與諫官御史至留班欲廷議而爭之尋罷宣徽使尚忝節度名品今四方多虞災異數見若非奨擢有功任用賢直則何以上答天戒下慰民望哉堯佐自罷宣徽使方逾半年端坐京師以尸厚禄今復授之益増鄙誚此乃執事之臣不念祖宗基業之重順顔固寵不能執奏制命既行有損聖徳若陛下不納臣盡忠愛君之請必行堯佐濫賞竊位之典即乞黜臣以誡不識忌諱愚直之人不報知諫院包拯陳旭呉奎相繼言堯佐制命復下物議騰沸况臣等以言為職豈敢私自顧慮各為身謀哉但誥已再行若固守前議復乞追奪於朝廷事體亦未為當所以進退惶惑不即論列雖然事體有必湏裁制者不可不深察臣等不得不極諫也張堯佐怙恩寵之厚倖求覬望不知紀極始欲得宣徽使今已行前命付之矣雖出領外鎮將來必求入覲即圖本院供職以致使相名器之大者豈可皆縁恩私毎求而不讓必使足欲以熏灼天下此不可不深察也伏望思已然之失為杜漸之制特降詔㫖申敕中書門下諭以堯佐皆縁恩私不次超擢享此名位已為過越将來更不令處使相之任及不許本院供職仍趣赴河陽任所庶㡬厭塞人情防杜間隙臣等不勝為國納忠激切之至又言臣等自去冬力爭此事幸賜開納天下皆仰聖度能虚懐而納諫也今來重申前命所以不即論列乞行追奪者盖為朝廷曲全事體爾其如大恩不可頻假羣心不可固違假之頻則損威違之固則兆亂伏望以國家至計為念檢㑹臣等前後奏劄必賜施行不勝懇激之極庚子詔自今張堯佐别有遷改檢㑹此劄子進呈執奏仍詔除宣徽使自今不得過二員包拯等奏實録無之今掇取附見㑹要乃以宣徽使限兩員為二年九月五日詔當考辛丑提㸃河北路刑獄祠部郎中孫預降知小郡供奉官閤門祗候張易降小郡都監自今勿差充按察官先是内侍李希晟迎候遼使在雄州與判官左振宴飲無節後有言其事者下預易體量而兩人畏避但言嵗逺無以辨眀特免振希晟官兩人皆坐責乙巳馮道曽孫舜卿上道官誥二十通乞録用上謂輔臣曰道相四朝而偷生茍禄無可旌之節所上官誥其給還之九月己酉詔縁汴河商税務無得苛留公私舟船太常寺太祝張山甫為右侍禁閤門祗候癸丑右領軍衛大将軍宗厚右監門衛大将軍宗恵並為右屯衛大将軍右領軍衛大将軍宗秀宗辨並為右武衛大将軍皆允升諸子也以進所業召試學士院特遷之詔太常寺皇地祗壇舊制狹小宜如唐郊祀録增廣之又髙禖壇其地卑濕宜徙置髙爽處從同知禮院司馬光奏請也賜李繼隆神道碑額曰顯功乙卯武寧節度使兼侍中夏竦卒贈太師中書令賜諡文獻知制誥王洙當草制封還其目曰臣下不當與僖祖同諡遂改曰文正同知禮院司馬光言諡之美者極於文正竦何人乃得此諡判考功劉敞言諡者有司之事也竦姦邪而陛下諡之以正不應法且侵臣官光䟽再上敞䟽三上詔為更諡曰文莊竦以文學起家有名一時朝廷大典䇿屢以屬之又多識古文竒字其為郡有治績喜作條教於閭里立五保之法至盜賊不敢發人苦煩擾治軍尤嚴敢誅殺即疾病死䘮撫循甚至嘗有龍騎卒戌邊羣剽州郡莫能止或宻以告竦竦時在關中俟其至召詰之誅斬殆盡軍中大震其威略多類此然性貪每商販部中至并州使其僕質易為所侵盜至杖殺之積財累鉅萬自奉尤侈畜聲伎甚衆所在隂間僚屬使相猜阻以鈎致其事遇家人亦然已未詔三司河渠司與兩制臺諫官同議塞商胡郭固決河初河决商胡至是又決郭固朝廷議修塞而中外章䟽交上所執不同故議之仍詔河北都轉運使吕公弼提舉河堤綦仲宣赴闕同議庚申賜國子博士梅堯臣同進士出身仍改太常博士堯臣詢從子工於詩宋興以詩名家為世所傳如堯臣者盖少大臣屢薦堯臣宜在館閣召試學士院而有是命甲子為夏竦成服於苑中先是禮院擇日以進上謂輔臣曰竦嘗仕東宫情所憫傷若依所擇日則在大燕後豈可先作樂而後發哀故用此日竦初以疾求還京師或言於上曰竦求還京師圖大用爾稱疾詐也竦既卒上臨奠命内侍去竦面羃視之見竦顔色枯悴謂左右曰竦枯悴若此疾豈詐乎然議者謂竦嘗欲剖石介棺此其隂報也魏泰東軒雜録以為呉奎所奏當考壬申觀文殿學士丁度等言所議修塞決河謂宜先塞郭固其商胡俟嵗稔别計度之乃詔河北都轉運使李柬之吕公弼提舉修郭固河事北京鈐轄王達編欄通判趙宗古及内侍麥守信同管勾癸酉詔三司唐鄧汝州多曠土其令寛立税限募人墾之此或與二年六月丁度所議徙民相接然丁度劄子實以二年八月下益州此盖申明前議耳丙子改太子太師諡文獻王溥為文康司空致仕諡文憲章得象為文簡以知制誥王洙言得象諡同周公溥同僖祖故也有欲改溥諡為文忠者天章閣待制兼侍讀張揆曰溥周宰相國亡不能死安得為忠乃諡為文康詔河渠司汴河毎嵗一開濬之楊佐傳云皇祐初汴水殺溢不常漕舟不屬佐度水勢鑿口地要害處自是通流無患朝廷察佐曉河事故使領都水佐領都水不知是何年傳又云自河隂發運判官入勾當河渠司是年五月初置河渠司恐毎嵗浚汴或與相關今附此竢考詳或削去丁丑詔邇英閣講讀官當講讀者立俟敷對餘皆賜坐侍於閣中天聖以前講讀官皆坐侍自景祐以來皆立侍至是帝屢面諭以經史義㫖湏詳悉詢説卿等無乃煩倦否楊安國等進曰不敢至是有詔遂為永制翌日講讀官並奏謝教坊官王世昌自陳年勞乞監永濟倉門上曰世昌本亦士人以無行檢遂充此職且倉門乃國家糧儲出納之所豈可令此輩主之宜與在京一廟令冬十月己卯朔詔三司觧鹽聽通商候二年較其增損以聞初包拯自陜西還力主范祥所建通商法朝廷既從之已而判磨勘司李徽之又言不便乃下其事三司驛召祥令與徽之及兩制共議而議者皆以祥為是故有是詔包拯事在元年十月詔陜西沿邊毋得誘致生戸蕃部獻地以増置保寨安逺寨古渭州諸羌詣秦州獻地知州吕公綽顧其屬曰天下之大豈利區區尺寸地以為廣耶却之此事附見當考庚辰涇原經略司言樊家族蕃宻斯噶内附甲申大理寺言信州民有劫米而傷主者法當死上謂輔臣曰饑而刼米則可哀盜而傷主則難恕然細民無知終縁於饑爾遂貸之又曰用刑寛則民慢猛則民殘為政者常得寛猛之中使上下無怨則水旱不作矣卿等宜戒之丁度等上前後漢書節義賜名曰前史精要乙酉新作隆儒殿在邇英閣後賜開大名府御河役卒緡錢丙戌詔十路都部署安撫舉諸司副使閤門祗候才堪将帥者一人甲午知諫院呉奎言迎送契丹使三畨之弊所經道路如被㓂賊自罷寢以來大河之北人人鼓舞以為陛下憂民革弊不牽於私暱不惑於浮議裁兩月間輙復紛紛妄有攻奪眀聖在上而羣小敢爾若不繩以法是朝廷不可為善治也乞以言者姓名付外施行又言陛下十數年以來毎降詔令及所行事或為横議所移或為姦謀所破中外不甚為信皆以為陛下言之雖切而不能行行之雖鋭而不能久也自眀堂下詔杜絶内降忠賢莫不増氣羣小莫不革心願陛下謹守前書堅於金石雖甚寵愛及親近之人如敢私撓必加之罪如是則太平之風有望於兹矣罷三畨之弊在去年五月此云裁兩月間輙妄有攻奪未詳并取包拯奏議附後包拯言臣近聞聖慈以接送契丹國信來徃更不差三畨只令近上使臣管押金器沿路充用並委逐州縣長吏通判令佐已下一切應副中外聞之莫不欣忭以為十年之弊為陛下一旦罷之使河北生靈有再蘓之望今又聞内降指揮復置臣未測縁由伏用驚駭且三畨為河朔之患稍有嵗年日甚一日誅求騷擾公私不勝其苦頃年曾差充伴送人使具知蠧民殘物之甚亦嘗論列縁河北災傷連綿流亡未復若不省徭役罷率斂以寛凋瘵是棄河朔也况陛下軫念哀憫之極故特行前詔此為至當今無故復置竊為陛下痛惜之惟陛下特留聖意且依前降指揮寢罷則天下幸甚乙未翰林學士兼端眀殿學士翰林侍讀學士禮部侍郎知制誥李淑落翰林學士淑始除父䘮以端眀侍讀二學士奉朝請尋復入翰林諫官包拯呉奎言淑性姦邪嘗乞侍養其父而不及其母既得侍養又復出仕有謀身之端無事親之實作周三陵詩語渉怨憤非所宜言且陛下事章獻太后母子之際無纎介隙而淑誌吕夷簡墓有過猜雞晨之語深累上徳宜奪禁職以戒懐姦隠慝之臣故有是命丙申京西轉運使蘓舜元言保静節度使知許州郭承祐才堪将帥政比龔黄請徙判鄭州上曰許鄭皆近畿何必徙且承祐庸人而舜元所舉如此使朝廷何所取信皆宜戒敕之舜元舜欽兄也丁酉殿中侍御史裏行唐介責授春州别駕初張堯佐除宣徽節度景靈羣牧四使介與包拯力爭又請王舉正留百官班卒奪堯佐宣徽景靈二使頃之復除宣徽使知河陽或謂補外不足爭介以為宣徽次二府不計内外獨爭之上諭介除擬初出中書介言當責執政退請全臺上殿不許自請貶亦不報於是劾宰相文彦博專權任私挾邪為黨知益州日作間金竒錦因中人入獻宫掖縁此擢為執政及恩州平賊幸㑹眀鎬成功遂叨宰相昨除張堯佐宣徽節度使臣累論奏面奉徳音謂是中書進擬以此知非陛下本意盖彦博姦謀迎合顯用堯佐隂結貴妃外䧟陛下有私於後宫之名内實自為謀身之計又言彦博嚮求外任諫官呉奎與彦博相為表裏言彦博有才國家倚頼未可罷去自彦博獨專大政凡所除授多非公議恩賞之出皆有夤縁自三司開封諫官法寺兩制三館諸司要職皆出其門更相援引借助聲勢欲威福一出於已使人不敢議其過惡乞斥罷彦博以富弼代之臣與弼亦昩平生非敢私也上怒甚却其奏不視且言将加貶竄介徐讀畢曰臣忠義憤激雖鼎鑊不避敢辭貶竄上於座急召二府示以奏曰介言他事乃可至謂彦博因貴妃得執政此何言也介面質彦博曰彦博宜自省即有之不可隠於上前彦博拜謝不已樞宻副使梁適叱介下殿介辭益堅立殿上不去上令送御史臺劾介既下殿彦博再拜言臺官言事職也願不加罪不許乃召當制舍人即殿廬草制而責之時上怒不可測羣臣莫敢諫右正言直史館同修起居注蔡襄獨進言介誠狂直然容受盡言帝王盛徳也必望矜貸之翼日己亥中丞王舉正復上䟽言責介太重上亦中悔恐内外驚疑遂敕朝堂告諭百官改介英州别駕復取其奏以入遣中使䕶送介至英州且戒必全之無令道死而介之直聲自是聞天下介江陵人也知制誥胡宿言唐介坐言事得罪責授英州别駕嶺南水土春最惡弱制出之日咸謂介若至彼必無生還之理不圖聖慈含垢哀其觸罪就死特改貶英州此誠天恩於介無量然臣愚見猶有未安或聞專差中使押至貶所朝㫖有在路不管踈虞之語此之處分頗非泛常竊尋嚮前臺諫官貶黜無此體例一旦介若因霜露之病死於道路四海廣逺不可家至戸曉徒使朝廷負謗於天下其傷不小就使介安全至於貶所然亦不可著為後法臣與介舊不相識在朝亦不曾往還所以縷陳區區不避干忤者正為朝廷逺防一切伏望特垂聖恩留省愚言追還使人以全朝體殿中侍御史梁蒨亦言陛下愛介故遣中使䕶送之即不幸介以疾死天下後世能無以殺疑乎上曰誠不思此亟追還中使梁蒨事據劉摯墓誌庚子禮部尚書平章事文彦博罷為吏部尚書觀文殿大學士知許州或言張堯封彦博父客也彦博知益州貴妃有力焉因令彦博織燈籠錦以進貴妃服之上驚顧曰何從得此妃正色曰文彦博所織也彦博與妾父有舊然妾烏能使之特以陛下故爾上悦自是意屬彦博及為參知政事眀鎬討王則未克上甚憂之語妃曰大臣無一人為國了事者日日上殿何益妃宻令人語彦博翼日彦博入對乞身往破賊上大喜彦博至恩州十數日賊果平即軍中拜相議者謂彦博因鎬以成功其得相猶妃力也介既用是深詆彦博雖坐逺貶彦博亦出其事之有無卒莫辨云自張堯封為彦博父客至彦博因眀鎬有功皆據碧雲騢按邵氏見聞録云仁宗嘗幸貴妃閤見定州紅甆器怪問曰安得此妃以王拱辰所獻為對帝怒曰戒汝勿通臣僚饋遺不聽何也因擊破之妃媿謝良久乃已妃又嘗侍上元宴於端門服所謂燈籠錦者帝亦怪問妃曰文彦博以陛下眷妾故有此獻上終不樂其後唐介弹彦博介雖以對上失禮逺責彦博亦出守上盖兩罷之也或云燈籠錦乃彦博夫人遺妃彦博不知也介章及梅堯臣書竄詩過矣樞宻使戸部侍郎龎籍以本官為平章事昭文館大學士監修國史籍初入相且獨員而遽為昭文館大學士監修國史殊非故事也戸部侍郎參知政事髙若訥以本官充樞宻使案宋史宰相表作檢校太傅樞宻使辛丑樞宻副使給事中梁適為參知政事翰林學士承㫖兼端眀殿學士給事中知制誥王堯臣為樞密副使起居舍人知諫院呉奎知宻州包拯奏乞留奎且言唐介因彈大臣并以中奎誣惑天聽上曰介昨言奎拯皆隂結文彦博今觀此奏則非誣也癸卯賜郭固河役卒緡錢乙巳上謂龎籍曰諫官御史必用忠直淳厚通世務眀治體者以革浮薄之弊籍既承聖諭自是中書奉詔舉臺官必以上語載敕中是月史館檢討司馬光以時政記及起居注並不載元昊叛命契丹遣使事㑹龎籍監修國史光請即樞宻院追尋本末自至史館議之修撰孫抃謂國惡不書其事遂寢司馬光以皇祐三年七月為史討十月改集校此事不得其時今附十月末此據江氏志十一月己酉許州言保静節度使郭承祐卒贈太尉謚曰宻辛亥詔漳泉州興化軍自偽閩以來計丁出米甚重或貧不能輸朕甚憫之自今泉州興化軍舊納七斗五升者主戸與减二斗五升客戸減四斗五升漳州納八斗八升八合者主戸減三斗八升八合客戸減五斗八升八合為定制初龎籍為福建轉運使請罷漳泉興化丁米有司持不可於是籍為宰相遂行之定州路安撫司言雄州廣信安肅軍雄場北客市易多私以銅錢出境自今廵防人等凡三吿捕得所犯人者並遷一資從之壬子詔文彦博遇大朝㑹許綴宰臣班乙丑上謂宰臣曰諸路轉運使提㸃刑獄廨宇同在一州非所以分部按舉也宜處别州仍條廵察之令以付之丙寅詔翰林醫官院自今選年四十以上無過犯者以三十二人為額仍分三畨入宿院中尋又詔無得員外置醫官因謂輔臣曰醫官愈人之疾乃其職爾而治後宫及宗室疾愈輙僥倖以求遷故條約之置䖍州安逺䖍化縣廵檢各一員丁卯判三司都磨勘司李徽之言國家以火徳王天下火生於寅王於午太廟西向門宜毁去以避申酉之位上曰徽之家世儒臣所言乃同巫祝然事縁宗廟亦當下太常宗正寺詳定以聞既而太常宗正寺言今太廟西偏門所以邀止車駕而南向自有正門徽之所請事渉不經不足采用罷之辛未李淑為龍圖閣學士落侍讀包拯言淑雖罷翰林學士亦不可入侍經筵故又黜之壬申秦鳯經略司言樊諸族首領阿裕爾等二十六人内附並補本族指揮使乙亥上謂輔臣曰江淮連年荒歉如聞發運轉運司惟務誅剥以敷額為能雖名和糴實抑配爾其減今年上供米百萬因詔倚閣災傷人戸所輸鹽米知諫院包拯言臣聞天以五星為緯人以五穀為命五星紊於上則災異起於下五穀絶於野則盜賊興於外天之於人上下相應故天變於上則人亂於下是天人相與之際甚可畏也若變異上著則恐懼修省以謝於下年穀不登則賑貸責已而䘏其困盖不使天有大變而民有饑色則人獲富壽而國享安寧矣方今災異之變尤甚臣近已論列詳矣惟江淮六路連嵗亢旱民甚艱阻流亡者比比皆是朝廷昨遣使命安撫賑貸以救其弊而東南嵗運上供米六百萬石近雖減一百萬石縁逐路租税盡已蠲復則糧斛從何而出未免州縣配糴以充其數繇是民間所蓄悉輸入官民儲已竭配者未巳縱有米價率無可糴父子惶惶相顧不救老弱者死於溝壑少壮者聚為強盜不幸姦雄乗間而起則不可制矣當以何道而猝安之哉且國家之患未有不由此而致可不熟慮乎欲望聖慈特降指揮應江浙六路災傷州縣凡是配糴及諸般科率一切並與止絶如敢故犯並坐違制庶㡬少釋貧民倒垂之急其上供米數者不敷元額即候將來豐熟補填仍令州縣官吏多方擘畫賑濟饑民不得失所兼委逐路提轉專切提舉如不用心賑濟以致流亡及結成羣盜即乞一例重行降黜先是河北饑三司益增江淮米以餉河北及江淮饑有司責米數如常嵗度支副使梅摯奏裁之摯五月癸酉巳自度支副使除天章閣待制陜西都漕今附見十二月戊寅朔詔環州向以風雹霜旱之災蕃部闕食其貸弓箭手種糧庚辰詔開封府民有饑寒死於道路而無主者官給錢𦵏之翰林天文院新作渾儀成御撰渾儀總要十巻論前代得失已而留中不出戊子中書言諸房人吏稽違案牒者自來量行罰典終未革心欲籍其名氏以輕重為差其罰數多及情重者取㫖黜逐從之堂吏上簿或始此庚寅提㸃河北刑獄祠部員外郎孫仲頴坐按部無状降知登州癸巳詔天下常平倉其依元糴價糶以濟貧民毋得收餘利以希恩賞戊戌資政殿學士呉育知陜州始命育兼翰林侍讀學士育辭以疾固請便郡上謂近臣曰育剛正可用但嫉惡太過耳宜聽其便因遣中使賜以禁中良藥不半嵗又徙汝州實録作陜州本傳及歐陽修墓銘並作汝州案育眀年四月乃知汝州今從實録又案呉育父待問卒於皇祐二年十一月丙戌此時才踰年歐陽修墓銘云服除誤也附傳因之正𫝊已削去今並不書先是包拯還自陜西言伏見近降勅命陜西鹽且依范祥擘畫通商販行此誠國家大利而中外臣僚不詳本末時有横議所賴朝廷特與主張兼祥見充本路提㸃刑獄與轉運司毎常公事徃來或至違異必恐不能協心以濟深屬不便欲望聖慈特許就除祥權本路轉運副使只理提㸃刑獄資序所貴擘畫鹽法利害計置沿邊斛斗事歸一局易為辦集又言勘㑹祥新法自皇祐元年正月至二年十二月終共收見錢二百八十九萬一千貫有零比較舊法二年計増錢五十一萬六千貫有零三年春季又已收到見錢七十餘萬貫兼糴到斛斗萬數不少縁陜西累嵗豐熟今秋又大稔正當計置之際况祥顯著成效可備驅䇿欲望允臣前奏特除祥本路轉運副使俾之一面制置觧鹽及将見錢收糴糧斛庶沿邊軍儲足備又免向去入中枉費𣙜貨務見錢經久之利無便於此而三司使田况亦請久任祥使專其事己亥度支員外郎范祥為陜西轉運副使仍賜金紫服以寵之賜服據本志詔開封諸縣嵗差八分人夫以開濬溝渠頗為煩擾自今凡有堙塞處聽所在人戸自開濬而官為檢視之庚子詔文武官年七十已上未致仕者更不考課遷官其有功於國有恵於民當加賞者勿拘辛丑詔四方館自今減臣僚所進謝恩馬價之半又詔尚書刑部凡偽造公文若印文已成而行用者雖倣官司簽押未圓並依已成法罪之癸卯契丹國母遣歸徳節度使左千牛衛上将軍耶律照衛尉卿荆詩言契丹遣彰信節度使蕭述廣州防禦使呉昌稷來賀正旦甲辰罷災傷州軍嵗貢茶及果實諸物益州鄉貢進士房庶為試校書郎庶成都人宋祁嘗上所著樂書補亡二巻田况自蜀還亦言其知音既召赴闕庶自言嘗得古本漢志云度起於黄鍾之長以子穀秬黍中者一黍之起積一千二百黍之廣度之九十分黄鍾之長一為一分今文脱之起積一千二百黍八字故自前世以來累黍為尺以制律是律生於尺尺非起於黄鍾也且漢志一為一分者盖九十分之一後儒誤以一黍為一分其法非是當以秬黍中者一千二百實管中黍盡得九十分為黃鍾之長九寸加一以為尺則律定矣直秘閣范鎮是之乃為言曰李昭以縱黍累尺管空徑三分容黍千七百三十胡瑗以横黍累尺管尺容黍一千二百而空徑三分四釐六毫是皆以尺生律不合古法今庶所言實千二百黍於管以為黃鍾之長就取三分以為空徑則無容受不合之差校前三説為是盖累黍為尺始失之於隋書當時議者以其容受不合棄而不用及隋平陳得古樂器髙祖聞而歎曰華夏舊聲也遂傳用之唐祖孝孫張文收號稱知音亦不能更造尺律止治隋之古樂制定聲器朝廷久以鐘律未正屢下詔書博訪羣議冀有所獲今庶所言以律生尺誠衆論所不及請如其法試造尺律更以古器參考當得其真乃詔王洙與鎮同於修制所如庶説造律尺籥律徑三分圍九分長九十分籥徑九分深一寸尺起黃鍾之長加十分而律容千二百黍初庶言太常樂髙古樂五律比律成才下三律以為今所用黍非古所謂一稃二米黍也尺比横黍所累者長一寸四分庶又言古有五音而今無正徴音國家以火徳王徴屬火不宜闕今以五行相生法得徴音又言尚書同律度量衡所以齊一風俗今太常教坊鈞容及天下州縣各自為律非書同律之義且古者帝王廵狩方岳以考禮樂同異以行誅賞謂宜頒格律自京師及州縣無容輙異有擅髙下者論之帝召輔臣觀庶所進律尺籥又令庶自陳其法因問律吕旋相為宫事令撰圖以進其説以三正二變配五音迭相為三衍之成八十四調舊以宫徴商羽角五音次第配七聲然後加變宫變徴二聲以足之庶推以旋相之法謂五行相戾非是當改變徴為變羽易變為閏随音加之則十二月各以其律為宫而五行相生終始無窮詔以其圖送詳定所又論吹律以聽軍聲者謂以五行逆順可以知吉凶先儒之説略矣是時胡瑗等制樂已有定議特推恩而遣之鎮為論於執政曰今律之與尺所以不得其真由累黍為之也累黍為之者史之脱文也古人豈以難曉不合之法書之於史以為後世惑乎殆不然也易曉而必合也房庶之法是矣今庶自言其法依古以律而起尺其長與空徑與容受與一千二百黍之數無不合之差誠如庶言此至真之法也且黃鍾之實一千二百黍積實分八百一十於筭法圓積之則空徑三分圍九分長九十分積實八百一十分此古律也律體本圓圓積之是也今律方積之則空徑三分四釐六毫比古大矣故圍十分三釐八毫而其長止七十六分二釐積實亦八百一十分律體本不方方積之非也其空徑三分圍九分長九十分積實八百一十分非外來者也皆起於律也以一黍而起於尺與一千二百黍之起於律皆取於黍今議者獨於律則謂之索虗而求分亦非也其空徑三分圍九分長九十分之起於律與空徑三分四釐六毫圍十分三釐八毫長七十六分二釐之起於尺古今之法䟽宻之課其不同較然可見何所疑哉若以為工作既久而復改為則淹久嵗月計費益廣又非朝廷制作之意也其淹久而費廣者為之不敏也今庶言太常樂無姑洗夾鍾太簇等數律就令其律與其説相應鐘磬每編才易數枚因舊而圖新敏而為之則旬月之功也又何淹久而廣費哉執政不聽房庶上律吕旋相圖在四年二月庚寅今從律厯志并書之樂志載房庶論今樂猶古樂附五年九月
