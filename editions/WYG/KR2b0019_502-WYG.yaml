body:
  text: 續資治通鑑長編巻四百九十八宋李燾撰哲宗元符元年五月戊申朔上御大慶殿受傳國寳行朝㑹禮初咸陽民叚義郊居因造屋斸地得玉璽其文曰受命於天既夀永昌藏於家未獻有詣尚書省言雍人有得寳物匿而不獻者都省方下長安問狀而義已持璽来獻璽玉甚美色正綠蹇序辰為禮部尚書安惇為諫議大夫皆言此秦璽漢以為傳國寳自五代亡之今為時而出天所貺賜當以禮祇受告於郊廟遂下學士院御史臺尚書禮部祕書省集官議而舍人給事不與蔡京邢恕輩與序辰唱和以為希世之寳為時而出而御史臺主簿李公麟以謂璽文乃小篆為鳥魚狀葢李斯所篆又云初學記云藍田之玉如藍故謂之藍田此真秦璽也京等以傳記所傳難於考合但云漢以前璽遂求對欲以受尊號册禮因五月朔大朝㑹受傳國寳上許之禮官以語人而三省猶未之知後一二日詔三省悉如其請凡縁受寳詣宫觀恭謝并賜宴及賞諸軍等三省皆不與聞它日許將謂曾布言初得此璽章惇以謂秦璽何足貴但令集議不過藏天章瑞物庫而已黄履亦深以為當然既而京等專逹未嘗關由三省一日黄履言若因五月朔朝㑹而受之亦不妨惇大駭且怒履之變前議盖履得之蔡卞也及詔如所請惇等不復敢一言聞者哂之既而有言五月朔朝㑹不經朝廷乆已廢此禮上止令改正以五月朔御大慶殿受傳國寳一如大朝㑹儀凡已行宣敕文移悉追還依此改正上御通天冠絳紗袍降坐執鎮圭搢圭受寳於太尉以授掌寳官乃升坐受朝賀掌寳官以入内副都知馮宗道梁從政充正月十七日二月四日可考己酉德音降天下死罪囚徒以下釋之詔受寳畢就今月十一日宴於紫宸殿辛亥詔劉摯梁燾據文及甫尚洙等所供語言偶逐人皆亡不及考驗明正典刑摯燾諸子並勒停永不收叙仍各於元指定處居住劉摯為文及甫所誣梁燾為尚洙所證各是一事四年八月十六日並付蔡京安惇究治實錄但稱尚洙等而不書文及甫姓名恐合增入後劉跂辨謗錄載新州元符元年七月牒備載五月四日聖㫖亦不稱文及甫止稱尚洙等盖當時果不出文及甫姓名然五月四日乃三省同進呈蔡京乞廢棄摯諸子狀遂進呈訖其日即有此聖㫖盖實縁及甫所告也跂錄今悉具注在後梁燾家屬令韶州居住又邵伯温云蔡京安惇治同文獄煆煉不成哲宗疑之㑹星變赦批出曰朕遵祖宗遺志未嘗誅戮大臣劉摯等事可勿治不然數十家皆被誅戮矣然劉摯梁燾同時死於嶺南貶所人亦疑之伯温所云亦既具注在三月九日先是蔡京言臣昨奉詔究問文及甫書事尋具進呈乞賜施行至今未奉朝㫖伏縁劉摯與其同罪有司馬昭之心為同時之人所發而陛下以天地之度貸其萬死恩至厚矣而臣拳拳猶有請者欲正其典刑以及其子孫以信於天下今摯己物故子孫雖有廣南居住指揮而未聞有廢棄之命至於同惡之人前物故與未物故者俱未有也且人臣有司馬昭之心大逆無以加此則凡知事君者莫不切齒而曠日引乆未聞行遣此臣之所未諭者夫罰罪陛下之威柄今大逆不道之罪而得逃於今日臣愚以為非所以示天下也伏望早降指揮詔以京言送三省於是三省同進呈而有是命此據劉芮紹興六年四月繳其祖父跂建中靖國元年二月訴理父摯寃事狀本末内有此劄子具載紹聖五年四月二十五日垂拱殿進呈有言送三省五月三省同進呈訖蔡京又有弟三奏今附七月二十四日庚午李清臣落職時蔡絛黨籍篇元祐始責蔡丞相確過重且終元祐不内徙而死及紹聖初章丞相當國則罪元祐之臣遂深慘當是時魯公議獨多不合故終與章丞相有隙章丞相嘗謂林黄門希曰勿語蔡四蔡四曾得他指頭麻引来指頭麻引者市里之語謂利之小者也盖魯公元祐時曾除𤼵運使又遷龍圖閣直學士守成都故有是詔及邢尚書恕𤼵文及甫書事謂元祐大臣欲廢天子者哲宗素疑及得恕白事因赫怒語大臣至泣下曰使廢朕欲持朕安之乎是殺之耳今主名雖已死要當族此六家乃命魯公及御史中丞黄履知開封府路昌衡鞫之初文彦愽為平章軍國重事時其子及甫寓書邢恕自執政者皆為廋辭且曰司馬昭之心路人所共知之至是恕首𤼵目謂劉摯王巖叟范祖禹等六人有謀又髙后崩時羣臣有宻奏多在卧内因焚㝠贈物為一切焚去疑有獻謀者且獨得祖禹諫䟽風聞禁中求乳人方天子富春秋未納后今求乳人則宫中必有孕者因謂髙后非所以保䕶天子則祖禹有意揺動矣合此為跡於是盡拘干驗及文書就獄魯公時為翰林學士承㫖方屢以獄事對而哲宗語益嚴峻魯公進曰為人臣而欲廢主天下當共疾之况臣等乎臣在元祐時嘗兩過闕備見人情若謂無觀望則不然至於有廢主之心恐欺天也且主名者皆已前死獄事一無所據驗不得持恕及甫偏辭而妄殺人且臣下與其導陛下以族人之家曷若將順上美擴天地之度寛此無辜哉時怒未息又哲宗素威嚴二公為之汗浃其背而魯公詞益懇惻哲宗猶未許但屢飭盡力曰卿莫是要放了假當時廢朕則有死已耳詎得至今日耶魯公叩頭又力言之哲宗大怒作色不語二公亟退魯公以笏攔二公且力爭哲宗怱以手據膝張目而言曰嚇為卿赦此六家於是魯公獨再拜謝因劾及甫手欵謂有司馬昭之心不知所出引據失當獲罪獄事遂得觧其後陳諫議瓘擊魯公有曰不族劉摯者終歸誰恩欲斬王珪者初亦何事盖即謂是也欲斬王珪語具家傳不及於崇觀故不錄曽公是時雖不同元祐亦與章丞相叔父文正公不合及上即位時曽丞相執朝柄又復大逐熈豐時人魯公白上曰云云家傳盖是絛别有此書今不傳此黨籍篇叙文及甫獄事皆與它書有異絛偶後死因竊取當時公議妄有著述要亦不足信也京有劄子紹聖五年四月二十五日垂拱殿進呈可證絛妄為其父飾説决不可信也紹聖四年閏二月十七日黄履已自吏書為右丞蔡京與安惇究治文及甫劉唐老事在四年八月十六日陳瓘元符三年九月十七日奏云京在紹聖親入文字乞族摯等并龔夬十月三日奏俱可證條竊取著述之妄曽布日錄四月甲辰云兩轄俱以奏告南北郊不入章惇為布言蔡京有章云昨治文及甫張士良事語連劉摯等皆未曽行法乞施行惇云及甫書詞别無證左摯等已貶死但欲禁錮其家属耳此必不可行許將亦以為然布笑云此皆長者之言也惇云京又嘗言不誅楚邸則根本不正此亦豈可行渠論議大約如此布云亦數聞希道此語頼上睿明察其言不足聽爾上嘗諭布云燾摯等雖有此謀楚邸何由得知盖合謀為此則非三二人可辦其株連必廣然非睿明豈能洞察如此也將亦深以為然劉跂辨謗錄載諸人説此事頗甚詳悉今悉附注此可徐為考證也建中靖國元年正月十一日跂就東府見韓治説紹聖初蔡渭便曽陳狀首論元祐大臣懐姦逆之意其狀李清臣在中書封起紹聖四年又陳狀具言安燾李清臣沮抑不行方下邢恕檢及甫書恕獨對入言小子並不商量遂繳上真本是竹紙由此差官究治具説及甫書及供通語言並與後来跂所見案牘本中無異又説據尚洙書札是一庸人惟渭狀甚有倫理明是潤色意謂卞輩跂案韓治説上件事時已盡見案牘真本但隠傳聞治又言及甫供通朋類稱葉濤孫諤南京人詹適孫升龔原皆劉摯黨人二蘇范祖禹等非劉摯黨自是姦黨跂據後来所見錄本案牘却無葉濤等姓名必是錄不全治又言有許劉某以不死之語治又言邢恕服除赴永州路逢蔡碩及甫書一本與碩碩嫁女與文康世因到西京視女親見及甫所説粉昆謂韓氏專怨魏公册立後来到官所供乃不同碩壻許并亦曽如此説治又言往年親見邢恕説粉昆謂何晏兄也治又言頃任京西路提刑本路常平李鈞即安惇門人素親厚常從容為治説惇昔日宻説同文事恨無的驗只得潞老一手札足矣又正月十二日跂就府第見安燾跂説近方得知尚洙子細聞之甚喜却説周秩曽言龔原在徐邸與劉摯書簡交通哲宗意却不以為然究問得果無有周秩尋被責故朝㫖報出十九日章中不載又正月十二日牛寔来跂安下處説今月九日左僕射取中書門下房文字偶見頭簽有尚洙字畧就房吏拖㸔一遍並不見先相公名字因省記紹聖四年内有官人都堂出頭令引在暖閤内就桌子上供狀甚乆自納與章相公了退去乃是尚洙官人即不知所供何事寔乃先父門下故吏充三省行首跂到京凡親舊皆托體問尚洙事故寔特来説此事又正月二十二日跂詣張舜民相見舜民時任吏部侍郎言去年秋四次登對皆乞早辨宣仁疑謗則諸臣僚家誣搆事皆釋然金口謂當日誣謗自不分明今日却不用分明辨之問曽見邢恕責詞否此乃辨宣仁也對未曽見後来又責周秩廣德軍上又云亦辨宣仁也舜民人説婁后語言本是章惇説出指以為邢恕所言恕曽上章乞與賊臣惇各加五木對辨於御史府不降出舜民曽乞降此章付外上不允又正月二十八日李格非説龔原紹聖間為范鏜所脅甚窘鏜再三言不若寔説了恐後来轉不便原只稱實無格非言龔純篤稍有分毫必被脅出跂謂前見安燾説周秩所言究治無實恐後是章惇親改曽委范鏜又正月二十八日韓治説范祖禹劉安世同論雇覔乳母再責降詞云規欲動揺是章惇親改最以劉范為造端之人及甫究治所供狀通安世而不通祖禹不曉其意又二月初三日李格非説曽見鄭雍言惇相在位誅戮斬伐之語不離口每言斫十數大姦首級使其子孫流離惡地豈不可觀又二月初七日宋喬年到跂安下處説蔡元長既召蔡蕃相見從容蕃問曽聞邢恕言於人自謂與劉某甚有恩京言誠有之京將上殿恕適相逢牽京衣袖言劉梁二族在此一舉公其念之喬年又説蔡元長安惇究治未明的確間一日卞告以惇相宻議别差官勘鞫京大怒因以急速請對遂陳述惇素與臣有嫌若别勘必差路昌衡此人不惟覆兩族必以縱反者陥臣等遂再三哀懇上笑言不别勘再三言不别勘蔡蕃者摯長女壻也又二月十一日王摭説曽有省部文字下書舖告示元告人尚洙等劉某梁燾已身亡更不施行取知委去又二月二十日跂累見安厚卿稱張士良内臣獄中百端誘脅並無虛説人甚竒之又見韓治説士良供通别是一巻與及甫不相干但同在究治所耳累欲見之未得今就白鐡班所居處見之説自白州編管令過闕既到城外開封吏監送軍廵寄禁半月日忽夜送一處簾前詰問先示以知而不告同罪條又許以見聞贖罪凡四五十日却送白州問以及甫事乃不相干跂更不敢復問又二月二十二日跂在相客次逢馬玿玿説往年守官京東運判時邢恕自青州過鄆既去運副黄寔宻語玿非乆有一極大事必作是邢説但不得其詳跂是年未赴蘄陽侍下在鄆見恕經過曽往謁之其人平日於先父及跂何所不説今雖異趣謂其尚相存恤而辭氣乖忤踧踖如不遑乃知所懐如此又三月一日跂就府第見李清臣亦説封起渭狀幾欲赤族誦其落職辭云力䕶凶邪公為蔽匿清臣再執政惇相尚未去位曽宻問向者王司馬劉梁等數事相公皆施行的確有何照證到今未若曉得章但云别無他事各自别有因依終不肯説清臣又説惇曽因奏事上前自言此數事王馬劉梁等事皆是邢恕説與臣因此責恕恕上章乞與惇對吏不降出是金口曽諭跂謂此與張舜民芸叟所説同韓治亦曽說如此當是的實又三月七日跂就劉唐老家見之唐老説丁丑年六月中文康世告妻父蔡碩言及甫與唐老宻謗時事言不乆必變惇必族滅餘執政必竄又云康世見劉唐老親説碩使康世形於手筆携往見蔡卞遂有㫖下監司周秩根究此事未了九月中同文事又大作遂先攝及甫下同文獄後来方興洛獄跂見曽右相説先因劉唐老事後有文及甫事與此相符然不曽問得洛獄後来如何結絶必有知之者當問詔比幸睿成宫其先朝從龍官等已推恩外其宫官責授崇信軍節度副使致仕韓維特復左朝議大夫致仕仍與一子宫觀差遣故孫固邵亢王陶陳薦孫永孫思恭逐家各賜銀絹共三百匹兩先是曽布言陛下於先帝恩舊推恩無有遺者獨韓維未有恩㫖維年逾八十諸子皆當得次逺官無復可仕官陛下推恩免諸子逺適使維垂老得諸子在側有禄足以自給恩亦不細上曰與免一子布曰維止三子俱免亦不多上曰當諭三省布曰臣欲傳㫖三省上曰待自諭與之布唯唯布錄此叚在四月己亥翌日上諭三省而三省有毁之者以謂免均州之行已推恩矣後五日布又為章惇言維且與免諸子逺適亦為賜大惇曰何必如此但與復官則自無此事布曰如此何善如之鄜延路經畧使吕惠卿言進築納木囊山新寨畢工詔賜名殄羌寨二月一日乞進築西賊犯順寧寨副將張守德邀擊之斬十二級奪馬四十匹以有降羌預告邊將故也布錄辛亥涇原遣孫文將九千騎出没烟擊賊屯斬級獲孳畜布錄辛亥四月二十三日辛丑當考涇原又奏乆旱草未茂乞展限進築沒煙詔以五月中旬進築布錄辛亥權吏部侍郎趙挺之為中書舍人給事中徐鐸為吏部侍郎癸丑以受寳畢恭謝景靈宫至於甲寅乙卯幸凝祥池中太一宫集禧觀醴泉觀還自醴泉詔特賜諸軍特支如端午例户部不覆奏即日施行既而又賜二府金帛衣帯皆出中㫖云御史蔡蹈言臣伏見今年五月一日大慶殿受傳國寳在廷之臣預行事者方被賜賚其餘皆陪位之人即無被賜賚例近聞陪位官獨宣德郎人各賜絹十匹臣本察曽行取㑹所𨽻官司皆不知有此指揮臣契勘自来朝㑹於升朝官外吏部更差京官宣德郎五十人相貼陪位止欲充盈班列而已若賜賚下及陪位之人則京朝官一例霑恩更無間異今捨朝士而獨取京官臣愚不知是何官司申請畫到指揮未恊在廷臣庶之議况支散之日又不預行關報臣竊慮宣德郎者其間多是待選吏部覊旅隠約素不指望無由探伺或告報之時偶有出入致未必人人徧受其賜京朝官等是陪位之人今止及京官若又不能徧則朝廷惠澤未為平施臣伏望聖慈特賜睿㫖根究施行蹈言附見從違當考大理寺欲將臺察公事一月以上者並引用五月二日德音原免庶在京官司均被恩宥從之新無丙辰轄正進奉大首領納瑪密戩小首領阿嚕等並為銀青光禄大夫檢校國子祭酒兼監察御史充本族副都軍主軍都指揮使七月癸丑辭丁巳詔大禮令慮有續降并删改合行改正文意可專委左右司郎中等㸔詳修冩一本及元降舊本進入戊午宴于紫宸殿宰臣以下文武職事官六曹貟外郎監察御史以上武臣郎將諸軍副指揮使以上預坐庚申詔獻寳人叚義為右班殿直仍賜絹二百匹正月十七日三月十六日五月一日鄜延路經畧使吕惠卿言進築博羅特寨新寨畢工詔賜名威羌寨二月一日乞進築涇原路經畧司言歸順人部落子明山委是心白向漢詔明山特與副兵馬使鄜延路經畧使吕惠卿言投来人稱西界人户在大沙堆存泊及人馬在南防䕶㝷令苗履劉安統兵至大沙堆等處破蕩賊衆斬首八百級生擒帯牌偽天使一大首領二牛馬孳畜萬計族落燒毁殆盡班師至威戎城詔諸軍士各賜錢有差惠卿家傳四月遣鈐轄苗履諸將出寨二十九日至夏州焚蕩而去五月一日至大沙堆賊帥威五明噶勒丹嘉納克多凌率衆迎敵履等力戰破之追奔十餘里斬首五百餘級獲其帯牌天使一名大首領二人孳畜萬計布錄六月二十五日賞功樞宻院言諸縣冬教委提舉保甲司於本州通判職官内選差分定縣分躬親提舉監教及同共拍試揀選不得過兩縣如拍試揀選日數相妨聽計㑹逐縣展縮不得過兩日如縣分數多聽於以次官内選差其倚郭縣上委知州同當職官依此提舉拍試揀選仍逐次具所選差官職位姓名及分定縣分申樞宻院即所選非其人致教閲拍試揀選有不如法并元選差官司取勘施行從之此並用舊錄元豐保甲但於諸縣團教不曽上州昨以義勇法修定三年一赴州教而議者多以為不便故罷此據布錄昨以義勇法修定當考又言博軍子遇軍行委所屬曉示只得於軍馬後隨行如敢偷路先自過界並從軍法許人告捕每名賞錢十貫從之辛酉京西轉運副使周秩知登州以疾請也翌日曽布對上忽問曰周秩有何事布曰不知何等事上曰章惇云卿曽言及秩事布曰臣曽見李延嗣延嗣以承議郎權成都運判改權京東運判在三月二十五日其初為成都運判在紹聖四年十二月二十五日言秩作轉運使時事上曰是惇亦曽問延嗣如卿所聞且言秩在兩浙不檢事甚著已令體量布曰臣見延嗣所言乃淮南事秩自淮南移京西因歸泰州遂於揚州奪一豪子見賃官屋逐其家數十口出外又於真州諸官屋官為修葺物論甚喧上曰此事尤不可也臣僚上言請自今太學公補試視貢院别試所空閑排辦更不以武成王廟作試所從之詔鄜延路經畧司詳問近獲西蕃帯牌偽天使如知得西界事宜令乘傳赴闕詔太僕寺自今應到寺四尺二寸以上六嵗以下雜馬並赴揀馬所揀選訖方許支使左司諫陳次升奏乞獲首級令監司覆驗及孳畜據實數推恩三省樞宻院以為孳畜自来不曽推恩首級難以令監司覆驗遂進呈訖布錄辛酉壬戌尚書省言進奏官許傳報常程申奏及經尚書省已出文字其實封文字或事干機宻者不得傳報如違並以違制論即選造事端謄報若交結謗訕惑衆者亦如之並許人告賞錢三百貫事理重者奏裁從之又言户部奏請應提舉出賣觧鹽司管下官賣及通商去處欲乞並委官專切提舉廵捉私硝鹽事如廵捕官不切用心致本處課利虧失及州縣斷放違戾許按劾并取索公案依條施行從之是日章惇遣涇原書冩機宜章綡謁曽布綡楶子也布語之涇原此月八日尚奏無雨沒煙前峡若果無草及大暑旱災未可進築但奏来不妨朝廷不可欺罔若可為而不為固自不可若不可為亦何可强綡曰此事須頼宻院主張若丞相則不容其如此布曰茍不可為何可强也邊事内外一體但要穏便此事繋安危休戚何可使性氣質夫左遷但以奏報偶有不當不足介意朝廷方倚以邊事有可論列不可蓄縮若所陳有理亦何敢不從若五月未可進築即七八月方西兵㸃集時亦未可為須俟十月間賊馬已散或并兵在他路或俟来春亦未晚綡曰但恐丞相督責不容如此布曰事理當然亦不可奪也綡又言父老嵗月間欲求去不知邊事如何是了時布曰涇原但了取天都則質夫可以求去矣若丞相之意則不然必欲覆興州而後已孫路兩表皆云俟覆妖巢乃敢受新命丞相以畫河為界為雜賃院子中語然經營邊事固自有次第既得河南則興州自有可圖之理但不可忙爾先是布在醴泉語惇及此惇大以為非布亦痛折之許將但相和觧蔡卞則黙然而已癸亥詔涇原委是乆旱未可進築即相度聞奏環慶奏罷築之字平以無水故遣种朴應副涇原布錄癸亥兩浙提刑司言人户陳訴為犯私酒遷徙往别州縣乞依赦許放按去年九月赦編配人已特減三年揀放乞比類施行詔已遷徙人放令逐便甲子觀文殿學士右銀青光祿大夫知延安府吕惠卿換保寧軍節度使再任知延安府先是曽布言前日章惇云惠卿去再任止半年便與建節不妨臣以謂建節未可輕議惠卿進築城寨已改四官今為右銀青光祿大夫天下止有惠卿一人為之將来築了但可降一奬詔而已再任但可遷左銀青朝廷名器所當愛惜未可建節也左右銀青乃真尚書舊六尚書皆細轉今更一遷則為特進矣上笑曰更有金紫光祿大夫王珪嘗為之又曰章惇照管惠卿家兄弟布曰此衆所共知凡温卿升卿所請不問可否無不從者温卿昨在淮南奏乞真楚泗州非假日不得用妓樂筵㑹㝷從之既而將替又奏乞監司得替知州轉官雖非假日許用妓樂亦從之中外以為口實同列中亦有言盖許將曽面斥惇此事又言康卿自長垣知縣得替十餘日間便除開封知縣見闕其他堂除人有得替一年半年不得差遣者上曰又有一和卿布曰已死然和卿人材最下又不及温卿而温卿又非惠升之比上曰升卿修學亦能講説曉事但不平穏爾布曰聖諭盡之矣蔡卞亦嘗言使升卿在此豈肯安靜必須别起事臣亦以謂其天資如此若邢恕終以不靜敗事豈其性然也前此上又嘗問劉宗傑以私謁后族得罪見説性極狠布曰與同官爭職事不勝後隔一兩任罷歸猶進狀不已至下獄終不直遂致仕元祐中復起上曰致仕者須有人舉薦乃得再仕布曰不然如吕升卿諒卿只是尚書省用堂劄召上亦哂之鄜延凡進築九城寨惠卿既改四官餘六城寨未推恩於是以進築並已了當及惠卿將任滿合推恩特除惇乆有擢惠卿意衆頗難之既而惇議以招地及再任一併推恩上遂許之仍顧執政曰已上更無可遷許將曰但用移鎮爾上又問故事如何布曰舊亦有例如丁謂程琳程戡皆不曽作相後亦建節惇曰近嵗王拱辰不作執政亦建節元祐中馮京亦是布曰京曽作樞宻使自當鏁院上顧蔡卞曰樞宻使自来鏁院卞曰然上嘗謂布當作使故有是問布又曰文臣以節度使為重武臣以宣徽使為重文臣先作宣徽然後建節武臣多先建節乃得宣徽使盖欲上知建節之為非常恩也二十三日惠卿奏云云可考司封員外郎朱京為國子司業二十六日罷詔故西上閤門使樞宻副都丞㫖宋球除合得恩澤外更許陳乞親屬差遣一次乙丑詔寳文閣待制知永興軍胡宗囘落寳文閣待制充集賢殿修撰知隨州宗回前知桂州妄加助教蔣昌罪昌病不令家人入侍死於獄中故有是謫工部言諸路經畧安撫司自今後如因修葺城樓器具請先行比對元豐法式參照興修如一路一州舊制已完與新制有妨者即相度利害以聞熈河蘭岷路經畧司言歸順部落子博伊克稱曽投夏國今復誘致親屬二十餘人并首級馬等歸漢詔博伊克為三班借職仍賜絹五十匹涇原路經畧使章楶言已出師於没煙前峡等處進築城寨詔賜軍兵等錢有差布錄涇原奏十九日期秦慶兵㑹鎮戎以二十二日進築没煙前後峽詔走馬喝賜特支工部言河埽退慢見在物料委都大司約度除合存留外據應那撥之數比般運脚乘之費有聞官者仍審量所要向著之處可以收買得足不悞支用即本司關州縣估定價直出賣到錢津般却行收買從之新削詳定一司勅令所言州縣倉糴納斛斗級行重法者每三人為一保保内因本職犯贓罪許經官舉發知而不舉者減犯人罪三等即事發逃亡量所犯輕重均備賞錢或監錮收捉其衆人不保者相度去留如諸色人告獲除酬賞外願充贓子者聽承替從之新錄削此月丁亥可考紹聖四年十二月戊申初立互保法吏部郎中編修都官條例方澤言軍大將已經改轉而再應磨勘者並自初補後通覆㸃磨即誤已改轉改正訖㸃磨人與理第一等功一次諸軍大將磨勘而誤改轉已給付身者主行吏人杖一百不以赦降首失原減即未給付身者量輕重理過名上簿事理重者申尚書省從之新無詔賜荆門軍漢夀亭侯關羽以顯烈廟為額從本路監司請也丙寅詔以六月朔改元為元符初議改元上謂輔臣曰前代元鼎之類皆明白如何章惇曰元符最好其次有真符寳符皆不及兼寳字皆先世末嵗所稱如天寳皆是上曰如此即且作元符曽布以為昔天書降嘗於承天門裏作元符觀後以火廢則元符之號亦不甚佳自云已嘗論奏更不欲紛紛故黙而止三省言安燾先落觀文殿學士已及一期詔安燾展一期取㫖當有議論須考詳詔朝奉大夫知晋州劉昱承議郎通判晋州王䝉各罰金二十斤以嘗薦指斥人胡潔已也并正月九日詔秘書省撰祭顔子孟子祝文從朝請郎吳深請也戊辰詔自今除名勒停應叙用人不許帯勲賜熈河蘭岷路經畧司言歸順部落子大首領威明約黙特乞特補西頭供奉官帯本族廵檢從之履環慶路經畧司言修築横山寨通塞堡畢工詔如京使李浦以防托部役减三年磨勘又以傳逹朝廷恩意招到歸順人衆更遷兩官走馬承受西頭供奉官盖横以接納歸漢蕃酋減三年磨勘餘各等第推恩是日尚書右丞黄履獨留對甚乆既退上問曽布曰章惇待黄履薄每議事多云履理㑹不得布曰惇誠輕易待同列多不以禮獨於臣不敢慢臣亦不為之屈大率接人鮮禮又多以語言傷人如吳居厚乃惇所引然郭時亮言居厚亦怨之云每至都省白事多被詬辱上曰尚書體重不當如此布又言向䝉宣諭邢恕云人畏之如虎臣大以為不然惇於政柄多為人所移易所主人物多為人所攻病人實不畏之但以語言輕易遇人無禮及不接賔客中外慢罵萬口一辭只如接從官只着道衣此尤非禮上曰着甚道衣布曰隠士㡌紫直裰繋一縚而已上又曰見蔡京何如布曰渠既例如此想亦不為京變然不曽問兼只自去年来如此臣昔作從官亦曽謁之相見差遲問其故云方着道衣接郭茂恂以臣来換衣服盖是時惟以道衣接郎官輩上深哂之曰此誠不可布曰近臣乃人主所體貎接之不當如此上又問卿等如何布曰莫非朝服從官叅辭謝必秉笏見之上數與布言惇論議及所主人物為不當布亦言曽與蔡卞論惇見邉報凡云西人困弱畏懼或云怎生奈何去則必曰此報是實若云西人㸃集兵馬待来作過則必曰此是亂報卞答臣云何止邊報如此其論政事及人材無不然者以至臣僚奏請如吕温卿升卿之徒所請不問是非皆欲施行其不恱者雖更有理未必聽上亦哂之布退謂許將曰履今日之留似有所訴將曰懐此乆矣同列孰不然者但人人望公過此爾布曰尸素無補日有去志安有此但惜惇止以語言禮貎失人心致上意彌不恱爾將笑而不答八月己丑蔡京乞立法己巳刑部言請應縁邊井其餘不拘元来路分解撥都知兵馬使補充軍大將到部遇汴河綱有闕如不願押者縁邊人聽歸本貫路分經畧安撫鈐轄司聽候差使候三年滿替歸部依條對入第四等重格差遣餘並聽歸本路押綱一次如本路無綱却許歸都官依條押汴河糧綱一次若不願就押即許令降一等指射次第五等見闕綱運一次候回日依條各對入本等重格差遣從之新削祕閣校理知随州趙叡為司封郎中二十六日罷庚午河北轉運司言乞本司不拘常制奏舉勾當鹽事文臣二員詔特許奏一次權禮部尚書蹇序辰言按元豐四年三月詔自今在京官司合舉辟去處不得舉辟執政官有服親欲望申明前詔以昭至公之道詔在京官司自今遵守仍令御史臺覺察弹奏其已舉過人契勘取㫖序辰言此盖為曽布甥王斿發也王斿事具六月乙巳二十八日詔丹喇關賜名㑹寧關前賜通㑹關勿用政和元年七月十八日檢㑹此詔乃以為元豐四年三月十七日所立條按此條實四年三月八日乙未所立熈寧七年已於河州置通㑹關故改此三月二十七日賜名通㑹今改之鄜延路經畧司言修復米脂寨畢工詔統制龍神衛四廂都指揮使吉州刺史王愍遷一官同統制四方館使祁州團練使苗履復遥郡防禦使仍各賜銀絹各五十匹兩朝散郎石丕等五人候本路進築城寨功賞畢日併取㫖餘各等第推恩布錄同呈米脂修城賞功内文臣各已三四推恩得㫖候本路功賞了日一併取㫖盖自此猶有四次築城寨未賞功也張若訥以負犯更不推恩吕惠卿既修築米脂等寨慮執政有妨其功者因取前後所降朝㫖條上且乞留中曰此據惠卿家傳修入家傳云慮執政之見憾者又將妨功盖指曽布也今稍删潤其語三月七日米脂寨畢工四月十二日平夏城畢工五月四日殄羌寨畢工十二日威羌寨畢工二十二日米脂寨賞功臣先準樞宻院劄子奉聖㫖令臣體問相視米脂細浮圖聲塔平石堡塞門黒水至大里河長城嶺以来選擇地利從長進築臣計本路横山膏腴要害之地無過此數處而其逺不過大里河長城嶺以来若不委自本路從長擇利進築一一奏候指揮往還旬日必至有失機㑹則上件朝㫖已得詳盡而故安逺寨發兵興工已得指揮差保甲般運而忽降朝㫖放散臣深以為疑續見邉人有機㑹可乗而細浮圖聲塔平正在大里河之内既有許從長擇利進築指揮臣一靣奏知計置進築畢工别無闕誤自後又準三次朝㫖今後進築先相度利害聞奏候得朝㫖方計置人功物料乗機㑹興功前後更有似此指揮不一各有相妨臣皆未知所遵依㝷具劄子申明凖樞宻院直批若踏逐到進築處與新建城寨形勢相接自合乗伺機便進築臣以本路兵將新破宥州及夏州東日密壘賊衆驚潰臣遂進築杏子河盡依累降朝㫖正在長安嶺以来與新建城寨氣勢相接合乗機便進築復準樞宻院劄子所有餘經營去處如委係合要固䕶籬落湏至進築亦未得興功仰先具的確利害奏候朝㫖臣㝷具開公羅谷等處合修築利害聞奏自後未䝉降到許令進築指揮將謂朝廷已下令本路進築至今年正月内朝㫖下諸路遇有進築城寨如合要和雇脚乘般運糧草材植等其所支雇直務從優厚亦降付本路臣方知朝㫖却許進築遂具米脂合行修復聞奏其餘納木囊博羅特係新寨氣勢相接及補䕶籬落要害之地雖合進築縁有碍去年九月聽朝㫖方得興功之文臣若一一論列乞行改正方敢興功不惟於中外之勢不便兼往還旬月過此春夏之交天氣將暑六七月間賊馬漸肥難為興功臣遂乘此困弊未能大集之際除米脂用六將人馬修築外開公只用第二第四兩將臨夏更添第六將共三將納木囊用第三將第七將第五將博羅特更添第六將共四將皆已畢工所有博子椽散子木橛子要子之類多就生界採買其役兵並用防托馬軍相兼仍諭以朝廷犒設喝賜屢有優厚之恩并邊境急難當及時興舉之意以此人人勸勉有至一工為一工半或兩工者每寨不過五六日而成既用將分不多及修築日數少以此比之諸路所費及合得酬奬極有减省而將吏日夜暴露實為勞苦竊慮政府以本路有違奏候朝㫖之文及見其成就之速以為甚易將来推恩轉更鐫削無以為勸伏望聖慈候功狀到日特賜指揮依前諸路及本路前後進築酬奬例施行米脂畢工在三月七月至五月二十五日乃推賞王愍等惠卿止奏稱春夏之交必在五月前矣因曽布云尚有四次未賞故附見此十七日惠卿建節布已云云可并考權刑部言請諸赴朝參宗室如有疾病請朝假申閤門令閤門報入内内侍省差使臣押醫官㸔驗如渉詐妄所差使臣申大宗正司施行其請假一日者正任以上具牓子於閤門關宗正司遥郡以下申大宗正司施行若月内請過三日者亦報所屬差使臣押醫㸔驗每半年一次比較二十日已上取誡勵三十日已上罰俸半月四十日已上罰俸一月五十日已上取㫖責罰即痼疾未能痊安者委大宗正司保明奏裁諸差使臣押醫官㸔驗宗室請假而㸔驗不實者醫官徒一年使臣知情與同罪不知情减二等從之辛未吏部侍郎徐鐸言傅垣之乞磨勘改官縁垣之係堯俞親子本部未敢便依常格引見磨勘詔傅垣之展一任如將来任滿合該磨勘改官仍降次等癸酉給事中范鏜言祕閣校理知隨州趙叡除司封郎中錄黄未敢書讀詔趙叡除命勿行二十二日除先是上詢曽布叡何如人布曰場屋中有聲但以吕大防薦館職及外議皆云是大防門下士上曰又是章惇衆皆言不曽商量忽出一文字言其曽論先朝改明堂為是故擢之云是太常張商英檢来又云葉祖洽曽言祀五帝為是先朝所改為非上曰此羅織也若以此罪人則章惇亦必有之布曰陛下睿明天縱士類之福若以一言之差便廢一人則何可勝廢兼惇實有此論議如與司馬光爭免役事為天下所稱然其言亦未嘗以免役為是但云當除議改更不當暴發爾上云方澤誠可罪只是惇門下人故主張他布曰澤本惠卿親黨然惇於惠卿親黨過於已親黨無不主張者上曰何故布曰此陛下所素知惠卿作執政時惇乃門下士鄧綰曽攻之云為刎頸之交半夜之客昨既復用許力引惠卿為右相陛下固嘗宣諭上笑而頷之按下文疑有脱誤既於此不諧故於惠卿建節及其兄弟親黨凡可用力者無不盡力惠卿兄弟亦凶横責望惇不細昨力引惠卿不諧其家皆大罵惇不得已答之云若朝論中九人以為不可一人以為可惇猶可着力今十人則十人以為不可惇無如之何方少觧上自祖洽論方澤極切齒而惇輩主澤不肯行上亦不平惇乃更擢趙叡以其論先朝改明堂禮文為是而祖洽以為非欲因此中傷祖洽上是以有羅織之語也六月一日方澤自虔徙萬司封員外郎朱京乞罷國子司業除命從之京嘗為幸太學頌語有及先朝者蔡卞又謂京與曽布有連故亟白上從京請京除司業在十七日甲子甲戌詔西京左藏庫副使康德輔特勒停坐擅役軍廵人也詔陜西河東帥講議擾耕如何可以使其不得耘鋤已耕之地免秋成為邊患三月二十四日詔六月末楶奏可考又詔涇原一併進築没煙前後峡曽布言今嵗諸路蠶麥俱大稔惟陕西沿邊旱自此月十六日環慶涇原皆得雨露足二十日乃止云遂為豐年故令涇原一併進築並布錄甲戌乙亥詔永裕陵添展封築禁良角斜長二百三十五歩至白虎澗西垠二月四日八月七日丙子樞宻院言蕃官三班奉職都勒滿登等乞改賜姓名詔並賜都勒滿登名懐順都羅摩尼揚昌名懐忠大理寺平定軍勘到供備庫副使前知寧化軍馮維舉宣德郎平定軍簽判王宗旦供奉官監押劉舜元將公使庫錢物回易并在任興販等事該赦及赦後虗妄詔馮維舉特除名勒停王宗旦劉舜元並特衝替樞宻院言河東路買馬科定州軍匹數致令市户於别路陪錢收買詔樞宻直學士河東路經畧安撫使孫覽特降為寳文閣待制覽數與宻院爭事語侵曽布布不能堪於是布言河東不因出師無故差雇脚乘一路騷然至有七十千雇一橐駝者急止之民間所雇脚乘已集於河外帥司㝷放散然民間已縻費矣又分下州郡科買馬至州郡出分據付百姓往陜西買馬中官秦州繳公據申宻院宻院屢令改正而終不從此亦當施行其罪狀過楶逺甚上曰此不可不行布退以語三省三省亦皆以為不可不治兼有實不湏更體量也三月十三日十月二十九日明年四月二十五日可考覽本傳云覽治邊數有功而議事多與執政不恊乃坐軍期嘗下屬部市馬雇畜垂降授寳文閣待制言者又摘奏中語落職提舉集禧畢仲游誌孫覽墓云既城榆木與米脂直於是秦晋始合而寇不得至麟府是時章惇子厚為宰相曽布子宣知樞宻院欲遂合兵以取靈武公曰靈武未可取也乃移書二府具言靈武非餘力可下且曰靈武之事曩嘗聞餘議於相君矣要使陕西不知用兵而以嵗月下之竊私美至計便䇿無已而今反欲速何耶二府不聽公乃上䟽論其事子宣怒乃曰葭蘆之役嘗使支郡市馬儲畜是擾也即以功進樞宻直學士而以擾奪二職為寳文閣待制猶守太原公上表謝又曰謝語不䖍可謫也復禠待制提舉江寧府崇禧觀自是數復數奪三月十三日詔書恐即是章曽欲取靈武之議也覽進宻直在紹聖四年三月十六日降寳制在元符元年五月二十九日相去一年有餘畢仲游但取行文順便頗失事實要當删取之元符三年五月二十五日臣僚云云當考丁丑御批大禮御營四面廵檢下所差人馬大叚數少又非常日時暫出城可比自今後可依下項差仍並於上四軍選御營廵檢下每員各歩軍二百四人内將校四人節級二十人馬軍一百二十人内將校二人節級十人青城至郊壇廵檢下每員各歩軍一百二人内將校二人節級十人馬軍五十一人内將校一人節級五人御集五月三十日下先是曽布議用趙㞦為樞宻都承㫖三省皆以為可既而朱京罷布曰㞦亦當更熟議蔡卞笑以為然遂託章惇并黄履閲㞦章䟽惇曰已閱一䇿無他語布曰㞦元祐中嘗攻范純禮不當為太常少卿是日甲戌許將蔡卞皆不入履獨封㞦章䟽示布曰嘗乞召還𫝊堯俞王巖叟梁燾孫升云此數人學術器業為世所稱忠言嘉謀見於已試又言王安石用事子弟親戚布滿華要自是習以為常乞如祖宗故事仍之雖云内舉不避嫌其實不能無私意於其間也履以謂擢之必有議論恐并以故栖不保不若黙已為佳爾㞦故栖當考是年八月八日自鴻臚少卿改太僕丙子布白上累曽奏以都承㫖闕人亦屢與三省論議未合昨欲除趙㞦又以其曽為元祐言官終恐未安上曰三省必不肯布曰士人中熟朝廷事容止詞令可觀如韓治亦可用但以忠彦子恐亦不免人言上曰章惇曽言治於劉摯門下為半夜客恐難用布曰臣固知用治人必有言但以韓琦有功於國如忠彦自給事便遷尚書恩禮特異若以琦故用之則其他皆可濶畧上曰粹彦如何布曰粹彦資太淺亦恐未歴事如治則以嘗為吏部郎中又見作校理止換一直閣便可為故敢及此上曰但與三省商量布曰次第必難容止詞令及祗應儀範亦豈有天然詳熟者此又非難事縱生踈一兩月亦便習熟上亦深以布語為然布欲用郭知章而黄履云知章别有任使處上曰知章亦好布曰只為見任差遣已髙上曰與一待制又曰兩制中有人否布曰兩制中如吕嘉問容止詳熟亦可為然憸巧不正之人臣不敢引置陛下左右上頷之布至都堂具以上前語告惇及治惇果有語如上所諭云此不敢聞命又云治字循之衆以其心難測目為循海雖族人亦莫不惡之摯與忠彦多為此人所壞布曰此更不須議㞦嘗為元祐言官亦必紛紛不若只用知章如何衆莫不稱善惇仍曰便與一待制布曰德音已許卞曰極穏當將履亦皆以為允議遂定自宋球卒承㫖司闕官嘗擬用王師約及曹誦既皆不可得詞令於郎官少卿中選人而累與三省議亦不合或云趙令鑠令鑠八月八日自太僕卿遷鴻臚卿可而亦上所不恱惟㞦頗可用履又力稱之及閱章䟽乃如前云云而罷遂定議用知章欲將上而履更欲力引知章為西掖上問知章文字如何布亦稱之上曰曽見知章文字否布曰但見章䟽爾然南中士人多爽邁必亦不至不稱職上頷之及進呈知章除承㫖上顧三省再三問如何三省皆曰平穏上曰中書舍人闕人且别擇人布曰舍人亦嘗只置一人上云本六員一員太少布曰宻院闕人已乆舊未用士人以前自有諸房承㫖一員謂之都宣自先帝改用士人所𨽻職事非前日之比及外司并諸路申請文字不少今但以一副承㫖吏領之文字稽滯已多矣不可闕人上曰趙㞦可用否布曰臣固欲用㞦但以元祐嘗在言路恐不免人言聖意謂可闊畧乃可除上曰有文字否布曰臣不曽見編類章䟽但見黄履言㞦有章䟽乞召還傅堯俞王巖叟梁燾孫升為侍從言官仍云學識器業為世所稱忠言嘉謀見於已試蔡卞亦云臣曽見實有此語上曰如此即不可只為有文字布初以謂卞不知履亦令黙已及此乃知卞已知之布若不言俟有除擬必紛紛矣先是惇又言㞦有三章言訴理事為仁政今聞稍緩乞督促施行以終大惠上未甚以為非及聞稱薦巖叟輩則毅然以為不可已而惇謂布曰上欲用宋深如何布笑而已及對上果欲用深布曰深未嘗歴差遣恐未可峻擢若欲近下用人則不若張宗卨宗卨乆在閣門累經先帝任使宗卨以西頭供奉官閤門祗候為通事舍人在紹聖四年七月十七日上曰宗卨亦得只是不曽與説話布曰才術雖未知可然老成熟事比之宋深則有間矣昨使瞎征邊人多言其辱命禮數間頗為瞎征所屈但以事在境外不可推究若一旦峻遷恐人情未服上曰且更與三省商量布退具以上前語告三省卞亦曰深奉使事亦煞曽聞人説布曰深都監監押亦不曽作昨驟遷知州軍已為過分矣衆皆然之此叚布錄在六月一日及進呈上猶以宋深為言顧三省問如何皆唯唯而已唯蔡卞言莫也不妨布曰承㫖臣本院職事不敢不盡愚𠂻深恐未可用上曰莫只為是宋球姪不欲令相繼為之布曰不然只為未更任使恐人情不服臣嘗以為承㫖乃陛下左右親信任使之人若用非其人不惟於職事有害臣亦得罪天下士論上云張宗卨可為則是人做得布曰宗卨在閤門二十年四次引伴髙麗又曽接送伴北朝人使及曽入國與深不同上問三省如何皆曰宗卨亦熟事上乃許布曰只令權管勾候有正官罷若試之可用則遷不可則黜上云甚好宋深却與閤門通事舍人布曰此無不可陛下但且收用徐觀其可用擢之未晚然宋深只合宻院批聖㫖上曰好布錄在六月三日今並入五月末
