body:
  text: 續資治通鑑長編卷四百十六宋李燾撰哲宗元祐三年十一月癸卯朔甲辰三省樞宻院言檢㑹都水使者王孝先狀伏思大河决塞不常為國之患屢矣比自小吴之决遂失隄防貽患為甚欲乞於西岸上自北京内黄第三埽先起截河隄一道與舊河孫村口相照仍相度於樊河第三河靠水作縷河小堤閘斷河門於大名府南第四舖下至孫村口北倣徃時作汴河規模開修減水河一道分殺水勢東趨入海尋召到孝先及俞瑾等令陳述利害據孝先等稱除孫村口外更無不近界河可以回河入海去處其孫村口欲作二年開修今冬先備舊堤梢草一千萬束來春下手先開減水河分減水勢所用兵夫已有前申定數至元祐五年方議閉塞北流回改全河入東流故道已令孝先等供結罪保明狀訖㸔詳除預備舊堤物料便可施行外所有元祐五年閉塞北流回全河入東流故道并來年開減水河慮别有未盡利害欲差官躬親相度具經久利害詣實奏聞詔差吏部侍郎范百禄給事中趙君錫躬親徃彼相度並具的確利害盡圖連銜保明聞奏如孫村口不可開河即别於不近界河踏逐一處亦具保明奏聞開河事始末按實録所載殊不詳今取范百禄奏藁具載之庶後世有考焉九月五日蘇軾云孝先欲於北京南開孫村河欲奪河身以復故道然則孝先建議必在九月五日前矣元符二年十月二十六日工部狀可考文彦博吕大防安燾三人者實主回河議范純仁獨以為不然主議者謂純仁曰某累官河北河上利害曉之熟矣公足迹未嘗及河北安知其利害純仁曰利害非純仁所知至於水性趨下則不待到河北而知也純仁不敢堅以回河為不然但以邊事未寜百姓尚困國家府庫財用有限主上初即位垂簾之際興此大役安得不審謹乎乃議再遣百禄君錫按視明年正月十二日入對累官河上蓋彦博也當考詳正言之簽書樞宻院事趙瞻又言臣伏奉聖㫖同議河事然執政諸人皆未嘗親見河流地勢深淺髙下故不敢决執其可回故道與不可回者雖有論議亦但是遥度非有實據也故今遣范百禄趙君錫專徃河上行視其地至則朝廷方决施行臣議有五敢預言之若百禄等所定合行回河既得的確朝廷必當信行更不别聼論議即須依元計所用舊岸新開物料都數作三年限漸次收買既是和買即當嚴飭州縣勿令配民蓋不遽行收買則價不翔貴故必緩期又所興工役以河北連年災傷止可只科年例夫數接續開掘修治有緒故限之三年乃可以成欲速則民力不勝必致逃亡别起事端不可不慮昔祥符中議滑州河事亦先開減水河口尚歴數歲至天禧三年方書畢工足明大役難以遽興此其一也京東河北累歲饑歉民多流移近兖州稱民有夫妻相食而村野新殯率被發掘啖其屍肉使天下生靈有至於此而議者猶欲配夫出錢州縣且將斂率鞭箠驅索於門臣遽聞之痛切骨髓以陛下慈仁必當為之深䘏尚肯廹其貨物耶謹按周禮荒政之聚萬民則曰薄征弛力今乃重之故臣望朝廷寛其夫役三數年後俟得歲豐家給則民和而事集此乃臣子所不敢避譴謫而深言之者此其二也若百禄等相度到孫村及上下並無回河去處即亦須不惑前議遂當速罷興修及收買物料則不損國用不疲民力况朝廷内外經度可謂至矣盖亦無如之何矣雖有設險之意無險可設則險非可造之物也止可疏導下流自乾寜軍由大禹所治徒駭鬲津見行河道勿使壅遏東入大海接連界河塘濼亦足以為邊境之巨防矣議者惟慮它日河更北徙而失中國之險者兹未易量當俟河徙而議之可也此其三也議者謂黄河為中國之險今入北界則失限隔以為機事之極大國論之最逺者非臣淺智之能識而謏聞之敢議也然臣竊疑之雖嘗有所辯而未得其確論輙願粗陳於前者堯舜都蒲冀周漢都咸鎬歴年皆數百而不聞以黄河障外國盖王者恃德不恃險也今謂前日澶淵之役若非大河則敵南抵都城矣此又不然也澶淵之役盖以廟社之靈章聖之德㓂凖之謀威震北人射中大帥達蘭北人乃請和而退豈獨云河之力邪如晉時河固在澶淵而匈奴犯闕安能抗之哉朝廷若内用賢輔外有名將則燕薊非其所有豈使窺中國耶就如能為限隔使北人外擾河北旁連河東則京師可得安居乎臣之此論特為按河者以為河不可回而言之深慮聖意駭聞失險之言虛積宵旰之憂故極言之也此其四也朝廷始以王令圖之說欲開澶州舊河及孫村口遣李常按視以為不可而止後張問徃行又請開孫村而韓絳極言其害遂亦報罷去歲以顧臨為河北都轉運使專主河議乃欲開魚池埽聞者駭之悉謂難行王孝先又乞治孫村以回河即召謝卿材張景先㑹議意又異同今更敕百禄君錫同行相度上下口岸要須開决河流於近南州軍回使趨海固哉議也自李常至謝卿材凢四議矣一使相度不可而再使人徃再言不可則三使人徃三言不可而四矣四又言不可及今則五矣若又不可則遣使無已是必得一人順此意而後乃止爾歴觀前代國家議事未有如此之固也如此乃是皆不用使人之言而回河計已决矣不可止矣違遣使之本意也此其五也臣惟邦計民力是念伏望陛下留神詳覽焉瞻又言臣近日簾前同進呈文字竊見三省所奏為修河欲只作減水河於元料合用人夫裁減分數自昨來都水監丞及都省兩次幾減一半以上既不回河只且減水即於第四舖孫村口河道内自合裁減夫數其北流依舊通行豈可大減工料兼云令修河司通那使喚尤為不可昨來修河司指北流宗城口焦家堤决溢謂欲回河以紓其患今既不從其說則本司惟喜北流有决資為回河之議安肯那移人夫修葺隄防使之堅固必且幸其水患損壞民田衝注塘濼取以為辭不復顧䘏生靈被害之苦深為不便今監丞雖領北流然是修河司使者屬官實難執守竊緣北流數年並不曾修全隄埽以致昨來宗城口焦家堤南宫上下埽相繼潰决此理當然固不足怪若更減却夫工何以枝梧朝廷若誠欲且開小河減水未便閉塞河身即乞令修河司結攬通認北流將來分擘與元計人夫物料以防疎虞庶其公共承當河事不爾别委知曉河事官一員行都水丞事不𨽻本監專主回河馬頭已北河岸用元計料合使人夫物料修治隄埽以備將來决溢即責任有在可保經久范純仁又言水官不候相度可否便計買先修舊河埽梢草一千萬束用錢近四十萬貫此是將尋常價例約度今來立限要二月中有備則必諸州爭買價例更髙不惟所用錢物浩大官吏逃責恐不免勞擾既稱開減水河只要試探水勢已計梢草若千萬束内若干舊有若干今買即來春所用兵夫須與梢草相稱方能了當其開減水河本只欲試探水勢已費財用如此將來回復大河塞决口都未曾議及此正臣前所謂用過財力既多欲罷不能之端也前來與執政入買一千萬梢草文字已畫可降出有中書舍人彭汝礪議欲候相度見可開然後收買其意亦在安民惜費盖於義理當然望陛下特賜採聼兼議者始謂今年豐熟梢草易為收買臣思之唯是草一色歲豐易得外其梢既不近山多是人家園林凶年方肯斫賣豐年却恐難得况大河既未全復物料自當減數設欲預備亦須漸次計置中書舍人彭汝礪言臣㸔詳孫村回河事自王令圖首議後來經户部侍郎李常馮宗道等又經天章閣待制顧臨及陳祐之相度及其他臣僚上言不一淹久未决今年十月都堂召河北轉運使謝卿材都水使者王孝先等合議逐人所見不同是致今來遣使謂當盡付前後臣寮申陳利害事件及計㑹逐路監司參詳可否然後可見利害之實今來指揮即是以孝先之言為主然尚令計㑹逐路監司詳察可否即是孝先所陳亦未為確論王孝先之言未為是則李常等言未為非夫是非公器非一人所能擅利害繫一國當與一國共之利害繫天下當與天下共之今河議大臣可否者相半近臣以謂不可者十六七察于衆人亦然朝廷恐其難一至煩陛下内降指揮今來勅命惟是王孝先一說衆言屏棄不用盖惟恐不復故道而已臣以為不然事之可為不可為天也人不能勝天久矣河事利害半天下上繫宗社下繫數十州人命河非藏於山川其道路形勢髙下深淺可見可測其不可欺者如皦日使可為也而敢以為不可為不可為也而敢以為可為是以國重事為玩戯使者為聾瞽非人則可苟有耳目必不至此臣聞之天無心而萬物生聖人無心而天下治是非並至惟無心者能定臣愚欲乞指揮相度河事官盡取前後應干臣僚文字計㑹逐路監司參詳可否如此則可為不可為立見使有定議衆言自屈譬之治訟窮盡彼此曲直然後情偽可見刑罰可行未有獨用偏辭一說而能折獄者也夫財力非出於天出於民而已中人之家春夏有不能及耕種饑寒有不敢輙衣食以待上之政令賦役使之有道用之有名民雖死不怨或非其時或非其義怨疾且並作此不可不審京東河北荐罹饑饉去年苦寒麥不及下種者十五六今歲雖小熟然流移者未復病者未蘇賦役之作尤須重惜今回河議未定所有指揮物料價錢亦乞付相度河事官候見得的確利害及合消得收買即徑仰施行如此則議論得穩當所有文字未敢行下更乞詳酌指揮明年二月十一日汝礪又論孝先此奏即范純仁所稱汝礪意在安民惜費者以蘇轍第三奏考之則買梢草文字竟行出也户部侍郎蘇轍言臣為户部右曹領金倉二部任居天下財賦之半適當中外匱竭不繼之時日夜憂惶常慮敗事竊見左藏庫見緡一月出納之數大抵皆五十餘萬略無贏餘其他金帛諸物雖小有羡數亦不足賴臣之愚怯常恐天災流行水旱作沴西羌旅距邊鄙繹騷河議失當賦役横起三事有一大計不支雖使宏羊劉晏復生計無從出矣而况於臣之駑下乎今者幸賴二聖慈仁恭儉天地垂貺諸道秋稼稍復成熟雖京西陜西災旱相接而一方之患未為深憂羌人困窮旋聞欵塞惟有黄河西流議復故道事之經歲役兵二萬人蓄聚梢樁等物三千餘萬方河朔災傷困敝之餘而興必不可成之功吏民竊歎勞苦已甚而莫大之役尚在來歲天啓聖意灼知民心特召河北轉運司官吏訪以得失近聞回河大議已寢不行罷回河四年正月二十八日初得㫖不知轍所云指何時而言若指四年正月二十八日則并減水河亦罷修矣當考臣平日過憂頓然釋去然尚聞議者固執開河分水之䇿雖權罷大役而兵功小役竟未肯休如此則河北來年之憂亦與今年何異今者小吴决口入地已深而孫村所開丈尺有限不獨不能回河亦必不能分水况黄河之性急則通流緩則淤澱既無東西皆急之勢安有兩河並行之理哉縱使兩河並行不免各立隄防其為費耗又倍今日矣臣聞自古聖人不能無過也過而能改善莫大焉故君子之過如日月之食過也人皆見之更也人皆仰之朝廷舉動義當如此今議河失當知其害人中道而復本何所愧雖使天下知之亦足以明二聖憂民之深為之改過不吝今乃顧惜前議未肯曠然更張果於遂非難於遷善臣實為朝廷惜之然臣聞議者初建開河分水之䇿其說有三其一曰御河堙滅失饋運之利其二曰恩冀以北漲水為害公私損耗其三曰河徙無常萬一自北界入海邊防失備凡其所以熒惑聖聰沮難公議皆以三說藉口夫河决西流勢如建瓴引之復東勢如登屋雖使三說可信亦莫如之何矣况此三說皆未必然臣請得以言之昔大河在東御河自懷衛經北京漸歴邊郡饋運既便商賈通行今河既西流御河堙滅失此大利誰則不知天實使然人力何及若議者能復澶淵故道則御河有可復之理今河自小吳北行占壓御河故地雖使如議者之意自北京以南折而東行則御河堙滅已一二百里亦無由復見矣此御河之說不足聼一也河之所行利害相半夏潦漲溢侵敗秋田濱河數十里為之破稅此其害也漲水既去淤厚累尺宿麥之利比之它田其收十倍寄居邱冡以避滛潦民習其事不甚告勞此其利也今河水在西勢亦如此逺為隄防不與之爭正得漢賈譲治河之意比之故道歲省兵夫梢草其數甚廣而故道已退之地桑麻千里賦役完復為利不貲安用逆天地之性移西流之憂為東流之患哉此恩冀以北漲水為害之說不足聼二也河昔在東自河以西郡縣與契丹接境無山河之限邊臣建為塘水以捍敵馬之衝今河既西行則西山一帯敵馬可行之地已無幾矣其為邊防之利不言可知然議者尚恐河復北徙則海口出北界中造舟為梁便於南牧臣聞敵中諸河自北南注以入於海盖地形北髙河無北徙之道而海口深浚勢無徙移臣雖非目見而習北方之事者為臣言之大畧如此可以遣使按視圖􅀞而知此河入北界邊防失備之說不足聼三也臣願以此三說質之議者則開河分水之說誠不足復為矣又臣訪聞今歲四五月間河上役兵勞苦無告嘗有數百人持版築之械訪求都水使者意極不善賴防邏之卒擁拒而散盛夏苦疫病死相繼使者恐朝廷知之皆於垂死放歸本郡斃於道路者不知其數若今冬放凍來歲春暖復調就役則意外之患復當如前臣不知朝廷何苦而不罷此役哉今建議之臣恥於不效而堅持之於上小臣急於利禄不顧可否隨而和之於下上下膠固以罔朝廷其間正言不避權要纔一二人耳然事非本職亦不敢盡言臣以户部休戚計在此河若復緘黙誰當言者惟斷自聖心盡罷其議則天下不勝幸甚貼黄臣訪聞河北轉運使今年應副開河費用錢七萬三千餘貫糧十七萬餘石梢草一百五十二萬餘束方災傷之後極力剗刷先了河事後及經費極為不易若使今年不興河役則上件錢糧梢草别将應付它事固已有餘深為可惜雖已徃之事不可復追而來年不可復使河北重有此費轍又言臣頃聞朝廷議罷回河來年當用役兵開河分水用役兵開河引水乃三年二月八日德音恐轍所云又非此也臣以為天下財賦匱竭河朔災傷之後民力未復未堪此役輙奏言不便既而採察衆議聞河北轉運使謝卿材到闕昌言於朝曰黄河自小吴决口乗髙注下水勢奔快上流隄防無復决溢之患而北流湍駛行於地中日益深浚朝廷若以河事付臣臣請不役一夫不費一金十年之間保無河患大臣以其異已罷歸本任而使王孝先俞瑾張景先三人重畫回河之計三人利在回河雖言其便而亦知其難成故於議狀之末復言若將來河勢變移乞免修河官吏責罰都下洶洶傳笑以為口實盖回河之非斷可知矣然近日復聞内批降付三省如云若河流不復故道終為河朔之患外廷疎逺不知此說信否内批見十月二十六日然衆心憂懼深恐羣臣由此觀望不敢正言得失臣職在財賦憂責至深不敢畏避誅戮願畢陳其說方今回河之䇿中外講之熟矣雖大臣固執亦心知其非無以藉口矣獨有邊防之說事係安危可以竦動上下伸其曲說陛下深居九重羣言不得盡達是以遲遲不决耳昔真宗皇帝親征澶淵拒破契丹因其敗亡與結歡好自是以來河朔不見兵革幾百年矣陛下試思之此豈獨黄河之功哉昔石晉之敗黄河非不在東而祥符以來非獨河南無北憂河北亦自無兵患由此觀之交接敵國顧德政何如耳未聞逆天之性引趨下之河升積髙之地興莫大之役冀不可成之功以為設險之計者也昔李垂孫民先等號知河事嘗建言乞導河西行復禹舊迹以為河自西山北流東赴海口河北諸州盡在河南平日契丹之憂遂可無虞今者天祚中國不因人力河自西行正合昔人之䇿自今以徃北岸决溢漸及敵境雖使異日河復北徙則敵地日蹙吾土日舒其為憂患正在契丹耳而大臣過計以為中國之懼遂欲罄竭民力導河東流其為契丹謀則多為朝廷慮則疎矣議者或謂河入敵境彼或造舟為梁長驅南牧非國之利臣聞契丹長技在於鞍馬舟楫之利固非所能且跨河繫橋當先兩岸進築馬頭及伐木為船其功不細契丹物力寡弱勢必不能就使能之今兩界修築城柵比舊小增輙移文詰問必毁而後已豈有坐視大役而不能出力止之乎假設契丹遂成此橋黄河上流盡在吾地若㳂河州郡多作戰艦養兵聚糧順流而下則長艘巨纜可以一炬而盡形格勢禁彼將自止矣臣竊怪元老大臣久更事任而力陳此說意其謀已出口重於改過而假此不測之憂以取必於朝廷耳不然豈肯於天下困弊河朔災傷之後役數十萬夫費數千萬物料而為此萬無一成之功哉夫大役既興勢不中止預約工料有少無多官不獨辦必行科配官出其一民出數倍公私費耗必有不可勝言者矣茍民力窮竭事變之出不可復知饑餓相逼必為盗賊昔秦築長城以備邉城既成而民叛今欲回大河以設險臣恐河不可回而民勞變生其計又在秦下異日雖欲悔之不可得也陛下數年休養民物如恐傷之今河已安流契丹無變而强生瘡痏以擾之非計之得也故臣願陛下斷之於心罷此大役惟留神察之自河决小吴於今九年不為不久矣然敵情恭順與事祖宗無異陛下誠重違大臣姑復以三年觀之事久情見大臣之言與天下公議可以坐而察也臣不勝區區憂國之誠干犯斧鉞死無所避貼黄朝廷已遣范百禄趙君錫出按回河利害然大臣方持其議事勢甚重中外誰不觀望風㫖百禄等雖近侍要官臣不敢保其不為身謀能以實告也故不避再凟復為此奏非陛下斷之於心天下之憂未知所底也轍又言近者聞有内批降付三省言黄河若不復故道終為河北之患初聞此㫖中外無不驚愕以為黄河西行已成河道大臣横議欲壅而復東異同之論方相持未决而此㫖復降臣下觀望誰敢正言方衆心憂疑之際旋聞復有聖㫖收入前項批語羣臣釋然咸知陛下虛已無心欲來公議深得古先聖王改過不吝之美正人端士始有樂告善道之意然臣竊聞近又降勅以北京封樁京東新法鹽錢三十五萬貫指揮河北收買開河梢草繼又商量調撥來歲開河役兵二事既出中外復疑何者朝廷近遣范百禄等按行河事利害若開河之議可行無疑則安用遣使若猶遣使則開河之議尚在可疑今使未出門而一面收買梢草調撥兵役則是明示必開之形欲令使者黙喻欲開之㫖臣雖愚暗竊恐非陛下虛已無心欲求公議之意也伏乞速降指揮收回買草發兵二事使范百禄等明知聖意無所偏係得以盡心體量不至阿附大臣以誤國計今中外財賦匱竭見錢最為難得新法鹽錢雖不屬户部要是百姓膏血不可輕用况河北災傷之餘明年大役决不可興雖如今歲止用役兵如臣前奏所言役苦財傷為害己甚將來若范百禄等以開河為便猶當計較利害寛展歲月調兵買梢皆非今議所急若范百禄等以開河為不便則聚兵積梢梢草輕脆稍經歲月化為糞壌皆非計也况所用梢草動計千萬一時收買價必涌貴若止令和買則所費不貲必非止三十五萬貫可了若令配買則河北災傷之餘民間大有賠備或生意外之患不可不慮也臣受聖恩至深至厚位下力㣲竊不自量再三干預國論罪當萬死不敢逃避鮮于綽傳信記當考調兵買草二事不知後来竟曽罷否買梢事即彭汝礪所論者皇伯祖前彰化軍節度使開府儀同三司判大宗正事髙宻郡王宗晟特起復如故宗晟凡四辭並賜詔不允翰林學士蘇軾言謹按宗晟飭行有素持䘮中禮所辭恩命已四不允而宗晟確然固守其詞愈哀且曰念臣執䘮報親之日短致命徇國之日長出於至誠可謂純孝臣謂宗晟未經祥練之變且無金革之虞孝治之朝宜聼所守因以風厲宗室庶皆守禮篤親頋不羙哉若以宗正之任恐難其人亦當差官權攝湏其從吉復以命之臣忝備禁從不敢不言所有不允詔書臣未敢撰乃聼宗晟終䘮聼宗晟終䘮在閏十二月二日今并見於此十一月二十日甲辰宗晟起復左中散大夫晏知止為主客郎中司馬光薦知止累外任知州監司及今乃入為郎
