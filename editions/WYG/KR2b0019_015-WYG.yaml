body:
  text: 續資治通鑑長編巻十一宋李燾撰太祖開寶三年春正月癸丑廢海州東海監復為縣辛酉詔諸州官吏次第審察民有孝弟彰聞德業純茂者案宋有德行純茂科宋史及宋史記薛應旂續邇鑑皆作德行純茂此作德業純茂業字誤滿五千户聽舉一人或有竒材異行不限此數所舉得其實狀等級加賞不如詔者罪之王偁東都事略詔諸道州府察民有孝弟彰聞德行純茂擅鄉曲之譽為士庶推服者以聞鎮寜節度使張令鐸之罷軍職也上令皇弟光美取令鐸女為夫人及令鐸自鎮寜來朝被病上親問之賜絹五千匹銀五千兩又賜其家人甚厚己巳令鐸卒贈侍中令鐸性仁恕嘗語人曰我從軍三十餘年大小四十餘戰多摧堅陷敵然克㨗之後未嘗妄殺一人也及其卒人多惜之詔河防官吏毋得掊歛丁夫緡錢廣調材植以給私用違者棄市北漢主遣使持禮幣賀契丹主樞宻使髙勲言於契丹主曰我與晉陽父子之國也嵗嘗遣使來覲非其大臣即其子弟先君以一怒而盡拘其使甚無謂也今嗣主新立左右皆非舊人國有憂患寜不我怨宜以此時盡歸其使契丹主曰善乃悉索北漢使者前後凡十六人厚其禮而歸之即命李弼為樞宻使劉繼文為保義節度使詔北漢主委任之繼文等久駐契丹復受其命歸秉國政左右皆譖毁之未幾繼文為代州刺史弼為憲州刺史契丹主聞之下詔責北漢主曰朕以爾國連䘮二主僻處一隅期於再安必資共治繼文爾之令弟李弼爾之舊臣一則有同氣之親一則有耆年之故遂行並命俾效純誠庶幾輯寜保成歡好而席未遑暖身已棄捐將順之心於我何有北漢主得書恐懼且疑繼文報契丹乃密遣使按責繼文繼文以憂懼死二月壬申朔以萬州梁山縣為梁山軍已夘雄州言刺史侯仁矩卒仁矩益之子也備邉牧民皆稱職上甚惜之特遣中使護䘮官給塟事仁矩子延廣亦有勇略仁矩延廣並初見乾祐元年仁矩在雄州日方飲宴敵騎數千白晝入州城居民驚擾延廣引親信數騎馳出衙門射殺其酋長一人斬首數級悉擒其餘黨持首級以獻仁矩喜拊其背曰興吾門者必汝也監軍李漢超以其事聞詔書褒美賜錦􅂁銀帶改封禪寺為開寶寺詔增葺之先是禁商人私販幽州礬犯者沒入之建興三年詔其後定令私販河東及幽州礬一兩以上私煑礬三斤及盗官礬至十斤者棄市甲申始命增私販至十斤私煑及盗滿五十斤者死餘論罪有差丁亥兵部員外郎知制誥盧多遜對於長春殿賜金紫庚寅幸西茶庫遂幸建隆觀丁酉宴廣政殿太子太師王溥太子太傅武行德左金吾衛上將軍王彦超皆醉酒失儀為御史劾奏詔釋之北漢主以禮部侍郎李惲為司空同平章事鴻臚卿劉繼顒為太師兼中書令領成德節度三司使髙仲曦仲曦未見為樞宻使閹人衞德貴為大内都㸃檢嬖人范超為侍衞親軍都虞候超及德貴實分掌機務惲等備位而已惲陽武人遭亂與其母隔絶居常戚戚但以奕棊飲酒為務政事多廢北漢主頗以為言惲不聽一日惲方與僧對奕北漢主知之命近侍直抵惲前取局焚之惲怡然詣北漢主謝明日别造新局奕棊如故北漢主多内寵繼顒造簪珥數百副以獻北漢主彌信重之三月壬寅朔詔禮部貢院閱進士諸科十五舉以上曽經終場者以名聞甲辰得司馬浦等六十三人庚戌復取十五舉未經終場者四十三人並賜出身仍詔自今勿得為例新録本志及㑹要書此特恩并兩事為一事人數参差今依舊録刪修權知貢舉扈䝉擢進士合格者八人忠武節度使宋偓市邸店於所部上聞之不悦戊申徙偓為靜難節度使己酉以忠正節度使王審琦為忠武節度使審琦鎮夀春凡八年嵗得租課量入為用未嘗有所誅求民頗安之所部邑令以罪停其録事史幕僚白令不先諮府請按之審琦曰五代以來諸侯强横令宰不得專縣事今天下治平我忝守藩而部内宰能斥去黠吏誠可賞也何案之有聞者嘆服庚戌詔禮部貢院䟽特賜出身人姓名各下所屬州縣令官吏察其行實以聞隱蔽者罪之辛亥以處士王昭素為國子博士致仕昭素酸棗人少篤學有至行市物隨所索價償其直或以實非本價辭則曰汝亟受之不然將為妄語人矣由是人不敢欺且相告曰王先生市物不可虚索其價也方治所居室積木墻壁間有穿窬者為木所礙不得入昭素覺之盡室所有擲于外謂盗曰汝速去恐捕者至盗慙委物而遁由是邑中無盗著易論三十三篇學者多從之逰上聞其名召見便殿時年已七十餘上問曰何以不仕致相見之晚昭素謝不能上令講乾卦至九五飛龍在天則歛容曰此爻正當陛下今日之事引援證據因示風諫㣲㫖上甚悦即訪以民事昭素所言誠實無隱上益嘉之又問治世養身之術昭素曰治世莫若愛民養身莫若寡慾上愛其語嘗書屏几間留月餘數求歸故有是命年八十九乃卒于家本傳言為李穆所薦按穆開寶五年始召為太子中允此時方以洋州通判免官家居則薦昭素者非穆也僧文瑩湘山録亦言穆薦又言對太宗皆誤寶訓言即授左拾遺與正史實録不同今不取丙辰免殿中侍御史案宋史作殿中丞張顒官坐先知潁州政治不平允為人所訴也張顒未見己未幸宰相趙普第視疾賜銀噐五千兩絹五千匹又賜其妻和氏銀五千兩衣著二十匹遂幸開寶寺庚申流右監門衛率府副率王繼勲于登州辛酉改命分司西京繼勲再犯法上猶以孝章后故薄其責云乙丑都官員外郎髙冕責授左贊善大夫冕嘗舉監察御史符􅞡􅞡有罪削官冕連坐故也冕未見戊辰趙普落起復庚午詔澤州直𨽻京師升河南府鞏縣為次赤以奉安陵夏四月辛未朔日有食之乙亥以内客省使丁德裕權知潞州時昭義節度使李繼勲徙為天雄節度使故也戊寅詔諸道州府發遣合格選人赴京除程與兩月限限滿不至者罰之或有未欲為官者所屬具以聞仍殿五選己夘詔三司諸路兩税折科物非土地所宜者勿得抑配又詔諸州凡絲綿紬絹麻布香藥毛翎箭笴皮革筋角等所在約支二年之用勿得廣其科市以致煩民此詔據本志在此月今附見志又云三司官屬不務協濟引例避事始條約之按條約三司官屬乃乾徳四年正月事今削去丁亥幸建隆觀相國開寶寺禱雨戊子詔諸司營繕必先定課程每旬合給物料絶其委積侵盜之端辛夘雨甲午幸教船池命翰林學士文班常参官等各於見任前任賔幕州縣官内舉任常参者一人先是左藏庫制造衣服即自收之己亥始置衣庫於左掖門内河北舊禁鹽建隆末始令邢洺磁鎮冀趙六州城外二十里通行鹽商庚子悉除諸州鹽禁過者斤税一錢住者倍之五月丁未禁京城民家不得蓄兵噐戊申詔諸州長吏毋得遣僕從及親屬掌廂鎮局務此據舊録新録無此本紀於六月乙未乃書今從舊録按本志及㑹要並云太平興國二年禁藩侯補親隨為鎮將自此但用本州衙吏為之亦有宣補者檢興國二年乃不見此事疑即此也或興國二年又申此禁今兩存之癸丑幸城北觀水磑丁巳京師始置便錢務丁夘詔通逺軍直𨽻京師戊辰以滄州無棣縣為保順軍改廣政殿為大明殿六月甲戌皇長女封昭慶公主甲申出降左衛將軍駙馬都尉王承衍承衍審琦之子也己亥京東發運使吏部郎中何幼冲坐受諸州饋遺責為考功員外郎以詔書三百通付河東北陜西諸州軍令分遣人齎入北漢境招降其民吏汴水決宋州寜陵縣發宋亳丁夫塞之又塞汴口以殺水勢秋七月壬寅詔民訴水旱災傷者夏不得過四月秋不得過七月食貨志便於此載荆湖淮南兩浙川峽廣南月限盖誤也時浙廣皆未歸朝今從新録壬子詔曰吏員猥多難以求其治俸禄鮮薄未可責以亷與其冗員而重費不若省官而益俸西川管内州縣官宜以户口為率差減其員舊俸月增給五千諸州凡二萬户者依舊設曹官三員户不滿二萬止置録事参軍司法参軍各一員司法兼司户不滿萬止置司法司户各一員司户兼録事参軍不滿五千止置司户一員兼司法及録事参軍事縣千户以上依舊置令尉主簿凡三員户不滿千止置令尉各一員縣令兼主簿事不滿四百止置主簿縣尉以主簿兼知縣事不滿二百止置主簿兼縣尉事丙辰詔西川竊盗至死合奏裁者並部送赴闕詔天下州縣官宜依西川例省減員數要見所省員數幾何丙寅唐中書侍郎韓熙載卒初唐主以熙載盡忠能直言欲用為相而熙載任情棄禮後房妓妾數十人多出外舎私侍賔客唐主以此難之俄被劾奏左遷右庶子分司南都熙載盡斥諸妓單車即路且上表求哀唐主喜留之尋復其位己而諸妓稍稍復還唐主曰吾無如之何矣及卒唐主歎曰吾終不得熙載為相也欲贈以平章事問前世有此比否近臣對曰昔劉穆之贈開府儀同三司乃手書贈熙載平章事熙載家無餘財棺椁衣衾皆唐主賜之據徐鉉集熙載卒於此年七月二十七日丙寅也江南野録載熙載事迹尤詳然極不雅馴今止用五代史九國志稍增飾之戊辰幸教船池又幸玉津園宴射禁河南府民耕晉漢廟垣内地令西川官考滿得替更不守選八月丁亥移建陽軍𣙜貨務於揚州戊子幸教船池又幸玉津園庚寅以隰州刺史李謙溥為濟州團練使謙溥在隰州十年敵人不敢犯其境有招收將劉進者勇力絶人謙溥撫之甚厚得其死力嘗徃來境上以少擊衆北漢患之為蠟彈封書以間進遺其書道中晉州節度使趙贊得之以聞上令械進送闕下謙溥召詰其事進伏於庭請死謙溥曰我以舉宗四十口保汝矣即上言進為北漢人所惡此乃反間也奏至上悟遽令釋之賜以禁軍都校戎帳服具進感激願擊賊自効上嘗命有司為洺州防禦使郭進治第凡㕔堂悉用㼧瓦有司言惟親王公主始得用此上怒曰郭進控扼西山逾十年使我無北顧憂我視進豈減兒女耶亟徃督役無妄言上寵異將帥類此故能得其死力云進以建隆元年初為西山廵檢至今十一年矣因附此事未必政在此年也唐主復令知制誥潘佑作書數千言諭南漢主以歸欵於中國遣給事中龔慎儀徃使南漢主得書大怒遂囚慎儀驛書荅唐主甚不遜唐主以其書來上上始决意伐之九月己亥朔以潭州防禦使潘美為賀州道行營兵馬都部署案宋史及宋史記皆作賀州薛應旂續通鑑作桂州考桂州賀州皆南漢地未知孰是謹識以備考朗州團練使鄴人尹崇珂副之道州刺史王繼勲為行營馬軍都監仍遣使發諸州兵赴賀州城下舊録載命潘美等在八月二十二日辛夘今從新録本紀㑹要甲辰詔周文王成王康王秦始皇漢髙祖文帝景帝武帝元帝成帝哀帝魏孝文西魏文帝後周太祖唐髙祖太宗中宗肅宗代宗德宗順宗文宗武宗宣宗懿宗僖宗昭宗二十七陵嘗被發令有司備法服常服各一襲具棺槨重塟所在長吏致祭丙辰登州言女真國遣使入朝定安國王烈萬華附表貢方物定安國本馬韓之種為契丹所攻破其首帥糾合餘衆保於西鄙自稱定安國公丁夘潘美等言大敗南漢萬餘衆克富州克富州劉鋹傳及九國志皆畧之但書次白霞不知白霞地屬何州縣姑從本紀實錄先書富州十國紀年載㧞富州至白霞並在九月先是南漢舊將多以䜛死宗室翦滅殆盡掌兵者惟宦者數軰城壁壕隍但飾為宫館池沼樓艦噐甲輙腐敗不治及王師次于白霞賀州刺史陳守忠守忠未見遣使告急内外震恐南漢主遣龔澄樞馳驛徃賀州宣慰時士卒久在邉多貧乏聞澄樞至以為必大加賞賚皆喜而澄樞出空詔撫諭衆皆解體王師拔馮乘前鋒至芳林澄樞惶懼乗輕舸遁歸是月癸丑王師遂圍賀州九國志五代史及劉鋹傳皆言王師次白霞鋹即遣龔澄樞徃賀州郭崇岳徃桂州李托徃韶州畫守禦計今考之此時所遣但澄樞耳崇岳為招討乃李承渥敗後而辛延渥勸鋹納欵托猶居中沮其議則王師次白霞時托與崇岳决未出也南漢主召大臣議皆請以潘崇徹將兵拒王師崇徹自罷兵柄常怏怏於是辭以目疾南漢主怒曰何湏崇徹伍彦柔獨無方略耶彦柔未見遂使彦柔將兵來援戊午王師聞彦柔至退二十里潛以竒兵伏南鄉岸彦柔夜泊南鄉艤舟岸側遲明挾彈登岸踞胡床指揮而伏兵卒起彦柔衆大亂死者十七人擒彦柔斬之梟其首以示城中城中人猶堅守弗下隨軍轉運使王明言於潘美曰當急擊之恐援兵再至則為所乗我師老矣諸將頗猶豫明乃擐甲胄率所部䕶送輜重卒百餘人丁夫數千畚鍤皆作堙其塹直抵城門城中人大懼遂開門以納王師十月十二日庚辰克賀州奏始到京故本紀及實録並書於十月據劉鋹傳王師九月圍賀州尋克之十月乃次昭州又十國紀年克賀州乃九月二十一日己未也王師督戰艦聲言順流趨廣州南漢主憂廹計無所出乃加潘崇徹為内太師馬歩軍都統領衆三萬屯賀江㑹王師徑趨昭州崇徹但擁衆自保而已冬十月己巳朔京兆郡夫人杜氏卒上不視朝素服發哀於講武殿文武百僚進名奉慰仍追封齊國太夫人杜氏昭憲皇太后之妹也少歸劉遷遷早卒至是亦贈太保癸酉詔前代功臣烈士孫臏元稹等三十一人各置守冢户禁樵采辛巳曲赦賀州管内辛巳十三日庚辰十二日奏到辛夘潘美言行營馬軍都監道州刺史王繼勲卒詔以郴州刺史浚儀朱憲代之憲初見天福三年王師破南漢開建寨殺數千人擒其將靳暉昭州刺史田行稠棄城遁桂州刺史李承進亦奔還遂取昭州桂州十一月初四日壬寅昭桂㨗奏到當其克時必在此月末但未得其日耳本紀乃於十一月初書克昭桂二州月末乂書潘美破廣南軍二千於封州開建縣擒靳暉據九國志十國紀年及劉鋹傳則先破開建寨斬靳暉然後克昭桂今從志傳及紀年上覽桂陽監嵗入白金數謂宰相曰山澤之利雖多頗聞採納不易十一月乙巳詔減舊額三分之一以寛民力己酉幸開寶寺觀新鐘癸丑右領軍衞將軍石延祚棄市坐監廣積倉與吏為姦也甲寅日南至御乾元殿受朝建武節度使判棣州何繼筠來朝壬戌復命戌邉賜鞍馬戎仗以遣之初契丹六萬騎至定州命判四方館事田欽祚領兵三千禦之上謂欽祚曰彼衆我寡但背城列陣以待之敵至即戰勿與追逐欽祚與敵戰蒲城敵騎少却乗勝至遂城欽祚馬中流矢而踣騎士王超以馬授欽祚軍復振自旦至晡殺傷甚衆夜入保遂城契丹圍之數日欽祚度城中糧少整兵開南門突圍一角出是夕至保塞軍中不亡一矢北邉傳言三千打六萬癸亥㨗奏至上喜謂左右曰契丹數犯邉我以二十匹絹購一契丹首其精兵不過十萬止費我二百萬匹絹則契丹盡矣自是益修邉備據㑹要及契丹傳皆言欽祚破敵在十月然十一月二十五日奏始到恐日太逺今從本紀實録載此月疑十月遣欽祚十一月乃破契丹也先是詔諸道舉有德行者於是皆集闕下命學士院試問吏理而曹州所舉人孔蟾所對稍優丙寅以蟾為章丘縣主簿是月王師克連州南漢招討使盧収率其衆退保清逺南漢主聞之謂左右曰昭桂連賀本屬湖南今北師取之足矣其不復南也十二月初五日連州㨗奏到其克時當在此月半以後但不得其實日耳北漢軍校王興等二十三人來降十二月庚午翰林學士承㫖户部尚書贈右僕射陶榖卒命中使監䕶塟事榖文翰冠一時自以久次意希大用然為人傾側很媚魏仁浦在中書榖自言出於魏氏以舅事仁浦每見輙望塵下拜妻孫氏滛恣榖不能制上素薄之選置宰輔未嘗及榖榖不能平一日使其黨因事風上言榖在詞禁宣力實多上笑曰我聞學士草制皆檢前人舊本稍改易之此乃諺所謂依様畫胡蘆爾何宣力之有乎榖因作詩題翰林壁頗怨望上益薄之遂决意不用瀛之髙陽舊屬契丹與定之博野相隣博野人數侵擾之乃於東北三十里置行縣周世宗既克三關行縣實邇邉徼距州治絶逺民訴其不便轉運使以聞辛未徙行縣歸舊治戊寅畋近郊初南漢取桂連二州皆徙其民毋得居城内戊子令長吏招撫立里閈給廬舎以處之王師長驅至韶州都統李承渥領兵十餘萬陣於蓮華峰山下南漢人教象為陣毎象載十數人皆執兵仗凡戰必置陣前以壯軍威王師集勁弩射之象奔踶乗者皆墜反踐承渥軍軍遂大敗承渥以身免世家言承渥僅免李托傳言承渥戰死未知孰是而國史亦云承渥僅免今従之承渥未見遂取韶州擒其刺史辛延渥延渥未見及諫議大夫鄒文逺文逺未見延渥間道遣使勸南漢主迎降六軍觀軍容使李托深沮其議國中震恐南漢主始命塹東壕為距守計顧諸將無可使者宫媪梁鸞真薦其養子郭崇岳可用乃以為招討使與大將植廷曉廷曉未見統衆六萬屯馬逕列栅以抗王師距畨禺纔百餘里十二月二十四日辛夘韶州㨗奏始至其㨗時當在初旬也據十國紀年十二月七日乙亥王師趨韶州癸巳發近甸民二萬修河堤是冬唐南都留守建安林仁肇仁肇仁翰弟初見顯徳三年宻表言淮南諸州戍兵各不過千人宋朝前年滅蜀今又取嶺表徃返數千里師旅罷敝願假臣兵數萬自夀春北渡徑據正陽因思舊之民可復江北舊境彼縱來援臣據淮對壘而禦之勢不能敵兵起之日請以臣舉兵外叛聞于宋朝事成國家享其利敗則族臣家明陛下無二心唐主懼無成功徒速敗不從初宜春人盧絳詣樞宻使陳喬獻書喬異之擢為本院承㫖遷沿江廵檢召募亡命習水戰屢要吳越兵於海門獲舟艦數百嘗説唐主曰吳越仇讎也他日必為北朝鄉導掎角攻我當先滅之唐主曰大朝附庸安敢加兵絳曰臣請詐以宣歙州叛陛下聲言討伐且乞兵於吳越兵至拒擊臣躡而攻之其國必亡唐主亦不能用二事並據十國紀年是嵗詔修四瀆廟尋遣太子右贊善大夫袁仁甫等九人分詣岳瀆督修廟之役據㑹要及禮志修四瀆廟在今年遣使在明年並無月日今并書之袁仁甫未見始令雅州百丈縣置監鑄鐡錢禁銅錢入川從唐州刺史曹光實請也此據本志及㑹要
