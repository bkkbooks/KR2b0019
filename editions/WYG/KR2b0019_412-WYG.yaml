body:
  text: 續資治通鑑長編巻四百八宋李燾撰哲宗元祐三年春正月庚戌校書郎王伯虎權知饒州正字鄧忠臣權通判瀛州諫官韓川言二人不堪館職之選故也此據劉安世彈歐陽斐第七章復廣恵倉先是著作郎兼侍講范祖禹言祖宗以來毎遇大雪則放公私房錢以至糶米賣炭散錢死者則賜瘞埋近日朝廷無不舉行又發内帑之錢徳澤之厚無以加矣臣竊思朝廷自嘉祐以前諸路有廣恵倉以救恤孤貧京師有東西福田院以收養老㓜廢疾至嘉祐八年又増置城南北福田共為四院此乃古之遺法也然毎院止以三百人為額臣以為京師之衆孤窮者不止千二百人朝廷毎遇大冬盛寒則臨時降㫖救恤雖仁恩溥博然民已凍餒死損者衆矣救飢於未飢之時先為之法則人不至於飢死救寒於未寒之時預為之備則人不至於凍死臣以為宜於四福田院増蓋官屋以處貧民不限人數並以舊法收養委左右廂提舉使臣多設方畧救濟不必専散見錢其使臣存活到人數書為課績量與酬奨死損多者亦立殿罰如四廂使臣提舉難遍即委吏部臨時更選差使臣四員相兼提舉亦依四廂使臣法其天下廣恵倉乞更舉行令官吏用心賑恤須要實恵及貧民陛下近日所行萬萬於此而臣之所陳事乃至微然古之聖人莫不以此為先務其法不可不備也上納用焉甲寅通議大夫致仕劉几卒乙夘河東副總管李浩管勾麟府路馬軍司訾虎以兵牽制涇原路蕃㓂多所斬獲詔浩虎以下賜銀合茶藥有差新本無此丙辰詔以春寒展給賣薪炭限十有五日時自去冬大雪寒至于是月沅州言都廵檢邱仲文等與狤狑蠻遇於洽州斬獲蠻賊四十有八級詔湖北轉運使李茂直徃覈蠻數問戰狀功首仍為之備其應推賞者速具以聞丁巳詔改封樁錢物庫為元祐庫𨽻尚書省左右司三月十八日五月十八日己未朝獻景靈宫去年十月七日裁定恭謝儀十月十二日連詣宫今年正月十一日又四月十八日又七月二十三日又十月十五日四詣宫范祖禹一嵗乃徧之言可考庚申詔發京西南路闕額禁軍糧穀五十餘萬斛减市價出糶至麥熟日止以雪寒物價翔涌也詔幕職州縣官雖未經考聽舉賢良方正能直言極諫科權知開封府錢勰權發遣開封府推官畢仲游以决有病人死等第罰金權發遣京東西路轉運判官張景先増差河北路轉運判官景先議開孫村口减水河與執政意合故有是命實錄但書増差今考按增入景先自知北外丞除京東運判在二年十二月四年正月八日曾肇云云可考知濟州孫升權發遣京東西路提㸃刑獄辛酉詔湖北轉運副使李茂直渠陽蠻已歸順人若係為首及正賊即拘留或發赴渠陽監守餘速撫諭遣歸舊住仍招納未嚮漢之人若其間首領終無歸首之意即依累降指揮廣南西路東門峒黎賊傷害兵官詔經畧司俟朱崖軍使崔詔到面諭依近降指揮革去舊弊開示恩信令生黎灑然知有伸訴如首領改過自新即優加存恤若姦狡反覆度終不可制則厚賞密募熟黎殺取首級或以計誘豫報軍官等掩捕勿令輙入黎峒具施行方畧以聞壬戌以隂雪罷上元節遊幸乙丑命翰林學士蘇軾權知禮部貢舉吏部侍郎孫覺中書舎人孔文仲同知貢舉天下進士凡四千七百三十二人並即太學試焉熙寜三年正月乙丑鎻太學試禮部進士四千七百三十二人三月戊申奏名進士五百人宗室二人子瞻華老經父知舉熙叔元輿彦衡魯直子明參詳君貺希古履中器之成季明畧無咎堯文正臣元忠遐叔子發君成天啟志完㸃檢試巻此黄庭堅為孫敏行書石刻今在敏行家凡命官知貢舉合書舊錄獨闕此今依庭堅石刻修入元年十月二十二日修貢院當考詔京西路廂軍以三萬三千五百人為額從兵部所定也丙寅詔陜西河東經畧司審察歸順蕃衆有單獨及反側可疑之人即分徙近郡又詔陜西河東出界總兵官奏功必具還塞人數及亡失所因不出界即賊退見管人數凖此樞密院言夏賊逆命不修職貢繼而舉國大犯涇原狼狽空回諸路牽制斬獲亦多度其姦心必圖再舉尚不聞諸路探報到舉措次第觀其謀但外則示弱為款我之計内則隂集潛俟和暖直來奔衝竊慮失於探候有弛隄備詔陜西河東逐路經畧司嚴戒邊将及城寨官募人探伺先知所向常若㓂至過為之備朝議大夫趙偁為户部郎中偁行状罷根磨司當檢附丁夘西南石蕃進奉人特令門見增梓州路克寜廂軍八百人從轉運司請也侍御史王覿奏編類章疏係三年正月十九日蘇軾去冬學士院試館職䇿題自謂借漢以喻今也其借而喻今者乃是王莽曹操等簒國之難易搢紳見之莫不驚駭軾習為輕浮貪好權利不通先王性命道徳之意専慕戰國縱横捭闔之術是故見於行事者多非理義之中發為文章者多出法度之外此前日䇿題所以虧損國體而震駭羣聽者非偶然過失也軾之意自以為當如此爾臣見軾胷中頗僻學術不正長於辭華而暗於義理若使久在朝廷則必立異妄作以為進取之資巧謀害物以快喜怒之氣朝廷或未欲深罪軾即宜且與一郡稍為輕浮躁競之戒去年十二月二十四日楊康國二十八日趙挺之云云己巳太中大夫陳繹卒庚午詔應三省差除闕如從中批付中書省並三省同行詔文彦博陳乞致仕已降指揮不令諸處收接文字自今别有奏報却仰依舊收接投進御集正月二十二日知熙州劉舜卿言鄂特凌古蕃字奏狀般擦到闕乞令果莊入蕃欲止令果莊於熙州與親屬相見詔舜卿鄂特凌古納款聽㫖又言鄂特凌古差李沙勒瑪進奉詔發遣赴闕范純仁云云或附此壬申詔鄂特凌古已差人奉表詣闕謝罪令邊将無出兵仍罷招納觀文殿學士正議大夫孫固提舉中太一宫兼侍讀尋又兼集禧觀兼集禧在二十六日詔守司空開府儀同三司鎮江軍節度使致仕韓絳子朝散大夫衞尉少卿宗師為直袐閣提舉太平宫以絳致仕宗師請便養故也尋有詔絳辭日令宗師扶掖入殿實錄於此月二十五日癸酉書樞密院言西賊攻犯鎮戎全師而歸慮畜姦謀宜厚募死士深入探索或可用開其環慶路討蕩吹呼羅章擄獲之人漸有首領歸漢詔范純粹先選委蕃官管勾與投來首領親款餌以所嗜體度其人可使深入探索敵情即密保明一兩人勿令相知授與密號教令用間及體訪敵中動靜以聞按此詔乃去年十二月五日有范純粹奏議可考已從奏議附十二月二十九日削此不書甲戌疎決在京及府界繫囚雜犯死罪以下遞降一等至杖釋之以久隂不解也丙子御史中丞胡宗愈侍御史王覿進對宣諭曰久隂不解雪寒甚民不易宗愈等對曰陛下賜錢糶米分賣芻炭都民甚幸唯河北京東災傷猶須多方賑濟上曰已一一有指揮宗愈覿曰聞二聖焦勞上元禁中不曽用樂上元不御樓亦未嘗燕㑹太原府路鈐轄皇城使榮州刺史張世矩以漏失夏㓂落榮州刺史免勒停任職按此本云知鎮戎軍今改作太原府路鈐轄去年八月十三日張之諌以知鎮戎軍兼涇原鈐轄其年九月十日賊㓂鎮戎據張舜民誌劉昌祚墓知軍實張之諌十一月二十四日之諌遷閤使三年閏十二月十六日展磨勘不審張世矩以何月日知鎮戎又不審之諌是何月日死世矩恐代之諌者皆當考詳恐鎮戎字誤閏十二月十二日甲寅世矩以皇城榮刺太原路鈐錄其子官此必非鎮戎也曽肇制集有皇城使萬州團練使張之諌知鎮戎軍劉攽制集有權涇原鈐轄皇城使萬州團練使張之諌轉兩資為西上閤門使太原府代州都鈐轄以閏十二月甲寅錄世矩子天錫考證則此不應云知鎮戎軍今改作太原府路鈐轄二月己卯右司諫豐稷右正言丁騭進對宣諭曰久隂不解天氣未和宫中宴㑹俱罷稷等奏二聖愛民如此天下幸甚詔袒免外兩世親已計口給錢米其間外任孤遺别無依倚者與官舎居止或給賃錢令禮部立法以聞因御史中丞胡宗愈請也王巖叟云云監察御史趙挺之言貢舉用三經新義取人近二十年今聞外議以為蘇軾主文意在矯革若見引用新義決欲黜落請禮部貢院将舉人引用新經與注疏文理通行考校詔送貢院照㑹蘇軾知舉合書新舊錄俱脱之按軾初無此意挺之因浮議以獻言用情誣實按言者用情誣實何但此存之乃所以見是非也樞密院言羌賊多謀貴在先慮不失備禦自去冬雪寒今已仲春尚多隂晦竊慮夏人隂蓄姦謀以前日涇原攻圍無利諸路牽制討殺窮㓂輕忿狂圖深入以覬僥倖詔陜西河東逐路帥臣悉心講畫多方以待之庚辰以久雨免朝參五日樞密院言封樁闕額禁軍請受諸路皆𨽻提刑司惟開封府界令提舉出賣解鹽官管勾今府界已置提刑司乞檢㑹施行詔令提刑司管勾又詔京西路酒務所收添酒税剰錢並歸轉運司新削辛巳詔市易欠户有季限催納可特與權住一季癸未知樞密院事安燾言自去冬大雪異常久隂未解細民失職上貽憂念皆由輔政無狀所致願就貶黜以塞天戒太皇太后宣諭曰此乃徳薄所召非卿等過也朝廷近日賑恤百姓無所不至宜廣及天下庶召和氣新錄云宜益講求所以賑恤元元者以召和氣詔自今朝議中散正議光祿銀青光祿金紫光祿大夫並置左右進士出身及帶職轉至左朝議中散為二資餘人轉至朝議中散分左右字為四資以上各理七年磨勘其正議至金紫並分左右字為八資應今官已及此者悉加之舊錄云非先帝官制也新錄削去四年十一月四日庚午承務郎以上至朝請大夫進士加左字餘人加右字紹聖二年四月三日戊辰除光祿銀青光祿正議朝議中散大夫存左右字餘悉罷大觀二年六月二十七日丙午又改此制近時有陳淵者作楊時龜山語錄其一節云因論寒士乍得官非不曉事便是妄作大抵科舉取人不得間有得者自是豪傑之士因科舉以進耳問李徳裕嘗言公卿大夫家子弟可用進士未必可用此論不偏否曰徳裕為此論至今人以為偏當時人以徳裕用資廕進身不由科舉故為此論此最無謂以徳裕之才應唐之科目極容易自是不為耳且資廕得官與進士得官孰為優劣以進士為勝以資廕為慊者此自後世流俗之論至使人恥受其祖父之澤而甘心工無益之習以與孤寒之士角勝於場屋僥倖一第以為榮是何見識夫應舉亦自寒士無祿不得已藉此進身耳如得已何用應舉范堯夫最有見識然亦以資廕與進士分優劣建言於有無出身人衡位上帶左右字不可謂無所蔽也其言曰欲使公卿家子弟讀書耳此意甚善但以應舉得官者為讀書而加奨勸焉則彼讀書者應舉得官而止耳豈真學道之人至如韓持國自是經國之才用為執政亦了得不可以無出身便廢其執政之才曰堯夫所别異者莫非此等人否曰執政不是合下便做亦自下官以次遷之如後來吳坦求等在紹聖中被駁了博士以無出身故也彼自布衣中朝廷以其有學行賜之爵命為其宜為博士乃復以無出身奪之此何理也資廕進士中俱有人惟其人用之加一右字亦自沮人為善按階官分帶左右字實錄並不載是何人建議楊時乃繫之范純仁未審何據又按三年二月四日辛巳令朝議大夫以上加左右字時范純仁實同知樞密院不預三省事是年四月五日始拜右相四年十一月四日庚午又令承務郎以上分帶左右字而純仁於六月四日已罷右相矣附注此豈純仁嘗有是請既罷相乃行其言乎恐龜山語錄未可信也丁騭議合附注此蒋之竒銘丁騭墓云官制行以階寓禄朝散大夫視前行郎中朝議大夫視少卿中散大夫視光祿卿舊制進士出身常調自職方郎中一遷為太常少卿再遷為光祿卿今自朝散大夫再遷為中散大夫可也無出身人自駕部郎中四遷方至正卿而今一概再遷為中散是紊舊制遲速混淆無别其後朝廷於朝議中散加左右字無出身者皆自右為左以别異之又分朝議至金紫光祿為左右皆細轉以應舊制承務郎以上亦以有無出身分左右自是清濁稍判其議多自騭發之詔開封府界自冬及春久值隂雪令提刑司體量願借貸糧種之人並量度户等給貸訖具數以聞又詔以常平錢穀給在京乞丐人至季春止政目云詔府界三日一散貧院錢米人一升十文七嵗以下减半候三月五日住以雪寒故也詔頒金銀雜綵付鄜延環慶涇原熙河蘭㑹路帥臣募能索敵情者甲申尚書右僕射吕公著等言去冬積雪甚於常嵗今春以來沉隂不解經時閲月民被其災望賜罷黜以答天變詔曰朕獲承大統懼徳不類以干隂陽之和廼自去冬距于今春久隂常寒霰雪不止罹此災罰斯民何辜朕方仄席祗畏圖維厥咎而卿等乃引責祈免是彰朕之不徳而重無以上承天心古之明王遇災而懼則克已修省以正厥徳不聞歸罪大臣以塞責文過卿其一徳同心夙夜啓沃以輔朕不逮庶㡬消復稱朕意焉姑體眷懷少安厥位所請宜不允詔罷修金明池橋殿以時寒恤工徒也尚書省言兩浙轉運司元豐元年以後至八年以前和預買紬絹價錢依條於正月十五日以前支俵轉運司闕錢多候次年隨市價收買轉運司實用貴價以致後來年分兊借别司錢即難以令轉運司認起减價錢紬絹欲乞只依元額定數起發减定價錢更不施行京西京東江東淮南荆湖北路並依此施行從之餘路凖此新削詔江南東西荆湖南北福建成都府梓利䕫路元祐二年以前封樁錢物召人入便或計置金帛發赴元祐庫乙酉徳音降死罪囚徒以下釋之應諸路今春縁修河及工役所起夫並特免如已發在路所至告示放歸其河上及應用急切工役並用軍士及和雇願役貧民充餘並權住一年應罪人令衆者自今年三月以後依條災傷郡縣公私欠負展一季去年秋稅展一限流民所至及饑貧人並多方存恤其給錢米拘礙條制安撫或鈐轄司量度應副訖奏司勲員外郎何洵直特展二年磨勘以亡失司勲印及告身故也初議重責洵直吕公著曰洵直失本部印誠有罪若加重責則自今猾吏皆有以制主司矣乃因赦宥量展叙遷嵗月而已太常博士楊國寳為成都府路轉運判官詔諸路轉運司下州縣今年春如已納免夫錢並給還三省言配軍及逃亡軍人應部送者遇寒月隨所斷及所過州權留工役給請受至二月乃遣詔在京及諸路特展至三月河東路經畧司言西賊於府州㓂邊将官鉗宗翊邀擊之詔曽布嚴戒並邊将官及城寨使臣過為隄備丙戌詔以隂雪苦寒令河東路經畧司於例外量度存恤差發戍兵翰林學士兼侍讀蘇軾言臣伏見陛下發徳音下明詔以大雪過常煖氣不敷農夫失業商旅不行引咎責躬渙汗之澤覃及方外而詔下之夕雪作不已臣備位近侍誠竊感憤廢食而歎退伏思念陛下即位以來發政施仁無一不合人心順天意者當獲豐年刑措之報鳳凰景星之瑞而水旱作沴恒寒為罰殆無虛日此豈理之當然者哉臣誠愚惷不識忌諱試論其近似者而陛下擇焉臣聞差役之法天下以為未便獨臺諫官數人者主其議以為不可改磨厲四顧以待言者故人畏之而不敢發耳近聞疎逺小臣張行者力言其弊而諫官韓川深詆之至欲重行編竄此等亦無他意方司馬光在時則欲希合光意及其既沒則妄意陛下以為主光之言殊不知光至誠盡公本不求人希合而陛下虛心無我亦豈有所主哉使光無恙至今見其法稍弊則更之久矣臣毎見吕公著安燾吕大防范純仁皆言差役不便但為已行之令不欲輕變兼恐臺諫紛爭卒難調和願陛下問公著等令指陳差雇二法各有若干利害昔日雇役中等人户嵗出錢㡬何今者差役嵗費㡬何及㡬年一次差役皆可以折長補短約見其數以此計筭利害灼然而况農民在官貪吏狡胥百端蠶食比之雇人苦樂十倍又五路百姓例皆樸拙須轉雇慣習人其費不貲尤為患苦民窮無告監司守令觀望不言若非此一事則何以感傷隂陽之和至於如此雖責躬肆眚徹膳禱祠而此事不變終恐無益今侍從之中受恩至深無如小臣臣而不言誰當言者然臣前嵗因詳定役法與臺諌異論遂為其徒所疾屢遭口語今來所言若不合聖意即乞便行責降以戒妄言若萬一少有可採即乞留中只作聖意行下庶㡬上答天戒下全小臣不勝恐慄待罪之至張行者遂寜人述之從孫也行言神宗議納役錢蓋嘗謂之助役矣以為若止於助則未能盡免将使後世役亦差錢亦納於是更為免役其慮深矣今乃廢免役而復差上違先帝燕翼之謀下拂元元安業之願豈曰述事乎又言差役下户一年所費有用數年役錢者有用數十年役錢者其等漸降其害愈深殆非聖人裒多益寡天道張弛之義又言臣恐議者以為朝廷有心於改法無心於便民昨日改之為天下之民今日復之為天下之民無容心於其間可也章數十上詔監司戒厲以聞行乃止户部侍郎蘇轍言轍言不得其時附蘇軾後臣伏見自去冬至今隂雪繼作罷民凍餒困斃道路聖心憂勞何所不至蓋嘗命有司發内庫之錢出司農之粟竭太府之炭以濟其急矣猶以為未也則釋犴獄罷役夫凡可以恵民之事無不為矣而天意不順雨雪如故臣竊惑之臣嘗觀先儒論五行之説以為聽之不聰是謂不謀厥咎急厥罰常寒故周之末世舒緩微弱政在臣下則天應之以燠煖秦之末世峻刑暴斂海内重足而立則天應之以寒栗是以周亡無寒嵗秦滅無燠年信如此言則朝廷之政令豈失於急歟竊惟二聖臨御以來革弊去煩施恵已責凡所措置雖未盡得而民獲其所欲者多矣茍以為急雖三尺童子不信也然而隂雪之應其咎安在臣聞商髙宗時雉雊於鼎其臣祖已告之曰惟先格王正厥事夫所謂正厥事者無常事也惟因其非而正之耳故臣竊推之古事以為天大雷電以風而成王應之以迎周公衞國大旱而文公應之以伐邢夫親迎三公非所以止風而興師伐人非所以致雨彼既為之不疑而天亦報之如響者誠得其時當其事耳臣竊惟近者天地之變常半嵗苦旱半嵗苦隂隂陽之氣一有過差浸滛濫漫而不能反今雨雪既甚久而不止則春夏之際又將復旱此其類似有以致之也古之為政徳刑並用寛猛相濟使天下懷其恵而畏其威和氣充塞而天地從之故陽不過而隂不忒自頃以來朝廷之政専以容悦為先務上下觀望化而為一監司之臣以不執有罪為賢郡縣之官以寛弛租賦縱釋酒税為優至於省臺寺監亦未聞有正身治事以辦集聞者也何者朝廷方兼容是非以不事事為安靜以不别白黒為寛大是以至此極也臣竊惟朝廷之意其始蓋欲以寛治民耳而不知姦臣猾吏乗其間以侵虐細民其弊不可勝數名雖近寛而其實則虐也陛下誠欲消復此變宜訓敕大臣使之守法度立綱紀信賞必罰使羣下凜然知有所畏茍朝廷無偏甚不舉之政則隂陽過差浸滛濫漫徃而不反之氣宜可得而止也不然雖空府庫竭倉廩以賑貧窮破囹圄焚鞭扑以縱罪戾臣恐天地之意未易囘也臣待罪地官以簿書米鹽為職出位而言罪在不赦然陛下頃自踈外擢臣而用之二年之間致位於此豈欲責臣齪齪以吏事自効而已哉是以冒萬死獻言惟陛下裁擇丁亥詔自今御垂拱殿紫宸殿日如值放朝參即取㫖御崇政殿戊子尚書右僕射吕公著等言臣等近以自冬渉春積雪久隂燮理無狀乞從罷黜未䝉俞允竊自思念備位鼎輔以統和神人為職今協氣弗充變沴異常陛下䖍恭譴戒惕懼備至隱恤刑獄寛恵民力令下之日内外知感然而隂曀寒栗仍未開霽繇臣等材不稱位無以上裨皇化補助萬分望賜罷免以副輿議詔曰朕謂天之示人雖若影響而災咎之發事豈一端思欲應天莫若誠實隂雪不霽自冬徂春民罹其災夙夜祇畏書曰惟先格王正厥事卿其究政事之所未正者以輔朕躬俾斯民無失所之歎顧欲引災去位是置朕於有過益無以弭天災而致和氣朕無取於斯焉勉安厥位以稱朕懷所請宜不允仍斷來章詔應刺面不刺面配本州牢城編管覊管經明堂赦恩不該放人通今年徳音以前年月已及格令其縁坐編管覊管人亦通及十年以上者聽依赦敕陜西制置解鹽司奏階州𣙜買所産石鹽土鹽毎年雖有所收息税人情未便欲仍舊詔定價𣙜買更不施行己丑承議郎左司諌豐稷為國子司業揚王顥荆王頵嘗令成都府路走馬承受官造錦地衣稷白御史中丞胡宗愈請率寮屬言之宗愈狐疑未決稷即獨奏劾以為二聖節儉樸素欲化天下而近屬奢侈僭靡至如此官吏輙奉承宜皆糾正其罪以示天下監察御史趙㞦時與稷同進對退謂稷曰聞君言使㞦汗流浹背給事中趙君錫曰諌官如是天下必太平不數日稷徙他官此事據李朴所編稷遺事曽肇封還王覿詞頭云豐稷論陛下骨肉間事猶且含容矜貸更獲美遷蓋謂此事也今稷傳乃不載此詔給廣恵倉錢三萬緡及闕額役兵錢糧衣賜募貧民應役以恤之知大名府馮京言准敕開修减水河在本府䕶城横隄之南請下有司預行固䕶詔令都提舉修河司照㑹修减水河實錄驟於此書初無首尾今别檢討編入此後元豐八年八月己巳韓絳疏可考初元豐八年十一月朝廷用王令圖議将復大河故道詔李常視之常言不可役已興旋罷時元祐元年正月也此據王巖叟奏見元年正月六日其九月又詔張問同令圖相度開孫村口河以分减水勢朝廷既從之尋亦中輟孫村口分水河據張問舊傳二年二月令圖死王孝先代領都水亦欲開孫村减水河如令圖議知樞密院安燾兩奏疏言朝廷久議回河獨憚勞費不顧大患蓋自小吳未決已前河入海之地雖屢變移而盡在中國故京師恃以限强敵景徳澶淵之事可驗也且河決毎西則河尾毎北河流既益西決固已北抵境上若復不止則南岸遂屬敵界彼必為橋梁守以州郡如慶厯中因取河南熟户之地遂築軍以窺河外已然之效如此蓋自河以南地勢平衍直抵京師長慮却顧可為寒心又朝廷捐東南之利半以宿河北重兵備豫之意深矣使敵能至河南則邈不相及今水官之議不過論地形較工費而獻納之臣又為髙論臣豈不逹然實考利害則須審輕重今欲便於治河而緩於設險非至計也此據安燾行狀及燾傳太師文彦博議與燾合中書侍郎吕大防從而和之三人者力主其議同列莫能奪中書舎人蘇轍見右僕射吕公著乗間問曰公自視知勇孰與先帝勢力隆重能鼓舞天下孰與先帝公著驚曰君何言歟曰河決而北自先帝不能回而諸公欲回之是自謂智勇勢力過先帝也且河決自元豐導之北流亦自元豐是非得失今日無所預諸公不因其舊而修其未完乃欲取而回之其為力也難而其為責也重矣公著唯唯曰當與諸公籌之此據蘇轍自叙然竟莫能奪也囘河之役遂興實錄於回河事載本未極疎畧今參取諸書修入蘇轍謂文彦博以河為重事吕大防安燾從而和之據燾行狀蓋先有此議非和彦博也今畧刪改之不知開修减水河果是何日當考辛卯詔宗室初參選監當人聽額外差充諸州及萬户以上縣監當新無樞密院言文臣換右職舊屬本院自改官制後歸三省縁換授大使臣後係樞密院奏差遣又有以本院差遣武臣因事去處取㫖換授者行遣不一合依例同進呈取㫖詔今後文臣換大使臣並三省樞密院同取㫖詔廣南西路民兵第四等以上户兩丁第五等户不以丁多寡及東路不以户等髙下並免教監察御史趙㞦奏編類章疏正月十四日去年因張舜民論事遽罷言職臺諫官爭而留之不得亦相繼罷去傅堯俞罷御史中丞除吏部侍郎王巖叟罷侍御史除起居舎人二人力辭不就乃請外補既而堯俞出知陳州巖叟出知齊州梁燾因面責張問以不能封駮罷諌議大夫知潞州孫升論列其事遂以為附㑹梁燾罷殿中侍御史知濟州到任皆已半年如堯俞巖叟燾升等輩其才能學術忠言嘉謀陛下之所深知而見於已試願俾還朝隨器任使或稍遷於侍從或復處以臺諫此據編類章疏增入四月十四日㞦罷御史又言使忠鯁之士包羞難進或與此同一狀今兩從之癸巳正議大夫知安州蔡確復觀文殿學士知鄧州正議大夫提舉洞霄宫章惇充資政殿學士既而給事中趙君錫論駁仍罷所復職確知鄧州惇知越州罷職在二十三日今并書十月十二日劉安世劾胡宗愈云確惇罪黜今春遽用常例復職臺諫交章疏其巨惡遂得追寢而宗愈初無一言臺諌交章當考政目二月十六日蔡確觀文知鄧州章惇資政知汝州二十四日確本官知鄧州惇本官知越州惇行狀云得提舉㓊霄宫迎親還吳中明年除知越州辭不行改蘇州本傳於越州及蘇州皆不書行状又不書復職實錄亦不書先除汝州與政目畧不同惇改蘇州在四月十四日詔罷春宴禮部狀都省送下朝奉郎監察御史充集賢校理趙挺之奏伏覩近制更易科舉參用經義辭賦取人以臣愚見科塲之中得人失人皆在試官能否蓋六經之義固有淵意妙㫖而辭賦聲律就其術而論之亦有精微至理昔之學經義者造道不能無精粗學辭賦者屬辭不能無巧拙以粗以拙者尚不能知精巧者之所存况其未嘗誦讀習學而遽令主試考校則去取升降安有不謬者哉辭賦之罷㡬二十年世以進士登科者止治一經向來科舉差官只問出身而不論元初登科所治何經以治禮之人乃使考書以治詩之人乃使考易是以一經登科而令遍考五經徃徃差失謬亂今若更令參考辭賦竊恐難為去取升降其幸而得與不幸而失者必多恐非朝廷設科取士務在得人之意臣愚欲乞特下有司明立将來選差試官之法毎經各差試官一員只考本經别差辭賦登科或曾應辭賦得解後來用經入仕之人専考詞賦量舉人多少立定員數如難得其人即乞於通判人内兼差或乞聚隣近州軍三五處於一㑹要大郡類試所貴試官之員易為充足而考校之藝必須精緻看詳發解及省試雖兼用經義辭賦論䇿然而各分一塲引試故學者得以盡其所長若廷試併合經義或䇿論辭賦同為一日引試深恐廹於晷刻使舉人倉遽難為盡工欲乞依舊只試䇿一道使其引古驗今足以見平日學識智慮之所存本部看詳所差試官欲乞将來科塲如差三員者以二員經義一員辭賦兩員者各差一員所有考校自依條試所乞聚類鄰近州軍三五處類試恐一郡之中難為應辦且依舊條施行其殿試經義辭賦舉人並試䇿一道合取自朝廷指揮内外各依此差官詔並依禮部所定仍先次施行五月二十九日蘇軾奏詔殿試經義辭賦舉人並試䇿一道從監察御史趙挺之請也十月末傳堯俞等議仁吕公著傳云初公著在宗朝嘗請進士先試䇿論神宗初又獻議以經術取士及知熙寜三年貢舉遂密啟臨軒専用䇿試未㡬公著以言青苖等事得罪去王安石専政乃盡罷詩賦一用經義獨以春秋為殘缺不可讀廢其學學者不得以應試安石又與其子雱及其徒吕恵卿升卿撰定詩書周禮義摹印頒天下凡士子應試者自一語已上非新義不得用於是學者不復思索經意亦不復誦正經惟誦安石恵卿書精熟者輙得上第有司發䇿問必先稱誦時政對者因大為諛辭以應之又多以佛書證六經至全用天竺語以相髙晚尚字學復以字書去取天下士於是學者不復解經而専解字徃徃離析字畫説一字至數百言去經意益逺由是中外議者皆咎經義而思詩賦矣元祐初臺諫侍從館閣及四方上封事者爭言科舉之弊請復仁英舊制公著曰先帝更新法度如試進士以經術最為近古且仲尼六經何負於後世特安石課試之法為謬耳安石解經亦未必不善惟其欲人同已為大謬耳司馬光亦以為詩賦不可復然論者習見經義之弊忿懣不可遏乃定制進士初塲試經義次賦詩論䇿對經義者許引用古今諸儒之論及已見又詔立春秋科太學置春秋博士二員禁有司不得於莊老書出題程文不得雜用申韓刑名之學及引釋氏書仍罷試律義至是将廷試執政又以熙寜復䇿之初進士葉祖洽譏議祖宗自後對䇿者皆訕前朝以阿當世因以為䇿問可廢當復詩賦論三題公著曰天子臨軒發䇿延四方貢士詢以治道豈非近古良法耶至於對者之是非邪正則在考官去取耳乃仍舊試䇿其後論科舉者亦未息以至公著没而詩賦益隆期盡廢經義而後已非公著意也東上閤門使果州團練使環慶路副總管曲珍遷領忠州防禦使走馬承受李元嗣減磨勘五年初賞討蕩西界吹哷羅章功也范純粹乞厚賞曲珍奏已附去年十二月二十工日珍初以東閤使叙果團在去年九月十七日實錄云珍討伐夏人斬獲一千二百二十有三級故遷此已見二年九月十六日賜趙卨范純粹銀絹降敕書奬諭乙未朝散郎右正言丁騭為左正言宣徳郎正字劉安世為右正言司馬光既沒太皇太后問吕公著光門下士素所厚善可任臺諫者孰當先用公著以安世對遂擢任之此據安世言行録安世三章附月末或只取第一章繫之此日朝散大夫王子韶為衛尉少卿朝奉郎司封郎中韓宗古知曹州奉議郎祕閣校理權判登聞鼓院劉唐老為太常博士詔光禄大夫吏部尚書蘇頌朝散郎試大理卿杜紘奉議郎試侍御史王覿朝散郎王彭年朝奉郎宋湜祝康奉議郎王叔憲宣徳郎石諤李世南承務郎錢蓋各遷一官蔡州觀察判官晁端徳循資宣義郎張益减磨勘一年奉議郎陳兟承奉郎劉公噩減磨勘二年以詳定元祐敕令式成書推恩也己亥詔罷變賣市易司元豐庫物從三省請也河東路經畧使曾布請河外復置都同廵檢五員從之詔衙前差鄉户處速募人抵替如見役人願不妨户役投充者聽劉安世劾胡宗愈章當考辛丑朝奉大夫吕希績為少府少監希績吕公著第二子乙巳詔戮内殿崇班閤門祇候廣南東路兵馬都監兼權東南第十一将童政封康賀新州都廵檢使郭昭昪貸死杖脊配沙門島以捕賊岑探而擅殺無罪者六十有三人也經畧安撫使蒋之竒措置有功充寳文閣待制兵馬鈐轄楊從先能根究發明遷一官政目二月八日詔廣東都監童政處斬坐擅殺六十餘人與實録同蘇軾云云附九月戊申當考詔陜西路轉運判官孫路賑濟鎮戎軍被傷及劫擄民户權知貢舉蘇軾同孫覺孔文仲言臣等伏見從來天下之患無過官冗人人能言其弊而不能去其害惟徃年韓琦富弼等獨能裁減任子及展年磨勘發議之初士大夫相顧莫敢以身當之者以為必致謗議而琦等不顧既立成法天下肅然無一人非之者何則私欲不可以勝公議故也流弊之極至於今日一官之闕率四五人守之爭奪紛紜亷恥道盡中材小官闕逺食貧到官之後求取漁利靡所不為而民病矣今日之弊譬如羸病之人負千鈞之重縱未能分减豈忍更添臣等自入貢院四方免解舉人投狀稱今來是龍飛牓乞為敷奏法外推恩者不可勝數臣等一切不行兼不住有經朝省下狀䝉送下本院只是坐條告示近凖聖㫖依逐舉體例下第舉人各以舉數特奏名已約計四百五十人今日又凖尚書省劄子取前來聖㫖特奏名外各遞减一舉人數若依此數則又添數百人雖未知朝廷作何行遣不當先事建言但恐朝命已行即論奏不及臣等伏見恩牓得官之人布在州縣例皆垂老别無進望惟務黷貨以為歸計貪冒不職十人而九朝廷所放恩牓㡬千人矣何曾見一人能自奮勵有聞於時而殘民敗官者不可勝數以此知其無益有損不言可知今之議者不過謂即位之初宜廣恩澤茍以悦此僥倖無厭數百人者而不知吏部以有限之官待無窮之吏户部以有限之財祿無用之人而所至州縣舉罹其害乃即位之初有所過舉謂之恩澤非臣所識也伏乞斷自聖意明勅大臣特奏名舉人只依近日聖㫖指揮仍詔殿試考官精加考校量取一二十人委有學問詞理優長者即許出官其餘皆補文學長史之類不理選限免積弊之極増重不已臣等非不知言出怨生既忝近臣理難緘黙貼黄稱臣覺見備員吏部親見其害闕毎一出爭者至一二十人雖川廣福建煙瘴之地不問月日逺近唯欲爭先注授臣竊怪之隂加訪問以為授官之後即請雇錢多者至五七十千又既授逺闕許先借料錢逺者許借三月又得四十餘千以貪惏無知之人又以衰老到官之後望其持亷奉法盡公治民不可得也丁未内殿崇班焦政為供備庫副使西頭供奉官張志清夏偔並為内殿崇班蕃官左藏庫使牛訥之為皇城使皇城副使包正左藏庫副使巴鄂卓克辰並為西京左藏庫副使左藏庫副使結布西京左藏庫副使鄂徳並為皇城副使文思副使凌占結堪布伽並為左藏庫副使西京左藏庫副使鄂特凌敦巴庫斯吉摩約肆供備庫副使轄凌結並為文思副使供備庫副使烏丹為西京左藏庫副使並以執果莊論賞也是月同知樞密院范純仁言臣竊見去冬以來雪寒過常今已仲春隂沴未解商賈束手不能營生貧困之民死者甚衆聖心憂勞修徳禳變賑恤備至祈禱精䖍猶未有消復之應臣竊思之君子為陽小人為隂或慮朝廷之上君子少而小人多因致隂氣過盛而陽不能勝也伏望詔三省選用正人在外者使復歸朝廷在京者㧞居要地俾得聚㑹精神講求政要以裨聖治所謂舉直錯枉庶使民心悦服自然協氣應誠災異不作臣向䝉聖恩不次擢用惟以臣曽任帥臣稍知邊事以西夏未寜俾預經輯今夏人雖受封册並不遣使入謝及貢賀坤成節全失恭順今秋必恐須至用兵皆臣籌䇿無效以至於此叨竊重位死難塞責雖天地之恩曲垂容貸而臣何敢恬然自安伏望聖慈除臣陜西一郡或西夏必叛可以就賜驅䇿庶得躬修戰守仰答聖恩今日簾前已曽奏知伏望聖慈特賜俞允上遣中使宣諭封還劄子純仁又言臣近以西戎桀驁邊事可虞願守陜西一郡庶㡬親備驅䇿誓将駑蹇以答遭逢昨日簾前伏䝉聖恩宣諭令臣休入文字不覺感傷涕下愈知恩重命輕微臣過計私憂不免再有陳奏未奉俞㫖退不遑安縁臣識昧㡬微老漸衰暗應變於旬浹之外制敵於數千里之間仰贊廟謀寜免差悞稍失機㑹動繫安危一貽宵旰之憂臣雖隕身何益近日諸路探報多言賊中㸃兵當遣諳事之臣就近照管邊備臣雖無取義合請行庶㡬老馬趨塗稍知所向萬一有補所繫非輕伏望聖慈特察愚誠深為國計發於睿斷早賜允從言行録誤以為二年事今移見此中書舎人曽肇言臣昨奉使契丹回有雄州瀛州百姓各陳述差役不便事其狀雖已退還然體問得各稱今日應役費用多於徃時出錢者以二州推之竊恐其他州縣以至諸路亦或如前之所陳臣於役法利害本不詳知但承乏從官将命出使既見二州有所陳述不敢隱黙伏望聖慈明詔有司更加考察如見今逐處役法尚有未便於民者不憚修完歸於便民而後已以稱朝廷愛恤民力之意貼黄稱熙寜中更定役法之時臣兄布判司農寺實與其事臣今言之不為無嫌但臣既親見二州有所陳述若觀望畏避不以上聞在臣謀身逺嫌雖為得計於事君體國之誼則恐未盡此臣所以不避僭越之誅冒昧以聞伏望聖明曲賜照察又稱瀛州百姓自言曾經户部及轉運司陳述後來未有指揮肇又言昨奉使契丹還至河北竊聞朝廷命王孝先開孫村口减水河欲為回河之計調發河北及鄰路人夫應副工役詢之道路皆云見今河流就下故道地形甚髙兼係黄河退背地分恐難成功當河北頻年災傷之後未宜有此興作臣方欲具所聞上奏伏見詔書放罷人夫又令候來年春興工饑愁之民一旦盡蠲力役歸復田里得以及時耕作恩澤深厚入人骨髓足以感召和氣消復天變然臣謂朝廷既候來年春方興河役則日月尚逺朞年之間猶可講求利害不必固守孫村口之説臣昨在河北見轉運使謝卿材言河流稍入地中漸成河槽水性趨下恐無可回之理但當閉塞支流縱之北去正是行其所無事卿材嘗畫八事聞於朝廷其説簡易明白似有可采伏望聖慈更下水官及河北路監司公共講求開孫村口及卿材所陳利害孰為得失朝廷擇其善者斷而行之庶使議論早定觀望希功之人無所僥倖於其間不枉費民力更招後悔臣生長南土亦未嘗在西北守官其於大河利害實所未逹然備位近侍偶因出使有所聞見不敢茍止惟聖明裁察卿材以元年十月自陜西徙河北四年六月二十四日再任八月徙河東七月八日兼領都水使者右正言劉安世言此據安世言行錄或只繫之十八日初拜時臣近被聖恩擢置諫列内惟譾薄媿無以稱尋具辭免不䝉俞允竊伏思念陛下所以不次用臣者豈徒備二省之員為朝廷美觀而已蓋授之以名者必求其實任之以職者必責其效臣拜命之初未敢指陳政事而首論治亂之本原人君之大體庶有以副公朝圖任之誠意蓋愚臣平日之所學惟陛下無憚煩而試聽之臣聞書稱堯之徳曰稽於衆舎已從人舜戒其臣曰予違汝弼汝無面從退有後言伊尹之告太甲曰有言逆於汝心必求諸道有言遜於汝志必求諸非道傅説之復於髙宗曰惟木從繩則正后從諫則聖然則古之聰明睿智之君所以能大過人者未有不以納諫為先務也今陛下居久安之時乗不㧞之勢崇起教化修舉法度粲然追迹於三代之隆者豈有他哉特以陛下至誠虛已首開言路故人人自竭樂告善道而天下之情無不通也然臣尚有疑者自去嵗以後屢罷言事之官中外臣民不知其詳徃徃竊議以為陛下好賢之志稍異於初年納諫之心漸怠於昔日臣竊憂之恭惟祖宗以來尤以臺諌為重雖所言者未必盡善所用者未必皆賢然而借以彈擊之權養其敢言之氣者乃所以制姦邪之謀於未萌防政令之失於未兆也今陛下深居九重政在大臣之際固宜開廣聰明留意采納而前日臺諌數人相繼罷去甚者至於不究其所論之是非不察其所爭之當否陽餌以美遷隂奪其言責使忠正之臣憤懣而不能發修㓗之士愧赧而不敢受若果出於陛下之意耶則虧損聖徳不可不戒若出於大臣之計耶則陛下宜察其用心不過欲排天下之公議以快其私意而已臣竊謂姦人用事之始任臺諫足以折其謀至於禍胎既成雖聖賢不能救其害陛下視今日何如祖宗之朝而乃一聽大臣之所為蔽耳目之任而屈忠義之氣非所謂慎終如始也臣之所以先獻此言者非謂忝列諫垣乃敢要君以固位也實以上關宗廟社稷安危之機下繫君子小人消長之漸是以反覆論列期有以感動宸衷若夫世俗之人指以為嫌疑者臣固有所不避也伏望萬幾之暇詳覽瞽言奨進端良容受直諫參之以公議持之以誠心所愛者必知其惡所憎者必知其善使臣下不能窺伺間隙以售其私則忠言嘉謀将繼此而進矣臣天賦愚直不識忌諱惟陛下察其愛君憂國之誠少賜留聽不勝幸甚又言臣嘗考載籍以推先王之道雖禮樂刑政號為治具而所以行之者特在於命令而已昔之善觀人之國者不視其勢之盛衰而先察其命之弛張未論其政之醇疵而先審其令之繁簡惟其慮之既熟謀之已臧發之不妄而持以必行則堅如金石信如四時敷天之下莫不傾耳承聽聳動厭服此聖人所恃以鼓舞萬民之術也書曰慎乃出令令出惟行弗惟反易曰渙汗其大號傳曰令重則君尊又曰國之安危在出令凡此皆聖人慎重之意也臣伏覩朝廷命令變易頻數逺不過一二嵗近或朞月而已甚者朝行而夕改亦有前詔未頒而後令蠲除者吏不知所守民不知所從求其弊源蓋由講議未精思慮未審人情有所未盡事理有所未通或牽於好惡之私或溺於迎合之説是非無所辨取舍無所宗故一人言之而遽為之紛更也方平居無事之時輕慢如此緩急有事之際何以取信於人伏望聖慈深鑒前古之戒謹為今日之慮至於法度之廢置政事之因革必使大臣公心協謀博極利病廣覽詳擇務當義理更其所可更則不嫌於違俗守其所可守則無憚於襲故申敕門下無使徒為審讀以應故事其有措置失當前後謬戾者必舉封駁之職庶㡬詔令清簡使民信服事可久行不至反汗又言伏見先皇帝考古眂典建置治官天下之務分總於三省散𨽻於六曹循名責實大體雖善而措置法度未暇致詳此議者所以論官冗之弊而首及於寺監也伏惟陛下即位之初常賦之外一切蠲復所入有限則國用有不足之慮是以専置官局裁節浮費元年四月十八日詔户部裁减浮費而膳部併於主客虞部入於屯田又量事之閒劇以定員之多寡六曹所减凡十九員而官無廢事人無異論者處之得其理也臣嘗觀先帝時寺監長貳多不並置亦有無卿少而丞簿行其事者今太僕衞尉鴻臚光祿太府各二卿軍器将作少府各二監丞簿官屬仍不預焉省曹所减止十二員而寺監所増乃倍平昔前日省官之詔遂為空文損彼益此何補於治昔杜佑建議於唐以為臯陶作士正五刑今刑部尚書大理卿是二臯陶也垂作共工利器用今工部尚書将作是二垂也伯夷作秩宗典邦禮今禮部尚書禮儀使是二伯夷也伯益作虞掌山澤今虞部郎中都水使者是二伯益也舊名不廢新職日加空存虛稱皆無實事臣毎愛其言最為切理今百司申陳必經寺監而長貳鮮敢予奪悉稟六曹不惟虛煩文字淹留旬月而又省寺指揮間多異同内外有司艱於遵守加以官吏猥衆糜耗廪禄非有釐革将不勝弊欲望聖慈參酌典故稽考名實凡寺監之職可以歸之六曹者宜盡省之或事務實繁及國體所繫不可罷者亦宜裁為定員不使冗濫庶㡬官得其人經費易給
