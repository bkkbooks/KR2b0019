body:
  text: 續資治通鑑長編巻三百九十宋李燾撰哲宗元祐元年十月己亥禮部言占城國進奉大使布靈息弛琴滿麻勿等乞續進方物從之户部言京都商稅務取酌中元豐八年錢五十五萬二千二百六十一貫七百二十八文立為新額自元祐二年為始從之河東路轉運司言上供錢物惟三路不起發蓋沿邉費用常自朝廷應副比之自京支降可免徃回船運之費今本路封樁禁軍闕額請受請立法止於逐路樁管如有不可停貯物即令提刑司變轉見錢封樁從之庚子端眀殿學士光禄大夫范鎮落致仕提舉中太一宫兼集禧觀公事兼侍讀鎮加端眀在二月十日己巳此十月二十二日乙巳又降詔大理寺言被㫖根究軍器監先乞市軍器物料度僧牒為錢計一十三萬緡而所差變買奉議郎劉仲昕等販易欺弊事連前軍器少監蔡碩請攝仲昕碩等參對從之二年二月十六日斷金部員外郎穆衍充夏國祭奠使詔曰故夏國主嗣子乾順維爾先人世修職貢訃音忽至愍悼良深想與諸臣同增悲慕惟忠可以保國惟孝可以得民各祗乃心以服朕命嗣子乾順政目於十月十六日書故夏國主秉常奏又於七月十日薨十一月十四日并二十四日可考辛丑都大提舉成都府等路𣙜茶兼陜西等路買馬黄㢘言按元豐六年閏六月十三日并八年十二月七日朝㫖應縁茶事於他司非相干者不得闗預設使縁茶事有侵損違法或措置未當即未有許令他司受理闗送眀文深恐民間屈抑無由申訴乞止依海行元豐令監司廵歴所至眀見違法及有辭訟事在本司者聽闗送應縁馬事亦乞依此從之荆湖北路轉運司言凖勅刑獄兵甲賊盗事悉委提刑司又凖朝㫖諸路轉運司兼管賊盗本司如廵所部有噐械損壞合行修整以致盗賊緩急差撥兵甲若須候移文提刑司恐後時别致敗事欲乞兵甲許本司通管及遇廵按應甲仗庫軍器亦許㸃檢施行從之新削去侍御史王巖叟言伏見除知汝州章惇知揚州命下累日物論喧然以為未允伏讀告詞又不為經眀堂恩霈直是無故寵遷臣愚不解此意按惇以跋扈之材懷怨望之志肆行無禮悖慢兩宫若正典刑自當誅殛陛下大度涵容不加深罰但罷機務與之一州又汝海善里王畿近藩物物便安非為貶所罪大責輕公議已稱其太幸豈可曾未數月遽易大邦况大臣降黜例是經年方有移命又須考得罪之情重輕何如亦未必經年便得易地搢紳士大夫皆云惇之凶慝不獨公卿大臣皆所忌憚而朝廷似亦畏之甚可恠也臣竊惟皇帝陛下春秋方富太皇太后陛下不出房幃尤當嚴命令肅政刑立之風聲以重朝廷之勢不宜浸開姑息稍自陵夷以弱天子之威也臣恐自此增強臣慢上之心長羣惡欺天之意非國家之福爾伏望聖慈深察臣言特加裁處貼黄稱惇告詞中不言以恩移郡必是非久别欲引恩加之職名以恱其心乞陛下特賜省察惇知揚州在六月庚寅二録皆不載巖叟言章當考左司諫朱光庭亦以為言壬寅十八日詔章惇依舊知汝州十一月二十四日提舉洞霄宫舊録云光庭言惇在樞密府於簾前悖慢失人臣禮責官未踰年遽移大郡竊恐遷陞無名假借太甚乞罷揚州新除以恊公議詔章惇依舊知汝州新録因之當求光庭全章增入章惇女壻竇訥作惇行狀云自汝州移知揚州行至國門以言者攻罷復還汝州徽録惇傳但書罷樞宻知汝州提舉洞霄宫漏移揚州一節不書踈略特甚先是左僕射吕公著等以惇父老且自政府罷既經赦宥故遷之便郡又欲以次甄叙諸放逐者使各不至失所既而言者交章謂惇不宜遽遷語侵執政太皇太后怒問主惇者誰耶公著前對曰衆議也時惇子宋朝要録惇子持勾當京西排岸司又上書為其父訟寃且侵執政詔併責之公著曰子之為父何所不至乃止惇被命將至國門詔追揚州勅復遣歸汝州自是當叙復者皆稍難矣同知樞宻院范純仁言臣近見執政議論以章惇父年將九十因眀堂恩霈之後欲請除一鄉郡使便其親臣但見其可禆仁化不慮其他遂共以為當然繼而聞三省奏上陛下即賜允俞臣以陛下天地之仁念其垂年之親不録徃咎臣實喜不自勝遂於簾前仰賛聖徳以謂自古臣子無如今日遭逢繼聞諫官有言陛下遂寢前命亦是聖心從諫之羙前日更䝉宣諭此事三省有失思慮戒其今後不得如此臣愚恐有言者以謂朝廷所怒之人不當遽有開陳又謂執政都狥人情必有主張之者致煩陛下宣戒勅諭丁寧㣲臣固宜佩服聖訓然有未盡之懇亦當罄竭敷陳方陛下急於求治之時是臣子知無不為之際豈宜顧慮形迹搐縮周防今所用大臣多是老於患難陛下奬之使進尚恐心志不銳思慮太周若更戒使逺嫌則恐顧避保身自防不暇在陛下愛惜諸臣則為恩徳之厚若使輔翊聖政却恐事無所禆葢人臣以匪躬自信為難掩阿固寵為易若今將容其所易沮其所難則其間希意顧望之人翻為得計甚非朝廷之福臣昔見仁宗皇帝推委執政一無所疑凡所差除多便從允而使臺諫察其不當隨事論奏小則放行改正大則罷免隨之使君臣之恩意常存朝廷之紀綱自正是以四十餘年不勞而治况陛下方稽仁皇之治聖度如天從諫不倦任賢不疑録人之功忘人之過皆是自古人君所難若便垂拱責成逸於委任臺諫紏其誤謬侍從罄其論思羣臣一徳一心陛下無事自然不須防慮百職具修坐致太平垂休萬世天下幸甚凡人於富貴功名皆願乗時早立近用二三執政年皆六十已上或七十正是餘年無㡬今幸遭逢陛下行堯舜之政擢居近輔可謂千載一時不於此時攀附神聖早立功名不知更待何日豈肯别懐顧望阿狥他人自取上疑以招危辱在常情且無此理况陛下以公望選擇之人哉其間或有進人不敢太速責人不敢太深者不過謂或當循致不可黒白太眀却恐扇成朋黨害陛下和平之政耳萬一因此恐有間言誤陛下不細又䝉宣諭譬如人家尊長所怒之人卑㓜豈可輕易寛觧臣愚以謂不然葢人主之量當如天地無所不包衆人所欲進退則人主從而行之所謂舎己從人使無喜怒好惡之迹不使姦人測見意㫖别生䜛間以惑聰眀古今盡然商鑒不逺惟陛下稽察唐魏徴有毁其阿黨親戚於太宗者帝使温彦博責徴以不避形迹逺嫌疑徴謝曰臣聞君臣同心一體豈有置公義事形迹若上下共由兹路邦之興䘮未可知也帝矍然曰吾誤矣以此可見自古君臣之間不當更事形迹此陛下之所熟聞臣敢引而言之承奉郎勾當京西排岸使章持狀奏臣伏聞父之於子雖有過而不忘教誨君之於臣雖有過而不失禮數葢恩義之施不得不然也臣子之於君父雖數加責而不敢自棄盖有所受而無逃於天地之間也臣雖至愚且世荷國恩豈敢自棄是以不避鈇鉞之誅而冐昩自陳竊以臣父惇向因議論遂致訟言乃䝉聖慈不加深罪出守汝海非太皇太后陛下皇帝陛下照察保全之則使羣言得逞將何所不至深恩厚徳何以論報比奉告命移守維揚竊讀訓辭謂使不失親庭之便臣祖父俞年八十有七矣祖孫父子所以感戴恩徳者又宜如何哉此蓋陛下以堯舜之仁天地之施以優禮遇大臣而恩恤其私命下之日使臣軰感之極而不知涕泗之隕也今聞傳言追寢前命臣未知朝廷所以追寢之意臣竊以揚州雖大藩然自郎官皆可以為守以臣父處之即汝州與揚州亦何所異蓋是朝廷因大禮推恩欲使奉親庭之便且以廣朝廷孝治之意今之追寢必有誤聖聰者此臣所以不得黙黙也臣竊以近事比之臺官王巖叟父荀龍自棣州移澶州衆人皆未知所以移之之意在朝廷以澶棣二州有何所殊在荀龍於人材之中甚號闒冗如此等人物陛下必不盡記其姓名是皆執政進擬縁荀龍家在懷州即澶州甚為近荀龍當進呈之時豈可謂欲使便其私舉此事足以見執政與臺諫官互相交持以欺罔陛下而朋黨相結之固也陛下施恩惠優遇大臣欲使臣父便其私則不可也而執政臺諫互相結託乃可行其私伏願陛下詳察其情又縁臣父在汝州近因行氣間風倒門扇驚致左右手足麻痺在假不領州事臣方得此報人子之心逺聞親疾憂惶無地見乞朝假徃省又聞朝廷有追寢之命臣憂惶所以不敢不言者竊恐臣父所患未得便安及追寢之命未到間或已離次雖復還任必不能領職於事理度之雖欲求聞即恐朋黨之人又從而造為巧言以欺罔陛下臣父必不自辨致陛下不能無疑也臣又維國朝所以待前執政恩數甚重設雖有罪猶謹行之豈容推恩移郡而言者輕視國體回大勢如反掌耶祖宗故事臣雖不能熟聞計必無此例葢縁臣父禀性剛直疾人之非無所容忍竭力向公不負朝廷每為同列所畏忌而言者欲以深結執政用事者故必極力攻此所以深結於彼伏願陛下察臣之言而騐之已事竊聞言者以謂臣父向在樞庭簾前悖慢無禮全失大臣之體且臣父所論皆縁公事豈有人臣自非病狂而敢悖慢無禮乎設或論議之間過有訐直形於言者不過如汲黯朱雲而已以漢武帝尚能容汲黯成帝尚能容朱雲而陛下之聖豈不能容哉且如言者所云悖慢無禮全無大臣之體若謂悖慢無禮豈止失大臣之體而已其言無禮就此可見且天子不可無諍臣臣父以議論得罪陛下不加重責而矜貸之今又移以近鄉之郡使便親庭是陛下聖恩甚厚而朋黨之人曾不能推廣聖意使天下之人咸知聖徳之寛大反以朋黨挾情相疾用縱横捭闔之術以悖慢無禮為說欲以激怒陛下此尤在陛下深察其情也古人以謂巧詐不如拙訥樂羊有功而見疑秦西巴以有罪而益信葢樂羊之有功巧詐也而終以見疑秦西巴之有罪拙訥也而終以益信臣父之得罪葢以拙訥比者維揚之移道須過闕朋黨之人恐因賜朝見之際有以感悟發其姦終以拙訥而陛下信之故力為蔽障乃不知臣父命未下之前先以卧病不能視事此臣又恐陛下未深照其底裏也臣雖至愚服膺茂訓粗有知識仰惟太皇太后陛下皇帝陛下仁恩厚徳所以愛育元元革弊興善無所不至誠堯舜之用心也而朋黨之人沽名掠羙朝廷行一善事更相推揚皆掩有之小民無知歸譽私門而不知為陛下之徳臣竊疾之伏願陛下臨照羣情總持權柄無使朋黨互相交結弄權自恣葢朋黨上下相應善為蔽欺凡執政用事者所欲必為使言者發其端言者之所陳執政者行其事相為表裏公議壅隔肆為欺罔不可不察此臣所常欲言而恐言之輕不足以感悟天聽古人以為堂上逺於百里堂下逺於千里門外逺於萬里葢萬里之情行者百日而可聞朋黨比周蔽匿情狀終不復知正謂此患也方今朋黨之患在于言路之不廣且朝廷補諫員任臺官其數非不多而臣以謂言路之不廣者葢所任臺諫之人皆執政用事之黨凡有所言唱出一口則雖十數人猶一人也夫以太皇太后陛下皇帝陛下之聖從善如不及納諫如轉圜而言者不知所以圖報反敢肆為欺罔向黨背公臣所以深病之頃者司馬光薨之後既大禮假閑垂簾之始日諫官全院皆轉或别自外來或内超除是豈非用事者欲引黨賣恩乎言者曾無及此他時有羙除若非其黨言者必有彈議若除臺諫曾有人言是以所除之人皆其黨是臣所謂言路不廣也古者使公卿至于列士獻詩瞽獻書師箴瞍賦矇誦百工諫庶人𫝊語近臣盡䂓古者言路之廣也如此今者臺諫之人與執政用事者結而為一茍有闕失朝廷何頼焉伏願陛下鑒其悃誠赦其狂愚而詳察之幸甚貼黄稱乞留御府燕聞之間詳賜省覽章持奏狀雖姦言不足録然要見當日事因附注此王巖叟朝論云太皇太后謂持言執政欲䧟其父今奏狀乃無此當考王荀龍自棣州改澶州政目在十月六日寔録不書是日十月十八御史中丞兼侍讀劉摯侍御史王巖叟同入對摯先進前謝侍讀之命八月十二日摯兼侍讀宣諭曰以卿有公望故用卿就箔前四拜巖叟即前謝侍御史之命宣諭曰以卿有材徳故任卿摯先進劄子乞罷武臣試換文資法讀訖巖叟進劄子論聽言與用人二事又讀摯奏差役事近甚有人動揺乞陛下守定差法巖叟曰司馬光上章復差法非司馬光所造之法乃是祖宗百餘年行之已便之法祖宗時人情熙熙天下安治只以行此法後因王安石誤朝廷行雇法遂至紛然祖宗法莫此最好又曰今只爭差字雇字願陛下既定差字便是祖宗法也摯又曰自陛下用司馬光天下弊事十去六七今但修完勿便移改此人無毫髪私太皇太后曰可惜此人公正無毫髪私國家不幸摯曰司馬光雖沒太皇太后如此至公誰敢為私昨罷章惇知揚州甚合公議太皇太后曰章惇昨來得罪為無禮豈可便移摯曰應是失勘㑹太皇太后曰應是差錯前時問他執政來不知誰主張云為其親老太皇太后曰若大辟罪人為親老不成不償命對者曰於法父母八十無兼侍亦貸命摯曰國家典憲於大臣不說如此巖叟奏曰若嵗月合移及若告詞引眀堂恩霈則自不消論應曰極是極是豈可纔半年便移又曰其子章持者亦上書言執政䧟他父故除揚州今日三省進呈來吕大防言臺諫官又言執政取恱章惇其子却言䧟其父太皇太后曰他乞留中却與降出教他執政軰知摯曰小子狂妄敢如此摯遂言曰臣等有一事欲奏陳此事體甚大巖叟曰縁為今來修神宗實録須要合辨眀摯曰此事太皇太后陛下合記得不知當日英宗立為皇子是至和間已定邪直至嘉祐六年方定邪不知宰相是何人太皇太后曰宫中必知是韓琦已前文彦博富弼軰雖曾言只是乞選宗室賢者㡬時敢指名巖叟奏曰既陛下分眀知得此事子細不勝幸甚摯又叙王同老上書之由遂展讀連銜一章巖叟奏曰文字頗多願陛下少垂聖聽讀至半又曰大臣言者豈敢指名只是乞選立宗室耳至宫中嘗飬二子又曰一人名宗實昭成太子之第二子仁宗嘗與韓琦言道較純厚後又曰韓琦之功更不説也見説富弼沒膽不敢做神宗只稱文彦博不言有乞建儲之功不謂曾指名也神宗一子與韓琦做親便為報他功也又曰今為修實録須㬠好進取入來摯與巖叟皆奏乞陛下宫中子細看巖叟又曰此事若眀韓琦雖在九泉無所恨摯又進曰今正人端士少小人多乞選正人在朝巖叟又曰正人盛則小人消正人不厭多太皇太后曰正人可知不厭多正人多則小人自出頭不得也巖叟又曰先詔諭令二三老臣多方進㧞正人摯曰二三老臣亦必體朝廷不敢私太皇太后曰只為近日差除中也則惹言語摯曰些小須有臣等不敢放過摯又奏曰臣曾薦數人已䝉用一二餘更望採用又諭曰卿等有正人但奏取入來又曰不拘甚事但事事言來親從指使徐全崔吉郭安並為御前忠佐歩軍副都軍頭以全等逮事神宗皇帝于東宫故也熙河經略司言乞將新復呸川一帯地土依舊令定西城招置弓箭手耕種從之仍許于從來己耕占地内耕種不得更有侵展别生邊事右司諫王覿言臣竊聞諸路州縣頗有役人數多而鄉村等第人户數少差役不足者目今雖以次第人户相兼差足將來役人年滿難得人户承替及雖有人户可作三兩畨更休充役之處亦是經隔年嵗不多其中等人户應役既頻則其力必困議者患之臣竊以為不然其弊有自來矣議者或未之知也伏縁差役之法本朝行之百餘年未嘗患人户少而不足以充役也至今日而患之葢助役免役法推行之初天下州郡皆先㑹一年雇役及寛剰錢之數然後賦之於民也賦於民者不可無法而且欲其均又必㑹其民家業之多寡為緡錢而率之其法大概曰一州雇役及寛剰嵗用錢若干一州之民家業錢若干即家業錢每貫嵗出免役錢若干而嵗計足矣法雖如此而民財卒不可以得其實則必至於搔動而民情之所甚不悦者如手實之法是也故州縣之吏莫不以為雖盡得家業之數其賦於民者足乎嵗計而已耳徒致民情之不恱也雖少得家業之數其賦於民者亦足乎嵗計而止焉乃可持虛名以恱民情天下之所謂家業錢者或十得其一二或十得其三四寛於此者固不可勝計宻於此者未之有也不惟如此而已州縣又有先集等第人户使各承認逐户合納免役錢數既足嵗計矣然後令供通家業而告之曰家業錢每貫當納免役錢若干今某人嵗納免役錢若干即當家業錢若干貫矣彼人户乃具狀供析家業以取合所納免役錢之數則家業十得其一二者又加少也既用家業錢以定免役錢之多少則所謂等第者無所用之而等第之民又不可廢故郡縣之吏皆於家業帳内率意妄說曰自家業若干貫以上為第一等户若干貫以下為第二等户至五等十等皆然也其等第既公私皆以為虚名矣然小民之情終惡為近上等第則州縣之吏亦何惜更以虛名而恱民故天下州縣之等第除上等户物力顯著難以退减之外其自中等而入下等者可勝數哉此臣所親見也今州縣徒用前日不實之等第而差役則人户之可以應役者至少又何足怪耶臣愚以謂欲天下鄉村應役人户稍多得以更休而不困即須告詔天下郡縣使重定等第令頗得其實則力役均而論者之所患者不足以為患矣惟聖慈詳酌施行貼黄言免役法根究人户家業以緡錢率之又官司有故為假借之意故難得其實今鄉村人户只是分為五等推排家業之大概易得其實也兼等第亦不須特行排定縁著令鄉村三年一次造簿只可申戒州縣遇依條造簿年嵗子細推排等第不可漏落堪任充役之人隠在下等以致中等以上人户數少差役不均庶㡬等第漸次得實不為差役之害覿自注云十月十八日今附本月日行與不行當考乙巳賜范鎮詔曰夫有徳君子以精神折衝譬之麟鳯能服猛鷙朕虛懷前席以致諸老非敢必以事諉也茍得黄髪之叟皤然在位則朝廷尊嚴姦宄消伏卿雖篤者乃心王室毋憚數舎之勞以副中外之望已降勅落致仕除卿依前光禄大夫充端眀殿學士兼侍讀提舉中太一宫兼集禧觀公事詔到日可起發來赴闕十一月二十四日改崇福宫舊録于十月二十一日全載召鎮詔書乃蘇軾所撰新本削去但書落致仕依前官職兼侍讀提舉中太一集禧然十六日已具官職此亦不須重出今從舊録全載詔書舊録全載此詔書必有謂當考范祖禹勸鎮勿出附十一月二十四日戊寅丙午興龍節權罷上夀止拜表其尚書省賜御筵并宴依坤成節例從禮部言也又詔殿前司均容直十二月九日皇太后生辰許依例入内進表納香合新無又詔工部檢計修舊尚書省為貢院仍令踏逐别試所試院新無三年正月十九日就太學試禮部進士然則貢院竟未成也左右司言六曺及不𨽻六曺官司得㫖施行事應立法者自來立别條本省議奏取㫖施行内非𦂳切者制勑庫房類聚半年一次具冊取㫖頒降顯是重煩欲乞今後申請事件並先次行下應立法者候立到條干罪賞者覆定申省依限付制勑庫房看詳取㑹改修類聚半年一次具冊取㫖頒行有取㑹赴期不及并在六月十二月二十一日已後申前到者於後次入冊從之丁未户部言制置發運司奏江淮荆浙六路州縣場務舊日賣礬並據人户取便赴官收買後來發運司奏請並依河東體例許令染店并襍賣舖户結保預買一季礬貨頗有抑勒追擾之弊欲乞令江淮荆浙六路礬依舊從人户取便赴官収買從之新録刪舊録所載甚略今從舊翰林學士蘇軾言臣伏見近日言者以吏部員多闕少欲清入仕之源救官冗之弊裁减任子及進士累舉之恩流外入官之數已有㫖下吏部禮部與給舎詳議臣竊謂此數者行之則人情不恱不行則積弊不去要當求其分義務適厥中使國有去弊之實人無失職之歎然後為得也欲乞應任子及進士累舉免解恩例並一切如舊只行下項一奏䕃文官人每遇科場依進士法試大義䇿論如係武官即試弓馬或試法並三人中解一人仍年及二十五已上方得出官内已舉進士得解者免試如三試不中年三十五以上亦許出官應試大義䇿論及試法者在京随進士赴國學在外赴轉運司試弓馬者在京随武舉人赴武學在外赴轉運司差官一進士累舉免解合推恩者並約嘉祐以前酌中數目立為定額如所試優長係額内人數即等第推恩並許出官如係額外即並與一不出官名銜一流外入官人除近已有㫖裁减三省恩例外其餘六曹寺監等處及州郡監司人吏出職者並委官取索文字看詳有無僥倖定奪酌中恩例若行此數者則任子雖有滯留之艱而無終身絶望之歎亦使人人務學文臣知經術時務武臣閑弓馬法律皆有益於事而進士累舉有詞學人自得出官若無所能得虛名一官免為白丁亦無所恨如有可採乞降下與前文字一處詳議是時九品以上注籍左選者數千員法年二十即仕于州縣為吏謂之入仕議者因此官所以冗者歟乃建言故事年二十五嵗即試於銓守選三年然後入仕今官冗請復二十五嵗守選之法且使進士特奏名者减其舉數以示恩亟與之官而不使仕則左選清矣歐陽棐以考功員外郎攝令侍郎左選者議曰左選之冗士人之病耳朝廷憫而議之欲利之耳今加五年使守選是反害之也所謂特奏名者非他儒人之老于場屋無成者也憫其無成而老故與㣲官使之霑禄而後歸今亟與之而不使仕所謂官者乃虚名耳豈為恩哉是終窮也議者之言遂格此乃畢仲游所作歐陽棐傳或與蘇軾議相闗當考八月二十六日蘇軾上官均云云可考戊申光禄大夫集賢殿修撰致仕程師孟卒己酉左司諫王覿言權知開封府謝景温崇信妖妄奏舉嬖妾之兄為引接詔謝景温分析聞奏仍令大理寺劾之御史中丞劉摯劾景温非治劇才事無巨細皆列於上前景温本傳可考尚書省言承議郎宗正寺丞王鞏奏宗正寺條例皇帝玉牒十年一進修玉牒官並以學士典領玉牒自熈寜中翰林學士范鎮等一進之後神宗玉牒至今未修仙源類譜自翰林學士張方平慶厯年進書之後已五十年並無成書自奉行官制别𨽻宗正寺官又復累年未果成其神宗朝以上文字臣近已進呈奉安畢今合修皇帝玉牒類譜等臣以十年進書之期尚逺恐寺官因循異時復成曠墜請别立法宗正寺修纂寺書其玉牒官每二年一具草繳進如㑹問未足不得過進期兩季類譜等亦二年一具草候及十年類聚修纂成書進呈奉安如故事庻㡬國朝大典永無廢墜從之駕部郎中黄好謙言諸路新招廂軍乞令在營一年方許差出重難去處從之新無左司諫朱光庭言詔書以十科舉士其間不能無因縁請託之弊所舉之士未必皆賢朝廷宜加精察庶絶濫進仍請申勑中外臣僚盡公擇賢毋或援引小人詔從之蘇軾前月末論不須降詔或因此當考樞宻院言廣西經略安撫使司奏交人入貢後時深慮别致作過乞添差軍兵防守詔令廣南西路都鈐轄司如體探得交人緩急欲作過不虛即一面勾押潭州駐劄東南第八將徃桂州駐劄及令荆湖南路鈐轄司候見廣西勾抽將兵立便發遣並附急逓以聞當議自京别遣兵徃湖南補戍仍從京先差虎翼三指揮赴荆湖南路鈐轄司駐劄以備起發兵將兊那差使候交人入貢即行勾抽新無壬子詔神宗皇帝神御殿名曰宣光山殿曰靈徳東門曰啟祐紹聖二年六月三日改宣光為顯承廢中牟管城等縣水櫃劉摯蘇轍等奏也舊録云先帝導洛通汴京師免大河分流不測之虞瀦水中牟管城以助旱乾不給乃罷之新録已削去今從新録按蘇轍三月十八日又八月二十六日再論此事劉摯亦嘗有言今特書之樞宻院言昨差供備庫使張楙押賜夏國主生日禮物内殿崇班閤門祗候安愈押賜中冬時服近為夏國主卒並令發來赴闕詔夏國主嗣子乾順雖未經封册縁以曾差使詣闕告哀所有中冬時服特差安愈押賜仍差張楙充弔慰使十一月十四日又言臣僚奏乞移梓䕫路鈐轄司依舊在遂州安置詔梓䕫路鈐轄司元在遂州昨因蠻賊作過慮報應地里遥逺遷徃瀘州近便處置今未可遷徙候三五年邊事寧息奏聽朝㫖其瀘州見屯鈐轄司兵馬令轉運鈐轄司相度除合留隨行外餘可以分减多少指揮於近便處具狀以聞又言夏國自秉常身死諸路探到立嗣未定酋豪相攻人情不安所奏率多不同深慮好功立異之人縁此復生邉患詔令陜西河東諸路帥臣體認累降約束凡事精加採探務在得實仍誡諭邉吏毋失禦備刑部言撫州制勘院勘到江西路提舉常平等事曾孝亷挾私侵越㸃檢撫州驅廹知州石禹勤獄死以書諭勘官李柸令重勘禹勤及奏事不實等罪詔曾孝廉特不以赦原追兩官勒停送房州安置候叙日未得叙入正官制勘在閏二月二十四日王巖叟先有論列乞不用赦原二十八日王覿論市易冐賞附十一月四日新陜西路轉運使謝卿材改河北路轉運使卿材除陜西漕政目在八月四日新淮南等路發運副使吕大忠依舊陜西路轉運使大忠除發運八月十四日朱光庭云云可考癸丑户部言欲乞廵檢知縣兼鹽倉場賞罰並依正監官法從之御史中丞劉摯言臣昨者建言太學條制煩宻失飬士之意乞下有司别行修立後䝉朝廷選官置局及今已久未見成法縁所差官各有本職不得專一集議兼臣竊以謂庠序之制教育以成其材奬勸以進其志羣居衆聚略無約束自古以來法之施於學校者其本不過如斯而已然則為今之議無大措置獨可按據舊條考其乖戾太甚者刪去之而存其可行可久便於今日則所謂學制可以一言而定矣若乃髙濶以慕古新竒以變常非徒無補而又有害夫職親於諸生而習知其情偽者宜莫如學官也使其因人情利害而為之法者亦莫如學官也然則安用以他官置局為哉故臣前日奏請止乞令本學立法上禮部再加參詳上三省以待聖斷誠如臣言學制成久矣今既置局半年聚議既稀濶而議官各持所見紛然異同無所折衷學者疑惑趨向不安欲望聖慈指揮罷修定學制所檢㑹臣今年二月十五日所奏止以其事責在學官正録以上將見行條制去留修定嚴立近限次第條上取㫖施行所貴因革不失其當法令速成以便學者以述先帝興學之㫖以副陛下造士之意又言古者以議禮之家名為聚訟今議學制者寔已似之遂致孫覺有狀辭免伏望詳察指揮罷修定局止令本學刪修條制五月十二日詔孫覺顧臨程頥同看詳修立國子監太學條制此章稱置局半年自五月至十月凡半年也今附十月末摯初以二月十五日建議至五月十二日乃施行前章但附五月十二日更不于本日出之摯言高濶以慕古新竒以變常盖指程頥也頥所立條制輙為禮部疏駁頥亦自辨理然朝廷訖不行頥集有三學看詳文字凡十五六板或略刪取然亦無用也殿中侍御史吕陶言臣昨凖朝㫖徃成都府路計㑹轉運司諭以更改差役大意同共定議見得本路人户貧富等第髙下不均蓋諸縣大半以稅錢多少立為等第有自一貫至于十貫已上或自五貫至五十貫以上並為第一等若各差一役皆二三年一替則富者常幸貧者常不幸又縁中等人户絶少除官户單丁女户寺觀外一縣之役有差一兩畨不足處况役人數目已依熈寜後來裁定難更减省今來若不頻差上户則無以寛中下户之家雖至相度立法其户多處以十二年户少處以九年為率分作三次總計合役之數均勻定差謂如有一貫稅錢於九年或十二年中合差役一次則兩貫以上者差兩次逐次各一人三貫以上者差三次逐次各一人其稅錢轉多則又增所差之役然於九年或十二年之内三次差役共不過五六人謂逐次各差兩人即非併差五六人仍令私自雇人祗應其一貫已下等第漸低只差縣役一年又其次者差户長或渡子半年所有第四等徃徃更不應役第五等則並不差充大約如此風俗以為稍平外餘衙前皆悉招募以坊場錢酬支重難及出賣坊場只據見今第四界價直令管押綱運了當人指占承買更不實封投狀並在本路役法畫一開說差官齎赴闕伏乞降臣此奏付詳定役法所照㑹候本路文字到日相度可否施行又聞近降朝㫖出等户更不差役只令减半出免役錢諸州縣合役之户轉少湏至差上等人户兼一兩役所貴稍寛中下之家此䟽不得其時陶以五月入蜀十月必還朝因附見并當考其從違出等户便不差役只令减半出免役錢恐是九月十八日指揮十二月二十五日詔舊出免役錢三百緡以上户並依單丁等户例輸納與免色役從詳定所言也恐陶此䟽在此詔後更詳之又言臣奉使逺方察知民間病苦及官政未安凡一十事已嘗具奏其一乞减瀘州戍兵不示賊以形且省饋運之勞其二乞不築雅州城以節横費免於逺方生事其三乞立催科條約使轉運司與州縣同任其責以戒重歛其四乞添和買布價以寛民力其五乞减成都機織院小料綾綺罷監官免勾行人助工其六乞復成都府犀浦綿州西昌陵井監貴平等縣使民户力役均平其七乞興州濟衆監鑄减輕錢庻使疲民不為爐冶所困其八乞詳審改正蔡朦所减鐵價并所奪人户鐵爐其九乞開卓筒鹽井以濟困窮頼其課入可助本路之用其十乞罷興州青陽鎮銅錫場鹽官以减冗濫凡此十者或陳一道之利害或指一郡之休戚或議一邑或言一官以朝廷視之乃細碎毫末不足上禆國論以逺方望之則皆切近人情最為急務仰惟聖慈願賜采納是月詔夏國其元豐四年用兵所得城寨除元係中國及西蕃舊地外候送到陷沒人口當委邊臣勘㑹分畫給賜政目係元年十月七月八日吕公著云云可考二年三月末可考御史中丞劉摯言臣伏以國之教化出於學校學校之廢興盖繫師長故聖人既建庠序必立之官茍非博通經術而有徳行者則不能使學士誠服而心恱之祖宗以來莫不謹其選任而仁宗慶厯中最號得人如胡瑗孫復石介實為之首育材之効後世有考焉神宗崇儒重道大建學制訓發經典以幸多士恩施甚厚今在學者衆多與古争盛而師儒之位豈可以非其人伏見國子司業黄隠學不足以教人行不足以服衆學之政令惟考校課試遷補職掌最繫奬勸不可不公而隠違法徇私事皆有狀以致大喧物論多於生員試巻之末妄立詞説出牓以示衆變棄義理疑惑學者隂附權要奬進浮薄故使學衆不伏怨情洶洶至有騰為嘲謗之詞者議者謂近時學官之肆為私枉無若隠之甚者按隠本無術業使在此官非其所長恐不足以表率士類奉宣教法無以稱陛下首善造士之意伏請罷隠職任除一外官以安學者又言故相王安石訓經㫖視諸儒義說得聖人之意為多故先帝以其書立之於學以啟廸多士而安石晚年溺於字説釋典是以近制禁學者毋習此二者而已至其所頒經義蓋與先儒之說並行而兼存未嘗禁也隠㣲見安石政事多已更改輒爾妄意迎合傅㑹因欲廢安石之學每見生員試巻引用隠輒排斥其說此學者所以疑惑而怨之深也夫安石相業雖有間然至於經術學誼有天下公論所在豈隠之所能知也朝廷既立其書又禁學者之習此何理哉伏望速賜罷隠以允清議而一風俗殿中侍御史吕陶言臣竊以士之大患在於随時俯仰而好惡不公近則隳䘮廉耻逺則敗壞風俗此禮義之罪人治世之所不容也太學者教化之淵源所以風動四方而示之表則一有不令何以誨人臣伏見國子司業黄隠素寡問學薄於操行久任言責殊無獻告惟附㑹當時執政茍安其位及遷庠序則又無以訓導諸生注措語言皆逐勢利且經義之説蓋無古今新舊惟貴其當先儒之傳注既未全是王氏之解亦未必盡非善學者審擇而已何必是古非今賤彼貴我務求合於世哉方安石之用事其書立於學官布於天下則膚淺之士莫不推尊信嚮以為介於孔孟及去位而死則遂從而詆毁之以為無足可考蓋未嘗聞道而燭理不眀故也隠亦能誦記安石新義推尊而信嚮之久矣一旦聞朝廷欲議科舉以救學者浮薄不根之弊則諷諭太學諸生凡程試文字不可復從王氏新說或引用者類多出降何取舎之不一哉諸生有聞安石之死而欲設齋致奠以伸師資之報者隠輒形忿怒將䋲以率歛之法此尤可鄙也夫所謂師弟子者於禮有心䘮古人或為其師解官行服與負土成墳者前史書以為羙後世仰以為髙此固不論其學之是非而特貴其風誼爾昔彭越以大惡夷三族詔捕收視者欒布一勇士敢祠而哭之漢祖猶恕而不殺班固亦以為能知所處蓋氣節之可尚也今安石之罪雖暴於天下惟其師弟子之分則亦不可輒廢而諸生為之設齋致奠又非彭越欒布之比隠何必忿怒而遽欲䋲以法乎抑可見其不知義也向者有司欲復聲律朝廷方下其事集羣臣而議之隠不詳本末妄為定令揭版學舎謂朝廷已復詩賦使學者知委傳播四方人皆疑惑此又見其躁妄趨時之甚也夫道徳所出之地長育多士庶㡬成材乃以斯人為之貳則何以飬廉耻厚風俗哉伏請早行罷黜以示勸戒無使邪險之士久累教化之職又言大率隠好自任凡考校生員文字多不與祭酒博士共議意欲徇私向者違條差補經諭不當鄭穆自舉覺申禮部近日定王適程試髙下異論隠輒有申請上煩朝廷與奪益見其取與不恊公論不能稱職也隠為御史三年無所建明為司業經年職事乖失如此已試不效徒累名噐伏乞量其所能與一外官蓋教化之地非所宜處監察御史上官均言臣竊以為京師太學多士之所聚風化之淵源實係四方之觀法為之官師長貳者必得行誼端修經術該通之士然後為稱臣竊見國子司業黄隠自官庠序將及一年考其行則倨傲自任傾邪無常論其學則暗於經術不燭義理每至考試諸生不與祭酒博士㑹議任意取舎髙下不協衆心其於講說經法惟務妄率私見或躐等升補要官親戚以為榮進之計謗語喧騰至為匿名詩曲以暴其事學徒縱弛驁佚無節而隠備官長貳曾不察禁自朝廷興建三舎以來學規弛廢取舎失平未有如今日者也夫師儒之任以行誼為本經術為輔茍傾側淺陋無一可取則何以厭服學者之心聳四方之觀聽以副朝廷崇奬名教之意臣乞罷隠學職量其所長與合入差遣擇端修該通之士以貳庠序庶㡬淵源澄清多士信服又言臣昨具疏論奏國子司業黄隠為人傾側淺陋取舎升補不參公論行誼經術不足以厭服學者之心乞罷職任以恊衆議至今未䝉施行臣聞為國之基莫重飬士飬士之源實出於太學自非徳誼學術閎深端厚素信於士大夫者不足充長貳之職以師表士類自隠初除學職衆論囂囂已不厭服及既就官講學考校之際不能推考義理與博士等恊心論議專以區區私見排詆王安石經義安石自為宰輔更張政事誠有不善至於沉酣六經貫通理致學者歸嚮固非一日非假勢位貴顯然後論說行於天下其於解經雖未能盡得聖人之意然比諸儒注疏之説淺深蓋有間矣豈隠膚陋所能通曉此中外士大夫之所共知也又朝廷昨來指揮止禁學者不得援引字説其於三經新義實許與注疏並行而隠學無所主任意頗僻便以為朝廷盡斥安石之學肆言排詆無所顧忌妄倡私説取笑學者又自來差補學職多用衆薦至於考校等第皆與正録博士㑹議然後補定而隠傍賣祭酒下蔑官屬專率已見及陷附要官進補其親戚以為進身之計妄指博士考校議論不同以為侵官意欲擅攬取舎之權以逞其欲學舎沸騰至為匿名詩曲嘲誚百端夫京師太學風化淵源實係搢紳之觀法而隠學術淺陋取舎不公怨讟嘲笑流播四方若終使居位何以勸率士類厭服中外之論臣竊思之隠備官太學近在輦轂所以敢不畏公議陵驁長屬者誠以諂附貴近恃其隂為之地言者不能搖動臣前日之言所以未䝉施行者竊意有論議之臣過為游説以惑聖聽願出臣章疏詢於大廷則是非善惡必有不可揜者乞陛下采擇論議之最多者斷而行之以厭中外之心又言臣兩具奏論國子司業黄隠為人傾邪學術淺陋取舎生員升補學職不參公論專務趨附權要以為自進之計乞行罷免以恊衆心至今未䝉施行此皆臣愚才駑位下言不足以信於朝廷致陛下疑於去邪而未果行也臣聞古者爵人於朝刑人於市者蓋與衆共之而不任一人之私論也自陛下臨御以來黜陟非一而天下之人皆誦陛下之至聖仰陛下之至眀者以合衆人之公論也今司業黄隠學術淺陋為人傾邪升補不當趨附權勢皆有實狀自學舎生徒以及朝之士大夫莫不共知怨讟嘲笑播滿中外夫見棄於公論而未加眀黜此臣之所以拳拳論奏至于再三者廹于公論之不可以已也夫學者之淵源四方之觀法實在太學為之長貳者傾邪淺陋至于如此何以表率士類居風化首善之地願陛下博採公論早行罷免以副衆心奏訖不行二年八月十二日黄隠乃自司業改鴻臚少卿劉摯十一月四日自中丞遷左丞其論黄隠不得實月日姑附十月末
