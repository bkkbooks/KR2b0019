body:
  text: 續資治通鑑長編卷九十二宋李燾撰真宗天禧二年五月壬戌朔令淄州刺史知登州范昇與比部員外郎知淄州王穆兩易其任時知青州李士衡言登州仍大旱歉昇武人不閑治道故也范昇或作花昇當考詔曰民勤稼穡家有儲峙所以備流行之災而末俗澆浮罕務蓄積嵗或少歉便至流亡豈教𨗳之方未甚篤也今禾麥將登令所在長吏躬親勉諭無使復然刑部員外郎兼侍御史知雜事吕夷簡守本官同勾當通進銀臺司兼門下封駁事度支郎中杜夢楨兼侍御史知雜事夷簡與中丞趙安仁近親避嫌也癸亥詔祥源觀先營正殿餘俟明年興葺甲子成徳鎮寧等軍節度使太尉尚書令徐王元偓薨先是宫邸遺燼燔舍數區元偓驚悸暴中風眩不能言上憂之親視者數四及是臨奠慟哭贈太師尚書令追封郡王諡曰恭懿𦵏日御製挽詞元偓姿貌偉異沉厚寡言樂善多藝知音律既歿詔取生平歌詩文記纂為六巻及墨跡三巻親製二序藏之秘閣丁卯命宰臣王欽若管勾修祥源觀事右正言劉􅁮言前世𫝊聖水者皆詭妄不經今盛夏亢陽不宜興土木以營不急疏入不報又嘗建議罷提㸃刑獄官禁民棄父母事佛老者皆不行䕫州路轉運使言順州蠻田彦晏等齎彭儒猛状哀訴求歸順乃下詔釋儒猛罪仍加録用令髙州等處諸族蠻人以此招諭如挈屬來降願給田耕鑿或却還溪洞皆聽從便其招諭之人亦遞加酬奬壬申廣徳軍言管内祠山廟承前民施牛二百頭並僦與民戸每嵗一牛輸絹一匹或經三十年牛斃而猶納絹欲望歴十五年已上者並除之詔可甲戌以荆湖北路提㸃刑獄權轉運司事屯田員外郎江嗣宗為都官員外郎辰州都巡檢供備庫副使李守元為西京作坊副使内殿崇班閤門祇候知辰州錢絳為内殿承制入内西頭供奉官江徳源為内殿崇班左侍禁閤門祇候劉永崇為東頭供奉官右侍禁閤門祇候知澧州史方為西頭供奉官辰澧鼎州都巡檢使右班殿直閤門祇候康八元為右侍禁以討捕溪蠻有功其使臣將校第勞遷補有差召徳源八元赴闕以守元為辰澧鼎州都巡檢使絳知鳯州永崇知施州方知辰州康八元未見太常博士張及言災傷州軍望權罷造閏年長巻版籍俟後閏仍舊從之丙子冨州刺史向通漢率所部九十二人來朝貢名馬丹砂銀装劍兠鍪彩牌等物詔賜襲衣金帶鞍勒馬并其子光澤以下冠服器幣有差通漢求日奉朝請詔許五日一起居己卯御史中丞尚書右丞兼宗正卿贈吏部尚書諡文定趙安仁卒庚辰京東轉運使請益兵防䕶兖州僊源縣文宣王廟從之丙戌河陽三城節度使張旻言近聞西京訛言有物如㡌蓋夜飛入人家又變為犬狼狀㣲能傷人民頗驚恐每夕皆重閉深處以至持兵器捕逐詔使體量又命侍御史吕言馳往按本府長吏洎轉運提㸃刑獄司不即上聞之故仍設祭醮禳禱吕言造父夏卿祖丁亥以暑熱賜輔臣花素布人十匹翰林學士李維罷為户部侍郎集賢院學士初維三兄皆年五十八而卒及是維亦得疾因力辭近職云維疾稍間命知許州集賢院學士出藩自維始春明退朝録六月壬辰朔詔三班使臣經汾隂改官後七年者並許考課遷陟禁陜西民鬻漆於北界乙未以宣徽北院使同知樞宻院事曹利用知院事詔奨涇原駐泊都監周文質以其築南使城及縁山壕塹功畢也仍賜名曰静邊鎮丁酉以太常博士提㸃開封府界公事齊革監安州税革擅令尉氏縣毁撤坊市民舍當暑擾動故及於責己亥詔諸州文學參軍長史别駕等降謫經十年者聽還鄉壬寅富州刺史向通漢以五州地圗來上乞留京師上嘉其意甲辰授通漢本州防禦使還疆土署其兄子光澤等三班職名通漢再表留京師不允乃為光澤等求内地監當及言嵗賜衣裘願使者至本任並從之通漢本青州人唐僖宗時隔在溪洞因母疾不茹葷迨今三十年語言與中華無異云乙巳入内供奉官趙用和言太廟每有享祀行事官並前一日入廟致齋望自今每月朔望祭宫闈令亦前一日致齋從之是夕京師民訛言帽妖至自西京入民家食人相𫝊恐駭聚族環坐逹旦呌譟軍營中尤甚上慮因縁為姦詔立賞格募人告為妖者既而得僧天賞術士耿槩張山岡等令起居舍人吕夷簡入内押班周懐政鞫之坐嘗為邪法並棄市其連坐配流者數人然訛言實無其狀時自京師以南皆重閉深處知應天府王曾令夜開里門敢倡言者即捕之妖亦不興辛亥有彗出北斗魁第二星東北長三尺許向北行經天牢拂文昌長三丈餘歴紫㣲三台軒轅速行而西至七星凡三十七日没己未加號眞武将軍曰眞武靈應眞君知秦州李及言得囬鶻九部族軍主納丹等狀以曺瑋得假還京望令且在本任詔奨瑋仍從其請初皇后父通嘗掌禁旅從潘美征廣南又累戰北面積勞至虎㨗都指揮使領嘉州刺史太平興國中䕶蹕太原卒于師權窆京城西累贈永興節度使兼中書令母龎氏贈徐國太夫人是月始𦵏通及龎氏詔贈通太師尚書令諡武懿命昇王府諮議参軍張士遜具鹵簿皷吹䕶𦵏祥符之鄧公原皇后親臨遣奠上御製祭文置靈坐之右秋七月丁卯三司借内藏錢五十萬貫辛未徙知陳州馮拯知河南府兼西京留守司事代王嗣宗以嗣宗知陜州時帽妖興自西京嗣宗不得察故也壬申以星文示變赦天下流以下罪死罪減一等十惡致死故殺刼殺謀殺人官典枉法贓至死造妖惑衆者論如律在降官羈管十年以上者放還京朝官丁憂移任七年未改秩者以聞詔自今鏁㕔應舉人所在長吏先考藝業合格即聽取觧如至禮部不及格當停見任其前後考試官舉送長吏並重寘其罪甲戌以樞宻直學士刑部侍郎李士衡為三司使代馬元方也士衡以足疾表求門謝許之上作寛財利論賜士衡又出内藏錢二百萬貫以助經費士衡因請刻聖製于本㕔從之士衡方進用王欽若害之欲言而未有路㑹上論時文之弊欽若因言路振文人也然不識體上曰何也曰士衡父誅死而振為贈告乃曰世有顯人上頷之士衡以故不大用欽若沮士衡據蘇軾雜記附見路振卒於祥符七年十月去年九月李廸中對東門云云可參考丙子浚汴口己卯詔諸州帳籍自今簡停軍士每歲一造營房半歲一造職員馬遞鋪馬數每季一造時上封者言其繁冗紙墨所費或至掊斂故也癸未右正言劉曄言近者詔捕妖人許陳告酬賞亦慮所告之人妄覬重賞誣執平民按問之際願令詳審上曰比令紏告造妖者及吕夷簡推劾屢戒其審察無使枉濫果多不實即詔今日已前犯者更不問罪丁亥謁玉清昭應宫幸開寳寺靈感塔是夕彗没輔臣奉表稱賀八月庚寅朔謁景靈宫遂幸上清宫祥源觀㑹靈觀辛卯免青州原河口乾度課錢三陵副使郝昭信等請於永安縣建營徙軍士二指揮就糧從之乙未判三司都催欠慿由司左正言集賢校理宋綬言本司屢經恩赦除放欠負差官詳定内有事節未圓者凡六十八州軍共六百七十三萬貫石斤兩計三千二百餘人至今報應未備望令轉運司選官與長吏催欠官詳酌如合蠲免限半月聞奏從之於是皆獲蠲免焉皆獲蠲免據綬本傳丙申對輔臣于龍圗閣丁酉羣臣上表請立皇太子不允表三上許之先是知梧州衞尉寺丞陳執中上復古要道三篇上異而召之上時已屬疾春秋髙大臣莫敢言建儲者執中既至進演要三篇以蚤定天下根本為説翌日上以他疏示輔臣皆贊曰善上指其袖中曰更有善此者出之即演要也因召對便殿勞問久之尋擢為右正言執中恕之子也實録云執中得見于崇政殿其日甲寅在立太子後凡十日據本𫝊則執中既見逾月乃立太子不知孰是以事理推之本傳當得其實蓋羣臣因執中言始有建儲議見于崇政恐非所對也今從本𫝊執中附𫝊與正𫝊載所上演要亦小不同今從正𫝊疑正𫝊考據必詳審爾辛丑詔流内銓選人有累犯罪因衝替而獻文求試者不得進内壬寅新城内權都巡檢周仁美言地分巡檢軍士捕亡卒盜賊不獲皆有罰而獲者無賞今請獲亡卒一人賞錢二百賊一人錢五百從之仁美深州人辰澧鼎州都巡檢使張綸言下溪州刺史彭儒猛納先所略人口器甲等乞修貢如故詔賜儒猛錦袍銀帶令辰州通判劉中象召至明灘與㰱血為誓遣之癸卯詔前歲上聖號冊寳所賜酺今秋豐稔可追行之甲辰立昇王受益為皇太子改名禎大赦天下惟十惡刼殺謀殺故殺鬭殺盜官物偽造符印官典犯贓論如律宗室並加恩文武常參官子為父後見任官者賜勲一轉乙巳以翰林學士晁迥為冊立皇太子禮儀使命祕書監楊億撰皇太子冊文知制誥盛度書冊陳堯咨書寳丁未内出鄭景岫四時攝生論陳堯叟所集方一巻示輔臣上作序命刋板模印付閤門賜授任廣南臣僚仍分給諸道州軍戊申黎州山後兩林百蠻都王李阿善遣将軍卑熱等百五十人來貢己酉免潁濮二州浮客乾食鹽錢庚戌以右諫議大夫知開封府樂黄目為給事中兼太子左庶子昇王府諮議參軍吏部郎中直昭文館張士遜為右諫議大夫兼右庶子禮部郎中直史館崔遵度為吏部郎中直史館兼左諭徳記室參軍左正言直史館晏殊兼舍人賜金紫右正言魯宗道為户部員外郎兼右諭徳賜緋魚玉清昭應宫資善堂都監左藏庫使長州刺史入内押班周懐正為左騏驥使入内副都知兼管勾左右春坊事壬子彭王元儼加太傅為永清横海節度使進封通王以參知政事李廸兼太子賔客上初欲授廸太子太傅廸辭以太宗時未嘗立保傅乃止兼賔客而詔皇太子禮賔客如師傅有殿侍張廸者春坊祇候太子不欲其名與賔客同改名克一廸奏其事上喜以告輔臣以賀州團練使錢惟灝知和州惟灝占謝自陳和州去京太逺改命知漣水軍惟灝俶之子也詔中書門下五品尚書省御史臺四品諸司三品見皇太子並答拜自餘受拜癸丑上作元良箴賜皇太子又作詩分賜賔客而下甲寅楚王元佐加興元牧其雍州牧如故兼州府兩牧自元佐始徐國長公主進封福國邠國長公主進封建國宿國長公主進封鄂國乙卯給事中兼太子左庶子樂黄目責授左諫議大夫知荆南府西京左藏庫使㑹州刺史入内副都知張繼能責授西京作坊使罷禁職為邠寜環慶路鈐轄開封府判官虞部員外郎李直方監漣水軍税推官監察御史張及監髙郵軍税先是繼能主往來國信有國信司吏陳誠者頗巧㸃繼能欲援置羣牧司而誠先𨽻羣牧坐事停職至是羣牧吏左宗抉其宿負白制置使曺利用故誠不遂所求繼能怒宗之沮已宻遣親事卒偵宗㑹宗弟元喪妻宗嘗為假教駿軍校馬送𦵏及還元抵飲肆與酒保相毆繫府中而假馬事未發誠即白繼能請屬府并劾之黄目時知府受繼能屬獄未具為羣牧副使楊崇勲所發故黄目等並坐責繼能自陳不願外任得掌瑞聖園庚申殿中丞史瑩言准詔詣鄭州界經度畎索水入金水河止有役卒七千望發鄭州丁夫可一月功畢詔以軍士萬人給之無得擾民仍令右領軍衞大將軍梧州團練使魏榮為都大部署御史忠佐馬軍副都頭張榮副之辛酉詔皇太子月給錢二千貫禮儀院言至道中敕百官於皇太子稱名宫僚稱臣續准敕依皇太子所請宫僚止稱名詔如至道之制知祁州供備庫副使髙志寜請詣闕言邉事許之九月壬戌對於承明殿韓𤦺墓誌云志寜自祁州請覲及對宻奏今上徳業日新宜早建東宫真宗大寤靣賜黄金五十兩還所治仍詔志寧凡所奏事許附入内内侍省通進無闗銀臺司按志寧對承明日東宫已建矣今不取甲子右諫議大夫兼太子左庶子張士遜等言臣等日詣資善堂參見皇太子猶令升偕列拜然始跪受望令坐受參見不許乙丑占城國王尸哩排摩牒遣使羅皮帝加等以方物來貢羅皮帝加言國人詣廣州或風漂船至石堂則累歲不達矣明年使還賜其王銀四千七百兩并戎器鞍馬㑹要云四萬七千兩今從本𫝊蔡州團練使徳雍等請皇太子受拜不許丁卯御天安殿冊皇太子庚午詔舊制賜諸軍物外戌者減半今聽全給流内銓言自今注軍監判官請不兼通判常從不給軍士從之辛未令河南府葺王屋山陽臺觀給官田為常住時女道士王道真住是觀得玉璧于山中因請増葺故也壬申皇太子謁玉清昭應宫景靈宫癸酉謁太廟龍圗閣待制李虛已上奉詔編羣臣所和御製詩為明良集五百巻詔賜銀帛三司假内藏銀十萬兩丁丑詔三班使臣部送益州綱運至荆南無遺闕者自今每運賜錢十五千三司軍大將十千戊寅監察御史劉平請對于承明殿庚辰御正陽門觀酺自是凡五日上作稼穡倍登詩欹器戒酒二論示輔臣詔京城諸司當賽土地者不得用十月七日以是日本太宗誕辰故也河中府同耀州民飢多流亡遣度支判官侍御史周實馳驛存撫之壬午慶雲見于正陽門樓上右正言劉曄言今歲秋賦食祿之家鏁㕔應舉者頗衆望諭中外自今食祿家弟姪子孫若文藝必可程試者不得就資䕃其有官者不得與孤寒競進詔不許但令諸州精加考較甲申起居舍人吕夷簡為契丹國主生辰使供奉官閤門祇候曺琮副之工部郎中直史館陳堯佐為正旦使侍禁閤門祇候張君平副之琮彬幼子君平滏陽人君平管勾汴口嘗建言嵗開汴口當審擇其地則水湍駛而無留沙嵗可省疏浚工百餘萬詔用其策雖役不嵗興然其後浸有淤塞之患又請沿河縣令佐使臣能植榆柳至萬株者書歴為課汴中溺死無主名者敕所在收瘞悉施行之種榆柳書歴為課㑹要在天禧元年三月今從本𫝊并書于此祥源觀成觀宇凡六百一十三區以監修内臣東染院使鄧守恩為崇儀使是月京東路饒韶巴昌州荆門保安軍並言豐稔冬十月壬辰詔自今遣使檢逃戸災傷令三司以奏帳式付之開封府發觧官任布等請依南省例謄録進士試巻及進士試題御筆㸃定詔試題進入餘不許乙未雪上作瑞雪詩賜輔臣庚子詔近臣觀玉宸殿刈小香占城稻遂於安福殿賜宴賦詩壬寅召知益州樞宻直學士右諫議大夫王曙為給事中兼太子賔客職如故癸卯三司使李士衡等言准詔歲省文帳二分已上其在司王典亦合裁減詔令與三部衆官詳定具合留名目以聞既而取事簡人衆者出補三班辛亥河北縁邊安撫副使張昭逺言保州等處所種榆柳多匿亡命軍士亦嘗殺害守卒又縁邊寨柵多種此樹久亦不便望加採伐從之癸丑太常博士祕閣校理李埀請令江浙兩路放行茶貨左諫議大夫孫奭言茶法屢改非示信之道望遣官重定經久之制即詔奭與三司詳定務從寛簡時言者愈多不過欲惠小商優園戸朝廷亦嘗差優其直饒其給大抵吝茶之出而須錢實京師故法不能變言者但采浮論而不切於事理未幾奭出知河陽事遂止奭初自密州代還時方置天慶等節天下設齋醮張燕費廣奭又請裁省浮用不報奭復出其居朝廷蓋不周歲云十一月十九日奭出知河陽今并書樞密直學士王曙言自今轉運使副使提㸃刑獄朝臣使臣舉官望不許預先移牒報知免立私恩庶臻公道詔令别行條約㑹要十月事十一月己未翰林學士晁迥為承㫖時朝廷數舉大禮詔令每下多出迥手嘗夜召對上令内侍持御前炬燭送歸院他日曲宴宜聖殿内出牡丹百餘盤千葉者惟十餘葉以賜宰臣親王上顧迥與學士錢惟演亦皆賜焉壬戌詔諸州職田先以三月四月九月内到任為限過其月有閏者勿理己巳三司言陜西入中芻糧請依河北例每㪷束量増直計實錢給抄入京以見錢買之如願受茶質交引即依實錢數給之令𣙜貨務並依時價納緡錢支茶不得更用芻糧交抄貼給茶貨詔每入百千增五千茶與之餘從其請辛未召近臣觀太清樓書太宗墨蹟及御製遂賜宴上作詩從官畢和壬申斬威武軍副使都頭王成迮建坐訛言惑衆也迮建當檢迮字甲戌命翰林學士錢惟演盛度樞密直學士王曙龍圗閣待制李虛已李行簡於祕閣再考定開封府得解舉人試巻令祕閣校理王準封彌定為三等具名以聞乃詔從上解百五十人準質子也封彌此非事始書此為任布等得罪張本乙亥上作冬至宴親賢詩又出御製三教詩各百首歌論九首示宰相起居舍人吕夷簡言澶魏豐熟望出内藏錢二十萬貫市芻積糧從之辛巳迎道釋經赴三宫觀及都城寺院先是上令選藏教中精妙者凡五十八巻讎校摹印至是而畢癸未上作後苑宴宗親詩賜皇太子通王祕書丞朱正臣上言前通判廣州竊見蕃商多往交州貿市齎到黎字及砂蠟錢至州頗紊中國之法望自今犯者决配牢城隨行貨盡没入官詔廣南轉運使洎廣州覆議既而上言本州海路與交州占城相接蕃商乘舟多為海風所漂因至外國本非故往貨易欲望自今齎到黎字砂鑞等錢並沒入官其餘博易所得布帛取三分之一餘悉還之所犯人以違制失論詔可丙戌契丹遣使右衞上將軍耶律留寧副使翰林學士起居舍人知制誥吳叔達來賀承天節丁亥命翰林學士承㫖晁迥知制誥陳堯咨於秘閣再考國子監及太常寺别試進士文巻上其名詔國子監從上解二十人太常寺六人開封府國子監太常寺發解官皆坐薦舉不實責監諸州酒税屯田員外郎判度支勾院任布鄧州著作郎直集賢院徐奭洪州太子中允直集賢院麻温其池州度支判官太子中允直集賢院楊侃汝州太子中允直集賢院丁度齊州太常少卿直史館張復罰銅十斤初作祥源觀布論之既忤宰相及考試開封而奭潛發封巻視之遂與奭等俱責度祥符人也十二月己丑朔免涇原折變芻藁以穀不登也甲午詔如聞邠寜涇原州流民多往秦隴州故闗山及渭州山外鎮戎軍以來逐熟慮無知者誘略人口鬻於蕃界宜令所在州縣洎廵檢使臣察舉之丁酉周實言同耀邠寧涇原渭華虢隴州及河中府永樂虞鄉二縣旱歉望權格税物仍罷和糴從之實九月出使詔文武官自今承天節除子孫外自餘宗屬及已食祿者不得奏薦辛丑以河陽三城節度使張旻為武寧節度使同平章事旻遭䘮有詔起復於是自河陽來朝特加寵命尋出判陳州工部侍郎叅知政事張知白與宰相王欽若議論多相失因稱疾辭位丙午罷為刑部侍郎翰林侍讀學士知天雄軍上賦詩餞之輔臣以雜學士出藩并翰林侍讀學士外使皆自知白始宋敏求春明退朝録云祖宗時宰相罷免唯趙令得使相餘多本官歸班叅樞亦然天禧中張文節始以侍讀學士知南京天聖中王文康以資政殿學士知陜州自慶歴後解罷率皆得職焉將作監丞蔡齊為著作郎直集賢院故事第一人及第到任一年即召試齊自兖州通判徙濰州獻所為文乃得召試此據江休復雜誌當考癸丑契丹遣使左林牙工部尚書蕭留寧副使右諫議大夫馬貽謀來賀明年正旦甲寅詔文武官曾使契丹及接伴者自今戎使到闕除兩省給舍外並令於左掖門出入丙辰賜宣州學究徐晝出身晝上涇縣茶場利便嵗增課千萬故也禮儀院言儀制圖内言閤門通事舍人者今欲止名通事舍人從之咸平四年七月焦守節事當考
