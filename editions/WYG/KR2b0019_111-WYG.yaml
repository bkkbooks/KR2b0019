body:
  text: 續資治通鑑長編巻一百七宋李燾撰仁宗天聖七年春正月乙未契丹遣伊勒希巴左千牛衛上將軍耶律漢寜少府監劉湘來賀長寜節庚子命供奉官閤門祗候曹用和往滄徳州規度河隄壬寅三司言江淮發運使歲漕上供米六百萬石前詔權減五十萬今歲豐請復如舊詔更一年復之癸卯樞宻使曹利用罷以保平節度使守司空檢校太師兼侍中判鄧州初太后臨朝威震天下中人與貴戚稍能軒輊為禍福而利用以勲舊自居不卹也凡中降恩力持不予左右多怨太后亦嚴憚利用稱侍中而不名利用奏事簾前或以指爪擊帶鞓左右指以示太后曰利用在先帝時何敢爾耶太后頷之利用奏抑内降恩或屢却而復下則有僶俛從之者久之人測知其然或紿白太后曰䝉㤙得内降雖屢却于樞宻院今利用之家媪隂諾臣請其必可得矣下之而驗太后始疑其私頗銜怒内侍羅崇勲得罪太后使利用召崇勲戒敕之利用去崇勲冠幘詬斥良久崇勲恥恨㑹利用從子汭為趙州兵馬監押而州民趙徳崇詣闕告汭不法事奏上崇勲方侍自請往按治乃詔龍圖閣待制王博文監察御史崔暨與崇勲鞫汭于真定府即罷利用樞宻使制辭猶以利用累章請外為辭利用既受命請對不許而崇勲等窮探其獄獄具汭坐被酒衣黄衣令軍民王旻王元亨等八人呼萬歲且傅致汭辭云利用實教之上以問執政皆顧望未有對者張士遜進曰此獨不肖子為之利用大臣宜不知狀太后大怒將并逐士遜而王曽徐亦為利用解太后曰卿嘗言利用横肆今何解也曽曰利用恃㤙素驕臣每以理折之今加以大惡則非臣所知也太后意少釋丙辰貶利用為左千牛衛上將軍知隨州仍令供奉官陳崇吉御史臺驅使官趙崇諒乗驛伴送法寺議汭當斬王旻等亦抵死汭之母妻皆縁坐徒三年詔杖殺汭妻論如法决其母杖十五王旻杖脊配沙門島遇赦不還王元亨以䘮明編管旁州餘悉配廣南荆湖牢城知趙州及同判並謫監當本路轉運使提㸃刑獄特釋之給趙徳崇田五頃錢二百千先是館閣校勘彭乗嘗與釣魚故事上未得魚侍臣雖先得不敢舉竿及上得魚左右以紅絲網承之既而乗同列亦得魚欲舉竿者左右止之曰侍中未得魚學士竿未可舉也利用後得魚左右復以紅絲網承之利用弗禁乗出謂人曰曹公權位如此不以逼近自嫌而安于僣禮其能久乎無㡬何利用敗利用常辟太常博士夏人司馬池為羣牧判官池辭不就朝廷固授之利用委池括大臣所負馬價池曰令之不行由上犯之公負尚多不先輸何以趣他人利用驚曰吏紿我已輸矣亟命送官數日而諸負者皆入利用貶其黨畏罪從而毁短者甚衆池獨颺言稱利用之枉朝廷卒不問王陶談淵載曹瑋任守信二事今附見當考曹利用晚節福過災生剛愎驕傲人怨神怒天聖中姪閤門祇候汭為趙州都監嬖一婢室家不和逐出為民妻民居在䕶戎公署之北因壊垣不葺汭嘗出入其家尋舊好婢與其夫喧爭汭衣淺色襖子入其家民亦被酒因有山呼之事既奏至朝廷奏削匿于利用家數日因鎮定走馬任守信入奏述其事方究尋其削翌日罷利用樞宻使以節度使司空侍中判鄧州未行物論甚喧洶洶數日間逹于天聽章獻后垂簾臨朝中書奏事訖留輔臣以詢其事王沂公為昭文張鄧公集賢吕許公夏鄭公參預皆倉皇無以對鄭公越次而奏云利用悖逆只乞問士遜十年同在樞宻以利用舉而大拜士遜無一言辯但雨泣而已翌日再貶利用左監門衛將軍知隨州士遜罷相守刑部尚書知江寜府内侍押班任守信為定州路鈐轄一日習射于園中其左右惟見守信獨語云侍中何故至此退立數歩踣于地從者翼歸正寢風涎大作已不救矣先是守信天聖中為鎮定走馬承受時知定州曹瑋與大貂曹利用有隙㑹姪汭猖狂山呼于趙州奏入月餘未行瑋宻諷守信以邊事入奏白于章獻劉后遂貶利用而非命死于道後守信赴官定州經由趙之高邑縣道旁一墳庄詢之誰氏曰故曹侍中墳守信自此覺神色惨沮至定不旬日而疾作其年瑋亦薨謝戊午詔羣臣準詔舉官歲終不及其數者聽闕詔罪人配𨽻他州而妻子不願從者聽之二月庚申朔禮部侍郎參知政事魯宗道卒太后臨朝宗道屢有獻替太后問唐武后何如主對曰唐之罪人也㡬危社稷后默然時有上言請立劉氏七廟者太后以問輔臣衆不敢對宗道乃曰不可退謂同列曰若立劉氏七廟如嗣君何帝與太后將同幸慈孝寺欲以大安輦前帝行宗道曰婦人有三從在家從父嫁從夫夫歿從子太后命輦後乗輿執政多任子于館閣讀書宗道曰館閣育天下英才豈紈袴子弟得以恩澤處耶吾子誠㓜已任京官然終不使慁國恩曹利用恃權驕横宗道屢折之帝前自貴戚用事者莫不憚之時目為魚頭參政因其姓且言骨鯁如魚頭也在政府七年務裁抑僥倖不以名噐私于人疾劇帝幸其第臨問賜白金三千兩既卒皇太后臨奠之贈兵部尚書初太常議諡曰剛簡復改為簡肅議者以為肅不若剛為得其實也王子融作王曽言行録及百一篇毁短宗道殊甚然他書莫不稱宗道剛簡可畏恐子融所云或出私意耳今不盡取甲子同州觀察使知陳州李士衡為左龍武大將軍建州觀察使知衛州康繼英為右羽林大將軍並分司西京士衡曹利用妻父繼英亦利用姻家也詔擇文臣歴邊任而有材武及嘗為近臣舉充右職者并武臣之子孫在朝而有節義者與換官三路任使乙丑詔諸路當職官吏或以職田俸粟及草濫估中官易致敗腐自今犯者以違制論所入並没官募告者賞之丙寅禮部尚書平章事張士遜為刑部尚書知江陵府士遜得宰相曹利用之力也利用長樞宻慿寵自恣士遜居其間未嘗有是非之言時人目之為和皷利用得罪士遜又營救之利用既斥士遜隨亦罷上以士遜東宫舊臣故加秩而遣之辭日又解通犀帶賜焉户部侍郎參知政事吕夷簡以本官平章事始王曽薦夷簡可相乆不用士遜將免曽因對言太后不相夷簡以臣度聖意不欲其班樞宻使張耆上爾耆一赤脚健兒豈容妨賢至此太后曰吾無此意行用之矣于是卒相夷簡以代士遜此據魏泰雜記然泰所云請即宣召學士草麻則恐不然蓋張知白死曽薦夷簡不用而用士遜及士遜將罷曽復薦夷簡太后因用之何必如是匆促且不類曽平日舉動故不取也詔羣牧制置使自今不得舉判官須朝廷差人丁卯以樞宻副使給事中夏竦為參知政事翰林學士兼龍圖閣學士右諫議大夫權知開封府陳堯佐為樞宻副使龍圖閣學士右諫議大夫權三司使事薛奎為參知政事奎入謝上諭奎曰先帝嘗以卿為可任今用卿先帝意也御史中丞兼刑部侍郎晏殊為兵部侍郎資政殿學士翰林侍讀學士兼祕書監故事當賜襲衣金帶鞍勒馬上曰殊嘗輔政賜宜有異特以繡韉寵之戊辰翰林學士章得象權發遣開封府事時命龍圖閣待制王博文代陳堯佐而博文按真定獄猶未還也得象在開封府才二十七日性仁柔懼有寃濫命僧就第設七晝夜道場以禳之初曹利用領景靈宫使令樞宻主事蘇藏用令史趙兼素中書堂後官孟昱主宫中公使錢而利用嘗私貸錢未還法寺定利用為首當除名藏用等為從應徒二年半詔藏用兼素昱並勒停利用同時坐數罪而貸官錢法尤重癸酉再貶利用為崇信節度副使房州安置仍命内侍楊懐敏䕶送之别選官知房州及監押巡檢利用四子各奪兩官没所賜第籍其家貲利用弟左侍禁閤門祇候利渉前為趙州都監强市邸店役軍士治第利渉時在京師亦詔劾于開封府法當奪三官勒停詔特除名編管既而趙州又言利涉嘗盜官物遂决杖二十利用舅太子中舎致仕韓君素居棣州頗恃勢放息錢侵民又私醖酒其家特除名配沂州編管殿直田務成為利用主家事嘗因事受賕崇儀副使田承說又以書抵務成妄言錢惟演有章營解利用務成坐􅂍追兩官勒停仍編管承說亦贖銅七斤有司籍利用家貲得水晶盃盤十副賈人不能言其直曰此非人間所常有也有老估人識之曰噫此物官有舊價矣又何估焉吏詰之曰此丁侍中故物也侍中敗官籍其家貲吾蓋嘗估之吏閲視舊牘果如所言甲戌以户部副使度支貟外郎王騣為司封貟外郎知潮州羣牧判官太常丞韓琚同判濠州太子中允集賢校理李丕諒落職同判和州騣利用同里人相厚善琚利用所薦丕諒士衡子即其妻兄故皆絀之通判許州陽翟祕書丞程勘利用女壻也亦坐降通判蘄州程勘事據本傳實録不書也又以西上閤門使曹琮為河陽都監淮南江浙荆湖制置發運使六宅使康州刺史劉承顔知處州知瀛州禮賓使魏正為杭州都監皆利用所親厚者琮瑋之弟也時朝廷以利用嘗所薦擢者多領兵守邊欲悉罷去之殿中侍御史鞠詠請一切毋治以安反側詔從詠言曹侍中利用因姪汭聚無頼不軌獄既具有司欲盡劾交結利用者時憸人幸其便隂以文武四十餘人諷之俾深治仁宗察之急出手詔其文武臣僚内有先曽與曹利用交涉往還曽被薦舉嘗親暱之人並不得節外根問其中雖有渉汭之事者恐或詿誤亦不得深行鍜錬其仁卹至此是年聖算方二十此僧文瑩所録也其事不見于實録正史然鞠詠請勿治利用所薦擢領兵者不知其從違按此則詠言必從矣今但借此用記詠言仍削而不著乙亥召工部侍郎知永興軍王曙為御史中丞詔以朝廷事簡中書樞宻院聽午後五刻出甲申捧日天武四廂都指揮使鄭守忠等請如殿前都指揮使例從皇太后駕出從之守忠陳留人也此叚當考不然削去乙酉賑河北沿邊水災饑民州縣有不任職者轉運使亟選所部官代之河北轉運使言自河平以來澶州諸埽未嘗完築恐盛夏益復漲溢請募民入中芻糧以備緩急詔可閏二月辛卯詔近臣除居第外毋得於京師廣置物業宦者多惡曹利用必欲置之死楊懐敏䕶送利用行至襄陽驛懐敏不肯前且以語逼之利用素剛遂自經死懐敏乃奏利用暴卒始契丹深入冦朝廷方厭兵苐憂盟不就顧於聘賂無所愛而利用以小官奉使敢任大事力勒其數於國有勞既富貴負恃以為己功性又悍梗少通力裁僥倖而其親舊亦有因縁以進者故及於禍然其在朝廷忠藎有守始終不為屈柔死非其罪天下寃之後其家請居鄧州上惻然從之且命利用子内殿崇班淵監本州稅曹淵監鄧州稅恐自有時當考景祐二年四月始聽利用諸子還京師十月以舊第四之一還利用子孫癸巳詔河北經水州軍募人入粟以濟貧民乙未詔河北河東沿邊及廣南東西路自今幕職州縣官初改京朝官者並以為福建路知縣當考丙申以左藏庫使滄州鈐轄閻文應兼雄霸沿界河同巡檢河北屯田司事仍許每歲以秋冬入奏丁酉詔曹利渉田産非强市者悉還之甲辰詔文臣換右職者聽任子弟為文資揚州召伯閘成賜發運使鍾離瑾敕書奬諭初監楚州稅王乙請自召伯埭東至𤓰歩濬河一百二十里以廢二堰下發運使規度而瑾言功大不可就止置閘召伯埭旁既成公私利之乙巳供奉官王仁旭為閤門祇候仁旭馬軍都指揮使夏守贇女壻守贇以乾元節任子恩授之仍詔毋得援例戊申上謂輔臣曰比建慈孝寺蓋以薦福先帝及太一宫為民祈禳幸已畢功自今京城惟倉庫營房官舎敝壊者修完之餘無得擅興力役因下詔諭中外時都人厭土木之勞及詔下咸喜壬子詔曰朕開數路以詳延天下之士而制舉獨久置不設意吾豪傑或以故見遺也其復置此科于是稍増損舊名曰賢良方正能直言極諫科博通墳典明于教化科才識兼茂明於體用科詳明吏理可使從政科識洞韜略運籌决勝科軍謀宏逺材任邊寄科凡六以待京朝官之被舉及應選者又置書判㧞萃科以待選人之應書者又置高蹈丘園科沉淪草澤科茂材異等科以待布衣之被舉及應書者又置武舉以待方略智勇之士其法皆先上藝業於有司有司較之然後試秘閣中格然後天子親策之若武舉則仍閱其騎射焉初盛度建言於真宗請設四科以取士曰經術之士若典刑備舉則政教流行請設博通墳典達於教化科堯試臣以事不直以言語筆札求人審官期於適用請設才識兼茂明于體用科今戎警未除調邊勞戍必資良帥以集事功請設軍謀宏逺堪任將帥科獄事之繁民命所繫若推按失實則枉情傷生請設明曉法律能按章覆問科景徳二年遂置六科蓋縁度之議也時度方責洪州宻詔度撰策自馳驛以進及議封禪吏部科目皆廢夏竦既執政建請復制舉廣置科目以收遺才上從之更采度前議而降是詔度本傳云初度謫洪州建議賢良方正科宻詔度撰䇿目以進度又請建六科既而用夏竦議置六科其議亦是度始按賢良方正科自乾徳二年始復置是年頴贄應詔四年姜渉應詔咸平四年又置是年查道王曉陳茂等應詔真宗親策何亮孫暨孫僅丁遜等而度謫洪州乃景徳元年閏九月然則傳所稱度請復賢良方正科誤矣蓋賢良方正科其復已久度更欲廣其科目而景徳二年所置六科實用度議故度雖在謫所真宗猶令度撰策目以進也及仁宗用夏竦議更置六科其科目尚多取度所言者故傳云其議亦自度始今稍刪潤使不相抵牾癸丑置理檢使以御史中丞為之其登聞檢院匭函改為檢匣如指陳軍國大事時政得失並投檢匣令畫時進入常事五日一進其稱寃濫枉屈而檢院皷院不為進者並許指理檢使審問以聞時上封者言自至道三年廢理檢院而朝廷得失天下寃枉浸不能自達㑹上讀唐史見匭函故事與近臣言之夏竦因請復置使領上從其議乙卯始命御史中丞王曙兼理檢使淳化三年五月置理檢院至道三年十一月乙酉廢大理寺言比部員外郎夏侯彧等一十一人並嘗保薦曹利涉而利涉所入差遣毎縁利用陳乞難坐薦者之罪上曰所薦如此其人亦可知矣當薄懲之乃詔各罰銅三十斤詔中書門下凡左右近臣有子弟族姻仕於諸道州府者令轉運使副及長吏等謹察其臧否無得曲庇之㑹要閏二月詔實録無之三月庚申朔詔龍圖閣待制以上自今非任要劇毋得奏異姓親辛酉以右班殿直何九齡為貝州兵馬監押管勾河北東西路屯田隄道九齡父承矩實興屯田為扞邊之利特命領之癸亥詔如聞京城諸倉所納軍糧多槩量過數以故綱吏積欠或破産不能償官綱吏亦有與諸倉為弊槩量不足乃減刻軍食以補之其令提㸃倉場官與㸃檢斗面使臣躬親閲視自今界中有羡數監官更不理為勞績先是諸倉所支多從減刻計所收羡數以圖恩賞故條約之又諸倉納糧綱槩量不實操舟者坐亡失所載或杖脊徙重役殿中侍御史陳琰始奏選官監視謂之定斗面至今行之定㪷面據陳琰新傳附見至今行之蓋指元豐間也三司使冦瑊繩下急漕數不足綱吏卒率論以自盜勾當東排岸司符惟忠爭曰在法欠不滿四百石者不坐若以自盜論則計直八百即當坐徒矣瑊怒曰敢抗三司使耶惟忠曰職有當辯非抗也瑊益怒惟忠爭愈力如所議乃己惟忠彦卿曽孫也此事附見乙丑詔吏受賕自今毋用䕃時三司吏毋士安坐受賕法應徒而用祖縣令䕃以贖論特决杖勒停而降是詔丙寅詔諸州公用供帳之物毋得假借於民其故弊者聽以不係官頭子錢更製從御史中丞王曙之請也癸酉范雍丁母憂起復甲戍詔廣南福建幕職州縣官赴所任如川峽例給以館券屯田郎中李璹言渝州當二江之險綱船至者比為風濤所溺其失官物三二分者法當備償全綱失者反不坐以故舟人不敢救而船歲溺者不可勝數請自今若失全綱舟人皆杖一百主吏遞降一等其官物判為三分須償一分如救及分而無侵欺者釋其罪從之戊寅上謂輔臣曰王欽若乆在政府察其所為真奸邪也王曽曰欽若與丁謂林特陳彭年劉承珪時號為五鬼其奸邪險詖之迹誠如聖諭賜畿内治溝洫役卒緡錢祠部員外郎祕閣校理陳詁知祥符縣治嚴急吏欲動朝廷使罪詁乃空一縣逃去太后果怒而詁妻宰相吕夷簡妹也執政以嫌不敢辨事下樞宻院副使陳堯佐獨曰罪詁則奸吏得計後誰敢復繩吏者詁由是獲免徙知開封縣詁辭乃命權判吏部南曹庚辰詔自今召試人令學士舎人院試詩賦如舊制以近歲所試論䇿其文汗漫難考也天禧元年九月可考命西染院使盧鑑徃陜西縁邊計置糧草河北轉運使言契丹歲大饑民流過界河上謂輔臣曰雖境外皆吾赤子也可不賑救之乃詔轉運司分送唐鄧襄汝州處以閑田所過州縣給食人二升審官院請京官到院各具所欲入路分状一本願入逺及折資者聽凡經再問闕不就即依名次硬差丁憂服闋及自不般家處代還許至三問從之壬午上謂監修國史王曽曰先朝美政甚多可諭史官詳載之因言兩漢書文辭温雅唐書殆不能及也王曽退相謂曰上日省四方封奏間閲經史見前代述作之體且善評之自昔好文之主亦未嘗留意及此癸未詔百官轉對極言時政闕失如舊儀在外者實封以聞既而謂輔臣曰所下詔宜増朋黨之戒景徳三年四月詔羣臣轉對不知何時罷今又復之王偁東都事略詔曰國家設制䇿之科將博詢於鯁議有能規朕躬之過失陳宰相之闕遺紏中外之姦囬斥左右之朋比述未明之機事貢無隱之宻謀以至䑓省之官阿私而罔上郡國之吏專恣以濫刑或通受貨財潜行請託或恃憑權勢敢事貪殘並許極言朕當親覽其令百官遇起居日轉對在外臣僚亦許具實封以聞羣牧判官龎籍因轉對言舊制不以國馬假臣下重武備也樞宻院以帶甲馬二借内侍楊懐敏羣牧覆奏乃賜一馬三日而復借之數日而復罷樞宻掌機命反覆如此平時百官奏事上前不自批章止得送中書樞宻院蓋防偏請以啓倖門近歲傳宣内降寖多於舊臣恐法度自是隳也徃者王世融以公主子毆府吏法當贖金特停任近作坊料物庫主吏宫掖之親盗三物輙自逃三司捕未獲遽罷追究今日聖斷乃異於昔臣竊惑焉又祥符令檢吏稍嚴胥吏相率空縣而去令坐罷免若是姑息者獲安而清强者沮矣籍武城人也如羣牧判官闕以内降求之者凡十數人執政患之相與謀曰得孤寒中有聲望才節可服人者與之則中㫖可塞矣乃以籍姓名進詔遂用籍羣牧判官司馬池因轉對言唐制門下省詔書出有不便者得以封還今門下雖有封駮之名而詔書一切自中書下非所以防過舉也内侍皇甫繼明等三人給事太后閤兼領估馬自言估馬有羡利乞遷官事下羣牧司閲實無羡利繼眀方用事自制置使以下皆欲附㑹為奏池獨不可吏拜曰三中貴人不可忤也池不聽繼明等怒甚㑹除開封推官敕至閤門為繼明黨所沮罷乃以屯田貟外郎出知耀州池轉對附此出知耀州當考其時甲申上封者言天下茶鹽課虧請更議其法帝以問三司使冦瑊瑊曰議者未知其要爾河北入中兵食皆仰給於商旅若官盡其利則商旅不行而邊民困於餽運矣法豈可數更帝然之因謂輔臣曰茶鹽民所食而强設法以禁之致犯法者衆但縁費甚廣未能施之又安可數更其法也泰州鹽課虧緡錢數十萬事連十一州詔殿中丞張奎徃按之還奏三司發鈔稽緩非諸州罪因言鹽法所以足軍費非仁政所宜行若不得已令商人轉貿流通獨關市收其征則上下皆利孰與設重禁壅閼之為民病有詔悉除所負奎臨濮人全義七世孫也奎事不得其時附茶鹽課虧復當考増置潭州同判一員從太常少卿李若谷請也詔廣西轉運司選曽親民政諳練邊事强幹使臣知融州丙戍遣官祈晴上謂輔臣曰昨令視四郊而麥已損腐民何望焉此必政事未當天心也古者大辟外州三覆奏京師五覆奏蓋重人命如此其戒有司審獄議罪毋或枉濫又曰赦不欲數然捨是無以召和氣夏四月庚寅赦天下免河北被水民賦租京師自三月朔雨不止前赦一夕而霽辛卯遣官謝晴殿中侍御史張逸言庚寅赦書十惡與四殺連文並為己殺人者不赦然則十惡非殺人者亦得赦矣恐非詔意請明示有司遂詔十惡罪無輕重皆不赦壬辰置石州定胡縣兵馬監押一員三司發運使言黄河挽舟卒不習湍險多溺死詔中書召三司使議之乃於河隂募置水軍二千人乙未置萊州萊陽縣采金場己亥契丹遣興國節度使耶律衮大理少卿張震來賀乾元節庚子詔天下稅務毋得瀆壊商人物帛初内出蜀羅一匹為印朱漬壊者數重故條約之己酉貝州言民之析居者例皆加税謂之罰稅惟其家長得免清河清陽厯亭三縣户罰絲五分鹽五升錢五十武城縣復増錢五十漳南縣又増蜀黍八升而他州悉無此例請除之詔可李公藴之子徳政自稱權知安南靜海軍留後事遣使來告哀辛亥贈公藴侍中南越王命廣南西路轉運使王惟正為祭奠使又為賜官告使除徳政檢校太尉靜海軍節度使南安都䕶交趾郡王乙卯開封府推官屯田員外郎李昭述知常州昭述宗諤子也嘗為曹利用所薦故出之丙辰詔鄧州賜契丹歸明人李美田十頃美自言舊籍邢州之内邱祖紹温陷契丹距今八十年比歲因饑挈族來歸祖莊尚在且有祖永安侍中告身四通嘗訴於縣而村保房從莫肯認者乃詔賜田於鄧州仍令長吏善撫之詔進奏院自今諸道州府更有附遞到三班使臣幕職州縣官等實封奏章並令收接進納
