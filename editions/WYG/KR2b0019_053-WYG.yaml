body:
  text: 續資治通鑑長編巻四十九宋李燾撰眞宗咸平四年六月辛丑朔詔以近畿數郡春雪損桑令京朝官分徃察視蠲其正税其縁科等物無令折納絲帛壬寅命知制誥梁顥薛映共詳中外章疏癸夘太常丞直集賢院梅詢上言邇者朝廷遣使减省天下冗吏今三司摠括諸路計省十九萬五千八百二人惜費養民足資治本請付史館從之己酉殿中丞直史館樂黄目上言曰從政之源州縣為急親民之任牧宰為先今朝官以數任至知州簿尉以兩任入縣令雖功過易見而能否難明臣欲望自今審官院差知州銓曹注縣令候各及三二十人一次引見依唐開元二年故事於御前試時務策一道察言觀行取其才識明於吏理逹於教化者充選其有不分曲直罔辨是非者或黜之釐務或退守舊資如此則官得其人事無不治矣上頗嘉其好古然不果行黄目史子也庚戌上溪州刺史彭文慶等來貢方物先是京朝官授逺地及縁邊知州通判朝辭日許升殿時多有以細務干聽覽者壬子始令奏聽朝㫖得報乃許升殿癸丑以兵部郎中史館修撰韓援為秘書少監知洛陽縣援擢置史館才數月自以年廹遲暮乞知西京赤縣為歸休之計上憐而許焉甲寅詔諸路轉運使副自今薦舉官屬當歴任無贓私罪及條其績効以聞異時擢用不如舉狀者連坐之丁巳詔東川民田先為江水所汎者除其賦從王欽若之請也初黄州境二虎鬭其一死食之殆半羣鷄夜鳴經月不止仲冬震雷暴作知州刑部郎中王禹偁手䟽言之且引史記天官書洪範五行傳為證上亟命中使乗驛勞問醮禳之又詢於日官言守土者當其咎上惜禹偁才名即命徙知蘄州至未逾月卒戊午訃聞上甚嗟悼之厚賻其家賜一子出身禹偁詞學敏贍時所推重丰裁峻厲以直躬行道為己任遇事敢言雖履危困封奏無輟嘗云吾若生元和時從事於李絳崔羣間斯無媿矣又為文著書師慕古昔多渉規諷以是不容於流俗故累登文翰之職尋即罷去焉庚申上謂輔臣曰軍國之事無鉅細必與卿等議之朕未嘗專斷卿等各宜無隱以副朕意也壬戌停修江州廬山太平興國觀常州張公山洞靈觀以旱故也丙寅對兵部尚書張齊賢于崇政殿凡數刻丁卯詔諸路州縣有學校聚徒講誦之所並賜九經戊辰出陣圖示宰相上曰北戎冦邊常遣精悍為前鋒若扞禦不及即有侵軼之患今盛選驍将統領别為一隊遏其奔衝彼既挫鋭而退餘則望風不敢進矣敵又好遣騎兵出陣後斷糧道可别選將領數萬騎殿後以備之初田錫知泰州幾三年不得代錫乃上章自陳即詔歸闕屢召對言事嘗奏曰陛下治天下以何道臣願以皇王之道治之舊有御覽但記分門事類臣願抄略四部别為御覽三百六十巻萬幾之暇日覽一巻又采經史要切之言為御屏風十巻寘扆坐之側則治亂興衰之事常在目矣上善其言詔史館以羣書借之仍免其集賢校讎之職每成數巻即先進内錫言臣所撰書每五日具草一巻檢討舛互冩為淨藁已七八日大率十年絶筆臣慮朝廷俾臣涖事或委一郡授一職不若使臣常以皇王之道致主於堯舜也陛下春秋鼎盛好古不倦若師皇王之道日新厥德十年之内必致太平臣雖衰邁得見其時私幸足矣即先上御覽三十巻御屏風五巻手詔褒荅之按田錫集五月八日召對請修書二十六日進草藁降詔奨諭不得其時今附見六月末秋七月庚午朔詔河朔餽運勞民斯甚今轉運使差減徭役勿致流徙壬申丹流眉國主多預機遣使打古馬副使打臘判官劄皮泥等九人來貢方物其國東北距廣州百三十五程自是始通也甲戌以左侍禁閤門祗候焦守節為閤門通事舎人故事閤門無通事舍人通事舍人𨽻中書省其長一人判四方館謂之館老如抽赴閤門祗應者則兼稱閤門祗候今直授閤門通事舍人始更舊制矣天禧二年十二月可考丙子封劔州梓潼神濟順王為英顯王初王均反王師攻成都忽有人登梯衝呼曰梓潼神遣我來九月二十日城陷爾輩悉當夷戮賊衆射之倐忽不見果及期而克於是守臣以其狀聞故有是命己夘邉臣言契丹謀入冦以山南東道節度使同平章事王顯為鎮定髙陽闗三路都部署天平節度使馬歩軍都虞候王超為副都部署殿前副都指揮使保靜節度使王漢忠為都排陣使殿前都虞候雲州觀察使王繼忠為都鈐轄西上閤門使韓崇訓為鈐轄顯仍兼定州超鎮州漢忠髙陽闗都部署庚辰詔王顯領河北都轉運使王超副之王繼忠韓崇訓同其事超初赴行營顯候于郊外超下馬望拜上聞之以為將帥有讓甚嘉焉乙酉申命諸州禁競渡令太常禮院定禡祭儀付王顯等戊子知審刑院趙安仁判大理寺韓國華議刑失中命户部侍郎張雍知制誥梁顥代之甲午契丹主子耶律隆慶下内四友班首兼北宫都博田鳳容及其弟從夀來降補鳳容為三班奉職恩賜有差戊戌斬三司軍將趙永昌永昌素凶狠無行督運江南所為多不法知饒州韓昌齡亷得其贓狀及違禁事移於轉運使馮亮坐决杖停職遂撾登聞鼓訟昌齡與亮訕謗朝政仍偽刻印作亮等求觧之狀詔下御史臺鞫問上察其詐引於便殿臨訊之仍召前饒州録事叅軍楊傑證其事永昌屈服遂戮之釋亮不問而昌齡以他過貶郢州團練副使中外之人仰上明斷罔不相賀韓昌齡楊傑未見己亥以㑹州刺史伽裕勒為保順郎将蘓家族齊都爾齊白馬族宻香威伊特族多香並為安化郎將詔淄青齊州及河北經蕃冦蹂踐處貢舉人許免取觧先是江浙荆湖廣南逺地應强盗及持仗不死者并部其屬至京師多殞於道路是月詔自今止决杖黥面配所在五百里外本城八月庚子朔蠲陵州崇楊等六井逋鹽三萬四千斤李繼遷遣其牙將來貢馬猶稱所賜姓名然抄刼邉部益甚上以邉臣玩冦朔方餉道愈艱辛丑命兵部尚書張齊賢為涇原儀渭邠寧鄜延保安鎮戎清逺等州軍安撫經略使知制誥梁顥副之即日馳騎而徃齊賢本傳云清逺軍䧟乃命齊賢出使盖誤矣賊䧟清逺在九月二日此時未也石隰州副都部署唐州刺史王杲受詔部軍儲赴河西逗撓不進壬寅責授千牛衛將軍丙午大風上遣健歩於近郊取禾穗視之皆無所傷實録載是日蠲潭州民所負牛租已並書在三年李允則被奨語時今不復出戊申上出環慶清逺軍至靈州地圖指示輔臣曰一昨戎人所掠部族邉臣奏不以實又指靈州西榆林大定曰戎人多據此路慿髙以瞰王師盖恃夐逺難於追襲復指天澗路曰楊瓊嘗言此路徃靈州險而有水可保無患然將帥顧方略如何耳又曰邉臣奏糧儲芻粟大有備呂䝉正曰國家貿易商貲以實邉農人不擾而西鄙足用盖上策也己酉復親試制舉人得成安縣主簿丁遜舒州團練推官孫僅入第四等並為光禄寺丞直集賢院秘書丞何亮懐州防禦推官孫暨入第四次等以亮為太常博士暨為光禄寺丞遜湖州人也遜湖州人據登科記壬子上觀稼北郊宴射於含芳園都人望見乗輿抃躍稱萬嵗呂䝉正曰車駕逰幸百姓歡呼如此物情不可强致盖陛下臨御五年務行仁䘏所以中外感悦上曰下民但不擾之自然快樂䝉正又曰今秋大稔太平無事時和年豐即為上瑞上曰朕以邉事未寧勞民供饋盖不獲已也茍能選將練兵驅攘戎冦使不敢侵掠則近邉之民亦獲安泰矣咸平初太常丞陳堯佐為開封府推官坐言事切直貶潮州通判潮去京七千里民俗鄙陋堯佐至州修孔子廟作韓愈祠堂率其民之秀者使就學時張氏子年十六與其母濯於惡溪為魚所噬堯佐以謂昔韓愈患鱷之害以文投溪中而鱷為逺去今復害人不可不除卒使捕得更為文鳴鼓於市而戮之潮人以比韓愈三嵗召還獻詩數百篇大臣亦稱其文學於是命直史館歐陽修墓碑云堯佐貶潮其所言事盖人臣所難言者不知何事當考據堯佐集戊戌冬貶潮州戊戌咸平元年也甲寅御史中丞趙昌言奏近者審刑院大理寺斷事乖當其主判既已罷絀詳斷官亦宜别加慎擇自今復然者請嚴示懲罰授以逺官又天下大辟斷訖皆録欵聞奏付刑部詳覆用刑乖當者並加按劾惟開封府未嘗奏案或斷獄有失止罪原勘官吏而知府判官推官檢法官皆不及責則何以辨明枉濫表則方夏望自今如外州例施行從之昌言又請凡有罪被問不即引伏者許令追攝詔先以聞己未直史館劉䝉叟獻宋都賦述國家受命建號之地宜建都立祖宗之廟上嘉納焉命史館檢討故事以聞甲子職方員外郎秘閣校理丹陽吳淑上言諸路所納閏年圖當在職方收掌近者並納儀鸞司伏以天下山川險要皆王室之秘奥國家之急務故周禮職方氏掌天下圖籍又詔土訓以夾王車漢祖入關中蕭何獨收秦圖籍由是周知險要豈可忽而不顧哉請令以今閏所納圗並上職方又州郡地理犬牙相入向者獨畫一州地形則何以傅合他郡望令諸路轉運使每十年各畫本路圗一上職方所冀天下險要不窺牗而可知九州輪廣如指掌而斯在從之丙寅李繼遷率衆攻清逺軍知軍劉隱監押丁賛等分兵拒守隱賛俱未見上以巴蜀遐逺時有冦盗丁卯命户部員外郎直史館曽致堯太常博士王朂供備庫使潘惟吉通事舍人焦守節分徃川峽諸州提舉軍器察官吏之能否致堯誤留詔書於家惟吉教致堯上言渡吉栢江舟破亡之以自解致堯曰為臣而欺其君吾不忍為也乃上書自劾釋不問其後惟吉入見禁中道蜀事具言致堯所以自劾者上嗟嘆久之惟吉美弟之子也王朂未見王鞏雜記云潘惟吉乃周世宗子太祖不殺令美養之此事甚美當考詳附載是月陜西轉運使劉綜請於浦洛河建城為軍上曰比亦有獻此議者然既立城郭又須屯兵屯兵不多冦來不可出戰止於閉壁自守則軍城之立未見其利也宰臣呂䝉正曰聖慮所及深得理要願罷其請從之三司置拘收司以判磨勘司官兼領之九月己巳朔詔鎮定兵馬分屯近地以省糧運時課者言敵猶在炭山未遽南牧故也知封駁司陳恕請鑄本司印詔如有封駁事取門下省印用之因遂改知封駁司為兼門下封駁事庚午清逺軍都監叚義踰城叛降于李繼遷叚義未見癸酉環州言蕃族威布等先為李繼遷所掠今徙帳來歸詔給近地閑田處之慶州言地再震太子中舍張宗誨獻屯田論三篇召試舎人院賜進士及第宗誨齊賢子也先是上遣使諭㫖於靈環清逺十州軍駐泊副都部署鄜州觀察使楊瓊曰賊若冦清逺及青崗白馬寨即合軍與戰於是繼遷頓積石河長圍清逺清逺屢走間使詣瓊請濟師瓊將悉出兵為援鈐轄内園使馮守規都監崇儀使太原張繼能曰敵近重兵在前則後無以繼不可畢徃乃止命副部署海州團練使潘璘都監西京左藏庫副使劉文質率六千人赴之且曰伺我之繼至瓊頓慶州逗留不行乙亥繼遷親鼓其衆攻清逺南門其子阿伊克攻北門堙壕橋以進城遂䧟時瓊又遣鈐轄尚食使嚴州刺史李讓李讓未見領精卒六百人赴之已不及矣賊踰支子平泊清崗城下瓊與守規繼能始出師其行甚緩及聞清逺䧟益怯賊進至望梅原知環州西京左藏庫副使順州刺史王懷普懷普未見廵青崗寨謂瓊曰此寨水泉逺不可多屯師師少即不可守願棄之瓊等相與合謀焚糧廪芻積兵仗驅寨中老幼以出瓊即退師保洪德寨賊勢浸盛未嘗與交鋒也清逺軍䧟是此月七日其它皆附見盖不得其的日故也或言永興軍副部署齊州團練使濮人錢守俊老病不任職壬午召為左領軍衛大將軍以國子監校勘官前知永年縣劉士元為大理寺丞南宫侍教南宫北宅有侍教自此始本志云大中祥符二年又有侍教之名按劉士元已見於咸平四年九月矣本志或誤也大中祥符二年二月乂命李頌時大雅為南北宅侍教非事始矣劉士元未詳邑里丙戌翰林學士承㫖宋白等上新修續通典二百巻詔付秘閣仍賜宴以勞之賜器幣有差其書重複猥穰大為時論所非卒不傳布上尋欲改作亦弗果也先是詔國子祭酒邢昺等校訂周禮儀禮公羊榖梁傳正義丁亥昺等上其書凡一百六十五巻命模印頒行賜宴國子監並加階勲於是九經䟽義悉具矣江南轉運使馮亮言舊敇犯銅禁者七斤而上並處極法奏取勑裁多䝉减斷然待報踰時頗成淹緩請别定刑名以為永制詔自今滿五十斤以上奏裁餘遞减之戊子以除名人胡旦為通州團練副使旦自流所遇赦至闕下頗不檢慎故授以冗秩己丑知寧州石熙政上言昨清逺軍失守盖朝廷素不留意因請授兵三五萬上曰西北邉事朕何嘗一日忘之今熙政所言盖外任不知耳宜賜詔奬其敢言知樞宻院事周瑩等曰陛下求理從諫憂邉䘏民之心雖童穉亦當知之至於城壘失守乃將帥非才耳熙政豈得如此悖慢上曰儻罪之則人誰敢言矣庚寅詔陜西民家出一丁號保毅軍給資糧與正兵分戍守城壘遣御史吳蒨與轉運使同主其事凡六萬入千七百九十五人其縁邉軍士先選中者並升為禁軍號保㨗咸平元年初置秦州極邉保毅事見年末吳蒨奏所得保毅數實録在明年正月己酉今并書辛夘麟府卓羅副部署曹璨率熟户兵邀擊李繼遷輜重於唐龍鎮西栁撥川殺獲甚衆生擒其大校四人冬十月己亥朔上謂呂䝉正等曰選衆求材誠非易事朕常孜孜詢訪冀有所得向來於軍校中超擢八九人委以方面其間王能魏能頗甚宣力陳興張禹珪亦稱有聞䝉正等曰才難求備今㧞十得五有以見陛下知臣之明也王能定陶人時知靜戎軍魏能時知威虜軍陳興衛南人時為石隰州部署禹珪嘗歴洺瀛霸三州兼鈐轄鐸之子也禹珪今任考之弗得因具載所歴更須檢詳耳上語近臣曰近者慶州地再震昨司天奏熒惑犯輿鬼秦分野當有災宜戒邉將以靜鎮之且上天垂象示戒惟慮不知今既知之可不恐懼修省知樞宻院王繼英曰妖不勝德上曰朕何德可恃同知樞宻院陳堯叟曰天文謫見實欲昭示時君楚莊王懼無災政恐其獲罪于天弗容自警耳今陛下克已愛民常慮一物失所河防十餘溢而不决嵗復大稔此聖德格天所致也上曰天不欲困生靈耳豈朕德能感之自此益須防慎如荆湖比年艱食災沴滋甚尤可䘏也上又曰自清逺軍失守遂屯兵於洪德寨常憂其暴露原野薪芻乏少屬使臣自彼來言環慶今兹大熟薪芻尤賤差慰意也知益州宋太初與鈐轄楊懷忠不協上以蜀土始安慮其臨事矛盾癸夘徙知秦州馬知節代之亟召太初還先是秦州嘗質羗酋支屬二十輩殆踰二紀知節始至悉遣還且曰此亦人也豈不懷土乎蕃落感其惠訖受代無犯塞者小泉銀坑鑛久不發而嵗課不除主吏破産備償猶未盡知節三奏其事得請蠲之仍許以日收為額丙午徙鎮髙陽闗前陣鈐轄趙州刺史張凝為邠寧靈環慶等州副都部署悉召楊瓊等付御史按其罪丁未張齊賢梁顥自陜西經略安撫還對于便殿齊賢上言曰齊賢所上䟽不知其時因使還附見理或當然也昨者清逺軍陷沒以來青崗寨燒棄之後靈武一郡援隔勢孤賊遷必窺覘城池刼脅熟户兵力傷沮難固壘垣况塞北未寧方有調發若果分兵西面亦恐兩失機宜以今日西鄙事勢言之窮討則不足防遏則有餘其計無他在􅈭勵自來與繼遷有讎蕃部招誘逺處大族首領㗖之以官爵誘之以貨財推恩信以導其誠述利害以􅈭其志若山西蕃部響應逺處族帳傾心則兇醜之勢减矣以弓箭手及旋㸃義軍對本城兵士臣所領十二州軍有二萬餘人若更於他州及近處對替又合得五六千人其本城兵士試加料揀亦甚有材勇可扞邉者若縁邉兵得及五萬餘更誘蕃部踰十數萬但彼出則我歸東備則西擊使其奔命不暇矧更能外侵哉仍許蕃漢兵獲得馬畜貲財悉令自取明行曉諭逺近皆知則蕃漢將士之心孰不見利争進今靈州軍民不翅六七萬䧟之死地艱危可知臣又慮賊遷謂來春必發兵救援靈武於我未舉兵之際盡驅地豕併力攻圍則靈州孤城亦必難固萬一陷失賊勢益増縱使多聚兵革廣積財貨亦難保必勝矣所以臣乞封博囉齊為六谷王及厚賜金帛仍先敦諭彼必嚮風恐遷賊旦暮用兵斷彼族賣馬之路茍朝廷信使得逹博囉齊則尼瑪族西南逺蕃不難招輯西蕃既已禀命縁邉兵勢自雄則鄜延環慶之淺蕃原渭鎮戎之熟户自然齊心討賊竭力聖朝設能與對替兵甲及駐泊軍馬互為聲援伺間而興則萬山聞之必不敢於靈州河西頓兵矣萬山退縮則賀蘭山蕃部亦稍叛遷賊矣如此則靈州孤壘未至憂虞今議者謂六谷美名終宜吝惜靈州孤壘翻未籌量與其濫賞而收羌夷之心臣謂濫賞之失輕矣茍若蹙地而稔豺狼之勢則蹙地之恥大矣今議者不過曰名器不可假人刑賞不可濫及此乃聖人治中國之道非議於羌人者也陛下即位之初以銀夏一管盡與繼遷委髙爵於匪人屈王臣於穹帳分儲廩以悦其志輦金帛以慰其心有以見陛下愛全生靈恥用凶器惠此中國以綏四方者也朝廷於遷賊之恩可謂厚矣殊不知契丹慮遷賊感大國之恩斷右臂之勢防患所切其謀甚深署王爵以賜之遣戎使以鎮之王爵至則旌節之命輕矣我之命適所以資之也戎使至則動靜皆伺之向背之心異矣我使徃適所以堅之也夫西平之命亦虚名也契丹命之有何損哉以今日言之當時之策豈不為失乎且六谷者西北之逺蕃也羌人之内推為雄豪若計平時但以市馬須示覊縻則一懷化將軍亦已厚矣酌今日事體似失權宜兼恐今後邉地事更有凖前失中即於國家大有妨損昨清逺之陷是使姦兇轉成豐富兵民官吏六七千餘或含恨重泉或永囚異域傷和致沴思之痛心顧惟靈州還同穽獸外則虞冦戎之過内則憂變故之生朝夕之間垂餌虎口然而握兵者畏懦逗留坐觀覆敗運籌者安然自若曽不憂邉臣雖至愚不勝忠憤且羌人之性變詐多端必恐醜類之謀潛伺間隙伏望明諭邉將内備外虞臣不任憂國思報之至㨿齊賢䟽稱契丹西平之命然則繼遷盖嘗受契丹封册矣而史不載當考按遼史聖宗本紀八年十二月遣使封李繼遷為夏國王十五年三月己巳夏國破宋兵遣使來告己夘封夏國王李繼遷為西平王事在太宗至道三年三月距眞宗即位前十五日録故靈州懷逺鎮駐泊借職李贊子重貴為殿直重寳為借職拾得為殿侍先是贊為李繼遷所圍本鎮戍兵數不滿百拒戰累日食盡力竭積藁自焚而死上憐之故有是命仍厚賜其家贊未詳邑里國史亦無傳忠義冺沒者固多矣可不惜哉已酉張齊賢上言請募江淮荆湖丁夫八萬以益戌兵廣邉備上曰此不唯動揺人心抑又使南方之人逺戌西鄙亦非便也遂寢其奏庚戌上以陜西二十三州圗示輔臣歴指山川險易蕃部居處又指秦州曰此州在隴山之外號富庶且與羌戎接畛昨已命張雍出守冀其綏撫有方也次復指殿北壁靈州圗曰此馮業所畫頗為周悉山川形勝如此安得知勇之士為朕守之乎又指南壁甘伊凉等州圗及東壁幽州已北契丹圗上曰契丹所據地南北千五百里東西九百里封域非廣也而燕薊淪䧟深可惜耳甲寅北面前陣鈐轄張斌與契丹遇于長城口時積雨敵弓用皮弦皆緩濕斌擊敗之殺獲甚衆漸近戎首伏騎大起三路統帥未及進前陣兵少退保威虜軍張斌未見七時己夘初以斌為定州副都部署不知何改前陣鈐轄也豈代張凝者乎當考利州言戌兵三十三人謀叛伏誅乙夘以西凉府六谷都首領博囉齊為鹽州防禦使兼靈州西面都廵檢使初知鎮戎軍李繼和請授博囉齊刺史仍賜廪給張齊賢又請封為六谷王兼招討使靈州西面都廵檢使竢其立功則授之節鉞上命宰臣議其事咸曰博囉齊已為酋帥况藉其戮力共討繼遷儻授以刺史則名品太輕未付節旄而加王爵則典制非順招討使號不可假於外夷請授防禦使俾兼都廵檢之職從之仍以殿直閤門袛候李振辭假崇義使為加恩官告使李振辭未見己未以西凉府六谷左廂副使結布伊朗布領宥州刺史又以其多囉族首領禇實竒等三人並為懷化将軍時西凉使入朝且言六谷分左右廂伊朗布為左廂副使促勒錫卜為右廂副使朝廷所降符命伊朗布專掌之實叅博囉齊戎事上方務招懷故申命焉詔髙陽闗三路兵増騎二萬為前鋒又命將五人各領騎三千陣于先鋒之前别命歩軍副指揮使莫州駐泊都部署桑贊領萬人居莫州順安軍為竒兵以備邀擊馬歩軍都軍頭北平寨駐泊部署荆嗣領萬人以斷西山之路仍列繪為圖遣内侍副都知閻承翰齎示王顯等且戒之曰設有未便當極言以聞無得有所隱也辛酉上得張斌㨗奏初議以大兵陣於威虜軍㑹諜者言契丹猶未動故命悉徙于中山已而敵騎遽入漁陽漸逼威虜斌雖以前鋒獨克大兵訖不進討上甚歎息焉癸亥詔莫州駐泊都部署桑贊分部下兵萬人屯於寧邉軍令北面前陣兵居其後上以前陣昨經力戰故休息之也甲子知雄州何承矩請於乾寧軍選鋭兵乗刀魚船自界河攻平州以分敵勢從之詔三司官屬議軍儲經久之制吏部侍郎陳恕監之主客司員外郎直集賢院李建中言太清樓羣書恐有謬誤請選官重校上因閲書目見其闕者尚多仍詔天下購館閣遺書每巻給千錢及三百巻者當量材録用建中洛陽人也
