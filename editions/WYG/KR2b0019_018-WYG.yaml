body:
  text: 續資治通鑑長編巻十四宋李燾撰太祖開寶六年春正月甲子以雲安監為雲安軍又以遂合渝瀘昌開逹渠巴􅅾資戎涪忠萬䕫施十七州及廣安梁山雲安三軍别置水陸計度轉運使仍以知雲安監太子中允張顒充使丙寅韶州言靜江軍士百餘人皷譟城中以應外賊悉捕斬於市戊辰賜皇弟開封尹襲衣犀帶羅綺五百匹玉鞍勒馬以疾間也癸酉遣德州刺史郭貴發丁夫千人修大名府魏縣河隄己夘以太子洗馬權知逄州朱昻權知廣安軍㑹渠州妖賊李仙衆萬人刼掠軍界昻設策擒之自餘果合渝涪四州民連結為妖者一切不問蜀民遂安昻長沙人也壬午詔諸州流民所在計程給以糧遣各還本貫至日更加賑給殿直傅廷翰為棣州兵馬監押欲謀叛北走契丹知州右贊善大夫周渭擒之以聞遣使械繫送御史獄鞫之得實二月丙戌斬廷翰於西市丙申運京師米二萬石賑曹州饑民辛丑以著作佐郎陸光範為在京糧料使太僕寺丞趙巨川為西京糧料使光範巨川未見國初承舊制用三司大將領糧料之職於是改任京官三月乙夘朔房州言周鄭王殂上素服舉哀輟視朝十日命還塟慶陵之側曰順陵諡曰恭帝己未復宻州為安化軍辛酉新及第進士雍丘宋凖等十人諸科二十八人詣講武殿謝上以進士武濟川三傳劉濬材質最陋應對失次黜去之濟川翰林學士李昉鄉人也昉時權知貢舉上頗不悦㑹進士徐士亷等擊登聞皷訴昉用情取舍非當上以問翰林學士盧多遜多遜曰頗亦聞之上乃令貢院籍終場下第者姓名得三百六十人癸酉皆召見擇其一百九十五人并凖以下及士亷等各賜紙劄别試詩賦命殿中侍御史李瑩左司員外郎侯陟等為考官乙亥上御講武殿親閱之得進士二十六人士亷預焉五經四人開元禮七人三禮三十八人三傳二十六人三史三人學究十八人明法五人皆賜及第又賜凖錢二十萬以張宴㑹責昉為太常少卿考官右贊善大夫楊可法等皆坐責自兹殿試遂為常式可法未見丙子幸相國寺觀新修普滿塔壬午以教船池為講武池閔河為惠民河五丈河為廣濟河癸未鎮國節度使李崇矩責授左衛大將軍實録但云以前鎮國節度使檢校太傅李崇矩為左衛大將軍而百官表云崇矩自節度使責授左衛大將軍今從之然亦不知何事也當考詔諸州流民復業者蠲今年蠶鹽錢復其租免三年役禁銅錢不得入蕃界及越江海至化外融州修河卒叛殺長吏知髙州范可鄆率髙潘二州民吏擊破之詔賜二州民今年秋租是月大食國遣使來貢方物先是詔朝臣有將命逺方死王事者得録其子於是右贊善大夫陸光佩子坦賜進士出身監察御史王楷子克同三傳出身右補闕吳光輔子用之右贊善大夫劉師道子傳慶並同學究出身皆就學士院試所業然後命之夏四月甲申朔限諸州度僧額僧帳及百人者每嵗度一人仍度有經業者乙酉詔諸州考試官令長吏精選僚屬有才學公正者充知貢舉與考試官同看詳試巻定其通否否即駁放不得優假虚令終場申禁私薦屬舉人募告者其賞有差舉人勒還本貫重役永不得入科場丁亥詔皇弟開封尹天平節度使石守信等宴射苑中復置南義州丁酉禁灌頂水陸道場辛丑翰林學士盧多遜等上所修開寶通禮二百巻義纂一百巻並付有司施行詔改鄉貢開元禮為鄉貢通禮本科並以新書試問是月遣盧多遜為江南生辰國信使多遜至江南得其臣主歡心及還艤舟宣化口使人白國主曰朝廷重修天下圖經史館獨闕江東諸州願各求一本以歸國主亟令繕寫令中書舍人徐鍇等通夕讎對送與之多遜乃發於是江南十九州之形勢屯戍逺近户口多寡多遜盡得之矣歸即言江南衰弱可取狀上嘉其謀始有意大用壬寅命知制誥張澹權祗應翰林院事澹本傳云權直學士院今從實録甲辰占城國遣使來貢方物丙寅黎州言有保塞蠻七十餘人自大渡河來歸戊申詔叅知政事薛居正監修梁後唐晉漢周五代史知制誥王祜等上重定神農本草二十巻上制序摹印以頒天下先是江南饑詔諭國主借船􅈇湖米麥以賑之辛亥國主遣使修貢謝恩賜米麥前已見江南國主以司空判三司尚書都省湯悦知左右内史事悦以身老國危固辭不許湯悦事據十國紀年在此夏今附見癸丑詔曰堂後官十五人從來不曽替換宜令吏部流内銓於前資見任令録判官簿尉内揀選諳㑹公事有行止無違闕者十五員具姓名奏當議差補仍三年與替若無違闕其令録除陞朝官判官簿尉除上縣令五月丙辰以前武德縣尉姜宣乂為眉州别駕充堂後官尋又得新成州録事叅軍任能前郫縣令夏德崇前三原縣尉孔崇照皆授諸州上佐用之上知堂吏擅中書權多為姦贓欲更用士人而有司所選終不及數遂召舊任者劉重華等四人面加戒勵令復故嵗滿無過與上縣令稍有愆咎重寘其罸兵部侍郎叅知政事劉熙古以足疾四上表求解庚申授户部尚書致仕供備庫使李守信受詔市木秦隴間盜官錢鉅萬及代歸為部下所告守信至中牟縣聞其事自剄於傳舎上命司勲郎中監在京商稅務蘇曉按之逮捕甚衆右拾遺通判秦州馬適妻守信女也守信嘗用木為筏以遺適曉獲其私書以進上將赦之曉固請寘適於法適坐棄市仍籍其家餘所連及者多至破産盡得所盗官錢上悦癸亥以曉為右諫議大夫判大理寺事尋遷左諫議大夫復監在京商税務曉無子有一女甚愛之亦先曉卒人以為深刻所致云幸玉津園觀刈麥樞宻副使沈義倫居第卑陋處之晏如當時貴要多冒禁市巨木秦隴間以營私宅及主者敗皆自啟於上前義倫亦嘗市木為母營佛舍因奏其事上笑謂義倫曰爾非踰矩者知居第尚不葺因遣中使案圖督工匠五百人為治之義倫私告使者願得制度狹小使者以聞上亦不違其志戊辰詔曰朝廷立取士之科分署吏之秩所以辨等異乎編民茍真偽以相參俾名實之斯濫宜有釐革無容混淆自今諸州有冒稱鄉銜攝官並不得以客禮謁見州縣官吏假署文牒所在官司追毁之其有經試舉人及歴承乏視事之官不用此制庚午宴射苑中甲戌以殿中侍御史鉅野馮炳為侍御史知雜判御史臺事上留意聽斷專事欽恤御史大理官屬尤加選擇嘗召炳謂曰朕每讀漢書見張釋之于定國治獄天下無寃民此所望於汝也賜金紫以勉之南漢靜海節度使丁璉聞嶺南悉平遣使朝貢表稱其父部領之命戊寅以璉為静海節度使除璉節度使制其畧曰䖍遵父命耻事偽邦則知必璉表云爾也京城左右軍廵院典司按鞫開封府舊選牙校分掌其職上哀矜庶獄始詔改任士人六月癸未朔以前館陶縣令李萼為光禄寺丞兼左軍廵檢安豐縣令趙中衡為太府寺丞兼右軍廵檢己丑廣州言同知州保信節度使尹崇珂卒優詔贈侍中遣中使䕶其䘮歸塟洛陽辛夘召京百司吏七百餘人見于便殿上親閲試勒歸農者四百人初李謙溥去隰州邉將屢失律乃復以謙溥為隰州廵檢使邉民喜謙溥之至相率迎於路癸巳謙溥言領兵入北漢界連㧞其七寨謙溥再為隰州乃開寶五年四月也今并列于此九國志世家云明年王師侵嵐石川㧞我七寨即此占城國又遣使來貢方物初蜀民所輸兩税皆以疋帛充折其後市價愈髙而官所收止依舊例上慮其傷民壬寅詔西川諸州凡以疋帛折税並凖市價初雷德驤責商州司户叅軍刺史以德驤舊為尚書郎頗賔禮之及奚嶼至州希宰相意則倨受庭參德驤不能堪出怨言嶼聞之怒有言德驤嘗為文訕謗朝廷嶼因召德驤與語濳遣吏紿德驤家人取得之即械繋德驤具事以聞上貸其罪削籍徙靈武德驤子有鄰意趙普實擠排之日夜求所以報普者於是堂後官胡贊李可度在職嵗久或稱其多請託受賕而秘書丞王洞與德驤同年登第有鄰每造謁於洞洞多委以家事一日託有鄰市白金半鋌因語有鄰曰此欲與胡將軍胡將軍謂贊也有鄰亦嘗出入贊家故洞語之時又有詔應攝官三任解由全者許投牒有司即得引試録用有鄰素與前攝上蔡主簿劉偉交遊知偉雖經三攝而一任失其解由偉兄進士侁為偉造偽印得送銓遂上章告其事并言宗正丞趙孚乾德中授西川官稱疾不之任皆宰相庇之上怒悉下御史獄鞫實上始冇疑普意矣壬寅詔參知政事呂餘慶薛居正陞都堂與宰相同議政事癸夘偉坐棄市孚及洞侁贊可度並決杖除名贊可度仍籍沒其家財以有鄰為祕書省正字厚賜之有鄰自是累上䟽告人隂事俄被病白晝見偉入室以杖箠其背有隣號呼聲聞于外數日而死洞除名實録在七月乙亥今并書之禁嶺南諸州民捕象籍其噐仗送官賜容州民今年租廢隴州復春州丁未復尋州賔州趙普之為政也專廷臣多疾之上初聽趙玭之訴欲逐普既止盧多遜在翰林因召對數毀短普且言普嘗以隙地私易尚食􅂼圃廣第宅營邸店奪民利上訪諸李昉昉曰臣職司書詔普所為臣不得而知也上黙然自李崇矩罷上於普稍有間及趙孚等抵罪普恩益替庚戌復詔薛居正吕餘慶與普更知印押班奏事以分其權易州言刺史賀惟忠卒惟忠性剛頗知書洞曉兵法有方略在易州葺治亭障撫士卒能得其心每乗寒用兵所向無敵名震契丹十餘年間不敢擾邉民皆頼之及卒上甚嘆惜即録其子昭度為供奉官河決鄆州楊劉口又決懷州獲嘉縣詔潭州鄉兵二千人郴州三百人並復其家一年死事者二年此必在行營也但本紀不詳耳當考是夏卭部川都鬼主歸德將軍阿伏與山後兩林蠻主勿兒語言相失勿兒率兵侵掠卭部川堡壁多所殺傷阿伏告黎州州以聞並賜詔慰諭各令守封疆勿相犯躐先是諸道州府任牙校為馬歩都虞候及判官斷獄多失其中秋七月壬子朔詔罷之改馬歩院為司冦院以新及第進士九經五經及選人資序相當者為司冦參軍遣右領軍衛大將軍王昭逺閑廐使楊重美使交州昭逺重美未見廣南諸州民輸税米劉鋹時每石白配百六十錢丙辰詔但取其十辛酉幸都亭驛中書擬左補闕辛仲甫為淮南轉運使上不許乙亥選授三司户部判官賜錢百萬有榷酤主吏武希璉等三十餘軰逋嵗課三十餘萬緡連年械繫竭資産不能償餒死者數人搒督不已仲甫奏除之又請百官折俸令估實直通事舎人宋惟忠決杖除籍為民坐知濠州日不法為人所訴鞫得其實故也孟昶時西川民嫁遣資裝皆籍其數征之八月乙酉勿令復征丁亥幸玉津園觀稼草澤王德方上修河利害辛夘賜德方同學究出身右補闕蘇德祥奪兩任官坐令門人執私劵乗馬過淮德祥禹珪子也禹珪初見天福十二年泗洲軍事推官侯濟決杖除名濟嘗應㧞萃科當試判時假手於人至是為人所發故也甲辰左僕射兼門下侍郎平章事趙普罷為河陽三城節度使同平章事普獨相凡十年沈毅果斷以天下事為已任上倚信之故普得成其功嘗欲除某人為某官不合上意不用明日普復奏之又不用明日又奏之上怒裂其奏投諸地普顔色自若徐拾奏歸補綴明日復進之上悟乃可其奏後果以稱職聞又有立功者當遷官上素嫌其人不與普力請與之上怒曰朕故不與遷官將奈何普曰刑以懲惡賞以酬功古今之通道也且刑賞者天下之刑賞非陛下之刑賞也豈得以喜怒專之上弗聽起普隨之上入宫普立於宫門良久不去上卒從其請一日大宴雨驟至上不悦雨良久不止上怒形于辭色左右皆震恐普因進言外間百姓政望雨於大宴何損不過沾濕供帳樂衣耳此時雨難得百姓得雨各歡喜作樂適當其時乞令樂官就雨中奏技上大悦終宴普臨機制變能囬上意類如此嘗設大瓦壺於視事閤中中外表䟽普意不欲行者必投之壺中束緼焚之其多得謗咎殆由此也普既出鎮上書自愬云外人謂臣輕議皇弟開封尹皇弟忠孝全德豈有間然矧昭憲皇太后大漸之際臣實預聞顧命知臣者君願賜昭鑒上手封其書藏之金匱雨中作樂據丁謂談録太祖大宴皆用秋月不知是何年普行狀乃乾德五年春事今附此己酉幸新水磑宴射苑中是月流内銓上言請復四時選應引對者每季一時引對詔從之時國家取荆衡克梁益下交廣闢土既廣吏員多闕是以嵗常放選人南曹投狀判成送銓司依次注擬其後選部闕官又特詔免取解非時赴集謂之放選習以為常取解季集之制有名而無實矣此據本志實録不書㑹要乃稱復四時選在九年八月盖字誤也太子中舎權判國子監陳鄂免官四門博士解損除籍為民皆為監生徐讓能所訟故也嶺南羣盜未息九月壬子以唐州刺史曹光實為諸州都廵檢使光實既至捕斬之海隅悉平吏部侍郎參知政事吕餘慶以疾求解職丁夘罷為尚書左丞餘慶上霸府元僚趙普李處耘先進用餘慶恬然不以介意處耘獲罪時餘慶知江陵還朝上委曲問處耘事餘慶具以實告及普忤㫖左右爭傾之餘慶獨為明辨上意稍解時稱長者己巳皇弟開封尹光義封晋王案宋史作封晋王兼侍中山南西道節度使光美為永興節度使兼侍中皇子貴州防禦使德昭為山南西道節度使同平章事吏部侍郎參知政事薛居正為門下侍郎樞宻副使户部侍郎沈義倫為中書侍郎並平章事天平節度使石守信兼侍中歸德節度使髙懷德忠武節度使王審琦並加同平章事翰林學士兵部員外郎知制誥盧多遜為中書舍人參知政事左驍衞大將軍判三司楚昭輔為樞宻副使辛未靜江節度使殿前都虞候楊義為建武節度使殿前都指揮使自韓重贇罷殿前都指揮使凡六年不除授於是乃以命義壬申詔晋王位居宰相上丁丑令諸州不得占流民募告者户賞錢五千詔西京諸殿門列㦸如東京之制江南内史舎人潘佑與户部侍郎李平平見乾祐元年最見親善佑好神仙事平頗知修錬導養之術言多妖妄佑特信之平自言與仙人通接佑父處常今已為仙官甚貴重而已及佑亦仙官也各於其家置淨室圖像神怪披髪祼􅃝而祭人莫能窺平語佑曰六朝大臣塚中多寶劔及寶鑑得而佩之可以辟鬼去人僊矣佑求之甚切不能得㑹張洎亦好方士之説乃共買雞籠山前古塚地數十頃以為别墅遇休沐則相與聨騎率僕夫具畚鍤而徃破一塜得古噐必傳玩良久吟嘯自若曰未知此生發得幾塚其怪誕類此佑嘗言於國主曰富國之本在厚農桑因請復井田之法深抑兼并有買貧者田皆令歸之又依周禮造民籍復造牛籍使民闢曠土以種桑薦平判司農寺以督之符命行下急於星火百姓大撓國主遽遣罷之佑疑執政沮已乃歴詆大臣與握兵者兩兩為朋旦夕將謀竊發且言國將亡非已為相不可救江南政事多在尚書省因薦平可知省事司天監楊熙澄可任樞宻軍校侯英可典禁衛國主不納佑益忿抗䟽請誅宰相湯悦等數十人國主手書教誡之佑遂不復朝謁居家上表言陛下既不能彊又不能弱不如以兵十萬助收河東因率官吏朝覲此亦保國之良策也國主始恨之不復答又復請致仕入山避難國主以為狂悉置不問冬十月壬午佑上第七表曰臣聞三軍可奪帥也匹夫不可奪志也臣近者連貢封章指陳姦宄畫一其罪將數萬言皎若丹青坦然明白詞窮理當忠邪洞分皆陛下黨蔽姦回曲容謟偽受賊臣之佞媚保賊臣如骨肉使國家愔愔如日將暮不顧億兆之患不憂宗社之覆以古觀之則陛下之為君無道深矣古有桀紂孫皓破國亡家自己而作尚為千古所笑今陛下取則姦囬以敗亂其國家是陛下為君不及桀紂孫皓逺矣臣必退之心有死而已終不能與姦臣雜處而事亡國之主使一旦為天下笑陛下若以臣為罪願賜誅戮以謝中外國主大怒推其狂悖謗訕殆由李平乃先收平下大理獄後始收佑佑即自殺母及妻子徙饒州平亦縊死獄中佑所上書史臣並改陛下為殿下今從九國志本文國主尋謂左右曰吾誅佑思之踰旬不決盖不獲己也明年皆宥其家廪給之佑初與張洎為忘形之交其後俱為中書舎人不雙立稍相持佑嘗答洎書云堂堂乎張也難與並為仁矣佑之死洎頗有力焉洎時為清輝殿學士參預機宻恩寵莫二清輝殿在後苑中國主不欲洎逺離左右故授以此職洎與太子太傅臨汝郡公徐遼太子太保文安郡公徐逰别居澄心堂宻畫中㫖多自澄心堂出逰從子元楀等出入宣行之中書宻院乃同散地癸巳燕國恭懿長公主薨上臨哭甚哀詔有司具鹵簿鼓吹陪塟安陵丁酉除名人雷德驤為秘書丞分判御史臺三院事甲辰特赦中書樞宻院三司及諸司吏自前隠欺未覺等罪使之自新初左藏庫使元城田仁朗為宦官所譖上怒立召仁朗靣詰之至殿門先命去冠帶仁朗神色不撓從容言曰臣嘗為鳯州路濠寨都監伐木除道從大軍破蜀秋毫無所犯陛下用之令主藏禁中豈復為姦利以自汚上怒解乙巳以仁朗為榷易使本傳言止免仁朗官於是起為𣙜易使今從實録盖未嘗免官十一月癸丑令常參官進士及第者各舉有文學官一人甲子武寜節度使贈侍中髙繼沖卒繼沖鎮彭門十餘年有惠政民請留塟上不許丁夘詔諸州長吏及監當官等無或隠庇得替人事覺當重寘其罪少府監致仕盧億億河陽人初見開運元年有髙識惡其子參知政事多遜所為嘗曰趙普元勲也而小子毁之禍必及我我得早死不及見其敗幸也十二月庚子億以憂卒丙子多遜起復女真遣使來貢馬是嵗命參知政事盧多遜知制誥扈䝉張澹以見行長定循資格及泛降制書考正違異削去重複補其闕漏參詳議取悠久可用之文為長定格三巻有㫖限選數集人取解出身科目銓司檢勘注擬加選減選之狀南曹檢勘用闕年滿伎術考課春闈雜處分塗注乙凡二十條總二百八十七事循資格一巻制勑一巻起請條一巻書成上之頒為永式自是銓綜益有倫矣重定循資格實録在七月己未今從本志繫之嵗末北漢成德節度使太師兼中書令劉繼顒自以沙門位兼將相頗為時論所薄數上表求罷不許是嵗繼顒卒追封定王前大内都㸃檢劉繼欽殿前都虞候張重訓侍衞歩軍都指揮使鄭進前嵐州刺史張昭敏遼州刺史衞儔都引進使李隠等皆被殺初北漢主為大内都㸃檢孝和帝以其幼弱命繼欽副之委以禁衞北漢主立親舊多所誅放繼欽遂謝病請罷北漢主曰繼欽但事先帝豈肯為我盡力耶乃黜居交城俾奉園寢㝷遣人殺之進與宣徽使馬峰不協峰怒奪其兵柄進不堪其辱詬峰於朝北漢主怒翌日送定襄安置遣人殺之於路昭敏嘗為禮部尚書參議中書事性亷直權勢請託不行多仇少與旋出知嵐州俄召還勒歸私第以出怨言縊殺之儔數從征伐專掌吐渾軍閹人衞德貴嫉其功使出為遼州吐渾數千人遮道乞留北漢主不許吐渾失帥由是一軍不可復用儔少長蕃部不樂為州頗出怨言北漢主慮其為變濳遣人殺之隠惜儔忠勇為嬖侍所誣憤惋形於辭色德貴聞而惡之白北漢主即送嵐州安置未幾殺之張昭敏為禮部尚書參議中書事此但據九國志不知的在何時志又云昭敏與郭無為議事不協繼元立出知嵐州按趙文度以嵐州降時繼元立才踰年也文度先在嵐州昭敏安得復出然則昭敏出知嵐州當在文度來降後文度來降時王師猶在城下尋即被殺豈容復出昭敏乎昭敏之出固當是别與嬖倖者不協耳今云多仇少與不書與郭無為不協庶無牴牾更當細檢詳定劉繼欽鄭進張昭敏衞儔李隠等五人事皆據九國志本傳獨張重訓無傳不知其事也繼欽等六人被殺亦未必專在一年既無可推尋故從本志並繫之年末其月日都不可志矣
