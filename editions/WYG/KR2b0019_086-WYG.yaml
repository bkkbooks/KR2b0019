body:
  text: 續資治通鑑長編巻八十二宋李燾撰真宗大中祥符七年春正月壬辰詔不逞之民娶妻紿取其財而亡妻不能自給者自今即許改適時京城民既娶浹旬持其貲産亡去而律有夫亡六年改嫁之制其妻廹于飢寒詣登聞上訴乃特降是詔癸巳三司請于畿縣和市芻藁詔中等已下戸免之甲午髙陽闗言副都部署英州防禦使楊延昭卒延昭即延朗也智勇善戰所得俸賜悉以犒軍未甞問家事性質素出入騎從如小校號令嚴明與士卒同甘苦寒不冒絮暑不執盖遇敵必身先行陣克㨗推功於下人樂為用在北邊二十餘年敵憚之目曰楊六郎訃聞上嗟悼遣中使䕶喪而歸河朔之人多望柩而泣官其三子其常從門客亦試藝甄叙然延昭不逹吏事軍中牒訴常遣小校周正治之頗為正所罔因縁為姦上知之斥正還營而戒延昭焉丙申賜戎瀘州廵檢軍士白艻子弟緡錢先是鼎州判官孫韙坐􅂍轉運使牒鄆州追其妻證驗三子皆㓜上憫之己亥詔諸州勘劾公事干連女口當為證左者千里外勿追攝牒所在區斷庚子賜輔臣新印孟子辛丑上御崇政殿親決繫囚多所原減以車駕將行故也壬寅車駕奉天書發京師禁天下屠宰十日丙午至奉元宫齋于迎禧殿判亳州丁謂獻白鹿一靈芝九萬五千本丁未令奉禮經度制置副使陳彭年詣宫殿大醮戊申奉聖號冊寳于庭拜授攝太尉王旦持節載以玊輅詣宫奉上攝中書令丁謂讀訖置玉匱中己酉三鼓具法駕赴宫時宻雪驟霽自奉元至太清十餘里夾道設籠燈燎䑓左右執炬間之焜煌如晝五鼓上奉玉幣酌獻讀冊文命太尉封石匱又遣官分獻本宫之元中法師三師真武張天師本殿之文子通元真人列子冲虚至徳真人庚桑子洞靈真人莊子南華真人唐明皇文宗並如從祀例又遣宰相等薦獻真源觀之三清靈寳天尊先天觀之元始天尊元母經師廣靈宫之先天太皇洞霄宫之先天太后龍女幣色三清靈寳元始用碧太皇用蒼李母白皆如大祀禮餘同從祀上又詣先天觀洞霄廣靈宫行香復至太清宫真源觀周覧還奉元宫肆赦亳州及車駕所經流以下罪並釋之死罪奏裁給復一年半永減嵗賦十之二升亳州為集慶軍改真源縣曰衛真縣給復二年奉元宫曰明道宫賜道士女官紫服師名披度者八十人詔三宫正殿民庻不得輙升官吏非朝修止拜庭中上作朝謁頌先天太后老君像真武賛命中書侍郎兼刑部尚書平章事向敏中撰親祠頌並刻于石司天言含譽星見帝作歌賜近臣屬和庚戍發衛真縣次亳州謁聖祖殿御奉元均慶樓賜酺三日壬子以順祖惠元皇帝忌罷賜酺詔縁路置頓侵占民田者並據頃畆之數給復二年其須永占者優給其直給亳州公用錢嵗七十萬酒月十斛甲寅發亳州乙卯次應天府天書升輦有雲五色如花木又黄雲如人連袂翊輅而行占云春雲如花木者木旺與徳相生如人連袂色黄者子孫分土延祚之兆也扶侍使趙安仁請播為樂章以備酌獻從之丙辰升應天府為南京正殿牓以歸徳仍赦境内及東畿車駕所過縣流以下罪追贈太祖幕府元勲僚舊及録常參官逮事者並進秩欲授子孫者亦聽除民乾食鹽錢御重熈頒慶樓觀酺凡三日改聖祖殿為鴻慶殿二月丁巳朔發南京戊午次襄邑縣皇子來朝庚申次陳留縣夏州趙徳明遣使來貢荆湖北路轉運司言蠻賊魏進武已招赴盧溪縣請罪詔前所遣兵悉還屯止留五百人戍縣境尋又詔知辰州張綸於盧溪縣建道塲五晝夜仍豐潔致祭詔給設道塲致祭據㑹要乃三月事今附見雍丘邢惇以學術稱甞舉進士不第遂隠居不出上之幸亳也考制度使王曽薦之及還自亳召對問治道惇不對上問其故惇曰陛下東封西祀皆已畢矣臣復何言上說除許州助教遣歸惇衣服居處一如平日鄉人不覺其有官也既卒乃見其敕與廢紙同束置屋梁間司馬光記聞與史不同今從記聞記聞云除四門助教恐悞今從國史辛酉車駕至自亳州乙丑詔自今天書在朝元殿車駕由右昇龍門入自東上閤門就東階赴殿焚香無陟廣庭以盡嚴恭之意所司著為定式戊辰大風揚砂礫百官習儀于恭謝壇有墜幘者三司假内蔵庫錢五十萬貫己巳上齋宿于玊清昭應宫之集禧殿庚午行薦獻之禮遂赴太廟辛未饗六室上曰屬登歌始作而奏嚴不已此殊未安乃詔大祀將行禮嚴警悉備宫廟禮畢歸幄殿復奏嚴郊壇祭畢警塲鼓吹乃振作壬申恭謝天地于東郊還御乾元門大赦内外文武官悉加恩諸路蠲放租賦有差舉人因事殿舉及永不得入科塲不經刑責者許將來依例取觧自後大赦率下此制癸酉以吏部員外郎知制誥李廸知亳州先是亡命卒胥亢羣剽城邑朝廷發兵捕之乆不得居民甚恐廸至悉罷所發兵隂聽知賊處部勒驍鋭士擒賊于䝉館鎮降詔褒諭西川用景徳新鑄錢將十年以鐡重民多鎔為器每一千得鐡二十五斤鬻之直二千轉運使趙禎言其非便請鑄大銅錢一當十詔三司議未决知益州淩䇿請減景徳之制别鑄大鐡錢每一千重十二斤十兩仍一當千其舊錢亦許兼用且言錢輕則行者易齎鐡少則鎔者鮮利乙亥詔從其請泰州淮陽軍言民飢詔發官粟賑之戊寅詔如聞濵棣州葺遥堤配民重役多逃亡者亟罷之詔臣僚上殿劄子奏事進呈後不得批送中書樞宻院三司等處别取進止己卯以恭謝禮畢遣官祭告社稷宗廟靈山聖迹寺觀五岳海瀆庚辰謁啟聖院太宗神御殿以參知政事丁謂判禮儀院翰林學士陳彭年知院兵部侍郎趙安仁初與彭年同知院于是罷之餘官悉罷止命謂及彭年二人凡禮儀院掲牓刻印移文他局並以銀䑓司為凖制度文物及祠祭所用有未合禮者悉令裁定内外書奏中書禮房所掌者盡付之諸司職務相渉者咸得統焉詔自今玊清昭應宫太廟郊壇薦饗行禮前衛士迎駕起居無得呼萬嵗壬午開封府言築恭謝天地壇占民田十八戸詔給直外賜錢三十萬仍蠲其租又詔貧民住官屋者遇冬至寒食免僦三日上封者言鄆州發卒洩河水工役甚大而闕官提振詔本路提㸃刑獄閤門祗候髙正監督之三月庚寅以奉祀禮成大宴含元殿辛卯戎瀘州廵檢使王懐信等言瀘州溪洞悉已寕静淯井監舊無城隍今請發瀘州軍士浚隍築城又近界蠻人赴監鬻馬者請比戎州例給直市之詔可按㓂瑊傳築城浚隍及市馬並瑊為之實録但著懐信名不知何也癸巳詔文武羣臣逮事太祖朝者賜一子恩令翰林學士李維知雜御史段曄等參驗以聞維等請自兩省給諫觀察使以上為例從之甲午羣臣以次加恩乙未召宰相觀太宗聖文神筆于玉宸殿宴翔鸞閣浮觴曲水奏雲韶樂上作詩羣臣皆賦詔南郊五帝壇齋宫自今悉遣剰員軍士守䕶戊戌翰林學士右諫議大夫知制誥龍圖閣學士陳彭年右諫議大夫權三司使公事林特並為給事中先是戸部侍郎參知政事丁謂以奉祀之勞當進秩謂固讓不受但加階勲爵邑于是彭年援謂例懇辭上不許仍作詩賜之樞宻直學士吏部郎中劉綜得風疾求典河中上以太寕宫廟長吏奉祠綜艱于拜起盧不克恭事弗許己亥命知廬州綜強敏有吏材所至抑挫豪右提舉文法時稱幹治然渉學素淺又尚氣好勝不為物論所許殿中侍御史曹定言諸州長吏有罪恐為人所訴即投牒自首雖情狀至重亦以例免請行條約詔自今知州通判幕職官使臣等首罪如實未彰露則以狀報轉運司雖格當原亦書于厯曹定未見辛丑儀州言民飢詔發官粟賑之詔自今諸州觀察使並循舊制兼刺史從陳彭年所請也江南制置發運使胡則甞居杭州肆縱無檢知州戚綸惡之通判吳耀卿則之黨也伺綸動静宻以報則則又厚結李溥溥方為當塗者所昵因共捃摭綸過癸卯詔徙知揚州維揚亦溥則廵内持之益急綸求換僻郡是冬又徙徐州本傳云江潮為患綸立埽岸以易柱石之制雖免水害而衆頗非其法按此即陳堯佐傳所載與丁謂爭議者盖堯佐及綸同議變法謂先徙綸相繼徙堯佐二傳各載其事若不相闗今取而聨合之然所以徙綸又不獨縁作堤也故因堯佐徙使乃并書甲辰免揚州建隆寺田租丁未以皇子受益為左衛上將軍封慶國公月給俸錢二百千初宰相屢言皇子未議封建中外繫望今朝修禮成願特降制命上雖從之而謙讓未加王爵舊制國公食邑三千戸今止千戸有司之誤也皇子即後宫李氏所生于是五年矣劉皇后以為已子使楊婉儀保視之故仁宗常呼后為大孃孃婉儀為小孃孃詔在京授差遣及外州移任文武官除驛程外在道屬疾者所至遣官驗視給公據俟逹本任委長吏驗問如設詐妄滿百日者不得放上具名以聞並用違制論當任逺官託故不赴者從本法監軍廵檢監當使臣自今除程限一月辦裝其事縁急速馳驛者不在此限代還者準上條罪減二等從編敕所之請也荆湖北路轉運司言當管慢水烏速盧溪江口等寨最當衝要止以木為城請改用版築從之已酉馬軍司奏雍丘等縣牧馬地多被侵盗詔遣常參官閤門祗候各一員與本縣官吏按籍參定立堠以表之河東安撫司言北界自景徳二年後漢口被掠自歸者千六百二十五人壬子鄜延路駐泊部署曹利用言鄜州軍馬尤衆請徙本路都監符承翰往治之詔可又言縁邊蕃部指揮使悉心捍㓂望取年深者月給俸上曰向來環慶蕃部給俸料者已數百人矣所費滋廣第詔利用具有勞者名聞當量加賜予又以延州葉家族蕃部指揮使伽凌補三班借職為七襄平雅克青哈至金明巳來廵檢使從利用之請也癸丑罷逰金明池以舒王元偁疾故也夏四月丙辰朔令有司依新定儀制重畫入閣圖有唐朝職官悉改之從東上閤門使魏昭亮之請昭亮咸信次子也丁巳西涼府斯多特遣使來貢戊午詔諸軍巳給衣而沒者勿追詔樞宻院所管奉使印自今除國信接伴劾制獄勾財用剏寺觀外其别細務勿給己未賜淮南諸州民中等以上户秋租十之二仍許從便折納餘悉除之詔經度制置使所定奉祀第一等京朝官使臣並遷秩幕職州縣官授京朝官第二等優與家便親民都監監押差遣第三等優與注官部役軍校有勞者第升一級庚申三司借内蔵庫綾十五萬匹上謂宰相曰聞永興陳堯咨用刑峻酷闗中近方豐稔郡縣尤藉綏撫不宜嚴急有竇隨者提㸃本路刑獄頗復伺察人過以激怒之欲使内外畏憚成其威望此不可不責也辛酉徙隨京西路後數月堯咨言導龍首渠入城以給民用有詔嘉奬因曰決渠濟之不若省刑以安之乃副朕意也癸亥詔自今閤門祗候因公罪追降者許理為一任辰州言瀘溪縣蠻冦驚擾今已寜静詔奬本路轉運使及辰鼎知州使臣蠻冦所經免今年田租張綸尋徙知原州辰州吏民列上治績提㸃刑獄以聞乞加旌擢樞宻院擬狀不行上出以示宰相曰綸清苦自守移官三千里誠可念也本與髙紳不協紳乃王欽若近親若此朋徇耶當特改官遣之此事不得其時寳訓繫之祥符九年不知髙紳時為何官今移見于此紳除吏選判銓在九年八月又據綸本傳乃自辰徙渭非原州也當考六年五月辛丑注可參考髙紳官職知河南府馮拯言軍廵院自春獄空有鳩巢其戸生二雛甲子以歸義軍留後曹賢順為歸義節度使弟賢惠知瓜州於是賢順遣使入貢言其父宗夀既卒以其母及國人之請求嗣位詔予之仍賜以金字蔵經及茶藥等亦從所請也詔大理寺斷獄宜依條處罪其情輕法重者具狀實封以聞時上封者言法官以臨時取㫖為文歸怨于上故也丙寅編敕所言婺州台州斷持仗强盗宋徳葉逸並坐强盗殺人絞斬各異准唐建中敕惡逆已上四等罪准律用刑其餘應當絞斬並决重杖處死以代極法又景徳元年詔處斬訖奏者即斬之今二州同罪異罰望申明舊制從之己巳令羣臣詣國子監觀太宗御書及新刻御製辨論遂宴本監庚午詔慶成軍増置官吏許直逹朝廷太寕宫廟每嵗祠祭委知軍行禮甲戍涇原都銓轄曹瑋言原州熟戸蕃部請以管百帳以上大首領補本族軍主次補指揮使次補副指揮使百帳以下並補本族指揮使從之又言渭州北有古池連帯山麓今浚為渠令民導以溉田賜詔嘉奨導渠溉田實録在此月二十八日今并書之蕃帳指揮使見天聖八年瑋卒時此或可削不妨兩存乙亥禮儀院請以聖祖降及迎奉聖像奉祀事迹各編集為記詔可亳州言自車駕臨幸後民復業者一千三百丙子鎮國寜國等軍節度使太保兼中書令舒王元偁薨自景徳後每有大祀元偁皆為終獻素羸多疾及幸真源時元偁疾巳甚懇求扈從至鹿邑先還上數臨問之㓜子先卒慮其傷慟敕家人勿以告既薨即臨哭翌日對輔臣發言出涕悲不自勝将歛再臨之贈太保中書令追封曹王謚恭惠醫官並坐視疾無状譴責元偁好學善屬文奉佛尤謹性慈恕甞於僧舍齋集從者失金灌器未幾獲賊元偁請末減其罪以所失器施僧寺有集三巻筆札一巻上為序之蔵祕閣戊寅封焦山神為明應公上以京口江多覆溺之患是山在江中近海門禱祈有應故加封爵仍製文告之刻石廟中庚辰詔諸路知州通判自今在城倉庫則每季檢視在外縣者止閲簿籍不須廵行初淳化中詔長吏每季行縣縣有去州五七百里者以煩擾故罷之甲申詔三班使臣自今願試弓矢者委本縣與帯御器械官同驗視第其能否以聞是月中書言文武臣僚年終舉到幕職州縣官今欲定五人以上同罪保舉者替日令吏部流内銓磨勘引對從之此據㑹要祥符七年四月事今附月末詔自今遇聖節南郊奏薦親屬其在聖節及南郊後奏到者更不施行此據㑹要樞宻使王欽若等言本院小吏以奉祀禮成援中書堂後官直省官例求恩澤帝以問宰臣王旦等曰堂後官本選士流經科者十年無遺闕改官為通判盖先朝舊制也若由流外守職至堂後官即無此例直省官南郊例得七人出職昨纔出行首二人為供奉官亦定例也大凡中書樞宻院體制各異至如宻院副承㫖出為諸司副使若轉至副都承㫖即便為大将軍以至主事已下有特加俸錢及十千者中書人吏所加不過三千以是不可比類盖中書堂後官開寶九年以後多至優轉咸平以來惟有抑損帝然之此據㑹要乃七年四月事恐别見當檢詳申禁諸路走馬承受使臣納諸路贈遺五月丙戍以左諫議大夫陳象輿權判西京留司御史臺象輿病風痺歩履艱阻朝謁屢失儀右軍廵使姜遵劾奏之象輿即求對自陳可以治郡上以語宰相宰相曰象輿非幹器且抱疾任以専城祗益其過耳上然之故有是命實録云姜遵請授象輿外郡按本傳乃象輿自請也今從本傳丁亥趙州言寜晉縣民曹遵六世同居詔旌其門遵利用兄也戊子知益州凌䇿言眉州民孫延世强奪孫朴田積三十年六經制劾官吏受賕枉法殿中丞知華陽縣黄夢松鞫之並得其狀詔待夢松還引對其推典第加進補明年擢夢松為監察御史夢松未詳邑里壬辰命右僕射平章事王旦為兖州景靈宫朝修使禁民間服皂纈初錢塘江堤以竹籠石而潮囓之不數嵗輙壊而復理轉運使陳堯佐曰堤以捍患而反病民乃與知杭州戚綸議易以薪土有害其政者言于朝以為不便參知政事丁謂主言者以絀堯佐堯佐爭不巳謂既徙綸揚州癸巳又徙堯佐京西路發運使李溥請復籠石為堤數嵗功不就民力大困卒用堯佐議堤乃成此事與本志不同當考甲午中書以逮事太祖羣臣名聞上因言開寳中舉人陛見有以武勇求較勝負王旦曰太祖英武之徳賢不肖共知科塲無藝者往往以挽强善騎自陳太祖勉從之縱有司程以名第不過寘之州縣如宋凖有文行釋褐即授校書郎直史館盖神機聖鍳非常人之所測也乙未詔模刻天書奉安於玉清昭應宫命王旦為天書刻玉使王欽若為同刻玉使丁謂為副使兵部侍郎趙安仁翰林學士陳彭年為同刻玉副使入内押班周懐政為都監上作奉祀禮成述懐五言百韻詩賜近臣館閣官屬和咸奉章求免不許修玉清昭應宫使丁謂表請御製本宫碑頌及御書額從之王旦言朝修景靈宫請用先天節設道塲禮畢詣至聖文宣王廟㑹真宫東岳廟真君觀行禮望下禮官參酌儀制又言路出澶州欲詣河瀆廟致奠並從之庚子太常博士鄧餘慶坐受誓戒不及在法私罪當劾舉主詔釋之上因謂宰相曰連坐舉官誠亦不易如此公坐猶或可矜其有本不諳知勉徇請託及乎曠敗何以逃責王旦曰薦才實難士人操行往往中變上曰然㧞十得五縱使徇私朝廷由此得人盖不少矣旦曰求人之際但信其言而用之有所曠敗亦如其言而坐之太祖朝有自員外郎與所犯州縣官同除名者太平興國初程能為轉運使舉官至濫人多鄙之上曰朝廷急於得人茍不令薦舉則才俊在下無由自逹求人之要固無出于此也癸卯知雜御史王隨請以御史䑓新降條目編為儀制從之丙午府州言知州興州刺史折惟昌卒先是河東民運糧赴麟州當出兵為援惟昌時已屬疾或請班師浹旬以俟少間惟昌曰古人受命忘家死于官事吾無憾也即引歩騎屯寕逺寨冐風沙而行疾遂亟将卒一日坐齋中㑹賔佐人皆意其良愈惟昌退告其母以病篤且曰强宴飲者正以境外之重慮貽朝廷憂耳上聞之遣使挾醫診視弗及于是命入内供奉官張文質馳往䕶𦵏所須官給以其弟供奉官閤門祗候惟忠為六宅使知州事録其二子官禮部侍郎馮起請致仕上顧宰相問其年王旦曰起清名素履搢紳少及年實七十以誠引退上曰起謹畏寡過亦可嘉也當特改官戊申授戸部侍郎致仕樞宻院副承㫖尹徳潤勾當引見司焦守節勾當事材塲賈繼勲勾當修内司李知信同勾當修内司王從政並削一任坐假軍匠與徳潤治第為東上閤門使魏昭亮所發也昭亮居官務為皦察多遣私僮偵伺僚輩嘗與德潤從西祀提總頓置徳潤以昭亮貴家子少之故因是報怨吏部流内銓言諸州有親屬為部内官到任一考以下聽對換一考以上請令俟成資日依得替例放罷從之己酉以渭州蕃族首領嘉勒斯賚為殿直充廵檢使時斯賚帥其帳下來歸給以土田未及播種求俸給贍用故有是命己酉五月二十五日此據㑹要嘉勒斯賚者緒出吐蕃嘉木布本名齊囊凌衮沁布沁布猶嘉木布也羗語訛為沁布生髙昌磨揄國既十二嵗河州羗哈喇額森客髙昌見斯賚貌竒偉挈以歸至多僧城而大姓松察克斯戩又以斯賚居葉公城欲於河州立文法河州人謂佛嘉勒謂兒子斯賚既而總噶爾僧李埒克遵邈川大酋温布且畧取斯賚如廓州尊立之部族寖强乃徙居總噶爾城埒克遵為倫布佐之埒克遵或曰李遵或曰李埒克遵倫布者相也按嘉勒斯賚嘗受朝命為殿直巡檢使而實録不載斯賚附傳及正傳並畧之不知何也又按㑹要初以斯賚為渭州蕃族恐此時李埒克遵猶未畧取斯賚故斯賚以窮歸我且受朝命尋為埒克遵畧取如廓州遂徙總噶爾城及此年十一月張佶奏埒克遵與斯賚召諸酋謀入冦然則斯賚盖驟興者殿直廵撿之命亦微矣或史官以其事微故不着耶當考辛亥上御崇政殿親決繫囚死罪至徒遞降杖已下釋之涇原都鈐轄曹瑋言伊實族大首領延本率其族自北境歸順詔第補侍禁殿直月給俸料癸丑度軍士鄭榮為道士賜名自清住上清宫榮先戍壁州還夜遇神人謂曰汝有道氣勿火食因授以醫術救人自是不食其所傳藥能愈大風疾民多求之皆刺臂血和以餅餌甲寅詔自今祠祭酒令有司别醸務在嚴潔知宿州李防言引見司科罰罪人於崇政殿門外切近帝所有虧嚴肅欲望自今送開封府或皇城司決遣上曰外人不知近年每月不過一二次決罰人皆杖笞以下此事已乆不欲遽改㑹要五月事六月乙卯朔詔内外文字不得斥用黄帝名號故事其經典舊文不可避者闕之丙辰詔曰眉州通判黄瑩知長安縣王文龜或酗酒濫刑或受賄鬻獄並投荒裔猶屈刑章凡百搢紳所宜申戒初孫延世偽作祖父手疏奪孫朴田計直三百萬提㸃刑獄司命瑩辨之眉山縣尉髙用納延世錢七萬易其丁簿以為證佐瑩又取黄金三十兩獄成夾江令李幹審覆之又取金四兩因逐朴悉以産付延世朴詣闕訟寃詔劾得實瑩等當死用五年十月戊午赦特除名配本城軍瑩𨽻白州幹漳州用韶州文龜在長安醉出廻顧市民有踞坐者即其所杖之三十詰朝而卒法寺准罪當加役流特命除名配𨽻海州因布告天下初有司以敕草上第言市民踞坐上曰文龜欵中有廻顧二字此最非理不可不載視之果然遂益之丁巳泗州言水害民田遣使賑䘏戊午禁諸州决罪暗加杖數令提㸃刑獄轉運司察舉之己未詔兩京諸路繫囚死罪委長吏躬親詳鞫徒流降等决遣杖以下釋之時屬炎暑故也知泰州張佶言新置水寨二於大洛門以不俟朝㫖待罪詔釋之令佶繪圖來上河南府言洛水漲河東路承受供奉官李崇政西川路承受侍禁張仲文坐増減上言張皇動衆並降職勒歸班庚申詔以其事戒諭自今所遣内臣使臣承受邊奏如能周謹平允當議特記姓名優與差任或増加俸給其有明負才識深察機宜規度之間實有禆益者亦當别示陞擢辛酉詔自今玉清昭應宫景靈宫親薦皆備樂用三十六簴編敕所請自今刑部舉駁諸州誤入人死罪劾斷官吏訖具事布告天下俾共曉悟從之罷揚楚州髙郵軍屯兵先是以宣武軍分戌淮甸至是軍中有不逞軰謀殺校長轉運使請省去之故也壬戌遣使齎御藥賜景靈宫朝修使王旦癸亥旦入辭又賜襲衣金帯鞍勒馬仍賦詩以寵其行詔自今至兖州察吏治民隠聽以便宜從事十二日旦入内殿觀天書摹本訖乃上道河北縁邊安撫司言民有自北界市馬三匹至者已牒送順義軍上曰如聞彼國毎擒獲鬻馬出界人皆戮之逺配其家甚可憫也宜令安撫司自今如有此類俟夜遣人牽至境上觧覊縱之詔自今唐龍鎮來歸人委本路轉運安撫鈐轄司洎府州規畫於僻逺處給閑田勿復補署職名時安撫司請于府州諸族收管上以頃嵗外浪族杜慶光等率部下來歸既授職名復還唐龍故有是命乙丑河北縁邊安撫司上制置縁邊浚陂塘築堤道條式畫圖請付屯田司提振遵守從之又言於縁邊軍城種栁蒔蔴以備邊用詔奨之丙寅詔天書刻玉使副等詣内殿觀待詔盛亮摹寫本三函上皆跪受置案向敏中陳堯叟丁謂趙安仁捧持王旦與王欽若對讀陳彭年詳字體初有司具儀上覧之増跪受親啟封又加上香者三再拜者八戊辰令諸軍營在新城外者所給衣俸錢諸門勿禁之時開封府以商販例邀止之故也己巳陜西轉運使請於隴州西山胡田澆水等處置採木務以備邉用從之十二月甲戌張佶置採木場事或與此相闗當參考庚午夜京師新作五岳觀東北黒雲中見星如晝有靈祗旌纛甲仗之状覩者喧怖修觀使丁謂以聞詔建道塲以三班奉職鄭檢為鄧城縣主簿國子監說書檢明經善講朝士以其名聞試于國學而命焉壬申封婉儀楊氏為淑妃始皇后為修儀妃為婉儀位幾與后埒上封泰山祀后土祠太清宫凡廵幸皆從榮寵莫比妃通敏有智思周旋奉順后無所忤后親愛之故妃雖貴幸終不以為已間及受冊上不欲令藩臣貢賀不降制外庭止命學士草制付中書翌日宰相言宫掖加恩朝廷慶事臣下不可闕禮望令客省依例受貢賀上勉從之癸酉以内殿崇班戎瀘州都廵檢使王懐信為供備庫副使又以侍禁知江安縣宋賁為閤門祗候兼淯井監廵檢使自餘進補有差康訓以戰死録其四子官賞平蠻之功也實録于此始書懐信上平蠻功状誤甚矣賞乆不行故樞臣俱罷今削去梓州路轉運使冦瑊言瀘州富順監牙校趙繼隆等部領白艻子弟頗有勤効請補攝州司馬知戎州馬守遵防㓂有勞在官嵗滿望遷秩留再任瀘州進士白固募鄉丁隨軍請試其詞藝並從之詔除鎮州元氏獲鹿二縣亡失稅賦甲戌遣使以上所乘馬三匹賜王旦乙亥樞宻使王欽若罷為吏部尚書陳堯叟為戸部尚書副使馬知節為潁州防禦使欽若性傾巧敢為矯誕知節薄其為人未甞詭隨上甞以喜雪詩賜近臣而誤用旁韻王旦欲白上欽若曰天子詩豈當以禮部格校之旦遂止欽若退遽宻以聞已而上諭二府曰前所賜詩微欽若言幾為衆笑旦唯唯知節具斥其姦状上亦不罪也欽若毎奏事或懐數奏但出其一二其餘皆匿之既退則以已意稱上㫖行之知節甞于上前顧欽若曰懐中奏何不盡出欽若寵顧方深知節愈不為之下爭於上前者數矣及王懐信等上平蠻功樞宻院議行賞欽若堯叟請轉一資知節云邉臣乆無立功者請重賞以激其餘議乆不決上趣之知節忿恚因面訐欽若之短既而不暇奏禀即超授懐信等官上怒謂向敏中等曰欽若等議懐信賞典堅稱與侍其旭例不同當須加等朕語之曰爵賞有勞國家不惜盖懐信來告樞宻院畧無酬奨止望依侍其旭例為幸欽若等奏當具取進止今乃並與所奏不同不具劄子亦不進巻便直劄送中書懐信與供備庫副使始則稽留不行終又擅自超擢敢以爵賞之柄髙下為己任近位如此朕須束手也又曰欽若等異常不和事無大小動輙爭競朕於臣下止可如此爾其如事君之禮人所具瞻何知節又歴詆朝列審刑審官兩制三館諫官御史都無其人其薄人厚已也如此於是三人者俱罷欽若堯叟各守本官知節以檢校太傅宣徽北院使兼副使但除防禦使尋出知潞州王旦遺事録載旦叱欽若及勸上還内事與正史不同按此時旦方出使兖州若數月前上初無罷欽若等意也上所以罷欽若等實縁不候奏禀擅除官耳不専坐對上忿爭也恐遺事録未可全信今不取取西府拜罷録陳繹所載上語具書之兵部尚書㓂凖為樞宻使同平章事王旦薦之也凖未告謝命向敏中權發遣樞宻院公事自是樞宻皆罷即命宰臣權發遣如敏中例驛召同州觀察使知鎮州王嗣宗内客省使嘉州防禦使鄜延都部署曹利用赴闕丙子詔棣州經水流民歸業者給復三年丁丑司空致仕張齊賢卒上甚悼之遣中使致祭賻以布帛五百匹粟麥稱是贈司徒諡文定齊賢四踐兩府九居八坐晩嵗以三公就第康寕福夀人罕其比然不事儀矩頗好治生再入相數起大獄又與㓂凖相傾奪人以此少之齊賢以咸平元年十月復相三年十一月罷傳所言數起大獄此固非小事而實録正史並不畧見不知何也㓂凖時又在外亦不知所稱相傾奪者何事也齊賢以右僕射奉朝請與宰相向敏中爭娶薛惟吉妻敏中坐此罷絀疑傳所稱相傾奪盖指敏中也當考戊寅秦州言定西寨山水暴漲溺死者衆詔遣使賜緡錢死者官為瘞埋仍詔祭奠庚辰上作憫農歌又作讀十一經詩賜近臣和上毎著歌詩間命宰輔宗室兩制三館祕閣官屬繼和而資政殿龍圖閣學士所和尤多至是徧詠經史三司諌官御史或預賡載若大禮慶成及酺㑹則百僚並賦其後梅洵等以館職居外任表求次韻詔寫本附驛賜之
