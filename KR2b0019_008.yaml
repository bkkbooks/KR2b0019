body:
  text: 續資治通鑑長編巻四宋李燾撰太祖乾徳元年春正月乙卯遣使九人發闗西道鄉兵赴慶州丁巳發近甸丁夫數萬修築河堤左神武統軍陳承昭䕶其役戊午遣酒坊副使河間盧懐忠氊毯使洛陽張勲實録稱張繼勲國史無繼字今從國史染院副使康延澤等帥步騎數千人並赴襄州延澤福之子也福初見天成四年己未賜江南及吳越戰馬駞羊有差庚申以山南東道節度使兼侍中慕容延釗為湖南道行營都部署樞宻副使李處耘為都監遣使十一人發安復郢陳澶孟宋亳潁光等州兵㑹襄陽以討張文表先是盧懐忠使荆南上謂曰江陵人情去就山川向背我盡欲知之懐忠使還報曰髙繼沖甲兵雖整而控弦不過三萬年榖雖登而民困於暴歛南通長沙東距建康西廹巴蜀北奉朝廷觀其形勢盖日不暇給取之易耳於是上召宰相范質等謂曰江陵四分五裂之國今假道出師因而下之蔑不濟矣壬戌李處耘辭上遂以成算授之癸亥命太常卿邉光範權知襄州戸部判官滕白為南面軍前水陸轉運使滕白未見乙丑幸造船務觀造戰船丙寅以張勲為南面行營馬軍都監盧懐忠為步軍都監丙子詔荆南發水兵三千人赴潭州己卯女真國遣使來貢方物庚辰以荆南節度副使權知軍府事高繼沖為荆南節度使楊師璠之討張文表也兵稍失利相持既久文表出戰師璠大敗之遂取潭州執文表初文表聞王師來伐潜送欵於趙璲具言奔䘮朗州為廖簡所薄因即私鬬實無反心璲自以奉詔諭文表得其歸順甚喜即遣使慰撫之師璠兵既入城縱火大掠而璲亦繼至明日饗將吏於延昭門指揮使髙超語其衆曰觀中使之意必活文表若文表至闕圖害朗州我軰無遺類矣乃斬文表於市盡臠食其肉及宴罷璲召文表超曰文表復謀為亂已斬之矣璲太息久之楊師璠以三年十月出師四年正月張文表乃成擒其間必有相持守處而史及雜記傳皆不載五代史稱師璠至平津亭文表出戰即敗之大定録亦稱未逾月師璠遂斬文表而九國志則載師璠始為文表所敗王師將至文表乃送欵朗兵因得入城竟不載師璠勝負何如並疑未得其實五代史及大定録日月太廹與事不合而九國志所云朗兵因王師得入城亦必差錯恐師璠初為文表所敗已而相持守後乃得勝於平津亭因破潭州而文表盖嘗遣使詣趙璲乞降潭州既破璲適至耳非因璲至潭州始破也是月詔無得追縣吏㑹州五代以來收税畢州符追縣吏謂之㑹州縣吏厚歛於里胥以賂州吏里胥復率於民民甚苦之也此據本志在此年此月二月甲申朔翰林學士中書舍人王著責授比部員外郎著嗜酒不拘細行嘗乗醉夜宿娼家為廵吏所執既知而釋之宻以事聞上置不問於是宿直禁中夜扣滋徳殿求見上令中使引陞殿近燭視著髪倒垂被面乃大醉矣上怒發前事黜之御史中丞劉温叟等並坐失於彈劾奪兩月俸上聞高繼沖託以供億王師貸民錢帛下詔止之丙戌天雄節度使符彦卿來朝對於廣政殿賜襲衣玉帶上欲使彦卿典兵樞宻使趙普以為彦卿名位已盛不可復委以兵柄屢諫不聼宣已出普復懐之請見上迎謂曰豈非符彦卿事耶對曰非也因别以事奏既罷乃出彦卿宣進之上曰果然宣何得在卿所普曰臣託以處分之語有未備者復留之惟陛下深思利害勿復悔上曰卿苦疑彦卿何也朕待彦卿至厚彦卿豈能負朕耶普曰陛下何以能負周世宗上黙然事遂中止髙繼沖自以年㓜未知民事刑政賦役委節度判官孫光憲軍旅調度委衙内指揮使梁延嗣謂曰使事事得中人無間言吾何憂也李處耘至襄州時慕容延釗被病詔令肩輿即戎事處耘先遣閤門使臨洺丁徳裕諭繼沖以假道之意請具薪水給軍繼沖與其僚佐謀以民庶恐懼為辭願供芻餼百里外處耘又遣徳裕徃光憲及延嗣請許之兵馬副使李景威説繼沖曰今王師雖假道以收湖湘然觀其事勢恐因而襲我景威願効犬馬之力假兵三千於荆門中道險隘處設伏候其夜行發伏攻其上將王師必自退却回軍收張文表以獻於朝廷則公之功業大矣不然且有揺尾求食之禍繼沖曰吾家累嵗奉朝廷必無此事爾無過慮况爾又非慕容延釗之敵乎景威又曰舊𫝊江陵諸處有九十九洲若滿百則有王者興自武信王之初江心深浪之中忽生一洲遂滿百數昨此洲漂沒不存兹亦可憂也光憲謂繼沖曰景威峡江一民爾安識成敗且中國自周世宗時已有混一天下之志聖宋受命凡所措置䂓模益宏逺今伐文表如以山壓卵爾湖湘既平豈有復假道而去耶不若早以疆土歸朝廷去斥堠封府庫以待則荆楚可免禍而公亦不失富貴繼沖以為然景威知計不行出而歎曰大事去矣何用生為因扼吭而死景威歸州人也繼沖遣延嗣與其叔父掌書記保寅奉牛酒來犒師且覘師之所為壬辰師次荆門處耘見延嗣等待之有加諭令翼日先還延嗣喜馳使報繼沖以無虞荆門距江陵百餘里是夕延釗召延嗣等宴飲於其帳處耘將輕騎數千倍道前進繼沖初但竢保寅延嗣之還遽聞大軍奄至即皇恐出迎遇處耘於江陵北十五里處耘揖繼沖令待延釗而率親兵先入登北門比繼沖與延釗俱還則王師已分據衝要布列街巷矣繼沖大懼即詣延釗納牌印遣客將王昭濟等奉表以三州十七縣十四萬二千三百尸來歸癸巳幸玉津園王師既收荆南益發兵日夜趨朗州周保權懼召觀察判官桂人李觀象觀象初見廣順元年謀之觀象曰凡所以請援於朝者誅張文表耳今文表已誅而王師不還必將盡取湖湘之地也然我所恃者北有荆渚以為唇齒今髙氏束手聼命朗州勢不獨全莫若幅巾歸朝幸不失富貴保權將從之指揮使張從富從富未見等不可乃相與為距守計慕容延釗使丁徳裕先路安撫徳裕至朗州從富等不納盡撤部内橋梁沈船舫伐木塞路徳裕不敢與戰退軍須朝㫖延釗以聞庚子荆南表至上復命髙繼沖為節度使遣樞宻承㫖王仁贍赴荆南廵檢辛亥以梁延嗣為復州防禦使孫光憲為黄州刺史王昭濟為左領軍衛將軍上聞李景威之謀曰忠臣也命王仁贍厚䘏其家上遣使諭周保權及將校曰爾本請師救援故發大軍以拯爾難今妖孽既殄是有大造於汝輩也何為反距王師自取塗炭重擾生聚保權為左右所制執迷不復遂進討之慕容延釗遣戰棹都監武懐節等分兵趣岳州大破賊軍於三江口獲船七百餘艘斬首四千餘級遂取岳州實録於三月初八日始書此盖用延釗奏到日也然取岳州當在二月末今移入而不書日十國紀年亦繫之二月解暉𫝊云偽統軍使黄從志以岳州拒命暉率舟師討平之生擒從志及偽將校十四人俘斬數千騎溺死者甚衆暉時為戰棹都指揮使疑此即三江口之㨗也事略不同因不别出是月遣使往澶滑魏晉絳蒲孟等州案宋史作澶滑衛魏晉絳蒲孟八州此脱去衛字開倉賑貸權知貢舉浚儀薛居正奏進士合格者八人三月張從富等出軍於澧州南與王師遇未及交鋒賊軍望風而潰李處耘逐北至敖山寨賊棄寨走俘獲甚衆處耘擇所俘體肥者數十人令左右分食之少徤者悉黥其面令先入朗州㑹暮宿寨中遲明慕容延釗繼至所黥之俘得入城悉言被擒者為王師所㗖食賊衆大懼縱火焚州城驅略居民奔竄山谷壬戌王師入朗州擒張從富於西山下梟其首賊將汪端刼周保權并家屬亡匿江南岸僧舍李處耘遣麾下將田守竒守竒未見往捕之端棄保權走守竒獲保權以歸於是盡復湖南舊地凡得州十四監一縣六十六戸九萬七千三百八十八庚午命戸部侍郎呂餘慶權知潭州辛未幸金鳳園召符彦卿等習射上七發皆中的彦卿等進馬為賀徧賜從臣馬及銀器有差癸酉吏部尚書張昭等上言凖詔徒流笞杖刑名應合該除免當贖上請外據法書輕重等第用常行杖施行令臣等詳定可否聞奏者伏以五刑之制百代所遵雖沿革之不同貴重輕之無撓仰承睿㫖别定明文俾官吏之依憑絶刑名之出入請宣付有司頒行凡流刑四加役流杖二十配役三年流三千里杖二十配役一年二千五百里杖十八配役一年二千里杖十七配役一年徒刑五徒三年杖二十二年半杖十八二年杖十七一年半杖十五一年杖十三杖刑五杖一百為杖二十九十為十八八十為十七七十為十五六十為十三笞刑五笞五十為十下四十三十為八二十為七舊據獄官令用杖至是定折杖格長行官杖長三尺五寸大頭濶不過二寸厚及小頭徑不過九分小杖不過四尺五寸大頭徑六分小頭徑五分徒流笞杖通用常行杖流罪決訖役一年加役流決訖役三年徒罪決而不役徒流皆背受笞杖皆臀受訊杖如舊制戊寅湖南㨗書至羣臣稱賀是月令州縣復置義倉官所收二税石别輸一斗貯之以備凶儉此據國史志及㑹要新舊録並無之夏四月甲申以旱分命使臣徧禱京城祠廟是夕雨徳音減荆南潭朗州死罪囚流以下釋之配役人放還蠲三年以前逋税及場院課利管内文武官吏並依舊仍加恩立功者優其秩行營諸軍厚賜之略獲生口各還其主乙酉始命刑部郎中賈玭等通判湖南諸州玭未見遣給事中李昉祭南岳尋有詔權知衡州丁亥幸國子監遂幸武成王廟宴射玉津園戊子禁湖南競渡詔自今祠祭宿齋並令儀鑾司供帳務極嚴潔庚寅出内府錢募諸軍子弟數千人鑿池於朱明門外引蔡水注之造樓船百艘選卒號水虎㨗習戰池中命右神武統軍陳承昭董其役辛邜王處訥上新定建隆應天厯上為厯序頒行之壬辰遣中使賜湖南行營將士茶藥及立功將士錢帛有差丙申兵部郎中監秦州税曹匪躬棄市海陵鹽城兩監屯田副使張藹除籍為民並坐令人齎輕貨往江南兩浙販易為人所發故也戊戌符彦卿辭歸鎮庚子以華州團練使大城張暉為鳳州團練使兼西面行營廵檢壕寨使暉前在華州治有善狀上既誅李筠將事河東召暉入覲問以計䇿暉曰澤潞瘡痍未瘳軍旅洊興恐不堪命不若戢兵育民俟富庶而後圖之上慰勞遣還於是始謀伐蜀乃徙暉鳳州暉盡得其山川險易因宻疏進取之計上覧之甚悦清源留後張漢思年老醇謹不能治軍旅事皆決於副使陳洪進漢思諸子並為牙將頗不平圖害洪進漢思亦患其専乃大饗將吏伏甲於内將殺洪進酒數行地忽大震棟宇傾側坐立者不自持同謀者懼以告洪進洪進亟出衆驚悸而散漢思事不成慮洪進先發常嚴兵為備洪進子文顯文顥俱為指揮使勒所部欲擊漢思洪進不許癸卯此據實録所載賜李煜詔書洪進䄂置大鏁從二子常服安步入府中直兵數百人皆叱去之漢思方處内閤洪進即自外鏁其門謂漢思曰軍吏以公耄荒請洪進知留務衆情不可違當以印見授漢思錯迕不知所為乃自門扇間投印與之洪進遽召將校吏士告之曰漢思不能為政授吾印矣將吏皆賀即日遷漢思外舍以兵衛送遣使請命於唐又遣牙將魏仁濟間道奉表來告漢思退居數年以夀終徐鉉江南録并九國志載洪進遣使告李煜煜即以洪進為清源節度使國史因之按煜再上表乞寢洪進恩命安得便自除洪進節度使也今不取國史又稱荆湖平洪進懼始遣魏仁濟按洪進既奪漢思印即遣仁濟告於朝不縁平荆湖也慕容延釗言辰錦溪叙等州各奉牌印請命甲辰詔重鑿砥柱三門令涇原邠慶州不得補蕃人為沿邉鎮將命磁州分閑田以處北漢降民仍賜耕牛及錢米乙巳幸玊津園閲諸軍騎射丙午以樞宻直學士戸部侍郎薛居正權知朗州賜湖南民今年茶税禁峡州鹽井辛亥貸澶州民種糧令諸州造輕車以給餽運又令諸州受民租籍不得稱分毫合勺銖釐絲忽錢必成文絹帛成尺粟成升絲綿成兩薪藁成束金銀成錢此據本志在此年此月五月壬子朔慕容延釗言唐主遣使以牛酒來犒師命近臣徧禱在京祠廟旱故也又遣中使馳驛禱於嶽瀆乙邜詔改萊州掖縣崇善鄉為義感鄉緝俗里為和順里先是里民徐承珪嘗為賛皇令歸塟父母率兄弟負土成墳園中𤓰合蔕木連理本州上言故有是命己未詔蜀邸吏將卒先在江陵者並賜緡帛遣還其國鳳翔節度使贈太傅岐元靖王王景卒辛酉命樞宻直學士尚書左丞髙防權知鳳翔府甲子髙繼沖籍伶官一百四十三人來獻詔悉分賜諸大臣乙丑命鐡騎都將李懐義内班都知趙仁璲増修宫闕懐義仁璲未見丁邜詔荆南軍士年老者聼自便戊辰以工部侍郎艾頴為戸部侍郎致仕先是上命執政擇廷臣董在京諸倉執政以班簿進頴首中選頴自以清望官不宜親濁務辭不肯為上曰惟致仕乃可免耳頴遂請老從之頴須城人也頴初見顯徳五年癸酉幸玊津園丁丑明徳門成蜀宰相李昊言於蜀主曰臣觀宋氏啟運不類漢周天厭亂久矣一統海内其在此乎若通職貢亦保安三蜀之長䇿也蜀主將發使樞宻使王昭逺固止之乃以文思使景處瑭處瑭未見等率兵屯峽路又遣使往涪瀘戎等州閱櫂手増置水軍六月乙酉詔免潭州諸縣舊例雜配之物壬辰以大熱罷京城營造賜工匠等紵衣巾履初上幸武成王廟歴觀兩廊所畫名將以杖指白起曰起殺已降不武之甚胡為受饗於此命去之左拾遺知制誥髙錫因上疏論王僧辯不克令終不宜在配饗七十二賢之列乃詔吏部尚書張昭工部尚書竇儀與錫别加裁定取功業始終無瑕者癸巳昭等共議請升漢灌嬰後漢耿純黄覇祭遵班超晉王渾周訪宋沈慶之後魏李崇傅永北齊叚韶後周李弼唐秦叔寳張公謹唐休璟渾瑊裴度李光顔李愬鄭畋梁葛從周後唐周徳威符存審凡二十三人退魏吳起齊孫臏趙亷頗漢韓信彭越周亞夫後漢叚紀明魏鄧艾晉陶侃蜀闗羽張飛晉杜元凱北齊慕容紹宗梁王僧辯陳吳明徹隋楊素賀若弼史萬嵗唐李光弼王孝傑張齊邱郭元振凡二十二人詔塑齊相管仲像於堂畫魏西河太守吳起於廡下餘升退如昭等議乙未祕書郎直史館管城梁周翰上言臣聞天地以來覆載之内聖賢交騖古今同流校其末年鮮克具美周公聖人也佐武王定天下輔成王莅阼階盛徳大勲蟠天極地外則淮夷作難内則管蔡流言㚄尾䟦胡垂至顛頓偃禾仆木僅得辨明此可謂之盡善哉臣以為非也孔子亦聖人也刪詩書定禮樂祖述堯舜憲章文武卒以栖遑捨魯奔走厄陳雖茍合於定哀曾不容於季孟又甞履盗跖之虎尾聞南子之珮聲逺惡慎名未見其可其受學之門人則宰予覆族仲由凶死此又可謂之盡善哉臣以為非也自餘區區後賢𤨏𤨏立事比於二聖曾何足云而欲責其磨湼不渝求其終始如一者臣竊以為難其人矣洎乎唐室崇奬太公厥意無他其理自顯盖以天下雖大不可去兵域中有争未能無戰資其佑民之道立其為武之宗覬張國威遂進王號貞元之際祀典益修因以歴代武臣陪饗廟貎如文宣釋奠之制有弟子列侍之儀事雖不經義足垂勸况於曩日不乏通賢詰難討論亦云折中今若求其義類别定否臧以羔袖之小疵忘狐裘之大善恐其所選僅有可存只如樂毅亷頗皆奔亡而為虜韓信彭越悉葅醢而受誅白起則賜劍杜郵伍員則浮屍江澨左車亦奔軍之將孫臏實刑餘之人穰苴則憤卒齊庭吳起則非命楚國周勃稱重有置甲尚方之疑陳平善謀䝉受金諸將之謗亞夫則死於獄吏鄧艾則追於檻車李虎通中廣後期而自剄竇金陳廡嬰植黨而䘮身鄧禹敗於回溪終身無董戎之寄馬援死於蠻徼還尸闕遣奠之儀其餘諸葛亮之儔事偏方之主王景略之輩佐閏位之君闗羽則為仇國所擒張飛則遭帳下所害凡此名將悉皆人雄茍欲指瑕誰當無累或從澄汰盡可棄捐况其功業穹隆名稱烜赫樵夫牧穉咸所聞知列將通侯竊所歸慕若一旦除去神位擯出祠廷吹毛求異代之非投袂忿古人之惡必使時情頓惑竊議交興景行髙山更奚瞻於往躅英魂烈魄將有恨於明時伏見陛下方勵軍戎將遏亂略講求兵法締創武祠盖所以勸激武臣資假隂助忽使長廊虚邈僅有可圖之形中殿前空不具配食之坐似非允當臣竊惑焉深惟事貴得中用資體要若今之可以議古恐來者亦能非今願納臣㣲忠特追明勅從新議則恐泥仍舊貫則稍優或以矛盾相違攻拒異効即乞下臣此疏廷議其長於所執衆寡之中即厥理是非可見上以升降之制有所懲勸不報詔荆南兵願歸農者聼官為葺舍給賜耕牛種食願留者分𨽻復郢州為剰員丙申令有司三嵗一舉先代帝王祀典各以功臣配饗髙辛堯舜禹湯文武漢髙祖皆因其故廟又别建漢世祖廟於南陽唐太宗廟於醴泉世祖以鄧禹吳漢賈復耿弇配太宗以長孫無忌房元齡杜如晦魏徵李靖配並畫像廟壁丁酉命王仁贍權知荆南軍府事已亥潭濮曹絳等州言有飛蝗在野各命其長吏祭以牢醴後皆言蝗不為災庚子羣臣三上表請舉樂從之詔兵部禮部每嵗所補千牛進馬太廟郊社齋郎舊左右仗千牛十二員各令減二員齋郎每嵗以十五員為額取年貎合格誦書精熟者覆試不如所奏主司坐之自令臺省六品諸司五品登朝第二任方得補䕃五府少尹不在此限進馬員數當考録史㑹要俱闕先是上命典軍列校遥領湘南諸郡不逾嵗果得其地辛丑復以龍㨗左廂都指揮使岳州防禦使夏津馬仁瑀仁瑀初見顯徳元年等為漢彭諸州防禦使丙午分命中使謝嶽瀆雨足故也以久雨賜諸軍薪蒸有差太常博士和峴上言䄍者臘之别名聖朝以戍日為臘而前日辛夘行䄍禮非是按唐貞觀中以前寅䄍百神夘日祭社稷辰日臘饗宗廟開元定禮三祭皆於臘辰以應土徳或從貞觀或從開元惟上所擇有司請依開元禮三祭同用戌臘日從之峴凝之子也唐主雖通職貢然亦增修戰備己酉命鎮國節度使宋延渥帥禁旅數千習戰於新池上數臨觀焉庚戌命大理正奚嶼嶼未見知館陶縣監察御史王祜知魏縣楊應夢知永濟縣應夢未見屯田員外郎于繼徽繼徽未見知臨清縣常参官知縣自嶼等始也時符彦卿久鎮大名専恣不法屬邑頗不治故特選彊幹者往莅之其後右賛善大夫周渭亦知永濟彦卿郊迎渭揖於馬上就館始與彦卿相見略不降屈縣有盗傷人而逸渭捕獲暴其罪斬之不以送府渭恭城人也先是為白馬主簿縣大吏犯法渭即斬之上竒其才故擢右賛善大夫渭知永濟不知何時按實録此年十二月癸亥以主客員外郎董樞權知臨清縣國子博士王仁濟知魏縣王祜與于繼徽到任才半年耳已除替人則楊應夢未必久居永濟或渭即繼應夢之後而實録失不復載也既不的知其日月因附見於此諸書皆言朝官知縣自奚嶼等始按實録建隆二年十一月己丑以祠部郎中王景遜為河南令職方員外郎邉珝為洛陽令左司員外郎叚思恭為開封令駕部員外郎劉渙為浚儀令代盧振張文遂邉玗宋彦昇等不知何故諸書乃言知縣始此豈令與知縣不同乎當考秋七月辛亥朔詔定州縣官當直人數案宋史作定州縣所置雜職承符㕔子等名數癸丑令諸州長吏常按視倉庾無令損敗甲寅以湖南死事將校子弟三十人為殿直監修國史王溥又上新修梁後唐晉漢周五代㑹要三十巻丙辰幸新池賜役夫錢遂幸玉津園丁巳安國節度使王全斌言與山西都廵檢使洺州防禦使郭進趙州刺史陳萬通萬通未見鎮州兵馬鈐轄登州刺史髙行本行本未見客省使曹彬等率兵入北漢界獲生口數千人來獻詔釋之仍各賜錢米彬靈夀人初見顯徳五年其從母為周太祖貴妃上典宿衛尤器重彬彬非公事未嘗謁上平居燕㑹亦罕與上即位自晉州都監召彬入見謂曰我疇昔欲親汝何故疎我彬頓首謝曰臣周室近親列職禁庭安敢交結尊貴上益嘉奬焉戊午頒量衡於澧朗諸州懲割據厚歛之弊也唐鄧之俗家有病者雖父母亦棄去弗省視故病者輙死武勝節度使張永徳請嚴刑禁之又請以節度推官代牙將領馬歩都虞候事上嘉其意已未降詔褒荅舊録以為觀察使張永錫奏請盖誤也初永徳母馬氏被出適安邑人劉祚永徳之治鄧也祚已卒迎歸奉養及於州廨特建二堂左則繼母劉氏居之右則馬氏居之永徳每晨起詣二堂問安祚子再思即永徳同母弟也署子城使於南陽城中起大第聚劉氏之族仍市田給之及劉氏卒馬氏得入謁禁中時年八十餘矣太宗親勞問之封莒國太夫人壬戌以涇城縣令叚滔為國子博士知縣事以縣尉張又元為元城縣令初行捕盗之賞也命左拾遺知寃句縣事侯陟監本縣屯兵未浹日又命為淮南轉運使癸亥以湖南疫賜行營將士藥王師既平湖湘知溪州彭允林前溪州刺史田洪贇等列狀求内屬己丑以允林為溪州刺史洪贇為萬州刺史允林尋卒命其子師皎代之丁邜幸武成王廟遂幸新池觀習水戰己巳權知朗州薛居正言賊將汪端領數萬人冦州城都監尹重睿擊走之尹重睿未見賜荆南管内民今年夏租之半甲戌周保權詣闕待罪詔釋之以為右千牛衛上將軍乙亥命増築朗州城浚其壕賜管内民今年夏租丁丑分命近臣於京城祠廟禱雨戊寅以定江都指揮使田漢瓊為錦州刺史漢瓊未見已邜判大理寺事竇儀等上重定刑統三十巻編敕四巻詔刋板模印頒天下先是頗有上書言刑統條目之不便者儀因建議請别商𣙜即命儀及權少卿武功蘓曉正奚嶼丞張希遜與刑部大理法直官陳光乂馮叔向等同撰集之儀等参酌輕重時稱詳允希遜光乂叔向未見北漢宿衛殿直行首王隠劉詔趙巒等謀叛事覺被誅其辭連樞宻使叚常北漢主出常為汾州刺史尋縊殺之初北漢主寵姬郭氏醫僧之女也僧嘗與婺婦通而生姬有殊色北漢主嬖之將立為妃常謂所出非偶恐貽笑隣國北漢主乃止姬之昆弟姻戚又多抑而不用故諸郭咸怨因譛殺常常死非其罪國人憐之以司徒兼門下侍郎平章事趙𢎞兼樞宻使吏部侍郎叅議中書事郭無為為左僕射兼中書侍郎平章事無為與𢎞不協北漢主出𢎞為汾州刺史無為兼樞宻使軍國之務一以委焉無為又譖𢎞在汾州不治徙嵐州按國史趙文度𫝊天㑹四年文度自翰林學士承㫖兵部尚書為中書侍郎平章事轉門下侍郎兼樞宻使加司徒久之與郭無為不協乃出知汾州而九國志文度𫝊云劉崇建國即拜中書侍郎平章事又不載其後所遷門下司徒等官止於世家載文度以學士為兵部尚書平章事兼樞宻使郭無為同執政而無為𫝊又稱文度與無為不協既出知汾州叚常乃被殺國史亦同按崇初建國鄭珙趙華為相非文度也出知汾州亦不在叚常被殺之前國史及九國志皆誤五代史及九國志乂以常被殺在天㑹五年七月亦誤也今並從十國紀年八月庚子朔詔以冬至有事於南郊既而有司言冬至乃十一月晦前一日皇帝始郊不應近晦請改用十六日甲子詔可太祖乾徳元年初郊有司以冬至廹近晦日請用十一月十六日甲子按章得象所編三朝㑹要初不及此而王珪等所編五朝㑹要始載近晦事盖五朝㑹要得之於姚闢所修太常因革禮而因革禮所載實得之宋敏求敏求春明退朝録云歐陽修提總修太常因革禮遣姚闢見問建隆四年南郊改元乾徳是嵗十一月二十九日冬至而郊禮在十六日何也乃檢日歴其赦制云律且協於黄鍾日正臨於甲子盖避晦而用十六日按敏求止云避晦而因革禮五朝㑹要則皆云逼近晦日今據長歴是年十一月晦亦在三十日如此則不當云避晦春明退朝録誤也然敏求又云皇祐二年當郊而冬至復在晦宋庠遂建明堂之議敏求既援此以言則乾徳皇祐似是一例疑歴家當時亦有所避故特移晦於三十日其實當在二十九日也因革禮及五朝㑹要遂承用之不然此事本自敏求發明不應乃爾誤湏通歴算者細考之熙寧三年八月癸亥呂大防議天聖三年後注互可参考郊天之禮唐制每嵗冬至圜丘正月上辛祈榖孟夏雩祀季秋大享凢四祭昊天上帝親祀則并設皇地祇位國朝因之作壇於國城之南南薫門外每嵗令有司奉事於南郊其祭皇地祇及神州地祇亦因唐制皇地祇祭以夏至作方丘宮城北十四里神州地祇祭以孟冬别為壇於北郊云太常博士和峴言祭不欲數今十一月十六日親祀南郊請權停二十九日南至之祀從之壬午殿前都虞候嘉州防禦使張瓊自殺瓊性麤暴多所陵轢時軍校史珪石漢卿等方得幸瓊輕目為巫媪珪漢卿銜之切齒瓊嘗擅選官馬乗之又納李筠僕從於麾下珪漢卿因譖瓊養部曲百餘人自作威福禁旅畏懼且誣毁皇弟光義為殿前都虞候時事時上已下郊祀制書方欲肅静京都召瓊面訊之瓊不伏上怒令撃之漢卿即奮鐡檛擊其首氣垂絶乃曵出遂下御史府按鞫瓊自知不免行至明徳門觧所繋帯以遺母即自殺上旋聞其家無餘資止有奴三人甚悔之責漢卿曰汝言瓊部曲百人今安在漢卿曰瓊所養者一敵百耳亟命優䘏瓊家官給塟事以瓊子尚㓜乃擇其兄進為龍㨗副指揮使然亦不罪漢卿珪洛陽人漢卿孟州人也新録及國史并宋白所為瓊𫝊並云獄具乃賜死於城西井亭今從舊録疑新録與國史及宋白或加潤餙也珪國初為御馬直隊長四遷馬步副都軍頭兼控鶴弓弩大劍都指揮使開寳六年加都軍頭毅州刺史漢卿附司超𫝊開徳初補散員指擇使改殿前指揮使都虞候袁州刺史此史所載兩人官職漢卿不言國初所拜官職疑脫略又不知當此時兩人官職果如何故總目曰軍校更竢考之實録建隆三年十二月甲辰以前羽林將軍史珪為右神武將軍癸未司徒兼侍中范質為南郊大禮使翰林學士承㫖禮部尚書陶榖為禮儀使吏部尚書張昭為鹵簿使御史中丞劉温叟為儀仗使皇弟開封尹光義為橋道頓遞使南郊五使唐自元和以前史籍不載長慶後禮儀使太常卿為之大禮使御史中丞為之哀帝時中丞為儀仗使而不載大禮使梁以河南尹為大禮使餘二使如故又有儀仗法物二使以武將為之後唐以宰相為大禮使兵部尚書為禮儀使御史中丞為儀仗使兵部侍郎為鹵簿使開封尹為頓遞使周唯以禮儀歸太常餘如故今依唐制大禮儀仗頓遞用宰相及臺丞京尹餘使則以學士及他尚書為之而頓遞使又增橋道之名唐復有禮儀判官五代有大禮副使判官修裝法物使今皆不置而命内臣與諸司同修飾法物云龍㨗左廂都指揮使漢州防禦使馬仁瑀嘗私以士屬知貢舉薛居正居正實不許而陽諾之及聞喜宴日仁瑀乗醉携所屬士慢罵居正御史中丞劉温叟劾奏仁瑀上雖怒曲為容忍龍㨗右廂都指揮使彭州防禦使王繼勲皇后母弟也挾勢驕倨多凌蔑將帥人皆側目引避仁瑀獨與抗相忿争輙攘臂欲毆繼勲繼勲憚其勇頗為屈而怨隙愈深於是受詔都試郊外兩人因欲相圖隂勒所部兵私市白梃上㣲聞其事即詔罷講武甲申出仁瑀為宻州防禦使置繼勲不問以泰州團練使潘美為潭州防禦使南漢人數冦桂陽及江華美擊走之溪洞蠻獠自唐末之亂不供王賦頗恣侵掠為居民患美帥兵深入窮其巢穴斬首百餘級餘黨散潰美悉令招誘貸其罪以已俸市牛酒宴犒賜金帛慰撫之夷落遂定潘美以甲申除防禦使此事當在後今附見丙戍遣給事中劉載朝拜安陵丁亥王全斌言復與郭進曹彬等帥師攻北漢樂平縣降其拱衛指揮使王超超未見等及所部兵一千八百人北漢侍衛都指揮使蔚進馬軍都指揮使郝貴超等悉蕃漢兵來救三戰皆敗之遂下樂平即建為樂平軍九國志言郝貴超被擒按貴超明年復戰遼州盖誤也今不取先是上命唐主發遣揚州戸口及周顯徳以來將吏隔在江南者唐主遣使請緩期戊子許之國史載戊子初命李煜發遣誤也今從實録辛卯以北漢樂平降兵為效順軍賜錢帛有差壬辰詔禮部貢院所試九經舉人落第宜依諸科舉人例許令再試癸巳女真國遣使來貢名馬丙申北漢静陽等十八寨首領相帥來降泉州陳洪進遣使朝貢齊州言河決己亥幸造船務幽州岐溝闗使柴庭翰等來降丁未詔蠲登州沙門島居民租賦令専治舟渡女真所貢馬戸部侍郎呂餘慶母清河郡太君吳氏卒餘慶時權知襄州詔遣中使䕶䘮送終之具並官給焉餘慶尋起復本官是月唐主以吏部尚書建安游簡言知尚書省事尋遷右僕射此據大定録及江南録九月庚戌朔戸部判官南面軍前水陸轉運使滕白坐軍儲損敗免所居官甲寅羣臣三上表請加尊號曰應天廣運仁聖文武從之登州言髙麗國王昭遣使時賛等入貢渉海值大風船破從人溺死者九十餘人賛僅而獲免詔勞䘏之詔開封府選樂工八百三十人權𨽻太常寺習樂將行郊祀之禮也詔始聞諸州府長吏多以僕從之人干預公事自今禁止之丙寅大宴廣政殿始作樂丁夘宣徽南院使兼樞宻副使李處耘責授淄州刺史荆湖之役處耘以近臣䕶軍臨事専斷不顧群議初至襄陽衢肆鬻餅餌者率減少倍取軍士之直處耘捕得尤甚者二人送慕容延釗延釗怒不受往復三四處耘遂命斬於市以徇延釗所部小校司義舍於荆州客將王氏使酒兇恣王氏愬於處耘召義訶責義又譛處耘於延釗至白湖處耘望見軍士入民舍良久舍中人大呼求救遣捕之則延釗圉人也乃鞭其背延釗怒斬之由是大不協更相論奏上以延釗宿將赦其過止罪處耘處耘亦恐懼不敢自明戊辰幸金鳳園女真國又遣使貢名馬丙子詔禮部貢舉人自今朝臣不得更發公薦違者重寘其罪故事每嵗知舉官將赴貢院臺閣近臣得保薦抱文藝者號曰公薦然去取不能無所私至是禁止慕容延釗言獲汪端磔於朗州市端初攻州城不克與其黨聚山澤為盗監軍使疑城中僧千餘人謀應端悉捕繋欲誅之薛居正以計緩其事因督衆剪滅群盗生擒端而詰之僧無與謀者皆得全活先是詔募諸軍子弟數千人引五丈河造西水磑以八作使趙遂遂未見領其役戊寅磑成上親臨視賜丁夫錢本志稱乾徳三年誤也是月北漢主誘契丹兵攻平晉軍命洺州防禦使郭進濮州防禦使張彦進彦進未見客省使曹彬趙州刺史陳萬通領歩騎萬餘往救之未至一舍北漢引兵去國史契丹𫝊載此事在杜延滔以遼州來降之後今從新録及本紀郭進御軍嚴而好殺部下整肅每入北漢境無不克㨗上時遣戍卒必諭之曰汝輩當謹奉法我猶赦汝郭進殺汝矣嘗選御馬直三十人𨽻進麾下押陣屬與北漢人戰往往退怯進斬十餘人奏至上方閲武便殿厲聲曰御馬直千百人中始得一二人少違節度郭進遽殺之誠如此壟種徤兒亦不足供矣乃潜遣中使諭進曰恃其宿衛親近驕倨不禀令戮之是也進感泣嘗有軍校詣闕訴進不法事上謂近臣曰所訴事多非實盖進御下嚴甚此人有過畏懼而誣罔之耳即命執以與進令自誅之進方奉表謝㑹北漢入㓂進謂其人曰汝敢論我信有膽氣今捨汝罪汝能掩殺此㓂則薦汝於朝如敗便可往降勿復來也軍校踴躍聼命果立功而還進奏乞遷其職上悦而從之冬十月己夘朔徳州刺史何隠擅發省倉給軍士判官郭象飛表上言按騐得實乃責隠為亳州别駕擢象權知徳州庚辰詔諸州版簿戸帖戸鈔委本州判官録事掌之舊無者創造始令諸州嵗所奏戸帳其丁口男夫二十為丁六十為老女口不湏通勘據本志丁口事當在此年不得其月日今附見癸未亳州䝉城縣令朱英奪兩任官先是英自通事舍人出為縣令上言願與同列王信等校其能既而宣賛不及信等故黜之令襄州盡索湖南行營諸軍所掠生口遣吏分送其家放潭邵州鄉兵數千人歸農減江陵府民舊租之半吏部尚書張昭上新撰名臣事迹五巻詔藏史館己丑以前鼎州節度掌書記李觀象為左補闕嘉其始謀歸順也己亥畋近郊丁未吳越王俶遣其子惟濬入貢助南郊翰林學士中書舍人扈䝉以僕夫扈繼逺為從子屬之同年生淮南轉運使仇華使釐務繼逺盗官鹽事發戊申䝉坐奪金紫黜為左賛善大夫是日畋近郊魏仁濟以陳洪進表至洪進自稱清源節度副使權知泉南等州聼命於朝上先遣通事舍人王班齎詔撫諭十一月丁巳賜唐主詔具言所以納洪進之意且將授旄鉞也王班未見庚申皇弟開封尹光義為南郊御營使殿前都指揮使韓重贇為儀仗都部署殿前都虞候揚義副之義瀛州人也癸亥饗太廟是夕隂晦至夜分開霽上初詣太廟乗玉輅左諌議大夫崔頌攝太僕上問儀仗名物甚悉頌應對詳敏上大悦甲子合祭天地於南郊以宣祖配還御明徳門大赦改元抵法人及沒配所者許歸塟蠲建隆三年以前逋欠官物開國以來將校死事者録其子孫群臣奉冊上尊號於崇政殿先是上謂大禮使范質曰中原多故百有餘年禮樂儀制不絶如綫今幸時和嵗豐克舉禋祀報神資乎備物卿與五使宜講求遺逸遵行典故無或廢墜副朕寅恭之意焉於是質等相與討尋故事時官籍㪚落舊吏皆物故惟得天成中南郊鹵簿字圖考以今文頗為踈略其相違戾者亦多質等遂詳定新本曰南郊行禮圖又令司天監定從祀星辰圖上之又言唐韋縚為太常卿知禮儀事又杜鴻漸楊綰並以太常卿為禮儀使其職一也凖儀注以禮儀使賛導而開元禮合用太常卿今請並置分左右前引又饗廟郊天從祀群官合前七日受誓戒於尚書省今併於一日受之有虧誠慤望令分日各誓百官並從之將升壇有司具黄褥為道上曰朕潔誠事天不必如此命撤之還宫將駕金輅顧左右曰於典故可乗輦否左右對以無害乃乗輦初有司議配饗請以僖祖升配張昭獻議曰隋唐以前雖追立四廟或六七廟而無徧加帝號之文梁陳南郊祀天皇配以皇考北齊圜丘祀昊天以神武升配隋祀昊天於圜丘以皇考配唐正觀初以髙祖配圜丘梁太祖郊天以皇考烈祖配恭惟宣祖積累勲伐肇基王業伏請奉以配饗從之丙寅唐主遣使來助祭南郊及賀冊尊號賜文武近臣襲衣金帯器幣鞍馬有差詔防禦團練刺史州舊有都督府號者並停仍為上州壬申以南郊禮成大宴廣徳殿號曰飲福宴自是為例上謂宰相曰北門深嚴當擇審重士處之范質曰竇儀清介謹厚然在前朝已自翰林遷端明今又為兵部尚書難於復召上曰禁中非此人不可卿當喻朕意勉再赴職癸酉復命儀為翰林學士時宰相有欲復用杜韡者質曰近王著以酒失罷去韡之酣醟尤甚於著豈當復用耶乃止乙亥畋近郊初上將有事於南郊命沿邉諸將分道略北漢境磁州刺史晉隰等州都廵檢使孟人李謙溥謙溥初見顯徳元年與鄭州防禦使孫延進延進未見絳州防禦使沈維深維深未見通事舍人王睿王睿未見等帥師出隂地以謙溥為先鋒㑹霍邑謙溥因畫攻取之䇿延進等不能用軍還至白壁闗谷口謙溥又曰敵必乗我後當整衆備之延進又弗聼謙溥獨令所部擐甲俄頃追騎至延進等狼狽入谷中謙溥麾兵拒戰北漢人乃退謙溥尋遷隰州刺史都廵檢使如故據實録謙溥以此年二月乙未為磁州刺史本傳云是年即移隰州而實録不載明年三月辛夘乃書以磁州刺史韓倫為亳州團練使右衛將軍白庭誨知磁州不知謙溥果用何月日移隰州今并附見於十一月南郊之後又按新録於開寶五年四月甲辰始書以濟州團練使李謙溥為晉隰等州都廵檢與周勲責官事相接而舊録無之盖謙溥凡兩代隰州其先即此時其後乃代周勲新録偶遺其初但記其後耳十二月庚辰殿前散祗候李璘殺員寮陳友於市璘自言復父仇有司鞫實開運末友乗敵犯邉殺璘父及其家四人上壯而釋之辛巳以甲子赦書進群臣階勲爵邑有差司徒兼侍中蕭國公范質改封魯國公癸未荆南節度使高繼沖為武寧節度使先是繼沖表乞陪祀許之因舉族歸朝乃命易鎮甲申皇后王氏崩后初寢疾翰林醫官王守愚進藥不精審疾遽加劇守愚坐減死流海島己亥以殿中侍御史鄭起為西河令起不知何許人輕俊無檢操顯徳末為殿中侍御史見上握禁兵有人望乃貽書范質極言其事質不聼嘗遇上於路横絶前導而過上初不問於是出掌泗州市征刺史張延範官檢校司徒吏輙呼以太保起貧常乗騾一日從延範出近郊延範揖起行馬起曰此騾也安用過呼延範深銜之宻奏起嗜酒廢職起坐左遷右拾遺浦城楊徽之亦嘗言於世宗以為上有人望不宜典禁兵上即位將因事誅之皇弟光義曰此周室忠臣也不宜深罪於是亦出為天興令楊徽之與鄭起同出據實録及本傳事則取記聞陳洪進遣使來朝貢庚子尚書左丞髙防卒於鳳翔上甚悼惜之賜其子太府寺丞緒詔曰爾父有幹蠱之才懐匪躬之節朕所倚毗遽兹淪亡聞之衋傷不能自己矧素尚清白諒無餘貲殯殮所湏特宜優䘏今遣供奉官陳彦珣部署歸塟西洛凢所費用並從官給防性沈厚守禮法所踐歴皆有能名亦當世之循吏也癸卯唐主以表言陳洪進首䑕兩端不可聼乞寝其旄鉞上復以詔諭之唐主乃聼命李煜乞寢陳洪進恩命止此一表耳國史乃有二表先在建隆三年後在建隆四年其稱三年者誤也今不取大抵國史洪進𫝊誤特甚乙巳唐主上表乞呼名詔不允禁道州調民取朱砂除衡岳州二税外所賦米并毋得發民烹銅銚及作炭遣内客省使曹彬通事舍人王繼筠繼筠未見分詣晉潞州與節度使趙彦徽李繼勲㑹兵入北漢境攻其邉邑及遼石州閏十二月己酉朔命太常寺考翰林醫官藝術黜其不精者凢二十二人甲寅命近臣祈雪於在京祠廟乙卯山南東道節度使贈中書令河南郡王慕容延釗卒上雅與延釗友善常兄事之及即位猶呼為兄延釗寢疾上自封藥以賜聞其卒哭之慟禮官言為近臣發哀哭聲宜有常上曰吾不知哀之所從出也龍㨗軍校王明詣闕獻陣圖請討幽州上嘉之賜以錦袍銀帯錢十萬明未見或言上將北征大發民餽運河南民相驚逃亡者四萬家上憂之丙寅命樞宻直學士薛居正馳𫝊招集踰旬乃復故居正傳稱車駕將親征太原大發民餽運故民逃亡按此時不聞有親征之議盖𫝊誤也今略刪修庶不失事實丁卯召翰林學士中書舍人於内殿覆試吏部郎中應㧞萃科田可封孫邁宋白譚利用上臨軒觀之試畢稱㫖以利用為右拾遺白為著作佐郎各賜襲衣犀帯利用加賜銀鞍勒馬可封邁授赤縣尉白大名人也可封邁利用未見周世宗始征淮南之嵗宣祖崩塟於安陵安陵在京城東南隅辛未命司天監浚儀趙修已修已初見乾祐元年内客省使王仁贍等改卜於西京鞏縣西南四十里鄧封鄉南訾村乙亥詔乗輿所服冠冕去珠玊之飾永安節度使折徳扆言敗北漢軍數千人於府州城下獲其衛州刺史楊璘國朝因唐制每嵗四郊迎氣及土王日祀五方上帝以五人帝配五官三辰七宿從祀於是國子博士聶崇義上言皇家以火徳上承正統膺五行之王氣纂三元之命厯恭尋舊制存於祀典伏請奉赤帝為感生帝每嵗正月别尊而祭之事下尚書省集議如崇義奏有司約隋制感生帝為壇於南郊髙七尺廣四丈奉宣祖升配牲用騂犢二玉用四圭有邸幣如方色常以正月上辛奉祀感生帝者即五方上帝之一也丙子詔一品致仕官曽帯平章事者每遇朝㑹宜綴中書門下班先是太子太師致仕侯益等陪郊祀上以耆舊待之禮與丞相均仍降是詔初北漢主嗣位所以事契丹者多略不如世祖時每事必禀之劉旻廟號世祖於是契丹遣使持書來責其略曰爾先人窮來歸我我先兄天授皇帝待以骨肉洎余繼統益修前好爾父即世我用命爾即位柩前丹青之約我無所負爾父據有汾國七年止稱乾祐爾不遵先志輙肆改更李筠包藏禍心捨大就小無所顧慮姑為覬覦軒然舉兵曽不我告叚常爾父故吏本無大惡一旦誣害誅及妻子婦言是聼非爾而誰我務敦大義曲容瑕垢父子之道所不忍渝爾宜率徳改行無自貽伊戚也北漢主得書恐懼遣使重幣往謝契丹執其使不報北漢主再遣使修貢契丹又執其使不報北漢地狹産薄又嵗輸契丹故國用日削乃拜五臺僧繼顒為鴻臚卿繼顒故燕王劉守光之子守光死以孽子得不殺削髪為浮圖後居五臺山為人多智善商財利世祖頗倚頼之繼顒能講華嚴經四方供施多積畜以佐國用五臺當契丹界上繼顒常刷其馬以獻號添都馬嵗率數百疋又於栢谷置銀冶募民鑿山取鑛烹銀北漢主取其銀以輸契丹嵗千斤因即其冶建寳興軍静海節度使吳昌文卒昌文初見顯徳元年正月其叅謀吳處玶峯州刺史橋知佑武寧州刺史楊暉牙將杜景碩等争立交阯十二州大亂㓂盗羣起始楊庭藝為静海節度使遣牙將丁公著攝驩州刺史公著死子部領繼之於是部領與其子璉同帥兵三萬人擊破處玶等境内以安遂自立為萬勝王以璉為静海節度使遣使告南漢南漢主因而授之十國紀年丁部領自稱萬勝王以其子璉為静海節度使告南漢乃乾徳三年事今併書之
