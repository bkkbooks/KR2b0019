body:
  text: 續資治通鑑長編卷三百九十一宋李燾撰哲宗元祐元年十一月乙卯朔户部言金部員外郎范諤等狀自奉行官制應陳乞酬奬並係太府寺依條取㑹官物收附指定名目保眀申本部本部勘驗關司勳勾覆近准朝㫖將五曹寺監應干錢榖財用以類相從合關申並歸户部即諸色人酬奬難以却令本寺主行欲乞自降新格已前該酬奬人太府寺施行即行結絶自指揮後更不下本寺保眀只委本部審㑹庶免留滯衝改元豐指揮從之蘇軾三月內曾有申請禮部言將來冬至節命婦賀太皇太后比附坤成節例改箋為表從之故事冬至百官皆上表賀皇帝崇政殿說書程頥建言神宗喪未除節序變遷時思方切恐失居喪之禮無以風化天下乞改賀為慰不從頥言附見丙辰詔吏部選在部大使臣年五十五以下曾經親民兩任內邊任一任成資以上不曾犯贓私罪情重有本路經略安撫轉運提刑總管三人以上同罪奏舉者具歷任申赴樞密審察人材參較選定上簿候有闕與在院人衮同取㫖定差其三路京東路鈐轄都監並只差內臣一員如未有可選之人即權於前班內差先是內臣莊院使梁安禮等自陳歷任乞附朝廷差遣故有是命刑部言大理寺狀見勘百姓王秉告梢工趙僧等私載物貨按綱船載私物眀破二分蓋慮不容私載則必於官物為弊若稍有過數便許人陳告給賞綱運人兵實受其弊欲請罷告賞條仍將見勘公事依自首法本部看詳嘉祐勑無告賞之文熙寧勑惟立新錢綱告賞之法欲并依所請從之蘇軾奏議有可考自張璪罷中書侍郎久未補人吕公著言吕大防忠實可任大事退而上奏曰檢㑹官制以前中書宰臣二員參知政事二員今雖分三省事多同呈然機務之本並在中書犬馬之齒六十有九多病早衰精力不逮難以獨當繁務伏望出自宸衷早賜選差中書侍郎一員庶寬聖慮不至瘝曠上又以手札問公著曰卿前日言劉摯可作執政緣未曾作尚書恐無此體例欲且除尚書卿更詳度并此文字同進來公著奏曰國朝自中丞入二府者如賈昌朝張忭趙概馮京等例甚多近年蔡確不曾歷直學士以上職自權中丞除參知政事又章獻垂簾初聞姜遵徑直自散諫議大夫擢樞密副使當時謂之薑擦子兼新定官制御史中丞在樞密直學士諸行侍郎之上摯遂自中丞入輔公著又因奏言此後有孫覺李常胡宗愈皆可用上深以為然覺常竟不致執政而卒戊午朝請郎試御史中丞劉贄為中大夫尚書右丞中大夫尚書左丞吕大防守中書侍郎吏部侍郎兼侍讀傅堯俞為御史中丞仍兼侍讀先是右司諫王覿言臣竊以賞罰者大公之器也重輕豫奪之間不可以不審茍重輕不倫豫奪失當則非所謂大公而無以示懲勸於天下詩云周道如砥其直如矢君子所履小人所視謂均平而無偏曲也臣伏見向者東南郡縣緣根究逃絶户而增稅受賞者朝廷察知其弊故李琮降黜而今年七月十三日勑應因李琮奏請被差根稅官更不酬賞已酬賞者吏部根究追奪此有以見朝廷深恤民隱不忍使貪競欺罔之吏盜取恩賞以蠧害無辜之民也然臣所未諭者彼緣市易冒賞之人朝廷亦察知其姦矣乃獨吕嘉問降知淮陽軍而其餘冒賞者並無追奪指揮竊聞言事官亦頗有論列而久未行遣公論深以為疑夫根稅之患止於東南而所增之稅皆入於縣官尚可以還於民也其賞大率不過堂除優便先次差遣之類而已有得以轉官循資者少矣市易之患被於天下破民之産而利皆歸於牙儈胥徒不可以復還於民也其賞至於轉官升任分取息錢者莫知其數矣夫為患之狹且淺而冒賞之少者即行追奪為患之廣且深而冒賞之多者即置而不問其輕重不倫豫奪失當者如此則果何以示懲勸於天下哉或謂今年七月八日詔書既宣示中外以蕩滌隱疵濶略細故矣今冒賞者復行追奪則豈詔書之意哉臣竊以為不然夫前日詔書之所恕者隱疵細故而已今市易之患遍於天下凡富商大姓破家竭産而棄妻鬻子者道路相望也賴聖慈矜察無辜蠲放逋缺濵於死亡之民復有生意其虛增息錢欺罔之吏緣詔書而不治其罪可矣至於冒受爵賞豈詔書之意耶假如有詔書之前妄冒取官俸詐欺取民財者今日發露而有司治之則豈可引詔書而不行追理也兼契勘今年七月十三日敕根稅官酬賞追奪係七月十二日聖㫖指揮亦在七月八日手詔之後即是追賞與詔書兩不相妨事理明白臣乞朝廷指揮有司緣市易而冒賞者依根稅官體例追奪以慰公議貼黃言臣伏見前日朝廷行法之初其意未嘗不善也皆因姦吏營私以亂法意浸以為患故如根究逃絶之法本以杜絶走移正稅而姦吏為之乃使民無故而增稅市易之法本以平物價而姦吏為之乃使民無故而破産使民增稅使民破産非欲以利國家其意在於求賞而已今朝廷既見姦吏之情狀矣與其保全姦吏而朝廷受其惡名不若盡正姦吏之罪使天下後世知前日之害民者非朝廷立法之本意且有以為姦吏之戒也其罪既以纍經赦宥而恕之則所冒之賞自當追奪豈不愈於置而不問也又言臣訪聞市易本錢約一千二百萬貫其法每嵗收息錢二分市易官以收息之多嵗嵗被賞行之一十五年之間若收息皆實則子本自當數倍矣今勾收還官及别作支用者僅足本錢而已蓋姦吏恣為欺罔凡支錢出外未見增耗買物入官未經變賣並先計息而取賞既以得賞之後物貨損惡本錢虧損則皆上下相䝉而不復根究故朝廷有得息之虛名而姦吏有冒賞之實弊也其京師市易與諸路市易論賞實異有不可以一槩施行者乞指揮有司詳為區别又言凡堂除先次等酬奬不惟微薄兼內有因授差遣已經用過者理難追奪外惟有升任轉官循資請過俸給亦乞聖慈特與除放夫有所奪以其過甚而不得已也有所不奪以其微細而足以示朝廷寬大之恩也臣兼訪聞根稅酬奬內先次指射等恩例亦有因授差遣已經用過者臣未委吏部如何追奪若别未有法亦乞指揮依此施行覿章在十月二十八日今附此於是詔户部自置市易已來應官員吏人以收息被賞轉官减年磨勘升任循資之類己未收使具職位姓名以聞舊録云以右司諫王覿言緣市易冒賞人獨吕嘉問降知淮陽軍而其餘未追奪故也今已載覿全章削此不著嘉問等追奪在二年五月六日王巖叟章附彼又詔故龍圖閣直學士宋敏求特與子孫一名太廟齊郎以其子言敏求嘗與修仁宗英宗兩朝國史也皇城使利州刺史內侍押班趙世長為昭宣使中書省言刑房斷例嘉祐中宰臣富弼韓琦編修今二十餘年內有該載不盡者欲委官將續斷例及舊例䇿一處看詳情理輕重去取編修成䇿取㫖施行從之紹聖元年十一月己亥可考詔吏部殿前司選差大使臣二人充廣南西路經略司准備差使小使臣三人殿侍三人充准備指使仍各選一倍赴樞密院呈檢定差以經略司言本路官闕故也新無權發遣熙河蘭㑹經略司公事劉舜卿言本路冗員稍多相度到存减關堡官員數從之又言西蕃鄂特凌古為進奉所得回賜物色數少乞依舊例樞密院言所賜比元豐四年以前舊例已為數多其逐次回賜並於進奉物估價外添二分支賜亦無裁减詔舜卿詳此委曲說諭令知新無户部言糴買糧斛除陜西河東河北依舊例外餘路欲乞轉運司遇闕少年額聽於提刑司依常平錢元價兊糴仍先樁撥價錢不樁錢而輒支用依擅支封樁錢物法從之十一月二十七日可并此中書省言臣僚上言元豐薦舉令被㫖特舉官者奏訖具所舉官報御史臺比詔大臣薦館職又設十科舉異材請並依元豐令關報御史臺非獨內外之臣各審所舉庶使言者聞知得以先事論列不誤選任從之上言者御史孫升也升奏議第二卷有此章貼黃論近臣薦王鞏不當或可增入兵部狀上槽馬草料等將逐路省費錢物免封樁令轉運司出備等事詔逐路轉運司將所認省費錢物應副新復諸監草料請受等使用如有剩數即依舊封樁三年四月二十七日編録册載此刑部言開封府首獲畿內逃軍杖罪許部送住營縣施行從之以前此開封府言應獲畿縣逃軍即送住營縣而刑部以謂徒以上罪不免解府故也新無蔡碩奏臣僚論奏臣任軍器少監任內公事付大理寺緣少卿杜純并純弟右司郎中紘左司郎中劉奉世監察御史孫升皆有私仇乞别推詔開封府根究紘奉世免簽政目十一月四日事按實録此月十四日朝奉大夫莫君陳奉議郎杜純為大理少卿又按此月六日王覿云云并此蔡碩奏則純為大理少卿必在九月十四日矣不應十月十四日方與莫君陳同除也政目既於四日書蔡碩奏又於十四日如實録所書疑政目十四日所書蓋誤而實録又承其誤也今削去十四日所書劉奉世改左司在此月二十二日己未權發遣秦州兼管內勾秦鳯經略安撫都總管司范育言知州係都總管安撫使都鈐轄其將下公事乞不許通判同管從之庚申樞密院言諸路將兵那移闕人處自有近降朝㫖合申樞密院外若本處依自來條例差使即不須申其元豐將官勑軍防令差訖申樞密院一節欲乞刪去從之右司諫王覿言臣伏見給舍左右司郎官等見准朝㫖相度裁减入流人數臣竊見文臣與武臣任子之法殊有未均文臣承議郎班列既在武臣諸司副使之上而諸司副使雖常調皆得任子承議郎以上至朝請郎非帶職者皆不得任子以品秩言之武臣視文臣若皆常調雖諸司使猶未可以任子也况副使哉蓋前日諸司副使員少任子不多而入流之人未冗也推恩稍廣無所不可今副使員多任子者衆而入流之人冗甚則理當比類文臣重别立法伏望聖慈指揮下有司與前項裁减入流事一處相度施行覿章疏自注云十一月六日上殿劄子又言臣伏見前軍器少監蔡碩與竇長裕劉仲昕等使用官錢公事先係工部根究纍月不决遂送大理獄亦復纍月未見結絶今竊聞因蔡碩陳訴又移送開封府伏緣府司及左右巡院自來以公事繁冗於推鞫不得專一上件公事若送開封府必更遲留别致生弊况竇長裕劉仲昕主管官錢至多未見歸著者不少若蔡碩委曾用過官錢則刑名不輕其於推鞫理當審重碩乃是前宰臣蔡確之弟愛憎恩讎易生議論夤緣請託亦合關防臣欲乞朝廷於臣僚中選擇公正之人置司推勘庶幾得其情實庶免更致淹延王覿章奏自注云在十一月七日侍御史王巖叟亦乞置司推鞫詔差監察御史韓川刑部郎中祝庶巖叟與覿乞别置司及差韓川祝庶並據政目詔莊宅使知保州髙遵治久歷外任治效有聞可特除引進副使遙郡刺史赴闕供職御集十二月六日下又詔楊王荆王男各已長立未有學官可於今朝官內選差文臣一員充諸王府小學教授御集十二月六日下辛酉張端落致仕依前朝散郎當考丙寅刑部尚書蘇頌兼詳定重修勑令御史中丞傅堯俞兼看詳訴理詔開封府奏斷公案如因論訴許御史臺取索日録云先是元豐中已有成法其後以御史孫升言雖不因論訴亦許取索疏駁至是開封府復言之也自先是至復言之新録並因舊録要合削去刑部言在京刑獄所差獄子取受依重祿法從之丁邜廣州東莞縣添攝官一員監稅先是民庶上言縣東三十里有曲龍場課利至簿乞移官吏於縣其場許人買撲下轉運司相度以聞故有是詔新本削去戊辰追封故越國賢惠長公主為大長公主資政殿學士知江寧府王安禮知揚州龍圖閣待制知宣州蔡卞知江寧府樞密院言秉常卒已差金部員外郎穆衍充祭奠使供備庫副使張楙充弔慰使夏國近遣進物色係進奉太皇太后皇帝兩殿詔依明道元年例共差穆衍張楙再押賜贈奠安葬物各一畨仍依近皇帝所賜物色數目支賜令學士院别降祭文詔録各一十月十六日差穆衍十月二十八日差張楙太師文彥博言乞請罷男貽慶升理運判資序及明堂大禮以在病假不獲陪祠宿衛其錫賜乞依例半給並從之己巳吏部言諸色人援引舊例僥幸入官者甚衆小不如意則經御史臺登聞鼓院訴理若不約束竊恐入流太冗請今後諸色工匠舟人技藝之類初無法合入官者雖有勞績並止比類隨功力小大支賜其已前未經酬奬者亦如之則僥幸之路塞而賞不至濫從之户部言准勑都大提舉清河輦運司依舊以廣濟河都大管勾催遣輦運司為名今相度應官司涉輦運司職事並用申狀仍許按舉從之詔復廣濟河催遣輦運司玉牒荆湖南路安撫轉運司言准勑相度卲州弩手上畨事今蒔竹縣臨口等寨鋪管內溪峒人户近方歸眀蠻性未馴乞依舊輪差弩手防托從之庚午詔勾當皇城司三年無過犯者與轉一資皇城使遙郡刺史以上與子之有官者轉一資無子者許回授有服親减二年磨勘再任滿者减二年磨勘皇城使及遙郡刺史以上許回授與子如無子與有服親仍减一年見任官准此太師文彥博言尚書省二十四司郎官遷改不定往往未能周知本案事務欲令左右司㸃檢勘當定為式例左右丞覆視刑部尚書蘇頌熟知臺省典故亦乞委之詳定兼尚書省見裁减六曹寺監迂枉文字欲令蘇頌於左右司共同看詳結絶並從之辛未利州路提刑司言准勑應天下免役錢並罷依熙寧元年以前舊法差役今本路惟文龍二州係教閲保甲准條每年農隙日勾集按閲緣其間亦有充役之人欲乞並依府界三路指揮權免冬教從之七月九日八月十八日可考樞密院言剩員上畨日破口食若數多可以分畨即不須别支緣未有明文詔剩員數多處許差二人當兵士一名仍分畨壬申給事中胡宗愈為吏部侍郎朝散郎直龍圖閣顧臨為給事中司農少卿馬默為河東路轉運使秀州刺史提舉醴泉觀向宗良為京東西路鈐轄從所乞也詔司馬光西京園宅及賜書令子康照管不得破動政目十八日事左諫議大夫鮮于侁言康伯父中大夫致仕旦者所為無狀每責康要求財物故也此據密疏增入殿中侍御史吕陶奏伏見利州路轉運副使蒲宗閔始附㑹李稷以賣茶為名興販諸物貪息冒賞纍次遷官明堂赦後有利州衙前何憲等乞除免市易等錢宗閔一切不為受理伏望早賜責降詔蒲宗閔等先次放罷仍令本路提刑司體量詣實聞奏此據密疏十月十一日間事今因實録十一月十八日岑象求除利州路運判附見蒲宗閔放罷更須考詳左司諫王覿言覿自注十一月十八日上殿劄子臣近以為馬事不經由駕部髙麗夏國進奉不經由鴻臚失本末之序有害官制非經久之道其狀於九月二十八日投進訖至今未䝉施行臣竊以朝廷改更政事皆出不得已若可以改可以無改則不若因仍舊貫之為愈也况徒致紛更之勞未見其利且復有害者又可以輕改哉夫尚書省六曹無所不統實周姬六官之遺法也今內則寺監分治場務外則監司分治郡縣而六曹二十四司行其政令焉乃上下相維之序不可亂也若使駕部不得預太僕之馬政何異提刑司不得預州縣之刑獄轉運司不得預州縣之錢榖哉於州縣則便矣論朝廷之綱紀則非也使鴻臚不得預高麗夏國之朝貢而專之於主客何異州縣不得治刑獄錢榖而專之於提刑轉運司於提刑轉運司則専矣論朝廷之綱紀則非也誠使如建議者之意以謂馬事不經由駕部而後功可成則是省曹有害於寺監而凡事在於寺監者省曹皆可以不預矣何獨駕部也謂髙麗夏國朝貢不經由鴻臚而後事可濟則是寺監無益於省曹而凡事在於寺監者皆可以歸之於省曹矣何獨鴻臚也若此則場務亦可不𨽻寺監而省曹亦可專領場務矣太僕不肯領車營致逺等務而歸之駕部是也以至凡所謂法度綱紀者顛倒錯亂無所不可矣此豈陛下增修典法欲以維持長久之意也臣竊為朝廷惜之伏望聖慈特賜指揮檢㑹臣九月二十八日奏狀早賜施行貼黃稱馬事不經由駕部此太僕寺之所欲也大凡欲專權而自快者皆惡於屬人如張誠一用事之際嘗領牧馬矣亦不肯有所屬朝廷俯從其意亦欲其有成而已誠一豈不專哉然終以敗事而無所成就此非駕部之為害也眀矣今太僕已欲襲蹈誠一之迹可復許哉臣謂若使駕部預太僕之馬政决不為馬政之害而亦須有補及可以存朝廷之綱紀也惟聖慈詳察十二月十四日可考朝請郎行鴻臚寺丞何琬為江南西路轉運判官先是琬自通判秦州除淮南東路提舉常平到任未幾提舉官俱罷除常平在元豐八年十一月七日罷提舉在元年閏二月二十八日又除開封府界提㸃令待黃實闕尋改知復州未赴御史孫升奏琬立志不阿當官有守先帝擢為江南東路提舉官再召赴闕為司農寺丞又除江東路轉運判官在任日獨力按發知江寧府吕嘉問違條修建精義堂姦贓不法等事忤犯權要招結怨仇嘉問坐是貶責琬由此為公論所稱先帝知之就移琬荆湖南路提㸃刑獄因丁母憂服闋再除梓州路提㸃刑獄且吏部常調服闋猶與近地而琬母喪方終有父垂老乃得川逺路分蓋琬曾為吳充所薦在江東日按發吕嘉問不法形迹轉運使孫圭出巡奏論前宰相女壻蔡卞朋黨執政者既深惡吳充而私吕嘉問孫圭蔡卞乃其親黨及琬再三以父年老巡白宰相遂欣然許諾令具狀自陳琬不悟其機尋以狀訴即時遂送吏部夫父母年老辭免逺官人子之情身為執政大臣不以至誠語下而為欺紿以報私仇士論薄之是時琬之仇人吕嘉問適為吏部郎中深快其意遂不與琬正資序止授秦州通判至元豐八年十一月內就移本路提舉官當是時執政者既自愧欺紿之非為士論所薄又知已有罷諸路提舉官之議淮東提舉黃實及知縣資序而知樞密院章惇之外甥宰相蔡確之門人實父好謙方入為省郎好謙為駕部在八年七月六日既恐黃實資序不正非次罷歸又欲實與好謙相近遂先除實為開封府界提㸃而就除何琬代之以厭士論琬到任才三月而罷蓋府界提㸃自來任提刑資序人或擇臺閣之有聞者黃實以知縣資序為之而父好謙見為省郎父子同郡守官無異何幸之甚也琬為提舉官三月而罷自替罷扶持老父牢落都城方又逺涉重江何獨不幸也孤寒之與有力相逺如此臣竊覩朝廷登用正人開公道久寃宿枉咸䝉昭雪而何琬先朝兩除提㸃刑獄止因父年老巡白為執政所紿廢壞資任抱負抑屈獨未為朝廷所知此臣所以為言也何琬本兩浙處州人父年七十八嵗伏望聖慈詳擇特降指揮除琬一近鄉差遣不獨伸屈抑之寃足以廣孝治之德貼黃孫昌齡兩浙常州人以父年老三任本路提刑轉運近除昌齡知福州以其親老又移本路蘇州伏惟朝廷愷悌均一之政豈獨及昌齡一人而已奏入乃除琬鴻臚寺丞於是將漕江西踰月又改除開封府界提㸃刑獄黃實除府界提㸃在元豐八年十月十八日何琬代實不見所除月日其改知復州及為鴻臚丞實録皆不書政目亦無之今因將漕江西附見升奏改除府界提刑在十二月二十四日今并入此要考何琬始末故詳著之須别刪修二年十月八日朝請郎何琬為工部郎中乙亥于闐國遣使入貢丙子左司郎中權樞密都承㫖劉奉世為起居郎禮部員外郎孔文仲為起居舍人中散大夫集賢校理王晳判登聞諫院仍赴館供職兵部員外郎葉祖洽比部員外郎錢長卿並除集賢校理文彥博言祖洽熙寧進士首選今十七年衆謂淹滯長卿嘗撰答髙麗國書本先帝稱之與孔文仲皆曽為校書郎偶於未復館職以前就遷省郎不該新制乞並加近上職名緣此三人亦無人援例於是文仲遷右史而祖洽長卿有是命舊録但書祖洽長卿除校理不帶見所居官亦無緣由今以文彥博奏增入前內殿崇班謝良佐叙復元降內侍省祗候髙班內品良佐嘗坐將婦人入家等罪特㫖放歸田里永不收叙看詳訴理所以為情可矜恕故有是命樞密院言廣州體訪得擁峒作過人岑探率羣黨四五千人圍新州詔令東南路第六將部領全將兵前去照應仍立賞募人捉殺立賞在二十四日今并書蔣之竒𫝊八月四日之竒除集賢殿修撰知廣州其十月新州賊岑探攻新州旁近捕盜官以城陷聞府帥以聞於朝且檄江西鈐轄司發兵討賊探以妖術惑衆聚黨二千餘人謀先取新州經略畨禺奄嶺南而盡有勢張甚官吏至佩印綬逃去帥府所遣將畏撓不敢進縱兵掠殺旁近鄉民以效首虜因利其資財嶺南蕭然不聊生之竒道聞之即奏請以重賞募捕首惡除岑探不赦凡脅從者許自陳得以除罪又飛檄榜示所以捕擒魁首宥脅從之意既至遣兵馬鈐轄楊從先往討之授以方略得盡獲諸將且詭令生致渠魁從先遂擒探於茶坑送廣州伏誅眀年正月二十日獲岑探相度河北水事張問言臣至滑州决口地分相視得迎陽掃至大小吳掃水勢低下舊河淤抑若復舊道恐功力難辦請於南樂大名掃地分開直河并簽河分引水勢以解北京向下水患從之張問舊𫝊云河失故道詔與都水使者王令圖行視問以澶淵故道淤澱已髙可鑿土山浚水入孫村口遷商胡故道則東流可復朝廷從之既而論者不一問議亦寢新傳乃削去此假不知何故問以九月二十二日使河北十月五日令圖乃除都水政目云張問乞於南樂大名掃開簽直河引水入孫村口役春夫萬五千可紓解下流水患從之十二月六日又云大名府奏引河近府不便詔問再視二年二月八日竟開河新知大宗正丞事胡宗炎為將作少監從文彥博薦也門下侍郎韓維言天下奏案必斷於大理詳議於刑部然後上之中書决於人主近嵗有司或昧於知法或便於營已但因州郡所請依違其言即上中書貼黃例取㫖故四方奏讞日多於前欲望刑清事省難矣今具修立到條大理寺每受天下奏到刑名疑慮情理可憫情重法輕法重情輕公案須分明鋪坐疑慮可憫情法重輕等條若無上項情狀即具合用勑律何條斷遣刑部看詳次第申省取㫖詔刑部立法以聞維又請自今每近大禮令刑部大理寺開封府公事並依常時行遣更不减促日限罪人情欵重在害理難寬釋者别為一等從上奏斷從之此與范伯祿相關吏部言凖勑尚書侍郎內外學士待制兩省臺官左右司郎官諸路監司各限一月同罪舉公眀廉幹材堪治劇乃係合入知縣或縣令一員令吏部不依名次差充重法地分知縣縣令次差賊盜多處萬户已上縣任滿委監司保明治狀作三等推賞有任滿酬奬者聽從重仍令吏部詳立考較等第以聞今詳到考較等第其舊有任滿酬奬者聽纍賞從之七月二十二日上官均奏乞上科外增舉能治劇者蓋及今始采服其言也新舊録差錯具注在五月六日并七月二十一日丁丑詔以府界京東西路災傷權罷眀年黃河年例春夫如係干河防緊急來春須令興役即計定的確夫數以聞
