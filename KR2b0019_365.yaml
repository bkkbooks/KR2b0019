body:
  text: 續資治通鑑長編卷三百六十一宋李燾撰哲宗元豐八年十一月癸巳詔強盜按問欲舉自首者不用減等舊録云初熙寧中應強盜贓證未明因擬被執而能自言皆從末減時司馬光以為非是刑部觀望有請從之新録辨曰按問欲舉條制第四卷論之已詳自初熙寧中至從之四十字並刪去明年二月末范純仁奏當考第四卷事在是年四月二十五日朝奉郎直龍圗閣權發遣京東路轉運使范純粹知慶州代其兄純仁也丁酉祔神宗神主於太廟第八室新紀云祔神宗神主於太廟樂曰大成之舞本案大成之舞宋史紀作大明之舞朝議大夫鮮于侁為京東轉運使熙寧末侁已嘗為京東轉運使於是司馬光語人曰今復以子駿為轉運使誠非所宜然朝廷欲救東土之弊非子駿不可此一路福星也可以為諸路轉運使模範矣又曰安得百子駿布在天下乎侁既至奏罷萊蕪利國兩監鐡冶又乞海鹽依河北通商民大恱又乞止絶高麗朝貢只許就兩浙互市不必煩擾朝廷事雖不行然朝廷所以待高麗禮數亦殺於前云此據李豸所作侁行狀及范鎮墓志侁傳載侁事極踈略亦不載侁再為京東漕也辛丑德音降兩京畿內河陽管內死罪一等囚杖已下釋之民緣山陵役者蠲其賦侍御史劉摯言伏見陛下聽政以來除三省樞密院執政奏中外其餘應合上殿臣僚至今未降指揮臣竊謂臨御之始正宜開廣聰明延見臣下有所訪聞雖臣子論事自可列上章疏然事固有言之猶不能盡者而况文字之間哉理之隱微情之曲折必假指畫反復於前庶幾為能明之臣竊料向來方是先帝山陵禮有未遑今升祔已畢欲乞先次許令臺諌官以時上殿奏事據摯奏議自注十一月十一日奏此壬寅詔中書舍人錢協再看詳高麗入貢儀式承議郎李士京為編修官並依元豐七年十月二十一日指揮元豐七年十一月二十一日指揮未見恐此或有脫誤新舊本同當考詔在京物貨場見在物貨應輸錢者並蠲免詔石得一已充永裕陵使罷入內副都知及兼領差遣其提舉教馬軍軍所提舉訓練皇城司親從親事官射弓並差入內押班梁從吉管勾同文館所差內侍押班劉有方入內省申奉聖旨入內東頭供奉官武球等並落閣子下武球陳處約趙禮劉瑗蘇圭特與轉官及減年磨勘轉出張士彥帶勾當後苑先次與差走馬承受西頭供奉官陳端郝隨王遘殿頭劉友端並與走馬承受張士彥等五人并西頭供奉官張琳石燾高班韓邈胡絢各與等第減年磨勘奉旨依已得指揮密詔十一月十二日復管城縣為鄭州以監察御史劉拯及縣令周邠有請也舊録云熙寧初鄭之吏民以徭役供億公私疲弊願省為畿邑詔從其請至是以監察御史劉拯及邑令周邠有請也新録辨曰鄭州廢於熙寧之初復於元祐之初廢併興復之由各繫於當時不必並載自熙寧至是二十七字並刪去熙寧八月五日廢鄭州元祐元年正月十二日又復軍額于闐國進馬賜錢百二十萬步軍副都指揮使苖授以疾乞宮觀詔給寬假諸州管勾官不奏差政目十三日當考甲辰詔還開封府解額百人熙寧中罷開封府解額併歸太學至是復之舊録云先帝增闢太學養士欲廢科舉首罷開封解額併歸太學至是復之新録辨曰增闢太學養士之法備見神宗實録不必復載於此今自先帝至舉首十三字並刪去元豐三年十二月十二日罷開封解額非熙寧也紹聖三年八月十六以登聞鼓院檢院闕歸中書省三年為任降永裕陵副使宣政使登州防禦使宋用臣為皇城使依舊登州防禦使監滁州酒稅務言者謂其興利苛細故有是命舊録云命官考究未畢而有是責新録但削去六字不復辨説當考言者姓名并當出之政目云永裕陵副使宣政登防宋用臣興置財利類多欺罔特降皇城使依舊登防滁酒其根磨不行政目所云根磨不行即舊録所云考究未畢也更詳之明年正月十四日當併此河東路經略司言北人於火山軍界疊石為墻慮蓄姦謀為侵占之漸詔左藏庫副使趙宗本詣墻所體訪書圗以聞如侵舊界即移牒毁拆仍當為先備未幾復言北人聲言欲爭據石墻乞增兵防托詔沿邊安撫司密共覘視若侵占有實奏拆去詔諸路察治私置廂獄通議大夫盧革卒盧革以十一月十四日訃聞十六日乃差革子秉知湖州十二月十一日又聽革傳養舊録如此新録因之或革死時在十二月十四日舊録誤載於十一月十四日更須詳考丙午步軍都虞候雄州團練使劉昌祚知渭州代盧秉也以秉知湖州八年十一月十六日昌祚知渭州元年二月二十八日知熙州三月二十二日徙渭州劉摯言先朝以劉昌祚嘗小有功用之管軍知延州中外不以為允先朝升遐召入宿衛物議稍以慰愜今者渭州之命羣議復駭臣竊聞祖宗之法不以武人為大帥專制一道必以文臣為經略以總制之武人為總管領兵馬號將官受制出入戰守惟所指麾國家承平百有二十餘年內外無事以其制御邊臣得其道也臣嘗伏念御邊禦敵深得上策所以遺後世者久而不可以改此其一也唐先天開元中薛訥郭元振張嘉正王晙蕭嵩杜暹李適之自節度使入相李林甫疾儒臣以邊勞至大任欲杜其漸以固已權説明皇曰以陛下雄才國家富強而敵人未滅者由文吏為將憚矢石不以身先不如用蕃將彼生長鞍馬矢石間陛下用之必盡死力明皇然之以安思順代李林甫領節度擢安祿山高仙芝哥舒翰等為大將林甫利其為蕃將無入相之資故祿山得兼三道徑兵卒稱兵蕩覆天下唐室遂微臣竊謂祖宗之法不以武人為大帥用意深逺非淺見者所能測知如昌祚人材未為難得誠使卓然過人可以付屬而祖宗之法由此廢矣伏願選內外文臣從官嘗守邊者使為大帥則祖宗之法常存不廢不幸後世有引此時為比使武人帥邊而不虞之禍如前世之甚者豈可不豫防其漸乎尋詔管軍常多闕貟劉昌祚已差知渭州宜令别取旨差官如已降告即行繳納御集十二月二日今附此十二月二日壬戍改命劉庠知渭州詔馬軍所闕馬應給者在京府界京東京西河東陜西路無過七分河北路無過六分樞密院勘會已降指揮提舉府界三路保甲官並罷令逐路提刑及府界提點司兼領所有保甲只冬教三月仍自來年正月一日施行詔應申奏及行移保甲文字稱某路提點刑獄兼提舉保甲司逐縣監教官並罷只委令佐監教十都保甲巳上縣分於冬教前自京差指使一名往彼同監教提舉保甲司各置勾當公事并指使一貟實録但書罷監教保甲官置勾當公事及指使一貟今用樞密院時政記本文監察御史王巖叟嘗言臣竊以保甲之法行之纍年朝廷固已知人情之所共苦而前日下詔蠲疾病汰小弱釋第五等之田不及二十畝者省一月之六教而為三日之併教甚大惠也據王巖叟朝論云奏乞罷教保甲狀并劄子十月十一日上今附十一月十六日保甲蠲疾病汰小弱釋第五等田不及二十畝者四月二十二日乙酉指揮併教三日據司馬光七月十二日奏當亦在四月間然其司尚存其患終在今臣蒙恩由河北知縣擢置御史敢以其所目見而身自歷之者為陛下言不敢隱其實以欺朝廷亦不敢飾其事以罔成法惟陛下垂聽幸甚朝廷知教民以為兵而不知教之太苛而民不易堪知别為一司以總之而不知擾之太煩而民以生怨教之欲以為用也而使之至於怨則恐一日用之有不能如吾意者矣不可不思也民之言曰教法之難不足以為苦也而羈縻之虐有甚焉羈縻不足以為苦也而鞭笞之酷有甚焉鞭笞不足以為苦也而誅求之無已有甚焉方耕而輟方耘而罷方斂而去此羈縻之所以為苦也其教也保長得笞之保正又笞之巡檢之指使與巡檢者又交撻之提舉司之指使與提舉司之幹當公事者又互鞭之提舉之官長又鞭之一有逃避縣令又鞭之人無聊生每相與言曰恨不死爾此鞭笞之所以為甚苦也創袍市巾買弓修箭添弦換包指治鞍轡蓋涼棚畫象法造隊牌緝架僦椅桌團曲紙墨看廳人雇直均菜緡納秸粒之類其名百出不可勝數故其父老之諺曰兒曹空手不可以入教場非虛語也都副兩保正大小兩保長平居於家婚姻喪葬之問遺秋成夏熟絲麻榖麥之邀求遇於城市一飲一食之責望此迫於勢而不敢不致者也一不如意則以藝不應法為名而捶辱之無所不至又所謂巡檢者指使者多由此徒以出貪而冒法不顧後禍有踰於保正保長者此誅求之所以為甚苦也又有逐養子出壻再嫁其母而兄弟析居以求免者有毒其目斷其指炙烙其肌膚以自至於殘廢而求免者有盡室以逃而不歸者有委老弱於家而保丁自逃者保丁自逃則法當督其家出賞錢十千以募之使其家有所出當未至於逃至於逃則困窮可知而督取十千何可以得故縣縣皆常有數十百家老弱嗟咨於道路哀訴於公庭如臣之愚且知不忍使陛下仁聖見之當如何也又保丁之外平户之家凡有一馬皆令借供逐場教騎終日馳驟往往至於飢羸殘壞而就斃誰復敢言或其主家偶因出處一誤借供遂有追呼笞責之害又或其家官逋督迫不得已而易之則有抑令還取之苦故人人以有馬為禍此皆提舉司官吏倚法以生事重為百姓之擾者也臣竊惟古者未嘗不教民以戰也而不聞其有此何則因人之情而為之法爾夫緣情以推法則愈久而愈行倚威以行令則愈嚴而愈悖此自然之理也獸窮則搏人窮則詐自古及今未有窮其下而能無危者也臣觀保甲一司上下官吏無毫髮愛百姓意故百姓視其官司不啻虎狼積憤銜怨人人所同比者保丁執指使逐巡檢攻提舉司幹當官大獄相繼今猶未已雖民之愚顧豈忘父母妻子之愛而喜為犯上之惡以取禍哉蓋激之至於比極爾臣以謂蓄而益深安知其發有不甚於此者情狀如此不可不先事而處以保大體為安靜計夫三時務農一時講武先王之通制也臣愚以謂一月之間併教三日不若一嵗之終併教一月農事既畢無他用心人自安於講武而無憾遂可罷提舉司廢巡教官一以𨽻州縣而俾逐路安撫司總之每俟冬教則安撫司旋擇教官分詣諸邑與令佐同教於城下一邑分兩畨當一月起教則與正長論階級罷教則與正長不相誰何而百姓獲優遊以治生無終年遁逃之苦無侵漁苛虐之患無爭陵犯上之惡矣且武事不廢威聲亦全豈不易而有功哉惟陛下深計逺慮斷在必行以省多事以為生靈安樂之惠以為國家安靜之福天下幸甚併教三日見司馬光七月十二日奏又言三路提舉保甲錢糧司名列監司實無職事逐處郡縣惟有封樁錢數百千文歷五七道一月之間一轉結而已每至巡教無可指揮徒使州縣有逢迎煩擾之弊若俾他司兼之理無不可伏乞廢罷以省冗官既罷提舉錢糧司罷錢糧提舉即此八月二十六日巖叟又言昨在河北為知縣親見保甲之患非止一端及蒙恩召為御史即詳具保甲利害條列劄子欲求面奏而未到闕間已承朝廷有指揮止令冬教一月暨臣赴臺供職適主兵察竊見新保甲法尚存提舉教閲一司及改逐縣巡教官為監教官乃知朝廷未察所以為保甲之患者大本猶在臣頃至以先所具到劄子上進仰冀陛下委曲知保甲之害蓋由提舉一司官屬不體朝廷之本心倚法用情奉行深刻所至百姓一聞其名已自疾首蹙頞無安樂意今雖曲為之防須亦别自生姦終恐為害不已伏望陛下深察民情廢罷提舉保甲一司及監教官但令州縣及安撫司主之使百姓安心於為生以樂聖政不勝幸甚若不罷提舉保甲司及逐縣監教官則是保甲無事之時猶遭脅制未免侵漁終年不減騷擾之患此朝廷不可不察也且一司官屬三路不下數百貟虛費廩祿亦非久逺可行之理今來指揮指揮在八月二十六日己亥自十月至正月分四畨教閲臣竊見民間十月場圃未終正月夫役將興農緒亦起此時教習未免有妨惟是分為兩畨於十一十二兩月教畢民情頗為便利不銷分作四番臣深曽體訪備得其情伏望朝廷更加詳度若罷提舉官司自於保甲都保不減在國家民兵之勢無所虧損又人人既得平居泰然以為生則國家一日用之必樂於為用伏望陛下勿以為疑早發睿斷以安百姓如每年自京差指使往逐處同共監視教閲竊恐粗勇之人挾持朝廷所差妄作氣勢騷擾生事只乞令安撫司差郡使臣為便十一月十六日丙午乃罷監教官又言伏見近降保甲畫一指揮仍舊逐嵗遣使按閲者竊敢為朝廷論其害臣每見使者所嚮其騎從之盛風聲之峻供億之繁承迎之厚郡縣為之騷然一小郡坊郭户有旋染縑帛五六百匹為供帳之具者推此一事其餘可知雖非使者使之如此而州郡望風畏憚不敢不然故所至人情甚以為苦又其所按保丁雖各得銀絹三五匹兩而祗備按閲飲食衣服之費自已不輕既得之而為衆人耗蠧又亦不少所存以歸能有幾許臣深曽體問皆云若國家但令冬教使不失農時則家之所得自可有餘天恩深厚非一按閲賜賚之比矣竊考其情蓋不以得一時之賞為足而以安終年之業為樂也况所謂賜賚者却袛是出於保丁人家所納役錢數內耳所謂取諸其懷而與之割其肉而啖之孰若不取不割之為兩得也臣愚伏望聖慈因冬教以為恩下令罷逐年按閲之煩省役錢封樁之擾一以安靜養其力而舒其心斯民幸甚又言伏見保甲司每嵗於封樁錢內支與人户一貫文令納一縑縣不下千百户户不下三兩匹以為按閲支賜之備幸蠶絲之成則汲汲以織納不幸不成則貴買以赴期緣轉運司自已散預買絹錢不少今保甲司亦散則是民間又生一重科配之擾與之不為恩臣亦以為罷之便又言臣見每畨按閲之時一小郡有買銀六七千兩者名為和買其實於坊郭户上均配期限督逼每兩有陪三二百錢者其為煩擾推此可知矣七月二十二日甲寅遣官按閲三路保甲八月二十六日己亥罷提舉錢糧官自正月至十月分四畨教閲十月二十八日己丑罷提舉保甲司令提刑兼領止冬教三月十一月十六日丙午罷監教官十二月六日丙寅第五等户兩丁免冬教朝散大夫鴻臚少卿陳睦為直龍圗閣知潭州通議大夫提舉太清宮龔鼎臣為正議大夫致仕政目詔門下省置催驅房知泰州王子京罷令於揚州聽旨以侍御史劉摯言方遣官按察子京在福建日買茶抑配不應猶付以郡寄故也知澶州王令圗言曽建議回復大河故道未聞施行詔吏部侍郎陳安石入內都都知張茂則同相視利害以聞尋命勾當御藥院馮宗道代茂則十二月十四日遣李常禮部言冬至正旦朝賀在諒暗當罷欲其日令羣臣於東上閣門內東門表賀從之詔武舉人犯學規或貢舉法被罪聽依進士量罪等級敘理從蹇序辰請也戊申兵部貟外郎葉祖洽奏市易之逋一旦官中以法督促近雖有寬期會減分數之息然民力已弊必無從出朝夕限滿又加督促竊以祔廟在近願乘此時更下有司檢察如委無可納特議蠲放詔大姓户見欠市易三分息錢並特與除放其人戶本錢仰所屬依詳前後所降指揮催納不管少欠侍御史劉摯言伏見刑部侍郎蹇周輔及其子司封貟外郎序辰昨者以鹽事奉使江西湖南而相繼創增賣額州縣畏懼承望皆出配抑使人陷罪破産數路愁怨朝廷已遣使按正其事如聞周輔無所忌憚復自論列以飾非文過而父子方雍容侍從出入朝省此豈待罪者之所宜衆人莫不指議臣誠恐周輔等懷患失之意或致别為經營以圗幸免有失公議伏請罷周輔序辰見任職事各令補外候察治到事狀别聽朝旨政目於十一月十八日載摯乞黜周輔序辰即此章也今檢摯集增入十二月三日又二十二日摯復有兩章元年二月二十二日周輔序辰乃責禮部言高麗國奉慰使與州郡書不稱年號惟書乙丑年不敢留亦不敢答欲令館伴官説諭從之己酉遼國賀登寶位使林牙崇議軍節度使耶律白副使朝議大夫守崇祿少卿充史館修撰牛溫舒以下見於紫宸殿次見太皇太后於崇政殿庚戍録西京左藏庫副使解宗禮女之所生子胡太章為三班借職以宗禮死事也丁巳鄉貢進士程頤為汝州團練推官充西京國子監教授以門下侍郎司馬光尚書左丞吕公著及西京留守韓絳薦其學行故有是命司馬光與呂公著同章薦頤今實録乃不書光名蓋脫誤也元祐元年閏二月十八日改承奉校書三月十四日又改司馬光言臣聞兩貴之不能相事兩賤之不能相使此乃物理自然人情之常也是以聖人立為君臣使人臣各獻其謀而人君裁決其是非若網在綱有條而不紊此國家所以治也若人君不加裁決使人臣各行其意則朝夕鬬訟弱不勝強寡不勝衆不則雷同詭隨尸祿竊位茍且偷安以圗目前此國家所以衰也然人君於是非之際亦當三思清察昭然無疑然後決之自古興衰未有不由此塗出也夫人心不同各如其面雖以周公之聖召公之賢同輔成王猶有不恱况邪正忠佞各有所存者乎臣竊惟皇帝富於春秋太皇太后親臨萬幾事無大小皆委於執政垂拱仰成萬一羣臣有所見不同勢均力敵莫能相一者伏望陛下特留聖意審察是非若甲是而乙非當捨乙而從甲乙是而甲非當捨甲而從乙如此則羣臣莫敢不服善政日親矣不然陛下雖有求治之心事功無時而成也况書曰惟辟作福作威不可使用人賞罰之柄盡歸執政人主一不得而專也又言臣聞古人有言謀之在多斷之在獨陛下寬仁委政羣下或羣臣議論難一儻陛下不決其是非則爭辨紛紜無時而息事功何由可成謹按蔡雍獨斷敘漢制有疑事公卿百官會議若臺閣有正處而獨執異意者曰駮議其合於上意者又報曰某官某甲議可此所以各盡臣下之所見而人主亦不失操柄也今執政之臣雖各相與竭力同寅協恭若萬一有議論必不可合者欲乞許令各具劄子奏聞望陛下精察其是非可否以聖意決之或於簾前宣諭或於禁中批出令依某人所奏若羣臣猶有固爭執者則願陛下更加審察若前來處分果非則勿憚改為若灼然無疑則決行不移耳如此再思而行庶幾得盡衆心事亦少失矣二奏不得其時據光集在薦程頤後頤除西京教授乃十一月二十一日今並附月末更須考詳侍御史劉摯言傳曰有德進則朝廷尊又曰仁者宜在高位不仁而在高位是播其惡於衆也伏見知樞密院事章惇資性佻薄素無行檢廟堂議政無大臣之體專以強橫輕肆作俳謔之語以凌侮同列誇示左右其語布于都下散及四逺傳以為笑比來聖旨增損政令之未盡善者惇則必出異意沮持其事方宋用臣驕橫不法惇在政府而與之厚善納其所遺酒醪雖更恩宥臣以謂大臣不亷犯大義之責不當如小臣論赦令前後也謹按惇夤緣遭遇幸得備位近輔不深惟朝廷高爵厚祿稍自矜重以忠義圗報而凌轢諧戲不可謂德閉善害政不可謂仁交非其人又從而以貨取之可謂無亷隅矣可謂播其惡於衆矣方且揚揚高位人皆指而議之殆非所以尊朝廷厲羣下也伏請聖斷罷惇政事以允公論宋用臣以十一月十四日責滁州監稅此章指惇交通用臣必在用臣責後今附十一月末更須考詳劉仿王知常撰次劉摯行實載劾章惇疏在論蔡確十罪後如此則當附此疏於明年末更詳之蔡確言章自十一月後來纍纍有之孫覺時為大諌獨未見所上文字明年正月末有兩章又不知果在何時當求覺集别加編次自去年十一月後來彈奏蔡確亦王巖叟元祐元年春首章疏文耳邢恕孫繹録恕言行説孫覺處當并考監察御史王巖叟言臣竊聞昨來執政大臣初議太皇太后陛下垂簾儀制之日門下侍郎章惇嘗對衆肆言曰待與些禮數臣子聞之無貴賤無賢愚莫不變顔失聲一意共怒伏以太皇太后陛下先皇帝之母皇帝陛下之祖母天下之尊極矣垂簾聽政又先帝之遺制國朝以來自有故事臣下所當講明而奉行之豈以私意輒可重輕考惇之語是何等語原惇之心誠何等心亡禮背義非臣子所宜出口臣請以大不恭論乞付有司治正惇罪又言臣風聞之初未敢全信後見言者益衆語無不同蓋無禮於君人臣之所共嫉臣不敢蔽而不言以養強臣之惡伏望陛下早賜正惇之罪以厲羣臣此章不知以何月上既是彈擊執政必在許察官言事後今因劉摯劾惇即附見此右諌議大夫孫覺奏朝廷近降指揮御史察官並許言事臣聞朝廷初置察官止令察省寺稽違恐其間有不可任言責者乞令中丞侍御更加察舉某可言事某可罷如不足即令舉可以言事者以聞從之密疏十一月事今附月末十二月十四日安惇劉拯罷殿中侍御史黃降奏江西湖南路已遣使按察蹇周輔并子序辰宜外補以俟典刑詔江西湖南福建鹽事令陳次升張汝賢疾速按察聞奏密疏十一月事夀州夀春縣令充曹州教授周諝言所謂廣濟河實京師漕運三河之數下則通於江淮二浙上則逹於京師故京東一路所産與夫江淮二浙皆得以有無相易而致諸京師京東之民賴此為業者衆矣故祖宗以來輦運之官置之於曹京東錢榖皆自濟至于曹自曹至于京師不過四五百里耳比者李察迎宋用臣清汴之策遂移輦運置於淮揚京東錢榖自濟入泗由泗入清汴而逹於京師迂曲遼逺近二千里臣欲乞輦運復置于曹則不惟便於上供而京東之民亦得蒙其利也詔令户部相度條析利害聞奏密疏十一月事今附月末元年三月二十二日復置
