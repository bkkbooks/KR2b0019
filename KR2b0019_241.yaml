body:
  text: 續資治通鑑長編巻二百三十七宋李燾撰神宗熙寧五年八月丁丑朔詔通逺軍見修策繖丕勒堡兵馬暴露令王韶間行犒設先是呉充言張詵書云詔討南市一日費六百石糧四百貫錢王安石曰吕公弼書亦云費多臣本憂政在犒勞士卒不至若犒勞士卒周足使樂為用即不憂不勝今吕公弼張詵皆言費多即必犒勞周足矣上欲更與錢物安石謂前與陜西轉運使錢物已多今不須也已而上復降此詔仍令張詵應副閏七月五日安石云張利一奏乞牒北界理㑹廵馬過河事王安石曰欲候馮行已到令相度樞宻院以為當理㑹如銀城坊地至今猶理㑹安石曰銀城坊地為此界所取却至今空費文字往來不知如此終能勝契丹否呉充曰不如此恐如諸路奏報必移口鋪過河來復如銀城坊時事安石曰銀城坊是幾年占却文彦博曰慶厯中安石曰今日與慶厯中異恐必不敢來占地彦博曰何以異安石曰慶厯中要關南十縣與三十萬然後止今日恐未敢來求地度陛下亦未肯與三十萬物以此知與慶厯中事異上曰牒去必不濟事然且令邉吏理㑹亦無妨安石以為不須上固以為無妨乃改定牒本婉順理㑹己卯翰林侍讀學士判太常寺吕公著提舉崇福宫從所請也上始欲令公著歸朝公著以病辭王安石因言公著既誣韓琦欲舉晉陽之甲乃自諱匿云未嘗言其意恐公著復用故力排之詔京西路提㸃刑獄庫部郎中賈青賛善大夫李孝純並奪一官與小處差遣坐募役方行奏稱所募人已足司農覆案不實及擅増科役錢也庚辰王韶奏就竹牛嶺東西各招弓箭手一指揮又奏乞度僧牒五百給勾當畨僧並從之詔知原州左藏庫副使兼閤門通事舍人种古知徳順軍皇城副使兼閤門通事舍人周永清並遷西上閤門副使通判駕部員外郎鄭度虞部郎中張暹龍各遷一資餘推㤙賜銀絹有差先是樞宻副使蔡挺言勘㑹到涇原路根括典買畨部并隴山地土因依及勾當官吏等而上批朝廷用財物招軍其官吏尚第有酬奨今根括乃是積年隠沒僥倖閑田一旦歲獲租課及招弓箭手人馬如此之多為利非招軍比也故有是命定走馬承受避親法辛巳廢鄭州以管城新鄭二縣𨽻開封府省原武縣為鎮入陽武滎陽滎澤二縣為鎮入管城廢滑州以白馬韋城胙城三縣並𨽻開封府先是判司農寺曾布奉使過鄭以吏民乞廢州状奏聞乃下京西相度轉運使呉幾復等奏廢鄭為縣罷諸徭役支費實寛民力兼審問民吏實皆樂從而滑州亦以状言本州自天禧河決後市肆寂寥地土沙薄河上差科頻數民力凋敝願𨽻府界與鄭俱為畿邑為便且庶幾王畿四至地里形勢相等已而上又問執政曰聞鄭人不以廢州為便然否王安石進曰此乃鄭民吏自乞又屬王畿則諸事優便所省錢一歲幾十萬緡省州官十餘員鄭州州役省四百餘人諸縣復不在是此兩州止公使庫逐年破壊人産自不可勝言不知何縁廢州乃於鄭人不便又此兩州出役錢比天下為最重若廢即出錢如府界比天下為㝡輕惟是士大夫有置産在鄭州者或不欲爾安石所稱置産葢指曽公亮呉充曰為團練州時甚熙熙因為節鎮故勞敝安石曰為節鎮所添職官一員公人十餘人而已此言非是蔡挺曰人畏保甲上畨故畏屬畿縣爾安石曰保甲上畨以來鄭人投状欲屬府界者不絶滑州乞屬又在鄭人之後上皆以為然乃曰言欲恃鄭滑為吭扼非也故卒廢之元豐八年十二月十二日復鄭州四年八月十五日復滑州壬午察訪荆湖路常平等事章惇言本路蠻事欲乞一靣措置或招到南北江首領犒設錢糧令轉運司應副官員有不職者許選擇對移溪洞有漢界亡命之人亦許招諭放罪責其自效有功者量事酬奨從之舊紀書壬午章惇措置荆湖蠻新紀削去夏國進表不依舊式但謝恩而不設誓又不言諸路商量地界事樞宻院共以為疑上問如何王安石曰中國與外夷要以宗祀殄滅為誓非得已今彼如此但降答詔甚善文彦博曰如此即今年防秋如何上曰便得誓表如何便保彼不為變安石曰誠如此彦博曰盟誓自古所有要知天地神祗尚恐其變若更無此如何可保安石曰若盟誓可賴即夏國引前誓足矣臣恐誓與不誓皆不可保然彼既得歲賜必不便敢抗拒彦博又以為羌人狡猾包藏不可知如何便敢撤備安石曰其勢可見即其情可知恐不足過慮撤備無妨彦博又言有盟誓則彼違盟誓我有辭安石曰若力足以制夏國豈患無辭馮京曰太祖得蜀人與河東蠟書曰我伐蜀有辭矣安石曰太祖偶然有此語若蜀可伐恐雖無蠟書太祖不患無辭如太祖伐江南豈有蠟書但我欲行王政爾乃擅命一方便為可伐之罪如夏國既稱臣未嘗入覲以此伐之亦便有辭臣以為不患無辭患無力制之而已上以為然又論地界安石曰臣本欲議地界者為環慶占夏國地若不與降誓前約定即誓後必復紛紜今既以環慶地與之則餘路更無足議不須復問乃降答詔此據王安石日錄附見本日朱墨二本實録並無此十三日詔可考王安石白上雄州繳進涿州牒牒語甚激切皆由張利一牒涿州所言非理故致彼如此又利一非理侵侮北界事極多文彦博曰北人稱将禮物來白溝驛送納元書内云交割今輙云送納邊臣自當理㑹安石曰當時但為争獻納字今送納與交割亦何校王珪曰元書有納字安石曰既有納字今送字又是平語何理㑹之有彦博曰如此不理㑹則必來移口鋪矣安石曰待彼移口鋪别理㑹彦博曰當先事理㑹彦博等退安石又曰交割與送納無所校陛下不須令邉臣争此臣保契丹無它若出上䇿即契丹移口鋪陛下亦不須問若出中策即待移口鋪然後與計校未晚若縱邊臣生事臣恐以争桑之小釁成交戰之大患臣與張利一風馬牛不相及所以屢言利一者但欲陛下知事之是非人之情偽陛下不知事之是非人之情偽所以決事有不當陛下欲知事之是非人之情偽即當先知所與計事者為忠為邪若所與計事者為邪即不肯以天下治亂安危為已責更或幸天下有事因以濟其姦陛下聖質髙逺然自以渉事未久故畏謹過當未能堪事只契丹移口鋪陛下便須為之惶擾即聽惑聽惑即姦人過計或誤而見聽姦人過計或誤而見聽即宗廟社稷安危未可知陛下既未能堪事即未宜使邉鄙有事陛下欲勝外夷即須先强中國詩曰無競惟人四方其訓之然則强中國在於得人而己汲黯在漢朝淮南為之寢謀汲黯非有智略足憚但為人主計能諒直不為姦欺而已惟其如此故淮南憚之而不敢反若公孫𢎞之徒即非淮南所憚也今陛下左右前後似少如汲黯者此所以未能強中國也上矍然良久曰契丹慶厯中亦為西事故來求關南安石曰慶厯中為仁宗計事者皆全軀保妻子妨功害能之臣如公孫𢎞之徒衆而如汲黯者寡此中國所以不强而契丹敢侮也甲申審官西院祗候差遣使臣請假待闕者依三班院並給假一年樞宻院欲令雄州牒涿州理㑹送納字王安石曰恐不足理㑹文彦博曰見無禮於君人臣所當憤疾此安可但已呉充曰恐自今公牒一向稱送納即難理㑹安石曰天命陛下為四海神民主當使四夷即叙今乃稱契丹母為叔祖母稱契丹為叔父更歲與數十萬錢帛此乃臣之所恥然陛下所以屈已如此者量時故也今許其大如此乃欲與彼疆場之吏争其細臣恐契丹豪傑未免竊笑中國且我欲徃當先計其如何報我今計涿州不過不報即於我未為得伸若更稱引中國許物書有納字即我未有以難彼更為挫屈又引得彼言辭不遜不知朝廷如何處置彦博等固争蔡挺曰此必是契丹朝廷意指涿州何敢如此上曰契丹朝廷如此欲何為安石曰此皆張利一生事激其忿怒故耳陛下但觀涿州牒内所坐利一牒語及涿州所引雄州侵陵北人事即其曲不在彼陛下欲治强敵當先自治臣屬使直在我然後責敵國之曲上因問孫永奏張利一事何如先是永奏利一不當牒北界妄要占兩屬地為南朝地致其回牒不遜又利一已有指揮差替乞暫令人權領事仍催馮行已到任安石曰孫永所奏皆是兩屬地彼元不曽占據却妄牒北界稱是南朝地所以致其占據稱是北朝地彦博曰孫永不知本末從來公牒争辨如此非但今日如斫栁樁亦來争辨此豈是張利一安石曰斫柳樁乃李中吉引惹不可罪張利一剏舘驛不依常式添團弓手決百姓為不合與北界廵兵飲食又行公牒要占兩屬地界此即是利一引惹今既差替却令在任候替人孫永以為不便誠是彦博曰利一人臣豈不欲事了事不了利一自當任責安石固執前說上曰姑令雄州作牒本進呈録知辰州石鑑子大受為郊社齋郎初鑑乞以再任欽州并令知辰州陳乞親屬差遣恩與大受易一文資上以鑑嘗有邉功特與之鑑又言辰州溪洞地接邵州須守臣表裏協應邊事乃可輯詔以左藏庫副使王咸服知邵州以咸服習湖外事故也鄜延路經畧司言根括閒田及侵冒地並以招刺弓箭手詔先擇近便田給降羌之無田者管勾秦鳳路縁邊安撫司王韶等言収復武勝軍詔其合修堡寨處所以聞其蕃族所委牛羊有屬降人者並給還或先已支用者償其直先是七月韶舉兵城渭源堡遣将破䝉羅覺遂城策繖丕勒破穆爾瑞巴族賊時處高恃險諸将欲置陣平地韶計賊茍不肯捨險離巢穴速鬬則我師必且徒歸而師已入險地則當使險為吾所有乃徑領師至瑪爾巴山踰竹牛嶺壓賊軍而陳下令曰兵置死地敢有言退者斬賊乗髙下戰官軍稍却韶親環甲麾帳下兵逆撃之賊衆潰走獲首虜器甲焚其族帳洮西大震㑹摩正渡洮為之聲援餘黨復集瑪爾巴山韶語諸将曰若官軍至武勝則瑪爾巴山可一舉而定乃令景思立王存将涇原兵由竹牛嶺南路張其軍聲示以不疑而韶潛師由東谷路徑趣武勝未至十里遇賊破之轄約等棄城夜遁大首領吹斯繖王阿噶出降遂城武勝新舊紀並於甲申書王韶復武勝軍壬辰以為鎮洮軍先是河北提舉常平倉司言趙州鄉户衙前年滿所役重難分數未足每分當錢五千乞減錢一千以三年分三限償官從之於是有詔候免役法行免納時河北未行役法也王安石因白上今利州路役錢剰十萬緡餘路倣此比已令用常平法蕃息賦州縣吏州縣吏若得禄又有新降贖法又近令察訪官搜舉吏有才行者自此善士或肯為吏善士肯為吏則吏士可復如古合而為一吏與士兵與農合為一此王政之先務也上曰諸司重法吏誠不敢受賕然聞宻院言猶有留滯文字處如何安石曰如西審官三班屬宻院臣所不知如東審官流内銓即文字上下㸃檢吏争欲上籍以為勞矣上曰如此則選人極是長利也此兩叚安石對語朱史乃并入三年八月二十七日失事之次今仍附本日潁州言觀文殿學士太子少師致仕歐陽修卒贈太子太師太常初諡曰文常秩曰修有定策之功請加以忠乃諡文忠要録云修在朝以奨進天下士為己任延譽慰薦極其力而後已修喜薦士一時名卿賢士出修門下者甚衆而薦秩與連庶尤力秩晚仕于朝君子非之修自以為失庶終不出修自以為得也庶應山人嘗為夀春令有政績已而退居二十餘年修及龍圖閣直學士祖無擇薦庶文學行誼宜在臺省詔以庶知崑山縣固辭不行宋庠兄弟及修貧賤時皆依之三人既通顯庶未嘗倚以進也乙酉賜河北常平司内藏庫錢五十萬緡於近邊或沿黄漳御河通漕州軍豐年市肆糴軍儲詔環州界所賑蕃部乾糧特與除破丁亥中書門下言太皇太后自今南郊聖節生辰逐次並録親屬四人恩澤皇后二人本服朞親並奉禮郎大功守監簿小功初等幕職官緦麻知令録異姓準此内幕職官知令録並與監當有服女之夫本服大功以上女夫與之録令小功判司主簿或尉緦麻試監簿周親之女子與知令録孫及大功女之子判司主簿或尉曽孫及大功女之孫小功女之子並試監簿應非所生子罪所生子之子孫各降一等推㤙緦麻女之所生子試監簿年小初等職官知令録並除試大理評事判司主簿尉試監簿年及二十五依所得㤙例與堂除餘依此諸妃大長公主長公主公主毎遇南郊許奏有服親及有服親之夫二人妃朞親寺監簿餘判司主簿或尉異姓試監簿大長公主奏公主奏夫之朞親判司主簿或尉餘試監簿婉容以上每遇南郊許奏有服親一人才人以上奏小功已上親一人並試監簿已上願就右職依新定換官法幕職官左班殿直知令録右班殿直判司主簿尉奉職試監簿借職如已有官親屬文臣中行郎中已下武臣官苑使已下並轉一官選人循一資本條恩例髙者自依本條即以轉官㤙澤換外任者聽仍不許以兩人恩澤合併奏一人内諸妃已下即依熈寧四年九月文武臣僚奏有官親屬條貫熈寧四年九月文武臣寮奏有官親屬條貫今不見于實錄當考或是元年九月更許之十月二十七日戊申所附中書言宰臣有官親屬遷陞等或即是遇奏薦仍並令逐位使臣審問依條貫保明太皇太后皇太后親雖不該推恩而奉特㫖者不用此條詔除公主親王外孫等條别具詳定外餘並從之先是中書樞宻院争議太皇太后以服紀比類推恩事上令用特㫖者不用條至是乃并條前所立條制上之上令用特㫖在今年三月辛丑當考選舉志第二巻八月中書門下言云云有奉特㫖者不用此法始上欲裁廕補㤙幸安石謂自貴始於是太皇太后皇太后推㤙稍為限數樞宻院投隙以間安石率屬爭之安石曰此常數也至奉特㫖則不在此固無傷於㤙也上卒用安石議至是乃并修所立上之本意所書大率多為安石道地附見當考蔡挺言王韶經制洮河宜止殺招降上曰强獷若不討蕩即無縁帖服又言招弓箭手事王安石曰地逺難遥制王韶必有經畫薛向說邊事不畏賊但畏京遞到不合事機耳上曰郢城科等並領衆防托安石曰王韶固欲朝廷知初附諸羌為用然初附之衆不宜令久暴露無㤙澤若徧加勞賜即難給謂宜令韶科等放散其衆獨留精兵防托厚加犒勞賞賜以慰恱衆心人少則不多費財衆心慰恱則樂為用上令安石速與韶書言此并及弓箭手事戊子歙州軍事推官陳郛知秀州華亭縣張若濟並與光禄寺丞賞修水利之勞也左藏庫副使提舉廣州修城張節愛言創築西城及修完舊城畢廣初無城魏瓘始築子城及儂智髙反知廣無城可以鼔行剽掠遂自邕州浮江而下數日抵廣州知州仲簡嬰子城拒守城外蕃漢數萬家悉為賊席巻而去自是廣人以無外城常譌言相驚莫安其居議者皆以為土雜螺蚌不可城獨知州程師孟以為可於是令轉運使向宗道判官盧大年提㸃刑獄陳倩周之純等畵圖來上詔可之遣節愛董役又慮南方不閑版築工仍令以八作都料自隨凡十月而畢師孟宗道大年倩之純並降詔𠡠奨諭賜銀絹有差己丑詔通逺軍以西屯駐軍馬處如闕月支錢許於市易務權借仍具數以聞詔陜西諸路經畧使夏國已差人進誓表可相度減将卒及州軍城寨屯泊東兵初六日進表不依式王安石云云可考辛卯入内供奉官李憲言方築武勝軍乞令本路經畧轉運司應副守城戰具等詔王韶速修築如闕防城噐用令秦鳳路經畧司於近裏城寨應副仍差義勇輦運與免今年教閱憲又言聞韶欲歸通逺備夏國及遣馬忠蕩除瑪爾巴山南不順蕃部乞令韶且在武勝王安石曰韶來通逺必是聲言備夏國實襲不順蕃部乃所以保武勝也上曰瑪爾巴山去武勝逺然豈可令韶只在一處須聽韶往來經畧詔國子監外舍生以七百人為額日給食歲賜錢萬緡詔陜西河東諸路經畧司夏國進誓表朝廷已降詔依慶元五年正月壬午誓詔施行自令約束當職官吏等各守疆場無縱侵掠及不得收接逃來人口初六日十三日並可考壬辰賜武勝軍征役在軍者袍二萬領改武勝軍為鎮洮軍以引進副使帶御噐械髙遵裕兼知鎮洮軍依舊秦鳳路鈐轄同管勾縁邉安撫司所有本軍合置官聽自奏舉上曰聞洮西人至浮渡洮河乞内附先是遵裕以慶平堡兵夜行晨至野人關羌人旅拒親兵一鼓破之進營武勝城下𦍑衆渡洮馳去遂據其城王安石曰洮西必為内地武勝更移市易即必為都㑹洮河據夏國上游足以制其死命上令擘畫更與武勝錢物曰昨韓絳費六百萬貫都無所成今武勝雖更有所費且非妄費安石曰誠如此陛下必欲經畧夏國及秉常稚之時正宜汲汲古人進徳修業欲及時縁天下事機變動無窮及可為之時不可失也上曰時與機誠不可失安石又白上武勝攻討殺傷在人心誠不能無惻怛然觀其每歲遞相讎殺一為屬戸便無此事則一時攻討殺傷有不得已也呉充建議以為師屯暴露糧餉間關生民之勤由此未艾宜委王韶招誘摩正以城還之授以官爵令自守岷洮領部族長為外臣不必留兵絶塞列置郡縣屈力費財上不聽此據充本傳日録二十六日亦畧載充語但不詳耳更須考尋中書門下奏近降指揮令保丁更畨在廵檢下教習武藝許分畨帶出入廵警上畨日保正長保丁毆罵所轄廵檢依本屬刺史縣令法保丁毆罵保長保正加凡鬬二等保長犯保正依此隨廵檢追捕盜賊退避依弓手法但隨廵檢追捕非上畨惟於本地分犯盜加凡盜二等私為人代名上畨杖六十受贓重者從重保正保長知而不舉笞四十私逃亡杖六十計逃日補填酉㸃不到不赴教閱許小杖科決不得過七下餘送本縣施行監臨官私役保正等計庸準盜論從之己巳司勲員外郎崔台符為遼國主生辰使皇城副使田諲副之比部員外郎沈希顔為正旦使西作坊副使閤門通事舍人王文郁副之龍圗閣待制權御史中丞鄧綰為遼國母生辰使皇城使曹偃副之權發遣鹽鐡副使度支郎中王克臣為正旦使皇城副使劉舜卿副之既而綰克臣辭行以權發遣度支副使工部郎中集賢殿修撰沈起起居舍人直集賢院章衡代之又改命田諲押賜夏國生日禮物代供備庫副使任懷政初以懷政使夏國上問懐政家世乃任福姪故兩易之詔職方員外郎權發遣河北提㸃刑獄張穆之徙陜西路權發遣陜西提㸃刑獄太常博士李南公徙河北路仍令穆之督視鎮洮通逺軍修築城堡與張詵協力應副王安石言南公曉事但顧望前却故令與穆之易任先是穆之以權發遣度支判官奉使陜西就除河北提㸃刑獄未旬日也詔鎮洮軍置市易司賜錢帛五十萬其管勾官令縁邊安撫司保舉以聞詔大小使臣因㤙澤奏授得官合出官者並於三等試條各隨所習呈試上等中等内七事下等内八事試中一事以上皆為合格等第擢用歳二月八日以前具乞試人數奏差官同主管官引試内武藝即送武學所試兵書大義策畧筭計並依春秋試文臣法具等第及封試巻申内樞宻院如累試不中或不能就試者於出官歳數外更増五年㑹要元命曽孝寛詳定武臣試格詔以司農寺錢二十萬緡賜秦鳳路縁邉安撫司又以三司錢三十萬緡賜鎮洮軍並為常平本仍令三司重定見錢鈔法委張穆之與安撫司計置糴邊儲詔入内供奉官勾當御藥院李舜舉往雄州體量先是孫永閻士良等體量張利一事所奏或不同上曰須利一離任别遣人於是令舜舉往王安石白上曰聞利一近奏廵馬百餘人過河亦非實邉人語謂之賣險使人撰造報探恐動朝廷欲朝廷留再任故也乙未詔内外待制以上及諸路轉運使副判官提㸃刑獄各舉才行堪升擢官一員中書審察隨材試用新舊紀並書此下月二十八日可考丁酉李憲言洮河相對西岸摩正人騎出沒若令秦鳳路就近調發軍馬掎角應接則戎人畏服於勢為便從之詔廣南東路轉運判官許彦先察訪廣南西路常平等事及體量官吏違慢措置乖方者以聞王安石奏事因陳天下水利極有興治處民間已獲其利上曰灌溉之利農事大本但陜西河東民素不習此今既享其利後必有繼為之者然三百渠為利尤大兼有舊迹自可極力興修大凡䟽積水須自下流開導則畎澮易治書所謂濬畎澮距川者是也雄州言契丹廵馬又過河樞宻院以為必将添置口鋪上疑之僉言當與理㑹蔡挺謂宜先辨彼舊不應置鋪必須北使來說諭王安石曰既改易官吏且委令應接待彼依前譸張或移口鋪即徐理㑹未晚挺曰彼謀深安石曰若契丹有謀不應如此紛紜以契丹之大乃區區争雄州一口鋪地是何計策縱我不與之爭乞與一口鋪地於彼有何所利於我繫何強弱我修館驛彼邊臣即以為南朝必是相次要占據兩屬地於此作城鎮湏理㑹彼契丹邉臣如此者以為若理㑹後南朝為我拆去即是我有功因此獲官寵契丹不察邉臣情状所以如此紛紜今我邉臣亦與彼情状無異陛下若能照察即邊事自然寧息今日所以紛紜盡縁是張利一生事馮京以為不因利一故如此上曰昨涿州牒廣信軍亦但指雄州過失其意只恐利一上又言張利一累次摧沮涿州來使安石曰如妄笞責邊民致冦民怨恨即須撰造事端疑誤北界人令生事以揺動所差官吏今李舜舉去陛下恐須說與馮行已等毎事務在平静不得生事以文牒侵陵北界自然無事上意終未能不虞契丹置口鋪安石曰能有所縱然後能有所操所縱廣然後所操廣契丹大情可見必未肯渝盟陛下欲經畧四夷即須討論所施先後臣比見王韶奏議邊事以為朝廷自來言攻則攻於此而已言守則守於此而已臣以為今日之病政在於此陛下憂契丹移口鋪即只一向於口鋪上計議臣以為政如王韶所奏陛下若能經畧夏國即不湏與契丹争口鋪契丹必不敢移口鋪若不能如此雖力爭口鋪恐未能免其陵傲上曰若能討蕩夏國契丹可知不敢安石曰以中國之大陛下憂勤政事未嘗有失徳若能討淪所以勝敵國之道區區夏國何難討蕩之有不務計論此乃日日商量契丹移口鋪事臣恐古人惜日不肯如此戊戌詔諸路縣鎮有兵馬處凡遇冬至正旦及同天節犒設軍員所費舊令知縣都監更出錢甚無謂其自今以本州公使錢給之賜太學生葉適進士及第為試校書郎睦州推官鄆州州學教授適處州人管勾國子監張􅀈等言適累試優等也林希野史云熙寧四年春更學校貢舉之法設外舍内舎上舎生春秋二試由外舍選陞内舎由内舎選陞上舎上舍之尤者直除以官以錫慶院為太學舊制進士之外有明經明經者通三經經各問義十道而應者皆能充其科文詞有可觀者安石既罷詩賦獨設一科謂之明經進士始議人通二經後但命通一經而已意使士人悅而易就而樂從新科也五年春命判監直講者試外舍生有練亨甫者久從雱學安石亦愛之意謂必在優等既而榜出亨甫乃在下列安石父子大怒詰責􅀈定等退而檢取亨甫巻對義但及九道急令考官自首亨甫更被黜落安石遂命經義減半别補外舍生定希㫖請不彌封事雖不從而諸學官公然直取其門下生無復嫌疑四方寒士未能習熟新傳而用舊疏義一切擯黜自此士人不復安業日以趨走權門交結學官為事葉適者處之巨豪前此斥於廷試素以交結陸佃為之引譽􅀈定遂推第一欲誘動士心貪利慕已於是列奏適之文章行義卓絶遂賜進士及第鄆州教授又留為直講而亨甫是秋發觧遂居第一既限一經又試義減用五道以此誘輕薄急進者遂致百家子史之言一不經目更不復閲習惟以新傳模倣敷衍其語耳是歲國子監薦一百五十人諸家門生占百三十人開封薦二百六十人諸家門生占二百餘人諸直講揚言曰自此罷科舉但用太學春秋兩試所占上等如葉適直除以官於是士心皇懼惟恐不得出諸學官之門也按希所云明經講經數道指為亨甫事當考詔賜懐州州學牧馬草地十頃開封府界提㸃司請置内縣保甲衣装二萬副大旗二十五靣以候都閱借給從之罷諸路經畧安撫司勾當公事官詔鎮洮軍修城令於未凍以前畢工如役人少速以官錢募人仍多方招撫未歸順蕃部早令安帖於是蔡挺請發成隴等州義勇助修鎮洮城王安石曰西事甫定人初得休息聞鎮洮之役固已憂疑恐不免調發今發成隴義勇非十日文字不至又十日乃始可行又二十日乃始到鎮洮即已不及事恐只合令就近和雇人雖蕃部亦不可雇寧棄十數萬貫錢不可令百姓勞擾上以為然安石又白上義勇今止兩丁者甚多若要戍邉即湏減却兩丁人上曰兩丁或有稚老安石曰稚或絶幼老或已衰又或都無稚老若令一丁逺戍即人情難以久堪立法要須人情欣頼不可使其怨咨也諸路屢探西人㸃集欲襲鎮洮策繖丕勒王安石曰此多是探人反為西人所誤此所謂因間也度西人必不敢來襲上以為然又言王韶得裕勒藏喀木蕃字知西人無他必得實因白上王韶獨能因喀木以間西人動静絶勝諸路令人探事謂宜委韶令因喀木輩厚結納西人要近為間上曰喀木亦必要財物待令王韶與之仍須與韶財物委之結納安石曰雄州有官庫專給用間今通逺如雄州置庫委韶以財物必能辦此此經畧夏國之要務且蕃夷嗜利不知義引漢髙祖啖秦将及陳豨将事上以為然己亥詔以京西路分南北兩路襄鄧隨房金均郢唐八州為南路京西滑孟陳許蔡汝潁七州信陽軍為北路此據五朝㑹要増入七年四月甲午又分京東庚子上論太宗時用兵多作大小巻付将帥御其進退不如太祖王安石曰太祖知将帥情状故能得其心力如言郭進反乃以其人送郭進此知郭進非反也故如此此所以如進者皆得自竭也此與唐徳宗送言李錡反者與錡異矣其後郭進乃為姦人所摧至自殺楊業亦為姦人所䧟不得其死将帥盡力者乃如此則誰肯為朝廷盡力此王師所以不復振非特中御之失而己上曰祖宗時從中御将帥蓋以五代時士卒或外附而叛故懲其事而從中御安石曰人君所以為士卒所侮者必先為貴近所侮而不悟以至於此孟子曰能治其國家者孰能侮之茍為貴近所侮而不悟即士卒敢侮安能使方鎮外夷不侮太祖能使人不敢侮故人為用人為用故雖不中御而将帥奉令承教無違者此所以征則强守則固也辛丑詔文臣京朝官至幕職州縣官武臣諸司使副以下至三班使臣朝辭日並罷賜誡勵𠡠并七條攝生論其賜儒行篇亦罷之内攝生論并藥方惟廣南州軍各賜一本與聖恵方同頒之詔知階州内藏庫副使劉舜臣奪一官勒停坐掠上畨義勇僦錢及州人由橋梁過者皆率錢謂之打撲以供公使為御史彈奏也檢正中書刑房公事李承之充集賢校理以上批承之案視淮浙農田差役等事能識朝廷所以命使之㫖宣布法意致州縣易於奉承亟得就緒故特奨之承之嘗言内藏左藏因行重法吏雖不受賕而剥納乃多於昔王安石曰此乃為衙前所欺縁衙前見朝廷差相度役法官惟恐知其至京庫務不行錢即減其酬奨分數故為此說臣已兩次較未行重法以前剥納數比行重法後乃亦不少即可知其妄也上謂安石曰浙西役錢上等有一户出六百貫者然如此數十户皆兼并多取之無妨惟第五等户錢不多放却如何安石曰出六百貫者或非情願然所以摧兼并當如此其中亦有情願者縁出六百貫之家是有四百貫稅錢所憚者非出錢憚刑責而已如蘇州曹家兩人子弟盡因差充衙前被徒刑如此人家雖出六百貫而免令子弟充役受刑亦所願也第五等出錢雖不多如兩浙一路已除却第五等下不令出錢外尚収四萬貫若遇本路州軍有凶年以募人興修水利即既足以振救食力之農又可以興陂塘溝港之廢陛下但不以此錢供苑圃陂池侈服之費多取之不為虐也今於其樂輸之時放而不取及其凶年乃更脅誘百姓使出錢捄饑上曰今亦不免勸誘人出錢救饑安石曰役法未行未有役錢故也雖然出錢救饑若非逼脅難出之人亦不為害兼并積蓄富厚皆蠶食細民所得若因凶年令隨等第薄有所出以救饑人茍均取而不偏人自樂輸而不怨安石所云出六百千役錢是有四百千稅錢當考四年四月二日又五月十六日又七年正月十三日皆合参考徽宗實録舒亶判司農寺朝廷推行新法亶言役法未均責在提舉官神宗曰提舉官未可責也近臣僚有自陜右來者欲盡蠲免中下之民朕謂不然夫衆擎易舉天下中下之民多而上户少若中下盡免而取足上户則不均甚矣朝廷立法但欲均爾即可講求以聞按熈寧五年八月第五等下已除却不令出役錢不知亶判司農時下户猶未蠲免當考亶判司農在元豐四年三月以後太子中允蔡曄權發遣荆湖南路轉運副使癸卯右司諫直龍圖閣權發遣延州趙卨為起居舍人仍賜紫章服以定綏州地界之勞也初夏人屢欲欵塞每虛聲揺邉上手勑問方畧卨審料形勢為破賊之策以獻遣曲珍吕真分廵東西路與兵千人鈐轄李顒自恃宿将謂卨儒者不知敵情曰敵豈盛夏來耶誠遇敵千兵何為冝罷之以待防秋卨笑不答賊方以四萬衆自間道欲取綏州至魯班崖遇曲珍以吾為知其謀惶駭亟戰吕真繼至賊敗走俘斬千餘是秋諜言敵大閱将入冦顒懼亟請濟師卨不聽邊亦無警坐諜者顒等慙服賊自失綏州懐未能已屢測朝廷意卨揣知其情奏言賊使請和必欲畫綏州界望令聽本路經畧司分畫嵗賜則以通和之日復焉於是事定卨謀居多故賞之此据范百禄所為卨墓銘新舊傳並刪取然魯班崖破賊事於它書絶不見又疑賊已遣使通和或無此事不然此事當在去年更湏考詳貶太子中允同知諫院權同判吏部流内銓唐坰為潮州别駕要録初坰上書乞斬非青苗者韓琦等數人坰初以王安石薦得召見驟用為諫官數論事不聽遂因百官起居越班叩陛請對上諭止之坰堅請上殿讀疏論王安石用人變法非是上怒其詭激故貶坰疏留中其畧云安石用曽布為腹心張􅀈李定為爪牙劉孝孫張商英為鷹犬元絳陳繹為厮役逆意者久不召還附同者雖不肖為賢又作姦令章惇變李定獄事又擅議宗廟事有輕神祖之心保甲以農為兵凶年必至怨叛免役損下補上人人怨咨而令監司壓塞州縣事不上聞又保甲事曽布蔽塞人情欺誣人主以為情願又置市易司都人有致餓死者以安石比李林甫盧杞自文彦博以下皆畏安石又言王珪奴事安石猶懼不可上問安石曰坰何故如此安石曰臣待罪執政歲久無所補助數致人言比已嘗乞避位未䝉許可若臣不獲辭紊煩聖聽未有窮已上曰此皆朕不能調一天下辨察小人故致此卿何足以此介意朕以卿為無欲專以生民為意故委任卿坰小人何故如此此必有說安石曰國朝大臣亦更出互入不如是即無以壓人言上曰朕用卿豈與祖宗朝宰相同卿不須爾又言坰嘗言章辟光二十餘次到卿終不與一差遣坰謂辟光曽言事望卿優擢坰又言引趙抃用拒陳升之用吕公弼楚建中為與韓絳不足故用絳所惡人人亦安能照管得許事又言安石偽請踈決罪人為張琥地上曰朕批出為不雨故踈決安石曰李定事陛下未能了然無疑李定事有本末陛下但取案巻子細詳前後情理即事自見此事自有人為姦罔而陛下不寤上又曰卿曽言坰别無用處或縁此言泄漏否馮京曰臣素曽奏唐坰輕脫不可用安石曰仁義何常之有蹈之則為君子違之則為小人方其正論豈當逆疑其為邪而廢也安石退而京奏事上令京諭安石自今進用人或不可於意但極論王珪謝上曰臣等不能調一内外故致小人詆宰相上曰誠然御史中丞鄧綰上䟽救坰逺徙仍自劾妄舉之罪上令放罪翊日執政進呈安石言坰素狂不足深責乃改授大理評事監廣州軍資庫朱本云坰數論事非理不見聽或紿以執政懐怒欲罷其職者坰素性急乃越次請對朱本盖為王安石諱也新本削去今附注此又中書時政紀八月閤門言今月二十六日百官起居退有知監院太子中允唐坰越班叩陛輙有奏陳竊謂臣子涖職葢有著位今唐坰直敢邀君請對凟亂無儀傳之中外有虧國體乞賜聖斷以肅朝風詔曰朕置諫争之臣以左右交儆懼明有所未燭智有所未周何嘗不虚心聽受擇是而從至於獻納之臣固有清閒之燕况乎咸造勿褻百辟今坰越次以前率爾求對妄肆誣詆鄰於狷狂殆必設竒詭以沽直矯經常而駭俗非所以稱朕奨擢責任之意可責授評事監廣州軍資庫其論宰臣王安石疏留中時政紀稍與日録不同今附注此月十二日安石云云可考京林希野史云唐坰少年輕狷無行以秘書正字監北倉草場數上書言事安石患諸臣不唱和新法坰請誅敢有異議者安石喜之力薦於上得召對上薄其為人但試出身除知錢塘縣安石固留之以為校書修令式遂使鄧綰薦為御史除太子中允數月欲用為諫官則疑其輕脫暴得位将背已立名時不除職但以本官同知諫院故事未嘗有也坰氣脫果怒安石易已見綰等碌碌如庸奴心薄之思自立名字自壬子三月入院至秋凢奏二十餘疏論時事上已恠之疏皆留中不出八月二十六日垂拱殿起居百官方退兩府猶侍立未奏事坰忽扣殿陛請對事不素請殿中皆驚上愕然遣閤門使諭坰他日請對坰不肯又令詣後殿坰曰臣所言者請與大臣靣辨又再三喻旨坰伏不起乃召陞殿坰至御座前徐徐於袖中出一大軸将進讀上曰疏留此卿姑退坰曰臣所言皆大臣不法請對陛下一一陳之乃搢笏展疏目安石曰王安石近御座前聽劄子安石初猶遲遲不肯前坰呵曰陛下前猶敢如此倨慢在外可知安石悚然為進數歩坰大聲宣讀凡六十餘條大畧以安石專作禍福布等表裏擅權傾震中外引用親黨以及阿諛無行小人布在要地為已耳目天下但知憚安石威權不知有陛下新法煩苛刻剥萬端天下困苦即将危亡今大臣外則韓琦内則文彦博馮京等明知如此憚安石不敢言陛下深居九重無由得知王珪備位政府曲事安石無異厮僕且讀且目珪珪慚懼俛首退縮元絳薛向典領省府安石頥指氣使無異家奴䑓官張商英等彈奏未嘗言及安石黨此乃安石鷹犬非陛下耳目也每讀一事畢即指安石曰請陛下宣諭安石臣所言虚耶實耶上屢止之坰慷慨自若畧不退懾侍臣衛士相顧失色讀畢又指御座曰陛下即不聽臣言不得久居此座降殿再拜而出至殿廬揖綰曰某䝉公薦引不敢負徳乃乗馬直出東門永寧院待罪上顧左右問坰何乃敢爾安石曰此小兒風狂又為小人所使不足恠也初議貶潮州别駕韶州安置明日以大理評事監廣州軍資庫上意雖寤亦不深怒安石初用坰時京以其輕佻無行不可處彌縫顧納之任屢争之不聽至是貶京力救之薛向奏事上曰昨日唐坰言事卿知之否向曰臣不知其詳上曰昨日前殿是何火色坰将奏䟽時意謂誅竄公亮坰從母夫也從之貸錢三百千公亮鄙吝以坰在諫省故與之坰晨入朝留書訣妻子且死即以是為生坰既逐留城外公亮大悔使人督索甚急盡得而後已且以自觧於安石綰上書論救坰云臣初但見坰文雅推薦之今朝廷将逺行竄謫乃臣薦舉之罪不足深責坰清貧累重乞聖慈寛矜之置近地治臣薦舉不當之罪以示中外傳者無不笑之按希載坰事頗詳國史皆畧之今特附注此韓駒云唐坰熈寧初詆時政神宗欲黜之王安石曰黜諫官非美事止令還故官故事臺諫罪黜皆有叙法若還故官即永不叙其後有送吏部之法始於此坰初以監倉召今還為監庫駒云似得之當更考詳明著其事詔陜西丹寧隴州河北永寧永静軍知州軍自今參用文資樞宻院言自來頒外司文字有未曉所得指揮乞申明等事例亦擬進頗煩聖覽欲只用本院劄子行下次日編類進入乞内中畫進呈訖降出照㑹從之此據㑹要乃五年八月二十六日事今附見檢詳樞宻院兵房文字蘇液言應合奏薦助教者乞並不許移易名目及陳乞與公人減年及差遣等從之西上閤門使端州團練使新知代州李綬言乞今後應臣僚之家奏薦及諸般出職合授殿侍三班差使之人如願不帶殿侍只補三班差遣詔今後合得三班差使者不帶殿侍仍别定請給前此差使者𨽻殿侍班以軍伍畜之世禄之家深以為耻至是人稱其便李綬申請據㑹要八月二十七日事今附本日蘇液所言在二十七日前今亦附此此二事皆據㑹要修入甲辰罷諸路轉運司勾當公事官内廣西經畧司勾當公事二員檢㑹差置月日取㫖時樞宻院已罷諸路經畧安撫勾當公事官而温杲在廣西實上所命且方有意圗交州故不即罷也温杲廣西經畧司勾當公事乃四年四月差是日王韶奏破摩正於觀凌城此據新舊紀九月一日摩正弟授官可考是月廢杭州南新縣為鎮光化軍為光化縣𨽻襄州詔司農寺以方田均稅條約并式頒之天下方田之法以東西南北各千歩當四十一頃六十六畆一百六十歩為一方歳以九月縣委令佐分地計量據其方荘帳籍騐地土色號别其陂原平澤赤淤黒壚之類凡幾色方量畢計其肥瘠定其色號分為五等以地之等均定稅數至明年三月畢掲以示民仍再期一季以盡其詞乃書戸帖連荘帳付之以為地符地符見七年四月四日合去彼存此均稅法以縣租額稅數毋以舊收蹙零數均攤於元額外輙増數者禁之若絲綿紬絹之類不以桑柘有無止以田畆為定仍豫以示民毋胥動以浮言輙有斬伐荒地以見佃為主勿究冒佃之因若瘠鹵不毛聽占佃衆得樵採不為家業之數衆戸殖利山林陂塘道路溝河墳墓荒地皆不許稅詭名挾佃皆合併改正凡田方之角有埄植以野之所宜木有方帳有莊帳有甲帖有户帖其分煙析生典賣割移官給契縣置簿皆以今所方之田為正令既具乃以濟州鉅野尉王曼為指教官先自京東路行之諸路倣焉此據食貨志又據中書備對熈寧五年重修定方田法自京東為始推行衡改三司方田均稅條夏稅併作三色絹小麥雜錢秋稅併作兩色白光雜錢其蠶塩之類已請官本者不追造酒秔糯米馬食草仍舊逃田驗田官占等稅亦依舊倚閣屋稅比附均定墓地免均如稅額重䖏許減逃閣稅數今以本志及備對就八月末追書實録既不書方田事始舊紀於七月三月二十三日乃書立方田法新紀又因之按鄧潤甫察訪京東申明方田官考任即非事始兩紀誣甚今不取食貨志第二巻租稅萹云天下之稅割移逃徙多或不均熈寧五年蔡天申言請委提舉司均稅而頒於司農先行於河北陜西河東京東詔用其議於是司農寺始立方田均稅法頒之天下先自年豐及平土州縣行之通畧云天申挺子也
