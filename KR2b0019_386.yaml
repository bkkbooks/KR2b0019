body:
  text: 續資治通鑑長編巻三百八十二宋李燾撰哲宗元祐元年秋七月丙辰朔尚書省言舊制中外學官並試補近詔尚書侍郎左右司郎中學士待制兩省御史臺官國子司業各舉二員宜罷試法先是王巖叟言伏以砥名礪行以待用於世者士人之所自處也養士人之節以成就其美而風天下之俗者朝廷之所以處士人也臣竊見内自太學外至諸郡學官之制皆令就試四方之士區區於進巻屑屑於程文不憚奔馳之逺留滯之久者顧豈其心哉禄仕迫之有不得已耳甚非所以重師道崇儒風惜士人之節也禮曰道尊然後民知敬學孟子曰人之患在好為人師今立法如此使人人自求為師欲天下之民知敬學恐不可得臣愚伏望聖慈令罷此法一用應詔薦舉之士為中外學官以重教導之選為天下勸貼黄稱如䝉特賜罷試用舉乞歲令近臣并諸路監司各舉所知朝廷採察而用之其武學學官亦乞依此罷試用舉於是從巖叟之言也舊録云時法無巨細悉罷新録辨曰前此詔舉學官今所舉人材既衆自不須别行選試乃曰法無巨細悉罷非也今刪去按罷試學官實從王巖叟議新録似考之未詳丁巳詔開封府界提㸃刑獄司置檢正官一員中書舍人蘇軾言臣先曾奏論衙前一役只當招募不當定差執政不以為然臣遂奏乞罷免臣詳定役法奉聖㫖不許經今月餘前所論奏並不䝉施行而臣愚憃終執所見近又竊見吏部尚書孫永奏駁臣所論蓋是臣愚闇無狀上與執政不同下與本局異議若不罷免即執政所欲立法無縁得成况今來季限已滿諸路立法文字節次到局全藉通曉協同之人共力裁定如臣乖異必害成法乞早賜指揮罷免所有臣固違聖㫖之罪亦乞施行又以狀申中書省曰軾近奏乞罷詳定役法已奉聖㫖依奏竊見孫給事繳奏前件聖㫖乞取孫尚書及軾所議付臺諫給舍郎官定其是否然後罷其不可者須至申乞指揮軾前後所論役法事軾已自知疎繆决難施行所有是否更無可定奪乞只依前降指揮行下軾自今日以後更不敢赴詳定所簽書公事伏乞早賜施行從之軾意以為差役法弊當改但不當於雇役實費之外多取民錢若量出為入無多取民錢則亦足以利民嘗白司馬光光不然之軾曰昔韓魏公刺陜西義勇公為諫官争之甚力魏公不樂公亦不顧軾昔聞公道其詳豈今日作相不許軾盡言耶光不悅而罷政目軾奏詳定役法與執政及同局不同乞罷免從之蘇轍誌軾墓云遷中書舍人時君實方議改免役為差役行於祖宗之世法久多弊編户充役不習官府吏虐使之多以破産而狹鄉之民有不得休息者先帝知其然故為雇役使民以户髙下出錢而無執役之害行法者不循上意於雇役實費之外取錢過多民遂以為病若量出為入無多取於民則足矣君實為人忠信有餘而才智不足知免役之害而不知其利欲一切以差役代之方差官置局公亦與其選獨以病在告而君實不恱公常見之政事堂條陳不可君實忿然公曰昔韓魏公刺陜西義勇公為諫官争之甚力魏公不樂公亦不顧軾昔聞公道其詳豈今日作相不許軾盡言耶君實怒而止公知言不用乞補外不許君實始怒有逐公意㑹其病卒乃已時臺諫官皆君實之人皆希合以求進惡公以直形已争求公瑕疵既不可得則因縁以謗訕之語讒公公自是不安于朝矣按轍所作墓誌恐有私意難盡信今刪取之已未保州言河水汎溢浸及先皇墳地請就本州界來年春夫修築從之殿前馬歩軍司言内外諸軍馬歩射自有教閱格法已教習成就其元豐七年續降射弓病色若盡行減去於教法無害從之假承務郎髙英言請以强盗比吏之枉法監守之自盗不用赦原仍除投換之法庶幾羣盗有所畏憚令兵部相度配軍元犯强盗者自今不許投換別軍從之辛酉宰臣司馬光言臣竊惟為政之要莫如得人百官稱職則萬務咸治然人之才性各有所能或優於徳而嗇於才或長於此而短於彼雖臯夔稷契止能各守一官況於中人安可求備是故孔門以四科論士漢室以數路得人若指瑕掩善則朝無可用之人苟隨器授任則世無可棄之士臣誤䝉甄擢備位宰相遴選百官乃其職業而智識淺短見聞褊狹知人之難聖賢所重寰宇至廣俊彦如林或以恬退滯淹或以孤寒遺逸被褐懷玉豈能周知若專引知識則嫌於挾私難服衆心若止循資序則官非其人何以致治莫若使在位達官人舉所知然後克協至公野無遺賢矣臣不勝狂愚欲乞朝廷設十科舉士一曰行義純固可為師表科有官無官人皆可舉二曰節操方正可備獻納科舉有官人三曰智勇過人可備將帥科舉文武有官人此科亦許鈐轄已上武臣舉四曰公正聰明可備監司科舉知州以上資序人五曰經術精通可備講讀科有官無官人皆可舉六曰學問該博可備顧問科有官無官人皆可舉七曰文章典麗可備著述科有官無官人皆可舉八曰善聽獄訟盡公得實科舉有官人九曰善治財賦公私俱便科舉有官人十曰練習法令能斷請讞科舉有官人應職事官自尚書至給舍諫議寄禄官自開府儀同三司至大中大夫職自觀文殿大學士至待制每歲須得於十科内舉三人非謂每科各舉三人謂各隨所知某人堪充某科共計三人其状云臣竊見某人有何行能並須指陳事實不得塗飾虚辭位在上者得舉在下之人位在下者不得舉在上之人臣今保舉堪充某科如䝉朝廷擢用後不如所舉謂如舉行義純固而違犯名教節操方正而佞邪憸險智勇過人而愚懦致敗公正聰明而私曲昏闇經術精通而不能講讀學問該博而空疎牆面文章典麗而鄙拙紕繆善聽獄訟而寃滯失實善治財賦而病民耗國練習法令而屢致出入及犯正入已贓臣甘伏朝典不辭候奏狀到日付中書省擇勤謹吏人專切收掌仍每科各置簿盡行抄録年月日某官姓名舉某官姓名別置合舉官臣僚簿歲終不舉及人數不足按劾施行或遇在京或外方有事須合差官體量相度㸃檢磨勘剗刷催促推勘定奪則委執政親檢逐簿各隨所舉之科選差令試管勾上件事務若能辦集即別置簿記其勞績遇本科職任有闕謂若經筵或學官有缺即用行義純固經術精通學問該博等科人臺諫有缺即用節操方正科人之類則委執政親檢逐簿選名實相稱或舉主多或有勞績之人補充仍於本人除官敕告前盡開坐舉主姓名於後或不如所舉其舉主從貢舉非其人律科罪犯正入已贓舉主减三等科罪若因受賄徇私而舉之罪名重者自從重法期在必行不可寛宥雖見為執政官朝廷所不可輟者亦須降官示罰即朝廷臨時因事特詔舉官謂若舉知河渠馬牧等之類不在十科之内者有不如所舉亦同此法所貴人人重審所舉官皆得人從之舊録云光得譽流俗及為相廢法報怨一無所施設獨請以十科取士終為空文無應選者人始笑之新録辨曰以司馬光為得譽流俗廢法報怨一無所施設此言不可以傳示後世自光至笑之三十六字並刪去二年十二月十二日諸路立額數當考禮部言祠祭官致齋在本司及祠宫内與同局及同行事官相見當勿用謁禁從之通議大夫張問為祕書監太常少卿鮮于侁為大理卿侁辭之尋復故政目與實録同九月十二日乃復自少常遷左諫大夫蓋此月十四日侁罷大理卿復故官政目有之按八月二十七日劉摯云侁以老病辭大理卿也實録缺此主客員外郎王子韶知夀州傳云請補外得夀州恐必有故朝議大夫直龍圖閣范子竒為將作監元豐八年四月以直龍圖為河北漕河南轉運副使李南公知滄州閏二月自河北改河東先是祕書少監劉攽等言先與故祕書丞劉恕同編修資治通鑑恕於此書功力最多及此書成編修屬官皆蒙甄録惟恕身亡其家獨未霑恩子孫並無人食禄請援黄鑑梅堯臣例除一子官於是司馬光亦為之請詔與恕一子郊社齋郎措置熙河蘭㑹路經制財用孫路言蘭州定西城一帶新邊地土除已招置弓箭手外有曠土萬餘頃未曾修築堡障而有賊馬抄掠之虞請自蘭州東關堡東修葺智固勝如護耕三堡及於裕勒藏六族中森摩幹灘内定西城東玉樓山各築堡䕶耕差役人共與本地分弓箭手相兼守禦詔劉舜卿相度如合修築即漸次興修九月二十四日壬戍龍圖閣直學士朝奉大夫鄜延路經畧安撫使趙卨為朝議大夫舊録云賞邊功也新録因之按趙卨磨勘轉朝議大夫蘇軾行詞云論歲月以稍遷姑從舊典故乃云賞邊功功名於不世勉及前人不知舊録何録不復考詳即用舊文亦大疎略矣元祐初政司馬光主議專欲不賞邊功兼此時卨未嘗出兵討賊何功之可賞蓋紹聖史官假託誣罔耳疎略類此可不惜哉兼元豐八年四月二十二日獲夏人葉結威明皆已自待制遷龍直矣卨傳云云更詳考右司諫蘇轍言臣近於六月二十八日奏以西使入界恐有講和請地之議乞因此時舉蘭州及安疆米脂等五寨地棄而與之安邊息民為社稷之計見今西使已到竊聞執政大臣棄守之論尚未堅决臣竊見皇帝陛下登極以來夏國雖屢遣使而疆場之事初不自言度其狡心蓋知朝廷厭兵是以確然不請欲使此議發自朝廷得以為重朝廷深覺其意忍而不與情得勢窮始來請命今若又不許遣其來使徒手而歸一失此機必為後悔彼若㸃集兵馬屯聚境上許之則畏兵而與不復為恩不許則邊釁一開禍難無已間不容髪正在此時不可失也臣又聞昔日取蘭州及五寨地本非先帝聖意先帝始議取靈武内臣李憲畏懦不敢前去遂以兵取蘭州先帝始議取横山帥臣沈括种諤之徒不能遵奉聖略遂以兵取五寨此二者皆由將吏不職意欲邀功免罪而先帝之意本則不然其後元豐六年夏國遣使請罪先帝嘉其恭順為敕邊吏禁止侵掠既又遣使謝恩請復疆土先帝仍為指揮保安軍與宥州議立疆界因循未定而先帝奄棄萬國遂以至今由此言之蘭州五寨取之則非先帝本心棄之則出先帝遺意今議者不深究本末妄立堅守之議茍避棄地之名不度民力不為國計其意止欲私已自便非社稷之利也臣又聞議者或謂棄守皆不免用兵棄則用兵必遲守則用兵必速遲速之間利害不逺若遂以地與之恐非得計臣聞聖人應變之機正在遲速之際但使事變稍緩則吾得算已多昔漢文景之世吳王濞内懷不軌稱病不朝積財養士謀亂天下文帝專務含養置而不問加賜几杖恩禮日隆濞雖包藏禍心而仁澤浸漬終不能發及景帝用晁錯之謀欲因其有罪削其郡縣以為削之亦反不削亦反削之則反疾而禍小不削則反遲而禍大削書一下七國盡反至使景帝發天下之兵遣三十六將僅而破之議者若不究利害之淺深較禍福之輕重則文帝隠忍不决近於柔仁景帝剛斷必行近於強毅然而如文帝之計禍發既遲可以徐為備禦稍經歲月變故自生以漸制之勢無不可雖有十濞亦何能為如景帝之計禍發既速未及旋踵已至交兵鋒刃既接勝負難保社稷之命决於一日雖食晁錯之肉何益於事今者欲棄之策與文帝同而欲守之謀與景帝類臣乞宣諭執政欲棄者理直而禍緩欲守者理曲而禍速曲直遲速孰為利害况今日之事主上妙年母后聽斷將帥吏士恩情未接兵交之日誰使効命若其羽書沓至勝負紛然臨機决斷誰任其責惟乞聖慈以此反覆深慮早賜裁斷無使西戎別致猖狂棄守之議皆得其便則天下幸甚左司諫王巖叟言巖叟疏不得其時今附蘇轍疏後臣累月前嘗上疏論天下之大害曰莫如蘭㑹之坐弊中國願陛下早圖之今聞西人入朝以請地為事陛下念生靈安樂久逺之計深以此事屬謀國大臣而聞大臣議論參差無一定之策竊度聖心惑之未有以處臣以謂聽言之道必以事觀之則一言可决國家未開拓以前惟以信義為重蠻夷之心不敢輕侮故邊患少邊患少故民力紓民力紓故人心安人心安故兵威強所以能坐制邊徼而不自弊開邊以來以有限之財供無窮之費貪無用之地民力已困而不可支人心已危而不可保兵威已沮而不可恃不於此時修復信義為天下休息計尚可固執更增後日之患乎昔漢桑宏羊輩請田輪臺之田以威西域武帝下詔深陳既往之悔曰前有司奏欲益民賦三十助邊用是重困老弱孤獨也今又請逺田輪臺是勞擾天下非所以優民也今朕不忍聞廼封丞相車千秋為富民侯以明休息思富養民也今議者欲請留蘭臯而田之何以異此惟陛下鑑武帝之所以悔於終者早悔之幸甚至宣帝時魏相請罷車師之田元帝時賈捐之請棄朱崖郡唐相狄仁傑亦請棄西鎮立斛瑟羅為可汗又請棄安東却立髙氏李徳裕亦請勿保安西是數人者皆一時之賢豈不為國家惜威靈重棄其地哉蓋不欲貪外耗内疲竭生靈徇虚名受實弊遺國家無窮之患也今窮荒之地於國家之勢不以得為強不以失為弱識者皆曰去大患以自全乃所以強耳夫得地不如養民防人不如守已今因其有請而與之足以示懷柔之恩結和平之信若失此時後日兵連禍結中國厭苦而腹心之患生陛下雖欲舉而棄之將不能矣臣度議者不過曰十餘年間竭天下之力而得之寧忍一旦委之乎此不知經逺者之論也夫已耗之民財已傷之民命既非悔可追矣而後日之患猶不慮之于今則當何時而已耶又不過曰恐啓無厭之求益生邊患不如勿與此不知自處者之慮也夫彼求者無名則我執者有辭無名之求勢當自屈且彼雖外夷既已與之寧不知恩尚何無厭之請耶若有恩以結之猶恐其來則無恩以與之將如何哉臣聞開邊之初其費不可以數言罷兵之後歲歲常費猶不減數百萬一有騷動其將奈何陛下須念此皆中原生靈膏血夫中原者陛下據之以制邊徼者也而以生靈膏血塗窮荒不毛之地欲為垂世長久之計豈不殆乎惟陛下留神早賜睿斷天下幸甚御史中丞劉摯言摯言不得其時當在夏使未入見以前今附蘇轍再論蘭州後臣伏見元豐中出兵西界增創城壘議者講求利害久矣臣亦嘗具三策三策未見上于朝今夏人汎遣使者已到邸累日其勢必有邀請雖廟議黙定而區區不能自已謹復條其一二補前奏之未備以待採擇議者之論臣嘗詢訪本末備得其説為棄地之議者曰往年興師本以弔民伐罪既取地自利其勢必争傷財害民以争非其地其勢不得不棄困而後棄不如一捐空城予之以示惠此言是也然難者謂予地所以息争若虎狼亡厭争求不已得地據險益擾近郡其能保不為患乎為守地之議者曰頓儲設阻增募土兵逺斥近援何地不守且先皇帝之所得而以予人非是此言亦是也然難者謂彼不得地兵難不解日引月長邊釁益大其能保終守此地乎故議者之論非不曲盡事理至于弭未然之患如難者所憂則雖好謀之人莫敢任責竊料朝廷深計逺慮未欲遽决亦必以此臣愚不佞獨謂用兵以終守其地誠難保也棄地而使不為患臣雖老矣願保沒齒不見邊境之憂惟陛下赦其愚使畢其說臣聞向所得地在熙河為蘭州在鄜延為五寨蘭州本西蕃故地而五寨本夏戎所有也其地道里迂直産利厚薄所須守兵多寡轉餉勞逸皆朝廷所熟究臣不復道而自夏人視之為必争之地彼將以誓約為請固執不與彼將獸困而鬬借兵契丹以逞其忿朝廷且有西顧之憂使我師每戰每勝臣猶以為非國之利又况殺傷相當成敗未可知皇帝陛下諒陰之際太皇太后垂簾稱制正思與民休息而顧欲戮力血戰以争尺寸無用之地所謂以隨侯之珠彈千仞之雀由此言之終守其地是臣之所不敢保也國朝自祖宗以來歲捐金帛數十萬遣使修約而夏戎稽首順命者數十百年矣外國好争亡厭固天性也然且如此則恩深利厚足以覊縻其心故也今乘先帝討擊之威因其屈服之勢曠然推惠歸侵地復歲賜丁寧戒敕悉棄前患復謹舊約彼雖有桀黠睚眦之意既已杜塞其欲使無所發則亦將感激退聽復如前日何苦必欲動衆犯順以自魚肉其民雖彼之國寧獨利乎古之養虎者時其飢飽適其怒心虎或可養而况人乎由此言之弭患息争非獨臣以死保之自祖宗以來御夏戎者用此道也臣願采議者之論觀異日之勢而斷以此意大計既決其餘措置纎悉施行次第在朝廷裁之而已雖然臣猶有拳拳之愚不敢不盡今夫請地在彼予地在我是以主制客以逸待勞之勢也為彼計則不得不急為我計正宜從容閑暇鎮以無事臣竊怪近日議者皇皇汲汲視此地如金城湯池惟恐不守不然如附贅垂疣惟速去之為快異議紛起先自惑亂又何其迫遽無大體也今使者雖在邸臣願且毋遽許以地而厚禮答之善詞遣之或先復歲賜而微示以不愛地之意度其効順堅决至于再至于三然後以歲月予之所謂許之者不一而足夫豈晩乎臣愚不知大計惟陛下財幸光州團練使髙公繪為秀州防禦使寧州團練使髙公紀為永州防禦使詔以公繪公紀父士林雖經英宗登位太皇太后當日立為皇太后士林都未及朝廷真封遽爾傾逝良可追悼故今日移恩及二子也淮南轉運副使趙偁請復以宿州靈壁縣為鎮從之癸亥夏國以疆事遣使春約勒阿拉雅賽副使吕則依田快庸見于延和殿輒妄奏曰神宗自知錯上起立變色怒久之内侍張茂則云與押伴理㑹移時方退此據舊録舊録又云先朝興師問罪經略邊圉羌人畏威至是姦臣納侮一切姑息敢悖慢如此新録以為此語不足録自輒妄奏至於此六十二字並刪去按夏人若果有此語録之何傷恐不須削去也同知樞宻院范純仁言臣竊見前日簾前文彦博等與執政論疆界事宜其時以諸臣奏對已多臣雖有管見不敢久煩聖聽欲於別日奏陳而臣今病假在家未能忘竊慮夏人在庭議論日逼謹先具條列聞奏若以所得夏國地土換易陷蕃人口如此則便可罷兵息民陛下仁惠之化得以久行堯舜之治可以速成此上策也又蘭州定西城聞元是西蕃境土後來方屬夏國已有景徳中誓表更不擄掠西蕃彼雖堅意欲之我亦留之有名徐委邊帥婉順商量雖便未可罷兵彼應難便猖獗此中策也又若留塞門吳堡義合而止棄逺處難守二三城寨則朝廷與之不足以示大恩彼雖得之不足以副其欲如此則兵必不解夷夏難安陛下仁惠之政何由復施勝負安危之機邈未可料所得之地不及秦漢萬分之一乃妨陛下堯舜之政而且有後憂此下策也伏望陛下深賜採擇以為天下國家無疆之福臣稍可勉强更當面具奏陳臣未曾見夏人表章如其過有邀求則雖與地不能息兵非臣今來所料俟臣別具陳奏乞且嚴戒邊臣過作守備凡有所闕盡令陳請朝廷當一一應副庶令責有所歸不至誤事惟中策安燾頗與臣合近曾將擬下詔意示臣内有不與中國舊寨一節臣曾簽貼欲其除去然安燾未曾修改應待聖意裁度又言臣前曾建議以所得夏國地土換易陷蕃人口猶慮狡黠之情量遣三五十人應命以受朝廷賜地臣欲乞別許夏國每還到漢人一名賜地之外更特支絹十疋則夏人貪利必肯盡數交換不過捐中國縑帛數萬可以換易人口數千則陛下好生之徳超絶古今足以感動華夷永為萬世之法如臣言可采即乞夏人歸時便可内降指揮令押伴宣達此意若允臣所奏伏乞陛下以地并絹換易人口之意降詔告諭邊人使存歿銜恩淪于骨髓亦令邊人感化自然賔服伏望聖慈留神采納元豐末夏人欵塞乞還侵疆同知樞宻院安燾白神宗以為鄉所得地有非要害處固宜予以示恩然羌情無厭當使知吾宥過而罷兵不應示吾厭兵之意及是二府㑹議燾曰頃在先朝蓋嘗議之第未欲遽許今陛下新涖政推恩天下因有以副其心可也或欲舉熙河一路棄之燾執不可主議者至謂今如竊人之財既為所執猶不與之可乎燾怫然曰自靈武以東皆中國故地先帝興問罪之師而復之何乃借諭如是其後定議但許歸其四寨云此據安燾行状刪附今燾傳亦純用行状不知首議棄熙河者為何人據紹聖四年二月二十九日文彦博落使相降太子少保詞並閏月二十七日葉濤繳奏安燾降資政詞頭則議棄熙河者實文彦博也彦博奏議已附六月末當考張舜民誌穆衍墓云元祐元年與孫路同往熙河相度措置邉防財用時大臣有欲棄熙河者留議未决公同事已信其説謂公曰此行有可以自致不然反為累也公徐對曰顧利害何如耳王事靡盬遑為身謀還朝請以經制事還漕司條罷兵為公私害者二十七事歲减經費一百九十餘萬緡因與路更論疆界事略以謂蘭州棄則熙州危熙則河棄則關中揺動唐自失河湟吐蕃輝和爾一有不順警及國門逮今二百餘年非先帝英武其孰能克復今一旦委之無厭之欲恐不足以止冦徒滋後患爾熙蘭卒不棄繄公力也實録穆衍舊傳云元祐初與孫路同措置熙河邊防財用時大臣有欲棄熙河者留議未决冀衍同已以信其說新録辨曰此皆詆誣不根之言合刪二十一字穆衍事已附正月十二日新録有未詳處已具注在彼蓋舊録全用張舜民所作衍墓誌今當與舜民辨乃可右僕射吕公著亦以為先朝所取皆中國舊境而蘭州乃西蕃地非先屬夏人今天子嗣守先帝境土豈宜輕以予人况夏戎無厭與之適足以啓其侵侮之心且中國嚴守備以待之彼亦安能遽為吾患此據吕公著家傳於二年八月二十九日百官賀禽果莊乃載此今移附范純仁議下二府既定議許歸夏人侵地乃降詔答之大略言前後用兵以來其因而所得城寨彼此各不曾交還今來所請不惟前例甚明理難頓改兼訪在朝之論皆謂義不可從然朕獨以永樂之師陷沒者衆每一念此常用惻然汝儻能盡以見存漢人送歸中國復修貢職事上益恭仍戢邊酋無犯疆塞則朕必釋然於尺寸之地復何顧惜當議特降指揮據用兵以來所得地土除元係中國舊寨及順漢西蕃境土外餘委邊臣商量隨宜分畫給賜又詔夏人以永樂城將吏兵夫等昨因盡忠固守力屈就擒衆多生齒淪于異境念其流落每用惻然雖已詔汝發遣當給賜可還之地然念城初失守衆即散亡或為部落所匿藏或為主者所轉鬻非設購募恐有所遺汝可深體朕意子細訪求發遣當據送到者每人別賜絹十疋命官已上加優賜以給所得之家二詔並據吕公著家傳附見不得其月日實録並無之家傳云賜乾順詔則恐誤按蘇轍十九日言聞朝廷已降許詔即此是也秉常以是月十日卒朝廷何緣遽知之雖知之亦必不遽以詔賜乾順今削去乾順名亦不稱秉常以示疑楊氏編年云詔以浮圖安疆葭蘆定逺四寨歸夏人初門侍韓維奏先帝討夏國以問罪而收其地致夏人有辭其國力漸復必來攻取今梁氏死秉常復位及此時歸其地則神宗問罪之名不為虚語嗣皇賜地之意實成先志故有是舉編年繫此事於元祐元年末然實録不書編年誤也蓋元年因二府定議初許以可還之地固不曾指名何等地及四年六月九日乃舉所還四寨為葭蘆米脂浮圖安疆也編年因詔許遂終言其事矣紹聖二年八月七日罷分畫詔舊録云元祐二年春降詔給賜夏國四寨誤也紹聖二年十月二十三日孫路亦言安疆寨係元祐四年給賜要當以元祐四年六月九日降詔為給賜之始又張舜民誌游師雄墓云元祐元年改宣徳郎除宗正寺主簿朝廷以夏人久為邉患思以安將來欲以四寨歸之未決執政以公習知西邉事召問公曰四寨先帝所克所以形勢制夏人者也朝廷當守而勿失奈何輕以畀人且割地以紓邊患不惟示中國之弱將起邉人無厭之求四寨既予如瀘南荆粤有請者亦將與之乎非特此也燕人遣一介之使奉咫尺之書求闗南十縣之地者又將與之乎六諸侯割地以予秦時猶以為恥安有以天下之強盛而棄地以悅外國者哉因進分疆語録二巻而主議大臣不聽卒棄四寨夏人得其地而不有侮慢如前據此則棄四寨當在元祐元年然考按俱不合又吕公著家傳於二年八月書果荘被擒夏人自鎮戎遁去乃云其後乾順遂入貢及稍還永樂所陷漢人朝廷方以四寨還之與舜民所作師雄墓誌及編年不同編年大率因舜民墓誌不足憑也四年六月九日十月二十三日可考元年十月末政目云云可考甲子右司諫蘇轍言臣竊見仁宗朝河北河東初置義勇至英宗朝推行其法漸及陜西皆以地接邊外有守禦之備每歲冬教一月雖以為勞而邊防之計有不得已及熙寧中更置保甲使京畿三路之民日夜教習二聖臨御知其不便率皆罷去民得秉耒耜盗賊因此衰息歌舞聖徳無有窮已惟有冬教一月之法三路以被邊之故民習為常不敢辭愬至於京畿諸縣累聖以來為輦轂所在素加優厚今乃與三路邊郡為比一例冬教情所未安伏乞聖慈深念根本之地所宜寛卹特與蠲免兼訪聞京畿三路見今皆修蓋冬教場屋宇州縣頗以為勞臣昔守官河北竊見義勇冬教並不曾置教場屋宇每遇教日皆權於係官屋宇及寺院等處安泊別無闕事朝廷若允臣所奏免畿内冬教則其教場屋宇已自不修如三路冬教乞下逐路監司相度只如日前於係官屋宇及寺院等處安泊有無不便如別無不便亦乞罷修以寛民力御史上官均言均言據均奏議不得其月日附蘇轍言冬教屋宇後臣聞天下之事小大覈實則為而有成作而有功無勞民費財之害臣竊見福建路往年因廖恩為冦逐處召募義勇有武技者使之追捕彼皆鄉閭無頼之民素無約束所至村落往往恃衆攘奪彊買未經鬬敵已有騷擾之病其後逐縣籍向來召募之人號為槍仗手多至數百人少不下一二百人每歲監司親至按試支散錢米及銀碟之類臣元豐元年嘗知邵武軍光澤縣因監司按試召集槍仗手比至閲視其老弱不嫻武技者十之七八訪聞得皆出於當時保正及同類任情糾舉實非素習趫勇之民詢之他邑亦多此類其槍仗手所居距縣逺處或一二百里監司所至多先期呼集既至往往代名充數冒受支賞徒有呼集之勞而無校試之實朝廷比來頗知擾民之害只令逐縣知縣令每年就近集試然呼集之勞費財妨業之弊猶如前日臣竊計福建一路槍仗手不減數千人率多無頼之民教習無素一旦有警敺之捕盗往往潰散挫弱軍氣無事之際呼集教試在上有費財之患在下有妨業之弊其實無補不若罷集俾閭井之民安居樂業公私兩便如朝廷未欲悉行罷去亦乞下本路令逐縣重行考覈不必充滿舊數庶幾得實免致虛有勞費吏部言故朝散郎致仕李肖男進士孟回狀言父肖致仕敕牒附遞留滯致礙奏薦詔李肖特與致仕恩澤新本削去詔河東路經略司體量本路將副任與不任守戍具實以聞新本削去乙丑夏國主秉常卒此據舊録秉常傳其卒乃七月十日也政目十月十六日故夏國主秉常嗣子乾順奏父於七月十日薨新録因春約勒阿拉雅賽入見遂繫之八日誤矣今不取入丙寅遼國遣使保安軍節度耶律純嘏副使太中大夫守崇禄卿充乾文閣待制呂嗣立來賀坤成節是日七月十一始頒甲寅詔書去言者勿復彈劾六字臺諫累有論列故也六月二十八日胡宗愈云云可考丁卯中大夫直龍圖閣李之純為户部侍郎尋改集賢殿修撰河北路都轉運使二十八日癸未改集撰都漕必有縁由當考本傳亦不載先除户侍提㸃河北路刑獄唐義問為本路轉運副使朝奉大夫穆衍為金部員外郎正月十二日衍措置熙河財利朝請大夫孫路為陜西轉運判官正月十二日同穆衍措置財用李公裕誌路墓云夏人冦鎮戎之境屠掠稍衆而諸寨避譴不以實聞朝廷疑之以委路路徙諸寨官躬自訪問得所匿二千人乞優賜厚貸撫恤其家使知朝廷之恩邊人大悅户部言臣僚論李琮於江南兩浙淮南輙增常賦按琮既降黜而均認税數已行改正其元根究稅官議難推賞已賞者令吏部追奪從之十月二十八日王覿奏戊辰吏部侍郎陸佃為禮部侍郎給事中孫覺為吏部侍郎詔免河中府河西縣人户鹽錢折納斛斗前此本縣有官中食鹽四千餘斤令人户均請納見錢已而又令折納斛斗至是因民庶上言罷之詔故相富弼令配饗神宗廟廷其子紹庭特差河南府通判仍與子孫一名恩澤以太師文彦博同知樞宻院范純仁言弼之子孫乞優加録用故有是命又詔以衢州龍游縣令王棐為春秋博士從國子祭酒鄭穆司業黄隠薦也朝奉大夫張璹為京東路轉運判官五月十二日令中書籍記者月末上官均云云八月二日蘇轍云云正議大夫致仕韓璹卒庚午夏國遣使賀坤成節辛未坤成節羣臣及遼使拜表稱賀于内東門癸酉定國軍留後仲曄卒贈保寧軍節度使追封東陽郡王諡榮順甲戌右司諌蘇轍言臣近奏乞因夏國遣使入貢歸其侵地竊聞朝廷已降詔開許伏惟包荒之徳與天地同量使西邊之人自此得免餽餉之勞脱戰鬬之禍天下不勝幸甚然臣聞兵法受降如受敵邊人見利忘義雖以恩信深加結納而備豫不虞不可暫弛况朝廷數年以來舉兵攻討深入其地奪其疆土今雖接以恩禮其怨毒之意未必遽忘若因給賜城寨定立界至之際乘我無備輒肆猖狂則取笑四夷悔不可及謂宜明加約束所賜城寨須候逐路帥臣處置般運器甲抽那兵馬凡百了當立定日期然後得令人交割若未了之間不得令一人一騎先期窺覘仍指揮沿邊將吏常加嚴備因夏國新復侵地謹守誓約之際招填士馬充實倉廩綏懷熟户常若冦至不得為其通和稍有弛廢如此數年朝廷常務懷柔以革其欲報之心邊臣常作隄防以折其内侮之志臣謂數年之外必無後患縱使背約而邊計已備士氣已復度其事勢亦不足深憂况背恩犯順彼曲我直雖復羌人亦當知非足使吾民坐而賈勇制勝之道始自今日惟願陛下深詔大臣安不忘危常以戒敕邊民為心則社稷之福也朝廷降詔許歸夏人侵地此大事也而舊録新録都不略見亦太疎矣按蘇轍十九日奏則降詔當在十九日以前初八日范純仁建議後吕公著家傳所記二詔即是許還侵地詔也但家傳不載月日耳已附初八日殿中侍御史林旦言臣比貢狂瞽之言妄論西陲疆場事以謂棄地有十不可不識廟堂之論果少採擇臣言否臣聞熙寧中种諤克綏徳城議者以為不可守舉朝上下皆欲棄之獨韓琦在陜西堅持不可棄之説先帝遣近侍計㑹邊臣以棄之琦猶以軍法申飭邊臣必須待報於是先帝從琦之言而城卒不棄至今士論嘉琦之有守而服先帝之善斷西戎貪黠徼倖干請要須以義折之使語塞心沮然後有畏懾不敢肆其狂慢豈宜先自示弱而茍欲厭其心乎夫以天下之富而惴惴恐二三城寨之不給臣竊謂議者之私憂過計也古者敵國爭尺寸之地至竭帑鏖戰而不悔此等事故不足以為法然以古校今理亦可見且以積年經營之功因其一請而與之似亦太率易也今世俗之論往往以賈捐之棄朱崖事為口實夫朱崖隔絶大海屢煩逺擊已臣而復叛又方為蠻夷所據勞弊中國故捐之以不擊為便今西人所謂乃在吾地非絶大海也非勞攻取也而謬以朱崖為比不亦異乎第恐邊臣姑息茍安趣了目前之患幸無近憂不卹後患又疎逺之人妄意朝廷都弛邊備遂以必棄為說此言先入上誤聖聽反使西戎得計邊民失所可不慮耶况守之以困敵與之以資敵一損一益利害明甚此誠不可以不察也今西使既還許地與否臣固亡縁與知但既蒙朝廷過聽使待罪言路事無大小皆得論列今事關國體茍有所見安敢隠黙伏望聖慈處決之際更賜審察但遴柬邊帥精擇監司罷不急之官省無益之費選將練兵平價儲粟安輯熟户墾闢田野嚴生事之戒澄幸功之賞何患二三城寨不能贍給僥倖之請正當理折庶幾觀望咸絶覬覦林旦䟽附蘇轍後旦稱西使已還不知許地與否而轍謂已降詔許歸侵地或旦疏在十九日前朝廷未降詔也不然諌官已知而御史獨不知可乎當考
