body:
  text: 續資治通鑑長編卷三百十八宋李燾撰神宗元豐四年冬十月丙寅鄜延路轉運使李稷乞支錦袍銀帶詔三司給錦袍二千領見管銀帶盡數給之三司仍廣計置常令有備种諤言捕獲西界偽樞密院都案官瑪尼策多克熟知興靈等州道路糧窖處所及十二監軍司所管兵數已補借職軍前驅使是日王中正領兵渡無定河循水而行地多濕沙人畜往往陷不得出暮至橫山下神堆驛而种諤亦領兵至兩營相距才數里初諤奏乞不受中正節度會諤有米脂之功上許之翼日詔書至翼日丁卯十四日也諤不復見中正引兵先趨夏州時河東夫聞鄜延夫言此去綏德城甚近兩日中亡歸者二千餘人轉運判官莊公嶽趙咸等斬之不能禁御集十月二十一日云據王中正奏一行大軍于十月十三日午時已與鄜延軍馬至德靖鎮七里平會合訖一行人馬糧食並足前去夏州止四十里見議進程事記聞稱神堆驛御集稱德靖鎮恐係一地兩名當考證歸一記聞稱人夫逃亡者二千餘御集十一月一日稱約二萬蓋御集指其入塞時數也髙遵裕初領兵出界由環州洪德寨白馬川路進討此據張舜民南遷録乃十月十三日丙寅也丁卯上批河東路以轉運司措置乖方百姓方有倒垂之急趙卨差敕可速發遣先是梓州路轉運司言凖朝旨相度知資州王公儀奏移鈐轄司於本州乞升軍額置通判又增公使錢如遂州為便從之於是林廣言梓夔路鈐轄司欲乞依舊止于遂州安置戎瀘州遇有諜報夷事入急遞飛申轉運鈐轄司同議處置賊勢稍大即鈐轄領兵往赴就近照應又從之轉運司乞如王公儀奏乃九月十八日今并書於此詳定禮文所言謹按荀子禮論曰饗尚元尊而用醴酒齊大羮而飽庶羞貴本而親用也貴本之謂文親用之謂理故古者祭祀併薦上古中古及當世之食所以貴本而親用禮運曰元酒以祭薦其血毛腥其俎熟其殽鄭氏謂此薦上古中古之食也又曰然後退而合享體其犬豕牛羊實其簠簋俎豆鉶羮鄭氏謂此薦今世之食也自西漢以來園寢上食而唐天寶五年始詔享太廟每室更加常食一牙盤因與三代籩豆簠簋並薦雖亦貴本親用之意然而韋彤裴堪等議以為宴私之饌可薦寢宫而不可瀆於太廟臣等考之享太廟宜自用古制其牙盤上食請罷從之四年十月十四日又言季春吉已饗先蠶氏李林甫注月令以先蠶為天駟謹按先蠶之義與先農先牧先炊一也當是始蠶之人故開元禮饗為瘞坎於壇之壬地禮義羅曰今禮饗先蠶無燔柴之儀明不祀天駟星也今饗先蠶其壇在東郊熙寧祀儀又有燎壇則是沿襲唐月令以先蠶為天駟誤也周禮后蠶於北郊以純隂為尊伏請就北郊為壇以饗始蠶之人仍依開元禮不設燎壇但瘞埋以祭其餘自如故事從之四年十月十四日又言古者冕辨則用紘冠則用纓今衣服令乘輿服大裘冕以組為纓色如其綬衮冕朱絲組帶為纓冕而用纓不與禮合請改用朱組紘仍改平冕為元冕用繒色赤而微黑者為之又别圖上􅀈制從之改纓為紘四年十月十四日依奏􅀈制無月日今附見戊辰知夏州索九思遁去种諤入夏州二十六日己卯奏到舊紀於己巳日書入銀州新紀戊辰入夏州己巳入銀州當考入銀州實日又十二月戊午詔沈括勿守銀州當并考舊紀及新紀並於戊寅再書种諤入夏州戊寅二十五日夏或作貢蓋字誤爾朝廷既不用林廣所奏促廣進軍廣發瀘州越四日抵江安以所招降夷人渠帥及其質子皆隨軍復令其次諸酋各占所居地防援餉道故入生界免冦抄之患戊辰十五日次江安此據平蠻録太中大夫集賢殿修撰知兗州張景憲卒己巳詔措置麟州路軍馬鄜延環慶路行營經略司熙河路都大經略司涇原路行營總管候官軍撫定河南地其舊屬漢郡如城壘粗完地居形勢速以聞當命官置守是日己巳十六日种諤入銀州此據本紀增入新紀並同庚午髙遵裕言環中河水鹹苦大軍至州鹹水驟變味甘蓋應時助順有非人力所致者應時以下據河渠志增入手詔近詔河東陜西諸路轉運司應副軍興事件並仰聚議或公牒會定允當方得施行即不得獨用已見逐急行下如委是事干機速移文計議不及即一面施行仍須互相關報照會不得致有抵牾重復漏落是日王中正至夏州時夏州已降种諤諤尋引去據十一月五日丁亥奏中正軍於城東城中居民數十家先是朝旨禁入賊境抄掠賊亦棄城邑皆走河北士卒無所得皆憤色思戰諸將謂中正曰鄜延軍先我獲功甚多我軍出界近二旬所獲才三十餘級何以復命且食盡矣請襲取宥州聊以藉口中正從之此據記聞髙遵裕過橫山之蒙精次故清逺軍此據二十六日戊寅奏張舜民南遷録云十九日壬申次故清逺軍與實録差兩日今從實録鄜延鈐轄張守約白遵裕曰此去靈州無三百里請以前軍先出直搗靈州今夏人以一方之力應接五路之師猶以一支抗全體難保無誤又探知我師將合涇原兵出胡盧河川河南部落悉往枝梧橫山無人靈州城中惟僧道數百人若褁十日糧疾馳不三四日可至城下大軍無事矣或以萬八千人為不多去則可憂然大軍在後彼不測其厚薄淺深真所謂附虎而行莫敢鄉邇也兵貴神速祗此是矣遵裕不能用此據張守約墓銘亦張舜民所為也新紀於庚午日書環慶行營經略司髙遵裕復清逺軍入環州舊紀繫遵裕入清逺軍于戊寅日辛未詳定禮文所言古者宗廟有時享月祭而無月半祭月半有祭者非古禮也記曰春祀夏禴秋嘗冬蒸又曰逺廟為祧享嘗乃止此所謂時享也又曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之又曰諸侯皮辨聼朔於太廟而左傳亦曰閏月不告朔猶朝于廟此所謂月祭也至於儀禮月半奠大夫以上則有之此所謂非古禮也然而五廟皆月祭而二祧止享嘗者何也曰仁之行有親疏禮之施有隆殺其義然也其止享而不與乎蒸則又加殺矣自秦漢以來始建陵寢而朔望上食已非古禮唐天寶末因而舉行於太廟非禮甚矣本朝緣唐故未暇釐正伏請翼祖宣祖時享止於秋嘗僖祖太祖太宗真宗仁宗英宗時享外仍行朔祭廟各一獻牲用特牛若不親祠則以太常卿攝事牲用羊禮記正義曰按羊人云釁積共其羊牲熊氏云謂祭日月以下小司徒云凡小祭祀奉牛牲然則王者之祭無不用牛蓋日月以下常祀則用羊王親祭則用牛又其月半上食及宗正丞行事伏請罷之詔祧祭候廟制成日取旨八廟並月祭用牲餘依奏又言謹按禮記祭法曰王自為立七祀曰司命曰中霤曰國門曰國行曰泰厲曰户曰竈孟春其祀户祭先脾孟夏其祀竈祭先肺中央土其祀中霤祭先心孟秋其祀門祭先肝孟冬其祀行祭先腎又傳曰春祠司命秋祠厲此所祀之位所祀之時所用之俎也又周禮司服掌王之吉服祭羣小祀則服元冕注所謂羣小祀宫中七祀之屬又禮記曰一獻熟注謂若宫中羣小神七祀之等又周禮大宗伯若王不與祭祀則攝位此所祀之服所獻之禮所攝之官也自周禮廢漢興始祭族人炊於宫中而謂之竈又南山巫祀南山秦中而謂之厲而唐祭七祀於太廟廟令布席于庭西門之內以至近世禘祫而遍祭之其四時分祭又隨時享以廟卿行禮而服七旒冕分太廟牲以為俎一獻而不薦熟皆非禮制臣等量今之宜參用古義伏請立春祭户於廟室户外之西祭司命於廟門之西制脾於俎立夏祭竈於廟門之東制肺於俎季夏土王日祭中霤于廟庭之中制心於俎立秋祭門及厲於廟門外之西制肝於俎立冬祭行於廟門外之西制腎於俎皆用特牲更不隨時享分祭有司攝事以太廟令攝禮官服必元冕獻必薦熟其親祠及臘享即依舊禮遍祭從之十月十八日依奏癸酉王中正至宥州城中居民五百餘家遂屠之斬首百餘級降者十數人獲馬牛百六十羊千九百軍于城東二日殺所得馬牛羊以充食此據記聞舊紀及新紀載王中正入宥州並在辛巳日髙遵裕至韋州及監軍司令將士勿毁官寺民居以示招懷十一月一日奏到新紀亦於癸酉書入韋州舊紀繫之壬午今不取甲戌王中正遣開封府界將官張真知齊州折克行分兵二千餘人發密庫木遇虜騎千餘與戰破之斬首九百餘級此據記聞二十八日辛巳中正奏甲戌次宥州西北左村澤與賊戰當即是此戰也詳定禮文所言臣等謹按記曰禮不王不禘王者禘其祖之所自出以其祖配之又曰有虞氏禘黃帝而郊嚳祖髙陽而宗堯夏后氏亦禘黃帝而郊鯀祖髙陽而宗禹商人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王儀禮曰都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其太祖天子及其始祖之所自出周禮有追享朝享説者以為禘祫也禘及祖之所自出故謂之追享祫者自即位朝廟始故謂之朝享詩周頌雍禘太祖也商頌長發大禘也周無四時之禘則雍序以為禘太祖商有四時之禘則長發序以為大禘四時之禘為小則禘其祖之所自出為大矣由是而言禘者宗廟追崇逺祖之祭惟王者得行之王者至尊享及七世推親以及祖推祖以及始祖四時各於其廟而祭之於是有祠礿嘗蒸焉既有祠礿嘗蒸矣而毁廟之主不及猶以為未也緣生有合族綴食之恩乃於始祖之廟合毁廟親廟之主而祭之於是有祫焉既祫矣而逺祖不及猶以為未也又推而上審諦其祖之所自出而祭之於是有禘焉至此而仁之至義之盡也然而積德有薄厚流澤有廣狹以其大夫學士知尊祖故為時祭而不為祫諸侯及其太祖故為祫而不為禘天子及其始祖之所自出故禘其祖之所自出以其祖配之若舜禹祖髙陽髙陽世系出自黃帝則虞夏禘黃帝以髙陽氏配商祖契出自帝嚳則商人禘嚳以契配周祖文王亦出自嚳故周人禘嚳以文王配虞夏商周四代所禘皆以帝有天下其世系所自出者明故追祭所及者逺也自漢魏以來世系不明傳襲莫紀加以劉石亂晉南北幅裂百宗蕩析士去墳墓降及隋唐譜録都廢言李悉出隴西言劉悉出彭城姓氏所起謾無足考則後世禘祖之所自出有不得而行焉漢自太上皇以前無聞故髙帝而上惟見太上皇一世而已魏自處士君而上亦無聞故明帝太和中止事髙祖之父處士以下五世而已晉自征西將軍而上系序不著故武帝事三昭三穆六世而已然劉氏出於劉纍而漢不禘堯曹氏出於陸終之子曰安是為曹姓而魏不禘漢相國曹參司馬氏出于程伯休父而晉不禘司馬卭宋出于楚元王交齊出于漢相國蕭何陳出于漢太邱長陳實隋出于漢太尉楊震皆不禘以為祖之所自出者良以譜諜不明故也唐之黎幹言禘非祭天作十詰十難以明之且曰虞夏商周以前禘祖之所自出其義昭然自漢魏晉以還千餘嵗其禮遂闕恭惟藝祖受命初有天下踵漢唐故事祭四時廟惟僖祖而上所自出者譜失其傳有司因仍舊説三年一祫五年一禘禘與祫皆合羣廟之主綴食於始祖雖禘祫之名不同而禮實無異其為訛舛莫甚焉臣等輒推本先王立禘之意以為國家世系所傳與虞夏商周不同既求其祖之所自出而不得則禘禮謂當闕之必也推見祖系所出乃可以行惟聖神裁擇從之據郊祀禮文元豐四年十月二十一日乙亥依奏實録乃不載此今具載之又言王者舉事必告天地祖宗示不敢專若受命然此禮之有告也然而禮不虛動必有誠意氣臭以歆神明此告之有牲幣也故曾子問曰凡告必用牲幣無親告祝告之别後世親告之禮不行故學者因有親告用牲史告用幣之文又曰吉告用牲凶則用幣皆非經禮之制後魏孝文延興二年詔曰夫神聰明正直饗德與信何必在牲遂令非天地宗廟社稷之祀皆無用牲羣祀悉用酒脯始於此也蓋禮經脯醢皆不獨薦儀奠脯醢言不食糧也大夫聘禮以脯醢位卑而禮薄也冠鄉飲酒鄉射燕祭用脯醢皆兼牲俎也禮無告用脯醢之文誠以禮微不足以歆神故也伏請應緣親祠告天地宗廟社稷並依令用牲從之四年十月二十一日又言特牲饋食禮祝筵几於室中東面少牢饋食禮司宫筵于奧主人户內西面釋者曰古之為室户不當中而近東則西南隅最為深隱故祭祀及尊者常處焉爾雅云西南隅謂之奧西北隅謂之屋漏是以宗廟祭初隂厭於室之西南隅祭末陽厭於室之西北隅公羊説藏主石始復在西壁取西方長老之處蓋神位之所在也大夫士但饋熟於室故堂上無朝事之位若天子諸侯朝事延尸於户西南面布主席東面至薦熟乃更延主于室之奧則古者室中神位在奧堂上神位在户外之西故宗廟之祭君卷冕立于室之阼祼鬯與讀祝薦熟皆立于户內西面開元禮開寶通禮及朝饗太廟儀注諸室神坐皆設於户內南向皇帝奉祀則户外北向而拜今雖設皇帝版位于阼而室中神位不在奧有違古義伏請布陳神坐于室之奧東面當行事時皇帝立于户內西向即拜於户內有司攝事晨祼饋食亦立于户內西向更不出户而拜其堂上薦腥則設神坐于扆前南向古者大祫當朝事時自户而堂太祖南向昭西面穆東面主客在右若時祭則尸席于户西南面布主席東面尸神象也今既無尸堂上不可虛南向位伏乞設神坐于扆前南向皇帝位于中堂北向有司攝事同此詔送禮院候廟制成日取旨四年十一月二十一日又言謹按周禮守祧掌守先王先公之廟祧𨽻僕掌五寢之掃除皆所以典司宗祏嚴奉神靈漢晉以來廟有令丞即亦其比也隋唐又置宫闈令並用宦者以出納后主乃周禮守祧奄八人之比自唐開元中廢局令以太常少卿一員知太廟事良以太常職奉宗廟故也近世太廟職務既歸宗正每遇親祠及有司攝事别差官攝知廟卿殊無義理又宫闈令職掌宫內門閣之禁及出納后主今或行朔望祠事及薦新物滋為非禮臣等欲乞依唐初之制置太廟局令以宗正寺丞充其宫闈令仍不與祀事黃貼子稱今置太廟令可專行薦新之禮至親祠及禘祫常祀及七祀功臣之禮知廟少卿更不差攝從之四年十月二十一日中書劄子奉聖旨依奏又言謹按國語曰古者使先聖之後之有光烈而能知山川之號髙祖之主宗廟之事昭穆之世禮節之宜威儀之則忠信之質禋潔之服而肅恭明神者以為之祝竊詳太祝之官近世名存而實廢凡任子皆授此職至于臨祭祠一切以不間儀則之人假攝為之郊廟親祠則使內臣以玉幣置於篚皇帝飲福受胙酢酒持俎舊用太祝者今皆代以內臣但取其詳熟而已是於名又有所不存焉伏請建置祝官必擇才實如國語觀射父之言增其爵秩用漢故事使典領祀事庶不失禮意從之又言謹按禮記曰凡宗廟之祭犬曰羮獻鮮魚曰脡祭又周禮大司冦大祭祀奉犬牲大司馬大祭祀羞牲魚蓋天子之祭備其百官而四海之內各以其職來祭而天之所生地之所長四海九州之美味莫不咸在官備則物備物備則誠備誠備則福備此先王事神之方也本朝親祠太廟三牲之外薦猶未備不足以稱孝思無窮之意伏請設刑部尚書一員以奉犬牲兵部尚書一員以奉魚仍分腥熟之薦從之元豐四年十月二十一日中書劄子奉聖旨依奏又言親祠儀注皇帝至罍洗侍中跪取匜沃水又侍中跪奉盤承水皇帝搢圭盥手門下侍郎跪取巾於篚以進按周禮小臣上士四人大祭祀沃王盥御僕下士十有二人大祭祀相盥而登鄭氏注云相盥謂奉盤授巾也今侍中門下侍郎皆執政官使之沃盥相盥皆非是伏請親祠以御藥院內臣一員沃盥一員授巾從之禮文元豐四年十月二十一日依奏今附本月日乙亥詳定禮文所言冬祀昊天與黑帝請皆服大裘被以衮其餘非冬祀昊天及夏至祭地則皆服衮從之其詳具郊廟奉祀禮文今止存其要是日李憲至吹鄂特山破賊裕勒藏頴沁薩勒來降此據十一月五日丁亥經制司奏略出其詳仍具本日丙子种諤言蕃官三班差使瑪克密鄂特桑等十月丙寅于西界德靖鎮七里平山上得西人榖窖大小百餘所約八萬石撥與轉運司及河東轉運司丙寅十月十三日也按王中正以不得鄜延糧故軍潰恐种諤未必肯輟榖豫之當考詔涇原路兵戰勝瑪伊克隘並與特支錢遣使撫問劉昌祚姚麟及將官等捷書始聞也种諤以得石州奏癸亥日當考上批鄜延路行營經略司軍馬已降宣不𨽻麟府路措置軍馬司節制今兩路兵相去不逺令王中正种諤如行營相近即應緣進討事和同商量擇利而往是日王中正至牛心亭食盡丁丑至鼐旺井遇鄜延路掌機宜景思誼得其糧遂引兵趣保安軍順寧寨詔涇原盧秉諸道之師元議同驅並進至興靈會合今不惟前後已愆元約又環慶之軍逾期兩旬尚未出界本路之軍雖已啓行盤桓並塞尚未深入獨鄜延麟府之兵進程已逺如此前却勢力不齊濟辦大事實為可憂卿可速具令詔指揮移劉昌祚等勿為逗留自取悔咎又詔秉聞西賊見於淺水嘯聚與本路靜邊隆德甚近必以昨九月入塞得利又欲豕突為冦卿冝密檄劉昌祚詳覘其事收聚老小牛羊入保城寨量遣兵將伏險邀擊是日鄜延路鈐轄曲珍破賊于蒲桃山十一月初三日李稷奏今略見于此其詳具彼髙遵裕次旱海此據張舜民南遷録先是李察請以驢代夫運糧驢塞路饋不繼師病之此據髙遵裕新舊傳戊寅詔涇原路行營總管司瑪伊克隘勝捷已三日尚未前進隨軍糧草有限令劉昌祚等速進兵深入攻討興靈又詔環慶路行營經略司出界未及百里便欲於清逺軍留連兵馬為茍止之計乃正犯畫一約束令髙遵裕速部分諸將進兵與諸路會合攻討興靈新舊紀並於戊寅書种諤入夏州今不取已具注十五日戊辰是日林廣軍次土城山與韓存寶舊營相峙存寶自夷牢口入界五十七日凡七徙營乃至此遂班師廣戊辰發江安距今才十日耳始軍有二道可進自納溪夷牢口至江門近而險自寧逺至樂共壩回逺而平賊意官軍必出江門盛兵距隘而廣實趨樂共賊兵不能支皆逃遁己卯命寶文閣待制知汝州李承之權管勾陜西都轉運司公事以上批訪聞陜西自朝廷以軍興於四路各權置轉運使已來逐人惟以調度軍食為急其所取辦金帛又仰朝廷分頒之數是以本路經費嵗入全闕官主領繼又諸道經略轉運司辟除文武官屬不少知監縣務多是寄居或衙校權攝即目所在茶鹽酒稅常課率皆虧耗朝廷雖已命錢協權領轉運司舊日職事緣協非有兼人幹力慮不可獨倚辦集况向者兵屯雖解完葺故壤費用尚多若不從今加意經營深恐異時煩中都供饋中書可速選所宜佐協之官故以命承之其汝州兼買木令承之速舉官以聞要見錢協受命兼陜漕的月日种諤言效順人已刺歸漢二字恐諸路其在臣後者一例殺戮乞賜約束詔种諤所過招納效順人令王中正如行營經過指揮諸將更加存撫又言收復夏州新舊紀于戊寅日書种諤入夏州蓋因此奏也戊寅乃二十五日據密院時政記諤奏十月十五日入夏州其奏以二十六日到兩紀皆誤今不取涇原路經略司言已差權總管劉惟吉量帶義勇等赴靜邊等寨接引降人詔西界近邊若果有願來投降之人為賊所制須多遣兵破強梗之衆方可接納附順人口今本路乃令劉惟吉領義勇保甲并帶彼軍人往恐無益於事令盧秉更詳審施行鄜延路經略司言米脂寨收窖藏榖萬九千五百餘石弓箭器械什物四千城周圍千一百九步詔改米脂寨為米脂城詔涇原盧秉聞緣邊諸寨見糧不多復今物價甚貴其屯聚防拓軍馬速詳度如賊已散去即放下番人歸聚營處節次抽減歇泊是日王中正引軍駐圭年嶺下不敢入寨遣官屬運糧于福寧寨兵夫凍餒僵仆於道未死衆已剮其肉食之此據記聞庚辰詔自今除授職事官並以寄祿官品髙下為法凡髙一品以上者為行下一品者為守下二品以下者為試品同者不用行守試詔三省印用銀鑄金塗給事中印為門下外省之印舍人印為中書外省之印鄜延路走馬承受楊元孫言大兵已過夏州聞緣路有敗殘西賊嘯聚殺略行人道路梗澀慮奏報及糧道阻節乞指揮下經略司差兵馬緣路巡防詔沈括詳度施行是日林廣軍次樂共壩諜言乞賊猶未離巢穴始議置樂共城駐軍焉詳定禮文所言古者神民不雜禮刑異制故治禮之官常得以事神如左氏所謂使名姓之後率舊典者為之宗故神降之嘉生民以物享周禮王與后不行祭事則宗伯攝得其任矣自漢以來治禮事神之官不得其職始雜以他故後漢志太尉掌郊祀亞獻光祿掌三獻夫太尉秦漢用以掌兵今為三公坐而論道者也光祿本掌宫殿門户皆非祠官之任伏請諸祠祭應攝太尉並以禮部尚書充如正官闕則南北郊以中書臣僚攝太廟以宗室攝其餘及亞獻太常卿並以太常寺太常禮院主判官攝其光祿卿並罷終獻仍以太常卿行禮又博士之官掌通古今贊相祭祀本朝始有監禮之名今若俾之攝行祠事正合古義緣已有御史監祭合罷監禮詔南北郊差執政官為初獻禮部尚書侍郎為亞獻太常少卿為終獻諸祭禮部尚書侍郎太常卿為初獻太常少卿禮部祠部郎中員外郎為亞獻太常博士為終獻宗廟親王宗室使相節度使為初獻正任已上為亞獻已上如闕即遞差以次官充仍罷監禮四年十月二十一日聖旨今附本月日辛巳史館修撰曾鞏言臣修定五朝國史要見宋興以來名臣良士或嘗有名位或素在邱園嘉言善行歷官行事軍國勳勞或貢獻封章著撰文字本家碑志行狀紀述或他人為作傳記之類今所修國史須當收采載述恐舊書訪尋之初有所未盡乞京畿委開封知府及畿縣知縣外委逐路監司州縣長吏博加求訪有子孫者延致詢問所有事迹或文字盡因郡府納於史局以備論次或文字稍多其家無力繕寫即官為庸寫校正其嘗任兩府兩制臺諫官之家家至詢訪各限一月發送史局并中書編集纍朝文字及樞密院機要文字并纍朝御札手詔副本送本局以備討論從之詔沈括據王中正發來宥州鼐旺井所遣奏稱獲賊界蕃部及甲戌次宥州西北左村澤與賊戰鬭次第乃知賊會慶州相對之兵盡在宥州之側萬計非一並橫山精鋭之人勢不可輕卿近遣景思誼將三千餘人使前卿又欲漸次部兵迤邐前去照應且甚不可容易恐思誼年少又平生不慣戰鬬萬一為大軍之纍卿且宜鎮安帥府根本以安固內地之心其本路元留守兵慮中正至有行營日久疲於征役之人可與更易兌換以往先是蕃部數萬人寇順寧衆欲閉壁入保括以謂示弱驕虜非策也使前鋒將李達以千人出順寧具十萬人食言括將自將以往先使驍將景思誼吹邁以三千人嘗之虜驚潰拔磨崖寨得男女萬人牛羊三萬以還此據括自志附見當考涇原兵既破瑪伊克隘行次尚伊口有二道一北出達達嶺一西北出鳴沙川鳴沙少迂諸將欲之達達劉昌祚曰離漢時運司備糧一月今已十八日未到靈州儻有不繼勢將若何吾聞鳴沙有積粟夏人謂之御倉可取而食之靈州雖久不足憂也既至得窖藏米百萬為留信宿重載而趨靈州壬午師次城下是時環慶軍未至城門未闔先鋒奪門幾入髙遵裕遣李臨安鼎齎劄子且曰已使王永昌入城招安可勿殺少間門闔城守斬級四百五十得戰馬牛羊千餘昌祚曰城不足下獨嫌於環慶爾朝廷在逺必謂兩道爭功遂按甲十一月一日涇原師次靈州城下此張舜民志劉昌祚墓所云據實録十一月二十一日奏乃云壬午趨靈州城下先鋒獲捷壬午十月二十九日也今從實録實録十一月十七日己亥涇原路行營總管司言大兵至鳴沙川分兵搜得窖藏粟及雜草三萬三千餘石束牛羊萬餘已犒設使臣將士等十二月二十一日癸卯涇原路行營總管司言十月丁丑於鳴沙城外下寨搜獲窖粟萬八千餘石壬午趨靈州城下先鋒遇賊接戰斬首二百七十二級生擒四十三人獲老小婦女二百奪馬牛羊駝畜萬餘糧草五萬餘今并入此數目不同當考廢瀘州大硐寨
