body:
  text: 續資治通鑑長編卷三百六宋李燾撰神宗元豐三年秋七月癸亥內殿承制王舜封管押醫藥使髙麗回以為閣門通事舍人勾當御前忠佐軍頭引見司醫官等轉資錫服有差甲子詔廣武雄武上下掃雖據地形保無疏虞然方今霖潦不測河流湍怒之際須賴諳知水勢之人主領處畫則措置不謬免朝廷憂可速遣外都水監丞陳祐甫往親視詔權發遣提㸃河北西路刑獄太常博士杜常權發遣提㸃秦鳳等路刑獄兼提舉義勇保甲代太常博士李深徙深權發遣提㸃淮南東路刑獄以上批深屈彊自任議多齟齬於訓兵法度不能曉知而排沮同僚必使從已若不早圖改命到官定致譸張故也乙丑詔資政殿學士吕惠卿丁母憂俸外特給錢五十緡五月二十七日云云詔諸路教閲禁卒毋得過兩時以秦鳳路走馬承受蘇賁言有拘留數日不得休息故也或已見當檢丙寅詔禮院官各贖銅有差以慈聖光獻神主祔廟失報少府監排辦故也賜米三萬石開蘇杭州運河淺澱上批早進呈審官東西三班院為本係尚書省職事只令用公牒往還緣司農寺羣牧司亦皆六曹職事今乃獨許三處不用近降指揮若非朝廷特委隨見令主判為廢已行之令則取此捨彼殊失均直之道未知所以先是有㫖審官三班院於吏部皆用申狀中書以為不當申只當用牒後再進呈審官三班院司農寺羣牧司等皆用申狀入內省言寄左藏庫副使勾當御藥院梁從政合磨勘詔從政係隨龍特遣西京左藏庫使依舊密記五日事知雍州左藏庫副使兼閣門通事舍人劉初乞借度僧牒二百收息置公使器用其本錢市金輸內藏庫從之朱本只於此月九日庚午特書以廣西撫都監劉初知雍州兼本路鈐轄按墨本此月六日丁卯初知雍州矣戊辰詔雄武廣武上下掃役兵方盛暑晝夜即工可與特支錢賜部役官夏藥上批鄜延路偵西賊欲選騎兵蹂綏德田可速下經略司精審覘候如得其實令所屬將副選漢蕃兵擇要地設伏伺其侵入痛掩殺之庚午命岐王皓為明堂亞獻嘉王頵為終獻梓州轉運使太常少卿劉忱徙利州路夔州路轉運副使屯田員外郎董鉞徙梓州路忱條奏調發乖方故罷歸故官而以鉞代之又以殿中丞苖時中權發遣梓州路轉運副使條奏調發不當據平蠻録御集七月二十五日云梓州轉運司近奏科夫事朝廷已見乖方劉忱雖即罷去程之才乃仍在職遂下詔禁約事在丙戌都水監言澶州孫村陳掃及大吳小吳掃河決此據朱本舊紀及新紀並書河決澶州孫村明年四月乙酉乃書決小吳掃壬申熙河路走馬承受公事樂士宣言果莊以蕃字與知河州劉昌祚云我言勿興土功及更修岷州城我欲往岷州理㑹及聞果莊大集兵馬未知所向上批宜令經略司具析果莊書既無理且不遜何以不奏仍即詰其侵越生事及募人往伺虛實嚴責並邊城寨日夕備之權知都水監蘇液言奉朝㫖照管固護澶州掃岸見往相視上批上件決口雖轉隄漫水若遷延不塞萬一河道變移亦可轉為巨患宜下外監丞司速修閉癸酉詔應在京置局編修文書官司可槩指揮催促結絶所主官具析書成年月日以聞中書詳酌凖事繁簡人力多寡隨宜裁度梓州路提㸃刑獄盛南仲乞下江安縣招誘斗篷夷令與敢勇人程舜元等謀斬乞弟他夷盡可除蕩詔委南仲如獲乞弟首白身人除遙郡刺史有官者比類增賞及賜銀絹五千斗篷夷如委向順意欲與官軍協力即俟大軍進討關報韓存寶毋得一例蕩除甲戌詔中書朕惟皇以道帝以德王以業各因時制名用配其實何必加崇稱號以自飾哉秦漢以來尊天子曰皇帝其亦至矣朕承祖之休宅士民之上凡虛文繁禮悉已革去而近百司羣辟猶或時以稱號見請雖出於歸美報上之忠然非朕所以若稽先王之意自今每遇大禮罷禮部上尊號兩紀並書入內東頭供奉官瀘州勾當公事韓永式言聞利路雨水溪江泛漲漂流民田物價增長民未安居乞下本路轉運并提舉司賑濟詔提舉司依條施行韓永式不當以劄子奉事特釋罪詳定禮文所言鹵簿所用二十八宿五星攝提旗有司乃取方士之說繪為人形於禮無據伏請改製各著其象以則天文從之又言郊特牲曰獻命庫門之內戒百官也太廟之命戒百姓也說者曰百姓王之親也今誓百官於尚書省誓宗室於中書省於禮無據伏請戒百官於朝堂戒宗室於太廟從之又言祭祀時刻今參酌秋夏即用丑時一刻春冬即用丑時七刻行事至明皆十五刻庶合舊禮不至迫遽從之詳定所依奏在三年八月二十二日今附誓戒後上批府界諸路將下闕禁軍萬數不少朝廷雖纍經招揀終未足數可遍降指揮早令敷額庶緩急調發不誤驅策詔前永興軍等路察訪使李承之前知司農寺丞莊公嶽前提舉常平倉沈披蔡朦轉運判官章楶楊蟠各展磨勘三年提舉刑獄李南公轉運使趙瞻展二年前轉運使張詵楚建中各贖銅二十斤坐保明修永興洪口不當也經制熙河財用司奉自元豐元年次第推行至今已及一年具到所收息數以聞上批可速比附茶場司近例計課入多寡優與推賞庶事初鼓激當職官悉力經營資助大費經久不煩朝廷供億遂下保明其實仍詔轉運使王欽臣驅磨以聞乙亥詔澶州大名府被河水淹溺闕食户大人日給米一升小兒半升即流移逐熟經過河渡若將帶隨行物其稅渡錢聽免收一季又詔支成都府路常平米十萬石梓州路常平錢五萬貫差雇水陸運至韓存寶軍前詳定禮文所言看詳鹵簿記公卿奉引第一開封令乘軺車次開封牧乘革車隼旗次太常卿乘革車鳳旗次司徙乘革車瑞馬旗次御史大夫乘革車獬豸旗次兵部尚書乘革車虎旗以臣等考之皆為非是謹案周禮巾車職曰孤乘夏篆卿乘夏縵大夫乘墨車司常職曰孤卿建旃大夫建物儀禮覲禮曰侯氏乘墨車載龍旗則令五品秩比大夫當乘墨車而建物牧比諸侯當乘墨車而建旗太常卿古春官卿當乘夏縵而建旃司徒今三公當乘夏而建旃御史大夫三品秩比卿兵部尚書古夏官卿皆當乘夏篆而建旃伏請公卿以下奉引先開封令奉引乘墨車建物次開封牧奉引乘墨車建旗次太常卿奉引乘夏縵建旃次司徒奉引乘夏建旃次御史大夫奉引乘夏縵建旃次兵部尚書奉引乘夏縵建旃所以參備周禮九旗之制貼黃稱禮經不著三公所乘車所建旗又偏駕不入王門諸侯朝乘墨車今約孤乘夏篆建旃之文定司徒之制從之仍令疾速講求車旃物制度以聞三年七月十四日乙亥依奏又言謹案周戎右職曰㑹同充革車儀禮曰二車畢乘禮記曰乘車不敢曠左必式右蓋古之人君後車餘路不敢曠空必使人乘之所以别曠左之嫌也詩曰命彼後車謂之載之是也自秦兼九國車服西漢因之大駕屬車八十一乘故東漢志曰屬車八十一乘尚書御史所載又揚雄曰鴟夷國器託於屬車張衡曰屬車之簉載獫猲獢匪惟玩好乃有祕書則是漢之屬車非獨載人又以載物亦儀禮所謂畢乘之義也本朝鹵簿屬車十二乘在法駕之後空而不乘實近曠左之嫌皆不合禮制伏請屬車十二乘以尚書御史乘之或以載乘輿服御已具奏聞訖禮文無月日今附此其從違當考丁丑上批河北水災闕食之民可寄招內外見闕諸軍宜就選委官速施行詔自今郊廟罷設黃道褥新舊紀並書此蓋因實録也元年十一月三日已有詔今兩存之詔河北提刑司劾河決當職官以聞詳定禮文所言明堂儀注設御位於中階下之東南西嚮臣等謹案古者人君臨祭立于阼其臨祭就位于阼階下大夫士禮也自曹魏以來有司失之伏請設皇帝版位于阼階之上西嚮太廟景靈宫亦如之從之戊寅詔經制瀘州蠻賊韓存寶所將涇原路弓箭手可月給其家十將以下至長行錢一千副兵馬使以上二千都虞候以上三千以知熙州苖授同經制熙河邊防財用荆湖南路轉運副使朱初平為瓊管體量安撫權提舉廣南西路常平等事劉誼同體量安撫八月辛卯豐稷有言或移入此詔應歸明人官給田而作料次催科者荒地免二十料熟地半之御史中丞李定言朝廷凡有差除法禁傳泄茍有不當御史無得而言乞委封駮司即日關報大理寺言自今取勘官吏止緣公事稽失杖以下吏人乞斷罪如法命官案後收理即官司不以時讞雖遇赦勿原並從之已卯同管勾經制熙河路邊防財用祕書丞胡宗哲兼管勾新置監牧及給散蕃部馬種事從都大經制熙河路邊防財用司所奏也密記有此王君萬卒于五月胡宗哲或是代君萬也壬午上批知秦州羅拯自春以來頻在病假形體癯瘠精力耗昏邊務浩繁慮難倚辦可下轉運司體量以聞拯尋卒於秦州拯卒在八月一日今并書詔賜修閉大小吳掃役兵特支錢有差又詔修上下愜山口役夫計所役日免來年春夫外更減五分癸未上批諸將奏到所見可並送承㫖司如見行敇文未該載理有可取者其著為令權發遣鹽鐵判官太常博士直龍圖閣韓宗彥為右正言寶文閣待制知瀛州是夜彗出西北太微垣郎位南在軫新舊紀並書彗出太微垣天文志云占者以為主京城有兵變於是修京城置樓櫓保户養馬者促其期限督訓保甲除軍器以備之史官所書備變事或在前矣今不取甲申御史王祖道言前知湖州陳侗昨慈聖光獻太后遺誥後侗赴任至蘇州即令女妓佐酒於本路自首侗之學術紕繆行檢鄙惡衆所共聞使之出守方州已不足率厲民俗况遺誥所至未久閭巷小民莫不痛心而侗安於為之臣竊謂侗於法雖許首免而臣子之義何以處此望特案治詔提㸃兩浙路刑獄孫昌齡體量昌齡言侗實令女妓佐酒以遺誥釋服無作樂之禁故不加罪丙戌詔以星變自今月戊子避正殿減常膳中外臣僚並許直言朝政闕失兩紀並書詔語時術者謂當有兵變上命宦者察衛士飲食御史中丞李定亟入言一飯不足以示恩適動小人之心耳遂罷之復有議罷明堂者上以訪定定曰三歲一郊或明堂祖宗以來未之有改不知誰為此言願得劾其繆妄上曰聽卿言足矣此詔求直言不知復有何人應詔直言當考劉摯作王拱辰行狀云云亦常談耳今不取知制誥王安禮言和氣致祥乖氣致沴意者執政大臣是非好惡不遵諸道乘權射利者不察主上惠養元元之意用力殫於溝瘠取利究於園夫始有以召星變臣願陛下省不急之改作紓弗勝之工力至於祈禳小數貶損舊意恐非應天以實者上覽疏嘉歎他日進對上曰王圭欲使卿條具所以朕嘗謂左右大臣宣導下情以達于上不應沮格人言以壅障人主今以一指蔽目雖泰華在前不之見也近習之蔽其君何以異此朕今信卿卿亦當自信第言之毋憚上批東南諸路團結諸軍初未嘗遣使按閲可差西京左藏庫使勾當軍頭司李詵內侍押班石得一依張山甫按閲京西諸將條例施行詔梓州路轉運司應供軍之物並從官給或和買毋輒配率支移新變違者以親被制書論上以本路奏科夫事乖方擾民劉忱雖已罷去程之才猶在職故條約之委提㸃刑獄司覺察仍促苖時中朝辭令上殿訖當日出門舊紀書詔梓州路供軍之物並給官毋賦民詔聞乞弟自歸巢穴修置戰具多結夷人或慮非時衝突省地王光祖以移軍近裏委韓存寶候閣道通行軍馬擇近日起發至瀘州天氣尚熱即分屯近郡審度進討詔賜狹河役兵錢有差詳定禮文所言古禮無迎神其餘祭初祭末皆不拜謹案少牢饋食禮主人朝服即位于阼階東西面鄭氏曰為將祭也即不言拜及祝告利成主人出立于阼階上西面亦不言拜雖為神象其始迎之而入也主人及賓皆辟位而已出亦如之惟賓客之事則有拜辱拜送蓋賓主相敵可為禮也特牲饋食禮祝迎尸于門外鄭氏以為就其次而請不拜不敢與尊者為禮玉藻曰士於大夫不敢拜迎釋者亦曰禮不敵近代事神拜而迎送是祭祀與接賓一也殊非禮意所有儀注皇帝至版位西向立再拜樂舞九成訖又再拜及送神樂一成止皇帝再拜伏請不行應在位官凖此從之又言胙俎與神俎骨體各異設之亦不同今儀注皆不合禮伏請用上特左胖為胙俎左臂一骨長脅二骨短脅二骨加于俎當神俎入設之時以胙俎置於階間俟皇帝飲福奠爵則太祝奉俎進減神坐前正脊二骨橫脊二骨合置于俎以進其有司攝事進胙太牢用牛左肩臂臑折九箇少牢用羊左肩臂臑折七箇太尉展視以授使者再拜稽首送今南郊式所進胙不與禮合伏請改正從之元豐三年七月二十五日依奏又言親祠賜胙自宰臣等而下之至祀官雖有多少之差而無貴賤之别伏請依禮分定從之元豐四年十一月一日依奏今附三年七月二十五日論胙俎後又言案王制祭宗廟之牛角握周禮小司徒凡小祭祀奉牛牲又古者諸侯五廟礿祠蒸嘗每廟一太牢天子之大夫亦用太牢故曰大夫以索牛謂之索者求得而用之但不在滌而已諸侯之大夫祔祭用太牢吉祭則少牢天子之祭無不用牛者唐郊祀録稱宗廟社稷等祭悉用太牢其後稍易舊制九廟時饗有司攝事共用一犢開寶初詔親祠太廟共用一犢又詔常祀惟天地用犢餘大祀以羊豕代之嘉祐中仁宗親祫每室用一太牢自餘三年親祫八室共用一犢有司攝事惟以羊豕記曰先王之制禮也不可多也不可寡也惟其稱也今三年親祠而八室共用一犢及合饗盛祭有司攝事而不用少牢則為非稱欲乞三年親祠并時饗有司攝事太廟每室並用太牢詔惟親祠並合饗每室用太牢又言今祭地亦為圜壇在國北之地上熙寧祀儀祭皇地祇壇八角祭神州地祇壇廣四十八步髙五尺今則變方丘為圜壇神州雖築方壇而無坎皆不應禮伏請祭皇地祇神州地祇並為方壇壇之外為坎庶協古制詔改圜壇為方丘餘不行丁亥詔中書曰丁亥七月二十七日按八月六日御集前曰詔中書門下以將來祀英宗于明堂惟以配昊天上帝今再驗經文但云上帝乃非專配昊天上帝可於詔中照㑹節出下此詔蓋是節出行下者朕惟先王制行以赴禮孝莫大於嚴父嚴父莫大於配天配天一也而屬有尊親之殊禮有隆殺之别故逺而尊者祖則祀於郊之圜丘而配天邇而親者禰則祀於國之明堂而配上帝天足以及上帝而上帝未足以盡天故圜丘祀天則對越諸神明堂則上帝而已故其所配如此然後足以適尊親逺近之義昔周公之所親行而孔子以為盛者也事載典册其理甚明而歷代以來合宮所配既紊於經乃至雜以先儒六天之說皆因陋昧古以失情文之宜朕甚不取其將來祀英宗皇帝於明堂惟以配上帝餘從祀羣神悉罷兩紀並載詔語八月十二日壬寅趙君錫議當考戊子詔入內東頭供奉官韓永式近差往瀘州勾當今已回可再差都大經制瀘州蠻賊司照管軍馬遣勾當御藥院吳靖方於中太一宫真室殿建天皇九曜息災祈福道場七晝夜啓罷日參知政事一員行香户部侍郎致仕范鎮言乞下京東京西河東河北陜西轉運司量立賞格求訪真黍以審音樂太白晝見己丑詔梓州轉運司那官一員隨軍入界權發遣司農寺都丞吳雍言乞置局㑹天下役書刪除煩復支酬庸直比較輕重擬成式樣下逐路講求報應再加刪定從之又言差官考存留耆壯雇直并支酬衙前錢物計置聚之京師或轉移沿邊變易金穀詔提舉司限一季具數以聞詳定禮文所言按古者執圭以臨祭未行禮則不執也今皇帝乘玉輅執鎮圭赴景靈宫禮畢赴太廟青城皆乘輅執圭不應禮伏請自今乘輅不執圭及乘大輦亦不執又言古者宗廟室中為石以藏主謂之宗祏春秋傳曰典司宗祏是也正廟之主各藏於太室西壁之中遷廟之主藏於太祖太室北壁之中其坎去地六尺一寸自漢迄唐遷主所藏或在西儲或在西夾室其正廟之主雖各藏廟室西壁之中而帝后别為石坎皆非禮意蓋祧主當藏太祖太室北壁之中後世廟不異宫猶宜藏於太祖廟之太室本朝順祖藏於西夾室沿襲之誤又少牢饋食禮薦歲事于皇祖必以妃配故同几共牢一尸而俎豆不兩陳今太廟藏主帝后異室與同几之義不相應伏請遷廟之主藏於始祖太室北壁中帝后之主各共一石室又太廟牙牀上各有蒲合并紫席褥曲几直几如遇祭享於牙牀上鋪設禘祫則緣室合用物並前一日移出殿上按禮太牢享先王贊玉几鄭氏注玉几所以依神天子左右玉几司几筵王設莞筵紛純加繅席畫純加次席黻純左右玉几祀先王胙席亦如之如上所陳則筵當單設繅席次席皆重設之禮記曰天子之席五重今太廟几筵皆不應禮伏請改用管筵紛純加繅席畫純加次席黻純左右玉几凡祭祀皆繅次各加一重并管筵為五重並從之庚寅熙河路經略司言西界首領裕勒藏嘉卜約勒蕃部巴矩等以譯書來告夏國集兵將築薩卜丹宗城於河州界黃河之南洮河之西上批若如所報乃屬河州之境豈可聽其修築深慮經略司不詳上件所指地分都無為備驅逐約闌次第可速下本司多備兵馬禁止之廢施州永寧寨置行廊安碓二寨
