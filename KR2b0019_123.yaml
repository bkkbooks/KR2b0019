body:
  text: 續資治通鑑長編卷一百十九宋李燾撰仁宗景祐三年秋七月己卯新作延寧觀觀本王中正舊第保慶太后出奩中物市其地以建初有詔罷修寺觀及是諫官御史以為言帝謂輔臣曰此太后奩中物爾諫官御史欲邀名耶參知政事宋綬進曰彼豈知太后所為但見興土木違近詔即論奏之耳事有疑似猶指以為過或陛下大闕失近臣雖不言自亦傳聞四方為聖政之纍何可忽也太祖嘗謂唐太宗為諫者所詆不以為愧何若動不過舉使無得而言哉朝廷已行之命惟陛下守之自己無令有以取名也初孫奭領太常以國朝典禮倣唐王涇撰崇祀録二十卷未奏而卒其子殿中丞瑜表上之詔送史館雍州言交州甲洞蠻寇邊詔責問李德政且令捕酋首正其罪以聞此與二月壬申所書當是一事但廣西轉運司與雍州言之各别耳罪人貸死者舊多配沙門島島在登州海中至者多死辛巳詔當配沙門島者苐配廣南逺惡地牢城廣南罪人乃配嶺北然其後亦有配沙門島者乙酉翰林侍講學士馮元獻金華五針降詔褒答丁亥工部郎中王軫直祕閣軫上所撰五朝春秋二十五卷特擢之禁民間私寫編敕刑書及毋得􅍢版戊子翰林侍講學士兼龍圖閣學士禮部侍郎馮元度支判官工部郎中集賢校理同修起居注聶冠卿太常博士直史館宋祁等上景祐廣樂記八十一卷己丑以元為户部侍郎冠卿為刑部郎中直集賢院祁為工部郎中庚寅右諫議大夫集賢院學士孫沖上所撰五代紀七十七卷降詔褒答乙未初置大宗正司以寧江節度使允讓知大宗正事彰化留後守節同知大宗正事仍賜器幣襲衣金帶鞍馬時諸王子孫衆多既聚居睦親宅故於祖宗後各擇一人使司訓導糾違失凡宗族之政令皆關掌奏事毋得專逹先詳視可否以聞記聞載允讓管勾宗正事已於二年十一月宗室改西班官時辨之本志云景祐二年置大宗正司會要云慶厯初置大宗正司並誤也前權蘇州觀察支使劉文自言以父任為太廟齋郎歷十三考無過請換右職丁酉授西頭供奉官文父厚德嘗知涿州率吏民內屬者也開封府言捕得逃卒張興等常集同類匿內城前渠中謂之無憂洞請修閉京城裏外渠口從之己亥命翰林學士丁度知制誥胥偃直史館髙若訥直集賢院韓琦同詳定黍尺鐘律還盧多遜家懷州所沒田宅庚子太平興國寺災是夕大雨震電火起寺閣中燔開先殿及寺舍數百楹辛丑遣官疏決三京及畿內繫囚雜犯死罪以上遞降一等徒以下釋之其因太平興國寺火被繫者特放朝廷始議修復火所焚處崇政殿説書賈昌朝言易震卦之象曰洊雷震君子以恐懼修省凡六爻之旨皆以能自戒懼乃免咎眚春秋傳曰人火曰火天火曰災竊惟近年寺觀屢災此殆天示譴告獨可勿繕治以示畏天戒愛人力之意從之癸卯詔審官院自今員外郎知州其通判毋得差郎中博士知州毋得差員外郎餘勿拘泗州新作普濟院成詔給田十頃保慶太后施錢所建也八月丁未置廣南西路駐泊兵馬都監一員滑州言建雄節度使髙繼勳卒繼勳性謙謹有機略善撫御士卒臨戰未嘗不勝在蜀有威名號神將知滑州時方河漲怒齧堤繼勳雖老猶督役卒夜下揵露坐河上水乃殺怒滑人德之戊申徙陜西轉運使兵部員外郎天章閣待制王沿知滑州先是朝廷將減戍卒就食內地詔與知州部署鈐轄等議沿即奏減卒數萬知樞密院李咨以為不可復下緣邊都監議沿上疏曰兵機當在廊廟之上豈取則小人哉咨怒其言奏罷之己酉詔天下士庶之家屋宇非邸店樓閣臨街市毋得為四鋪作及鬬八非品官毋得起門屋非宫室寺觀毋得彩繪棟宇及間朱黑漆梁柱窗牖雕鏤柱礎凡器用毋得表裏用朱漆金漆下毋得襯朱非三品以上官及宗室戚里之家毋得用金扣器具用銀扣者毋得塗金非宫禁毋得用玳瑁酒食器若純金器嘗受上賜者聽用之命婦許以金為首飾及為叉篸釧纒珥鐶毋得為牙魚飛魚竒巧飛動若龍形其用銀毋得塗金非命婦之家毋得衣珠玉凡帷幔帟幕簾旌牀襦毋得用純錦遍繡宗室戚里茶簷食盒毋得覆以緋紅貴族所乘車毋得用朱漆及五采繪許用黑漆而間以五采民家毋得乘肩輿及以銀檛導從肩輿毋得過二人非四品以上官毋得服金帶嘗受賜者聽服非五品以上毋得乘閙裝銀鞍其乘金塗銀裝絛促結鞍轡者自文武升朝官及內職禁軍指揮使諸班押班廂軍都虞候防團副使以上聽之亦毋得以藍為絛白皮為韉轡民庶用氊皮絁紬韉京官任通判以上者許權依升朝官例違者物主工匠論違制工匠黥𨽻他州募告者賞錢五萬其過百日而不變毁者坐之宣徽院御史臺閣門左右金吾街司開封府舉察上聞尋又詔官司所用銅器及鍮石為飾者毋得塗金庚戌知大宗正事允讓等請自今宗室每朝罷各就位聽讀從之甲寅以審刑院詳議官殿中丞王果為衣庫副使初果上書陳擇將備邊之䇿召試舍人院而除之許并州立學吏部流內銓詳定內外臣僚嵗所舉幕職州縣官自今待制觀察使以上舉三人知雜御史閣門使以上二人侍御史諸司使以上一人其轉運使副提點刑獄即不限人數舊當三人者止當一人仍須有本部監司長吏及通判薦舉者始聽磨勘丙辰左正言知制誥史館修撰宋祁為契丹生辰使禮賔副使王世文副之工部郎中判户部勾院李宗詠為正旦使供奉官閣門祇候崔凖副之戊午以招箭班𨽻東西班詔府州招蕃部子弟自今招及蕃部五十户以上補指揮使舊招八十戶始補之以數多難及也初知蘄州虞部員外郎王蒙正故入知蘄水縣太常博士林宗言死罪詔殿中侍御史蕭定基往按之定基諭所隨吏蔡顒等曰蒙正必賂汝汝苐受之亟告我蒙正果賂顒等直三百萬定基因以正其獄庚申貶蒙正為洪州别駕本路轉運使蔣堂坐失察舉降知越州副使吳遵路知洪州提點刑獄徐越知廬州同提點刑獄趙日宣為杭州都監上欲官定基一子定基以讓顒等於是顒等四人並補三班借職殿侍差使辛未三司使刑部侍郎程琳為吏部侍郎崇儀使英州刺史入內副都知張永和領貴州團練使引進副使王克基為西上閣門使並以修睦親宅成也監督工作使臣而下第賞之甲戌户部員外郎兼侍御史知雜事姚仲孫言諫議大夫以諫諍名官蓋朝廷之選不可以嵗月序遷今諫議大夫十二員諸寺卿至前行郎中三十五員帶近職者不在兹數若皆以年勞可進恐五七年間諫議大夫員益多望自今擇雅有時望者除之餘止於卿監中遷授詔當除者具履歷資序奏裁右司諫直集賢院韓琦言樂音之起生於人心是以喜怒哀樂之情感於物則噍殺嘽緩之聲隨而應之非器之然也故孔子曰樂云樂云鐘鼓云乎哉孟子之對齊宣王亦云今樂猶古樂能與百姓同樂則古今一也唐太宗聽祖孝孫新樂乃謂禮樂之作蓋聖人緣物設教治之隆替亦不由此魏文公對以樂在人和不由音調皆述樂之至言也臣奉詔與丁度等詳定阮逸胡瑗鄧保信所造鐘律粗考前志參驗今法二家之法差舛未安蓋阮逸之主分方保信之用長黍質之典據悉無所聞伏自祖宗以來通用王朴之樂未嘗更易以至天下無事垂八十載為樂之用非不知也頃燕肅妄加磨鑢適會李照至闕謂其音未諧陛下再加練核許之改作洎逸瑗繼至盛言照樂穿鑿再令造律則又違經乖古保信續上新法亦復長廣未合竊以祖宗舊樂遵用已久屬者徇一臣之偏議變數朝之同律賜金增秩優賞其勞曽未周嵗又將易制臣慮後人復有從而非之者不惟有傷國體實亦虛費邦用歷觀前代議樂古之管尺尚存而猶是非紛紜纍年方就未見若今之速而易也臣切計之不若窮作樂之原為致治之本使政令平簡民純熙而洽海內擊壤鼓腹以歌太平斯乃治古之樂何得以器象求乎就達其源又當究今之所急者且西北二陲久弛邊備犬戎之性豈能常保此陛下與左右大臣宵旰所慮宜先及之緩兹求樂之議移訪安邊之䇿急其所急在理為長請有司且記二家律法及所造管尺鐘磬權量存而未行再訪天下有精曉音律者俾之詳正而後施用一二年訖無至者則將王朴逸瑗保信三法别詔稽古之臣取其中多合典志者以備雅奏固亦未晚詔丁度等速詳定以聞九月丙子朔司天監丞邢中和上所藏古今天文格子圖戊寅降祠部員外郎集賢校理趙良規通判蘄州屯田員外郎崇政殿説書諸王府侍講趙希言通判沂州初良規等領宗正丞事坐宗正史薛誥盜太廟夾室册匣所飾金既贖銅罷所領而言者尚以為責輕故復黜之庚辰幸睦親宅燕宗室及從官賜宗室器幣有差時儒臣多為賦頌以獻者許絳州立學丁亥詳定黍尺鐘律丁度等言鄧保信所製尺用上黨秬黍圓者一黍之長纍百而成又律管一據尺裁九十黍之長空徑三分圍九分容秬黍千二百遂用黍長為分再纍成尺校保信尺律不同其籥合升斗深濶推以算法類皆差舛不合周漢量法阮逸胡瑗所製亦上黨秬黍中者纍廣求尺制黃鐘之律今用再纍成尺比逸瑗所製又復不同至於律管籥合升斗斛豆區釜亦率類是蓋黍有圓長大小而保信所用者圓黍又首尾相銜逸等止用大者故再考之即不同尺既有差故難以定鐘磬謹詳古今之制自晉至隋纍黍之法但求尺管不以權量參校故歷代黃鐘之管容黍之數不同惟後周掘地得古玉斗據斗造律兼制權量亦不同周漢制度故漢志有備數和聲審度量權衡之説悉起於黃鐘今欲器數之制參伍無失則班志積分之法為近逸等以大黍纍尺小黍實籥自戾本法保信黍尺以長為分雖合後魏公孫崇所説然當時已不施用况保信今尺以圓黍纍之及首尾相銜又與實籥之黍再纍成尺不同其量器分寸既不合古即權衡之法不可獨用詔悉罷之又詔度等詳定太府寺并保信逸瑗所制四尺度等言尺度之興尚矣周官璧羡以起度廣徑八寸袤一寸禮記布手為尺淮南子十二粟為寸孫子十釐為分十分為寸雖存異説莫可適從漢志元始中召天下通知鐘律者百餘人使劉歆典領之是時周滅二百餘年古之律度當有存者以歆之博貫藝文曉達歷算有所制作宜不凡近其審度之法云一黍之廣為分十分為寸十寸為尺先儒訓解經籍多引以為義歷世祖襲著之定令然而嵗有豐儉地有磽肥就令一嵗之中一境之內取黍校驗亦復不齊是蓋天之生物理難均一古之立法存其大槩爾故前代制尺非特纍黍必求古雅之器以黍校焉晉泰始十年荀公曽等校定尺度以調鐘律是為晉之前尺公曽等以古物七品勘之一曰姑洗玉律二曰小吕玉律三曰西京銅望臬四曰金錯望臬五曰銅斛六曰古錢七曰建武銅尺當時以公曽尺揆校古器與本銘尺寸無差前史稱其用意精密隋志所載諸代尺度十有五等然以晉之前尺為本以其與姬周之尺劉歆銅斛尺建武銅尺相合竊惟周漢二代享年永久聖賢制作可取則焉而隋氏鑄毁金石典正之物罕復存者夫古物之有分寸眀著史籍可以酬驗者惟有法錢而已周之圜法歷載曠逺莫得而詳秦之半兩實重八銖漢初四銖其文亦曰半兩孝武之世始行五銖下洎隋唐多以五銖為號既歷代尺度屢改故大小輕重鮮有同者惟劉歆制銅斛之世所鑄錯刀并大泉五十王莽天鳯元年改鑄貨布貨泉之類不聞後世復有鑄者臣等檢詳漢志通典唐六典云大泉五十重十二銖徑一寸二分錯刀環如大泉身形如刀長二寸貨布重二十五銖長二寸五分廣一寸首長八分有竒廣八分足枝長八分間廣二分圜好徑二分半貨泉重五銖徑一寸今以大泉錯刀貨布貨泉四物相參校分寸正同或有大小輕重與本志微差者蓋當時盜鑄既多不必皆中法度但當校其手足肉好長廣分寸皆合正史者用之則銅斛之尺從可知矣况經籍制度皆起周世如劉歆術業之博祖沖之算數之妙荀公曽之詳密既合而周尺則最為可法兼詳隋牛里仁等議稱後周太祖敕蘇綽造鐡尺與銅尺以調鍾律以均田度地唐祖孝孫云隋平陳之後廢周玉尺用此鐡尺律然比晉前尺長六分四釐今司天監景表尺和峴所謂西京銅望臬者蓋以其洛都舊物也公曽所用西京銅望臬者蓋西漢之物和峴謂洛陽西京乃唐都爾今以貨布錯刀貨泉大泉等校之則景表尺長六分有竒略合宋周隋之尺由此論之銅斛與貨布等尺寸昭然可驗唐代享國三百年其制作法度雖未逮周漢然亦可謂治安之世矣今朝廷必求尺度之中當依漢錢分寸若以為太祖膺圖受禪創制垂法嘗詔和峴等用景表尺典修金石七十年間薦之郊廟稽合唐制以示詒謀則可且依景表舊尺俟有妙達鍾律之學者俾考正之以從周漢之制王朴律凖尺比漢錢尺寸長二分有竒比景表尺短四分既前代未嘗施用復經太祖朝更易其逸瑗保信及照所用太府寺尺其制彌長去古彌逺又逸進周禮度量法議欲先鑄嘉量然後取尺度權衡其説踈舛不可依用謹考舊文再造景表尺一校漢錢尺二并大泉錯刀貨布貨泉總十七枚上進詔度等以錢尺景表尺各造律管比驗逸瑗并太常新舊鐘磬考定音之髙下以聞度等言前承詔考太府等四尺定可用者止按典故及以漢志古錢分寸參校景表尺略合宋周隋之尺謂宜凖景表尺施用今被旨造律管驗音髙下非素所習乞别詔曉音者總領較定詔乃罷之而髙若訥卒用漢貨泉度二寸依隋書定尺十五種上之藏於太常寺一周尺與漢志劉歆銅斛尺後漢建武中銅尺晉尺同二晉田父玉尺與梁法同比晉前尺為一尺七釐三梁表尺比晉前尺為一尺二分二釐一毫有竒四漢官尺比晉尺為一尺三分七毫五魏尺杜夔之所用也比晉前尺為一尺四分七釐六晉後尺晉江東用之比前尺為一尺六分二釐七魏前尺比晉前尺為一尺一寸七釐八中尺比晉前尺為一尺二寸一分一釐九後尺同隋開皇尺周市尺比晉前尺為一尺二寸八分一釐十東魏後尺比晉前尺為一尺三寸八毫十一蔡雍銅籥尺後周玉尺比晉前尺為一尺一寸五分八釐十二宋氏尺與錢樂之渾天儀尺後周鐡尺同比晉前尺為一尺六分四釐十三太府寺鐡尺制大樂所新造尺也十四雜尺劉曜渾儀土圭尺也比晉前尺為一尺五分十五梁朝俗尺比晉前尺為一尺七分一釐太常所掌又有後周王朴律凖尺比晉尺長二分一釐比梁表尺短一釐有司天監景表尺比晉前尺長六分三釐同晉後尺有中黍尺亦制樂所新造也此皆用本志聨書度等詳定四尺乃十月丁卯髙若訥上十五種尺又不在今年今且附見實録又云丁度等以王朴律準為率則太府寺鐡尺比律尺長三寸二分強景表尺長四分鄧保信尺長一寸九分強阮逸等尺長七分強詔度等以太府寺第四等尺比較詳定可以行用者以聞然論者謂漢志分寸尺丈引本起黃鐘之長以子穀秬黍中者一黍之起積一千二百黍之廣度之九十分黃鐘之長一為一分十分為寸十寸為尺十尺為丈十丈為引然則尺生於黃鐘也晉隋以來諸儒之議乃先制尺而為律至有縱黍橫黍之别而容受不能合故其説皆置而不用所以然者由漢志脫文起積一千二百黍之八字今逸等所陳乃古人棄而不用之説度等又泥於漢書脫文卒不能是正之此實録蓋范鎮所修故專主房庶議今移見皇祐三年己丑出內藏庫緡錢五十萬下河北轉運司市糴邊儲賜河南府新修太室書院名曰嵩陽書院庚寅以潞王舊宅為嘉慶院為殿前都虞候廨舍昭成太子舊院為開封府司辛卯召輔臣至邇英閣觀講書詔淮南轉運使嵗一詣闕奏事先是罷發運使及嵗入奏計至是祠部郎中楊告領轉運使兼發運使請復之壬辰以鎮江節度推官阮逸為鎮安節度掌書記知城父縣鄉貢進士胡瑗試校書郎初召逸瑗作鐘磬律度按之雖與古多不合猶推恩而遣之乙未以祠部員外郎崇文院檢討崇政殿説書國子監直講王宗道太常博士國子監説書兼監丞事楊中和並為睦親宅講書仍兼國子監講説睦親宅講書始此詔自今翰林侍講侍讀學士雜給並如龍圖閣學士例增崇政殿説書月廪錢十千辛丑御崇政殿閲諸軍轉員凡三日詔里正衙前嵗滿而有主守官物未得代者其戶下稅租權與免折科冬十月乙巳朔國子博士周越為膳部員外郎知國子監書學越上所纂集古今人書并所更體法名曰書苑凡二十九卷特除之越起弟也降提點廣西路刑獄金部員外郎牛昭儉知婺州以知桂州于大城言昭儉在所部按劾不公也丁未以翰林學士承旨章得象翰林學士丁度權御史中丞張觀同考課諸路提點刑獄詔三司以紬二十萬下河北路絹五萬下京西路市糴軍儲澶州言橫壠水口西岸物料場火凡焚薪芻一百九十餘萬詔轉運司劾主守官吏以聞甲寅命知制誥王舉正看詳編排三館祕閣書籍新作朝集院成詔常參官並以至闕先後為次非自川廣代還及服闋人無得占般家位仍令三司御史臺檢劾之乙卯詔太廟奉慈廟后廟每室各差內臣一員攝宫闈令應奉行事丙辰以契丹歸眀人蒙佐為三班奉職賜名守中仍賜錢五萬丁巳詔徐州知州通判並帶開治溝洫河道事辛酉鎮國節度使駙馬都尉李遵朂上所纂天聖廣燈録三卷請下傳法院編入藏經從之癸亥儀鸞使雅州刺史內侍副都知王守忠為皇城使左藏庫使嘉州刺史入內押班劉從原為內藏庫使西京左藏庫使韶州刺史內侍押班史崇信為文思使供備庫使忠州刺史內侍押班藍元用為西京左藏庫使崇儀使內侍押班任文慶為六宅使左司諫韓琦言近睦親宅成自提舉臣僚而下有詔增秩入內都知張永和實總其事故授遙團之命逮夫同列旋亦推恩當時公言咸謂非當蓋以一人效職而衆人蒙賞故也或謂省局之內官次相妨因而敘遷未甚為害臣是以不敢遽有論列今聞前省都知以降又復優加使額臣竊愈懷疑誠以沮勸之方爵賞為大若匪閲其官簿酬以年勞則必顯著功伐特申寵拜或不由是皆涉無名故書曰官不及私昵惟其能爵罔及惡德惟其賢昔衛人賞于奚以邑辭請繁纓以朝而許之孔子謂不如多與之邑惟名與器不可假人自古所重願亟行追寢以示勸沮癸亥詔京東聽民采金官為收市之乙丑御崇政殿觀三館祕閣新校兩庫子集書凡萬二千餘卷賜校勘官并管勾使臣書寫吏器幣有差遂賜輔臣兩制館閣官燕於崇文院丁卯詔霸州民田為塘水所占及隔在界河外者其稅租亦除之辛未許合州立學十一月乙亥朔詔天下乾元節嚴斷屠宰節前仍毋得過殺物命詔懷逺軍本𨽻宜州自今奏事毋得專達許江州立學丙子詔審刑詳議官闕自今以大理詳斷官補之如在寺嵗未滿而舉外任嘗歷詳斷覆官者亦聽丁丑詔外任官得替毋得受吏民所獻金銀花戊寅保慶皇太后崩始上在乳褓章獻使后護視上起居飲食后必與之俱所以擁佑扶侍恩意勤備性慈仁謙謹寡過帝嘗召其姪永節永德見禁中欲授諸司副使后辭曰小兒豈勝大恩儻小官可也乃並命為左右侍禁章獻崩后嗣享尊號上奉箋稱臣后固辭之又嵗奉緡錢二萬助湯沐后復辭曰此皆出民力願留以贍軍上不從上未有嗣后從容勸上選宗子養宫中由是英宗自宫邸未齠齓養后所后無疾而終殯於皇儀殿敕知樞密院事王隨為園陵監護使禮官請為后服緦麻帝改用唐武后服義安王太后故事加服小功以五日易月而除不視前後殿朝凡八日不朝前殿四日御素紗巾幞淺黃袍黑革帶俟虞主祔奉慈廟始復常服內出緡錢十萬佐園陵費上諡曰章惠祝册文並稱孝子嗣皇帝壬辰詔諸路轉運司今嵗豐穀賤宜曉諭民間毋得廣費及捐棄食物禮院言奉慈廟室六間章獻眀肅皇太后章懿太后室各二間殿之東西夾室舊藏尊號册寶今請册寶止藏於本室而分二間以奉安保慶太后神主從之甲午西南蕃遣龍光辨等貢方物戊戌舒州團練使楊景宗為成州防禦使景宗太后從父弟也少蒱博無賴客京師坐罪黥𨽻致逺務后入宫為美人物色得景宗奏脫兵籍授以官景宗性粗率於是入臨皇儀殿被酒歡譁右司諫韓琦請治其罪上以太后故不欲重貶但出景宗為兖州部署己亥進封乳母崇國夫人許氏為齊國太夫人尋又加號曰永聖保壽十二月戊申詔宣敕劄子非經通進銀臺司毋得直下諸處初龍圖閣直學士李紘領銀臺司具言宣敕劄子皆不經本司封駁之職遂廢不舉請用舊制申明之己酉西平王趙元昊落起復庚戌詔睦親宅講書王宗道楊中和赴北宅講書辛酉禁宗室賣酒募告者賞之詔諸州軍宫觀寺廟在城外當朝拜者知州通判幕職官自今聽更往其兵馬都監監押毋得與丙寅户部侍郎知樞密院事李咨卒上幸其第臨奠輟視朝一日贈右僕射諡憲成咨性眀辨周知世務其處煩常若間暇吏不敢欺在樞府專務革濫賞以遏僥幸其戎馬功簿之目能悉數上前號為稱職初三班使臣七年乃磨勘李迪初入相奏減二年咨請自詔下經七年磨勘後乃用新制事雖均一然衆頗怨之丁卯奉國留後同知樞密院事王德用知樞密院事翰林學士承旨兼侍讀學士龍圖閣直學士禮部侍郎章得象同知樞密院事得象為人莊重度量宏廓初為楊億所稱以為有公輔器或問之答曰閩士多輕俠而得象渾厚有容此所以貴也嘗與億戲博李宗諤家一夕負錢三十萬罷而酣寢自如它日博勝得宗諤金銀一奩逾數月博又負即反奩於宗諤緘識未嘗發也在翰林十二年怡然自得章獻太后臨朝宦官熾橫太后每遣內侍至學士院得象必正色嚴待之或不交一言議者以此稱焉詔諸路轉運使察所部知縣令不治者以聞己巳契丹遣遼州觀察使耶律衮西上閣門使郭揆來賀正旦辛未契丹使還出京畿聽用樂西京左藏庫使端州刺史入內副都知皇甫繼眀為文思使西京左藏庫使忠州刺史入內副都知藍元用為洛苑使內殿崇班裴湘為內殿承制繼眀等並以管勾三館袐閣上新校四庫書特遷之也趙元昊自制蕃書十二卷字畫繁冗屈曲類符篆教國人紀事悉用蕃書私改廣慶三年曰大慶元年再舉兵攻回紇陷瓜沙肅三州盡有河西故地將謀入冦恐嘉勒斯賚躡其後復舉兵攻蘭州諸羌南侵至馬銜山築城凡川會留兵鎮守絶吐蕃與中國相通路沈存中云元昊叛其徒約噶先創造蕃字獨居一樓上纍年方成至是獻之元昊乃改元制衣冠禮樂下令國中悉用蕃書胡禮自稱大夏國史載用蕃書即改元大慶按大慶二字元昊叛遂改天授理法延祚元年今從國史以用蕃書附改元大慶時初嘉勒斯賚娶李埒克遵女生二子曰轄戩曰默戩覺又娶喬氏生子曰董戩埒克遵死李氏寵衰斥為尼置廓州錮其二子轄戩及默戩覺結母黨李巴沁竊載其母出奔轄戩據河州默戩覺據邈川城撫有其衆斯賚不能制元昊聞斯賚二子怨其父因以重賂間之且隂誘諸酋豪而溫布且之子伊實濟嚕者擁衆萬餘隂附元昊斯賚勢蹙更與喬氏自總噶爾西徙哩沁城元昊益得自肆矣兩朝本傳云轄戩居康古默戩覺居總噶爾城據此則河州當是康古也總噶爾城當是邈川城也後有遷徙更須考詳諸聚米圖經謂元昊既屠氂牛城築凡川會誘脅嘉勒氏部酋豪斯賚因二子猜阻徙居哩沁城元昊無吐蕃之患始再舉兵攻回紇陷瓜沙肅三州與實録附傳先後不同今從附傳但取誘脅酋豪氏增入之兵元符隴右爾日録又云元昊既得賂間斯賚二子遂舉數犯總噶及破氂牛城斯賚勢折西徙青唐不知元昊破氂牛前此矣聚米圖經以為明道中亦太早當依元昊傳實景祐二年事今又築凡川會以絶西蕃通中國路斯賚更徙居青唐其理勢當然也今但取二子怨父及元昊行間事增入從哩沁城在總噶爾西聚米圖經云南徙哩沁城誤也今隴右日録哩沁城去渭川西約十五程日録云斯賚勢折西徙青唐城或哩沁即青唐也當考隴右録云轄戩據河州聚米經云轄戩在鞏心城按鞏心城與河州地圖各别未知孰是當考本傳云明道元年自邈川徙青唐與隴右日録不同當考篆文官王文盛言于少府監曰在京糧料院印多偽效之以摹劵厯者謂宜鑄三面印圓其制而面濶二寸五分於外圍周匝篆紀年及糧料院名凡十二字以圍篆十二辰凡十二字中央篆正字上連印鈕令可轉旋以機穴定之用時月分對年中互建十二月自寅至丑終始循環每改元即更鑄之云若此使姦人無復措其巧矣少府監以奏詔三司詳定請如文盛言文盛又曰舊例親王中書印各方二寸一分樞密宣徽三司尚書省開封府方二寸節度使寸九分節度觀察留後觀察使寸八分半防禦團練使轉運使州縣印寸八分凡印各上下寸七分皆濶寸六分雖各有差降而無令式以紀其數詔從其言著於令據本志在景祐三年今附年末
