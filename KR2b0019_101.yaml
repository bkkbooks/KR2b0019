body:
  text: 續資治通鑑長編巻九十七宋李燾撰眞宗天禧五年春正月丁丑朔御延慶殿見輔臣丁謂進曰伏承聖躬已遂康復臣等不勝大慶然中外無事望寛宵旰之憂上欣納之辛巳宴尚書省五品諸軍都虞候已上契丹使于錫慶院先是每歲正旦宴崇徳殿時上始痊復重於煩頓故改就别館焉壬午對輔臣於承明殿上憑几中貴人掖以升坐因言契丹益敦信好出所獻雙龍金帶示之癸未宰臣言考較京師幕職州縣官内有合該遷秩及定差遣恩例伏縁多值假故欲具舊例擬定進内從之乙酉司封員外郎章得象直史館祕書丞程琳直集賢院前詔兩制舉詞學清素之士翰林學士劉筠龍圗閣直學士吕夷簡知制誥張師德等以得象等名聞故召試而命焉得象浦城人琳博野人也得象本傳云楊億薦之召試為直史館按實録薦者乃無億名傳又云億以愽知得象皆當考己丑謁啟聖院太宗神御殿上自新歲不豫至是都人曕望輿輦鼓舞相慶詔自今每大祀中書攝事賜錢五萬為酒肴之費癸巳以上疾稍平德音降天下死囚十惡至死官典犯入已贓刼盜放火偽造符印論如律四年秋稅殘欠並除之權罷滑州修河京東路水災乙未命直史館章得象閤門祇候張士安乘傳安撫丁酉樞密直學士右諫議大夫張士遜為樞密副使依前兼太子詹事翰林學士劉筠見上乆疾丁謂浸擅權歎曰姦人用事安可一日居此表求外任乃授右諫議大夫知盧州舊制學士罷職多為侍讀學士或龍圗閣學士筠但除諫議大夫謂沮之也宰相擬他官為學士上曰皆不如李諮遂以命諮此據馮㓗已御史臺記廢鄆州東平監已亥宴近臣於承明殿以天章閣興功也癸卯上作御集聖政紀二序示輔臣本紀不書當考養象所言舊管象四十六今止三頭望下交州取以足數詔知廣州叚曄規度有則進之不須宣索詔新城外置九廂二月丁未召輔臣觀書龍圗閣給事中知河陽孫奭再表求停官養父上嘉納之庚戌命知兖州奭父時居鄆州兖鄆相邇故也壬子賜新除翰林學士李諮金紫上因問宰相曰近臣中有未改章服者否丁謂曰知制誥張師德祖士衡錢易知雜御史劉曄今並衣緋即命内侍召士衡易曄賜以金紫師德時知潁州令就賜之詔内外京朝官嘗經考課不改官自後無私罪者俟及四年並與遷轉甲寅知審刑院宋綬言得詳議官尚霖等状諸州刑奏並斷畢無留牘詔奨綬等仍賜緡錢宣付史館羣臣上表稱賀其後奏斷絶賜緡錢付史館如例而不常表賀上聞樞密曹利用所居西連營舍甚廹隘命入内副都知鄧守恩按視隙地并詔先借宅園並賜之丙辰以蘂珠瓊玉殿上梁宴近臣於承明殿壬戌以光禄寺丞謝絳為祕閣校理大理寺丞王質大理評事石居簡李丕諒奉禮郎李昭遘並充館閣校勘初兩制列狀薦絳等四人丕諒即三司使士衡之子士衡上言願預校讎之職遂命諫議大夫李行簡知制誥宋綬試之而有是命居簡中立子昭遘宗諤子也甲子賜故太尉王旦墳側僧院名曰覺林近墳田租悉除之丙寅雨丁謂等稱賀上甚恱謂因請賜酺與人共樂詔從之在京五日兩京三日諸州一日知雜御史劉曄上言伏以三年之喪天下之經制百行之孝人子之大倫茍執禮以無聞在服行而有缺伏見内外京朝官丁父母憂者不即時奔喪持服傷壊風教典章無取欲望禁止自今官司不得妄有占留奏求追出其例當起復者即依舊制詔益梓䕫利四路長吏依舊奏裁餘官丁憂輙有封奏求免持服者並論其罪祠部貟外郎任中行言送伴契丹使至瀛州見路隅有暴露骸骨望官為設奠埋瘞從之戊辰徙客省使髙州團練使知鎮州李允則知潞州永州團練使知潞州錢惟濟知鎮州江南西路提㸃刑獄勸農使言知撫州王彬有政跡詔奨之撫民李甲饒英冨於財武斷鄊曲州縣莫能制㑹甲從子詈縣令又人告甲語斥乘輿彬按治之索其家獲所藏兵械又得服器有龍鳳飾甲棄市并按英嘗強取人孥配𨽻嶺南州里肅清尋擢彬提㸃荆湖南路刑獄彬固始人也淳化中為雍邱尉皇城司隂遣人下畿縣刺事多動民令佐至與為賔主彬至捕鞫之悉得所賂致之法自是詔親事官無得出都城禁親事卒出都城不得其年月今附此彬初及第巳見録故鳳州團練使張暉孫永德為三班借職賜束帛緡錢永徳祖母彭城縣君劉氏一百五歲後唐清泰中封邑告身具在永德自言貧無以養故録之庚午以光禄寺丞孔聖佑襲文宣公知仙源縣事癸酉幸天章閣觀上梁宴從臣賜物有差甲戌即命陳堯咨知秦州加右諫議大夫劉丞宗為鈐轄遷西上閣門使三月辛巳御正陽門觀酺初磁州民張熈載詐稱黄河都部署籍並河州郡芻糧數至貝州知州内園使雷孝先覺其姦捕繫獄然孝先狡獪反欲因此為竒功以動朝廷廹司理參軍紀瑛教熈載偽為契丹諜者號景州刺史兼侍中司空太靈宫使部送京師樞密院按得孝先所教狀丙戍責孝先為潭州都監熈載决配海州瑛未得與官戊戌天章閣成羣臣稱賀稱賀在庚子今并書之命供奉官閤門祇候張嵒率歩騎五百五十人往蔡州捕賊陳堯咨等言涇原環慶等州蕃部族帳並各安居庚子宰臣丁謂請自今兼太子師傅十日一赴資善堂賔客已下隻日更互陪侍講學上可之是日奉安御集御書于天章閣遂宴輔臣閣下辛丑詔京畿經雨水及京東西河決壊民田者今年夏秋稅並免十之五時章得象等使還言去秋水潦種麥不廣若檢括之益為擾人望特減其稅故有是命得象等又言鄆濮州遭水户闕食望給貸之其先請食鹽望令止納見錢徐濟州最當水衝知州王貽貞劉慶悉心防城望降詔奬飭並從之壬寅輔臣以天章閣成並進秩丁謂為司空馮拯為左僕射曹利用為右僕射任中正為工部尚書錢惟演為右丞王曾為吏部侍郎張士遜為給事中初利用止加階邑謂等請與同遷命已下乃帖麻宣授范鎮東齋記事云曹利用先賜進士出身而後除僕射乃知進士之為貴也如此不知鎮何所據附傳正傳俱無之當考皇城使康州團練使入内都知張景宗為昭宣使領嘉州防禦使都大管勾龍圗天章閣公事夏四月丁未以内殿崇班雷允恭為皇太子宫都監同管勾資善堂左右春坊司事吏部侍郎李士衡加正奉大夫以營建天章閣供億之勞也先是北界蕃族隆和等來刼熟户環慶部署田敏等率兵與戰斬首數十級乘勝逐之俘獲甚衆都部署曹瑋以聞庚戍詔賜敏等器帛又賜將士緡錢遞遷之敏傳云敗隆和於三店川壬子詔奬知慶州崇儀副使張舜臣舜臣密遣蕃部巡檢李繼義部兵殺北界蕃賊舒蘇瑪勒兄索斡等十餘人故也舜臣或作禹臣禹臣未見李繼義亦未見甲寅麟府路言曲定府都虞候羅阿率衆敗蕃賊詔補本族軍主丙辰客星出軒轅丁巳事材場火軍士楊勝等三人杖脊黥面配沙門島當宿監官内殿承制石惟清削兩任贖銅二十斤勒停不當宿監官内殿崇班閤門祇候王承僅供奉官閤門祇候張惟一並削一任勒停自餘主典軍校皆決杖降職有差勝等洎惟清當處死特貸焉張惟一旻子戊午皇太子生辰宴宫僚輔臣于資善堂壬戌召近臣館閣三司京府官詣天章閣觀御書御集遂宴羣玉殿知秦州陳堯咨言慶州監押係奉職而所屯軍廂主忠佐都虞候並係統攝事體非便詔三班院自今差陜西縁邉州軍監押須擇曾經邉防任使少壯有武勇殿直以上使臣充五月乙亥朔上御崇政殿親録京城繫囚死罪已下並減一等遂詔諸路州軍亦如之惟十惡及官典犯贓偽造符印放火刼盜不赦丁丑詔禮部權停今年貢舉戊寅判河南府王欽若言澠池縣民為盜亡走禁其妻晝則令衆幾三百日廹於飢寒臣已令本縣踈放知在望告示諸路有禁留令衆一季不獲正賊者責保知在或朝廷憫其淹延止責地方廵檢縣尉耆保依限緝捕從之癸未詔皇太子讀春秋輔臣奏曰臣等時入資善堂陪侍講席太子天姿英邁好學不倦親冩大小字示臣等天然有筆法上喜曰頼卿等輔導也輔臣皆再拜乙酉同判流内銓劉曄言幕職州縣官被舉而不改京官者多不赴銓注擬别求舉主重上薦章欲望自今比類請假即依資序注官從之丙戌以大理寺丞通判澧州劉象中為内殿承制知辰州象中嗣其父仁霸領溪洞事蠻人畏服故因任之丁亥滑州言開減水河功畢河流漸復北岸命右諫議大夫李行簡致祭丁酉劔州言梓潼等縣俱當驛路請各增置主簿一員從之己亥詔增寜化軍公用錢十萬先是河北入中芻糧諸州有多增其價者三司請令月上在市實價送入内内侍省出付三司約所定價視其虧官之甚者而裁損之時陜西交引益賤京師才直五千有司惜其費茶於是出内藏錢五十萬貫令閤門祇候李德明於京城市而毁之此據本志定入中價志以為四年事而不得其月因附此辛丑令國子監重刻經書印板以本監言其歲乆刓弊故也三司使李士衡為其子奉禮郎丕旦求掌國學事上不許因詔自今國子監止差官兩貟主判既而卒命丕旦同管勾國子監差丕旦同管勾在七月丁酉今并書是月趙德明落起復遣入内都知藍繼宗為官告使徃賜之德明與繼宗射繼宗每發必中德明遺以所乘名馬六月乙巳朔别給登州錢十萬充髙麗朝貢使之費丙午太白晝見己酉詔自今外州監當朝官殿直以上在通判都監之下判官之上其通判與都監並依官次京官奉職借職監當者依知令録在判官之下先是李諮知荆南上言令禮官詳定頒下辛亥以霖雨分遣官祈天地社稷宫廟寺觀神祠京西提㸃刑獄司言河南府獄空詔奬判府事王欽若癸丑詔環州三店香溝大峴城等新寨以定邊歸逺為名詔廣南路民訟命官不公者須本官在任及得替未發事實干已及條詔許訴者乃得受理如已離任在路除犯贓及私罪徒以上即委轉運提刑司體量證佐明白非誣陷者乃得追攝自餘咸飛驛以聞時侍御史燕肅言嶺南最處遐逺攝官校吏多務阿私命官輩順之以情則息姦糾之以法則聚怨其無良者或遭刑責或違請求伺其得替將到闕庭因犯微釁興起訟詞官司不詳事理大小即行追對徃來萬里煙瘴之鄉或懼迢遞便即款伏以此負譴亦可憫傷又有懼致此患務於因循者望行條約故有是詔肅益都人也嘗知臨卭縣民苦吏追擾肅削木為牘民訟有連逮者書其姓名使自召之皆如期而至己未國子監請以御製至聖文宣王贊及近臣所撰十哲七十二賢贊鏤板詔可辛酉出内御衣二十八萬事計其直百五十萬貫令京師寺觀設齋誦經提㸃庫務司請别置内香藥庫於東華門以便宣索從之癸亥詔奬知滑州陳堯佐堯佐浚舊河分水勢䕶州城有勞也乙丑賜玉清昭應宫上座慕眞大師賜紫道士劉去奢號曰和靖先生許歸住荆南紫極觀去奢博達教典有道行上之莭度荆南也以本府道正得謁見宫邸深被禮接玉清昭應宫成召令居之至是年七十餘其母年九十求歸侍奉故旌以佳號仍令就本觀時設齋醮官給所費宰執而下咸賦詩錢行秋七月甲戌朔日有食之先是司天測儀天歴當食之既前九日上避正殿分命中使詣宫觀寺院及坊市設道場祈禱是日食四分而止司天言按唐貞元八年十一月朔歴筭官徐承嗣言當食八分測之及三分宣示朝堂編入史册斯蓋聖徳廣大陽盛隂潜之慶翌日宰臣率百官詣閣門拜表稱賀丙子謁玉清昭應宫戊寅新作景靈宫萬歲殿為上本命祈福也戸部副使吏部員外郎薛奎與三司使李士衡爭事以戸部郎中直昭文館知延州先是趙德明每遣吏至京師請俸予因市禁物隱關算為姦利奎請留蜀道縑帛於關中轉致給之遂絶其弊奎傳以為趙元昊則不當在此時恐傳誤也更詳考之参知政事王曾自言㓜孤育於季父故太子中舍致仕宗元及世母嚴氏及是改𦵏請追贈官封詔從之令京畿蠶鹽縁科並上納見錢以雨水害稼故也庚辰涇原路駐泊都監王懐信言鎮戎軍界浚濠築堡寨功畢詔賜將士緡錢有差壬辰給宰臣樞密使雜役軍士三十人參知政事樞密使副二十人皆以雄武兵充着為常例若指抽外州兵亦聽詔知天雄軍給事中李應機如聞臨事太峻或失公共自今冝務酌中勿為嚴刻應機遷給事中知天雄軍府在四年八月庚寅乙未判河南府王欽若言其子衛尉寺丞勾當國子監從益改官十一年望特遷秩隨行詔授太子右贊善大夫欽若正傳欽若子從益終贊善大夫追賜進士及第後無子以叔之子為後在實録賜欽若亡子衛尉寺丞益及第在祥符六年三月獨無從字天禧四年五月又賜衛尉寺丞王從益緋五年七月遷右贊善大夫恐正傳誤以益為從益而從益乃叔之子為後者也丙申福建轉運使言建州龍焙監通德銅場興發須錢市銅望置便錢務聽民納錢於浙江請領從之戊戌詔廣南都知兵馬使除廣邕桂州每三年無過即試騐送闕下自餘滿日件析奏裁審官院言京朝官本貫在荆湖江浙者望比類福建淮南人許任本路官從之八月甲辰朔屯田員外郎知汾州李歆坐部内為僧歛錢修寺遣伶人於官倉主納法當奪三官三任㑹徳音原免詔特削一任勒停李歆未見丙午以宰臣丁謂子光禄寺丞館閣校勘珙為太子中允賜緋馮拯子内殿承制端已為六宅副使樞密使曹利用子供奉官閤門祇候淵為内殿承制参知政事任中正從子彭為侍禁王曾子奉禮郎綱為大理評事樞密副使錢惟演子光禄寺丞館閣校勘曖為祕書郎張士遜子將作監主簿友直為奉禮郎此必有故當考戊申樞密院定皇親諸宅置船長公主二郡縣主一聽於諸河市物免其差撥自餘不得為例庚戌徙環慶都部署宣徽南院使鎮國軍留後曹瑋為鎮定都部署本傳闕此令取實録追書為明年責萊州牧兵張本壬子詔先減省諸州縣官送還公人令並依舊時有州縣官任西蜀路乏騶從經渉艱難題詩驛舍詠其事承受使臣録以奏故有是命元年八月一日减省甲寅洺州團練使駙馬都尉王貽貞言諸州捕盗限外不獲其三大户弓手典吏並行决罰伏縁典吏止行遣文書與弓手三大户情或不等望自今三限不獲從杖八十區斷詔可戊午吏部流内銓言見闕判司簿尉六百四十三貟其該癸巳德音至今年十二月終得替放罷合入判司簿尉人望並令赴南曹投狀從之庚申審官院言前準詔㫖新授京朝官川峽未有見闕者止令權近地監當今監當闕少望差近便知縣俟川峽有見闕即依次移補從之辛酉馬軍都虞候武勝軍留後劉美卒贈太尉昭德軍節度使官給𦵏事録其子殿中丞從徳為供備庫使供奉官從廣為内殿崇班旁親遷補者數人又封美亡妻宋氏廣平縣君為河内郡夫人丙寅樞密直學士給事中知并州馬元方丁内艱起復給假半月徃潞州奔喪以其任邊寄故不俟卒哭而奪情焉環慶部署田敏言剏修縁邊七城寨畢詔奬敏等賜都監部役使臣緡帛庚午賜近臣御集并賜天下名山寺觀九月丙子置永康軍駐泊都監一貟戊寅涇原駐泊都監王懐信言總噶爾嘉勒斯賚遣蕃部來請和詔懐信答諭之懐信又言鎮戎軍去原環州約三百里請置廵檢一貟詔可甲申命翰林學士李諮為契丹國主生辰使内殿崇班閤門祇候王仲寳副之太常博士蘇耆為正旦使侍禁閤門祇候周鼎副之耆尋遭母䘮不行改命兵部貟外郎蘇維甫仲寳髙宻人周鼎未見先是宋綬等使還上契丹風俗云綬等始至木葉山山在中京東微北自中京東過小河昌吉山道北奚王避暑莊有亭䑓由古北口至中京北皆奚境奚本與契丹等後為契丹所併所在分奚契丹漢人渤海雜處之奚有六莭度都省統領言語風俗與契丹不同善耕種歩射入山采獵其行如飛凡六十里至羖䍽河館過惠州城二重至低小外城無人居内城有瓦屋倉廪人多漢服七十里至榆林館前有小河屈曲北流自此入山少人居七十里至努圖克烏蘇館蕃語山為努圗克水為烏蘇七十里至香山子館前倚土山依小河其東北三十里即長泊也渉沙磧過白馬淀九十里至水泊館度土河亦云冲冲水聚沙成墩少人煙多林木其河邊平處國主曾於此過冬凡八十里至張司空館七十里至木葉館離中京皆無館舍但宿穹帳欲至木葉三十里許始有居人瓦屋及僧舍又歴荆榛荒草復渡土河至木葉山本按巴堅𦵏處又云祭天之地東向設氊屋署曰省方殿無階以氊藉地後有二大帳次北又設氊屋曰慶壽殿去山尚逺國主帳在氊屋西北望之不見嘗出三豹甚馴馬上附人而坐獵則以捕獸蕃俗喜罩魚設氊廬於河水之上密掩其門鑿木為竅舉照之魚盡來湊即垂釣竿罕有失者廽至張司空館聞國主在土河上罩魚以魚來饋是歲隆慶卒隆慶初封常王及請盟改梁王後封秦國王及加秦晉國王隆裕有子宗業封廣平王為中京留守改樂州幽都縣為宛平縣其衣服之制國母與蕃官國服國主與漢官即漢服蕃官戴氊冠上以金華為飾或加珠玊翠毛蓋漢魏時遼人歩揺冠之遺象也額後垂金花織成夾帯中貯髪一緫服紫窄袍加義襴繋䩞鞢帯以黄紅色絛裏帯為之用金玊水晶碧石綴飾又有紗冠制如烏紗㡌無簷不擫雙耳額前綴金花上結紫帯帯末綴珠或紫皁幅巾紫窄袍束帯丈夫或緑中單緑花窄袍中單多紅緑色貴者被貂裘貂以紫黒色為貴青色為次又有銀䑕尤㓗白賤者被貂毛羊䑕沙狐裘弓以皮為弦箭削樺為簳韀勒輕簡便於馳走以貂䑕或鵝項鴨頭為扞腰蕃官有伊勒希巴參聞國政左右林牙掌命令特哩衮若司宗之類又有九行宫每宫署使及部署掌領部族有永興積慶洪義昭敏等名丙戌宰相丁謂等上箋注釋敎御集三十巻詔賜謂及翰林學士晏殊管勾使臣器幣有差羣僧賜方袍者十四人加師號者十人度童行七人甲午權知髙麗國王事王詢遣告奏使御事禮部侍郎韓祚等百七十人來謝恩且言與契丹修好又表求隂陽地理書聖惠方並賜之丙申權知開封府吕夷簡言獄空詔奬之庚子以前知臨海縣事錢仙芝充館閣校勘從其季父惟演之請也冬十月癸卯朔詔蠲開封府京東西淮南兩浙水災州軍民租戊申祥源觀成緫為屋六百一十三區都大管勾觀事樞密副使錢惟演加工部尚書惟演詣承明殿納告敕上不許復令中使就第賜之昭宣使嘉州防禦使入内都知管勾祥源觀事張景宗為宣政使内殿崇班皇太子宫都監雷允恭内殿崇班皇太子宫祇候劉從愿並為内殿承制入内都頭供奉官史崇信為内殿崇班並以祥源觀功畢賞勞也仍以從愿崇信同管勾觀事初允恭從愿嘗發周懐政天書妖妄事並擢内殿崇班仍𨽻入内内侍省及是當出就班列允恭欲專權利乃紿從愿同受告牒即密請回新命褒封其世母遂獨得仍舊入禁中傳宣取庫物皆不待文據即給付之從愿承珪子也允恭先為太子宫都監後乃加承制仁宗實録附傳叙其事則以後為先今不取實録云允恭自是作邪慝矣按允恭邪慝非自是始今削去詔奬淮南江浙荆湖發運使周實以其自春至冬運上供米凡六百餘萬石故也審刑院詳議官國子博士尚霖言奉詔徃陜西規畫入中芻糧其入中比遞年一倍已上者請許監官書歴為課從之知應天府張知白言通判秘書丞任中師臨事明幹究民利病有詔褒奬中師中正弟也壬子輔臣以上違豫浸乆上表引漢宣帝唐髙宗故事請五日一御便殿及朔望坐朝春秋大宴及賜羣臣㑹並止就錫慶院如有軍國大事即非時召中書樞密院参决其隻日資善堂議事及雙日中書樞密院早入並如舊又請自今慶節上壽皇太子押文武班悉從之左領軍衛大將軍石普妻表求授小郡上不許乙卯詔給普月俸實錢仍與添支發運使周實言陜西入中芻糧甚少淮南茶貨停積望令三司再定商旅筭買交引以便公私從之實又言監當場務官得替須批書一界課利増損畢方聽發遣赴闕從之十一月丁丑以司空兼門下侍郎太子少師平章事丁謂為譯經使兼潤文時譯經三藏法䕶等請依唐制命宰臣充使故也甲申山南東道節度使同平章事判河南府王欽若有疾詔遣中使將太醫診視先是欽若累表請就醫京師未報丁謂密使人紿欽若曰上數語及君甚思一見君第上表徑來上必不訝也欽若信之即令其子右贊善大夫從益移文河南府輿疾而歸謂因言欽若擅去官守無人臣禮命御史中丞薛映就第按問欽若惶恐伏罪戊子責授司農卿分司南京奪從益一官轉運使及河南府官皆被罪仍頒諭天下乙未詔自今羣臣受命免赴告謝詔僧尼道士女冠文武七品以上者有罪許減贖當還俗者自從本法丁酉契丹遣左監門衛上將軍蕭善副使給事中程翥來賀承天節十二月乙巳以内殿崇班皇甫繼眀同勾當三館秘閣公事咸平中初命劉崇超監三館秘閣圗籍其後因循與判館聫署掌事時論非之崇超素與王欽若厚善丁謂為相惡之别用繼眀以分其權更號監圗籍曰勾當公事自是内臣遂與大學士同職時論愈非之祥符八年十二月劉崇超始聫署掌事丙辰以愆雪遣官分禱宫廟寺觀壬戌徙知應天府翰林侍讀學士兵部侍郎張知白知亳州初知白在中書與王欽若不協於是欽若分司南京丁謂欲知白修怨也已而知白待欽若加厚謂怒故徙之實録云從知白之請恐誤也本傳云欽若分司南京丁謂素惡欽若因自天雄徙知白于應天使得報怨知白不從其意又徙亳州按知白徙應天實與王曽兩易乃三年九月辛未此時欽若猶在杭州傳亦悞也其又徙亳州則本傳得之今稍加刪潤使不相抵牾癸亥上作歌賜皇太子奬其書翰日進也戊子契丹遣使保安莭度使蕭堯衮副使利州觀察使韓紹昇來賀眀年正旦是歲契丹改年曰太平開泰盡九年天下户八百六十七萬七千六百七十七口一千三百九十三萬三百二十所收租稅比至道末榖増一百七萬五千餘石錢増二百七十萬八千餘貫絹減萬餘匹絁紬減九萬二千餘匹布増五十萬六千餘匹絲線減五萬五千餘兩綿減一百一十七萬五千餘兩茶増一百一十七萬八千餘斤芻茭減一千一百萬五千餘圍蒿減一百萬餘圍炭減五十萬四千餘秤鵝翎雜翎増十二萬九千餘莖箭幹増四十七萬隻黄蠟増五萬餘斤又䪌八十一萬六千餘量麻皮三十九萬七千餘斤鹽五十七萬七千餘石紙十二萬三十餘幅蘆䕠三十六萬餘張大率名物約此其折變及移輸比壌者視當時所須焉至道末上供錢一百六十九萬二千餘貫金一萬四千八百兩銀三十七萬六千兩絲七十萬五千兩綿四百九十七萬兩紬三十七萬九千匹絹一百七十萬八千匹絁五萬二千匹布一百一十萬六千匹又𣙜利所獲緫一千一百二十三萬三千餘貫國家率三歲一親郊祀共計緡錢常百五十餘萬貫大半以金銀綾綺絁絹平其直而給之大凡邦國内外舉一歲之費錢一千六百九十三萬餘貫金一萬四千八百七十兩銀六十二萬餘兩絹三百三十三萬三千餘匹紬九十萬三千餘匹絁五萬九千餘匹綿七百四十五萬兩絲線一百六十四萬兩布二百六萬三千餘端粟二千一百九十四萬石芻二千二百萬六十圍舉一歲京城給文武官三班使臣及諸司人等奉錢四萬五千八百餘貫給以他物者九萬一千四百餘貫禄粟五萬一千餘石糧五十四萬二千餘石騎軍一歲給錢六十八萬餘貫都虞候已上禄粟一萬四千餘石糧一百一十八萬餘石歩軍一歲給錢七十一萬餘貫禄粟七千八百餘石糧一百八十二萬九千餘石大抵若此而亦有盈縮焉天禧末上供惟錢帛増多餘以移用頗減舊數而天下緫獲錢二千六百五十三萬餘貫金萬四千四百餘兩銀八十八萬三千九百餘兩絲四百一十七萬二十餘兩綿一千八百九十九萬一千餘兩絹一百五十五萬二千餘匹紬九百四十一萬五千餘匹綾三十四萬四千餘匹絁一十三萬七千餘匹紗縠二萬五千餘匹綿綺二萬八千餘匹布三百五萬七千餘匹茶七十六萬餘斤鹽一十六萬三千八百餘石香藥真珠犀象七十餘萬斤條片顆竹木䕠箔三百六十餘萬條片五榖二千九百八十三萬餘石草三千萬餘圍木炭薪蒿三千餘萬斤束緫費錢二千七百一十四萬餘貫金一萬三千五百餘兩銀五千八萬餘兩絲三百六十三萬二千餘兩綿一千六百五十萬餘兩紬七十六萬四千餘匹絹四千一百七十三萬七千餘匹綾十萬七千餘匹絁五萬二千餘匹羅二萬七千餘匹紗縠一萬一千餘匹綿綺六千七百餘匹布一百二十九萬七千餘匹茶三十六萬六千餘斤鹽十一萬八千餘石香藥真珠犀象五十二萬三千餘斤條片顆竹木䕠箔一百二十三萬二千餘條片五榖三千四百五十八萬二千餘石草三千四百五十八萬三千餘圍木炭薪蒿四百五十萬餘斤束景徳郊祀七百餘萬東封八百三十餘萬祀汾隂上寳冊又増二十萬丁謂為三司使嘗著景德㑹計録以獻林特領使亦繼為之凡舉大禮有司皆籍當時所費以聞必有優詔奬焉鹽有二類引池而化者周官所謂盬鹽也今謂之顆鹽或煑海或煑井或煑鹻而成者周官所謂散鹽也今謂之未鹽引池為鹽曰陜西解州解安邑兩池墾地為畦引池沃之水耗鹽成籍州及旁州民給役謂之畦戸緫三百八十戸復其家戸歲出夫二謂之畦夫歲給戸錢四萬日給夫米二升歲二月墾畦四月引池為鹽八月而止募兵百人目為䕶寳都以廵邏之煑海為鹽曰京東河北淮南兩浙福建廣南凡六路其煑鹽之地曰亭場民曰亭戸或謂之竈户户有鹽丁歲課入官受錢或折租賦兩浙又役軍士煑焉在京東曰密州登州三朝志但載密州濤洛場歲煑三萬二千餘石兩朝志又増登州今從兩朝志而並不書鹽數蓋兩志數亦不同也河北曰滄州濵州三朝志亦無滄州淮南曰通泰楚海州漣水軍兩浙曰杭秀温台明五州福建曰福漳泉三州興化軍三朝志無漳泉興化廣南曰廣潮惠廉化瓊崖儋萬安九州三朝志潮州廢於雍熈四年兩朝志仍有之兩朝志有化州三朝志無之三朝志又有髙竇春雷融五州兩朝志乃無之煑井則川峽西路大為監小為井監則置官井則募土民或役衙前主之益州路則陵綿卭眉簡嘉雅漢八州兩朝志無漢州今從三朝志梓州路則梓資遂合戎榮果普昌渠瀘十一州冨順監三朝志無合戎榮渠四州疑本或脱略也利州路則閬州䕫州路則䕫忠逹萬黔開渝七州雲安軍大寜監三朝志無渝州煑鹻則河東并州之永利監凡顆鹽末鹽皆以五斤為㪷顆鹽賣價每斤自四十四至三十四錢有三等末鹽賣價每斤自四十七至八錢有三十一等至道末賣顆鹽錢七十二萬八千餘貫末鹽一百六十三萬餘貫云錢幣之制有銅鐡二等凡鑄銅錢有四監饒州曰永平池州曰永豐江州曰廣寜建州曰豐國每千錢用銅三斤十四兩鈆一斤八兩錫八兩成重一斤惟建州増銅五兩減鈆如其數至道中歲鑄八十萬貫景徳末至一百八十三萬貫大中祥符後銅坑多不發天禧末鑄一百五萬貫鑄鐡錢有三監卭州曰惠民嘉州曰豐逺興州曰濟衆益州雅州舊有監後廢之大錢貫重十二斤十兩以凖銅錢歲鑄緫二十一萬餘貫銅錢行於天下鐡錢止於川峽凡産金有商饒歙撫四州南安軍兩朝志有登萊商饒汀五州却無歙撫南安産銀有桂陽開寳龍焙三監五十一場在饒䖍信建昌越衢處道福漳河南劔邵武南安廣韶連英南恩春秦興元等州軍府兩朝志無處道廣南恩興元五州府却増陜虢商隴并衡泉七州産銅有三十五場在饒處建英信南安汀漳邵武南劒等州軍又一務曰梓州之銅來兩朝志増䖍泉韶三州却無處州南安軍産鐡有四監曰徐州之大通利國兖州之萊蕪相州之利成萊蕪廢於大中祥符七年又河南鳳翔虢同儀蘄黄袁英州興國軍有十二冶晉磁鳳澧道渠合梅陜耀坊䖍吉汀州有二十務信鄂建連南劔邵武等州軍有二十五場兩朝志無河南同黄晉道梅耀坊鄂九州府却增登萊泉資四州産錫有九場在河南之長水及䖍南康道賀潮循等州軍兩朝志増商虢二州却無長水及南康軍産鈆有三十六場在衢越建南安英春韶汀漳南劔邵武等州軍兩朝志無建州南安軍漳州却増信州連州水銀四場在秦階商鳳州兩朝志云五場朱砂二場在商冝州三朝志云三場其稱冨順監者誤今從兩朝志至道末天下歲課金若干兩此數當求别本三朝史志偶脱銀十四萬五千餘兩銅四百一十二萬餘斤鐡五百七十四萬八千餘斤鈆七十九萬三千餘斤錫二十六萬九千餘斤天禧末金一萬兩銀八十八萬二千餘兩銅二百六十七萬五千餘斤鐡六百二十九萬三千餘斤鈆四十四萬七千餘斤錫一十九萬一千餘斤水銀二千餘斤朱砂五千餘斤然金銀除坑冶丁稅和市外課利折納互市所得皆在焉至道中兩京諸州収𣙜酒歲課銅錢一百二十一萬四千餘貫鐡錢一百五十六萬五千餘貫京城賣麴錢四十八萬貫天禧末榷課銅錢七百七十九萬六千餘貫鐡錢増一百三十五萬四千餘貫賣麴錢増三十九萬一千貫關市津渡等稅至道中獲錢四百萬貫天禧末増八百四萬貫
