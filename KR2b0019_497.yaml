body:
  text: 續資治通鑑長編卷四百九十三宋李燾撰哲宗紹聖四年十一月辛亥朔權殿中侍御史蔡蹈言朝廷近用知開封府路昌衡薦除朝散郎盧約為推官按約前知昭州日輒請以昌衡出帥廣東所遷兩官易近上職名原其用心專在邪諂而昌衡一無嫌忌復有薦論望罷約恩命責昌衡論薦徇私詔罷約新除令昌衡别舉官以聞又詔自今開封府薦推判官並俟召對取旨盧約除府推在前月二十六日癸丑左司諫郭知章兼權給事中給事中徐鐸言沈銖除中書舍人兼侍講按銖在先帝時任太學直講受學生饋遺坐贓罪勒停元祐間為劉摯黨摯除落罪名乞追寢成命又言司馬光先朝非不奬擢但不曽秉政然終懷怨恚變法亂政陛下能保其不若光乎詔郭知章書讀行下曽布言鐸初聞銖有此命即相慶已而忽封還蓋為人所使而駮章重亦疑非鐸所能為鐸近臣知畏大臣而不知畏陛下况出自中批而又天下公論之所與士類聞銖之進莫不鼓舞而鐸敢爾附會欺罔此乃所謂附下罔上法之所必誅也此而不懲則陛下威福之柄何以振乎林希亦言陛下所除自非有大邪惡不合物論未嘗繳駮上曰已令郭知章權給事書讀布曰如此則鐸已幸免矣布又言給事止以鐸一人當之誠未允鐸乃李清臣所薦清臣所引之人無不斥逐惟鐸安職而又躐等進擢蓋媚附三省所以致此臣與鐸非有利害但忠憤所激故喋喋不能自已願陛下更賜省察上稱善布與希因言陳瓘等皆公論所稱此類皆所當進又言銖自敕榜事後深不自安小人亦皆欲去之然善類謂當體聖意不當輕去就今日陛下擢用如此則銖之不去乃為得之敕榜事自是不當銖論居厚何必如此紛爭上曰只為銖猶説沙鍋子等事乃無之布曰此事恐不可謂無乃衆人所共聞見臣自江西還朝見居厚賣鐡器榜道中比比有之此事恐不虛也布又云敕榜中有幸時事中變之語邢恕亦以為非緣此語故引惹劉唐老等謗詘陛下在上朝廷清明時事安得中變此非詔令語也希亦曰如紹聖之變元祐乃為變安得有此上又曰只恐元祐人復用布曰陛下在上則元祐之人安有復用之理時御史中丞邢恕侍讀經筵上問恕曰徐鐸繳還沈銖詞頭何如恕言此蓋緣沈銖繳吳居厚詞頭今既出榜朝堂以元豐末居厚在京東事為是則自然以沈銖為非也然此乃臣下分朋黨爭勝負爾陛下為人君父天覆平施則天下幸甚上又問如何恕言臣請平論此事昨除吳居厚權户部尚書職事既居尚書雖侍郎居厚亦必難處前此居厚廢已十年今若再廢亦似過當所以臣言不消繳還至於後來出榜朝堂却以居厚元豐間京東所為為是則章惇當垂簾之初自曽有劄子斥言居厚京東之人恨不食其肉曽經葉濤進陛下所知則今日焉得却以為是天下之人豈可如此蓋壓也上曰卿言極是已而沈銖除命復下詔雄州勘造匿名文書不當經赦當原知州李諒通判吳點各特罰金二十斤權推官張棠歸信容城兩縣主簿王範各特罰金三十斤甲寅大理寺言竊盜於皇城門謂宣德左右掖東西華拱宸門宫門內謂左右升龍承天門左右長慶門謻門臨華門通極門學士院北角門殿前關東子以北加京城內竊盜法一等徒罪配鄰州流罪皆配千里十貫皆配二千里殿門謂大慶文德紫宸集英崇政垂拱內東門上閣門內謂垂拱殿後門需雲殿後門龍圖天章寶文閣後門皇儀殿門延春閣門延和殿後門會通門又加一等徒罪皆配千里流罪皆三千里十貫皆配廣南仍並奏裁從之十二月二十四日云云乙卯三省言武學博士教導生員所任非輕不當從吏部差注詔自今中書省選差户部言諸路常平斛斗並令所屬官司常依條乘時糴兊失時致陳舊不堪輒行兊軍糧者以違制論從之丙辰朝議大夫知池州錢協卒舊録云錢協紹聖初為翰林學士批答不允鄭雍乞出詔以詖辭害政奪職知池州卒年六十四協在元祐附會為姦紹聖初朝廷黜其黨而協止以微罪去終與姦黨云新録辨曰此實録竊迹當時之事大抵元祐之人為紹聖用事之臣所不喜者皆誣以誹謗朋黨之罪顧可信乎今刪去戊午吏部侍郎葉祖洽權吏部尚書新權吏部侍郎范鏜試中書舍人中書舍人蹇序辰權禮部尚書己未冬至不御殿辛酉興州防禦使仲朴為湖州觀察使癸亥禮部侍郎趙挺之為吏部侍郎左司諫郭知章為工部侍郎甲子正字林自為著作佐郎太常博士吳伯舉為校書郎陳瓘云云大理正許公孫為開封府推官詔昭宣使榮州團練使入內押班馮世寧與遙郡防禦使以年勞也大理寺請立京城及外州縣舍匿逃歸配軍法應蠱毒呪詛奏案略説事情元案上尚書省並從之舊特詳今從新乙丑京東路轉運副使吕升卿徙河北路淮南西路提點刑獄朱京為倉部員外郎十二月一日改司封京南豐人元符三年正月有傳御批雪寒應在京工役給假三日詔自今及凖備軍前出戰使喚之人雖立到功勞應賞者勿推如在軍顯見有才武可以部轄人馬及準備出戰使喚之人即申經略司從本司審察指揮如立到功勞即依格推賞詔户部嚴戒諸路監司應承詔旨拋買物色並令體訪出産多寡所在約度數目令逐州軍置場用見錢和買召人取情願赴場中賣其逐州軍如不係出産或出産數少及雖係出産而當年偶闕即具因依回申本司别行下出産數多處貼數和買如本路諸州軍實買不足令監司具詣實事狀申陳即州縣輒有科買及監司不為申陳者並以違制論仍令提舉常平司覺察如有違犯具事因及官員名銜申尚書省仍許被科擾人户直經提舉常平司陳訴如本司不為行遣者一等科罪每遇和買備此詔旨全文揭榜曉示丙寅前知泗州王瑛言官員在任或赴任移替在路未到而身亡者問其家口數并所歸處計程給倉劵從之二年十一月五日已有此指揮當考户部言輒增損衡量若私造賣者各杖一百徇於市三日許人告每人賞錢有差令轉運司所在置局製造送所商稅務鬻賣舊特詳今從新丁卯詔諫議大夫以上各舉堪監察御史一員以聞他日御史中丞邢恕對上語及近許諫議大夫已上薦人然前此上來者亦多只是迎合恕曰今臣僚迎合者不過主張先朝法度爾今日陛下南面繼統如龍如虎神宗皇帝法度陛下豈不能主張却銷得他人主張若果終實主張先朝法度須是當垂簾改更之際曽有正論乃可為憑至於今日方以主張先朝法度為言者皆迎合邀利之言大抵闒冗之人固無他長惟藉此以希進不足取也上曰極是恕既退即入劄子言臣前日請對風寒不敢久留所欲敷陳未盡事條析如後內一項云一太常寺祕書省官乃朝廷儲蓄英才之地向去選用臺省皆自此出茍無其人亦宜虛位以待來者不宜輕進闒冗涼薄之人如得其才果上當聖心則便加採拔無所不可况今既許諫議大夫已上薦士未對者尚餘人乞候對罷逐一密記人才髙下須引對有涯然後補授亦不為晚繼又奏云臣竊聞有旨令諫議大夫已上各舉可任監察御史官一員如此則自葉祖洽已下并范鏜共合薦八人臣昨薦鄒餘未到外有一員未薦共十員故事薦官二員取一員今來只闕臺官三員合薦六人外有四員乃是溢數故事翰林學士御史中丞侍御史遇臺官闕亦是同薦一人至兩人契勘今來除臣舉鄒餘未到仍有一員未薦外止合更舉四員今范鏜外使中書門下省官三員尚書試侍郎四員欲乞令尚書侍郎同舉兩員給事諫議舍人且先同舉一員候范鏜回更令同舉一員不惟所舉人數依得故事不至冗濫兼可以互相察制别無私徇如所舉乖繆或别涉情弊乞指揮下御史臺覺察如臣所薦人不當亦乞却委三省長官劾奏恕自以任中丞而章惇乃令它官薦御史恨其侵己故有責鄒餘除御史在明年正月二十四日癸酉上嘗問恕外議章惇如何恕曰惇在元豐末建儲之際則實效忠力固不可掩若論其資性則所得者在於果敢所失者在於專恣其才可以濟險不可使之履平可使自用不可使之用衆又自解曰可使自用者若使惇自任一職則一職必舉如使之知開封府則府事治使之作帥則亦足以抗方面之難是也不可使用衆者宰相當用羣才惇不能收人之長而專己自任惟欲人之附己士之賢者豈肯一意隨人茍惟志在隨人者與之則小人進君子退矣陛下今日固宜自攬權綱揀拔人才使威福漸自己出如惇者不可專信用也惇既在相位久所為不合物情上漸不倚信恕亦數傾之上曰駕御著且使惇測知上待遇日薄即欲張皇邉事以為自固之計凡有言邊事者必面折凌侮期使人不敢言則己得以獨擅其長恕纍章論列最後言臣竊惟今日塞外進築城寨乃以大國侵小國用實力為久計以困賊爾所謂用實力者錢糧足備民力有餘兵多可分是也如此則為有大國之實磨以嵗月以久持之賊固小國安得不困此非有詭謀祕計以取竒功也然則度吾力有餘則進不足則止可急則急可緩則緩不必強其所不足當緩而急也章惇昔嘗自言今所謂邊事者可雕印板千百本以遺賊亦不畏彼知惇此説誠是也然則可為則為之不患其無機會也惟顧吾力何如爾更望陛下以此斟酌時其緩急勿強其所不足庶幾不至敗事天下幸甚詔自今有功該減年人並令所屬給據戊辰麟府都巡司準備勾當西頭供奉官折可大遷一官為閣門祇候以帥臣上戰功也己巳河北路轉運東西路提舉司言河北官賣鹽如依京西路鹽法實為便利勾當官仍文武官內舉差從之新無當考辛未大理寺言制書應給借者具狀經郎官簽押注籍即日給付限五日還納限滿應留照用者聽量判展若還納違限凖官文書稽程律加二等從之詔陸師閔剗刷秦鳳兵馬躬親統領赴熙河會合進築候成功一例推恩師閔以諸路出塞討擊進築數被賞每怏怏於不得用其將佐亦皆以為恨而朝旨又數令調本路兵馬應副涇原兩路師閔益怏怏兼屢訴以兵馬赴他路備禦不足曽布因建此議師閔得召果踊躍未旬日間已奏剗刷到四萬人騎凖備出入前此雖丁寧戒約所輟不過萬人爾上亦稱善十二月壬辰可參考二十一日辛丑上功狀壬申三省録事都事已下功過除尚書省已有條外門下中書省即未有法理當一體合行編修召給事中中書舍人同編修樞密院言舊制選諸路走馬承受吏部應選之人雖多止依條選差使臣二人赴樞密院審察取旨定差其間歷任比較稍優而人才不稱其任者亦須於數內差定一名未副朝廷選用之意詔諸路走馬承受有闕令尚書吏部將見在部合選差使臣並依舊式開排腳色申樞密院先以人才次以腳色銓量取旨定差仍於選限內各展限五日舊録五日下又有其吏部條內一闕選二員兩闕以第三人選先闕第二第四人選次闕一節勿行餘依見行法新本削去元符元年十月七日辛巳當考癸酉御史中丞邢恕言謹按故宰臣王圭被遇先帝自參知政事至宰相備位政府十有七年其荷國恩可謂至深且厚矣一旦先帝寢疾口不能言陛下時方幼沖名號未正王圭為上宰不能建請早定儲二為宗社至計乃方乘時艱危密召髙遵裕之子士充隂傳言於遵裕令伺禁奧意旨內懷兩端其意不在正統賴遵裕慷慨引義不答其言且發其謀以語當時一二大臣遂亟協䇿以定儲二之議故使先帝之統業獲傳於聖嗣宗社安寧以底今日圭罪狀既明白已正典刑然而君臣大義不可不謹賞罰二途為國綱紀不可偏廢且不忠於君者既罰則忠於君者必賞圭已殁於地下既追貶則遵裕雖死當追贈今止貶圭而遵裕不加追贈無賞而有罰猶之無春而有秋也其可乎臣竊見朝廷向贈范育以為寶文閣直學士近又官其一子者以罪元祐棄地而育獨為國惜地不忍棄故賞育所以勸忠也雖為國惜地曷若忠愛其君者哉惜地不棄者猶加贈典則忠愛其君者朝廷其忍捨之况遵裕之子士京方圭未貶已前嘗有請於朝丐贈其父矣前日所以不即行其言者以圭之罪未貶也今圭既貶則士京之請可以伸矣臣欲乞檢會髙士京前狀出自宸斷早賜指揮依士京所乞施行伸忠魂於九泉示大義於臣子以勸天下後世不勝大願詔髙遵裕特與贈洺州防禦使髙士京與轉皇城副使新舊録云癸酉御史中丞邢恕言故宰臣王圭為上相不能建請早定儲二密召髙遵裕之子士充隂傳言於遵裕賴遵裕慷慨引義不答今圭罪狀既白已正典刑則遵裕雖死理當追贈詔髙遵裕特贈洺州防禦使髙士京特與轉皇城副使兵部言武舉馬射應法而三箭上垜者於步射等第中遞升一等䇿義入平等者不升至免遞降即騎步射絶倫而䇿義不入等者不得奏裁從之御史中丞邢恕言劉奉世當元祐間先合劉摯隂為謀主傾害䇿立顧命大臣有不利王室之意劉摰既去即訪吕大防蘇轍內交陳衍相為表裏遂登政府宣仁聖烈皇后寢疾之際姦謀逆計皆奉世與大防轍通同其為惡不在大防轍二人下昨責郴州階官猶為中大夫士論未免竊歎近復堂除其弟當時知常州見闕按當時年五十餘才智桀黠有過人者前此其兄奉世同當時皆在京師奉世隂謀密議莫不通知請罷當時常州别除一宫廟差遣聽其自便其兄奉世亦乞更降授一𣪚官依舊郴州安置詔劉奉世責授隰州團練副使郴州安置劉當時差監南嶽廟新録因舊録但别書云初上之嗣位恕與蔡確自謂有定䇿功既而確死貶所亦斥不用心恨之其後恕帥中山會髙遵裕子士京為將官士京庸暗恕一日置酒從容問士京曰公知元祐間獨不與先丈推恩否士京曰不知又問有兄弟無士京曰有兄士充已死恕曰此乃傳王圭語言之人也當是時王圭為相欲立徐王遣公兄士充傳導語言於禁中知否士京曰不知恕因誘士京以官爵曰公不可言不知當為公作此事第勿以語人因令所親信王棫崇飾誣辭作奏而上之王圭由是得罪至是恕為御史中丞先上章乞追贈髙遵裕次乃以當元祐問附會劉摯傾害䇿立大臣論貶奉世云今移此假入四月二十三日王圭貶時邢恕未嘗帥中山也新録蓋誤吕大中雜説紹聖中邢恕為中丞彈劉當時云年踰五十智慮過人所以助奉世為不善者皆當時計畫也當時由是罷知常州當時本常人奉世弟也恕欲深中奉世兄弟故為此言當時由是頗為世所知三省樞密院奏河北河東陜西三路相度保甲人才小弱不堪教武藝者皆免教上許之因問保甲幾何曽布曰三路共八十萬上曰如此當減三五十萬章惇曰不至如此先是裁定此令即欲頒行而蔡卞不以為然故且令相度而三路皆稱免遂使行之相度在正月二十九日甲寅乙亥御批日近寒沍京城細民纍經存恤諸軍班直等良亦艱苦其令內庫給薪炭錢有差丙子江淮荆浙等路發運副使直龍圖閣張商英為太常少卿前月十九日加小龍諸王府翊善韓宗古為祕書少監都大提舉成都府利州陜西茶事司言應雙員處監官本場每年所收息各分半受賞至減三年磨勘上從之丁丑詔放歸田里人程頥送涪州編管坐與司馬光同惡相濟也先是上與輔臣語及元祐政事曰王巖叟朱光庭輩凶慝自肆無忌憚如光庭盡𣪚河北斛斗先帝經營儲蓄一日而盡巖叟尤凶肆所言皆可怪至謂曽肇為姦臣之弟又曰程頥妄自尊大至欲於延和講説令太母同聼在經筵多不遜雖已放歸田里可與編管輔臣因歷數元祐言者議論過當而上怒頥為甚又曰便與編管章惇曰合羈管上曰只與編管再對又及之後一日遂有涪州之命頥素與邢恕善而恕雅不樂林希謀與諫官共攻之頥編管蓋希力希意恕必救頥則因以傾恕恕語人曰便斬頥萬假恕亦不救聞者笑之恕不救頥布録在明年正月丁卯建寧朱熹年譜云謝良佐曰是行乃頥族子公孫與邢恕為之頥曰族子至愚不為足責故人情厚不敢疑孟子既知天安用尤臧氏詔京東西路提刑李昭玘檢法官趙紘各罰金二十斤以申請刑名不當也大理寺言本寺官嵗終比較失出死罪或徒流罪各三人比失入一人從之元符三年五月戊辰改此樞密院請立軍人戰殁聽子孫與兄弟之子代充軍及優恤稟假法從之舊特詳今從之雷州别駕化州安置梁燾卒十一月二十七日化州屬廣西至京師八十一程十二月三日劉摯亦卒於新州諸子援吕大防例乞歸葬不許家屬尋徙昭州此據張舜民所作梁燾行狀增入徙昭州在明年四月八日行狀云六月諸子移置昭州編管特勒停永不收敘勒停乃五月四日指揮也戊寅吏部言官員本貫川峽人任川峽路差遣應酬奬並減半從之閏二月二十二日已有減半指揮當考又言官司承告強盜其行移公文不得開具告人姓名仍州縣每季檢舉曉示從之承事郎通判邠州耿毅陳獻擾敵祕計詔耿毅就添差充涇原路經略司勾當公事令經略司相度所陳利害如何施行即聽以本司應副邊事錢糧行收買蓄産製造器械什物等應副令於商虢等州間僻地內教習仍具施行次第以聞熙寧蘭岷路經略司言蕃官包順狀先尋訪到邈川大首領溫錫沁孫集星衮今年三十二未有官職詔集星衮為內殿崇班己卯廣西路經略安撫司走馬承受假諷言知雷州張逢照管安置人蘇轍及蘇軾兄弟與之同行至雷州相聚請下不干礙官司再行體量詔提舉荆湖南路常平董必往彼體量詣實以聞明年三月二十四日復命王鞏甲申雜記可參照自彗變後皇城探事司添廣察邏人數是月御史中丞邢恕因奏事口陳近聞皇城探事司添察邏人頗多天象變動正當應之以靜則災消異伏若以動應動恐非消弭之道因言魏文帝時民間數有妖言帝嫉之有妖言輒殺之其臣髙柔諫而不從後相誣告者滋甚帝乃下詔敢以誹謗相告者以所告罪罪之於是遂絶上頷之又言輦轂之下號為帝宅凡布恩德宜先諸夏如此則輿頌歡騰流言屏息有不待察伺禁者止矣因乞官減價糶米出賣石炭不限多少蠲放民僦直言多施行十二月辛巳朔朝𣪚郎王森為倉部員外郎壬午户部尚書吳居厚言𣙜貨務左藏庫南北庫等官若有事故請從本部依店宅務麴院法選官權管勾從之又言欲令在京排岸司如有催理綱運欠負並從所𨽻寺監各置簿拘管銷注從之新無可削癸未資政殿大學士知河南府李清臣知成都府龍圖閣待制知應天府豐稷知河南府四年正月二十五日自中侍出知河南十二月三日改成都府明年正月九日復知河南始朝廷命周秩密察河南變事秩入對上謂曰彼欲盡誅大臣則將置朕何地乎蓋疑其不然也時復召吕升卿於河北令待命國門俟體究果有實狀即遣如嶺南族元祐責降諸人秩尋至河南捕劉唐老等别屋仍辟程公孫專體訪於外公孫素名能刺人事者也於是更徙清臣入蜀秩徐考驗唐老等實未嘗謀變而欲誅大臣之語則有之乃具奏語初不及乘輿上亟詔勿治唐老等皆釋去升卿亦還河北清臣知河南如故清臣復知河南在明年正月九日升卿還河北曽布日録明年正月二十三日辛未哲宗有此語又二月十七日丙申始差升卿察訪廣南三月四日癸丑乃罷疑察訪與劉唐老實是兩事初不相關當考此事據王鞏甲申雜記增修周秩為京西潧在六月十六日令秩赴闕上殿在八月一日劉唐老責桂陽在此月十七日清臣復知河南在明年正月九日清臣行狀云自河南移成都不行嫉清臣者猶風監司窺清臣而清臣謹審至無隙可見乃摘中書舊事奪清臣大學士奪大資政在明年七月二十四日行狀所云風監司窺清臣此亦是王鞏所記周秩推治文劉事也然劉唐老對獄實録及他書絶不見惟王鞏及曽布略記之文及甫先對獄同文見八月十六日不聞此外更有逮捕並當考王鞏甲申雜記云周秩重實大觀元年九月得吉州守過髙郵言紹聖中有洛人告言文及甫劉唐老與李邦直等將生變誅章子厚蔡元度諸人下至兩制侍從皆及之召重實為西京轉運使推治之以其嘗攻文潞公也朝旨令先推究體訪候有狀即治之又以運判周純為知情不告云將引用嶺南謫降元祐人同力為之哲宗召重實對曰欲盡誅族大臣已下則將置朕於何地又召吕升卿令國門聼旨俟其有實即遣族諸人於嶺南重實既至西京捕文劉置運司别聽且辟程公孫專管勾察訪於外久之無狀而誅大臣之語則有之凡三請自裁未幾罷邦直久之公孫忽得二張秀才密語云候上意變必用元祐人乃有族誅之舉重實即具奏且言元不及乘輿不數日令文劉逐便吕還朔部並更不推治哲宗之明之仁今世無知者以元旨極密公案一宗并元狀悉不在有司雖朝廷悉無知者公實藏其家終當上之乞實録書之公孫喜刺人事者也周秩四年正月二十四日自浙憲除京西漕閏二月十七日改淮漕六月十六日自淮漕改京西漕周純三年三月十一日以江西提舉為京西運判元符二年五月猶在京西吕升卿四年十一月十五日自京東運判改河北元符元年二月十七日察訪廣南三月四日罷察訪按曽布日録元符元年正月二十七日辛未哲宗有升卿不住且令往河北之語然則升卿先自河北召至京師既還河北又有察訪廣南之命其察訪廣南時未必在京師也董必四年十一月二十九日先以湖南提舉往雷州體量蘇軾轍又元符元年二月十七日察訪廣南後得劉跂辨謗録載劉唐老説文康世所告事果與同文獄不相關跂云云已附注八月十三日甲午今别注此建中靖國元年三月七日跂就劉唐老家見唐老唐老説丁丑年六月中文康世告妻父蔡碩言及甫與唐老密謗時事言不久必變惇必滅族餘執政必竄又云康世見劉唐老親説碩使康世形於手筆携往見蔡卞遂有旨下監司周秩根究此事未了九月中同文事又大作遂先攝及甫下同文獄後來方興洛獄跂見曽右相説先因劉唐老事後有文及甫事與此相符然不曽問得洛獄後來如何結絶必有知之者當問樞密院言因戰陳鬬敵被傷殺掠人口管押官敢減落人數或妄申逃亡者並以違制論許人告每名賞錢五十貫文仍委監司覺察從之尚書省言元豐度支令上件科買物應改罷若減者聽以額責所屬計價費封樁後增注文稱無額者以三年中數因災傷或特旨免改者非今乞刪去注文又令諸國用物所科供非元科供處者聼以封樁價費還之後增入其千貫以下不在逺例今乞刪去從之鼎州團練使新州安置劉摯卒十二月三日癸未新州屬廣東至京師凡七十程先是蔡京安惇共治文及甫并尚洙等所告事八月十五日但有李洵姓召尚洙事具元符元年二月三日壬午將大有所誅戮會星變九月五日上怒稍怠然京惇極力煆煉不少置已而燾先卒於化州十一月二十七日後七日摯亦卒於新州衆皆疑兩人不得其死明年二月朝廷乃聞摯死不許歸葬家屬令於英州居住此據劉跂辨謗録增入乃明年二月十九日聖旨也其五月獄乃罷五月四日人疑梁劉之死據邵伯溫辨誣伯溫云上批出勿治摯等則未必然今但云上怒稍怠具注在明年三月九日涇原路經略使章楶奏勘會諸路就糧駐泊禁旅萬數不少破壞軍制無甚於投換之弊夫使在營無過之人投換則非人之常情使逃亡作過之人投換則非邊防之利今日開邊逐路各有新建城寨創置軍營招填兵士各務早及數目多將逃亡作過之人投換刺填有利無利深不可取夫人之常情豈不有父母妻子之愛自非纍作過犯不容於本營或負罪避刑或剽竊官私財物豈肯離去父母妻子竄身山林野草之間兼逃亡之後不為盜賊何以為生往往殺人取財幸不敗露一有新建城寨官中急於招填則乃輻湊雲集爭往投刺官司不問來歷不究行止一切收接他人莫敢誰何洎至填刺之後常令役使優輕即且貪戀衣糧不作過犯若稍經重難或錢物入手必便逃亡盜用無所不至其弊更有大於此者昨來進築平夏城時曽捉到細作一名係投換在蘭州定逺城逃亡軍人郭亨投換之弊如此豈得不革欲乞朝廷特降指揮今後諸路新建城寨不許投換逃亡作過之人如違所由官司並重立刑名若新建城寨闕人戍守須合創置軍營猝急未有人投刺者委逐路經略都總管司於諸軍指揮取自情願投換若或不足即於諸軍揀選改刺撥填各優支轉軍例物則極邊城寨各得審謹行止堪任使喚之人為邊防經久之利黃貼云本司五月間曽差使臣管押馬三十九匹往第八將交割有渭州蕃落第二十指揮十將李孚用錢物將腳下瘦弱馬換却第八將馬事發逃行見行收捉未獲所有干證人送在所司根勘雖經赦恩結絶未得其李孚却在蘭州金城關投換蕃落第九十六指揮日近蘭州來渭州勘會本人請受則例慮是於投換處便補舊名管十將名目契勘李孚換易官馬刑名事發逃亡却往他處投換便得舊日軍職名目兼見今渭州司理院緣李孚換馬事禁繫干證人在獄守待本人首獲結絶本州見差人勾追向若不因會問本司何曽得知刑獄何由得結絶投換之事長弊容姦如此伏乞深賜詳察又契勘本路新建靈平寨創置蕃落保捷兵士元許本路諸州軍兵士投換共不滿二百人自四月後來至今已逃走過四十九人投換之人使在新邊不可倚仗如此伏望朝廷詳察今狀所陳事理特賜止絶詔陜西河東路新建城寨今後不許逃亡軍人投換如違並以違制論此以章楶奏議增入須刪取其要甲申遼國遣使保靜軍節度使耶律永副使中𣪚大夫守太常少卿充史館修撰張商英來賀興龍節乙酉詔侍御史董敦逸降一官知興國軍以不覺臺吏擅收敕榜因奏御不實也敕榜事當考十月二日安惇周之道同勘李竒諸王府侍講朱紱為翊善記室參軍傅揖為侍講太學博士何執中為記室參軍詔元祐赦文户絶之家官為立繼指揮勿行三年十二月五日已罷此指揮今又别出當考庚寅詔罷獨看故事每宴前一日御宴殿閲百戲至此罷之壬辰鍾傳奏統熙秦兩路兵四萬騎出塞傳前此未嘗素議忽約陸師閔同出曽布疑章惇實隂諭之涇原又奏姚雄統兵萬騎趨天都兩路不期而會然衆皆恐其無功上亦以為然甲午詔統熙秦出塞將士特支後三日涇原奏人馬至天都入監軍司搜空一無所見而還上曰勞敝士馬殊無謂鍾傳若更如此當行法二十一日促傳具功狀于闐國及西南羅蕃貢方物甲午十四日事太學博士白時中為正字乙未詔右朝議大夫鄭佑承議郎李仲各遷一官仍減二年磨勘內鄭佑依四年法比折朝請郎黃思轉一官並賞治水功也又詔減三年磨勘仍依四年法比折又詔郭知章李偉玉孝先各遷一官中散大夫王令圖贈左中散大夫賞首建言及主議河功也詔五月六日所降朝旨同管勾陜西坑冶鑄錢許天啓依提舉常平官條制刺舉官屬官一節改正更不施行十二月十五日聖旨改正正月六日指揮丙申詔內殿承制閣門祇候張忠為係先朝從龍特以閣門祇候年勞并理過磨勘年月與除閣門通事舍人丁酉詔祕閣校理劉唐老落職添差監桂陽監茶鹽酒稅賣礬務以唐老元祐姦黨時出險言故有是命新録改云以唐老元祐黨人故有是命蓋不知險言曲折也曲折已具八月十三日甲午今附用舊録元符二年十月十二日庚戍文及甫落職仍知均州不知所坐當考王鞏甲申雜見云涇原路都鈐轄王湛為滄州總管元符元年十月二十九日自麟延改澶州戊戌殿中侍御史陳次升為左司諫初章惇蔡卞以次升元豐時所擢元祐間多持節在外未嘗顯用謂次升必怨望紹聖初特除御史欲其出力排元祐臣僚以為己助次升首論敕榜反覆又言常立周穜鄭居中穜嘗乞安石配享立亦卞死黨居中乃卞姻家論之尤切自此惇卞不説常令太府少卿林顔致誠悃於次升且曰公自湖外來復登憲府皆已之力茍相助何患不得美官次升對曰次升知守官而已不知其他更誚顔任卿監乃為宰執傳風旨邪顔福州人也於是惇卞屢以事媒孽次升賴上知其朴忠嘗因陛對宣諭曰久不聞讜論會次升辭言職惇卞欲乘間出之擬優除職名河北轉運使上曰一漕臣之職豈無其人陳次升敢言不當令去朝廷尋有是命曽布亦嘗白上曰竊聞次升有章乞罷御史次升久在言路無所阿附衆所共稱不可使去言路言官唯董敦逸郭知章及次升三人久在職然皆以徑正為衆所稱敦逸既以山野貶知章又蒙選擢上云知章選擢甚峻布曰非出聖意何以有此惟次升久不遷以資任言之侍御史司諫皆所宜為上曰好好布又言聖意雖以為可然三省皆不恱願賜主張上曰只俟見文字便指揮既退林希謂布曰上許可未有若今日之快也布録此假在丙申日於是布言次升遂除司諫深慰士論非出自聖意何以得此黃履亦曰非出聖諭豈可得上曰履常薦之又曰邢恕亦稱其無心布曰次升每事與執政為敵如此豈易得上曰誠無所附麗然論事亦多踈又笑曰恕亦稱其無心是可信也布又言次升雖已進然殿中俱闕人願更留聖意審擇上曰固當然布曰他人臣所不敢及如劉拯鄧棐必不可用拯交通陛下所知棐尤甚林希曰拯在紹聖初猶曽論事若其朋附或所不免棐蠢然無知但知傾身朋附人爾上曰拯不可作言官布曰蔡蹈知久權殿中必不免次補若更用棐即是蔡京所薦豈得穩便上然之布録此假在壬寅日己亥大理寺言外州軍人逃亡於京畿首告者除犯死罪及強盜或殺人罪不至死并元係凶惡及死罪貸命充軍不以今犯輕重並從本府斷遣外餘據所招罪先犯次斷決訖具録情欵合用條格并所斷刑名牒送元逃處勘鞫依法施行如勘鞫得不實其已決之罪並不在通計之限已上未至本所逃走於京城內及畿縣捕獲者並杖一百從之新削辛丑樞密院言熙河蘭岷路經略安撫判官鍾傳統領本路并秦鳳將兵出塞討蕩斬獲約四千級及殺獲首領頗多詔得功將佐士卒令傳速具功狀從鍾傳審察以聞十二月壬辰十四日甲午可考此即白草原之役也元符元年正月五日九月十七日七月八日慕將美推勘九日徐彥孚制勘鍾傳奏獲級四千數百里間牛畜斬獲殆盡秦鳳亦奏獲千三百二十一級鈐轄首領十三級傅以五日出師六日逢敵擊散諸將分詣銼子山鼐摩川白草原等處各有所斬獲章惇恐其所奏首級過多失實詔令結罪保明差官覆按又遣使賜茶藥催具功狀聞奏鍾傳神道碑鄭居中作紹聖四年十二月出銼子山討白草原俘馘四千遣幕官董采詣闕請合涇原帥趍天都山鼐摩會置州與寨自馳赴章楶議謂楶曰公能出師當以熙河節判歸公公不自行請分涇原師以從楶難之又意既城天都而糧或不繼須五月草深乃進約公同奏朝廷詰其説公曰議獨出已楶無與也正月以白草原捷奏加集賢殿修撰錫三品服遷知熙州兼熙河蘭岷路經略安撫都總管司公事通逺軍康謂李深請城淺井公疑彼無泉檄使審視謂深固請城二月兵出果無水不克城如公所料三月移師築丹喇朝廷賜名日通會會州望在咫尺矣已而坐前奏議異同築淺井不成方禠職降秩簽書經略安撫司公事復有告白草原冒賞者再降宣德郎謫監永州稅元祐元年三月十六日責永州監稅據曽布日録傳此責乃坐奏報進築反覆勞敝秦鳳兵馬耳白草原冒賞事獨未發也當考詔西界歸附部族除給與地土住坐耕種外乃依例支破口食候及三年耕種有序日住支其不該支賜之人須合給與錢物充營生住坐之費令經略司相度據人數於應副邊事錢內量給每户毋得過十千單身人毋得過三千人口多者比類支給務令可以安存不至失所亦不得過有縻費仍令所屬官司嚴切約束保管之家不得非理勞役監察御史蔡蹈言請下禮部裒聚近年科場及國子監公試所出題目編類成䇿藏在禮部每遇科場或國子監鎖試牒送考官照用從之壬寅詔前郴州洛容縣令黃佺改宣義郎以佺在元豐間説諭溪洞諸酋那田泊新附蠻人萬餘賞功也詔皇太后皇太妃生辰本殿祇應人推恩並依元豐格其元祐四年八月裁損指揮勿行舊録又云以元祐中立法裁損非所以示優崇也新削去詳定一司敕令所言京城內汴河兩岸各留一丈五尺為隄靣官私不得侵占承告侵占京城內隄岸者檢定送開封府其賞錢乞先以雜收錢代支却於犯人理還京城內汴河隄岸人户輒有侵占者許人經都提舉汴河隄岸司告從之新無七月十日御札當考詔户部每嵗春季內具諸路轉運等司起發上供錢物多寡職事修廢最甚之人保明申尚書省癸卯御史中丞邢恕言開封府東明縣主簿何夷權知縣事人户限內陳訴旱傷不為受理致詣本臺陳訴乞下提點司據分數體蠲放其何夷乞賜衝替詔提點府界諸縣鎮郭時亮體量詣實毋容僥幸虧損官私既而何夷竟免黜責恕謂章惇實抑己恕申實録院云章惇按察不行尋奏疏言臣竊惟執政大臣欲擅權者必先摧沮臺諫官臺諫氣奪則無敢議已者然後得以專權用事封殖朋黨明聖有為之主欲收攬權綱者必先擇臺諫非其人則或廢黜或他遷之如得其人則須聽用其言然後執政大臣不得專權用事威福不出於己則朋黨自然破散群下莫不一意以事君忘私而徇公則主勢隆於上治道成於下非小補也今陛下聖明容受盡言惟恐不及而執政大臣近多沮抑其言臺諫寖弱則大臣寖強朋黨牢而不破陛下未得優遊仰成也伏望聖慈常切斟酌消息勿令臺諫太弱臺諫太弱則非國之福也凡臣為此言者非為己遊説也使臣為一身計則少立怨敵從容迤邐奉身而退豈不善哉然則臣之區區乃為國計伏望陛下留神幸察又奏疏云臣竊以朝廷置御史中丞本以救執政大臣之所不及且防其私邪其責任甚重然其權力甚輕若優遊養交乃能可全即明目張膽真欲舉職鮮不見殆何則御史中丞徒能言耳及其進呈開呈行與不行全在執政言之與行豈可同日而語哉其不敵一也御史中丞止於一身爾雖有小御史輩時無御史殿中御史也人微言輕不足倚重執政大臣若協力相濟動輒數人衆寡之勢較然不侔其不敵二也御史中丞若人主信用止於稍能為人禍爾執政大臣兼能為人禍福可以鼓動人情為之羽翼耳目者衆其不敵三也御史中丞得對清光近者踰旬逺或彌月而執政大臣日見人主親踈之迹不同其不敵四也御史中丞風聞言事近於道聽塗説執政大臣親秉政事之權事無巨細皆托其實與之角論詳略得失固不相當其不敵五也臣今操五不敵之勢以與執政大臣抗其不勝必矣臣朝暮求對期少傾竭底裏頃刻之間不能盡言故輒先事陳露伏望聖慈特垂省覽察其用心則死生幸甚又貼黃臣頃亦嘗陳此意而不能詳也今兹邪正交爭之際不免究極其説再瀆宸嚴望賜憐察又貼黃今使臣不勝而去若執政大臣忠純無私則有何不可如其不然則人主獨立於上而大臣朋黨遂成於下非徒臣身危而已也御史蔡蹈言臣竊見本臺日近節次接過開封府東明縣百姓六百九十八狀計一千八百五十九户為陳論今嵗夏旱依條披訴災傷本縣不為收受內一百十七狀計二百七十六户稱係涇縣不押不顯官員名位外五百八十一狀計一千五百八十三户稱主簿權不押臣取會到知縣李升緣故參府主簿何夷權管縣事未委本官何為不受前項詞訴臣伏思京師諸夏之根本天子施德布惠必先及之所以重本而馭末也近者風雪連隂小民艱苦陛下深軫睿慈蠲放房金以至再三而憫其炊爨不屬增場出炭捐直贍民以惠養京師之人可謂厚矣至於國門之外數舍之逺農畝嵗荒而民無所赴訴是豈陛下優飬畿甸農民之意乎畿甸之近且猶如此則其他邑災傷民被扼塞既逺在數千里外不能皆赴臺察則陛下何從知之乎信如民言則夷任民官而違法害民罪不可赦升為長吏而殊無按察佐官權縣不受災傷詞訴亦合劾治欲望聖慈遣使體量如見的實即乞速賜指揮施行以戒天下苛刻之吏殿中侍御史陳次升言乞自今文臣帶兵鈐及監司職任者朝辭日不許援例不對並令上殿從之十九日已除司諫元符三年三月末六月末可考邸報具載言章今附注此臣僚上言臣伏見閣門並更不上殿者比年以來文臣或領監司職任或帶一路兵鈐朝廷委任非輕豈無事件可稟聖訓面奉睿旨者乎蓋緣選任之際未必得人人材闒茸或緣老疾不敢登對恐陛下察知必有顯黜攀援此例更不上殿非所以稱選任之意欲望聖慈特降指揮今後文臣帶一路兵鈐及監司職任者朝辭曰並須上殿其餘即依上條施行取進止三省同奏聖旨依奏鄜延路經略司言龍神衛四廂都指揮吉州刺史副都總管王愍保明到應總修築防拓部役官員使臣等乞賜推恩詔王愍遷一官回授與有官兒男兩人承受各特轉一官仍賜銀絹各一百匹兩餘人等第轉資減年磨勘循資及賜銀絹有差成都府轉運司言乞逐路將用舉主升資選人先具舉主考第到司公參月日申吏部會問違礙符下理公參月日名次射闕從之淮南轉運副使林邵言按敕令官員能察綱運妄稱水火賊盜者與第五等酬奬恐賞輕不足以勸改為第四等從之新無河東轉運副使吕仲甫為發運副使通直郎李譓為河東轉運判官甲辰三省言熙寧年興市易務本以通有無利商賈抑兼并元祐任事之臣不深原先朝立法之意一切罷去民實病之詔户部太府寺同詳立法意復置市易務許用見錢交易收息不過二分不許賖請監官惟立任滿賞法即不得計息理賞其餘應雜物並不許輒有措置限十日條畫以聞詔置都大兵籍於兵房樞密院自熙寧始置兵籍然逐月逐季揭帖進呈每次揭去舊數而不存按檢故曰前兵數皆無籍可考於是立式令承旨司嵗終造都籍具在京府界諸路駐泊就糧正兵漢蕃弓箭手蕃兵巡檢下士兵額管見闕見管數進納入內别寫一册申樞密院自是兵籍乃始可考曽布白上曰先帝初置兵籍便合如此有司奉行不如法而朝廷未嘗檢察故失於措置爾責授黔州别駕涪州安置黃庭堅移戎州安置以避部使者親嫌也荆湖北路轉運司言衙前般運官物元豐條制已備元祐中增入如難為津般許官司相度量添錢數各不得過三分之一今欲刪去詔並依元豐令大理寺言近敕皇城門以內竊盜者並依京城竊盜常法加等及遞增逺配仍立奏裁法緣犯在禁庭合奏稟欲乞應有似此犯盜罪人並依本寺自來請寶例約定刑名封入奏斷內情法不稱或事體稍重者仍從本寺别行聲説取旨從之十一月四日敕乙巳遼國遣使益州管內觀察使蕭括副使東上閣門使海州防禦使張搋來賀正旦詔陜西河東逐路經略司除舉人不得帶隨軍外如有因負犯停廢官員實有才武可偹戰鬪之人即先具姓名及元犯因依奏俟詔旨許隨軍出入如擅遣行不以立到功效大小更不推恩其將佐等輒以隨行當議重行黜責詔陜西河東路經略司告諭漢蕃兵如遇軍行尚敢携老幼婦女首級送納或將佐知情蓋庇盡以違制論諸色人刺配近南州軍將佐情重者取旨並許人告每級賞錢五十貫其將佐等雖不知情及受納經歷官司不點檢省察致已推賞者各減二等並不以赦降去官原減其妄冒之人仍不用蔭走馬承受常切點檢覺察及經略保明功狀內具委無夾帶老幼婦女首級結罪保明以聞如朝廷察訪得知或因事彰露其帥臣并走馬承受當議重行黜責提舉淮南東路常平李延嗣為成都府路轉運判官八月末李深云云可考提舉京東西路常平王旊為京東路轉運判官元符元年九月十七日放罷戊申大理寺言乞立人吏互相保任法從之舊特詳今從新吏部言盜應偹賞而犯人無財産或不足者徒伴并知情干繫應罪人均偹從之新無御史蔡蹈言臣昨者竊聞陛下欲幸北郊有司請役萬夫以除道路而陛下愛惜民力特罷此行京師之人無貴賤老幼皆歡呼鼓舞稱頌聖德以謂時方苦寒不忍以非時遊幸重勞民力此堯舜之用心也兩日來又聞聖旨止罷都水監所差夫役所有車駕遊寺卜日已定不識宸慮何為復有此行臣愚竊惟陛下所以猶豫未決者不過以帷宫初成工徒望幸以覬賞賚爾然屬此嚴冬寒氣栗烈鑾輿往還逺在十餘里之外奈何以工徒望幸而輕聖體乎前日之刈麥觀穀勞農勸耕之舉時陛下以事皆輟而弗往今其遊幸非時無名其猶不可以已乎孟子曰吾王不遊吾何以休都人士庶固欲仰瞻儀衛而區區螻蟻之情乃以寢罷為願豈無意哉伏望垂慈俯從衆役若重念工役之勞特推恩施則戒飭有司施行何必親屈至尊以勞人動衆也十一月十八日罷北郊蔡蹈言不得其時今附見冬末明年正月二十五日幸北郊是月遣蕃官東上閣門使雄州防禦使李忠傑依舊充熙河州部落子將并忠傑子皇城使賀州刺史世恭並權今赴涇原路凖偹使喚從章楶奏請也此據楶奏議增入元符元年六月十四日可考是嵗宗室子賜名授官者三十九人天下户部主户一千三百六萬八千七百四十一丁三千三十四萬四千二百七十四客户六百三十六萬六千八百二十九丁三百六萬七千三百三十二斷大辟三千一百九十二人
