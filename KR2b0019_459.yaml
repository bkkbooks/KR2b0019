body:
  text: 續資治通鑑長編巻四百五十五宋李燾撰哲宗元祐六年二月庚寅朔左朝㪚大夫寳文閣待制守户部侍郎苖時中卒政日在九日是日經筵吴安持侍講馮京初赴侍讀宰臣執政俟讀官畢起詣御前奏事申敘所講所讀之事有未盡或可以因古諷今者從所請也前此甞已面奏欲如此蓋執政數年間未甞聞上徳音上淵嘿謙靖同聽之間未肯出語可否唯於經筵可以講學問之事庶有聞也今日所申論乃仁宗諭宰執以内降事令中書密院執政守條詔明有法者不得更取㫖講官講孟子不為管晏事此用劉摯日記増入辛卯中大夫守門下侍郎劉摯為太中大夫守尚書右僕射兼中書侍郎龍圖閣學士御史中丞蘇轍為中大夫守尚書右丞龍圖閣待制權知開封府王巖叟充樞密直學士簽書樞密院事按呂大防政目及劉摯日記蘇轍王巖叟並以二月二日除執政實録乃係巖叟於四日本紀因之誤也今改正劉摯自記云前月二十四日有所問摯對以元祐以來政事雖有更張臣僚雖有進退皆天下公議順人心者若異時之是與非固不能保然自有公論也今不若引用正人布在近列以輔佐主上維持善政如此而已若用小人在左右則異同紛紛何待後日也因以數人可保者附奏而轍巖叟在焉遂與摯並命摯不負天地神明聽上所擇耳呉敏中按見聞錄范元章言元祐間馮當世以宫使至京師亦時相意已而改命劉莘老此事當考按馮京以此六年正月十一日辛未除中太一兼侍讀五月六日甲子除南宣徽判陳州二十二日庚辰免判陳州仍以南宣徽充中太一明年遂致仕監察御史徐君平前奏新差權發遣開封府推官孫賁昨知開封縣所為不法及知真州穢濫匿哀等事未䝉施行賁到任不數日自請外補召近詔差知和州而訓辭不由罪出且逺召而來無故而去亦朝廷所宜惜也詔孫賁差知和州因依劄下吏部癸巳龍圖閣學士御史中丞蘇轍為中大夫守尚書右丞龍圖閣學士吏部尚書蘇軾為翰林學士承㫖翰林學士承㫖鄧溫伯為端明殿學士禮部尚書先是溫伯撰興龍節祝壽詞用負黼扆凴玉几等事字殿中侍御史岑象求劾溫伯非所當用以祝壽象求差入别試所侍御史孫升繼論之章三上尋有詔復召朱光庭為給事中劉安世為中書舎人及除蘇軾吏部尚書太皇太后諭執政令兼承㫖對以承㫖今有人問為誰對以溫伯欲俟軾至别降指揮已而蘇轍除尚書右丞故即命軾為承㫖而溫伯有是命轍言臣幼與兄軾同受業先臣薄祜早孤凡臣之宦學皆兄所成就今臣䝉恩與聞國政而兄適亦召還本除吏部尚書復以臣故改翰林承㫖臣之私意尤不遑安况兄軾文學政事皆出臣上臣不敢逺慕古人舉不避親只乞寢臣新命得與兄軾同備從官竭力圖報亦未必無補也不聽翰林學士范百祿為龍圖閣學士權知開封府龍圖閣待制權禮部尚書趙彦若為翰林學士天章閣待制樞密承㫖趙君錫為御史中丞左司諫兼權給事中楊康國言中書省送到畫黄蘇轍除尚書右丞臣伏讀數四為陛下深思逺慮且疑且懼未測陛下選用執政之意將欲垂衣拱手坐享安靜乎常欲煩凟聖聰汨汨而不已乎必欲安靜則不宜用轍蓋與今執政相睽矣臣愚以謂睽乖不共事睚眦不同室其勢然也故自聖朝祖宗以來官吏之有嫌隙不和者率許相避蓋其情終不可以强同而適足以敗事故也且以近事言之昨賈易懷州上謝表言蘇轍持密命以告人志在朋邪而害正後易為殿中侍御史轍為御史中丞不可以同處臺中朝廷遂罷易出為淮東提刑如此之類甚衆不可縷陳日近中書侍郎傅堯俞同知樞密院事韓忠彦因理㑹職事而轍彈奏堯俞等以謂無禮無儀見欺自解欲擅威權互相紛爭而又旁及呂大防劉摯蘇頌當時士論不平皆謂彈奏不當致使堯俞等居席不安紊煩天聽乞解機務幸賴陛下體察宣押堯俞等依舊供職彈墨未乾遽擢轍與堯俞等同參大政且轍與易臺中尚不並處况廟堂之上動繫天下安危豈可與堯俞等共事哉有此未安所繫甚大所有畫黄未敢行下謹具封還伏望陛下再三反覆思之精賜裁處貼黄况轍天資狼戾遇事不明自長憲臺前後言事多不中理若使同參大政必致乖戾紊煩聖聽更望陛下深思追寢新命則天下幸甚編類章疏係二月初三日詔范祖禹書讀蘇轍彈傅堯俞韓忠彦章已見去年十一月詔宗室士俔特追魏國公依法别定承襲之人坐以娼女為妾也士俔誰子當檢附龍神衛四廂都指揮使昌州刺史張守約卒甲午右僕射劉摯朝于垂拱殿立新官班退入第一表免恩命遂還家以劄子奏云今日依宣㫖已入朝所是供職緣見方辭避不敢赴省見居家以盡臣子辭遜之禮前例宣麻後即入省摯以謂未受命先治新官職事又一面辭免皆非是故且辭免居家以聽否可俟受訖雖未謝可以入矣衆頗以為是内降監察御史徐君平論王巖叟及新除尚書右丞蘇轍論楊康國二章付三省君平言巖叟才不足以不次用之指其向日繳鄧溫伯制非是賈易之徒相繼去而獨留是出處不明誣善人是罔上乞因其辭免從之劉摯以為君平溫伯之所與而不知巖叟昨繳詞頭時在舎人院非有言責止可封繳而已難責以繼論又難責其去也巖叟今日之進誠稍超峻然以人物言之不次不為過也君平意異故有此作轍言楊康國指臣謂昨者不合彈傅堯俞韓忠彦又旁及呂大防劉摯蘇頌此乃是廟堂之仇於法官吏有嫌當避臣之新命决不敢當而康國昨甞申救傅堯俞韓忠彦是結私恩不可不治其姦邪摯謂轍此章不作可也乙未提舉河北鹽稅司言請自今許令商賈以所販鹽於有監官處所屬場務依條例輸納稅錢召本處等第人户委保出給小引量所賣處人烟地里逺近鹽數多少給鑿日限毋得過三十日搬運赴無監官鎮店從便貨賣依限勾收元引從之初河東經畧安撫使滕元發言請自元祐二年後賣到鹽數與熙寧中課額比較取酌中一年為法尋下河東轉運司及河東陜西措置礬事所同相度欲將代州管界賣鹽年額先除去元祐元年所増斤兩仍於舊額内量減零數每年以八十五萬斤為賣鹽祖額應所管界内外場務並於舊額上據斤兩多少均勻裁減從之元發五年五月二日已自太原改揚州不應此時猶帶河東舊錄必誤新錄因之當考正丁酉詔髙麗進貢特賜銀器五千兩政目云髙麗回賜别銀五千户部言請諸路轉運司管當帳司兼管當本司文字官職事繁冗乞比類選人充提刑司檢法官州學教授及監當場務給驛料從之專切提舉出賣解鹽官孫逈言請西京河陽鄭州并管下逐縣並非本司所差官賣鹽地分其廵檢縣尉等自來所獲犯人並送所屬州縣斷賞竊恐不依條法請令西京河陽鄭州並管下逐縣斷賞有不如法並依本司見管賣鹽州縣條例按劾從之己亥詔文武官有犯同案事干邊防軍政者令刑部定斷申尚書省仍三省樞密院同取㫖從蘇轍為御史中丞時所請也去年十一月五日又十二月末庚子于闐國拂林國遣使入貢辛丑詔三省集英殿試舉人權罷春宴詔少府監見計料造皇后重翟等車六乘其罷之御集詔以富弼預配饗功臣其遺表恩澤特許奏異姓一人餘人毋得引例弼子紹庭請奏甥故有是詔殿中侍御史岑象求言王安禮平生猥濫至老不悛典領雄藩為惡尤甚近褫職名若及一年還復仍舊於安禮曽無少損伏乞放歸田里或安置散官仍乞將京東路容庇安禮監司悉加降黜詔王安禮特展一期檢舉取㫖京東路轉運使王同老知齊州副使范鍔知蔡州提㸃刑獄劉賽罰金十斤樞密院上冬教保甲敕詔行之䕫州路轉運司言本路軍監所産鹽有詔立定分數應副支還熙河路入中鈔凴緣逐處自來别無見鹽依入中先後支還其商賈常候三五年間方得請鹽伏見熈河入中射請大寧監鹽係立限十年請將三路熙河路等處入納錢銀糧草射請本路開達忠萬涪州雲安軍六處鹽鈔並依大寧監年限施行從之故左班殿直余憲特贈左藏庫副使以死事也何處死事當考詔内外差遣及本等改易者止給敕無告政目十二日事是日蘇轍王巖叟皆押入隨班奏事壬寅江淮荆浙等路發轉運司言請博易糴買綱運斛斗并糴賣人並許人告捕斷罪外每獲不及一石賞錢三貫一石五貫每石加五貫至五十貫止從之癸卯寳文閣待制知慶州范純粹為户部侍郎左司郎中章楶為直龍圖閣權知慶州章楶本傳云時朝廷戒邊吏毋得外侵夏人繇此驕横比入冦乃更斥葭蘆安疆等四砦予之使歸我永樂之人楶奏夏人不知義惟嗜利而畏刑不稍懲革邊未得寧也古者諸侯有罪貶爵削地甚則六師移之今既憚用兵宜稍收入其土疆如古削地之制舉西人之師止當我一路請詔諸路豫具版築俟一入寇即諸路皆出師擇要地而置城砦彼雖猖獗壤地褊小不過一再舉而勢蹙力窘矣又請復安疆砦以固吾圍招部族以離其衆及遣間諜設方畧時伺利出討斬獲甚衆虜不知我師所出並邊部族不敢寧居今附七年十月十二日賊圍環州後甲辰新除給事中朱光庭辭免除命尚書右丞蘇轍與同列議欲如所請簽書樞密院事王巖叟曰用忠實所得多又垂簾之初光庭排邪助正甚有力豈可棄乃降詔不允丁未左司諫楊康國奏編類章疏六年二月十八日臣僚累具彈奏尚書右丞蘇轍不可為執政者其事有六至今未䝉聽納臣自惟遭遇陛下不以臣不肖擢臣置之諫垣者度陛下必欲激臣懦𠂻使之夙夜恐懼思其所以圖報也今豺狼當路姦惡在朝臣若持祿取容畏憚緘黙不為陛下言之則是臣有負陛下任使矣臣何面目復見陛下乎此臣所以寧犯顔竭忠而死不願箝口持祿而榮萬一開悟聖聰屏去姦惡使朝廷清明聽斷無惑召來和氣天下大安豈獨愚臣惓惓之望朝論上下端人正士以朝廷為憂者莫不有此望也轍有六事而陛下不以為過此恐陛下以轍兄弟並有文學所以眷奬之厚而用轍之堅也果如此則尤不可也陛下豈不知王安石章惇呂惠卿蔡確亦有文學乎而所為如此若謂轍兄弟無文學則非也蹈道則未也其學乃學為儀秦者也其文率務馳騁好作為縱横捭闔無安靜理致亦類其為人也比王安石則不及當與章惇蔡確呂惠卿相上下其所為美麗浮侈艶歌小詞則並過之雖轍亦不逮其兄矣兄弟由此故多得名於戚里中貴人之家其學如此安足為陛下謀王體斷國論與共緝熈天下之事哉王安石以文學進而天下擾擾此陛下之所知也當時呂誨大奮忠義屢疏安石謂亂天下者必此人也又曰必無安靜之理皆果如其言此亦天下所共知也陛下若恱蘇轍文學而用之不疑是猶又用一安石也轍以文學自負而剛狠好勝則與安石無異矣安石進而韓琦富弼司馬光不能並處相繼罷去何哉蓋趣向不同而所見者異也正人皆去故安石得以援引同類則呂惠卿章惇蔡確接迹居廊廟故天下擾擾此亦陛下之所知也今陛下顧轍之厚而用轍之堅臣恐宰執之間自非貪榮茍祿有如韓琦富弼司馬光之人不能與轍並處有相繼而去者矣又况復有睚眦者乎則轍於私計得行援引朋邪又如安石之引惠卿惇確共處廟堂則天下之事又不可知也此皆治亂所繫非同尋常彈奏庶官違法害公之事而已臣今所言上可以繫朝廷安危下可以繫生民休戚此事甚大不可不慮也臣是以忘身捐命不避禍患而為陛下言之惟望陛下深加省察斷自宸𠂻檢㑹臣前後章奏降付三省早賜罷轍則天下幸甚集賢校理祕書郎陳察為太常博士辛亥詔已令供備庫使誠州刺史楊昌逵知誠州供備庫副使楊昌壽同知誠州自今知州闕遷同知州充無即以前知州子孫充同知如無子孫即令新知州選擇前知州族内忠順協力之人其同知州闕即以前同知州子孫充如無子孫令知州於同知州族内選擇忠順協力之人令荆湖北路都鈐轄司遇有闕即保明以聞五年十二月十六日可考是日輔臣延和殿奏事畢右僕射劉摯留身曲謝因勸上以勤于學羣臣累年未聞徳音方垂簾之時陛下謙嘿固甚盛徳然於經筵宜頻有詢問將逐次所講所讀之書宫中詳閱或有議論即明日見經筵官訪問再令進說所貴講學之道日益聖徳簽書樞密院事王巖叟奏事罷留身曲謝太皇太后諭曰知卿材望故不次用卿更宜盡心以報朝廷巖叟進曰臣乆去言路不得欵對清光今欲小陳區區幸垂聽問何事巖叟曰陛下聽政以來納諫從善凡所改更務合人心所以朝廷清明天下安靜百姓無怨嘆之聲此成効也願信之不疑守而勿失則宗社千萬世之福也但願每於用人之際更加審察蓋邪正難辨辨之一差治亂所繫固有外與衆同而中懷異趣不以今日之事為然者惟伺間隙以幸反覆此等不可一日容於朝太皇太后曰此事裏面常說與官家只為官家未苦理㑹得卿更說與官家因少進而言曰陛下今日進聖學者正為要理㑹邪正兩字正人在朝則朝廷安人君無過舉天下有平治之理一邪人進朝廷便有不安之象非為一人遂能致此也蓋其類應之者衆上下䝉蔽人主無由得知不覺養成禍患耳太皇太后甚然之又進曰或聞曽有以君子小人參用之說以告陛下者果然如此乃誤陛下之言不可聽君子小人無參用之理聖人惟說君子在内小人在外則成泰小人在内君子在外則成否小人既進君子不肯與小人爭進惟自引去君子既去小人競進則危亂之基也不可不謹陛下常用心於此太皇太后曰㑹當得巖叟乃退張舜民因巖叟繫年錄誌其墓云六年二月拜樞密直學士簽書樞密公力辭詔遣近侍促之視事曲謝延和太皇太后諭曰知卿材望故不次進用公遜謝既而進曰陛下聽政以來納諫從善務合人心所以朝廷清明天下安靜願信之勿失則宗社千萬世之福也用人之際望更加審察邪正難辨辨之少差治亂所繫又少進而言曰陛下今日進聖學者正欲理㑹邪正兩字正人在朝則朝廷安人君無過舉天下平治邪人一進則朝廷有不安之象非謂一人便能如此乃其類應之者衆上下䝉蔽人主無由得知不覺養成禍患爾二聖然之公又進曰或聞有以君子小人參用之說告陛下者不知果有之否此乃欲深誤陛下也自古君子小人無參用之理聖人惟說君子在内小人在外則成泰小人在内君子在外則成否小人既進君子不肯與小人爭進自然稍稍引去君子去小人競進則危亂之基也此際不可不察幸陛下常用心於此端明殿學士禮部尚書鄧溫伯稱疾臥家固辭新命五上章乞補外癸丑三省進呈降詔不允初王巖叟勸劉摯可因溫伯自請遂出之摯曰待與渠當惡其意為呂大防右溫伯故也㑹大防謁告摯擕以進呈既復擕以下及大防出始同進呈皆相顧不言傅堯俞獨進曰欲且依前降指揮乃巻之而退先是巖叟又移書督大防摯及堯俞等答曰敢不以身任之然卒不果五月十八日丙辰大理寺言因舉官緣坐已經恩者如罪人不該原減聽減一等若再㑹恩從原減法罪人該特㫖及於法不以赦降原減者舉主自依赦降從之丁巳左朝請大夫張公庠為提㸃京東西路刑獄尋罷之與知州差遣坐前知深州公使庫違法也公庠罷提刑在四月六日今并書西蕃鄂特凌古男都軍主溪邦貝昌為化外庭州團練使邈川首領爪州團練使温錫沁男巴温為化外勝州刺史同管當邈川部族月等第支茶綵有差仍令范育告諭鄂特凌古使知優恩及諭温錫沁鄂特凌古屢欲召汝父子離邈川上青唐朝廷特與巴温除官以破鄂特凌古姦謀之意正月二十四日有此議今乃行之元祐四年正月邈川温錫沁男推恩妻封縣君六年五月鄂特凌古遣温錫沁入貢庸隴右錄云溪巴烏者嘉勒斯賚兄扎實庸嚨之孫扎實嚨子必嚕匝納之子也溪巴烏有深識初避禍居河南後益西走依隆博部又别出大酋温錫沁注云温錫沁仁温布之後世有邈川地又云鄂特凌古疑大酋溫錫沁被囚在七年八月蓋溪巴烏自别一大酋而温錫沁之子亦名巴温也講筵所言奉㫖進漢唐故事及史記事其間可觀事迹多已錄進請將稽古錄節次進呈以代漢唐故事詔依前㫖進故事五年七月十八日是日輔臣對于延和殿同問兩宫聖安候奏事已密院退蘇轍面奏云臣聞諫官論臣不已昨日又聞備錄奏狀申三省臣望輕徳薄不可以任執政臣欲乞一外任諭曰言官之言皆不當切勿輕入文字并進呈徐君平狀云言事無狀乞賜黜逐諭曰與一外任并楊康國亦與外任轍再奏言决不敢貪戀恩賜取辱天下今日更不入省退留身論事摯先與大防議同留及節議康國所備錄事六狀大要與初狀同意謂轍剛狠自任曽論衆執政不可使之共政恐懷疑相傾傅堯俞韓忠彦辨理斷案事堯俞不直而轍劾二人有二章又因及摯軰此蓋言者常事遂以為仇非也又言曽受張方平贈遺今乃舉王鞏報其私恩又言不合彈王覿朱光庭不合乞棄智固勝如二堡欲表裏趙卨又云轍他日必為王安石之亂法度引姦邪又云决轍去留不可謀於宰執蓋其間恐有曽誤陛下謂轍可任者有以嫌疑自處者有懷利心不肯忤陛下用轍之意者今須出於宸斷大概如此内論二堡及王朱事衆議以為得之他皆無理方軾轍困於流離方平愛其才有所資助此天下之義也豈可以為貨取也軾轍之所取非若方平者亦未肯受也此論鄙哉具以其事奏之諭以為然摯又奏果轍曽言及臣等今便以為讎臣等雖淺陋未至如此以轍為王安石此則事不相類又康國云恐衆執政畏避轍强相引而去天下之事又不可知亦無此理諭曰與一平平外任再奏曰康國之論雖過而其心亦忠諒願少寛容只與一在京差遣并徐君平亦待移動皆罷言路也俞之因從容論議人物願常以邪正為心辨察其人又因輔導聖志叩以宫中進學如何皇帝答曰見讀孟子論語又說及稽古錄再曰已降出從來未甞聞上徳音今聞是三語也太皇太后又說魏徴長孫無忌事乆之乃退逢密院上殿摯諭王巖叟使略謝上保全之意蓋已許罷君平轍隔門上馬衆勉之曰且只入文字不須居家否曰適已奏知遂出此並據劉摯日記増入三月二日蘇轍押入視事先是右僕射劉摯過都省左僕射呂大防不至大防為摯言欲間日入就當筆日故也摯以為若如此則兩揆於都省遂無聚議恐未安兼門下事簡三日一留亦無害况舊例已如此是日摯過都省大防亦至蓋覺前所云就當筆日始入為未安也大抵都省不可闕宰相又不可不集也問行官制後左相日日入省以門下無事爾右揆間日留中書自有法以中書事繁也元祐元年司馬光作相畫㫖小事聽左右丞批判并詞狀亦歸二㕔宰相可以精意於大事至三年四月大防及范純仁拜相遂以光之請為一時指揮事無巨細并訟訴一歸左右僕射收權則可謂之是則摯不知也今自上馬伏几案紛紛落筆惟虞不能畢至五六鼓已逼上㕔覽詞狀遂聚㕔矣舊中書密院不如此也徐當議復光之制此㨿摯日記増入不知後來竟復光舊制否當考
