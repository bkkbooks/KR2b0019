body:
  text: 續資治通鑑長編巻一百三十四宋李燾撰仁宗慶歴元年冬十月丁丑朔陜西轉運使卞咸請自今本司差官赴軍期而輙敢稽違及本處留不遣者並以違制論從之戊寅河北轉運司請調夫修諸州城凡二十一州從之時聞契丹將謀入冦也契丹謀入冦據稽古録修二十一州城據朔歴己卯詔前聞陜西調發隨軍糧草而民甚苦之自今軍士出征並令給糧隨身庚辰遣户部副使兵部郎中李宗詠供備庫使帶御器械王從政往河東相度復修寜逺寨右正言直史館同修起居注梁適往陜西計置糧草内侍右班都知王守忠奏乞令軍頭司自今外州募到兵士五尺五寸以上有材勇者並𨽻萬勝指揮從之知并州楊偕言今雖得强壯百萬恐未可以應敵請益本路官軍六七萬人詔報曰自昔邉防悉用土兵顧訓練何如爾所募强壯若能以時閱習與正軍參用何患不可以應敵邪始元昊入冦宻詔偕選强壯萬人策應麟府偕奏出師臨陣無紀律則士不用命今發農卒赴邉慮在路逃逸及臨陣退縮不禀號令請以軍法從事詔如其請并人大驚畏都轉運使文彦博奏罷之彦博明年乃為都漕此時未也當只是運副傳誤爾癸未鄜延都監种世衡請募青澗城土丁不刺面别名為一軍從之丁亥知并州楊偕言麟豐二州及寜逺寨並在河外與賊接界無尺帛斗粟之輸以佐縣官而麟州嵗費緡錢百萬今豐州寜逺寨已為賊所破惟麟州孤壘距府州百四十里逺在絶塞雖寜逺介二州之間可以為䇿應兵馬宿頓之地又其中無水泉可守若議修復徒費國用今請建新麟州於嵐州合河津黄河東崖裴家山其地四面絶險有水泉河西對岸又有白塔地亦可建一寨以屯輕兵又河西俱是麟州地界且不失故土見利則進否則固守之盖舊州勢危而兵寡多屯則糧不繼少則難守所以遷逺而就近非為蹙國之疆土也若謂麟州既遷則賊壓吾境是不知西賊遷徙鳥舉不能以久處設其來居必須耕鑿其地我於河西出偏師以撓之彼安能持自完之策哉故臣謂遷有五利不然則有三害省國用惜民力利一也内禦岢嵐保徳火山及嵐石府州汾河一帯賊所出路利二也我據其要則河氷雖合賊不敢逾河而東利三也商旅往來以通貨財利四也方河凍時得所屯兵馬五七千人沿河以張軍勢利五也今麟州轉輸束芻斗粟費直千錢若因循不遷則河東之民困於調發無有已時害一也以孤壘餌敵害二也道路阻艱援兵難繼害三也且州之四面屬羌遭賊驅脅蕩然一空止存孤壘猶四支盡廢而首面心腹之獨存也今契丹又與西賊共謀待氷合來攻河東若朝廷不思禦捍之計而修寜逺寨是求虛名而忽大患也况靈夏二州皆唐漢古郡一旦棄之一麟州何足惜哉上謂輔臣曰麟州古郡也咸平中嘗經冦兵攻圍非不可守今遽欲棄之是將退而以黄河為界也其諭偕速修復寜逺寨以援麟州戊子遣戸部副使李宗詠帯御器械王從善營度寜逺寨此據朔歴封皇后乳母長安縣君周氏為汝南郡君己丑御史䑓推直官秘書丞李宗易言奉詔之河東募強壯充軍其強壯避刺面多逃逸乞止刺其手從之實録在戊寅今從朔歴壬辰同判太常寺吕公綽言歴代郊祀配位無側向真宗示輔臣封禪圖曰嘗見郊祀昊天上帝不以正坐盖皇地祇次之今修登封上帝宜當子位太祖太宗配位宜比郊祀而斜置之其後有司不諭先帝以告成報功配宜從變之意每南郊撰儀既引祥符側置之文又載西向北上之禮臨時擇一未嘗考定請自今南郊祖宗之配並以東方西向為定詔可公綽又言郊廟尊罍數皆准古而不實三酒五齊明水明酒有司相承以為㸔器郊廟天地配位惟用祠祭酒分大中祠位二升小祠位一升止一尊酌獻一尊飲福宜詔酒官依法制齊酒分實尊罍有司取明水對明酒實於上尊禮官以為鄭氏注周禮五齊三酒惟引漢時酒名擬之而無制造請仍舊用祠祭酒一等壇殿上下尊罍有司毋設空器並如唐制以井水代明水酒正配位酌獻飲福舊用酒二升者各増二升從祀神位用舊升數實諸尊罍從之甲午徙判永興軍宣徽南院使忠武節度使陜西馬歩軍都部署兼經畧安撫縁邉招討使夏竦判河中府知永興軍資政殿學士工部侍郎同陜西馬歩軍都部署兼經畧安撫縁邉招討使陳執中知陜州竦雅意在朝廷及任西事頗依違顧避久之無功又與執中議論多不合皆上表乞解兵柄而諫官張方平亦請罷竦統帥執中又言兵尚神宻千里禀命非所以制勝宜屬四路各保疆圉與方平議論畧同朝廷是之於是兩人俱罷始分陜西為四路焉樞宻直學士起居舍人管勾秦鳯路部署司事兼知秦州韓琦為禮部郎中樞宻直學士刑部郎中管勾涇原路部署司事兼知渭州王㳂為右司郎中龍圖閣直學士户部郎中管勾環慶路部署司事兼知慶州范仲淹為左司郎中龍圖閣直學士禮部郎中管勾鄜延路部署司事兼知延州龐籍為吏部郎中並兼本路馬歩軍都部署經畧安撫縁邉招討使諫官張方平言涇原比四路最當賊衝王㳂雖莅官臨事粗著風績然未更重任恐不易當此劇賊又驟蒙奬擢即與三路宣力舊人同列必皆慊然于心乞且於三路擇取一人使代㳂處庶允協人望不從詔陜西轉運司度隙地置營田務乙未以知青澗城供備庫副使鄜延都監种世衡管勾東路營田詔三司副使自今並以先後入為次序其判押文移則先鹽鐡次度支次戸部先是三部副使缺即以次遷補不得久任而多廢事故降是詔丙申詔三司副使自今遭䘮者並如兩制例起復時鹽鐡副使張錫丁母憂而三司使姚仲孫請特起復之遂為故事丁酉審官院言近令臣僚奏舉河北河東陜西知州人數頗多欲令見任知州到任一年半差人替二年滿闕從之戊戌禁火山保徳軍縁黄河私置渡船己亥罷諸路銅符木契庚子詔殿前馬歩軍司應西界人先𨽻軍籍者具名以聞初夏州人韓懐亮更名福為神衞軍士樞宻院慮刺探朝廷機事乃下開封府鞫状而福自元昊未叛時内附𨽻神衞軍破白豹城有功補承局非元昊所使刺事者詔特遷一資仍令察捕諜人之在京城者而降是詔辛丑詔陜西用兵以來本路所入稅賦及内庫所出并留兩川上供金帛不可勝計而猶軍儲未備宜令逐路都部署司經置營田以助邉費壬寅知諫院張方平又上䟽言自元昊叛命以來王師數出無功濟其凶謀氣𦦨益盛今自陜西四路河東麟府逺近輸輓供給天下為之勞敝而解嚴息甲未可以日月期也臣嘗就自邉來者詢賊中事多云賊為冦三年雖常得逞然重於舉衆故必嵗年乃能一入連陷城寨未能有我尺寸之地也而絶其俸賜禁諸闗市今賊中尺布可直錢數百以此揣賊情安得不困夫外國得志則驕逆稍困則卑順然其業已與大國為仇儻有悔心勢未能自通誠朝廷雖欲招來而非時無名事亦難舉今因南郊大禮宜特推曠恩以示綏懐之意或特降一詔或著之赦文其辭意大略則曰夫王者以天下為度含生之類罔不亭育况朔方靈武河西五郡皆是王土頃自徳明以來克保外臣之節朝廷眷待恩禮至隆去年元昊遣使人來稱為本蕃推戴欲僣竊位號縁其附順三十餘年忽此奏陳不無疑駭見情未審遂至興兵使邉人不寜遭罹塗炭今親郊禮成慶澤大行乃眷西顧惻然軫念虧於撫育吾甚悔之自今夏州或有使人至邉願通奏朝廷毋得遏絶令邉臣受而上聞且泛告邉臣以謹守封畧勿事殺伐之意掲榜塞上或擇邉臣之有名望者單使以諭上㫖足彰朝廷徳義之厚而無損威重之體且賊於其種落自尊大久矣向者求請但欲自稱烏珠之號當國者慮害不深吝此虛名遂成實禍陛下若徇其前請加以嵗時賜賚使天下知陛下深誠逺慮為生靈計至于天地鬼神亦當助仁而祐順若賊心悍然自恃凶愎不移亦足以驕怠彼情激怒我衆夫兵猶火也不戢將自焚使我怒彼怠賊有自焚之勢成敗可以為計矣議者或曰賊自入冦無不尅何困之有今雖招懐之徒見自弱賊肯革心乎臣以為昔遷賊之為邉患也號為驍悍有謀畧者陷朔方靈武國家䘮地千里而其衆亦大敝方是時繼遷為六谷所殺勢亦不支故其死時戒徳明曰爾當傾心歸順朝廷如一兩表未蒙開納但連上封章以祈見聽故徳明款附畢世不渝今賊非繼遷比也不幸自其初叛而我守邉匪人是故賊累得志而其衆嗜為冦之利向使我無大敗彼無大獲而以賊之虐用其下尋應疲潰况諸戎肯為助乎今國家處畫邉事守遏益固但將卒用命財用可濟姑使其來無所掠獲即賊必自窘今先開其歸路以為後圖縱賊未懐於國何損或曰賊雖致款戎心可保乎即有其實邉備得以撤乎臣以為昔景徳初契丹大入河朔先帝親駕北狩於澶州契丹始遣使議通和俄又其統軍達蘭中伏弩以死和議遂定于時邉陲可保戎心撤警備而謂繼好至於今乎在朝廷所以撫納控馭而已今邉事之費嵗課千萬用兵以來係纍殺戮不啻十萬人故自古以來論邉事者莫不以和戎為利征戍為害盖深念此也願陛下延召二府大臣商愚計而施行之上喜曰是吾心也令方平以䟽付中書吕夷簡讀之拱手曰公言及此社稷之福也上封者言近有停閑丁憂不及第人多逰邉停閑者不思已過致犯律法丁憂者不執親䘮唯務經營謁託不及第者不言文理訛謬無由進取凡得聚集例生怨謗况國家未寜此軰望降指揮三路都轉運司轄下州縣常切覺察無令聚集非土居者悉禁逰邉從之此據㑹要乃壬寅日事癸夘詔㳂邉臣僚宴㑹自今並毋得以女伎祗應從翰林學士蘓紳請也此據㑹要乙巳詔三班使臣以上遭父母䘮給假一月河東河北陜西邉任文武臣僚有以𦵏事請假者代還聽之知慶州范仲淹言臣奉詔議牽制賊兵毋令併出河東路今環州永和寨西北一百二十里有戩章㑹慶州東北百五十里有金湯白豹寨皆賊界和市處也鎮戎兵馬可以攻戩章鄜延可以侵金湯白豹環慶路出兵牽制唯此兩處賊如冦河東更令逐路分兵趨要害則牽制横山一帯賊馬不敢出别路賊若發河外近裏兵馬趨河東則環慶相去差逺恐不足以牽制也十一月丁未朔四方館使昭州刺史髙繼宣為恩州團練使捧日天武四廂都指揮使知并州河東路經畧安撫縁邉招討使代楊偕也偕嘗列六事于朝一罷中人預軍事二徙麟州三以便宜從事四黜冗帥五募武士六專補授且曰能用臣言則受命不然則已朝廷難之偕累奏不止乃罷知邢州先是詔并州副部署趙振率萬勝軍一萬二千人於麟府河東岸防托戊申上封者言振前在陜西以貪懦失士心而陷延州塞門寨又坐博易侵下故逺責潭州今復委以邉要望召見嚴戒勵之詔以章示振率萬勝兵據朔歴在十月壬寅今附見此實録無之麟府州民吏及僧道詣闕請益兵以禦西賊召對便殿賜茶綵慰遣之僧道仍賜紫衣師號壬子以秦鳯副部署殿前都虞候感徳軍留後李昭亮涇原副部署殿前都虞候眉州防禦使葛懐敏環慶副部署滁州團練使兼知慶州王仲寳並兼本路招討經畧安撫副使鄜延鈐轄兼兩路都廵檢使權本路副部署西京作坊使王信兼本路招討經略安撫都監詔江饒池三州鑄錢監鑄鐡錢三百萬緡以備陜西軍費涇原部署司請修葉爕寨募置強人弓箭手十指揮從之本紀云壬子置涇原路強人弓箭手今附此升府州威逺麟州飛騎為禁軍癸丑贈麟州寜逺寨主左侍禁王世亶為右屯衞將軍施州刺史知豐州左侍禁王餘慶為右屯衞將軍涪州刺史寜逺寨兵馬監押殿直王顯為右千牛衞將軍豐州兵馬監押三班差使殿侍孫吉為太子左衞率府率豐州指使三班借職侯秀為太子右清道率府率甲寅詔如聞淄齊等州民間置教頭習兵仗聚為社自今為首處斬餘决配逺惡軍州牢城仍令人告捕之獲一人者賞錢三十千乙夘以供備庫副使夀州兵馬都監李興為崇儀使麟府州縁邉都廵檢使仍詔諭本路興甞為西界偽團練使今特任之後或敗事即不坐所部官司之罪右正言直集賢院田况言鎮戎原渭地方數百里嘗被西賊冦鈔無復農作今竭闗中之力耗都内之錢纔可贍延州保安軍糧芻之費若更供億他路則邦計危蹙可憂臣謂宜以賊馬所踐無人耕種之地大興營田以新揀退保㨗軍每五百人置一堡等第補人員每三兩堡置營田官一員令以時耕種農隙則教習武藝以備戰鬬今老弱罹殺害而壯者悉被驅虜將來縱有歸業皆家貲蕩然不能自耕其田土並官為收買之如願復舊地者以官所種田苖半給之庶㡬農田不荒而邉計可紓也丙辰以京城榖貴發廪粟一百萬斛減價出糶以濟貧民辛酉詔免諸蕃太廟陪位其宣徳門景靈宫門外及南郊壇立班如故詔河東經略司招諭麟府州界熟户蕃官馬崖西界首領拉旺唐龍鎮首領來守順府州界廵檢宻拉等昨為昊賊脅從過西界而能挺身自歸者當除節度觀察至刺史仍以錦袍帯賜之詔延州若元昊專遣人投進表章即且拘留之先具事宜以聞若令偽官持私書至州須候朝廷處分然後報之始用張方平議也甲子朝享景靈宫乙丑享太廟奉慈廟丙寅祀天地於圜丘初諫官張方平言郊壇正位褥以黄配位飲福褥以緋自小次至壇上諸位黄道褥以黄及踰褥位執事升避回旋衣拂神位請去壇上黄道又設小次特起近年皇帝奠幣登獻每降即就而小休侍從左右輙坐其後請去之或但撤帷蔽下禮官定壇上黄道拜位飲福改用緋執事無避壇下黄道拜位解劍望燎仍舊設小次盡去四面帷蔽及是上不御小次撤壇下黄道褥履地而升易拜褥用緋壇上緋褥亦不用載於儀制本志載此事但依因革禮少削去繁文耳然畧無詮次故事或差失今仍用因革禮改定不用緋褥謂壇上也志乃無壇上字若壇下則固緋褥矣又按張方平集此議實出方平今特録之大赦改元蠲陜西來年夏租十之二麟府州今年夏秋租及來年夏租保安軍今年秋租盡蠲之元昊背惠以來屢求歸附然其欲緩我師專為譎詐是以拒而弗授况河西士民素被王化朕為之父母豈不閔傷自今仰邉臣但謹守封疆精練軍伍非因戰鬬毋得枉殺老㓜及熏燒族帳國朝將帥之臣素有捍邉勲名者委中書門下求訪其子孫特與録用自今功臣不限品數賜私門立㦸文武臣僚許立家廟已賜門㦸者仍給官地修建令有司檢詳制度以聞張方平傳云録用功臣復加賚戍邉守將功臣立私廟賜㦸凡九事皆方平建白開封府進士縁外州舉人冒貫鄉户致本府人解送全少其進士兩舉者令召命官三人并本縣官吏委保聽直赴省試外州解額令有司勘㑹特與増添昨言邉事試中授司士參軍文學長史年六十以下者並許赴銓投狀以所試判分三等注權陜西縁邉次邉近地主簿尉如一任無贓私及公罪至徒除本路正官或犯公私罪至徒以上次任依舊京東淄濰青齊沂宻徐州淮陽軍並係𣙜鹽地分近經災傷人戸貧困特放通商止令收納稅錢兩州鹽井年深鹹源不發并有己廢鐡冶水磑而人户虛納課利又西川近增鹽價致民乏食并梓遂二州遇閏年二稅上逐貫添納閏月稅錢並特與除放京東宻登二州皆煑海為鹽宻州場一登州場四南京及兖鄆曹濮濟單廣濟七州軍食池鹽餘皆食二州鹽官自為市禁民私販及淄濰淮陽等八州軍皆弛禁遂罷宻登嵗課第令户輸租錢其後兖鄆皆以壤地相接請罷食池鹽得通海鹽收筭如淄濰等州許之自是諸州官不貯鹽而嵗應授百姓蠶鹽罷給此據本志附見正月己未所書可考又張觀傳觀以今年十一月庚寅自澶州徙鄆州舊法京東通安邑鹽而瀕海之地禁私煑觀上言利之所在百姓趨之雖日殺于市恐不能止請弛禁以便民嵗免黜配者不可勝計然則兖鄆得通海鹽必由觀請也但不得其時爾癸酉權置階州通判一員乙亥賜陜西縁邉弓箭手保毅軍南郊特支錢是月梁適自陜西還知慶州范仲淹附奏攻守二議曰臣竊觀西事以來毎議攻守未見適中或曰必行進討以期平定臣謂諸路進討則兵分將寡氣不充盛絶漠風沙迷失南北饋運輜重動有鈔掠賊之巢穴夐阻河外非竒將不能襲至若冦邉常併兵來擾一路每有朝㫖令入界牽制其如將帥方畧非有素定茫然輕進不知所圖但求虛弱之處以剽竊為功既不能大振兵威固不能少分賊勢此進討牽制之無效也或曰宜用守禦來則禦之去則勿逐臣觀今之守邉多非土兵不樂久戍又無營田必煩逺饋久戍則軍情以殆逺饋則民力將竭嵗月綿逺恐生他患此守禦之未利也臣荷國重寄曽無寸勞夙夜營營冀有所補而才識迂昧終無發明今採於邉人而成末議固不敢望其可用亦不敢謂其必行在朝廷以衆議參之擇其可否如無所取乞賜寢罷其議攻曰臣謂進討未利則又何攻臣切見延安之西慶州之東有賊界百餘里侵入漢地中有金湯白豹後橋三寨阻延慶二州經過道路使兵勢不接策應未逺自來雖曽攻取無招降之恩據守之謀漢兵纔囬邉患如舊臣謂西賊更有大舉朝廷必令牽制則可攻之地其在於此可用歩兵三萬騎兵五千鄜延路歩兵一萬二千騎兵三千涇原路歩兵九千騎兵一千環慶自選馬歩一萬除官軍外蕃兵更可得七八千人軍行入界當先布號令生降者賞殺降者斬得精強者賞害老㓜婦人者斬拒者併力以戮之服者厚利以安之逃遁者勿追疑有伏也居者勿遷俾安土也乃大為城寨以據其地如舊城已險而増修非守地則别擇要害之處以錢召帯甲之兵熟戸強壯兼其功役昨奉朝㫖令修縁邉城寨臣以民方穡事將係官閑雜錢并勸令近上人戸以雇夫錢散與助工兵士充食錢其帯甲兵士翕然情願諸寨並以畢功俟城寨堅完當留土兵以守之方諸舊寨必倍其數使范全趙明以安撫之范全今為騏驥副使慶州北都廵檢趙明今為東頭供奉官柔逺寨都廵檢使必嚴其戒曰賊大至則明斥候召援兵金湯東去徳靖寨四十里西去東谷寨八十里西南去柔逺寨八十里白豹西去柔逺五十里南去慶州一百五十里堅壁清野以困之小至則扼險設伏以待之居常髙估入中及置營田以助之如此則可分彼賊勢振此兵威通得延慶兩路軍馬易於應援所用主兵官員使臣勇决身先者居其前王信狄青劉拯范全劉貽孫張建侯可用策應者居其次任守信王逹王遇王文張宗武譚嘉震王守恩使臣中可當一隊者參於前後張信王進張忠郭逹張懐忠有心力幹事者營立城寨周羙張璨李緯楊麟劉兼濟張繼勲臣觀後漢段紀明以騎五千歩萬人車三千兩錢五十四億三冬三夏大破諸羌又觀唐馬燧造戰車行則載甲兵止則為營陣或塞險以遏奔衝臣以此路山坡大車難進當用小車二千兩銀絹錢二十萬以賞有功將吏及歸降蕃部并就糴芻粟亦稍足用環州之西鎮戎之東復有葫蘆泉一帯蕃部與敏珠爾宻桑相接阻環州鎮戎經過道路敏珠爾宻桑之居北接賊疆多懐觀望又延州南安去故綏州四十里在銀夏州口今延州兵馬東渡黄河北入嵐石却西渡黄河倒來麟府策應盖以故綏州一帯賊界阻斷經過道路已上三處内麟府一路臣不曾到彼更乞下本處訪問及畵圖即見山川道路次第也如此取下一處城寨平定則更圗一處為據守之策比之朝去暮還此稍為便穏其議守曰臣觀西戎居絶漠之外長河之北倚逺恃險未易可取建官置兵不用禄食每舉衆犯邉一毫之物皆出其下風集雲散未嘗聚飬中國則不然逺戍之兵久而不代負星霜之苦懐鄉國之望又日給廪食月給庫緡春冬之衣銀鞋饋輸滿道不絶國用民力日以屈乏軍情愁怨須務姑息此中原積兵之憂異於敵境也臣謂戎人縱降塞垣雖守當務經逺古豈無謀臣觀漢趙充國興屯田大獲地利遂破先零魏武於征伐之中令帯甲之士隨宜墾闢故不甚勞大功克舉數年之中所在積粟倉廪皆滿唐置屯田天寳八年河西收二十六萬石隴西收四十四萬石孫武曰分建諸侯以其利而利之使食其地之毛實役其人氓之力故賦稅無轉徙之勞徭役無怨曠之嘆臣昨在延州見知青澗城种世衡言欲於本處漸興田利今聞僅獲萬石臣觀今之邉塞皆可使弓手土兵以守之因置營田據畆定課兵獲羡餘中糴於官人樂其勤公收其利則轉輸之患久可息矣且使其兵徙家寨下重田地習地勢父母妻子共堅其守比之東兵不樂田利不習地勢復無懐戀者功相逺矣少田處許蕃部進納荒田以遷資酬奬或量給與價直儻朝廷許行此道則委臣舉擇官員約古之義酌今之宜行於邉陲庶㡬守愈久而備愈充雖敵國時為邉患不能困我中國此臣所以言假土兵弓手之力以置屯田為守之利也然臣觀前漢髙帝之盛中有蕭張决勝千里下有百戰之師以四十萬衆困於平城乃約匈奴和親至髙后文景代代如之不絶其好而匈奴屢變往往犯塞殺戮吏民不勝其酷至於書問傲慢下視中國而人主以生民之故屈已含容不為之動孝文即位將軍陳武請議征討以益封疆孝文曰兵凶器也難克所願動必耗病謂百姓逺方何今匈奴内侵軍吏無功邉民父子荷兵日久朕動心痛傷何日忘之未能消弭願且堅兵設候結和通使休寜北陲為功多矣且無議兵故百姓無内外之徭得息肩於田畆天下富實鷄鳴犬吠煙火萬里可謂和樂者乎司馬遷以文帝能和樂天下協於大樂故著於律書為後代法臣謂國家用攻則宜取其近而兵勢不危用守則必圗久而民力不匱然後取文帝和樂之徳無孝武哀痛之悔則天下幸甚仲淹奏攻守二議據奏議第九巻末再奏約和議云二議在十一月内奏今附月末仲淹又言臣近奉朝㫖令多方擘畫牽綴西賊不令往河東作過臣塞外時寒且令將佐於邊上張勢續為延州已出兵打金湯寨計㑹本路同進本路將佐恐賊界併力禦敵延州軍馬所以須至入界内環州都監郝緒於安塞入界輸折人馬由臣不能節制甘俟典憲然理有利害不敢不言臣切見西事以來每遇賊馬併來一路作過則朝廷指揮諸路入界牽制賊勢所獲甚㣲所損頗大只如山外事宜諸處入界牽制内慶州折却使臣軍員兵士一千餘人衣甲器械不少今來河東事宜諸處亦擘畫入界牽制内環慶又折却使臣軍員兵士四百五十餘人器械未知數目縁軍陣出入前後左右須藉得力將佐分在諸路每出軍陣前後左右強弱不副遂致誤事臣自慶州已覩朝廷兩度差除中使督促令擘畫入界牽制臣雖稱未利其如鄰道出兵遞相計㑹諸將上畏朝㫖不敢不進亦有將佐貪僥倖之功惟務刼掠朝去暮還十度得功不補一敗徒費恩賞邉事何涯望朝廷深察更不差中使督促諸路輕易入界臣已附梁適上奏如賊馬大入須至令牽制必於鄰道抽選得力將帥軍馬聚攻一處庶少敗事仍起寨城據其要害如此牽制或可成功如賊不至大入則各務静守飬勇持重以待冦至臣之愚見不出此謀更自朝廷詳酌郝緒出界輸折實録不書今附見十二月丙子朔加恩百官進封宰臣申國公吕夷簡為許國公中書樞宻院言京東西路所募宣毅軍令逐路各選萬人赴京師𨽻禁軍從之丁丑司天監上所修崇天萬年厯封府州土地神為靈祐廟本州言昊賊圍城神告州人以賊去之期也戊寅詔陜西四路部署及轉運使並兼營田使轉運判官兼管勾營田事庚辰代州言契丹舊封界在蘇直等見耕之地而近輙移文欲以故買馬城為界慮寖有侵耕不便詔本府牒諭之癸未詔三司鑄慶厯元寳錢知永興軍資政殿學士吏部侍郎范雍為資政殿大學士尚書左丞始雍修完軍城或言其非便下詔止役雍逆詔而趣成之及敵犯定川邠岐之間皆恐獨永興不憂冦修城據本傳附見甲申翰林學士承㫖丁度直史館同修起居注梁適同三司放天下欠負鄜延副部署龍神衞四廂都指揮使康州防禦使許懐徳為秦鳯副部署懐徳坐出塞討賊逗遛不進所部兵夫棄隨軍芻糧法當奪官以更赦止徙他路令自劾之樞宻院言環慶副部署王仲寳等破金湯等城斬首才二十七級而官軍戰没者四十九人深慮戎人復來犯邊欲令鄜延路豫設備禦從之乙酉降右班殿直韓宗謹為三班借職初其從父遂為延州栲栳寨主戰死其妻張冒以宗謹為子得官至是事覺詔以遂無嗣特降補之録通泰等州都廵檢東頭供奉官趙兼遜子充為三班借職章為三班差使殿侍以兼遜捕海賊鬬死也丙戌徙秦鳯鈐轄東染院使髙繼元知隴州知秦州韓琦言繼元在邊不協軍情故徙之禁縁邉臣僚私市馬闕馬者官為給之丁亥涇原都監内殿崇班閤門祇候專管勾籠竿城事王文為内殿承制以文破當羅等族斬首二百四十級特遷之復西頭供奉官王秉為閤門祇候專管勾籠竿城事秉嘗坐失律奪職為渭州監押既更赦而知渭州王㳂且薦之故有是命戊子大理寺丞宋回為内殿崇班管勾陜西路營田己丑翰林學士王堯臣等上新修崇文總目六十巻景祐初以三館祕閣所藏書其間亦有謬濫及不完者命官定其存廢因倣開元四部録為總目至是上之所藏書凡三萬六百六十九巻然或相重亦有可取而誤棄不録者庚寅以提舉修總目官資政殿學士禮部侍郎張觀右諫議大夫宋庠翰林學士兼龍圖閣學士兵部員外郎知制誥判集賢院王堯臣翰林學士兼侍讀學士起復兵部郎中知制誥判昭文館聶冠卿兵部員外郎知制誥郭稹並加階及食邑有差編修官太常博士直集賢院吕公綽為工部員外郎殿中丞天章閣侍講史館檢討王洙為太常博士館閣校勘殿中丞刁約太子中允歐陽修著作佐郎楊儀大理評事陸經並為集賢校理管勾三館祕閣内殿承制王從禮為供備庫副使入内供奉官裴滋候御藥院滿日優與改官髙班楊安顯為髙品張觀宋庠雖在外以嘗典領亦預之陳經本姓陸其母再嫁陳見素因冒陳姓見素卒經服䘮既除乃還本姓見素河南人富弼為作墓誌其子釋鉉見素卒於景祐二年三月壬辰右諫議大夫權御史中丞桞植為翰林侍讀學士知鄧州以疾自請也龍圗閣直學士兼侍講禮部郎中權知開封府賈昌朝為右諫議大夫權御史中丞祕書丞茹孝標言同提㸃河東路刑獄供備庫副使陳鼎乃三司出職同提㸃陜西路刑獄内殿承制陳秉本翰林醫官兩路素多豪俊而俾二人居按察之任非所以重使命也癸巳徙鼎江南東路秉江南西路仍同提㸃刑獄議者謂二人不當任監司雖它路亦弗可也明年二月鼎罷又明年五月秉罷茹孝標為余靖所劾當考明年二月丁丑陳鼎為益州都監兼知利州三年五月戊子陳秉為荊南都監今附見甲午知永興軍范雍言文學參軍梁造請入西界說元昊歸款上謂輔臣曰造乃言邊事得官者恐其言語肆誕為夏人所輕不可許也韓琦言前日山外之戰諸將多亡没所部兵衆故不可一槩問罪今不立法制則各務生全豈復以諸將亡没為意若人數不多則軍法可必行請陜西河東諸路部署許置親兵百五十人鈐轄百人招討都監等七十人月加給錢二百其出師臨敵主將亡没者並斬從之詔陜西諸路部署司除見充保毅強壯人并弓箭手外别置䕶塞軍募熟山川道路曉蕃情善騎射者涅臂充二百人為指揮自備戎械就鄉閭習武藝每季一集州閱教無事放營農月給鹽茗有警召集防守即廪給之毋出本路范仲淹奏議第十巻言其不便或可刪附乙未進封乳母晉國慈夀福聖夫人林氏為韓國賢和佑聖夫人丙申右千牛衞大將軍宗實為右羽林衞大將軍丁酉詔京畿及京西路減價糶官粟以濟貧民進封才人張氏為修媛戊戌詔資政殿大學士自今定置兩員學士三員復祠部員外郎趙槩為直集賢院知滁州槩前坐失保任落職監當至是以赦復之所保任張誥也誥坐贓流海上槩責亦累年而憐誥終不衰人謂槩長者己亥并代縁邊招討經畧安撫使知并州髙繼宣管勾本路糧草知慶州范仲淹言沿邉寨主兵馬監押等自今請令部署司保舉舉非其人致城寨不守者雖經恩及代去毋得原罪從之庚子契丹國母遣左監門衞上將軍耶律元徳春州觀察使韓永錫契丹主遣長寧節度使耶律福太府卿韓保衡來賀正旦是嵗湖南溪峒知㣲州楊通漢來貢方物
