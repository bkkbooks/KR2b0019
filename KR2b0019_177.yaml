body:
  text: 續資治通鑑長編卷一百七十三宋李燾撰仁宗皇祐四年秋七月乙巳如京使趙瑜為京西鈐轄專管勾捉賊出內藏庫錢三十萬緡絹十萬匹下河北助糴軍糧至和元年八月可考丙午命知桂州余靖經制廣南東西路盜賊時諫官賈黯言靖及楊畋皆許便宜從事若兩人指蹤不一則下將無所適從又靖專制西路若賊東嚮則非靖所統無以使衆不若併付靖經制兩路而靖亦自言賊在東而使臣西非臣志也上從其言故有是命丁未户部員外郎兼侍御史知雜事陳旭為天章閣待制河北都轉運使已而言者為旭圖進非次遂改為禮部郎中集賢殿修撰河北轉運使旭改命乃庚申日壬子詔審官院廣西連賀端白等州近為蠻賊所踐宜擇長吏存撫其民又詔自京至廣州增置馬遞鋪仍令內臣一員提舉丁巳大風起西方拔木樞密院言蠻賊徒黨無慮二萬人日食米五百石非有資其糧食者則勢不可留須法外禁之辛酉詔犯者其首處斬從者配嶺北牢城舟車沒官初魏瓘築廣州城鑿井畜水作大弩為守備及儂智髙攻城甚急且斷流而城堅井飲不竭弩發輒中中輒洞潰賊勢稍屈知英州晉江蘇緘始聞廣州被圍謂其衆曰廣與吾州密邇今城危在旦暮而恬不往救非義也乃搜募壯勇合數千人委州印於提㸃刑獄鮑軻夜行赴難去廣二十里駐兵黃師宓者廣人也陷賊中為謀主緘使縳其父斬以徇賊聞之喪氣時羣不逞皆旁緣為盜緘捕得六十餘人斬之招懷其驅脅詿誤使復故業者凡六千八百餘人城被圍日久戰數不勝賊方舟數百急攻南城畨禺縣令蕭注者新喻人也先自圍中出募得海上强壯二千餘人以海船集上流未發㑹颶風夜起縱火焚賊船煙𦦨屬天大破之積尸甲如山即日發縣門諸路援兵及民户牛酒芻糧相繼入城城中人乃有生意每戰必勝而轉運使王罕亦自外募民兵遂入城益修守備賊知不可拔圍五十七日壬戌解去由清逺縣濟江擁婦女作樂而行攻賀州不克遇廣東都監張忠於白田忠戰敗被殺䖍州巡檢董玉康州巡檢王懿連州巡檢張宿賀州巡檢趙允明監押張全司理參軍鄧冕皆沒先是緘與洪州都監蔡保恭以兵八千人據邊渡村扼賊歸路㑹忠自京師至奪而將之臨戰謂其下曰我十年前一健兒以戰功為團練使若曹勉之於是不介馬而前先鋒遇賊奔忠手拉賊帥二人馬陷濘不能奮遂中標槍死甲子廣東鈐轄蔣偕擊賊於路田兵敗南恩州巡檢楊逵南安軍巡檢邵餘慶權宜融州巡檢馮嶽西路捉賊王興萇用和皆沒實録稱偕沒於路田本紀亦云按本𫝊及智高傳則太平場也實録本紀並誤今改之實録本紀並云七月甲子偕死甲子蓋二十日也據魏瓘九月奏則云今月六日今月六日蓋九月戊申實録亦載之又稱何宗古等三人同死與實録本紀七月所書不合當從魏瓘所奏實録本紀誤也除開封尉氏縣慶厯八年水災倚閣夏稅戊辰詔蠻冦未殄荆湖南路之民苦於供給其令安撫轉運司常存恤之無得以軍需為名妄有科率又詔秦州蕃官老疾者聽其子孫姪降兩資代之庚午詔罷防河軍士特支禁兵日給食錢五十八作排岸司三十舊制河水增七尺五寸則京師集禁兵八作排岸兵負土列河上滿五日賜錢以勞之曰特支或數漲數防又不及五日而罷則軍士屢疲而賜豫不及於是始更其制比特支才十一軍士便之辛未三司言開封府諸縣第四等以上户嵗供市草三百萬束請以登萊州端布折價千三百六十沂州匹布千一百上謂輔臣曰價太髙則恐傷民宜減端布為千二百匹布千錢考功議上故司空致仕張齊賢諡曰文定右僕射陳堯叟諡曰文忠太子太傅致仕辛仲甫諡曰康節贈吏部尚書溫仲舒諡曰恭肅贈户部尚書錢若水諡曰宣靖贈刑部尚書宋湜諡曰恭質右屯衛上將軍王嗣宗諡曰景莊威塞節度馮守信諡曰勤威自齊賢而下皆祖宗舊臣已葬而未諡其家始請之八月癸酉朔廣南西路轉運使主客郎中劉文柄削五任官責授均州團練使不簽書州事坐儂智髙反失備禦也詔如聞河東州軍長吏及主兵官多務因循令轉運安撫司具貪耗不職者以名聞甲戍三司言左監門衛大將軍循州刺史世清以病馬私易官馬計贓絹十六匹其罪合聽裁上曰雖則宗室可廢國法乎罰銅四十斤世清守巽子也丙子降前廣西轉運使司封員外郎蕭固知吉州坐不察儂智髙反也丁丑衛尉寺丞監新淦縣稅邱濬簽書滁州判官事初濬坐作詩譏時事謫官久之至是淮南安撫陳旭湖北提㸃刑獄祖無擇表薦之上曰濬無雅行唯以口舌動人今旭等稱其才無乃長浮薄輔臣等言濬所坐已更赦宜使自新故內徙之邱濬責官在慶歷四年五月是年七月陳旭已除河北都漕其淮南乃三年八月也四年正月除直史館㑹要仍帶淮南安撫不知何月還朝今依實録不復刪改楊畋既趨廣南又奏請刪康定行軍約束及賞罰格頒下并置檢法官已卯詔諭畋曰智髙乘鋭竊發二廣之民日傒官軍至故委卿節制以殄賊為期臨機趨變安用中覆今甲兵大集不能度形勢一舉撲滅乃奏請頒格令置檢法官此豈應速計耶賊或順風下海掠瓊管及海壖諸州厚戍則兵不足無備則冦乘之如能斷海道則不以日月淹速計也癸未詔開封府比大風民廬摧圯有壓死者官為祭斂之乙酉降廣南東路轉運使金部員外郎王罕為主客員外郎監信州酒初罕往潮州議鹽事聞智髙圍廣州即領還入城為守禦備其城所以得不陷者罕有力焉而朝廷未知也提㸃刑獄鮑軻自英州挈其孥欲過嶺北至雄州知州蕭勃留之乃日具奏召罕至雄州計事罕不來諫官李兑遂劾罕怯懦避賊端居廣州朝廷亦以罕奏不時達故及於責司馬光記聞載罕事尤詳或可增入丙戌贈張忠為感德節度使録其父率府副率致仕餘慶為左監門衛大將軍賜第一區給半俸終其身别賜銀四百兩絹四百布二百錢三百千封母賈氏為河內郡夫人弟下班殿侍願遷右班殿直閣門祇候官其子永夀永吉永德及其壻劉錞凡四人封長女為清河縣君丁亥以蕭注為禮賓副使仍權發遣畨禺縣事戊子資政殿學士兼翰林侍讀學士吏部尚書知汝州吳育為集賢院學士判西京留守御史臺育固稱疾求居散地故也育初乞盡落學士之職只守本官權領留臺上曰聞育以力學損心得疾且育文行可為人師表方欲召歸講席顧問而亟有此請宜特從之又曰若止守本官則俸入差減可特授集賢院學士以就全俸宰臣等對曰陛下知育之深待育之厚足以勵孤陋澆薄之輩天下聞者孰不競勸留臺舊不領民事時張堯佐判河陽民訟久不决者多詣育育為辨曲直判書狀尾堯佐畏恐奉行堯佐時判河陽今從堯佐𫝊育𫝊云河陽誤也詔廣南有捕獲儂智髙者授正刺史賞錢三千緡絹二千匹獲智髙母授諸司副使錢三千緡絹二千匹獲黃師宓黃瑋授東頭供奉官錢一千緡庚寅詔鄜州被水災人户特蠲今年屋稅及諸差役折變其軍士所借月糧及百姓口食並除之鄜州兵廣鋭振武二指揮戍延州聞其家被水災詣副部署王興求還不能得乃相率逃歸至則家人無在者於是聚謀為盜州人震恐知州薛向遣親吏諭之曰冒法以救父母妻子乃人之常情而不聽汝歸獨我帥不知變之過耳汝聽吾言亟歸收親屬之尸貸汝擅還之罪不聽吾言汝無噍類矣衆徑入拜庭下泣謝境內以安經略轉運司言其狀上嘉歎之上嘉歎之此據向本𫝊蓋因吕大防墓志也實録於九月甲辰載上論中書云云與本傳殊不同當考辛卯改新知秦州孫沔為荆湖南路江南西路安撫使內園使陵州團練使入內押班石全斌副之沔初入見帝以秦事勉之對曰臣雖老然秦州不足煩聖慮陛下當以嶺南為憂也臣覩賊勢方張官軍朝夕當有敗奏既而聞張忠死蔣偕敗帝諭執政曰南事誠如沔料宰相龎籍因奏遣沔行故有是命仍許沔便宜從事沔傳云明日聞蔣偕死按辛卯八月十九日也九月十四日丙辰偕始與楊畋等同被責方改命沔時偕固未死死者張忠也偕但敗軍爾王圭畢仲游墓志神道碑亦止稱偕敗不稱偕死沔傳誤矣今改之沔以南方兵連為賊所破氣懾不可用請益發騎兵且增選偏禆二十人求武庫精甲五千參知政事梁適折沔曰毋張皇沔曰前日惟無備故至此今指期滅賊非可以徼幸勝乃欲示鎮靜耶夫實備不至而貌為鎮靜危亡之道也居二日促行才與兵七百沔憂賊度嶺而北乃檄湖南江西曰大兵且至其善治營壘多具燕犒賊疑不敢北侵沔行至鼎州復有詔加廣南東西路安撫使沔加廣南安撫實録無有本傳即與湖南江西連書墓志云未幾神道碑云沔行至鼎州乃受廣南之命今從之知英州祕書丞蘇緘為供備庫使初廣州以賊遽至不及清野故賊得肆略後緘知賊將走分兵邊村扼其歸路布槎木巨石幾四十里賊至果不能前遂繚繞數舍入沙頭渡江由清逺縣道連賀州西歸摧傷者極多緘盡得賊所略去物癸巳户部副使兵部郎中傅永為契丹國母生辰使文思副使潘承嗣副之禮部員外郎兼侍御史知雜事張擇行為契丹生辰使西染院副使兼閣門通事舍人夏稱副之權鹽鐡判官都官員外郎蔣賁為契丹國母正旦使內殿承制閣門祇候李中謹副之太常博士直集賢院同修起居注判鹽鐡勾院韓絳為契丹正旦使東頭供奉官閣門祇候王易副之乙未降提㸃廣南西路刑獄職方員外郎李上交為太常博士坐失禦賊也丙申詔文臣御史知雜事以上武臣觀察使以上舉諸司副使至閣門祇候堪提㸃刑獄任使者各一人詔孫沔等若軍中須人任使聽於江南東路抽差詔川峽四路配軍元犯情輕合揀放者押送本營其不願者亦聽之己亥詔待制觀察以上舉文武官任邊者各一人其已在邊及歷路分都監者勿舉庚子詔倚閣中牟縣民所貸糧候嵗稔起催兵部員外郎直史館田京為工部郎中京前知滄州轉運使言京能招輯流民給田除租稅增户萬七千特遷之然傳者謂流民之數多不實又强與人田非所樂侵民稅地倣古屯田法其後法不成所給種錢牛價民多不償後守鞭笞督責至纍改不能平為公私患此據京本傳實録云招户八千二百九十一與本傳亦不同至和元年九月甲戍詔滄州田稅復如舊式與此相關當考九月甲辰詔今後文武臣僚每遇乾元節合奏得親屬者除期親依舊外大功親候遇郊禋許奏一名小功已下再遇郊禋許奏一名其每遇郊禋合奏得親屬者除子孫依舊外其餘期親候再遇郊禋許奏一名其大功已下三遇郊禋許奏一名從御史中丞王舉正與兩制臺諫等所定奪也此據成都府編録條貫册附見何郯皇祐二年八月奏疏可考內殿承制閣門祇候孫宗旦為荆湖南路江南西路都監遣內侍諭中書鄜州大水而知州薛向不能捍城至壞倉廩及害軍民廬舍今雖力能修完止可免責不當更議酬庸八月庚寅所書上嘉歎之與此頗異當考詔文武官磨勘私罪杖以下增一年徒以上二年雖犯杖而情重者奏聽裁贓罪杖以下增二年徒以上三年戊申詔鎮定等路水災其除積年缺負今年秋稅仍令轉運司差官減放以聞是日儂智髙殺廣南鈐轄蔣偕於賀州太平場莊宅副使何宗古右侍禁張達三班奉職唐峴皆沒偕始受命討蠻賊馳驛十七日至廣州城下入城揖州官未定數知州仲簡曰君留兵自守不襲賊又縱部兵馘平民以幸賞可斬也簡曰安有團練使欲斬侍從官偕曰斬諸侯劔在吾手何論侍從左右解之乃止及賊去廣州楊畋檄偕焚儲糧退保韶州軍次賀州賊夜入其營襲殺之偕舉動輕肆卒坐此敗甲寅桂宜栁州巡檢三班借職李貴擊儂智髙於龍岫峒兵敗死之知制誥胡宿言近命臣充翰林侍讀學士臣未宜當此職不敢入謝時宿居綸閣久次執政以禁林員足未議遷補又逼於物議因以金華處之而諫官李兊韓贄指言其失故宿懇辭然卒不許山南東道節度使同平章事賈昌朝初除母喪乙卯召赴邇英閣講乾卦帝曰將相侍講天下盛事昌朝稽首謝翼日手奏曰乾之上九稱亢龍有悔悔者凶災之萌爻在亢極必有凶災不即言凶而言悔者以悔有可凶可吉之義若修德則免悔而獲吉故但言悔用九見羣龍無首吉者聖人用剛健之德乃可决萬務當天下久盛柔不可以濟然亢而過剛又不能久惟聖人外以剛健决事內以謙恭應物不敢自矜為天下首乃獲吉也手詔褒答仍以所陳卦義付史館尋命昌朝判許州將行詔講讀官餞於資善堂判許州其日戊午今并書吕氏家孰記云昌朝講羣龍無首吉曰此聖人後其身而身光也丙辰降廣南東西路體量安撫經制賊盜起居舍人直史館同知諫院楊畋知鄂州落知諫院同體量安撫經制賊盜西上閣門副使曹修為荆南都監廣南東路鈐轄兼捉殺蠻賊宫苑使韶州團練使蔣偕為潭州都監初畋與修聞智髙徙軍沙頭將濟江即命偕棄英州焚儲糧及召內殿承制丌贇岑宗閔西頭供奉官閣門祇候王從政退保韶州仍移文御史臺及諫院故并責之時偕死既九日矣從政開封人也供備庫使蘇緘禮賓副使蕭注並為廣南東路都監兼管勾東西兩路賊盜事馬軍副都指揮使耀州觀察使周美卒車駕臨奠輟視朝一日贈忠武節度使諡忠毅自陜西用兵諸將多不利美前後十餘戰平族帳二百焚寨二十一招種落內附者十一族復故城堡甚衆所得俸祿賞賜多分其麾下有餘悉以饗勞之及死家無餘資丁巳命知桂州余靖提舉廣南東路兵甲案宋史作提舉廣南兵甲經制賊盜再降起居舍人直史館楊畋為屯田員外郎西上閣門副使曹修為洛苑使兼閣門通事舍人宫苑使韶州團練使蔣偕為北作坊使忠州刺史又降內殿承制丌贇為內殿崇班戊午賜自京至廣南西路馬遞鋪卒緡錢己未贈嶺南諸州死事者官有差知封州曹覲為太常少卿知康州趙師旦為光祿少卿覲妻劉避賊死於林峒追封彭城郡君加賜冠帔官其子四人追贈覲父修古工部侍郎修古妻陳潁川郡君師旦母長安縣君妻王賜冠帔録其子弟并從子三人妻王生女才數日遇賊棄草中後三日取之猶存始師旦嘗知江山縣斷治出已當於民心而吏不能得民一錢棄物道上無敢取及是喪過江山江山之人迎哭祭於路絡繹數百里不絶康州人立廟祭之及田瑜安撫廣南亦為覲立廟封州庚申儂智髙破昭州知州栁應辰棄城洛苑使廣西鈐轄王正倫與賊鬬於館門驛死之東頭供奉官閣門祇候王從政三班奉職徐守一借職文海皆被害州之山有數穴可容數百人民聞賊至走匿其中悉為賊所焚賊始執從政罵賊不絶口至以湯沃之終不屈而死辛酉太常博士直集賢院同修起居注韓絳為右正言上面諭曰卿朕所選用凡所言事不宜沽激當存朝廷事體務在可行毋使朕為不聽諫者絳前使江南所寬減財力賑救全活十數事創為五則以均衙前役斥陂湖利奪其錮者豫貧民罷信州民運鹽趣發運司以時輸送宣州守姦賄不法收以付獄州人歡賀使還稱㫖故有此命八月已差絳使北今又有此除當考癸亥詔外官有所陳事並附遞聞朝廷毋得申御史臺時州郡多以狀申御史臺欲其繳奏而必行之楊畋曹修經制蠻事既無功改命孫沔及余靖等上猶以為憂或言智髙欲得雍桂七州節度使即降樞密副使梁適曰若爾二廣非朝廷有矣上問宰相龎籍誰可將者籍薦樞密副使狄青青亦上表請行翌日入對自言臣起行伍非戰伐無以報國願得蕃落騎數百益以禁兵羈賊首至闕下上壯其言庚午改宣徽南院使荆湖北路宣撫使提舉廣南東西路經制賊盜事初欲用入內都知任守忠為青副諫官李兌言唐失其政以宦者觀軍容致主將掣肘是不足法遂罷守忠冬十月甲戍殿中丞胡瑗落致仕為光祿寺丞國子監直講同議大樂丙子詔鄜延環慶涇原路擇蕃落廣鋭軍曽經戰鬬者各五千人仍逐路遣使臣一員押赴廣南行營從狄青之請也青言賊便於乘髙履險步兵力不能抗故每戰必敗願得西邊蕃落兵自從或謂南方非騎兵所宜樞密使髙若訥言蕃落善射耐艱苦上下山如平地當瘴未發時疾馳破之必勝之道也青卒用騎兵破賊丁丑儂智髙入賓州知州國子博士程東美棄城己卯降空名宣頭劄子各一百道錦襖子金銀帶各二百下狄青以備賞軍功兵部郎中天章閣待制仲簡落職知筠州庚辰狄青辭置酒垂拱殿青既行上謂輔臣曰青有威名賊必畏其來左右使令非親信不可雖飲食卧起皆宜防竊發因馳使以戒之辛巳內降手詔付狄青應避賊在山林者速招令復業其乘賊勢為盜但非殺人亦賊所脅從能逃歸者並釋其罪已嘗刺面今取字給公憑自便若為人所殺而冒稱賊首級令識驗給錢米賙之其被焚劫權免户下差役見役仍寬與假使營葺室居凡城壁嘗經焚毁若初無城及雖有城而不固並加完築器甲朽敝不可用者善治之右正言韓絳言狄青武人不可獨任帝以問龎籍籍曰青起行伍若用文臣副之必為所制而號令不專不如不遣乃詔廣南將佐皆禀青節制若孫沔余靖分路討擊亦各聽沔等指揮癸未詔河北江南東西荆湖南北淮南兩浙路應災傷州軍委長吏募人輸米官為作糜粥以飯饑民其能用心救存者當議甄奬甲申沙州遣使來貢方物詔廣南東路應劫掠州縣已放今年夏稅其秋稅亦未得催理是日儂智髙復入雍州知州禮賔使宋克隆棄城克隆乘賊殘蹂之後不能營葺守備縱士卒下諸山寨殺逃民詐為獲賊一級賞錢十千又詐給親兵帖以為嘗有功及智髙再至克隆無以禦賊遂遁去丁亥詔曰比諸路饑疫相仍朕念徭賦科調之煩百姓未獲休息廬巷疾苦或不得聞轉運提㸃刑獄親民之官其思所以救治之術條列以聞庚寅上謂輔臣曰比日上封言政事得失者少豈非言路壅塞所致乎閣門通奏銀臺司登聞理檢院進奏院自今州縣奏請及臣僚表疏毋得輒有阻留辛卯詔三司凡嵗下諸路科調若不先期而暴率之則恐物價翔貴而重傷民其約民力所堪預令輸辦若府庫有備則勿復收市賜廣東西行營軍士特支錢壬辰樞密副使王堯臣言請析廣西宜容雍等州為三路以融栁象𨽻宜州白髙竇雷化鬱林儀藤梧龔瓊𨽻容州欽賔廉橫潯貴𨽻雍州其三州應並選武臣為安撫都監兼知州事以統支郡若蠻人入冦即三路率支郡併力掩擊之知桂州以兩制以上仍帶經略安撫使以統制三路鈐轄二員迭戍於雍州乃置走馬承受二員季入奏事益募澄海忠敢雄略等軍以足舊數四千人屯雍州二千人屯宜州千人屯賔州五百人屯貴州廣西江南湖南益以北兵嵗一替月給添支錢三百給鞋錢千荆湖南北廣東西路兵即二嵗一代之運全永道三州米以饋軍食其城壁之制當髙二丈廣八尺令本路轉運使判官提舉修築官吏有能完城壁𪠘宇營舍倉庫及招復户口者計其功遷一官其左右江巡檢及管界巡檢寨主與指使一員兵三百人常閲之詔狄青詳酌青以為便遂施行甲午詔比有軍卒邀車駕進狀而衛士失呵止者其貸之上初幸景靈宫既登輦因令戒衛士今嵗天下舉人皆集京師如有投訴者勿呵止之及軍卒進狀衛士亦不之禁有司欲論罪上具以其事語輔臣而貸之戊戍淮南江浙荆湖制置發運使侍御史許元為刑部員外郎天章閣待制庚子罷廣州嵗貢蜜煎果子已在道者留所至州軍公用其齎送牙校兵丁即遣還十一月壬寅朔日有食之甲辰詔司天監翰林天文院以唐戊寅麟德大衍五紀正元觀象宣明崇真八厯及皇朝應天乾元儀天崇天四厯算此月太隂真食及時辰分野各具兩本以聞仍命知制誥王洙及編修唐書官劉羲叟參定以司天監言此月十五日太隂當食也明年三月洙言據司天監李用晦等稱十一月望月食十分七厯並同復圓在晝不辨辰刻惟驗起虧時刻內宣明算在丑正二刻儀天在丑正三刻應天乾元寅初一刻崇天寅初二刻大衍景福寅初三刻而其夜食寅初四刻惟大衍景福相近然景福算景祐三年四月朔日食二分而崇天乾元不食後果不食大衍厯算唐開元十二年七月戊午朔日食八分半十三年十二月庚戍朔日食十五分之十三至日皆不食所以一行大衍厯議云假令理厯者因開元二食曲變交限以就之則所協甚少所失甚多用晦等亦不敢指定大衍景福為密伏緣厯算日月交食諸厯互有親踈不可常為凖的蓋日月動物豈不少有盈縮亦變常不定厯象必無全密所謂天道逺而人道邇古來撰厯名賢如太史公洛下閎劉歆張衡杜預劉焯李淳風僧一行等尚不能窮究况用晦等淺學止依古法推步難為指定日月所食踈密又據羲叟言古聖人厯象之意止於敬授人時雖則預考交㑹不必吻合辰刻故有修德救食之理天道神變理非可盡設謂必可盡耶則先儒不容自為踈闊又大衍等七厯所差不多法數大同而小異亦是遞相因藉乘除積纍漸失毫釐且辰刻更籌惟據刻漏或微有遲速未必獨是厯差按隋厯志日月食既有起訖早晚亦或變常進退於正見前後十三刻半內候之今止差三刻或是天道變常未為乖謬又一行於開元中治厯以大衍及李淳風麟德劉焯皇極三厯校日食三十七事大衍課第一所中才二十三麟德得五皇極得十如一行聰明博達時謂聖人宣考古今尚未能盡如淳風輩益以踈逺况聖朝崇天厯法頒用逾三十年誕布海內熟民耳目方將施之無窮兼所差無幾不可偶緣天變輕議改移詰其本原蓋亦出於大衍其景福厯行於唐季非治世之法不可循用詔仍用崇天厯法乙巳詔廣南東西路安撫轉運使應賊焚劫州縣倍加安輯之其造室廬竹木並蠲其稅丙午詔開封府皇城金吾司毋得以匿名文書上聞其輒送官者論如律戊申詔余靖所招九溪峒蠻願助王師者恐畜姦謀隂為賊用其與狄青孫沔察防之先是靖䇿儂智髙必援交趾而脅諸峒以自固因約李德政㑹兵擊賊又募儂黃諸姓酋長皆縻以職使聽節制或疑其不可用靖曰使不與智髙合足矣先是兵部員外郎知制誥何中立為龍圖閣直學士知秦州諌官御史皆言中立非治邊才己酉改知慶州中立奏曰臣不堪於秦則不堪於慶矣願守汝不報戍卒有告大校受贓者中立曰是必挾他怨也鞭告者竄之或謂曰貸姦可乎中立曰部曲得持短長以制其上則人不安矣知慶州刑部郎中天章閣待制張忭加龍圖閣直學士知秦州辛亥詔真楚泗知州自今令制置發運司連狀保舉知職事修飭代還當除提㸃刑獄癸丑都官員外郎郭申錫為侍御史申錫常知博州戍兵出巡有欲脅衆為亂者申錫戮一人黥二人乃定奏至上謂執政曰申錫小官臨事如此豈易得也京東道執濮州通判井淵詔移申錫知濮州至未閲月凶黨悉獲申錫大名人也甲寅詔江淮發運司自今非急務毋得出差官若當差者即毋得輒假以官舟違者本司及被差人皆以違制論乙卯詔狄青廣南民吏有與蠻人買賣物者斬訖以聞仍徙其家嶺北戊午免江西湖南廣南民供軍需者今年秋租十之三己未詔曰朝廷設爵所以勸有功也而奔競之俗茍得亡耻其何以厚風俗乎自今僥幸陳乞任使者中書樞密院毋得以劄子豫給之庚申賜故參知政事蔡齊墓次所建佛祠曰寶巖初齊母張氏請賜而中書以為無例上特賜之因謂輔臣曰朕臨御以來命參知政事多矣其間忠純可紀者蔡齊魯宗道薛奎而已宰臣如王曽張知白皆履行忠謹雖時有小失而終無大過李迪之心亦忠朴自守但言多輕發爾龎籍等曰才難自古然也上復曰朕記其大不記其小然皆近世名臣也戊辰知河南府太子少師致仕任布卒贈太子太傅諡恭惠庚午遣官祈雪詔知廣州魏瓘廣東轉運使元絳凡守禦之備無得茍且為之若民不暫勞則不能以久安其廣州城池當募蕃漢豪户及丁壯併力修完若無捍敵之計但習水戰冦至而鬬乃非完䇿時儂智髙還據雍州日採木造舟揚言復趨廣州也贈洛苑使廣東鈐轄王正倫為丹州團練使莊宅副使廣東都監何宗古為嘉州團練使張逵唐峴二人獨不贈當考諌官韓贄言發運使舊例雖嘗入奏不聞逐次改官今乞每嵗更不許赴京奏事只差一人附奏年額足數詔發運使自今押米運至京城外更不朝見此據㑹要十一月事十二月壬申朔廣西鈐轄陳曙擊儂智髙兵敗於金城驛東頭供奉官王承吉白州長史徐噩死之曙素無威令既與賊遇士卒猶聚博營中使承吉將宜州忠敢兵五百為先鋒倉卒被甲以前遂至覆軍丁丑樞密直學士給事中程戡為端明殿學士知益州初孟知祥據蜀李順起為盜嵗皆在甲午或言明年甲午蜀且有變上謂宰相龎籍曰朕擇重任之臣以鎮撫西南莫如戡者遂再使守蜀且謂籍戡還當置之二府可預告之籍曰陛下面諭戡則可臣不敢私與戡言也戡卒不知他日上果面諭戡戡謝曰臣亡狀䝉陛下委任其敢要寵而後行前守蜀者多以嫌不治城戡獨修築之龎籍事更當詳考㑹要云端明持拜惟戡及王素素持拜在治平元年七月壬午詔殿侍換文資者試詩賦各一道或通一經問義十道以六通為合格仍令判禮部與國子監官同考試之乙酉詔諸州衙前在沿邊應役者止令主管官物毋得管勾公用厨及茶酒帳設司違者以違制坐之戊子知桂州余靖言交趾今嵗當入貢屬儂智髙道阻不通纍移文乞㑹兵討賊而朝廷久未報觀其要約甚誠縱未能夷滅賊黨亦可使益相離二已於雍州備萬人糧以待之詔亦給緡錢二萬助兵費候賊平更賞緡錢三萬始朝廷不聽交趾出兵靖言智髙交趾叛者宜聽出兵毋阻其善意今不聽必忿而反助智髙因以便宜許之朝廷從其請已而狄青奏李德政聲言將步兵五萬騎一千赴援此非情實且假兵於外以除內冦非我利也以一智髙橫蹂二廣力不能討乃假蠻夷兵蠻夷貪得忘義因而啓亂何以禦之願罷交趾兵勿用且檄靖無通交趾使朝廷卒用青計䇿人亦服青有逺略云十一月甲子走馬承受李宗道言聞交趾將發兵二萬人由水路入助王師討賊兵數與狄青所奏不同今但存青奏削宗道甲子日所言己丑雪初上以愆亢責躬减膳見輔臣則憂形於色龎籍等因言臣等不能燮理隂陽乃上煩聖慮願守散秩避賢路上曰是朕誠不能感天而惠不能及民非卿等之過也是夕乃得雪庚寅賜喜雪宴於中書壬辰兩府及侍臣觀新樂於紫宸殿凡鎛鐘十二黃鍾髙二尺二寸半廣一尺二寸鼓六鉦四舞六甬衡并旋蟲共髙八寸四分遂徑二寸二分案宋史樂志作一寸二分深一寸二釐篆帶每面縱者四橫者四枚景挾鼓與舞每處各有九每面共三十六兩欒間一尺四寸容九斗九升五合重一百六斤大吕以下十一鐘並與黃鐘同制而兩欒間遞減半分至應鐘容九斗三升五合而其重加至應鐘重一百四十八斤並中新律本律特磬十二黃鐘大吕股長二尺博一尺鼓三尺博六寸九分寸之六絃三尺七寸五分太簇以下股長尺八寸博九寸鼓二尺七寸博六寸絃三尺三寸七分半其聲各中本律黃鍾厚二寸一分大吕以下遞加其厚至應鐘厚三寸五分詔以其圖送中書議者以為周禮大鐘十分其鼓間以其一為之厚小鐘十分其鉦間以其一為之厚則是大鐘宜厚小鐘宜薄今大鐘重一百六斤小鐘重一百四十八斤則小鐘厚非也又磬氏為磬倨句一矩有半博為一股為二鼓為三參分其股博去其一以為鼓博三分其鼓博以其一為之厚今磬無博厚無長短亦非也鐘磬非是蓋與范鎮六月乙酉所上書略同本志誤載為二年十二月事今從實録按李兑明年五月奏稱議者以鐘磬之制未中律度遂斥而不用復詔近侍詳定而實録闕之今附此先是邇英閣講尚書無逸帝曰朕深知享國之君宜戒逸豫楊安國言舊有無逸圖請列於屏間帝曰朕不欲坐席背聖人之言當别書置之左方因命丁度取孝經之天子孝治聖治廣要道四章對為右圖乃令王洙書無逸知制誥蔡襄書孝經又命翰林學士承旨王拱辰為二圖序而襄書之甲午洙襄皆以所書來上洙襄書無逸孝經寶訓實録不同今從寶訓乙未以台州司户參軍顔似賢為婺州蘭溪縣尉似賢真卿裔孫也丙申兵部郎中仲簡責受刑部郎中簡既落職知筠州而言者不已遂再責之詔荆湖江淮等路倚閣四等以下户今年未輸稅丁酉契丹國母遣保安節度使左領軍衛上將軍耶律元肅寧州觀察使劉需契丹遣奉國節度使蕭良德衛尉卿陸孚來賀正旦庚子諫官韓絳因對而言曰天子之柄不可移事當間出睿斷上曰朕固不憚自有處分所慮未中於禮而有司奉行則其害已加乎人故每欲先盡大臣之慮而後行之絳又言林獻可遣其子以書抵臣多斥中外大臣過失臣敢不以聞上曰朕不欲留中恐開隂訐之路苐持歸焚之林獻可景祐三年二月責漳州參軍不知今從何處與韓絳書當考河北忠順軍自太宗朝置𨽻緣邊戰棹巡檢司慶厯七年夏竦建議與正兵參戍八年以水沴多逃亡者權益正兵代其闕額是嵗權放業農候嵗豐如故自後遂不復補
