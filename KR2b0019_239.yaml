body:
  text: 續資治通鑑長編巻二百三十五宋李燾撰神宗熈寧五年秋七月己卯兵部郎中韓縝為天章閣待制河北都轉運使初議用縝王安石請與修撰上曰縝亦無大罪今復待制如何安石曰縝虐殺一命官豈得無大罪姑竢赦乃復亦不為晚上曰秦州因循弛慢縝獨盡力安石曰惟辟作福若陛下為其不因循特與之則惟陛下命但恐不免致人言耳上曰致人言奈何安石曰陛下既為其不因循特與之則不可因人言却改易上曰善權提㸃成都府路刑獄張唐民提舉保甲存此要見成都路時已行保甲法辛巳詔河北西路馬軍新額已足如有人材及等様目願置馬投充者並特招刺候有闕撥入額壬午招以𣙜貨物務為市易西務下界市易務為東務上界詔開封府日推判官一員監勘公事以御史蔡確言府中毎有訴訟官吏止畧取問而所不能決者即付司獄謂之入紗子鞭笞束縛既得以自專徃徃顛倒曲直使無罪誣服一有飜異復加鍜錬益甚於前陛下仁愛元元去其疾苦欲使窮陬遐服政平訟理而近在京師咫尺觀闕民寃吏横如此安可不加整治故有是詔確又言權京西轉運使吴幾復在部二年因循不職舉動驕恣衆所輕鄙去夏廵歴至許州陽翟縣寓止程戡家戡之諸子皆出官惟戡寡妻與婢妾同居幾復託以連姻留飲數日沾醉失度顛倒衣冠道路傳笑是時權提㸃刑獄賈青至彼亦預其㑹乞加顯絀詔令京西北路相度差役官蔡天申體量以聞朱本云係進呈訖無行合刪去樞宻院傳上㫖令中書改保甲上畨法十日為一畨王安石言保甲十日一畨湏一年八月乃當一畨若令一月一畨即畨愈䟽又昨百姓投狀或乞半月或十日一畨既指揮十日一畨今才上畨便降指揮令一月一畨即恐百姓為人扇惑以為初令十日一畨今才上畨便令一月一畨相次又當令長上畨相次又令刺手靣為兵即恐有羣聚訴免且乞十日一畨當此時不從則背約失信從之則上令不行謂宜令十日一畨候其習熟然後徐與商量縁將來弓手亦可罷以保甲上畨代之一弓手之給可給兩人上畨又四城外廵檢尚有四千人候保甲漸成就亦可以保甲代之至時乃與議増上畨日數亦恐須分閑要月分閑月即令上畨二十日或一月農要之月即令只上畨十日上曰只恐上畨日少教閱難精熟安石曰今保甲法大閱事藝入等有等第免夫體量草及免役錢指揮上畨又以事藝較取錢物㐫年又以事藝得斛㪷賙給人自競勸私習事藝不必上畨然後就學今設科取學究學究用功至多然不煩驅就官學人自競勸者設利以誘之而已臣愚以謂保甲數年非特其藝勝義勇必勝正兵縁正兵雖拘之教閱然挽彊不及等即自絶於進取其教閱但應官法而已非有勸心也今保甲人人有勸心此所以終能勝正兵也上悅五月七日初議令保甲代廵檢兵上畨其上畨的時當考先是知制誥判司農寺曽布言陛下幸使田里之人因其暇日肄習武事而推恩奨其能者賜金復役蠲其常賦又擇其藝之優者親臨閱試升之班籍以備官使故不待家喻户曉而人人自奮以技相髙驩然趨赴而莫之能禦畿内盜賊為之衰息老姦宿惡更相檢察而無所容近日保户數以状請縣願分畨𨽻廵檢司習武技提㸃司以聞朝廷及司農寺而未敢輙議臣伏思三代以還比閭族黨之法既壊後世有為之君思有以及此而未能也陛下下尺紙之令不動聲色而朞月之間其效如此因民之欲而節文之使至於成就其有助於治豈曰小補之哉王道之政未嘗不繇此始也臣願下提㸃司及臣章送中書詳審如可付司農具為令於是詔主戸保丁願上畨於廵檢司者十日一更疾故者次畨代之月給口糧薪菜錢分畨廵警毎五十人輪大保長二都副保正一統領之都副保正各别給錢七千大保長三千日教閱夕比之當畨者毋得輙離本所捕逐劇盜雖下畨人亦聽追集給其錢斛事訖遣還毋過上畨人數仍折除其上畨日廵檢司量留廂軍給使餘兵悉罷應上畨保丁武技及第三等已上并記于籍遇歳㐫五分已上者第賑之自十五石至三石尋又詔尉司土畨保丁如廵檢司法尉司上畨如廵檢司法本志係之十一月今不别出曾布云云據兵志係之五年按布知制誥在四年七月今因密院𫝊㫖改法附見當考王安石白上髙遵裕欲以團練正刺史招摩正可惜如此摩正自以素倔彊又已是刺史縱就招納必索姑息難驅策不如厚以官職財利招轄約都克占等歸漢即摩正坐可禽取如此威申於外夷而轄約都克占軰以恩澤易駕馭驅䇿然此事但可以意喻韶等令相度隨機經畫上令召遵裕商量然後指揮上曰諒祚亦非常人本待用大兵脅屬西羗城武勝軍適㑹其死安石曰諒祚誠亦豪傑誅鄂特彭非有威斷豈能辦此乂收納中國人與之出入起居親厚多致中國物以娱其意此非庸人所及文彦博曰諒祚所収不過中國之棄人如景詢何足道上曰與諒祚謀城武勝者景詢也秦州自來常是前兩府或兩制作帥何嘗能謀如此事文彦博又曰如鄂特彭事亦非好事失人心上下乖離然後有此事上曰鄂特彭之彊非諒祚所致也癸未内侍押班河北同提㸃制置屯田使李若愚提舉奉天寺以左騏驥使亷州團練使閻士良代之若愚以疾請也御集七月十七日契勘轉官十月十四日又十七日又二十七日當考詔自今宗室過失犯杖以下委宗正司劾奏甲申寳慶公主薨輟視朝公主上第二女也母曰婕妤張氏生三歳而薨追封呉國公主戊子遣御史蔡確劾秦鳳路經畧司縁邉安撫司互訴事于秦州朱史云以前勘官杜純丁父憂故再遣確按王安石欲純所劾故再遣確純雖不丁父憂固亦當罷去朱史似為安石諱也今不取詔雄州歸信容城縣弓級自今無故不得鄉廵免致騷擾人戸遇探報有北界廵馬過拒馬河即委縣官相度人數部押弓手以理約欄從經畧使孫永請也時北人涉春月創遣廵馬越拒馬河而永奏以為北人苦鄉廵弓手故増廵馬若罷鄉廵則廵馬勢自當止朝廷從之先是王安石謂鄉廵弓手實無所濟但有騷擾若都罷邉界自静上曰前約彼無過河即罷彼未肯報安石曰我約彼廵馬不來即減罷弓手彼約我減罷弓手即廵馬不來兩相持所以不決今我不湏問彼來與不來但一切罷鄉廵弓手彼若引兵過拒馬河亦不須呵問彼若抄刼兩屬人户自須徑移歸徐理㑹未晚料彼非病風狂豈可非理自騷擾抄掠兩屬人户若不抄掠兩屬人户又必不敢攻取雄州任其自來自去都不省問復何所爭校馮京曰如此即彼湏占却兩屬人户安石曰必無此理然兩屬人户才四千餘若朝廷有大畧即棄此四千餘户亦未有損上曰要是吞服得彼即棄四千户何傷安石曰陛下富有天下若以道御之即何患吞服契丹不得若陛下處心自以為契丹不可吞服西夏又不可吞服只與彼日夕計校邉上百十騎人馬徃來三二十里地界相侵恐徒煩勞聖慮未足以安中國也自古四夷如今日可謂皆弱於四夷皆弱之時小有齟齬未嘗不為之惶擾若有一豪傑生於四夷不知何以待之上曰今契丹主雖庸然所馮藉基業大安石曰若無操畧國大適足以為之累縁大物大材不能運故也彼國大非吾所當畏已而雄州又言有兩逃軍報北界云南朝欲以九月十日發兵二十萬取燕京契丹見聚兵二十萬防托僉曰契丹倉卒㸃集二十萬亦難必無此理安石曰契丹已聚兵二十萬未必然然疑我侵取其地因蒐閱㸃集恐或有之盖聞朝廷經畧即不能無疑乂為逃軍所誤則宜其儆備也上以為然安石又曰今河北將帥未有可以待警急即恐未能勝景徳時自古論彊弱以將帥為急今河北将帥孰為勝王超傅潜軰上曰王超當時持重不出不為失計若出戰不勝即契丹更無後顧矣安石曰河北既如此若使契丹疑我有侵取之謀因儆備蒐閱訓練兵馬既奮之後又使人諜知河北空虛稍肆陵侮即未易枝梧雖上慿聖筭期於不能為大患然亦不得不以為念馮京曰契丹孱弱安能舉事安石曰契丹主自即位以來雖未見其材畧如何然能保守成業不失人心若使其儆備蒐閱訓練要非中國之利上曰然安石曰既知彼如此非我利即於小事不宜與争以生其疑隙如鄉廵弓手便合與罷昨見雄州奏分人户差役中國所占户多北人所占户少臣以既是兩屬户若要分冝與平分分外占得十數百户於中國有何利徒使其有不平之心又中國毎見契丹好生事争彊之状又如争鄉廵弓手朝廷但見邉吏奏北界差廵馬過來生事北界亦必但見邉吏奏南朝添差鄉廵弓手生事馮京固争以為陟罷鄉廵不便上從安石言令樞宻院降指揮罷之文彦博等乃議相度約欄如前詔詔出上復令追還同中書别進呈㑹孫永奏至與安石議畧同安石力主之上令盡罷鄉廵弓手安石曰甚善兩地供輸人户為弓手所擾極困敝以内地料之若差弓手在村必不自備糧食決至騷擾村民料彼廵兵更甚如此即人户困弊可知彦博等與京皆以為如此盡罷恐両屬户為北人所占若向時放稅便為北人所収不可復取安石曰時異事殊即應之不可一揆今觀北人惟欲無事非敢倔彊也如占差役人則我占人數比契丹所占甚多然契丹乃欲依見在所占人分定如廵馬來輙言南朝若罷鄉廵弓手則廵馬更不過河既前此無之近乃増差則生事之端在我邉吏非關契丹敢為非理今但罷鄉廵弓手更鋪北人必不差廵馬過河假令己罷鄉廵弓手北人尚差廵馬過河我都不與計校於事體有何所傷欲令縣官部轄弓手約攔臣愚以為亦不湏如此任彼廵兵過河我都不問彼必不敢冦掠人户即彼廵兵雖來有何所利彦博等與京僉以為恐彼遂占兩屬人户安石曰今兩屬人户供兩界差役若彼要盡占人户供差役令我更不得差役即方占得兩屬人户料彼未肯如此即全無理雖用兵與爭亦所不免若不如此即如何占得兩屬人户俟彼待我罷却鄉廵數月之後彼廵兵尚來不止即兩縣人户亦皆徳我而怨彼以彼為曲以我為直然後因其使來語之以此料契丹主亦必不容邉吏如此非理生事也彦博等固以為不可不約欄上從之朝廷既罷鄉廵而北界廵馬亦不為止盜賊滋多州縣不能禁廵馬亦不為止而盜賊滋多州縣不能禁此墨本舊語盖因宻院時政記也朱本遂削去今附存之庶不失事實㑹要邉防所載亦與墨本舊語同朱本輒削去盖為安石諱爾孫永𫝊敵縁趙用事聚兵連珠等寨亘四十里永勞而遣之獨不載請罷鄉廵當考據安石日録所云則約欄等語十二日竟如安石議削去而實録朱本云從宻院所請似與日録異當考閏七月九日張利一奏可參照王韶言討蕃部䝉羅覺以其搶奪西域般擦又不肯内附故也文彦博曰追究前事恐新附蕃户驚疑王安石曰以其不内附故討其搶奪若内附必不追究前事上曰結斡恰爾是也蔡挺曰新附不宜數有誅討必致驚疑上黙然樞院退王安石白上討不附乃所以結固附我者恐王韶必知出此上以為然己丑知河中府潘夙言前知猗氏縣大理寺丞徐濟因考訊賊李均致死勒停濟治縣亷幹偶以公坐停廢本自北界歸明今貧瘁不能自存乞賜牽復詔復濟見在官與小處監當庚寅編刺所奏諸禁軍逃走捉獲斬在七日内者減一等刺配廣南牢城首身者杖一百從之舊法五百料錢禁軍逃者滿三日處死初改為十日上疑其寛曰祖宗立法恐有意盖收拾天下無頼教之武藝若不重法繩之即生亂故也王安石曰所以重法繩之懼生亂也今所懼者相結逃亡為亂而已縁二者又已有重法若不相結逃亡又非逃亡為亂而逃者雖貸其死必不能生亂况又滿十日即不免死耶且禁軍所以逃走欲免為軍也其心必不欲止逃十日而已然則雖加七日然後死軍人必不肯以此競逃走而臣愚以謂無生亂長姦之實且足以寛可矜之人文彦博曰祖宗時才逃走一日即斬仁宗放改作三日當時議者已恐壊軍法安石曰仁宗改法以來全人命甚衆然於軍人走比舊不聞加多也上曰祖宗時用兵故湏嚴立法仁宗時天下無事自當改之在真宗時已當如仁宗時立法矣安石曰誠如此國初接五代四方皆畔渙之國山澤多亡命不從招喚之人則逃亡禁軍易以投匿今逃亡亦自易為捉獲即立法不當如國初時也彦博固言軍法臣等所當緫領不宜輕改恐如前代消兵或能致變安石曰蕭俛時天下兵至多民力不給不得不議消減但當時措置失當又幽州送朱克融等乞各與一州勿令歸幽州扇衆為亂而朝廷乃令克融等漂泊京師久之不調復遣歸此克融所以復亂河北也亦何預消兵事上乃令減為滿七日故有是詔墨本無此據晁補之作杜純行狀此議乃出於杜純純先為編刺所刪定官故也太子中允祕閤校理管勾秦鳳縁邉安撫司王韶為右正言直集賢院權秦鳳路鈐轄閤門通事舎人髙遵裕為引進副使落權字進士王夏為江寧府法曹参軍韶等並以招納蕃部特推恩而夏者韶母弟也始議推韶恩官其子而上欲慰其母心故先及其弟始欲轉韶兩官以太常博士直昭文館王安石曰韶功大恐博士未稱宜與司諫正言上從之上又言髙遵裕欲得一職名安石問上不知何等職名上曰欲得御帯文彦博曰御帶湏帶緫管方除蔡挺曰此是要為将來緫管資基兼自緫管使作管軍安石曰元贇昨來亦得御帶與緫管不相須若除管軍自繫朝廷㧞擢不作御帶亦不妨管軍彦博曰元贇是諸司使若要除却合令作諸司使上曰曹佾亦是横行帶御器械宻院猶遲疑不決上令與御帶遵裕除御帶未見月日據日録於七月十六日載此當考上問王安石義勇士如何安石曰奉㫖令臣弟安禮選舉相度觀臣弟必不能選舉恐合自朝廷差仍須候趙子幾京西回令與張京温同去乃濟事上曰如何只趙子幾偏了得安石曰宜先了河東一路河東舊制毎年教一月今令上畨廵檢下半月或十日人情無不恱又以東兵萬人所費錢糧且取一半或三分之二依保甲養恤其人即人理無不忻頼者若更減得舊來諸軍㤙澤及程試武藝又減武舉所推恩例併令人趨赴此即一路豪傑無不樂從此法凡欲用衆若法不合於衆心即難經久若衆心以此法為便即此法自然經久既行之久人雖破壊衆必不以為允如此乃為良法又今義勇湏三丁以上今當如府界兩丁以上盡收三丁即出戍出戍即以厚利誘之兩丁就於廵檢下上畨上畨如府界法大畧不過如此但要遣人與經畧轉運使及諸路長吏商量令知朝廷立法之意及要見本路民情所苦所欲因以寓法上曰鼓舞三路人皆成就人豈少安石曰此極天下一大事若成就即宗廟社稷安敵國無足畏者因論及宿衛盡是四方亡命姦猾非宗社長計上曰祖宗厚以財帛官職撫此軰固為此安石言五代之變皆縁此軰上曰今百年舊俗未革安石曰觀仁宗服藥時事即此軰亦似未能全然革心也馮京曰義勇雖云三丁以上今亦有已死一丁止存兩丁不曽差替者安石曰既有兩丁不差替必有三丁不差上者近聞義州義勇両縣户同其一縣得兩指揮一縣只一指揮即收刺有不盡處今若用府界保甲法即無收刺不盡必然更増見在人數安石又言義勇保甲為正長須選物力高彊即素為其鄉閭所服又不肯乞取侵牟人户若貧户即須乞取侵牟又或與富彊有宿怨倚法陵暴以報其宿怨也此叚據日録與兵志第二巻並同但語言畧有増損耳自馮京曰以下本志不載王安禮編修三路義勇條貫在五月二十二日是月十九日差劉坦等閏七月十四日十五日十八日當考辛卯詔賜故河北轉運副使王廣亷家眷二百緡録其壻姚大忠為郊社齋郎以判大名韓琦言廣亷營職憂悴以致殞身而身後别無子孫故也初廣亷死王安石白上曰廣亷雖有不至然亦宣力上曰此是首推行朝廷法令之人賜之宜厚故有是詔録昭州刺史張進孫覯為下班殿侍淄州刺史王貴孫起為三班差使兵部員外郎鄭文寳孫瑱為郊社齋郎編排録用所言進等嘗有功於國也詔在京商稅院雜賣塲雜賣務並𨽻提舉市易務東頭供奉官趙忠政言界河以南至滄州城雖有塘泊二百餘里其水或有或無夏秋可徒涉遇冬水凍即無異平地今齊棣間數百里榆栁桑棗四望緜亘人馬實難馳驟若自滄州東接海西徹西山倣齊棣植榆栁桑棗候數年間可以限戎馬然後召人耕佃塘濼益出租可助邉儲詔外都水監丞程昉察視利害以聞提㸃開封府界諸縣鎮公事吴審禮言廵檢司弓皆歲久敝壊不可用今保丁更畨教習武藝已下弓弩院給一石至一石二斗弓各五百箭二萬從之審院刑部大理寺言乞詳議詳斷法官直檢法官如新法試中人任滿酬奨乞依舊法人例推恩自選人改官充職不成資丁憂服闋與近地合入逺與次逺願再任通六年斷官通五年與家便通判己轉京朝官後不因負犯者替罷並當親民一任内議官五年當兩任仍毋得連併三任從之王安石白上陛下毎有所建立未嘗不致紛紛所以然者陛下不深察人情故也人情有嚮有不嚮陛下有所不察故人嚮者至少而事多爽侮如經制洮河事但差去将帥輙與王韶為異豈盡與韶争氣亦其利害必致於此臣請以事明之如向寳在秦州取錢騷擾蕃部陛下亦曽宣諭臣所以敢言然向寳為前後帥臣所稱以至朝廷人共稱之者以能背戾朝廷所為故也陛下以衆人所稱之故亦屢稱向寳如王君萬叶同王韶所為即必為帥臣所案朝廷人所毁向寳罪状明白陛下必無今日寵待亦必不免斥廢如王君萬但於将官地種菜罪至輕然以叶同王韶為朝廷幹事便被廢縱後以特恩免罪然其危懼已多如此則人孰肯趨赴陛下所為而不附下臣料太祖時人臣必不敢如此太祖必不容其如此乃所以濟大業也今陛下於不嚮之人毎務含容天下之人豈以為陛下含容但以為陛下不能照察為姦人所侮耳老子曰其下畏之侮之為天下王至為人所侮何以濟大業成天下之務今不嚮之人豈盡不曉事好為異見直縁敢侮而已上笑甲午河東經畧司言契丹大㸃集云防托漢界至召女真渤海首領自來㸃集未嘗如此上曰如何王安石曰此事惟須静以待之内自修補次及於邉王珪馮京皆謂必無慮安石曰無恃其不來恃吾有以待之吾今未有以待彼亦不可忽也上曰卿昨言但使彼知戒懼即非所宜良是也乙未詔左騏驥使果州團練使致仕折繼世卒於條致仕諸司使亡歿雖不該恩贈然繼世以蕃官捍邉有勞宜與特支四年三月甲辰可考司馬光日記熈寧四折年十月十三日吴積曰威明沙克弟亡在繼世所繼世以种諤夜引兵抵其居沙土窟中使其弟叩門呼曰官軍大集兄速降不則滅族克使内其手捫之少一指信之遂率數千户二萬餘口降己而見官軍少除大悔之沙克今為供備使髙州刺史又繼世以綏州功騏驥使果州團練使賞賜無筭去歳病風賜以御藥使醫守視繼世妖人馬志誠欲奉之發兵據青澗城指揮使拓拔忠諌捕之因下獄案騐久不決子華至延州斬志誠等二十餘人以繼世冇功不問趙卨奏以團練致仕遷之華州悉散其部落於諸族沙克之衆稍稍亡去今在者才百餘口丙申詔前任及致仕宰相使相樞宻使並給白直二十人前任及致仕参知政事樞宻副使簽書樞宻院事十五人致仕節度使宣徽使準此致仕諸部尚書留後觀察使十人樞宻直學士以上七人待制以上防禦團練刺史四人前此致仕白直未有定制樞宻院以為言故有是詔詔殿中丞劉珵著作佐郎李黼大理寺丞潘監奉禮郎汲光前縉雲尉郭逢原東明縣尉張元方分行滑鄭許曹陳亳等州與當職官排定保甲其條約並依開封府界例施行如官吏不職委司農寺及本路監司按劾逢原開封府也黄裳誌逢原墓云子儀之後父變宗閏七月十四十五十八日可考又詔司農寺増置丞主簿四員仍自今輪出入案察逐州保甲先是王安石白上曰臣前欲以近畿郡為畿輔因推行保甲者利在使趙子幾等按察官吏差易耳若付之諸路即恐諸路推行滅裂無以使四方觀法上曰不如令屬兵部置屬官令出入㸃檢又曰馮京欲且遲留候役事了如何安石曰此事既不擾人又聖人愛日亦須及時修營庶早見成效上曰曹州人喜為盜若習兵得無不便乎安石曰前時以匿賊為利今若用府界條約即人以捕賊為利為其喜為盜乃所以當用保法也既而安石又言令兵部管保甲恐百姓心疑将刺以為兵不如令司農領之仍便差官編近畿數州保甲且増置丞主簿令更迭出入案察保甲即農田水利常平差役皆可使案察也上皆從之陳瓘尊堯集聖訓門論曰神考欲置尚書省安石以為不湏安石欲建四輔神考以為不可三十餘年先訓未逺乃者都省之毀誰不流涕四輔之成誰不寒心此豈一京之罪乎都省之毀無敢救之者四輔之成無敢止之者亦豈特畏京而已哉安石之所欲為則雖甚害而必行其罔上之言則託於繼述其私營之心則獨尊王氏卞等之所謂國是者何事不然以此二事觀之可以見其初心矣今可以不早辨乎孔子曰成事不說既往不咎今尚書省之毁既已久矣四輔之成既已往矣而臣猶論之非為追說已成之事而追咎既往之人也實欲陛下察卞等國是之計而為我宋方來之慮者非特此二事而已也故臣著此于首篇以見臣尊堯之意尊堯餘言曰陛下欲知卞等顯戾先訓之二事乎神考欲建都省而安石以為不須安石欲置四輔而神考以為不可然而四輔之所以必成者因日録而成也都省之所以必毁者因日録而毁也臣於封事别奏論此二事以干天聽伏望萬幾之暇特賜聖覽又論毁折都省曰嘗謂卞等初意専以熈寧宰相為聖而不以元豐獨斷為是故其所欲繼述者熈寧而已嗚呼毁折都省亦一事也臣竊考日録神考欲復尚書省制度安石對曰亦不湏如此蔡京之敢毁都省上下皆名其罪矣然其事起於日録其謀發於蔡卞則陛下尚未知也臣故曰顯戾先訓者由蔡卞等又論建置四輔曰臣嘗謂卞等初意專以熈寧宰相為聖而不以元豐獨斷為是故其所欲繼述者熈寧而已嗚呼建置四輔亦一事也臣竊考曰録安石欲以近畿郡為畿輔因推行保甲神考曰不如只令屬兵部先訓如此可不紹乎蔡京違戾先訓必建四輔上下皆知其罪然其事起於日錄其謀發於蔡卞則陛下尚未知也臣故曰顯戾先訓者由蔡卞等樞宻院奏代州牒北界言邉吏侵暴事又北界牒言雄州修館驛作箭窻女墻敵樓生事王安石曰此誠生事上言非敵樓箭窻安石曰縱非敵樓箭忩不知館驛剏立四角砌臺又作女墻及墻窻何用若依自來修盖有何所闕上令依前降指揮折毁文彦博曰前來誠不合修今來若折毁便湏占地安石曰事但循常彼猶生事若彼别有規圗即與小小争校尤無所補若但以細故互相猜疑即我毎事循常彼無猜疑之理今邉隙數起正為我與彼所見畧同故也我以為若少寛假彼将别生事陵我故毎事稍異於尋常即湏争校彼亦以為若少寛假我我将别生事陵彼故毎事稍異於尋常即湏争校故我盖館驛稍異於常即疑我改作鎮添築寨而爭之不已彼若見得事情從我館驛内作敵樓箭窻有何所妨我若見得事情於彼事亦不湏每與争校上曰雄州生事亦不可縱須行遣安石以為誠如此然上亦不深罪張利一安石以為文彦博吴充隂主利一為之游說蔽蓋也戊戌東上閤門使樞宻都承㫖李評知保州仍領榮州刺史用罷都承㫖恩例也先是評坐同天節不令殿前馬歩軍司赴垂拱殿起居及判刑部杜紘不告謝兼失申舉為中書勅奏罷管勾閤門送宣徽院取勘及案具罸銅六斤評遂乞免閤門供職上不許王安石曰此乃評避中書㸃檢承前詔意恐中書推求其罪縁臣董正百官見左右近習有罪豈得不案陛下方尊寵倚信李評臣當避位上曰朕未嘗尊寵倚信評也但閤門樞宻藉評㸃檢簿書而已安石曰臣備位大臣案治小臣誕謾罪状明白小臣任事如故臣反受詰責誠難以安職惟罷臣則評自可不免閤門勾當上曰詰責那有是安石曰陛下前詔云煩費推求何日窮已臣豈不上體聖意如臣議上夀事但據理評議亦屢䝉陛下督過上曰上夀事或恐理有未盡處安石曰此極細事然陛下乃不及待且令中書改正以臣所奏實不見評有理評敢為誣罔蔽欺不但此此豈可復在人主左右臣聞樞宻院評作姦宄尤多顧臣不詳知本末不敢論奏中外之人其孰以陛下親信李評為可者上曰評固非忠良又無逺識今當與換何等差遣安石曰陛下雖知評非忠良無逺識臣雖知陛下聖質髙明然四方之人豈復知此但見陛下親厚評如此罪状明白猶待之不衰則天下姦邪安肯革而退聽王珪請與冀州上曰評父老與宫觀何如既而曰如此則又不離閤門珪曰罷都承㫖例亦合遷官上良久曰評以罪去官豈當復遷乃令與保州珪曰評若思過更年歲間却収用可也安石曰變詐小人若復親近但有虧損聖徳若陛下果能覺悟又安可復親近然此事湏陛下熟慮若以臣故彊勉斥逐則臣更有放横之嫌矣因言程昉及李若愚事曰臣前論李若愚姦罔陛下待之彌親後論李評欺誣陛下遇之彌厚不知陛下用臣以何為職業臣䝉陛下信聽當以臣素行無他然願陛下毎事考察臣若有一違負陛下則罪宜大於餘人以臣最獲親近故也程昉事見四年十月十六日初程昉以塞河工加帶御器械用故例入侍評不欲昉親近因立法都知押班帶御器械差遣在京者乃聽供職他則否時押班惟李若愚帶御器械惟昉昉疑評抑已遂訟評故安石以為言若愚先治塘泊有勞不自言及王臨奏塘泊圗上乃知之深嘉若愚不伐安石謂若愚大猾故為此以中聖意縁大臣與若愚交私若愚雖不自言必有為若愚言者陛下安可因此一事遽信之若愚前體量秦州事盛稱李師中誣罔王韶今陛下豈不察此也上又問都承㫖觧職恩例及進呈有除大將軍刺史者上曰刺史太優詔評領榮州刺史又曰評在閤門宻院多與人争觸怨怒何所利安石曰或以守道違衆觸怨怒或以招權竊威福托公直以自結人主觸怨怒其觸怨怒同其情則異如裴延齡欺罔徳宗獨信之者以其能變詐故也陛下憐評恐近類此上又言張琥論李評不合上殿此殊無理安石曰陛下耳目之官識見皆不足頼但采聽浮言不皆中理此臣所以尤願陛下詳擇熟慮是非枉直也若陛下耳目之官能為陛下别白忠邪即當為陛下論先王之道奉行中書故事而已何至紛紛與小人校辨林希野史云李評久侍上左右雖以戚里進然頗知書習典故多智數鮮有及者為閤門使又令樞宻都承㫖不用次補直以外官進自評始其幸於上中外無可比者與同列奏事必留身間雖不奏事上必獨與語踰刻上色未嘗不懽也評所聞外事大小悉以聞然而遭評䜛毁者不少矣閤門宻院吏苦評苛察雖執政亦不敢少斥其非徃徃隂賛其美結以自固諌官御史未嘗有一言及評上朝夕欲除簽書樞宻雖他人莫不度其将然自府界置保甲妨擾民情不樂畿内人得以私習武偹評亦極論其不可他日上語安石保甲事李評甚危言之安石始怒評敢輙議已日摭其過然評之怙寵未易動也熈寧五年以來評愈不平安石擅權專國上不得有所為屢攻其短上又時以其語對執政道之安石益怒㑹閤門悮排軍員等坐位安石請劾評等評愬於上以為此小事非閤門罪安石欲沮辱臣爾陛下毎有所黜即安石多方黨蔽黜者反進擢安石有所怒陛下雖明知其無過安石必欲加罪如臣是也上為之動但命劾閤門胥吏貸評等不問安石固請之於是御史紛然交攻評矣上猶未聽安石乃不入朝乞觧政事章凡數上上遣中人宣押入中書即時劾評安石乃留月餘劾状已上猶命特放安石勃然曰陛下始許臣以逐評臣乃留今放評罪何也臣願復去上不得已黜評知保州評父端願為評乞在京閑漫差遣又乞侍養不許上亦惜其逺去改知潁州評既斥又除曽孝寛為都承㫖不用武臣自此宻院官屬亦安石黨人矣嗚呼其慮逺哉希所云評悮排軍員等坐位必誤事具六月壬辰己亥知大宗正事宗旦等言宗室所投文字或違例數條退即生誣怨或情有可憐而例無其事或事渉違冒而理或可容乞自今有疑難事許上殿敷奏或許同見執政禀議從之館閤校勘檢正中書刑房公事沈括充史館檢討詔獲投匿名文字扇惑保甲者給賞錢五百千以司農寺言近有人於封邱縣北門以匿名牓扇揺保丁使不得安已檄諸縣宻行禽捕給賞更乞朝廷嚴約束故有是詔已而上批近差編排鄭滑等州保甲事觀今日匿名事府界人户尚有驚疑若更推之鄭滑恐人情未能安貼成就更緩可且再差人體測府界人情然後徐議此事王安石白上府界保甲昨日人人取状願上畨然後降指揮即人情無復驚疑上曰恐止取得保正保長状爾安石曰聞知陳留縣章楶云陳留縣止有兩户不肯供状然亦未嘗彊之觀此則非但取正長状若但取正長状或復有人户成羣自訴則官吏何以免責兼臣毎出郊祠召鄉廵耆壮體問臣家亦有外縣公人毎毎問其縣人情状何嘗有驚疑所以有貼匿名文字者必是自來居藏盜賊之人不便新法爾陛下但觀長社一縣捕得府界為保甲廹逐出外行刼之人至二三十人此等人既不容於京畿又見捕於輔郡其計無聊即專務扇揺他人而已今陛下聰明睿知曠世特出然一為姦人熒惑輒為之動今以十數萬愚民而欲扇惑之者非特一人而已如何欲其一皆安帖昨日聞已捕獲扇惑糾集人頭首根勘然至京者亦止有二十餘人而已以十七縣十數萬家而被扇惑驚疑者才二十許人不可謂多自古作事未有不以大勢驅率衆人而能令上下如一者今連十數萬人為保甲又使之上畨乃人人取状召其情願此乃以陛下每事過謹故須如此陛下誠思前代剏府兵乃為討髙麗黨項豈是所願但以勢驅之人不得已久之自聽服習以為常爾天下之事皆成於勢故老子曰物形之勢成之上曰討髙麗是隋煬帝此所以致叛安石曰討髙昌乃唐太宗事彼府兵亦豈所得已如今日令保甲廵檢下捕賊若任其自來則誰肯向前用命若以法驅之則又非人情願若止欲任情願即何必立君而為之張官置吏也且湯武革命名為應天順人然湯衆皆以謂湯不䘏我衆而湯告以必往誓之以孥戮湯所以為順人者亦不須待人人情願然後使之也今鄭滑事欲但令差去官先曉諭人情俟其通知然後編排爾上以為然安石又白上府界勾當保甲官即未見不忠信可疑者上曰昨聞人户斬指事惟曽孝寛言有之趙子幾乃不言何也安石曰斬指事乃蔡駰所說又子幾委蔡駰根問乃是因砍木誤斬指有數人參證甚明子幾令蔡駰就鄉村排保甲駰乃集人至縣郭外留滯三日其所以然蓋有所希向駰任襄邑尉十月有強盜二十四火竊盗一十火不獲子幾每欲案治但以其扇搖保甲人户故自嫌不行遣曾公亮為永興乃辟令掌機宜今保甲法上自執政大臣中則兩制下則盜賊及停藏之人皆所不欲然人情安帖如此則措置可謂盡矣兵志第二巻載此並與朱本同但先後或失次當從朱本自若但取正長状至不為多新本皆削去今復存之正月丁未軍士深詆朝廷注林希云云又閏月癸酉安石云云當井考詔文思副使折克雋内殿承制髙永亨閤門祗候曲珍各減磨勘三年右侍禁拓㧞忠減磨勘四年庄宅使李顒内園使燕達各賜銀絹五十餘推恩有差以與夏人首領商議自綏徳城界二十里立封堠修置把截堡寨畢也詔差鎮戎軍定川寨弓箭手廵檢趙普三川寨張進徳順軍中安堡馬倫通邉寨魏竒各領去年經畧司指揮團給防秋第一等弓箭手共三千五百人有竒馬二千六百疋有竒常排次準備策應秦鳳路通逺軍仍差景思立狄喜都部押并帶領第六将策應秦鳳路人馬候見本路安撫司關報前去初王韶奏乞増防托人馬上令韶詳具以聞並從之辛丑詔瀘州利州並選文臣知州任滿無過與堂除仍减磨勘二年先是利州兼益州路兵馬都監故用武吏自是别置都監而以文臣為守此據鮮于侁傳六月二十四日鄧綰云云閤門言龍神衛四廂都指揮昭州防禦使張玉涇原路副都總管暫赴闕奏事檢㑹儀制應外任客省客省使至閤門祗候入内都知押班并帶御器械赴闕奏事起居訖即退更不供職詔玉赴起居不供職今後准例壬寅比部員外郎祕閣校理曽孝寛為起居舍人史舘修撰兼樞宻都承㫖舊用武臣以文臣兼領自孝寛始也孝寛言所領樞宻都承㫖比年未嘗除人乞遇大宴依三司副使例侍立國忌奉慰退並赴行香或無都承㫖班即依修撰班序位從之序位實録在八月十九日今附見孝寛除都承㫖時兩紀皆書初以文臣為樞宻都承旨祕書丞吕大忠著作郎張大中大理評事趙君錫並權檢詳樞宻院文字大忠兵房大中禮房君錫吏房癸夘贈太后兄左侍禁髙士遜為保大軍節度使詔歩軍司床子弩雄武五指揮九百六十九人撥兵為兩指揮每指揮並以五百人為額仍契勘在京見今諸軍己未撥併數目以聞此據御集詔立修東西二府碑乙巳翰林學士韓維為端明殿學士兼翰林侍讀學士知襄州從維所乞也丙午右正言直集賢院管勾秦鳳路縁邊安撫司王韶為集賢殿修撰先是上謂王安石曰髙遵裕非首謀近又退縮避事官賞乃已過韶安石曰遵裕誠非首謀能與韶不為異而已亦未至退縮避事然韶功誠大賞薄上令再議韶賞王珪請與直龍圖閣文彦博曰如此則邉上便呼龍圗珪曰趙卨尚作龍圖上曰龍圖與直集賢院何所校欲與修撰且曰沈起亦作修撰彦博曰邉人不知職名髙下但見呼龍圖即以為尊如唐時藩鎮言軍中只知尚書轉僕射上曰修撰要是勝直龍圖閤安石欲與史館而故事史館不帶出乃除集賢殿修撰仍差入内供奉官秦鳳路縁邊安撫司勾當公事李憲就賫誥敕往賜時朝廷命修瑪勒寨遵裕乞緩興工故上以為退縮避事也詔王韶修瑪勒寨宜更遣探候即今西界側近如㸃集衆多未可興功即不須於未進誓表前畢功計西人亦豈能持久第一靣計置修城材物俟其退散併手修完如㸃集不多即依所奏施行仍仰秦鳳路經畧司計㑹韶興功日差将官一員領人馬防托近差定涇原路将官弓箭手等亦令韶相度勾抽先是韶奏乞候修乞神平通過堡畢功即勒廂軍採木併修瑪勒故有是詔右諫議大夫集賢院學士判祕閣宋敏求兼知審官東院上初欲用鄧綰曰司農無用綰也王安石曰司農有廨宇又綰無曠事忽罷之不便仍用敏求兵部侍郎致仕葛宫卒是月併吏部南曹入流内銓從判銓許将等請也馮京言本設南曹為關防銓司闕誤王安石曰唐以來銓曹法制與今日選法都不同乃雜用唐制不全刪去故選人留礙百端吏人枉費紙筆近已删去舊條極簡便銓司自易㸃檢誠無用南曹虚作留碍煩擾如考功考較事已除即考功自無復可存之理如格式司但批選人料錢等今既増俸即格式自無復可存之理上曰或謂舊料湏以户口多少差注今添料錢為一等亦未便安石曰所用户口乃省帳戸口非今實數兼户口多處未必煩劇户口少處未必安逸若僻静處户口雖多自少事而逸要閙處户口雖少自多事而勞又有帶前任料錢者即俸厚薄自不計户口多少上曰所省吏俸應不多安石曰若實合存即計惜吏俸不得今實宜廢併所省吏俸歳六千餘緡亦不為少且省出官人於是上從安石議廢南曹歸銓要廢南曹歸銓乃五年閏七月事而實録無之今附見七月末神宗職官志從判銓許将等請廢南曹亦繫之五年初議併省考功文字上問考辭何用安石曰唐以來州縣申牒中書及諸司奏事判事皆有詞國初猶然上曰此誠無謂安石曰天下無道辭有枝葉從事虛華乃至此此誠衰世之俗也上以為然此據日録五年七月五日事今附廢南曹歸銓後李復圭紀聞云熈寧中併南省二十四司判都省者兼户度金倉工屯虞水八曹其他皆首曹兼領吏部兼南曹格式是僕射尚書兼領郎中員外之事文昌之制掃地盡矣今附此當考前處州縉雲縣尉編修三司敇并諸司庫務歲計及條例刪定官郭逢原上䟽曰臣竊觀自周文武以還盛徳有為之主固無如陛下而懐道之士由孔孟而後如王安石者亦未之有然臣尚有疑者殆恐顧遇師臣之禮未有隆焉古者天子尊師之禮有隆而無替君臣之分有時而不行臣嘗聞陛下固以師臣待安石矣而使之自五鼓趨朝僕僕然北靣而亟拜奔走庭陛侍立左右躬奏章牘一切與冗僚胥史無别古者待師臣之禮未聞有是陛下興治補弊跨越百王而遇師臣之禮未極優異尚守君臣之常分此臣之所未喻也臣願陛下考前聖尊徳樂道之義不習近迹特設殊禮事無纎悉必咨而後行則湯暨伊尹咸有一徳豈獨擅其美於前世哉又上疏曰臣聞能自得師者王古聖人未嘗無師孟子稱堯所以待舜之禮可謂至矣以齒則堯長以爵則舜賤以徳則舜固無以加於堯尚尊禮之如此今陛下卓然獨奮於百王之後四方拭目以觀堯舜之治而區區之末禮於安石尚如有惜不明示於天下此臣之所未喻也夫宰相代天理物無所不統未聞特設事局補除官吏而宰相不預者也今之樞府是己臣愚以謂當廢去樞府併歸中書除補武臣悉出宰相軍旅之事各責其帥合文武於一道歸将相於一職復兵農於一民此堯舜之舉也今王安石居宰輔之重朝廷有所建置於天下特牽於樞府而不預則臣恐陛下任安石者盖不專矣自李評罷去天下有志之士咸相欣慶願陛下以古語為朝夕警戒早因此時推崇尊徳樂道之義疏奏上甚不恱他日謂安石曰逢原必輕俊安石曰陛下何以知之上曰見所上書欲併樞宻院廢募兵安石曰人才難得如逢原亦且曉事可試用也郭逢原書墨本附六月二十六日甲戌然李評罷去乃七月二十一日戊戌此時未也朱本削去逢原書盖為王安石諱今復存之移入七月逢原輕俊見閏七月十四日日録今附此廢揚州廣陵縣入江都
