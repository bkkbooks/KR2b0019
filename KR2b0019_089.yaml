body:
  text: 續資治通鑑長編卷八十五宋李燾撰真宗大中祥符八年閏六月己卯大赦天下非己殺人及枉法贓殺人十惡致死者悉原之賜修內兵匠物有差自今諸州有大辟情可憫者具獄以聞勑法律內重刑未稱矜恤者委法官與編勑官條奏先是上謂宰相曰朕以盛暑之月屬念囚繫欲肆恩宥何以為名王旦曰今邉鄙寧謐黎庶阜安風雨以時疵癘不作叶此景貺特覃大慶固其宜也翌日以條目進呈上曰前後赦文未嘗不以謹罰為首今當别白條告使四方曉解旦乃以二事為請故特著之庚辰王欽若上凖詔編修后妃事迹七十卷賜名彤管懿範上謂近臣曰昨宫中救焚召發軍士宣旨所至應聲而來誠足嘉尚然兹事體大古者追兵以符正為倉卒之際必須取驗契合也壬午詔殿前侍衛司自今非時宣召軍士候見御寶文字乃得發遣無則畫時覆奏所降御寶不得轉付所司每遇遷轉遞相交授詔諸司庫務如中使宣取金帛錢物但依往例畫時應付不得以見管都數供報如違主典處死監官除名決配舊制庫務都數雖三司使不得知之丁謂充使日自陳度支經費宜知常數上勉從其請仍令副使已下不得預聞而主藏攸司不詳條禁每內臣有所宣索必盡數報之或具列名物之籍以供故特申警焉丙戌詔廣南西川京朝幕職州縣官丁憂離任願管押綱運者亦聽仍給驛劵詔廣南路自今不逞之民五犯法者依法決杖刺配嶺北州軍牢城內未滿五次而情理切害者亦準此以繕修文德殿權放常朝俟畢功如舊國初取唐朝飛錢故事許民入錢京師於諸州處便換先是商人先經三司投牒乃輸左藏庫所由司計一緡私刻錢二十開寶三年置便錢務令商人入錢者詣務陳牒即日輦致左藏庫給以劵仍敕諸州俟商人賫劵至即如其數給之自是無復留滯其後定外地間慢州乃許指射自此之後京師用度益多諸州錢皆輸送其博易當給以錢者或移用他物又金帛闌出化外者尤衆厥價踴者商旅不以入中茶商所過當出算者令録記俟至京師併輸之自新法之行舊有交引而未給者已給而未至京師者已至而未磨者悉差定分數抽納入官大約商人有舊引千貫者令依新法嵗入二百千俟五嵗則新舊皆給足官府有以茶充公費者慮其價賤亂法悉改以他物山場節其出耗所過稅務嚴其覺舉每諸𣙜務所受茶皆均地配給場務以交引至先後為次大商刺知精好之處日夜走僮使賫劵詣官故先獲初禁淮南鹽小商已困至是益不能自行三四年間有司以京師切須錢商人舊執交引至場務即付物時或特給程限或數月或百日踰限未至者每十分復令别輸二分見緡謂之貼納豪商率能及限小商不能知或無以貼納反賤鬻於豪商有司從移用之便至有一嵗之內文移至十數變者商人惑之顧望不進上封者皆咎改法庚寅上謂輔臣曰屢有人言所改茶法不便錢額增損兹亦常事如聞不利小商王旦等曰改法已來亦未見不便事所降元敕無釐革小商之文如上言者實有所長則望付中書施行或欲杜絶羣言則須别命朝臣較量利害上復以問王欽若欽若言素不詳其本末陳堯叟言但得物物入庫即是課利丁謂曰河北陜西入得芻糧即是官物入庫緣江榷場無剩茶即是法行也其餘瑣細風傳之詞不足憑信或有章奏望一一宣示可以商榷大抵未改法日官中嵗虧茶本錢九千餘貫改法之後嵗所收利常不下二百餘萬貫邉防儲蓄不闕𣙜場無陳積此其大較也乃詔刑部尚書馮拯翰林學士王曾與三司同詳定本志以丁謂對舊法嵗虧官本錢九千餘貫繫之明年正月今從實録以童子蔡伯希為祕書省正字其父龜從為校書郎伯希家本福州隨父至京師裁四嵗誦詩百餘篇上召入禁中應對周詳所誦精習因命以官又以龜從久在場籍奬其善於訓子召試中書而命之又作詩賜伯希癸巳編敕所言監臨主守自盜及盜所監臨財物者舊自五匹徒二年遞加至二十五匹流二千五百里三十匹即入絞刑緣法律凡加重刑皆須循次今獨此條頓至大辟望改三十匹為流三千里三十五匹絞從之上謂宰相曰數有人言官吏犯贓者多蓋朝廷緩於懲戒王旦曰今品官犯贓情理乖當但千錢已上皆配𨽻衙前遇赦得逐便再遇赦得參軍文學終身不齒善良其有犯法輕贓遇大慶不過得一判司每赴選調必首載其贓濫為辱極矣然萬一有當極典者朝廷但委之攸司死者無由得免蓋太宗謹重刑罰行三有之恩此等多蒙減死陛下即位以來贓吏若比前代則犯者亦似差少丙申以刑部員外郎兼侍御史知雜事王隨知制誥知應天府兼南京留守事先是上覩隨奏章謂輔臣曰隨賦性柔順然有執守王旦曰朝廷羽儀皆出臺閣非清介自立加以該博則不能彈壓多士於是擢隨掌外制隨不善為制辭即出典藩郡尋有詔增應天府公用錢至百萬從隨所請也據實録隨以是日除知制誥即出知南京前此未有其比也當考戊戌昭宣使平州團練使入內都知秦翰卒上甚悼惜為之泣下贈貝州觀察使賻襚加等尋又遣使以襲衣金帶賜其家翰性倜儻有武力素以方略為己任前後身被四十九創羣帥推其勇敢輕財好施所得俸賜多均給將士衆尤附之上嘗謂王旦曰翰盡忠國家不害人亦不妄譽人每有敷陳深可信委旦曰翰亷謹謙下人多推其長者上曰翰在先朝嘗言與李繼遷欵昵出入帳中無間可隂刺之且言臣一內官不足惜或為國家去此劇賊死亦無恨太宗深賞其忠旦曰雷有終在西川與上官正石普多不協賴翰和解不然幾致生事上曰邉臣有傲狠自任難為謀事者翰必平之言無枝葉但推誠直致而已故人自樂從昨劉承圭卒翰言承圭不避衆怨與之不足者今必流謗望悉勿聽朕益嘉其為人也其後重贈彰國節度使詔楊億撰碑文億以翰不畜財表辭所贄物雖朝旨不許而時論美之甲辰詔編太宗妙覺集入佛經藏內藏庫言三司所借金帛其數至多舊借金即以饒歙等州及諸路所貢充還今諸路納到三司指揮直送左藏本庫不惟漸失封樁數目又不應劉承規句當往例詔三司規畫補填先是宫城火詔諸王各徙宫於外秋七月庚戌命莊宅使長州刺史石知顒都大管勾親王諸宫事辛亥詔三班使臣廣南路替回者特免短使癸丑令官告院自今大除授告身賜外蕃書仍用金花綾羅紙時禁銷金有司上請故也甲寅涇原路駐泊都鈐轄知渭州曹瑋表求暫詣京師省其母詔可丙辰王欽若準詔討閲道藏趙氏神仙事迹凡得四十人詔畫於景靈宫之廊廡詔自今諸路部署鈐轄都監及尚書丞郎已上赴任許因便管押禁軍往屯所自餘悉禁之以牛疫頒醫方於諸路免牛稅一年戊午樞密副使王嗣宗罷為大同節度使先是嗣宗與冦凖大不協纍表求罷凖既去位嗣宗復固請補外因授以旄鉞尋命知許州嗣宗舊嘗逰是州别墅在焉時人榮之嗣宗表求兼領汝許州捉賊事詔不許本傳云嗣宗副樞密冦凖為使嗣宗與之大不協纍表求罷故有此授按凖罷樞密使在四月壬戌距今三月矣傳蓋不詳今略刪潤其辭使無抵牾己未命知制誥劉筠乘傳祭汴口以河流淺澀故也甲子秦州伏羌城寨户文禹伐登聞鼓言頃年溫仲舒以戎人屢擾寨户遂拓疆界於隘路口大洛門置城守把便致寧貼後來者却召蕃部付與洛門地故迄今時有鈔掠復請於山丹峽口廣吳嶺上古城大洛門城永寧城隘路口置寨以遏戎冦詔優賜遣之乙丑禁河北河東陜西緣邉部署鈐轄都監知州等私買軍衣絹染彩博市府州蕃馬上封者言并州嵗給軍衣絹四萬餘匹皆自京輦送如聞軍中悉貿易之請官自置場有願中賣者匹給錢千二百收貯以備嵗給可減輦送之半詔下三司三司亦言其便遂從其請丙寅幸相王元偓新宫賜以衣帶器幣又遣賜諸王宫緡錢各有差庚午徙知升州樞密直學士工部侍郎薛映知揚州給事中馬亮為工部侍郎知升州以吏部員外郎知制誥李迪為右諫議大夫集賢院學士知永興軍上謂輔臣曰大藩長吏尤難其人要在洞達物情遵守條詔愛民抑暴而已吏或廉而肆虐或察而滋章或急掊斂以為公或曠職務以為恕如此則何由致治耶迪傳云迪自亳州代歸會嘉勒斯賚叛帝憂關中召對長春殿命知永興按此時嘉勒斯賚初未叛也今不取上作讀十九代史詩賜近臣和坊州言大雨河溢民有溺死者詔賜其家緡錢壬申詔如聞河北陜西及宜州犯罪逺配人各有田産安居自今經赦不在量移之限丁謂奏葺大內功畢六月壬子已書諸殿畢功今又書不詳其故或彼但諸殿此總言功役畢也乙亥中書門下言每嵗祀昊天上帝及饗太廟舊例並宰相及參知政事攝事近嵗多遣他官慮乖嚴重之旨請復舉舊例從之宫苑使昭州團練使郭崇仁為解州團練使崇仁守文子章穆皇后弟也時崇仁母梁氏亡詔起復仍有是命崇仁雖外戚朝廷未嘗過推恩澤自是凡十年不遷十年不遷據本傳附見是月詔三班院自今諸河催綱巡檢並選曾經監押巡檢殿直幹事者充初三班定侍禁李世隆為蔡河撥發巡檢捉賊上曰世隆年方二十五未經歷任上封者屢言催綱捉賊多差權勢子弟故條約之馮拯王曾等受詔同詳定博易新法皆以謹重敦信為言而上封者猶競陳改法之弊內臣藍繼宗等亦屢陳其不便上以問輔臣丁謂對臣夙知利害願得與之辨尋召繼宗等詢其始末悉不能對謂亟以聞八月戊寅朔詔曰𣙜茗之規著令已久固計入之素定非異端之可攻載詳言事之人時進單辭之説初陳封奏必煩述於事端洎究指歸多未詳於本末自今羣臣如有茶法便宜當顯拜封章盡述條目下有司詳議施行况金榖細務非軍國事機自合歸於職司豈朕所宜親決今後有所陳述無得更乞留中開封民崔白家京城素無賴凌脅羣小取財以致富先有滿子路者強狠任俠名聞都下趙諫以豪橫伏法白嘗謂人曰滿子路吾之流輩也趙諫吾門人耳餘不足算也白與梁文尉鄰居欲強買其舍文尉未之許屢加詬辱會文尉死妻張與二子皆幼白日遣人多擲瓦石以駭之張不得已徙去即以其舍求質錢百三十萬白固以九十萬市之張訴於府白遂增錢三十萬因潛減賃課以已僕為證詣府訟張且厚賂胥吏白素與殿中丞權大理少卿閻允恭善遂祈允恭逹其事於開封府判官國子博士韓允允坐張妄增屋課杖之白因大言自衒於鄽市皇城司廉知以聞詔捕白付御史臺鞫問得實己卯允除名授嶽州文學允恭除名授復州文學白決杖配崖州牢城白子端決配江州本城仍下詔戒諭都人壬午命入內副都知張景宗同勾當長公主宅及郡縣主諸院公事初命供備副使麥守恩勾當至是守恩請以入內都知同涖其事故復命景宗焉癸未以河中府陜同虢州嵗歉民流命侍御史李行簡乘傳安撫仍與轉運使議發倉廩出糶及賑貸之行簡馮翊人嘗官於蜀陵州富民陳子美父死繼母詐為父書逐出之纍訴不得直轉運使􅊾行簡劾正其事及代還子美遺以黃金五百兩行簡怒不納感泣而去其為監察御史王嗣宗所薦也王旦數稱其才上亦雅知之再遷侍御史行簡為御史乃祥符二年十二月今附此詔京東西河北陜西承前例差車牛及和雇般輦悉罷之以牛疫故也陳州言知州樞密直學士禮部尚書張詠卒贈左僕射諡忠定上嘗稱詠才任將帥不盡其用詠臨終奏疏言不當造宫觀竭天下之財傷生民之命此皆賊臣丁謂誑惑陛下乞斬謂頭置國門以謝天下然後斬詠頭置丁氏之門以謝謂上亦不以為忤云詠素以介潔著稱晚年在陳州頗營市産或侵刻細民時論惜之斬丁謂事據記聞所云臨終奏疏則歐靖聖宋掇遺及國老間談所載也甲申知密州孫奭上言本州屢有強盜結案遇赦或赦後捕獲準詔配本城者並配牢城臣愚竊謂朝廷蓋以本城牢城分為輕重今若一槩取斷慮失詔意請下法官恭議詔自今諸州軍凖詔刺配本城者止配本城有軍額指揮不得例配牢城丙戌以進士戴國祥試將作監主簿時知升州馬亮言往嵗有同年及第戴永赴官嶺表謂臣曰茍不生還以遺孤為託未幾永卒訪得其子才數嵗收育於家既長則妻以幼女願賜釋褐振其墜緒上嘉亮之信義故有是命秦州言隆中族蕃部來劫般擦默星族首領郢成斯納等與戰勝之賜錦袍銀帶茶綵有差據會要事當在丙戌今追附當考之己丑上謂宰臣曰近省羣臣凖詔直言皆止尋常事務王旦曰其中多以興建宫闕為言向敏中曰外人不知修崇真館雖暫役兵卒實無妨民事上曰亦有挾情屬意詞近捭闔者殊不知矯偽易辨旦曰至於劉驥者援據今古若素留心著撰及觀其歷任始則違法取息錢以告敕質之尋又枉法受賕削籍配𨽻今始得為文學而抗章髙論自謂人莫我若上曰古人云察言觀行正謂此也庚寅知汝州祕書監楊億言部內秋稼甚盛粟一本至四十穗麻一本至九百角上覽其章謂輔臣曰億之詞筆冠映當世後學皆慕之王旦曰如劉筠宋綬晏殊輩相繼屬文有貞元元和風格者自億始也辛卯增置欣州駐泊都監一員從河東安撫司之請也甲午知永興軍李迪言長安故都舉人及衣冠子弟甚衆多恃蔭無賴恣為凶狠自今所犯情重者望許部送赴闕詔可有鄭文坦者府之豪族其家坐徒者已三四人文坦貸貧民息錢使倍償之至是數踰三四而匿其要契索取不已迪遂械送闕下決杖黥面配郴州牢城遇赦不還乙未以三司使工部侍郎林特為户部侍郎同玉清昭應宫副使太常少卿馬元方為右諫議大夫權三司使事特精敏善吏職據案終日不倦上以特久任三司髙年勤瘁特置此職班在翰林學士上優其月給以寵之尋又命特為修景靈宫使兼管勾景靈宫會靈觀事上數訪以朝廷大事特因有所中傷人以此憚焉曹瑋言蕃戎之情不可專行恩惠宜先加掩殺使知畏懼然後招撫則悠久之利也邇者秦州蕃部本因張佶力取其地使無粒食以致侵擾今或量給曠土俾之耕作實綏懷之䇿也詔從其請仍戒瑋不必掩殺戊戌內殿崇班周文質為內殿承制依前內侍省押班充涇原路駐泊都監兼緣邉巡檢代王懷信徙懷信為秦州駐泊都監初張佶至秦州拓地立四門寨據大洛門而不以恩信待蕃部由是戎人蓄忿屢來鈔奪上以問輔臣王旦曰佶輕信而易爭恐生邉隙如聞王懷信所至寬猛適中請改任之向敏中曰頃年溫仲舒逐蕃部過河人以為便上曰朕亦曾詢訪蓋頃嵗益屯兵七千始得無患邉防幸且寧靜人民安堵何必生事遂有是命尋又徙佶為邠寧環慶駐泊鈐轄張佶為邠寧環慶鈐轄在九月戊午今并書故供備庫使楊居中孫宗禮伐登聞鼓上言祖居中前知鼎州以發兵討蠻故侵用公使錢二十萬有司責令償官詔除之補宗禮為三班借職三司借內藏庫錢四十萬貫令京兆河中府陜同華虢等州貸民麥種辛丑禁軍中角抵戲右班殿直韋繼升護河堤凡十五年上嘉其勤擢閣門祗候幸端王元儼新宫賜衣帶鞍馬還幸相王元偓宫時車駕將出而南陽康孝王惟吉子裁十嵗暴卒上謂宰相曰元儼既已宿設難輟此行當令不作樂不與從官會酒如鈞容音樂亦可止否王旦曰鈞容儀衛也不可止况中下之殤禮當旁絶陛下情所不忍則罷從官會飲不以樂侑食誠為至當丙午曹瑋言嘉勒斯賚所遣劉旺諾爾遣帳下沁巴結來告近遣西涼斯多特部兵十萬掩殺北界部落勝捷續入獻首級數此據會要乃二十九日事今追附當考詔審官院以近地二年半以上逺地二年已上權與差替不為永例上以京朝官俟闕既久奉朝者頗多故有是詔此據會要不得其日九月己酉注輦國王羅茶羅乍遣使婆里三文等來貢真珠衫帽各一及真珠象牙香藥等先是有舶商抵其國告以天子東封西祀其王曰十年來海無風濤故老傳云如此則中國有聖人故遣使入朝其使者又以盤捧真珠碧玻璃升殿布於御座前降殿再拜譯者道其言曰願以表逺人慕化之意注輦國東距海五里西至天竺千五百里南至羅蘭二千五百里北至頓田三千里前古不通中國其使者舟行涉千一百五十日乃達廣州約其道路蓋四十一萬一千四百里其國有七城統三十一部落其王相傳今三世上待其使者例同龜兹國明年使還降詔羅茶羅乍賜物甚厚婆里三文至襄邑縣以疾卒因葬其地上憫之遣官馳往祭奠庚戌以工部郎中知鄧州陳堯咨守本官知制誥先是堯咨兄樞密使堯叟因奏事言堯咨會赦當復龍圖閣直學士上曰學士清近之職非會赦可復堯咨請用蘇易簡前自知制誥落職未幾復為知制誥例上不許曰堯咨亦嘗為知制誥且授此職可也堯咨性剛戾數被挫辱忽忽無聊上聞之復以問堯叟堯叟曰堯咨初不知上恩所以保右者自謂遭讒至此望取元犯事尤重者切責之使知悔懼遂詔堯咨曰卿知永興日所為乖當非獨用刑慘酷也如擅置武庫建視草堂開三門築甬道出入列禁兵自衛此豈人臣所宜衆論甚喧不但樂黃目奏也朕念卿母氏耆年堯叟朝夕近侍未欲窮究姑示薄責旋加甄敘成命既出羣言愈歡卿曾不內省但曰為人所傾自今宜體國恩改過遷善不然當以前後事狀盡付有司堯咨乃惶恐稱謝御史中丞馮拯上言皇城副使焦守節緣坐免官雖逢赦宥未蒙任用望特降恩旨甄敘上曰拯執憲大臣宜謹所舉守節常人何須此奏也此事不得其月日今附見甲寅以引進使髙州刺史涇原路駐泊都鈐轄知渭州曹瑋領英州團練使知秦州兼緣邉都巡檢使涇原路渭州鎮戎軍緣邉安撫使别鑄安撫使印給之時總噶爾嘉勒斯賚立文法聚數十萬遣人入奏願討平夏以自效上以為戎人多詐慮緩急冦邉侵擾熟户先命周文質監涇原軍又徙瑋是州兼兩路事以備之賜瑋公用錢嵗三百萬仍詔自今不兼安撫使者給其半上謂宰相曰頃曹瑋入朝言埒克遵峻酷專恣已失部族心恐必不久嘉勒斯賚嘉木布之後衆漸歸之咸以埒克遵持權自任不平其事王旦曰大抵好殺則斂怨弄權則敗亡雖在蕃夷亦不可不戒昨秦州言埒克遵自作威福慮恃朝廷恩寵凌轢邉部此亦近理始者冦凖聞埒克遵之言以為必破德明故其賜豫太過上曰王嗣宗亦言外國相殘中國之利也朕思之何必幸其相伐但令曹瑋安撫近邉以重兵鎮秦州常設警備毋得輕發此最為上䇿也經武聖略以此事繫之五年誤矣曹瑋入朝乃今七月事今因命瑋知秦州并書之己未龍圖閣待制孫奭上言伏以禮記舊月令一篇後漢司農鄭康成盧馬之徒本而為注又作周官及儀禮注並列學官故三禮俱以鄭為主而月令一篇卷第五篇第六漢魏而下傳授不絶唐陸德明撰釋文孔頴達撰正義篇卷第次皆仍舊貫洎唐李林甫作相乃抉擲微瑕蔑棄先典明皇因附益時事改易舊文謂之御刪月令李林甫等為注解仍升其篇卷冠於禮記誠非古也當今大興儒業慱考前經宜復舊規式昭前訓臣謹繕寫鄭注月令一本伏望付國子監雕印頒行詔禮儀院與兩制詳定以聞既而翰林學士朝逈等言若廢林甫之新文用康成之舊注則國家四時祭祀並須更改詳究事理故難輕議伏請依舊用李林甫所注月令從之入內供奉官楊守珍使陜西督賊請因擒獲強劫盜至死者望以付臣凌遲用戒凶惡上曰法有常科豈於安平之時而行慘毒之事乃詔守珍等捕捉盜賊送所屬依論決情理切害者奏裁守珍事與四年三月在京東時略同庚申權判鴻臚寺刑部郎中直史館張復上言請纂集大中祥符八年已後朝貢諸國繢畫其冠服采録其風俗為大宋四夷述職圖上以表聖主之懷柔下以備史臣之廣記從之及復以圖來上上曰二聖已來四夷朝貢無虛嵗何但此也乃詔禮儀院增修焉增修乃明年四月乙亥今并書壬戌命左司諫知制誥劉筠為契丹國主生辰國信使供奉官閣門祗候宋德文副之户部副使吏部員外郎李及為正旦國信使侍禁閣門祗候李居中副之戊辰賜知豐州王文玉緡帛米麵羊酒以其父承美葬故也丙子令入內內侍省自今命使臣勾當後苑御園東門司龍圖閣太清樓並報樞密院給宣初甘州輝和爾罕王伊嚕格勒數與夏州接戰其貢奉多為夏州鈔掠及總噶爾族感悅朝廷恩化乃遣人援送其使故頻年得至京師既而嘉勒斯賚欲娶罕之女而無聘財罕初不許因為仇敵聖祖臨降之嵗秦州遣指揮使楊知進譯者郭敏送進奉使渠富綬榮還甘州會總噶爾怨隙阻歸路遂留知進等不敢遣於是敏得先歸可汗王伊嚕格勒表言巴烏公主病死以西涼人蘇守信劫亂日與交鬭不時奏聞又謝恩賜寶鈿銀匣厯日及安撫詔書仍乞慰諭總噶爾使開朝貢之路蘇守信者夏州所遣領兵七千馬五千戍西涼故伊嚕格勒奏及之伊嚕格勒疑即夜落紇也巴烏公主死尚須奏聞若伊嚕格勒非夜落紇則不應奏語不申敘也冬十月己卯以甘州西頭供奉官張綸為東頭供奉官綸本寧州牙吏陷甘州常具西鄙事宜附奏京師上嘉其忠順就補供奉官以俸給寧州本家至是又附奏請因國家大禮行慶預遷秩故有是命仍命樞密院遣殿侍齎綸書付寧州本家取還書付西來使往以慰其心辛巳以刑部尚書兼御史中丞馮拯為户部尚書知陳州增給公用錢嵗百萬時議選官知天雄軍上曰馮拯政堪此任顧求間郡何也王旦曰拯頃嵗辭疾馬知節嘗譏拯好富貴所欲節度使爾拯恐為知節所量不敢請大藩殆為此也上又曰朕每選擇官吏但患才不充用豈朝廷未知耶寶訓以對上為向敏中今從拯本傳所載壬午以右諫議大夫權知開封府王曙守本官加樞密直學士知益州樞密直學士刑部郎中周起加右諫議大夫知并州時二州嵗當代上遍閲侍從官姓名謂輔臣曰此等各有所長然求其文雅適用可威方面者鮮矣每念唐賢比肩而出何當時人才之多也王旦曰方今下位豈無才俊或恐拔擢未至爾然觀前代求賢不求其備不以小疵掩大德今士大夫孰為無過陛下每務保全之然流言稍多則不便於任使大都迭相稱譽近乎黨過相糾訐近乎公鑒其愛憎惟託上聖則庶幾無棄人矣癸未遣使詣諸路揀選雜犯配軍人量移近地取其少壯者至京以𨽻禁軍老疾者聽從便乙酉秦州總噶爾蕃部斯多特遣使來貢斯多特西涼首領今此忽繫之秦州總噶爾未曉其故當考丙戌以右諫議大夫填從吉為給事中權知開封府上召戒從吉曰京府浩穰凡事太速則誤太緩則滯須酌中耳有請屬一切拒之又曰府吏多與豪右協謀造弊事體日新朕記作尹時有毆小民者吏納賂移於僕夫僕夫伏辨將斷朕疑其非本情也再令鞫問乃得實如此等事所宜深察及從吉領府事謗者甚多上以問輔臣丁謂曰從吉好言人過故積衆怨耳上曰當官宜守常道或強為善以取名則毁讟必隨至矣發運使李溥言江浙諸州軍淮南十三山場今嵗入茶二千九百六萬五千七百餘斤視舊額增五百七十二萬八千餘斤上封者言朝廷擇幕職州縣官衆所保任者授京官故川峽令録多得良吏而川峽知州通判審官院以資例差往頗有老疾不治者己丑詔户部尚書馮拯以下舉京朝官任川峽知州軍通判者各一人辛卯以翰林學士朝逈權判吏部流內銓知制誥盛度知通進銀臺司兼門下封駮事逈以父名佺為辭遂命與度兩換其任時翰林學士王曾亦領銀臺司宰相議令逈代曾上曰朕聞外議謂曾嘗封駮詔敕自是中書銜之多沮曾所奏今若罷去是符外議旦曰臣等本無忌曾之意今聖慈宣諭為宰司避謗請逈與度相易曾如舊上可之旦因言今封駮之任與古不同大抵除改差遣大小皆先奉進止繼入熟狀俟其可奏然後降敕此外或差誤有害勘會失實臣等省視不至往往有之頒下四方誠為不當封駮司官茍能詳覽改正乃助臣等不逮必無責之之理上然之壬辰盛度上聖祖天源録五卷因上言所編事迹慮有未備願别命儒臣就館閣羣書更廣編撰以志先烈詔從之仍命王曾及集賢校理晏殊與度同纂集己亥益州路轉運使薛田言綿州要衝戌兵甚衆請依彭州例增置駐泊都監一員從之甲辰兵部侍郎趙安仁上大中祥符法寶籙二十三卷有詔褒飾仍賜金帛知汝州楊億以嘗預編修賚物如之乙巳王欽若上聖祖事迹十二卷上製序賜名先天記欽若又續成三十二卷上之十一月庚戌日南至上御天安殿受朝丁巳上幸會靈觀宴近臣於祝禧殿賜兵匠緡錢有差庚申兵部侍郎兼宗正卿趙安仁言準詔以太廟朔望上食品味令臣詳定自今委御厨取親饗廟日所上牙盤例參以四時珍膳選上局食手十人赴廟造饌上副聖心式表精慤詔所上食味宫闈令監造安仁省視之時知宗正寺趙世長言宫闈令欲與本寺官連署行遣公事王旦奏趙安仁今為宗正卿總領寺事恐難與內侍通簽望令如舊上曰不若依宫觀例凡事令世長與宫闈令同狀申安仁據狀單署行遣安仁又言每嵗遣宗正寺官一員朝拜十二陵往復悉依昭穆之次僅百餘里竊惟祠祀之禮本在精慤儻至怠乏即禮容不成望自今三陵專差權宗正卿一員朝拜别遣官二員分拜諸陵所冀人無跛倚禮盡肅恭又請造長竿擔床二副置陵表版以代漆匣遣寬衣軍士三十二人輿送陵下並從之辛酉相王元偓加兼尚書令端王元儼為鎮海安化等軍節度使進封彭王權涇原路鈐轄兼知渭州郝榮言涇州戌兵甚衆請用閣門祗侯一員為都監從之甲子上幸景靈宫觀上梁賜從臣修宫使衣幣有差以國子博士通判邢州郭懷玉為供備庫使都監馮處正指揮使散直劉顯並賜奬詔軍校卒伍第遷賜緡錢州民張益補鎮將賜茶絹免三年徭役先是州境有士卒十三人為盜益伺知其所以告懷玉等部兵擒獲故第賞之河南府言工部侍郎种放卒上聞之深為嗟悼親制文遣內侍致祭護喪歸終南加贈工部尚書録其姪世雍同學究出身先是有譏放循默者語聞於上上謂輔臣曰放在朝時為朕言事甚衆但外廷未嘗知耳因出放所上時議十三篇其目曰議道議德議用議器議文武議制度議教化議賞罰議官司議軍政議獄訟議征賦議邪正放將卒忽取前後章疏藁悉焚之服道士衣召諸生會飲與訣酒數行而卒己巳三司奏乏銀請令諸路𣙜酒課悉改輸銀上曰若此民間銀益貴矣因謂輔臣曰咸平中銀兩八百金五千今則增踴逾倍何也王旦等曰國家承平嵗久兼并之民徭役不及坐取厚利京城資産百萬者至多十萬而上比比皆是然則器皿之用畜藏之貨何可勝算此外則兩蕃南海嵗來貿易有去無還加之坑冶興廢有時增價之由或恐以此上又曰聞長安故都至今有淘沙得金玉者豈非當時尤盛富耶旦等曰咸秦自三代已來建都至西漢徙天下富民實之訖有唐千餘載相繼其富盛固可知矣方今京城繁庶與漢唐無異長安洛陽雖云故都然地險而隘去東夏遼逺故漢之吳楚七國唐之山東河北往往強悖良亦逺而難制也加以轉漕非便仰給四方常苦牽費今國家始封於宋開國於梁實四方之要會萬世之福壤也録故文思使昭州刺史知貝州滕文襲子蕭山縣尉載知太平縣給俸終喪上尹京日文襲為軍巡使以幹稱故優恤其嗣壬申契丹遣使左林牙工部尚書耶律珍副使翰林學士承旨工部侍郎簽署樞密院公事吕德懋來賀承天節癸酉髙麗進奉告奏使御事民官侍郎郭元與東女真首領阿嚕台來貢髙麗主表求賜厯日及尊號且言契丹於其國西鴨緑江頭創浮橋又於江東築寨欲發兵焚毁則慮衆寡不敵邉民殊不安乃西女真為之鄉導也郭元自言本國城無垣墻府曰開成管六縣民不下三五千有州軍百餘置十路轉運司統之每州管縣五六小者亦三四每縣户三四百國境南北千五百里東西二千里軍民雜處𨽻軍者不黥面方午為市不用錢第以布米貿易地宜粳稻風俗頗類中國嵗一試舉人有進士諸科算學每試百餘人登第者不過一二十元辭貌恭恪每受宴賜必自為謝表粗有文采朝廷待之亦厚明年辭還賜其主詔書七函衣帶器幣鞍馬及經史聖惠方厯日等元又請録國朝登科記及賜御詩以歸從之甲戌以王旦生日詔賜羊酒米麵令有司供帳開封府具樂許宴其親友并會近列及丞郎給諫修史屬官宰相生日舊例賜器幣鞍馬外惟於中書會輔臣至是上聞旦私第未嘗會客故有是賜詔流內銓凡選人有貢獻文字並許收接通進先是銓司言前興化縣令胡辟引見日不遵條約輒衷表以獻請付御史臺按劾因降是詔十二月丁丑朔令三司減價賣炭以濟貧民戊寅皇子加冠禮壬午樞密使同平章事王欽若上承天節四裔同獻夀歌上和之甲申詔自今郡縣主南宫北宅諸婦奏親屬求遷秩者候掌事及八年乃許丁亥侍禁楊承吉使西蕃嘉勒斯賚還言蕃部甚畏秦州近邉丁家馬家二族此二族人馬頗衆倚依朝廷嘉勒斯賚以埒克遵為謀主埒克遵貪而虐好殺戮其下怨懼近築一城周回二里許無他號令但急鼓則增土緩則下杵不日而就承吉又圖上總噶爾城東南至永寧寨九百一十五里東北至西涼五百里西北至甘州五百里東至蘭州三百里南至河州四百一十五里又東至康古五百五十里又西南至青海四百里又東至新渭州千八百九十里戊子著作佐郎集賢校理晏殊上皇子冠禮賦詔奬之上曰殊少年孤立力學自奮人鮮及之加以沈謹造次不踰矩甚為搢紳所器或聞有大族欲妻以女殊堅拒之京城賜酺京官不得預會同輩召之出遊不答但掩關與弟頴讀書著文而已頴亦幼能屬詞朕嘗遣取其所業且戒殊勿為改竄其弟請加塗乙終不之省亦不言其故周密至此信其稟賦本異也庚寅詔三司文武百官月俸自來悉支見錢如舊辛卯以皇子慶國公受益為忠正軍節度使兼侍中封夀春郡王舊制本州當遣牙校僧道至闕稱賀詔罷之止令官吏附驛上賀狀癸巳駙馬都尉王貽貞表求試領郡政上曰世家子未嘗歷事遽任以州郡或致擾民不許先是馬元方請浚汴河中流闊五丈深五尺可省修堤之費即詔韋繼升經度開浚甲午繼升上言自泗州至開封府界岸闊底平水勢薄不假開浚請止自泗州夾岡用工八十六萬五千四百二十八以宿亳丁夫充計減工七百三十一萬仍請於沿河作頭踏道劈岸其淺處為鋸牙以束水勢使水勢峻急河流得以下瀉卒就未放春水前令逐州長吏都監令佐督役自今汴河淤澱可三五年一浚又於中牟滎澤各開減水河並從之仍命繼升都大巡檢修護及工畢繼升表請罷修河一年上曰惜得夫役誠善必不為民患否繼升極言其利上曰當更遣人相視異日河決雖罪言者亦無益丁酉令同耀等州為糜粥濟飢民己亥以御製陳書詩并注賜輔臣因曰隋煬帝初平陳斬五佞人以謝三吳當時天下稱賢及其無道乃過後主深可歎也王旦等曰陛下博觀載籍非惟多聞廣記實皆取其規鑒談經典必稽其道語史籍必窮其事論為君必究其治亂言為臣必志其邪正加以秉筆立言皆化人垂世之作今之文章典雅搢紳稽古皆聖訓所及也欽州言蘇茂州賊寇安逺縣劫掠人畜詔本路轉運使防遏之庚子契丹遣使監門衛大將軍蕭日新副使衛尉少卿田文來賀明年正旦甲辰命樞密使同平章事王欽若都大提舉抄寫校勘館閣書籍翰林學士陳彭年副焉鑄印給之初榮王宫火燔崇文院祕閣所存無幾既别建外院重寫書籍彭年請內降書本選官詳定然後抄寫命館閣官及擇吏部常選人校勘校畢令判館閣官詳校兩制內選官覆點檢又令兩制舉服勤文學官五人覆校其校勘詳校計課用祕書省式羣官迭相檢察每旬奏課及上其勤惰之狀疑舛未辨正者聚議裁之詔可惟覆點檢官之職命覆校勘官兼之乃出太清樓書籍內侍劉崇超預其事又請募人以書籍鬻於官者驗真本酬其直五百卷以上優其賜或藝能可采者别奏候旨前後獻書者十九人悉賜出身及補三班得一萬八千七百五十四卷彭年參知政事仍領其務欽若為相以李迪代之自是常以參知政事一人兼領然彭年既入中書不復至館其㧾領之務但委崇超判館閣官亦不復關預云此據本志刪改并書八年十二月詔樞密使王欽若都大提舉抄寫校勘三館祕閣書籍翰林學士陳彭年副之又令吏部銓選幕職州縣官有文學者赴三館祕閣校勘書籍初館閣書籍以其夏延火多復闕略故命購本抄寫因命吏部銓取常選人狀先試判三節每節百五十字以上擇其可者又送學士院試詩賦論命入館閣校勘凡三年改京朝官京朝官亦有時令校勘者京官校勘若三年皆奏授校理大理評事朝宗慤改官及校勘皆三年遂令先轉官俟轉官後又一年與校理自是校勘官遂皆四年授校理自宗慤始也彭年又復請以直館校理及吏部試中選人分為校勘官又令翰林學士朝逈李維王曾錢惟演知制誥盛度陳知微於館閣京朝官中各舉服勤文學者一人為覆校勘官逈遂以左正言集賢院校理宋綬著作佐郎直集賢院徐奭太子中允直集賢院麻溫其著作佐郎集賢校理晏殊大理評事崇文院檢討馮元充選凡校勘官校畢送覆校勘官覆校既畢送至判館閣官點檢詳校復於兩制擇官一二充覆點檢官俟主判館閣官點檢詳校訖覆加點檢皆有程課以考其勤惰焉會要所載如此姑存之可參考也
