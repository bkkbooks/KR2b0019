body:
  text: 續資治通鑑長編卷十九宋李燾撰太宗太平興國三年春正月北漢主遣其子續質於契丹納重幣以求援庚寅鄆州言殿直霍瓊稱詔至所部募兵而與所募兵刼部民劉凝家財上令檻車送至闕按得實皆腰斬於都市甲午雅州西山野川蠻首領馬令膜等十四人來朝貢令絳州浚汾河京西轉運使程能獻議請自南陽下向口置堰回白河水入石塘沙河合蔡河逹於京師以通襄潭之漕上壯其言而聽之戊戍詔發唐鄧汝潁許蔡陳鄭丁夫及諸州兵凡數萬人以弓箭庫使陽武王文寳六宅使李繼隆内作坊副使李神祐劉承珪等䕶其役塹山堙谷歴博望羅渠小祐山凡百餘里踰月抵方城地髙水不能致又增役人以致水然終不可通漕㑹山水暴漲石堰壊河不克就卒廢焉承珪山陽人也己亥西京右軍廵使光禄寺丞李之才除名為民永不齒叙坐與布衣李承端擕酒入宫殿中聚飲為廵檢所奏按得實故也庚子詔罷陳州城北蔡河所置鏁先是藩鎮率於津渡私補吏置鏁以算民船船勝百石者税取百錢有所載則倍其征商旅甚苦其事至是陳州以聞遽詔罷之其後瀕河諸州復置鏁如故辛丑發近縣丁夫浚廣濟惠民河及蔡河分遣使督之又分遣使十七人治黄河隄以備水患丁未又發卒千人浚汴口己酉命翰林學士李昉等修太祖實録直學士院湯悅等修江表事迹案原本作李昉等修江表事迹據宋史李昉修太祖實錄湯悅修江表事迹今改正庚戍趙州刺史韋韜為右千牛衛將軍坐廵邊不謹也韋韜廵邉不謹當考辛亥命近臣禱雨於京城寺觀祠廟後二日雨足又遣使分賽焉秦州内屬三族戎人等數冦邊癸丑詔悉赦其罪自今敢復肆侵掠者吏捕之寘於法不須以聞令川峽諸州犯罪當贖者毎銅一斤輸鐵錢四百八十建隆初三館所藏書僅一萬二千餘卷及平諸國盡収其圖籍惟蜀江南最多凡得蜀書一萬三千卷江南書二萬餘卷又下詔開獻書之路於是天下書復集三館篇帙稍備自梁氏都汴貞明中始以今右長慶門東北小屋數十間為三館湫隘纔蔽風雨周廬徼道出於其側衛士騶卒朝夕喧雜每諸儒受詔有所論譔即移於它所始能成之上初即位因臨幸周覧顧左右曰若此之陋豈可蓄天下圖籍延四方賢俊耶即詔有司度左升龍門東北舊車輅院别建三館命中使督工徒晨夜兼作其棟宇之制皆親所規畫自經始至畢功臨辛者再輪奂壯麗甲於内庭二月丙辰朔詔賜名為崇文院西序啓便門以備臨幸盡遷舊館之書以實之院之東廊為昭文書南廊為集賢書西廊有四庫分經史子集四部為史館書六庫書籍正副本凡八萬卷䇿府之文焕乎一變矣幸鄭國公主第賜駙馬都尉王承衍銀器萬兩錦綵五千疋又賜其子世隆銀百兩帛百疋丁巳詔州縣官批書南曹所給厯子敢漏一事者殿一選三事者降一資雖所部無其事令式所合書者亦著其無以相参驗從判吏部南曹董淳之請也淳附文苑𫝊無邑里癸亥秦州言戎人冦邊三陽寨使陳欽壽率戍兵擊走之有司言昌州嵗収虚額鹽一萬八千五百餘斤乃開寳中知州李佩率意掊歛以希課最廢諸井薪錢於嵗額外别課部民煑鹽民不習其事甚以為苦雖破産不能償其數多移徙它郡户口日減轉運使以聞而積年之征不可遽免欲均於諸州作兩税錢米輸官上曰若此為患一也甲子詔悉除之其七井舊額二萬七千七百六十斤仍勒井户煑焉丙寅泗州録事参軍徐壁棄市坐掌本州倉受民租與牙校髙貴為姦贓取民賄而免其租入以虚劵給之事發壁及貴並抵法支黨皆杖脊配𨽻逺惡處辛未上幸西綾錦院命近臣觀織室機杼還幸崇文院觀書恣親王宰相檢閱問難復召劉鋹李煜令縱觀上謂煜曰聞卿在江南好讀書此中簡䇿多卿舊物近猶讀書否煜頓首謝因賜飲中堂至醉而罷以吳越王俶將至癸酉命四方館使梁迥往淮西迎勞之己卯秦州言戎人冦􅔋穰寨監軍任徳明率戍兵撃走之梟戎首數十級以狥甲申詔西北邉内屬戎人多齎貨帛於秦階州易換銅錢出塞銷鑄為器自今嚴禁之吏民敢䦨出銅錢百以上論罪有差太平興國初詔以卒三萬五千人鑿池引金水河注之於是臨幸賜役卒人各千錢布一端遂名池曰金明本紀云是月始穿池誤也始賜名耳三月己丑以吳越王俶將至遣其子鎮海鎮東節度使惟濬至宋州迎省初平江南太祖以周惟簡為國子博士惟簡先有願隐終南之言不得已乃上書述前志求解官改虞部郎中致仕惟簡實非本心又無禄養上即位自東南至闕下求入見有司以致仕官非有詔召無求對之制於是惟簡擊登聞鼓上表復求出仕壬辰授以故官士論薄之中書令史習元吉盗印矯發近臣書於兩浙邸院取絹綵百七十疋丙申杖殺之寜州言蕃部冦邉廵檢使耿仁思擊走之殿直武裕統兵戍海門於所部恣為姦贓詔容州鞫實嶺南轉運使周渭杖殺之壬寅秦州言戎人冦八狼寨殺掠吏民廵檢使劉崇讓率戍兵撃走之擒其帥王寧珠梟首以徇癸卯殿前都虞候泰寜軍節度使贈侍中李重勲卒重勲與太祖同事周祖謹厚無矯餙太祖甚重之故擢委兵柄始終無易吳越王俶又先遣平江節度使孫承祐入奏事上優禮之乙巳即命承佑護諸司供帳勞俶於近郊又命齊王廷美宴俶於迎春苑己酉俶見於崇徳殿寵賚甚厚即日賜宴於長春殿俶僚佐崔仁冀黄夷簡等皆預坐慶州言知州慕容徳豐擊破轄裕勒族戎人俘獲千計徳豐延釗子也居慶州凡九年以肅靜為治邉人安之秦州都廵檢使田仁朗襲殺蕃部千餘口焚族帳二千餘所獲馬百五十匹牛羊三千餘口詔褒之此據别本實録乃三月二十三日事四月末奏到京附三月末本紀在六月末今不取戊申以閑廐使閤門祗候陳從信為左衛將軍充樞密院承㫖翰林使程徳元為東上閤門使兼翰林司公事御厨副使王延徳為御厨使供奉官喬斌斌未見副之軍器庫副使陳賛為西綾錦使供奉官張易易未見阜城王繼昇並為軍器庫副使趙俊俊未見為鞍轡庫副使惠延真延真未見為弓箭庫副使大名柴禹錫為翰林副使清池弭徳超為酒坊副使自從信而下皆嘗給事藩邸以舊恩進用也夏四月乙卯朔召華山道士眞源丁少微至闕少微善服氣年百餘嵗隐居二華潼谷中與陳摶齊名摶亦眞源人然少微志尚清潔專奉科儀摶嗜酒放曠雖居室密邇未嘗往來少微以金丹巨勝南芝𤣥芝等獻上留數月遣還少微獻金丹巨勝等乃四年九月復來朝時事今并書之丙辰令民二月至九月無得採捕蟲魚彈射飛鳥違者重寘其罪與建隆二年二月詔書畧同犯者有刑為不同耳戊午秦隴州廵檢周承瑨言戎人八百騎突弓門寨率所部兵擊走之卒九人不用命悉腰斬於境上壬戍復宴吳越王俶於崇徳殿庚午辛西染院賜工徒衣服錢帛甲戍詔分京西轉運司為二孟滑衛陳潁許蔡汝等州以轉運使程能統之襄均房復郢金隨安鄧唐等州及信陽軍以副使趙載統之乙亥初置諸道轉運判官丙子改嶺南監州為鶼州尋廢己卯平海節度使陳洪進用其幕僚南安劉昌言之計上表獻所管漳泉二州得縣十四戸十五萬一千九百七十八兵一萬八千七百二十七己卯四月二十五日用幕僚計此據大定録其詳未聞庚辰懷州言河決獲嘉縣幸城南觀刈麥辛巳斬侍御史趙承嗣坐監鄭州市征與吏為姦隐没官錢巨萬計人有告者詔鞫之得其實有司言法當絞上特命斬之并吏七人皆斬於市仍詔諸道轉運使布告州縣以儆羣吏掲于所居官舍之壁癸未以陳洪進為武寜節度使同平章事洪進子前漳州刺史文顥為房州刺史前順州刺史文頊為登州刺史尋復以平海節度副使文顯為通州團練使仍知泉州泉州衙内都指揮使文顗為滁州刺史仍知漳州文顯文顗除官在戊子今并書之五月乙酉朔御乾元殿受朝徳音赦漳泉管内給復一年初吳越王俶將入朝盡輦其府實而行分為五十進犀象錦綵金銀珠貝茶綿及服御器用之物逾鉅萬計俶意求反國故厚其貢奉以恱朝廷宰相盧多遜勸上留俶不遣凡三十餘進不獲命㑹陳洪進納土俶恐懼乃籍其國兵甲獻之是日復上表乞罷所封吳越國及解天下兵馬大元帥之職寢書詔不名之制且求歸本道上不許俶不知所為崔仁冀曰朝廷意可知矣大王不速納土禍且至俶左右爭言不可仁冀厲聲曰今已在人掌握中去國千里惟有羽翼乃能飛去耳俶獨與仁冀决䇿遂上表獻所管十三州一軍上御崇元殿受朝如冬正儀俶朝退將吏僚屬始知之千餘人皆慟哭曰吾王不歸矣凡得縣八十六戸五十五萬六百八兵十一萬五千三十六丙戍詔免荆湖南路轉運使崔憲仍削三任副使許竒除籍為民奪先所賜錢五十萬坐罷軟不勝臨事稽留不決廉得實而有是命憲相州人也命考功郎中范旻權知兩浙諸州事左賛善大夫侯陶著作佐郎崔繼宗檢閱兩浙諸州錢帛刑部郎中楊克讓充兩浙西南路轉運使宗正丞趙齊副之祠部郎中河南劉保勲充兩浙東北路轉運使右拾遺鄭驤副之右衛將軍太原侯贇按行兩浙諸州軍儲芻茭糧廪左賛善大夫孟貽孫通判兩浙事旻初自淮南歸朝上謂曰江淮之間輦運相繼實我倉廪卿之功也旻曰唐貞元中淮南嵗輸米才十萬石今每嵗輦運倍於貞元上曰知爾勤績將用為翰林學士盧多遜言杭州初復非旻不可治上乃謂旻曰卿且為朕行即當召卿矣錢氏據兩浙逾八十年外厚貢獻内事奢僣地狹民衆賦歛苛暴雞魚卵菜纎悉收取斗升之逋罪至鞭背每笞一人則諸按吏人各持其簿列于庭先唱一簿以所負多少量為笞數笞已次吏復唱而笞之盡諸簿乃止少者猶笞數十多者至五百餘訖于國除民苦其政旻既至悉條奏請蠲除之詔從其請丁亥徙封錢俶為淮海國王以其子鎮海鎮東節度使惟濬為淮南節度使奉國節度使惟治為鎭國節度使平江節度使孫承祐為泰寧節度使威武節度使沈承禮為安化節度使浙江西道鹽鐵副使崔仁冀為淮南節度副使仁冀之除在戊申今并書于此戊子徳音赦兩浙管内諸州給復一年癸巳遣左補闕李吉使契丹通事舍人薛文寳副之據王文寳傳恐此非薛然王亦不為通事舍人當考乙未占城國遣使來貢方物壬寅夏州言定難節度使李克叡卒其子衙内指揮使繼筠權知州事乙巳以繼筠為定難留後殿前都指揮使鎭寧節度使楊信初掌兵即瘖不能言至是寢疾瘖忽愈上遽幸其第視之信自叙遭逢涕泗横集且叩頭乞嚴邉備上慰勉之賜賚甚厚翌日信卒優詔贈侍中初秦州節度判官李若愚有子曰飛雄㓙險無行不為其家所容常客㳺京師魏博間與無頼惡少年縱酒蒱博以若愚官秦州盡知其府庫倉廪所有及地形險易兵籍多少而鳯翔盩厔尉張季英者飛雄妻父也飛雄自京師徃省季英竊乗其馬詐為使者夜抵廐呼置卒索馬卒秉炬出飛雄復以私市馬纓示之卒不能辨纓即授以馬飛雄令一卒前導遂矯稱制以廵邉為名掠廵驛殿直姚承遂至隴州掠監軍供奉官王守定至吳山縣掠縣尉盧賛皆令從行時秦州内屬戎人為冦都廵檢使周承瑨與田仁朗仁朗亦秦州都廵檢使事見三月末劉文裕文裕太平興國二年以内弓箭庫副使出為秦隴廵檢王侁侁前以東頭供奉官加閤門祇候未知今為何官梁崇賛崇賛未見韋韜馬知節知節前為西頭供奉官等皆受詔屯兵清水縣於四月庚辰飛雄至清水矯制盡縛之承瑨等見姚承遂數輩同至不覺其詐仁朗獨號泣求觀詔書飛雄怒叱曰吾受密㫖以汝輩逗撓不用命且令盡誅汝輩豈不聞封州殺李鶴耶詔書豈得見也先是上即位分命親信於諸道亷官吏善惡密以聞嶺南使者言知封州李鶴不奉法誣奏軍吏謀反詔誅之不問狀故飛雄以為言將以承瑨等詣秦州戮之因謀刼守卒據城為亂飛雄初矯稱制自言上南府時親吏㑹劉文裕哀告飛雄曰我亦甞事晉邸使者忍不營救之乎飛雄屏左右謂文裕曰汝能與我同富貴否文裕覺其詐偽許之飛雄乃釋其縛文裕䇿馬前附耳語仁朗仁朗即佯墜馬若殞絶狀飛雄與從卒共視之又釋其縛仁朗奮起搏飛雄與文裕等共擒之飛雄尚呼云田仁朗等謀反殺使者既而繫秦州獄劾之具得其狀有詔夷其三族并捕先與飛雄善者何大舉等數輩悉誅之及姚承遂等皆腰斬於秦州市先授飛雄馬廐置卒亦夷其族文裕保塞人也馬知節傳云知節先辨飛雄之詐因語文裕與文裕傳不同當考是月戊申以飛雄事布告天下令中外臣庶家子弟或懐兇險有乖檢率屢加教戒曽不悛改許其尊長聞於州縣錮送闕下當配𨽻逺惡處容隠不以聞者朞功以上親坐之六月戊辰詔自今乘驛者皆給銀牌先是五代以來庶事草創凡乘驛奉使於外但樞密院給牒至是以飛雄故始復舊制焉上注意治本深懲贓吏己巳詔自太平興國元年十月乙卯以後京朝幕職州縣官犯贓除名配諸州者縱逢恩赦所在不得放還已放還者有司不得叙用壬申韶州言准詔訪唐相張九齡事迹得其畫像及文集九巻獻之乙亥宋州言汴河决寧陵縣詔發宋亳丁夫四千五百人塞之命西上閤門使郭守文䕶其役又發畿内丁夫三千二百人塞汴口以判四方館事梁逈董之丙子遣蕃僧滿珠錫哩歸其國天竺之法國王死太子襲其位餘子皆出家為僧不復居國中滿珠錫哩者中印土王子也開寳中來至中國太祖詔令館於相國寺善持律都人歸向施財盈室衆僧頗嫉之以其不解華言即偽為奏請歸既得請始驚恨衆僧諭以上意不得已遲留數月乃去自言詣南海附賈人船以徃竟不知所終云實録云不解唐言此盖承襲前史舊文宋主天下何唐之有今改稱華言詔廣南縣五百户以下者止置主簿一員兼令尉事秋七月乙酉朔以振武節度使殿前都虞候白進超為殿前副都指揮使進超馬邑人初無灼然戰功徒以小心謹密撫士卒故致將帥焉賜武寧節度使陳洪進銀萬兩令市宅詔七夕嘉辰著於甲令今之習俗多用六日非舊制也宜復用七日壬辰贈太師吳王李煜卒上為輟朝三日初鄭彦華之子文寳仕煜為校書郎歸朝不復叙故官煜時在環衞文寳欲一見慮守者難之乃披蓑荷笠為漁者既得入因説煜以聖主寛宥之意宜謹節奉上勿為他慮議者歎其忠先是李飛雄敗逮捕李氏親黨右賛善大夫李若拙與飛雄父若愚以同宗欵暱又連名上疑其昆弟及鞫之乃故與若愚通家非其親且不知謀得免於戮丁酉削籍流沙門島若拙萬年人也中元節張燈詔有司於淮海王俶第前設燈山陳聲樂以寵之江休復雜誌進錢買燈盖此事也休復誤以為上元已見乾徳五年丁未以廬州無為監為無為軍庚戌改明徳門曰丹鳯門中書令史李知古受賕擅改刑部所定法出罪人為所訴鞫得實壬子杖殺之刑房吏孫甫坐免官八月癸丑朔詔以冬至有事於南郊丙辰詔諸道轉運司指揮所屬州府自八月一日後吏民所犯並論如法不在恩赦之限詔兩浙發淮海王俶緦麻以上親及管内官吏悉歸闕凡舟千四十四艘所過以兵䕶送之丁卯著作佐郎盧佩棄市佩監昇州酒轉運使樊若氷劾其姦贓詔鞫之具伏前後所受贓錢一百九十貫遂抵於法辛未夷州蠻任朗政等來貢方物初淮海王佩入朝命其子鎭國節度使惟治權知吳越國事一夕廐中火惟治率兵臨高下視令親信十數軰仗劍申令敢後顧者斬頃之火息妻族有𨽻帳下者恃親犯法惟治命杖背於府門於是惟治悉奉兵民圖籍帑廪管籥授知杭州范旻與其弟惟演惟灝等皆赴闕詔遣内侍䕶諸司供帳迎勞於近郊壬申對於長春殿各賜衣帯鞍馬器幣惟治自奉國改領鎭國乃五月事此時未入朝也夲傳載之入朝後誤矣今不取癸酉杖殺詹事府丞徐遷坐督曹濮州軍儲受賕不法為館驛吏所訴鞫之得實故也甲戍羣臣奉表上尊號曰應運統天聖明文武凡三上許之上先詔權罷貢舉復恐場屋間有留滯者乃詔諸州去年已得解者除三禮三傳學究外餘並以秋集禮部九月甲申朔上御講武殿覆試合格人進士加論一首自是常以三題為凖得渤海胡旦以下七十四人乙酉得諸科七十人並賜及第始賜宴於迎春苑授官如二年之制故事禮部唯春放牓至是秋試非常例也詔自今廣文館及諸州府禮部試進士律賦並以平側依次用韻己亥改杭州衣錦軍為順化軍壬子以布衣張遁為開封府襄邑縣主簿張文旦為澶州濮陽縣主簿上㣲時嘗與遁等同肄業鄉校至是詣闕自言故有是命冬十月癸丑朔契丹遣太僕卿耶律諧理茶酒庫副使王琛來賀乾明節甲寅髙麗國王伷遣使來貢方物及兵仗庚申幸武功郡王徳昭第因幸齊王廷美府賜廷美銀萬兩絹萬疋徳昭及興元尹徳芳賜各有差還召近臣契丹使宴苑中司農寺丞孔宜知星子縣回獻所為文上召見問以孔氏世嗣擢右賛善大夫襲封文宣公辛酉詔免襲封文宣公家租稅先是歴代以聖人之後不預庸調周顯徳中遣使均田遂抑為編戸至是孔氏訴于州州以聞上特命免之宜襲封據㑹要在三年十月免租稅前今附見己巳滑州言靈河縣决河已塞復决命西上閤門使郭守文等率徒塞之守文䕶役在十二月今并書之守文同王侁石振䕶役今止書其長一人庚午畋近郊澧州民訴賊不實刺史趙彦韜殺之剖其心肝民家詣闕訴其事癸酉彦韜坐杖脊配𨽻淮西禁錮契丹使耶律諧理等辭歸國詔供奉官閤門祗候王侁送至境上送伴使盖始此乙亥斬驍㨗卒徐素等三人坐誣告指揮使戎希蕚私習天文災異不實故也詔賜希蕚紫袍銀帯金帛以慰之杭州送錢俶伶人凡八十有一人詔付教坊肄習尋以三十六人還杭州四十五人賜俶實録于辛巳書云詔兩浙所送淮海國王伶人馬安國等百餘人俾教坊肄習之與俶本傳不同今從俶傳若如實録所云則不足記也上初即位幸左藏庫視其儲積語宰相曰此金帛如山用何能盡先帝每焦心勞慮以經費為念何其過也薛居正等聞上言皆喜於是分左藏北庫為内藏庫并以講武殿後封樁庫屬焉改封樁庫為景福内庫置内藏庫實録不書按職官食貨志及㑹要等並云在此年十月因附見其事初太祖别置封樁庫甞密謂近臣曰石晉茍利於已割幽薊以賂契丹使一方之人獨限外境朕甚憫之欲俟斯庫所蓄滿三五十萬即遣使與契丹約茍能歸我土地民庶則當盡此金帛充其贖直如曰不可朕將散滯財募勇士俾圖攻取耳㑹晏駕不果王曾筆記云左藏北庫即封樁庫太宗改名左藏北庫後改名内藏庫按内藏庫實分左藏北庫為之非封樁庫也而封樁庫别改名景福内庫并屬内藏疑王曾悞矣封樁庫但藏每嵗國用羡餘之數亦安得十數年間金帛遂如山乎金帛如山固當是左藏北庫盖僣偽儲蓄並入左藏其北庫金帛山積宜也王曾云僣偽儲蓄悉入封樁政縁誤指左藏北庫即為封樁庫耳又按宋敏求東京記云國初置景福内庫太平興國三年改名内藏相對有封樁庫景徳四年賜名内藏西庫别有景福殿庫𨽻焉敏求以内藏庫即景福庫與國史不同或敏求誤所云封樁庫則是眞宗時别以新衣庫為之者非王曾所記太祖時封樁庫也别有景福殿庫亦𨽻左藏既云别有又恐非太宗所改景福内庫矣然職官志載内藏庫在銀臺門外又有西庫景福殿庫𨽻馬與敏求所記盖同今但以食貨志為據更俟詳考十一月丁亥遣供奉官閤門祗候吳元載太常寺太祝毋賓古為契丹賀正使元載延祚之子也毋賓古即勸王欽若蠲除欠負者當考其邑里乙未親享太廟丙申合祭天地於南郊御丹鳯樓大赦受册尊號於乾元殿國初以來南郊四祭及感生帝皇地祗神州凢七祭並以四祖迭配上即位但以宣祖太祖更配於是合祭天地始奉太祖升侑焉殿直王操獻南郊頌上悦之召問曰汝在江南與誰等操曰與張洎同上問洎今為何官左右對曰太子中允己酉即以操為太子中允令開封府訪義居孝行年八十已上者臨見之初閤門祗候王侁使靈州通逺軍還言主帥所用牙兵率桀黠難制慮嵗久生變請一切代之上因遣侁調發内郡卒徃代戍卒聞當代多願留侁察其中有旅拒者斬以狥卒皆惕息遂將以還此事實録本記皆無之㨿侁𫝊云送契丹使至境上還即為此行今按實録侁送契丹使至境上在此年十月乙亥而十二月戊寅又復命侁與郭守文同䕶靈河之役則侁徃西邉當在十一月前後也今附見於此𫝊又云侁一嵗中徃來西邉多奏便宜頗聽用所云一嵗中者盖通先在清水時事言之也鹽鐡户部度支三司所掌凡二十四案吏千餘人上慮使副判官督察有所不及而商稅酒麴末鹽四案最為繁劇十二月丙辰各置推官命左贊善大夫張仲容等分領之諸案尋皆置推官或置廵官皆以京朝官充乾徳中左補闕薊人宋琪為開封府推官上時尹京初甚加禮遇琪與宰相趙普樞密使李崇矩善多逰其門上惡之白太祖出琪知隴州移閬州上即位由䕶國節度判官召赴闕程羽賈琰先自府邸攀附至顯要琪為所中久不得調丁巳上召見詰責琪拜謝請悔過自新乃授太子洗馬乙丑幸講武臺觀飛山軍人發機石射連弩上將伐北漢先習武事也庚午臘有司請備冬狩之禮上從之因謂左右曰老子云馳騁畋獵令人心發狂夏書曰外作禽荒為人上者不得不戒歴觀前代多惑於此而至䘮敗朕今順時蒐狩為民除害非敢以為樂也甲戍改永興軍為興國軍戊寅契丹遣使蕭巴固濟等來賀來年正是冬諸州貢舉人並集㑹將親征河東罷之自是每間一年或二年乃置貢舉初陳洪進納土上即命其子文顯知泉州議擇能臣闗掌州事殿中丞南頓喬惟岳方居父䘮詔起維岳為通判維岳始至㑹仙遊莆田百丈草冦乘虗嘯聚十餘萬來攻城城中兵纔三千勢甚危急監軍何承矩王文寳欲屠其城燔府庫而遁維岳抗議以為朝廷任以綏逺之寄今惠澤未遍盗賊連結反欲屠城焚庫豈詔意哉承矩等因復堅守時兩浙西南路轉運使楊克讓在福州遂率屯兵徃救之圍既解監軍軍器副使王繼昇率精兵二百騎夜出追擊悉擒其魁首械送闕下草冦悉平承矩繼筠之子也此事未知的在何時今附見是年之末是嵗初置文思院本志在六年今從㑹要李􅐉十朝綱要是嵗行太平興國編勅
