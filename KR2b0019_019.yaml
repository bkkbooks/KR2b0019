body:
  text: 續資治通鑑長編卷十五宋李燾撰太祖開寶七年春正月庚申占城國遣使來貢方物甲戌遣使發廪賑揚楚等州饑民戊寅幸元化門賜治城壕卒衣屨遂幸新水磑還宴射苑中燕國長公主之喪上哀慟謂左右曰明年誕節當罷㑹禁樂己卯中書門下上言王者禮絶正更雖陛下友愛之厚然羣臣上夀無以為禮望許教坊作樂上不得已從之二月庚辰朔日有食之上初臨御欲周知外事令軍校史圭博訪圭亷得數事白於上案驗皆實由是信之纍遷馬軍都軍頭領毅州刺史漸肆威福時德州刺史郭貴權知邢州貴權知邢州在六年六月國子監丞梁夢升知德州貴之族人親吏在德州頗為姦利夢升以法繩之貴素與圭善遣親信至都以其事告圭圖去夢升圭悉記於紙將伺便言之甲申上從容言邇來中外所任皆得其人圭遽曰今之文臣亦不必皆善乃探懷中所記以進曰祇如梁夢升權知德州欺蔑刺史郭貴幾至於死上曰此必刺史所為不法夢升真清强吏也取所記紙召一黃門令齎付中書曰即以夢升為贊善大夫既行又召還曰與左贊善大夫仍知德州圭乃不敢言梁夢升未見有周廣者亦好言外事由內外馬步軍副都練使遷右領衛大將軍嘗白上曰朝廷每遣使吳越錢俶南面坐旁設使者位俶雖貴極人臣然尊無二上而奉使者不能正其名此大辱國上曰汝頗能折之否廣請行俶生辰即遣廣為使俶猶襲故態廣曰比肩事主不敢就席俶乃移床西向為賔主禮廣復命氣驕甚將希寵賞上曰汝蓋倚朝廷威勢不然則俶何有於汝哉廣大慙此事不知的是何時談苑稱廣時作都頭按六年九月壬申廣始自都頭遷環衛今因史圭事附見壬辰慶州言刺史姚內斌卒遣中使護喪歸葬洛陽內斌在慶州踰十年邉人畏伏目為姚大蟲言其虓勇如虎也癸巳以𣙜易使案宋史職官志有榷場使此作𣙜易使易字疑誤田仁朗權知慶州時西戎乘隙擾邉仁朗既至部麾下擊之短兵相接前鋒稍却仁朗斬指麾使二人於纛下軍中震恐爭乞命遂大破之西戎酋長相率請和仁朗殺牛置酒與飲且立誓邉境寧肅璽書褒美先是知博州吕鵠知蘄州秦亶皆坐盜鹽麴額外錢決杖除名庚子令諸州知州通判判官兵馬都監縣令所掌鹽麴及市征地課等並親臨之月具籍供三司秩滿校其殿最欺隱者當置於法募告者賞錢萬癸卯分命近臣於京城祠廟禱雨詔學究舉人所習詩書并易為一科及第選叙與三禮三傳同例乙巳太子中舍胡德沖棄市坐通判延州隱沒官錢一百八十萬為録事參軍假從革所發故也從革尋改左贊善大夫權知海州從革未見三月詔權停貢舉乙丑三佛齊國遣使來貢方物夏四月丙戌追贈昭憲皇太后曽祖藴太保祖琬太傅父爽太師妣皆封衛燕國太夫人癸卯殿中侍御史劉光輔坐知楚州日受賂除籍為民丙午命左補闕南皮賈黃中檢視廣南民田黃中亷直平恕逺人便之還奏利害數十事皆稱㫖李從善之入貢也度支判官殿中侍御史李瑩實為接伴瑩私受從善之賂人或告之五月戊申朔瑩坐責為右贊善大夫分其賂賜鹽鐡判官劉兼户部判官辛仲甫各十萬錢兼未見甲寅以密州所舉貞亷德行忠孝人齊得一為章丘縣主簿得一初以五經教授鄉里弟子自逺而至晋末遭亂其家為州將所屠得一脫身免訴諸朝廷州將坐黜得一乃還家布衣蔬食不復仕進於是應詔來京師䇿試中選故有是命監察御史渤海劉蟠受詔於廬舒等州巡茶蟠乘騾僞稱商人抵民家求市民家不疑出茶與之即擒置於法壬戌命蟠同知淮南諸州轉運事京師民有市官物或不當價者馬軍都軍頭史圭密遣人伺之告其誣罔往往坐誅列肆為之晝閉上既聞其事乙丑降詔曰古人以獄市為寄者蓋知小民惟利是從不可盡繩以法也且先甲之令未始申嚴茍陷人於刑辟深非理道將禁其二價宜示以明文自今應市易官物有妄增損價直欺罔官錢者案鞫得實並以枉法論其犯在詔前者一切不問自是圭所言上愈不用矣丙寅幸講武池觀習水戰丙子又幸講武池觀習水戰遂幸玉津園是月詔司天臺學生及諸司技術工巧人不得擬外官江南國主天性孝友初李從善與鍾謨親狎嘗有奪宗之謀及元宗殂於豫章獨從善與諸弟扈從因懷非望就宰相徐逰求道詔逰正色不與至建業具以聞國主不問待之愈厚從善既被留國主悲戀不己嵗時宴㑹皆罷為却登髙文以見意於是遣常州刺史陸昭符昭符有傳不著里邑入貢奉手疏求從善歸國上不許出其疏示從善慰撫之六月甲申以從善掌書記江直木直木未見為司門員外郎同判兖州僚佐悉推恩尋又封從善母凌氏為吳國太夫人十一月庚辰始封凌氏今并書之昭符在江南與張洎有隙上雅知之因從容謂昭符曰爾國弄權者結喉小兒張洎何不入使爾歸可諭令一來朕欲觀之昭符懼遂不敢歸陸昭符入貢月日實録本紀並不載江表志云從善除兖帥昭符入謝上語及張洎昭符遂留按昭符本傳開寶七年復入貢則除從善為兖帥時未嘗留也除兖帥在二年閏二月江表志必誤今因李煜奉手疏求從善歸國附見其事其後煜遣徐鉉入貢手書云陸昭符既未回下國在骨肉則亦難具陳疑昭符入貢亦必以求從善歸國故也當考戊子詔倉部郎中知制誥張淡權㸃檢三司公事依舊翰林院宿直淡初出居郎署頗怏怏晚節附㑹盧多遜始獲進用不踰旬遽卒上聞其無子甚憫之命中使護喪葬洛陽河中府及絳州民饑丙申詔發河中軍儲三萬石以賑之乙巳減京城麴價斤止百錢秋七月壬子幸講武池觀習水戰遂幸玉津園南丹州蠻溪峒之别種也地與宜州接丙辰酋帥莫洪㬫自稱節度使遣牙校陳紹規奉表修貢求內屬川峽鹽承僞制官鬻之於是詔斤減十錢以惠逺民盧多遜既還江南國主知上有南伐意遣使願受封策上不許於是復遣閣門使梁迥使焉迥從容問國主曰朝廷今冬有柴燎之禮國主盍來助祭國主唯唯不答迥歸上始决意伐之梁回以此嵗夏出使不知果何日也今附此初江南人樊若氷案宋史及薛應旗續通鑑皆作樊若水舉進士不中第上書言事不報遂謀北歸先釣魚采石江上以小舫載絲繩其中維南岸而疾棹抵北岸以度江之廣狹凡數十往反而得其丈尺之數遂詣闕自言有䇿可取江南上令學士院試賜及第授舒州團練推官若氷告上以母及親屬皆在江南恐為李煜所害願迎至治所上即詔國主護送國主聽命戊辰召若氷為贊善大夫且遣使詣荆湖如若氷之䇿造大艦及黃黑龍船數千艘將浮江以濟師也若氷傳云若氷以開寶三年上書㑹要亦云三年十一月大定録乃云在六年十一月登科記云七年不貢舉賜上書人樊若氷及第疑若氷以去年冬來歸今年冬授官大定録與登科記皆得其實也今并書于此己巳彰德節度使贈侍中韓重贇卒遣中使護喪事重贇好釋氏在相州凡六七年日課部民採西山木造佛寺未嘗暫息人皆苦之太子中允李仁友坐知興元府私收渡錢數十萬并强置女口庚午棄市契丹軍器庫副使石重榮東頭供奉官劉琮來降八月丙子朔以重榮為茶酒庫副使琮為西頭供奉官重榮琮未見先是吳越王俶遣元帥府判官福人黃夷簡入貢上謂之曰汝歸語元帥當訓練兵甲江南倔强不朝我將發師討之元帥當助我無惑人言云皮之不存毛將安傅也特命有司造大第於薰風門外連亘數坊棟宇宏麗儲偫什物無不悉具乃召進奉使錢文贄謂之曰朕數年前令學士承㫖陶榖草詔比於城南建離宫今賜名禮賢宅以待李煜及汝主先來朝者賜之且以詔草示文贄遂遣文贄賜俶羊馬諭㫖於俶戊寅俶遣其行軍司馬孫承佑入貢丁亥辭歸上厚賜俶器幣且密告以師期承佑俶妃之兄本伶人以妃故貴近用事專其國政時謂之孫總監言無所不領轄也九國志載錢文贄至自京師在開寶四年國史并黃夷簡入貢皆載於五年之後九國志恐失之太早然國史月日都不可考今且因孫佑來朝先著之十國紀年亦於開寶五年載夷簡入貢當考己丑幸講武池觀習水戰賜庫人錢甲午忠武節度使同平章事贈中書令琅琊正懿王王審琦卒初審琦暴得疾失音上親臨問錫賚巨萬及卒又幸其第哭之慟賻贈並加等焉戊戌殿中丞趙尚除名坐知漢州日擅稅竹木也甲辰幸講武池觀習水戰遂幸玉津園九月癸亥命潁州團練使曹翰領兵先赴荆南丙寅復命宣徽南院使曹彬侍衛馬軍都虞候洛陽李漢瓊判四方館事田欽祚同領兵繼之上已部分諸將而未有出師之名欲先遣使召李煜入朝擇羣臣可遣者先是左拾遺知制誥開封李穆與參知政事盧多遜同門上嘗謂多遜曰穆性仁善文辭之外無所豫多遜曰穆操行端直臨事不以生死易節仁而有勇者也上曰誠如是吾當試之丁卯遂遣穆使江南穆至諭㫖國主將從之光政使門下侍郎陳喬曰臣與陛下俱受元宗顧命今往必見留其若社稷何臣雖死無以見元宗於九泉矣清輝殿學士右內史舍人張洎亦勸國主無入朝時喬與洎俱掌機密國主委信之遂稱疾固辭且言謹事大國者蓋望全濟之恩今若此有死而已穆曰朝與否國主自處之然朝廷兵甲精鋭物力雄富恐不易當其鋒也宜熟計慮無自貽後悔使還具言其狀上以為所諭要切江南亦謂穆言不欺已使還當在此月後今并言之是日又命山南東道節度使潘美侍衛步軍都虞候清池劉遇東上閣門使梁迥等同領兵赴荆南甲戌以太子中允知荆湖轉運使許仲宣兼南面隨軍轉運使事仲宣青州人也冬十月開封府言京城諸官司獄皆空無繫囚甲申上幸迎春苑登汴堤發戰艦東下丙戌復幸迎春苑登汴堤觀諸軍習戰遂幸東水門發戰棹東下江南國主復遣其弟江國公從鎰水部郎中龔慎修重幣入貢且買宴上皆留之不報曹彬與諸將入辭上謂彬曰南方之事一以委卿切勿暴略生民務廣威信使自歸順不須急擊也且以匣劔授彬曰副將以下不用命者斬之潘美等皆失色不敢仰視自王全斌平蜀多殺人上每恨之彬性仁厚故專任焉邵氏見聞録云趙普實薦曹彬按此時普已罷相出鎮矣恐邵氏誤今不取紀事本末太祖初命曹武惠彬討江南潘美副之將行賜宴於講武殿酒三行彬等起跪於榻前乞面授處分上懷中出一實封文字付彬曰處分盡在其間自潘美以下有罪但開此徑斬之不須奏禀二臣股栗而退訖江南平無一犯律者比還復賜宴講武殿酒三行二臣起跪於榻前曰臣等幸無敗事昨授文字不敢藏於家即納於上前上徐自發封示之乃白紙一張也上神武機權如此初特以是申令使果犯而發封見而為白紙則必入禀及歸而示之又將以見初無輕斬之意恩威兩得故雖彬等無不折服壬辰曹彬等發荆南赴金陵丁酉以吳越王俶為升州東南面行營招撫制置使仍賜戰馬二百匹遣客省使丁德裕以禁兵步騎千人為俶前鋒且監其軍己亥曹彬等自蘄陽過江破峽口寨殺守卒八百人生擒二百七十人獲池州牙校王仁震王宴錢興等三人甲辰以曹彬為升州西南面行營馬步軍戰櫂都部署潘美為都監曹翰為先鋒都指揮使初王師直趨池州緣江屯戌皆謂每嵗朝廷所遣巡兵但閉壁自守遣使奉牛酒來犒師尋覺異於他日池州守將戈彥遂棄城走閏十月己酉曹彬等入池州先是上遣八作使郝守濬守濬未見率丁匠自荆南以大艦載巨竹絙并下朗州所造黃黑龍船於采石磯跨江為浮梁或謂江闊水深古未有浮梁而濟者乃先試於石牌口既成命前汝州防禦使靈邱陸萬友往守之丁巳曹彬等及江南兵戰於銅陵敗之獲戰艦二百餘艘生擒八百餘人銅陵在池州東北一百四十里庚申知制誥史館修撰扈䝉上言昔唐文宗每開延英召大臣論事必命起居郎舍人執筆螭拗以紀時政故文宗實録今最詳備後唐明宗亦命端明殿學士及樞密直學士輪修日歷送史館近朝以來此事都廢每季雖有內廷日歷樞密院録送史館然所記者不過對見辭謝而已帝王言動莫得而書緣宰相以漏泄為虞無因肯說史官以踈逺是隔何由得聞望自今凡有裁制之事優恤之言發自宸𠂻可書簡册者並委宰臣及參知政事每月輪知抄録以備史官撰集詔從之命盧多遜專其職壬戍曹彬等至當塗雄逺軍判官婺源魏羽以城降雄逺即當塗也江南置軍於其縣王師先拔蕪湖又克當塗遂屯采石磯潭州嵗貢新茶斤片重厚頗異他嵗有司請别定其價上曰茶則善矣無乃重困吾民乎癸亥詔潭州依舊捲模制造毋輒增改甲子監修國史薛居正等上新修五代史百五十卷明日上謂宰相曰昨觀新史見梁太祖暴亂醜穢之跡乃至如此宜其旋被賊虐也丁卯曹彬等敗江南二萬餘衆於采石磯生擒一千餘人及馬步軍副部署楊收兵馬都監孫震等又獲戰馬三百餘匹初江南無戰馬朝廷每嵗賜與百匹至是驅為前鋒以拒王師既獲之驗其印記皆朝廷所賜者也十一月乙亥朔潭州兵入江南界攻萍鄉為其制置使劉茂忠所敗國主即授茂忠袁州刺史茂忠安福人也通判鹽户納鹽舊以布帛茶米等折償其直庚辰詔給以錢癸未籍泰寧節度使李從善麾下及江南水軍凡千三百餘人為禁旅號曰歸聖甲申省劔南道諸縣主簿詔免蒲陜晋絳同解等六州逋租陜西諸州蠲其半詔移石牌鎮浮梁於采石磯繫纜三日而成不差尺寸王師過之如履平地移采石浮梁及新林寨之捷據實録皆以二十日奏到度其事勢當在初十或十一二間奏既無的日因附見于此獨取新林寨之捷仍以奏到日書之示疑也初為浮梁國主聞之以語清輝殿學士張洎洎對曰載籍以來無有此事此必不成國主曰吾亦謂此兒戲耳於是遣鎮海節度使同平章事鄭彥華督水軍萬人天德都虞候杜真領步軍萬人同逆王師將行國主誡之曰兩軍水陸相濟無不捷矣彥華見顯德三年真未見戊子吳越王俶遣使修貢謝招撫制置之命也并上江南國主所遺書其略云今日無我明日豈有君明天子一旦易地酬勳王亦大梁一布衣耳己丑知漢陽軍李恕敗江南鄂州水軍三千餘人獲戰艦四十餘艘恕奏以二十二日到甲午曹彬等言敗江南兵數千人於新林寨案宋史及薛應旗續通鑑皆作新竹寨下同獲戰艦三十艘新林寨之捷與繫采石浮橋同以二十日到度其事勢當是初十或十一二間也今從實録所書不復改移契丹涿州刺史耶律琮致書於權知雄州內園使孫全興其略云兩朝初無纎隙若交馳一介之使顯布二君之心用息疲民長為鄰國不亦休哉辛丑全興以琮書來上上命全興答書并修好焉全興未見壬寅大食國遣使來貢方物鄭彥華杜真與王師遇真以所部先戰彥華擁兵不救真衆遂敗十二月金陵始戒嚴下令去開寶之號公私記籍但稱甲戌嵗益募民為兵民以財及粟獻者官爵之杜真之敗據江南野録王師猶在當塗國史不記其處實録本紀並不書不知即新林寨之捷否新林所獲又水軍恐非杜真所將也今依野録附見十二月右補闕馮翊楊克讓先自西川轉運副使代歸奏事稱意上命坐與語且諭以將大用左司員外郎權判吏部流內銓侯陟性險詖覘知之因對上問識克讓否陟曰臣與克讓遊甚久其為人有才智誠佳士不易得也比聞其杜門謝絶賔客多市白金作飲器厚自奉且言陛下將用之臣私切怪焉上怒意遂中輟丙午命克讓權知升州行府事以光祿寺丞崔宏太僕寺丞徐元少府監丞張玘分領三司孔目官事見判官如吏人之禮踰年罷之丁未漢陽兵馬監寧光作敗鄂州水軍三千餘人於江北岸光作以此月初三日捷初八日奏到己未護國節度使贈侍中陳思讓卒遣中使護喪事録其子欽祚為尚食副使思讓纍歷方面無敗政然酷信釋氏所至禁屠宰俸祿悉以飯僧衆號為陳佛子身沒之後家無餘財吳越王俶率兵圍常州俘其軍二百五十人馬八十匹於常州城下明年正月初九日奏到癸亥拔利城寨破其軍三千餘衆生擒六百餘人丙寅曹彬等破江南兵於新林港口斬首二千級焚戰艦六十餘艘明年正月一日奏到北漢主搜其軍中子弟自十七以上皆籍為兵盡括民馬遣代州刺史蔚進來冦平陽權知晋州武守琦率衆禦之庚午與進遇於洪洞縣界擊敗北漢兵五千餘人明年正月初四日奏到辛未吳越王俶破江南兵萬餘衆於常州北境上明年正月二十一日奏到是嵗始詔除授京官差遣勾當黜陟令中書依朝官例降敕御史臺修寫班簿每十日一上中書此事據㑹要閏十月事今附此當考以前何獨不降敕進班簿北漢主改元廣運天㑹凡十八年始改廣運或云十三年即改蓋誤今從資治通鑑考異以劉繼顒神道碑為正契丹將通好于我遣使諭北漢主以强弱勢異無妄侵伐北漢主聞命慟哭謀出兵攻契丹宣徽使馬峰固諫乃止此據十國紀年
