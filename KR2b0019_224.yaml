body:
  text: 續資治通鑑長編巻二百二十宋李燾撰神宗熙寧四年二月丁已朔中書言古之取士皆本於學校故道徳一於上習俗成於下其人材皆足以有為於世自先王之澤竭教養之法無所本士雖有美材而無學校師友以成就之此議者之所患也今欲追復古制以革其弊則患於無漸宜先除去聲病偶對之文使學者得以專意經義以俟朝廷興建學校然後講求三代所以教育選舉之法施於天下則庶幾可復古矣明經及諸科欲行廢罷取元解明經人數增解進士及更俟一次科場不許諸科新人應舉漸令改習進士仍於京東陜西河東河北京西五路先置學官使之教導其禮部所增進士奏名止取五路進士充數所貴合格者多可以誘進諸科嚮習進士今定貢舉新制進士罷詩賦帖經墨義各占治詩書易周禮禮記一經兼以論語孟子每試四場初本經次兼經並大義十道務通義理不須盡用注疏次論一首次時務策三道禮部五道禮部五道當考中書撰大義式頒行量取諸科解名增解進士以熙寧二年解明經數為率如舉人數多於熙寧二年即每十人更取諸科額一人諸科額不及三人者聽依舊不解明經處每增二十人如十人法禮部奏名於諸科解額取十分之三增進士額京東陜西河北河東京西進士開封府國子監諸路嘗應諸科改應進士者别作一項考校其諸科内取到分數並充進士奏名將來科場諸科宜令依舊應舉候經一次科場除舊人外不得應諸科舉五路先置學官中書選擇逐路各三五人雖未仕有經術行誼者亦許權教授給下縣主簿尉俸願應舉者亦聽候滿三年有五人奏舉堂除本州判司主簿尉仍再兼教授即經術行誼卓然為士人所推服者除官充教授其餘州軍並令兩制兩省館閣臺諫臣寮薦舉見任京朝官選人有學行可為人師者中書體量堂除逐路官令兼本州教授諸州進士不及二百人處令轉運司併隣近三兩州考試仍各用本州解額殿試䇿一道限千字以上分五等第一等二等賜及第第三等出身第四等同出身第五等同學究出身從之朱本云自詩賦取士以來學者彫敝聰明及其中選施於有政無所用之其弊所從來久然莫能革也自上即位稽合先王造立法度而議者不深惟其意羣起而非之上以為凡此皆士不知義故也故罷黜聲律而修明庠序之教由是人務經術而識義理者多矣從之以下九十八字並朱史所増議論非是新録已削去今姑存别項初試四場後只試三場初試大義本經及兼經各十道後未幾時改初試四場時務策三道是第三場又有禮部五道未詳本文禮部作南省當考新紀書罷詩賦及明經諸科以經義論策試進士置京東西河北河東陜西路學官舊紀并載詔書述志係之二年二月誤也選舉志第一巻云詩賦浮靡不根道徳施於有政無所用之自唐以後莫之能革上稽合先王造立法度而議者不深惟其意羣起而非之上以為凡此皆士不知義非其所習見乃罷黜聲律俾王安石訓釋經㫖頒之天下既知經術矣因詔隨所治經以十分為率均取之張璪言治禮舉人比詩書易絶少宜加勸奬乃詔倍取其後迄元豐間大率約十分均取有餘不足相補不過三分而已始以本經論語孟子義為兩場論策各為一場後以論語孟子附本經止三日畢試考官互考一場衆定乃去留之殿試初考覆考文巻髙下相殊者許詳定酌中别立等第中選者分五等第一等第二等賜及第第三等進士出身第四等同出身第五等同學究出身惟同學究出身獨熙寧六年九年行之其後第五等皆上特推恩復賜同進士出身上批近諸處覘西賊聚十二監軍司人馬及取齊地名皆有考據詳此乃是大舉慮諸路不大為備賊至有失支梧可令陜西河東宣撫及諸路經畧司早為清野之計毋得輕易接戰司農寺言相度京西差役條目内酒稅等諸般坊店場務之類候今界滿拘收入官於半年前依自來私賣價例要閙處出牓召人承買限兩月日並令實封投狀置厯拘管限滿據所投狀開驗著價最髙者方得承買如著價同並與先下狀人其錢聽作三限每年作一限送納從之此用編録刪五年二月十三日刑部帖備坐四年二月十一日中書劄子増入實封撲買或自此始三年十一月十七日十二月九日四年三月十四日當并考遍賣天下酒場則在五年二月二十二日庚申詔河東發民夫運糧輸邉可聽民從便就邊州糴納河外糧草如稍有備即停運及有可以寛民力者令轉運司從宜施行辛酉著作佐郎館閣校勘劉摰權檢正吏房公事上初欲用朱明之王安石以親辭上曰摰未可知安石曰試其可否則罷之無傷兼勢自有禮院差遣也故命摰權司天奏老人星見故事當送史館上曰此甚無謂可罷王安石稱善并言故事許上賀表亦宜罷詔罷之詔河北轉運司輸錢十萬緡於太原以備軍費樞密院言宣撫司自定逺縣築堡至婁城以通糧道入生界首尾百七十里須以兵防䕶若賊衆猝來攻圍恐難守禦或出兵渡河為賊先據西岸則軍馬難濟欲令宣撫司更相視山河形勢如府州與保徳軍合河津於通津堡且於定逺客戸夾河相對西岸依險築堡所貴易而早成出師濟河以有保庇賊不敢輙臨河攻禦若入西界還師萬一賊馬追襲便有歸守之處其餘向西展作堡寨漸次易就從之种諤既城婁分兵千五人留副將李宗師守之諤還軍綏徳城此據范育誌諤城婁事凡二十九日畢工往反才三十五日其還綏徳當是二月初五日也因附見於此正月二日戊子可考河東經畧司既發兵與种諤㑹又承詔發兵二萬給饋餉由荒堆新路以趨婁城吕公弼曰我之大兵雖已通行敵若設伏繼後則師無噍類矣永和關雖囘遠違期而可免鈔襲之患乃使由永和關以往俄而神堂援兵果遇伏不得進上手詔褒之既城婁築三寨又欲增置堡障公弼上言三寨散濶未易守也今大兵殺獲已多敵方懐忿日夜聚兵必為邊患願罷三寨專為持重以銷犯邊之謀不聽端明殿學士尚書左丞王素為工部尚書端明殿學士致仕上亟從之王安石言宜且降詔不允上曰素今在此實知其病便令致仕何傷安石曰無傷也故事致仕者例不帯職王安石以為致仕者致其職事於君無落職之理故皆以本職致仕自王素始此據司馬日記增入帯職致仕已見三年十二月辛巳知永興軍端明殿學士兼翰林侍讀學士司馬光知許州光在永興宣撫司請增修城壁雖内郡不被邊亦增修如邊郡光奏罷之又請添屯軍馬於長安河中邠州光言歲凶民艱食懼無以供億乞罷添屯不許宣撫司賦民造乾糧􅀈飯光以為昔常造後無用腐棄之民力可惜又奏乞灾傷地分所欠青苗錢許重疊倚閣仍牒所部八州軍未得依司農寺指揮催理詔提舉司催理如司農寺指揮不得施行光牒宣撫使下令分義勇四畨欲以更戍邉選諸軍驍勇募閭里惡少為奇兵調民為乾糧􅀈飯雖内郡不被邊皆修城池樓櫓如邊郡且遣兵就糧長安河中邠三輔騷然光上疏極言方今公私困敝不可舉事而永興一路城池樓櫓皆不急乾糧􅀈飯昔常造後無用腐棄之宣撫司令臣皆未敢從若乏軍與臣坐之於是一路獨得免頃之詔移知許州不起遂乞判西京留守司御史臺以歸自是絶口不論事此蘇軾為行狀所載如此新傳因之細考或先後從違不同今據光集奏議别修光知言不用遂乞判西京留司御史臺不報又上章曰臣之不才最出羣臣之下先見不如吕誨公直不如范純仁程顥敢言不如蘇軾孔文仲勇決不如范鎮誨於安石始知政事之時已言安石為姦邪謂其必敗亂天下臣以謂安石止於不曉事與狠愎爾不至如誨所言今觀安石引援親黨盤據津要擠排異已占固權寵常自以已意隂贊陛下内出手詔以決外廷之事使天下之威福在己而謗議悉歸於陛下臣乃自知先見不如誨遠矣純仁與顥皆與安石素厚安石㧞於庶僚之中超處清要純仁與顥覩安石所為不敢顧私恩廢公義極言其短臣與安石南北異鄉取舍異道臣接安石素疎安石待臣素薄徒以屢嘗同僚之故私心眷眷不忍輕絶而預言之因循以至今日是臣不負安石而負陛下甚多此其不如純仁與顥遠矣臣承乏兩制逮事三朝於國家義則君臣恩猶骨肉覩安石專逞其狂愚使天下生民被荼毒之苦宗廟社稷有累卵之危臣畏懦惜身不早為陛下别白言之軾與文仲皆疎遠小臣乃敢不避陛下雷霆之威安石虎狼之怒上書對策指陳其失隳官獲譴無所顧慮此臣不如軾與文仲遠矣人情誰不貪富貴戀俸禄鎮覩安石熒惑陛下以佞為忠以忠為佞以是為非以非為是不勝憤懣抗章極言自乞致仕甘受醜詆杜門家居臣顧惜禄位為妻子計包羞忍恥尚居方鎮此臣不如鎮遠矣臣聞居其位者必憂其事食其禄者必任其患茍或不然是為盜竊臣雖無似嘗受教於君子不忍以身為盜竊之行今陛下惟安石之言是信安石以為賢則賢以為愚則愚以為是則是以為非則非諂附安石者謂之忠良攻難安石者謂之讒慝臣之才識固安石之所愚臣之議論固安石之所非今日所言陛下之所謂讒慝者也伏望陛下聖恩裁處其罪若臣罪與范鎮同乞即依范鎮例致仕若罪重於鎮或竄或誅所不敢逃詔光移知許州令過闕上殿或曰陛下不能用光言光必不來上曰未論用其言與否如光者常在左右人主自可無過矣光訖辭許州固請留臺久之乃從其請光自是遂絶口不復論新法光上章自言不如吕誨等上令過闕上殿此據邵伯温聞見録伯温又云上謂御史程顥曰朕召司馬光卿度光來否顥對曰陛下能用其言光必來不能用其言光必不來按三年四月顥已罷御史此時不在朝廷伯温誤矣今存其語而不出對者姓名以闕疑更須考之留臺得請乃四月十九日癸酉今并書于此李清臣作韓絳神道碑云司馬光方與執政忤而絳言光可代己為樞密副使至為宰相又薦光神宗亦可之曰卿度光來乎朕當亟召邵伯温所記度光來乎神宗語絳而伯温誤之以屬程顥也更詳考之詔江淮發運司遣官劾亳州屬縣官吏阻遏願請青苗錢人户事狀及令轉運提刑司體量逐縣不被訴灾傷因依以聞其灾傷户雖不檢放其未納稅賦權與倚閣管勾淮南路常平等事著作佐郎趙濟言富弼以大臣廢格新法法行當自貴近始若置而不問無以令天下矣故有是命濟宗道子也編修中書條例所言舍人院除官皆有定格除官之人無日不有而外制臣僚皆兼領他事既出倉卒褒貶重輕或未得中乞自今文臣兩制武臣閤門使已上及朝廷陞擢特㫖改官并責降特選告辭外其餘除授並撰定檢用從之時政記係之壬戌初六日今從實録先是上言陳繹制辭不工欲用曾布疑布所領事已多王安石曰布兼之亦不困遂以布直舍人院安石因言制辭太繁如磨勘轉常參官之類何須作誥稱譽其美非王言之體兼令在官者以從事華辭費日力上曰常參官多不識每轉官盛稱其材行皆非實誠無謂安石曰臣愚以為但可撰定誥辭云朕録爾勞序進厥位往率職事服朕命欽哉他放此撰定則甚省得詞臣心力却使專思慮於實事亦於王言之體為當馮京以為不可上卒從安石言上又欲用張琥直舍人院京復薦劉攽曾鞏蘇軾上不答攽時通判泰州鞏通判越州軾罷開封府推官通判杭州未赴也此據王安石日録樞密院言逐房所行差官宣巻其間職同而約束異詳畧失中前後參錯欲送承㫖司集逐房副承㫖同參詳條目刪定各為書一進呈遇差官即頒降遵守其差官宣命直坐所差職事畧去繁文以存制詔之體從之賞平渝州巴縣夷賊功以兵馬使杜安行為右侍禁王泰為三班奉職餘各等第推恩僧居一賜紫衣度其童行二人初五日辛酉檢正中書户房公事曾布奏近言刑統刑名義理多所未安乞加刋定準朝㫖令臣看詳今逐一條析刑統疏義繁長鄙俚乃其間條約今所不行可以刪除外所駮義乖謬舛錯凡百餘事離為三巻上進詔曾布更切看詳刑統内如有未便事理續具條析以聞實録有此中書時政記亦有之實録蓋因時政記也已附見三年八月二十一日戊寅乃附注於此要合削此壬戌韓絳乞用陜西路提㸃刑獄韓鐸權河東轉運使上曰鐸暴刻恐河東新經瘡痍之後未可用文彦博曰韓絳要鐸了邊事今不用鐸用他人恐敗事馮京曰鐸好希向時事王安石亦言鐸反覆上曰如肯希向時事雖小過當擾人猶勝陳汝羲張問故意壊事安石曰故意壊事與希向擾人皆不可也因言鐸初助行常平法後聞臣將罷政事遂一切沮壊如此人恐難任以邊事上曰當察之安石曰恐察得時已害事上曰别未有人張問等必難留在任且用鐸如何安石曰善遂從絳請此據日録三年九月張問為河東漕四年三月二十一日問責知光化四月二十一日孫坦以開封判官為河東漕上又與安石論河東城寨非不可修轉運司不應故意沮壊乃專欲罷修安石曰臣在翰林陛下問裴度臣時奏對非度討蔡州以為未能治朝廷乃用兵於方鎮雖幸有功不足多其後陛下問宣王即位何以便攘外國臣時奏對以為宣王内修政事然後外攘外國陛下深以臣言為然陛下擢臣在此位一夫失所臣任其責自聞河東騷擾臣寢食不安豈敢於陛下不盡所懐河東經畧司轉運司已令分析及體量要治其沮壊之罪須其辭服乃可行罰上曰只將宣撫司經畧轉運司前後文字參較便見事實安石曰未可見但令各具分析若實無理無縁妄說得行陛下非是不曉吏文此事不難見曲直上曰須以意窮究安石曰但當令各盡其所言則曲直自見若有意則有適莫猶當自竭所懐恐他人觀望陛下意所在即便失事實馮京言范育囘自見范育體量河東在正月十三日安石曰范育回恐亦未得事實上曰范育誠未足信須更令人體量若張問輩果用意沮壊則不可容安石曰用意沮壊固不可容就令失錯所害至大亦非可施輕典今失入死罪三人已是除名編管今困一路生靈只自縊殺者已不啻三人何可恕但其辭未盡未可輕用典刑須窮究到底令其無辭則法行而人服及范育奏轉運司科擾事安石請如育奏乃令育詳具轉運司乖方事狀并令轉運司分析上猶疑問等用意壊事安石曰不問用意與不用意皆可罪或是自為計太過慮縁乏軍興得罪故顛錯至此耳上以為然育又奏臣自到河東凡語勞費之狀無不歸轉運使以調發之煩驅率之暴文書約東之峻皆轉運司所出而宣撫使又出牓告諭以非已意故也比臣取索到轉運使承禀移文及遵行節次并經畧司出兵事狀乃知皆起於宣撫司妄舉重兵軍須暴併而成於轉運司倉卒應命計慮不精使一路務本勤儉之民蕩析生業瀕於死亡之患上軫宵旰憂懐下啓四方憤歎罪固有處臣昨自環慶路勾當回抵宣撫司欲令諸道進攻竊料足以困賊猶冀朝廷中外合謀成就大計而臣亦不敢更起髙遠之論以沮格定算憤亂疾仇慮實同國今宣撫司韓絳率麟府萬兵九日後方至婁城無所定勝取當而三十萬之民轉餉於道其資費五六百萬又將聚兵役四寨調斂紛紛百出國計民財戕壊未已於彼慮無一分之損使收威完力潛形逺遁鼓氣畜怒徐為後圖而絳不明此理欲困西賊夫豈慮大憂深知兵者哉臣歴訪修寨利害議者以為八寨齊興堡障布列然後有守之勢計官私財力決不可成縱或成之於邊防有小利於國計有大害小利者使綏麟府路通内省沿河屯守之備外收西賊所恃茶山鐵冶竹箭財用之府大害者前日城荒堆三泉民力已困今繼興三寨諸堡度境愈逺費什於前何以供億雖嚴刑驅脅力屈不繼將見逃潰失職之民嘯呼轉聚而為盜則患不獨在邊而更在中州矣兼頻歲河東竭二十州之力以供麟府豐三州役人疲於轉輸酒户困於折納稅夫窮於和糴今更增四寨臣恐民不堪命為河東萬世之害加以賊失所恃必竭國死力來爭邊禍之大必自此始伏望清衷更賜深講顧大害損小利以定安危至計同知大宗正丞李徳芻言欲乞自今後皇親應有内外親族吉凶弔省合出入事件編成則例更不逐旋奏知及日申本司只令勾當使臣置厯抄上赴大宗正司簽押其牓子每月類聚奏聞從之癸亥陜西河東宣撫判官度支員外郎知制誥吕大防知延州權發遣延州右司諫直龍圖閣趙卨權發遣慶州知慶州工部郎中寳文閣待制王廣淵知永興軍大防以使事未畢納敕宣撫司不拜卨與廣淵踰月皆復故復故在三月十日今豫見于此卨始視事蕃漢健兵皆領於种諤丁壯婦女裹送糧糗惟老小在焉諤怙權自用無復紀律須資糧皆以軍興法促辦毁撤邊障樓櫓以充新城帥府不與知卨隨宜繕補以備不虞因悉條上且言諤輕進無策婁城孤逺終難保今不患外國内侵而患紀律不正不患城池難守而患威柄倒持變起斯須動失機會望改擇賢帥以寛西顧此據墓志附見十八日撫寧堡陷合參考司農寺言陵州籍縣民願請青苗錢常平倉無現錢本州以鹽并課兌支轉運司輙劾擅支之罪乞釋官吏而劾轉運等司罪以聞從之究竟如何甲子太子中允集賢校理直舍人院檢正中書户房公事曾布檢正五房公事布每事白王安石即行之或謂布當白兩參政指馮京及王珪也布曰丞相已議定何問彼為俟敕出令押字耳布三年九月十五日為户房檢正五月三日詳定編敕其直舍人院在此月五日御史中丞楊繪言近者進奏院班下四方及流内銓牓示條貫其首但云據某房檢正官申具其末又云進呈奉聖㫖依檢正官所定首末並以檢正官為文若不曾經中書門下殊失朝廷號令之體又言臣常論朝廷號令之體不當首末止作檢正官名目尋聞先已改更只作諸房者臣竊疑猶未當理夫奉聖㫖指揮頒下者即朝廷之政令諸房乃胥吏之曹名今作檢正官名目尚謂失體况止作某房名目則天下中外豈不訝其所出乎况已經中書門下參定則可只作中書門下何必須曰某房哉臣又聞諸房檢正官每有定奪文字未申上聞並只獨就宰臣王安石一處商量禀覆即便徑作文字申上其馮京等只是據已做成申上者文字簽押施行臣竊謂國家並建輔弼不惟凡事欲集長以詳處其當亦欲防權柄專歸於一門也今檢正官等皆朝廷選用之人不識體如此是致外議譁然咸謂雖塗注亦有只是宰臣王安石與都檢正官曾布商議而參知政事馮京王珪或有不先預聞者臣亦料此說非實然安得家至户到而曉之乎伏乞陛下特賜誡勵檢正官等每有定奪文字須是徧行禀覆并指揮馮京王珪等令各振其職無茍且焉詔借内藏庫錢六十萬緡為淮南江東常平糴本令江淮發運司以合撥河東陜西折斛錢兌還乙丑樞密院言宣撫司勾當公事宋迪請差使臣押伴李崇貴赴軍前上批宣撫使不久回李崇貴更勿遣此據御集可見神宗已有罷兵意故特書之二月庚辰迪改陜州丁卯著作佐郎崇文院校書朱明之為太子中允集賢校理崇政殿說書兼管國子監明之固辭復為故官明之辭新官復故官乃二月二十二日今并書林希云云附注八月己卯王雩為說書時館閣校勘同判登聞鼓蒲宗孟權檢正中書孔目房公事編修中書條例鄧潤甫權檢正中書户房公事詔諸道進奏院以知銀臺司官提舉其勾當進奏院官罷三班使臣令樞密院選差京朝官二員臣寮之家不得陳乞子弟勾當御集有河卯十一日經畧奏事戊辰賜恩州防禦使宗晟芳林園宅一區計口給屋御集二年十二月十三日賜宗愈手札可參考賜交子十萬緡為梓州路常平糴本詔陜西轉運司劾永興軍官吏擅止絶興修萬年縣灞滻水溉田因依以聞要見後如何又詔河北轉運提㸃刑獄司體量少雨雪州縣民乏食者賑䘏之殘稅權行倚閣知太原府吕公弼言嵐石隰州都巡檢康從領兵入西界多為西賊邀遮戰沒止稱趂隊不及乞特依陣亡例賻䘏從之軍員即具析子孫以聞康從仍衝替令轉運司劾罪又言西賊衝突修寨處難為施功願且罷役嚴誡邊吏專為堅壁清野之計上乃詔宣撫司速修第一寨賊至則堅守之候賊界放散重兵徐圖前進次修中堡其第二寨漸為修築之備候第一寨畢奏取指揮堅守第一寨御集在二月十七日今從實録吕公弼言西賊於麟府修寨處作過御集在二月十一日今從實録是十二日詔自今在京官司合舉官並先關牒所屬勘會歴任於條無礙方許奏舉是日上對輔臣言向來茶法之弊文彦博曰非茶法弊蓋昔年用兵西北調邊食急用茶償之其數既多茶不售則所在委積故虚錢多而壊法也王安石曰𣙜茶所獲利無多吳充曰仁宗朝茶法極弊時歲猶得九十餘萬緡亦不為少茶法因用兵而壊彦博所言是矣然立法之初許商人入芻粟邊郡執交鈔至京師或使錢銀紬絹或香藥象牙惟所欲商人便之故法大行至祥符初限以三稅之法定立分數不許從便客旅拘制又茶官多買茶之下者茍足課額商人得之往往折閱又法數變而民不信此其所以大壊如邊鄙無事法令不為小利輕變易自無不行之法王安石曰茶法本亦不善須挾見錢香藥等乃能售蓋見錢香藥等已足辦邊糴而茶乃更為賈人之累以此小賈不能入中惟大賈能之惟大賈始能則邊糴之權制於大賈此所以糴價常髙而官重費也庚午于闐貢方物上批殿前馬步軍司差發外餘兵數不多京師根本之重於理非便其治平四年熙寧元年差出之人可契勘抽回又手詔付樞密院曰昨李復圭擅易詔命出師侵敵遂致西鄙用兵廣南守臣亦以强為招納引惹蠻冦䕫峽夷户本止羈縻近者用衆討除元惡尚未授首前日又據河東邊吏奏北敵聚兵雖未測虚實恐邊臣有以啓之者况今朝廷政事之弊方議修理國財民力窮乏可知平時無事尚虞天灾流行無以待之若四方有警何以支梧恐邊臣未悉朝廷之計宜密戒諭之先是宣撫使奏夏人㸃集不起或云往讎賽西蕃上曰此何意也王安石曰彼或先并力討西蕃彈壓已定乃來與中國爭縁今便與中國爭亦未見其利上曰能如此乃是有謀安石曰前見梁氏委計於諸首領或恐諸首領計慮及此馮京又言或聞就契丹借兵上疑契丹不肯安石曰夏賊若果借兵於契丹即不為得計恐其不至如此及是探報契丹隂發腹裏兵三十萬往西界不令中國知上曰果有此否安石曰雖有此不足恠陛下即位即經營綏州又取銀州取銀州當考破其唇齒之勢彼以為中國若已服夏國當覘幽燕若乘中國有事之時能撓我權則其庸多矣夏國主幼婦人用事忿而無謀或請師於契丹則為契丹計雖許之何為不可可以撓中國而無損於我契丹優為之但恐其無逺畧不能出此上曰果及此則奈何安石曰陛下誠以靜重待之雖加一契丹於邊事亦不至狼狽若欲進取非臣所知且我堅壁清野積聚芻糧以待敵則敵未能深為我患而彼兩國集於境上其芻糧何以持久我所患者在於芻糧難繼而已愛惜芻糧無傷民力而以靜重待敵之釁則外患非所恤也馮京曰恐其如慶厯時事安石曰慶厯自是朝廷失節以致嫚侮京曰去告彼令說與夏國彼便承當以為此極小事上曰契丹前後極有機㑹可乘朝廷自失之如真宗末年欲託後嗣朝廷却宜與承當安石曰此亦何補若其後嗣强桀豈以此故肯屈服若孱懦雖無此亦何難屈服且勝外國只在閒暇時修吾政刑使將吏稱職財榖富兵彊而已虚辭偽事不足為也真宗末年欲託後嗣此事當考上患陜西財用不足安石曰今所以未舉事者凡以財不足故臣以理財為方今先急未暇理財而先舉事則事難濟臣固嘗論天下事如奕棊以下子先後當否為勝負又論理財以農事為急農以去其外國抑兼并使趣農為急此臣所以汲汲於差役之法也辛未詔自今丞郎給諫分司致仕遺表恩比見任第降一等其武臣令樞密院施行堂後官魏黙言前此誤依見任例與京官故改之上曰黙可賞王安石曰且與上簿上曰自合上簿宜特與賞安石曰與減二年磨勘上曰善安石曰陛下及此甚善人主於衆事安能盡察付之衆人耳目心力而以賞罰敺之使各自盡即無遺策何事不成上謂輔臣曰昨定州路安撫使捕安肅軍北客坐收雜户婦人生子繫獄其弟邀國信使李立之等自訴因此驚起北客三十餘人此事行遣自有舊例何至如此紛紛皆邊臣不體朝廷意妄有生事雖已施行更宜戒諭諸路將官又曰方今國財民力皆困匱紀綱政事正宜修理卿等更勉圖其宜王安石曰昔魏徴有言中國既安逺人自服此實至理自古未有政事修而財用不足逺人不服者吳充曰詩有之惠此中國以綏四方蓋先於治内爾馮京曰手敕處分切中機㑹天下聞之固當鼓舞聖徳安石請明降詔書處分上曰但欲邊臣知此意若宣布之亦或縁而生姦乃已壬申山南西道節度使檢校太尉同平章事髙密郡王頵為保信保靜等軍節度使進封嘉王仍詔大敕繫衘文彦博上上初疑頵少未可加兩鎮王安石曰皇弟恩不可殺也從之邵氏見聞録二王出閤馮浩對玉問章辟光云云可因浩等三月二日改正王府官為諸王府官附見新舊紀並書進封髙密郡王頵為燕王新紀於頵初封不書官此乃書爵非例也遣户部副使司勲郎中張景憲樞密都承㫖東上閤門使李評按視婁城撫寧城趙卨及李憲屢言其不可守也先是王安石請用親信内臣與一朝士大夫俱往上不可曰用宰相宣撫令内臣審覆於體不便欲用曾布皆逡巡莫荅上曰布宰屬其可也吳充請用謝景温安石謂景温恐不能識利害文彦博請用景憲馮京曰韓絳曾舉景憲且與絳親上良久曰亦無傷又欲令評俱往僉以為善憲初以入内西頭供奉官擢永興太原走馬承受數論邊事合㫖祥符人也要見李憲當此時是何官職當是太原承受也本傳殊不詳景憲受命即奏曰二城不可守臣固不待到而後知行未半道撫寧已陷至鄜延上言婁城距綏徳百餘里邈然孤城鑿井無水無可守之理且條奏道路所見百姓憔悴師旅咨嗟之狀願罷徒勞之役廢無用之城嚴敕諸將大為守備而已种諤首誤國乞正典刑又言邊郡誘生户小者與之金帛大者授之官恐黠羌多詐緩急為内應宜亟止之評使還亦言入鄜延界詢求婁城利害無一人言便者乞速毁廢以解一路之患撫寧十八日甲戌陷徳熊克九朝通畧有景憲師子也詔河東陜西諸路經畧安撫轉運鈐轄司日者守邊將吏或貪功生事妄起釁端以開邊隙雖以體量黜責尚慮未能盡體朝廷鎮四夷之意須議特行戒諭除夏國作過不許朝貢外宜令逐路帥臣自今遵守約束各務安靜覺察縁邊將吏無令引惹生事如稍有違當行誅責癸酉詔審官院定差知州軍監人並赴中書審察其人堪任即引見取㫖臣寮有喪解官或因使不許持服舊制並云與免持服仍入衘人臣之在憂恤以君命奪情使之從政非其所欲不當謂之免自今宜降指揮不許持服仍不入衘詔自今文臣兩省武臣横行以上中外權時差遣給奉使印餘皆給銅記其文以奉使朱記為名以樞密院言前此不以官之髙下事之大小皆給印無所甄别兼印數不足故也上曰朝廷詔令比來州郡奉行多不謹如河北教閱法樞密院於資政殿進呈定議乃行而定州順安軍等即架閣之都不遵行亳州屬縣不散青苗錢提舉官詰之乃云雖有朝廷指揮奈相公不令支散豈可如此文彦博曰大臣若見朝廷法令不便自合論列豈得沮格不行先是御史范育言河東民夫送材木至麟州留月餘不使之納上曰河東兩轉運使恐須早責降因其措置乖方一路為之勞擾人不能堪至自賊殺者甚衆若論法不過不應為王安石曰此在陛下特斷豈係法官兼自來斷命官罪皆以特㫖非以法雖赦亦有所不用陛下前謂失入一人死罪得罪不輕今此壊一路豈有輕赦之理上曰據理雖使人償死可也安石曰已令窮核其事候見事實固當深責之朝廷既欲重行尤宜詳審詔自今州縣如有荒地逃田召人請射或歸業有連狀分請全户地者並須相保如起納稅人逃亡同保人認納初太常少卿知唐州趙丙言州縣招誘人户佃荒地起二稅其間頗有隱昧雖有起稅之名而無納稅之實僥倖之人以為勞績乞約束故也甲戌召監單州酒稅太常丞集賢校理趙彦若歸館管勾畫天下州府軍監縣鎮地圖先是中書差圖畫院待詔繪畫上批恐須差有記問朝臣一人稽考圖籍庶不失真故命彦若領之彦若前通判淄州獄有失火偽印者法當死彦若曰在律雜犯死罪親年九十無兼養應上請與知州解賓王議異遂獨剡奏二人皆得貸死賓王慊之因訟彦若不過㕔故坐謫張舜民誌彦若墓云賓王尋有㫖勒停事詔編敕所應刪定官衆議有不同即各具所見令詳定官參詳如尚未安申中書裁下二年五月十七日三年七月二十一日十月十九日可考賜討殺渝州夷賊梁承秀李光吉王衮等一行兵丁特支錢仍遣使撫問三司使李肅之言乞織造圓壇地衣禮院檢典禮并南郊儀無地衣制度詔罷之元年八月二十八日王荀龍請造地衣檢正公事所言近據大宗正司奏為宗悌等奏稱自嘉祐五年十二月内磨勘轉官至今已是十年依得詔條磨勘轉官檢㑹至和二年詔書即無今後指揮近正月所降聖㫖並係特命即非定制今據宗厚等奏狀攀引克繼體例及稱治平四年正月赦書節文文武職官並與轉官合磨勘者仍不隔磨勘看詳上項赦書稱合磨勘者不隔磨勘縁宗室即無立定磨勘年限其昨降敕文稱祖宗元孫磨勘至觀察使止縁自有十年取㫖指揮以來宗室合轉官者即亦須磨勘前來授官年月及有無過犯有過犯即合展年故亦謂之磨勘即與外官立定磨勘年限事體不同其克繼昨來轉官顯是有司誤有行遣縁克繼已得㫖與減五年轉官年限若依舊降指揮更候一年方合改官今來合與不合追奪繫自朝廷指揮所引令緩轉官告詞内稱宗室以十載為定縁元降詔命自無今後指揮豈得攀引告詞為據其宗厚等所乞轉官欲下大宗正司告示依前降指揮知委詔克繼去轉官日限只少一年更不追奪餘依正月二十三日李徳芻云云可考是日西賊攻撫寧堡陷之賊攻撫寧堡實録不書據趙卨神道碑二月未望卨言婁城必不可守後五日撫寧陷婁城亦棄不守因附見十八日或十八日初攻更二日乃陷故三月二日朝廷始聞其事也先是趙卨奏种諤又欲修配崗及義合鎮諤貪狡所為皆取謀折繼世繼世庸奴利在兵興營私計諤恣睢屠戮務以立威凶徳參㑹恐貽近憂婁城必不守賔草撫寧悉未有緒遽興配崗之役至以被邊為近裏亟撤守具以茍難必之功籬落隳壊人民單殘甚於冦至勁兵良將咸𨽻偏禆臣之所管城郭鬭訟而已既修義合又規配崗遼邈相望足明欺罔時二月未望後五日撫寧陷婁城尋亦棄不守此據卨墓誌附見上嘗問宣徽南院使郭逵曰种諤取婁城撫寧二寨或聞夏人復欲取之當何如逵曰願速備撫寧則婁城無患上曰何也逵曰昔夏人取靈武先擊清逺然後靈州失守今撫寧地平而城小戍兵不多萬一用前策則必先取撫寧撫寧破婁城隨之矣上深以為然未及往備而撫寧已陷遂棄婁城此據逵墓誌棄婁城在三月十八日癸卯二月七日癸亥逵云云當考丁丑分命輔臣祈雨兵部郎中陳經為成都府路轉運使新知果州度支員外郎祕閣校理雍子方提㸃成都府路刑獄兼常平等事仍令經等密體量監司范純仁謝景初李杲卿薛繗燕飲踰違事以聞先是權發遣同提㸃刑獄李元瑜言純仁等更相會飲用妓至夜深至有擲塼石者不敢根究而景初杲卿尤無儀檢嘗有踰違事故也馮山與范純仁書可考詔權發遣䕫州路提㸃刑獄屯田員外郎段繹徙京西路職方員外郎權發遣京西路同提㸃刑獄李周送審官院差通判解州繹以親老辭䕫州之命而周在京西與同奉使者異議或謂周不任職故使繹代周周馮翊人以孫固薦得召見上欲用為御史會執政不悅乃止周在陜西或請釃湍河為六渠以溢鉗盧陂水云可以溉田計工八十萬周詰言者曰湍河原髙委下完隄障禦猶患決溢若又導之必為民害言者畏周沮格建請專委轉運提舉常平司主其事周曰吾為部使者利害今在一路雖不吾與吾不可以不言即奏云今並開六渠成未可必費已不貲請鑿一渠試之儻可以足鉗盧之用當省其餘以寛民力如未足用以次疏導不為晚從之渠卒無功其後湍河溢灌鄧城不沒數板鄧人始思周前議段繹已見李周鑿渠事據張舜民墓誌或可削奪龍圖閣直學士刑部侍郎知徐州韓贄一官坐三舉官不當也詔近降指揮借内藏庫錢六十萬緡兌充河東陜西折斛錢宜令於數内先撥錢三十萬緡赴河東詔增開修漳河役兵及萬人併力於四月以前畢功上患財用不足文彦博曰要豐財安百姓須省事如漳河累年不開何所妨漳河不在東邊即在西邊其利害一也今盛發夫開河只移得東邊河却掘西邊民田空勞民何所利王安石曰若使漳河不由地中行則或東或西為害一也若治使行地中則有利而無害若或東或西利害一也則禹何須浚川盡力溝洫勞民誠不可輕然以佚道使民雖勞不可不勉上笑日録載此於二十一日今附見増兵開漳河後三年八月十七日甲戌相度開漳河實録漳河下有澧河二字恐二字是衍文今刪去五月乙未劉摯楊繪云云上論王猛王安石曰猛宰政公平流放尸素拔幽滯顯賢能無罪而不刑無才而不任兵强國富垂及昇平猛至微淺然不如是亦不能濟此功上曰流放尸素誠為先急安石曰但尸素尚宜以流放為先急况又沮壊時事固所不容臣觀王猛臨終與苻堅所言尤知猛有智慮苻堅志大而不見幾好功而不忍内有慕容垂之徒不誅而外欲伐晉此其所以亡也猛知堅不能除垂之徒故勸以勿伐晉不然以秦之强而欲取晉何難之有上曰先知害乃可言利今内困於財用則不可以有事外國亦猶内有慕容垂之徒未誅則不可以有事於晉也馮京曰臣常言天下事不可急安石曰有一日行之而立見效者亦不可不急若流放尸素之類是也如用兵於外國乃當待時而為之不可過日録載此於二十一日今從之戊寅淮南節度使守司徒兼侍中韓琦改永興軍節度使再任判大名府初王安石論琦再任當加恩上曰恐琦不肯受安石曰大名近制不當加恩然琦兩朝顧命大臣若欲留之再任不可不加恩琦卒辭永興軍節度使不拜詔成都府路轉運使陳經提㸃刑獄雍子方利州路提㸃刑獄李瑜體量成都府利州路州縣給散常平錢不如法事以聞宣撫使韓絳言河東所修四寨皆難得水泉又其田膏腴乃必爭之地向去必難固守已追還大兵先於近裏進築堡子令吕大防往專相度棄守利害次上上批今既第一寨追回大兵必難守禦其修堡亦恐枉費工力且未得興役别候指揮仍令大防候到本路并相度以聞范育云云附月末或移入此後趙卨言順寧寨有西賊入寇知保安軍景思立不問賊馬多少即往救應時諸將敗思立幸獨全上批邊城斥堠如此疎畧思立不顧軍城事重輙離所守逺去不取禀經畧司處分豈不悞事令逐路將守自今並歸經畧司節制始韓絳宣撫陜西河東凡兵事惟絳指揮經畧司節制不得行於所部議者不以為便於是復故順寧寨南至本軍四十里思立安岳人修治平寨時已見詔河北縁邊屯田務水陸田並令民租佃本務兵士令逐州軍收為廂軍監官悉罷從河北屯田司請也初河北屯田司每歲以豐熟所入不償所費屢以為言至是乃從之元年六月二十三日李若愚同制置詔司天監印賣厯日民間毋得私印以息均給本監官屬後自判監已下凡六十八員皆增食錢判監月七千五官正三千見賣厯日官增食錢外更支茶湯錢三千時初罷司天監官監在京庫務及倉草場門而中書議增其俸故有是詔司馬光記云王安石為政欲理財富國人言財利者輙賞之舊制太府寺造斗升用火印頒於天下諸州賣之禁民私造升斗其法甚嚴熙寧四年詔自今官司止賣印板令民自造升斗以省釘鐷之費於是量法壊矣又民侯氏世於司天監請厯本印賣民間或更印小厯每本直一二錢至是盡禁小厯官自印賣大厯每本直錢數百以收其利又京東提刑王居卿上言天下官酒務皆令作連竈以省薪蘇朝廷從之畫圖頒於天下又有班行上言天下馬鋪每匹令日收糞錢一文亦行之其營利如此而城綏州又築婁城散青苗錢所用官錢動以數十百億計賣斗秤印板等當考月日王居卿為京東提刑在四年二月十一日不入長編庚辰慶州兵亂初韓絳宣撫陜西奏王文諒為指使文諒本夏國用事臣鄂特彭家奴得罪自歸延州累官右侍禁王安石薦其才加閤門祇候絳先遣文諒專節制督蕃將趙餘慶等西討文諒與餘慶約會於金湯川結明薩荘不至者斬及期文諒至金湯故寨去結明薩莊尚二十餘里文諒已見賊人馬即引歸及餘慶率兵往不見文諒使人候望知文諒已歸乃返文諒恐餘慶發其事遂誣餘慶失期絳囚餘慶於獄上手敇絳釋餘慶責後效絳執奏久之乃以詔釋之絳又遣文諒出界凡官軍斬級多奪與蕃兵至掘塜戮屍為級邠寧廣銳都虞候吳逵嘗與文諒爭買馬文諒怨之是役也逵率衆力戰用鉄連枷殺賊首領文諒使部曲奪之誣以夜至伊濟㑹與賊鬭呼逵不至及扇揺軍士宣撫司追逵送慶州獄四十餘日絳至慶州將斬逵部卒喧呼欲剚刃於絳知慶州王廣淵入白之乃復送獄絳離慶州數日賊攻婁城甚急絳命慶州出兵牽制兵亟出人不堪命將授甲廣銳兩指揮軍士謀擁逵為亂約撫手而發㑹雨作不授甲乃止是夕遂焚北城大譟縱掠斬關而出其衆二千逵所以反由文諒激之也王廣淵亟召五營屯兵禦賊北路都巡檢林廣守南城賊據北城廣自樓上望其衆進退不一廣曰是不舉兵亂也乃挺身縋城出其後說以逆順多投降者時逵已擁衆出餘黨三百人猶在城下廣諭降者曰亂首去矣爾曹本非同惡且聽我聽我不惟得活且有功因集得百餘人入其營坐軍校㕔事激勵約束授以兵器令反攻城下兵禽戮皆盡北城遂平王廣淵傳云吳逵領衆二千斬關以出林廣傳云亂兵三百人出城去廣收集聽命者百餘人攻城下兵禽戮殆盡實録云斬獲二百餘衆擁吳逵出安西門今以諸書參考吳逵擁衆出安西門廣淵傳所云二千人是也林廣傳所云亂兵三百人出城去此三百人蓋非逵所領以出安西門者特其餘黨耳雖不從逵去亦不投降故猶在城下林廣授投降者兵盡攻殺之即實録所稱斬獲二百餘人也林廣傳誤以城下所禽戮為擁吳逵以去者故兵數多少不同其實吳逵領衆二千斬關以出據北城者猶四百餘人林廣招集得百餘人禽戮幾三百人實録但云二百餘人耳柔遠三都戍卒聞難欲應賊不果廣淵陽勞之遣歸舊戍潛戒趙餘慶以所部蕃兵八千間道邀襲盡戮之叛兵初謀入據州城東路都巡檢姚兕以親兵守西門賊不得入乃散保耀之石門山兕追及賊諭以大義賊感泣羅拜誓不復為亂林運與賊遇語賊曰速降尚可全賊不聽廣曰是將夜走分兩將扼其亢路縱兵尾擊之賊迫遽乃詣兩將降廣曰不從吾言今窘就死非降也至朝天驛皆斬之此據姚兕及林廣傳附見按張玉以殺降責官而林廣獨見不知何故又姚兕所追賊蓋與廣同至石門山兕獨受賊降而廣殺之所不可曉兼張玉所殺降卒亦在朝天驛不知與廣有無同事皆所未詳詔凡子為父母為人後者為所後父母起服遇宴依令給假期已下服公式假未滿遇宴聽不赴其職事侍立祇應人闕即權差人祇應從編修閤門儀制宋敏求等請也此段或可削乙酉廢廣濟軍為定陶縣以屬曹州新紀不書是月范育言臣到河東訪聞昨宣撫司發麟府軍馬出界衆傳過鐵冶川盡日行狹隘中若遇數百人邀擊則隻輪不返矣所幸乘虛驟進賊不及計故得完師以還然萬兵奔驅九日方至婁城一無所施束手疲餓不識此舉出於何策以為通路則既過之後賊已嚴師為備許咸吉等却由陜西界回兵以為攻討則未嘗逢賊及歸止築荒堆三泉一寨而河東官司財力竭矣兼始議欲修四寨計一寨之役用費憲州河外諸堡故財及并汾以西十餘州供辦僅能集事若四寨齊興更傍增保障及於石州對岸多列亭壘表裏相維然後粗有守勢其不可就者有三一寨為費敝已如此更加三倍敝將若何一不可也三泉去敵才數十里昨繕築之時賊以數萬爭占諸將幾至敗衂今入境亦深未知地利設遭掩伏必喪師徒二不可也傳聞葭蘆山已北一帶茶鐵財用之饒賊界所恃必極力來爭我怠賊奮進必無功三不可也以河東公私素匱之力出三不可之大害者徼萬一之小利其是非可不較而定今聞朝廷已止諸寨之役遠近無不懽快止諸寨之役乃二十二日事議者止為三泉一寨亦不可守蓋孤城深寄賊巢兵多則轉餉難給兵少則捍禦不足平日麟府豐三州百費内出為河東大患今更增一寨患愈深矣臣詢訪踰月萬口一辭不出此議伏念朝廷招擕懐遠之道既不至而伐叛侮亡之謀又不贍臣恐邊禍浸淫未得息生民擾攘未得安而聖心未得優游於帝皇之事臣愚不勝憂憤伏願陛下僉謀公卿蚤決大議敕韓絳令備陳已修婁城及河東第一寨經久可守之策以付兩路如不可守即陳如何棄置禦邊之術裁之睿斷以定安危之計育言據育集不得其時附二月末朝廷止諸寨之役乃二十二日事或移此附二十二日
