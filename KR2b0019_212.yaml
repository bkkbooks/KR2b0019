body:
  text: 續資治通鑑長編巻二百八宋李燾撰英宗治平三年夏四月甲申朔觀文殿學士戸部侍郎孫沔自環慶改帥鄜延未至卒于道贈兵部尚書諡曰威敏沔居官以才力聞强直少所憚然喜燕遊女色故中間坐廢妻邊氏肅之孫悍妬為一時所傳撿賜諡在何時去年五月始自河中移慶州丙戍禮院言濮安懿王建廟當行祭告而宗樸䘮服未除請權以本宫諸弟攝事其祝文令教授為之初命翰林學士馮京撰祝文京言本院未有體式乞下禮院議禮院議稱皇帝某謹遣官恭告于親濮安懿王既而以詔俾王子孫奉祠事乃更定此議帝嘗以稱親之議質於天章閣待制兼侍講王獵獵以為不可帝曰王相待素厚亦當爾邪獵對曰臣被王恩厚故不敢以非禮名號加於王所以為報也熙寜二年十月壬子當考宻州觀察使宗旦同知大宗正司事宗旦居所生母䘮以孝聞始請别擇地以葬歳時奠祀後著為法宗室别擇地𦵏所生母當自有日月今附見己丑賜工部侍郎致仕皇甫泌帛一百疋泌獻所著周易精義等書上曰泌老不廢學貧而守節可尚也故有是賜賜真定府僧懐丙紫衣初河中府浮梁用鐡牛八維之一牛且數萬斤後水暴漲絶梁牛沒于河募能出之者懐丙以二大舟實土夾牛維之用大木為權衡狀鈎牛徐去土舟浮牛出轉運使張燾以聞故有是賜工部郎中天章閣待制集賢修撰陸詵為兵部郎中鄜延路都總管經略安撫使兼知延州贈皇后弟内殿崇班髙士林徳州刺史士林將家子獨喜學上嘗以謹守法律四字誨之曰能此則為良吏矣每欲進擢后屢辭既卒始追贈焉明年又贈節度使乙未潁王府翊善同修起居注邵亢知制誥知諫院兼判司農寺於是上謂潁王曰翊善端直朴厚已擢為諫官矣王頓首謝金部員外郎直龍圖閣天章閣侍講傅卞為起居舍人同知諫院卞議濮王典禮與執政意合故驟進卞本傳云上䟽言外憂可以豫防姦邪無狀所當深察富弼有大臣之器不當在外當考度支郎中王稷臣直集賢院充潁王府翊善令於皇子兩位供職辛丑命龍圖閣直學士兼侍講司馬光編歴代君臣事迹於是光奏曰自少已來略渉羣史竊見紀傳之體文字繁多雖以衡門專學之士往往讀之不能周浹况於帝王日有萬幾必欲徧知前世得失誠為未易竊不自揆常欲上自戰國下至五代正史之外旁採他書凡關國家之盛衰繫生民之休戚善可為法惡可為戒帝王所宜知者略依左氏春秋傳體為編年一書名曰通志其餘浮冗之文悉刪去不載庻幾聽覧不勞而聞見甚博私家區區力不能辦徒有其志而無成頃臣曾以戰國時八巻上進幸䝉賜覧今所奉詔㫖未審令臣續成此書或别有編集若續此書欲乞亦以通志為名其書上下貫穿千餘載固非愚臣所能獨修伏見翁源縣令廣南西路經略安撫司勾當公事劉恕將作監主簿趙君錫皆習史學為衆所推欲望特差二人與臣同修庻使早得成書不至疏略詔從之而令接所書八巻編集俟書成取㫖賜名其後君錫父䘮不赴命太常博士國子監直講劉攽代之恕均州人君錫良規之子也攽敞之弟也司空致仕鄭國公宋庠卒帝方以災異避正殿有司誤奏毋臨䘮乃為挽辭二篇賜之贈太尉兼侍中諡元憲帝為篆其墓碑曰忠規徳範之碑庠自應舉時即與弟祁以文學名擅天下尤工詩賦一時進士共學之愛祁甚篤儉約不好聲色讀書至老不倦尤畏法在揚州使工甓堂塗取巵酒與之後知誤取公使立償之而取予者皆被罰其為相儒雅練故事自初執政遇事輙分别是非可否用是斥退及再登用遂浮沉自安然天資忠厚嘗曰逆詐恃明殘人矜才吾終身弗為也沈邈嘗為京東轉運使數以事侵庠及庠在洛陽邈子為府屬所惡欲痛治之以法庠獨不肯曰是安足罪也人以此益稱其長者戊申河東轉運使集賢校理工部郎中吳充為鹽鐡副使上雅知充前此數問充所在㑹充入對上諭以教授時事嘉勞之居河東才半歳即召入樞宻副使禮部侍郎胡宿累乞致仕庚戌罷為吏部侍郎觀文殿學士知杭州殿前都虞候容州觀察使郭逵檢校太保同簽書樞宻院事同簽書樞宻院事自逵始於是知制誥邵必當制草詞以進而言逵武力之士不可置廟堂望留誥勅與執政熟議弗聽逵既入西府衆多不服或以咎韓琦琦曰吾非不知逵望輕也故事西府當用一武臣上欲命李端愿吾知端愿傾邪故以逵當之或曰上本意欲用張方平琦知方平不附已猥曰西府久不用武臣矣宜稍復故事上督其人無以應乃遽用逵知諫院邵亢御史吳申吕景交章論祖宗朝樞府參用武臣如曹彬父子馬知節王徳用狄青勲勞為天下所稱則可逵黠佞小才豈堪大用不報案此事續綱目在三月宋史為二年事俱與此不合壬子詔流内銓磨勘選人願入職官者與循資注官今任還無贓私罪及私罪杖已下情輕者有舊舉主三人或新舉主二人與磨勘引見歳選人充京官者自今以三分之一舉令録判司簿尉充職官舉主滿三人歴任無贓私罪或私罪杖以下情輕者判司簿尉有出身三考無出身四考與注合入職充縣令須到任一考乃得舉所以分減舉者數省京官也此本志語嘉祐五年八月有京官舉主三人者為職司自此遂著令司天監奏彗星寖微羣臣詣閤門拜表乞御正殿復常膳不許自是三表乃許之五月甲子同判流内銓蔡抗言伏見係磨勘奏舉候次引對選二百五十人一歲引見不過百人計須二年半方可引絶檢㑹編勅在朝文臣知雜御史以上武臣觀察使以上各許舉外任選人充京官安撫發運轉運使副提㸃刑獄知州軍通判各舉轄下選人充京官縣令今將南曹逐年舉狀約一千九百員被舉者既多故磨勘者益衆朝廷雖於引對之際限以班次然内外舉官之數未嘗略有裁損本源未窒徒抑其流故選人日月滋引且今天下吏員有限每一官之闕初授已替并見任者率三人故使除授益難能否共滯若不稍為更改恐久而不勝其獘乞權罷在朝文臣知雜御史以上武臣觀察使以上每年所舉京官在外安撫使以下至通判逐年所舉京官縣令各量本處在任吏員多少於舊數十分内量減三五分候員少即依舊臣伏思朝廷更張法制抑太甚之獘蓋有材者不患見遺僥倖者則所不欲况今來只是減損臣僚所舉人數即不增添選人考第舉主在人情亦無所觖望乞委近臣參酌施行詔在京文臣知雜御史以上武臣觀察使以上每歳舉幕職州縣官充京朝官二人今後並罷蔡抗疏可以見當時嵗舉改官及磨勘引對人數本志刪取甚略今從㑹要乙丑詔河北戰兵三十萬一千餘人陜西戰兵四十五萬九百餘人并義勇令本路都總管常加訓練毋得占役時邊臣或奏請增兵朝廷以為兵數不少故降是詔是日彗行至張而沒彗之未没也言者多以為憂或告韓琦琦曰借使復有一星出欲何為乎此據日記戊辰上謂宰臣曰朕日與公等相見每欲從容講論治道但患進呈文字頗煩多不暇及中書常務有可付有司者悉以付之自是中書細務止進熟狀及事有定制者歸有司中書降勅而已庚午詔中書樞宻院自今朔望㑹于南㕔吏部流内銓進編修銓曹格勅十四卷詔行之右武衛大將軍果州刺史叔褒領文州團練使初制宗室入學十五以上通兩經者大宗正以聞命官試論及大義中者度髙下賜出身或遷官至是叔褒試所學中故有是命叔褒徳恭曾孫也丁丑屯田員外郎王克臣子孝莊為右屯衛將軍駙馬都尉賜名師約以尚徳寜公主故也初上數稱唐公主下嫁多名人及選得師約承衍曾孫其父子皆業進士令至宰相第試以詩并其所業賦一編進御召見清居殿又諭以毋廢學後又出經籍及紙筆硯墨賜之六月乙酉駕部郎中知磁州李田監淄州鹽酒税務嘉祐六年始置考課法至是考課院言田再考在劣等故有是命坐考劣降等自田始丁亥免陸詵正衙令入見上勞問之曰卿嶺外處畫無不當者鄜延最當敵道故選用卿今將何施為詵曰邊事難以遥度抑未審陛下意務在安靜或欲示威也上曰大抵邊陲宜以安靜為務昨見王素言朝廷與帥臣常欲無事自餘將校無不欲生事要功者卿謂此言如何詵曰素所言是也陛下能責任將帥令疆場無事即天下幸甚上稱善勉之辛夘太常博士劉庠為監察御史裏行庠私議濮王事與執政意合故命以言職壬辰詔司農寺置主簿一員贈故霸州文安縣主簿太常禮院編纂禮書蘇洵光禄寺丞所修書方奏未報而洵卒賜其家銀絹各百兩疋其子殿中丞直史館軾辭所賜求贈官既從之又特勅有司具舟載其䘮歸蜀嘉祐初王安石名始盛黨友傾一時歐陽修亦善之勸洵與安石㳺而安石亦願交於洵洵曰吾知其人矣安石母死士大夫皆弔洵獨不往作辨姦一篇其文曰事有必至理有固然惟天下之靜者乃能見微而知著月暈而風礎潤而雨人人知之人事之推移理勢之相因其踈闊而難知變化而不測者孰與天地隂陽之事而賢者有不知其故何也好惡亂其中而利害奪其外也昔者羊叔子見王衍曰誤天下蒼生者必此人也郭汾陽見盧杞曰此人得志吾子孫無遺類矣自今而言之其理固有可見者以吾觀之王衍之為人也容貌言語固有以欺世而盗名者然不忮不求與物浮沉使晉無惠帝僅得中主雖衍百千何從而亂天下乎盧杞之姦固足以敗國然而不學無文容貌不足以動人言語不足以眩世非徳宗之鄙暗亦何從而用之由是言之二公之料亦容有未必然也今有人口誦孔老之言身履夷齊之行收召好名之士不得志之人相與造作言語私立名字以為顔淵孟軻復出而隂賊險狠與人異趣是王衍盧杞合而為一人也其禍可勝言哉夫靣垢不忘洗衣垢不忘澣此人之至情也今也不然衣僕𨽻之衣食犬彘之食囚首䘮靣而談詩書此豈人情也哉凡事不近人情者鮮不為大姦慝豎刁易牙開方是也以蓋世之名而濟未形之患雖願治之主好賢之相猶將舉而用之則其為天下之患必然而無疑者非特二子之比也孫子曰善用兵者無赫赫之功使斯人而不用也則吾之言為過而斯人有不遇之歎孰知禍之至於此哉不然天下將被其禍而吾獲知言之名悲夫洵既沒三年而安石用事其言乃信張方平嘗論洵曰定天下之臧否一人而已安石丁憂乃嘉祐八年八月戊申又從三司使韓絳奏請置管勾三司使㕔都知雜司公事文簿一員命屯田員外郎梁端為之後數日上謂宰臣曰近以梁端管勾三司使㕔公事副使判官得統攝否對曰此特判使之屬也上曰三司使權甚重以小官而預使務必藉勢為姦可追罷前勅宰臣以三司甚重舉一官不從恐非委付之體上曰不然人主過差人臣當規正豈人臣之誤人主不得而改也卒罷之此事據三朝史志月日據㑹要己酉御崇政殿䟽决在京繫囚壬子改清居殿曰欽明召直集賢院王廣淵書洪範於屏謂廣淵曰先帝臨御四十年天下承平得以無為朕方屬多事豈敢自逸故改此殿名因訪廣淵先儒論洪範得失廣淵對以張景所得最深遂進景論七篇明日復召對延和殿謂廣淵曰景所説過先儒逺矣以三徳為馭臣之柄尤為善論朕遇臣下常務謙柔聽納之間則自以明斷此屏置之坐右豈特無逸之戒秋七月甲寅屯田員外郎吳申為殿中侍御史初劉庠舉申自代上曰朕固知申遂擢用焉庠申門人也自傅卞議濮王事稱㫖庠及申私論與卞協故相繼並居言職乙五奉國留後虢國公宗諤為保靜節度使於是濮王子孫及魯王孫各遷官一等遷者凡二十人上之為皇子辭疾不肯入宫詔本位長屬敦促宗諤最長於時勸行及上即位宗諤上十餘章論功上不得已特遷奉國留後中書召知制誥韓維命辭再三屬之曰語勿太深宗諤在藩素嫉上宗諤有庖夫善為羊膾上使之為膾兩盤宗諤見問之對曰十三使之膾也宗諤怒毁器覆肉笞其庖夫宗諤性隂狡所惡婢妾往往鴆殺之八月已亥龍圖閣直學士兼侍講崇文院檢討吕公著知蔡州公著嘗言濮安懿王不當稱親及頒諱於天下又請追還吕誨等皆不從即稱疾求補外官上曰學士朕所重豈得輕去朝廷家居者百餘日上遣内侍楊安道即家敦諭且戒安道曰公著勁直宜徐徐開曉語勿太迫也又數令公著兄公弼勸之公著起就職才數月復上章請出而有是命己酉知制誥判國子監蔡抗言臣近累准朝㫖令舉諸宫院大小學教授欲乞今後諸宫院教授有闕並下兩制輪舉所貴各舉所知以盡天下之才詔今後諸宫院大小學教授有闕令國子監與學士舍人輪舉此據㑹要八月十五日事熙寜元年五月庚辰有詔九月癸丑知制誥史館修撰蔡抗為龍圖閣直學士集賢殿修撰知定州上謂抗曰苐行且召卿矣軍士畨戌婦人游佚於外歸輙首原抗下令無得首必按以法戍兵感之甲寅改簽書樞宻院事郭逵父贈左神武軍上將軍斌為左驍衛上將軍先是國朝除環衛誤以六統軍為上將軍至是改之乙夘命知制誥宋敏求題濮安懿王及三夫人廟主于園丙辰幸天章寳文閣命兩府觀翰林學士兼侍讀學士王珪所書仁宗御詩石刻初仁宗立上為皇子珪請對而後草詔後有間珪者是日上御蕋珠殿召珪設紫花墩賜坐勞問久之詔中書授珪兼端明殿學士且諭曰執政員闕即命卿矣翌日又賜盤龍金盆一珪皇恐謝上謂曰朕知卿忠純有守曩者有讒語朕今釋然無疑故有此賜珪頓首曰非陛下保全何以至此帝欲去官冗之患獻言者皆謂三歳一磨勘其進甚亟稍遷以至髙位故獲䕃者衆詔兩制詳定最初刋去姓名其言曰伏見審官院京朝官以上磨勘轉官者舉一歳中約有千數其因職任陞擢者尚不與焉按國朝㑹要真宗用諫官孫何等疏遂罷郊祀序進之制即令有司考其殿最臨軒引對親加陞黜又令審官院考較京朝官令任五年以上磨勘無贓私罪即以名聞當議遷秩又令在京臣僚已經三年磨勘改轉後依舊勾當直候得替後更及三年再令磨勘當時條制雖前後不同然大抵不限定三年亦不以在任得替一例磨勘今自寺監主簿以上率三歳遷外任者不俟替歸在京者亦無候替别限年磨勘之制至有待闕于家動踰歳時居無職事禄廪不絶茍及三年則又磨勘臣謂考課之弊無甚于今而亦無速于今也欲乞朝廷檢詳舊制以見今内外京朝官及兩制以上磨勘之法别立中制雖未能盡如虞舜三考陞黜之典且復祖宗之制亦庻幾抑僥倖之弊矣權御史中丞彭思永相繼言乞今後前行正郎該磨勘依轉大卿監例候四周年方得施行及自歴任正郎後須得舉主五人内有本路提轉及大兩省三人方與改轉少卿監直龍圖閣兼天章閣侍講同知諫院傅卞言乞今後京朝官至員外郎且依舊年限磨勘外其前行員外郎入正郎磨勘並限四周年至前行郎中更不許磨勘兩制臣僚自待制以上並乞五周年磨勘至諫議大夫更不許磨勘殿中侍御史吳申言乞從今裁節如有前行郎中合轉少卿監者且令權住先立定員數候有闕則以次遷授仍以歴任年深無贓私罪或曾歴職司差遣不經責降或前後歴官可稱及素有文行者先次遷轉前行員外郎合轉郎中及太常國子博士合轉員外郎者亦且權住先立定員數候有闕則以次遷補監察御史裏行劉庠言欲乞少卿監合磨勘轉大卿監者如年已及七十已上更不許磨勘監察御史裏行蔣之竒言兩制已上皆四年轉兩官比京官乃是二年一轉欲乞兩制亦依京朝官制五年磨勘轉一官至前行郎中後更添左司郎中一轉於是翰林學士承㫖張方平等奏檢詳祖宗朝中外官不立遷轉條限大中祥符八年始降詔京朝官並以三周年令審官院磨勘引對與轉官是時仕路猶清官員數少厥後及今五十餘年約祥符初略計十倍以故員多闕少坐糜禄俸才否無辨差遣不行考課之法難復施用官制之弊無甚於此今詳定且欲自京朝官以上磨勘一例各展一年陞朝官至後行郎中更不磨勘其才望或有勞績或因繁難任使即自朝廷甄擢蓋登仕陞朝累至正郎奏䕃子孫稍奉法循理自應至州郡長吏以此處常調固已為優厚其待制以上既處顯近請遵祖宗故事更不磨勘若因事功或因寄居任上自聖衷推恩遷改應見資品已髙各據所居官止自餘條例一切仍舊其任卿監不曾歴職司差遣只自常參官累遷者並送審官院依例差遣其老或疾陳乞留臺宫觀監當者更不磨勘如此則操柄歸於君上勸沮行於朝廷人材有所甄别重難煩劇之地可以用人事體均平簡而易守此於祖宗之制猶為優也癸亥詔曰朕惟制治之本必始於官設官之方其亦有擇國家承累聖之祚躋時丕平既假省寺之官出釐庻務復許以三祀俾之一遷歳月既深吏員猥積雖海宇至廣工師實繁以官率人倍者數矣肆我臺閣數陳其故兹用博議審求臧謀而封章亟來請從更制朕嘉與卿士圖惟厥中庶幾流弊由此其息自今待制已上自遷官後六歳無過則復遷之有過亦展年至諫議大夫止待制以上六年一遷官至諫議大夫止不知何年却改此法當考京朝官四歳磨勘至前行即中止少卿監仍以七十員為定有闕即檢勘前行郎中遷官及四歳以上校月日之久者以次補之少卿監以上遷官聽㫖如别有勞績或因要重任使特㫖推恩者即不在此例此據㑹要及當時頒降條貫冊今實録正史止載詔書餘並削去要似可惜故復存之初獻言者當考其姓名張舜民浮休小史云京朝官四年磨勘原無著令熙寜中審官院率行之至今為常格案此詔書及臣僚申請甚備安得謂無著令豈舜民未考乎乙丑翰林學士承㫖張方平言臣竊見嘉祐五年陳旭言三班院供奉官以下八千八百餘人乞裁冗濫立條制于時定議事頗酌中旭始言八千八百餘員及此又已五年數當增倍其濫如此而不云救何以立憲度建治功乞下兩府檢㑹前議早為裁定頒行亦振起頽弊之一端也詔以付樞宻院而計三班見使臣六千五百三十四人而已遂無所更議太常博士監察御史裏行馬黙守本官通判懐州初黙彈奏濟州防禦使李珣犯銷金并匠人送開封府官吏不能正其罪又言宗惠女使當如法録問且請自今外人罪連宗室大辟皆録問然後斬又言國子監直講劉攽輕薄無行多結交富貲舉人不可為開封試官又言萬及等所壊倉米十八萬石當治米所以濕惡并劾提㸃倉場李希逸以不覺察而及等實由希逸舉發黙除御史時攽有戯言黙用此怒故妄彈奏攽黙又屢言濮王不宜稱親上以為踈繆故黜之御史劉庠奏乞留黙弗聽黙本傳云上䟽以劾歐陽修郭逵不言乞留御史今從實録皇城司嘗捕銷金衣送開封府推官竇卞上殿請其獄㑹有以内庭為言者上疑之卞曰真宗禁銷金自掖庭始今不正以法無以示天下且非祖宗立法禁之意上曰然文王刑于寡妻至于兄弟以御于家邦正謂此爾詔卒如卞請此事與李珣不同時今附見馬黙罷御史之後當存考庚辰知諫院傅卞言風聞貴戚奏薦恩澤未經减定或託以親戚濫及髙貲商販之徒詔自今妃嬪公主以下非有服親若有服親之夫無得奏薦是月夏國主諒祚舉兵㓂大順城入㓂柔逺寨燒吹且等三村柵叚木嶺初環慶經略安撫使蔡挺斥候嚴明知諒祚將入㓂即遣諸將分屯要害以大順城堅雖被攻不可破不益兵柔逺城惡命副都總管張玉將重兵守之敇近邊熟戸入保清野戒諸寨無得逆戰諒祚將歩騎數萬攻圍大順三日蕃官趙明與官兵合撃之諒祚衷銀甲氊㡌以督戰挺先選强弩分列於壕外注矢下射重甲洞貫諒祚中流矢遁去徙㓂柔逺張玉募膽勇三千人夜出擾賊營賊遂驚潰上遣中使賜挺手詔慰勞諒祚退屯金湯聲言益發歩騎且出嫚辭須已得歳賜復攻圍大順城鄜延經略安撫使陸詵言朝廷積習姑息故敵敢狂悖不稍加詰責則國威不立即止其歳賜銀帛牒宥州問故上喜曰固知此人可倚也詔詵得宥州報具聞而諒祚果大沮盤桓塞下取糧而返卒不敢入㓂又顧歳儉貪得賜物乃報言邊吏擅興兵行且誅之案續綱目以此為四月中事冬十月壬午朔以仙遊縣君任氏墳城為園從禮院所奏也癸未遣西京左藏庫副使何次公齎詔賜夏國主諒祚問所以入㓂之故仍止其歳賜銀帛陸詵言敵頗順矣不若且賜時服因以詔問之彼必感懼今特遣次公敵多姦或疑朝廷畏已則未遽服也不從甲申戸部判官直集賢院王廣淵直龍圖閣兼侍讀集賢殿修撰周孟陽兼侍講帝不豫廣淵憂思忘食寢帝自為詔以慰安之曰朕疾少間矣乙酉詔兩日一御邇英講讀時上已不豫然近臣尚未知也於是皇子潁王等引仁宗故事以請從之丁亥詔曰先帝以士久不貢則怠於學而豪傑者不時舉故下間歲之令兾以得人而自更法以來其弊寖長何者里選之牒仍故而郡國之取減半計偕之籍屢上而道途之勞良苦朕甚閔焉其令禮部三歳一貢舉天下解額於未行間歳之法已前率四分取三分禮部奏名進士以三百人為額明經諸科不得過進士之數本志云自是恩典不增而貢舉緩士得休息官以不煩矣今削去同簽書樞宻院郭逵為陜西四路沿邊宣撫使兼權判渭州逵懇辭簽書上曰初欲授卿宣徽使慮外人以為罷政第領樞職往重使權自吕餘慶以参知政事權知成都府其後見任執政無守藩者至逵始以同簽書樞宻院事出鎮甲午詔宰臣參知政事舉才行士可試館職者五人先是上謂中書曰水潦為灾言事者多云不進賢何也歐陽修曰近年進賢之路太狹誠當今所患臣每與韓琦等論議未合上曰何謂進賢路狹中書嘗所進擬者其人皆如何修曰自富弼韓琦當國以來十數年間外自監司内則省府官比類選擢甚精時亦得人比於往年絶不同也然皆是錢榖刑名强幹之吏此所謂用才也如臣所言進賢路狹謂館職也上曰如何修曰朝廷用人之法自兩制選居兩府自三館選居兩制然則三館者輔相養材之地也往時入三館有三路今塞其二矣此臣所謂太狹也上曰何謂三路修曰進士髙科一路也大臣薦舉二路也因差違例除三路也往時進士五人以上及第者皆得試館職第一人及第有不下十年即至輔相者今第一人及第兩任凡十年方得試館職而第二人已下無復得試是髙科一路塞矣往時大臣薦舉隨即召試今止令上簿候館閣闕人與試而館閣人初無員數無有闕時則上簿者永無試期是薦舉一路又塞矣唯有因差違例除者半是年勞老病之人此臣所謂進賢路太狹也新格置編校官八人皆用選人歴七年乃自校勘除校理此外未嘗有所擢用臣謂此八員者宜仍舊他員或闕即令中書擇人進擬庻無遺賢上嘉納之故有是詔因謂輔臣曰館閣養才之地比欲選數人出使無可者公等其各為朕搜揚雖執政親戚世家勿避朕當閲可否於是韓琦曾公亮歐陽修趙槩等所舉蔡延慶夏倚已見嘉祐二年王汾葉均劉攽已見嘉祐八年章惇胡宗愈王存李常張公裕王介已見嘉祐六年蘇梲安燾已見嘉祐八年蒲宗孟陳侗陳睦李清臣已見治平四年朱初平黄履劉摯凡二十人上皆令召試琦等以為人多難之上曰既委公等舉茍賢豈患多也乃令先召權提㸃陜西刑獄度支員外郎蔡延慶等十人餘須後試延慶齊子汾禹偁曾孫均青臣子惇徳象族子宗愈宿弟子存丹陽人常南康人公裕江原人梲頌弟燾開封人宗孟新井人侗莆田人睦侗弟初平昂孫履邵武人摯渤海人也朱史修傳云詔韓琦曾公亮各舉六人歐陽修趙槩各舉五人與墨史及此云二十人數不合當考劉攽誌陳侗墓乃云文彦博薦侗宜在館閣召試而富弼守汝州請侗為從事須考滿召試㑹弼歸即召試除館閣校勘不知此時薦侗者何人也丙午羣臣以來歲元㑹表上尊號曰體乾膺厯文武聖孝皇帝詔不許五表乃許之十一月甲寅慶州蕃官都廵檢使内藏庫使趙明領順州刺史以撃夏人于大順城有功也於是將士及蕃官有功者隨輕重賞之初夏人攻圍大順上召西上閤門使劉几問之曰大順天險非敵可近苐恐夏人與趙明為讎爾上曰趙明之子奔馬入城幾為所掩卿料敵何其神也戊午帝不豫己巳歸徐國公主于王氏皇后及皇子潁王東陽郡王送至第詔皇后翌日乃歸司馬光奏臣聞王者父天母地子育黎元嚴恭鬼神畏懼灾異故能安靜國家饗有多福自生民以來不易之道也天雖至髙視聽甚邇朝夕不離王者左右順吉逆凶應若影響此乃詩書所載聖人所言豈可謂之漠然而無知而簡忽不顧哉臣伏見陛下踐阼已來太陽祲色中有黑子大風晝晦冬温無氷連年大水漂沒廬田以至今歲灾異尤甚彗星彰見天灾隆熾朝東暮西連月乃滅飛蝗害稼日有食之加之陜西河東夏秋乏雨禾既不收麥仍未種婦子悽惶流離滿路西戎内侮邊鄙未安當此之際羣臣宜勸導陛下以祇畏天命勤恤民隱克己謙約博求至言以消變咎以延嘉祥而朝廷晏然曾不為意或以為自有常數非關人事或以為景星嘉瑞更當有福今者又有佞臣建議請上尊號其為欺蔽上天誣罔四海孰甚於此使上帝鬼神怫鬱不懌自拜表以來陛下嬰此疾疹久而未愈此皆羣臣謟䛕之罪陛下豈得不省寤而深思哉臣不勝區區忘生觸死伏望陛下自以聖意止羣臣所上章表却尊號而勿受更下詔書深自咎責咨謀四方廣開言路求所以事天養民轉災為福之道俟聖體康復政化流通天時豐穰人心悅豫然後推崇徽號何晚之有如此庶幾上帝收還威怒福禄大來聖躬和平勿藥有喜羣生百姓莫不幸甚况陛下鄉者郊禮之前辭尊號不受天下稱誦盛徳至今未已然則是棄虛名而得實名捨虛美而取實美也於陛下何損焉臣荷國大恩承乏侍從見近日羣臣皆以言為諱入則拜手稽首請加鴻名出則錯立族談腹非竊笑終無一人為陛下正言不可者臣竊痛之是敢妄進狂瞽唯聖明采察不從初夏人㓂大順上問兩府策將安出宰相韓琦請留止歲賜遣使齎詔責問樞宻使文彦博等曰如此則邊釁大矣至引寳元康定之䘮師以動上意琦曰兵家須料彼此今日禦戎之備大過昔時且諒祚狂童豈可比元昊也詰之必服上竟從韓琦議遣何次公往使朝退二府以所論不同各私相語彦博謂其黨曰渠自言料敵且觀渠所料逾月次公還以諒祚表進上已卧疾輔臣入問起居畢琦叩御榻曰諒祚服罪否上力疾顧琦曰一如所料諒祚所上表雖云受賜累朝敢渝先誓然尚多游辭歸罪於其邊吏乃復賜詔詰之令專遣使别貢誓表具言今後嚴戒邊上酋長各守封疆不得㸃集人馬輙相侵犯其鄜延環慶涇原秦鳯等路一帶久係漢界熟戸并順漢西蕃不得更行刼擄及逼脅歸投所有漢界不逞叛亡之人亦不得更有招納茍渝此約是為絶好餘則遵依降誓詔朝廷恩禮自當一切如舊十二月先是帝久服藥監察御史裏行劉庠奏請立皇子帝不懌封其奏一日宰相韓𤦺等問起居退潁王出寢門憂形於色顧琦曰如何琦曰願大王朝夕勿離上左右王曰此乃人子之職琦曰非為此也王大感悟帝自得疾不能語凡處分事皆筆於紙辛丑帝疾増劇輔臣問起居罷琦復奏曰陛下久不視朝中外憂惶宜早立皇太子以安衆心帝頷之琦請帝親筆指揮帝乃書曰立大王為皇太子琦曰必潁王也煩聖躬更親書之帝又批於後曰潁王頊琦即召内侍髙居簡授以御札命翰林學士草制學士承㫖張方平至榻前禀命帝憑几出數語方平不能辨帝以手指畫几方平因請進筆書所諭遂進筆帝書來日降制立某為皇太子十字所書名不甚明方平又進筆請之帝再書潁王二字又書大大王三字方平退而草制壬寅立皇子潁王頊為皇太子帝既用輔臣立皇太子泫然下泪文彦博退謂韓琦曰見上顔色否人生至此雖父子亦不能無動也琦曰國事當如此可奈何皇子始聞命辭於榻前者久之癸夘大赦賜文武官子為父後者勲一轉乙巳詔以來年正月十九日冊皇子翰林學士承㫖張方平為禮儀使翰林學士王珪撰冊文錢明逸書冊知制誥宋敏求書寳是歳戸一千二百九十一萬七千二百二十一丁二千九百九萬二千一百八十五夏秋税二千四十二萬一千四百七十石以災傷放二百一十萬二千七百四十六石斷大辟一千八百三十二人
