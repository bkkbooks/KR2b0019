body:
  text: 續資治通鑑長編巻三百五宋李燾撰神宗元豐三年六月壬辰朔上批詔彰信軍留後駙馬都尉李瑋丁所生母憂可依宗室給全俸詔權夔州路轉運副使董鉞往渝州應副瀘州事留司農錢物之在蜀者以給攻討之費益瀘州公使錢千緡韓存寳乞行軍諸將置主簿從之毋得干預軍事御史臺言奉詔推治孫野等事乞展日限上批如根究已得其情野可勿禁先次責出聽展二十日朱本有此姑存之已并入八月丙申癸巳詔中書檢正官樞宻院檢詳官至員外郎供職及二年大禮許奏補親屬中書堂後官提㸃五房官雖未至員外郎奏補聽如舊中書門下奏御史臺言六察案㸃檢諸司庫務坊監乞行劄子欲如所請上批六察案於諸司非統臨之官在理不當行劄子見頒式令惟中書行聖㫖用劄子往時官府僭妄行遣臺察自合糾正而不知省察尚有承妄申請可劄與知知潁州工部侍郎元絳為資政殿學士知青州絳乞入覲許之因留提舉中太一宫初欲令兼侍讀已而寢之除中太一乃七月壬午今并書寢侍讀之命據御集甲午詔軍士民兵逃亡隨軍效用若首獲並械送所屬論如法雖立戰功不賞仍不許以功贖過令隨軍榜諭詔五路轉運提舉官廵歴所至許案閱見數義勇保甲武藝有不如法關牒提㸃刑獄司施行以河北提㸃刑獄劉定言一司不能徧閱州縣保甲故也新紀書甲午日有五色雲舊紀不書乙未録沂州民程棐傅暉為右班殿直傅臨三班借職劉舜元三班差使並監當差遣皆以告捕徐州妖賊也暉以嘗為賊黨永不與親民不許赴闕程棐見蘇軾與章惇書詔中書自今監司提舉官闕限十日内差詔三司選官措置河北便糴四年三月十一日差蹇周輔詔劉忱程之才毋得干預韓存寳軍事丙申詔司農寺移邊逺縣鎮城寨常平錢輸本州者聽民除步乘錢著為法三司言提舉賣解鹽司自熈寧八年至元豐元年收息錢十六萬五千七百緡提舉官殿中丞張景温勾當官右班殿直吕逵各遷一官餘減磨勘年吏賜帛有差本息同戊戌詔宗室敎授並兼大小兩學廣親睦親北宅二員餘各一員月增添支記室講書十五千敎授十二千即授宗室月給賂遺者坐贓論初以宗室學官員多俸薄頗納諸宫贈遺寖隳職守遂詔中書裁定留十三員省十員四月戊申詔補邈川城主㑹州團練使温納木札爾頴沁叔錫沁弟鄂特凌津為西頭供奉官錫沁男約蘇布琨弟鄂囉並為右班殿直族弟溪巴烏為三班奉職妺壻塔爾巴為借職月給茶綵有差以熈河路言納木札爾頴沁款塞自附請録其族人及酋首也禮院言越國長公主薨在慈聖光獻太后䘮制之内案禮問傳齊衰之䘮既虞卒哭遭大功之䘮麻葛兼服之又雜記論除䘮之服卒事反服注曰雖有親之大䘮猶為輕䘮者除則重䘮未終遭輕䘮自當易服以示恩意卒事則復常真宗諒陰為乳母秦國夫人服緦禫未除亦為許國長公主成服今為慈聖光獻太后服已在易月之外宜為越國長公主舉哀成服從之國子監言太學八十齋後乞置龜頭屋一間及國子生未有齋舍監北有居民地乞給錢收買展造監生齋舍從之新本削去己亥權御史中丞李定等言軍器監文簿稽滯及失舉催千三十一事詔丞罰銅八斤主簿十斤吏杖罰有差主判官釋之詔内外官於中書尚書省三司不以有無統攝用申狀惟御史臺於三司移牒後又詔御史臺應官司冠尚書字者用申狀官司冠尚書字當考詔三院御史人增剩員四人以舊止給六人畨上故也庚子權知賔州殿中丞吳濳權發遣提舉廣南東路常平等事濳上書請修廣西城壘上採用其言故擢之同判太常寺王存言近詔祕書監劉几赴詳定郊廟禮文所議樂伏見禮部侍郎致仕范鎮常論辨雅樂乞召鎮與几參考得失從之初鎮致仕居都城外之東園每遇同天節即乞隨散官班上夀尋有詔鎮班見任翰林學士上仍自今致仕官遇誕節及大禮許綴舊班後鎮遷居潁州於是入對閤門奏鎮失儀有詔放罪仍詔自今致仕官造朝失儀勿劾二者皆著為一司敇令上優待故老類此二事並據鮮于綽傳信記當考九月乙酉罷議樂詔富吉二州歸明守官人聽如漢官差使出入免監視從參知政事章惇請也權發遣提㸃開封府界縣鎮公事吕温卿言府界廂禁軍二百一十六指揮及河清遞鋪諸軍請受歴累年未嘗驅磨無根究積欠失陷之弊兼坊場酒麴課利秋夏二稅房廊店宅及支收錢物簿籍其間不無情弊乞選官置司驅磨從之兵部言武舉故事隨制科鎻試昨兩試武舉並隨進士今用新制進士舉罷方試武舉重複差官於事無補但有浮費與進士同時鎻試為便從之八年三月末可考詳定禮文所言案禮記玉藻云笏天子以球玉注球美玉或謂之大圭其實一也周禮玉人職大圭長三尺杼上終葵首天子服之典瑞王搢大圭執鎮圭以朝日既曰服之則宜其奉天地宗廟無所不服非止朝日而已諸侯相見與朝覲宗遇㑹同于王皆同執一玉則王以朝日之圭事大神祇享祖宗從可知矣故王涇郊祀録云祀天地皆先受大圭搢之又受鎮圭執之記曰入太廟說笏非古則是郊廟皆不可無也今郊廟之祀有鎮圭無大圭於禮為闕請下有司製之詔參詳大圭尺度於是復言案考工記大圭說者曰或謂之珽隋書志天子笏曰珽長尺二寸以球玉為之開元禮義羅曰笏自西魏以降惟天子以球玉為之長尺二寸乞朝廷揆玉之有無制之從之據禮文前請乃元豐元年九月十七日後請則三年六月九日今并書之又六月二十八日七月十四日亦附見此又言周禮大宗伯以玉作六瑞以等邦國王執鎮圭典瑞王搢大圭然則鎮圭者王執以為瑞大圭者王搢以為笏開元禮開寳通禮及儀注明堂太廟皇帝親祠至罍洗奠玉幣飲福皆云搢鎮圭此既非笏不當搢之覲禮記曰奠圭於繅上說者謂釋於地也諸侯見於天子坐奠圭則天子祗事天地祖宗亦當奠圭於繅上所有儀注親祠奠玉帛之時搢鎮圭伏請改為奠鎮圭其盥手飲福謂宜使人接圭禮文在六月二十八日今并入六月九日又言天子奉祭祀執鎮圭者其摯也搢大圭者其笏也禮見於所尊奠摯而不授覲禮曰奠圭于繅上鎮圭有繅朝事義曰天子冕而執鎮圭尺有二寸繅藉尺有二寸搢大圭朝日於東郊繅所以奠玉是奠以為摯者也既奠摯於地則執大圭為笏管子曰天子執玉笏以朝日唐禮親祀天地神祗皆搢大圭執鎮圭有事宗廟則執鎮圭而已王涇郊祀録曰大圭質也事天地之禮質故執而搢之鎮圭文也宗廟之禮亦文故無兼執之義是不知大圭天子之笏其用通於郊廟伏請自今皇帝親祠郊廟搢大圭執鎮圭每奉祀之時既接神再拜則奠鎮圭為摰執大圭為笏當事搢笏君尊則不搢别於臣下也所有儀注皇帝搢鎮圭蓋沿襲之誤乞從改正詔候製到大圭日施行七月十四日得㫖今并入六月九日又言古者諸侯朝覲及相見執玉典瑞云公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧以朝覲宗遇㑹同于王諸侯相見亦如之是也孤卿大夫元士新任為臣則執摯大宗伯以禽作六摯以等諸臣孤執皮帛卿執羔大夫執鴈士執雉司執云掌擯士者膳其摯是也其相見執摯士相見禮曰冬用雉夏用腒是也賔射亦執摯射人云三公執璧之屬是也若諸侯及羣臣助祭於王本無執玉帛羔鴈之義故雖冕服但當執笏玉藻曰見於天子與射無說笏入太廟說笏非古也說者以為太廟之中惟君當事說笏以臣見于君無不執笏明太廟之中雖當事之時亦執之唐王涇郊祀録曰凡皇太子釋奠及王公以下從祀皆執笏伏請自今親祠郊廟羣臣冕服助祭執笏或當事則搢笏先儒以臣雖當事亦執笏為不說笏非是其陪位官亦合冕服助祭從之禮文在三年八月二十一日辛亥今并入六月九日庚子詔權河北東路刑獄太常丞汪輔之虞部員外郎陳知檢各罰銅二十斤並坐前在河北轉運司奏錢帛數不實也壬寅詔寳文閣學士兼侍讀陳薦久苦足疾除將來親祠明堂外諸祠攝事免一年時中書奏季夏祀黄帝欲差薦攝太尉也癸夘權提舉河北西路常平等事太常博士吳居厚權京東路轉運判官欲記吳居厚事故特著此五年六月丙寅遷副使六年九月除待制為使居厚豫章人已見熈寧八年八月録定州北平縣主簿李竦子為郊社齋郎尉王奎子為三班差使竦奎因開壕溺死故也御史何正臣言禮部侍郎滕甫近自知池州移知蔡州甫頃嘗阿縱大逆之人法不容誅朝廷寛容尚竊顯位於甫之分僥倖已多豈可更移大藩乞别移逺小一州詔改知安州自池移蔡乃四月二十四日今并此韓存寳言益州利夔等路與瀘州蠻亦有水陸可通道乞指揮逐路經過所有須索責以應辦從之詔定州路安撫司給封樁紬絹三萬修保州城三司言河北糴便糧草鈔價本以見錢法一等給還後别立草料錢以銀紬絹及茶本錢折商人無利遂增草料虛錢雖以銀紬絹估直又令算清香茶權罷給銀亦入納未至通行致於人糧交引品搭分數抑勒入納昨薛向乞用見錢法糴買當時三司以錢不給又即如舊今勘㑹紬絹本非河北京東商人所須交引鋪以賤價取之坐獲厚利若不申明恐牽制人糧例增虛錢浸害邊計乞並依人糧例入納出鈔更不虛擡價錢市易務下界亦依人糧鈔法給還若闕見錢三司應副其已前鈔自依舊法從之詔以户絶孫守凝園宅并地一十四頃有畸賜上清儲祥宫甲辰詔權判司天監丁洵權同管勾司天監周琮各補一子若孫充額外學生洵二十九年不磨勘琮領監事二十六年未嘗為子孫乞恩故皆及之詔涇原路募敢勇依鄜延路以百人為額從經畧司請也兵志第三巻有此與實録同鄜延額附熈寧六年年末詔司農寺於永興軍等路給常平倉穀十八萬石充環慶路將下守禦及緩急漢蕃弓箭手闕之借貸詔河北河東陜西未置保甲令監司提舉司歲分州縣案閱從兵部請也都提舉汴河隄岸司乞禁商人以竹木為竺二稗栰入汴販易從之詳定禮文所言今儀注親享太廟但有三牲骨體爼而無腸胃膚爼不應古義伏請於三牲骨體爼之外加以牛羊腸胃爼一豕膚爼一所有牛羊腸胃其數各三其長皆及爼距離肺各一小而長午割之不絶中央少許刌肺各三與腸胃共為一爼其載之次序以離肺在上端刌肺次之腸胃在下端豕膚為一爼横載令其皮革相順從之禮文所三年二月十六日依奏今附六月十三日又言古者祭祀用牲薦腥則解為七體薦熟為十一體今親祠南郊正配位之爼用牛羊豕之足各一用肉各一太廟每室用羊豕之足各一用牛肉各一至饋熟又臠三牲之肉各一不殊左右胖不分貴賤無豚解體解之别伏請自今郊廟薦腥解其牲兩髀兩肩兩脅并脊為七體左右胖俱用其載于爼則以兩髀在端兩肩次之兩脅次之脊居中皆進末至薦熟沈肉於湯止用右胖髀不升其十一體在爼之序則肩也臂也臑也正脊也脡脊也横脊也代脅也長脅也短脅也膊也胳也依此設之肩臂臑在上端膊胳在下端脊脅在中央仍各以半為腥俎半為熟俎腸胃膚俎亦然從之又言凡視滌濯祭器及烹餁之具有司皆當就視今親饗太廟每室前惟設一籩一豆而南郊則於神位前亦先設一籩一豆引視滌濯並不陳罍洗篚羃簠簋登鉶及巾蓋之屬而視之是徒為文具而無潔清之實也伏請改正從之詳定所三年二月十六日依奏今附六月十三日丙午詔中書置局詳定官制命翰林學士張璪樞宻副都丞㫖張誠一領之祠部員外郎正陟臣光禄寺丞李徳芻檢討文字應詳定官名制度並中書進呈其後又以著作佐郎祕閣校理何洵直兼檢討文字何洵直檢討在七月九日今并書之龍圖閣直學士樞宻都丞㫖韓縝兼判兵部罷兵部勾當公事官詔河北河東陜西路各選文武官一員提舉義勇保甲武臣提舉義勇保甲兼提㸃刑獄文臣提㸃刑獄兼提舉義勇保甲自今五路提㸃刑獄凖此東上閤門使榮州刺史狄諮河北西路權判都水監都官員外郎劉定河北東路東上閤門副使王崇拯權判刑部集賢校理黄㢘並河東路引進副使張山甫永興等路權判兵部太常博士李深秦鳳等路提㸃河北西路刑獄杜常提㸃永興軍等路刑獄葉康直並就領其事二年十一月二十九日初命王中正狄諮提舉權判都水監張唐民請復黄汴諸河歲差修河客軍九千人額都大提舉游田司請以雍丘縣黄酉等十棚牧田為莊田並從之增桂州公使錢為四千緡如京使髙通上其叔永亨獄中訴寃文字三十二紙乞移永亨别路州軍待報免為吕惠卿等横加刑禁寃死牢獄上批永亨邊逺小臣犯法不枉主師治其姦狀尚不知懼乃敢飾情自言兇狠之實於此可見仰見勘官司分析寛縱罪人漏泄獄情因依以聞仍將來遇恩不原二年五月二日永亨先次衝替權熈河路經畧司趙濟言得董戩書稱欲建一城來求修城器具及援兵詔濟諭以朝㫖修城鐡器已令應副先具數來至修時當令經畧司遣兵照管應接丁未四方館使慶州刺史曹評領榮州團練使東上閣門副使曹誘為引進副使供備庫使曹論為西京左藏庫使以解官持慈聖光獻皇后三年䘮特有是命詔朝廷及省寺遣官至諸路安撫監司提舉司不得奉舉以中書言所差官事于三四路者乘勢干請得舉主不少恐不能無徇情茍簡之弊請立法故也御史滿中行言知尉氏縣孫覽被召赴闕議者皆以覽能彈壓將下卒伍將見擢用而中外之言則以為向者尉氏軍中本結連實狀止縁本縣都監與將官不協多以好語姑息意在中傷幸小有言又復張大其事陰報知縣掠為已功今將官既非次替罷而覽又召對將被賞擢恐自今將官軍政無以振舉而邑令之好利者皆有僥倖萬一之意詔覽歸任覽覺弟也先是尉氏將官御下苛酷軍士謀就大閱殺將官以叛及期將官不敢出覽聞之亟往既至軍士猶族語不顧覽徐諭之曰將官暴虐誠有罪然汝曹衣食縣官縣官顧負汝邪何敢為族滅計衆皆感悟就列二將伺間徐至皆衷甲從子弟自衞覽面責之命吏趣具奏衆遂貼服上聞而嘉之故欲召見也尋以覽為司農寺主簿覽傳在靖國元年十一月將官非次替罷當考戊申祠部員外郎胡宗愈為開封府推官數日改知蔡州宗愈先任河東路提㸃刑獄以不稱職代還而有是命詔鄜延路經畧司沈括結絶前經畧使吕惠卿措置四路邊防未了事都大經制熈河路邊防財用事李憲言降授引進使達州團練使王君萬自開拓熈河功為最不幸隕䘮官次所負結糴錢已没入其家産子贍適受官又拘收欲望矜憫給還除贍熈河路一將副差遣御史何正臣言廢置予奪之柄人主所以獨馭天下之士雖執政大臣有不與焉者而憲以中人犯分干請畧無忌憚賣恩作福取媚於人况君萬邊豪豈不傾動其類伏望寘憲典刑詔劄與憲二年五月二十七日六年六月四日可考已酉詔同文館置司驅磨市易務錢物以同修起居注舒亶領其事御批御史察太學博士葉棣在告月日冒成考遷官中書看詳所察不妄已推治雖流内銓鹵莽或為姦然既承取索自當以實報有司㑹問但懼礙條不得改官故匿而不言所為如此恐不可為人師長可先罷其學職以聽於有司武學上新修敇令格式詔行之詔提舉教馬軍所見敎臣寮子弟并諸色人仰提舉官候拍試見有步射一石五斗力弓十箭五上逺六十步髙八尺闊五尺垜五箭馬射一石三斗力已上直背射五箭三上垜並前後手足出力委是如法精熟者具名聞奏實録但書五月十一日手札今并六月十八日增入五年十一月十七日實録所書與此相重當考熈寧十年九月十九日十年九月二十三日元豐二年五月十四日三年三月十一日五月十一日六月十八日五年十一月十七日六年二月五日壬子詔罷中書門下省主判官歸省事於中書禮院言九月卒已有事于明堂為慈聖光獻太后服以日易月雖已禫除尚在三年之内其鹵簿儀仗冠服音樂宜如故事詔依熈寧九年南郊故事命知禮院祕書丞楊傑赴詳定禮文局同議大樂從祕書監致仕劉几請也御批付韓存寳昨討瀘州羅茍姓夷其招納蠻族止令自守村囤捕斬賊黨未嘗驅領隨軍今日用兵與前事異若猶用舊令則大軍深入或為後患固宜改圖將來進討凡敇榜招安村囤並擇有功首領質其骨肉於瀘州或外寨仍量留守兵然後責令㸃集族下勝兵丁壯為大軍先驅明與要約若討賊斬首有功依漢軍賞如不用命持意兩端身并同屬皆斬賜祠部員外郎權發遣大理少卿楊汲紫章服内侍李憲妻王氏吿憲閨門事開封鞫治子婦既誣服上察其寃移大理汲以左證得其情王執愈堅取内侍省宿歴驗之得誣狀白上曰憲親近有不得直刑濫從此始矣非卿孰能辨之此事據汲本傳附見當考其然否按前此蔡延慶坐此獄罷開封蔡承禧云云則汲傳蓋未可信也二年八月壬寅初送大理癸丑詔熈州趙濟罷任留秦州聽㫖時濟以私役兵防及用官錢買女口事下陜西轉運司劾罪故也詔醫官使以下診御脉并御藥院祗應者𨽻御藥院其入内祗應并看驗病證醫官𨽻内東門司乙夘知滄州屯田郎中直集賢院張頡為祠部郎中直龍圖閣知熈州御史滿中行言頡天資褊躁動多猜忌頃在廣南校計私忿熈河邊要宜得持重有常之人乃罷頡而用知雄州步軍都虞候昌州團練使苖授知熈州苖授除命在七月二日今并書録故太常博士祕閣校理兼監察御史丁執禮一子官以其兩為御史及歴三司判官提㸃刑獄故也後毋得為例詔河北縁邊州軍禁軍闕額米歸羣牧司封樁參知政事章惇上導洛通汴記詔以元豐導洛記為名刻石於洛口廟權發遣京東路轉運副使李察言保甲之法蓋防檢姦盗緩急得以呼集追捕本路排定累年既不敎習復無㸃閱之法進丁開户簿籍不明浸成空文乞每歲農隙委提㸃刑獄司選官分縣就鄉村對籍閱丁數其不同者正之送司農事隙以徧閱提舉成都府等路茶場司言本司比歲積錢鉅萬累詔以給賜别司外欲以所有金帛為錢三十萬緡輸内藏庫詔就近經畧司使所在州封樁委茶場司管勾如封樁錢物法自今有羡錢准此歲終具數以聞丙辰詔開封府諸縣彊盗屢發當職官疑有疲愞不任事者令提㸃司躬行被盗縣督捕仍體量不職廵檢縣尉以聞御史滿中行言昨曹村河決止坐都水監當任官竊以河防完固非朝夕可至量罪定罰宜以供職久近為差詔中書立到官日限法權發遣京東路轉運副使李察乞通行海鹽州軍置買賣鹽場及於徐州置鑄錢監又乞增預置紬絹三二十萬從本路轉移又乞令京東兩路提舉司詢究衙規實費錢數裁定又言本路剩員數多坐費糧餉乞年雖未及五十五羸病怯弱者並聽減放並從之剩員仍問其願否其彊壯者選充廂軍食貨志元豐三年京東轉運副使李察始建言南京濟濮曹單行解鹽餘十有二州行海鹽請用今稅法置買鹽場其法盡竈户所煮鹽官自賣之重禁私為市歲收錢二十七萬三千餘緡而息幾半之吳居厚為京東轉運判官承察後治鹽法利入益多六年較本路及河北買賣鹽場自改法抵今一歳有半得息錢三十六萬緡察居厚皆拜官以旌其功李察事在三年六月二十五日詔韓存寳所領四將兵皆精鋭亦足以辦事其彭孫所將兵可勿發存寳與孫俱受命未嘗私相往來朝廷知其不恊遂罷孫而專用存寳兩人未嘗私相見據平蠻録詳定禮文所言司天保章正胡晏議武成王廟管仲韋孝寛尉遲敬徳蘇定方郭元振止書官號姓字請改書其名禮記曰附於殤稱殤童某甫不名神也春秋之義臣既死則君不忍稱其名夫以已之臣子及其死而為神尚不名之又况異代之臣乎故祀五官之神不曰重黎而謂之勾芒祝融亦不名神也謂宜並書其爵號配以諡若字而不名如留侯張良則稱之曰漢少傅留侯張子房或諡字俱不顯者則書其名氏從之後又詔前代百辟卿士載於祀典者皆不名丁已詔在京酒户見帶納舊麴錢及倍罰錢者展限半年不曾該放倍罰者免三分之一詔開封界京東西河北陜西河東以物力户養馬可依逐路提舉司所具當養匹數施行開封府界四千六百九十四匹河北東路六百一十五匹西路八百五十四匹秦鳳等路六百四十二匹永興等路千五百四十六匹河東路三百六十六匹京東東路七百一十七匹西路九百二十二匹京西南路五百九十九匹北路七百一十六匹二月二十八日八月二十二日又二十七日本志云又有物力户養馬令者自元豐三年詔以國馬未備其令開封府界京東西河北陜西河東路州縣物力户各計資産市馬坊郭家産及三千緡鄉村及五千緡或坊郭鄉村通及三千緡以上者並養馬一匹各及一倍增一匹至三匹止馬以四尺三寸以上齒及八歲以下至十五歲則更市如初提舉司籍記之七年二月七日罷京東西路提㸃刑獄司言縁澶州吳村堤都水監丞司開决水口致大河水流入濮州枯河行流下接横壠口已下濮鄆州修貼堤道上批宜令都水監勘㑹今夏大河水不曾漲大元無危急都水因何有此施行於農忙時致驚動勞擾並河居民以聞太常寺丞汪輔之權發遣開封府推官八月丁酉為豐稷有言故特書己未詔廣南西路提㸃刑獄司依舊置治所於桂州初欲遷於象州故也詔真楚泗州各造淺底船百艘團為十綱入汴行運祕書監致仕劉几言祀明堂樂章字與樂曲聲數多少不同殊失虞書歌永言之法乞遵用御選樂章委本局依律吕七均之法隨樂章字數審定聲音以一聲歌一言八音隨之又古編鐘磬其數皆十六蓋十二律之外有黄鍾大吕太蔟夾鍾四清聲也今聖朝大樂舊鐘磬皆十六自李照議樂以來不復考擊全失古法况周禮鄭氏注編磬盡具十六之數李照不曉四清聲助成四律宣導陰陽之和今若不用即懵倡和之理乞依古法具四清聲詔禮院案試後如几所議詳定禮文所言皇地祇神州地祇燎壇不當設請毁之凡祭皇地祇神州地祇大社大稷其祝版與牲幣饌物並瘞於坎又請南郊致齋皇帝出自内寢居大慶殿御幄易服有司奏中嚴外辦畢即大慶殿御坐南向百官北面再拜奏請皇帝降齋室罷西房及御榻東向位明堂致齋文徳殿凖此又言郊廟明堂告神册使中書侍郎讀之非是請改命太祝又言親祠郊廟執事之官皆一切臨時取充位而已宗室及陪祠官則無預於執事不應古義請親祠南郊薦徹籩豆簠簋俎饌以朝臣充太廟以宗室遥郡刺史以上充又言今禘祫以功臣配享而冬烝不及與經不合請每遇冬烝以功臣配享其禘祫配享皆罷詔讀册以史官攝太祝郊廟執事官選無過人冬享禘祫及親祠並以功臣配享餘皆從之舊紀書已未詔冬烝以功臣配享新紀削去權發遣京東路轉運副使李察言近歲聽民買官監酒務增羡則利入私家虧折則逋負官課由此暗失歲入乞買酒務人欠浄利若雖無欠而課贏可以官監者皆復之仍乞不拘常制奏舉官增助財計從之饒州長山雨木子數畆狀類山芋子味香而辛土人以為桂子又曰菩提子明道中嘗有之是歲大稔是月升沅州黔江城為黔陽縣舊紀書置黔陽縣此月十三日朱本云詔以沅州安江鎮江寨人户併為黔江縣今併入此實録又於十二月末書此蓋重出也
