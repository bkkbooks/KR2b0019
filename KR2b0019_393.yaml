body:
  text: 續資治通鑑長編卷三百八十九宋李燾撰哲宗元祐元年十月乙酉朔以朝請大夫廣南西路轉運副使楚潛知處州蘇軾論楚潛在八月二日朝散郎權廣南西路轉運副使髙鎛為廣南東路轉運副使王巖叟嘗論鎛傾險當檢附三省言熙河蘭會路五州軍嵗支官錢二千五百緡建水陸道場追薦漢蕃亡將兵而逐州僧道不及二三十人請裁減詔嵗支五百緡新削丙戌殿中侍御史林旦為淮南路轉運副使監察御史孫升為殿中侍御史朝奉郎王古為工部員外郎校書郎黃庭堅充實録院檢討官禮部太常寺言鴻臚卿孔宗翰奏伏見先臣孔子之後世襲封爵一人自西漢以來有褒成侯之國至魏晉以降又有奉聖宗聖崇聖之號其名不一皆有實封或以百縑奉祀聖朝祖宗以來益加崇奉真宗東封禮畢親幸儒廟恩禮備至貴道之美輝映今古襲封公爵至今不絶然名有未正必待聖朝而正之蓋襲封嗣爵本為侍祠今乃兼領他官不在故郡欲乞今後不使襲封之人更兼他職并别請俸終身使在鄉里本廟元差灑掃户五十人看林户五人熙寧中朝廷裁減役人議者欲役錢寬剩遂減作三十人其看林户只有三人昔慶厯中梁適知兖州乞以廂軍代廟户并裁減人數時執政欲從適之請獨范仲淹云此與尋常利害不同自是聖主崇禮先師之事仁義可息斯此人可減今日雖行他時必復之執政遂已今乞裁酌施行及臣僚言孔子廟貌國家之所常奉而錫田之數不足賙族人襲封雖存未免執事奔走甚非所以尊榮之意今看詳典故自漢魏以來莫不封孔子之後優賜田邑然未嘗眀立制度故承祠之禮有時而盛衰國朝褒崇先聖日益隆厚真宗皇帝又嘗賜經史於其家使兖州擇儒生講授有以見祖宗尊奉聖祀度越前代今參議欲依所請釐定典禮命官以司其用度立學以訓其子孫則朝廷崇儒尊道之意厚矣合襲封衍聖公專主祠事添助田百頃供祭祀外許均贍族人差灑掃户五十人看林户五人並依舊法賜書置教授一員教諭本家子弟如鄰近鄉人欲從學者聽改衍聖公為奉聖公及刪定家祭冕服等制度頒賜施行從之詔內侍押班梁惟簡在太皇太后殿祗候近二十年纍有勤績今轉出可特與帶遙郡刺史不為例權中書舍人蘇轍言轍以九月十二日除起居郎十一月二十四日除中書舍人此時但以起居郎權中書舍人也權中書舍人自轍始當考吕氏家孰記云云附注在九月十二日丁卯臣竊見梁惟簡旬月之間三度超擢皆以自前法外僥幸特恩為比仍言它人不得援例初自御藥超帶御器械及前省兩資改所寄文思副使權入後省只此一轉已是內臣進用之極中外驚怪皆有議論次又以坤成節奏薦恩澤兩重特轉兩官於法以特恩轉官者自文思副使當轉皇城副使又以特旨轉供備庫使臣於此時當撰告詞以其事未至太甚未敢輒有論奏曽未旬日今又以罷本殿祗候與轉一官若依舊法自供備庫使當轉西京左藏庫使耳今乃更超文思左藏皇城使三資直帶遙郡刺使臣若不早論救必將大致紛紜竊謂朝廷非常特恩當以待人臣非常之功今惟簡之為人臣所不知但見其給事宫省嵗月稍深不過勤謹自將别無非常功效而三度冒居此寵皆非祖宗舊法臣竊見太皇太后陛下自臨御以來肅清中禁抑損外戚私謁不行濫恩盡去謹守法度自古所未嘗有豈肯於近習之臣獨開僥幸之路必由條例委曲聖意未暇一一盡詳而大臣不能守法失於開陳致此過當不然豈陛下能以法度繩治外家親戚而獨不能以治內臣哉若惟簡别有出衆功勞即乞宣示其狀令有司核實以伏中外之言臣頃以不才濫處言責每因進對輒蒙天奬嘗欲捐軀以報知遇不敢循默上負恩德所有告詞臣未敢撰初惟簡除內侍押班權管入內押班事范純仁等纍諫未允韓維於簾前爭之尤力及惟簡遷官轍繳還詞頭維因面奏論內降且言仁宗寬仁每若近習貴戚幸求恩澤宣諭執政卿等但依公執奏可以寢罷臣備位執政自可執奏不敢避人怨憎惟簡遂罷遷官此據韓維傳八月十八日除押班九月十七日除皇城副使詔賜諸州諸路轉運提刑司歷先是嵗以新歷賜守土監司官罷聽以歷自隨知衛州王哲請以歷賜有司而不賜其人詔并賜之定州路都總管司請馬軍係於六月分內闕馬聽自出錢買馬從之新無當考樞密院言東南一十三將自團將以來未曾均定出戍路分及不𨽻將兵內有出戍窠名數少所管指揮數多去處未得均當欲除廣南東西兩路駐劄三將只充本路守禦差使及處州第六將全永州第九將凖備廣南東西路緩急勾抽䇿應並不差戍他路餘八將及不𨽻將兵依均定路分都鈐轄司駐泊分擘差使內將兵不𨽻將兵路分却於自京差撥步軍前去補戍候將兵回日却行勾抽從之丁亥户部言陜西制置解鹽司奏慶厯八年朝旨范祥擘畫更改解鹽事內延慶渭原環鎮戎保安順德等八州軍乞禁𣙜客鹽官自立額一萬五千五百席貨賣許客旅將解鹽於指定八州軍折博務入價依立定鹽價并加饒錢算給交引所納鹽貨令逐州軍相度立額分擘與外鎮縣城寨出賣將八州軍官賣解鹽一依范祥舊法許本司判給公慿召客人自用財本指射入納據合支還客人鹽價錢數將轉運司糴買年額鹽鈔紐算支給其出賣到鹽錢都應副轉運司糴買又奏檢凖嘉祐二年朝旨制置解鹽范祥奏客人興販不行乞舉差承務郎以上一員於在京置場令將擘畫鹽鈔出賣見錢依舊於在京都鹽院置庫收納錢鹽乞先後有降解鹽額鈔更不下轉運司仍於前一年冬季內一併起發到本司委自本司依逐州軍合得年額相度緊慢支給只許入納見錢出賣其外鎮縣城寨糴買錢數依此施行慮法行之初轉運司若無糴本乞依近降朝旨將諸司糴買並罷止令轉運司糴買今後止絶諸司不得販賣雖有專一朝旨亦許本司執奏所有諸司日前買下鈔數乞委本司拘收候民間鹽鈔稀少相度出賣還錢今後如本路緩急闕錢須合朝廷應副更不支降見錢公據只將所賜錢在京封樁依數權許别給鹽鈔委自本司不拘常制選差官就彼置場相度每席量減三二百文收買近年以來鹽鈔别立印號及舊鈔别號新鈔年月行使如此之類今後並乞禁止本部看詳請候民間積滯鹽鈔少日如有朝廷應副本路見錢委自本部相度依此施行所有鹽價元定每席六緡難議改易兼元豐六年七月朝廷以見錢給賜陜西轉運司支用本司差官就京請領收買紬絹銀等赴陜西除腳乘外尚獲厚息今來應副陜西錢欲乞依此擘畫不須給降公據并額請鹽鈔從之舊録因吕大忠奏議刪修今用之奏議甚詳或更可參取增入新本刪修舊本頗多窒礙不相照處合只用舊本新本云户部言陜西制置解鹽司奏慶歷八年朝旨范祥議改解鹽事內延慶渭原環鎮戎保安德順等八州軍禁𣙜客鹽官自鬻鹽嵗以萬五千五百席為額一依范祥舊法其出賣到鹽錢以給轉運司糴買又奏檢凖嘉祐二年朝旨制置解鹽范祥奏乞舉差承務郎已上一員於在京置場令將鹽鈔出賣見錢都鹽院置庫收納乞今後有降解鹽額鈔更不下轉運司委自本司依逐州軍合得年額文給又慮行法之初轉運司無糴本乞只令轉運司糴買止絶諸司不得販賣其諸司日前買下鈔數乞委本司拘收候民間鹽鈔希少相度出賣歸其錢諸司本部看詳請候民間積滯鹽鈔希少日朝廷或應副本路見錢委自本部相度所有鹽價元定每席六緡難議減易兼元豐六年七月朝廷以見錢給賜陜西轉運司支用本司差官就京請領收買紬絹等赴陜西除腳乘外尚獲厚息今來應副陜西錢欲乞依此從之此月六日户部云云可參考詔奉議郎前太府寺丞王璋許守本官依舊太府寺丞分司南京今後應自請分司並帶職事官璋以疾自陳故也樞密院言將副就移别將副者通補前任月日滿三年替所補不及一年願再滿一任者聽即副將升正將使臣初移副者並别理三年滿替從之戊子詔內地及川廣知州通判除堂除人外並以三十月為任六年十二月二十二日可考詔户部以減罷倉部郎中一員許復置專勾覆案并印發諸色鈔引又詔新授資政殿學士知鄭州張璪不許辭免眀堂大禮支賜璪為中書侍郎以疾在告禮畢執政官例有賜不與祭者當罷故特給之吏部請本貫川人聽三班內一任歸川其因酬奬得家便優便及不拘路分者亦不注川闕從之己丑刑部請開封府告獲造偽殺傷等事合官給賞錢者並於本府賊盜賞錢內支從之新無庚寅知汝州正議大夫章惇知揚州十八日王巖叟朱光庭吕公著等論列依舊知汝州吕大防政目六日章惇知揚州又邢恕知汝州於汝州下注云已除復罷附見當考中散大夫王令圖為都水使者吏部侍郎傅堯俞罷詳定役法從所請也九月二十日堯俞辭內侍押班梁惟簡管勾景靈宫詔應試中館職者內選人除試正字改官請俸等並依太學博士法未升朝官除校書郎升朝官除祕閣校理正字供職四年除祕閣校理仍候改寄祿官日除校書郎供職二年除集賢校理祕書郎著作佐郎比集賢祕閣校理著作郎比直集賢院直祕閣三省奏臣僚上書朝廷立差役之法許私自雇人州縣行之已有次序近朝旨弓手一役却令正身祗應恐公私未便詔應弓手正身不願充役者許雇募充弓手得力之人仍不得過元募法雇錢之數令府界提點司逐路轉運司相度施行御史中丞劉摰言臣竊意朝廷必以差法初行弓手一役乍差鄉户未習捕盜次第而舊日應募之人一旦放罷或無所業挾其素藝去而為盜故降今來指揮欲以權其始而待其成臣竊以謂二者非所宜憂也蓋差役方復事未就緒若假以嵗月則法自成而事定矣昨三月十七日敕弓手曾經鬬戰緝捕有功者雖無户等特與存留則收拾舊人已有此法且弓手不可不用差法者蓋鄉人在役則不獨在家丁子弟之助至於親族婚姻及其里落之衆莫不為之營援同其休戚一有捕限則人人張耳目出方略以求盜賊又其土著自重故無逃遁之患此乃從弓手得賊所以常多於它警捕之人而祖宗以來弓手所以必用正身也自行雇募以來盜寇充斥蓋所募浮惰之人不任其責差之與雇利害如此然則祖宗之法豈無意哉行之百餘年不聞上等户以為不便而願雇人也夫上之使民使其出力則易使其出錢則難此古今之通議易曉也今朝廷指揮雖云不願充役方許雇人然官司上下利者舊人慣熟或以人情留占必須沮斥新户使之雇人安能見其願與不願之情臣深恐被差之人嵗出緡錢不易却須歸怨差法姦人因而可以搖動議論兼天下徭役重輕州縣風俗異宜固當隨方制之不可槩以一法臣觀五路弓手熙寧以前正身充役之時最號強徑往往逐名家自養馬其材藝捕緝勝於它路近日復差以來妥帖就役皆已試之效亦不聞其不樂而願出錢雇人也訪聞惟是川蜀江浙等路昨差至第一等人戶充役皆習於驕脆不肯出力為公家任捕察之責故寧出資雇代自以為便然此皆一偏之利而議者不察遂乃一例變動成法今朝廷若未肯追寢許雇之命必欲委曲徇民則宜分别利害大小權為之制自來盜賊最多及弓手正身久有成效者無如五路臣欲乞五路弓手並依祖宗舊法及今年七月三日申眀聖旨指揮須得正身祗應外其餘路分即依今月七日指揮仍乞將舊有户等差充者及前項曽經戰鬬有功存留者與情願雇人者三色通計不得過正額一半人數所貴新舊相兼漸熟捕盜事體其三色人數內遇有闕額止行差捕則一二年間差法成就雇可罷矣朝廷立法不可以事初一二小害槩壞大體所謂弓手正身之小害者惟是南方上等人户其子弟多修學為舉人故為未便造起浮言以惑議者之聽殊不知每嵗出緡錢雇代其久逺之害不細也兼祖宗以來行正身充役之法通於天下已百有餘年曽不聞其不便今朝旨雖欲周順人情下許雇之法然止可作權時指揮宜立限一年或二年候人情習熟欲罷代法伏乞詳臣今來所請事理特賜施行外其許雇路分仍乞相度人户二丁以下方聽依近制雇人代役侍御史王巖叟言臣竊詳弓手一役令正身祗應極為允當不當更有此指揮按差役舊法諸色公人固有許私自雇人替名者惟弓手並須正身充役蓋有深意正身弓手人人自愛惜督之捕盜有畏懼罪責之心又其婚姻親戚布在村落人人皆與為耳目有易於緝捕之勢一境之內賴之以安者鄉户正身弓手也祖宗以來行之有已然之效熙寧變法既用雇募又復減人寇攘為之縱橫郡縣無以為計近自陛下復行差法弓手並用正身又添人數四方來者更言其便盜賊衰息善良安堵又皆已試之驗况天下弓手自行雇役以來減削殆盡三路縣分有止存八人之處其間亦多是元係戶等今來已往往就差充役此外合放罷者所在無幾其有色役可容替名何憂失業豈可茍因不切事情之偏辭遂更以見功效之成法使天下復以為疑伏望聖慈特賜詳察更不施行許弓手雇替指揮以信號令以嚴紀綱貼黃稱臣願陛下主張差役大法勿容異議稍有變更使天下之人復受其弊臣昨因司馬光薨曾上章為陛下言今天下事大定矣民安且樂矣惟在陛下持之益堅信之益篤勿有所移則天下幸甚伏望聖慈於聽言之際每加省察臣愚不勝至懇昨罷保甲之初説者亦多云必將聚為羣盜而人人復業樂生無為州縣之害者今放罷弓手熟於保甲之多寡何傷於事而勞過計如此事初雖小有未安不久亦自當著業此非朝廷之所患也正當患却用雇人則盜賊復將不可戢矣自來雇募之人往往無家不堪倚仗尤於捕盜莫肯用心州縣常以為患今幸得差鄉户正身安可復許雇替開無窮之弊也摯巖叟言從違當考眀年正月九日十七日蘇軾自辨䇿問有及此者監察御史上官均言臣昨於今月初三日嘗具奏論差役之法其一以為在寬民力欲乞逐等色役立三畨之法使休間之日多供役之日少則民自裕於衣食此誠役法之要在陛下深詔有司詳講而熟計之以惠天下臣竊以東南言之役之最重者莫如衙前其次弓手今來東南長名衙前招募既足所差不及上户上户之民必差弓手則是以上户就中户之役實為優幸何以言之熙寧以前上户係差衙前每一次差役多者費至千緡其後出助役錢每嵗多者亦至數百緡今來既充弓手每嵗所出不過四十千每一役五年共費止二百千比之前日實為優輕上户之産厚下户之産薄而例皆五年一替實為不均大率差役之行上户産厚而役輕下户産薄而無役所當寬恤正在中户今欲裕中户之民則在增上户之役如第二等户差弓手役以五年一替第一等户産業既厚每差弓手宜增年數蓋上户産業本等中又分五等其最厚者宜役十年而罷其次九年以至六年弓手一役今來既許雇人則雖十年一替所費止四百千於上等人户别無妨廢如所雇人役及五年願替者許别雇人承替蓋自來衙前亦隨産業稅錢多少銷折重難分數今來上等人户只宜就本等厚薄遞增差役年數上等人户入役既加年數則中等人户自然寬裕此損有餘以補不足之術也臣竊見十月六日指揮應弓手正身不願充役者許雇曾募充弓手得力之人臣竊思此法公私最便而議者或以為皇祐以前弓手率用正身産業既厚則自愛惜而重犯法又有鄉黨親戚以為耳目其於捕盜最為得力今既用遊手浮浪之民實為非便臣以為不然自古用兵之法使愚使勇使貪蓋勇則輕死不憚強敵彼願慤畏法者使之承符帖追逮邑民則可矣俾之冒白刃不顧死與賊角勝豈其所長哉自古為將聞募士以戰者有矣未聞驅畏法自愛之民以求勝也又自熙寧以前弓手之役例差第二等以下人户今來既差及上户而上户之民平居自養乘堅䇿肥薄材綿力強以捕盜豈其所長哉又有兩丁為儒或皆孱弱不足任使驅以就役是禁其為學而強其不能於公則不適用於私則非所便豈法之善哉臣竊見兩浙諸邑差正身充弓手至有涕泣以辭免者此利害可見矣蓋弓手之役異於他役須強悍敢鬪輕死慕賞者為可任使彼富足而孱弱者既怯於鬪又無慕賞之心豈若就雇之人為可用哉又况就雇之民亦生長於閭里人情諳熟盜賊所發豈無故舊親戚為之耳目哉自熙寧以來行募役之法是時不聞盜賊所至充斥豈雇募弓手之纍哉又今來立法許雇曾充弓手得力之人彼當役人户既自選雇以身保任必加詳擇得力有行止之人比往時泛加招募宜有間矣議者又以為五路之民勇悍慕賞樂以正身充應弓手今既召雇恐不足以捕盜臣以為不然今來立法應弓手正身不願充役者許雇得力之人聽其便爾非謂不許以正身在官也彼五路之民既勇悍慕賞樂以正身充應烏有不可哉大抵為國制法可因否革與時變通要以便民為本皇祐役法於今損益固非一二豈必膠於新舊哉願陛下參酌古今之宜斷以不惑庶幾法無屢變吏有常守民獲安便禮部言户部關凖敕户部尚書廳置拘轄一司按舊三司所管場務官制後並不曾差官點檢欲乞除依條所轄寺監季點外如不係本部所轄場務亦依此關所屬點檢訖報本部照今後郎官與寺監官互輪季點今詳諸坊庫雖舊係三司主行之事緣見𨽻本部所轄若候到别部移文方行點檢於理未順欲乞每季終本部郎官與光祿寺官依今來朝旨互輪點檢更不候户部關報如有點檢係户部事即行關報其餘諸部亦合依此從之新本削此户部言嘉祐中中書劄子解鹽鈔立定一百六十六萬三千四百緡為年額今相度嵗給解鹽鈔欲以二百萬緡為額買馬之類並在數內其應係見錢公據並乞寢罷庶不侵害鈔法候將來民間積滯鹽鈔稀少價直平日其嵗給之鈔别奏取朝旨節次增給以助經費從之元豐二年二月丙辰以二百二十四萬緡為額當考此月三日云云可參考右司諫王覿言臣伏見臣多上言乞罷進納入出官及裁減蔭補特奏名并胥吏入流人數已係給事中中書舍人左右司郎官等同共看詳臣竊聞尚書都官軍大將等共以一千二百人為額其以磨勘及功勞酬賞改轉借職殿侍差使者嵗數十人於入流最為冗濫今額常不足逐旋收補而已而侍郎右選乃以使臣員多闕少差注不行臣愚以謂軍大將等合勾當綱運內擇其可以令近下使臣管勾者或理住程或當短使優與請給酬賞即使臣願就者必多不惟逐嵗可漸減出官人數兼侍郎右選得闕次稍增易為差注使待次日久貧困之人早得請給不為無補其軍大將等員額據合用人數外不願放罷者且令與使臣相兼差使候有闕更不招填伏望聖慈指揮下有司與前項裁減入流事一處相度施行貼黃稱軍大將等雖以一千二百人為額見今不及千人故不住招填惟勾當在京場務百餘人內有帳籍難成之處號為繁重其餘管押綱運者多可差近下使臣勾當况今天下綱運已差使臣勾當者不少即知押綱軍大將顯然可以消減恐議者以軍大將等既減去綱運專令充繁重場務專副非便臣竊謂京師場務所謂繁重者惟在帳籍其造帳目可别作處置臣伏見天下州郡場務甚有出納浩瀚之處其專副及造帳人管勾逐年帳籍無不如期而畢獨京師場務帳籍難成者但立法未善而己覿自注十月六日上殿劄子八月二十六日上官均云云辛卯復象州武化縣壬辰夏國主嗣子乾順以父秉常卒遣吕則依綱裕瑪等八人告哀十二月十四日賜詔右僕射吕公著提舉修神宗皇帝實録右司諫王覿言諫官職事凡執政過舉政刑差謬皆得彈奏雖在中書後省供職即不可如中書其他屬官時與執政相見欲乞今後中書舍人暫闕亦不許差諫官兼權從之時中書批狀令覿兼權故也九月十六日詔可考看詳訴理所言凖朝旨取索元豐以來大理寺開封府御史臺斷遣過因內降探報公事元犯斷遣刑名看詳內有不合受理情可矜恕者具事理以聞其殿前馬步軍司自元豐元年後應凖內降公事案未審合與不合取索看詳詔如因人陳訴許取索看詳新無兵部言欲乞今後應呈試武藝人依條合授品官者從本部關吏部奏擬給告差使已下從本部依蕃官例施行從之新無復廣州信安鎮為縣同知樞密院安燾乞補外郡不許御史中丞劉摯言臣昨於九月八日曽言神宗皇帝顧命大臣不可盡去宜於張璪等三人內罷璪以安天下留安燾李清臣以全國體後來蒙聖慈因璪有請進其官職使之外補今聞燾亦復上章居家辭位臣未審陛下何以處之將以臣前日之言為是而留燾耶將以臣言為非而去燾耶燾與清臣固知其皆常材也方蔡確章惇張璪朋姦結黨害政之時燾等身為丞輔無所救正以順隨人以保祿位誠非大臣之節然比之確輩則其罪有間矣故臣前後力疏確輩三四人姦邪乞必行黜責而未嘗及燾等之去雖燾自同知密院遷知院臣但曾論其超越而不言其可罷者蓋欲且逐大罪而不欲陛下臨政之始盡去舊臣故也今燾若得請而退則清臣勢不敢留繼須請罷陛下雖欲不聽而清臣義不自安矣臣深慮人情不察以謂先帝棄天下方逾年而受遺之臣一旦盡去轉相議論無所不及其於盛德之治不為無損然則二人之去不足道而所繫者朝廷大體也臣叨長風憲今乃建言以留執政若論其迹則似乎非宜若考其理則臣之區區欲以今日之得失後日之是非告於陛下庶幾有補萬一雖以嫌疑得罪固無所憾臣亦非謂燾與清臣宜在廟堂也止欲借二人存之於位以全國家大體以成就陛下不忘舊臣之意而解天下疑異之論如斯而已伏望聖眀再思審慮無聼燾之去臣不勝愚欵貼黃稱臣向因上殿纍次面奉德音云欲留先朝舊人此誠陛下聖謀神慮及於久逺非衆人之所能至也衆人但見無補於國者皆欲去之不思它日利害耳然而舊人中懷私作過之甚者雖曰舊人不可不去如確輩三四人是也其它雖碌碌常才然不能為大害於聖政者當且存之以副前日陛下宣諭欲留舊人之意則今日燾與清臣是也臣蒙國厚恩茍有可言不敢自外以避嫌疑安燾以十月八日乞罷此據蘇軾內制劉摰上章亦以十月八日此據雜録苐三册右司諫王覿言臣竊聞同知樞密院安燾家居請郡臣愚不知聖意之所在將聽其去耶不聽其去耶臣伏見安燾與李清臣才能皆無足以過人者當蔡確韓縝章惇張璪當國用事之際燾清臣惟務順從不能有所建眀方是時不惟確縝惇璪為可去而燾清臣亦可去也然諫官御史交章列疏其言確縝惇璪之惡而罕及燾清臣者蓋知蠧政害物之根本惟在確縝惇璪而燾清臣本非為惡之人雖務順從其情可恕故言雖或及而不力也昨者清臣自尚書右丞除左丞論者謂清臣雖序遷而常才不可以更有進擢臣之説亦如是也燾自同知樞密院除知樞密院論者以謂燾從執政下列而直出門下侍郎之上超躐太甚臣之説亦如是也蓋其時確縝惇璪未盡去小人之黨方熾當得全才重德之人進為輔相以肅清邪黨而燾清臣素乏骨鯁之譽無足賴者然言者猶止於朝廷不宜更升遷而已未嘗欲陛下逐而去之也今確縝惇璪皆已罷黜邪黨既清先帝之舊執政惟燾清臣在焉陛下若遂聽其去則過甚矣蓋燾若去即清臣迹亦不安而復須求去其勢然也臣向論縝璪姦邪纍蒙陛下宣諭欲存留舊人此聖度髙逺過於常情萬萬然縝璪姦邪顯著勢不可留以害政故終為衆論之所不容陛下必欲留舊人燾清臣可留也燾清臣雖常才而留之無害於聖政去之有損於國體此公論也臣竊見言事臣僚惟務以彈劾為事今燾之求去彼雖或知其留之為便而不少肯為陛下言者避嫌疑也臣不敢以嫌疑之故不盡忠於陛下惟聖慈詳酌貼黃稱確縝惇璪若稍持心近厚而無怙終之意則言事官豈肯力詆其惡陛下豈肯皆令罷去哉蓋出於不得已而天下之公論亦以為宜也今安燾請郡未有顯過陛下若從其請則異意之人必謂陛下但欲盡逐舊人雖過惡未著亦聽其去焉故臣之區區竊謂止可令燾清臣且安其職以成陛下存留舊人之美意也惟聖慈察之又言臣為有目疾親書不得此狀係令本家子弟書寫不敢泄漏覿自注亦云十月八日癸巳陜西西路轉運司言乞依涇原路安撫司已得朝旨將在城與廂軍候工役稍隙輟那併工採刈白草以減收買稈草之費詔敕令所立法新無此與劉昌祚相關甲午詔諸路蕃官敘班依元例並在漢官之下內係漢官差遣人樞密院别降指揮從環慶路經略司申眀故也范純粹奏在四月十二日范子諒云云當并考乙未詔鄭滑州保申撥𨽻京西路仍依本路法屬户部勿𨽻府界新無户部言昨察訪永興等路常平免役李承之奏階州福津將利縣界出産土石等鹽可以置場𣙜買定價出賣若比較每年所收息稅錢數各有增剩經久可行其條畫措置令陜西制置解鹽相度申請從之吏部言知州通判昨以三年為一任依條係選處去替一年餘到任十月使闕今來既並以三十個月為任其使闕月限欲乞應知州通判到任半年餘並去替一年使闕從之丙申左屯衛大將軍檢校司空郭逵落致仕守本官知潞州又詔以大禮特賜郭逵銀絹羊酒以逵嘗任同簽書樞密院事故也朝奉郎孫覽為右司員外郎詔應宰臣執政之子孫不能乞分祖父所置居第及墳地若實窮乏有司驗實聽分又詔齊廬宿常虔潁同懷州各置教授一員以進士吳師仁為越州司法參軍充杭州州學教授尹材為虢州司户參軍田述古為襄州司法參軍蘇昞為邠州司户參軍並除教授從近臣薦也吳師仁尹材田述古蘇昞四人有所上書可考五年四月八日孫固卒時事合參照王巖叟嘗再有奏狀薦述古宜充博士又詔樞密都副承旨遇引雜公事并有合奏覆及傳奏公事雖非橫行許升殿侍立樞密院言諸路探報夏國主秉常身死立嗣事不同合行封册要知的實詔令趙卨選募信實之人厚與金帛各令深入西界採探立何人為嗣母氏存亡何人同管國事審問的確以聞其探人如有據當議酬賞十四日范純粹云云可考陜西轉運兼提舉銀銅坑冶鑄錢司言虢州界坑冶户聽得銀貨除抽分外餘數並和買入官費用不足乞依舊抽納二分只和買四分餘盡給冶户貨賣從之丁酉禮部言南丹州莫世忍乞依莫洪皓例差人赴闕進奉已許進奉不令赴闕今世忍再乞赴闕從之先是左司諫王巖叟言臣伏以朝廷之弊莫甚於容僥幸以養蠧尚姑息以惠姦不治其源而立法於下流法愈煩而弊愈多非計之得也今天下皆曰僥幸之甚者莫如三省之胥吏嵗纍優秩月享厚祿日給肉食春冬有衣寒暑有服出入乘官馬使令得營卒郊禮霑賜賚之恩又許引有服親入為吏如士大夫任子無以異而曾不限年得祿尤早其為恩幸可謂厚矣言其供職事則一月之間或僅踰兩旬一日之間常不滿半日其為勤勞可謂薄矣點檢諸司文字差錯乃是職分當然何至字字論功日日計賞或升名次或減磨勘或添料錢或支銀絹以彼易此有如己物又每遇朝廷舉動一事曾行過一紙文書則復妄敘勞能别希恩澤如近日二王出居外第省吏有何辛苦而亦要功以冒賞推此一端餘皆可見臣不知平居祿賜優厚將焉用之其為僥幸可謂甚矣此蓋前來宰執以姑息相承養之至此賣朝廷之恩以買譽結左右之愛以固權何嘗以謹嚴紀綱為事澄清根本為心哉故議者以為廟堂之上為天下百姓理會弊事則少與省中吏人行遣濫恩則多靜而察之非虛語也伏望聖慈特賜敕厲執政大臣裁抑僥幸以除蠧杜絶姑息以戢姦棄近例禁換法復講治平以前條格循用之庶可以肅百司而清四方詔令給事中中書舍人左右司郎官裁定以聞於是試給事申胡宗愈等言臣等按治平以前諸房緣事陳乞件數不多近年酬奬乃有嵗轉官者其他因事陳乞回援等率多如請此治平以前委是過厚今將治平以前及熙寧後來條例看詳參酌到合行裁定事凡十有七條從之據劉安世五年四月劾都司擬時忱等恩例章云給舍左右司取會到治平以前及熙寧後來參酌合行裁損事件十有七條今用之吕大防政目此月七日胡宗愈上減定三省人吏酬賞之法蓋即此十三日事也戊戌環慶路經略使范純粹奏凖照諸路探報自秉常身死梁氏族人侵擅國事遂致諸部酋豪往往不服變亂交攻日相屠害雖不住據逐處奏報終未見的確事情緣自來體察賊中事宜多是歸順人口通説頗得真實慮西界近上酋首因此變亂離析各懷去就或欲據元有州城自守遙託朝廷應援或欲率其部族直謀歸漢願為近塞藩籬若從而開納即慮輾轉生事難係成功若一切拒之又慮反為他國所有為患轉甚未審於當今邊情合如何處置致不失事令河東鄜延環慶涇原秦鳯熙河蘭會路帥臣密切指揮沿邊官吏若有投來西人如審驗得委知賊中次第即仰相度可否收留仍更切厚與賞物募人逺探所有西界首領若謀歸向中國仰詳前項所問各以自今邊情向去利害縷細詳究措置條畫實封入急遞聞奏親自收掌不得下司臣除已依朝命施行外伏詳詔旨所問蓋邊防機事繫中外安危之本者如臣之愚顧何足以語此然臣蚤膺使任久在邊徼採托審料粗若有得伏見陜西諸邊自元豐用兵之後未即解嚴乃者秉常失職諸酋並奮相與吞噬未有寧日方其自顧之不暇尚能為中國患耶在朝廷正宜安靜不妄動用觀成敗之變今詔旨以謂近上酋首或欲據元有州城自守遙託朝廷應援夫邊人蟻聚鳥散盛衰無常先王列於荒服之外棄而不援縻而弗絶御邊之䇿無以過此今彼酋豪於變亂艱危之時欲以內附為名而請朝廷遙為應援茍可而許之臣不知一日急難有請則朝廷將真應而援之乎應援之舉名正而理勝乎邊兵之衆樂從而恱行乎不為之援則無乃害大信乎凡此數者皆不可不慮也聖朝方以安靜治天下息兵止殺重農務本太平之迹始於今日尚何此䇿之議哉又詔旨以謂或欲率其部族直謀歸漢願為藩籬昔漢武帝時降胡數萬仰給縣官天子出御府禁藏以贍之後日之害大不可救是知邊人為欵附之名則中國受勞弊之實也今沿邊諸路自元豐以來所納降羌無慮二萬口而老稚無用者十有七八增耗邊廪為害己太其心之向背蓋未可知故平日間有引而去者則警急之際安知其非謀也然則降羌之無益於中國亦己眀矣况彼之存亡興衰有未可知者異時彼事既定復有君長必曰前日某部某族某人之亡歸中國者我國叛人也奈何受之我今請得之則朝廷將若為答乎將若為處乎豈不理屈而勢沮乎此又不可不慮也或謂彼既附我奈何不受何辭以却之臣以謂不然彼之部酋若有梁氏之禍來告者若請兵於朝者若據地而願附者若挺身以降者朝廷當使邊臣諭之曰若主不幸爾乃臣子當盡死節之義善為若主討賊而已尚何來告耶何但欲脫身而內附耶我之邊兵方備他盜不為爾捕寇也夫如是則中國豈不甚尊而名體豈不甚正乎如此則彼於異時必曰我變亂患禍之中朝廷不棄我之不幸而存我有德接我有道我尚得志而負之乎夫如是則朝廷之義豈不甚勝而彼之德我豈不甚重歟又詔旨以謂若一切拒之慮為他國所有臣觀邊人之性以種族為貴賤故部酋之死其後世之繼襲者雖雛稚之子亦足以服老長之衆何哉風俗使之然也秉常父子有國綿久國人歸心焉今諸路諜者之言雖曰秉常之死不眀梁氏之族侵擅國事此特目今之勢然耳若得遂能滅李氏之宗而有其國則臣未之信也蓋一國之衆豈無豪傑推李氏族子以主其國者乎豈遂甘心為梁氏臣屬乎臣以謂使李氏遂有絶滅之禍尚當爭奪反覆屠戮相仍曠日持久然後定也夫困獸猶鬪者冀其或生也彼有力者方互為爭奪各將以衆自守乘隙而奮觀興而動大必并小強必吞弱縱未能統一諸部豈不能據一隅以自全寧願束手為他國臣乎固知他國未能遽有者斷可識也借有亡命避患而他附者不過逋逃之餘種耳顧何足道哉夫邊人內相吞并者中國之利也若天祐聖世遂死此羌卒至離析凡力等而勢均者各據土地自為一部則於是時庶幾有思附大國者矣雖然大河之南橫山之地必附於中國大河之北賀蘭之封必附於契丹酒泉武威之地必牽於西域蓋勢力逺邇之異也昔呼韓裂為五單于胸奴分為南北庭自是漢之邉堠遂無匹馬之蹤我之所利正願如此故臣所謂在朝廷今日惟宜安靜不妄動用觀成敗之變者蓋此也中國者禮義之所由出也臣願朝廷靜占往鑒處以禮義參稽古昔無蹈後患深敕諸邉將吏使積粟養士勵兵戒嚴從容無為坐觀其變應夏國酋領及部族生口有欲歸漢者並依前降詔旨一切約回決無收受以全中國尊大之體以破邉人反覆之謀如此則詔旨所謂目今邉情向去利害臣愚妄意竊以為盡之矣若夫一得一失小利小權私己喜功為國生事者非臣所知也伏惟聖慈深賜省察
