body:
  text: 續資治通鑑長編卷一百二十四宋李燾撰仁宗寶元二年秋七月庚寅朔彰化留後同知大宗正事守節卒贈鎮江節度使追封丹陽郡王諡僖穆守節性孝謹母譙國夫人杜氏卒嘗刺臂血寫佛經舅從保卒鞠其二孤為畢婚嫁治家嚴肅頗通時務號賢宗室云丁酉廢沔陽縣入玉沙縣癸卯鄜延環慶副都部署劉平兼管勾涇原兵馬事詔臣僚無得於府州市馬罷溝洫河道司令逐處州縣分領之甲寅右司諫直集賢院韓琦為起居舍人知諫院樞密院言河東安撫使假少連乞罷陜西河東鈐轄等巡邊名目或欲令兵馬司臣僚視兵甲城寨經度鄰界事由等即令簡徑出入不須張皇從之丁巳知大宗正事允讓言先朝故事宗室子孫七嵗始賜名授官今在襁褓者已有恩澤請自今遇乾元節南郊聽官其子餘須俟五嵗方得授官從之戊午徙鄭州陳堯佐判永興軍知永興軍夏竦知涇州兼涇原秦鳯路緣邊經略安撫使涇原路都部署知延州范雍兼鄜延環慶路緣邊經略安撫使鄜延路都部署知諫院韓琦請自今雙日止御後殿視事上問輔臣以故事張士遜對曰唐五日一開延英蓋資間燕以輔養聖神上曰與夫宵衣旰食固不侔也前代帝王靡不初勤政事而後失於逸豫不可不戒也時上感小疾太醫數進藥故琦有是請上訖不從上訖不從據寶訓八月癸亥翰林侍讀學士給事中梅詢知許州詢以足疾請外補也故事侍讀學士無出外者天禧中張知白罷參知政事領此職出知大名府非歷二府而出者自詢始詢性卞急好進取而侈於奉養至老不衰然數為朝廷言兵初貶濠州夢人告曰吕丞相至矣既而吕夷簡通判州事故詢待遇特厚其後援詢於廢斥中以至貴顯夷簡之力也甲子新判永興軍陳堯佐復判鄭州時御史言方西邊用兵宜得重望大臣以鎮關中堯佐因自陳與范雍為親家而力辭之徙知并州龍圖閣學士工部侍郎杜衍知永興軍加刑部侍郎右諫議大夫集賢院學士任中師為龍圖閣直學士知并州賜御劍自隨許便宜從事丙寅詔轉運使副提點刑獄至所部百日知州通判一月而部吏犯贓者始坐失按舉之罪先是監司守倅親事未浹旬而部吏犯贓者並連坐故更著此條戊辰秦鳯部署司言篳篥城蕃部嘉勒斯博格等內附請補本族軍主從之知慶州禮賔使張崇俊言知豐州王餘慶之祖承美本藏擦勒族首領自其歸朝於府州西北二百里建豐州以承美為防禦使知蕃漢公事藏擦勒三十八族在黑山前後每嵗自豐州齎錦袍腰帶綵茶等往彼招誘間將羊馬入貢京師其部族或有過則移報豐州以蕃法處之天聖初承美死其後子孫雖相襲知豐州然官不出侍禁殿直又多年少不習邊事而威望不振以致藏擦勒各置首領而不常至豐州且藏擦勒族十餘萬衆人馬勇健與昊賊世為仇臣請選王氏族中有才幹機略者優與除官令知豐州密遣人齎金帛并募斬昊賊敇散與諸族其勢必能共力討賊又聞嘉勒斯賚已發人馬入西界若更使藏才交攻之是賊有腹背之患也從之慶厯元年七月知豐州王餘慶竟為元昊所殺則是張崇俊之言訖不從也實録云從之恐誤當削此兩字己巳降武寧節度使王德用為右千牛衛上將軍知隨州仍特置判官一貟初德用既以孔道輔言罷知樞密院而河東都轉運使王沿又言德用嘗令府州折繼宣市馬至是德用以馬與劵來上乃市於商人然猶用言者而再貶之家人皆惶恐而德用舉止言色如平時但不接賔客而己庚午上謂宰臣張士遜曰帝王之明在擇人辨邪正則天下無不治矣士遜對曰知人則哲惟帝其難之若選用得材又邪正分别堯舜不易此道也先是盜殺其黨不自言而獲者舊止坐杖六十時知廬州王質輒論殺之大理寺援舊比駁以為非是質曰盜殺其徒自首者原之所以疑壞其黨且許之自新此法意也今殺人取資而捕獲貸之豈法意乎數上疏不報判大理寺杜曾言羣盜自相屠害初因并取其財或以強凌弱而罪止杖六十故為盜者肆行剽劫第殺其黨一人則雖就執皆可以自免惠養姦惡恐非法意請付有司議朝廷以方劾廬州官吏曾不當因事請改法降曾知密州質尋亦罷廬州監靈仙觀質監靈仙在十二月辛未然論者以曾質所言為得曾雷澤人堯臣子也為吏號知法嘗言國朝因唐大中制故殺人雖已傷未死已死更生皆論如已殺夫殺人者死傷人者刑先王不易之典律惟謀殺已傷則絞蓋甚其處心積慮隂致賊害爾至於故殺初無殺意須其已死乃有殺名苟無傷名而用殺法則與謀殺孰辨自大中之制行不知殺幾何人矣請格勿用又言近世赦令殺人已傷未死者皆得原減非律意請傷者從律保辜法死限內者論如已殺勿赦皆著為令知原州六宅使郭志髙請部內募置弓箭手五千人從之辛未府州都孔目官勾當府谷縣折諫為三班借職州境皆黨項部落故事但以孔目官主縣事教練使為獄官時知州折繼宣所為多不法諫又倚以為姦轉運使奏其事朝廷不欲推罪而補之以官甲戌美人苖氏生皇子丙子德音降三京囚罪一等徒以下釋之賜諸軍緡錢詔文武臣僚奏薦子孫授京官及補三班使臣者年雖及格而未授差遣者毋得給俸又詔鄜延路騎兵闕馬聽如廣鋭軍例市之免河東陜西流民所過度錢丁丑給皇子俸錢月二十萬春服綾絹各十匹紫羅一匹冬服綾十匹綿五十兩兩川自夏至秋不雨民大飢庚辰命起居舍人知制誥韓琦為益利路體量安撫使西染院副使兼閣門通事舍人王從益副之户部副使吏部員外郎蔣堂為梓夔路體量安撫使左藏庫副使兼閣門通事舍人夏元正副之初帝用禮官議祀髙禖於郊又以宋火德制赤帝像於宫中以祈皇子已而苖夫人有娠見日在帳中赤蛇出於殿墀又神光照庭及皇子生資質端碩帝聞若神人告曰最興來因以為小字辛巳命參知政事王鬷以太牢報祀髙禖乙酉刑部員外郎天章閣待制龎籍為契丹生辰使內殿崇班閣門祗候杜贊副之右正言直集賢院判都磨勘司王拱辰為正旦使西京左藏庫副使彭再問副之丙戍詔後苑龍圖天章閣延福宫等處嵗所收課利元係三司者並還屬之仍出所貯金帛緡錢各一萬付左藏庫九月甲午以美人苖氏為昭容俞氏為媫妤知府州左藏庫使恩州刺史折繼宣苛虐掊刻種落嗟怨流移乙未責授繼宣右監門衛將軍楚州都監擢其弟繼閔為西京作坊使知府州仍以敇榜慰諭軍吏百姓各令安集已而復有訟繼宣不法事者再降為太子右清道率府副率御史中丞孔道輔性鯁挺特立遇事彈劾無所阿避出入風采肅然及再執憲權貴益憚之初道輔迎其父里中僦郭贄舊宅居之有言於帝曰道輔家近太廟出入傳呼非所以尊神即詔道輔他徙殿中丞集賢校理張宗古上言漢內史府在太廟陾中國朝以來廟垣下皆有官私第舍請勿令道輔避帝曰若此豈重宗廟乎丙申詔宗古免劾出通判萊州道輔歎曰憸人之言入矣未幾果出宗古宗彝弟也己亥皇長女封福康公主次女封崇慶公主福康母曰苖昭容崇慶母曰俞媫妤初議封爵下崇文院檢討典故而王宗道王洙等言唐制封公主有以郡名有以美名者文皇女幼在宫中已有晉陽之號若明皇女封永穆常芬唐昌太華皆以美名乃詔用明皇故事詔益梓利夔路募人入粟補三班借職及齋郎者與免本戶色役其攝助教長史司馬犯私罪杖情輕者仍聽贖壬寅詔河北轉運使自今並兼都大制置營田屯田事甲辰斬偽環州刺史劉竒徹於都市竒徹名重信為元昊招誘延州屬羌而金明都監李士彬執送京師遂斬之乙巳上諭輔臣曰今言事者或譖毁大臣揚君過以釣虛名不能補益時政恐寖成俗朕甚惡之張士遜對曰陛下洞察邪正則憸訐之人宜自誡懼也詔兩川飢饉百姓艱食其盜賊劫廪榖非傷殺人者並刺配五百里外牢城為首及纍犯盜者配出川界俟嵗豐如舊庚戌上諭輔臣曰京城北有古井民間相傳汲水可以愈疾投紙可以驗神朕惡其惑衆已令塞之張士遜對曰妖妄之事誠不可滋長也甲寅祕書監分司南京管勾兖州仙源縣文宣王廟事孔朂為工部侍郎致仕仍以其從孫國子監主簿襲封文宣公知仙源縣宗願兼管勾廟事丁巳降知隴州供僃庫使王守琪為路州都監坐擅配卒修城也王守琪知隴州不知在何時據富弼疏云河北巡檢王守琪捉殺得濁流寨潰散兵士三十人自禮賔副使轉供僃庫使差知隴州又按葛懷敏傳云懷敏知雄州濁流寨兵叛殺官吏潰去懷敏發兵掩襲盡誅其黨而懷敏以寶元二年五月自雄州徙滄州然則王守琪差知隴州當在寶元元年或二年春也是月太子中允直集賢院富弼上疏曰竊聞去嵗十二月趙元昊反陛下召輔相於宴會不容頃之間輔相馳車馬於康衢殊乖坐鎮之重變起倉卒事無凖繩衆皆謂之忽然臣則知其有素昔者元昊常勸德明勿事中朝且謂所得俸賜只以自歸部落實繁窮困頗甚茍至失衆何以守邦不若習練干戈杜絶朝貢小則恣行討掠大則侵奪封疆上下俱豐於我何恤時德明以力未甚盛不用其謀豈有身自繼立而不行其説耶此元昊反狀有素者一也自與通好略無猜情門市不譏商販如織縱其來往蓋示懷柔然而迹稔則容姦事久則生變故我道路之出入山川之險夷邦政之否藏國用之虛實莫不周知而熟察又比來放出宫女任其所如元昊重幣市之納諸左右不惟朝廷之事為其僃詳至於宫禁之私亦所窺測濟以凶狡之性貪欲之謀豈顧守宗盟坐受羈制此元昊反狀有素者二也西鄙地多帶山馬能走險湖海彌逺水泉不生王旅欲征軍需不給窮討則遁匿退保則襲追以逗撓為困人之謀以遲久為匱財之計元昊恃此艱險得以猖狂復知先朝加兵於我而終棄靈夏况我強盛百倍往時今若稱兵必能得志此元昊反狀有素者三也朝廷纍次遣使元昊多不致恭或故作滯留而不迎或佯為匆遽而見迫或欲負扆而對或欲專席而居雖相見之初暫御臣下之服而送出之後便具帝者之儀蓋久已稱尊成其驕態忽下編於臣列深耻見於國人日講異圖自求足志此元昊反狀有素者四也頃年靈州屯戍軍校鄭美奔戎德明用之持兵朝廷終失靈武元昊早蓄姦險務收豪傑故我舉子不第貧賤無歸如此數人自投於彼元昊或授以將帥或任之公卿推誠不疑倚為謀主彼數子者既不得志於我遂奔異域觀其決策背叛發憤包藏肯教元昊為順乎其效鄭美必矣此元昊反狀有素者五也西北相結亂華為虞自古聞之於今見矣頃者元昊援契丹為親私自相通共謀冦難緩則指為聲勢急則假其師徒至有掎角為竒首尾相應彼若多作牽制我則困於分張蓋先已結大國之強方敢立中原之敵此元昊反狀有素者六也是六者嵗月已久中外共聞而天子不得知朝廷不為僃養成深患遂至大騷此乃兩府大臣之罪也臣今略舉八條止為戎事未論其他伏惟聖明詳擇一事伏聞元昊遣使全擬契丹部伍甚雄辭禮俱亢觀其勇悍難制強辨自髙若非使者請行即是元昊選任取其籌畫推為腹心必謂不敢加誅得以恣行倔強以能揣敵情為有智以不辱君命為得賢我若察其所叛之謀知其所來之意是存之則元昊遂其志誅之則元昊喪其魄所宜始至之日盡斬都市事出不意乖其本謀即時宣聞遂行削奪或命將致討或發兵僃邊上則可以示大邦不測之威下則可以杜小人好亂之漸豈不韙哉豈不快哉戎人必憚而失圖戰士必為之增氣而反逺從境上召至都下恣其貨易待以雍容重幣遣還優辭慰恤者豈非冀其回心易慮而服義向化乎夫朝廷結以恩信凡四十載尚無懷感之意終致反常之禍豈兹姑息遂可悛移且以放還謂之懷柔耶則元昊悖逆之性豈懷柔之肯馴謂之矜恕耶則元昊僭竊之罪何矜恕之可忍謂之他計率無可觀只是執事者選懦自居優遊不斷殺之恐其急擊囚之恐其有辭遂至放還假示寬貸向若未能加戮只宜境上斥回使其不測深淺猶可謂之下策召而復遣理有可從乃是大國之謀悉為小戎所料遂其所以能揣敵情之智成其所以不辱君命之賢况當事調發正當輦運相屬道路雜沓民口沸騰使之往來盡得聞見謀事如此取侮之道也二事伏自元昊稱亂西鄙震驚或帥臣乞師或朝議遣戍緣邊要害宿兵猥繁雖舊不侔然亦不過二三十萬京師屯衛則差減天下禁旅則尚多起為應兵未當乏使切見自去年十二月至今年四月未及半年之內相繼三度揀軍皆遣使臣傳布宣命每至郡邑無不張皇仍帶殿侍數員畨次押人赴闕村民恐懼謂點鄉軍致有奔竄山林鑽鑿支體不顧傷毁苟避刺黥久乃知其非然其如終是已惑三揀兵士厥數臣則不知然觀此施為所獲必鮮若其事頻驚衆則莫甚於兹臣又伏思內則省廷外則轉運司以至州縣勤勞供職嚴峻用刑所急之須惟財賦是務盡農畝之稅山澤之利舟車屋宇蟲魚草木凡百所有無一不征共知困窮都為賦斂自來天下財貨所入十中八九贍軍軍可謂多矣財可謂耗矣今始用武遽稱乏人即不知向時所贍之軍何在所耗之財何益殊未戰鬬已大驚擾萬一或致敗衄頻有殺傷須行補添别設應援至時又不知調發者何所揀選者幾畨比之今來必大興作凡係兵籍既己不充所謂鄉軍豈免強配此時百姓所懼將來必見不虛若果行之所患非細三事伏見今年四月降中書劄子稱臣僚上封財賦所出各有攸司由外以充內自下而奉上者也又曰仍取羡登用僃供入乞戒諭諸路轉運司如用度闕須管自擘畫支贍若的是圓融不出即許於鄰道錢榖有剩處支那不得更似日前乞自京般請錢銀之類遍行下者劄子未見當考伏以國初疆境甚隘財賦至微而征伐不停用度亦足洎太祖太宗盡取川蜀河東江南兩浙荆南湖南廣南閩粵之地何啻萬里不許逐方私積寶貨當時盡歸京師且以後來賦稅無不經度逐州只留實約軍費其餘每嵗盡數上供民力所輸秋毫無隱不間逺邇不問炎涼輦運縱橫水陸奔湊官用督責時無暫休凡天下如此者已七十年矣豈非由外以充內自下而奉上者乎而又干戈不作華夏底寧惟是常須絶無他費臣謂都下財貨固當在處如阜有入無出莫知紀極今諸路運司以逐州實約之費無多羡餘其間年嵗有凶歉則必蠲除朝廷有要索則必應副多方搜括裁可張羅若又分外督之不知出於何所朝廷既行誡諭運司不敢冒違無計以供惟民是問民若可出豈復行仁民又不禁必生怨怒虧損和氣馴致深憂况是元昊擾邊陜西被苦士馬日濟芻粟頓加繕治甲兵修築城壘百役興作萬倍艱難復阻旱災無收農賦中糴之入既不厚鬻爵所入又不豐數十萬兵何所仰給坐觀困敝不行救恤而執事者尚曰財賦者由外以充內自下而奉上爾之不足不繫於我爾自營求是何乖方之深也竊聞太宗皇帝初實內帑嘗謂侍臣曰河東敵境甚邇吾必取之至時不免擾民今內帑所積以僃調發蓋重擾民也其後皆如詔卒不撓下今元昊背叛關中用兵要在安民圖共禦冦而反靳中府無用之物擾西方已困之民惜財費人非太宗皇帝之用心也四事竊見去嵗降詔令內外兩省官及諸司使副在邊者并軍職刺史等近百人各同罪保舉殿直京官已上委無贓私即充邊任者臣聞有德者然後知人之德有才者然後識人之才無德者見有德必憎非才者見有才必忌惟憎與忌者固非存公萬一才德雖疏憎忌不作其如所見相戾所為相乖使之擇人何由得士臣又聞官大者德未必大位髙者才不必髙若限以官選求必恐其才德遺逸小而下者安可厚誣京朝官殿直之流固有可採借奉職選人之輩豈盡無能假有兩省識一選人果有竒才又有諸司使副識一借職果有異術皆可薦舉填於邊陲而限以詔條須且棄置宛轉尋訪别得所聞久諳與旋擇固殊目覩與耳聞又邈限官而選得士為難臣伏望兩省官諸司使副或軍職刺史在邊者不可一例受詔宜令兩府精擇有才識公望卓然為人所稱者方令舉官仍宜不限品秩自借奉職選人以上皆得充舉所保之事須保堪任邊上重難任使如上之所陳或本人邊事不集並當同罪則人人自畏豈敢容易而舉哉十得十百得百不虛受不濫賞斷可知矣五事竊聞鄜延路嘗與蕃兵接戰有一寨主為蕃兵所得及虜去軍民甚衆西路供奉官閣門祗候馬遵引兵追戰即時奪回延帥范雍及副部署劉平奏乞酬奬朝命只遷東頭供奉官而已夫馬遵者出死力突堅圍引既衄之兵入不存之地奪已擒之將士拔己陷之師徒雖非大功亦可謂之竒節矣伏見范雍劉平者國家方大倚注保奏理合超遷只進一官殊乖輿論當兹始初用武尤在賞勸激人苟未得宜必難勵衆臣竊聞河北一都巡檢王守琪捉殺得濁流寨潰散兵士二三十人自禮賔副使轉供僃庫使差知隴州又見京東都巡檢李知和捉得劫賊七人自內殿崇班轉供僃庫副使此二賊徒者只是草竊之輩固非勍敵之人殺之不足震天威縱之不能成大患而王守琪則驟遷十餘級李知和亦超轉兩資官至於馬遵者出境討賊不顧存亡援溺救焚皆得全活上可以壯朝廷之武下可以抑僣國之強比王李之功效則度越有餘比王李之遷酬則數倍不足邊臣見之失色元昊聞之長姦用人若斯致冦之道也六事近於七月中伏聞中書樞密院同進購募元昊科格遂告示天下者夫購者起於亂秦用於末世三代已往不聞有此豈我太平之世天下一統偶有小醜輒滋背畔稽之典策自存討禦而執事者不為良畫遽勸陛下行亂秦末世之事乎既非至公之謀又非常行之法然有不得已者亦或為之何則苦於用兵為助兵之術則購之漢髙祖購項是也兵力驟敗敵勢轉盛內懷憂懼計無所出則購之王莽購劉縯是也用兵不一困於支離敵又相乘力未能應則購之梁太祖購劉知俊是也一夫跳走不知所從雖有甲兵之強無以加討則購之楚平王購伍員之類是也四購雖設無一獲者是購為無益不可全任明矣七事伏聞秋初夏守贇為樞密使夫樞密之任秉國大權起於有唐始用宦者降及後世更以武臣國家恩禮益隆委任尤重本天下之兵柄代天子之武威勢均中書號稱兩府苟為輕授不若闕官夏守贇早事先朝嘗參儲吏既緣攀附漸致榮顯但事貴驕罔思畏謹每更劇任頗乏清名才術無聞公忠弗有一旦擢居衆賢之上俾贊萬務之機朝命則行人心不允伏見元昊作梗西陲用兵上資睿聖之謀下取樞臣之畫庶臻泰定以安黔黎所宜遴擇才能削平禍亂而罔詢厥德遽用斯人不問賢愚皆所輕笑亟宜罷免以重觀瞻臣又慮議者以其嘗為攀附而謂之親信可使以其久歷寄任而謂之耆舊可尊以其官是節制而謂能知兵以其貌甚魁梧而謂能鎮俗是皆不然惟盡公者可以親信不主乎攀附之遇惟宿德者可謂耆舊不主乎寄任之多有才武而好學則能知兵不在乎官有器業而不佻則能鎮俗不在乎貌伏惟陛下察守贇之所立驗守贇之所為可謂盡公宿德者乎可謂有才武而好學有器業而不佻者乎八事伏聞西鄙用兵已來不住差移武臣往彼每有過闕下而求見者多不許見臣竊詳所謂未見其宜謂之天子至尊不可令小臣凂瀆則非所以詢芻蕘而廣接納也謂之循守舊例未嘗許小臣求見則方今用兵要在開通壅塞與舊不侔非可以循舊例阻絶人臣之時也謂之武臣多鄙不可令容易面對則既已委任用為好人非所宜鄙之也謂之朝廷差除自有命令本職所管自有局分不必令對則用兵之際事與舊殊本職或有更張局分亦有規制何由聞逹非所以博究利病而剪除凶孽之意也以此四事求之臣故曰竊詳所謂未見其宜今邊冦方興陜西大擾朝廷多發兵伍選任武臣雖則直禦冦戎蓋亦旁僃他盜凡有武臣求對必於邊事有聞陛下聽朝之餘何惜一見召於咫尺待以雍容霽其威顔加之善誘使無懼懾盡意敷陳然後觀其奏對之是非察其趨嚮之邪正可者則奬激而遣之不可亦優容而罷之如此則謂官家知我姓名身心有所分付不患邊奏不省不憂權臣害能各盡所懷無不感悅勇鋭而去罄竭為期刻志夷凶立功報主局分豈有不集邊事豈有不寧聖人所以感人心而天下和平者蓋用此矣又何憂乎叛冦何恤乎用兵陛下勤勞之心豈不至哉接納之禮豈不優哉聞見之事豈不博哉議者又謂臣曰此非主上怠於勤勞而疏於接納蓋執政者自知致冦常慮獲辜不欲許人非次上殿或論奏四方之事或指陳兩府之非開悟聖人聰明則非已之利也故但奏云某人己有差使某人已與遷陟所求入見不宜允從只是徼望恩榮别希錫賜以此罔上上以為然意要阻絶天下是非蔽塞天子耳目自以為安身之計也臣謂果有是事則非臣所知惟在陛下察其忠邪而進退之則蒼生之福也宗社無疆之慶也冬十月辛酉以環州生户羅莽為右班殿直子日威為本族軍主羅莽嘗受元昊防禦使率其族來歸特録之癸亥禮部侍郎致仕燕肅言每遇朝廷大慶會欲於在所通表章從之甲子罷諸司三品官卒輟視朝初光祿卿鄭立卒禮官舉故事請輟朝而議者以謂今諸司三品非要官恩禮不稱輟朝故罷之宋敏求春明録云國初以來惟正三品方得諡兼官贈三品不得之真宗命陳彭年詳定遂詔文武官至尚書節度使卒許輟朝贈官至三品許請諡而史失其傳宗正寺修玉牒官李淑上所修皇帝玉牒二卷皇子籍一卷丙寅上御邇英閣觀講左氏春秋及讀正説終上曰春秋所述前世治亂之事敢不監戒正説先帝訓言敢不遵奉丁度等拜伏而言曰陛下德音若此誠天下之福也上復問度洪範酒誥二篇大義度悉以對因詔度講周易李淑讀三朝寶訓丁度李仲容讀所編經史規鑒事迹己已壽州長史林獻可言國家休咎之事上謂輔臣曰朝廷得失在任人得人則政治失人則政隳若堯舜之世雖有災異不為害桀紂之世雖有祥瑞不為福今之言者多挾此以求進用不可不察庚午賜麟府州及川峽軍士緡錢癸酉降益州路轉運使明鎬知同州坐知陵州楚應機受賕鎬失按舉也應機將敗或告鎬以先期奏之鎬曰獲罪則已安可欺朝廷耶丁丑罷陜西諸路州所增壯丁辛已曲燕近臣於崇政殿以講左氏春秋故也甲申詔兩川飢民流徙出劍門關者勿禁
