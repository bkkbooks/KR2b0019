body:
  text: 續資治通鑑長編卷一百四十一宋李燾撰仁宗慶歷三年五月丁卯朔日有食之河陽三城節度使同平章事楊崇勳為左衛上將軍致仕初崇勳判成德軍而部民行賂於其親吏任昭敏李咸新使告其子內殿承制宗誨求免所犯罪事覺宗誨等皆編管諸州崇勳并坐責崇勳初猶為宗誨營奏既逮捕宗誨崇勳又篡取之監察御史趙祐言闕庭至近崇勳恣橫如此臣聞制使李宗易有奏報繼遣种世材就問崇勳但卧閣延制使入云不合鹵莽臣請選使臣以禁兵送崇勳就對或以其嘗官樞府務存大體亦望與一散秩許令致仕上深然之祐滏陽人也此據朝補之所作墓志六月壬寅祐出知州避賈昌朝執政之嫌也仍不廢言事當考己巳司徒呂夷簡請罷監修國史不許又請罷所給俸料詔給宰臣俸料之半罷屯田員外郎凌景陽昭信節度掌書記魏廷堅鄭州觀察推官夏有章召試學士院初晏殊夏竦呂夷簡各薦景陽庭堅有章既得旨召試而諫官王素歐陽修言景陽結婚非類有章嘗坐贓而庭堅亦有踰濫之罪故皆罷之歐陽修從諫集景陽已就試改一官知和州餘並罷今從實録庚午御崇政殿録繫囚命侍御史沈邈等分詣京畿及三京其諸路即委轉運使提㸃刑獄官親行疏决雜犯死罪以下遞降一等杖以下釋之江淮嵗漕不給京師之軍儲大臣以為憂樞密副使范仲淹言國子博士許元可獨倚辦辛未擢元江淮兩浙荆湖制置發運判官元曰以六路七十二州之粟不能足京師者吾不信也至則命瀕江州縣留三月糧餘發之逺近以次相補引千餘艘轉漕而西未幾京師足食元宣城人也仲淹二奏或可刪附壬申罷户部判官工部郎中王球知懷州諫官余靖言球被疾不任事也癸酉命御史中丞王拱辰知制誥田况與三司同議減放州縣科配詔宗室女從夫任外官者毋得私至京師右侍禁王世卞娶宗室女晉安郡君為鄭州兵馬監押既從至官而輒私自歸為有司所劾故條約之乙亥欣州言地大震上曰地道貴靜今數震搖得非兵興民勞之象乎宜詔本路轉運經略司安恤百姓毌得輒弛邊備鹽鐵副使司勳郎中林濰為少府監知滑州初入內都知張永和建議請收民房錢十之三以助軍費事下三司三司使王堯臣持不可永和密使人致意曰公能行此則大用矣明日入見其為上言因曰此衰世之事唐德宗所以致朱泚之亂者非平時可行也濰畏永和勢助之甚力堯臣奏罷濰以河北轉運使工部郎中直史館張昷之為鹽鐵副使議乃定丁丑詔河東義勇兵願𨽻諸州就糧神虎宣毅禁軍者聽之又詔諸路配役人在疏决以前者並釋之戊寅敕三司官吏曰經國以財為本而三司紀綱不振久矣今邊隅未靖用度甚廣軍資所急民力重困其務協心營職無或因循以踵抏弊本志誤以此詔繫之二年四月議減浮費下今從實録先是諫官歐陽修既受命首建議天下官吏員數極多朝廷無由遍知其賢愚善惡審官三班二部等處只是具差除月日人之能否都不可知諸路轉運使等除有贓吏自敗者臨時舉行外亦别無按察官吏之術致使年老病患者或懦弱不才者或貪殘害物者此等之人布在州縣並無黜陟因循積弊官濫者多使天下州縣不治者十有八九今兵戎未息賦役方煩百姓嗷嗷瘡痍未復救其疾苦擇吏為先臣今欲乞特立按察之法於內外朝官中自三丞以上至郎官中選强幹亷明者為諸路按察使請令進奏官各録一州官吏姓名為空行簿以受之使至州縣遍見官吏其公廉勤幹明著實狀及老病不才顯有不治之迹皆以朱書於名之下其中材之人别無竒效亦不至曠敗者以墨書之又有雖是常材能專長於事亦以朱書别之使還具奏則朝廷可以坐見官吏賢愚善惡不遺一人然後别議黜陟之法如此足以澄清天下半載之間可望致治只勞朝廷精選二十許人充使别無難行之事然朝廷重於特遣使未即行也參知政事賈昌朝前為御史中丞嘗言轉運使朝廷責以按察官吏能否而使名未正於是參取修議詔諸路轉運使副並兼按察使副令將轄下州府軍監縣鎮官吏姓名置簿親掌録其功過若績效明著及顯有不治者逐旋以聞外其稍著廉勤及僅免敗闕者即每至年終攢寫附遞以聞並須盡公托實如能稱職别加進用儻務因循亦嚴行黜降提㸃刑獄雖不帶此使名並當凖此兼按察使㑹要係在三月二十七日歐陽修復上言轉運使自合按察本部官吏今若特置使名更加約束則於常行之制頗為得宜必欲救弊於時則未盡善且臣初乞差按察使者蓋欲朝廷精選强明之貟竊聞朝廷以所選非人故不遣使今所委轉運使豈盡得人乎其間昏老病患者有之貪贓失職者有之此等之人自當被劾豈可劾人其間縱有材能之吏又以幹運財賦有米鹽之繁供給軍須有星火之急既不暇遍走州縣專心察視則稽遲鹵莽不得無之故臣謂轉運使兼按察使不才者既不能舉職又不暇盡心徒見空文恐無實效在於事體不若專遣使人伏念兵興纍年天下困敝飢荒疲瘵既無力以振救調斂科率又無由而減省徒有愛民之意絶無施惠之方若但能逐去冗官不令貪㬥選用良吏各使撫綏惟此一事及民最切茍可為人之利何憚選使之勞况自近年纍遣安撫豈於今日頓以為難今必恐三丞至郎中內難得其人即乞且依前後安撫於侍從臣寮臺官館職中選差十數人小處路分兼察兩路其侍從臣寮仍各令自辟判官分行採訪用臣前來起請事件施行其轉運兼按察使若能精選其人亦乞著為今後常行之制臣伏思從來臣寮非不言事朝廷非不施行患在但著空文不責實效故改更雖數號令雖煩上下因循了無所益今必欲日新求治革弊救時則須在力行方能濟務臣所言者生民之急務也天下之利也不但略言一二分以塞言責而已伏望留意詳擇不報虞部員外郎杜把權發遣度支判官事太常博士燕度權發遣户部判官事仍理本資序毌得差出俟三年有勞令三司保明當議升陟之權發遣三司判官始此杞鎬之子度肅之子皆王堯臣所薦也權發遣三司判官蓋始此治平元年十二月又命張徽皮公弼等然非事始也㑹要因英録但記徽公弼而略把度今特著之度附𫝊在神録熙寧三年八月亦言權發遣三司判官自度始庚辰幸相國寺㑹靈觀祈雨辛巳上謂輔臣曰自春夏不雨嵗時失望蓋朕不德所致但日於禁中蔬食精禱引咎而已章德象曰陛下奉天愛民至誠如此臣等備位衡弼不能布宣善政以召和氣而過貽陛下之憂上曰朝廷細故朕與卿等未嘗不留意惟民間疾苦尤須省察有以利天下者在必行之卿等其務公心咨訪以答天意范仲淹言臣親聞德音謂屢有災異當修德以及民并詔臣等謹省刑法此實見聖人憂畏之心合於天意臣今條奏數事皆陛下增修明德之要一齊戒發誠特降詔命明言災眚屢見敢不罪已祇畏以告中外羣臣同心修省二遣使四方疏决刑獄非害人者悉從減降三詔天下州縣長吏訪問民間孤獨不能存活者特行賑恤四詔逐處籍出陳亡之家察其寡弱别加存養五邊陲之民被敵人驅虜者量支官物贖還本家六詔諸處缺負已該赦恩除放者官司更不得催理違者官吏科違制之罪遇赦不原仍差近臣置司與奪陛下力行此數事下悅民心上答天戒昔商中宗桑榖共生於朝懼而修德撫綏百姓三年而歸者十六國號為中興陛下今日因災修德則福及兆人道光千載天下幸甚仲淹言附辛巳後須更考詳壬午詔內殿崇班以上非有邊功及捕劇賊而嘗歷知州軍同提㸃刑獄者不許換諸衛將軍將軍品第三每郊祀得任子孫而願換秩者皆老疾無狀之人故釐革之癸未御史臺請選御史六員而罷權推直官從之乙酉出侍御史席平知潤州中丞王拱辰言其議論無取故出之平東平人也慶歷二年二月平以都官員外郎為侍御史本傳稱平奏對鄙俚又御史臺記亦有𫝊平嘗往齊州劾獄失入死罪張方平乞依法行遣恐此罷黜不獨因拱辰言也丁亥置武學于武成王廟以太常丞阮逸為武學教授張唐英政要以為議出吳育且云育為參知政事按此時育但為翰林學士五年正月使副樞密四月改參政誤也育𫝊又不見武學議當考八月戊午罷武學戊于雨輔臣稱賀上曰天久不雨將害民田朕每焚香上禱于天昨夕寢殿中忽聞微雷遽起冠𢃄露立殿下須臾雨至衣皆沾濕移刻雨霽再拜以謝方敢升階自此尚冀槁苗可救也章得象曰非陛下至誠曷以致天應若此上曰比欲下詔罪已撤樂減膳又恐近於崇飾虛名不若夙夜精心密禱為佳爾仁宗皇帝慶歷年京師夏旱諫官王公素乞親行禱雨帝曰太史言月二日當雨一日欲出禱公曰臣非太史知是日不雨帝問故公曰陛下幸其當雨以禱不誠也不誠不可動天臣故知不雨帝曰明日禱雨醴泉觀公曰醴泉之近猶外朝也豈憚暑不可逺出耶帝每意動則耳赤耳已盡赤厲聲曰當禱西太一宮公曰乞傳㫖帝曰車駕出郊不預告卿不知典故公曰國初以虞非常今久太平預告使百姓瞻望清光者衆爾無虞也諫官故不扈從明日特召王公以從日色甚熾埃霧漲天帝玉色不怡至瓊林苑回望西太一宫上有雲氣如香煙已起少時雷電雨甚至帝却逍遙輦御平輦撤蓋還宫又明日召公對帝喜曰朕賴卿得雨幸甚又曰昨即殿庭雨立百拜焚生龍腦香十七斤至中夜舉體盡濕公曰陛下祀天當恭畏然隂氣足以致疾亦當戒帝曰念不雨欲自以身為犧牲何戒也此據邵博聞見後録當考恐博所記西太一宫即相國寺㑹靈觀及七年三月禱西太一宫則素不在諫院矣又按㑹要祈禱門慶歷三年五月十四日幸大相國寺㑹靈觀祈雨先是諫官以天旱請遣官祈雨帝曰朕已於宫中蔬食密禱上天引咎責已庶獲豐㴻之應宰臣章得象曰陛下奉天憂民至誠如此必有感召所稱諫官必王素也當考詳增入徙同提㸃江南西路刑獄內殿承制陳秉為荆南駐泊都監時上封者又言秉本以技術進而任按察官不可故罷之己丑幸相國寺㑹靈觀謝雨諫官余靖言伏覩春夏以來旱勢至廣陛下憂勤勞恤躬行禱祈雖獲澍應而夏田先已損矣臣以古者三年耕必有九年之蓄國無九年之蓄曰國非其國故雖堯水湯旱民無菜色者有備災之術也方今官多冗費民無私蓄一嵗不登逃亡滿道蓋上下皆無儲積故也臣竊謂當今備災之術最急者寬租賦防盜賊而已誠知國家邊甲未解經費日廣不宜更減民賦自窘財用其如農收有限當量民力而取之雖或差減尚有數分之入今若全取一旦不堪其求必致流亡之患則永失常賦矣今天府之民九重不逺其訴旱者尚或半得申明半遭抑退况逺方之人其無告必矣陜關已西尤須撫之伏望朝廷特降詔命應遭旱州軍委清强官體量實旱損夏苖去處特與量減夏稅分數不得容有僥幸此乃惠民之實效也若待有逃亡然後振救將無及矣臣又聞衣食不足雖堯舜在上不能使民不為賊盜若水旱之後盜賊滋長世之常也近聞解州鄧州羣賊入城劫略人户此乃都監監押巡檢不得其人之所致也似此階漸不可滋蔓伏乞朝廷申明捕捉之科嚴行賞罰之典其不獲强盜人不得却將竊盜比折特行勒停衝替降資之法庶其戮力同心以折盜賊之勢上嘉納之上嘉納之據張唐英政要庚寅詔自今兩制官詳定公事大事限一月小事半月其急速者勿拘賜定川陳亡軍士家兩月錢糧辛卯築欽天壇于禁中癸巳翰林學士承旨丁度等言比奉詔詳定帥臣見所部儀制請自今閣門祇候及路分都監以上見四路招討使㕔上公參供奉官以下者並庭參其走馬承受及非通轄者勿拘此從之京東安撫司言本路捉賊虎翼卒王倫等殺欣州巡檢使御前忠佐朱進以叛遣東頭供奉官李沔左班殿直曹元哲韓周往捕擊之甲午復給荆王元儼所上公使錢元儼領荆揚二鎮嵗凡給緡錢二萬五千西邊用兵嘗納其半上以元儼叔父之尊不欲裁損不踰年復全給之元儼用度無節每預借數年俸料翊善王渙上書諫以方有邊患冝助朝廷節用度元儼判其後曰愁殺人他日又諫元儼復判曰仰翊善依舊翊善去年五月壬子先給公使之半乙未以試方略人仇公綽為試大理評事姜潜許平為太廟齊郎楊著為郊社齊郎鞠章張弼為司士參軍皆近臣特薦也諫官歐陽修言臣伏見自西鄙用兵以來陛下聖心憂念每有臣僚言及西事必皆傾心聽納今韓琦范仲淹久在陜西備諳邊事是朝廷親信委任之人况二臣才識不類常人其所見所言之事不同常式言事者陛下最宜加意訪問自二人到闕以來只是逐日與兩府隨例上殿呈奏尋常公事外有機宜大處置事並未聞有所建明陛下亦未曽特賜召從容訪問况今西事未和邊陲必有警急兼風聞契丹見在凉甸與大臣議事外邊人心憂恐伏望陛下因無事之時出御便殿特召琦等從容訪問使其盡陳西邊事宜合如何處置今琦等數年在外一旦歸闕必有所陳但陛下未賜召問此二人亦不敢自請獨見至如兩府大臣每有邊防急事或令非時召見聚議或各令互述所見只召一兩人商量此乃帝王常事祖宗之朝並亦許如此不必拘守常例也按韓范以四月七日被召五讓乃就職修此疏不得其時今附見五月末修又言臣伏見朝廷方遣使與西賊議通和之約近日竊聞邊臣頻得北界文字來問西夏約和之事了與未了茍實如此事深可憂臣以謂天下之患不在西戎而在北敵縱使無此文字終須貽患朝廷與契丹通好僅四十年無有纎芥之隙而輒萌姦計妄有請求竊以外國貪婪遇强則伏見弱便欺見我無謀動皆屈就謂我為弱知我易欺故添以金繒未滿其志更邀名分抑使必從無事而來尚猶如此若使更因西事攬以為功别有過求將何塞請此天下之人無愚與智共為朝廷寒心者也今若果有文字來督進和之事則臣謂敵人狂計其迹已萌不和則詰我違言既和則論功求報不出年嵗恐須動作茍難曲就必致交兵至於選將練師既難卒辨禦戎制勝當在機先然臣竊怪在朝之臣尚偷安靜自河以北絶無處置因循弛慢誰復掛意豈可待敵使在廷冦兵壓境然後計無所出空務倉皇而已哉今國家必謂兩意雖乖尚牽盟誓邊防處置未敢張皇以臣思之莫若精選材臣付與邊郡使其各圖禦備密務修完此最為得也况今北邊要害諸郡不過十有餘處於文武臣僚中選擇十餘人不為難得各以一州付之使其各得便宜如理家事完城壘訓兵戎習山川蓄糧食凡百自辦不須朝廷經度以兹預備尚可支吾至如鎮定一路最為要害張存昔在延州以不了事罷去今乃委以鎮府王克基凡庸輕巧非將臣之材而在定州其餘州郡多匪其人臣欲乞陛下特詔兩府大臣取見在邊郡守臣可以禦敵捍城訓兵待敵者留之其餘中常之材不堪邊任者悉行換易若使秋風漸徑敵隙有端陛下試思邊鄙之臣誰堪力戰朝廷之將誰可出師當臣初受諫職之時見朝廷進退大臣陛下鋭意求治必謂羣臣自此震懾百事自此修舉西北二事最為大者自當處置不待人言及就職以來已數十日而政令之目漸循舊弊惟言事之臣拾遺補闕者勉强施行其一二至如講大利害正大紀綱外制四夷內紓百姓凡廟堂帳幄之謀未有一事施行於外者臣忝司諫諍豈敢不言伏望陛下不忘社稷之深恥無使邊鄙之交侵駿發天威督勵臣下仍乞詢問兩府大臣西鄙議和能保契丹别無辭說否茍有所說能以廟謀竒算沮止之否茍無謀以止之則練兵選將備邊待冦賊至而後圖能不敗事否臣願陛下勿謂去嵗六符之來可以賄解今而有請則事難從矣勿謂纍年西賊為患習以為常若此事一動則天下搖矣臣所言者社稷之大計也願陛下留意而行之今年三月二十六日修除諫官四月六日遣邵良佐使夏州此疏云就職已數十日當是五月末或六月初今附五月末更須考詳又案修疏云使秋風漸徑或恐是六月末七月初然七月一日王克基已自定州改滄州杜維序知定州矣張存自元年四月知成德二年五月改都漕十二月復知成德今年七月又改都漕未赴仍知成德修疏稱王克基在定州則必非七月初或是六月間也詔自今巡檢縣尉月俸並特給見錢勿折支㑹要五月事今附月末韓琦范仲淹言臣竊見朝㫖下陜西省罷同解乾耀等九州軍公使錢共一千八百貫竊以國家逐處置公使錢者蓋為士大夫出入及使命往還有行役之勞故令郡國饋以酒食或加宴勞蓋養賢之禮不可廢也謹按周禮地官有遺人掌郊里之委積以待賔客野鄙之委積以待羇旅凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積凡委積之事巡而比之以時頒之此則三王之世已有厨傳之禮何獨聖朝顧小利而忘大體且今贍民兵一名嵗不下百貫今減省得公用錢一千八百貫只養得兵士一十八人以一十八人之資廢十餘郡之禮是朝廷未思之甚也况今來逐州使命之外各有軍營每年春後放下邊兵歇泊動經半年軍中人員並無宴犒之具雖條貫有旬設之名逐州每月一次舉行軍員各給得錢一百文已來官務薄酒二升既無公用更不赴筵亦不張樂豈朝廷宴享將校之意州郡削弱道路咨嗟當全盛之朝豈宜如此或謂有公使錢處收買食物騷擾户民殊不知郡守得人自能約束如非其人更出已俸買物虧民愈甚是見其小而不思其大也伏望聖慈速降指揮下陜西河北河東路轉運司昨來經減廢公用錢處並令依舊庶協典禮稍息物論况朝廷用武之際於此一事尤宜照管臣等久在邊任深知此事近二樞廷豈當緘默琦仲淹言附見巡尉俸勿折支後其從違當考又言臣等竊以西陲用兵以來㳂邊所費錢帛萬數浩繁官司屈乏未能充用其鄜延等四路帥臣雖有管本路糧草之名然轉運司終是本職故不敢專行計置若不委之經度即邊計常是不足臣等欲乞特降指揮下鄜延環慶涇原秦鳳路經略使司應本路州軍所管錢帛並許選差廉幹使臣公人等任便回易其收到利錢明入省帳收附所有勾當人等如能大段回易得利息委本司具數保明聞奏特與相度酬奬所貴有助軍費少紓民力此奏與公使相似并附見其後從違當考或削此篇韓琦范仲淹又言臣等竊以天下郡邑牧宰為重得其人則致化失其人則召亂推擇之際不可不慎國家承平以來不無輕授應知州通判縣令因舉薦擢任者少以資考序進者多才與不才一塗並進故能政者十無二三謬政者十有七八國家詔令程式天下一體能政之處民必䝉福謬政之下民必受弊非國家法令之殊牧宰賢愚之異也今四方多事民日以困窮將思為盜復使不才之吏臨之賦役不均刑罰不當科率無度疲乏不恤上下相怨亂所由生若不急於求人早革其弊誠國家之憂也然自來雖曽詔臣僚各舉所知或舉主非賢則多謬薦臣等欲乞聖慈特降詔書委中書樞密院臣僚各於朝臣中薦堪充舉主者三人候奏對姓名即逐人各賜敇一道令於通判內舉成資已上一員充知州知縣內舉成資已上一員充通判簿尉中舉有出身三考以上無出身四考一員充職官知縣或於職官令録中舉五考以上之人充京官知縣仍於勑明言所薦之人若將來顯有善政其舉主當議旌賞若贓汙不理苛刻害民並與同罪所貴生民受賜冦盜自息從之降勑著琦仲淹等奏請琦仲淹復奏若著臣等奏請於理未便只乞作朝廷憂勞之意特選臣僚舉官則事體甚重也此奏不知是何月日按㑹要慶歷三年五月二十五日詔臣僚舉職官州縣官充京朝官判司簿尉充縣令流外出身州縣官充領録班行其奏狀式樣頒令遵用施行因以此奏附此月末更須考詳按仲淹政府奏議擇臣僚舉知州通判第八舉職官令録充京官知縣第十五從第八奏見第十五奏其第十五奏未知從違今刪取附見不知實録何故不書此也六月己亥上謂輔臣曰自用兵以來䇿試授官人猥多而在事頗無善狀自今獻䇿及臣僚論薦宜先委有司詳其可否以聞其與試人宜加精核之寶元二年五月初詔舉京朝官殿直以上有方略通知邊事者壬寅禮賔副使秦鳳都監馮誥復為太子中允通判秦州先是知秦州文彥博言本州西路蕃部李宫等八族冦永寧來逺寨都監齊再升為賊追襲墜崖而死其後數入冦鈔而誥能於來逺寨北八里野勺口築堡以扼其要衝賊計窘於是人獻器甲願納質內附及以再升之喪來還誥初以太子中允換崇儀副使尋責授禮賔副使今不願預賞止願復文資故官詔從之甲辰詔曰議者多言天下茶鹽礬鐵銅銀坑冶之有遺利朕懼開掊克之政常抑而弗宣然尚慮有過取而傷民者轉運司其諭所部官吏條上利害以聞初議欲弛茶鹽之禁及減商稅既而范仲淹以為茶鹽商稅之入但分減商賈之利爾於商賈未甚有害也今國用未省嵗入不可闕既不取之於山澤及商賈必取之於農與其害農孰若取之商賈今為計莫若先省國用國用有餘當先寬賦役然後及商賈弛禁非所當先也其議遂寢范仲淹不欲先弛茶鹽之禁及減商稅此據沈括筆談今附見令官吏條上利害後比雖有條上利害之詔訖無所更張或因仲淹言故寢也初泰州海安如臯縣漕河久不通制置發運副使徐的奏請浚治之詔未下乃以便宜調兵夫功畢出滯鹽三百萬計得錢一百萬緡於是以的為制置發運使考的為副使年月實録無之戊申録秦鳳都監東頭供奉官閣門祇候齊再升子樂蟠尉雍為本縣令孫軫亢並為郊社齊郎癸丑知諫院歐陽修言近日四方盜賊漸多皆由國家素無禦備而官吏賞罰不行也臣謂敵國者皮膚之患尚可治盜賊者腹心之疾深可憂朝廷終未嘗處置遇有一大賊則倉黃旋發兵馬而不思經久禁止之法今沂州軍賊王倫所過楚秦等州連騎揚旗如履無人之境而巡檢縣尉返赴賊召其衣甲器械皆約束而歸之假令王倫周遊江海之上南掠閩廣而斷大嶺西入巴陜而窺兩蜀殺官吏據城邑誰為捍禦者此可謂心腹之大憂為今計者必先峻法令法令峻則人知所畏自趨而擊賊請自今賊所經州縣奪衣甲官吏並追官勒停巡檢縣尉除名且如知州本號郡將都監監押專領兵在城若賊入而不能捕知州亦勒停都監監押仍除名若賊發而朝廷别差人捕獲其本界巡檢縣尉仍坐全伙不獲之罪賊多於所領兵士弓手者差減之縣尉比多新進少年皆不能捉賊虛陷罰罪宜下流內銓别議選擇之格重賞罰以誘之自來所差巡檢下兵士不肯捉賊又多為州縣之患欲請先選能捉賊使臣令其自募兵卒不拘廂禁軍欲指名抽射者亦聽凡都監監押巡檢因賊除名者仍勒從軍自效俟破賊日則許叙之詔送樞密院施行戊午置順安軍安肅軍巡檢各一員辛酉資政殿學士尚書右丞知亳州韓億為太子少傅致仕仍詔曽任兩府乞致仕者自今須再上章乃聽除之壬戌以交州進奉使安南靜海節度副使杜惟慶為潁州刺史副使三班奉職梁材為太子左監門率府率此段或附見貢馴象下甲子右正言余靖言朝廷所以威制天下者執賞罰之柄也今天下至大而官吏弛事細民聚而為盜賊不能禁止者蓋賞罰不行也若非大設隄防以矯前弊則臣憂國家之患不在敵國而起於封域之內矣南京者天子之别都也賊入城斬關而出解州池州之賊不過十人公然入城虜掠人户鄧州之賊不滿二十人而數年不能獲又清平軍賊入城作變主者泣告而軍使返閉門不肯出所聞如此而官吏皆未嘗重有責罰欲望賊盜衰息何由可得今京東賊大者五七十人小者三二十人桂陽監賊有二百人建昌軍賊四百餘人處處蜂起而巡檢縣尉未知處以何罪當職大臣尚規規守常不立法禁深可為國家憂且以常情言之若與賊鬬動有死亡之憂避不擊賊止於罰銅及罰俸誰惜數斤之銅數月之俸以冒死傷之患哉乞朝廷嚴為督責捕賊賞罰及立被賊劫質亡失器甲除名追官之法從之范仲淹言臣竊知陜西禁軍廂軍不下二十萬衆防秋在近必須養育訓練以期成功在乎豐以衣食使壯其力積以金帛示以厚賞牛酒以悅之律罰以威之如此則兵有鬬志將必增氣雖二十萬衆合為一心有守必堅有戰必强平冦之期可卜也若飢不足其食寒不足其衣出無壯力入無厚賞軍有退志將必喪氣雖二十萬衆或有二心守則不堅戰則不强平冦之期未可卜也於弓箭手民兵肯戰守之時事須賞勸所用金帛誠須大備今陜西百姓已虛三軍未振或聞三說之法可以備邊以臣所見今榷貨務商客才有一百來名縱許於陜西河東路以三說入中即緣商客未多且可少助糧草而已若金銀錢帛則嵗時之內必難充足臣所以請放行南鹽客旅入納糧草并金銀錢帛有逐處富實之家不為商旅者必須以利勸之臣請逐處勸誘入納上件物色一件內及得萬數除給與向南末鹽交鈔外更與恩澤一萬貫者與上佐官三萬者京官致仕如曽應舉到省與本科出身除家便官願班行安排或不就差遣者亦聽所貴防秋之期頗有邊備乞朝廷速為大計使百姓樂輸三軍樂戰則捍禦可固中外無憂山海之利何足以吝國家安危之計在聖心英斷天下幸甚仲淹奏附見六月末
