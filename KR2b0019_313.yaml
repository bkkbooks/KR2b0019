body:
  text: 續資治通鑑長編巻三百九宋李燾撰神宗元豐三年閏九月庚寅朔詔皇太后皇后並二府臣僚經明堂封贈並去階餘依例辛夘改正議大夫知潁州薛向知隨州以御史滿中行言向近以懐姦反復妄沮有司罷樞宻院黜守潁州責命已行曽不知懼偃然自若乞重加貶竄故有是命御史范鏜言曹佾以外戚封郡王祖宗以來未有佾比陛下所以富貴寵禄之厚矣所以致孝愛於慈聖之情至矣佾雖不王乃所以保安曹氏命行而改抑以爲子孫萬世之成憲也不從壬辰太子中允館閣校勘監察御史裏行范鏜權發遣提㸃淮南東路刑獄太常博士提㸃淮南東路刑獄李深知饒州以御史豐稷言深嘗領兵部冝曉訓練之法乃飾私智排沮公論秦鳯路兵刑職事既難委付豈宜復持使節案察淮東兼聞深閑家無法汙行素喧百城士民將安矜式望追寢制命以長清議故也詔給度僧牒千造景靈宫諸神御殿什物乙未鎮安軍留後贈武寜軍節度使兼侍中彭城郡王宗衮卒丁酉詔太常博士王伯虎放令侍養以御史何正臣言伯虎委親閩南已八九年獨與妻孥游宦京師伏望永棄田里以戒天下之爲子者而詔下福建路轉運司考驗如章故責及之樞宻院檢詳官潘良噐等編録與有司相干照用條六冊進呈上批其間頗有己經衝革不用者若付之臺察令憑以糾治所謂廢法者乃是奉令於罪否之際極爲不便宜更送都承㫖以下通檢詳官節貼進呈戊戍靜海軍節度使安南都䕶交阯郡王李乾徳西蕃邈川首領西平軍節度使董戩並加食邑實封加恩可削命客省副使王淵按閱河北第十二將軍馬仍以入内髙班劉友端充照管按閱中書言河北三州府元計人三十萬騎六萬三年糧食今立定封樁式欲頒下從之仍令具今年八月終實數申中書自今每季依此庚子命雍王顥十月朔朝拜慈聖光獻太后陵上批中書擬差檢正禮房公事王震兼編修熈寜政録據先進擬藁既無倫類又紀事滅裂縱使成書亦不可傳後宜更不差官其巳修巻帙可降史院初修政録年月當檢附景福殿使入内都知張茂則言臣以衰晩累奏乞歸田里聖恩不許尚令赴職臣糜禄嵗年甚慙尸素所有未請米麥俸錢已嘗面陳天意不違乞下三司勾歴毁抹麥方請至治平二年九月米請至熈寜三年二月錢請至熈寜六年十二月上批方今亷隅之風頺靡不振士大夫之於朝廷鮮知欽其事而後其食者宜因茂則之請聊勉之可依所乞降詔奬諭河東都轉運使陳安石言自到任推行新法禁止私鹽督官場鬻賣及召商人入見錢算請永利兩監積鹽並已通行嵗有加羡増収及檢㸃到忻州鹻地及鹽池等増収課利并絳州曲沃金坑澤州陵川錫窟各已措置就緒詔河東路提㸃刑獄司考實具奏仍勘㑹安石曽與未曽推賞其以次官吏令安石等第保明以聞元年閏正月三日詔措置帳法並提舉三司帳勾磨勘等司錢勰所奏帳法事其縣鎮倉場庫務帳本州勘勾諸州帳轉運司勘勾内錢帛以下具収支應見在逐色總數造計帳申省每三年各繳巳經司計帳一道送省架閣餘並依所奏内錢帛糧草圖并䇿令措置帳法所立法以聞洮西縁邊安撫司言經畧司使臣劉告同總噶爾首領阿克信等送出先擄劫入蕃巴揚族二十戸首領四人丁壮婦女老㓜九十六馬十牛百五十羊三百十二外有三十餘戸凡百餘人牛羊馬六百餘尚未送出本司巳作蕃字再索於果莊訖詔未送人畜更急理索御史王祖道言河朔三帥皆庸常之才非有長計逺慮可專閫外之托如郭進李漢超使天子無北顧之憂者也今章衡之真定韓忠彦之瀛闗韓絳之定武臣恐陛下未能髙枕無河北之憂也衡之才業固不足論忠彦本無才術絳年髙多病能爲陛下提百萬之衆當北道之衝以全勝制敵乎望擇左右侍從之臣使總戎朔方或不限資格擢試可用之才易舊帥而代之不從朱本削去辛丑詔太子中舍權發遣陜西路轉運判官馬申罷轉運判官差權發遣同經制西河路邊防財用事以同知諫院蔡卞言申才品素下故也詔府界河北河東陜西提舉保甲官各給内降教閲格一本詔宗室三班使臣如犯罪殿罰並令大宗正司闗牒三班院照㑹壬寅知桂州龍圖閣直學士曽布知秦州知滄州屯田郎中直集賢院張頡爲朝奉大夫直龍圖閣知桂州初頡除廣西轉運使奏疏論順州瘴癘城之無益及是賜對上謂曰卿論城順州事信然㑹有言海外黎人陳被盖五洞首領異時盛彊爲中國患請得出兵自効仍乞經畧司勿得預事頡命一攝官過海呼出陳被等補以牙校而去有㫖問賞簿頡對荒徼蠻蜑無他覬得是足矣有㫖罷兵海外果無事蘇轍元祐初言章可考按五年七月丁亥熊本代頡六年正月甲午頡坐前知桂州不察蠻寇落職知筠州此云海外果無事蓋飾說也姑存之俟考詔司農寺諸路請裁減役人錢毋得施行觀文殿學士正議大夫新知汝州王陶道病遣醫乘驛往治陶尋卒贈吏部尚書諡文恪戊申詔自今致仕官領職事官許代致仕若有遷轉止轉寄禄官若止係寄禄官即以本官致仕其見任致仕官除三司三公東宫三師三少外餘並易之詔中書以司農寺京東西淮浙江凖福建路常平并坊場積剰錢相度具可起發數委提舉司依元豐勅召人兊便計置物貨上京其附五路處即轉致五路要切州軍庚戍龍圖閣直學士權三司使李承之爲樞宻直學士以應副明堂畢賞勞也先是慈聖光獻皇后山陵上謂執政曰山陵所費不貲内府助之猶恐弗給承之不以聞用度足乎居無何承之果告辦嘗有商人違法貨北珠乃爲貴主所售三司久不決承之曰朝廷法令畏王姬乎即命取之上聞之曰有司當如此詔聞近日府界盜賊甚多韋城縣宻邇都城至敢殺傷廵檢即是保伍之法全不整嚴故惡少有所容匿可速令提㸃官遍行諸縣其有弛慢不舉職者以名聞㸃檢驅磨三陵官物所言兆城南有地一十頃有畸本充公用監官相承以爲職田無文記可以勾攷上批陵寢重事今守吏不法如此不可不痛加懲治昨差閻安止是㸃檢驅磨初無指揮根究可選一彊毅官就置司根究取勘以聞詔今後應刺面軍吏公人等並樞宻院施行左侍禁寄班祗候朱伯材爲閤門祗候均國公傭母之弟也辛亥上批入内東頭供奉官勾當御藥院李舜舉左右歳久清謹寡過可文思使遥郡刺史帶御器械涇原路督總管司走馬承受梁安禮奏本路粟麻蕎麥大豆等豐熟詔經制司變運川峽路司農錢物李元輔於巳運到鳯翔府等處見在内支絹十萬匹銀五萬兩與經畧安撫司收糴糧斛别封樁明年正月己酉初有詔遣李元輔不應此年閏九月辛亥先有此指揮二事皆朱本増入必是差錯或此指揮乃明年正月以後事按遣元輔在二年八月甲寅必朱本誤也壬子詔梓州復稱劎南東川詔以文彦博子大理評事及甫換承事郎爲祕閣校理詔於都城門外賜文彦博餞送御筵令中書樞宻院臣寮同赴上自爲詩賜之仍命參知政事章惇爲之序詔彦博曰卿在二祖朝蚤冠三事懐忠奮䇿迄有大勲來覲外廷相成宗祀崇進公品往莅洛師錫燕賜詩昭示殊禮仍敕近輔序而識之庶傳無窮著見賢業其承朕志體服眷恩今賜卿詩序至可領也改均州團練副使隨州安置沈起爲温州團練副使越州安置涪州編管人劉彛徙常州甲寅詳定禮文所言前後禮文欲編類上進副在有司以備承用從之元年正月十三日討論五年四月十一日書成判司農寺端明殿學士曾孝寛知陳州熈寧中曾孝寛以端明殿學士簽書樞宻院公事未幾以父憂去服除判農寺舊例百官以事至中書即宰相據案百官北向而坐前兩府白事即宰相去案叙賔主東西行坐時為之掇案及孝寛之在司農也呉正憲公充當國不以前兩府之禮待之毎至中書不爲掇案自是毎有建白止令同判寺太常博士周直孺詣中書孝寛不復至矣正憲頗疑之未幾除直孺爲兩浙提刑以張璪判寺璪爲翰林學士班在端明之上乃本寺長官也異時白事皆璪詣中書而孝寛亦竟不至如是正憲知其果以掇案爲嫌而世亦譏其隘矣魏泰記此事案元豐三年四月二日宰相呉充卒十三日以知河陽端明殿學士起居舍人曾孝寛判司農寺改權判寺太常博士周直孺權知司農寺七月二十三日以翰林學士右正言知制誥知審官西院張璪兼判司農寺權知司農寺太常博士周直孺權兩浙轉運副使閏九月二十五日孝寛出知陳州不爲孝寛掇案當是王珪非呉充也魏泰所聞繆矣孝寛在司農不半嵗遂出或亦以此故當刪取修入乙卯河東節度使守太尉開府儀同三司判河南府潞國公文彦博為河東永興軍節度使加食邑五百户食實封二百户彦博固辭兩鎮乃止加食邑千户食實封四百户武寧軍節度使守司空開府儀同三司致仕韓國公富弼爲守司徒新紀書乙卯富弼爲司徒舊紀不書贈太師中書令兼尚書令劉沆追封兖國公贈太尉諡文安王堯臣贈太師中書令改賜諡文忠彦博子宗道授承事郎弼子内殿承制紹京爲閤門祗候沆子祠部員外郎瑾復天章閣待制堯臣子水部員外郎同老爲秘閣校理通直郎明老陞一任先是同老言至和三年仁宗不豫廢朝七十餘日内外寒心者累月先臣參預朝政與宰相文彦博富弼等數於上前陳宗社大計國家根本天啓先臣之心知英宗皇帝少嘗養育宫中潛德日新聖質成就遂與彦博弼等於仁宗前忘身爲國不顧忌諱求立爲嗣盡忠納說反覆數四在先臣尤爲激切毎論及國家大本言發涕流事未許間又與同列各求罷免避位以必冀開納仁宗感悟遂許立英宗爲嗣至是上以問彦博彦博對曰先帝天命所在神器有歸上則仁祖知子之明慈聖擁佑之力人臣豈可貪天之功上曰雖云天命亦繫人謀卿之深厚不伐善隂德如丙吉乃知卿定䇿社稷之臣也彦博曰如周勃霍光乃所謂定䇿自至和嘉祐以來中外之臣乞立皇嗣者甚衆非獨臣等嘗有此論雖嘗有請事未果行至嘉祐末韓琦等成就大事皆琦等功也上曰議論推轂於至和時發端者爲難仁祖意已定其後止是行前詔耳正如丙吉霍光事前後各不相揜也卿宜盡録本末朕將付之史官彦博奏臣記至和三年正月六日仁宗服藥罷朝兩月餘是時以根本未立中外人情不安至四月初聖體康寧始復御殿中書輔臣顧念正二月中禁中侍藥憂慮百端堯臣及劉沆富弼竊議曰方今根本不可不早定以安人心時亦不暇與樞宻院同謀亦未敢顯言臣以堯臣久居禁近多知朝廷事因謂之曰必得賢嗣以厭人心堯臣曰豈不知素育於宫中者邪臣應之曰久在外任殊未悉宗室間事所謂育於宫中者外亦傳之甚著而賢得非以實爲名時臣不敢顯言以指書於案堯臣復以指書案作下實字臣等各言無易此矣若至上前伏奏得請此大事不可如常例退即殿廬令堂吏書聖㫖劉沆云沆欲袖紙筆於上前親書翌日於垂拱殿進呈一二常程文字臣等四人且奏春中服藥時事中外人情非常憂恐蓋爲儲副未立仍引西漢故事人主即位建儲今當以時立嗣以固根本臣等既叨輔相之重位當任社稷之大計此大計也乞賜開納時仁宗淵黙寡言乃欣然嘉奬曰知卿等盡忠然此大事朕更熟思之臣等恐遷延不決乃再三論奏曰知臣莫若君知子莫若父料此重事陛下必素垂意兼嘗選賢者育于宫中計無易此臣等不敢斥名欲仁宗自言仁宗首肯之臣等拜賀且謝乞明諭聖㫖堯臣之語尤激切仁宗曰既是大事未可輕出翌日當盡議時五月頗熱仁宗初康復巳迫日旰進食不便内侍盡前臣等且退是日晩臣等再聚議謂翌日必得㫖且請堯臣宻作詔意欲進呈施行堯臣許歸第乃宻草詔意然未及示臣等既登對復申前請如昨日之語時臣在御榻之左弼次之沆在右堯臣次之堯臣越次而奏曰願陛下早定此議付外施行仁宗曰朕意既已定矣卿等無憂臣等既得此㫖決謂無疑矣時亦旰昃遂退是年八月因樞府闕官議於上前乞召韓琦充樞宻使蓋以琦忠義必能當重事仁宗可之自後繼有議論未幾臣得請判河南府堯臣尋卒搢紳間多知其忠於國計臣所記當日之事大概如此至是手詔付中書曰文彦博蓄德深厚身之功善不自矜伐故雖久處朝廷懐此社稷大功乃絶口不言是以中外搢紳近臣莫有知者今縁故臣之子明其父勲始得信其本末乃知援立之功厥有攸在嘉祐之詔但宣之耳其議所以褒顯之又下詔曰朕恭聞仁宗皇帝深爲天下大本意有所付而執政大臣文彦博劉沆富弼王堯臣實左右賛順以成聖志及英宗皇帝進位元儲纉承大統四方上下莫不安寧而彦博等勲績蔑有聞者比覽故臣家奏考驗不誣其謙厚忠實可謂至矣宜議所以褒顯之庶幾上昭仁祖知人之明文考報功之意焉故有是命同老上言不知果在何時文彦博私記云時慈聖猶未上仙賈易等則云已崩慈聖以元豐二年十月二十日崩不知同老果以何時上言當考墨本於此下便載韓忠彦元祐二年三月所上章朱本削去新本復存之案編年法當以事繫日則忠彦章自合載於元祐二年三月不必遽見於此也今從朱本列元祐元年九月劉摯王巖叟論列二年二月忠彦論五年正月賈易論列文彦博家私記記此事尤詳然以爭定䇿故輙於事外詆毁韓𤦺如請以英宗爲太上皇等恐不足信今但據墨本所書又不知私記果出誰手彦博必不親爲之或其家子弟及門生故吏追録耳記聞云上問彦博以至和繼嗣曰臣等備位二府當此之際議繼立乃職分爾然幸時無李輔國王守澄之徒用事於中故臣等得效其忠懇也上憮然有間而善之耳或謂富弼曰公治平初進户部尚書固辭之今進司徒一辭而拜何也弼曰治平初乃弼自辭官今潞公以下皆遷豈敢堅辭以妨他人也此據邵伯温見聞録當考林希野史云潞公加兩鎮富公加司徒潞子及甫閣校劉瑾復天章沆子也王同老加閣校堯臣子也四人者至和執政仁宗初服藥執政夜宿中書嘗議援立英廟共作奏而堯臣書之其家有藁事亦上聞留中不行其後嘉祐末立儲之議始定功歸韓曽文富既不言瑾同老軰欲言而不敢今忽有此命前此孫洙未卒爲同老進其父奏藁潞公大享陪祠詢及之上降語嘉奬因各有命按希所云孫洙爲進奏藁它書並無附注當考前忠武軍節度推官知來安縣孫侔爲通直郎致仕侔自言尋醫已二十二年乞致仕特除之侔少與王安石友善及安石爲宰相道真州侔待之如布衣然侔晩年性卞急至於罵坐怒隣論者以爲年耆而德衰也初王回常秩王令與侔皆有盛名令行能尤異諸公稱述之㝡早死回亦不夀秩仕差顯惟侔以不仕終要録云以前忠武節度推官知滁州來安縣孫侔爲通直郎致仕侔行孤峻屢舉進士不中及母病革因嗚咽自誓終身不仕客居江淮士大夫敬畏之與王安石友善安石兄事侔劉敞沈遘王陶韓維皆薦之命以官皆不受與王回王令常秩俱有盛名至是上言尋醫已二十年乞致仕故特除之翰林學士權御史中丞李定爲知制誥知河陽先是手詔定言開封府養馬事於民弗利既見朝廷黜薛向兼元法亦無改更定即更不敢論列乃是從初有失審實故有是責舊紀書李定論事前後異落學士罷中丞降知制誥知河陽新紀不書丁巳知定州韓絳言諜知遼人遣石宗回爲賀正旦副使令於接伴等處因語須説及本晉出帝之後乞預令接伴使副以語折之詔劄與接伴使副朱本削去先是詔府界保甲提舉官中書樞宻院可同選擬進呈既差王中正依舊提舉王淵同提舉尋詔未可行下來日别進呈乃詔王中正充提舉陳向充兼同提舉可改書宣命進入御集一百二十二巻閏九月二十五日下冬十月己未朔環慶路經畧司奏已令諸將蕃官等勸誘屬户養馬詔諸部族所買馬委諸將按驗及格堪披帶者每匹於撫養庫給賞絹五匹更不支銀楪其鄜延秦鳯涇原路凖此又詔當養馬路分人户如鄉村坊郭並有家業計直各不該養馬者通計從輕牧養其鎮坊郭依縣坊郭例御史臺言御史所分察案每半年令中丞知雜取㫖更易然御史到任月日先後不齊其更易乞分上下半年從之辛酉詳定官制所檢討文字光禄寺丞李德芻上元豐郡縣志三十巻圖三巻詔應川峽人連任四路知州者不得過三任舊録韓璹傳知澶州韓璹請互差川路守倅上批付中書曰此豈非韓璹所陳耶何慮之深也互差恐前見非此不得連任事因也河北沿邊安撫司言雄州公人雖於全屬南召募其田産多與兩界相接慮事機因此傳報欲自今召募止於在城久居坊郭并易河南岸及塘泊以南村從之癸亥景福殿使利州觀察使入内都知張茂則爲延福宫使都水監言奉㫖改導洛通汴司作都提舉汴河堤岸司其應係汴河公事乞令一面管勾從之丙寅御史臺言資政殿學士吕惠卿丁憂奉㫖本俸外月特給錢五十千惠卿月支請添支錢十五千即非本俸諸司糧料院吏舉首而三司不行乞令究治詔付大理寺言已下揚州取惠卿俸歴詔惠卿前執政治之傷體其誤請俸錢宜除之餘官司依已得指揮既而惠卿奏稱添支係奉詔舉發不當令御史臺劾官吏以聞於是御史滿中行言禄令所載本俸添支立文各異若以添支爲俸恐自今引用不行乞改正上曰惠卿乃朝㫖給俸誠優於見任者惠卿受而不辭固爲貪冒義責之可也於法無可改正丁卯詳定官制所言譯經僧官有授試光禄鴻臚卿少者今除階散已罷外其帶卿少官名實有妨礙欲乞以授試卿者改賜譯經三藏大法師試少卿者改賜譯經三藏法師其師號及請俸之類並依舊詔試卿者改賜六字法師試少卿者四字並冠譯經三藏餘依舊熈州奏于闐國進奉般擦至南川寨稱有乳香雜物等十萬餘斤以有違朝㫖未敢發詔乳香並約回提舉河北東西路義勇保甲司言義勇將校都副保正領赴集教場習學武藝從之令陜西河東路凖此後詔習學者並支給錢米械器其本家少壯男子願習者不給寧武軍節度使贈太尉建安郡王承裕卒戊辰詔府界廵檢縣尉指使並罷於逐廵教官下置指使二員分治教閲緝捉賊盗仍令王中正於省罷人内選留如有堪充廵教使臣亦以名聞庚午權發遣提舉夔州路常平等事太常丞閻令奏奉敕徃梓州置司取勘前梓夔路鈐轄王光祖奏蠻人乞弟打誓了當不實并提刑盛南仲被㫖體量輙與光祖相見其盛南仲相見一節未經對定有無請屬已依朝㫖指揮踈放訖外有王光祖奏報不實情罪若候就問一處結正又縁本官稱已凖經制蠻賊司差充䇿應行營第一將往江安縣即目見禁命官公人各已案成一面請官録問申奏將王光祖與干連官等續取勘别作一案申奏次詔閻令被受制書擅便不追攝王光祖取勘特追兩官勒停辛未御史王祖道言聞翰林學士李清臣使北朝廻以貲幣直百千遺中書承受内降吏白隨識者鄙笑豈可使居論思講勸之地伏望察其迹狀重行廢斥不報壬申馬軍司奏未曽拍試將下馬軍有所拍試條格指揮乞降下遵守樞宻院奏欲降今年三月按試馬軍新格下馬軍司御批依殿試中軍格仰承㫖司契勘降付元豐三年十月十四日下甲戌都官郎中權知邢州王慥言州有唐宋璟墓臣輙以公使羡錢買近墳地七十畆爲祠堂碑樓訪其子孫止有宋逹爲忠効指揮小分乞載於祀典春秋享之令宋逹掃灑祠宇耕墳傍地以供祭享傳世毋得質賣從之仍詔宋逹特放停餘皆依奏右街道録張居善等乞自今補道職試道德經靈寳度人經南華真經等義并宣讀齋醮科儀祝讀等爲兼經依遷補僧職差官考試從之乙亥御史滿中行言豫章郡王宗諤嘗以私書託處州監押黎若訥買什器及取玩好女樂皆不償直見於宗正司理索及多受若訥賂遺乞付之有司論以國法以爲貴戚之誡詔大宗正司理還其直庚辰權管勾藉田辛公祐言乞下有司定耕藉儀注増修鏺麥殿以備行幸望歳一臨或夏觀麥或秋觀禾或春祈社稷行躬耕禮詔太常寺候修造成就取㫖詔自今中書堂後官並帶賜緋魚袋餘依舊例定州路安撫司言北平縣尉殿直張挺申分捕賊人徐德内弓箭手社副長冉萬射中徐德冉鐡毬因斬其首本司已依格支賞外乞特賜推恩詔冉鐡毬與三班差使冉萬三班借差張挺特減磨勘二年廣南西路經略司言知邕州安撫都監劉初奏遷徙歸明人户共九千九百二十九人並在近裏州峒可以彈壓仍乞左江委道路廵檢儂保福知江州黄遷興右江委知田州黄光倩知凍州黄案定都大照管覺察從之既又詔除去覺察二字恐傷新民歸順之情壬午寶文閣待制韓忠彦言乞漸填納先臣所負當進馬價錢上批韓琦勲在朝廷非諸故臣可擬其除之癸未詔翰林學士並聽佩魚上批入内内侍省後苑散内品王仲千其祖繼恩在先朝平蜀賊有功見於國史今家緒衰落惟仲千一人仕宦非縁罪降止以繼恩之子先亡懷珪養充次男因補得上件名目可特與一入内内侍省内侍黄門甲申侍御史知雜事何正臣言大理寺法本寺官不許㸔謁仍不得接見賔客府司軍廵兩院推勘公事不減大理而休務日乃得㸔謁亦或非時造詣禀白不惟妨廢職事亦恐未免觀望請託之弊欲乞並依大理寺條施行從之詔三路教義勇保甲令將下日輪兵級一二十人并押隊使臣赴集教場講問習射次第河北轉運司言自今應酒税闕官本州及鄰州實無可差即許於本路待闕官内差權其虧欠責罰依正監官條從之丙戌詔秋銓試中稍優一人堂除差遣中等二十四人不依名次注官下等二十二人注官丁亥贈故刑部侍郎致仕李受工部尚書工部侍郎致仕王獵兵部侍郎右諫議大夫天章閣待制齊恢工部侍郎工部郎中天章閣待制孫思恭右諫議大夫受獵以英宗宫僚恢思恭以東宫官故追贈之提舉開封府界常平等事陳向言凖朝㫖都副保正大保長合管耆户長事令府界提㸃提舉司相度合以是何人承代聞奏今先次相度到事件中書門下樞宻院擬進欲令開封府界提㸃司疾速相度御批陳向状宜依此指揮且收俟提㸃司奏上一處相度進呈取㫖不須行出
