body:
  text: 續資治通鑑長編卷一百九十二宋李燾撰仁宗嘉祐五年秋七月戊子美人周氏為媫妤皇第十二女媫妤所生也庚寅詔河北兩地供輸人輒過黃河南者以違制論初邊臣言兩地供輸人舊條私出本州界並坐徒後乃更從杖恐漸入近南州軍刺事難以辨姦詐故復著此條辛卯詔知許州兼京西北路安撫使知鄧州兼京西南路安撫使以許陳鄭􅉸孟蔡汝潁信陽九州軍𨽻北路鄧襄隨房金唐均郢光化九州軍𨽻南路其河南府即不𨽻所部初西平州洞將韋惠政匿納交趾逃户甲洞蠻申詔泰領衆襲逐所亡都巡檢宋士堯等帥兵拒之擅入交趾界多所斬獲眀日交趾與甲洞蠻復合兵來冦士堯等皆戰沒癸巳雍州以聞詔知廣州蕭固赴雍州發諸郡兵與轉運使宋咸提點刑獄李師中同議掩擊之甲午户部員外郎天章閣待制知諫院唐介知荆南從介請也敕過門下知封駮事何郯封還之言介為諫官有補朝廷不當出外詔介復知諫院如故丙申詔文臣待制以上及臺諫官武臣刺史以上各舉諸司使至三班使臣堪將領及行陳戰鬬者三人後雖有他過不連坐而臨敵不如舉狀者坐之丁酉知晉州都官員外郎吳京追三官夀州編管前提點河東刑獄祠部郎中龎汝弼特勒停同提點刑獄西京左藏庫副使冦利一前同提點刑獄禮賔副使假隱各衝替先是京犯自盜贓而汝弼嘗多取寄厨生餼又利一數與京聚會亦嘗受公用銀紗羅故並坐之京育弟也戊戍翰林學士歐陽修等上所修唐書二百五十卷刋修及編修官皆進秩或加職仍賜器幣有差著作佐郎劉羲叟為崇文殿檢討未入謝疽發背卒羲叟強記多識尤長於星厯數術皇祐五年日食心時胡瑗鑄鐘弇而直聲鬱不發又陜西鑄大錢羲叟曰此所謂害金再興與周景王同占上將感心腹之疾眀年上果不豫又月入太微曰後宫當有喪已而張貴妃薨至和元年日食正陽客星出于昴曰契丹宗真其死乎事皆驗羲叟未病嘗曰吾及秋必死自擇地於父冢旁占庚穴以語其妻如其言葬之心疾已見嘉祐元年八月然此不妨再見宗真至和二年八月乃死客星出昴據本志乃皇祐五年事辛丑廣西經略司言交趾與甲洞夷人又冦永平寨乞朝廷發荆湖北路兵善用摽牌者三千人赴本路從之壬寅詔廣南東西路安撫轉運使提點刑獄體量所部知州軍都監監押寨主巡檢使臣老疾不任事者即選人代之以聞殿中侍御史吕誨言陜西四路所管熟户不下十數萬人寶元用兵以來陷沒十無四五兵帳遂廢不修乞委逐路帥臣選官遍索蕃部之未附者增入舊帳其首領因遷補之族大者益以間田均給之又言昨保安軍蕃官胡守中叛去雖自西界取還就誅然可見蕃部攜二之情乞下鄰路體量兵官失綏撫者重行降責並從之初天下廢田尚多民罕土著或棄田流徙為間民自天聖初下赦書即詔民流積十年者其田聽人耕三年而後收賦減舊額之半又詔流民能自復者賦亦如之既而又與流民期百日復業蠲賦役五年減舊賦十之八期盡不至聽他人得耕自是每下赦令輒以招輯流亡募人耕墾為言民被災而流者又優其蠲復緩其期招之又嘗詔州縣長吏令佐能勸民修起陂池溝洫之久廢者及墾闢荒田增稅及二十萬已上議賞監司能督部吏經畫賞亦如之久之天下生齒益蕃田野加闢獨京西唐鄧間尚多曠土唐州間田尤多入草莾者十八九或請徙户實之或請以卒屯田或請廢為縣知州事比部員外郎趙尚寬曰淮安古稱膏腴今田獨蕪穢此必有遺利且土曠可益墾闢民稀可益招徠何必廢郡也乃案圖記得召信臣故迹益發卒復三大陂一大渠皆溉田萬餘頃又教民自為支渠數十轉浸灌而四方之民來者雲集尚寬復請以荒地計口授之及貸民官錢買牛比三年廢田盡為膏腴增户萬餘監司上其狀三司使包拯亦以為言丙午詔留再任尚寬安仁子也仁宗實録包拯奏尚寬所招淮湖河北之民萬餘户本志但云二千餘户英宗實録與本志同今從仁宗實録及本傳治平元年正月尚寬再任庚戍詔曰朕樂與士大夫惇德眀義以先天下而在位殊趣弗率朕旨或為危言詭行務以驚衆取譽罔上而邀寵論事之官搜抉隱微無忠恕長厚之風託迹於公而原其本心實以合黨圖私甚可惡也使吾俗靡然陷溺於薄而望教成治立其可得哉書不云乎堲讒説殄行震驚朕師中書門下其採端實之士眀進諸朝察辨激巧偽者加放絀焉眀揚朕言以厲多士時御史中丞趙槩言比年以來搢紳之倫多險刻競浮宜行戒敕之故降是詔王稱東都事略夫和平醇一之政行則民休美之氣應險刻偷薄之路啓則民戚慘之變生蓋風化之感天下其猶影響之相從也御史執法嘗為朕言宜深詔執事以遏浮競之風其令中書門下務采端厚忠實可以表厲風俗之士並進于朝以啓迪朕心其詭激辨巧敢涉朋比之迹者必行放棄之罰庶幾朝廷清明百異消弭以臻治平咨爾攸司其服朕命壬子命翰林學士吳奎户部副使吳中復判度支判官王安石右正言王陶同相度牧馬利害以聞時國馬之政因循不舉言者以為當有更革也乙卯權司天監周琮言今年正月一日夜瞻見流星出昴畢色如火宜為北敵之備近聞交址冦廣南此乃預言之應詔周琮本謂敵兵有變今盜起南方固不應所言特免勘自今毋得妄引災福僥求恩澤自李仲昌貶議者久不復論河事而河流派别于魏之第六掃曰二股河其廣二百尺自二股河行一百三十里至魏恩德博之境曰四界首河北都轉運使韓贄言四界首古大河所經即溝洫志所謂決平原金堤開通大河入篤河至海五百餘里者也自今春以丁壯三十浚之一月而畢引支河流入金赤河其深六尺商胡決河自魏之北至于恩冀乾寧入於海今二股河自魏恩東至于德滄入于海分而為二則上流不壅可以紓決溢之患乃上四界首二股河圖據本志此時韓贄但圖上二股河形勢初未興役也實録别云自今年春役夫三千一月而畢功減大河入于金赤河其深蓋六尺餘如實録所載乃是役竟功成矣與本志特異又按稽古録是年春韓贄穿二股渠分河流入金赤河與實録同今文從本志稍刪潤之事從實録韓贄本傳云河決商胡而北踰十年議者欲塞之復東流役將興贄言北流既安費已不資今驟更之未必有成功不若大眀之東開金隄使分注故道釃為二河庶可紓大患朝廷遣使相視請如其䇿役三千人幾月而成吕誨集有相度黃河狀載此甚詳今參取之八月丁巳朔觀文殿學士吏部侍郎程戡為宣徽南院使判延州殿中侍御史吕誨言戡才微識暗外厚中險交結權貴因緣進擢循私罔上怙勢作威况年逾七十自當還政近罷樞府既以匪能復委帥權曷由勝任且本朝故事宣徽使非勳戚未嘗除拜乞追寢戡恩命知雜御史范師道等相繼論列訖不從度支判官金部員外郎薛向權陜西轉運使兼制置解鹽使范祥卒故以向代之時西夏青鹽盜販甚賤而官賣解鹽價髙鹽以故不售至向使減價以抑之鹽池嵗調畦夫數千種鹽而鹽支十年未售向奏損其數至今便之本志云祥卒以向繼其後案祥行狀是年七月十九日卒實録録祥孫子在十一月甲子眉州進士蘇洵為試校書郎洵年二十七始發憤為學嵗餘舉進士又舉茂才異等皆不中悉焚其常所為文閉户益讀書遂通六經百家之説下筆頃刻數千言嘉祐初與其二子軾轍至京師翰林學士歐陽修上其所著權書衡論機䇿二十二篇宰相韓琦善之召試舍人院再以疾辭本路轉運使趙抃等皆薦其行義推于鄉里而修又言洵既不肯就試乞就除一官故有是命乙丑吏部流內銓言諸州幕職官常闕八九十員無合入資序人請下知雜御史三司副使待制已上各舉令録判司主簿尉二人有出身四考無出身五考無贓私罪有京官舉主三人者為之詔可治平三年四月遂著為令澶州言鎮潼軍留後李端懿卒上方燕禁中為輟樂賻其家黃金三百兩贈感德節度使諡良定其弟端願援蔡國公主子吳守禮例再贈兼侍中壬申詔曰國初承五代之後簡編散落三館聚書才萬卷其後平定列國先收圖籍亦嘗分遣使人屢下詔令訪募異本校定篇目聽政之暇無廢覽觀然比開元遺逸尚衆宜加購賞以廣獻書中外士庶並許上館閣闕書每卷支絹一匹五百卷與文資官癸酉降知洪州光祿少卿劉緯知郢州以轉運使馮浩等言緯家僕因事受財又縱其子貿易于民也張唐英以為臺官上言今從實録乙亥吏部侍郎集賢院學士余靖為廣南西路體量安撫使如京使賈師熊副之靖至廣西移檄交址召其用事臣費嘉祐詰責之嘉祐對以近邊種落相侵誤犯官軍願悉推治還所掠及械罪人以自贖靖信其詐厚賂遣去嘉祐既歸遂不復出神道碑云即械五人送欽州戮于界上蓋飾説也今從本傳庚辰刑部郎中天章閣待制兼侍讀錢象先為契丹國母生辰使西染院副使兼閣門通事舍人夏偉副之侍御史陳經為契丹生辰使東頭供奉官閣門祗候郭靄副之鹽鐡判官刑部郎中閻詢為契丹國母正旦使西京左藏庫副使劉禧副之度支判官祠部員外郎直集賢院王安石為契丹正旦使西頭供奉官閣門祗候趙元中副之既而安石辭行改命户部判官兵部郎中祕閣校理王繹相度牧馬利害所吳奎等上言自古國馬盛衰皆以所任得人失人而已汧渭之間未嘗無牧而非子獨能蕃息於周汧隴之間未嘗無牧而張萬嵗獨能蕃息於唐此前世得人之效也然得人而不久其任久其任而不使専其事使得専其事而不臨以賞罰亦不可以有功今陜西馬價多出解鹽三司所支銀絹許於陜西轉運司易錢權轉運副使薛向既掌解鹽復領陜西財賦可悉委之移用仍俾擇空地置監而孶養之蓋得西方不失其土性一利也因未嘗耕墾之地無傷於民二利也因向之才使久其任而經制之三利也又河北有河防塘濼之患而土多潟鹵戎馬所屯地利不足諸監牧多在此路馬又未嘗孶息若就陜西興監牧即河北諸監有可存者悉以西方良馬易其惡種有可廢者悉以肥饒之地賦民於地不足而馬所不宜之處以肥饒之地賦民收其課租以助戎馬之費於地有餘而馬所宜之處以未嘗耕墾之地牧馬而無傷於民此又利之大者茍用向凡舉辟官及論改舊弊有功則無愛賞敗事則無憚罰在於必行上可其奏甲申命向専領本路監牧及買馬事仍規度於原渭川德順軍置場同州沙苑監鳯翔府牧地使臣並委向保薦以聞羣牧使歐陽修言國馬之制置自祖宗嵗月既深官失其守積習成弊匪止一時伏覩詔書命奎等商度利害將有更革臣以謂監牧之設法制具存條目既繁其弊亦衆若止坐按文籍就加增損恐不足以深革弊源如欲大為更張創立制度則凡於利害難以遙度蓋謀於始也不精則行於後也難久請詔相度官一人同臣躬按左右廂監牧凡土地廣狹水草善惡嵗時孶牧吏卒勤惰以至牝牡種類各隨所宜棚井溫涼亦有便否嚮何以致馬之耗減今何以得馬之蕃滋詳究根源旁采衆議然後以比日臣僚奏請𠫭詳審處與其坐而遙度倉卒改更其為得失不可同日而論也臣又竊思今之馬政皆因唐制而今馬多少與唐不同者其利病甚多不可槩舉至於唐世牧地皆與馬性相宜西起隴右金城平涼天水外暨河曲之野內則岐幽涇寧東接銀夏又東至於樓煩此唐養馬之地也以今考之或陷沒契丹或已為民田皆不可復得惟聞今河東路嵐石之間山荒甚多及汾河之側草地亦廣其間草軟水甘最宜養牧此乃唐樓煩監地也可以興置一監臣以謂推迹而求之則樓煩元地天池三監之地尚冀可得又臣往年奉使河東嘗行威勝以東及遼州平定軍見其不耕之地甚多而河東一路山川深峻水草甚佳其地髙寒必宜馬性及京西路唐汝之間久荒之地其數甚廣請下河東京西轉運司遣官訪草地有可以興置監牧則河北諸監有地有不宜馬可行廢罷至於估馬一司利害易見若國家廣損金帛則劵馬利厚來者必多若有司惜費則蕃部利薄馬來寖少然而招誘之方事非一體請遣羣牧司或禮賔院官一人至邊訪蕃部劵馬利害以此三者參酌商議庶不倉卒輕為改更下其奏相度牧馬所奎等請如修奏乃詔選官分詣河北河南諸監按牧地肥瘠頃畝俟得實數即遣官二人按視其陜西估馬司仍委向規度以聞向乃上言秦州劵馬至京師計所置并道路之費一馬當錢數萬然所入止中雜支於上等良馬固不可得請於原渭州德順軍置場收市以解鹽交引募蕃商廣售良馬八千以三千給沿邊騎軍五千入羣牧司有詔從之眀年向又言原渭州德順軍水洛城及秦州外寨係蕃部馬所由必欲詢究利害宜得涇原秦鳯兩路帥臣同議庶諸部承稟又眀年奎等復列上向所議買馬利害秦州古渭永寧寨并原州德順軍今悉置場請自京師嵗支銀四萬兩紬絹七萬五千匹充馬直銀以二萬兩并紬絹並充邊庫錢餘闕萬緡以解鹽鈔并雜支錢給之詔皆施行向又言及奎等列上向議本志以為六年七年事今並附此乙酉罷諸路同提點刑獄使臣置江南東西荆湖南北廣南東西福建成都梓利夔路轉運判官先是同提點刑獄使臣或有竊公用銀器及樂倡首飾者議者因言使臣多不習法令民事不可為監司故罷之十一路舊止一轉運使至是各增置判官以三年為一任第二任知州人為判官滿一任與提點刑獄初任知州若第二任通判為判官滿兩任亦如之實録並載諸路同提刑姓名其末云京西路文思副使曹滉已物故河東路左藏庫副使冦利一陜西路禮賔副使假隱並先坐事罷去利一與隱所以罷去司馬光記聞當得之今從記聞九月丁亥朔翰林學士歐陽修兼侍讀學士起居舍人知制誥劉敞為翰林侍讀學士知永興軍初臺諫劾敞行吕溱責官制詞不直又前議郭后祔廟嘗云上之廢后慮在宗廟社稷不得不然是欲道人主廢后也章十數上敞不自安會永興闕守遂請行詔從之丙申樞密直學士右諫議大夫吕公弼同詳定均稅戊戍詔梓州路今春飢夏秋閔雨其人户訴災傷者令轉運司速遣官體量蠲其賦租仍勿檢覆庚子遣中使齎詔撫諭知府州如京使康州刺史折繼祖初繼祖欲解去州事下河東經略安撫使梁適體量適言折氏纍世承襲知府州本族僅三百餘口其所部沿邊蕃族甚衆凡犒勞以俸錢而所用不給素於蕃族借牛耕蒔間田以收穫之利嵗贍公費且朝廷俾之承襲即與內地知州不同比年監司一以條約繩之尤為煩密繼祖內不自安遂欲解去乞慰存之故遣是詔辛丑詔齊登密華邠耀鄜絳潤婺海宿饒歙吉建汀潮凡十八州並煩劇之地自今令中書選人為知州其知潮州委本路轉運提點刑獄司同保薦之翰林侍讀學士給事中楊安國卒贈禮部侍郎安國講説一以注疏為主無他發眀引論鄙俚世或傳以為笑尤不喜緯書及注書所引緯書則尊之與經等在經筵二十七年上稱其行義淳質以比先朝崔遵度壬寅樞密副使張忭提舉編集本院機密文字庚戍降駙馬都尉安州觀察使李瑋為和州防禦使仍與外任瑋與公主不協而瑋所生母又忤公主意公主夜開皇城門入訴禁中瑋惶恐自劾故有是命眀日免降官止罰銅三十斤留京師吳及傳云及為諌官論入內都知任守忠陵轢駙馬都尉李瑋及干求內降當考陵轢事增入癸丑右正言王陶言周禮閽人掌宫門之禁時其啓閉寺人掌女宫之令糾其出入以謹嚴周衛杜絶非常故漢光武出獵夜還上東門候郅惲拒關不納光武從中東門入眀日賞郅惲而貶中東門候魏武之子臨淄侯植開司馬門晝出魏武怒公車令坐死然則公主夜歸未辨真偽輒便通奏開門納之直徹禁中略無譏防其所歷皇城宫殿內外監門使臣請並送劾開封府知諫院唐介殿中侍御史吕誨等亦以為言皆不報冬十月丙辰朔詔自今恩奏舉改官及升差遣其所舉人各犯枉法自盜而會赦不原者舉主亦毋得以赦論庚申兖國公主宅都監入內供奉官梁全一以下九人並逺小處監當入位祗候梁懷吉配西京灑掃班自今勿置都監别選內臣四十以上三班院使臣五十以上無私罪者二人在宅勾當內臣年五十以下二人為入位祗候並不得與駙馬都尉接坐時臺諫官皆言主第內臣數多且有不自謹者上不欲深究其罪但貶逐之因省員更制七年二月癸卯梁懷吉又勒歸前省不知何時復召入也辛酉西蕃官右監門衛將軍莽布賽香布並為右領軍甲子殿中侍御史吕誨言兖國公主乳母昌黎郡君韓氏出入內中嘗因公主奏其姪壻于潤為右班殿直典主第服玩器物而盜歸私家請下有司推鞫之詔降于潤為下班殿侍削韓氏郡封己巳祠部員外郎知建昌軍楊儀免追官與監當差遣先是建昌富民曽均毆殺人獄未具轉運使馮浩移所部官石麟之推劾連逮而死者十餘人儀論其事坐不實法當追一官上特寬之庚辰知潭州王罕言在廣西日見雍州火洞蠻儂宗旦嘯聚甚衆又數出剽掠恐終為邊患請下本路設䇿招安從之按會要及正史宗旦以從蕭固招事在二年今罕復言此當考又按王罕傳罕前為廣西漕實親招降宗旦父子三年十月乃自廣西改知潭州不知今者何以復云必有一誤或是罕前已招降今又欲內徙而實録不詳故耶更當考是月深州言野蠶成繭被于原野十一月丙戍朔知桂州刑部郎中集賢殿修撰蕭固落職知江州知雍州西上閣門使蕭注降授引進副使荆湖南路鈐轄初臺諫官並言固等在廣西所為不法至是不察寨管下西平州溪洞使臣匿外界人口致領衆殺害兵官故責降之丁亥均州防禦使李珣為相州觀察使單州團練使劉永年為齊州防禦使知制誥楊畋封還珣永年詞頭因言祖宗故事郭進戍西山董遵誨姚內斌守環慶與強冦對壘各十餘年未嘗有轉官移鎮之寵蓋謹重名器必須平冦難靜方隅然後俾之遷改今珣等無尺寸裨補之功特以外戚故除之臣恐天下謂陛下忽祖宗謹重名器之訓開親戚僥幸之門曲緣私恩輕用王爵後若有扞冦之功復以何官賞之臣是以不敢命詞尋詔他舍人草制而范鎮言朝廷如以楊畋之言為是當罷珣等所遷官儻以為非即乞却令元當制官命詞內批不許既而鎮復有論列遂罷之戊子録故陜西制置解鹽使度支員外郎范祥孫景為郊社齋郎子太廟室長褒候服闋與堂除差遣權三司使包拯言祥建議通陜西鹽法行之十年嵗減𣙜貨務緡錢四百萬其勞可録也如京使賈師熊領欽州刺史知雍州兼廣南西路安撫都監師熊辭之據吕誨奏議當考詔客省東上閣門使英州團練使曹偕進馬更不賜詔書初翰林學士歐陽修言故事進奉乾元節皆賜詔褒答朝廷非貴其物也且以嘉臣子之勤爾今偕五年進空表而馬不至雖未加罪不可更賜以詔書故罷之己丑卲州溪洞蠻楊光倩知徽州光倩通漢之子也通漢慶厯初嘗入貢既死光倩繼之舊制溪洞知州卒承襲者許進奉行州事撫遏蠻人及五年安撫司為奏給敕告至是光倩行州事七年無他過故命之辛卯詔勾當御藥院內臣如當轉出外而特留者俟其出計所留嵗月優遷之更不許纍寄所遷資序非勾當御藥院而留者其出更不推恩初御史中丞趙槩言勾當御藥院有遷官至遙領團練使者謂之暗轉若不别立規制竊恐干冒恩澤寖不可止乞限年眀與改官故條約之殿中侍御史吕誨嘗言近日除管勾御藥院入內供奉官王保信王保寧鄧保夀王世寧四人遙郡團練刺史傳聞中外駭動人聽臣輒以國朝故事言之髙品黃門三十年供奉官十年一轉蓋不使此輩坐而竊祿如咸平中洛苑使入內都知秦翰與雷有終討王均之亂以功授內園使恩州刺史即不知保信等立何勞效與秦翰恩賞一同只是攀援暗轉無名之例伏乞追還成命特與平轉屬邊疆多事之際恐因此內臣無功進秩提兵授律者不肯用命以鶴乘軒衛人無戰意斯有國者之深誡惟聖斷無以私昵害天下之至公乃臣拳拳之望也既留中不出誨又言伏聞已前諸閣分內品之類不過一二十人比來增及數倍除身分俸外更請本閣料錢四時衣服又破三司折食價錢冗費甚多繇此歷天章閣後苑內東門御藥院最為優厚或因監都督功坐一切小勞便理績效得聖旨畫下則超資躐等謂之暗轉自內品供奉不數年間授諸司使遙領刺史防團之任向時石金育何承用盧昭序張茂則馮承用之類其名甚多不可殫舉既與之暗轉則俸祿隨而增給如此濫進非特亂先朝之典制較之前古亦未之聞當陛下即位之初太后臨朝命出帷幄威福假於宦豎斜封墨敕授之匪人故外庭鮮得聞知疑暗轉之例自兹而始暨眀道而後陛下躬覽萬幾北司之弊不聞剗革今奈何復使熾盛於前也然宣命降於內省遷擢誥敕亦關於兩府蓋自來上下循持蔽而不言以陛下爵祿樹為私恩交結貴幸因緣致身於近輔者比比有之積弊寖久陛下無由而知蠧公害政莫甚於此都城之下髙門大第寶貨充積富貴窮極皆幸臣之所有也傾府庫之貨財竭生靈之膏血以資無功何所取益臣恐人神怨怒非朝廷之福設若保信等出居外任薄立勞效陛下復以何官待之臣竊謂先帝賞秦翰討賊之功宜守之為例則小人覬覦之心自息伏乞指揮入內內侍省檢會諸閣分寶元以前人數比類今日如員數過多即行減省及管勾天章閣後苑內東門御藥院各限定員數或與三年一替並令入內內侍省將印紙厯子具有無功過事件批書如因勞效得旨酬賞亦須畫時批上候合轉官時以厯子付樞密院點檢該得賞格即時與敘遷送中書出給誥敇所貴內侍省與樞密中書相關不敢蔽欺得以盡公其暗轉俸給一切非例並乞裁罷仍追寢保信等前命止與平轉俾中外臣僚升進均一賞有所勸天下大幸誨論王世寧等四人暗轉不得其時四人者皆御藥實録會要俱不書因趙槩有言掇取附見誨嘗言王世寧與陳升之交結則世寧管勾御藥院必在升之未入樞密院前槩云遙領團練誨云遙郡團練刺史必是一事附見槩後宜不差但不知誨所言聽否爾當考劉保信等四人乞授外官在嘉祐八年五月乙卯前可參照辛丑樞密使兵部尚書同平章事宋庠罷為河陽三城節度使同平章事判鄭州殿中侍御史吕誨等論庠老疾昏惰選用武臣輒紊舊法加外寬內忌近者李瑋家事猥陳均州繆例欲陷瑋深罪阿公主意賴上眀察不行其言且交結內臣王保寧隂求援助昨除御藥院供奉四人遙領團練使刺史保寧乃其一也三班院吏授官隔過季限略不懲誡御前忠佐年當揀退乃復姑息其徇私罔公率如此章凡四上右司諫趙抃亦論庠不才詔從優禮罷之抃神道碑云庠選用武臣多不如舊法至有訴於上前者抃陳其不可禮部侍郎參知政事曽公亮依前官充樞密使樞密副使右諫議大夫張忭禮部侍郎孫抃並為參知政事翰林學士兼侍讀學士禮部侍郎知制誥史館修撰歐陽修樞密直學士右諫議大夫陳旭御史中丞趙槩並為樞密副使仍以槩為禮部侍郎詔自今臣僚之家毋得陳乞御篆神道碑額鄜延路經略司言沿邊德靖等十堡寨頻有賊馬入界開墾生地并剽略畜産雖以戍兵捍守比稍習山川道路又復代去請就十堡塞招土兵兩指揮教以騎射之法每處留屯百人從之辛亥度支員外郎直祕閣判度支勾院司馬光度支判官祠部員外郎直集賢院王安石同修起居注光五辭而後受安石終辭之最後有旨令閣門吏齎敇就三司授之安石不受吏隨而拜之安石避於厠吏置敇於案而去安石遣人追還之朝廷卒不能奪江南西路鈐轄司請徙本路都監一員於虔州駐泊仍請如升洪荆潭等處招置威果一指揮以𨽻禁軍從之壬子供備庫副使桑湜為六宅副使弟湛為三班借職初宰臣韓琦言湜乃懌之長子素有才勇父頃與西賊戰沒其堂弟湛與湜同扶喪歸葬湜心感之皇祐五年遇郊恩嘗乞蔭補湛而朝廷以無例不行後因恭謝祫享湜雖有子未嘗奏陳蓋義不以先於湛也兼湜改官凡十年不曽磨勘湜武臣而志操如此望優與旌擢特録湛一官詔桑湜特轉資湛特補借職詔廣南西路欽州廉州融州自今令本路安撫經略轉運司舉內殿崇班以上為知州仍帶沿邊溪洞都巡檢使十二月丁巳安素處士髙懌為光祿寺丞致仕懌固辭之己未樞密副使陳旭言與趙槩同時被命槩自翰林侍讀學士為御史中丞班序本髙請槩班臣之上從之辛酉廣西轉運司言甲洞蠻冦雍州詔安撫使余靖等發兵討捕之庚午寧國節度使同平章事同判大宗正事北海郡王允弼為武寧節度使兼侍中判大宗正事奉寧節度使同平章事華原郡王允良為彰信節度使兼侍中宗室改官及十年者皆序遷壬申右衛大將軍蘄州防禦使安國公從古權同判大宗正事上稱從古有賢行故用之英録治平元年十二月從古傳云睦親宅火獨從古保救祖宗神御有詔奬諭焉仁宗嘗稱其行遂以權同判大宗正事睦親宅火當考年月初趙抃為成都轉運使嘗言所部諸州每年有遊惰不逞之民以祭賽鬼神為名斂求錢物一坊巷至聚三二百人作將軍曹吏牙直之號執鎗刀旗幡隊仗及以女人為男子衣或男子衣婦人衣導以音樂百戲三四夜往來不絶雖已揭榜禁約然逺方風俗相沿恐難驟止請具為條制詔所犯首領以違制論仍徙出川界本路監司半嵗一舉行癸酉太常禮院言自今文武臣僚薨卒法當諡者考功於未葬前取索行狀移禮官考定如其家葬速集議不及則許賜之其有勳德既葬而未嘗請諡者亦聽取旨詔可戊寅樞密直學士右諫議大夫吕公弼為龍圖閣學士知成都府公弼初至人疑其少威斷會營卒犯法當杖不肯受曰寧請劒不能受杖公弼再三諭之不從乃曰杖國法不可不受劒汝所請亦不汝違也命杖而復斬之軍中肅然己卯廣西安撫司言蘇茂州蠻冦雍州庚辰契丹國母遣林牙右衛上將軍耶律道太常少卿昭文館直學士柴德滋契丹遣懷化軍節度使耶律嘏起居舍人知制誥史館修撰王棠來賀正旦諸州上男子百嵗以上者凡十一人按宋史為州助教作十二人辛巳並補本州助教用祫享赦書從事也先是知永興劉敞朝辭日言關中嵗比不登民多流移請發倉賑之又言均田擾民上令於所部徐訪利害以聞及敞至永興敞以九月丁亥朔除侍讀知永興十二月初始到任今附此具奏孫琳在河中府用方田法打量均稅百姓驚駭各恐增起稅租因此斫伐桑柘賴轉運使薛向處處張榜告諭方得暫止訪聞只打量萬泉一縣近須一年乃畢蒙減者則必欣喜被增者自然怨嗟詞訴獄訟恐自此始乞且召還孫琳更俟豐嵗庶幾災傷之餘不至驚擾敞意謂琳用方田法步地千步為方方方度之誠使其覆實無頗但能知田畝髙下爾至於均稅之法以地肥瘠為差其勤力從事田畝修治者則賦重自若其惰窳不事事而田畝荒瘠者因獲減賦然此尚以肥瘠言也吏非廉眀用心不一或不能盡知田事或挾私與奪上無由察也故均田之害人皆知之獨主事者樂其名敞所以求待豐嵗者惡斥言之耳敞又以為琳之度田起自萬泉龍門此兩邑皆山田﨑嶇三二百里間審如琳法非旬嵗不可周遍也琳皆不出一月而奏畢功會敞奏至中書信琳言即具報敞但降敕榜禁民毋得殘桑柘而已其後河中民果訴增減田稅不平凡數萬户敞事具敞行狀及奏議歐陽修亦言臣為諫官時嘗首言均稅事乞差郭咨孫琳蒙朝廷依臣所言起自蔡州一縣以方田法均稅事方施行而議者多言不便尋即罷之近者伏見朝廷特置均稅一司差官分往河北陜西均稅始聞河北傳言人户虛驚斫伐桑棗尚不為信次見陜西州郡有上言嵗儉民飢乞罷均稅者稍已疑此一事果為難行而朝廷之意決在必行言者遂不能入近者又見河北人户凡千百人聚訴於三司然則道路傳言與州郡上言雖為不足信其如聚集千人於京師此事不可掩蔽則民情可知矣蓋均稅非以規利而本以便民如此民果便乎竊知朝廷本只以見在稅數量輕重均之初不令其别生額外之數也近聞衛州通利軍括出民冒佃田土不於見在管權數內均減重者攤與冒佃户却生立稅數配之此非朝廷之意而民所以喧訴也又聞澶州諸縣於見今實額管權數外將帳頭自來樁坐有名無納及失開閣兩項逺年稅數並係祥符景德已前以至五代長興年樁官虛數並攤與見今人户又聞以地肥瘠定為四等其下等田有白減帶鹹地并鹹鹵沙薄可殖地死沙不殖地並一例均攤與稅數謂此雖不可耕種尚可煎鹽且河北之民自祖宗以來蒙賜恩恤放行鹽禁只今據鹽斤兩納稅今煎鹽者已納鹽稅又令更納田稅豈祖宗所以惠河北之民意又聞河南不殖之地繫禁鹽地分者亦均攤與稅又不知民何以納也澶衛去京師近偶可聞知者如此其餘逺地謂所均稅悉便於民其可得乎以此見朝廷行事至難小人希意承旨者言利而不言害俗吏貪功希賞見小利忘大害為國斂怨於民朝廷不知則已茍已知之其可不為救其失哉欲望聖慈特賜指揮令均稅所只如朝廷本議將實榷見在稅數量輕重均之其餘生立稅數及逺年虛數却與放免及未均地分並且罷均且均稅一事本是臣先建言聞今事有不便臣固不敢緘默歐陽修言不得其時今附劉敞後當是未除樞副十一月以前或因敞面對論此修亦具奏時為翰林學士九月十月之間也是嵗置三司推勘公事一人以京朝官充掌推劾諸部公事此據兩朝史志不得其月今附嵗末治平二年正月罷開寶八年十一月當考牛羊司舊有宰殺務大中祥符四年析出改曰供庖務是嵗併入牛羊司其務廢罷
