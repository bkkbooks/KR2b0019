body:
  text: 續資治通鑑長編卷四百九十九宋李燾撰哲宗元符元年六月戊寅朔改元五月十九日詔權吏部尚書葉祖洽言近照驗在部官腳色狀伏見方澤於熙寧十年為提舉官奏請乞放罷見雇役人將三等人户仍舊差役坐不知職守詔送審官東院與合入差遣而澤於元祐二年訴理遂得除落元豐指揮繼除知州差遣紹聖以來亦相繼擢用外議未安近雖以私謁后族得罪然其大惡未正典刑伏乞取索澤前件事因看詳施行詔徙澤知萬州三月十九日澤知䖍州又五月二十六日上云方澤誠可罪涇原奏已進築沒煙前後峽河東沿邊安撫司奏定到順義軍牒本軍以北客舊自東偏頭稅場入久良津和市今移於賈胡疃已指揮本津不得與自新路來者交易又移牒請其改路也布録戊寅巳而河東經略司言沿邊安撫司不由經略司擅定牒本奏及差官體量久良津改路事違法詔沿邊安撫司放罪令今後遵依條約束施行布録庚辰今并此庚辰詔太中大夫鄭雍提舉崇福宫本處居住雍已病乞小郡故有是命三省言左右司奏按元祐紹聖大禮兩次朝㫖差提㸃事務及天授𫝊國受命寶遇大禮未審出與不出詔自今大禮提㸃事務官令禮部申尚書省取㫖差其天授寶依令奏請降出詔秦鳯路輟步兵五指揮應副熙河布録庚辰詔轄正進奉人嘉香令禮部量估價回賜禮部言嘉香法當燒毁押送伴所乞給還上欲厚轄正不與校令量支與錢章惇言不可啓例恐後無以拒之曽布乞量宣諭自今進奉人更將到即不回賜上曰如此甚善辛巳詔非袒免親應舉推恩有司建明寖失先帝初令之意及見今多有貧乏之人自今袒免親鎖㕔應舉並依熙寧二年十一月指揮應給錢米者並計口支破其應干條貫令有司修定以聞吏部言八路合使員闕除二廣已仍舊在任射闕外四路勘當欲將本路合使員闕並仍舊制許在任指射其應干事理亦請依熙寧元豐舊法并見行約束施行其已修䕫州路差官條仍乞重行改定從之尚書省言大理寺修立大辟或品官犯罪已結案未録問而罪人翻異或其家屬稱寃者聽移司别推若已録問而翻異稱寃者仍馬遞申提刑司審察若事不可委本州者差官别推從之通直郎龍圖閣待制知宣州沈銖卒甲申詔祁州防禦使同知大宗正司宗粹知大宗正事給事中徐鐸言進奏院除揀中副知書寫人等存留九十人外其進奏官有文字稍多聽保雇一二人相兼其奏報等文字經監官簽書定本方許𫝊報或官員差除未經封駮私先傳報及雖於法許報事與元定本不同者並科杖一百罪許諸色人告從之新無樞密院奏今據李忠傑等指說貼到涇原熙河蘭岷路與西界對境地名珠旺去處地里逺近圖詔涇原熙河蘭岷路經略司子細講議將來逐路各令合自甚處及約至甚時如何次第經營進築除熙河秦鳯兩路兵馬須㑹合作一頭項出入其涇原熙河兩路如何分頭出入可以得聲勢相接互相照應逐一詳具的確事狀結覽保明聞奏此據章楶奏議合用布録别修布録甲申同以李忠傑朱智用所畫熙河涇原對境地圖大約云沒煙去天都止六十里天都去鼐摩㑹止二十七八里鼐摩㑹去打繩川七十里打繩川至㑹州八十里而熙河㑹寧關去打繩川止一百三十里若兩路相為聲援則來春便可於天都及打繩川進築以次據㑹州則河南之地皆為我有令熙渭兩帥更切看詳體問所圖山川地里是否及將來如何次第經營進築可以得兩路聲援相及具詣實聞奏乙酉保州故知州董元仲男三班差使襲衣為銀青光祿大夫檢校工部尚書知保州軍州事兼御史大夫考功員外郎劉逵為國子司業中大夫知亳州林希言奉勑撰到渾天儀象碑文詔送渾天儀象所立石刑部言請依元豐勑重法地分劫盜不以人數並行重法竊盜三犯杖配本州從之新無丙戍樞密院言鄜延河東涇原熙河蘭岷路進築城寨各已畢工乞依環慶路委官按視詔鄜延路差陜西路轉運判官李譓涇原路差同管勾成都府利州陜西等路茶事黃敏用河東路差權河東路轉運判官李延嗣熙河路差提舉秦鳯路常平張行親詣逐處詳檢驗詣實保明以聞十一月曽布云云詔諸路走馬承受任滿酬奬令樞密院審按任內如别無違犯或侵越事依條推恩其本處保明聞奏指揮勿行詔應輕重傷人並令諸路走馬承受依條㸃檢覺察施行應以首級詐作首領鈐轄之類妄求恩賞據所冒合轉資數並依以老幼婦人首級妄冒施行詔永興軍等路創置蕃落十指揮以西京作坊使永興路都監鄧咸安兼總領新置蕃兵將其提舉訓練並依將勑施行布録蓋因利珣奏乞也罷走馬承受三日一奏平安布録大理寺言防送已决編配流移羈管人而有縱失者凖其亡罪論如縱失囚法不以日久坐亡罪輕有縱失者凖其亡罪論如縱失囚法不以日者刺配凖起徒二年餘凖杖一百故縱元犯強盜配軍軍人配鄰州公人配本城仍不以赦降原減配軍逃亡捕獲者元配沙門島及元犯持杖強盜謀殺人並罪至死貸命并㑹降及因親屬或得相隱者首告减等並依上禁軍法如逃亡後不曽别作罪犯或雖有罪犯而情理不至凶惡罪至死者並奏裁不持杖强盜罪至死貸命并㑹降或因親屬得相隱者首告减等并餘元配廣南及逺惡處者並依下禁軍法元配三千里以下及指定州軍或路分配者依廂軍法即逃亡後曽歸本州縣係捕獲者元配本州即配鄰州鄰州配五百里五百里配千里千里配二千里二千里配三千里三千里及廣南並配逺惡處其指定軍州或路分配軍無元配地里者並配重役處以上應行而未至配所逃亡者凖此即比犯罪不該配而特行刺配或比元犯特增减地里刺配者並以特配地里為法從之新削宣政使成州防禦使入內副都知馮宗道卒特贈安德軍節度使諡良恪丁亥大理寺言人吏每三人為一保保內因本職犯贓罪許經官舉發知而不舉者減犯人罪三等即事發逃亡量所犯輕重均備賞錢或監銅收捉其衆人不得保者相度去留申尚書省從之新削録此五月乙丑可考戊子左僕射兼門下侍郎章惇提舉常平免役勑令成書頒行賜詔奬之仍賜銀絹三百匹兩提舉永興軍路常平等事蔡肇言奉㫖體訪得邠州自去年秋場和糴不行致闕軍糧事勢急迫遂將所少數目科放與在州及轄下四縣其有斛斗停蓄之家即隨粗細色分數存留外其並令中賣入官詔朝請郎陜西路轉運副使邵䶵朝奉大夫提㸃秦鳯等路刑獄劉河各特降一官展一期叙其後蔡肇具到邠州科配斛斗支錢留滯官吏知州仇伯玉降兩官送吏部通判張德淑衝替觀察支使李寬推官樊詢並差替詔陜西河東逐路帥臣及見任宰相執政親戚謂於編𠡠合回避者除見充帥臣監司知州軍并城寨及兵將官應出入者餘雖有職事不許赴軍前如帥臣親臨許帶書寫機宜隨行軍指使前去其門客親戚亦不得隨軍出入違者並以違制論不以赦降去官原减政和元年七月十八日檢㑹此指揮乃係之元符元年六月十三日據實録乃六月十一日也先是涇原走馬承受利珣自熙河入奏與曽布具言前任鄜延見吕惠卿欺罔不公事狀云二子在前軍撓將佐職事又云李䕫吕濰止在塞門寨及賜茶藥即與隨軍一處受賜又云負犯停替選人隨軍冒賞不少又吕濰有壻姓李亦在軍前數受賞親戚故舊冒恩者衆人又云苗履討蕩歸㸃檢首級多嬰孩方退納未了間珣有涇原之命便牒珣云已差謝走馬替珣云走馬須交割職事不肯替遂召珣飲茶且語珣云官不容針私通車馬又欲特送珣五十壺意欲止其退難珣拒而不受又云惠卿獨親信王亢李希道云亢極無狀昨於塞門踏逐安逺寨地基去舊寨南十里四靣皆無以控扼賊馬來路及所築城寨多滅裂恐久不可守又云欲人呼作相公怒珣獨以觀文目之凡此語皆上聞上甚訝之仍云惠卿要人呼相公只為他要做耳三省密院同呈利珣劄子上亦頗道利珣語因及帥臣宰執親戚事曽布言臣昨辭向子莘恩賞正為此今吕濰吕淵皆當八九次推恩以至浮浪選人及至負犯停替人隨軍禁止因利珣今來極陳可以立法上深然之遂令立法再對上又云珣道惠卿事不一布曰城寨當如環慶差官㸃檢餘一一立法進呈次又許將嘗為布言章惇意欲以惠卿帥長安溫卿帥延安故於長安遲遲未肯差人布曰如此是誤朝廷與節鉞也布亦常以白上曰何敢如此布曰惇不曽與臣言但見許將云爾及利珣來極言鄜延城寨不如法令再任乃破其姦謀兼以他人代之必不免有言然則惠卿之欲帥長安可知已於是降詔十一月戊子布録在九月丙寅皆用珣言也上問宰執親戚為誰布曰向子莘是臣壻鄜延勾當李䕫是黃履甥章綖是惇姪惇曰綖已罷布再三對上曰黃履乞罷李䕫布曰如此則臣亦乞罷向子莘上曰甚好惇又言有甥黃宰為河東運司屬官亦乞罷於是子莘李䕫皆罷樞密院言請進築城寨部役使臣先於凖備將領凖備差使及部隊將使臣內差如不足許於本路州軍見任官內差又不足方許差得替待闕使臣據所築城圍大小差撥每百步部役使臣不得過十分其防托及般運官員使臣仍據實用人數差不得過有冗占都副壕寨隊部役防托使臣並候城池樓櫓畢工方得起離不得先回違者委統制官隨軍走馬承受覺察以聞諸路出寨討蕩進築除經略司所差隨軍使臣外許統制同統制官將帶使臣出界內統制官不得過五員同統制官不得過三員仍並指名申經略司差撥應文臣非應副調發錢榖材植及諸縣令佐部押人夫腳乘外並不得將帶隨軍出入其照管醫藥飯食之類並選差指使仍依近降指揮奏使臣充即停替負犯之人雖係大小使臣須曽有戰功才勇為衆所知者方得差使仍依近降指揮奏候朝㫖功狀令統制官具録一本關走馬承受使臣照㑹內有僞濫妄冒及不合隨軍之人令密具以聞如敢隱庇或失㸃檢其走馬使臣當議量事理輕重特行停替貶黜應於法不合隨軍之人雖立功勞並不得保明聞奏應兵將官及城寨使臣非職事相干及本路見任官因勾當公事經過並不得接見即因而有所請求并犯人並取勘奏裁仍仰經略安撫司轉運提刑司互相覺察聞奏走馬承受亦依此覺察施行已上違者並以違制論不以去官赦降原減從之新録無此舊録係之九日此段當即是十一日曽布所云上因利珣陳鄜延浮浪負犯停替人隨軍令布立此法也要合附十一日詔後己丑龍圖閣待制知瀛州虞䇿知永興軍龍圖閣待制知頴昌府盛陶知瀛州是曰三省樞密院同呈左司諫陳次升乞除永興帥衆皆曰久闕當除上曰誰可者章惇欲差虞䇿上曰無人且令去又呈髙陽帥闕上曰誰可惇曰盛陶或張商英上曰髙陽須兩制布曰若差即須與待制上曰自甚官除蔡卞曰太常少卿布曰曽直龍圖閣如吕嘉問亦是卞曰嘉問曽作修撰與商英不同上曰昨欲除權侍郎且不可况待制乎布曰商英久次與臣及惇將同時作檢正官資序已深兼以在外任使故議及上曰且用盛陶還了得否衆曰髙陽無事惇曰盛陶曽作髙陽通判必不可為上從之䇿陶商英皆布為三省發端三省固疑商英之難進也再對布言適所以長擬進商英者蓋欲與一在外差遣以資序深故欲以此處之上笑曰與一修撰外任可也䇿尋以親疾辭改知杭州知杭州寶文閣待制李琮知永興軍八月丙子䇿改杭琮知永興十二月二日丙子商英除修撰發運使皇城使髙州刺史帶御器械閻安為內侍押班三省樞密院進呈御史中丞安惇乞約束進築城寨差官員數及親戚冒賞等事大抵皆已行遂進呈訖布録己丑布稱大抵已行蓋十一日戊子已有指揮禁約也兵刑部言軍須納衲襖並隨器甲給納若應納而隱占服用或令人服用過三日者並以違制論即非緣戰守而輒借用若借人及借與人者凖此已上並不得以赦降原减從之新無吏部言諸州通判幕職官縣吏丞簿尉並日赴長官㕔議事通判幕職官仍於長官㕔或都㕔簽書當日文書從之辛卯蕃官東上閣門使雄州防禦使熙河州部落子將權涇原路凖備使喚李忠傑并皇城使賀州刺史河州部落子巡檢李世恭見令諭忠傑世恭今差往涇原熙河路宜立竒功當有厚賞忠傑世恭頓首謝各賜槍袍牌束帶等又問曽知天都山已入漢界事否忠傑對住坐處去天都不逺又問欲往熙河照管部族否忠傑對聖㫖令往則往上曰且令世恭暫往紹聖四年十二月末可考詔權發遣陜西轉運副使公事閻令與提㸃刑獄孫貫同共管勾鄜延環慶路計置糴買糧草應副軍須事涇原路經略司言進築沒煙前後峽兩寨畢工詔沒煙前峽以通峽寨後峽以蕩羌寨為名章楶以下第賜物有差紹聖四年二月二十八日初建議是七月八日推賞布録蕩羌作威羌當從實録熙河奏鍾傳出界殺獲三千餘級止有四百餘級在㑹寧以裏棄埋定驗有實餘皆在界外棄埋難以定驗詔張詢告諭將帥令依近日㫖陳首改正餘在界外棄埋體問將佐詣實保奏如將來彰露不實將佐重行黜責布録辛卯紹聖四年十二月二十一日鍾傳將熙秦兵出塞奏斬獲到四千級元符元年七月八日秦州勘驗鍾傳以十五級為千三百級九日又差徐彥孚合行制刑部言瀛州勘到知霸州李昭珙等昨為北人盜拆霸州橋入𣙜場殺傷人兵並無處置亦不豫為防備該赦詔昭珙降一官權通判冦毅並依衝替人例推官梁渙差替界河同巡檢王溥勾當𣙜場徐昌明各追兩官劉家渦莫金口巡檢賈嵒刁魚巡檢楊拯各追一官並勒停河北㳂邊安撫使東上閣門使資州刺史李諒落遙郡别與外任差遣副使劉方降一官機宜張棠差替始路昌衡歸自髙陽極言諒强愎自任恐生事曽布因言㳂邊安撫司亦纍有探報並無措置自當降黜上欲便行遣布請俟勘到霸州守倅一處行遣上許之及是乃責李昭珙冦毅等先差替在紹聖四年今又依衝替人例壬辰瀛州通判陸元長罰金二十斤以承勘北人入霸州𣙜場事不依朝㫖妄有申請故也詔以涇原路華亭縣步軍五指揮還熙河路先是熙寧中已撥𨽻熙河是年四月章楶乞還涇原既從之而張詢爭不已故有是命仍於秦鳯路撥五指揮赴涇原布録壬辰并章楶二年十二月十九日奏增入癸已將作監奏南郊青城奉㫖修建殿宇仍畫圖聞奏今具圖樣未敢依圖修建御批差入內東頭供奉官勾當御藥院劉友端同將作監管勾修置餘並依昨修北郊帷宫所得朝㫖等施行仍令本監同今來所差官再相度畫圖進呈取進止御集六月十六日事環慶經略司孫路言新築城寨所據橫山地土才十分之二三以巡綽所至則幾年若築之字平及威章巴定邊萌門四城寨畢則山界皆為我有蓋謂城寨之外百餘里間西人不敢耕種住坐曽布嘗病章惇以謂拓地已有次第而未知其實故遍下諸路問橫山起自何處至何處止東西南北長濶若干新舊城寨所據地土已及若干分數亦屢以白上而路所言地里不敢以不實但云四城寨畢則皆可有爾上覽之具見地里逺近之實甚恱甲午詔編修常平免役勑令格式成書詳定官翰林學士承㫖朝散大夫蔡京遷朝請大夫其餘官吏減年支賜有差明州言髙麗國今年七月遣使朝貢詔供備庫副使兼閣門通事舍人帶御器械向滓為引伴使內殿承制閣門祇候賈裕副之乙未户刑部言糴買糧草監門官以新縑帛香藥鈔入納到斛斗通理為糴數賞罰自客人陳狀限三日內納畢給與交鈔仍具元陳狀并納訖及給鈔月日申尚書户部㸃檢若本場監官等無故留難或須令改充和糴者並杖一百委提刑司㸃檢覺察從之新削丙申右司員外郎曽旻為左司員外郎考功員外郎謝文瓘為右司員外郎文瓘政和三年八月有傳國子監主簿周邦彥為正字是日左丞蔡卞乞罷徑出曽布奏事上諭卞稱病請去果有病否布曰卞素羸多病比以隂濕故多腹疾然人亦多如此者卞善自愛衣服飲食皆有節適不爾無以枝梧上曰人固當自愛惇多自肆布曰然亦多病向若下血痔疾及病臟腑輒五七日不能出上笑以為然先是卞以改元奏告南郊是日除禮部員外郎劉逵為國子司業逵吕嘉問壻蹇序辰之私而與二人者極不同士論頗稱之三省久議此除而卞以為不然㑹范鏜試人司業闕官遂進擬令逵暫權上曰何不便除更何權之有遂批㫖除之卞翊日造朝怒色可掬而知出於上㫖莫敢爭既而數在告至是又除謝文瓘為左司亦卞所不與而於十八日又先得上㫖不能奪以至此除趙挺之為中書舍人又欲進郭知章皆非其所欲卞又嘗欲引葉棣為左右史惇對上靣前斥之云棣作二小文字亦有病敗不可用道著一句却有三兩句道不著兼趣操存心衆所不與不可用又欲引鄧洵武吳伯舉亦不諧而所進用者又非其所好故積此不平因欲請去是日西府奏已赴觀音院又奏般行李骨肉出府界皆無宣諭薄晚乃遣劉友端封還文字今赴省供職後二日卞入三省樞密院奏事皆退立不與上亦不顧已而留身曲謝遂命友端押赴都堂上諭布曰卞請去甚堅須待再三入文字布曰無可去之理上曰無此理堅請别無事否布曰卞與同列多不同舊與章惇密今亦不同兼兄弟有嫌故不自安上曰卞兄弟不相得布曰不知但聞其妻頗不相歡上曰京亦有妻是甚人家布曰徐仲謀少卿家上曰兩人妻不相得布曰聞其如此上曰卞言無他只是羸病故欲去布曰勢安可去林希去尚未有人可代卞何可去上曰兄弟間是有嫌布曰然用京不若用卞上曰不同不同布曰誠如聖諭卞讀書畏義理誠與京不同上又曰不同不同布奏事退卞已赴都堂遂往都堂見之視事如故矣上嘗語今范仲淹章惇多詆之曽布曰仲淹知邊事自寶元西事以來每以取橫山為言兼立朝徑正乃仁宗時名臣蔡卞亦曰仲淹好處多在章獻時數以直言貶及仁宗親政却乞不深治垂簾時事此大節尤可稱布曰誠如卞言既退布竊獨怪卞知之而不能蹈之也布録六月末今附此戊戌河東路經略司言進築神泉寨畢工詔官員使臣等第轉官減年支賜有差四月十一日賜名布録河東神泉賞功又環慶乞築萌門寨從之祕閣校理陳師錫為考功員外郎布録云三省除師錫考功士論皆以為允蔡卞獨不恱墓銘云為考功踰年自來係請求補外之人知宣州己亥詔開封府界東西路都巡檢闕係樞密院選差應諸路州鈐轄非節鎮大藩者在第六等知軍州諸路都監之下除宗室聽依舊添差外其曽任將副諸司副使以上及閣門通事舍人特㫖許差者並差自來曽差人處或替雙員處都監闕已上內合帶權發遣者其請給並依州都監令新削應諸路以下辛丑樞密院言聞西界編欄人馬及人户此舊日盤泊逼近漢界深慮向去秋成賊馬糧草可資因此冦犯邊界共諸路斟酌敵情事勢出兵討逐仍所至蹂踐使賊失收成之望庶為我利詔諸路帥臣各乘伺間隙出界蹂踐討蕩務在探報精審决取勝捷仍具措置施行次第以聞布録涇原河東報西人頗近邊耕牧詔諸帥相度出兵擾之張詢奏乞今秋相度築齊訥納沁從之又乞李忠傑令章楶相度可遣即遣太常寺言諸光祿寺官今後每遇祠祭大祠已受誓戒後及中小祠散齊日分其約束事件並從祀儀禁止郊社令亦乞依此從之壬寅朝散大夫權河東路轉運使郭茂恂降為朝請郎以運糧草給軍雇車價小致擾民也布録茂恂降兩官守倅各一官三省樞密院奏鄜延大沙堆功賞應本將有官而更添差者以二人所合得賞分授并張若訥吕濰等更不推恩從之布録壬寅大沙堆功在五月十三日御史中丞安惇言伏思神宗皇帝聖神妙用固非當世俗儒之所能窺測至於勵精圖治明審庶獄天下莫不知之而元祐之初陛下未親政事姦臣乘時議置訴理所凡得罪於元豐之間者咸為雪除歸怨先朝收恩私室意者呼吸罪黨用為已助未審當時有司如何理雪儻出姦意不可不行改正欲乞朝廷差官將元祐中訴理所一宗公案看詳如合改正即乞申明得罪之意復依元斷施行詔蹇序辰安惇看詳內元狀陳述及訴理所看詳語言於先朝不順者其職位姓名别具以聞舊録以聞卞云正先帝刑法也新本削去元符三年六月十七日龔夬奏罷此指揮序辰先有是請上難之於是惇復建白蔡卞勸章惇使必行令序辰與惇及徐鐸同主其事自後緣訴理被禍者凡七八百人序辰及惇實啓之元符三年六月十七日云云可考曽布自叙云是月屢見三省言安惇既除御史中丞遂乞差官看詳元祐中理訴文字却依元斷施行既而取索到理訴者凡八百九十七人許將黃履及葉祖洽等皆因他人理訴得還所展磨勘年月三省以動衆稍遲之惇再章以謂聞廟論以人衆不可施行惟其人數多尤宜改正此乃元祐人欲彰先朝濫罰之多也三省聚議久之乃定得㫖但令惇及序辰看詳元訴狀詞及訴理所文字語言有於先朝不順者具姓名以聞已而又言令將親批聖㫖翊日再進呈乃下衆皆稱其平允此論本出序辰序辰於前年作右史日已嘗有章乞追改上留中不出今以付之亦以杜塞其紛紛也然猶乞别試所置司看詳限半年結絶尚有張皇之意但以得㫖如此諒亦無以增加爾此據曽布日録陳瓘尊堯集及餘言增修曽布日録論看詳訴理已附見紹聖三年三月二十一日王宜罷提舉時陳瓘尊堯餘言曰臣聞常立上殿時葉濤在史院曽布主葉濤哲宗之得見常秩行狀也卞等意布濤奏之於是又作訴理之事讎布與濤而罹訴理之禍者七八百人訖於曽布之事流離破敗而卞等報復之意猶未快也安惇傳惇為御史中丞奏訖委官取元祐訴理所公案看詳改正申明從初加罪之意復依元斷施行遂詔惇與蹇序辰徐鐸同看詳惇奏凡得罪於元豐之間者乞特出睿斷以勸沮天下自是復施行者千餘人又奏元祐初置訴理所將熙豐以來斷過刑名輒行奏雪訴謗先朝歸怨君父其元看詳官劉摯孫覺胡宗愈傅堯俞葉伸蘇嘉朱光裔吳儔陳郛乞加罪時摯等已譴逐伸等皆坐謫事在二年三月十六日按徐鐸傳乃不載同看詳訴理當考涇原路經略安撫使章楶言乞應沿邊諸州軍縣鎮城寨堡子糴買去處預揭榜告諭人户不得與官中爭糴增長物價如將來官中收糴不行嵗計闕乏即委所屬官根括停塌之家積蓄斛斗各計本家口數銷一全年所用斛斗外其餘盡依逐處和糴場價例收糴入官詔從之應陜西路凖此鄜延路經略司言差副都總管王愍統制諸將人馬出界與西賊鬬敵得功詔主將已下等第轉官減年支賜有差是日都提舉賈種民自修汴河歸上諭曽布種民修汴河乖方布曰種民言汴河作剌子乃發運司指揮渠所作束水未曽用兼不曽多費功料止費本司錢九千餘貫措置亦不至乖方但從初發省功費以集事勢必難集臣先曽敷陳以謂今須閉汴口一兩月用功開淘其水勢散漫處須用梢樁狹河即自通快上曰近日漕運全不可行布曰近得雨後水稍通已兩次防河大約茶磨費水最為汴流之患今已廢矣上曰須作水匱布曰種民昨不欲作水匱用心却可嘉蓋為百姓莊園廬舍墳墓皆須毁壞故以為難兼種民昨到水匱處百姓極有不遜之語故種民不敢當此事若其他有可經畫不與百姓爭此地亦所惠不細上云水匱必不可闕布曰若必不得已須為之上又曰種民却不至乖方然漕運却行不得布曰種民雖不乖方但無功亦可責上曰章惇主之布曰衆謂如此必是也御史蔡蹈劾種民措置乖方枉費功科乞先行放罷不從蔡蹈云云據蹈奏藁甲辰詔入內供奉官涇原路走馬承受利珣减三年磨勘仍依條比折賞職功也珣言鄜延走馬謝德方涇原王景先皆以親戚冒賞詔並放罷布録户部言提刑司提㸃坑冶鑄錢司各據所轄州縣坑冶催督敷辦祖額置籍勾考每嵗令比較增虧提刑司限次年春季提㸃坑冶鑄錢司限夏季各具全年增虧分數保明奏聞及申户部㸃勘韶州岑水潭州寶豐永興銅場逐路提刑司官每上下半年各巡歷一到本場按察㸃檢訖具措置利害及本錢有無闕備因依條畫聞奏及申户部從之新削大理寺言知彊盜及持杖竊盜之情而藏匿若過致資給及漏露消息令得行盜及隱避者並罪至死及應配者並配本州彊盜死罪情重者依重法地分窩藏法仍奏裁窩藏重法地分劫盜罪至死配逺惡妻子五百里編管再犯配沙門島以上盜者情重窩藏人當行處斬家産給半充賞即盜罪至徒流者配五百里妻子鄰州編管再犯配二千里並許人捕家産給三分充賞從之新削乙巳權河北路轉運副使兼措置糴便黃實進對實因陳鈔法之弊上曰錢鈔本以相權又問河北人材上曰今日人材之乏為甚然天下豈無人材它日上問曽布曰實如何布曰實亦惺惺曉事但林希嘗言其以女嫁蘇轍子陛下必得知上曰然又曰乃章惇甥也後又語及布因言實兩女嫁轍二子上曰不如是亦可使爾布録論實在壬寅今附此詔髙麗朝貢並依元豐條施行元祐令勿用舊云復先帝待遇髙麗法也新削去詔賜鳯翔府户曹參軍王之彥家絹二百匹以之彥赴沒煙峽宣勞致病死也先是章惇召曽布女壻衛尉主簿吳則禮令語布曰蔡黨見窺甚急當過為之備又曰有言元豐時不得舉辟執政親戚乞檢舉施行二十三日序辰云云仍云王斿𣙜貨正犯此言不可不知時五月壬申也後三日惇留對甚久其夕吳居厚過布言適奏事殿上上忽問何以舉王斿斿乃蘇轍門下士居厚曰元祐中在外故不知上又曰兼是曽布親戚居厚曰臣與斿鄉里故舊又臣曽知咸平縣舊吏民尚來見臣極稱斿治狀臣以此薦兼斿是通判資序𣙜貨亦監當場務爾無僥幸上曰只是有人來說既而進奏院報有㫖遵守元豐四年條制施行在京舉辟處不得舉執政有服親已前有舉者檢㑹取㫖布録在五月二十五日壬申及二十七日甲戍它日布奏事畢布録在六月四日辛巳因言臣竊聞臣寮言執政親戚不得舉辟在京差遣事臣實有外甥王斿提舉𣙜貨務正礙此條然此法乃元豐四年所降至元豐五年官制行內外舉官悉罷故此法亦廢後來稍復舉官法失於舉行此令上曰衆所不知吳居厚亦曰不知布曰此誠不知若非蹇序辰於史院檢見此條人不知有此法若此法見行豈惟臣所不敢吳居厚亦豈敢公然犯法事雖如此然臣身在政府不能使親戚逺嫌以致物論臣實有罪大臣當奉法守公以身率天下乞重行黜責臣亦足以警衆上曰本不知不妨兼王斿亦是蔡卞親戚布曰雖然臣自有罪豈敢更引他人以自解兼聞議者又言臣男纓亦是奏舉臣在政府有條一嵗得陳乞親屬一差遣臣男纓昨為開封功曹係用臣合得恩例申尚書省陳乞都省下吏部勘當依條差即非舉辟兼在任近一年却為路昌衡舉王幾作府推衝罷並不得嵗月路昌衡曽來謝臣云失契勘却不知王幾妨礙工曹臣云舉官豈得如此兼臣男雖衝罷自須却得一陳乞差遣一無所妨臣曽以此語葉祖洽祖洽云不惟如此祖洽有妻弟為府掾一日府官聚㕔昌衡對衆云近舉王幾却不知與功曹妨礙極以為慙竊聞議者亦謂王幾是臣親戚幾取臣妹臣妹亡已二十五年臣引幾以衝罷臣男似不近人情兼昌衡之言如此可見臣無所預上曰卿男已衝罷布唯唯上曰論者只是說王斿一人不曽及此兩事王斿是蘇軾轍門下人是否布曰衆皆言其如此恐必是上笑而已布又言臣自待罪政府以愚直故於議論之際多觸衆怒常恐不免有讒毁中傷之語非聖意主張保全何以得至今日上曰是是布又言序辰以謂大臣不與人為交私則可以展布四體盡心國事臣此心惟陛下可亮臣數對三省言吳居厚不可進擢居厚無不聞之在人情於臣但有怨怒臣必不與居厚為交私上笑曰卿斥居厚多矣安得有此布曰臣犬馬赤心不敢不盡陳於陛下然臣與王斿實有服親無以逃責臣未敢陳請待罪上曰不須如此布遂退祖洽語布曰惇於上前呈序辰所言乃云不干它人只是曽布親戚三人蓋得之黃履又言履云惇平時與布笑語甚歡才背後便别許將亦語人云此其小者其他毁傷之語有大於此者非一是曰六月二十八日乙巳詔王斿罷𣙜貨務户部官各罰銅三十斤開封舉張元禮亦然元禮乃林希壻也丙午吏部言官員係朝廷差出除在任人自理在任月日其非在任之人緣軍期邊事刑獄及往水土惡弱處聽理在任若朝廷差委勾當餘事如無稽違以二日折一日理為考任及三年已上者申尚書省樞密院審察事體重者取㫖或與理為一任從之涇原路經略使章楶奏近凖朝㫖節文令逐路帥臣更切講議如何措置可使賊不敢並邊耕牧住坐其已耕種去處即相度如何於鋤耘之際可以使其不得施工免致向去秋成資助賊糧别生邊患三月二十四日又五月二十七日詔可考臣契勘本路新築沒煙後峽寨咫尺天都最是因形勢困擾賊聚去處見委折可適子細體訪彼處耕牧住坐逺近次第若有機便欲於七月半間量數差發人馬乘月夜行往彼處攻討為倐往忽來之計臣前此兩次遣將淺攻苦無所獲或言賊衆前期知覺豫作凖備及四散遁逃今來舉動理須改圖竊欲少著人馬只用五七千騎已來所貴易為差發諸事祕密不至漏露兼選鋒鄉道之人得部落子方堪使喚近䝉朝廷差李忠傑并手下部落子二百人來本路至時决得隨軍出塞契勘環慶路蕃官皇城使慕化舊在臣麾下委是得力屢曽遣使隨逐折可適出入攻討彼此諳委肯相營助欲乞前期旬日間權暫於環慶路輟借蕃官慕化并部落子二百人及逐人腳下馬過本路使喚攻討了日便行發遣來往只是半月二十日之期黃貼子蕃官慕化日近因護築到本路臣密以前項擘畫問化并說與欲借助人馬之意化極欣喜願來本路使喚遂録到狀內所指部落子姓名今來所陳如䝉俞允即乞不顯事因直作朝廷指揮令化帶領所要人馬來涇原路幹當不得占留若說事因竊慮環慶帥臣歸罪於化外兼西賊耳目於環慶路最長彼探知時暫於他路差發過人馬來涇原必料欲往淺攻如此則雖出無益也又狀內所指期日未敢决定容臣更切探伺量宜展縮若賊中添屯人馬嚴作隄備或是住坐去處地里大逺即亦難為必去攻討只緣乞差發他路蕃兵理須預有奏陳樞密院奏勘㑹涇原路近進築沒煙前後峽城寨了當去天都咫尺乃西賊必爭之地兼西人近於隆德寨九羊谷以來出沒又於柳溝假大道穿㙭作壕深慮賊馬不測侵犯邊界合要知次第人率衆伏截掩殺本路闕少得力蕃官使喚其環慶路蕃官皇城使慕化熟知蕃界山川道路可以為鄉導出入須至權暫差那帶下項部落子前去涇原路應副出入使喚其環慶路雖於今秋有舉動去處緣今來只是差慕化一名并手下部落子二百人騎即於本路未至闕事須議指揮詔令環慶路權暫輟那蕃官慕化及上件部落子二百人騎暫赴涇原路經略司凖備出入使喚限七月半以前致涇原路仍等第量支與盤纒錢無令有所陪備及不得更有奏請占留住滯仍令涇原路照㑹收管候到優與存恤照管候慕化等指引得本路人馬知出入把截次第立便遣還環慶路其占留存在本路不得過一月六月二十四日布録令諸路帥相度擾耕故以此奏附六月末旬此須别加刪修吏文太多故也章楶又奏本路去年進築平夏城靈平寨了當添置十一將後來接續修築鎮羌九羊通峽蕩羌共四寨雖已逐旋那移馬步軍前去至今不曽别置將名今乞以通峽蕩羌并九羊寨三處見管防守正兵及新招弓箭手馬步軍共為第十二將仍乞以勒停未叙復人前皇城使成州防禦使折可適為正將降授供備庫副使曲充為副將或朝廷以謂追奪未久未經叙復即乞且令權管職事從之楶以元符元年六月二十八日奏八月七日又奏十九日乃得請今并附此或移入八月十九日
