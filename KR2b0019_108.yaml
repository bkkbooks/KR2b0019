body:
  text: 續資治通鑑長編巻一百四宋李燾撰仁宗天聖四年春正月癸未契丹遣樞密副使彰武節度使蕭廸烈歸義節度使康筠來賀長寜節廸烈等既來賀契丹又使人持酒果與廸烈等上問宰相王曾曰契丹齎送酒果者凡三十餘人已至莫州可聽其來否曽曰宜止其來而以州兵代之轉酒果付廸烈等可也上曰善己亥命知制誥章得象侍御史知雜事韓億與吏流内銓南曹同試百司人上因曰比閲天下奏吏出職者率多敗官何也王曽曰士人入流必顧亷恥若流外則畏謹者鮮州縣雖卑然最近於民宜少澄其原乃詔得象等精加考試秘書監致仕胡旦言撰成演聖通論七十巻以校正五經家貧不能繕冩奏御庚子賜旦錢十萬米百斛知益州薛田言兩川犯罪人配𨽻他州雖老疾得釋者悉留不遣自今請無放停上曰遠民無知犯法而終身不得還鄉里豈朕意乎察其情有可矜者聽遣還涇原路走馬承受公事入内供奉官王從徳言與知鎮戎軍王仲寳本路都監李道史能破原州界康努卜族焚巴溝首領布阿等六門帳子七百餘所斬首七十九級獲牛羊馬驢噐甲千計賜噐幣有差仲寳傳云破康努卜族得首領百五十馬羊七十詔奬其功與此數稍異今從實録辛丑詔陜西弓箭手毋得典買租賃蕃部土田其蕃漢願合種者聽之甲辰上謂輔臣曰駙馬都尉柴宗慶求為使相如何王曾對曰先朝石保吉魏咸信皆歴行陣有勞晩年方除使相且將相之任豈容私請上曰固也卿等可召宗慶諭之御書院言翰林待制太子中舎同正王文慶乞授正官出職上欲與大理評事以問宰相宰相言若除正官則流品不分矣請且如舊制遷同正官從之初涇環州屬𦍑作亂陜西轉運使王博文劾奏周文質王懐信擁兵玩冦耗邊食請用曹瑋及田敏代之文質等既坐法丙午徙知天雄軍彰化留後曹瑋知永興軍使節制邊事從博文之言也瑋尋以疾免行復知天雄軍天雄卒有犯盜者衆謂獄具必殺之瑋乃處以常法或疑而問之瑋笑曰臨邉對敵斬不用命者所以令吾衆非喜殺也平時治内郡安事此乎博文𫝊稱瑋以病不行乃用敏為涇原路總管㓂遂平按敏𫝊卒無涇原之命雖復為環慶總管乃天聖元年四月恐博文𫝊誤也今不取二月戊申朔置上御藥供奉四人御藥院掌按驗秘方和劑藥品以進御及供奉禁中之用至道三年始置以入内供奉官三人掌之或參用士人於是别置上御藥供奉其品秩比内殿崇班専用内侍其後多至九人庚戌玉清昭應宫使王曽請下三館校道藏經從之上因言其書多載飛煉金石方藥之事豈若老氏五千言之約哉張知白曰陛下留意於此乃治國清淨之道也甲寅詔官吏犯贓至流而按察官不舉者并劾之己未保大節度使錢惟演言次子大理評事晦乞換内殿承制詔授内殿崇班晦娶駙馬都尉李遵朂女即冀國大長公主所生也故特從其請浙江抱餘杭據岸為二閘互啟閉納溫台衢婺船而潮壊北閘久不治兩路船為之稽壅辛酉侍御史方謹言始奏復之壬戍遣官祀九宫貴神上因謂輔臣曰祠日適與真宗大忌同其施樂耶王曽曰但設而不作爾又問古今樂之異同曽曰古樂用於天地宗廟社稷山川鬼神而聽者莫不和悦今樂則不然徒娯人耳目而蕩人心志自昔人君流連荒亡者莫不由此上曰朕於聲技固未嘗留意内外燕遊皆勉强耳張知白曰陛下盛徳外人豈知之願令吕夷簡備書時政記庚午并代部署司請置西界和市場從之甲戌䕫州路歸順等州蠻人田思欽等三百二人來貢方物樞宻院言入貢人多本路轉運使不先奏聽㫖詔劾之乙亥濬京西諸河詔内藏庫副使安繼昌殿中丞宋可行權提舉制置左右廂店宅務入内押班江徳明言課利虧少舊額故也候課利及額即罷提舉同管勾河沿邊安撫司王世文奏代州界寳興軍寨主李繼忠見任右班殿直新差監押王格乃左班殿直職序非便恐致不和望下三班院自今凡監押職位須在寨主之下從之仍移王格他任三月戊寅朔以翰林學士承㫖兼侍讀學士工部尚書李維為相州觀察使初塞下訛言契丹將絶盟故遣維徃使契丹主素服其名館勞加禮使即席賦两朝悠乆詩下筆立成契丹主大喜既還上欲用為樞密副使或斥維與契丹詩不當自稱小臣沮罷之乃加刑部尚書維久厭書詔之勞辭不拜引李士衡故事求換官故有是命左正言劉隨奏維以詞臣求換武職非所以勵亷節不報尋命維知亳州事簡不欲尸重禄請赴相州從之要知沮罷者姓名己卯徙知秦州右諌議大夫集賢院學士薛奎知益州加樞密直學士以給事龍圖閣直學士王隨代之秦民與夷落數千人列奎治狀詣轉運使請留賜書襃諭不許辛巳許上御藥供奉藍元用等封贈父母妻元用繼宗養子也御史臺自薛奎後中丞闕久不補侍御史知雜事韓億獨掌臺務踰年壬午始命權知開封府王臻權御史中丞臻建言三司開封府諸曹參軍及赤縣丞尉率用貴游子弟驕惰不習事請易以孤寒登第更仕官書考無過者為之又言京百司吏人入官請如長定格歸司三年皆可其奏依長定格元年五月李孝若已有此奏請不知臻何故復言之當考中書言諸路轉運使提㸃刑獄皆别置勸農司文移取索頗為煩優請自今勿置司行遣但令躬領使事庶幾實恵及民甲申詔從其請罷諸路勸農司轉運司提㸃刑獄仍令領農使如故己亥鄜延路總管司言蕃部首領曹守貴等一千八百餘戸内附甲辰前權三司使李諮落樞密直學士前領計置司劉筠王臻范雍蔡齊俞獻可姜遵周文質各罰銅三十斤樞密副使張士遜參知政事吕夷簡魯宗道各罰一月俸先是入内押班江徳明𫝊宣下御史臺鞫三司孔目官王舉勾覆官勾獻等天聖元年五月從三司改法許商人河北陜西縁邊入中糧草給以顆鹽白􅈨等不指定慈州晉州􅈨分數致商人多請慈州􅈨而浸以虧官又天聖二年令具計置縁邊糧草數舉等乃以逐路夏秋稅賦并两川物帛所博糧草通作三司計置防邉所増及未改茶法時不折計虛實錢而妄稱賣茶課増一百四萬餘貫以覬恩賞朝廷以為然遂賜舉等各銀五十兩絹三十匹至獄具决配獻沙門島而舉已前坐事配宿州以士遜夷簡宗道嘗主變法之議詔令分析士遜因言措置更革皆不出已夷簡則言天聖初環慶等數路奏芻糧不給京師府藏常闕緡錢吏兵月俸僅能取足自變法以來京師積錢多邊計不聞告乏中間蕃部作亂調發兵馬仰給有司無不足之患以此推之頗有成效惟是三司比視數目差互不同非執政所能親自較計而宗道所言亦略類夷簡竟坐不合以舉等状施行故及於罷詳定所孫奭等特釋之士遜等分析據本志附見李諮三年九月已罷三司使改樞密直學士知洪州此更落密直也本志誤云罷三司使今不取安徳節度推官李佑唐莊宗曽孫也上書求便官以掃灑陵廟夏四月丁未朔改授李佑西京留守推官因謂輔臣曰唐莊宗百戰滅梁始有天下不務修徳而溺於聲樂嬖用伶官以及於禍良可嘆也王曽對曰陛下日聽政事又覧前代治亂之迹以為龜鑑天下之福也辛亥還知寜州職方員外郎楊及所獻綉佛初及因乾元節來獻上謂輔臣曰及佞人也民安政舉乃守臣之職焉用此為遂令邸吏還之壬子詔京西河北淮南諸路榖價翔貴而富家多蓄藏以邀厚利宜令所在平其價以濟貧民又詔外官代還以公租餘俸市物者聽之若市物虧價及公為商販者論如法江州言太平興國真君觀有盜神像金冠者請下文思院更製上曰觀僻在山谷間而以金為冠是誨人為盜使陷重辟宜代以銅而金塗之王曽退言慮民抵罪而易金以銅可謂仁矣乙卯内出後苑雙頭牡丹芍藥花圖以示輔臣仍令館閣官為詩以獻丁巳契丹遣啟聖軍節度使蕭諧利州觀察使李紹琪來賀乾元節天聖初驍衛上將軍張美曽孫女與郭后同入宫上意屬之將選為后而太后固立郭后於是以張氏為才人戊午以光禄卿知汝州王曙為給事中知潞州上黨民王氏誣伏殺繼母獄已具僚吏皆以為無足疑者曙獨曰此可疑也既而提㸃刑獄杜衍至更訊之果得真殺人者曙因作辨獄記以戒獄官衍山隂人天禧末知乾州時陳堯咨安撫陜西有詔藩府乃賜燕堯咨至乾州以衍賢特賜宴仍奏徙衍權知鳯翔府及罷歸二州民邀留於境上曰何奪我賢太守也衍事附見賜宴據衍正𫝊附𫝊無之又按天禧四年閏十一月陳堯咨安撫陜西所至即犒設官吏将校不聞止限藩府也當考甲子翰林學士夏竦言江西閩越之民多採山澤大龜倒植埳中生杙去肉取其甲謂之龜筒痛楚之聲所不忍聞得直至㣲而殘物尤甚請嚴禁止又請於金山大孤小孤山颺瀾左里馬當長蘆口别置游艇募水工拯救危溺並從之辛未詔罪人當令衆者自五月盡七月免之壬申詔修西川閣道是月免諸州軍犂具稅錢時高郵軍民買犂具而稅務令民納錢本軍以為言故有是命此據㑹要五月丁丑以知制誥蔡齊章得象並為翰林學士時舎人院無知制誥待詔翰林學士夏竦草詞己卯詔禮部貢舉進士實應三舉諸科五舉並免取解判刑部燕肅上奏曰唐大理卿胡演進月囚帳大宗曰其間有可矜者豈宜一以律斷因詔凡大辟罪令尚書九卿讞之又詔凡决死刑京師五覆奏諸州三覆奏自是全活甚衆貞觀四年斷死罪二十九開元二十五年才五十八今天下生齒未加於唐而天聖三年斷大辟二千四百三十六視唐幾至百倍京師大辟雖一覆奏而州郡之獄有疑及情可憫者至上請而法寺多所舉駮官吏率得不應得之罪故皆増飾事状移情執法失朝廷欽恤之意望準唐故事天下死罪皆得一覆奏議者必曰待報淹延臣則以為漢律皆以季秋論囚又唐自立春至秋分不决死罪未聞淹延以害漢唐之治也下其章中書王曽以謂天下皆一覆奏則必死之人徒充滿狴犴而久不得决請獄疑若情可矜者聽上請壬午詔曰朕念生齒之繁抵冐者衆法有髙下情有重輕而有司巧避㣲文一切致之重辟豈稱朕好生之志哉其令天下死罪情理可矜及刑名疑慮者具案以聞有司毋得舉駮王偁東都事畧詔曰國家勤卹黎庶必期無訟而生齒之繁犯者頗衆朕甚憫焉癸未徙南儀州於岑雄驛以舊州在山險中多瘴霧之毒吏民嵗死者衆故也戊子御崇政殿録繫囚辛卯詔館閣校勘自今毋得増員時樞密副使張士遜請以其子友直為校勘上謂館閣所以待天下英俊不可私授止令於館閣讀書且降是詔己亥詔舉人雖文辭可採而操檢不修者州郡毋得薦送辛丑陳王元份女華原縣主為門客鄭諫求補齋郎不許詔入内内侍省提舉郡縣主諸院公事所自今無例而乞恩澤者勿以聞太常丞桑慥授監察御史慥有至行朝廷聞之中㫖特有此授此據㑹要桑慥事迹當考閏五月戊申定江淮制置發運司歲漕米課六百萬石初景徳中歲不過四百五十萬石其後益至六百五十萬石故江淮之間榖常貴而民貧於是都官員外郎呉耀卿請約咸平景徳中歲漕之數立為中制故裁減之然東南灾儉輙減歲漕數或百萬或數十萬又轉移以給它路者時有焉灾儉減數以下據本志呉耀卿胡則之黨見戚綸𫝊不詳邑里初李諮等變法使茶園户負歲課者如商人入息後不能償至是太湖等九場凡逋息錢十三萬緡詔悉蠲之己酉詔初補太廟齋郎自今並赴宗正寺公參初解州之永豐渠始後魏正始二年都水校尉元清引平坑水西入黄河以運鹽而周齊之間廢絶隋大業中都水監姚暹决堰濬渠由陜入解縣唐末至五代不復治至本朝湮淺舟不通鹽運大艱主運者耗家産幾盡州校麻處厚詣闕訴而右班殿直劉達因請治渠起安邑至白家場轉運使王博文亦言其便復詔三司度利害是歲卒成之公私果利壬子録左班殿直王貴子得哥為三班借職名曰秉節以貴與蕃賊戰死環州木波鎮特卹及之甲子詔輔臣於崇政殿西廡觀侍讀學士宋綬等讀唐書上曰朕覧舊史毎見功臣罕能保終始者若裴寂劉文静俱佐命元功不免誅辱王曽對曰寂等之禍良由功成而不知退也綬兼勾當三班院因請解所兼專事勸講皇太后命擇前代文字可資孝養補政治者以備帝覽遂録進唐謝偃惟皇誡徳賦又録孝經論語要言及唐太宗所撰帝範二巻明皇朝臣僚所獻聖典三巻君臣政理論三巻上之丁卯洛苑副使知石州髙繼昇為禮賓副使初繼昇為奴高遇誣告嘗遣捉生馮訓及奴李文徃茭村碩爾族與其部酋謀叛下御史臺鞫之無叛状詔杖殺遇而繼昇亦坐使人毒殺李文上以繼昇父文岯自河西來歸繼昇又久在石州故特寛之杜衍𫝊云繼昇為僕誣告捕繫數百人久不决衍覆得僕所誣状卒論殺之衍實河東路提刑今此云下御史臺則非衍所與也當考辛未吏部郎中知制誥知汝州張師徳為右諫議大夫罷職師徳孝謹有家法不交權貴時相頗不悦之然亦自多病故在西掖九年卒不登翰苑師徳初試知制誥屬詞淹緩日晏猶未畢執政使人語以且封起翌日終篇具言於上曰此人有徳行宜備顧問真宗即擢用之江休復云王曽實當國此誤也按師徳除知制誥乃天禧二年十一月時王曽罷參政逾年矣向敏中王欽若實為宰相張知白李廸參政薦師徳者或是知白與廸必非曽也今沒其姓名仍取其事附見於此詔増西川廣南東西路諸州軍進士解額有差又詔命官鎻㕔應舉自今更不先試所業下第者免責罰仍聽再舉其歴任有贓私罪及停廢責降衝替未經叙用人即不許應舉舊制鎻㕔應舉者先於所屬選官考試所業方聽取解至禮部程文紕繆者勒停其不及格者猶贖銅永不得應舉至是上欲開誘進士之路下近臣叅議而降是詔下第免責景祐元年四月又有詔盖此専指下第者又被及不得觧者六月丁丑詔吏部流内銓選人八考入令録舊與初等幕職官自今並與兩使職官戊寅詔近臣舉諸司使至閤門祇候堪邊寄及三班使臣能捉賊者各一人以名聞莫州言大雨壊城壁辛巳詔河中府陜州慶成軍民為安邑畦户者三年一代之願長役者聽癸未賜環州縁邊巡檢供奉官閤門祇候髙繼嵩等噐幣有差以瑪爾黙族㓂邉而繼嵩等率衆捕撃有勞也丙戌福建路提㸃刑獄司言建州劔州邵武軍大水壊官私廬舎七千九百餘區溺死者百五十餘人詔賜被溺家米二斛貧不能收斂者官為瘞埋之庚寅大雨震電平地水數尺壊京城民舎壓溺死者數百人辛卯上避正殿減常膳壬辰上謂輔臣曰霖雨為灾豈朕之不徳所致耶王曽對曰臣等之責也退而各上章求罷不許賜在京諸軍班緡錢放官房錢三日遣使體量畿内田苖詔被水之民權寓止於閭巷者令新舊城裏都巡檢存視之癸巳以西上閤門使曹儀洛苑副使内侍押班江徳明提舉修葺在京營房庫務内殿崇班麥守忠相度疏導積水河中府鄭州言大水甲午賜汴河禁卒緡錢凡汴水長一丈即令殿前馬歩軍禁卒縁岸列舖巡䕶以防决溢及五晝夜即賜以緡錢乙未詔臣僚因南郊或乾元節奏薦親屬自今毋得乞進士及第并同出身丁酉徳音降天下囚罪一等徒以下釋之畿内京東西淮南河北民田被水者蠲其租流徙者所在撫存之戊戌羣臣上表請御正殿復常膳不允表三上乃從之庚子度支判官太常博士王咨供奉官閤門祇候張繼恩為京西路體量安撫癸卯詔咨等察官吏能否及民間利害省轉運司配率之擾民者其三司見理欠負定限科校無可償官及㑹赦合放而有司未即行者畫一以聞又詔三司所在官物為水漂失者皆蠲除之水之作也宰執方晨朝未入俄有㫖放朝王曾亟附中使奏曰天變甚異乃臣等燮理無状豈可退安私室恬然自處亟請入見陳所以備禦之道同列有先歸者聞曽如是皆媿服焉時又𫝊言汴口决水且大至都人恐皆欲上奔上以問曽曽曰河决奏未至此第民間訛言相驚不足慮已而果然初行慶闗大水汜水縣尉劉文蔚父母妻子七人監酒稅借職馮益男女二人皆溺死詔以文蔚為懐州録事參軍免持服仍賜錢十萬益為奉職賜錢五萬河陽推官劉利涉拯救庫務官物存者居多體量安撫王咨等乞旌其能詔遷利涉京官就知汜水縣事秋七月乙巳詔三司選人嘗借俸錢未償而物故其蠲之初汴水大漲衆洶洶憂京城乃用樞宻院奏敕八作司决陳留隄及城西賈陂崗地洩之於䕶龍河水既落命開封府界提㸃張君平調卒復治其隄防丙午賜役卒緡錢戊申御長春殿復常膳乙卯復太常博士同判邵州鞠詠為監察御史從中丞王臻之請也壬戌知雄州張昭遠請下轉運司歲委官磨勘四𣙜場入中錢銀數中書言先朝置𣙜場亦通南北乃綏懐遠人之意非計貨易之利也若毎歲磨勘恐乖事宜上曰昭遠所奏固不可行也除冀州堂陽縣界乾度錢乙丑工部郎中龍圖閣待制韓億為契丹后生辰使崇儀副使田承説副之詔億名犯北朝諱權改曰意承説皇太后之姻也庸而自専妄𫝊皇太后㫖於契丹曰南北歡好𫝊示子孫兩朝之臣勿相猜沮億初不知也契丹主命别置宴使其大臣來伴且問億曰太后即有㫖大使宜知之何獨不言億對曰本朝毎遣使太后必於簾前以此語戒敕之非欲達於北朝也契丹主聞之大喜舉手加額曰此兩朝生靈之福也即以語附億令致謝時皆美億能因副介失辭更為恩意焉此據蘇舜欽所作億墓誌及江休復雜志刪修置開封祥符縣丞各一員仍令吏部銓注幕職令録有出身人時兩赤縣簿尉多差出在外縣事頗失經理故也罷永興軍秦坊等州新醋務初轉運司言民間買官糟造醋頗有遺利已置務𣙜之請推其法天下王曽曰𣙜酒蓋出於前代之不得已今以經費至廣未能省去若又𣙜醋則甚矣故罷之賜河北州軍修坊城役卒緡錢丙寅遣户部判官度支員外郎高覿如京副使高志寜徃河北經水灾州軍體量安撫覿蘄人也開封府言新舊城為溝注河中凡二百五十三恐閭巷居人棄灰壊咽流請責吏邏巡察其慢者從之辛未詔兩川所造錦綺鹿胎透背欹正等歲減上供之半其大小綾及花紗仍令改織絹以供邊費先是上封者以此為言上謂輔臣曰朕意政欲如此宜亟行之王曽等曰錦綺纂組有害無益臣約一錦之費可為絹數匹陛下崇儉節費以恵遠人臣等敢不奉詔國子監闕學官壬申詔諸路轉運司所部幕職令録京朝官有通經術長於講説者以名聞上嘗謂輔臣曰比以大暑罷講讀適已召孫奭等說書卿等公事退可暫至經筵王曽曰陛下萬幾之暇留意經術雖炎暑不輟有以見聖學之高明也詔兩川弓手自今不得僱人代役犯者許隣保紏告重行科罰時吕夷簡自益州安撫回言川中豪民多僱人以代役多得惰農毎執兵仗悉不堪用故示約束八月戊寅改故秦國成聖繼明夫人劉氏為秦國肅明賢順夫人前禮部尚書贈右僕射諡康懿任中正卒中正事母孝初責鄆州自言母老得還守故郡既遭母䘮中正亦遽死毁故也庚辰免京西被水災民牛稅辛巳前權石州軍事判官馮元吉循一資仍賜五品服以其嘗辨寃獄活二人死故也先是審刑院常議官太常博士館陶王沼上疏言漢唐之初兵革纔定未暇治外侮則屈意以講和承平之後兵力有餘而外侮不已則以兵治之孝武之於匈奴太宗之於突厥頡利是也春秋内其國外諸夏内諸夏外四裔明王者之興當先正京師乃正諸夏諸夏正乃正四裔以漸治之自近者始也宋興七十年四海之内莫不臣妾可謂諸夏正矣然而北敵桀驁數侵深趙貝魏之間先朝患征調之不已也故屈與之盟然彼以戈矛為耒耜以攻略為商賈而我壘不堅兵不練徒䂓䂓於盟㰱之間豈久安之䇿哉夫善禦敵者必思所以務農實邊之計河北為天下根本其民儉嗇勤苦地方數千里古號豐實今其地十三為契丹所據餘出征賦者七分而已魏史起鑿十二渠引漳水溉斥鹵之田而河内饒足唐至徳後渠廢而相魏磁洺之地並漳水者屢遭决溢今皆斥鹵不可耕故縁邊近郡數蠲税租而又牧監芻地占民田數百千頃是河北之地雖有十之七而得租賦之實者四分而已以四分之力給十萬防秋之師生民不得不困也且牧監養馬數萬徒耗芻豢未嘗獲其用請擇壯者配軍衰者徙之河南孶息者養之民間罷諸坰牧以其地為屯田發役卒刑徒佃之歲可獲榖數十萬斛夫漳水一石其泥數斗古人以為利今以為害繫乎用不用爾願募民復十二渠渠復則水分水分則無奔決之患以之灌溉可使數郡瘠鹵之田變為膏腴如是則民富十倍而帑廪有餘矣以此馭敵何求而不可詔河北轉運使䂓度以聞同判洺州王軫獨謂不然㑹沼遷監察御史復奏曰渠田起於戰國魏襄王時東有全齊西有强秦韓楚在其前燕趙居其後干戈歲動封疆日蹙茍不盡其地利則為强國所吞故史起謀曰魏氏之行田也以百畝鄴獨二百畝是田惡也漳水在其旁西門豹亦不知用請引之以溉鄴以富魏之河内臣考觀記𫝊但載灌溉之饒不書疏導之法惟相州圖經稱天井堰魏武帝所作二十里分十三墱毎墱相去三百歩令互相灌注故左太冲魏都賦云墱流十二同流異口詳此則古漳水淺不與岸平必就岸開渠臨渠作堰則水流渠内渠灌田中蓋為渠之初必就高阜渠行數里方達平田若水與岸平田岸相接為渠甚易溉田不難則久已開治矣又豈假臣言而後隱度哉臣聞韓欲疲秦無令東伐乃俾鄭國說秦鑿渠引涇水並北山東注洛三百里欲以溉田中作而覺鄭國乃曰為韓延數年之命為秦建萬世之功秦以為然卒使就渠夫以强秦之力而鑿一渠而曰欲疲之鄭國又云為韓延數年之命則是舉秦國之人役之數年然後成持此較彼則史起之引漳水也豈一朝一夕之功哉是必歲役萬人數歲而後獲其利又鄭國鑿渠並北山東注洛三百里則是相高仰之地以為渠不與平田接明矣非若此則澆溉之利豈能遠及三百里哉臣詳王軫所度漳渠大率謂水卑岸高渠已湮塞軫曰功大則亦然爾若云水濁不可以溉及所作堰遇川溢必復壊則是軫等不知溉田之方作堰之法臣按鄭白渠之引涇水也在耀州之雲陽三原富平及京兆府之涇陽高陵櫟陽六縣沼渠皆立斗門多者置四十餘所以分水勢其下别開細渠則水有所分民無奔注之患且涇水一石其泥數斗故能溉糞禾黍今言水濁不堪以溉斯豈軫之不知而自為知耶又其作堰之法皆用大石方四五尺者錮之以鉄積於中流擁為雙泒其南流為涇水其東流為二渠故雖駭浪不能壊若不如此則是歲輙修治豈有利哉故漳水之岸若復渠田請訪諸雲陽擇水工十數就摹古人作堰決渠之法及觀今人置斗門溉田之方或雲陽民犯罪當配者令皆徙相州教百姓水種陸蒔之利則謀易成矣至如北邊本無水田後徙江南罪人轉相教語皆知水利臣嘗建請命水工詣鄭白渠觀疏導之制亦慮磁相民不知作渠法爾又王軫謂不開舊渠而截河作堰當役七十五萬餘工若從渠口穿一丈四尺當役十三萬餘工以臣籌之若渠開二丈四尺則作堰之工可損半當併役五十萬工日役萬人五旬而罷依鄭白渠之法采岯山之石取磻陽之木給黎城之鉄扼中流據長岸資木石之固以為堰上為大渠疏導別泒沼渠數里分置斗門溉餘之水東入御河或遇漲溢奔注則以棧塞渠口其磁魏邢洺既居下流隄岸又淺或餘波可及别渠可穿則所謂鄭國在前白渠起後又曰首起谷曰尾入櫟陽也夫如是復三百年廢迹溉田數萬頃雖役萬人數歲而畢不足為勞且王軫謂開古渠則穿掘民田况萬金都領首等渠尋之無迹凡溝渠豈有不占民田哉此雖史起復生亦不知計之安出其萬金諸渠亦在田中但嵗乆堙沒爾軫稱髙平渠民有牒訴税籍已重雖得水以溉利猶不充臣所作堰蓋欲利民軫乃不思先議増稅致其憂疑不願澆溉斯豈卹民之意或又以堰成之後安陽水減不可勝舟慮失闗市之稅夫以一渠之流不過減河數分孰謂舟不通茍利於民雖捐征税其亦末矣軫不尋今古利害徒采野人下卒之語以斟酌三百年廢渠之迹安能盡其術乎昔西門豹賢臣也史起尚以為不知用是不智也况野人鄙卒能知此耶𫝊曰民可與樂成不可謀始若俯從臣議恢復農功則禹之疏濬川澤周之均别廬井無以加矣詔俟大河畢役就度工而事終寢丙戌詔減廣濟軍諸應役人先是知軍范諷言本軍地方才四十里距曹州甚近而戸口不及一縣其差役乃與他州等請還𨽻曹州或割曹濮單近縣户三五千以𨽻本軍下轉運司相視言軍不可廢故於諸差役裁減之丁亥詔修泰州捍海堰先是堰乆廢不治歲患海濤冐民田監西溪鹽稅范仲淹言於發運副使張綸請修復之綸奏以仲淹知興化縣總其役難者謂濤患息則積潦必為災綸曰濤之患十九而潦之災十二獲多亡少豈不可乎役既興㑹大雨雪驚濤洶洶且至役夫散走旋濘而死者百餘人衆譁言堰不可復詔遣中使按視將罷之又詔淮南轉運使胡令儀同仲淹度其可否令儀力主仲淹議而仲淹尋以憂去猶為書抵綸言復堰之利綸表三請願身自總役乃命綸兼權知泰州築堰自小海寨東南至耿荘凡一百八十里而於運河置閘納潮水以通漕踰年堰成流逋歸者二千六百餘户民為綸立祠令儀及綸各遷官令儀陳留人仲淹呉人也張綸兼權知泰州乃五年八月辛卯綸及胡令儀遷官乃六年七月甲子朔今并書之仍别出戊子命官考試開封府國子監舉人宰臣王曽等因言自唐已來遴選儒臣授以文柄可否進退委之攸司或升黜之間不副公議即覆行考試嚴加懲責比來條目繁密闗防周至善則善矣然於推心責成揀賢㧞俊之理恐未允愜今言事者必曰此皆先朝舊規不可輕議改革殊不知先帝孜孜選士務要盡公思皇之念本不如此蓋當時近臣不悉淵𠂻罔知大體有此擘畫更乞聖慈漸次體當事理此後别加詳定上然之詔押賜外州軍衣襖舊皆差伎術官比來宗室戚里多以親屬干請至有諸司使副及京朝官為之煩擾州縣自今一切罷之己丑詔施州溪洞安遠天賜保順州南州順州等蠻入貢京師道路遼遠自今聽以所貢物留施州其當賜物就給之願自入貢者毎十人許三兩人至京師其首領聽三年一至從轉運使北海王立之請也記聞以為從王立之請据㑹要乃密院措置今參取之乙未以右諫議大夫權三司使范雍為契丹生辰使東染院使帯御噐械侯繼隆副之起居郎知制誥徐奭為正旦使供奉官閤門祇候裴繼已副之淮南江浙荆湖制置發運使刑部郎中張若谷為契丹后正旦使右侍禁閤門祇候豈準副之己亥詔沿蕃官毋納降户九月甲辰朔詔自今配𨽻軍人其妻子並日給口食至配所乙巳以陜西轉運使侍御史王博文為兵部員外郎户部副使時三司闕官中書議除人上曰頃者蕃部侵擾西邊博文饋軍有勞此可用也乃驛召博文遷官就職戊申三司請市糴芻粟上因問輔臣諸坊監牧馬幾何王曽對曰當今比五代馬多數倍計芻秣費歲不下數百萬蓋措置利害失其要若以陜西蕃部入中馬立定數餘聽民間市易二三年間必有蕃息此與畜之外廐無異也外厩之說已前有之不妨重見也且祖宗舊制以羣牧司總天下馬政其屬有左右騏驥院分領左右天駟監左右天厩坊其畜病馬有牧飬上下監牧兵校長有提舉指揮使副使員僚十將節級獸醫槽頭刷刨長行調上乗有小底諸監之在外者知州通判兼領之各據芻地列棚井課士卒春夏出牧秋冬入厩孶息有賞耗亡有罰其為條教甚備然馬之孶息不足以待國用常市於邊州雍熈端拱間沿邊收市河東則麟府豐嵐州火山軍唐龍鎮濁輪寨陜西則秦渭涇原儀延環慶階州鎮戎保安軍制勝闗浩亹府河西則靈綏銀夏州川峽則益文黎雅戎茂䕫州永康軍京東則登州自趙徳明據有河南其収市唯麟府涇原儀渭秦階環州岢嵐火山保安保徳軍其後止環慶延渭原秦階文州鎮戎軍置場天聖中猶得蕃部省馬總三萬四千九百餘匹云此據本志附見更當刪削乙卯詔曰講學久廢士不知經豈上之教導不至耶其令孫奭馮元舉京朝官通經術者三五人以聞西南蕃王龍光㴰遣使來貢方物丙辰詔皇城司親從官闕自今選神勇以下步軍補之庚申詔禮部貢院舉人有能通三經者量試講説特以名聞當議甄擢之乙丑監察御史曹修古言七十致仕載在禮經近代以來貪榮不去故唐貞觀中甞下責諭之詔仍令致仕官在本品現任之上蓋欲其知恥而勇退也比有年近八十尚在班行心力既衰職事何補鐘鳴漏盡未悟夜行之非日暮途窮多為身後之計請下御史臺及諸轉運司告諭文武官年七十者令上表自陳特與轉官致仕仍從貞觀舊制即宿徳勲賢自如故事從之因著為令修古嘗偕三院御史十二人晨朝將至朝堂黄門二人行馬不避呵者止之反為所詈修古奏前代稱御史臺尊則天子尊故事三院同行與知雜事同今黄門侮慢若此請付所司劾治上立命笞二黄門笞黄門附此恐别有時月庚午詔逃亡經十年以上歸業者未得起稅更候三年減税之十五辛未廢襄唐二州營田務以田賦民毎頃輸税五分諸州所差耕卒并牛並放還先是襄州有荒田四百八頃餘八十畆唐州百七十頃自咸平二年轉運使耿望奏置營田務毎歲於屬縣差借種田人牛夏又借耨田夫六百人秋又借刈穫夫千五百人歲入甚廣後轉運使張選改其法召水户四十一分種之未幾皆訴免務遂廢景徳二年轉運使許逖復奏興之而嵗參役兵夫至是轉運使言其非便詔遣屯田員外郎劉漢傑與轉運同定利害而漢傑言二務自復至今襄州得榖三十三萬餘石為緡錢九萬餘唐州得榖六萬餘石為緡錢二萬餘而所給吏兵俸廪官牛雜費襄州十三萬餘緡唐州四萬餘緡得不償失故廢之轉運使當是余獻鄉耿望事見咸平二年四月與此差異歐陽修為許逖行状亦不載復營田務事當考壬申命翰林學士夏竦蔡齊知制誥程琳等重刪定編敕時有司言編敇自大中祥符七年至今復増及六千七百八十三條請加刪定帝問輔臣曰或謂先朝詔令不可輕改信然乎王曽曰此憸人惑上之言也咸平中刪太宗詔令十存一二蓋去繁宻之文以便於民何為不可今有司但詳具本末又須臣等審究利害一一奏禀然後施行也上然之詔京東西淮兩浙福建諸州軍雨水壊民田廬所在存卹之冬十月甲戌朔日有食之此據本紀實録無之廣信軍城壊以近契丹不敢築知軍博州團練使王徳用率禁軍亟城之詔賜軍士緡錢及城成又降詔襃諭丙子賜鎮戎軍修天聖寨役卒緡錢庚辰明州言日本國太宰府遣人來貢方物而不持本國表章詔却之辛巳出内藏庫緡錢二十萬下京西路糴軍儲乙酉詔進士諸科嘗經先朝御試而今不預薦者許就省試曹儀江徳明等葺諸軍營房凡一十三萬九千餘間辛卯詔賜以襲衣金帯淮南轉運司言楚州北神堰真州江口堰修水閘成初堰度舟歲多壊而監真州排岸陶鑑監楚州税王乙並請置水閘堰旁以時啟閉及成漕舟果便歲省堰卒十餘萬乃詔發運司他可為閘處令規畫以聞鑑乙並優遷鑑潯陽人其孫愷嘗為成都府路轉運副使有文字記此事甚詳當尋討乙元城人王安石誌其墓云乙言楚州可去堰為閘歲省卒二十一萬七千工錢一百三十萬米六萬八千石與實録差不同當考壬辰詔郎中以上致仕者自今與一子官時都官郎中熊同文請老自言更不願分司監當止乞録二子各未科出身既許同文守本官致仕仍特補其一子太廟齋郎因著為例熊同文事據㑹要不知何許人甲午昬霧四塞乙未詔三班差使殿侍及諸班差使散直外班殿直列命官之下攝長史司馬之上丙申奉安真宗御容於南京鴻慶宫壽州屬縣多盜至白晝掠民市中上聞之謂輔臣曰不即掩捕此長吏之責也詔劾知州司封員外郎孟穆罷之議所以代穆者或言知楚州度支員外郎梅詢有吏幹嘗坐事廢絀今可用也乃徙詢知壽州加兵部員外郎仍賜御札訓以趨事滌過之意賜在京諸軍班特支錢己亥户部副使王博文言陜西沿邊蕃部捕送逃軍多因樵採或遠探伏路而被蕃人所執亦有脱身得歸復為掠去者有司皆準法處置情實可矜自今請決配遠惡州軍詔止配外州牢城情輕者仍奏聽裁十二月甲戍王随下教與此畧同當考博文事又見明道元年七月甲戌十一月甲辰詔見行編敕及續降宣敕其未便者聽中外具利害以聞詔天禧中舉人補三班使臣者聽換文資辛亥國子監摹印律文并疏頒行甲寅詔河北强壯自咸平中募民為兵如聞衰老尚從役軍中自今弟侄子孫願代者聽仍勿追擾之先是孫奭馮元共薦大理寺丞楊安國為國子監直講於是并召安國父奉禮郎兖州州學講書光輔入見上令説尚書光輔曰堯舜之事遠而未易行臣願講無逸一篇時年七十餘矣而論説明暢上欲留為學官光輔固辭乙卯以光輔為國子監丞遣還戊午升涇原路蕃落指揮為禁軍在横塞之上詔臣僚奏房從子弟恩澤降舊例一等己未詔鄜延路部署司比上邊事多失實其飭蕃部遠斥候無得輕出師庚申詔䕃補京朝官監當六年而課不登者更令監當一任甲子以太子中舍李餘慶為殿中丞餘慶同判秀州請置海鹽華亭兩縣鹽場至是歲收緡錢七十八萬七千特遷之乙丑減諸路歲造兵噐之半太常禮院言來年正月上辛祈榖於上帝而長寜節上壽乃在致齋之半請更用次辛從之丙寅詔大理寺詳斷檢法官自今歲滿除家便知縣候一任回與同判明年九月戊午十二月癸酉遣官祈雪甲戌知秦州王隨言蕃部捕送逃軍多利厚賞而枉致其罪今既減定刑名其賞物亦請罷給錢綵止與腰帶襖子從之先是軍士負罪逃入蕃部者戎人奴畜之小不如意執以求賞坐法多死隨下教能自歸者當免死聽復𨽻軍由是全活者多十月己亥王博文奏請與此差異當考丙子翰林學士夏竦等上國朝譯經音義七十巻賜噐幣有差因出皇太后發願文以示輔臣丁丑詔京城物價翔貴其令三司出廩米之下者貸畿内民期以二年償粗色之半又散置糴場數十第取半價民爭赴之迄春初無饑者先是太倉粟有陳腐不可充軍食者權發遣三司事程琳因建此議朝廷從之凡出米六十萬斛琳正𫝊於發陳粟下便云鹽鉄副使任布請鑄大錢一當十度支判官許申請以銅鉄雜鑄朝廷下其議琳言布請用大錢是誘民盜鑄而陷之罪唐第五琦嘗用此法卒不可行申欲以銅鉄雜鑄理恐不成當令申試之鑄卒不就按布為度支副使乃天聖九年閏十月為鹽鉄副使又在明道二年七月此時蓋未也正𫝊誤矣又許申以是年六月方為廣西提刑建議亦未必在此時今並不取三司下畿縣買素食物料提㸃公事張嵩以畿内灾歉乞收糴於市上問輔臣曰此何所用王曾等對曰御庖所須也上曰豈可以口腹擾民其悉罷之辛巳道録院上所定名山洞府歲投龍簡者二十處餘悉罷之壬午幸玉清昭應宫開寳寺景靈宫祈雪故事車駕還必作樂前導上精意以禱命毋作樂既雪輔臣皆賀上喜曰力田之民今有望矣丁亥析衛州之衛縣𨽻安利軍懐州之獲嘉縣𨽻衛州是日上謂輔臣曰朕欲元日率百官先上皇太后壽然後御天安殿受朝賀其令太常禮院草具其儀皇太后曰豈可以吾故而後元㑹之禮哉王曾對曰陛下以孝奉母儀太后以謙全國體請如太后命因再拜稱賀上固欲先上太后夀既退出墨詔付中書禮部尚書集賢院學士晁迥累章請老上謂輔臣曰迥先朝學士志行修潔朕且欲留之可乎王曾對曰迥年七十六歲陛下雖欲留迥筋力恐不能也乃授太子少保致仕給全俸歲時錫賚如學士罷天慶等五節上清宫立班丙申契丹遣保靜節度使蕭漢寜兵部郎中知制誥鄭節來賀皇太后正旦丁酉遣右千牛衛上將軍蕭信沙州觀察使石宇來賀正旦接伴使孔道輔言北朝並知兩制臣僚之數欲乞假官外各令兼帯本職㑹要四年十二月事太常禮院定國信司奏正旦朝㑹契丹使依舊儀設位龍墀上次節度使南升殿坐位如侍宴儀此本志十二月事當考或削
