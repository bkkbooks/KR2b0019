body:
  text: 續資治通鑑長編巻四百七宋李燾撰哲宗元祐二年十一月壬子知鄆州龍圖閣直學士滕元發知瀛州知杭州資政殿學士蒲宗孟知鄆州朝散郎監都進奏院王伯虎為校書郎癸丑復行慶闗從中書侍郎吕大防奏請也編錄冊有此當考詳甲寅詔運淮南二浙所糴穀四十萬斛賑濟京東路乙卯右僕射吕公著中書侍郎吕大防尚書左丞劉摯右丞王存同上疏曰臣等竊以朝廷設諫爭之官固欲開廣視聽以盡下情然言事之臣所言無由盡當須繫朝廷審擇其言或不可用自當置而不行若復挾情用意則尤不可不察伏見諫議大夫孔文仲累有文字論列左司員外郎朱光庭除太常少卿不當其言殊為乖謬臣等昨日已曾面奏謹具條陳以聞一孔文仲稱朱光庭本無異于常人止縁朋附推薦驟居清要謹按光庭進用之初惟是司馬光與臣公著公著與光庭素不相熟但見司馬光累稱于朝陛下御筆親擢為諫官即非因朋附推薦而進一孔文仲稱朱光庭未嘗獻一公言補一國事謹按光庭自任諫官僅一年半前後所上章䟽不啻數百賜對便殿亦及數十凡内外法度有未便于民者小大臣僚有不允公議者光庭不避仇怨未嘗不言兼已徃徃施行此皆陛下素所深知豈可謂之未嘗獻一公言補一國事一孔文仲稱朱光庭二年之間躐等超㧞望輕資淺恩寵太過臣等竊以朝廷用人固不當専較嵗月兼自來兩省以上差除亦不曾専用資序况光庭始初自因御筆親除為左正言一年後自正言遷司諫即非躐等後來因光庭累次居家待罪一次為言蘇軾一次為言張舜民罷為右司員外郎亦非超㧞今來自都司除太常少卿雖班位少進亦非峻遷且如光庭同時諌官蘇轍係知縣資序供職在光庭後今已為中書舎人又如孔文仲進用在光庭後已是校書郎嵗餘為左諫議大夫則光庭除少卿豈是恩寵太過一孔文仲稱太常貳卿職嚴地密使光庭居之登列諫議擢領風憲皆可也臣等竊以朱光庭今來止是除太常少卿何以知其後為臺諫兼朝廷若欲用光庭為臺諫官只是左司員外郎除授有何不可一孔文仲稱朱光庭一日得志援程納賈當不旋踵謹按程頥賈易或罷歸鄉里或黜守外任朝廷亦未有召用之議然光庭今來止是除寺監官其職事尤輕于左右司豈能援程納賈借使程頥賈易復至朝廷于國家豈有所害只是文仲黨與自以為不便耳臣等䝉陛下任用列居輔弼以進賢退不肖為職只知為官擇人不敢顧避人情其朱光庭臣等亦非以其人所為盡善但今來既知孔文仲所言不當若却将朱光庭除命寢罷則恐從此浮言寖盛正人難立朝廷之勢日就陵遲兼陛下既以臣等為執政之官而不許臣等執持政事臣等亦何以自處伏望陛下曲回聖聽特賜省察其朱光庭除太常少卿新命欲候來日簾前面稟或更有臣寮黨助文仲論奏亦乞陛下察其情偽無至眩惑乃寢文仲奏光庭竟就職公著家傳又云文仲本以伉直稱然惷不曉事數為浮薄輩所使以害善良自程頥賈易相繼去騰説者日益勝于是李常杜純范純禮各求補外公與執政面奏善人懼讒邪而不敢自安非朝廷之福也上嘉納焉文仲晚乃自悟為小人所紿感憤嘔血而卒按文仲卒于元祐三年三月戊辰此云感憤嘔血更須考詳李常乞補外於實錄及本傳俱不見今據常奏議附此月末杜純七月二十八日已知相州范純禮十月二十八日為發運亦有言章家傳所言似未可信也舊錄孔文仲傳云以引經背理又懷異求合考官意神宗察之遂黜不用新錄辨曰據范鎮奏言文仲對䇿切直而史官以為引經背理懷異求合恐非其實自以引至遂十八字今刪去舊錄云論崇政殿説書程頥汚下憸巧素無鄉行經筵陳説僭横忘分遍謁貴臣歴造臺諫宜放還田里以示典刑新錄辨曰程頥一代名儒世所矜式謂其汚下憸巧素無鄉行及遍謁貴臣歴造臺諫恐非其實删去二十五字舊錄云凡先朝政事詆毁無所不至新錄辨曰諫官言事所見各有不同謂之詆毁過矣今删去舊錄云後宰相吕公著謂為蘇軾所誘脅論事皆用軾意則文仲之為人可知矣新錄辨曰吕公著之言恐未必有此且文仲所論青苗免役保甲保馬鹽茶之法當時廷臣論者非一一時公議如出一口豈皆為蘇軾所誘脅而盡用軾意乎非吕公著之言明矣以上二十九字今刪去丙辰肅逺寨廵防右侍禁戴榮追兩官蕃官東頭供奉官廵檢慕化追一官罷任以擅入西夏界侵掠也樞密院言淮南轉運副使趙偁奏伏覩将官敕自先朝已有衝改條件自後亦有衝改未曾刪正其間多有不可施行事件難以照用竊慮諸将武人坐守本敕欲有所違則畏罪欲有所施行則難用緩急有誤兵律大事望詔有司再加詳擇刪正以付諸将按元豐将官敕府界京東西路二百五十六條河北路二百五十五條河東路二百五十八條河南路二百五十一條其逐路将兵敕内已衝改者共二百四十餘條續降二百五十餘條兼陜西五路将敕約六十四條與諸路将敕參用後亦未經刪潤施行之間多有疑惑欲令承㫖司取新舊條重行刪定從之偁行状乃不載此詔鄜延路經畧司如夏人欲通和即令疆吏告諭先具謝表及盡納陷沒人分畫邊界畢乃敢奏逹候㫖通貢復漣水軍趙偁行狀初元豐間務省徭役嘗併廢郡邑自後稍或改復于是漣水縣亦求復軍而靈壁鎮又已陞為縣偁以為廢興郡邑非有大利害不得已者何必改作今復軍立縣則必増置官吏遷易户税擾費甚重雖城郭之民利在交易而農民實被其害乃獨上奏論之請如先帝詔且罷靈壁由是復罷靈壁縣而漣水止立軍使焉庚申以果莊入獻于崇政殿詰犯邊之状及諭以罪當誅死聽招其子及部屬歸附以自贖果莊服從釋縛吏部侍郎孫覺言歴代相承毎遣使者以行黜陟今天下萬里使者不為少矣然自陛下即位以來使四方者有能推行陛下保養元元之意不使暴政侵漁慢吏姑息如唐陸贄之説能以五術省風俗八計聽吏治三科登雋乂四賦輕財費六聽保罷瘵五要簡官事如是者雖有其人不以聞不可也無其人不救其弊尤不可也伏乞皇帝陛下太皇太后陛下詔大臣立法専令御史臺糾舉以聞設若下吏貪贓犯法與弛慢不才及才賢過人使者宜詳知之一或不知猶可至二三人焉則使者為不職矣乞以臣言降付三省委御史臺糾察仍降詔諸路使預知此意貼黄稱臣訪聞四方使者以陛下即位以來罷行青苗免役及市易等事以為朝廷専務姑息雖有貪贓不法之吏莫敢誰何以故民受其弊臣故敢乞令御史臺彈奏若黜一人歸吏部則其它莫不聳動矣詔劄與諸路及府界監司仍令御史臺常切覺察編類冊元祐二年十一月十二日有此但無名今以舊錄三年五月四日所書考驗増入是日三省奏檢㑹元祐元年閏二月二十二日指揮今來科塲且依舊法施行四月十二日指揮仍罷律義六月十二日指揮今後科塲程試不得引用字説並許用古今諸儒之説或已見即不許引用申韓釋氏之書考試官不得于老列荘子内出題舉經明行修人京東京西河北陜西路各五人淮南江南江東江西福建河東兩浙成都府路各四人荆湖南廣東西梓州路各二人荆湖北䕫州利州路各一人委州縣當職官同狀保任申監司監司再加考察依上項人數聞奏仍于發解前牒報本州與充本州解額赴省試無其人則闕上件逐次朝㫖並已施行外今欲依下項一考試進士分為四塲第一塲試本經義二道論語或孟子義一道第二塲試律賦一首律詩一首第三塲試論一首第四塲問子史時務䇿三道以四塲通定去留髙下一新科明法依舊試斷案三道刑統義五道添論語義二道孝經義一道分為五塲仍自元祐五年秋試施行其諸路舉到經明行修人如省試不合格即未得黜落别作一項奏取指揮從之元年閏二月二十二日詔禮部與兩省學士待制御史臺國子司業集議劉摯所論科舉法四月十二日罷律義蘇轍奏乃四月三日非四月十二日不得引用字説已見六月十二日立經明行修額當考六月二十四日方有指揮額在六月十六日三年六月五日當并此四年四月十八日又别定四塲試法舊錄云詔進士以經義詩賦論䇿通定去留明法增論語孝經義将來一次科塲未習詩賦人依舊法取應解額法不得過元額三分之一令禮部立詩賦格式以聞先帝罷雕蟲篆刻訓以經術士知義理之學至是復兼詩賦新錄辨曰神宗厭雕蟲篆刻之學訓士以經術甚盛舉也其後因詞臣答髙麗書不稱㫖懼學者觀書不博無修詞屬文之意亦慨然念之至是以詩賦兼經義取士亦推神宗之意也史臣之言不究其繇以欺後世今刪去将來一次科塲乃三年六月五日指揮舊錄并入此新錄因之今仍見本年月日又四年十二月二十四日可考政目元年十一月二十四日三省奏立經義詩賦兩科下議從之當并考知徐州天章閣待制楊繪知杭州壬戌户部尚書李常轉對陳七事曰崇亷恥存鄉舉别守宰廢貪贓審疑獄擇儒師修役法其存鄉舉欲乞詔天下州郡當貢士之嵗許于解額内弗試而貢一人閭里之士擇其孝悌忠信通博者以告守令守令同察而告之監司監司覈實可否而上之禮部禮部萃而察之等差而上之朝廷朝廷隨其等差參諸貢士而官之其别守宰欲乞分守宰掾丞佐貳為二塗使才不可為守宰者終身為掾丞佐貳才可以長民化下者雖久為守宰可也其廢貪贓欲乞詔有司凡以正贓抵罪者一切廢置弗復用其才能卓異不幸詿誤許卿大夫二人以名上之付有司議其狀或可收也降等而官之終弗變也卿大夫同其罪其審疑獄凡獄訟不得無可疑可愍之情官吏畏罪或取疑愍者遷情就法而殺之望降詔開示引列郡疑愍之獄皆以實情上請付有司議之或失于誤妄亦如昔者貼放其罪其修役法曰比下役法於四方而付其書于户部以臣之愚静而思之未見其必可久也詔廢貪贓審疑獄令刑部立法常轉對七事據常本傳及奏議舊錄但載廢貪贓審疑獄二事且云詔刑部立法而新錄並削去但于新傳載其目耳今依舊錄見本日仍采存鄉舉别守宰二事出之修役法則常自有别奏今附見常又言臣伏見熙寜以來變差役之法俾税户悉輸貲募閒民而役之輸貲既久民力寖弊故復議差法庶稍近古今以成書降付户部使之推行矣竊縁四海之廣萬姓之夥風俗好惡既已不同而上户富安下户空匱富安則以差為病空匱則出力為宜誠不可以一法治也今治以一法不免人情猶有未安之處伏惟太皇太后陛下皇帝陛下以至誠惻怛臨制億兆詔令所加惟恐一物失所今為法之大溥及逺邇茍小有未盡何以副至仁溥愛之心哉臣待罪户部黙視而不言罪不容赦夙夜伏思竊以為法無新陳便民者良法也論無彼此可久者確論也輙采差助二法隨上下所宜條具梗槩若便民而可久也伏望聖慈付之有司更加博議庶或上裨聖政之萬一不勝幸甚役法成書付户部實錄不著因常奏乃見之當在二年冬也常條叙役法劄子自言不令人吏書寫文多不載又常别有劄子云因轉對言法無新陳論無彼此今轉對七事修役法乃無此言獨此劄有之則此劄子并條叙役法劄子並因轉對時列上也復横州永定縣正議大夫致仕張問卒甲子復西京潁陽洛陽縣丙寅大雪按宋史大雪係乙亥日丁卯冬至詔賜御筵于吕公著私第初有司以故事賜冬至節㑹既獲免矣至是以嘉雪應期朝廷無事中㫖特令公著與輔臣近侍宴樂其日又賜教坊樂七十人又遣中使賜上罇酒及禁中果實鏤金花皆瓌竒珍異十倍常數又遣近侍賜香藥以御飲器勸在席酒甚苦惟于公著頗寛又出御前錢賜教坊樂人百緡開封衙前樂人五十緡及管勾使臣等四十緡至晡復賜椽燭二十秉且傳令繼燭坐皆異恩也此據吕公著家傳當别刪修或削去庚午詔以雪寒停在京工役三日遣官疎决在京及府界繫囚壬申詔侍讀官遇不開講日輪具漢唐故事有益政體者二條進入仍旬一錄申三省先是吏部尚書兼侍讀蘇頌言國朝典章大抵襲唐舊史官所記善惡咸備乞詔史官學士采新唐史中臣主所行日進數事以備聖覽故有是詔頌毎進可為規戒有補時政者必述以己意反復言之權發遣涇原路經畧司公事馬軍都虞候劉昌祚為殿前都虞候權涇原路兵馬鈐轄皇城使萬州團練使張之諌為西上閤門使以備禦夏人有勞故也張舜民誌劉昌祚墓已具注九月十日己未合相參照太常博士孔平仲祕書監丞姚勔兩易其任二人易任必有故當考兩浙轉運副使朝請大夫韓晉卿知滁州兩浙轉運判官朝散郎葉伸為轉運副使甲戌户部侍郎張頡為寳文閣待制河北路都轉運使中書舎人蘇轍為户部侍郎天章閣待制顧臨為給事中左諫議大夫孔文仲為中書舎人監察御史趙挺之言去年北邊州郡多被水災朝廷専委左司諫朱光庭奉命出使體訪賑濟而光庭公違法意自上户第一等至第五等遍下州縣并行支貸不論豐凶不計等第倒廩傾倉名為借貸而其實抑勒分配臣願朝廷早議賑濟之法将來催索上件借貸亦乞寛為限期以恵百姓所有光庭違法害公貽患百姓之罪亦乞賜責降施行又監察御史方䝉言朱光庭奉使一出而空河北措置之財且措置司物料其經營之勞多矣儻給散有方雖水旱凶荒可為累年之備一饑而散之殆盡乞行黜降以恊輿論詔朱光庭具析以聞光庭具析當考光庭奉使在二月二十六日甲戌乙亥詔雪寒異于常嵗民多死者宜加存恤給以錢穀若無親屬收瘞則官為塟之罷内殿承制至差使試換文資法舊錄云元豐中嵗聽武臣以藝業詞賦乞試取其中格者因所長而用之至是罷去新錄辨曰法未嘗不善人自撓之耳武臣得以藝業列寘文階待之至厚久則請託之風行僥倖之弊生焉故不得不革非有他也史官之言合刪去元符元年十月二十一日三年四月二十六日當考編錄冊都省送下元祐二年十一月二十九日勅中書省尚書省送到白劄子檢㑹元豐令内殿承制至差使願換文資者聽召保投進乞試又條有官人並許應舉勘㑹内殿承制至差使自來依參選人例止試斷案刑統大義時或議比換文資看詳武臣自有鎻應條貫欲今後不許毎年試換文資十一月二十七日三省同奉聖㫖依丙子詔以雪寒促决見囚是月户部尚書李常自乞捍邊且言昔先帝勤勞累年貯蓄邊備今天下常平免役坊塲積剰錢共五千六百餘萬貫京師米鹽錢及元豐庫封樁錢及千萬貫總金銀穀帛之數復又過半邊用不患不備此臣所以敢辭大計之責而願守邊也吕公著家傳云自程頥賈易相繼去李常杜純范純禮各求補外而常傳不載因常集有此劄子附見十一月末亦欲取元豐所積錢物數表而出之也十二月庚辰承議郎殿中侍御史豐稷為右司諫朝奉郎楊康國為監察御史據劉安世劾胡宗愈章康國乃宗愈所薦五年五月又以工外除朝議大夫李杲卿為太府少卿朝請郎太府少卿王子淵為京西路轉運使承議郎知北外都水丞公事張景先為京東路轉運判官樞密院言西蕃齊暖城首領烏戩新雅克父母妻子内附昨鄂特凌古數欲遣使入貢不若乗此奨勵烏戩新雅克宻諭令據城壁為漢固守如能與温錫沁同謀併力以拒青唐豫為要約授以爵命自通貢使委知熈州劉舜卿措置勿失機㑹先以衣帶儀物與之使生羌知勸其附屬人有應補授可以合謀舉事則許之金帛官職以結其心兼許烏戬新雅克招諭未附舊族聽將部族過河北主領舊地從之新録及青唐録與此小異具載後當考烏戬新雅克前此未見青唐録云邈川東界齊暖城等處大首領烏戬新雅克聞果莊己擒部族震恐以為漢兵朝夕及已也遂請知蘭州王文郁乞同父母妻子部落一萬口内附劉舜卿以聞朝廷許之徙于河州南境授烏戬新雅克供備庫使新録刪改云樞密院言西蕃齊暖城首領烏戬新雅克舉其家内附昨鄂特凌古數欲遣使入貢宜乘此奨勵烏戬新雅克密諭鄂特凌古今與温錫沁同謀併力以拒青唐兼許烏戬新雅克招諭未附舊族過河北主領舊地從之按青唐即鄂特凌古也今令鄂特凌古與温錫沁同拒青唐殊不可曉新録刪改舊録似相牴牾今只用舊録范純仁言臣竊見昨來涇原夏人舉國入冦只為熈河捉獲果莊又因諸路齊心牽制所以賊兵早退其間有出師雖晩者亦能斬獲立功共壯朝廷威武臣雖曾與安燾進呈得㫖將所獲五釐已上各賜茶藥其不及五釐者更不支賜臣再思慮得諸冒險深入血戰立功偶全性命而歸所獲雖不及五釐以其艱危辛苦必望聖恩垂恤若全無霑及必謂朝廷不知其勞則捐軀為國之心却成虛設伏望特出聖恩將昨來應出兵牽制有勞將官使臣並一例等第支賜茶藥以明陛下知其勤勞勸其後効純仁又言兵士軍校皆有特支惟蕃漢使臣全無所及在朝廷安樂之地至于音樂伎藝雖有一日之用亦必須霑賜而冒死出界破敵來徃動經旬浹都無所及實為闕典銀合止自五兩以上所費至小得與不得所校不多但以聖恩所賜人情甚重臣所以再三論列詔諸路牽制將官雖所獲不及五釐特降等頒賜茶藥用純仁之言也此月二十二日范純粹論就賜曲珍等銀合可考純仁又言臣近為劉舜卿用李憲例一面支賜金帶銀器等與立功将臣及誤支與走馬承受樞密院與文彦博三省同議降㫖戒約昨日臣已書底本進入䝉畫依降出臣再三思之方委舜卿經營鄂特凌古并嘉木卓城及河南一帶生羌理當寛其銜勒使放心集事若約束太急却恐畏罪蓄縮有誤委寄乞賜聖擇劉舜卿事不得其時行状附不及五釐亦賜銀合茶藥後今從之其聽否當考壬午遼主遣寜昌軍節度使耶律拱辰客省使海州防禦使韓懿來賀興龍節乙酉以大雪寒賜諸軍薪炭錢再令開封府閲坊市貧民以錢百萬計口量老少給之權知開封府錢勰言本府事務煩有非次急速不可闕官乞朝㑹起居輪推判官在府并假日輪左右㕔各一如防河救火免次日朝㑹從之丙戌興龍節羣臣及遼使初上壽于紫宸殿己丑以大寒上服藥罷集英殿宴上服藥據吕公著家傳壬辰樞密院言烏戩新雅克部族兵七百人婦女老㓜萬人渡河南正要覊縻得所令劉舜卿措置時給糧食質其首領及强梁之家近親於城中以防姦詐仍諭烏戩新雅克勿失河北地或據嘉木卓城哩恭宗堡令河州量事力為援或乗機難待報者聽以便宜從事方夏人與西蕃連衡宜多方經畫嚴戒邊吏明逺斥堠先事為備以破姦謀從之詔以度牒五百給都水監其民户蠲役之半免起丁不及半則就所𨽻及隣州工役差防河役夫不足以雇直募充新錄削去龍圖閣直學士知瀛州滕元發與龍圗閣待制知成徳軍蔡京對易以元發父名與府號同自陳故也詔選内侍四人提舉賣炭草塲甲午賜京師廂軍諸司人及剰員薪炭錢其癃老凍餒者遣官即營中計口給之畿縣貧乏不能自存及老㓜疾病乞丐之人應給米豆勿拘以令詔劉誼妄上章疏與宫觀政目十六日事當考詳増入三年三月末云云可入此丙申詔将官罷任樞密院審量雖年及六十堪為将者仍舊臣僚上言伏見熈寜元豐之間併廢州縣甚多其大要欲以省官吏寛力役也近嵗議者頗謂併廢州縣雖可以省官吏寛力役而不能無害者封疆既闕則輸稅租者或咨怨于道途官吏既去則為盗賊者或公行于市邑以至訟訴追呼皆非其便此朝廷不得不慮也故元祐元年二月九日勅廢併州縣令諸路轉運提刑提舉司同共相度合與不合併廢具利害聞奏縁此諸路已廢之州縣並多興復今年十一月内興復者四處河南府之洛陽縣潁陽縣横州之永定縣漣水軍是也臣愚竊謂興復州縣若别無大利害則惟坊郭近上人户便之鄉村上户乃受其弊也何以知其然也州縣既復則井邑盛而商賈通利皆歸于坊郭此坊郭上户所以為便也復一小邑添役人數百役皆出于鄉村此鄉村上户所以受其弊也自元祐元年二月九日降勅相度㡬二年矣其利害明白而不可以不復者令下之初皆已復矣其可以復可以不復者仍遷延至今彼坊郭上户倡率同利之人誘鄉村之下户共為陳請轉運司不從則訴于提刑司提刑司不從則訴于轉運司前官不聽則訴于後官必至于復而後已故遷延至于今日而復者皆非利害明白不可以不復者也况自朝廷行差役法中外莫不以為宜而論者獨以地薄民貧之邑鄉村應役之户不多者難得畨休為患也此雖州縣所在利害不同要之役人不可以更有增添乃天下之所同也今諸路方且攀縁前嵗一時指揮而復縣不已增鄉村之力役以利坊郭臣竊以為非便也臣欲望聖慈特降指揮其元祐元年二月九日勅更不施行從之舊錄云詔罷復已廢州縣勅熈寜間裁併州郡縣以省官吏寛力役至元祐初任事之臣務以變前為是多所興廢一邑增民役數百困農人以利市貿議者率以為非遂蠲此令新錄辨曰罷復已廢州縣敕已載其實矣史官之言合刪去丁酉朝奉郎韓治為秘閣校理己亥樞密院言天村諸峒蠻侵掠邊户已進兵討蕩詔胡田聽李茂直約束無輙滋事胡田知渠陽軍蘇轍誥詞係七月二十四日李茂直湖北路轉運使庚子詔郡縣役多民户不及三畨處以單丁女户等助役錢募州役尚不及兩畨則申户部舊錄云自復差役法狹鄉下邑有不能畨休者遂降是詔新錄辨曰差役法有不便詔已革之無可疑者史官之言合刪去樞密院言環慶路差副總管曲珍總領将兵出界討蕩牽制涇原路作過賊馬計都二萬一百人折外獲一千二百一十六級所獲得五釐以上詔副總管曲珍支四十兩銀合一具本路都監支二十兩銀合一具将官各支十五兩銀合一具部隊将使臣各支八兩銀合一具無所獲各支五兩銀合一具茶藥依例隨合大小支仍委本路帥臣就賜二十二日聖㫖范純粹論列在明年正月七日今并入此經畧使范純粹言竊思昔年雖有隣路牽制應援之法多是兵将官不務公心不以隣路被㓂為已職或量以小小軍馬或故為迂逺徐徐觀聽備數塞命而已故徒勞人兵了不及事所以中間朝廷議論悉罷隣路牽制䇿應之法遂致永樂之禍臣自領漕闗中至忝今任累累論列二年之間方䝉朝廷定議再立牽援之制昨來九月初五日晚得涇原路報賊公牒臣于是時遣委曲珍以下㸃兵束装共在三數時刻之内翌日長驅出境外三百餘里蹈横山險絶之地大破賊巢臣謂涇原賊衆到漢界三數日諸城堡寨被圍未㡬彼所以解去者珍之功也及其還師百有餘日珍等以下杳未聞朝廷畧有恤勞訪聞得近下使臣以至列校私相與語曰涇原雖被㓂而兵将集于城中未始出也尚䝉朝廷遣使問勞厚有恩賜我曹解隣道之阨血戰于數百里之外朝廷必不忘我姑俟命臣雖聞此言而無以應之今准前項朝㫖止令臣就賜茶藥臣竊謂将佐士卒之所以有望恩賜者非三五星白金之謂也願朝廷知其勞績䝉朝廷一語奨勞則軍中榮耀甚于華衮之贈人情不逺可以度見今若但就州帑人給白金數兩則涇原隣例事體相形似未副将士之所以私語竊望者臣恐上則不足以宣朝廷所以勞還之意下則不足以激将士赴功之心邊境未寜事繫勸沮所有今來就賜指揮臣並未敢輙以語人見封印收掌欲望聖慈深賜詳察只遣近下使臣依涇原路例就慶州勞問出界将官曲珍以下大小使臣及押賜合得銀合茶藥示朝廷勸賞不忘功之意在朝廷無所增費而于本路士氣有以激勸稍厭人情不為小補貼黄自曲珍以下回軍未聞朝廷别有賞勞臣愚夙夜以思欲有所請則臣係帥領在已有嫌欲黙不言則将佐有望今准前項朝㫖已指定専賜出界将官已下然後臣可無嫌矣方敢仰凟聖聰至于将來曲珍以下賞功恩典伏望聖慈體念邊事未休牽制應援之法復行之初珍等乃能竭盡忠力渉險履危為朝廷解隣路之阨似非被㓂自為禦捍之比特乞出自宸衷與珍等例外優賜推恩所貴今後諸路兵将不以隣路為彼我共知公心為朝廷了事純粹此奏從違當考三年二月十六日曲珍乃遷遥防朝奉大夫直袐閣黄亷為左司郎中亷嘗語其子弟昨按察川陜茶政隨事制宜便于公者不茍去以為名害于民者不茍存以為利論者未以為然是嵗遂代前官領茶馬事前日所以繩治人者皆身當之在職嵗餘法無疐閡不可行者士大夫乃頗見信故知無成心以制事利害則姑聽之在人在已無間然矣初陸師閔時嵗計茶息以一百二十萬緡掊克斂怨無所不至嵗乃得二百萬緡及亷将使事盡除公私之病比數年亦得百二十萬緡也工部郎中盛陶為右司郎中朝奉郎宋匪躬為正字匪躬敏求子文彦博薦之也彦博薦從政目朝奉郎仇伯玉權同管勾陜西等路茶馬事兼提舉買馬壬寅左司諫韓川右正言丁隲進對太皇太后曰大雪民間不易已令散錢還均濟否川等對曰聖恩周悉細民幸甚詔陜西河東路經畧司戒諭諸将常為出戰備伺候近塞二百里内有屯聚則出其不意為倐徃倐歸之計此葢用安燾計九月十六日詔頒元祐詳定編敇令式先是蘇頌等奉詔詳定既成書表上之曰臣等今以元豐敕令格式并元祐二年十二月終以前海行續降條貫共六千八百七十六道取嘉祐熈寜編勅附令勅等講求本末詳究源流合二紀之所行約三書之大要彌年捃摭極慮研窮稍就編謄粗成綱領隨門標目用舊制也以義名篇倣唐律也其間一事之禁或有數條一條之中或該數事悉皆類聚各附本門義欲著明理宜增損文有重複者削除之意有闕畧者潤色之使簡而易從則久而無弊又按熈寜以前編勅各分門目以類相從約束賞刑本條具載以是官司便于檢閲元豐勅則各隨其罪釐入諸篇以約束為令刑名為勅酬賞為格更不分門故檢用之際多致漏落今則並依熈寜以前體例刪修更不别立賞格又以古之議刑必詢于衆漢以春秋斷疑獄發自仲舒唐以居作代肉刑成于宏獻復有因人奏請隨事立條讞報實繁去取尤謹曩時修熈寜勅止據嘉祐舊文元豐勅亦只用熈寜前例增損刪定更不修考日前創法改作之意今則斷自嘉祐至今凡二十餘年海行宣勅及四方士庶陳述利害參酌可否互有從違又以人情多辟法意未周須藉増禆乃為詳密考東都之議應劭有臣所創造之言按慶厯之書羣官有參詳新立之例今來勅令式内事有未備與刪定官等共同討論具為條目者即依慶厯故事注曰臣等參詳新立又以法令所載事非一端郡縣省臺紀綱繁委前紀所述皆有别書魏律則尚書州郡著令自殊唐格則留司散頒立名亦異皆所以便于典掌不使混淆其元豐勅以熈寜勅令中合尚書六曹在京通用并一路一州一縣事並釐歸逐處若盡收還慮致叢脞今合以該五路以上者依舊勅修入勅令其餘有事節相須條制相類可以隨事生文不須别立條法者雖止該一路一司並附本條編載又有専為一事特立新書若景徳農田慶厯貢舉皆别為條勅付在逐司今元祐差役勅先已成書并近嵗専為貢舉出使立條者既不常行遇事即用並已釐出不使相參其有一時約束三省奉行廢置改更蠲除省約既闗治體須俟僉同大則奏稟于清衷次則諮議于執政既有定論咸用著篇又按刑統錄出律内餘條准此附名例後旁舉諸條各以類見今亦以勅令中如此例者六十四件别為一篇凡刪修成勅二千四百四十條共一十二巻内有名件多者分為上下計一十七巻目錄三巻令一千二十條共二十五巻式一百二十七條共六巻令式目錄二巻由明一巻餘條准此例一卷元豐七年以後赦書徳音一巻一總五十六巻合為一部于是雕印行下元祐勅令崇寜元年七月十日詔並行毁棄今諸州法司亦徃徃無之恐因循失墜乃掇取蘇頌表詞具載于此新舊錄並稱壬寅日頒行今從之明年二月十八日蘇頌等推恩監察御史楊康國言臣昨于朝堂見百官聚首共議學士院撰到召試廖正一館職䇿題問王莽曹操所以攘奪天下難易莫不驚駭相視其時臣未有言責無縁上逹徒自震恐寒心而不忍聞也此必無人為陛下言其不可之狀致朝廷尚稽竄責臣今幸遇聖恩擢置言路豈敢畏避緘黙偷安竊禄有孤陛下任使之意哉且石勒一僭偽之主猶曰終不學曹孟徳司馬仲逹狐媚以取天下臣為人臣不忍盡道石勒之語撰䇿題者蘇軾也康國云云據編類章疏乃二年十二月二十四日所奏也二十八日趙挺之云云三年正月十九日王覿云云甲辰遼主遣瑞聖軍節度使耶律仲宣泰州觀察使耶律浄正議大夫守崇祿卿郭牧中散大夫守太常少卿充史館修撰姚企程來賀正旦乙巳詔湖北轉運使李茂直溪峒非元謀為首及徒伴脅從聽其出入各令以謀捕送為首之人赴官請賞丙午詔諸官司無得受文彦博乞致仕章奏御集二十八日九月十三日詔監察御史趙挺之奏據編類章疏增入二年十二月二十八日蘇軾専務引納輕薄虛誕有如市井俳優之人以在門下取其浮淺之甚者力加論薦前日十科乃薦王鞏其舉自代乃薦黄庭堅二人輕薄無行少有其比王鞏雖已斥逐補外庭堅罪惡尤大尚列史局按軾學術本出戰國䇿蘇秦張儀縱横揣摩之説近日學士院䇿試廖正一館職乃以王莽袁紹董卓曹操簒漢之術為問王莽于元后臨朝時陰移漢祚曹操欺孤寡謀取天下二袁董卓凶焰爇天自生民以來姦臣毒虐未有過于此數人者忠臣烈士之所切齒而不忍言學士大夫之所諱忌而未嘗道今二聖在上軾代王言専引莽卓袁曹之事及求所以簒國遲速之術此何義也公然欺罔二聖之聰明而無所畏憚考其設心罪不可赦軾設心不忠不正辜負聖恩使軾得志将無所不為矣詔諸六曹行遣文書若已有照驗事理明白而枉作行遣拖延月日經十日已上者手分杖八十職級上簿三經上簿杖六十郎官上簿事重者手分降資或降名並申取尚書省指揮仍令左右司及六察㸃檢其官司遇有上件非理㑹問不得回報具事由直申尚書省丁未環慶路經畧使范純粹奏奉十二月五日詔西賊攻犯鎮戎軍全師而歸深慮别蓄姦謀宜厚募死士深入探聽或可用間契勘環慶討蕩吹哷羅章擄到生口日近漸有首領出漢令范純粹先選委自來得心腹蕃官作管事名目令與投來首領稍稍欵熟餌以所嗜體量其人可以使入西界探事即密切入状保明一兩人勿令相知授與密號教令用間及令節次探報彼中動靜旋具奏聞臣竊以為用間之策雖兵家之善計須時然後行則可濟大事茍勢有未宜則不徒無益葢梁氏一族用事國中既已久矣凡勢力之相忌者頗已遇害故一國之衆及其酋豪心雖怨忿而斂手聽命未聞有敢輙動者彼梁氏者亦雖有竊據之漸然猶須挾立威明氏之子以臨其衆者葢知國人不附而諸酋尚可畏也彼心有所圗而事有未諧旁有所畏而衆不為用惟其如此故雖間有猖狂而未能専心致意以抗中國在于今日實中國之利也今朝廷委臣以術用間欲如徃日葉勒之類臣竊謂葉勒得衆善戰實元昊之腹心間而去之誠為我利今夏國酋豪惟梁氏一門而已凡其中外親黨靡不持權用事方叶心同惡共有深謀一切間言固未可入其餘首領雖幸存者彼皆置之散地于國事兵權無得干預其粗有權位許其管勾人馬者不過如威明特克濟沙克星多貝中徹辰之類三數人而已是皆梁氏之忌且畏者方日夜求端欲得除去恨無自以發之者若間言一出實梁氏之竒貨彼三數人者不戮則亡是特為梁氏除仇敵也仇敵盡除則梁氏者然後得肆意于邊患矣若謂欲離間威明之餘黨使之怨毒梁氏而内有所圗則餘黨之怨梁氏固已甚矣但力有不勝故斂手于其下而無所為也臣愚慮如此未審朝廷之議以為如何除用間一節臣未敢輕試外其選募出漢之人深入探聽等事臣見精審施行實錄乃以此十二月五日詔係之明年正月二十五日恐誤也今從范純粹奏議是冬始閉汴口此據紹聖元年十二月二十七日蔡京云云并三年正月李仲云云増入元祐四年冬末梁壽奏議當考是嵗宗室子賜名授官者八人斷大辟五千五百七十三人
