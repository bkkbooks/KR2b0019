body:
  text: 續資治通鑑長編巻二百七宋李燾撰英宗治平三年春正月壬申翰林學士給事中知制誥范鎭為翰林侍讀學士集賢殿修撰知陳州案宋史鎭以草制誤改侍讀學士明年遷翰林出知陳州其改集賢殿修撰知制誥則在仁宗朝此時鎭亦不兼給事中與此互異初鎭草韓琦遷官制稱引周公諫官呂誨駮之於是琦表求去位鎭批答曰周公不之魯欲天下之一乎周上以鎭不當引聖人比宰相其意謂琦去位則謳歌獄訟不歸京師欲罷鎭内職執政因諭鎭令自請外而有是命或曰鎭與歐陽修雅相善及議濮王追崇事首忤修修乗間為上言鎭以周公待琦則是以孺子待陛下也鎭坐此出鎭元年閏五月罷學士為侍讀二年三月丙寅復為學士三年正月壬申乃出升劾鄧温伯章有云范鎭草韓𤦺制詞云史稱霍光義形于主既以韓琦比霍光則上當為昭帝矣英宗深嫌之鎭本無姦心止以比琦失當猶罷學士出知陳州與此不同當考鎮集九十五巻有批答韓琦乞退第三表實舉周公恐升誤也引霍光乃元年閏五月遷右揆制誥案劾鄧温伯當是孫升上於制誥多親閲有不中理必使改之嘗謂執政曰此人君謨訓豈可褒貶失實也先是知制誥韓維奏事便殿嘗言人君好惡當明見賞刑以示天下使人知所避就則風俗可移又言聖賢思慮不能全無過差假如陛下誤有處分改之則足以彰納善從諫之美及鎭補外維言鎭誠有罪自可明正典刑若其所失止在文字當函容以全近臣體貌陛下前黜錢公輔中外以為太重今又出鎭而衆莫知其所謂臣恐自此各懷疑懼莫敢為陛下盡忠者矣癸酉契丹改國曰大遼案續綱目及宋史俱無大字乙亥宣徽南院使武安節度使程戡卒戡守延州凡六年比儕輩名習事然無他智略不為言者所與初覃恩蕃官例不序遷用戡奏始皆得遷又言諸族首領把截軍員弓箭手人員皆犒設所不及古之亂或始于羊羮可以為戒首領有才武能立戰功者願得召見辟補為蕃官延州夾河為兩城雉堞卑薄嘗為夏賊攻圍登九州臺下瞰城中戡調兵夫大増築之後以為利横山酋豪怨諒祚欲以其屬叛者取靈夏來求兵為援戡言豺虎非其相搏則未易取也癰疽非其自潰則未易攻也諒祚乆悖慢當誅宜乗此聽許所謂以蠻夷攻蠻夷中國之利也㑹帝不豫大臣重生事遂寢不報自以年過七十告老章凡十數上上終弗聽遣中使齎手詔問勞賜茶藥黃金乃再上章曰臣老疾劇矣高努屯勁兵為要地豈養病所邪召還至鄧城卒贈太尉諡康穆或言戡折節交宦官閻士良至令妻出見之丙子樞密副使呂公弼奏乞以南郊封贈三代恩追贈亾子希仁一官從之實録云二男一女今從㑹要回三代恩以授男女蓋前此未有當考試將作監主簿祁元振卒元振焦人太常少卿革之子以父任授試衘不肯仕聚書至萬餘巻博覽多記至於醫方隂陽之書亦往往能知廉靜寡欲為鄉人所愛信前後州將多薦者特除守校書郎致仕元振辭而乞追封其母詔以母丁氏為昭德縣太君卒年七十四鄉人為請諡亳州又奏表其節行乞賜號先生不報辛巳端明殿學士兼龍圖閣學士知徐州張方平為翰林學士承㫖初上謂執政學士獨王珪能為詔餘多不稱職因問方平文學如何歐陽修對曰方平亦有文學但挾邪不直曽公亮以為不聞其挾邪趙槩又以為無迹故卒命之上嘗問治道體要方平以簡易誠明為對上不覺前席曰朕昔奉朝請望侍從大臣以謂皆天下選人今而不然聞學士之言始知有人矣御史呂大防言竊聞參知政事趙槩舉張方平錢明逸乞加超用傳播之初實驚物聽方平明逸皆以制策登科早列侍從不聞有嘉猷善狀著于時論而出領事任所至不治豈足以謀謨廟堂之上經綸天下之務哉竊以槩備位輔臣與國一體不能昌言公論進賢退不肖而牽於私舊引非其人失大臣憂國致君之道伏望出臣此章下槩問狀以懲不恪呂大防劾趙槩不得其時因張方平召為翰林附見此翰林學士馮京修撰仁宗實録壬午罷三司推勘官初詔三司舉京朝官一人專領推勘事至是三司奏以為不便罷之然議者不以罷之為便也嘉祐五年置工部員外郎兼侍御史知雜事呂誨前後十一奏乞依王珪等議早定濮安懿王追崇典禮皆不報乞免臺職又不報是月壬戍案此月無壬戍此係追叙前月之事以下支干皆牽連而書縁罷吕誨等是壬午日事故附于此月末耳即與侍御史范純仁太常博士監察御史裏行呂大防合奏曰豺狼當路擊逐宜先姦邪在朝弹劾敢後伏見參知政事歐陽修首開邪議妄引經據以枉道悅人主以近利負先帝欲累濮王以不正之號將陷陛下于過舉之譏朝論駭聞天下失望政典之所不赦人神之所共棄哀桓之失既難施於聖朝褒猶之奸固難逃于公論當屬吏議以安衆意至於宰臣韓琦初不深慮固欲飾非傅㑹其辭詿誤上聽以至儒臣輯議禮院講求經義甚明僉言無屈自知己失曽不開陳大臣事君詎當如是公亮及槩備位政府受國厚恩苟且依違未嘗辨正此而不責誰執其咎臣等地居言職勢不嘿全請尚方之劒雖古人所難舉有國之刑況典章猶在伏請下修于理及正琦等之罪以謝中外且議既不一理難並立昔師丹之説行則董宏坐其罪董宏之論勝則師丹廢于家臣等及修豈可俱進言不足用願從竄責上不辜陛下之任使下不廢朝廷之職業臣等之志足矣戊辰又奏自古人君之御天下未嘗不以人心為本得之則中才可免危亂失之則賢智不能保其治安故曰民猶水也可以載舟可以覆舟人心之得失可不慎哉豈有備位大臣與國同體希合上意内營已私移過於人君失望于天下為臣之惡孰重于此伏惟陛下紹膺大統稱尊御極生育之恩理宜追厚然當竢先帝祥禫既畢陛下德澤已行然後講求典禮褒崇本親况修博識古今精習文史明知師丹之議為正董宏之説為邪利誘其𠂻神奪其鑒廢三年不改之義忘有死無貳之節仁宗虞主始祔陵土未乾而遽開越禮之言欲遵衰世之迹致陛下外失四海臣庶之心内違左右卿士之議原修之罪安得而赦陛下自臨御以來勵精為治遇烖而懼則有周宣之風至諴感神則蹈虞舜之徳至於徽稱所加却而不受皆前代難行之節治朝可紀之政推而行之和氣可致然而中外人情囂然不安者良由邪説震驚大議未定今不正濮王之禮則無以慰衆心不罪首惡之臣則無以清朝政癸酉又奏修備位政府不能以古先哲王致治之術開廣上意發號施令動合人心使億兆之民鼓舞神化希意邀寵倡為邪説違禮亂法不顧大義將陷陛下于有過之地而修方揚揚得志自以為忠及乎近臣集議禮官討論遷延經時大議不决而又牽合前代衰替之世所行繆迹以飾姦言拒塞正論挾邪罔上心實不忠為臣如此豈可以參國論哉琦庇惡遂非沮抑公議公亮及槩依違其間曽不辨正亦非大臣輔弼之體伏望聖慈奮然獨斷將臣等前後章疏付外施行庶分邪正以服天下誨等論列不已而中書亦以劄子自辨于上曰臣伏見朝廷議濮安懿王典禮兩制禮官請稱皇伯中書之議以為事體至大理宜審慎必合典故方可施行而皇伯之稱考於經史皆無所據方欲下三省百官博訪羣議以求其當陛下屈意手詔中罷而衆論紛然至今不已臣以謂衆論雖多其説不過有三其一曰宜稱皇伯是無稽之臆説也其二曰簡宗廟致水災者是厚誣天人之言也其三曰不當用漢宣哀為法以干亂綂紀者是不原本末之論也臣請為陛下條列而辨之謹按儀禮喪服記曰為人後者為其父母服齊衰朞也謂之降服以明服可降父母之名不可改也又按開元開寶禮國朝五服年月喪服令皆云為其所生父齊衰不杖期蓋以恩莫重於所生故父母之名不可改義莫重於所繼故寧抑而降其服此聖人所制之禮著於六經以為萬世法者是中書之議所據依也若所謂稱皇伯者考於六經無之方今國朝見行典禮及律令皆無之自三代之後秦漢以來諸帝由藩邸入繼大統者亦皆無之可謂無稽之臆説矣夫儀禮聖人六經之文開元禮者有唐三百年所用之禮開寳通禮者聖宋百年所用之禮五服年月及喪服令亦皆祖宗累朝所定方今天下共行之制今議者皆棄而不用直欲自用其無稽之臆説此所以不可施行也其二曰簡宗廟致水災者臣伏以上天降災皆主人事故自古聖人逢災恐懼多求闕政而修之或自知過失而改悔之庶幾以塞天譴然皆須人事已著於下則天譴乃形於上今濮王之議本因兩制禮官違經棄禮用其無根之臆説欲定皇伯之稱中書疑其未可施行方考古今典禮雖有明據亦未敢自信而自專更下外廷博議而陛下遽詔中罷欲使有司徐求典禮是則臣下審重如此人君謙畏如此君臣不敢輕議妄舉而天遽譴怒殺害人物此臣所謂厚誣天也議猶未决仍罷不議而便謂兩綂二父以致天災者厚誣人也其三引漢宣哀之事者臣按漢書宣帝父曰悼皇考初稱親諡悼置奉邑寢園而已其後改皇考而立廟京師皇考者親之異名爾皆子稱其父之名也漢儒初不以為非也自元帝以後貢禹韋元成等始建毁廟之議數十年間毁立不一至哀帝時大司徒平晏等百四十七人奏議云親諡曰悼裁置奉邑皆應經義是不非宣帝稱史皇孫為親也所為應經義者即儀禮云為人後者為其父母報是也惟其立廟京師亂漢祖宗昭穆故晏等以為兩綂二父非禮宜毁定陶共王初但號共皇立廟本國師丹亦無所議至其後立廟京師欲去定陶不繫以國有進干漢綂之漸遂大非之故師丹議云定陶共皇諡號已前定議不復改而但論立廟京師為不可爾今言事者不究朝廷本議不尋漢臣所非者何事此臣所謂不原本末也中書之議本謂稱皇伯無稽而禮經有不改父母之義也名號猶未定故尊崇之禮皆未及議而言事者便引漢去定陶國號立廟京師之事厚誣朝廷以為干亂大綂何其過論也夫去國號而立廟京師以亂祖宗昭穆此誠可非之事若果為此議宜乎指臣等為姦邪之臣而人主有過舉之失矣其如陛下之意未嘗及此而中書亦初無此議而言者不原本末引漢世可非之事以為説而外庭之臣又未嘗知朝廷本意何如但見言事云云遂以為非禮干亂綂紀信為然也是以衆口一辭紛不可止言事者欲必遂皇伯無稽之説牽引天灾恐廹人主而中書守經執禮之議乃指以為姦邪之言朝廷以言事之臣理當優容不欲與之爭辨而外庭羣論又不可家至户曉是非之理不辨上下之情不通此所以呶呶不止夫為人後者既以所後為父矣聖人又存其生父母者非曲為之意也蓋自有天地以來未有無父而生之子也既有父而生則不可諱其所生矣夫無子者得以宗子為後是禮之所許然安得無父而生之子以為後乎此聖人所以不諱無子者立人之子以為後也亦不諱為人後者有父而生蓋不欺天不誣人也故為人後者承其宗之重任其子之事而不復歸於本宗其所生父母亦不得往與其事至於䘮服降而抑之可以義斷惟其父母之名不易者理不可易也易之誣天而誣人矣子為父母服謂之正服出為人後者為本生父母齊衰謂之降服又為所後父斬衰三年謂之義服今若以本生父母為皇伯則濮安懿王為從祖父反為小功而濮安懿王夫人是本生嫡母也反為義服自宗懿以下本生兄弟於禮雖降猶為大功是禮之齊衰期今反為小功禮之正服今反為義服於本生父止服小功於宗懿兄弟反服大功此自古所以不稱所生父為伯叔者稱之則典禮乖違人倫錯亂如此也伏惟陛下聰明睿聖理無不燭今衆人之議如彼中書之議如此必將從衆乎則衆議不見其可欲違衆乎則自古為國未有違衆而能舉事者臣願陛下渙然下詔明告中外以皇伯無稽决不可稱而今所欲定者正名號爾至於立廟京師干亂綂紀之事皆非朝廷本議庶幾羣疑可釋若知如此而猶必稱皇伯則雖孔孟復生不能為之辨矣中書劄子必詳載然後可見上所以不從臺諫之故上意不能不嚮中書然未即下詔也執政乃相與審議欲令皇太后下手書尊濮安懿王為皇夫人為后皇帝稱親又令上下詔謙讓不受尊號但稱親即園立廟以示非上意且欲為異日推崇之漸丙子中書奏事垂拱殿時韓琦以祠祭致齊上特遣中使召與共議既退外間言濮王已議定稱皇歐陽修手為詔草二通一納上前日中太后果遣中使齎實封文書至中書執政相視而笑誨等聞之即奏臣等自去秋以來相繼論列中書不合建議加濮王非正之號不䝉開納又於近日三次弹劾歐陽修首啟邪議導諛人君及韓琦曽公亮趙槩等依違傅㑹不早辨正乞下有司議罪亦未䝉付外施行蓋由臣等才識淺陋不能開悟聖心早正典禮又不能擊去姦惡肅清朝綱遂至大議乆而不决中外之人謗論洶洶若安然尸禄不自引罪則上成陛下之失徳下隳臣等之職業因繳納御史告勅居家待罪乞早賜黜責上以御寶封告勅遣内侍陳守清趣誨等令赴臺供職誨等以所言不用雖受告勅猶居家待罪丁丑中書奏事上又遣中使召韓琦同議即降勅稱准皇太后手書吾聞羣臣議請皇帝封崇濮安懿王至今未見施行吾再閲前史乃知自有故事濮安懿王譙國太夫人王氏襄國太夫人韓氏仙遊縣君任氏可令皇帝稱親仍尊濮安懿王為濮安懿皇譙國襄國仙遊並稱后又降勅稱上手詔朕面奉皇太后慈㫖已降手書如前朕以方承大綂懼徳不勝稱親之禮謹遵慈訓追崇之典豈易克當且欲以塋為園即園立廟俾王子孫主奉祠事皇太后諒兹誠懇即賜允從又詔濮安懿王子瀛州防禦使岐國公宗樸候服闋除節度觀察留後改封濮國公主奉濮王祀事先是龍圖閣直學士兼侍講司馬光上言聞諸道路未知信否或言朝廷欲追尊濮安懿王為濮安懿皇審㦯如此竊恐不可陛下既為仁宗後于禮不得復顧私親臣先時言之已熟不敢復煩聖聽今臣不知陛下之意固欲追尊濮王者欲以為榮邪以為利邪以為有益于濮王邪前世帝以旁支入繼追尊其父為皇者自漢哀帝始其後安帝桓帝靈帝亦為之哀帝追尊其父定陶恭王為恭皇今若追尊濮安懿皇是正用哀帝之法也陛下有堯舜禹湯不以為法漢之昬主安足以為榮乎仁宗恩澤在人淪于骨髓海内之心所以歸附陛下者為親受仁宗之命為之子也今陛下既得天下乃加尊號於濮王海内聞之孰不解體又安足以為利乎夫生育之恩昊天罔極誰能忘之陛下不忘濮王之恩在陛下之中心不在此外飾虛名也孝子愛親則祭之以禮今以非禮之虛名加于濮王祭之其于濮王果有何益乎三者無一可而陛下行之此蓋政府一二臣自以向者建議之失已負天下之重責苟欲文過遂非不顧于陛下之德有所虧損陛下從而聽之臣竊以為過矣臣又聞政府之謀欲託以皇太后手書及不稱考而稱親雖復巧飾百端要之為負先帝之恩虧陛下之義違聖人之禮失四海之心政府之臣祇能自欺安得欺皇天上帝與天下之人乎臣願陛下急罷此議勿使流聞逹於四方則天下幸甚臣今雖不為諫官然嚮日已曽奏聞身備近臣遇國家有大得失不敢不言也及是詔下判太常寺呂公著上言竊以稱親之説蓋漢宣時有司奏請史皇孫故事按皇孫即宣帝所生之父宣帝為昭帝後是以兄孫遷繼祖統於漢家無兩考之嫌史皇孫初無爵諡有司奏請之故始且稱親其後既已立諡只稱悼園然則親字非所以為稱謂且陛下以聖明之德仁宗㧞自旁支入繼大綂雖天下三尺童子皆知陛下濮王所生今但建立園廟以王子承祀是於濮安懿王無絶父之義於仁宗無兩考之嫌可謂兼得之矣其親字既稱謂難立且義理不安伏乞寢罷不報詔百官議追崇典禮諸王府侍講孫固曰禮可變天性不可變王宜稱親議未集有詔罷議孫固議據馮家神道碑及傅堯俞墓銘皇太后手書蓋中書用固議戊寅呂誨等又奏臣竊思前勅三省集議因皇太后手書切責大臣遂罷集議今有此命始末相戾羣情震駭重以疑惑就如皇太后意欲濮邸稱皇后陛下當審其可否以臣寮所議典禮規正其事豈可宣揚於外而後形于謙讓非獨彰詔書反汗之失亦損陛下愛親之德矣聞向者御史范純仁到中書曽公亮歐陽修趙槩皆言禁中商量必使厯乆可行覩今日命下誠知大臣之謀有素矣蓋首議者欲變兹事自外制中苟逭深責使天下怨謗歸于人主今復貽于母后得謂之忠乎况濮王封大國典禮終闕前有權罷之㫖後有且欲之言傳于四方人誰敢信即園立廟皆非所宜嗣子襲封于體為允臣等伏乞聖念俯順人情更賜講求以明至當若不歸罪首議之人天下疑惑莫之能解陛下至公之心無以明辨臣等杜門待罪畏恐旁皇唯冀宸慈早賜明斷純仁又獨奏皇太后自撤簾之後深居九重未嘗預聞外政豈當復降詔令有所建置蓋是政府臣僚苟欲遂非掩過不思朝廷禍亂之原且三代以來未嘗有母后詔令施於朝廷者秦漢以來母后方預少主之政自此權臣欲為非常之事則必假母后之詔令以行其志往往出於逼脅而天下卒不知事由權臣今陛下以長君臨御于兹四年萬㡬之務當出宸斷内奉慈闈惟宜竭仁孝之誠盡四海之飬而已豈須更煩房闈之命叅紊國章一開其端弊原極大異日為權臣矯託之地甚非人主自安之計伏望陛下深察臣言追寢前詔凡係濮王典禮陛下自可采擇公議而行何必用母后之命施於長君之朝也韓琦見純仁奏謂同列曰琦與希文恩如兄弟視純仁如子姪乃忍如此相攻乎是日閤門兩以詔諭誨等赴臺供職誨等又奏臣等近弹奏輔臣乞正大議以雪君父之謗欲清左右之姦愚𠂻憤懣陷于僣越乃至繳還綸告擅離官次情雖愛君罪實違法伏蒙陛下貸其所犯諭令就職臣等徒荷陛下全度之恩未見朝廷法制之正今濮王典禮雖去殊號而首啟邪議之臣未蒙顯責中外猶以為惑臣等何敢自止伏乞檢㑹前奏加罪首惡以慰公論如臣等擅納告去職亦望施行甘與罪人同誅耻與姦臣並進己卯又奏今日事體與漢宣不同當時太子與皇孫俱死于外因其地葬之故曰悼園宣帝即位後八年有司言父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟因園為寢後議者以為父為士子為天子祭以天子者乃謂堯舜禹湯周文漢高受命之君非謂繼綂為後者皇考廟悼園宜毁勿修乃從其請今濮王陪𦵏熈陵列子孫之序奉邑守衞皆已嚴具必别起園寢増廣制度當須改卜易其靈窀不唯熈陵隔絶亦與潤王無别顧其典禮疑有未安漢悼皇止一子是為宣帝雖承大宗不絶小宗之祀故建立寢廟不為過矣議者猶曰考廟悼園宜毁勿修蓋禮不踰閑而當專意於昭帝也况濮王嗣續衆多本祀何闕陛下專意於仁廟而復顧於私親示諸天下其如公議何竊原二詔之意盡出首議之臣令襲定陶之事遂追哀帝之迹向言權罷人皆竊笑今曰且欲誰其取信𠂻誠接下猶或違之譎詭示人何可乆也陛下獨不念先帝恩徳七廟威靈陟降在庭禍福所繫臣雖甚戅内實寒心伏望聖慈先敦孝道無惑邪説黷亂典章俯順人心仰答天意其園廟指揮特行追罷首議之臣不可寛宥慰安中外兹為急務臣等之罪不敢苟避早冀黜謫庚辰又奏臣等本以歐陽修首起邪説詿誤聖心韓琦等依違附㑹不早辨正累具弹奏乞行朝典近覩皇太后手書追崇之典兼用哀桓衰世故事乃與政府元議相符中外之論皆以為韓琦密與中官蘇利陟高居簡往來交結上惑母后有此指揮蓋欲歸過至尊自揜其惡賣弄之迹欲蓋而彰欺君負國乃敢如此陛下知其不可急降手詔雖去殊號然而尚許稱親建議之罪未正典刑陛下縱以輔臣同議勢難全責而修為首惡豈宜曲貸凡人臣得罪君上猶或可赦修乃得罪祖宗故無可赦之理自來大臣有過為憲司所劾例皆闔門憂畏拜章引咎蓋權勢之臣理當如是今修氣貌揚揚出入如故又復巧作姦狀熒惑中外陛下聖鑒清明觀修為人稍失控御何所不至伏望特出聖斷將修黜責臣等亦有不合納誥去職之罪亦乞一時施行臣等雖死之日猶生之年臣等與修理不兩立修苟不黜臣終無就職之理又奏外人皆言韓琦令高居簡蘇利陟眩惑母后而降手書陛下知其不可亟頒手詔其信否不可得而知爾琦與内臣表裏矯託以惑中外為臣不忠無大於是臣以為忠于先帝之臣必能忠于陛下如琦與修負違先帝罔昧母后豈得盡忠于陛下宜審思明察無貽悔于後也乞以臣此章下百官共議歐陽修首惡韓琦令高居簡等眩惑母后之罪不然天下之疑不能釋君父之謗無以辨辛巳又奏手詔稱親之禮謹遵慈訓追崇之典豈易克當固已見陛下守義徇公審重之至也然稱親之禮殊為未安羣口紛紛不勝嗟憤臣等竊詳太后手詔稱親之意蓋用漢宣故事欲行于今乃與中書元建皇考之議大體相依此不免于兩綂二父之失所以議者喧然皆謂母后手書非出慈壽本意皆建議之臣眩惑交結成就其謀欲自掩其惡而杜塞言者之口也陛下繼承之始與漢宣故事不同漢宣之時尚為有司所奏禮為人後者為之子謹請視孝昭所為未有却令大宗正綂之母追稱小宗所生為親者也錯亂禮法失其本意若欲准漢宣故事以濮王為親則襄國已降自當為母於皇太后豈得安哉恭惟陛下親受仁宗詔命而為之子故先帝遺詔誕告萬方謂陛下為皇太子即皇帝位四裔諸夏莫不共聞今乃復稱濮王為親則先帝治命之詔不行而陛下繼體之義不一况太后與政府大臣並受先帝顧託言猶在耳永昭陵土未乾止因一二姦臣之謀遂忘而弗顧陷兩宫于有過之地使四方惑先帝遺詔疑陛下過舉移謳歌欣戴之心為忠憤不平之氣可不痛哉萬一黠敵姦民有以先帝遺詔為問則執政大臣將何辭對之然則稱親之禮豈宜輕用首議之臣安得不誅臣等待罪於家屢䝉詔㫖促令供職而踧踖未敢承命以此故也若必使臣等就職則當合班廷争以救朝廷之失雖陛下容納直言為天下所聞而臣等不能早悟明主之罪益深重矣豈可復居言路為耳目之官哉區區之心有死無二惟陛下留神聽納上令中書降劄子趣使赴臺供職而誨等繳還劄子幷前後所奏九狀申中書堅辭臺職是日詔避濮安懿王名下一字置濮安懿王園令一人以大使臣為之募兵二百人奉園為額又令河南置栢子户五十人命帶御器械王世寜權發遣户部判官張徽度濮安懿王園廟地圖皆從中書所請也呂公著言謹按禮文七廟之諱雖不及王天下皆頒告天下又晉尚書王彪之等議所生之諱臣下不當回避當時以彪之議為當今者輔弼奏請蓋緣臣子之心以陛下未有謙抑之辭竊恐四方後世不免譏議臣愚欲乞特降詔㫖濮安懿王名下一字唯上書奏事者幷聽回改餘公私文字不須避諱庶與祖宗七廟諱小有差别在于天下臣子亦安敢犯者不從壬午詔罷尚書省集議濮安懿王典禮中書進呈呂誨等所申奏狀上問執政當如何韓琦對曰臣等忠邪陛下所知歐陽修曰御史以為理難並立若以臣等為有罪即當留御史若以臣等為無罪則取聖㫖上猶豫乆之乃令出御史既而曰不冝責之太重也誨罷侍御史知雜事以工部員外郎知蘄州純仁以侍御史通判安州大防落監察御史裏行以太常博士知休寜縣故事知雜御史解官皆有誥詞時知制誥韓維當直又兼領通進銀臺司門下封駮事執政恐維繳詞頭不肯草制及封駮勅命遂徑以勅送呂誨等家仍以累不遵禀聖㫖赴臺供職為誨等罪維言罷黜御史事關政體而不使有司預聞紀綱之失無甚于此宜追還誨等勅命由銀臺司使臣得申議論以正官法又言誨等能審論守職國之忠臣計其用心不過欲陛下盡如先王之法而止爾士大夫貪固寵利厚賞嚴罰猶恐此風不變而復内牽邪説貶斥正人自此陛下耳目益壅蔽矣又求對極論其失請追還前勅令百官詳議以盡人情復召誨等還任舊職以全政體皆不從案宋史誨等罷維即以此言進諫故執政恐其不肯草制于情事似得其實是日詔翰林學士知制誥御史中丞知雜各舉御史兩人以起居舍人同知諫院傅堯俞兼侍御史知雜事司馬光言人主患在不聞其過人臣患在不能盡忠是故忠直敢言之臣國家之至寳也夫以人主之尊下臨羣臣和顔色以求諫重爵賞以勸人羣臣猶畏懦而不敢進又况憚之以威懲之以刑則嘉言何從而至哉竊聞侍御史知雜事呂誨侍御史范純仁監察御史裏行呂大防因言濮王典禮事盡被責降中外聞之無不駭愕臣觀此三人忠亮剛正憂公忘家求諸羣臣罕見其比今一旦以言事太切盡從竄逐臣竊為朝廷惜之臣聞人君所以安榮者莫大於得人心今陛下徇政府一二人之情違舉朝公議尊崇濮王過於禮制天下之人已知陛下為仁宗後志意不專悵然失望今又取言事之臣羣輩逐之臣恐累於聖德所損不細閭里之間腹誹竊嘆者多矣况純仁大防皆陛下簡㧞於衆人之中任以為耳目之臣蓋取其忠直非取其阿諛也純仁大防亦欲竭誠盡節以報陛下之知故不敢附政府侃然正論今更以此獲罪則陛下於羣臣之中尚誰親哉若使忠直日退阿諛日進則陛下何以復知臣下之善惡政事之得失如此殆非國家之福也伏望聖慈亟令誨等還臺供職則天下翕然皆歌陛下之聖明雖禹之樂聞善言湯之改過不吝不是過矣不則且為之别改近地一官亦可以少慰外人之心也呂公著言呂誨等以論事過當並從降責聞命之始物論騰沸皆云陛下自即位以來納善從諫之風未形於天下今誨等又全䑓被黜竊恐義士鉗口忠臣解體且自古人君納諫則興拒諫則亡興亡之機不可不審臣願陛下以天地之量包荒含垢特追誨等勅命令依舊供職則天下幸甚二月乙酉朔白虹貫日殿中丞蘇軾直史館上在藩邸聞軾名欲以唐故事召入翰林便授知制誥韓琦曰蘇軾遠大之器也他日自當為天下用在朝廷培養之使天下之士莫不畏慕降伏然後取而用之則人人無復異詞今驟用之恐天下之士未必皆以為然適足累之也上曰知制誥既未可與修起居注可乎琦曰記注與制誥為鄰未可遽授不若於館閣中擇近上帖職與之且近例當召試上曰未知其能否故試如蘇軾有不能耶琦言不可乃試而命之他日歐陽修具以告軾軾曰韓公待軾之意乃古所謂君子愛人以德者也庚寅從知開封府沈遘之請増置判官一員以祠部員外郎秘閣校理孫坦為之專管勾使院諸按公事開封府推判官各二人日力所給兩軍獄訟而已諸按多留滯為姦及増置人皆便焉坦因條畫綱目凡四十九事為後法坦開封人也丙申知制誥韓維言准勅舉御史緣臣近累奏乞追復呂誨等所有舉御史勅未敢受詔閤門納勅中書乙已潁王府翊善邵亢奏皇子潁王天質早茂婣媾及期方陛下即位之初而元嗣克家之日推之於禮莫重於斯臣伏見國朝親王聘納雖開寶通禮具有舊儀而因循未嘗施行至有敲門羊酒鎭櫃錢銀乃里巷常談蓋薦紳所不道行于聖朝竊所未安欲乞下太常禮院博考舊典修撰潁王聘納儀範其故事非禮者悉罷之詔禮院詳定禮院奏開寶通禮親王納妃有納采問名納吉納成請期親迎同牢之禮國朝未嘗用今檢到國朝㑹要皇親婚㑹禮物數請如㑹要故事從之三月丁巳賜羣臣御筵於諸園苑己未彗星辰見于壁長七尺許本紀在庚申今從實録及本志案宋史作辰見于室辛酉起居舍人同知諫院傅堯俞侍御史趙鼎趙瞻自契丹使歸以嘗與呂誨言濮王事家居待罪而堯俞新除侍御史知雜事告牒不受稽首上前曰臣初建言在誨前今誨等逐而臣獨進不敢就職上數諭留堯俞等堯俞等終求去乃以堯俞知和州鼎通判淄州瞻通判汾州瞻初以接伴契丹使對延和殿謂上曰陛下為仁宗子而濮王稱皇考非典禮上曰卿嘗見朕欲以皇考事濮王乎瞻曰此大臣之議陛下未嘗自言也上曰此中書過議耳瞻因請宣諭中書上曰朕意已决亦無庸宣諭也請宣諭中書據傅堯俞范祖禹所為瞻墓志神道碑司馬光言比蒙聖恩宣諭濮王稱親事云此字朕不欲稱假使只稱濮王與仙遊縣君有何不可臣乃知陛下至公初無過厚於私親之意真為政府所誤以致外議紛紛必謂旦夕下詔罷去親名其已出臺官當别有除改見在臺官亦優加撫諭使之就職今忽聞傅堯俞等三人相繼皆出中外之人無不驚愕此蓋政府欲閉塞來者使皆不敢言然後得專秉大權逞其胷臆臣竊惟陛下春秋方壯聖性欽明而今日獨取拒諫之名受辜恩之謗違天下之望失人主之權止於遂政府數人狠心而已不知於陛下有何所利而為之臣不勝區區深為陛下痛惜伏望陛下勿復詢於政府特發宸斷召還堯俞等下詔更不稱親如此則可以立使天下憤懣之氣化為歡欣誹謗之語更為謳歌矣不從光遂奏請與堯俞等同責且居家待罪又奏陛下即位之年臣已曽上䟽預戒追尊之事及過仁宗大祥臣即與堯俞詣政府白以為人後者不得顧私親之義當兩制禮官共詳時臣又獨為衆人手撰奏草若治其罪臣當為首其呂誨等係後來論列既蒙譴逐如臣者豈宜容恕縱陛下至仁特加保庇臣能不媿於心乎有詔促光赴經筵供職光又奏臣與傅堯俞等七人同為臺諫官共論典禮凡堯俞等所坐臣大約昔曽犯之今堯俞等六人盡已外補獨臣一人尚留闕下使天下之人皆謂臣始則倡率衆人共為正論終則顧惜禄位苟免刑章臣雖至愚粗惜名節受此指目何以為人非徒如是而已又使譏謗上流謂國家行法有所偏頗臣是用晝則忘餐夕則忘寢入則媿朝廷之士出則慙道路之人藐然一身措之無地伏望聖慈曲垂矜察依臣前奏早賜降黜凡四奏卒不從御史中丞彭思永上䟽請正典禮召還言事者因自求罷不許思永以去年十月為中丞方呂誨等争論典禮思永不應黙誨等既斥逐而思永居位如故則思永雖言之必不力本傳云思永乞還斥逐者六人及自求罷今且附見當考又御史臺記云臺寮濮議俱已被黜思永媕阿不一言營救議者醜之切案宋史載思永上疏極論濮王稱親之議英宗感其至垂欲施行而政府持之甚力卒不果據此則不得謂媕阿不一言矣壬戍屯田員外郎簽書江寧節度判官事孫昌齡為殿中侍御史太常博士監永豐倉郭源明為監察御史裏行甲子都官員外郎黃照為侍御史太常博士蔣之竒為監察御史裏行初命王珪等舉官已除昌齡及源明而尚闕兩員中書以珪等前所舉都官員外郎孔宗翰等七名進而照中選上又特批之竒與御史歐陽修素厚之竒之竒前舉制策不入等嘗詣修盛言追崇濮王為是深非范百禄所對修因力薦之既與照並命之竒入對上面諭曰朕鄉覽卿所對策甚善而有司誤遺故親有是除昌齡晉陵人照江陵人源明勸子之竒宜興人堂從子宗翰道輔子也是日納故宰相向敏中孫女為皇子潁王婦封安國夫人先是禁中遣使泛至諸臣之家為王擇配記室韓維奏王孝友聰明動履法度方嚮經學以觀成德今卜姓授室其繫尤重宜厯選勲望之家精揀淑哲之媛考古納采問名之義以禮成之不宜苟取色而已封安國夫人在辛未日今幷書庚午以彗出避正殿减常膳上對樞臣以彗為憂胡宿請備邊呂公弼曰彗非小變不可不懼陛下宜側身修德以祗天戒臣恐患不在邊也公弼傳新除監察御史裏行郭源明奏免除命乞追還呂誨等詔聽源明免以告牒納中書辛未手詔曰朕近奉皇太后慈㫖濮王令朕稱親仍有追崇之命朕惟漢史宣帝本生父稱曰親又諡曰悼裁置奉邑皆應經義既有典故遂遵慈訓而不敢當追崇之典朕又以上承仁考廟社之重義不得兼奉私親故但即園立廟俾王子孫世襲濮國自主祭祀遠嫌有别蓋欲為萬世法豈皆權宜之舉哉而臺官呂誨等始者專執合稱皇伯追封大國之義朕以本生之親改稱皇伯厯考前世並無典據追封大國則又禮無加爵之道向自罷議之後而誨等奏促不已忿其未行乃引漢哀帝去恭皇定陶之號立廟京師干亂正統之事皆朝廷未嘗議及者厯加誣詆自比師丹意欲搖動人情眩惑衆聽以至封還誥勅擅不赴臺明繳留中之奏於中書録傳訕上之文於都下暨手詔之出誨等則以稱親立廟皆為不當朕覽誨等前疏亦云生育之恩禮宜追厚俟祥禫既畢然後講求典禮褒崇本親今乃反以稱親為非前後之言自相抵牾傅堯俞等不顧義理更相唱和既撓權而示衆復歸過以取名朕姑務含容屈於明憲止命各以本官補外尚慮搢紳之間士民之衆不詳本末但惑傳聞欲釋羣疑理當申諭宜令中書門下俾御史臺出牓朝堂及進奏院遍牒告示庶知朕意命左諫議大夫天章閣待制兼侍講李受赴諫院供職癸酉詔曰去秋以來雨潦為沴撫存賙濟甫臻和平今星躔生變咎徵昭灼撫躬以思惄焉如疾天威震動戒在眇躬洗心自新宜自朕始故避殿撤膳夙夜惕厲永惟四海之内獄訟寃煩調役頻冗與夫鰥寡孤獨死亡貧苦甚可傷也轉運使提㸃刑獄分行省察而矜恤之利病大者悉以聞庶仁恩家至副朕寅畏之心焉辛巳彗昏見于昴如太白長丈有五尺案宋史作晨見于昴壬午孛于畢如月武康節度使知相州李端愿上疏論政事驛召賜對端愿曰彗所以除舊布新也今官冗士偽費廣兵驕非大更張不可塞異如或不然安知不有大掃除者乎
