body:
  text: 續資治通鑑長編巻一百三十五宋李燾撰仁宗慶厯二年春正月庚戌詔近分陜西縁邊為四路各置經略安撫招討等使自今路分部署鈐轄以上許與都部署司同議軍事路分都監以下並聽都部署等節制違者以軍法論詔河北京東西民間以歲不稔伐樹撤屋鬻賣甚多宜令轉運司以省錢依價收市修蓋新添軍營又詔京西轉運司速發省倉粟貸民户二石辛亥詔武城節度使同平章事駙馬都尉柴宗慶赴本鎮權御史中丞賈昌朝言宗慶前在鄭州貪汚不法若更令赴本鎮恐益以殘民乃詔宗慶仍留京師東頭供奉官閤門祗候李志勲落職降監當初志勲為京城東廵檢累獲賊因擢為閤門祗候使捕浙東軍賊鄂鄰而所過逗遛不行故責及之詔麟府路兵馬罷癃不任征役者徙近裏州以省邊費癸丑知慶州范仲淹請給樞密院及宣徽院頭子空名者各百道緩急書填以勸賞戰功及招降蕃部從之按仲淹奏議乞宣頭乃議攻守二策貼黄實錄不載二策獨載貼黄不知何也二策已附去年十一月仲淹又言朝廷每有機宻文字下都部署司縁本司官員數多難以衆議乞止下經略招討司貴不漏洩從之去年十一月二十九日奏今報可丁巳命翰林學士聶冠卿權知貢舉初端明殿學士李淑侍經筵訪以進士詩賦策論先後俾以故事對淑退而上奏曰唐調露二年劉思立為考功員外郎以進士止試策滅裂不盡其學請貼經以觀其學試雜文以觀其才自此㳂以為常至永隆二年進士試策雜文通文律者始試策天寳十一年進士試一大經能通者試文又通而後試策五條皆通為中第建中二年趙賛請以時務策五篇論表賛各一篇以代詩賦大和三年試帖經略問大義取精通者次試論義各一篇八年禮部試以帖經口義次試策五篇問經義者三問時務者二厥後變易遂以詩賦第一塲論第二塲策第三塲帖經第四塲今陛下欲求理道不以雕篆為貴得取士之實矣然考官以所試分考不能通加評較而毎塲輙退落士之中否特係于幸不幸爾願約舊制先䇿次論次賦次帖經墨義而敇有司并試四塲通較工拙毋以一塲得失為去留詔有司議稍施行焉此議按本志與罷殿試相聯書之不得其時今附命官知貢舉後淑以慶歴元年六月出知許州矣自元昊反聚兵西鄙並邊入中芻粟者寡縣官急於兵食且軍興用度調發不足因聽入中芻粟予劵趨京師𣙜貨務受錢若金銀入中他貨予劵償以池鹽由是羽毛筋力膠漆鐵炭瓦木之類一切以鹽易之猾商貪人乘時射利與官府吏表裏為姦至入椽木二估錢千給鹽一大席大席為鹽二百二十斤虛費池鹽不可勝計鹽直益賤販者不行公私無利朝廷知其弊戊午用三司使姚仲孫請以度支判官刑部員外郎祕閣校理范宗傑為制置解鹽使往經度之詔復京師𣙜法宗傑請凡商人以虚估受劵及已受鹽未鬻者皆計直輸虧官錢内地州軍民間鹽悉收市入官為置場増價而出之復禁永興華耀河中陜虢解晉絳慶成十一州商賈官自輦運以衙前主之又禁商鹽私入蜀置折博務於永興鳯翔聽人入錢若蜀貨易鹽趨蜀中以售詔皆用其說京兆府布衣雷簡夫隠居不仕樞宻使杜衍薦之召見論邊事甚辯上說令中書檢真宗用种放故事吕夷簡言士大夫有口才者未必能成事也請姑試之乃以為校書郎秦州觀察判官簡夫孝先子也貸三京鄭孟宿亳泗五州浚汴河丁夫糧人一斛壬戌分遣内臣往河北路催募兵及萬人者賞之詔陜西蕃族内附而無親屬者並送京西州郡處以閒田知慶州范仲淹前奏攻守二議詔答以將帥累經挫衂未甚勇果若幸於或勝恐非良籌假令克獲又煩守備若且勤於訓練嚴加捍禦逺設探候制其奔衝見利乃進觀釁而動庶可以飬鋭持乆卿宜深體此意與鄰路互相應援協心畢力有便宜密具以聞仲淹復奏曰國家太平日乆而一旦西賊背徳凌犯邊鄙公卿大夫爭進計策而未能副陛下憂邊之心且議攻者謂守則示弱議守者謂攻必速禍是二議卒不能合也臣前至延安初請復諸寨為守禦之備次則幸其休兵輙遣一介示招納之意朝廷以羣言之異未垂采納今臣領慶州日夜思之乃知攻有利害守有安危何則蓋攻其逺者則害必至攻其近者則利必隨守以土兵則安守以東兵則危臣謂攻逺而害者如諸路深入則將無宿謀士無素勇或風沙失道或雨雪彌旬進則困大河絶漠之限退則有乘危扼險之憂臣謂攻近而利者在延安慶陽之間有金湯白豹之阻本皆漢寨沒為賊境隔延慶兵馬之援為蕃漢交易之市姦商往來物皆叢聚此誠要害之地如别路入㓂數百里外應接不及則當逺為牽制金湯白豹等寨可乘虚取之因險設陣布車横塹不與馳突擇其要地作為城壘則我無不利之虞至於合水華池鳳川平戎柔逺徳靖六寨兵甲糧斛可就屯泊固非守備之煩也又環州定邊寨鎮戎軍乾興寨相望八十餘里二寨之間有胡盧泉今屬賊界為義渠朝那二郡之交其南有敏珠爾宻桑之族若進兵據胡盧泉為軍壁北㫁賊路則二族自安宜無異志又朝那之西秦亭之東有水洛城亦為之限今策應之兵由儀隴二州十驛始至如進修水洛㫁賊入秦亭之路其利甚大非徒通四路之勢因以張三軍之威也臣謂守以土兵則安者以其習山川道路之利懐父母妻子之戀無乆戍之苦無數易之弊謂守以東兵則危者蓋費厚則困於財戍乆則聚其怨財困則難用民力日窮士心日離他變之生出於不測臣所謂攻宜取其近而兵勢不危守宜圖其乆而民力不匱招納之策可行於其間今奉詔宜令嚴加捍禦觀釁而動與鄰道協心而共圖之又覩赦文謂彼無騷動則我不侵掠臣恐賊㓂一隅逺在數百里外應援不及須為牽制之策以沮賊氣至時諸路重兵豈能安坐如無素定之畫又無行營之備恐當牽制之時茫然無措雖見利而莫敢進雖觀釁而莫敢動㓂至愈盛邊患愈深叛亡之人日助賊筭不可不大為之謀也願朝廷於守策之外更備攻術彼冦其西我圖其東彼冦其東我圖其西寧有備而不行豈當行而無備也所謂備者必先得宻㫖許抽將帥便宜從事并先降空名宣頭之類恐可行之日奏請不及臣前曽遣人入界通往來之問或更有人至不可不答如朝廷先降密㫖令往復議論嵗年之間當有成事若謂邊將之耻未雪而不欲俯就臣恐諸路更有不支其耻益大賊或潜結諸蕃并勢合謀則禦之必難且自古兵馬精勁西戎之所長也金帛豐富中國之所有也禮義不可化干戈不可取則當任其所有勝其所長此霸王之術也臣前知越州每嵗納稅絹十二萬和買絹二十萬一郡之入餘三十萬儻以啖敵是費一郡之入而息天下之弊也詔陜西諸路經畧招討司參議以聞據范仲淹奏議先議攻守二策因梁適賫回赴闕詔答仲淹令與鄰道互相應援故仲淹復上此實録削其前議但存後章今前議已附去年十一月末癸亥詔磨勘院自今提㸃刑獄朝臣代還列功過三等以聞上等除省府判官轉運使副中等除大藩一任然後升陟之下等降知州又詔御史臺舉屬官事太常博士以上兩任通判三人中御筆㸃一人如聞難於得人自今聽舉一任通判及三丞該磨勘者二人選之甲子詔河北河東陜西轉運司體量知縣縣令幕職官老疾不任事者以名聞詔自今南郊臣僚在假不赴朝參者無得奏乞骨肉恩澤乙丑詔以同州沙苑監牧地為營田又詔府州擇建安指揮之材勇者為㨂中建安指揮以𨽻禁軍丙寅詔奉使契丹不得輙自賦詩若彼國有請者聽之丁卯賈昌朝請罷舉人試院所冩策題從之補環慶路内附偽團練使鄂齊爾為懐化將軍給供奉官廵檢俸辛未以大相國寺新修太宗御書殿為寳奎殿摹太宗御書寺額於石上飛白題之命宰相吕夷簡撰記章得象額樞密使晏殊撰御飛白書記秦州言築東西關城成賜總役官吏金帛有差初知州韓𤦺以為州之東西居民及軍營僅萬餘家皆附城而居無所捍蔽因請築外城凡十里計工三百萬自十月起役至是成之癸酉徙秦鳳副部署殿前都虞候感徳軍留後李昭亮為永興軍部署韓琦言昭亮本貴家子平生未識行陣故徙之三月乙亥朔審官院言河北河東陜西諸州請權令京朝官知録事參軍從之丙子廢渭州定川寨丁丑權御史中丞賈昌朝侍講邇英閣故事臺丞無在經筵者上以昌朝長於講說特召之知秦州韓𤦺請降樞密院空名宣頭五十道以賞屬羌之有功者從之契丹謀聚兵幽薊遣使致書求關南地知保州衣庫使王果先購得其書藁以聞且言契丹潜與昊賊相結將必渝盟請自廣信軍以西縁山口賊馬出入之路預為控守詔劄付河北安撫司密修邊備杜惟序亦先購得契丹書藁以聞而實録不載疑惟序所奏在王果之後也庚辰詔滄州鈐轄洛苑使普州刺史楊懐敏只以廵隄為名權住莫州與知雄州六宅使忠州刺史杜惟序等同管勾機宜司事此據朔歴詔秦州自今嘉勒斯賚及外國進奉人並約定人數令赴闕所進方物以本城軍士傳送之勿令自雇傭人嘗有詔於永寧寨以官屋五十間給嘉勒斯賚收貯財物韓𤦺奏曰使外藩居邊城非便未敢奉詔詔曰嘉勒氏已有謝表不可失信生事自應與屋宇亦不絶秦州往來可於閒慢處修蓋常關防覺察之𤦺曰秦州居常葢暫往來今既許置屋貯財必留人主守豈能旦夕伺察使朝廷舉動皆知况契丹元昊亦未曽縁邊給屋昨楊勤至龜兹一行皆鏁之於館我使至嘉勒氏在驛亦禁出入逺蕃於中國尚備慮如此防微杜漸不可忽也臣以為勿給便從之此據韓𤦺家傳舊制諸州薦貢者既試禮部則引試崇政殿而知制誥富弼言曰國家㳂隋唐設進士科自咸平景徳已來為法尤密踰於前代而得人之道或有未至夫省試有三長殿試有三短主文衡者四五人皆一時詞學之選又選命館閣才臣數人以助考校復有監守廵察糊名謄録上下相警不容毫釐之私一長也引試三日詩賦所以見才藝䇿論所以觀才識四方之士得以盡其所藴二長也貢院凡兩月餘研究差次可以窮功悉力三長也殿試考官泛取而不擇一短也一日試詩賦論三篇不能盡人之才二短也考校不過十日不暇研究差次三短也若曰禮部放牓則權歸有司臨軒唱第則恩出主上則是忘取士之本而務收恩之末也且歴代取士悉委有司獨後漢文吏課牋奏副之端門亦未聞天子親試也至唐武后載初之年始有殿試此何足法哉必慮恩歸有司則宜使禮部次髙下以奏而引諸殿庭唱名賜第則與殿試無所異矣辛巳詔罷殿試而翰林學士王堯臣同修起居注梁適皆以為祖宗故事不可遽廢越三日癸未詔復殿試如舊詔陜西兵官不帶路分及知州者無得給親兵知延州龐籍言近詔詳范仲淹所上攻守之策及仲淹近遣本州推官張問至具述延慶之間合力出兵之議臣竊惟夏衆之舉賫糧不過十日而利於速戰短於攻城彼攻我城則常多死傷我速與戰則屢成挫衂若諸城寨有樓櫓矢石芻糧水泉之具即委之使攻既齎無乆糧野無所掠就使十日不退我以重兵乘之觀釁而動誠得全禦戎之體萬一它路力不能支須至用仲淹之策然由徳靖出師路縁洛河渉春泥濘歩騎難進若乆留賊界人心多揺川谷之險皆可以邀擊我軍意外之虞恐不能盡如豫筭或冦深患大亦不免與仲淹合謀而入擇地而攻也仲淹所陳守用土兵則安用東兵則危今土兵之數無多而難於招募東兵亦未可去也且當撫馭訓練興營田減冗費為持乆寛民之計賊來則力禦之有隙則間諜之以俟其敝且西羌之俗嵗時以耕稼為事畧與漢同近年屢有㸃集人多失業每入冦邊郡計其掠獲未足償其所費人尚不樂若堅壁清野使無所得則勢必益窮心必益怨嵗月之間釁變必生心危勢動然後招納之策始可行焉仰料朝廷固不吝財貨以安方隅但深思極慮體有大於此者矣知秦州韓琦言范仲淹議進兵修水洛城通秦渭道路穿驀生戸幾二百里計其土工亦數百萬止可通二州援兵亦未能斷絶西賊往來近築秦州開城方畢工尚有衝要城寨當修治者甚多未敢再勞人力詔從琦請勿修此據𤦺家傳附見龐籍䟽後乙酉詔陜西縁邊經畧招討司戰兵身無它傷而被馘劓耳鼻或遺失器甲剥去衣服者斬中書樞密院奏言諜報夏人破蕩轄戩族帳欲與嘉勒斯賚相攻請令韓𤦺遣人諭嘉勒斯賚多方捍禦之奏可丙戌太常博士天章閣侍講林瑀落職通判饒州先是瑀奉詔撰周易天人㑹元紀其說用天子即位年月日辰占所直卦以推吉凶且言自古聖王即位必直乾卦若漢髙祖及太祖皇帝皆是也書成上之詔學士院看詳皆言瑀所編纂事渉圖緯乞藏秘閣詔賜瑀銀絹各五十兩疋御史中丞賈昌朝嘗面折瑀所言不經瑀與昌朝辨於上前由是與昌朝迕及是瑀又言上即位其卦直需其象曰雲上於天需君子以飲食燕樂臣願陛下頻出宴遊極水陸玩好之美則合卦體當天心矣上駭其言因問太宗即位直何卦瑀對非乾卦問真宗對亦然上始厭瑀之迂誕昌朝即劾奏瑀儒士不師聖人之言專挾邪說罔上聽不宜在經筵上乃謂輔臣曰人臣雖有才學若過為巧偽終渉形迹遂罷絀瑀而命著作佐郎崇文院檢討趙師民為崇政殿說書師民臨淄人也八歲喪父哀慟如成人九歲能屬文家貧借書讀已輙還人恠其速叩問皆已成誦舉進士時曹瑋李迪在青州聞師民名遣人敦請乃見就試禮部四方士環觀通衢中劉筠知舉獨置坐席于都堂前諸生皆閣筆從之天聖末考中一等或曰師民乃靑州大姓麻氏甥麻氏坐豪侈踰制賊殺親屬誅師民不可以先多士遂降等及第孫奭辟兖州說書領諸城王簿師民學問精博奭自以為不及夏竦尤所竒重稱為盛徳君子論其文行乞回兩子恩授以京秩除齊州推官青州教授更天平軍節度推官年五十來京師近臣張觀宋庠王堯臣龐籍韓𤦺明鎬列薦為國子監直講兼潤冀二王宫教授改著作佐郎宗正寺主簿加崇文院檢討林瑀既逐師民遂代其任實録載林瑀事不詳取司馬光記聞及朔歴魏泰東軒録并王安石王珪所作賈昌朝墓誌神道碑増修趙師民事記聞又與正傳别今從正傳詔陜西轉運司自今無得差知縣出外仍遣大理寺丞安保衡等五人往本司以備差使余靖諌草有此請然靖此時未復館職恐不縁靖也戊子詔嘗歴省府推判官轉運使副提㸃刑獄朝臣及少監卿以上物故者十年内與其親弟姪子孫一人家便官升涇原路靜邊等寨新置蕃落指揮𨽻禁軍己丑崇儀副使王整同提㸃河北刑獄詔整嘗假六宅使奉使北朝今北使過境恐訝其官名不同特與改此使額知諫院張方平言伏以崇儀六宅頗為超越北使之來提㸃刑獄不預賔主之事整雖在職使人豈知即恐以假官為嫌自應改授别路每嵗所遣使介例皆假官以行回而效整之行遂成真拜之例今政之大弊在多倖人塞其蹊隧猶不可若又啓之何以為政如整誠有是請原情深渉欺誣必朝廷懲沮纎邪修明法度不惟宜停恩㫖并當下從吏議别行譴斥以戒為臣整尋徙它官整徙它官不見於實録但十二日除整十八日又除王儀必以方平之言故也然儀文臣整則武臣又恐非代整者但八月己亥整又安撫京東則亦徙他官矣方平稱假洛苑使按整去年實假六宅使今從實録辛卯知秦州韓琦請罷本州所招䕶塞軍増置蕃落二指揮從之壬辰賜太子中舎陸秉進士出身仍改太子中允秉即東也先召試學士院賜出身輙拒不受坐責至是更赦乃復予之貸開封府諸縣貧民常平粟人三斗戸不得過二石乙未詔真定府定州天雄軍澶州各備兵馬十萬人芻糧二年及器甲五萬副又詔河北路提㸃刑獄視所部州軍城隍應修者悉修之又詔河北諸州强壮自三月後並赴州閱習委知州擇其强勁者刺手背為義軍不願者釋之而存其籍以備守葺城池自是强壮寖廢矣詔始下人情訩訩河北轉運使李昭述乗疾置日行數驛開諭父老衆始安河北强壮自三月後赴州教閱委知州㨂刺義勇及提刑按視城隍並據朔歴増修實録不詳也不願者釋之及强壮自此廢矣據兩朝兵志李昭述事今附見熊克九朝通畧昭述宗鍔子也河北安撫使請令縁邊都廵檢司潛益兵馬及詔河北管軍臣僚密作備禦從之此亦據朔歴丙申賜麟府路修築堡寨役卒緡錢徙真定府定州路都部署宣徽南院使天平節度使夏守贇為高陽關都部署守贇自言高陽關路乃在真定府定州下尋命守贇兼判瀛州丁酉升河北㕔子馬及無敵招收軍並𨽻禁軍仍詔輦致本路諸縣鎮糧草入州城河北安撫司請下縁河州軍密遣戰船詔京東西路造五百隻赴河北戊戌召知陳州河陽三城節度使楊崇勲赴闕此據朔歴己亥中書樞密院言剗刷到外處就糧馬歩軍六十四指揮一萬三千八百四十人欲並遣赴澶州駐泊從之辛丑以新知澶州保靜軍留後王徳用為保靜軍節度使契丹將渝盟上起徳用於曹州復留後知青州不數日改澶州入見上流涕言臣前被大罪陛下幸赦而不誅今不足辱命上慰勞曰河北方警藉卿威名鎮撫爾又賜手詔以遣之即拜節度使衣庫使知保州王果領賀州刺史兼高陽關鈐轄詔殿前馬歩軍司給衣甲教閱在京諸軍仍差近上内臣二人提舉之三月甲辰朔兵部員外郎集賢校理張昷之為直史館河北路轉運使從三司使姚仲孫所舉也復太常博士余靖為集賢校理詔殿前副都指揮使高化馬軍副都指揮使李用和歩軍副都指揮使曹琮舉諸軍指揮使以上有膽勇方畧堪任將領者各二人入内都知張永和内侍都知王世忠舉武臣各二人諸路轉運使副使各一人乙卯詔河北比歲積雨壊道塗其塹官路兩旁濶五尺深七尺民田各於封界濶三尺深五尺以泄水潦限半年畢工中書樞密院奏乞簡河東弓手有武勇者不刺面為義勇指揮陜西弓手刺面為保㨗指揮從之實録不云保㨗刺面此從朔歴丙辰復河陽三城節度使楊崇勲同平章事判定州兼真定府定州路都部署丁巳命樞密使杜衍為河東宣撫使翰林學士承㫖丁度副之諸州軍刑獄罪疑可閔者並從輕决無令淹繫本路諸軍各差緡錢其屯兵多處加燕犒之王益柔傳杜衍宣撫河東益柔寓書言河外兵餉無法非易帥臣與轉運使則邊鄙不寧因條其可任者與衍意合此事當考慶歴四年五月益柔始除集校己未詔軍頭司擇沙門島放還罪人之伉健者𨽻近京歸逺壮勇指揮環慶路都部署請於柔逺寨東節義烽馬鋪寨擇地益建城寨以牽制賊勢涇原路又請於細腰城屬𦍑地内建寨以接兩路出兵並從之四年十二月乃城細腰此時未也但有請耳庚申魏國大長公主乞加贈故太儀方氏詔贈淑妃辛酉右諫議大夫參知政事晁宗慤罷為給事中資政殿學士以乆被疾故也壬戌茭村族三班殿侍折馬山為三班奉職馬山領衆攻西賊所置新寨斬首級甚衆特遷之甲子詔河北縁邊州軍置場買馬從閤門祗候侍其濬之請也乙丑御崇政殿賜進士楊寘等二百三十七人及第一百二十二人出身七十三人同出身寘察弟初試國子監禮部皆第一及是帝臨軒啓封見姓名喜動於色謂輔臣曰楊寘也公卿相賀為得人授將作監丞通判潁州未至官持母喪病羸卒無子詔賜其家錢五萬米麥各五十斛絹五十匹賜物在四年二月今并書丙寅賜諸科及第并同出身者四百七人又賜特奏名進士諸科三百六十四人同出身及補諸州長史文學中書言三司每歲買紅花紫草各十萬斤民不能供詔止買五萬斤禁中及外人應給紅紫羅帛者給染價丁卯知青澗城种世衡請募蕃兵五千左手虎口刺忠勇二字令𨽻折馬山族從之上封者因請募屬户給以禁軍廪賜使戍邊悉罷正兵下其章四路安撫使議環慶路范仲淹上言熟户戀土田䕶老弱牛羊遇賊力鬬可以藩蔽漢户而不可倚為正兵大率蕃情黠詐畏强凌弱常有以制之則服從可用如去正兵必至驕蹇又今蕃部都虞候至副兵馬使奉錢止七百三百悉無衣廪若長行遽得禁軍奉給則蕃兵必生邀望况歲罕見敵何用長與廪給且錢入熟户部族資市牛馬青鹽轉入河西亦非策也以臣所見不若遇有警旋以金帛募令禦賊為便議遂格仲淹議據兵志己巳契丹遣宣徽南院使歸義節度使蕭英翰林學士右諫議大夫知制誥同修國史劉六符来致書曰弟大契丹皇帝謹致書兄大宋皇帝粤自世修歡契時遣使軺封圻殊兩國之名方册紀一家之美蓋欲洽於綿永固將有以披陳切縁馬橋關南是石晉所割迄至柴氏以代郭周興一旦之狂謀掠十縣之故壤人神共怒廟社不延至於貴國祖先肇創基業尋與敝境繼為善鄰暨乎太宗紹登寳位於有征之地才定并汾以無名之師直抵燕薊羽召精鋭禦而獲退遂至移鎮國强兵南北王府并内外諸軍彌年有戍境之勞繼日備渝盟之事始終反覆前後諳嘗竊審專命將臣往平河右炎凉屢易勝負未聞兼李元昊於北朝乆已稱藩累曽尚主克保君臣之道實為甥舅之親設罪合加誅亦宜垂報邇者郭稹特至杜防又回雖具音題而但虞詐諜已舉殘民之伐曽無忌器之嫌營築長城填塞隘路開决塘水添置邊軍既潛稔於猜嫌慮難敦於信睦儻或思乆好共遣疑懐曷若以晉陽舊附之區關南元割之縣俱歸當國用康黎人如此則益深兄弟之懐長守子孫之計𬗟惟英悟深逹悃悰適届春陽善綏冲裕先是西兵乆不决六符以中國為怯且厭兵因教其主聚兵幽涿聲言欲入邊而六符及英先以書來求關南十縣先是正月己巳邊吏言契丹泛使且至朝廷為之旰食歴選可使敵者羣臣皆憚行宰相吕夷簡舉右正言知制誥富弼入對便殿叩頭曰主憂臣辱臣不敢愛其死上為動容壬申命弼為接伴弼以二月丙子發京師至雄州乆之英等始入境遣中使慰勞英稱足疾不拜弼謂曰吾嘗使北病卧車中聞命輙拜今中使至而君不起此何禮也英瞿然起遂使人掖而拜弼詧英等自以敵先違盟約及其從者皆有懼心可動故每與之開懐盡言冀以鈎得其情英等以故亦推誠無隠乃密以其主所欲得者告弼且曰可從從之不從更以一事塞之王者愛飬生民舊好不可失也弼具以聞及英等至命御史中丞賈昌朝館伴朝廷議所欲與不許割地而許以信安僖簡王允寧女與其子梁王洪基結㛰或増歳賂獨弼以結㛰為不可初契丹之弟宗元者號大弟挾太后勢用事横於彼國嘗自通書幣上欲因今使答之令昌朝問六符六符辭曰此於太后則善然於本朝不便也昌朝曰即如此而欲以梁王求和親皇帝豈安心乎六符不能對既而敵卒罷結㛰之議辛未授弼禮部員外郎樞密直學士將使弼報聘故也弼曰國家有急惟命是從不敢憚勞臣之職也奈何逆以官爵賂之固辭不受此據朔歴實録無之正月己巳壬申並據記聞二月丙子據弼奏議國史實録並無之庚午命知青州陳執中兼京東路安撫使執中兼安撫使乃庚午日在辛未前嫌與下文相間故别出之是春范仲淹廵邊至環州州屬羌隂連敵為邊患仲淹謂种世衡素得屬羌心而青澗城已堅固乃奏世衡知環州以鎮撫之龐籍請留世衡詔仲淹更擇人仲淹言非世衡則屬羌不可懐詔從仲淹所請有牛家族諾爾阿者屈强未嘗出聞世衡至遽郊迎世衡與約詰朝行其族是夕大雪深三尺左右白地險不可往世衡曰吾方結諸羌以信不可失期遂縁險而進諾爾阿方卧帳中謂世衡必不能至世衡蹵而起諾爾阿大驚率其族羅拜聽命又有烏爾族受夏偽補世衡招之不至命蕃官慕恩出兵討之其後百餘帳皆自歸莫敢貳因令諸族置烽火有急則舉燧介馬以待又課吏民射有過失射中則釋其罪有辭某事請某事輙因中否而與奪之由是人人自勵雖屠販倡優皆精於射夏不敢復近環州初世衡在青澗為屬吏所訟以不法事按騐皆有状龐籍言世衡披荆棘立青澗城若一拘以法則邊将無所措手足詔勿問及徙環州詣籍拜且泣曰世衡心腸鐡石也今日為公下淚矣世衡自青澗城徙環州實録不記按仲淹作世衡墓誌稱慶歴二年春今附此既稱途遇大雪則必不在夏月矣然四月辛巳補王嵩官猶以青澗城奏或發奏時世衡未離青澗及四月乃從世衡從青澗所奏補嵩官而世衡實已赴環州也夏四月乙亥以度支副使楊日華為鹽鐡副使施昌言為度支副使初權三司使姚仲孫言度支比鹽鐡為繁而日華以疾數在告且薦昌言故改之資政殿學士給事中晁宗慤卒贈工部尚書謚文莊丁丑詔兩制大兩省并諫官閤門使以上舉内殿崇班以下堪將帥者各二人以聞戊寅命權御史中丞賈昌朝右正言田况知諫院張方平入内都知張永和與權三司使姚仲孫同議裁減浮費先是方平奏䟽言伏見西事已來應副邊備天下被其勞凡百賦率至増數倍當時朝㫖蓋為用兵之際權宜應急豈可承以為常今邊防雖已漸寧而縁邊戍守未能撤備四方添置兵數亦甚多向之所増賦斂卒難復舊何以慰天下百姓之望朝廷所以綏懐逺人者正謂寛財用紓民力以厚為之備今乗邊事之閒豈可優游虚度歳月不切講求經乆之計若遂恬然憚於有為臣恐民力日困財用日匱難以善於後矣今内自三司外至發運轉運使凡掌財利之官簿書期㑹猶不暇給豈暇為國家生民逺慮哉臣欲乞於兩省已上官選差才敏之士三兩員就三司與使副據國用歳計之數量入以為出平貨物之輕重通天下之有無校其利害之原以革因循之弊旋具事節先到中書樞密院開陳商量必乆逺可行者奏上取裁若細碎之事無大損益徒成煩擾不須施行所冀助財用紓民力當今之切務也於是又言天下切務無先貨食貨食之原在三司而計臣事務煩綜簿書期㑹之不暇豈暇為國家根本之慮哉臣去年曽上言乞於兩省已上官選差三兩員就三司與使副據歳計之所入約中外之所費移用之法則權其輕重率斂之物則通其有無恭究利害之原剗革因循之弊所冀寛財用紓民力助三司均節不乘邊事之間急講乆逺之策臣恐民力日病國用日匱若朝廷重於生事欲乞且令三司將天聖中一年天下賦入之數及中外支費之籍與昨一年比並條上則國家之大計可較而知矣如是則可以經乆稱善如其不然豈可恬然不深慮也前所上劄子伏乞更賜詳擇實録云初昌朝與權三司使姚仲孫並言自陜西用兵邊費不足請校景徳以來用度之數約以祖宗舊制其不急者一切裁減之故有是命按昌朝建議在寳元二年五月時命張若谷任中師韓𤦺定奪與此不同實録并為一事誤也本志云西兵乆不解財用益屈天子復詔内侍以先帝時及天聖初籍較近歳禁中用度増損外則命中丞賈昌朝諫官田况張方平入内都知張永和同三司議省冗費按取天聖用度校近嵗增損實方平建議若景德則昌朝前所建議朔記亦云云三司使姚仲孫言陜西屯軍甚衆乞依景德年用度規制外餘悉罷與實録大同與食貨志小異今悉不取取方平二䟽聯書之所以命昌朝等必因方平奏也要見後來裁減數目熈寧初司馬光辭免裁減國用劄子云欲知慶歴二年裁減制度比見今支費不同數目只下三司供祈聞奏立可盡見當考求之己卯京東安撫使陳執中請河北縁邊安撫司凡得契丹事宜並移報本司從之庚辰以右正言知制誥富弼為回謝契丹國信使西上閤門使符惟忠副之復書曰昔我烈考章聖皇帝保有基圖惠飬黎庶與大契丹昭聖皇帝弭兵講好通聘著盟肆命纂承共遵謨訓邊民安堵垂四十年兹者專致使臣特詒緘問且以瓦橋内地晉陽故封援石氏之制域述周朝之復境繫於異代安及本朝粤自景徳之初始敦鄰寳之信凡諸細故咸不寘懐况太宗皇帝親駕并郊匪圖燕壤當時貴國亟發援兵既交石嶺之鋒遂舉薊門之役義非反覆理有因縁元昊賜姓稱藩禀朔受禄急謀狂僣俶優邊陲向議討除已嘗聞逹杜防郭稹傳道備詳及此西征豈云無報聘軺旁午屢聞嫉惡之談慶問交馳未諭聯親之故忽窺異論良用惘然謂將軫於在原反致譏於忌器復云營築隄埭開决陂塘昨縁霖潦之餘大為衍溢之患既非䟽導當稍繕防豈藴猜嫌以虧信睦至於備塞隘路閲集兵夫葢邊臣謹職之常及鄉兵充籍之舊在於貴境寧撤戍兵一皆示於坦夷兩何形於疑阻顧惟歡契方保悠長遽興請地之言殊非載書之約信辭至悉靈鑒孔昭兩地不得相侵縁邊各守疆界誓書之外一無所求期在乆要勿違先志諒惟聰逹應切感思甫屬清和妙臻戩穀自餘令富弼口陳書詞翰林學士王拱辰所撰也初敵書言太宗舉無名之師直抵燕薊一時莫知所答拱辰獨請間曰河東之役本誅僣偽契丹遣使行在致誠款已而攻石嶺關潛假兵以援賊太宗怒其反覆既平繼元遂下令北征安得謂之無名上喜曰事本末乃如此乃諭執政曰非拱辰詳識故事殆難答也劉六符嘗謂賈昌朝曰南朝溏濼何為者哉一葦可杭投箠可平不然决其堤十萬土囊遂可踰矣時議者亦請涸其池以飬兵上問拱辰對曰兵事尚詭彼誠有謀不應以語敵此六符夸言耳設險守國先王不廢且祖宗所以限敵騎也上深然之中書門下奏近放特奏名進士諸科與官人内有習武藝知方畧者請選試補班行詔翰林學士蘇紳内侍都知王守忠試騐以聞補班行者凡三十七人知渭州王㳂請刺本路弓箭手三萬人充軍從之朔歴翰林學士王拱辰侍御史仲簡言近者上殿臣僚以班次稍衆或致壅隔欲望後殿視事退進食畢復御便殿特賜延見詔可仍候班次少即依舊簡江都人也此據朔歴辛巳武安節度使高化知相州本傳云化雖起行伍然頗知民事相州有大獄已具皆當論死化疑之遣移訊果得不死者三人按是月丙申田况請選通判助化恐化不能獨為此今削去補延州僧光信為三班借職知青澗城种世衡言光信與西賊戰屢獲首級又言光信本姓王請賜名嵩仍乞擢授一官故以命之時世衡既遣嵩入敵境間葉勒旺榮兄弟矣嵩趫勇善騎射習知敵山川道路始為僧世衡知其可用召置門下恣其所欲供億無筭嵩酗酒靡所不為世衡遇之愈厚嵩亦深徳世衡世衡出兵常使為鄉導數盪族帳及將遣入敵境召與飲謂曰敵若得汝考掠求實决不勝痛當以實告邪嵩曰誓死不言世衡曰先試之嵩果不屈世衡曰汝真可也遂遣之王嵩事參取种世衡傳司馬光記聞沈括筆談删修餘具歳末壬午右正言知制誥劉沆出知潭州始沆使契丹館伴杜防强沆以酒沆霑醉拂袖起因罵曰杜防我不能飲何强我於是契丹使來以為言故出之尋又降知和州因詔奉使契丹及接伴送使臣僚每燕㑹毋得過飲其語言應接務存大體詔臣僚務存大體在甲申日沆再降和州在庚子日録環州安寨寨主東頭供奉官冦寧子平為右侍禁以寧與西賊戰死也甲申契丹國母遣保寜節度使耶律坦右監門衞上將軍蕭寜契丹主遣嚴州防禦使馬世長東上閤門使崔禹來賀乾元節乙酉詔致仕官之子孫授試銜齋郎年及格者與免選除近便官戊子詔近令三司減省諸費其文武官及諸班諸軍料錢月糧衣賜給賞持支並聽如故又詔河北教閲義勇指揮令畨休於家其惰游不習農者聽其家長告官重行科責是日降詔奬諭知延州龐籍等以籍興修橋子谷寨成也始元昊䧟金明承平塞門安逺栲栳寨破五龍川邊民焚掠幾盡籍既至稍葺治之戍兵十餘萬未有壁壘散處城中畏籍嚴無敢犯法金明西北有渾州川其土平沃川尾曰橋子谷敵出入之隘道籍使部將狄青將萬餘人築招安寨於谷旁却賊數萬募民耕植得粟以濟軍周美襲取承平寨王信築龍安寨悉復敵所據故地築清水安定黒水佛堂北横山乾谷土明柳谷雕窠虞兒原安寨十一堡龐籍傳但云十一城初不列城名今據周美傳增入及開皈名平戎道通永和烏仁關又更四陣法頗損益兵器云司馬光朔歴云上以知延州龐籍等興修橋子谷寨成及破蕩西賊柵寨命降詔奬諭繫戊子日今從之并取本傳所載籍事附見自周美襲取承平寨以下當自有日月更詳考之龍安寨四年六月一日乃賜名安定堡本名馬蹄川五年十月乃賜名元昊之據承平寨諸將㑹兵議攻討洛苑副使种世衡請齎三日糧直擣賊穴文思使周美曰彼知我來必設覆待我不如間道掩其不意世衡不聽美獨以兵西出芙蓉谷大破賊而世衡等果無功未幾賊復掠土塠寨美逆擊於野家店追北至托㧞谷敗其衆以功遷右騏驥使軍還屯永平寨又築栅於帕美官徳谷以扼賊路令士卒益種營田歳收穀六千斛復帥衆由㕔子部西濟大里河屠嘉勒斡多葉二伯帳焚其積聚以歸龐籍與范仲淹交薦之除鄜延都監遷賀州刺史除鄜延都監賀州刺史當自有月日安定之役諜報賊數萬將大至籍遣管勾機宜楚建中分諸將兵趣城黒水以待諸將憚賊且至不肯與兵美曰軍當以寡擊衆何怯也即以兵二千與建中而賊亦自引去每邊書至諸將各擇便利獨美未嘗辭難然所向輙克諸將以此服之建中河南人也庚寅中書樞密院奏府州修復寧逺寨城欲令河東轉運使及并州高繼宣相度分屯軍馬於次州駐劄從之此據朔歴甲午徙知澶州王徳用為真定府定州路都部署仍降詔諭以選任之意初劉六符見徳用於澶州喜曰聞公名乆乃幸見於此今歳大熟非公仁政所及邪德用謝曰明天子在上固嘗多豐年因言已衰老中國多賢士大夫指坐客歴陳其家世六符竦聼刺環慶路保毅强壯人為軍丙申右正言田况言朝廷擇任將帥以備北敵乃用楊崇勲夏守贇高化等中外物情深未允協恐誤機事詔各選通判幕職官往佐助之知諫院張方平言昨敵使蕭英等回朝廷處置北鄙雖増兵飾壘事為之備然所遣將率未盡推擇臣聞之軍志善待敵者無恃其不來當為不可勝恃我有以待之故城雖堅兵雖衆財用誠給茍將率非其人無足恃也故將者人之司命國家安危之主惟陛下念兹戒兹即敵騎敢越封畧使楊崇勲在鎮定夏守贇在瀛州劉渙在滄州張耆在河陽陛下得高枕乎雖愚夫童子亦知其必敗事也葢朝廷非不知崇勲等之不足使迫於用人之常體慊然而遣之爾必欲上寛倚注之憂下為衆論所信自非有已試之效者不足賴也勢不得已莫若且取陜西偏裨之知名者如狄青范全軰每路輙徙一兩人况自西鄙用兵已來三年於兹立功將士如青等未嘗得一到京輦仰望天顔若以此為名召之赴闕量其材器稍遷用之追崇勲等使奉朝請議者或謂西北事均若青等被奪必恐西帥有辭且陜西四路各據千里之地連城數十官吏將佐以千計勝兵衆矣豈不能選練偏裨以自為用一旦天子登一小校於朝而辭焉愛君體國者義不如是及兹盛夏邊未有虞可速致之比富弼使歸幸而盟好未渝即各還之本路若敵兵南向且使分捍北方事機所懸乞賜裁察方平䟽不得其時因田况論楊崇勲等附見崇勲等五月末皆移改狄青范全後皆召見或用方平議也狄青傳云仁宗以青數有戰功欲召見問方畧㑹賊冦渭州急命圖形以進在四年八月除捧日天武廂主惠團之後按賊冦渭州乃是年秋末青傳誤也又范恪傳云上特召見恪恪言近刺知天都左右廂㸃兵然未知冦出何路仁宗謂曰適有邊奏已犯高平軍劉璠堡可乘驛亟往遂遷禮賔使榮州刺史環慶鈐轄令赴范仲淹麾下乃是年十月事丁酉詔如聞京東西盜賊充斥其令轉運司委通判或幕職官與逐縣令佐擇鄉民之武勇者増置弓手兩倍仍令流内銓選歴任無贓罪年未六十者為縣尉督捕之去年二月辛丑六月壬寅八月辛巳可考録邕州永寧寨監押右侍禁秦珏子衮為右班殿直以珏與蠻人鬬死也戊戌以講周易徹召講讀官及兩制宗室正刺史以上燕於崇政殿徙涇原鈐轄知鎮戎軍崇儀使朱觀為高陽關鈐轄尋改鄜延路又改并代路鈐轄專管勾麟府路軍馬事五月甲辰改麟府路庚戌改并代都鈐轄今書或並削去己亥以樞密直學士禮部郎中知秦州韓琦為秦州觀察使樞密直學士吏部郎中知渭州王㳂為涇州觀察使龍圖閣直學士吏部郎中知延州龐籍為鄜州觀察使龍圖閣直學士右司郎中知慶州范仲淹為汾州觀察使辛丑權御史中丞賈昌朝言三司判官開封府推判官轉運使副提㸃刑獄朝臣年踰七十衰耄不職者請皆罷之奏可賜河東修寧逺寨等官器幣有差
