body:
  text: 續資治通鑑長編卷二十四宋李燾撰太宗太平興國八年春正月戊午朔上御乾元殿受朝契丹主隆緒改元統和壬戌上乳母陳國夫人耿氏卒涪陵縣公廷美之親母也事見雍熙元年正月兩京諸道州府貢士一萬二百六十人甲子命中書舍人宋白等十人權知貢舉戊辰建海門鎮為太平軍先是上念征戍勞苦月賜緣邊士卒白金軍中謂之月頭銀鎮州駐泊都監酒坊使彌德超因乘間以急變聞於上云樞密使曹彬秉政嵗久能得士衆心臣適從塞上來戍卒皆言月頭銀曹公所致微曹公我輩當餒死矣又巧誣以他事上頗疑之參知政事郭贄極言救解上不聽戊寅彬罷為天平節度使兼侍中己卯以東上閣門使開封王顯為宣徽南院使德超為北院使並兼樞密副使顯初隸殿前為小吏性謹介不狎同輩不踐酒食之肆上愛之於是召顯謂曰卿世非儒門少罹兵亂必寡學問今典掌萬機固無暇博覽羣書命左右取軍戒三篇賜顯曰讀此可免於面墻矣癸未詔諸道州縣長吏延見部內耆德高行為鄉里所信重者問以民間疾苦吏治得失退而改之從大理寺丞孔承恭之請也王稱東都事略有詔曰養老乞言哲王之丕訓觀民設教載籍之大猷故遒人振鐸以采詩刺史褰帷而按部所以參考風俗周知其淑慝延訪耆艾詳求於利病斯為茂典可舉而行宜令州縣長吏或部內有耆德高年為鄉里所信者竝須延問民間疾苦吏治得失退而行之以稱吾意承恭又言儀制令有云賤避貴少避長輕避重去避來望令兩京諸道各於要害處設木刻其字違者論如律庶可興禮讓而厚風俗甲申詔行其言王稱東都事略詔曰傳云能以禮讓為國乎何有宜令開封府及諸州於衝要處榜刻儀制令論如律承恭河南人太祖時獻宫詞託意求進用太祖怒其引諭非宜免歸田里上即位以赦復授故官又嘗勸上於征戰地修佛寺普度僧尼以冀冥福人多笑其迂濶云周顯德中宋州民飢官出義倉米三萬四千石以貸其後徴督民多流移入它郡乙酉詔悉除之二月戊子朔日有食之丁酉禁內屬戎人私市女口吏謹捕之違者棄市丙午有司言先禁江南諸州民家不得私蓄弓劒甲鎧違者按其罪按律疏禁民私有兵器謂甲弩矟具裝等若弓箭刀楯短矛並聽私蓄望釐改之詔從其請三月丁巳朔有司言京諸司流外人選滿並授官勒留及有歸司者准律品官任流外及雜任於本司杖罪以下依決罰例徒罪以上依當贖法今諸司使副三班使臣犯罪比同品官具决罰當贖取裁而諸司職掌即依例當贖非便望自今流內品官任流外職事凖律文處分諸司授勒留官及歸司人犯徒流等罪公罪許當贖私罪以決罰論從之詔免監察御史孫日新仍削籍三任坐為荆湖同轉運日職事不治擅侵官地為廨舍故也殿中丞陸範前知濠州鍾離縣民有婦殺其夫者範鞫不得實民家訴於上詔劾之婦棄市範坐免官己未同州言民飢發倉粟四萬斛賑之癸亥以右諫議大夫同判三司宋琪為左諫議大夫參知政事始分三司為三部各置使右諫議大夫同判三司王明為鹽鐵使左衛將軍陳從信為度支使如京使郝正為戶部使正平遙人也上嘗語宰相曰三司官吏奏事朕前紛紜異同互有所說此固不為私事但迭執偏見不肯從長商度朕每以理開諭若帝王躁暴豈能優容朕於臣下務在將護才用優劣一一可見隨其器能各加任使奏對之際無不假以辭色善惡兼聽未嘗峻折之也宋琪曰人之才用罕有周備陛下聰明照臨短長俱露或又初見天威內懷懾懼若不賜之辭色何由畢其懇誠先帝晚年稍傷嚴急聖心深鑒事理曲盡物情臣下幸甚己巳諸王及皇子府初置咨議翊善侍講等官以戶部員外郎王遹著作佐郎姚坦國子博士邢昺等十人為之先是詔丞郎給諫以上官於常參官中舉年五十以上通經者備宫僚遹等被舉坦昺皆濟陰人也據姚坦傳太宗召坦等面諭然與雍熙二年畢士安等為記室時聖語不異蓋重出也今從寶訓不載於此壬申豐州刺史王承美言契丹來寇承美擊敗其衆萬餘追北百有餘里至青冢斬首二千餘級降者三千帳獲羊馬兵仗以萬計癸酉幸金明池觀習水戰遂幸瓊林宴射丙子上御講武殿覆試禮部貢舉人擢進士長沙王世則而下百七十五人諸科五百一十六人竝遂為定制登科記是年始分甲乙按國史志分第甲乙乃五年事也李穆坐盧多遜黜降左右無敢言者左拾遺直史館宋凖因奏事盛言穆長者有檢操常惡多遜專恣固非其黨也上寤於是穆同知貢舉預侍立上見穆顔色癯瘁謂曰卿何故如此豈非黜降以來憂畏所致乎即日還穆舊官甲申除福建諸州鹽禁官賣之斤為錢二十五又以民乏銅錢令於建州鑄大鐵錢與銅錢竝行尋罷之乙酉斬孟州進士張兩兩試吏部不合格縱酒大罵於街衢中言涉指斥游徼吏捕以聞上怒故抵於法同保九輩永不得赴舉州長吏罰一季俸詔䖍州歲市鉛錫六萬斤斤為錢二十九增六錢信州市鉛斤為錢十五增五錢饒州市炭稱為錢十增三錢從轉運使張齊賢之請也齊賢初除轉運使辭日上面命曰江左初平民間不便事一一條奏齊賢曰臣聞江南舊以鐵為幣今改用銅錢民間難得而官責課頗受鞭撻此最不便上曰漢時吳王即山鑄錢江南多出銅為朕密經營之初李氏歲鑄六萬貫自克復增冶匠然不過七萬貫常患銅及鉛錫之不給齊賢乃訪得江南承㫖丁釗歷指饒信䖍州山谷産銅鉛錫之所又求前代鑄法惟饒州永平監用唐開元錢料堅實可久由是定取其法歲鑄三十萬貫凡用銅八十五萬斤鉛三十六萬斤錫十六萬斤齊賢即詣闕面陳其事詔既下頗有言其妄者令中書召齊賢問訊齊賢詞甚確乃可之丁釗亦得復補殿前承㫖掌銅場或又言新法增鉛錫多者齊賢固引唐朝舊法為言始不能奪然唐永平錢法肉好周郭精妙齊賢所鑄雖歲增數倍而稍為粗惡矣國子監丞知開封府司録參軍事趙孚上言去歲豐稔而科納弛慢尚有逋租苟非賞罰何以懲勸請自今諸縣令佐凡厯三年收賦稅竝得依限齊足者超資任以大縣厯二年違限不足者降資授以小縣詔從之孚又言莊宅多有爭訴皆由衷私妄寫文契說界至則全無丈尺昧鄰里則不使聞知欺罔肆行獄訟增益請下兩京及諸道州府商稅院集莊宅行人衆定割移典賣文契各一本立為榜樣違者論如法詔從之趙孚未見夏四月辛卯朔詔凡州縣幕職官差定殿最之狀分任逺近之地以為升降有司蓋有成法自今京朝官釐務於外秩滿曾經責罰及弛慢者授以邊逺其課績高者任以近地先是陳洪進發漳泉丁男為館夫給負擔之役洪進既獻地轉運使猶計傭取直凡為銅錢二千一百五十貫鐵錢三萬一千五百三十貫民訴其事壬辰詔除之上嘗覽福建版籍謂宰相曰陳洪進止以漳泉二州贍數萬衆無名科斂民亦不堪比朝廷悉已蠲削民皆感恩朕亦不覺自喜也又嘗謂趙普曰前代亂多治少皆繫帝王所為朕撫御萬方固不能家至戶到但持其綱領行其正道以齊一之鄉者偏霸掊克凡數百種朕悉令除去矣更俟五七年當盡減民租稅卿記朕此言非虛發也普曰陛下愛民之意發於天心惟始終力行之天下幸甚壬寅以豐州刺史王承美為團練使密日都大首領裕勒葉為懷化大將軍威約克為歸德大將軍約博伊瑪二族首領布桑開朗默恰等族大首領綏等竝為歸德郎將賞其破契丹之功也泗州臨淮等縣民逋開寶七年官所貸米麥三千八百餘石詔除之上謂宰相曰朕頃在藩邸頗聞朝臣有不修操檢以彊詞利舌謗讟時事陵替人物或遣使逺方不存事體但規財用此甚辱國今朝行寧復有此等耶若人人自修豈不盡善宰相曰陛下敦崇風教不嚴而治輕薄之徒自然弭息矣上嘗作戒諭辭二付閣門一以戒京朝官受任於外者一以戒幕職州縣官丁未令閣門於朝辭日宣㫖朂勵仍書其辭於治所屋壁遵以為戒初弭德超譖曹彬事成期得樞密使及為副使大失望官與柴禹錫同而禹錫先授班在其上故德超常怏怏一日詬王顯及禹錫曰我言國家大事有安社稷功止得線許大名位汝輩何人反居我上更令我效汝輩所為我實恥之又大罵曰汝輩當斷頭我度上無執守為汝輩所眩惑顯等告其事上怒命膳部郎中知雜御史滕中正即訊之德超具伏壬子德超除名並親屬流瓊州右拾遺直史館開封李韶德超壻也亦坐責為殿中丞知丹徒縣德超始因李符及宋琪之薦得事上及符貶寧國司馬德超任樞府屢稱其寃㑹德超敗上惡其朋黨令徙符嶺表盧多遜之流崖州也符白趙普朱崖雖逺在海中而水土頗善春州稍近瘴氣甚毒至者必死不若令多遜處之普不答於是即以符知春州嵗餘卒德超既敗上悟曹彬無它待之愈厚臨朝纍日不懌從容謂趙普等曰朕以聽斷不明幾敗大事夙夜循省內愧於心普對曰陛下知德超才幹而任用之察曹彬無罪而昭雪之有勞者進有罪者誅物無遁情事至立斷此所以彰陛下聖明也雖堯舜何以過此由是釋然改講武殿為崇政殿五月丙辰朔河大決滑州房村泛澶濮曹濟諸州民田壞居人廬舍東南流至彭城界入于淮有司議大發丁夫塞之上曰鄉者發民塞韓村決河水不能成俱為勞擾乃命出卒數萬人賜以內府金帛命內客省使郭守文往護其役丁巳相州言風雹害稼司天春官正襄城楚芝蘭上言京師帝王之都百神所集今城之東南一舍而近有地名蘇村若於此為五福太一作宫則萬乘可以親謁有司便於祗事何為逺趨江水以蘇臺為吳分乎議者不能奪丁卯詔從芝蘭議徙建太一宫於蘇村東上閣門使樂陵趙鎔督其役仍令芝蘭及樞密直學士張齊賢同定祭法交州言占城國水陸象馬數萬來寇率所部兵擊走之俘斬數千計右補闕直史館洛陽董儼罷淮南轉運使就命知光州儼狂躁務進不樂外官上疏求還京師上怒己巳削史職黜為祕書丞仍知光州庚午黎桓遣牙吏趙子愛以方物來貢自稱權交州三使留後表言去年十月丁璿及其母率軍民以印綬與桓桓即攝領府事上欲且除璿為統帥命桓副之或不可則當送璿母子親屬等赴闕俟璿至乃畀桓節鉞遣供奉官張宗權齎詔諭㫖令桓審處其一亦賜璿璽書桓專據其國已久不聽命威塞節度使判潁州曹翰在州嵗久專務苛酷掊斂政事不治上雖知之以其有功故優焉㑹汝陰令孫崇望詣闕擊登聞鼓訟翰部內為姦贓私市弓弩槍劔長矛鎧馬具裝又發民築烽臺諸縣有寇盜令舉烽以應城中又擅部署牙吏官賣鹽所得錢銀民嵗輸租粟及絲綿絹翰悉取其餘羡又擅賦斂民以入已侵官地為蔬圃果園判官山元羽掌官麴翰又取其常額外錢五百萬絹百匹詔遣知雜御史滕中正乘傳往鞫之獄具法當棄市百官集議翰林學士承㫖李昉等議如有司所定壬申詔特削奪在身官爵御史臺遣吏護送登州禁錮其盜用官物及侵擅賦斂竝徵之先是關隴貧民多流亡入蕃部乙亥詔所在長吏設法誘之令復業令諸州掌物務官吏虧歲課當罰者長吏以下悉分等連坐六月丙戌左諫議大夫知開封府邊珝卒珝彊力有吏幹上方欲倚任甚嗟惜之丁亥以翰林學士中書舍人李穆知開封府穆剖決精敏姦猾無所假貸由是豪右屏迹權貴不敢干以私上益知其才始有意大用刑部郎中楊徽之庫部員外郎孔承恭同考校京朝官殿最甲午河南府言伊洛瀍榖水皆漲壞官寺民廬甚衆死者以萬計詔悉加賑恤己亥以宣徽南院使兼樞密副使王顯為樞密使宣徽北院使柴禹錫為南院使兼樞密副使如故陜州言大水壞軍民廬舍千餘區戊申以進士王世則等十八人送中書門下特授大理評事知令録事餘送流內銓並授判司簿尉未幾世則等移通判諸州為簿尉者改試大理評事知令録明年郊禮畢遷守大理評事上因謂近臣曰朕親選多士殆忘飢渴召見臨問以觀其材拔而用之庶使巖野無遺逸而朝廷多君子爾朕每見布衣搢紳間有端雅為衆所推譽者朕代其父母喜或召拜近臣必為擇良日欲其保終吉也朕於士大夫無所負矣上又謂宰相曰唐置採訪使蓋欲察官吏善惡人民疾苦然所命者官高則權勢太重官卑則威令不行又所過州郡承迎不暇豈能審知利害但虛有其名耳曷若慎選羣才各分任使有功有過賞罰分明且國家選才最為切務人君深居九重何由遍識必須採訪茍稱善者多即是操履無玷若擇得一好人為益無限古人言得千良馬不若得一伯樂得十利劔不若得一歐冶此言殊有理朕孜孜訪問止要求人庶得良才以充任使也趙普曰帝王進用良善實助太平之理然於採擇要在得所蓋君子小人各有黨類先聖謂觀過各於其黨不可不慎也上然之杭州進士吳鉉嘗重定切韻及上親試因捧以獻既中第授大理評事史館勘書鉉所定切韻多吳音增俗字數千鄙陋尤甚尋禮部試貢舉人為鉉韻所誤有司以聞詔盡索而焚之己酉兖州太山父老及瑕丘等七縣民四千一百九十三人詣闕請封禪觀察判官廖文鐸護送之上謙讓不允各賜束帛遣還右散騎常侍判尚書都省徐鉉言都坐議事其所議文案自來俟羣臣坐定止令一吏立讀訖取官最高者一人先署名衆人皆即隨署殊不詳其事理望自今議事合厯翰林及臺省者先以所議文案送翰林及兩省官看詳三日送御史臺尚書省各三日令各為議俟都坐㑹議日更相詰難既議定乃赴禮部郎官集成議狀以聞從之此據本傳鉉以八年六月一日罷直學士院為右散騎常侍受詔判督省月日因附此議於六月末右金吾衛上將軍王彥超與文明殿學士李昉翰林學士宋白善先是昉白詣之時彥超年六十九謂昉白曰人言七十致仕出何書昉具告之故彥超遂託白草致仕表於是再上得請七月丁卯以太子太師致仕千牛衛上將軍許田吳䖍裕時年已八十餘性簡率發言多輕肆嘗語人曰我縱僵仆殿陛下斷不學王彥超七十便致仕人傳以為笑中書舍人參知政事郭贄與東上閣門使趙鎔有同府之舊鎔憑恃請託贄不從鎔托堂吏過失以聞贄見上白鎔私謁即召鎔廷辨鎔辭屈出為梓州都巡檢使贄嘗因論事奏曰臣受不次之遇惟以愚直上報上曰愚直何益於事贄曰雖然猶勝姦邪贄飲酒過量偶入對宿酲未解發言輕易上怒辛未責授祕書少監尋出知荆南府俗尚淫祀屬久旱盛禱雨之具贄始至悉命撤去投之江流不數日大雨郭贄既貶中書惟趙普宋琪時普恩禮稍替將復命相廷臣謂工部尚書李昉宿舊上欲用昉參知政事以琪先入當班列昉上庚辰琪加刑部尚書昉守本官參知政事辛巳詔開封府諸縣民田為河水所傷者竝蠲其租陜西河北川峽諸州皆言大水八月壬辰德音釋死罪以下大水故也癸巳詔桂州管內先配民嵗市沙糖及茶園久荒吏嵗徵其課先以官牛給與民嵗取租牛死而吏猶督其直關市征商額外增錢百八十貫竝除之丁酉山後兩林蠻王遣其弟牟昂及子牟蓋摩忙卑愧副使牟計等百三十九人以名馬來貢詔授牟昂懷化大將軍牟蓋等三人為歸德郎將牟計等百二十二人並為懷化司戈詔自今應臨軒所遣官吏並送中書門下考其履厯審取進止時選用庶僚不專委有司皆引對觀其敷納有可採者悉與超擢復慮因緣矯飾僥幸冒進載加詳審之意乃有是詔辰州言奚錦叙富等四州內屬蠻相率詣州願比內地民輸租稅詔遣殿直王昭訓與權沅陵縣令高象元權辰溪縣令張用之分往四州仔細相度察其民俗情僞委得久逺利便可否及按視管界山川地形畫圖來上卒不許甲辰詔諸道州府司理判官比來悉以牙校為之在其本部必有親黨自今各於鄰近州府選强明厯事者充尋詔仍舊滿三年無遺闕者與酬奬尋詔仍舊乃十一月辛巳今并書樞密使石熙載始以病足不能履步多請告及寢疾上幸其第臨問太醫診視久之未愈上表求解職庚戌罷為右僕射辛亥詔增周公諡法五十五字美諡七十一字為百字平諡七字為二十字惡諡十七字為三十字仍令翰林學士承㫖扈䝉中書舍人王祜同詳定䝉等上奏所增五十五字皆可用其沈約賀琛續廣諡請廢不行詔可太祖初以扈䝉之言詔盧多遜録時政月送史館多遜訖不能成書於是右補闕直史館胡旦復言五代自唐以來中書樞密院皆置時政記中書即委末㕔宰相樞密院即委樞密直學士每月編修送史館周顯德中宰相李榖又奏樞密院置內庭日厯自後因循闕廢史臣無憑撰集望令樞密院仍舊置內庭日厯委文臣任副使者與學士輪次記録送史館上采其言是日詔自今軍國政要竝委參知政事李昉撰録樞密院令副使一人纂集每季送史館昉因請以所修時政記每月先奏御後付所司從之時政記奏御自昉始也㑹要云時雖有時政記之名但題云送史館事件至景德元年始題云時政記先是每嵗運江淮米四百萬斛以給京師率用官錢僦牽船役夫頗為勞擾至是每艘計其直給與舟人俾自召募事良便既而舟數百艘留河津月餘不得去上遣期門卒偵之計吏自言有司除常載外别科置皮革赤堊鉛錫蘇木等物守藏者不即受故也上大怒詔書切責度支使奪一月俸九月癸丑朔詔置水陸路發運於京師以洛苑使許田王賔領濵州刺史與儒州刺史許昌裔同知水路發運軍器庫使領順州刺史王繼升駕部郎中劉蟠同知陸路發運凡一綱計幾舟每舟計所給挽船之直悉以付主綱吏令自雇民勿復調發凡水陸舟車輦送官物及財貨之出納悉關報而催督之自是貢輸無滯矣宿州言河水泛民田郭守文塞决河堤久不成上謂宰相曰今歲秋田方稔適值河決塞治之役未免重勞言事者謂河之兩岸古有遙堤以寬水勢其後民利沃壤咸居其中河之盛溢即罹其患當令按視苟有經久之利無憚復修戊午遣殿中侍御史濟陰柴成務本志作太常丞劉錫今從實録及㑹要供奉官葛彥恭緣河北岸國子監丞趙孚殿直郭載緣河南岸西自河陽東至于海同覽隄之舊址凡十州二十四縣竝勒所屬官司件析隄內民籍稅數議蠲賦徙民興復遙隄利害以聞載浚儀人也孚等使回條奏曰臣等因訪遙隄之狀所存者百無一二完補之功甚大臣聞堯非洪水不能顯至聖禹非導川不能成大功古者泒為九河始能無患臣以謂治遙隄不如分水勢自孟至鄆雖有隄防惟滑與澶最為隘狹於此二州之地可立分水之制宜於南北岸各開其一北入王莽河以通於海南入靈河以通于淮節減暴流一如汴口之法其分水河量其逺近作為斗門啓閉隨時務乎均濟通舟運溉農田如此則惟天惠民茂宣於德澤分地之利普洽於膏腴既防水旱之災可獲富庶之資也朝議以河决未平重惜民力寢其奏焉時多陰雨上以河决未塞深憂之謂宰相曰修防决塞蓋不獲已而秋霖荐降役民滋苦豈朕寡德致其作沴乎趙普對曰堯水湯旱時運使然陛下勞謙勤恤過自刻責下臣恐懼無所措望少寬宸慮以俟天災弭息甲子詔臨淮壽春浮梁先禁馬高五尺以上不得渡淮今江浙既平吏猶守舊法宜除之乙丑上謂宰相曰朕視萬民如赤子念其耕稼之勤春秋賦租軍國用度所出恨未能去之比令兩稅三限外特加一月而官吏不體朝㫖自求課最恣行捶撻督令辦集此一事尤傷和氣宜下詔申警之乃詔諸州長吏察訪屬縣有以催科用刑殘忍者論其罪凡政治善惡既書於吏部南曹厯子仍别以其狀聞當申黜陟又謂宰相曰民訴水旱即使檢覆立遣上道猶恐後時頗聞使者或逗遛不發州縣慮賦斂違期日行鞭箠民亦俟檢覆改種若此稽緩豈朕勤恤之意乎自今遣使檢覆災旱量其地之逺近事之大小立限以遣之丙寅上謂宰相曰荆湖江浙淮南諸州每嵗上供錢帛遣部民之高資者護送至闕下民多質魯無御下之術篙工楫師皆頑猾不逞恣為侵盜民或破産以償官物甚無謂也乃詔自今直遣牙吏勿復擾民丁卯交州黎桓遣使來貢方物庚午吐蕃諸戎以馬來獻上召其酋長對於崇政殿厚加慰撫賜以束帛因謂宰相曰吐蕃言語不通衣服異制朕以禽獸畜之自唐室以來頗為邊患以國家兵力雄盛聊舉偏師便可驅逐數千里外但念其種類蕃息安土重遷儻加攘却必致殺戮所以置於度外存而勿論也癸酉上謂近臣曰國家事不以大小皆有利害朕比閲工作見削藤者每藤一斤削去皴麁堪用者才三兩許餘皆棄物因念藤産南方距京六七千里水陸輦送虛為勞費宜諭廣南諸州凡貢藤但輸堪用者又大通冶出鐵每送作坊作兵器復加烹鍊十裁得四五宜諭本冶自今製成刀劔之朴乃以上供若此二事計省力役不少天下無限利害官吏不能為朕經度此固小事當有大於此者卿等宜思之丙子占城國遣使來獻馴象能拜伏詔飬於寧陵縣丁丑上以河决未塞遣樞密直學士張齊賢乘傳詣白馬津用以太牢加璧以祭太平軍言颶風壞官寺民舍冬十月甲申詔徴馬軍都指揮使定州兵馬部署米信赴闕上以新譯經五卷示宰相因謂之曰浮屠氏之教有禆政治達者自悟淵微愚者妄生誣謗朕於此道微究宗㫖凡為君治人即是修行之地行一好事天下獲利即釋氏所謂利他者也庶人無位縱或修行自苦不過獨善一身如梁武捨身為寺家奴百官率錢收贖又布髮於地令桑門踐之此真大惑乃小乘偏見之甚為後代笑為君者撫育萬類皆如赤子無偏無黨各得其所豈非修行之道乎雖方外之說亦有可觀者卿等試讀之蓋存其教非溺於釋氏也趙普曰陛下以堯舜之道治世以如來之行修心聖智高逺動悟真理固非臣下所及上又謂宰相曰近者內外政事漸成條貫逺近官吏無不畏謹朕思之不覺自喜日行好事利益於人便是修行之道假如飯一僧誦一經有何功德朕夙夜孜孜固不為已每焚香惟願民庶安輯不近理之事斷不為也大凡為君為臣常宜兢畏不可放逸後唐莊宗夾河相持千征萬戰備嘗艱苦天下甫定便恣溺惑不及三年果致傾覆若此可為鑒戒宋琪曰陛下勤儉於已勵精政務以百姓心為心所謂其身正不令而行也焚香願民安輯等語别本在十一月己丑今從寶訓宜入此戊子詔祀土德於黃帝壇圭幣牢具如太祠俾祠官領之庚寅賜諸軍校建茶有差并賜諸軍翦草茶人一斤戊戌衛王德崇改名元佐廣平郡王德明改名元佑第三子德昌改名元休第四子德嚴改名元雋第五子德和改名元傑皇姪孫德雍改名惟吉惟吉魏懿王子也太祖甚愛之視如己子故與諸叔聨名上即位猶居禁中於是出閣始改名焉己酉元佐進封楚王元佑進封陳王元休封韓王元雋封冀王元傑封益王並加同平章事司徒兼侍中趙普罷為武勝節度使兼侍中十一月壬子朔以刑部尚書參知政事宋琪工部尚書參知政事李昉並本官同平章事上謂曰世之治亂在賞罰當否賞罰當其功罪無不治或以為飾喜怒之具即無不亂與卿等戒之琪曰賞罰二柄乃御世之銜勒若馬無銜勒何以控御治天下者苟賞罰至公未有不致太平也昉初與盧多遜善待之不疑多遜屢譖昉人或告昉昉曰盧與我厚不當爾於是上語及多遜事昉頗為揮釋上因言多遜居常毁卿不直一錢昉始悟上由此益重之别本載上與宰相論賞罰在十月甲午按宋琪此時未為宰相今從琪本傳附琪初拜宰相日也癸丑詔川峽民祖父母父母在别籍異財者前詔並棄市自今除之論如律甲寅詔自今宰相序立宜在親王之上李昉宋琪等頓首請遵故事上不許琪等又叩頭固辭久之上曰宰相之任實總百揆與羣臣禮絶藩邸之設止奉朝請而已元佐等尚幼欲其知謙損之道卿勿多辭也琪等拜舞稱謝上撰蓮華心輪回文偈頌十部二百五十卷回文圖十軸示近臣高陽關捕得契丹生口送至闕下戊午上召見言契丹種族攜二慮王師致討頗於近塞築城為備上謂宰相曰戎人以剽略為務乃修築城壘為自全之計耳曩者劉繼元盜據汾晉周世宗及太祖皆親征不利朕決取之為世宗太祖刷恥親擒繼元今日視之猶機上肉耳當其保堅城結北鄙為援豈易制乎宋琪對曰臣少陷北庭備知戎馬之數自晉末始强盛然種族蕃多其心不一自石嶺關之敗平繼元緣邊諸郡頻有克捷以臣度之其部下擕二必矣國家不須致討可坐待其滅亡久之上復謂宰相曰數有人自北邊來偵知契丹事自朝廷增修邊備北人甚懼威虜軍主財吏盜官錢盡室奔入契丹至涿州州將不敢受悉遣還晉漢微弱邊陲無盡節之臣率張皇事勢以要恩寵為自利之計今之邊將皆朕所推擇咸能盡心無復襲舊態也幽州四面平川無險固可恃難於控扼異時收復燕薊當於古北口以來據其要害不過三五處屯兵設堡寨自絶南牧矣琪對曰范陽是前代屯兵建節之地古北口及松亭關野狐門三路並立堡障至今石壘基堞尚存將來平定幽朔止於此數處置戍可也况奚族是契丹世仇儻以恩信招懷之俾為外禦自可不煩朝廷出師矣己未太一宫成凡千一百區命張齊賢等共視之齊賢等言太一五帝之佐天神之至貴者也請用祭天之禮殺其半又小損之上令增教坊伶官百人自昏祠至明如漢制每嵗四立日行祀禮此據本紀本志實録於明年八月丙申始書太一宫成蓋誤也丙寅楚王元佐等五王同日赴中書視事巡檢河堤作坊使郝守濬責授慈州團練副使坐不救河決擅赴闕奏事也丁卯宴餞趙普於長春殿上賜普詩普捧而泣曰陛下賜臣詩當刻於石與臣朽骨同葬泉下上動容答之明日謂近臣曰趙普於國家有大勳力朕布素時與之逰從齒髮衰矣不欲煩以機務擇善地俾之卧治因詩𨗳意普感激且泣朕亦為之墮睫宋琪對曰普昨至中書執御詩涕泣謂臣曰此生餘年無階上答庶來世得效犬馬之力臣既聞普此言今復聞宣諭君臣始終之分可謂盡善矣長春之宴樞密使王顯等侍側數視上袴上怪而問之顯等曰陛下所衣袴文縷俱倒上笑謂曰朕未嘗御新衣蓋浣濯頻所致耳上因言此雖逼下已甚蓋念機杼之勞苦欲示敦朴為天下先也顯等拜舞稱謝壬申以翰林學士李穆吕䝉正李至並為左諫議大夫參知政事樞密直學士張齊賢王沔並為右諫議大夫同簽署樞密院事至真定人沔齊州人也穆等對於玉華殿上謂之曰朕為官擇人惟恐不當今兩制之臣十餘皆文學適用操履方潔穆居京府尤號嚴肅故兹奬擢蓋惟公也因思閭里間每旦焚香祝天子萬歲次則大臣眉壽朕與卿等焉得不日思善事以副億兆之禱耶穆等咸再拜謝上又曰朕覽前書備見厯代治亂大抵君臣之際先要情通情通則道合故事皆無隱言必可用朕厲精求治卿等為朕股肱耳目設有闕政宜悉心言之斷在必行采訪外事條目於朕雖浮泛之說亦以聞也凡人在下位見當世之務不合理者則怏怏於心既列高位得以獻可替否盡展素所藴蓄矣或所言不中程度亦當共議而更之俾協於道朕每行一事偶有未當久之尋繹唯自咎責耳固不以居尊自恃使人不敢言也宋琪曰前代羣臣上章論事或比之觸龍鱗今陛下喻臣等以事無長短並許敷奏彼思賢若渴從諫如流者要未能比方聖德也敢不竭誠上副明詔三佛齊國遣使來貢方物鹽鐵使王明言沿邊歲運銅錢五千貫於靈州市馬七百里沙磧無郵傳冬夏少水負擔者甚以為勞戎人得銅錢悉銷鑄為器郡國歲鑄錢不能充其用望罷去自今以布帛茶及它物市馬從之己卯詔河東江浙川峽廣南官自今滿三考並與除代庚辰詔史館所修太平總類自今日進三卷朕當親覽宋琪等言窮歲短晷日閲三卷恐聖躬疲倦上曰朕性喜讀書開卷有益不為勞也此書千卷朕欲一年讀遍因思學者讀萬卷書亦不為勞耳尋改總類名曰御覽先是上數召廷臣新安吕文仲丹陽吳淑無錫杜鎬等入禁中令讀古碑及文選江海諸賦於是命文仲以著作佐郎充翰林侍讀寓直御書院與侍書王著更宿而書學葛湍亦直禁中每暇日多召問文仲以經書著以筆法湍以字學有孫景璠者本杭州水軍篆千字文為五十餘體以獻上善之詔取去黥文隸御書院宰相宋琪請以官秩上曰爵祿非所惜也顧此人面痕尚在豈稱冠帶乎琪固言之乃授國子書博士此事不得其時今附見十二月壬午朔令綏銀夏等州官吏招誘沒蕃民令歸業仍給復三年丁亥河北河東緣邊戍卒人賜黃絹襦一京城諸軍米人一斛淮海國王錢俶三上表乞解兵馬大元帥國王尚書中書令太師開府儀同三司等官詔止罷元帥餘不許癸卯滑州言河決已塞羣臣稱賀先是役丁夫十餘萬功久不就議者多請罷之殿直劉吉確稱役不可罷即令助郭守文監督及是而堤成未幾河復決上謂宰相曰邇來場屋混淆頗聞有僧道還俗赴舉者此輩不能專一科教可驗操履他日在官必非廉潔之士進士先須通經遵周孔之教或止習浮淺文章殊非務本之道當下詔切戒之甲辰令諸州禁還俗僧道赴舉進士免貼經只試墨義二十道皆以經中正文大義為問題又增進士及諸科各試法書墨義十道進士增試律義據本志增入實録㑹要並闕之雍熙二年又復貼經罷試律又詔諸道下第舉人依舊重請文解不得凖近例常赴貢部别本實録在八月癸卯今并書丙午右補闕直史館胡旦獻河平頌言逐盧多遜出趙普事其序略曰賊臣多遜陰泄大政與孽弟廷美呪詛不道共造大難彊臣普恃功貪天違理背正削廢大典架豪傑之罪飾帝王之非榛賢士之路使恩不大賚澤不廣洽頌復有逆遜投荒姦普屏外等語上覽之震怒召宰相謂曰旦詞意悖戾朕自擢置甲科厯試外任所至悉無善狀知海州日為部下所訟獄已具適㑹大赦朕録其才而舍其過乃敢恣胸臆狂躁如此今朝多君子旦豈宜尚列侍從耶亟逐去之且下其頌史館中書舍人史館修撰王祐等奏旦指斥大臣謗讟聖代下流訕上宜加竄斥丁未責旦為殿中丞商州團練副使戊申上於禁中讀書自己至申始罷有蒼鸖飛上殿鴟吻逮掩卷乃去上怪之以語近臣對曰上好學之感也昔有鸛雀銜三鱣魚墜楊震講堂下抑亦類此宥州言戎人二萬衆入寇巡檢李詢率所部蕃漢卒擊走之斬首二千級己酉詔戎人鬻馬官取良而禁駑又禁民私市往來道死者甚衆戎人少利由是歲入之數不充自今委長吏謹市馬之良駑者印以試之許民私市福州言本州兼用鐵錢銅錢三直鐵錢一計贓為重輕請自今悉以銅錢定罪從之以懿州刺史田漢瓊為錦州刺史錦州刺史田漢希為懿州刺史皆五溪之酋也願易其地因而授之潭州言醴陵縣水中草變為稻先是上謂趙普曰比諸軍頗有善治生者蓋多方約束不使橫費所致且怨懟生於不足此輩貪勇復寡思慮若從其橫費雖倍給衣糧亦當不足計無所出則為盜賊耳晉漢時軍糧皆紅腐不可食今菽粟亦皆精好矣普對曰朝廷歲漕江淮粳稻槩量饒足營伍無所侵尅陛下訓以治生之道致其贍濟此豈晉漢所當擬耶是冬軍士有夜劫民家者上厚立賞捕之既獲悉戮於市因諭諸軍遍索曾經罪罰凶猾無賴者得百餘人上不忍殺以鐵鉗鉗其首羈於本州明年二月乃釋之仍各賜錢三千是月權知相州右補闕直史館田錫上疏言管𣙜貨財網利太密躬親機務綸㫖稍頻所謂網利太密者酒麴之利但要增盈商稅之利但求出剩或偶有出剩不詢出剩之由或偶有虧懸必責虧懸之過遞年比撲只管增加遞月較量不管缺折然國家軍兵數廣支用處多課利不得不如此徵收管𣙜不得不如此比較窮盡取財之路莫甚於兹疏通貨殖之源未聞適變似不知止除無定期今乞國家以關市之征定其常數酒麴之利授以常規或偶有增加不可於增加上更求出剩或偶有虧折即可令於出剩時補填且如州縣徵科農桑稅賦年豐則未聞加納歲歉則許之倚徵自然理得其中民知所措所謂綸㫖稍頻者君有居上之威儀臣有奉上之職業君道務簡簡則號令審而人易從臣道務勤勤則職業修而事無壅臣伏見陛下憂民太過視事太勤每日早於崇德殿受百僚之朝未日午於講武殿視萬機之事或進呈甲仗或揀閲軍人或躬問縲囚或親觀戰馬自匭而進者或詳其詞理撾鼓以聞者或詢彼寃誣蓋陛下慮四聰或有所未達萬機或有所未知文王之心遂乾乾而夕惕成湯之意貴孜孜於日新然陛下何不移此勤勞而勞於求賢何不改此精專而專於選士諫官則置之左右御史即委以糾彈給事中當材者許之封駮詔書起居郎有文者命之紀録言動百職如是各舉其業千官如是各得其人則何憂事不允釐何慮民不受賜今有司指揮多以劄子取聖㫖官員注擬必須引見聽敇裁事若允當則既由宸衷事若未當則亦歸睿斷如此皆勞天聽安用有司致陛下視事太勤憂民太過况宫闕乃尊嚴之地軒墀列清切之班可以延佇賢良詢求理道豈宜使押來囚繫或病患軍人或虛誣越訴之徒或僥幸希恩之輩引之便殿得面天顔陛下則隨事指揮臨時與奪其間有驟承顧問上懼天威或偶有敷陳稍愜聖㫖怯懦蹇訥者口雖奏而未盡其心姦詐辨詞者言雖當而未必有理陛下或賜之恩澤或置以刑名然睿覽周通出令固無於枉濫而帝廷清肅終朝豈稱於喧囂加以條理事宜或傷頻併施行詔敇遂至稠重書曰臨下以簡又曰御衆以寬御衆不以寬則獲罪者多臨下不以簡則從令者少况帝王有常道禁令有常程施令貴乎必行設禁貴乎必止若令之無節奉而行之者必難禁之無時遵而止之者亦寡臣所謂網利太密既如彼綸㫖稍頻又如此願陛下寬臣敢言之罪察而審之望陛下聽臣敢諫之言擇而行之臣復有未諭聖意之事三又有奏請可行之事二未諭者今內職諸司各有公署禁林近侍各有本㕔中書是宰相視事之堂相府是陛下優賢之地今則於中書外廡置磨勘一司較朝臣功過之有無審州郡勞能之虛實眷言是職本屬考功豈考功之職不修而磨勘之名互出殊非雅稱深損大綱此臣所謂未諭聖意之事者一也其次御史臺本不禁人今為繫囚之所大理寺舊來置獄今為檢格之司况授人之職者本貴當材鞫獄以情者自然無濫或諸侯有大過或百姓有深寃乃命臺官委為制使憲府之風規自别刑曹之按鞫無疑今則或撾鼓聞天虛詞詣闕多差殿直承㫖使為制勘使臣殊非理公之才驟委鞫人之罪其間有未明推劾因致淹延或未曉刑章妄加深刻既臨以制書之命置乎縲紲之中人畏嚴威誰敢拒捍及當録問皆伏欵詞雖罪至流徒必該申奏然按既圓備即遽施行豈無陷於非辜豈無失於有罪虧陛下慈仁之㫖損朝廷欽恤之恩此臣所謂未諭聖意之事者二也臣每讀史書至於文集或匹婦有貞亷之節野人有孝行之風尚旌彼門閭或賜以粟帛將以勵澆漓之俗亦以行風教之規修身者由此彰名尚義者因兹立節今國家官僚逺宦不得般家父母云亡不得離任墨縗視事寧安孝子之心明詔未行深損聖人之教此臣所謂未諭聖意者三也河朔數州衙前軍將應宣命配來者多江南兩浙之人雖曾有赦文許令自便然各無去著猶係職名其間有不請衣糧只望差使設有得該請受多是折支時寒無衣日餒無食老少相聚凍餓貧窮羇旅無圖咨嗟愁苦與其配之而無用孰若捨之而放歸此乃可言者一也國家封疆甚廣州縣至多令録闕員據資勞而遷授簿尉滿任循嵗月以除移其間廉吏雖多抑亦貪夫不少貪者偶無彰露刑罰寧加廉者未有升聞旌酬弗及言乎賞勸似未精詳宜委諸州遍令申奏州有幾縣縣有幾員奏其善者則不善者自彰奏其廉者則不廉者自顯或就加奬飾或聊與轉遷則廉能者既有所歸猥濫者寧無自愧揚清激濁實為致理之先易俗移風宜自親民之始此臣所謂可言者二也疏入不報此據錫奏議錫自注云七年十二月十四日自相州入遞又據錫睦州所上疏言六年九月十三日上疏䝉詔奬七年十二月十四日再上疏即不報其不報者乃此疏也是歲賜譯經院額曰傳法令兩街選童子五十人就院習梵學梵字從天息災等所請也達勒達國遣使唐特默與高昌國使安骨盧俱入貢骨盧復道夏州以還忒默請道靈州且言其國王欲觀山川迂直擇便路入貢詔許之荆湖南北路轉運使李惟清入奏事上問曰荆湖管內纍年豐稔又無徭役民間舒蘇否惟清曰臣見官場賣鹽斤為錢六十四足百姓每以三數斗稻價方能買一斤此亦甚不易也乃詔斤减十錢此事不知的是何時五年七月戊申惟清自湖北運判改運副八月己卯遷使七年九月戊戌兼總南路九年六月乙酉徙京西其入奏不知何年今附八年之末本紀附五年之末要未可據也惟清下邑人嘗為涪陵尉民尚淫祀疾病不療治聽命於巫惟清始至禽大巫笞之民以為必及禍他日又加箠焉民知不神然後教以醫藥稍變其風俗時遣官督輸造船木縱恣不法惟清奏殺之由是知名
