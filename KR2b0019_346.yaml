body:
  text: 續資治通鑑長編巻三百四十二宋李燾撰神宗元豐七年春正月壬寅涇原路經略司言乞改造神衛素鐵甲為偏挨從之甲辰手詔李憲得來奏稱賊兵渡河寇本州事如素有指準固已甚善惟是深戒将佐更切謹重勿輕冒賊鋒誤國重事更多方處置仍告諭城中仰堅心一志守禦俟賊退敗當有重賞餘見被寇城砦準此諭之仍日逐飛奏前來朱本増入墨本無之本州盖蘭州也文彦博言臣前辭闕下之日嘗奏得致仕後當親辭天陛臣今得請欲赴闕廷降詔從之乙巳正議大夫滕甫知筠州甫罷安州入朝手詔謀逆人李逢乃甫之妻族近親不宜令處京師可與東南一小郡故也甫上書自辨尋改知湖州五月一十二日辛酉乃知湖州甫墓誌云勑使謝禋市物于安州因縁為姦民被其毒甫宻疏其姦状上為罷黜禋自安州入朝未對而左右有不悦者又中以飛語復貶筠州士大夫為甫懼或以為且有後命甫語笑自若曰天知吾直上知吾忠何憂哉乃上書自明上覽之釋然即以為湖州又詔李憲走馬承受閻仁武奏蘭州賊馬鉅萬為數不少其多方取萬全處置勿致倉卒為蘭州之累朱本増入汝州言梁縣民沈宣䘮母既葬不塞墓門晝負土夜附棺而卧居三十六月乃閉墓門為墳壙廣百尺妻髙氏亦有孝行詔賜粟帛丙午右龍武軍大将軍洺州防禦使世準為金州觀察使安定郡王㑹稽郡王世清既卒宗正言世準於太祖太宗之後最長當襲封故命之新本去朱本㑹稽郡以下新紀書封洺州防禦使世準為安定郡王舊紀不書丁未手詔李憲西賊圍蘭州日久未退除朝廷已降指揮諸路各出兵牽制外宜速遣諳事信熟人檄董戩鄂特凌古出兵腹背攻討之更廣求間路探候城中息耗仍諭在城官吏伺察姦細守城人頻令番休勿使倦怠穏審處置勿誤重事朱本陜西轉運副使范純粹入對延和殿初七日純粹有數劄今刪取一二附此日先是純粹言伏見邉患未平儲備方急而本司職務經累年軍事之餘上下侵蠧極于殘弊事力已竭無所取濟利害紛錯大非章疏可盡臣愚待罪劇部亦已久矣雖適此困匱之時若但為平日經常之計則多方營致粗可枝梧若将來邉事再作久不解兵即儲廩大計决無可辦之策自非躬至朝廷曲折講畫上禀聖訓改更措置即他日必致誤事邉防之重上繫國體臣敢茍計目前嘿嘿自處伏望聖慈察臣意在職事特許臣兼程前去暫至闕庭上殿敷奏所貴一路大計上遵成畫不致誤事許之六年十二月三日奏於是純粹言契勘本司昨䝉朝廷差委王震㑹定五路年計錢物凡逐路嵗支之數纎悉具見無容不盡自軍興以後須用名數十倍常日而芻糧價直所在増貴且如王震㑹定日将糧草約以中價米斗六十五文足今來沿邉諸路如帥臣所在米斗猶不下一百六十文足草束不下六十文足他皆稱是其外城堡砦又非此比方之㑹定所約之價相逺如此兼契勘本路利源所入全藉酒課而比年米麫價貴本重利輕况㑹定之日除比嵗内實收應副實支外尚有四十四萬餘貫不足年計奉聖㫖只令本司那融應副今嵗入不加於前日而嵗費倍多於昔時又糴入貴賤如此之不同則大計盈虛於此可見臣殫思竭慮恨無長畫以致豐富惟戾衆斂怨百計愛省庶有小補若但以目前㑹較即幸可枝梧惟慮疆場緩急别有大段添屯軍馬或年嵗之間重兵未解則事力匱竭計無從出臣不愛一身之責實恐臨時上誤國事伏望聖慈深賜矜憐特自朝廷講議持久取濟之術令臣得以遵奉奏議正月七日盖上殿劄子也又言臣昨奏事延和伏奉徳音訪以新復諸城形勢利害雖已詳具敷奏伏蒙宣諭令具所見文字上進臣契勘延州帥府北距生界地不百里平川廣野謂之中路乃夏賊奔衝之地而元昊昔年入寇之所也形勢淺露莫此為甚昨因修復塞門故寨増展得道路四十餘里雖未能絶深入之患而屏蔽帥府粗加深嚴此實鄜延大利也又通逺軍以北定西一帶元係夏國婿喀木所據之地也通逺不滿百里自開拓熈河以來更西大路與羌地咫尺犬牙相逼時有侵扼之害昨因諸路出兵羌族逺遁朝廷乘時遂舉定西之役故通逺形勢自此深宻此熈河之大利也至於其餘新地所建城砦或臣嘗親到或采諸人言在形勢無所増加而嵗費浩大支計不充百姓困於供輸有司疲於漕餉况日煩朝廷補助曷有已時雖愚臣識昧事機言涉狂妄而朝廷計宜久逺寧據目前伏望聖慈博行詢謀稽考羣議他日或因時遇事以存廢之計少留宸𠂻天下幸甚正月九日奏戊申河東路經畧使王居卿言諸州多流人往西京乞賑濟下等户仍權住諸司糴買俟嵗豐計置詔轉運提㸃刑獄提舉司自非見闕軍糧並權住糴買提舉司量减元直廣糶保甲戸放税雖不及七分闕食者亦賑濟轉運司催殘零税及積欠並倚閣辛亥手詔李憲蘭州信息不通已幾旬日可速以重賞募人間路前去問逹及日逐具事宜以聞所有見屯驅逐畨應援兵将宜更籌策方略俾之前去奮擊力取萬全勿誤重事新本去朱本此段上第七女卒生才五嵗母林婕妤也輟視朝三日追封申國公主醫官皆坐責右羽林軍大将軍程州防禦使令廓襲封越國公詔提舉京西等路常平等事承議郎葉康弼衝替以戸部言六年終提舉官嵗考功過簿康弼比諸路上簿獨多故也勒停人通直郎劉誼為宣議郎壬子河東經略使吕恵卿言新復境土差遣有闕官處乞許選擇奏舉又言河東鄜延新修城寨相接乞許兩路各差官㑹議並從之提舉河北保甲司言保甲逃亡免教乞給捕賞外更立蔵隱之家追賞法所蔵家雖誤相容隠亦不免追賞錢詔三路知情傭雇蔵隠逃亡保甲之家减保甲罪三等許人吿均出賞錢兩犯捕獲應配者追其半餘以保甲司封樁錢支開封府界凖此環慶路副總管曲珍言子卞死事蒙推恩六資乞與婿及召門客教諸弟姪候堪任差使具名奏乞詔曲卞二女候出嫁夫與三班借職所乞召門客不行景思誼母徳安縣太君董氏月特支錢二十千候思誼子有俸日住支陜西轉運副使范純粹言沿邉諸路番兵捉生請受其逃亡事故人馬並不開落偽冒批勘乞責将副依正兵例開收兩月一㸃閲從之癸丑手詔李憲得來奏以蘭州境内賊馬已退賊傾國而來彼費已大洎入漢境盤泊旬日卒無所得大衆傷夷而歸在我固已収全功矣宜遍諭諸将勿以不能尾擊多所斬獲為恨又詔憲羌賊堅悍兇惡如此若非官吏軍民人懐忠義安能卒保無虞除已齎賜官吏銀合茶藥及士卒銀椀外仍據城上城下用力輕重等第支所給絹去外宜速編排諸司所有絹十萬匹以備使臣到日宣賜并具功状火急保明以聞當與優賞其蘭州城裏宜内塝下濶二丈上収五尺馬面中間更増散樓子一座五間仍添置砲臺為便可速具以聞朱本増入新本並削去舊紀書癸丑夏人寇蘭州新紀因之遣入内供奉官石璘𫝊宣撫問守城将校并賜蕃官銀合茶藥諸軍特支詔戸部侍郎寋周輔罰銅六斤員外郎陳向八斤坐違法割移門下侍郎章惇俸錢於相州繳回故也吏部言凖詔定奪繪像臣僚之家食禄之法㸔詳致仕停俸年七十以上受官事故勒停無叙法殘疾不堪入仕不理選限之官欲並不為食禄人從之詔廣南西路累任轉運使張頡陳倩副使苗時中馬黙朱初平吴潛判官朱彦博謝仲䂓各罰銅二十斤坐本路提舉常平等事劉誼於桂州治廨舍費官錢萬緡轉運判官許彦先奏劾頡等不覺察也吕公著自定州徙揚州請覲許之是日入對言邉境無虞不宜生事又以前嵗上嘗屬疾勸上以宗社自謹重已而言定州官吏坐小法皆奪官衝替如臣忝竊已厚固無甚害自餘小官皆失所宜定州以禁卒䕶重役人而議獄者以為犯編管人用遞鋪法豈非舞文耶若於法明審則理官不當復引不應為律矣上意悟諭公著曰朝廷姑欲法行耳然此法誠未明當更増修之公著既辭未行即除資政殿大學士除大資在壬戌今并此且謂執政曰仁皇侍從所餘無幾咨嗟久之尋又復光禄大夫其後定州官吏被譴者自列於朝詔即御史臺詳定既而明其非辜悉除之除職復官釋定州官吏當各附本月日甲寅賢妃朱氏進位徳妃兩妃並書此詔賢妃邢氏於奉先資福院側修佛寺賜名多慶禪院嵗度僧二人紫衣或賜號一人仍給官田十頃手詔李憲西賊雖已傷敗散去然兇酋星多哩鼎者倔彊任氣深慮耻於傷殘不快所欲忿不思難出我不意犬彘其人乘隙忽有奔衝不可不念宜多方廣布斥候督責守将無怠防慮仍頒弓箭火砲箭百萬有餘以備禦賊朱本所増新本並削去詔蘭州賊馬已退其河東路差下出界牽制将兵更不消前去如已入界即不用勾回宻記十四日又詔涇原軍馬更勿發行此據御集上批同提舉河北東路保甲秘閣校理劉定祈恩䕃子以職事勤瘁特許依舊館職條同提舉河東保甲秘閣校理黄亷同功一體可亦令奏薦毋得為例范純粹奏鄜延剏添東兵在延州及極邉城寨駐劄臣愚竊謂一年之内邉事之甚可防者不過半年如大暑大寒之月皆非賊兵舉動之秋雖於春陽之時彼方人飢馬瘦借有出沒不過妨撓耕種或小小鈔刼而已只可用逐處蕃漢土兵其東兵自可遣泊内地就食詔令經略都總管司相度聞奏宻記十四日乙夘手詔李憲夏人自連嵗不時㸃集之後人固已有受其弊者又圍犯蘭州大衆傷敗之餘士氣摧喪在理可知兼兇酋星多哩鼎殘忍虐用其人今既不能如欲上則必得罪於其國中下須逞其躁心及彼羌戸必有不自安之人疑可乘時開以重利俾有内向之心廣肆招徠以衰賊勢仍時出精銳塞外撓其春耕為今之宜最為困賊上計爾宜圖之仍賜錢一百萬緡絹五十萬匹為修築備禦錫賚之費朱本増入新本並削去又按丁巳日墨本書賜錢一百萬付熈河蘭㑹經略司當即是此詔所云也又詔憲西賊自蘭州挫鋭傷夷之後聞其中欲得内附者甚多未知虛實可責委守将多方招徠或専遣一二近土有機智官如康識軰主其事此於方今邉計不為小補兼繫賊彊弱事實不細朱本増入新本並削去丁巳詔戸部支積剩錢百萬緡付熈河蘭㑹經略安撫司於新境計置糧草修補守具疑此百萬緡即乙夘詔書所云但朱本既増入詔書又不削去墨本此段當存一去一詔保甲犯罪情渉凶惡速具奏聼裁此事必有故當考戊午右侍禁閤門祗候朱伯材遷閤門通事舍人以徳妃進位恩也知開封府王存言司録司左右軍廵院獄空乞付史館詔王存遷一官餘官令第勞上司勲舊紀書戊午開封府獄空新紀不書詔河東鄜延環慶涇原路經略司如無大段賊馬嘯聚可遣邉兵分屯免虚食貴價糧草己未陜西轉運副使范純粹言綏徳城當夏賊之衝乞立軍額以米脂義合浮圖懐寧順安綏平六城砦𨽻焉又言昨王震㑹定五路錢物以沿邉糴買鈔付逐路經略司管認糴入支遣昨因軍興以經略司専治兵旅遂令轉運司復管勾至今未罷乞沿邉糧草職事並依元降㑹定朝㫖手詔兵食相資實為一事况熈河路已總於李憲等故得首尾相闗財用出納稍能省吝則諸路無有不可兼領之理自今陜西軍須經費經略轉運司隨路通管其餘職事毋得侵紊二月二十七日改此又六月二十七日當考詔奉宸庫選玉造磬從協律郎榮咨道請也後禮部乞就差太常博士楊傑審定玉磬音律提轄管勾從之辛酉左右司言給陜西河東官俸餘職田支鹽鈔二十五萬八千五百二十六緡無拘収法詔已支錢令戸部限五年還戸部言欲令河北路提舉司以嵗計餘錢借措置糴便司兩路不過百萬緡從之本志有此乃無月日責授黄州團練副使蘇軾言汝州無田産乞居常州從之元豐中軾繫御史獄上本無意深罪之宰臣王珪進呈忽言蘇軾於陛下有不臣意上改容曰軾固有罪然於朕不應至是卿何以知之珪因舉軾檜詩根到九泉無曲處世間唯有蟄龍知之句對曰飛龍在天軾以為不知已而求之地下之蟄龍非不臣而何上曰詩人之詞安可如此論彼自詠檜何預朕事珪語塞章惇亦從傍解之曰龍者非獨人君人臣俱可以言龍也上曰自古稱龍者多矣如荀氏八龍孔明卧龍豈人君也遂薄其罪以黄州團練副使安置然上毎憐之一日語執政曰國史大事朕欲俾蘇軾成之執政有難色上曰非軾則用曽鞏其後鞏亦不副上意上復有㫖起軾以本官知江州中書蔡確張璪受命王震當詞頭明日改承議郎江州太平觀又明日命格不下於是卒出手札徙軾汝州有蘇軾黜居思咎閲嵗滋深人材實難不忍終棄之語軾即上表謝前此京師盛𫝊軾已白日仙去上對左丞蒲宗孟嗟惜久之故軾於此表有疾病連年人皆相𫝊為已死飢寒併日臣亦自厭其餘生之句也此據李丙丁未録增入不知丙傳之何書八年五月六日起知登州一朱勝非秀水閒居録云蘇軾既貶黄州神宗每記憐日宣諭曰國史大事朕欲用蘇軾成之執政有難色帝曰軾不可用則用曽鞏鞏不能副帝意又有㫖軾以本官知江州蔡持正張粹明皆禀命禹玉以為不可又令與江州太平觀禹玉亦以為不可其後禹玉作相帝語及軾復欲用之禹玉曰軾有詩云此心惟有蟄龍知方陛下飛龍在天而不知敬反求蟄龍乎章子厚曰自古言龍非獨人君之稱人臣亦有稱龍者帝曰然如荀氏八龍孔明卧龍是也既退子厚謂禹玉曰相公乃欲覆人家族耶禹玉曰此舒亶語耳子厚曰亶之唾亦可食乎勝非所録比丙差不同如王珪獨不可江州及太平觀再命并章惇詈珪云當并考又王鞏聞見近録具載欲令修史及江州并太平觀事載王珪舉蟄龍詩則以為已在黄州非初下獄時也當并考朱勝非所録盖全用鞏舊書蘭㑹路沿邉安撫司言蒙賜藥箭二十五萬如西賊圍城放箭出射慮賊反射入城乞賜藥解詔後苑東門藥庫給五十斤上批近指揮将來朝廷案閲保甲令諸路提舉司擇藝成者先案聞提舉司乃以意欲與賞及成就廵檢處偏擇當案保分不時教習甚失朝廷觀作之意可令提舉司毋得預定合案閲保分手詔李憲蘭州賊退巳久其城守有勞之人至今未見第功奏上可速具飛遞以聞本路地形據賊上游夏人姦心日有窺伺理須守禦亭障百色具備可令役兵併力修治熈州十分堅固外其餘保砦亦皆増修要使一路内外率有堅城之恃應于守禦器仗非本路可辦者一一覼縷奏來當自京師發去朱本増入新本並削去入内供奉官勾當龍圗天章寳文閣寄内殿崇班馮景元轉一官仍寄資以上批蘭州保守無虞縁景元初建議修置故也此據御集壬戌監察御史張汝賢為侍御史知雜事汝賢吉州人也詔給鄜延路功賞左蔵庫絹六萬元豐庫四萬左右司状御史房置簿書御史六察官糾劾之多寡當否為殿最嵗終取㫖陞黜御史房舉發逐察不當及失察不盡等事嵗終亦乞比較從之甲子知渭州盧秉知延州劉昌祚各罰銅二十斤坐得蘭州被圍闗報不即出兵牽制也乙丑戸部言陜西轉運副使范純粹言銅錢三監所用銅錫乞額外給依例封樁本脚錢又乞於本路難得錢處用公據并減紬絹價易錢如諸路沿邉闕錢凖此又乞沿邉所費解鹽並令轉運司自以鈔赴解池請鹽或召商人入中應副邉用其李稷元奏更不施行並從之李稷元奏右諫議大夫趙彦若言伏見尚書省聽事寫周官篇此朝廷稽古命官之本也周官大㫖在乎得人故曰不惟其官惟其人又曰官不必備惟其人今門下侍郎章惇尚書左丞王安禮並無行檢非周官之所謂惟其人也自居執政未聞有補而異黨復一人畏其彊僚屬觀望雖讁不悔權勢至此不宜處位請皆外補以肅具臣後四日手詔朝廷自修復官政小大羣司各有職守昨降黜諸寺監丞簿後上下尤知謹戢罕有僭紊近彦若輒侵越御史論事不可不懲乃降一官試秘書監戊辰二十八日乃降責今并書云異黨復一字必有誤新本亦然當考正之朱本簽貼無案據遂削去張舜民誌彦若墓又不載當日彈辭降舊紀書戊辰趙彦若論事不循分守罷右諌議大夫為秘書監新紀不書成都府利州路鈐轄司言相度臣僚上言者乞移蕃驛於玉壘闗及漢蕃博易増差禁軍本司今相度欲乞移永康軍牛溪闗依舊於蠶崖闗置城寨不須移置蕃驛詔増差禁軍等不行其乞移牛溪闗於蠶崖闗送尚書省從之丙寅手詔李憲比西賊攻犯蘭州之始城壘兵防未有十分可恃所以人情惴恐不得不爾今賊已解去則前日憂虞戒心未易可忘除兵防以縣官財用所繫未可増加外其城守之具與夫壁壘繕治宜急為之除熈州以根源所繫先次修治固已甚善餘係近裏所繫重處亦宜速具奏以聞不可日稽一日緩急有誤重事朱本増入新本並削去中書省言尚書都省門状刑部牒有賣肉人擅入比部門已送開封府省門授事不禀都省其使臣欲上簿上批本差内侍守門止為與外廷臣僚無交涉得以盡情譏察出入若申解一賤𨽻令禀都省則動有忌憚何事不廢自今但干違令出入事命官奏聞吏史以下送所屬賜陜西轉運司度僧牒二百修延州城及廨舍丁夘詔葭蘆寨居山形勢嶮絶非出兵便地縱賊大至不過城守兼本寨城圍止千餘歩歩立一人止千餘人加計倍之二千人足矣今經略司都不恤邉費視朝廷財用輕若泥沙無故輒屯重兵情不可赦其王居卿雖巳離任令提㸃刑獄司追上案罪以聞戊辰詔知開封府王存依倣六典京府并尚書省六曹事目參定分案體式以聞
