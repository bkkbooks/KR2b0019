body:
  text: 續資治通鑑長編巻四百六十七宋李燾撰哲宗元祐六年冬十月丙辰朔户部請應承買場務元係官監及敗闕者課利錢並不得支移折變若届滿一年無人承買已經差官體量減定浄利錢即自減定後月分課利亦與依減放浄利分數與免支移折變從之詔拆修垂拱殿遇六参及朝参起居權於崇政殿坐御集丁巳詔上清儲祥宫成提㸃官寄西京左藏庫遥郡刺史陳衍轉一官寄資政目二日韓忠彦進財抵當所當錢此事當考吏部郎中孫路為徐王府侍講二十五日改禮中戊午户部請召人入中解鹽乞並以熈河路州鈔面價從省部審量隨事増減支折及澶懐滑州陽武等處所賣鹽未有定價許客人於河陽都鹽場務入中其價錢毎席定八貫二百從之新削己未三省進神宗皇帝御筆一百七十五策召宰臣執政官及三省編修官坐賜茶詔左朝奉大夫提㸃兩浙刑獄吳立禮為殿中侍御史立禮中復子用翰林學士范百禄薦也又詔西作坊使毛政戰功顯著以見居占墳地貼數共賜地一頃庚申樞宻院言夏賊犯順雖已令牽制策應縁頃候帥司牒到諸路方始㑹合按舊制横烽鄰接路分遞相照應極為要便理當復行興置詔陜西河東逐路經畧司相度横烽如果利便即行修立又言涇原路探報梁葉普近犯麟府界為人殺死梁阿格葉普為夏國所誅詔逐路經畧司如探報得葉普尚用事即宜乘隙用間以謀誅滅仍謹選可用之人厚遺金帛優許職名宻切經畫施行訖具状以聞舊錄云時葉普率衆犯麟府河外三州殺戮甚衆莫之敢禦而姦臣謂已誅死欺罔為甚新錄削去今從新錄二年八月十四日詔募人殺葉普盖至今葉普猶無恙十九日可并此秦鳳路經畧使吕大忠言夏國自梁氏兄弟用事以來虐用其民壮者勞於征役老弱困於資助以至僥倖非據殘害忠良上下怨嗟皆欲共食其肉特未發爾近聞葉普阿格並就誅戮威明族人復預國事又擇種姓以為之主羌中以嘗累冦諸路深慮朝廷乘此危疑之際或有舉興遂遣使請和以觀吾變正是可以經營之時不若因而指揮鄜延路只作經畧司意度移問夏國今來葉普阿格已死就使未死亦可以激怒衆心使之反側委是威明族人復預國事其所主立衆共推服從今一心恭順更不敢别有邀求速希回報以憑申奏朝廷乞行封冊葉普之變本國方以為諱今明言之以奪其氣如此則忠黨遂安永戴恩徳此邉防莫大之利伏望聖慈斷在必行天下幸甚據吕大忠奏議此實答七年九月二十二日宻劄然與宻劄條目殊不相干實録又不載此宻劄恐奏議誤編大忠論葉普等已死因附見六年十月五日辛酉三省言右朝奉郎管勾鴻慶宫王鞏供析到淮南提刑鍾浚所體量事並是詣實詔王鞏特衝替閏八月二十八日下淮南漕司根治馬守珍事今云提刑體量盖五月二十二日指揮也九月十六日政目云朱光庭􅌳王鞏文字當并考監察御史安鼎言乞在京置司勘公事獄成令吏部差朝臣一員錄問從之詔陜西河東逐路經略司常切體探西賊對境二百里内賊兵屯聚及部族所在如有可乘即遣謹重有謀将佐及勁勇人馬為倐往忽歸之計痛行討殺及令諸路兵馬更出迭歸使賊奔命不暇早致困弊以樞宻院言夏賊寇邉未巳平時恃衆出我不意故也諸路淺攻之䇿盖自此始行癸亥詔兖州錄事參軍郭直卿添監國子監書庫不得為例郭直卿何人詔軍師劉昌祚姚麟與河東陜西逐路安撫使總管秦鳯路鈐轄蘭岷河環知州鎮戎徳順知軍河東鄜延路鈐轄各奏舉大使臣有材武謀略或曽立戰功勇於臨敵可以統衆出入之人二員至五員以聞詔陜西河東逐路經略司如遇西賊冦犯一路但賊兵數衆多本部兵力實難枝梧須藉諸路牽制策應即行報闗鄰路牽制不得縁此指揮不復審度賊勢自取一路之便例報逐路枉役軍馬使諸路徒致困弊及為賊陽為侵犯一路却於别路潛伏重兵俟我出兵牽制即發伏邀擊或乘虛冦别路致墮其計中九月二十六日范純粹云云可考右朝請大夫王宗望為司農少卿左朝散郎集賢校理趙挺之為國子司業左中散大夫祠部郎中王説知相州八年三月二十一日為太府少卿左朝散郎知相州楊康國為祠部郎中知蘄州徐君平為京東路轉運判官康國尋改京東路轉運副使三月二十六日楊康國出守衛州尋改相州徐君平出守蘄州康國以諌官論蘇轍君平以臺官論王巖叟今皆遷擢轍時方為尚書左丞而康國乃除祠部理當引避十一月三日遂改京東運副今并書劉唐老與康國君平同出守唐老得絳州八月六日又以王彭知絳州唐老至十一月三日改秦鳯憲左朝請郎太常丞吕希純知蘄州尋復留為秘書丞希純父䘮滿除太常丞在今年五月二十二日復為秘丞在十一月十六日希純在太常時宗廟薦享每帝后共奠一爵希純上奏曰檢㑹開元禮開寳通禮毎廟室薦獻帝后各奠一爵其后爵謂之副爵本朝自太祖行之已百二十年至元豐末臣僚建議以為筵則同几祝則同辭食則同牢而獨奠副爵於義無取自是毎室只奠一爵帝后共享之竊考議者之言誠使出于禮經正文後世猶難遵用况皆率自私意並無明據見今太廟帝后異几與議者之言不同外臣愚以為祝辭固當共為一冊食亦可以同用一牢惟酒不可以共飲一爵且如僖祖宣祖室一帝一后共薦一爵已是誤引婚禮合卺之制以事祖妣至若太宗真宗室各祔四后乃是一帝四后共一爵慢神凟禮莫此之甚若不亟行改正而望神靈顧享必不可得欲乞依歴代及本朝舊制凡遇時享月祭毎獻帝后各奠一爵以副陛下事亡如事存之意此據希純家傳増入其從違當考考政目八日視學講官賜服縝又韓縝帥太原二事當實録講官賜服在十五日帥太原在十一月八日丙寅邇英讀寳訓至節費吕大防奏曰浮費固當節至於養兵以禦患而民不勞故養兵之費不可節王巖叟曰大凡節用非謂偶節一事便能有濟湏毎事以節省為意則積日累月國用自然有餘上曰然新舊録並無此以王巖叟繫年録并朝論増入撰政目十一日奏實録成以草上與提官此事當考丁夘殿中侍御史楊畏言近有布衣薛鴻漸林明𤼵以妖妄文字上聞詔送兩浙福建路轉運司根治臣聞鴻漸教本自海上異域入於中國已數十年而近益熾故其桀黠至于上書以幸張大願詔逐路監司嚴切禁止具措置方略以聞庻令盡心少正風俗從之詔吏部選将副並于待次人内選轉大使臣後一任雖未經任湏曽歴沿邉差遣或有戰功經親民之人申樞宻院引騐内朝廷差除者不拘此制是日三省樞宻院同奏乞将勒住夏國嵗賜分給與河東陜西經畧司添助漢蕃功賞庻可激揚士氣太皇太后曰甚善此據王巖叟日錄巖叟又云巖叟退韓忠彦曰簾中語甚壮聊以諷之當考庚午朝獻景靈宫退幸國子監詣至聖文宣王殿行釋奠禮一獻再拜幸太學御敦化堂召宰相執政官親王從臣賜坐禮部太常寺本監官承務郎以上侍立承務郎以下三學生坐于東西廡侍講吳安詩執經國子祭酒豐稷講尚書無逸終篇復命宰臣以下至三學生坐賜茶國子監進書籍凡十七部軸上命留語論孟子各一部遂幸昭烈武成王廟酌獻肅揖禮畢還内是日賜豐稷三品服本監官學官等賜帛有差先是范百禄轉對請視學故有是舉或謂吕大防曰祖宗視學非有爵命之賞則有金帛之賜今皆無之何也大防曰古者天子視學盖常事也徳意在焉小恵何足道哉吾固欲天子時一幸金爵之賚後日何可繼也正恐惜費而止耳聞者乃服此據大防行状壬申吏部言官員在任合避願對移者許合避人不限數指定本路鄰近合對移處或合入闕申轉運司勘㑹無妨礙申尚書吏部先次差往如無闕指定旁近路分合入闕申本路闗牒所指路轉運司依上法施行如無並申吏部依此對移即願放罷及無可對移者並放罷依省員法在任應避親嫌已對移未到移所而所避之人替罷者各歸本任若未赴任已放罷者如未别授差遣本任又非有正官願還本任亦聼即未赴任者經所在州陳状指射合入差遣仍許與待闕人對換從之新本削去癸酉御史中丞鄭雍殿中侍御史楊畏對甚久論右僕射劉摯及右丞蘇轍也邵伯温云楊畏擊劉摯蘇頌皆為蘇轍按轍與摯實同被劾摯逐而轍留盖摯别有與章惇交通事耳伯温所云恐不足信紹聖元年六月五日上官均章云云伯温盖本此必當時有是説雍言摯略云摯久據要路遍歴三省始因言事得進即與其意合者共進退人又云摯為執政其下多引在要任或為兩省屬官或在言路摯所不悦則舍人給事繳駮言路彈奏又云摯引趙君錫為中丞摯厭賔客君錫申明謁禁朝行中言君錫為執政止客又薦葉伸為臺官以合摯意隂與賈易相結摯所不悦則奮力排擊又云葉伸曽任臺簿摯所舉未久除兩浙運判又升運副召為省郎趙君錫薦伸御史伸不就即除左司又除河北運副又云林自為鄆州教授自言為鄆州人劉仿所奪仿與摯兒男遊從仿命未下已前仿自言已得教授又云趙彦若男仁恕自盗贓滿不候勘正便取㫖斷放彦若是其親家又云王鞏不檢事體量未到間堂除宻州體量得實罷宻州無衝替指揮趙君錫荘公岳承望風㫖親判破宻州任林積不敢體量謝景温妄奏鞏非罪縁摯男娶鞏女又云未舉御史為朝廷多摯門下人摯善牢籠士人不問善惡雖贓汙久廢之人亦以甘言誘致如龔原王沇之詹適孫諤悉與除落罪名與吕温卿湖州明州延接章惇男援有同骨肉送簡帖與邢恕又具摯黨人姓名王巖叟劉安世韓川朱光庭趙君錫梁燾孫升王覿曽肇賈易楊康國安鼎張舜民田子諒葉伸趙挺之盛陶龔原劉概楊國寳杜純杜紘詹適孫諤朱京馬𫝊慶錢世雄孫路王子韶呉立禮凡三十人此據編類章疏増入詹適此月八日除常博吕温卿明州政目在正月十八日左正言姚勔入奏並言摯朋黨不公編類章疏但有此右正言虞策四奏言摯親戚趙仁恕王鞏犯法施行不當十月二十日又言摯操心不公屈撓大法隂結黨與潜圖其私肯附己者則越等與官不肯朋附者則抑而不進十二月十二日又言摯自己親戚犯法並不盡公施行至有一件事首尾三年罪人終不曽分明承服者十月二十三日又言摯備位宰相狥私壊法收恩立黨十月二十四日甲戍劉摯蘇轍以王鞏坐罪摯與鞏為姻家轍薦鞏皆自劾乞正典刑詔答不允轍言臣昨以鄭雍楊畏言臣薦王鞏不當奏乞速正典刑以弭羣議尋復見諫官虞策與臺官安鼎亦論此事内虞策所言與鄭雍楊畏不甚相逺惟有安鼎謂臣欺罔詐謬機械深巧不速譴責恐臣挾朋誕謾日滋月横信如鼎言則臣死有餘責有何靣目尚在朝廷今臣既以舉官不當乞行朝典不敢復與鼎辨别曲直然鼎頃與趙君錫賈易等同造飛語誣罔臣兄軾以惡逆之罪嘗與君錫等同上殿奏對上頼聖鑒昭察知其挾情虛妄君錫與易即時降黜鼎今在言路是以盡力攻臣無所不至朝廷若不逐臣鼎必不肯已伏乞聖慈憫臣孤立無援早賜責降使鼎私意得伸不復煩凟聖聼則臣死生甚幸貼黄稱臣本欲候二十二日奏事靣陳家居待罪之意但以鼎攻臣甚急若不早自引避恐再以惡言見及伏乞聖慈體察摯乞罷相表其子跋辯謗録有之表皆禮辭不湏編入有三劄子今具在後樞宻院言夏國首領星多貝中乃昔日哩鼎之子久據西南部落素為桀黠與邈川首領温錫沁鄰境相善已令温錫沁委曲開諭招致許除節度使令保守舊土自為一蕃後以梁葉普擅權用事猜忌貝中自此中輟不復議及近據諸路奏報多稱梁葉普身死貝中屢來邉上慮夏國首領各懐携貳可以乘此招致盖昔人用此獲利甚多唐太宗殄滅突厥亦先因歸附形勢既分然後李靖得伸其策最為明驗詔范育劉舜卿乘此機㑹宻切措置其後卒不能致其後卒不能致此舊錄語新録削去今復存之當考十月五日可并此乙亥詔罷修金眀池龍船御集有此政目云罷買樁木修龍船丙子樞宻院言招軍並委提刑司催捉按舉遇出廵據新招到人逐名㸃檢及保明酬賞内禁軍不及元等様者改刺充以次軍分不堪披帶者充廂軍有手藝者試驗改刺充工匠更不支例物即不堪征役者廂禁軍並給公凴放令逐便毎嵗終逐司類聚轄下招到人數各申所𨽻官司就糧禁軍闕額委都總管安撫鈐轄司選官與當職官員於廂軍兵級揀選年四十以下者依等様添填仍湏年終揀徧其曽犯徒經决或曽刺逃走字或見係十将以上若工匠或元係官員将校蕃部溪洞化外兩地供輸及元犯事干機宻妖術訛言或因不入賊并强盗配到者並不在㨂限即官司隐庇占留合揀選人者徒二年新削此叚又言河東路經略司奏請應沿邉蕃官蕃部地土如係官給者並不許遞相典賣熟户蕃部祖父及己業即聼熟戸自行典賣並從之丁丑右正言虞策言諸路州縣近有扵役人處敷買物及非其本役而役之者乞令諸路監司察舉之詔戸部申明行下七年正月二十九日可考詔今後省試罷差参詳官差知舉官四員從翰林學士范百禄請也是日劉摯蘇轍俱宣押入對已押赴都堂俱先出待命於僧舍乞賜罷免戊寅詔定西城東至隆諾特堡中間及定西城西至李内彭中間兩下各修置守禦堡寨一座照䕶小堡子二坐此據七年二月二十八日范育相度游師雄築堡寨異同奏状増入庚辰尚書省言私役使耆戸長壮丁保長保丁者杖一百經日徒二年差借耆長壮丁保正保長丁防䕶或搬擔行李之類及借之者各徒二年從之新削仁宗貴妃苗氏卒諡昭節生秦國荘孝大長公主悼穆唐王政目十一月二日車駕臨奠徐王府侍講孫路禮部員外郎楊傑兩易其任孫路尋改吏中論熈河事附紹聖二年正月十三日翰林學士范百禄等言請申敕大宗正及諸宫院教授等官各修職業勤於教導令宫院諸位子孫自十嵗以上並湏毎日聼讀學習定其課程及大宗正司按熈寧敕小學扵逐院尊長㕔側建修自八嵗以上至十四嵗毎嵗首檢舉入學日誦二十字詔禮部從之新紀云庚辰令諸宫院建小學按實録所書則小學固已建矣當考是日簽書樞宻院事王巖叟奏編類章䟽係十月二十五日伏見劉摯以人言避位于今累日中外之議惶惑不寧竊以摯自陛下垂簾之初首當言路條陳政事排斥姦邪無所顧避陛下知其忠藎有功於時故不次登用天下之人莫不以為當而大姦在外含怒積怨欲食其肉者非一日矣今朝廷清明天下安静固出于兩宫虛心求治開誠納諌之效然一時戮力盡忠之臣摯居其最實陛下同心一體可保終始無變之人也自非罪状顯著衆所不容豈可因一二偏詞輕示遐棄臣恐適足快羣姦之意而失衆正之心非所以為國家計也臣毎患朝廷之上享陛下髙爵厚禄者雖多而與陛下同心協意者則少今就少之中又将退斥臣反覆念慮竊以為憂蘇轍素有時名元祐以來排邪助正竭力亦多今若止因一舉官失當便行罷逐恐於陛下進退大臣之體有所未允况言者别有所懐未易可測臣不知披肝瀝膽事陛下之日久者為可信耶一踐言路未得其腹心者為可信耶安知其間無朋邪挾私而隂與羣姦為地者陛下何不稍緩其事試加考察将必有所見知臣言之不妄古人有言天子重大臣則人盡其力輕去就則物不自安願陛下曲加含忍以全終始之遇且使小人不能有以闚陛下臣遭遇陛下非常之知不與衆人比既有所見不忍負恩黙黙自守臣本欲候來日垂簾靣奏以當行事合受誓戒不獲登對貼黄臣度言者欲盡塞衆正之口不過以朋黨加之先惑聖意然自古姦人之欲排䧟善良者莫不皆為此無形之説以肆誣罔陛下博覽羣書必能深察奏入不報太皇太后獨遣中使賜蘇轍詔諭令早入省供職轍再奏乞外任劉摯言臣二十二日再具劄子奏聞乞罷政事除一外任至今未奉指揮夙夜惶惶不知所措伏念臣竊位無補咎惡日積招致人言已是虧損國體雖荷恩憐覆庇其罪然於輔臣進退之義實不自安臣茍未去言必不息伏望聖慈檢㑹前奏如未蒙貶竄即乞早賜指揮除臣一外任庻安公議使臣得以省分遵職以伸犬馬之報摯又言臣近再具劄子陳乞外任伏蒙聖慈復降中使賜詔不允者恩遇未替豈勝犬馬感報之情重念臣居位嵗久畧無勞能心實自知果招彈劾雖有指陳罪状仰䝉聖明洞賜照察然大臣既致人言已為累國若又安然不去臣實何施靣目所以不敢上貪睿寵遲遲於進退之際取輕於天下也伏望皇帝陛下太皇太后陛下察臣孤危早賜開允除臣一外任差遣上以明朝廷之大公下以全臣子之名節摯又言臣自今月十九日後待罪及累曽陳乞外任於二十五日再凖詔書不允後累具劄子干冒天威至今未奉俞音徬徨隕越憂懼之心不知所措伏念臣暗不燭理煩言暴作雖聖恩深厚照其本末尚垂保庇而孤危之跡勢豈得安惟是許臣引分早去使免顛覆乃陛下全臣終始之賜也臣敢不誓死以報萬一摯此劄子當是二十五日以後所上今并附二十五日辛巳十月二十六日上諭吕大防曰論劉摯者已十八章初不為王鞏事乃邢恕過京師摯興通簡又延接章惇之子牢籠為他日計此何也待與少禮数令去大防曰書簡徃來恐亦人情之常又不知簡中道何等語太皇太后曰簡中語則不知言事官必知之大防曰湏後日取㫖太皇太后曰蘇轍止坐薦王鞏耳無他事也初邢恕服䘮貶永州䘮除赴貶所舟行過京師摯與恕故相善因以簡别摯摯答簡其末云為國自愛以俟休復持簡者問監東排岸官茹東濟恕舟安在東濟傾險人也数有求於摯弗得怨之亟取摯簡録其本送鄭雍楊畏二人者方彈劾摯與王鞏連姻事未竟得此大喜乃解釋簡語并奏之以休復為復子明辟之復謂摯勸恕俟太皇太后他日復辟也又言摯嘗館章惇之子于府第太皇太后怒面責摯反復曰公當一心朝廷若章惇者雖以右僕射與之未必喜也摯皇恐不敢對壬午摯上奏曰臣聞臣之事君如子事父母鞭笞叱逐無所不甘至於疑似難明之事則豈匿情而不自伸哉臣近因降出臺官言王鞏事尋即待罪及䝉宣押入對面承聖諭乃知除王鞏事外又言臣牢籠章惇邢恕等罪雖聖意一一照知謂非臣之罪然臣退而思念縱使無罪既被彈劾理當引退遂具劄子陳乞外任見聼指揮臣今再三思之言者所以指章惇邢恕事者其意必謂不用此無以動陛下之聼臣雖不知所言本末詳悉然必料謂臣昔在言路時曽論蔡確章惇等姦邪罪惡皆被貶逐及至于今日却有牢籠之意将此事枝蔓推求造為臣之大罪且言者指臣牢籠之跡必謂臣曽接見章惇子弟及曽通邢恕書柬而已恕與蔡確為死黨惇亦縁臣曽論列其罪上書乞誅戮臣與惇恕非情好相得灼然可知其通書柬見子弟乃人情公介常禮臣雖至愚豈不知公介常禮安能解終身之死怨但臣愚直不能防閑疑似之事而有通書柬見子弟之跡使言者得以縁飾増加必欲以此致陛下疑而重臣之罪其意亦必謂事之虛實繫陛下信與不信使臣無一語自明而其言至陛下之聼則臣亦安敢必陛下之不信哉臣繇小官自元祐初年即在言路才一嵗陛下擢作執政以至叨據宰司聼用知遇實先衆人其思報効未知死所而乃曲意于章惇邢恕軰欲何所求臣粗識事體待罪以來不敢與言者辨是非但此心若不自言誰為辨白使臣實有此心則是臣罪之大者安敢黙黙茍欲逃責而去使無此心必望天日之照察其肺腸保其終始臣待命累日詞意窮盡欲乞早賜聖斷貼黄臣元識章惇子弟向因其登科調官來謝曽一例隨衆接見邢恕近過城外曽一次有書來往只是叙寒温問安否而已天地父母臣不敢欺前日己曽具事跡面奏至於牢籠之意實無此心亦曽曲賜聖諭照其無有今料言者専以此事置臣於禍論列不已不敢不再具詳悉紊煩天聼又稱臣此章非是經營欲為不退之計亦非欲與言者辨但事渉誣罔不敢於君父之前有所不盡伏望詳覽早賜除臣外任又稱臣愚戇叨位嵗久誠有罪戾臣固不敢自保然今者所指太不近事情出臣思慮所不至其意盖欲取中上心建此疑似難明之事以為竒謀又知大臣被言少有辨論之理不過引去以成其計伏望陛下原臣從來事國用心之迹然後察今來言者所論特賜詳照奏入不報此叚叅取王巖叟日録劉摯行實并劉跂辨謗録及邵伯温辨誣更湏考詳射摯自辨章云亦曽靣賜聖諭照其無有所稱以右僕與章惇又恐非太母之言也宰相拜罷録云言者論摯姦回險詐力引私黨為臣不忠父死於衡委而不葬為子不孝于是摯抗章辭位其後摯自作家廟記以辨當時之冤劉安世為其集序案摯罷相非坐不孝拜罷録誤也家廟記乃元祐六年十二月知鄆州時所作今集有之要當求鄭雍楊畏等言章畧加刪附庶詳見摯與蘇轍招致人言本末紹聖元年閏四月十一日左司諫翟思始言摯不葬其父方罷相時言者未及此也實録摯新舊𫝊並云元祐元年冬言者論摯姦回險詐力引私黨為臣不忠父死于衡委而不葬為子不孝罷相作舊本者崇飾淫辭可也新本略不為辨明豈不知摯罷相自有所坐乎癸未詔編修神宗皇帝御製御集官中大夫御史中丞鄭雍與升一官太中大夫禮部侍郎彭汝礪支賜絹銀各五十匹兩詔京西南北路提刑司毎嵗将朝廷封樁錢物糧草等依實直紐計共作二十萬貫支下與轉運司應奉陵寢支費有餘許令運司支用今年八月指揮勿行詔賑卹小民為西賊侵掠者此政目二十八日事是日樞宻院奏事已王巖叟言臣昨有短見具陳不知曽經聖覽否臣之區區不為一劉摯蘓轍為陛下惜腹心之人耳腹心之人難得去了一箇沒一箇也宣諭曰劉摯垂簾之初排斥姦邪殊有功朕極重之乃聞其嘗與邢恕通柬及延接章惇子弟靣詰之果如此朝廷所怪責人却潛通消息送好心公等試觀此事可不可也巖叟曰章惇等使劉摯分付右丞相與之亦牢籠不得答曰樞宻所言是也巖叟曰陛下既見得令作宰相亦牢籠不得如何尋常一柬帖可以牢籠又宣諭曰朕亦不深罪摯為摯垂簾之初有功但此等事非所當作耳巖叟曰此則誠是劉摯少思慮韓忠彦亦曰劉摯實少思慮無他意垂簾初誠有功巖叟曰劉摯自小官數年之間陛下㧞擢至宰相劉摯决不肯負陛下答曰固不深罪摯也巖叟曰言事官未必皆忠直臣聞楊畏乃吕恵卿靣上人知彼用意安在但欲去除陛下腹心之人便是與姦邪開道路耳陛下亦覺近日臺諫官太甚否今日兩箇上明日兩箇上太皇太后笑曰今日又兩箇未上也巖叟曰臣等曩時言蔡確章惇亦不曽如此今劉摯有何事乃如此逼逐願陛下更加照察章惇者便以右僕射與之未必喜邵伯温謂此乃宣仁責劉摯語之又王巖叟日録云蔡雍怨毒使劉摯分付右僕射與亦牢籠不得語皆相似兼確已嘗為左僕射不應復云分付與右僕射恐只是指章惇巖叟誤録今改之又恐此語止因巖叟對宣仁云耳非宣仁責摯盖不應數日間君臣並有此等言也今姑兩存之須細考究乃可吕大防等當日奏對必有記文惜未求得也太皇太后所言今日又兩箇未上不知是何人當考甲申巖叟又言臣昨日靣論劉摯等事伏蒙聖恩曲賜矜容愚𠂻感厲誓死不忘然倉卒之間方吐萬一輙敢冒犯天威罄所未盡竊以為天下國家者必藉腹心之臣腹心之臣非一日可得得而用之必加保全勿使讒邪得以離間則忠於事君者知所勸矣腹心之舊尚或不保則後來之人何可倚信况腹心既虛外邪可入廼必然之理也臣之所憂實在于此摯與邢恕通簡及接見章惇子弟盖其思慮不周防閑不嚴之罪也謂牢籠為後日之計則願陛下更加體照摯與蔡確不惟仇怨深切非小小禮數施其黨人可以宛轉收確之心兼臣毎毎見摯感荷寵榮常有以死報國家之意豈復肯負陛下此真陛下腹心之臣也今大姦未死人心危疑朝廷之上與之為敵者摯為首焉一旦以小愆遂将踈棄天下之人不知所以必皆妄意陛下之心有所變易謂反與大姦報仇也前日陛下用摯作宰相姦黨之氣自然消伏今待罪累日羣邪相顧已復増氣蘇轍之進與摯大約相類皆正人之所繫望而姦黨日所忌嫉者也顧其去就豈不重哉今所犯者小而所繫者大幸陛下於輕重之間更賜較量則陛下所得者多矣夫姦謀難防自古公患莫不因人主意有所動急為傾擠陛下於此不可不察竊聞御史楊畏乃吕恵卿門人及受張璪知遇最深舒亶作中丞日舉為臺官前日再除御史公議沸騰交章排斥命遂不行自此憤嫉正人常有報復之志後又因趙君錫無所執持為人所使再三薦引竟除此職諫官虞策亦是張璪面上相知之人嘗受璪特力論薦陛下試将此本末考究還可保其所懐無他意否臣惓惓之心常恐巧言有誤陛下故不避煩凟委曲聞奏願陛下聼言之際加意鑑察使不能以疑似之罪誣䧟善良而隂與姦邪為地則不勝社稷天下之幸且摯轍之留於臣無所利而利在陛下摯轍之去於臣無所害而害貽國家但臣忝聨近輔久荷異恩見聞所及不敢不竭其愚惟陛下貸臣狂直亮臣赤誠特垂采納幸甚貼黄稱舒亶亦王安石恵卿等黨人後以犯入已贓追削坐廢于家時已有詔鏁學士院草麻制罷摯而巖叟未知也邵伯温辨誣云邢恕坐蔡確黨謫永州監酒自京師登船赴貶所劉相初與恕善不知恕之怨怒也向以簡别恕持簡人問監東排岸官茹東濟船所在東濟傾險人也取其簡録本復授之以所録納御史楊畏者頃為鄆州教授嘗考試南京進士劉相時為南京簽判監試見畏愛之畏又因吕相之壻王讜見吕相吕相亦愛之除工部員外郎劉相既作蔡新州事不自安欲并逐吕相及蘇門下獨為復辟事以防後患平日知畏有智数乃諭中丞趙君錫荐畏臺官欲其為用乃下除監察御史畏先出吕相門下又與蘇門下敘鄉人又出劉相門下乃度劉吕二公上眷之厚薄知劉不及吕及知劉相欲用己為復辟事遂論劉相與邢恕通簡其簡辭云永州佳處第往以俟休復畏解休復為復子明辟之復又論劉相嘗館章惇之子於家太皇太后怒劉相反覆責劉相曰聞邢恕赴貶相公曽通簡又館章惇之子於家相公當一心朝廷章惇者雖以右僕射與之未必喜也劉相無以對楊畏與其黨監察御史來之邵攻之不已乃除觀文殿學士知鄆州畏慮右丞梁燾簽書樞宻院王巖叟樞宻都承㫖劉安世侍御史朱光庭救劉相乃上言劉摯有死黨在朝廷後諸公果皆有章太皇太后以畏言先入並罷之按伯温所記或多抵捂今刪取其合者耳劉摯以六年十一月罷梁燾七年六月乃除右丞劉摯罷相朱光庭實為給事中不為侍御史兼來之邵此時亦未入臺皆伯温誤記又稱劉摯欲用楊畏為復辟事亦恐未必然當考熈河蘭岷路經畧使范育言臣竊觀先王禦戎之道來則禦之去則勿追雖號明徳然亦要在以逸待勞以静制動後世兵家取勝之術殆不過此其來吾有以守故能禦其去吾無所争故不追今臣所統蘭州至定西城定西至秦州隆諾特堡三百里之間惟有一城賊寇無所限隔通谷大川可長驅而入前日賊常攻蘭州又攻定西幸其不為深入計頓兵堅城之下故無功而還使其深入将何以禦之今朝廷詔城内彭且勅本路圖上定西以東及納克迷諸堡此功一就或更先據努扎之利則東西三百里之間城障相望屹然有金湯之勢移兵屯聚足以坐制賊衝矣又藉其傍膏腴之地可置弓箭手無慮萬人依山據險悉為崖巉以便耕穫生計財賄嘗置近壘賊小至則就避崖巉大至則入保城郭伺其惰歸乘利邀擊使賊進無所得退有所失彼常勞而動我常佚而静如是而後可來則禦之去則勿追邉兵不頓而坐困羌夷矣仍候諸堡既興少休兵力将一畨兵将分作數畨毎畨不過三五千人屯要便之寨伺賊動息依今降朝㫖為攻擾之策嵗分二畨春秋止三兩月三嵗乃遍兵力不勞邉威常振使賊欲戰則吾兵不出欲休則吾兵倐至昔吳為三師以肄楚曰亟肄以罷之多方以誤之後卒入郢賀若弼建伐陳之䇿曰彼出則歸彼歸則出卒用滅陳伏願朝廷上考合先王來則禦之去則勿追之道次願求以逸待勞以静制動亟肄困賊之䇿行之嵗月彼區區小醜豈能敝國勞人曠日持久與中國抗衡哉将見束手而聼命矣六年七月二十七日王巖叟云范育累疏欲努乘此進巢堡寨照定西而東至隆諾特大城扎九月七日詔諸帥各具方畧牽制策應吕大忠陳三策章楶陳淺攻之計九月二十六日范純粹乞諸路更守迭出十月二十五日詔諸路置横烽又詔宻切經畫葉普十月六日詔諸路出兵為倐往忽歸之計及更出困賊住十月八日詔諸路無得枉役軍馬日十月十二日勒嵗賜分給諸路功賞十月十九詔范育劉舜卿招致星多貝中西十月二十三日朝㫖定西城東至隆諾特中間及定城西至李内彭中間兩下各修置守禦堡寨一坐照䕶小堡子二坐此據范育相度游師雄修築堡寨異同奏状奏状附七年二月二十八日今因取育所陳亟肄困賊之策附六年十月末湏更詳考要見降詔令諸路淺攻果是何時六年九月七日但有牽制策應等語未及淺攻檢照前後盖十月六日乃降淺攻指揮也十月二十五日環慶張存張誠出界又十二月二十七日范純粹云云可考黄李􅌫十朝綱要云是日髙麗遣使黄宗慤來獻帝鍼經
