body:
  text: 續資治通鑑長編巻二百二十五宋李燾撰神宗熙寕四年秋七月乙酉彰化軍留後安定郡王從式為保康節度使從式遷節度使本傳乃闕之舊紀書此新紀不書丙戌禮院言明堂祀昊天上帝英宗皇帝配坐及五方帝皇帝親獻五人帝五官神位差官分獻詔恭依兵部郎中天章閣待制知秦州韓縝落職分司西京初指使三班奉職傅勍夜被酒誤随縝入宅縝令軍校以鐡裹頭杖杖勍脊百餘致死勍妻持血衣撾登聞鼓上訴詔劾之大理寺當縝罪加役流該徳音降徒三年公罪應追官勒停故有是責賜勍家絹百疋御史知雜鄧綰言縝凶恣專殺逞其殘暴而監司不覺舉走馬不即聞乞并責之於是走馬承受西頭供奉官劉用賓坐匿勍妻訴牒降一官内臣劉希奭坐不以實奏贖銅十斤劉摯言王韶為縝聲寃或刪取附此縝十月甲子判銓林希云云今附注此舊紀書韓縝杖部吏死落天章閣待制分司西京新紀不書降環慶路鈐轄文思副使郭忠嗣一官徙永興軍都監坐慶州軍叛忠嗣遣人送家屬徃彭原縣虛散首功帖子朝廷以忠嗣討賊有勞又甞經徳音故止降徙而已戊子層檀國入貢始通也其王名亞芙羅亞眉蘭國城距南海二萬里便風晝夜行百有六十許日經勿廵古林三佛齊乃至廣州傳國五百年十世矣春冬暖貴人以好越布纒頭服花錦白疊布乗象馬官有月奉其法輕罪杖重者死土産稻麥胡羊山羊沙牛水牛駞馬魚犀象薫陸木香血竭没藥硼砂阿魏蘇合油真珠玻璃蔔萄千年棗蜜沙華三酒交易用錢三分其齊金銅相半而銀加一分禁私鑄人語如大食國此據神宗正史一百十八巻増入新紀於年末書層檀入貢舊紀不書秘書丞章惇檢正中書户房公事王安石言惇相度渝州夷事多與轉運司不同可見其不肯詭隨宜擢用上令與外任差遣安石乞用為檢正從之馮京欲須惇到取㫖上曰便與之不須惇到也尋又加集賢校理加集校乃此月十五日今并書檢正中書五房公事同判司農寺曽布言臣伏見言事官屡以近日所議差役新法不便論議紛紜上煩聖聽臣承司農之乏而又備官屬於中書凡御史之言臣所預見考其所陳皆失利害之實非今日所以更張之意雖陛下睿智聰明洞照其説然流聞四方使任事者選懦觀望不敢營職而懐貮沮善之人將因此洶洶轉相倡和以疑天下之人矣在臣之職固不敢畏避彊禦俛黙而不言也竊以朝廷議更差役之法志於便民故雖遣使四方詢訪利害而曠月彌年未有成法可以施之天下者以謂民事之重經畫之際不敢不謹也惟畿甸之事至近而易講而所遣之官其論説措置利害明白多可行者及其成書則付之司農使共開封府提㸃司集議已又牓之諸縣凡民所未便皆得自陳此可謂詳且盡矣臣觀言者之言皆臣所未喻豈蔽於理而未之思乎抑其中有所徇而其言不能無偏乎臣請一二陳之畿内上等人户盡罷昔日衙前之役故今之所輸錢其費十減四五中等人户舊充弓手手力承符户長之類今使上等及坊郭寺觀單丁官户皆出錢以助之故其費十減六七下等人户盡除前日冗役而專充壮丁且不輸一錢故其費十減八九言者則或以謂朝廷受聚斂之謗或以謂凌虐赤子此臣所未喻也田里之人困於徭役使子弟習於游惰罹於刑罰至於追呼勞擾賄賂誅求無有紀極今輸錢免役使之安生樂業通略云不知有前日之患乃所以勸其趨南畆也言者則以謂起庸錢則人無悦為農者小則去為客户商賈大則去為盜賊此臣所未喻也上户所減之費少中下户所減之費多言者則以謂上户以為幸下户以為不幸此臣所未喻也天下州縣户口多少徭役疎數所在各異雖一鄉村差役輕重亦有不同者然昔日第一等則槩充中等之役雖貧富相遼不能易也今量其物力使等第輸錢逐等之中又别為三等或五等其為均平齊一無以過此言者則以謂斂錢用等則非法所能齊所在各自為法二三紛錯無所總統此臣所未喻也昔之簿書等第不均不足慿用故欲分命使者察諸縣使加刋正庶品量升降皆得其平言者則以謂舊等不可信今之品量何以得其無失如此則是天下之政無可為者此臣所未喻也提舉司昨以諸縣等第不實故首立品量升降之法方司農開封集議之時葢不知已甞増減舊數然編勑三年一造簿書所以升降等第今之品量増減亦未為過又况方曉示人户事有未便皆與改正則今之増減亦未施行言者則以謂品量立等者葢欲多斂雇錢升補上等以足配錢之數至於祥符等縣以上等人户數多減充下等乃獨掩而不言此臣所未喻也凡州縣之役無不可募人之理今投名衙前半天下未嘗不主管倉庫場務綱運官物而承符手力之類舊法皆許雇人行之乆矣惟耆長壯丁以今所措置最為輕役故但輪差鄉户不復募人言者則以謂專副雇人則失陷官物耆長雇人則盜賊難止又以謂近邉姦細之人應募則焚燒倉庫或把守城門此臣所未喻也役錢之輸見錢與納斛斗皆取民便為法如此亦已周矣言者則以為納見錢則絲綿粟麥必賤以物代錢則有退揀乞索之害如此則當如何而可此臣所未喻也昔之徭役皆百姓所為雖凶荒饑饉未嘗罷役今役錢必欲稍有羨餘迺所以備凶年為朝廷推恩蠲減之計其餘又專以興田利増吏禄言者則以謂助錢非如賦税有倚閣減放之期臣不知衙前弓手手力承符之類亦嘗倚閣減放否此臣所未喻也朝廷詔令與司農奏請未嘗不戒天下官吏以躬親詢訪田里之人務使人户今日輸錢輕於昔時應役則為良法固無毫髪掊斂之意如兩浙一路户二百四十餘萬率錢七十萬緡而已畿内十六萬而率錢亦十六萬緡是兩浙所輸葢半於畿内言者則以謂吏縁法意廣收大計然畿内募役之餘亦無幾矣兩浙欲以羨餘徼幸司農欲以出剰為功此臣所未喻也賈蕃為縣令固當奉行條詔差役之事有未便於民法許其自陳乃不肯受使趨京師諠譁詞訴其意必有謂也誠令無所用心亦可謂不職矣蕃之不職不法其狀甚衆如團定保甲作差官體量一縣之中所行皆不如當時之法又有篤疾貧民應對無禮既違法使之贖銅又非理拷掠枷錮其子四日而死至於借貸官錢沽買村酒殘民犯法誰敢爾者提㸃司見其有顯過因徃治之而又庫錢數少酒課額虧鈎考其由皆得其狀迺編敇所謂因事彰露或雖已去官法所當劾者言者則或以謂二府所選必非不才或以謂蕃雖有贓私乞一切不問此臣尤所未喻也大約御史之言葢多此類如蕃之不恤民不畏法可謂明矣迺以謂趙子幾務力行司農之政不復顧陛下之法與陛下之民夫司農之政乃陛下之政司農與子幾職當奉行而已使子幾能力行陛下之政豈不善哉乃欲捨蕃而治子幾此尤可怪也至於差役之法昨看詳奏請出牓施行皆開封府與司農被㫖集議此天下所知借使法有未善而言者深論司農未嘗以一言及開封又以謂司農自知所行於理未安若關與京尹或致争執有礙施行所以公然不顧不報開封府夫所行之法迺京尹韓維等之所共議借使未嘗共議今所出牓凡於民未便聴經所屬官司開封府乃所屬官司可以受其辭訴而不可以争執乎開封府於民事何所不預民有所訴斥而不受此乃御史之所當言而言未嘗及也自非内懐邪詖之情有所向背則不當至此曽布集乃削此以上四十八字若此之類皆有文可考有迹可求而誕謾欺罔曽不畏忌况於是非晻昩難明之際哉陛下方有大有為之心固将舉直錯諸枉以示天下而左右耳目之士以利為害以直為曲以是為非以有為無臣恐有傷陛下之明而害陛下之政也御史有言責者也臣有官守者也御史之所論臣之官守也御史以言責言臣以官守言此臣之區區所以事陛下之義不敢不盡也願陛下以臣所言宣示中外使有識之士參考其是非令臣言有涉誣罔則誅夷竄逐臣所甘心陛下之法亦不可貸如言不妄則陛下亦當察其情偽而以大公至正之道處之則天下之幸也王安石以布所言進呈上問如何安石曰欲劄與繪摯令繪摯分析馮京王珪以為不當使分析京又言繪摯近日别無文字上曰令分析方是朝廷行遣京珪曰恐復紛紛不安上曰待分析到更相度因言繪作富弼辭乃更稱譽弼殊不體朝廷意安石曰姤后以施命告四方上下相遇以命而已見大哉王言乃所以知一哉王心今天下所以未肯一心趨上所為者以好惡是非不著於天下故也為天下要知事本孔子曰名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足然則民無所措手足其本在於名不正孟子曰楊墨之道不息孔子之道不著邪説誣民充塞仁義仁義充塞則率獸食人人将相食然則人将相食其本在楊墨之道不息今朝廷異論類皆懐姦其實豈止於楊墨之道不息而已以邪為正以正為邪其為名不正甚矣則其患至於人無所措手足人相食無足怪也如晋之亂外國據中國自生民已來未有如此其亂本乃在王衍之徒託清淨無為之説以濟其茍簡貪慢之私而已遂以布所言劄與繪摯令分析以聞辛夘河決大名府第五埽王安石五年正月二十三日日録云四年七月八日河決今以為據特附此舊紀亦書辛夘河決北京第五埽新紀但書河決北京河渠志云七月北京新堤第四第五埽決漂溺館陶永濟清陽以北遣張茂則程昉相視修塞八月丁巳丙寅癸酉并月末又十月末又五年三月丙午九月己酉並合參照司馬光日記云去歲新堤第四埽先決頃之第五埽又決第四埽水更㣲程昉於嫩灘水上疊塞四水口自知不測未幾咽凌水盛第四水口復決昉憂懼而卒張保孫殿丞云天章閣待制孫固兼侍讀罷知審刑院王安石言固留滯審刑文案乞罷之授以他職司勲員外即權判大理寺崔台符權知審刑院太常少卿知夀州許遵權判大理寺日録有孫固靣乞少府監及劉摯論固留身事當考賞渝州討夷賊有功将校供備庫使唐詢等轉官減磨勘年有差壬辰權䕫州路轉運使屯田即中孫桷為司封即中直昭文館落權字權䕫州路轉運判官屯田即中張詵為司封郎中直集賢院權轉運副使孫桷傳云桷喜功名見事風生建南平軍復扶歡榮懿二寨邉事自此始朱史削去要合存之姑附此司馬光日記云䕫路有保塞民扞禦蠻㓂其酋領得理詞訟擅決罸由是大富州縣提轉侵漁不已其酋不堪命遂㓂略居民轉運使張詵等發兵討擊誅殺甚衆鄧綰上言生蠻所以不能為蜀患者以此民為之藩鄣今詵等多殺不辜以自為功異日蠻必為患詵嘗事介甫於常州善遇之乃命章惇徃體量惇還言其酋縱横日乆或刳孕婦或探人心而食之誅之甚當於是二漕皆遷官加職趙全云知開封府劉庠乞罷勾當右廂公事官不許初韓維奏著作佐郎蔡確為勾當右廂公事及庠代維以故事責確廷參確謂藩鎮辟召掾屬乃有廷參禮今輦轂下比肩事主雖故事不可用庠不能屈因奏京師多豪右廂官體輕人不畏或縁而寛縱有罪且政出多門非所以肅清浩穰之術昔趙廣漢嘗患三輔難治欲兼之況廂事之末乎請罷確等確方主王安石故上意不直庠尋改確為三班院主簿庠相繼補外確晋江人嘗為邠州司理參軍轉運使始至按其贓罪及見確姿状秀偉召與語竒之更加延譽韓絳宣撫陕西確為人造樂語絳喜其文又薦於朝維所以辟確亦由絳薦也御史中丞楊繪嘗言臣伏見開封自來大小鬬辨公事只委知府一面斷決如事合勾追或理須證對者則推判官以下同劾其罪自置都廂後來杖六十以下並委斷罪臣細詳訪之皆不便也何者政出於一則靜而肅政分而三則紛而不齊有罪一般而兩廂斷放各異者加之都廂之官權雖欲重而望猶輕人不厭伏又欲抗勢於府庭至有觧府胥而欲為都廂胥者辭府公吏而求為都廂公吏者又且一面勾追理索旁午閭里矣風聞頗有重罪而啟倖胥吏只從杖六十已下斷放者都廂官員只據其自通之罪亦不覺察昔趙廣漢有願得并治之言信有之矣伏乞特賜指揮應係京城公事並須送府其都廂官止令㸃檢廂中寄禁并到處檢驗并詣地頭定奪公事或檢校財産繪言不得其時按蔡確事則繪言葢不報也甲午詔兩浙水災州軍令轉運提㸃刑獄提舉常平司與州縣當職官吏多方賑䘏新舊紀並附年末乙未録延州振武副都頭崔達子遇為三班奉職賜其家絹百匹初達為西賊所執驅之至婁城堡下令呼城中曰撫寕堡已破可趣降達偽許之而反其辭遂被害邉吏以聞故追録之丙申詔自今召試知制誥三道各限一百五十字以上成如係正言已上即守本官已下並除右正言丁酉兵部郎中集賢校理直舍人院王益柔刑部郎中秘閣校理同修起居注陳襄兵部員外郎集賢校理直舍人院同修起居注陳繹太子中允集賢校理直舍人院曽布並知制誥布仍改右正言上初欲用張琥及襄繹益柔王安石言琥不如布上曰布誠宣力多遂用布更以琥修起居注楊繪劉摯之論助役也安石使琥為文詰繪摯琥辭不為布自請為之琥由是忤安石意故不得知制誥安石又言襄憸邪必不能助宣徳化不宜使在内且已嘗辭知制誥今復辭則虧人臣體安石去年九月已有劄子論襄上曰何以處之安石請除待制都轉運使上曰知制誥亦不妨作都轉運使也尋以韓維在告又詔襄及益柔並直學士院此據御集在七月十九日司馬光云琥由此忤安石意頃之坐事落修注非也葢不知制誥止得修注耳落修注又坐别事吕陶記聞云熙寜初曽魯公與余言近日婦人冠子太小近乎服妖葢小官在上之䜟時多除京官為提舉刑漕之職魯公故及之後有中允通直為待制三司正言承議為翰林八座者以此推之天下葢豈偶然哉按陶所云合修入但須詳考因曽布以中允除知制誥改右正言姑附見中允即通直正言即承議御史中丞楊繪具論前後論助役法四奏以自辨且曰臣之情狀已具四奏惟曽布稱言者深論司農寺未嘗以一言及開封又云自非内懐邪詖之情有所向背則不當若此又云誕謾欺罔曽不畏忌此數言者臣不可不辨臣所論超升等第不便者據百姓論訴爾其論訴者止東明等數縣百姓而已祥符縣百姓未嘗論訴豈得加誣臣以為獨掩而不言乎大凡省寺出牓於外縣者未有不先牒本州照㑹昨司農寺出牓外縣升等第事不曽牒開封府照㑹此臣所以奏彈也今曽布既稱曽與京尹韓維共議又云借使未嘗共議只此兩句則已矛盾也又云民有所訴斥而不受此迺御史之當言而言亦未嘗及者已於劄子内言開封府不肯接狀却稱不曽受得朝㫖及司農寺關報百姓既無所訴乃是臣嘗言及也豈為言亦未嘗及乎其如民所論訴者止是超升等第此專是司農寺為首豈可捨而究其他乎夫編勑三年一造簿書升降等第者乃自實産從下而定之先據人户始立等第之數昨司農寺皆於元申等第之外須得要申多少數户臣所論已具今曽布自以為亦未為非又云實未施行且未行而言之宜也豈有既出牓於縣而云未施行御史不得言之理豈有不依元申等第而硬指揮升上户數而云亦未為非之理夫朝廷立法未行而臣沗御史中丞先述其便而後以未便事理論奏欲有裨於聖政今曽布乃以邪詖向背誕謾欺罔不顧陛下之法與陛下之民為言臣内省一心事主未嘗有所向背實非邪詖誕謾欺罔不顧陛下之法與陛下之民者伏乞詳臣四奏問曽布背誰向誰何事欺罔又曽布每於臣劄子中絶去前後文只摘取一句以牽就其説乃曽布挟與王安石是親之勢公然不顧朝廷綱紀欲障蔽陛下言路之意可見矣又言助役之法國家方議立千萬年永制臣非以為無利也臣既先陳其利矣次又陳難行五説求去其害以成其利然則臣陳之為難者欲議其所以易之也謂之為害者欲議所以利之也夫一人之智不足以周天下之利害必集衆人之智然後可以盡其利今陛下專任王安石安石專委曽布布又剛愎如此而欲建千萬歲永制其得盡乎又言臣竊以曽布近日有文字稱臣邪詖欺罔誕謾向背事今日曽布試知制誥臣若言之必謂臣報其言以復私怨雖然以此之嫌而不言之是乃臣之自私也若然則他日設有姦人偶知欲將進用隂料言事官必有彈劾已者則先以事中傷之使其自避嫌而不敢言無乃姦者之巧得其便乎臣不敢顧私嫌而公言之惟明主擇焉也夫陳繹王益柔皆累任轉運使陳襄歴知雜御史修起居注資則深矣勘㑹曽布熙寕二年九月二十一日自海州懐仁縣令轉著作佐郎閏十一月十六日差看詳衙司條例熙寜三年四月五日差編敕刪定官八月二十四日差編修中書條例九月六日授太子中允崇政殿説書九月八日差權同判司農寺九月十四日授集賢校理九月二十三日差檢正中書户房公事十月四日差看詳編修中書條例熙寕四年二月五日差直舍人院二月八日檢正中書五房公事五月三日差詳定編敕七月十三日試知制誥從選人至知制誥止一年十箇月舊官太子中允班在尚藥奉御之下新官知制誥班在觀察使待制之上可謂不次矣夫賢能不待次而舉王者之善政也臣竊見曽布之賢能未顯著於天下天下之人止知其縁王安石姻家而進昔崔祐甫多用親故而稱允當今親故則用矣而允當之論猶未該浹也以臣愚而觀之曽布專完助役文字前者以臣所言利害事加之以邪詖欺罔一切拒之斯乃自用自專之人也安有賢者而好自用哉安有能者而好自專哉唐李徳裕有言辨邪正專委任而後朝廷治夫正人既呼小人為邪小人亦謂正人為邪何以辨之請借物為喻松栢之為木孤生勁特無所因倚蘿蔦則不然弱不能立必附他木故正人一心事君無待於助邪人必更為黨以相蔽欺君人者以是辨之則無惑矣臣既已被曽布指為邪詖欺罔誕謾向背矣布既以邪詖指臣則必以正直自處也布既以有所向背指臣則必以勁特自處也凡邪正之不可以並立如薫蕕之不可以同噐也今若邪詖之人而使處中執法之地與正直並立豈可謂邪正之辨乎若陛下謂臣為實有邪詖欺罔誕謾向背之狀即乞罷臣御史中丞仍不當尚留侍從宜從逺貶以清朝列御史劉摰又言臣近曽上言論助役之法其害有十今奉聖㫖批送曽布劄子條件詰難令臣分析者竊以助役歛錢之法有大臣主之於中書有大臣之親中書之屬官及御史知雜者講畫於司農寺有大臣所選擇所謂能者為監司提舉官行之於諸路上下布置其勢若此可謂易行矣然曠日彌年未有定論可以為法者其故何也不順乎民心而已矣民之所不欲古今未有可以勢強而成者也故雖命使者奔馳道路禀之於内而刼之於外然其擬議參差條制殊異紛然日下不知其可行之計則此法利害明若觀火矣臣有言責者也是故前日采中外士民之説敷告於陛下今司農為熒惑之辯如此陛下以臣言為是耶則事盡於前奏可以覆視陛下以臣言為非耶則貶黜之而已雖復使臣言之亦不過所謂十害者是以不復條陳不惟費辭文過煩紊天聽而風憲之官豈與有司較是非勝負交口相直如市人之詬競者則無乃辱陛下耳目之任哉謂臣等險詖欺罔則上有陛下之聰察而下有中丞之公議所謂中有向背則臣所向者公所背者私所向者義所背者利所向者君父所背者權臣今方辨助役之利害而無故立向背之論以朋黨之意教誘天下此可駭也所謂曽無畏忌則陛下之法臣所畏也陛下容受忠直臣為御史實不敢隱情自為已諱今司農欲使臣畏忌權臣則誠臣之所不能者也伏望陛下將臣前後所論助役章奏與司農之言宣示二府大臣中外百官以考是非若臣言有所取則乞速罷助役以安天下之心若稍有欺罔則乞重行竄逐以謝專權之人而戒妄言者摯又言臣竊以耳目之於人也事物過者必見聞以赴其心而心必受之未有不信其耳目而反以其能視聽為疑者先王以言置官代天子耳目内外相信無以異於一體之相為用也其言雖直必容雖多必受則國家安治不然則反此故謗木諌鼓不設危亂之國鼎鑊斧鑕不在聖明之朝恭以陛下躬上聖之徳好問樂善凡延見臣下雖賤官小吏必温恭和容以訪逮之此堯舜之盛也然至於臣等以職事為言則使之分析者中外皆知非陛下意乃司農挟寵以䕶改作大臣設法以蔽聰明爾因事獻忠敢一言之今天下之勢陛下以謂安耶未安耶治耶未治耶茍以為未安未治也則以陛下之睿智言動起居躬蹈徳禮夙夜勵精以親庶政而天下未至於安治者將誰致之耶陛下即位以來注意責成倚以望太平而自以太平為己任得君專政者是也二三年間閭閻動揺舉天地之内無一民一物得安其所者葢自青苖之議起而天下始有聚歛之疑青苖之議未允而均輸之法行均輸之法方擾而邉鄙之謀動邉鄙之禍未艾而漳河之役作漳河之害未平而助役之事興其間又求水利也則民勞而無功又淤田也則費大而不效又省併州縣也則諸路莫不強民以應令又起東西府也則大困財力禁門之側斧斤不絶者將一年而未已其議財也則商估市井屠販之人皆召而登政事堂其征利也則下至於厯日而官自鬻之推此而徃不可究言古之賢人事君行道必馴致之有漸持乆而後成至於設施皆有次序今數十百事交舉並作欲以歲月變化天下使者旁午牽合於州縣小人挟附佐佑於中外至於輕用名噐混淆賢否忠厚老成者擯之為無能侠少儇辯者取之為可用守道憂國者謂之流俗敗常鑿民者謂之通變能附己者不次而進之曰吾方擢才不可招者為名而斥之曰吾方行法凡政府謀議所以措置經畫除用進退獨與一屬掾曽布者論定然後落筆同列預聞乃在布後故奔走乞丐者布門如市雖然猶有繫國家之體而大於此者祖宗累朝之舊臣則鐫劾鄙棄去者殆盡國家百年之成法則剗除廢革存者無幾陛下豈不怪天下所謂賢士大夫比歲相引而去者凡幾人矣陛下亦嘗察此乎去舊臣則勢位無有軋已者而權可保也去異已者則凡要路皆可以用門下之人也去舊法則曰今所以制馭天下者是已之所為而陛下必將乆任以聽其伸縮也嗟夫此事之實也其名則曰革敝而興治是以陛下樂聞其名而難察其實也夫賞罰號令乃陛下所以砥礪天下而鼓動四方以為勸沮者今有人焉能舞公事以傾勲舊起大獄以逐官吏其事是耶乃其職爾何至超任以為職司耶趙濟是也又有人焉以渭源田欺罔始既以此得罪而終復以此増秩王韶是也程昉事漳水以興大役困一方而無成功趙子幾挟情以違法禁按吏以防民言則皆置而不問乃是賞反施於聖人之所當罰罰不及於王法之所當誅也畿邑之民以助錢為訴也陛下聖㫖令召情願東明知縣以不能禁民有訴而被劾也陛下聖㫖止令劾擅升户等之事二者皆獨斷之善政而中書皆格而不下此則陛下之號令不行也西師無功而曰非朝廷之本謀天下但見給軍之費輦出於京師空名之誥馳下於西路又命一知制誥於將幕使專代天子之言報覆號令絡驛於道茍以為非耶何不正之迨其事敗則曰非政府謀也捐費緡錢以千萬計秦晋之人肝腦塗地産軍旅之怨結外國之釁而不自請咎乃致陛下發中詔以責躬抑徽號而不受忠義之士誰不痛心而疾首至如助役之法臣嘗言之矣其條制纎悉臣雖未能究見然臣大意終以謂使天下百姓賦税貸責公私息利之外無故作法升進户等使之槩出緡錢皆非為人父母愛養基本之所宜為者故臣謂之聚斂非妄言也陛下任遇輔臣如此其重而致主之術乃用此道是皆大臣之誤陛下而大臣所用者誤大臣也今既顛謬乖錯敗亂綱紀知天下之不容懼宸𠂻之回悟以謂雖中外之士畏避無敢言者然其尚敢言者獨御史有職爾故又使司農熒惑天聽作為偏辭令臣等分析以摧沮風憲之體艱梗言路欲其憂憚茍容而緘黙或欲沮其危言從而擠逐不知忠臣節士雖戮辱不懼所以盡事君之義耳今𦍑人之欵未入反側之兵未安三邉瘡痍疲潰未瘳河北大旱諸路大水民困財力縣官匱竭聖君恭勤思治萬方之所知而在輔弼者方欲蔽天聰明使下情不得而上達其何心耶臣願陛下思祖宗基業之艱難念天下生靈之危苦少回幾慮收還威柄深恐異時專權肆志將有陛下所不能堪者則必至於虧失君臣之恩是今日養之適所以害之也若夫馮京王珪同列預政皆依違自固不扶顛危雖心知其非而無所捄正己之進退又媕婀而不決皆非所為輔臣之體臣在四海之内孤立獨進陛下過聽任以風憲嘗竊思之近歲臺諌官疊以言事罷免豈其言皆無補於事歟豈皆願為訐激險直之語以自為名而㓗去歟嘗以謂欲言政府之事者其譬如治湍暴之水可以循理而漸導之不可以隄防激鬬而發其怒不惟難成亦為患滋大故臣自就職以來竊慕君子之中道欲其言直而不違於理辭順而不屈於志庶幾愚𠂻少悟天聽而亦不敢悻然如淺丈夫以一言一事輕決去就致聖朝數數逐去言事者而無所裨補思以上全國體而下亦庶幾能乆其職業而成功名兩月之間纔十餘䟽其言及助法者止三䟽耳當天下多事之時而臣言簡緩又不足以感悟則其負陛下已多矣不意大臣之怒已至如此令臣等分析之事前代無之祖宗無之近年以來乃為此法以摧言者之氣方陛下孜孜聽治喜於納諌而大臣所為則不得正目而視此所以發臣之狂而不能黙也伏願陛下深察事物之變用安靖之治以休生民有所措置以大小緩急為先後之序以義利經權為本末之辨自兹凡有獻替於陛下者乞誘掖奨勵之罷分析之命以尊嚴朝廷而養多士敢言之氣臣不勝憤懣愛君待罪之至奏至王安石曰繪所奏前後反覆今並不分析布所言子幾與蕃事又摯所云臣所向者公所背者私不知子幾何以為私蕃何以為公且繪云當忠以報國雖為臣引用不敢以私害公王安石言楊繪稱雖為臣引用不敢以私害公今繪奏並無此等語當考繪為中丞在四月癸酉凡人之情為人所知縱不能私宜以平遇之如繪所言專為不平此必有所懐也繪知開封府元同議後來不受百姓訴狀違法何故不論開封之罪此其不平可見上曰張琥以為繪罪輕於摯摯言尤無狀安石曰摯妄作愚而易見繪狡詐難知如言為臣所引用然不敢以私害公此所謂壬人雖堯舜所當畏難陛下不可不察臣向論繪燭理不明不可為中丞此言必漏臣度繪當縁此為憾邪人交鬬但能壊朝廷事於臣私計亦何所預臣若計身私利害即雖不才豈不能合流俗以自固若以義為事則有去就而已小人消長非臣所敢知也上曰如何措置安石曰此在陛下上曰令繪出翰林又少人降一官令歸院如何安石曰欲令出即差官直院可也於是詔繪落翰林學士御史中丞為翰林侍讀學士摯落館閣校勘監察御史裏行監衡州鹽倉後兩日以繪知鄭州神宗史食貨志云初繪除中丞安石以為繪不燭理不可為中丞然卒除繪已而執政馮京漏安石語以激怒繪縁此為憾故毁役法以自立異非詳究法之利害本末也志葢因安石日録今不取舊紀書翰林學士楊繪論免役法失實罷御史中丞降為侍讀學士知鄭州新紀不書司馬光日記繪改知鄭州仍押出門䕫州轉運司言招出夷賊王衮取李光吉梁承秀及衮三族之地賦民得租三萬五千四百八十五石綿絲一萬六千五百一十五兩絹二十七匹銀二百三十一兩半詔改賓化寨為隆化縣授衮下班殿侍三班差使監揚州税朱史以隆化縣并正月失事之序今依墨史己亥看詳編修中書條例所狀今先看詳到合減省改更事件如審刑院進呈公事已得聖㫖若無合覆奏事令更不入狀止進草降敕下合屬去處諸路轉運使副或差兩員並不帯同字提㸃刑獄亦如之應差臣僚權管勾閑慢司局及寺監欲止降劄子京朝官乞假遷𦵏除通判已上差遣仍舊外其餘並依選人申轉運司如無規避即給假訖奏不須聽候朝㫖常參官如因疾患請假兩日已上令御史䑓直牒内侍省醫官院差内臣醫官看騐諸州軍差管内僧道正自今勿復以聞候及七年合賜紫衣師號即具保明申奏其御史臺逐季繳連本臺五十三處供申職掌人數進奏院月奏具有無出閉罪人狀並寢罷從之朱本云上以朝廷所省閱多有司之細故而大臣不得講明政事之大者以為事可歸有司者歸之而中書責其當否則有司盡力而事治故命條例司討論去其繁冗自是事歸有司者寖多而中書之務清矣新本并看詳條例所狀皆削去恐失事實依時政記所書復存之庚子禮院言禮諸侯不得祖天子公廟不設於私家今宗室有祖宗神御非所以明尊卑崇正統也謂宜一切廢罷以合禮意從之仍遣内侍迎奉祖宗神御于天章閣先是魯王韓王魏王申王楚王五宫院皆有神御大宗正司奏請供奉香燭知大宗正丞事李徳芻以為非禮請下禮官議乃詔禮官議如徳芻請而降是詔徳芻淑子也舊紀載此事新紀不載辛丑詔案察之司採訪所部官屬罪犯不得出牓召人告論其犯私罪杖以下離任無得案發景祐四年七月十二日有不得出牓指揮當考殿中丞監察御史裏行唐淑問權知真州又改知復州淑問前坐擊滕甫出通判復州遭父䘮既除服王安石欲與監司上曰淑問意見何如肯盡力否且令知府界縣安石曰淑問帯臺職難與縣上曰淑問才通判資序與縣何傷安石請試以劇郡上從之尋命淑問權發遣提㸃荆湖北路刑獄除憲在十月壬子朔今第書初湖南改湖北壬寅詔知制誥王益柔陳襄兼直學士院候除學士罷直時學士韓維在告闕官宿直故有是詔此據御集増入十四日王安石欲除襄都運可考甲辰上批黄河決水入御河北行未止其令入内副都知張茂則乘驛當職官吏相度以聞七月八日可考徙知太原府觀文殿學士吕公弼知鄭州公弼以疾自請也新知鄭州翰林侍讀學士楊繪知亳州翰林學士元絳權知開封府天章閣待制權知開封府劉庠為龍圖閣直學士知太原府罷校勘觀文殿書籍又罷供奉官至殿直日赴垂拱殿起居惟朔望及遼使見辭綴班于紫宸殿下校勘觀文殿書當檢事始司馬光日記云七月二十三日有㫖自今供奉官以下皆免常朝祖宗時供奉官等皆取將帥子弟為之天子擇其才者使將命四方有能辦事則稍加進㧞故曰奉朝請侍廷中謂之使臣自後得之者寖多及今近八千人任使不復如徃時而朝請如故貧者或徒步泥中至禁門賃公服鞾笏而入富者以錢賂閤門不來亦不問其徒甚以為患故免之閤門言乞選承制以下至殿直六人前後殿逐日祗應以閤門看班祗候為名候及五年詳熟與除閤門祗候詔三班院選仕族子弟供奉官以下殿直以上年四十以下無私罪使臣十二人赴樞密院選六人為之丙午詔諸班直長行嘗備宿衛自今病滿百日可醫治者殿前指揮使補外處牢城指揮使其餘並與捧日天武第五軍押營元給料錢三千者與五百二千以下者與三百先是諸班直假滿百日步軍司並配充剰貟有丐食於道者上憫之而有是詔丁未天章閣待制孫固提舉在京諸司庫務檢正中書户房公事章惇與固兼詳定編修三司令式及諸司庫務歲計條例王安石言薛向不樂修令式上曰向先進呈明堂賞給云恐諸軍以修令式疑有裁減所以先進呈欲宣布令諸軍知安石曰此意可見其不樂也上曰向所為亦不免姑息詔唐鄧州界荒田他路流民請射者宜令所屬速給付無致失所戊申屯田員外郎權發遣鹽鐡判官吳審禮權發遣開封府界諸縣鎮公事上欲别用人王安石言趙子幾勁鋭審禮寛和可以相濟也馮京曰審禮安得寛和上從安石言吳審禮興國軍人哲宗舊録元祐四年八月有傳新録削去審禮為荆湖南路提舉常平先是朝廷推行青苖免役以為民利而將命者轉與郡縣造作浮議以務沮抑其奉使也宣布詔令如所素行者人亦不待寕而逺近皆知上之徳意志慮移之他部推其所為如初故民皆安堵毋擾俄遷三司鹽鐡判官提㸃開封府界諸縣鎮兼常平事畿内牧地乆為民患乃以地予得租十萬緡有竒賞太僕芻秣又詔詳定河南北監牧請惟留沙苑餘悉罷去地亦予民得租百萬緡可市西北善馬數萬匹常言帝畿千里有終日行不見桑柘處民不知蠺非所以美俗請教以樹藝責縣勸率之不一年所租以億萬計上可其奏後下其法諸部熙寜中置諸路保甲治平義勇之法不一年上御崇政殿觀閱射馭精練不減禁旅審禮與執事官俱立庭下上顧召責以始終成就河北洊飢羣小嘯聚至數千軰詔徃綏輯乃除權𤼵遣河北西路轉運副使至則諭郡縣振廪以慰窮乏凡五百萬誅首惡數十人而已置衛州黎陽錢監歲鑄三十萬訖罷使河北經用饒裕河北為一路復除轉運副使已而為江淮荆浙等路制置鹽礬兼發運副使入見獲疾得請提㸃洪州玉隆觀此舊録審禮傳可見審禮之為人也新録削去亦無辨誣葢審禮以朝請大夫知南康軍卒自不應立傳也傳在元祐四年八月二十六日紀事本末王荆公當國欲以朱柬之監左藏庫柬之辭曰左帑有火禁而年髙宿直非便聞欲除其人幹當進奏院忘其人名實願易之荆公許諾翊日於上前進某人監左藏庫上曰不用朱柬之監左藏庫何也荆公震駭莫測其由上之機神臨下多知外事雖纎㣲莫可隱也侍御史知雜事鄧綰言本臺推直官宋飛卿孫奕皆前御史中丞吕公著所舉臺主簿趙仝亦薛昌朝謝景温薦引各懐所知意趣乖異欲乞别選推直官二員主簿一員詔宋飛卿孫奕趙仝並送審官東院其御史臺推直官主簿令不依名次選人宋飛卿趙仝未詳孫奕已見三年七月陳瓘云云可檢附庚戌詔入内内侍省都知押班請假並依見謝辭例辛亥詔國子監直講有闕於兩制臺閣所舉五路學官内選差又詔邠州駐泊都監洛苑使李克忠追兩官勒停經恩未得叙用坐取本轄蕃官所奪西賊甲不還其直經徳音當原而提㸃刑獄司言恐後無以激勸屬羌立功特責之六月十一日克忠候奏到取㫖詔檢正中書户房公事章惇徃邠州制勘知州張靖本州觀察推官權管勾經略司機宜文字王撝等又詔惇體量所過陕西州縣推行雇役新法及民間利害以聞初宣撫司押送刺配慶州叛軍家屬而撝輙増入宣撫司劄子内字誤刺配十五人為靖所奏故遣惇劾之其後案至不悉如靖奏詔靖與别路知州差遣撝等該赦釋之明年正月二十七日靖移陕州朱史於二月四日書此按御集差惇制勘邠州乃是七月二十七日後空日又實録八月一日詔惇體量陕西新法利害與御集合朱史誤也惇以三月二日方受命經制渝州夷人疆土此時安得却徃邠州朱史誤明甚今依御集附七月末仍取日録六月二十五日所録靖撝等事略加刪修要未詳盡也當考惇體量利害今并書之司馬光日記云慶卒之變密劄下經略司應捉殺到叛卒妻子並配諸州為奴婢經略司謄下邠州牒漏捉殺到三字知邠州張靖以為招降者妻子豈可亦從孥戮再申經略司經略司令主者陳首下州改正靖因奏其状而不言已改正介甫以鹽法事惡靖以為傾險欲直除水部員外分司當事請先案實乃命章惇制勘謝景温以文書證明靖由是得免趙仝云詔頒陕西四路防秋之筞涇原路賊若㓂原州靖安綏寕則原州兵不出以萬人守平安按南路趨渭州以鎮戎軍將兵弓箭手由乾興徑入靖安斷賊歸路賊若㓂鎮戎軍即以萬人并本將軍馬駐本軍以弓箭手五千人為遊兵别以五千人守瓦亭更移静邉寨所駐正兵弓箭手取三川路合勢賊若㓂徳順軍即别以萬人屯守静邉兼以弓箭手五千人為遊兵逐便擾擊移瓦亭五千人入本軍賊若自武延易臧川而來即移静邉兵駐隆徳扼賊歸路鎮戎軍第四將及弓箭手由得勝路㑹合於諸城寨只留守兵不責以戰渭州只以將兼義勇防守其餘兵並屯瓦亭以固根柢左右相援合勢掩殺環慶路賊若㓂東北兩路並以正兵萬人屯業樂扼淮安東西谷柔逺大順之㑹賊若自華池川路深入則移業樂兵於大順荔原兩路斷其歸路慶州别出兵至合水與荔原大順兵相首尾賊若㓂環州即移業樂之兵截山徑路趨馬嶺更相度事勢進兵入水波與環州相望據諸寨中又可扼奔衝慶州大路其沿邉城寨只留守兵不責以戰自餘軍馬並屯慶州以固根柢秦鳳路若賊㓂東西路於甘谷城屯正兵五千帖以蕃漢弓箭手守古渭青雞三陽一帯道路别以正兵五千帖本處蕃兵弓箭手守古渭更益都廵檢軍馬及三千據通渭與日谷古渭相望若約此置兵保䕶熟户更相首尾足以枝梧其諸城寨只留守兵不責以戰自餘軍馬並屯秦州以固根柢鄜延路若賊㓂東路宜於永平駐兵萬人帖以本處蕃漢弓箭手以扼綏徳黑水綏平懐寜順安青澗之㑹亦斷青化豐林趨延州大路又恐自永平東循大川至青澗城南出延州則青澗亦駐兵三千若賊㓂北路由渾州塞門川而下則永平更不消駐兵只以萬人駐金明縣扼園林安寨龍安招安故塞門安逺之㑹斷延州大路保安順寜路窄難出大兵只以三千守軍帖以蕃兵弓箭手足以扼賊賊㓂西路只以三千人守徳靖兼以蕃兵保䕶胡李一族則金明不消人馬可即赴萬安為保安徳靖聲援或西北兩路併而來則金明兵不動别以五千人守萬安掎賊之後其沿邉城寨並只留守兵不責以戰自餘軍馬並屯延州以固根柢此據㑹要乃四年七月事不得其日今附月末同修起居注同知諫院張琥言修起居注之職古之左右史也本以記録人主言動書之典冊以示至公本朝止令後殿侍立人主言動無復與聞臣今所領修起居注兼知諌院即與其餘修注官事體不同既有言職且得侍立或有敷奏便可靣陳竊見樞密承㫖每於侍立處尚得論事亦不先行奏請欲乞每因後殿侍立許奏事更不移牒閤門仍乞今後起居注常令諫官一員兼領所貴左右史之職稍不曠廢詔諫官兼修起居注者後殿侍立亦許奏事更不牒閤門令於樞密院承㫖司奏事後内侍省公事前奏禀此據㑹要増入元豐缺年八月丙午不兼諫職亦許直前是月廢竇州為信宜縣𨽻髙州合州赤水縣為鎮舊紀但書廢竇州是月手詔㨂諸路兵半分年四十五以下勝甲者并為大分五十以上願為民者聽之舊制兵至六十一始免猶不即許也至是免為民者甚衆此據本志四年十月事今附月末
