body:
  text: 續資治通鑑長編卷一百九十六宋李燾撰仁宗嘉祐七年春正月己酉朔大慶殿受朝乙卯文思使帶御器械李繼和為內侍押班兩省都知押班并選年五十以上及有邊功者參用去年繼和當次補而年四十九至是始命之御史中丞王疇等言聞糾察在京刑獄司嘗奏府司及兩軍巡皆省府所屬其録大辟之翻異者請下御史臺竊惟府縣之政各存官司臺局所領自有故事若每因一囚翻異即用御史推劾是風憲之職下與府司軍巡共治京獄也恐不可遽行從之劉敞嘗建言乞别差官劾兩軍巡大辟翻異者王疇所爭或由此敞奏已附四年七月末壬戍御宣德門觀燈顧從臣曰此因嵗時與萬姓同樂爾非朕獨肆游觀也先是諫官楊畋司馬光等以去年水災乞罷上元觀燈故特宣諭之乙亥詔太常禮院自今南郊以太祖皇帝定配改溫成皇后廟為祠殿嵗時令宫臣以常饌致祭初諫官楊畋上言洪範五行傳曰簡宗廟則水不潤下又曰聽之不聰厥罰常水去年夏秋之交久雨傷稼澶州河決東南數路大水為灾陛下臨御以來容受直諫非聽之不聰也以孝事親非簡於宗廟也然而灾異數見臣愚殆以為萬幾之聽必有失於當者七廟之享必有失於順者惟陛下精思而矯正之於是詔太常禮院檢詳郊廟未順之事乃言按孝經曰郊祀后稷以配天春秋曰自外至者無主不止然則天地之理必有所配者皆侑神作主之意也且祖一而已始受命也宗無豫數待有德也自宗而下功德顯著自可崇廟祏之制百世不遷垂之無窮至於對越天地則神無二主所以奉上帝之尊示不敢瀆唐垂拱中始用三祖同配至開元十一年眀堂親享遂罷之皇祐五年詔書今南郊且奉三聖並侑後復迭配如舊禮未幾復降詔三聖並侑為定制雖出孝思然其事頗違經禮又溫成皇后立廟城南四時祭奠以待制舍人攝事玉帛祼獻登歌設樂並同太廟之禮蓋當時有司失於講求昔髙宗遭變飭已思咎祖已訓以祀無豐於昵而况以嬖寵列於秩禮非所以享天心奉祖宗之意也復下兩制議而翰林學士王圭等議曰追尊尊以享帝義之至推親親以享親仁之極尊尊不可以瀆故郊無二主親親不可以僣故廟止其先今三后並侑欲以致孝也而適所以瀆乎享帝後宫有廟欲以廣恩也而適所以瀆享親請如禮官所議故降是詔二月辛巳按正月自己酉朔至辛巳已三十三日則此當書二月原本脫誤知蘄州屯田員外郎張田提舉荆湖南路刑獄諫官司馬光再疏言田傾邪險薄不可任以監司尋改知湖州初江湖漕鹽既雜惡又官估髙故百姓利食私鹽而並海民以魚鹽為業用工省而得利厚由是盜販者衆又販者皆不逞無賴捕之急則起為盜賊而江淮間雖衣冠士人狃於厚利或以販鹽為事江西則䖍州地連廣南而福建之汀州亦與䖍接鹽既弗善汀故不産鹽二州民多盜販廣南鹽以射利每嵗秋冬田事既畢往往數十百為羣持甲兵旗鼓往來䖍汀漳湖循海惠廣八州之地所至劫人榖帛掠人婦女與巡捕吏卒鬬格至殺傷吏卒則起為盜依阻險要捕不能得或赦其罪招之嵗月浸淫滋多而䖍州官糴鹽嵗才及百斤朝廷以為患自慶厯中廣東轉運使李敷王繇請運廣州鹽於南雄州以給䖍吉敷等即運四百餘萬斤于南雄州而江南轉運使初以為非便不往取其後户部判官周湛等八人復請運廣鹽入䖍州江西亦請自具本錢取之皇祐五年始詔屯田員外郎施元長乘驛㑹江西廣東轉運司議利害至和初元長與轉運使閻詞元絳皆請如湛等議而發運使許元以為不可三司是元言遂止嘉祐中知連州曾奉先請商人販廣南鹽入䖍汀州所過州縣收其算知汀州林東喬請放䖍汀漳循梅潮惠七州鹽通商通判真州阮士龍請毋運嶺外鹽入炭州第嵗運淮南鹽七百萬斤至䖍二萬斤至汀便民間足鹽冦盜自息虞部員外郎朱泌請令䖍州增散蠶鹽錢知潮州吕璹知梅州王叔亦皆論其利害或者又請官自置鋪役兵卒運廣南福建鹽至䖍州或請𣙜䖍州官鹽價以平其直論者不一朝廷嘗遣職方員外郎黃炳乘驛㑹所屬監司及知州軍通判議於是炳等合議以謂䖍州食淮南鹽已久不可改第損近嵗所增官估斤為錢四十以十縣五等户夏稅率百錢令糴鹽二斤隨夏稅入錢償官繼命提㸃鑄錢沈扶覆視可否扶及江西福建廣東轉運司䖍州官吏又請選江西漕船團為十綱以三班使臣部之直取通泰楚都倉鹽既又命比部員外郎曾楷詣廣南與監司復議通廣南鹽而轉運判官陳從請益即惠循梅潮置五都倉貯鹽令䖍州募鹽鋪户入錢二州趣五倉受鹽還三州貿易所謂變私鹽為官鹽易盜賊為商旅朝廷難之卒用炳扶等䇿然嵗才增糶六十餘萬斤先是屯田員外郎蔡挺知南安軍常條奏利害至是擢挺權提㸃江西刑獄使之制置挺令民首納私藏兵械以給巡捕吏卒令販黃魚龍披鹽不及二十斤徒不及五人不以甲兵自隨者止輸算勿捕淮南既團新綱漕鹽挺增為十二綱綱二十五艘鎖袱至州乃發輸官有餘則以畀漕舟吏卒官復以半賈取之由是減侵盜之弊鹽遂差善又損糶價嵗課視舊額增至三百餘萬斤乃罷扶等所率糴鹽異時汀州人欲販鹽輒先伐鼓山谷中召願從者與期日率常得數百人已上與俱行至州縣督責耆保有伐鼓者輒捕送盜販者稍稍畏縮朝廷以挺為能留之江西積數年乃徙久之江西鹽皆團綱運致如䖍州焉挺以二月辛巳權江西憲九月丙寅落權字治平元年四月庚寅理轉運使資序二年三月丙寅改陜西運副熙寧三年七月張頡論蔡挺措置視此略不同今兩存之鹽按宋史載二月己卯朔更江西法與此不合癸卯詔兖國公主入內安州觀察使駙馬都尉李瑋知衛州瑋所生母楊氏歸其兄璋公主乳母韓氏出居外公主宅勾當內臣梁懷吉歸前省諸色祗應人皆散遣之瑋貌陋性朴公主常傭奴視之韓氏復相離間公主嘗與懷吉飲楊氏窺之公主怒毆楊氏夜開禁門訴於帝所言者皆咎公主懷吉等既坐責公主恚懟欲自盡或縱火欲焚第以邀上必召懷吉等還上不得已亦為召之諫官楊畋司馬光龔鼎臣等皆力諫上弗聽光又言太宗時姚坦為兖王翊善有過必諫左右教王詐疾踰月太宗召王乳母入問起居狀乳母曰王無疾以姚坦故鬱鬱成疾爾太宗怒曰王年少不知為此汝輩教之杖乳母數十召坦慰勉之齊國獻穆大長公主太宗之子真宗之妹陛下之姑而謙恭率禮天下稱其賢願陛下教子以太宗為法公主事夫以獻穆為法然公主意終惡瑋不肯復入中間狀若狂易欲自盡者數矣苗賢妃與俞充儀謀使內臣王務滋管勾駙馬宅以伺瑋過瑋素謹務滋不得其過乃告苗俞曰但得上㫖務滋請以巵酒了之苗俞白上上不答頃之上與皇后同坐俞又白之皇后曰陛下念章懿皇后故瑋得尚主今奈何欲為此都知任守忠在旁曰皇后言是也務滋謀訖不行尋有是命此據司馬氏記聞及奏議懷吉先配西京灑掃班在五年十月庚申其復召不得時月權陜西轉運副使薛向言陜西之兵廂禁軍凡二十五萬其間老弱病患伎巧占破數乃過半請下諸路揀其不任征役者汰之敢占伎巧者論如法從之學士院言臣僚上表并劄子陳請事唯宰臣親王樞密使方降手詔手書自𠫭知政事樞密副使已下即無體例去年三月因樞密副使陳旭請郡內批令降不允手詔當直學士胡宿論奏以手詔體重乞依故事不從竊恐成例隳廢舊典乞自今除宰臣親王樞密使有所陳請依例或降手詔手書自餘臣僚更不降手詔手書許從本院執奏從之此據㑹要增入上以手詔召旭事見去年四月庚辰三月辛亥按據宋史本紀辛亥當系於三月此本蓋有脫誤今增入詔禮部貢舉壬子兖國公主降封沂國公主安州觀察使李瑋為建州觀察使落駙馬都尉自公主入禁中瑋兄璋上言瑋愚騃不足以承天恩乞賜離絶上將許之司馬光又言陛下始者追念章懿太后故使瑋尚主欲以申固姻戚常貴其家今瑋母子離析家事流落大小憂愁殆不聊生豈陛下初意㦲近者章懿太后忌日陛下閲奩中故物思平生居處獨能無雨露之戚悽愴之心乎瑋既䝉斥公主亦不得無罪上感悟遂并責公主待李氏恩禮不衰且賜瑋黃金二百兩謂曰凡人富貴亦不必為主壻也此亦據司馬光記聞癸丑大宗正司言右屯衛大將軍嶽州團練使宗實乞還泰州防禦使知宗正寺告𠡠不許乙卯禮部侍郎參知政事孫抃為觀文殿學士兼翰林侍讀學士同羣牧制置使抃居兩府年益頽惰無所可否又善忘語言舉止多可笑好事者至傳以為口實性不便騎馬或驚雖通逵必下而趨時樞密使張忭請老朝論以抃當次補必不勝任殿中侍御史韓縝因進見極言抃不才雖無顯過保身持祿實懷姦之大者乞置諸散地監察御史裏行傅堯俞亦言抃望實俱輕徒以髙科久居清列荐更二府積有嵗時當萬幾之繁無一毫之助昏塞之語日以流聞傳笑士民取輕鄰敵每進趨軒陛百寮具瞻勞力之臣為之解體宜賜罷免少抑貪幸後數日輔臣朝退韓琦曾公亮獨留抃下殿謂歐陽修曰丞相留身何也修曰得非奏君耶抃曰抃有何事修曰韓御史言君君不知耶抃乃頓足摘耳曰殊不知也遂移疾求免上許之樞密副使禮部侍郎趙槩為𠫭知政事翰林學士右司郎中知制誥權知開封府吳奎為右諫議大夫樞密副使丙辰召右正言知蔡州王陶赴諫院供職陶言臣與唐介范師道吕誨趙抃同出為郡今獨召臣與師道非是請還介等職任時師道亦自福州召為鹽鐡副使誨抃及介皆未遷故也丁巳詔審刑院奏補京朝官初該磨勘者自今須有舉主一員方聼改官庚申龍圖閣直學士左司郎中兼侍講錢象先為右諫議大夫知蔡州象先善講說語約而義眀上間有所顧問必依經以對因諷諭政事遂及時務有唘迪之益號知經術留侍經筵前後十五年時被恩禮故事講官分日迭講象先已得請補外上曰大夫行有日可獨徹所講秩於是同列罷講者十日刑部郎中天章閣侍講崇文院檢討吕公著為天章閣待制兼侍講公著初召試中書將除知制誥三辭不就故有是命辛酉參知政事歐陽修提舉三館祕閣寫校書籍壬申徐州言彭城縣白鶴鄉地生麵凡十餘頃民皆取食上遣內侍竇承秀往視之占曰地生麵民將饑也既而濠州亦言鍾離縣地生麵民取食之丁亥按三月已有辛亥此不應復有丁亥必有錯誤作凝機殿于禁中夏四月按四月下脫去干支查宋史頒編勑係壬午日宰臣韓琦等上所修嘉祐編敇起慶厯四年盡嘉祐三年凡十二卷其元降敕但行約束而不立刑名者又析為續附令帙凡五卷視慶厯𠡠大辟增六流減五十徒增六十有一杖增七十三笞增三十有八配𨽻增三十大辟而下奏裁聽㫖增四十五云壬申按宋史五月係丁未朔壬申距丁未三十六日不應在四月也此處亦誤改命起居舍人知制誥兼侍講司馬光為天章閣待制先是光與吕公著並召試中書光已試而公著終辭及降知制誥光乃自言拙於文辭本當辭召初疑朝廷不許故黽勉從命繼聞公著終辭得請臣始悔恨向者之不辭而妄意朝廷決不許也章九上卒改他官己丑夏國王諒祚上表求太宗御製詩草𨽻書石本欲建書閣寶藏之且進馬五十匹求九經唐史冊府元龜及本朝正至朝賀儀詔賜九經還其馬諒祚又求尚主詔答以昔嘗賜姓不許五月丁未朔命起居舍人天章閣待制兼侍講司馬光仍知諫院光上疏曰臣以駑蹇之質再為諫官荷陛下寵祿之優責任之重夙夜震恐不遑寧處思極竭愚忠以報塞萬一顧瑣瑣細務皆不足以煩瀆聖聽竊以國家之治亂本於禮而風俗之善惡繫於習赤子之啼無有五方其聲一也及其長則言語不通飲食不同有至死莫能相為者是無他焉所習異也至於古今亦然有服古之衣冠於今之世則駭於州里矣服今之衣冠於古之世則僇於有司矣衣冠焉有是非㦲習與不習而已矣夫民朝夕見之其心安焉以為天下之事正應如此一旦驅之使去此就彼則無不憂疑而莫肯從矣昔秦廢井田而民愁怨王莽復井田而民亦愁怨趙武靈王變國服效異俗而羣下不悅後魏孝文帝變國俗效華服而羣下亦不悅由此觀之世俗之情安於所習駭所未見固其常也是故上行下效謂之風薰蒸漸漬謂之化淪胥委靡謂之流衆心安定謂之俗及夫風化已失流俗已成則雖有辨智弗能諭也彊毅不能制也重賞不能勸也嚴刑不能止也自非聖人得位而臨之積百年之功莫之能變也周易履之象曰君子以辨上下定民志故天子之令必行于庶人使天下之勢如身之使臂臂之使指莫不率從詩曰勉勉我王綱紀四方此禮之本也昔三代之王皆習民以禮故子孫數百年享天之祿及其衰也雖以晉楚齊秦之强不敢暴蔑王室豈有力不足㦲知天下之不已與也於是乎翼戴王命以威懷諸侯而諸侯莫敢不從所以然者猶有先王之遺風餘俗未絶於民故也其後日以衰薄下陵上替晉平公之世魯子服回如晉還謂季孫意如曰晉之公室將遂卑矣六卿强而傲將因是以習習實為常能無卑乎其後趙魏韓氏卒分晉國習於君臣之分不眀故也降及漢氏雖不能若三代之盛王然猶尊君卑臣敦尚名節以行義取士以儒術化民是以王莽之亂民思劉氏而卒復之赤眉雖羣盜猶立宗室以從民望王郎矯託名氏而燕趙響應董卓之亂袁紹以誅卓為名而州郡雲合曹操挾獻帝以令諸侯而天下莫能與之敵操之心豈不欲廢漢而自立㦲然沒身不敢為者畏天下之人疾之也自魏晉以降人主始貴通才而賤守節人臣始尚浮華而薄儒術以先王之禮為糟粕而不行以純固之士為鄙朴而不用於是風俗日壞入於偷薄叛君不以為耻犯上不以為非惟利是從不顧名節至於有唐之衰麾下之士有屠逐元帥者朝廷不能討因而撫之拔於行伍授以旄鉞其始也取偷安一時而已及其久也則衆庶習於聞見以為事理當然不為非禮不為無義是以在上者惴惴焉畏其下在下者暌暌焉伺其上平居則酒肉金帛甘言屈體以相媚悅得間則銛鋒利刃狼心詭計以相屠膾成者為賢敗者為愚不復論尊卑之序是非之理陵夷至於五代天下蕩然莫知禮義為何物矣是以世祚不永逺者十餘年近者四五年敗亡相屬生民塗炭及大宋受命太祖太宗知天下之禍生於無禮也於是以神武聰眀躬勤萬幾征伐刑賞斷於聖志然後人主之勢重而羣臣懾服矣於是剪削藩鎮齊以法度擇文吏為之佐以奪其殺生之柄攬其金榖之富選其麾下精鋭之士聚諸京師以備宿衛制其腹心落其爪牙使不得陸梁然後天子諸侯之分眀而悖亂之原塞矣於是節度使之權歸於州鎮員之權歸於縣又分天下為十餘路各置轉運使以察州縣百吏之臧否復漢部刺史之職使朝廷之令必行於轉運使轉運使之令必行於州州之令必行於縣縣之令必行於吏民然後上下之叙正而紀綱立矣於是申眀軍法使自押官以上各有階級以相臨統小有違犯罪皆殊死然後行伍之政肅而士用命矣此皆禮之大節也故能四征不庭莫不率服泛掃九州以陟禹之迹至于真宗重之以眀德繼二聖之志夙夜孜孜宣布善化銷鑠惡俗以至於今治平百年頑民殄絶衆心咸安此乃曠世難成之業陛下當戰戰栗栗守而勿失者也臣竊見陛下有中宗之嚴恭文王之小心而小大之政多謙讓不決委之臣下誠所委之人常得忠賢則可矣萬一有姦邪在焉豈不危甚矣㦲古人所謂委任而貴成功者擇人而授之職業叢脞之務不身親之也至於爵祿廢置殺生豫奪不由已出不可也洪範曰惟辟作威惟辟作福臣之有作威作福害于而家凶于而國威福之柄失於人而習以為常則不可復收矣此眀主之所謹也又頃以西鄙用兵權置經略安撫使一路之兵得以便宜從事及西事已平因而不廢其河東一路總二十二州軍嚮時節度使之權不能及矣唐始置沿邊八節度亦如是而已以其權任太重故後世有跋扈之臣洛誥曰毋若火始焰焰厥攸灼叙弗其絶言謹其微也又將相大臣典諸州者多以貴倨自恃轉運使欲振舉職業往往故違戾而不肯從夫將相大臣在朝廷之時則轉運使名位固相逺矣及在外為知州則轉運使統諸州職也焉得以一身之貴庇一州之事轉運使不得問㦲漢刺史以六百石吏督察二千石豈以名位之貴賤㦲又自景祐以來國家怠於久安樂因循而務省事執事之臣頗行姑息之政於是胥吏歡譁而斥逐御史中丞軍官悖慢而廢退宰相衛士凶逆其獄不窮姦澤加於舊軍人罵三司使而法官以為非犯階級疑於用法朝廷雖特誅其人而已停之卒復收養之其餘有一夫流言於道路而為之變令推恩者多矣凡此數者殆非所以習民於上下之分也夫朝廷者四方之表儀也朝廷之政如是則四方必有甚矣於是元帥畏偏禆偏禆畏將校將校畏士卒姦邪怯懦之臣至有簡省教閲使之驕惰保庇羸老使之繁冗屈撓正法使之縱恣詆訾粟帛使之憤惋甘言諂笑靡所不至於是士卒翕然譽之而歸怨於上矣彼既為之則此效之下既言之則上從之前既行之則後襲之茍彼為而此不效下言而上不從前行而後不襲則怨怒聚于其身而禍亂生矣長此不已日滋月益民之耳目習而安之此有以異唐之季世乎後魏孝眀帝時征西將軍張彛子仲瑀上封事欲抑損武人不預清品羽林虎賁千餘人焚彛第殺彛父子官為收捕凶强者八人斬之其餘大赦以安之懷朔鎮人髙歡時奉使至洛陽見之歸而散家財以結客曰朝政如此事可知矣於是始有飛揚之志由是觀之紀綱不立則姦雄生心矣夫祖宗苦身焦思以變衰唐之俗而陛下髙拱熟視以成後魏之風此臣之所為陛下痛惜也臣愚以為陛下當奮剛健之志宣神眀之德凡群臣奏事皆察其邪正辨其臧否熟問深思求合于道然後賞罰黜陟斷而行之則天下孰不曠然悅喜詩曰君子如怒亂庶遄沮君子如祉亂庶遄已蓋言無所臧否之為患大也經略安撫使有征討之事則置之無事則當廢之儻未能廢則軍事迫急不暇奏知者使専之可也其餘民事皆委之州縣一斷於法或法重情輕情重法輕可殺可徒可宥可赦並聽本州申奏決之朝廷何必出於經略安撫使㦲轉運使規畫號令行下諸州違戾不從者朝廷當辨其曲直若事理實可施行而州將恃貴勢故違之者當罪州將勿罪轉運使將校士卒之於州縣及所統之官或公卿大臣有悖慢無禮者眀著階級之法使斷者不疑將帥之官廢法違道以取悅于下歸怨于上者當隨其輕重誅竄廢黜公正無私御衆嚴整者當量其才能擢用褒賞如是則上之人難動而下用命矣上之人難動而下用命此所以尊朝廷也上下已眀綱紀已定然後修儒術隆教化進敦篤退浮華使禮義興行風俗純美則國家萬世無疆之休猶倚南山坐平原也又上疏論財利曰古之王者藏之于民降而不能乃藏于倉廪府庫故上不足則取之于下下不足則資之於上此上下所以相保也今民既困矣而倉廪府庫又虛陛下儻不深以為憂而早為之謀臣恐國家異日之患不在於他在于財力屈竭而已矣今朝廷不循其本而投其末措置寬恤民力之官分命使者旁午四出爭言便宜以變更舊制米鹽靡密之事皆非朝廷所當預者張設科條不可數紀或不如其舊益為民患或朝三暮四移左於右其間果能利民者不過放散縣官之物以豫民爾是誠損上益下王者之仁政也然臣聞古之聖王養之有道用之有節上有餘財然後推以豫民是以上下交足而頌聲作矣今入者日寡出者日滋是所謂厭其原開其瀆其竭可立而待也公家既竭不取諸民將焉取之是徒有利民之名而無利民之實果何益哉夫寬恤民力在於擇人不在立法若守令得人則民力雖欲毋寬其可得乎守令非其人而徒立苛法適所以擾民爾自置此官以來於今纍年臣訪之民間未聞其困敝小瘳於前也然則為今之術奈何曰在隨材用人而久任之在養其本原而徐取之在減損浮冗而省用之何謂隨材用人而久任之夫人之材性各有所宜雖周孔之材不能遍為人之所為况其下乎固當就其所長而用之今朝廷用人則不然顧其出身資序何如爾不復問其材之所堪也故在兩禁則欲其為嚴助司馬相如任將帥則欲其為衛青霍去病典郡則欲其為龔遂黃霸尹京邑則欲其為張敞趙廣漢司財利則欲其為孔僅桑𢎞羊世豈有如此人哉故財用之所以匱乏者由朝廷不擇専曉錢榖之人為之故也國初三司使或以諸衛將軍諸司使為之判官則朝士曉錢榖者皆得為之不必用文辭之士也先朝以數路用人文辭之士置之館閣曉錢榖者為三司判官曉刑獄者為開封府推判官三者職業不同趣舍各異莫相涉也然後人主以時引對訪問以察之使令以試之積久以觀之核其真僞辨其臧否考其功效然後進之退之未必歷其職者皆須進用不可復退也故羣臣各宣其用而萬事交舉矣夫官久於其業而後眀功久於其事而後成是以古者世官相承以為氏姓先朝陳恕領三司十餘年至今稱能治財賦者以恕為首恕之材智豈異於人哉蓋得久從事於其職故也至於副使判官堪其事者亦未數易也是以先帝屢行大禮東封西祀廣修宫觀而財用有餘者用人専而任之久故也近嵗三司使副使判官大率用文辭之士為之以為進用之資塗不復問其習與不習於錢榖也彼文辭之士習錢榖者固有之矣然不能専也於是乎有以簿書為煩而不省以錢榖為鄙而不問者矣又居官者出入遷徙有如郵舍或未能盡識吏人之面知職業之所主已捨去矣臣頃者判度支勾院甫三年爾自三司使下至檢法官改易皆遍甚者或更歷數人雖有恪勤之人夙夜盡心以治其職人情稍通綱紀粗立則捨之而去後來者意見各殊則嚮之為一皆廢壞况怠惰之人因循茍且惟思便身不顧公家者如此而望太倉有紅腐之粟水衡有貫朽之錢臣未知其可也凡有司官莫不欲久於其任而食貨為甚何則二十七年耕然後有九年之食今居官者不滿三嵗安得有二十七年之效乎臣愚以為朝廷宜精選朝士之曉練錢榖者不問其始所以進或進士或諸科或門䕃先使之治錢榖小事有功則使之權發遣三司判官事及三年而察之實效顯著然後得權三司判官事又三年更有實效然後得為正三司判官其無實效者皆退歸常調勿復收用其諸路轉運使不復以路分相壓使之久於其任有實效者或自權為正自轉運副使為轉運使無實效者亦退歸常調勿復收用每三司副使闕則選三司判官及諸路轉運使功效尤著者以補之三司使闕亦選於副司以補之三司使久於其任能使用度豐衍公私富實者增其秩使與兩府同而勿改其職如此則異日財用之豐耗不離於巳不得諉之他人必務為永久之規矣其文辭之士則自有資塗不必使為錢榖之吏以輕之也何謂養其本原而徐取之善治財者養其所自來而取其所有餘故用之不竭而上下交足也不善治財者反此夫農工商賈者財之所自來也農盡力則田善收而榖有餘矣工盡巧則器斯堅而用有餘矣商賈流通則有無交而貨有餘矣彼有餘而我取之雖多不病矣今之有司自謂能治財者臣見之矣凍餒其民而豐積聚者也掃土以市祿位而不恤後人者也捃拾麻麥而喪邱山者也保惜一錢而費萬金者也不操白刃而為冦攘者也姦巧簿書而罔君上者也必曰養其所自來而收其所有餘則聞者以為笑矣夫使稼穡者饒樂而游惰者困苦則農盡力矣堅好便用者獲利浮僞侵靡者不售則工盡巧矣公家之利捨其細而取其大散諸近而收諸逺則商賈流通矣農工商賈皆樂其業而安其富則公家何求而不獲乎夫農天下之首務也古人之所重而今之所輕豈獨輕之又困苦莫先焉何以言之彼農者苦身勞力衣粗食糲官之百賦出焉百役歸焉嵗豐賤貿其榖以應官私之求嵗凶則流離凍餒先衆人填溝壑如此而望浮食之民轉而緣南畝難矣彼直生而不知市井之樂爾茍或知之則去而不返矣故以今天下之民度之農者不過二三而浮食者常七八矣欲倉廪之實其可得乎臣愚以為凡農民租稅之外宜無有所預衙前當募人為之以優重相補不足則以坊郭上户為之彼坊郭之民部送綱運典領倉庫不費二三而農民常費八九何則儇利戅愚之性不同故也其餘輕役則以農民為之嵗豐則官為平糴使榖有所歸嵗凶則先案籍以贍農民而後及浮食者民有能自耕種積榖多者不籍以為家資之數如此則榖重而農勸矣彼百工者以時俗為心者也時俗貴用物而賤浮僞則百工變而從之矣時俗者以在上之人為心者也在上好朴素而惡淫侈則時俗變而從之矣其百工在官者亦當擇人而監之工緻為上華靡為下物勒工名謹考其良楛而誅賞之取其用不取其數則器用無不精矣彼商賈者志於利而已矣今縣官數以一切之計變法更令棄信而奪之彼無利則棄業而從他縣官安能止之㦲是以茶鹽棄捐征稅耗損凡以此也然則縣官之利何得㦲善治財者不然將取之必豫之將斂之必散之故日計之不足而嵗計之有餘此乃白圭猗頓之所知豈國家選賢擇能以治財其用智顧不如白圭猗頓邪患在國家任之不久責近效而遺逺謀故也夫伐薪者剖其條枚養其本根則薪不絶矣若并根本而伐之其得薪豈不多哉後無繼矣是非難知之道也然則有司不為者彼其心曰吾居官不日而遷不立效於目前以自顯顧養財以遺後之人使為功吾何賴焉是非特有司之罪也亦朝廷用人之法驅之使然也何謂減損浮冗而省用之吾太祖初得天下之時止有一百一十一州爾江南兩浙西川富饒之土皆為異域又承五代荒亂之餘府庫空竭豪傑棊布於海內敵騎窺覦於邊境戎車嵗駕四方多虞當是之時內給百官外奉軍旅誅除僣僞賞賜巨萬未嘗聞財用不足如今日之汲汲也陛下承祖宗之業奄有四百餘州天下一統降王欵塞富饒之土貢賦相屬承平積久百姓阜安是宜財用羡溢百倍於前奈何竭府庫之所蓄罄率土之所有當天下無事之時遑遑焉專救經費而不足萬有不可期之災患將何以待之乎夫以國初之狹隘艱難財用宜不足而有餘今日之廣大安寧財用宜有餘而不足陛下亦嘗熟思其所以然之理乎得非太祖所養者皆有功有用之人陛下所養者未必盡有功用乎竊見陛下天性恭儉不好侈靡宫室苑囿皆因祖宗之舊無所更造或隳頓荒翳不加修治飲膳衣服器皿帷帳適足供用不極精華或苦惡弊綻亦不更易雖唐虞之土階三尺茅茨不剪殆無以過然左右侍御之人宗戚貴臣之家第宅園囿服食器用窮天下之珍怪極一時之鮮眀惟意所欲無復分限以豪華相尚以儉朴相訾惡常而好新月異而嵗殊是以費用不足則求請無厭丐貸不耻甚者或依憑詔令以發府庫之財假託供奉以靡縣官之物真僞莫辨多少不㑹陛下廣度寬仁不欲拒塞惡聞人過不加案詰至於頒賜外廷之臣亦皆踰溢常數不循舊規如嚮者皇女初生所散包子之類費用不可勝紀臣嘗聞耆舊之人言先朝公主在宫中俸錢不過月五千其餘後宫月給大抵倣此非時不當輕有賜豫賜豫亦不甚豐竊聞近日俸給賜豫比於先朝何啻數十倍矣漢眀帝曰我子豈宜與先帝子等乎夫等猶不可又况過之是以祖宗之積窮于賜豫困於浮費臣不能知其詳以外望度之什耗七八矣內藏已虛而浸淫於左藏矣夫府庫者聚天下之財以為民也非以奉一人之私也祖宗所為置內藏者以備饑饉兵革非常之費非以供陛下奉養賜豫之具也今內藏庫專以內臣掌之不領于三司其出納之多少積蓄之虛實簿書之是非有司莫得而知也若皆以奉養賜豫而盡之一旦有饑饉兵革之事三司經費自不能周內藏又無所仰斂之於民則民已困竭得無狼狽而不支乎此臣夙夜所凛凛也今陛下所以有唐虞之德而無唐虞之治者其失在於不忍而好豫不忍則不誅有罪好豫則不待有功不誅有罪則姦邪欺罔而不忌不待有功則貪佞徼幸而無厭治道之所以不格於上下者凡以此也昔韓昭侯有敝袴命藏之侍者曰君亦不仁矣不賜左右而藏之昭侯曰吾聞眀主愛一嚬一笑嚬有為嚬笑有為笑今袴豈特嚬笑哉吾必待有功者彼小國諸侯猶能重賞如是而國以富强况以四海之主不行無功徼幸之賞杜塞甘言卑辭之請則唐虞之治何逺之有哉夫府庫金帛皆生民之膏血州縣之吏鞭撻其丁壯凍餒其老弱銖銖寸寸而聚之今以富大之州終嵗之積輸之京師適足以供陛下一朝恩澤之賜貴臣一日燕飲之費陛下何獨不忍於目前之羣臣而忍於天下之百姓乎夫以陛下恭儉之德擬於唐虞而百姓窮困之弊均於秦漢秦漢竭天下之力以奉一身陛下竭天下之力以資衆人其用心雖殊其病民一也此臣之所以尤戚戚者也又宫掖者風俗之原也貴近者衆庶之法也故宫掖之所尚則外必為之貴近之所好則下必效之自然之勢也是以內自京師士大夫外及逺方之人下及軍中士伍畎畝農民其服食器用此於數十年之前皆華靡而不實矣嚮之所有今人見之皆以為鄙陋而笑之矣夫天地之産有常而人數日繁耕者寖寡而游手日衆嗜欲無極而風俗日奢欲財力之無屈得乎㦲又府史胥徒之屬居無廪祿進無榮望皆以啖民為生者也上自公府省寺諸路監司州縣鄉村倉場庫務之吏詞訟追呼租稅繇役出納㑹計凡有毫釐之事關其手者非賂遺則不行是以百姓破家壞産者非縣官賦役獨能使之然也大半盡於吏家矣此民之所以重困者也又國家比來政令寬弛百職隳廢在上者簡倨而不加省察在下者侵盜而恣為姦利是以每有營造貿賣其所費財物什倍於前而所收功利曽不一二此國用之所以尤不足者也又自古百官皆有常員而國家磨勘之法滿嵗則遷日滋月溢無復限極是以一官至數百人則俸祿有增而無損矣又近嵗養兵務多不務精夫兵多而不精則力用寡而衣糧費衣糧費則府庫耗府庫耗則賜賚稀是以不足者豈惟民哉兵亦貧矣䇿之失者無甚於此也凡此數者皆所以竭民財者也陛下安得熟視而無所變更邪臣愚伏願陛下觀今日之弊思將來之患深自抑損先由近始凡宗室外戚後宫內臣以至外廷之臣俸給賜豫皆循祖宗舊規勿復得援用近嵗僥幸之例其踰越常分妄有干求者一皆塞絶分毫不許若祈請不已者宜嚴加懲譴以警其餘凡文思院後苑作所為竒巧珍玩之物不急而無用者一皆罷省內自妃嬪外自宗戚臣庶之家敢以奢麗之物夸眩相髙及貢獻賂遺以求悅媚者亦眀治其罪而焚毁其物於四逹之衢專用朴素以率先天下矯正風俗然後登用廉良誅退貪殘保佑公直銷除姦蠧澄清庶官選練戰士不祿無功不食無用如此行之久而不懈臣見御府之財將朽蠧而無所容貯太倉之粟將彌漫而不可蓋藏農夫棄糧於畎畝商賈讓財於道路矣孰與今日汲汲以應目前之求凛凛以憂將來之困乎夫食貨者天下之急務今窮乏如是而宰相不以為憂意者以為非己之職故也臣願復置總計使之官使宰相領之凡天下之金帛錢榖𨽻於三司如內藏奉宸庫之類總計使皆統之小事則官長專逹大事則謀於總計使而後行之嵗終則上其出入之數於總計使量入以為出若入寡而出多則總計使察其所以然之理求其費用之可省者以奏而省之必使嵗餘三分之一以為儲蓄備禦不虞凡三司使副使判官轉運使及掌內藏奉宸等庫之官皆委總計使察其能否考其功狀以奏而誅賞之若總計使久試無效則乞陛下罷退其人更置之議者必以為宰相論道經邦燮理隂陽不當領錢榖之職是皆愚人不知治體者之言昔舜舉八愷使主后土奏庶艱食貿遷有無地平天成九功惟叙周禮冢宰以九職九賦九式九貢之法治財用唐制以宰相領鹽鐡度支户部國初亦以宰相都提三司水陸發運等使是則錢榖自古及今皆宰相之職也今譯經潤文猶以宰相領之豈有食貨國之大政而謂之非宰相之事乎必若府庫空竭閭閻愁困四方之民流轉死亡而曰我能論道經邦燮理隂陽非愚臣之所知也治平元年十二月更定三司判官久任法或因光此疏也己酉龍圖閣直學士吏部員外郎兼侍講知諫院楊畋卒贈右諫議大夫畋素謹畏每奏事必發封數四而後上之及卒家無餘資特賜黃金二百兩及端午賜講讀官御飛白書扇亦遣使特賜置其柩所己未知荆南府工部侍郎李參為羣牧使執政初議欲用𠫭為三司使孫抃獨不可曰此人若主計外臺承風刻削則天下益困敝矣乃不果用庚申大宗正司言右衛大將軍嶽州團練使宗實繳還泰州防禦使知宗正寺敕告詔不許庚午樞密副使給事中包拯卒贈禮部尚書諡孝肅拯性峭直然奏議平允常惡俗吏苛刻務為敦厚雖疾惡甚至人情所不及即推以忠恕不為茍合未嘗僞色辭以悅人不作私書至於干請無故人親黨一皆絶之居家儉約衣服器用飲食雖貴如初官時六月癸未單州團練使劉永年為汝州團練使知代州契丹取山木積十餘里輦載相屬於路前守懼生事不敢遏永年曰契丹伐木境中而不治他日將不可復制遣人縱火一夕盡焚之上其事帝稱善契丹移文代州捕縱火盜永年報曰盜固有罪然在我境何預汝事契丹不敢復言鄜延經略司言得宥州牒夏國改西市監軍司為保奏軍威州監軍司為靜塞軍綏州監軍司為祥祐軍左廂監軍司為神勇軍且言諒祚舉措近嵗多不循舊規恐更僣擬朝廷名號漸不可長乞擇一才臣下詔詰問以杜姦萌從之於是遣供備軍副使張宗道賜諒祚生辰禮物宗道初入境迎者至欲先宗道行馬及就坐又欲居東宗道固爭之迎者曰主人居左禮之常也天使何疑焉宗道曰宗道與夏主比肩以事天子夏主若自來當為賔主爾陪臣也安得為主人當循故事宗道居上位爭久不决迎者曰君有幾首乃敢如是宗道大笑曰宗道有一首爾來日已别家人今日欲取宗道首則取之宗道之死得其所矣但夏國必不敢爾迎者曰譯者失辭某自謂無兩首爾宗道曰譯者失辭何不斬譯者乃先宗道迎者曰二國之歡有如魚水宗道曰然大朝水也夏國魚也水可無魚魚不可無水丁亥祕閣上補寫御覽書籍先是歐陽修言祕閣初為太宗藏書之府並以黃綾裝潢號曰太清本後因宣取入內多留禁中而書頗不完請降舊本令補寫之遂詔龍圖天章寶文閣太清樓管勾內臣檢所閲書録上於門下者補寫至是上之賜判祕閣范鎮及管勾補寫官銀絹有差
