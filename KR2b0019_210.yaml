body:
  text: 續資治通鑑長編卷二百六宋李燾撰英宗治平二年八月庚寅大雨辛卯地涌水壞官私廬舍漂殺人民畜産不可勝數是日御崇政殿宰相而下朝參者十數人而已詔開西華門以泄宫中積水水奔激東殿侍班屋皆摧沒人畜多溺死甲午命鹽鐡副使楊佐權度支副使李肅之景福殿使石全斌入內押班張茂則提舉修諸軍班營屋以全斌肅之主東南茂則佐主西北又分命朝臣及大使臣八人度工督役又命殿前副都指揮使郝質步軍副都指揮使宋守約提舉修造營屋虞部郎中來令孫等八人就賜死水諸軍民錢葬祭其無主者死而可知者凡千五百八十八人乙未詔曰乃者庚寅大雨室廬墊傷被溺者衆大田之稼害於有秋災變之來曾不虛發豈朕之不敏于德而不明于政歟將天下刑獄滯寃賦繇繁苦民有愁嘆無聊之聲以姦順氣歟不然何天戒之甚著也中外臣寮並許上封事言時政闕失及當世利害可以佐元元者悉心以陳無有所諱執政大臣皆朕之股肱其協德交修以輔不逮初學士草詔曰執政大臣其惕思天變帝書其後曰淫雨為災専以戒朕不德故更曰協德交修司馬光上疏曰陛下即位以來災異甚衆日有黑子江淮之水或溢或涸去夏霖雨涉秋不止京畿東南十有餘州廬舍沉於深淵浮苴棲于木末老弱流離捐瘠道路妻兒之價賤于犬豕許潁之間親戚相食積尸成邱既而厯冬無雪暖氣如春草木早榮繼以黑風今夏癘疫大作彌數千里病者比屋喪車交路至秋幸而豐熟百姓欣然庶獲蘇息未及收穫而暴雨大至一晝之間百川皆溢溝渠逆流原隰五陵悉為洪波一苖半穗蕩無一遺都城之內道路乘桴城闕摧圯官府倉廪軍壘民居覆沒殆盡死於壓溺者不可勝紀耄耋之人皆言耳目所紀未嘗覩聞此乃曠古之極異非常之大災陛下安得不側身恐懼思其所以致此之咎乎詩曰亹亹文王令聞不已又曰如圭如璋令聞令望古之聖主未有不先其令名而能行其政于天下者也臣伏見陛下踐阼之初上自宰輔次及朝臣下逮閭閻細民士伍厮養無不翕然同辭稱頌聖德如出一口皆云方會皇族奉朝謁者八百餘人陛下仁孝聰明為之首冠知人疾苦識其情偽節儉愛物剛果能斷既美先帝知人之明又慶已身逄時涕泣共談悲喜相半臣愚以為昔漢惠帝無子而得文帝仁儉謹恭百姓富饒幾致刑措昭帝無子而得宣帝勤惠明斷吏畏民樂號稱中興然則國無嗣子而旁親入繼未必不為天意福祐社稷而光啓聖賢也私心自幸又甚於衆人俄而聖躬有疾上下之人思殺身為牲粉骨為藥庶祈早瘳以視聖政不意數月之後道塗之議稍異於前頗有謗言不専稱美逮乎周嵗之外則頌者益寡謗者益多臣竊伏于闕門之外日聞衆論不勝悵恨痛心疾首晝而忘食夕而忘寢為陛下深思其故終不能明意者陛下於舉動循守之間萬一有所未思乎敢以愚慮言之蓋有三焉帷陛下寬其罪使畢其辭竊惟皇太后仁明之德爰自先帝布聞四方加之保育聖躬在於襁褓陛下入承大統不可謂全非皇太后之力當陛下初得疾之時外間傳言皇太后于先帝梓宫之前為陛下叩頭祈請額為之傷如此豈可謂無慈愛之心于陛下哉不幸為讒賊之人交相離間遂使兩宫之情介然有隙就使皇太后有不慈於陛下陛下為人之子安可較量曲直遂生忿恨而於愛恭之心有所不備乎傳曰大德滅小怨先帝擢陛下於衆人之中自防禦使升為天子唯以一后數公主屬於陛下而梓宫在殯已失皇太后之歡心長公主數人皆屏居間宫希曽省見臣請以小喻大設有閭里之民家有一妻數女及有十畝之田一金之産老而無子養同宗之子以為後其人既沒其子得田産而有之遂疏母棄妹使之愁憤怨嘆則鄰里鄉黨之人謂其子為何如人哉以匹夫而為此猶見貶於鄉黨况以天子之尊為四海所瞻仰哉此陛下所以失人心之始也先帝天性寬仁重違物意晚年攖疾厭倦萬幾遂以天下之事悉委之兩府或見有所偏或意有所私取舍黜陟未必皆當及巧設幸門進拔所愛超資越級欺罔衆人抑壓孤寒無所伸訴及陛下即位皆謂必能奮發乾剛昭明君德收取威福復還王室進賢退愚賞善罰惡使海內廓然立見太平而陛下益事謙遜深自晦匿凡百奏請不肯與奪動循舊例不顧事情謹于細務忽於大體知人之賢不能舉知人之不肖不能退知事之非不能改知事之是不能從朝臣専權甚於先朝率意差除無所顧忌或非材而驟進或有罪而見寬此天下所以重失望也陛下聖質雖美亦當取法於堯舜禹湯而即政以來或意有所見執之不移如堅守嚴城禦敵外冦使羣臣之言皆無自而入殆非所以納百川而成臣海也明君之於聼納無彼無我無親無疏無先無後唯其是而已矣若重我所見而輕彼所陳信其所親而疑其所賤主先入之言而拒後來之議則雖有是者亦不可得而見矣夫人心之所好者視醜以為美所惡者視善以為惡茍能以平心察之則是非易見矣書曰有言逆于汝心必求諸道有言遜於汝志必求諸非道若必待合於聖意則悅而從之不合則怒而棄之臣恐讒諂日進方正日疏殆非所以增社稷之福也又國家置臺諫之官為天子耳目防大臣壅蔽朝廷政事皆大臣相與裁定然後施行而臺諫或以異議干之陛下當自以聖意察其是非可行則行可止則止今乃復付之大臣彼安肯以已之所行為非而以他人所言為是乎此乃陛下所以獨取拒諫之名而大臣坐得専權之利者也夫以君相之重何啻泰山賤臣之輕何啻雞卵乃欲相與校其勝負臣固知其不敵矣是以四方懷忠之士願效區區者皆望風不進結舌沮氣此天下所以又失望也凡此三者在列之臣皆知其不可而上畏嚴誅下避怨怒莫敢以此極言聞於陛下使海內憤欎之氣積而不發宜其有以感動天地之和矣臣願陛下上稽天意下順人心於此三者皆留聖念事奉皇太后愈加孝謹務得歡心諸長公主時加存撫無令失所總攬大柄勿以假人選用英俊循名責實賞功罰罪捨小取大剗塞弊端一新大政延納讜言虛心從善皆行之以至誠非特為空言而已夫至誠可以動金石而况人乎不誠不足以感匹夫而况天乎詩云無曰髙髙在上陟降厥士日監在兹天雖至髙視聽甚邇人之所為發於中心則天已知之固不待見其容貌形於聲音也陛下果能盡誠於此則聖德日新令名四逹人心既悅天道自和百榖蕃昌嘉瑞並至要荒率服福流子孫矣臣自知不才無補朝廷然不敢遂自塞默復有所陳唯陛下裁察呂誨言陛下即位之初事無過舉災沴遽作殆人情久鬱怨愁之氣積陰而成天意愛陛下之深以是譴告不可不求其原也臣謹按洪範曰肅時雨若狂恆雨若肅者貌之恭狂者事之妄居上則言動必謹謀慮必審號令必信賞罰必當一有其妄災異斯應五行志曰簡宗廟廢祭祀水不潤下水者北方萬物終藏之所神道居陰尚乎安靜虔恭廟祭所以昭孝而訓人乃者濮安懿王一事始議或將與仁廟比崇終罷追封不及燕王之例禮失中而孝不足是亦幾乎慢也京房傳曰飢而不損兹謂大荒厥災水謂下民飢饉上宜減損去冬及春許潁等郡大荒上方不急之用後苑淫巧之作宜令裁減以崇儉約量入制用正在今日也又曰辟遏有德厥災水蓋有德之人塞遏而不用也今則官不試職名不副實賢不肖溷淆於下而况前席詳延無非藩邸之舊清途進用皆出權臣之門忠良之人寧無體解古者以功舉賢則萬化成瑞應著以毁譽取人故功業廢而災異生斯皆前世已驗之明者陛下當翼翼循思追救其失庶幾消復之理也然陛下側身恐懼祗悔誠深方注意輔臣代天理物陰陽不順風雨不時天變於上人怨於下致此之闕咎將安歸臣備員風憲無補聰明朝綱之頺弛時政之闕失職臣之由罪在不赦詔命既下著位之臣莫不輸忠畢慮仰副咨詢惟陛下省覽無倦言或可用克己行之日謹一日惟新盛德更張治具隱恤民病感召和氣以塞災變如曰休咎數也治亂世也四輔俱賢百工皆舉不責人事委之天理臣恐天心未應沴氣復還人情動搖邦本危矣吕大防言雨水為患此陰乘陽之沴也即陳八事曰主恩不立權臣大盛邪議干正私恩害公西北連謀盜賊恣行羣臣失職刑罰失平知制誥鄭獬時知荆南上疏曰臣竊伏思陛下發詔書以求忠言將欲用之耶將欲因災異舉故事而藻飾之耶茍欲藻飾之則固無可議者必欲用之則臣願陳其方臣觀前世之君怪變而求諫者甚衆書之史册以為美事及考其實則能用言而載于行事者蓋亦鮮矣徒使後世襲蹈以為帝王之值災異者於此空言而足矣曷足謂之罪已修德者耶今詔音一發天下忠義之士必有極其所藴以薦諸朝者此當有益于治道不為妄作然而疊章纍疏繁委而並集則陛下果能環復而究覽之耶計陛下一日萬幾必未能然爾若將欲如平時章疏事關深密者則留中不出事繫政體者則下中書事屬兵要者則下樞密院兩府覆奏又下羣有司及郡邑至於無所行而後止如是則有求諫之名而無求諫之實與前世為空言者等爾臣竊謂陛下萬幾之繁既未能遍覽則宜選官置屬令專掌之今之羣臣所上章疏曰許兩府及近臣畨休更直便殿賜坐與之從容條陳講貫其可者則熟究而行之不可則罷之有疑焉則廣詢而後決之羣言得而衆事舉此應天之實也天下之為言也甚難而上之聼者常忽焉自非忠憤激於心則孰肯墮肝膽而冒忌諱者哉古之能建立功業者未嘗不好諫者也好之者繇其褒進而招徠之也祖宗時言事者多被甄賞自近年以來兹事遼濶仁宗寬仁最能容直言而亦不能甄賞也願陛下采羣臣之章疏如其宏謀偉論可施於當世者則召見之與之共議不惟質其言且以觀其材大者擢之以職任次者賜金帛無取焉則罷之如此則陛下下詔有實言得言有實用且使史册書之以為某年大水詔求直言用某人言行某事以黜夫前世之為空言者則無令陛下詔書藏於有司復為數幅空紙而已初議追崇濮安懿王史館修撰同知諫院蔡抗引禮為人後大一統之義指陳切至涕下面帝雅信重抗因啓悟亦泣會京師大水抗推原咎徴在濮王議執政欲遂所建以抗在言路不便之庚戍命抗知制誥兼判國子監罷諫職乙卯詔減定衮冕制度前後十有二旒二纊並貫珠璣又有十二碧鳯銜翠旒在珠旒外版以龍鱗錦表上綴玉為七星旁施琥珀瓶犀瓶各二十四綴金絲網鈿以珠璣雜寶玉加紫雲白鶴錦衣四柱飾以七寶衮服間以雲朵飾以金鈒花鈿窠裝以珠璣琥珀雜寶玉祭天地宗廟饗太清玉清昭應景靈宫等服之知太常禮院李育奏曰案原本無此九字今據宋史補臣竊以郊廟之祭本尚純質衮冕之飾皆有法象非事繁侈重可玩也冕則以周官為本凡十二旒間以采玉加以紘綖筓瑱之飾衮則以虞書為始凡十二章各以辰象别以衣裳繪繡之采東漢至唐史官名儒紀述前制皆無珠翠龍錦犀寶七星雲鶴之飾何則鷸羽蚌胎非法服所用琥珀犀瓶非至尊所冠龍錦七星已列采章之內紫雲白鶴近出道家之語豈被衮戴璪象天則數之義哉自大裘制廢顓用衮冕古朴稍去而法度尚存夫明水太羮不可以衆味和雲門咸池不可以新聲間衮冕之服不宜以珍怪纍若魏明之用珊瑚江左之用翡翠侈靡衰播之餘豈足為聖朝道哉且太祖建隆元年少府監進所造冕服及二年博士聶崇義進三禮圖嘗詔尹拙竇儀參校皆倣虞周漢唐之舊至四年冬服之合祭天地於圜丘用此制也太宗亦嘗命少府製於禁中不聞改作及章聖封泰山禮官請服衮冕帝曰前王服羔裘尚質也今則無羔裘而有衮冕可從近制是豈有意於繁飾哉蓋後之有司率意妄增未嘗推議遂相循而用故仁宗常詔禮官章得象等詳議之其所減過半然不經之飾重者多去輕者尚存不能盡如詔書之意故至和三年王洙復議去繁飾禮官畫圗以進漸還古禮而有司所造復如景祐之前又按開寶通禮及衣服令冕服皆有定法悉無會要所載寶錦之飾况天地之德無物以稱宗廟之薦美亦多品惟純質之器法制之服僅可享之者太祖太宗削平僭偽富有四海豈乏寶玩哉顧不可施之于郊廟也臣竊謂陛下肇祭天地躬饗祖禰服周之冕觀古之象願復先王之制祖宗之法其衮冕之服及韠綬佩舄之類與通禮衣服令三禮圖制度不同者宜悉改正詔禮院及少府監定遂合奏曰古者冕服之用郊廟殊制唐興天子之服有二等而大裘尚存顯慶初長孫無忌等采郊特牲之説獻議廢大裘自是郊廟之祭一用衮冕然旒章之數止以十二為節亦未聞有餘飾也國朝冕服雖倣古制然增以珍異巧縟前世所未嘗有夫國之大事莫大於祀而制服違經非所以肅祀容尊神明也臣等以謂宜如育言其冕之有翠旒碧鳯琥珀犀瓶金絲網金絲龍紫雲白鶴龍鱗錦翠玉鈿窠玉七星七寶花墜衮之有雲朵金鈒花鈿窠雜寶及四神帶青羅抹帶紅羅勒帛之類願皆除去參酌通禮衣服令三禮圖及景祐三年減定之制一切改造孔子曰麻冕禮也今也純儉吾從衆純者絲也變麻用絲蓋已久矣則冕服之制宜依舊以羅為之冕廣一尺二寸長二尺二寸納以景表尺面圓後方黝上朱下金飾版側以白玉珠為旒貫之以五采絲繩前後各十二旒旒各十二珠相去一寸長二尺朱絲組為纓黈纊充耳金飾玉簮導深青衣纁裳十二章八章繪之於衣日月星辰山龍華蟲火宗彛也四章繡之於裳藻粉米黼黻也錦龍標領織成為升龍山龍而下一章為一行重以為等行十二别製大帶素表朱裏朱緣終辟韠紱舄大小綬亦去珠玉鈿窠琥珀玻璃之飾其中單革帶玉具劔玉佩朱襪之制已中禮令無復改為則法服有稽祭禮增重復詔禮院再詳以聞而內侍省奏謂景祐中已裁定可因也乃詔如景祐三年制而悉去繪畫龍鱗紫雲白鶴蹙金絲龍下裳除繡裳服并繪而不繡育河南人常與同列議禁中事既上有中人來問誰為此同列懼未對育獨前曰育實為之中人即去事亦寢知制誥宋敏求韓維同修仁宗實録司馬光言臣聞古者天子親祀上帝一嵗有九國朝之制天子三嵗一郊仍於其間改用他禮者甚衆豈奉天之意有所倦略哉蓋事有不得已者也臣竊見國家帑藏素空重以暴雨為災圜丘之側流潦尚深青城之材頗多散失儀仗法物損敗非一今若悉加完葺恐難猝備加以冬寒將近諸營漂沒失其生業屋宇敗壞衣褐俱盡陛下儻欲别加振拔亦恐失所不支昔太宗太平興國九年下詔東封尋以火災而止更用郊禮又淳化三年下詔祀圜丘亦以事故更用明年祈榖今災變大至國用不足臣謂不可不小有變更若因兹天譴隨時損益以九月十月之間於大慶殿恭謝天地亦足以展純潔之誠昭寅畏之志減省大費安慰衆心事無便於此者陛下儻以為可願決意早行之九月辛酉提舉編纂禮書參知政事歐陽修奏已編纂禮書成百卷詔以太常因革禮為名先是修同判太常寺奏禮院文字多散失請差官編修時朝廷重置局止以命禮官而禮官祠祭齋宿又兼校館閣書籍或别領他局嘉祐六年祕閣校理張洞奏請擇用幕職州縣官文學該贍者三兩人置局命判寺一員總領其事七月用項城縣令姚闢文安縣主簿蘇洵編纂令判寺官督趣之及修參知政事因命修提舉知制誥張壞奏伏見差官編校開國以來禮書竊恐事出一時不合經制者著之方册無以示後欲乞審擇有學術方正大臣與禮官精議是非釐正紬繹然後成書則垂之永久無損聖德洵等議修書本意但欲編纂故事使後世無忘之非制為典則使後世遵行之也今朝廷之禮雖號詳備然大抵往往有不安之處非特一二事而已而欲有所去焉不識其所去者果何事也既欲去之則其勢不得不盡去盡去則禮缺茍獨去其一而不去其二則適足以為抵牾齟齬而不可齊徒增後世之疑是欲益而反損也瓌議遂格至是書成賜修等銀帛有差壬戍以霖雨罷大宴司馬光言謙德之美尊而益光施之神人無不悅順竊見陛下將有事於南郊羣臣循襲故事請上尊號以陛下睿智聰明徽柔懿恭享兹鴻名云何不可正以屬者暴雨為災五稼漂沒編户失業吁嗟之聲盈於道路迄今未息陛下當此之際正宜深自抑損以承答天譴慰釋衆心况尊號非古近出有唐陛下受而有之不足以褒大聖功推而不居足以發揮盛德所有羣臣上尊號表伏乞拒而勿受仍令更不得上表此亦區區微誠欲補萬分之一也吕誨亦言羣臣四表請上尊號未蒙俞允有以見宸𠂻謙抑之至也然自霖雨以來責躬引咎詔求讜言祗若天戒顯揚英聲茂實亦恐非今日之宜羣臣抗章蓋迫人情亦拘常禮臣伏望陛下因時災譴思所以應變之實鴻名盛美抑而弗居俟郊廟成禮天人協和然後俯順羣情增崇徽號於體為順如允臣所請望宣諭輔弼所上第五表批答宜丁寧訓告以斷封章謙德彌沖式孚于外天下幸甚光既上言復靣有開陳上嘉納之羣臣凡五上表終不允己巳策制舉人曰朕享國日淺永惟任大而守重欲聞讜直之言以鑒不逮而未始云獲夫天人之際災祥各緣類而至也朕即位以來非有歌鍾狗馬之娛與夫外家女寵爵位賞罰之過乃二月甲辰大風晝冥四月丁未氣起西方七月丁丑太白經天八月庚辰大雨注京師半年之間巨異四發豈朕不共不忱不決不逹之致歟是以顧省厥違夙夜靡寧矧今吏治未醇民風未厚官溢而濫入之源未塞兵衆而選用之法未精田野雖闢而農不免飢寒關市雖弛禁而商不通有無欲人蹈名節而亷恥常不立欲人逺刑罰而抵冒常不止宋景一言而勝妖星朕下罪已之詔甚祗懼也而未有轉禍之感漢宣終世以核名實朕發責吏之書甚丁寧也而未有飭職之應逺監百王興壞之所由近慕四聖功業之所就何行而適世變何修而當天心子大夫其悉心以陳又集武舉人甲戌以制科入等著作佐郎范百祿為祕書丞升一任前和川縣令李清臣為著作佐郎百祿所對策言五行傳曰簡宗廟案宋史俱作簡宗室當以此為是後倣此廢祭祀則水不潤下魯莊公丹桓宫楹又刻其桷以自夸大天應時而水夫傅飾非典猶不卑其先君其變且若是况今朝廷陳奏顯言欲為兩統貮父之學簡宗廟者豈有甚於斯邪昔漢孝哀尊共皇而河南潁川大水孝安尊德皇而京師及郡國二十九大水孝桓尊崇皇而六郡地裂水湧井溢又明年平原王以奉崇皇祀尊崇園貴人而京師雨水孝靈尊仁皇而京師大水歷考數者之異若有期會而至異世同驗密如符節彼衰世之主豈足為昭代之所取而復道之哉然足以明天心之不易也今之為異先事而發有以見上天開祐有道之意豈不昭昭歟陛下之於濮安懿王情可以殺而禮不可加也恩可以斷而義不可以隆也禮為人後者為之子陛下父事先帝而繼體承祧古者特重大宗則降其私親大宗隆也小宗殺也天地宗廟社稷之祀重也門內之期輕也宜殺而隆之宜輕而重之則不得於先王之禮矣不得於先王之禮則不得於人心不得於人心則不得於天意此變異之所從來也陛下明詔罪已以求直言冀以答塞天變今踰月矣然未聞朝廷有所改修將有司之未嘗言耶抑言之而朝廷弗之行耶有司而不言則是有司不良以負陛下言之而朝廷弗行則是朝廷之不畏天變也有司負陛下則有責朝廷不畏天變則天之責將何以復之耶臣竊以是為過矣朝廷無艱乎改之而已古之聖帝明王未嘗無過然而貴乎能改是其所以為聖帝明王也商湯之過以旱災而改中宗之過以拱木而改髙宗之過以雊雉而改成王之過以雷風而改宣王之過以雲漢而改此五帝王者皆不能無過然而或致太平或為中興榮華迄今歌頌不已惟其能改過也夫今之過特有司過言而陛下未有過行也是非世俗之所謂過也蓋仁者之情爾孔子曰觀過知仁今而改之申詔有司勿復議追尊事以禮言之上不失尊天地社稷宗廟一統之大義以仁言之則不失思慕閨門顧復罔極之厚恩臣愚請因濮安懿王建國為之立長以為嗣王世世奉祀安懿王永為一國太祖則神靈享於禮義人心悅而天意解矣大雨之眚何用禳哉百祿鎮從子也清臣安陽人韓琦妻以其兄之子歐陽修竒其文以為似蘇軾及試祕閣試文至中書未發也修迎語曰考官不置清臣第一則繆矣發視果第一時同發策者四人或謂清臣當以五行傳對所問災變當復得第一清臣曰此漢儒説以某異應某事清臣不能知民間得無疾痛不樂可上者乎因言天地之大譬之於人腹心肺腑有所攻塞則五官不寧民人生聚天地之腹心肺腑也日月辰宿天地之五官也善止天地之異者不止其異止民之疾痛不樂者而已清臣竟在次等武舉人等入左班殿直康修為左侍禁餘五人授官有差丙子給事中權御史中丞賈黯為翰林院侍讀學士知陳州從所乞也先是黯與兩制合議請以濮王為皇伯執政弗從數詣中書爭論會大雨水時黯已被疾疏言簡宗廟逆天時則水不潤下今二三執政知陛下為先帝後乃阿諛容説違背經義建兩統貮父之説故七廟神靈震怒天降雨水流殺人民於是引疾求出而有是命後十二日卒口占遺奏數百言猶以濮王議為請故事常侍經筵者乃贈官黯未及謝上特贈禮部侍郎案宋史作贈尚書禮部侍郎初黯母陳歸宗繼母史在堂後迎陳歸二母不相善黯能安以事之黯修潔自喜在朝數言或從或否人稱其介直賈黯卒在十月戊子贈官在丁酉今并書龍圖閣直學士判都水監韓贄知河南府坐都城內外溝洫久不治故也先是吕誨言竊以天地災變古今時有如一二日內大雨毁壞公私廬舍萬餘間未嘗聞矣今復逾月陰霪不解諸軍營壘類皆暴露愁痛呻吟夜以繼晨殆無生意朝廷方置司局總領修造西川召提舉官淮浙抽丁匠猝未有安處之望誠可憂也臣向來請朝廷修人事責吏職又請募兵願自備工力修蓋屋宇瓦木外量支笆箔之費及存撫出軍營女口俾戍兵聞之少安數事得於公論謂可稍慰人情乃一切置而勿用臣當言責目覩無聊之狀耳聞愁怨之聲緘默自為得以安乎願陛下少留聼焉今都城之內溝渠遏塞郊封之外畎澮堙塞水道決溢蔡河斷流中無薪芻人艱食用此非水官之職耶倉廩頽壞糧儲腐爛東南諸郡頭會箕斂轉漕數千里人被刑者嵗有百萬聚之艱辛而棄之如泥土非庾氏之職耶宗廟八室興役方及二年例各疏漏神主不安陛下得以安乎條法有八年之限二年者理原本缺三字此非匠氏之職乎凡如此類不可悉舉罪之誠無益於今日猶足戒於將來必曰天災非人事則舜不當殛鯀漢不當免三公矣臣所憂者災沴非止於此陛下以臣言是在英斷必行以臣言非當置之典刑不宜優遊濶略以為無事執政者終不歸咎于有司其必有以滋時政之深病誤天下之大者不可不察也辛巳命主客郎中權發遣開封府判官王靖復舉捉殺開封府路及曺濮澶滑州未獲盜賊靖既受命所捕獲十八九因言盜賊不戢由大姓為囊橐請以重法坐匿者著為令同知禮院李育言南郊太廟二舞郎總六十八文舞罷捨羽籥執戈戚就為武舞臣謹案舊典文武二舞各用八佾凡祀圜丘祭宗廟太樂令率工人以入就位文舞入陳於架北武舞立於架南又文舞出武舞入有送迎之曲名曰舒和亦曰同和凡三十一章止用一曲是進退同時行綴先定步武容體各應樂節夫至德升聞之舞象揖讓天下大定之舞象征伐柔毅舒急不侔而所法所習亦異不當中易也竊惟天神皆降地祗皆出八音克諧祖考來格天子親執圭幣相維辟公嚴恭寅畏可謂極矣而舞者紛紛旁午縱橫于下進退取舍蹙迫如是豈明有德象有功之誼哉國家三年而躬一郊同殿而享八室而舞者闕如名曰二舞實一舞也且如大朝會所以燕臣下而舞者備其數郊廟所以事天地祖考而舞者減其半殊未為稱事有近而不可忽禮有繁而不可省所繫者大而有司之職不敢廢也伏請南郊太廟文武二舞各用六十四人以備帝王之禮樂以明祖宗之功德奏可先是僧官有闕多因權要請謁內降補人當時諫官御史纍有論列仁宗深悟其事因著令僧官有闕命兩山各選一人較藝而補至是鑒義有缺中書已下兩街選人不上而內臣陳承禮以寶相院僧慶輔為請內降令與鑒義中書執奏不可韓琦曾公亮極保其事歐陽修奏曰補一僧官當與不當至為小事何繫利害但中書事已施行而用內降衝改先朝著令則是內臣干撓朝政此事何可啓其漸又啓曰宮女近習自前常患難于防制今小事若蒙聼許後有大事陛下必以害政不從是初欲姑息而反成怨望不若絶之於漸此一小事陛下不以為意而從之彼必自張于外以為上親信朝政可回在陛下目前似一間事外邉威勢不小矣上遽可中書所奏令只依條例選試修又奏曰事既不行彼必有言云萬事只由中書官家豈得自由行一事陛下試思從私請與從公議孰為得失而琦及公亮亦所陳甚多上皆嘉納歐陽私記以為九月十九日事今附月末冬十月庚寅天章閣待制吕公著司馬光為龍圗閣直學士兼侍讀光自言在諫職凡五年前未有如此之久者惟知竭忠報國與人立敵甚衆四海之內觸處相逢常恐異日身及子孫無容足之地然不敢無故求出不意朝廷更加奬擢仍居舊任既荷寵祿則卒無得出之期禍敗罪誅必不可免願賜哀矜收還新命許臣以待制知河中府或襄虢晉綘一州詔不許但免光諫職而己甲午復以王安石為工部郎中知制誥母喪除故也癸卯宰臣曽公亮奏先朝樞密使兼侍中在平章事集賢殿大學士之上今文彥博至乞班序如故事閣門奏天聖中兩府領宫觀樞密使兼侍中曹利用領景靈宫使宰臣王曽領會靈宫使故利用在曽上其後樞密使兼侍中不領宫觀則宰臣在其上從之吕誨言臺諫者人主之耳目中外事皆得風聞蓋補益聰明以防壅蔽臣觀天聖景祐間三院御史常有二十員其後益衰減蓋執政者不欲主上聞中外之闕失然猶不下十數員今御史臺闕中丞者纍月御史五員差出者三人唯臣與范純仁呂大防供職封章十上報罷者八九諫官二員司馬光遷領他職傅堯俞出使敵廷諍臣僅同廢置自古言路壅塞未有如今日之甚也臣竊為聖朝羞之下情何以得上通天聰何因而逺及伏乞聖𠂻監斯流弊特為振起添置言事官員數以廣聞見實求治道之大要也乙巳命知制誥邵必權知諫院戊申都官員外郎權發遣三司開拆孫永為諸王府侍讀案永由太常博士賈黯薦為御史不就韓琦讀其詩歎異之引為諸王府侍讀未嘗為都官員外郎也此所載與宋史異屯田員外郎編排中書文字孫固為諸王府侍講案宋史固由審刑詳議官韓琦引為編修中書諸房文字至神宗即位擢工部郎中與此亦異永沖孫固管城人也御史呂誨范純仁等言固非其任上謂輔臣曰固文辭亦有可取若必求卓絶之才恐未易得趙槩曰孔子稱才難不其然乎韓琦曰孔子稱唐虞之際於斯為盛又稱舜有臣五人而天下治則雖治世未嘗不以賢者為難得陛下既用固矣望徐察其人果不稱職罷之可也他日又謂輔臣曰固頗長於講説固由是得不罷此據寶訓有潁昌史源者記崔立與孫固善立常為韓琦道固之賢琦欲固來見立初不敢與固言苐問固曾見執政否固遽責立非所宜言立愧謝他日琦怪固不來立道其所以琦重之及潁王出閣琦遂進擬固為宫寮同列以未識疑之琦曰琦亦未識但聞其賢欲見之訖不肯來調護官宜用操守人也源所記甚詳然據固本傳固已先為琦薦編排中書文字矣治平二年十月乃自編排中書文字除王府侍講不如源所記也固編排中書文字不知何時嘉祐八年八月王廣源李立之初編排中書文字固當在廣源立之之後或琦緣固不肯求見先奏令編排中書文字後遂用為王府侍講其除王府侍講則固已識琦矣源所記偶失先後次序姑存之待考潁王好學不倦一日出新録韓非子屬府寮讎校永曰韓非險薄無足觀王曰録此備藏書之數非所好也壬子龍圖閣直學士兼侍講盧士宗知青州士宗入辭上謂曰朕素知卿忠純之操豈當久處於外因命再對及復進見論知人安民之要願守祖宗之法不數變也士宗再對墨史有之朱史削去今仍附見甲寅呂公著編仁宗御集成一百卷以進上御延和殿服鞾袍觀之兩府皆侍翰林學士馮京為南郊禮儀使闕御史中丞故也即日更命給事中天章閣待制彭思永權御史中丞司馬光言臣以駑朽得侍勸講竊見陛下天性好學孜孜不倦然於經席之中未嘗發言有所詢問臣愚意陛下欲護羣臣之短恐於應對之際倉卒失據不能開陳稠人之中受其愧耻此誠聖心仁恕之極羣臣捐軀無以報塞然臣聞易曰君子學以聚之問以辨之論語曰疑思問中庸曰有弗問問之弗得弗措也有弗辨辨之弗明弗措也以此言之學非問辨無由發明今陛下若皆默而識之不加詢訪雖為臣等疏淺之幸竊恐無以宣暢經旨禆助聖明伏望陛下自今講筵或有臣等講解未盡之處乞賜詰問或慮一時記憶不能備者許令退歸討論次日别具劄子敷奏庶幾可以補稽古之志成日新之益十一月己未呂誨言國朝親民官通判以上擬任先引見仍於中書呈身替還知州許上殿陳利便三事比來引見呈身如故但當寧未嘗親問中書不復閲實利便三事亦皆罷陳天下郡守不得其人者十五六豈聖朝求治之意哉疏逺之臣有終身不得近清光伸一言以紓素藴者欲君臣之道相屬上下之誠相接難矣臣欲乞凡除擬知州人引見日令上殿親有所問又使中書閲其可否然後授之替還依舊許陳利便三事詔自今鄭襄曺蔡相邢同晉夀湖明宣河中等知州府辭見許上殿庚午朝饗景靈宫辛未饗太廟壬申祀天地於圜丘以太祖配大赦故事親祠皇帝將就版位祠官皆回饗上須就位乃復侍臣跪讀册至御名則興至是始詔以専奉祠事勿回班讀册至御名勿興先是以久陰雨晦及車駕赴青城中道開霽人心大悅御文德殿發寶册上皇太后又册皇后百官自文德殿移班閣門表賀皇太后於內東門勿回班勿興恐此非事始也或郊祀始此前未有考建齊州為興德軍龍圖閣直學士呂公著攝太僕卿參乘故事參乘皆以翰林學士知雜事參乘自公著始帝問今之郊何如對曰古之郊也貴誠而尚質今之郊也盛儀衛而已因言仁宗親祠撤黃道以登虛小次不入帝皆循用之先是百官習儀尚書省賜酒食郎官王易知醉飽嘔吐御史前劾失儀及是宰相韓琦以聞上曰已赦罪也琦言故事失儀不以赦原上曰失儀薄罰也然使士大夫以酒食得過難施靣目矣卒赦之十二月壬寅禮院奏準畫旨來年正月上辛祈榖祀昊天上帝同日祀感生帝準閣門儀制祀天地致齋則皇帝不逰幸作樂緣正月三日夀聖節在致齋之中若用慶厯元年嘉祐七年正月受賀例改用中辛即當在十六日又緣十四日其日例當詣慈孝寺集禧觀行禮作樂觀燈按祭統君子將祭乃齋齋者不敢散其志也然則君子所以齋者為將接神故不以聲音蕩其志意若遣官攝事則於禮無不聼樂之文元日朝會及夀聖節多上辛日辰相近若常改用中辛即非事天神之意嘉會合禮又不宜徹樂今請每遇元正御殿聖節上壽雖在上辛祠官致齋日亦用樂其大宴即移日或就賜從之御史范純仁言祀天致齋行自古昔誕辰上壽起於近朝以禮較之祀天為重昨者郊祀小次黃褥皆是有司於禮合陳而陛下虛次撤褥以示至恭臣民歡然歌頌聖德今若於致齋之內却許用樂則恐前後之禮不侔伏望指揮將來上壽于致齋之日權不用樂則不惟合於典禮亦使中國四裔知陛下克已奉天尊禮化民之意不報甲辰夏國主諒祚使人來賀正旦丁未使人來賀壽聖節司馬光言竊見近年以來趙諒祚雖外遣使人稱臣入貢而內蓄姦謀窺伺邉境陰以官爵金帛招誘中國不逞之人及熟户蕃部聞其亡命叛去及潛與交通者已為不少而朝廷不能一一盡知也其熟户蕃部有違拒不從者諒祚輒發兵馬公行殺掠弓箭手有在沿邉者諒祚皆迫逐使入內地將帥之臣但坐而視不能救援遂使其餘熟户皆畏憚凶威怨憤中國人人各有離叛之心及朝廷遣使賫詔責問則諒祚拒而不納縱有所答皆侮慢欺冒之辭朝廷亦隱忍含容不復致詰諒祚又數揚虛聲以驚動邊鄙而將帥之臣率多懦怯别無才謀以折衝禦侮只知多聚兵馬以自衛其身一路有驚則三路皆聳盡抽腹內州軍下畨兵士署在麾下使之虛食糧草數月之後寂無影響然後遣來未及休息忽聞有驚又復回去如此往還疲於道路訖無是事曽何施為臣雖愚駑不習邉事竊私意料之諒祚所以遣使稱臣奉貢者一則利於每嵗所賜金帛二十餘萬二則利於入京販易三則欲朝廷不為之備也其所招誘不逞之人者欲以來訪中國虛實之事平居則用為謀主入寇則用為嚮導也其所以誘脅熟户迫逐弓箭手者其意以為東方客軍皆不足畏唯熟户弓箭手生長極邉勇悍善鬬若先事剪去則邉人失其所恃入冦之時可以通行無礙也所以數揚虛聲驚動邉鄙者欲使中國之兵疲於奔命耗散諸蕃公私貧困既而邉吏習以為常不復設備然後乘虛入冦也凡此諸事若不為之慮使姦謀得成竊恐其為國家之患不可忽也臣謂朝廷宜宵衣旰食以為深憂而但見其遣使奉貢即以為臣節未虧得其侮玩之語以為恭順得其欺慢之語以為誠實蓋朝廷非不知其本心且欲其未發止求目前之暫安不顧異時之深患臣日夜思之不勝憤悒何諒祚為謀之深而中國慮事之淺也臣愚伏望陛下於邉鄙之事常留聖心特降詔書明諭中外應文武臣寮有久歷邉任或曾經戰陳知軍中利害及西夏情偽者並許上書惟陛下勿以其人之官職疏賤及文辭之鄙惡一一略加省覽擇其理道稍長者皆賜召對從容訪問以即日治兵禦戎之策何得何失如何處置即得其宜若其言無可取者則罷遣而已有可取者即為施行仍記録其姓名置於左右然後選其中勇略殊衆者擢為將帥若能稱職有功則勸之以爵賞昏懦敗事則威之以刑誅加以選練士卒留精去冗申明階級之法抑揚驕惰之氣誠能行之不懈數年之後俟將帥得人士卒用命然後惟陛下之所欲為雖北取幽薊西取銀夏恢復漢唐之疆土亦不足為難况但守今日之封界制敵人之侵侮豈不沛然有餘裕哉郊祀既畢侍御史知雜事呂誨復申前議乞早正濮安懿王崇奉之禮且言國家承五代餘弊文武之政二府分領然而軍國大計皆得合議崇奉濮安懿王此事體至大者而終不謀於樞府臣所未喻兩制及臺諫論列者半年外臣抗疏言者不一而樞府大臣恬然自安如不聞知以道事君者固如是耶今佞人進説惑亂宸聼中書遂非執政邪論當有以發明經義解釋羣疑臣欲乞中旨下樞密院及從來進士兩制臣寮同共詳定典禮以正是非久而不決非所以示至公於天下也誨尋進對延和殿開陳懇切上諭誨曰羣臣慮本宫兄弟衆多將過有封爵故為此言誨即辨其不然退又言臣竊思仁宗於堂兄弟輩尚隆封爵况陛下濮宫之親其誰敢問近日中宫與皇太后受策內外歡慶必若恩及天倫乃為甚美雖甚愚者不應獻此言如果有獻此言者乞宣示姓名與衆共罰不宜寬容以啓讒慝誨前後既七奏不從因乞免臺職補外又四奏亦不從遂劾韓琦曰臣竊以求治之本必廣於聰明馭臣之威當嚴乎法制聰明不廣則下情無以上通法制不嚴則大臣得以専政如乾之德以剛而健坤之體以柔而順反是而君臣之義失強弱之勢分履霜之凝良有其漸自古強臣滋甚直以辨之不早故也臣不敢博引強臣之事輒以漢唐二臣之迹而明之如霍光於孝宣世李德裕於武宗朝皆得謂之有功也然而専有柄權盜用威福終以威震人主而不能保身庇族書曰臣無作福作威害於而家凶於而國二人者是也且刑賞人主之操柄可一日倒持而授之於人乎今琦自恃勳勞日益専恣廣布朋黨隳紊法度朝廷進一官皆曰琦之親舊黜一官皆曰琦之怨敵人言若是未必皆然蓋持守不公氣勢寖甚衆所指目不能逃也以至小人乘時迎望風旨趨走門下唯恐其後天下只知琦之恩讎而不知陛下之威福也如嘉祐中議立皇嗣雖先時臣寮上章懇請者衆然亦先帝與皇太后屬意日久保育宫中事已素定至是琦贊成之不為無功也暨踐祚數月琦請下有司議濮王典禮比再下兩制用漢宣光武二帝故事欲稱皇考竊原詔旨本非陛下之意琦𨗳諛之過也永昭陵土未乾玉几遺音猶在乃心已革謂天可欺致兩宫之嫌猜賈天下之怨怒謗歸於上人所不忍言者辨論半年不決猶遂非不為改正得謂之忠乎計當時贊成之意本要福於今日明矣陛下親政之初當引勳舊左右明聖贊襄密勿琦殊無進賢之意唯求附已之人陳旭在先朝始以姦進終以此退黜力排衆議復登大用如旭之輩不可勝數皆授美官分布要路相與表裏以成朋黨報國之心孰知其所存也方天下多事之際臺諫章疏朝報夕罷壅塞言路意在専政蒙蔽宸聰下情不得而上通皇明何由而逺燭使忠臣抱吞聲之恨聖君有拒諫之名中外不平獨清𠂻未悟爾况陛下即位以來進秩疏封賞功報德不為不至而琦略無謙損益肆剛愎半嵗之內兩次求罷無疾堅卧要君寵命猶曰自謂孤忠之可立豈知直道之難行果知人臣進退之分天理盈虛之理不應形斯言于章奏也借如乾興中丁謂曹利用輔幼君母后曾無今日陛下報琦之厚猶以橫恣不公相繼貶逐臣觀琦之才未如霍光李德裕丁謂曹利用其驕恣之色過之當琦引退之時莫不願陛下遂其所請收還相印不意恩禮益加強之以事仰惟聖眷俯念前功愛有所忘久而不厭其如公議何臣所慮者朝廷居安之久是陛下大有為之時不宜持循當務更化琦之用恐未足以救天下之安危方今士論沸騰人心憤鬱得不攬威福之在手戒履霜之積微罷琦柄任黜居外藩非止為國之福亦保琦族於始終也唯祈聖慮斷之弗疑以臣言是望賜必行以臣言非敢逃常憲區區之懇罄于是矣濮王申陳以誨劾琦疏附三年正月二十七日後又疏斥琦不忠者五并及頴府寮友不用正人頗與此異此據誨章奏馮潔已御史臺記則亦以此則為第六疏疏與申陳所載並同然疏稱濮議半年不決恐不當在明年且明年誨已纍章彈歐陽修不應後章全不及修今來參酌附此年末更須考詳不知直道之難行自謂孤忠之可立按琦集乃甲辰冬乞罷相表甲辰治平元年也是嵗户一千二百九十萬四千七百八十三丁二千九百七萬七千二百七十三夏秋稅二千三十九萬六千九百九十三石以災害放一百六十五萬五千五百四十六石斷大辟一千七百三十六人契丹主洪基改清寧十一年為咸雍元年此據章衡編年通載而國史不載按兩朝史契丹傳稱宗真重熙二十三年卒洪基立改清寧清寧九年即治平四年神宗史契丹傳亦同然治平四年字誤也當作治平元年又治平元年實洪基清寧十年蓋洪基以重熙二十三年立即改元清寧不待逾年國史誤以逾年數之故治平元年始當清寧九年其實當清寧十年又誤以治平元年為四年也
