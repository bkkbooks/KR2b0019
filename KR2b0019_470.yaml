body:
  text: 續資治通鑑長編卷四百六十六宋李燾撰哲宗元祐六年九月丁亥樞密院言河東經略司奏報西夏深入麟州府攻圍城壁詔本司丁寧誡𠡠麟府路軍馬司宜謹重精審仍張大聲勢集兵應援務令敵兵早退城寨無虞仍令范純粹審擇便利如可出兵即依前詔牽制策應舊録云始議以先帝經略西邊為好大生事遂棄城寨罷戍守厚禮以招來羌人意謂可以息兵民卑辭厚幣無所不至貢使未還疆界未畫兵已犯境矣時姦人在朝君道不立致使西人犯順內外束手措置乖繆使彼得計如入無人之境大獲而歸誠可忿惋新録辨云上文是樞密院戒􅎁麟府路謹重精審牽制䇿應等語未有敗事史臣云君道不立誣謗太甚兼亦文意不倫合刪去前項九十八字戊子鄜延路經略使范純粹奏准河東路經略安撫使司牒閏八月二十六日西夏劫掠人户麟府州賊馬不知萬數臣契勘押賜夏國主生日禮物及中冬時服使臣安倫劉程已到延安府依年例合於今月十一日以後過界及嵗賜銀絹第一畨合於今月二十五日過界緣西夏方舉兵犯河東其安倫劉程若並令依常例月日過界竊慮朝廷既聞河東遭冦於今來遣使別有更改若便令安倫等更不過界又恐朝廷之意不以為然緣日數已逼待報不及臣已面誡安倫等眀用公文稱疾又備坐下保安軍移牒宥州去訖並乞速降指揮貼黃朝廷懷柔夏人含忍至矣而彼逆狀益甚今來令安倫託疾少遲數日只是姑為遷延之名以待朝命而已其如遣使恩禮何伏乞朝廷稍存國體熟賜議論又臣看詳夏國今年之內大兵三舉猖狂已甚每行詰問但言見令勘㑹陽若不知察其設心蓋外為不闕貢奉之名以利市販而不廢侵冦之實也必欲自此習以為常玩慢欺侮亦已極矣未遣押賜使臣過界雖止作經略司一面作遣觀日近宥州所回文牒詞意簡倨殊不少屈若受彼簡倨之詞即令押賜官執禮而往則恐朝命太輕國體太弱兼賊知我意今後嵗嵗不妨舉兵犯邊殘害生靈而朝廷遣使持禮皇皇不暇賜賚恩數一毫不減恐非息兵安民之術伏乞朝廷洞照事機更為長久之計純粹以九月三日奏此己丑詔以禁軍闕額米充兩浙上供政目九月初四日事當考庚寅樞密院言西夏入冦麟府州未退詔河東路經略司誡諭張若訥張大軍聲占據地利審度敵勢選募驍勇敢死之士出竒逼逐或乘師老惰歸之際擇利邀擊禮部言臣僚上言國子監生員無叩問師資之益學官不以訓𨗳為己任詔本部相度以聞今欲令生員遇有請益許見長二逐旬遇三日學諭出題內詩賦論許於經史子通出集長諭解說歸齊告諭諸生次日早食鼓前納旬終送博士㸃檢仍間召生員以所納齊課於講堂上指諭委博士逐月遍巡所𨽻齊詢考學生所業凡私試不鎖宿欲令不罷講說從之臣僚上言蓋岑象求也前已見右朝議大夫試大理卿韓晉卿卒贈絹百匹晉卿贈絹百匹據政目十四日事辛卯詔六曹尚書曽任執政官者立班在六曹尚書之上少前禮部言應補外舍附私試大義日願試詩賦者附第二場仍各為號博士鎖宿自引試日後別限考校千人以上限止十日每少百人減一日人數雖少即不得減過五日取文理通者為合格長二與考校封彌官同驗號拆封注籍曉示仍申三省禮部從之壬辰樞密院言夏人犯麟府州雖已遁去今據陜西沿邊奏報見各於並邊嘯聚竊恐復冦別路詔陜西河東逐路經略司如遇西夏入冦本路兵力不勝即速令互行關報牽制策應及令逐路帥臣精心講究利害如何經畫措置密具方略以聞其麟府州界人常為敵所殺掠燒蕩屋舍者令經略司人以老幼屋以多寡等第給賜錢絹或被焚毁糧斛蹂踐田苖亦隨宜賑濟令帥臣精心講究方略九月二十六日范純粹奏可考秦鳳路經略使吕大忠陳三䇿曰夏國賴以為生者河南膏腴之地東則橫山西則天都馬銜山一帶其餘多不堪耕牧若於熙河路相近定西城北石峽子外秦鳳路相近淺井涇原路相近沒烟峽口各置一大寨鄜延環慶兩路利害不甚詳悉乞下逐處相度羌情戀土憚於遷徙必皆歸順就而撫之便為籬落更不消外設亭障兼有山林所阻沙漠為限中國為援彼既失此地利當自困弱他日雖欲猖狂不可得也此為上策竊聞疆議朝廷元降指揮依慶厯五年誓詔以見今漢蕃人户住兩界中間為定分畫此為中策一蘭州通逺軍地界若依范育所奏此為下策臣愚竊謂朝廷必欲展置版築未審果出何策此計先定即度工聚材使之畢具然後勒熙河秦鳳之兵約日分行討蕩併力興修軍回亦須稍見次第仍令不住更互倐往忽來淺攻近掠西人必不敢近寨嵗月之間吾事濟矣上策聞諸士論亦先帝之志失於垂成其次中策自當執而行之朝廷急於講和俄復中變於僅存者惟有下策議猶未決遂使西人窺測纍年入冦邊鄙侵侮無厭意謂朝廷憚於用兵所求必如所欲而已今既絶其嵗賜兼諸路兵勢足以枝梧乃是宗廟社稷之靈隂有輔相已行姑息之命救而正之機不可失此其時也前日所請必從蓋欲邊隙早平今既不可包容眀與之絶凡事當一正以理西夏每有大舉動經纍月蓋人人自備其費若諸路則悉從官給號令一出無敢後者只以飢飽勞逸難易校之己能屈敵奈何惴惴然惟恐其來乃是帥臣習而不察未嘗為朝廷深計欲乞今後將嵗賜錢物分賜諸路添助邊計每遇防春防秋不以有無探報常令移兵並塞疑而致之但使來無所得常為固守清野之計去有所防吾兵在境勿忘戒心蠢爾小羌必厭㸃集三二年間其勢自困兹坐勝之策也上策守而不戰謂限以沙漠西人無水草嘯聚之地中策守而或戰謂漢蕃住坐相逺舉動稍難下策守而常戰謂此彼倐忽往來不可以相及中策下策既有戰計須立報賽之法然後可以保民前日疆事欲速此策猶或難之今來逺謀故以為下據大忠奏議答密劄所問即此月七日壬辰所書也梁燾行狀云熙河請築努扎等堡寨邊臣謂漢先據則勝秦鳳帥又請為聚卜結嚨堡樞密院謂先治秦鳳其熙河所修皆西人必爭之地未可築也燾曰治邊所以制伏外地當先其所急而後其所緩今乃先秦鳳而後熙河是緩其所當急制勝必據要害以取形勢西人犯順數侵邊境正當治築非無事時也此不可失之機㑹無可疑者遂下諸路更不用已前畫定地界各據要害去處乘時修築按行狀所稱秦鳳帥不知謂誰附此俟考合附此於眀年六月九日後或二月二十八日環慶路經略章楶奏六年九月十四日奏此今即附七日降詔時臣勘㑹備邉之策守禦並施朝廷已赦西夏宿愆許其悔過復給嵗賜又還其四寨土地以厭貪婪之心嵗許遣使奉貢錫豫甚厚自通使已來纍嵗以分畫疆界為請求索無已朝廷皆委曲含忍俾與疆吏計議天地之仁可謂至矣而乃負背恩信悖慢愈深輒興師旅侵犯邊境茍縱而不問異時必為大害今日朝廷行遣正中機㑹消姦破賊之策固無逃於宸衷也聖心退託乃咨詢於乘塞之臣區區愚暗敢不自竭臣竊謂羌戎為孽久矣自慶厯以來前後入冦非舉國之衆不能深入今者自八月聚兵境上凡四五十日其衆始集初欲冦鄜延環慶一夕忽趨麟府捨近取逺必有意謂蓋疑兩路之兵亦聚故分其半以冦河東然則朝廷著牽制之令最為得策又惟僻陋之小邦土地有限人民有數自今夏涉秋凡舉全國之師其衆可謂勞矣不能無怨其力亦已屈矣不能無困以勞屈之衆而當聖朝仁義之兵雖不戰可以待其自斃也為今之計宜敕戒諸路休養兵民修嚴警備事事整辦毋妄作輕舉蕃冦小入使城寨及諸將各據地分驅逐剪除之出疆而後己舉國入冦則堅壁清野勿當其鋒俟其引退審察前軍已逺遣將據要害便利之處分頭討擊之或剪其尾或邀其歸路一路被冦諸路皆出兵䇿應牽制彼豈能枝梧哉此備禦之䇿未足以深害之也夫西夏無城郭之固無營衛之兵嘯聚則為用既散則難集雖沿邊有上畨守禦之人每處衆不滿百謂宜乘間搗虛擾耕踐稼勿限其常為淺攻之計皆付之逐路帥臣審度而為之或遣兩將己上悉任其施設不必全用正兵蕃漢弓箭手最為可任益之以選募土兵參雜於蕃兵之間所得人口孳畜錢財皆差等分給出塞之人如此則人人樂為之用諸路之師更出迭入敵亦不能知其時則近塞三百里之賊境既不能為生又不能自存彼賊不困未之有也行此之䇿不二三嵗必束手歸命徐察其誠懇茍非詐僞然後許之納欵稱臣反復思之無踰此䇿伏乞朝廷更賜詳酌指揮鄜延范純粹奏在二十六日户部請河東路助軍糧草支移不過三百里若非時急闕亦聽相度展那仍不得過二百里本户災傷五分以上仍免折變從之癸巳御集英殿試制科舉人乙未河東路都轉運司言本司先乞應係本司已差應副軍期官員逐司如敢占留及別差官替換並乞科違制之罪不以去官赦降原減今看詳顯是太重乞行刪去從之丁酉三省言御試應賢良方正能直言極諫科制䇿左宣德郎新知瀘州合江縣事王普初考第四等次覆考第四等詳定從覆考河中府司理參軍司馬槱初考第五等覆考第四等次詳定從初考眉州眉山縣布衣王當初考第五等覆考不入等詳定從初考詔王普遷一官除僉判差遣司馬槱特賜同進士出身堂除初等職官王當特堂除簿尉先是祕書省考試制科所考校到等第字號詔普等御試至是推恩詔自元祐六年每嵗於內藏庫支緡錢五十萬或以紬絹金銀相兼支兊赴元豐庫樁管補助沿邉軍須等支費戊戌吏部言諸小使臣病假不滿百日痊安應赴朝參見釐務者經所屬餘經吏部投狀具元在假月日關牒閣門從之己亥御史中丞鄭雍言元祐復差役法于兹六七年户部未嘗一日無申請更改乞朝廷先自一路詳擇監司知州各一二人召詣三省令親受朝㫖先從一二州召諸縣令長各採民間役法利害與監司長吏參議各為一州一縣之法舊録云時行差役然雇役猶方圓不同乃遂非遷就為法五年卒不能一新録辨云上文是中丞鄭雍云元祐復差役法于兹六七年户部未嘗一日無申請乞詳擇監司知州議立一州一縣之法史臣指為遂非遷就乃譏罵之過也合刪去上項二十六字辛丑詔應在京文武臣僚有三代見有女在室者並供具家狀户部請使臣人員押鹽糧綱沉失少缺該衝替者赦降去官不免從之政目十六日朱光庭繳王鞏文字當考詳增入劉摯閏八月六日記淮東提刑鍾浚體量王鞏事云有實狀送鞏供祈是與不是詣實此㫖用孫賁例也摯謂鞏不幸有賁近比又遭浚橫逆可為危之不知竟作何行遣今又為光庭所繳也癸卯龍圗閣待制權禮部尚書梁燾為翰林學士中書舍人韓川為吏部侍郎給事中兼侍講范祖禹為禮部侍郎按前月二十七日刑部侍郎彭汝礪執奏刑名後六日改禮部侍郎今汝礪猶在禮部更除范祖禹為侍郎禮部乃有兩侍郎前此所無不知何故十一月二十一日汝礪改吏部又除韓川禮部時祖禹在禮部如故至眀年六月十六日乃遷內翰川先祖禹五日出知穎州後祖禹兩日始除曽肇於是禮部侍郎止一人當考祕書監直祕閣王欽臣為工部侍郎寶文閣待制河北路都轉運使蔣之竒為刑部侍郎中書舍人孫升言之竒昔為御史以隂私事中傷所舉之人歐陽修不當擢用從之尋命之竒知瀛州孫升言之竒在二十二日今并書詔神宗皇帝御製近已成書令本所將邉機四十卷先次進樞密院令機要庫掌之刑部言蕃官授使臣若部轄蕃族寧靜不致引惹及無科率搔擾候及七年三班差使借差殿侍及十二年無過犯與磨勘如犯上條合計贓私公罪比展年法加一倍展年事理重者奏裁從之甲辰幸上清儲祥宫丁未詔社州向仲英男永利為銀青光祿大夫檢校國子祭酒兼監察御史武騎尉以仲英疾不任事也太常少卿盛陶言乘輿幸上清儲祥宫故事上自御幄循廊升殿今奉聖㫖厯階而升按儀注上惟於景霄紫極蕃釐三殿朝拜餘分命近臣今有㫖躬詣太皇太后皇太后本命殿焚香訖方還齊殿臣親覿聖德不敢寢默伏請宣付史館從之庚戌詔河東路提刑司將麟府豐州曽經西賊劫掠耕牛人户特許於常平錢內借錢收買耕牛其所借錢仍漸次催納辛亥直龍圖閣江淮荆浙等路發運使王覿為刑部侍郎龍圗閣待制知瀛州錢協為江淮荆浙等路發運使詔鄂特凌古進奉人並為銀青光祿大夫檢校國子祭酒兼監察御史武騎尉李阿旺隆倫約斯仍並充本族副軍主溪展充本族都指揮使結斡充本部軍主且鼐丹琳沁結瑪哩伊磋並充本族副軍主兵部侍郎王汾為寶文閣待制知齊州從其請也中大夫龍圖閣待制知洪州熊本卒鄜延路經略使范純粹奉凖樞密院劄子夏國既失恭順又復已絶恩賜必須輕忿日以擾邉為計必須別圖方略務使西賊不能近邉屯聚著業住坐庶使疲曳厭憚早期休息奉詔令帥臣精心講究密具方略疾速聞奏不得下司臣竊惟元祐以來朝廷之所以御夏人處邉畫者莫非以禮義為本以恩信為先雖彼屢肆跳梁邉民被害而一切容貸期于息兵然六七年間戌邉之卒未嘗減損金穀之費未嘗省羡備禦之計未嘗簡弛彼乃愈益猖狂邉患滋甚固宜朝廷之改圖也朝㫖所務使西賊不能近邉著業庶使疲曳厭憚早期休息此則為今日方略大概盡於此矣然臣聞梁葉普用事之久頗以能抗朝廷自誇於國中元祐二年三寇涇原衆號數十萬一路被毒而漢兵十一將拱手城中不出一騎使席卷而歸彼民迄今冤之後乃悉得前後所積嵗賜金帛等葉普每語人曰威明家人管國事有此功否南朝曽如此怕否後每舉兵必曰我之所以連年㸃兵者欲使朝廷憚我而為國人求罷兵耳以此狃衆故其衆益畏而未深怨也昔元昊叛時雖數遣人求和而故為悖慢難從之議朝廷既不從則語衆曰我求罷兵而南朝不許用此以歸怨激衆衆戰咸力葉普今乃效之今朝廷既議貶絶宜作邉帥草檄以淺近易曉之言具道葉普無厭犯順之詳朝廷用兵出於不得已之意令諸路多作印本以漢書蕃書兩兩相副散遣輕騎馳弃於賊疆百里之外以一𫝊十以十𫝊百則葉普姦謀衆當共知不惟可以伐狃衆歸怨之謀又足以激怒其衆使知禍自梁氏始庶有衆怨親叛之理則為中國之利也然而既遂貶絶則漢界自此須日為被寇之計以斥候之本須界外三二百里略無人跡則可以布置望候烽警之具欲無人跡須輕兵鋭卒淺攻近討不時而出然後我之所謀彼不及備而彼之舉動我必預知也朝㫖但欲使彼近邉之人不能著業臣以謂近邉之人不能著業未足繫彼國之要害使一國之衆奔命不暇而莫知所備斯可矣欲如是當令諸路帥臣公心協力謀議相關一路將有所舉則諸路陽為㸃集出兵之勢以留對境之備則實出路分賊無併兵拒敵之患諸路更守迭出勢分而力勞矣庶有厭憚止息之願也又自來諸路多務招納降人自元豐以來諸路所納不為不多若謂可以耗彼力戰之人則夏賊舉必數十萬豈招降之可耗也若謂可以助戰緣降人出入將帥豈敢全然倚仗危難所繫動費關防况其來率因漢兵侵迫避禍逃生反挈老小仰食漢界凡一壯一夫所携老小不下四五存留塞上則計口給食坐耗邉穀大率一户當數兵之費借有地土可給亦妨占弓箭手請射之田兼耕業未就理須給養其間仍多姦細緩急漢界有所舉動則猝然逸去致漏機事為患不細若遷徙內地則人情不安嗟怨失所自用兵以來遷配京西江淮之間者其數不可計矣契勘蕃户不得與漢人婚姻條禁之設良有深意既遷徙內地則嵗久之後冒禁必多種裔漸繁大失法意在昔有亂華之禍在聖朝當為萬世之計不可不謹亦防微杜漸之一也則是招納之䇿有害無益將來漢兵迭出宜悉止以清久弊所有其他合行事件惟恭聽詔㫖遵行貼黃臣再惟朝廷之所以改圗易議欲使諸路共講困賊之䇿者蓋欲使彼地不得耕人不遑息則必自謀休息之計若不以術制其動則兵既一出漢蕃之民被屠戮者不少矣是皆吾民而何所罪乎臣恐有纍聖朝好生之政兼上下狃於故常又將僞冒賞典復有前日之弊三者皆不可不慮也臣願朝廷如果於諸路互出鋭兵撓賊當密誡諸路帥臣每有所舉不過用為祕密略使兵聲先出勢若大舉使彼衆得以逺避我鋒然後出偏師以信其聲則其誰敢當要使數百里野無得耕之土衆無休息之期而已又申嚴博易之法以絶市貨則困賊之䇿在其中矣是不待多殺而為利也所有遇賊立功除士卒賞典行不逾時外其敢勇效用使臣以上功狀宜眀委轉運使副判官提㸃刑獄躬親採訪兩司共同保眀然後推恩亦未晚如此則出入主將知朝廷考實之意慮監司忽有按舉將有後悔庶幾功賞相稱少清欺冒之弊臣之區區有此迂說更煩朝廷採擇純粹以九月二十六日奏此密院劄子已見初七日但實録刪潤其辭耳今兩存之都水監言元祐七年春合差修河夫八萬人政目二十六日事當考壬子德音降天下死罪囚徒流釋徒罪已下上清儲祥宫成故也先是詔問建祥源㑹靈觀中太一宫成有無德音赦降王巖叟謂吕大防等曰此事如何大防曰數赦固非美事然聖意已發人亦盡知巖叟曰天禧年祥源成治平中醴泉成皆無赦何不用此例大防欲少損之止及三京或京師巖叟曰却恐四方疑惑妄意他事軍中又生覬望傅堯俞贊之劉摯曰赦文眀言為儲祥何疑惑之有巖叟曰雖眀言逺方不知妄意巖叟以為玉清昭應宫㑹靈觀景靈宫皆成於祥符並有德音赦降是時丁謂當國方以邪道媚上不可為法不敢察察言故但舉天禧治平及對大防曰數赦非國家美事兼恐四方疑惑并軍中覬望特支巖叟曰古人至有垂死諫君以願無赦而已者此可見赦無益於聖治太皇太后曰儲祥不得比㑹靈太一其中有三清大防請止及三京太皇太后曰必及天下至於再三每曰有三清摯曰當如聖諭大防遂曰請今夕鎖學士院降制從之癸丑御史中丞鄭雍言執政官行謁禁法非便詔官員有利害陳述勿禁吏部言武臣任六等差遣川廣成資餘三十箇月為任本部欲川廣舊係三年理為任六分內除豁一分餘路三年任滿減作三十箇月處於酬奬六分內除豁一分刑部言文書應奏有涉穢濫者並略說事宜聞奏其深涉穢濫及毒藥厭魅呪詛事狀悉隨事申尚書省樞密院並從之甲寅故溪洞歸眀州都巡檢向永眀男萬辛為銀青光祿大夫檢校國子祭酒溪洞歸眀巡檢兼監察御史武騎尉詔知麟州孫咸寧以斥候不眀致西賊攻擾令先次衝替十一月八日咸寧降監當紹聖三年正月二十七日密院言軍馬司張若訥降使額一官仍充鄜延鈐轄知麟州孫咸寧降兩官衝替此獨不書若訥當考兵部請應蕃官去失付身告敕文書之類不礙遷轉照使者借職以上展四年磨勘差使以下展七年磨勘礙磨勘者借職以上七年差使以下十二年其貨賣典當并受買典當各以違制論許諸色人告賞錢二百貫以犯人家財充應蕃兵諸事故子孫弟姪等承襲並令本城寨一季內取索保眀申舉若限內不為申舉許合承襲人陳告干繫官吏杖一百而別致欺弊詐冒承襲者其詐冒人以違制論干繫官吏減二等知情與同罪許人告賞錢二百貫以犯人家財充其合承襲人若過七年內陳乞更不受理蕃官蕃兵承襲並將合繳録白委官對讀真命具無差漏狀連申從之新本削去江淮等路轉運司言諸路凖備鹽昨凖元祐元年九月朝㫖立定荆湖江南蘄黃廬夀光舒州比元條減下外作一年至二年及宿亳滁和真揚濠泗州無為軍通泰楚海州作半年至一年近為諸路減價賣鹽數多有詔添復年分遂致積壓不便乞依元祐元年九月朝㫖從之新本削去詔以十月十五日朝獻景靈宫幸太學政目二十九日事刑部侍郎王覿言伏見東南諸路曩嵗財用最為足故自祖宗以來軍國之費多出於東南大中祥符三年九月江淮發運使李溥言今春運米六百七十九萬石諸路各留三年支用更留凖備上供及賑糶等米萬數至多天禧元年正月赦江淮等路上供米特罷今年春運一次臣竊思祥符中諸路上供之外既有三年之蓄矣天禧赦書又特罷春運一次又有以見真宗皇帝深思逺慮不惟憫漕運之勞而亦欲東南諸路蓄積常多也今東南財用窘耗日甚郡縣鮮有兼嵗之儲兩浙今嵗蘇湖秀三州水災本路轉運司及常平之物不足以充賑糶近取於江淮逺糴於荆湖然後僅能蘇三州之民則無備可謂甚矣淮南去嵗皆無大災傷而轉運司以軍糧急闕訴於朝廷每年冬借發運司米二十萬以充軍糧不幸有方數千里之水旱則何以為謀臣近者備員發運司在職嵗餘所領六路以上供錢糧不應期限而轉運司官吏該勘劾者凡四路非獨今嵗也前次逐路缺數亦多彼轉運司官吏豈不以失期冒法為懼哉蓋力既不足雖重得罪無所避也緣此諸路但務為逃責淺近之計而無暇及生財長久之道深可嗟惜臣所見者雖止於東南諸路𫝊聞其他路分亦多類此臣亦嘗詢訪轉運司財用日耗之因雖不能盡究其本末然有灼然易見者逐路用度寖廣而朝廷封樁浸多也且以數事言之選人添俸逐路添將兵諸州添公使物務監官添員外置凖備差遣大使臣凡此雖政事所係因時之宜不得不爾然若計其費則皆祖宗所未有也用度寖廣既如此又所謂封樁者寖多若賣鹽寬剩錢闕額禁軍請受減省造船錢之類名目甚多本皆轉運司之物而一切封樁歸於朝廷者寖多則轉運司安得而不窘乎臣固知封樁之物非以奉遊宴廣宫室飾苑囿侈輿馬也不過欲蓄積稍多而有以待軍國緩急之用而已然所謂蓄積者經費之外有餘然後可以為蓄積豈可輟有司之經費使不足用而名之蓄積乎今所謂封樁者有司不得輒用彼經費既闕反致嵗額上供之物公然負缺而不可詰又借貸於朝廷者雖經違限勘劾而竟亦不能償此豈長久之計耶臣伏望朝廷熟講而深圗之凡上供封樁之物前日祖宗所不取者皆付之轉運司使諸路轉運司稍得自足乃天下萬民之幸也政目於二十九日書支錢助河東當考詳增入
