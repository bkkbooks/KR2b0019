body:
  text: 續資治通鑑長編卷四百四十宋李燾撰哲宗元祐五年三月甲午侍御史孫升言臣聞天人相與之際甚可畏也蓋政事失於下則天變見於上如影響之應形聲也伏見自春以來雨澤愆期聖慮焦勞至誠惻怛憂念元元祈禱天地宗廟神祗可謂至矣然雲屢密而不雨或雨而不能雱霈未副陛下焦勞之意者何哉豈寃抑愁歎有所未伸以傷天地之和氣耶蓋匹婦銜寃猶能致旱况縉紳士大夫乎竊見比部郎中劉宗傑昔年因執政與御史協比追攝宗傑繫獄都省人吏希旨為姦宗傑久負屈抑一旦身居刑部因見從初行遣不公案牘恚憤不平遂再三論列雖事係大赦以前緣宗傑剛忿常罹繫獄之寃不能隱忍自謂今日可以暴露姦宄之惡朝廷怒其如此黜之郢州又下御史臺差人押出如宗傑一人固不足惜但自此陳訴六曹屈抑者每指宗傑為戒無復敢有再三奏陳者而尚書省諸房明有勑令應公文申陳論訴六曹行遣不當不得更付本曹自合本房取索公案考察當否與奪結絶臣訪聞尚書省諸房避見與奪行遣都司不復檢察往往却付本曹取會迂枉稽滯至有經年不決者受屈之人又不敢再有奏論愁歎之聲盈于道路天聽髙逺何由聞知况尚書省乃天下訴訟取決之地而稽違如此何以副陛下至誠惻怛憂念元元之意哉伏望聖慈特降指揮內外臣庶應有曽經朝廷論訴寃抑久未結絶者仰具詣實因依經登聞鼓院投進並送兩制諌臣取索從初一宗行遣看詳事理疾速與奪逐旋聞奏庶幾伸雪寃抑感召和氣少副陛下焦勞之意中外幸甚編類章疏係五年三月二十九日劉宗傑黜知郢州在四年三月八日是月宥州牒除塞門屈曲分畫其餘比接諸城取直畫定其間地土雖甚闊逺亦割屬漢此據政目但板數差錯或是正月末事當存此去彼御史中丞梁燾言臣聞湯以六事禱旱其一曰政不節歟今朝廷議減官俸罷吏祿君子嗟惻小人愁怨公利所得不多人心所失已甚減俸傷養亷之名罷祿有縱貪之實其近政不節矣伏望聖慈批降寢罷以安羣情貼黃户部置局減省已久四方取索文字紛紛不絶不惟減刻之名虧傷國體而又行移之迹動搖人情官吏坐食更增浮費但見所損未知所益伏望聖慈詳酌此事終是不便速賜指揮罷議浮費局但委本部郎官結絶減省一事今來人情嗟怨議論沸騰必已上達聖聽若忽降中旨罷局盡得中外歡心臣所以乞批降中旨所貴恩德上歸兩宫事體自合如此招怨動衆非今日可行之事伏乞深留聖意仍乞今後深察妄議一切不行漸就安靜上副清𠂻燾言不得其時因是春旱附三月末正月十日燾先有論列御史中丞梁燾等言燾去年十月四日為中丞臣風聞尚書省人吏時忱等四人用酬奬推恩具已擬定多是違法內任永夀自文資選人換殿直却留在省蘇安靜自主事減所少月日直補都事此二人尤為僥幸某人轉一資某人減二年磨勘太優永夀等四人素號強橫舞文用事自元豐以來大臣倚以為姦故不能制今執政亦有優容聽任之謗比來酬奬輒敢自營豈可更留政事之地伏乞聖慈明察候進呈文字特賜指揮且用擬定名目並與轉出如此處置可以少補威明存全公道此事臣等訪聞參考得實方敢上奏如聖意采用臣言即乞批降指揮應干繫人特免根勘其四人並依條與合出官逺小處差遣所貴中外咸仰威眀四人姦狀暴著人人皆知之獨恐朝廷未知爾言路既久聞公議沸騰不得不言今若取此四輩逐出示朝廷本不姑息此曹即自然羣情厭服人言可止臣恐來日便有進呈故急以奏聞蓋垂簾之際此等事不可使之浸長須當裁抑以正公道如出聖斷則下知敬憚政目五年二月二日都省吏蘇安靜時憚許出職三月二十六日都省吏時忱出職任永夀歸吏部又言竊聞尚書省人吏任永夀等四人連黨為私濫冒恩典超資越級紊亂法度閉塞公道羣情共怒御史劾治允合清議竊以正本之地綱紀所屬執筆之吏猶須審擇似此姦孽不可復留伏望聖明洞察並賜斥逐仍乞靣飭大臣盡公施行少懲官弱吏強之弊以正威柄貼黃胥吏營私冒利為事亦小至於壞亂法度欺罔朝廷其體甚大此臣不敢不言也伏望聖慈早賜施行以警姦慝又言臣近論奏御史劾治尚書省吏四人壞法盜賞並乞斥逐竊聞巳降指揮任永夀送吏部三月二十六日某人别無施行庇留僥幸制罰不眀愈為政令之纍清議殊未厭服竊以朋比為姦而不去是容其為姦而不禁其長惡也同罪而異罰非所以持刑之平而示天下以至公也然則何以尊朝廷之清眀懲小人之無忌憚乎伏望聖慈特賜指揮并出某人用臣僚所言某等罪狀眀行斥逐震摧隂慝以全綱紀某人當斥其姓名蓋時忱時惲蘇安靜也又言臣竊以今來臺臣奏劾尚書省人吏任永夀等四人事最得詳實此四人雖走立簿書之間氣岸侵侮口決可否招權用事從來最著外議沸騰人皆知之惟是聖聰髙逺久未徹聞大臣為此輩蒙蔽或有未知最是凌奪化權擅擬特旨壞亂法度情涉巨惡義不可容若不痛為懲誡小人轉更恣橫向去必有甚於此事者當兩宫臨御之時所當嚴謹法度肅正綱紀使中外逺近皆知敬憚此臣等所以望重賜施行也自合乞送所司根勘眀正典刑仰惟聖慈曲全仁貸慮致根株牽聨其事甚大故臣等但願逐去四人姦惡最甚者亦可使少知警懼若是姑息存留自此無復沮止百司胥吏無以懲誡其弊有不可勝言者伏望聖慈深以為念特降中旨早賜施行貼黃大臣本只是失點檢鹵莽為過至輕既聞有人言便合具實靣奏謝罪後乞一一改正如此方為公忠恭順若或委曲庇護妄説道理既不肯盡行其事又不肯逐去其人即是全無畏懼公然黨惡與之同為欺罔其罪甚大臣不敢便謂大臣如此伏望聖慈靣賜檢察如果涉此傲慢之迹亦望令臣等略知又貼黃臺臣今來論列此事乃是能為陛下點檢朝政闕失警察羣下蒙蔽不畏強禦不避怨怒無負於兩宫聖恩矣伏望睿慈更賜主張如因上殿敷奏優賜開納使得盡忠直之言上補聰眀又貼黃恭聞陛下至公無私以正天下至如昨來大臣朋姦罔上亦所不容况此三四黠吏玩法自營豈可一日而留有玷政事伏乞斷在不疑速賜施行免致言者紛紛紊煩聖聽若以過惡言之則某人為第一若以名目髙下言之則某人為第一然此四人表裏為姦大體相同不可使在政本之地伏望指揮與逺小處差遣眀年五月十八日中丞趙君錫言近降敕命任永夀決臀杖二十千里編管燾又言臣竊以左右司之職掌付十有二司之事以舉正稽違近者人吏違條冒賞事由都司而後下曽無舉正罪孰甚焉今若置而不問何以警飭慢官竊恐諸司綱紀寖以不舉公議廢欎有害政體伏望聖慈詳酌特賜指揮施行以示法令之眀貼黃狡吏亂法遂招物議已蒙朝廷逐去姦人無復可論者緣都司正是糾違之地而先自失職不可並無行遣此物議所以未平而言者不敢輒止也伏乞聖眀詳酌早賜指揮又言臣竊以臺諌近纍論列都司失職至今未蒙指揮朝廷方核功罪之實而示天下以至公尚書省政本之地而刑賞又政之大者有罪之罰不可略于近私而密於踈逺以疑清議伏望聖慈深察早賜指揮檢會纍奏施行又言臣近論奏都司失職乞賜詳酌行遣至今未聞指揮竊以都司為政府屬官所以補救執政之闕失而糾正諸有司之綱紀也茍曰事一出於其長而我不預焉安用其為屬官耶吏誕謾壞法而不知舉將何以盡糾正之任而為之長者亦誰賴而求全耶謂之委曲容姦則不可偏纍以私謂之偃仰忽事則不可獨歸其責朝廷方核功罪之實而示天下以至公尚書省政本之地而賞刑又政之大者不可私於比近而重廢法以疑清議焉欲望聖慈眀察指揮檢會臺諌官所奏參酌早賜施行侍御史孫升殿中侍御史賈易言升與易同奏據十二月十八日升劾杜常遷常少章臣聞威福專出於人主則賞罰公於天下執政大臣秉國之鈞惟德是與推平一之德則無偏黨重輕之私以至公為心則有進賢退不肖之别當垂簾聽政之日是輔臣一德之時茍違平一至公之心則致作福作威之漸此陛下不可不察也伏見中書省後省修六曹寺監祿額文字了畢置局纍年費用不少所減止及十萬尚書省吏額房又止是看詳重輕而本房人吏申請以為自來未有似此體大者瞞欺大臣聾瞽中外各徇私意僥幸恩典內蘇安靜乞先補正都事任永夀乞換本等班行時惲乞先次補守當官皆不候聖旨便行擬熟况特旨乃法令之外出於人主之意惟君上得專非人臣所擬今來三人既徇私意陳乞違條例恩賞不候聖旨更行擬熟則是爵祿名器胥吏自專而賞罰威福人臣可作安有仁聖在上忠賢協謀乃容此曹自擅爵賞肆已所欲紊亂紀綱且官弱吏強豈宜見於今日而廢法亂紀將必由於此曹臣誠孤微職在繩糾官為耳目茍懷畏避以自取容則上負陛下委任之誠下失微臣平生所守發於忠憤不避怨仇有補聖眀誅死無恨伏望聖慈察臣所奏少賜省覽宣示執政大臣自祖宗以來有司看詳文字有無大於六曹寺監祿額者本省人吏陳乞違條例恩典有無不候聖旨便行擬熟者出自聖斷早賜施行天下幸甚貼黃先朝創立官制為一代之典可謂體大矣豈與今來看詳六曹寺監祿額文字為比然官吏止是等第支賜即無法令之外特擬違條例恩賞事又言臣近論奏尚書省都司壞陛下之法廢陛下之令使法制不專於人主詔令不信於朝廷罪惡顯眀中外憤鬱若不眀行典憲何以肅正紀綱伏蒙聖旨付外施行臣竊聞都司官吏别無行遣止送任永夀歸吏部永夀送吏部在三月二十六日中外聞之莫不怪駭伏以朝廷上下維持者以有法度紀綱乃治亂安危之所繫也今都司官吏公然廢法令擬特旨擅爵賞肆已所欲紊亂綱紀執政大臣茍無容姦縱惡之心必正壞法亂紀之罪若姑息猾吏容養姦惡不正典刑異日將有甚於此者而人臣作福作威之漸必自此始陛下不可不以防微杜漸為戒也伏望出自聖斷别賜處分付有司眀正典刑則中外肅清天下幸甚貼黃臣前後奏論尚書省公然廢法令擬特旨擅爵賞紊亂紀綱今來若不正都司官吏壞法亂紀之罪則執政大臣何以自眀都司官吏顯有廢法欺君之罪若執政大臣姑息而不治則與都司官吏之罪同言事官知之而不言言之而不終是亦同為欺君之惡也又言臣伏以亂法之刑無重於矯制為臣之罪莫大於欺君於義必誅在法無赦謹按時忱等欺罔朝廷廢壞法度特旨出於君上而都司擅擬爵賞由於人主而忱輩自專紊亂朝綱損傷政體罪惡盈貫人神不容若不眀正罪犯而止送吏部不加竄黜而復齒仕塗則是欺君者不誅亂法者無罪何以尊主上之操柄杜人臣之僭竊臣為陛下耳目之官立朝廷紀綱之地將何靣目出入禁廷稱為御史若執政大臣不正忱等壞法欺君之罪即乞行御史妄言失職之誅以謝中外五月十八日永夀決杖編管又言臣伏以陛下臨御之初元祐元年十月所降勑條以防三省人吏冒賞之弊示至公於天下為萬世法都司郎官一旦廢而不用徇姦吏時忱任永夀輩私自陳請違條擬賞公議不容時忱任永夀輩陛下知其積惡為姦既皆屏斥獨都司郎中久未行遣中外為之不平論者謂大臣之意於屬官有所不忍且都官忍廢陛下萬世之法而重違姦吏之請安有大臣不忍行遣一二屬官而輕廢天下之公道乎伏乞出自宸斷早降指揮天下幸甚又言臣近纍奏論尚書省都司郎官廢陛下不刋之成法徇姦吏無厭之私請違條擬賞乞賜罷黜少慰公議至今多日未奉指揮臣誠孤微居紀綱之地以法度為職茍懷畏避言之不終是亦同為亂法欺君之惡也且朝廷上下維持者以法度紀綱而已法度之行必自近始其廢亦必自近始都司者所以按核六曹二十四司之稽違都司廢法則六曹廢法六曹廢法則百司廢法百司廢法則四方郡縣不守法上下如此何以為國乎此惓惓愚忠至於再三為朝廷法度紀綱不能自己也伏望聖慈省察檢會臣前奏早賜指揮則天下幸甚貼黃都司所廢之法乃陛下臨御之初元祐元年十月所降勑條以防三省人吏冒賞之弊示至公於天下為萬世法今都司官吏一旦廢而不用此臣所以尤為陛下惜之也元年十月八日胡宗愈上減定三省人吏酬賞之法右諌議大夫劉安世言臣伏見尚書省吏額房看詳中書後省所修六曹寺監祿額文字都事時忱於司勳所定酬賞之外别擬特旨違法推恩其事已具臺章臺章不知何時上當考中丞梁燾四年十月除殿中侍御史賈易四年五月除侍御史孫升五年三月自殿院除臣不復論竊聞近降指揮改從司勳元議而舞文之吏尚仍舊職事繫紀綱須至論列檢凖元祐元年十月十三日敕節文應三省人除嵗終比較屬本省外其勞績合推恩依例送吏部勘當上尚書省次第施行今來司勳既以勘當各已指定酬賞而都司輒敢廢格旋擬特旨所得恩例四人獨優僥幸無憚莫甚於此且天下之事既有定法循常進熟即可奉行惟是重輕可否之間規矩繩墨之外非常之斷必歸人主是以進呈之日靣取進止大臣於此猶不得專豈有胥徒乃可擅命冒昧公議欺罔執政違法亂紀漸不可長伏望聖慈詳察事理據今謬賞之人除若無大過自來不為人所指目者並依司勳勘當推恩且令依舊外其時忱蘇安靜任永夀時惲四人姦惡如此不可復留欲乞並除合得官悉令外補庶幾稍破黨與不致亂政又言安世集此係第二章臣近具劄子論列尚書省都吏時忱等四人舞文亂法過冒厚賞乞行罷斥以破黨與竊聞時忱及任永夀已令補外時忱出職任永夀送吏部在三月二十六日永夀後坐贓徒配五月十八日可考時惲蘇安靜尚留公府二月二日時惲蘇安靜許出職物議未安須煩天聽臣竊謂有司遷進數吏恩澤厚薄固未足論然尚書省乃政本之地法度之所自出若欲包容姦慝廢格條詔將何以訓迪在位表率四方臣詢採衆言考驗實狀惟此四人者招權用事蠧弊非一今去留相半無以示懲而又同罪異罰有害政體伏望聖慈深賜省察檢會臣前奏事理特降指揮并蘇安靜時惲悉令斥逐庶懲巨猾以厲其餘稍存紀綱不纍聖政又言安世集此係第三章臣近嘗論奏尚書省都事時忱等違法冒賞乞行斥逐雖蒙朝廷節次罷免時忱任永夀先出此云節次罷免則時惲蘇安靜亦相繼逐去也當考其時而考之輿論皆謂行之未盡公議尚鬱臣不敢蔽輒具條析上取睿斷臣伏見今年正月二十三日敕節文檢會吏部狀準都省送下任永夀等狀重别看詳六曹寺監吏人祿額文字了當今參酌欲任永夀候出職日循一資時惲候補充守當官日升四名蘇安靜與減二年磨勘時忱與減一年磨勘用為酬奬尚書省白劄子都司擬到時忱減二年磨勘蘇安靜擬特與先次轉補都事任永夀選滿合注判司簿尉以封樁户房合得循兩資乞換授擬特換本等班行依舊祗應時惲擬升八名緣有勞績六次該升兩名纍計十名擬免試先次特補守當官檢準元祐元年十月十三日敕節文今後應陳乞勞績各隨事大小施行不許併合就重陳乞臣看詳任永夀未合出官故吏部擬定候出職日循一資今來兼用封樁房轉官酬奬換本等班行即是併合就重其違法者一也又敕節文人吏主行文書職事當然若事成於已猶不可論功况出他人豈可冒受其係專置局及東西府宿司行遣事畢即許量勞支賜臣看詳蘇安靜等所行吏人祿額文字雖係置局蓋置局因藉門下中書後省已成之書覆行參校稍有損益既無絶異之效止合量加賜與而減年換官升名特補惟其所欲不顧條禁其違法者二也又敕節文諸色人酬賞並由司勳勘覆以防弊濫惟三省人勞績重者轉官輕者自來不送司勳一面擬畫遂致隂廢正條漸增優例今後應三省人有勞績合推恩送吏部勘當上尚書省次第施行臣看詳任永夀等所乞酬賞元送吏部本部即合遵守敕令量其勞效等第支賜而乃以減年循資升名之類上尚書省至於都司則又棄而不用更擬特旨倍加優厚其違法者三也臣伏觀陛下即政之初深患三省姑息之弊又因臺諌論列遂詔給事中中書舍人左右司郎官同裁定聞奏是時取會到治平以前及熙寧後來條例參酌到合行裁損事件十有七條臣前所引元祐元年十月十三日敕是雖未能盡除蠧弊而近嵗僥幸之風亦稍革矣臣竊謂朝廷所以治天下者莫大於典刑陛下既命大臣造出法度以授有司如已善已具則上下官吏所宜遵守奉行猶有未也則當條陳其事建乞改正今前件詔敕並無衝改不識有司安敢廢格其尤不可恕者都司於吏部所定之外别擬特旨假人主非常之斷奉胥吏無厭之求此而不懲公道將廢伏望聖慈審察事理應都司違法官吏並行罷黜吏部擬賞不當亦行責罰仍乞靣諭大臣協心奉法無縱舞文之吏以干至公之政天下幸甚又言安世集此係第四章臣近嘗論奏都司官吏違法擬賞乞賜黜責今已纍日未聞指揮臣竊惟尚書省乃政本之地而左右司所以副二丞轄糾正省闥自行官制以來尤為髙選非聰眀諳練守正不回之士孰宜居之乃者猾吏舞文妄干賞典都司眀知三省人勞績不許併合就重陳乞而公違詔敕以任永夀時惲自列微勞遂於吏額房酬賞之外更用别房恩澤換官特補以厭羣小之欲考之輿論皆謂永夀輩雖憑恃城社僥幸茍得而可否之決法度存焉為都司者誠能徇公滅私則與奪之際必合物議惟隂懷顧望奉法不謹是以典憲眀具未嘗衝改而輒敢廢格别擬特旨以此論之姦吏之妄訴則法在都司之失職則法亡不有顯黜恐無以為天下曠官之戒伏望聖慈檢會臣前奏事理早賜指揮施行安世又同右諌議大夫朱光庭言安世集此係第五章臣等今早延和殿進對嘗論都司官吏違法擬賞罪不可貸伏蒙面諭令臣等親至都堂理會者竊惟故事臺諌官登對畢自持劄子中書呈納故可與宰臣已下相見自垂簾聽政後來上殿臣僚止是封進劄子别無名目可至都堂是以未敢奉詔臣等謂朝廷所以為天下之本者以有法度也陛下設官分職內外錯綜所以行法也又置臺諌之臣付之言責所以司察中外之亂法者也今都司洎舞文之吏蔑棄典刑則是曠官臣等見亂法之臣而不能正則是辜陛下任寄方二聖臨御仰成大臣之日正是謹守法度維持紀綱之時而尚書省都司附下罔上廢格詔令若肅紀綱保守法度今後稍有畏憚易為彈壓據安世第七章云前月十九日所進劄子即指此但不知前月是何月耳以事先後推尋當是二月十九日蓋三月二十六日任永夀送吏部必因言者不休故有此行遣自永夀送吏部後言者亦止眀年五月間永夀決杖又自緣他罪然則言章並合附三月末為允其别幅畫一云安世集此畫一即與第六章同上臣聞羣姦被劾頗有遂非之論竊恐邪説交亂公議須至條列以破其妄伏冀萬幾之暇特賜詳覽或粗有義理者即早乞聖斷施行一檢準元祐元年十月十三日敕節文公府張置吏屬主行文書檢勘差謬乃其本職自非灼見隱伏事涉有害豈可一一論功編修看詳條例陳獻利害既如狀施行即不當無賞如此之類理當推恩勘會治平已前諸房亦有許點檢酬奬條例緣自熙寧後來始用升名之法但嵗終比較以為賞罰其後增纍夸大各自陳述未嘗比勘對理以至輕重不等至有頓升五六名之例誠為過當契勘左右司見凖朝旨修完人吏功過條例并已有元祐元年三月三十日條貫第三等以上勞績者許比較今申眀三省人吏點檢外司勞績等並許依舊施行其先修例册如有輕重過當仍逐事參酌增損立為定例遵守施行臣竊惟上條雖編修看詳條例有理當推恩之語緣下文有增纍夸大頓升五六名之弊又云左右司見修人吏功過條如有輕重過當仍逐事參酌增損聲説立為定例即是未有正法今來司勳拘泥理當推恩之文便將任永夀等定從優例臣以不見得左右司修到册惟據元條以熙寧後來升名之法指為過當今已裁損而司勳尚以時惲升四名蘇安靜等各減二年磨勘即是推恩已優與元初申請之意有所不合然而未至太甚臣是以止乞薄責一檢準元祐元年十月十三日敕節文檢會熙寧十年十月九日中書劄子應功過係兩事已上不得併入髙等各隨事髙下分為功過看詳上條所以約束不得併用者為逐事之中有不該收使等第假令不按治恐無以表率四方惟聖慈深察事理早行罷斥以伸公議安世又言安世集此係第六章又注留中兩字臣近已五次論列都司違法擬賞乞正其罪至今未蒙指揮臣竊料陛下所以難於必行豈非謂事連執政恐傷大體是以聊屈衆議以安大臣之心乎臣雖甚愚固已上體聖意然臣自叨諌列已踰二年前後奏章不啻數百惟是眀白的確為衆人所知者方敢以聞此則愚臣之所自信而陛下之所深察也乃者任永夀等妄干賞典臣所以不論執政而劾都司者蓋遷補人吏非大臣之事而尚書省白劄子眀稱都司擬到則是事由有司而起執政容或不知也惟其交結姦吏欺罔大臣蔽匿三省專條僥幸國家恩賞是以兩省諌官及御史全臺並具論奏乞行按治而小人被劾遂非畏罪巧説執政引咎自歸意望聖慈容貸以免已責又大言於搢紳之間曰御史言杜常赴時忱之會而實未嘗有事皆誣捃朝廷已寢而不行矣臣竊謂杜常曽與造時忱之門事迹曖昧言者得於風聞容有不審至於擬賞亂法則文案具在昭如日星三尺之童皆知其姦不待言而自辨就如其説御史兼指杜常之私行雖或失實姑息之可也諌官之疏蓋專論都司之曠職附下罔上罪狀顯著豈可以御史一事之誤而并棄諌官可行之言乎日近小人見公議之屈抑鼓舞抃躍屢有德色臣忝備言路義難緘默謹以元祐元年十月十三日敕文并今來違法之事隨其偏亂折以正論合為一奏具之别幅敢冀陛下深賜省察出臣後章付外施行臣亦不敢必望朝廷責降都司官吏但以此輩既任其職而不能守陛下之法尚容居位何補於事若陛下粗以臣言為是即乞批降指揮盡除外官或聖慮猶以為難願止令罰金上使兩宫不失禮遇大臣之恩次俾諌官御史稍舉職業下則罪人無所幸免而使羣小知朝廷有臣等振作逐事各理豈得併為一處顯是僥幸欲乞今後應陳乞勞績各隨事大小施行不許併合就重陳乞臣竊惟上條既已指定今後陳勞績各隨事大小施行不許併合就重是已有定法後來自合遵守今司勳以任永夀吏額房酬奬候出職日令循一資都司更以封樁房恩例纍併就髙等特換本等班行司勳以時惲候補充守當官日升四名都司更以左選勞績併作十名先次特補守當官顯是蔑棄典刑附下罔上臣是以乞行罷黜一檢準元祐元年十月十三日敕節文人吏主行文書職事當然若事成於已猶不可論功况出他人豈當冒受如開修運河大理獄空首末行遣皆出他司又自六曹勘當本房止是經手行遣却等第支賜事屬無名欲今後似此之類並不與推恩其係專置局及東西府宿司行遣事畢即許量勞支賜臣竊惟六曹寺監人吏祿額文字本係門下中書後省刪修成書尚書省止是覆行參較稍有損益止合引用上條量行支賜而遂非者以謂此條止為本房人吏立法如工房行修河禮房行大禮事畢之日方合支賜臣以為不然何者六房人吏若行本房公事自是職分當然豈得更别置局如邉事大禮河防轉補之類文字擁併期會促迫又自有東西府宿司行遣之法今來尚書省既創立吏額房之名抽差别房手分主行文字顯是專置之局既已了畢止合支賜而減年換官升名特補惟其所欲臣是以論司勳所定為太優而都司所擬尤為亂法也一檢準元祐元年十月十三日敕節文尚書司勳掌賜勳定賞録用世勞定無法覆有法看詳官吏諸色人酬賞並由司勳勘覆以防弊濫惟三省人重則轉官輕則支賜自來不送司勳勘覆却一靣擬畫推恩遂致隂廢正條漸增優例欲乞應三省人除嵗終比較屬本省外其有勞績合推恩依舊送吏部勘當上尚書省次第施行臣竊惟上條三省人吏應有酬賞所以必由有司者蓋欲稍抑僥幸之弊以存公道也今來任永夀等所乞賞典既送吏部雖司勳未有正條所擬差厚而參酌比附猶為有説尚書省自合依法次第施行而都司不憚無名更擬特旨所得恩賞例皆增倍假人主非常之斷以足姦吏之欲輕侮朝綱陵蔑公議此臣所以願陛下必行之也此别幅與第六章同上第七章所指前月十九日劄子應即指此也又言安世集此係第七章臣所以上犯聖顔下忤執政數進狂瞽期於必行者非特區區於二三郎吏而已所可深惜者陛下之良法也去嵗臣以職事進對親奉德音以謂臣僚才得冨貴便須改節伏蒙訓飭使臣常如今日自後洊承恩擢遂長諌垣誓堅一心上副聖意今都司官吏廢法而不守挾私而罔上恃賴執政不畏彈劾公肆大言必保無患臣若愛身固位置而不論豈非辜陛下拔擢之恩亦甚非愚臣平昔之志遂於前月十九日具都司違法之實并姦人遂非之論畫一條奏折以義理局蹐俟命今已半月豈陛下以謂既逐羣胥不必窮治故寢臣疏不付外庭乎臣雖至愚豈敢勸陛下為已甚之事蓋任永夀等雖已酬奬乃小人僥幸之常能未足深責為都司者茍有一人能執元祐詔書則必不至濫推恩賞惟交結羣小輕侮朝綱蔑棄典刑憑恃城社則是罪在有司不可不治臣前奏所謂姦吏妄訴則法在都司失職則法亡者正為此爾若不稍加懲戒深恐小人之氣日益增長臺諌之風遂將陵夷臣亦何顔敢處言路况臣所乞止於罰金既非深文惟欲少正國體伏望陛下察臣至懇以前月十九日所進劄子批降指揮施行又言安世集此係第八章臣竊惟三省之吏久習姑息朋黨交結牢不可破元祐之初司馬光秉政素疾其事亦會言者常有論奏遂具建眀乞加懲革尋奉詔旨專委給舍左右司同共詳定疏為新令十有七條裁抑僥幸時稱良法後人雖不能潤澤之猶當協力固守以示至公今敕文具在並無衝改而都司隂附羣小輒敢廢格倡為邪説文過飾非臣已於前月十九日畫一劄子中盡破其妄且公府設屬本以糾正省事若朋姦罔上蔑棄典刑既不加罪又俾在職異日有犯法亂紀不識何以詰之伏望聖慈特降睿旨檢會臣前後章疏早賜施行貼黃臣聞中書舍人顔復道右司朝端彥之語曰裏靣主張甚緊必然無事臣竊謂陛下常以至公為心決無主張小人之理不識端彥安得此言蓋有大臣漏露德音故使此輩恃賴愈增氣焰伏望陛下察其姦狀出臣畫一之章庶羣邪自知其罪不敢造播邪説以惑衆聽五月六日中書舍人顔復道改國子祭酒翼日卒五月八日右司郎中朝端彥為發運使或與此相關更須詳考之
