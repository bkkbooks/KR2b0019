  - {type: page-break, offset: 0, content: '', id: KR2b0019_WYG_320-1a, image: WYG0319/WYG0319-0372c.png}
body:
  text: 續資治通鑑長編卷三百十六宋李燾撰神宗元豐四年九月甲申朔知鎮戎軍种診言興靈州等處多舊漢人皆元昊所虜致者常有思漢之心乞明降指揮言梁氏殘害其主使衆心解離如有首領來歸特與官爵詔送髙遵裕降敕榜二十道付熙河都大經制司令廣募間人傳示賊界李憲言已遣使臣史誠齎書與果莊約會兵之所仍伺蕃兵所向乙酉上批陜西河東用兵雖已有漏泄禁約近多已傳逹委曲至河北緣邊州軍顯是方今預事文武官以私書漏露其事其令河東陜西諸路轉運經略等司遍約束轄下文武官不得與河北及四方親識通書説邊事若有彰露當械送下獄終身廢棄熙河路經略司言董戩首領李察勒沁等入貢稱董戩遣首領羅日軍督喬阿克恭及親兵首領馬哲卜尊等以七月辛丑部三萬餘人往赴當隆江齊暖及隆珠阿納等處擊夏國七月辛丑十六日是日李憲入蘭州是日乙酉九月二日也據丙申十三日奏新紀係之乙酉舊紀係之乙未舊紀誤也新紀云乙酉熙河經制李憲復蘭州丙戌澶州言浮橋壞十二月戊辰繫橋畢鄜延路轉運司言乞候出界専責總領兵官照應防護糧草詔兵與糧相須一體令常相依附權發遣環慶路經略安撫司髙遵裕乞詔緣邊諸路毋得妄稱西賊犯境多務殺戮恐致生羌驚疑有誤招納詔劄下送王中正种諤言涇原路經略司申明全師出境境內却以何軍兵為備臣詳朝廷先遣徐禧於諸路措置所定防守人數以義勇保甲及諸軍年髙人及不𨽻將兵代少壯兵出戰自當依詳法式詔涇原路經略司依此施行降知江寧府龍圖閣直學士朝奉大夫劉庠一官知滁州坐所舉人犯贓也丁亥都大經制瀘州蠻賊林廣言梓州路轉運司官程之才對獄董鉞除名兵行在近界首事務未有官管勾詔權發遣提舉常平等事江衍兼權轉運判官苖時中隨軍詔河北緣邊安撫司指揮轄下自今諜報事毋得申大名府路安撫司詔熙河路都大經制司已出兵破西賊慮賊併兵一路以拒官軍令王中正髙遵裕移節制兵馬近邊下寨以牽制賊勢如行軍庶事已就緒即相度乘機進討不須拘以元定日期仍具節次以聞洛苑使苖履左侍禁寄班祗候李宇為入西蕃撫諭使副各遷一官新紀丁亥敗夏人于西市與乙酉李憲亥復蘭州相接按西市捷報在戊子今于丁日不書此舊紀亦係西市新城之捷在丁亥今並不取戊子詔涇原趨興靈道路便近川原寬闊易得水草令髙遵裕領環慶路兵合涇原之師結為大陳取涇原路進討仍令盧秉應分戰守兵並聽遵裕處分秉時師涇原熙河路都大經制司以西市新城之捷聞捷在九月二十三日詔李憲方官軍未出境之際內外莫不以夏羌鋒鋭為憂深虞王師囏於萬全取勝及今首逢堅屯而能一鼓蕩散自非將帥有略曷以臻此然漢蕃士卒勇於赴敵所宜加勞可更切率勵兵衆以虞賊庭聞此沮敗併力來拒我師客省副使謝麟知誠州據沅州題名記麟自熙寧七年七月知沅州元豐四年十月移辰州五年三月還沅州恐實録此書誠州或是辰州當考史亦稱九月以謝麟知誠州已丑新知滑州朝請大夫周革乞出京師錢三二十萬緡修滑州橋及城於開封府界京西河北三路差兵詔昨曹村河決值北使至已嘗於白馬權繫橋専委將作監絶不費力今滑州修繫工力宜與前役不殊今周革陳乞事目甚多滋張必難委以辦事可差降授朝請郎俞希且知滑州革依舊知陳州措置麟府路軍馬司言覘知夏人集兵麟州境上防托兵數倍多望速下王克臣於近裏更選兵一萬以助兵勢及种諤出界戰士賞功乞早施行并李浦攻細浮圖恐避傷中數多不盡以聞乞下本路考實推賞從之鄜延路經略使沈括言與种諤議所留兩將兵追一將出界留一將及先留畸零兵以守疆埸從之庚寅詔熙河路都大經制司言已進兵深入賊界後繼别無聲援令胡宗哲於見在熙河路未出界將兵發兩將由乾州路入照應援助甲午上以疾不御殿乙未御垂拱殿初朝廷以敕榜招乞弟八月一日降敕榜尋詔今師期在近若分兵進討慮乞弟驚疑不出八月七日詔令林廣密相度止留兵五七千選將總領防托邊界如乞弟決不降徐行討捕所有林廣彭孫并其餘軍皆追回如此於邊防有無不便具以聞林廣既得敕榜復遣史利言抵乞弟巢穴付之乞弟約秋盡來降於是廣言臣密計若委一兩將留兵六千防托瀘州同本路轉運鈐轄司議徐行討捕詔所奏不行令依前後纍降指揮李憲言八月庚辰駐兵努扎谷遣漢蕃將士襲擊餘黨於山谷間斬百級獲馬牛孶畜甚衆降堪布嘉勒等二十二族首領凡千九百餘户已剪髮刺手給歸順旗及錦袍銀帶賜物又言大軍過康古川秉常僭號御莊之地極有窖積及賊壘一所城甚堅完無人戍守惟有弓箭鐵杵極多已遣逐軍副將分兵發窖取穀及防城弓箭之類詔陜西諸路轉運司今軍興常管設兵將用樂其有事合商議者許赴有樂筵會丙申措置麟府路軍馬司言起兵出界河外闕官已遣髙遵一赴府州防守乞下太原府施行從之熙河路都大經制司言九月乙酉收復蘭州蘭州古城東西約六百餘步南北約三百餘步大兵自西市新城約百五十餘里將至金城有天澗五六重僅通人馬自夏賊敗衄之後所至部族皆降附今招納已多若不築城無以固降羌之心見築蘭州城及通逺堡已遣前軍副將苖履中軍副將王文郁都大管勾修築前軍將李浩専提舉李憲又言乞建蘭州為帥府以鎮洮為列郡以浩為熙河蘭會路安撫副使兼知蘭州王文郁苖履為本路鈐轄牽復趙濟令兼熙河秦鳯兩路財利事應副軍須並從之其蘭州令李憲據軍前事力且粗修完為駐兵之所毋令過有費用俟王師撫定河南諸郡别議措置趙濟與通直郎權管勾熙河路轉運司李浩王文郁苖履令權領所乞職任候行營東上日留固根本其李浩以次須佐事之人亦即軍前權選委勾當乙酉九月二日戊戌詔鄜延路近奏西賊遺書於境上有侮慢之言料賊意以點集屯聚已久利在速戰冀取僥幸其令諸將審察賊謀務在審重勿因忿妄舉手詔陜西河東次邊近裏州縣比自議兵之初朝廷便選擇守令者不惟欲供辦軍須與轉漕之官協力蓋以部內兵民一朝悉發逺從征討則肅察姦宄綏靖鄉廬乃所責任可以朝廷之意丁寧申諭俾各遵守茍能於兵夫未還之間警察賊盜特為希少鎮拊部民各獲居安當議旌褒顯擢職任李憲言凖朝命為致賊之計見城蘭州內所以自固外不妨致敵兼已精選漢蕃徑兵五七千騎謀趣巢穴恐昧事機乞申訓誡以敕不至詔憲今官軍既城亭鄣外縶其手足又為戰筏內衝其腹心謀攻之術盡於是矣惟亟為之乃善己亥宰臣王圭上國朝會要三百卷仁宗時修會要自建隆止慶厯四年一百五十卷熙寧初圭請續之凡十二年乃成止熙寧十年通舊增損成三百卷於是編修官宣德郎李德芻遷一官知甘泉縣陳知彥循兩資管勾內臣劉惟簡李友詢馮仲禮各賜銀絹兩紀並書王圭上國朝會要詔沈括官軍非久出界管下名山靈祠當申禱告今降封香五合括可躬為祝文精虔分命官致禱訖奏鄜延路經略司言鈐轄曲珍等入西界應接投降首領及與邀截降人西賊鬭敵斬獲首級詔曲珍等遷官減磨勘年賜帛有差种諤乞計置濟渡橋筏椽木令轉運司發步乘運入西界詔凡出兵深入賊境其濟渡之備軍中自有過河索渾脫之類未聞千里運木隨軍今諤計置材木萬數不少如何令轉運司應副步乘縱使可以應副亦先自困令种諤如將及河造筏賊界屋並可毁折或斬林木相兼用之如更不足以至槍排皆可濟渡上坐制兵間利害細微皆得其要諸將奉行惟恐不及也上坐制兵間利害等語朱本增入新本因之上批朝廷見委官専經制瀘南蠻賊其措置軍馬經略敵情委之經制司其計辦軍食金穀什物委之轉運司兩司所任各有専責轉運提點刑獄司纍有謄奏侵越分守未欲劾罪自今非本職事不得輒受官司申報詔近令王克臣續發兵一萬與王中正今奏才及千八百餘人勘會熙河兵自出界其熙河秦鳯寨柵並無賊侵犯緣大兵已前進即包裹逐路城塞皆在腹裏豈有賊兵奔衝之理不須多留戌兵令克臣安心處置毋自驚惶惟與北界鄰接地不可減外其他州悉發以赴軍期毋得闕誤庚子詔朝奉大夫寶文閣待制知成德軍章衡落職守本官提舉洞霄宫坐縱指使回易公使及親眤小吏御史朱服言其醜迹下本路體量得實也舊紀書章衡故縱指使回易公帑落寶文閣待制提舉洞霄宫李憲言見議選將領兵照應修西使城俟船筏稍具即募敢死之士選漢蕃徑騎五七千謀趣巢穴况蘭州駐兵之所可粗修完留兵將守之詔今諸路兵朝夕出直趨興靈平蕩夏賊兼纍據董戩蕃字亦稱往靈州破賊憲奏乃欲俟船筏具選五七千騎往彼即未説全軍前進其令李憲等乘此期會協力深入撲滅巢穴若赴興靈道路阻逺即領全軍過河攻取涼州不得止遣偏禆以往仍降雜色戰袍勒巾百副銀纒桿槍五十條皆白氂牛尾纓紱付憲充奬激賜行營漢蕃戰士破賊有功及新附降人得力者髙遵裕乞兩路進兵攻討上批遵裕懇奏乞與涇原分兵出界今師期甚邇必處分不及中書樞密院可審議劉昌祚可與不可仗為一道主帥捨之當如何更為措置以聞遂詔許遵裕分路出界上批涇原兵力不逮他路邊面廣闊近纍據劉昌祚奏請多不中理慮難當一道帥領况涇原已𨽻髙遵裕節制自合首尾相應以圖萬全其令知環州張守約往代昌祚令昌祚赴遵裕麾下鄜延路轉運司言已差左藏庫使英州刺史鄜延路鈐轄兼第三副將劉紹能權河中府都監初鄜延路經略司言體量紹能出界擒獲西賊問知點集人馬即引兵還蕃兵獲一首級紹能言是其舅以物裹首不肯保明功賞慮别貯姦謀不可使將兵又蕃官殿直郝守素等使策木多哷克入西界呼舅碩勒喇等及謂沙木凌云我受文字相殺爾往説爾兄子等令夏人逺徙恐殺我親故事與前報頗符合詔令沈括付管押軍器內臣周圭同本路走馬承受霍丙押赴闕繫御史臺獄聽旨紹能卒無它二月二十八日鄜延經略司云云五年四月三日乃遣宇文昌齡往麟州置獄六年正月十三日獄決沈括言西賊聚兵各在本路對境慮大兵既入境賊乘虛冦襲即乞令監司或以次官權州事臣以經略都總管司職事領在城兵往照應從之權判都水監李立之言北京南樂館陶宗城魏縣淺口永濟延安鎮瀛州景城鎮在大河兩隄之間乞令轉運司相度遷於隄外其小吳決口以下兩岸修隄計工不少河清兵止有千餘人乞於南北兩丞地分客軍存留五十人更不放凍均與新立隄掃興修隄道依例月支錢二百從之辛丑上批勾當御藥梁從政可遷七資以推鞫韓存寶獄故也詔纍據林廣瀘州管下監寨覘乞弟多汗漫不實朝廷别無處分緣急遞文書須朝廷急切欲見者不可以常事虛勞人力仰林廣自今凡有諜報須事干急切或取候處分乃得上聞詔李憲蘭州駐兵逾十日矣雖興版築安置戌壘皆委官可辦固不須留連大軍主領今總兩路蕃漢兵夫十餘萬衆才入賊境百餘里便欲茍止乃正犯畫一約束可限指揮到火急部分諸將迤邐進兵或東上至靈州與諸路合或北渡河以趣涼州激昻士氣乘時奮功勿為遲疑自貽咎悔熙河路都大經制司言九月戊子蘭州新歸順首領巴凌克等三族領所部兵攻賊薩卜宗城斬獲三十餘級奪其渡船入河死者四五百人獲老小二百餘口牛馬孳畜二千餘見差次事功乞加優賞壬寅提舉河北路義勇保甲東上閣門使榮州刺史狄咨朝請郎劉定澶州集教大保長并監教使臣等四百八十二人見於崇政殿召執政賜坐閲試畢三人補三班借職三十三人補三班差使借差餘賜銀絹錢有差遷咨四方館使定集賢校理監教使臣等轉官或減磨勘年上寓軍政於保甲選吏督教者纍年法制完密皆出制定諸路服習至是引對咨等召執政賜坐以觀其成效遷補賞賚加等咨等亦優進職秩四方聞之靡然嚮風矣此朱本所增然墨本具矣今削去新紀書壬寅閲河北保甲于崇政殿官其優者三十六人舊紀書壬寅閲河北保甲武伎于崇政殿召輔臣賜坐官其優等者三十六人遷提舉官以下職秩有差鄜延路經略副使种諤言轉運使李稷置帳在臣軍中與所部兵夫遙逺其間彈壓不定慮致不虞詔李稷於可以照管夫糧處軍中安下邵氏聞見録云稷後移陜漕方五路興兵取靈武稷隨軍威勢益盛一日蚤作入鄜延軍營軍士鳴鼓聲喏帥种諤方卧帳中未興怪之出對稷呼鼓角將問曰軍有幾帥曰太尉爾曰帥未升帳輒為轉運糧草官鳴鼓聲喏何也借汝之頭以代運使從者叱出斬之稷倉皇引去怖甚不能上馬自此不敢入諤軍此事與此詔當參考詔奉議郎館閣校勘同知禮院王仲修罰銅十斤衝替仲修宰相圭之子先謁告往淮南諫官蔡卞言其在揚州燕飲所為不檢簽書判官邵光與之陪涉光替罷即差權都水監主簿衆皆喧傳非笑詔淮南轉運司體量轉運司言仲修因燕會與女妓戲有踰違之實故也甲辰詔沈括聞將官髙永能收西賊遺下梁永能文字其具以聞梁永能文字當考又詔括據措置麟府路軍馬司奏探得西賊對境大集兵馬屯聚八九處多至六七萬少亦不減二三萬人又於通道多塹絶山谷設為嶮阻其備甚謹未知虛實可多驗降人或得力間諜參證其事仍關報种諤令穩審大作枝梧及用心選擇進兵道路勿致為賊所誤又詔括及涇原盧秉曰大軍且出界朝廷日欲知其動靜卿可俟軍馬啓行如軍中未發奏間日遣人探候官軍所至及平安動靜以聞無令斷缺庶上下安慮詔李憲近據東北諸路所奏夏人舉一國之兵以當官軍約三四十萬之衆今西南地分全虛若非本路及董戩之軍深入以分其勢則慮得併兵東向以禦大軍爾宜依纍降處分部勒行營將兵并緊約董戩兵馬前去招撫討除或至靈武或趨涼州要當攻其所必救乃於首尾之勢有助無或觀望遷延有誤國事詔前江淮等路發運使朝散大夫沈希顔追三官勒停坐被召不即赴闕先已衝替下御史臺鞫之又供報不實也中書言前奏禘祫年數差互熙寧八年禘祫併在一年奉旨送詳定禮文所再參詳臣等謹按司尊彛凡四時之間祀追享朝享小史掌奠繫世辨昭穆大祭祀史以書敘昭穆之爼簋然則朝享及敘昭穆皆祫之謂也魯文公二年大事於太廟躋僖公而公羊穀梁傳俱以為祫是祫之義存於周禮春秋而不著其名也左氏之説則有禘而無祫祫之名見於禮記若止據夏商而言則曰祫禘祫嘗祫蒸若通據三代而言則曰祫祭於太廟祝迎四廟之主其行禮相距之年皆無文惟公羊傳曰五年而再殷祭禮緯曰三年一祫五年一禘而鄭氏徐邈又分為二説為鄭氏之説則曰前三後二謂禘後四十二月而祫祫後十八月而禘為徐邈之説則曰前二後三謂祭相去各三十月駮鄭氏者則曰三年而祫為月有餘二年而禘為月不足駮徐氏者則曰禘在祫前則是三年而禘祫在禘後則是二年而祫以二説考之惟鄭氏曰魯禮三年喪畢祫於太祖明年禘於羣廟自爾之後五年而再殷祭一祫一禘案春秋書僖公八年禘於太廟宣公八年有事於太廟皆因事而書其不書者可以逆推知僖宣當於二年喪畢而祫三年禘六年祫八年乃禘爾由此言之鄭氏依倣魯禮推明王制實為有據然自唐開元六年以後禘祫各自數年不相通計或比年頻合或同歲再序或一禘之後併為再祫或五年之後驟有三祭舛誤為甚本朝慶歷初用徐邈説每三十月一祭近歲又以二祭年數各不相因故熙寧八年既禘又祫此有司之失也伏請自今十八月而禘四十二月而祫庶幾舉禮不煩事神不瀆及據禮院檢會禮傳宗廟三年一祫以孟冬五年一禘以孟夏昨熙寧八年四月行禘饗十月行祫饗元豐元年十月行祫饗三年四月行禘饗今年十月當行祫饗謹案公羊春秋傳曰五年而再殷祭注謂三年祫五年禘蓋漢魏故事唐貞觀以後並用此禮至開元中禘祫之年不相通數禮官既覺其非乃用徐邈之説以二祭相去各三十月若甲年夏禘丙年冬祫已年夏禘辛年冬祫合五年再殷祭之説此最為得本朝自慶歷以來皆三十月而一祭至熙寧五年後始不通計年數遂致八年禘祫併在一歲所謂一歲再序也昨元豐三年四月已行禘禮今年若依舊例十月行祫饗即是比年頻祫復踵前失今欲通計年數皆三十月而一祭當至五年冬祫詔依見行典禮又言禘祫不當廢時祭從之禘祫不廢時祭四年十月二十一日依奏今并入此乙巳淮南路轉運淮南西路提點刑獄司言舒州近城有大澤出灊山注北門外繞城東南下通大江州城南及西門皆土城其東北才以竹木為籬元豐初山水暴漲浸官私廬舍至以船筏救護人民官物知舒州朝議大夫楊希元差雇兵夫築捍水隄千一百十五丈置泄水斗門二雖用工力而民不擾去歲七月霖雨溪水暴漲環繞堤外遂免山水入城之患詔楊希元降敕奬諭丙午詔修尚書省材木令知汝州李承之於本州界採伐及買如當親往即以州事令以次官權知敕榜招諭夏國曰眷兹西夏保有舊封爰自近世以來尤謹奉藩之職忽姦臣之擅命致弱主之被囚逮移問其端倪輒自墮於信約暴驅兵衆直犯塞防在天理之莫容因人情之共憤方切拯民之念宜興問罪之師已遣將臣諸道並進其先在夏國主左右并威明諸部族同心之人並許軍前拔身自歸及其餘首領能相率效順共誅國讎隨功大小爵祿賞賜各倍常科許依舊土地住坐子孫世世常享安榮其或違拒天兵九族並誅無赦蓋天道助順必致萬靈之歸王師有征更無千里之敵咨爾士庶久罹困殘其堅嚮化之心咸適更生之路敢稽朕命後悔何追兩紀並載詔語略有刪潤今存本文是日王中正發麟州禡祭祝辭云臣中正代皇帝親征兵六萬人民夫亦六萬餘人行數里至白草平即奏已入夏界留屯九日不進遣士卒往來就芻糧於麟州此據司馬記聞髙遵裕發慶州蕃漢步騎凡八萬七千人民夫九萬五千人种諤以鄜延兵五萬四千畿內七將兵三萬九千分為七軍方陳而進自綏德城出塞丁未攻圍米脂寨戊申詔秋銓試中等十人不依名次注官下等四十七人注官詔府界河北陜西集教民兵步人可並令兼誦念格內步槍法已酉詔沈括據熙河經制司奏問得所獲夏國首領威巴伊等云昨在賊界日衙頭自聞漢兵四出即分遣諸監軍司兵馬屬委賊帥總領謀抗官軍仍有戒令俾各析作三處一以當戰一以旁伏一俟漢兵營壘未定伺隙亂之今追驗近新城之戰信如其説方諸道進師謂宜遍諭將帥使知庶預知賊伎設施不誤大事卿可具此速牒軍前照會詔都大提舉修護澶濮州隄岸東頭供奉官張惠追毁出身以來文字除名勒停編管黃州前知南外都水丞承議郎蘇液前權發遣北外都水丞宣德郎陳祐甫皆追兩官前通判澶州承議郎戚守道追一官河北轉運判官吕大忠罰銅三十斤坐小吳掃河決也河北都轉運使王居卿乞自王供掃上添修南岸於小吳口北創修遙隄候將來礬山水下決王供掃使河直注東北於滄州界或南或北從故道入海朱本云奏不行刪去詔林廣言乞弟送降狀前後反覆必無降意但欲遷延月日以欵師期令相度降去敕榜如未可分付更不須齎送速進兵平蕩庚戌詔權發遣提點河東路刑獄兼提舉義勇保甲奉議郎集賢校理黃亷遷承議郎以引見澤州保甲推恩也保甲補官者五十八人亷行狀云保甲補官者五十八人今增入兼漕下獄事附十月十二日乙丑熙河路都大經制司言蘭州西使城川原地極肥美兼據邊面須多選募強壯以備戌守熙河民兵惟北關最得力又地接臯蘭歲入特厚芻粟充衍人馬驍勇今既復蘭州遂可廣行選募欲乞除留置官莊地並募弓箭手人給二頃緣初置州城難得耕牛器用若募新民必種植不時乞依熙河舊例許涇原秦鳯環慶及熙河路弓箭手投換仍帶舊户田土耕種二年即收入官别招弓箭手從之詔將來北使經過新路州軍守臣內有審官常格新差材品凡鈍難以酬接北人者可從中書預選官移易其知趙州史宗範磁相邢趙州通判令河北轉運司體量人材如不堪接待人使即於轄下選官對移並候人使回日依舊權發遣度支副使公事河北東西路體量安撫寋周輔奏乞就西山採斫木植修蓋北京等處倉厫等從之仍命周輔經畫提舉四月二十八日周輔被旨修蓋定瀛澶三州倉此云北京等處當考种諤攻圍米脂寨三日賊堅守未下方為距闉諤暮出視士卒皆有疲曳之色或報援兵且至衆洶懼諤令軍中皆鼓樂按轡徐還衆乃安翌日賊兵八萬餘人自無定川出直抵我軍將合米脂之衆以夾攻我諤命後軍移陳城下溝其門隧使城中人不得出命前軍及屬羌循兩山伏山谷中以左右中軍禦賊於川口辛亥合戰諤鼓之諸將齊進伏兵旁發斷賊兵為二首尾不相救諸軍從髙處前後擊之賊奔潰所斬殺及自相蹂踐顚仆而死者橫數十里銀水為之赤擒其將都按官瑪尼策多克等七人獲首五千餘級獲馬五千孳畜鎧甲萬計要録諤復攻城辛亥九月二十八日也十月五日戊午奏到舊紀於十月戊午書鄜延路經略安撫副使种諤敗夏人於無定川斬級八千新紀書辛亥鄜延經略副使种諤敗夏人於無定川壬子上批鄜延等路大軍非久乘勝進至靈州萬一未有濟渡之具致賊稽誅不可不預為謀畫宜令熙河路都大經制司密選間人齎信號或移牒涇原等路舉橫烽至熙州俟得本州馳報即部勒兵馬駕船筏東下接濟諸道之師併力蕩除巢穴又批沈括勘會軍前兩日並無奏報深慮道路阻隔有賊馬障蔽卿可火急多選差人探候行營所至以聞聞种諤見移寨來宥州討擊可多方從西路或中路廣委人通逹息耗勿令斷缺又批聞三司昨雇百姓車户大車輦絹赴鄜延路才入半道其挽車人已盡逃散今官物並拋棄野次逐縣科差保甲甚擾費人力未知何人處畫如此乖方可取索進呈三司言起發應副鄜延環慶涇原三路經略司絹十七萬五千匹市易司起發十五萬五千匹用騾百二十四頭及管船水運至西京乃用步乘應副河東衣賜絹十萬匹赴澤州紬二萬匹用騾百八十三頭及小車五十輛并槖駝般馱又三萬匹用步乘應副延州銀十五萬兩鹽鈔三萬席用騾九十八頭絹十五萬匹為五綱一綱用槖駝四綱用小車二百一十輛應副河東鄜延環慶涇原熙河秦鳯路紬絹總百萬匹用小車為三十綱並不用官私大車輦載詔三司選差勾當公事官一員緣路點檢催趣其津般乖方處根究以聞詔以熙河行營兵出暴露日久遣入內東頭供奉官甘師顔往傳宣撫問兼賜將官等茶藥銀合兵員以下特支錢又詔自京至陜西河東用兵路分馬遞鋪各賜特支錢詳定禮文所言古者下宗廟欲乞親祠大輅入太廟西門近廟南門即降輅步入廟少東升輦就大次仍自今羣臣奉祠並於西櫺星門外下馬從之又言謹按禮曰冬日至作樂於地上之圜丘若樂六變則天神皆降可得而禮矣又曰祭天掃地而祭焉於其質而已矣又曰有以下為貴者至敬不壇掃地而祭則古者祀天奏樂於圜丘升煙於泰壇並以降神設饌在地所以祭之故崔靈恩云燔柴升煙取因髙之理正祭之時皆於地上故馬昭髙堂隆等親述鄭義以對王肅皆云祭天不在於壇後世築壇八陛祀天其上奏樂其下非禮之正臣等欲乞更今之壇以為圜丘奏樂其上而於丘南設饌於地以行正祭庶合禮經有以下為貴者且明尚質之義臣等雖稽古制謂宜如此然郊丘大事乞以聖意裁之不從九年四月二十九日中書批詳定禮文所狀奉聖旨不行今附見於此六月十四日説主日配月位當考
