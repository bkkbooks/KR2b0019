  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0019_WYG_010-1a, image: WYG0314/WYG0314-0120c.png}
body:
  text: 續資治通鑑長編巻六宋李燾撰太祖乾德三年春正月甲戍詔蜀將卒死鋒刃者所在官為収瘞行營戰士被傷者主帥給以繒帛蜀主聞王昭逺等敗甚懼多出金帛益募兵守劍門命太子元喆為元帥武信節度使兼侍中李廷珪廷珪初見天福十二年及前武定節度使同平章事長惠安惠安未見副之帶甲萬餘旂幟悉用文繡綢其杠以錦將發而雨元喆慮其沾濕悉令觧去俄雨止復斾之則皆倒懸杠上元喆又輦其姬妾及伶人數十以從見者莫不竊笑王全斌等自利州趨劍門次益光㑹議曰劍門天險古稱一夫荷戈萬夫莫當諸軍各宜陳進取之策侍衛軍頭向韜曰得降卒牟進言益光江東越大山數重有狹徑名來蘇蜀人於江西置栅對岸可渡自此出劍門南二十里至青疆店與官道合若大軍行此路則劍門之險不足恃也全斌等即欲巻甲赴之康延澤曰蜀人數戰數敗膽氣奪矣可急攻而下也且來蘇狹徑主帥不宜自行但可遣一偏將徃耳若抵青疆北與大軍夾撃劍門昭逺等必成擒矣全斌等然之命史延德分兵趨來蘇跨江為浮梁以濟蜀人見之棄寨而遁延德遂至青疆王昭逺等引兵退駐漢源坡以其偏將守劍門全斌等以鋭兵奮撃破之及漢源趙崇韜布陣策馬先登昭逺據胡床不能起崇韜戰敗猶手斬數人乃被執昭逺免胄棄甲而逃全斌等遂取劍州殺蜀軍萬餘人昭逺投東川匿民倉舎下悲嗟流涕目盡腫惟誦羅隱詩曰運去英雄不自由俄亦為追騎所獲太子元喆與李珪等日夜嬉遊不恤軍政至緜州聞劍門已破將退保東川翌日棄軍西還所過盡焚其廬舍倉廪乃去蜀主知劍門已破太子元喆亦奔還惶駭不知所為問左右計將安出有老將石奉頵者案五代史作石頵薛應旂續通鑑作石斌與此互異對曰東兵逺來勢不能乆請聚兵堅守以敝之蜀主歎曰吾父子以豐衣美食養士四十年一旦遇敵不能為我東向放一箭今雖欲閉壁誰肯効死者司空兼武信節度使平章事李昊勸蜀主封府庫以請降蜀主從之因命昊草表己夘正月七日也據孟昶後所上表云爾遣通奏使宣徽北院使太原伊審徵審徵初見廣順元年奉降表詣軍前初前蜀之亡也降表亦昊所為蜀人夜書其門曰世脩降表李家當時傳以為笑熊克九朝通畧又王衍降唐日李昊草其表庚辰詔行營所經州府長吏以牛酒犒師乙酉王全斌等次魏城伊審徴以蜀主降表至全斌受之遣先鋒都監通事舎人田欽祚乘驛入奏又遣康延澤領百騎趨成都見蜀主諭以恩信慰撫軍民留三日乃還欽祚汝隂人也髙麗國王昭遣使來貢方物戊子吏部郎中鄧守中守中未見坐試諸司吏書判考覈不當上命覆試黜退者數人貶秩為員外郎荆南民多流移己丑詔長吏招撫復業初劉光義等發䕫州萬施開忠等刺史皆迎降及遂州知州事少府少監陳愈亦降光義入城盡以府庫錢帛給軍士諸將所過咸欲屠戮以逞獨曹彬禁之乃止故峽路兵始終秋毫不犯上聞之喜曰吾任得其人矣賜彬詔褒之辛夘王全斌等至升仙橋蜀主備亡國之禮見于軍門全斌承制釋之蜀主復遣其弟保寧節度使雅王仁贄奉表求哀仁贄初見乾祐三年九國志孟昶世家及蜀檮杌皆言全斌承制釋昶罪昶翌日遂舉族歸朝據國史昶𫝊昶既見全斌復遣仁贄奉表得太祖還詔乃出蜀又據全斌𫝊全斌等入成都後十餘日劉光義始自峽路至昶饋遺光義及犒其師並如全斌等若全斌十九日入成都昶二十日遂行安能饋光義且犒其師也然所稱後十餘日亦恐差誤按新録光義遂州之奏以二十一日到京師度其克遂州時必在中旬初遂州至成都不逺無緣滯留兩旬後始到也當是全斌等於魏城得昶降表後十餘日耳得降表十餘日乃二十三四間此時昶固未出蜀猶可以饋遺光義且犒其師也錦里耆舊傳云二月四日光義入城續傳又云十一日南路大軍始入城前傳差近之續傳比全斌傳又增十餘日矣今皆不取昶舉族歸朝疑在丁酉赦書到後不然二月間與偽官同發恐不能待仁贄還詔矣續耆舊傳云二月十九日離成都自眉州乘船下峽前傳又云十七日兩說又不同莫知孰是或者全師雄作亂二月間道路不通少留眉州三月上旬末始得下峽乎仁贄以正月十九日赴闕二月十九日見昶復上表謝不名及呼國母則三月七日也丙申田欽祚至自西川孟昶降表以其先人墳廟及老母為請上優詔答之并諭西川將吏百姓等使皆安堵如故丁酉赦蜀管内蠲乾德二年逋租賜今年夏稅之半凡無名科役及增益賦調令諸州條析以聞當除之成都民食鹽斤為錢百六十減六十諸州鹽減三之一民乏食者賑之擄獲生口還其主偽文武官將校奉孟昶來降者並委王全斌奏其名亡命羣盗許一月内陳首有懐才挺操恥仕偽庭者所在搜訪先賢丘壠並禁樵採前代祠廟咸加營葺自全斌等發京師至昶降才六十六日凡得州四十六縣二百四十戸五十三萬四千二十九宋朝大事記以劍閣之險太祖取之兵不過五萬自發京師至昶降不過六十六日何其易耶觀其遣將之日先為蜀主治第以待其至詔有司治昶第一區凡五百餘間遂以賜之又命所破郡縣傾府庫以賞戰士國家所取惟土疆爾則太祖混一之志固有以知之也初王師之下西蜀也諸將所過咸欲屠戮獨曹彬禁止之上聞之喜曰吾任得其人矣賜詔褒之王仁贍自蜀返歴詆諸將獨曰清廉畏謹不負陛下惟曹彬一人爾上嘗問彬以官吏能否彬惟薦沈義倫可任初沈義倫為随軍轉運使入成都獨居僧寺蔬食東歸篋中所有圖書數巻上聞清節故擢用之人言創業之初貪可使也愚可使也詐可使也茍可以辦吾事而已是不知師之上六開國承家小人勿用之義也漢髙祖雖得韓彭之力然終受韓彭之禍我太祖平蜀之功賞曹彬而責全斌任義倫而責仁贍或告全斌仁贍等在蜀豪奪子女隐没貨財上責之盖以曹彬用兵秋毫無犯義倫東歸圖書數巻而全斌仁贍之功不足以贖其貪酷之罪愛民之仁御衆之術兩得之矣全斌等既入成都後數日劉光義等始至孟昶饋遺光義等及犒師之禮並如初已而詔書頒賞諸軍亦無差降兩路將士争功始相疾矣先是全斌受詔每制置必與諸將僉議因是各為異同雖小事亦不能即决全斌及崔彦進王仁贍等日夜飲宴不恤軍務縱部下掠子女奪財貨蜀人苦之曹彬屢請旋師全斌等不聽全彬遣右神武大將軍王繼濤與供奉官王守訥守訥未見部送孟昶歸京師繼濤求宫人及金帛於昶守訥以白全斌乃留繼濤不遣繼濤河朔人也仁贍按籍詰所在軍資將治李廷珪焚蕩之罪廷珪恐問計於康延澤延澤曰王公志在聲色茍得其欲則置不問矣廷珪素儉約不畜妓女乃求諸姻戚得四人復假金帛直數百萬以遺仁贍由是獲免是月改通州為逹州改萬春殿為長春殿二月壬寅朔司天監言日當食騐天不食此據㑹要癸卯命参知政事吕餘慶權知成都府樞宻直學士馮瓉權知梓州舊録在正月丁酉丁酉二十五日也今從新録及本紀續耆舊傳云餘慶以二月十二日到十二日癸丑也恐此時餘慶亦未能到但除目到耳餘慶至成都時盗四起將士猶恃功驕恣王全斌等不能禁一日藥市始集街吏馳報有軍校被酒持刃奪賈人物餘慶立命擒捕斬之以狥軍中畏伏民乃寧居瓚至梓州視事才數日㑹偽蜀軍校上官進嘯聚亡命三千餘衆刼村民數萬夜攻州城瓚曰賊乘夜奄至此烏合之衆以箠梃相擊必無固志正可持重以鎮之待旦自潰矣城中止有雲騎兵三百人分使守諸門瓚坐城樓宻令促其更籌未夜分撃五鼓賊驚遁去因縱兵追之擒上官進斬于市招降千餘人並釋其罪令復業州境遂安以興州馬歩軍都指揮使趙彦韜為興州刺史酬其鄉導之功也興州領罝口寨寨多戍兵監軍傲很縱其下暴横居民苦之通判周渭馳徃諭以禍福斬其軍校衆心大服上聞而壯之詔書嘉奬命兼本寨鈐轄渭為興州通判不知何時疑初得興州即以命渭故因趙彦韜除刺史附見此事非有所按據也更須考詳唐主煜及吳越王俶並遣使修貢賀長春節丙午詔以西師所過民有調發供億之勞賜秦鳳隴成階㐮荆南房均等州今年夏租之半安復郢鄧州光化漢陽軍十之二居坊郭者勿輸半年屋税又詔偽蜀文武官並遣赴闕賜裝錢有差治行清白為衆所知者所在州府以名聞發文武官赴闕新舊録並無之此據本紀丁巳權知貢舉盧多遜奏進士劉察等合格者姓名凡七人庚申孟仁贄至自成都孟昶所上表有自量過咎尚切憂疑等語詔答之其畧曰既自求於多福當盡滌于前非朕不食言爾無過慮所答詔仍不名又呼昶母為國母詔自嘉眉忠萬至荆南沿江分置驛船以濟行李令文武官任川峽職事者不得以族行元從及僕使以自随者具姓名報樞宻院給劵三月壬申朔宴廣德殿先是長春節後未賜宴孟昶納降表使至故緩癸酉詔諸道發義倉賑饑民者勿待報乙未詔河東境上軍寨分遣人入北漢界招諭將吏兵民茍能去逆效順當倍加安撫卑職者命以髙秩假攝者授以正員晋州言北漢羅侯松谷兩寨指揮使張貴等七百餘人來歸以蜀降卒為奉義懐德懐愛軍五代以来領節旄為郡守者大扺武夫悍卒皆不知書必自署親吏代判郡政一以委之多擅權不法戊戍詔諸州長吏或須代判許任賔席公幹者勿得使用元從人是月孟昶與其官屬皆挈族歸朝由峽江而下據實録此月戊寅孟昶上表謝詔書不名及呼國母戊寅初七日也昶傳稱昶得太祖還詔乃赴闕故隐度附見其事于此月然續耆舊傳云二月十九日離府自眉州乘船下峽沿路多值冦盗盖二月十九日初發成都其發眉州則續傳無其日或少留滯不可知也得還詔乃赴闕疑本傳必不妄則附其事于此月差審初詔發蜀兵赴闕並優給裝錢王全斌等擅減其數仍縱部曲侵撓之蜀兵憤怨思亂兩路随軍使臣亡慮百數全斌及王仁贍崔彦進等共䕶恤之不令部送但分委諸州牙校蜀兵至綿州果刼屬縣以叛㑹文州刺史全師雄挈其族趨京師過綿州師雄嘗為蜀將有威惠恐叛兵脅之乃棄其家自匿後數日叛兵搜得之江曲民舎遂推以為帥衆十餘萬號興國軍全斌遣馬軍都監朱光緒將七百騎徃招撫之光緒盡滅師雄之族納其愛女及槖裝師雄怒不復有歸志引衆急攻綿州刺史成彦饒以同華兵百餘人守其城横海指揮使下邳劉福龍㨗指揮使汾人田紹斌各以所部兵來援紹斌自東山西北迎擊賊福由山南出賊之旁夾攻之賊衆大潰斬首萬餘級擁入江水溺死者亦萬計紹斌又敗龍州賊黨千餘人師雄去攻彭州刺史王繼濤都監李德榮拒之都監戰死繼濤身被八創單騎走成都師雄入據彭州成都十縣皆起兵應師雄師雄自號興蜀大王開幕府置僚屬署節度使二十餘人令分據灌口導江郫新繁青城等縣彦進與歩軍都指揮使張萬友先鋒都指揮使漁陽髙彦暉通事舎人田欽祚同討之彦暉至導江與賊遇賊據隘路設伏竹箐中官軍直進箐中賊出官軍不利彦暉謂欽祚曰賊勢頗盛日將暮首尾不相應盍収兵詰朝與戰欽祚將遁慮賊踵其後紿謂彦暉曰公食重禄見賊逗撓何也彦暉即麾兵復進欽祚乃潛去彦暉獨與部下十餘騎力戰皆死之賊衆益熾全斌又遣馬軍都指揮使張廷翰歩軍都監張煦張煦未見徃擊之復失利還師雄分兵緜漢州斷劍閣縁江置寨聲言欲攻成都自是卭蜀眉陵簡雅嘉東川果遂渝合資昌普戎榮十七州並随師雄為亂郵傳不通者月餘全斌等懼時蜀兵幾三萬人屯城南教場全斌慮其應賊徙置夾城中將盡殺之康延澤請釋其老幼病者七十人餘則以兵䕶送浮江而下若賊果來劫奪即殺之未晚也全斌等不從據耆舊傳則誅夾城降兵乃四月一日而本紀實録並載之二月末不知何也豈二月末誘致而未誅四月初始誅之實録本紀因其誘致即并書其事乎然事不容如此遲乆耆舊傳當得其實也光緒彦饒德榮未見張煦有傳開封人開寳末為府中牙校非此歩軍都監也自唐天寳以來方鎮屯重兵多以賦入自贍名曰留使留州其上供殊鮮五代方鎮益彊率令部曲主場院厚歛以自利其屬三司者補大吏臨之輸額之外輙入已或私納貨賂名曰貢奉用冀恩賞上始即位猶循常制牧守來朝皆有貢奉及趙普為相勸上革去其弊是月申命諸州度支經費外凡金帛以助軍實悉送都下無得占留去年已有此詔故此云申命時方鎮闕守帥稍命文臣權知所在場院間遣京朝官廷臣監臨又置轉運使為之條禁文簿漸為精宻由是利歸公上而外權削矣國初貢賦悉入左藏庫及取荆湖下西蜀儲積充羡上顧左右曰軍旅饑饉當豫為之備不可臨事厚歛於民乃於講武殿後别為内庫以貯金帛號曰封樁庫凡歳終用度贏餘之數皆入焉别置庫本志及他書皆云在乾德初未審何年計必是平西川後也因命諸州不得占留金帛附見其事夏四月辛丑朔王全斌誘殺蜀兵二萬七千人於夾城中此據唐延澤平蜀實録與耆舊傳合詔孟昶先代墳塋無得焚毁復守冢戸官嵗給粟帛充時享乙巳輝和爾遣使來貢方物壬子令京城夜漏未三鼔不得禁止行人癸丑唐主遣使來修貢賀平蜀也丙辰改西川感化耀武等軍並為虎㨗王全斌奏諸軍平草冦有功請備禁旅故也癸亥募諸軍子弟導五丈河貫宫城歴後苑内庭池沼水皆至焉乙丑放洋州義軍八百人歸農賜西川行營將士薑茶五月辛未朔詔諸道州府先發遣前資幕職令録等到闕已經引對者各放還去京二千里者减一選已上者減兩選無選可減者免取文觧便令赴集壬申幸迎春苑宴射先是上遣使以御府供帳迓孟昶於江陵且命有司為昶官屬治第又遣使至江陵分給鞍馬車乘乙酉昶至近郊皇弟開封尹光義勞之玉津園丙戍大陳諸軍於闕前昶與弟仁贄子元喆元珏元珏初見乾祐三年宰相李昊等三十三人素服待罪明德門外詔釋罪賜昶等襲衣冠帶上御崇元殿備禮見之禮畢御明德門觀諸軍按部還營遂宴昶等於大明殿賜物有差丁亥賜侍衛諸軍内庫衣服錢帛有差戊子赦天下死罪降徒流流以下釋之配役者免居作己丑免孟昶三日朝叅壬辰復宴昶及其子弟于大明殿于闐國宰相因沙門善名等來京師致書于樞宻使李崇矩願結歡好上令崇矩報書賜以器幣詔諸軍小校以上死者官給賻物或嗣絶及孤幼不能申請者令中使就賜之遣常参官十八人分徃諸道受民租慮州縣官吏掊歛之害也偽蜀官倉納給用斗有二等受納斗盛十升出給斗盛八升七合詔自今給納並用十升斗據本志分遣常參官受民租在乾德二年五月其下即言偽蜀用斗按二年則猶未平疑二年字當作三年今移見于此是月唐司空平章事嚴續出為潤州節度使時機務多歸樞宻院宰相備位而已中書舎人樞宻副使豫章陳喬柔懦畏怯吏潛結權倖多為非法皆不能制喬累遷門下侍郎樞宻使喬初見顯德五年六月甲辰以孟昶為開府儀同三司檢校太師兼中書令秦國公長子元喆為泰寧節度使伊審徴為静難節度使戊申以昶弟仁贄為右神武統軍仁裕右監門衛上將軍仁操左監門衛上將軍次子元珏為左千牛衛上將軍李昊為工部尚書歐陽炯為右散騎常侍仁裕仁操見乾祐三年庚戍孟昶卒上為輟五日朝贈尚書令追封楚王謚恭孝賻布帛千疋塟事官給初昶母李氏随昶至京師上屢命肩輿入宫謂之曰國母善自愛無戚戚懐鄉土異日當送母歸李氏曰使妾安徃上曰歸蜀耳李氏曰妾家本太原儻獲歸老并門妾之願也時上已有北征意聞其言喜曰俟平劉鈞即如母所願因厚加賚賜及昶卒李氏不哭舉酒酹地曰汝不能死社稷貪生至今日吾所以忍死者為汝在耳今汝既死吾安用生因不食數日亦卒潞州言太原官吏將校多來歸者詔優給裝錢部送闕下初南漢邵廷㻆屯於洸口以待王師㑹王師退舎廷㻆招輯亡叛訓士卒修戰備國人頼以少安有投匿名書譖廷㻆將圖不軌南漢主信之是月遣使賜廷琄死士卒排軍門見使者訴廷琄無反狀請加考騐弗許乃相與立廟洸口祠之秋七月己巳上泛舟於後苑新池賜從官飲遣使犒西川行營將士乙亥珍州刺史田景遷内附丁酉幸教船池遂幸玉津園宴射詔洽州復為懿州時五溪團練使洽州刺史田處崇言先是湖南節度使馬希範以叙州潭陽縣為懿州命臣叔萬盈為刺史希範死其弟希萼改為洽州願復舊名從之仍鑄印以賜處崇是月始令諸州録参與司法掾同斷獄從宗正丞趙郃之請也郃未見上聞西川行營有大校割民妻乳而殺之者亟召至闕斬于都市初近臣營救頗切上因流涕曰興師弔伐婦人何罪而殘忍至此當速置法以償其寃二事並從國史志未見他書㑹要亦有同斷獄事八月戊戍朔令天下長吏擇本道兵驍勇者籍其名送都下以補禁旅之闕又選强壯卒定為兵様分送諸道其後又以木梃為髙下之等給散諸州軍委長吏都監等召募教習俟其精練即送都下上每御便殿親臨試之用趙普之謀也癸未河决開封陽武縣戊申詔偽蜀將士妻子並發赴闕官給舟乘縣次續食有父母者别給錢五千己酉詔川峽軍人亡命者令王全斌等恤其家殿直成德鈞部送偽蜀軍校在路受賕為人所告戊申斬徳鈞於寛仁門外庚戍修文眀殿成文明殿即端明殿也國初改焉辛酉以左散騎常侍歐陽炯為翰林學士炯性坦率無檢束雅喜長笛上聞召至便殿奏曲御史中丞劉温叟聞之叩殿門求見諫曰禁署之職典司誥命不可作伶人事上曰朕頃聞孟昶君臣溺於聲樂炯至宰相尚習此伎故為我擒所以召炯欲騐言者之不誣耳温叟謝曰臣愚不識陛下鍳戒之微㫖自是亦不復召炯矣温叟一日晚歸過明德門西闕前上方與中黄門數人登樓騶者潛知之以白温叟温叟令𫝊呼依常而過翌日請對直言人主非時登樓則近侍咸望恩宥輦下諸軍亦希賞給臣所以呵導而過者欲示衆以陛下非時不登樓也上善之甲子南漢宦者莫少璘等七人來降九月己巳上御講武殿閱諸道兵得萬餘人以馬軍為驍雄歩軍為雄武並屬侍衛司壬申命蜀部諸州各置克寧兵五百人丙子重陽宴近臣于長春殿己夘以度支郎中蘇曉為淮南轉運使曉建議𣙜蘄黄舒廬夀五州茶置十四場籠其利歳入百餘萬緡辛巳權判三司趙玭坐軍食損壊失於檢視奪一季俸乾德二年五月玭權檢㸃此不當書判㑹要亦但稱權檢㸃河決澶州戊子幸西水磑庚寅侍御史蘇善鄰除名流沙門島坐知陳州日不法也壬辰始遣宮人詣安陵上冬服嵗以為常自後清明亦徃甲午詔南州復為漳州先是王氏據閩中董思安為漳州刺史思安父諱章故改為南州至是復之董思安初見開運元年乙未令中書門下樞宻院三司使及臺省寺監開封興元尹皆别鑄新印比舊制悉增大焉革五代之弊陋也是月唐光穆聖章后鍾氏殂江左籠山澤之利國帑甚富德昌宮其外府也簿籍淆亂不可稽考劉承勲掌宫事盜用無算后喪衛士當給服者皆無布但賦以錢其後德昌宫中屋壊得布四十間殆千萬端盖義祖相吳日所貯也其無政事類此冬十月戊申遣染院副使李光嗣如江南弔祭光嗣未見忠州民以魚為膏偽蜀時嘗取其算乙卯詔除之己未太子中舎王沼棄市坐權知西縣受贓枉殺人也乙丑令吏部流内銓以見任京西南州縣官滿一周年者移注西川南北邊歸降人及年亡十以上者勿復移注十一月庚午斬雄武卒百餘人先是上謂權侍衛歩軍司事保寧留後王繼勲曰此軍新募或無妻當有願與為婚者不須備聘財但酒炙可耳繼勲不能喻上㫖縱令部下掠人子女里巷為之紛擾上聞大驚即命捕得人情始安小黄門閻承翰見而不奏亦杖數十獨以孝明皇后故釋繼勲罪因詔左右銜使案宋史職官志有左右街使此作銜使疑誤京師衢肆事有非常者即以聞承翰真定人也丙子輝和爾遣僧法淵來貢方物戊子日南至受朝賀于文明殿上服通天冠絳紗袍宫懸仗衛如元㑹禮畢羣臣詣崇德殿上夀賜西川行營將士棗蜀土之所乏也初全師雄之黨攻劍州刺史右龍武將軍張仁謙足疾不能戰欲棄城遁通判主客員外郎元氏董樞不可乃引兵擊賊敗之招降數百人仁謙媿恨因飲樞酒令醉宻殺降者乃誣奏樞隂與賊通㑹有中使自蜀還備言其事上並召赴闕令廷辨曲直仁謙理屈又下御史臺鞫之乙未黜仁謙為宋州教練使擢樞比部郎中始賊攻眉州刺史趙延進延進未見懼賊之衆力不能敵將以麾下奔嘉州通判叚思恭止之因率屯兵與賊戰彭山士觀望無鬬志思恭遂募先登者許以厚賞於是諸軍鼓勇力鬬賊遂敗走思恭矯詔岀上供錢帛給之其後度支劾思恭擅發官帑請繫獄治罪上嘉其果幹有詔勿劾即命思恭知州事思恭晉城人也叚思恭事日月無所考見因附之董樞後思恭通判眉州亦在此年二月契丹侵易州略居民上令監軍李謙昇謙昇未見率兵入其境俘生口如所略之數俟契丹放還易州之民然後縱之秘書監判大理寺汝隂尹拙等言後唐劉岳書儀稱婦為舅姑服三年與禮律不同然亦凖敇行用請别裁定之詔百官集議尚書省左僕射魏仁溥等二十一人奏議曰謹按禮内則云婦事舅姑如事父母即舅姑與父母一也古禮有期年之說雖於義可稽書儀著三年之文實在理為當盖五服制度前代增益已多即如嫂叔無服唐太宗令服小功曾祖父母舊服三月增為五月嫡子婦大功增為期衆子婦小功增為大功父在為母服周髙宗增為三年婦人為夫之姨舅無服明皇令從夫而服又增姨舅同服緦麻及堂姨舅服袒免迄今遵行遂為典制伏况三年之内几筵尚存豈可夫衣衰麤婦襲紈綺夫婦齊體哀樂不同求之人情實傷至治况婦人為夫有三年之服於舅姑而止服周是尊夫而卑舅姑也且昭憲皇太后䘮孝明皇后親行三年之服可以為萬代法矣十二月丁酉始令婦為舅姑三年齊斬一從其夫戊戍升北海軍為濰州己亥令川峽諸州監軍廵檢無得與州縣事己酉畋近郊戊午甘州輝和爾汗與于闐國王及𤓰沙州皆遣使來貢方物先是沙門道圓出遊西域二十餘年於是與于闐朝貢使者俱還獻貝葉經及舎利癸亥上召見之問其山川道路及風俗一一能記上喜賜以紫衣及金幣是月詔溪州領五溪團練使刻印賜之是嵗北漢主遣駙馬都尉白昇昇未見奉表謝過于契丹且請釋遣前使契丹不報又遣其子繼文及宣徽使李光美光美初見廣順元年徃亦被執自是文武内外官屬悉以北使為懼而抱負才氣不容于權要者乃多為行人矣初全師雄至新繁劉光義曹彬領軍破之生擒萬餘人師雄退屯於郫王全斌王仁贍又率兵破之師雄走灌口寨有陵州指揮使袁廷裕者師雄署為本州刺史衆萬餘仁贍復生擒廷裕磔于成都賊鋒稍衂徒黨散保州縣未幾虎㨗指揮使怨其帥不禮率部下兵叛于嘉州横衝指揮使吳瓌虎㨗水軍校孫進等皆應之殺知州客省使武懐節戰棹都監劉漢卿遂與全師雄偽所署將劉澤合勢衆至五萬逐普州刺史劉楚信殺通判劉沂按實録二月壬寅朔以左驍衛將軍劉楚信為普州刺史八月己酉又書以西川兵馬都監康延澤為普州刺史盖楚信被逐除延澤代之也然則呂翰初叛時當在夏秋間矣果州軍校宋德威虎㨗指揮使馮紹文亦殺知州八作使王永圖通判劉渙都監鄭元弼而遂州牙將王可僚又刼州民為亂時賊所在蠭起此但其姓名可紀者耳均州刺史西南面水陸轉運使曹翰率兵㑹王仁贍等圍吕翰於嘉州呂翰棄城走遂入保之是夕賊還結衆圍城約以三鼓進攻翰諜知之戒掌漏者止擊二鼓賊衆不集至明而遁追襲大破之殺戮數萬人呂翰引餘衆走保雅州自全師雄至新繁以下至呂翰走保雅州新舊録及本紀並無月日全斌傳但以未幾及俄頃等語總結為一叚按明年六月本紀乃書全斌攻師雄于灌口其初入時必此年春夏間也師雄六月敗閏八月本紀始書全斌克雅州翰被殺其初走時亦當在此年夏末秋初或八九月間都不可知也既無所繫故并載于此耆舊傳云呂翰九月叛十一月平與國史差平蜀實録與耆舊録傳同今不取於八月己酉詔以西川兵馬都監康延澤為普州刺史延澤詣王全斌請兵䕶送之任全斌才給以百人延澤至簡州招集亡叛凡得千餘人教習戰陣擁以去及境賊申雕領衆五千來逆延澤擊敗之生擒七百人斬其受賊署者百餘軰餘皆遣釋掲示威信所招集又得三千人遂破劉澤三萬餘衆賊勢稍沮十一月丁卯朔延澤入普州先是州城悉被焚蕩乃依山設栅自固且行且戰聚糧於遂州復城普州既而劉澤領衆來降詔以延澤兼東川七州招安廵檢使延澤入普州月日此據平蜀實録八月十二日再見此用左氏法
