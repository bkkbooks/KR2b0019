body:
  text: 續資治通鑑長編卷四百五十二宋李燾撰哲宗元祐五年十二月辛卯朔保信軍節度使開府儀同三司安康郡王宗隱卒輟視朝三日車駕臨奠成服苑中贈太師追封潤王諡僖惠濮安懿王第十五子或可削去更參前例彰德軍節度使大名府馮京知河陽六年正月十二日為中太一使資政殿學士知定州張璪知大名府中大夫守尚書右丞許將為太中大夫資政殿學士知定州御史中丞蘇轍等屢言將過失而將亦纍表陳乞外任上批可特除資政殿學士轉一官知定州所命詞作自請均勞逸之意十四日上官均罷殿院均言蘇轍孫升皆有章劾將而實録但云將自乞出其所録殆非實也所録因舊但削去命詞作均勞逸意今具存之先是十一月丙子十六日殿中侍御史上官均監察御史徐君平進對此據劉摯日記乃十一月十六日事然摯先於十三日已語韓忠彥云云疑日記傳寫或差錯今移十三日云云附此後劉摯謂韓忠彥曰聞均及君平有章皆為許將聲寃謂中司不當搖大臣忠彥曰將自言亦若此然止稱均不及君平摯曰前此聞楊康國劉唐老為傅堯俞辨訴臺諌官與大臣為地前未之有殆出於近世非公道也黨與根株其將奈何摯自謂於用言未嘗不懇懇於諸公天實知之既而吕大防亦為摯言聲寃事如摯所聞又曰常疑人分别南北似非理今觀之豈不可駭此並摯十一月十三日所記今移入此摯又曰君平江南人嘗從王安石學蘇轍舉為御史昨聞均語干人頗愠轍尋常多召君平及岑象求議事彼不知君平異趣故不疑爾今日之對必有異論自鄧溫伯來梁燾等去近又召彭汝礪至今言路復有君平輩摯每以告大防而大防顧疑摯分别南北此深可慮也會秦觀凖敕書御史臺碑適自彼來為摯言聞均等對以許將細故不可動又言君平與轍無異意雖與均同對必不助其語又言轍及孫升前對諭語甚溫但頗然許將爭利一事云若非將言幾誤此事也及是踰半月矣乃有內降付三省云許將近纍上表乞除外任可資政殿轉官知定州翼日十二月二日以內降進呈諭曰許將自昨來事後言者章疏攻彈不已今令補外然别無事吕大防奏曰近時外補少遷官者今將轉官拜職又得帥府重地聖恩優厚臣子之幸又諭曰昨來韓樞密傅侍郎事過後便定奪更無人言獨有右丞被言文字甚多不可不如此也摯私謂將所爭利一事誠細故未足以為去留但將自初入以來人望不快昨宣押之後論者不肯止上既以利一事為將之是故言者置其事止以人物不可在政路為説是以天意顧公議不能主之也人不素修欲信於士大夫其可得哉將性敏惠明見事理而所趨甚異喜圓機薄節行持言不必信行不必果之論好寧我負人無人負我之事此其大失也措之于政事豈非為害此人情所以欲去之爾前日陳衍至大防府第必以此詢決之然將忤物不一孤立亦可憐是日范純禮過都堂謂摯曰繼將者當用鄧溫伯又曰八座當用范百祿補鼇當用范祖禹補掖當用彭汝礪又謂將之去非是摯與純禮雅善故於摯無隱然昔者議論不如是之私今聼其言不敢以為當傅堯俞多為其所惑皆類此也此並用摯日記所載修入可見當時議論各有黨不可略也壬辰龍圖閣學士知河陽曽布知青州右千牛衛上將軍分司南京李憲為延福宫使宣州觀察使提舉明道宫李憲敘官必以法實録舊例自合著所因今乃略不及之不知何故當考政目全闕此月事樞密院言熙河蘭岷路經略司奏十月內西賊纍犯勝如智固堡縱火穿城雖無所傷緣夏國見商量分畫地界今乃不遵詔命先起事端乞朝廷定牒本下鄜延路經略司移牒宥州詰問詔令本路經略司移鄜州問故定牒本降下知熙州范育言臣勘會昨夏國納欵之初曽具奏陳乞先議畫疆後給四寨續準朝差官按視及依綏州體例分畫本路以新邊疆界有難依綏州去處乞蘭州以黃河外二十里為界其餘城寨於見今弓箭手已開崖巉口鋪耕種地土外以二十里為界續準朝旨於定西城以北二十里相照新邊堡寨接連取直合立界至兼蒙降到甲乙丙丁圖子及回答夏國詔書許一抹取直內定西城以東合與秦州隆諾特堡一抹取直本路已依準朝旨條畫逐件利害及彩畫地圖奏聞去訖定西城外直打量二十里為界乃五年三月十八日詔書昨於今年十一月二十一日有西人首領允稜舉特且來本路石硤子計會説話尋差第五副將李中與西人説話並不依應將近降朝旨却執宥州牒要逐城壕外打量已依準朝旨説諭令計會鄜延路界首商量去訖臣竊以夏人納欵之初幸朝廷之從請其欲休兵講和之意非不誠且至也及與之分畫則頓兵境上踰年未決託言邀請無厭使朝廷詔令與外國往來為空文其終必將至於爭奪而後已求好之誠乃因疆理之議且復至於用兵非善計也凡疆埸之事皆在邊臣處畫今紛紛每至紊煩朝廷由臣知識鄙淺未能悉應事機臣愚伏思恐上不能副朝廷安邊息兵休養元元之意次辜所以付畀重任防患禦戎之至計夙夜講求本路利害及察西人情狀以圖疆事可成之䇿反復念慮至熟也願深計而極陳之臣再察西人力爭地界之意非以尺寸之壤為彼利也蓋以熙河形勢控其右脅臨制其國嘗欲削吾邊面毁吾藩籬使吾邊常危則彼有常安之計今按本路地形其智固勝如努扎實為控扼西人咽喉之地我得之則足以制賊彼得之則足以困我故無智固勝如則蘭州必危無努扎則定西必危蘭州定西危則熙河常有動搖之憂而賊勢益強可以肆為邊患故其力爭者蓋以此也昨宥州牒稱納葉經且埓克莭修築堡子有耕種處并屯駐人騎乞權行毁廢由此觀之其窺伺三堡非一日計也又以朝廷有二十里指揮欲起自東關至康古定西以北各二十里為界即三堡皆在西人熟地之內及要自定西尉斗平第三寨接連取直即蟾牟山呸􅀈川聚卜結隆一帶亦為西人所有矣臣觀夏人所持以爭者蓋自輸欵以來朝廷每徇其情既錫之嵗賂復與之四寨乞以二十里為界則從之請留生地十里亦從之求無不得謀無不遂謂朝廷憚於用兵必將勉從其欲悉行割棄足以肆其無厭之求故曠日懷姦力爭而不已也臣伏覩近日纍降指揮朝廷持議皆堅更無移易臣謂西人亦必察見朝廷愛惜本路邊面形勢之意退而悛懼矣臣又探伺得西賊運年點集人馬羸弱糧食乏絶上下咨怨焉能久抗中國而肆其爭奪之心乎為今日分畫之計莫若斷之以理使直在我為上䇿臣乞朝廷將先降二十里及一抹取直指揮在本路難行處隨冝處分臣契勘二十里指揮行於延安河東與本路智固勝如則可行於定西城則不可棄努扎之形勢與遷九巉二千有餘之衆其害不細西人且欲持此於通西尉斗平等處分畫則廢地遷民又多而定西形勢孤絶難守害亦大矣然努扎吾邊之故地九巉吾民之舊居與之不足以為德而於邊防有大害不與則於理為順而於邊防有大利此不可不隨冝而處之也臣又契勘一抹取直今自定西城至秦州隴諾特堡東西一百六十餘里侵占西界生地三十里或四十里今因分畫而多取其地則於理為不順彼將有辭則曲在我此不可不隨冝而處之也臣竊聞朝廷近詔延安委官於境上與西人會議臣欲乞朝廷特詔夏人指言今來分畫事理許從一路利害施行將應通逺界城寨並據見今坐團口鋪及弓箭手崖巉耕種地土之外别留十里或五七里生地為界其智固勝如二堡外打量二十里或十五里一半為熟地其中修建堡鋪一半為生地其邊卓立封堠如此則隆諾特以西悉依舊界更不侵占西界生地定西以北努扎川谷不毁却已修崖巉及不遷動見住戶又不退縮著漢界土彼我各守自來界至其存留生地更不耕種止為兩界隔限智固勝如係自來城堡亦據可守之地分畫仍乞朝廷丁寧降詔以舊疆之外不合侵占舊堡之外隨冝分畫示朝廷之德意則理順而辭直可以破其姦謀抑其邀求庶幾分畫早見了當頒詔講和永息兵革又使邊徼不生異日之患天下幸甚所有努扎子細利害具王針姚雄申陳事狀及前來孫路劉舜卿相度事理更乞朝廷檢會參酌臣不勝憂國惓惓之誠伏望朝廷早賜裁度指揮王針姚雄申陳事狀孫路劉舜卿相度事理當考御史中丞蘇轍言臣聞善為國者貴義而不尚功敦信而不求利非不欲功利也以為棄義與信雖一快於目前而嵗月之後其害將有不可勝言者矣昔晉文公圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇民所亡滋多退一舍而原降晉荀吳圍鼓鼓人或請以城叛吳弗許左右曰師徒不勤而可以獲城何故弗為吳曰吾聞諸叔向曰好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉使鼓人殺叛人而繕守備三月鼓人請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取勤民而頓兵何以事君吳曰吾以事君也獲一邑而教民怠將焉用邑鼓人告食竭力盡而後取之克鼓而反不戮一人以世俗言之此二人者可謂疏於事情而怠於功利矣然要其終文公以霸天下荀吳以強晉國則信義之效見於久逺如此臣竊觀朝廷之所以御西夏者可謂異矣方元祐三年夏人既受册命不肯入謝再以大兵蹂踐涇原大臣畏之明年遣使請以所許四寨易蘭州塞門朝廷雖不許而大臣務行姑息不俟其請而以嵗賜等事許之一嵗所賜凡二十萬夏人仰以為命雖以一嵗之入易蘭州塞門可也而奈何與之蓋自失嵗賜以來朝廷蕩然無復可以要結夏人者然此既往之事臣不復追咎矣頃者夏人既得嵗賜始議地朝旨許以見今州城堡寨依綏德城例以二十里為界十里外量置堡鋪其餘十里為兩不耕地約束既定大臣中悔又欲堡寨相照取直議猶未定而熙河將佐范育种誼欲於見今城堡之外更占智固勝如二堡大臣僥幸拓土之功不以育等為非從而助之尋為夏人所破所殺兵民皆不敢以實聞繼修城門再被焚毁其事至今未定然夏迫於內患不敢堅抗朝命許以照直為界其言猶未絶口而大臣又悔欲於堡鋪之外對留十里通前共計三十里此命既出有識之士以為失信太甚非中國之體若使邊臣稍知義理必不忍自出反覆之言以彰不信幸而夏人終以內患未解不欲違拒黽勉見從十里之地得之不足以為強失之不足以為弱雖小人以為得計而君子謂之失䇿何者要約未定今嵗已添屯重兵前後十將有餘十將之衆凡五萬人使五萬人西食貴粟其費已不資而夏人順否又未可必雖復暫順要之久逺不信朝廷為患何所不至然此亦既往之事臣復何言哉臣之所憂但恐大臣狃於小利睥睨夏國便利田地貪求不已訪聞近遣穆衍與邊臣計議既欲取智固勝如一帶良田凡數十餘里又欲與秦鳯路隆諾特與熙河路定西城照直地僅一百里規畫極大聞者驚愕穆衍以八月二日使陜西若此謀復作夏人不堪其忿竊出作過我曲彼直何以禦之且先朝用兵所得四寨朝廷猶務姑息棄而不惜况於其餘何足計較在兵法有之曰有其有者安貪人有者殘又曰利人土地寶貨者謂之貪兵兵貪者破今之所為正犯此禁臣竊怪大臣皆一時儒者而背棄所學貪求茍得為國生事一至於此外人皆言前後計畫皆出种誼誼本小人安知大慮而舉朝廷以從之乎要之不出數年此患必見患至而後言言雖易信而已無及矣伏乞陛下以社稷生民為念斷之於心止其妄作則天下幸甚貼黃稱臣見陕西轉運李南公言添屯兵數如此又稱自元祐以來朝廷不起邊事凡自前邊臣欺罔纍殺熟戶計級受賞虜掠財物私自潤入及邊民幸於擾攘買賤賣貴如此等事皆不得為故上下鼓倡願有邊釁凡此皆姦人自作身計非國之利也今智固勝如等處良田實西邊苐一等膏腴豈我獨知以為利而夏人不知耶彼知愛之則不免於爭爭端一起則兵革不息此正墮邊臣之姦計而大臣不察過矣臣訪聞夏國柄臣梁葉普者內有纂國之心然其為人狡而多算寬而得衆方欲內安酋豪外結朝廷俟內外無患然後徐篡取之所以朝廷近者商量地界雖前後要求反覆而葉普一一聼從蓋見議地界止於二三十里之間於彼國不深繫利害故也今朝廷若見其易與因而别有大假求索使彼不能堪忍或至忿爭兵難一交必非朝廷所願至此而後反欲求和則所喪多矣詔成都府利夔路轉運司知州軍監闕官並依差權繁難縣指揮施行從夔州路轉運司請也癸巳三省言専切提舉措置東南諸路船買鹽事所請依元豐條於賣鹽息條內豫樁州三百緡縣二百緡充捕獲私鹽賞從之新無甲午遼國遣使崇義軍節度使蕭固副使朝議大夫守太常少卿充史館修撰閻之翰來賀興龍節乙未夏國遣使賀興龍節髙麗國三佛齊國遣使入貢李􅐉十朝綱要云髙麗王名顒王雲雞林志云自元祐五年元符元年貢使再至然則其他使至者蓋非貢也當考劉摯敘髙麗本末云髙麗舊通朝貢真宗初嘗遣使來自言苦於北敵誅求願臣屬天朝絶遼好請王師援助於是朝廷方與遼和不受其語遂去自是不至熙寧初羅拯將漕福建因賈舶寄意招來之於是時神宗有臣服逺人之意喜其説即以拯為制置運使經理其事已而入朝奉貢朝廷待遇之禮賜豫之數皆非常等恩旨親渥至於次韻和其詩在館問勞無虛日多出禁苑珍異賜之沿路供頓極於華盛兩浙淮南州郡為之騷然每至州縣或鎮寨皆預差諸色行戶各以其物齎負迎於界首日隨之以待其所賣買出境乃已及鞍馬什物等皆用鮮美者被科之家旋作繡畫或求于四方人多失業至于逃遁或有就死者蓋朝旨嚴切而引伴皆用中人是以如此自元豐八年使者回到今復至朝廷用知杭州蘇軾及御史中丞蘇轍之請痛加裁省及定其程限自入界不兩月到闕下問引伴官向縡趙希魯言沿路擾費十去六七矣此據劉摯日記增入著作佐郎張禾校書郎陳察並為集賢校理六年六月八日禾改祕丞許將乞赴龍興節上夀仍乞綴寄祿官班更不赴坐詔立班在六尚書上餘依御集五日甲辰殿中侍御史上官均知廣德軍先是御史中丞蘇轍言伏見殿中侍御史上官均昔任監察御史與王巖叟等相約論事既而背之巖叟劾其反覆均即繳奏巖叟私書一時鄙其傾險亟罷言職近者朝廷復自郎中擢為臺屬臣雖知均為人隂邪難測猶覬改過自新姑受之而觀之及與之行事以來見其用心不改臣昨論熙河帥臣妄占二堡以興邊患冝加責降均知大臣不説即上言邊事當聼邊臣不冝以臣言而罷及門下侍郎劉摯求解職事方其無故去位中外相視未知其由或留或否當出聖意均輒上章留摯其意以為摯若不去留之足以為已恩若遂去留之亦自無損進退兩得心實不堪今者臣與臺諌俱論尚書右丞許將進擬差除管軍前後異議希合聖旨以陷同列中外公議皆以為然而均與將有鄉曲之好素相結託凡有所言隂為表裏上疏救將謂將小過不當斥逐且均為御史職在擊姦見姦不擊反加營救背公阿黨忘失本職情尤深害况前三事率皆希合執政以求援助據其情狀難以復居風憲臣若不言留與同事深恐均乘隙進讒熒惑聰明有害聖政伏乞罷均臺職以肅姦宄臣備位執法臺有憸人而不能去何以糾百辟謹昧死彈奏以聞是月丁邜朔也轍劄子稱十二月一日後五日轍又言臣頃論尚書右丞許將心懷傾嶮不可久在廟堂蒙陛下照其邪心即行斥逐中外正人無不相賀惟有殿中侍御史上官均與將素有鄉黨私好自居言路隂為表裏昨者臺諌交章劾將姦狀獨均上言曲加營救今將被逐均自知情狀見露數日以來譸張失措度其猖狂解説無所不至緣御史人主耳目之官不冝久留邪黨汙濁其間凂瀆聖聼臣今月一日已具論奏伏乞檢會早賜降黜外任庶幾姦慝之人小加懲戒此劄子稱五日是日轍又與殿中侍御史岑象求同奏臣等頃言尚書右丞許將用心傾嶮議論反覆留之左右恐害聖政伏蒙陛下以臣等所言為然即令補外中外稱快而殿中侍御史上官均獨言不當罷將執政指臣等所言為非曲加誣謗無所不至伏惟陛下日月之明照見臣下情偽將之姦意具在聖鑒今均與將鄉黨情分素深向除臺官實將之力度均之意方欲倚將以求進用故於將之未去則出死力以營救庶幾將之復留於將之既去則誣臣等以附會庶幾陛下疑惑始終情狀皆出姦邪况均自知必去無所顧藉誣汙臣等冀以熒惑聖聼若不明加責降但罷其臺職使均得計而去何以懲艾姦慝臣等前來各已曽論列伏乞指揮檢會早賜施行貼黃稱臣等竊見從來臺官彈擊姦邪不擇貴近則為本職即未有御史中丞言執政過惡朝廷公議共以為然而臺中官屬隂為執政理雪反擊中丞者今上官均所為古今未有若非背公阿黨欺蔑朝廷豈敢如此此三劄並得之汪應辰今轍奏議乃無此傅堯俞韓忠彥許將等之求罷也均言大臣之任同國休戚政令賞罰所繫甚重同異相濟要歸至當廟堂之上當務協諧以治天下使中外之人泯然不知有異同之迹若悻悻辨論不顧事體何以觀視百僚堯俞等雖有辨論之失然事皆緣公無顯惡大過望令就職務為協和歸於至當詔諭堯俞等就職轍與其僚及諌官互論堯俞等罪惡不當在位均以為轍等隂承宰相吕大防風旨遂奏疏言進退大臣當使天下服陛下之明而大臣得以安其位進退不當則纍陛下之哲而言者自此得為朋黨合謀併力以傾搖大臣天下之事以是非為主所論若當雖異不害其為善所論若非雖同未免為不善堯俞所論條制陛下既從其請而稍更改矣許將所論張利一陛下既允其奏而罷管軍矣則二人異論既以為是但不能協和實無大過而蘇轍等以為許將當時與三省商量張利一既已定議既而背同列議獨有論奏臣以為善則順之惡則正之豈有每事違命遂非不改然後為忠邪將舍同列之議上奉聖旨是皆將順其美不當反以為過惡也若使不忠雖與同列協和是乃姦臣耳非朝廷之利也若陛下以堯俞將異論悉皆罷去則執政數人自此以為戒每事曲相隨順不敢可否願陛下外採衆論內揆聖心審而後斷將既罷右丞知定州均又言陛下前日敦諭許將就職豈以為無罪知其心之無他也今日罷免將特迫持於二三大臣之言牽於臺諫之論則是陛下特出於不得已吕大防堅強自任不顧是非每有差除同列不敢為異唯許將時有異同大防每懷私憾今陛下又以將言為是罷利一管軍大防猶深憤疾轍素與大防相善希合其意率同列盡力排許將期於必勝既得異論罷去執政臺諫皆務依隨是威福皆歸於大防綱紀法令自此敗壞矣又言御史耳目之任中丞風憲之長轍當公是公非别白善惡乃愛憎任情毁譽違衆立黨怙勢取必朝廷強險偏邪上惑聖聼願出轍等章疏付外廷如許將有罪乞加謫命如無罪願正轍等妄言之咎以破姦邪朋黨之弊收還威權肅正綱紀又言轍等合為朋黨動移聖意以疑似不明細事合謀并力逐一執政自此人不得安位矣因乞解言職於是責知廣德軍舊録云均言尚書右丞許將不當罷執政中丞蘇轍侍御史孫升等附會大臣意旨姦邪不忠臣竊聞外議藉藉皆以為轍等合為朋黨動搖聖意必變直為曲轉是為非以疑似不明細事合謀併力逐一執政自此六七大臣人人不得安位矣伏乞早賜施行以協中外之望坐所言不當故出新録因之今據均本傳别修不知作均傳者何人大抵用均家傳耳家傳乃均第三子著作佐郎愔在建炎初所撰次也其信否未可知今先列蘇轍三章仍不沒均言庶後世有考焉曽布日録云均嘗與蘇轍爭論科場不當用詩賦以此去位又云均先在元豐則擊蔡確元祐則擊蘇轍紹聖又與章惇不合即去當考劉摯敘其事云初臺諫之擊許將也均獨以謂不可用細故退大臣乞明正是非及將罷均言益不已於是蘇轍孫升岑象求等皆劾均以為朋姦第一章言均三事章以十二月一日辛邜今附見十四日甲辰一謂范育不可罷二留劉摯三救許將既而章繼不止然其後章止論救將事不及其他均亦連章劾轍及升不為朝廷辨事之是非補人主聰明専以私意隂受大臣密諭結為朋黨表裏排陷乞正其罪會興龍節假故兩曹得以從容各罄所言以相詆章皆下三省均以目録前後章申都堂至是進呈宸意間暇兩無所向吕大防稟測之諭曰均莫難任大防曰自來言官以事去有三四等知州知軍通判已甚得監當諭曰與合入差遣不要虧他餘並無言遂可廣德之擬摯因出笏奏曰臣昨八月中請外任者本以竊祿嵗久無補朝廷心不自安故乞一郡殊不聞均奏留臣也臣等進退料必出於宸𠂻豈由臣下論議兼臺諌留執政亦合避嫌疑誠不知體又均福建人臣與之非故舊亦非鄉里止曽於臺中同官昨均留臣臣實不得而知更望照察笑諭曰侍郎有何事要去昨來是太皇官家留住侍郎均亦不曽有文字大防曰劉摯昨求去並無事今為蘇轍言上官均文字內説及曽留劉摯要奏知也摯謂均為王氏學有文采性介潔守道甚篤元豐八年摯在臺愛其前為御史治相州獄守節得罪故復舉之後以張舜民事罷今年六月復為殿中至今三黜皆於義無嫌儻止論大臣去留冝明辨是非不可輕以人言進退以厲臣節塞朋黨如此則為有補不然當指邪惡事狀直言而去為是惜也區區以留將為言故理不勝矣大抵將之去外論半是半非雖各係其黨蓋不無由來也摯又嘗語大防以將為人有可取者博記問氣徑見不平必開口不畏強禦亦其所長大防謂潛心懷二立黨偏見亦可惡者不少也均孤立於盛黨間可憐哉此全録摯所記不復增損要可見當時議論不可略也
