body:
  text: 續資治通鑑長編卷五百七宋李燾撰哲宗元符二年三月甲辰朔左司郎中賈種民為太府卿章楶奏乞差秦鳳并岷州第四等以下保甲應副進築城寨從之初衆議以保甲下户難於調發外臺申請數四皆却而不從楶以為上中等户至少不得下户無以集事乃從之乙巳朝奉郎集賢殿修撰知潤州龔原降授奉議郎餘依舊以元祐訴理所除雪犯罪改正也己酉青州觀察使仲覽卒贈開府儀同三司追封沂國公諡良信壬子涇原路經略司奏乞將京東西路蕃兵將廢罷仍將蕃兵依舊各於順便城寨𨽻屬逐將統領與漢兵相兼差使從之秦鳯路依此此據章楶奏議增修仍具楶元奏及獲朝旨于後元符二年三月九日涇原路經略司奏準元符元年六月十一日樞密院劄子臣僚劄子奏訪聞得涇原路蕃兵自來以住坐近便分𨽻在逐將下所管凡有出入本將全藉引路探望伏截捉人使喚易為得集蕃兵亦無枉有縻費盤纒昨來自團結為東西路蕃兵將校每有勾集在邉住坐却來近裏將下赴點差使不下一二百里往來甚有費用未知出入之處已有數百里之勞人馬疲困漢蕃皆言未便人情與熙河路事體不同其五州軍相去不及二百里至界首不滿百里逐州從初各置蕃兵將分勾集百里之地無虛勞擾欲望聖慈詳察蕃情下經略司更切體量具利害聞奏臣伏覩鄜延環慶路蕃兵最多見分在逐將下管幹極甚安便欲乞早降處分貼黃稱臣近過秦鳯沿邉城寨亦見漢蕃人言所置蕃兵將即非便利人情未安亦乞下本路具利害聞奏旨令涇原秦鳯路經略安撫司詳上件事理子細依公體問相度昨所措置有無不便事理如委是未便今來合如何措置施行具經久可行的確利害結攬保明事狀聞奏勘會本路蕃兵自來以住坐地里逺近順便城寨分𨽻在逐將每遇出入與漢兵相參使喚别無闕誤兼逐將又得蕃兵選委引路探事之類昨自紹聖三年內因鍾傳奏請以熙河有専置蕃兵將本路彭陽城駐劄第六將減罷改置東路蕃兵將如綏寧靖安乾興天聖寨係各有邉面去處水洛城駐劄第十二將咸罷改置西路蕃兵將如靜邉隆德得勝治平寨亦係各有邉面去處每遇勾集其緣邉住坐蕃兵却來近裏將下應點差使其間有一二百里往來極甚勞費委是未便兼與熙河事宜不同及契勘本路進築過六城寨七堡子合用戍守人馬並於諸將下正兵漢弓箭手內幫撥前去緣逐將各有所管邉面地分闕人照管本司今相度若將東西路蕃兵將廢罷却將蕃兵人馬依舊各於順便城寨𨽻屬逐將統領與漢兵相兼差使委是經久利便今狀結攬保明是實伏乞朝廷更賜詳酌特降指揮樞密院批狀勘會紹聖三年內降朝旨團結涇原秦鳯東西路蕃兵將近方立法排定將分兼亦曽行下秦鳯路相度奏到本路東西蕃兵兩將委是順便只合依舊致朝廷難議别降指揮其本路近創置第十三將應漢蕃兵馬已令並𨽻本將管轄訓練去訖四月二十七日送涇原路經略安撫司照會癸丑詔諸帶供御對御牌子祗應人以牌子借人及令人代名若本轄官以帶牌子借人及借代者各徒被借使人減一等新無甲寅詔輔臣今月十四日分詣宫觀寺院等處祈雨監察御史兼管殿中侍御史左膚言臣伏覩朝廷近以孫諤在元祐中理訴語言不順罷諤吏部貟外郎按諤在元豐中以監制勑庫漏落條貫罷去則是因緣職事無甚可矜而元祐中三有訴陳且言幸遇朝廷欽恤刑獄使銜寃飲恨者皆得以上聞恭惟先帝在位明德慎罰諤指元祐為欽恤則是先帝未嘗欽恤也由此觀之則諤訟先帝者也其曰使銜寃飲恨者皆得以上聞臣不知諤指何人為可恨乎若以為元豐大臣為可恨又緣已出先帝聖斷兼今來訴理官司奏陳改正事件其間得有罪者蓋緣得罪先帝非為得罪當時大臣也由此觀之則諤不獨訟先帝而反恨先帝者也為人臣者措意及此萬死有餘而三省議罪止令罷職却與合入差遣借使孫諤今係知州或監司資序則是朝廷猶欲以訟恨先帝之人為監司郡守乎臣雖至愚猶知其不可况在陛下聖孝昭明紹修前烈而有司視諤為可恕之人哉詔孫諤送吏部與合入差遣遂出知南劔州知南劔州據楊時志諤墓二月二十三日已詔送吏部與合入差遣左膚論列後詔復如前蓋前未送吏部也樞密院言鄜延路經略安撫使吕惠卿言德靖寨西南舊金湯寨地形險固三面各有天澗洛河川水泉可以修充守禦城寨與環慶路聲勢相接本院近據鄜延路奏欲進築暖泉山通接河東神泉寨兼河東見於烏龍川進築照應米脂一帶道路又相度得府州端正平可以修建堡寨頗卜朗茂鄂蘭尼羅朗各可修築烽臺及那第五將往彼駐劄不添置官吏兵馬詔河東經略使孫覽相度險固控扼水泉足用經久決可守禦即用工修築四月七日築端正平五月六日金陽城畢工丙辰遼國泛使左金吾衛上將軍簽書樞密院事蕭德崇副使樞密直學士尚書禮部侍郎李儼見於紫宸曲宴垂拱殿其遣泛使止為夏國遊説息兵及還故地也德崇等見上遂言北朝皇帝告南朝皇帝西夏事早與休得即甚好上顧張宗卨令答之曰西人纍年犯順理須討伐何煩北朝遣使德崇等唯唯而退進築定邉城畢工賜環慶路經略使胡宗回以下茶藥銀合有差宗回仍復寶文閣待制正月十二日相度二月二十六日進築四月二十五日置蕃兵將右正言鄒浩言臣伏見遼國人使已於今月十三日朝見外議以為非泛使不至中國久矣今此叩廷決不虛發若非本國自有所請則必為羌人請命而至此實大事尤在審詳竊廟謀已有成算足以為國家長久之利然臣伏觀祖宗以來每有大事雖廟謀素定亦必謀及在廷之臣以參用其智蓋所以致戒於未然之前而不至貽患於已然之後臣今欲乞依祖宗故事廷集百官或只侍從示以遼意曲加詢訪其愛君慮國之心既非一日宜必有至計逺略可備採擇以為萬一之助者伏望聖慈詳酌特降指揮施行不從丁巳外都水丞李偉乞於澶州之南大河身內開小河一道待漲水紓解大吳口下注北京一帶向著之患從之賜鄜延路統制官韓升銀合茶藥有差以應援修築定邉城故也賜吕惠卿銀絹各二千匹兩對衣金帶鞍轡馬以纍遣將兵斬獲并招擕西人數多故也鄜延路走馬黃彥奏劉安李希道等出塞力戰獲五千餘級詔賜吕惠卿奬諭銀絹各二千對衣金帶鞍馬並遣中人黃經臣賫腸及犒設出塞將士有功者賜銀碗三兩輕傷二兩布録秦鳯經略司言有偽鈐轄烏莽格等將帶部族三百九十七人孳畜三千以來并偽牌印歸順詔烏莽格補內殿承旨首領李葉補右侍禁及賜銀絹有差餘令經略司量事力宣補正月二十一日可考秦鳯路提點刑獄權經略司孫賁補降羌名目太髙罰銅二十斤吕惠卿言討蕩西界魯遜滿達勒等處脅降到王固䇿稱係西界衙頭服事小大王王差往宥州統領處充走馬詔特與右侍禁添差充太平州指使詔孫路叶力應副涇原進築樞密院言賀北朝生辰使副試禮部尚書蹇序辰皇城使秦州圑練使李嗣徽於北界合得擡箱錢不以例收受充折小絹又見辭日於客省帳不依例茶酒并受香藥酒添一拜匿不以聞并輒受移宴就館押送使副從人擡箱馬共十匹詔大理少卿周鼎權殿中侍御史左膚就寺置司取索推究先是序辰等既坐違例受擡箱絹各罰金八斤又自言移宴就館得例外馬取旨上欲遂賜與曽布曰序辰擅收擡箱絹隱藏五六次不以實對章惇謂罰金太輕如此則自今奉使者人人敢擅改故事據理自當降官或罷賜與若罰金亦須三二十斤臣緣序辰數見侵進呈時不敢不就輕典若更賜與例外馬恐三省以為不當上曰罷之此假在二月二十二日乙未己而三省密院同進呈王詔語録有跪受香藥酒舊例不拜遼人言序辰巳拜詔亦拜并序辰於客省帳茶酒皆非舊例即詔序辰詔等分析元符元年序辰為生辰使王詔為正旦使序辰乃言范鏜紹聖三年生辰使林邵四年正旦使皆曽拜而鏜邵及張宗卨副林邵者皆云不拜蔡卞曰須付有司布與惇亦以為當上許之布又進呈序辰所修儀式册但云跪領無先拜之文兼檢到紹聖以後奉使臣僚申到儀式皆云跪受跪領訖就一拜起序辰所修乃增以請大使出班先一拜跪興十字又於客省帳茶酒亦無例序辰妄引祥符二年王曉例曉乃弔喪序辰賀生辰固不同又序辰上殿劄子云舊儀式已編次如王曉等變例亦乞編次付將命者貴臨事有所折衷此蓋序辰文過飾非黃履曰此欺罔太甚兼此數事皆未足論序辰將命見日遼主當有宴移於客省帳又當大宴亦移就館遼人待序辰一切簡慢禮數而序辰乃獨增拜及宴日例外贈馬欣然受而不辭此最辱命及歸又不具以聞便關國信所請絹此尤為不可此假在三月十二日甲寅上令送御史臺章惇曰安惇與序辰同職事看訴理恐不可上曰莫不妨布曰此事固不可變易然恐有嫌則周鼎亦可使若更以一言事官同之則無不盡矣乃降是詔惇布又言天久不雨恐有德音則制勘但為空文耳乞不以赦降原減上從之右正言鄒浩奏臣伏聞蹇序辰奉命使遼頗失使事之體為遼人所慢除改例受絹既已施行外其宴於客省及飲酒輒拜等事見行取問臣竊以使事所係實為朝廷重輕故雖一言一語之間猶必致謹而不敢忽况有大於此者今序辰乃宴非其所拜不以道曽不思故事當循而惟遼人之命是從遼雖無知豈不萌輕中國之心乎孔子曰使於四方不辱君命可謂士矣士且不可辱命而序辰為尚書反辱命如此宜典刑之所先而不赦也然序辰善事執政世所共知竊慮早晚供到文字進呈之時執政必有多方致力為序辰之助者萬一此計得行有所寬貸則不惟無以懲戒後人兼恐彼中目此指為故事永不可改其耻不小伏望聖慈深賜省察出自獨斷重行黜責以慰天下公議祁州防禦使知大宗正事宗粹為蔡州節度使戊午詔禮部貢舉八月三日曽布云云或移見此己未御史中丞安惇言元祐初姦臣訴理所將熙寧元豐以來斷過刑名輒行奏雪曲陳事理訕謗先朝歸怨君父陛下委官考閲案牘凡千餘人其元斷重輕一一當罪已具聞奏節次得旨改正施行所有元看詳官劉摯孫覺胡宗愈傳堯俞管勾文字葉伸蘇嘉朱光裔吳儔陳郛等罪迹顯著義不可容望詔有司具逐人到所月日審察情犯特賜施行詔朝奉大夫致仕葉伸特降三官陳郛吳儔蘇嘉朱光裔並特勒停惇建議看詳在元年六月二十五日館伴遼國泛使所言蕭德崇等計會朝見交割禮物稱有玉帶并小繫腰元無封印館伴蔡京等詰德崇不印封因依德崇曰常禮是有司排辦金玉帶珠子繫腰是北朝皇帝親繫者臨行時當面付授所以無封印詔劄與御藥院取旨回答初宰臣章惇以為恐無禮執政皆曰彼乃欲以為勤厚也上然之詔涇原路走馬入內供奉官利詢特轉一官供備庫使曹診左藏庫使安侖三班差使路琮各減二年磨勘仍賜帛有差以照管捉到西界統軍威明阿密監軍穆賚多卜等到闕故也樞密院創為熙秦冒賞降官各將副以上例追兩官部隊將例追一官餘名各以所冒對行降官展年情重者取旨從之布録己未斷旨在乙酉庚申河東經略司言知府州折克行捉到西界偽鈐轄哩旺扎布係是先歸順人供奉官伊錫親兄其哩旺扎布雖係鬬敵捉到緣正當誘脅招納之際乞令其親弟伊錫等同共保管哩旺扎布只令府州羈縻住坐在撫北界首領各圖歸漢從之伊錫又見五月十三日可并或都削去涇原路經略司言進築通峽蕩羌九羊寨石門堡畢工詔進築將吏各減一年磨勘循資及賜銀帛有差布録云賞功比安西稍優而殺於平夏一等涇原奏西路兵馬會合並聼王恩節制辛酉以管勾剩貟所蕭世京為吏部貟外郎宣德郎提舉秦鳳等路常平張行為户部員外郎世京在元祐中嘗上書言先朝青苗免役法便民可以久行又言中書收吏部善闕以應門生故吏世族之求執政之門炙手可熱公道厄塞私恩太盛疏奏留中不報至是上出其疏乃擢之行亦元祐中疏奏乞復行免役凡四十餘章前已擢使一路至是又遷焉河北路轉運司言昨據乾德軍申舊有乾寧倚郭一縣自商胡口決人户流散準朝旨廢併入本軍近年人户多已歸業增及萬户已上合與興復為縣從之壬戍禮部言尚藥奉御判太醫局孔元狀乞將神醫普救方差官校正付國子監鏤板頒行從之新無遼國泛使蕭德崇等致其國書云肇自祖宗開統神聖貽謀三朝通五世之歡二國敦一家之睦阜安萬宇垂及百年粵維夏臺實乃藩輔纍承尚主迭受封王近嵗已來連表馳奏稱南兵之大舉入西界以深圖懇求救援之師用濟攻伐之難理當依允事貴解和蓋念遼之於宋也情重祖孫夏之於遼也義隆甥舅必欲兩全於保合豈宜一失於綏存而况于彼慶歷元豐中曾有被聞皆為止退寧謂輒違先旨仍事逺征爾後移問稠重諭言委細已許令於應接早復罷於侵爭儻蔽議以無從慮造端而有自則于信誓諒繫謀維與其小不忍以窮兵民罹困弊曷若大為防而計國世固和成特戒使軺往逹誠素向融淑律加裕沖襟館伴使蔡京等申與蕭德崇等食不就坐出文字一卷京等纍拒之德崇乞聞逹然後收受詔京如文意係干夏國事即許收接以聞京等收劄子奏稱夏國差人告奏與南宋歷年交和忽於諸路齊發人馬大行劫掠今則深入近裏地分及於朝廷邉界相近諸要害處多修城壁侵取不息伏望計會南宋却令還復所奪疆土城寨盡廢所修城壁奏呈奉旨仰勘合再奏尋檢勘到大康七年準南宋牒以夏國囚廢其主差兵追取作過罪人續準夏國告奏南朝無名起兵討伐尋經移文理辨後又委十年正旦國信所計會定其與夏國往復事體許令依舊休退兵馬又大安八年夏國主乾順狀奏南宋再有興兵尋行牒報回到公文惟是近塞方得驅逐如能悔過亦許應接前次已指揮夏國依應施行訖再奏呈奉旨夏國元是當朝建立兩曽尚主昨為南朝討伐已曽計會定前項事因今來更不牒報再遣兵衆侵取不已及於當朝邉界相近諸要害處創修城寨緣是有違兩朝信誓及前來已計會定事意仰指揮移牒聞逹南朝宜準已計會定事理施行及還復過疆土城寨并拆廢城壁進呈奉旨夏國頻於邉界出沒傷殺人民自知罪惡深重乃隱匿作過事妄有干告豈當憑信便行移牒兼夏國本是當朝藩鎮其建立本末皆因當朝封殖昨北朝重熙年中亦曽加兵討伐夏國當朝未嘗輒有移問今來夏國侵犯邉塞邉臣出兵及修建堡塞乃其職事於兩朝信誓略無干涉又夏國主乾順狀奏自彼南宋侵圖約近二十年前後告乞起兵援助奏呈奉旨夏國元是當朝建立纍世稱藩並受封册兼兩曽尚主故自重熙年中南朝差郭稹來報稱為夏國僣稱崇號起兵討伐後因南朝諭以建藩尚主之由故於耶律仁先附到回書既諭聨姻當寬問罪之舉次又遣余靖齎到書謂姻聨且舊遂停討伐又太康中又準南朝來牒稱為夏國囚辱其主起兵征討當朝為是戚藩曽經移文理辨及因便人使計會亦便於從休退兵馬昨於去年夏國又遣使告奏南宋忽於諸路齊發人馬大行劫掠深入近裏地分侵取不息尋委所司具告奏詞意并前來已計會定事理移牒和解經隔多時遷延不行報復續準夏國再有申奏又經牒報方始回到公文全未依應至如夏國近年實有曽侵犯南朝邉界並無前項重熙太康年中逐起所指愆過輕重不同今來南朝豈可固違祖先相從和解之意及兩朝信誓并前來已計會定事理不為準行據此依違不定未悉端由仍慮南朝臣下不經為縷細聞逹兼近日夏國又特遣人使告奏自被南宋侵圖約近二十年於諸要害被侵築了城寨不少今嵗以來又多修築夏國疆宇日更朘削乞起兵援助據當朝與夏國纍世聨親理當拯救蓋以南北兩朝通好年深固存誓約便難允其所請今特遣使臣就去計會候到南朝仰具録上件委細因由分付館伴聞逹南朝子細詳究早為指揮勾退兵馬及還復已侵過疆土城寨用固祖宗信誓不失兩朝久來歡好右請館伴所聞逹南朝新録削去白劄子但存國書曰蓋其意止為夏國遊説息兵及還故地云今從舊録而此語入蕭德崇等初見時甲子樞密院言河北緣邉安撫司奏竊見緣邉諸州軍寨城壁樓櫓以承平日久寖以頽圮至於備城軍器亦各並不依式排垜遂於去年內下緣邉諸州軍寨取到防城什物動使各具見闕名件萬數浩瀚其見在數內亦有損壞朽爛不堪施用之物不少邉防緩急必致闕誤欲乞委官逐一點檢各修換并見闕名件本司置簿拘管立限三年修完從之新本刪修云樞密院言河北緣邉安撫司奏緣邉城壁樓櫓及備城軍器承平日久頽圮乞置籍拘管立限三年修葺從之正月二十九日已降詔當考乙丑詔輔臣詣天地社稷宗廟宫觀寺院等處祈雨朝散郎試太常少卿劉拯奏臣惟本朝承五季之亂應天革命以集大統聖聖繼治自古未有盛德大業播之聲詩宜得髙文大筆揄揚潤色與清廟之頌並傳於無窮今大樂局前後詞臣所撰樂章有辭采淺陋有援引謬誤辭與事異而通用有禮文所無而嗟詠之者曷足以崇明德傳之無窮哉夫易之坤明臣道也六五中而不過順而不亢故曰黃裳元吉六三以隂居陽外順而內剛故曰含章可貞皆臣之事也而土王祀黃帝髙安之曲曰坤輿厚載黃裳元吉宅中居正含章抱質此非所以命黃帝也如此類甚衆乞别選降付有司施行詔令學士院取索看詳其合刪改者修定以聞詔熙河蘭會路經略判官降授宣德郎鍾傳責授連州别駕韶州安置試户部侍郎陸師閔落職知蘄州尋改懷州七月二日鄒浩云云可考前權知熙州直龍圖閣張詢特責授歙州别駕池州安置詢罷熙州在元年八月二十七日前秦鳯路提點刑獄故陳敦夫追元與一子官及所賜錢熙河蘭路經略司勾當公事宣德郎陳中夫特除名勒停歙州編管布録云將佐或除名或勒停或降十八官至五七官機宜陳中夫代為王舜臣狀虛奏首級等其他造作欺罔事狀不一除名送歙州編管司户參軍錢升特除名勒停秦鳯路經略司管勾機宜承議郎任鯤特勒停熙河蘭會路經略司勾當公事宣義郎董采承議郎李夷行熙河路經略司管勾機宜文字承務郎李毅通逺軍通判奉議郎李深簽書判官承事郎胡泳各特降一官內李毅無官可降展四年磨勘董采仍衝替陜西轉運司勾當公事承議郎李宗願熙河路經略司勾當公事禮賔副使王厚各特降一官通判熙州奉議郎潘適特降兩官侍禁王士元滄州司理參軍章綖特勒停侍禁康厚降一官走馬承受入內供奉官周圭特追一官勒停前東頭供奉官滿志行特除名勒停嶽州編管熙河蘭會路鈐轄崇儀使成州刺史王舜臣追十官除名勒停留充涇原路效用準備使喚熙河蘭會路都監知河州皇城使榮州防禦使王贍追十一官免勒停權管勾河州及安撫司公事熙河第五將知通逺軍降莊宅副使康謂追七官免勒停權管勾通逺軍權知岷州皇城使昌州刺史李澄追十四官免勒停權管勾岷州熙河路都監右騏驥副使李澤追十五官特除名勒停送均州編管熙河第二副將文思副使秦世追十八官特除名勒停送江州編管熙河第一將左騏驥使姚師閔追十二官勒停河州都總管領蕃兵將皇城使劉戒追十七官勒停熙州管第三副將莊宅使張論追十五官勒停熙河第五將前崇儀使辛叔獻追三官勒停副將西作坊使董隱追四官蘭州都總管領蕃兵將禮賔使李忠追一官各以秦州制勘所言白草原討蕩妄增首級冒受功賞兼虛上首級與使臣親戚餘部隊將使臣人吏敢勇效用等各等第追降勒停編管決配有差內曽有戰功並聼陜西河東路經略司留充效用準備隨軍使喚初得旨鍾傳張詢皆除名編管傳韶州詢池州上問輔臣池州是江南蔡卞曰更有江西如筠袁州等又逺於池章惇曰臣妹年逾六十若張詢更重行遣不敢辭只乞池州稍近上從之已而曽布言直龍圖閣集賢殿修撰作邉帥未有因職事編管例編管人每旬赴長吏廳呈身刑不上大夫恐不當爾於朝廷名體未正上曰錯可便與改正乃各與散參軍安置又皆改别駕先是布嘗與二府言及傅詢不當編管事章惇曰公之言是先文字見在門下省未出又令門下吏告布欲令取回劄子布曰不須爾既奏得旨布又語惇曰張詢雖是公親戚布以素無此例兼名體未正且事出密院恐天下後世以為非故不敢避公親嫌開陳改正非曲奉丞相也惇曰公莫無避嫌布曰假令人有此言布亦不恤元符邸報密院奏刑部申奏制勘所奏勘所奏勘到鍾傳王舜臣等妄冒功賞數內秦鳯經略使陸師閔鍾傳奏討蕩畫謀事勘會鍾傳統領兩路大軍出界元奏斬獲三千五百二十級今勘得共實獲二百九十級外有三千三百三十級係虛冒其陸師閔六月十四日承受朝旨妄冒人限一月許自陳與免罪至十八日榜秦州等所看詳陸師閔直至十八日方行出榜及奏狀內稱尋行出榜情罪合取自朝廷指揮法寺稱許首朝旨出榜稽違官減外杖六十公罪鍾傳畫謀功賞如是情屬虛奏係保明不實徒二年未賞減二等官減外杖一百私罪合罰銅十斤如不知情合罰銅三斤勘會陸師閔見係降授朝散郎試户部侍郎三月九日奉聖旨陸師閔特落職差知蘄州其已差下張德溫令吏部依元到名次别與合入差遣奉敕惟賞當功罰當罪則臣下勸朕恃此以為勵世之具雖侍從之臣亦不得而私焉具官頃以才稱實膺閫寄方洮河進討計謀將下交私妄冒功賞詔許陳首而汝奉行不時職當保明而汝奏報非實不加黜責曷警誕謾聊禠職名猶綰郡寄往其循省無重悔尤可特罷侍郎依前降授朝散郎知蘄州中書省密院關密院奏刑部申秦州制勘到鍾傳王舜臣等妄冒功賞案數內下項人三省密院同奉聖旨依逐項指揮今據吏部申逐人見今職名合降官資下項秦鳯路隨鍾傳出界五將妄冒獲級重傷雜功人下項曽經保奏崇班曺宗道秦貴虛供獲糧前去逢賊鬬敵重傷留在安西城降一資奉敕曹宗道等夫王政不忘人之功若僥幸而妄其實則罰亦隨之比者偏師出塞而汝等秋毫之力無有焉或妄列重傷或虛冒受級以覬賞典各黜兩秩尚為寬典可敕中書省密院關密院奏刑部申秦州制勘到鍾傳下妄冒功賞案三省同奉聖旨依逐項指揮今據吏部申契勘髙永年見任崇儀使依所降指揮合降六官降至文思副使關送中書省指揮熙河部落子將元奏斬獲八十級捉到生口一名天使錢鈐轄傷中五十七人雜功十五人今勘會定實獲二十四級生口一名並舊丁餘並是虛妄內權都總領崇儀使髙永年出界回有部落子各將人頭於髙崇儀向邢玠道收著中軍人厮煎要人頭一級與經勾陳先得勾當人一級與張鈐轄三殿直三級與撫諭王供備一級與效用辛士虎髙崇儀指揮邢玠道王防禦得鍾龍圖人頭要及三分問當得力姓名人呈髙崇儀於姓名下虛鑿寫了人頭令邢玠道等監勒依上件虛冒功數狀申訖六月二十三日準朝旨限一月陳首至七月二十八日馬皇城處喚邢玠道與我憑寫首狀來為鍾龍圖指揮不敢違拒元保明人頭傷中等都是詐冒申經略司於檢上落作二十三日其使臣等陳首亦落作二十三日元部六百七十四人虛冒獲級一分已上看詳馬用誠邢安道虛作效用係不應言官減外笞五十將首狀落作二十三日係詐為官文書及虛均攤首級與親戚及詐為首級妄求功賞為從按問官減外合杖九十合罰銅九斤除李澄已降指揮外馬用誠降兩官冒部獲一分以上更降一官及依隨李澄虛上人頭與親戚等更特降三官奉敕依下項皇城使馬用誠可特降文思副使崇儀使髙永年可特降內殿崇班敕馬用誠等戰危事也惟賞當功罰當罪則人忘死以犯難矣爾提兵禦邉蔑公徇私誕冒賞級加於無功貶秩六等尚為寬恩往自循省毋重獲悔鍾傳先以秦鳯兵出塞獲級約四千事在紹聖四年十二月二十二日元符元年正月十七日加集撰三月十一日坐前後奏報異同失實落集撰官十六日又罷熙帥降官監永州稅二年三月二十三日又坐白草原冒賞散官安置韶州不知三月十一日所謂奏報不實即是白草原冒賞與否考實録所書則初責止緣進築非出界獲級也白草原事實録初不見其首尾恐即是紹聖四年十二月二十一日實録所書出界獲級約四千餘其冒賞發覺又不知何時付獄緣何人按舉並須檢討作書證驗别修陸師閔六月十四日承受朝旨可考王正臣出塞獲三千級事在元年二月二十九日恐即是隨鍾傳至白草原時實録不總會編修但隨奏到日書之故如此不齊要須細檢别修右正言鄒浩奏臣伏見陜西路邉臣妄冒功賞罪狀暴露除已節次嚴正典刑以懲罔上之姦外其餘轉官增秩合行追治者數尚不少訪聞人懷危懼殊不自安邉鄙之心亦皆聳動臣以為武夫嗜利乃其常情惟賴帥臣檢率以義然後不敢肆為妄冒之事昨緣帥不得人自為欺詐故其官屬翕然從之况於武夫安有顧慮故在法雖無可宥而論情或有可言今來帥臣及幕府將領並已等第施行足以昭示懲戒所有其餘同犯之人欲望聖慈特賜指揮詳酌本情如可矜貸即乞免行追治以安邉鄙之心不惟可以安邉鄙之心亦庶幾古所謂脅從罔治之意浩奏不得其時因責鍾傳張詢等即附之其從違當考丙寅詔六曹寺監應元祐年所更舊法除已修定外其見今施行尚有不便者所屬條具以聞權刑部侍郎周之道等奏臣檢會元豐舊制諸路提刑每半年奏諸州盜賊己未獲火數委刑部案籍審覆其未獲數多並且劾聞奏蓋責及於監司則捕盜官不待繩而自勵元祐增修上條止以見任官赦後限滿未獲盜賊火數仍用别獲到人許比折外計數則劾奏之法幾為空文竊謂提刑司按治一路稽察盜賊為先宜禁止於未然或督捕於竊發若覬幸比折以免責罰恐非朝廷命使恤民之意乞依元豐舊制更不用元祐比折之法但未獲數及五分並許本部劾奏從之熙河奏遣苖履出塞擾耕布録丙寅二月七日奏捷戊辰詔翰林醫官潘用中授尚藥奉御以療邢淑妃有勞故也己巳詔稍愆時雨竊慮刑獄淹延枝蔓在京委刑部郎中及御史一員開封府界令提點諸路案此處原本注闕文兩州軍令監司分頭點檢催促結絶見禁罪人詔河陽三城雄武軍節度使檢校太尉開府儀同三司莘王俁遷外第加守司空改武寧鎮寧軍節度使朝散大夫新知洪州蔣之翰言伏覩諸路總管鈐轄司許招置馬軍一指揮昨知荆南日少人投換乞下諸路總管鈐轄司遇有移配到他州馬軍禁軍仰子細試驗等仗年幾少壯及格不犯徒刑並許選補刺充本處馬軍從之昭宣使嘉州團練使提舉太清宫王中正卒新録辨誣日中正元豐中將兵敗事其罪至大劉摯嘗同章論中正及李憲宋用臣石得一比之四凶以中正為稱首而舊録所立傳稱其資忠義有大略讀經史通古今尤知兵天文厯數無不通如是則為天下之才矣舊録所載其無忌憚大率如此今據事實刪改涇原路奏遣李忠傑領部落子七百騎出塞討擊又奏四月初進築鼐摩會等處布録己巳庚午御崇政殿閲試諸軍轉員凡三日詔時雨稍愆開在京宫觀寺院五日朝奉郎寶文閣待制知宣州何正臣卒熙河奏苗復出塞禽戮共五百餘人級牛羊等萬計布録庚午出塞在二十一日睦州司理參軍謝黼試宏詞入次等詔循一資此據會要及登科記增入黼邵武人初嘉勒斯賚兄扎實庸嚨為河南諸部所立與嘉勒斯賚分地而治不相能也扎實庸嚨死子必嚕匝納立必嚕匝納死子溪巴烏立其舅朗格占輔之已而部酋果莊漸盛與朗格占有隙遂逐溪巴烏溪巴烏不校去之默伯部默伯部復尊事之鄂特凌古之囚殺溫錫沁也溪巴烏懼禍益西走隆博部寄語鄂特凌古曰吾乃踈屬又嘗讀佛書今已為僧矣毋相疑鄂特凌古習知溪巴烏不足忌遂置之羌俗尚浮屠法鄂特凌古尤好營塔寺勤於土功轄正代父役民滋甚性又暗弱顧喜殺其下皆怨大酋森摩乾展等有異志獨畏轄正季父索諾木丹怎雄勇類鄂特凌古不敢發乃共誣索諾木丹怎謀叛轄正遽殺之盡誅其黨惟綽爾結得脫乾展等益自肆綽爾結渡河歸溪巴烏日夜説溪巴烏舉兵逐轄正而自立溪巴烏不聽溪巴烏凡六子曰隆贊曰杓贊曰錫羅薩勒曰昌三曰順律堅戩曰尼瑪丹津綽爾結因竊杓贊至錫勒噶爾城復説大酋嘉勒摩巴桑濟等奉杓贊為主檄逺近轄正遣果莊子阿蘇討之阿蘇至則佯與嘉勒摩合求見杓贊而潛使人殺之嘉勒摩怒連廓州諸部攻阿蘇溪巴烏以杓贊故亦舉兵城中人多應溪巴烏者遂殺阿蘇而據錫勒噶爾城南諸部多叛轄正歸溪巴烏杓贊之被殺也綽爾結逃奔河州見知河州洮西安撫王贍言轄正為乾展等所制其國必亡吐蕃可乘亂取也贍方坐白草原增級冒賞奪官兾以功贖過密畫取吐蕃策遣其客黃亨詣京師白宰相章惇惇納之下其事熙河蘭會經略使孫路計議路嘗欲取青唐先建請於喀羅川口作橋築城斷西賊與吐蕃相通道朝廷猶難之及是遂言青唐必可取即大發府庫招來羌人正月七日二月七日當參照此假實録殊不詳參取髙永年隴右録汪藻青唐録王鞏甲申雜見增入之髙永年所録比汪藻差詳或有抵牾則存其合者曽布日録六月十二日癸未云云可考今附注六月末髙永年隴右録云綽爾結來奔見知河州王贍以青唐之亂告言溪巴烏起河南諸酋皆叛以應之其相森摩乾展等皆跋扈欲為亂乘此可取贍未四之從其後河南大酋畢斯布結以其衆降并獻葉公等城四城謂葉公丹貝嘉木卓磋藏也畢斯布結果莊之孫果莊曽逐溪巴烏又其叔阿蘇嘗手殺杓贊世有仇怨聞溪巴烏起畢斯布結不自安遂來歸又言轄正已囚廢青唐可取之狀贍以為河湟自昔中土而久陷沒轄正受國爵命而酋擅攻逼廢之國中擾亂自相誅殺義當拯國之况北有強鄰謂夏國西有吐蕃謂輝和爾及西城諸若為他國所并則邉患尤大取亂侮亡兼弱攻昧此其時也乃上其事建言甚力朝廷善其計從之命贍專撫其事已而邈川諸酋求內附是時熙河路方城會州因中分其兵詔大帥孫路駐河州命贍統領河州軍馬為先鋒總管王愍統領熙岷軍馬䇿之以撫納邈川諸羌實元符三年秋七月十八日也趙挺之崇寧邉略云竇志充宣德言青唐邈川用兵即熙河二州蕃部饋運皆困往年自河州般草至湟州每草束計費一十二貫乃到
