body:
  text: 續資治通鑑長編卷四百五宋李燾撰哲宗元祐二年九月庚戌朔刑部大理寺言應限奏獄二百紙已上為大事十二日十紙已上為中事九日不滿十紙為小事四日在京八路大事十日中事五日小事三日臺察并刑部等處舉劾諸處約法狀並十三日三省樞密院再送各减半有故量展不得過五日又公案二百紙已上為大事限三十五日斷二十四日議十一日十紙已上為中事限二十五日斷十七日議八日不滿十紙為小事限十日斷七日議三日在京八路大事限三十日斷二十日議十日中事限十五日斷十日議五日小事限十日斷七日議三日臺察并刑部等處舉劾諸處約法並限三十日斷二十日議十日從之新木刪修今止從舊辛亥詔吕公著今後入朝凡有失儀無得彈奏工部員外郎豐稷為殿中侍御史從御史中丞胡宗愈侍御史王覿薦也賜熙河蘭㑹路將兵銀合茶藥有差以討蕩西蕃犯塞部族焚奪河橋回塞也是日太皇太后遣中使賜宰臣執政酒果并黃金三百兩犀帶兩條諭㫖云知卿等于邊事極留意勞心故有是賜其御封物仍不許辭免吕公著亟以小牘告文彥博等曰密賚恐不可不辭免果莊得罪先朝獲之誠可慶若便指為廟堂之功則將帥聞之必過有希望反啓將來貪功生事之弊豈可不熟慮也彥博等遂各具手劄辭免繼以面論訖不許乃受之辭密賚吕公著家傳及范純仁言行録皆有之其賜物亦同蓋當時三省密院俱得此賜也癸丑詔內藏庫物聽以多寡相除後勿為例置庫百餘年至是始編閲之御集尤詳帝九朝紀事本末甲寅詔問神宗皇實録何日成書修撰官言若併力修撰約來年冬可畢乙卯發太皇太后冊寶于大慶殿太皇太后御崇政殿受冊丙辰發皇太后皇太妃冊寶于文德殿丁巳詔文彥博告老章奏有司勿受詔禮部置諸科舉人籍此據編録冊增入翰林學士兼侍讀蘇軾言臣竊見近者熙河路奏生擒果莊百官稱賀中外同慶臣愚無知竊謂安危之機正在今日若應之有道處之有術則安邊息民必自是始不然將驕卒惰以勝為災亦不足怪故臣區區欲先陳前後致寇之由次論當今待敵之要雖狂愚無取亦臣子之常分昔先帝用兵纍年雖中國靡敝然夏人困折亦幾于亡橫山之地沿邊七八百里中不敢耕者至二百餘里嵗賜既罷和市亦絶國中匹帛至直十餘千老弱轉徙牛羊墮壞所失蓋不可勝數飢羸之餘乃始欵塞當時執政大臣謀之不深因中國厭兵遂納其使每一使至賜豫貿易無慮得絹五萬餘匹歸鬻之其民匹五六千民大悅一使所獲率不下二十萬緡使五六至而纍年所罷嵗賜可以坐復既使彼因吾資以德其民且飽而思奮又使其窺我厭兵欲和之意以為欲戰欲和權皆在我以故輕犯邊陲利則進否則復求和無不可者若當時大臣因彼之請受其詞不納其使且詔邊臣與之往返商議所獲新疆取捨在我俟其詞意屈服約束堅明然後納之則彼雖背恩反覆亦不至如今日之速也彼雖有易我意然不得西蕃解仇結好亦未敢動夫鄂特凌古董戩之賊臣也挾契丹公主以弒其君之二妻董戩死匿喪不發逾年衆定乃詐稱嗣子僞書果莊溫錫沁等名以請于朝當時執政若且令邊臣審問果莊等以鄂特凌古當立不當立若朝廷從汝請遂授節鉞鄂特凌古真汝主矣汝能臣之如董戩乎若此等無詞則是諸羌心服既立之後必能統一諸部吾又何求若其不服則釁自彼作爵命未下曲不在吾彼既一國三公則吾分其恩禮各以一近上使額命之果莊等各得所欲宜亦無患當時執政不深慮此専以省事為安因其妄請便授節鉞鄂特凌古自知不當立而憂果莊之討也故欲借力于西夏以自重于是始有解仇結好之謀而果莊亦不平朝廷之以賊臣君我也故怒而盜邊夏人知諸羌之叛也故起而和之此臣所謂前後致寇之由明主不可以不知者也雖既往不咎然可以為方來之鑒元昊本懷大志長于用兵諒祚天付凶狂輕用其衆故其為邊患皆歷年而後定今梁氏専國素與星多不協方內自相圖其能以創殘呻吟之餘久與中國敵乎料其姦謀蓋非元昊諒祚之比矣意謂二聖在位恭默守成仁恕之心著于逺邇必無用武之意可肆無厭之求蘭㑹諸城鄜延五寨好請不獲勢脅必從猖狂之後求無不獲計不過此耳今者竊聞朝廷降詔諸路飭勵戰守深明逆順曲直之理此固當今之急務而詔書之中亦許夏人之自新臣竊以為開之太易納之太速曾未一戰而厭兵欲和之意已見乎外此復蹈前日之失矣臣甚惜之今既聞果莊之捷或漸有欵塞之謀必將為恭狠相半之詞而繼之以無厭之請若朝廷復納其使則是欲戰欲和權皆在彼有求必獲不獲必叛雖偷一時之安必起無窮之釁故臣願明主斷之于中深詔大臣密敕諸將若夏人欵塞當受其詞而却其使然後明敕邊臣以夏人受恩不資無故犯順今雖欵塞反覆難保若實改心向化當且與邊臣商議苟詞意未甚屈服約束未甚堅明則且却之以示吾雖不逆其善意亦不汲汲求和也彼若心服而來吾雖未納其使必不于往返商議之間遽復盜邊若非心服則吾雖蕩然開懷待之如舊能必其不叛乎今嵗涇原之人豈吾待之不至耶但使吾兵練士飽斥堠精明敵無大獲不過數年必自折困今雖小勞後必堅定此臣所謂當今待敵之要亦明主不可以不知者也今朝廷意在息民不憚屈已而臣獻言乃欲艱難其請不急于和似與聖意異者然古之聖賢欲行其意必有以曲成之未嘗直情而徑行也將欲翕之必固張之將欲取之必固豫之夫直情而徑行未有獲其意者也若權其利害究其所至則臣之愚計于安邊息民必久而固與聖意初無小異然臣竊度朝廷之間似欲以畏事為無事者臣竊以為過矣夫為國不可以生事亦不可以畏事畏事之弊與生事均譬如無病而服藥與有病而不服藥皆可以殺人夫生事者無病而服藥也畏事者有病而不服藥也乃者鄂特凌古之請人人知其不當豫而朝廷豫之以求無事然事之起乃至于此不幾于有病而不服藥乎今又欲遽納夏人之使則是病未除而藥先止其與幾何臣于侍從之中受恩至深其于委曲保全與衆獨異故敢出位先事而言不勝恐悚待罪之至軾言與轍略同詔許夏人自新事在八月十四日己未涇原路經略司言夏人犯鎮戎軍實録但書夏人犯鎮戎軍不言經略司奏蓋踈略也後六日實録又書經略司奏夏人遁去即是犯鎮戎者今追書之張舜民志劉昌祚墓云二年九月夏人寇鎮戎西寨已至城下衆五十萬又言國母自將昌祚寢疾不能興欲舁行朝廷不從有㫖令知鎮戎軍張之諫權統制軍馬昌祚素知之諫不能乃夙夜馳授方略盡兵力而屬之十一將總七萬餘人之諫得之懦不敢戰來即納之羊馬城中至人身不能轉側城中兵望賊焚室廬掘冢墓號哭唾手欲戰之諫以劍加之不得出賊留五日攻三川不拔而去昌祚每聞軍前報即拊席大罵之諫之諫又重賂走馬王紳使為文字游談京師既而果以之諫為有功除西上閣門使物論歡然復遣監司體量展之諌磨勘昌祚病起欲有所伸㑹之諫死但貶王紳而已此事當考十一月二十四日之諫遷官明年閏十二月十六日展磨勘紹聖二年正月二十六日樞密院奏亦合參照八月二十二日實録書夏人寇三川諸寨敗之九月十日又書寇鎮戎據劉昌祚墓志則先寇鎮戎後寇三川不知孰是當考庚申侍御史王覿奏編類章疏係二年九月十一日蘇軾程頥向緣小惡浸結仇怨于是頥軾素相親善之人亦為之更相詆訐以求勝勢若决不兩立者乃至臺諫官一年之內章疏紛紜多緣頥軾之故也前日頥敗而言者及軾故軾乞補外既降詔不允尋復進職經筵而又適當執政大臣有闕士大夫豈得不憂雖臣亦為朝廷憂也軾自立朝以來咎愆不少臣不復言但廟堂之上若使量狹識暗喜怒任情如軾者預聞政事則豈不為聖政之纍耶然軾之文采後進少及陛下若欲保全軾則且勿大用之庶幾使軾不遽及于大悔吝貼黃言軾乞補外所上章留中不出臣料之彼雖以補外為請其章中必有自安之謀以拒公議果爾則陛下益當深察其邪正真僞而審處之又貼黃言頥軾自擢用以來皆纍有臺諫官論列若使二人者言行全無玷闕亦安得致人言如此之多也近日既察頥而逐之惟軾尚存公議未允臣今日所論但欲且更無進用軾徐察其為人軾乞補外十月六日可考覿又奏伏見陛下孜孜求治日以進君子退小人為事小人既非其所欲則夙夜經營務在中傷君子近乃頗造為蜚語有五鬼十物十八姦之說臣雖不能盡得其名氏大概不過取一二公議所共惡者以實其說而餘皆端良之士也伏望出中詔榜朝堂明示士大夫以不信讒言之意以安士大夫之心覿前奏二年九月十一日後奏九月十二日皆以編類章疏增入左正言丁隲奏韓資乞除雪父存寶罪未賜施行竊以存寶被刑之初只因何正臣希意求合略不推原本情曲加煆鍊置之重法正臣勇于謀身輕絶人命致先朝有誤殺人之名今二聖在上命近臣推原詳究一切枉陷雖杖笞之罪皆得申理况如存寶乞檢㑹訴理所奏狀蠲除存寶罪名還其在身官爵貶放正臣等附㑹慘刻之惡貼黃言存寶枉遭誅戮出于何正臣附㑹朝廷遂得待制今存寶正申雪則正臣當正典法此據編類章疏二年九月十二日奏辛酉劉舜卿言請削奪鄂特凌古官爵令巴珍覺遙領青唐詔劉舜卿先撫納河南生羌若嘉木卓未可下先以禍福曉諭鄂特凌古其朗格占仍許以諸司使令誘致磋藏丹貝葉公諸族其間首領即次第補授以官若朗格占能招撫果莊舊部族地土即視果莊官祿推賞青唐録亦具載此巴珍覺朗格占當考臣僚上言竊聞近有指揮建寧軍節度副使建州居住吕惠卿許于泰州居住竊聽朝論人心洶洶為之不安惠卿操心貪險為性凶邪姦言足以鼓扇羣小險橫足以脅持上下方其執政之時引援凶人布列中外殘黨尚未衰息忽聞引置惠卿于江淮之間羣小莫不鼓舞相慶兼惠卿凶殘忍詬貪冒無厭既得近地必須日夜呼召黨與力肆營求造作訛言謀害朝政凶人漸長其勢可憂伏望朝廷依舊且令建州居住詔吕惠卿許于泰州居住指揮更不施行言者御史中丞胡宗愈左諫議大夫孔文仲侍御史王覿左司諫韓川也此據元祐密疏增入言者姓名則用政目所書政目云九月十二日吕惠卿許泰州居住不行胡宗愈孔文仲王覿韓川言其不當也按八月四日已有更候一年檢舉指揮不知何日却移泰州當考壬戌以虢州欒川冶為鎮詔諸處無得受文彥博乞致仕文字十二月二十八日又詔癸亥知泉州林顔知濠州顔前為廣南監司坐請給逾法降知永州言者又論其不當任藩郡復徙之舊録脫誤新録削去今用蘇轍制集刪修熙寧三年六月有林顔傳乃不載此甲子賜宰臣執政經筵官宴于東宫上親書唐人詩分賜之以講論語終篇故也乙丑吕公著以下謝賜宴及御書太皇太后曰皇帝天資聰敏宫中惟好學字學則易成昨日所賜欲卿等知爾涇原路經略司言夏人夜遁賜將帥兵民銀錢絹袍帶有差仍促具功狀以聞王文郁傳云二年春西賊入寇涇原文郁遣兵掩擊西關堡嘉木卓城斬獲千級涇原賊遽引還文郁時知蘭州當即是此秋文郁傳乃云二年春當考夏人之寇涇原也環慶經略使范純粹以是月甲寅得涇原報純粹丞命副總管曲珍領兵自環州傍附涇原深入牽制珍翌旦遂行純粹面戒珍曰本路首建牽制應援之䇿勿謂鄰路致寇非我之職當忘軀報國解朝廷深憂珍鼓激戰士晝夜疾馳出境外三百餘里赴吹哷羅章討蕩賊帳斬一千二百餘級俘其老弱婦女六百餘人以還夏人遽釋涇原之圍議者謂珍有力焉此用范純粹奏議及曲珍本傳修入明年二月十六日珍遷遙防純粹尋列上珍功狀且言吹哷羅章係橫山巢穴最盛之地山崖深逺道路險絶前後漢兵未嘗窺及其韋宥等州一帶邊羌每聞漢界㸃兵即于此處㑹集恃險自固若非珍謀慮精密身先羣衆及一行將佐軍士協心悉力即涇原大寇重圍固守未易解免而險阻賊巢未易破蕩今幸平復于夏國頗係體勢即與尋常淺攻近掠及遇賊戰鬬事體不同兼牽制之法久廢如昨來永樂之禍鄰路坐視無有援者今幸朝廷因臣建議再立牽援之法法行之初鄰道被寇而珍等乃能誠心體國不以彼我為間出竒冒險粗有成績伏望聖慈不限常格優賜旌賞以勸赴功之士言吹哷羅章係十月十五日奏今并此先是安燾言為國者既不可好用兵又不可畏用兵好則疲弊生靈畏則取侮致患今朝廷每戒邊臣非舉國入寇不得應之則固畏用兵矣然敵數犯塞亦未免疲弊之患雖僅保城寨而適墮其計中願復講攻擾之䇿間使諸路徑兵更出迭歸伺便討擊多方以誤之使疲于奔命蓋左氏所謂用三師以疲楚之意此計之上也又乾順方數嵗非秉常近親獨梁葉普利于持權與梁氏立之其酋長善用兵如威明阿烏輩皆秉常族黨多反側顧望不若遂顯間之謂阿烏等既不自安一旦得領重兵焉知其不回戈復讎然則梁氏危矣且不必密如漢用陳平之計間范增惟恐其使者不知此亦一竒也欲以二䇿下諸路深求利害之實諸帥謂俱中事機願併行之而夏人果相猜二又知淺攻無益遂以數十萬衆犯涇原而主將果不用命尋至狼狽引去諸路牽制斬獲不可勝計此據安燾行狀當考更出迭歸見十二月二十四日詔凡父及嫡繼母在不得封贈所生母雖亡而未有官封者不得獨乞封贈所生母若父及嫡繼母所生母未有邑封者亦不得獨乞封贈妻從吏部請也知鄧州天章閣待制陳安石為龍圖閣直學士丙寅東上閣門使慶州刺史環慶路馬步軍副都總管曲珍為果州團練使以期赦當叙也珍本傳云元祐二年秋西賊寇涇原號四十萬珍搗虛馳三百里大破羌于吹哷羅章橫山斬首千二百四十級俘六百六人遂解涇原圍此事已附十六日曽肇制集云刑部狀檢㑹曲珍元任龍神衛四廂都指揮使懷州防禦使鄜延路副都總管坐永樂事降皇城使環慶鈐轄該赦叙東上閣門使慶州刺史今再奉㫖特與叙又曾肇制集云密院關環慶經略司奏差副總管曲珍部領人馬入西界吹哷羅章討蕩牽制涇原路作過西賊得功奉聖㫖特與叙二官充遙郡防禦使按珍以功改領遙防在三年二月十六日此但准赦叙官耳三年正月二十五日云云可考范純粹奏論曲珍䇿應功已附此月十六日詔臨洺鎮役民不足勿復為縣丁卯大宴集英殿禁私造金箔己巳太子右監門率府率令毣授通直郎令毣以講書換官蘇轍行詞庚午吕公著言伏覩今月十五日以經筵講畢論語賜執政及講官御筵復內出皇帝御書唐賢律詩分賜臣等各一篇臣等次日于延和殿簾前謝䝉太皇太后宣諭皇帝好學在宫中别無所為惟是留心典籍天下幸甚臣伏思皇帝陛下睿哲之性出于天縱而復內稟慈訓日新典學誠以堯舜三代為法則四海不勞而治今來論語終帙進講尚書二書皆聖人之格言為君之要道願陛下念兹在兹以廣聖德臣職在輔導無能裨補輒于尚書論語及孝經中節取要語共一百段進呈聖人之言本無可去取今惟取明白切于治道者庶便於省覽或遊意筆硯之間以備揮染亦日就月將之一助也他日三省奏事畢太皇太后宣諭公著曰所進尚書論語等要義百篇今皇帝已依所奏每日書寫看覽甚有益于學問與寫詩篇不同也公著與同列皆言此聖人經訓有補于治日宜親閲甲戌詔洺州曲周鎮莫州鄚鎮勿復為縣以有司言其非便也六月十四日復曲周七月二十三日復鄚縣丙子翰林學士兼侍讀蘇軾言臣聞善用兵者先服其心次屈其力則兵易解而功易成若不服其心惟力是恃則戰勝而寇愈深况不勝乎功成而兵不解况不成乎頃者西方用兵纍年先帝之意本在弔伐而貪功生事之臣惟務殺人爭地得尺寸之土不問利害先築城堡置州縣使敵人憎畏中國以為朝廷専欲得地非盡滅我族類不止是以併力致死莫有服者今雖朝廷好生惡殺不務逺略而此心未信憎畏未衰心既不服惟有鬬力力屈情見勝負未可知也今日新獲果莊威震四逺邊臣賈勇爭欲立功以為河南之地指顧可得正使得之不免築城堡屯兵置吏積粟而守之則中國何時息肩乎乃者王韶取熙河全師獨克使韶有逺慮誅其叛者易以忠順即用其豪酋而已則今復何事其所以兵連禍結罷弊中國者以郡縣其地故也往者既不可悔而來者又不以為戒今又欲取嘉木卓城曰此要害地不可不取方唐盛時安西都護去長安萬里若論要害自此以西無不可取者使諸羌知中國有進取不已之意則寇愈深而兵不解其禍豈可量哉臣願陛下深詔邊吏叛則討之服則安之自今已往無取尺寸之地無焚廬舍無殺老弱如此期年諸羌可傳檄而定然朝廷至意亦自難諭將帥未必從也雖日行文字終恐無益宜驛召陜西轉運使一員赴闕面敕戒之使歸以諭將帥而察其不如詔者臣又竊聞朝論謂果莊犯順罪當誅死然譬之鳥獸不足深責其子孫部族猶足以陸梁于邊全其首領以纍其心以為重質庶獲其用此實當今之良䇿然臣竊料果莊凶豪素貴老病垂死必不能甘于困辱為久生之計自知生存終不得歸徒使其臣子首鼠顧忌不敢復讎必將不食求死以發其衆之怒就使不然老病愁憤自非久生之道果莊若死則其臣子専意復讎必與鄂特凌古合而北交于夏人此正胡越同舟遇風之勢其交必堅而溫鍚沁介于鄂特凌古夏人之間地狹力弱其勢必危若見并而吾不能救使二寇合三面以窺熙河則其患未可以一二數也如臣愚計可詔邊臣與果莊約若能使其部族討鄂特凌古而納趙醇忠者當放汝生還質之天地示以必信果莊若從則稍富貴之使招其信臣而喻至意焉果莊既有生還之望不為求死之計其衆必從以果莊之衆與溫錫沁合而討鄂特凌古其勢必克既克而納醇忠雖放還果莊可以無患此必然之勢也西羌本與夏人世仇而果莊本與鄂特凌古不協若許以生還其衆必相攻縱未能誅鄂特凌古亦足以使二盜相疑而不合也昔太史慈與孫䇿戰幾殺䇿䇿後得慈釋不誅放還豫章卒立竒功李訴得吳元濟將李祐解縳用之與同臥起卒擒元濟非豪傑名將不能行此度外事也議者或謂果莊之獲兼用近界酋豪力戰而得之仇怨已深若故生還此等必無全理臣以為不然若果莊死于中國其衆讎此等必深若其生還其讎之亦淺此等依中國為援足以自全自古西羌之患惟恐解仇結盟若所在為讎敵正中國之利無可疑者臣出位言事不勝恐悚待罪之至十月二十八日范純仁云云與軾殊不同
