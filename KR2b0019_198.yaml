body:
  text: 續資治通鑑長編巻一百九十四宋李燾撰仁宗嘉祐六年秋七月壬午朔光禄寺丞知長洲縣夏噩坐私貸民錢特勒停噩中制科本路提㸃刑獄王道古惡其輕傲捃其事而廢之癸未賜沂州草澤髙太古粟帛以轉運使言其行義推于鄉里也乙酉泗州言淮水溢丙戍詔淮南兩浙江南東西路水灾其令轉運使就差本路官體量蠲其賦租仍預為賑救之術無使秋冬乏食以致逃移置廣州東莞縣界東西路廵檢一員水軍二百人丁亥權御史中丞王疇言古之事君者必以禮故要君者謂之無上以其近於嫚也嫚則事君之禮廢矣古之事君者必以誠故言偽而辨者孔子得以誅之以其近於詐也詐則事君之誠闕矣是知上下之分君臣之義由禮與誠則罔不治由嫚與詐則罔不亂兹二者風俗之源逆順之萌慮天下者不可忽其漸而不察也察之亦不可以不誠比年中外臣僚或因較量差遣或因辨論身計或因進以干譽或因罪而覬免肆為妄談輙形奏章其間求放歸田里者有之乞别自營生者有之嵗未至而願致仕者有之茍於禄而請歸農者有之是皆心語兩違情實交戾外示輕官爵之愛以欺於衆内實計分銖之利而争於上違義忘耻至於要君用詐而安為小人之行陛下聖度包荒悉置不問彼小人者亦豈識恩徳之隆㦲且夫君臣之間猶父子也既委質立朝陳力處位於去就之際豈得容易而言今茍以私覬遂僥倖而妄章詭辭𤼵之不疑是臣下不肅朝廷不尊而公為嫚詐之事以要於陛下不有沮止恐非所以範俗流化也請自今有要君作為如嚮所陳者並許彈奏施行如此則罔上邀利者知所畏而士之行已有恥事君以誠者少加勸矣又國家開廣言路任用臺諫官以来天下公議其所彈治者必廢所稱援者必進既為上所信属故其職特為要劇比年士大夫乃有險詖之人挾已憎愛依倚形似造浮説奔走臺諫之門皷扇風波之論幸言者得以上逹推原其情本非公正助治之道止於隂借權力取快私意當言之人率務舉職既所傳耳目稍異則豈敢遂無論列若由風聞而事得其實朝廷從而施用之有補聖治兹固善矣不幸萬有一愛憎不中之論熒惑紊撓人主之聰眀豈不為聴斷之累㦲臣愚謂前世風俗不平毁譽亂公而下詔誡勵者有矣欲深鑒時弊特屈聖訓曉勵士大夫庶㡬媮薄革心有以激清朝路也又御史府内司朝廷憲度外察郡縣吏治若朝廷政事之施行者賞罰有所未當號令有所未允忠邪有所未辨紀綱有所未正則御史得以言之若郡縣政事之施行者官吏有所未公法制有所未眀寃枉有所未申貪暴有所未除則御史得以言之然則王於督察内外施行之事随所是非當否而言上以補救朝政下以警飭四方之吏共適於至公之道而已非謂朝廷之事有所未及施行而御史得以先之也其所以不可不先者将以眀上下之分也上下之分茍眀則人主之柄操執有歸而綱紀不亂綱紀不亂則天下無難於為治也比年中外士大夫偶見陛下任用臺諫官其所開陳多蒙信納殊不知言事之人所論列者亦自有體朝廷所以聴納而施用者亦固自有次第便謂凡百事状不計行與未行臺諫皆得以専之乃有白事於朝而更以状干臺司者如往嵗陳希亮判開拆司與三司辦理勾銷帳按事當上聞朝廷聴法所在希亮每奏一状必并申臺又近日廣西轉運使李師中以邕桂獄事暴𤼵宋咸蕭固姦贓止當覈實盡理朝廷自有刑典如獄辭未真惡状未具則當乞再加按問師中乃别為臺状用小紙觧説三十餘事推原其情盖欲當任者為言而助之爾臣以謂事有曲直法有輕重朝廷以至公待天下其有罪者必罰無赦固不俟言者助之而適足為朝廷之害甚無謂也請自今臣僚如以公事奏朝廷不俟施行而輙申御史臺者許彈奏以聞上嘉納之戊子録昭憲皇太后孝眀孝恵孝章淑徳皇后家子孫進秩授官者十有九人先是集賢校理同修起居注江休復言朝廷初行祫享之禮而昭憲太后躬育祖宗其後裔多流落民間宜思所以推恩者於是并四后家子孫皆録之尋復賜昭憲太后家信陵坊第一區賜第乃十一月癸酉今并書眀年六月又録懿徳皇后曽孫二人詔中書樞宻院累年未脩時政記自今湏随月撰進己丑提㸃河北刑獄張問言奉詔相度河北八州軍塘濼今若就塘出土作堤以畜西山之水則渉夏大河雖溢而民田無衝浸之害請下逐處嵗以時修築從之四年八月己丑可考壬辰同修起居注同知諫院司馬光同詳定均税光既立條約下諸路監司施行又言國家凡欲立事當先使賞罰眀白然後事無不成職方員外郎秦植前通判徳州均五縣税皆得平允並無詞訴若遇庸愚之人煩擾敗事同歸常調一無殿最則能吏觧體必無成功伏望朝廷察其勤瘁優加酬奨并其餘均税官吏随其功過量行懲勸則来者覩之無不盡力矣太常禮院及整肅禁衛所並言請自今駕出以閤門祗候并内臣各二員挾駕頭左右次扇筤仍以親從兵二十人從其後先是幸睦親宅内侍抱駕頭堕馬駕頭壊御史中丞韓絳乞増乗輿出入儀衛之禁事下太常禮院等處参議而定此制江休復雜志云韓維問李淑駕頭何物曰百講坐之一劉敞訪之王洙云御座傳四世矣乃初即位所坐癸已詔曰臺諫為朕耳目之官而事有不能周知固将博問朝士大夫以廣聴察乃有險詖之人因縁憎嫉依倚形勢興造飛語以中傷善良殆非忠厚之行昔夏后時官師相規漢之公卿耻言人過今吾士大夫乃違古人之守蹈薄俗之弊甚無謂也中書門下其為朕申儆百工務敦行實循而弗改當重絀焉從御史中丞王疇所請也疇正傳云陳升之拜樞宻副使諌官御史唐介等奏彈升之不當大用朝廷持不行介等為衆人游談所誤疇疏言浮華險薄之徒往来諌官御史掎摭人罪寖以成俗請出詔戒勸從之案疇以七月丁亥疏陳三事此其一事時升之及介等已罷去數月此疏未必端為介等設疑正傳有所緣飾今不取馮絜已御史臺記又誤以此詔在嘉祐三年云包拯時為中丞言事峭直執政不喜因下此詔其先後尤差錯今不取王偁東都事畧朕為善治之主以天下耳目為視聴而不自任其聰眀耳目之官今臺諌之任也夫以四海之廣萬事之衆臺官數人不能以周知固將詢及士大夫而其間傾邪險害之徒不為朝廷義理所在謂職在言責執必施行輙狗已之愛憎倚依形似扇造語言以中善良豈朕所以圖治之義㦲甲午出内藏庫絹二十萬匹下河北助糴軍儲丁酉詔諸路轉運使提㸃刑獄司比用祫享赦書捜訪天下有節行學術之人如聞沽飾名譽徼進者多非所以厚風俗也其罷之戊戍詔辰州省地民先逃入溪峒今復歸者蠲丁税三年環慶經畧司言蕃部宻覺族冦平逺寨其詳具十一月戊午己亥起居舍人同知諫院龔鼎臣為淮南路體量安撫使侍御史陳經為兩浙路體量安撫以水灾也新知江州刑部郎中蕭固追三官勒停廣南西路轉運使度支郎中宋咸追一官勒停固坐知桂州日令部吏市女口及差指揮入兩浙商販私物咸坐在邕州射銀楪子凡九百九十六片及事覺詐収入本司公使簿也蕭固宋咸勒停已見四月庚申李師中權漕時今依實録復載此段但削去責授檢校水部員外郎泰州團練使等字更湏考詳壬寅同知諫院司馬光以三劄子上殿其一論君徳曰臣竊惟人君大徳有三曰仁曰明曰武仁者非嫗煦姑息之謂也興教化修政治養百姓利萬物此人君之仁也眀者非煩苛伺察之謂也知道誼識安危别賢愚辨是非此人君之眀也武者非强亢暴戾之謂也惟道所在斷之不疑姦不能惑佞不能移此人君之武也故仁而不眀猶有良田而不能耕也眀而不武猶視苖之穢而不能耘也武而不仁猶知穫而不知種也三者兼備則國治强闕一則衰闕二則危三者無一焉則亡自生民以来未之或改也臣不勝區區觸死忘生竊見陛下天性慈恵謹微接下子育元元汎愛羣生雖古聖王之仁殆無以過然自踐阼以来埀四十年夙夜孜孜以求至治而朝廷紀綱猶有虧缺閭里窮民猶有怨歎意者羣臣不肖不能宣揚聖化将陛下之於三徳亦有所未盡歟臣聞春秋傳曰賞慶刑威曰君臣幸得以修起居注日侍黼扆之側伏見陛下推心御物端拱淵黙羣臣各以其意有所敷奏陛下不復詢訪利害考察得失一皆可之誠使陛下左右前後股肱耳目之臣皆忠實正人則如此至善矣或出於不意有一姦邪在焉則豈可不為之寒心㦲夫善惡是非相與混殽若待之如一無所别白或知其善而不能賞知其惡而不能罰則為善者日懈為惡者日勸雖有堯舜禹湯文武之君稷契伊吕周召之臣以之求治猶鑿氷而取火適楚而北行也伏望陛下少埀聖恩以天授之至仁廓日月之融光奮乾剛之威斷善無微而不録惡無細而不誅則唐虞三代之隆何逺之有其二論御臣曰臣聞致治之道無他在三而已一曰任官二曰信賞三曰必罰康誥稱文王之德曰庸庸祗祗威威顯民言用其可用祗其可祗刑其可刑也臣竊見國家所以御羣臣之道累日月以進秩循資塗而授任茍日月積久則不擇其人之賢愚而寘髙位資塗相值則不問其人之能否而居重職夫人之材性各有所宜而官之職業各有所守自古得賢之盛莫如唐虞之際然稷降播種益主山林垂為共工龍作納言契敷五教臯陶眀刑伯夷主禮后䕫典樂皆各守一官終身不易茍使之更去迭来易地而守未必能盡善也今以羣臣之材固非八人之比乃使之遍居八人之官逺者三年近者數月輙已易去而望職事之修功業之成必不可得也非特如是而已設有勤恪之臣悉心致力以治其職羣情未洽績效未著在上者疑之同列者嫉之在下者怨之當是時朝廷或以衆言而罰之則勤恪者無不觧體矣姦邪之臣衒竒以譁衆養交以市譽居官未久聲聞四逹蓄患積弊以遺後人當是之時朝廷或以衆言而賞之則姦邪者無不争進矣所以然者其失在於國家采名不采實誅文不誅意夫以名行賞則天下飾名以求功以文行罰則天下巧文以逃罪如是則為善者未必賞為惡者未必誅今陛下誠能博選在位之士不問其始所以進及資序所當為使有徳行者掌教化有文學者待顧問有政術者為守長有勇略者為将帥眀於禮者典禮明於法者主法下至醫卜百工皆度材而授任量能而施職有功則増秩加賞而勿徙其官無功則降絀廢弃而更求能者有罪則流竄刑誅而無或寛貸如是而朝廷不尊萬事不治百姓不安四方不服臣請伏面欺之誅凡臣所言皆陛下耳所饜聞心所素知然致治之要無以易此知之非艱行之惟艱顧陛下力行何如爾其三論揀軍曰臣竊聞朝廷近降指揮揀選諸指揮兵士補填近上軍分其主兵之官惟務人多不復精加選擇其間眀知羸弱悉以充數臣以耳目疎短聞知後時不能預陳可否致事已施行然其得失利害之眀不可不盡為陛下言之往者不可救来者猶可追臣竊惟當今國家之患在於士卒不精故邊方昌熾財用不足故公私窘廹今縱不澄汰衰老以省大費而又平居晏然非有警急坐増無用之衆以長無窮之患臣不知為國計者果何如也方今天下安樂無虞而府庫之積随得随散曽無羨餘設不幸有螽螟水旱飢饉相仍盜賊猝起戎敵内侵不知陛下将何以待之此不可不為之先慮也臣竊觀自唐室募兵以来果能得武猛材力之士猶為有益若不擇勇怯而養之臣不知其可也唐徳宗以神䇿軍使白琇珪為京城召募使應募者皆市井沽販之人有名無實及涇師犯闕徳宗命琇珪以神䇿軍禦之卒無一人至者徳宗狼狽失據幸奉天及五代之際軍政尤紊是以叛亂接迹禍敗相尋周世宗以高平之戰士卒不精故樊愛能何徽所部先奔歸而大閱諸軍悉揀去老弱選其精鋭以為侍衛親軍由是甲兵之盛當世無比故能南割淮甸北取闗南羣雄畏服所向無敵太祖皇帝受天眀命撫有大寳當是之時戰士不過數萬北禦契丹西捍河東以其餘威開荆楚包湖湘巻五嶺呑巴蜀掃江南服吴越太宗皇帝紹丕烈奮神威遂㧞晉陽一統四海堂堂之業萬世賴之今天下兵數臣不能盡知竊聞比於太祖皇帝時其多數倍然元昊西羌之豎子智高蠻獠之微種乃敢倔强河西横行嶺表國家發兵討之士卒或望塵奔北迎鋒沮潰毁辱天威為四方笑由是觀之養兵之術務精不務多也且今之所選之兵升其軍分増其糧賜是宜感戴上恩人人喜悦而竊聞京城之内被選之人往往恣嗟悲怨父子相泣况於方外兵士違去鄉里訣别親戚其為愁苦不言可知使中外人情皇皇如此豈惟久逺之害亦不可不以切近之憂為萬一之慮也兵者國之大事廢興之端安危之要盡在于是臣不知増與不増令兩府大臣相與熟議經久利害然後行之今在京兵士已經揀上分配諸軍者無如之何其未揀及外州軍兵士伏望朝廷特賜指揮下應係揀軍臣僚湏是一一躬親仔細揀選好人材有膂力及得等様别無疾患方得揀上如已經揀中後朝廷别差不干礙官覆揀得却有不及等様及羸弱病患之人其元揀臣僚伏乞重行貶竄仍自後每遇大段招㨂兵士湏令兩府臣僚同共商量度財用豐耗及事之緩急若湏至招㨂方得聞奏施行并約束揀軍臣僚務精不務多如今来指揮上以其一㽞中其二送中書其三送樞宻院戒㨂軍官癸卯左侍禁前淯井監監押馬允正為右侍禁初淯井監生界敵間出市馬已乃剽畧而去嘉祐元年秋領衆百餘出自陵溪本監判官鄭戡與允正使招安将唐則要致于城中擊殺者七十餘人允正既以功遷官後戡代去坐與人争田産勒停至是始上其功改大理寺丞允正復自論嘗親殺敵人而戡無功殿中侍御史裏行陳洙言戡本蜀豪族停官未叙於法不得改官乃奪大理寺丞因下本路提㸃刑獄司按所論功皆不實故又奪允正所遷官甲辰贈故内殿承制宋士堯為崇議使内殿崇班李徳用為禮賔使東頭供奉官左眀為西京左藏庫副使右班殿直何潤陳弼並為太子右清道率府率以士堯等與交阯戰歿也貴人董氏生皇第十三女戊申進位媫妤辭之是月河北京西淮南兩浙東西並言雨水為灾八月乙夘龍圖閣直學士兼侍講知諫院楊畋詳定寛恤民事五年五月丁酉置司六月乙亥遣使己未馬軍副都指揮使武勝㽞後王凱卒車駕臨奠贈彰武節度使諡莊恪凱治軍有紀律善撫循士卒平居與均飲食至臨陣援枹鼓毅然不少假故士卒畏信戰無不力前後與敵遇未嘗挫衂免毫川之戰内侍宋永誠哭于軍中凱劾罪之尤篤於故舊子弟食門下者常十數人庚申詔三館祕閣校宋齊梁陳後魏後周北齊七史書有不完者訪求之壬戍江淮制置發運司言淮水壊泗州城知州王璪通判張師中能協力保完之乞降詔奨諭從之殿中丞王廣淵李立之編排中書諸房文字廣淵眀曽孫立之廸從子也㑹要系此于十二日癸亥賜􅉸州修魚池迎陽埽小吴口役卒緡錢乙丑左侍禁雄覇等路走馬承受林伸言國朝上世陵寢在保州保塞縣東猶有天子巷御城荘存焉其地與邊吴淀相接無數十里頗為塘水所壊乞下本處常完築之從之韓琦家傳云𤦺論塘水之害亦以保塞陵寢為言詔遣監鐡判官楊佐管勾屯田張茂則與保州趙滋同擘劃而實録不書今附見當考司馬光言臣竊以赦者害多而利少然國家之善政也虞書曰眚灾肆赦怙終賊刑謂過誤有害則赦之恃惡自終則殺之非不擇罪之有無并赦之也漢大司馬吴漢病篤光武親臨問所欲言對曰惟願陛下無赦而已王符亦曰今日賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣蜀人稱諸葛亮之賢亦曰軍旅屢興而赦不妄下然則古之眀君賢臣未嘗以赦為羙也國家承順天心子愛百姓發號出令必先至仁然數赦之弊猶未能去又古之赦者其出無常嚴謹周宻不可前知姦民猶抵冒以待之况今國家三年一郊未嘗無赦每嵗盛夏皆有疎決猾吏貪縱大為姦利悍民暴横侵侮善良百千之中敗無一二幸而𤼵露率皆亡匿不過周嵗必遇赦降則晏然自出復為平人往往指望謂之熱敕使愿慤之民憤悒惴恐凶狡之羣志滿氣揚豈為民父母勸善沮惡之意㦲且疎決之名本以盛暑之際恐囹圄之中有滯積寃結有司不為申理使無所告愬故天子臨軒親加慮問平其枉直無辜則赦有罪則誅使久繫之人一朝而決故能消釋沴氣迎致太和非謂不問是非一切縱之也祖宗之時每嵗不過一次疎決死罪下皆逓降一等近年以来或至再三自徒以下一切赦之今嵗五月以前疎決之令已再行矣此所以使百職隳慢姦邪恣睢者也今縱未能盡革前弊伏望陛下特降指揮下中書令後每嵗疎决不過一次或早或晚使外人不可豫期其徒罪仍依舊降從杖或遇親祀南郊之嵗更不疎決永為定制庶㡬為惡之人不敢指以自寛有所戒懼據光集以八月十五日上言乙丑十五日也今附見丙寅左騏驥使榮州防禦使入内副都知鄧保信落都知為許州鈐轄初保信奏令退軍董吉於芳林園㸃化黄金趙槩趙抃王陶等時在言職皆陳其不可弗聴久之吉術無騐又竊金以逃既捕獲抵罪而保信猶出入禁中御史陳洙諫官龔鼎臣共劾保信欺罔乞正典刑故絀之他書或誤以保信為保吉今不取供偹庫使忠州刺史帶御器械蘓安静為内侍押班諫官司馬光龔鼎臣言安静年未五十不當廢舊格乞追寢成命不報丁夘司馬光言臣幸得備位諫官竊以國家之事言其大者逺者則汪洋濩落而無目前朝夕之益䧟於迂濶言其小者近者則叢脞猥瑣徒足以煩浼聖聴失於苛細夙夜惶惑口與心謀涉歴累旬乃敢自決與其受苛細之責不若取迂闊之譏伏以祖宗開業之艱難國家致治之光美難得而易失不可以不謹故作保業隆平之基因而安之者易為功頽壊之勢從而救之者難為力故作惜時道前定則不窮事前定則不困人無逺慮必有近憂故作逺謀燎原之火生於熒熒懐山之水漏於涓涓故作重微象龍不足以致雨畫餅不足以療飢華而不實無益於治故作務實合而言之謂之五規此皆守邦之要道當世之切務戅陋狂瞽觸冒忌諱惟知納忠不敢愛死伏望陛下以萬㡬之餘逰豫之間垂精㽞神特賜省覧萬一有取裁而行之則臣生於天地之間不與草木同朽矣其保業云天下重器也得之至艱守之至艱王者始受天命之時天下之人皆我比肩也相與角智力而争之智竭不能抗力屈不能支然後肯稽顙而為臣當是之時有智相偶者則為二力相参者則為三愈多則愈分自非智力首出於世則天下莫得而一也斯不亦得之至艱乎及夫繼體之君羣雄已服衆心已定上下之分眀强弱之勢殊則衆人之性皆以為子孫萬世如泰山之不揺也於是有驕惰之心生驕者玩兵黷武窮泰極侈神怒不恤民怨不知一旦渙然四方糜潰秦隋之季是也惰者沈酣晏安慮不及逺善惡襍糅是非顛倒日復一日至於不振漢唐之季是也二者或失之强或失之弱其致敗一也斯不亦守之至艱乎臣竊觀自周室東遷以来王政不行諸侯並僣分崩離析不可勝紀凡五百有五十年而合於秦秦虐用其民十有一年而天下亂又八年而合於漢漢為天子二百有六年而失其柄王莽盜之十有七年而復為漢更始不能自保光武誅除僣偽凡十有四年然後能一之又一百五十有三年董卓擅朝州郡瓦觧更相呑噬至于魏氏海内三分凡九十有一年而合於晉晉得天下纔二十年恵帝昏愚宗室構難劉石乗釁濁亂中原散為六七聚為二三凡二百八十有八年而合於隋隋得天下纔二十有八年煬帝無道九州幅裂八年而天下合於唐唐得天下一百有三十年眀皇恃其承平荒於酒色養其疽囊以為子孫不治之疾於是漁陽竊發而四海横流矣肅代以降方鎮䟦扈號令不從朝貢不至名為君臣實為讎敵陵夷衰微至于五代三綱頽絶五常殄滅懐璽未煖處宫未安朝成夕敗有如逆旅禍亂相尋戰争不息流血成川澤聚骸成邱陵生民之類其不盡者無㡬矣於是太祖皇帝受命於上帝起而拯之躬擐甲胄櫛風沐雨東征西伐掃除海内當是之時食不暇飽寢不遑安以為子孫建太平之基大勲未集太宗皇帝嗣而成之凡二百二十有五年然後大禹之迹復混而為一黎民遺種始有所息肩矣由是觀之上下一千七百餘年天下一統者五百餘年而已其間時時小有禍亂不可悉數國家自平河東以来八十餘年内外無事然則三代以来治平之世未有若今之盛者也今民有十金之産猶以為先人營苦身勞志謹而守之不敢失墜况於承祖宗光美之業奄有四海傳祚萬世可不重㦲可不慎㦲夏書曰予臨兆民凛乎若朽索之馭六馬周書曰心之憂危若蹈虎尾涉于春氷臣願陛下夙興夜寐兢兢業業思祖宗之勤勞致王業之不易援古以鑒今知太平之世難得而易失則天下生民至於鳥獸草木無不幸甚矣其惜時云夏至陽之極也而一隂生冬至隂之極也而一陽生故盛衰之相承治亂之相生天地之常經自然之至數也其在周易泰極則否否極則泰豐亨宜日中孔子傳之曰日中則呉月盈則食天地盈虛與時消息而况於人乎况於鬼神乎是以聖人當國家隆盛之時則戒懼彌甚故能保其令問永久無疆也凡守太平之業者其術無他如守巨室而已今日有巨室于此将以傳之子孫為無窮之規則必實其堂基壮其柱石强其棟梁厚其茨盖髙其垣墉嚴其闗鍵既成又擇其子孫之良者使謹守之日省而月視欹者扶之敝者補之如是則雖亘千萬年無頽壊也夫民者國之堂基也禮法者柱石也公卿者棟梁也百吏者茨盖也将帥者垣墉也甲兵者闗鍵也是六者不可不朝念而夕思也夫繼體之君謹守祖宗之成法茍不隳之以逸欲敗之以讒諂則世世相承無有窮期及夫逸欲以隳之讒諂以敗之神怒於上民怒於下一旦渙然而去之則雖有仁智恭儉之君焦心勞力猶不能救陵夷之運遂至於顛沛而不振嗚呼可不鑒㦲今國家以此承平之時立綱布紀定萬世之基使如南山之不朽江河之不竭可以指顧而成耳失今不為已乃頓足扼腕而恨之将何益矣詩云我日斯邁而月斯征夙興夜寐無忝爾所生時乎時乎誠難得而易失也其逺謀云易曰君子思患而豫防之書曰逺乃猷詩曰猷之未逺是用大諫昔聖人之教民也使之方暑則備寒方寒則備暑七月之詩是也今夫市井稗販之人猶知旱則資舟水則資車夏則儲裘褐冬則儲絺綌彼偷安茍生之徒朝醉飽而暮饑寒者雖與之俱為編户貧富不侔矣况為天下國家者豈可不致治於未亂保邦於未危乎詩云迨天之未隂雨徹彼桑土綢繆牖户今女下民或敢侮予孔子曰為此詩者其知道乎能治其國家誰敢侮之迨天之未隂雨者國家閑暇無有灾害之時也徹彼桑土者求賢於隠微也綢繆牖户者修敕其政治也夫桑土者鴟鴞所以固其室也賢雋者眀主所以固其國也國既固矣雖有侮之者庸何傷㦲臣竊見國家每邊境有急羽書相銜或一方飢饉餓莩盈野則廟堂之上焦心勞思忘寢廢食以憂之當是之時未嘗不以将帥之不選士卒之不揀牧守之不賢倉廪之不實追責前人以其備禦之無素也幸而烽燧息五榖登則眀主舉萬壽之觴於上羣公百官歌太平縱娱樂於下晏然自以為長無可憂之事也嗚呼使自今日以往敵騎不復犯邊水旱不復為灾則可矣若猶未也則天幸安可數恃㦲陛下何不試以閑暇之時思不幸邊鄙有警飢饉荐臻則将帥可任者為誰牧守可用者為誰雖在千里之外使之常如目前至於甲兵之利鈍金榖之盈虛皆不可不前知而豫謀也若待事至而後求之則已晚矣夫邊患水旱事之細者也抑又有大於是者陛下不亦嘗㽞少頃之慮乎詩云維彼聖人瞻言百里維此愚人覆狂以喜此言逺謀之難知近言易行也夫謀逺則似迂迂則人皆忽之其為害至惨也而無切身之急為利至大也而無旦夕之騐則愚者抵掌謂之迂也宜矣國家之制百官莫得久於其位求其功也速責其過也備是故或養交飾譽以待遷或容身免過以待去上自公卿下及斗食自非憂公忘私之人大抵多懐茍且之計莫肯為十年之規况萬世之慮乎自非陛下惕然逺覽勤而思之日復一日長此不已豈國家之利㦲此臣日夜所以痛心泣血而憂也昔賈誼當漢文帝之時以為天下方病大瘇又苦􅏓盭又類辟且病痱陛下視方今國家安固公私富實百姓樂業孰與漢文然則天下之病無乃更甚乎失今不治必為痼疾陛下雖欲治之将無及已治之之術非有他竒巧也在察其病之緩急擇其藥之良苦随而攻之勿責目前之近功期於萬世治安而已矣其重微云虞書曰兢兢業業一日二日萬㡬何謂萬㡬㡬之為言微也言當戒懼萬事之微也夫水之微也捧土可塞及其盛也漂木石沒邱陵火之微也勺水可滅及其盛也焦都邑燔山林故治之於微則用力寡而功多治之於盛則用力多而功寡是故聖帝眀王皆消惡於未萌弭禍於未形天下隂被其澤而莫知所以然也周易坤之初六於律為林鍾於辰為建未之月陽氣方盛而隂氣已萌物未之知也是故聖人謹之曰履霜堅氷至言為人君者當絶惡於未形杜禍於未成也繫辭曰知㡬其神乎君子知微知彰知柔知剛萬夫之望謂此道也孔子謂魯哀公曰昧爽夙興正其衣冠平旦視朝慮其危難一物失理亂亡之端君以此思憂則可知矣太宗皇帝命昭宣使河北團練使王繼恩討蜀平之宰相請除繼恩宣徽使太宗不許曰宣徽使位亞兩府若使繼恩為之是宦官執政之漸也宰相固請以繼恩功大他官不足以賞之太宗怒切責宰相特置宣政使以授之真宗皇帝欲與章穆皇后及後宫遊内庫后辭曰婦人之性見珍寳財貨不能無求夫府庫者國家所以養六軍備非常也今托之於婦人非所以重社稷也真宗深以為然遂止由是觀之先帝以睿眀卓越防微杜漸如此之深可不念㦲昔扁鵲見齊桓侯曰君有疾在腠理不治将深桓侯不悦曰醫之好利也欲以不疾者為功及在血脉在腸胃桓侯皆不信及在骨髓扁鵲望之遂逃去徐福言霍氏太盛宜以時抑制漢宣帝不從及霍氏誅人為之頌其功以為曲突徙薪無恩澤焦頭爛額為上客故未然之言常見棄忽及其已然又無所及夫晏安怠惰肇荒滛之基竒巧珍玩發奢泰之端甘言卑辭唘僥倖之塗附耳屏語開讒賊之門不惜名器𨗳僣偪之源假借威福授陵奪之柄凡此六者其初甚微朝夕狎玩未睹其害日滋月益遂至深固比知而革之則用力百倍矣伏惟陛下思萬幾之至重覽大易之眀戒誦孔子之格言繼先帝之聖志使扁鵲得早從事毋使徐福有曲突之嘆則可以修之於廟堂而徳冒四海始之於今日而福流萬世優游逍遥而光烈顯大豈不美㦲豈不美㦲其務實云周書曰若作梓材既勤樸斲惟其塗丹雘此言為國家者先實而後文也夫安國家利百姓仁之實也保基緒傳子孫孝之實也辨貴賤立綱紀禮之實也和上下親逺邇樂之實也決是非眀好惡政之實也詰姦邪禁暴亂刑之實也察言行試政事求賢之實也量材能課功状審官之實也詢安危訪治亂納諫之實也選勇果習戰鬬治兵之實也實之不好雖文之盛美無益也臣竊見方今逺方窮民轉死溝壑而屢赦有罪循門散錢其於仁也不亦逺乎本根不固有識寒心而道宫佛廟修廣御容其於孝也不亦逺乎統紀不眀祭器紊亂而雕繢文物修飾容貎其於禮也不亦逺乎羣心乖戾元元愁苦而斷竹數黍敲叩古器其於樂也不亦逺乎是非錯繆賢不肖混殽而鉤校簿書訪尋比例其於政也不亦逺乎姦暴不誅寃結不理而拘泥微文糾摘細過其於刑也不亦逺乎行能之士沉淪草野而考校文辭指抉聲病其於求賢不亦逺乎材任相違職業廢弛而揀勘出身比類資序其於審官不亦逺乎久大之謀棄而不省淺近之言應時施行其於納諫不亦逺乎将帥不良士卒不精而廣聚虛數徒取外觀其於治兵不亦逺乎凡此十者皆文具而實亡本失而末在譬猶膠板為舟摶土為檝敗布為帆朽索為維畫以丹青衣以文繡使偶人駕之而履其上以之居平陸則煥然信可觀矣若以涉江河犯風濤豈不危㦲伏望陛下撥去浮文悉敦本實選任良吏以子恵庶民深謀逺慮以保安宗廟張布紀綱使下無覦心和厚風俗使人無離怨别白是非使萬事得正誅鋤姦惡使威令必行取有益罷無用使野無遺賢進有功退不職使朝無曠官察讜言考得失使謀無不盡擇智将練勇卒使征無不服如此則國家安若泰山而四維之也又何必以文采之飾歌頌之聲眩燿愚俗之耳目㦲戊辰桂州進士唐子正為試将作監主簿知桂州吴及言其素通邊畧有孝行著于鄉里也徙審刑院于右掖門之西院舊在長慶門之東併其地入中書而徙之辛未洪州言分寧縣民彭泰因入山伐薪為虎所囓其女能不顧身持刀斫虎卒奪父命雖古烈女殆不能過請加旌録詔賜粟二十石絹二十匹仍令州縣嵗時存恤之乙亥御崇政殿策試賢良方正能直言極諫著作佐郎王介福昌縣主簿蘓軾澠池縣主簿蘓轍軾所對第三等介第四等轍第四等次以軾為大理評事簽書鳯翔府判官事介為祕書丞知静海縣轍為商州軍事推官時轍對語最切直其畧曰自西方觧兵陛下棄置憂懼小心二十年矣又曰陛下無謂好色於内不害外事也又曰宫中賜予無藝所欲則給大臣不敢諫司㑹不敢争國家内有養士養兵之費外有敵國嵗幣之奉海内窮困陛下又自為一阱以耗其遺餘諫官司馬光考其䇿入三等翰林學士范鎮難之欲降其等蔡襄曰吾三司使司㑹之名吾媿之而不敢怨惟胡宿以為策不對所問而引唐穆宗恭宗以况盛世非所宜言力請絀之光言是於同科三人中獨有愛君憂國之心不可不収而執政亦以為當絀上不許曰求直言而以直棄之天下其謂我何乃収入第四等次及除官知制誥王安石疑轍右宰相専攻人主比之谷永不肯為詞韓琦笑曰彼䇿謂宰相不足用欲得婁師徳郝處俊而用之尚以谷永疑之乎改命沈遘遘亦考官也乃為之辭已而諫官楊畋見上曰蘓轍臣所薦也陛下赦其狂直而収之此盛徳事乞宣付史館上悦從之介衢州人也以轍為第四等盖光與鎮同議難之者初光欲以為第三等也於是司馬光復與同列上疏言臣等竊見今嵗以来灾異屢臻日食地震江淮騰溢風雨害稼民多菜色此政陛下側身克己之時而道路流言陛下近日宫中燕飲微有過差賞賚之費動以萬計耗散府庫調斂細民况酒之為物傷性敗徳禹湯所禁周公所戒殆非所以承天憂民輔養聖躬之道也陛下恭儉之徳彰信兆民議者皆以為後宫奢縱務相誇尚左右近臣利於賞賚陛下重違其請屈意從之夫天以剛徤為徳君以正固為事奈何徇後宫左右之欲上忽天戒下忘民病中不為宗廟社稷深自重惜臣等愚惑切為陛下不取伏望陛下當此之際悉罷燕飲安神養氣後宫妃嬪進見有時左右小臣賞賚有節及厚味腊毒之物無益奉養者皆不宜數御以傷太和乃可以解皇天譴告之威慰元元窮困之望保受命無疆之休矣上嘉納之光行状云既取蘓轍光遂與諌官王陶同上疏願為宗廟社稷自重上嘉納之按陶此時不在朝廷諌官則楊畋龔鼎臣及光凡三人爾恐行状誤今但云同列更湏考詳丙子詔龍圖閣直學士楊畋於三司取天下凡課利場務五年併増虧者限一月别立新額時場嵗課多虧惟逐時科校主典而三司終不為減舊額故上欲特行之丁丑詔曰先王考績之次序雖見於經而其詳不見於後世朕若稽古以修衆功而諸路刺舉之官未有以考其賢否比令有司詳議厥制條奏来上詢謀悉同古人有言曰徒善不足以為政徒法不能以自行今朕有念功樂善之志而又繼之以黜陟幽眀之法以待天下之大吏矣然非夫任事之臣躬率以正而考覈其實與士大夫之宣力於外者皆安於禮義而不以便文徼倖為姦則朕之意豈能獨信於天下而法亦何恃以行㦲咨爾在位其各悉力一心務祗新書以稱朕至誠惻怛之意令考校轉運使副提㸃刑獄課績院以所定條目施行條目即陳旭所論在嘉祐二年七月戊寅詔曰朕觀古者欲治之世牧民之吏多稱其官而百姓得安業今吏多失職不稱所以為民之意殆以不得久於其官故也盖智能才力之士雖有興利除害禁姦勸善之意非假以嵗月則其吏民亦且媮而不為之用欲終厥功其路無由自今知州軍監知縣縣令有清白不擾而實恵及民者令本路監司保薦再任政迹尤異當加奨擢已卯詔審刑院大理寺天下嵗所上獄淹繫者多自今月終具所斷案月日朱書大中小事之限於次月五日前類聚以聞又詔自今詳議詳斷官闕委審刑院大理寺與學士舍人院御史臺輪舉之
