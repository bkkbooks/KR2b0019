body:
  text: 續資治通鑑長編巻三百七宋李燾撰神宗元豐三年八月辛夘朔陜西轉運使權管勾鄜延路經畧司李稷言前經畧使吕惠卿親奉聖訓措置邊計已見成效講頌聖徳刻之樂石將以傳示無窮石工未畢惠卿以憂去位縁未經進御不敢題額臣今摹墨本上進乞賜之名詔以元豐理戎之碑為額御史豐稷言朱初平劉誼往瓊管體量安撫聞初平輕信寡謀嘗招誘蠻人楊光僭等幾被囚執僅獲生還今持節度海經制黎蠻先聲已輕難致後實伏望改授詳練之士鎮撫南徼免生事變不報或并入初命時七月戊寅太常博士權發遣司農都丞吳雍言議定淮浙兩路役書減冗占千三百餘人裁省錢二十八萬四千九百餘緡㑹定歲用有寛剩錢一百四萬餘緡諸路役書多若此類乞先近京三兩路修定下諸路依倣報應從之令吳雍與司農寺主判詳定詳定禮文所言明堂昊天上帝禮神之玉當用蒼璧今用四圭有邸伏請改用蒼璧禮天其有司攝事五帝亦乞依大宗伯禮神之制陳玉各倣其方之色從之是月己酉王祖道云云當并此禮文第三巻明堂燎壇篇載此事與實録稍不同今從實録京東轉運司言濰州白浪河每歲渰浸護城隄岸去年費梢草萬餘僅免水患知州事駕部郎中楊采開河引導遂不至城下費省患弭降勅書以奬之癸巳詔諸州司理參軍自今並依舊條差注更不奏舉詔文武官非相統攝而官同者其序位以職職同以服色服色同以資序資序同以改官改官同以出身詔商虢州保甲内大保長一例集教其保甲𨽻兵部以提舉義勇保甲張山甫言商虢州無義勇有保甲山險民居逺者法不教閲上畨故有是詔提舉河東義勇保甲王崇拯黄廉言教集義勇保甲絳晉澤潞威勝等五州軍三十二縣置八場節級大保長總三千六百人太原府忻代平定汾隰石嵐憲岢嵐保徳火山寧化等十三州軍三十七縣置九場節級大保長總三千七十人詔蔣之竒見勘熈州趙濟公事日乆其干繫人宜先次斷放又詔之竒㸃檢到環慶經畧安撫司違法支用撫養士卒錢官吏不以赦降去官原免根究以聞司農寺言免役坊場錢人户不願赴州而願就縣輸送或縁官司失催納而因驅磨帳狀却行收斂重為煩擾者皆乞除免於干繫人理納從之甲午湖南安撫使謝景温轉運副使朱初平判官趙揚言知邵州闗把乞於誠徽州融嶺鎮置城寨可絶邊患然興役動衆之初須當量差兵馬防托乞下沅州相度如合增置堡寨亦令乗此機㑹擇要害之地同時建立兩路協力兵勢益張城寨既成道路通達彈壓蠻猺不致生事從之仍差潭州駐劄京東第一將權駐邵州知沅州謝麟言錢糧有備乞修托口寨從之詔令韓存寳選人告諭蠻族如能嚮順即將老稚量留㸃發丁壯令作先鋒如獲乞弟首級並依官推賞若不用命意持兩端即行誅剪兼乞弟黨與不堅即易為攻取若未遇乞弟先殺蠻人稍致一兩族疑懼則人人皆有鬬心或協力拒捍官軍或相為耳目以資冦利令存寳全以重兵威勢彈壓須使其自相攻討盡獲首惡覆其巢穴即為全功詔京西軍賊張晏等數日未見續奏斬捕可令提㸃刑獄司日具殺獲賊徒人數及捕盗官行徑襲逐在所以聞詳定禮文所言親祠景靈宫太廟伏請設御洗於阼階東南當東霤皇帝立于洗南北嚮盥侍臣奉槃者東面于庭南奉匜者西面于槃東執巾者亦西面于匜北諸祀祭并有司攝事並凖此從之禮文三年八月四日依奏八月二十一日又請明堂大享准此今既稱諸祀祭并有司攝事並准此則八月二十一日依奏可削也丙申詔學士院於尚書省樞宻院用諮報又詔宗室袒免以下親其俸錢支見緡詳定禮文所言劉几請依景祐中例擇近上使臣修製大樂器從之刑部言知涇州虞部員外郎蘇涓相度檢計石渠橋工不當請罰銅二斤詔特展磨勘二年又言大理寺丞鍾正甫韓宗儒書增飾執政語并報上不以實詔追一官勒停此事當考乙夘日周沃責官韓宗儒何人詔秘書丞監在京糧料張仲安著作佐郎孫朴將作監主簿孫野並贖銅特衝替西頭供奉官白隨降一官逺小處監當中書主事周温降一資餘吏人江文等各降名决杖有差朴野皆知樞宻院孫固子先是仲安當隨郭逵應副安南軍期遣姪張愿夫於固家向問周沃分析郭逵書事朴野為愿夫候消息於隨文處御史臺鞫得實故也朱本六月壬辰朔御史臺言奉詔推治孫野等事乞展限日上批如根究已得其情野可勿禁先次責出聽展二十日新本削去今附注此六年七月固乃罷詔駕部員外郎前提舉熈州市易汲逢贖銅十斤改勒停為衝替權發遣提舉秦鳳路常平等事李孝博特衝替孝博嘗奏逢不法事故先勒停逢使劾之案既上逢坐以前界市易息衮入後界聞奏法止杖一百故逢免停廢而孝博奏逢事狀過實并責之丁酉御史豐稷言伏覩朝廷訓練五路民兵委提㸃刑獄官提舉胡宗愈汪輔之乆不稱職乃以黄廉等代之宗愈外除方州輔之差權發遣開封府推官除授不同衆聽所惑輔之未至闕庭改授廣南東路轉運副使刑獄之柄既以無功而罷漕運之權豈宜輕付案輔之素守乖汚天資刻薄伏望改授一合入差遣詔輔之依舊開封府推官以太子中舎人孫逈為廣南東路轉運副使六月丁巳輔之除府推九月癸亥分司上批今日御史何正臣上殿劄子言方澤前後議論反覆操守頗邪朝廷鄉已照見姦回罷其職事不宜延對以惑士聽可依所奏時正臣言澤頃任江西提舉官沮難役法司農寺奏劾抵罪今忽召對中外疑惑故罷之戊戌詔太常寺將來明堂景靈宫太廟並用所肄習新定樂章又詔兩制臺諫至總管監司各舉堪應武舉進士一人以名聞己亥羣臣上表乞御正殿復常膳不允自是五上表乃從之詔濮安懿王子贈武寧軍節度使同平章事楚國公宗藎可依宗治例遷一子官詔審刑院併歸刑部以知院官判刑部掌詳議詳覆司事其刑部主判官二員為同判刑部掌詳斷司事詳議官為刑部詳議官罷諸路提㸃刑獄司檢法官見任者聽滿任賜常平米二萬石坊場錢三萬緡付梓州路轉運司應副蠻事中書奏詳定重修編敇所修立告捕獲倉法給賞條欲依所定上批不行可並依舊給全賞雖係案問亦全給時議者欲漸弛倉法故修勅官先寛其告賞自一百貫分等至三百貫而按問者減半給之中書以熟狀進而有是命此據朱本以御筆添修云上察見其情寢之新本自時議者至寢之並削去今但削上察其情寢之等七字五月十三日十五日庚子上批同知諫院黄顔向以疾病精神頓弊自居諫職無所建明可罷職知禮院以國史院編修官江隂縣主簿崇文院校書蔡卞為太子中允集賢校理同知諫院兼管勾國子監檢正中書户房公事畢仲衍上所修備對言周家冢宰歲終令百官府正其治受其㑹小宰以叙受羣吏之要所謂㑹要者正今中書之所宜有也自漢至唐曠千百年莫知議此故有决獄錢榖之問而不克對者創自睿意俾加纂集臣攟摭故實僅就巻帙凡為一百二十五門附五十八件為六巻事多者分上中下共為十巻詔中書門下各録一本納執政仍分令諸房揭帖初書成仲衍欲求上覽以冀功賞上以為此書乃臣備君問之書不當奏御故有是詔仲衍又言臣願申前日備問之詔修日成月要歲㑹之法以要官府羣吏之治則唐虞成周攷績之效不日而見非止周知名數而已元年閏正月十三日向宗儒及仲衍編修壬寅諸王府翊善太常少卿直史館馮浩為光禄卿提舉崇禧觀浩在諸王府凡十數年章辟光既逐它日岐王顥問曰辟光今安在浩對曰大王但以忠孝為心辟光小人不足問也問章辟光據鮮于綽傳信録當檢浩初入王府月别修檢正中書户房公事太子中允館閣校勘蔡京為集賢校理權提㸃開封府界諸縣鎮公事河陽言雄武埽七月己丑河水變移埽岸危急已發河隂濟源縣急夫各千人救䕶上批今歲夏秋農時並河之民累經調發人力已困又前奏雄武流離埽已逺更無可虞豈有伏槽之際致危急之理此乃官司不䘏百姓疲於役事信監埽使臣張皇呼索可遣權提㸃開封府界諸縣鎮公事楊景略案視如不應差發劾罪以聞七月己丑二十八日詳定禮文所言謹按周禮有稱昊天上帝有稱上帝有稱五帝稱昊天上帝者一帝而已如祀昊天上帝則服大裘而冕祀五帝亦如之之類是也稱上帝者昊天上帝及五帝如類造上帝封于大神之類是也稱五帝者昊天上帝不與如祀五帝則張大次小次之類是也繇是而言則經所謂宗祀文王於明堂以配上帝者與周禮所稱上帝同矣其將來祀英宗皇帝於明堂當配昊天上帝及五帝知禮院趙君錫楊傑王仲修檢討楊完何洵直言謹按周禮掌次職曰王大旅上帝則張氊案祀五帝則設大次小次又司服職曰祀昊天上帝則服大裘而冕祀五帝亦如之明上帝與五帝異矣則孝經所謂宗祀文王於明堂以配上帝者非可兼五帝也考之易詩書所稱上帝非一易曰先王作樂崇徳殷薦之上帝以配祖考詩曰昭事上帝聿懐多福又曰上帝是祗書曰以昭受上帝天其申命用休又曰惟皇上帝降衷于下民如此類者豈可皆以五帝而言之自鄭氏之學興乃有六天之說事非經見至晉泰始初論者始以為非遂於明堂惟設昊天上帝一坐而已唐顯慶禮亦止祀昊天上帝於明堂今大饗在近議者猶以謂上帝可以及五帝臣等請如聖㫖祀英宗於明堂惟配上帝以稱嚴父之意詔如君錫等議五月二日甲子七月二十七日丁亥明年四月十二日己巳當考曾肇言曾肇議或可削去既不行又不合也臣昨與詳定郊廟禮文張璪等申中書請將來祀英宗皇帝於明堂以配昊天上帝及五帝又禮官趙君錫等亦别具狀請惟以配上帝君錫等以謂上帝者一帝而已凖中書批下二狀奉聖㫖依趙君錫等議施行臣以有司職當奉詔已依聖㫖與張璪等講求裁定奉祀儀注聞奏矣然臣素學愚陋雖以詔書從事退伏思念猶竊有疑夫私有所疑而依違茍且懐不盡之情以事陛下者非臣子之義也故臣不敢避僭黷之誅願畢其說夫禮莫嚴於祭祭莫重於天神故揚雄曰祭莫重於地地莫重於天言祭祀之重莫如天也今明堂以享天神而所祀之神忽有更易此誠務稽古訓而不牽於諸儒之說欲推英宗獨配一帝以篤嚴父之義且合於孔子所謂宗祀文王於明堂以配上帝之文此誠非愚臣思慮之所能及也然猶竊有所疑者以經攷之凡稱上帝見於易詩書者甚衆然其㫖非主於分辨神位故統而言之或謂昊天或謂五帝或兼為昊天五帝皆莫得而考至其見於周官者則以祭祀言之以祭祀言之則主於分辨神位其辭不可以亂而有稱昊天上帝有稱上帝有稱五帝者此臣之所不能無疑也夫以昊天上帝與上帝為一耶則其辭亦當一而已不當或稱昊天上帝或稱上帝聖人法言恐不如是周官稱昊天上帝者二曰禋祀昊天上帝又曰祀昊天上帝則服大裘而冕其餘則皆稱上帝或五帝而今欲以昊天上帝與上帝為一神此其可疑者一也又四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望又曰國有大故則旅上帝及四望故先儒以謂四望非地則上帝非天斷可識矣此其可疑者二也又大旅上帝則張氊案設皇邸祀五帝則張大次小次則上帝又與五帝異矣此其可疑者三也故臣前與張璪等議以謂周官所言昊天上帝則一帝而已言上帝則謂昊天上帝及五帝言五帝則昊天上帝不與此雖古人所未嘗言然以意推之所謂上帝者既不與昊天上帝同文又與五帝異禮則其義恐或如此夫五帝之在天蓋非人之所敢知所據者經而已然自秦漢以來典籍不全禮文殘闕經之可考者無幾而今欲捨周官之明文以疑辭虛說輕廢歴代至尊至重之祀故雖朝廷已有定論而惓惓之私猶不能無疑者也傳曰有其舉之莫敢廢也又曰與其過而廢之寧過而存之晉之泰始唐之顯慶雖嘗徹去五帝之配然不旋踵而復則亦未足為法也伏惟陛下聖哲文明動與道㑹畏天事神恭敬誠慤豈獨于此大祀易於更變殆有司稽考發明有所未盡不足以上當聖心此臣之責也書曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮先王之於所疑其謹如此况先帝所配天神重祀固未可以偏辭决也伏望留神省察更詔侍從臺閣之臣博加考議以求其當仰稱陛下畏天事神恭敬誠慤之意肇云元豐三年祀英宗於明堂惟以配上帝仍詔禮官與詳定郊廟禮文官同撰儀注璪等與君錫等異議詔從君錫等議肇又獨上此奏癸夘彗犯軒轅甲辰詔吏部流内銓自今稱尚書吏部詳定禮文所言謹案少牢饋食禮曰皇尸命工祝承致多福無疆于女孝孫詩楚茨說天子之禮亦曰工祝致告徂賚孝孫丁孚漢儀載東漢祠恭皇后嘏辭曰恭皇后命工祝承致多福無疆于爾孝曾孫皇帝是東漢猶使工祝今禮皇帝飲福乃古之受嘏而儀注以内臣酌酒授侍中侍中跪進皆無所本伏請改命太祝從之又言古者燔柴瘞埋各有牲體與正祭不同先儒以為分牲體供二處其實一牲也蓋正祭所用之體皆取脊與右胖其燔瘞所用則禮文殘闕無以言之漢儀用頭及左髀東晉賀循云今郊之脅九箇太牢令奉牲脅奠燎薪之上韋彤五禮精義曰燔瘞牲近代用髀又用脅今惟用首者約漢禮也臣等看詳熈寧祀儀惟昊天上帝皇地祇髙禖燔瘞犢首自感生帝神州地祗而下皆不燔瘞牲體殊不應禮又按周禮羊人祭祀割羊牲登其首禮記曰升首報陽也首為陽則脅與髀為隂可知矣報陽宜以陽報隂宜以隂各從其類也伏請自今昊天上帝感生帝皆燔牲首以報陽皇地祇神州地祇太社太稷凡地祇之祭皆瘞牲之左髀以報隂凡薦饗太廟皆升首於室庶合禮意從之禮文三年八月十四日依奏詔知成都府張詵覺察姦盗存撫人户務令安静應犯罪情涉兇惡法不至編配者聽出川俟瀘州事平日如故又詔夔利成都路轉運司其應副瀘州軍前係軍馬所由道路即辦具應副非所由者不得輙有計置即應急速者並從官給勿取於民毋致搔擾提刑司其覺察以聞失覺舉者與同罪乙巳詔中書朕嘉成周以事建官以爵制禄小大詳要莫不有叙分職率屬而萬事條理監於二代為備且隆逮于末流道與時降因革雜駮無取法焉惟是宇文造周旁資碩輔準古創制義為可觀國家受命百年四海承徳豈兹官政尚愧前聞今將推本制作董正之原若稽祖述憲章之意參酌損益趨時之宜使臺省守監之官實典職事領空名者一切罷去而易之以階因以制禄凡厥恩數悉如舊章不惟朝廷可以循名考正萬事且使卿士大夫莅官居職知所責任而不失寵禄之實豈不善歟其應合行事件中書條具以聞兩紀並載詔語職官志篇首云熈寧末上欲正官名始命館閣校唐六典元豐三年以摹本賜羣臣遂下此詔云云賜六典月日當考秘書丞同知禮院楊傑言先于去年八月上大樂十二均圖未䝉付外施行又言金聲舂容失之則重石聲温潤失之則輕土聲函胡失之則下竹聲清越失之則髙絲聲纎㣲失之則細革聲隆大失之則洪匏聲叢聚失之則長木聲無餘失之則短惟人禀中和之氣而有中和之聲足以權量八音使律吕皆以人聲為度以一聲歌一言言雖永不可以逾其聲今夫歌者或詠一言而濫及數律或章句已闕而樂音未終兹所謂歌不永言也伏請節制煩聲聲歌一言遵用永言之法先儒云依人音而制樂託樂噐以寫音樂本效人非人效樂也今祭祀樂章並隨同律聲不依永以永依聲律不和聲以聲和律非古制也伏請詳定大樂以歌為本聲必依永律必和聲又言虞書曰簫韶九成鳳凰來儀葢以簫為主也商頌曰既和且平依我磬聲葢以磬為依也周官鍾師以鍾鼓奏九夏蓋以金為首也是鍾磬簫者衆樂之所宗聖帝明王之所貴數十有六其所由來尚矣漢得古磬十六於犍為郡鄭氏注周禮編磬及周正樂三禮圖編磬編鍾簫並以十六為數示天子之樂用八鍾磬簫為衆樂之本又倍之為十六矣且十二者律之本聲也四者律之應聲也本聲重大應聲輕清本聲為君父應聲為臣子故其四聲或曰清聲自景祐中李照議樂以來鍾磬簫始不用四聲是有本而無應有倡而無和八音何從而諧邪今巢笙和笙其管皆十有九以十二管發律吕之本聲以七管為律吕之應聲用之已乆而聲至和協伏請參攷古制依巢笙和笙例用編鍾編磬簫以諧八音又言今大樂之作琴瑟塤箎笛簫笙阮筝筑奏一聲則鎛鍾特磬編鍾編磬連擊三聲於衆樂中聲最煩數請鎛鍾特磬編鍾編磬並依衆樂節奏不可連擊所貴八音無相奪倫又言本朝郊廟之樂先奏文舞次奏武舞武舞容節六變一變象六師初舉所向宜北二變象上黨克平所向宜北三變象淮揚底定所向宜東南四變象荆湖來歸所向宜南五變象邛蜀納欵所向宜西六變象兵還振旅所向宜北而南今舞者非止發揚蹈厲進退俯仰不稱成功盛徳兼失所向又文舞容節殊無法度乞定二舞容節及改所向以稱成功盛徳又乞依周禮奏律歌吕合隂陽之聲又言今雅樂古噐非不存太常律吕非不備而學士大夫置而不講考擊奏作委之賤工如之何不使雅鄭之雜也伏請審調太常鍾琯依典禮用十二律還宫均法令上下曉知十二律音則鄭聲無由亂雅矣詔送議樂劉几等言傑所請皆可施行詔從之樂志載傑所言七失甚詳今但從實録天章閣待制孫坦知秦州坦尋以目疾辭改提舉鴻慶宫改鴻慶在閏九月十一日丁未開封府奏畿縣夏旱甚者十分其次不減七分已節次檢放今秋農有望而民力未充其殘欠稅租乞賜倚閣從之戊申秘書監致仕議樂劉几等言太常大樂鍾磬凡三等王朴樂一也李照樂二也胡瑗阮逸樂三也王朴之樂其聲太髙此太祖皇帝所嘗言不俟論而後明仁宗景祐中命李照定樂乃下律法以取黄鍾之聲是時人習舊聽疑其太重李照之樂由是不用至皇祐中胡瑗阮逸再定大樂比王朴樂㣲下而聲律相近及鑄大鍾或譏其聲弇欝因亦不用於是郊廟依舊用王朴樂樂工等自陳若用王朴樂鍾磬即清聲難依如改製下律鍾磬清聲乃可用益驗王朴鍾磬太髙難盡用矣今以三等鍾磬參攷其聲則王朴阮逸樂之黄鍾正與李照樂之太蔟相當王朴阮逸之樂編鍾編磬各十六雖有四清聲而實差黄鍾大吕之正聲也李照之樂編鍾編磬各十二雖有黄鍾大吕而全闕四清聲非古制也聖人作樂以紀中和之聲所以導中和之氣清不可太髙重不可太下使八音協諧歌者從容而能永其言乃中和之謂也臣等因精擇李照編鍾編磬十二參於律者增以王朴無射應鍾及黄鍾大吕清聲以為黄鍾大吕太蔟夾鍾之四清聲俾衆樂隨之歌工兼清聲以詠之其音清不太髙重不太下中和之聲可以考矣欲請下王朴樂二律以定中和之聲就太常鍾磬擇其可用者其不可修者别製從之樂志甚詳今止從實録已酉進士蕭之美上直言策其一言太學博士有易經而講者或兩人同講一經而一善一否則一人為講義而分講之或未嘗治經則假手為講義以講之詔中書本房立法又言齋長齋諭之職恃之以表帥倡導者也今乃使學正學録舉其人以充之其舉者不以朋友則以相識乞自今齋長齋諭須學諭舉之於正録正録舉之於博士判監察其可以充職然後使為之詔御史臺根究又言辛亥歲在西洛新法始行見民莫不悅去歲在湖北京西見民怨吏人違法者不可勝聽詔京西荆湖北路轉運提㸃刑獄司根究以聞監察御史裏行王祖道言伏覩明詔以先儒六天之說為非古今復欲兼祀五帝是亦六天也禮官欲去四圭而廢祀神之玉非所以事天也伏望斥去浮議復舉前詔以正萬世之失詔合用圭璧禮院速詳定以聞後詳定所言謹案周禮大宗伯曰以玉作六器禮天地四方又典瑞曰四圭有邸以祀天旅上帝鄭康成云禮天以冬至祀天謂夏正郊天晉徐邈則引書植璧秉圭之說謂璧以禮神圭自已執二者皆不足考信然其不兼用於一祭可知矣今王祖道謂郊丘明堂圭璧不可偏廢而議者或欲以蒼璧禮神以四圭有邸從燎以經考之未見其說前世以及國朝其於祀天禮以蒼璧則燎玉亦用蒼璧禮以四圭有邸則燎玉亦用四圭有邸今欲兼用二玉義無所主開元開寳禮祀昊天上帝及五帝於明堂禮神燔燎皆用四圭有邸今詔書惟祀上帝則四圭有邸自不當設臣等謂宜如南郊禮神燔燎皆用蒼璧以稱明詔詔所用蒼璧四圭有邸並依舊制施行是月辛夘朔詳定所初建請上批近立京師諸路户馬法既有期㑹必為猾商乘時射利以髙價要養馬户使良法不得速成宜令羣牧司簡驍騎以上馬千匹定價與民交市即毋得與不養馬户二月二十八日六月二十七日八月二十二日又二十七日辛亥詳定禮文所言晉摯虞議郊丘之祀掃地而祭牲用繭栗器用陶匏事反其始故配以逺祖明堂之祭備物以薦三牲並陳籩豆成列禮同人理故配以近考繇此言之郊以逺人而尊則當以天道事之明堂以近人而親則當以人道事之開寳通禮及見行儀注明堂之饗席用槀鞂器用陶匏與郊祀無别伏請以筦席代槀鞂蒲越以玉爵代匏爵其豆登簋爼尊罍並用宗廟之器惟不祼可無設彛瓉又言皇祐大享明堂設爟火非是伏請不設禮文八月二十一日事又言受嘏當於祭末自漢以來祭祀酌獻之數及三而止人君為初獻至有一獻纔畢而受嘏者開元禮皇帝享太廟及大享明堂獻訖太尉未升堂皇帝飲福受胙相循至今伏請改正儀注亞終獻既行禮然後禮官前導皇帝飲福受胙亞終獻則否並從之元年九月己丑詳定所言亞終獻不當受嘏已見本月日權發遣永興軍等路提㸃刑獄兼提舉義勇保甲葉康直言近歲㑹比保伍寄諸軍政首於畿甸而推之五路修明教戰之法周旋曲折近古所未有然其兵寓農則多寡異數其教視成則遅速異期今河東以二年河北以三年陜西民兵較諸河北其數不甚相逺而獨以四年為限臣竊籌之欲乞陜西義勇節級保甲大保長止作三年教閲所貴速趣成效詔河北陜西路教閲毋過三年壬子中書吏房言權提㸃河北東路刑獄公事劉定言都水職務什九在外而外監丞一員所任繁重謂宜輕之則事均而易舉本房欲令外都水監丞南司治河隂縣舊都大司為治所分懷衞西京河隂酸棗白馬四都大河事𨽻之自黄河南岸上至西京河清縣堤岸下至白馬縣迎陽堤埽北岸上至河陽北岸埽下至衞州蘇村埽西岸共三十六埽外都水監丞北司治北京金堤舊都大司為治所分澶濮金堤東流南北兩岸四都大河事𨽻之自黄河北岸上至澶州大吳埽下至滄州鹽山埽南岸上至澶州靈平上埽下至滄州無棣埽岸共三十三埽其御河上中下節漳河兩埽滹沱河上下節三河在黄河北岸以北亦令北司管勾其官吏軍司等各中分之都水監内外監丞舊共三員今止令外都水監丞二員分管南北兩司留監丞一員與主簿同在本監從之韓存寳奏陜西沿邊百姓願赴瀘南軍前効用今拍試中射一石力弓共一百二十三人已收為竒兵勇敢乞量給錢米從之詳定禮文所言禮記曰三公一命衮則三公當服鷩冕大車刺大夫之詩也而曰毳衣如菼則上大夫卿當服毳冕周禮典命曰公之孤四命又曰王之大夫四命其衣服各視其命之數公之孤其服自希冕而下則王之大夫當服希冕諸侯卿大夫之服自𤣥冕而下則王之士當服𤣥冕所謂周人冕而祭也司服曰孤之服自希冕而下卿大夫之服自𤣥冕而下士之服自皮弁而下此諸侯之臣助祭服也然而不著王朝公卿大夫士之服者葢舉下以見上可比義而知也本朝官名雖與古不同以唐六典考之吏部尚書注曰周之天官卿也侍郎注曰周之小宰中大夫也員外郎注曰周之大宰屬官上士也今約之六典參以本朝班序伏請資政殿大學士以上侍祠服鷩冕觀察使以上服毳冕監察御史以上服希冕朝官以上服𤣥冕選人服爵弁從之仍令供奉官以下至選人皆服𤣥冕無旒不用爵弁癸丑知制誥王存為遼主生辰使皇城使濟州防禦使劉永保副之太子中允集賢校理兼同修起居注舒亶為正旦使西京左藏庫副使王景仁副之仍令自今遣文臣奉使元帶館職者並帶職已而亶辭不行以權發遣提舉三司帳司司門員外郎錢勰代之明年正月丙午永保死詔自今朝廷所送御史臺公事止令中丞與本察御史根治乙夘光禄寺丞周沃降兩官仍勒停先是沃言帥臣以宰相書意彈壓衆人使不敢輙議邊事下御史臺窮治得吳充與郭逵書言郡縣調夫稽緩已有朝㫖劾罪交管措置必已有計議惟經乆省便乃善故沃坐所言不實獲罪沃初送獄在二年八月辛亥又此年二月丙辰又此月丙申鍾正甫事可參考司農寺言近差主簿韓宗良往淮浙起發糧斛縁逐路今歲秋熟物價甚賤其積乆苖役坊場等錢可以乘時折納以廣收糴今乞就差宗良提舉淮南東路兩淮諸州軍折糴令與逐路㑹較如以就便起發上京所省脚乘錢量添市價折糴實利便即依此行之如兩浙昨有已計置在逺處糧斛亦可移易支用詔韓宗良如所折糴可以般運不致損壞及有貯積處即依此施行提舉永興軍秦鳳等路保甲張山甫奏本路二十八州軍義勇保甲三十一萬七千六百二十三人合教節級大保長一萬二千六百六十四人置集教場三十三所欲乞併作三畨計三年可畢從之丙辰權提㸃開封府界諸縣鎮公事楊景略言雄武埽自六月至七月累危急差河隂等縣調發五縣急夫共八十人而河隂縣獨占三十人本縣有災傷十分鄉村而坊郭差至第十等鄉村差至第四等有一户一日之内出百十七夫者比之他縣尤為困擾詔河隂縣所差急夫折免春夫外每户更免雜稅錢三千如不足即計年折除太常寺言近乞留王朴鍾磬今修大樂所已集工匠備爐炭恐即銷變磨鑢况大樂法度之器其度量聲律秒忽精㣲已修之後或陛下躬臨案聽萬一如有未協即更無舊器考驗本寺每遇大禮見用王朴樂外自有李照胡瑗所作樂器及石磬材不少自可别製新樂以驗議者之術詔許借王朴樂鍾為清聲毋得銷毁磨鑢初劉几楊傑欲銷王朴舊鍾意新樂成雖不善更無舊器可校後執政至太常寺案試前一夕傑乃陳朴鍾已敝者一縣樂工皆不平夜易之而傑弗知明日執政至傑厲聲云朴鍾甚不諧美使樂工叩之音韻更佳傑大慙沮朱本削去楊傑慙沮事云取問並無照據新本已復存之今從新本樂志云云大抵為几傑地今不取王安石上改定詩書周禮義誤字詔録送國子監修正丁巳詔中書以所編刑房并法寺斷例再送詳定編敇所令更取未經編修斷例與條貫同看詳甚有法己該載而有司引用差互者止申明舊條條未備者重修正或條所不該載而可以為法者創立新條法不能該者著為例其不可用者去之詔開封府界諸路提舉司於要㑹州縣指占空閑地或空營葢造常平倉仍度歲所收積定間數其所費並以常平息錢充如省倉有空閑或官舎可修葺者亦令指占其不闕者不得一例葢造又詔於近便州縣以常平司錢留三萬貫米五萬石以待瀘南蠻事支費權發遣司農寺都丞吳雍言淮浙連歲豐稔昨嘗乞存留揚州轉般倉充淮浙常平都倉欲乞委提舉司辟官一員專管勾每年廣謀收糴除年計外常積萬石及受納兩浙轉般糧斛與發運司上供額斛斗兊換從之羣牧司言既許養馬人户赴司買馬縁陜西買馬司歲發馬數無寛剩欲乞於歲計外添置驍騎以上馬三千匹赴本司交納從之二月二十八日六月二十七日八月二十二日中書言廣州市舶條已修定乞專委官推行詔廣東以轉運副使孫逈廣西以轉運使陳倩兩浙以轉運副使周直孺福建以轉運判官王子京逈直孺兼提舉推行倩子京兼覺察拘闌其廣南東路安撫使更不帶市舶使戊午彗滅初七月癸未彗出於軫長丈丙戌出於翼戊子長三尺是月庚子出於張三十六日乃没兩紀並書戊午彗滅新提舉河北東西路義勇保甲狄諮等乞下軍馬司差大小教頭並於教馬軍所再行按試候合格即將帶前去樞宻院擬進欲依所申御批宜止令逐路提舉官武臣就提舉教馬軍所隔手按試訖將帶前去如内有事藝不至精强之人仰牒馬軍司退換元豐三年八月日下御集一百二十二巻
