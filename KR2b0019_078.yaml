body:
  text: 續資治通鑑長編卷七十四宋李燾撰真宗大中祥符三年秋七月戊寅朔玉清昭應宫紫微殿上梁車駕往觀焉鄜延路鈐轄張崇貴言蕃落居民以秋成穫田遣兵戍境上上曰此蓋慮德明反覆耳辛巳遣使撫諭緣邉守將仍詔崇貴防遏之䇿使回言德明境內歉旱嘗為輝和所侵德明率所部將劫輝和種落故遣人守境土也詔三司市木以茶酬直者自今悉給緡錢戊子尚書左丞參知政事馮拯以疾賜告表求罷任優詔不許拯再上表亦不許遣中使促其入復賜手札諭旨又命宰相王旦就第敦勸拯乃起視事己丑三司假內藏庫絹二萬匹從之癸巳知益州任中正言羈縻霸州刺史董忠義卒子當繼襲緣尚幼族人請以忠義從弟延昊領州事上曰夷落中父亡子繼朝廷舊制也蓋絶其僥幸使知有定分今易此制必貽後患乃立其子許以近親左右之乙未鄜延路都鈐轄李繼昌等言準詔減駐泊兵九指揮臣等慮邉防失備望且仍舊上曰趙德明方稟朝化必無事端致生侵軼邉臣殊不以飛挽勞民為意可即依前詔去年七月乙丑實録已載此事此必重出但聖語稍不同今亦兩存之丙申户部尚書溫仲舒卒贈右僕射己亥以尚書右丞兼祕書監向敏中為工部尚書資政殿大學士上曰溫仲舒若在當並命矣歎惜久之因録二子為校書郎歸葬日令緣路巡檢兵護送置龍圖閣學士以直學士杜鎬為之待制陳彭年為直學士又詔龍圖閣學士在樞密直學士上給俸如之詔南宫北宅大將軍已下各赴書院講讀經史諸子十嵗以上並須入學每日授經書至午後乃罷仍委侍教教授伴讀官誘勸無令廢惰此乃壬寅日事嫌與祀汾隂相間今依本紀移入辛丑前辛丑文武官將校耆艾道釋三萬餘人詣闕請祀汾隂后土不允表既三上八月丁未朔詔以來年春有事於汾隂先是上命陳彭年等討尋歷代修廢后土故事出示宰相曰前史謂郊天而不祀地失對偶之義朕既升中太山脽上之祭要不可闕而河中父老亦再有斯請然封禪甫畢遽行此禮得不以地逺勞費耶咸曰陛下為民祈福不憚櫛沐聖心始定固已逹於神明矣上曰但冀民獲豐稔於朕固無所憚也封長樂郡主女趙氏為成紀縣君趙氏普之孫燕國長公主之外孫有司言國朝以來郡主女未有封爵之制特命之左龍武大將軍韶州防禦使分司西京韓崇訓卒戊申以知樞密院事陳堯叟為祀汾隂經度制置使翰林學士李宗諤副之堯叟權判河中府宗諤權同知府事樞密直學士戚綸昭宣使劉承圭計度轉運事綸尋出知杭州以龍圖閣待制王曙代之客省使曹利用西京左藏庫使張景宗供備庫使藍繼宗修行宫道路河北轉運使右諫議大夫李士衡鹽鐡副使户部郎中林特提舉京西陜西轉運司事士衡又獻錢帛三十萬以佐用度詔褒之己酉發陜西河東兵五千人赴汾隂給役置急腳遞鋪出廄馬增驛傳遞鋪卒增置八千四百五十人庚戍命翰林學士朝逈楊億龍圖閣學士杜鎬直學士陳彭年知制誥王曽與太常禮院詳定祀汾隂儀注御史中丞兼工部侍郎王嗣宗罷為耀州觀察使知永興軍府兼兵馬部署上將西幸以京兆重地思得大臣才兼文武者鎮之因謂宰相曰嗣宗嘗自言知武事可授廉車使當此任宜先召問觀其意既而嗣宗願奉詔即命之又作詩賜焉詔汾隂路禁弋獵不得侵占民田如東封之制辛亥給升州公用錢嵗千貫舊制五百貫時張詠知州故優之江南旱詔轉運提點刑獄官疏理所部繫囚壬子遣內侍鄭志誠江德明分往升洪潤州撫問軍民犒設將校耆老及祀境內山川以久不雨屢有火災故也甲寅詔近臣觀書龍圖閣上閲元和國計簿三司使丁謂進曰唐朝江淮嵗運米四十萬至長安今乃五百餘萬府庫充牣倉庾盈衍上曰民俗康阜誠賴天地宗廟降祥而國儲有備亦自計臣宣力也謂再拜謝又觀國初已來所獲瑞物于崇和殿史官朝逈楊億曰此皆聖朝受命之符不可不載於史册望內降名件付修國史院上許之遂宴于崇政殿上作詩從臣皆賦鎮戎軍請於軍東北十五里築寧逺堡以弓箭手守捉從之丁巳詔寶鼎縣不得笞箠人有罪並送府區遣渭州吐蕃部署綽克宗來貢馬綽克宗自言本屬西涼府及為李繼遷所破遂徙居康古初以馬二百餘入貢至天都山與萬資太保相值劫而奪之但餘三十匹又言德明境內荒歉其鄰近族帳爭博糶糧斛作炮樓糾集兵馬期取甘州及與吐蕃相殺云此據會要在八月實録正史俱不書今附見戊午日前更須考之戊午徙鎮定路鈐轄曺瑋於涇原路代楊懷忠時趙德明率所部出大里河築柵蒼耳平興永平界蕃部相劫殺故令瑋制禦之庚申解州言池鹽不種自生其味特嘉取其精明尤異者上進詔遣使祭池廟辛酉給鄆州牧馬草地還民以東封路所從出優之也癸亥鄜延都鈐轄張崇貴言得趙德明書稱遣牙校貢馬兼言延州熟户眀愛屢侵其所統綏州臣疑其有詐遂遣戍兵小校防守境上德明果以三千兵來冦兵未至又遣所部貿易於邉郡及兵至臣所遣戍兵出其不意逆擊之德明尋遁去自德明納欵纍省屯軍今請復益之以備防遏遂詔鄜延環慶涇原路各增兵馬既而德明上表自訴明愛所侵界事詔答之德明訴明愛所侵界實録在明年正月甲申甲子令河中京兆府陜同華州今年秋稅納外見欠並權倚閣之淮南飢詔罷諸州和糴減直糶廪米及賑貸貧民所在繫囚遞減一等盜穀食者量行論決賜大理評事蘇耆進士及第耆易簡子宰相王旦女壻也耆先舉進士及唱第格在諸科知樞密院陳堯叟為上具言之上顧問旦旦却立不對耆曰願且修學既出堯叟謂旦曰公一言則耆及第矣旦笑曰上親臨軒試天下士示至公也旦為宰相自薦親屬於冕旒之前士子盈庭得無失體堯叟愧謝之曰乃知宰相真自有體至是耆獻所為文召試學士院而有是命八月甲子日事旦答堯叟據遺事録旦長女壻殿中丞韓億後亦嘗獻所為文上亟欲召試旦力辭之億例當守逺郡上特召見改太常博士知洋州旦私語其女曰韓郎入川汝苐歸吾家勿憂也吾若有求於上他日使人指韓郎緣婦翁奏免逺適則其為損不細矣億聞之喜曰公待我厚也洋州豪民李甲者兄死迫嫂使嫁因誣其子為他姓而專其資嫂屢訴官甲輒賂吏掠服之積十餘年訴不已億視舊牘未嘗引乳醫為證乃召甲出乳醫示之甲無以對寃遂辨億雍丘人也億遷殿中丞緣祀汾隂恩其進文及改一官知洋州當是四年以後事今且附此乙丑遣入內都知秦翰齎詔汾隂勞賜陳堯叟等遂往西面經度邉事仍諭鄜延環慶涇原路部署得翰移文即發兵應之尋以翰為河西兵馬鈐轄及翰至蕃落安堵如故兵不復出翰即還行在翰為河西鈐轄實録在戊辰日今并書之翰即還行在據翰本傳令西京葺後唐莊宗廟丙寅詔陳堯叟祭西海又遣中使於三亭渡等處祭河以渡河舟車闐咽故也丁卯羣臣詣閣奉表加上尊號曰崇文廣武儀天尊道寶應章感欽明上聖至德仁孝不允五表卒不允戊辰以江淮不稔命升揚廬州長吏各兼本路安撫使時刑部郎中王濟知洪州躬督官吏為糜粥日親嘗而給之録飢民為州兵所全救甚衆陳堯叟言昨將至陜州傳言稍旱苗稼甚薄及入境親見實不至此但人慮有差役以此為言耳已各靣諭及移牒轉運司勿得擅有差役民間聞此皆望闕歡呼至有感泣者己巳詔自京至應天府曺濟單蔡許汝潁陳澶濮淄青州廣濟軍並增巡檢兵捕賊使臣及令寄班忠佐提領之庚午詔如聞汾隂路勾當官除州縣供頓外别取索準備物宜令一切禁止先是皇城司遣親事卒四十人於京城伺察月給緡錢每季代之凡所察事悉上本司本司皆録奏上慮其恐喝騷擾於是令樞密院條約之自今非姦盜及民俗異事所由司不即擒捕者勿得以聞陳堯叟言曺利用等稱陜鄭衙署正門低小街衢窄隘若將駐蹕望别降朝旨上曰但仍其舊勿以勞人辛未命曺利用祭汾河有司定封玉册玉匱制度廟廷擇地為坎中置石匱匱方五尺厚二尺中容玉匱刻金繩道三闊一寸深五分繫繩處刻深四寸方三寸五分容天下同文寶俟祀畢太尉奉玉匱置其中將作監領徒舉石蓋厚一尺繫繩填泥印寶悉如社首封䃭之制皇帝省視訖又加蓋其上封固如小壇廣厚五尺從之滑州言大河順道北流詔遣官致祭壬申廢儀州大泉嶺寨以乏水也癸酉陳堯叟言河中府管內秋苗茂盛穀價至賤芻一圍四錢仍擷禾菽以獻乙亥河中府父老千七百人詣闕迎駕上勞問之賜以緡錢帛舊制假日閣門無辭見之例上以其衆逺來特引對遣還自京師往河中府有二路一由陜州浮梁歷白徑嶺一由三亭渡渡河司天保章正賈周言二路巖險湍迅不若出潼關過渭洛二水趨蒲津地頗平坦雖興工不過數十里事下陳堯叟等請如周所議而渭水當同州新市鎮多灘磧自此稍南而西紆行十數里狹處可連舟為橋又洛河上亦為浮梁直抵河中復以稠桑舊路緣崖西南有峭壁或霖潦多摧圯乃徙路自靈寶縣南入虢州路至函谷關與漢武廟前舊路相合九月丙子朔上幸左承天祥符門觀上梁賜從官襲衣金帶役夫緡錢有差改含芳園為瑞聖園戊寅詔西路行宫宜令儀鸞司止用油幕為屋以備宿衛不須覆以蘆竹己卯罷江南和糴實録稱江淮前月已罷矣庚辰知揚州許逖請令兩浙路權罷和雇船所冀行商得載糧斛以濟活旱民從之逖歙縣人也解池鹽自生凡數十里陳堯叟等所獻凡四千七百斤辛巳分賜近臣及三館祕閣官河東轉運使兵部郎中陳若拙請以所部緡帛芻粟十萬轉輸河中以助經費許之癸未詔襄州賜盧多遜子察錢三十萬令葬其父母陳堯叟言築壇於脽上如方丘之制廟北古雙柏旁起堆阜即就用其地焉丙戍契丹主遣臨海節度使蕭噶琳給事中室程奉其母遺物來上又遣左威衛上將軍蕭善寧左領衛大將軍張崇濟獻御衣文犀帶名馬弧矢等謝賻禮對宰相於龍圖閣觀奉迎天書圖詔督諸州捕賊其希恩故犯者雖遇赦繫獄奏裁有司請祭前七日遣官祀河中府境內伏羲神農黃帝禹湯文王漢文帝周公廟及於脽下祭漢唐六帝從之丁亥上作宗室座右銘并注賜寧王元偓而下從判宗正等趙湘請也己丑知華州崔端言父老四千二百餘人欲詣闕請幸西嶽詔答之庚寅詔自今至雄州諸縣鎮令佐使臣供契丹國信驛置無闕者許書厯為勞課替還日與優便官陳堯叟至汾隂數奏雲物之祥辛卯羣臣詣閣拜表稱賀壬辰詔應水陸路運祀汾隂物軍士並賜緡錢癸巳杖殺入內髙品江守恩時守恩部軍士挽載石車駐鄭州祖村寨因違制市青苗私役軍士六百人取民田麥穗及不奉詔擅董丁夫非理笞捶亡逸者二百人令役夫蔡文又市驢不獲杖之致死上怒甚詔監察御史王迎按劾親戒諭遣之獄成抵法知州太常博士俞獻卿封勑不下抗章論救坐削一任京西路轉運使提點刑獄官本州通判以不察舉並入金贖罪仍令進奏院移告天下上曰迎推劾此獄頗盡公方有足嘉者尋授開封府推官賜緋守恩雖近侍上不貸以法論者以為朝廷至治行罰不私中外莫不悚慶俞獻卿歙州人然本傳不載其曽知鄭州當考王迎未見初有司議祠宇之旁難行覲禮欲俟還至河中朝會肆赦於是陳堯叟等言寶鼎行宫之前可以設壇如東封之制詔如堯叟等奏甲午詔修鳳翔府太白山泗州龜山廟丁酉詔諸州先禁箭幹自今非連幹無節者不禁戊戍開封府工曺參軍張君房上疏言唐土德五運相承國家當承唐室正統用金德王且朱梁雖受唐禪而後唐克復不可謂承正統晉稱金德而江南李忭時實稱唐漢承晉稱水德止四年而滅周承漢為木德止九年而四方分據太祖以庚申嵗受周禪開寶乙亥嵗平江南及太宗即位定并汾自是一統是國家乘金德以受命其驗明矣并獻所著論四卷上曰言此者多矣且國初徇羣議為火德今豈當驟改耶君房開封人也己亥江淮發運使李溥言今春運米凡六百七十九萬石諸路各留三年支用江南留百七十萬石外有上供五十萬石淮南留三百三十萬石外有上供五十七萬石所留以備賑糶兩浙有米百五十萬石上供外有九十一萬石備淮南賑糶甲辰內出手札示輔臣令頒下江淮南安撫使諭以綏撫之道凡十二條冬十月丙午朔陳堯叟奏河決白浮圖村方修塞之為南風所激即歸故道宰臣等奉表稱賀令中書日會於王旦廳至辰時罷王圭會要此下即載中書政事稽滯今依實録附八年四月甲子河中府民巨沼詣陳堯叟言五世祖誠在德宗時夜夢人謂曰中條山蒼陵谷有靈寶真文以金札之明當往取俟天書赤篆出可用參會如其言入谷三四里夜覩黃光下有塊石碎之得黃金一斤卷帛書取藏於家誠手筆為識後二百餘年屢經大兵飢家獨無苦其帛長三丈廣九寸通判曺谷驗之云篆文非常體詞類道經庚戌堯叟附中使趙敦信入獻以沼為本府助教賜衣服銀帶器帛曺谷未見是年為度判者别一人陳堯叟又言解州父老欲詣闕奉迎車駕詔堯叟諭止之辛亥雄州言契丹涿州移牒言本國將征髙麗遣右監門衛將軍耶律寧奉書來告上曰前遣孫奭告以東封契丹館奭於境上但有報書今其使來當遣使接伴示以方守前約如堅欲赴闕亦從其請也及寧至涿州李允則止之寧言奉國命以機事馳報不敢駐允則即遣使臣伴送赴闕丁巳羣臣詣閣門表賀得靈寶真文每嵗誕聖節皇親近臣皆許奏道釋而賜之紫服所奏既猥多或有濫偽者戊午詔自今須披度五年以上方得奏請仍具鄉里居止年齒行業以聞庚申丁謂等上大中祥符封禪記五十卷製序藏祕閣賜謂等器帛丁卯命右司諫直史館李迪為契丹主生辰使六宅使合州團練使白守素副之監察御史乞伏矩為正旦使供奉官閣門祗候翟繼思副之守素居邉嵗久名聞敵中頗畏伏之上慮其不欲行密遣內侍詢於守素守素頓首感咽乃以內園副使崔可道代之可道鄆州人乞伏矩已見四月翟繼思未書里邑戊辰命三司使丁謂赴汾隂路計度糧草尋有詔謂至陜西薄稔處所輸稅令州縣勿督以常限知雄州李允則言契丹由顯州東侵髙麗期以十二月還中京蓋慮朝廷使至彼也又上契丹兵數且言凡調發先下令使自辦兵器駝馬糧糗故其抄掠所得不補所失又常索境內漢口有罪者配軍曰驍武人皆嗟怨不為用又給假令歸頗擾鄉閭恣求財賄其人或是兩地供輸户已移文涿州止絶之癸酉徙濟州團練使知濮州蔣信為滑州駐泊部署信好利縱下非牧民之才故也乙亥禮儀使王欽若言凖儀注祀后土地祇禮畢太尉封玉册於廟庭石匱百官班于庭中皇帝謁廟禮畢至石匱南北向省視翰林天文邢中和等請置於前殿西間近北壬地或不欲神側興土即改後殿士地竊詳儀注本言封匱廟庭蓋以密邇神明昭明典禮若或置之壬地奉於别殿縱於事為便亦在禮非宜且奠獻既周仍服衮冕遍歷廊廡以屆後庭往復迂逺舊儀未有再詳畫到廟圖未至迫窄欲望止於正殿欄楯之下奉安石匱庶令百辟共覩靈壇詔付陳堯叟等詳定即請就正殿下安匱仍設檻護淨奏可欽若又請車駕所經路坊市三日禁止喪事從之是月皇城司奏察訪御龍直班院副指揮使臣遇日暮醉歸馬逸不能制百姓石謙為馬踐傷人言常時本班將士無故不出今不能禁上曰可下開封府按問因謂王旦等曰禁軍將士無故不令出班故每班置市買二人太祖朝法令嚴肅無敢犯者太宗時稍從寬貸亦安敢醉酒馳馬旦等言此皆驍勇之士正當因事誡約上然之十一月丙子朔命東西京留守司河陽天雄澶徐等州長吏提舉鄰近諸州巡檢捉賊事諸路部署及河北河東河西等處知州亦如之以大禮有期故也庚辰徙司天臺韓顯符所造銅渾儀於龍圖閣召輔臣同觀因詔顯符擇監官或子孫可教者授其法庚寅召宰相至龍圖閣謁宣祖太祖聖容遣內臣奉安於安陵永昌陵下宫壬辰召資政殿大學士向敏中龍圖閣學士杜鎬直學士陳彭年待制張知白孫奭查道洎編修君臣事迹官監察御史陳從易大理寺丞祕閣校理劉筠對於崇政殿命坐上顧敏中等曰從易輩屢進文字皆有可觀因命筆硯令即席賦瑞雪歌祀汾隂詩上命題彭年筆授既進上覽之曰筠辭采頗贍並賜緋魚又謂敏中曰今學者易得書籍敏中曰國初惟張昭家有三史太祖克定四方太宗崇尚儒學繼以陛下稽古好文今三史三國志晉書皆鏤板士大夫不勞力而家有舊典此實千齡之盛也詔將來出西京經麗景金耀平頭門改乘小輦其金玉輅大輦並由城外初有司言至京西具鑾駕儀仗皇帝乘大輦而城門卑庳不能容望髙廣之上慮勞人故有是詔李允則言頃年契丹加兵女真女真衆才萬人所居有灰城以水沃之凝為堅冰不可上距城三百里焚其積聚設伏於山林間以待之契丹既不能攻城野無所取遂引騎去大為山林之兵掩襲殺戮今契丹趨遼陽伐髙麗且涉女真之境女真雖小契丹必不能勝也仍畫圖以獻又言契丹以西樓為上京遼陽為東京在中京正東稍南其習俗既葬畢守墳或云國主欲守其母墳聲言伐髙麗駐遼陽城也上謂王旦等曰契丹伐髙麗萬一髙麗窮蹙或歸于我或來乞師何以處之旦曰當顧其大者契丹方固盟好髙麗貢奉纍數嵗不一至上曰然可諭登州侍其旭如髙麗有使來乞師即語以纍年貢奉不入不敢逹于朝廷如有歸投者第存撫之不須以聞初髙麗王誦卒其弟詢權領國事嘗築六城於境上曰興化曰鐡州曰通州曰龍州曰龜州曰郭州契丹以為二於已遣使求六城詢不許契丹遂舉兵奄至城下焚蕩宫室剽劫居人詢徙居升羅州以避之兵退乃遣使請和契丹堅以六城為辭詢即調兵守六城及是契丹又大舉來伐詢與女真合兵拒之契丹大敗帳族卒乘罕有還者官屬戰沒大半乃令幽薊選嘗干仕進及稍知書者以補其乏歸取介胄萬副隆慶以疑間不給拔寨遁歸髙麗又於鴨緑江東築城與來逺城相望跨江為橋潛兵以固六城據會要髙麗王詢大中祥符七年十二月所上表稱庚戌年蕃兵奄至城下詢徙居升羅州調兵守六城又云大中祥符三年契丹大舉來伐按大中祥符三年即庚戌年也不知詢表何以如此差誤今從國史髙麗傳或契丹是嵗兩伐髙麗初勝後敗邪當考乙未甘州輝和爾罕伊嚕格勒遣左溫宰相赫矩魯越樞密使渠富綬榮來貢戊戌上作詩賜京西轉運副使王隨父母隨因對自陳父年八十餘母七十餘居河南今在巡內上嘉其耆耋善訓故旌美焉又賜粟帛羊酒令隨過家為夀時人榮之庚子陜州言寶鼎縣黃河清遣官致祭羣臣稱賀壬寅契丹遣使左武衛上將軍耶律登政副使祕書少監馬翼來賀承天節十二月乙巳朔陳堯叟自汾隂來朝宴于長春殿故事內殿曲宴三司使不預時丁謂計度糧草還特召預焉雄州言契丹敗衄之狀上曰戰危事蓋不得已非可好也丙午寶鼎縣黃河再清經度制置副使李宗諤以聞上作詩近臣畢賀庚戌召輔臣於長春殿觀新製天書行殿供物壬子大宴含光殿軍校營在新城外者並令終宴至夕遣內侍持鑰往諸門俟盡出闔扉入鑰遂為定制癸丑詔天下貧民及漁採者過津渡勿算舊制皇帝謁廟入自正門至庭百官皆回班東向上以為方尊事祖宗當自貶屈甲寅詔自今謁廟由東偏門入至庭不得令百官回班乙卯告太廟奉天書如東封之制丙辰以資政殿大學士向敏中權東京留守三司使丁謂為行在三司使鹽鐡副使林特副之丁巳翰林學士李宗諤等上新修諸道圖經千五百六十六卷詔奬之宗諤而下賜器帛有差庚申命步軍都虞候袁貴赴河中府鈐轄駕前先至兵馬其至陜州者令部署田敏主之辛酉謁玉清昭應宫先是有使至自沙門島言流人多殍死請量給口糧馬知節曰流人無廪食之理丙寅詔特給焉知秦州李濬言黑谷頗有間田今召得寨户三百餘户户三丁計九百餘人駐小洛門諸寨防邉初胡旦編兩漢事為春秋言於太宗願給借館吏繕寫太宗語侍臣曰吕不韋春秋皆門下名賢所作尚懸千金咸陽市曰有能增損一字者與之如聞旦所撰止用其家書褒貶出於胸臆豈得容易流傳耶俟其功畢且令史館參校以聞旦懼遂止於是旦通判襄州書成凡百卷知州謝泌又為言乃詔官給筆劄録本以進天聖二年始上之丁卯簽署樞密院事馬知節為行宫都部署昭宣使長州防禦使劉承圭管勾皇城大內公事上以汾隂展禮有期詔大官進蔬食宰相百官三上表請御常膳上曰太祖太宗每奉郊禋皆屏葷茹朕三祀圜丘並遵行之顧外庭不知耳東封亦自戒途𬞞食無勞固請也己巳作奉天庇民述以諭王旦等旦以羣情懇慤許至西京始却肉味禁扈從諸色人燔爇道路草木詔天書儀衛副使王欽若趙安仁扶侍使丁謂龍圖閣直學士陳彭年與太常禮院詳定奉事天書儀制以聞既而欽若等著為五卷上之庚午契丹遣使保安節度使耶律德夀副使崇祿少卿吕德懋來賀明年正旦辛未以太宗御書百軸賜交州李公藴從其請也癸酉命向敏中為權修玉清昭應宫使河南緣邉安撫司言契丹於朔州南冉置𣙜場詔以舊降條約諭之知雜御史趙湘請依周禮置土訓誦訓纂録所經山川古迹風俗以資宸覽詔直集賢院錢易直史館陳越祕閣校理劉筠集賢校理宋綬掌其事每頓進一卷龍圖閣待制孫奭由經術進守道自處即有所言未常阿附取悅上嘗問以天書奭對曰臣愚所聞天何言哉豈有書也上知奭朴忠每優容之奭正傳云奭以經術進守道自虔即有所言未嘗阿附取悅大中祥符初得帛書祕語於左承天門或以為天書上將奉迎召宰相對崇政殿西廡王旦等曰天貺符命實盛德之應皆再拜稱萬嵗又召問奭奭對曰臣愚所聞天何言哉豈冇書也上既奉迎天書大赦改元布告其事於天下築玉清昭應宫是嵗天書復降泰山帝以親受符命遂議封禪作禮樂王欽若陳堯叟丁謂杜鎬陳彭年皆以經義左右附和由是天下爭言符瑞矣正傳既云築昭應宫又云是嵗天書復降泰山帝以親受符命遂議封禪按初得左承天門天書即議封禪不緣天書復降泰山乃議封禪也正傳誤矣正傳大抵尚文文勝則事固失實今但取天何言哉安有書也等語餘悉刪去是嵗特命向敏中諭奭令陳朝廷得失奭上納諌恕直輕徭薄斂四事頗施用其言及將有汾陰之役會嵗旱京師近郡穀價翔貴奭遂奏疏曰奭附傳云大中祥符三年令宰相向敏中諭奭按敏中時但為資政殿大學士未嘗再入中書也今削去宰相字先王卜征五年嵗習其祥祥習則行不習則增修德而改卜陛下才畢東封更議西幸則非先王卜征五年重謹之意其不可一也夫汾隂后土事不經見昔漢武帝將行封禪大禮欲優遊其事故先封中嶽祀汾隂始巡幸郡縣寖尋于泰山矣今陛下既先登封復欲行此其不可二也周禮圜丘方澤所以郊祀天地今南北郊是也漢初承秦唯立五畤以祀天而后土無祀故武帝立祀於汾隂自元成已來從公卿之議徙汾隂后土于北郊後之王者多不祀汾隂今陛下乃欲舍北郊而祀汾隂其不可三也西漢都雍去汾隂至近今陛下經重關越險阻京師根本未易逺離其不可四也河東者唐王業所起之地唐又都雍故明皇間幸河東因祀后土與聖朝事異今陛下特舉欲祠汾隂其不可五也夫遇災而懼周宣所以中興比年已來水旱相繼陛下宜側身修德以答天譴豈宜下徇姦回逺勞民庶忘社稷之大計慕簫鼓之盤遊其不可六也夫雷以二月出八月入育養萬物人君之象失時則為異今震雷在冬為異尤甚天戒丁寧陛下未悟此其不可七也夫民神之主也是以先王先成民而後致力于神奉牲以告曰博碩肥腯謂民力之普存也奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也今國家土木之功纍年未息水旱作沴飢饉居多乃欲勞民事神神其享之乎此其不可八也陛下必行此禮不過如漢武帝唐明皇刻石頌功而已此皆虛名也陛下天縱欽明神資濬哲固當追蹤二帝三王之事豈止效此虛名乎此其不可九也唐明皇嬖寵害政姦佞當塗以至身播國屯兵纒魏闕今議者引開元故事以為盛烈乃欲倡導陛下而為之臣竊為陛下不取此其不可十也臣猶懼言不逮意願少賜清間以畢其説上遣內侍皇甫繼明諭以若復有陳其具條上之於是奭又上疏曰陛下將幸汾隂而京師民心弗寧江淮之衆困于調發理須鎮安而矜存之且土木之功未息而奪攘之盜必行北朝治兵不逺邉境雖馳單使寧保其心昔黃巢出自凶飢陳勝起于徭戌隋煬帝緣勤逺略唐髙祖由是開基晉少主智昧邉防耶律光因之謀夏今陛下俯從姦佞逺棄京師罔念民疲不虞邉患涉仍嵗薦飢之地修違經久廢之祠又安知飢民中無黃巢之劇賊乎役徒內無陳勝之隂謀乎肘腋之下無英雄之窺伺乎區脫之間無天驕之觀釁乎陛下方祠后土駐蹕河中若敵騎猖狂忽及澶淵陛下知魏咸信能堅據河橋乎周瑩居中山能摧鋒却敵乎又或渠魁俠帥嘯聚原野劫掠州縣侵軼郊畿行在逺聞得不驚駭陛下雖前席問計羣臣欲借筯出竒以臣料之恐無及也又竊見今之姦臣以先帝寅畏天災詔停封禪故贊陛下力行東封以為繼成先志也先帝欲北平幽朔西取繼遷大勳未集用付陛下則未嘗獻一謀畫一䇿以佐陛下繼先帝之志而乃卑辭重幣求和于契丹蹙國縻爵姑息于保吉謂主弱臣死為空言以誣下罔上為己任撰造祥瑞假託鬼神才畢東封便議西幸輕勞聖駕虐害飢民冀其無事往還謂己大成勳績是陛下以祖宗艱難之業為佞邪僥幸之資臣所以長嘆痛哭也夫天神地祗聰明正直作善降之百祥作不善降之百殃安在其籩豆簠簋乎春秋傳曰國之將興聽于民將亡聽于神固非愚臣妄議也時羣臣數奏祥瑞奭又上疏言五載巡狩虞書常典觀民設教犧易明文何須紫氣黃雲始能封嶽嘉禾異草然後省方今乃野雕山鹿並形奏簡秋旱冬雷率皆稱賀將以欺上天則上天不可欺將以愚下民則下民不可愚將以惑後世則後世必不信腹誹竊笑有識盡然上玷聖明不為細也疏入不報後疏未必即是今年按今年九月丙戌內侍史崇貴言經度制置使初至脽上一鹿自廟中出如引導之狀即奭疏所稱山鹿也疏又稱秋旱冬雷按是秋江淮不稔當以旱故前疏稱震雷在冬此時上猶未幸汾隂則冬雷必指今年故并附此更須考詳
