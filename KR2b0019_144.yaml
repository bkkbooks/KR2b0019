body:
  text: 續資治通鑑長編卷一百四十宋李燾撰仁宗慶歷三年三月戊辰朔詔刑部大理寺以前後所斷獄及定奪公事編為例王子融傳判大理寺建言法寺讞疑獄前此猥多艱於討閲乃取輕重可為准者類次為斷例當即是此事也子融前月已除待制知荆南更考之壬申御延和殿閲衛士武技乙亥交州獻馴象五乙酉右正言直集賢院田况言西界遣賀從朂等持書至闕將許入見自昊賊叛命以來屢通書今名分未定若止稱元昊使人則從朂未必從若以僞官進名則是朝廷自開不臣之禮宜且令從朂在館而就問之右僕射兼門下侍郎平章事兼樞密使吕夷簡再辭位帝御延和殿召見敇乘馬至殿門命內侍取杌子與前夷簡引避久之詔給扶毋拜戊子罷相為司徒監修國史軍國大事與中書樞密院同議附𫝊云夷簡再辭位薦富弼等數人可大用正𫝊已削去恐夷簡未必能薦弼也今從正𫝊户部侍郎平章事兼樞密使章得象加工部尚書樞密使刑部尚書同平章事晏殊依前官平章事兼樞密使宣徽南院使忠武節度使判蔡州夏竦為户部尚書充樞密使右諫議大夫權御史中丞賈昌朝為參知政事右正言知制誥史館修撰富弼為右諫議大夫樞密副使弼以奉使昌朝以館伴有勞故俱擢用之弼辭不拜此據富弼叙述前後辭免恩命辨讒謗劄子辛卯加樞密副使保慶節度使王貽永為宣徽南院使樞密副使刑部侍郎杜衍為吏部侍郎右諫議大夫參知政事王舉正樞密副使右諫議大夫任中師並為給事中時吕夷簡罷相輔臣皆進官侍御史沈邈言爵祿所以勸臣下非功而受則為濫今邊陲屢警未聞廟堂之謀有以折外侮而無名進秩臣下何勸焉邈弋陽人也癸巳侍御史魚周詢為起居舍人職方貟外郎王素為兵部貟外郎太子中允集賢校理歐陽修為太常丞並知諫院周詢固辭之以太常博士集賢校理余靖為右正言諫院供職時陜右師老兵頓京東西盜起吕夷簡既罷相上遂欲更天下弊事故增諫官員首命素等為之朱史修𫝊云吕夷簡罷相夏竦除樞密使既除復罷更用杜衍又范仲淹富弼韓琦同時擢執政收覽一時名士增諌官貟而修首在選中按修除諌官時韓范富俱未入也據晏殊傳修乃殊所薦朱史誤矣時外人籍籍言皇子生將議大赦進拜羣臣官及賞諸軍素上疏言方元昊叛契丹多所要求縣官財用大屈謂宜惜費以寬民力且將士久勞待賞而臣下乃坐享無窮之奉皆非所以為國計也其議遂格按是年無皇子生而素附傳及王圭志素墓並載諌疏附𫝊又即于拜諫官時載此未必在此時也今姑從之仍稍顛倒其辭庶不失事實是年張修媛實生女幼悟但不知是何月五年四月卒才三嵗或所稱皇子當作皇女更須考詳仁宗慶歷中親除王素歐陽修蔡襄余靖為諫官風采傾天下王公言王德用進女口事帝初詰以宫禁事何從知公不屈帝笑曰朕真宗之子卿王旦之子有世舊豈他人比德用實進女口已服事朕左右何如公曰臣之憂正恐在陛下左右爾帝即命宫臣賜王德用所進女口錢各三百千押出內東門訖奏帝泣下公曰陛下既不棄臣言亦何遽也帝曰朕若見其人留戀不肯去恐亦不能出矣少時宫官奏宫女已出內東門帝動容而起此據邵博見聞後録當考之甲午樞密副使右諫議大夫富弼改為資政殿學士兼翰林侍讀學士弼時再上章辭所除官曰臣昨奉使契丹彼執政之官漢使所未嘗見者臣皆見之兩朝使臣昔所諱言者臣皆言之以故得詳知其情狀彼惟不來來則未易禦也願朝廷勿以既和而忽之臣今受賞彼一旦渝盟臣不惟蒙朝廷斧鉞之誅天下公論其謂臣何臣畏公論甚於斧鉞願收新命則中外之人必曰使臣不受賞是事未可知其於守備决不敢懈弛非臣務飾小廉誠恐誤國事也上察其意堅定特為改命焉丙申詔太常禮院諸小祠獻官皆常服行事不合禮文自今並服四品以下祭服若非時告祭用香幣禮器者亦如之是月上令內侍宣諭韓琦范仲淹龐籍等候邊事稍寧當用卿等在兩府已詔中書劄記此特出朕意非臣僚薦舉又令琦等密奏可代處邊任者琦等言元昊雖約和誠僞未可知願盡力塞下不敢擬他人為代據韓琦家𫝊內侍姓名李元亨范仲淹集內侍姓名陳舜封云候邊事寧日當除兩府龐籍范仲淹韓琦同被密詔據記聞乃籍自言不得內侍姓名今附見詔權停貢舉夏四月己亥資政殿學士富弼言今元昊遣其僞官持書欲議通好而外皆𫝊言元昊未肯稱臣昨聞𫝊宣下西人所過州郡加迎候之禮又令逐州通判就驛燕勞待之太過深恐其後難為處置失中國制御四方之術兼聞西使之來蓋聞契丹所諭元昊既禀畏契丹則朝廷可且持重縱使其議未合亦有後圖大凡制事在乎初初若失宜後難救正今日又聞西使入見賜豫甚厚既許其僞補之稱則元昊自謂得志臣去年使契丹與館伴劉六符語將來若使元昊復稱臣則本朝嵗增金帛之遺初既不避此名今又未即如約枉受前恥而不獲後效甚可惜也今朝廷過有許可所憂有二事若契丹謂中國既不能臣元昊則豈肯受制于我必將以此遣使來未知以何辭答之若契丹謂元昊本稱臣於兩朝今既於南朝不稱臣漸為敵國則以為獨尊矣異日稍緣邊隙復有所求未知以何術拒之臣曉夕思之二者必將有一焉不可不早慮也庚子詔審官院吏部流內銓選人有同居之親在川廣者已許免逺官自今仍須召保官二人乃聽施行壬寅上封者言竊見近日臣僚將所上封章書疏令人鈔録出外及密遣浮薄之輩𫝊誦稱揚務取已名欲彰君過朝廷纍行戒告終未遵依扇成澆風無益聖化大抵為臣事主之道必敦忠厚靡尚激昻儻惟節行之自存豈患功名之不立茍虧祗戒固有典章乞曉告中外更有違犯察訪得知重行貶降以勵衆多從之仍令御史臺榜示朝堂此據㑹要當考上封者姓名癸卯著作佐郎簽書保安軍判官事邵良佐假著作郎使夏州先是良佐與賀從朂詣闕館於都亭西驛承受使臣取元昊書至中書樞密院諭從朂以所齎來文字名體未正名上一字又犯聖祖諱不敢進却令齎回其稱男情意雖見恭順然父子亦無不稱臣之禮自今上表只稱舊名朝廷當行封冊為夏國主賜詔不名許自置官屬其燕使人坐朵殿之上或遣使往彼一如接見契丹使人禮如欲差人於界上承領所賜亦聽之置𣙜場於保安軍嵗賜絹十萬匹茶三萬斤生日與十月一日賜賚之許進奉乾元節及賀正其緣邊興復寨柵並如舊仍命良佐與從朂等同往議定以聞詔天慶等五節自今流以下罪聽决之甲辰以陜西四路馬步軍都部署兼經略安撫招討等使樞密直學士右諫議大夫韓琦范仲淹並為樞密副使知永興軍資政殿學士給事中鄭戩為陜西四路馬步軍都部署兼經略安撫招討等使駐軍涇州琦仲淹凡五讓不許乃就道資政殿學士兼翰林侍讀學士富弼言臣伏聞近降敕命韓琦范仲淹並受樞密副使仰認聖意只從公論不聽讒毁擢用孤逺天下之人皆謂朝廷進用大臣常如此日則太平不難致也然議者惟云進用大臣雖則美矣其西冦未殄亦須藉材若二人俱來或恐闕事羣論皆願一名召來使處於內一名就授樞副之命且令在邊表裏相應事無不集以臣慮亦謂羣衆所說甚得允當然近日或聞有異議者謂樞密副使不可令帶出外任恐他時武官援此為例深不穩便此乃橫生所見巧為其說沮陛下獨斷之明害天下至公之論自謂立此異議者必知韓琦范仲淹以西事方急堅辭此職既未肯從命而來又不令帶出外任是欲惑君聽抑賢才姦邪用心一至於此况先朝纍曾有大臣帶兩府職任應急出外事畢還朝不聞後來有武臣援此為例臣願陛下無信異說専采公論一名召來使處於內一名就授樞副之職且令在邊或二人一嵗一更均其勞逸亦甚穩便內外協濟無善於此如聞韓琦范仲淹已有奏報以西事未了懇辭恩命朝廷乘此處分深合事宜臣不勝懇切之至陜西都轉運使龍圖閣直學士兵部郎中吳遵路知永興軍陜西轉運使起居舍人孫沔為天章閣待制本路都轉運使録大名府涇城縣尉東方朝宗兄幸為登州黃縣主簿從子友之為郊社齊郎以朝宗與賊力鬬而死也乙巳樞密副使吏部侍郎杜衍依前官充樞密使宣徽南院使忠武節度使夏竦赴本鎮先是以樞密使召竦於蔡州臺諫交章論竦在陜西畏懦茍且不肯盡力每論邊事但列衆人之言至遣敕使臨督始陳十䇿嘗出巡邊置侍婢中軍帳下幾至軍變又元昊嘗榜塞下得竦首者豫錢三千為賊所輕如此卒於敗喪師徒略無成效今而用之則邊將之志怠矣且言竦挾詐任數姦邪傾險與吕夷簡不協夷簡畏其為人不肯引為同列既退而後薦之以釋宿憾方陛下孜孜政事首用懷詐不盡忠之臣何以求治侍御史沈邈又言竦隂交內侍劉從願內濟險譎竦外専機務姦黨得計人主之權去矣其言尤切㑹竦已至國門言者益急請毋令入見諫官余靖又言竦纍表引疾及聞召用即兼驛而馳若不早决竦必堅求面對叙恩感泣復有左右為之解釋則聖聽惑矣御史中丞王拱辰對上極言上未省遽起拱辰引上裾畢其說前後言者合十八疏上乃罷竦而用衍代之此假當廣求臺諫章疏一一出其名姓乃善石介聖德詩云用御史中丞拱辰御史平諫官修凡十一疏追竦敕而正傳云十八疏今從正傳御史平蓋席平也平尋以不才逐獨能言竦可怪也沈邈所言據邈傳拱辰引帝裾據劉摯所作拱辰行狀丙午以右侍禁䝉守中為大理評事守中本乾寧人景德初陷契丹嘗舉進士及第歸朝補右侍禁監和州稅至是自陳不願為武吏故改命之戊申契丹國母遣歸義節度使耶律希烈威衛大將軍馬貽教契丹遣朔方節度使蕭日休鄜州觀察使趙為節等來賀乾元節吕夷簡既罷相命其子工部員外郎直集賢院公綽為史館修撰公綽以夷簡雖謝事猶領國史固辭修撰之命己酉命公綽復直集賢院著作佐郎館閣校勘蔡襄為祕書丞知諫院初王素余靖歐陽修除諫官襄作詩賀之辭多勸激三人者以其詩薦于上尋有是命此據記聞丙辰遣官詣五嶽四瀆祈雨戊午權三司使龍圖閣直學士禮部郎中姚仲孫知蔡州户部副使兵部郎中李宗詠知徐州户部判官司封員外郎李鉞知相州並坐不覺察省吏崔班等僞為使副判押文書以規取商人財物也仲孫傳云西北備邊募兵益屯及賞賜聘問之費不可勝計仲孫悉心移度雖病未嘗輒廢坐小吏詐為文符出知蔡州按小吏敢詐為文符仲孫何悉心之有今不取己未翰林學士兼龍圖閣學士兵部貟外郎王堯臣為户部郎中權三司使事堯臣始受命言於上曰今國與民皆敝矣在陛下任臣者如何因請自擇僚屬上納其言堯臣果以治辦聞是嵗堯臣取陜西河北河東三路未用兵前及用兵後嵗出入財用之數㑹計以聞寶元元年未用兵三路出入錢帛糧草陜西入一千九百七十八萬出一千一百五十一萬河北入二千一十四萬出一千八百二十三萬河東入一千三十八萬出八百五十九萬用兵後陜西入三千三百九十萬出三千三百六十三萬河北入二千七百四十五萬出二千五百五十二萬河東入一千一百七十六萬出一千三百三萬又計京畿出入金帛寶元元年入一千九百五十萬出二千一百八十五萬是嵗郊祠故出入之數視常嵗為多慶歷二年入二千九百二十九萬出二千六百一十七萬而竒數皆不與焉以此推之軍興之費廣矣庚申鹽鐡判官司勳貟外郎吕紹寧為淮南轉運使紹寧至淮南亟上羡錢十萬諫官歐陽修請却所上錢并治紹寧欺罔之罪以戒姦吏刻剝此據歐陽修諌疏其從違當考壬戌發康定軍粟以濟饑民吕夷簡雖罷相猶以司徒預議軍國大事上寵遇之不衰於是諫官蔡襄疏言夷簡被病以來兩府大臣纍至夷簡家咨事又聞夷簡病時陛下於禁中為之祈禳錫與致多眷注無比臣竊謂兩府大臣輔陛下以治天下者今乃並笏受事于夷簡之門里巷之人指㸃竊笑案夷簡謀身忘公飬成天下今日之患陛下即位之初夷簡即為參知政事遂至宰相首尾二十餘年所言之事陛下一皆聽信而施行之固當敦風教正庶官鎮四方安百姓而乃功業無聞但為私計執政以來屢貶言者如曹修古段少連孔道輔楊偕孫沔范仲淹余靖尹洙歐陽修等或謫千里或抑數年或緣私恨假託人主威權以逐忠賢以泄已怒殊不念虛受惡名立性不臧欲人附已見為介特而自立者皆以好名希求富貴汙之善人耻此往往退縮以避好名干進之毁是以二十年來人人不肯尚廉隅厲名節淺者因循闒茸深者靡惡不為都無愧恥但能阿附夷簡悉力護之使奸邪不敗寖成此風天下習以為俗以逐利為知能逺勢為愚鈍廢廉恥之節成奔競之風一恩之施皆須出我門下或先漏露其事使人預知或先抑其事後與行之若不可行者小則歸怨同列大則稱奉聖㫖文武銓院冗官至多而不曾裁損竒材異績不聞奬拔貪墨昏耄之人曽經免罷責罰及來雪理務施小惠多與收録貪廉混淆善惡無别自關陜兵興以來修完城壘饋運芻粟科配百端悉出州郡內則帑藏空虛外則民財殫竭嗟怨嗷嗷聞於道路不幸有水旱之災其變不可量也蓋由不選材賢充三司使副發運轉運使非其人但務收取人情用為資歷才至數月即又遷移循環奔走日求升進欲以興財利寬民力其可得乎夷簡當國之後山外之敗任福以下死者數萬人豐州之戰失地喪師鎮戎之役葛懷敏以下死者又數萬人廟堂之上成算安在西師敗沒之後契丹乘隙遣使入朝輒違先帝之盟妄請關南之地嵗增金帛竟二十萬而猶勒兵壓境堅求納字凌脅中國大為恥辱度其禍患譬若疽瘡但未潰爾夷簡出入中書且二十年不為陛下興利除害茍且姑息萬事隳壞如此今以疾歸尚貪權勢不能力辭或聞乞只令政府一兩人至家商議大事足驗夷簡退而不止之心也伏乞特罷商量軍國大事庶使兩府大臣専當責任無所推避甲子夷簡請罷預軍國大事從之襄又言伏見陜西路招討使韓琦范仲淹等各除樞密副使並以西冦未寧懇辭恩命朝廷再賜手詔督令赴闕臣竊料琦等必再有陳論辭讓於未决之間而異同之說有三焉曰使琦仲淹偕來也曰一處乎內一處乎外也曰皆留在邊也使之偕來此朝廷本意蓋陛下推獨斷之明採至公之論以二人久處邊陲詳知本末致之密宥思有變更將以來破賊之計爾然論者之說曰邊臣最苦者奏報文字或有稽緩或即裁制動不如意所以久無成功今得邊臣而任之則細大可知表裏相應也用兵不勝由軍制未立無部分統轄之法若不更變未見可勝之期今得邊臣而任之可責以更變之術所以宜一處乎內也西冦雖已請盟而戎心不可倚信琦等素習兵事上下之情通浹今盡還朝新帥鄭戬山川之險易未知軍旅之部伍未練若賊乘我機便忽有奔突必難制禦此所以宜一留於外也曰皆留在邊者此沮抑之論也惡琦仲淹者若於陛下前百般毁短之陛下必不信矣若稱其材德而言之陛下不得而疑也必謂仲淹等威名已著羌戎甚畏今將去邊必有侵擾臣謂不然仲淹作招討使羌戎既畏其威名今在樞府正議兵謀其畏必甚若謂關中民情素所倚賴今既還朝衆失所望臣又謂不然在陜西民既倚賴今在樞府必陳利病而行之所賴者愈大以是校之情僞甚明然或者謂二人孰宜處於內外以物議言之二臣之忠勇其心一也若以材謀人望則仲淹出韓琦之右處內者謀之而處外者行之故仲淹宜來琦當留邊於理甚當其韓琦范仲淹伏乞朝廷不聽辭讓各受恩命上以明陛下任賢之堅意下以協衆庶之公論也乙丑詔如聞天下科役不均其令鄉村及坊郭户均差率之是月太子中允國子監直講石介作慶歷聖德詩
