body:
  text: 續資治通鑑長編卷二百五十三宋李燾撰神宗熙寧七年五月戊戌朔曲赦熙河路雜犯死罪降從流流以下釋之本路馬步軍并今年二月以後運糧草材木修築堡寨等廂軍義勇弓箭手蕃兵寨户彊人及自京至本路急腳馬遞鋪兵士諸路差在熙河今年二月以後嘗經戰兵並與特支錢軍士因戰重傷不任征役者且給全分衣糧河北都轉運使祠部員外郎史館修撰劉瑾為天章閣待制知瀛州初王安石既罷李師中瀛州之命因薦章惇可用陳升之亦欲用惇上曰惇但能作吏文耳安石曰惇吏文粗踈然有機略勝王韶時韓縝猶未出使上欲復令縝還任安石曰惇非縝所及也蔡挺言縝在瀛州非理慘虐安石因請用惇吳充言不知契丹事與南江孰大安石曰臣知惇可以為帥非為其了南江事未了南江事臣已知惇可以為帥若待試其當得契丹然後用即韓信何由倔起為大將當項羽上乃許安石候惇回自南江用之已而用惇帥涇原代王廣淵命既下亟寢之此據御集四月四日事及安石去位復除惇為髙陽關路安撫使此亦據御集四月二十九日事又寢之瑾先嘗攝州事於是加職為真御集五月十七日催瑾疾速赴任不知瑾幾時却罷權瀛州歸轉運司當考詔募河北饑民修瀛州城荆湖北路轉運使司封郎中直昭文館孫桷為太常少卿直龍圖閣知辰州宫苑使石鑑為皇城使忠州刺史祕書丞轉運判官沈叔通通判辰州石禹勤各減磨勘三年章惇乞賞桷等饋軍之勞也左司郎中天章閣待制李師中言臣聞應天以實者見於行事動民以行者不以空言天生愚臣蓋為聖世文武之道識其大者簡易之理求諸天地陛下早用臣說則太平之事略已施行成康文景未足企慕朝廷闕失豈待人言而後知之天難忱斯帝命可畏旱既太甚民將失所今日之事非有動民之行應天之實臣恐不足以塞天變一切利害曽何足數伏望陛下詔求方正有道之士召詣公車對䇿如司馬光蘇軾蘇轍輩復置左右以輔聖德如此而後庶幾有敢言者臣泣血雨淚而拜封章陛下聞臣此言忍不感悟臣未嘗有一言及錢榖甲兵者蓋知事君以道直欲以伊尹致君之事為師不敢以近世有為之君待陛下及得罪去國安於報效并心一意以望太平五年於兹而未免陛下焦心勞思不有人患誰興厲階熙寧三年十月師中落待制知舒州七年二月復待制知瀛州尋罷之蓋罷瀛州不罷待制也臣欲殺身無益於事長嘆大慟昊天不聞陛下承祖宗之基求治如此臣愚不肖亦未忘舊學陛下欲為富國强兵之事則有禁暴豐財之務欲為代工熙載之事則有利用厚生之道有臣如是陛下其舍諸上批師中敢肆誕慢輒求大用朋邪罔上愚弄朕躬職其姦欺所宜顯黜可責授檢校水部員外郎和州團練副使本州安置不得簽書公事王安石甚惡師中嘗欲奪其待制上未許及是吕惠卿請出師中所上疏付外因摘其語激上怒遂廢斥之元豐元年四月師中卒巳亥詔近諸路奏强劫十人以上已十數發可令提㸃官司嚴加督捕毋致結成羣黨上批市易務遣人往諸路販易可問何年月日指揮許令如此執政進呈不行此段朱史簽貼云一時取問無行遣前去今復存之御集云進呈訖按進呈訖即是無行遣也此必因四月十七日曽布言湖南販茶陜西販鹽兩浙販紗故有此問卒無行遣應是吕惠卿為吕嘉問蔽匿其事耳西南蕃烏蠻羅氏鬼主僕夜為銀青光祿大夫知羇縻姚州甫望箇恕為銀青光祿大夫知羇縻歸徠州沙取祿路乞弟並為把截西南蕃部巡檢從經制夷事熊本請也烏蠻有兩首領常入省地鬻馬晏子𨽻淯井監甫望箇恕𨽻納溪寨皆僕夜諸部也晏子距省地絶近猶有淯井之阻甫望箇恕近納溪寨舟下瀘州不過半日而二首領常賦晏州山外六姓及納溪二十四姓生夷本遣勾當公事鄧軫招以爵賞僕夜晏子甫望箇恕皆納貢願受王命本言不羇屬此兩蠻則諸蠻未易服也故命之晏子未及命而死沙取祿路者晏子之子也乞弟甫望箇恕之子也六年四月二十二日乙未已載僕夜等名庚子知熙州資政殿學士左諫議大夫王韶為觀文殿學士禮部侍郎仍兼端明殿龍圖閣學士賜絹三千授其子廓大理評事賜進士出身次子厚大理評事秦鳯路副都總管內園使燕達為西上閣門使英州刺史熙河路照管軍馬事宜入內東頭供奉官李憲寄昭宣使嘉州防禦使賞降摩正之功也詔近賜錢五十萬緡與河北常平司仍令本司更以五十萬緡於緣邊州軍糴糧可令兩路常平司各具見在錢榖數以聞辛丑太子中允集賢殿修撰張琥同知諫院廣西安撫司奏請雍州左右江五寨鎮峒民所納夏稅錢布麻皮馬價錢等如願折納米者聽其便從之遣熙河路走馬承受長孫良臣往熙州為踏白城陳亡將士作浮屠道場七晝夜命河州收瘞暴骸壬寅雨雹癸卯又雨雹中書言聞災傷路分募人工役多不預示夫數饑民驟集或無可興作乞下司農寺令諸路依所計工數曉諭入役免致饑民失所從之權河北西路轉運使司封郎中劉航提舉崇福宫先是航應詔論時政五事請削役錢之令復募法為差法罷斥程昉勿以為水官盡復廢縣置令尉禁保甲藏兵於家追市易所遣官勿使販粟塞下蠲除不以去官赦降原減之制以通天下改過自新之路復議請減法以明貴賤之分疏奏不報又言人君不可輕失天下之心宜乘時有所改為則人心恱而天意得矣語尤切至因力奏求罷職故有是命文思副使李祥為供備庫使供備庫副使劉普龍騎第一下名都虞候彭孫本河州羣盜並為文思副使祥普以河州守城孫以章惇言討蠻賊有功故也惇又請令孫管押龍猛獲級傷中得力兵員入見許之仍令軍頭司候引呈飛騎蕃落畢取㫖懿洽州歸明人田宗廣為內殿崇班王安石乞以經義檢討官余中等往江寧府吏人給食錢外依例與大將驛料從之詔觀文殿學士王韶特贈二代其母封永嘉郡太夫人召入禁中子婦從入者皆賜命服甲辰都提舉市易司吕嘉問升一任以在京都商稅課增羡也將作監請修大通門外透水槽為釣槽從之初議擢透槽使髙三班借差時習言當用土功十餘萬又自順天門至牧養監擡展五橋勞費甚大乞造軟槽遇船往來釣起而水都監以為便利故用習言詔熙河路嵗計用錢令秦鳯等路轉運司熙河路經略司用具無事時各一年收支數申中書自開建熙河嵗費四百萬緡七年以來財用出入稍可㑹嵗常費三百六十萬緡此據趙思忠𫝊朱史削去簽貼云河湟故地方二千里新造之邦費用固不為多至於今日已不煩朝廷供億前史官意以廣費為非故妄書此又云自合於裁減邊費處相照修入然訖不曽修入今撰取附見具無事時一年收支數下卲伯溫見聞録云自開熙河以來陜西民口困朝廷財用益耗獨岷州白石大潭秦州屬縣有賦稅餘無斗粟尺布惟仰陜西州郡及朝廷帑藏供給耳此事當考荆湖北路轉運使太常少卿直龍圖閣孫桷為集賢殿修撰令久任權通判辰州著作佐郎謝麟遷太常博士換西上閣門副使知沅州兼緣邊溪洞都巡檢使以章惇言桷賞薄及乞換麟官且遷擢之麟建州人也詔河東路闕雨州軍長吏訪名山靈祠精禱詔權南劒州判官國子監勾當公事陳格為祕書丞漳浦縣主簿方希覺為奉禮郎和州團練副使程嗣直叙大理評事餘減磨勘年有差以章惇上格等招田元猛功狀故賞之希覺欺冒見八年十月十三日陳州司法參軍律學士王白為中書禮房習學公事吳縣尉曽􅌈新成都府户曹參軍劉涇為提舉修撰經義所檢討白開封􅌈漳州人涇孝孫子也􅌈八年八月十六日罷六月十七日可考禮賔使文州刺史王中正領嘉州團練使中正於麟府豐州嘗招弓箭手千四百人及熙河又招千三百六十人故賞之贈皇城使果州刺史王存忠州團練使引進副使帶御器械王寧果州團練使入內供奉官寄崇儀使李元凱英州團練使供備庫使魏竒嘉州刺史文思副使林信丹州刺史內殿承制王令安髙知方並文思副使供奉官李懷素馬恩並皇城副使侍禁趙間文思副使殿直陳俊劉文秀張恭並供備庫副使以河州之役死事也真定府路安撫司言真定災傷欲以常平及省倉陳榖五萬石減價出糶候豐熟償足從之乙巳給事中致仕郭申錫卒己酉太常丞權監察御史裏行蔡確直集賢院權發遣開封府界提㸃諸縣鎮公事知熙州王韶言熙河岷州芻糧可支一嵗而轉運司以銀絹錢物貸商人乘急邀利價日益髙費官本日益多並邊物日益貴今邊屯無甚警急兵戍減撤欲乞已貸者令納外自餘米麥皆可罷糴上批依所奏前期曉諭商人截日往糴法寺奏斷深州百姓陳膺等聽諸葛公權計癸丑嵗國家主有兵興變共謀為亂公權亡不獲詔陳膺朱川皆斬史亮李信杖死餘黨並杖脊分配編管告事人王通釋罪授西頭供奉官勿與親民差遣任滿就移毋得赴闕庚戍上批聞熙州通逺軍自熙寧六年二月以後借見錢鹽鈔金銀紬絹度僧牒等與人略計十七萬緡今一年餘才納七千緡或失元借主名勒保人均納可令經略轉運司具析以聞皆言無之遂已詔入內供奉官衛端之追兩官免勒停弓弩院工匠俞宗等十人黥面配京東西本城端之被差看驗弓弩不堪修者折剝乃以病色弓三十五萬餘張赴折剝所內角面十二萬司修計費錢七千餘緡犯在踈决前上曰是可以弗懲乎特黜之端之先以造弓弩弦省工減磨勘四年至是坐枉費得罪吕惠卿家傳惠卿判軍器監時禁中亦置造作所中官衛端之編排弓槍庫雜色弓七十餘萬張其當毁者四十九萬張已毁十七矣惠卿遣屬官李稷等詣庫覆視之得其以良為惡而未毁者十餘萬請復存之案端之得罪時惠卿已執政矣或是惠卿先發端之罪及執政乃行罰也家𫝊又以端之得罪係遣郝質詣軍器監前郝質詣監已附正月十二日更須詳考之上批昨熙河圍閉日久是時在城正兵極少聞全得民丁相兼防守未知本路嘗如何存恤令經略司以聞辛亥中書門下言䇿試制舉並以經術時務今進士已罷辭賦所試事業即與制舉無異至於時政闕失即士庶各許上封言事其賢良方正等科目欲乞並行停罷從之先是中書條例所乞罷制舉馮京曰漢唐以來豪傑多自此出行之已久不須停廢上曰天下事可罷而未及如此者甚衆此恐未遑改革吕惠卿曰制科止於記誦非義理之學一應此科或為終身為學之纍朝廷事有可更者更之則積小治可至大治不須更有所待至是乃罷惠卿云云墨本在四月二十五日今從朱本并入此壬子贈禮賔副使包約為忠州刺史約蕃官也初從景思立河州戰沒或誣為降賊走馬承受張佑等言約實中箭死詔王韶考實如佑等言故有是命詔京東河北置簡中崇勝奉化廂軍十指揮懷衛濮州各二德博齊州各一總五千人將修完河北州軍城故也詔開封府白馬縣界旱及十分其芟灘地租草與倚閣癸丑翰林學士承㫖兼侍讀學士韓維為端明殿學士兼翰林侍讀學士知河陽維自以言不用數求去㑹兄綘入相又援故事乞補外遂出綘入相維實草其制時人榮之刑部員外郎集賢殿修撰熊本太子中允直集賢院檢正中書户房公事張諤並同判司農寺龍圖閣待制樞密都丞㫖曽孝寬言修賞功格㸃檢條例曽旻王白近凖朝㫖罷乞依前㸃檢合用條例仍許據合檢文字就史院抄録從之詔河北路轉運提舉司災傷户第四等以下放稅及五分以上今年夏稅免役錢一面體量放免以聞甲寅上批河東諜知北界㸃集軍甚急可令雄定州并河北緣邊安撫司經略安撫司厚以錢物體問敵中動靜以聞皇城使文州刺史韓存寶為熙河路都監從王韶之請也乙卯工部郎中蘇頌勾當三班院頌補外三嵗今乃歸朝詔司農寺主簿勾當公事官自今非有朝㫖毋得差出仍减四員令本司具合存减員數以聞淮南東路轉運司言察訪司劾楚州諸縣失催青苗錢官吏楚州方旱災二麥未收若劾官吏必有追擾詔勿劾丙辰太子中允館閣校勘吕升卿大理寺丞國子監直講沈季長並為崇政殿說書季長仍改太子中允先是上每以外事問王安石安石曰陛下從誰得之上曰卿何必問所從來安石曰陛下與他人為密而獨隱於臣豈君臣推心之道乎上曰得之李評安石由是惡評竟擠而逐之他日安石復以密事質於上上問於誰得之安石不肯對上曰朕無隱於卿卿乃隱於朕乎安石不得已曰朱明之為臣言之上由是惡明之明之安石妹夫也安石既出吕惠卿欲引安石親昵置之左右薦明之為侍講上不許曰安石更有妹夫為誰惠卿以季長對上即召季長與惠卿弟升卿同為侍講升卿素無學術每進講多捨經而談財榖利害營繕等事上時問以經義升卿不能對輒目季長從旁代對上問難甚苦季長辭屢屈上問從誰受此義對曰受之王安石上笑曰然則且爾季長雖黨附安石而常非王雱王安禮及吕惠卿所為以謂必纍安石雱等深惡之故甚不得進用此據司馬光記聞升卿無學術不能對上所問不知詩序何以即全用升卿所解當考詔提㸃淮南東路刑獄都官員外郎朝端彥徙兩浙路殿中丞權發遣兩浙路提㸃刑獄盧秉徙淮南東路權發遣淮南東路轉運副使張靚徙兩浙路先是中書言聞兩浙近年鹽課增羡惟刑獄繁多今據虞太寧奏以申舉官司行鹽法差誤盧秉挾恨捃拾審如所奏即多罪及無辜刑禁之繁恐由此起兼聞多積壓鹽數故有是命靚且使體量改正仍具違法事及相度宜如何使不致虧嵗課可省刑禁又詔三司具盧秉已增課利保明以聞六月十五日辛巳寧九月癸亥二十八日張靚體量奏至虞太不知時任何官當檢附戊午皇第四子生翌日不育後名伸太常丞集賢殿修撰同知諫院張琥兼侍御史知雜事詔熙寧以來朝廷創改法度屬樞密院者令中書取索一就編類進呈四月二十五日中書先被詔八年五月二十一日范鏜練亨甫修熙寧政録當即編類此後乃名政録爾又詔參知政事吕惠卿五日一赴經筵大理寺丞知永興軍鄠縣薛固勒停縣吏韓仲戡等五人並配五百里固坐枷錮青苗户及用木夾升民户等致吏受賕㑹降特黜之庚申永興軍秦鳯路察訪旬請蕃官質買漢户地者亦出免役錢詔司農寺免役錢特放蕃官質買漢户地常約束之辛酉判軍器監知制誥章惇兼直學士院右正言集賢校理直舍人院許將太常丞集賢校理直舍人院鄧潤甫並免試為知制誥潤甫仍改右正言賜故太子中允館閣校勘檢詳樞密院兵房文字黎侁家絹百匹詔諸路公人依緣邊弓箭手例給田募人其招弓箭手寨户地不用此令凡係官逃絶監牧等田不許射買請佃委本縣置籍估所得租合值價錢以一年雇錢為凖仍量加優潤以役錢據數撥還轉運司王荆公當國以徭役害農而遊手無所事故率農人出錢募遊手給役則農役異業兩不相妨行之數年荆公出判金陵薦吕惠卿參知政事惠卿用弟溫卿之言使役錢依舊而撥諸路閒田募役既而閒田少役人多不能均齊天下方患其法之不可行而中丞鄧綰又言惠卿意在甲毁乙故壞新法於是不行溫卿之言依舊給錢募役此據魏泰東軒録當考詳刪附按日録則給田募役乃李承之建議八年四月十二日罷此蘇軾元祐元年四月六日奏議王巖叟等二年三月末駁奏當并考中書户房比對市易務及曽布根究市易違法事詔章惇曽孝寬就軍器監置司根究以聞吕惠卿又令户房㑹計治平熙寧財賦收支之數與布所陳皆不同上令布分析所以不同因依具奏後八日布對於延和殿言户房所以不同之故上以布言為然布因言市易已置獄朝夕竄黜自爾必無繇復望清光上曰卿為三司案所部違法有何罪布曰陛下以為無罪不知中書之意如何况臣嘗自言與章惇有隙今乃以惇治獄其意可見上曰有曽孝寬在事既付獄未必不直布曰臣與惠卿爭論職事今惠卿已秉政勢傾中外雖使臣為獄官亦未必敢以臣為直以惠卿為曲然臣為翰林學士三司使地親職重莫如臣所陳之事皎如日月然而不得伸於朝廷孤逺之士何所望於陛下都邑之下人情訩訩怨嗟沸騰達於聖聽然而不得伸於朝廷海隅蒼生何所望於陛下臣得罪竄謫何所敢辭至於去就亦不繫朝廷輕重但恐中外之士以臣為戒自此議論無敢與執政不同者爾上慰勞之曰卿不須如此自爾不復請對後八十餘日乃貶布貶在八月十七日壬戌國子監言太學生員多而齊舍少先以朝集院為律學外屋尚百餘間乞盡充學舍從之初太學地甚狹其東為錫慶院又其東為朝集院慶厯中始許以錫慶稍益之未幾復罷後胡瑗至乃得錫慶後堂及二廡容諸生仍以齊筵更衣位置録行堂遇乾元節賜齊筵尚權以録行堂更衣至是并朝集院賜之以廣二學為屋百楹學者以千計詔河北東西路轉運司疾速契勘轄下未得雨州軍入急遞以聞癸亥中書言京朝官選人未滿兩考及非見任者雖無舉主許試刑法試中京朝官減磨勘一年選人得堂除並候成兩考及舉主應格日推恩從之賜鳯翔百姓趙懷懿錢三百千懷懿有女嫁何氏女歸言夫之弟巨源謀反懷懿以其事告官巨源論法當斬懷懿乞行賞有司以何氏告其夫弟之罪法告有服親不當賞懷懿訴於登聞檢院下刑部刑部言五服許相容隱雖謀逆許告於法無賞特賜之甲子分命輔臣祈雨工部員外郎集英殿修撰檢正中書五房公事李承之兼權判軍器監屯田員外郎直集賢院范百祿同知諫院中書刑房覆考試中刑法第一等選人除詳斷官第二等循兩資第三等京朝官減二年磨勘選人循一資第四等京朝官減一年磨勘選人堂除一次第五等京朝官先指射優便差遣選人免試注官從之命太子中允檢正中書户房公事俞充察訪荆湖路常平等事以章惇言向兩奉使皆専措置溪洞事不假㸃檢巡歷乞再遣官故也已而充亦不行充次職任在七月十八日詔諸造入陳弓箭度材料上中下軍分三等上等弓四尺八寸五分箭二尺八寸五分中等下等弓第減一寸五分箭第減一寸其拍射教閲射親馬射弓箭自依舊制録成都布衣郭大亨為試將作監主簿不理選限大亨嘗應詔進訪求書籍祕閣看詳及五百卷故録之乙丑上批令東京路常平司具今嵗所糶糧及見在數以聞又詔已得雨令司農寺指揮諸路相度如饑民及流移户不致闕食未須官中賑濟即且權停所興工役是月復憲州從知太原府劉庠請也庠又請修築惠寧肅定神木三堡募民子弟技擊剽鋭者籍為勇敢以待陷堅走敵流罪以下情可貰者免杖徙實河外從之數事不必皆是月今依本傳附見陳師道銘魏濤墓云濤為河東從事佐劉庠契丹與河東爭界而廷議欲割畀之遣使臨議庠以屬濤使不能屈則臨以威濤不為動於是復憲州築惠寧肅定神木三堡聲勢益振契丹亦不敢競庠由是益知濤謂可當大事濤彭城人也史載復憲州事極不詳故增注此以待考詳初契丹遣蕭禧來議河東疆事諜者謂敵必稱兵契丹𫝊云五月河東諜言北界聲言聚兵入冦詔以問劉庠庠對敵必不敢稱兵代州岢嵐軍求濟師皆不應時敵主植牙雲中遣數騎涉吾地邊吏執之敵檄紛爭不已或疑庠啓釁庠奏敵意在畫疆耳臣刺知敵重兵皆不在行料應艱食願朝廷緩答而峻拒之方盛夏敵未必至惟以有備待非常乃得計願遣劉忱等至境上姑以理諭臣俾將佐飭兵觀釁而動此事機也朝廷以敵使言順禮恭及持敦睦和好之說乃録敵主書付庠諭以地界且通商論庠復奏曰臣竊疑北人此舉非本心蓋見朝廷近年克復河湟北界不為唇齒之計故以此嘗我爾今欲爭辨積年已定之疆界曲固不在中國而在彼則泛使之來禮宜偃蹇而反恭順辭宜髙抗而反卑遜臣竊恐姦意别有所在也北人無厭朝得寸暮求尺必又有僥幸之請宜峻拒之或與其不當得之地既墮其姦未必不疑中國有謀用此以餌之者若妄意於我背盟伺隙恐非嵗月可解也後竟以鴻和爾山分水嶺地與之庠時已去位每以為恨士大夫為國逺慮者亦莫不惜之置岷州荔川和爾川閭川三寨改河州南山堡為南川寨時政記十九日丙辰置荔川寨於岷州即穆楞川也二十六日癸亥改河州南山堡為南川寨今依實録并書之移彭州導江縣於永康寨以舊縣為鎮此據實録
