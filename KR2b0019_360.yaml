body:
  text: 續資治通鑑長編卷三百五十六宋李燾撰哲宗元豐八年五月癸巳朔中大夫寶文閣待制錢暄卒甲午詔太皇太后母韓國太夫人凡給賜倍常儀皇城使榮州團練使知府州兼河東第十二將折克行言率兵入西界夜戰翌日克捷崇儀副使權管勾麟府路軍馬公事邢佐臣言第一將訾虎率兵入西界聚星泊滿朗戰勝獲首四百級偽鈐轄一人詔有功當賞者經略司書空名遷官宣劄行賞自朝廷推恩即具功狀以聞四月十七日出兵昭宣使昌州刺史入內押班梁從吉代宋用臣提舉皇城乙未禮部言貢院以合格進士鄭奕江嶼劉正夫入章犯髙兖王諱駮放丙申太皇太后曰此舉人未通知特與收録蔡確曰法當黜以事初過誤恕之足彰盛德乃聼依例附榜末正夫衢州人詔曰蓋聞為治之要納諫為先朕思聞讜言虛己以聼凡內外之臣有能以正論啓沃者豈特受之而已固且不愛髙爵厚祿以奬其忠設其言不當于理不切于事雖拂心逆耳亦將欣然容之無所拒也乃若隂有所懷犯非其分或扇搖機事之重或迎合已行之令上則觀望朝廷之意以徼幸希進下則衒惑流俗之情以干取虛譽審出於此而不懲艾必能亂俗害治然則黜罰之行是亦不得已也顧以即政之初恐羣臣未能遍曉凡列位之士宜悉此心務自竭盡朝政闕失當悉獻所聞以輔不逮宜令御史臺出榜朝堂舊録云上新即位姦人乘隙誣謗宰臣蔡確患之請降是詔然其後上書詆訕無復忌憚臣等辨曰哲宗新即位司馬光上言近年以來風俗頽弊士大夫以偷合苟容為智以危言正論為狂下情蔽而不上通上澤壅而不下達請眀下詔書廣開言路從之時用事之臣方持兩端而草詔者希望風旨名曰求言而實設六條以拒之會光入覲上以詔書示之光上疏言詔書求諫而逆以六事防之未幾果别下詔今實書其事自上新即位至無復忌憚三十一字並去之詔新知陳州資政殿學士中大夫司馬光過闕令入見先是光又上疏乞開言路曰臣昨在京師伏蒙太皇太后不以臣愚踈無取遣使訪以得失豈惟微臣有千載一遇之幸中外聞之踊躍相慶以為言路將開下情得以上通太平之期指日可待也當是時臣未暇備論天下之事先陳所急於三月三十日上言以近嵗風俗頽弊士大夫以偷合茍容為智以危言正論為狂故閭閻愁苦而上不得知眀主憂勤而下無所訴公私兩困盜賊已繁宜下詔書不以有官無官之人有知朝廷闕失及民間疾苦者並許進實封狀鼓院檢院州軍長吏不得抑退其義精當者行其言而顯其人狂愚鄙陋者報聞罷去亦不加罪又於四月二十一日復上言皇帝陛下初即政於用人賞罰尤不可不當夫諫諍之臣人主之耳目也不可一日無之説命曰若跣弗視地厥足用傷設有人閉目而塞耳跣足而疾趨前遇險阻能無傷乎賈山有言人主之威非特雷霆也勢重非特萬鈞也開道而求諫和顔色而受之用其言而顯其身士猶恐懼而不敢自進况震之以威壓之以重乎頃者王安石秉政欲蔽先帝聰眀專威福行私意由是深疾諌者過於仇讎嚴禁誹謗甚於盜賊是以天下之人以言為諱百姓愁苦無聊靡所控告致怨謗之語上及先帝臣常痛心泣血思救其失是故首乞下詔開言路以通下情臣謂羣臣茍有肯進言者陛下必加褒擢以勸來者此乃古人市駿骨揖怒蛙之意也召誥曰王乃初服嗚呼若生子罔不在厥初生自貽哲命今皇帝陛下新即位太皇太后陛下初垂簾天下之人莫不屬目傾耳臣自到西京以來朝夕伏聽朝廷惟新之政以為必務眀四目達四聰以發天下積年憤鬱之志今開言路之詔既不聞頒於四方而太府少卿宋彭年言在京不可不並置三衙管軍臣僚水部員外郎王諤乞令依保馬元立條限均定逐年合買之數又乞令太學增置春秋博士使諸生肄業朝廷以非其本職而言各罰銅三十斤臣忽聞之悵然失圖憤邑無已臣非私於二人直于朝廷惜治體耳夫阿意箝口容身竊祿此小臣之利也威福在已人莫敢言此大臣之利也然民怨於下而不聞國家阽危而不知於陛下有何利哉彼宋彭年王諤臣素不識不知其人為賢為不肖但惜陛下臨政之初而二臣首以言事獲罪臣恐中外聞之忠臣解體直士挫氣欲仕者斂冠藏之欲諌者咋舌相戒則上之聰眀猶有所不昭下之情偽猶有所不達太平之功尚未可期也宋彭年所言雖不識事體但當寢而不行亦不宜加罪至如孔子作春秋為萬世法王安石秉政輒黜之使不得與諸經並列於學官學者毋得習以為業王諤所言未至不當乃以越職為罪古者置諌鼓設謗木詢於芻蕘未聞有位于朝而以言事為越職者也若當職之人既不肯言不當職之人又不得言則以四海之廣兆民之衆其政治利病天子深居九重何由得聞之哉昨日進奏院遞到告身差臣知陳州然則臣自今於一州之外言及他事亦為越職何敢言矣今二臣之罰既不可追伏望陛下如臣前奏下詔不以有官無官當職之人皆得進言擇其可取者微加旌賞使天下之人知朝廷樂聞善言不惡論事無可取者寢而勿問庶幾願納忠之人猶肯源源而來也臣秉賦愚戇文學政事皆出人下惟不識忌諱不阿權貴遇事妄言無所顧避以此荷知於纍朝見稱於衆人若亦不得言則無所復用於聖世矣上孤太皇太后陛下下問之意下負微臣平生願忠之心內自痛悼死不瞑目臣久忝便安今朝廷授以名藩義不敢辭見牒本州索逺接公人起發赴任次到官之日但勉竭疲駑恪勤本職茍力所不逮伏須罪戾而已於是令光過闕入見光此疏不得實日因令光入見故附載元祐密疏以為元豐八年四月二十九日奏此贈皇太妃曽祖任百祥祖士清父廷和太子太保太傅太師繼父故供備副使朱士安開州刺史詔自今門下中書外省尚書省左右司樞密院承旨司遇大忌及早出並隨執政官內有兼局者自依别條詔罷嵗運糧一百萬石赴西京先是導洛通汴舟楫可入洛詔運東南粟以實洛下至是户部奏罷之吕大防政目云宋用臣奏先準旨運糧百萬石赴西京候一年取旨詔罷運户部侍郎李定奏先奉旨令臣取索都提舉汴河堤岸司所管事件聞奏又奉旨專切提舉京城所管課利事件令臣一就取索今具到提舉汴河堤岸司專切提舉京城所管課利事件詔汴河堤岸及房廊水磨茶場京東西沿汴船渡京岸朝陵船廣濟船渡京城諸處房廊四壁花果水池冰雪窖菜園並依舊萬木場天漢橋及四壁果市京城豬羊圈東西麵市牛圈垜麻場肉行西塌場各廢罷令賈種民等依罷物貨場已得指揮堆垜般運東南及西河客人物貨亦廢罷其見管官吏人等并京東西牧力勝殘並仰賈種民等一就相度措置聞奏洛口兩岸灘地令提舉京西北路常平張綬相度措置奏聞其依舊去處已前并向去及廢罷窠名所收課利並于內藏庫送納别作帳樁管以備朝廷支用此據密疏增入四月八日辛未初令李定條析綬言洛口兩岸灘地除係官者量減二分租錢外餘依舊輸稅從之此據舊録增入密疏無之舊録云詔都提舉汴河堤岸司及京城所管課利場地並罷洛兩岸灘地令提舉京西北路常平張綬措置以聞綬言云云從之今别修如上政目云罷萬木場果子市豬羊圈垜麻場麵市肉行西塌場又七月十八日可考丙申上批太皇太后母韓越國太夫人李氏舊請新添通計逐月料錢一百五十貫文春冬衣各一百匹冬衣綿三百兩聖節粧粉錢一百貫文夏衣大物七十匹冬節雜劇錢一百貫文南郊回賜生白絹二百匹銀二百兩自今並增一倍御集五月四日御扎監察御史黃降為殿中侍御史此據政目中丞黃履言降行誼端方文學該贍乞就遷言職故也此據元祐密疏丁酉以十二月八日為興龍節上實七日生避僖祖忌故改焉禮部言按太廟七世八室國朝已有定制請奉大行皇帝神主于太廟第八室翼祖皇帝為祧主廟當遷請依禮制奉翼祖簡恭睿德皇帝簡穆皇后劉氏神主藏於西夾室居順祖皇帝惠眀皇后遷主後室之次仍令待制以上及祕書省長二參議詔恭依戊戍詔責授汝州團練副使本州安置蘇軾復朝奉郎知登州自黃移汝在七年正月二十一日降授左衛將軍西京安置郭達復左屯衛大將軍致仕達安置在熙寧十年七月右監門衛將軍潁州安置王銑免安置許在京居住郢州團練副使髙遵裕復右屯衛將軍管勾西京中嶽廟任便居住遵裕以五年正月十八日責郢州團練副使本州安置本傳云久之許從便居當即此時也靖康初諸王府贊讀江端友上書其略云初元豐中髙遵裕大敗于靈武責散官安置未幾神宗崩哲宗嗣位宰相蔡確以髙遵裕者宣仁族叔也即建請牽復以恱宣仁之意而不知宣仁之不私其親也宣仁簾中宣諭曰遵裕喪師數十萬先帝緣此震驚邑邑成疾以至棄天下今肉未寒吾豈忍遽私骨肉而忘先帝乎即日批出曰遵裕得罪先帝今來垂簾凡髙氏推恩獨不可及遵裕確謀大沮後確責知安州作詩詆訕坐貶新州而邢恕乃確之心腹也偶與遵裕之子士京中山同官遂以垂簾時不推恩牽復事激怒之上書言王圭曽遣遵裕之子士充來議䇿立事遵裕斥去之士京庸懦不識字實恕教之為書士充疏逺小臣素不識圭圭安得與之議及社稷大計又何從輒通宫禁語言且上書時圭士充遵裕亦皆死矣何所考案江端友書詳見邵伯溫辨誣邵伯溫辨誣云邢恕教髙士京上書論其父遵裕臨死時屛左右謂士京曰神宗彌留之際王圭遣士充來問我曰不知皇太后欲立誰我斥士充去恕曽不考遵裕既坐知慶州日靈武喪師貶散官神宗以皇太后故免安置留京師宣仁尤不喜遵裕雖該哲宗登極恩亦不許敘又安能預䇿立大計也按遵裕實以八年五月六日復右屯衛將軍策立大計遵裕固不能預矣所稱不許敘官更須考詳己亥詔資政殿大學士銀青光祿大夫兼侍讀吕公著乘傳赴闕庚子朝奉大夫提舉京東路保馬兼保甲霍翔知密州同管勾京西路保馬兼保甲呂公雅知濠州承議郎程皓為宗正寺丞此據政目詔提舉汴河堤岸司𨽻都水監専一製造軍器所𨽻軍器監舊録云先帝導洛入汴繕完戎器於無事之日皆專置司事得以舉至是歸之有司新録辨曰導洛水造軍器此非人君必躬必親之事先帝既置司何嘗不歸之有司耶始則專置一司得以核實事既就緒當有統屬故各歸所𨽻是亦先帝之意也自先帝導洛至歸之有司二十九字並刪去詔皇城使坊州團練使太原府路鈐轄專管勾麟府路軍馬事張之諌降充鄜延路都監以內藏庫使康州刺史太原府路都監兼河東第一將訾虎代之本路經略使吕惠卿言之諌措置乖方與諸將不叶故也元祐元年六月劉摰劾吕惠卿違詔舉兵之諌言其不可故惠卿奏黜之之諌當考户部狀檢會條敕諸路各量間要州縣興置市易抵當僻小縣分不可興置處不置看詳上件指揮止云僻小縣分不置即慮其間亦有僻小州郡及雖不係僻小却别無出産物貨不係商賈買賣去處須當一例興置不惟所收息課不多虛有支破人吏請給兼恐監司専以趂辦息課别致拘欄阻抑民旅在市買賣及諸般違礙誠為未便欲乞下諸路提舉常平司委自本司官躬親逐一體量及將自置市易抵當已來所收息數會較支費如內有間僻或不産貨物不係商賈買賣委實不銷興置去處並具詣實保眀申部看詳廢罷從之五月八日指揮法册有此合增入八月八日可考壬寅詔以築熙蘭通逺軍城堡成賜熙河蘭會路經略安撫制置使李憲銀絹各一百五十匹兩權管勾熙河蘭會路經略安撫司權發遣熙州趙濟銀絹各一百匹兩仍各降詔奬諭詔科場推恩依治平四年故事正奏名進士諸科吏部給敕誥優牒特奏名中書給敕誥優牒熙寧中悉罷今復之甲辰詔門下侍郎章惇書受命寶以皇帝恭膺天命之寶為文朝請郎太府少卿宋彭年提點江南西路刑獄詔京東西路提點刑獄李宜之體量都轉運司收出剩減價支預買錢及大稱炭虧車尸等又詔吳居厚吕孝亷並取勘二事並據政目范純粹奏議可考詔御史中丞黃履舉堪充監察御史二貟以聞河東節度使守太師致仕文彥博言乞免兩鎮恩命或以霈恩之行止乞加臣食邑實封從之仍令學士院降詔四月十四日不許詔知邵州關杞保眀到招納芙蓉石驛浮誠等洞人户歸眀其開路採木獻田等有勞效者凡三百三十三人並轉資賜錢帛有差以新歸順蕃部伏􅗹為下班殿侍丙午資政殿大學士兼侍讀吕公著提舉中太一宫兼集禧觀河東轉運提舉司言乞依威勝軍奏復置遼州從之府界提點范峋步軍副都指揮使苗授開封府推官王同老坐京城西壁等壕河有開淺虧功擅令人出備夫錢等第罰金政目云令開濠夫數工出錢三百文是日酉時地震即止詔府界三路巡尉弓兵並依保甲未行以前復置此據吕大防政目元年二月二日所書增入乃八年五月十四日指揮也戊申詔舉察福建路前差監察御史黃降可改差比部貟外郎宇文昌齡其荆湖南路就差舉察江南西路監察御史陳次升兼領四月十四日差降及次升五月四日降改殿中七月二日張汝賢替昌齡鄜延路經略司言擒獲西界鈐轄鄂斡伊特詔送江南羈管己酉詔右僕射蔡確權領山陵使事以王圭病也庚戍金紫光祿大夫守尚書左僕射兼門下侍郎岐國公王圭卒輟視朝五日初贈太尉再贈太師諡文恭禮部言當舉哀成服詔以大行在殯罷之罷成服在二十八日庚申今並書賜諡孫覺有言當檢附圭自輔政至宰相凡十六年無所建眀守成而已時號為三旨宰相以其上殿進呈云取聖旨上可否訖又云領聖旨既退諭稟事者云已得聖旨故也舊傳云圭議論平恕畏逺權勢引拔賢俊世莫知之圭嘗三薦張璪不用圭曰璪果賢陛下未嘗用以為不賢讒也臣恐士弗得進矣臣為宰相三薦賢三不用臣失職請罷神宗喜曰宰相當如是朕以試卿卿德不回朕復何慮圭為人寬抑不忤然至義理所在不可奪神宗欲遷內侍李憲圭奏非祖宗故事陛下獨不監漢唐之亂乎神宗批旨付圭奬之因令永為甲令世世守之自輔政至宰相十六年終始不懈舊傳不知出誰手蓋多諛辭新傳雖削去引拔賢俊世莫知之猶存薦張璪事不知圭果能辨此否已于璪參政時辨之又削去為人寬抑不忤然至義理所在不可奪猶存遷李憲事不知神宗欲遷憲何官而圭爭不可永為甲令又不知是何等事也章惇作圭挽辭亦載罷憲內職由圭及惇奏請恐圭及惇未必敢拂神宗意其後姑借此以迎合太皇太后耳憲罷內職時亦已辨之當考神宗親扎御集又不編入不得不疑耳三旨宰相據鮮于綽傳信記綽又載圭數事今附見于此更俟參詳修入綽云二府中無土地祠而每位有不動尊佛堂蓋天王也大抵京師官府多塑天王如開封麯院之類皆如此王禹玉在兩府凡十餘年薨後有輕薄子戲為挽祠有東府自來無土地直須正授不須權蓋謂此也其全篇云太師贈誥子孫煎身後無名只有錢喏喏佞翻王特進孜孜留得宋昭宣欄干井上休言戲政事堂中不計年東府自來無土地直須正授不須權太師禹玉贈官元豐末經顧命子孫陳乞皆援韓忠獻例故有子孫煎之句王特進謂介甫宋昭宣用臣也欄干井戲傳者謂親黨有勸乞出者禹玉云井子上欄干不是作劇處輕薄子為此詩納于獻紙贈箱中逹之王氏子孫追尋不復知其誰何投牒開封乞根治府尹出榜立賞告捉竟不獲而詩因此大播有疑説諢話張山人為之者府尹呼詰之張山人沉吟曰此非某所能某尋常只是鼓合聚市井小人戲笑那裏做得他恁地著題官府為之閧笑又云禹玉自熙寧中拜相神宗聰眀睿智以臨臣下新法百度已就禹玉無所建眀但守成而已執政日久人有干差遣者每唯諾之而實無薦引也時人為之語云禹玉禹玉精神滿腹除却脫空十相具足又謂之三旨宰相云詔奉議郎吏部員外郎文及直龍圖閣知同州承事郎將作監主簿文永世候寺監丞有闕差及永世皆彥博子以彥博乞免兩鎮節度使故有是命郎官除職自及始樞密院言中書省已得旨應今年正月九日赦前衝替人係事理重者減為稍重稍重者減為稍輕及差替者便與差遣本院欲應武臣任六等差遣見降者未牽復本等人如該正月九日并三月一日赦每赦與復一等仍令刑部檢舉從之詔修京城使臣五十七員可罷四十七員此據政目十八日事癸丑尚書省奏刑部言合敘用人年七十以上者各乞除敘法所得名目致仕內贓罪人仍不再敘未復舊官人願未敘者聽從之龍賜州及監州知州彭允宗等四人各遣人修貢丙辰正奏名進士劉逵等五百七十五人特奏名八百四十七人並釋褐武舉進士三十九人並賜袍笏銀帶逵隨州人也政目於五月六日書放進士焦蹈以下知登科記焦蹈第一人劉逵乃第二人不何故焦蹈獨不釋褐逵與倪直侯注越州青州判官推官在七月二十三日今并附此刑部言趙嚳等坐父世居常謀不軌除名停降鎖閉就增屋居之環慶路經略司蕃部巡檢貝等領兵入西夏界至和爾原與賊戰有蕃弓箭手索斡昌愛獲西界宥州正監軍偽駙馬葉結威明嘉勒其人乃任事酋首乞優賞之詔索斡昌愛各轉三資賜絹五十匹四月甲申當考荆湖北路鈐轄轉運司言辰州江外生蠻覃仕穩等乞納土歸眀望許依辰州熊臯所申事理招納詔荆湖北路不得妄有招納致生邉事正議大夫新知杭州吕公孺為龍圖閣直學士知鄆州正議大夫户部侍郎李定承議郎給事中兼侍講蔡卞奉議郎起居舍人朱服各降一官坐知貢舉日開寶貢院遺火權知開封府蔡京判官胡及推官李士良各罰銅八斤坐救火延燒寺延及人口雖會赦特責之也戊午通議大夫尚書右僕射兼中書侍郎蔡確守左僕射兼門下侍郎通議大夫知樞密院事韓縝守右僕射兼中書侍郎殿中侍御史黃降言縝不堪大用乞罷之不報降言據蘇轍明年閏二月六日疏附見當考吕本中雜説神宗上仙王圭病薨蔡確遷左僕射宣仁問確右僕射闕誰合做確對曰以即今班序論之即知樞密院事韓縝合做若以祖宗故事論之則東廳參政合做東廳參政即今門下侍郎章惇也宣仁識確語意主惇因曰且只依今班序於是鎖院宣制知樞密院韓縝遷右僕射神宗素輕韓縝及簽書樞密院曽孝寬丁母憂去位已久孝寬為安石所厚上方惡安石恐安石之黨復挽孝寬還舊物遽從中批龍圖閣直學士韓縝同知樞密院事宣仁亦素不喜縝及蔡確力主章惇遂相縝矣論者謂縝神宗所不喜而神宗時作執政宣仁不喜而宣仁時為宰相通塞遲久皆有命也通議大夫門下侍郎章惇知樞密院資政殿學士通議大夫司馬光録門下侍郎初光以知陳州過闕未入對上疏曰臣先乞下詔廣開言路不以有官無官之人並許進實封狀頒下諸路州軍於要閙處出榜示鼓院檢院州軍長吏不得抑退昨奉聖旨令入見及到京蒙降中使以五月五日詔書賜臣看閲臣狂瞽妄言曲荷采納豈獨微臣之幸抑亦天下之幸此乃聖主之先務太平之本原也然臣伏讀詔書其間有愚心未安者不敢不冒萬死極竭以聞竊見詔書始末之言固盡善矣中間有云若乃隂有所懷犯非其分或扇搖機事之重或迎合已行之令上則觀望朝廷之意以徼幸希進下則衒惑流俗之情以干取虛譽審出于此茍不懲艾必能亂俗害治然則黜罰之行是亦不得已也臣聞眀主推心以待其下而無所疑忌忠臣竭誠以事其上而無所畏避故情無不通言無不盡今詔書求諌而逆以六事防之臣以為人臣惟不上言上言則皆可以六事罪之矣其所言或於羣臣有所褒貶則可以謂之陰有所懷本職之外微有所涉則可以謂之犯非其分陳國家安危大計則可以謂之扇搖機事之重或與朝旨暗合則可以謂之迎合已行之令言新法之不便當改則可以謂之觀望朝廷之意言民間愁苦可憫則可以謂之衒惑流俗之情然則天下之事無復可言者矣是詔書始於求諌而終於拒諌也臣恐天下之士益箝口結舌非國家之福也又止令御史臺出榜朝堂自非趍朝之人莫之得見所詢者狹伏望聖眀於詔書中刪去中間一節如臣三月三十日所奏頒布天下使天下之人曉然知陛下務在求諌無拒諌之心各盡所懷不憂黜罰如此則中外之事逺近之情如指諸掌矣既除門下侍郎光又以劄子辭免乞對訖赴陳州并請更張新法曰臣聞詩云毋念爾祖聿修厥德故夏遵禹訓商奉湯典周守文武之法漢循髙祖之律唐行太宗之制子孫享有天祿咸數百年國家受天眀命太祖太宗撥亂反正混一區夏規模宏逺子孫承之百有餘年四海治安風塵無警自生民以來罕有其比其法可謂善矣先帝以睿智之性切于求治而王安石不達政體專用私見變亂舊章誤先帝任使遂致民多失業閭里怨嗟陛下深知其弊即政之初變其一二歡呼之聲已洋溢於四海則人情所苦所願灼然可知陛下何憚而不并其餘悉更張哉譬如有人誤飲毒藥致成大病茍知其毒斯勿飲而已矣豈可云姑少減之俟積以嵗月然後盡捨之哉臣向曽上言教閲保甲公私勞費而無所用之斂免役錢寬富而困貧以養浮浪之人使農民失業窮愁無告將官専制軍政州縣無權無以備倉猝萬一飢饉盜賊羣起國家可憂此皆所害者大所及者衆先宜變更借令皇帝陛下獨攬權綱猶當早發號令以解生民之急救國家之禍收萬國之歡心復祖宗之令典况太皇太后陛下同斷國事捨非而取是去害而就利於體甚順何為而不可於是太皇太后遣中使梁惟簡賜手詔諭令供職曰嗣君年德未髙吾當同處萬務所賴方正之士贊佐邦國竊欲與卿商量政事卿又何辭再降詔開言路須卿供職施行光乃受命資政殿學士知太原府吕惠卿為資政殿大學士端眀殿學士知江寧府王安禮為資政殿學士翰林學士曽布為戶部尚書試户部尚書王存為兵部尚書曽肇作王存墓志云存為兵部尚書遷戶部會神宗山陵財費仰給户部不踰時告乏而宰相乘間徙存復為兵部充山陵鹵簿使元祐初復還户部固辭廷受識者韙之不知肇所稱宰相乘間果何事也存徙曽布實代之布集有年譜乃云司馬公用布為戶部尚書按光除門下侍即與布同日光才執政元未入對那得有此事蓋年譜妄説也布此除實出於蔡確等疑必有曲折肇亦不能為布隱當徐考之元祐元年閏二月十六日劉摯有章二十二日布出知太原紹興初翟璜言劉摰謂大臣誤朝廷而大臣所用者又誤大臣蓋指布也章疏具載國史皆可覆考布子紡釋誣云璜載劉莘老章疏是論募役不可行之語蓋劉莘老在熙寧以差役為不可行反覆辨論至數千言然募役之法不出於王荆公蓋自嘉祐二年韓康公奉使河朔回建明差役之法為牙校者至于破産却以場務禆酬非良法乞令輸錢入官以庶人在官之祿募遊手充役李邦直元祐中作韓康公碑具載其事自嘉祐討論至熙寧方成法耳元祐中蘇子瞻子由兄弟力主募役法為不可改蓋以出於韓子華不出於王荆公故也劉莘老既補外􅤬歷州縣乃知募役為良法雖緣役法左遷流落于外十餘年及元祐初擢為御史中丞可以行其所知矣不復深論自知前日之非也元豐末司馬光召為門下侍郎至朝廷首議行遣熙寧元豐聚斂刻剝之臣故吳居厚楊伋吕惠卿之徒相繼痛貶而力引先公為户部尚書劉莘老為御史中丞若先公在熙寧助王氏為刻剝之政司馬溫公肯置之版曹乎劉莘老與先公在熙寧爭論役法及為中司知役法不可廢故不復深論果以先公所論為非既為中司肯貸先公使安地官之職乎先公與劉莘老同時除授來年先公以食貧請外加龍圖閣學士知太原府劉莘老卒無一字見及近日福建印一骨鯁集有劉莘老論先公章疏乃是選人徐方叔撰造曽經朝廷行遣開封府自有公案元祐初行遣熙寧元豐人皆散官安置此疏但云乞移一近京間慢差遣自不成章疏當時已為笑端元祐末先公自青社易髙陽劉莘老罷相鎮東平歡然相迎延留不已至是為樂語云功名雅在於本朝譽望最先于諸老又云金鑾學士曽謀國玉塞將軍又得人至手書一通靣投云皆摰親草其相喜如此先公為留五日况國史具載自有除授月日可以考驗璜敢變亂是非誕慢如此役法始于韓氏璜猶不知况其他乎不能克家安能立朝也此皆紡所云今略辨之紡云司馬君實引布為户書按布為户書與君實除門侍同日紡妄也已辨之於前紡又云吳居厚楊伋吕惠卿之徒相繼痛貶君實力引布為戶書按三人痛貶月日具在皆是布為戶書後事元豐八年十月十七日吳居厚以前京東運使散官安置黃州元祐元年三月二十二日楊伋罷戶侍為寶置知廣州吕惠卿以大資政知揚州提舉崇福二人皆引疾從其請也蓋初行遣熙豐人除吳居厚餘人皆未嘗便散官安置紡所云誤元豐八年九月十八日劉摰初自少蓬為侍御史元祐元年二月十二日乃除中丞元祐元年閏二月十六日摰上章乞罷布户書二十三日布出知太原摰集今不載此章遺藁仍具載月日可考紡蓋諱之也所云徐方叔曽經行遣不知是何年月日紡又云國史具載除授月日今考之國史乃皆不然兵部侍郎許將為龍圖閣直學士知成都府龍圖閣直學士知成都府吕大防為翰林學士龍圖閣待制知青州鄧綰為龍圖閣直學士知永興軍龍圖閣直學士知永興軍劉庠知青州六月戊寅十六日復故七月庚戌十八日再任詔環慶路經略使趙卨權發遣鄜延路經略司事劉昌祚各具録到任後專授御前指揮以聞中散大夫知冀州王令圖知澶州政目二十六日庚申左僕射蔡確為山陵使是月罷徐州寶豐下監鼓鑄鐡錢此據范純粹奏議增入純粹云自吳居厚置監鼓鑄至今年五月得旨住罷未及一年已支用過官錢八萬九千八百八十餘貫而搬運至陜西腳乘縻費又不在此數云云當考或刪取增入實録在九月十九日庚戌十月十三日甲戌神宗史志元豐六年徐州置寶豐監鑄銅錢此云鐡錢當考西賊犯鄜延路供奉官王英戰死此據劉摰王覿劾惠卿章疏增入摰云西人復仇以五月犯塞疆臣戰歿士卒陷亡今實録乃無此當考覿云供奉官王英以戰死兵士陷歿者六千餘人不知王英戰死處是何城塞當考八月十四日録王英二子英死處實葭蘆寨也
