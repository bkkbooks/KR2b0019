body:
  text: 續資治通鑑長編巻一百六十一宋李燾撰仁宗慶厯七年秋七月丙子詔以冬至有事于南郊己卯詔御史臺自今定奪公事如有請求行用許人陳告賞錢二百千從中丞魚周詢所請也辛巳詔兩制及太常禮院議増真宗諡壬午戸部副使祠部郎中張堯佐為天章閣待制河東都轉運使堯佐此除獨無言者當考癸未奉安太祖太宗真宗御容于南京鴻慶宫甲申徳音降南京畿内囚罪一等徒以下釋之减夏稅之半除災傷倚閣稅及欠官物非侵盗者賜在京諸軍將校特支錢壬辰降知廣州右諫議大夫魏瓘知鄂州臨江軍判官史沆性險詖嘗為瓘所劾免㑹廣州封送貢餘椰子煎等餉京師而沆輙邀留之飛奏指以為珍貨詔遣内侍發驗無有沆坐不實廢瓘亦左降御史何郯因言天下州郡毎嵗有例以貢奉所餘菓實等物送遺臣僚之處舊雖著條約不許縁諸處相承久例未全止絶近知廣州魏瓘坐此降絀竊恐四方聞知其間有險薄狡獪之人望風相效用是興起詞訟中傷有位臣欲乞下有司申明舊制斷自今後諸處更不得以貢餘為名將果實等物送遺臣僚其未經申明前州郡有曽送遺處即更不許人告訐如此則上可以存朝廷之體下可以安臣庶之心從之詔從郯言其日辛酉併書甲午詔將來南郊遷章懿皇太后神主于后廟或親詣奉慈廟行饗禮兩制及太常禮院詳定以聞於是翰林學士張方平等言章懿肇祀别宫允為稱禮與孝恵孝章淑徳章懐義盖有殊禮難同祔請仍舊南郊薦饗一如后廟詔饗奉慈朕今且親行後當遣宰相攝事南郊禮儀使楊察言凖景祐二年勅禋祀天地自今以太祖為定配二宗為迭配慶歴四年南郊已奉太祖太宗配今合以太祖真宗配詔恭依丁酉奉宣祖皇帝昭憲皇后御容于奉先資福禪院慶基殿上親行酌獻之禮以重修殿成也辛丑新淮南江浙荆湖制置發運使刑部郎中直龍圖閣王居白為天章閣待制知廣州初命司農少卿辛若渝代魏瓘加若渝右諌議大夫御史何郯等言若渝雖號清謹然年已七十才力非長不宜使知廣州遂改命居白亦不拜若渝右諫議大夫制置發運判官主客員外郎許元遷制置發運副使仍詔且未除正使八月癸卯朔遣官祈晴甲辰鹽鐵副使主客郎中袁杭為司勲郎中知宣州御史言其年老不任事也丁未賜汝州龍興縣處士孔􅌈粟帛􅌈孔子四十六代孫隠居縣之龍山滍陽城性孤潔喜讀書有田數百畆賦稅常為鄕里先遇歳饑分所餘周不足者未嘗計有無聞人之善若出於已動止必依禮法環所居百里人皆愛慕之見􅌈于路輙斂袵以避葬其父廬墓三年卧破棺中日食米一溢壁間生紫芝數十本州以行義聞故有是賜又給復其家盗嘗入􅌈家發其廪粟􅌈避之縱其所取嘗逄羸弱者為盗掠奪其貲􅌈追盗與語責之以義觧金卑之使歸所掠居山未嘗逄毒蛇猛獸或謂之曰子毌夜行此亦可畏􅌈曰無心則無所畏晚年惟玩易老諸書它書亦不復讀為太元圖張壁上外列方州部家而規其中心空之無所書曰易所謂寂然不動者與此無以異也戊申知諫院王贄言自今臣僚上殿如親聞徳音事干教化及禮樂刑政之類為世典法者並仰備録關修起居注官從之甲寅詔自今使契丹毋得用二府臣僚親戚其文臣擇有出身才望學問人武臣須逹時務更職任者充其引伴西人亦選差使臣從御史何郯之言也丙辰詔加真宗諡曰膺符稽古成功譲徳文明武定章聖元孝從翰林學士張方平等議也刑部員外郎知諫院吳鼎臣為契丹國母生辰使崇儀副使柴貽慶副之太常博士集賢校理同修起居注判度支勾院韓綜為契丹生辰使供備庫副使柳渉副之戸部判官刑部郎中崔嶧為契丹國母正旦使内殿崇班閤門祇候侍其演副之鹽鐵判官司勲員外郎劉立之為契丹正旦使内殿崇班李中祐副之尋命内殿承制閤門祇候夏佺代柴貽慶立之式子中祐允則子降廣西鈐轄亓贇為邕州本城馬歩軍都指揮使永不敘用轉運司言贇在連州縱所部卒屠耕牛市之及宋守信等入山討猺賊而贇逗遛不至也戊午改文明殿學士為紫宸殿學士文明殿禁中已無之學士自程羽李昉後亦不以除授而文明二字又出真宗諡故改之用叅知政事宋庠議也初置天章閣直學士位在龍圖閣直學士之下實録於此月乙丑書析河北大名真定府定州高陽關為四路毎路各置都部署一員鈐轄二員都監四員如無事只以河北安撫使總制諸路或有警即於大名置四路行營都部署擇嘗任兩府者為之按八年四月辛卯初置河北四路安撫使命知大名真定府瀛定州者領之此時未也盖竦寔建此議十年三月竦入為樞宻使賈昌朝代竦判大名是年八月始下竦議令昌朝詳度昌朝請如竦議詔遂行之實在八年四月實録誤以始下竦議為即施行於七年八月先書此與八年四月互見今從本志並載八年四月削實録七年八月所書㑹要亦同實録盖實録因㑹要致誤也丙寅召近臣崇政殿觀御書真宗加諡版位帝親跪設再拜涕泣又觀新作郊廟祭器以景表尺較其制度之未合者悉令改造之太常禮院請皇帝獻天帝配帝坐以匏爵亞獻以木爵親祠太廟酌以玊斚亞獻以金斚郊廟飲福皇帝皆以玊斚詔飲福唯用金斚亞終獻酌銀斚此事附見丁卯以加上真宗尊諡命翰林學士錢明逸奏告永定陵詔以保州縁邉廵檢司𨽻定州路雄覇等州界河司𨽻高陽關路其兩司守捍之計委逐路主將處置仍分屯兵馬控禦賊盗無令侵軼九月按此條不標日當有脫誤徐州觀察使知磁州楊景宗為建寧軍留後知潞州特給節度使俸癸酉河北安撫使賈昌朝言保州廵邉司事自今令與知州同議毋得專行從之甲戍降引進使眉州防禦使知渭州張亢領果州團練使知磁州時三司給郊賞州庫物良而估賤三司所給物下而估髙亢命均其直以便軍人轉運使奏亢擅減三司所估樞密使夏竦挾故怨因絀亢御史宋禧繼言亢嘗以庫銀市易復降為右領軍衛大將軍知壽州亢再降乃十月乙卯今併書三司送特支下慶州物惡而估髙軍中語籍籍優人因戲及之知州孫沔曰此朝廷特賜何敢妄言動衆命驅出將斬之以徇將佐爭言此特戲爾不足深罪也沔徐呼還杖脊配嶺南謂之曰汝頼戲我前即私議動衆汝必死而告者起遷矣明日給特支士帖然無敢譁者此事不得其時今附見張亢得罪之後沔以是年三月自河東都漕改帥慶州此時必在慶州慶歴四年五月沔自慶州移渭州尋復故五年八月乃移陜州王珪墓銘以給特支事在前知慶州日當更詳考丁丑判刑部金部員外郎崇文館檢討孫瑜太常博士祕閤校理晁仲衍並衝替都官員外郎髙賦特罰銅三十斤初賦為定州監當嘗以二月十九日同州官令軍士作砌臺之戲既坐罪十餘年始求雪於刑部瑜等因為奏辨之上以其日乃真宗大忌怒而特責之仲衍宗慤子賦中山人戊寅罷秋讌以郊禮期近也己卯主客郎中王儀提㸃河北路刑獄御史何郯言王儀頃歳已曽為河北提刑時都轉運使張昷之乞減削保州廵檢下諸軍請給朝廷指揮下提刑司相度王儀並不明陳利害務與昷之扶同致啟保州之亂朝廷行罰與昷之等一例降官知小州今昷之等未離貶所儀獨復職司於賞罰恐未為均况儀之所坐與臣僚常犯不同若復進用無以戒生事啟亂之人兼儀近來妄託神靈乞於河北開致方田其事蠧弊於民最􅋀朝廷不知其詭妄即與施行徒紛然煩擾事卒不成河北郡縣官僚有愛惜民力皆不為行今既充本路職司必是挾持前事用為嫌隙務欲中傷官屬或倚恃權勢却行方田之事以遂前非則河朔一方從此騷動不安矣伏乞特降聖㫖追罷前命却與一小處知州差遣所冀退詐妄之人不使為一方之患後七日改命祠部貟外郎田京提㸃河北刑獄儀徙它官庚辰降新提㸃利州路刑獄太常博士張肅知岳州肅坐前為廣東轉運使於所部過市物也洛苑使嘉州團練使趙從約上太宗御製及書其祖普碑丙午加從約眉州防禦使癸巳以北宅為廣親宅先是帝以秦王子孫衆多而所居狹隘乃命修王欽若故第増益之徐國公承簡言于上曰陛下敦愛宗室無踈近之間既建睦親宅亦願得羙名以榜秦王第遂賜今名丁酉詔刪定一州一縣敇戊戍遣官謝晴庚子徙保安軍𣙜塲於順寧寨保安舊有𣙜場自元昊叛命再請和數使使來乞増置之朝廷為置𣙜場于保安鎮戎軍至是又言驅馬羊至無放牧之地亦聴保安場徙他處然蕃商卒不至冬十月壬寅朔工部郎中集賢殿修撰張揆為天章閣待制兼侍讀揆上所著太元集解召見延和殿令揲蓍得斷首且言斷首凖易之夬卦盖陽剛以决陰柔君子進小人退之象也帝恱故有是命揆掞兄戊申西蕃黙戩覺遣使來貢方物太子太傅致仕李廸既歸濮州其子柬之為侍御史知雜事奉廸來京師帝數遣使勞問欲召見以羸疾辭壬子廸卒贈司空侍中諡文定帝其墓碑曰遺直之碑又改廸所葬鄄城之鄧鄕曰遺直鄕庚戍三司言凖詔今後毎有傳宣及内降指揮須候面奏訖方得施行縁有係急速合即時應副者慮面奏不及亦有體例分眀者今相度除係入納錢物并生事須候面奏施行外其餘體例分明及急速事乞依舊實封覆奏從之戊午詔判大名府賈昌朝判邠州程琳知秦州梁適知永興軍葉清臣知渭州田况各舉京朝官一人換右職甲子幸廣親宅謁太祖太宗神御殿宴宗室賜器幣有差乙丑孟州許州地震丙寅召輔臣觀太廟七室題榜於御藥院十一月辛未朔判大名府賈昌朝河北轉運使皇甫泌等乞募人於澶貝徳博滄大名通利永静八州軍進納修河物料等第與恩澤從之詔開封府河北京東京西轉運司遍行告諭丙子詔河北諸路鈐轄都監毎遇秋冬分往逐州軍提舉教己卯追復故崇信節度使錢惟演為泰寧節度使同平章事壬午湖南猺賊平甲申降兵部貟外郎張鑄通判太平州鑄前為京東轉運使有告孔直温謀反者鑄疑其妄置不問直温既被誅御史何郯言鑄不可赦故有是命吕居簡事在五年十一月可考丙戌詔非㳂邉州軍毋得以公使錢回易乙未加上真宗諡丙申朝饗景靈宫丁酉饗太廟奉慈廟戊戌祀天地于圜丘大赦是日貝州宣毅卒王則㨿城反則本涿州人嵗饑流至貝州自賣為人牧羊後𨽻宣毅軍為小校貝冀俗妖幻相與習五龍滴淚等經及圖䜟諸書言釋迦佛衰謝彌勒佛當持世初則去涿母與之訣别刺福字於其背以為記妖人因妄傳福字隐起争信事之而州吏張巒卜吉主其謀黨連徳齊諸州約以明年正旦斷澶州浮梁亂河北㑹黨人潘方淨懐刃以書謁北京留守賈昌朝事覺被執不待期亟叛時知州張得一方與官屬謁天慶觀則率其徒刼庫兵得一走保驍㨗營賊焚門執得一囚之兵馬都監田斌以從卒巷鬬不勝而出城扉闔提㸃刑獄田京任黄裳持印棄其家縋城出保南關賊從通判董元亨取軍資庫鑰元亨拒之殺元亨又出獄囚囚有憾司理參軍王奬者遂殺奬既而節度判官李浩清河令齊開主簿王湙皆被害則僣號東平郡王以張巒為宰相卜吉為樞宻使建國曰安陽榜所居門曰中京居室廐庫皆立名號改年曰得聖以十二月為正月百姓年十二以上七十以下皆湼其面曰義軍破趙得勝旗幟號令率以佛為稱城以一樓為一州書州名補其徒為知州每面置一總管然縋城下者日衆於是令守者伍伍為保一人縋餘悉斬初變起倉卒衆莫知所為元亨自天慶觀促馬馳還坐㕔事賊黨十餘人環甲露刃排闥而入左右皆奔潰賊脅元亨曰大王遣我來索庫鑰元亨㨿案叱之曰大王誰也妖賊乃敢弄兵乎我有死爾鑰不可得也賊將郝用繼來索愈急曰庫帑今日大王所有也可不上鑰乎元亨厲聲張目罵賊用遂殺之賊爭擕鑰去及城破獲用斬以祭元亨元亨束鹿人也賈昌朝遣大名府鈐轄内殿承制郝質將兵趍貝州十二月辛丑朔昌朝以貝州反書聞内出劄子下中書樞宻院亟擇將領往撲滅之仍令澶州孟州定州真定府豫設守備毌至奔逸其契丹賀正旦使當由它道至京師壬寅遣宫苑使象州團練使入内押班麥允言西京作坊使資州團練使王凱往貝州捕殺軍賊仍詔賈昌朝發精兵衞之高陽關都部署馬軍都虞候象州防禦使王信聞貝州亂亟領本路兵傅城下甲辰即以信為貝州城下招捉都部署丙午河北轉運司言貝州軍民降者六百餘人詔王信等軍營在關城内而與為亂者家屬並羈管之非為亂者常加曉諭勿令憂疑是夜有星大如缶墜賊城中丁未詔諸道兵馬已㑹貝州城下令王信麥允言王凱郝質速行攻討其轉運使提㸃刑獄官毋得與攻取事戊申加恩百官樞宻使王貽永封遂國公夏竦英國公鎮安節度使同平章事章得象郇國公保静節度使同平章事王徳用祁國公舊制將相食邑萬戸即封國公王旦為相過萬戸而謙抑不封是嵗南郊中外將相唯竦滿萬戸中書請封英國因詔節度使帶平章事未滿萬戸皆得封於是貽永得象徳用皆封國公其後遂以封邑合萬戸者徹國庚戍權知開封府樞宻直學士左諫議大夫明鎬為河北體量安撫使壬子詔訪聞貝州來投軍民多致殺戮以邀功賞其令賈昌朝王信等嚴切約束違者以軍法從事癸丑詔貝州有能縋索引官軍致得城者與諸衛上將軍賞錢二千貫知鄆州韓𤦺徙成徳軍甲寅知滄州西上閤門使榮州刺史高繼隆為東上閤門使知貝州詔陳留雍邱襄邑尉氏咸平陽武等六縣兵馬都監自今令開封府及府界提㸃司更舉閤門祗候曽經外任者為之遣内侍何誠用齎敇榜招安貝州軍賊御史中丞髙若訥言河朔重兵所積處今釋貝州不討後且啟亂階為敵國笑不聴丁巳賜貝州城下軍士特支錢乙丑契丹國毋遣安福軍留後耶律夀西上閤門使鄭全節契丹遣左千牛衛上將軍耶律防右諫議大夫知制誥韓逈來賀正旦丙午詔自今策試武舉人毋得問陰符諸禁書知諌院王贄言諫官例不與臣僚過從今請除二府不聼謁外其兩制官並許往還從之無其日今附月末㑹要十二月事景祐南郊禮儀使言天聖五年敇禮儀院奏宰臣叅知政事攝事宗廟如有服制即奏改差别官多致妨闕禮院檢討按律稱如有緦麻以上喪遣充職事者笞五十陪從者笞三十皆唐初所定貞元六年吏部起請凡有慘服既葬公除及聞哀假滿許吉服赴宗廟之祭同官未葬雖公除依前禁之奉詔百官有私喪公除者聴赴宗廟之祭後王涇著郊祀録稱一時之事非舊典也又别無詔勑改更是以歴代施行至大中祥符中詳定所乞依郊祀録緦麻以上喪不預宗廟之祭當時詔可自後有緦麻以上服者雖是公除不差預祭宗廟叅詳唐吏部起請證㩀甚明王涇所說别無典故乞準貞元詔書預備祠官是歳禮官邵必言古之臣子未有居父母喪而輙與國家大祭今制但不許入宗廟至於南郊壇景靈宫皆許行事唐金吾將軍沈房有弟喪公除衣慘服入内閣門上問宰相董晉對曰凖式朝官有周以下喪者禁慘服朝㑹則當時周以下喪雖已公除尚有慘服至是乃禁故前吏部所請慘服既葬公除者謂周以下也前後相承誤以為三年喪得吉服從祭失之甚也又據律文諸廟享有緦麻以上喪不許執事祭天地社稷不禁此唐之定律者不詳經典意也王制曰䘮三年不祭唯天地社稷為越紼以行事注不敢以卑廢尊也是指言王者不敢以私親之䘮廢天地社稷之祭非謂臣下有父母䘮而得從天地社稷也兼律文所不禁者亦止謂緦麻以上周以下䘮故也南郊太廟為吉祭奉承之意無容異禮今居父母䘮不得入太廟至於南郊則愈為重朝廷毎因大禮侍祠之官普有霑賚使居䘮之人得預祠事是不欲慶澤之行有所不被奈何以小恵而傷大禮近歳兩制以上並許終䘮唯於武臣尚仍舊制是亦取古之墨衰從事金革無避之義也然於郊社吉禮則為不可下禮院言郊祀大禮國之重事有司聯職僅取濟集若居䘮被起之官咸不與事則或有妨闕但不以慘麤之容接於祭次則亦可行請依太常新禮宗室及文武官有遭䘮被起及卒哭赴朝叅者遇大朝㑹聴不入若縁郊祀大禮唯不入宗廟其郊祀壇景靈宫得權從吉服陪位或差攝陪位詔可三司使張方平言自慶歴二年六月至七年六月通計五年方平䟽稱未滿五年則此䟽必在六月以前上矣今附見年末勘㑹陜西用兵以來内外所増置禁軍八百六十餘指揮約四十有餘萬人通人員長行用中等例毎人約料錢五百月糧兩石五斗春冬衣紬絹六匹綿一十二兩隨衣錢三千計每年共支料錢二百四十萬緡糧一千二百萬石凖例六折米計七百二十萬石紬絹二百四十萬匹綿四百八十萬兩隨衣錢一百二十萬緡毎次南郊賞給六百萬緡内馬軍一百二十餘指揮若馬數全足計六萬有餘匹毎年支草一千五百一十二萬束料一百五十一萬二千石其係三路保㨗振武宣毅武衛清邉蕃落等指揮并本道土兵連營仰給約二十餘萬人比屯駐戍兵當四十萬人本道財賦支贍不足募商人入中糧草度支給還錢帛加擡則例價率三倍茶鹽礬縁此法賤貨利流散弊悉歸官又自慶歴三年以後増添給送西北銀絹内外文武冗官日更増廣以此三司經用不贍慶歴二年六月聖恩特賜内藏銀一百萬兩絹二百萬匹仍盡放免日前所貸内庫錢帛慶歴二年八月又䝉恩賜内藏所貯銀絹三百萬匹兩為錢一千二百萬緡慶歴五年又賜江南所鑄到大銅錢十一萬當小錢一百一十萬緡及今未滿五年相添費用已盡乃是每年常將内藏銀絹近三百萬緡供助三司經費仍復調發諸路錢物應副方始得足即日外州府庫搜剗亡餘不知内藏蓄積㡬何可供今後支撥天下山澤之利茶鹽酒稅諸色課入比之先朝以前例皆大有増剩可謂無遺利也若據國家天下之廣嵗入之數自古無此之多者然有司調度交見匱之直以支費數廣不量入以為出所致爾方今急務莫先貨食貨食不足何以為國昔唐自天寳之亂肅代之後禁軍之餉畿甸百姓至挼穂以供兵食登都城門以望貢奉之至王室可為危蹙矣然患難既平則兵有時而解兵解則民力紓矣今禁兵之籍不啻百萬人坐而衣食無有觧期七八年間天下已困而中外恬然不知云救請舉一事而言則他可以類知也景祐中天下預買紬絹一百九十萬匹去年至買三百萬匹諸路轉運司率多訴者有司末如之何議者徒知茶鹽諸課利之法敝而不知敝之所由臣詳求其故法實不敝勢使然爾置兵有策則邉費可省邉費省則兼并之民不能觀時緩急以侵利權然後有司得制其輕重矣臣以不才謬當大計職憂所切心如焚灼權諸利害至於根本則關配動静臂指伸縮乃繫二府非有司所預謹具大略乞下中書樞宻院審加圖議裁於聖斷變而通之允底蒸民之生兹為適治之路又言臣昨曽約計天下財利出入之籍知天下之所以困本於兵因勘㑹自寳元慶歴後内外増置禁軍歳給錢帛糧賜等數進呈乞朝廷圖議其事有以弛張之伏以太祖皇帝取荆潭收蜀廣南江南備晉㓂禦西戎北敵計所畜兵不及十五萬太宗皇帝平太原備遷賊禦北敵料簡軍旅増修戎備志在收取燕薊然畜兵亦不過四十萬先皇咸平中備遷賊禦北敵蒐募戰士至五十餘萬人及契丹請和祥符以後稍稍消汰弛馬牧地給耕民邉將占兵自固者輙罷之至于寳元㡬四十年可謂乂安矣向因夏戎阻命始籍民兵俄命刺之以補軍籍遂於陜西河北京東西増置保㨗武衛宣毅等軍既而又置宣毅於江淮荆湖福建等路凡内外増置禁軍約四十二萬餘人通三朝舊兵且百萬鄕軍義勇州郡廂軍諸軍小分剩員等不列于數連營之士日増南畆之民日减邇來七年之間民力大困天下耕夫織婦莫能給其衣食生民之膏澤竭盡國家之倉庫空虛而此冗兵狃於姑息寖驕以熾漸成厲階然且上下恬然不圖云救惟恐招置之不多也且太祖訓兵十萬人以定天下今以百萬人為少此無它爾各茍及身之安莫為經久之慮也夫茍且者臣下及身之謀經久者陛下國家之計今負販之家猶汲汲於擔石之備安有慮不經久而可以保天下者哉比嵗以來三路入中糧草度支給還價錢常至一千萬貫上下邉費如此何以枝梧臣較今大計加之百萬不為益减之百萬不為損而比來鬻官六千緡者與簿尉萬緡則殿直諸監筦塲務官凖課程以立賞格收贏至二三千緡即以次遷陟不知賣官遷官幾何員數可供三路一歳糧草之費是謂聚畎澮之微供尾閭之泄也淺陋之人更言遺利以禆經用末矣盖財計盈虛時事安危繫諸兵而已矣景祐以前兵五十萬三司財用無餘及今而加一倍則何以得足臣今約度今年在京支計前已進呈只是凖擬常程用度圓融變轉僅以有備過此以往若更因之以橫費加之以饑饉雖有智者亦恐難以善其後矣况臣之愚敢期克濟惟社稷之福祖宗之靈陛下至仁盛徳有以感格天地降之以善祥報之以有年則兆民之所頼也若觀諸人事臣愚竊甚寒心伏望令中書樞密院檢㑹臣前奏審加計議裁於聖斷早為之所猶須效在累年之後如救焚溺緩則益不及矣
