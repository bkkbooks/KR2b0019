body:
  text: 續資治通鑑長編巻六十九宋李燾撰真宗大中祥符元年五月辛酉王欽若等言轉運使盧琰邵曄祗奉祀事欲留前轉運使張知白權本司常務詔知白俟禮畢赴闕壬戌令官吏犯贓遇赦者奏裁或有希望㤙宥故干科條所在禁錮以俟進止王欽若言泰山下醴泉出河北轉運使李士衡奏罷内帑所助錢八萬緡扵是又請輦本路金帛芻粟四十九萬赴京東以助祀事上曰士衡臨事有心力可奬也遂賜褒詔丁謂因請留士衡扵澶州管勾東封事詔從之有司詳定儀注請于泰山上置圜臺徑五丈髙九尺四出陛上餙以青四靣如方色壇外一壝廣一丈圍以青䋲三周燎壇在圜壇東南髙一丈二尺方一丈開上南出戸方六尺山下封祀壇四成十二陛如郊祀録圜丘之制上餙以元四靣如方色設三壝燎壇如山上社首壇八角三成八陛三壝如方丘之制又為瘞塪扵壬地外壝之内天地玉牒玉冊並刻字填金聫以金塗銀䋲緘以玉匱置石䃭中配坐玉冊緘以金匱牒廣五寸冊廣一寸二分厚三分金匱之制並長一尺三寸檢長如匱厚二寸濶五寸當纒䋲處刻為五道封匱以金泥和金粉乳香為之印以受命寳寳方一寸二分文曰恭膺天命之寳封匱當寳處刻深二分石䃭之制用石再累各方五尺厚一尺鑿中廣深令容玉匱傍施檢處皆刻深七寸濶一尺南北各三東西各二去隅皆七寸纒䋲皆刻三道廣一寸五分深三分又為石檢以㩎䃭皆長三尺濶一尺厚七寸刻三道廣深如纒其當封處刻深二寸取足容寶又皆為小石盖與封刻相應其檢立䃭旁當刻處又為金䋲三以纒䃭皆五周徑三分封䃭以石泥石末和方色土為之印以天下同文寳寳鑄以金制同御前寳距石十二分距四隅皆濶二尺厚一尺長一丈斜刻其道與䃭相應皆再累又為五色土圜封䃭上徑一丈二尺下徑三丈九尺其二寳分寸並以今尺為凖金匱回日奉置太廟本室詔皆從之乙丑王欽若言錫山蒼龍見丙寅命王旦馮拯趙安仁等分撰玉牒玉冊文上諭之曰其文當首叙上天降鑒符瑞沓委次述為民祈福之意詔縁封禪所經諸州權増屯兵可第賜緡錢及酒令長吏犒設戊辰新及第授官人無得以富家權錢倍出息利至任所償還所在察舉之初有司請依唐故事皇帝告廟出京泰山社首山並用法駕上以前詔惟祀事豐潔餘從簡約扵是改用小駕儀仗尋改小駕名曰鑾駕辛未趙安仁奏得太僕寺狀金玉輅合先赴泰山輅髙二丈三尺濶一丈三尺所經州縣城門橋道有隘狭處請令修拆上曰若此則勞人矣可于城外過有墳墓處避之癸酉秦國賢肅長公主薨王承衍先卒扵咸平元年甲戌上以東封路供頓芻糧數廣召丁謂出扈駕兵籍示之曰盖有司不知此數廣為營備爾曽不慮煩擾扵下其少數未曽轉送者竢秋成和市丙子詔收瘞汴蔡廣濟河流尸暴骸仍致祭三司假内蔵庫銀十萬兩從之丁丑給復州經冦盗戸三年令諸州所貢方物並取十月以前集泰山下庚辰詔諸路今年夏秋賦止扵本州軍輸納有司請登封日圜臺立黄麾仗至山下壇設爟火將行禮然炬相屬又出漆牌遣執仗者傳付山下牌至公卿就位皇帝就望燎位山上傳呼萬嵗下即舉燎皇帝還大次解嚴又傳呼而下祀官始退其社首瘞坎亦設爟火三為凖從之始定公卿就位亦重傳呼為節上以接神務在嚴静遂更為漆牌禮畢仍聽傳呼又恐傳付漆牌不即達辰刻或差先遣司天以漏壺設山之上下及以日晷覆校復以壇側擊版相應又自太平頂天門黄峴嶺岱嶽觀各以長竿揭籠燈下照叅候使不愆其節云贈元徳皇太后父故乾元防禦使李英檢校太尉安國節度使追封常山郡王母王氏魏國太夫人仍遣使告元徳皇太后廟辛巳對王旦等扵龍圖閣出封禪壇圖示之上曰郊禋日祀昊天上帝位不以正坐盖合祭皇地祇今封祀日昊天上帝坐宜當子位天書置扵東側太祖太宗位比郊禋日次西北側向以申祖宗恭事上穹之意壬午詔天書出京至嶽下日用道門威儀百人在路三十人舊制郊祀正坐褥皆以黄皇帝拜褥以緋至是詔配坐以緋拜褥以紫詔縁路行宫止以舊屋就加塗塈不湏别創詔扵泰山要路置門非執事赴役者無得升有司言天書出京日創新几褥置五輅中備儀仗導從七百五十人前後部鼓吹中使二員夹侍仍命官充使癸未以王旦為天書儀仗使按宋史作儀衛使王欽若趙安仁副之丁謂為扶侍使藍繼宗為扶侍都監入内髙品周懐政入内髙班内品皇甫繼明並為夹侍王欽若趙安仁為副使寔録在九月丙子今從本志并書之詔車駕離京至封禪以前不舉樂經厯州縣勿以聲伎來迎甘州輝和爾汗王伊嚕格勒遣使來告㨗使還賜伊嚕格勒香藥金帶弓劔又賞巴烏公主黄金噐公主即伊嚕格勒之母每事咨而後行故加賜焉中使自兖州至言泰山素多虎自興功以来雖屢見未嘗傷人悉相率入徂徕山衆皆異之詔王欽若就嶽祠祭謝仍禁其傷捕上謂王旦等曰自醴泉𤼵朕即周問泰山祠宇有言王母池因念詔許東封以来凡有靈迹靡不醮告獨此尚闕乃命中使齎青詞致告未𤼵而王欽若奏至言池水變紫色騐之乃遣使之信宿也旦等曰休應響答如是之速實至誠所感也甲申上出御筆所記事示輔臣曰宫禁之内人數非多然幽閉可念昨令擇一百二十人厚資遣之此亦節度之一端也朕方敦尚清静以治天下符大中之訓焉丙戌上御崇政殿親慮御史臺三司開封府殿前侍衛司繫囚流已下逓減一等笞杖釋之京東轉運使言修葺行宫合用筒瓦望自京運送上曰前詔行宫無得廣有營造今方盛暑自京送瓦重有勞擾非朕意即令以常瓦給用戊子下詔教節儉戒奢侈有司除衮冕儀仗法服及宴㑹所設依舊外自今宫禁皇親臣僚應進奉物勿以銷金文繡為餙或湏創造必候進止諸司無得起樣進呈仍錄詔賜皇親家一本六月壬辰詳定所上封禪儀注上覽之曰此儀乆廢非典禮具備豈為盡美即手札疑互凡十九事令五使参議釐正而行之又以靈山清潔命祀官差減其數或令兼攝有朞䘮未滿餘服未卒哭者不得預祭内侍諸司官除掌事宿衛外從升者才二十四人諸司執掌九十三人以香藥庫副使安守忠領叙州刺史供奉官閤門祗候黎守忠為内殿崇班充職守忠等掌㩁貨務三司言其嵗課比舊増八百四萬九千餘緡遂賞之黎守忠未見徙環慶路騎兵于近地省饋運之煩也又以上軍代所屯威武而下諸軍先是崇儀使胡致恭言是路駐泊軍皆非精銳望易以近上禁軍上以為芻粟既少屯上軍則所費滋廣遂詔鈐轄司規度以上軍一人代下軍二人及是奏至請如詔㫖賜輔臣新鑄御書祥符元寳錢環慶民飢發廪粟賤糶以濟之甲午詔有司加諡太祖太宗俟封禪禮畢日恭上冊寳諡議令王旦撰旦言唐故事丞郎或太常為之上曰尊奉祖宗豈拘常例特命輔臣以申朕之孝思也詔泰山前代封禪基址摧圯者修完之初太平興國中得唐明皇社首玉冊蒼璧至是令瘞扵舊所命都官員外郎孫奭至契丹境上告以將有事于泰山時議東封六師必湏從行恐契丹不察妄生猜慮欲遣使諭意上曰朝廷每遣使徃彼有接伴館設之勞但令奭扵境上以書信逹之可也既而契丹報云中國自行大禮何煩告諭其禮物慮違誓文不敢輙受上曰異域常能固守信誓良可嘉也慶州言築耳朶城畢上曰此城無屯兵止令蕃落自守亦足為近塞之扞蔽也乙未詔軍校老疾當𨽻外州者聽從其便有司言皇帝告廟准典禮出乗玉輅歸乗金輅縁奉安天書扵玉輅皇帝赴太廟徃来並乗金輅從之殿中侍御史趙湘言漢章帝以月令冬至之後有順陽助生之文而無鞫獄斷刑之政遂定令母以十一月十二月報囚今季冬誕聖之月而决大辟不廢願詔有司自仲冬留大辟弗决俟孟春臨軒閲視情可矜察者貸之他論如法上曰此固善矣然慮繫囚益淹乆吏或旁縁為姦爾丙申有司請前祀七日遣官以牲幣分祭天齊淵等八神又祀云云亭亭肅然徂徕㑹稽五山及扵泰山下擇地望祭前代封禪帝王前祀一日以太牢祀泰山少牢祀社首並從之丁酉詔宫殿苑囿下至皇親臣庶第宅勿以五彩為餙禁用羅製幡勝縑帛為假花者詔如聞宿州臨渙縣民託稱神異營建寺宇逺近奔集頗為惑衆宜禁止之先是五月丙子上復夢向者神人言来月上旬復當賜天書扵泰山即宻諭王欽若奏六月甲午木工董祚扵醴泉亭北見黄素曵草上有字不能識言扵皇城使王居正居正見其上有御名馳告欽若欽若等就取得之遂建道塲明日跪授中使捧詣闕奏至上亟召王旦等諭其事欲自出奉迎即命旦為導衛使己亥旦與扶侍使而下具儀仗奉迎天書入含芳園之西門庚子羣臣詣園迎導升殿辛丑上致齋壬寅備鑾駕以出北靣拜殿下導衛扶侍使自殿上奉天書置上前上再拜授陳堯叟跪讀其文曰汝崇孝奉吾育民廣福賜爾嘉瑞黎庶咸知祕守斯言善解吾意國祚延永夀厯遐嵗讀訖召百官示之復奉以升殿酌獻畢上先還旦等導衛扶侍至朝元殿上迎拜入内時乆雨頓晴景色澄廓苑中有雲五色讀天書次黄氣如鳳駐殿上癸夘擢董祚為八作副都頭王居正為右班殿直甲辰詔兖州大辟囚送鄰州處斷庚戌曲赦兖州繫囚流罪以下賜文武百官泰山醴泉辛亥詔如聞遣使外州祠祭而禮科素無定數或州縣因縁須索頗致煩擾其令有司具數行下開封府言尉氏縣惠民河決遣使督視完塞壬子取封禪之義改郊祀樂曲名俟禮畢仍舊其後祀汾隂后土亦如之判太常禮院孫奭言按禮文饗太廟終獻降階之後武舞上太祝徹豆豐安之樂作一成止然後禮安之樂作是謂送神論語曰三家者以雍徹又周禮樂師職曰及徹帥學士而歌徹鄭元曰謂歌雍也郊祀録載登歌徹豆一章奏無射羽然則宗廟之樂禮有登歌徹豆一章今扵終獻降階之後即作禮安之樂誠恐闕失望依舊例増用詔判太常寺李宗諤與檢討詳議以聞宗諤等言國初撰樂章有徹豆豐安曲辭樂署因循不作望如奭所奏從之此事寔錄不載㑹要載扵十一月前六月後本志亦與改封禪樂曲名同時載之今附扵此先是諸路貢新茶者凡三十餘州越數千里有嵗中再三至者上憫其勞擾扵是詔悉停罷丙辰廢内園司從謝徳權之請也丁巳羣臣五上表加尊號曰崇文廣武儀天尊道寳應章感聖明仁孝從之御輦院請别製升泰山天平輦上慮其太重而勞人俾裁減之所司言登陟峻嶮恐不堅固上曰路稍艱朕當降輦歩進又令别造寶匣寳􅼣咸差小其制秋七月庚申有司言南郊惟昊天皇地祇配帝日月五方神州各用幣一十二段其内中外官嶽鎮海瀆以六十四段分充而不别設按開寳通禮稱内巾外官嶽鎮海瀆幣各從方色即明皆有制幣今請封祀壇内官至外官三百一十八位社首壇嶽鎮以下一十八位並用方色幣又南郊牲惟正坐用犢五方帝日月神州共用羊豕二十二其從祀七百三十二位按宋史作七百三十七位仍以前數分充今請神州而上十二位並用犢其舊供羊豕改充從祀牲又景徳中升天皇極北在第一等今請亦扵從祀牲内體薦按原本脱去又景徳中至從祀牲二十字又體薦訛作薦體今据宋史禮志補正奏可廣州言大食國舶主陀婆黎願以方物赴泰山修貢詔許之初朝陵嵗縁路民庶貢物者詔有司給賜頗為稽滯壬戌命右正言知制誥周起供奉官閤門祗候侍其旭專領其事封禪用玉牒冊凡七文思玉工言用玉追琢難成宰相請代以珉石及階州採進上曰此碔砆之類目之為玉以奉天扵禮可乎即遣中使徧詢玉工有趙榮者言太平興國中令與衆工治羙玉為牒冊嵗餘方就寘崇政殿庫亟取而用之上曰此盖先帝聖謨已成垂裕冲𦕈也仍出示輔臣時王旦宿齋中書即遣中使諭焉丙寅免濮州和市茜草仍詔三司諸州市上供物非土地所宜者罷之己巳命祕書丞直史館劉鍇攝將作監與内侍張承素領徒封圜臺石䃭太常博士直集賢院宋臯與内侍郝昭信封社首石䃭並先規度鍇臯請對便殿以䃭式進御上起更袍而視之鍇蟠子承素崇貴子也郝昭信未見辛未濮州舉人郭垂等四百六十二人以車駕東廵獻菽粟二千石草四萬圍上曰意雖可嘉然納之則諸州盡以為貢益成煩擾耳令優給其直仍諭京東諸州民無復然乙亥詔美人劉氏父故虎㨗都指揮使嘉州刺史通贈潁州防禦使母龎氏追封京兆郡君才人楊氏父故崇儀使知儼贈單州團練使母張氏追封清河縣君正史章惠楊皇后傳祖瑫父知儼皆不仕此云崇儀使當考丁丑三佛齊國王遣使来進貢乙酉王欽若言修圜臺燎臺除道累石功畢自興役至是未嘗見螻蟻等物請致祭嶽祠從之是月㐮許荆南䕫歸峡等州米斛錢三百麥斗錢十二八月己丑朔王旦上太祖尊諡曰啟運立極英武聖文神徳元功大孝皇帝太宗曰至仁應道神功聖徳文武大明廣孝皇帝詔諸壇祭器並從上設下無令執事者踐履不恭有司言比来車駕行幸百司各稱隨駕按儀制令諸赴車駕所曰詣行在所蔡邕獨斷云天子以四海為家故謂所居為行在所自今凡有廵幸望云行在某司從之審官院言考較京朝官功過舊有日限今東封在近請權罷上以羣官有自逺而至者慮成淹滯令至九月乃停庚寅詔東封路軍馬無得下道蹂踐禾稼違者罪其將領王欽若等言泰山日生靈芝軍民競采以獻望量給錢帛從之上聞開封府界𤼵民治道辛夘詔亟罷之有司言九宫貴神在本壇則為大祠扵郊祭則位坐不全不應設玉景徳初少府監誤以玉九段置圜丘從祀之位今請撤去不用上以封祀壇從祀雖有太一攝提軒轅招揺咸池天一等位然頗疑神名或殊壬辰詔别築九宫壇扵行宫之東以封祀日祭享詔升山有大石難越者築土平之或委曲而過樹當道者用綵帛縈其支幹咸無傷動輝和伊嚕格勒又言趙徳明来侵率衆拒戰徳明屢敗乗勝追之越黄河癸巳詔封祀日文宣王四十六世孫同學究出身聖佑令衣緑次京官陪位初帝謂王旦等曰封祀日聖佑可使陪位否旦曰聖佑止賜出身未霑命服難列班序故特命焉有司言西漢祭天扵甘泉泰畤祭地扵汾隂后土後漢始定南北郊然則今之汾隂后土本漢祀地祇之所也將来既禪社首祀皇地祇則后土不當同日更祭又按唐開元十二年二十年祀皇土扵汾隂脽上十三年封禪不别祀后土欲望車駕出京自遣官就汾隂告祭封禪日更不致祭從之乃命給事中馮起祭告甲午知樞宻院事陳堯叟落起復詔京城寺院禁道俗袒裼踞肆僧尼謹潔修焚丙申以三司戸部判官殿中侍御史王好古監潤州商税工部員外郎直集賢院劉騭監漣水軍商税太常丞判三司催欠慿由司王曙監廬州鹽務著作郎直史館通判兖州李廸監海州商税先是好古等解送國子監秋賦舉人有初場十不者准法當停官㑹赦故薄責之自是諸州率以為例王好古劉騭未見内侍鄧文慶監泰山道塲扵制置使席上言詞輕率詔特勒停御輦院上新造輦凡減去七百餘斤詔自今常用之又言輿輦座褥未奉詔㫖前以金繡為飾者欲且仍舊俟故暗改造即以素羅代之己亥詔扈從羣臣諸班軍諸色人装錢比廵幸加等給賜庚子置河東縁邊安撫司令河北安撫副使都監一員掌其事以車駕廵幸京東西陕西淮南路諸州地當衝要者權増屯兵命諸司使已下為駐泊都監又以内殿崇班劉文質為齊州駐泊都監兼都廵檢以泰山北靣有路抵齊州故増警備也殿中侍御史趙湘言含芳園迎天書日街中布土為馳道欄以横木恐人踐履而羣臣徃来前驅者輙去其横木扵馳道上行馬又每逢輅馬不止傳呼分路而過皆非人臣之禮今若全依古制不絶馳道恐京師浩穣阻滯車馬欲請自今遇大禮布土馳道羣臣不得扵其上行馬導駕者不在此限及羣臣每逢閲習輅馬不得衝過許兩面行馬違者御史臺糾舉詔從之辛丑詔審刑院開封府自九月一日後勿奏大辟案止令中書擬定施行髙州言占臈商賈三人為交州所逐迷道至州境欲配𨽻本州上曰逺方之民窮而来歸可給時服緡錢遣人伴送至境放還本國甲辰詔福建山路險惡其輦官物軍士自今遇旬休節序特給假詳定儀注官晁逈而下習泰山圜臺封祀儀扵都亭驛乙巳令天下禁屠宰一月自十月始翰林侍講學士邢昺等上景徳朝陵地里記六十巻詔褒之丙午王欽若等言上山道路祀壇御幄咸已畢工上謂輔臣曰每有自泰山使至者朕必首詢役作勞苦皆言景色異常衆共樂成其事王旦等因稱頌聖徳上曰兹乃上天敷佑祖宗積累所致也朕何足以當之詳定儀注官再習儀扵都亭驛丁未詔陞兩省侍即在左右常侍之上合班次六尚書從中書門下之請也始兩省侍郎自唐至徳以来皆宰臣兼領未嘗與庶僚序位晉天福七年始用刑部侍郎竇貞固為中書侍郎遂班常侍之下由是相因不改今乃釐正之黔州言溪洞磨嵯洛浦蠻首領龔行滿等率族二千三百人歸順是族自唐以来未嘗嚮化也己酉王欽若来朝獻芝草八千一百三十九本庚戌王欽若言臣自至嶽下嘗夢神人以増築廟亭為請再夢如初仍指其方位以識之近因督役至威雄將軍祠瞻其神像廟地悉與夢合今請以羨財扵廟築亭從之刑部尚書知陕州冦凖表請從祀詔可辛亥詔文武官疾老年幼者並留京師癸丑河東轉運司言偵得契丹㸃集兵馬邊民頗懼望増屯兵上曰近北面亦言戎人聞國家東封調𤼵輦運慮因行討伐率衆堅壁以打圍為名廵邏境上且朝廷自與之修好固無釁隙若聞其疑擾即驟益防兵彼必愈致猜慮乃詔邊臣率如常制無得生事
