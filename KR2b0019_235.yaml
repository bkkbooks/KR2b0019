body:
  text: 續資治通鑑長編巻二百三十一宋李燾撰神宗熙寜五年三月辛巳朔權御史中丞鄧綰言昨彈奏馬仲甫朝廷令韓縝根治聞縝乃累責汲光分析况朝廷増置主簿本欲振舉頺弊光盡心職事若非理責令分析恐乘此不敢措置非朝廷設官之意仲甫性素寛光喜檢察吏人有所為輙申中書又宻以三班事告綰綰即彈奏仲甫從而罷去朝廷以綰章令縝案之不盡如章也去年十二月癸亥綰奏壬午權鄆州觀察推官許安世為著作佐郎集賢校理檢正中書吏房公事癸未編修中書條例曽布等言中外臣僚陳乞恩澤皆無法制臨時輕重不等今欲見任兩府嵗許陳乞差遣一人内宰臣樞宻使兼平章事非因事罷者陳乞轉官一人指射差遣二人餘執政官罷者轉官一人指射差遣一人若有勲勞即取㫖待制以上許陳乞差遣一人轉至學士者又一人三路廣桂安撫使及知成都府梓州差遣一人親子孫循一資廣南轉運提㸃刑獄許奏子孫或期親合入官一人成都梓州䕫路差遣一人子孫循一資從之本志同遣内藏庫副使王中正徃秦鳳路縁邉司勾當公事仍令中正同劉宗傑及安撫司官相度古渭寨可與不可建軍具奏甲申詔環慶經略司如夏國差人來議界至或修納斡堡礓石寨即檢㑹夏國主所上表章依見今漢蕃住坐耕牧處定界至以前嘗誤牒宥州稱無人拘占上􅟢田土恐夏人固執牒語故也日録王廣淵奏章威地雖見耕牧縁前報夏國不曽耕占此地恐必來争四月三日又二十一日當叅考上謂王安石曰楚建中言昨陕西用兵凡費緡錢七百餘萬有是否安石曰臣亦疑之然建中稽考沈起簿書數果如是錢糧紬絹共千二百萬貫匹一路半年有竒所費已如是之多何由供億因為上言西事稍弭邉計正當措置天下困敝惟兵為患若措置得兵即中國可以富彊餘皆不足議也上曰但當悉行府界保甲要亦未遽為用安石曰陛下能駕馭将帥使悉奉朝廷法令則因人利害敺百姓使習武事一二年間便見效不為遲今但要分别利害使趨令者盡得利不趨令者盡受害則人皆趨令矣上又恐義勇未能猝及募兵安石曰今東兵全不可用惟土兵可用陛下誠能駕馭督責将帥奉法令即義勇要如土兵亦不難要勝東軍即不足言也上曰見蔡挺言義勇已勝東軍但不及土兵爾安石曰要勝土兵亦何難陛下且督責諸路令教義勇至嵗終遣使巡按各具所試武藝帳奏即諸路誘勸勤怠精粗可見上曰有何難見安石曰天地雖大以有形數故可度况人事陛下以無方之術遇有形數之事物即何索而不知何欲而不成四月三日先是陕西都轉運使謝景温言乞令勾當公事官一員於延州置廨專管諸城寨夏秋糴納察訪糧草價癸巳上批勘㑹作置轉運司勾當官本為使副廵歴闕人㸃檢簿書今若分頭各在一處乃與舊無異况縁邉𦂳要城寨近已各置主簿足以掌糴買其轉運司勾當官可令依元降指揮止留本司命太常少卿同糾察在京刑獄祝諮直院劾李定陳大順等所言張詵事始定實與沈邁同聞大順言對樞宻院輙諱匿之張琥既坐責章惇雅善琥欲明琥非妄奏乃教定引邁為證且謂邁必不敢諱匿邁與定俱赴御史獄皆以誤聴為辭謂大順初無此言及案上定當坐罪報不以實王安石不悦指其案不圓處乞别推吳充曰獄官姑欲從寛耳安石曰今務得實安可從寛上曰本疑造此者欲傾害張詵今既無此姑已可也安石曰若奏報果不以實豈容但已乃下其案法寺法寺亦䟽其不圓命沈衡并鞫之衡辭以親嫌故改命諮二月癸丑琥責四月丙寅罰銅樞宻院言蔡州續置忠節第四十二指揮欲於潁州置營上批止令就潁州寄招仍自今遵守已奏定天下軍兵額無輙改異吳充言王韶事謂郭逵與之異立遭徙逐上曰逵何嘗因此徙逐今但未究見逵沮壊事實若見事實要當行法王安石言韶罪有無自是一事如逵欺誕侮慢事已非一每奏輙張皇摩正又却令承受奏摩正易制若此類非一方朝廷無事時為将帥彼摩正又何足道每輙引以恐懼朝廷若多虞有如朱泚史思明軰望其恭順承朝廷命令必難自古興王容将帥貪贓或有之若容其欺誕侮慢即将帥不復可駕御将帥不復可駕御則何由濟事甲午廣安西路經略司言南平王李日尊卒子乾徳嗣詔轉運使康衛為弔贈使丙申黄巖縣主簿曽肇為崇文院校書兼國子監直講肇布弟也試學官入等上稱其文故有是命詔賜塞北京第五埽決口導河入二股都大提舉官宋昌言王令圖程昉等錢銀有差九月四日張茂則昌言令圖昉遷官郭逵奏王韶初乞經略司磨勘市易錢今又乞别差官磨勘盖有欺弊見本司㸃檢乞止令本司磨勘上曰韶力争如此或未必有姦王安石曰有姦無姦非朝廷所能知但差官磨勘自見情實吳充曰待之無適莫則情實自見上曰人雖欲庇韶其形迹亦可見縁錢物事當有歸著安石曰此事固無可庇之理逵與秦州官吏非不能自達於朝廷者兼無人於此事有適莫者上再三疑怪韶有此安石曰以理料之則韶為衆人所窺伺不宜有此然人事固不可意料者但根究即見情實文彦博曰恐韶倚頼朝廷假借所以如此安石曰韶頃無罪尚降一官朝廷未嘗假借韶至餘事但有一毫所言未嘗不詰問是非何嘗假借充曰若無欺弊因何自乞磨勘又奏乞罷磨勘安石曰此事未可便疑其有姦自乞磨勘者似是無欺弊後為經略司捃摭盡追補勾當人恐揺動人情所以乞别差官根究亦未曽乞不磨勘也充曰諺云停囚長智合早施行安石曰已便令分析入急逓聞奏固不容其停留上曰此事有無根究自見雖遲亦無害二月壬戌甲子可考又論夏國事勢樞宻院但以為邉面濶彼能聚兵我不能所以無如之何安石曰勝負不在此今以陛下聰明齊聖當一稚子是一勝也朝廷所用人不擇親踈逺近惟材是擇然至謀國事議邉計總領一方尚患之人今彼所用以謀國者非梁氏叔伯即兄弟豈能皆勝其任之人是二勝也彼雖傾國以十萬衆犯邉而老幼疲憊不能者皆在其間我若有一二萬精卒則足以勝彼但我将帥今亦非其人率茍且兵雖衆而不訓練朝廷舉動徃徃不合事機此所以不能勝彼非彼無可勝之理也丁酉都官員外郎劉孝孫為侍御史光禄寺丞權檢正中書禮房公事張商英為太子中允權監察御史裏行孝孫陽安人也詔司農寺開封府界免役剩錢令諸縣依常平法給散収息添賜吏人食錢諸路候行役法倣此仍詳具條約以聞成都府利州路轉運提㸃刑獄鈐轄司言頃因沐川兩寨乞用舊例差押録二名充把截将以三年為滿共止支錢四十緡酬奨可省衙前酒場兼移税户等錢添助免役從之富弼屢請老戊戌復授司空同平章事武寕節度使致仕進封韓國公林希野史載弼本末有與史不同處今悉附注此更參考之希云嘉祐八年四月仁宗崩英宗即位六月富弼免喪除樞宻使同中書門下平章事時英宗不豫慈夀同聴政明年上疾愈太后還政官官于兩宫頗離間有異言其事祕世莫知也弼屢為上開陳大義語甚切至勸上尊事太后上深感悟又一日與同列奏事語及兩宫指殿下羣臣慷慨謂上曰千官百辟事陛下者以陛下上繼先帝謹事太后故也上為之變色任守忠以離間得罪弼即勸上急誅之以謝太后廢居蘄州其後兩宫復懽弼之力居多治平二年八月出判河陽四年正月英宗崩今上即位上在藩邸為慈夀所愛聞弼禆補兩宫事心甚賢之王陶滕甫用事日勸上罷琦而用弼上遣人視弼弼懼復用乃䇿杖見使者言已病廢不任朝謁又累章乞觧使相以僕射仍判河南是年秋上召入見弼聞琦罷政判相州張方平參政韓絳副樞即引舟復還乞復守河陽明年二月召弼辭以足疾不能朝上召曰渇見儀形想聞嘉論許以肩舁入謁弼留家于洛與其子紹隆入朝上御便殿命弼以䋲牀舁至内東門紹隆掖而入命毋拜弼再拜而已賜坐甚乆上嘉歎恨見之晚也面賜紹隆緋魚退而求補外章是日上以僕射判汝州既至洛紹隆死求假養疾又求致仕上遣使慰諭之乃赴汝自𤦺罷公亮當遷上相嵗餘不除上聲言復相𤦺𤦺自雍還鄴已逾年上意在弼初蔡州尼于者自以能役使鬼神知人禍福衣冠家多納女為弟子徒黨數百逺近瞻拜晝夜不絶于道有司疑其為姦収治于獄弼在洛居喪嘗遣人徃問于于言弼前世姓名乃施工髙順并言弼隂事有騐弼以此神之及于敗得弼所與于書自稱弟子稱于為我佛菩薩又言得于藥而疾苦已除弼嘗使僧智縁治紹隆疾許以厚報無何紹隆死智縁慚不告而去乃於京師揚言紹隆疾亟時弼急視之行步如飛本無疾也上聞此二事疑其向詐疾避事耳遣使挟上醫徃汝必以旬日治弼疾平復如初明年召為集禧觀使二月除守司空侍中昭文大學士是月除王安石參政弼辭不可勝數聴罷司空侍中而已許肩舁至待漏易馬入朝不押獨班再拜免舞蹈弼辭讓至三月末始入中書初上意鋭於改作安石自金陵來所陳皆中上意即欲相之以弼三世舊相有盛名藉為表裏以取重天下弼之為相忠審謹宻事有可否必同列者皆以為然乃奏之進用士人審騐再三必合於法士議所附乃敢行至是陳於上者惟以持重不擾遵守法度為治初上欲相弼公亮隂使言者間上意吳充嘗曰陛下患𤦺用人立黨故欲用弼以其無私邪上曰吾聞弼公直無私故用之充曰不然弼用私又甚于𤦺其所厚善者韓維陳襄他日必先引此二人即臣言可騐上黙然公亮聞之果急勸弼擢用維襄於是充復進曰臣向言如何上意於是疑弼每奏事上多顧安石語及所禀奏無不從每至己午間猶未罷弼不任乆立白上退俟於殿廬中乃決為去計後多在告八月逐劉琦等弼即乞去位其請不可勝數所在不受奏又自入謁靣陳上使中人押入中書弼懐中出表付中使徑出自除相至罷入中書者首尾二十七日而已十二月二日上語王珪曰弼始許相我無何忽求去日遣使召之終不為朕留此意殊不可曉朕甚恨之卿於制詞道朕此意也是夜除弼使相判河南府改亳州進昭文大學士明年青苖之法方行使者四出弼尤不樂亳之諸縣由此不敢散錢管勾官趙濟過永城民遮濟請錢即馳入對靣陳弼廢格詔命上喜靣賜緋魚除本路提刑諌官張琥又䟽大臣不奉法罪不可赦行法宜自大臣始朝廷甚以為然乃詔𤼵運司差官悉勘亳之諸縣官吏獄既興弼自劾罪皆在臣必欲威震天下深罪臣可也弼落使相判汝州通判等皆衝替弼将赴汝奏曰年老昬昩既以不職待罪朝廷今復使為州必又廢格詔令凡新法文書聴臣勿復簽書但付通判等行遣己巳朝廷怒乃申弼前請復令飬疾於是彈奏者捃摭醜詆所不可聞上寛仁終不聴也明年弼乞致仕三月進司空仍復泰寕軍節度使同中書門下平章事致仕改封韓國公帯使相致仕自弼始此上恩也時年六十九希所云吳充間弼事當考弼二年二月拜相三月末始入中書十月罷維五月以龍直修玉牒六月判銓八月内翰九月開封襄八月自修注諫院改知雜九月判銓候知制誥有聞召試襄固辭中書言禮房修换官法自今祕書監換防禦使大卿監換團練使祕書少監太常光禄少卿換刺史衛尉以下少卿監換皇城使遥郡刺史前行郎中換荘宅使並帯遥郡刺史前行員外郎換洛苑使中行員外郎換西作坊使後行員外郎換供備庫使已上如正郎帯職即換閤門使仍帯遥郡刺史員外郎帯職即換遥郡刺史太常博士換内藏庫副使國子博士換左藏庫副使已上如帯職換閤門副使太常丞换荘宅副使祕書丞换六宅副使殿中丞著作郎換文思副使太子中允換禮賓副使贊善大夫太子中舍換供備庫副使祕書郎著作佐郎換内殿丞制大理寺丞換内殿崇班諸寺監丞節察判官並換東頭供奉官大理評事支使掌書記並換西頭供奉官太祝奉禮並换左侍禁正字祕校監簿兩使職官防團判官令録並换右侍禁初等職官知令録並換左班殿直初等職官知令録未及三考换右班殿直判司主簿尉成三考已上换三班奉職未及三考并試銜齋郎各换三班借職内如帶職各陞一資起居郎起居舍人左右司諫正言侍御史殿中侍御史監察御史已上各比類官序依帶職人例如籍人材或曾有過犯並臨時取㫖特與陞降官資其右職换文資並依此内奉職已下並換堂除主簿尉三班差使殿侍换郊社齋郎從之己亥詔勲臣之後雖有致仕官依無人食禄推恩先是明堂赦文曾任兩府及節度使之家明有勲徳而後嗣無人食禄者其子孫量材録用既而有司以致仕官為食禄故有是詔辛丑知京使内侍押班鄧徳誠為内侍右班副都知王安石自著徳誠事云舊制押班五年即遷副都知徳誠押班已七年又條入内内侍省有定員内侍省無定員中書既遷徳誠樞宻院進呈入内内侍省條曰此無條合遷又有四員之限安石曰限四月乃入内内侍省條内侍省初無定員也文彦博又言初無用年限轉都知條上曰與徳誠轉便可立為條安石謂乆例合如此不湏别立條上從之安石以為彦博在樞宻院進擬内臣官職多違條妄與及同中書進呈則必妄引條欲沮抑事非一端其情葢欲隂激怒近習使歸怨於中書然議者不以安石之言為然也樞宻院奏詳定編敕所言近降朝㫖三官親屬恩澤本服大功以上親與右侍禁奉禮即小功左班殿直初等職官緦麻右班殿直試祕書丞校書即異姓依此有服女之夫若子子謂所生本服大功以上女與右班殿直小功女奉職緦麻女借職其内該説不盡者比類推恩令衆官參詳舊條立法之意葢謂内外親屬難以徧舉故條所不該者聴以服屬親踈較量比類推恩文雖不備而意之所包者廣則遵行之際無所疑礙元條文意已備難别生文今若増若子及子謂所生六字既包舉未盡不免又存比類推恩之語不惟無益而又於理有害葢言若子者但比類之中一事耳而又言子謂所生則子有雖非所生而有服者如親姑姊妺夫之前妻之子雖非所生而親母不死於室或其夫之庶子皆三宫有服之親異姓有服之親雖許奏薦然既非所生之子即有礙子謂所生之文又如親姪女夫之前妻之子若庶子雖非所生而於母黨亦有有服者既非異姓有服之親又非周親女所生女之子若用前所増之文則是不可推恩也如依舊條比類則周親女有服之子豈不重於緦麻女之子大功女之孫豈不重於緦麻女之夫以此較之宜止云比類推恩可刪去若子及子謂所生字仍用舊文臣等竊謂凡湏比類者皆理有所難盡言有所難該至於親踈之殺所推恩則不然既㫁之以五服則縁五服而推恩者於人情葢宜有止若存比類之科展轉無已三宫舊推恩止及五服女之夫既比類及其子矣則又引朞女之孫當隆於緦麻女之子既及孫矣則凡稱孫者曽元同既及朞女之曽元孫則大功女之孫不應踈於朞女之元孫又反覆皆當比類此豈非展轉無已者歟所以昨定宗室推恩條其所及者宜更博逺亦無比類之文葢聖人制禮以義㫁恩而皇家后族宜有隆殺且推恩其子葢縁后族所自出若非其所生或夫之前妻子則其情已踈其有服者自從異姓有服條葢不相礙如欲詳説則宜云雖非所生而於太皇太后皇太后皇后有服紀者從異姓推恩則盡之矣所以自來宗室女所生子推恩與庶子不同若依編敕所定奪則后族隆於皇家恐非朝廷為法示萬世别嫌防㣲正名分之意先是上以宗室或減入官恩例令定后族推恩條勿令過宗室於是中書立三宫緦麻以上親女夫遇三宫生日及聖節等第與推恩該説不盡比類施行既而太皇太后大功女之子令與官宻院以為於中書條所不該得王安石謂吳充曰於條令比類緦麻女夫推恩何以為不該也及吳充再進呈復不與於是中書論奏申明而宻院乃更立法云緦麻以上女夫若子子謂所生安石曰若緦麻女子即可言子謂所生以其非所生即其恩不過於夫不可比類夫故也若小功以上女之子雖非所生若此緦麻女之夫即其恩有過而無不及如周親女之子雖非所生乃有與太皇太后有服紀者豈可不及緦麻女夫反得推恩耶文彦博吳充皆以為展轉推恩無已恐過於皇親安石曰皇親女至袒免猶與大夫官今兩宫止於緦麻即已降一等有重於緦麻女夫者乃當推恩則不至展轉無已上曰若子子謂所生止是比類中一事爾又曰夫雖服重孫雖服輕以緦麻女夫對周親女孫周親女孫未為輕於緦麻女夫也譬如考試舉人第一等下湏勝第四等上也初馮京與中書同奏議申明至是乃附宻院而争以為中書所論非是宻院固争必欲留夫若子子謂所生之文又存比類推恩指揮安石請送編敇所詳定至是詳定如安石所言而宻院論奏猶以為不然乞下兩制禮官經筵定議已而中書詳著周親至緦麻令比類服屬與宻院詳議皆以為可乃進呈至上前宻院又争言緦麻女所生子乃推恩緦麻男之子反無例推恩非是安石曰緦麻女所以推恩其子以其女故也女不可以與官故官其子此正與緦麻男女為對若夫得與官所生子反不得官即所生不輕於夫於輕重亦未為允也上曰宗室推恩至何服紀安石曰宗室至袒免女充曰袒免女之子即不推恩矣安石曰宗室至袒免女后族至緦麻女乃是降一等然宗室不拘人數夫並與官后族湏因聖節生日方推恩今若宗室袒免女之子並與官即人數無限不可施行而比后族聖節生日推恩事體不類矣上曰從來無節限但太后所欲與即與之今立法止為不可過宗室已是降一等其比類推恩又湏取太后㫖方與於事體止宜如此也上又曰縱比類推恩亦止如此充曰降一等若無等可降如何安石曰從來無等可降即不降條例非一也上曰太皇太后皇太后已有定數自與宗室不同不湏限服屬如何安石曰欲云别奉太皇太后特㫖即不用此條上疑特㫖安石曰如向者太后用此恩例與本殿使臣轉官即是特㫖言特㫖則所該者備矣從之舊本欲送重詳定上曰兩宫奏薦嵗有定數如何以服紀恐太皇太后心有不足王安石等曰請以後如有特㫖即不用此條今從朱本朱本雖據日録辭有抑揚然却可見此段曲折也八月十二日丁亥修成條貫同管勾福建路常平等事著作佐即曽黙為太子中允權𤼵遣本路轉運判官以行青苖助役法有功故特遷之有功特遷轉司馬光日記増入壬寅屯田員外即向宗旦為江南東路轉運判官王安石言宗旦奏請職事詳審有理可與監司乞先召見上曰若奏請有理便除與不湏召見也丙午詔曰天下商旅物貨至京多為兼并之家所困徃徃折閱失業至於行舗禆販亦為取利致多窮窘宜出内藏庫錢帛選官於京師置市易務具條約委三司本司詳定以聞先是有魏繼宗者自稱草澤上言京師百貨所居市無常價貴賤相傾或倍本數冨人大姓皆得乘伺緩急擅開闔斂散之權當其商旅並至而物來於非時則朋抑其價使極賤而後争出私蓄以収之及舟車不繼而京師物少民有所必取則徃徃閉塞蓄藏待其價昂貴而後售至取數倍之息以此外之商旅無所牟利而不願行於塗内之小民日愈朘削而不聊生其財既偏聚而不洩則國家之用亦嘗患其窘迫矣古人有言曰富能奪貧能與乃可以為天下則當此之時豈可無術以均之也况今𣙜貨務自近嵗以來錢貨實多餘積而典領之官但拘常制不務以變易平均為事宜假所積錢别置常平市易司擇通財之官以任其責仍求良賈為之輔使審知市物之貴賤賤則少増價取之令不至於害商貴則少損價出之令不至於害民出入不失其平因得取餘息以給公上則市物不至於騰踊而開闔斂散之權不移於富民商旅以通黎民以遂國用以足矣於是中書奏古者通有無權貴賤以平物價所以抑兼并也去古既逺上無法以制之而富商大室得以乘時射利出納斂散之權一切不歸公上今若不革其弊将深欲在京置市易務監官二提舉官一勾當公事官一許召在京諸行舖牙人充本務行人牙人内行人令供通已所有或借他人産業金銀充抵當五人以上充一保遇有客人物貨出賣不行願賣入官者許至務中投賣勾行牙人與客人平其價據行人所要物數先支官錢買之如願折博官物者亦聴以抵當物力多少許令均分賒請相度立一限或兩限送納價錢若半年納即出息一分一年納即出息二分已上並不得抑勒若非行人見要物而實可以収蓄變轉亦委官司折博収買随時估出賣不得過取利息其三司諸司庫務年計物若比在外科買省官私煩費即亦一就収買故降是詔四月七日檢繼宗文字國是論曰興利之中其罪亦有輕重青苗均輸助役世以是為安石大罪猶可恕也何者安石之始學在此而始謀出此也市易免役征利及於𤨏屑此皆小人之附安石者為之而安石亦以為王政将誰欺乎司農寺言開封府考城縣巡檢曹信言教習保甲武藝稍已精熟及信自習武藝欲乞宣喚諸班直軍員日與逐人比試從之戊申詔判永興軍曽公亮赴闕初慶卒已伏誅而餘黨散逸自陕以西皆警備人情騷然公亮至曰叛者誅矣胡為張皇如是一以鎮静待之聴㫁精審盗賊屏戢專務裁節冗費公使賜錢外不敢増入長安多豪右喜為飛語以動揺在位且邀姑息有聲言營卒怨公亮減削供給謀結外冦以上元夜起兵為亂至聞京師長安人大恐兵官隂為備請公亮毋出㳺公亮不為動是夜特率賔佐置酒逰觀夜艾而歸人情遂安飛語亦息既而馮宗道還自永興上具得其事謂王安石曰大臣肯奉法如公亮極不可得也於是公亮乞還許之羣牧使天章閣待制李肅之知永興軍上戒令綏撫一路肅之曰自是朝廷以常平助役擾州縣耳上不悦常平助役擾州縣據四月二十三日日録今附見於此更湏考詳贊善大夫户部判官吕嘉問提舉在京市易務仍賜内藏庫錢一百萬緡為市易本錢其餘合用交鈔及折博物令三司應副是月廢壁州省白石符陽二縣入巴州通江
