body:
  text: 續資治通鑑長編卷八宋李燾撰太祖乾德五年春正月庚寅朔御乾元殿受朝升節度使班在龍墀內金吾將軍上故事節度使不帶平章事者皆位在卿監下於是特改焉辛卯令開封大名府鄆澶滑孟濮齊淄滄棣濵德懷博衛鄭等州長吏並兼本州河堤使甲午供奉官王漢英決杖配𨽻蔡州牙前坐為新津監押日擅用官米也丁丑詔吏部流內銓乾德五年正月一日以前罷任選人並令赴闕與免守選注官戊戌分遣使者發畿縣及近郡丁夫數萬治河堤自是歲以為常皆用正月首事季春而畢辛丑賜西川諸州民今年夏租之半詔以時平年豐增上元張燈為五夜初吕餘慶至成都王全斌但典軍旅嘗謂所親曰我聞古將帥多不能保全功名即欲稱疾東歸庶免悔咎或曰今冦盜充斥非有詔旨不可輕去全斌乃止既而偽蜀臣民往往詣闕訟全斌及王仁贍崔彥進等破蜀時豪奪子女玉帛及擅發府庫隱沒貨財諸不法事使者每自蜀至上問之盡得其狀於是與諸將同時召還仁贍先入見上詰之仁贍歷詆諸將過失冀自解免上曰納李廷圭妓女開豐德庫取金貝此豈諸將所為耶仁贍惶恐不能對上以全斌等新有功不欲付之獄吏令中書門下追仁贍及全斌彥進與訟者質證凡所取受隱沒共為錢六十四萬四千八百餘貫而蜀宫珍寶及外府他藏不著籍者又不與焉并按以擅尅削兵士裝錢殺降致寇之由全斌仁贍彥進皆具伏壬子令御史臺集百官於朝堂議全斌等罪癸丑百官表言全斌仁贍彥進法當死上特赦之甲寅置崇義軍於隨州昭化軍於金州以忠武節度使王全斌為崇義留後武信節度使侍衛步軍都指揮使崔彥進為昭化留後樞密副使左衛大將軍王仁贍案宋史帝紀及宰相表皆作右衛大將軍罷為右衛大將軍丙辰詔全斌仁贍彥進三人元從軍將等曾受偽蜀士庶子女鞍馬金帛者並即時給還其主諸軍將士有所受者一切不問丁巳以內客省使曹彬為宣徽南院使領義成節度侍衛馬軍指揮使寧江節度劉光義改領鎮安龍捷左廂都指揮使張廷翰為侍衛馬軍都虞候領彰國節度虎捷左廂都指揮使李進卿為步軍都虞候領保順節度廷翰與進卿先為歸州路行營馬步軍都指揮使從光義平蜀且軍政不擾故賞之王仁贍之歷詆諸將獨曰清廉畏謹不負陛下任使者惟曹彬一人耳上固巳知彬善於其職於是賞彬特優彬入辭曰諸將俱獲罪臣獨受賞何以自安臣不敢奉詔上曰卿有功無過又不自矜伐茍負纎芥之纍仁贍豈為卿隱耶懲勸國之常典無可辭也進卿晉陽人上嘗幸講武池臨流觀習水戰因謂左右曰人皆言忘身為國然死者人所難言之易耳進卿前對曰如臣者令死即死耳遂躍入池中上急令水工數十人救之得免幾至委頓上能得諸將死力類此戊午詔以粟帛賜王繼濤及髙彥暉家繼濤初與通事舍人田欽祚有隙欽祚嘗誣奏繼濤以事上驛召繼濤將面詰之道病死上始聞其先登擊賊身被重創故與彥暉俱蒙死難之賞二月庚申朔幸造船務遂幸城西觀衛士騎射甲子參知政事薛居正吕餘慶並加吏部侍郎乙丑以西川轉運使給事中沈義倫為户部侍郎充樞密副使初義倫隨軍入成都獨居佛寺蔬食偽蜀羣臣有以珍異竒巧之物為獻者皆却之東歸篋中所有才圖書數卷而已上嘗從容問曹彬以官吏善否彬曰臣止監軍旅至於采察官吏非所職也固問之唯薦義倫可任上聞義倫清節過人因擢用之己巳詔巡檢監押捕得賊盜及犯鹽麴人並送本屬論如律毋得率意擅斷壬申權知貢舉盧多遜奏進士合格者十人復詔參知政事薛居正於中書覆試皆合格乃賜及第癸酉御史臺上言伏見大理寺斷徒罪人非官當贖銅之外將作監役者其將作監舊兼充內作使又有左校右校中校署比來工役並在此司今雖有其名無復役使或遇祠祭供水火則有本司供官欲望令大理寺依格式斷遣徒罪人役並送付作坊應役從之自後命官犯罪當配𨽻者多於外州編管或𨽻牙校其坐死特貸者多決杖黥面配逺州牢城經恩量移即免軍籍大凡命官犯罪多有特旨或勒停或令釐務贓私罪重即有配𨽻或處以散秩自逺移近者經恩三四或放任便所以警貪濫而肅流品也左監門衛大將軍權判三司趙玭性狂躁訐直多忤旨上每優容之又與宰相趙普不協因稱足疾求解職甲戌玭守本官罷判傳稱玭廉得普私市秦隴大木事潛以聞懼普知之因求解職按開寶四年上始聞普私販大木即議逐普豈得反令玭罷三司也明年雷德驤潛以奏普被責而玭獨無他此必未嘗論及普但以私怨忌普自求解職耳販木事凡後此五年傳誤并言之也是日殿前都指揮使義成節度使韓重贇罷軍職出為彰德節度使先是有譖重贇私取親兵為腹心者上怒欲誅之謀於趙普普曰陛下必不自將親兵須擇人付之若重贇以讒誅即人人懼罪誰敢為陛下將者上怒猶未解普開陳愈切上納其言止命重贇出鎮重贇聞普救己他日詣普稱謝普拒弗見甲申詔慶州直𨽻京師己丑幸教船池深州刺史陳達怒判官王皓收繫獄因自疑懼私蓄兵器欲走契丹皓家人上變詔御史臺鞫實法當死上特貸之三月庚寅朔達除名流海島王皓未見戊戌以前安國節度使張美為橫海節度使初縣官市木關中諸郡歲出緡錢數千萬以假民長吏十取一謂之率分錢歲至數百萬美在同州獨不取既而他郡民有詣闕訴長吏受率分錢者皆命追償美至滄州久之民有上書告美強取其女為妾又略民錢四千餘緡者上召告者諭之曰汝滄州昔張美未來時民間安否對曰不安既來則何如對曰既來無復兵冦上曰然則張美存汝滄州百姓之命其賜大矣雖取汝女汝安得怨今汝欲貶黜此人吾何愛焉但愛汝滄州百姓耳吾今誡敇美美宜不復敢汝女直錢幾何對曰直錢五百緡上即命官給其直遣之乃詔美母詰以美所為母叩頭謝罪曰妾在闕下不知也復賜其母錢萬緡令遺美使還所略民家謂之曰語汝兒汝乏錢欲錢當從我求無為取於民也美遂惶恐折節為廉謹未幾以政績聞鎮滄州凡十年故世謂之滄州張氏歐陽修歸田録載奪民女乃李漢超事按漢超在關南民為立碑頌德當不如是今從記聞甲辰詔翰林學士及常參官於賔幕州縣及京官內各舉任常參官者一人乙巳詔諸道節度使留後觀察使各舉部內才識優長德行尤異者二人防禦團練使刺史各一人丙午門下侍郎平章事趙普加左僕射充昭文館大學士樞密使檢校太保李崇矩加檢校太傅是日幸教船池又幸玊津園宴射庚戌建隆觀火置感義軍於耀州導江縣令源銑主簿郭徹坐贓汚抵極刑詔諸路轉運使以其事布告屬吏咸使知戒辛亥詔商州直𨽻京師丙辰鎮州言北漢石盆寨招收指揮使言章以其寨來降是月五星如連珠在降婁之次初竇儼與盧多遜楊徽之周顯德中同為諫官儼善推步星厯嘗謂徽之等曰丁卯歲五星聚奎自此天下太平二拾遺見之儼不與也國史韓熙載傳稱奎主文章又在魯分時太宗鎮兖海中國太平之符也按太宗建隆元年八月領泰寧節度二月七日除開封尹安得此時又鎮兖海傳誤矣門下省言凖制書進士九經判入初等職事官又制桂應洮等州書記選判成職事官充今流內銓以前進士開封李肅擬保順軍節度掌書記有違元制凖格下此據祖宗故事本志略有不同唐主命兩省侍郎諫議大夫給事中中書舍人集賢勤政殿學士分夕於光政殿宿直與之劇談或至夜分乃罷唐主事佛甚謹中書舍人張洎每見輒談佛法由是驟有寵初唐主於宫苑造寺僧尼常數百人先代嬪嬙悉度為尼朝退則僧服誦經拜跪盡瘁不厭僧或犯姦有司請論如律唐主曰刑之則縱其欲矣但令禮佛三百赦其罪有為塔像佛飾侈靡者唐主尤之僧曰陛下不讀華嚴經豈知佛富貴乎國人化之佛事逾熾當時大臣亦多蔬食持戒以奉佛中書舍人徐鉉獨否然絶好鬼神之説徐鉉初見天福十二年會稽人張洎初見顯德六年全椒人夏四月甲戌閲殿前承旨不逞者百二十六人分配鄆齊冀博德滄等州戊寅幸迎春苑給事中開封馬士元謁樞密副使沈義倫適有吏白事義倫與語忘顧士元士元遽辭出歸語家人曰我為臺省近臣不為執政所禮可以去矣己卯遂致仕有司言朝廷自削平川峽即頒刑統編敇於管內諸州具載建隆三年三月丁卯詔書及結狀條樣而州吏弛怠靡或遵守所決重罪祗作單狀至季末來上狀內但言為某事處斬或徒流訖皆不録罪欵及夫所用之條其犯者亦不分首從非惡逆以上而用斬刑此蓋兵興以來因冦盜之未靜率從權制以警無良今既謐寧豈可弗革望嚴敇川峽諸州遵奉公憲敢弗從者令有司紏舉從之丙戌詔比者強盜持杖雖不傷人者皆棄市自今雖有杵棒但不傷人者止計贓以論其罪戊子陵州刺史王竒責授左衛率府率坐掊克所部故也陵州有陵井偽蜀置監歲煉鹽八十萬斤廣政二十三年井口摧圯毒氣上如煙霧煉匠縋入者皆死後井益塞民艱食鹽通判右贊善大夫真定賈璉始建議開浚刺史王竒謂浚之犯井龍役夫不肯進璉親執鍤興役逾年而至泉脈是井本深五十四丈皆鑿石而入其半曰小罌口小罌上皆以柟柏旁疊初煉鹽日三百斤稍增日三千六百斤璉上其事即詔璉知州事璉後卒官州人畫像祠之據耆舊傳賈璉通判陵州實與刺史王竒同在三年二月而五年四月竒乃責官璉知陵州當是繼竒今取修井事附見竒責官後禁民賽神為競渡戲及作祭青天白衣會吏謹捕之五月庚寅詔興元府三泉縣直𨽻京師乙巳賜京城貧民袴𥜗鎮州言北漢鴻唐寨招收指揮使樊暉殺其監軍成昭以寨來降六月戊午朔日有食之丙子令諸州通判及鈐轄都監使臣毋得受所在州官賜外添給錢物辛巳幸建隆觀遂幸飛龍院知施州王仁郁斂於民以修貢甲申命仁郁還民錢仁郁未見丁亥知西南蕃南寧州蕃落使龍彥瑫等來貢方物詔以彥瑫為歸德將軍南寧州刺史蕃落使又以順化王武才為懷化將軍武才弟若啓為歸德司階武龍州部落王子若溢等八人並為司戈秋七月丙申鑄五溪都防禦使印賜溪州先是諸道銅鑄佛像悉輦赴京毁之丁酉詔勿復毁仍令所在崇奉但毋更鑄周世宗悉毁銅佛像鑄錢謂宰相曰佛教以為頭目髓腦有利於衆生尚無所惜寧復以銅像為愛乎鎮州銅大悲像甚有靈應擊毀之際以斧钁自胸鑱破之太祖聞其事後世宗北征病疽發胸間咸謂其報應太祖因重釋教此事見楊億談苑今不取甲辰詔諸州兩稅督納時縣令佐毋得兩處點檢入抄重有追擾乙巳蠲江陵等二十五州府乾德三年逋租己酉詔夏秋以來水旱為沴深慮民庶至於流離宜令諸州長吏告民無轉徙被災者蠲其賦八月有司言荆湖諸州輸稅請如內郡收頭子錢詔不許九月己丑渭州刺史范仁裕坐藏匿罪人責為耀州團練使仁裕未見虞部郎中趙元振國子監丞髙延緒考試齋郎誦書失實甲午元振責為倉部員外郎延緒國子監主簿元振延緒未見丙申西南蕃順化王子部才等遣使來貢方物庚子夏州言節度使守太尉兼中書令西平王李彛興卒贈太師追封夏王以其子行軍司馬光睿權知州事乙巳太子少傅致仕柴守禮卒命中使護其喪事己酉畋近郊先是平蜀得錦工數百人冬十月丙辰朔置綾錦院以處之命常參官監焉癸酉度支判官侯陟言三司凡二十四案鹽鐡主其六戶部主其四餘皆度支主之自荆湖西蜀之平事務益衆欲令三司均主其八詔三司推官張純分判度支案事此據舊録丁丑以溪州團練使彭允足為濮州都指揮使義軍指揮使彭允賢為衛州都指揮使珍州録事參軍田思曉為博州都指揮使允足等溪洞酋豪據山險持兩端故因其入朝而置之內地十一月乙酉朔工部侍郎毋守素免坐居父昭裔喪納妾其兄子嶽州司法參軍正巳告之正巳仍奪一任官己丑畋近郊遂幸金鳳園賜從臣馬各一匹供奉官武仁誨前為嘉州監押枉殺人坐棄市戊戌日南至御乾元殿受朝癸卯以金水縣為懷安軍十二月丙辰詔諸州輕小惡錢及鐡鑞錢等限一月悉送官限滿不送者罪之有差敢私鑄者棄市時開封府言民間新小錢每十錢才重五錢半其極小薄者重二錢半侵紊法制莫甚於此故也又禁民不得輒以紕踈布帛鬻於市及塗粉入藥吏謹捕之重置其罪戊辰以權知夏州李光睿為定難節度使己巳置建寧軍於麟州庚午以防禦使楊重勳為留後宰相趙普丁母憂丙子起復賜西川三十七州府來年夏租之半是歲命川陜諸州長吏通判並兼橋道事朝廷嘗遣使治道襄州嵗常五六輩一使所調發民皆數百人吏緣為姦多私取民課所發不充數道益不修知州太子賔客邊光範計其工請以州卒代民官給器用役不淹久民用無擾詔書褒之
