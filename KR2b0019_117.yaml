body:
  text: 續資治通鑑長編卷一百十三宋李燾撰仁宗明道二年八月甲午朔契丹國母及國主遣天徳節度使耶律信寜大理卿和道亨河西節度使耶律嵩引進使馬世卿來弔慰興聖宫使耶律守寧知制誥李奎來祭奠丙申以太常丞劉沆直集賢院沆前同判舒州章獻太后遣内侍張懐信修山谷寺建資聖浮屠懐信挾詔命督役嚴急州將至移疾不敢出沆奏罷懐信歸沆永新人也沆與孫抃同時直集賢院今但記沆贈工部貟外郎曹修古為右諫議大夫修古鯁直有風節當章獻時權倖用事人人顧望畏忌而修古遇事輙言無所回挽初貶同判杭州未行改知興化軍卒於官貧不能歸𦵏賔佐􅉠錢五十萬季女泣白其母曰奈何以是累吾先人也卒拒不納帝思修古忠故優贈之仍賜其家錢二十萬修古無子録其婿劉勲為試將作監主簿始章獻不豫赦常所不原者而有司屢以惠姦為言戊戌詔殺人者雖㑹庚寅赦並刺配千里外牢城己亥詔契丹國所獻禮幣甚厚其於常所遺物外増黄金三百兩御史中丞范諷請轉漕河陽河隂倉粟以賑京東饑民從之懐安軍判官熊文雅言母老願以三任告身授母一邑封詔特與之仍令流内銓注文雅家便試銜知縣庚子殿中侍御史叚少連言頃嵗上御藥楊懐徳至漣水軍稱詔市民田三十頃給僧寺按舊例僧寺不得市民田請下本軍還所市田收其直入官從之壬寅名章獻眀肅太后章懿太后新廟曰奉慈從翰林學士馮元侍讀學士宋綬等議也癸夘詔凡除轉運使及藩鎮邉郡守臣自今並許上殿奏事此時未復提刑詔乃有之恐後人所増今削去提刑字免登萊二州今秋田租國子監説書賈昌朝言禮母之諱不出於宫今章獻明肅太后易月制除猶諱父名非所以尊宗廟也甲辰詔勿復避丁未命度支判官刑部郎中劉賽西染院副使兼閤門通事舍人符惟忠度支判官司封貟外郎李昭述東染院副使張茂實使契丹謝國母及國主來弔慰祭奠賽益子茂實景宗養子也戊子殿中侍御史張奎言京師鬭訟尤繁請置内外左右廂受事判官各一貟乃詔近臣舉官而士人多耻為之尋復罷壬子宰臣張士遜等言比諸道旱蝗請用漢故事冊免䝉賜詔不許今陛下既減損尊名願各降官一等以塞天異上慰勉之丁巳置端明殿學士班翰林資政學士之下以翰林侍讀學士兼龍圖學士宋綬為之太平興國五年初改端眀殿學士班樞宻副使之下自程羽李昉後不復除授承眀既災更命新殿曰端眀於是復置學士與文明之職並見而班益降矣然訖無拜文明殿學士者綬固辭端眀不聽請解龍圗閣許之綬因上言帝王御天下在總攬威柄而一紀以來令出簾箔自陛下躬親萬㡬内外延首渴見聖政冝懲違革弊以新百姓之耳目而賞罰號令未能有過於垂簾之日豈非三事大臣不能推心悉力以輔𨗳陛下之意邪頃太后朝多吝除拜而邪幸或徑取升擢議者以謂恩出太后而已今恩賞雖行又謂自大臣出非大臣朋黨罔上何以致此且朋黨之為朝廷患古今同之或窺測帝㫖宻令陳奏或附㑹已意以進退人大官市恩以招權小人趨利以售進此風寖長有蠧邦政太宗嘗曰國家無外憂必有内患外憂不過邉事皆可預防惟姦邪共濟若為内患可深懼也真宗亦云唐朝朋黨尤甚以至王室卑弱願陛下思祖宗訓戒念王業艱難整齊紀綱正在今日戊午命兵部貟外郎知制誥丁度右騏驥使王繼凝為契丹國母生辰使度支副使兵部貟外郎李紘禮賔副使李繼一為國主生辰使度支判官刑部郎中章頻禮賔副使李遵懿為國母正旦使開封府推官金部貟外郎王仲睦供奉官閤門祗候郭崇為國主正旦使琮留不行以供備庫副使張瑋代之三司言自藉田後繼有賞賚用度不足請假於内蔵庫庚申出緡錢百萬賜之因謂宰相張士遜曰國家禁錢本無内外蓋以助經費耳士遜對曰不然則有司未免浸漁百姓也辛酉命翰林學士章得象知制誥鄭向編定一司一務敇上方欲用太常博士劉越為右司諫而越已卒九月癸亥朔遂以右司諌贈越録其子丹為試將作監主簿賜其家錢十萬甲子詔閤門使班宣政使之上又詔諸司使至三班使臣並五年一磨勘帶閤門祗候者四年諸司使副仍以五資為一轉乙丑被災州縣罷給來年蠶鹽丙寅崇信節度使同平章事判河南府錢惟演落平章事赴本鎮初惟演欲為自安計首建二后並配議既與劉美親又為其子曖娶郭皇后妹至是又欲與章懿太后族為婚御史中丞范諷劾奏惟演不當擅議宗廟又言惟演在章獻時權寵太盛與后家連姻請行降絀上諭輔臣曰先后未𦵏朕不忍遽責惟演諷即袖告身入對曰陛下不聽臣言臣今奉使山陵而惟演守河南臣早暮憂刺客願納此不敢復為御史中丞矣上不得已可之諷乃趨出丁夘復奪曖一官落集賢校理聽随惟演行諸子皆補外州監當戊辰詔節度使至閤門使縁邉州軍鈐轄諸司使各舉殿直以上有材勇曽厯邊任者一人甲戌幸洪福院易衰服奠章懿太后梓宫丙子又奠焉丁丑詔國忌日罷佛像前設神御己夘加贈齊王元佐為潞王陳王元份為潤王安王元傑為邢王宻王元偓為蘓王曹王元偁為華王魏王徳昭為吳王岐王徳芳為潭王先是諸王子孫各請贈其父為皇太子詔翰林學士馮元端眀殿學士宋綬詳定而元等言周王元佑陛下長兄冝追册為皇太子太祖二王太宗五王追䘏之典禮難均及故元佐等止徙封加鎮及兼官而已詔考詳元祐册禮以聞庚辰加贈頴川郡王徳彛兼中書令申國公徳恭為髙宻郡王諡慈惠臨沂郡公徳隆為廣平郡王諡恭肅咸寜郡公徳雍為廣陵郡王辛已加贈安定郡王惟吉為冀王樂安郡公惟正為同安郡王壬午章獻眀肅皇太后靈駕發引上顧輔臣曰朕欲親行執紼之禮以申孝心乃引紼行哭出皇儀門禮官固請而止遣奠正陽門外遂詣洪福院服素紗幞頭淡黄衫從官常服黒帶奉引章懿太后梓宫遣奠廷中皆改衰服奉辭隨梓宫攀號不已左右固請止上泣曰劬勞之恩終身何所報乎步送至院西南隅仗轉乃還甲申再貶濠州防禦使馬季良為左屯衛将軍滁州安置御史中丞范諷言季良僥倖得官當行追奪故也開封府又劾奏季良冐立劵庇占冨民劉守謙免户役詔許季良自陳以地給還之乙酉翰林學士龍圖閣學士兼侍講給事中馮元落翰林學士知河陽六宅使昌州刺史内侍押班盧守懃落押班為永興軍鈐轄前上御藥張懐徳罰銅三十斤先是禮賔使李用和言發章懿太后故陵有泉水沮洳以元暨守懃甞同護𦵏事故責及之懐徳本擇𦵏地前坐張永信事已配廣南至是益徙逺處丁亥賜新楚州都監内殿崇班薛俊銀百兩仍詔自今内殿崇班至諸司使為都監者並如例賜之己丑詔被災州縣今年秋税官母得折變支移庚寅罷儀鸞司建繡帟幕辛夘詔梓州路仍嵗旱疫令轉運使親按所部民蠲其租冬十月甲午詔縁邉諸寨監押兩貟處以官髙者為寨主禁登州民采金乙未置應天府書院講授官一員知諫院孫祖徳言䕶國節度使兼侍中張耆建樓于私第下瞰社稷祠壇請毁撤之詔可丙申詔天下山林自天聖七年以來為豪民規占其利者悉還官與百姓共之丁酉祔𦵏章獻眀肅皇太后章懿皇太后于永定陵庚子詔天下閏年造五等版簿自今先録户産丁推及所更色役榜示之不實者聽民自言辛丑太常丞直集賢院同監左蔵庫韓琦言天禧中入内内侍省置合同慿由司凡𫝊宣取庫物令内臣自齎合同憑由送逐處已乃繳奏下三司出破帖今内臣皆先以白劄子傳宣而後降合同其間或稱禁中對換物色及支外以餘物還庫恐有妄偽請自今非降合同毋得支從之詔三司判官開封府判官羣牧判官審刑院詳議官自今告謝日並令閤門取㫖賜章服濬齊州清河甲辰詔曰先王不以浮靡示天下今兩川嵗貢綾錦羅綺透背花紗之屬皆女工蠧也其以三之二易為紬絹供軍需時上富於春秋左右或欲以巧自媚後苑珠玉之工頗盛於前日殿中侍御史龎籍言今螽螟為災民憂轉死北有耶律西有拓跋陛下安得不以儉約為師奢靡為戒重惜國費以徇民之急上深納其言命翰林學士承㫖盛度等詳定裁減天下嵗所度僧道人數初晏殊出知亳州言僧圓定者嘗奉詔西天取大集論還賜紫衣乃與其徒為刦盗里中且比嵗普度僧道皆㳺惰之人冝别為條約故委官裁减之乙巳左蔵庫使普州團練使入内副都知并代路鈐轄江徳明落副都知領果州防禦使為潞州鈐轄西京作坊使内侍押班朱允中落押班為六宅使天雄軍鈐轄初徳明等在章獻時頗用事至是言者以為猶不檢畏故落職而外遷之李仲容言曹州池庫畎澮舊迹具存而率多湮廢嵗積水為患請使知州通判及屬縣令佐並帶開治溝洫河道事詔從之己酉祔章獻明肅太后章懿太后主于奉慈廟辛亥上諭輔臣曰近嵗進士所試詩賦多浮華而學古者或不可以自進宜令有司兼以策論取之詔内外京朝官釐務者並三嵗一遷官從三司判官鄭戬之請也司封貟外郎秘閣校理吳遵路為開封府推官始章獻太后稱制下莫敢言得失遵路條奏十餘事語皆切直忤太后意出知崇州遵路至崇州即令轉市吳中米以備嵗儉已而果大乏食民頼賑濟自他流至者亦十全八九范仲淹安撫淮南薦遵路為郡得古人之風乞以遵路救災事迹頒諸州為法並付史館崇州即通州遵路淑子也佐京府不三月又遷鹽鐡判官此事附見癸丑徳音降東西京囚罪一等徒以下釋之縁山陵園陵應奏民户免租賦科役有差甲寅注輦國王尸囉茶印陀囉遣使蒲押陁離等以泥金表進真珠衫㡌及真珠一百五兩象牙百株陁離自言數朝貢而海風破船不達願將上等珠就龍床脚撒殿頂戴瞻禮以申嚮慕之心乃奉銀盤升殿跪撒珠於御榻下而退詔太常禮院集道官定聖祖天尊大帝北極紫㣲大帝醮位以上封者言陳彭年曩定醮儀升聖祖在紫㣲上多至天下旱也禮院言自今請各為醮位而同祠之庶無升降之嫌且不失尊奉之意從之丙辰追贈周悼獻王祐為皇太子祐本名元佑以犯聖祖諱乃止書曰祐有司言王舊無宫府其册命苐告於宗正寺屬籍堂而遣使焚黃於永安王所𦵏處從之贈章懿太后三代戊午奉安章獻明肅太后神御於慈孝寺彰徳殿章懿太后神御於景靈宫廣孝殿是日門下侍郎兼兵部尚書平章事張士遜罷為左僕射判河南府樞宻使山南東道節度使楊崇勲罷為河陽三城節度使同平章事判許州先是天下蝗旱仍見士遜居首相不能有所𤼵眀上頗復思吕夷簡及百官詣洪福院上章獻太后諡册退而奉慰士遜乃過崇勲園飲酒日中不至羣臣離立以俟御史中丞范諷劾奏之遂與崇勲俱罷然制辭猶以均勞佚為言也復思夷簡據記聞武勝節度使同平章事判陳州吕夷簡為門下侍郎兼吏部尚書平章事資政殿學士吏部侍郎知河南府王曙加檢校太傅充樞宻使簽書樞宻院事王徳用為樞宻副使端明殿學士兼翰林侍讀學士刑部侍郎宋綬為叅知政事龍圗閣學士給事中權三司使事蔡齊為樞宻副使己未張士遜為山南東道節度使同平章事判許州楊崇勲改判陳州初士遜與崇勲俱入告謝士遜乃位崇勲下上問其故士遜對曰臣官僕射而崇勲為使相上因以使相授士遜士遜已罷政事翰林學士承㫖盛度草制當言新除左僕射而誤用士遜舊銜有司奉行制書不復追改論者非之龍圗閣學士工部侍郎權知開封府程琳為御史中丞右諫議大夫權御史中丞范諷為龍圖閣直學士權三司使事琳辭中丞不拜乃授翰林侍讀學士兼龍圖閣直學士知開封府前知開封者苦其煩劇或不滿嵗輙罷不然被謗譏或以事去獨琳居數嵗乆而治益精明一嵗中獄常空者四五舊制學士以先後入序班時狄棐先諷為龍圖閣直學士而諷盛氣凌棐宰相李廸右諷特詔諷班棐上論者非之庚申詔自今每日御前殿視事其休務并假日並如舊制上即位之初尚循真宗晚年故事惟隻日御殿故也壬戌幸慈孝寺及景靈宫酌獻章獻明肅太后章懿太后神御殿自唐以來民計田輸賦外增取他物復折為賦所謂雜變之賦者也亦謂之㳂納而名品煩細其類不一官司嵗附帳籍並縁侵擾民以為患帝既躬耕藉田因詔三司㳂納物以類併合於是三司請悉除名名品併為一物夏秋嵗入苐分麤細二色百姓便之百姓便之此據本志實録但云從之程琳以明年五月為三司使言并税名是更参詳之十一月癸亥朔封秦悼王女承慶郡主為樂平公主興平郡主為大寜公主燕國大長公主女長樂郡主髙氏為仁夀公主始太宗嘗以秦王二女為皇女封雲陽貴鄉公主今封樂平大寜猶用故事而髙氏又異姓特封制下議者皆以為非尋亦罷之又追封真宗第二女為衛國長公主號清虚靈照大師賜名志冲公主初入道蚤天不及封故追命之禮部侍郎叅知政事薛奎罷為資政殿學士户部侍郎判都省始章獻崩二府大臣皆罷去奎獨留帝且倚以為相而奎得喘疾數辭位有詔免朝謁視事如故又數賜告還第乆之乃罷龍圖閣待制孔道輔為右諫議大夫權御史中丞代程琳也道輔時守南京召用之詔宗室諸司使月增俸錢萬副使而下遞増有差府州言簡州團練使折惟忠卒惟忠世将家知兵事天聖中契丹與夏人㑹兵境上聲言嫁娶惟忠覘得其實率麾下往備之嘗戒士卒毋輕動一夕風霾有騎走營中以為冦至惟忠堅卧不動徐命擒之得數誕馬蓋敵所縱也領府州事凡二十年既卒詔録其弟子姪孫七人長子右班殿直閤門祗候繼宣知府州乆之特贈惟忠耀州觀察使從繼宣請也贈觀察使乃寳元元年六月事今聨書之甲子以山陵園陵畢燕紫宸殿乙丑追册美人張氏為皇后上雅意所屬故也仍命内園使岑守素即故塋為陵闕而不立廟贈其父供備庫使守瑛為鄧州觀察使丙寅詔崇文院纂唐遺事翰林學士承㫖盛度請命官刋修唐書故也宻州嵗饑多盗己巳權増屬縣弓手各二十人辛巳詔梓遂資普四州嵗饑其免四等已下户今秋田税之半三等以上十之三果合渠三州四等以下户十之二㓂凖以謫死既十一年庚寅赦書始復太子太傅甲戌贈凖中書令復萊國公其壻屯田貟外郎張子臯復直史館仍令齎詔賜其家祭酹之又贈左騏驥使英州團練使周懐政為安國節度使以其弟太子右内率府副率宿州安置懐吉為禮賔副使子臯宗誨子已見乙亥詔三司減價糶廪粟以濟貧民丙子加贈荆王元儼母太儀王氏為徳妃丁丑改集聖殿為肅儀殿殿在禁中聖祖所臨降也初曰真㳺以奉道像後改集聖於是再葺之更今名戊寅大理評事劉渙為右正言初渙上䟽章獻太后請還政太后怒議黥面配白州屬太后疾革宰相吕夷簡為稽故不即行至是渙以前䟽自言夷簡請褒擢上既用渙顧謂夷簡曰向者樞宻院亟欲投竄賴卿以免夷簡謝曰渙踈外敢言大臣或及此則太后必疑風㫖自陛下使母子不相安矣上喜以夷簡為忠楊氏編年於天聖九年六月載奉禮郎劉渙上䟽太后請還政不知何據據渙傳上䟽時渙實為禮郎賴吕夷簡及薛奎解太后乃得免然亦不載是何年月但云太后聽政已十年疑楊氏據十年語因附天聖末按夷簡傳云屬太后疾革則渙上䟽時必非天聖末矣所稱六月兹不可知今止從夷簡新傳己夘徙判天雄軍王曽判河南府始陳堯咨與曽有隙曽實代堯咨於天雄政有不便者徐更之彌縫不見其迹及去堯咨復繼曽後見府署及什噐皆因堯咨舊規但完葺無所改嘆曰王公宜其為宰相我度量誠不及也詔京東河北募民入粟庚辰詔諸州都同廵檢如所部刼盗三火以上不獲者並降監當己丑以度支判官刑部郎中章頻兼侍御史知雜事頻時奉使契丹未還尋卒于紫濛館契丹遣内侍就館奠祭命接伴副使吴克荷䕶其喪以錦車駕橐駝載至中京歛以銀飾棺又具鼓吹羽葆吏士持甲兵衛送至白溝詔遣其子訪乗傳扈柩歸仍以知雜誥賜其家録子婺州司理參軍詢為大理寺丞訪為三班奉職訪即許也庚寅詔知開封河南應天府自今並兼畿内勸農使辛夘都官貟外郎判刑部李遜言刑部舊分四案大辟居其一月覆大辟不下二百數而詳覆官才一人諸令四案分覆大辟有能駮正死罪五人以上嵗滿與改京官又請令法直官與詳覆官分詳天下旬奏及二年亦與改官並從之詔判審官院三班院官親戚京朝官使臣差遣磨勘更不逐旋申奏便仰牒同判官一面依例施行訖以聞真宗承天節日自天聖以來不御殿及罷羣臣辭見著為式有司言非典故也請正之十二月癸巳朔始詔閤門以承天節日為常朝命參知政事宋綬看詳修纂國朝㑹要乙未樞宻使王曙言天下廂軍止給諸役而未嘗教以武技其中頗有材勇之人冝漸加訓習以升𨽻禁軍從之官詔樞宻院宗室諸司使以下改官其所増俸錢臨時聽㫖丙申上謂輔臣曰毎退朝凡天下之奏必親覽之吕夷簡曰若小事皆闗聽覽恐非所以輔養聖神上曰朕承先帝之託况以萬幾之重敢自泰乎又曰朕日膳不欲事珍美衣服多以縑繒為之至屢經澣濯而宫人或以為笑大官進膳有蟲在食噐中朕掩而不言恐罪及有司也夷簡曰陛下孝以奉先儉以臨下雖古盛徳何以加此上曰此偶然與卿等言之非欲聞于外嫌其近名爾始天聖六年罷諸路提㸃刑獄官八年復置又權停於是上謂輔臣曰諸路刑獄既罷提㸃官轉運司不能一一躬往讞問恐寖致寃濫冝選賢明亷幹不生事者委任之則民受其賜矣乃復置諸路提㸃刑獄官仍參用武臣此據政要樞宻直學士王鬷嘗建此議上采用之此據王鬷傳丁酉詔諸路轉運使副自今出廵湏歳一徧所部止得以兩吏自隨仍委諸州具所至月日以聞癸卯詔崇文院舊有火禁自今遇館閣宿直聽留甲辰以京東饑出内蔵庫絹二十萬下三司代本路上供之數乙巳詔修河南府周六廟鄭州周太祖世宗廟并祀恭帝丁未出侍御史張沔知信州殿中侍御史韓瀆知岳州先是宰相李廸除二人為臺官言者謂臺官必由中㫖乃祖宗法也既數月吕夷簡復入因議其事於上前上曰祖宗法不可壞也宰相自用臺官則宰相過失無敢言者矣廸等皆惶恐遂出沔瀆仍詔自今臺官有闕非中丞知雜保薦者毋得除授沔浦城人也此叚參取江氏雜志及張氏政要然政要謂除二人為司諫正言則誤也戊申出宫人二百上時屢出宫人吕夷簡曰此聖朝美事然民間物貴恐出宫或有失所者亦冝念之上因曰曩者太后臨朝臣僚戚屬多進女口入宫今已悉還其家矣此據寳訓景祐元年八月壬申詔又具載此語張士遜亦嘗納女口於宫中今附寳元二年四月己酉詔開封府界京東西河北河東陜西江南兩浙荆湖北路貧民流移而遺棄老㓜不能自存者所在官司收養之勿令失所甲寅改正陽門曰宣徳天安殿曰大慶端明殿曰延和去年十月始改承明曰端明今年八月端明始除學士又改名不知何故俱當考詔開封府及京東西淮南江東河北河東路明道二年以前流民去鄉里者限一年令歸業仍蠲賦役一年限滿不至者聽人請佃之右司諫范仲淹請天下諸縣弓手及七周年者聽歸農從之初郭皇后之立非上意寖見踈而后挾章獻勢頗驕後宫為章獻所禁遏希得進及章獻崩上稍自縱宫人尚氏楊氏驟有寵后性妬屢與忿争尚氏甞於上前出不遜語侵后后不勝忿起批其頰上亦起救之后誤批上頸上大怒有廢后意内侍副都知閻文應白上出爪痕示執政近臣與謀之吕夷簡以前罷相故忌后而范諷方與夷簡相結諷乗間言后立九年無子當廢夷簡賛其言上意未决外人籍籍頗有聞者右司諫范仲淹因對極陳其不可且曰冝早息此議不可使聞于外也居乆之乃定議廢后夷簡先敇有司無得受臺諫章䟽乙夘詔稱皇后以無子願入道特封浄妃玉京冲妙仙師名清悟别居長寜宫臺諫章䟽果不得入仲淹即與權御史中丞孔道輔率知諫院孫祖徳侍御史蔣堂郭勸楊偕馬絳殿中侍御史叚少連左正言宋郊右正言劉渙詣垂拱殿門伏奏願賜對以盡其言䕶殿門者闔扉不為通道輔撫銅環大呼尋有詔宰相召臺諫諭以皇后當廢状道輔等悉詣中書語夷簡曰人臣之於帝后猶子事父母也父母不和固宜諫止奈何順父出母乎衆譁然爭致其説夷簡不能荅拱立曰諸君更自見上力陳之道輔與仲淹等退将以明日留百官揖宰相廷爭而夷簡即奏臺諫伏閣請對非太平美事乃議逐道輔等始至待漏院詔道輔出知泰州仲淹知睦州祖徳等各罰銅二十斤故事罷中丞必有告辭至是直以敇除又遣使押道輔及仲淹亟出城仍詔諫官御史自今並湏宻具章䟽毋得相率請對駭動中外絳平隂人也偕奏乞與道輔仲淹俱貶勸及少連富弼再上䟽皆不報上初改元曰天聖議者謂天字於文為二人二聖人者執政以悦章獻太后也後改明道字於文為日月並猶與天聖義同時仍嵗旱蝗執政謂宜有變更以導迎和氣丁巳詔明年改元曰景祐歐陽修歸田録云明道犯契丹諱故遽改恐誤契丹主隆緒者明記子雖諱明然不應二年始改要是契丹初不問年號但趙元昊以明字犯其父名故輙稱顯道契丹事則未聞今止從詔語契丹國母遣彰信節度使蕭𫝊東上閣門使王秀英國主遣歸義節度使蕭麗將作少監張素羽來賀正旦戊申詔邊臣毋輙増置堡寨以邀功賞是嵗徙大名之朝城縣于社婆村廢鄆州之王橋渡淄州之臨河鎮避河患也先是天禧初募人入緡錢粟帛京師及淮南江浙荆湖州軍易鹽乾興元年入錢貨京師總為緡錢一百十四萬㑹通泰煮鹽嵗損所在積貯無幾因罷入粟帛第令入錢乆之積鹽復多於是參知政事王隨建言淮南鹽初甚善自通泰楚運至真州自真州運至江浙荆湖綱吏舟卒侵盗販鬻從而雜以砂土渉道愈逺雜惡殆不可食吏卒坐鞭笞配徙相繼而莫能止比嵗運河淺涸漕輓不行逺州村民頓乏鹽食而淮南所積一千五百萬石至無屋以貯則露積苫覆嵗以損耗又亭户輸鹽應得本錢或無以給故亭户貧困往往起為盗賊其害如此願得權聽通商三五年使商人入錢京師又置折博務於楊州使輸錢及粟帛計直予鹽一石約售錢二千則一千五百萬石可得緡錢三千萬以資國用一利也江湖逺近皆食白鹽二利也嵗罷漕運縻費風水覆溺舟人不䧟刑辟三利也昔時漕鹽舟可移以漕米四利也商人入錢可取以償亭户五利也贍國濟民無出於此時范仲淹安撫江淮亦以䟽通鹽利為言即詔翰林侍讀學士宋綬樞宻直學士張若谷知制詔丁度與三司使江淮制置使同議可否皆以為聽通商則恐私販肆行侵蠧縣官請敇制置司益造船運至諸路使皆有二三年之蓄復天禧元年制聽商人入錢粟京師及淮浙江南荆湖州軍易鹽在通泰楚海真揚漣水髙郵貿易者毋得出城餘州聼詣縣鎮毋至郷村其入錢京師増鹽予之并敇轉運司經畫本錢以償亭户詔皆施行此事據本志附見年末范仲淹以七月安撫江淮或可附見七月末更須考詳又恐與五月宰相王随上淮南運河圖相闗
