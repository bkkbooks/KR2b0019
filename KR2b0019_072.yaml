body:
  text: 續資治通鑑長編卷六十八宋李燾撰真宗大中祥符元年春正月乙丑上召宰臣王旦知樞密院事王欽若等對於崇政殿之西序上曰朕寢殿中帟幕皆青絁為之旦暮間非張燭莫能辨色去年十一月十七日夜將半朕方就寢忽一室明朗驚視之次俄見神人星冠絳袍告朕曰宜於正殿建黃籙道場一月當降天書大中祥符三篇勿泄天機朕悚然起對忽已不見遽命筆志之自十二月朔即蔬食齋戒於朝元殿建道場結綵壇九級又雕木為輿飾以金寶恭佇神貺雖越月未敢罷去適覩皇城司奏左承天門屋之南角有黃帛曵於鴟吻之上朕濳令中使往視之回奏云其帛長二丈許緘一物如書卷纒以青縷三周封處隱隱有字朕細思之蓋神人所謂天降之書也旦等曰陛下以至誠事天地仁孝奉祖宗恭己愛人夙夜求治以至殊鄰修睦獷俗請吏干戈偃戢年榖屢豐皆陛下兢兢業業日謹一日之所致也臣等嘗謂天道不逺必有昭報今者神告先期靈文果降實彰上穹佑德之應皆再拜稱萬嵗又言啓封之際宜屏左右上曰天若謫示闕政固宜與卿等祗畏改悔若誡告朕躬朕亦當側身自修豈宜隱之而使衆不知也上即步至承天門焚香望拜命內侍周懷政皇甫繼明封禪記不載周懷政今從實録升屋對捧以降王旦跪進上再拜受置書輿上復與旦等步導却繖蓋徹警蹕至道場授知樞密院陳堯叟啓封帛上有文曰趙受命興於宋付於恆案原夲作付於諱蓋恆即真宗諱也今仍改本字而附識以存其舊居其器守於正世七百九九定既去帛啓緘命堯叟讀之其書黃字三幅辭類尚書洪範老子道德經始言上能以至孝至道紹世次諭以清淨簡儉終述世祚延永之意讀訖藏於金匱旦等稱賀於殿之北廡是夕命旦宿齋中書晚詣道場旦趨往而上已先至懷政并州人繼明開封人也丙寅羣臣入賀於崇政殿賜宴上與輔臣皆𬞞食遣吏部尚書張齊賢等奏告天地宗廟社禝及京城祠廟丁卯設黃麾仗于殿前陳宫懸登歌文武官契丹使陪列酌獻三清天書禮畢上步導入內行避黃道司天監奏三日五日有瑞雲覆宫殿乞付史館從之戊辰大赦改元文武官並加恩改左承天門為左承天祥符門擢護門親從官徐榮按宋史徐作塗為十將賜衣服銀帶緡錢榮先覩天書故也詔東京賜酺五日以二月一日為始上以黎雅維茂四州頗有瘴毒令自今知州監軍釐務使臣並二年與替時審刑院大理寺多闕屬官纍命保任較試皆不中選庚午詔京朝官間習法令無贓濫者許詣閣門獻狀自陳當議較試任之河北安撫司言幽州民以久旱求市麥種詔許之辛未命有司制周嵩慶懿陵影殿帟幕以中使自陵所還言供帳損弊故也詔以諸路承受使臣令諸州牒報事宜謄録入奏頗為煩擾自今禁止之壬申邉臣言趙德明邀留輝和貢物又令張浦率騎數千侵擾輝和今嵗夏州飢饉此衰敗之勢也上曰朕知其旱歉已令榷場勿禁西蕃市粒食者蓋撫禦戎夷當務含容不然須至殺伐害及生靈矣王旦曰前代帝王如漢光武能屈已來逺人所謂柔服也上曰光武亦善保全功臣旦曰光武待遇功臣不假威柄封國不過四縣所以全終始也上曰髙祖分封過制七國罹患光武得以為戒旦曰鼂錯之謀忠而先見不能免禍議者以七國反狀素著而忽誅錯是杜忠臣之口也上曰此所以知為君難為臣不易向使錯忠而能密削之有漸豈至是耶每讀前史必究事之終始有未見本末者必記之他日異書中可以質正趙德明嘗以民飢上表乞糧數百萬上出其奏示輔臣衆皆怒曰德明方納欵而敢逾誓約妄有干請乞降詔責之王旦獨不言上曰卿意如何旦曰臣欲降詔與德明言爾土災饉朝廷撫御荒逺固當賑救然極塞芻粟屯戍者多不可輒易已敕三司在京積粟百萬令德明自遣衆來取上喜從之既而德明受詔望闕再拜曰朝廷有人臣不合如此此事不審何時然羣臣云德明方納表則亦可隱度因言夏州旱歉附見之甲戌以大雪停汴口蔡河夫役仍續其廪食時京城金銀價貴上以問權三司使丁謂謂言為西戎回鶻所市入蕃乙亥下詔約束之羣牧制置使言京城坊監馬病即送養馬務素無賞罰之格以故廢惰多死愈者百無三四自今請勒本坊監養療嵗終籍數以為殿最又請刻印醫馬諸方并牧法頒示坊監及諸軍從之是日楚王元佐生辰遣中使賜以寶帶使還具言王感恩狀王平居不接人事而事或預知上嘗命道士管歸真為設醮禳家人未及白而曰管歸真至矣上因言此非為邪所惑故耶又言王平居亦無他但不束髮不喜見婦人間閲書屬文召其子允升等置酒交談或心神不寧則舉措有異言語無節蓋本由驚悸所致也丙子詔定入內內侍省官自供奉官至小黃門俸料勾當八作司謝德權言京城外城女墻圯缺水道壅塞望發兵完築計工六十三萬五千六十二詔可上嘗謂輔臣稱德權臨事無所避嚮者八作匠每為一役多分其人故經嵗不成德權今併力為之剋日皆就舊患人多今則工役多暇矣戊寅除開封府畿赤縣戶所欠貸糧己卯詔以天書降申警在位俾各揚其職以答天意以西京作坊使延州金明縣都監兼新寨解家河盧關路都巡檢李繼周領誠州刺史供奉官綏銀等州新歸明諸族巡檢李繼福為內殿崇班先是鄜延路鈐轄言繼周忠順今已老願推恩奬慰之繼福亦同嚮化分主蕃部故并加秩焉癸未詔禮部貢院諸科舉人雖初舉而材藝可取者與進場第上謂王旦等曰今兹舉人頗以糊名考較為懼然有材藝者皆喜於盡公旦曰諸路發解拘限程制慮遺俊秀當稍寬之馮拯曰比來自試但以詩賦進退不考文論江浙士人專業詩賦以取科第望令於詩賦人內兼考策論上然之陕西轉運使黃觀言慶州麥粟踴貴詔出官米萬斛減價糶之太僕少卿直祕閣錢惟演獻祥符頌上嘉之甲申擢司封郎中知制誥交州黎至忠預加恩中書既進熟狀晡後畫付學士院草制而通進司新易主者不時送出夜漏欲盡上訝麻卷不入手札付院促之李宗諤奏以未見熟狀上遽推問乃知其故遲明宗諤即進草制上對輔臣大加稱奬仍命笞通進司主吏皆易之天書降之翌日宗諤上皇帝奉迎酌獻樂章優詔答之時學士朝逈知貢舉楊億被病參知政事趙安仁實草詔云詔軍頭引見司自今諸處都送罪人至司先上其數如近休假即日以聞丁亥詔昭桂等州今年租稅止輸本州以新罹兵寇故也尋又免昭桂二州秋租十之二己丑應致仕官並許赴都亭驛酺宴御樓日合預坐者亦聽朝官已辭未見皆令赴會有司上酺宴位圖皇從姪孫內殿崇班守節與皇從姪右衛將軍惟敘等同為一班上曰族子諸父安可並列乃命重行設位守節惟吉長子惟敘德芳長子也凡賜酺命內諸司使三人主其事於乾元樓前築土為露臺半門扉上設教坊樂又駢繫方車四十乘上起綵樓者二分載鈞容直開封府樂復為棚車二十四每車聨十二乘為之皆駕以牛被之錦繡縈以綵紖分載諸軍京畿伎樂又於中衢編木為欄處之從坊市邸肆對列御道百貨駢布競以綵幄鏤榜為飾上御乾元門召京邑父老分畨列坐樓下傳旨問其安否賜以衣服茶帛若五日則第一日近臣侍坐特召丞郎給諌上舉觴教坊樂作二大車自升平橋而北又有旱船四挾之以進棚車由東西街交騖並往復日再焉東距望春門西連閶闔門百戲競作歌吹騰沸宗室諸親近列牧伯洎舊臣家官為設綵棚於左右廊廡士庶觀者駕肩疊迹車騎填溢歡呼震動第二日宴宰相百官於都亭驛宗室於親王宫第三日宴宗室內職於都亭驛近臣於宰相第第四日宴百官於都亭驛宗室於外苑第五日復宴宗室內職于都亭驛近臣於外苑上多作詩賜令屬和及别為勸酒詩禁軍將校日會於殿前馬步軍之廨先是更置登聞鼓院及檢院禁民越訴有司以國家既受瑞行慶會上元車駕出逰訴事希恩甚衆有司以違制論悉從徒坐上憫愚民不曉科禁辛卯詔自今邀車駕越訴者令有司告諭而寬其罰是月襄鄧州粟斛錢三百菽麥斗十錢詔羣臣補蔭親屬已有官而再奏者至所合受官止二月壬辰朔上御乾元門觀酺詔諸營教閲諸司工作各賜假五日丁酉分遣中使六人往河東河北陕西路賜邉臣宴會內藏庫言舊制宣取物色皆降御寶憑由除破近因條約庫務亦令經由三司望再降詔旨止令尚書內省勾檢從之王皡百一編云計省故事凡禁中用度須索供億皆中覆所用給文憑支破王欽若判憑由司曰至尊用度豈臣下所預乃建白設御寶憑由司於是外不復有所關防真宗始創法專意明察羣下不敢欺末年不豫且久所費不訾迄今為弊牧司出納之令無由施矣冀公由此大用寵任無間皡所編已注至道三年十月王欽若判憑由時今復注此可參考也天禧三年正月三司置御寶憑由司或與皡所言相關當考戊戌上謂王欽若曰古今風俗悉從上之所好國家法令不可不謹欽若曰近者四方之人頗工習筆札蓋由太宗崇尚文教精于書翰所致也五代有朝體書絶無楷法今則盡學鍾王歐栁之迹矣上因言王著侍書能盡規益嘉歎久之己亥夔州路轉運使言五團蠻嘯聚謀劫髙州欲令暗利寨援之上以蠻夷自相攻若便出兵即至疑懼但詔謹邉備無得輕舉辛丑并北靣緣邉騎捷六指揮為四徙泊髙陽關先是緣界河常有無賴輩往來為盜因募置此軍至是兵籍差少又不欲長留邊陲故南徙焉壬寅三班借職王遜以父母繼沒請終喪制有司言內職居喪百日即追出就列上曰人子念其親而願終制不必奪也癸卯瀘州言江安縣蠻人殺傷戎州內屬户同巡檢殿直任賽領兵追捕為所害乙巳以天書降遣使告鳯翔府太平宫亳州太清宫舒州靈仙觀上語輔臣曰京師士庶邇來漸事奢侈衣服器玩多鎔金為飾雖纍加條約終未禁止工人錬金為箔其徒日繁計所費嵗不下十萬兩既壞不可復浸以成風良可戒也乃詔三司使丁謂申明舊制募告者賞之自今乘輿服御塗金繡金之類亦不須用戊申上御便殿觀捧日龍騎驍騎等軍習戰命王欽若等籍其拳勇出人者以次遷用己酉三司奏假內藏庫錢三十萬貫又請出銀五萬兩付左藏庫給用皆從之庚戌命皇城使劉承圭造南郊正神位版付有司藏虔潔之所以備親祠江淮運糧多和雇客船上謂宰相曰商旅趨利若此必阻貿易又恐都下粒食增價乙卯令有司勿復和雇殿前都虞候端州防禦使李繼和疾甚上謂宰相曰繼和朕之季舅茍有不諱朕欲親臨可乎王旦曰若以品秩言之固無此禮陛下敦敘外族於禮無嫌先朝杜氏諸舅亦有故事上然之己未詔河北河東陜西路轉運使遣官和市軍糧先是諸州積榖可給三嵗即止市糴慮損腐故也時連嵗大稔因令增蓄靡限常數以備轉餉供奉官閣門祇候劉文贊趨東華門衝宰相馬至崇政殿門宰相與親王對揖又橫絶而過為閣門所舉文贊坐責釐務僻逺庚申詔自今文武百官內廷出入道路相逢一準儀制命婦車輿與文武官相遇亦須回避翰林書藝楊昭度御書待詔盛量等言為當直入院稍遲監院中使趙履信便去巾幘欲行笞責沗受命服專具披雪詔送宣徽院劾履信不奏擅行之罪以聞舊制節序賜宴惟皇族近列諸帥內職三月甲子始詔自今上已重陽三司副使判官及館閣職事官並别置會其後知雜御史三院御史法官開封府判官亦預焉丙寅詔定護葬官所受贈物之數先是喪家所遺多務豐腆上憫其重費故裁約之丁卯宜州內屬蠻知元州舒君強知吉州向光普加恩仍知州事宋摶等使契丹還言契丹所居曰中京在幽州東北城壘卑小鮮居人夾道多蔽以墻垣宫中有武功殿國主居之文化殿國母居之又有東掖西掖門大率頗慕華儀然性無檢束每宴集有不拜不拱手者惟國母願固盟好而年齒漸衰國主奉佛其弟秦王隆慶好武吳王隆裕慕道見道士則喜又國相韓德讓專權既久老而多疾上曰自契丹約和以來武臣屢言敵本疲困懼於兵戰今國家嵗贈遺之是資敵也馮拯曰儒臣中亦有此言上曰武臣無事之際喜談策略及其赴敵罕能成功好勇無謀蓋其常耳儒臣豈不知利害耶前代多用儒將然亦難其才也戊辰命都官員外郎喬希顔為契丹國母生辰使供奉官閣門祇候景元副之趙德明遣萬資等四軍主領族兵攻西涼府既至見六谷蕃部強盛懼而趨輝和輝和設伏要路示弱不與鬬俟其過奮起擊之勦戮殆盡其生擒者輝和驅坐於野悉以所獲資糧示之曰爾輩狐鼠規求小利我則不然遂盡焚而殺之唯萬資軍主挺身遁走鎮戎軍以聞上曰輝和嘗殺繼遷世為仇敵甘州使到亦言德明侵軼之狀意頗輕之量其兵勢德明未易勝也辛未祕書監致仕李昌齡卒甲戌兖州父老吕良等千二百八十七人詣闕請封禪對于崇德殿上令引進使曹利用宣勞而諭之曰封禪大禮厯代罕行難徇所請良等進而言曰國家受命五十年已致太平今天降祥符昭顯盛德固宜告成岱嶽以報天地上曰此大事不可輕議良等又曰嵗時豐稔華夏安泰願上答靈貺早行盛禮詔賜緡帛遣之知州邵曄又率官屬抗表以請亦不允乙亥詔河北諸州軍租稅並令本處送納督三司放準赦逋負丁丑上謂輔臣曰朕常聞太祖隨周世宗征淮南戰于江亭有龍自水奮躍向太祖人皆驚異太祖見而惡之折所持矢不顧其謹如此馬知節曰太祖在周朝以忠勇竭節常務兢畏任殿前點檢與同列習射既中的有以金帶鞍勒馬為贈者太祖却之曰人臣宴集以此為禮能不避嫌乎遽攬轡不揖而去令川陕諸州勒醫博士按聖惠方合本土所須藥以給兵戍詔侍衛步軍司閲保寧軍士分為四等其苐一等徙營亳州永城縣自餘聽歸農無家可遣者𨽻諸軍為剩員先是釋諸軍老者為剩員馬步軍都虞候王超請以常經行陳者别置名額處之遂立此軍至是復搜去焉咸平三年二月超為馬步軍候景德二年正月罷去矣保寧軍額亦不見初立時三朝兵志即係之祥符元年當考戊寅增置東西班殿侍院一於彰化橋北此或可附橫行及東西班制己卯案宋史係丁卯日諸道貢舉人兖州進士孔謂等八百四十六人伏闕下請封禪庚辰朝逈等上合格進士諸科八百九十一人免解一百八十六人又學究二十二人得四通三史五人一通並凖格落下詔特奏名命給事中張秉等七人鎖宿于御書院覆考試卷遣中使監視考訖又送中書看詳審刑院言準端拱二年詔軍事判官節度推巡並依七品例犯罪減等正言監察皆臺省清資而品第八律不該減望自今同雜五品例從之辛巳詔河北緣邉州軍逃户歸復者依農田敕蠲放仍免三年徭役癸未詔自今文武官所書歷任無得虛録勞課隱漏過犯違者重置其罪乙酉徙麟府州戍兵及鈐轄於河東以邉部寧謐減轉餉之勞也仍令轉運使於河西預積芻糧以備緩急雄州言契丹於拒馬河北創亭舍以候朝廷使命內品監吉州造船場馮保奏先造成龍船十隻欲以備京師諸池習水戰準省司所降制度為魚龍之狀今欲將造成者毁拆依樣重造上曰金明池所習水戰船蓋每嵗春夏都人逰賞朕亦為觀之止欲頒賚諸司及習水戲兵士此船何須改作可速指揮省司押令赴闕勿使改造據會要三月事夏四月辛卯朔天書又降于大內之功德閣此據天禧元年正月壬戌詔追書本紀實録並不載也先是宰相王旦等率文武百官諸軍將校州縣官吏蕃夷僧道耆夀二萬四千三百七十人詣東上閣門凡五上表請封禪甲午詔以今年十月有事于泰山楊億草詔有不求神仙不為奢侈等語上曰朕不欲斥言前代帝王遂改云朕之是行昭答玄貺匪求仙以邀福期報本而潔誠圭幣牲牷並資豐備服御供帳悉從減省遂遣官告天地宗廟嶽瀆諸祠乙未以知樞密院事王欽若參知政事趙安仁並為封禪經度制置使初議封禪未決上以經費問權三司使丁謂謂曰大計固有餘矣議乃決即詔謂計度泰山路糧草引進使曹利用宣政使李神福相度行營道路翰林學士朝逈李宗諤楊億龍圗閣直學士杜鎬待制陳彭年與太常禮院詳定儀注王旦請依郊禋故事靣命五使上曰升中大禮五使之職當于中書樞密院以班次領之馮拯曰臣等叨居重位又忝使名慮未為允望仍舊貫上曰大臣為之蓋重祀事也丙申命王旦為大禮使王欽若為禮儀使宋朝要録云馮拯為儀仗使陳堯叟為鹵簿使趙安仁為橋道頓遞使其禮儀橋道頓遞使事令拯洎堯叟分掌之欽若安仁並判兖州仍更迭往乾封縣禁于泰山樵採者山下工役無得調發丁夫止用兖鄆州兵充行宫除前後殿餘悉張幄幕金帛芻糧委三司規度收市或轉輸供用他所須物悉自京輦致無得輒有科率發陕西上供木由黃河浮筏鄆州給置頓之費丁酉改賜閣門戒諭出使京朝官并幕職州縣官詞以真文降錫務令清淨為治戊戌命皇城使劉承圭龍圗閣待制戚綸崇儀副使謝德權計度封禪發運事綸上疏言臣遐覽載籍驗天人相與之際未有若今炳煥者也請詔侍從大臣摹寫祥符勒於嘉玉藏之太廟别以副本祕於中禁傳示萬葉世世子孫恭戴天命無敢怠荒然臣竊謂流俗之人古今一揆恐託國家之嘉瑞寖生幻惑之狂謀或詐憑神靈或偽形土木妄陳瑞命廣述休祥以神鬼之妖詞亂天書之真旨少君欒大之事往往有之伏望端守元符凝神正道參內景修行之要資五千致治之言建皇極以御蒸人寶太和而延聖算仰答天貺俯惠羣黎上嘉納焉以兵部員外郎知兖州邵曄為京東轉運使遣使巡護齊州泰山路禁止行人兖州别給公用錢月二十萬辛丑令東京諸州軍刑獄務從寬恕無得非法決罰壬寅以吏部員外郎判三司勾院盧琰權京東轉運使詔東封緣路禁採捕修建行宫無得侵占民田扈駕步騎輒蹂踐苗稼者御史糾之兖州民供應東封外免今年徭役及支移稅賦萊蕪冶户舊逋鐵課官司理納免其科罰上御崇政殿親試進士仍録題解摹印以示之初于殿廊設幔列坐席標人姓名又揭榜表其次字令視訖就坐命翰林學士李宗諤等八人為考官直史館張復等八人為覆考官侍御史周師望等二人糊名給事中張秉知制誥周起詳定等第上遍至幄次諭宗諤等務極精詳勿遺賢俊時南省下第舉人周叔良等百二十人訟知舉官朋附權要抑塞孤寒列上勢家子弟四十餘人文學淺近不合奏名上曰舉貢謗議前代不免朕今召所謂勢家子弟者别坐就試既而叔良所陳皆妄令配𨽻許州翌日又命宗諤等出諸科義題復令同判太常禮院兼判國子監孫奭詳審以進刻版摹本遣中使就坐給之宗諤上所定進士文卷詔宰相覆考訖乃臨軒賜進士姚曄等一百六人及第三人同出身十五人同三禮出身八十三人學究出身九經以下及第出身試銜助教者六百五十二人先是謝恩始令釋褐是日特賜緑袍鞾笏以曄等三人為將作監丞大理評事通判諸州第四第五人為兩使推官第六人已下凡五十人并九經關頭為試銜知縣餘為判司簿尉曄鄭州人也初宗諤等考諸科義卷通有差舛上召宗諤等靣責焉即令王旦及孫奭改正詔詰宗諤等皆奉表待罪詔特釋之增置兖州鈐轄各一員乙巳莊穆皇后喪始期上謂近臣曰宫中几筵于禮可撤乎王旦曰當遵孝明故事上曰孝明再期而撤旦曰若以虞練事神既葬祔廟則几筵之設非古也然孝明上仙已用家人禮葬莊穆母儀天下十年于兹酌于人情宜守故事王欽若曰几筵之設典禮所無况及期年撤之可矣上曰但情所不忍耳馬知節曰今士大夫未及周嵗已再娶矣尚肯設几筵乎馮拯曰此等自傷禮法何足為言陳堯叟曰中宫不可虛位若建長秋而莊穆几筵尚在于禮難安上曰萬安宫距正寢甚逺宫中行服朝夕供養自可從便設几筵固無妨也馮拯曰若此情理皆為稱矣欽若固請撤之上曰禮緣人情朕守祖宗故事若即除去豈禮意乎欽若曰雖祖宗故事如詔勑有未便事亦須更改此典禮所無政恐書之簡册反生異議上曰不過云用家人禮庸何傷乎卒再期乃撤丙午詔于皇城西北天波門外作昭應宫以奉天書命皇城使劉承圭入內副都知藍繼宗典其役繼宗南海人司封郎中知審刑院劉國忠言去年至今天下奏案定斷外止有十一道在寺國忠未見府州言民飢命賑之戊申曹濟州耆夀二千二百人詣闕請車駕臨幸皆召見慰勞之仍下詔諸州止續來者辛亥詔自京至兖州敢有妄指民舍林木言建營行宫開修道路及託官司須索配市假借人夫車乘乞取財物者所在護送赴闕京城宣化門外有軍人死焚其骨成佛像愚民競趨視施財詔開封府禁止之晉城縣令王琰竒章縣主簿苗文思皆坐枉法受賕抵死癸丑詔刑部以其事告諭天下甲寅增給保安軍公用錢是軍最極邉以趙德明納欵置榷場使人繼至而所費不充故也并代副部署石普言契丹雖與朝廷和好而私署唐龍鎮來懷正官信使不絶漸違誓約潛有侵軼望令邊寨設備上曰修好纍年北鄙寧靜不當自為猜慮普止聞流言不知國家大體爾中書試賢良方正能直言極諌草澤劉若沖周啓明才識兼茂明於體用大理寺丞吕夷簡草澤許申皆中等詔以申等雖敏贍可賞而理道未精不復召對若沖啓明申並許應舉仍免取解夷簡優與親民差使夷簡蒙亨子啓明處州人也時上封者言兩漢舉賢良多因兵荒災變所以詢訪闕政今國家受瑞建封不當復設此科于是悉罷吏部科目劉若沖許申未見丙辰詔太祖太宗朝諸路所獻祥禽異獸皆在苑囿可上其數俟封禪禮畢縱之令緣路諸州釀酒以備供頓省轉送之煩詔三班使臣奉祀事能幹集者俟異日與優便差使有司言巡狩有燔柴告至之禮皇帝親行事又封祀至泰山下柴告昊天上帝於圓壇如巡狩告至之禮有司攝事即不載攝事之儀車駕至泰山合行告至望令太尉以酒酺幣帛于山下壇告至奏可又言車駕所過山川及古先帝王名臣烈士皆州縣致祭所經十里內神祠橋道並合致祭今參詳其數頗多慮有司供祠不逮請名山大川先代帝王功德赫奕者遣官外餘委本州祭告從之遣使馳詣嶽州采三脊茅三十束備藉神縮酒之用有老人董皓識之授皓州助教賜束帛殿前侍衛司言扈駕諸軍望别給新錦半臂上曰征行擐甲乃給此服今封祀行禮不須盛飾戎容若盡令易之所費甚廣遂不許戊午詔東巡取鄆州臨􅈶路赴泰山禮畢幸兖州取中都路還京先是自京抵兖州有路二由曹單者為南路太宗朝嘗置頓于此由濮鄆者為北路時命王欽若曹利用由南路趙安仁李神福由北路同赴泰山計工用之繁簡且言南路雖近而用功多北路郵傳有素而功省故從北路焉龍圖閣待制戚綸言方修天下圗經其東封路望令先次修撰以備檢討從之盧琰上京東管內芻糧之數請收市轉送嶽下上曰以兵籍料之所乏不多琰此乃過為經度耳若果行之必擾于下第令增價收市餘悉罷之己未張崇貴言得趙德明書請許市青鹽詔以德明所納誓書付崇貴諭之蓋素不載青鹽事也吏部尚書張齊賢上疏言臣在先朝常憂靈夏兩鎮終為繼遷吞併當時言事者以臣所慮為太過略舉既往事以明本末當時臣下皆以繼遷只是懷戀父母舊地别無他心先帝與銀州亷察庶滿其意邇後不住攻劫直至降到麟府州界八部族蕃首又脅制却賀蘭山下族帳言事者猶謂封賞未厚洎陛下纘紹務欲綏懷不吝爵賞盡賜銀夏土壤寵以節旌自此姦威愈滋逆志尤暴屢斷靈州糧路復擾緣邉城池數年之間靈州終為吞噬彼之情狀昭然可知當麟州清逺軍垂欲陷沒臣方受經略之命臣思繼遷須是得一兩處頭角蕃族令與為敵此乃以蠻夷攻蠻夷中夏之上䇿也遂請以六谷名目封崇博囉齊俾其展效其時近位所見全與臣謀不同恩命之間多沮撓及梅詢受命終不令去所授所賜全違始謀然繼遷終因攻劫六谷為博囉齊射殺近知趙德明依前攻劫六谷兼聞曽破却西涼府所有節度使并副使結布伊朗布及在府户民並録在部下萬一不謬則德明之心又似不小况其人悉是唐末陷蕃華人兼結布伊朗布等諳熟西南靣入逺蕃道路六谷田牧之逺近川澤之險易盡知之矣若使脅制却六谷之後即慮瓜沙甘肅于闐諸處漸為控制緣此以四蕃中州郡舊屬靈州總統即今在夏州畫説者必以此為計所以繼遷在日方欲吞滅六谷今來德明又以父讎為名志在通甘伊瓜沙道路必要統制西夏唐朝嘉木布破滅之後便不相統一所以五代以來西蕃安靜今儀渭秦隴山後雖大段部族茍或漸被侵擾則他時邉患非輕將來聖駕東幸臣必慮德明乘便去攻六谷向使博囉齊尚在則德明未足為虞今博囉齊已亡斯多特恐非其敵伏望委兩府大臣謀議早為經制齊賢上疏不得其的日月附見德明請市鹽後更俟考詳先是監察御史張士遜為貢院監門官時貢舉初用糊名之法士遜曰主司有親戚在進士中明日當引試願出以避嫌主司不聽士遜乃自言引去上是之記名于御屏遂詔自今舉人與試官有親嫌者皆移試别頭是月江南轉運使闕中書進擬人數見卻上乃自除士遜為之士遜謁宰相王旦於政事堂自言止厯縣道未親郡事今驟領使職願聞善教旦從容曰朝廷榷利至矣士遜起謝既去旦語人曰此轉運識大體士遜後徙廣西河北每思旦言不敢妄有興建云景德四年十二月張士遜監貢院門非巡鋪也本傳誤今改作貢院監門官除轉運使實録在辛丑今移入此詔今後入內內侍省更互逐年差使臣巡黃河隄
