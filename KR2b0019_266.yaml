body:
  text: 續資治通鑑長編卷二百六十二宋李燾撰神宗熙寧八年夏四月癸亥王安石白上曰契丹無足憂者蕭禧來是何細事而陛下連開天章召執政又括配車牛驢騾廣糴河北芻糧擾擾之形見於江淮之間即河北京東可知契丹何緣不知臣却恐契丹有以窺我要求無已上曰今中國未有以當契丹須至如此安石曰惟其未有以當契丹故不宜如此凡卑而驕之能而示之不能者將以致敵也今未欲致敵豈宜卑而驕之示以不能且契丹四分五裂之國豈能大舉以為我害方未欲舉動故且當保和爾上曰契丹豈可易也以柴世宗之武所勝者乃以彼睡王時故也安石曰陛下非睡王契丹主非柴世宗則陛下何為憂之太過憂之太過則沮怯之形見於外是沮中國而生外敵之氣也安石又言蕭禧不當滿所欲滿其欲則歸而受賞是開契丹之臣以謀中國求賞非中國之利也又言外敵強則事之弱則兼之敵則交之宜交而事之則納侮納侮而不能堪則爭爭則啓難故曰示弱太甚召兵之道也然安石本謀實主棄地雖對語云爾竟弗克行卲伯溫見聞録云敵爭河東地界韓琦富弼文彥博等答詔皆主不與之論會王安石再入相獨言將欲取之必固與之以筆畫地圖命韓縝悉與之蓋東西棄地五百餘里韓縝承安石風旨視劉忱吕大忠誠有愧蘇氏龍川别志亦云安石謂咫尺地不足爭朝廷方置河北諸將後取之不難據此則棄地實安石之謀今日録四月二日對語乃謂許蕭禧不當滿其欲與蘇邵所記特異疑蔡卞等後來增加實非當日對語也今姑存之仍略著安石本謀庶後世有考云吕惠卿家傳載惠卿議亦與安石略同今附注在五日丙寅蕭禧入辭下合并考復以馬軍副都指揮使利州觀察使賈逵為昭信軍留後捧日左廂都指揮使潮州刺史孫吉為彭州團練使捧日左廂都指揮使達州刺史張忠為文州團練使逹等坐救三司火不以時降官至是復之甲子上批軍器監初造軍器樣制雖多未應所用朝廷間有須索多無見在可令計定河北三處合用名件所闕少數製造其毋用者毋得妄費財力又批劉忱等相視地界畫圖不審令具析以聞上初怒忱甚王安石言畫圖不分明此乃吕大忠罪忱無罪也王安石所對據日録乃初二日事御集云不審實録云不至審實今從御集兩朝誓書册內有韓縝等所受御札其一與劉忱相關今附注此當考御札云今日朝廷已有降去文字卿等示與蕭禧次可先讀與聖旨盡一事庶幾便肯收接今蕭禧既堅執定以分水嶺為界卿等若依下項畫一劈析得逐項事理分明即敵人自當無詞疆議遂決一李福蠻地及瓦窑塢見今已劈撥於北界處便為分水嶺更無可爭一鴈門寨即今移退義兒馬鋪及小三鋪處其山頭便是分水嶺已行劈割更無可爭一西徑地分第一第二第三第四第五逺探白草鋪山頭一帶便是分水嶺當初本朝為執定長連城為界則分水嶺係近裏地方今來既是白草逺探等鋪一帶分水嶺取直照望石長城劈割與北人即已是用分水嶺分畫了畢何處更有分水嶺竊慮卿等不見得此意度尚惑牛頭雪山照望為分水嶺多方回護却致敵人猜疑蓋據三次國信文字北人之意元不至此皆是劉忱等昏迷亂道四月二十三日按四月二十三日蕭禧無緣猶在京師此月日必誤或是四月二日或是四月三日也姑存之兩朝誓書册內又有付劉忱等兩札不知是何年月今姑附注此須更考詳其一云今月十三日申時據李舜舉備録到蕭素等來牒大抵指言不容他和同商量及稱再三令人來計會並不應答等事契勘今月十二日已有朝旨令卿等速與相見和會商量許以見今兩界鋪屋中間分盡為界卿等現在遵稟依凖商量無信僥幸忿躁輕淺小人妄作使氣擊觸敵人結成大釁國事體大不同小故萬一因兹引惹無謂朝廷不曽預有此戒約至時卿等一身恐不可當其責矣付劉忱等其二云李昭回等粗率武人不量國體一向持強使氣極為不便宜痛切戒約令每見素等及來人須存守禮容溫言謹恪以歡心接之則敵人雖欲凌我料須銷其半矣所有素等差來計會事使臣卿等亦宜厚與管待不要失體辱慢但命官優管設以酒食使其意樂則諸事易為也付劉忱等詔熙河路市易及茶場𨽻經略司鹽酒稅坑冶等𨽻秦鳯路都轉運司都轉運司闕錢聽於經略司輟市易淨利錢應副從知熙州高遵裕等請也上為王安石論理財安石曰但審計無為小人所撓令材士肯為陛下盡力則財極有可理上道曾孝寬語以為使兩人共事適足相擾不如專任一人安石曰若參用小人則誠擾君子若皆君子則共事者雖更多乃相濟成務又論河北事安石曰以為募兵不如民兵糴米不如興農事先是安石在江寧嘗言兵少乞募兵於是上舉以問安石曰今廂軍誠少禁兵亦不少然須早訓練民兵民兵成則當減募兵上曰禁軍無賴乃投募非農民比盡收無賴而厚飬之又重祿尊爵飬其渠帥乃所以弭亂安石曰臣在翰林固嘗論黥兵未可盡廢但要民兵相制專恃黥兵則唐末五代之禍可見且黥兵多則飬不給少則用不足此所以須民兵也上言宋守約不可得安石曰自守約死軍制已稍寬弛上曰只為賈逵寬弛安石曰為逵者逸樂為守約者憂危謂如守約宜褒勸如逵者宜督責安石又言蕃兵當什伍之設階級部分乃可用令一凶歲一路至費二十八萬賑貸而其丁壯老弱有馬無馬皆不敢閲實不知何用此蕃部或以為須豐熟乃可閲實臣以為賑貸時正好閲實吳充以為坐論則易行則難上曰此何難但邊帥不為耳是日四月三日太常博士祕閣校理陳睦兼監察御史大理寺丞蔡承禧改太子中允權監察御史裏行承禧臨川人也實録於四月二十三日書此按承禧奏議乞罷御史狀云熙寧八年四月三日入臺至十年四月三日二年合滿一任月日甚明實録誤也惟陳睦無可考證并移入四月三日削四月二十三日所書乙丑詔減將作監冗官十六員後復增置主簿一員入作司監修使臣二員丙寅遼國泛使蕭禧等辭於紫宸殿置酒垂拱殿答遼主書曰兩朝繼好六紀于兹事率故常誼存悠久比承使指諭及邊陲已約官司偕從辨正當守封圻之舊以需事實之分而信介未通師屯先集侵焚堠戌傷射巡兵舉示力爭殊非和議至欲當中獨坐位特改於臣工設次橫都席又難於賔主數從理屈才就晤言且地接三川勢非一槩輒舉西陘之偏説要該諸寨之提封屢索文慿既無據驗欲同案視又不凖從職用乖違滋成需滯竊慮有司之失指曽非與國之本謀兹枉軺車再垂函問重加聘幣彌見歡悰然論疆事之侵盡置公移之顯證述邊臣之議獨尤病告之愆期深認事端多非聞達重念合天地鬼神之聽共立誓言守祖宗疆土之傳各完生聚不嗇金繒之巨萬肯貪壤地之尺尋特欲辨論使無侵越而行人留館必于分水以要求樞府授辭期以興師而移拆豈其歷年之信約遂以細故而變渝已案輿圖遙為申畫仍令職守就改溝封遐冀英聰洞加照悉參知政事吕惠卿之辭也初蕭素梁頴既與劉忱吕大忠會議地界久不能決故遣禧復來命韓縝王師約館伴禧既致國書又出其國劄子一通以進其大指如素頴所言且以忱等遷延為言實録云朝廷既遣忱士元理辨疆界忱以病不即至又命大忠代士元按大忠集忱以六月七日往太原九月十三日與士元會頴素于大黃平十一月二日乃以大忠代士元彼書稱忱等遷延蓋境上事在九月相見後非未相見以前也忱不即至今削去縝等曰與禧論難禧但執以分水嶺為界然亦不别白何處為分水嶺也詔諭以兩朝和好年深今既欲委邉臣各加審視尚慮忱等所奏未得周悉已改差縝同張誠一乘驛詣境上和會商量令禧以此歸報禧不受命又遣內侍李憲齎詔示之許以長連城六蕃嶺為界而徙並邊逺探鋪舍於近裏長連城六蕃嶺治平二年契丹嘗於此置鋪矣邊人以其見侵毁之後不復來至是許其即舊址置鋪而禧猶不從執議如初上不得已議先遣沈括報聘沈括充回謝在三月二十一日癸丑於是樞密院言夲朝邊臣見用照證長連城六蕃嶺為界公牒六十道多是北界聲説關口把鋪等處捉賊或交蹤並在長連城六蕃嶺地內順義軍重熙二年重熙二年即明道二年三月十八日牒稱南界送到於山後長連城兩界分水嶺上收捉賊人張奉逺等不合過界凖法斷訖又順義軍清寧九年兩朝史稱清寧九年即治平四年誤也清寧九年乃嘉祐七年十月牒捉到截奪南界代州崞縣赤埿膠主户白友牛賊人事既指長連城分水嶺上為兩界并稱白友係代州崞縣主户顯見不以石長城并近裏分水嶺為界治平二年起移北界鋪舍即無侵越地界今聖旨只為兩朝通和歲久所以令於長連城六蕃嶺南依舊址修蓋已是曲敦和好今禧更指分水嶺為界緣所在山嶺水勢分流皆謂之分水嶺昨蕭素等所執照證文字三道除大石義興冶兩寨已為北界侵越不經治平年發遣見不以長連城為界外其西陘寨執張慶文字為據言分水嶺上有土壠據所指處即無土壠兼張慶文字指鴈門寨地至北界遮邊軍十一里今鴈門寨至長連城約八九里長連城至遮邊軍約二里又證得長連城為界兼忱等曾牒素等令指定是何山名為分水素等回牒但稱沿邉山名地里界至南界足可自知豈可移文會問顯見原無指定去處今禧所執與素等同全無照驗文字欲令沈括等到北朝日將見用照證文字一一聞達北朝詔國家與契丹通和年深終不欲以疆埸細故有傷歡好大體既許以治平年蓋鋪處依舊址修蓋務從和會即更有無照證若不指定分水處即恐檢視之時難為劈撥一李福蠻地許於見開壕塹處分水嶺為界一水峪內義兒馬鋪并三小鋪即挪移近南以見安新鋪山頭分水嶺為界一自西陘寨地分以第一第二第三第四第五逺探白草鋪山頭分水嶺向西接石長城為界一鴻和爾山地已經仁宗朝差官與北界官吏於聶再友等已侵耕地外標立四至訖及天池廟順義軍牒稱地理係屬寧化軍並無可商議一瓦窑塢地前來兩界官司商量未了今已指揮韓縝等一就檢視劈撥處以分水嶺為界上遣使者持示禧禧乃辭去括候禧去乃行故事使者留京不過十日禧至以三月庚子既入辭猶不行與縝等爭論或至夜分留京師幾一月實録云禧至以三月庚子戊辰踰期不肯行庚子三月八日也戊辰乃四月七日戊辰上當有是月字蓋禧以四月五日丙寅入辭越二日戊辰猶不肯行也不知竟用何日神宗正史契丹外傳云禧留京師幾一月乃行按三月八日禧入見四月七日猶不行恰二十九日此即傳所云幾一月也傳蓋因實録其行竟不知何日然則所云幾一月亦未實當考張方平墓志云蕭禧當辭偃蹇卧驛中不起張方平謂吳充曰禧不即行使主者日致饋而勿問且使邊吏以其故檄敵中可也充啓用其説禧即日行蓋墓銘飾説禧自為疆事如志故去耳張升之傳云蕭禧議地界理屈卧都亭驛不敢歸升之日致饔授館有常禮過期曲留宜即裁抑禧慙沮乃行禧得所欲而歸耳所稱理屈及慙沮蓋飾辭也范育為薛向行狀朝廷遣劉忱季舜舉使河東與敵人議地界而敵以重兵壓境向密奏請令忱託疾緩行以老其師上密用向計敵兵久戍食盡乃引去而大臣復有罪忱之緩行者向謀可謂深逺矣此事當考韓宗武記其父縝遺事云六年北人遣使蕭禧議地界事以公館伴公密伺知禧欲上殿奏事靣決可否急令近璫奏知神宗云但令來公又令奏朝廷自來與北人議事皆委自臣下事有差誤易以改易兼恐禧不肯便已煩瀆聖聽至時難以止約禧既上果如公議至驛神宗又令御藥李舜舉御前以朱筆畫一圖子以示禧依此分發舜舉初不與公議遽出圖未及詳説公急目舜舉遣左右密諭令懷之禧已索看公云李御藥所言乃與某商議事即已因自便門乞奏事靣陳疆界事山川形勢纎悉皆係利害不可輕許神宗云卿言大是朕思慮初不至此地界事久不決神宗令近璫劉惟簡齎御筆責公云疆界事朕訪問文彥博曾公亮皆以謂南北通好百年兩地生靈得以休息有所求請當且隨宜應副朝廷已許而卿猶固執不可萬一北人生事卿家族可保否公具畫北人無厭纍朝以來嘗患應接太遽致令得遂狡謀臣不敢以家族為慮上誤國事上察公忠藎復令惟簡溫言撫諭仍賜御服貂裘一初禧以不遂其請故為遷延過期不歸朝廷患之公密奏今夏衣在近乞自上旨令後苑依北人制度造夏衣賜之示不催迫之意上大喜既而頒衣禧遂告辭此事與他書不同附見當考吕惠卿集有回大遼國書二首七年三月所回書具達本因下六句與實録不同今並附見此回大遼國書二首辱迂使指來致函封歷陳二國之和有若一家之義固知鄰寶深叶信符獨論邊鄙之臣嘗越封陲之守欲令移徙以復舊常竊惟兩朝撫有萬字豈重尺土之利而輕纍世之歡況經界之間勢形可指方州之內圖籍具存當遣官司各加覆視儻事出夙昔固難徇從或誠有侵踰何吝改正而又每歲封吏令遵誓言其有創生之事端乃是疆場之細故已緣歸使具達本因自今已還凡此之類只委守臣之移檄免煩使節之交馳庶邦好之不渝亦民疑之交釋暄和方季保育是祈忽迂貴使來貺華緘載觀將意之勤深喻睦鄰之厚恭聆寢膳休有福祥暄煦在辰保頥為請集又有中書樞密院擬定關報國信使牒本此已下參知政事日作樞密院奏館伴所申凖樞密院劄子開坐到回答大遼國信使蕭禧齎來理會地界文字內逐節事理奉聖旨兩朝和好年深今既北朝皇帝遣使致書欲委邊臣各加審視本朝前來雖據劉忱等所奏尚慮未知周悉見改差韓縝張誠一乘遞馬前去計會北朝所奏官司詳來書云各加審視之意躬親詣地頭和會商量疾速結絶去訖仰館伴所備録與北朝國信所候到北朝具此聞達本所請蕭禧過位分付上件聖旨劄子禧不肯收受及未肯朝辭申取指揮看詳北朝國書云早委邊臣各加審視别安戍壘俾返舊常已奉聖旨差韓縝等計會北朝所差官同詳來書審視之意疾速結絶朝廷為蕭禧未曉所降指揮結絶之意不肯收受尋又差使臣持聖旨劄子代州等處地土雖然照據甚是分白緣兩朝通好歲久不欲以疆場細故有傷歡好大體所有治平二年起移北朝鋪舍已指揮邊臣聽北朝於長連城六蕃嶺南依舊址修蓋本朝見安置逺探鋪舍已令挪移近裏其合立烽開壕分定南北界至處所今差韓縝等就地頭計會北朝差來職官同共指視劈撥去訖蕭禧依前不肯祗受聖旨文字及不朝辭申取指揮者樞密院勘會本朝邊臣見慿用照證以長連城六蕃嶺為界公牒計六十道其間多係北界聲説關口把鋪等處捉賊或交蹤緣上件關口把鋪等處並係在長連城六蕃嶺之北內順義軍重熙二年三月十八日牒稱南界送到於山後長連城兩界分水嶺上收捉賊人張奉逺等不合過界已準法斷訖及順義軍清寧九年十月中牒當道捉到截奪到南界代州崞縣赤埿膠主户白友牛賊人事既是捉賊交蹤處在長連城六蕃嶺之北又指長連城六蕃嶺上為界并稱白友係代州崞縣主户以此顯是久來以長連城六蕃嶺為界即不是石長城并近裏分水嶺為界事理分白其治平二年起移却此界鋪舍即無侵越地界今來聖旨只為兩朝通好歲久所以欲于長連城六蕃嶺南依舊址修蓋即於當時蕭括退移鋪舍今已得依舊及國書內别安戍壘俾返舊常之意别無未得準從已是曲敦和好今蕭禧又更指分水嶺為界緣所在山嶺上水勢分流處即皆謂之分水昨來蕭素等所執照據文字三道除大石義興冶兩寨已為北界侵越不經治平年發遣見不以長連城為界無可理會外其西陘寨執張慶文字為據所指去處見今即無土壠劉忱等欲與蕭素等同共檢視又不肯前去兼張慶帶去文字內指説鴈門寨地分至北界遮邊軍約二里以來又顯證得長連城為界分白兼劉忱等曽牒蕭素等令指定是何山名為分水蕭素等回牒稱説沿邊一帶山名地理界至去處南界邉上州界足可自知其間若有所疑應令就便詢訪豈可却移公文會問兼張奉逺文字該説長連城兩界分水嶺元無指定去處今蕭禧執以分水嶺為界即與蕭素等所執一般全無照驗文字顯是難以依從欲令沈括等到北朝日將本朝前後邊臣見邊用照證文字一一聞達北朝令知本末尋進呈奉聖旨檢會前後照證文字雖是盡合以長連城六蕃嶺為界甚是分白其稱以分水嶺為界都無照驗及無指定山名緣兩朝通好年深終是不欲以疆場細故有傷歡好大體既許以治平年蓋鋪處依舊址修蓋務從和會即更不論有無照驗若不以逐處地名指定分水去處即恐檢視之時難以劈撥一李福蠻地許於見開壕塹處分水嶺為界一水峪內義兒馬鋪并三小鋪即那移近南以見安新鋪山頭分水嶺為界一自西陘寨地分以第一第二第三第四第五逺探白草鋪山頭分水嶺向西接石長城上分水嶺為界一鴻和爾山地分以經仁宗朝指揮差官與北朝官吏於聶再友等已侵耕地外標立四至訖及天池廟順義軍牒稱地理係屬寧化軍並無可商議一瓦窑塢地分前來兩界官司商量未了今已指揮韓縝等一就檢視合行劈撥處分水嶺為界右已指揮韓縝等前去計會北朝所差官依逐項事理劈撥結絶所有合行劈撥地內有現住人户處即指揮那移近來居泊外仰館伴所備録與北朝國信聽候到北朝具此聞違集又有進呈授旨與館伴對答國信使言語欲令館伴韓縝等因請蕭禧會食説與朝廷以林牙再三不肯受館伴所坐到聖旨劄子朝辭難以奉強又恐稽留北朝信好已差沈括李評充泛使令齎書親見北朝皇帝説今來改差官商量之意林牙若要且住亦請從便因欵曲説與禧今來朝廷為改差官為劉忱等已是取到前後文字看詳執守理道與素頴等如此抗議教他亦難為回轉所以别差官庶得通容商量今來北界若論文字照證案底盡在樞密可以取觀只如張慶文字內説北至遮邊軍及分水嶺有土壠之類北朝更有甚顯據只為本朝皇帝顧惜兩朝歡好不欲拒絶若要劈撥些小田土如不至妨本朝事亦所不惜所以須至差官就彼隨處商量今來許大疆界若教本朝直降指揮一例從分水嶺為界裏靣包多少堡寨居住人户教從甚處劈撥則是此事斷定教本朝難為依從觀北朝皇帝書意亦知夲朝難為便指揮所以差邊臣審視兼北朝皇帝亦是顧惜盟好必不肯固要做不可依從底事便輕易絶好所以專遣使人具説此意看禧如何答却方便説與林牙今來特了此事却被别差人了却於林牙如何今日須至説盡并一行人莫非長䇿也不惟如此下場攪得兩朝爭閙恐於林牙亦不為穩便更請子細思量禧若言只為聖旨劄子內無箇分明指揮所以難為受却言要教朝廷如何分明指揮則是朝廷要劈割些地土也須是有名始得所以且令地頭商量結絶若於文字上便劈絶將來至彼中却為本朝事下場應副不得事却難成所以難於文字上分明説若是本朝堅執不與只銷教忱前去何必改差官此意亦可見待禧肯近裏相就即説與若如此可待白與中書樞密院試於劄子內添入似治平中起移了鋪寨許依舊修蓋如此所貴林牙回去有箇確的慿據雖是縝等如此商議但未知朝廷肯如此否其餘令韓縝等臨時更觀禧意對答集又有再改與大遼國書兩朝繼好六紀於兹事率故常誼存悠久比承使指諭及邊陲已約官司偕從辨正當守封圻之舊以需事實之分而信介未通師屯先集侵焚堠戌傷射巡兵舉示力爭殊非和議致於當中獨坐位特改于臣工設次橫都席尤難於賔主數從理屈才就晤言且地接三州勢非一槩乃舉西陘之偏説要該諸寨之提封屢索文憑既無據驗欲同按視又不準從職用乖違滋成濡滯竊意有司之失指曽非與國之夲謀兹任軺車再垂函問重加聘幣彌見歡悰然論疆事之侵盡置公私之顯證述邊臣之議獨尤病告之愆期深認事端多非聞達上念合天地鬼神之聽共立誓言守祖宗疆土之傳各完生聚不嗇金繒之巨萬肯貪壤地之尺尋特欲辨論使毋侵越而行人留館必於分水以要求樞府授辭每以興師而移拆豈期欵約遂爾渝歡已按輿圖遙為申畫仍令職守就往溝封遐冀英聰洞加照悉方臨炎燠尚願保願此書與實録所載同只有豈期欵約遂爾渝歡改八字為十四字耳集又有付宰臣韓絳等詔據韓縝下指使王宣回稱敵中任事蕃酋極欲生事意外之變實亦難保契勘朝廷自景德與敵講和之後逮今七十餘年河北一方人不知戰兵備寡弱財用空虛加之今歲旱災百姓流散若因以師旅作何枝梧卿等均總國機體同休戚安危大計所宜預圖其處畫制勝之方謂當此去朝夕講求以固社稷付韓絳等惠卿家傳云是時北使求地來已而謀言契丹有渝盟入冦之謀上手詔韓絳等議所以守禦之方吕惠卿曰守禦未可遽為待天下事倉卒政須安詳今敵亦未必至此藉令起事以中國之大急則急應緩則緩應不患無兵與財但今幸其未然當以漸為之耳急則急應緩則緩應與王安石六年十一日戊午對語略同上欲與以所求惠卿曰彼甚無禮今須諭以夲非我侵特以通和之久不欲深辨與之而已尚或不滿所欲則上下共怒迫而後動不得已而後起使敵徑出意外舉兵深入亦未為長䇿中國亦不患不能守上曰景德中只為不能守慶厯西事亦如此惠卿曰臣觀今日國勢雖未可征若比景德慶厯則必可以守矣今蕭禧以顔色來動吾國遂取地去歸必受重賞則彼國人誰不願起事以侵侮我既得河東又取關南天下至大豈能自立上曰不與須至用兵惠卿曰拒絶亦不可遽與亦不可過猶不及春秋之法許外國者不一而足今且遣使許以治平堡鋪彼亦豈能拒絶不過再遣往來須踰年足以為備矣必欲其速了何耶上曰忽然生事如何誰敢保其無他惠卿曰未聞以千里畏人者契丹雖東有遼西有夏國非不欲取顧不能爾董戬在夏國之側亦不能取蓋取人國人亦取其國敵人豈不慮利害澶淵之役聞定州才有二三萬人澶州有二萬人所以敵敢如此今有二十萬正兵又有保甲恐未敢深入也吳充曰周世宗一旅之衆猶與之抗上曰五代之國乃盜賊之大者所以不惜今日興事須是萬全豈可不畏惠卿曰此誠是但譬之富者自愛其命貧者不然未必小國便不亡政須計較利害耳為天下不可太怯弱上曰契丹亦何足畏但誰辦得用兵惠卿曰陛下能使天下之民以為契丹可伐恐必有敢為陛下用兵者陛下平日慮事見千百年人所不能至於所以待敵人實移聖度王安石曰陛下昨日言周世宗以睡王不恤國事故能勝之然睡王如此不過取得三關陛下今日政事豈可反比睡王何至遽畏之立國必有形勢若形勢為人所窺即不可立矣就令強蓋堡鋪如治平中亦未至起兵上曰此事數與吕惠卿論之如此則不須畏惠卿曰始乎陽常卒乎隂使敵人初無用兵意譬如兩人相爭本無鬬意語言往復遂至於鬬安石曰誠如此但朝廷當修政事而已上曰周禮司馬教戰法但有坐作進退疾徐疏數之節而不及陳法何耶惠卿曰中春教振旅辨鼓鐸鐲鐃之用中夏教芨舍辨弓矢之用仲秋教治兵辨旗物之用耳識金鼓目識旌旗又知號令與坐作進退疾徐疏數之節恐後世無以復加若陳法見於春秋則有魚麗鵝鸛之陳當是臨時為之上曰周禮伍兩卒旅師軍只是制軍法惠卿曰此乃不可易者也韓信李靖後世善用兵者不過祖孫武孫武不過祖黃帝太公其言全軍為上破軍次之全旅為上破旅次之全卒為上破卒次之全伍為上破伍次之以此明其不可易今製營陳且當務合此不當改此以就營陳也安石曰軍法成於卒然用車須一軍乃可但師御法久廢若以官募人習學必有精其事者上曰古人坐席用爼豆今人坐椅用碗楪隨時不同車未必如騎之便安石曰馬上弓矢不若車惠卿曰七十五人之將三人在車上非特弓矢又以居高指麾今若用軍器監所造戰棚車甚便安石曰近曺誦練定所造軍器極良惠卿曰管仲以區區之齊少甲兵以戟贖罪甲兵乃足以今天下之財造甲兵固不難但朝廷不督迫乃可辦上曰齊之技擊魏之武卒秦之鋭士威文之節制今天下兼有秦晉齊魏列國之衆當契丹不甚難沈括有乙卯入國奏請并别録載蕭禧不肯習儀及朝辭事頗詳須參考别修今附注在四月五日丙申雄州移牒涿州下又睡王一段六年五月甲子王安石已嘗言此可參考蕭禧之再來上遣入內供奉官勾當內東門司裴昱賜韓琦富弼文彥博曾公亮手詔曰朝廷通好北朝幾八十年近歲以來生事彌甚代北之地素有定封而輒造釁端妄來理辨比敕官吏同加案行雖圖籍甚明而詭辭不服今橫使復至意在必得朕以祖宗盟好之重固將優容敵情無厭勢恐未已萬一不測何以待之古之大臣必詢故老卿夙懷忠義歷相三朝雖爾身在外乃心罔不在王室其所以待遇之要禦偹之方密具以聞朕將親覽琦言臣晚年多病心力耗殫日欲再乞殘骸保此頽暮不意陛下以北敵生事深思預防記及孤愚曲有詢逮敢不勉竭衰殘少塞聖問臣竊以契丹稱強北方與中國抗者蓋一百七十餘年矣自石晉割地并有漢疆外兼諸戎益自驕大在祖宗朝屢常南牧極肆凶暴當是時豈不欲悉天下之力必與彼角哉終以愛惜生靈屈就和好凡疆場有所興作深以張皇引惹為誡以是七十年間二邊之民各安生業至於老死不知兵革戰鬬之事至仁大惠不可加也臣觀近年以來朝廷舉事則似不以大敵為恤敵人素以久強之勢於我未嘗少下一旦見形生疑必謂我有圖復燕南之意雖聞彼主孱而佞佛豈無強梁宗屬與夫謀臣䇿士引先發制人之説造此釁端故屢遣橫使以爭理地界為名觀我應之之實如何耳所以致彼之疑者臣試陳其大略高麗臣屬契丹於朝廷久絶朝貢向自浙路遣人招諭而來且高麗小邦豈能當契丹之盛來與不來國家無所損益而契丹知之謂朝廷將以圖我此契丹之疑也秦州古渭之西吐蕃部族散居山野不相君長耕牧自足未嘗為邊鄙之患向聞強取其地建熙河一路殺其老小以數萬計所費不資而河州或云地屬董戬即契丹壻也既恐闢地未已豈不往訴而契丹聞之當謂行將及我此又契丹之疑也北邊地近西山勢漸高仰不可為塘泊之處向聞差官領兵遍植榆桞冀其成長以制敵騎然興於界首無不知者昔慶厯謾書所謂創立隄防鄣塞要路無以異矣然此豈足恃以為固哉但使契丹之疑也河朔義勇民兵置之歲久耳目已熟將校甚整教習亦精而忽然團保甲一道紛然義勇舊人十去其七或撥入保甲或放而歸農得增數之虛名破可用之成法此又徒使契丹之疑也自彼來辨理地界河朔緣邊與近裏州郡一例差官檢討修築城壘開淘壕塹趙冀北京展貼之功役者尤衆敵樓戰棚之類悉加完葺增置防城之具率令備足逐處兵甲器械纍次差官檢視排朵張盤前後非一又諸處創都作院頒降新樣廣謀造作澶州等處創為戰車此皆衆目所覩諜者易窺且敵人未有動作彼無秋毫之損而我已費財殫力先自困敝此又徒使契丹之疑也近復置立河北三十七將各専軍政州縣不得關預雄州地控極邊亦設將屯其隨軍衣物有令兵士自辦者有令本營增置者有令官造給付者以至預籍上户車馬驢騾凖備隨行明作出征次第不可蓋掩此又深使契丹之疑也夫北朝素為敵國設如此則積疑起事不得不然亦其善自為謀者也今橫使再至初示偃蹇以探視朝廷況代北與雄州素有定界若優容而與之實慮彼情無厭浸淫不已誠如聖詔所諭固不可與或因其不許彼遂持此以為已直縱未大舉勢必漸擾諸邊卒隳盟好蓋事有因緣而至此者乃煩明詔訪以待遇備禦之要自顧老朽夙夜思之其將何䇿上助聖算然臣聞言未及而言謂之躁言及而不言謂之隱臣昔曾言散青苖錢不便事而言者輒肆厚誣非陛下之明幾及大戮自此新法之下雖其間有未協人情者實避嫌疑不敢更有論列今親被詔問事繫國家安危言及而隱是大不忠罪不容誅矣臣嘗竊計始為陛下謀者必曰自祖宗以來紀綱法度率多因循茍簡非變不可也治國之本當先有富強之術聚財積榖寓兵於民則可以鞭笞四方盡復唐之故疆然後制作禮樂以文太平故始散青苖錢使民出利所得之利復以為夲但務多取歲增夲錢無有定數又有免役之法自上等以至下户皆令次第出錢募人應役從來上户輪當衙前重難故其間時有破敗者今上户一歲出錢不過三十餘緡安然無事而令下户素無役者歲歲出錢此則損下户而益上户雖百端補救終非善法又役錢之內每歲更納寬剩錢以備他用此所謂富國之術者也且農民送納夏秋稅賦一年兩次納不前者始有科校之刑今納青苖與役錢已是加賦有過限者亦依二稅法科校則是一户一歲之中常負六次科校民不勝駭矣稍遇水旱則逋負官錢流移失業是已著見孰敢言者又內外置市易務盡籠天下商旅之貨官自取利主以得利為功錐刀必取小商細民遂無所措手加以新制日下更改無常州縣官吏茫然不能詳記稍有違者坐以徒刑雖經赦降去官不得原免監司督責以刻為明簿法之苛過於告緡故州縣之間官吏惴惴然日茍一日皆以脫罪為幸夫農者國之根夲也商者能為國致財者也官吏者助朝廷之教化者也今農者則怨於畎畝商者則嘆於道路官吏則所在不安其職恐陛下不能盡知也夫欲攘捍鄰敵以興太平而先使邦夲因搖衆心離怨振古以來未聞能就此功者也此則為陛下始謀者大誤也陛下有堯之仁舜之聰知其所誤能改不吝聖人之大德也又今好進之人不顧國家利害但謂邊事將作冨貴可圖獻䇿以干陛下者必云敵勢已衰特外示驕慢耳以陛下神聖文武若擇將臣領大兵深入敵境則幽薊之地一舉可復此又未之思也今河朔纍歲災傷民力大乏緣邉次邊州郡芻糧不充新選將官皆粗勇保甲新點未經訓練若驅重兵頓於堅城之下糧道不給敵人四向來援腹背受敵欲退不可其將奈何此太宗朝雖曺彬米信名德宿將猶以致岐溝之敗也臣愚今為陛下計謂宜遣使報聘優致禮幣開示大信達以至誠具言朝廷向來興作乃修備之常與北朝通好之久自古所無豈有他意恐為諜者之誤耳且疆土素定當如舊界請命邉吏退近者侵占之地不可持此造端欲隳祖宗纍世之好永敦信約兩絶嫌疑望陛下將契丹所疑之事如將官之類因而罷去以釋彼疑萬一聽服則可遷延歲月陛下益養民愛力選賢任能踈逺姦諛進用忠鯁使民恱服邊備日修塞下有餘粟帑中有羡財俟敵果有衰亂之形然後一振威武恢復舊疆快忠義不平之心雪祖宗纍朝之憤陛下功德赫然如日照耀無窮矣如其不服決欲背約則令河北諸州深溝高壘足以自守敵人果來入寇所在之兵可以伺便驅逐大帥持重以全取勝自此彼來我往一勝一負兵家之常不可前料即未知何時復遂休息也至於清野之法則難盡行蓋事宜之際不可率一境之民比户將牛馬餱糧盡入城郭蓋至時或有往保山寨者或有挈家渡河者或有留人看守莊舍者或有就近入居城郭者當使人得自便方保安全固不可按圖先定必令入城郭而居雖有嚴令必不從也在祖宗朝屢經北人之擾鄉民避冦率亦如此願朝廷不須一一處置臣歷事三朝十年輔相官已極品歸榮故鄉萬事無不足者年將七十宿疾在身每思告老前去庶全始終比緣聖問之及因敢一貢盡言非嫉善非求進用是只以自信今天下之人漸不敢以直言為獻臣實不忍負纍朝眷遇之恩猶覬愚瞽一悟聖心為宗社之盛福惟陛下加察賜以不疑非獨老臣幸甚天下幸甚弼言臣素乏才業沗塵二府昔在壯時精力尚不及人今老日病氣志衰耗何足備大政之問然臣實無已見今但舉衆人所傳聞者録以上奏惟聖明裁擇臣五六年來竊聞綏州婁城熙河辰錦戎瀘交趾咸議用兵惟交趾中寢其餘諸路皆有攻討或剋獲或喪失即傳播天下而綏州婁城熙河始初興舉便傳聞云朝廷後必復靈夏平賀蘭既又大傳有人上平燕之䇿此説尤盛北人必尋已探知相繼彼復聞朝廷修完器甲簡練卒伍增築城壘積聚芻糧加之招致高麗為牽制之援近又分置河北三十六將按閲愈急喧布漸久事機參合此敵人所以先期造釁以有代北侵境之端而不肯已也其平賀蘭平燕之䇿虛實固不可知然傳者既多且久萬口一詞誰復辨白設有辨者逺人何以取信今釁端已成代北各屯兵馬境上爭議逾年未決橫使再至事歸朝廷此邊臣之職而朝廷自當之則恐理難欵緩便要可否違之則兵立起而患速順之則河東斥堠窄狹為患雖遲而久逺大成不便也臣謂不若一委邊臣令其堅持久來圖籍疆界為據使其盡力交相詰難然北人非不自知理曲蓋故欲生事遂興干戈以氣吞我以勢凌我是欲奪我纍年所作之事彼非敢無故驟興此端實有以致其來也惟陛下深省熟慮不可一向獨謂敵人造釁背盟也彼若萬一入冦事不得已我持嚴兵以待之來則禦戰去則備守此自古中國防邊之要也若朝廷乘忿便欲深入討擊臣慮萬一有跌其害非細更或與西夏為掎角之勢則朝廷宵旰矣事既至此邊奏警急兵糧皆闕窘於應用須防四方凶徒必有觀望者謂國家方事外虞其力不能制我遂相嘯聚蜂蝟而起即事將奈何臣願陛下以宗社為憂生民為念納汚含垢且求安靜更俟歲時豐稔窮困稍蘇流亡漸歸民粗安業稅賦不失倉廪不虛恩信宣布人心固結然後别圖萬全之舉貴免一跌之失此天下之願也亦臣之志也向又喧傳陛下決為親征之謀中外益更憂懼心隕膽落陛下雖英睿天縱必有成算然太平天子與創業之君事體絶異尤未可慨然輕舉又恐朝廷且作聲勢固無實心事若如此乃是我以虛聲而邀彼實來也張虛聲者必有疏略之虞作實來者必有周密之慮以疏略之虞而當周密之計其成敗豈不灼然耶假令入討得志而還此契丹一種事方自大況又夏國嘉勒斯賚髙麗黑水女真逹勒逹等諸國為之黨援其勢必難殄滅使無噍類即由此結成邊患卒無已時大非長轡逺馭之道也臣竊謂因橫使之來且可選人以其疑我者數事開懷諭與云朝廷凡所為武備乃中國常事非願外興征伐向有用武之地皆小蕃有過者朝廷須合問罪若吾二大邦通好已是七十餘年無故安肯輒欲破壞恐是姦人走作妄興鬭諜或是彼聞我整促邊事即疑我有所興作我既知之豈免大為凖擬蓋因此互相疑二養成釁隙遂有今日事理朝廷更有可説諸事但盡説之須令釋然無惑乃一助也橫使如不納即遣報聘者於遼主前具道此意庶幾一聽必有所益緣彼大藉朝廷歲與方成國計既有顧藉之心豈無安靜之故只以欵疑未釋遂成倔強若與開解明白必肯回心向化凡百蒂芥盡可脫落茍互相疑忌兩情不通禍患日深必成後悔臣歷觀春秋洎戰國時諸侯遞相征伐兩兵已合飛矢在上走使在下其間辨説解釋遂各交綏而退却復盟好者比比皆是況今釁端漸啓兵尚未合且可多方以理解釋或能有濟與其用戰征而決勝負萬不侔也此致疑及禦戎二事臣並得之羣論非出胸臆是皆目前衆所共知共見必然之理必難事外别求竒異之䇿也臣皆望陛下兼求博訪不宜專聽一偏之説恐有逆合聖意及畏避用事之人不敢盡以實事上奏有誤國家大計臣今所以及此者竊聞去春以久旱陛下特降手詔許人極陳朝政得失中外歡抃咸謂聖情已大開悟尋聞上章論列者甚多隨而或遭貶降陛下殊不以手詔召人極陳為意而優容之反令得罪士大夫自此皆務鈐結忠藎之語不敢復出於口臣謂下情不能上達者乃朝政莫大之患也願陛下深思之極慮之早令天下受賜及朝廷無事不勝大幸此奏出於匆遽又且欲事理明白不敢少加文飾及援據古事但直書利害而已昔楚相子反謂區區之宋尚有不欺人之臣況中原大國已與北人結隙今若更不推誠以待之則恐不能解疑釋惑也伏乞聖造特加裁恕彥博言敵人之情貪利忘義然自祖宗朝與之通好息民幾八十年未嘗犯順惟慶厯初乘我西事未弭故有邀求當時再立誓書亦古尋盟之義自數年前纍來妄理白溝館地及要拆去鋪屋況誓書之中明載雄州所管白溝兩朝遵守已久且信誓之辭質於天地神祗告於宗廟社稷此而可渝何以享國今蕭禧重來又決於雄州北亭交割禮物其意欲以雄州北亭為界原其貪心亦因慶厯初西事未平之際來求鴻和爾之地朝廷容易棄與之耳然中國禦戎守信為上必以誓書為證彼雖詭辭難奪正論臣又以事理度之事固有逆順理固有曲直若敵人不計曲直利害敢萌犯順之心朝廷固已嚴于預備之要足食足兵堅完城壁保全人民以戰則勝以固則守止此而已大抵中國之兵利在為主以主待客以逸守勞理必勝矣竊料聖意重於舉動發言盈庭容有異論或曰先發制人意在輕動或曰乘其未備襲取燕薊事不審處恐將噬臍非王師萬全之舉也伏願陛下垂意熟察之今朝廷分置將官整齊器械固得之矣然將校偏禆更須遴擇其人又河朔洊飢若兵連未解物力殫屈即金湯不守先事而辦乃無後艱彥博集自注九年三月按彥博稱三月者是也若九年則當云八年公亮言國家以通和之䇿羈縻北敵雖歲委金帛而休兵息民逾七十年近者數起釁端蓋欲自庇不然亦謀之舛謬代北之地詳詔旨所諭以為官吏按行圖籍甚明則雖欲包含亦恐無名與之無名則無厭之欲後不可足且敵人之情畏強侮弱要在控制得術耳嘉祐以前西夏頗守誓約嘉祐元年妄爭麟府封疆遂虜郭恩武戡黃道元朝廷姑務含容無一言問罪至治平二年又妄認同家堡以為封境殺掠屬户弓箭手數千牛馬萬數而去己而檢視同家堡地界乃元昊時生蕃十九戶所獻遂降詔諭之諸司副使王無忌齎詔至境拒而不納朝廷不欲深治但命延州牒問遂攻圍大順城諒祚中流矢乃去其後雖遣使奉貢而屢入冦邉乃詔權罷歲豫方復懇求待之如初因而帖服者八九年臣思北敵之情恐不異此臣之愚慮欲乞朝廷選擇謀臣報聘諭與彼國生事中國包含之意至於疆界案驗既明不可侵越使敵主曉然不為邀功之臣所惑必未敢萌犯邊之意且中國今日之勢與雍熙景德之間不同河北之兵既已倍增又益之以民兵及行陳訓練多出睿算以此待敵不為無偹然尚須謀擇將帥北邊久不用兵雖有可用之人或未之試也若將帥得人委之一面使久其任觀其措置才略足試後日之用或謂河北久戍之卒不經征討則陜西河北近有戰勝之兵自可籍記以備一旦調發敵人萬一犯邊願先絶其歲賜臨之以良將精兵彼亦自亡之時也景德中敵騎南牧一遇親征之師狼狽請盟若非真宗憐其投誠許為罷兵無遺類矣況今日備禦之勢又非昔時之比但定州一路最為控扼若入冦之初勿犯其鋒鋭俟其入界疲曳以重兵夾攻必無不克敵若敢深入內地則臣謂大河之險可敵堅城數重徑兵數十萬冦至北岸前臨大河之阻後有重兵扼之前不得進後不得奔王師仍列強弩於南岸待之此百勝之勢也今者中國所以待敵人者既極包容矣若其生事不已不使知懼臣恐未易馴服控制之柄無使倒持敵人知中國之不可窺姦謀亦自息矣朱史云琦等度上以敵為憂故深指時事以為言疏奏既無可施行敵亦卒不動今依新夲削去遣裴昱賜韓琦等四人詔墨夲係之七年十月八日壬申并附見琦等疏案詔語有云橫使復至則是蕭禧再使乃八年三月八日庚子入對不應七年十月八日便云橫使復至也墨夲既誤朱夲因之今移入八年四月蕭禧去時仍以蕭禧再來冠其首庶詔及疏議並無抵牾丁卯遼主遣永州觀察使耶律景熙崇祿少卿韓詵其母遣懷德軍節度使耶律逹廣州防禦使劉從祐來賀同天節詔國子監屏內舍生陶臨出學初吕惠卿引臨為經義所檢討母病謁告歸省聞王安石召為相枉道見之安石還朝以聞故屏之既而御史蔡承禧復以為言又詔殿三舉上問安石何故取臨安石曰初不見其過故取今見其有罪故絀政當如此耳日録云自泗州倒行至臨淮謁余不知臨鄉里是何處當考詔廢州為縣廢縣為鎮即兼兵或縣萬户鎮千户以上委轉運司舉知縣監鎮官餘非初廢並銓院選差戊辰賜西京昭孝禪院户絶田仍免其稅役管轄京東淤田李孝寬言乞候礬山水至開四斗門引水淤田權罷漕運三二十日從之以礬山漲水頗濁可用以淤故也癸酉上批熙河路全乏錢糧恐誤邊計可速議經畫乃遣濰州團練推官杜常相度措置增招弓箭手欲以減戍兵紓邊饋也後又詔與高遵裕裁減修造數詔罷給田募人充役已就募人聽如舊其走死停替者勿補先是王安石為上言給田募役有十餘害上曰茍如此初何以有此議議者必言所利翌日檢初議乃李承之言募弓手宜如弓箭手為便遂作此法餘無所利安石曰只以田募弓箭手已不如募弓手之便弓箭手雖選強壯然即取足於一家茍可以為強壯則弗却也弓手乃選強壯於無方所募皆得真強壯者上乃令廢以田募役法據日録乃四月三日事今因罷給田募役始著之二月二十二日甲申王庭老可考王荆公安石當國以徭役害農而遊手無所事故率農人出錢募遊手給役則農役異業兩不相妨行之數年荆公出判金陵薦吕惠卿參知政事惠卿用其弟溫卿之言使役錢依舊而撥諸路間田募役既而間田少役人多不能均齊天下方患其法之不可行而中丞鄧綰又言惠卿意在甲毁乙故壞新法於是不行溫卿之言而依舊給錢募役此據魏泰東軒録泰誠不知事實者姑附以證其誤七年五月二十四日初降指揮蘇軾奏議在元祐元年四月六日王巖叟等駮奏在二年三月末當并考乙亥龍圖閣直學士羣牧使李中師權發遣開封府右監門衛大將軍仲銑領雅州刺史手詔仲銑亷靜修潔好學知分近曾召對可特遷官故也日録十九日上言與世居謀反者醫人劉育嘗遷岐王奏差而岐王見其多事不許又干嘉王仲銑言此人多事不宜在王府乃已上因言銑亷靜好學知分王安石曰以此知忠信寡欲之人有補於世上曰良是今附此三月四日世居及育下獄閏四月二十一日斷獄太常禮院言已尊僖祖為太廟始祖孟夏禘祭當正東嚮之位乃請自今禘祫著為定禮詔恭依丙子岐王皓復奏乞賜外第詔答不允戊寅樞密副使右諫議大夫吳充為檢校太傅行工部侍郎樞密使上批充久參機政悉力職事故有是命提舉河北西路糴便糧草金部員外郎吕嘉問為檢正中書户房公事上批熙河路見闕錢穀而將作調營繕材木數多今三司修建將軍京師造作又權罷七年既無急用即可權住采買以紓邊費時修三司材料既足而通逺軍鳯翔府纍歲所應輸納木猶積欠五十餘萬中書請盡蠲之而以見役兵繼令采伐從之詔江寧府昨借常平錢米修農田水利如限滿未足更展一年從宰相王安石請也都大提舉黃御等河公事程昉言乞自滹沱葫蘆兩河引水淤溉滹沱南岸魏公孝仁兩鄉瘠地萬五千餘頃自永靜軍雙陵道口引河水淤溉北岸曲淀等村瘠地萬二千餘頃並俟明年興工從之正月二十五日可考河渠志第二卷滹沱河夲西山水由真定深州乾寧與御河合流熙寧元年河水漲溢詔都水監河北轉運司疏治六年深州祁州永寧軍修新河八年正月發夫五千人并葫蘆河增治之四月程昉言請引水溉南岸魏公等鄉瘠地凡一萬五千頃北岸曲淀等村瘠地凡一萬二千頃從之明年昉上淤田之勞遷張逖為西京左藏庫副使張適為大理寺丞自是水利日興而民受其賜志第三卷又云八年四月程昉言深州靜安縣令任涎檢踏滹沱河南岸放水入兩堤舊河淤溉南岸魏公孝仁兩鄉瘠薄鹹地約一萬五千餘頃乞明年收畢二麥全放滹沱葫蘆兩河水淤溉從之知廣信軍狄詠等言契丹移新木內城村兩鋪近邉欲以夲軍張瓜村新河口兩鋪亦移近邊與彼相直詔河北沿邉安撫司遣官相度如全屬南地即如所請知雄州王道恭言北界改移鋪屋見移文詰問未敢再令毁拆詔候契丹防守人馬退則毁拆環慶路經略司言已諭蕃部因請貸糧各於手背刺寨名選為三等籍定姓名從之詔軍頭司呈試武藝人及五人以上或事體稍重並取旨差官監試司農寺言州縣百姓多捨施典賣田宅與寺觀假託官員姓名欲令所屬榜諭聽百日自陳改正為已業仍依簿法通供敷納役錢從之命新知代州周永清代張誠一同韓縝分畫地界上以承旨司及閣門闕官故留誠一也永清入對言疆境不可輕以豫人臣職守土不願行因遣之留誠一為承旨司及閣門闕官此據御集六月二十八日永清還代州舊紀亦書知代州周永清代張誠一議疆事新紀削去王安石為上言契丹大而無略則多隙可乘且并諸國及燕人為一四分五裂之國也上曰中國兼燕秦楚越萬里之地古所以勝外敵之國皆有之能修政刑則契丹誠不足畏安石曰中國如大物要以大力操而運之爾又論民兵安石曰既以民為兵則宜愛惜得其心如陛下前欲以義勇為募兵認定牛驢即極非所以得民心事之安危或兆於此古人以民為貴不可不察上矍然曰良是認定牛驢事在十年十二月二十一日甲申是日四月七日進呈比撲馬數樞密院欲存牧監又欲留監牧馬凖備軍行負馱中書比撲歲用三萬貫買監牧所生馬數足而歲可省官錢五十三萬貫地利在民尚不計數凡牧監歲收馬二百餘匹無色額馬盡皆配軍亦止二百餘匹而中書擘畫熙河買馬未及反十箇月比舊已增九十餘匹上令中書施行而吳充固爭以為監牧不當廢若外敵旅拒馬不可買中國如何得馬上曰雖如此牧馬亦不濟事祖宗時牧監但養大馬後來孳生是非明白無可疑充曰向令認定驢牛中書便云騷擾今中書却要臨時買驢以供負馱豈不騷擾安石曰無事時不問有無驢牛須令五户或十户共認驢牛一頭不知此牛驢令誰作主且無驢牛之人須被配率出錢此所以為騷擾今中書計算若遇要驢時用見今第一等價上增一倍買驢事定後更不收一錢即每三年一次用兵比養馬以待用可省七十萬貫用第一等價上增一倍買驢假令括買亦不為虧損百姓此所以易於預認上曰此利害分明兼馬皆生梗豈可負馱也已見七年十二月甲申注今修入正文安石又為上言去年體量放稅東南倉廪為之一空非計也此乃馮京故為此與蘇秦厚葬以明孝同意又進呈前借常平物與轉運司修城塹之類安石曰臣謂宜愛惜常平物以待非常不宜遽如此費出上以為然乃令前降指揮勿行以度僧牒還司農前降指揮當考閏四月十八日安石又言放稅事可參照庚辰提舉成都府等路茶場司言雅州名山縣發往秦熙州等處茶乞聽官場盡買不許商販詔商人就官場買者聽之每馱納長引錢千指定州軍貨易蕃官副軍主李默戬覺授三班借職夲族巡檢自言招安蕃部有勞也河北東路轉運判官吕溫卿言欲令造簿縣曉諭民供通户下自來漏帳田産更不坐罪積年稅賦免追從之河北西路轉運司言北兵過界略真定府北寨橫巡節級杜辛等上批此安撫司事也轉運司何預令具析以聞權御史中丞鄧綰言奉詔看詳世居家書簡有與世居親密者案後收理夲臺搜檢世居家書簡看詳各是尋常往還人數不少未敢一例收理詔於法有罪人即收坐綰又言李逢世居等起意皆因挾圖讖祅妄書以相搖惑伏詳編敕讖書之禁雖坐流三千里然非因事罥罣無由發覺所以法令徒設人不知畏士庶之家亦或收藏傳説不以為怪乞下諸路曉告收傳圖讖文書者立燒毁或首納入官官為焚棄過兩月許人告重賞之犯人處死詔送編敕所立法以聞其後立法私有圖讖及私傳習者聽人告賞錢百千從之綰又言世居納匪人論兵挾讖訪天文變異伺國家休咎出處架結纍年於兹宗正不察教官無狀其罪不可不治又宗邸明有門禁而逢等出入自恣宫門無歷案驗當正監門使臣之罪又言世居文字內有攻守圖術一部得於內臣張宗禮嘗勾當三館盜印官夲遺之雖各會赦去官並乞特令案後收坐從之壬午宣徽北院使張方平為中太一宫使方平以同天節稱慶禮畢欲求近京一郡乃有是除詔所考京朝官班行選人試經書律令大義斷案上等大理評事梁子野賜同進士出身二人循資並堂除中等四十七人堂除下等六十三人並與差遣并注官子野適孫也參知政事吕惠卿乞罷五日一赴講筵從之湖南轉運司言潭衡邵道州江水溢壞官私廬舍癸未知制誥權發遣三司使章惇為權三司使知徐州司勳郎中魏孝先同提舉在京諸司庫務孝先嘗得對具論馮京撓正之狀故王安石以為可用上亦謂孝先不可得朝廷士大夫用心如此者殊少翌日遂有此命孝先以中書提點五房公事主客郎中知徐州乃七年七月二十二日戊午權提點河北東路刑獄駕部員外郎范子淵復為同管勾外都水監丞都大提舉疏濬黃河避轉運副使陳知儉親也知儉不知與子淵何親據墓志知儉嘗坐言濬河非是奪官更須考詳上批河東馬軍多而馬不足妨廢教閲人既未可頓減遂不給馬則一路全闕兵緩急小有邊事從何調發兼今計所校省錢糧不多可且仍舊初河東騎軍有馬萬一千餘匹歲以畨次戍邊餘留內地率十年一周熙寧六年議者謂官養馬費廪食多死損始詔五路募義勇保甲養馬户一匹歲免折變緣納錢六千五百户願養二匹者聽開封府界毋過二千匹五路各毋過五千匹於是兵部請令河東養馬正軍五千匹義勇保甲五千匹共以萬匹為額時河東正軍有馬九千五百餘匹請罷支填以義勇保甲馬補其闕數候正軍馬不及五千匹然後以官馬支填奏上詔中書樞密院比較利害以聞樞密院以謂車騎武備國之大計不當專為一時省用而論廢置且官養一馬歲為錢二十七千民間養馬才免折變緣納錢十四千四百蓋緣納錢六千五百折米計其價當為十四千四百也餘皆出於民必非所願不免抑配兼慮芻秣失節或致損壞又不善調習緩急何以應用況減馬軍五千匹即異時須減就糧馬軍正數九千九百人又於見支分數馬減三千九百四十匹不惟人情不便緩急邊防事宜何處取備若朝廷且令官軍民兵兩不廢弛訓練經久必有可用但存諸軍分數馬外漸令民間情願養飼服習不須指定五千匹數於理似可與中書更問難往來中書大指以謂官養一馬以中價率之歲為錢二十二千募民養馬可省官芻秣及傔衣糧歲為錢八萬餘緡且便入中芻豆之家無所邀厚價計熙寧五年六年官馬死倍於保甲馬而保甲有馬則可習騎戰平時可使襲逐盜賊公私有利上從樞密院議而有是旨中書不能奪乃詔河東義勇保甲養馬令轉運司歲計所免折變緣納實費錢以三司錢撥還河東馬軍聽依舊支填候教成義勇保甲别取旨六年義勇保甲養馬指揮要見月日兵志八年兵部請河東騎軍五千義勇保甲五千凡萬匹為額時河東正軍有九千五百餘匹請罷給以義勇保甲為補其闕數俟他日正軍不及五千匹然後以官馬給之奏上詔中書樞密院較利害以聞樞密院以謂車騎武備國之大計不當為一時省用而論廢置且官養一馬歲為錢二十七千民養一馬才免折變緣納錢六千五百計其折價當為錢十四千四百也餘皆出於民必非所願兼慮芻秣失節或不善調習緩急無以應用況減馬軍五千匹即異時須減就糧馬軍正數九千九百人其見支分數馬又當減三千九百四十匹不惟重擾於民邊防事宜何以取備與中書問難久之王安石曰陛下欲訓義勇保甲令可用故將以省募辛寬河東一路也今又不令養馬則民兵無騎民兵無騎則異時何以為用且用募兵五千騎之費可養義勇保甲萬騎教成之後精勇但有過於募兵無不及焉且官養一馬以中價率之歲為錢二十二千募民養馬可省官芻秣及傔衣糧歲為錢八萬餘緡且使入中芻豆之家無所邀厚利計熙寧五年六年官馬死倍於保甲馬而保甲有馬則可習騎戰平時可使襲逐盜賊公私有利若欲且存騎軍馬額即義勇保甲養馬可令三司出備候一二年教義勇保甲精熟則馬軍别頒旨上從之乃詔河東義保養馬所免折變緣納實費錢以三司錢償之河東馬軍且仍舊俟教義勇保甲成别取旨自王安石曰陛下欲訓義勇至别取旨夲志並因日録日録又曰比撲河東義勇保甲養馬密院檢詳故落三司狀妄作比撲數要作義勇養馬所省不多上曰密院兵房比撲得全不是然上欲且依舊令兵士養馬安石曰陛下欲訓習義勇保甲令可用故將以省募卒寬河東一路也今又不令保甲義勇養馬即民兵無馬民兵無馬則異時何以為用且用募兵五千騎之費可養義勇保甲萬騎所養義勇保甲與募兵之費又不同義勇保甲教成之後精勇但有過於募兵無不及焉不知如何不令義勇保甲養馬若欲且存騎兵馬額即義勇保甲養馬所費可令三司出備候一三年教得義勇保甲精熟即馬軍别取旨上日好紹聖三年七月六日張赴等云云可考權知開封府司録參軍朱炎言奉詔在京免行錢貧下戶減萬緡已減百六十餘行依舊祗應近有彩色等十三行願復納免行欲聽許從之乃詔貧下户量減錢毋得過半既而上批昨日依朱炎所請於已放免行錢萬緍却令認納五千緡再詳事理未便可再取旨中書進呈卒如炎所奏賜蕃官溫必魯揚家絹五百溫必魯揚官至侍禁河州戰殁當得二子恩而無子故賜之甲申金部員外郎檢正中書户房公事吕嘉問兼提舉市易司王安石言近京師大姓多止開質庫市易摧兼并之效似可見方當更修法制驅之使就平理上曰均無貧固善但此事難爾安石曰秦能兼六國然不能制兼并反為寡婦清築臺蓋自秦以來未嘗有摧制兼并之術以至今日臣以為茍能摧制兼并理財則合與須與不患無財臣嘗論廪餼當稱事政為此也後數日吳安持辭市易上不許安石曰臣與嘉問親厚非有他但與議市易而已然其被誣臣以親厚之故已難為之辨明況臣女壻恐有事愈難為言乞别選人上固不許此據日録二十八日事實録於甲申日舊太常博士祕閣校理陳睦兼監察御史大理寺丞蔡承舊改太子中允權監察御史裏行今移入四月三日削此不著西京左藏庫副使王昭序兼閣門通事舍人昭序自陳閣門守職五十三年老病乞解點檢閣門簿書并提點承受特遷之權三司使章惇乞重定牙司條例及差占軍大將窠名從之賜度僧牒五百治保州東南緣邊陸地為水田從河北緣邊安撫副使沈披請也披又乞錢五萬緍收息酬覘事人詔賜萬緡熙河路經略司言馬銜山後錫丹族蕃部逹克博説諭趙醇忠及母妻等來降又誘洮州巴凌酋首居岷州城北遂成蕃市兼逹克博志在效順家屬亦有為果莊殺害乞補一近城下班行充巴凌巡檢專管勾巴凌一帶蕃商往來詔補逹克博三班差使巴凌巡檢贈邵州團練使宗藎所生母永和縣太君皇甫氏永嘉郡太夫人以上批皇甫氏可以宗瑗母例贈郡夫人故也宗瑗例當檢夲紀於甲申日書新作奉元厯成頒天下按實録乃是閏四月壬寅今從實録丙戌皇城使忠州刺史廣南西路鈐轄石鑑為衛尉少卿直昭文館知宣州鑑始換武職至是自列願還文資上以其有功優遷鑑先除廣南東路鈐轄七年八日二日未半歲改西路八年正月二十八日上初欲委鑑團結教閲諸洞保甲以為朝廷差出劉彛必忌之就令彛委鑑既而彛固不欲鑑來乃言鑑雍人今鈐轄夲路非便大抵溪洞人喜生事以動朝廷取賞上謂王安石曰鑑不至此然邊人誠好生事安石曰能生事則亦能弭事朝廷不知所以御之則敢生事以取賞朝廷知所以御之使其造難則無所逃罪弭難則有以取賞何患其好生事也於是上復徙鑑東路此月二十二日鑑未知改命而有是請上從之上與王安石論鑑事乃此月十九日後三日遂有宣州之命鑑乞還文資猶稱廣西鈐轄則固未知復徙廣東其有是請必以劉彛不樂鑑故也司農寺乞遣官同發運司裁減冗費從之上批提舉在內修造所張茂則差出張若水在假修完內城可差見管勾宋用臣丁亥著作佐郎張琬同提舉荆湖北路常平等事太原府兵曹參軍范鏜為崇文院校書琬鏜嘗從王韶辟至是韶言其材召對命之罷著作佐郎林旦勾當進奏院以知通進銀臺司陳繹言旦先任臺官坐言事不實降黜乞别與差遣故也五月十六日王安石云云可考都提舉市易司賈昌衡等言金寶非衣食所資但當禁其侈僣若有糜壞舊法致之以死則論罪太重募以厚賞則為禁大密令新敕止坐以銷為飾者則舊法已刪改其糜壞金銀蓋已無禁然民尚循前法未敢通用已令本司造金銀箔出賣上批市易務箔金宜罷出賣已成者聽於後苑作折換上又批市例錢元條無稅物商人當納與否舊舟筏入京城典吏並緣為姦丐取留難而征算入官十才三四於是有司請計所丐取數減五六收之以祿典吏而典吏犯丐取百錢以上皆坐配法征算入官十收其八皆緣有稅物始收至是上疑無稅物者亦收市例錢故以問中書也賜熙河京鈔二十萬緡河州十萬緡又以江南東路折斛錢二十萬緡賜河北西路轉運司並充糴本詔杜常取熙河路經略安撫司去年隨軍蕃部兩庫及帖助公使錢給用名件與高遵裕密具當用及當裁損數以聞以遵裕乞權罷永興等處熙州通逺軍市易且令經略司主之及以去年市易茶場淨利歸經略司如不可即乞詔有司據本路一年合用錢數明支撥封樁故也戊子內殿崇班閣門祇候高公繪高公紀並為閣門通事舍人司農寺言提點京西南路刑獄張復禮定修許州鄧芟河不當詔都水監丞劉璯相視以聞又乞借度僧牒三千紫衣敕千許諸路衙前承買酬折重難等第從之河北察訪使沈括曽孝寬上守城人數詔依孝寬所定令軍器監約防城分數器仗增倍計置己丑上批教閲法及賞罰格已靣諭曽孝寬修改大意可付與令取旨别行審定差左藏庫使夏元象同詳定不知别審定何事此或與二月十六日五月九日陳圖相關更詳之上批斬馬刀局役人匠不少所造皆兵刃舊東西作坊未遷日有上禁軍數百人設鋪守宿可差百人為兩鋪以潛火為名分地守宿先是斬馬刀局有殺作頭監官者以其役苦又禁軍節級強被指射就役非其情願故不勝忿而作難王安石常與同列白上以為宜稍寬之至是僉為上言其事上以不可因此遽輟亦且了矣安石曰凡使人從事須其情願乃可長久上曰若依市價即費錢多那得許錢給與安石曰餼廪稱事所以來百工餼廪稱事來之則無強役之理且以天下之財給天下之用茍知所以理之何憂不足而於此靳惜若以京師雇直太重則如信州等處鐡極好匠極工向見所作器極精而問得雇直至賤何不下信州置造也此據日録四月十七日今附見安石前在相位時亦屢言此當檢附六年五月一日始置斬馬刀局蔡承禧二章附此年五月十七日詔特免河州進士梅惇等九人將來文解以惇等自陳收復以來未沾恩乞如熙州例故也詔妃嬪每三歲許奏乞同宗或異姓有服親合入差遣一次先是妃嬪陳乞無定法故立此制志同詔沙苑監𨽻羣牧司餘八監及河南北兩監牧司並廢以中書樞密院言河南北十二監自熙寧二年至五年歲出馬千六百四十匹可給騎兵者二百六十四餘止堪給馬鋪兩監牧歲費及所占牧地約租錢總五十三萬九千六百三十八緡計所得馬為錢三萬六千四百九十六緡而已得不稱失故廢之以牧地租給市易務茶夲錢外餘寄常平籍出息以給售馬之直六年四月二十五日文彥博蔡挺云云吳沖卿蔡子正等為樞密副使上言請廢河南北監牧司文潞公為樞密使以為不可元厚之為翰林學士與曽孝寬受詔詳定厚之計其吏兵之祿及牧田可耕種所以奏稱兩監歲費錢五十六萬所息之馬用三萬緡可買詔盡廢天下馬監止留沙苑一監選其馬可充軍用者悉送沙苑監其次給傳置其次斥賣之牧田聽民租佃儘令轉運司輸每歲所省五十三萬緡於市易務馬既給諸軍則當給芻粟及傔衣糧所費甚廣監馬送沙苑止四千餘匹在道羸瘠死者殆半國馬盡於此矣時熙寧八年冬也此據司馬光記聞當考兵志第六卷六年四月二十五日羣牧制置使文彥博言議者欲賦牧地與民而斂租課散國馬於編户而責孳息不便乃詔元絳蔡確比校利害上之於是中書樞密院言河南北十二監起熙寧二年至五年歲出馬千六百四十匹可給騎兵者二百六十四餘止堪給郵傳而兩監牧歲費及所占地租總五十三萬九千六百三十餘緡而所出馬為錢三萬六千四百九十六緡而已其九監馬三萬餘匹倘不更制則日有死耗於是詔以苑監𨽻羣牧司廢八監并兩監牧司善馬分𨽻諸監餘鬻之收其租之入以給市易茶本錢餘寓常平籍取子錢以市馬馬監兵五千以為廣固保忠指揮修完京城焉初欲廢監牧樞密院文彥博吳充固爭以為監牧不當廢若外敵旅拒馬不可買則中國如何得馬恐法不善但當變法王安石曰向令劉航變法初人固知其無後效非今而後可知也密院委人立法牧養諸司不得關預行之一年乃費五十三萬緡得三萬貫今欲變法恐復如劉航且今所校利害止公家費省而已民之利害尚不備言如馬之害稼田之廢耕此乃民之利害也上曰雖如此牧馬亦無補于是卒廢之按廢監牧實在八年四月二十八日雖中書密院奏稱二年至五年蓋以五年馬數比較耳夲志便于六年係此事誤也既書六年卒廢監牧繼書七年又廢鄆州東平監以其地賦民後遂廢高陽真定太原大名定州五監如東平故事八年以廢監財充市易夲錢外以給熙河歲計十二月云云序事失次如此今不取紹聖三年七月六日張赴等云云可考詔北京澶定州封樁糧草令三司月具已有見闕數以聞上批代州見與北人分界而水峪地一事初未結絶今韓縝奏已定日於西陘與蕭素梁頴相見緣水峪地未了恐不可隔越無序可令依所降朝旨商量候事畢日迤邐西去分畫先是上批聞河北河東上等户至今流移不絶或緣與下户同保請常平錢榖保內人近因乏食多已逃散懼將來獨於户下催理故一例遷避宜令所在體量以聞時七年十一月丁酉也是日王安石以諸路體量狀進呈惟磁相州言有上户流移多因災傷闕食或為分房減口初不緣抱下户欠常平錢榖餘皆云無之安石遂白上磁相言上户有逃移亦恐未實緣其奏稱或為分房減口豈得謂之逃移不知當時誰為陛下言此何不明示姓名令彼分析是何處有此事上曰忘記是誰言此安石曰彼既言之必有事實若有事實即是州縣監司合根究蔽欺若無事實即如此誣罔之人存之何利陛下欲明目達聰則容長此輩適足自蔽耳上曰如吳中復即已施行安石曰兩制奪一官何足以懲姦天下事如煮羮下一把火又隨下一杓水即羮何由有熟時也神宗憂民至矣而王安石所言乃如此因具載之移去年十一月三日上批附此庶易觀覽也吳中復責官事在今年二月七日朱夲于七年十一月三日削去墨夲簽貼云體量到並無流移係進呈訖新本復存之所謂進呈訖即安石云云也
