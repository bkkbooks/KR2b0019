body:
  text: 續資治通鑑長編巻五十七宋李燾撰真宗景德元年八月乙夘涇原部署陳興言率兵與熟尸折宻桑等族掩擊偽署萬子軍主族帳於烏爾戩咸巴川擒俘三百餘人斬首二百五十三級虜獲牛馬器仗三萬一千計賊黨敗走悉焚其廬帳即日回軍又與賊遇俘斬獲其資畜甚衆詔所獲戎俘並給土田資糧無令失所賜賚興等有差陳興本傳云與曹瑋秦翰領兵抵鎮章戎軍西北烏爾戩咸巴川掩擊蕃寇宻族帳斬二百餘級擒三百人奪鎧甲牛羊駞馬三萬計詔書嘉奬按此俘斬獲數頗與實錄合而蕃部名字不同據曹瑋傳亦不云與興皆出恐别一事然本傳載此事於破康努卜族以前則失先後之序矣當考是日上御崇政殿出陣圖示輔臣己未以叅知政事吏部侍郎畢士安三司使兵部侍郎寇準並依前官平章事是時契丹多縱遊騎剽掠深祁間小不利即引去倘佯無鬬意準曰是狃我也願朝廷練師領簡驍銳分據要害地以備之宣徽南院使知樞宻院事王繼英為樞宻使同知樞宻院事馮拯陳堯叟並為簽書樞宻院事仍詔拯堯叟俸秩恩例並同樞宻副使繼英小心謹靖以勤敏稱上倚愛之舊制樞宻祖母母止追封郡太夫人特詔悉加國封樞宻直學士工部郎中劉師道權三司使公事自後三司除使多用此制庚申知壽州陳堯佐上言饑民劫窖藏粟麥者凡七十餘人以强盗計贓法當死詔並决杖黥靣配牢城為首者𨽻五百里外餘𨽻本州堯佐在州自出米為糜以食餓者而吏民皆爭出米共活數萬人堯佐曰吾非行私惠葢以令率人不若身先而使其從之樂也詔滄州乾寧軍常督壕寨主吏謹視斗門水口俟海潮至擁入御河東塘堰以廣灌溉從知雄州何承矩之請也先是朝廷每以敇書約束邊事或有當行極斷等語官吏不詳深意即處大辟洛苑使李繼和言其事辛酉詔諸路州軍自今有云重斷極斷處斬决配之類悉須具獄以聞魯國長公主上言乞授翰林醫官趙自化尚食使兼醫官院事上謂樞宻使王繼英等曰雍王元份亦嘗以自化藥餌有功請除遥郡刺史諭以醫官領郡非朝廷典制不可行也况自化今為本院使居醫官之首安可更有請求宜召至樞宻院戒督之己巳定審刑院詳斷案牘之限大事十日中事七日小事五日詔京朝官使臣犯罪論决訖有司具罪名報審官三班院其官吏犯贓私罪被推者勘事官具有無舉主以聞鳳凰見白州羣臣奉表稱賀吏部銓司言諸州幕職官多歲滿者常選中少正入資叙人注擬乃令常叅官各二人共舉州縣一人充幕職上視選人判詞有極紕繆書字不成者宰相寇準建議自今銓司引對日齎所試書判以備奏御從之甲戌邊臣言契丹謀入寇詔鎮州所屯河東廣銳兵及近南州軍先分屯兵並赴定州乙亥秦州言李繼遷蕃部寇永寧寨為裕勒凌族和蘇擊敗之斬首百餘級先是保平節度使駙馬都尉石保吉求兼相印上以問李沆沆曰賞典之行須有所自保吉因縁戚里無攻戰之勞驟據台席恐騰物議上他日詢之執奏如初其事遂寢及沆卒保吉求請不已丙子以保吉為武寧節度使同平章事戊寅鎮寧節度使贈太尉柴禹錫卒己夘供備庫使白守素領康州刺史先是守素自威虜軍徙冀州轉運使劉綜言守素武勇材任將帥請除正刺史上謂近臣曰將帥有功列狀以聞可也酬勞命秩自有常典綜何與焉不許上語近臣此據尹洙覆奏李京乞責洙狀當考淮南轉運司言楚州吏民列狀述知州太常博士何臨政績願借三年詔特留一年何臨未見陜濵棣州言蟲螟害稼庚辰遣太常博士直史館何亮侍禁閤門祗候康宗元未見乘傳廣南東西路疏理繫囚詔西面縁邊州軍所管熟戸蕃部或有鬬訟官吏不能遵守條制依理平决或旁縁騷擾致生邊隙自今轉運副使常切按察其不能綏邊勤職者具名以聞戎人葉吉特族侵掠環慶界詔邊臣和斷如不從則以兵威脅之詔學士院自今所賜内外羣臣奬諭敕書並須明述績効始末及若干人數先是羣臣得敕書奬諭及受代考課赴調多執以自陳希望旌賞然不詳事狀或言某等者不見同功人姓名酬庸之際難於區别故有是詔詔西川諸路廵檢兵士逐處州軍造廨宇營壁以居之初不許創立廨宇營壁多分泊道塗上封者言其非便也先是遣中使齎御劔赴北靣諸路以嚴軍令九月癸未悉詔歸闕以劔付部署司有犯者施行訖具事奏聞丙戌荆湖轉運使言富州刺史向通漢遣人於潭州營佛事以報朝廷存恤之意遣使分詣河北河東集强壯借庫兵給糧訓練非縁邊即分畨迭教敵騎入寇悉入守城寇退放營農此據兩朝兵志實錄甚略今不取詔諸路轉運使副辯察所部官吏能否為三等公勤㢘幹惠及民者為上幹事而無㢘譽清白而無治聲者為次畏懦貪猥者為下並列狀以聞從右司諫髙伸之請也伸未見丁亥徙知廬州右諫議大夫宋太初知汝州轉運使言其被疾多遺忘故也河北轉運使劉綜言每歲朝廷遣使賜邊城冬服諸軍將校皆給錦袍唯轉運使副止頒皂花欹正拜賜之際頗用厚顔丁亥并賜河東北陜西三路轉運使副方勝練鵲錦袍詔給北靣三路都部暑王超公用錢滿萬緡餘並増給有差徙河北近南州軍兵屯澶州候追發赴邊以就芻粟省饋送也鎮戎軍言先叛去蕃官伽羅鳥蔵策旺等三族及咱伊軍主率屬歸順請獻馬贖罪特詔宥之給其馬直據實錄乃二事今從吐蕃傅連書庚寅詔翰林學士承㫖宋白以下七十人於京朝官及諸司使副閤門祗候以上保舉歴任無贓罪堪充大藩及邊郡知州各一人定州副都部暑王能䕶城蒲隂躬帥丁夫旦暮不離役所宴犒周洽㑹使者自北靣至言于上辛夘詔褒飭之王能以七月八日庚寅為邢洺部署不知何時徙定州當時代張凝凝却徙保州但實錄不詳耳壬辰詔北靣縁邊州軍部暑等不得輙離屯所迎送使命先是邊將多領兵出城一二十里躬行餞勞上慮其忽被侵軼故條約之上以三司吏人能否雜混命宮苑使劉承珪等與本司使副同加試驗裁定合留人數三部并諸司定留八百九十人其書計非精或嘗負罪犯者列名以聞上念其祗役歲乆量其事狀並補三班及鎮職焉丙申祁州團練使劉用為邢洺州副都部暑詔河北河東諸路部暑各謹邊備仍發廣㨗軍五指揮赴忻州令知火山軍李餘懿領援忻代諸寨及分守要會以禦戎人之奔衝李餘懿未見丁酉上謂輔臣曰累得邊奏契丹已謀南侵國家重兵多在河北敵不可狃朕當親征决勝卿等共謀何時可以進發畢士安等曰陛下已命將出師委任責成可也必若戎輅親行宜且駐蹕澶淵然澶淵郛郭非廣乆聚大衆深恐不易况冬候猶逺順動之事更望徐圖寇準曰大兵在外須勞聖駕暫幸澶淵進發之期不可稽緩王繼英等曰禁衛重兵多在河北所宜順動以壯兵威仍督諸路進軍臨時得以裁制然不可更越澶州庶合機宜不虧謹重所議進發尤宜緩圖若遽至澶州必不可乆駐詔士安等各述所見具狀以聞上每得邊奏必先送中書謂畢士安寇準曰軍旅之事雖屬樞宻院然中書總文武大政號令所從出鄉者李沆或有所見徃徃别具機宜卿等當詳閲邊奏共叅利害勿以事干樞宻院而有所隱也因言樞宻之地尤須謹宻漏禁中語古人深戒若與同列及樞宻彰不協之跡則中外得以伺其間隙實非所便卿等志之己亥詔曰先朝謹重刑章肇置官局俾當審克之任列於局禁之間葢欲犴獄不寃議讞必當然皆親奉成案伏奏禁坐既有㫖命方封中書而宰司以經奏之事即爾行下其間情狀不一或從比附不加參酌殊非謹審之㫖也葢念仕進之伍偶經刑名之書雖務從輕亦難自辯自今審刑院進案一依舊例批所得㫖送中書看詳如刑名允當即以敕文處分勿言審刑院得㫖如其未當則復以聞務在平允稱朕哀矜之意焉三司言鳳翔專知官宋福逋官課水銀三百餘斤籍其家貲并監官王祐之追納錢百二十餘萬詔悉蠲放其先納者還之詔許永興軍同華耀州解鹽通商仍以戸口市鹽錢數分配部民隨夏稅輸納每錢四十四支鹽一斤從轉運使朱台符之請也契丹班濟庫耶律烏裕來降補三班奉職庚子詔陜西諸州今年秋稅折納芻千一百二萬束宜特免四百萬邠寧等十九州軍秋稅每斗加官糶計六十五萬餘石宜特免十之三乾寧華等十三州稅芻欲支於環慶州納錢官市者悉罷之屯田郎中楊覃工部員外郎直史館朱台符並為陜西轉運使台符俊爽好謀多所更張覃止欲因仍舊貫遂有隙交相論奏初寇準知青州台符為通判至是準任宰相覃意台符慿恃僚故又宻以聞上遣御史視其狀覃台符並坐議事違戾罷使辛丑覃責知隨州台符知郢州徙荆湖北路轉運使度支員外郎李士衡河北轉運使殿中侍御史句克儉代覃及台符仍令御史臺以其事傳告諸路加儆勵焉宋州言汴水决壞田廬命内侍王懷昭督兵匠䕶塞之踰月工就壬寅三路部署王超言日與知州通判軍職等㑹食飲酒或至日旰慮妨公務請隔日一㑹食上曰軍中舊制驟令改易恐羣議非允命超如故事癸夘契丹林牙使攝推官劉守益等及其兄恕來降乙巳置祁州於蒲隂縣丙午魯國公主言遣人於華州市木乞免征算上曰先朝深戒戚里不得於西路市木葢慮因縁販易侵壞法制魯國公主所請今且從之仍召駙馬都尉柴宗慶戒諭自今無得復爾己酉占城國遣使來貢方物詔以良馬介胄戎器賜之從所乞也庚戌詔諭館閣臺省官有簡札請屬舉人即宻以聞隱匿不告者論其罪河决澶州横壠埽命知制誥李宗諤致祭官具舟楫濟民乏食賑之辛亥以永清節度使周瑩為天雄軍都部署知軍府事代河陽三城節度使王顯也命顯歸本鎮顯上疏陳三䇿以為大軍方在鎮定敵必未敢引衆南侵若車駕親征望且駐蹕澶淵詔鎮定出軍㑹河南大軍合勢攻殺或契丹主與其母氏虚張形勢以抗我師濳遣銳兵南下迫河與駕前諸軍對敵即望令鎮定之師直趍彼帳攻其營寨則縁河遊兵自退所謂不戰而屈人兵也或分遣騎兵千步三千於濮州度河横掠澶州繼以大軍追北掩敵此亦出其不意也詔内外羣官所保舉人亦有中道遷變儻或不令言上必恐負累滋多宜令自今此類並許陳首當懲責其人特免連坐先是洛苑副使李允則知滄州廵視州境川原道路浚浮陽湖葺營壘官舍間掘井城中人厭其煩是月召歸及契丹來攻老幼皆入保而水不乏又取冰代砲石以拒之遂解去上乃謂允則曰頃有言卿浚井葺屋為擾民者今始知卿善守備也轉西上閤門副使鎮定髙陽三路行營兵馬都監押大陣東面三路都監押大陣東靣實錄無之今從本傳請對自陳武技非所長不可以當邊劇上曰卿為我運籌䇿不必當矢石也賜白金二千兩副以帷帳什物凡下諸路宣制必屬允則省而後行允則嘗請選武臣知祁州代大理寺丞髙尹上曰尹通判真定有幹職稱朕以祁州新建藉人綏緝故徙任之其後頗聞城隍漸完州事粗治邊郡須任武臣非通論也髙尹事據寳訓附見當考閏九月癸丑遣使勞北靣諸軍賜錢有差洺州團練使上官正知滄州兼部署詔分西靣縁邊兵赴寧州及慶州竢寇至乃追發宋州言决河塞水復故道乙夘令代州副部署元澄俟戎人南牧即率所部於境上禦備牽制之仍令并代州副部署雷有終至時領兵由土門路赴鎮州與大軍合寨於平定軍詔河北吏民有集强壯殺契丹者令所在援之仍頒賞格初開封尉張易捕盗八人送左軍廵獄成坐流既决乃獲真盗御史臺劾問得實前知府梁灝已卒判官屯田員外郎直史館盛元責監洪州稅推官贊善大夫李湘責監永豐稅李湘未見丁巳内出銀三十萬兩付河北轉運司貿易軍糧命國子博士張紳祕書丞陳綱大理評事祕閣校理劉筠同經度之張紳未見陳綱泉州人己未甘州回鶻遣使來貢方物時有詔禁蕃部私買係禁香藥回鶻有違禁者三司請即論决上曰絶域逺來未知國法驟加刑辟恐失綏懷之道乃令先具罪狀以聞庚申令北靣縁界河部署康進邢州路劉用各率所部赴滄州邢州屯守戎人入寇即邀擊之癸亥令天雄軍以北及濱棣德博等州警察部内有因敵騎入寇驚劫民戸資財情理切害者不限有贓無贓首從並處斬訖奏自餘禁繫取裁䕫州路轉運使薛顔等言川峽戍兵等素不閲習内䕫施最近蠻境請各付戎器時加練訓從之丙寅以馬軍都指揮使感德節度使葛霸為澶州修河都部署崇儀使張利涉内殿崇班王懷昭副之葛霸真定人張利涉未見丁夘命内侍左班副都知閻承翰同制置河北東西路縁邊事戊辰命考功郎直祕閣潘謹修詣邢州祭醮為民祈福以修城功畢也詔戸部判官工部員外郎李防右正言直史館張知白等分詣江南東西路理繫囚訪民疾苦祠境内山川旱故也己巳令諸州兵在京執役者兩月一賜緡錢辛未北靣都部署王超等引大軍頓唐河樹營柵以備寇辛未十九日也二十三日奏到按後文癸酉條注及己夘條注引實錄皆稱二十二日癸酉則此辛未應屬二十日先是判太常禮院孫何等言准詔與崇文院檢討詳定司天所奏明德皇后園陵月日者伏以宗廟之儀饗祀為大若三年不祭則闕孰甚焉今司天言丙午歲方利大葬今歲止可於壬地權殯仍勿動土臣等再三詢問復有論列安敢以禮官博士之議拒馮相保章之說况事繫園寢理務便宜今叅詳䘮葬之義古有變禮合祔自乎姬旦始墨由乎晉襄書之簡編亦無譏誚按禮云葬者藏也欲人不得見也既不欲穿壙動土則莫若就司天所擇之地依䘮記王后之殯居棺以龍輴攢木題湊象椁上四注如屋以覆葢盡塗之所合埋重如不欲入土則至時焚之如此則是用攢禮而有葬名所冀稍合經典便可行虞升祔神主薦享宗廟上曰陰陽拘忌前代不取今但依典禮而行不煩定議宰臣李沆等奏近年皇屬繼有悲慘又母后上仙聖心過有哀毁陰陽之說亦有所疑恐須避忌若如禮官所請則於國家之禮得合便宜宗廟之祠亦無曠闕議既定宗正卿趙安易言禮云既虞作主虞者已葬設吉祭也明未葬則未立虞主及神主所以周制但鑿木為懸重以主神靈王后七月而葬則埋懸重掩元宮凶仗輼輬車龍輴之屬焚於栢城訖始可立虞主吉仗還京備九祭復埋虞主然後立神主升廟室自曠古至皇朝上奉祖宗陵廟遵行此禮何以今日乃違典章茍且升祔方權攢妄立神主未大葬輙埋懸重奈棺柩未歸園陵則神靈豈入太廟栢城未焚凶仗則凶穢唐突祖宗望約孝章近例祖於壬地權攢未立神主升祔凶儀一切祗奉俟丙午年靈駕西去園陵東囬祔廟如此則免於顛倒不利國家安易又請下臺省集百官分析乃詔有司再加詳定孫何等上言按晉書羊太后崩廢一時之祀天地明堂去樂不作又按禮王后崩五祀之祭不行既殯而祭所言五祀不行則天地之祭不廢遂議以園陵年月不便須至變禮從宜又縁先准禮文候神主升祔畢方行饗祀若候丙午歲則三年不祭宗廟禮文有闕况明德皇太后德配先朝禮合升祔遂與史館檢討同共叅詳以為廟未祔則神靈不至伏恐祭祀難行攢既畢則梓宮在郊可以比附葬禮安易本不知書直謂未升祔間諸廟既及七月即合依時薦享所以妄逞瞽言以凶仗為凶穢目羣官為顛倒指斥梓宮直名棺柩令百司分析園陵凂凟聖聰誣罔臣下安易又云昔日覩羣官盡公奉二帝諸后並先山陵後祔廟今日覩羣官顛倒奉明德皇太后獨先祔廟後園陵今詳當時先山陵後祔廟葢為年月便順别無陰陽拘忌今則年月未便理合從宜未埋重則禮文不備未升祔則廟祭猶闕須從變禮以合聖情兼明德皇太后將赴權攢而安易所稱栢城未焚凶仗則凶穢唐突祖宗按檀弓云䘮之朝也順死者之孝心也鄭元注云謂遷柩於廟又云其哀離其室也故至於祖考之廟而後行商朝而殯於祖周朝而遂𦵏今亦遥辭宗廟豈可以禮經所出自為顛倒吉凶具儀謂之唐突又云孝章皇后至道元年崩亦縁有所嫌避未赴園陵出京權攢之時不立神主入廟直至至道三年西去園陵禮畢然後奉虞主還京易神主祔廟以合經典今詳當時文籍縁孝章為太宗嫂氏上仙之時止輟五日視朝百官不曽成服與今不同從初亦無詔命令住廟享今明德皇太后母儀天下主上孝極曾顔况上仙之初即有遺命權停享祀今按禮文固合如此安易荒唐庸昧妄有援引以大功之親比三年之制欺罔君上乃至於斯况安易本乏時材實無公望以訐直自負所詆者無非善良以清要自髙所尚者無非鄙俗名官之志老而益堅詩書之文懵而不習本院所議並明稱典故旁考時宜雖曰從權粗亦稽古請依元議施行從之癸酉明德皇太后靈駕赴攢宮於安肅門外旌孝鄉之沙臺有司言奉辭禮畢請吉服還内皇帝及諸王六宮縗服絰杖並焚之至丙午歲改葬依禮例服緦上初覽奏甚難其事宰相固以請乃詔皇族心䘮畢三年之制契丹主與其母舉國入寇其統軍順國王達蘭引兵掠威虜順安軍魏能石普等帥兵禦之能敗其前鋒斬偏將獲印及旗鼔輜重又攻北平寨田敏等擊走之又東趣保州州振武小校孫宻領十卒偵事中路遇敵前鋒宻等依林木彀弓弩以待之敵下馬以短兵格鬬宻等射殺十數人又殺其軍校獲所佩右羽林軍使印進攻州城不利而北是日二十二日也達蘭與契丹主及其母合勢以攻定州王超陣于唐河執詔書按兵不出戰敵勢益熾其輕騎俄為我裨將所擊乃率衆東注陽城淀契丹以閏月二十二日至唐河與大軍遇十月六日王超奏始到王繼忠書云二十二日至唐河超奏二十四日復至而繼忠書無之或繼忠不盡言其事乎實錄於閏月二十四日即書北靣奏繼忠致書石普所稱北靣當指王超然超奏後此十餘日乃達恐此非超奏也且敵以二十二日至唐河後兩日朝廷即得繼忠書似太早疑實錄乃追書此事不必因北靣奏耳威虜至京二十一程順安一十九程北平一十九程定州一十八程實錄本紀及契丹傳載威虜順安北平之㨗皆重出其實一事耳縁北靣都部署與諸路都部署各奏其奏又不同到故史官誤書也今不取又按魏能傳云上以能勇幹再任威虜配精甲伺戎人動止戎人百餘剽居民樹蕃僧為帥能與田敏楊勲合兵設伏擊之擒其帥戎人逼軍城能與張凝出兵拒之我師小衂能即引衆入城凝戰走之田敏傳云敏為北平部署賜御劍聽以便宜從事敵復入寇敏與戰楊村敗之敏諜知契丹主去北平十里蒲隂駐寨期翌日再攻北平敏夜率銳兵襲破其營帳契丹主大驚問達蘭曰今戰者誰達蘭曰所謂田廂使契丹主曰彼鋒銳不可當遂引衆去所稱楊村之戰他傳無異辭能逗撓無功見張凝傳今就十月乙巳及下二月癸巳分載之順安之㨗其部署葢石普也而普傳特不詳實錄於閏月二十二日癸酉載北平之㨗亦並稱田敏楊勲不知楊勲時為何官保州為部署者又不見姓名皆當細考寇準言邊奏敵騎已至深祁以東縁三路大軍在定州魏能張凝楊延朗田敏等又在威虜軍等處東路别無屯兵乞先發天雄軍步騎萬人駐貝州今周瑩杜彦鈞孫全照部分或不足則止發五千人專委孫全照如敵在近仰求便掩擊仍令間道約石普閻承翰相應討殺及募强壯入敵境焚毁族帳討蕩生聚多遣探伺以敵動靜上聞兼報天雄軍一安人心二張軍勢以疑敵謀三以震石普閻承翰軍威四與邢洺相望足為掎角之用又曰扈從軍士不當與犬戎爭鋒原野以决勝負今天雄軍至貝州屯兵不過三萬人萬一敵騎已營貝州以南即自定州發三萬餘人俾桑贊等結陣南趣鎮州及令河東雷有終所部兵由土門㑹定州審量事勢那至邢洺間鑾輿方可順動更敕王超等在定州翼城而陣以應魏能等作會合之勢候抽移定州河東兵附近始幸大名又曰萬一敵柵於鎮定之郊定州兵不可來邢洺之北漸被侵掠須分三路精兵就差將帥會合及令魏能等迤邐東下傍城牽制敵必懷後顧之憂未敢輕議深入若車駕不行益恐蕃賊戕害生靈或是革輅親舉亦須度大河且幸澶淵就近易為制置會合控扼王得臣麈史載此疏稱閏九月今附見先是寇準已决親征之議叅知政事王欽若以寇深入宻言於上請幸金陵簽書樞宻院事陳堯叟請幸成都上復以問準時欽若堯叟在旁準心知欽若江南人故請南幸堯叟蜀人故請西幸乃陽為不知曰誰為陛下畫此䇿者罪可斬也今天子神武而將帥協和若車駕親征彼自當遁去不然則出竒以撓其謀堅守以老其衆勞逸之勢我得勝算矣奈何欲委棄宗社逺之楚蜀耶上乃止二人由是怨準欽若多智準懼其妄有關說疑沮大事圖所以去之會上欲擇大臣使鎮大名準因言欽若可任欽若亦自請行乙亥以欽若判天雄軍府兼都部署提舉河北轉運司與周瑩同議守禦記聞載王欽若陳堯叟之言並云車駕時在澶淵按欽若以閏九月二十四日除知大名十月初二日行車駕以十一月二十日方親征記聞葢誤也魏泰東軒錄載準召欽若至行府諭意及酌上馬杯令欽若即日馳騎赴鎮此尤繆妄今依約仁宗實錄準及欽若本傳刪修其實準先已决澶淵之議欽若與堯叟潛沮之準因斥言其過雖斥言其過葢未嘗靣斥欽若等固亦不於上前公獻此䇿本傳遂云準斥欽若等恐未必然爾張唐英作準傳又有江南人勸幸金陵蜀人勸幸成都之語若謂準私以為然則可耳必不對上斥言也且唐英叙準事多失實今皆不取欽若既不能沮準則因請守魏以自効姦邪為身謀或多如此本傳宜得之劉攽作丞相萊公傳亦云上北廵至澶州不欲渡準始請斬建議幸金陵及蜀者與司馬光記聞同誤今不取初殿前都虞候雲州觀察使王繼忠戰敗為敵所獲即授以官稍親信之繼忠乘間言和好之利時契丹母老頗有厭兵意雖大舉深入然亦納繼忠說於是遣小校李興等四人持信箭以繼忠書詣莫州部署石普且致宻奏一封願速達闕下詞甚懇激興等言契丹主與母召至車帳前靣授此書戒令速至莫州送石帥獲報簡即馳以還是日普遣使齎其奏至上發視之即繼忠狀具言臣先奉詔充定州路副都部署望都之戰自晨達酉營帳未備資糧未至軍不解甲馬不芻秣二日矣加以士卒乏飲冒刃爭汲翌日臣整衆而前邀其偏將雖勝負且半而䇿援不至為北朝所擒非唯王超等輕敵寡謀亦臣之罪也北朝以臣早事宫庭嘗荷邊寄被以殊寵列于諸臣臣嘗念昔歲靣辭親奉德音唯以息民止戈為事况北朝欽聞聖德願修舊好必冀睿慈俯從愚瞽上謂輔臣曰朕念徃昔全盛之世亦以和戎為利朕初即位呂端等建議欲因太宗上仙命使告訃次則何承矩請因轉戰之後達意邊臣朕以為誠未交通不可强致又念自古獯鬻為中原强敵非懷之以至德威之以大兵則獷悍之性豈能柔服此奏雖至要未可信也畢士安等曰近歲契丹歸欵者皆言國中畏陛下神武本朝雄富常懼一旦舉兵復幽州故深入為寇今既兵鋒屢挫又耻於自退故因繼忠以請諒亦非妄上曰卿等所言但知其一未知其二彼以無成請盟固其宜也然得請之後必有邀求若屈已安民特遣使命遺之貨財斯可也所慮者關南之地曽屬彼方以是為辭則必須絶議朕當治兵誓衆躬行討擊耳遂以手詔令石普付興等賜繼忠曰朕丕承大寳撫育羣民常思息戰以安人豈欲窮兵而黷武今覽封疏深嘉懇誠朕富有寰區為人父母儻諧偃革亦叶素懷詔到日卿可宻達兹意共議事宜果有審實之言即附邊臣聞奏繼忠欲朝廷先遣使命上未許也國史契丹傳改北朝字作彼中及削去王超等輕敵寡謀及上謂宰臣等未知其二以下等語今依實錄並著之庶不失事實丙子以天雄軍都部署周瑩為駕前東靣貝冀路都部署潁州防禦使杜彦鈞副之供備庫使綦政敏政敏未見為鈐轄馬軍都指揮使葛霸為駕前西靣邢洺路都部署步軍都虞候中牟王隱副之西上閤門使孫全照為鈐轄上召全照與語命兼天雄軍及貝冀等州鈐轄仍令察視北靣機事全照言若敵南逼魏城但得騎兵千百必能設竒取勝上賞其忠果足張兵威乃詔都部署周瑩若全照欲擊敵即分兵擊之是日令河北近南州縣民人入處城寨以寇侵逼故也丁丑令府州自今勿擅發兵入唐龍鎮管内剽掠如蕃漢人亡命在彼須追究者以聞當詔遣還己夘岢嵐軍使開封賈宗奏敵騎數萬入寇草城川率兵擊敗之翌日復至又敗之遂北出境有詔嘉奬令轉運及部署司具將士功狀以聞并代鈐轄髙繼勲實率兵來援登髙望草城川謂宗曰敵衆而陣不整將不才也我兵雖少可以竒取勝先設伏山下戰合必南去爾起乘之當大潰與戰至寒光嶺伏發敵果敗自相蹂躪者萬餘人獲馬牛槖駞甚衆既而宗自供奉官閤門祗候遷儀鸞副使繼勲自洛苑使遷弓箭庫使繼勲遷官在十一月己未宗遷在十一月丁巳今并書是月發兵屯昇洪州命有司擇官充鈐轄兼提舉兩路廵檢據實錄在癸酉二十二日嫌其與北邊事相亂移見月末
