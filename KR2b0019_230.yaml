body:
  text: 續資治通鑑長編卷二百二十六宋李燾撰神宗熙寧四年八月癸丑朔御文德殿視朝髙麗使民官侍郎金悌至自通州甲寅詔自今保甲與賊鬬死者給其家錢五十千有户稅者仍免三年科配因致廢疾者給錢三十千折傷者二十千被傷者五千以開封府界提㸃司言新籍畿縣民為保甲有奮不顧身捕盜者願優恤之故有是詔去年十二月乙丑初立保甲法又九月二十四日丁巳入內副都知張茂則言奉敕相度二股決河利害乞以開封府判官宋昌言都水監丞河北興修水利程昉同領役事從之仍以昌言同判都水監辛酉權發遣户部判官司門郎中張覲權發遣荆湖南路轉運副使虞部員外郎權發遣荆湖南路轉運副使范子竒權發遣户部判官上謂王安石曰數易職司不便范子竒才到又替安石曰子竒與潭州及提㸃刑獄交爭不已勢須移立且先儒言射禮以為始取茍能有功終用成法今天下職司多未能得人所用者皆取茍能而已方且課其功狀其稱職者乃可久任若見其不稱職已明而久留之適足隳敗一路如何不早移免久任誠善然在於用成法之時今則未可也即如陳知儉在京西則可以留久任矣知儉初除提舉常平廣惠倉三年十月權發遣運判四年十月權發遣運副因請具可用者姓名召對試令作提舉官果可用乃以為監司上曰馬珫可絀安石曰臣不敢為已甚上曰不才罷去非已甚安石唯唯退乃言上於貴近殊寬中書安得獨急珫先以河西縣令編修中書條例安石所薦也㑹要云馬珫以河西縣令為編修中書條例未見年月曽布制集有校書郎河西縣令編修中書條例馬珫以編修及一年遷著作即上又以曽布司農寺事多欲用曽孝寬為五房檢正安石言其不可遂寢之著作佐郎同提舉秦州西路蕃部及市易王韶為太子中允祕閣校理兼管勾秦鳳路緣邉安撫司兼營田市易西京左藏庫副使兼閣門通事舍人髙遵裕權秦鳳路鈐轄同管勾安撫司兼營田市易録效用人黃察為成州司户參軍管勾秦鳳路緣邉安撫司機宜等事秦州衙前王維新弓箭手指揮使楊英並為下班殿侍緣邉安撫司準備差使遣僧智緣乘驛隨王韶驅使仍賜銀三百兩置洮河安撫司自古渭寨接青唐武勝軍應招納蕃部市易募人營田等事並令韶主之調發軍馬及計置糧草即令秦鳳經略司應副韶以董戬摩正多與僧親善而僧結斡恰爾主部帳甚衆故請與智緣俱至邉初韶言措置洮河事止用回易息錢給招降羌人未嘗輒費官本文彥博曰工師造屋初必小計冀人易於動功及既興作知不可已乃方增多上曰屋壞豈可不修王安石曰主者善計則自有忖度豈至為工師所欺上曰郭逵亦不肯為此事彥博曰西蕃脆弱不足收安石曰星羅結等作過秦州乃不能捕况有豪傑能作文法連結黨與者哉亦豈得言其脆弱也彥博曰西人不能立文法安石曰嘉勒斯賚嶽居戬乃能立文法此已然之效也非徒如此若為夏人所收則為患大矣彥博曰西蕃不願歸夏國安石曰裕勒藏喀木見歸夏國若不願歸則向寶之往宜即倒戈今乃不肯內附何也彥博曰縱能使之內附亦何所補安石曰以喀木歸夏國故喀木地便為生地向寶不能深入以擾夏人然則西蕃屬我與屬夏人不得言無利害也彥博曰既收為內屬彼有警急恐須中國救援安石曰彼今不能合為一尚能自守不為西人所并今既連結則自可相救援不必待官兵矣若能為屏捍則雖以官兵援之亦所不計况又無此理上曰班超不用中國兵而自發外國相救今韶所謀正如此彥博曰如曩時西事初不謂勞費如此後乃旋生上曰西事本不令如此後違本指所以煩費安石曰如起兵事則誠難保其無後患若但和附外國豈有勞費在後之理馮京吳充皆曰此事未經延州相度上曰延州必不樂如此不須行下今當如何措置安石曰恐須别為一路如麟府軍馬司上曰須如此令得專達安石曰仍當捐十萬緡錢委之市易令兵馬事則取經略司節制撫納蕃部及市易司則一面施行上曰恐不須分定事任但令專達足矣安石曰譬如州縣杖以下委縣徒以上送州既有成法乃可遵守上曰善令差韶及遵裕充問孰為長安石曰王韶文官上曰當以文官為長安石又奏宜與韶職名韶材亦宜稱今招納到生羌雖未為用然亦不為無利西人不能交通生羌又如康莽等皆不煩官兵捕獲結斡恰爾已報可禽之計此皆招納之效若此三叛不獲秦州豈得無虞如其連結不已則其為患大小又未可知但如目前固已有利况盡如韶本謀哉上令與錢如安石言安石曰此錢必無陷失就令收息不多亦必可足生羌廩給犒賞之費上曰且當極力主張待其成效異時朝廷作事未見成效一有人言輒為之沮廢堯之用鯀亦須九年績用不成然後加罪若未見成效輒以浮言沮廢則人何由自竭安石曰誠如聖諭智緣者善醫察脉知人貴賤禍福休咎言輒驗京師士大夫爭造之或診父之脉而知其子禍福所言若神安石尤信之王圭疑古無此安石曰昔秦醫和診晋侯之脉而知其良臣將死夫良臣之命乃見於晋侯之脉則診父知子又何足怪哉上初欲與智緣僧職安石以為不須與且言嘗諭智緣以為今事未效遽䝉恩澤恐致人言智緣亦以為然第令市易司優給俟有功與官可也上用安石言更加白金之賜神宗史智緣本傳云智緣有口辨徑入蕃族說結斡恰爾等等族帳皆歸漢而轄約裕囉格勒裕勒藏納克凌結與巴勒凌結因智緣以蕃字來輸欵五年以撓王韶事召還為右街首座七年卒當考舊紀書置洮河緣邉安撫司新紀削去其削去非也癸亥贈慶州蕃落卒張吉內殿崇班録其子超爾為三班借職賜名忠初吉為淮安軍鎮和諾克烽子西賊虜至東谷城下劫之以兵使呼城中曰淮安等寨已破宜速降吉反其辭曰努力淮安等寨無虞賊糧盡且去切勿降賊因被害經略司以聞故有是命權發遣開封府推官朝端彥言畿內諸縣或遇夏秋災傷舊自中書差官檢覆不得亟至欲乞自今本府奏聞日直牒審官東院差官檢覆免煩中書降劄子所請被差官速至逐縣從之乙丑右諫議大夫天章閣待制齊恢卒司馬光日記云恢溫厚長者而不偏倚先知審刑議謀殺人許首事恢以為不可守之甚堅時人稱之丙寅閣門言髙麗使入見欲依夏國例立班紫宸殿燕坐東朵殿從之仍令在西立其燕坐次依此判大名府韓琦言大河泛溢金魏居衝非通判而下所預臣乞獨當重責詔琦所待罪釋之其河防當職官吏令河北提㸃刑獄司劾奏丁卯屯田員外郎知陽武縣李琮權利州路轉運判官役法初下琮處之有理畿內敷錢獨輕鄰縣撾登聞鼓願視陽武為比故召對擢用焉此據詔㫖內所載琮本傳實録因之又御集一百五十一卷賜王安石手札有云府界鄉村稅户出役錢至少又雖本身依舊做役更給得錢倍於所出之數在百姓之情宜各欣願今日又聞陽武縣村人五百餘人訴免必有因依未知所謂卿可具奏手札無月日不知是何時當考五月十一日琮已見林希野史云李琮知陽武縣素為王安石所知人意其首當進用琮自以赤心裨贊嘗諷其改作不當安石大怒同類盡用而不與語三年琮為推行青苖助役法為畿邑之最始召對除梓路運判此事當考己巳召輔臣觀穀于後苑著作佐郎蔡確大理評事唐坰並為太子中允權監察御史裏行從知雜御史鄧綰所舉也林希云坰賜出身知錢塘安石固留之為校書修令式又使綰薦為御史賜出身在三年七月癸巳除校書在九月庚寅修令式在十二月庚辰其自御史改諫官在五年二月癸丑庚午詔御史臺轉對官候輪遍即罷時御史臺言檢㑹儀制兩省及文班官候轉對將遍先申中書今員數不多乞預指揮因降是詔鄧綰傳云綰乞今後臣僚五月一起居常輪兩員轉對言事其已經轉對及自外任回者周而復始各具所見利害以聞如此則天下之視聽思慮不遺矣按此與詔書輪遍即罷㫖意不類此時綰政在臺或傳誤也今不取宋敏求東觀絶筆有轉對狀論校三館書狀末自注云四年十月二十九日其轉對乃十一月一日也然則雖有輪遍即罷之詔十一月一日敏求始輪到則盡此年轉對亦必罷也當考又詔司農寺選官經量汴河兩岸所淤官陂牧地逃田等召人請射租佃知麟州崇儀副使張居為西京左藏庫使先是州城井泉不足軍民汲於城外沙泉前後守欲築城以包之而土多沙礫不果城居命鑿去舊土而築之城成人以為便故賞之癸酉度支副使兵部即中楚建中為遼主生辰使西京左藏庫副使夏俅副之開封府判官太常博士祕閣校理韓忠彥為正旦使西染院副使閣門通事舍人李惟賔副之兵部員外即知制誥陳繹為遼國母生辰使皇城使忠州團練使馬稱副之度支判官司勳即中王誨為正旦使文思使郭宗古副之稱以祖應圖陷北辭行詔以文思副使梁交代之司農寺言諸路提舉常平官課績已許本寺考校升絀其管勾官即令提舉司保明上司農計功酬奬從之遣檢計開封府界溝洫河道安吉縣主簿程義路乘驛相度決河利害以聞墨本有此朱本削去五月五日義路開河丁丑命殿中丞樂渙提舉修置惠民河上下埧閘三班借職楊琰勾當戊寅觀文殿學士户部尚書知陳州張方平判南京御史臺從所乞也蘇轍代方平上疏論三悔或可附此司馬光日記云九月初四日張觀文判南京留臺安道素與介甫不善上初即位人薦介甫之賢者甚衆上訪於安道安道曰是人有虛名而無實用晋之王夷甫若果用之恐敗天下風俗介甫聞而銜之故安道以參知政事丁父憂服除而不復舊位知陳州內不自安故稱疾而去三年正月二十六日方平判都省注文可參考司封員外郎晏成裕勒停經恩未得叙用成裕殊子行檢不飭嘗易朝服縱游里巷為御史所言故絀之林希野史云晏承裕者富弼之妻弟也久流落失官居京師素無亷隅嘗微服游倡家㑹弼方以青苖得罪鄧綰因劾奏承裕游倡家弼當國時承裕慿藉聲勢事以悅朝廷事下府尹絳即日捕追倡陳氏收禁榜掠得三歲前承裕踰違狀坐其初供以姊為母不實親杖之于廷怒五百不痛杖釋而笞之備極慘酷以悅言者士有避持服遂不顧其母且擢在要顯倡以姊為母於名教何傷遂當死笞耶己卯前旌德縣尉王雱為太子中允崇政殿說書雱安石子也為人剽悍無所顧忌安石與弟安國白首窮經夙夜講誦琢磨雱從旁剽聞習熟而下筆貫穿未冠已著書數十萬言年十三時得秦州卒言洮河事歎曰此可撫而有也使夏人得之則吾敵彊而邉受患博矣故安石力主王韶議治平四年雱舉進士授旌德尉不赴作䇿三十餘篇極論天下事皆安石輔政所施行者又作老子訓傳及佛書義解亦數萬言有以雱書聞者於是安石方奉祠上遽召見而有是命安石亦喜雱得親近能助已因不復辭林希野史政府客篇云相客日在中朝議事然猶不日到介門有或密詣為同舍所知而有愧色常有二人同出右掖門布居城南歸必過介門惠居城北心欲詣介相揖分途而潛由間道以往無何至介門二人乃相遇大慚以衣掩靣俯首而過自後此輩乃日日詣之不以為慚日為不足又夜宿其家既欲邀固恩寵以至數為勤且以自詫於同列由是爭進者不以日往為非而以不得早通為愧介久欲除定惇二人直舍人院上意未允京亦屢言此二人不可任此職一日再擬定名進必欲除之上曰定終是不協物議遍問檢正官姓名時許將新除右正言上曰將狀元及第又已除正言何不令直院介不能拒又月餘張琥坐論張詵事奪修注以常秩代之秩辭而罷時定坐詵事繫御史獄惇日夜覬望彌切無何惇亦往證定事牽連入臺又失所望朱明之介之妹壻妹卒又娶其姪以固姻好知晋州臨汾縣例當移川河東漕舉以為勾當官以移川不行介即改法諸路勾當官不礙入逺遂得之介猶未快意欲召用以沮審官㑹絳奏黜陜西提刑髙賦安石言朱明之嘗為臣言賦為吏嚴明未必如絳所奏上問明之如何人安石退曰臣妹壻請問京京進曰臣在河東日明之為屬縣有學行可取上令召對辛亥二月與王欽臣同對明之即除崇文校書刪修編勑十餘日又授太子中允集賢校理崇政殿說書同管勾國子監欽臣則遣歸本任而已安石子雱上即位初中第調旌德尉耻不赴求侍養及安石暴進執政用諸少年雱尤欲預選與父謀執政子弟不可預事惟經筵可處安石欲上知而自用雱乃以所為䇿及注道德經鏤板鬻于市遂傳達於上而綰琥布惇等皆於上前力薦雱道德卓絶不宜以父嫌不用臣亦言雱病瘁卧家陛下宜速用之上雖有意用雱而未寤其意在經筵但以明之其家壻又傳其學意以明之居是職安石必悅及命下雱大不樂明之殊不悟乃謀於雱雱曰命必不改第堅辭可也安石又白上明之雖好學未足以當此任上曰若然可盡罷也明之雖辭新命然已不赴勑局居家習進讀且擇日拜職矣忽悉罷之怏悵而已自庚戌八月惠卿以憂去除布尋聽其辭反先除定定罷為檢正而說書久不除人意在雱耳九月執政皆習儀於外上忽使使召雱對於延和明日除太子中允崇政殿說書人以安石必辭乃殊不然但為雱一狀申堂便出受勑於明堂前放謝十月赴職冬至輟講其間講罷旅退上留雱語者凡四五每獨出徑詣中書閣中密語然後人知上所議有不欲他執政預聞者使雱密達於安石也明之心怨其父子且欲誇示外人朝夕出入門下事之益謹每就安石閣寢擕枕被徘徊廊廡間安石引他客密語三四鼓客去明之巳不得語指使輩皆笑之明之除校書在正月辛亥非二月也除說書乃二月丁卯又雱為說書在八月己卯亦非九月此月日希必誤然所載事或得其實附注當考希又云蘇頌子嘉在太學顔復嘗䇿問王莽後周改法事嘉極論為非優等蘇液密寫以示布曰此輩唱和非毁時政布大怒責琥曰君為諫官判監豈容學宫生員非毁時政而不彈劾遂以示介介大怒因更制學校事盡逐諸學官以定秩同判監令選用學官非執政喜者不預陸佃黎宗孟葉濤曽肇沈季長長介妹壻濤其姪壻佃門人肇布弟也佃等夜在介齊授口義旦至學講之無一語出已者其毀三舍皆欲引用其黨耳相客有日在介側其次未能日在介側者多潛處子舍又其次嘗坐罪纍或蹤跡逺辭貌卑惡未必足以動介而饒財者皆日狎安上安禮凡典客不與通者但堅坐其側介或過子舍即因緣得見或解衣夜談二三鼓而罷施邈造李德芻沈遼蘇州宋彭年蔡延嗣天申胡淵皆厚設飲食歌舞以邀禮上輩或公遊倡家或侵玩其姻妾佯為不知冀以結歡或賭博佯為不勝以輸金帛書畫器玩而餉賂者日至其親戚輩氣貌驕滿服玩奢侈雖貴侯不及至有老輩年絶相邀月必三四享之希野史所載政府客篇具此其間或有參差不合處然可見當時情態姑附注須考詳刪修司馬光日記云前宣州旌德尉王雱上殿除太子中允崇政殿說書雱介甫之子也進士及第好髙論父常與之議大政時人謂之小聖人張仲成曰當世薦雱有經濟之方今抱疾陛下宜速召對與論天下事故有是命詔兩制致仕不帶職官遇朝㑹上夀陪位許依舊職立班右侍禁閣門祗候王文諒貸死杖脊刺配沙門島文諒既激成慶卒之亂詔都官員外郎通判乾州廖子孟鞫之又得文諒嘗以宣撫司檄巡視河外荒堆三泉版築西賊奄至曹偃與戰不利文諒在軍恐見害脫身趣帳中隰州清邉承局王信從而呼曰舍人勿走戰死職也文諒怒因信中箭俯而拔之遂手劔斫信悶絶乃去文諒具伏前後凶狡罪狀遂誅之坐絀罰者十餘人以信為下班殿侍三班差使賜帛五十匹廖子孟安州人趙瞻志墓餘無可録者是月廢橫州永定縣入寧浦桂州修仁永寧兩縣入荔浦上以河漲北使道不通出圖示侍臣王安石曰滑州掃危急二口可且勿閉上乃遣王元規知滑州經制河事是月河溢澶州曹村此據正史河渠志附月末王元規何官當考十一月一日元規以三班借職論其父嵩功恐此别一人九月乙酉翰林侍讀學士鄭獬提舉鴻慶宫以疾請也司馬光日記云鄭毅夫提舉鴻慶初介甫惡滕元發以毅夫為元發之黨毅夫自杭移青得疾一臂不能舉故因而罷之丙戌鄆州言州界有黃河決水入故道詔京東提舉常平司遣官相視深淺闊狹水所歸處具圖以聞入內東頭供奉官鄧繼宣入內殿頭全惟幾內侍省西頭供奉官任端並為走馬承受繼宣太原路惟幾麟府路端鄜延路入內西頭供奉官盧仲安減二年磨勘內侍省殿頭李詳緣邉同巡檢繼宣等自請試武藝故有是命詔今後廣南東西路土丁槍手雍州峒丁荆湖南北路土丁弩手䕫州路義軍編寫成册年終奏到樞密院常留三年外其三年已前即逐旋送付尚書兵部收管經久照㑹此據㑹要當刪去知封州鄧中元請以廣南東路未置槍手州縣如廣惠等五郡皆置從之此據兵志四年事今附此丁亥光祿寺丞崔公度為崇文院校書公度再除彰德軍節度推官充國子監直講辭不赴作一法百利論萬餘言論久任衆職之事以進召對擢光祿寺丞知陽武縣故事京官令初謁尹拜庭下公度上疏抗議謂京官天子省侍官屬豈宜北面拜伏如見君之禮自是罷上嘉其節復召對命以館職林希野史云直講崔公度舊為琦所薦母服除安石不喜其來公度曲致誠意復召為直講乃上熙寧稽古一法百利論安石大喜引與握手解衣燕語即除光祿丞知陽武縣公度謁尹元絳絳方與府僚聚議俟畢即獨引閣中見之府吏告以故事見尹當廷參公度疑絳辱己託疾上馬而去絳驚使追問上藥以治之公度徑詣安石訴之安石使張琥留公度居監又使綰薦為御史乃召對上以新擢為邑必使往然絳實無意辱之而畏安石不敢問也既而又以為崇文校書編修令式代唐坰公度乃倡言京官廷謁尹事非宜下其事於編敕所引故事以為宜於是安石使檢正官建議從公度所請日夜造安石或踞厠以對公度亦不慚一日從安石後而執帶尾安石愕然公度笑曰相公帶有垢謹以袍拭去之客皆見按今實録公度傳載公度本末甚美希云云當考戊子齊於文德殿己丑薦享景靈宫齊於太廟庚寅朝饗八室齊於文德殿辛卯大饗明堂以英宗配御宣德門大赦天下本朝嘗任中書樞密院官及節度使勳臣之家後嗣無人食祿者量材録用無子孫者録有服弟姪壬辰翰林侍讀學士給事中知太平州張瓌降授左諌議大夫坐舉官不當也瓌所薦士後雖不如初不肯以令自首故再坐謫五月十二日十五日又坐責甲午府州言知州西作坊使解州防禦使折繼祖卒种諤之城婁城也繼祖為先鋒深入焚蕩族帳降部落八百户得牛羊以千數及卒其子當襲州事而請授其兄子克柔朝廷從之三子各遷一資二孫並為三班借職乙未右龍武大將軍栁州團練使宗絳封吳國公丙申知制誥直學士院陳襄知陳州襄既忤王安石嘗草河北詔言水不潤下中書改之又明堂赦書有奉祠紫宫語犯俗嫌故出知制誥陳繹直學士院丁酉內外官並以明堂赦書加恩中書奏淳化四年因張洎建議詔他日親王有恩命落府長史後有司失於推行親王猶帶府長史今請罷去從之天章閣待制權發遣三司使薛向權三司使太子中允檢正中書刑房公事李承之為太常丞以駮正法寺大辟四人及刑部失覆大辟一人特遷之右武衛大將軍辰州刺史世爽為西作坊使仍領刺史為河陽都監先是世爽經大宗正司乞補外官本司以新制但許袒免親抑而未奏世爽乃唐突自言詔特除之宗室緦麻親補外官自世爽始楚國公從信子也本傳云熙寧五年補外誤也戊戌濰州防禦使向經為明州觀察使工部即中李大臨知汝州蘇頌知婺州大臨頌歸班踰年處之怡然不敢請外及是乃出守通判滑州太常博士李常知鄂州仍復集賢校理右正言直集賢院常秩兼直舍人院秩固辭從之許秩辭乃十月庚申今并書左僕射知汝州富弼許以西京養疾弼至汝州踰兩月固稱疾求歸詔聽之己亥吏部侍即知鄧州韓絳為觀文殿學士翰林侍讀學士知潁州吕公著復兼寶文閣學士要録知審官東院韓贄為刑部侍即羣牧使陳薦為刑部即中右諌議大夫史館修撰同判太常寺宋敏求為集賢院學士三年十二月十四日除史撰八年十一月二十五日遷要録王廣淵為工部即中知潤州李及之為祕書監忠武節度副使祖無擇為祕書監分司西京殿前都虞候康州防禦使竇舜卿為雍州觀察使庚子夏國主秉常遣使阿克尼威明科榮等入貢表乞綏州城願依舊約詔答曰昨覽邉臣所奏以夏國去秋自絶朝廷深入環慶路殺掠熟户侵逼城寨須至舉兵入討朕為人父母亟令班師無得窮武今國主遣使歸欵欲繼舊好休兵息民甚善所言綏州前已降詔更不令夏國交割塞門安逺二寨綏州更不給還今復何議止令鄜延路經略司定立綏德城界至外其餘及諸路並依見今漢蕃住坐耕牧界至立封堠掘壕塹內外各認地分樵牧耕種貴彼此更無侵軼俟定界畢别進誓表回頒誓詔恩賜如舊其表辭曰臣近承邉報傳及睿慈起勝殘去殺之心示繼好息民之意人神胥悅海宇歡呼仰戴誠深抃躍曷已恭惟皇上陛下深窮聖慮逺察邉情念兹執㦸之勞恤彼交兵之苦豈謂一城之地頓傷纍世之盟覬斥邉吏之云為乃是天心之惻隱况此綏州居族歲久悉懷戀土之思積憤情深終是爭心之本逺施命令早為拔移得遵嗣襲之封永奉凝嚴之德竚使枕戈之士翻成執耒之人頓肅疆場重清烽堠顧惟幼嗣敢替先盟翹仰中宸願依舊約貢琛贄寶豈憚於踰沙向日傾心彌堅於述職僞學士景珣之辭也此據㑹要秉常差大使阿克尼威明科榮副使吕寧焦文貴詣闕進奉密記亦同舊紀書夏國主秉常遣使來貢新紀書夏人入貢癸卯中書言天下選人俸既薄而又多寡不一恐不足以勸亷吏今欲月增縣令録事參軍俸錢至十五千米麥四石司理司法司户參軍主簿縣尉防團軍事推官軍監判官錢十二千米麥三石每月通增俸錢一萬二千餘緡米麥二千八十餘石其三班使臣短使并押綱運並糜費不易欲令三司勘㑹開畫以聞從之先是選人廪給下者至請錢七千米麥兩石而已貧不足以自養則往往陷於茍賤不亷之地上閔之故更此法其後三班使臣卒不及增新舊紀並書此詔賜濮王子通州防禦使宗隱芳林園宅一區仍計口計屋後宗博宗瑗宗藎亦如之乙巳詔開封府界提㸃司畿縣保甲保置旗鼓以備教閲武藝去年十二月乙丑初立保甲法今年八月二日又此月二十四日兵志第二卷四年始詔畿內保甲肄習武事歲農隙所𨽻官期日於要便鄉村都試騎步射並以射中親疏逺近為等騎射校其用馬有餘藝而願試者聽之第一等保明以聞引見於廷天子親閲試之命以官使第二等免當年春夫一月馬藁四十役錢二千本户無可免或所免不及聽移免他户而受其直第三等第四等視此有差即藝未精未閲試者聽或附甲單丁願就閲試者亦聽都副保正武藝雖不及等而能整齊保户無擾勸誘丁壯習藝及等捕盜比他保最多或盜息比他保最少所𨽻官以聞其恩視第一等焉都副保正有闕選大保長充即以都副保正雖勸誘丁壯習藝而輒強率妨務皆禁之吏因保甲事受財斂掠加乞取監臨三等杖徒編管配𨽻告者次第賞之命官犯者除名雖使之習武備而未奏上也五年五月十日始議奏上權京轉運使吳幾復言南北兩京留府公事自來通判職官通管西京留府則通判職官分治二司一府之中事不相關坐觀成敗請如南北二京合為一司而依開封分左右聽治諸縣若事當共行者亦令通簽役法初行庶藉衆官交濟其務從之慶厯四年十月辛卯可考丙午詣太平興國寺啓聖院萬夀觀恭謝丁未幸慈孝寺集禧觀天清寺醴泉觀燕從官先是詔建東西二府各四位東府第一位凡一百五十六間餘各一百五十三間東府命宰臣參知政事居之西府命樞密使副使居之府成上以是日臨幸丁未二十六日後十日十月丁巳賜宴于王安石位始遷也三司副使知雜御史以上皆預三年九月二十六日新舊紀並書作東西府以居執政是月廢南儀州以岑溪縣𨽻藤州
