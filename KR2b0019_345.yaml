  - {type: page-break, offset: 0, content: '', id: KR2b0019_WYG_345-1a, image: WYG0319/WYG0319-0701a.png}
body:
  text: 續資治通鑑長編巻三百四十一宋李燾撰神宗元豐六年冬十一月壬寅朔上齋于大慶殿癸夘奉仁宗英宗徽號冊寳于太廟兩紀於癸夘乃書上仁宗諡云云英宗諡云云甲辰薦享于景靈宫乙巳朝享七室齋于南郊之青城丙午冬至祭昊天上帝于圜丘以太祖配始罷合祭天地也還御宣徳門大赦天下故事将郊服通天冠絳紗袍乘輅以出至景靈宫止大次衮冕而行事至太廟圜丘亦然還則御太平輦冠袍如初至是始自大次加服大裘而被以衮冕行事朱本又云稽合古義君子韙之提舉導洛通汴司宋用臣言被㫖嵗運糧百萬石赴西京見今洛水安流誠可漕運已計置截撥東河糧綱至洛口以淺船對装計㑹本路轉運司下卸從之仍候來嵗終一全年見利害别議廢置熈河蘭㑹路經略安撫制置使司言本路今嵗蒙差發三路團結廂軍修築新境一帶州城堡寨緣所役工極衆今止約勝靈西闗臨洮臯蘭四堡尚役五六十萬工若止用保寧六指揮兵興築必難完就如來春接續興築乞量賜錢帛乗時計置錢物仍乞於河東陜西近裏團結役兵毎路差一千五百人相兼工役詔熈河蘭㑹路見在軍須錢物内那撥一十五貫石匹兩如不足即據數於隣近路分軍須内取撥餘并如所奏己酉上批都大提舉成都府等路茶場朝廷特以増廣𣙜賣路分所以改置司名其将事之人資任雖淺不可不隨宜令與轉運使叙官後詔都大提舉視轉運使同管勾視轉運判官經制熈河蘭㑹邉防財用官凖此都大提舉成都府永興軍等路𣙜茶公事陸師閔言乞於兩處各置管勾文字官一員許不依常制奏差承務郎以上或選人充其勾當公事官見七員内二員係奏差五員選於吏部今乞並許本司不依常制奏差指使五員内有吏部所差不得力之人今乞指名奏易毎年舉選人改官今以舊條通計當舉九人欲乞特添三人外有縣令小使臣陞陟數止依舊條併舉本司舊支頭子錢七百緡充公使今乞特添三百緡公使合用酒欲乞隨所至州郡兊那支用以米麯工價筭還並從之入内供奉官勾當龍圖天章寳文閣馮景言被㫖為已差髙麗國信使令排辦修補過河船及案視近便海道今至登州宻州問知得兩處海道並可發船至髙麗比明州實近便詔景同宻州官吏募商人齎牒試探海道以聞庚戌陜府西路轉運副使李察乞極邉次邉提舉司糴買場據所有糴本並撥與本司共作一場以鹽鈔錢帛通糴候罷糴本分厫封樁從之癸丑中書舍人兼侍講蔡卞乞叙班於兄京之下從之京除中書舍人在十月五日丁丑趙卨乞便宜處置邉事詔邉鄙有警事有奏稟不及者帥臣自當便宜施行秉常兄威明吉鼐使人以書抵諸帥倨嫚他部或拒之不受或受而諭以當奏朝廷卨得書語其使曰爾歸諭酋領國主世受爵命何故擅行絀廢朝廷問罪猶敢倔强今又狂悖妄作滅亡無日矣叱去之此據卨神道碑或附盧秉奏書時更詳之甲寅河東節度使守太尉開府儀同三司判河南府潞國公文彦博為河東永興節度使守太師開府儀同三司致仕於是彦博乞免守太師及兩鎮節度上批許罷兼永興軍止以河東舊鎮守太師致仕仍貼麻行下據御集許彦博免兩鎮乃十二月七日指揮今依舊録并書哲宗録元豐八年四月十三日又詔不許彦博免兩鎮當考或以覃恩申命故也新紀並書彦博為太師致仕文武官並以南郊赦書加恩御史中丞黄履言凖詔具前任禮部尚書不當發頭子追太常寺吏事今内外官司亦通用此例與刑部用帖子下所屬不同詔履辦事不直罰銅二十斤十二月丙戌趙彦若云云乙夘西太一宫使觀文殿大學士金紫光禄大夫韓絳復為建雄軍節度使知河南府入内供奉官寄皇城使登州防禦使勾當内東門司宋用臣勾當御藥院此據御集増入丙辰國子司業朱服言承詔校定孫子吳子司馬兵法衛公問對三略六韜諸家所注孫子互有得失未能去取它書雖有注解淺陋無足采者臣謂宜去注行本書以待學者之自得詔孫子止用魏武帝注餘不用注衛公對問者出阮逸家盖逸倣杜氏所載靖兵法為之非靖全書也知秦州劉瑾言本州倉草場人糧馬料僅可支三五月草支不及半月轉運司収糧價小無人肯入中必致有誤嵗計詔轉運司全失計置宜下王欽臣分析欽臣言瑾始至不知本末故有此奏戸部言詳瑾欽臣所奏不同乞令欽臣往秦鳯路措置令瑾協力應辦如有闕即一等論罪從之丁巳朝奉郎錢長卿為校書郎上批長卿獻文頗有辭彩故也開封府言據司録司抵當免行所言熈寧十年始立年額其賞罰條約依三萬緡以上場務法自元豐元年至五年併増當立新額户部詳度欲酌中用元豐二年三萬九千七百緡為新額從之戊午樞宻都承㫖客省使秀州防禦使張誠一為明州觀察使朝請郎蒲宗閔為都官郎中以上批張汝賢定奪宗閔與郭茂恂互奏事多不當以茶法推行之初宗閔能協力職事不為異論所揺可免劾特除郎官故也給事中韓忠彦言奉議郎蔡延嗣除蔡河撥發綱運按延嗣形質怪惡毎於班列之中人多指為戲笑有玷朝選詔罷之知宻州范鍔言轄下板橋鎮𨽻髙宻縣正居大海之濵其人煙市井交易繁夥商賈所聚東則二廣福建淮浙之人西則京東河北三路之衆絡繹往來然海商至者類不過數月即謀還歸而其物貨間有未售則富家大姓往往乗其急而以賤價買之在海商者十止得其四五之直而富姓乃居積俟時以邀倍稱之利欲乞於本州置市舶司於板橋鎮置抽解務籠賈人専利之權以歸之公上其利有六使商賈入粟塞下以佐邉費於本州請香藥雜物與免路稅必有奔走應募者一也凡抽買犀角象牙乳香及諸寳貨毎嵗上供者既無道塗勞費之役又無舟行侵盗傾覆之弊二也抽解香藥雜物毎遇大禮内可以助京師外可以助京東河北數路賞給之費三也有餘則以時變易不數月坐有倍稱之息四也商旅樂於負販往來不絶則京東河北數路郡縣稅額増倍五也海道既通則諸蕃寳貨源源而來毎嵗上供必數倍於明廣二州六也有是六利而官無横費雜集之功庻可必行而無疑况本州及四縣常平庫錢不下數十萬緡乞借為官本限五年撥還詔都轉運使吳居厚悉意斟酌條析以聞居厚言其取予輕重之權較然可見於今無不可推行之理欲稍出錢帛議其取舍之便考其贏縮之歸仍上置𣙜易務差官吏牙保法請自七年三月推行居厚又言先準御前劄子欲置板橋鎮𣙜易務與蕃漢商賈交易與明廣州市舶實不相妨復凖朝㫖欲依范鍔奏請置抽解務如此則牽制明廣二州已成之法非浙廣江淮數路公私之便海道至南蕃極逺登萊更北宻邇遼人雖立透漏法勢自不可拘攔而板橋又非商賈輻凑之地恐不可施行元祐二年十月行鍔言詔中書省置㸃檢房令舍人通領乙未恭謝景靈宫資政殿學士降授正議大夫吕公著知揚州從所乞也通議大夫知單州吕恵卿為資政殿學士知定州十二月二十二日改太原庚申恭謝萬夀觀回幸尚書省駐輦令㕔顧謂執政曰新省宏壮甚與官制相稱王珪等對規摹制作皆出聖謨次至僕射㕔又曰新省制作非茍而已卿等宜率勵官屬勉修職事既又召尚書侍郎以下隨其曹問以所掌職事甚悉因戒勅曰朕所以待遇責任非輕宜各思自勉盡心職事乃𫝊詔尚書省執政官與五服内未仕者一人承務郎六曹都司吏部尚書至員外郎遷寄禄官一等賜吏史有差遂幸凝祥池中太一宫集禧觀新紀但書幸尚書省官僕射丞家一人進尚書以下官一等舊紀并書詔語辛酉通逺軍齊瑪克堡故弓箭手指揮使李清弟忠為三班借職初清為西賊所執故官其父用為奉職致仕已而用自陳乞納官以與忠故有是命甲子詔給末鹽錢二十萬緡付陜西轉運司市芻糧封樁京東路轉運司言問得泉州知海道商人言兩畨奉使若至楚州僦船泛海至宻州板橋鎮不過三二日詔新差津致兩畨國信等物内臣速治舟依此路起發仍令轉運司那官縁路照管提㸃京西北路刑獄公事梁燾言西京伊陽縣汝州魯山縣買製造軍器所木植結纜中賣數多今冬農隙入山事材來春氷開乗水起運其間民力盖少暇日乞免兩縣來年夫役從之陜西轉運司言乞下戸部右曹於元賜鄜延路入便錢一百萬貫數内金部於元豐六年額鈔公據内並重别印給公據各一十萬貫其公據毎道作錢五貫及十貫差使臣主掌赴延州交納兊換京師所給公據赴省毁抹所貴乘時糴買從之仍令印給公據限五日使臣限十日至延州乙丑分命輔臣祈雪王珪等言車駕幸尚書省自尚書以下並遷秩臣等職在近輔豈可復與諸曹例霑聖澤竊不自安乞寢罷上曰君臣之際惟義而已尚書以下既已推恩卿等義所當得毋固辭也通直郎都大提舉成都府等路茶場陸師閔言比者賈種民重立茶場法並用年終額外増剩依江湖淮浙六路賣鹽條支賞其立額并其餘増虧比較賞罰並依課利場務法茶場司專條更不用管勾官賞罰減監官之半而不給賞之法切詳本司與天下課利場務不同如鹽酒之類皆以本息通立額而本司但以净利為額今用種民之法須當用本息别立祖額如用本多収息薄通比祖額增則受賞用本少収息多以息填本通比不及祖額則受罰深害茶法不可施行詔茶場司並用舊條其戸部議法不當尚書李承之侍郎蹇周輔各罰銅六斤金部郎中晁端彦員外郎井亮采各罰銅八斤戸部及都省吏各罰銅有差師閔云賈種民立法而種民獨免罰當考丙寅贈西頭供奉官郭世及為皇城副使以與西賊戰死故也丁夘樞宻都承㫖明州觀察使張誠一提舉經度制置牧馬三班奉職皇甫旦言初為三班借職累立戰功至如京副使秦州第四将駐階州時将下兵級孫化等謀叛臣於将司劾實斬之亦自劾專殺之罪有司論臣雖為監臨主司於法不應决獄以鬬殺論當杖死䝉恩貸配沙門島復䝉恩許臣効用立功然累從偏師不得一當陣敵今李憲遣臣将命董戩鄂特凌古呼致達勒達等赴闕乞賜叙理詔特以逺使幹辦遷一官詔歩軍弩手第一等並令兼習神臂弓從郭忠紹請也本志有此但不載請人上批故宗室顯官尊屬旅殯京師僧寺凡數喪未舉葬欲因虢王世清新喪卜日西行宜令相度可否以聞於是太史言嵗中已無大葬日來嵗甲子乃皇帝行年不可用戊辰詔陜西河東路轉運司祈雪於名山大川己巳都水監丞陳祐甫言田棐任淮南提刑嘗言開河其後淮隂至洪澤訖成厥功獨洪澤以上未免興役臣今相度既不用牐蓄水惟隨淮面髙下開深河底引淮水通流則於勢至易其便甚明計行地五十七里賦工二百五十九萬七千役民夫九萬二千一月兵夫二千九百兩月支麥米十一萬斛錢十一萬緡限二年開修從之仍止限一年令蒋之竒陳祐甫同提舉先是之竒言長淮洪澤河實可開治願亟興功詔祐甫相視故有是詔舊紀書作洪澤河新紀不書明年三月十八日賞功祐甫相視在八月己卯熈河蘭㑹路經略安撫制置使李憲奏臣僚奏蘭州守禦須及一萬人今在州總計六千六百餘人臨事旋乞益兵竊慮誤事本司契勘蘭州依百歩法止合用六千四百五十六人本州通計僅及八千人自可有備走馬承受閻仁武合守季蘭州亦復畏怯不免牒梁安禮前去尚慮仁武素無心膽自為張皇不敢一面勾回熈州兼臣已遣弟宇往蘭州照管伏望下入内省嚴責臣男彀蹉程前來上批李彀已出門更不須指揮梁安禮既隨将官往蘭州其閻仁武仰却歸熈州守季此據御集要見蘭州守城人數故附此十二月辛未朔詔贈太尉富弼負進馬價其除之升朝官加勲依宗室法並自武騎尉始舊法升朝官加勲内殿崇班内常侍賜勲並自騎都尉始也朱本簽貼云此條未經刪定合削去今復存之提舉熈河等路弓箭手營田蕃部司言新復境土城寨漸修築畢可興置營田内定西城通西寨康谷寨榆木坌堡四處營田見闕農作廂軍二百人部轄人員軍典十六人乞依熈河路修城鳳翔府簡中保寧指揮簡填闕額法許本司於秦鳯涇原熈河三路廂軍及馬遞鋪卒選募人給装錢二千從之手詔李憲近據諸邉盛報夏賊㸃集稱欲入寇及正旦進奉使人逼期不見入界必縁有請不售理須豕突為患爾宜深以大寇為念夤夜廣思追逐計策勿使枝備小大失稱以誤國重事壬申詔監察御史陳師錫送吏部師錫乞罷貢舉及太學試律義使學者得専意經術上批朝廷比年修廣學校訓廸士類兼用經術法令長育人材俾之成就以充任使從政以法令為本師錫不逹朝廷造法大意乃欲罷諸生習律倡為詖說惑亂士聽故也師錫事更須考詳蘇軾元祐初薦師錫清要侍從奏云神宗擢師錫第三人及第有意大用後為臺官因論舉人試律則害道徳之教不合時議遂出補外尋罷試律先帝首與牽復大用之意愈堅當考詔配沙門島人前入内東頭供奉官勾當内東門韓永式配𨽻日久近經大宥可送唐州牢城免刺面上批祭奠髙麗國使楊景略等奏辟李之儀書状官聞之儀雖諳逹吏方隨器可使然文章之稱不著士論緣髙麗俗喜文中夏詞格乃彼所視效宜得問學博洽用字整秀者乃稱兹選可召赴中書試擬用書状進呈弔慰蕃辟官凖此癸酉詔李憲夏人已肆陸梁時貢不至近齎去賜董戩鄂特凌古詔勅書爾宜深加體量如董戩委未與夏賊打和即詔書國信物色令今來先發去達勒達輝和爾四部首領賜與董戩鄂特凌古委曲曉諭早令遣四部首領歸族下㸃集兵馬前去禦賊候大段立功斬到賊首萬數已上至時亦有恩命與董戩鄂特凌古餘更縷細開諭之勿令信賊詐誕以壊漢蕃兩家深重呪誓仍賜董戩雜花暈錦旋欄金束帶銀器衣著等有差録潭溪歸明人楊晟象為右班殿直楊晟嚮為三班奉職楊昌卑為三班借職後湖北轉運司言晟嚮大首領桀黠能用其衆又以為左班殿直四月二日三日十一日又十月十八日詔六曹尚書侍郎累奏吏史當汰宜令速立選試法詔寺監官雜壓在寄禄官通直郎之上者經恩許封贈手詔李憲得録奏董戩鄂特凌古蕃字觀其情辭忠智兼盡顧中國食禄士大夫存心公家者不過如此紬繹再三嘉美無已兼爾所囬委曲頗中事情甚得朝廷欲命之意縁今夏賊姦謀不小直欲併亡一路深入腹裏襲我之虚切不可以平日抄掠千百騎待之也宜大為經畧廣作枝梧勿令得志貽患異日昔嘍和斯首領博囉齊斯多特輸忠朝廷協力擊賊後成竒功殺李繼遷於三十九井當時朝廷報賞甚厚今董戩鄂特凌古既效誠如此宜更激勉使深入賊土求如上功以稱朝廷撫厚之意詔馬軍兵級年五十以下武藝生疎給限教習不成或體肥及指臂有病可以教習歩軍武藝者並改刺歩軍鄜延路經略司上有戰功人詔蕃官左侍禁卓鼐凌遷四資賜絹五十匹巴特瑪且斡遷三資絹三十匹齊黙特伊朗遷兩資絹二十匹輕重傷並依格奪得馬給馬外賜絹十匹手詔李憲西賊首領最為兇黠者惟星多哩鼎而自來多於本國西南邉出入料彼方蕃部必有能識其状貌者宜多方選委将佐廣募蕃兵有能别識之人令宻結敢死儕類遇事謀生擒致之不然斬首前來以團練蕃部鈐轄及皇城使蕃兵将官酬之乙亥分命輔臣祈雪手詔李憲近麟府鄜延環慶涇原路探事人言西賊㸃集河南河北諸監軍司人馬或稱十分中五或稱九分並要於十二月十五日葫蘆河取齊雖作過路分未知其的然聚兵去處必是委實不可不廣為枝備仍付熈河蘭㑹路經略司宜同思為備勿誤朝廷重事詔開封府界保甲餘丁投軍更不㑹問即斷罪放停已及一年者聽充軍父母願放者勿限年三路凖此命給事中韓忠彦館伴遼使初命禮部侍郎李常上批西邉事未定北人至闕須語及之恐常不知西事本末緩急難酬對故也補輝和爾達勒達首領五人並為軍主嵗支大綵二十匹樞宻院言凖詔董戩所遣引伴輝和爾達勒達首領李察爾節可遷一資李察爾節見為都軍主蕃官職次以上無可轉詔都軍主上増置副都指揮使都指揮使兩階丙子董戩輝和爾達勒達進奉人辭上顧輝和爾首領曰汝等種落生齒凡幾何對曰約及三十餘萬壮可用者幾何曰約二十餘萬上又顧董戩首領曰自歸屬本朝後常與夏國通好乎對曰昨夏國屢來言若歸我即官爵恩好如所欲臣等拒之曰自屬聖朝荷國厚恩義不敢負上曰嘗與夏國戰否對曰西人寇邉屢曽率衆出戰奪得其城堡及獲首級甚多上曰歸報董戩令盡心守圉各賜器幣分物有差首領嘗與夏國殺敵有功者賜槍旗器甲奉議郎編修軍器什物法制蔡碩為軍器少監上批碩於器械工作程式極為究心頗臻智巧故有是命戊寅内殿承制閤門祇候温從吉為禮賔副使從吉嘗有邉功乞罷閤門祇候故遷承議郎權提㸃開封府界諸縣鎮公事范峋言檢㑹府界諸縣秋夏之賦収歛多不以時而酒稅課利習為虧欠故本司五年間䝉朝廷賜借六十餘萬緡不足以應用臣自被命以來鈎考督責遂稍増集而今嵗之費粗為充給若非諸色官吏畏法致力何以有此臣昨嘗奏乞差勾當公事官一員或未許添置則乞以提舉司管勾官兼充上批宜特創添差與本司勾當公事官一員令自選奏差右諫議大夫趙彦若言王事之本隂陽為先月令孟春之月命相布徳和令行慶施恵下及兆民所以致驩聲而達陽氣是以王者㳺豫燕飲與衆人同樂為天下自娱感召和氣之端贊化育而參天地也伏縁正月陛下嘗謁景靈宫臣比陪從至繼仁殿竊見聖情思慕猶如前時公卿侍臣無不惻楚伏惟孝治之至大舜何以加臣敢過計豫言者以慶夀變除嵗月漸逺而少陽用事生氣尚微若孝思發中或復感動慮於時令有所未順雖上聖至徳非可以常經格之然屈己從人亦明主之所不違欲望将來繼仁殿所陳服玩酌獻之初蹔從隠蔽抑忍聖意奉承天時無虧孝慕之誠以順陽和之令自景靈宫十一殿成上毎行朝獻之禮凡百餘拜及繼仁殿必哀慟良久禮畢進湯又哭宣曹評曹秀行家人禮至是彦若以為言上深嘉奨然猶不聴己卯詔給度僧牒千為専一製造軍器所食錢禮部言度僧牒已立額嵗給萬今年已給九千一百二十七額外並來年數御史寋序辰言江南東路自李琮根究虧陷稅役官吏率以滅裂未得均平乞本路各委逐縣令佐限一年重根究令轉運提㸃刑獄提舉司考察其能改正虛冒數多者追前官所得賞授之仍案前官之罪從之詔來年嵗賜夏國銀並賜經略司為招納之用癸未上批諸路并畿内保甲率五六年案閲一周惟河東以金帛不豐十一年乃遍晉人土性悍勇俗尚武事又介居二敵之間講勸武功不可反居諸路之後可下吳居厚於京東新法鹽錢内嵗賜十五萬緡豫買紬絹送澤州助保甲司給賞自今年下半年為始提舉茶場陸師閔乞川路買茶起綱場監官十員並許不依常制指名奏差從之河北縁邉安撫司言安肅廣信軍𣙜場使臣乞許於大小使臣内選差從之朝請郎令綿言宗室袒免以下孀居婦乞量給請受詔大宗正司詳度以聞既而不行甲申入内供奉官寄内蔵庫使慶州團練使宋用臣為昭宣使寄資及遷一子官文思副使秦士禹供備庫副使楊琰等八人各轉一官減磨勘二年皇城副使董嘉言殿直李旻減四年殿直張立借職元貴減三年侍禁劉懐禮減二年大将張徽等四人減四年其餘吏卒匠醫諸色祇應人轉一資賜帛七匹者五人轉一資賜帛五匹者八十人轉一資賜帛三匹者五十人轉一資者五十人無資可轉者並賜帛三十匹又賜帛三十匹者二人二十匹者七人十五匹者七人十匹者十五人皆中書奏擬上親改定賞修尚書省之勞也尚書省即殿前司廨舍地為之自令僕射丞左右司六曹尚書侍郎郎中員外郎㕔事下至吏舍為屋四千三十一間以五年五月癸巳即工六年十月庚子乃成後用臣乞以一子遷官恩贈曽祖思恭捨宅為多慶尼院嵗度僧尼一人從之上稽古董正治官既復尚書二十四司職事剏作新省其規摹區處詳宻曲折皆出制㫖裁定用臣承詔督工作壮偉雄盛近世未有也又以舊中書東西㕔為門下中書省都堂為三省都堂徙建樞宻院於中書省之西以故樞宻院宣徽學士院地為中書門下後省列左右常侍至正言㕔事直兩省之後都承㫖司直樞宻院之後由是三省樞宻院位著官儀煥然一新矣户部侍郎蹇周輔乞選官相視韶連郴道等州水陸徑路通賣鹽稍均淮鹽於本路闗鹽州軍兩路鹽法並凖江西廣東見行法詔荆湖南路提舉常平等事張士澄轉運判官陳偲措置以聞七年九月十二日士澄偲上其法元祐元年閏二月四日士澄等責吕陶閏二月末奏議可考大名府路安撫使司言博州軍資庫有熈寧元年河北安撫使滕甫吳充用空名勑告召人進納見錢九千九百四十五緡乞以修完本路州府城櫓從之知成都府吕大防欲編排四尺二寸以上馬百匹進呈如堪配軍即乞依此収買從之同提舉開封府界保甲吕公雅言本司封樁乞召人用抵保糴買立限納錢詔依時價糶減元價不得過二分乙酉給廣西路轉運司度僧牒百五十修宜州懐逺等縣城六月戊申丙戌詔自今臣僚所授旌節碑印亡没並賜葬不即隨葬者徒二年因而行用者論如盗用官文書印律右諫議大夫趙彦若言三公論道經邦爕理隂陽又曰冢宰掌邦治統百官均四海皆舉大體故陳平言宰相上佐天子理隂陽下遂萬物之宜外鎮撫四夷内親附百姓使卿大夫各得任其職盖據此以為說也周禮大宰分職則詳是知三公之官不無吏事之責風聞去年官制初行有司議同職犯罪四等自是律文之正固當以時舉行而執政大臣不以為便乃引陳平之言自解而廢沮法律正文必若所云宜知大體然前時執法奏大臣不置都簿大臣亦奏御史臺不置都簿以報之近日執法奏大臣依刑部申不用符召寺吏大臣亦奏執法前在禮部不用符召寺吏以報之執法者既罪白而罰當矣臣獨疑大臣不能以道徳承聖化而専任小數校量必勝失大臣體自謂得計而内不憂于職事外不畏于人言以此為調爕之功則似非天意以此為輔佐之效則實負聖明伏計寛仁未忍切責願垂戒勅俾知省思庻有恐懼之心可以助致和氣不報朱本云無施行刪去今復存之十禮部召吏在一月甲寅都大提舉成都府等路茶場陸師閔乞依舊許人買在京臘茶入陜西計所得净利立額本司於息錢認還戸部乞令𣙜茶司嵗認净利錢萬四千一百緡詔户部依所申數除之熈河蘭㑹路經略安撫制置使司上修蘭州堡寨文武官功状詔第一等遷一官銀絹六十第二等遷一官第三等減磨勘三年遷官人若見任朝奉大夫及諸司使以上並囬授與子有官者其提舉并應副糧草官依第一等不入等人支銀絹六十戊子詔劉昌祚聞西賊大小首領頗以族帳投來乞居新築城壘慮詭計多方以壁壘既堅未易力勝故遣腹心投來一旦且為内應慶歴中李士彬龜鑑不逺使來者終無姦状亦耗蠧邉粟可但於鄜坊丹州間生養之候邉境安定然後徙置寨上從其所欲戸部言奉議郎郟亶乞通行廣東有餘鹽往廣西荆湖江西福建等路内江西一路差三司副使蹇周輔相度施行果利便亶昨乞運廣東鹽往湖南路郴全道三州乞選官相視詔送湖南路提舉常平官朱本移入七年九月十二日己酉書周輔相度江西廣東在元豐三年九月二十八日庚寅勒停人六宅副使新河東路第四将邢佐臣為崇儀副使權發遣岢嵐軍辛卯皇第十二子生遣雍王顥告于太廟舊紀書皇子似生新紀不書賜陜西轉運使李察空名度牒五百道應副環慶寧州内外修完城壁樓櫓并守禦軍器什物和雇脚乘等毎道為錢十三萬壬辰資政殿學士新知定州吕恵卿知太原府十一月十八日知定州上批追官免勒停衝替人孫諤元犯情為可矜今求哀朝廷又經大宥可除落衝替諤初為國子監直講坐受參知政事元絳屬從孫伯虎為小學教諭追兩官諤上書自訴言太學之弊臣不與焉陛下憐臣於衆中而有司案臣於事外况臣與元絳本不相識就令今日見臣絳終不識臣面盖以為詔獄成於鍜錬也朱本簽貼云前史官鍜鍊之言出於誣毁今刪去新本已復存之諤衝替在二年五月十七日戸部状新權提舉成都府路常平等事韓玠言廬州泌陽縣界馬仁陂遺利乞下京西南路提舉司相度從之樞宻院言夏國尚未以時入貢慮縁邉不能禁止邉人私與西界交易詔陜西河東經略司申飭法令毋得私縱癸巳魯國大長公主卒上未御晨膳亟臨奠哀動左右輟視朝五日罷上元燒燈追封荆國大長公主遷其子右騏驥副使曹曄領秦州團練使曹􅌈領成州團練使明年啓菆出殯皆不視朝又臨奠之舊紀書主薨新紀不書舊紀又於七年正月十四日書以公主喪罷觀燈新紀亦不書甲午貶光州防禦使駙馬都尉曹詩令家居省過以手詔詩不能仰稱朝廷選尚爵命恩徳數以帷簿不謹凂撓大主致悒怏成疾又隠蔽不以時聞乞呼醫治療終於沉痼不起故也醫官及勾當公主宅内臣並坐責罰舊紀書曹詩以帷簿不謹大主疾不以時聞降官云云新紀不書詔開封府陳留縣置保甲都作院修二十二縣兵器從提舉保甲劉琯請也琯又言諸縣保甲户有年已成丁尚為稚小以避役者欲乞本司官因廵案相視年貎收入進丁詔廵按見敎保甲有人材不任事許追餘丁相視年貎選擇又言鄢陵縣廵檢戴思先引見第一都保甲减磨勘三年今按閲八都保甲畢更减三年以五年轉一官餘一年候磨勘收使從之詔開封府界團教保甲武藝各應格劉琯除西上閤門副使詔户部右曹令侍郎専領尚書不預乙未蕃官堅多克為通逺軍宻棟族廵檢熈河蘭㑹路經略司薦其累有戰功也廣西經略司言歸化州言交趾聚兵欲復取本州交人昨以追捕儂智㑹為詞侵犯歸化今雖退保巢穴猶常有窺覦之意今智㑹稱如交趾再犯本州難禦即投省地智㑹既不能堅拒交賊若令在彼不免致寇詔熊本委曲曉諭智㑹徙置内地仍相度把拓歸化州要害隘路如交趾復來即是無故入省地自可移牒問罪七年五月庚戌丙申吏部侍郎陳安石等言乞以侍郎比類直學士例封贈父母從之著為令已亥文彦博言仁宗皇帝賜臣御書以巻軸甚大私家難以寳藏遂送功徳院寳勝禪院安置因建閣奉安愈為精嚴毎年乞特賜撥放童行一名從之庚子以提㸃開封府界諸縣鎮公事承議郎范峋直龍圖以上批畿内用度常苦闕乏嵗仰朝廷應副范峋涖事未久已能營職考績甚優宜奨之以勸四方将漕使人故有是命是嵗宗室子賜名授官者四十七人天下上户部主户千一百三十七萬九千一百七十四丁千六百九十五萬四千二百六客户五百八十三萬二千五百三十九丁八百一萬五千九十四斷大辟二千六百七十一人自熈寧初始變礬法嵗課所入元年為錢三萬六千四百緡有竒併増者五嵗乃取熈寧六年中數定以一十八萬三千一百緡有竒為新額至元豐六年課増至三十三萬七千九百緡而無為軍礬聼民自鬻官置場售之嵗課一百五十萬斤用本錢萬八千緡自治平中至元豐數無増損云此據食貨志附元豐六年末
