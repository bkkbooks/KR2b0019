body:
  text: 續資治通鑑長編卷一百四十三宋李燾撰仁宗慶歷三年九月乙丑朔置開封府諸處巡檢各一員又分東西二路置提舉捉賊各一員湖南轉運司言桂陽監蠻猺內冦蠻猺者居山谷間其山自衡州常寧縣屬于桂陽郴連賀韶四州環紆千餘里蠻居其中不事賦役謂之猺人初有吉州巫黃捉鬼與其兄弟數人皆習蠻法往來常寧出入溪洞誘蠻衆數百人盜販鹽殺官軍逃匿洞中既招出而殺之又徙山下民他處至是其黨遂合五千人出桂陽藍山縣華隂洞害巡檢李延祚潭州都監張克明詔發兵捕擊之按歐陽修明年三月疏余靖明年五月疏殺黃捉鬼乃提刑邵飾知衡州陳執方也丙寅詔天下選善醫者赴闕當較試方術以補太醫丁卯召輔臣及知雜御史以上於天章閣朝謁太祖太宗御容及觀瑞物既而上問禦邉大略久之乃罷韓琦行狀云琦對天章閣陳九事繼又獻七事九事或可附此然琦以前月十八日授詔宣撫陜西距此已十五日矣不知尚在朝否又手詔但督仲淹弼恐琦已出今即以九事附七月末上既擢用范仲淹韓琦富弼等每進見必以太平責之數令條奏當世務仲淹語人曰上用我至矣然有後先且革弊於久安非朝夕可能也上再賜手詔促曰比以中外人望不次用卿等今琦暫往陜西仲淹弼宜與宰臣章得象盡心事國毋或有所顧避其當世急務有可建明者悉為朕陳之既又開天章閣召對賜坐給筆札使疏于前仲淹弼皆惶恐避席退而列奏曰我國家革五代之亂富有四海垂八十年綱紀制度日削月侵官壅于下民困於外外國驕盛冦盜橫熾不可不更張以救之然欲正其末必端其本欲清其流必澄其源臣敢約前代帝王之道求本朝祖宗之烈采其可行者條奏願陛下順天下之心力行此事庶幾法制有立綱紀再振則宗社靈長天下蒙福一曰明黜陟虞書三載考績三考黜陟幽明我祖宗朝文武百官皆無磨勘之例惟政能可旌者擢以不次無所稱者至老不遷故人人自勵以求績效今文資三年一遷武職五年一遷謂之磨勘不限內外不問勞逸賢不肖並進此豈黜陟幽明之意耶假如庶僚中有一賢於衆者理一郡縣領一務局思興利去害而有為也衆皆稱為生事必嫉之沮之非之笑之稍有差失隨而擠陷故不肖者素餐尸祿安然而莫有為也雖愚暗鄙猥人莫齒之而三年一遷坐至卿監丞郎者歷歷皆是誰肯為陛下興公家之利救生民之病去政事之弊葺綱紀之壞哉在京百司金榖浩瀚權勢子弟長為占據有虛食廪祿待闕一二年暨臨事局挾以勢力豈肯恪恭其職使祖宗根本之地綱紀日隳故在京官司有一員闕則爭奪者數人其外任京朝官則有私居待闕動踰嵗時往往到職之初便該磨勘一無勤效例蒙遷改此則人人因循不復奮勵之由也臣請特降詔書今後兩地臣僚有大功大善則特加爵命無大功大善更不得非時進秩其理狀循常而出者秪守本官不得更帶美職應京朝官在臺省館閣職任及在審刑大理寺開封府兩赤縣國子監諸王府并因保舉及選差監在京重難庫務者並須在任三周年即與磨勘若因陳乞并於中書審官院願在京差遣者與保舉選差不同並須勾當通計及五周年方得磨勘如此則權勢子弟肯就外任各知艱難亦有俊明之人因此樹立可以進用如今日已前受在京差遣已勾當者且依舊日年限磨勘其未曾交割勾當却求外任者並聽其外任在京朝官到職勾當及三年者與磨勘內前任勾當年月日及公程日限并非因陳乞而移任在道月日及外朝官在京朝請月日並令通計其遠官近地勞逸不同并在假待闕及公程外住滯或因公事非時移替在道月日委有司别行定奪聞奏如任內有私罪并公罪徒已上者至該磨勘日原情理輕重别取進止其庶僚中有髙才異行多所薦論或異略嘉謀為上信納者自有特恩進改非磨勘之可滯也又外任善政著聞有補風化或纍訟之獄能辨寃沉或五次磨勘人無翻訟或勸課農桑大獲美利或京城庫務能革大弊惜費巨萬者仰本轄保明聞奏下尚書省集議為衆所許則列狀上聞並與改官不隔磨勘或有異同各以所執取旨出於聖斷仍請詔下審官院流內銓尚書考功應京朝官選人逐任得替明具較定考績結罪聞奏內有事狀猥濫并老疾愚昧之人不堪理民者别取進止已上磨勘考績條件該説不盡者有司比類上聞如此則因循者拘考績之限特逹者加不次之賞然後天下公家之利必興生民之病必救政事之弊必去綱紀之壞必葺人人自勸天下興治則前王之業祖宗之權復振於陛下之手矣其武臣磨勘年限委樞密院比附文資定奪聞奏十一月壬戌施行二曰抑僥幸臣聞先王賞延于世諸侯有世子襲國公卿以德而任有襲爵者春秋譏之及漢之公卿有封爵而歿立一子為後者未聞餘子皆以爵命其次寵待大臣賜一子官者有之未聞每嵗有自薦子弟者祖宗之朝亦不過此自真宗皇帝以太平之樂與臣下共慶恩意漸廣大兩省至知雜御史以上每遇南郊并聖節各奏子充京官少卿監奏一子充試銜其正郎帶職員外郎并諸路提點刑獄以上差遣者每遇南郊奏一子充齋郎其大兩省等官既奏得子充京官明異於庶僚大示區别復更每嵗奏薦積成冗官假有任學士已上官經二十年者則一家兄弟子孫出京官二十人仍接次升朝此濫進之極也今百姓貧困冗官至多授任既輕政事不舉俸祿既廣刻剝不暇審官院常患充塞無闕可補臣請特降詔書今後兩府并兩省官等遇大禮許奏一子充京官如奏弟姪骨肉即與試銜外每年聖節更不得陳乞如别有勳勞著聞中外非時賜一子官者繫自聖恩其轉運使及邉任文臣初除授後合奏得子弟身事者並候到任二年無遺闕方許陳乞如二年內非次移改者即許通計三年陳乞三司副使知雜御史少監已上並同兩省遇大禮各奏薦子孫其正郎帶館職員外郎并省府推判官外任提點刑獄已上遇大禮合該奏薦子孫者須在任及二周年方得陳乞已上有該説不盡者委有司比類聞奏如此則內外朝臣各務久於其職不為茍且之政兼抑躁動之心亦免子弟充塞銓曹與孤寒爭路輕忽郡縣使生民受弊其武臣入邉上差遣并大禮合奏薦子弟者乞下樞密院詳定比類聞奏又國家開文館延天下英才使之直祕庭覽群書以待顧問以養器業為大用之備今乃登進士髙等者一任才罷不以能否例得召賜而補之兩府兩省子弟親戚不以賢不肖輒自陳乞館閣職事者亦得進補太宗皇帝建崇文院袐閣自書碑文重天下賢才也陛下當思祖宗之意不宜甚輕之臣請特降詔書今後進士三人內及第者一任回日許進于教化經術文字十軸下兩制看詳作五等品第中第一等二等者即賜召試試入優等即補館閣職事兩府兩省子弟並不得陳乞館閣職事及讀書之類御史臺畫時彈劾并諫院論奏如館閣闕人即委兩地舉文有古道才堪大用者進名同舉并兩制列署表章仍上殿稱薦以充其職如此則館閣職事必無輕授足以起朝廷之風采紹祖宗之本意副陛下慎選矣十一月癸未試館職丁亥減任子三曰精貢舉臣謹按周禮鄉大夫之職其廢已久今諸道學校如得明師尚可教人六經傳治國治人之道而國家乃専以詞賦取進士以墨義取諸科士皆捨大方而趨小道雖濟濟盈庭求有才有識者十無一二况天下危困乏人如此固當教以經濟之業取以經濟之才庶可救其不逮或謂救弊之術無乃後時臣謂四海尚完朝謀而夕行庶乎可濟安得晏然不救坐俟其亂哉臣請諸路州郡有學校處奏舉通經有道之士専於教授務在興行其取士之科即依賈昌朝等起請進士先策論而後詩賦諸科墨義之外更通經旨使人不専辭藻必明理道則天下講學必興浮薄知勸最為至要內歐陽修蔡襄更乞逐場去留貴文卷少而考較精臣謂盡令逐場去留則恐舊人捍格不能創習策論亦不能旋通經旨皆憂棄遺别無進路臣謂進士舊人三舉已上者先策論而後詩賦許將三場文卷通考互取其長兩舉初舉者皆是少年足以進學請逐場去留諸科中有通經旨者至終場别問經旨十道如不能命辭而對則於知舉官前講説七通者為合格不會經旨者三舉已上即逐場所對墨義依自來粗通施行兩舉初舉者至於終場日須八通者為合格又外郡解發進士諸科人本鄉舉里選之式必先考其履行然後取以藝業今乃不求履行惟以詞藻墨義取之加用封彌不見姓字實非鄉里舉選之本意也又南省考試舉人一場試詩賦一場試策人皆精意盡其所能復考較日久實少舛謬及御試之日詩賦文論共為一場既聲病所拘意思不遠或音韻中一字有差雖生平苦辛即時擯逐如音韻不失雖末學淺近俯拾科級既鄉舉之處不考履行御試之日更拘聲病以此士人進退多言命運而不言行業明君在上固當使人以行業而進乃言命運者是善惡不辨而歸諸天也豈國家之美事哉臣請重定外郡發解條約須是履行無惡藝業及等者方得解薦更不封彌試卷其南省考試之人已經本鄉詢考履行却須封彌試卷精考藝業定奪等第訖進入御前選官覆考重定等第訖然後開看南省所定等第內等第合同姓名偶有髙下者更不移改若等第不同者人數必少却加封彌更宜兩地參較然後御前放榜此為至當內三人已上即於髙等人中選擇聖意宣放其考較進士以䇿論髙詞賦次者為優等策論平詞賦優者為次等諸科經旨通者為優等墨義通者為次等已上進士諸科並以優等及第者放選注官次等及等者守本科選限自唐以來及第人皆守選限國家以收復諸國郡邑乏官其新及第人權與放選注官今來選人壅塞宜有改革又足以勸學使知聖人治身之道則國家得人百姓受賜明年三月乙亥施行貢舉新制四曰擇官長臣聞今之刺史縣令即古之諸侯一方舒慘百姓休戚實繫其人故歷代盛明之時必重此任今乃不問賢愚不較能否纍以資考升為方靣懦弱者不能檢吏得以蠧民強幹者惟是近名率多害物邦國之本由此凋殘朝廷雖至憂勤天下何以蘇息其轉運使并提點刑獄按察列城當得賢於衆者臣請特降詔書委中書樞密院且各選轉運使提點刑獄共十人大藩知州十人委兩制共舉知州十人三司副使判官同舉知州五人御史臺中丞知雜三院共舉知州五人開封知府推官共舉知州五人逐路轉運使提點刑獄各同舉知州五人知縣縣令共十人逐州知州通判同舉知縣縣令共二人得前件所舉之人舉主多者先次差補仍指揮審官院流內銓今後所差知州知縣縣令並具合入人歷任功過舉主人數聞奏委中書看詳委得允當然後引對如此舉擇則諸道官吏庶幾得人為陛下愛惜百姓均其徭役寬其賦斂各使安寧不召禍亂十月丙午施行五曰均公田臣聞易曰天地養萬物聖人養賢以及萬民此言聖人養民之時必先養賢養賢之方必先厚祿厚祿然後可以責亷隅安職業也皇朝初承五代亂離之後民庶凋敝時物至賤暨諸國收復郡縣之官少人除補至有經五七年不替罷者或才罷去便入見闕當物價至賤之時俸祿不輟士人家無不自足咸平已後民庶漸繁時物遂貴入仕門多得官者衆至有得替守選一二年又授官待闕一二年者在天下物貴之後而俸祿不繼士人家鮮不窮窘男不得婚女不得嫁喪不得葬者比比有之復於守選待闕之日衣食不足求人貸債以茍朝夕到官之後必來見逼至有冒法受贓賒貸度日或不耻賈販與民爭利既作負罪之人不守名節吏有姦贓而不敢發民有豪猾而不敢制姦吏豪民得以侵暴於是貧弱百姓理不得直寃不得訴徭役不均刑罰不正比屋受弊無可奈何由于制祿之方有所未至真宗皇帝思深謀逺復前代職田之制使中常之士自可守節婚嫁以時喪葬以禮皆國恩也能守節者始可制姦贓之吏鎮豪猾之人法乃不私民則無枉近日屢有臣僚乞罷職田以其有不均之謗有侵民之害臣謂職田本欲養賢緣而侵民者有矣比之衣食不足壞其名節不能奉法以直為枉以枉為直衆怨思亂而天下受弊豈止職田之害耶又自古常患百官重內而輕外唐外官月俸尤更豐足簿尉俸錢尚二十貫今窘於財用未暇增復臣請兩地同議外官職田有不均者均之有未給者給之使其衣食得足婚嫁喪葬之禮不廢然後可以責其亷節督其善政有不法者可廢可誅且使英俊之流樂於為郡為邑之任則百姓受賜又將來升擢多得曾經郡縣之人深悉民隱亦致化之本也十一月壬戌施行六曰厚農桑臣聞德惟善政政在養民此言聖人之德惟在善政善政之要惟在養民養民之政必先務農農政既修則衣食足衣食足則愛膚體愛膚體則畏刑罰畏刑罰則冦盜自息禍亂不興是聖人之德發於聖政天下之化興於農畝故詩有七月之篇陳王業也今國家不務農桑粟帛常貴江浙諸路嵗糴米二百萬石其所糴之價與替運之費每嵗共用錢三百餘萬貫又貧弱之民困于賦斂嵗伐桑棗鬻而為薪勸課之方有名無實故粟帛常貴府庫日虛此而不謀將何以濟且如五代羣雄爭霸之時本國嵗飢則乞糴於鄰國故各興農利自至豐足江南舊有墟田每一墟方數十里如大城中有河閭外有門閘旱則開閘引江水之利淹則閉閘拒江水之害旱潦不及為農美利又浙西地卑常苦水沴雖有溝河可以通海惟時開導則潮泥不得而堙之雖有堤塘可以禦患唯時修固則無摧壞臣知蘇州日點檢簿書一州之田係出稅者三萬四千頃中稔之利每畝得米二石至三石計出米七百餘萬石東南每嵗上供之數六百萬石乃一州所出臣詢訪髙年則云曩時兩浙未歸朝廷蘇州有營田軍四都共七八千人専為田事導河築堤以減水患于時民間錢五十文糴白米一石自皇朝一統江南不稔則取之浙右浙右不稔則取之淮南故慢於農政不復修舉江南墟田浙西河塘大半隳廢失東南之大利今江浙之米石不下六七百足至一貫者比於當時其貴十倍民不得不困國不得不虛矣又京東西路有卑濕積潦之地每年國家特令開決水患大減今罷役數年漸已湮塞復將為患臣請每嵗之秋降勑下諸路轉運司令轄下州軍吏民各言農桑可興之利可去之害或合開河渠或築堤堰陂塘之類並委本州軍選官計定工料每嵗於二月間興役半月而罷仍具功績聞奏如此不絶數年之間農利大興下少飢嵗上無貴糴則東南嵗糴輦運之費大可減省其勸課之法宜選官討論古制取其減約易從之術頒賜諸路轉運使及靣賜一本付新授知州知縣縣令等此養民之政富國之本也七曰修武偹臣聞古者天子六軍以寧邦國唐初京師置十六軍官屬亦六軍之義也諸道則開折衝果毅府五百七十四以儲兵伍每嵗三時耕稼一時習武自貞觀至于開元百三十年戎臣兵伍無一逆亂至開元末聽匪人之言遂罷府兵唐衰兵伍皆市井之徒無禮義之教無忠信之心驕蹇凶逆至于喪亡我祖宗已來罷諸侯權聚兵京師衣糧賞賜常須豐足經八十年矣雖已困生靈虛府庫而難於改作者所以重京師也今西北強梗邉偹未撤京師衛兵多遠戍或有倉卒輦轂無備此大可憂也遠戍者防邉陲之患或緩急抽還則外禦不嚴敵騎進奔便可直趍關輔新招者聚市井之輩而輕囂易動或財力一屈請給不充則必散為羣盜今民生已困無可誅求或連年凶飢將何以濟贍軍之策可不預圖若因循過時臣恐急難之際宗社可憂臣請密委兩地以京畿見在軍馬同議有無闕數如六軍未整須議置兵則請約唐之法先於畿內并近輔州府召募強壯之人先京畿衛士得五萬人以助正兵足為強盛使三時務農大省給贍之費一時教戰自可防虞外患其召募之法并將校次第並先密切定奪聞奏此實強兵節財之要也候京畿近輔召募衛兵已成次第然後諸道效此漸可施行惟聖慈留意八曰減徭役臣觀西京圖經唐會昌中河南府有戶一十九萬四千七百餘户置二十縣今河南府主客戶七萬五千九百餘戶仍置一十九縣主戶五萬七百客戶二萬五千二百鞏縣七百戶偃師一千一百戶逐縣三等而堪役者不過百家而所要役人不下二百數新舊循環非鰥寡孤獨不能無役西洛之民最為窮困臣請依後漢建武六年故事遣使先往西京併省諸邑為十縣其所廢之邑並改為鎮令本路舉文資一員董𣙜酤關征之利兼人煙公事所廢公人除歸農外有願居公門者送所存之邑其所在邑中役人却可減省歸農則兩不失所候西京併省稍成倫序則行於大名府然後遣使諸道依此施行仍先指揮諸道防團已下有使州兩院者皆為一院公人願去者各放歸農職官廳可給本城兵士七人至十人替人力歸農其鄉村耆保地里近者亦令併合能併一耆保管亦減役十餘戶但少徭役人自耕作可期富庶明年五月己丑施行九曰覃恩信臣竊覩國家三年一郊天子齋戒衮冕謁見宗廟乃祀上帝大禮既成還御端門肆赦天下曰赦書日行五百里敢以赦前事言者以其罪罪之欲其王澤及物之速也如此今大赦每降天下歡呼一兩月間錢榖司存督責如舊桎梏老幼籍沒家産至于寬賦斂減徭役存恤孤貧振舉滯淹之事未嘗施行使天子及民之意盡成空言有負聖心損傷和氣臣請特降詔書今後赦內宣布恩澤有所施行而三司轉運司州縣不切遵稟者並從違制徒二年斷情重者當行刺配應天禧年以前天下欠負不問有無侵欺盜用並與除放違者仰御史臺提點刑獄司常切覺察紏劾無令壅遏臣又聞易曰先王以省方觀民設教故有巡狩之禮察諸侯善惡觀風俗厚薄此聖人順動之意今巡狩之禮不可復行民隱無窮天聽甚遠臣請降詔中書今後每遇南郊赦後精選臣僚往諸路安撫察官吏能否求百姓疾苦使赦書中及民之事一一施行天下百姓莫不幸甚十曰重命令臣聞書曰慎乃出令令出惟行準律文諸被制書有所施行而違者徒二年失錯者杖一百又臨主司受財而枉法者十五匹絞蓋先王重其法令使無敢動搖將以行天下之政也今覩國家每降宣敕條貫煩而無信輕而弗稟上失其威下受其弊蓋由朝廷從百官起請率爾頒行既昧經常即時更改此煩而無信之驗矣又海行條貫雖是故違皆從失坐全乖律意致壞大法此輕而弗稟之甚矣臣請將降詔今後百官起請條貫令中書樞密院看詳會議必可經久方得施行如干刑名者更於審刑大理寺勾明會法律官員參詳起請之詞刪去繁冗裁為制敇然後頒行天下必期遵守其衝改條貫並令繳納免致錯亂誤有施行仍望别降敇命今後逐處當職官吏親被制書及到職後所受條貫敢故違者不以海行並從違制徒二年未到職已前所降條貫失於檢用情非故違者並從本條失錯斷科杖一百餘人犯海行條貫不指定違制刑名者並從失坐若條貫差失於事有害逐處長吏别見機會須至便宜而行者並須具緣由聞奏委中書樞密院詳察如合理道即與放罪仍便相度别從更改仲淹正傳刪取十事太略又改覃恩信為第八重命令為第九減徭役為第十今悉依仲淹奏議詳著之上方信嚮仲淹等悉用其説當著為令者皆以詔書畫一次第頒下獨府兵輔臣共以為不可而止十事據仲淹正傳及政府奏議其附傳并實録皆無之實録於十月丙午載仲淹弼答手詔條上七事其四曰擇官長即附見丙午又壬戌日載磨勘年限蓋其一曰明黜陟也十一月癸未載試館職法丁亥載任子法二事皆其二曰抑僥幸也壬戌載均公田乃第五議又明年三月乙亥載貢舉新制實十事之三其八曰減徭役見五月己丑餘六七九十並未詳司徒吕夷簡固請老戊辰授太尉致仕朝朔望及大朝會並綴中書門下班諫官歐陽修言吕夷簡為陛下宰相而致四裔外侵百姓內困賢愚倒置紀綱大隳二十餘年間壞了天下人臣大富貴夷簡享之而去天下大憂患留與陛下當之夷簡罪惡滿盈事迹彰著然而偶不敗亡者蓋其在位之日専奪主權脅制中外人皆畏之不敢發擲及其疾病天下臣庶共喜姦邪難去之人且得已為天廢又見陛下自夷簡去後進用賢才憂勤庶政聖明之德日新又新故識者皆謂但得大姦已廢不害陛下聖政則更不得復言所以使夷簡平生罪惡偶不發揚正賴陛下終始保全未汚斧鑕是陛下不負夷簡夷簡上負朝廷今雖陛下特推仁恩厚其禮數然臣料夷簡必不敢當理須陳讓臣乞因其來讓便與寢罷别檢自來宰相致仕祖宗舊例與一合受官名然臣猶恐夷簡不識亷耻便受國家過分之恩澤緣夷簡子弟因父僥幸恩典己極今邉鄙多事外面臣僚辛苦者未嘗非次轉官豈可使姦邪巨蠧之家貪贓愚騃子弟不住加恩其子弟伏乞更不議恩典修又言臣伏見國家每出詔令常患官吏不能遵行不知患在朝廷自先壞法朝廷不能自信則誰肯信而行之然多因小人僥幸而不加抑絶所與之恩雖少所損之體則多臣聞去年十月中曾有臣僚上言乞今後大臣厮僕不得奏薦班行勑旨頒下才三四月已却用吕夷簡僕人袁宗等二人為奉職夷簡身為大臣壞亂陛下朝政多矣茍有利於其私雖敗天下事尚無所顧况肯為陛下惜法但朝廷自宜如何今一法才出而大臣先壞之則其次臣僚僕人豈可不與不與則是行法有二與之則近降勑旨今後又廢有司為陛下守法者不思國體但徇人情或云二僕得旨與官在降敇前奈何授官在降敇後凡出命令本為釐革前弊法家以後敇衝前敇今袁宗等雖曾得旨而未授命間已該新制自合釐革夷簡不能止絶而恣其僥求朝廷又不與舉行近敇而自隳典法今後詔令何以遵行其袁宗等伏乞特追奉職之命别與一軍將之類間名目足示優恩不可為無功之臣私寵僕奴而亂國法也袁宗等授班行不知何月當考去年十月降旨不得用大臣僕厮為班行三四月後却授袁宗等當考初降旨是何年十月修又言風聞吕夷簡近日頻有密奏仍欲自乞於御藥院暗入文字不知實有此事否但外人相傳上下疑懼臣謂夷簡身為大臣久在相位尚不能為陛下外平四方內安百姓致得二敵交結中國憂危兵民疲勞上下困乏賢愚失序刑賞不中凡百紀綱幾至大壞筋力已衰神識昏耗豈能更與國家事據夷簡當此病廢即合杜門自守不交人事縱未有忘報國之意凡事即合公言令外廷見當國政之臣共擬可否豈可暗入文書眩惑天聽况夷簡患攤風手足不能舉動凡有奏疏必難自寫其子弟輩又不肖須防作偽或恐漏泄於體尤為不便雖陛下至聖至明於夷簡姦謀邪説必不聽納但外人見夷簡密入文書恐非公論若誤國計為患不輕夷簡所入文字伏乞明賜止絶臣聞任賢勿二去邪勿疑見今中外羣臣各有職事茍有闕失自可任責不可更令無功已退之臣轉相惑亂始命宰臣章得象監修國史初吕夷簡罷相為司徒猶帶監修得象止除昭文館大學士及夷簡致仕乃以還得象賜知諫院王素三品服余靖歐陽修蔡襄五品服靣諭之曰卿等皆朕所自擇數論事無所避故有是賜襄數求補外以便親養樞密副使富弼曰諫臣不當遠去許給假迎親可也上許襄歸寧而不許其罷許襄歸寧此據寶訓實與賜章服相接己巳命天章閣侍講史館檢討王洙集賢校理同知諫院歐陽修同詳定國朝勳臣名次用元年赦書將録其後也羣盜張海等方熾庚午以監察御史蔡稟為京西安撫往督捕之詔諸路運使提點刑獄及諸州長吏舉所部兵馬都監及監臨場務使臣有材勇任巡檢者以名聞若捕賊有功即不次遷擢之辛未西上閣門使榮州刺史廣南西路鈐轄兼知宜州馮仲已領忠州團練使留在任壬申詔京西轉運按察使兼白波發運司自今嵗輪一員入奏計事甲戌龍神衛四廂都指揮使衛州防禦使郭承祜知相州承祜既罷真定州定州部署又欲求知真定府余靖言承祜非才乃命以相州實録於此猶繫真定府定州部署銜今削去樞密副使給事中任中師求補郡乙亥罷為禮部侍郎資政殿學士知永興軍丙子翰林學士吳育權知開封府端明殿學士兼翰林侍讀學士李淑為翰林學士諫官歐陽修奏事延和殿面論淑姦邪在開封猶疏外復拜學士益親近請罷之退又上言淑姦邪隂險之迹陛下素已知之今外邉臣僚骨肉同坐者不敢道李淑姓名蓋其穢德惡醜不可當據外人如此惡之豈合却在人主左右淑自來朋附夷簡在三尸五鬼之數蓋夷簡要為肘掖所以援引至此不知今日朝廷如此清明更要此人何用若欲藉其詞業則臣謂才行者人臣之本文章者乃其外飾爾况今文章之士為學士者得一兩人足矣假如全無文士朝廷詔敇之詞直書王言以示天下尤足以敦復古朴之美不必雕刻之華自古有文無行之人多為明主所棄只如徐鉉胡旦皆是先朝以文章著名於天下二人皆以過惡廢棄終身不齒當時朝廷亦不至乏人淑居開封過失極多然止是一府之害今在朝廷若有所為少肆其志則害及忠良沮壞政治是為天下之害故臣不可不言今雖陛下主張正人不信讒巧然淑之為惡出於天性恐不能悛過切慮依舊讒毁好人伏望聖慈一切不納早與一外任差遣使正人端士安心作事不憂讒毁之言尋有旨令淑知夀州既而不行修又言竊聞中書須得淑自上章求出方敢差除臣謂李淑姦邪之迹陛下既已盡知若得斷自宸衷則使天下之人皆知陛下明聖辨别忠邪黜去小人自出聖斷如此則今後姦邪險惡之人可使知懼而不敢為害今若如中書之意須待其自求退則是賞罰之柄不由明主自行去住之謀一任臣下取便如此則今後小人雖為姦邪險惡天子欲力去而中書必未肯行若不自退别無人敢差臣恐自此小人轉為得計不肯悛心進賢退不肖者宰相之職也今大臣既自避怨不肯為陛下除去姦邪賴陛下聖明洞分邪正又不能使依聖旨直與差除更須曲收人情優假羣小三四日來外邉聞陛下欲除李淑夀州人人鼓舞皆賀聖德蓋淑二三十年出入朝廷姦險傾邪害人不少一旦見人主斥去左右莫不欣抃却中書如此迂回自相顧避可惜聖明之斷不盡施行臣欲望更不須候其請郡因兩府奏事之時特出聖旨處分直除一外郡使天下皆知此姦邪穢惡之人是陛下自除去以彰聖明之德麟州指使殿侍李宣為右班殿直初本州飛騎指使吳友等四十九人陷賊圍而宣力戰援出之又本路經略司言宣屢與西賊戰身中流矢特擢之丁丑詔執政大臣非假休不許私第接見賔客從知諫院蔡襄之言也而議者以為唐元和用兵時裴度為相請私第延見四方賢俊以廣謀慮今一切禁絶賔客非諫官所宜言也是日羣盜晨入金州劫府庫兵仗散錢帛與其黨及貧民知州比部員外郎王茂先將直兵二十四人禦之既不敵遂走城外羣盜恣行掠奪日暮乃出城去茂先具以聞樞密副使富弼言臣伏思西賊未叛以前諸處雖有盜賊未嘗有敢殺戮官吏者自四五年來賊入州城打劫者約三四十州向來入城尚皆暮夜竊發今則白晝公行擅開府庫其勢日盛自此以往只憂轉熾若不早為隄備事未可知臣前嵗所上備職之策當時不曾施行近因兩府奏事論及淮南賊盜陛下問臣前策已再録進呈然前䇿只是聚兵備東南九路及京東一路今據王茂先奏金州在城兵士只有二十四人顯是無備致盜賊心生乞并京西一路亦於要害聚兵為諸州聲援須速賜施行若又遷延恐無所及弼又言伏見西鄙用兵以來騷動天下物力窮困人心怨嗟朝廷不能撫存遂使為盜今張海郭貌山等數人驚擾州縣殺傷吏民恣凶殘之威泄憤怒之氣巡檢縣尉不敢向前遂從京師遣兵仍令中使監督尚猶遷延日月倔強山林以至白晝公行平入州縣開發府庫劫取貨財散募凶徒嘯聚漸衆陜府西京唐汝均房金商襄鄧相去凡千餘里大被劫掠殺人放火所在瘡痍賊一經過六親不能相保人民恐懼道路艱難每郡無兵各不自保賊若大段結集攻陷諸州緩急亦未有所以備之之䇿賊既轉盛不可不防秦末隋末唐末諸冦或起於畎畝或起於商客或起於士卒或起於負擔觀其初起莫不甚微尚不得如張海郭貌山輩如此強盛然以小合大漸成巨盜縱橫難制遂亂天下今兹賊黨未見翦除所宜多設隄防以備滋蔓臣前日曾具劄子奏乞於京西路擇要害數州屯聚兵馬以為諸處聲援此最急務宜速施行臣又思京西諸州長吏皆非其人如襄鄧唐汝光隨均房金商安郢等十餘州盡是賊盜見今往來之處長吏尤須得人伏乞先選轉運兩人徑令往彼體量諸州長吏不才及贓濫老病者急罷之令於轄下通判或知縣中保舉人權充知州如不足則朝廷下審官院選差入填補知州得人則就令選部內知縣縣令昔前漢宣帝時渤海郡盜起帝選能治之者丞相舉龔遂遂至郡盜賊悉平後漢安帝時朝歌縣盜賊屯聚連年未獲乃以虞詡為朝歌長賊遂駭散此是兩漢時一郡一縣有賊只得龔遂虞詡兩人為守宰自然破滅之驗也今且以上項襄鄧等十餘州論之其知州知縣縣令皆庸謬懦怯尋常之人盜賊所到如入無人之境巡檢縣尉又一一不堪使賊不猖狂自恣復何為哉臣切謂非盜賊果能強盛自是朝廷只守敝法不肯更張惟恐不才不賢者怨恨不早罷去故以州縣委賊殘害臣謂盜賊之起已是遲矣若以朝廷自來處置次第早合賊滿天下但為宗社有靈陛下仁德所感故未至如此然今盜賊已起乃是遍滿天下之漸若朝廷依舊避人怨恨不早更張臣恐賊盜愈多竊據州縣或稱將軍或稱太尉或稱帝王兵戈四起所在僭偽事到如此生靈如何社稷如何朝廷守此一城還得安穩否况今來不同漢唐都關中洛陽關中洛陽各有險固可恃緩急有變用兵守險亦未能便至危窘當日明皇德宗俱曾播越唐室危若贅旒者數矣今來都城並無險固所謂八靣受敵乃自古一戰場爾若四方各有大盜朝廷力不能制漸逼都城不知何以為計臣每念及此不寒而戰臣又復思古者亂離無世不有然而傾亡至速者亦各不下三五十年惟唐室之後凡更五代十二帝共只得五十四年國祚短促自古未之有也其故何哉蓋是都城在四戰之地並無險固四方有變直到城下略無障礙之所致也惟是王者能鎮撫天下常使安寧災害不生盜賊不作如是都城可保無虞故大宋之興實太祖英武之才平定禍亂盡削方鎮兵權只用文吏守土及將天下營兵縱橫交互移換屯駐不使常在一處所以壞其凶謀也又賴太宗相繼尅復諸國一統天下更賴真宗為民屈已與北敵西戎議通和好故能得此八十餘年都城無事海內富庶不用干戈雖是人謀亦有天幸今則西戎已叛屢喪邉兵北敵愈強且增嵗幣國用殫竭民力空虛徭役日繁科斂日重官吏猥濫不思澄汰人民疾苦未嘗省察百姓無告朝廷不與為主不使叛而為冦復何為哉朝政不舉都城無依五代事形已復萌露艱虞之運正在今日須是君臣上下同心協力廢寢忘餐夙夜整救則數年之內或致小康若猶因循茍且尚務偷安不練人謀只求天幸臣恐五代之禍不旋踵而至矣臣因論京西盜賊遂及理亂憂懼所迫不覺切直陛下便賜萬死亦所甘心臣所乞選京西轉運知州知縣不可稽緩蓋擾攘之際全藉有才謀轉運使往來按察經營又藉逐處知州知縣守護城池安集百姓及設方略驅除冦盜餘有朝廷意所不到指揮不及者其良守宰必自能就便處置不至失事州縣既各得一人又得要郡所屯之兵掎角救應則盜賊不難擒捕矣至於巡檢縣尉亦可並委轉運知州揀選不煩朝廷費力此策最為簡要無可疑難京西既行次及諸路變或起於倉卒設備皆不可遲朝廷但能不務因循不避怨謗天下之事未有不可為者所有諸路揀退不才及贓濫老病轉運知州知縣縣尉等仰只在元守官處聽候朝旨更不令赴闕仍乞檢會臣前奏相度施行己卯詔陜西緣邉屬戶蕃部置烽火候賊馬壬午詔諸路部署司所募兵已教閲經年其以武技精強及怯弱不能戰鬬者分三等以聞甲申太白犯嵗星又犯太微左執法諫官余靖言伏覩太白犯嵗星於太微端門之右執法之前民庶共見風聞司天之奏乃以商洛羣盜便當其占此乃星官忌諱不敢正言臣歷觀漢晉隋書志凡五星之變金火謂之罰星太白與嵗相犯皆主兵喪及飢惟此三者國之大患其變乃出端門之右執法之側前志所占將有伏尸流血之變豈山澤小冦所能當之臣聞易曰天垂象見吉凶聖人象之又曰觀乎天文以察時變則知古之聖王恭勤寅畏以順承天天表之應各以其類且夫木為德金為刑惟金沴木五行所忌今二星同舍掩食逾時殆為刑德之頗乎國家自近嵗已來西戎不賔北敵恃強人心動搖戰守不足而軍須百物皆出於民殘忍之吏朝索暮辦爐錘之聲遍於天下此金氣太盛而刑之失乎民之壯者籍之於軍而居者又困其財貪進之人自為私計朘剝其下以希恩寵未聞朝廷講求寬民之術此木氣遂微而德不振乎况今州郡空虛無守禦之備官吏畏盜無撫御之術一夫大呼莫敢當者伏望陛下責躬修德以謝天變中外之政安民為本凡州郡之兵不足守者急偹其闕守宰之官不足任者速擇其代器甲之材出於農者頗緩其期米鹽之運傷於財者稍寬其力皮鐡之工拘於官者裁減其役民足於財則安其居而懷其生雖驅之為盜必不肯去安而就危也暴賦橫斂不加於民則怨怒不生而隂陽以和兵飢之患庶可消矣百官敘進必責其實使明陳所職以考功能外官必求息民之績在朝必視勤官之效則庶事盡興天下安矣至於省聲色之娛杜奢淫之好絶畋遊之樂節臺榭之觀順四時而安玉體親萬務而奮宸斷陛下日虞外難固當力行自致不待臣縷陳而蔓言之矣伏惟陛下內宣慈愛以敦九族外選才良以安百姓與廊廟大臣協忠慮善無怠於政則天下幸甚丙戌命史館檢討王洙集賢校理余靖祕閣校理孫甫集賢校理歐陽修同編修祖宗故事先是樞密副使富弼言臣歷觀自古帝王理天下未有不以法制為首務法制立然後萬事有經而治道可必宋有天下九十餘年太祖始革五代之弊創立法度太宗克紹前烈紀綱益明真宗承兩朝太平之基謹守成憲近年紀綱甚紊隨事變更兩府執守便為成例施於天下咸以為非而朝廷安然奉行不思剗革至使民力殫竭國家乏匱吏員冗而率未得人政道缺而將及於亂賞罰無凖邪正未分外域交侵冦盜充斥師出無律而戰必敗令下無信而民不從如此百端不可悉數其所以然者蓋法制不立而淪胥至此也臣今欲選官置局將三朝典故及討尋久來諸司所行可用文字分門類聚編成一書置在西庫俾為模範庶幾頽綱稍振敝法漸除此守基圖救禍亂之本也上納其言故命靖等編修弼總領之明年九月書成分别事類凡九十六門二十卷其間典法深大今世不能遵守者於逐事之後各釋其意意相類者止釋一事事理明白者更不復釋丁亥徙知慶州滕宗諒權知鳳翔府時鄭戩發宗諒前在涇州枉費公用錢十六萬緡而監察御史梁堅亦劾奏之詔太常博士燕度往邠州鞫其事宗諒坐是徙戊子命宣撫副使田况權知慶州范仲淹言臣昨日靣奏滕宗諒事當天威震怒之際臣言不能盡又章得象等不知彼中事理虛實皆不敢向前惟臣知從初仔細又只獨自陳説顯涉黨庇宗諒雖已行勘鞫必能辨明虛實然有未逹之情須至上煩聖聽今具畫一如後一梁堅元奏宗諒於涇州賤買人戶牛驢犒設軍士臣竊見去年葛懷敏敗後向西州軍官員驚憂計無所出涇州無兵賊已到渭州只是一百二十里宗諒起遣人户強壯數千人入城防守其時又水氷寒苦軍情愁慘得宗諒管設環慶路節次策應軍馬四頭項一萬五千餘人酒食柴薪並足衆心大喜雖未有大功顯是急難可用之人所以舉知慶州倉卒收買牛驢犒軍縱有虧價情亦可恕一梁堅奏宗諒在邠州聲樂數日樂人弟子得銀楪子三二十片者臣與韓琦到邠州筵會一日其時衆官射弓各將射中楪子散與過弓箭軍人及妓樂即非宗諒散與而罪宗諒又云士卒怨嗟况邉上筵會是常當直軍人更番祗候又何得其日便有怨嗟一梁堅奏稱到任後使過錢十六萬貫其間有數萬貫不明今來中使體量却稱只是使過三千貫入公用已有十五萬貫是加誣錢數物料是諸軍請受在十六萬貫內豈可諸軍請受亦作宗諒使過臣在慶州日亦借隨軍庫錢回易得利息二萬餘貫充隨軍公用支使外却納足官本今來宗諒所用錢數物料必亦是借官本回易所得將充公用一環慶一路四州共二十六寨將佐數十人兵馬五萬自宗諒勾當已及八九個月並無曠闕邉將軍民亦無詞訟處置番部軍馬公事又無不了若不才之人豈能當此一路一邉上主帥若不仗朝廷威勢何以彈壓將佐軍民使人出死力禦捍強敵宗諒是都部署經略使一旦逐之如一小吏後來主帥豈敢便宜行事一防秋及時主帥未有顯過而奪其事任將令下獄若遇賊兵冦境未知令何人卒然處置此路今差王元權領况王元在河東沮怯已曾責降今且在邉上備員豈可便當一路委寄恐更誤事一宗諒舊日疏散又好榮進所以招人謗議易為取信一臺諫官風聞未實朝廷即便施行臣目擊非虛而未蒙朝廷聽納臣若是誑妄之人不當用在兩府既有目覩之事豈可危人自安誤陛下賞罰兼西北未寧見搜求稍可邉上任用之人即加奬擢豈宜逐旋破壞使邉臣憂惕不敢作事雖國家威令不可不行須候見得實情方可黜辱臣欲乞朝廷指揮宗諒止在任勾當委范宗傑在邠州一面勘鞫干連人并將已取到慶州錢帛文帳磨勘如宗諒顯有欺隱入已及乖違大過即勾宗諒勘鞫如無乖違大過又無欺隱入已即差人取問分析緣由入急遞聞奏别取進止所有張亢亦奉聖旨令便勘鞫臣體量得張亢不能重慎為事率易昨在渭州亦無大段過犯乞委范宗傑一就勘鞫干連人依勘滕宗諒事行遣聞奏仍乞以臣此奏宣示臺諫官候勘得滕宗諒張亢却有大段乖違過犯及欺隱入已仰臺諫官便更彈劾臣甘與二人同行貶黜臣所以極言者蓋陛下委寄邉臣使一向外禦而無外憂之禍則邉上諸路人人用心不至解體有誤大事張亢自渭州徙并代在三年七月甲戌辛卯侍御史趙及等言太廟旁接民居而間有哭聲相聞請徙其民遠廟壖詔遇有祠事預令禁之壬辰翰林學士端明殿學士兼翰林院侍讀學士中書舍人李淑罷翰林學士為給事中出知鄭州權知開封府吳育言淑前在府多褻近吏人故也育領府事才數日發大姦吏一人流嶺外又得巨盜積贓萬九千緡獄具而輒再變衆疑其寃帝遣他吏接之卒伏法由是京師肅然詔諸路提點刑獄司専管勾巡檢盜賊公事先是參知政事范仲淹言臣竊見陜西河東邉計不足遂鑄鐡錢以助軍費而民多盜鑄日犯極典為法之敝久將不堪臣觀舜典曰金作贖刑又吕刑曰五刑不簡正于五罰是虞舜周公皆用贖法孔子刪書垂于後世明其可行之法歷代嘗行今久不用人或疑之臣欲乞且於陜西河東緣邉次州軍行之候戎事稍息官不闕用則别從朝旨一徒以上罪不贖一杖以下罪依下項一侵損於人皆不贖侵謂侵財物損謂傷折於人一兵士公人不贖內公人不因公事私自失誤者亦聽一為盜并造作詐偽及誣告論不干己事者皆不贖一捕捉賊盜公人違限等罪不贖一興販私茶鹽醖賣私酒并賭博人並不贖一所犯罪新條該贖至第三犯者不贖一衆人共犯一事合贖富貧不均者不贖內有物力願與衆人納罰錢者即皆聽贖造意人不以貧富不贖一軍人百姓同犯一事者皆不贖一應有廕并老小疾患之類但舊條合贖者并依舊法每斤納錢一百二十文足一舊條不該贖而今得贖者並取情願之人其銅每斤納錢一貫二百文足亦許以粟帛依時價折納其錢無物贖納者自依常法區别一逐縣仰典押保舉有行止會書札曹司一名赴本州法司習學法律委本州長吏以下聚廳試驗稍通刑名義理即放歸本縣充法司候三周年檢斷無失者與轉一資有失誤無贓私者五年與轉一資一所斷贖刑失錯者官吏各準其罪不以失減官典受贓者並以枉法贓論仲淹又言臣數日前面奏三代帝王子孫綿遠蓋由積德之深臣請陛下日修至仁之德下及民庶以感動天地此聖嗣無疆之本也今有劄子三道進呈內一道為議贖法事即乞降出臣近覩詔旨令御史臺審刑院大理寺修編敕所同議贖刑此陛下至德深仁被于億姓天下幸甚今諫官孫甫上言乞令大臣定奪施行臣欲乞特降聖旨令中書樞密院同與見議官員疾速定奪聞奏仍乞具贖杖罪已下情理輕者所貴易行二道乞不降出其一曰臣聞唐武德九年八月十八日詔曰觀省宫掖其數實多憫兹深閉久離親族一時減省各從娶聘自是宫中前後所出三千餘人又貞觀二年七月二日太宗謂侍臣曰婦人幽閉深宫情實可憫隋氏末年採訪無已此皆竭人才力朕所不取掃灑之餘更何所用於是命尚書右丞戴胄給事中杜正倫於掖庭西門揀出之臣不知今來宫中人數幾多或供使有餘宜降詔旨特令減放以遂物性又省冗費亦人君盛德之事可以感動天意其二曰臣聞淳化中太宗皇帝以邉戶飢荒多賣人口入蕃頗憫惻之時遣使以物貨收贖各還父母此人君之盛德也近年緣邉漢戶被西戎俘虜不少今既通人使乞出聖意以內帑物帛委邉臣漸次收贖陷蕃戶人口各還其家使父母子孫再得完聚則不惟邉上生民恩淪骨髓必也至德動天降祐王室書之史册光于後代癸巳詔先王用法簡約使人知禁而易從後代設茶鹽酒稅之禁奪民厚利刑用滋章今之編敇皆出律外又數改更官吏且不能曉百姓安得聞之而一陷于理身體髮膚以之毁傷父母妻子以之離散情雖可哀法不可贖豈禮樂之化未行而専用刑罰之弊歟孔子曰禮樂不興則刑罰不中刑罰不中則民無所措手足漢文帝使天下入粟於邉以受爵免罪而幾乎刑措其後京師之錢纍百巨萬太倉之粟陳陳相因其議科條有非著于律者或細民難知或人情不免或冒利犯禁或奢侈違令或過誤可憫之類别為贖法鄉民以榖麥市人以錢帛使民重榖帛免刑罰則農桑自勸富夀可期矣諫官余靖言臣不知誰為陛下畫此謀者徒知髙談而不知通時之變也今三邉有百萬待哺之卒計天下二稅上供之外能足其食乎故茶鹽酒稅山澤雜産之利盡歸於官尚猶日算嵗計恐其不足民貪其利而犯禁者雖死不避也今乃一為贖刑以寬其禁三軍之食於何取之臣伏見二年以來陜西淮南江浙添取鹽酒價錢而民犯愈多今若更為輕刑得以贖論則民輕其犯而莫之禁矣朝廷之尊惟先制度今一去令式任其僭侈上下無紀莫甚於斯伏乞追改前詔特令寢罷其陜西淮南江浙二年以來所添鹽酒價錢並放仍舊則冀乎民稍蘇息不犯於禁矣時議者亦以為若遂行此詔則富人皆得贖罪而貧者不能以自免非朝廷用法之意卒不果行歐陽修言臣昨自軍賊王倫敗後屢曾極言論列恐相次盜賊漸多乞朝廷早為偹禦凡為國家憂盜賊者非獨臣一人前後獻言者甚衆皆為大臣匆棄都不施行而為大臣者又無擘畫果致近日諸處盜賊縱橫自淮南新遭王倫之後今京以西州縣又遭張海郭貌山等劫掠焚燒桂陽監昨奏蠻賊數百人夔峽荆湖各奏蠻賊皆數百人解州又奏見有未獲賊十餘人滑州又聞強賊三十餘人燒劫沙彌鎮許州又聞有賊三四十人劫椹間鎮此臣所聞目下盜起之處如此縱橫也此外京東今嵗自秋不雨至今麥種未得江淮倫賊之後繼以飢蝗陜西災旱道路流亡日夜不絶似此等處將來盜賊必起是見在未滅續來者更多而乾象變差譴告不一於古占法多云天下大兵並起今兵端動於天下天象又告於上而朝廷安恬舒緩無異常時此臣前狀所謂古之智者能慮未形之機今之謀臣不識已形之禍者也臣聞兩漢之法凡盜賊並起人民流亡天文災異如此等事皆責三公或被誅戮或行黜放今幸朝廷仁聖寬慈大臣偶免重責而猶忘忽禍患偷習因循此臣所謂大臣不肯峻國法以繩官吏蓋由陛下不以威刑責其大臣者也今見在賊已如此後來賊必更多若不早圖恐難後悔臣計方今禦盜者不過四事一曰州郡置兵為備二曰選捕盜之官三曰明刑罰之法四曰去冗官用良吏以撫疲民使不起為盜此四者大臣所忽以為常談者也然臣視朝廷於此四者未必有一事合宜伏望聖慈嚴敇兩府大臣問其捨此四事别有可為茍無他術則此四事宜可施行臣竊聞州郡置兵富弼已有條奏其餘三事前後言事者論議甚多伏乞合聚群議擇其善者而行之修又言臣自初忝諫官於第一次上殿日曽建言方今雕殘公私困急全由官吏冗濫者多乞朝廷選差按察使紏舉年老病患贓汚不材四色之人並行澄汰仍具陳按察之法條目甚詳如臣之議本欲使使者四出而天下悚然知朝廷有賞善罰惡之意然後按文責實其惡者黜其善者升中才之人盡使警勵凡臣所言者乃所以救民急病澄革四十年蠧弊之事若非遭逄聖主鋭意求治之時上下力行之不可也奈何議者憚於作事惟樂因循祗命諸路轉運使就兼其職時雖再具論奏其議格而不行按察空文今遂寢廢生民蠧病日益可哀伏見陛下聖德日新憂心庶政近發手詔督勵宰輔然天下之事積弊已多如治亂絲未知頭緒欲事事更改則力未能周而煩擾難行欲漸漸整緝則困弊已極而未能速效臣謂始欲用功少為利博及民速於事切則莫若精選明幹朝臣十許人分行天下盡籍官吏能否坐而升黜之如臣所陳然後可臣聞治天下者如農夫之治田不可一概也蒿萊蕪穢久荒之地必先力行芟闢然後以時耕耨今特遣之使如久荒而芟闢也轉運兼按察乃以時而耘耨者爾寬猛疾徐各有所宜也漢時刺舉唐之黜陟使考課使之類每嵗遣出祖宗朝亦有考課院蓋按察升黜古今常法非是難行之異事也方今言事多以髙論見棄或以有害難行如臣所言只是選十餘人明幹朝臣察視官吏善惡灼然有迹易見者著之簿籍朝廷詳之黜其甚者耳臣自謂於論不為甚髙行之有利無害然尚慮議者未以為然謹别條具冗官利害六事以明利博效速而可行不疑伏望聖慈特賜裁擇一去冗官則民之科率十分減九臣伏見兵興以來公私困敝者不惟賦斂繁重全由官吏為姦每嵗科率一物則貪殘之吏先於百姓而刻薄老繆之人恣為羣下之誅求朝廷得其一分姦吏取其十倍民之重困其害在斯今若去此四色冗官而代以循良之吏事隨便宜絶去騷擾使民専供朝廷實數科率免却州縣分外誅求故臣謂於民力十分減九也此於别圖減省細碎無益者其利博矣二不材之人為害深於贓吏國家之法除贓吏因民先發者乃行之其他不材之人大者壞州小者壞縣皆明知而不問臣謂凡贓吏多是強黠之人所取在於豪富或不及貧弱不材之人不能馭下雖其一身不能乞取而恣其羣下共行誅剝更無貧富皆被其殃為害至深縱而不問故臣尤欲盡取老病繆懦者與贓吏一例黜之三內外一體若外官不澄則朝廷無由致治今朝廷雖有號令善者降出外方若落此四色冗官之手則或施設乖方不知朝廷本意及為民害或留滯廢失全不施行而又無紏舉多作空文若外邉去却冗官盡得良吏則朝廷行下之令雖有乖錯彼亦自能回改或執奏更易終不至為大害是民之得失不獨上賴朝廷全賴官吏善惡以此而言冗官豈可不去四去冗官則吏員清簡差遣通流今天下官有定員而入仕之人無定數既不黜陟冒濫者多差遣不行賢愚同滯每有一闕衆人競爭得者無亷恥之風不得者騰怨嗟之口濫官之弊近古無之今若擇四色冗官去之則待闕之人可無怨滯五去冗官則中材之人可使勸懼今天下官吏豈必盡是不才蓋為朝廷本無黜陟善惡不分今若見國家責實求治人人精别則中材之人皆自勉強不敢因循雖有貪殘亦須斂手六去冗官則不過期月民受其賜方今朝廷雖有憂念恤民之意然上下困乏必未有餘力廣惠及民若但去冗官則民受速賜蓋臣嘗見外處州縣每一繆官替去得一能者代之不過數日民已歌謡今若盡去冗濫之吏而以能吏代之不過期月民必受賜此臣所謂及民速於事切者也此疏不得其時疏云近發手詔督勵宰輔實録於十月十二日始載手詔一再下實録俱不載但因選差張昷之等并言之然則決非十月十二日手詔始下也今以此疏附九月末
