front:
  text: 李燾進續資治通鑑長編原表臣燾言臣先於去年八月準尚書省劄子三省同奉聖旨依敷文閣直學士汪應辰奏取臣所著續資治通鑑自建隆迄元符令有司繕寫校勘藏之祕閣臣尋於十四日蒙恩賜對面奉聖旨令臣早投進遂除官郎省兼職史局續又準尚書省劄子奉聖旨令臨安府給扎臣今先次寫到建隆元年至治平四年閏三月五朝事迹共一百八十年計一百八卷內建隆元年至太平興國元年太祖一朝事迹雖曽於隆興元年臣知榮州日具表投進已蒙降付史館後來稍有增益謹重别抄録投進外餘治平後文字增多兼見修四朝正史未畢欲望聖慈特賜寬假臣更加整齊節次修寫投進踈逺微賤僭為此書罪當誅絶聖主不即麾斥乃過聽而兼收之臣死且不朽矣臣誠惶誠恐稽首頓首臣竊聞司馬光之作資治通鑑也先使其寮採托異聞以年月日為叢目叢目既成乃修長編唐三百年范祖禹實掌之光謂祖禹長編寧失於繁無失於略當時祖禹所修長編蓋六百餘卷光細刪之止八十卷今資治通鑑唐紀自一百八十五卷至二百六十五卷是也故神宗皇帝序其書以為博而得其要簡而周於事臣誠不自揆度妄意纂集雖義例悉用光所創立錯綜銓次皆有依憑其間抵牾要亦不敢自保區區小忠前表蓋嘗具之仰惟祖宗之豐功盛德當與唐虞三代比隆乾坤之容日月之光繪畫臻極訖弗能近矧令拙工強施丹墨臣誠愚暗豈不知罪然而統會衆説掊擊偽辨使姦欺訛訕不能乘隙亂真祖宗之豐功盛德益以昭明譬諸海嶽或取涓埃之助顧臣此書詎可便謂續資治通鑑姑謂續資治通鑑長編庶幾可也其篇帙或相倍蓰則長編之體當然寧失於繁猶光志云爾伏惟皇帝陛下煥乎文章固已經緯兩儀黼黻萬化如臣薄技又安足陳陛下徒以祖宗之孫謀彛憲往往在是遂委曲加惠之使前承命踴躍干冒來獻夤緣幸會得御燕間千百有一儻符神指更擇耆儒正直若光者屬以刪削之任遂勒成我宋大典垂億萬年如神宗皇帝所謂博而得其要簡而周於事者則將與六經俱傳是固非臣所能而臣之區區小忠因是亦獲自盡誠死且不朽矣所有續資治通鑑長編一百八卷今寫成一百七十五册并目録謹隨表上進干瀆宸嚴下情無任戰汗屏營之至臣燾誠惶誠恐稽首頓首謹言
