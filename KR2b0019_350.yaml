body:
  text: 續資治通鑑長編巻三百四十六宋李燾撰神宗元豐七年六月己巳朔詔御史中丞侍御史殿中侍御史就䑓劾右班殿直皇甫旦仍命中書舍人蔡京右司員外郎路昌衡同治上初手詔李憲曰回鶻與吐蕃近世以來代為親家而回鶻東境與達靼相連近日諸路採報多稱夏人苦被侵擾若因二國姻親之故乗漢蕃連和之際假道通信厚以金帛撫結俾為我用則亦可争張彼之兵力不得悉衆南下不為無助况聞達靼之俗獷悍喜鬭輕死好利素不為夏人所屈若不吝金繒厚加恩意勢或可動爾冝選擇深曉蕃情及善羌語使臣三兩人計㑹鄂特凌古令選遣二三親信首領同諭彼令多發勁兵深入夏境討之仍邀彼首領入漢受賞宜詳度以聞又詔曰昔吐蕃當唐至徳已後其彊若不可嚮邇以蜀地逺絶其民綿懦疑無可經營之理而韋臯在成都乃能以計暌南詔之好使離彼親我卒收功西境東得城鹽之利吐蕃縁此其勢日蹙况今達靼之彊仇彼如此與異牟尋豈同日語哉宜力經營之憲奏自古控馭外國使其左枝右梧為備不暇盖由首先結其旁國絶其外交然後連横之勢常在中國彼有犄角之患昔南詔之盛韋臯馭得其術故西復嶲州自是吐蕃日加窮蹙以今夏賊之彊固不逮吐蕃若以青唐輝和爾達勒達連横之勢豈易枝梧况達勒達人馬獷悍過於西戎兼與夏人仇怨已深萬一使為我用不獨争張夏人兵力不得悉衆南下兼可以伺其間隙使為搗虛之計如去歲舉國嘯聚於天都則河西賊衆為之一空若以青唐輝和爾達勒達三國人馬併攻其背就使未能逺趨賀蘭其甘涼𤓰沙必可蕩盡臣仰奉睿訓審究利害惟患將命未有可副遣使之人縁深入絶域經渉三國萬一踈虞適以為累夙夜思慮致力經營於是憲選旦押輝和爾達勒達首領赴闕上復命齎詔還諭董戩鄂特凌古出兵憲恚事不出已使其屬鍾𫝊李宇作奏言旦難以集事必無可為之理與初奏不同旦入蕃為首領經沁伊達木凌節薩卜賽置木沁等所紿止塜山寺不得前又妄奏獲賊功狀上察之故命追旦等付獄御集四月二十八日入蕃勾當回使臣皇甫旦可令乗逓馬赴闕太中大夫龍圖閣待制知江寜府陳繹免除名勒停追太中大夫落龍圖閣待制知建昌軍子承務郎彦輔衝替繹坐前知廣州作木觀音易公使庫檀像私用市舶乳香三十斤買羊虧價為絹二十八匹上言詐不實彦輔坐役禁軍織木綿非例受公使庫饋送及報上不實也舊紀書知江寜府陳繹以贓落龍圖閣待制知建昌軍新紀削去戸部言凖批狀提舉汴河司言畿内諸縣民間茶鋪亦乞請買水磨官茶其法施於京師衆以為便府界宜與輦轂下不殊從之候二年立法實錄載此事不詳乞請買官茶今用紹聖編錄䇿增入水磨二字庶易曉水磨茶法何年始要見實月日六年二月二十七日八月十二日可考似初置水磨時更詳之紹聖元年九月二十八日敇中書省送到戸部狀凖敇勘㑹元豐中嘗置水磨茶出賣與在京舖戸故京師食茶無夾雜之弊而茶商無留滯之患官歲收息計二十餘萬貫元祐中悉皆罷廢臣等欲乞參酌舊制重行興復三省同奉聖㫖水磨茶應興復合行事件令戸部疾速先具措置申尚書省九月二十八日三省同奉聖㫖並依戸部所申差孫廻提舉檢㑹舊行水磨日前後條制參酌今來合行及改到分項内一檢凖元豐七年六月一日敕中書省尚書省送到左部狀凖都省批下都提舉汴河堤岸司奏勘㑹本司近凖朝㫖在京賣茶人戸不許擅磨末茶並令赴本司水磨請買斤茶歸舖貨賣本司已依朝㫖施行近日據府界諸縣茶舖等人戸赴司陳狀為見在京茶舖之家請買水磨末茶貨賣别無頭畜之費坐獲厚利其府界茶舖係與在京舖戸事體一般乞依在京茶舖人戸例赴水磨請輸歸逐縣貨賣及依在京茶法禁止私磨茶貨本司今勘㑹自興置水磨後其内外茶舖人戸各家免雇召人工養飼頭口諸般浮費及不入末豆荷葉雜物之類和茶委有利息其民間皆得真茶食用若比自來所買舖戸私磨絞和偽茶其價亦賤兼販茶客人亦免民間賖欠錢物赴本司入中茶貨便請見錢再行興販甚有利潤沿路徃來所收商稅不少今來已凖朝㫖並依本司奏請立法自推行以來其舖戸例各比元供請買茶數外甚添斤重請輸盖為獲利極多故府界諸縣茶舖等人戸有伏乞依在京例請買水磨茶貨禁絶私磨本司看詳若依逐縣人戸所陳即委是止絶外縣添和茶法及免經久却生弊倖并侵在官茶法誠為利便如賜施行即乞依下項約束令取進止後批五月八日送戸部勘當并小貼子稱勘㑹客人販到茶貨指徃府界諸縣販賣今來既已立限陳首給引入京赴水磨場中賣其到京合納稅錢亦乞依自來條例勾收送納入官戸部勘㑹下項事仍連元状六月一日奉聖㫖並依請一依敕命指揮施行仍關合屬去處牒件如前請詳前項尚書戸部牒内聖㫖指揮施行仍關牒應干合屬去處者一客人興販茶貨係於諸路外應係徃府界及在京者委産茶山塲州軍出引並皆赴京官塲中賣即不得沿路及府界地分貨易如違告首罪賞並依私臈茶法一諸路末茶不得入府界地分貨賣如違即依本司印出在京茶法施行已上本部勘當欲依本司奏乞事理施行詔河東路銷廢五指揮禁軍錢糧即非一路兵額有闕數衣糧之比並封樁以給提舉保甲司起教之費御集載此尤詳今附見提舉河東路保甲司奏併廢禁軍五指揮歲省衣糧料錢郊賞草料等本司即未審依今來轉運司牒支充額外招添兵士請受為復只依先降朝㫖充起教保甲支用上批勘㑹上項銷廢五指揮兵員樁管衣糧之比顯是轉運司未能如此分别曉悉縷細再三申明行下仰疾速攴撥付提舉保甲依舊樁管詔五路提舉保甲司已撥常平糧凖備賑濟令相度保甲遇災傷不及五分當如何等第賑濟條具以聞其後提舉河東路保甲王崇拯言賑濟災傷保丁四等以下本戸災傷及五分以上即依常平司七分以上法從之河北陜西開封府界准此辛未朝議大夫知荆南孫頎直龍圖閣知廣州初除朝奉大夫鴻臚少卿陳睦為寳文閣待制知廣州給事中韓忠彦言睦性行貪猥才識昏短偶縁泛海之勞僥倖至此擢置侍從實玷清班詔罷睦以命頎賜董戩鄂特凌古所部人傷中絹千疋御史寋序辰言去年五月舉行大理寺長貳親訊獄及十日慮囚格聞長貳並不親慮望更案實詔大理寺分析朱本削去壬申朝散郎龍圖閣待制熊本試吏部侍郎初宜州蠻擾邉本以知桂州始至即戒邉吏毋輙生事勞問溪峒酋長人人得其心乃請選将練土兵以代戍卒益市馬以足騎兵宜州遂無事而朱崖黎人之圍觧土人蔡寳珍導隆蕃引兵與熟戸訟欲取以為功本問之色動縛寳珍投海上夷人以為神諜者云交人將以明年入冦使者實其言詔問本曰安南使人在道不應有此藉令有謀不應先使人知後果妄初郭逵宣撫安南劉九以廣源郡建為順州朝廷以為不足守詔給賜李乾徳疆畫未明而交人狃窺宜州之隙欲并取儂智㑹勿陽地搗虛掠歸化逐智㑹智㑹竄右江乞師本遣使問狀交人為歛兵乾徳謝罪本請賜以宿桑八峒不毛之地嶺表為安六月四日已書本試吏侍七月二十八日又詔本措置交趾邉防八月九日又書本試吏侍盖六月四日既除吏侍尋以邉事留桂州八月九日又申命耳八月二十一日戊子十月二十二日戊子可考五年七月八日本以龍制知桂州今年五月庚戍賜奬諭詔知滑州俞希旦通判蘇注各减磨勘二年賜銀絹百造浮橋成賞之也御史寋序辰言畿内縣民相繼被彊盗畏憚無敢告發乞案驗廵捕官曠慢不職重加黜責詔開封府界提㸃司究實以聞奉議郎右司員外郎范純粹權發遣河東轉運副使己而不行七月四日復為右司郎中癸酉權發遣河東路轉運使朝散郎苖時中為直龍圖閣知桂州詔春銓試中第一人循一資第三人占射差遣中等八十九人不依名次注官下等四十五人注官詔已遣朝奉郎任公裕徃發運司刷磨見欠内庫錢慮公裕顧避根究滅裂可續遣入内供奉官謝禋同根究福建路提㸃刑獄李茂直言槍杖手李杭闘敵殺獲軍賊藍載等十八人詔將官彭鐸等所領應募兵民各發歸元來去處上殺獲正賊人功狀詔封樁糧草依年次以新物兊換同提舉河北東路保甲劉定言李寜乆領河北保甲及曽兼領陕西保甲盡心宣力冒暑得疾身亡乞厚賜軫恤使其家屬不致失所詔李寜自朝廷推行保甲教事已來用心其間宣力為多可止作朝廷特有處分賜絹五百匹本家甲戌禮部言親郊之歲夏至祀皇地祇於方丘遣冢宰攝事禮容樂舞謂宜加於常祀而其樂簴二十樂工百五十有二舞者六十有四與常歲南北郊上公攝事無異殆未足以稱明詔欽崇之意乞自今親郊之歲方丘所用樂舞凖親祠用三十六簴工人三百有六舞人百三十有四從之又言歐陽修等編太常因革禮始自建隆訖於嘉祐為百巻嘉祐之後闕而不録熈寜以來禮文制作足以垂法萬世示下太常博士接續編纂以備討閱從之朱本又於九月二十三日己未書續因革禮今止就此出之乙亥手詔李憲近聞西蕃首領董戩已於年前十月亡歿兼鄂特凌古曽使人諭邈川温錫沁令西望燒香事縁董戩世受朝廷爵命其存亡理須當知未審經略制置司曽與不曽承凖本蕃遣人𫝊報及伺問得即今繼立者為誰疾速以聞六年十月末董戩死鄂特凌古立凌王鞏甲申雜見云劉晦叔昱言鄂特古本不當立因私其國母而得立大臣温錫沁常不協宻遣腹心詣王文郁乞内附文郁請于朝神宗曰此欲我為渠援爾但善加撫慰而已亦以夷狄攻夷狄之道也邉臣老將嘆服睿算於是終元豐置而不論紹聖初孫路亦以為可納章子厚除路漕陜西將行問安厚卿李邦直厚卿曰先帝不納豈無深意耶邦直曰路好官職一至如此既至永興但見路與鍾傳對榻而寢者一月一日傳謂晦叔曰此事决難為得之易守之難也其後鍾傳被召具言不可子厚亦意緩後鍾傳坐冒賞貶逐又造成其議鞏所記如此當考孫路除陕西在紹聖二年正月十三日按董戩死既二年至元祐元年正月十鄂八日乃降詔許鄂特凌古承襲二年八月末蘇轍奏論特凌古承襲事似得之王鞏也當考御史劉拯乞大理寺開封府左右廂軍廵府皆置門簿凡追送人具人數事目知在斷放並末書結絶從之令刑部立法禮部言親祠儀注享太廟祀圜丘皇帝並服靴袍至大次伏縁車駕自大慶殿赴景靈宫太廟翌日赴南郊並服通天冠絳紗袍且祀以進為文冝有隆而無殺前一日既盛服以赴祠所及行事之旦所謂三日齋一日用之者也乃服靴袍至大次未協禮意謹案郊特牲曰祭之日王皮弁以聽祭報報謂小宗伯告時告備也説禮者以通天冠猶古之皮弁則通天冠者齋服也今禮部奏中嚴外辦所謂告時備者也伏請太廟圜丘祭日之旦自齋殿赴大次殿服通天冠絳紗袍從之丙子詔陜西三銅錢監所増鑄折二錢每監以五萬緡為額息錢賜轉運司涇原路經略司言西賊奔衝過塌嶺岔徳順軍第十七堡廵檢東頭供奉官王友戰死詔贈友皇城副使以三資官其子仲安仲堅仲淵並為三班借職舊紀書丙子夏人㓂徳順軍廵檢王友死之新紀同丁丑詔河東鄜延環慶路各發戸馬二千匹以給正兵河東路可就給本路鄜延路以永興軍等路環慶路以秦鳯等路其少數即以開封府界戸馬如尚少内鄜延路仍以京西路坊郭戸馬所發馬官買者給元價私買者分三等上三十千中二十五千下二十千以解鹽賣錢阜財監應副市易錢先借支開封府界以左藏庫錢餘以本路錢専管勾官開封府界委范峋河東范純粹秦鳯等路李察永興軍等路葉康直其買過尸馬限三年七月六日可考本志云七年詔發戸馬河東鄜延環慶路二千以給正兵河東路就給本路鄜延路以永興軍等路環慶路以秦鳯等路及開封府畿戸馬益之鄜延即益以京西坊郭戸既給正兵後遂不復補實録無既給正兵後遂不復補此合増修己夘乾寕軍言軍居河流之間隄防之内欲應有違犯若自大城越至本軍或自本軍越過河東之類並依已至越所未渡法并兩河自依私渡法從之權發遣提舉河北東路保甲劉定權發遣同提舉河北路保甲庚辰知河南府韓絳言臣伏覩頒行保甲養馬敕京東限十年京西限十五年數足令提舉保馬官吕公雅須令作七年收買又令毎都保先選二十匹是將十五年合買之馬作二年半買足恐非朝廷經始之意京西北不産馬民又貧乏乞許於元限减五年詔提舉京西路保馬司遵守元降敕限五月二十三日七月二十三日可考本志同此蘇州言資政殿學士太子少保致仕元絳卒絳工於文辭為流軰所推許上以此厚遇之在中書蕃夷書詔多出其手景靈宫作神御十一殿夜𫝊語草上梁文遲明以進既得謝上謂曰卿可營居京師朕資卿金幣且便耆寕仕進絳惶恐謝曰臣有田廬在吳歸可售即築室都城得望屬車之塵幸矣何敢冀賜邪行次近郊上遣近侍賜白金千兩及卒輟視朝贈太子少師謚章簡上得其遺奏憫惜之出示執政曰此必絳之文也詔其家集平生文章上之林希云絳自太子少保贈太子少師贈官不出本品自絳始先是胡宿自太子少𫝊歐陽修趙槩自太子少師贈太子太師三人皆以受遺故優贈之非常典也附注當考辛巳内藏庫使忠州刺史彭孫為皇城使西頭供奉官閤門祗候張直為内殿承制内殿崇班姚雄潘逢楊拱各遷兩官桑湜髙士言胡仕清郭成陳元姚師閔各遷一官從姚麟出塞功也彭孫十一月乙未又遷果州團練使知太原府吕惠卿言本路歲認糴榖十萬石送鄜延路支移太逺民不便之乞罷應副止令陜西轉運司自計置其價錢依河東路元降指揮於垣曲監撥還詔范純粹孫覽相度以聞純粹言河東出糧至廣乞且令應副候邊事息追還將兵别自朝廷詳酌指揮覽言乞責逐路自辦仍免於垣曲監償糴價詔令河東陜西各計置五萬石詔支垣曲監錢賜廣南西路經略司度僧牒二百應副融州新招納溪峒置堡寨詔沿邊主兵官雖因非衝替差替若在任勾當得力藉才不可輟去許經略司保明奏裁五月一日可并此壬午詔西京左藏庫使吉州刺史入内副都知石得一以所賜管地建僧寺賜迎祥院為額遇同天節度僧一人詔自今開封府免後殿起居以戸部尚書王存言自官制行戸部尚書侍郎領三司長貳職事止赴前殿起居唯知開封府依舊赴後殿縁知府於後殿非供奉職司而實廢决事時刻故有是詔癸未權發遣京西轉運判官沈希顏言前官任内為財用不給借過南北路提舉司坊場錢三十萬緡立限四年撥還乞自元豐八年歲償五萬緡從之詔李憲乞選差蘭州守城小使臣五人赴安彊米脂塞門浮圗義合塞計度守備委劉昌祚以名聞李憲毋得占留鄜延路經略司言諜報西賊今秋必為大舉之計乞下諸路防戒詔陜西河東經略司檢㑹累降朝㫖選差信實入深入體探過為之備具措置方略以聞甲申京西路轉運司言凖敕兩路提舉常平司各借十萬緡與轉運司官自筭請般賣解鹽乞本路民已買解鹽盡數買入官從之解鹽已𣙜賣商人許其販易今京西轉運司又為榷法鹽之過洛者皆苛留入官使輸錢然後放行盖沈希顔掊克以牟利商旅苦之後不復行朱本簽貼云前史官以為掊克皆無照驗文字特出於史官私意合刪新本已復存之今從新本又御集京西路轉運司奏狀伏見解鹽之法客人就解池請鹽至西京毎蓆約有一貫以上浄利般至㐮郢州約收息二貫計有浄利錢二十萬貫添助財用御批宜下戸部限三日勘當如别無違礙事理即依所奏疾速施行元豐七年六月十六日下本志載此事與實録御集同但出沈希顔姓名耳詔已降五陣法令諸將教習其舊教陣法並罷盖九軍營陣為方圓曲直鋭凡五變是為五陣元祐元年二月十六日復教御陣乙酉禮部言親祠祝䇿文云謹以犧牲粢盛嘉齊庶物恭薦歲事冝並凖曲禮備舉牲幣粢盛之號又五福十太一祝板青詞稱嗣天子臣某謹案古之祝辭以天子至尊雖祗事天地宗廟示民嚴正盖未有稱臣者故禮曰踐阼臨祭祀内事曰孝王某外事曰嗣王某内謂宗廟外謂郊社大戴禮載祀天祝文稱余一人某漢承古禮稱天子以事天其賛饗辭又曰皇帝魏明帝始詔祀天地明堂五郊可稱天子臣某東晉賀循製策祝文稱皇帝臣某沿襲至今蓋用魏晉之制本朝儀注祀儀於上帝五帝日月皆稱臣至於五福太一與九宫貴神皆天官也近制亦稱臣檢㑹九宫貴神祝板進書已不稱臣五福十太一當依熈寜六年以前故事其被遣之官自冝稱臣如此則不失輕重之體又先農正座帝神農氏祝文云以后稷配神作主配座后稷云作主侑神謹案春秋公羊傳曰郊則曷為必祭稷王者必以其祖配王者則曷為必以其祖配自内出者無匹不行自外至者無主不止何休曰天道闇昧故推人道以接之然則古者作主配神之意本施於祖宗其間有雖非祖宗而祝辭可以言作主配神者如五人帝之於五天帝是推人道以接天神勾龍之於社后稷之於稷是推人道以接土榖之祇其祝辭俱云作主可也若並為外祭而正配座又皆人鬼則以正座為主其配座但合食從祭而已伏請於神農祝文云以后稷配於后稷云配食于神髙禖以伏犧高辛配祝文並云作主配神神無二主伏犧既為主其高辛祝文伏請改云配食于神並從之丙戍朝議大夫管勾靈作觀蔡伯俙言昨未分司以前在分司年分并令朝見通經兩南郊乞奏補子孫詔伯俙㓜嘗侍仁宗特許之賜都水監度僧牒二百應副滑州諸埽梢草朝散大夫工部郎中范子竒為左司郎中建言天下事六曹不得専者上尚書省類非細務必郎中互閱付受不當委開拆房吏同僚異議乃奏取决上曰子竒之言是矣此豈吏所得專耶於是左司郎中闕即以命子竒韓駒云舊左右司人吏皆本㕔郎官於諸官府指差其後用堂後官有㫖都司上事令史錄事以狀通賀餘並參謁又文字初下止用吏人閱視分房其後有㫖輪都司一員受諸處文字皆范子竒啟請蔡確奏行之也戊子集禧觀使王安石請以所居江寜府上元縣園屋為僧寺乞賜名額從之以報寜禪院為額或云安石愛其子雱雱性險惡安石在政府凡所為不近人情者雱實使之既死安石哀悼乆而不忘嘗恍惚見雱荷鐡枷如重囚狀遂請以園屋為僧寺蓋為雱求救於佛也此據邵氏見聞錄増入己丑廣南西路轉運司言民户逋鹽稅錢加糴米其縣令佐監當官雖得正官交替乞並住給請受勒令催理候足日放罷從之納外欠不滿五分即放罷永興軍路提㸃刑獄司言軍賊王冲乆於商虢州界作過除依條立賞外乞親捕獲人與班行官員設方略或闘敵捕殺徒伴優與遷官并召募土人日支錢米選捕盗官統領令分路入山緝捕從之詔元豐三年開封府界諸縣所管保甲二百八十都保計六萬八千八百六十三人今方及三年所少人丁一萬己上未知減落因依可令提舉保甲司分頭委官及責勒令佐根究縁故具奏此據御集付劉琯庚寅蕃官莊宅副使高永堅為右騏驥副使文思副使許利見為左藏庫副使内殿承制雅爾為供備庫副使内殿崇班吹恭為内殿承制河東經略司上出西界逢賊戰功推賞也詔將副遇調發如無親屬許奏帶親隨二人亦給遞馬帶親屬親隨通不得過二人毋得以命官有差遣人修入將敕辛卯權知誠州周士隆言凖詔酬賞招納溪峒開修道路有功人第一等劉錫田延邈何廣各賜絹三十錫等蹈渉危險極為勞差田延邈乞與改官劉錫何廣乞各與名目今在新路堡寨勾當詔延邈遷一資錫下班殿侍廣軍將詔稅務年終課利増額依鹽酒務賞格從京西轉運司請也元祐七年八月五日蘇軾言可考詔贈故崇信軍節度使任澤墳寺歲許度僧二人澤任夫人弟也新本削去朱書鄜延路經略司言凖朝㫖措置禦敵利害今並邉六將已駐要害之地兵勢相連又欲以萬餘人屯金明寨以備諸將緩急從之新本削去朱書武昌軍留後江夏郡王知大宗正事宗惠卒贈昭徳軍節度使開府儀同三司追封剡王謚勤孝壬辰禮部請如太常丞吕升卿言大禮受誓戒以平明左僕射誓文武官於朝堂右僕射誓宗室於太廟從之賜専一管勾製造軍器所度僧牒千五百買木修置京城四御門及諸甕城門幇築團敵馬面并給役兵官吏餐錢甲午知蔡州黄好謙言所部水災特甚乞放秋稅詔戸部速行乙未以安化軍節度使同知大宗正事高宻郡王宗晟知大宗正事相州觀察使宗景同知大宗正事手詔李憲今歲自仲夏已後隂氣僭常滛雨作沴深慮秋杪羗賊聚衆不測侵軼須冝過有防慮仰熈河路經略司安撫措置司檢㑹朝廷前後累降指揮枝備大敵丁寜約束自此月已去月日不多旦夕加慮諸事謹為隄防措置切冝謹重勿貽朝廷西顧之念朱本増入新本削去户部言陕西軍須經費初令經略轉運司通管後朝㫖應千軍須及前後撥賜及見在經費錢物並付轉運司通收一切支費自管認勘㑹王欽臣言王震㑹定之法亦未可行今葉康直等詳度乞以逐路沿邉糴買並依王震㑹定法王欽臣續奏乞依李察所請環慶一路並以王震元定物價交與環慶經略司候及一二年成法即乞諸路遵守詔依葉康直李察所奏朱本削去正月十九日又二月二十七日當考朱本并此於二月二十七日却盡削此更詳之或存此削彼河東路經略使吕惠卿言本路兵馬凖朝㫖團成十二將欲以太原府封樁軍器於逐將所過州軍排垜封樁從之詔府界保甲司市按賞銀毋得抑配丙申詔應經併廢州縣今復舊者具元建議官職位姓名以聞上以併廢州縣出於使者欲以増剰役錢為功故令考察朱本改欲以增剰役錢為功但云妄有申請今從舊文
