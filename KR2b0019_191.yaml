body:
  text: 續資治通鑑長編卷一百八十七宋李燾撰仁宗嘉祐三年春正月己卯以福州進士陳烈為安州司户參軍烈性介僻篤于孝友慶厯初預鄉薦黜于禮部遂不復踐場屋從學者常數百人天章閣待制曺頴叔知福州薦之授試校書郎本州州學教授于是翰林學士歐陽修又薦之故有是命烈皆辭不受甲申封江夏民妻張氏為旌德縣君表其墓曰烈女敕州縣致奠賜其家酒帛初里惡少謝師乞持刀逼張欲與為亂曰從我則全不從則死張大罵曰庸奴可死不可他也至以刃斷其喉猶能走禽師乞以告鄰人事聞特褒異之己丑詔開封府陳留襄邑尉氏縣兵馬都監自今差諸司副使以上三年一代之與減一年磨勘辛卯新知唐州庫部郎中張純判南省間曺純前知嘉州為轉運司以不才奏罷至是援赦復知州又為御史所彈也壬辰降提㸃利州路刑獄都官郎中馮浩知商州坐前知華州失入劫囚吳義等十六人死罪也乙未步軍副都指揮使涇州觀察使王凱為秦鳯副都部署辭日帝諭以嘉勒氏摩正交易阻絶頗有入冦之萌宜安靜以處之凱至與主帥以恩信撫接遂復常貢此事更考或削去主帥王拱辰也初有司言至和大水京城罹其患請自祥符縣界葛家岡穿河直城南好草陂北入惠民河分注魯溝河則自此無水患矣戊戌發官卒調民丁鑿河己亥雄州言契丹國母喪詔侍御史朱處約為祭奠使宫苑使潘若冲副之度支判官兵部員外郎集賢校理李中師為弔慰使六宅副使雍規副之二月癸卯契丹遣林牙懷德軍節度使蕭福延來告其祖母喪上為發哀于內東門幄殿百官進名奉慰輟視朝七日太常博士吳及既除喪擢祕閣校理乙巳改右正言諫院供職及復上疏曰帝王之治必敦骨肉之愛而以至親夾輔王室詩曰懷德維寧宗子維城故同姓者國家之屏翰儲副者天下之根本陛下以海宇之廣宗廟之重而根本未立四方無所係心上下之憂無大于此謂宜發自聖斷擇宗室子以備儲副以服屬議之則莫如親以人望言之則莫如賢然後優封爵以寵異之選重厚朴茂之臣以教導之聽入侍禁中示欲為後使中外之人悚然瞻望曰宫中有子矣陛下他日有嫡嗣則異其恩禮復令歸邸于禮無嫌于義為順弭覬覦之心屬天下之望宗廟長久之䇿也既而又言開寶詔書內年三十無養父者聽養一子為嗣并以名上宣徽院違者抵死比禁益弛夭絶人理隂纍聖嗣願詔大臣明示舊制上順天意以綏福祐上嘉納之及已見至和元年年末丙午太常博士韓縝修三班院編敕縝億子從孫抃奏請也從抃請據御史臺記為縝攻抃張本庚戌詔御史臺推直官自今令審官院選第二任通判二人具歷任狀進入㸃名付中書辛亥太常博士程初責授郴州團練副使監衡州酒稅皇祐初嘗鞫叛囚失實貶官至是上章自訴其詞語皆屬以聲韻頗為侮慢復貶之癸丑御崇政殿録繫囚雜犯死罪以下遞降等徒以下釋之丙辰詔新提㸃江南東路刑獄沈康知常州知常州王安石提㸃江南東路刑獄以諫官陳旭言康才品凡下又素無廉白之稱故易之安石知常州在二年秋康以是年二月丙午自度外集校除江東憲才旬日改簽壬戌降虞部員外郎劉印為小處通判印前知昌州舉監稅右侍禁王璪而璪本以進納得官後坐贓敗故責之甲子録故權鹽鐵判官虞部郎中曺觀弟覯為建州判司主簿觀遺奏叙叔父修古嘗為知雜御史章獻太后埀簾以言事得罪又弟覲知封州與儂智髙戰死請除覯一家便官從之丙寅益州鈐轄司言知保州董仲元襲領州事二十餘年善撫蠻人詔以仲元為本州刺史丁卯録故司農卿林洙孫詵為試將作監主簿洙知夀州臨事苛急鼓角將夜入州廨拔堂檻鐵鈎擊殺之張唐英政要云上見奏報驚曰二千石之貴而一兵殺之足知其不能防間遂令根究仍原恤其家自通判以下皆被降黜當考自江休復雜志云送兵下獄詰問了不知實録云洙苛急當考乙巳禮部貢院言近制不許臣僚門客受恩澤其出官鎖㕔取應限一次儻不中遂廢終身甚非勸學之意請自今更不限舉數其長史司馬助教文學及曽應舉中第者不理前資仍與除去進納之名從之庚午詔太常禮院議立周王佑之後既而禮院言王薨在下殤之年未有為人父之道于禮不當立後乃罷三月辛未朔翰林學士歐陽修兼侍讀學士修言侍讀最為清近祖宗時不過一兩人今與經筵者十四人而侍讀十人外議皆云經筵無坐處矣臣既辱在翰林又充史館修撰太常禮儀祕閣祕書省尚書禮部刋修唐書兼職已多而經筵固不闕人忽䝉除授蓋近年學士相承多兼此職朝廷以為成例不惜推恩外議則云學士俸薄特與添請給爾官以人輕一至于此欲乞罷臣此命不使朝廷遴選之清職遂同例授之冗員詔不許修固辭不拜修又言竊以學士待制號為侍從之臣所以承宴間備顧問以論思獻納為職自祖宗以來尤所精擇茍非清德美行藹然衆譽髙文博學獨出一時則不得與其選是以選用至艱員數至少官以難得為貴人以得職為榮搢紳之望既隆則朝廷之體增重其後用人頗易員數漸多往時學士待制至六七十員近年以來稍吝除拜即今猶及四十餘員臣以謂愛惜名器不輕授人朝廷已知之為國計者亦宜及今創立經制今惟翰林學士中書舍人知制誥各有定員其餘學士待制未有定數欲乞檢詳前史及國朝故事自觀文殿大學士至待制並各立定員數遇有員闕則精擇賢材以充其選茍無其人尚可虛位以待如允臣所請乞賜詳議施行修後疏附見其從違當考壬申光祿卿張子憲趙良規掌禹錫齊廓張子思並直祕閣先是子憲等並為太常少卿兼館職當進諫議大夫而執政靳之止遷大卿故事卿不兼職故皆罷于是特請而還之子憲遷光祿卿已見至和元年十二月今兩出之良規去年二月以少常直集為光祿禹錫去年十一月以少常直集崇文檢討為光祿廓正月以少常直史為光祿子思二月以少常直祕為光祿癸酉勾當御厨駕部員外郎李象中供備庫副使張茂之內殿承制韓從禮並貸命配江南京西等處衙前編管入內供奉官盧待問追兩官勒停皆坐自盜御食也象中等未敗以前日宰二百八十羊以後日宰四十羊爾此據江休復雜志日雜志云御厨自李象中得罪後日宰四十羊已前宰二百八十羊又云雷簡夫判設案日御厨日支麵一萬斤後㸃檢得乃日剩支六千斤甲戌詔禮部貢舉己卯起居舍人集賢殿修撰同修起居注范鎮知制誥太常丞直集賢院同修起居注判都磨勘司馮京為右正言龍圖閣待制鎮與京同試中書而京乃富弼子壻故以待制命之鎮自罷言職每因事未嘗不以儲嗣為言冀土心感動及知制誥正謝又面論之曰陛下許臣復三年矣願早定大計辛巳禮部貢院言奉詔再詳定科舉條制應天下進士諸科解額各減半明經别試而係諸科解名無諸科處許解一人開封府進士二百一十人諸科一百六十人國子監進士一百人諸科十五人明經各一十人並為定額禮部奏名進士二百人明經諸科不得過進士之數頭試每百人解一十五人五人以上解一人不及五人送鄰路試凡户貫及七年者若無田舍而有祖父墳者並聽從之癸未戶部員外郎兼侍御史知雜事吕景初判尚書刑部仍賜五品服景初衣緑入謝既改賜章服乃詔自今知雜御史衣緑者告謝日令閣門取㫖丁亥工部郎中集賢殿修撰李昭遘為天章閣待制知滄州諫官吳及言昭遘不可用尋改知陜州辛卯刑部郎中直龍圖閣知兖州王逵追一任官勒停都官員外郎通判兖州馬預罰銅二十斤徙小處通判初逵以公用蠟燭及墨遺京師要官又課人收枯骨而葬之以故冢墓多被發者及離細民夫婦而自主其家昏嫁馬預訟其事預亦以鬻所得酒于部中故皆坐之癸巳詔三司禁中所降物帛送雜賣場其令判官一員監勒平估之毋得抑配人户丙申詔三司編天下驛劵則例從樞密使韓琦之請也四年正月張方平上其書夏四月壬寅御前忠佐馬軍副都頭向寶為禮賔使并代都監寶鎮戎人素有武伎屢更戰鬬用邊臣薦而特擢之癸卯賜開封府界開葛家岡新河役卒緡錢乙巳詔省府推判官諸路轉運使提㸃刑獄非體量劾奏而為知州者並理本資序其朝辭所賜及添支遇恩補䕃子弟亦如之辛亥契丹遣崇儀節度使蕭慶給事中李軻來賀乾元節癸亥引進副使知雍州蕭注為西上閣門使留再任或于此方載大理殺儂智髙事事已在至和二年六月更詳之甲子河南府言資政殿大學士尚書左丞吳育卒贈吏部尚書諡正肅乙丑罷修睦親宅祖宗神御殿初翰林學士歐陽修言神御非人臣私家所宜有若援廣親宅例當得興置則是㳂襲非禮之禮詔送兩制及臺諫禮官詳定言漢用春秋之義罷郡國廟今睦親廣親宅所建神御殿不合典禮悉宜罷上以廣親宅興置已久不欲毁之睦親宅遂罷修營丙寅按丙寅宋史作丙辰合前後支干考之當從丙寅宋史誤詔曰朕惟分治州縣付之守令案督守令付之轉運使提㸃刑獄而比年以來吏或貪恣害物耄昏不事事以弛為寬以苛為察賦斂有常或增重之以為勞刑罰有經或出入之以為能而使者莫之舉豈朕所以寄任之意歟其各思率職毋撓權幸毋縱有罪惠綏吾民以稱朕意丁卯詔臣僚赴任益梓利䕫路其逺接人陸路止于京師水路止于荆南若路不由京師即計其地里不得過六十程若舊例不及者止如例初三司使張方平言兩川迎送之役有經涉水路來往萬里之逺至有餓乏病死者不可勝數故著此條戊辰詔居州縣驛舍亭館者毋得過一月違者所屬吏以違制論仍令轉運提㸃刑獄司每半年一舉行五月庚午朔降知汝州李夀朋知荆門軍同提㸃京西刑獄石用休知威勝軍時侍御史朱處約奉使過汝州言京西嵗飢夀朋令郡人獻材木修廨宇亭榭重為勞擾下提刑司體量而不以實故并責之辛未録故給事中集賢院學士孫僅孫授為太廟齊郎樞密使韓琦言僅太宗朝第一人及第今其後無祿仕者故特恤之壬申管勾國子監吳中復言舊制每遇科場即補試廣文館監生近詔間嵗貢舉須前一年補試比至科場多就京師私買監牒易名就試及旋冒畿內户貫以圖進取非所以待逺方孤寒之意請自今遇科場補試監生如故仍以四百五十人為額從之尋又增一百五十人又增百五十人乃六月丙寅今并書癸酉右正言吳及言太宗朝嘗給三司判官御前印紙厯子令批書課績今其制雖存而無考校之法請自今嵗終按功過而升黜之詔以及所言録示三司使方平辛巳福建轉運使劉立德知婺州諫官陳旭言其年老不任事也壬午以故西蕃恩州團練使默戬覺子轄薩斯鼎為順州刺史默戬覺居總噶爾城既死所部立其子母李氏懼孤弱不能守乃獻皮帛入庫廪文籍于嘉勒斯賚因受之本傳默戬覺初補嚴團後以恩團卒按實録寶元二年爾四月初授順團與本傳不同今從實録默戬覺居總噶城其詳見景祐三年末髙永年隴右日録云默戬覺死無子遂絶蓋不知有轄薩斯鼎也或因轄薩斯鼎微弱不能自立謂之絶則可然非無子也今不取初鹽鐵副使郭申錫受詔行河與河北都轉運使李參論議不相中訟參于朝曰參繇吕公弼薦遷諫議大夫為僥幸參轉諫議大夫在元年十一月乙巳又遣小吏髙守忠齎河圖屬宰相文彥博御史張伯玉亦奏參朋邪結託有狀以事連宰相乃詔天章閣待制盧士宗右司諫吳中復推劾而申錫伯玉皆不實伯玉以風聞免劾乙酉詔曰朕常患民之好爭而風俗漸靡于薄也思有以革正之非吾士大夫躬率以義而導之于善則何以哉申錫官職事守不為輕矣宜遴所舉以道吾民者而與參相決河議論之異遂成私忿章奏屢上辨訴紛然敢為詆欺處之自若以至興獄置對逾旬參驗所陳一無實者士人之行乃至是乎使吾細民何所視效其降申錫知滁州榜于朝堂申錫尋改知濠州盧士宗附傳墨本載士宗言參與申錫皆朝廷委任者雖有罪第可移文不宜追攝朱本已削去今不取夫李參附𫝊云自河決橫壠迫近北都因治金隄嵗興二十萬參度隄已完請輟一年省夫十二萬按參明年八月乃改知澶州不知省夫十二萬是何年當考劉摰作郭申錫墓志云嘉祐二年修六塔河與河北轉運使李參典其事初皇祐中議開六塔使河東行申錫言其非是後果不成東北被其患至是議塞而參意異詔罷參申錫因疏參他過坐知濠州按參未嘗罷河北轉運使明年八月乃改知澶州不知摰何故如此謬誤今不取蘇軾代張方平作趙槩神道碑云李參為河北轉運使職事辦治進秩二等且官其一子郭申錫為諫官爭之曰參職事所當辦無功不可賞上怒欲罪申錫槩言陛下始面諭申錫毋面從吾過今黜之何以示天下按申錫此時不為諫官參轉諫議大夫在嘉祐元年十一月以司封郎中遷少府監為河北轉運使在元年八月自八月至十一月才四月爾所云職事辦治亦未詳恐皆謬誤今不取詔宗正寺自今白身人娶宗室女須三代有官或父祖曽任升朝官而告敕見存者仍召京朝官委保之其在任者三代雖不盡有官亦聽甲午契丹遣林牙歸德節度使耶律嗣臣右諫議大夫劉伸來獻其國母遺留物六月丙午吏部尚書平章事文彥博罷為河陽三城節度使同平章事判河南府郭申錫張伯玉攻彥博雖不勝彥博亦不自安數求退上許之户部侍郎平章事集賢殿大學士富弼加禮部尚書昭文館大學士樞密使工部尚書韓琦依前官平章事集賢殿大學士樞密使山南東路節度使同平章事賈昌朝罷為鎮東節度使右僕射兼侍中景靈宫使文彥博始求退諫官陳旭等恐昌朝代之乃疏昌朝交通女謁建大第别為客位以待宦官又宦官有矯制者樞密院釋弗治昌朝由此罷然昌朝釋宦官矯制後驗問無事實初溫成皇后乳母賈氏宫中謂之賈婆婆昌朝以姑事之諫官劾昌朝交通女謁指賈氏也觀文殿大學士兵部尚書宋庠為樞密使同平章事樞密副使禮部侍郎田况為樞密使户部侍郎參知政事王堯臣加吏部侍郎帝初欲用堯臣為樞密使而當制學士胡宿固抑之乃止給事中參知政事曽公亮加禮部侍郎樞密使户部侍郎程戡加吏部侍郎右諫議大夫權御史中丞張忭為樞密副使庚戌翰林學士歐陽修兼龍圖閣學士權知開封府修承包拯威嚴之後一切循理不事風采或以為言修曰人才性各有短長實不能舍所長强所短也龍圖閣直學士左司郎中權知開封府包拯為右諫議大夫權御史中丞拯言東宫虛位日久天下以為憂羣臣數有言者卒未聞有所處置未審聖意持久不決何也夫萬物皆有根本而太子者天下根本也根本不立禍孰大焉願采詩人盤維之義固天下根本之地帝曰卿欲誰立拯曰臣非才備位所以乞豫建太子者為宗廟萬世計爾陛下問臣欲誰立是疑臣也行年七十且無子非邀後福者唯陛下裁察帝喜曰徐當議之拯又言真宗因對輔臣言及前代內臣恃恩恣橫蠧政害物朕常深以為戒至于班秩賜與不使之過未嘗矜貸此輩常知畏懼王旦等對曰先代事迹昭然足為龜鑑陛下又屢言及此實社稷之福也臣竊見近年內臣祿秩權任優崇稍過恐非所以保全之也以陛下英明神斷有罪必罰此輩或不敢為大過然在制之于漸庶免貽患惟陛下佩服先帝之言以為格訓凡事更加裁抑又言朝廷凡降詔令行之未久即有改易外議紛紜深恐于體不便且詔令者人主之大柄而國家治亂安危之所繫焉可不謹乎緣纍年以來此弊尤甚制敕才下未逾月而輟更奏請方行又隨時而追改民知命令之不足信則賞罰何以沮勸乎欲乞今後朝廷凡處置事宜申明制度更加謹重臣僚上言利害並請先下兩制集議如可經久方許頒行于後或小有異同非蠧政害民者不可數有更易如此則法存畫一國有常格又陳教養宗室之法請條責諸路監司及御史府自舉屬官諫官御史不避二府薦舉者聽兩制得至執政私第事多施行此據拯附傳今正傳削去教養宗室臺諫官不過二府所薦舉聽兩制詣執政私第二事不知何故當考詔正衙連十日值假者放一日壬子上謂三司使張方平曰監御厨內臣竇昭齊等宴日擅殺羊羔且羊羔乃物之未成者而枉其生理嘗戒使勿殺今復殺之不可不懲也特衝替甲寅詔學士院編録國朝以來所撰制誥文字從歐陽修之請也審官院言勘㑹見祗候差遣京朝官員數至多闕次全少待次一二年貧窶者衆欲望並許請假出外等候闕次更不立定假限候至名次稍髙任自參假赴院釐務從之乙卯賜辰澧州捕殺蠻賊土丁緡錢丙辰提㸃荆湖北路刑獄司勳員外郎潘夙權本路轉運使時蠻反邵州殺隊將及其部兵故就委夙經制蠻事夙駐兵資木寨親督兵援所遣將破團峒九十餘此據夙傳實録無蠻反邵州事當考湖范祖禹銘郭逵墓云邵州武岡楊昌透反詔以逵為南鈐轄兼知邵州至則潜師夜起徑至賊壘黎明圍數匝昌透登柵大呼逵命縱火焚柵斬其將雷鐵城等數輩諭昌透令降昌透亦以所領十餘州求輸租賦夙美之從曾孫丙寅入內都知史志聰副都知任守忠都大提舉內中修造先是修皇儀殿西廡而三司言營造多虛占名役枉費材料故命志聰等總領之尋又命勾當皇城司入內副都知鄧保吉文思使帶御器械李繼和提舉東西華門已南諸處九月五日事今併入此丁卯交址貢異獸二初本國稱貢麟狀如水牛身被肉甲鼻端有角食生芻果瓜必先以杖擊然後食既至而樞密使田况言昨南雄州簽判屯田員外郎齊唐奏此獸頗與書史所載不同儻非麒麟則朝廷殆為蠻人所詐又知䖍州比部郎中杜植亦奏廣州嘗有蕃商辨之曰此乃山犀爾謹按符瑞圖麟仁獸也麕身牛尾一角角端有肉今交址所獻不類麕身而有甲必知非麟但不能識其名昔宋太始末武進有獸見一角羊頭龍翼馬足父老亦莫之識蓋異物雖中原或有之爾雅釋麕大如麃牛尾一角􅀈如馬一角􅕆麕身牛尾一角又兕似牛一角青色重千斤然皆不言身有鱗甲廣志云符拔如麟皮有鱗甲此雖近之而形乃如牛又恐非是故在外之臣屢有章奏辨之然不知朝廷本以逺人利朝貢以示綏來非以獲麟為瑞也請宣諭交址進奉人及回降詔書但云得所進異獸不言麒麟足使殊俗不能我欺又不失朝廷懷逺之意乃詔止稱異獸云秋七月壬申詔諸路轉運使巡檢捉賊使臣有不職及場務賦虧者並許奏人衝替癸酉福州進士周希孟為國子監四門助教本州州學教授以知州蔡襄言其文行為鄉里所推也襄世閩人知其風俗往時閩士多好學而專用賦以應科舉襄得希孟專用經術傳授學者嘗至數百人襄親至學舍執經講問為諸生率延見處士陳烈尊以師禮陳襄鄭穆學行著稱襄皆折節待之閩俗重凶事其奉浮屠㑹賔客以盡力豐侈為孝往往至數百千人至有親亡不舉哭必破産辦具而後敢發喪者有力者乘其急時賤買其田宅而貧者立劵舉債終身困不能償襄下令禁止至于巫覡主病蠱毒殺人之類皆痛斷絶之其子弟有不率教令者條其事作五戒以訓敕之及襄去閩人為立德政碑襄穆皆福州人也乙亥詔京西轉運司京索河水浸民田其發卒二千往護築之己卯內降劄子臣僚上言開封府推官吳充與權知開封府歐陽修為親家遂除户部判官近制推官或改判官通三年方授三司判官充在府始逾年而遷之頗為僥幸中書請以元奏付外施行御批已焚毁又請上封人姓名不報丙戍按丙戌宋史作丙子亦誤并識詔比廣濟河溢害東明民田原武縣河决汴隄長城口漂浸封丘等處苖稼其權倚閣夏稅及食鹽錢仍令開封府界提㸃按行諸縣而賑救之丁亥命權御史中丞包拯領轉運使提㸃刑獄考課院己丑降前知雄州舒州團練使馬懷德為四方館使英州刺史前髙陽關路鈐轄北作坊使廉州團練使閻士良為崇儀使御史吕景初言懷德在雄州因士良入奏事而嘗遺以牛黃麝臍賂之故也罷諸路經略安撫使奏舉親戚管勾書寫機宜文字庚寅詔雍州知州自今毋得輒出巡邊時蕭注數領兵出巡溪峒而轉運使王罕言其生事也詔皇親自今並年十三已上宣繫年十五以上聽成昏初判大宗正司允讓言宫院嫁娶自來未曽指定嵗數止是本宫使臣臨時保明即送入內內侍省施行恐更有年未及而內降𫝊宣者于禮有違下禮院詳定而降是詔壬辰復以度支員外郎范祥制置解鹽從三司使張方平及御史中丞包拯之言也祥自慶厯八年十月制置解鹽皇祐五年四月坐他罪責去祥始言嵗入緡錢可得二百三十萬後不能辦皇祐三年入緡錢二百二十一萬四年二百十五萬以四年數視慶歷六年增六十八萬視七年增二十萬又舊嵗出𣙜貨務緡錢慶歷二年六百四十七萬六年四百八十萬至是𣙜貨務錢不復出其後嵗入雖贏縮不常至五年猶及百七十八萬至和元年百六十九萬其後遂以元年入錢為嵗課定率量入計出可助邊費十之八久之並邊復聽入芻粟以當實錢而虛估之弊滋長劵直亦從而賤嵗損官課無慮百萬故方平及拯請復用祥祥既受命請重禁入芻粟者其劵在嘉祐已前每劵别使輸錢一千然後豫鹽又言商人持劵若鹽鬻京師皆虧失本錢請置官京師畜錢二十萬緡以待商人至者劵若鹽估賤則官為售之劵紙六千鹽席十千毋輒增損所以平其市估使不得為輕重詔以都鹽院監官兼領之自是稍復祥舊云此據本志癸巳以䕫州路旱飢命侍御史丁詡為體量安撫使權御史中丞包拯言右正言吳及立身有守遇事敢言緣與樞密副使張忭妻是親奏乞外郡然忭妻亡已久理不當避乞令依舊供職許之㑹要七月事今附月末權知開封府歐陽修言臣伏見諫官陳旭起請僥求內降之人委二府劾奏干請者之罪䝉朝廷依奏施行尋聞李璋因內降責罰自後罕聞敢求內降以希恩賞者以此見至公之朝必信之法可以令行而禁止也然旭所請祗為恩賞之一而小人僥求無所不至臣自權知開封府未及兩月之間十次承凖內降或為府司後行或為宫院姨媪或為內官及干繫人吏等本府每具奏至于再三而內降不已至于婢妾賤人犯姦濫等事亦敢上煩聖聰以求私庇宦寺小臣自圖免過反彰聖君曲法之私雖有司執奏終許公行然小人干求未有約束止絶臣欲乞今後應有因事敢干求內降者依舊許本府執奏外更乞根究因緣干求之人奏攝下府勘劾重行責罰如本人自行干請者亦乞一就勘鞫加元犯本罪二等斷遣其情理稍深及干求不已者亦許本府一面牒報御史臺彈糾勘劾施行所貴止絶小人干亂公朝敗紊綱紀修奏此不知何時修自稱權知開封未及兩月按修以六月庚戌權知開封今附見七月末八月巳亥朔日有食之甲辰詔禮部貢院宗室壻不許鎖㕔應舉丁未詔三司京西比嵗旱屢蠲民租其以緡錢十萬下本路助糴軍儲辛亥度支副使右諫議大夫周湛為契丹國母生辰使閣門通事舍人王咸有副之開封府判官度支郎中李及之為契丹生辰使內殿崇班閣門祗候王希甫副之度支判官刑部郎中朱夀隆為契丹國母正旦使禮賔使王知和副之太常博士直集賢院判户部勾院祖無擇為契丹正旦使內殿承制閣門祗候王懷玉副之湛辭不行改命户部副使吏部員外郎楊畋畋以曽伯祖業嘗陷敵辭乃命權鹽鐵副使工部郎中王鼎代往朝廷以今契丹母于上弟婦行也禮不可通問敕使者但遣書契丹傳達聘物而契丹人必欲面見使者致書鼎以禮折之契丹詘服自是為常此據李清臣所作王鼎墓志蕭氏契丹主洪基之祖母去年卒今乃洪基之母也及之迪從子己未吏部侍郎參知政事王堯臣卒上幸其第臨奠輟視朝一日贈左僕射諡文安庚申荆湖北路轉運司言已招安彭仕羲省本路軍馬始雷簡夫受命體量仕羲未可專用恩澤誘化至則督諸將進兵築明溪上下二寨據其險要拓取故省地石馬崖五百餘里仕羲計窮遂歸所掠兵丁五十一人械甲千八百九事率蠻衆七百飲血就降辰州亦還其孥及銅柱時師寶已死遣師黨歸知龍賜州戒令勿殺自是仕羲嵗奉貢職如故辛酉封左屯衛大將軍秀州團練使從信為榮國公吳懿王德昭孫舒國公惟忠子也從信嘗謂唐十院置維城庫約諸王廪入而上下均其用今雖奉養之費一出縣官然屬大者猶或不給且諸王邸多殖産市井日取其資惟懿王院初無餘財因令治一庫帥諸宗子月視祿之厚薄輸十之一既而車馬賔客冠昏喪祭之用無不獲其助今其法不廢今謂熙寧間也是月詔立定橫行員數客省引進四方館各置使一員東西上閣門使共二員閣門引進客省副使共六員閣門通事舍人共八員內閣門副使轉引進副使引進副使轉客省副使客省副使即依諸司副使磨勘條例施行遇閣門使有闕則以次轉遷補不拘磨勘年限內有歷閣門職事後别無近上臣僚同罪奏舉及曽犯贓及私罪杖以上情理重者若遷補名次到日並與别除他官內有任東西上閣門使或四方館使及七年無私罪未有員闕遷補者與加遙郡其改正任者須授引進使及四年轉充團練使客省使四年轉充防禦使其戰功并殊常績效非次拔擢者勿拘知鄆州劉敞言臣聞愛至者慮常過而憂逺者言必深臣在闕門之外備東藩之守誠不當越職出位以干言責然竊惟忠臣之義雖在畎畝猶不忘君况如臣者豈得已哉陛下少賜詳擇昔周公作無逸以戒成王其言曰商王中宗及髙宗及祖甲及文王皆以無淫于觀于逸于遊于田是以膺無疆之福子孫蕃昌此聖人之至言也陛下臨政以來履而行之三十七年矣百姓賴陛下之德養老長幼人遂其性自三代漢唐之盛未有及于今日者也臣願陛下日謹一日與天無極比聞車駕數臨苑囿置酒觀樂雖聖心處之自有常節而議者亦謂太頻臣恐近習茍于承意而不能諫大臣限以體貌而不得言如此則傳聞四方未副盛德外之則嫌怠于政事有遊觀之好內之則疑酣于酒德違攝生之理孔子曰樂宴樂損矣臣願陛下玩心于神明養之以清靜聽止于中聲毋以煩耳味止于實氣毋以爽口則自天祐之吉無不利孔子曰樂節禮樂益矣惟陛下裁幸此疏據劉敞集云嘉祐三年八月上今附月末
