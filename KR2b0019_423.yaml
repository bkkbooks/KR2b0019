body:
  text: 續資治通鑑長編卷四百十九宋李燾撰哲宗元祐三年閏十二月癸卯朔尚書省言未行官制以前凡定功賞之類皆自朝廷詳酌自行官制先從六曹用例擬定其一事數例輕重不同合具例取裁事與例等不當輒加增損若不務審察事理較量重輕惟從減損或功狀微小輒引優例亦當分别事理輕重及己未施行等第立法今以舊條例增修凡事與例同而輒增損漏落者杖八十內事理重已施行者徒二年如數例重輕不同或無例而比類他例者並具例勘當擬定奏裁從之仍增三省樞密院相干事並同取旨詔頒元祐敕令格式遷大名府南樂縣于金堤東曹節村從河北轉運司之請也新無要考河事姑存之端明殿學士銀青光祿大夫致仕范鎮卒甲辰京西北路都監楊安道管押范鎮所定鑄成律十二編鐘十二鎛鐘一尺一斛一響石為編磬十二特磬一簫笛塤篪巢笙和笙各二較景祐中李照所定又下一律有竒並書及圖法上進詔送太常寺樂法有可行事件令尚書禮部太常寺參定以聞仍令尚書侍郎學士兩省御史臺館職祕書省官赴太常寺觀聽翌日賜詔曰朕惟春秋之後禮樂先亡秦漢以來韶武僅在散樂工於河海之上往而不還聘先生於齊魯之間有莫能致魏晉以下曹鄶無譏豈徒鄭衛之音已雜華戎之器間有作者猶存典刑然銖黍之一差或宫商之易位惟我四朝之老獨知五降之非審聲知音以律生尺覽詩書之來上閲簨虡之在廷君臣同觀父老太息方詔學士大夫論其法工師有司考其聲上追先帝移風易俗之心下慰老臣愛君憂國之志究觀所作嘉歎不忘又詔范鎮與一子有官人升一任差遣製造人等第支賜詔下鎮已卒新舊録載范鎮新樂殊不詳當檢討别修新録云舊録范鎮傳多載王安石日録所記語至鎮力論青苗事乃載安石語曰若非陛下明見周禮有此則焉得不以為愧此可謂假六藝以文姦言矣鎮欲告老安石曰鎮行能無取雖致仕何足惜又曰但欲陛下知此曹不足惜鎮自仁祖朝任言責首論立嗣事風節聳動中外至謂其行能無取又曰此曹不足惜可乎如鎮致仕疏有云陛下有納諫之資大臣進拒諫之計陛下有愛民之性大臣用殘民之術此正安石所深惡親草制力詆之乃云神宗惡之此尤誣妄至上初政諸老更起以扶王室鎮屢召不至此亦各行其志爾至謂鎮有臣之事君豈可幸禍之語鎮之不以此疑諸老必矣此皆前史官私意今有鎮墓志文重行修正丙午翰林學士兼侍讀蘇軾言臣近以目昏臂痛堅乞一郡蓋亦自知受性剛褊黑白太明難以處衆伏蒙聖慈降詔不許兩遣使者存問慰安天恩深厚淪入骨髓臣謂此恩當以死報不當更計身之安危故復起就職而職事清間未知死所每因進讀之間事有切於今日者輒復盡言庶補萬一昨日所讀寶訓有云淳化二年上謂侍臣諸州牧監馬多瘦死蓋養飼失時枉致病斃近令取十數槽置殿庭下視其芻秣教之養療庶革此弊臣因進言馬所以病蓋將吏不職致圉人盜減芻粟且不恤其飢飽勞逸故也馬不能言無由申訴故太宗至仁深哀憐之置之殿庭親加督視民之於馬輕重不同若官吏不得其人人雖能言上下隔絶不能自訴無異於馬馬之飢瘦勞苦則有斃踣奔逸之憂民之窮困無聊則有溝壑盜賊之患然而四海之衆非如養馬可以置之殿庭惟當廣任忠賢以為耳目若忠賢踈逺諂佞在傍則民之疾苦無由上逹秦二世時陳勝吳廣已屠三川殺李由而二世不知陳後主時隋兵已渡江而後主不知此皆昏主不足道如唐明皇親致太平可謂明主而張九齡死李林甫楊國忠用事鮮于仲通以二十萬人沒於雲南不奏一人反更告捷明皇不問以至上下相蒙祿山之亂兵已過河而明皇不知也今朝廷雖無此事然臣聞去嵗夏賊犯鎮戎所殺掠不可勝數或云至萬餘人而邉將乃奏云野無所掠其後朝廷訪聞委提刑司體量而提刑孫路止奏十餘人乞朝廷先賜放罪然後體量實數至今遷延二年終未結絶聞奏凡死事之家官所當恤若隱而不奏則生死銜寃何以使人此豈小事而路為耳目之司既不隨事奏聞朝廷既行蒙蔽又乞放罪遷延悔玩一至於此臣謂此風漸不可長馴致其患何所不有此臣之所深憂也臣非不知陛下必已厭臣之多言左右必已厭臣之多事然受恩深重不敢自同衆人若以此獲罪亦無所憾蘇轍志軾墓云因讀寶訓歷言今賞罰不明強河使東夏人寇掠鎮戎朝廷不問當軸者恨之軾知不見容乞外任賞罰不明強河使東乃九月五日奏鎮戎事即非閏十二月四日奏也十月十七日奏乞郡則論輿臺諌為怨仇御史中丞兼侍讀李常言臣伏見今月三日蘇軾講筵進讀間奏昨鎮戎軍西人入寇殺萬餘人有司止奏二千竊緣邉防奏報茍容失實則朝廷賞罰何所據憑賞罰茍差何以懲勸功罪軾既已面奏臣職在伺察姦罔仍復預聞理當紏正伏望聖慈特降指揮密切根究以正典刑臣居耳目之司不時體訪稽於論例不敢逃責此據李常集附見承議郎祕閣校理權通判虢州張舜民提點秦鳳路刑獄丁未三佛齊遣使入貢校書郎盛次仲為集賢校理崇信軍留後贈開府儀同三司英國公諡孝僖仲論卒戊申延福宫使降授宣州觀察使提舉明道宫李憲除右千牛衛上將軍分司南京陳州居住憲明道宫任滿告老故有是命泰寧軍留後知相州李珣以疾乞歸許之三省言官制之行三省並建宰臣執政官遷除頗頻其錫賜物在一年內者請減半給詔雖一年外並減四分之一又詔大中大夫以上知判州府添賜公使錢正任團練使遙郡防禦使以上至觀察使並分大郡次郡初除次郡俸銀各減四分之一移大郡全給留後節度使分大鎮次鎮小鎮俸銀遞減五萬刺史以下使相以上不減其刺史至節度使公使錢依俸錢分數裁減紹聖二年六月二十一日靖國元年三月二十五日可考玉牒云詔留後以上鎮分三等遙郡以上郡分二等公使俸錢裁減有差詔荆湖北路都鈐轄轉運提點刑獄司誡敕沅州城寨官吏各加撫輯仍覺察希功生事之吏對移訖奏行降黜其諸色人如有架造事端扇搖人户情涉凶狡亦禁勘奏裁新無荆湖北路鈐轄司言夔州路蕃部都巡檢菊曩遷申播州禮賔副使楊光震點集今曩遷與光震有隙羅杜肆等是别部㺐賊慮邉吏不與判決别乘用兵之際使之自疑邉患未測詔瀘南沿邉安撫司夔州路提刑司體究㺐賊作過何人部族如係光震部下即移問緣由以理曉諭有所屈抑許為受理且勿侵省地若是别族與光震鄰接亦諭使防遏及索虜去人口俾通知朝廷恩意仍覺察光震曩遷毋令挾私生事新無己酉詔湖南安撫鈐轄謝麟誡約救應邵州臨口寨兵將官如蠻冦遮路燒圍寨堡拒捍官軍即隨宜掩殺其餘即驅逐退散使之畏懼勿専務殺戮濫及無辜新無又詔瀘南沿邉安撫司審度㺐賊首領如誡諭楊光震等密引收捕赴官詔太常寺修四孟釋菜儀庚戌詔今後小使臣磨勘轉崇班每嵗不得過八十人其以功賞特恩遷轉不在此限令吏部立法三省言職事官俸祿比官制以前雖減而公使增添頗多治平嵗支一十六萬餘緡今支七十五萬餘緡詔户部取索比類舊制各行裁減舊録云嘉祐治平中官吏仰給公使皆出衙前民破産納官吏所入至厚熙寧以來一切罷去以寬民役而官吏俸給悉從官給名雖增而實減也至是乃以為增而裁損焉新録辨曰裁減冗費此朝廷政事所當急者元祐中以官制之行俸祿既減而諸州公使頗增故議裁損以協中制舊録乃引罷差衙前以寬民力為説以為名增而實減殆曲為之説以破當時裁省之議爾今刪去户部尚書韓忠彥侍郎蘇轍韓宗道言臣等竊見本部近編元祐會計録大抵一嵗天下所收錢榖金銀幣帛等物未足以支一嵗之出今左藏庫見錢費用已盡去年借朝廷封樁末鹽錢一百萬貫以助月給舉此一事則其餘可以類推矣臣等聞古者制國之用必量入為出使三年耕必有一年之蓄故三十年之間而九年之蓄可得而備也今日文武百官宗室之蕃一倍皇祐四倍景德班行選人胥吏之衆率皆廣增而兩稅征商𣙜酒山澤之利比舊無以大相過也昔祖宗之世所入既廣所出既微則用度饒衍理當然爾今時異事變而奉行舊例有加無損今天下已困弊矣若更數年加之以飢饉因之以師旅其為憂患必有不可勝言者臣等備位地官與聞朝廷大計而喑默不言異日雖被誅戮何補於事故臣等願及今日明敕本部取見今朝廷政事應干費用錢物者隨事看詳量加裁損使多不至於傷財少不至於害事二聖以身率之大臣以身先之使天下曉然皆知事之當然而非朝廷有所靳惜則誰不信伏昔治平熙寧之間因時立政凡改官者自三嵗而為四嵗任子者自一嵗一人而為三嵗一人自三嵗一人而為六嵗一人宗室自袒免以上漸殺恩禮天下晏然莫以為言此則今日之成法也臣等伏乞檢會寶元慶歷嘉祐故事於本部置司選擇近臣共議其事嚴立近限責以實效法度一成數嵗之後費用有節府庫漸充傳之無窮久而不弊則其於聖德實非小補也臣等愚拙不能修明職業以廣財賦冒昧獻言罪當萬死貼黃稱勘會頃降朝旨令本部裁減浮費前後所減三十餘事率皆浮費之小者然所減已約及二十餘萬貫不為無補今若事無大小並皆量行參酌裁損則其為利必大伏乞聖慈早賜施行詔戶部取索應干財用除諸班諸軍料錢衣糧賞給特支依舊外其餘浮費並行裁省節次以聞元年二月十八日户部狀準敕取索看詳裁省浮費勘會浮費事件不一理當要見更改添置官局所主事務官吏及應係公人增減數目并但干支費錢物新舊條制祿粟則例方可詳究事務要切緊慢勘酌裁省所有今來取索內外官司合供報日限約束等已差舊行浮費人吏行遣外更添差書表司一名充貼司抄寫中奏文字餘欲乞並依前來已得指揮施行尚慮內外官司具析未盡使存留裁減失當仍許官吏諸色人具可減利便陳獻在京經本部外路經所在官司申陳具狀繳進實封徑申户部尚書廳相度施行今檢會下項前來已得指揮元祐元年五月五日敕節文户部申請事件奉聖旨依一乞應官司被受取索候見本部公文限五日內盡行供報如有未明許暫喚吏人整會如違限漏落不實從本部送所司根勘施行事理重害者申取朝廷指揮一乞取索在京官司事件外有府界欲乞委自府界提點司諸路委轉運司令勾當公事或本司管勾官員依今來朝廷取索本路應係浮費錢物委有未盡未便事狀逐旋保明申户部相度施行其被受取索官司委轉運提點司責立近限回報如有違限隱漏不實即便依法施行一今來裁減利害委逐路轉運提點司遍下本路州縣官吏如有所見利害可以裁減浮費即具條畫實封一面附遞直申户部以憑看詳施行在京官司亦乞依此下所轄施行元祐元年六月十五日敕節文在京官司供報文字雖有上項日限竊慮實有事繁去處於限內供報未得及恐為見日限逼窄供報不得詳盡乞從本部相度事務繁簡量與展限纍展不得過三次一勘會昨來裁省浮費準朝旨専委本部尚書侍郎即不干預郎官今來未敢依前降朝旨施行合取自朝廷指揮一今來裁省事務內有合要官局去處取到案踏修成條目等照用欲並許本部權借如敢隱漏乞從本部勾勘施行取到户部狀置局去處勾勘一節亦係本部轄下去處若非所轄並合申取朝廷指揮尚書省勘當欲第一項第三項依所申並供到事理施行第二項依前降指揮並從之編録册閏十二月二十三日聖旨今附注此御史中丞李常言先帝以人吏無祿為不足以責其廉遂重其罰而祿之今省臺寺監人吏無慮二千四百餘人百司庫務又二千三四百人嵗費錢斛舉數十萬當時利源指以充吏祿者十無一在至侵縣官常費以足之向已命官核實而汰冗遲久未上請督責成書詔門下中書後省疾速立法樞密院言荆湖北路轉運判官毛漸奏沅州并黔陽縣因蠻冦於豐山諸處殺傷民口凡二十八次唐義問初不以聞詔義問體度如何措置及追索見存人口毋令上下因循蔽匿久逺含養邉患辛亥朝奉郎孫升為金部員外郎户部言夏人入貢將物貨於沿路州軍估價出賣者先以封樁錢借給仍責元估賈人等同一季變賣從之癸丑三省言元豐舊條諸司文字稽違職級兩該上簿官員上簿即是六曹長二均任其責今新法職級再經決官員方上簿而六曹長二不坐恐非立法意詔事理重者取旨甲寅太皇太后宣諭輔臣曰近已降指揮裁減入流本家所得恩澤亦宜減四分之一吕公著等言陛下臨朝聽政本殿恩澤自不當限數向來止用皇太后例豈可更有裁損再宣諭曰今來官冗自宰執已下恩澤皆有減損本家亦須裁定要自上始則均一矣公著曰此盛德之事當討究本末以聞已而詔曰官冗之患所從來尚矣流弊之極實萃於今以闕計員至相倍蓰上有久間失職之吏則下有受害無告之民故命大臣考求其本茍非裁損入流之數無以澄清取士之源吾今自以眇身率先天下永惟臨御之始嘗敕有司廕補私親舊無定限自惟薄德敢配前人已詔家庭之恩止從母后之比今當又損以示必行夫以先帝顧託之深天下責望之重茍有利於社稷吾無愛於髮膚矧此恩私實同毫末忠義之士當職此誠各忘內顧之心共成節約之制今後每遇聖節大禮生辰合得親屬恩澤並四分減一皇太后皇太妃凖此上官均云云附見二年三月末韓忠彥蘇轍韓宗道言臣等近奉敕裁減冗費上自宗室貴近下至官曹胥吏旁及宫室器械凡無益過多之用皆得量事裁減惟獨宫掖浮費名件不少有司不得盡見未敢輒議竊見近降詔書以方將裁損入流以清取士之路遂命今後每遇聖節大禮生辰太皇太后皇太后皇太妃所得恩澤並四分減一欲身先天下詔書既出中外臣庶皆知聖明以私徇公至有感激流涕者臣等仰測聖意克己為人無所不可其欲裁損宫掖浮費與裁損私門恩澤何異然而至今未見施行者蓋有司失於建明則臣等之罪也臣謹按寶元二年嘗命近臣詳定裁損冗費時諫官琦建言請令三司取入內內侍省並御藥院內東門司先朝及今來賜豫支費之目比附酌中減省其無名者一切罷去時有詔禁中支費只令入內內侍省御藥院內東門司相度減省報詳定所其臣僚支賜即許會問入內內侍省等處施行及慶歷元年又詔入內內侍省等處取先帝時帳籍比較近年內中用度之數以聞是時所損浮費數目極多為益不細臣等欲乞陛下推廣前日減省恩澤已行之心仰法寶元慶歷祖宗已試之效使天下明知陛下節用裕民自宫禁始則凡有裁損誰不心服臣等不勝區區干犯鈇鉞詔大臣監司武臣路分都監以上不許奏舉充十科録故皇城使榮州刺史權太原府路鈐轄張世矩子天錫為三班借職詔以世矩於條雖不該遺表緣世矩纍立戰功素為得力將官天錫特依遺表條降等與借職正月末坐漏失夏寇落榮刺免勒停在職實録於彼誤書知鎮戎軍皇城榮刺合改正丙辰樞密院言在京諸軍兵額多闕而京東西路就糧禁軍往往溢額詔差內殿承制劉子方左藏庫副使王修已往逐路與長吏當職官揀選發遣上京添填闕數詔陜西河東蕃官兵三路廣西川峽荆湖民兵及敢勇效用之屬並𨽻樞密院兵部依舊主行其餘路民兵令兵部依舊上尚書省應小使臣初補及改轉並𨽻兵部擬鈔畫聞訖送樞密院降宣其定州北平軍使瀛州知肅寧城雄霸州沿界河及海口巡檢都監青澗綏德大順水洛甘谷定西知城並樞密院差人雄霸州沿界河同巡檢歸信容城知縣縣尉河東河外六巡檢欣代州都巡檢使寧化軍天池岢嵐軍草城川都巡檢使沅州渠陽寨邵州蒔竹縣廣西左右江都巡檢左右江四都巡檢宜融溪洞都巡檢朱崖軍使吏部依格擬差申樞密院銓量降宣處分在京者引驗河東陜西川峽荆湖廣西極邉及接連溪洞巡檢城寨大小使臣即吏部先條具差舉窠名申樞密院看詳指定要切處别具取旨銓量舊録云初官制循唐舊典以名實釐正由是三省樞密院舊所領事各隨名分𨽻至是因樞密院請改焉新録辨曰祖宗舊制大使臣皆樞密院選除小使臣則在三班院熙寧中王安石為相臣故相文彥博使樞密院府安石建議置審官西院注按大使臣差遣以分右府之權至元豐官制以三班院為侍郎右選西審官院為尚書右選令諸路要害處兵官除樞密自選外餘自銓部依格擬差申樞密院銓量降宣與熙寧置西審官院元豐定四選之意蓋無相妨今必以紊官制為説初不知密院在唐乃中人傳導命令之地三省密院分領諸事豈可謂循唐之舊典哉舊録其言之誣又無所稽考如此今刪去元祐三年閏十二月十六日樞密院劄子勘會諸路民兵及蕃官蕃兵舊例屬樞密院自官制舉行分屬尚書兵部主行合取旨申稟者止申都省緣蕃官及漢弓箭手之類本備戰守與正兵事體一般弓箭手見屬諸將洞丁見戍城寨而自分𨽻已來緩急邉事差移團結及常日更張措置不復關由樞密院有司但循格例亦無所建明深慮邉防武備因循失於完整三省樞密院同奉聖旨陜西河東蕃官蕃兵三路廣西川陜荆湖民兵及敢勇效用之類今後更不𨽻尚書省並撥𨽻樞密院兵部依舊主行應合取旨及申稟事件即依例勘當上樞密院應奏鈔者止具申狀其餘諸路民兵令兵部依舊上尚書省此編類録册所載今附注此右正言劉安世言看詳撲買場務其弊莫大於實封投狀蓋無知之民利於茍得競立髙價務相傾奪止假目前之欲不為後日之計然而一界之內豐凶不常或遇水旱之災即有敗闕之弊往往破家竭産不償逋欠身陷刑禁家族流散至於抵當之物亦多假於親知因緣同保淪胥失業若此之類不可勝數朝廷比用言者之奏遂罷實封之法參酌中道立為定額不使愚民貪得忘患而又兩人以上下狀惟給己業抵當最多之人蓋因其有自愛之心必能生防患之慮委之場務可無他虞恤民省刑德澤深厚公私之利莫大於此行之二年幸已就緒而今嵗九月二十九日用户部申請遽然變法許人明狀增錢收買臣詳觀户部狀稱若只以酌中定額即沽賣興盛之處過贏厚利此乃聚斂誅剝損下害民之論非聖朝之所宜行也且實封投狀雖非善法然所添之直人不相知惟至限滿啓封方見合給之主今則明書錢數衆各見聞又擇價髙之人便行給付民既是貪得無有逺圖並驅爭先更進迭長惟恐失之豈念後患臣竊謂坊場河渡之類既許民間承買輸納官課之外必有所得乃可為生今若復開爭端明狀買價人知無益誰肯徒勞惟是貧迫之人茍求僥幸一遭凶嵗鮮不破家償納不充纍及同保則明狀之害有甚於實封者矣臣昨於領職之日首論命令數易之弊今前詔方下普天受賜遂徇邪説輕廢成法使朝廷救弊之仁未及周浹而細民失職之害旋踵復生臣雖至愚竊為陛下惜之况國家賦役之總於地官方二聖崇尚寬大仁民愛物宜得疏通知治體之士以司大計而右曹官吏不能廣推上意惟欲盡民之利州縣監司畏省部之勢無敢指言其罪者因循日久上下相蒙妄更法度民受其弊甚非所以稱陛下仁愛元元之意伏望聖慈特降睿旨應天下承買場務並用元祐元年六月七日之法所有今年九月二十九日指揮欲乞更不施行所貴民被仁政不致失業從之户部右曹蘇轍主之當考編録册三年閏十二月十五日臣僚上言伏望聖慈特降睿旨應天下承買場務並用元祐元年六月七日之法所有今年九月二十九日指揮欲乞更不施行閏十二月十四日三省同奉聖旨依奏仍先次施行一檢準元祐元年六月七日敕節文臣僚上言乞罷前實封投狀之法奉聖旨令韓維等相度聞奏今相度罷實封投狀將前界買名錢數委本州看詳若纍有增無減即取纍界申次髙一界為額如增虧不常者即取酌中一界為額前後拖欠數多及纍限無人陳狀雖有人承買比最價髙及五分已上者縣相度減定保明申州州委官體量保明申轉運司轉運司體量得實依所減定施行訖保明申省如界滿前一年見買撲人不拖欠即先限一月取問願與不願接續承買如不願即出榜限一季內許人投狀仍坐家業抵當數目承買兩人已上給家業抵當最多之人其所通抵産不得出鄰州之外限滿無人投狀再限兩月依上法餘並依舊條三省同奉聖旨依一檢準元祐三年九月二十九日敕節文户部狀看詳買撲場務巧弊百端若只以酌中定額即沽買興盛之處過􅑿厚利並不增長價錢偶值界滿未有人承買却便節次裁減官錢深慮浸久大假虧減嵗入若許人明狀添錢承買人户自然酌度合直價錢投狀若數人下狀價同並擇抵當最多人給付即其弊自革本部今修立到條仍先次施行奉聖旨依一承買場務三年為界於界滿前一年本州録令用條及一界額錢榜要害處限六十日召人於額錢上添錢承買仍具抵當家業物數所坐見在地望召生户一名委保不是假名同詣州投狀限滿取著價最髙錢數再榜限三十日召不添價候滿限三十日先次問見承買人如無拖欠官錢聽依所添價接續别立界承買不願或有拖欠即勘會著價最髙人户名及抵當所有詣實檢估出帖給付若二人已上價同並擇己業抵當最多之人依所著價給賣限外即不得增價爭買無人投狀再限六十日依上法每經限滿又無人投狀者準此户部狀欲乞應諸路鄉户差充公人若有犯應勒停者並令别丁充役若别丁不堪即許雇人補滿年限從之此據編録册進入戊午朝奉郎左司諫韓川為太常少卿川固辭許之聽川辭免在二十六日劉安世劾胡宗愈最後疏云川以言不用自十一月後堅求外補明年正月十三日知潁州詔涇原路經略使劉昌祚特罰銅三十斤知鎮戎軍張之諫特展五年磨勘以夏賊犯邉殺虜民兵奏不以實也張舜民志劉昌祚墓云二年九月夏人冦鎮戎西塞以至城下衆五十萬聲言國母自將昌祚寢疾不能興欲舁行朝廷不從有旨令知鎮戎軍張之諫權統制軍馬昌祚素知之諌不能乃夙夜馳授方略盡兵力而屬之十一將總十萬餘人之諌得之懦不敢戰來即納之羊馬城中至人身不能轉側城中兵望賊焚室廬掘冡墓號哭唾手欲戰之諌以劒加之不得出賊留二日攻三川不拔而去昌祚每聞軍前報即拊席大罵之諌又重賂走馬王紳使為文字遊談京師既而果以之諌為有功除西上閣門使物論譁然復遣監司體量展之諌磨勘昌祚病起欲有所伸會之諌死但貶王紳而已此事當考事在二年九月十日十一月二十四日詔封州曹觀康州趙師旦廟載在祀典以廣南東路經略司言向雍冦儂智髙犯二廣覲與師旦為封康守能率州兵力戰以死稽留數日廣城得以設備卒不可破請旌其忠故也己未左中散大夫太常少卿直祕閣王汾為右諌議大夫既而御史中丞李常等論汾口吃滑稽不任諌職而汾亦自懇辭從之聽汾辭免在二十六日今並書劉安世擊李常盛陶章可考汾所以罷章在明年三月末紹聖元年六月五日周秩云云可考庚申置六曹尚書權官俸賜依六曹侍郎守法敘班在試尚書之下雜壓在左右常侍之下滿二年取旨癸亥西南莫蕃遣人入貢甲子詔諸路監司勿薦侍從官以上及帥臣從左司諌韓川請也乙丑詔湖南安撫鈐轄謝麟多方經畫臨口寨蠻冦凡可腹背牽制應干機略並隨事從長措置勿令諸將淹延觀望仍量度於行司所在留兵以為應援丙寅詔門下省班簿房籍記初入流官十一月二十三日十二月末並合參照詔吏部詳定六曹寺監重復稽滯利害以聞從監察御史王彭年請也録故西頭供奉官郝普男忠為三班奉職義為三班借職以鄜延經略司言普與西賊戰塞門寨死之故也丁卯遼國遣使興復軍節度使蕭京永州管內觀察使耶律睦副使中大夫守衛尉卿劉泳東上閣門使海州防禦使劉彥升來賀正旦寶文閣直學士知揚州謝景溫為權兵部尚書以龍圖閣待制知江寧府蔡卞知揚州右正言劉安世言臣竊聞除謝景溫權刑部尚書臣覩吏部關到今月十八日敕節文六曹尚書並置權官俸賜依侍郎守法新制既下衆謂未安臣竊惟用人之法固有資級是以兩省卿監之中擇久次而選執政歷試於職足以見賢議者比患兩省卿監難得資髙之人故向者立權侍郎之制約用昔日三司副使資序任之二年取旨正授所以重近臣之選難其進用之路也尚書之官則異於此位既崇重實亞執政若才德兼茂資望並隆處之八座乃為宜稱况隨其階職之髙下已有行守試之定規茍未得其人則官不必備兼自來諸部之無長官止命侍郎主行未聞妨闕又先朝建官已來除吏部之外他曹尚書多不並置今朝廷創為新意特設權官搢紳之間極有異論皆謂必將援引資淺望輕不協輿議之人假此藉口欲以弭謗臣方欲具士大夫之言上逹聖聽乞罷新法以杜僥幸而遽聞景溫除目則衆人所料果為不謬按景溫在先帝時為湖南安撫使附會章惇先於徽誠等州建置城寨以開邉隙十年之內所費不資湖北及廣西並邉之地常被殺掠無有寧嵗蠧國殘民莫此為甚近日朝廷知其無益有害己令廢罷渠陽等軍而景溫係首事之人未聞議罪今反召用何以示懲况景溫昨治開封殊無善狀方二聖臨御之日輒以穢惡公議上瀆天聰止令罰金已免斥逐又自髙陽關將帶女巫置之郡下景溫僥幸大任日使子弟就其家考問以至崇此妖人目為聖母輦轂之下惑亂衆聽及以婢妾之子用為左右之吏吏輒恃勢以醉毆人景溫殊無畏憚釋而不問遂致言者彈劾出之近藩然是時景溫親黨方據權要故知蔡州未幾即徙潁昌又權守成都而偃蹇不行無人臣恭順之禮陛下過示包容不加黜責曲從其請改守揚州故其後王安禮被命守蜀不能無辭攀援景溫以為比例意謂朝廷既已聽景溫之免則必難加罪於己然猶以人言之故遂有宫觀之命安禮以前執政辭尚得宫觀景溫以兩制辭則不失名藩物論喧然為之不平在揚州未久而又不因省部闕官忽有今日不次之擢陛下詳此數節則景溫詔除之下能允公議乎伏望聖慈特垂省察速降指揮收還景溫之命且與外任差遣仍詔三省罷尚書權領之法以塞濫進之門
