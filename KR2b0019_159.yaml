body:
  text: 續資治通鑑長編卷一百五十五宋李燾撰仁宗慶厯五年三月戊午邇英閣講詩匪風篇曰誰能烹魚溉之釡鬵帝曰老子謂治大國若烹小鮮義與此同否丁度對曰烹魚煩則碎治民煩則散非聖學深逺何以見古人求治之意乎詔賜曲江進士李訪粟十石帛十匹仍令州縣常存問之初訪父母卒廬於墓側有虎暴傷旁人而不及訪廬又有白烏數百集墓上韶州表其事故賜之己未詔大宗正司帥諸宗子勉勵學業睦親宅北宅諸院教授官常具聽習經典或文詞書翰功課以聞東都事略詔大宗正寺曰朕思古之人君莫不厚親戚以輔王室始邦家而化天下宋興八十餘載宗室蕃衍宜令睦親宅諸院教授官課經典文詞以聞杜衍范仲淹富弼既罷樞密副使右諫議大夫韓琦上疏言陛下用杜衍為宰相方及一百二十日而罷必陛下見其過失非臣敢議范仲淹以夏人初附自乞保邉朝廷因而命之固亦有名至於富弼之出則所損甚大臣始不敢容易奏陳慮言事臣僚與縉紳髙識之士必有為陛下别白論辨者數日觀聽略無一人啓口得非惜身畏禍人之常情臣受國重恩備位樞輔若事有干國家之大計惑天下之耳目豈可偷安固祿隱而不言竊見富弼大節難奪天與忠義昨契丹領大兵壓境致慢書于朝廷倉卒之間命弼使敵弼割老母之愛蹈不測之禍以正辨屈强敵卒復和議忘身立事古人所難故近者李良臣自北來歸盛言北方自主而下皆稱重之陛下兩命弼為樞密副使皆弗有其功辭避不受逮抑令赴上則不顧毀譽動思振緝紀綱其志欲為陛下立萬世之業耳去年秋北人㸃集大兵聲言討伐元昊朝廷未測虛實弼以河朔邉備未完又自請行于今在外已是半年經久禦戎之術固已蓄於胸中事畢還朝甫及都門未得一陳於陛下之前而責補閒郡中外不知得罪之因臣亦痛弼有何負於朝廷而黜辱至此臣恐自此天下忠臣義士指弼為誡孰肯為國家之用所損豈細哉臣固知朝廷成命不可追改然尚有一策可救其失願陛下試加詳擇臣竊見近日李用和多疾陛下欲召李昭亮赴闕管殿前司事而武臣中求一代昭亮者皆難中選臣謂陛下不若因此改弼知定州仍兼部署之職遣一中使宣諭令赴闕奏覆河北公事畢赴任俟其陛對慰而遣之弼素秉忠義又感此恩唯思效死豈敢更以內外職為意别有論列如此則是朝廷以北事專委富弼以西事專委范仲淹使朝夕經營以防二敵之變朝廷實有所倚又北敵素知弼之威望亦可以杜其輕發之意若無事則棄於閒郡有事則責令扞邉不惟措置後時亦是自家失體臣所以不避朋黨之疑思一悟於聖聰者蓋以臣下朋黨本求進身今臣叨竊寵任班著已優不能惜事寡言隨衆上下漸圖進用而救辨得罪之臣自取禍患為朋黨不亦拙乎願陛下察臣此心則朋黨之疑自解兼近日臣僚多務攻擊忠良取快私忿非是國家之福唯陛下察之疏入不報而董士亷又詣闕訟水洛城事輔臣多主之琦不自安懇求補外辛酉琦罷樞密副使加資政殿學士知揚州壬戍知潭州劉沆兼荆湖南路安撫使沆傳於三年十月除知潭州時即云兼安撫使按實録乃在此時今從實録然㑹要亦載三年十月初置湖南安撫司與沆傳合當更考詳癸亥詔禮部貢舉甲子廣西轉運使杜把言宜州蠻賊平把初行至貞州先遣急遞以檄諭蠻聽其自新比至宜州蠻無至者把得州校吳香及獄囚區世宏脫其械與衣帶使入峒說諭不聽乃勒兵攻破白崖黃泥九居山寨及玉峒焚毁積聚斬首百餘級復環州區希範與䝉趕𣪚走把使香招趕出降杞謂將佐曰蠻依險阻威不足制則恩不能懷所以數叛今特以窮蹙來降後必復動莫如盡殺之以絶後患乃繫牛馬為蔓陀羅酒大㑹環州坐中伏兵發擒誅七十餘人畫五藏為圖釋尫病被脅與非因敗而降者百餘人後三日又得希範醢以遺諸溪洞初區希範入保荔波洞間出與官軍鬬及把至環州使攝官區煜進士曽子華宜州押司官吳香誘其黨六百餘人始與之盟置蔓陀羅酒中既昏醉稍呼起問勞至則推仆後廡下比暮衆始覺驚走而門有守兵不得出遂盡擒殺之後三日得䝉趕區希範區丕續等十數人割其腹繢為五臟圖仍醢之以賜諸溪洞此實録所書也今從把本傳辛未詔曰頃者嘗詔方州增置學官而吏貪崇儒之虛名務增室屋使四方游士競起而趍之輕去鄉閭寖不可止自今有學州縣毋得輒容非本土人入居聽習甲戌詔諸路轉運提㸃刑獄司自今按察官吏毋得差官體量以致生事考當時獻議者乙亥昭宣使眉州防禦使入內都知張永和為宣慶使皇城使梓州觀察使內侍都知王守忠為昭宣使內藏庫使榮州團練使入內副都知劉從願為皇城使自西夏議和遣使五至闕下而永和等主辨有勞特遷之丙子詔禮部貢院增天下解額貢院請以景祐四年慶歷元年科場取解進士人數內擇一年多者令解及二分為率就試人雖多所增人數各不過元額之半其陜西路惟永興鳯翔兩處就試人多解額尚少用慶歷四年赦恩已增分數自餘州軍所增未寬今欲每州各增一名保安靜戎德順三軍本無解額今各許解一名其河東緣邉州軍自來少人取解解額已寬難議復增總諸州軍凡增三百五十九人詔遂為定額己卯邇英閣講詩六月篇上曰此序自鹿鳴至菁菁者莪皆帝王常行之道或止當時事耶楊安國對曰幽王失道小雅盡廢四裔交侵中國道微先儒所以作此序為萬世監也於是上再令講之詔禮部貢院進士所試詩賦諸科所對經義並如舊制考校先是知制誥楊察言前所更令不便者甚衆其略以詩賦聲病易考而策論汗漫難知故祖宗莫能改也且異時嘗得人矣今乃釋前日之利而為此紛紛非計之得宜如故便上下其議于有司而有司請今者考較宜且如舊制遂降此詔實録但云上封者言其非便不出主名此從本志按楊察本傳亦具載然實録於八年四月始其載貢院所申請不出主名按本傳則察實權判貢院所云上封者蓋指察也本志所云後四歲貢院復以為言則此言及八年二詔皆察發之又詔補蔭選人自今止令吏部流內銓候該參選日量試所習藝業注官其慶歷三年十一月條制勿行㑹要係此詔於三月二十二日監察御史包拯言臣伏覩先降勑節文應奏蔭選人年二十五以上遇南郊大禮限半年內許令赴銓投狀京官每年春季赴國子監投狀並差兩制官於逐處考試內習詞業者或論或詩賦習經業者各專一經試墨義等及格者與放選注官及差遣自勑下之後天下士大夫之子弟莫不靡然向風篤於為學詔書所謂非惟為國造士是乃為臣立家實誨人育材之本也近聞有臣僚上言欲議罷去是未之熟思爾且國家推恩之典其弊尤甚因循日久訓擇未精今詔命方行遽欲釐革則務學者日以怠惰一旦俾臨民蒞政懵然於其間不知治道之所出猶未能操刀而使之割也或前條制有未盡事件欲望只令有司再加詳定依舊施行樞密副使龎籍言曩霄已受封冊望早令延州保安軍立定封界壬午録周世宗曽姪孫柴揆為三班奉職諫官錢明逸言申書五房提㸃後堂官樞密院諸房副承㫖主事令史而下請自今毋得與臣僚往還從之三班院言自今使臣除喪者望比京朝官例特免短使升半年與家便差遣從之賜陜西緣邉諸軍特支錢癸未詔荆湖南路安撫轉運提㸃刑獄司應蠻事申覆不及者聽便宜從事甲申詔曰朕以元元之故三赦曩霄罪許復為藩臣納誓寢兵與之更始朕念師興以來陜西士暴露良苦民疲轉餉其降繫囚罪一等杖笞釋之邉兵賜緡錢民去年逋負皆勿責蠲其租稅之半麟府州嘗為羌所冦掠除逋負視此進士一舉諸科兩舉並與免今年取解邇英閣讀漢書髙祖封韓信為齊王事上曰髙祖之從諌善用人不疑如此丁度對曰髙祖聰明大度故臣下得盡其誠不然何以基帝業也乙酉詔樞密院凡言邉防利害更改兵器軍陳鄉軍牧馬事並付詳定編敕所酌其經久可行者具為令丙戌罷入粟授官㑹要云從殿中丞張庚所請是月歐陽修上疏曰臣聞士不忘身不為忠信言不逆耳不為諫諍故臣不避羣邪切齒之禍敢冒一人難犯之顔惟賴聖慈辛加省察臣伏見杜衍韓琦范仲淹富弼等皆是陛下素所委任之臣一旦相繼而罷天下士皆素知其可用之賢而不聞其可罷之罪臣職雖在外事不審知然臣竊見自古小人讒害忠賢其識不逺欲廣陷良善則不過指為朋黨欲搖動大臣則必須誣以專權其故何也夫去一善人而衆善人尚在則未為小人之利欲盡去之則善人少過難為一二求瑕惟指以為朋黨則可以一時盡逐至如大臣已被知遇而䝉信任者則不可以他事動搖惟有專權是人主之所惡故須此說方可傾之臣料杜衍等四人各無大過而一時盡逐富弼與仲淹委任尤深而忽遭離間必有朋黨專權之說上惑聖聰臣請詳言之昔年仲淹初以忠信讜論聞於中外天下賢士爭相稱慕當時姦臣誣作朋黨猶難辨明自近日陛下擢此數人並在兩府察其臨事可以辨也蓋杜衍為人清審而謹守規矩仲淹則恢廓自信而不疑韓琦則純正而質直富弼則明敏而果鋭四人為性既各不同雖各歸於盡忠而其所見各異故於議事多不相從至如杜衍欲深罪滕宗諒仲淹力爭而寬之仲淹謂契丹必攻河東請急修邉備富弼料九事力言契丹必不來至如尹洙亦號仲淹之黨及爭水洛城事韓琦則是尹洙而非劉滬仲淹則是劉滬而非尹洙此數事尤為彰著陛下素已知者此四人者可謂至公之賢也平日閒居則相稱美之不暇為國議事則公言廷爭而無私以此而言臣見杜衍等真得漢史所謂忠臣有不和之節而小人讒為朋黨可謂誣矣臣聞有國之權誠非臣下所得專也臣竊思仲淹等自入兩府以來不見其專權之迹而但見其善避權也夫權得名位則可行故行權之臣必貪名位自陛下召琦與仲淹於陜西琦等讓至五六陛下亦五六召之至如富弼三命學士兩命樞密副使每一命未嘗不懇讓愈切而陛下用之愈堅故天下之人所共知臣但見避讓太繁不見其專權貪位也及陛下堅不許辭方敢受命然猶未敢别有所為陛下欲其作事乃開天章閣召而賜坐授以紙筆使其條列然衆人避讓不敢下筆弼等亦不敢獨有所建因此又煩聖慈出手詔指定姓名專責其條列大事而行之以久冀皆有效弼性雖鋭然亦不敢自出意見但舉祖宗故事請陛下擇而行之自古君臣相得一言道合遇事而行更無推避弼等䝉陛下聖意委任督責丁寧而猶遲緩自疑作事不果然小人巧譖而曰專權者豈不誣哉至如兩路宣撫國朝纍遣大臣况自中國之威近年不振故元昊叛逆一方而勞困及於天下北敵乘釁違盟而動其書辭侮慢至有貴國祖宗之言陛下憤耻雖深但以邉防無備未可與爭屈志買和莫大之辱弼等見中國纍年侵陵之患感陛下不次進用之恩故各自請行力思雪耻㳂山傍海不憚勤勞欲使武備再修國威復振臣見弼等用心本欲尊陛下威權以禦四方未見其侵權而作過也伏惟陛下睿哲聰明有知人之聖臣下能否洞逹不遺故於千官百辟之中親選得此數人一旦罷去而使羣邪相賀於內四方相賀於外此臣所以為陛下惜也陛下聖德仁慈保全忠善退去之際恩禮各優今仲淹四路之任亦不輕矣願陛下拒絶羣謗委信不疑使盡其所為猶有禆補方今西北二敵交爭未巳正是天與陛下經營之時而弼與琦豈可置之閒處伏望早辨讒巧特加圖任則不勝幸甚臣自前歲召入諫院十月之內七受聖恩而置身兩制常思榮寵至深未知報效之所羣邪爭進讒巧而正士繼去朝廷乃臣忘身報國之時豈可緘言而避罪疏入不報指修為朋黨者益惡焉修疏附見時月更須考詳為黨類者益惡修此據墨史夏四月丁亥朔司天言日當食而陰晦不見宰臣率從臣稱賀是日御崇政殿録繫囚遣監察御史劉元瑜等往三京踈决御史李京言陛下因天之戒恐懼修省避正殿减常膳故精意感格日當食而陰雲蔽虧雖宋景公之熒惑退舍商太戊之桑穀並枯無以異也然臣區區竊有所疑者自寶元初定襄地震壞城郭覆廬舍壓死者以數萬人殆今十年震動不已豈非西北二敵有窺中國之意乎二月雷發聲在易為豫言萬物出地皆悅豫也八月收聲在易為歸妹言雷復入地避羣陰之害也今孟夏雷未發聲豈非號令之不信乎願陛下飭邉臣備不虞戒輔臣謹出命以厭禍於未形又尚美人棄外館多年比聞復召入臣慮假媚道以為蠱惑冝亟絶之苗繼宗嬪御子弟乃緣恩私為府界提㸃冝割帷薄之愛重名器之分庶幾不纍聖政上嘉納之閏五月戊戌張堯佐始自府界提㸃為戶部判官向傅師代之不知苗繼宗是何時除授當考二月丙申資州刺史苗繼宣為并代鈐轄兼知欣州不知繼宗於繼宣是兄弟否戊子左龍武軍大將軍溫州團練使從讜坐射殺親事官削除官爵仍鎖於别宅從讜惟正子也知諫院余靖言書稱堯之盛德則曰睦九族史稱漢之懿事則曰繼絶世所以厚仁義之本茂宗枝之祥陛下紹堯之明度漢之美敦敘宗族意愛博厚有司不能奉承睿㫖深可惜焉竊聞從讜頃因忿毆傷監門使臣有司奏為風狂禁鎖空宅臣竊謂朝廷本意以惟正無子遂取惟忠之子為其後凡言為後者蓋使主其閨門奉其祭祀爾今因躁忿小過遽此幽閉俾其閨門無託祭祀乏人甚非陛下敦敘之意也外議往往言從讜好學尚氣不能恬退輕忿致過恐非狂疾就令實有狂疾當使國醫攻理以表渙恩若或只因輕肆則謂冝天慈含怒放還本宅俾其上奉朝廷睦九族繼絶世之仁下遂皇宗主閨門奉祭祀之事又所以承陛下篤親審罰之德也不報從讜尋自剄死上甚悼之追復故官仍贈濟州防禦使濟南侯明年正月丁未乃遣復故官又加贈典不知何時自剄今附見己丑徙知渭州刑部郎中天章閣待制王素知華州先是范仲淹宣撫河東劾轉運使劉京在所部市私物擾民詔罷京仍自今勿復委以均輸之任復下并州明鎬體量於是又得素為諫官時嘗託京市木而京委文水令董望市之虧所僦車直及謾稅錢四十千詔御史臺鞫其事素坐是徙京上素書故復劾素事具王平家譜閏五月丁酉實録云京坐市物罷轉運使為知州獨不書京罷時據㑹要四年十月二十五日詔今後勿復更以均輸之任委京即其事也辛卯封皇第八女保慈崇祐大師幼悟為鄧國公主師號如故尋又進封齊國落師號是月薨追封韓國夏國主曩霄初遣索札密卜伊則張文顯來賀乾元節自是歲以為常壬辰邇英閣講詩小旻篇曰如彼泉流無淪胥以敗帝謂趙師民曰以水諭政其有指哉對曰水性順故通通則清逆故壅壅則敗喻用賢則王政通而世清用邪則王澤壅而世濁幽王失道絀正用邪正不勝邪雖有善人不能為治亦將相牽以淪於汙敗也以環州蘇家族巡檢三班奉職實吉為左班殿直實吉獲西界僞團練使鄂特結又嘗捍賊於細腰城有功特遷之癸巳詔廣西轉運司懷逺軍帶溪寨天河寨冨仁監普義寨鎮寧州環州思立寨智州德謹寨皆煙瘴之地其使臣在任物故者録其子若孫一人丙申以章懿皇太后姪西頭供奉官李瑛卒特輟視朝贈瑛如京使榮州刺史丁酉契丹國母遣右監門衛大將軍耶律祜崇祿卿劉積善契丹主遣臨海節度使耶律運少府監楊哲來賀乾元節丙午西界內附僞太尉興博為太子左清道率府率餘十八人各補三班奉職丁未講詩至巷伯篇注有魯男子獨處之事帝曰嫌疑之際古人所謹此不著魯人姓氏豈聖人特以設教耶戊申工部尚書平章事兼樞密使章得象罷為鎮安節度使同平章事判陳州得象在中書八年畏逺名勢宗黨親戚一􅋀抑而不進方陜西用兵上鋭意天下事進用韓琦范仲淹富弼使同得象經書當世急務得象無所建明琦等皆去得象居位自若監察御史裏行孫抗數以為言而得象亦十二章請罷上不得已乃許之孫抗去年十二月癸丑乃自太常博士為監察御史裏行其言得象當是韓琦等去後傳云得象無所建明抗數以為言得象居位自若恐誤今稍顛倒其辭工部侍郎平章事兼樞密使賈昌朝加昭文館大學士監修國史工部侍郎參知政事陳執中依前官平章事兼樞密使庚戍樞密副使右諌議大夫吳育為參知政事翰林學士承㫖端明殿學士兼翰林侍讀學士中書舍人丁度為工部侍郎樞密副使度在樞密建言周世宗募驍健有朝出羣盜夕補宿衛者太祖閲猛士實騎軍請擇河北河東陜西就糧禁軍以補禁旅之缺又言契丹嘗渝盟備預不可忽因上慶歷兵録五卷贍邉録一卷此據丁度本傳附見辛亥詔保州廣信安肅軍巡檢都監仍舊每月輪一員出巡邉癸丑徙知陳州資政殿學士吏部侍郎任中師知曹州中師自言臣老矣家本曺人願得守曺營歸休之計上憐而許焉中師兄中正歷守并益曺三州又嘗為樞密副使而中師皆繼踐之人以為寵五月丙辰朔祠部貟外郎張子奭為刑部貟外郎仍賜三品服東頭供奉官閣門祗候張士元為內殿崇班左侍禁閣門祗候王正倫為東頭供奉官以封冊夏國回也丁巳光祿卿吳待問為祕書監以其子育參政例得推恩而待問辭不拜己未翰林學士兼龍圖閣學士判集賢院王堯臣翰林學士史館修撰張方平侍讀學士兼龍圖閣學士判史館修撰余靖並同刋修唐書春明録可考嘉祐五年七月上所修唐書欲詳載本末當在此時辛酉賜在京開浚城壕役卒特支錢開浚城壕當求事始壬戍資政殿學士工部尚書知大名府程琳為資政殿大學士琳兼河北安撫使在七月戊子本傳即於加大學士并言之誤也今從實録仍見本日西人歸石元孫諫官御史奏元孫軍敗不死為國辱請斬於塞下以示西人宰相陳執中謂冝如所奏賈昌朝獨曰在春秋時晉獲楚將榖臣楚獲晉將知罃亦還其國不誅因入對探袖出魏志于禁傳以奏曰前代將臣敗覆而還多不加罪帝乃貸元孫癸亥削除官爵編管全州其子弟嘗受陳亡恩澤者並追奪之知曺州任中師請修廣州子城仍請置巡海軍兩指揮從之景祐間中師嘗知廣州以州獨有子城而廢久不修恐緩急無以禦盜於是太常少卿魏瓘實知廣州遂城之環五里甲子命翰林學士孫抃磨勘諸路提㸃刑獄課績賜荆湖南路捉殺蠻賊禁軍廂兵土丁特支錢戊辰詔登聞鼓院自今勿收接蠻人文狀以下溪州彭士羲等遣人齎狀求進上令實封送樞密院因有是詔上封者多言諸路轉運判官競為苛刻權均轉運使州縣厭苦侍御史王平請自今轉運判官不得專行按察並須關報本司己巳詔見任轉運判官歲滿者皆罷平侯官人也知制誥余靖前後三使契丹益習外國語嘗對契丹主為蕃語詩侍御史王平監察御史劉元瑜等劾奏靖失使者體請加罪元瑜又言靖知制誥不當兼領諌職庚午出靖知吉州録故管勾靜邉寨弓箭手巡檢西頭供奉官李文扆子士廉為三班奉職文扆嘗通水洛城道遇賊戰死故也辛未賜秦州修隴城川堡使臣役卒銀絹有差丙子補齊州進士王端為京東盜賊多處縣尉初端應募捉賊而親擒强劫盜全夥五人故以命之丁丑徙知保吉州刺史劉渙知登州登舊用刀魚船備海賊後禁弛多盜渙至繕船備仍多設方略賊無敢入境者手詔褒焉戊寅詔河北緣邉人戶所占塘泊之利官司毋得侵刈蘆葦仍令本路提㸃刑獄田京專領之己卯遣內侍押班任守信往河北路教習陳法庚辰詔陜西河東經略司選所部路分都監巡檢使大城寨兵官軍貟指揮使有膽勇知謀曽立戰功者以名聞壬子三班奉職王嵩為右侍禁閣門祇候西人既和龎籍言元昊未通時种世衡畫策遣嵩冒艱險間其君臣遂成猜二因此與中國通請優進嵩官始自借職遷奉職於是因對自陳特有是命此據种世衡𫝊又云世衡聞葉勒兄弟已誅為文越境祭之按世衡以慶歷五年正月七日卒此時葉勒兄弟未誅兵家詭道世衡或繆為此亦不可知然非事實也今不取詣又按夏國𫝊云渭州百姓范仁美姚家堡十將張遂王㳂言約噶綱朗凌沁布諸人陰欲內附㳂遣仁美遂持書入西界事覺元昊族三家并殺仁美配遂居攤糧城此傳要未可信然亦足以見葉勒兄弟被誅不緣王嵩也嵩但能離間元昊使不任葉勒兄弟爾世衡越境設祭果非事實其事實當從記聞所載龎籍奏仁美等仍于皇祐二年四月見之臣又據世衡傳籍奏乞優進嵩官亦止云離間元昊君遂成猜二不云葉勒兄弟被誅也然仲淹志世衡墓乃云嘗遣諜者入敵中凡半嵗敵誅握兵用事者二三人諜者還言其謀得行而世衡已殁上方懷來故其績不顯墓志蓋亦謂葉勒兄弟果被誅與世衡𫝊合當更考之或仲淹但慿世衡子古之言要非事實也皇祐元年十一月丙申追贈种世衡團練使合通此假看詳熙寧四年十一月癸未王元規乞贈父嵩官可參考癸未詔吏部流內銓自今試初入官選人其習文辭者試省題詩或賦論一首習經者試墨義十道並注合入官如所試紕繆試墨義凡九不中令守選候放選再試又不中與逺地判司其年四十以上依舊格讀律通即與注官仍命兩制一員同考試之甲申馬軍副都指揮使定國軍留後曺琮卒車駕臨奠為製挽辭皇后亦再出視喪就第成服贈安化節度使兼侍中諡忠恪琮小心謹畏善贊謁御軍嚴整其殁也家無餘資但存兵書邉奏而已或不須載更檢前例看
