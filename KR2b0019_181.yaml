body:
  text: 續資治通鑑長編卷一百七十七宋李燾撰仁宗至和元年九月辛酉朔權三司使翰林學士兼端明殿學士翰林侍讀學士禮部侍郎知制誥楊察為户部侍郎提舉集禧觀事內侍楊永德建請蔡汴河置水遞鋪察條其不便罷之永德毁察於帝三司有獄辭連衛士皇城司不即遣而有詔移開封府鞫之察由是乞罷帝從其請知諫院范鎮言外議皆謂察近因㸃檢內衣庫積尺羅帛及建言水遞鋪非便又言內藏庫不當買交抄又言香場人吏取乞錢物皇城司占護親從官不以付外勘鞫此等事皆是害政傷理之大者三司議當論列而讒邪小人多方沮毁使其請解使權朝廷因遂其請臣竊為陛下惜之夫邪正之辨治亂之所繫也不可不審陛下以察之所陳是邪非邪以為是則宜使察且主大計以塞姦幸之路以為非則不當改官使自暇逸纍日以來日色不光天氣沉隂欲雨而不雨此邪人用事之應而忠良之情不得上通也陛下宜以察所爭四事下樞密大臣詳正是非付有司依公施行復察所任庶幾上應天變下塞人言殿中侍御史趙抃亦言察若有罪不當更轉官資若本無罪不當遽罷乞令依舊職局追還新命不報抃西安人也抃為御史彈劾不避權幸時號鐵面御史先是鹽鐵判官司封員外郎王鼎為淮南江浙荆湖制置發運副使內侍楊永德請沿汴置鋪挽漕舟歲可省卒六萬鼎議以為不可永德橫猾執政重違其奏乃令三司判官一員將永德就鼎議鼎發八難永德不能復鼎因疏言陛下幸用臣不宜過聽小人妄有所改以誤國計於是永德言不用居二年遂以為使鼎為發運副使乃四月辛酉今因楊察罷三司附見前使者多漁市南方物因奏計京師持遺權貴鼎一無所市獨悉精吏事事無大小必出於已凡調發綱吏度漕路遠近定先後為成法於是勞佚悉均吏不能為重輕官舟禁私載舟兵無以自給則盜官米為姦有能居販自贍者市人持以法不肯償所逋鼎為移州縣督償之舟人有以自給不為姦而所運米未嘗不足也殿中丞王安石為羣牧判官安石力辭召試有詔與在京差遣及除羣牧判官安石猶力辭歐陽修諭之乃就職館閣校勘沈康詣宰相陳執中自言屢求為羣牧判官而不得王安石不帶職又歷任比康為淺安石既不肯為願得為之執中曰安石辭讓召試故朝廷優與差遣豈復屑屑計校資任且朝廷設館閣以待天下賢才亦當爵位相先而乃爭奪如此公視安石顔何厚也康慙沮而去詔梓州路轉運使如聞戎瀘知州每遇夷人入冦領兵按邊而所過多率民供饋糧肉冦未至而民已擾其嚴行禁約之癸亥起居舍人知制誥吕溱工部郎中知制誥兼侍講史館修撰王洙並為翰林學士故事翰林學士六貟時楊察趙槩楊偉胡宿歐陽修並為學士於是察加承㫖溱及洙復同除學士洙蓋第七貟也溫成皇后之喪洙鈎托非禮隂與石全斌附㑹時事陳執中劉沆在中書喜其助已故貟外擢洙議者非之甲子起居舍人直集賢院同修起居注吳奎為兵部員外郎太子中允直集賢院同修起居注劉敞並知制誥仍以敞為右正言陳執中言奎敞修注未一月不應驟遷上不聽曰此豈計官資日月耶謝日上面諭以外間事不便有聞當一一語朕也乙丑詔比聞差官繕修京師官舍其初多廣計工料既而指羡盈以邀賞故所修不得完久自今須實計工料申三司如七年內隳損者其監修官吏及工匠並劾罪以聞丙寅翰林學士王洙上周禮器圖先是洙讀周禮帝命畫車服冠冕邊豆簠簋之制及是圖成上之樞密副使王堯臣務裁抑僥幸於是有鏤匿名書布京城以搖軍情者帝不信丁卯詔開封府揭榜募告者賞錢二千緡願入官與大理寺評事或侍禁已有官及係軍籍者優與遷轉徒中自告特免罪亦與酬奬僧道褐衣者與紫衣紫衣者與師號已賜號者與僧官如願賜院額及欲度童行者亦聽戊辰三司使王拱辰言閣門以臣班觀文資政殿學士之上今高若訥吳育皆二府舊臣望許依近例外殿序臣班於其下從之彰德節度使兼侍中駙馬都尉王貽永言奉詔許朝朔望恩禮優絶今足疾少損乞五日一奉朝從之已已邇英閣講周禮大荒大札則薄征緩刑楊安國曰所謂緩刑者乃過誤之民耳當歲歉則赦之憫其窮也今衆持兵仗劫糧廪一切寬之恐不足以禁姦帝曰不然天下皆吾赤子也一遇饑饉州縣不能存恤餓莩所迫遂至為盜又捕而殺之不亦甚乎壬申侍御史范師道言乞知諫官院及知雜御史如當擢用不計資任深淺並且令任三司副使候􅤬歷三部方改授待制詔自今諫官及知雜御史除改旋取進止此據㑹要乃九月十二日事非十二月壬申也今附見癸酉詔臣僚陳乞親戚毋以文資侵射右職差遣甲戍滄州均田稅民或以為未便其令復輸如舊此事必與田京相關皇祐四年八月可考乙亥契丹遣忠正節度使同平章事蕭德翰林學士左諫議大夫知制誥史館修撰吳湛來告與夏國平且言通好五十年契丹主思南朝皇帝無由一㑹見嘗遣耶律防來使竊畫帝容貌曽未得其真欲交馳畫象庶瞻覿以紓兄弟之情德等又乞親進本國酒饌不許交馳畫象朝廷多有議論趙抃疏其一也蘇頌作孫抃行狀云或者慮敵得御容敢行呪詛抃言其不然卒許之張唐英政要云敵後得御容具儀仗拜謁驚嘆今皆不取丁丑詔開封府自今凡决大辟囚並覆奏之初開封府言得樞密院劄子軍人犯大辟無可疑者更不以聞其百姓則未有明文上重人命至是軍人亦令覆奏辛已三司使吏部侍郎王拱辰為回謝契丹使德州刺史李珣副之拱辰見契丹主於混同江其國每歲春漲於水上置宴釣魚惟貴族近臣得與一歲盛禮在此每得魚必親酌勸拱辰又親鼓琵琶侑之謂其相劉六符曰南朝少年狀元入翰林十五年矣吾故厚待之契丹國母愛其少子宗元案遼史帝紀及皇子表皆作重元欲以為嗣問拱辰曰南朝太祖太宗何親屬也拱辰曰兄弟也曰善哉何其義也契丹主曰太宗真宗何親屬也拱辰曰父子也曰善哉何其禮也既而契丹主屛人謂拱辰曰吾有頑弟他日得國恐南朝未得高枕也至和元年王拱辰别録契丹主又云更為西界昨報休兵事從初不禀朝命邊上頭作過犯遂行征討緣元昊地界黃河屈曲寡人先領兵直入已奪得唐隆鎮韓國大王插糧船繞頭轉來寡人本意待與除滅却為韓國大王有失備禦却被西人伏兵邀截船糧是致失利今來既謝罪遂且許和拱辰答云元昊前來激惱南朝續次不順北朝始初南朝亦欲窮兵討滅却陛下頻有書來解救遂且許和自聞皇帝失利南朝甚不樂契丹主云兄弟之國可知不樂拱辰又云南朝亦知北朝公主先聘與元昊殊不禮待憂幽而卒契丹主云直是飲恨而卒然只是皇族之女拱辰云雖知只是宗女亦須名為陛下公主下嫁豈可如此不禮今或陛下更與通親母乃太自屈也契丹主云更做甚與他為親只封冊至今亦未曽與拱辰慮其再通姻好即與中國不便故因話而諷之拱辰又云今來陛下且與含容亦是好事陛下於西羌用兵數年其殺獲勝負亦略相當古語謂爭城殺人盈城爭地殺人盈野豈是帝王仁德好事契丹主云極是也兩朝誓㫖冊內有此今用注待考或當修入正文壬午送契丹國馴象二癸未禮院言溫成皇后葬所請稱溫成皇后園陵從之乙酉溫成皇后啓殯上不御前後殿百官進名奉慰御史中丞孫抃率其屬言劉沆為宰相不當領溫成皇后監護使且言立廟建陵皆非禮章纍上不報因相與請對固爭不能得抃伏地不起帝為改容遣之臺官諫宰相護喪實録止載孫抃及侍御史范師道母湜三人按趙抃時為殿中侍御史亦同論列實録偶遺之今但云率其屬則臺官俱在矣丁亥改命劉沆為溫成皇后園陵監護使石全斌為園陵監護都監劉保信為園陵同監護都監詔代州五臺山諸寺收童行非有人保任毋得係籍時雄州言契丹遣蔚應武朔等州人來五臺山出家以探刺邊事故條約之禮院請溫成皇后廟祭器視皇后廟一室之數從之已丑太白晝見冬十月辛卯朔太白晝見壬辰詔士庶之家嘗更傭雇之人自今毋得與主之同居親為昏違者離之甲午禮院言溫成皇后四時薦新及朔望並如皇后廟令宗寺官行事從之丙申宰臣率百官詣奉先禪院奠溫成皇后上不御前後殿丁酉葬溫成皇后御西樓望柩以送自製挽歌詞宰相率百官進名奉慰知諫院范鎮言太常議溫成皇后葬禮前謂之溫成園後謂之園陵宰相劉沆前為監護使後為園陵使如聞此議皆出禮官禮官前日是則今日非今日是則前日非必有一非於此矣夫此典禮素定不可輕變者議論異同如此是為禮官而以禮自舞也古者法吏舞法而今世禮官舞禮若不加詰問恐朝廷典章寖壞而不可救乞下臣章劾禮官前後異狀以正中外之惑不報鎮又請葬溫成皇后罷焚瘞錦繡珠玉以紓國用從之已亥范鎮又言臣比嘗建議方今官冗兵多民力不堪請詔中書樞密大臣斟酌裁抑及今纍月不報退自伏念當世之務莫急於此而朝廷恬然不以為怪此臣區區不得隱默也夫慮之有素為之有備事至而應則安靜而詳實慮之無素為之無備事至而應則倉猝而乖忤大抵近事多失於倉猝而不安靜者慮之不先備之不豫也前日契丹使至虛言紛紛朝廷自顧國用之不足民力之雕敝無以待之也大臣不知計之所從於是乎請募兵以自塞責是何異欲救火而益以薪流之濁而復撓其源也景德中契丹內冦靈夏不臣是時兵不滿五十萬西備北禦沛然有餘今兵倍之矣而尚若不足者臣不識所謂也敵才遣一介之使而增益者又數萬及其去也中外相慶謂為無事殊不知新兵之費歲損已百萬緡矣其費非出於天非出於地非出於建議者之家一出於民也方民愁苦之時又重賦之以為備禦計者未見其可也此所謂倉猝而乖忤也兵不在衆在練之與將何如耳儂智高冦嶺南前後遣將不知幾輩遣兵不知幾萬亡走奔北不可勝紀陛下親遣狄靑然而卒能取勝者蕃落數百騎爾此兵不在衆近事之效也陛下何不持此說以詰大臣之欲益兵者臣愚以為備契丹莫若寬河北河東之民備靈夏莫若寬關陜之民備雲南莫若寬兩川湖嶺之民備天下莫若寬天下之民民力寬則知自愛雖有外虞人人可為兵用人人自愛之兵以禦外虞何往而不克何征而不服哉古人所謂猶手臂之捍頭目子弟之衛父兄者用此兵也臣所謂慮之有素為之有備者此也今夫官所以養民者也兵所以衛民者也今養民衛民者反殘民矣而大臣不知救臣恐朝廷之憂不在四夷而在冗兵與窮民也近年以來地數震動河不軌道日月星辰謫見於天皆民之感也伏請明敕大臣求所以息民之術以應天地之變而為宗廟社禝計臣不勝大願大臣以募兵塞責當是王德用事見皇祐元年十二月庚子賜䖍州祥符宫道士洞淵大師李思聰為元妙先生思聰上所撰璇霄列象拱極圖也先是都官員外郎燕度建議川峽選人遭父母喪須代者至然後聽去官知制誥同判流內銓劉敞言此非所以全人子之孝也辛丑詔自今並聽奔喪敞嘗建議曰臣竊見舊制官自三司副使以上及班行使臣不論高低遭父母喪者例皆百日公除孝子雖有思慕之心猶逼於王命不得遂行此誠傷教害禮無取於今臣伏以三年之喪通於天下以義制恩古人有之自謂身在軍旅躬被金革者不敢以私事辭王事爾本非承平之時游談侍從之臣所當行也又非班行冗下之職所當預也習俗既久寖以成風其賢者則以不即人心為悲其不肖者則以當喪墨縗為榮以之錫類是為傷恩以之教民是為忘孝今天下往往有聞哀不舉廢哀圖仕源自此始不可不慮傳曰君子不奪人之親人亦不可奪親竊謂唯在軍中者可權從變禮其舊制三司副使以上及班行使臣百日公除不合禮意宜聽行三年之服以崇孝悌之風臣又聞古者大夫去國三年然後收其田里明有恩也今丁憂臣僚即日絶其俸祿亦為太薄豈有行禮之人反不及被放之臣臣往見丁憂者家貧無食乞丐糊口其皇皇傷孝子之心非所以化民成俗也臣以為文官兩制武官自諸司使以上與給全俸其餘京朝官班行使臣與給半俸以明朝廷篤於禮而厚於教也乞下近臣商量可否又言陛下幸加恩令諸近臣得為親服三年又不奪其俸以救人子匍匐之哀至仁至惠不可尚矣然常參京朝官班行使臣猶不用此令臣以為名位不同尊親一也茍取周急不宜分别書云無偏無黨王道蕩蕩無黨無偏王道平平惟陛下留意慶厯三年七月聽三司副使以上持服仍續俸武臣非在邊者亦聽嘉祐四年九月七年九月詔書當考丙午溫成皇后神主入廟上不視事百官進名奉慰丁未詔陜西災傷州縣權停催理貸糧己酉葬溫成皇后父清河郡王張堯封母齊國夫人曹氏輟視朝后臨終見帝以祖父未葬為託於是為葬其三世於冡旁辛亥賜翰林侍講學士楊安國錢五十萬仍聽大寒暑毋入謁時安國自言衰憊不任侍經席願乞骸骨以歸故賜及之癸丑開封府推官祠部員外郎集賢校理刁約提㸃在京刑獄初約見溫成皇后壙中物多侈麗而私言於人監護內臣乃密以聞故出之諫官范鎮言約無過不當出乞明降所犯以解羣惑不報乙卯詔樞密使王德用高年日入朝謁其特免拜丙辰太常少卿周湛直昭文館為淮南江浙荆湖制置發運使湛入辭上諭曰朝廷遴選此職不可隂致包苴於京師湛惶恐對曰臣䝉聖訓不敢茍附權要以謀進身上諭湛乃十一月乙巳今并書湛穰人戊午幸城北炮場觀發炮遂宴從臣賜衛士緡錢是月詔大將軍致仕遇南郊陳乞親子孫班行者如元係正團練使及遙郡防禦使已上曽任兩省都知除致仕者每遇郊恩許奏一名曽任正刺史及兩省押班致仕後遇郊恩許奏一名依例與班行後更兩遇南郊方許更奏一名仍勘㑹歷任無贓罪者施行其餘分司致仕官更不得陳乞此據㑹要十一月庚申朔知梓州吏部員外郎集賢殿修撰何郯為天章閣待制留再任辛酉降同知太常禮院太常博士集賢校理吳充知高郵軍太常寺太祝集賢校理鞠真卿知淮陽軍禮院故事嘗預為印狀列署衆銜或非時中㫖有所訪問不暇遍白禮官則白判寺一人書填印狀通奏施行及追贈溫成皇后日有中㫖訪問禮典判司王洙兼判少府監廨舍最近故吏多以事白洙洙嘗希望上㫖以意裁定填印狀進內事既施行而論者皆責禮官禮官無以自明乃召禮直官戒曰自今朝廷訪問禮典稍大無得輒以印狀申發仍責取知委後數日有詔問溫成皇后應如他廟用樂舞否禮直官李亶以事白洙洙即填印狀奏云當用樂舞事下禮院充真卿怒即牒送亶於開封府使按其罪洙抱案卷以示知府事蔡襄曰印狀行之久矣禮直官何罪襄患之乃復牒送亶於禮院充真卿復牒送府如是再三禮院吏相率逃去初真卿好遊臺諫之門㑹溫成皇后神主祔新廟皆以兩制攝獻官翰林學士承㫖楊察攝太尉殿中侍御史趙抃監祭而充監禮上又遣內臣臨視內出圭瓚以灌鬯充言於察曰禮上親享太廟則用圭瓚若有司攝事則用璋瓚今使有司祭溫成廟而用圭瓚是薄於太廟而厚於姬妾也其於聖德虧損不細請奏易之察有難色曰日已暮矣明日行事言之何及而內臣視祭者已聞之密以奏詔即改用璋瓚祭之明日抃奏蔡襄不按治禮直官罪畏懦觀望於是執政以充因祠祭教抃上言又禮直官日在溫成葬所訴於內臣云欲送禮直官於開封府者充與真卿也明日詔禮直官及繫檢禮生各贖銅八斤充真卿俱補外抃及諫官范鎮等皆言充等無罪不當黜不報壬戍免華州雲靈臺觀田稅癸亥翰林學士承㫖兼端明殿學士侍講學士户部侍郎楊察權三司使事詔中書提㸃五房公事自今雖無出身亦聽佩魚舊制自選人入為堂後官轉至五房提㸃始得佩魚提㸃五房吕惟和非選人入援司天監五官正例求佩魚特許之知開封府蔡襄言內東門市行人物有纍年未償價錢者請自今並關雜買務以見錢市之其降出物帛亦估直於左藏庫給錢從之詔諸路官代還者其護送公人如聞已雇人為代而官司復令執役民甚苦之自今須計程滿日方得追呼甲子御史中丞孫抃言西川屢奏儂智高收殘兵入大理國謀冦黎雅二州請下益州張方平先事經制以安蜀人從之詔三司河北歲大豐其令緣邊州郡便糴軍糧三百萬馬料三百萬又詔修城西炮場臺仍令八作司繪圖以聞內出太廟禘祫時饗及溫成皇后廟祭饗樂章樂曲下太常肄習之乙丑太常丞直集賢院判磨勘司同修起居注馮京落同修起居注時諫官爭言吳充鞠真卿不當補外京最後上書言愈切宰相劉沆怒請出京知濠州上曰京何罪然猶落修注臺諫又爭言京不當奪職請復之不報丙寅徙淮南江浙荆湖制置發運使工部郎中天章閣待制許元知揚州元在淮南十三年急於進取多聚珍奇以賂遺京師權貴尤為王堯臣所知治所在真州衣冠之求官舟者日數十輩元視勢家要族立推巨艦與之小官惸獨伺候歲月有不能得人以是憤怨而元自謂當然無所愧憚三班院請下諸路轉運司具部內使臣歲所收職田之數第為上中下三等凡差遣不許連入上等從之丁卯江南東路轉運使刑部員外郎直史館唐詢同修起居注始詢使江東因辭得對言執政純取科名顯者修起居注非故事詢行才數月而馮京罷遂召詢入補其闕戊辰命鹽鐵副史司封員外郎李參皇城使陵州團練使內侍押班武繼隆相度黃河故道已已秦鳯經略安撫司言城秦州古渭寨畢功初築城費一百萬緡其後留兵戌守每歲費十萬緡戊寅內園使綿州防禦使入內押班石全斌為宫苑使利州觀察使仍給兩使留後俸入內供奉官管勾御藥劉保信為西染院使聽寄資並以監護溫成皇后園陵故也知諫院范鎮言章獻章懿章惠三太皇后之葬推恩皆無此比乞追還全斌等告敕不報庚辰遣官祈雪賜河陽澶州浮橋打凌卒衲襖辛已宰臣劉沆子太常寺太祝瑾令學士院召試館職溫成皇后既葬賜后閣中金器數百兩沆力辭而為瑾請之壬午入內押班石全斌為入內副都知知制誥劉敞封還詞頭奏曰全斌昨已有制㫖除宫苑使利州觀察使未及三日復換此命朝令夕改古人所非若因全斌自陳探其不滿之意曲徇所求以悅其心便是朝廷恩典本無定制唯繫宦官臨時徼乞宣布天下必以為惑傳示後世必以為笑何則陛下賞罰當信天下當教後世不知全斌功勤凡有幾何昨者嶺外之行已曽受賞今奉溫成皇后葬畢賞又不薄不知厭足愈求遷進朝廷亦當愛惜事體無宜輕改成命全斌閨闥之臣尚如此姑息萬一復有權勢重於全斌者如何待之臣雖鄙賤實惜此體不敢輒撰告辭從之後三月全斌卒為入內副都知敞本傳獨不載此全斌傳有之詔陜西轉運司自永興州至益州遞鋪卒方冬苦寒挽運軍器不息其各賜緡錢有差又詔湖南鄰溪峒諸縣其令本路安撫轉運司舉官為知縣歲滿京朝官免入逺選人與免選癸未西京作坊使高州刺史王道卿為西上閣門使初道卿以父貽永罷樞密使恩例後二年除閣門使至是道卿又自援大長公主子孫類多歷橫行故未滿歲特遷之甲申雪梓州路轉運使司請徙昌州富順縣駐泊捉賊使臣於瀘州納溪寨半歲一更從之乙酉遣官謝雪文思副使栁涉言諸路兵官自今乞定所領親兵數如經戰陳陷失主將皆以軍法論從之丙戌詔宗正寺故事屬籍十年一修今雖及八年而宗支蕃衍其增修之知制誥劉敞言臣昨聞吳充出官馮京落職將謂其人所行實有過當所言實有不可是以觸忤聖意不䝉矜恕及於延和殿奏事面奉宣諭充乃是盡職京意亦無他中書惡其太直不與含容臣竊驚駭不覺憤咽前古以來唯有人主不能容受直言或致竄謫臣下今陛下慈聖好諫寬大如此不知中書何故不務將順聖德之美須要排逐言者今四方之人不知本末反謂陛下不能聽諫口謗腹非所損不小且如此事陛下心所不怒中書却欲必行乃是蔽君之明止君之善侵君之權增君之過依勢作威警動朝衆不公不直人不敢言得以利己得以罔上陛下不可不深察也臣按六經舊史大臣蔽君之明止君之善侵君之權增君之過皆為不忠陷於刑誅况今時人情遠不如古若聞陛下欲為善而牽於大臣大臣欲作威而不憚陛下則必相率背公向私奔走權門矣此風一動此勢一失是為君與臣同國聖人之至戒也魯僖公時頻致天旱春秋謂因公子遂專權之應而洪範五行僣則常暘䝉則常風下侵上則山崩地震日月薄蝕如今者此事逆於倫理必恐感動隂陽或能遂致災旱風霧山崩地震日月之眚望陛下留神深察此言臣以淺近荷陛下厚恩不敢不思報然竊恨此一事近世未有臣雖口陳未能詳盡謹手書具奏以聞敞又言臣前論吳充馮京謫官面䝉宣諭本末臣即言若如此則是大臣蔽君之明專君之權而擅作威福也必恐感動隂陽有地震日蝕風霧之異今臣竊聞鎮戎軍地震一夕三發去臣所言五日之內耳又京師雪後昏霧纍日復多風埃太陽黃濁此皆變異之可戒懼者也臣所以先知必然者按五行志云臣事雖正專之必震况其不正乎又尚書洪範䝉恆風若而京房易傳臣之蔽君則䝉氣起臣以此數者合之故知必有異也然皇天保佑陛下至深至厚是以災異隨事輒應欲望陛下覩變自戒永綏四方也不可不思不可不憂今陛下推誠委信大臣而大臣依勢作威政事不平如此甚衆在外畏憚已非常時陛下且深究天地之意收攬威權無使聰明蔽塞法令不行則足以消伏災異矣臣前已奏陳再述所聞特乞留中詳加省覽敞以十一月十一日庚午奏事延和殿後五日當是甲戌冬至日也鎮戎地震實録不書因附敞言于十一月末更須考詳刪修十二月癸已太常少卿直史館張子憲為光祿卿子憲當遷諫議大夫而中書以為諫議大夫不可多除因除光祿卿故事大卿監無帶館職者遂落職其後四歲乃與趙良規等復俱貼職子憲還貼職在嘉祐三年三月詔陜西河東經略司造披氊韋裘以備軍興甲午賜廣州捕黎賊軍士緡錢丁酉賜傳法院譯經三藏大師法護為普明慈覺傳梵大師法護西天僧有戒行特以六字師號賜之庚子翰林學士王洙太常少卿直集賢院王禹錫上皇祐方域繢圖知並州韓琦以疾奏乞太醫齊士明而翰林醫官院言士明當疹御脉不可遣上立命內侍竇昭押士明往視之甲辰詔審官院自今內外官有酬奬處代還毋得復入有酬奬處丙午詔司天監天文算術官自今毋得出入臣僚之家羣牧司言舊制陜西河東路十七州軍市馬自西事後止置場於秦州今內外諸軍皆闕馬欲請於環慶州保安軍德順軍仍舊市馬從之丁未殿中丞直祕閣司馬光上古文孝經詔送祕閣己酉如京使果州團練使入內都知張惟吉卒贈保順軍節度使諡忠安惟吉任事久頗見親信而言弗阿徇溫成治喪皇儀惟吉爭不能得宰相既導諛惟吉頓足泣下壬子詔河北京東轉運使同詣鄆州銅城鎮海口審度黃河高下之勢如興工後水果得通流即條具利害以聞開銅城塞商胡議自郭勸等始見皇祐元年二月河北周沆燕度京東陳宗古也沆有論列當附開六塔時癸丑詔自今內侍傳宣先令都知劄報被受者覆奏殿中侍御史趙抃言據趙抃南臺集此章以二十四日上二十四日癸丑也臣竊聞宰臣陳執中本家捶撻女奴迎兒致死開封府見檢覆行遣道路喧騰羣議各異一云執中親行杖楚以致斃踣一云嬖妾阿張酷虐用他物毆殺臣謂二者有一於此執中不能無罪若女使本有過犯自當送官斷遣豈宜肆匹夫之暴失大臣之體違朝廷之法立私門之威若女使果為阿張所殺自當禽付所司以正典刑豈宜不恤人言公為之庇夫正家而天下定前訓有之執中家不克正而又傷害無辜欲以此道居疑丞之任陛下倚之而望天下之治定是猶却行而求前何可得也頃年晏殊嘗以笏擊從人齒落陛下不以殊東宫之舊而輕天下之法故即時罷殊樞密院出知應天府今執中連綿病告堅求乞骸進無忠勤退失家節伏望陛下特賜宸斷允其所請罷免相位台鼎瞻望之地宜擇有賢德者朝夕翊亮大政則陛下垂拱仰成無焦勞之念矣初執中家女奴死移開封府檢視有瘡痕傳言嬖妾張氏笞殺之抃即具奏而執中亦自請置獄詔太常少卿直史館齊廓即嘉慶院鞠其事廓尋被病改命龍圖閣直學士左司郎中張忭又改命給事中崔嶧既而追取證佐執中皆留不遣抃及御史中丞孫抃共劾之已而有詔罷獄臺官皆言不可翰林學士歐陽修亦以為言逮執中去位言者乃止詔罷獄不得其時或明年二月初今再附此勘官先差齊廓明年正月因趙抃言廓病心風改差張忭尋又差崔嶧及曹觀前後凡四員此據孫抃劾陳執中第二章國史但記崔嶧不知張忭何故亦不竟此獄既差崔嶧又差曹觀皆不詳其事當考孫抃初在翰林嘗至中書白事繫鞋登政事堂執中見之不恱且責吏不以告抃曰學士見宰相以客禮自有故事况我以公事來若有私禱則足恭下顔所不憚矣執中不能平及遷中丞執中實專政柄每裁處大事多出獨見同列無敢抗者抃屢言其失曰幸陛下以臣章示執中使凡事須衆論復熟然後奏禀施行執中見章益不喜一日賜宴都亭驛坐席相近酒間執中微語抃曰觀中丞近日封章意頗不見容老夫耄矣行當引去因指其座曰此中丞即日之地幸無亟相侵也抃俯首不答退而語人曰陳公之言甘其心可見矣甲寅益州布衣張察為本州助教察雙流人通經術善屬文性淡泊屛居林泉以養生治氣為事尤深於太元著發隱三篇講疏四十五卷田況上其發隱特録之察辭不拜嘉祐四年十一月賜察處士號乙卯契丹國母遣始平節度使左監門衛上將軍耶律昌世寧州觀察使馮見善契丹遣彰聖節度使右監門衛上將軍蕭福延崇祿卿案原本作崇福卿誤今據遼史百官志改正劉九言來賀正旦丙辰睦州防禦使宗諤上所撰太平盤維録降敕褒諭置秦州弓門等九寨蕃落各一指揮上春秋高未有繼嗣皇祐末太常博士張述上書曰臣聞漆室之女有憂國之心倚楹而嘆臣位於朝二十五年矣而區區之慮不能蚤為陛下建長世之䇿是漆室之不若也臣實恥之夫生民之命繫於宗廟社稷之重而以繼嗣為之本匹夫匹婦有百金之産猶能定謀托後事出於素况於有天下者哉建隆乾德之臣子孰不願太祖皇帝享年億萬者端拱天禧之臣子其心亦莫不若此然而天地有運行日月有盈昃隂陽之數有閏有章氣至而回物極而變理之必然者也藝祖以神器傳太宗太宗以傳真宗真宗以傳陛下陛下承三聖之業傳之於千萬年斯為孝矣而春秋四十四宗廟社稷之繼未有託焉此臣所以夙夜倣徨而憂也陛下知此矣而以嫌疑不决非孝也羣臣知此矣而以諱避不言非忠也陛下享天下之貴而不自怠有天下之富而不自侈過成康文景逺矣謂宜默祈天地嶽瀆分寵六宫用均愛施或未之獲則遴擇宗親才而賢者異其禮秩試以職務俾內外知聖心有所屬則天下大幸是歲復上疏曰臣聞明兩作離大人以繼明照四方夫日君象也二明相繼故能久照東升西沒一晝一夜數之常也陛下御天下將三紀是日之正中也而未聞以繼照為慮臣誠疑之夫嗣不早定則有一旦之憂而貽萬世之患歷觀前世事出倉猝則或宫闈出令或宦官主謀或姦臣首議貪孩孺以久其政冀暗昧以竊其權安危之機發於頃刻而朝議不為計豈不危哉述前後七上疏最後語尤激切文多故不具載上終不以為罪述小溪人也皇祐五年仁宗春秋四十四述疏即以五年上傳云皇祐中誤也太常博士審刑院詳議官吳及上疏推言奄寺以及繼嗣曰臣聞官師相規工執藝事以諫臣幸得待罪法吏得原刑法之本以效愚忠竊前世肉刑之設斷肢體刻肌膚使終身不息漢文感緹縈之言易之鞭箠然已死而笞未止外有輕刑之意其實殺人祖宗鑒既往之弊捐除煩苛始用折杖之法新天下耳目兹蓋曠世聖賢恩所未至陛下深惻民隱親覽庶獄歷世用刑無如本朝之平恕宜乎天降之祥而方當隆盛之際未享繼嗣之慶臣竊惑焉意者宦官太多而陛下未悟也何則肉刑之五一曰宫古人除之重絶人之世今則宦官之家競求他子勦絶人理希求爵命童幼何罪陷於刀鋸因而夭死未易可數夫有疾而夭治世所羞况無疾乎有罪而宫前王不忍况無罪乎臣聞漢永平之際中常侍四員小黃門十人爾唐太宗定制無得踰百員且以祖宗近事較之祖宗時宦官凡幾何人今幾何人臣愚以為胎卵傷而鳯凰不至宦官多而繼嗣未育也伏望順陽春生育之令濬發德音詳為條禁進獻宦官一切權罷擅宫童幼置以重法若然則天心感應聖嗣必廣召福祥安宗廟之䇿無先於此書奏帝異其言欲用為諫官而及以父憂去及靜海人也及此疏恐以皇祐五年上是年閏七月戊申朔詔內侍省自今內侍禁供奉宮至黃門以百八十人為額或緣及疏也當考及除諫官在嘉祐三年二月
