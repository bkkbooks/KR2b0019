body:
  text: 續資治通鑑長編巻一百五宋李燾撰仁宗天聖五年春正月壬寅朔上率百官上皇太后夀於㑹慶殿黎明百官並常服并契丹使班庭下内侍請皇太后出殿後幄鳴鞭升坐又詣殿後皇帝幄請服鞾袍於簾内皇太后前再拜稱賀皇太后曰履端之祉與皇帝同之遂奉觴跪進曰謹上千萬歲夀又再拜皇太后曰恭舉皇帝之觴教坊樂止皇帝還幄宣事舎人引百官横行再拜太尉自西階升賀俛伏興降還位在位皆再拜侍中承㫖曰履新之吉與公等同之太尉又自東階升奉觴跪進於簾外内謁者接以進太尉北向拜奏曰謹上千萬歲夀太尉降還位典儀曰再拜在位再拜宣徽使承㫖曰謹舉公等之觴典儀曰再拜分班序立宣事舎人引太尉以下升殿簾外及東西廂坐酒三行侍中奏禮畢皇帝乃服衮冕御天安殿受朝賀丙午契丹遣左監門衛上將軍蕭道寜給事中知制誥張克恭來賀長寜節癸丑命樞宻直學士禮部侍郎劉筠權知貢舉中書初議擇官上曰劉筠可用也筠時在潁州遂驛召之己未詔禮部貢院比進士以詩賦定去留學者或病聲律而不得騁其才其以䇿論兼考之諸科毋得離摘經注以為問目又詔進士奏名勿過五百人諸科勿過千人庚申降樞宻副使刑部侍郎晏殊知宣州先是太后召張耆為樞宻使殊言樞宻與中書兩府同任天下大事就令乏賢亦宜使中材處之耆無它勲勞徒以恩倖極寵榮天下已有私徇非材之議柰何復用為樞宻使也太后不恱於是從幸玉清昭應宫從者持笏後至殊怒撞以笏折其齒監察御史曹修古王㳂等劾奏殊身任輔弼百寮所法而忿躁無大臣體古者三公不按吏先朝陳恕於中書榜人即時罷黜請正典刑以允公議殊坐是免尋改知應天府殊至應天乃大興學范仲淹方居母䘮殊延以教諸生自五代以來天下學廢興自殊始論張耆不可為樞宻據張唐英政要及歐陽修神道碑史不載也戊辰翰林學士兼侍讀學士龍圖閣直學士夏竦為右諫議大夫樞宻副使初武臣賞罰無法吏得髙下為姦竦為集前比著為定例事皆按比而行庚午詔西京福建路水災州軍去年秋稅未納者特與倚閣二月癸酉命參知政事吕夷簡樞宻副使夏竦修真宗國史翰林學士宋綬樞宻直學士劉筠陳堯佐同修宰臣王曽提舉初内出劄子以先朝正史乆而未修慮年祀浸逺事或淪墜宜令王曽修纂之故事宰臣自領監修國史至是以曽提舉乃别降敕焉㑹要云修兩朝史時王旦未領監修故特授敕曽以監修而再授敕為提舉蓋一時之制也甲戍龍圖閣學士工部侍郎權知開封府陳堯咨為翰林學士仍以堯咨先朝初牓第一人特班蔡齊上乙亥詔民間摹印文字並上有司候委官看詳方定鏤板初上封者言契丹通和河北縁邊榷塲商人往來多以本朝臣僚文集傳鬻境外其間載朝廷得失或經制邊事深為未便故禁止之趙徳明使都知兵馬使白文美來告東南蕃部多逃入漢界者詔鄜延部署司據數遣還夏州其先落蕃戸口亦詔徳明䕶送境上丙子詔京東災傷其流徙之民令所在賑卹之己卯左班殿直閤門祇候成正忠為右侍禁知辰州初正忠提㸃廣南西路刑獄代還磨勘院以正忠能辨寃獄課在第二故特遷之庚辰吏部銓引對選人上謂輔臣曰州縣秩卑而長吏多以愛憎捃摭細故文致使不得自進朕甚念之王曽對曰引對之際在陛下酌所犯重輕而特加選拔則塞滯靡遺也丙申知寜州楊及上所修五代史上謂輔臣曰五代亂離事不足法王曽曰雖然安危之迹亦可為監也丁酉詔水災州軍民貧而男女不能自存者聽人收養之己亥以大理評事館閣校勘王琪簽書南京留守判官事館閣校勘無出外者琪為晏殊所辟特許之辛丑浚陳留縣自明河升慶州有馬安塞指揮為禁軍詔開封府界知縣自今委審官院於京朝官内選曽歴親民者充罷三年十月詔三月癸卯罷兖州知州天貺節朝拜乾元觀觀在奉符縣距州三百里歲皆知州自行而有道路供辦之勞上因命奉符知縣代之王䝉正為荆南駐泊都監挾太后姻横肆知府李若谷繩以法議事多異同轉運使王碩具奏頗佑䝉正戊申徙若谷知潭州荆南士族元甲恃䕃屢犯法若谷杖之曰吾代父兄訓子弟爾洞庭有宿賊數邀賈船殺人投湖水毎捕獲以所殺尸漂没無可驗輙貸死𨽻他州既而逃歸復攻刼若谷以術擒致磔於市自是湖中少冦鄜延路部署張遵等言準詔緣邊内附人盡遣還夏州然蕃户頗衆恐忽生驚疑反致邊患欲諭令漸歸如不願者亦聽詔可罷瓊州歲貢瑇瑁鼊皮紫貝庚戌上謂輔臣曰知州同判民之表也今審官院一以名次用人可乎王曽曰不次用人誠足以勸羣吏然須更為選任之法乃可也癸丑左正言劉隨為左司諫隨在諫職數言事嘗言今之所切在於納諌其餘守常安靜可也詔襄潁許汝等州以水所壊榖八萬餘斛賑給貧民令僧道毋得出入司天監私習天文丙辰龍圖閣待制韓億崇儀副使田承說各罰銅三十斤以奉使契丹而不相善也辛酉御崇政殿試禮部奏名進士仍命翰林學士宋綬以下二十六人為殿後封彌謄錄考覆詳定編排官如先朝舊制壬戌試諸科甲子詔進士五舉年五十諸科七舉及六舉終場年六十淳化以前嘗應舉及經先朝御試者不以舉數令貢院别具名以聞乙丑賜進士王堯臣等一百九十七人及第八十三人同出身七十一人同學究出身二十八人試銜丙寅賜諸科及第并出身者又六百九十八人堯臣虞城人也是月秦州言地震夏四月壬申賜雄莫州修城役卒緡錢癸酉試特奏名進士及諸科甲戌賜同出身及試銜者凡三百四十二人尋下詔戒諭諸道舉人冝奮勵詞學毋坐視歲月冀望恩澤辛巳契丹遣林牙昭徳節度使蕭藴政事舎人杜防賀乾元節知制誥程琳為館伴使藴出位圖指曰中國使者至契丹坐殿上位髙今契丹使至中國位下請升之琳曰此真宗皇帝所定不可易防又曰大國之卿當小國之卿可乎琳又曰南北朝安有小大之異防不能對上令與宰相議或曰此細事不足爭將許之琳曰許其小必啓其大固爭不可藴乃止辛卯賜新及第人聞喜燕於瓊林苑遣中使賜御詩及中庸篇一軸上先命中書錄中庸篇令張知白進讀至修身治人之道必使反覆陳之壬辰夀寜觀火先是上謂輔臣曰世無良醫故夭横者衆甚可悼也張知白對曰古方書雖存率多舛繆又天下學醫者不得盡見上乃命醫官院校定黄帝内經素問及難經病源等下館閣官看詳乙未詔國子監摹印頒行又詔翰林學士宋綬撰病源序丙申殿中丞集賢校理劉立禮落職同判崇州立禮馮拯女壻也嘗令其妻入禁中求知開封縣故黜之詔選人注川峽廣南福建路幕職州縣官除給程限外違一年以上不到任者無問有無事故並許格式司收使貟闕五月辛丑詔武臣弟姪子孫之習文藝者聽奏文資壬寅以延州金明縣都監内殿崇班閤門祇候李士彬為供備副庫使初西人㓂金明士彬與其弟士均率兵擊敗之斬首千餘級故有是命其立功將校並賜器幣遷補有差西人是屬羗或是趙徳明當考是日太白晝見丙午閱諸軍騎射於崇政殿辛亥錄繫囚壬子詔河北諸州軍酒稅務自有監臨官而轉運使復差官比校歲課務以侵民其罷之乙卯詔涇原路蕃落指揮將校嘗有戰功而物故者錄其子孫一人癸亥太后幸楚王元佐第視疾是日王薨上自臨奠輟視朝五日贈河中鳯翔牧兩府牧自元佐始追封齊王諡恭憲宗室子弟特給式假七日以鹵簿皷吹導至永安陪葬永熈陵是月磁州言蟲食桑六月庚午朔以宰臣王曽病瘡疹給假將理降詔存問甲戌幸玉清昭應宫及開寳寺祈雨丙子詔開封府諸縣决繫囚無或淹滯以近州皆雨而畿甸獨未雨故也丁丑雨詔西川維茂黎三州自今令轉運使提㸃刑獄舉本路官為知州明年二月戊寅詔閤門祇候老疾者與除南班官壬午提㸃開封府界公事張嵩等言畿縣雨足上覽奏甚恱謂輔臣曰比遣人近郊取苖稼視之而根葉滋茂此有秋之兆也先是太后大出金帛重修景徳寺遣内侍羅崇勲主之癸未命翰林學士蔡齊撰記宰相張知白因言按五行志宫室盛則有火災近者洞真夀寜觀相繼火此皆土木太盛之證也請自今罷諸不急營造以答天戒上納其言夀寕觀火在四月洞真宫火則不得其時東京記云天聖初當考張知白雖有是言上固然之未即行也本紀即於是日書罷諸營造之不急者恐誤矣丁亥賜河役卒衫襖詔翰林學士依大中祥符五年故事常一貟在院如假故次學士直天聖元年嘗詔隻日出宿以故事雙日鎻院隻日降麻故也至是中書言恐宣召不即至而有是詔翰林學士承㫖權判都省劉筠言京中百司私名猥多如定額有闕請先試書札送御史臺看詳方許收補餘悉罷之戊子詔從筠請庚寅同提㸃開封府界公事張君平言自畿至泗州往來舟船多為盜邀刼請凡兩驛増置捉賊使臣一貟而罷自京至楚州夾河巡檢從之辛卯淮南江浙荆湖制置發運副使文思使張綸兼權知泰州管勾修捍海堰㑹要在十月今從實録四年八月丁亥初修堰壬辰詔大兩省以上官依御札歲舉幕職州縣官五人秋七月辛丑賜秦州鹽官鎮被水民家錢三千米二斛壬寅詔自今大禮前已降約束而犯刼盜及官典受贓並論如律仍毋得禁奏聽裁先是知亳州馬亮言按律知有恩赦而故犯者不得以赦原朝廷毎於赦前下約束蓋欲申警貪盜之人令犯者禁奏聽裁及案下大理寺而法官復不詳律意乃言終是㑹赦因而多所寛貸頗為惠姦故降是詔癸卯詔樞宻直學士李及薛田趙稹龍圖閣直學士劉曄右諫議大夫姜遵舉太常博士以上曾任知州通判堪錢榖刑獄任使者各二人甲辰詔以冬至有事於南郊乙巳環州熟戸旺扎勒族故康州刺史羅阿子蘇都為新州刺史本族巡檢丙午邢州言蝗丁未禁停廢命官使臣過河西市牛馬庚戌詔以大暑自今不御前殿終月初王曽等言夏秋大旱毒氣中人此洪範所謂僭恒暘若也皆臣等輔政無狀以致厥咎上曰朕亦夙夜循省其變豈徒然哉當與卿等共修政事以答天戒爾甲寅趙善言蝗自邢州南來才二頃餘不食苖上謂輔臣曰但慮州郡所奏不實耳其遣官按視之速捕瘞以聞丙辰詔發丁夫三萬八千卒二萬一千緡錢五十萬塞滑州决河丁巳以馬軍副都指揮使彭睿為修河都部署内侍押班岑保正為鈐轄禮賓副使閻文應供備庫副使張君平並為都監詔京東轉運提㸃刑獄司察被水縣令佐老疾罷懦不勝任者以聞己未上以災異數見詔羣臣毋得因郊祀請加尊號時太后欲獨加尊號遣内侍諭輔臣輔臣力言不可太后從之乃别下書諭中外庚申輔臣列章引災異自劾乞從罷請詔不允賜汴口役卒緡錢丙寅詔三司將來南郊乗輿服御等物當雅飭者務從簡約南郊禮儀司劉筠言天聖二年南郊朝享玉清昭應宫景靈宫又宿齋於太廟一日之内陟降為勞請罷朝享玉清昭應宫俟郊祀畢行恭謝之禮從之八月戊辰朔命知制誥程琳往滑州祭告河辛未省三館秘閣都監一貟咸平元年十一月初命劉崇超監書籍天禧五年十二月又命皇甫維明同監更號勾當公事於是崇超卒特有是詔先是司天監主簿苖舜臣等嘗言土宿留参太白晝見詔日官同考定日官奏土宿留参順不相犯太白晝見日未過午舜臣等坐妄言災變被罰監察御史曹修古言日官所定希㫖恱上不足為信今罰舜臣等其事甚小然恐自此人人畏避佞媚取容以災為福天變不告取損至大禁中以翡翠羽為服玩詔市於南越修古以為重傷物命且真宗嘗禁採狨毛故事未逺宜罷之時方崇建塔廟議營金閤費不可勝計修古極陳其不可壬申修古出知歙州修古以臺官出典州必坐論諫不合也附𫝊太略正傳雖頗増益要亦不詳當尋他書檢正之癸酉以戸部副使兵部貟外郎王博文為賀契丹后生辰使六宅使王準副之甲戌置祁州同判一貟禁民間結社祠嶽瀆神私置刀楯旗旛之屬辛巳徙知天雄軍昭化節度使曹瑋知河陽瑋以疾自言也詔京東西河北災傷人戸免修河物料折科乙酉上謂輔臣曰先朝以司天監及測驗渾儀所凡奏災祥類隂相参合故更置翰林天文院以較得失比又令司天監兼領非先朝意也其罷之丙戍以翰林學士兼龍圗閣學士權知開封府陳堯咨為宿州觀察使知天雄軍樞宻直學士陳堯佐權知開封府堯咨自負其能冀速登用頗不快於執政者嘗有謗言達於上太后惑焉他日以問王曽等曽既具對且曰臣等職在弼諧敢不心存公正然䜛人罔極亦不可不察也太后猶未信曽曰是非曲直在於聽斷之審請以藥物諭之醫方謂藥有相使相反惡者而甘草為國老以其性能和衆藥故湯劑中不以寒温多用之而斑猫有毒若與衆藥同用必致殺人此其驗也太后大悟不數日堯咨有換官出鎮之命堯咨内不平上章固辭時太后嘗以雙日垂簾特用隻日召見敦諭之不得已乃拜受堯咨善射嘗取錢為的一發貫其中於兄弟間最為少文任氣節真宗嘗欲授以武職堯咨母不可乃止或謂太后此除實用真宗遺意也尋有詔堯咨遇契丹使過大名權位丞郎上及歲増公私錢百萬天雄城壁器械自契丹修好乆不治堯咨至並加完葺然須索煩擾多暴怒列軍士持大梃侍前吏民語不中意立至困仆堯咨讒謗事據言行錄百一編又云堯咨晚年以其兄堯佐妨已進用頗出怨言國史並不載或修史者隂有所庇盖蒲宗孟與堯咨實同州里也不然王氏父兄雅不喜堯咨故云爾當考又王㳂𫝊云知開封府陳堯咨判官張宗晦日嗜酒廢事㳂皆奏彈之亦當考壬辰甘州可汗王寳國伊嚕格勒遣使來貢方物九月己亥廢淄州東埠鐡冶度支貟外郎兼侍御史知雜事王鬷言方用兵夫塞决河而近郡比罹水旱之災物力凋弊不可重擾請罷中外土木之不急者從之賜秦州小洺門採造務卒緡錢庚子以吏部郎中知制誥石中立為契丹賀生辰使崇儀使石貽孫副之戸部判官職方貟外郎張保雍為正旦使崇儀副使孫繼鄴副之左正言直史館孔道輔為契丹后正旦使左侍禁閤門祇候馬崇副之癸卯遣知制誥程琳西上閤門使曹儀往滑州按視修河初詔欲増發丁夫二萬中書言調工已衆不可増發故遣琳等往度之召輔臣至崇政殿西廡觀孫奭講書各賜織成御飛白字圖乙巳詔京師轉運使張億自今五日一具修河次第以聞初李允則知雄州令州民張文質給為僧入契丹刺事嘗補契丹職官至是來歸詔補文質二班奉職潭州監當樞宻直學士李及言比歲天下濫度僧至有亡命不逞之人竄名其間請自今出家者須親屬詣在所召保官方聽係寺帳從之庚戍御崇政殿召輔臣閱龍衛神勇軍習戰陣遂命射第進補之陜西轉運司言同華等州旱虸蚄蟲食苖太常博士祕閣校理國史院編修官謝絳上䟽曰去年京師大水敗民廬舎河渠暴溢㡬冒城郭今年苦旱百姓疫死田榖焦槁秋成絶望此皆大異也按洪範京房易傳皆以為簡祭祀逆天時則水不潤下政令逆時水失其性則壊國邑傷稼穡顓事者如誅罰絶理則大水殺人欲徳不用茲謂張厥災荒上下皆蔽茲謂隔其咎旱天道指類示戒大要如此陛下夙夜勤苦思有以上塞時變固宜冊告殃咎變更理化下罪己之詔修順時之令宣羣言以導壅斥近倖以損隂而聖心優柔重在改作號令所發未聞有以當天心者夫風雨寒暑之於天時為大信也信不及於物澤不究於下則水旱為沴近日制命有信宿輙改適行遽止而欲風雨以時其可得乎天下之廣萬㡬之衆不出房闥豈能盡知而在廷之臣未聞被數刻之召吐片言之善朝夕左右非恩澤即佞倖上下皆蔽其應不虛昔兩漢日蝕地震水旱之變有䇿免三公以示戒懼陛下進用丞弼極一時之選而政道未茂天時未順豈大臣輔佐不明耶陛下信任不篤耶必若使之冝推心責成以極其効謂之不然則更選賢者比來奸邪者易進守道者數窮政出多門俗喜由徑聖心固欲盡得天下之賢能分職受事而宰相方考資進吏無所建白欲徳不用之應又可驗矣今陽驕莫解蟲孽漸熾河水妄行循依違之迹行尋常之政臣恐不足回靈意塞至戒古者榖不登則虧膳災屢至則降服凶年不塗塈願下詔引咎損大官之膳避路寢之朝許士大夫斥諱上聞譏切時病罷不急之役省無名之斂勿崇私恩更進直道宣徳流化以休息天下至誠動乎上大惠浹於下豈有時事之艱哉絳上䟽不得其時附見陜西言旱蝗後癸丑御史奏彈虞部貟外郎李文晟國子博士陳宗憲違詔押賜衣襖詔罷之仍以彈文牓朝堂太常禮院言奉詔詳定輔臣攝事宗廟而有私䘮者按唐貞元六年御史監察以開元禮凡有緦麻以上䘮不得饗廟因移文吏部奏曰禮諸侯絶周大夫絶緦麻所以殺旁親不敢廢大宗之祭事絶不祭者謂同宮未葬欲吉凶之不相黷也魏晉以降變而從權内衣縗服謂之䘮服假滿即吉謂之公除則事當復常江左虞潭商仲堪亦謂既葬公除不可以廢祭故其時公除者則行公祭蓋大夫不敢以家事廢王事也今私家之祭無廢者而公家之祭乃猶禁之請申明舊令遂詔凡有慘服既葬公除及聞䘮假滿者並許吉服赴宗廟之祭其同宫未葬雖公除者毋得與祭請如故事施行從之甲寅以龍圖閣學士兼侍講馮元同修國史乙卯命監察御史王㳂侍禁閤門祇候王濤往陜西路體量安撫丙辰詔滑州修河兵夫比多疾病其令醫官院遣醫分治之候罷役較其全失之數以聞戊午詔自今刑部詳覆官依大理寺詳斷檢法官歲滿與家便知縣一任囘與同判去年十一月丙寅己未祠部貟外郎知制誥程琳為諫議大夫權御史中丞宰相張知白最器琳當除命喜曰不辱吾筆矣琳上䟽請罷土木營造蠲被災郡縣逋租先是詔選能吏治畿縣太常博士漢陽張錫知東明始至令其下曰吾所治者三而已彊恃力富恃貲刑恃贖者吾所先也歲終遂以治迹聞樞宻直學士李及薦錫材堪御史上曰李及清謹人未嘗妄有所舉此可信也即命錫為監察御史壬戌詔陜西轉運司所部知縣縣令有不治者權選幕職州縣官代之以聞冬十月丁卯朔遂城縣令張餘慶換西頭供奉官餘慶因流内銓引對自陳素習武技又嘗捕冦有功上即命射引滿中的特擢之庚午詔河北災傷州軍舊倚閣秋稅聽明年輸之閤門言乾興初詔齊州防禦使允升等綴曹州觀察使徳雍班近又詔預燕則如閤門舊儀宗室與外朝防禦團練刺史只以官次同行而坐初無異儀上不欲宗室参外朝之列因詔宗室防禦使至刺史預燕上夀從逰幸與宗室觀察使重行而坐三司請留四川上供紬絹十萬於環慶等州博糴糧草從之辛未罷陜西預放青苗價錢詔河北忠烈宣勇等指揮年六十以上者聽自便太常博士直集賢院同知禮院王皥上所撰禮閣新編六十巻初天禧中同判太常禮院陳寛請編次本院所承詔敕其後不能就皥因取國初至乾興所下詔敕刪去重複類以五禮之目成書上之賜五品服皥曽弟也賜滑州修河役卒緡錢癸酉奉安真宗御容於慈孝寺崇政殿戊寅以開封府進士桑懌為衛南尉懌雍丘人有勇力善用劒及鐡簡嘗舉進士不中去逰汝潁間力田以自給汝旁諸縣多盜懌自請補耆長得往來察姦因召里中惡少年戒曰盜不可為吾不汝容也有頃里父子死未斂盜夜脫其衣去父不敢告官懌疑少年王姓者為之夜入其家得其衣而王未之知也明日見而問之曰爾許我不為盜今里中盜衣者非爾耶少年色動即推仆地縛之詰共盜者姓名盡送縣皆伏辜嘗之郟城遇尉出捕盜招懌飲酒與俱行至賊所藏處尉怯甚陽為不知者將去懌曰賊在此何之乎乃下馬格殺數人因盡縛之又聞襄城有盜十許人獨提劍以往殺數人盡縛其餘汝旁縣為之無盗京西轉運使奏其事特擢之懌遇人常祇畏若不自足其為人不甚長大言語如不出其口卒然遇之不知其健且勇也始居雍丘遭大水有粟二廩將載以舟見民走避水者遂棄其粟而載之得皆不死歲饑聚人共食其粟粟盡乃止雖舉進士而不甚知書然其所為多合道理類此國史桑懌傳並用歐陽修所為文據實録天聖五年十月懌初得衛南尉非郟城也今但從實録附傳亦誤以衛南為郟城蓋因歐陽文耳詔修河兵夫候功畢日其少壯願𨽻禁軍者聽之庚辰以講禮記徹燕近臣於崇政殿仍詔兩制及館閣官賦詩以進壬午遣知制誥徐奭往滑州祭告河判太常禮院孫奭言郊廟二舞失序請下有司考議於是學士承㫖劉筠等上議曰周人奏清廟以祀文王執競以祀武王漢髙帝文帝亦各有舞至唐有事太廟毎室樂歌異名蓋帝王功徳既殊舞亦隨變屬者有司不詳舊制奠獻止登歌而樂舞不作其失明甚請如舊制宗廟酌獻復用文舞皇帝還版位文舞退武舞入亞獻酌禮已武舞作至三獻已奠還位則止蓋廟室各頌功徳故文舞迎神後各奏逐室之舞郊祀則降神奏髙安之曲文舞已作及皇帝酌獻惟登歌奏禧安之樂而樂縣舞綴不作亞獻終獻仍用武舞有詔從之癸未内殿崇班閤門祇候劉文顯賈象之歐陽政耿懐忠並為右千牛衛將軍東頭供奉官閤門祇候蔡守琳陸承澤康仲甫並為右監門衛率府率致仕樞宻院言文顯等皆年踰七十猶貪祿在外而不自退也乙酉監修國史王曽言唐史官呉兢於實錄正史外錄太宗與羣臣對問之語為貞觀政要今欲采太祖太宗真宗實錄日歴時政起居注其間事迹不入正史者别為一書與正史並行從之荆湖北路轉運司言下溪州刺史彭儒猛死其子仕端知容州以名馬來獻請繼襲戊子命仕端知下溪州賜以袍帶還所獻馬賜滑州修河役卒緡錢翰林侍講學士孫奭言見行䘮服外祖卑於舅姨大功加於嫂叔其禮顛倒今錄開寳正禮五服年月一巻請下兩制禮院詳定學士承㫖劉筠等言奭所上五服制度皆應禮然其義簡奥世俗不能盡通今解之以就平易言兩相為服無所降殺舊皆言報者具載所為服之人其言周者本避唐諱今復為朞又節取假寜令附五服敕後以便有司而䘮服親踈隆殺之紀始有定制己丑詔國子監摹印頒天下壬辰醫官院上所鑄俞穴銅人式二詔一置醫官院一置相國寺先是上以鍼砭之法𫝊述不同俞穴稍差或害人命遂令醫官王惟一考明堂氣穴經絡之㑹鑄銅人式又纂集舊聞訂正訛謬為銅人鍼灸圖經至是上之因命翰林學士夏竦撰序摹印頒行賜諸州在七年閏二月今并書之癸巳詔陜西饑免流民所過渡錢南平王李公藴遣其驩州刺史李公顯來貢方物命公顯為叙州刺史靜海節度行軍司馬甲午上與皇太后幸御書院觀太宗真宗御書賜本院内臣待詔書藝器幣有差乙未詔川廣官在任物故者令所在遣人津置還鄉其家屬人給米日二升丙申滑州言塞决河畢是日旬休上與太后特御承明殿召輔臣諭曰河决累年一旦復故道皆卿等經畫力也王曽等再拜稱賀詔速第修河臣僚勞効以聞作靈順廟於新隄之側此據宋綬廟記乃十月事也是月翰林侍講學士刑部侍郎孫奭奏臣有孫男四人雍雄維雅即今並是右班殿直竊聞近敕今後文官只許奏䕃文資臣之四孫雖是條貫以前奏䕃其如尚屬㓜稚虛請俸錢幸處公朝實不遑息欲望並與改無料錢京官所冀克遵明詔不墜素風詔從之十一月丁酉朔名滑州新脩埽曰天臺埽以其近天臺山麓故也陜西體量安撫王㳂等言京兆府旱蝗乞減長安等四縣秋稅十之三咸陽等九縣十之二從之戊戍廢許州單鎮牧馬監己亥以河平宰臣率百官稱賀遂燕崇徳殿自天禧二年河决至是積九載乃復塞凡費芻藁千六百二十萬他費不與焉遣官告謝天地社稷宗廟諸陵命翰林學士章得象祭于河宋綬撰脩河記脩河部署馬軍副都指揮使保順節度使彭睿加武昌節度使右諫議大夫權三司使范雍加龍圖閣直學士知滑州右諌議大夫冦瑊加樞宻直學士凡督役者第遷官民經率配免秋稅十之三優卹災傷戸始役既興朝議以歲饑將復罷瑊言病民者特芻藁爾幸調率已集若積之經年則朽腐為棄物後復興功斂之是重困也乃詔訖役庚子命工部郎中唐肅内殿崇班閤門祇候白懐遵往河北路體量安撫壬寅工部郎中直昭文館燕肅請造指南車内侍盧道隆又上所創記里鼓車詔皆以其法下有司製之甲辰百官集尚書省受薦享景靈宫誓乙巳受享太廟誓丙午受合祭天地誓丁巳上謂輔臣曰百官三日受誓禮當然耶王曽等曰宫廟吿享皆縁郊祀之事止當受一誓爾今蓋循先朝舊制請俟他日釐正之辛亥朝饗景靈宫壬子饗太廟大禮使王曽言皇帝執圭被衮酌獻七室而每室奏樂章恐陟降為勞請節宫架之奏上曰三年一饗朕不敢憚勞也癸丑合祭天地於圜丘大赦賀皇太后於㑹慶殿丁巳恭謝玉清昭應宫壬戌錄故西京作坊使滑州鈐轄張君平子造為三班奉職遜達並為借職君平有吏幹尤明於水利自議塞河而朝廷未嘗不訪以便冝河既平君平且死論者惜之十二月辛未加恩百官賜定王元儼詔書不名甲戌内降劄子輔臣經南郊奏薦恩例外更與一子改官詔河東路強壯有物故及老疾者許本家别丁代役若無丁聽於本村别户選人補之戊寅濬滑州魚池埽減水河丁亥詔凡文武臣僚及宗室奏薦恩澤有受賂而冒為親戚者聽人告其得實者與一官不願官給錢五百千已奏薦者限半年自陳限外雖㑹赦不以原己丑左正言直史館孔道輔為左司諫龍圖閣待制時道輔使契丹猶未還也契丹燕使者優人以文宣王為戱道輔艴然徑出契丹主使主客者邀道輔還坐且令謝道輔正色曰中國與北朝通好以禮文相接今俳優之徒侮慢先聖而不之禁北朝之過也道輔何謝契丹君臣嘿然又酌大巵謂曰方天寒飲此可以致和氣道輔曰不和固無害既還言者以為生事且開爭端上問其故道輔曰契丹比為黒水所破勢甚蹙毎漢使至輙為侮慢若不校恐益易中國上然之道輔本𫝊云道輔受諌官之命即日論曹利用羅崇勲考之不合今移見七年十二月庚寅賜西頭供奉官從質絹百匹初從質為其兄從謹病割股肉療之上頗稱其孝友欲進以官王曽曰此閭巷細民之所為若奬及宗室則恐浸以成俗而不可禁故止賜縑而已從質惟忠子徳昭孫也兩朝史載從質割股事附𫝊無之又載從質請増置學官附傳亦無其詳具治平元年六月祕書監致仕胡旦復上其所撰演聖通論七十二巻唐乗七十巻五代史略四十三巻將帥要略五十三巻辛卯以旦子彤為將作監主簿仍詔襄州増旦月給米麥各三石實録於八年壬午巳書錄彤今又書不知何故或誤也止存其一壬辰契丹遣奉先軍節度使耶律寜衛尉少卿元化來賀太后正旦甲午契丹遣安東節度使耶律罕大理少卿王用保來賀正旦開封府言試諸寺觀童行合格者三百九十九人詔止度二百人是歲南郊肆赦中外以為丁謂將復還殿中侍御史陳琰上䟽曰亂常肆逆將而必誅左道懐姦有殺無赦丁謂因緣憸佞竊據公台賄賂苞苴盈於私室威權請謁行彼公朝引巫師妖術厭魅宫闈易神寢龍崗冀消王氣今禋柴展禮渙汗推恩必慮謂潛輸琛貨私結要權假息要荒冀移善地李徳裕止因朋黨不獲生還盧多遜曲事王藩卒無牽復請更不原赦上然之
