body:
  text: 續資治通鑑長編卷二百七十九宋李燾撰神宗熙寧九年十一月癸丑朔御史彭汝礪言夫潛神於一堂而欲以周知四海之逺制法於一日而欲施及萬世之久夫豈一耳目手足之力哉惟在盡人謀而已惟陛下益廣言路以通下情下情通則忠謀日至而利害之迹邪正之實不得隱於天聽矣蓋事繫於天下則當與天下共之用繫於衆人則當與衆人共之此非可以私也臣觀朝廷近嵗用言之道同之則衆譽之以竒材為知治體而果用之異之則衆愚之以為同俗為不知變而果廢之夫是非在理不在同異使同之而有所附焉則雖同乃所以為欺也異之而有所取焉則雖異乃所以為忠也夫上所好惡民之表也上惟同之為好則民亦以同為貴上惟異之為惡則人亦以異為賤人不能無賢不肖事不能無利害而人人雷同以可不可為一則將沮君子而為小人將飾罪而為功虛方欺而為實利方詐而為義末流之敝臣恐不可勝治矣惟陛下深為天下屈意聽納以答天變以同民憂朱本謂汝礪疏無施行合刪去今刋新本仍具載之樞密院言熙河駐泊兵嵗滿當以在京虎翼等指揮代之上批衛兵已少若於京師取足必恐日益朘减可在京步共止差十二指揮神勇宣武廣勇各一指揮虎翼九指揮詔給司農寺市易水利淤田司所計置澶定州大名府封樁糧十五萬石付河北西路轉運司以之軍糧故也詔减罷濬川司勾當公事官二十二員船一百八十五隻役兵更不添給錢米李公義令審官東院與合入差遣從都水監請也九月丙辰十月丁酉當考詔諸路末鹽並用見錢并鹽鈔支費三司舊缺借末鹽錢一百二萬七千餘貫以雜支錢撥還甲寅詔中書樞密院檢正檢詳官兼領差遣並罷工部郎中天章閣待制孫思恭卒乙卯出監主簿助教告敇六十八付廣南東路募人入資以助軍須詔開封府界保甲所養馬毋過五千匹朱本因時政記增此十月二十七日可考詔都市易司今日以前賒請錢物限外已輸本息者悉蠲其罰息本息未足者展半年諸路指揮到日以前並凖此詔茂州關津已建堡寨恐兵民有所倚恃或侵擾蕃部及出入賣買别致艱阻仰鈐轄司常約束撫馭務令漢蕃得所丙辰命知樞密院事馮京兼羣牧制置使詔都提舉市易司住行計置糯米收糴在京市上新米與已糴米中半支在京酒戶候支絶令人戶任便官私交易其熙寧五年四月二十五日指揮更不施行及俵糯米官仰發遣歸合屬去處時政記二月十六日可考丁巳詔熙河路已罷官自今不得奏乞增置其已係減員數尚在本路者仰疾速發遣時政記又罷都大提舉淤田司官時政記己未詔熙河路經略安撫司凡發軍馬如非警急並須計食調兵毋得與轉運司輒分彼我枉費軍儲致緩急闕誤詔臺諫官兼局不許見客處許見客從中丞鄧潤甫奏請也時政記庚申詔大理寺丞沈逵改一官與堂除論前任信州推官興置銀坑之勞也詔以王君萬權提舉熙河路蕃部往來照管順漢部族毋得别致驚擾俟其寧息許以功贖過時洮東羅斯結族下蕃部附果莊故也辛酉同州司士參軍魏道嚴自陳唐相鄭公元成後詔流內銓特免試與注官龍圖閣直學士孫固權知開封府固與王安石議事數不合故出守真定安石罷乃召還御史中丞鄧潤甫知制誥許將並兼直學士院候有正官日罷司勳員外郎都提舉市易司吕嘉問罷檢正中書户房公事賜紫章服兼提舉在京諸司庫務候二年三司副使闕與差詔省提舉三司帳司勾院磨勘催驅司官令提舉在京諸庫務司兼提舉既而又以祠部郎中直史館葉均提舉帳司勾院磨勘司不領於諸司庫務司癸亥詔三司近纍有臣僚言陜西鹽鈔法宜速講求利害條畫以聞此據㑹要及時政記明年二月二十五日戊申三司條上沈括自志司馬記聞或可附此志在此四月二十八日可考乙丑太常博士新知和州胡宗愈權提㸃河東路刑獄己巳冬至不視朝癸酉邠國大長公主進封魯國西作坊使嘉州團練使內侍押班王中正為昭宣使內侍副都知與一子轉官六宅使劉昌祚為皇城使榮州刺史西上閣門副使狄詠為客省副使候一年與轉西上閣門使西上閣門副使王光祖為引進副使六宅使賈昌言為內藏庫使供備庫副使史文璉遷一官內殿承制陳濟美遷三官張克明遷一官東頭供奉官馮補之遷二官以討納茂州蕃部且建堡寨以為邊防賞功也昌祚詠等皆中正所携以來者光祖為梓夔路鈐轄受命策應以兵三千度索橋歷流沙飛石之危㑹中正等破結總關次蕩篳篥溪諸族得級數千他物稱是遂軍結總關去茂州五十里石鼓村扼其半道而為賊所據中正患之召光祖與昌祚詠議光祖獨請行既叩石鼓賊恃嶮矢如雨光祖以鋭兵分四路登山出賊背以取其隘賊不意遽遁追至茶山迫夜親執旗鼓擁之以進追斬數百級墮崖谷死者無算遂招納餘族及營諸堡寨㑹中正等於茂州乃歸此據王光祖傳不知傳何所承受恐有粉飾合刪去更詳之緣光祖元非廉恥將也始中正至成都而茂州既與蕃部私誓當罷兵中正獨言受御前劄子有所討殺六月引兵自結總關入恭州乘蕃部不設備掩擊之斬首數百焚蕩族帳幾盡尋復與私誓七月又襲之隨復與私誓具奏以蔡延慶雖云私誓官軍至結總關蕃部輒渝約距戰故也時延慶已坐厝置乖方被責且去成都矣故事蕃部私誓當先輸抵兵求和物官司籍所掠人畜財物使歸之不在者增其賈然後輸誓牛羊豕棘耒耜各一乃縛劒門於誓場酋豪皆集人人引於劒門下過刺牛羊豕血歃之掘地為坎反縛羌婢坎中加耒耜及棘於上投一石擊婢以土埋之巫師詛云有違誓者當如此婢及中正私誓初不令輸抵兵求和等物亦不索所掠買羌婢以氊䝉之經宿而失中正又先過劒門蕃部皆輕之自是剽抄未嘗絶也此據司馬記聞又據吕陶十月二十二日奏云朝廷發兵處置經今半年泊至分屯之後才及數日邊釁復起王中正久留逺方無益於事伏乞召還只委本路帥臣任責自可了當有以見蕃部剽抄不絶非虛言也劉昌祚傳云九年茂州篳篥羌擾邊詔遣王中正總師入蜀令昌祚以麾下佐之兵出結總關賊據險官軍不得前昌祚從旁擊走之以功加皇城使榮州刺史昌祚時以秦鳯路都監為第四將張舜民志昌祚墓云九年茂州篳篥羌人撓邊上遣王中正總兵入蜀詔公以所部佐其行兵出結總關賊據險官軍不得渡公從旁出擊走之遂前又經茶山村方斬獲中正遽止之曰毋殺吾已招降公曰賊為計久師從中國逺來威令未信而彼不畏懾姑曰招降非兵家事居無幾詔㫖詰責招降狀將復厲兵深入公曰是謂殺降彼實非降而我招之既定而復加兵其名謂何録結總之功拜皇城使榮州刺史狄詠傳云威茂夷入寇師出結總關篳篥溪橋閣峻阻騎步難進詠冒矢石奮擊格鬬連日誅不順命者詠時為成都府利州路鈐轄詔知保霸二州董元仲董孝忠每年增俸給三十千以茂州蕃部作過有招誘安集之勞也詔安南運糧夫廣西轉運司合豫㸃集凖備調發今大兵已入界桂宜等州夫尚未足方奏稱逐州官吏弛慢乃是轉運司處置乖方令宣撫使司劾之其都大提舉趙卨令具析以聞明年七月乙亥卨落待制八月戊寅李平一蔡燁周沃皆坐責朱本移此詔入明年八月戊寅今依墨本提㸃廣南東路刑獄許懋言潮州海陽潮陽兩縣居民舍及田稼為颶風吹海潮所害上三等戶秋料役錢乞與倚閣四等以下戶秋料役錢依條取㫖放免外有丁米乞全免其合應副廣西軍須並與全免從之詔安南行營將士疾病者衆遣同知禮院王存禱南嶽遣中使齎香建祈福道場一月又詔安南諸軍及應募人病死者常賜外加賜絹二匹當得糧食亦併給其家詔自今每遇大禮從中書選官二員提㸃一行事務仍著為定式丁丑右侍禁看班祗候孟在為閣門祗候孟在當考知諫院黃履言國子監嵗賜錢萬有四千貫而本監有編敕經義充監三等錢存者亦及萬貫請并以創置房廊莊課候將來置及嵗賜錢仍别樁管充監用則嵗賜錢可罷從之韓縝等言與北人分畫瓦窑塢地界詔依水流南北分水嶺分畫此據密院時政記十一月二十五日事但恨不詳姑存之當考韓縝棄地七百里或緣此六月十八日上批當考蘇轍劾韓縝章有云縝昔奉使定契丹地界舉祖宗山河七百餘里以資敵國坐使中華之俗陷沒方外敵得乘高以瞰并代朝廷雖有徑兵良卒無所復施章在元祐元年閏二月甲午又云訪聞河東當日割地與遼邊民數千家墳墓田業皆入異域驅迫內徙哭聲振天至父老痛入骨髓而沿邊嶮要舉以資敵此乃萬世之深慮縝以一死為謝猶未塞責章在閏二月甲辰又吕陶章云云在閏二月末轍又有章在三月戊辰其論割地事尤詳詔三司諸路賣銅鉛錫錢相度兑發地逺者變易物貨並於市易務近界封樁戊寅侍御史周尹言天下諸路役法令民出錢官募人充役元指揮於數外留寬剩錢一分聞諸州縣嵗留寬剩錢過多蓋不能推原朝廷之意承望提舉司風㫖廣令民間出錢又有提舉司希求勞績或官使士庶妄陳利害减省役人除尅役錢而民間所出一切如舊致寬剩數漸倍多天下皆謂朝廷設法聚斂不無疑怨非特如此而已又州縣以役人日減公事日繁雖迫以嚴刑猶不能辦役人倉法太重募錢太輕無以自養不願就役上下失所公私共患臣近乞依舊令耆長管勾鄉村賊盜等事不差保正及户長雇稅更不論差甲頭皆偹助成法未䝉施行望檢㑹臣前奏令諸路州縣依先降免役條募耆户長及有不當過減役人並限定人數令逐月募錢有偹外其寬剩止留一分上毋厚斂下得樂輸三司使沈括亦言先兼兩浙察訪體量本路自行役法後鄉村及舊無役人多稱不便纍具利害乞减下戶役錢竊詳立法之意本欲與民均財惜力役重者不可不助無役者不可不使之助以臣愚見不若使無役者輸錢役重者受祿輕役自依徭法今州縣重役不過牙前耆戶長散從官之類牙錢即坊場河渡錢自可足用其餘於坊郭官戶女戶單丁寺觀之類因坊場河渡餘錢足以賦祿出錢之戶不多則州縣易為督斂重輕相補民力自均詔司農寺相度以聞明年七月丁巳括責當與此相關詔三司河北東路捕盜賞錢如定數不足許支封樁茶稅錢五千貫給之己卯侍御史周尹言成都路州縣戶口蕃息所産鹽食常不足梓䕫等路産鹽多而人食有餘自來不禁販易官私兩利聞昨成都府路轉運司以相度賣陵井鹽場遂止絶東川路鹽不入本路及閉本路卓筒井因閉井而失業者衆蓋欲鹽價增長令民願買陵井鹽場又因言利之臣奏請募人運解鹽入蜀賣之自陜西至成都二千里道險不能續運致成都路鹽踊貴斤為錢二百五六十米二斗才得鹽一斤而東川路鹽斤止七十境上小民持入西路即為禁地輒冒重刑嗜利茍活之人至以兵仗褁送販易驅人冒法如設陷穽嗷嗷衆口赴告無所豈宜聖世有此怨嗟臣欲乞放東川路鹽依舊入成都府路轉運司不得止絶勿閉卓筒井但禁此後毋得創開罷官運解鹽商販入川聽如舊所貴逺民飲食之間亦知朝廷仁恤詔三司速相度以聞其後詔官般解鹽依客人例出賣不得抑配商販聽如舊洮東安撫司言包順等領兵與果莊戰於多葉谷斬二百六十餘級詔經略司録其功賞之餘有功者速以狀聞舊紀於己卯日書果莊冦岷川皇城使包順敗之新紀不書壬午知岷州种諤破果莊於鐵城斬首八百餘級此據明年二月七日奏今年十一月三十日事先是果莊聚兵令丁谷脅屬羌瓜家族以叛諸部皆動搖諤出輕兵掩賊不􅊀擊敗之戮瓜家族叛黨二百餘人諸部乃定果莊又以兵三萬據鐡城收貝斯結羅斯結族以臨青唐諤知羌素持二觀勝負以為去就乃盡出兵二千未明抵鐡城賊不意漢兵至驚擾莫知所為諤縱兵擊之鼓譟乘城賊衆大潰斬首八百餘級果莊乃逺去岷境屬羌不敢復二此據范育墓銘十二月癸未朔命知制誥熊本與都水監河北轉運司官同相視疏濬汴河及衛州運河利害以聞先是大名府河每嵗夏水漲則自許家港溢出及秋水落還復故道皆在大堤之內范子淵既用濬川杷開直河受賞七年十二月十一日復欲求功乃令指使諷諸掃申大名府云今嵗河七分入許家港三分行故道恐河勢遂移乞牒濬川司用杷疏治府司從之㑹嵗旱港水所浸田不過萬頃子淵用杷不及一月而罷時熙寧八年也其明年子淵自言去嵗大河幾移賴濬川杷得復故道出民田數萬頃其督役官吏乞加酬奬事下都水監監司請優與酬奬如子淵所乞始王安石極稱濬川杷可用故力主子淵或言子淵於河上令指使分督役卒用杷疏治各置歷書其課曰某日於某掃濬若干步深若干尺其實水深則杷不能及底虛曵去來水淺則齒礙沙泥曵之不動卒乃反齒向上而曵之所書之課悉妄撰不可考驗也故天下皆指濬川杷為兒戲既久安石亦頗聞之及都水保奏子淵酬奬安石遂不信更下河北轉運安撫司保奏此據司馬記聞九年九月三日實録但有遣官覆驗濬河指揮不見下兩司保奏功狀按時政記十月十四日文彥博言不肯雷同保明即安撫司也實録既不書又不見轉運司果曾保明又記聞所稱安石下河北帥漕保明已而安石罷相於是彥博云云按時政記彥博云云在十月十四日安石罷相在十月二十三日記聞誤也今削去六字於是文彥博言子淵欺罔乞行覆驗詔詰子淵子淵言自熙寧六年置濬河司將前三年比較用杷功利共省諸掃物料計錢三十九萬緡及減差夫六百六十九萬詰子淵在十月丁酉但不載子淵云云今别出之上乃使蒲宗孟等於汴河用杷試其事宗孟等事在十月二十八日又遣本等往河北究實彥博又言衛州開舊沙河入御河行運衆皆知其有害無利亦乞委官相視而都水監言運河乞置雙閘倒放舟船實便與彥博所言皆不同故并以命本彥博言衛州開河二奏具十月末八月壬子九月丙辰丙寅十月丁酉十一月癸未朔十年五月庚午合參考元豐元年正月己巳所書彥博奏或可增入不必具載恐其散落姑附注此彥博言安撫司凖都水監牒保明范子淵乞酬奬濬川功效尋㸃檢所取到逐州縣地分河水漲溢及後來减退事狀即與范子淵所奏稍異難議雷同保明已别具本司奏訖臣詳濬川司所濬河事始末盡在水底深淺固難詳驗又只慿本司并所轄河掃使臣及都大提舉官供折保明至於所屬州縣亦望風畏憚不敢異議欲乞今後濬川司所濬河道别差不干礙公正敢言臣僚覆行定驗所貴不誤朝廷行賞范子淵所奏去年濬川退出分數地土今年夏末又却多淹浸了其去年用杷疏濬退出地少今年不曽用杷却退出地多顯是自因秋深河水減退故本司不敢扶同保明况濬川司所置官屬頗多占破人船不少别司官心知利害率不敢言言之必以為阻害功利故且緘默人情如此恐非朝廷之福臣今因都水監牒要保明方敢依實公言伏乞朝廷詳察又言臣昨奉朝㫖令保明濬川司疏濬過河事尋取責逐地分州縣的實事狀並皆不同及為疏濬過處其河水次年却依舊泛溢淹浸民田兼次年不曾用杷又亦水退即河水長落决不由杷之疏濬雖瀕河至愚之人悉皆曉知所以臣不敢雷同保明及為衛州創開運河不便亦具奏聞緣此事理備見水官不職枉費財力兼多是狂妄希賞只如所開運河云有五利其一曰綱運出汴對過沙河免涉大風河濤之險且汴口在河陽界內沙河口在衛州王供掃下自出汴口由黃河下水相去尚近百里豈是出汴對過沙河口在衛州西南德博在大名東北上下相去遼逺即與沙河水陸道路都不相干不知因何免得數百里大河之險只圖朝廷信聽遂興力役乞朝廷詰問都水監官即見虛實猶恐飾詐即乞將水監官所陳事狀付臣容臣子細開析聞奏臣自再到大召有都水監官輕妄擘畫河事甚多如欲决黃河大小吳掃地放水淤田及欲於嵬固下掃開直河并放清水如此等事猶賴定奪官力議罷之不爾即為害不細臣所以乞審擇水官望朝廷垂察詔自今市易務上界官吏嵗比較酬奬其提舉官依舊二年一取㫖麻檾竹蔑之類更不買甲申詔權三司使沈括知制誥熊本詳定重修編敇重修編敇所言勘㑹熙寧編敇昨來編修之時係兩制以上官詳定宰相提舉本所昨奉朝㫖重行編修今來雖有次第竊慮不曾經近上官詳定將來頒行於體未便伏乞依例差官詳定故有是詔此據中書時政記元豐七年三月六日書成乙酉寶文閣待制常秩權判西京留司御史臺許於潁州居住從所請也成都府學教授試國子四門助教楊韶送流內銓注判司主簿或尉茂州蕃部作過韶募勇敢士人從軍及招蕃部有勞故也丙戍安南招討司言廣源州僞觀察使劉紀率家屬并酋長降詔劉紀如因大兵壓境不得已出降并家屬護送赴闕始趙卨與郭逵言交賊怵於李尚吉李繼元之謀故叛乾德及其母今皆怨此兩人而以國聽阮洙洙每有懷服之意劉紀據廣源州申景福據甲峒皆擁强兵顧望橫山寨監押成卓故與洙景福相好欲使卓齎敇榜入賊招納逵不從大軍駐思明州先遣燕達將兵由太平寨入廣源州紀拒戰達破之紀初欲降而猶豫未决逵移檄諭諸洞聲言紀數以狀自陳决背交賊歸我約以三日出降果如期而至逵收衆五千餘人又得省民被略者三千人范祖禹墓志云逵次思明州逵以為廣源州咽吭之地兵甲精鋭不先取之則有腹背之患僞觀察使劉紀為賊謀主不禽紀則軍聲不振遣燕達往一戰克之拔其城紀出降詔司農寺置丞四員內一員通治三局餘三員并增主簿三員分治三局罷勾當公事官從判司農寺熊本請也本以勾當公事官所至輒用喜怒故奏罷之判江寧府王安石奏乞施田與蔣山太平興國寺充常住為其父母及子雱營辦功德從之此據時政記十二月四日事特存此可見安石晚益繆也戊子上批高麗僧三人見寓杭州天竺寺可令鈐轄司差指使一名乘驛引伴赴闕己丑以皇第六子生遣魏國公宗諤告於太廟又遣官告天地社稷諸陵以太牢報祀高禖十年十月庚子實録書永國公俊卒俊第三子哲宗第六子不應第三子尚無恙第六子生遂以元子之禮告天地恐年月有誤當考庚寅河東經略司上管勾機宜文字殿中丞趙咸根括打量代州界禁地頃畝數詔除給起移弓箭手外餘皆招置弓箭手御集七月二十八日差趙咸機宜判司農寺熊本言䝉朝㫖令張諤並送詳定鹽法文字付臣伏緣所修鹽法事干江淮八路瓦取㑹照應鹽課增虧賞罰之類係屬三司竊慮移文往復致有稽滯兼昨權三司使沈括曾往淮浙體量安撫措置鹽事乞就令括與臣同共詳定從之此據㑹要十二月八日事增入真宗貴妃沈氏薨詔許就殯其家明日車駕奠之輟視朝三日諡昭靜太皇太后皇太后為發哀成服辛卯度支員外郎祕閣校理檢正中書孔目房公事安燾代吕嘉問詳定間冗文字東京西路轉運司乞發錢五十萬緡糴軍糧詔賜坊場錢五萬緡監主簿告齊郎牒州助教敇總三十三為錢五萬緡癸巳安南招討司言廣源古農八細峒頭首儂士忠盧豹等乞降詔內有嘗歸明反覆之人令招討司選使臣押赴闕是日郭逵等舉兵出界賊屯决里隘逵遣張世矩攻之賊以象拒戰逵使强弩射之以巨刀斬象鼻象却走自踐其軍大兵乘之賊潰去乘勝拔機榔縣别將曲珍又攻拔門州溪峒悉降十二月十一日出界據㑹要餘據郭逵墓銘及本傳趙卨初與逵議以為逺度不如親見欲先馳至桂州乘兵形未動先撫集兩江峒丁擇拳勇啖以利使招徠携二隳其腹心然後以大兵繼之則覆巢蕩穴為力甚易與宿師瘴野玩寇養賊智相萬也逵不聽留思明州慿祥峒踰七旬乃發此據趙卨墓志留思明州七旬與郭逵傳不同當考范祖禹志逵墓云朝廷初降敇榜諭溪洞逵以蠻夷不知文告之辭乃直陳八事請散榜郡縣溪洞門州賊將黃金滿岑慶賔來降據御集五月十九日湖北漕孫桷奏門州黃金滿等欲歸順又日録八月十七日有說諭黃金滿事恐黃金滿來降必在八月或九月間然實録無黃金滿事但於十二月十二日書廣源古農八細峒頭首儂士忠盧豹乞降或黃金滿等即在其間墓志既稱黃金滿來降人稱攻拔門州豈有既來降而又攻拔之恐黃金滿但遣人通欵不曽身到軍前據今郭逵家所録征南一宗文字亦可證黃金滿但乞降耳非來降也又按卜年四月二十八日趙卨云黃金滿𨗳苖履過富江然則攻拔門州黃金滿始降志亦非誤高陽關路走馬承受王延慶言北人賑濟兩屬戶上批北人忽爾逾常賑恤兩屬之民意必别有所在可嚴責雄州及緣邊安撫司委刺事人鉤測其端以聞甲午上批聞德州界强盜數十發滄州界有軍賊號康太保者結集逋逃近百餘人往來京東河北將一年劫略財物决刺良民子弟為兵村保畏懼讐害不敢告官慮更糾合人衆令監司安撫司具析不申奏因依仍選募兵分部追討屯田員外郎權知邵州趙楊為荆湖南路轉運判官兼提舉常平事六月八日蔡燁云云與此相關詔京東西新置諸馬軍每指揮選少壯輕捷四十人押隊使臣一員就教場早暮教習人日給錢三十上批諸路提舉管勾常平官自來未有明降著令畫一職守致轄下官司不知適從凡有舉動輒與轉運司一例申禀或非本管職事越次受理亦有聞奏者上下勞弊宜參詳前後指揮以聞於是詔常平錢穀莊産戶絶田土保甲義勇農田水利差役坊場河渡委提舉司專管勾轉運使副判官兼領其河渠非為農田興修者依舊屬提㸃刑獄司權御史中丞鄧潤甫言河北京東福建等路盜賊竊發甚衆往往殺戮人民焚蕩廬舍甚者至於劫束官史攻略縣鎮詔書督捕連年不能解雖以纍嵗荒旱穀價翔貴而無賴小人得以連結黨與猖狂恣行然亦由諸縣弓手衰弱不振不足以制盜臣伏見舊制弓手大縣百四十人其次百人少者不减七八十人名為一人充役然遇督捕彊寇則餘夫盡起鄉黨親戚既為之耳目伺察而人徒之衆氣勢之倍又足以制勝荷戈轉鬬奮不顧難何也以門戶徭役所在故也如此故郡縣之間盜發輒得國家所以太平百年內外無患人安故鄉而不敢輕去者以制盜有此具也今自河北等五路諸縣弓手多者三十人其次二十人又其次十五人則氣勢之衰弱不振已可知矣其餘上畨保甲義勇又半月一易彼懷區區苟且之心徼幸旬日罷去而欲使之與狂冦爭一旦之命其理固已難矣若其他路分裁减弓手亦有過多處臣恐盜賊滋長未能撲滅夫為國家計當防微杜漸不可以忽昔漢孝武時縣官多故兵旱相乘民起為盜惟其不稍禁遂至於依阻山澤吏不能禽浸淫日廣戰鬬死亡不可勝數而繡衣直指之屬出矣則制盜少術不以漸也臣欲乞下諸路監司量縣之大小盜之疏數增募弓手使其勢足以勝盜而盜有畏憚則四方之民䝉被德澤矣送司農寺相度以聞詔昭宣使入內押班李憲乘驛計議秦鳯熙河路經略司措置邊事以洮東安撫司言果莊領兵入斯納家地未知營寨所在故也翌日詔憲至軍前應將官等並聽憲指揮十九日言者論奏詔川南䕫州路轉運司元應募往安南减下義軍其借過今年青苗貸糧展限一季其往茂州救應并南平軍防托即與倚閣聽來嵗秋收送納詔罷河北同屯田制置使閻士良差文思使謝禹圭為高陽關都監兼河北屯田司都監乙未詔河東地寒九月內許抄劄不能自存之人自十月一日起支米豆至次年二月終住給如額定米豆有剩即盡數支至三月終丙申知太原府韓絳言詢問民間疾苦其大者有三一曰鹽食味之所急也今立法使人人自買於官場則貧下之人去官場逺者勢不能冒祁寒暑雨朝夕奔走遂至於無以養父母畜妻子下則駝與羊土産也家家資以為利非鹽不活故冒法者衆徒罪日報而不能止况私鹽味甘而易得是肯畏刑而不販鬻乎比來本路盜賊持梃成羣竊恐東南盜賊之患將移於河東矣建議者本欲籠利以助經費苟以價直步乘及告捕償錢計之所得無幾又舊法以鹽鈔易緣邊軍儲今則鹽錢散在內地邊廩頗耗但聞殘民未見國富也二曰鐵錢盜鑄者廣濫雜而不可除貧民尤被其害蓋貧民者急於日求之贏所賣之直良錢不過五分豈暇擇之其買於坐賈則賈多豪而不汲汲於速售必擇去其濫者所失率四五分故貧者日益困也三曰和糴一路之人誅剝嵗久匱之已極前後為朝廷言者衆矣幸遇陛下哀之詔臣等講求而議者尚以邊儲為重弗肯閔恤臣坐見一方之人勞身苦體日夜竭力於田畝山田多而沃土少繼有水旱則如前嵗易子而食可不痛哉本道北距强敵西接黠羌今其政大弊如此使民樂嵗不免於凍餒而愁歎異乎人和之理雖有天時地利豈足賴哉萬一二敵投隙而渝盟將用其民以禦之孰肯為陛下盡力死邪臣竊嘗思之除害興利則鹽法宜若河北之通商或如江淮等路弛茶禁之策則刑省利溥矣錢法宜若陜西鑄錢本重而模精則姦盜無以牟利仍交子相權以斂濫惡則貧者不失其本矣和糴宜於元數减放三分罷支錢布則所得已厚於前仍寬其支移之苦則實惠皆及於本戶遇災傷十七以上亦與蠲免又為别其貧富等第均定合約之數則編戶莫不樂輸矣兼勘㑹邊儲惟河外三州榖土寡而蓄聚為難其保德以東五州軍計置不至艱甚况本路鐵礦石炭足以鼓鑄公錢不可濫又以交子灌輸通流并用鹽以役商賈則邊兵决可足食且紓疲俗之大患兹事若止一端則窒閡者繁惟並舉而行之則效速見矣欲乞陛下精選才臣令與臣即監司置局於太原講求利害具可行事狀以聞所冀取信朝廷不為橫議所沮仍願假臣數年之期委以推行之權庶幾終始成就詔三司相度利害以聞十年九月十八日絳又乞遣才臣置局議和糴元豐元年閏正月一日陳安石云云丁酉詔省開封府十二縣給納官止令縣丞兼管常平錢穀從提㸃府界諸縣鎮沈希顔奏請也又詔李憲賑恤岷州界為果莊所脅蕃部被賊災蕩者量給蓋屋錢即嘗為其脅從復能歸順者釋其罪安存令復舊己亥右領軍大將軍駙馬都尉曹詩為成州團練使廣南西路轉運副使苗時中言雍州行司言運糧夫不足見親督丁夫應副軍須其州縣官吏㢮慢乞先戒勵詔大軍頓峒日久止緣丁夫不足元數致稽軍事其州縣當職官令廣西轉運司案比元拋數不及七分處州官追一官縣官追兩官無官可追即停其俸各且令在任縣官枷項監督並劾罪以聞遣太常丞王子韶折納永興秦鳯兩路缺負七月二十五日子韶與黃亷同受命今專委子韶當考新本削去或從新本更詳之庚子河東路經略司真定府路安撫司乞以代州根括地招弓箭手於寶興軍界置堡把截及於北寨界增橫巡兵及以本寨見佃禁山地界義勇保甲皆為弓箭手詔真定府路安撫司北寨地止以義勇保甲分畨巡防把截所乞增橫巡兵依奏其河東寶興軍瓶形寨更不立堡鋪令弓箭手擇利住坐耕種分地把截詔岷州擊賊師捷令种諤更嚴重務養士氣毋得乘勝輕進詔秦鳯熙河路經略司與轉運司同議别打撲錢酌中數以聞務令商旅通行逐司言秦鳯路宜依舊外熙河路商貨已經秦鳯路打撲錢若本路再收顯見重疊乞於秦鳯路所收錢數每色立為三分內收二分打撲如奏後經制邊防財用司言熙河路客旅雖經秦鳯打撲緣物貨至極邊獲利尤厚昨以闕糧草許入中斛㪷不收打撲客旅因緣夾帶興販乞依秦鳯路例收打撲錢詔斛㪷更不收打撲錢外餘從之又詔自今寬剩役錢并買撲坊場等錢更不給役人嵗終具羡數申司農寺餘應係常平司物常留一半又詔廣西轉運司運糧丁夫如州縣㸃集起發人足止是部夫官不能鈐束致走失藏避三分以上故作注滯並止坐部夫官依今月己亥縣官例施行其差發夫官更不坐罪辛丑御史中丞鄧潤甫御史周尹蔡承禧彭汝礪言伏見朝廷以熙河路果莊為冦遣內侍省押班李憲往以秦鳯熙河路計議措置邊事司為名中外之論皆謂憲雖名為計議措置邊事而軍前諸將皆受憲節制其實大帥然自詩書以降迄於秦漢魏晉周隋上下數千載間不聞有以中人為將帥者此其故何也勢有所不便也蓋有功則負恃驕恣陵轢公卿何所忌憚無功則挫損國威傳笑四方非細事也唐自睿宗以前未嘗以將帥屬中人至明皇承平日久志大事奢稍委近習㑹安南蠻渠梅叔鸞叛而楊思朂請行遂許之然猶以宗楚客為大都護及覃行章亂黔中始以思朂為招討使雖有禽滅叛逆之功而唐之禍萌於此矣及代宗用魚朝恩拒史思明討僕固瑒而恃功擅命幾危社稷倚元載除之寒心者數月以程元振判元帥行軍司馬權震天下元勳故老皆見斥逐洎吐蕃內侵集天下兵無隻輪入關者此皆已然之效也憲宗時王承宗叛以吐突承璀為行營招討處置使諫官李鄘許孟容吕元膺段平仲白居易等衆對延英謂古無中人位大帥恐為四方笑乃更為招討宣慰使而承璀卒以無功輕謀弊賦得罪及後世區區踵其故迹而唐之患有不可勝言者其源蓋起於開元也今陛下更易百度未嘗不以先王為法而忽降詔命以中人為帥搢紳士大夫皆莫知所謂夫以陛下之仁聖神武駕馭豪傑雖憲百輩臣等知其無能為也然陛下獨不長念卻慮為萬世之計乎使後世沿襲故迹狃以為常進用中人掌握兵柄則天下之患又將有不可勝言者矣陛下其忍襲開元故迹而忘天下之患乎方今雖乏人然文武之士布滿中外豈無一人可以任陛下邊事憲出入近密荷國寵榮詔下之日大臣不敢言小臣不敢議臣等代匱憲府以言為職故敢盡其狂愚又言自開元以來使中人為將亦或成功然其患常在於後今陛下使憲將兵功之成否非臣等所能豫料然以往事鑒之其必有害况陛下所行皆將為法於萬世豈可使國史所書以中人將兵自陛下始藝祖朝中人官不過副使至於今日未嘗有專為將帥軍前將校皆受其約束者乞早賜罷又言陛下既數假寵於憲則其類莫不畏向而服從之憲功益高賞不可不進及其盛而抑之則其中必不自滿以柔媚之性日習於侈大挾不自厭滿之心得所信嚮服從之類以事陛下於中此不可以不戒也而臣等區區誠知過計然反覆思念自古未嘗有以兵寄奄人而不亂者夫天下之事忽於其始則其終也必有害陛下以一方之事屬於憲後以為例則兵權必歸焉故臣等以謂果莊之患小用憲之患大憲功不成其禍小成功其禍大昔漢唐藝祖皆以兵定天下方其初中國分析為八九世方乏才人不知學而祖宗震起於擾攘之中所以安寧者亦自多士而已未聞此屬有與焉今果莊狗偷鼠盜非可畏之與國也陛下何重於憲而忽忘天下之士解功臣之體以兆後世之患哉承禧又言臣竊惟陛下通知古今明曉治體非不知中人之出為害政中人之柄兵不可訓後世而必欲使之者非以其便敏能適於指令歟非以其捷給能有以應對歟非以在熙河曾經行伍之間乎此聖意孜孜果於用之欲以救生民一時之患而至於忘其可患之逺者臣固以仰伏陛下垂意於一世之功矣然而便敏似才捷給似智又曽經行伍必以為有功臣請言便敏之害政者夫中人之出務於集事而不度事之淺深一槩以束下為能既居兩路經略使之間則必以陛下之威使兩路經略使不敢議其可否縱事有未便則無敢言者矣無敢言者則雖有害於邊防陛下無由而聞矣臣請言捷給之害於事者陛下深居法宮之中羣臣進見以時而憲日侍左右羣臣日踈而憲日親親莫如憲日侍左右莫如憲其為謀固已易於信從而又嘗歷熙河其性慧巧必能有以投陛下之意其所言於邊邦有害則陛下雖聖明能悉知之乎憲之處熙河謂之有功也豈憲之獨能然哉上有大帥下有偏禆熙河軍吏以陛下俾親信之出也有功必推憲其無功敢議憲以上聞乎故憲能纍積以至此豈憲之必能然哉然而以陛下之明聖必有以昭亮而未肯遽易者豈非出此乎臣有一言望陛下少垂清光以思之復之熟之陛下今命諸路之帥都副總管以為可以任邊矣今差將官正副七十餘人以為可以將領矣至於小郡列堡而以材武名者不可勝數小有事宜豈無一人可任者至以中人為專帥而臨制兩路雖曰計議又帶措置之名四夷聞之豈不輕視乎况今秦鳳熙河之雕敝常奉自已難給而又以一二十指揮之兵以食之鬼章者如聞潜已遁去臣恐憲慮無功又别生邊事以邀覬伏望聖慮特回德音以慰安中外天下幸甚凡今得侍左右皆有以將順而臣獨仰拂宸㫖豈臣心之所欲哉惟陛下思之皆不聽墨本云不聽朱本云潤甫等言甚切上皆優容之今從墨本并增入承禧第三章按承禧奏議論憲凡三章與實録所載不同今但掇其第三章入此實録所載三章非潤甫則尹及汝礪也汝礪别有論憲章乃是十年五月後事尹及潤甫奏議皆未見須搜訪二家書考此三章是誰作各出其名乃為詳盡曾肇作彭汝礪墓銘云汝礪論李憲神宗初若不懌出語詰責汝礪拱立不動伺間復言帝卒為之改容是日殿庭觀者始皆為汝礪懼已而皆歎服蘇頌作承禧墓銘見八年十二月十三日癸卯詔録廣南西路提㸃刑獄職方員外郎宋球一子郊社齊郎以球因相度欽亷州修城瘴死於道也是日郭逵等次富良江此據㑹要初逵遣燕達先破廣源復還永平與大兵㑹趙卨以為廣源間道距交州十二驛趣利掩擊出其不意川途並進三路致討勢必分潰逵不從廣源既降達議還赴逵約時下連古弄洞敗兵猶萬餘衆達恐去則彼必來襲乃留曲珍將輕騎三千陽言由二洞入交州縱二蠻俘使歸賊果自守不敢動賊始設伏於夾口隘以待我師逵知之乃由間道兜頂嶺以進遂抵富良江未至交州三十里賊艤戰艦四百餘艘於江南岸我師不能濟欲戰弗得逹請示弱以誘賊賊果輕我師數萬衆鼓譟逆戰前軍不利逵率親兵當之達等繼進賊少却叱騎將張世矩王慜合鬬諸伏盡發賊大敗蹙入江水者不可勝數水為之三日不流殺其大將洪真太子禽左郎將阮根乾德懼奉表詣軍門乞降納蘇茂思琅門諒廣源五州之地仍歸所掠子女於是逵與諸將議帥大兵濟江諸將曰九軍食盡矣凡兵之在行者十萬夫二十餘萬冒暑涉瘴死亡過半存者皆病瘁逵曰吾不能覆賊巢俘乾德以報朝廷天也願以一身活十餘萬人命乃班師以乾德降表聞約交人聽㫖此據曲珍燕達趙卨郭逵傳及逵卨達墓銘刪修逵墓銘云賊以夾口之計不及施亟以戰艦數百艘先趨富良壁岸下紿告曰和斌楊從先且至軍中皆喜既至則交人數萬鼓譟薄官軍前軍不利按墓銘所稱紿告不知謂誰其語殊不了了今不取逵銘范祖禹作卨銘范百祿作達銘曾布作甲辰翰林學士兵部員外郎兼侍讀陳繹落翰林學士兼侍讀以本官知制誥知滁州太子中允直集賢院兼直舍人院張諤落直集賢院直舍人院勒停先是開封府鞫司農寺吏劉道冲盜用官錢寺吏杜亮常就道冲私貸官錢亮當補官懼罪告諤促道冲案諤以簡與繹繹呼獄吏諭意遣見諤具道獄事不俟㑹問即區斷出其重罪杜亮補授三班奉職詔提舉諸司庫務司鞫之繹纍問不伏仍停其俸及人從就劾之獄具諤又報上不以實故有是責杜亮勒停編管隨州知制誥熊本封還辭頭言繹不當猶處侍從職詔繹落知制誥為集賢院學士後本入對上曰近臣盡規當知無不言也八月戊中置獄時政記實録具載熊本章今止從實録詔安南募武勇兵罷日如願充軍即招刺名曰强勇營於潭桂雍交州每四百人為一指揮請給例物視陜西武衛詔自今頒降條貫並付刑部雕印行下鄜延路經略安撫司言蕃漢弓箭手借助斛㪷乞依州縣常平法如元散斛㪷却納本色者每名息不過二㪷并粗細色與散時不同仍許依倉例細折送納從之詔三司司農寺諸路及府界積年缺負除已有倚閣分料展限催理去處外餘並據見缺每缺五料與展半年送納料次雖多不得過二年如所缺殘零數目不多及四料以下相度减作近限送納了足其見缺二十料以上內有全料數多委實二年未能了納者仍奏取㫖詔司農寺常平等敇就差本寺丞簿編修主判看詳乙巳上批熙河路見今事宜雖是緊急其那移軍馬宜令經略司更切酌度糧食無令轉運司應副艱難致害軍事丁未遼主遣左監門衛上將軍耶律運西上閣門使李逵來賀正旦戊申提㸃荆湖南路刑獄朱初平言大吉洞楊昌滿黃漢栁神田團楊光錢絹腸團楊昌富梅口團黃通髙金袍洞楊光普六人乞歸明皆團洞首領事力足以使衆乞並補下班殿侍從之詔應催羣牧司牧地租課逐縣令佐隨稅限别作一項催納任滿别無拖缺本州保明酬奬如限滿不足依缺稅條施行庚戌詔果莊隆吉卜驅率蕃部為冦使諸族帳不得安居諸人及生熟蕃部得果莊首來獻授左藏庫使賞錢五千緡與本族巡檢使得隆吉卜授東頭供奉官賞錢三千緡與本族巡檢並依舊官給俸如生得果莊隆吉卜賞格外更與優奬果莊隆吉卜如能悔過歸順官賞亦如之令熙河路經略司榜諭隆吉卜已見五月十二日即茂州汶川縣置威戎軍使及置鎮羌寨結總關是嵗宗室子賜名授官者五十七人斷大辟七百五十八人詔環慶寨戶强人弓手如禁軍法上兵籍𨽻於馬軍司其廪給視中禁軍此據兵志第二卷熙寧九年事今附年末
