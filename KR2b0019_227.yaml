body:
  text: 續資治通鑑長編卷二百二十三宋李燾撰神宗熙寧四年五月乙酉朔初御文德殿視朝上批邠州等處駐兵已差三將專領訓練既欲為精鋭破賊之軍須督責所差將官嚴切教習量賜金帛使賞激士衆仍詔曽公亮專提舉三將訓練遇有邉事須增兵䇿應即審度事勢遣兵將往事定抽回此段更參考四月七日所書丙戌司勳郎中權户部副使張景憲為集賢殿修撰河東轉運司上謂景憲曰河東凋敝卿當出領使事故有是命環慶路經略使王廣淵言夏國韋州監軍司牒環州欲依舊通和環州與之回答鄜延趙卨亦奏西人至綏德城與知城折克雋相見言國主欲得綏州如舊樞密院言西人欵塞達意前此惟在延州順寧寨今若諸處城寨各與之語恐應答差誤有失事機且謂朝廷速欲開納啓其驕慢欲令趙卨委折克雋候其再至語之如必欲通意須往順寧寨依故例與軍北巡檢商量轉報上牙當有處分從之右諫議大夫提舉崇福宫吕誨致仕誨言臣本無宿疾偶值醫者用術乖方殊不知脉候有虛實隂陽有逆順診察有標本治療有後先妄投湯劑率任情意差之指下禍延四支䆮成風痺遂艱行步非秪憚􅏓盩之苦又將虞心腹之變勢己及此為之奈何雖然一身之微固未足恤其如九族之託良以為憂是思逃祿以偷生不俟引年而還政蓋以身疾諭朝政也誨病亟手書屬司馬光為墓銘光往省之至則目且瞑光呼曰更有以見屬乎誨張目强視曰天下事尚可為君實勉之遂卒誨卒在十日甲午今并書丁亥太子中允集賢校理直舍人院編修中書條例檢正五房公事曽布兼詳定編敕四月八日都檢正戊子罷陜西諸路提舉義勇官委本屬州縣依舊條分畨教閲遇起教日監司提舉初陜西宣撫司奏辟官八員分總諸路義勇人以為煩擾而無補曽公亮出鎮永興入對日首以為言故罷之三年十月十八日差八人提舉釋鄜延路都監燕達罪初朝議以种諤築婁城去綏德城百餘里偏梁險狹艱於糧道城中無井泉故遣李評張景憲等往視之未至而撫寧陷婁城孤絶度終不可守乃命趙卨速棄之卨遣達以兵即於婁城援取戍卒軍資輜重以歸賊邀官軍且戰且所失亡多上以其孤軍深入其所完亦不為少故釋其罪同勾當開封府司録司檢校庫吳安持言本庫檢校孤幼財物月給錢嵗給衣逮及長成或至罄竭不足以推廣朝廷愛民之本意乞以見寄金銀見錢依常平倉法貸人令入抵當出息以給孤幼詔千緡以下如所奏施行安持已見三年七月己丑翰林侍讀學士右諫議大夫知汝州王陶判南京留司御史臺陶初乞致仕上不許遣中使撫問固以病乞留臺許之草澤程義路為安吉縣主簿同相度檢計開封府界溝河程義路前己見八月二十七日又見環慶路經略使王廣淵言西人乞降問罪詔書方敢進狀罪表上批西人見來順寧寨求和宜令環慶州不須遣人往問及聞近日輒便放行和市投來蕃部例各於界首叫呼西人令來交割或即逐回或遂殺之頓作通和次第頗為虜所窺遂下詔戒飭焉辛卯太子中允崇文殿校書范育復為光祿寺丞知韓城縣育自光祿寺丞為御史故遷中允以言李定罷御史為校書既而又請與林旦薛昌朝同貶先是育言心術者為治之本也今不務此而專欲以刑賞驅民此天下所以未孚也上謂王安石曰人主不用心術何由致治安石曰有為固由心術但術有廣狹逺近功業大小亦從此分上曰育盛稱張載程皓兄弟以為有道君子乞詔還此何也安石曰檢正髙論不遜及至中書乃云未得劄子故未能就職馮京曰育畏繳敕得罪耳安石曰觀育所論彼豈畏繳敕得罪乎遂從所請而有是命楊氏編年云是日司農寺以差役法頒天下案御集六月二十二日中書門下奏司農寺奏行出錢免役之法上批內除以斛㪷折雇直不可外餘可然則五月七日必未頒下編年誤也兩浙科錢數用日録却已在四月二十七日更詳之本紀在十月壬子王安石又言王廣淵兵變之後恐姑息宜手敕戒諭當安其反側誅其驕慢犯令者上曰如此固善第廣淵智不及此戒諭何補安石曰廣淵亦不至全不曉事陛下丁寧戒敕或尚能思慮因論兵法愛而不能令譬如驕子不可用上曰治國亦若是也癸巳上與王安石論租庸調法善之安石曰此法近於井田後世立事粗得先王遺意則無不善今亦無不可為者顧難以速成爾上問其故安石對曰今百姓占田或連阡陌顧不可奪之使如租庸調法授田有限然世主誠能知天下利害以其所謂害者制法而加於兼并之人則人自不敢保過限之田以其所謂利者制法而加於力耕之人則人自勸於力耕而授田不能過限然此須漸乃能成法夫人主誠能知利害之權因以好惡加之則所好何患人之不從所惡何患人之不避然利害之情難識非學問不足以盡之流俗之人罕能學問故多不識利害之情而於君子立法之意有所不思而好為異論若人主無道以揆之則必為異議衆多所奪雖有善法何由而立哉此已上未見日録所載今因安石論三不樂日録在五月癸巳附見上曰府兵與租庸調法相須安石對曰今義勇土軍上畨供役既有廩給則無貧富皆可以入衛出戍雖未有租庸調法亦可為第義勇以良民為之當以禮義奬養今皆倒置涅其手背人不樂一也教閲靡費人不樂二也又使之運糧人不樂三也近更驅之就敵橫被殺戮尤使人憚為之馮京曰義勇近亦有以挽强得試推恩者安石曰挽强以力有分限茍力不足則自絶于進取矣是朝廷有推恩之濫而初非勸奬使人趨武事也今措置義勇皆當及此使害在于不為義勇而利在于為義勇人以得籍名于義勇為幸至于以武藝推恩隨人材之髙下使咸有幸得之心則俗可變而衆技可成也臣願擇其鄉閭豪傑為之將校稍加奬拔則人自悅服矧今募兵為宿衛有積官至刺史以上者移此與彼固無不可况此不至如此費官祿已足使人樂為之陛下誠能審擇近臣皆有政事之材異時可使分將此等軍今募兵出于無賴之人尚可為軍廂主則近臣以上豈不足此輩此乃先王成法社稷之長計也上極以為然此據兵志第二卷以為保甲事但自今皆倒置以下至衆技可成也日録係之四年五月九日又上曰府兵與租庸調云云至當以禮義奬養己附二年閏十一月十九日文臣願擇其鄉閭云云上以為然亦已附閏十一月十九日惟上嘗論租庸調法至何由而立哉未有所附今即附此年五月九日餘並兩存之蓋安石欲變宿衛法其言不一而足也乙未權鹽鐡副使潘宿權户部副使御史中丞楊繪言宿非材以兵部郎中賈昌衡代之權户部副使李夀朋權鹽鐡副使昌衡前為兩浙路轉運使朝廷方更法度核吏治而昌衡數以利害聞上因中使至浙諭昌衡曰前後論奏具見忠益於是召用之御史劉摯言昌衡在兩浙前坐失按舉杭州明州守臣自轉運使降為副使乃緣發運司以均輸奏留昌衡今未及一年遽此召用中外疑怪乞行寢罷不從御史中丞楊繪言非不知助役之法乃陛下閔差役之不均欲平一之使民宅于大均之域或有羡餘即以待水旱之嵗免取于民此雖堯舜之用心何以臻此然聞幹其任者惟務斂之多而行之峻致天下不盡曉朝廷之意將以為率其剩者而官取之此不可以不言也兩浙提㸃刑獄王庭老提舉常平倉張靚科兩浙一路役錢至七十萬至有一户出三百千民皆謂供一嵗役錢之外剩數幾半雖司農寺未即從之然民間咸謂王庭老必賞之以本路或鄰路監司張靚必賞之以館職或檢正此必因取數多而謗議興也乞陛下取其數而閲之果如民間所說則乞裁損行下以安民心據楊繪分㭊此劄子乃四月下旬所進是年七月十一日比外權同兩浙提刑兼常平事王庭老權發兩浙運副仍兼領常平御史劉摯言臣伏見內臣程昉大理寺丞李宜之於河北開修漳河功力浩大凡九萬夫所用物料本不預備需索倉猝出于非時官私應急勞費百倍除轉運司供應稈草梢樁之外又自差官採漳堤榆栁及監牧司地內栁株共十萬餘皆是逐州自管津岸河北難得薪柴村農惟以麥䕸等燒用及經冬泥補而昉等妄奏民間不用已科一萬餘功差本司兵士散就州縣民田內自行收割所役人夫莫非虐用往往逼使夜役蹂踐田苗發掘墳墓殘壞桑柘不知其數愁怨之聲流播道路傳至京師而昉等妄奏民間樂于功役無不悅喜民夫既散役兵尚衆本路廂軍剗刷都盡諸處無不闕事而昉等奏陳不已形迹州縣凌侮官吏仍乞于洺州調起急夫又欲令役兵不分畨次其急切擾攘至于如此本路監司畏昉之勢不敢言其非而上下以目臣不知昉之為是役其利安在或聞欲泄邢洺大名等處積水今使此水如昉之意通行而北緣下流淺狹無所容受不免泛溢乃是移此就彼易地為患今來朝廷既令權罷則利害姑置之如聞昉為見罷役忿恚偃蹇有休退之請朝㫖又令總領淤田司事昉總領淤田當檢月日昉權罷開漳河三月十一日丙申上批并此月十一日乙未王安石論陳薦云云可考臣謹按程昉李宜之將命興事初不以事之可否實聞于朝貪功幸進擾民殘物前後奏報事皆欺罔而昉又敢要君肆慢在于典憲可誅無赦若尚令昉以都水丞領事河上復恐生事興患未有窮己伏乞明布昉等罪狀重行貶竄以慰一方殘敝之民使天下皆知此役之害非朝廷意且以戒徼幸希賞罔上殘民之人御史中丞楊繪亦再具奏乞罷此役王安石為昉辨說甚力皆寢不報御史劉摯言程昉等開修漳河不詳利害擾民費財及欺罔要君乞行罷絀墨史但如此書于十二日朱史又削去今具載摯奏按日録以十一日進呈摯奏奏必在十一日以前今附見十一日墨史乃于十二日書之恐誤也中丞楊繪亦有二章論奏日録並不書今附見于此二月二十一日丁丑增役兵開漳河安石又白上前此樞密院言淤田役兵多走死至一指揮但有軍員五人歸營者又言府界營婦舉營訴于提㸃刑獄乞放淤田兵士密院遂劄付提㸃司密切體量安石取簿歷根究得淤田兵士走死多處不及三釐用法走死及八釐尚合得第一等酬奬又問密院何以言但有軍員五人歸營云得之曽孝寬孝寬得之李琮于是趙子幾以牒問李琮令具軍分役處琮得申狀乃云曽與孝寬言未淤田前一年滎澤斗門役兵兩處各前後逃走每起走却三十餘人又問得有兩營婦經提㸃司訴都水監見役修造未放乞依淤田所例放歸營婦所以訴乃以淤田所放早故也上曰曽孝寬何故如此安石曰孝寬及琮皆不可知或止是誤聽亦不可知馮京曰人言所聞何害上曰小人好如此恐宣力者解體密院前言淤田如餅薄朕令取一方土如麵厚尺餘問得極有深處京曰固有薄處上曰要不皆如餅薄安石曰薄處若水可到但當令次年更淤有何所害上曰陳薦前日上殿言且喜朝廷覺察罷却淤田問薦何謂薦言人號訴以為不便安石曰陛下用陳薦輩為股肱耳目為股肱當為身捍患為耳目當聽察廣逺今薦權發遣開封府府界內淤田其罷與不罷及利害初不曽知不知陛下耳目何所賴周公戒成王當職其所不享唯不役志于享惟事其爽侮乃惟孺子頒朕不暇今人臣各懷利害愛憎之心敢誣罔人主無所忌憚其為不享甚矣陛下固容有所未察雖復察見亦無所懲即與不察見無以異如此則事實何由不爽小人安能無侮雖以周公為相臣恐徒紛紛不暇無緣致平治也琮江寧人時知陽武縣朱史載此段于六年九月十五日賜侯叔獻等淤田後按王安石稱陳薦權開封府薦權府則四年四月事若附六年九月失其實矣今依日録見本日琮八月十五日擢利路運判丙申上諭文彥博等曰京東武衛軍素號精勇得力不減陜西兵彥博曰京東之人沈鷙精悍亦其性也上因言齊魯諸儒言過其行如李徽之輩每肆大言吳充曰前史謂齊人多詐信不誣矣彥博曰齊魯諸生常以誦經為業近聞朝廷釐改科場此輩恐未能遽改所業必有失職之憂上曰令展一次科場方依今來新制充曰齊魯專經之學誦書之外不知其他登第之後至于官政人事漫不通曉此弊深宜更改上因言近世士大夫多不習法令充曰漢儒陳寵以法律講授徒衆常數百人唐有律學在六學之一後來搢紳多恥此學明法一科又徒能誦其文而己亦罕通法意近嵗補法官者必聚而詳試其所習取其尤精通者用之有以見朝廷恤刑之意去年十二月八日徽之提舉鴻慶丁酉手詔近令諸路再體量昨出軍功狀今尚未至賞久稽緩後無以使人臨敵死難其督促之及近鄜延有功將官亦令經略司速以聞先是太原吕公弼鄜延趙卨並言宣撫司賞功多濫命公弼等別差次久而未上故有是詔戊戌天章閣待制知揚州馬仲甫判都水監知制誥知江寧府錢公輔知揚州初沈起罷陜西都轉運使召為度支副使三月二十五日改鹽鐡副使四月七日尋命知江寧府五月二日代公輔令公輔歸朝王安石欲留起知審官西院上曰朕方欲論起在陜西亦無罪吳充言屢改易非便上曰宜少待之安石曰公輔專助小人為異議使在內必無補聖政因請以代仲甫曰使仲甫在內無傷也上從之起除江寧才三月竟召入提舉在京諸司庫務九月二十四日起自江寧入為提舉百司今并書五年十一月十八日日録可考是日戊戌十四日東明縣民以縣科助役錢不當相率遮宰相自言凡數百家王安石既說諭令退遂白上曰知東明縣賈蕃者范仲淹女壻好附流俗非上所建立近樞密院選差勾當進奏院去年進奏院妄以朝廷事報四方令四方疑懈于奉行法令今使勾當宜得平實者如蕃殆不可用上以為然因令究東明事蕃管城人琰曽孫也己亥詔給榷貨務封樁銀十二萬七千兩絹萬七千匹赴陜西轉運司糴軍儲庚子司農寺及開封府界提舉常平司奏有畿內百姓未知新法之意見逐鄉大户言等第出助役錢多願依舊充役詔司農寺令諸縣曉諭如有不願納錢之人除從來不當役年月令依條認本等役候年月至則赴官充役更不令納役錢又奏乞差府界提㸃司官分詣諸縣同造五等簿升降民户如敢將四等以下户升于三等致人披訴其當職官吏並從違制不以赦降原免從之四月二日免四等户役又五年八月二十五日又七年正月十三日先是王安石建議恐有扇惑百姓以為役錢數剩但訴免必可減若果訴免則責令依舊充役如今司農寺及提舉司所奏上既知東明事連日再以手敕問安石其一從安石本議降是詔其一問酸棗有升下户入上户者如是則徒有免第四等役錢之名而無其實安石對上以取開封祥符兩縣新舊簿閲視其減等者至多升等者至少蓋諸縣造簿等第不同皆係官吏緩急如開封乃有七百户第一等此不可不減酸棗東明乃各數百户三等已上餘皆四等己下至有三等以上役本等闕人差又盡取于四等以上此乃是四等中自有合為三等以上之人而造簿不正緣吏人受賂置之下等及至上等無人則又不免糾取糾取之時又可取賂若不升降使各從其實則徒使吏人長姦百姓僥幸又有偏受困苦者非政事也且逐等物産皆有籍在籍第四等以下較其物産乃與三等同則何可不升升之百姓亦自無憾乞如司農寺所奏約束上從之安石又言曰治百姓當知其情僞利害不可示以姑息若驕之使紛紛妄經中書御史臺或打鼓截駕恃衆為僥幸則亦非所以為政天下事大計已定其餘責之有司事不當則罪有司而已今每一小事陛下輒再三手敕質問臣恐此體傷于叢脞則股肱倚辦于上不得不墮也且王公之職論道而己若道術不明雖勞適足自困無由致治若道術明君子小人各當其位則無為而天下治不須過自勞苦紛紛也上曰問得人役錢事誠是人情便安石曰陛下以道揆事則不窺牖見天道不出户知天下若不能以道揆事但問人言淺近之人何足以知天下大計其言適足沮亂人意而己上又言或以為役錢事必致建中之亂安石曰人言所以致此由陛下憂畏太過故姦人窺見聖心敢為誑脅也上初疑官户取助役錢少安石因是白上曰官户坊郭取役錢誠不多然度時之宜止可如此故紛紛者少不然則在官者須作意壞法造為論議坊郭等第户須糾合衆人打鼓截駕遮執政恐陛下未能不為之動心若陛下誠能熟計利害而深見情僞明示好惡賞罰使人人知政刑足畏則姦言浮說自不敢起詭妄之計自不敢施豪猾吏民自當帖息如此雖多取于兼并豪强以寬濟貧弱又何所傷也上又言曹司都不與祿反責其受賕廢事甚無謂安石曰本收助役錢有剩者將以祿此輩上曰以見役錢便可早定法制使知凡今致紛紛亦多是此輩扇惑安石曰早定誠是然畏此輩扇惑非也當令此輩不敢扇惑而己若使此輩無忌憚敢為扇惑而專望以祿利弭息恐非所以為政也人主若不能盡天下則不能勝天下反為天下役反為天下役則亂矣漢髙祖甫定天下令婁敬持一節發齊諸田楚昭屈景諸大族數萬口居關中此數族者平時皆能首難合從以逆關中者也如諸田乃至兄弟二人更為王敢與項羽為敵一旦使之弃墳墓田宅而徙曽不憂其為變者氣與略有以勝之故也御史中丞楊繪言比者畿邑之民求訴助役之不便陛下霈發指揮令取問民之願與不願而兩行之中書門下已作劄子坐聖㫖頒下而司農寺繳還遂從其請臣竊謂助役之法果便乎則今之不願者不一二年自見他人之便則改而從命矣助役之法果非便乎則一二年中自將改之則今之不願者何必强之也假使十分而不願者一分焉則一分之少固不能害九分之多而一分不願者亦自有役以差之必無放者但形勢官户女户單丁素無役者令出役錢則已行之矣司農寺繳還聖㫖劄子豈得無罪乎謹按舍人院繳還詞頭自有故事李大臨蘇頌繳還不當落職歸班今司農寺不聞有得繳還聖㫖劄子典故鄧綰曽布繳還不當沮格聖斷乞比類李大臨蘇頌情理特行降絀而偏行此聖㫖指揮于天下臣料主之者必謂大臨蘇頌繳得不當鄧綰曽布繳得當則乞詳臣所陳不當事狀施行并勘㑹布與宰相王安石是親乞不令簽書不報此據楊繪熙寧臺章附見十六日壬寅詔自今朝省及都水監司農寺等處凡下條貫並令進奏院摹印頒降諸路嵗給錢千緡為鏤板紙墨之費王安石因東明訴役錢事稱疾卧家是日上遣中使趣安石入見此事他書並無據王安石日録十八日上遣中使趣入見則此安石嘗托病在告也更當考詳癸卯安石入見為上言東明宜受狀曉諭百姓乃不受狀遣令入京餘縣即無之此意可見上因問賈蕃與密院官孰善安石曰臣不知也遂白上今大臣近臣孰為助成聖政之人臺諫官孰為不附流俗者陛下又於忠邪真僞之際未始判然明白示以政刑小人何所忌憚小人無忌憚敢為紛紛而陛下恃耳目聰眀欲以勝之臣恐陛下雖勞終不能成治也楊繪言東明等縣百姓千百人詣開封府訴超升等第出助役錢事本府不受百姓既無所訴遂突入王安石私第安石諭云此事相府不知當與指揮不令升等仍問汝等來知縣知否皆言不知又詣御史臺臣以本臺無例收接訴狀諭令散去退而訪問乃司農寺不依諸縣元定户等却以見管户口量等第均定助役錢數付諸縣各令管認升降户等別造簿籍前農務而畢臣竊謂凡等第升降蓋視人家産髙下須慿本縣本縣須慿户長里正户長里正須慿鄰里自下而上乃得其實今乃自司農寺先畫數令本縣依數定簿豈得民心甘服哉譬夫所以為帶者為腰也所以為履者為足也帶之長短須隨腰之豐瘦履之濶狹須準足之大小今若帶長而有餘則增腰以滿之履狹而不足則削足以就之可乎超升等第以就多出錢何以異此京畿者天下之根本不可不關聖慮若人民紛擾辭訴不已雖欲脅以止之竊恐川壅而潰其傷必多措置民事必自州及縣豈有文移下縣州府不知其理此乃司農寺自知所行于理未安故不報府直下諸縣欲其畏威不敢異議若關京尹或致爭執所以不顧事體如此又今已是農月如何于農務前畢欲隨夏稅起催乎臣又聞中書遣孫迪張景溫體量不願出錢之民竊恐不願出錢者欲困以重役如此威脅誰敢不從畿內之民平日驕養如赤子今團保之法行之猝暴惶駭未已若更凌虐恐所憂不細今判司農寺乃鄧綰曽布一為知雜一為都檢正非臣言之誰敢言者王安石指陳繪言為不然上諾之安石日録云余為上別白言事實上固洞見末本矣劉摯言臣竊以畿甸者天下根本之地當安輯之而愛養其財力使有豐佚閒暇之樂故可與為善而不可與為非義昨者團結保甲是時西邉用兵法令一出民間驚騷至今憂惑而未寧今又作法使人均出緡錢非時升降户等期㑹急迫所以人情惶駭無所赴訴恐非所謂强幹重內愛人寬役之意實由有司未能奉宣陛下大均之意以立法度乃為此等紛擾臣伏願先降指揮告示逐縣今來新法未得施行別聽朝㫖以安衆心然後乞根究昨來承準是何條制輒有升降户等及如何出榜依理施行所定役法臣愚欲望陛下深求民情採中外之論再行講求要之不至重斂動衆而可以經久者而後行之係民休戚此最大事惟陛下謹慮而審取之天下幸甚光祿卿史照知邢州上謂執政曰照在襄州于水利甚宣力宜優奬以勸衆玊安石曰便除邢州亦足示勸其詳須勘㑹具備乃可推恩不然恐濫有異論則無事狀可質也甲辰上患邉臣觀望朝廷意度為緩急不肯竭情了事王安石曰此在陛下陛下誠能御羣臣以道使各盡力濟務莫敢為欺則陛下可不勞而天下治若不能如此徒役兩耳目聰眀夙夜憂勤于上而臣為陛下盡瘁于下恐終不能致治邉事且勿論試論近事近者慶州兵變陛下不能不旰食大臣宜以此時共憂所以消弭然方共乘陛下洶懼合為異論至于淤田保甲與慶州兵變事不相關此衆人所知非待至明而後察也然衆論盡然陛下雖知其非能使其有所忌憚否大臣在前尚無忌憚如此則邉鄙疏逺何可禁其不為欺罔臣恐以區區之身為陛下獨勞亦不能濟平治也臣愚以謂大畏衆志使無實者不敢肆其說而忠力者不為小人所沮則陛下不須憂勞而治道自成上曰良是朱史以此段載三月三日慶州兵叛後不知安石言此乃因東明訴役錢事假借以堅上意今乃依日録特書于五月二十日陳瓘尊堯集邉機門論安石云云并附五年六月二十七日又四年五月二十日又二十六日又六月十二日又二十七日又五年正月九日又六月二十七日皆合參考乙巳皇第二子生母曰賢妃郝氏後三日卒不及名後賜僅新紀但書僅卒不書其生蓋疏略也丙午太常博士集賢校理同知諫院直舍人院孫洙知海州從其請也合考林希野史載洙所以出事在六月十三日丙寅録繫囚注內洙舊傳云王安石以論青苗事多逐諌官御史洙欎欎不能有所言懇求補外得知海州御史中丞楊繪恐檢正中書吏房公事李定遂補洙闕言定必不可用洙闕遂久之弗補明年二月乃除常秩通州言髙麗使民官侍郎金悌等入貢至海門縣詔集賢校理陸經假知制誥館伴左藏庫副使張誠一副之降龍神衛四廂都指揮使昭州防禦使涇原路副總管張玉為總管陵州團練使落軍職玉以兵追討慶州叛軍而吳達等勢窮降邠寧部將任懷政懷政送玉玉盡殺之于邠州朝天驛上以玉妄殺失朝廷信故有是命初欲但降玉一官王安石曰朝廷既知其妄殺則降一官非所以示天下重人命存信之道上乃令降兩官又降總管又議落軍職文彥博以為刺史不可為都虞候安石曰都虞候須以防禦使為之止是故事初無義理臣固嘗論奏以為但緣官闕遂例遷或無功而以選超授皆無義理不足以勸彥博以為故事要難改乃止降一官落軍職仍未補人吳充曰竇舜卿失于覺察撫禦亦止降一官玉罰太重安石曰慶州之變非舜卿所致舜卿雖知人情洶洶欲令舜卿若為處置充又言玉可惜安石曰暫責遇赦即牽復姑以明法存信慰衆心於玉何損朝廷但令玉且在邉自得其用豈計官職資任乎是日王安石呈役錢文字上以為民供稅斂己重坊郭及官户等不須減稅户升等事更與少裁之無害安石曰今取于稅户固己不使過多更過當減但為厭人言即無當于義理若方可取之時取之待其凶年闕食量彼力不足而我所收役錢有餘則特與放一料此乃是于米粒狼戾時多取之于食不足時則賙之合于先王不忍人之政朝廷制法當內自斷以義而要久逺便民而己豈須規規恤淺近之人論議陛下以為稅斂甚重以臣所見今稅斂不為重但兼并侵牟爾此荀悅所謂公家之惠優于三代豪强之暴酷于亡秦上曰此兼并所以宜權安石曰摧兼并惟古大有為之君能之所謂兼并者皆豪傑有力之人其論議足以動士大夫者也今制法但一切因人情所便未足操制兼并也然論議紛紛陛下己不能不為之動即欲操制兼并則恐陛下未能勝衆人紛紛也如兩浙助役事未能大困兼并也然陛下已不能無惑矣上曰如常平法亦所以制兼并安石曰此于治道極為毫末豈能遽均天下之財使百姓無貧己酉權陜西都轉運使謝景溫言鄜延最當敵衝守禦係于主帥自今春以來造怨連禍士氣不振民心未寧陛下擢趙卨知延州卨聰眀宏達誠有過人然未嘗親歷行陳熟悉軍旅裨將寨主皆故等夷一旦受其統制未必心服臣恐有事之時難責成效慶州昨經叛亂人情不安王廣淵本無威望以鎮姦猾傷弓之餘何由更明紀律驕悍之卒變故難保雖朝廷開其自新而人情惴恐常憂不測今一營之間逆順雜處效順者貧如故時為逆者人有餘財鬻贓于市主不敢識脫有緩急廣淵必不能裁制陛下近以郭逵知秦州秦雖要藩其重不若鄜延逵少長于邉材武可任纍經行陳士卒信服若使復帥鄜延敵必不敢輕犯蔡挺向為慶帥撫御得宜涇原士馬完整威聲已振若使挺于慶州使之因事制置施設方略誅鋤橫猾慰安反側則朝廷髙枕無憂矣自陛下臨御以來秦州罷絀四帥雖軍政不修撫御失當終不足貽朝廷深患與鄜延環慶不同臣謂朝廷欲捍外冦莫若責郭逵欲消軍變莫若委蔡挺蓋秋冬之交敵騎必出鄜延卨雖有美才固不若逵之老練或處之他路無所不可伏望易置四帥以消未然之患王安石曰郭逵宜使為延州乃以恥見吏民力辭逵復被朝廷任用得故處有何恥彼但緣延州經擾壞難治不肯往耳陛下不察其情而許之頗失事機今己赴秦州乃欲改更非便上曰蔡挺移慶恐轉加姑息安石曰慶卒尚反側若遽易帥或未至間疑而為變盍靜以待之景溫奏寢不行朱本削去景溫疏今從新本復存之庚戌楊繪言開封府界提㸃司以畿縣百姓入京訴等第役事東明縣民最多因欲舉劾知縣賈蕃臣不識賈蕃不知其材與不材但見嘗被二府選差則其人必非甚不材者畿縣之民去京不百里茍有屈抑得以來訴於相府則陛下宜推而興念四方之民去京甚逺者雖有屈抑曷由來訴乎即宜申命監司使通下情勿令失所則政之逺近各得其宜矣今若東明百姓來訴則罪知縣臣恐畿縣令佐懲創其事先威以嚴刑脅以利害俾民不敢復訴壅塞民言得為便乎况陛下已詔東明等縣不得升等及取情願若非百姓來訴何慿有此詔乎而反捃托知縣也是日王安石既對留身請去上固留之曰風俗久壞不可猝正事有萬緒卿如何却要去且體念朕意不須恤流俗紛紛安石曰臣材薄恐誤陛下屬意陛下試觀前代興王亦有為政數年而風俗不變紀綱不立如今者乎上曰前代或因衰亂方生人情迫急為之解患釋難所以易今頺壞之俗己久萬事收斂使就法度則不得不難其紛紛亦固宜但力行不變自當改如富弼事向時豈有按劾今乃案治如此等事行之已多人情恐漸變安石曰以臣所見似小人未肯革面臣愚以謂陛下誠能洞見羣臣情僞操利害以馭之則人孰敢為邪但朝廷之人莫敢為邪即風俗立變何憂紀綱不立如唐太宗時裴矩尚肯為正諫况其素不為邪者乎上追咎西邊事以為唐太宗時固無此安石曰臣自接侍清光以來陛下固未嘗許韓絳以智略一旦舉一方之事屬之則邊事自宜如此上曰朝廷固未嘗令其如此絳失本指皆出于意外安石曰陛下許其便宜節制諸路則其如此固其理也邊事已往固無所及臣愚以謂陛下憂勤衆事可謂至矣然事兼於德德兼于道陛下誠能明道以御衆則不待憂勞而事自治如其不能則雖復憂勞未能使事事皆治也陛下誠能討論帝王之道垂拱無為觀羣臣之情僞以道揆而應之則孰敢為欺人莫敢為欺則天下已治矣臣敢不且黽勉從事若但如今日恐無補聖治也此段依日録載此朱史乃于責韓絳後使附見且刪去臣敢不黽勉從事若但如今日恐無補聖治等語蓋失事實矣今改之陳瓘尊堯集邊機門論云云并附五年六月二十七日又五月二十日又二十六日又六月十二日又五年正月九日又六月二十七日皆合參考辛亥詔以季秋擇日有事于明堂詔大宗正司自今宗室率府率遭父母喪及嫡孫承重並解官行服又詔宗室遇嵗節罷遣姨㜮上西京汝州諸墳遣本宫殿侍者聽之從李德芻請也先是判亳州富弼四上章乞解使相不許又乞給假就西京養疾未報㑹青苗獄起弼因不敢言及朝廷有案後收坐指揮弼知免劾乃復乞養疾西京是日詔與弼假弼四上章乞罷使相據劄子許給假就西京養疾實録在五月十八日誤也今從㑹要及王安石日録壬子詔聞恩冀鄚雄滄州永靜信安保定乾寧軍自夏災傷其令轉運副使王廣亷提㸃刑獄孔嗣宗分行體量未經檢放秋稅各以分數蠲除仍發廣惠倉粟賑濟饑民是月詔廢新衣庫其官物撥赴儀鸞司等處
