body:
  text: 續資治通鑑長編卷一百二宋李燾撰仁宗天聖二年春正月甲午詔禮部貢院開封府國子監及别頭各增置點檢試卷封彌巡鋪監門官有差開封府舉人無户籍者召有出身京朝官保二人無出身曽歷任者保一人外州召命官使臣為保不得過一人所保不實以違制論舉人兩處取解及犯徒而嘗以蔭贖者永不得入科場同保人殿五舉其殿三舉者實殿一舉五舉殿二舉進士不得以押韻入試罷諸科舊人别院試者聽至復場入試其被黜而毁謗主司及投匿名文字令所在收捕之即主司不公許單名以告不得期集連狀廣南東西益梓利夔等路舊制於額外有合格者亦聽舉送如聞比來冒籍者多自今毋得額外發解時承平嵗久天下貢士益衆間起爭訟故條約之癸卯命御史中丞劉筠等四人權知貢舉戊申吏部銓引對選人九人前束鹿縣王得説歷官寡過書考最多而無保任者上察其孤貧特擢為大理寺丞他日又引對選人有賈積善者十四考無公私過雖無舉主特擢為京官賈積善事會要在十月十五日今附此庚戌降知鄧州給事中冦瑊為少府監知金州左屯衛大將軍蔡州安置石普為本衛將軍皆坐失保任也詔貢舉如咸平二年故事令禮部放榜仍先具合格等第字號以聞辛亥知貢舉劉筠等請差覆考及詳定官上曰非所以責成之意也詔筠等以公考校巡鋪官左正言孔延魯又請未試前令主司曉諭舉人不得上請仍雕印試題分明解説就試卷內散上曰文闈取士條約已多只依舊例施行可也甲寅詔兩制大兩省以上正刺史閣門使以上並聽受命日告謝先是臣僚告謝或自外代還上欲盡知其姓名故令前一日先以名聞閣門不諭上意而侍從官亦須奏至是因翰林學士李咨建言而釐正之是月詔諸路州軍自今常留縣令管勾簿書催督稅賦及理婚田詞訟不得差出勾當小可公事及於縣鎮道店場務比較課利其令佐年滿雖準銓牒放罷若一縣全然闕人未得出給解由須本縣不至闕人即許離任時諸州軍纍言屬縣令佐因年滿放罷及轉運司差往他處比較課利有一縣全闕官者故條約之會要天聖二年正月事吏部南曹言選人磨勘例問刑部有無過犯定奪公私罪名又恐其間曽有過犯或奏案在大理寺未經奏斷即刑部無由得知自今更乞問大理寺從之二月辛酉左屯衛大將軍致仕李福落致仕歸班福先為永興軍部署坐不察朱能反特令致仕以屢更赦宥故起之襄州上將作監致仕胡旦所撰漢春秋上因問旦吏歷及著書本末宰臣王欽若對曰旦詞學精博舉進士第一再知制誥然不矜細行數敗官今已退居嘗謂三代之後獨漢得正統因四百年行事立褒貶以擬春秋上稱歎之癸亥命旦為祕書監仍録其子彬為將作監主簿乙丑召輔臣於崇政殿西廡觀講孝經丙寅復西頭供奉官康文德為閣門祇候文德先為永興軍都監朱能以兵叛知永興軍朱巽遣文德招還叛卒三百餘人猶坐不察能姦狀落職監集津鹽稅於是援赦自陳故復之賜欽州修城役卒緡錢庚午上謂王欽若曰久罷貢舉慮遺天下賢俊宜令禮部貢院精加校試將來放進士特增至二百人諸科三百五十人遣內臣自汴口至泗州收瘞流尸祭奠之辛未以真宗大祥京城寺觀及嘗所巡幸州縣度人為僧道有差癸酉詔應乾興元年二月戊子以前貶降編管等人令諸路轉運司除已敘用授官外並具元犯因依以聞景靈宫舊晉邸也真宗生於是上即位修萬夀殿名曰奉真將以奉安塑像庚辰命王欽若為禮儀使癸未皇太后手書賜輔臣諭以臨朝願治之意東都事略皇太后詔宰相曰吾受先帝顧託之深皇帝富於春秋助成正道用乂斯民期見抱孫之歡永遂含飴之樂此吾之志也更賴三事庶尹百工羣司勉悉乃心同底於道甲申衛尉寺丞康惟一為侍禁閣門祇候懷州兵馬都監從其父西上閣門使蔣州團練使知泰州繼英所請也上念其祖保裔死事繼英方守邊故有是命乙酉工部侍郎知徐州李應機坐前知兖州貪暴不法降授將作監分司南京上問王欽若曰應機貪墨如此何以官至丞郎欽若對曰應機素無亷稱然監司未嘗按舉故得纍資至此也上曰外臺耳目所寄當職靡言咎將誰執丙戌詔轉運使劉明恕李允元提點刑獄尚霖郭位特免勘各贖銅二十斤丁亥詔雄霸保州廣信安肅軍皆被邊之地與契丹移文往還其幕職官並選進士出身人三月戊子朔詔禮部諸科舉人不能對䇿者未得退落先是上封者言經學不究經旨乞於本科問䇿一道至是對者多紕繆帝以執經肄業不善為文特令取其所長用廣仕路殿前都指揮使保靜節度使蔚昭敏卒贈侍中故事罷朝一日詔特罷二日己丑同提點開封府界諸縣鎮公事張君平言南京陳許徐宿亳曹單蔡潁等州古溝洫與畿內相接歲久不治故京師數罹水患請委官疏鑿之詔從其請君平陳八事一曰商度地形循古迹深廣之數州計土工置籍以記其事二曰功不如所計或水壅害民田官坐罪償費置三曰察吏貪墨傍緣役事箕斂民錢者四曰知州通判令佐能誘部民佐工費書為勞課與家便官功多與重賞五曰禁民築堰堨瀦水捕魚以障河流六曰濬治畢按新書廣深凡幾何校功力因其所出土積為堤七曰凡溝洫上廣一丈則下廣八尺深四尺高阜加深焉用此為率窊隆折計之便於覆視八曰古溝平淤為民田係賦籍雖開治者以鄉縣保證除其賦悉頒為定令賜欽州錢歲百緡以犒交趾人刑部奏舉新知侯官縣韓中正為詳覆官上曰中正嘗失入人罪比引對不與改秩奈何舉充法吏壬辰判刑部石宗道罰金八斤詳覆官梁如圭罰銅十斤癸巳龜兹國王智海遣使來貢方物丁酉奉安真宗御容於景靈宫奉真殿皇太后諭宰臣曰比擇儒臣侍上講讀深有開益宰臣因言工部郎中馬宗元通經有行義可使入奉經筵辛丑命宗元直龍圗閣宗元單父人也壬寅以衛尉寺丞陳執中為太子中允同判歙州執中初與陳堯佐同責官堯佐已知制誥而執中猶坐前纍監真州稅故稍遷之癸卯王欽若等上真宗實録一百五十卷上與太后設香案閲視涕泣命欽若等坐勞問者久之賜燕于編修院降詔褒諭先是馮拯監修拯卒欽若代之於是欽若加司徒修撰官李維晏殊孫奭宋綬陳堯佐檢討官王舉正李淑各遷秩賜器幣襲衣金犀帶鞍勒馬管勾內臣周文質劉崇超賞亦及焉録馮拯子宫苑副使端已為如京使淑若谷子也禮部上合格進士姓名詔翰林學士晏殊龍圗閣直學士馮元編排等第乙巳御崇政殿賜宋郊葉清臣鄭戬等一百五十四人及第四十六人同出身不中格者六人以嘗經真宗御試特賜同三禮出身丙午又賜諸科一百九十六人及第八十一人同出身郊與其弟祁俱以辭賦得名禮部奏祁名第三太后不欲弟先兄乃推郊第一而置祁第十劉筠得清臣所對䇿竒之故擢第二國朝以䇿擢高第自清臣始郊安陸人清臣長洲人戬吳縣人郊授大理評事同判襄州戬授奉禮郎簽書寧國軍節度判官事放榜如咸平二年授官則如親䇿更詳之戊申遣官分詣五嶽四瀆祈雨庚戌雨壬子賜鄉貢進士張瓌太常寺太祝吕宗簡進士及第仍附春榜瓌洎孫宰臣王欽若女壻宗簡參知政事夷簡弟也河東轉運使言嵐石隰州緣邊都巡檢使濰州團練使刁贊惜公使錢不以犒士癸丑令贊與潞州兵馬總管冀州團練使許超易任夏四月辛酉御史中丞劉筠為樞密直學士禮部侍郎知潁州筠引疾求補外故也禁惠民京索河施􅊻網知池州李虛已言州縣春初豫支錢和買紬絹民或不欲者強之則為擾乃詔三司諭州縣毋得抑配非土産者罷之天禧初上乳母許氏為宫人所讒出宫嫁苖繼宗及是邀駕自陳丙寅封臨頴縣君以繼宗為右班殿直加許氏當陽郡夫人復入宫戊辰契丹遣左監門衛上將軍蕭林右監門衛上將軍鄭均來賀乾元節己卯知成德軍永州團練使錢惟濟加吉州防禦使留再任有偽為白金以質取緡錢者其家來告惟濟密謂曰第聲言被盜而示以重購質者當來責餘直即得之已而果然鄜延路部署司言賊冦保安軍蕃族軍主旺律等擊走之詔以旺律為三班借職仍賜姓名曰劉漢忠庚辰以特奏名進士李道宗等四十三人諸科王播等七十七人為將作監主簿及諸州長史文學司士參軍道宗等皆年踰五十嘗應六舉王播等皆年踰六十嘗應八舉上因謂輔臣曰此雖舉業非工然閔其白首無成故悉甄録之乙酉録晉氏後宰臣奏見闕堂後官一人詔吏部銓於選人內揀有出身好人材書禮歷任無過犯人赴中書試驗公事自是多如此例皆即授京官充職或有由五房序選者初命檢校員外郎經恩乃遷京官充職集賢校理葛昻張仲尹黃弼陳商范説等各乞外任差遣詔並與小處通判太宗朝凡帶館職出皆知州景德後王昱劉奭並以官卑止與通判至是因用昱奭例五月丁亥朔司天監言日當食已而不食中書奉表稱賀戊子甘州回紇可汗王遣使來貢方物先是詔議上皇太后禮服太常禮院言開寶禮皇太后當禕衣革帶青襪舄白玉雙珮黑組雙大綬素紗中單蔽膝大帶首飾花十二株受册親蠶朝會諸大事則服之又隋制后服四等其四曰朱衣以緋羅為之宴見賔客則服之今議每朝謁神御往還乘輦服朱衣而蔽膝革帶大帶寶裝綬珮襪金飾履悉以衣之色常視事去蔽膝革帶珮襪或衣鞠衣則以黃羅為之亦用寶裝綬大帶履命內侍周文質如所議以製至是上之乙未詔開封府諸縣折變稅賦自今第三等户以下於就近倉以賤色斛斗折納之御崇政殿録繫囚雜犯死罪以下遞降一等杖罪釋之丁酉再幸資聖禪院視申國大長公主報慈正覺大師疾及不起復臨奠焉在真宗禫不製服廢五日朝諡公主曰慈明庚子詔百官遇起居橫行日輒請假者並遣醫官驗視以聞先是右巡使張億彈户部郎中史館修撰石中立等三十三員皆稱疾不赴橫行故申警之壬寅司天言月當食而雲隂不見中書奉表稱賀是月流內銓言陳州文學王諫單州文學嚴九齡各欠九選年六十已上敕旨依例注江浙荆湖小處今檢勘並無二千戶以上主簿滿闕雖有小邑又多是兼尉年六十者難以處之欲自今選人得旨與小處令録及小處判司簿尉者如無二千户以下縣則不問户口多少令録只於十貫料錢內注擬判司簿尉只於七貫料錢內注擬從之六月丁巳朔河東轉運使鍾離瑾請罷便糴官止從本司選通判或幕職官領之上曰邊計至重非朝廷遣官則州縣因循糴不以時矣不許己未百官表請聽樂不許表五上乃許之因諭王欽若曰今雖勉從衆請秋燕但當用樂之半其請遊幸則心所未忍欽若對曰陛下雖孝思過人然先王制禮亦不可踰也賜馬宗元三品服以講孝經徹也湖南轉運使言澧州水南寨地多水弩射人戍兵歲死者衆請徙於臺宜村從之仍改寨名曰臺宜命官校勘南北史諸州攝助教樂和等二十三人乞赴銓調官甲子並除參軍京師民居侵占衢街者令開封府榜示限一歲依元立表木毁拆乙丑權户部判官殿中侍御史李孝若為祠部員外郎同判鄆州坐接伴契丹使失儀檢也上謂輔臣曰比選近臣館伴北使頗難其人因歎才識之士為不易得王欽若等對曰纍朝文物之盛人才固多陛下推誠孜孜奬拔必有以副聖選然高才當不次用之乃克盡忠上深然之此據寶訓附見梓州路提點刑獄王繼明言知梓州王世昌昏耄不治詔即選人代之以轉運使江仲甫失於察舉戊辰降仲甫知小州繼明仲甫未見辛未河東緣邊安撫司言府州五族八族蕃部先挈其屬散耕河東諸州欲遣還河西故地從之壬申罷天慶天祺天貺先天降聖節宫觀然燈王皥文正公言行録云司空王公召自江寧再秉政嘗謂宫觀欽奉之禮疏怠不若昔時屢以為言明肅依違未能決一日公於簾前奏曰天道逺人道邇且天禧中靈文降言先帝聖夀三萬日時欽若率先慶抃曰三萬日八十三歲臣時忝預國政太后必亦記之後乃無驗則今但遵典禮不須過當冀公赧然而退自是不言按王曽天禧元年八月罷政以禮部侍郎歸班二年正月判都省三月出知應天九月徙天雄四年八月復參政而寇凖奏天書降乾祐山中實三年三月其年四月乃迎天書入內此時曽罷政久矣又其年八月以天書再降大赦時欽若亦先罷相矣言行録所云臣時忝預國政此必誤今不取兼實録於三年六月甲午欽若罷相後載欽若嘗言周懷政妄造天書則恐言行録所云率先慶抃亦未必然顧欽若必不能言懷政之妄已於罷政時辨之今皆不取丁丑夔州路轉運使刁湛言雲安軍所管鹽井歲課甚多而武臣知軍失於鈎考簿書積有所負請自今選朝臣為知軍從之戊寅監察御史李紘言近年臣僚舉奏幕職州縣官例及五人以上及所舉之人四考已上者並得磨勘引見其間有在任止一兩人奏舉替後遷延告屬外任官論薦或請託初得外處差遣臣僚發章奏舉欲望自今轉運制置發運提點刑獄勸農使副使知州軍通判鈐轄都監崇班已上並令奏舉本部內幕職州縣官在京大兩省已上並許舉官其常參官及館閣曽任知州通判升朝官許依條奏舉餘升朝官未經知州軍通判已上差遣者不在舉官之限所舉官須見在任者舉主但有轉運制置發運提點刑獄勸農使副使兩人便與依例施行若一名舉到别無本處知州軍通判即更候常參官二人保舉並乞與磨勘仍自今有犯罪至徒者唯贓私踰濫挾情故違不得奏舉外餘因公致私事理不重亦許奏舉從之上因謂輔臣曰日閲天下舉官之奏豈無繆者王欽若對曰從紘所請亦可少革其濫紘昌言從子也實録載紘奏請甚略今取會要并書之以存事始詔三司檢法官自今有闕令流內銓依公㨂選保明以聞其三司使副無得復舉秋七月戊子詔以冬至有事於南郊壬辰遣殿中侍御史王碩內殿承制朱緒點檢山場所積茶初朝廷既用李咨等貼射法行之期年豪商大賈不能軒輊為輕重而論者或論邊糴償以見錢恐京師府藏不足以繼爭言其不便會江淮制置司言茶有滯積壞敗者請一切焚棄朝廷欵變法之弊下書責計置司因令碩等行視既而咨等條上利害且言嘗遣官視陜西河北以鎮戎軍定州為率鎮戎軍入粟直二萬八千定州入粟直四萬五千給茶皆直十萬蘄州市茶本錢視鎮戎軍粟直反亡本錢三之一所得不償其弊在於茶與邊糴相須為用故更今法以新二法較之乾興元年用三説法每給十萬茶售錢萬一千至六萬二千香藥象齒售錢四萬一千有竒東南緡錢售錢八萬三千而京師實入緡錢七十五萬有竒邊儲芻二百五萬餘圍粟二百九十八萬石天聖元年用新法二年茶及香藥東南緡錢每給直十萬茶入實錢七萬四千有竒至八萬香藥象齒入錢七萬二千有竒東南緡錢入錢十五萬五百而京師實入緡錢增一萬四千有竒邊儲芻增一千一百六十九萬餘圍粟增二百一十三萬餘石舊以虛估給券者至京師為出錢售之或折為實錢給茶貴賤從其市估其先賤售於茶商者券錢十萬使别輸實錢五萬共給天禧五年茶直十五萬小商百萬已下免輸錢每券十萬給茶直七萬至七萬五千天禧茶盡則給乾興己後茶仍增别輸錢五萬者為七萬並給耗如舊俟舊券盡而止如此又省合給茶及香藥象齒東南緡錢總直緡錢二百七十一萬二府大臣亦言所省及增收計為緡錢六百五十餘萬異時邊儲有不足以給一歲者至是多者有四年少者有二年之畜而東南茶亦無滯積之弊其制置司請焚棄者特纍年壞敗不可用者爾因言推行新法功緒已見蓋積年侵蠧之源一朝閉塞商賈利於復故欲有以搖動而論者不察其實助為遊説願立行之無為流言所易於是詔有司榜諭商賈以推行不變之意賜典吏銀絹有差實録但於此記遣使視積茶并四年三月甲辰附見賜典吏銀絹事餘皆無之今並從本志會要亦無差使視積茶及李咨等條上利害榜諭商賈賜銀絹事不知何也戊戌刑部郎中侍御史知雜事薑遵言三司開封府日接賔客頗見廢事又帶職文臣出節大逺過遏行人技術官未升朝而賜緋紫者多得佩魚浸紊朝政此皆舊有著令請行禁止從之己亥以龍圖閣待制權知開封府薛奎為右諌議大夫權御史中丞奎上疏論擇人求治崇節儉屏聲色凡十數事監察御史張逸為益州路提點刑獄勸農使上謂輔臣曰益部民物繁富提案之任尤須得人逸堪其任否王欽若曰逸為御史以清謹著今此選委必能稱職也逸滎陽人先以試校書郎知襄州鄧城縣有能名知州謝泌將薦逸先設几案置章其上望闕再拜曰老臣為朝廷得一良吏乃奏之他日引對真宗問所欲何官逸對曰母老家貧願得近鄉一幕職官歸奉甘旨足矣授澶州觀察推官數日母喪去服除引對帝又固問之對曰願得京官改授大理寺丞真宗雅賢泌再召對逸者用泌薦也知長水縣時王嗣宗留守西京厚遇之及徙青神縣貧不自給嗣宗假俸半年使辦裝至縣興學校教生徒後邑人陳希亮楊異相繼登科逸改其居曰桂枝里縣東南有松柏灘夏秋暴漲多覆舟逸禱江神不踰月灘為徙五里時人異之庚子以宰臣王欽若為南郊大禮使翰林學士承旨李維為禮儀使翰林學士晏殊為儀仗使權御史中丞薛奎為鹵簿使權知開封府王臻為橋道頓遞使宰相為大禮使太常卿為禮儀使御史中丞為儀仗使兵部尚書為鹵簿使開封尹為橋道頓遞使國初循用此制其後太常卿御史中丞兵部尚書或闕乃以學士及他尚書丞郎領之其職掌仍用禮院御史臺兵部吏如故儀衛名物皆鹵簿使所領儀仗使唯督促諸司而已又使領次第則大禮禮儀儀仗鹵簿而橋道頓遞最居其下真宗封禪五使皆以輔臣為之及上玉皇尊號宰相向敏中當為禮儀使以年老不任贊導更命樞密使王欽若而敏中乃領儀仗使蓋失其次第今有中丞而換使名非故事也實録云奉祀亳州以輔臣領五使向敏中以禮儀使讓王欽若誤也今悉改之初真宗崩內遣中使賜荆門軍玉泉山景德院白金三千兩令市田院僧不敢受本路轉運使言舊制寺觀不得市田以侵農上謂宰相曰此為先帝殖福其勿拘以法仍不得為例既而寺觀稍益市田矣稍益市田據食貨志皇太后微時嘗過玉泉有老僧言後當極貴既如其言纍召不至故有是賜邵伯溫見聞録云章獻明肅太后成都華陽人少隨父下峽至玉泉寺有長老善相人謂其父曰君貴人也及見后則大驚曰君之貴以此女又曰逺方不足留盍逰京師乎父以貧為辭長老乃贈以中金百兩至京師真宗判南衙因張耆納后宫中及即位為才人進扆位至正位宫幃聲動天下仁宗即位以皇太后垂簾聽政玉泉長老己居長蘆矣后屢詔不至遣使就問所須則曰道人無所須也玉泉寺無僧堂長蘆無山門后其念之后以本閣服用物下兩寺為錢以建獨長蘆寺臨江門起水中既成輒為蛟所壞后必欲起之用生鐵數萬斤疊其下門乃成蛟畏鐵也今玉泉僧堂梁記太后所建甲辰羣臣表上尊號曰聖文睿武仁眀孝德又上皇太后尊號曰應元崇德仁夀慈聖皆不允表三上乃從之丁未刑部郎中判户部勾院李若谷為契丹后生辰使內殿承制閣門祇候范守慶副之若谷等辭日不俟垂簾請對遽詣長夀殿奏事太后不悅尋命刑部郎中直史館章得象供奉官閣門祇候馮克忠代焉附傳云太后聽政奉使者辭於庭已而升殿若谷等辭已輒趨出遂罷使與正傳及實録不同當考已酉初幸啓聖禪院朝拜太宗神御前在諒暗用禮儀院奏但遣輔臣酌獻也癸丑奉安真宗御容於玉清昭應宫安聖殿八月丙辰朔燕崇政殿初用樂之半樂工奏技上未始矚目終燕猶有戚容左右竊視無不感歎時詔下成都府召優人許朝天等補教坊左正言劉隨以為賤工不足辱詔書監察御史李紘言陛下即位尚未能顯巖穴之士而首召伶官非所以廣德美於天下朝天等隨罷歸劉隨李紘諫召樂工不得其時今附見紘云陛下即位未能顯巖穴之士則必是天聖初也隨本傳載此事雜見於論星變及劾鍾離瑾間今不取詔舉官已施用而犯法聽舉者以狀聞聞而不以實者坐之本志乃云不以實者亦免坐今從實録及本紀丁已廢無為軍前礬聽民自煎官收市之保大節度使錢惟演言真宗幸澶淵禦契丹殺其大將逹蘭盟而服之今諡號但稱文不及武冝諡武詔兩制與太常禮院議增益之戊辰社賜會如故事自是或宰臣請罷則止命中使分賜酒果辛未南郊橋道頓遞使王臻請車駕自太廟還西過景靈宫朱雀門赴郊宫如景德之制從之仍令其日遣官詣景靈宫奏告吏部流內銓引對選人凡有私罪者皆未得改官上問輔臣曰私罪有幾王欽若對曰私罪固多然其間輕重不侔若趁衙謝弗及或墜笏失儀事雖至輕以不緣公事皆為私罪上曰有司當察情不可以小纍終廢甲戌詔自今此等勿礙改官初知豐州內殿承制王文玉卒其母折氏與蕃官首領共請以文玉長子餘慶繼領州事既而又以文玉從子天門關巡轄馬遞鋪殿直懷信為請乃詔管勾麟府路軍馬公事高繼忠知府州折惟忠集蕃漢定議繼忠等言懷信擅入豐州犒設首領殺狗為誓欲奪餘慶位而折氏不能禁不可用文玉又有從子懷鈞以三班奉職監晉州鹽稅可使代餘慶者然文玉遺表嘗薦餘慶自代今亦乞與一官丁丑授懷鈞三班殿直知豐州補餘慶三班借職釋懷信不問戊寅遣度支員外郎祕閣校理李垂內殿崇班閣門祇候張君平按視滑衛等州河勢以歲稔將議塞決口也己卯幸國子監謁先聖文宣王召從臣升講堂令直講屯田郎中馬龜符講論語賜龜符三品服已而觀七十二賢贊述閲三禮圖問侍講馮元三代制度又幸昭烈武成王廟還幸繼照堂燕從臣龜符未見壬午翰林學士承旨李維等請加上真宗諡曰文明武定章聖元孝詔恭依祕書郎韓琚言自今闕官職田如正官到任該得敕限即給之或不該即盡收入官更不給權管勾者從之琚國華子也九月庚寅中書門下言真宗諡號皇太后皇帝尊號册寶其沿寶法物故事皆以黃金唯天禧中嘗用塗金上曰真宗皇太后宜以黃金而朕之沿寶物止用塗金皇太后諭宰臣曰皇帝嗣位初膺册命當用純金自餘止用塗金可也明道二年正月十七日景祐二年八月十七日可考上封者言河中府同華州嵗比旱災民多流徙請免支移稅賦上因謂輔臣曰百姓輸租便於本州奈何轉於他郡耶對曰西鄙屯兵若不移支民賦即為擾益甚特詔轉運司量減其數辛卯祠太一宫還駐輦觀道旁耕者仍遣中使慰勞賜以茶帛己亥閣門言舊制知瀛州合上殿近詔惟許路分鈐轄以上新知瀛州張昭逺緣兼高陽關鈐轄不該新制詔瀛州高陽關自今並令上殿庚子皇太后手書賜中書門下以故中書令郭崇孫子為皇后諭輔臣曰自古外戚之家鮮能以富貴自保故兹選於衰舊之門庶免他日或撓聖政也癸卯以度支副使禮部員外郎蔡齊為契丹生辰使供奉官閣門祇候李用和副之鹽鐡判官兵部員外郎張傳為正旦使供奉官閣門祇候張士禹副之兩制定皇太后於崇政殿受尊號册上以其禮未稱甲辰詔改就文德殿發册於天安殿然太后意欲就天安殿受册王曽言不可乃止丁未上諭輔臣曰昨燕宫中朕數四勉皇太后方聽樂王欽若尋以上語問太后太后曰自先帝棄天下吾終身不欲聽樂皇帝再三為請其可重違乎己酉免原州弓箭手州縣差役癸丑西天竺僧愛賢等來獻梵經各賜紫袍束帶知兖州工部侍郎李應機為將作監分司南京徐州居住會要二年九月事冬十月丙辰奉安真宗御容於洪福院壬戌上謂輔臣曰如聞滑州修河役卒多溺死者有司第以逃亡除其軍籍深可閔傷自今宜令明具溺死者姓名優給緡錢恤其家天慶五節舊制前後各五日不奏大辟案詔自今止禁前後各一日餘案惟正節日禁之丁卯上謂輔臣曰郊為重事朕欲先就禁中習儀其令禮官草具以聞戊辰上謂輔臣曰翰林待詔王文度近勒先朝御製碑已賜紫而更求佩魚且舊制伎術官皆不得佩魚以别士類也宜申警之三班奉職張永德祖母劉民年一百八歲上嘗召入禁中矜其年高詔與永德近地官以便侍養永德已見天禧五年庚辰新修三司成凡一千一百七十二區命知制詔宋綬為記辛巳詔自今赦書令刑部摹印頒行時判部燕肅言舊制集書吏分録字多舛誤四方覆奏或致稽違因請鏤版宣布或曰版本一誤則誤益甚矣王曾曰勿使一字有誤可也遂著於法王子融云寇萊公嘗議模印赦書以頒四方衆不可而止其後四方覆奏赦書字誤王沂公始用寇議令刑部鎖宿雕字人模印宣布因之日官亦乞模印歷日舊制歲募書寫費三百千今模印止三十千或曰一本誤則千百本誤矣沂公曰不令一字有誤可也自爾遂著於令子融稱議初出於萊公不知何據今但取正史實録稍增益之流內銓磨勘到選人王揆等八人歷任功過引見上曰內有逐任出入人罪者自今勿差充刑獄官十一月甲午加上真宗諡乙未朝饗玉清昭應宫景靈宫丙申饗太廟丁酉合祀天地於圜丘大赦百官上皇帝及皇太后尊號賜百官諸軍加等令三司權住和布紬絹一年減歙州上供紙三之一乙巳立皇后郭氏辛亥王欽若封冀國公曹利用改封魯國公文武百官並加恩故事輔臣例遷官參知政事吕夷簡與同列豫辭之遂著於式宋敏求春明退朝録云建隆至天禧每朝廷大禮二府必進官天聖二年南郊吕夷簡懇請乃止自是加恩而已按咸平初孫何建議已嘗釐革敏求偶不記國史因之十二月戊午兵部員外郎直史館知蘄州李夷庚分司西京舊制蘄州鹽麴錢折納木炭以供鑄錢夷庚擅令納絹而民貧不能以給轉運使奏至上因問其素所為王欽若對曰夷庚前守數郡多不法在蘄益甚故責之乙丑作慈孝寺此據會要丙寅權判都省馬亮言天下僧以數十萬計間或為盜民頗苦之請除歲合度人外非時更不度人乃自今毋得收曽犯真刑及文身者係帳詔可庚午令開封府每歲正旦冬至禁刑三日端午一日其施之總噶爾嘉勒斯賚埒克遵遣大首領斯多正來貢方物丙子詔京朝官丁憂服闋自今降告敕下御史臺令於三院御史廳下拜授之己卯契丹遣右監門衛上將軍蕭侼高州觀察使李延來賀正旦是冬契丹大閲聲言獵幽州朝廷患之以問二府皆請備粟練師以待不虞樞密副使張知白獨言契丹修好未逺今其舉兵者以上初政觀試朝廷耳豈可自生釁邪若終以為疑莫如因今河決以防河為名萬一有變亦足應用未幾契丹果罷去雄州候卒報有兵入鈔邊衆皆恐知州高繼忠曰契丹歲賴吾金繒何敢渝盟居自若已乃知渤海人叛契丹行剽兩界也司馬光記聞云天聖初契丹遣使借塞內地牧馬朝廷疑惑不知所答王欽若方病在家章獻太后命肩輿入殿中問之欽若曰不與則示怯不如與之太后曰北敵強梁奈何延之塞內欽若曰契丹以虛言相恐喝耳未必敢來宜密詔曹瑋使奏乞整頓士馬以備非常太后從之契丹果不入塞瑋時知定州歐靖聖宋掇遺云王欽若再入中書天聖初北朝遣使致書稱彼境荒饉借雄州之地畋獵時欽若假告中外未知所答數日欽若朝上詢其事欽若對曰願假與之上曰理將何如欽若曰咸平中彼來侵疆豈先有書乎遂依答之甚捭闔焉二事或即此年事然曹瑋時知天雄軍明年十一月欽若卒四年正月又徙永興七月復知天雄軍未嘗知定州也皆恐傳聞之誤今悉不取
