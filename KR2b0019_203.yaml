body:
  text: 續資治通鑑長編卷一百九十九宋李燾撰仁宗嘉祐八年秋七月乙巳侍御史呂誨為起居舍人同知諫院辛亥詔諸道押即位進奉人各與官有官者與推恩勿試以乾興押進奉人皆試詩於學士院已而不合格者例與官故有是詔知諫院司馬光奏竊見諸路轉運使提㸃刑獄知州軍等各遣親屬進奉賀登極表至京師朝廷不問官職髙下親屬逺近一例推恩乃至班行幕職權知州軍或所遣之人非親屬者亦除齊郎及差使殿侍此蓋國初承五代姑息藩鎮之弊故有此例後來人主嗣位之初大臣因循故事不能革正國家爵祿本待天下賢才及有功效之人今使此等無故受官誠為太濫况近年官吏繁冗十倍於國初之時朝廷深知其弊所以數年前别定制條减省諸色奏䕃之數若進表之人皆得一官則又并增數百入仕之人是嚮來减省悉為虛設今縱不能盡罷此等恩澤其進表人若五服內親者或乞等第受一官其無服非親屬者並量賜金帛罷去庶幾少救濫官之失同修起居注鄭獬亦以為言且曰昔真宗初即位有事於南郊舊例羣臣皆得遷秩而真宗以為僥幸太甚遂命止加勳階真宗已常革濫賞於南郊之初則陛下亦冝絶繆恩於登極之後也執政謂已行之詔難於復改遂寢其議壬子初御紫宸殿退御垂拱殿中書樞密奏事帝自六月癸酉不御殿至是始見百官感慟者久之其後隻日御前殿雙日御後殿惟朔望則前後殿皆不御至祔廟如故丙辰夏國主諒祚遣使來弔慰見于皇儀殿門外其使者固求入對弗許諒祚所上表輒改姓李賜詔詰之令守舊約詔書見王圭集司馬日記亦具載之司馬光言伏聞夏國所遣使人前日不肯門見固求入對朝廷不許勒歸館舍臣愚竊以陛下繼統之初四方皆欲瞻望天表窺覘聖德又聞向曾不安意謂未能視朝所以使人之心敢爾桀黠今若深閉固拒不聼入見則必疑有所隱避益足使之驕慢况即日陛下巳御正殿臣謂何惜紫庭數步之地使之稽首拜伏瞻仰清光庶幾得識陛下神武之姿知必能鎮服四海歸至其國轉相告語使其蜂蟻之衆心服氣沮不敢窺邊此所謂上兵伐謀不待戰而屈敵者也丁巳契丹使祭大行皇帝于皇儀殿遂見上于東廂上慟哭久之使人言及大行輒出涕庚申詔前敕有司自四月壬午放羣臣正衙見謝辭冝如故癸亥契丹使辭於紫宸殿命坐賜茶故事當賜酒五行自是終諒暗皆賜茶而已丁邜詔羣臣當上殿者今如故戊辰百官議大行皇帝諡於南郊用王圭議也初契丹主宗真母蕭氏愛少子宗元欲以為嗣宗真之重熙二十三年王拱辰報聘宗真常為拱辰言之其明年宗真死洪基嗣立以宗元為皇太叔洪基之清寧三年蕭氏卒宗元怙寵益驕恣與其相某謀作亂及相某以貪暴黜宗元懼謀愈急洪基知其謀隂為之備是月戊午宗元從洪基獵于涼淀洪基讓宗元先行宗元不可洪基先行依山而左宗元之子楚王洪孝以百餘騎直前射洪基傷臂又傷洪基馬馬仆其太師某下馬掖洪基使乘已馬殿前都㸃檢蕭福美引兵遮洪基與洪孝戰射殺之洪基兵與宗元戰宗元不勝而遁南趣幽州一日行五百里明日被殺燕京留守耶律明與宗元通謀聞其敗領奚兵入城授甲欲應之副留守某將漢兵距焉㑹使者以金牌至遂禽斬明洪基尋亦至陳王蕭孝友等皆坐誅先遣來使者數人悉宗元之黨也過白溝並以檻車載去誅之獨蕭福延以兄福美有功得免時清寧九年也此據司馬光日記其稱相某及太師某副留守某皆不得其名故也當考八月庚辰王圭議上大行皇帝諡曰神文聖武明孝廟號仁宗辛巳詔軍頭司引見公事如故司馬光言人君之職有三而已量材而授官一也度功而加賞二也審罪而刑罰三也材有短長故官有能否功有髙下故賞有厚薄罪有小大故罰有輕重此三者人君所當用心其餘皆不足言也臣伏見國家舊制百司細事如三司鞭一胥吏開封府補一廂鎮之類往往皆須奏聞崇政殿所引公事有軍人武藝國馬芻秣之類皆躬親閲視此蓋國初艱難權時之制施于今日頗傷煩碎陛下龍興撫運聖政惟新臣愚以為冝令中書樞密院檢詳中外百司自來公事須申奏取㫖及後殿所引公事其間不繫大體非人君所冝躬親者悉從簡省委之有司陛下飬性安身專念人君之三職足以法天地之簡易致虞舜之無為誠天下幸甚光又言陛下踐阼以來於今五月深執謙巽端拱淵默羣臣奏事一無可否中外之情深為鬱鬱向者猶謂聖體不安今御殿聼政已遵舊式出入起居皆復常度而獨於萬幾未知裁决臣竊惑之臣愚伏望陛下凡兩府及羣臣奏事稍留神省察詢訪利害議論是非可則行之否則却之使四方翕然瞻仰聖德億兆羣臣不任大慶光上殿劄子二道不得其日今附見軍頭司引見公事之後是月司馬光言伏見醫官宋安道等四人昨以侍先帝醫藥無狀降授諸州散官尋以陛下聖體不安大臣憂恐權留安道等診候御脉今已及百餘日聖體終未平復安道等方術無驗較然可知且其人皆得罪於先帝臣謂陛下不冝赦其罪戾留在京師並乞發遣令赴貶所僧智緣本不曉醫但以妖妄惑衆於江淮間自云診脉能知災福今亦出入禁庭叨忝章服察其療疾實無所益伏乞奪去紫衣放歸本州凡用醫之道在謹擇其人而專任之然後良工得盡其術而功效可見今聞診御脉者常以十數工拙相雜是非混淆發言進藥更相倚伏雖有俞扁之術將安所施於是强者自專弱者附㑹雷同比周共為誑罔不顧聖體務為身謀但云脉氣平和臟腑無疾然而旁側之人竊觀形證豈得為安寧復舊如醫官所言哉日月益深根柢益固四海憂畏焦心墜膽臣愚伏望陛下思一身之安危繫羣生之禍福深自重惜不可因循博訪京邑四方通醫術者精擇一人使之專診御脉聼用其言服食其藥若旬日之間全無應效則斥去不用别更擇人如此必遇良醫痊復有日臣不勝區區惟聖慈少加采察九月庚戍詔以皇子位為興慶宫既而知諫院吕誨言唐有此宫名改曰慶寧辛亥皇子光國公仲針為忠武軍節度使同平章事淮陽郡王改賜名頊樂安郡公仲糾為明州觀察使祁國公案仲糾同時改賜名皓仲恪為耀州觀察使鄠國公賜名頵己未永昌郡夫人翁氏削一資翁氏位有私身韓蟲兒者自言常汲水仁宗見小龍纒其汲而出左右皆莫見因召幸焉留其金釧以為驗仍遺之物蟲兒遂有娠於是踰十月不産按問皆蟲兒之詐得金釧於佛閣土中乃蟲兒自埋之也太后以諭輔臣命杖蟲兒配尼寺為長髮而翁氏坐貶輔臣皆請誅蟲兒太后曰置蟲兒於尼寺所以釋中外之疑也若誅蟲兒則不知者必謂蟲兒實生子矣歐陽修私記載此事尤詳獨以蟲兒乃宫正仰搖真之私身與司馬光記不同今從日記壬戍皇子位伴讀王陶為淮陽郡王府翊善皇子位說書孫思恭為侍講太子中允集賢校理兼史館檢討韓維為太常丞充記室參軍陶等請王受拜不許吕誨言王今未出閣當且設師友不冝遂置僚屬臣欲朝廷先正陶等名位名位既正則禮分自安况王年已長當早令出閣開府建官翊善侍講自為僚屬於事體即無不順此據吕誨奏議帝既視朝前後殿而於聼事拱默謙抑御史中丞王疇上疏曰廟社擁佑陛下起居安平臨朝以時僅踰半載而未聞開發聼斷德音遏塞人情缺然臣常論奏願陛下釋去疑二日與二府講評國論明示可否而迄今言動寂寥中外未有所傳此蓋議論之臣辭情淺狹不能仰悟君聼伏望思太祖太宗艱難取天下之勞真宗仁宗憂勤守太平之力勉於聼决大政以慰母后之慈毋疑二謙抑自使聖德暗然不光未幾又上疏曰董仲舒為武帝言天人之際曰事在勉强而已勉强學問則聞見廣而智益明勉强行道則德日起而大有功陛下起自列邸光有天命然而祖宗基業之重天人顧享之際所以操心治身正家保國者尤在强勉力行也陛下昔在宗藩已能務德好學語言舉動未嘗越禮是天性有聖賢之資自疾平以來于兹半載而臨朝髙拱無所可否羣臣關白軍國之政者日益至其請人主裁决者日益多然猶聖心盤桓無所是非者何也得非以初繼大統或慮未究朝廷之事故謙抑而未遑耶或者聖躬尚未寧而不欲自煩耶抑有所畏忌而不言耶茍為謙抑而未皇則國家萬務日曠月廢其勢將趍於禍亂無疑也若聖躬未寧則天下之名醫良工日可召於前而方技不試藥石不進飬疾於身坐俟歲月非求全之道茍有畏忌而不言則又過計之甚也今中外之事無一可疑無一可畏臣常為陛下力言之矣陛下何不坦心布誠廓開大明以照天下外則與執政大臣講求治體內則於母后請所未至延禮賢俊咨訪忠直廣所未見逹所未聞若陛下朝行之則衆心夕安矣况陛下向居藩邸日夕於側者惟一二講學之師與左右給使之人爾雖修身行已賢業日新而知者無幾則是為善多而得名常少也然而終能德成行尊美名逺聞此先帝之所以屬心也今處億兆之上有一言動則天下知之簡册書之比之於昔是善行易顯而美名易成也然而尚莫之聞者是不為耳非不能也有始有終者聖賢之能事在陛下勉强而已冬十月癸未左司郎中知制誥張瓌為左諫議大夫瓌在先朝常建言密定儲副特録其功也此據瓌本傳中書奏舊制堂後官員外郎依舊供職至景祐初令至員外郎與外任緣堂後官未至提㸃皆不願出遂以所當轉官為子孫求恩澤至今㳂以為例今欲轉至員外郎者令依舊供職更不許求恩澤所有五房提㸃例雖次補亦合擇材今後如任內職事修舉年滿日即依舊供職推恩任用如弛慢不職即不俟年滿止與堂除知州從之東上閣門使眉州防禦使李端慤奏近歲閣門祗候以上領在京差遣不理資任是以各圖外任請令通事舍人閣門祗候一任在京一任在外從之仍令常選留十二人在京甲午葬仁宗神文聖武明孝皇帝于永昭陵皇城使果州團練使張茂則為內侍省押班司馬光吕誨言祖宗舊制內臣年未五十不得為內侍省押班茂則年方四十八陛下踐阼之初尤冝謹守祖宗法度以御左右之臣示天下至公若茂則果有才幹可用雖更留此闕二年俟其年及然後授之又何晚也臣恐茂則一開此例內臣攀援求進者多畫一之法從此隳壞人人相效不可禁止不若正之於事初也十一月己亥虞主至自山陵皇太后迎奠于瓊林苑太后乘大安輿輦如肩輿而差大無扇筤不鳴鞭侍衛皆減章獻明肅皇太后之半所過起居者咸呼萬歲庚子虞於集英殿先是五虞皆在途及是六虞猶用在途之禮上不親祭知制誥祖無擇知諫院司馬光奏請親虞御史中丞王疇亦以為言下禮院詳議謂冝如無擇等奏乃詔翌日親虞既而上不豫卒令宗正卿攝事光即奏臣昨言虞祭者孝子之事非臣下所得攝乞陛下親行其禮陛下幸聼臣命有司設親祭之禮也而陛下今復不出在列之臣無不愕然自失且昨有司不為陛下設親祭之禮猶可謂有司之失若今日之事則咎將誰歸此皆由臣蠢愚以彰陛下之過臣之罪重惟陛下裁之臣聞易曰不逺復無祗悔元吉孔子曰過而不改是謂過矣伏望陛下來日雖聖體小有不康亦當勉强親祭以解中外之惑然上竟以疾故訖九虞不能出也司馬光言臣先以醫官宋安道等診候御脉日久方術無驗乞行降黜别擇良醫使專其事考其功效以行賞罰自後寂然不聞朝廷施行臣以為聖體已安不敢復言今覩陛下不親虞祭乃知疾疹殊未痊平臣子之心何敢寧處竊聞宋安道等每奏皇太后及語大臣皆云陛下六脉平和體中無疾狀如此安道等不惟方術無效論其面謾之罪亦冝誅殛矣且安道等侍先帝疾至於今日而猶免於貶竄冝其無所懲戒不盡心也臣不知朝廷何意再三惜此數人不為國家正賞罰之法快天下之心也夫以四海之廣捨此數人之外豈無良醫患在上之人不求求而不得得而不使使而不專故也臣又聞病人能自知其病者未甚病也憎良藥而不受者病在內拒之也今竊聞陛下不安如此而常自謂無疾則病已深矣醫有良藥而陛下不服則已為病所拒矣若陛下不早覺悟而更求名醫強進良藥縱陛下不自惜奈宗廟社禝何此臣所以痛心疾首前有鼎鑊而不敢避者也伏望陛下察臣兩次所奏罷黜醫人之無功者召募四方明醫委大臣精選一名使之專診御脉聼用其言服食其藥以旬月之期察其能否如前所云以保養聖神為天下生民之福吕誨言恭惟聖體違豫日久太醫雖衆傳聞療治調護俱未得冝又聞所進湯藥聖意頗倦服餌致醫者不得盡其術臣竊疑醫官倡是言以為自全之計又慮人衆相倚依違度日中外之心徒益憂紊臣欲乞皇太后宸旨委兩府選擇善方脉者一二人俾專其事所進湯藥輪大臣一員淮陽王同內臣御醫供侍如此開悟上意服餌精專必見功效其醫官當重加賞或又無驗即嚴加責罰賞罰既明孰不用心所貴中外知治療調護之冝人心自安吕誨疏不得其時附見司馬光後甲辰上親祭虞主而不哭名曰卒哭舊無卒哭之禮於是用吕夏卿議始行之丙午祔仁宗神主于太廟樂曰大仁之舞以王曾吕夷簡曹瑋配享廟庭配享議實録載八月癸酉今附此庚戍詔州軍長吏舉精於醫術者令赴闕甲寅賜太常少卿孔叔詹金紫叔詹監裁造務以勞當遷上不欲以卿監賞管庫之勞故有是賜自是以為例是月司馬光上皇太后疏曰臣聞聖人之德使四海之外編户之民皆輻輳而歸之如孝子之奉父母其故何哉惟仁愛惻怛之誠以加之也故詩云豈弟君子民之父母夫四海至逺也編戶至微也誠之至也猶可以為父母况閨門之內血氣之親乎昔漢明德馬皇后無子明帝使養賈貴人之子烜以為太子且謂之曰人不必生子但患愛養不至爾后於是盡心撫育勞悴過於所生及明帝崩太子即位是為章帝亦孝性淳篤恩性天至母子慈愛終始無纎芥之間前史載之以為美談臣恭惟仁宗皇帝憂繼嗣之不立念宗廟之至重以皇帝仁孝聰明選擢宗室之中使承大統不幸踐祚數日遽嬰疾疢雖殿下撫視之慈無所不至然醫工不精藥石未效竊聞嚮日疾勢稍增舉措語言不能自擇左右之人一一上聞致殿下以此之故不能堪忍兩宫之間微相猜望羣心憂駭不寒而栗方今仁宗新棄四海皇帝久疾未平天下之勢危於纍卵惟恃兩宫和睦以自安如天覆而地載也豈可效常人之家爭語言細故有絲毫之隙以為宗廟社稷之憂哉臣是用日夜焦心隕涕側足纍息寧前死而盡言不敢幸生而塞默也伏以皇帝內則仁宗同堂兄之子外則殿下之外甥壻自童幼之歲殿下鞠育於宫中天下至親何以過此又仁宗立以為皇子殿下豈可不以仁宗之故特加愛念包容其過失耶况皇帝在藩邸之時以至踐阼之初孝謹溫仁動由禮法此殿下所親見而明知也茍非疾疢亂其本性安得有此過失哉夫心者神明之主也若有疾則精爽迷亂冥然無知言語動作不自省記不識親踈不擇貴賤此乃有疾者之常不足怪也殿下聰明睿智天下之理無所不通豈可責有疾之人以無疾之理也今殿下雖日夕憂勞徒自困苦終何所益以臣愚見莫若精擇醫士一二人以治皇帝之疾旬月之間察其進退有效則加之以重賞無效則威之以嚴刑未愈之時但冝深戒左右謹於侍衛其舉措語言有不合常度者皆不得以聞庶幾不增殿下之憂憤殿下惟寬釋聖慮和神養氣以安靖國家紀綱海內俟天地垂佑聖躬痊復然後舉治平之業以授之不亦美乎古之慈母有不孝之子猶能以至誠惻隱撫存愛養使之內愧知非革心為善况皇帝至孝之性禀之於天一旦疾愈清明復初其所以報答盛德豈云細哉臣之愚慮苦言盡此而已光又以疏諫帝曰臣兩曾上疏以陛下受仁宗之天下欲報之德當奉事皇太后孝謹撫諸公主慈愛勿使姦邪之人有所離間致兩宫有隙以上貽宗廟之憂下為羣生之禍叩心瀝膽極其懇惻未審臣言得達聖聼或萬幾之繁未嘗奏御也此乃成敗之端安危之本不可不察臣聞漢章皇帝乃賈貴人之子明帝使明德馬皇后母養之后盡心撫育勞瘁過於所生章帝亦孝性淳篤恩性天至母子慈愛始終無􅊏芥之間馬氏三舅皆為卿校列侯賈貴人終不加尊號賈氏親族無受寵榮者此前世美事今日所當法也詩云父兮生我母兮鞠我拊我畜我長我育我顧我復我出入復我欲報之德昊天罔極然則父母之恩不獨以其生已也拊畜長育居其大半焉陛下自齠齔之年為太后所鞠育恩亦至矣又况今日為仁宗皇帝之嗣承海內之大業乎臣謂陛下冝夙興夜寐昏定晨省親奉甘㫖承順顔色無異於事濮王與夫人之時也近者道路之言頗異於是紛紛藉藉深可駭愕臣竊惟陛下孝恭之性著於平昔豈一旦遽肯變更蓋鄉者聖躬未安之時舉動語言或有差失不能自省而外人訛傳妄為增飾必無事實雖然此等議論豈可使天下聞之也周書曰小人怨汝詈汝則皇自敬德古人有言曰禦寒莫如重裘弭謗莫如自修陛下疾疢未平固無如之何若既愈之後臣愚伏望陛下親詣皇太后閣克己自責以謝前失溫恭朝夕侍養左右先意承志動無違禮使大孝之美純粹光顯過於未登大位之時如此則上下感悅宗社永安今日道路妄傳之言何能為損也古之至孝者雖有不慈之母猶能使之感悟歡悅回心易慮况皇太后聖善之德著聞四方自陛下有疾以來日夜泣涕禱於神祗憂勞困瘁以冀陛下之安寧如耕者之望收涉者之求濟陛下豈不思有以慰安之也吕誨上皇太后書曰臣竊以兩漢而後諸侯王入繼聖統者甚衆或以功或以賢或以親或以黨四者之繼隆替所繫以功與親賢者何嘗不興隆於寶緒由黨附而至者未有不基乎禍亂哀平威靈之類是也千百載而下為之監戒今上生而敏睿天資英哲先帝知其厯數在躬又當近屬實以親而賢授之寶器及誕告於外歡聲翕然殿下以積勳之後配德仁宗主宣隂教天下䝉福上自潜德之初殿下鞠育保護者三十年矣先皇厭代宣導遺㫖掌握機柄佐佑聖嗣克安天步永我帝業丕功茂實固不待愚臣一二而談也上違豫以來重煩聼斷庶務允輯中外賴焉比聞流議喧傳上疾未間言或荒忽承顔之禮時有所闕殿下幾至不能容覆外臣罔測謂之然矣然竊慮小人乘間幸兩宫如是隂為交鬪以生他事殿下察其素履知其有疾故當責中臣之輔助擇太醫之調理又聞上意自倦服藥以致醫工久無效驗或者苦其瞑眩斯亦常情誠恐奉御之人但能偹禮不敢强之以服餌積日之深其誤不細惟殿下廣乎容納之度忘其惰慢之禮親閲湯劑為調治强之以嚴威煦之以恩愛如此人神和悅得不降祐上之起居必遂安適不然恩禮中闋慈孝兩失人言不已天下何觀其如先帝何三十年保育之功一朝而棄臣竊為殿下惜之臣重思療治之法即如是言萬世之計敢不為殿下陳論漢馬皇后畢明帝世克全美德以至鞠養章帝勞瘁過於所生母子慈愛始終無􅊏芥之隙章帝終為賢聖之主其保助亦已明矣史册書美世逺益光臣伏願殿下循修以為法度念先帝之顧託體聖躬之憂危宫中間言不可不察方四海顒顒日期振治萬幾取决不可遲疑雖神宇暫勞而宋祚安矣俟上躬和平還居清淨燕間和洽夀考豈不休哉况淮陽王及諸孫天資淳篤冝均撫育以盡愛慈繼繼承承本根為重儲副之位安可暫虛殿下冝上承天意下順人心謀及輔臣助成君德早議建立旁絶窺𨵦則廟社之福天下之幸也并以書勸帝盡孝道親藥物開陳切至多人所難言又乞密建東宮其書曰陛下踐阼以來聖體違豫雖天光臨下而德音鮮聞萬幾之事未嘗可否悉付中書密院皇太后關决於中自非輔臣承㫖兩制近侍亦不得造簾箔之下况踈逺之臣耶如是爵賞刑威一歸於政府使政府盡公則已脫有差繆何由取正下情所以壅閉中外所以慊然不安也為陛下謀者莫若早建元良內輔號令威福自中而出人知所歸而下無異心此當今之速效也漢文帝即位之初有司請預建太子以文帝英睿之君景帝賢明之嗣尚以不豫建為憂誠有謂也况淮陽王天資頴悟法當寵嫡冝預建立以固本根旁絶窺𨵦慰安人心斯萬世之利也伏望陛下廓開聰聼俯納愚忠審權柄不可移於下思機㑹不可失其時法漢文豫建之䇿為廟社長久之計上有聖后之翊輔下有元良之倚賴陛下髙拱巖廊仰成庶政泰山之安何以喻此如此則遊心清淨不言而化人神胥悅天意昭輔勿藥之喜計日可期矣方帝疾甚時云為多乖錯往往觸忤太后太后不能堪左右讒間者或隂有廢立之議昭陵既復土韓琦歸自陵下太后遣中使持一封文書付琦琦啓之則帝所寫歌詞并宫中過失事琦即對使者焚毁令復奏曰太后每說官家心神未寧則語言舉動不中節何足怪也及進對簾前太后嗚咽流涕具言之且曰老身殆無所容須相公作主琦曰此病故爾病已必不然子病母可不容之乎太后不懌歐陽修繼言曰太后事仁宗數十年仁聖之德著於天下婦人之性鮮不妬忌昔溫成驕恣太后處之裕然何所不容今母子之間而反不能忍耶太后曰得諸君知此善矣修曰此事何獨臣等知之中外莫不知也太后意稍和修又言曰仁宗在位歲久德澤在人人所信服故一日晏駕天下禀承遺命奉戴嗣君無一人敢異同者今太后深居房帷臣等五六措大爾舉動若非仁宗遺意天下誰肯聼從太后默然琦等見帝帝曰太后待我無恩對曰自古聖帝明王不為少矣然獨稱舜為大孝豈其餘盡不孝也父母慈愛而子孝此常事不足道惟父母不慈愛而子不失孝乃可稱爾政恐陛下事太后未至父母豈有不慈愛者帝大悟自是亦不復言太后事矣焚歌詞據韓琦家傳謂焚歌詞琦在陵下恐不然别録稱在中書今略加刪潤其他則據蘇轍龍川别志云大臣有預立皇子者隂進廢立之計既不出主名深恐必無之或當時宦官輩私有此議非大臣也如家傳所載太后問昌邑王亦競不知何人為太后言此今轍改為左右讒間者庶不失事實志又云歐陽修獨見帝按家傳則云韓琦獨見其勸帝盡禮於太后語意略同今改為琦等共云云或得其事之實也為案續通鑑綱目及琦修本傳俱以進諫兩宫七月間事當以此書為確先是十月輔臣請如乾興故事隻日召侍臣講讀上曰當俟祔廟畢擇日開經筵尋有詔直須來春司馬光以為學者帝王首務不冝用寒暑廢上納其言十二月己巳始御延英閣案宋時無延英閣當從宋史作邇英召侍讀侍講講論語讀史記呂公著講學而時習之曰說命王人求多聞時惟建事學於古訓乃有獲然則人君之學當觀自古聖賢之君如堯舜禹湯文武之所用心以求治天下國家之要道非若博士諸生治章句解訓詁而已又講有朋自逺方來不亦樂乎公著言自天子至於庶人皆須朋友講習然士之學者以得朋為難故有朋自逺方來則以為樂至於王人之學則力可以致當世之賢者使之日夕燕見講勸於左右又以左右之賢為未足於是乎訪諸巖穴求諸滯淹則懷道抱德之士皆不逺千里而至此天子之友朋自逺方來者也其樂亦大矣又講人不知而不愠不亦君子乎公著言在下而不見知於上者多矣然在上者亦有未見知於下者也故古之人君令有未孚心有未服則反身修德而不以愠怒加之如舜之誕敷文德文王之皇自敬德也劉敞讀史記至堯授舜以天下因陳說曰舜至側微也堯越四嶽禪之以位天地享之百姓戴之非有他道惟其孝友之德光於上下何謂孝友善事父母為孝善事兄弟為友辭氣明暢上竦體改容知其以諷諫也左右屬聼者皆動色即日傳其語於外既退王圭謂敞曰公直言至此乎太后聞之亦大喜劉敞事據行狀附見乙亥淮陽王頊出閣王辭兩宫悲泣不自勝太后亦泣慰諭遣之自是日再入朝以仁宗御書藏寶文閣命翰林學士王圭撰記立石己邜詔以國子博士陳俞舜制科第四等著作佐郎安燾常中進士科第三人與免逺官自今著為例燾開封人也庚辰命翰林學士王圭賈黯范鎮撰仁宗實録集賢校理宋敏求直祕閣呂夏卿祕閣校理韓維兼充檢討官入內都知任守忠管勾敏求時知亳州召用之辛巳詔審官院應京朝官有親戚妨礙合回避如到任未及一年即與對移本縣官相妨礙本州别縣對移本州官相妨礙於鄰路對移及一年以上者除祖孫及期已上親依此對移外其他親戚即候成資放罷令樞密院三班院並准此施行庚寅詔京師老疾孤窮丐者雖有東西福田院給錢米者才二十四人可别置南北福田院并東西各蓋屋五十間所飬各以三百人為額歲出內藏五千貫給之其後又賜以泗洲大聖塔施利錢增為八千貫龍川别志云英宗母曰仙逰縣君任氏典丐者治平中置福田院由此故也是歲天下戶一千二百四十六萬二千三百一十丁二千六百四十二萬一千六百五十一夏秋稅一千九百二十八萬四千二百六十五石以災害放七十二萬四千六百三十三石決斷大辟千六十六人
