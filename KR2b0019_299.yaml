body:
  text: 續資治通鑑長編卷二百九十五宋李燾撰神宗元豐元年十二月辛丑朔詔提舉司天監集厯官考算遼髙麗日本國厯與本朝奉元厯同異聞奏其後厯官趙延慶等言遼己未年氣朔與宣明厯合日本戊午年氣朔與遼厯相近髙麗戊午年朔與奉元厯合其二十四氣內有七氣時刻并逐月太陽過宫日數時刻不同壬寅詔轉運司管勾文字官舉京朝官知縣人并提刑司檢法官各不得隨本司出巡詔都提舉市易司人户賖當已輸足本息者見欠罰息錢特蠲其半即輸本息未足與展限半年候足日亦依此與明年正月八日所書更參考權判兵部許將言開封府界五路保甲義勇支費止有所減兵級請受賞給并弓手雇錢等充用乞從本部委提點刑獄司取索應減錢糧及郊賞衣賜折支等通全一年實數立額嵗令所屬分四季撥與提點刑獄司除義勇保甲可用物外餘並變錢樁管支給嵗終有餘即封樁從之御史何正臣言近奏檢正中書刑房文字杜紘頗僻害政聞刑房見行右諫議大夫吕公孺理雪失入死罪事而隂與苞苴往來慮别有請託兼聞公孺遣兵夫車乘多載酥梨送遺在京權要永興土産為之罄竭因緣騷擾乞下有司窮治詔公孺令陜西轉運司究實仍令杜紘具析以聞後紘具析公孺無理雪死罪事近送梨四十顆酥三斤臣巳遣人還之兼臣生平不識公孺未嘗有一字往還止因今送酥梨例得公狀見居家聽旨而轉運司亦言公孺所置酥梨及差兵卒視熙寧十年為多乃詔公孺罰銅十斤紘依舊供職御史黃亷言聞百姓傅澤妻常經開封府判狀以夫出外不知消息許令改嫁後判官蘇涓雇以為婢近因澤還家論理有司欲坐其妻之父罪而同列有疑之未決者案涓既是開封官屬必知澤妻妄乞改嫁而令人宛轉雇買乞盡理推治詔權發遣開封府許將根究以聞仍權以判登聞檢院杜欣與涓易任已而根究至該踈決乃止出涓知夀州詔諸軍軍使都頭以下並充兵額內人數正副指揮使以上於額外補置遇軍行分押諸隊令編敇所及殿前馬步軍司照會隊法修入已而上批將下諸軍擁隊如闕將校並以十將代之其將校依在京諸軍例額外補置令具人數進呈後樞密院以數奏詔并教閲廂界將校亦於額外補置提點修完京城所言修完畢功所差壕寨等人乞酬賞詔隨功力輕重與轉資減年支賜各有差癸卯上批入內西頭供奉官吳遵道造軍器及御前工作十餘萬可減磨勘六年詔三司給勾帖以提舉出賣解鹽司每嵗合用鹽萬席令於解州池場搬請其所賣錢令封樁嵗終具數以聞江南東路提舉司言吕嘉問違法不依户絶條以亡僧銀絹等給淨相乾明寺僧尼已牒江寧府根究又嘉問奏臣與江東監司等皆有嫌隙嘗乞下别路差官根勘而近者勘司又追逮臣私家使令之人恐何琬等煆煉未敢發遣已報制勘院為見聽朝旨竊慮琬等又誣臣拒抗乞早指揮移送又制勘院言追嘉問僕孫夀證僧子新入宅事嘉問輒占留不遣若每如此即猝難結絶乞罷嘉問潤州遣赴江寧府就劾詔送制勘院一處劾之其所追人令嘉問速發遣二年四月庚戌嘉問罷潤州甲辰詔開封府界提點司諸路監司分決繫囚內干照及事理輕者先斷遣詔內藏庫副使權太原府路鈐轄張世矩罷兼知火山軍河東都轉運司言準詔具土人武臣知州軍者以聞而世矩乃占籍府州故也四年四月十七日出矩繫府州獄開封府界提點司乞免封樁闕額禁軍請受等詔惟錢特免之樞密承旨司言準送下三司狀在京禁軍闕額封樁請受內錢絹特免其斛斗惟米可存留自餘衣賜等物並屬三司應副及小麥已無剩數欲乞特免勘會府界軍士衣糧等自當依外處例封樁其小麥如闕即令三司以細色糧充從之是日二府奏事語及淤田之利上曰大河源深流長皆山川膏腴滲漉故灌溉民田可以變斥鹵而為肥沃朕遣中使往取淤土親自嘗之極為細潤蓋上之欲愛利農民惻怛如此或于此附王孝先所申淤田費乙巳詔自今諸路轉運司並罷兼提舉本路市易司定州路安撫司言北界人于惟孝因傳逹北界事為北人收捕甚急今乞歸明望朝廷憫其纍報北事及嘗告捕北界刺事人李景等特推恩詔于惟孝與三班差使充江南指使河北緣邉安撫司嘗獲邉民王習所市北界馬即送順義軍上曰聞北界賣馬人法皆死又徙其家屬自今如北界無移文可遣人於界首縱還毋問賣馬者免令屠戮蕃民此據墨本所記聖德朱本簽貼云移入契丹傳檢契丹傳乃無此又不知是何年月姑附元豐元年十二月五日于惟孝下更須考詳軍器監言鄜延經略使吕惠卿乞給新樣刀下江浙福建路製造及先乞甲身等以虎翼甲身應副詔止令內弓箭南庫給短刃刀五萬五千口餘依奏建州進士虞蕃上書言太學講官不公校試諸生升補有私驗且陛下辨色視朝而講官赴太學常以已入而午出陛下日攬萬幾經筵勸講尚不數年而書畢今講官講周禮七年才及四卷又謂論語孟子道德之所在聖賢之所為陛下設科使參大經今未始有講乞令講官依諸司例早入監仍集諸生問答間日一升堂伏臘假不停説書及非假故毋因循廢講詔不公事委開封府根治以聞內申請事令國子監主判官相度劉摯疏云蕃以不得解故上書訟學官當考丙午詔西作坊監弓弩作河南府右軍巡判官席延賞衝替以上批延賞近以造弓不如樣雖取戒勵未足示懲今再取弓三張皆本作自造而苦良相逺蓋惟聽匠者之所為不躬自省視職事曠弛不治可知宜令本監别精舉使臣監當故也可并入己亥戒勵弓作官後己亥十一月二十九日詔給州助教敕告五十付陜西路都轉運司召人進納買九將什物等物料餘令轉運司應副仍展限通作三年了足鄜延路經略使吕惠卿言宥州牒請遣官與夏國邉官將蘇御帶分立文字依理識認并毁廢所侵耕生地及將西界前後逃背捉殺人馬界首交會本司近準朝旨定寫牒送馬五匹至宥州索所略人馬及根治作過頭首誡斷上批宜先令河東經略司檢蘇安靜元與西人要約文字圎備仍除所差折固更選諳熟邉事信實使臣一人牒鄜延路令移報宥州約日與已差定官於界首各出文字理辨交會其諾爾一户如是未敘盟以前逃背于誓詔當給還即具以聞知都水監丞范子淵言奉詔相視導洛通汴自今河隂縣西十里簽河處步量至洛口地形西髙東下可以行水乞差知水事臣僚再案視詔左諫議大夫史館修撰直學士院安燾入內都知張茂則同相視六月十五日可考二年六月十七日清汴成章惇作記詔應鄉村民願以所納義倉糧就便納縣倉者聽從知管城縣趙燮請也本志不載請人此月十五日云云舊紀書此是日日中有黑子如李凡十三日乃散龍圗閣直學士給事中吳中復卒戊申詔開封府界京東西將下兵每十人取一人令所差去教頭習馬射與免雜教其在京步人諸指揮弓箭手令殿前步軍司各選少壯有性格軍士十人付提舉教習馬軍所教習候教成遣歸元管軍司依見教軍馬法據見管人亦十人取一人展轉教習後上批在京弓箭手步人總五十八指揮今所教二十人充教頭實恐分教不給若俟展轉教習必遲久不能成就可再令每指揮取二人如性格椎鈍難教即令逐時簡換又詔內殿直以下諸班直闕額並據逐班直額管人數如闕二分以一分依例取簡增填餘一分內五釐以額外泛配人撥填五釐坐闕如闕二分以上準此若不及二分或雖及二分以上無額外泛配之人除例取簡一半增填外餘並坐闕經制熙河路邉防財用司言本司推行事務各已有緒乞自明年管一路嵗計用度詔具經制嵗入若干以聞已而本司奏約以元豐二年所入錢糧計一百餘萬貫石熙河嵗入貫石自元豐二年二月十八日丁巳移入此詔諸路將副聽比類熙寧附田令敕給職田正將視路分都監副將視藩府都監其青鄆州雖已撥黃河淤地及廢罷都監職田與將副而多寡未均並令改正樞密院言軍器監言河東路編排九軍會軍器當造竹長團排一千六百餘面緣工匠並造河北三州并鄜延路排别無作匠乞抽刷匠二百人應副仍候造三州并鄜延排了日併手製造詔軍器監馬軍團排止依見造竹排樣步兵長排依今年正月所降樣許刷廂軍百人餘依所申己酉分命輔臣禱雪于郊廟社稷兩浙提舉司言浙西民戶富有物力自浙以東多以田産營生往年造簿山縣常以稅錢餘處即以物力推排不必齊以一法今欲通以田土物力稅錢苖米之類各以次推排隨便敷納役錢所費民力所出輕重均一從之辛亥踈決在京繫囚雜犯死罪以下第降一等杖以下釋之畿縣及三京諸縣準此詔罷來嵗元日朝會壬子皇第七子建國公價卒年二嵗贈太師尚書令追封衛王諡悼惠其母邢婉儀也兩紀並書卒甲寅詔在京市易務上界勾當公事祕書丞應瑜減磨勘一年三班借職李漸二年大理寺丞郭規轉一官減磨勘一年杭州觀察支使董經換東頭供奉官各賜錢有差並計息推賞也詔大名府永濟鎮被水災醋戶依酒場被水蠲買名錢乙卯詔民納稅不及斗者免納義倉本志有之此月六日丙辰權御史中丞蔡確言河決曹村方議塞決口未定聞轉運使王居卿建橫掃之法決口斷流實獲其力而奏功之時居卿不欲自陳獨見漏落乞驗問居卿所置橫掃如有明效令都水監著以為法從之仍令修入靈津廟碑詔青州民王贇貸死刺配鄰州牢城初贇父九思為楊五兒毆迫自縊死贇才七嵗常欲復讎而以幼未能至是十九嵗以槍刺五兒斷其頭及手祭父墓乃自首法當斬上以贇殺讎祭父又自歸罪可矜故也河北緣邉安撫司言準樞密院劄子保州諜知北界燕京留守司指揮容城歸信兩縣鈐束拒馬河南兩屬户毋得納雄州貸糧事委本司考實如實即中書近降除放雄州歸信容城兩輸户賑貸米指揮且未須施行本司勘會南北兩界凡賑濟兩輸户及諸科率兩界官司承例互相止約其實彼此空文今北界亦止循緣舊例即非創始行移兼兩縣自九月起催至十一月中旬才納貸糧三十餘石自中旬北界止約至十二月中旬已納米萬餘石以此較之情實可見兼中書近奏兩輸户納米數乞倚閣候秋料催納以寬下户乞止依此奏施行從之丁巳詔陜西路提舉鑄錢司支大銅錢十萬緡付轉運司市糧草上批按閲京東西將下諸軍已支銀器可令提點刑獄司計直以封樁闕額禁軍納絹折還戊午以權知審刑院度支郎中崔台符為右諫議大夫大理卿屯田郎中直史館權發遣江淮等路發運副使寋周輔太常博士權判都水監楊汲為少卿丞及檢法官令舉官以聞先是上以國初廢大理獄非是要見國初廢大理獄事因以問孫洙洙對合旨於是中書言奉詔開封府司左右軍巡院刑獄皆本府公事而三司諸寺監等凡有禁繫並送三院繫囚猥多難以隔訊又盛暑疾氣熏染多致死亡官司各執所見吏屬苦于咨稟因緣留滯動涉嵗時深為未便參稽故事冝屬理官今請復置大理獄應三司及寺監等公事除本司公人杖笞罪非追究者隨處裁決餘並送大理獄結斷其應奏者并天下奏案並令刑部審刑院詳斷大理寺置卿一人少卿二人丞四人専主推鞫檢法官二人餘悉罷應合行事委本寺詳具以聞從之台符等既受命作大理寺凡十有七日而成十七日而成據李清臣記墨本所書不同朱本遂并削去新紀書以開封囚猥多復置大理獄舊紀載詔語差詳詔自今嵗起發坊場錢更不寄納市易務徑赴內藏庫寄帳封樁其逐路起發赴京支官員逺接雇人并召募押綱路費等錢于開封或祥符縣置庫仍舊令佐主之開封府請修完京城四壁留十步以墻為衛外容車馬往來詔止于七步外築墻以所減三步外添兩步共留五步為路其官私舍屋有礙者即止據見今地于五步外築墻為路仍免毁拆又詔真定府界塌崖嶺盜斫車輞者雅沁等三人别無意作過令放還北界三司言準送下判都水監宋昌言等奏乞支錢二十萬緡分與開封府河北路諸掃市梢草今未有錢物可給欲支市易務下界末鹽錢十萬緡從三司撥付本監依朝廷錢物例封樁仍逐年依數兊換非朝旨及掃岸危急不得支用從三司點檢拘轄從之己未詔罷都大提舉在京諸司庫務司其所領事令三司分𨽻所屬又詔自今司農寺除本寺官請受及吏人衣糧食鹽依舊三司支給餘支本寺所管常平免役頭子蹙零等錢從判寺蔡確請也壬戌檢正中書刑房公事杜紘罷檢正升一任太常丞監察御史裏行黃亷為集賢校理並權判刑部亷依舊同結絶御史臺根究公事詔大理寺官吏并現在公案等並歸刑部其當送大理獄結斷事自來年正月後依戊午詔施行詔權荆湖北路轉運使太常少卿孫頎以督捕詹遇等有勞特賜紫章服西京左藏庫使權荆湖北路都監彭孫設謀殺遇及獲婦女十八人馬七匹除崇儀使忠州刺史權發遣本路鈐轄仍賜錢五百千東作坊使權潭州鈐轄何次公捕獲賊黨三十四人馬十六匹然先以不救應仵全等見下孫頎劾罪候頎再奏到取裁其餘轉資減年及賜錢帛各有差御史中丞蔡確言比聞有人偽作臣論科場文字騰播都下御史黃廉已具奏蒙下有司購捕未獲聞所託文字久喧道路亦不難窮核但得傳道一人展轉推問必見所歸望增立賞錢根究主名雖經疏決特賜重行以懲造語作姦之風詔専令許懋根究增賞錢五百千許懋明年十一月以前廣東憲乞籍五州丁為槍手不知今任何官中書言江南東路制勘院言根究吕嘉問等事候江西提點刑獄李茂直到院結案然茂直近己丁母憂詔止令孫圭王安上朱炎同鞫之癸亥以翰林學士起居舍人兼侍讀權發遣開封府許將權知開封府中書言立大小使臣呈試弓馬藝業出官試格第一等步射一石發兩矢射親十中三馬射七斗發三矢馬上五種武藝問孫吳大義十通七時務邉防策五道文理優長律令大義十通七如中五事以上與免短使減一任監當三事以上免短使升半年名次兩事升半年一事升一季第二等步射八斗射親十中二馬射六斗馬上三種武藝孫吳義十通五䇿三道成文理律令義十通五如中五事以上與免短使升半年三事以上升半年兩事升一季一事與出官第三等步射六斗射親十中一馬射五斗馬上兩種武藝孫吳義十通三䇿三道成文理律令義十通三計算錢榖文書五通三如中五事以上升半年三事以上升一季兩事與出官從之舊紀云癸亥詔武臣入流猥雜蒞官從政無以甄别立試藝業法與實録不同新紀亦削去當考選舉志同選舉志云詔大使臣試弓馬藝業出官第一等步射一石矢十發三中馬射七斗馬上五種武藝孫吳義十通七時務邉防䇿五道文理優長律令義十通七中五事以上免短使減一任監當三事以上免短使升半年名次兩事升半年一事升一季第二等步射八斗矢十發二中馬射六斗馬上三種武藝孫吳義十通五策三道成文理律令義十通五中五事免短使升半年三事升半年兩事升一季一事與出官第三等步射六斗矢十發一中馬射五斗馬上兩種武藝孫吳義十通三䇿三道成文理律令義十通三計算錢榖文書五通三中五事升半年三事升一季兩事俱出官其步射並發兩矢馬射發三矢皆著為格此據本志增入志但稱元豐初敇提舉司天監所言先被旨應館閣所藏及私家所有隂陽之書並録本校定置庫收掌今編成七百一十九卷乞上殿進呈從之甲子婉儀邢氏進封賢妃妃乞免册命詔止進告兩紀並書進位詔罷三司推勘公事官減軍器監勾當公事審官東院流內銓及將作監三班主簿左右軍巡判官各一員又詔秦鳳路義勇保甲近已上畨未差兵部官案視慮官司推行法令不盡或有差違令同判兵部李深往檢點以聞詔京東開封府界將下馬軍闕馬逐將召買四嵗以上十嵗以下堪被甲馬其錢於封樁禁軍闕額請受內借支判大名府文彥博言據國子博士管勾外都水監丞耿琬妻安氏狀琬赴決口提舉兵夫至修閉畢工於靈平掃冒暑而死蒙賜絹二百匹乞免所賜特推恩子敏案耿琬實以勤事而死伏望特録其子詔敏與郊社齋郎引進副使京東西按閲將下馬步軍武藝張山甫等言京東第八將張建中所教兵衆比之諸將應格人數全少詔建中先衝替令轉運司體量如有罪狀即劾以聞乙丑詔熙河路經略司指揮熙州自今于闐國入貢如實惟齎國王表及方物聽發赴闕仍毋得過五十人驢馬頭數準此餘勿解發止令熙州安泊差人管勾依條許令賣買仍婉順開諭除乳香以無用不許進奉及挾帶上京并諸處貨易外其餘物並依常進貢博賣丙寅遼主遣寧昌軍節度使耶律隆太常少卿史館修撰王安期等來賀正旦丁卯殿前副都指揮使建武節度使賈逵卒贈侍中諡武恪逵嘗請加贈三代上諭以當令有司檢會及是逵家又以請上批逵武人能念親不忘雖不該郊禮可特許之據御集逵先請乃十月十七日得請乃明年二月十五日今并書之命西上閣門使樞密院副都承旨張誠一兼都大提舉燕設諸司應奉事馬軍都指揮使楊遂權殿前副都指揮使梓州路轉運提點刑獄司夔路鈐轄司言甫望箇恕子乞弟領兵讎殺生界夷人請楊三班所許物詔轉運鈐轄司以本司意諭乞弟昨官軍討夷賊其甫望箇恕能自撫遏部下夷衆把截地分不助羅胡茍等作過事以先差楊舜之許與物數給賜仍為隄備毋少致侵犯據平蠻録云遣招安將楊文簡與乞弟相約實録乃云楊舜之今從實録疑先遣文簡後存寶至又遣舜之也今不復出招安將姓名先是轉運判官程之才言羅茍村部正扼烏蠻出入道路近嵗與蠻為讎蠻不敢肆若平羅茍乞於其地置寨以制烏蠻詔下存寶相度始轉運司經畫羅茍事乞弟遣其徒一毛至納溪寨乞率兵助漢轉運司遣招安將報云不勞以兵來助若能撫遏諸夷擒捕羅茍餘黨送官官有賞若干存寶至復申行其説存寶既平羅茍止傍江置一寨以防拓羅茍而烏蠻道路蕩然無復控制又失給賞物及存寶分屯至梓遂間乞弟果以無羅茍梗路之虞遂率羅始黨村并晏州水路十二村夷衆僅五六千人由涇灘峽往攻戎州界落厠賴陪等村及江安縣界七姓十九姓夷人燒蕩村囤虜掠人畜刻牌強之俾輸以回薄江安城下索存寶所許之賂縣民驚擾知縣何宗範嚴備而告語之凡三日乃去留蠻判羅一蠻奴一毛以一魚一馬謝宗範回過夷牢村一毛為夷衆所殺羅一復奔縣求送歸縣以其本漢逃卒遂械禁之聞州州聞轉運鈐轄司鈐轄司聞朝廷獄成而斬之烏蠻知命自朝廷不敢以為怨止稱殺我一毛者夷牢夷人也元豐三年四月二十六日實録載乞弟犯江安事迹與平蠻録有不同處當參考别修是嵗宗室子賜名授官者五十人天下上戶部主戶一千九十九萬五千一百三十三丁一千六百五十一萬一千六十一客戶五百四十九萬七千四百九十八丁七百八十一萬五千四十一斷大辟一千一百四人詔畿內及京東西五路許賣晉隰礬陜西自潼關以西黃河以南逹于京西均房襄鄧金州則售坊州礬礬之出于西山保霸州者售于成都梓州路出無為軍者餘路售之禁私鬻者與越界者如私礬法食貨志係之元豐元年今附年末上每憤北人倔強慨然有恢復幽燕之志即景福殿庫聚金帛為兵費是年始更庫名自製詩以揭之曰五季失圗玁狁孔熾藝祖造邦思有懲艾爰設內府基以募士曽孫保之敢忘厥志凡三十三庫後積羡贏又揭以詩曰每虔夕惕心妄意遵遺業顧豫不武姿何日成戎捷據食貨志以詩更庫名實元豐元年今附年末仍取墨本元豐八年史臣敘聖德篇稍增飾之
