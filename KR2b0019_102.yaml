body:
  text: 續資治通鑑長編卷九十八宋李燾撰真宗乾興元年春正月辛未朔詔改元移今年南郊恩賞就二月朔頒行始命道士建道場於天安殿輔臣遞齊宿焚香上疾浸愈也丁丑權度支判官祠部郎中直史館章得象為梓州路轉運使得象自言母年踰七十旁無兄弟願免遐適庶遂色養詔許之仍領舊職刑部員外郎直史館陳從易為荆湖南路轉運使從易好學强記為人激直少容喜别白是非多面折人或戒以與人太盡從易終不變王欽若最善之嘗謂人曰數日不見簡夫輒忽忽不懌及廢居南京時丁謂方用事人畏謂無敢往見欽若者於是從易將欲過之遇汴水旱涸遂告謂曰從易願使湖外者非獨為貧也亦以王公在宋故就省之耳今汴涸義不可從他道進幸公許少留謂即大喜曰王公之門獨君知我者留從易權紏察刑獄從易不敢當乃聽歸館須汴通乃行館中待闕自從易始按實録從易權紏察在京刑獄乃去年十二月丙午其為湖南漕乃今年正月丁丑其先後似與傳所載不同或先為紏察改除湖南既除湖南復命紏察從易辭後命不敢當但於館中待闕故實録不再書乎當考初從易坐薦送别頭進士失實奪一官以父老求鄉郡宰相冦準惡其踈也除吉州從易因對自言改福州未行遭父喪及使湖外準時貶道州謂又謂從易曰廬陵之事可釋憾矣從易對曰當以故相事之耳謂有愧色其行志多類此癸未始命皇太子朝拜啓聖院太宗神御殿師傅宫僚悉從丁亥上御東華門觀燈戊戌秀州言積水為災民艱食詔本州秋稅殘缺悉倚閣之二月庚子朔上御正陽門大赦天下恩賞悉依南郊例水災州軍悉除其民逋租流民復業者例外更免其科納差役仍貸以糧種三司吏掌事及三十年無過者許出授三班職名三部各取一人諸司共取一人河東邊民因越北界市物刺配向南州軍者放停遞還本貫九朝紀事本末乾興元年上封事者言聖朝開國以來天下承平六十餘載然民間無蓄稍或饑饉立致流移蓋差役賦稅之未均形勢豪強所侵擾也又有諸般僥幸影占户門其戶下田土稍多便作佃户名字若不禁止則天下田疇半為形勢所占詔三司委衆官定奪奏聞三司參議欲應臣僚不以見任罷任所置莊田定三十頃衙前將吏合免户役者定十五頃為額又詔自今中外所上表章省去體元御極感天尊道應真寶運文德武功上聖欽眀仁孝之號羣臣再表請復稱之不允乃别上尊號曰應天尊道欽明仁孝癸卯詔從之然亦不果受冊蘇湖秀州雨壞民田詔出廩粟以貸飢民甲辰內外官並加恩宰臣丁謂封晉國公馮拯魏國公樞密使曹利用韓國公庚戌詔徐州賑貧民甲寅對宰相于寢殿之東偏上不豫浸劇宰相進曰聖體未和過於憂軫無乃以皇太子春秋尚富否上頷之數四宰相又曰皇太子聰明睿智天命已定臣等竭力奉之况皇后裁制於內萬務平允四方向化敢有異議乃是謀危宗社臣等罪當萬死上甚恱自上不豫以來太子出則監蒞軍國入則省視醫藥皇后悉傾宫閣中粧具財用遣使詣道宫佛寺天下名山勝境為上祈福者不可勝紀上每言皇后所行造次不違規矩朕無憂也太子動息后必躬親調護暫去左右則繼遣詢問至於乳保小臣皆擇謹願歲久者旦夕教其恭恪而太子純孝之德亦由天賦非常情所及焉蔡夔州直筆載上疾大漸大臣叩榻問候乃以指㸃胸又展五指再出三指以示丁謂等時有皇八弟燕王獨存仁宗先以建儲方年十三觀上意蓋所屬章獻隔帷見之候大臣退令近侍追之傳諭適來官家展五指又出三指只說三五日來疾勢稍退别無他意謂等諾之此事或政當此日然疑不敢著邵氏聞見録云真宗大漸之夕李文定與宰執以祈禳宿內殿時仁宗幼冲八大王元儼者有威名以問疾留禁中纍日不肯出宰執患之無以為計偶翰林司以金盂貯熟水曰王所須也文定取案上墨筆攪水中水盡黑令持去王見之大驚意其有毒即上馬去文定臨事大抵類此按當此時文定貶斥久矣或指他相則不可知又按仁宗實録真宗崩元儼以疾在告特遣中使告諭王扶疾至內庭號泣見太后既奉慰遂廬於宫門之側如此則真宗未崩已前元儼固不留宿禁中也恐邵氏誤耳今不取焉戊午上崩於延慶殿仁宗即皇帝位遺詔尊皇后為皇太后淑妃楊氏為皇太妃軍國事兼權取皇太后處分百官見上于延慶殿之東楹遣內殿承制閣門祇候薛貽廓告哀契丹京城內外並增兵衛罷工役初輔臣共聽遺命於皇太后退即殿廬草制軍國事兼權取皇太后處分丁謂欲去權字王曽曰政出房闥斯已國家否運稱權尚足示後且言猶在耳何可改也謂乃止曽又言尊禮淑妃太遽須他日議之不必載遺制中謂怫然曰參政顧欲擅改制書耶曽復與辨而同列無助曽者曽亦止時中外恟恟曽正色獨立朝廷賴以為重二事據王曽言行録曽本傳乃云謂欲去權字坐此忤太后意謂憸人必不能爾或謂竄逐後羞悔前作猥竊曽語以為己力欲欺世盜名而史官誤信之今不取言行録又云尊淑妃為皇大妃亦謂所增遺制本無之則恐不然若遺制果無曽豈容不力辨蓋曽未欲遽行特執奏而謂沮止曽耳曽自言此事宜不謬但記録者偶失之固當取其可信者江休復雜志亦云真宗上仙明肅召兩府入諭之一時號泣明肅曰有日哭在且聽處分議畢王文正作參政秉筆至淑妃為皇太妃卓筆曰適來不聞此語丁崖州曰遺詔可改耶衆亦不敢言明肅亦知之始惡丁而嘉王之直按雜志與言行録略同然丁謂但欲諂事明肅耳於淑妃何取焉若明肅果無此語謂安敢強增加以拂明肅意且謂當此時方寵幸未見惡也雷允恭敗詐乃覺恐江氏亦傳聞未審今不取王稱東都事略聖壽五十五殯于殿之西階羣臣上尊諡曰文明章聖元孝皇帝廟號真宗己未大赦除常赦所不原者百官進官一等優賞諸軍山陵諸費無以賦民京朝官服緋緑及十五年者並與改賜服色改賜服色以十五年為限登極用東封西祀例自此始詔有司議尊禮涇王元儼及諸皇親優加恩命羣臣詣東上閣門上表請聽政又詣東內門請皇太后延對輔臣皆批答不允表三上乃從之庚申命宰臣丁謂為山陵使分遣官往諸路告諭出遺留物賜近臣宗室主兵官先是輔臣請皇太后所御殿太后遣內侍張景宗雷允恭諭曰皇帝視事當朝夕在側何須别御一殿也乃令二府詳定儀注王曽援東漢故事請五日一御承明殿皇帝在左太后坐右垂簾聽政既得㫖而丁謂獨欲皇帝朔望見羣臣大事則太后與帝召對輔臣决之非大事悉令雷允恭傳奏禁中畫可以下曽曰兩宫異處而柄歸宦者禍端兆矣謂不聽癸亥太后忽降手書處分盡如謂所議蓋謂不欲令同列預聞機密故潛結允恭使白太后卒行其意及學士草詞允恭先持示謂閲訖乃進歐陽修作晏殊神道碑云丁謂曹利用各欲獨見奏事無敢决其議殊建言羣臣奏事太后者垂簾聽之皆無得見議遂定附𫝊正𫝊俱無此今亦不取甲子始聽政又賜輔臣以下襲衣金犀帶鞍勒馬有差丙寅宰臣丁謂加司徒馮拯加司空樞密使曹利用加左僕射並兼侍中參知政事任中正加兵部尚書王曽加禮部尚書樞密副使錢惟演加兵部尚書張士遜加戶部侍郎王曽謂丁謂曰自中書令至諫大夫平章事其任一也樞密珥貂可耳今主幼母后臨朝君執魁柄而以數十年曠位之官一旦除授得無公議乎謂不聽楚王元佐加兼江陵牧涇王元儼加太尉中書令兼尚書令進封定王充鎮安忠武節度使賜贊拜不名遣度支副使禮部郎中薛田為契丹遺留禮信使供備庫副使李餘懿副之戊辰貶道州司馬冦準為雷州司户參軍戶部侍郎知鄆州李迪為衡州團練副使仍播其罪於中外準坐與周懷政交通迪坐朋黨傅㑹也始議竄逐王曽疑責太重丁謂熟視曽曰居停主人恐亦未免耳蓋指曽嘗以第舍假準曽踧然懼遂不復爭知制誥宋綬當直草責詞謂嫌其不切顧曰舍人都不解作文字耶綬遜謝乞加筆削謂即因己意改定詔所稱當醜徒干紀之際屬先皇違豫之初罹此震驚遂致沈劇皆謂語也江休復云吕文靖作三事日值旬假丁晉公宅㑹客忽來招遂趨往至則懷中出詞頭簾下草寇萊公雷州制既畢覽之不懌曰舍人都不解作文字耶吕遜謝再三乞筆增損遂注兩聨曰當孽豎亂常之日乃先皇違豫之初罹此震驚遂至沈劇按吕夷簡天禧四年九月自知制誥改龍圖閣直學士權知開封府不在舍人院久矣又下詔責冦準等乃以二月二十九日其草詔時非旬假可知恐江氏誤也今不取當從龍川别志當直舍人乃宋綬龍川别志云丁謂逐李迪命宋綬草責詞綬請其罪名謂曰春秋無將漢法不道皆其事也宋不得已從之詞既上謂猶嫌其不切多所改定其言上前爭議曰罹此震驚遂致沉頓謂所定也按實録具載冦準及李迪責詞凖則曰為臣不忠迪則云附下濟惡並無春秋及漢法等語當是宋綬但從謂指草詔却自用己意行文故不同耳罹此震驚遂至沈頓乃叙說周懷政謀反事準坐與懷政通謀迪坐附㑹準初不叙爭議上前事也蓋迪與準同責而别志偶不及準故妄以爭議事附著之爭議亦何至震驚沈頓乎今不取謂惡準迪必欲置之死地遣中使賫敕賜二人中使承謂指以錦囊貯劍揭於馬前示將有所誅戮狀至道州準方與客宴客多州吏也起逆中使中使避不見問其所以來之故不答衆惶恐不知所為準神色自若使人謂之曰朝廷若賜準死願見敕書中使不得已乃授以敕準即從録事參軍借緑衫著之短才至膝拜敕於庭升階復宴至暮乃罷及赴貶所道險不能進州縣以竹輿迎之準謝曰吾罪人得乘馬幸矣冒炎瘴日行百里左右為之泣下既至吏獻以圖經首載州東南門至海岸十里準恍然曰吾少時嘗為詩曰到海只十里過山應萬重今日思之人生得喪豈偶然耶中使至鄆州迪聞其異於他日即自裁不殊其子東之救之乃免人往見迪者中使輒籍其名或饋之食留至臭腐棄捐不與迪客鄧餘怒曰豎子欲殺我公以媚丁謂耶鄧餘不畏死汝殺吾公我必殺汝從迪至衡州不離左右迪由是得全或語謂曰迪若貶死公如士論何謂曰異日好事書生弄筆墨記事為輕重不過曰天下惜之而已始中使迫迪上道通判鄆州范諷輒留數日為治裝祖行諷正辭子也諷先知平隂縣㑹河决王陵掃水去而土肥阡陌不復辨民數爭不能决諷為手書分别疆里民皆持去以為定劵無復爭者後通判淄州歲旱蝗他穀皆不立民以蝗不食菽猶可藝而患無種諷行縣至鄒平發官廩貸民縣令爭不可諷曰有責令無與也即貸三萬斛比秋民皆先期而輸鄆州承詔塞决河募民入芻楗而城邑與農戶等諷曰貧富不同而輕重相若農民必大困且詔書使度民力今則均取之此有司誤也即改符使富人輸三之一因請下諸州以鄆為率朝廷從其言宣徽南院使鎮國軍留後曹瑋責授左衛大將軍容州觀察使知萊州瑋時任鎮定都部署丁謂疑瑋不受命詔河北轉運使侍御史韓億馳往收其兵先是億嘗受詔為向敏中諸子析私財丁謂使所親謂億欲市向氏長安華嚴川田億至向第面戒諸子曰土田衣食之原决不可鬻由是忤謂意謂欲緣是并中億而瑋得詔即日上道弱卒十餘人不以弓韔矢箙自隨謂卒不能加害億以侍御史為河北漕但實録附傳不詳正傳遂削去今追載之户部侍郎知青州周起責授太常少卿知光州給事中知杭州王隨授祕書少監知通州知海州王曙授郢州團練副使兵部郎中知光州盛度授和州團練副使凡前附冦準者並再加貶黜三月壬申以樞密直學士給事中李及知杭州及性清介所治簡嚴喜慰薦下吏而樂道人之善惡錢塘風俗輕靡不事宴游一旦冒雪出郊衆謂當置酒召客乃獨造林逋清談至暮而歸居官數年未嘗市吳物比去惟市白樂天集龍圖閣直學士兼侍講魯宗道權判流內銓宗道在選調久患銓格煩密及知吏所以為姦狀於是多釐改之又悉書科條揭於廡下以便選人甲戌長公主並為大長公主福國進封鄧國建國封申國鄂國封冀國仍升鄧申冀為大國丙子賜羣臣御飛白書各一軸上始未嘗為飛白書一日至真宗靈御前見所陳飛白筆遂取而試書體勢遒徑有如夙習因以分賜焉戊寅中書請自禫祭後隻日於崇政殿或承明殿視事雙日如先帝故事前後殿皆不坐詔雙日雖不視事亦當宣召近臣入侍講讀冀不廢學也有司以元德明德皇后二忌在易月禫祭內請權停百官行香并進名奉慰從之乙酉作受命寶其文曰恭膺天命之寶命參知政事王曽書丙戌出內藏庫銀二十萬兩錢三十萬貫下諸路又出錢三十萬貫下三司許商人入便於河北助給軍費詔䕫州引水槽筒竹木並當給以官錢毋得擾民從閣門祇候劉繼宗請也丁亥禮儀院定常程見謝辭就隻日奉命急速閣門辭謝見就雙日從之尋詔雙日隻日並許見謝辭詔在四月二十六日今并此庚寅初御崇德殿聽朝皇太后設幄次於承明殿垂簾以見輔臣丁謂等奏曰屬者太后受遺總政羣情協寧實天命所定太后遣內侍答曰先帝升遐內外晏然皆卿等夙夜盡忠謂等各再拜丙申鎮戎軍言弓箭手指揮使魏文義逢蕃賊戰敗欲令緣邉城寨首領等謹守疆埸無得生事從之是月羣牧判官殿中侍御史李周士司勳貟外郎同紏察在京刑獄趙賀言伏遇覃慶各有子乞於班行內安排從之又詔守司徒兼侍中丁謂表弟唐儀授殿直兩浙監當守司空兼侍中馮拯女夫江隂軍判官劉立禮授京官館閣校勘參知政事任中正姻家曹州主簿田熙古參知政事王曽親外甥朱延世並與班行皆從其請也夏四月庚子朔降詔恤刑循故事也封上乳母福昌縣君林氏為南康郡夫人林氏錢塘人大中祥符初繇劉美家入宫天禧末皇太后內管政事林氏預掌機密云辛丑贈皇叔祖秦王廷美為太師尚書令夔王光贊為中書令皇伯魏王德昭岐王德芳皇叔安王元傑曹王元稱並為太師鄆王元份為陳王鄧王元渥為密王信都郡王德彛為頴川郡王皇兄周王惟佑為中書令南陽郡王惟吉為太尉恭孝太子元僖改諡昭成史官曰按禮經既葬言諡蓋謂陳其行迹録以為名衛公叔文子卒其子請諡於君曰日月有時將葬矣請所以易其名者是皆考行於闔棺之後讀誄於㑹葬之際也恭孝薨逝近三十年當時節惠尊名既定矣又恭孝之諡亦云美矣今乃易號為褒寵之恩非舊典也先朝臨御之初但加贈兄叔諸王官秩今循此制可矣掌禮者不能援古抗執時論惜之此據㑹要附見壬寅以光祿寺丞尉氏馬季良家本茶商劉美女壻也於是召試館職太后遣內侍賜食促令早了主試者分為作之此據江休復雜記主試者學士晏殊也癸卯詔三司許商人就山陵入中軍糧乙巳增置貴儀在淑儀之上丙午加贈皇太后三代父太師尚書令通為彭城郡王母徐國太夫人龐氏為越國太夫人兄昭德節度使兼太尉美為侍中壬子命兵部貟外郎判鹽鐡勾院任中行崇儀副使曹珣使契丹告皇帝初登寶位也乙卯封參知政事王曽乳母朱氏為福昌縣太君真宗時選人試身言書判者第推恩上即位亦用前法壬戌特詔曰國家思皇政經詳核吏治先朝念碩乂之士或淹常選而以四事程其能朕承統緒循用舊典􅍀然羣彥來萃是塗乃命從臣精加評考或擢升京秩或序進賔筵或錫優資使處便地或假階勳以示甄寵其令翰林學士李咨與吏部流內銓以成資闕差擬於是前懷安軍判官宋若谷等六十五人咸第遷官改京秩者六人最下者猶注近地成資闕後卒以為常其試判用銓奏每道刑名具為通七分已下為粗不滿三分為不又考辭理書札之次書於卷首優稍優次低次紕繆凡五等二通一粗而辭理書札俱優為上一通二粗或二通一不而辭理書札並稍優為中三粗或二粗一不二不一粗而辭理書札俱次或低次紕繆為下辭理無所取而刑名通書札優亦中下其超資加階循資殿年如舊制判中下二不一粗辭理書札低次紕繆者注久闕官丙寅交州李公藴遣使來貢方物置杭州清酒務指揮四百人以𨽻酒官酒官舊增取賣酒息錢二千緡雇民充役於是改募兵士其後江寧府請如杭州例置百五十人亦許之五月辛未詔權停貢舉乙亥御崇政殿録繫囚雜犯死罪以下遞降一等杖以下釋之仍命樞密使覆視乃行丁丑詔先朝日歷起居注未上者亟修纂之蓋自大中祥符元年後史官失於撰集故也中書言舊制翰林醫官圖畫琴碁待詔轉官止光祿寺丞遇恩但加階勳而已天禧四年乃遷至中允贊善洗馬同正請自今轉官勿踰此制唯遇特恩即至國子博士不入少卿監從之乙酉詔以夏麥登熟令民謹蓋藏無得枉費丁亥詔發蘇湖秀旁近州兵疏導積水仍令發運使董之尋又遣職方貟外郎楊及往促其役乙未詔如聞三班院胥史頗邀滯使臣丐取財賄每㑹課遷改即隱匿簿書緣為姦弊自今犯者重置于法丙申龜兹國僧華嚴自西天以佛骨舍利梵書來獻丁酉置戎州瀘州通判各一員㑹要云從安撫使江德源所請當考詔諸路轉運使自今因事降充監當人不得差權知縣事附五月末六月己亥朔翰林學士承㫖李維上大行皇帝諡曰文明章聖元孝廟號真宗吏部流內銓言天下用縣官期滿而未代者八百員辛丑詔免守選人擬以代之又謂大臣曰比聞川廣幕職州縣官有過期未代者豈人情所樂耶其令吏部流內銓亟選代乙巳詔在京諸司免常朝者自今並自赴本司仍令宣徽院御史臺入內內侍省覺察以聞契丹主聞真宗崩集蕃漢大臣舉哀號慟因謂其宰相吕德懋曰與南朝約為兄弟垂二十年忽報登遐吾雖少兩歲顧餘生幾何因復大慟又曰聞皇嗣尚少恐未悉通好始末茍為臣下所間奈何及薛貽廓至具道朝廷之意契丹主喜謂其妻蕭氏曰汝可致書大宋皇太后使汝名𫝊中國乃設真宗靈御於范陽憫忠寺建道場百日下令國中諸犯真宗諱悉易之差殿前都㸃檢崇義節度使耶律僧隱翰林學士工部侍郎知制誥馬貽謀來祭奠右金吾衛上將軍耶律寧引進使姚居信來弔慰左金吾衛上將軍蕭日新利州觀察使馮延休弔慰皇太后丁巳使者入奠大行神御于滋福殿既而進慰書于東廂復詣承明殿進蕭氏書及其還也又辭大行於滋福殿退詣崇德殿閣門使宣大行遺㫖曰兩朝歡好務以息民繼及子孫又詣承明殿辭皇太后太常博士直集賢院同修起居注程琳接伴契丹弔慰使者使者將致問於皇太后琳謂曰昔先帝嘗與承天太后通使今皇太后乃嫂也禮不通問使者語屈己未降監鹽鐡判官都官員外郎楊蛻為屯田員外郎蛻接伴契丹祭奠使者在道虧失儀範故責及之蛻覃從弟也審官院言比選知縣京朝官為廣南知州通判頗屬僥幸其南雄英韶連賀封潮康端惠雍藤梧潯昭象栁十七州户口稍衆請差合入通判人從之庚申西京作坊使普州刺史入內押班雷允恭伏誅允恭既與丁謂交結謂深德之允恭倚謂勢日益驕恣無所憚始宦官以山陵事多在外允恭獨留不遣自請於太后太后不許允恭泣曰臣遭遇先帝不在人後而獨不得效力於陵上敢請罪太后曰吾非有所靳於汝也顧汝少而寵幸不歷外任今官品已髙近下差遣難以使汝若近上名目汝不知法禁妄有舉動適為汝纍允恭乞告不已時按行使副及修奉都監既受命踰旬矣乃特命允恭與張景宗同管勾山陵一行事三月乙亥允恭馳至陵下判司天監邢中和為允恭言今山陵上百步法宜子孫類汝州秦王墳允恭曰如此何不用中和曰恐下有石若水耳允恭曰先帝獨有上無他子若如秦王墳當即用之中和曰山陵事重按行覆驗時日淹久恐不及七月之期允恭曰第移就上穴我走馬入見太后言之安有不從允恭素貴橫衆莫敢違即改穿上穴及允恭入白太后太后曰此大事何輕易如此允恭曰使先帝冝子孫何為不可太后意不然之曰出與山陵使議可否允恭見謂具道所以謂亦知其不可而重逆允恭意無所可否唯唯而已允恭不得謂决語入誑太后曰山陵使亦無異議矣既上穴果有石石盡水出工役甚艱衆議籍籍步軍副都指揮使威塞節度使夏守恩為修奉山陵部署恐不能成功中作而罷奏以待命時五月辛卯也謂庇允恭猶欲遷就成之不敢以實聞癸巳入內供奉官毛昌達還自陵下具奏其事太后即使問謂謂始請復遣按行使藍繼宗副使王承勛往參定乙未太后又遣內侍押班楊懷玉與繼宗等俱丙申又遣入內供奉官羅崇勳右侍禁閣門祇候李惟新就鞏縣劾允恭罪狀以聞允恭欲自持所畫山陵圖入奏詔不許是月辛丑又遣內殿承制馬仁俊同鞫允恭癸卯又遣龍圖閣直學士權知開封府吕夷簡龍圖閣直學士兼侍講魯宗道入內押班岑保正入內供奉官任守忠覆視皇堂既而咸請復用舊穴乃詔輔臣㑹謂第議明日特命王曽再往覆視并祭告謂請俟曽還與衆議不異始復役詔復役如初唯皇堂須議定乃修築曽卒從衆議允恭坐擅移皇堂并盜庫金三千一百一十兩銀四千六百三十兩錦帛一千八百匹珠四萬三千六百顆玉五十六兩及當進皇堂犀帶一藥金七十兩又坐嘗令取玉帶賜輔臣而竊取其三於是杖死于鞏縣籍其家弟侍禁寄班秖候允中決配郴州編管邢中和貸命決配沙門島坐決配者又十七人仁宗實録允恭附𫝊云允恭日益驕橫太后惡而疏之故遣修陵城澗道按龍川别志乃允恭力請行太后始命之又按太祖太宗山陵除五使及按行使副修奉都監部置外郎未嘗别除同管勾一行事今特以命張景宗及允恭蓋寵之也决非疏惡意别志當得其實但誤以管勾一行事為都監耳都監乃盧守勤與按行使副相繼受命在旬日前矣兩朝丁謂𫝊亦以允恭為都監皆誤也别志又云王曽獨對太后乃知其事亟命官按劾亦恐失實蓋事發當自毛昌逹始曽既覆視還因言謂包藏禍心故容允恭擅易皇堂太后入其言謂果得其罪謂得罪實由曽發之發擅易皇堂事則非曽也初丁謂與雷允恭協比專恣內挾太后同列無如之何太后嘗以上卧起晚令內侍𫝊㫖中書欲獨受羣臣朝謂適在告馮拯等不敢决請謂出謀之及謂出力陳其不可且詰拯等不即言由是稍失太后意又嘗議月進錢充宫掖之用太后滋不恱允恭既下獄王曽欲因山陵事并去謂而未得間一日語同列曰曽無子將以弟之子為後明日退朝當留白此謂不疑曽有異志也曽獨對具言謂包藏禍心故令允恭擅移皇堂於絶地太后始大驚謂徐聞之力自辨於簾前未退內侍忽卷簾曰相公誰與語駕起久矣謂皇恐不知所為以笏叩頭而出癸亥輔臣㑹食資善堂召議事謂獨不與知得罪頗哀請錢惟演遽曰當致力無大憂也馮拯熟視惟演惟演踧踖及對承明殿太后諭拯等曰謂身為宰相乃與允恭交通因出謂嘗託允恭令後苑匠所造金酒器示之又出允恭嘗干求管勾皇城司及三司衙司狀因曰謂前附允恭奏事皆言已與卿等議定故皆可其奏近方識其矯誣且營奉先帝陵寢所宜盡心而擅有遷易幾誤大事拯等奏曰自先帝登遐政事皆謂與允恭同議稱得㫖禁中臣等莫辨虛實賴聖神察其姦此宗社之福也太后怒甚欲誅謂拯進曰謂固有罪然帝新即位亟誅大臣駭天下耳目且謂豈有逆謀哉第失奏山陵事耳太后少解令拯等即殿隅議降黜之命任中正言謂被先帝顧託雖有罪請如律議功曽曰謂以不忠得罪宗廟尚何議耶乃責謂為太子少保分司西京故事宰相罷免皆降制時亟欲行止召當直舍人草詞仍榜朝堂布諭天下謂所坐但私庇允恭不忍破其妄作未必真有禍心也然天資險狡多隂謀得政歲久要不可測雖曽以計傾之而公論不以為過也魏泰云吕許公權知開封鞫雷允恭獄凡行移推劾文字及追取證佐之人一切止罪允恭略無及謂之語獄具欲上聞謂信以無疑遂令許公對公至上前方暴其絶地之事按劾獄就鞏縣內侍羅崇勳實主之許公但與魯宗道覆視皇堂無與獄事也魏泰所聞誤矣以計傾謂乃王沂公然於獄事亦無與龍川别志所載蓋得其實泰又云沂公獨入劄子乞於山陵已前一切內降文字中外並不得施行又云今後凡兩府行文字中書須宰相參政密院須樞密使副簽書畢方許中外承受兩宫可其奏謂聞之愕然自失由是深憚沂公此事俱不見於國史實録以理勢度之謂方與允恭交結沂公雖有此奏亦未必從謂愕然自失當是沂公獨對發其擅易皇堂事耳今並不取丁謂附𫝊及正傳並云遺制軍國事兼取皇太后處分謂乃增權字耳太后稱制又議月進錢充宫掖之用由是太后深惡之因允恭擅易皇堂遂併録謂前後欺罔事竄之按王曽言行録謂乃欲去權字者𫝊誤矣僧文瑩湘山録載仁廟纂臨方十二歲未能待旦起已日髙太后遣中人𫝊㫖中書為官家年少起晚恐稽留百官班次每日只來這裏體㑹丁晉公在告馮相覆奏曰乞候丁謂出與商議及丁參告大后又𫝊㫖晉公口奏曰臣等止聞皇帝𫝊寶受遺若移大政於他處則理勢不順難以承禀晉公由此忤太后意復面責同列曰此事諸君即當申覆何須某出足見顧藉甚厚也晉公更衣馮謂魯參曰渠必獨作周公令吾輩為莽卓乃真宰相存心也丁謂忤太后㫖此當得其實然謂初議獨欲皇帝朔望見羣臣大事則大后與帝召對輔臣决之今乃不欲太后獨受羣臣朝似與前相反或姦邪亦往往堅持小正以售其大不正又意謂太后未必罪已故敢如此也但文瑩所載尚多抵牾且丁謂未敗時魯宗道安得遽參政今略删取并月進錢書之甲子宰臣馮拯為山陵使乙丑兩浙轉運司言蘇秀二州湖田生聖米頗濟飢民丙寅參知政事任中正罷為太子賔客知鄆州坐營救丁謂故也中正弟中行中師并坐降絀
