body:
  text: 續資治通鑑長編卷三百二十三宋李燾撰神宗元豐五年二月癸丑朔詔中書省面奉宣㫖事别以黃紙書中書令侍郎舍人宣奉行訖録送門下省為畫黃受批降若覆請得㫖及入熟狀得畫事别以黃紙亦書宣奉行訖録送門下省為録黃樞密院凖此惟以白紙録送面得㫖者為録白批奏得畫者為畫㫖門下省被受録黃畫黃録白畫㫖皆留為底詳校無舛繳奏得畫以黃紙書侍中侍郎給事中省審讀訖録送尚書省施行三省被受勑㫖及內降實封文書並注籍門下中書省執政官兼領尚書省先赴本省視事退赴尚書省申明及立條法並送尚書省議定上中書省半年一進頒下應速者先行應功賞並送所屬無定法者送司勳樞密院軍功不在此文武官三省樞密院各置具員中書省非本省事舍人不書吏部擬注過門下省並侍中侍郎引驗訖奏候降奏尚書省若老疾不任事及於法有違者退送改注仍於奏鈔內貼事因進入六曹諸司官非議事不詣諸省及過别曹應立法事本曹議定關刑部覆定干酬賞者送司勳如無異議還送本曹赴都省議體大者集議議定上中書省樞密院事上本院吏部差注官團甲由都省上門下省有違法者退吏部以事因貼奏諸稱奏者有法式上門下省無法式上中書省有别條者依本法邊防禁軍事並上樞密院應分六曹寺監者為格候正官名日施行舊紀書釐正三省樞密院六曹寺監職事新紀書頒三省樞密院六曹條例詔陜西諸路應經出界死亡義勇保甲人夫係本户正身者與免夏秋二稅兩料提㸃開封府界諸縣鎮公事葉溫叟言諸縣夏稅輸納有期方行倚閣續有㫖令上三等納本色緣本色多絲綿紬絹今已過時雖法許納錢而官估物價幾倍殆成空文詔諸租絲綿布帛折納並依實直上價涇原路經略司乞下買馬司買四千匹赴本路許買民馬相兼給諸軍從之詔慶州嘉木扎寨以安疆為名詔鄜延路轉運司諸軍病羸隨軍出而不能歸者賜其家絹十匹甲寅詔環慶路經略司昨出界將領官所部兵除死事及因傷而死外㑹計亡失數如及二分追一官二分半二官三分半四官四分五官四分半六官免勒停差遣依舊其降官至奉職各罷將副差遣令曾布據出界時分𨽻將領官所部及失亡數并應奪官人名位以聞其鄜延涇原秦鳳熙河河東路取㑹亡失數凖此詔熙河路洮河與黃河通接如可作䝉衝戰艦運糧濟兵令李憲計度兩浙路轉運司言知潤州鞠真卿侮法專威寮屬不得豫議及私遣衙校過揚州問市價諭市司增價糶職田米納本州衙前李誠妹踰法先支重難錢與李誠已遣官推治而真卿髙亢苛暴吏民承其積威莫敢訴仍恃年老意行不顧欲望罷真卿劾罪從之仍衝替上曰刺史縣令治民為最近漢自刺史有入為三公者蓋重其任爾今之藩郡不過數十往往多不得人則縣令可知也自今更宜謹擇乙卯詔行營諸軍病死許子孫承填名糧軍員下當直長行曾經行營凖此其人員安排子孫補本指揮右將虞候詔涇原路轉運司築城及軍須並先本路計置闕或非所産令都轉運司應副李憲言凖敕差權涇原路經略制置使其熙河路都大經制并節制秦鳳路軍馬合與不合依舊兼領陜西諸經略轉運司合應副本路兵馬軍須糧草其經略使監司乞許臣彈劾以次當職官乞許臣一面遣官劾罪陜西河東見任文武官乞許臣不拘常制選委應副雖有違礙並即發遣如敢占留並科違制乞差近上禁軍一指揮為牙隊詔熙河經制並節制秦鳳路依舊兼令乞牙隊差神衛餘並依奏詔借撥茶場司錢四十萬緡付秦鳳經略司市糧草裁造院言繡造儀鸞司什物欲依文思院繡扇例均與在京諸尼寺宫院詔三司除三院及下西川繡造外募人承攬丙辰文思使文州刺史內侍押班李舜舉為照管涇原路經略制置司一行軍馬兼參議軍吏大事權知開封府王安禮言本府奏斷公案御史臺一例取索竊以公事已奉㫖斷方更㸃檢於體不順欲乞自今不許取索從之并十五日詔殿前馬步軍司軍前逃回首身人免决嘗出界降料錢填開封府界京東西將下節級降長行仍押赴軍前宣效六軍分配車營致逺務東西窰務未嘗出界人並分配陜西五百里外內禁軍充本城宣效六軍充牢城詔昨興師誅乞弟今既蕩平巢穴即與禽捕乞弟同功其使臣軍兵等除留戍守外餘各遣歸林廣候措置新立堡寨畢回本任初廣失乞弟於納江去年十二月辛未也衆十萬皆無人色官吏噎默不能食乃令進寨追賊越七日次白崖二十五日丙子次白崖又五日壬午晦次老大人山山形皆刀劒立正月癸未朔上老大人山乙酉次黑崖丙戍過鴉飛不到山己丑乃至歸徠州大小茅屋才百餘間乞弟所居則以木為之亦百餘間自發納江即入叢箐無日不雨雪兵夫凍墮指者十二三疾病死亡不可勝數往往取僵尸臠割食之留歸徠州四日求乞弟不獲麥文昞問廣軍事當何如廣曰已如朝㫖蕩賊巢穴雖不獲元惡亦當班師待罪文昞乃出去年六月所受密詔云將來大兵深入討賊期在梟獲元惡如已能破其巢穴及城守要害雖未得乞弟萬一糧道不繼亦聽班師軍中皆呼萬嵗曰天子在九重明見萬里外乃定計班師癸巳發歸徠州循舊寨而還是月癸丑朔次江門廣與苗時中麥文昞輕騎同往樂共等處相視要害修築堡寨乃以樂共為城江門為寨梅令山席帽溪皆為堡西通淯共寧逺安溪以達江門東於大洲壩置堡以通納溪包括上下底蓬褒等村悉居腹內皆時中及程之才初為韓存寶先事經畫者也廣之進寨追賊中軍皆四出獨留疲老三百餘人在寨暮夜刁斗無聲時中問廣何如廣曰既失賊當就死不暇恤此耳時中曰公誤矣朝廷付公以十萬衆豈可同偏裨效一死為勇耶廣乃命止追者整軍而進又欲移兵討落毌部索乞弟時中曰公帥十萬衆深入死地元惡既失豈可妄加無罪族帳為朝廷更生事耶要當圖此十萬衆生還計耳廣從其言自納江至歸徠州暴師四十餘日糧道不至乏絶時中之力居多時中書或移見六月十五日時中遷官時上老大人山平蠻録在正月一日癸未次老大人山乃去年十二月壬午晦也實録以次老大人山在十二月二十八日庚辰舊紀書丙辰林廣平乞弟巢穴乞弟走軍不能前廣受密詔許班師三軍歡呼曰天子明見萬里之外廣全師以還新紀削去詔給涇原路經略制置司空名諸司使至內殿崇班敕告百東頭供奉官至三班奉職二百三班借職至殿侍軍大將劄子三百度僧牒紫衣師名敕百三司銀器二萬兩陜西買馬司馬千匹其應給輜重騾橐駝令致逺等務盡數起發少府監鑄蕃部本族巡檢銅朱記蕃部本族巡檢印氊帳錦袍金銀帶應賜物並豫給仍給兵幕千槍五千弓三千箭二十萬詔李憲以十三日進發丁巳命內藏庫使慶州團練使宋用臣都大提舉修尚書省五月十三日癸巳新舊紀並書作尚書省當考開封府言令文諸老幼疾病犯罪而孤貧無以入贖者取保矜放本府日决獄訟應贖者多孤獨貧窮又無鄰保不免責廂巡狀以便取保之文自今乞從本府審察貧乏直行放免從之開封府言左右廂收留罪人數多狴牢窄隘欲乞相度增展獄房添置鎖押下將作監責限一月了畢從之敕榜曉諭陜西百姓等訪聞昨經西討調發丁夫隨軍極為不易爾後邊事更不差夫出界令各安農業此據朱本以中書御筆修入墨本無之新本已修入六月五日乙卯合參照戊午上批方今西邊用師未已其境內靈祠宜謹修崇以迎福祐西嶽廟踈弊及熙州東嶽廟昨官軍之出若有靈助可下呂大防苗授各選官增繕詔殿前馬軍司限外首身逃亡兵級其所亡衣甲并冒請食錢口食更不根究只劾逃亡罪以聞河東經略司言代州聞立壕堠約用役兵五百與北界分定地分若北界人夫數多自合對行差撥一發開立若數少合用役兵比北界人數差仍只於代州縣寨剗刷應副正月十二日二十五日己未上批葉康直計定運糧廂兵亡慮數十萬諸處役兵並權罷令諸路轉運司剗刷廂軍京東六千人京西三千人河北八千人河東五千人淮南六千人并令都水監刷黃汴河河清及客軍共萬三千人赴陜西團結廂軍河清等並𨽻涇原路制置司詔承議郎天章閣待制河東都轉運使趙卨落天章閣待制追兩官免勒停知淮陽軍坐應副餽挽不如法及稽違朝㫖也卨絀知相州尋即潞州置劾還至隰州遇將趙宗本尚德王從伾其下凍餒聞再戍鄜延皆歡判有棄甲而遁者自隰至潞三奏請亟存恤言尤危切所親憂之卨曰吾寒生上擢近侍典方面當以死報若匿情逭譴可謂忠乎在河東上章凡二十四皆以兵擾民為言上意卒悟故責淮陽才半嵗復起舊紀書己未河東都轉運使趙卨稽違朝命乏軍興落天章閣待制知淮陽軍新紀不書提舉河北東西路保甲司言被水保甲乞候歸業㸃擇詔隔水之人仍就近附教勿令往來費力飲食失時庚申朝奉郎寶文閣侍制李承之承議郎董唐臣上編排鹽法承之賜銀絹各五十唐臣減磨勘一年辛酉上批新判刑部何正臣自擢置朝廷以來未嘗踐履刑獄職任可改差判兵部兼知審官東院詔董戩首領結凌死其朝辭物給其子董訥芝臨占增賜絹百匹癸亥詔沈括聞本路近奏功狀第四將下頗有漏落有功之人人情甚不允貼今正用人之際功罪如此不明何以使人盡力前以种諤庇護初奏本將不敢申明今諤既離本路可以盡情伸吐卿可體問的確有功恩賞未當之人保明奏聞不得少有稽滯罷廣濟河輦運司及京北排岸司移上供物於淮陽軍界計置入汴以清河輦運司為名命朝奉郎張士澄都大提舉先是京東路轉運司言廣濟河用無源陂水常置壩以通漕嵗上供六十二萬石間一嵗旱底著不行欲移人船於淮陽軍界上吳鎮下清河及南京榖熟寧陵㑹亭臨汴水共為倉三百楹從本司計置七十萬石上供置輦運司隸轉運司嵗減船三百五十兵工二千七百綱官典三十三使臣十一為錢八萬二千緡下提㸃刑獄司案實以為如轉運司言京北排岸司沿廣濟河置故并罷之七月二十日七年八月十九日元祐元年三月十九日崇信軍節度使開府儀同三司華隂郡王宗旦卒車駕臨奠輟視朝二日贈太尉勝王諡恭孝聽以旌節牌印葬及葬又為輟朝喪終又詔曰宗旦嘗侍仁宗講讀其後典司宗籍十有六年畏法寡過己推恩諸子幼子右內率府副率仲曖可遷右監門衛率府率新紀書華隂郡王宗旦薨舊紀不書李憲奏姚麟久更邊任兼有材武乞除熙河蘭㑹路鈐轄於蘭州駐劄如知蘭州李浩赴制置司即令麟權知蘭州從之密記十一日事麟改涇原鈐轄在正月二十二日乙丑詔熙河路經略都總管司至路分都監並加蘭㑹二字元祐四年八月己亥改㑹字為岷詔李憲看詳軍中功優賞輕者以聞熙河經略安撫司言定西城不住有賊馬殺略商人巡邏戍卒并聞衙頭指揮不任入漢界任便劫盜詔李憲羌人之性畏彊凌弱若不令守將相度機便却往酬殺將為憚怯啓侮不已則賊計得逞道路愈致艱虞可速與指揮丙寅知延州龍圖閣待制沈括知永興軍龍圖閣待制吕大防並為龍圖閣直學士括本路出兵守安疆界應副邊事有勞大防以鎮安所部協力邊事故也詔河北緣邊州軍保甲與兩輸户連接者更不起教雖緣邊而無兩輸户處不用此令詔興州防禦使仲騑罰俸一季坐非理燔灼人面也仲騑有妾騫始售其直數十萬間被酒灼敗其面因訴於官督歸其直知開封府王安禮曰妾之所以直數十萬者以善姿首也今灼敗之則無能自鬻此與炮烙何異乃奏於上請勿復其直并厚譴之以為戒上曰仲騑魯王之裔席寵怙勢鮮克由禮朕以近戚故每優假之比聞被按踧踖如不容且相戒毌敢犯卿今朕為卿罰其俸則過於受譴矣此據王安禮行狀增入行狀以仲騑為令騑誤也十一月二日當并此丁卯詔武昌軍留後同知大宗正宗惠進封江夏郡王知大宗正武勝軍留後宗晟同知大宗正新紀書封宗惠為郡王舊紀不書詔昨遣師問罪夏國其西蕃董戩亦遣親信首領部勒兵馬來濟軍威事功可紀董戩見議䇿勳其立功首領亦當推賞委苗授遣人因般擦告諭董戩鄂特凌古果莊詔提舉熙河等路弓箭手營田蕃部共為一司隸涇原路制置司許奏舉勾當公事官一員凖備差使使臣三員給公使錢千緡詔官品卑而任職事官品髙若議請減隔一等者聽從髙品隔二品以上應議者請應請者減史館修撰曽鞏言竊考舊史髙句驪自朱䝉得紇升骨城居焉號曰髙句驪因以髙為氏歷漢至唐髙宗時其王髙藏失國內徙聖歷中藏子德武安東都督其後稍自為國元和之末嘗獻樂工自此不復見於中國五代同光天成之際髙麗王髙氏復來貢而失其名長興三年乃稱權知國事王建遣使奉貢因以建為王建子武武子昭昭子胄胄弟治治弟誦誦弟詢相繼而立蓋自朱䝉至藏可考者一姓九百年傳二十一君而失國其後復自為國而名及世次興廢之本末與夫王建之所始皆不可考王氏自建至胄四王皆傳子自治至詢三王皆傳弟詢自天聖八年來貢至熙寧三年今王徽來貢其不見於中國者蓋四十有三年今陛下仁聖文武聲教之盛東漸海外徽所遣使方集闕下蓋髙句驪文字之國其使者宜知其國之君長興壞本末名及世次欲乞詔諭典客之臣問自德武之東也其後何以能復其國何以復失之嘗傳幾君其名及世次可數否王建之所以興者何繇其興也自建始歟建之先已有興者歟自天聖至熙寧四年十三年之間而徽復見於中國其繼詢而立者歟豈其中間復自有繼詢者歟徽於詢為何屬如其言可論次足以補舊史之闕明陛下德及萬里殊方絶域前世有不能致者慕義來廷故能究知四夷之事非聲教之所被者逺不能及此下畢仲衍仲衍以所與使人崔思齊李子威語來上其所知不詳於鞏所論著也所可紀者新羅百濟內亂王建遂合三韓易髙氏姓誦於治為逺宗王徽詢之子也又云髙氏聖歷元和間事皆有記録三韓自有史元和中獻樂兩部蓋唐樂鄉樂也上曰蠻夷歸附中國者固亦不少如髙麗其俗尚文其國主頗識禮義雖逺在海外尊事中朝未嘗少懈朝廷賜豫禮遇皆在諸國之右近日進伶人十數輩且云夷樂無足取者止欲潤色國史爾安燾等出使其國中館伴乃與上節人從庭下相揖蓋以其國主與燾均禮故也御史臺言刑察案於開封府取索公案本府稱已凖朝㫖奏決公案不許御史臺取索看詳公事未結案雖有人論訴不許取索已結案係奏斷本府又奏乞不許取索公案則是事在官司而所行稽違許人赴臺理訴乃為空文若訪聞官司煆鍊人罪出入刑名既無案卷則無從考察深恐六察之法文具實隳詔令開封府送公案與御史臺秦鳳路提㸃刑獄康識言熙河路四州軍弓箭手開拓之初所借牛種借助等錢及承地認缺之數近諸州軍依例檢舉督索緣逐人缺在軍前方此休養望令倚閣候嵗豐日依料次送納詔與展限二年己巳詔開封府六曹官任滿減磨勘一年詳定編修諸司敕式所言國家大禮曰南郊曰明堂曰祫饗曰恭謝曰籍田曰上廟號今若止以明堂祫饗南郊三事共為大禮式則恐包舉未盡兼明堂祫饗南郊難以并合一名須用舊文離修為式恭謝籍田歷年不講諸司案檢散亡今若此類大禮斟酌修定又緣典禮至重品式或有未具則奉行之際恐致廢闕抵牾以此未敢修擬詔恭謝籍田據文字可推考者修定詳定編修諸司敕式所言本朝每遇大禮皆循故事分使典領宰臣為大禮使兩制兩省分領四使今朝廷正官皆備乞更不差五使從之舊紀書己巳釐大禮事於有司各共其職罷五使上批諸保丁合給弓弩未得周遍致萃於保正家看守妨占人丁聞甚苦之其團教保丁弓弩弦箭令軍器監依數疾速支足詔陜西弓箭手闕額人數疾速以本家少壯餘丁補填如無即於客户內㨂選刺充其陳亡該承替自如法近臣有言朝廷當力行節儉者上曰為政有道顧理財何如爾節儉非帝王之事也儉者家行而已故禹克勤于邦克儉于家諸侯儉不中禮猶見刺於詩為天下者豈以節儉為能事哉此據朱史朱史自注云以中書時政記修入不知近臣是何姓名當考庚午詔沈括方用兵未艾正當愛惜財用其新復城寨尤宜百端省費乃可萬全保據無虞當無事時切勿妄增戍守兵馬一則傷財一則疲力今一方邊計悉責在卿一有闕誤必正典刑凡事惻怛勿為推責便文之計詔朱崖軍生黎户乞歸順其令張頡審計所宜不得生事詔鄜延路經略司聞緣邊防拓將下士卒頗有逃歸者勘㑹是實嚴行收捕為首人陵遲處斬餘並斬訖具人數以聞提舉汴河隄岸司言下水空船私載大理寺引律不坐有害本司課利乞自今下水船私載者並依私載法從之朱本削去云事小不書癸酉曲赦梓州路諸州軍應緣瀘州軍事廂禁軍並與特支錢緣軍事工役人夫並放今年夏秋稅及一料役錢死事之家量與給賜本路及鄰路緣軍事被差及科配將佐士卒有功者及文武隨軍應副軍期有勞並保明以聞其因傷不任征役者衣糧並全給若因戰亡沒及病死之家正兵及召募人有借請受并缺負主典少缺損壞隨軍官物非侵盜並除放十月丙寅可考舊紀書赦梓州路緣軍事被役者蠲其稅賦新紀同詔西蕃邈川首領西平軍節度押蕃落等使董戩封武威郡王賜金束帶一銀器二千兩色絹紬三千匹嵗增賜大綵五百匹角茶五千斤鄂特凌古為肅州團練使果莊甘州團練使森摩乾展伊州刺史各賜金束帶一銀器二百兩綵絹三百進奉使李察勒沁廓州刺史增嵗賜茶綵有差青宜結果莊止稱果莊阿令骨稱阿里骨新紀書封董戩為武威郡王舊紀不書詔知樞密院門下中書侍郎同知樞密院尚書左右丞為定班班次以是為差詔河東路提㸃刑獄承議郎集賢校理黃廉降一官坐不按省本路諸司及朝廷所賜金帛數言去歲出界所亡財用軍器兵夫不可勝計增事張皇奏乞降進納宣勑及令民納粟釋罪也四年十月十二日廉奏請云云廉行狀庭堅作更當考詳增入開封府言永興秦鳳等路當行方田準朝廷取稅賦最不均縣先行嵗不過一縣若一州及五縣不得過兩縣緣府界十九縣比一州事體不同似此推行十年乃定請自今年嵗方五縣送司農寺以為便民遂從之乙亥分命輔臣祈雨詔聞京西路多有河東陜西亡卒州縣官司皆不誰何可委本路監司專提舉所在搜捕依在京已斷法配本路開封府界差王得臣京西差馬琉仍降在京已斷配指揮提舉河北隄防司言大河自恩州臨清縣西傾側向東入御河衝刷河身深濬至恩州城下水行湍悍御河隄下闊不能吞伏水勢今相度欲趁河水未漲以前下手閉塞併歸大河詔如不礙漕運及灌注塘濼即依所奏施行并三月二十七日提舉河北路保甲司言兩路團教場當用錢六十萬緡乞支闕額禁軍及耆户長等役錢詔提舉保甲司具析支使名件以聞鄜延路經略司言準朝㫖涇原路制置司奏乞下諸路團結編排人馬並聽追呼起發鄜延路土兵弓箭手二萬五千內步人二萬騎五千蕃兵騎千合用馬萬匹本路馬數不足乞朝廷差發馬五千匹詔人兵依數起發內騎兵蕃兵各選有馬三千人餘闕馬人候到涇原路令制置司填又奏本路九將合用輜重人若許差義勇保甲即乞早降指揮及衣甲器械昨軍回亡失損壞極多朝廷給轉運司黑漆弓跳鐙弩各二萬衲襖萬四千旗五千乞輟起本路詔輜重人令涇原路制置司差發所乞軍器依奏熙河路都大經制司言相度通逺軍去定西城路為便乞自努扎堡以西隸通逺軍康古寨以北隸蘭州從之張世矩乞不拘常制選有心力使臣代不得力巡檢從之詔陜西諸路日者頻有西賊入寇宜令逐路經略司嚴誡城守密伺賊馬所在悉行討戮即毋為輕易致落姦便丙子承議郎集賢校理檢詳樞密院户房刑房文字梁燾知宣州未行改京西路提㸃刑獄以上批燾可與一東南監司差遣故也上批據三月十三日御集詔陜西逐路近頻有西賊入界劫略邊民委鄜延環慶秦鳳熙河蘭㑹路經略司選兵將使臣度輕重大小隨宜讎復詔前知澶州韓瓙都水監丞張次山蘇液北外都水丞陳祐甫判都水監張唐民主簿李士良都水監勾當公事錢曜張元卿罰銅有差大小吳掃使臣各追一官勒停澶州通判幕職官臨河濮陽縣令佐並衝替本路監司劾罪以去嵗河決不能救護提舉也詔沈括聞西賊聚兵宥州聲言來塞門保安軍界應接投來南界山羌未知虛實可於元管并新附屬羌中多方羈察勿致隱姦出入不意有害邊民潁昌府言準朝㫖應軍前逃亡人限一月自首免罪勘㑹至陜西路以東首者皆私越潼關或黃河法不許首詔能限內首者免越度關津罪渤泥國遣使入貢新紀書此依實録舊紀附年末知秦州吕公孺言經略司常平錢斛法以救恤屬蕃弓箭手之類今所存甚少望特權借提舉司錢斛相兼支俵仍展至三月詔權借錢斛五千貫石嶽州昭烈靈妃封孝靈妃以知嶽州李觀言靈妃羅氏女父為秦鐵官溺死尸不得女蹈水俱沒里民祀之後唐天成中已嘗冊贈故也丁丑上手詔答文彥博曰自逺相見忽經兩年春暄卿比平安前繼閲所論關中事宜甚悉至誠惻怛之意非纍朝心膂之臣憂國如家之深曷能惓惓如此寤寐忠嘉不忘乎懷朕涉道日淺昧於知人不能圖任將帥以天錫可乘之時上為祖宗殄滅一方世讎深用厚顔爰自六年還塞將士已憚勞黎民已告病今日之勢豈復可逺舉深入哉惟固境自全而已近特命於涇原制置者第使之城數亭障制虜衝軼耳非復有前日圖也所以張大其名若入討之為者蓋兵法有之用而示之不用不用固有示之用耳庶或可震之來威尋盟則朝廷因得復羈縻之也想卿有一體均休戚之誠諒已悉其措置大槩今因貽慶行故兹示諭彥博尋以劄子稱謝曰臣伏䝉聖恩以臣奏陳西事特令臣男貽慶特賜手詔一道并傳宣撫問者仰奉聖訓伏增感懼切念臣衰老不才荷陛下恩禮之厚舉朝無比惟知竭盡忠懇粗伸補報昨以西夏擾邊王師伐罪雜羌既已退縮大兵尚屯邊徼師之善志允當則歸因是奏陳上干宸聽庶幾狂瞽粗裨萬一豈謂愚臣過計難窺陛下聖謨天機固深睿算默定基命宥密逺猷克壯乃生靈莫大之幸實宗社無窮之福加以睿光曲照上德兼容迂陋芻蕘亦被矜采臣無任感戴欣幸之至此據文彥博集增入彥博論關中事附四年十二月末答詔最係要切不知史官何以不書當考六月五日並九月末可證此
