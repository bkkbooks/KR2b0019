body:
  text: 續資治通鑑長編卷五百十八宋李燾撰哲宗元符二年十一月己巳朔詔汴渠內流尸其間多非正命其下合屬相度令比附京西州軍添置鋪屋差人巡邏是日熙河奏种朴戰歿布録朴事具十月二十一日戰沒時庚午詔王贍引兵歸邈川其河南北戍守人馬令胡宗回相度一面從長措置訖奏布録辛未詔定國長公主元符元年南郊合得親屬恩澤二人特許回授與勾當本宅入內東頭供奉官王承矩賢妃宋氏親弟良哲各一官內王承矩與寄資涇原路經略使章楶既應詔發遣兵將赴熙河即具奏曰一本路差發人馬往應他路之急固是臣所願為但傳聞即是熙河事宜不小雖未知的實次第然苖履姚雄等統兵在邈川等處已至五十日兵士暴露未有解嚴之期如李忠傑之子李世恭知河州种朴皆已陷歿其他所聞甚多未敢以為信逺近之人甚以為憂今又差發本路及環慶路兵馬前去深恐更有踈虞復為兩路之患重貽陛下宵旰之憂臣不得不詳悉奏聞聖聼各具逐項開説一臣今月初一日入內內侍省遞具密疏上奏略言傳聞苖履姚雄手下人馬暴露日久寅夜寒凍呻吟之聲所不忍聞此等事外臣更有所聞緣難為全信不敢具録奏知陛下今又準朝旨差發本路及環慶人馬即是熙河事宜未得寧貼恐實有如臣所傳聞事臣若不言深慮陛下不知詳悉一臣聞熙河經略司即今措置似已計窮别無擘畫只是趕趁催督將士向前入賊境不度事勢難易地里遠近兵馬強弱堪用與不堪用以寡敵衆亦有事機今乃一切不恤措置如此深恐日後愈致敗事一臣聞青唐人結連夏國兵馬作過大軍若到賊兵例各竄伏山林川谷隱暗間官軍搜索掩捕則不知藏匿之處坐費糧食皆無所得不免却歸城郭或野寨駐劄賊衆隨而據險隘斷截糧道抄掠官軍如此雖更盡發諸路兵馬前去救援必恐無益於事須是改圖可望早得寧貼若不改圖可惜一路生靈被害不惟害及一路若將别路人馬驅迫向前必又大段傷折若不大假折傷亦恐青唐事宜猝未寧貼别路人馬猝無還歸之期更乞聖慈詳察一臣伏聞熙河事前後不一至如運糧人夫頭口目前多被殺掠劫奪如借雇輝和爾槖駝千餘頭皆陷沒無回者其他孳畜人口可知亦慮生事専務彌縫蓋藏知陛下無由盡知乞詳臣今月初一日所奏事理速差親信之人往彼體問必見子細審如臣所奏事理即乞聖慈斷自宸衷别行講究措置青唐邊事一臣不知熙河共有若干兵馬但聞多是蕃兵若只據本處舊日及新展城寨約度以本路兵馬分布防托已是闕少今來更置鄯湟等州及城寨未委用甚處人馬經久防守或且輟熙河新舊城寨人馬往彼又緣會州蘭州通逺軍皆是接連夏國邊面防守之人既少夏賊豈不窺伺别啓姦心則新舊城寨久逺未可保守一臣聞青唐道路山谷險峻或言有至險處為棧道通行自河州去青唐約四五百里此後屯戍兵馬既多不知用何人般運糧草應副可以足得嵗計願陛下詔有司約計彼處合用屯戍人馬數目并計道路逺近般運合用腳乘雇賃錢物及如何措置經營般運并嵗計合用若干錢帛糧斛指甚處所有應副見今有備與未有備每年朝廷合添賜若干錢帛與本路轉運司計置方得足備一乞陛下詢問主議大臣假令鄯湟州事宜便得定疊可以保全城郭即不委新造之州鄰近是何國土合與不合更置邊寨堡子烽臺通貫血脈捍禦賊冦又合添多少戍兵人馬及官員數目設若新郡所鄰國土其間有未知朝廷收復建置之意萬一倔強時來擾邊即合如何措置一議者謂既收復青唐之後來春便可種青窠大麥足以贍軍陛下聞此言乎此乃欺陛下之説臣不敢逺引他事為證只乞陛下試詢問左右親信之人昔年先帝初招熙河招置弓箭手假錢糧牛具幾年後方獲耕種之利便見此言是非一今來自關以西以至沿邊鄜延環慶涇原秦鳯路連值夏秋不熟斛斗不收價比舊日三四倍髙貴人民飢餓不免流移漸有遺棄兒女道路之間往往有之雖有常平倉斛斗又緣軍糧乏絶須趁急且兊那支遣以此多不得全充賑濟之用今更開拓疆境用兵不已臣竊為陛下憂之一臣昨赴涇原朝辭登對之日親聞陛下聖語戒臣謹重言至數次則知陛下謹於用兵愛惜財用凡遣師征討實不得已而為之也伏見興師以來陜西府庫倉廪儲畜內外一空前後那內藏庫金帛不知其幾千萬數而陜西目今處處無不闕乏糧草轉運司計亦無所出惟是行移公文指空畫空郡縣差衙前往指定處般運多是空回臣竊恐內藏庫金帛數亦有限茍遷延嵗月亦慮支那將盡今日收復青唐等處大興工役繕全城郭恐非陛下本意必有大臣誤陛下者况諸路進兵攻討建築城寨彌滿於夏賊境中賊心恐懼欵塞請和臣竊觀祖宗以來能制西夏之命使之束手破膽未有如今日則陛下聖功神德可以誇示萬世今來正是休兵息民清心省事之時惟望陛下深察愚臣之言斷自宸𠂻裁決此事若更詢問主議大臣竊恐却將朝夕已在陛下前講論䇿畫専務興師不已之説遂非掩過上誤聖聰願陛下深察一自紹聖四年以後諸路興兵進討更出迭入修築城寨未嘗休息臣不能盡知他路事體且以本路今年言之開春即經營進築三月末調發兵馬四月初築西安州天都臨羌等寨至五月半間分屯六月又調發兵馬進築定戎寨七月初下手工役未了間又移兵應副進築會州至八月二十間方回其間空闕月日又修置正原等處堡子及日近添築烽臺移置堡鋪拍立界候連綿興役未嘗休息今又差發五千人赴熙河救援臣勘會每一出師士卒病患死損及將帶衣甲逃走數目不少此事臣身為將帥實難言之然其間自繫邊防安危利害願陛下深察黃貼子臣狀內所陳每一出師士卒病患死損及逃走數目不少且如京西第三將下因屯戍回日勘會到軍前帶器甲逃走共一百八十二人其因病患死損及逃亡已獲之人不在此數又如本路第一將且只會到在渭州四指揮逃走及死亡共一百一人第二將只會到在渭州三指揮逃走及死亡共二百七十五人以此可見因逐次興舉死傷損失人數甚多今若連綿興舉不已更恐逃亡死損加倍於日前伏望聖慈矜察一本路新展邊面西安州北近黃河東據葫蘆河深入賊境者可百餘里竊思西賊畏威請命皆陛下聖德所致若謂夏人與本路便能解釋仇怨無乘間窺隙之心臣所不敢知也其勢自當寅夜設防嚴備杜絶其姦心乃為上䇿今本路諸將之兵通正兵及弓箭手共七萬餘人其間下畨正兵又有在永興軍及奉天縣者其餘並分布在涇渭西安州鎮戎德順軍并新舊城寨沿邊守禦堡子共七十九處巡防守把屯戍以此可見分擘得沿邊戍守之兵甚少今差發馬步軍五千人往熙河除第一將一千二百人在近裏州軍勾抽前去外其餘諸將人馬並是於沿邊城寨選擇抽摘差發雖名五千人數又合差親兵火頭等人自是五千六七百人往熙河萬一西賊張聲欲擊鄯湟却來本路作過臣曉夕竊憂之亦望陛下體念本路新開邊面愈逺與賊結怨最多特賜主張非臣一身之幸實一路之幸實朝廷之幸臣衰老愚戇始終荷陛下恩奬又得指揮致仕來春取旨犬馬之愚未盡之年輒思補報萬一是以自忘觸冒天威之罪縷縷開陳十月二十六日令涇原發兵五千赴熙河故楶有此奏此據章楶奏議增入要須痛加刪削乃可楶以十一月二日入內侍省遞具此奏不知降旨如何癸酉入內供奉官李彀言奉詔照管王子轄正等赴闕轄正隆贊并畢斯布結嶽居戩首領乞賜忠順等旗使知朝廷恩寵內轄正隆贊等以忠勇及心白為三等仍等第推恩賜以銀帛袍帶且貸其罪令赴闕朝見及選見留諸族首領自歸順曾立功效之人權補管勾部族及帶巡檢請與給俸將來與正補管勾從之乙亥翰林學士兼侍讀蔣之竒落翰林學士兼侍講知汝州寶文閣待制知開封府吕嘉問落寶文閣待制知懷州權吏部尚書葉祖洽罷吏部尚書知濟州奉議郎王回特除名勒停坐與諫官鄒浩語言交通也奉議郎勾當雜買務田衍奉議郎監元豐庫王琳奉議郎岑稢承議郎祕書省正字吳師禮宣德即李友諒並特追一官勒停宣德郎祕書郎白時中宣德郎岑穰宣德郎樞密院編修文字張庭堅吏部員外郎畢漸考功員外郎蔡蹈承議郎張琳太學博士范致虛各衝替承議郎監𣙜貨務陳舉朝請郎都官員外郎朱紱承議郎諸王府翊善傅楫通直郎監在京都麴院胡安修越州山隂縣主簿范致君各特追一官勒停宣德郎監元豐庫蔣球特衝替宣德郎祕書省正字葉承特差替右侍禁王溥落閣門祇候勒停坐以銀錢遺浩且致簡敘别也尚書省送到御史臺取問所收取到吏部員外郎畢漸稱趙務本託帶與鄒浩書并還金二兩自到京未曾見聞鄒浩被責新州遂寫簡將趙務本所附金與鄒浩奉敕畢漸特衝替本所勾到鄒浩供畢漸所送金等頭主未明準朝旨取趙務本狀當月二十七日勾到趙務本取問稱今書之時知年八月畢漸入京曽托寄書十月畢漸遣書與務本看鄒浩言事得罪漸因送書時惠金二兩作路費思之不合與他懼朝廷問著供稱務本元少鄒浩金二兩因漸入京還他或恐州府來取問時如此供答務本以此依隨畢漸虛妄供析奉聖旨畢漸前斷衝替私罪事理重特不用今來赦恩遞減除落令吏部與一外任監當差遣王回興化人元符三年十二月有傳張庭堅廣安人政和元年十二月有傳吳師禮杭州人崇寧五年五月有傳朱紱興化人有行狀無傳傅楫興化人有傳蔣球之竒子元符三年二月二十四日鄒浩等牽復樞密院言已降旨令熙河經略使胡宗回相度賊勢如王贍在鄯州糧草果是闕乏即令拘收統制林金阿爾等處城守將蕃漢兵馬還湟州駐劄仍嚴切責付將佐於大軍內裹護偽公主及大小首領前來時朝廷已議棄青唐獨未曉然行下耳是日三省與樞密院始同進呈种朴戰歿等報上甚駭之再三顧問此將奈何衆皆曰賊勢如此若株守不改圖即恐王贍一行將士陷歿則於威靈愈為不便須至如此指揮若保全得王贍一行人馬歸邈川則鄯州徐更措置上曰溪巴烏如何衆亦曰王贍朝出鄯州即巴烏暮入無疑上曰何以處之布曰次第不免如折氏府州措置乃可速定尚未知巴烏肯聼命否幸而隆贊已來庶可與之語昨青唐初被圍時章惇便要如府州折氏處置遂降此詔布又言种朴被殺何可但已兼邈川係隔絶西蕃與夏國交通之地及河南疊宕一帶部族見歸明可因而建置洮州以成先帝詔旨兼慶渭步騎萬人可令姚雄統領前去討擊河南作過殺种朴者如此則朝廷威靈稍振而湟洮之計亦已先定不爾邊臣見朝廷已棄青唐則并洮湟皆無經營之意矣衆皆曰然上亦然之又詔李彀相度如三公主已有來期即并轄正隆贊等赴闕布因言青唐之變如此政府不得無罪臣素知人情事理不順恐必難濟纍曾於陛下前開陳其後轄正隆贊皆出降臣無復可以啓口然臣知其不可為而不能固執所見隨順人言致誤國事兼是密院職事比之衆人臣罪為最多上亦欣納布又言見章惇初與張詢王贍等隂造此事後又與孫路交通以此力主其議臣以為青唐國人不平轄正父子篡弒故欲逐之而立董戩之姪我乃因其擾攘遂欲奪之於人情事理不順明白可知况朝廷以四海之大所不足者非地土安用此荒逺之地兼青唐管下部族有去青唐馬行六十三日者如何照管兼生羌荒忽語言不通未易結納安能常保其人人肯一心向漢凡此等語皆曾於陛下前敷陳恐久逺必為患不謂不旋踵便有此變蔡卞素不知邊事蕃情又與惇議論多異獨於此助惇甚力今日却無以處之至於章惇初勇於開拓才聞青唐被圍便以書令胡宗回如府州折氏措置此事不降朝旨豈可便以告邊臣又才聞姚雄於邈川解圍却以書令宗回將作過首領家族一處拘管先執其首領便從嬰孩以至少壯者一一次第凌遲訖然後斬首領如此豈不激怒衆心上深駭之曰此是何措置布曰宗回録到惇書一一具在及今日种朴戰沒氣已消沮更無處置臣遂自條今日所陳三事示之亦莫敢以為不然如此輕易反覆豈不上誤國事上但再三駭歎其率易也又詔青唐蕃部巴斯吉與東頭供奉官充本族巡檢巴斯多卜等並與右侍禁葉占等並與右班殿直納克布等並與指揮使巴斯吉等首能率伸巴族向漢掩擊作過部族經略司以功狀聞故有是命丙子寶文閣直學士知成都府李南公權户部尚書試户部尚書吳居厚為龍圖閣學士權知開封府寶文閣待制新知瀛州孫路為寶文閣直學士知成都府閏九月七日路自河南改瀛今自瀛改成都尋責知興國軍路墓志云自西洛改瀛留為兵部尚書尋以龍圖閣學士知成都未行落職知興國軍按實録不載路為兵書又不為龍圖恐墓志未可信姑附此須考詔贈种朴防禦使與十資恩澤賜錢銀絹布各五百羊酒米麵各五十母特封郡太君布録甲子遣內臣犒設熙河戰守蕃漢士卒及支紬絹環慶涇原兵未經出戰亦與特支布録丁丑胡宗回奏令隆贊作書遣蕃僧往招溪巴烏許以節度使依舊管勾青唐部族布録奉議郎許端卿為刑部員外郎己卯監察御史石豫言今臣僚論事如迹涉曖昧不根先詢承傳之人察實施行詔如遇有此等事理令三省取旨淮南東路提點刑獄朱伯虎知隨州以奉使無善狀故也鄜延奏西夏進誓表官稱昨一奏便蒙聼許豈敢不依回詔指揮兼别有謝恩表詔差工部員外郎韓跂押伴詔諸路未降誓詔以前收接西界投來人户候降誓詔别聼指揮詔熙河尋訪种朴尸首獲者與銀絹各一百又詔熙河秦鳯限百日許逃亡軍人自首與依舊收管弓箭手仍免降配庚辰朝請郎充祕閣校理權發遣河東轉運副使郭時亮落祕閣校理降授朝散郎以本路提舉常平陳琥言轉運司行遣違戾致腳乘錢不足故也起居郎孫傑為太常少卿先是三省以體量孫傑事進呈內有差與常安民船及庇贓吏路班等罪章惇欲黜之而蔡卞以為復吕溫卿之怨惇亦以卞為立黨面相詆訐久之或有言傑與安民親而上亦嘉其能擊溫卿故止罷左史惇留身論之甚久既退曾布再對上以諭布且問傑之罪何如布曰臣悉不知所體量事然傑擊溫卿誠可激賞若有過以此少寬假之亦無害上曰傑擊溫卿誠可嘉惇與溫卿兄弟誠為黨與布曰此衆所知惇既有此嫌亦不當力乞罷傑上曰惇必欲罷傑蔡卞實不曾稱薦傑傑擊溫卿張商英以書稱之云排巨姦破大黨巨姦大黨為誰布曰大黨必是惇商英乃惇門下士然亦每事諂奉蔡卞只如近命蹇序辰詞云嘗助國是豈以一眚遂忘前功朝廷與序辰復職本無此意此蓋諂詞上曰既為惇門下人又却如此士人何可爾章惇以為可作翰林學士還作得否布曰若文采及人望亦可為之然不能自立亦誠如聖諭上曰如此之人終不可在朝廷莫可以作藩兼誥命亦不甚佳上又曰章惇只聼賈種民言語如何布曰亦有之然惇卞亦各有黨惇所悅即曾旻周穜之類卞所悅即鄭居中鄧洵武葉棣之徒要皆不叶公議布又曰聞傑作太常少卿何以處旻上曰兩員不妨又曰旻更不可向上學問文詞吏能皆不易得但不平穩布曰陛下知人如此天下之福臣復何言然左右史久闕今又無人上曰鄧洵武可否布曰洵武正如曽旻文學亦不易得但附卞太偏以此為衆所惡上曰亦别無過惡布曰彼方在間地未有所為若處之要路則其資性憸險未可量也布又曰從官中文采可作翰林者却是安惇臣亡兄鞏以文章名重一時稱惇文采可跂及蘇軾上笑曰中丞尤難得人既而又言安惇亦只是章惇門下人昨舉商英自代可見也布曰安惇與商英俱是蜀人安惇固未免觀望然粗識深淺非若蹇序辰之比也傑察訪淮浙在元年二月一日并十五日四月十六日吕惠卿以溫卿對獄乞納節翌日蔡卞亦留身奏事甚久曾布再對上諭以卞云不可與惇共處待過興龍節求去布曰臣昨日蒙聖諭既退亦聞惇卞面相毁訾甚峻大臣不當如此上曰失體章惇多以語言傷人布曰惇性暴率多輕發卞則隂巧能窺伺其所短故卞多勝惇多屈必無以逃聖鑒惇知孫傑事既有溫卿之嫌自不當力爭亦無可勝之理惇不識便宜多此類上曰惇却言只是孫傑立黨不是説卞布曰此乃惇畏卞之詞卞與惇皆有黨而卞之黨為多既已言之何必更解上亦哂之布曰惇之黨衰卞之黨盛故衆皆畏卞而惇亦畏之謂卞為不立黨尤不可也惇卞紛紛固未足道然三省密院皆闕人陛下不可不留意宗廟社稷大計天下安危士民休戚只繫此三二人者惇卞既暌許將凛凛畏此兩人不敢復啓口每有一事惇以為可而卞未答卞以為可而惇未然則將莫敢對直俟兩人者稍同將乃敢應答兩人者又交惡自此政事愈乖謬矣故上下內外闕官鮮有差除縱有差除人必以為不當兩人好惡各有所偏各有黨類若有一人能執義理持公論以自處無不可勝人之理古人云正已而物正未有枉已而能直人也上云深欲補人卿視在朝誰為可進者若補得兩人方不闕事蔣之竒亦不可得又適有事布曰之竒官是大中大夫數月間未可進職且移一藩亦可上曰亦無事復職亦不妨又曰年嵗間莫却可用布曰之竒比在朝廷頗平穩自守亦老成故爾案上云至此原本脫去今據布録增入上又曰韓忠彥可用否布曰方三省需人如忠彥輩但恐不濟須是奈何得此兩人乃有補許將固恐懼以元祐中為執政常慮為惇卞所傾黃履雖或復啓口又不曉事亦不為兩人所畏上云履不曉事不足道布曰人君所以垂衣拱手無為而天下治者以得人也若廟堂得人則亦不至每事煩聖聼上又問吳伯舉如何布曰亦如曾􅌈鄧洵武之徒陛下論曾􅌈曲盡之矣此三人者乃一體之人也陛下必欲用洵武之徒亦不妨然須以一正直不附麗人者兼進之則人情亦必悅服獨進洵武輩則不可也洵武劉拯輩皆在要路則卞黨益盛自章惇已下皆畏之誰復敢言其短如此不惟於士類不便陛下聰明亦從而壅塞每事愈費力爾若謂卞無黨則鄭居中乃王圭壻何緣得進劉摯吕大防壻有敢引之者否緣居中故閭邱籲亦得差遣初改官不作縣自宫教除通判皆衆人所不可得也章惇雖多輕發至於毁居中輩以至逐方天若外議翕然稱之上又曰蔡京亦不平穩布曰京所引乃天若輩安得平穩陛下論人材性行皆曲盡之矣布又曰章惇多輕信初力引序辰嘉問既而反為仇怨嘉問何足引王安石力欲以為待制而先帝終不與後處之以光祿卿而已上曰安石稱道嘉問過當布曰誠如聖諭安石平生交遊多暌乖獨與嘉問始終故稱之太過作嘉問母祭文云是生賢子經德秉哲此乃商周先王之德嘉問何足以當之上笑曰安石性強布曰安石以義理名節忠信自任不肯為非至於性強自是以此驕人故時有過舉豈他人可比上曰安石誠近世人所未見布曰此非可與章惇蔡卞同日而語其孳孳於國事寢食不忘士人有一善可稱不問踈逺識與不識即日招用誠近世所無也辛巳三省言按元豐五年四月詔見帶館職人依舊即不供職如除職事官校理已上轉一官校勘減三年磨勘校書減二年磨勘並罷今後更不許帶官職詔集賢殿修撰直龍圖閣直祕閣依舊外餘依前詔先是上與輔臣言先朝既罷館職後不當復曾布曰先朝因除職事官既罷仍與轉一官無害章惇等亦以為當罷布因言若總罷則無以待小帥及被奬擢者先朝以無直祕閣等職名便除直龍圖閣誠可惜惇等共議定遂降此詔自十月丙辰移此詔熙河經略司勘會苖履姚雄种朴下亡失使臣士卒人數并其他因戰鬬亡歿之人並勘會聞奏又令李彀因便犒設將士及密切勘會陳亡人數聞奏以李夷行言苖履在青唐獲八九百級失三千餘人及其他使臣士卒陳亡者甚衆而經略司不奏故也布録辛巳十二月十五日夷行罷提舉弓箭手壬午録故蕃官右班殿直雅密男雅星眀子為三班借職詔胡宗回休息將士俟事力全壯決可取勝方得前去討擊河南等處作過蕃賊布録甲申同呈十四日已作聖旨令宗回云云今附本日又立賞錢募捕朗阿克章癸未詔門下中書後省左右司見編類臣僚章疏其已寫録校對畢漸次進入給事中劉拯言編類元祐臣僚章疏伏見河南符尹材係知河南府孫固以遺逸薦於朝廷特授虢州司户參軍上太皇太后書語言狂妄指斥罪不勝戮詔尹材追毁出身已來文字仍令河南府體訪有無子孫仕宦并盡追遺表恩澤尹材書今附見當刪入虢州司户參軍充耀州州學教授臣尹材謹昧死再拜上疏太皇太后陛下臣伏覩比年以來隂陽不和災異數見五榖薄登民愈愁困蓋由陛下未逹天意故災異數出休祥未應者臣以此見天意屬於陛下者至深至厚非踈賤小臣所能測也陛下因循謙抑未能仰副天意故皇天震怒再三示譴又徒使所愛赤子橫罹凍餒以警陛下豈天意之所欲哉不得已也陛下可不懼乎賤臣愚暗不足以知天意試為陛下明其始末則知天意亦不逺於人情也仁宗皇帝享國四十二年仁德可謂厚矣然不與之子者臣以此見天之眷佑皇家有無窮之意欲使陛下聖子神孫繼繼承承永為神主以保天下於億萬年猶未厭也茍無此意仁宗皇帝之德雖百斯男未為過也然卒不與子者亦可知矣天意在主長君長君則自外入繼大統欲使吾君知外之事庶能愛養元元懷保小民如商之三宗以紹湯德此天意也若降皇嗣則必生深宫之中長於婦人之手耳目之玩足以移人茍非天生神靈幼而岐嶷未有不從其習者也茍從其習比之長君豈可同日道哉臣於此見天于國家有無窮之意故乃復眷在於陛下也先帝一旦宫車晏駕皇帝幼沖嗣位萬幾之繁未能獨決則政將誰出故在陛下此天意也天意豈不以陛下生於勳德之族長於外宫稼穡艱難盡聞之矣民間疾苦備知之矣必能仰副天之意以富天下之民故選擇而在陛下此非人之所能為也天也然則天豈私於陛下之聖可以託其所愛也然則天之託於陛下者豈輕乎如臣之愚輒不自量願佐下風若俟大臣舉薦則臣之狂言幾不得聞於左右之聼矣臣願陛下與皇帝發政於廷日收民望只勞陛下德音數句不出兩旬澤可加於四海矣臣之言豈小補哉臣河南府衣冠之後也犬馬之齒六十有六熙寧三年蒙先帝以遺逸召試臣以疾不行元祐元年守臣孫固又以遺逸舉臣蒙陛下特旨授臣虢州司户參軍次年又蒙陛下除臣耀州州學教授臣蒙陛下之恩不為淺矣亦欲未填溝壑之前少報萬分於陛下非自薦陛下無由知臣之能故臣不忍默默自棄於聖代也臣是以不避誅夷上書自薦伏望太皇太后陛下特出睿斷召臣暫至闕庭面陳須至申上者王贍遣第一副將王仲逹與髙永年帥騎兵千人衛送遼夏輝和爾公主及董戩姊妹等自鄯州至湟州於是復自湟州至鄯州往反凡八日時叛羌所在屯聚梗塞道路而星章峽尤甚此據隴右録羌酋多勒瓦等又與朗阿克章相為掎角乘凍渡河攻嘉木卓城數出羅格斡楚圎堡間伺便冦抄此據青唐録十一月事今附見甲申詔發運司勾當公事二人専切措置鹽事內楊紹荆湖北路夔州路李琰江南西路廣南東路從中書舍人張商英奏請也從商英奏請以湖北編録鹽法增入十月二十二日先差勾仲甫降授皇城使康州刺史熙河蘭會路都鈐轄王愍與轉一官回授與五服內有官親屬以進築會州城畢工故也元年十月二十二日愍以結拉為副總管今年五月踏逐會州則云鈐轄此又云降授皇城使康州刺史都鈐轄當考秦鳯奏葉公城使臣兵馬已棄城歸磋藏詔胡宗回具析不奏因依布録甲申朝請郎祕閣校理韓治為吏部郎中依近詔罷館職進官一等治忠彥子也十一月十六日甲申先是上諭曾布欲復用忠彥布謂忠彥無補布言忠彥無補在十一月十二日庚辰及是乃言治非出聖意豈復得召上笑曰章惇言治為劉摯門下半夜客亦無顯狀布曰陛下察言如此天下之福如前宣諭欲召忠彥乃知聖意一無所適莫上曰忠彥何能為且令作吏部尚書莫不妨布曰誠如聖諭忠彥先朝擢為尚書心本無惡但不能自立多隨順人爾在元祐中措置邊事無非曲徇他人及臣秉政欲一變前日所為初雖略爭既而無敢不從者若謂元祐曾作執政及隨順人則許將亦是陛下觀此兩人何以異上笑曰正似許將兩人恰一般也奉議郎鄧洵仁為考功員外郎承議郎周純為户部員外郎奉議郎吳拭為金部員外郎朝奉郎許彥為倉部員外郎左朝議大夫張公庠為比部員外郎乙酉降授朝請郎吕希績守少府少監分司南京隨州居住丙戍吕惠卿奏鄜延戍兵一百一指揮乞減五十指揮從之布録丙戍陜西轉運判官秦希甫言陜西河東路大小使臣得替限兩月從本任起離赴部除因軍興被差外過限不以有無緣故料錢衣賜勿給帥司亦不得辟舉仍請令在任日經略司豫行銓度人材奏填合舉員闕其被舉人替訖未上間亦須離本路伺候從之東上閣門使威州刺史權管勾鎮戎軍姚古權涇原路鈐轄丁亥詔綏德城為綏德軍并將元係第二將第四將所管暖泉米脂開光義合懷寧克戎臨夏綏平寨青澗城永寧關白草順安寨並𨽻本軍管轄以兩將主薄為曹官添置通判官各一員改知城充知軍從朝廷選官皆用吕惠卿奏請也用惠卿奏請據布録增入景福殿使榮州防禦使入內副都知梁從政為延福宫使從政磨勘合改延福宫使或觀察使上曰且與宫使因言從政是先朝任使頗曉事但執滯及太絮爾曾布曰馮宗道及從政皆先帝所親信皆讀書曉事上曰宗道曉事非從政比布曰馮世寧藍從熙俱已作觀察上曰宫使更數年亦須磨勘作觀察戊子太常少卿曾􅌈言黑帝配座名號帝顓下一字與神宗皇帝廟諱音字同請改稱帝髙陽氏從之詔以石州明靈侯為明靈公胡公神廟為靈祐廟故北作坊使王吉為忠祐廟從河東經略司請也王吉當考己丑禮部言按熙寧年中不許新舊諸科人投下文字於諸科額內添解進士今進士到省人數增多請將來省試增點檢試卷官六員共作二十員詔添四員仍著為令吕惠卿奏西人乞賀正旦緣誓詔未降未可從又乞優加寵錫西羌如元祐故事章惇因言先帝嘗欲以金帛結羌中用事者今西使言國主悔過效順皆威明正賽輔佐使然欲於使還賜以金帛結其歡心若元祐加賜乾順則不須也上令留候布録己丑巴巴斡崇寧二年正月二十七日可考文案此假末語似有脫字然布録亦同又注與正不相連屬恐是辛卯熙河奏條下錯簡李譓奏青唐府庫金銀等物王贍王厚不肯同本司勾當官點檢供數及以銀馬等遺運勾竇志充詔李譓秦希甫胡宗回體量根究有無侵欺情弊聞奏詔訪聞會州新城不至堅固令胡宗回修葺及具因依聞奏三事並布録己丑庚寅户部言欲賃屋宅計會占據不依條給歷及不輸賃直規求錢物兌賃若搭蓋浮造遮欄宫屋及妨礙衆行出入道路者各杖一百許告賞錢五十貫從之新削永興軍路安撫使陸師閔言鹽鈔公私買賣請依鈔面錢價輒增者徒二年從之新削辛卯大宗正司言據故公著男希孟狀係袒免以外三世無官並無請俸之人合存恤或賜田土詔特依袒免外兩世條支破錢米屋舍熙河蘭會路經略司奏邈川管下新歸順布新族首領巴巴斡且奚斯勒添令下族蕃部邦沁與蕃賊鬬敵射死甚多詔巴巴斡與左侍禁且奚斯勒與左班殿直邦沁與右班殿直仍並差充本族巡檢嗣濮王宗漢言竊見故兄宗詠等六墳比諸王極有降損望特降睿旨與追贈詔故贈寧海軍節度使欣國公宗詠特追封餘杭郡王故贈昭武軍節度使遂國公宗師特追封益川郡王故贈建寧軍節度使成國公宗邈特追封同谷郡王故贈鎮寧軍節度使同平章事陳國公宗治特贈開府儀同三司追封澶淵郡王故贈武寧軍節度使同平章事楚國公宗益特贈開府儀同三司追封山陽郡王故贈洺州防禦使廣平侯宗沔特贈崇信軍節度使追封漢東郡王壬辰寶文閣待制知光州孫覽知瀛州水部員外郎曾孝廣守都水使者十月二十六日注孝廣云云可附此或并十二月二十五日詔河北路黃河退灘地應可耕墾並權許流民及災傷第三等以下人户請佃與免稅租三年其已前諸逋負亦權住催理三年如合量行借貸令提舉司相度施行如官員并吏人及有力之家請佃及官司給與者各徒二年詔平夏城等處廂軍未知存亡仍支請給如及三年即住支先是訪聞廂軍戍平夏多被賊抄掠惟以逃亡關報住請給致被亡之家失所故有是詔癸巳户部言元豐官制寺監不決者上尚書本部又不能決者奏裁若直被朝旨應覆奏者依本路仍各申知又六曹通用令稱取裁者並隨事申都省樞密院言昨元祐變更應上朝廷者許直逹顯有紊亂官制今請並依元豐舊制從之新本削昨元祐至官制等十九字甲午著作郎吳伯舉言奉詔重修日歷伏見國史院御集御批與日歷所書大略符合乞以次第添入從之是日李彀奏乞早令王贍歸湟州焚毁青唐巢穴詔經略司不得輒有焚毁彀奏多攻胡宗回及言青唐近來危急之狀上謂曾布曰此輩所言未可盡信衆皆謂誠如聖諭因言內臣好貨及作氣焰凡所好惡皆毁譽過實上又言利珣喜奏事然亦好貨章惇曰珣最甚布再對上又及彀等布曰陛下察見近習用情如此乃中外之福上亦深然之布録乙未詔諸州置教授者學生依太學三舍法考選升補內上舍生每嵗貢一人內舍生每嵗貢二人上舍生限當年十二月到京隨太學補試合格者與充內舍生不合格許再試三經試不中者遣還內舍生不候試與充外舍諸州貢上舍生到京並權破外舍生食諸路各選監司一員提舉學校仍令知通専管勾諸州試內舍上舍並監司選差有出身官一員與教官同考試仍封彌謄録合用條貫令於國子監取索行下其外州不可行者比類條具申尚書省蔡卞勸上復行畿內保甲教閲法上屢以督曾布是日布進呈畿內保丁總二十六萬熙寧中教事藝者凡七萬因言此事固當講求然廢罷已十五年一旦復行與事初無異當以漸推行則人不至驚擾上曰固當以漸行之布曰聖諭如此盡之矣若便以元豐成法一切舉行當時保丁存者無幾今保丁皆未教習之人若便令上畨及集教則人情洶洶未易安也熙寧中施行亦有漸臣是時方判司農首尾本末無非出臣措置容臣檢尋文字講求施行退以語卞卞殊以為不快也乃云熙寧初人未知保甲之法如何今耳目已習熟自不同矣布不答九月八日丁未布云云當考參樞密院奏勘會已降朝旨令陜西河東路經略司相度近裏城鎮堡寨有可以減併廢罷或裁減冗員并那移減罷戍守將佐兵馬之處具狀聞奏近據鄜延路經略司奏廢關寨四處充驛頓并裁減屯泊馬步軍五十指揮及減罷凖備將領差使一十五人新城寨監押及守禦使臣三十六人并寧河橋廢作渡又減使臣一員兵士一百四十人及見闕敢勇一千二百人並住招填又秦鳯路亦奏乞併廢堡子及減冗員去處外所在涇原等路近裏間慢城寨不少並未見奏到合減併廢罷事件去處詔令涇原熙河蘭會環慶河東路經略司詳上件事理依已降朝旨疾速相度近裏城鎮堡寨甚處可以併廢及將佐官吏冗員并戍守兵馬之類合如何裁減子細勘會具經久可行事件保明聞奏如目下未可施行先次奏聼朝廷指揮其鄜延秦鳯路如更有可以裁減去處亦依此指揮施行元符二年十二月十九日章楶奏準十一月二十七日密劄丙申權秦鳯經略司周綍奏乞不候來春先次賑貸本路保甲一次來春更依條賑貸以役使勞敝故也從之布録有此元符三年七月二十八日可考涇原奏乞留大將王翼樞密院言翼乃劉奉世隨行遣還都官而不赴部公參私往塞上獲級遷借職又舉西安州差遣翼本吏部令史斬首級必妄冒詔追所受賞勒還都官與重難差使章楶不合奏留罰銅二十斤布録比部郎中李延寧提點京西南路刑獄是日王厚自湟州遣使臣邢玠護糧至龍支城即總噶爾城
