body:
  text: 續資治通鑑長編卷二百八十九宋李燾撰神宗元豐元年夏四月乙巳詔翰林醫官院選醫學二人馳驛給劵往修閉決河所以上批塞河役衆闕醫治疾故也知諫院蔡確既被㫖同御史臺按潘開獄遂收大理寺詳斷官竇蘋周孝恭等枷縛暴於日中凡五十七日求其受賂事皆無狀中丞鄧潤甫夜聞掠囚聲以為蘋孝恭等其實他囚也潤甫心非確以為慘刻而力不能制確引陳安民置枷於前而問之安民懼即言嘗請求文及甫及甫云已白丞相甚垂意丞相指吳充也確得其辭喜遽欲與潤甫登對具奏充受請求枉法潤甫止之明日潤甫在經筵獨奏相州獄事甚微大理實未嘗納賂而蔡確深探其獄支蔓不已竇蘋等皆朝士榜掠身無完膚皆銜寃自誣乞蚤結正權監察御史裏行上官均亦以為言上甚駭異明日確欲登對至殿門上使人止之不得前手詔聞御史臺勘相州法司頗失直遣知諫院黃履勾當御藥院李舜舉據見禁人欵狀引問證驗有無不同結罪保明以聞實録以此語繫之三月二十一日乙未按御集乃四月三日下此詔又按司馬光記聞云竇蘋等枷縛暴日中凡五十七日確自閏正月二十五日被㫖赴臺至三月二十一日才五十五日耳恐實録誤又按上官均所言黃履李舜舉初赴臺驗問見禁人初無黃廉姓名至四月三日改正李舜舉監勘乃别出黃廉姓名蓋履及舜舉先赴臺驗問後又與廉同勘鞫其實兩事手詔自當再下增差黃廉必須特降手詔而御集偶失編纂但得改正監勘手詔遂誤并兩事為一事故日月差互若從實録繫之三月二十一日則又似太早今但附見於此而不書月日庶不相抵牾記聞亦誤并兩事為一事蓋不詳考履舜舉初止是驗問添差黃廉則云勘鞫而潤甫等始獲罪其先後次序可推而知今掇取刪修履舜舉至臺與潤甫確等坐簾下引囚於前讀示欵狀令實則書實虛則陳寃前此確屢問囚有變詞者輒笞掠及是囚不知其為詔使也畏吏獄之酷不敢不承獨竇蘋翻異驗拷掠之痕則無之履舜舉還奏上頗不直潤甫等言而均復言比奉朝㫖鞫相州獄其法司潘開等所齎錢物别無行求處外有詳斷官竇蘋等初議法不一後却依相州所斷及據蘋雖稱判大理寺朱溫其方議法次嘗稱樂咸是故人雖有理却不解說又言陳安民是李待制親誰敢妄定翻它文字語似涉私然推究蘋等本意正是疑惑刑名反覆議論即非主張樂咸陳安民始改斷前月十九日鄧潤甫蔡確欲先具情節奏御前一日潤甫與臣恐蘋等所通欵狀或有異同即與勘官聚㕔引問據蘋口說與元狀不同并稱綳縛五十餘日止有出入息便有死罪亦須通說又據十七日元簽書官陳安民稱嘗託外甥大理評事文及甫說與宰相吳充告照管充亦垂意潤甫與臣以事連執政未追到及甫照證反據蘋所說與元狀不同不敢鹵莽進呈已具奏聞䝉差知諫院黃履勾當御藥院李舜舉赴臺案驗履等與衆官聚㕔逐一引問見禁官吏百姓對定欵狀潘開等三十餘人無翻異外有竇蘋稱元供狀內十有八事皆虛及詳斷官杜子民亦稱元狀嘗說陳安民見在政府上下經營一節亦不實臣看詳蘋等初不曽受賂枉法今勘劾止緣議法有前語言其間雖似涉私亦無實狀致前後翻異不一兼據竇蘋纍於勘所聲寃緣臣與潤甫初恐同勘官蔡確疑本臺私蔽官吏不欲面引問止據欵狀簽押其蔡確日至臺止是呼召元辟同勘官劉仲熊及親信府吏楊昌等傳授指意日夜窮治及據推直官虞肇等稱初無指揮綳縛竇蘋必是劉仲熊楊昌等擅綳縛又蔡確取前月十九日同潤甫具情節進呈並不引官吏面訊虛實及親改奏檢多漏逸情節欲以欵狀上惑聖聽臣與潤甫久欲論辨緣所勘官吏語言多連及權要迹涉阿蔽亦恐蔡確藉此為說臣雖有區區之誠無由獲信然反覆思慮職在風憲義當彈舉避嫌不言退為身謀則是臣不忠不直上負朝廷設官任使之意臣欲乞除潘開等對驗已定止就本臺結絶外其法官竇蘋等干連命官乞别差官移司盡公根勘所貴推見情實不致寃濫翌日又言臣自與蔡確同鞫相州獄逾兩月觀其持法刻深言不及仁窮治詰問不考情實以必得姦弊為事其所辟勘官劉仲熊天性險薄慿恃確勢凌轢推直不容訊問臣昨日嘗於延和殿粗陳梗概不知陛下以臣言為信否夫大理審刑法令所繫所以持天下之平若官司挾情輕重其手此固人臣之所同嫉朝廷之所宜深治也况臣職在風憲義當彈舉安敢覆蔽有罪曲為遊說又法官竇蘋等非臣親故所以拳拳不忘繼進狂瞽者誠以語言之間尤為難考必在參驗彼此以察其誠虛心審聽以考其意誠意所之真僞斯得若逆其疑似而不究其情案其單辭而不參證左則所疑者未必非真所治者未必有罪也臣昨日親奉詔以竇蘋舞文變法須追逮證左參考情實仰見陛下寬仁欽恤重刑之意書曰非佞折獄惟良折獄臣欲乞别差端厚明良之臣移司勘劾庶幾推見本末義不縱姦仁不濫罰有以副朝廷用刑之意如陛下必欲令蔡確兼領獄事亦乞止就本臺與臣等參治臣於蔡確雖無雅素然臣備官御史緣確論薦不為無恩臣所以懇懇疏辨愚不量力誠以其人峭深性寡忠厚若使獨領勘鞫而附以險薄小吏竊恐逼脅窮治不盡情欵或及無罪伏望陛下揆之聖心參以朝論如確所存不如其言臣當伏妄言之誅以厲中外丙午四月三日詔確履及監察御史裏行黃廉就臺劾實仍遣舜舉監之朱本簽貼云先帝遣李舜舉黃履按相州獄事可謂審實而舊録書云履等下簾引問罪人不知為詔使也猶以為寃今取到黃履狀稱並當面引問罪人諭以朝廷遣詔使重行按問各令盡理供析罪人並無寃辭顯是舊録誣罔改定云上初以潤甫均言故疑獄辭非實仍遣履舜舉即訊履等同潤甫均至臺引問而履等論罪人以詔使審訊罪人卒無異辭今新本只用舊録合從新本黃庭堅作黃廉行狀差同結絶相州獄事初相州事發於皇城卒事十九不實知雜御史蔡確鍛鍊成獄以此自謀中丞鄧溫伯御史上官均上疏論之溫伯又在經筵造膝而論確耳目長具得溫伯均所言又善伺察中人主意即論溫伯均朋黨為邪與罪人為地又任殘贓吏日引諸囚如使者慮問狀稱寃者輒苦辱之有人情所不能堪及上遣黃履李舜舉按獄而囚以為如前皆引服於是天子不疑確而溫伯均皆得罪均猶獨上疏爭之然廉至未幾而具獄上矣廉嘗謂子弟吾失不極論此獄甚愧然上官御史也上官均後以此劾廉罷都承㫖七月一日虞肇送審官吳充言御史臺鞫相州獄連臣壻文及甫其事在中書有嫌乞免進呈或送樞密院詔免充進呈及簽書候案上中書樞密院同取㫖提舉成都府路茶場司言秦鳯路副總管夏元幾用禁軍回易私茶侵壞茶法詔轉運司劾之又詔大理寺行銓院案吏與增祿仍行倉法丁未中書奏檢正吏房公事刑部員外郎向宗儒申請諸房有未便事一言大卿監以上𨽻中書少卿監以下屬審官惟奏薦則皆在中書施行况今武臣閣門副使以上奏薦則係樞密院諸司使以下並屬審官西院中書密院事體亦當均一欲乞今後文臣奏薦大卿監以上依舊外少卿監以下並令審官東院施行所有合用條制即乞備録頒降一言天下州軍務在選擇能吏故自知縣資序選充通判自通判選充知州者蓋朝廷奬拔人材以備任使謂之堂選既謂堂選則當自中書施行今堂選者却送審官東院本院㑹問動經旬月甚是迂滯欲乞今後堂選人並依堂除則例從中書取索㑹問施行以上二項欲並賜依一言制敕院舊例守當官行遣本房文字守闕不預行遣其守闕料錢五貫文不預行遣稽違差失遇有恩賞與本行守當官一例被賜又諸房承例指射連簽行遣即添食錢五貫文顯見僥幸乞據見今守闕人數隨事繁簡分𨽻諸房悉令同共行遣如此各務協心職事一言自來差官主判在京官司有正有權有權發遣而無定制且以尚書六曹言之惟吏部流內銓雖兩制並為權判其餘諸部皆無此例如京百司自兩制而下至朝臣並帶提舉顯見輕重不類其餘寺監諸司率皆如此乞今後差官各依官職資序髙下立為定式以上二項欲並令本房立法聞奏從之仍以宗儒檢正五房公事候一年取㫖與館職實録太略今用中書時政記三司奏請預借明年陕西合得鈔錢百萬緡應副緣邊糧草內以十萬緡充買鈔本錢從之提舉成都府等路茶場李稷奏請賣茶以買馬而所賣茶價髙下不一或能增不能減或知減不知增欲裁立中價聽隨市色增損仍定嵗入課額及設酬賞格又言蕃部無錢止以米及銀絹雜物賣錢買茶乞許博易銀米等物立限半年易錢從之時政記甚詳今止從實録戊申詔修完京城所差役兵五百石匠五十赴曽公亮墳功役以公亮葬期己逼而役事未集故也提舉修閉決口所奏集築隄道人力少乞在京備城兵內那三千人赴役半月可畢功從之己酉遼主遣崇義軍節度使耶律永寧副使太常少卿乾文閣待制劉霑來賀同天節鄜延路經略使吕惠卿乞諸路緣邊城寨闕官及管押兵馬緩急事冝差使並許經略安撫鈐轄司於待闕得替使臣至軍大將內權差勾當每月一具所差員數職位姓名申樞密院從之庚戌詔以瀛州陳次米依災傷及七分例貸第四等以下戶不得抑配免出息權發遣荆湖北路轉運判官馬珹言體問山猺丁先鋒初因讐殺地客王聰其後沈大鼻等乘勢劫略見今保險遷徙不常官軍難於追逐臣己立賞招捕乞止令湖南差兵防截迫逐赴本路出降詔荆湖南路安撫司曉諭猺賊於北路投首仍多差兵丁防截如己在南路歸窮即安存奏取指揮三月辛丑立賞格是月辛酉降五月己丑處置七月甲戍推賞上批昨差赴廣西戍兵據所供帳狀己見其數不多兼代期月日不逺其近捕官員可更勿令前去縱彼暫闕部轄將校可差上名及十將等己下管押庶免盛夏逺道往反之勞詔軍器庫使兼翰林醫官使陳易簡等五人入內東頭供奉官勾當御藥院李舜舉等四人各轉一官易簡與今年上路衣襖舜舉等四人聽寄資餘減磨勘年及與中下路衣襖共二十二人以上批近太皇太后服藥康復醫官內侍供奉有勞可推恩故也乙卯右正言知制誥知諫院兼判司農寺蔡確為右諫議大夫權御史中丞翰林學士右諫議大夫兼侍讀權御史中丞鄧潤甫落職知撫州太子中允權監察御史裏行上官均責授光祿寺丞知光澤縣潤甫責辭云奏事不實奉憲失中言涉詆欺內懷顧避均云不務審克茍為朋附俾加閲實不如所言先是上别遣黃履黃廉及李舜舉赴御史臺鞫相州法司獄確知上意不直潤甫等即具奏潤甫不悅推見陳安民請求執政情節責罵吏人均亦在傍憤恚見臣不與之同潤甫便行公文云未敢上殿次日却聞因進讀留身續又與均密自奏事不令臣簽書必以臣見其朋姦之迹恐臣論列故造飛語以中傷臣及欲動搖獄情隂結執政䝉陛下遣黃履李舜舉詣臺審問潤甫與均於聚㕔引問罪人處猶敢對使者交口紛紜意欲開誘罪人翻異而罪人了無異辭履及舜舉備見案潤甫等附下罔上情狀明白緣臣前任知雜御史有詔與潤甫共舉臺官臣素不識均因潤甫再三為言遂同奏舉均既䝉朝廷擢任而姦邪如此乞早賜罷斥上始亦疑相州獄濫及無辜遣使訊之乃不盡如潤甫等所言確從而攻之故皆坐貶確遷中丞凡朝士繫獄者確令獄卒與之同室而處同席而寢飲食旋溷共在一堂置大盆於前凡饋食者羮飯餅餌悉投其中以杓勻攪分飼之如犬豕置不問故繫者幸其得問無罪不承此據司馬記聞或移入斷陳安民等下上官均傳云相州富人子殺人讞獄疑於審刑大理京師流言法官竇蘋等受賕知制誥蔡確引猜險吏法官數十人窮訊慘酷無敢明其寃均上疏乞以獄事詔臣等參治坐是謫知邵武軍光澤縣蘋等卒無受賕之實天下服其持平舊紀書鄧潤甫劾詔獄詐罔不實落翰林學士罷御史中丞知撫州三司言澶州闕糧乞權借糧詔許於澶州封樁糧借給毋過五萬石丙辰詔兩浙路提舉官增置一員判司農寺蔡確言兩浙州縣戶衆多提舉司所管錢榖三百餘萬乞擇能吏倚以辦劇故也庚申入內東頭供奉官熙河路都總管司走馬承受公事長孫良臣言聞夏人於漢界內掘坑畫十字立草封恐因循寖成邊事詔經略司體量如實即令鄜延路經略司移牒誡約之詔知廣州曽布専提舉依所降法式修完中東西三城樓櫓詔諸𣙜場除九經疏外若賣餘書與北客及諸人私賣與化外人書者並徒三年引致者減一等皆配鄰州本城情重者配千里許人告捕給賞著為令左藏庫使曹志為昌州刺史以上批志太皇太后從子特推恩也辛酉知制誥錢藻孫洙並直學士院三司乞罷在京行折二銅錢聽盡出新錢從之㸃閲淮南荆湖江西福建將兵畢西上閣門使張山甫減磨勘三年差使指使先次指射差遣餘賜帛有差馬珹言猺賊丁先鋒等納木契乞降詔珹如首領實願降聽收木契毋遣人招喚壬戌詔開廢田興水利建立隄防修貼墟垾之類民力不能役者許受利人戶具合費用數目貸常平等錢榖限三年兩料輸足嵗去息一分詔西上閣門使忠州團練使韓存寶聽以減磨勘三年回授其母萬年縣君田氏進封仁夀郡君賜冠帔非有戰功如存寶者毋得援為例癸亥太白晝見甲子陜西路轉運司乞運河中陕府華州永興軍大錢三十萬緡與緣邉廣置軍儲從之詔制勘院遣人就問太常博士吳安持特免追攝河州請以城東北隅附山不食之地二頃作墓園瘞蕃漢陳亡暴骸已擇僧看管修葺乞賜院額依太原府例二年度僧一人從之仍以慈濟為額詔太醫局選醫生十人給官局熟藥乘驛詣曹村決河所醫治見役兵夫乙丑集慶軍節度使同平章事虢國公宗諤為鎮南軍節度使同平章事進封豫章郡王上批宗諤皇家近屬自除使相今十餘年頃雖曽以罪左降緣己經展磨勘年於法尚有殘零月日未該叙進可特與進一爵遷一官也兩紀皆書此詔麟府豐州見缺熙寧七年至九年振貸米人戶不以等第與展限分夏秋料納又詔聞安南行營軍有實染瘴逐隊不及死於路者多作逃亡注籍深可矜憫宜令所屬考實具名以聞並依瘴死例推恩詔成都府劉庠配賊李玖不以常法特釋之丙寅詔供備庫副使任遵子降一等推恩先是遵遇南郊乞補子班行年己七十中書擬送刑寺定奪上批與之與否非有司所宜决可從朝廷指揮降等推恩仍著為令丹州言本州僻小惟管宜川一縣每有公事止於司理院當直司可以勘鞫乞併州院入司理院從之詔定州望都縣自今罷武臣知縣差京朝官御邇英閣講官沈季長進講周禮小宰掌建邦之宫刑以治王宫之政令凡宫之糾禁上曰政令糾禁詳略如何季長對畢上曰言凡宫之糾禁則不止於王宫蓋又及於諸侯也丁卯河東路經略使韓絳言河外三州并緣邊堡寨未役功料甚衆全闕廂軍乞募禁軍修完從之仍令更刷本路廂軍及候澶州塞河役兵回併力修築如功料浩大即俟農隙更差雇保丁三司言太醫局熟藥所熙寧九年六月開局至十年六月收息錢二萬五千餘緡其息計倍詔監官光祿寺丞程公孫殿直朱道濟減磨勘三年依條給賞自今二年一比較詔熙寧九年進士諸科並依六年指揮試律令或斷案注官纍試不中不能就試即滿二年注官戊辰詔義勇保甲毋得應進士舉今日以前己習文業聽自陳本州試驗若堪取應即給公據落籍本家一丁提舉修閉曹村決口所言丙寅己塞決口詔改新閉曹村掃曰靈平遣樞密直學士陳襄祭謝仍以都總管燕逹兼都大提舉修護務令堅實及遣中使撫問賜燕達以下御筵役兵禁軍等特支錢有差靈津廟神濟夫人進封靈顯神妃初決口屢塞不能絶流財力俱竭達等相視無䇿有小赤蛇出於上流衆以為神共禱之一夕沙漲河遂塞故賜名掃曰靈平廟曰顯靈神妃殆非人力也新舊紀於丙寅書塞決河名其掃曰靈平西染院使任澤為皇城使昌州刺史供備庫副使時君卿為宫苑使榮州刺史前此上批澤先帝舊邸近親君卿承學潜宫特被眷遇可並稍遷兼一遙郡於是並轉皇城使澤領團練使君卿領刺史已而上又批翌日再進呈乃有是命詔經任大小使臣無贓私罪聽召保官二人量試驗充武學外舍生以三十人為額纍試合格乃得補內舍庚午詔贈同判都水監司勳員外郎劉璯為刑部郎中官其一子賜絹三百匹以上批璯自擢置水官纍任以事悉心公家凡以職事建明朝廷無不可者河掃流急晝夜躬親監護至於忘食重冒寒暑感疾不瘳深可惻憫可特優與贈官厚賜其家故有是命後河決塞又賜帛五百辛未祕書丞崇文院校書范育直集賢院以上批育數受命案事能以直道自持不為黨勢回屈而摘發姦慝多得隱伏情狀且今士人方以養私庇姦罔上為俗如育者賞豈宜緩故有是命詔聞曹村雖塞決口水勢尚衝刷新掃其修河官吏議論不一莫肯任責若朝暮西山積雨下流愈難施功委范子淵集議宜如何即得斷流一面施行又詔新掃役兵疲於盛暑可三分日力用二分全役一分與放半功當午大熱聽少休息五月甲戌朔御文德殿視朝是日曹村決口新隄成河還北流自閏正月丙戌首事距此凡用功一百九十餘萬材一千二百八十九萬錢米各三十萬隄長一百十四里此據㑹要及靈津廟碑濮齊鄆徐四州守臣以立隄救水城得不沒皆降詔奬諭四州奬諭據靈津廟碑必自有月日但實録不書今附此賜兵夫死於役者家錢三千新紀有此經制熙河路邉防財用司請本路商販依秦鳯路例打撲從之其入中糧草聽免先是熙河經略司言本路州軍皆新造其商貨己經秦鳯路所歷城寨收納打撲欲乞比秦鳯路三分减一詔依所奏而財用司以為商旅雖經秦鳯路城寨緣販物至極邉獲利甚厚兼逐司既嘗取中裁損毋得過稅錢則販家䝉利已多乞復收打撲依秦鳯路例又言昨以糧草闕乏結糴免打撲其後商人緣以為姦影挾私糴乞亦依例打撲故有是詔詔權利州路轉運使司封郎中張宗諤轉運判官太子中舍張升卿各降兩官勒停初宗諤等乞廢茶場司止委轉運司收茶稅歇馱錢而提舉茶場李稷言其所陳皆踈謬不實罪當無赦上批宗諤升卿踈逺小臣敢為欺罔如此犯雖該赦可特追兩官故有是命宗諤等以去年九月庚午建請朱本并入此今仍兩見乙亥詔試中刑法官第一等充法官第二等循兩資第三等循一資第四等堂除第五等免試京朝官比類推恩又詔廣西轉運司官員使臣諸軍料錢等物願以其半折銀者聽司農寺言諸路蠶麥豐熟乞下提舉司以積缺錢榖量增直折納從之詔賜故著作佐郎崇文院校書張載賻贈視館職之半以翰林學士許將等言載恬於仕進乞加優恤故也己卯羣臣上表賀塞曹村决口河復故道孫洙靈津廟碑可考詳詔塞決河亡卒聽自陳免罪仍具被差急夫合如何優恤其部夫官分若干等第以聞戊戌分三等賞功庚辰詔輔臣觀麥於後苑起復樞密直學士起居舍人簽書本院事曽孝寬孝寬乞終喪許之給半俸又辭從之詔熙河路鈐轄兼第二將四方館使李浩訓兵精熟令再任都大提舉修閉曹村決口所言見修月隄增卑培薄正須兵夫赴役候漲水定即依先鋒指揮分日力三分之一放半功承受韓永式言新修馬頭於大河傾注之間簽成隄岸河流雖斷隄面尚墊猶須衆力乞且留諸處役兵一月候馬頭不墊新隄增固委都大提舉所減放實選役兵萬人俟過漲水聽還並從之提舉茶場司言採茶及般輦州縣乞同轉運司選差知州通判知縣令及排岸官一次其彭漢知州或通判許本司權奏辟如能協力保明留再任從之詔聞在京熙河路鹽鈔減價由遞牒濡滯以害鈔法其令皮公弼根治詔應有謁禁之官如士人通醫術者聽往還勿禁廣南西路轉運司乞令經略司依朝㫖移兵馬於全永二州就食詔二州協心議事毋得乖異具移減戍兵實數以聞賜捕殺荆湖北路猺賊軍士土丁特支錢有差辛巳度支郎中集賢殿修撰知鄆州王克臣為天章閣待制知瀛州熙河路經略使張侁乞舉文資一員凖備差遣㸃檢常平錢榖從之壬午詔塞決河役兵減放日賜特支錢有差衛國長公主長子張秉淵授如京副使當考例經制熙河路邊防財用司言凖朝㫖以土田分等近城第一等為官莊第二等合種第三等出租第四等募人耕五年起稅欲選附城沃土八百頃為官莊有餘募弓箭手又有餘募人合種及出租賦官莊每五十頃差治田使臣一員立賞罰格從之志有此六月十四日七月一日十月二十七日給太原府度僧牒二百買軍器物料詔內殿承制符守臣先借拱聖營官舍更許居十年以守臣懿德皇后家故也甲申上批聞福建兩浙有舊販高麗海商知朝廷遣使爭謀以輕舟馳報規求重賂其下逐路監司覺察之依編敕私販新羅法許人告捕送五百里編管乙酉詔械走投漢界北人王善及其妻子䝉塞耳目至代州牒送北界以上批緣邊所收西北界䦨遺人口當送還者並䝉塞耳目勿令有所聞見故也丙戌詔中書門下奏檢正五房公事覆考到試中刑法出官人上等一人循一資堂除差遣中等稍優上一人循一資下三人各堂除差遣餘推恩有差從之詔諸路州軍並差官一員管勾常平錢穀十縣以上二員分治即廣南無通判職官州軍委知州管勾其下縣㸃檢給納聽以曹官或知縣代之觀文殿大學士左僕射集禧觀使王安石依知大藩府例給添支熙河路經略司言洮東安撫司申據蕃部密報蕃部鈐轄崇儀副使趙紹忠隂與董戩文字往來乞移近裏州軍詔押赴秦州經略司知管毋得縱令出城丁亥詔權及權發遣省府推判官及職司等職任除依本資序奏薦外請給錫賜並依正入資序例詔以開封府界戶絶田二十頃賜曹利用家自今毋得更有陳乞以其孫內殿崇班宗奭言仁宗察知利用非罪嘗還其己沒財産尚有在京屋租河隂滎澤等縣田為西太一宫洪福奉先慈孝等寺常住及入左藏庫金銀雜物乞盡給還故也鄜延路經略使吕惠卿奏以本路兵馬分為九將用將副凡十八人其十三人己被宣差餘五員尚闕今乞以左侍禁閣門祗候胡靜等五人充上批靜舉止輕易不可委以將領下惠卿别具名以聞餘從之戊子上批皇后弟禮賔使滎州刺史向宗回可特增差權羣牧都監禮賔使英州刺史向宗良增差勾當三司衙司德妃苖氏賢妃周氏美人張氏乞遇同天節比媫妤等賜骨肉冠帔詔媫妤賢妃各五道美人二道著為令己丑詔應南茶輒入熙河秦鳯涇原路如私販蠟茶法其巡捕如川峽茶入禁地法又詔京東東路提㸃刑獄司依舊居青州割齊州屬東路徐州屬西路賜度僧牒千付涇原路安撫司鬻錢封樁荆湖北路轉運判官馬珹言至辰州問知猺賊首帥與其黨總六十七人丁先鋒雖己乞降猶於道路攘奪乞處置及辰沅州見禁猺人桞踏雪等三人雖是賊黨緣與猺人偵事及投火作過乞送逺州羈管詔踏雪等並杖脊刺配沂州等處餘令第等具唱率或同謀者以聞後珹以四等具其罪輕重詔上兩等於辰州第三等於叙浦縣羈留各支口食差人監視候輕恩取裁餘發遣依舊庚寅光祿寺丞陸佃修定說文三月六日差王子韶五年六月九日書成詔常平錢穀願以穀及金帛凖市直中價計二分息折納者聽閏正月七日已用本志增入此或可削或移彼附此更詳之詔陳亡并安南病死軍士聽其子孫弟姪年二十以上一人充填本軍內戰亡之子年十五以下病亡之子十五以上並半支請受紐計三年總數折絹仍給公慿令隨便俟及十七赴官自陳量材依招軍收刺詔西河路蕃官等願以請受易茶綵者聽壬辰詔禁軍排連自今以三分為率一分權收立功額外人二分依條簡拍以樞密院兵房言看詳排連取功勞并教頭諸武藝人數不一若將别指揮立功額外人取填一半慮妨本指揮有功及年勞武藝之人轉補故也提舉茶場司言嵗運官茶四萬馱饋邊常患輦送不繼欲以本司頭子錢置百料船三十隻差操舟兵士六人軍大將一人管押嵗終比較如年課辦比陸運省便即計所贏以十之三賞軍大將等有損壞遺闕以賞錢請受備償從之甲午詔宗室袒免以上女與夫離而再嫁其後夫己有官者轉一官中書言奉詔選人祿以戶田定數令吏房立法雖約主戶數以為增損恐未盡天下繁簡之實欲令逐路轉運提㸃刑獄提舉司同約州縣繁簡分三等至五等以聞乃隨等定俸從之後不果行乙未提舉茶場李稷言三路三十六場大小使臣殆及百員乞不限員候三年茶法就緒取裁丙申詔贈廣陵郡王宗誼子仲論仲證候服闋依康王宗朴例各轉一官校書郎邵塤言父亢遺表乞賜出身詔改塤一官前守化州文學趙世卿進安南邊說五篇及自陳安南戰棹司差使有功詔世卿與正官注荆湖南路主簿丁酉詔差待闕得替官權住俸員闕者支本任俸給若朝廷泛遣以等第給添支食錢餘官司依條牒差者惟給食錢以上選人止給前任請俸即未經任者依資序戊戌入內東頭供奉官請永式轉兩官聽寄資其保明勞績優等轉兩官第一等減磨勘二年選人改合入官第二等轉一官選人循兩資第三等減磨勘三年總管及轉運司各第減一等其靈平掃都大提舉及巡河等官滿日酬奬論塞决河之勞也三司言自今宗室嫁娶資送錢物乞令入內省及大宗正司各置都厯每有支遣以千字文立為號注歷印押付使臣往庫務驗認給請以為關防從之詔慶州制勘命官再問不承聽追攝先是遣范育詣慶州劾蕃部事奏乞初問不承即攝上批宜改作再問憫之也又詔知慶州刑部郎中直龍圖閣范純仁奪職知信陽軍永興軍路鈐轄客省使种古追一官知寧州比部郎中史籍追兩官並勒停知環州內藏庫使种診免追官勒停罰銅二十斤環州簽書判官黨師經以下三人衝替一人差替純仁坐不追捕作過熟戶蕃部古虛訟純仁不公診為其兄發奏狀入馬遞籍申制院不實師經等推勘簽書劫盜公事失入故也熙寧十年八月壬午朔遣馮如晦鞫獄已具注在彼并秦觀序合參照純仁言行録云鄜延帥隂奏純仁擅回宥州牒有違慢情罪坐是謫信陽帥鄜延者吕惠卿也當考閏正月丁酉上批更詳之上批交人進奉赴闕緣今來入冦之後理當羈防其緣路及到闕出入當差人監視等事可下廣南西路經略司及在京押伴所速具以聞內緣路事有奏禀不及委經略司一面施行己亥詔權河北轉運副使祠部郎中王居卿權發遣河北東路提㸃刑獄汪輔之各減磨勘三年賞應副河事畢也辛丑手詔日者廣西凡有邊事動至五六處交奏不惟過涉張皇深慮緣路習為常事或真有邊機當速者反致遲滯可速下轉運提㸃刑獄經略雍州安撫都監司自今後非緊切邊事毋得擅發急遞及經略司己奏者不須重復如逐司自有所見及經略司處置未盡不拘此令管勾河東緣邊安撫司劉舜卿言北界西南面安撫司自去秋因移文索姦細人李福夀等妄指占瓶形寨地至今春以來漸以人馬並邊出入臣竊料北人覬覦不過欲蹂踐苖稼或強占地域重立鋪屋以騷疆陲欲止作本處意詳度事勢支吾不至一一申禀以失機㑹從之詔修河所減放諸掃河清客軍並歇泊十日如河防緊急入役即令向後補之詔右武衛大將軍象州刺史克頌貸死追毁出身以來告𠡠鎖外宅坐病狂毆傷妻劉死故也知宗正丞趙彥若言據仙源積慶圗克頌秦王廷美曽孫紀國公德存孫河東郡王承衍子在今為三從外無服之親名銜不當稱皇叔廷美十子各有封國子孫繫屬自存本統克頌合稱紀國公孫謹按禮記曰君有合族之道族人不得以其戚戚君位也鄭氏注族人皆臣也不得以父兄子弟之親自戚於位謂齒列也所以尊君别嫌唐有司奏宗子皇字為稱首從數為序親誠非不戚君位之義儀禮從父昆弟則今同堂也從祖昆弟則今再從也族昆弟則今三從也三從內請依舊餘各以祖稱本封為某王公子孫此則唐之皇親三從內於皇字下有從及再從及三從外則不書皇各以其祖先所封為房冠於頭銜周小宗伯掌三族之别以辨親踈漢宗正叙九族其制一也今宗室文書行於曹局銜位之上雖三從外亦無從數非所謂叙也親踈一概不異其文非所謂辨也臣以為骨肉之恩固在敦睦然上下名分不得不正且有有司之事豈可使天㫖自親其文是乃臣之責任所當守職而論也伏願據宗藩慶緒録悉正其名應同堂親於皇字下加從字再從三從又加再三字三從之外各以其祖先所封郡國為房分而系其世次不書皇字則親踈有别尊卑不黷又伏見本朝宗室舊有召試出身之令熙寧初始命宗子出補外官分釐事任列於有職之臣此誠天下至公盛德之事加以恩澤涵育宗英衆多當此之際有司不能宣德明恩建白所職請廣選舉以少佐當寧勤求之意昔漢之取人不限踈近而宗正有郡國嵗計上籍之文劉向以宗室髙才進對待詔唐宗正寺嵗選進士二十人與國子監京兆府相比李程李肱皆為舉首雖復嗣周而下去聖已久未可以諭當世然取其稍近古者或可施行今宗正寺侍祠之外專掌玉牒屬籍而不豫薦士在於聖時竊恐臣之本職有所未稱謂冝具為條流俾諸教官依國子監外官學例為課試法每遇秋試許就宗正寺投狀鎖試别立人數頗示優異著於格令俾其競勸賢戚並用紀綱四方何獨棫朴之雅乎凡天下事皆如權衡重於此則輕於彼矣宗室之間自有考較賢者獲升不肖自抑一切之恩分當裁損必無觖望夫親賢兼進布列中外以鎮安四海為磐石之固與愚知混淆聚於一處徒殫祿廪而無所事者不可同日語也事雖不行時論是之朱本簽貼云趙彥若所言無取亦無人稱之乃是前史官黨人故載於此又稱時論是之顯出私意刪去新本已復存之今從新本
