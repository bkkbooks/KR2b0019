body:
  text: 續資治通鑑長編巻一百三十七宋李燾撰仁宗慶厯二年六月甲戌出内蔵庫銀一百萬兩紬絹各一百萬疋下三司以給邊費賜河北義勇兵弓弩箭材各一百萬權御史中丞賈昌朝言臣僚年七十而筋力衰者並優與改官令致仕年雖七十而未衰及别有功状朝廷固留任使者勿拘此令在京若工部侍郎俞獻卿少府監畢世長太常少卿李孝若駕部郎中李士良在外若給事中盛京光禄卿王盤太常少卿張倣兵部郎中張億皆耄昬不任事請並令致仕詔在京者中書體量之在外者進奏院吿示之獻卿孝若京尋致仕世長提舉太極觀餘未詳世長士安子也乙亥省南北作坊監官各一貟丙子瀛州言宣徽南院使天平節度使夏守贇卒贈太尉諡忠僖遣使䕶其䘮事戊寅詔河北轉運使司籍民間所養馬有邊警則給價市之修河北舊烽臺辛巳詔雄州代州安撫司每得契丹事宜並報麟府軍馬司癸未資政殿學士右諫議大夫知杭州鄭戩為給事中知并州兼河東路經略安撫縁邊招討使尋改知鄆州錢塘湖溉民田數十頃錢氏置撩清軍以疏導淤澱之患既納國後不治葑土堙塞為豪族僧坊所占冒湖水益狹戩發屬縣丁夫數萬闢之民頼其利事聞詔杭州嵗治如戩法乙酉修通利軍城丙戌以度支判官刑部貟外郎秘閣校理范宗傑為直史館陜西河東京西制置解鹽事兼管勾交子公事宗傑於正月戊午日自度支判官刑部貟外郎秘閣校理為制置解鹽使今復云爾葢正月但制置陜西今并及河東京西也然不應尚帶度支判官或當時兼借省屬以重使事邪建定州北平寨為北平軍三司減省所言自今兩府管軍臣僚節度使宗室及郡縣主兩省都知押班母妻依舊賜冠帔其兩府臣僚無母妻則賜長女或長子婦餘並罷之其僧道賜衣及師號非御前特恩並不許奏薦如於延州納細色軍糧一百石迺賜之詔中書樞密院荆王使相宣徽使管軍節度使及皇親正刺史以上長公主許奏薦紫衣師號如故餘從之戊子樞密副使右諫議大夫任中師為修建北京使并相視徳清軍澶州大名府城池及點檢衣甲器械錢帛糧草軍馬事仍以尚食使象州防禦使入内副都知皇甫繼明管勾修建北京事太常博士集賢校理李昭遘罷鹽鐡判官初詳定減省所議罷天下職田及公使錢昭遘以為不可權三司使姚仲孫惡其異已且詰昭遘所以興利之術而昭遘爭辨不已故罷之尋為三門白波發運使因入奏事上謂曰前所論罷職田事卿言是也昭遘為三門白波發運乃八月丙子今并書庚寅以提舉河北刑獄司勲貟外郎王儀提舉本路修葺城池器械及置堡寨烽火教閱軍陣市馬等事辛卯賜澶州修城池役卒及義勇强壮緡錢壬辰以延州格登族軍主香瑪珪年族軍主阿克阿並為副都軍主格登副軍主齊黙特掲家族副軍主李朝政並為軍主貝家族都虞候崆愛索斡族都虞候拓徳遇李文信並為副軍主鄜延部署司言其擊賊有功也三司減省所言比來醫官多僥倖求實俸至有尚藥奉御而其入多於醫官副使者請自今並依例折支從之置汾州向陽峽寨乙未河東都轉運使户部郎中天章閣待制明鎬為龍圖閣直學士知并州兼河東經略安撫縁邊招討使鎬大廵邊以備賊時邊任多紈絝子弟鎬憂其悮軍事曰此可盡斥邪待奏則晚矣乃取尤不職者杖之疲軟子弟皆自解去更奏擇習事者守堡寨軍行倡婦多從之鎬欲驅逐惡傷士卒心㑹有忿爭殺倡婦者吏執以聞鎬曰彼來軍中何邪縱去不治倡婦聞之皆散走河北轉運使吏部貟外郎史館修撰文彦博為天章閣待制本路都轉運使環慶部署司言没於行陣将校之子孫或録二人至三人自今非戰勝而沒者請止録一人從之既而韓琦言将士臨陣皆圖勝㨗力有不敵戰敗而死人命至重豈以勝負為言國家唯追崇虚名存録孤子所以勸誘來者使之効命今邊臣讀此條貫往往傷歎以謂一死報國更分勝負恐非朝廷激厲将士之術兼前記所載亦無此例若果更分勝負則傷中并孝贈亦合作兩等支賜理實未便乞並如舊制施行從之此事自十二月壬寅増入丙申以鎮戎軍就糧蕃落都指揮使忠州刺史向進為石州刺史涇原路縁邉都廵檢使其子弟堅等五人並為左班殿直自西鄙用兵上思擢用諸蕃落将士㑹招討使王㳂遣進等一百三十人赴京師進名為有勇又其族多死王事者上御崇政殿閱試而堅騎射尤精悍取所射弓親挽之力甚勁因遍示輔臣具諭其衆曰若屬為國家捍賊甚勞苦朕累知之又見其馬善馳走曰此真戰馬毋為權豪所市也於是百三十人悉遷補之進先見元年三月御史中丞賈昌朝等言今詳定減省事畢自後或有臣僚輙於所減省中復有陳乞望令兩府及三司執奏從之此據朔厯乃丙申日奏今附見丁酉陜西都轉運使刑部貟外郎天章閣待制張奎知永興軍戊戌翰林學士蘇紳為修建北京副使陜西河東京西制置解鹽使范宗傑兼權陜西轉運司事己亥三司減省所言郊祠所賜自中宫以下減半則公卿近臣當以次減舊賜銀絹四千三千者損一千一千損三百三百損百二十皆著為式是月侍御史魚周詢劾奏判河陽䕶國節度使右僕射兼侍中張耆典藩無状乞令就京師私第養病詔擇人代還右正言田况請罷耆将相之任使以散官就第不許尋徙耆判陳州又判夀州周詢以丙申日奏况以丁酉日奏實録並無之今據朔厯追書徙判陳州乃七月丁亥徙夀州又在閏九月甲申今并書秋七月壬寅朔知諫院張方平言朝廷政令之所出在中書若樞密院則古無有也蓋起於後唐權宜之制而事柄遂與中書均分軍民為二體别文武為兩途為政多門自古所患今朝綱内弛邊事日生西北二方交有憑陵中夏之志二府之中豈盡材猷之士臣向嘗面論之而陛下諭臣今倚以為用者猶不任職若更選用誠之可使之人臣請於外擇人陛下又以為疆事未寧邉臣無功豈當遽召而用之審如聖意則所用者不過燕安朝路容身養望者爾若然勞臣益解體武士益離心矣陛下試思臣前議斷自淵衷特廢樞密院或重於改為則請併本院職事於中書其見任樞密使副不才者罷之諸房吏史且皆如舊亦足以一政事之本通賞罰之權省冗濫之費塞僥倖之望改而張之不傷體裁而制之不動衆陛下幸與一二宗臣舊老深圖此議而必行之不報方平奏入不報據㑹要乙巳以御前忠佐馬軍都軍頭田朏為西京作坊使并代州都監東頭供奉官郝質為内殿崇班忻代都廵檢使並領兵屯崞縣以控扼二方初河東宣撫使杜衍知并州明鎬並言忻代為敵騎走集之地且薦朏質等材勇可任請分精銳土兵數千授此兩人使屯險要萬一有警必能保其成功若各處一郡上為庸将所制不復能施摧堅陷陣之力故特命之質先與朏将所部兵援軍須物饋麟州至青美朗㑹賊數千騎鈔掠先驅力戰斬首數百級獲馬數百疋器甲以萬計又與朏行邊至栢子寨西遇賊方塹道以阻官軍質急麾衆擊之轉戰至寒嶺下日晡而賊北斬首百餘級遂修復寧逺等諸寨以抗賊衝此據郝質傳附見田朏不詳何許人丙午樞密副使給事中任布罷為兵部侍郎知河陽布任樞密純約自守無所補然數與宰相吕夷簡忤夷簡惡之布長子遜素狂愚夷簡知之乃怵使言事許以諫官遜即上書歴詆執政大臣且斥布不才布見其書匿之夷簡又趣遜以書上遜復上書罪匿者上問知匿書乃布也布謝臣子少有心疾其言悖謬懼辱朝廷故不敢宣布侍御史魚周詢因劾奏布不才之甚其子具知布遂罷去遜尚留京師望諫官夷簡尋以它事黜之議者謂周詢引遜語逐其父為不知體夷簡怵遜使上書此據日記丁未詔自今陣亾軍校無子孫者賜其家錢指揮使七萬副指揮使六萬軍使都頭副兵馬使副都頭五萬癸丑彰信軍節度使李迪為太子太傅致仕甲寅賜南北作坊弓弩院造軍器工匠緡錢戊午右僕射兼門下侍郎平章事吕夷簡判樞密院工部侍郎平章事章得象兼樞密使樞密使晏殊同平章事初富弼建議宰相兼樞密使上曰軍國之務當悉歸中書樞密非古官然未欲遽廢故止令中書同議樞密院事及張方平請廢樞密院上乃追用弼議特降制命夷簡判院事而得象兼使殊加同平章事為使如故壬戌詔晏殊班張耆之上廣東轉運使言占城國䕶送軍賊鄂鄰并所虜軍士百姓至廣州且言鄰前後所殺羅文等六十二人皆啗之詔梟鄰等七人于廣州被害之家各給復二年初富弼張茂實以結㛰及増嵗幣二事往報契丹惟所擇弼等至穆丹河劉六符館之謂弼曰北朝皇帝堅欲割地如何弼曰北朝若欲割地此必志在敗盟假此為名南朝决不從有横戈相待耳六符曰若南朝堅執則事安得濟弼曰北朝無故求割地南朝不即發兵拒却而遣使好辭更議嫁女益嵗幣猶不從此豈南朝堅執乎及見契丹弼曰兩朝人主父子繼好垂四十年一旦忽求割地何也契丹曰南朝違約塞雁門増塘水治城隍籍民兵此何意也羣臣競請舉兵而寡人以謂不若遣使求關南故地求而不得舉兵未晚也弼曰北朝㤀章聖皇帝之大徳乎澶淵之役若從諸将之言北兵無得脫者且北朝與中國通好則人主専其利而臣下無所獲若用兵則利歸臣下而人主任其禍故北朝諸臣爭勸用兵者皆為其身謀非國計也契丹主驚曰何謂也弼曰晉髙祖欺天叛君而求助於北末帝昬亂神人棄之是時中國狹小上下離叛故契丹全師獨克雖虜獲金幣充牣諸臣之家而壮士健馬物故大半此誰任其禍者今中國提封萬里所在精兵以萬計法令修明上下一心北朝欲用兵能保其必勝乎曰不能弼曰勝負未可知就使其勝所亡士馬羣臣當之歟抑人主當之歟若通好不絶嵗幣盡歸人主臣下所得止奉使者嵗一二人耳羣臣何利焉契丹主大悟首肯者久之自北朝㤀真宗皇帝之大徳以下至此並據仁宗實録朱本葢朱本用蘇軾所作神道碑墨本乃無之范純仁行状及弼奉使語録亦無神道碑必有所據不知墨本何故不載此也按奉使必有别録弼前奉使未見别録恐神道碑朱史所載弼語在别録當考求之弼又曰塞雁門者以備元昊也塘水始於何承矩事在通好前地卑水聚勢不得不増城隍皆修舊民兵亦舊籍特補其闕耳非違約也契丹主曰㣲卿言不知其詳然寡人所欲得者祖宗故地爾弼曰晉髙祖以盧龍一道賂契丹周世宗復伐取關南皆異代事宋興已九十年若各欲求異代故地豈北朝之利乎契丹主無言徐曰元昊稱藩尚主南朝伐之不先吿我何也弼曰北朝向伐髙麗黑水豈嘗報南朝乎天子令臣致意於陛下曰向不知元昊與弟通姻以其負恩擾邊故討之而弟有煩言今擊之則傷弟兄之情不擊則不忍坐視吏民之死不知弟何以處之契丹主顧其臣下語良久乃曰元昊為冦豈可使南朝不擊乎既退六符謂弼曰昔太宗既平河東遂襲幽燕今雖云用兵西夏無乃復欲謀燕薊乎弼曰太宗時北朝先遣伊埒摩哩來聘既而出兵石嶺以助河東太宗怒其反覆遂伐燕薊蓋北朝自取之也六符又曰吾主恥受金帛堅欲十縣如何弼曰南朝皇帝嘗言朕為人子孫豈敢妄以祖宗故地與人昔澶淵白刃相向章聖尚不與昭聖關南豈今日而可割地乎且北朝欲得十縣不過利其租賦爾今以金帛代之亦足坐資國用朕念兩國生民不欲使之肝腦塗地不愛金帛以徇北朝之欲若北朝必欲得地是志在背盟棄好朕獨能避用兵乎且澶淵之盟天地神祗實共臨之今北朝先發兵端朕不愧於心亦不愧天地神祗矣六符謂其介曰南朝皇帝存心如此大善當共奏使兩主意通翌日契丹召弼同獵引弼馬自近問所欲言弼曰南朝惟欲歡好之久爾契丹曰我得地則歡好可久弼曰南朝皇帝遣臣聞於陛下曰北朝欲得祖宗故地南朝亦豈肯失祖宗故地耶且北朝既以得地為榮則南朝以失地為辱矣兄弟之國豈可使一榮一辱哉朕非㤀燕薊舊封亦安可復理此事正應彼此自喻耳退而六符謂弼曰皇帝聞公榮辱之言意甚感悟然金帛必不欲取惟結㛰可議爾弼曰結㛰易以生釁况夫婦情好難必人命修短或異則所託不堅不若増金帛之便也六符曰南朝皇帝必自有女弼曰帝女才四嵗成㛰須在十餘年後雖允迎女成㛰亦在四五年後今欲釋目前之疑豈可待哉弼揣敵欲㛰意在多得金帛因曰南朝嫁長公主故事資送不過十萬緡爾由是敵結㛰之意緩且諭弼歸弼曰二論未决安敢徒還願留畢議契丹曰竢卿再至當擇一事授之宜遂以誓書來也弼還奏復授弼吏部郎中樞密直學士又辭不受癸亥弼與茂實再以二事往於是吕夷簡傳帝㫖令弼草答契丹書并誓書凡為國書二誓書三議㛰則無金帛若契丹能令夏國復納款則嵗増金帛二十萬否則十萬弼奏於誓書内創増三事一兩界溏淀毋得開展二各不得無故添屯兵馬三不得停留逃亾諸色人弼因請録副以行中使夜賫誓書五函并副追及弼於武强授之弼行至樂夀自念所増三事皆與契丹前約萬一書詞異同則敵必疑乃密啟副封觀之果如弼所料即奏疏待報又遣其屬前陵州團練推官宋城蔡挺詣中書白執政上欲知敵事亟召挺問挺時有父䘮聽服衫㡌對便殿此據蔡挺傳増入乃詔弼三事但可口陳弼知此謀必執政欲變已所與北朝所議者乃以禮物屬茂實疾馳至京師日欲晡叩閤門求對閤門吏拘以舊制當先進名對仍翌日弼責之遂急奏得入見曰執政固為此欲致臣於死臣死不足惜奈國事何上急召吕夷簡等問之夷簡從容曰此誤爾當改正弼語益侵夷簡晏殊言夷簡决不肯為此真恐誤爾弼怒曰殊姦邪黨夷簡以欺陛下遂詔王拱辰易書其夕弼宿學士院明日乃行乙丑樞密院奏乞分屯澶州軍馬於曹濮等州就糧從之朔厯詔京師朝官以病乞尋醫者湏一年方聽朝參己巳以泉州民邵保為下班殿侍三班差使監南劒州昌順縣酒稅保本海商嘗至占城國見軍賊鄂鄰歸而言之及朝廷命使臣齎詔赴占城保與俱往獲鄰等還故録之庚午詔大宗正司自今皇親㛰姻其依律令外若父母親姊妹及父母之親姑為妯娌或相與為婦姑行而尊卑差互者不得為㛰姻其服紀疏逺而房分不同祖者並許通嫁娶仍不係夫之長少各叙本族之尊卑又所與繫親之家若現任文武升朝官雖三代不盡食禄但非工商伎術及惡逆之族有朝臣委保者聽之初大宗正司言今宗族蕃盛多於勳舊之門迭為㛰姻其服紀尊卑雖於禮律無嫌而終為有司所拘至諸宫院難以求親下太常禮院議而降是詔八月壬申朔皇第六女卒母御侍楊氏也生才六日詔河南府孟鄭滑陳許潁蔡鄧唐隋等州發常平倉粟以賑貧民丁丑御崇政殿策試才識兼茂明於體用科殿中丞錢明逸明逸所對策入第四等次以為太常博士通判廬州明逸易子也戊寅策試武舉人辛巳知大名府尚書左丞程琳加資政殿學士壬午資政殿大學士吏部侍郎李若谷為太子少傅致仕乙酉詔河北諸路州軍自修城籍强壮刺義勇頗妨農時應見役去處並令放免朔厯戊子出内蔵庫緡錢十萬修北京行宫時任中師奏行宫大抵摧圮請更新之上令創修寝殿及角樓餘皆完補而巳其自京至徳清軍行宫館驛廨署亦量加葺治刑部檢法官楊中正言在京命官使臣本司吏人犯杖罪以下聽决罰從之庚寅賜陜西縁邊戍卒緡錢壬辰以兵部貟外郎兼侍御史知雜事程戡為契丹國母生辰使西上閤門副使張得一副之太常丞直集賢院張方平為國主生辰使東頭供奉官閤門祗候劉舜臣副之兵部貟外郎集賢校理判三司開拆司楊偉為國母正旦使禮賓副使王仁旭副之鹽鐵判官兵部貟外郎方偕為國主正旦使禮賓副使王易副之偉億從弟也當通判單州㑹廵檢部卒合州卒二百餘人謀殺廵檢使入鼓角門州将不敢出偉挺身往問曰若屬何苦而反或曰将有訴于州非反也偉曰持兵來非反而何若屬皆有父母妻子以一朝忿而欲魚肉之乎悉令投兵坐籍首惡十餘人斬之偉事據本傳當在明道間今附于此仁旭顯孫詔河北秋稼豐稔宜令三司計度收糴此據朔厯己亥命侍御史仲簡崇儀副使王整為京東路體量安撫兼催捉盗賊權御史中丞賈昌朝言臣僚起居失儀請依唐例參列為八節分十六事從之九月辛丑朔太常博士孫甫為祕閣校理樞密副使杜衍所薦也甫陽翟人衍守京兆辟知府司録事吏職纎末皆倚辦甫曰待我如此可以去矣衍聞之不復以小事屬甫衍與語必引經以對言天下賢俊歴評其才性所長衍曰吾辟屬官得益友嘗監益州交子務轉運使以偽造交子多犯法欲廢不用甫曰交子可以偽造鐵錢可以私鑄有犯私鑄錢可廢乎但嚴治之不當以小害廢大利交子卒不廢甫與祕書丞楊孜並為校理孜事無所見今不書詔幕職州縣官舊制湏三考以上許應制舉自今勿拘癸卯環慶路部署司言西界偽團練使馬都克來降詔除右班殿直此據實録五月庚午諾爾來降實之録乃無之疑馬都克即諾爾當考乙已詔河東本城兵士係教閱者並升為禁軍其招收一十七指揮列無敵之下保州威邊之上内定州并軍城寨四指揮以𨽻定州路順安軍一指揮𨽻真定府路保州廣信安肅軍六指揮𨽻㳂邊廵檢司覇州信安軍指揮𨽻髙陽關路初命宰臣吕夷簡判樞密院事既宣制黄霧四塞霾風終日朝論甚喧參知政事王舉正言二府體均判名太重不可不避也右正言田况復以為言夷簡亦不敢當黄霧風霾據御史臺記丙午夷簡改兼樞密使辛亥録碭山尉董祺子中孚為碭山縣尉仍免持服中立補郊社齋郎以祺捕盜鬬死也壬子置福建廣南東西路諸州教閱澄海軍各兩指揮乙卯以陜西縁邊制置青白鹽使祕書丞蒋偕為北作坊副使環慶路都監范仲淹龐籍薦之也賜秦州小洛門採造務役卒緡錢癸亥秦鳳路管勾機宜文字太子中允馮誥換崇儀副使為本路都監陜西轉運司言近添就糧兵士七萬人糧賜幾三百萬緡乞加詳議詔三司擘畫以聞知諫院張方平言臣近因減省見邊戍供輸之勞天下物力之困今雖峻行裁節精為鳩集若㑹所得冀充諸費是猶益之以畎澮泄之以尾閭量入為出非所以持乆者也伏請選擇近臣令奉明詔分使諸道就諸邊臣與之深議所以豐財嗇用守備經逺之計内外相應本末同體庻幾乎功利之可舉即如縁邊騎兵計蓄一騎可以贍卒五人西戎出善馬地形險隘我騎誠不得與較走集也多留軍馬既不足用徒索芻粟今方北備契丹乃是用騎之地乞以陜西新團土兵多換馬軍東歸一以省關中之輓輸一以備河北之戰守張方平奏附見初不與此相關也富弼張茂實以八月乙未至契丹清泉淀金氊館持國書二誓書三以語館伴耶律仁先劉六符仁先六符問所以然者弼曰姻事合則以姻事誓能令夏國復歸款則嵗入金帛増二十萬否則十萬國書所以有二誓書所以有三也翌日引弼等見契丹太弟宗元子梁王洪基侍蕭孝思孝穆馬保忠杜防分立帳外契丹曰姻事使南朝骨肉暌離或公主與梁王不相恱則将奈何固不若嵗増金帛但無名爾湏於誓書中加一獻字乃可弼曰獻字乃下奉上之辭非可施于敵國况南朝為兄豈有兄獻於弟乎契丹曰南朝以厚幣遺我是懼我也獻字何惜弼曰南朝皇帝守祖宗之土宇繼先皇之盟好故致幣帛以代干戈蓋惜生靈也豈懼北朝哉今陛下忽發此言正欲棄絶舊好以必不可冀相要爾則南朝亦何暇顧生靈哉契丹曰改為納字如何弼曰亦不可契丹曰誓書何在取二十萬者來弼既與之契丹曰必與寡人加一納字卿無固執恐敗迺主事我若擁兵南下豈不禍乃國乎弼曰陛下用兵能保其必勝否契丹曰不能弼曰勝未可必安知其不敗邪契丹曰南朝既以厚幣與我納字何惜况古有之弼曰自古惟唐髙祖借兵於突厥故臣事之當時所遺或稱獻納亦不可知其後頡利為太宗所擒豈復更有此理契丹默然弼詞色俱厲度不可奪曰我自遣使與南朝皇帝議之若南朝許我卿将何如弼曰若南朝許陛下請陛下與南朝書具言臣等於此妄有爭執請加之罪臣等不敢辭契丹曰此乃卿等忠孝為國之事豈可罪乎弼退而與劉六符言指帳前髙山曰此尚可踰若欲獻納二字則如天不可得而升也使臣頸可斷此議决不敢諾於是敵留所許嵗増金帛二十萬誓書復遣耶律仁先劉六符齎其國誓書以來仍求納字二十萬誓書蓋明著令夏國納款事契丹不恱欲令弼改之弼不可敵亦卒不肯報其事於誓書但於國書中叙述爾是月乙巳弼等還至雄州詔即以弼為接伴事有朝廷合先知者急置以聞弼奏曰彼求獻納二字臣既以死拒之敵氣折矣可勿復許然朝廷竟從晏殊議許稱納字弼不預也乙丑契丹樞密副使保大節度使耶律仁先樞密使禮部侍郎同修國史劉六符入見其誓書曰維重熈十一年嵗次壬午八月壬申朔二十九日庚子弟大契丹皇帝謹致書于兄大宋皇帝闕下來書云謹按景徳元年十二月七日章聖皇帝與昭聖皇帝誓曰共遵成約䖍守歡盟以風土之儀物備軍旅之費用每嵗以絹二十萬疋銀一十萬兩更不差使臣専往北朝只令三司差人般送至雄州交割㳂邊州軍各守疆界兩地人户不得交侵或有賊盜逋逃彼此勿令停匿至於隴畆稼穡南北勿縱騷擾所有兩朝城池並各依舊存守淘壕完葺一切如常即不得創築城隍開決河道誓書之外一無所求各務協心庻同悠久自此保安黎庻謹守封疆質于天地神祗吿于宗廟社稷子孫共守𫝊之無窮有渝此盟不克享國昭昭天鑒共當殛之昭聖皇帝復答云孤雖不才敢遵此約謹當吿于天地誓之子孫神明具知嗚呼此盟可改後嗣何述竊以兩朝修睦三紀于此邊鄙用寧干戈載偃追懐先約炳若日星今綿䙫己深敦好如故如關南縣邑本朝𫝊守懼難依從别納金幣之儀用代賦稅之物每年増絹一十萬疋銀一十萬兩前來銀絹般至雄州白溝交割兩界塘淀已前開畎者並依舊外自今已後不得添展其見隄堰水口逐時決洩壅塞量差兵夫取便修疊疏導非時霖潦别至大叚漲溢並不在關報之限南朝河北㳂邊州軍北朝自古北口以南㳂邊軍民除見管數目依常教閱無故不得大叚添屯兵馬如有事故添屯即令逐州軍移牒關報兩界所屬之處其自來乗例更替及本路移易不在關防之限兩界逃走作過諸色人並依先朝誓書外更不得似日前停留容縱恭惟二聖威靈在天顧兹纂承各當遵奉共循大體無介小嫌且夫守約為信善鄰為義二者缺一罔以守國皇天后地實聞此盟文蔵宗廟副在有司餘並依景徳統和兩朝誓書顧惟不徳必孰大信茍有食言必如前誓時契丹實固惜盟好特為虚聲以動中國中國方困西兵宰相吕夷簡等持之不堅許與過厚遂為無窮之害敵既嵗得金帛五十萬因勒碑紀功擢劉六符極漢官之貴子孫重於國中戊辰以真定府定州路鈐轄洛苑使普州刺史入内押班楊懐敏為高陽關路鈐轄駐軍滄州閏九月辛未朔詔比建北京以備廵幸其供擬之物宜令有司辦置毋或擾民壬申詔河北路義勇鄉兵死而其家有丁壮者令逐處選補之賜延州通判國子博士馬端同進士出身樞密直學士韓𤦺范仲淹薦端材免試命之此據㑹要當考癸酉贈郇國公允成第三子為左衞率府率賜名宗頡初左屯衞大将軍封州刺史宗顔言其弟伴叔幼嘗侍上東宫未及賜名而卒故特賜贈之允成元佐第三子宗顔允成長子也丙子髙陽關鈐轄兼知瀛州西上閤門使果州團練使張亢權本路副都部署賜開封府太康縣義居民周秘家米五十斛絹五十疋仍令嵗時存撫之秘年八十五其家五世不異爨故也庚辰復命右正言知制誥史館修撰富弼為吏部郎中樞密直學士弼又固辭先是吕夷簡當國人莫敢抗弼既數論事侵之及堂吏以偽署度僧牒誅夷簡益恨因薦弼使契丹變易國書欲因事罪之館閣校勘歐陽修上書引顔真卿使李希烈事留之不報而弼受命不少辭自初奉使聞一女卒再奉使聞一男生皆不顧而行得家書不發而焚之曰徒亂人意爾壬午太子中允集賢校理通判秦州尹洙直集賢院洙上奏曰孝文帝盛徳之主賈誼論當時事勢猶云可為痛哭孝武帝外制四夷以彊主威徐樂嚴安尚以陳勝亡秦六卿簒晉為戒二帝不以危亂滅亡為諱故子孫保天下者十餘世秦二世關東盜起或以反者聞二世怒下吏或曰逐捕令盡不足憂乃恱隋煬帝時四方兵興左右近臣皆隐賊數不以實聞或言賊多者輙被詰二帝以危亂滅亾為諱故秦隋宗社數年為邱墟陛下視今日天下之治孰與漢文威制四夷孰與漢武國家基本仁徳陛下慈孝愛民誠萬萬於秦隋矣至於西有不臣之虜北有强大之鄰非特閭巷盜賊之勢也自西虜叛命四年旁塞苦數擾内地疲逺輸兵久于外而休息無期卒有乗弊而起兵法所謂雖有智者不能善其後當此之時陛下宜夙夜憂懼所以慮事變而塞亂源也陛下延訪邊事容納直言前世人主勤勞寛大未有能逺過者然未聞以宗廟為憂危亾為懼此賤臣所以感憤於邑而不已也何者今命令數更恩寵過溢賜予不節此三者戒之謹之在陛下所行爾非有難動之勢也而因循不革弊壊日甚臣是以謂陛下未以宗廟為憂危亡為懼者以此夫命令者人主所以取信於下也先時民間朝廷降一命令皆竦視之今則不然相與竊語以為不久當更既而信然此命令日輕於下也命令輕則朝廷不尊矣又聞羣臣有獻忠謀者陛下始甚聽之後復一人沮之則已移矣忠言者以信之不能終頗自詘其謀以為無益此命令數更之弊也夫爵賞陛下所持之柄也近時貴戚内臣以及士人或因縁以求恩澤從中而下謂之内降臣聞唐氏衰政或母后専制或妃主擅朝結恩私黨名為斜封今陛下威柄自出外戚内臣賢而才者當與大臣公議而進之何必襲斜封之弊哉且使大臣從之則壊陛下綱紀不從則沮陛下徳音壊綱紀則忠臣所不忍為沮徳音則威柄日輕且盡公不阿朝廷所以責大臣今乃自以私昵撓之而欲責大臣之不私難矣此恩寵過濫之弊也夫賜予者國家當以勸功也比年以來嬪御及伶官太醫之屬賜與過厚人間𫝊言内帑金帛皆祖宗累朝積聚陛下用之不甚愛惜今之所存無幾疏逺之人誠不能知内府豐匱之數但見取於民者日煩即知蓄於公帑者不厚臣亦知國家自西方宿兵用度寖廣帑蔵之積未必悉為賜予所費然下民不可家至而户曉獨見陛下行事感動耳往嵗聞邊将王珪以力戰賜金則無所不恱或見優人所得過厚則往往憤歎人情不可不察此賜予不節之弊也臣所論三事皆人人所共知近臣從䛕而不言以至今日方今非獨邊陲之為患朝政日敝而陛下不寤人心日危而陛下不知臣願先正於内以正於外然後忠謀漸進忠謀漸進則紀綱漸舉國用漸足士心漸奮邊陲之患庻乎息矣惟深察秦隋惡聞忠言所以亡逺法漢主不諱危亂所以存日新盛徳與民更始則天下幸甚詔寒食十月朔宗室遥郡刺史以下聽更往朝陵知諫院張方平言臣伏見朝廷近以契丹有渝盟之漸縁邊急奏繼來車駕聲言親征有司各為備擬抽換陜西兵馬待河北事宜又聞諸路帥臣或有不時發遣至煩勑使從而吿諭若使契丹遂至衝突鑾輿或果煩動倉卒之際兵衞未集而又召發莫赴則大事去矣歴觀古今之變為國理亂之形隣敵交侵無代不有惟是人主威命不行朝廷政令不舉亂危之兆必從此始揆今事勢夫何如哉猛不濟寛威不克愛朝廷命令邊臣易於違戾邊臣奏覆朝廷難於執持原此恣慢之端悉由姑息之過即如昨者除四帥觀察故事尚書丞郎之帶職者得換廉察錢若水罷樞密副使徐乃授之馬知節罷樞密副使止除防禦使陛下憂矜邊寄特示恩榮今四人者職皆直學士官即貟外郎而乃正其名使之總戎厚其禄使之撫下本朝之意夫豈為薄誥命已頒章奏沓至妄生意見過為猜嫌就或强拜乃懐大慊甚焉者至欲繫獄請罪當之者猶以班叙為辭朝廷一切含容君命益成輕削臣誠愚褊竊獨憤然儻陛下之威命行朝廷之政令舉罰戮在後爵賞在前必信如春秋不測如雷霆使中外僚宷震懾奔走則天下之智力不勝其用矣何故屈大公之法伸羣下之私如是之惴惴為哉昔有志於尊主庇民者遭世多難感慨投袂徒激大義外平邊隅内寧社稷若據土宇握士衆聞國有急觀望晏然乃心王家夫豈如此儒臣猶爾使武人暴夫顧望倣效則履霜堅冰漸不可長也此臣所以竊懐憤惋實為宗廟深慮若中使回奏其諸路有不奉詔伏望聖斷特遣朝臣之通識理體者按問其状嚴行責削以謹下之銜勒以正國之紀綱思患預防古之善戒惟陛下諒察方平所言抽換陜西兵馬待河北事宜不見於實録要不可不書但不知何時今附閏九月癸未罷北京供頓前更竢考詳其劾四帥恣慢疑方平實吕夷簡黨人私作好惡頼仁宗勿聽也不然豈不壊國事乎故具載之癸未詔自陳橋至北京凡有司供頓調度悉罷朔厯先是營建北京内侍皇甫繼明主營宫室欲侈大其制以要賞知大名府程琳以為方事邊又欲事土木以困民不可既而繼明數有論奏上遣侍御史魚周詢按視罷繼明歸闕命琳獨主其事贈修媛張氏曽祖東頭供奉官文漸為寧州刺史祖試校書郎隸為光禄少卿外祖應天府助教曹簡為秘書省著作佐郎修媛追贈三世前此未有也除諸州軍天慶觀所賜田稅辛卯罷澶州等處浮梁筭緡癸巳涇原副都部署葛懐敏與元昊戰沒於定川寨先是元昊聲言入冦是月辛未朔王㳂命懐敏将兵禦之己卯至瓦亭寨遣本寨都監許思純新環慶都監劉賀以畨兵五千餘人為左翼天聖寨主張貴為殿後戊子進屯五谷口知鎮戎軍曹英涇原路都監趙珣西路都廵檢李良臣孟淵皆自山外來㑹㳂邊都廵檢使向進劉湛為先鋒趙瑜總竒兵為援及大軍次安邊寨給芻秣未絶懐敏即離軍夜至安逺堡北一里而舍庚寅領大軍自鎮戎軍西南又先引從騎百餘以前走馬承受趙政以為距賊近不可輕進懐敏乃少止晚趨飬馬城曹英及涇原都監李知和王保王文鎮戎都監李岳西路都廵檢趙麟等分兵屯鎮戎城西六里夜則入城自守凡三日至是亦趨飬馬城見懐敏聞元昊徙軍新壕外乃議質明掩襲趙珣謂懐敏曰賊逺來利速戰其衆數倍銳甚為今之計且以竒制之宜依馬欄城布柵扼賊歸路固守鎮戎以便餉道竢其衰擊之可必勝不然為賊所屠懐敏不聽命諸将分四路趣定川寨劉湛向進出西水口趙珣出蓮華堡曹英李知和出劉璠堡懐敏出定西堡既而知和與英督軍夜發辛卯劉湛向進行次趙福新堡遇賊戰不勝保向家峽而趙珣曹英李良臣孟淵等将趨定川懐敏且令援趙福堡未行諜言賊已屯邊壕上復召珣等入定川㑹李知和麾下蕃落将報賊五千人列定川寨北頃之王文李知和定川寨主郭綸又報已㧞寨踰壕懐敏命趙珣與其子宗晟先行日幾午懐敏入保定川寨賊毁版橋斷其歸路别為二十四道以過軍環圍之又絶定川水泉上流以饑渇其衆劉賀帥蕃兵鬬于河西不勝餘衆潰去懐敏為中軍屯寨門東偏曹英等陣東北隅賊自偏江州葉燮㑹出四面俱至先以銳兵衝中軍不動回擊曹英黑風自東北起部伍相失陣遂擾士卒攀城堞爭入英面被流矢仆壕中懐敏所部兵見之亦奔駭懐敏為衆所擁蹂躪幾死輿至甕城久之乃蘇懐敏選士據門橋揮手刀以拒入門者趙珣等擁刀斧手前鬬及以騎軍回合禦賊賊衆稍却然大軍無鬬志趙珣累馳入勸懐敏還軍中是夕賊聚火圍城西隅臨西北謼曰爾得非部署聽上㸃陣圗者耶爾善屯軍入我圍中今将何往夜二鼓懐敏將號召郝從政軍來援至四鼓召曹英李知和王保趙珣王文許思純劉賀李良臣趙瑜計議莫知所出遂謀結陣走鎮戎軍趙珣請自籠竿城往曰彼無險且出賊不意衆不從雞鳴懐敏自諭親軍左右及在後者不得動平明從吾往安西堡以曹英趙珣為先鋒劉賀許思純為左右翼李知和王保王文為殿後聽中軍鼓乃得行日加卯鼓未作懐敏先上馬而大軍按堵未動懐敏周麾者再将徑去有執鞚者勸不可懐敏不得已而還參謀郭京及指使等取芻城中未至懐敏復上馬叱執轡者使去不聽㧞劍且擊之士遂散懐敏策馬東南馳行二里許至長城壕路已斷賊周圍之懐敏及曹英李知和趙珣王保王文劉賀李岳張貴趙璘許思純李良臣涇原廵檢楊遵籠竿城廵檢姚奭都廵檢司監押董謙同廵檢唐斌指使霍達皆遇害餘軍九千四百餘人馬六百餘匹悉陷于賊懐敏子宗晟與郭京走馬承受王昭明趙政等還保定川初懐敏令軍中歩兵不得動及前陣已去後軍多不知者故皆得存時韓質郝從政胡恩領軍三千保蓮花堡韓質郝從政胡恩未詳官職十一月己丑當考劉湛向進領軍一千保向家峽皆不赴援於是賊長驅直抵渭州幅貟六七百里焚蕩廬舍屠掠居民而去司馬光記聞九月冦聲言入冦十月一日㳂使部署懐敏鈐轄知和以甲七萬出屯瓦亭俾劉賀以兵三萬從行留且半月冦攻平定平定守郭固鎮戎軍曹英皆來請援十三日進屯鎮戎知和善郭固請救之懐敏未應知和請援英先進曰君禄盈車今能媮安我不能也十日遂以甲進冦以羸胔餌之知和吿勝相繼軍中心躍十七日知和過平定十里為冦所窘來吿懐敏遂以大軍赴之適至平定知和已敗還軍中擾冦繼至珣以數千騎旁出欲邀之冦乃退自是冦毎夕出軍後呼噪軍中閉聲滅火且斂去糧道絶軍餒十日懐敏諸将皆欲還走珣曰來塗冦必有㐲若自籠竿往彼無險且非所意自昬議至四鼔不决珣憤欲斫指衆勸之因罷比明中軍已行衆從之冦躡其後為方陣而行及溝上冦分為二道自兩旁截之軍絶為三中軍殱前軍脱者十二三後軍自籠竿盡免懐敏知和殪珣虜㳂閉城自固㳺騎及潘原大掠而去㳂左遷待制知虢州按記聞載此事頗與實録不同今附見當考自劉平敗於延州任福敗於鎮戎葛懐敏敗於渭州賊聲益震然所以復守巢穴者葢鄜延路屯兵六萬八千環慶路五萬涇原路七萬秦鳳路二萬七千有以牽制其勢故也此據㑹要出師篇附見當考甲午詔國子監生自今須聽讀滿五百日乃得解薦從天章閣侍講王洙之請也戊戌詔河北都轉運司縁邊安撫司今契丹再議和好其吿諭居民諸科徭悉罷之權發遣户部判官燕度請復置監交朝臣以絶官物欺弊從之
