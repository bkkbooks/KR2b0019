body:
  text: 續資治通鑑長編卷九十宋李燾撰真宗天禧元年六月戊辰朔上封者言伏見召太常博士許式武定基欲以擢升臺省伏緣曲臺博士若踐諫垣即拜司諫唐之拾遺補闕如陳子昻元稹白居易皆以文學兼人賢良入等乃充是選自後非髦英秀偉之士罕聞輕授臣與許式等素無憎嫌又非深熟相識止為朝廷重惜名器式等雖無諫臣之體必有幹事之能乃方得名逹睿聰獲預嚴召如臣言可采望改一郎曺優與外任進退之間事理無爽上言式等雖無詞藻然皆勤幹朝行中多所稱薦耳既而止進秩停其差使許式武定基未見屯田員外郎郭乘言諸路轉運使提點刑獄官所至州軍務為苛暴無益治道望行戒約上曰大凡振舉綱維繫乎其人茍能酌中何煩戒朂朕所以夙夜虛佇謹擇良能蓋為此也郭乘未見壬申德音西京死罪囚流以下釋之父老年八十者賜茶帛除其課役曺瑋言南市歸順蕃部都首領卦斯敦舉家居冶坊寨管勾一帶蕃部望就命為本族巡檢月給錢五千米麵五石又言秦州蕃落指揮堪指使官六百七十餘人欲分為兩指揮並從之甲戌有司上條貫在京及三司編勑共十二卷乙亥詔選天下廂兵遷𨽻禁軍者凡五千餘人丙子右正言魯宗道言臣常讀近書自唐季接五代或三四年或五六年亂離塗炭寃號天地金血之氣鑠盡沖和愁苦之聲求息不暇天禍既悔至聖勃興故太祖皇帝以神武大略定天下有反掌之易太宗皇帝以至仁善繼恢域中成光大之業陛下奉而守之勤而行之彛倫敘矣故云亭泥檢脽壤恭祀謁太清之真館薦玉皇之大號至於必躬聽斷勵精理道以宵旰為宴處樂菲薄而久安從古王者徒載簡䇿耳惟親民之官政事最切未見區别其如民何今審官例差一知州縱耄昏寡識以何道推降之銓司平配一縣令雖菽麥不分且無由擯斥之今與天下親民之官以十分論之黷貨害政未置刑章者有其三清濁混然巧於情偽使在上知而不能糾舉者又次焉暗懦不能制猾吏不能審法令凝滯於物者又次焉貴遊親屬望風護養而不言者又次焉是則介然自守約己恕物不諂上不瀆下為陛下孜孜於民政者十不一二焉欲民之安其可得乎漢宣帝凡拜刺史守相必親見之考察其言觀其能否今或未然凡除知州通判京朝官知縣候滿三五人且令大臣具宴見之禮以遣之訊之以言而察其應對觀其詞氣而考其否臧才能者奬之不肖者退之縣令則擇臺閣有風鑒問望臣僚主遣之能否之間各於其狀恐於聖政稍得其宜又審官之任本宰相之職宜妙選英哲以委之庶激濁揚清漸得良牧賢宰則斯民之大幸也或詔參預宰司覆令按驗亦不為煩唐故事宰相帶兵吏部者午前在中書午後歸本司治事是亦內外兼領之制臣不任狂狷干犯冕旒待罪之至上曰諫官供職頗亦用心但以朝廷無他事可言故止及此爾然謹擇牧宰實朝政之急務也丁丑詔華虢等州夏旱損苖稼特除其租戊寅知升州丁謂言城北有後湖因旱百姓請佃計七十六頃納五百餘貫今請依蓄水植種菱蓮或遇亢旱決以溉田仍用蒲魚之利旁濟飢民望量遣軍士開修其租錢特與減放從之己卯詔明州城外濠池及慈溪鄞縣陂湖所納課額永除放之許民溉田疇采菱芡從本州之請也曺瑋等言近役兵夫繕葺諸寨及創掘縣鎮城壕凡一百三十七萬三千三百六十九功畢詔奬之庚辰發運使言真州等處轉般倉及江浙上供米二百二十餘萬斛欲留逐處以濟闕乏從之盜發漢髙祖睿陵捕獲之論如律并劾其官吏遣內侍王克讓與河南府别造衣冠明器安葬知制誥劉筠詣陵祭告仍以所盜計直修設齋醮因詔州縣申陵寢樵採之禁初眉州大姓孫延世偽為劵奪族人田久不能辨轉運使使殿中丞知九隴縣章頻按治之頻視劵墨浮朱上曰是必先盜印然後書既引伏獄未上而其家人復訴于轉運使更命知華陽縣黃夢松覆案無異夢松用此入為監察御史頻坐不時具獄降監慶州酒稅徙知長洲縣辛巳召頻對于承明殿翌日授監察御史頻浦城人也甲申以武昌節度副使邉肅知光州用辛亥赦書也時刑部奏其元犯上曰肅在邢州日方北戎侵擾屢詔令棄城入保肅能固守頗著成效雖冒賄賂亦纍該赦宥矣故特授以郡向敏中嘗謂王旦曰邉同年責已久牽復可乎旦曰為近臣坐贓豈得更升進耶敏中語數及之旦曰旦非於同年無情公若欲用之須旦死可也敏中乃已此據遺事録詔金部員外郎提點中書制勑院五房公事劉明恕自今遇慶節大禮許依樞密副都承旨例進奉上夀仍赴宴會始更舊制也祥符六年二月王旦言其不可王曽言行録云堂吏劉明恕宰相以其服勤嵗久官為望郎引樞密都承旨宣例將異其禮公以政府表則之地不可隳舊章乃議羣吏晨謁之際獨俾升階復援恩例改三品服公皆以為不可由是止令先謁於階戺之前其後又議謹擇堂吏將以進士策名者充選公曰我朝承有唐故事設此科謂之將相科豈當屈以趨走吏耶衆皆赧服而止陜西江淮路並言部內蝗蝻抱草木死及大風吹入海己丑召王旦對于崇政殿數刻向敏中至自京西壬辰知蘇州梅詢言飛蝗入境悉於叢薄間抱枝幹僵死又羣飛投太湖癸巳秦州僧道百姓等以部署曺瑋功狀請立碑頌有詔褒瑋是月上封者言邉鄙雖寧武備難闕望令群臣各舉將帥之才如邉上未有貟闕且即於內地州軍差遣緩急足副推擇乃詔王旦等各舉所知三兩人具名以進已而樞密院又請令宰相以下各於京朝幕職等官及閣門祗候已上舉堪任將帥者各三兩人敏中等曰執政之地日奉僉諧茍有見闕便可論薦若更特降詔旨明述封章不惟結於私恩亦恐别興異議帝然之秋七月辛丑以蝻蟲再生分遣官禱京城宫觀寺廟仍令諸州軍於公署設祭澶州卒王貴獲玉印文曰國主趙萬永寶印長三寸許廣二寸玉溫潤而形制甚古貴言至秦州遇道士授之云得自于闐國通聖山池秦州部送闕下王貴事實録太繁今從本志壬寅泗州言旱乙巳令府州置納質院丁未詔諸路災傷慮因而多盜宜令轉運使察部內巡檢使臣有老疾選懦者即擇監當使臣換之戊申曺瑋言自春至夏遣軍士寨戶掘長壕築大小洛門城寨及擐帶防托頗甚辛勤望量賜緡錢從之己酉右正言劉曄魯宗道等言每有章疏例於閣門投進事頗非便欲於通進銀臺司進入從之又言章疏例須手寫伏緣筆札不精慮瀆聖覽詔並令親書庚戌詔上佐文學參軍負譴經十年者諸州以聞當令録用知永興軍冦準言部內民稼蝗傷之後莖葉再茂蝗多抱草死癸丑宰臣向敏中奉表求罷詔不許詳定鹽茶所請罷買陜西芻糧交鈔别立久制許商人入中從之王旦以病堅求罷相甲寅召對滋福殿左右掖扶而升上覩其瘦瘁憫然曰朕覺體中不佳方欲以大事託卿而卿如此奈何因命皇子出拜旦言皇子盛德必任陛下事遂薦可為大臣者十餘人其後不踐兩府者獨凌策李及旦退復上疏請去位上乃從之旦遺行録及神道碑並稱皇太子按此時未建東宫今但稱皇子會要亦稱皇太子又以為祥符九年事尤誤也丁巳以旦為太尉仍領玉清昭應宫使特給宰相俸料之半令禮官草儀赴上尚書省遣其子大理評事雍就第賜誥命錫賚器服悉如宰相旦入謝便殿伏拜仆地內侍存問相屬日或三四出御藥薯蕷粥賜之旦端重堅正明達治體接物若甚和易而風格峻整當官蒞事莊厲不可犯其為宰相務遵守法度重改作妙於啓奏言簡理順每與同列論事上前或枉正相戾雖未嘗廷爭然自守直道不為曲辨所遷有識略善鎮定大事其於用人不以名譽必求其實茍賢且材矣必久其官而以為宜某職然後遷士雖拂於己者亦不以私廢當國嵗久上益倚信所言無不聽雖他宰相大臣有所議必曰王某以為何如事無大小非旦言不決當是時外無邉境之虞兵革不用海內富實羣工百司各得其職故天下至今稱賢宰相云入對便坐在丁巳後十七日今并書于此先是蟲螟為害諸路轉運司督令佐焚捕有荷校者至是監察御史劉平言其事亟命免之己未向敏中再表求罷不許詔幕職州縣官當加恩者自今俟參選日吏部南曺申銓擬授不須令自陳辛酉詔開封府河北路經蝗蟲傷處夏稅特延限一月孤貧者倚閣之三司請依常嵗於開封府界均買草千餘萬圍上以螟蝗為害慮煩民力令中書樞密院議其可否向敏中曰國家監牧馬數比先朝倍多廣費芻粟若令羣牧司度數出賣散于民間緩急取之猶外廏耳王欽若曰敏中之論實為便利往年已曽建議蓋近臣所見不一遂寢其事今既僉同臣請别具條奏上可之初保平節度使同平章事駙馬都尉魏咸信判天雄軍被疾召還上幸其第省視謂宰相曰咸信諸子不能承順身後必不雍睦且歎保門戶之難深憫焉甲子咸信卒上即臨哭贈中書令録其子孫姪遷官者七人咸信頗知書亦善待士然吝嗇喜規利仁浦所營邸店悉擅有之既卒纍為諸姪所訟時人醜焉玉清昭應宫使守太尉王旦言姪淳乞豫官職詔依宰臣例授官八月丙寅朔詔減諸路受代羣官護送公人有差五年八月壬子復故丁卯賜陽翟縣僧懷嶠茶帛以其設粥救飢民也庚午以樞密使同平章事王欽若為左僕射平章事先是上欲相欽若王旦曰欽若遭逢陛下恩禮已隆且乞令在樞密兩府任用亦均臣見祖宗朝未嘗使南方人當國雖古稱立賢無方然必賢士乃可臣位居元宰不敢阻抑人此亦公議也上遂止及旦罷上卒相欽若欽若嘗語人曰為王子明故使我作相晚却十年樞密副使張旻罷為河陽三城節度使是出不知何故當考詔諸路民為盜而質狀小弱當配本城者自今悉配牢城從知潞州錢惟濟之請也辛未翰林學士朝迥等言凖詔詳定敘封所生母及致仕官封贈事請自今文武升朝官無嫡母繼母者許敘封所生母致仕官曽任升朝官則依例封贈其致仕後遷至升朝官者不在此限從之禮儀院奏詳定太尉王旦赴上儀注國朝以來三公不兼宰相無赴上之禮上優寵元臣故特有是命然旦終以疾不赴焉知并州周起言河北民逐熟至州境者州民施飯一月詔奬起令召出米人宴犒之起又請發倉粟萬石減價出糶以賑飢乏亦從之壬申中書侍郎兼吏部尚書平章事向敏中加右僕射門下侍郎沈括筆談載敏中拜右僕射上謂李宗諤曰朕自即位未嘗除僕射敏中必大喜既而曰敏中大耐官職按此時宗諤死已五年矣又按至道三年四月吕端為右僕射咸平四年閏十二月張齊賢為右僕射五年十二月李沆為右僕射大中祥符元年齊賢再為右僕射四年四月王旦為右僕射齊賢為左僕射九年八月陳堯叟為右僕射是年二月王欽若為右僕射此月又改左僕射蓋自上即位至今左右僕射凡有六人為之敏中乃第七人也括所聞謬甚今不取上以先所遣按巡諸路使者方屬西成或妨農事乃悉赴闕所在百姓委長吏倍加安撫無令輒有騷擾丙子詔京西四郊禁圍草地悉縱民耕墾畜牧令江淮發運司漕米三萬石由海路送登濰密州從京西安撫使張廓之請也丁丑詔自今兩省給舍南宫北宅將軍已上許乘狨毛暖坐餘悉禁止仍絶其採捕紏察在京刑獄司言自今開封府斷罪人有微疾者望令斟酌決遣兩軍巡院合要證佐之人並申本府或三司無得専擅追攝戊寅免諸路鬻牛稅一年庚辰右正言魯宗道言皇城司每遣人伺察公事民間細務一例以聞頗亦非便請行條約上曰叢脞之事多請而不行攸司之職亦不可廢也癸未羣牧制置使請以十三嵗己上配軍馬估直出賣從之丙戌以都官員外郎判三司都磨勘司黃震為江淮兩浙荆湖制置發運使賜金紫先是李溥出三司小吏為發運使十餘年姦贓狼籍丁謂黨之無敢言者震將行上書自陳辭頗憤激上知其意在溥也諭之曰卿當與人和震對曰廉正公忠無負陛下任使者臣敢不與之和既至發溥姧贓數十事詔遣御史閣門祗候各一人按劾之震浦城人也嘗通判遂州會有詔特給兩川軍士緡錢詔至西川而東川獨不及軍士謀為變震白守曰朝廷豈忘東川殆詔書稽留爾即開帑給錢如西川衆乃定明日而詔至震發溥罪乃十月壬午今并書之丁亥詔崇文院以三館為額詔技術人雖任京朝官審官院不在磨勘之例己丑以祠部員外郎直集賢院錢易判三司都磨勘司易建議官物在籍而三司移文釐正或其數細微輒歷年不得報徒擾州縣自今官錢百榖斗帛二尺以下非欺給者請除去之辛卯詔河北州軍今年夏麥不豐民乏種糧者官貸之癸巳詔廣南所給諸軍衣絹每匹支千錢者自今屯駐駐泊禁軍加三百本城諸軍加一百九月戊戌詔自今令尉躬自鬭敵殺劫盜十人已上雖不全火及全火七人已上不及七人而強惡者並奏裁上與宰相議省吏員向敏中曰太祖太宗朝閣門祗候不過三五員宣𨗳贊謁而已今踰數百而除授未已祿廩至厚地望亦優其間不無濫被升擢者願賜裁損上曰此蓋相承為例當漸減省之癸卯給事中參知政事王曽罷為禮部侍郎初曽以會靈觀使讓王欽若上意不懌及欽若為相因欲排異己者數譖之會曽市賀皇后家舊第其家未遷而曽令人輦土置其門賀氏入訴禁中明日上以語欽若遂罷政事曽既罷往謁王旦旦疾甚辭弗見既而語其家人曰王君介然他日德望勳業甚大顧不得見爾且曰王君昨讓會靈觀使頗拂上旨而進對詳雅詞直氣和了無所懾且王君始被進用已能若是我自循任政事幾二十年每進對上意稍忤即蹙蹜不能自容以是知其偉度矣翰林學士右諫議大夫李迪為給事中參知政事依前會靈觀副使迪嘗獨對內東門上出三司使馬元方所上嵗出入財用數以示迪時仍嵗旱蝗上憂不給問何以濟迪曰祖宗初置內藏庫欲辦兵復西北故土及以支凶荒今邉無他費陛下用此以佐國用則賦斂寬民不勞矣上曰朕欲用李士衡代元方俟其至當出金帛數百萬借三司迪曰天子於財無內外願詔賜三司以顯示德澤何必曰借上悅迪又言陛下東封時勑所過無伐木除道即驛舍或州治為行宫才令加塗塈而已及幸汾亳土木之役過往時百倍今旱蝗之災殆天意以警陛下也上曰卿之言然一二臣誤朕為此據李迪附傳及正傳並以內東門對上語為在翰林時且敘其事於策曺瑋必勝前蓋誤也既云仍嵗旱蝗則其事必繫今年乃可又據明年三月士衡始罷河北都漕知青州馬元方七月乃罷三司使恐此時不當先召士衡附傳蓋無此語獨正傳有之不知何所據也或此時上己有召士衡代元方之意及明年乃決爾今姑存之且繫其事於拜參政後更俟考詳潁州防禦使馬知節為宣徽南院使知樞密院事樞密副使曺利用任中正樞密直學士周起並同知樞密院事利用加宣徽北院使中正守刑部侍郎起為給事中先是知節知天雄軍時蝗旱民飢無賴輩剽劫積聚戮其為首者三人於市攘奪遂息黃震言伏覩在京土木之工悉停罷其諸州采木望住上供從之夀州言城西鎮將李文諒與勇捷軍校孫興結徒十二人賊殺緣淮巡檢殿直王驥權都監右班殿直王日用捕殺之擢日用為左班殿直閣門祗候本州兵馬都監仍賜器帛録驥子仁為三班借職甲辰三司言江淮兩浙荆湖路入錢粟買鹽者望依解州顆鹽例預給交引付𣙜貨務俟有商旅算射即填姓名州軍給付從之丁未秦州言總噶爾嘉勒斯賚貢馬乞和斷詔釋其罪仍給馬直乙酉太尉玉清昭應宫使王旦卒前數日車駕幸其第留賜白金五千兩旦命家人還獻作奏畢自益四句云已懼多藏况無所用見欲散施以息咎殃亟令舁置內闥有詔不許及門旦已卒旦與楊億素厚善病革延至卧內託以後事請撰遺表旦言忝為宰相據上公之列不可以將盡之言為宗親求官止當敘平生遭遇願日親庶政進用賢士少減焦勞之意仍戒子弟云我家世名清德當務儉素保守門風不得恃相輔家事泰侈勿厚葬無以金玉置柩中時年六十一上遽臨哭之廢朝三日優詔贈太師尚書令别次發哀後數日張旻赴鎮河陽當飲餞上以旦故不舉樂諡曰文正録其子弟姪外孫門人故吏授官者十數人及諸子服除又詔各進一官旦性沖淡寡欲奉身至薄所居甚陋上欲為治之旦以先人舊廬懇辭而止被服質素家人欲以繒錦飾氊席拒而不許姻親有服飾稍過度者愠見于色兄子睦頗好學嘗獻書求舉進士旦曰我嘗以門內太盛爾豈可與寒俊競進取耶至其沒也子素猶未官婚姻不求門閥事寡嫂有禮與弟旭友愛尤篤留意文雅及近世典章官族志在敦奬名教中外莫不欽其德風為國宗臣上所尊禮蓋平世之良相也咸平初旦聞李沆之言固未深信及親見王欽若丁謂等所為欲諫則業已同之欲去則上遇之厚不忍去乃歎曰李文靖真聖人也祥符以來每有大禮輒奉天書以行旦為儀衛使常悒悒不樂既寢疾遺令削髮披緇以斂蓋悔其前之為也諸子欲奉遺令楊億以為不可乃已議者謂旦逢時得君言聽諫從安於勢位而不能以正自終或比之馮道云龍川别志又載旦買妾及問沈氏銀器事按旦最以清儉著稱恐此亦未必然今不取庚戍詔京東西陜西河北災傷户見欠稅並與倚閣諸路州軍民闕麥種者發官廩貸之辛亥環慶路駐泊都監岑保正韓令琮環州駐泊都監李用和各罰銅三十斤巡檢奉職李繼明責授借職指使殿侍何慶決杖停任以擅領兵與蕃部格鬭致傷忠佐使臣也詔河東流民有復業者發粟賑之甲寅以兵部員外郎龍圗閣待制李行簡為契丹國主生辰使佐騏驥使宜州刺史張佶副之太子中允直龍圗閣馮元為正旦使內殿崇班閣門祗候張綸副之詔汴渠湍悍覆溺者多其令緣河巡檢召習水者即時拯救許受賞物或溺者貧乏以官錢給之詔自今特旨召試者並問時務策一道仍别試賦論或雜文一首十一月丁卯劉若沖事可考丁巳幸殿前班賜從臣飲命衛士馬射賜緡錢有差以聖製思政論正説賜近臣從龍圗閣待制李虛已之請也己未鎮戎軍彭城界風雹害弓箭手田苗者八百餘戶詔權免徭役仍賑貸之癸亥上封者言國子監所鬻書其直甚輕望令增定上曰此固非為利也政欲文字流布耳不許右正言魯宗道言進士所試詩賦不近治道諸科對義但以念誦為工罔究大義上謂輔臣曰前已降詔進士兼取策論諸科有能明經者别與考校可申明之詔淮南鄉村酒戶年額少者並停廢之從巡撫使張師德之請也冬十月丙寅朔詔以髙郵軍嵗歉民飢權免蠶鹽錢一年三司請令南京等處和市窑草三十萬詔罷之發運司言洪虔吉州嵗造新船赴京牽送擾民望今逐州以官健給假詔可丁卯太常丞集賢校理晏殊以嵗經蝗旱上軫聖慮災沴已息稼穡大稔獻惟德動天頌詔褒之祠部員外郎劉楚言災傷州軍逃亡民準赦半年復業今已過限乞延之詔許至來年春季戊辰詔河北河東忠烈宣勇軍老疾半俸者多召人承替貧者苦之自今老疾者並即放停上御承明殿引對諸軍班直諸校凡三千八百一十人以功過黜陟之三日而畢庚午尚書右丞兼宗正卿趙安仁言方今中夏宅心殊方內靣四民樂業百職交修其為治定功成時雍道洽固已超越於前代矣而陛下益精庶政尚勞聖躬前殿視朝移晷忘倦便坐決事旰食為常雖天意曲成無遺於一物而人君大體宜屬於攸司願立通規庶為永式望自今前殿依舊奏事外崇政承明殿及再坐諸司常務顯有條例者令本司施行訖奏其審官三班院吏部銓亦令分日引對詔閣門自今後殿引見公事日不過兩司壬申內殿崇班閣門祗候羅元俌言伏見諸路苖稼才茂即奏豐稔或多失實自今請俟登熟乃許以聞詔從之其已奏豐稔而非時災沴者即須言上違者重置其罪羅元俌未見御前忠佐馬步軍都軍頭郭金豐等六人皆以年老負犯有司請絀之甲戍特命置于環衛仍領團練使刺史丙子詔如聞諸班直諸軍坊監場務官健飲博無賴或部分稍峻即捃托興訟自今後所訴事並須干已證左明白官司乃得受理違者坐之或情理巨蠧即具案以聞丁丑詔御書院翰林待詔書藝祗候等入仕十年已上無私犯者與出職己卯詔以京東災傷其上供物權罷壬午以內殿承制閣門祗候曺儀內殿崇班閣門祗候張昭逺並為西上閣門副使於是閣門使楊崇勳夏守贇並遷樞密都承旨樞密院方奏擬某人為副使上曰朕已有人矣張昭逺知邉事曺儀習朝廷儀即可用之昭逺凝子也右監門衛大將軍奬州團練使駙馬都尉王貽貞請補外試民事甲申命知單州上召對戒以和衆靜治為先辛卯夀春郡王讀論語終卷上作詩賜王友張士遜等秦州部署曺瑋等言本州所修大小洛門兩寨獻地及蕃官軍主默星族郢城斯納等補本族都軍主月給錢三千又永寧大小洛門威逺等寨見管蕃官正副軍主指揮使等雖各補職未給廩祿令請以三寨地基除官廨營舍外許民造屋納租錢以給其俸並從之癸巳以吕蒙正子從簡為衛尉寺丞從簡前為國子博士監麴院坐盜官物除名至是表獻其父文集故甄録之十一月乙未朔詔江南諸縣五千戶以上自今遣京朝官知從巡撫使韓庶之請也丙申詔京東河北河東陜西路所市草千餘萬悉罷之戊戌兩浙轉運使言婺處等州水田早禾刈畢復生己亥以辰州溪蠻冦邉殺巡檢使臣王文慶遣侍禁閣門祗候劉永崇入內供奉官江德源馳往安撫如敢拒命即發鼎州戍兵討之永崇庭讓子右正言直集賢院祖士衡言伏覩將相及逺方使辭見並於內殿特開曲宴比至罷會日已逾午百司例各還第而乘輿復御便坐決事殆非君逸臣勞之旨欲望自今曲宴特輟視事著為令從之士衡上蔡人也庚子龍圗閣待制李虛已等上新編御集百二十卷召輔臣至滋福殿示之賜虛己等銀帛以秦州伏羌寨蕃官都軍主阿珠為峯州刺史辛丑知雜御史吕夷簡言臺直所劾公事自來有同科同年及第者多援詔文稱有違礙望行條約詔自今回避曺瑋言秦州圭律家族纍嵗違命瑋率所部及寨戶蕃兵討平之有詔褒奬壬寅詔淮南江浙荆湖舊放生池廢者悉興之元無池處緣江淮州軍近城上下各五里並禁採捕禮儀院言諸節所禁刑罰今請以前後詔旨類例頒下應大辟罪遇天慶先天降聖承天節前七日後三日天貺天祥節一日並權住決斷徒流已下犯在節前四日內署建道場則權移他所遣官判決前三日內犯者並過節次日施行節目杖已下情輕者釋之詔可癸卯廣州民李延志黥靣配安州本城初咸平中王均作亂延志寓益州常事均禆將崔麻後賊平還家至是與本州懷勇卒許秀等飲具道均及王小波逆狀秀疑延志即賊首李順因以聞州又引營卒證其事知州李應機械送赴闕下御史獄劾問得實故以延志𨽻軍秀等杖脊而遣之先是樞密院以真獲李順稱賀及臺劾非是賀者欲遂以為順趣具獄知雜事吕夷簡曰是可欺朝廷乎卒以實奏由是忤大臣意乙巳上以蝗息雨足秋稼登稔謁玊清昭應宫遂幸開寶寺靈感塔己酉詔景靈宫會靈觀宴從臣于祝禧殿庚戌禁川峽民畜飛梭從著作佐郎知瀘州鄭昭度之請也辛亥翰林學士李維等上新修大中祥符降聖記五十卷迎奉聖像記二十卷奉祀記五十卷詔褒之賜帛有差壬子發兵權泊天雄永興軍陜冀棣邢洺磁相懷澤潞隰石乾耀華州永靜軍以多積芻糧故也仍令緣邉安撫司傳諭北境癸丑詔緣黃河州軍所用捍堤木常嵗調丁夫採代者權住一嵗以民經災傷故也以秦州築清水縣城畢詔奬部署曺瑋知州李及掌事者皆遷秩乙卯幸太一宫大雪盈尺上謂宰相曰兹固豐稔之兆但慮民力未充失於播種卿等共設法賑勸勿遺地利詔京東西河北陜西災傷州軍民以布帛折稅者許之前江州瑞昌縣主簿劉若沖進所業命試舍人院以策論稍優特升兩資先是若沖建議自今召試者並請試策至是用其議而命之若沖未詳邑里九月甲寅詔蓋若沖所啓也會要天禧元年十一月二十一日事實録無之戊午詔京朝官使臣辭見及謝並赴崇政殿會要十一月二十四日事庚申日南至先是太常禮院言宰相出殯當輟視朝王旦以是日葬望凖禮例中書言其日皇帝已有詔不受朝賀遂不下輟朝之命議者謂其日當罷百官拜之禮時王欽若與旦不協故抑之壬戍契丹遣使右監門衛上將軍耶律凖副使刑部郎中知制誥仇正己來賀承天節癸亥髙麗王詢遣御史刑部侍郎徐訥率女真首領梅詢奉表來獻方物又賀封建夀春郡王初郭元之還詢即遣使入謝道海風漂舟回及是乃至有詔訥五日一赴起居實録以為尹徴古之還誤也今從會要詔選人本貫江南兩浙福建者許去本鄉三百里外注官十二月乙丑朔禮院言凖詔以來年正月十七日祈榖祀昊天上帝前二日奏告太祖室伏緣每嵗正月十五日朝拜玉清昭應宫今詳祈榖之祀景德四年以前止用上辛其後陳彭年援啓蟄而郊之説請用立春後辛蓋緣當時未有朝拜宫觀之制南齊王儉啓云近代明例不以先郊後春為嫌又宋孝武朝有司奏魏代郊天值雨更用後辛晉亦更用辛日欲望自今或立春後辛或正月上辛事有相妨並許互用在於典禮固亦無嫌詔可戊辰內出再生稻穗以示輔臣時中使自荆湖來言亢陽害稼及秋雨足再蕃實巡護黃河堤岸閣門祗候牛忠言大名府澶濮滑州通利軍界諸掃春料望止役河清及州卒罷調民夫從之乙亥詔京東西河北河東陜西淮南路上供陸運方在苦寒可遣使馳往告諭在道者隨處交納其部送牙校所給口糧勿停來春輦送赴闕丙子以寒甚放朝詔開封府及諸路災傷户秋稅中等已上輸送本處已下並倚閣之丁丑詔河東緣邉州軍河西麟府州嵗調輦送民特免一年知制誥盛度等言奉詔蠲放逋欠凡七百四十三萬所釋萬五千五百人己卯以苦寒罷京城役作俟中春如舊初女真國人輝和爾珠爾罕鄂掄自本國來貢及還道逢渤海戰攻復來歸以𨽻契丹至是命髙麗使徐訥領還仍給裝錢庚辰遣使減價鬻炭十萬稱於是五鼓開場又限以一稱貧民趨走寒踣或錢資不及多虛往者乃詔一斤以上咸鬻之仍以辰時為候知桂州曺克明言捕獲撫水州蠻賊首蒙扎并其屬部送赴闕詔𨽻濟川衙前壬午新作皇帝昭受乾符之寶召輔臣詣滋福殿同觀初祭醮詞表皆用御前之寶上以未盡恭恪故改制焉乙酉皇城親從官魏美何斌夜宿長春門袖刃穿壁盜天書法物珠金斷手示衆三日斬之其本部將校並降黜皇城司官罰銅釋之祀汾隂嵗加上五嶽帝號有册無寶是嵗始詔刻玊丁亥令會靈觀使王欽若奉安于本殿戊子詔京畿諸州築河堤悉以軍士給役無得調發丁夫先是左龍武軍將軍宏州團練使駙馬都尉李遵朂為康州團練使給觀察使俸料公使錢時遵朂父繼昌為左神武大將軍奬州刺史權判右金吾街仗司遵朂請班其下許焉公主誕日請繼昌過其第迎拜獻夀上知之密以襲衣金帶器幣內殿珍果美饌助其為禮翌日主入對上問繼昌飲食且嘆其康強於是以繼昌為連州刺史知涇州繼昌將行謂人曰頃嵗再命延安不克奉詔常以為恨今獲死塞下是吾願也己丑契丹遣使長寧節度使蕭質副使禮部郎中知制誥楊佶來賀明年正旦庚寅玉清昭應宫判官禮部郎中知制誥夏竦責授職方員外郎知黃州竦娶楊氏頗工筆札有鈎距竦浸顯多內寵與楊不睦楊與弟倡疏竦隂事竊出訟之又竦母與楊氏母相詬罵皆詣開封府府以聞下御史臺置劾而責之仍令與楊離異辛卯詔陜西緣邉鬻榖者勿算壬辰遣使緣汴河收瘞流尸從淮南轉運使薛奎請也范鎮東齋記云天禧初薛簡肅公為江淮發運使辭王文正公王無他語但云東南民力竭矣薛退而謂人曰真宰相之言也按奎除淮南轉運乃天禧元年十二月其年九月王旦已卒王曽亦先罷政矣除發運又在二月恐鎮誤也當是旦語張士遜事見祥符元年四月今不取
