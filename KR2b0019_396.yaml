body:
  text: 續資治通鑑長編卷三百九十二宋李燾撰哲宗元祐元年十一月戊寅起居郎蘇轍起居舍人曽肇並為中書舍人肇仍充實録院修撰侍御史王巖叟言臣聞有旨召起居舍人曾肇試中書舍人士大夫相顧而笑不以為允伏以中書政事之本天下治忽休戚之所係其得與丞相侍郎可否國論者惟二三舍人而已陛下察其重輕何如豈當茍循資地妄以授人也謹按肇天資甚陋人望至卑早乘其兄布朋附王安石擅權用事朝廷美爵如取於家故肇因緣得竊館職素無吏能而擢領都司殊昧史材而委修實録每一除改士論每竊非之文章學識皆無可稱何足以代王言而預國論方陛下極天下之公簡拔英髦聳動多士不可以凡材間厠清近纍陛下知人全美伏望聖慈因其辭免特賜允從以厭公議語諭柄臣别加精擇庶幾名器增重不為賢能之羞又言臣伏以謀人之國要在防微天下之微固莫微於君子方盛而潛消小人正衰而暗長在剝惟六三無咎於臨即八月有凶聖人用心於其抑隂而佑陽可謂至矣臣之愚忠正在於此按曾肇乃姦臣曾布之親弟布之盜竊名器蠧國家而誤蒼生與吕惠卿罪惡無異當時天下謂之曾吕肇方布怙寵弄權肆為欺罔之時蓋有助威之力焉布妄言鄭州可廢為縣朝廷遣肇覆按可否肇不以鄭人之情乃歸告於上而合兄之言誑主之聽以為可廢而遂廢之由肇一言而使一州之民受弊者幾二十年賴陛下方復之則肇之助布欺罔不為無迹矣人物凡下不為士論所與獨慿藉其兄玷塵清選積纍僥幸至於今日以言觀行不聞附正之風以迹論心未測朋姦之計安可進居要近擢掌絲綸朝雖乏材何至及此願陛下味臣之言察臣之意區區所憂蓋亦不在肇也其中書舍人除命伏望早賜追寢貼黃稱前起居郎滿中行林希皆以公議不與陛下即行罷黜今曾肇若比中行則無場屋聲名若比林希則無出人詞藝豈可反容忝冒以為公朝升黜之纍伏望聖慈早賜宸斷又言肇進身之初即不由公道全是私恩試教授日其兄布已在要路自作試官定肇為第一士論莫不譏笑方布用事無人敢言不久又得館職以至後來升省司入史局遷起居無不出於僥幸今豈可直令僥幸作侍從也爵祿天下公器雖朝廷茍欲私之如天下公議何陛下以天下公議付臣主張臣敢不極盡愚忠為陛下言之陛下初以除張頡為户部侍郎言者攻擊至於再三竟不從之言者遂默便為曾肇亦可如此緣户部侍郎只是一有司之事無預國論但有俗材皆可為之不比中書舍人當天下樞機之地須用賢才乃允公議今用非其人物論不服臣所以不敢遂已期於必從而後已也伏望聖慈深賜省納又言臣敢盡一語以評肇為人按肇當羣邪用事既能挾附以貪榮洎衆正在朝又解因緣而竊寵行已不聞夫一善持心可見其兩端進列近臣陛下何賴且恐真賢解體隂黨動懷貽患之深不在今日伏望陛下察臣微意省臣纍章一判是非之歸以明邪正之異貼黃稱肇自及第便忝冒作教官自教官即入為京師官因緣僥幸以竊榮進至於今日都不曾經歷一日州縣之職未嘗習知民事豈可輒為中書舍人預天下之政伏望且令出補外官使習知民事他日用之於肇不為無益又言臣以除曽肇試中書舍人不協人望連上四章極諫公議必已蒙陛下省納臣今訪聞得執政大臣中見有與肇議姻親者竊恐進呈之際曲有營救臣今密以奏聞乞陛下先知祖宗以來擢用大臣須取老練民事之人未嘗輕進一全不經歷親民者為侍從今用肇為中書舍人於肇則榮矣幸矣然國家何賴百姓何望此臣所以區區為朝廷惜也臣前為監察御史日論奏給事中王震不曾歷一日外官僥幸以至清近蒙陛下許其外補今肇生平僥幸與震相似亦乞且令試郡以允公議巖叟又言臣竊以中書舍人國家第一等名器當得賢材以付之臣為陛下惜名器不為言一曾肇也破臣之言者不過曰肇無顯過臣為陛下論人材不爭有顯過無顯過也果其人大體是也雖有顯過不害其為賢也大體非也雖無顯過謂之不肖可也况如肇者亦不可以為無過方兄布舞姦攘權附上罔下內不聞有一善言規救其兄外不聞有一所長自表於世獨見其能茍合詭隨潛行竊伏以盜榮利耳原心定罪臣不知其何如人也今議者皆曰肇雖資材鄙下不能如布之姦凶而性行隂柔實亦羣邪之黨與前因蔡確喜愛擢預史官後緣張璪主張進修記注公議憤鬱固已甚矣雖因緣資地以至於此然故事近例至此益當深觀其人不必須登掖垣也一登掖垣遂預國政非復從來僥幸之比矣不獨非才玷纍清選他日乘間伺隙浸引其類則將奈何此臣之所以為深憂而言之不敢已也臣當言路久矣如布之大姦巨蠧既未能為朝廷極口以言請與惠卿共投四裔而復坐視其黨進居禁塗扼天下之勢若又置而不爭則負陛下多矣今執政大臣雖未能為陛下多進君子且可為朝廷不添小人天下之望亦足矣肇之濫進臣若不言陛下既不怪臣執政亦將見説臣何苦力言而不止此陛下所當察也伏望聖慈以重惜名器為心以采納公議為意特賜指揮罷肇新命貼黃稱肇平生進身皆出僥幸今既得為中書舍人則安知不僥幸得為兩府蓋升此一級便不可知此又容之則天下無公論甚矣巖叟又言臣竊以百官之衆必皆用材近臣尤當於百官中選材之髙者為之中書舍人在近臣中又為髙選未行官制以前謂之知制誥專行誥詞不預政事自改官制遂為中書屬官分押制勑凡國之政令無一不預故中書舍人不獨取文學兼全須責政事臣伏見曾肇既無文學又無政事不可以當其任纍具論奏乞行追寢未蒙施行緣此職所繫國體甚大不比其餘職事臣所以不避煩瀆區區力言願陛下開納按肇陋於文學而不習政事皆有實狀非敢厚誣昨宗正寺丞王鞏以人言罷黜為河南府通判肇權當行告縱示匿瑕亦當止用平辭而乃過為褒語若特被選掄以寵其行者其茍於徇情而不知大體如此及試中書所試制辭以王戎簡要對黃霸循良搢紳士大夫無不傳以為笑蓋其窘迫别無故事可使遂至於蒙求卷首牽引一句此陋於文學不可為中書舍人也夫天下之至難而不可輕者民事也明哲之士雖纍歷郡縣夙夜究心猶有不逹况肇凡材初官未經數月遽以僥幸不公遂為教授教授僅成一考又以因緣事勢便作館職一入國門不復更出叨榮冒進以至於今郡縣之務民物之情何由得知此不習政事不可為中書舍人也中書舍人必籍此二者乃可為今肇皆無之不知何以稱職所以公議憤歎皆謂朝廷不惜名器妄以假人臣實為陛下惜之其人物之髙下黨類之邪正臣前纍章論之詳矣肇行鞏詞云河南别郡朕既以耆老大臣司其管鑰又擇其二往禆政理以爾名相之後敏於藝文將觀汝能出試民事務安爾止無怠厥官巖叟又言近臣舉動固自有體大要必崇謙退事敬畏也一聞有言則引咎自避蓋未嘗有如肇方臺諫交攻不己而敢昂然出而受非常之寵命者也肇之不知亷耻不恤議論而無忌憚乃如此陛下欲辨君子小人於此可見至如肇除起居舍人亦是五月四日張璪獨在中書乘間進之以為今日之地非出至公也巖叟凡八上章皆不聽因乞罷言責亦不聽及劉攽除中書舍人巖叟又言近除劉攽為中書舍人命下之日無賢不肖莫不稱為得人言責之臣固亦自喜雖欲有言不可得也今既有中書舍人兩員則肇之非才自可汰去以允公議眀年春巖叟上章乞罷肇卒不聽劉攽除中書舍人在十二月十六日殿中侍御史吕陶言臣聞邪正必辨則國體尊用舍至當則士論定百直而一枉則枉可以害直百真而一偽則偽可以亂真方肅紀綱宜重名器臣伏見起居舍人曽肇操履偏陂藝文淺浮當吕惠卿用事時肇兄弟亦任要路表裏專縱公為私徇臣僚承迎風旨薦肇充學官既進所業中書考為第一緣此朋比遂除館職晚因張璪汲引備位左司會史職有闕乃以次補且仕宦不歷民政而領都司學問不知本統而遷右司固己不厭公議無補盛朝今乃擢居西掖尤駭羣聽夫中書舍人之任職清地峻非他官可擬外則典司誥命以文章議論潤色帝猷內則分押諸房以智識才慮參決幾政前世推重謂之宰相判官豈可因其序遷輒爾虛授况小人之進亦以彚征肇既忝冒此選涉歷貴權則必援舉其徒布列要地消長之變安得不慮此時進用疑邪徑之忽開他日朋姦恐橫流之難遏伏願陛下深防事始早罷詔除上以清侍從之塗下以慰搢紳之望又言陛下除中書舍人二員而言路獨彈奏曽肇則當與不當自可見矣伏望聖明裁察又言臣再三為陛下忖度此事極有未安蓋任人當否實繫治亂正臣進則足以寧邦邪士用則遂能害政古今可鑒理勢必然自陛下繼統以來拔擢端良用舍之際務合至公而小人餘黨尚在朝廷既未能盡力屏除豈可使開端幸進防微杜漸正在此時且肇之姦回出於天稟兩端難信其迹甚明當吕惠卿用事之時則朋比阿諛競為非議至司馬光當國之日則矯偽修飾欲作善人推此而行何所不至陛下可保其不徇私乎執政可信其不行險乎既保而信之則臣言殊不足取罪在譴斥若猶未也則中書舍人之職參議大政不可輒委肇矣况肇之兄布長於變詐濟以強悍冒據要地僅二十年蠧國戕民毒流天下今雖出領藩鎮其心常有不平肇於其兄豈能忘愛一旦攀援而至則必攄發素藴引類結徒凶熖復熾此不可不思也然議者謂肇粗有浮文素無顯過進升西掖資地宜然臣愚竊謂此言出於茍偷之意非為國深慮之説也夫中材之士牽於世利而過有隱顯害有淺深或一事之誤一節之闕如邢恕之乖檢審滿中行之附舒亶林希之結張璪則人皆得而知之指為顯過若乃肇之包藏緣飾善持兩端原始要終大概邪險人皆不可得而知非若一事一節之誤闕而可指名者其過雖不顯而為害則不可不察也伏願陛下以隂長陽消為戒以舉直錯枉為心博采公言收還新命使小人無彚征之漸則明主有極治之功又言今之中書舍人非若往年以他官知制誥者蓋分押中書諸房與宰相共議政事權任不輕固宜謹擇今年五月中肇自都司遷起居舍人人皆以為僥幸太甚臣是時奉使入蜀不能力爭而罷遂使今日有此忝冒朝廷既已失之於前安可不救之於後也范祖禹亦有言乃六年七月九日事端明殿學士光祿大夫新提舉中太一宫兼集禧觀公事兼侍讀范鎮提舉崇福宫以鎮力辭新命也新命在十月十六日庚子并二十二日乙巳先是鎮會葬永裕陵下蔡京謂鎮曰朝廷將起公矣鎮變色曰鎮以論新法不合得罪先帝一旦棄天下其可因以為利乎蔡京問答據邵伯溫聞見録第十三卷及降詔令赴闕鎮辭又降詔曰西伯善養二老來歸漢室卑詞四臣入侍為我強起無或憚勞鎮卒辭之朝廷起鎮蓋欲授以門下侍郎鎮固不欲起又移書問其從孫祖禹祖禹亦勸止之鎮大喜曰是吾心也凡吾所欲為者司馬君實已為之何用復出也詔詞據墓銘欲授以門下侍郎據范祖禹家傳紹興初蜀人楊大中者記鎮遺事云元祐初公再致仕宇文邦彥謁公問公不起之由公愀然不樂曰事有太甚者恐他日為朋黨之禍豫先使人語君實寬夫不吾信也此語公戒邦彥勿言未幾公薨其後天下事果如所料此蓋邦彥飾説今不取鎮所以不起祖禹家傳得之矣邵伯溫云章惇蔡卞欲追貶鎮蔡京勸止亦恐無是事今不取但附見裕陵下之語更須考詳正議大夫知汝州章惇提舉洞霄宫從所乞也十月十八日依舊知汝州三年二月十六日復資政越州政目章惇洞霄宫下有邢恕汝州四字當考吕公著言惇父老居蘇州今惇留汝州上方以孝治天下豈可使大臣失晨昏之養遂從惇請此據丁未録朝奉郎直龍圖閣范育為太常少卿朝散郎校書郎吳安詩為禮部員外郎二人合附章惇下正文又恐于例未合更詳之詔立賞捉殺新州賊岑探又詔諸道監司互分州縣每年巡遍又詔會聖宫應天禪院修奉神宗皇帝御容令知河南府孫固提舉仍令京西轉運司應副用度禮部檢舉典禮開封府言自來京內藏匿竊盜及指引資給除一犯杖依舊令衆外如再犯杖或一犯徒並令衆十日三犯杖鄰州編管從之新無樞密院言夏國遣使副詣闕賀興龍節請依例賜銀絹茶回日降詔從之又言穆衍等申差充祭奠弔慰夏國使其將來過界係兩殿賜物排祭未審如何排設詔候到延州依例施行若無舊例即作兩祭排設詔同日祭弔仍將太皇太后所賜祭弔在先穆衍十月十六日差權陜西轉運副使朝奉大夫葉康直為直龍圖閣權知秦州權中書舍人曽肇繳還詞頭曰臣竊以謀帥之難古今所重用人失當誤國非輕况今羌戎雖屢入貢而求地之請未已欵塞之約未堅正當懷徠禦備之時一失其宜貽患在後守帥之任尤當謹擇如康直者素不聞有可用之材就令小有材能不過便佞捷給欺誕傅會至於應變將略必非所長平居應接猶恐失其機會一旦緩急豈免敗事竊聞昨者兵興康直為轉運使調發芻糧一路騷然至今瘡痍未復則康直之材略可見矣先帝以其措置無狀又隨軍入界失亡為多嘗命械繫意欲誅之而康直諂事李憲卒賴以免則其人又可知矣考其已試正當黜退以彰先帝之明豈可更加奬擢方今內外文武之臣資地材能豈無一人在康直上者而不次任使實駭物聽况直閣美名儒學髙選臺省侍從多出於此如康直常材豈宜超授竊恐命下之日更致人言上纍國體所有誥辭未敢修撰十二月六日蘇轍等繳是日御史中丞傅堯俞初視事與侍御史王巖叟同入對上諭堯俞曰用卿作中丞不由執政以卿公正不避權貴如朝政闕失卿等但安心言事太皇太后主張三省奏立經義詞賦兩科下羣臣議從之己卯承議郎荆湖南路轉運司管勾文字張組言天下重法已蒙寢罷惟賣鹽場務推行常平倉法尚存乞罷鹽法約束內依常平給納法并所增支酬從之吏部言應六曹寺監及在京官司不得將合出職吏人額外占留從之以給事中錢協言𣙜貨務暗增吏額故也户部言淮南路提刑司乞罷保正大小保長并年終供申開收刺狀都帳本部勘當若係不教閲去處即三年一造保申簿逐州軍依舊條具帳申本路提刑司鈎考本司更不具都帳并刺狀申户部從之侍御史王巖叟言伏覩近降聖旨令隔截門下中書兩省諫官别開門出入不得與給事中中書舍人相通傳聞之初臣不敢以為信蓋既謂之同省豈有異户而出不相見之理及觀勑文乃是信然臣愚不諭朝廷此舉之意若以謂欲絶漏泄之弊則臣以謂漏泄在人不在門户門户雖殊而人不密則漏泄之弊固自若也然漏泄之禁素已甚嚴今更加申敕足矣何必以隔異門墻為事哉所隔異者乃二三諫官而已諫官為陛下耳目陛下每不惜推赤心以與之奈何於其所舍反若置疑也儻其人為可疑也則斥而逺之使勿居其地可親也則宜與之無間者也陛下不與諫臣為密而誰為密乎臣固知陛下無此意然事行則終纍陛下耳目自古置諫臣以能彌縫朝廷之闕使不見乎外為美故彌縫不厭早早則為功易而所全者多矣且朝廷之事終能使諫臣不知乎禁之雖嚴不過緩後一二日終當聞耳茍有未善能禁其勿言乎既不能使之不知又不能使之勿言則不若令早知而論之為有補也臣以為廟堂之上精慮而審發政令一出天下無可得而議此乃所以為密也今外人皆云非所以嚴制勑院也乃欲以限隔諫官使不聞省中事耳此聲流傳恐非朝廷美事臣竊為陛下惜之伏以陛下誠心好諫而渴聞有過故一言一動天下莫不歌美以為中理不可誤信此事使天下有疑於聖德也伏望為國家愛惜大體以慰衆心特賜罷隔截兩省指揮則仍舊幸甚貼黃稱陛下即位踰年兩省中未嘗有漏泄之事害成於朝政何故今日改作以動論議伏望聖慈且令依舊則國體所全者多矣右司諫王覿言臣竊聞中書省欲以後省散騎常侍諫議大夫起居舍人正言廳為制勑院劈截兩省見今諫官廳出外别作門出入以防制勑之漏泄論者以謂名雖關防制勑而實不欲諫官在兩省與給舍相見恐其或聞政事之本末而論列之頻數也何以驗之茍欲作制勑院而已則舍人廳後起居舍人廳正言廳及直舍廊廡等屋以數十間作制勑院自足不須更取散騎常侍諫議大夫廳以塞絶諫官出入之路而别為之門也兼門下後省既無制勑院而亦劈截諫官廳出外即知不為關防制勑之漏泄而實不欲諫官在兩省與給舍相見恐其或聞政事之本末而論列之頻數而已臣聞自古為國家者未有踈薄諫諍之官而可以有為者臣不敢備引歷代之事以瀆聖聽今且以李唐言之昔太宗嘗謂侍臣曰朕雖不明幸諸公數相規正勑中書門下及三品以上入閣必遣諫官隨之欲其預聞政事有所開説故自後諫官得閣中奏事遂以為常而讜言直論有補於朝政者世有其人也夫唐太宗之聖自三代以後本朝以前千載一人而已當時諫官之才能智識豈復有敢望太宗者哉不惟不敢望太宗而豈復有如當時之執政大臣者哉然太宗不自有其聖而虛心求諫如此當時執政大臣亦未嘗有以諫官預聞政事為嫌者唐自武德至昭哀三百年之間諌官皆列於中書門下兩省而亦未聞有臣僚建議諫官不得在兩省以防制勑之漏泄者也只自五代衰替朱梁初建都事事草創故諫官不在兩省聖朝祖宗承五季板蕩之後興弊拯墜百餘年間凡前古之法度日以修舉至神宗而浸備是以鼎新兩省列諫官於其間以循唐制夫諫官必列於兩省者蓋使在於政事之地而有所聞見則凡所論列庶幾不誤朝廷而有補於治道也惟是隨中書門下及三品以上入閣則尚未及講臣竊以謂必行於陛下之手雖或未暇奈何至於使諫官不得在兩省而惟恐其或聞政事耶又疑其漏泄制勑耶何示天下以不廣也况今諫官雖在兩省日與給舍相見而於政事委曲亦何所聞但存羊所以愛禮不猶愈於盡廢哉執政大臣若謂諫官不才罷之乃宜不可緣二三諫官之故而遂廢朝廷之法度也臣不能俯首循默為自安之計以負陛下言責惟聖慈詳酌施行覿自注云十月二十五日覿又言臣近於十一月二十五日有封事言兩省劈截諫官廳出外隳壞法度乞行寢罷及十一月二十七日與諫官鮮于侁朱光庭列狀聞奏各未蒙施行臣竊以自古聖帝眀王莫不有諫諍之臣蓋三代以前上自公卿次及百執事下至百工芻蕘皆可諫諍故雖不以諫諍名官而鯁言直論常逹於人主之聽及世衰道微言出於口而禍及其身者浸多故為人臣者若不以諫諍名官則鮮肯以諫諍為世於是秦漢以來乃始有諫大夫率列職清近日侍人主然嵗月綿逺其聽事之所在有不可考者惟隋唐事近傳記甚明諫官於隋屬門下省唐初因之亦嘗屬中書省乃分列兩省終於有唐未之或改也夫御史與諫官均任言責然御史臺在外而獨諫官既為侍從又列於兩省者何也蓋御史專在紏正百官必在外然後百官趨赴聽事鞫獄為便諫官之職專在於論政事之過差補人主之闕失故不在政事之地則無以盡聞政事之過差不列侍從之班則無以盡知人主之闕失也自五代亂離隋唐法度無復存者本朝祖宗以來講復前代之法度十八九矣惟是兩省之闕典至神宗而後復然諫官雖已列於兩省政事之地猶未預於入閣侍從之班今乃防諫官漏泄政事而欲劈截廳事出外使不得在兩省亦異於設諫官之本意矣夫兩省若有機密之事吏人可密者諫官豈不能密耶兼見今諫官雖在兩省於政事實不預聞况機密哉昔魏少府楊阜欲上疏省宫人召御府吏問後宫人數吏守舊令對曰禁密不得宣露阜怒杖吏一百數之曰國家不與九卿為密反與小吏為密乎明帝聞愈憚阜後世以為美談臣嘗謂陛下聖德比堯舜豈於此而不逮明帝耶臣嘗以臯夔稷契期執政豈於此而不逮楊阜耶且先帝孜孜講復隋唐數百年之法度既合於古又宜於今乃一旦無故而壞之一不可也中書所謂制勑院者吏舍也迫逐天子之諫官以廣吏舍二不可也深信胥吏與之為密而過疑諫官以為漏泄三不可也使天下之人皆有疑諫官之心有厭諫官之迹非所以廣聖德於天下四不可也散騎常侍下執政一等爾今偶員闕不可謂終無其人也至於左右史亦陛下侍從之臣安可使中書吏人據其廳事奪其正門而常侍諫官左右史乃屏置一隅穴垣墻而出入事體顛倒增長吏氣五不可也憎諫官者雖取快一時而五不可長久之患歸於朝廷又使三省執政大臣皆受迫逐諫官之名為後世笑臣竊為陛下惜之臣愚暗不才陛下過聽擢為諫官若議論失當陛下罪之執政大臣惡之或一二日而罷或二三月而黜皆不可知也豈謂諫官可以久為而兩省可以安處哉蓋欲為朝廷長久之計而已非臣謀身之計也若既憂得罪於陛下又慮見惡於大臣坐視法度之廢壞而緘默不言則不惟有負陛下言責亦豈不自愧於心哉故不避冒瀆聖聽而喋喋不已陛下或采其言或賜之斧鉞之誅惟聖慈裁擇貼黃言臣竊聞今來劈截本因中書差除有豫先傳播出外者故執政大臣有制勑院之議遂欲劈截諫官廳出外大凡差除既得聖旨之後須有詞頭舍人方知之及文字到門下省給事中方知之此只是首尾一日內之事次日到尚書省下吏部則外人無不知者矣雖知之已自是朝廷宣布之事人知乃其宜也有何所害惟是未得旨已前外人已知即於政體有害然未得旨已前若非執政大臣自有漏泄給舍何緣得預外人何緣得聞既給舍與外人皆未得預聞即諫官何緣得知惟張璪在中書日務收私恩凡差除才經商量而未奏即多以泄之於其所親自以謂恩出於我而已故差除有旬日半月以前先已傳播後果有如其所傳者也今執政大臣皆先朝耆舊及陛下所自選擇全才重望之人無若張璪收私恩者即何慮差除之漏泄耶不當歸咎於無制勑院亦不當緣此限隔諫官而使之不得在兩省也諫官在兩省與不在兩省於諫官何所重輕但於朝廷法度有害耳臣區區所惜者朝廷法度而已惟聖慈詳酌又言臣竊見中書事務分入門下省尚書省以來比舊事簡人吏減半檢正官都檢正官皆罷其舊中書制勑舍人廳檢正官廳共約五十餘間今必欲作制勑院而又欲其寬廣即更不論檢正官廢罷亦不論吏人減半但衣舊用屋五十餘間亦足矣况今舍人廳起居舍人廳右正言廳一位已是屋七十餘間若並用作制勑院自是有餘即不知更取右散騎常侍廳右諫議大夫廳右司諫廳何所用之兼門下省諫官廳亦一例劈截出外尤為無名故公議以謂執政大臣徒用制勑院以為説其實欲限隔諫官不使在政事之地恐其知政事之本末而論列之頻數而已尋詔諫官直舍且令依舊所有前降劈截指揮更不施行據哲宗御集此詔乃元祐元年十二月十八日下今附王巖叟王覿奏疏後亦可見朝廷從諫之美也庚辰詔自今北朝人使見辭日令朝參官起居詔夏國遣進使人將來興龍節不令赴賀拜表回御筵亦不預坐開封府言夷門山樊家岡地因太史言不可令人開發有旨禁士民安葬欲乞已有墳墓者許令歸附外其舊無墳墓之家即依先降朝旨從之殿中侍御史吕陶言伏見保甲之外雖己更改猶有二弊未便於民其一為罷去二十畝已下免教指揮却令五等户有三丁者皆赴冬教一月緣民之貧富不繫丁之多少而教與不教則有幸不幸今田有百畝家有二丁則免教是謂之幸田有十畝家有三丁則赴教是謂之不幸此貧富力役大為不均况今之教閲官中不給錢米一月之食皆其自辦夫有田二十畝之家中年所收不過二十石賦稅伏臘之外又令供贍一丁則力亦難給蓋昔日推行之始不暇講求利害惟務其多今雖將五等下户精專閲習萬一或有調發雖破竭家産所得幾何裹糧而行豈不重困臣愚欲乞於三等已上或等第雖低而家業及一百貫有三丁者方得差充其二為陜西州郡今秋雨潦高原之地雖謂順成下隰之田稼亦不善人户有訴災傷去處而蠲稅不及五分並須赴教官司奉法不敢放免臣竊謂保甲之令行已纍年朝廷知其有弊多所釐改欲民休息若須候災傷及五分方與免教亦恐德澤未廣臣愚欲乞應係災傷縣分並特免冬教以惠畿內三路之民又况郡縣自來檢視災傷多是通計一縣所放立為分數如元管稅一千石放及五百石則為之五分即非以逐户所傷立定分數其被災既有多少之異而通計一縣大數偶不及五分遂不免教此朝廷之所當察也如蒙聖慈以災傷之故不限分數特免教閲則朝廷武備未為廢闕而生民受惠深矣臣訪聞陜西諸縣人户有為田土絶少雖管三丁陳狀乞免教者并有詐述本户災傷過多但為一縣總數不及五分亦乞免教者逐縣拘礙條禁不敢輒行伏乞早賜指揮庶寬民力詔府界三路保甲人户五等以下地土不及二十畝者雖三丁以上並免教從陶請也九月四日户部言黃亷奏準勑體量民庶上書陵井監鹽井於課利鹽稅外使一井嵗輸五十緡謂之官溪錢願悉蠲除之欲乞今後溪內開興鹽井除合輸課利鹽稅外不許别收租賃溪錢見管六井並行蠲放其井研縣五井有見欠數亦乞除放從之詔入內內侍省都知押班係刺史帶昭宣使以上勾當皇城司任滿所得酬奬只自改轉更不回授與兒男可勘會三兩人體例進入御集十一月二十六日辛巳詔户部侍郎趙瞻往陜州夏縣臨視司馬光葬事候葬訖就墳所致祭臣僚上言朝廷罷俵青苗錢令諸路提刑司委豐熟州縣廣行收糴意欲常有儲蓄而户部乃請令轉運司更不收糴年計止將常平斛斗兊糴失朝廷養民之恩欲乞諸路轉運司合糴年計並先糴次令常平倉糴若轉運司不豫備本錢過時占糴致與常平倉相妨者委提刑司覺察以聞從之十一月四日可并此壬午詔中書省編修刑房斷例候編定付本省舍人看詳訖三省執政官詳定取旨頒行尚書省言門下中書後省并詳定重修勑令所刪定官檢閲點檢文字使臣並依在京職事官禁謁法從之先是左司諫王巖叟言伏以救災恤患惟恐有所不至以傷其仁者先王之用心也隨施以有求乘危以論利蓋不忍焉臣按祖宗賑濟舊法災傷無分數之限人户無等第之差皆得貸借但令隨稅納元數而己未嘗有息也故四方之人霑惠者普銜恩者深郡縣倉庾以陳易新者多其後刻薄之吏隂改舊法必待災傷放稅七分已上方許貸借而第四等以下方免出息殊非朝廷本意緣災傷放稅多是監司以聚斂為急威脅州縣州縣又承望風旨不復體念朝廷以災傷的實分數除放若放及七分者災傷已是十分况少有及七分又六分之與七分相去幾何毫釐之間何以辨别幸而得為七分則有借貸不幸而為六分則無借貸但繫檢災官吏一言之髙下而被災百姓幸不幸相逺如此此不可不察也三等而上均為赤子均遇天災豈容因災偏令出息計其所得則甚少論其所損則實多乖陛下平一之心虧朝廷光大之施臣乞復如舊法不限災傷之分數並容借貸不拘民户之等第均令免息庶幾聖澤無間感人心於至和天下幸甚如允臣所奏其河北京西淮南等路昨來水災州縣乞先次指揮施行貼黃臣竊見諸處借貸斛斗必依年分支給往往皆是陳次次年人户所納盡是一色新物陳次一石未得十斗之實新物十斗過倍一石之入公家雖云無取而所得亦已多矣巖叟又言臣訪聞昨來河北等路水災十分去處上等人户亦苦全闕糧斛今倉廪幸皆有餘何惜均令借貸以濟其艱此等户且無失陷之理有益民下而無損公上臣意朝廷優為之耳臣竊詳舊來雖不定災傷分數並得借貸若是所傷不多委不至闕之州縣亦不敢借貸民户亦自不願請領惟恐災傷多處其間有不幸偶然放稅不及分數則實被災之民無由霑借貸之惠臣所以言必當復舊法以除此弊也巖叟又言臣於九月十四日曾論奏賑濟災傷乞依舊法令州縣體量不限災傷之分數並容借貸不拘民户之等第均令免息庶幾聖澤無間以召至和并乞契勘昨來水災路分先次施行至今未蒙指揮臣訪聞河北京東西淮南等路昨被災之民不獨下户全仰救恤雖中等而上今亦皆艱食渴望濟接若不早復舊法寬借貸之惠深恐入春難得種糧以興農功嵗可望而人事不足洊成飢乏為朝廷憂伏望指揮檢會臣前奏早賜施行貼黃臣以謂舊法具在不須旋行修立惟乞更賜申勑災傷郡縣子細體量約度借貸其有以見錢紐折斛斗者乞嚴賜指揮必用平價令艱急之民得霑實惠詔户部看詳别立新法户部修立新法見十二月十八日壬寅朱光庭奏議亦有此兩奏與巖叟同八月二日司馬光劄子當并考監察御史上官均言臣聞治天下有二道寬與猛而已寬過則緩而傷義政事有廢弛之弊猛過則急而傷恩官吏有避法茍免之患術雖不同其蠧政害民一也自熙寧以來朝廷以法度整齊四方諸路監司不能申眀朝廷之意往往務為慘核刻深之政郡縣望風畏栗大扺以促辦為事類文具而無實不暇長計逺慮以便民為意而四方之民有憔悴愁歎之音此傷猛過急之弊也自陛下臨御數下德音務從寬大四方欣然仰戴德澤然比聞諸道監司又不能明陛下之美意妄意朝廷風旨一竊以茍簡縱弛為事疲愞汙庸之吏視而不劾紛紏紊繆之政知而不察外求寬厚之名以要譽於一時此矯枉過寬士大夫守義不篤之患也方陛下講修百度以差役之法行於四方尤在郡縣夙夜悉心以推行朝廷愛民之政若怠惰不舉委成於胥吏太守玩而不察監司視而不紏養成偷惰茍簡之風天下之民必有受其弊者矣臣願詔四方以寬不縱惡恩不傷惠之意若郡縣之吏庸惰不職監司太守不加紏劾如朝廷遣使亷按有實或風聞於上當顯責以厲逺近庶幾按察之吏不敢寬縱郡縣之官不敢偷惰人人驚懼修職宣布陛下之德澤以惠黎庶從之據吕陶云上官均論為政寬猛之道著為法令而實録不載今於榮州舊案內檢得元祐元年十二月吏部印板行下臣僚上言寬猛二道十一月二十八日三省同奉聖旨依奏此即上官均所陳也乃附本月日權發遣淮南路轉運副使趙稱言楚海泗宿亳五州水災最甚乞下發運司於常潤州收糴稻種十萬石以備五州來春布種或糶或貸從之紹聖二年八月户部員外郎陳蔡作趙稱行狀云公為淮南轉運副使于時流殍載路老羸轉溝壑壯者起為盜楚海泗宿亳五州為甚公奏以荒政務叢動繫人命每從中請緩不及事願一切許臣權宜措置事訖乃奏有不合理請從重坐復請移别路常平米二十萬斛兼充賑貸飭州縣諭流民歸業計口續食以散郡衆薰蒸疾疫之病且令漸還本土就治生業添置武臣守鎮衝要以防間隙露尸散骨埋斂有法棄孤遺幼鞠養有令客户舊無貸法蓋防遷徙若令主户隨等為保則雖貸無害又重法地分因災傷盜取五榖罪人時從減等而妻子不免編管殆非法意請罪人減者妻子亦免坐詔皆從之仍著為法癸未詔免太師文彥博北使朝辭日起居殿中侍御史吕陶言竊以人之情偽無窮而國家之法令有限以有限之法令應無窮之情偽則固不能周盡及其弊從而生則必曲折委細事為之制而濟之庶幾詳密備具行之可久理勢宜如此也昔嘉祐之差役務從寬厚而條禁太略貪吏猾胥幸農夫之在官而鋭意侵漁害端百出人甚苦之至熙寧之免役止令出錢官為雇募凡所謂侵漁於農夫者一切有禁毫釐不敢違縱然而有司斂入過重民間錢貨遂至乏絶陛下深恤元元復行差法以救其弊因時施設一出仁厚天下幸矣臣愚以謂法不相須則惠有未至既以嘉祐之制差之而不以熙寧之令禁之則雖無近年乏錢之勞復有昔日應役之害今推行差法將及一年其約束條貫猶未頒下四方郡縣愚夫俗吏意謂朝廷務行寬大之政既許差役則其他細故不及檢察坐視役者已萌貪心委使將迎動涉侵擾若不早立憲度力行禁約則農民漸見受弊伏請申命有司嚴責期限不候諸路役帳齊足疾速裁定私使役人條制先次頒行以成差役之法臣訪聞諸處縣邑已有私使役人違法及送迎陪費等事多是犯在赦前及事節細碎不敢一一論列上煩聖聽伏乞指揮有司更不候諸路役帳齊足先次頒降條法以防此弊從違當考疏云推行差役將及一年則當附十一月末文彥博言彥博自注元年五月當考臣竊聞天下諸路差雇役法朝廷雖已降指揮而至今未定頗聞煩擾臣檢會始初司馬光閲天下臣庶奏章多言出錢雇役其法不便遂却復差役之法然司馬光所言甚詳而節目頗繁恐州縣不一一通曉而又朝廷置局詳定議論不一必難通行臣以謂差役之法本州縣常事其來久矣皆素有定法及其末流不能無弊故當隨時刋改臣曾纍取劄子奏乞先令州縣刺史令佐從民利便依例各議定其法縣申州州申轉運司看詳定奪奏聞如得允當即降下施行蓋朝廷大號令必當自上而下州縣差役當理須自下而上則各從民便以天下之廣郡縣之衆不可以一切之法行之行之必互有妨礙而局官及諸臣僚紛然上言各任已見不周知利害及祇赴本司别無與奪以至州縣希望朝廷風旨至今其法未定益滋狡吏侵擾若如臣前請且各付逐路郡縣定奪利害各從其便庶幾下民早得息肩又言朝廷復差役法議臣之中少有熟親民政者故議論不同前後所降命令不一致州郡難以適從緣城郭鄉村人户只有差科二法鄉老村耆各知次第但用心公平必得愜當刺史縣令最是親民之官乞且專委守令各隨本處自來體例差定役人編成簿籍細開自來體例條貫申轉運司看詳體量如各得精當一靣施行申奏緣經變法以來僅十五年至今不無小差須合更改從便事條亦當委自逐處親民官及監司相度申取朝旨詳定仍稍寬程限使盡利害所貴行之久逺又言臣昨以朝廷復州縣差役之法臣曾奏劄子以謂差役之法其來甚久此乃州縣常事鄉老嗇夫皆熟知之刺史縣令皆總領之當且委逐縣議定申州看詳如得允當即申本路轉運司轉運司將一路詳定即申奏朝廷朝廷覆視如可行即從之如有未便更當會問或自有義理即可行之或有顯然乖當即處分改正施行便見就緒今乃置局詳定及諸人議論不一命令雜下致州縣疑難久不決定况差役之法乃户部所領今乞罷詳定局只委户部尚書侍郎郎中員外於本部詳定况局中趙瞻劉昱自是本部之官如本部要知本末即令孫永與李常等同共詳定所有舊局中人吏並各勾赴户部行遣文書所貴早得了當如有諸臣僚奏請役法亦乞不顯姓名降付逐路州縣看詳如有可采亦乞施行應緣役法臣已於簾前子細開陳訖乞降付三省詔令詳定役法所限兩月結絶如限滿有未了事並送户部施行其合銷要吏人令本部於舊局人內選留密疏載此於元年十一月間今并取彥博三奏附見月末須别考詳翰林學士蘇軾言臣近舉宗正寺丞王鞏充節操方正可備獻納科竊聞臺諫官言鞏姦邪及離間宗室因諂事臣以獲薦舉奉聖旨除鞏西京通判謹按鞏好學有文強力敢言不畏強禦此其所長也年壯氣盛鋭於進取好論人物多致怨憎此其所短也頃者竄逐萬里偶獲生還而容貌如故志氣逾厲此亦有過人者故相司馬光深知之待以國士與之往返論議不一臣以為所短不足以廢所長故為國收才以備選用去嵗以來吏民上書蓋數千人朝廷委司馬光看詳擇其可用者得十五人又於十五人中獨稱奬二人孔宗翰與鞏是也鞏緣此得減二年磨勘仍擢為宗正寺丞則臣之稱薦與光之擢用其事正同若果是姦邪臺諫當此時何不論奏鞏上疏論宗室之疏逺者不當稱皇叔皇伯雖未必中理然不過欲尊君抑臣務合古禮而已何名為離間哉况鞏此議執政多以為非獨司馬光深然之故下禮部詳議又兵部侍郎趙彥若亦曾建言若果是離間光亦離間也彥若亦離間也方行下有司時臺諫初無一言及光沒之後乃有姦邪離間之説則是鞏之邪正係光之存亡非公論也鞏與臣世舊幼小相知從臣為學何名諂事三者之論了無一實上賴聖明不以此罪鞏亦不以此責臣止除外官以厭塞言者之意臣復何所辨論但痛司馬光死未數月而所賢之士變為姦邪又傷言者本欲中臣而纍及鞏誣罔之漸懼者甚衆是以冒昧一言伏深戰越貼黃稱臣曾親聞司馬光稱鞏忠義及見光親書與鞏簡帖與鞏往復議論政事及有手簡與李清臣稱鞏之賢真迹見在蘇軾奏議以此係元祐三年十一月十五日誤也按舉十科乃元年七月指揮王鞏除宗正寺丞政目在元年五月十四日其年十一月十六日又除翟公度宗正寺丞然則鞏通判西京在十一月十六日前但政目不書耳曾肇制集先後亦可考證今斟酌軾奏語附十一月末王巖叟吕陶章亦可考證
