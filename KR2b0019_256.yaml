body:
  text: 續資治通鑑長編卷二百五十二宋李燾撰神宗熙寧七年夏四月已巳中書言在京免行錢欲令元詳定官於貧下行人名下特減萬緡仍免在京市例錢二十以下者開封府界并諸路今年旱災約及五分處欠負官物元非侵盜並權停催理災傷州縣未決刑獄委監司選官結絶杖以下情輕聽贖貧乏者釋之勸誘積蓄之家賖貸錢穀雖有利息豐熟日官為受理其流民所至檢計合興工役給與錢糧興修如老小疾病即依乞丐人例其在京諸門減定稅額內小民販易竹木蘆䉬羊毛之類稅錢不滿三十者權免從之先是手詔應災傷路分編排保甲方田造簿淤田及應有見差夫處並權罷候農隙豐熟日别奏取旨上以久旱憂見容色每輔臣進見未嘗不嘆息懇惻欲盡罷保甲方田等事王安石曰水旱常數堯湯所不免陛下即位以來纍年豐稔今旱暵雖逢但當益修人事以應天災不足貽聖慮耳上曰此豈細事朕今所以恐懼如此者正為人事有所未修也於是中書條奏請蠲減賑恤翰林學士吕惠卿言奉詔與曽布同根究市易事勾集行人照證而有臣未到以前布所取狀臣恐當再行審覆乞下開封府暫追赴臣處供析即更不禁繫中書欲依惠卿所乞施行上批可令布惠卿一處取問所貴不致互有辭説三司既收榜放罪上復以手札賜布令求對布即具陳行人所訴并疏惠卿姦欺以聞時三月晦也及時布對於延和殿上慰諭久之因曰惠卿誠不可更共事布亦固求罷上不許但勉令盡力布乂陳薛向編管無罪牙人事上惻然咨嘆曰此事朕與有罪當時失於詳究便令依奏今已無及惟當速釋之耳布言編管人情輕一期即放逐便其人皆已放還矣上頗悅布又言三司枉徇市易決責商賈不一上曰他日可一一檢取進呈時上意猶必欲按治而王安石卒不肯舍惠卿用他官惠卿奏請審覆蓋謀獨變此事也上疑馬故仍以付兩人上批久旱可選日差官再祈郊廟社稷及分禱宫觀寺院詔州學已差教授處管下有書院并縣學舊有錢糧者並撥入本學補試生員選差職掌餘官毋得干預從國子監請也庚午詔置疏濬黃河司差虞部員外郎提舉大名府界金隄范子淵都大提舉疏濬黃河口自衛州至海口又以衛尉寺丞李公義為勾當公事先是王安石以濬川杷法下大名府路安撫司安撫司令子淵與通判知縣共試驗之皆言其法不可用安石必使用之子淵亦不敢違子淵二十五日奏疏濬二股及清水鎮河皆言用浚川杷此據實録會子淵以事至京師安石問子淵濬川杷法甚善何故頃言其不可用子淵即對曰此誠善法但當時同官議不合耳安石大悅遂專置濬川司命子淵領之仍以公義為屬此據記聞仍采實録前後所書略加刪潤使不相抵牾公義初見六年十一月八日又見七年三月十一日子淵言今創置司局合具條約應疏濬河道合用人船並下本地分都大司於諸掃差撥如船不足即乞從本司移牒於三門白波輦運司應副自衛州至海口全藉有心力使臣分委勾當乞不拘常制舉使臣十員指使二員合製造疏濬木杷鐡龍爪等乞下沿河州軍應副工匠於諸掃各抽差就轉運金隄兩司差坐船二隻本司官當直兵士於都大司河清差撥官員請俸遞馬驛券軍典人數公吏食錢並依都水外監丞司例本司公事並與本路轉運提舉司及外都水監丞司公移行遣並從之此據會要詔都水監黃河六都大司除開封府界白馬等縣黃河隄岸留二員餘各減官一員并其餘掃岸地里狹處使臣亦具相度減併以聞中書言開封府見欠贓賞錢內有於法當蠲除亦有孤貧可矜及追贓不及十錢者亦有已納而吏不為銷簿者欲差同糾察在京刑獄祝咨看詳除放外有合奏請及情理可矜具事理聞奏從之是日中書奏事已上論及市易利害且曰朝廷所以設此者本欲為平凖之法以便民周官泉府之事是也令正爾相反使中平之民如此失業不可不修完其法也詔已差韓維孫永參問行人出錢免行利害可令元詳定官吕嘉問吳安持同取問既而維永言嘉問乃元詳定官不惟議論不同兼慮行人以嘉問是元詳定官及見提舉市易行户事多相關不敢盡情供析望且令臣等體問所冀得盡事理從之維永乞自體問乃初六日事今并書之詔開封府界提點司督責諸縣捕蝗得雨即時以聞賜熙河諸路策應諸軍特支錢有差王韶言韓存寶李楶陷主將當治軍法緣是日全軍陷沒蕃賊進攻城存寶等先歸登城固守乃得無虞乞免其罪詔存寶楶並釋罪委韶密訪存寶與思立出軍有無議論不同以聞辛未獲嘉縣令崇文院校書兼國子監直講曽肇為館閣校勘詔方田每方差大甲頭二人以本方上户充小甲頭三人同集方户令各認步畝方田官躬驗逐等地色更勒甲頭方户同定寫成草帳於逐假長濶步數下各計定頃畝官自募人覆算更不别造方帳限四十日畢先點印訖曉示方户各具書算人寫造草帳莊帳候給户帖連莊帳付逐户以為地符此月二日又六日又十月二日五年八月末志所載地符與此實録小異今兩存之壬申詔三司勾當公事李把等罷相度成都府置市易務止具經畫買茶於秦鳯熙河路博買利害以聞其後成都府轉運司同議亦以為便從之正月二十五日差杞相度又三月十六日云云可考又詔自今諸國進奉人到闕更不差市易務上界官主賣買癸酉遼主遣利州觀察使耶律永寧祺州團練使韓宗範其母遣奉國軍節度使耶律和衛尉卿趙孝傑來賀同天節上批應災傷路分方田保甲除已編排方量了畢止是攢造文字處許依條限了絶外其見編排方量及造五等簿處可速指揮並權罷志有此此月二日又四日又十月二日是日雨甲戌詔同天節依例上夀先是上以久旱避殿易服減常膳羣臣屢請不從至是雨告足羣臣又表請乃從之西上閣門使苗授知河州賊復圍河州授往救之始度洮西將士皆欲徑趨河州授曰納木薩勒宗甚近有伏兵當襲之一戰而克進破賊斬首四百餘級論功第一遂知河州擢四方館使榮州刺史此據本傳當考或削去木姚兕本傳亦請先破納薩勒宗録熙河秦鳯路死事者之家推恩有差惟景思立輕敵敗事特恤其死戰與二人恩澤餘皆加等仍令經略司先取逐家本房如不足取近親依所定人數開析以聞詔雜買務近支借錢一千三百五十緡依條有息錢三百緡以下今年收息一千七百餘緡委根究市易務利害所根究施行其後乃云此本息共收數也先是監安上門光州司法參軍鄭俠言去年大蝗秋冬亢旱以至今春不雨麥苗乾枯黍粟麻豆皆不及種五穀踊貴民情憂惶十九懼死逃移南北困苦道路方春斬伐竭澤而漁大營官錢小購升米草木魚鱉亦莫生遂外敵輕肆敢侮君國皆由中外之臣輔佐陛下不以道以至於此臣竊惟災患致之有漸而來如疾風暴雨不可復禦流血藉尸方知喪敗此愚夫之見而古今比比有之所貴於聖神者為其能圖患於未然而轉禍為福也於今之勢猶有可救臣伏願陛下開倉廪以賑貧乏諸有司掊斂不道之政一切罷去庶幾早召和氣上應天心調隂陽降雨露以延天下蒼生垂死之命而固宗社萬萬年無疆之祉君臣際遇貴乎知心以臣之愚深知陛下愛養民庶甚於赤子故自即位以來一有利民便物之事靡不毅然主張行之陛下之心亦欲人人夀富而躋之堯舜三代之盛夫豈區區充滿府庫盈溢倉廪終以富盛強大勝天下哉而中外之臣略不推明陛下此心乃恣其叨懫劓割生民侵肌及骨使之困苦而不聊生夫陛下所存如彼羣臣所為如此不知君臣際會千載一時欲何所為徒只日超百資意指氣使而已乎臣又惟何世而無忠義何代而無賢德亦繫其人君所以駕馭之如何爾古之人在山林有廊廟之憂至於芻蕘匹夫匹婦猶欲自盡以規其后陛下之朝臺諫之臣默默具位而不敢言事至有規避百為不敢居是職者凡百執事又皆貪猥近利使懷道抱識之士皆不欲與之言不識時然耶陛下有以使之然邪以為時然則堯舜在上便有夔稷湯文在上便有伊吕君作於內臣應於外主唱於上臣和於下以成康濟之業膏潤德澤下浸昆蟲草木至治馨香逹于上下至于千萬世莫不欣慕而則效之獨陛下以仁聖當御撫養為心甚於前古而羣臣所為如此其非時然抑陛下所以駕馭之未審爾陛下以爵祿駕馭天下忠賢而使之如此甚非宗廟社稷之福也夫得一飯於道傍則銘記不忘而終身飽飫於其父則不以為德此庸人之常情也今之食祿往往如此若臣所聞則不然蓋朝廷設官位有髙下臣子事上忠無兩心與其見怒於有司孰與不忠於君上與其茍容於當世孰與得罪於皇天臣所以不避萬死以告陛下誠以上畏天命中憂君國而下憂生民爾於臣之身使其粉碎如一螻蟻無足顧惜臣又見南征北伐皆以其勝捷之勢山川之形為圖而來料無一人以天下憂苦質妻賣女父子不保遷移逃走困頓藍縷拆屋伐桑爭貨於市輸官糴米遑遑不給之狀為圖而獻臣不敢具以聞謹以安上門逐日所見繪為一圗百不一及但經聖明眼目不必多見已可咨嗟涕泣使人傷心而况於千萬里之外哉謹隨狀呈奏如陛下觀臣之圗行臣之言自今已往至於十日不雨乞斬臣於宣德門外以正欺君慢天之罪如少有所濟亦乞正臣越分言事之刑俠福清人也於是上出俠疏及圖以示輔臣問王安石識俠否安石曰嘗從臣學因乞避位上不許乃詔開封府劾俠擅發馬遞之罪司馬光記聞云俠上言新制使選人監京城門民所齎物無細大皆征之使貧民愁怨人主居深宫或不知之乃畫圗并進按俠此疏乃無之當考俠六月九日責明年正月七日又責林栗言行録載俠以三月二十六日上疏神宗多所聽用蓋因俠上蘇軾等啓然考按他事或失先後如責躬詔乃三月二十八日而以為四月一日蓋誤也今但取其合者乙亥上批京東忠果所以難招置者大抵人情懼見揀選上京離去鄉土是則失朝廷救飢除盜之意可明諭今後止揀填本州軍就糧禁軍詔河北西路提點刑獄司劾定州路走馬承受任端端嘗呼集諸軍校有所戒諭而不以聞其帥於是安撫使滕甫以端侵預軍政奏之下轉運司體量得實故劾之其後獄具法止坐罰金又特命差替上於近習有過未始假借如此詔諸馬遞鋪兵闕額如係重難鋪分招人不足許本城不係配軍投換改刺仍就小給請受及關報住營處遣家屬從夔州路轉運司請也廢原武馬監淇水二監合為一賜知熙州王韶詔書以韶奏領大兵過洮西破賊於結河川斬二千餘級也韶三月九日過洮西御集三月二十日王韶軍至寧河遣將招討又獲二千餘級一行軍士可特支禁軍一貫餘準例指揮宣命入急遞付韶按此二千餘級當即是結河川不知御集何故書此而實録乃無之當考千舊紀於乙亥日亦書王韶破西蕃於結河川斬級二新紀但去斬級二千凡四字中書奏事已上論及市易事參知政事馮京曰開封祥符縣給散民錢有出息抵當銀絹米麥緩急喪葬之目如此七八種小民無知但見官中給錢無不願請積纍數多實送納不得上曰豈惟如此天下之民所納二稅至有十七八種者使吾民安得泰然也又詔三司以上等粳米每石為錢一千於乾明寺米場聽民賖請中等粳米每斗為錢八十五文零糶與貧民無與停販之家立許人告捕法賜河北路常平司度僧牒千募人入米賑濟己卯岷州刺史髙遵裕為岷州團練使旌守城功也賊乘景思立踏白之敗圍岷州蕃僧溫遵率容李龍族應之道路不通者幾月或請退保遵裕曰敢議此者斬岷城卑缺守者恐遵裕登西門遣偏將及包順引兵縱擊選精兵百餘騎繇南門鼓噪而出合擊之賊遂敗走時朝廷以岷城孤逺難守俾退保臨江詔至賊已潰矣故就除本州團練使遵裕謂容李龍三族應賊而龍氏實破和爾川寨度不可盡誅乃以二十縑募取龍氏一級斬捕幾盡以其地招弓箭手貸容李籍為蕃勇敢乘障得其死力溫遵知無能為率其徒歸附三月五日王安石云云當考西京左藏庫使包順為內藏庫使賜金帶上錦𫀆絹三百餘遷官賜絹有差録岷州破賊之功也包順事自十四日移此詔應乘遞馬者於水行州縣聽乘舟官以役錢差雇詳定行户利害所言竊知體問行户利害所取行人狀與經本所所供利害不同慮朝廷不知因依欲望自今凡有體問行户所狀乞降本所以慿具析申奏從之韓維言陛下待臣乃在呂嘉問之下臣雖不才先帝所命以輔陛下於初潛行年六十未嘗有一言稍涉阿倚以希己利未嘗有一言不盡理道以補聖聽今於此小事處置關防乃不得與新進小生為比臣復何靣目出入禁闈懇求去位優詔答之詔濮安懿王子宗暉宗勝宗楚各賜芳林園宅地令將作監計口修蓋又詔荆南嶽鄂安澧州第四等以下災傷户今年夏料役錢聽蠲減又賜淮南東路轉運司上供糧五萬石於災傷州縣募夫修工役又詔軍士逃匿於熟户族帳捕獲依常法自首者釋罪王韶言體量轄約昨在河州日屢與景思立言毋出兵而思立弗聽及言轄約力戰受傷以死詔轄約依諸司副使陳亡例給賻仍勘會親的骨肉以聞韶又言乞候諸處修築堡寨畢工併兵討蕩杓家摩雅克族上批如韶所奏即未有解兵之期令韶再相度以聞至六月杓家摩雅克族降庚辰天章閣待制同提舉在京諸司庫務韓縝兼提舉醴泉觀以上批縝奉使分畫地界庶别給稍優以周家用慰其冒暑逺使之勤也壬午知大名府韓絳言本路旱災已及四月旬若使民投訴差官檢覆然後蠲除恐艱食之民有所不能欲乞河北路二麥不收者不俟差官檢覆悉免夏稅上批速如絳所奏行之仍詔開封府界諸路準此又批聞河北流民日多皆留京師恐貧困之民闕糧失所可速相度具如何措置以聞中書言近詔京西轉運等司募流民給錢糧減工料興役以為賑置其老疾孤幼皆濟以食蓋以民既因災就熟若於京師給食則逺近輻湊轉使流離奔散因役募之兩得其利然竊恐工役不能處處皆有或有而未應興作以故未能周給欲更下有司令未興役州郡不以老少計口給食從之仍指揮其見留京師實貧乏者令司農寺相度具如何賑濟使得至所欲往州軍不致久留京師癸未遣官謝雨詔應黃河夏秋水漲隄岸危急須藉民夫救護處去所𨽻州五十里以上者本掃申所屬縣輟令佐一員急部夫入役及申外丞司并本屬州催促應副仍令通判提舉如不至急妄追集民夫並科違制仍委按察官覺察之甲申詔諸陳亡軍士祖父母父母妻無子孫依倚者人日給米二升以終其身婦人改嫁即停給詔應熟夷稅户無賣田宅與生夷並依緣邊戶典賣田土與蕃部法又詔聞岷州關糧少人入中其東南鹽鈔與今西鹽鈔法令三司具經久通行利害以聞又詔汾石州去年災傷五分以上戶見欠和糴糧草展納限至秋曽布吕惠卿同根究市易事凡三五日一對上初以布言為是已而中變從惠卿請送魏繼宗於開封府令所屬知在是日布復對上獨指糯米收虛息事曰此事極分明布因言前後所陳事理無不明白聖意無不曉然今獨以此事為分明則其他殆未明矣上默然布又言臣自立朝以來每聞德音未嘗不欲以王道治天下今市易之為虛固巳凛凛乎間架阡陌之事矣近日嘉問奏稱熙寧六年收息八十餘萬乞推賞官吏其間有貼黃云近差官往湖南販茶陜西販鹽兩浙販紗皆未敢計息臣以謂如此政事書之簡牘不獨唐虞三代所無歷觀秦漢以來衰亂之世恐未之有也上笑而頷之謂布曰惠卿不免共事不可與之喧爭於朝廷觀聽為失體退與惠卿召行人於東府再詰其所陳如前不變而王安石懇求去位引惠卿執政上既許之乙酉布復與惠卿會惠卿頗有得色詬罵行人及胥吏以語侵布布不敢校也詔災傷路分逐熟流民隨行之物稅錢百以下聽免是日雨雹王韶大破西蕃摩正降綱要云築阿納城西蕃首領舊紀於乙酉十八日書王韶破西蕃斬級七千摩正降新紀别修如上今從之其詳又具丁酉三十日端明殿學士兼翰林侍讀學士判西京留守司御史臺司馬光上疏曰臣伏讀詔書喜極以泣昔成湯以六事自責今陛下以四事求諫聖人所為異世同符凡詔書所言皆即日之深患陛下既已知之羣臣夫復何云曽子曰尊其所聞則髙明矣行其所知則光大矣陛下誠知其如是復能斷志無疑不為左右所移則安知今日之災沴不如太戊之桑穀太宗之雊雉成王之雷風宣王之旱魃更為宗廟生民之福乎然自詔下以來臣不知中外之臣亦有以當今之急務生民之疾苦力為陛下别白言之者乎蓋必有之矣而臣未得聞也臣竊不自揆伏念父子受國厚恩備位侍從嚮在朝廷屢以狂瞽塵凂聖聰間以衰疾自求間官不敢預國家之議四年於兹矣幸遇陛下發不世之詔問以朝政闕失斯實千載一時古人雖在畎畝猶不忘君况居位食祿者乎是以不敢畏當塗避衆怒愛微軀保妻子心知時事之可憂而塞默不言也竊觀陛下英睿之性希世少倫即位以來鋭精求治恥為繼體守文之常主髙欲慕堯舜之隆下不失漢唐之盛擢俊傑之才使之執政言無不聽計無不從所譽者超遷所毁者斥退垂衣拱手聽其所為推心置腹人莫能間雖齊威公之任管仲蜀先主之任諸葛亮殆不及也執政者亦悉竭力以副陛下之欲恥為碌碌守法循故事之臣每以周公自任是宜百度交正四民豐樂頌聲旁洽嘉瑞沓至乃其效也然六年之間百度分擾四民失業怨憤之聲所不忍聞災異之大古今罕比其故何哉豈非執政之臣所以輔陛下者未得其道所謂未得其道者在於好人同已而惡人異已也陛下既全以威福之柄授之使之制作新法以利天下是宜與衆共之捨短取長以求盡善而獨任己意惡人攻難羣臣有與之同者則擢用不次與之異者則禍辱隨之人之情誰肯棄福而取禍去榮而就辱於是天下之士躁於富貴者翕然附之爭勸陛下益加委信順從其言嚴斷刑罰以絶異議如是者往往立取美官比年以來中外執事權者皆此屬矣其懷忠直守亷耻者皆擯斥廢棄或罹罪譴無所容立至於臺諫之士天子耳目所以規朝政之闕失糾大臣之專恣此陛下所當自擇而亦使執政擇之彼專用其所親愛之人或小有違忤即加貶逐以懲後來必得侫諛之尤者然後為之如是則政事之愆謬羣臣之姦詐下民之疾苦逺方之寃抑陛下何從得聞見之乎又奉使詢訪利害於四方者亦其所親愛之人皆先稟其意指慿其氣勢以驅迫州縣之吏善惡繫其筆端升黜由其脣吻彼州縣之吏承順之不贍何暇與之講利害立同異哉其入奏則云州縣守宰咸以為便經久可行陛下但見其文書粲然可觀以為法之至善詢謀僉同豈知其在外所為哉或者更增為條目務求新巧互陳利害各事改張使畫一之法日殊月異久而不定吏民莫知所從蓋由襲故則無功出竒則有賞彼皆進身之私計非有益國便民之志也又令使者督責所在監司監司督責州縣上下相驅競為苛刻茍不奉行新法立加停替或未熟新法誤有違犯皆不理赦降去官與犯贓者罪同而重於犯私罪者州縣之吏惟奉行文書救免罪戾之不暇民事不復留心矣又潛遣邏卒聽市道之人謗議者執而刑之又出榜立賞募人告捕誹謗朝政者臣不知自古聖帝明王之政固如是耶昔堯稽于衆舍己從人舜戒羣臣豫違汝弼汝無靣從退有後言此其所以為帝王稱首者也秦惡聞其過殺直諫之士禁偶語之人及其禍敗行道之人皆知之而已獨不知此所以為萬世戒者也子産相鄭鄭人遊於鄉校以論執政然明請毀之子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若何毀之我聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大決所犯傷人必多吾不克救也不如小決使道不如吾聞而藥之也何今之執政異於古之執政乎齊景公謂梁邱據曰惟據與我和夫晏子對曰據亦同也焉得為和和如羮焉水火醯醢鹽梅以烹魚肉宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心今據不然君所謂可據亦曰可君所謂否據亦曰否以水濟水誰能食之今朝廷之臣對揚啓沃亦有異於梁邱據者乎衛君言計非是羣臣和者如出一口子思曰以吾觀衛所謂君不君臣不臣者也人主自臧則衆謀不進事是而臧之猶却衆謀况和非以長惡乎夫不察事之是非而悅人贊已暗莫甚焉不度理之所在而阿諛求容諂莫甚焉君暗臣諂以在民上民不與也若此不己國無類矣子思言於衛侯曰君之國事將日非矣出言自以為是而卿大夫莫敢矯其非卿大夫出言自以為是而士庶人莫敢矯其非君臣既自賢矣而羣下同聲賢之則順而有福矯之則逆而有禍如此則善安從生今執政主新法羣下同聲賢之有以異於衛國之政乎是以士大夫憤悶鬱結視屋竊歎而口不敢言庶人飢寒憔悴怨嘆號泣而無所控告此則陛下所謂忠謀讜言鬱於上聞而阿諛壅蔽以成其私者也茍忠讜退伏阿諛滿側而望百度之正四民之樂頌聲之洽嘉瑞之臻固亦難矣方今朝政闕失其大者有六而已一曰廣散青苖錢使民負債日重而縣官無所得二曰免上户之役斂下戶之錢以養浮浪之人三曰置市易司與細民爭利而實耗散官物四曰中國未治而侵擾四夷得少失多五曰團結保甲教習凶器以疲擾農民六曰信狂狡之人妄興水利勞民費財若其他瑣瑣米鹽之事皆不足為陛下道也捨其大而言其細捨其急而言其緩外有獻替之迹內懷附會之心是姦邪之尤者臣不敢為也凡此六者之為害人無貴賤愚智莫不知之乃至陛下左右前後之臣日譽新法之善者其心亦知其不可但欲希合聖心附會執政盜貴富耳一旦陛下之意移則彼之所言亦異矣臣不敢復費簡札敘利害以煩聖聽但願陛下勿詢阿諛之黨勿徇權臣之意斷志罷之必有能為陛下言其詳者矣此六者之中青苖免役錢為害尤大夫力者民之所生而有也榖帛者可耕桑而得也至於錢者縣官之所鑄民不得私為也自未行新法之時民間之錢固巳少矣富商大賈藏鏹者或有之彼農夫之富者不過占田稍廣積穀稍多室屋修完耕牛不假而己未嘗有積錢巨萬於家者也其貧者繿縷不蔽形糟粳不充腹春指夏熟夏望秋成或為人耕種資采拾以為生亦有未嘗識錢者矣是以古之用民各因其所有而取之農民之役不過出力稅不過榖帛及唐末兵興始有稅錢者故白居易譏之曰私家無鐡爐平地無銅山言責民以所無也今有司為法則不然無問市井田野之人由中及外自朝至暮惟錢是求農民值豐嵗賤糶其所收之穀以輸官比常嵗之價或三分減二於斗斛之數或十分加二以求售於人若值凶年無穀可糶吏責其錢不巳欲賣田則家家賣田欲賣屋則家家賣屋欲賣牛則家家賣牛無田可售不免伐桑棗撤屋材賣其薪或殺牛賣其肉得錢以輸官一年如此明年將何以為生乎故自行新法以來農民尤被其患農者天下之本農既失業餘民安所取食哉今貨益重物益輕年雖飢榖不甚貴而民倍困為國計者豈可不少思其故哉此皆斂錢之咎也北盡塞表東被海涯南踰江淮西及卭蜀自去嵗秋冬絶少雨雪井泉溪澗往往涸竭二麥無收民已絶望孟夏過半秋種未入中户以下大抵乏食采木實草根以延朝夕若乂如是數月將如何哉當此之際而州縣之吏督迫青苗助役錢不敢少緩鞭笞縲紲惟恐不逮婦子皇皇如在湯火之中號泣呼天無復生望臣恐鳥窮則啄獸窮則攫民窮困巳極而無人救恤羸者不轉死溝壑壯者不聚為盜賊將何之矣若東西南北所在嘯聚連羣結黨日滋月蔓彌漫山澤蹈籍城邑州縣不能禁官軍不能討當是時方議除去新法將奚益哉緑林赤眉黃巾黑山之徒自何而有皆疲於賦斂復值飢饉窮困無聊之民耳此乃宗廟社稷之憂而廟堂之上方晏然自得以為太平之業八九巳成此臣所為痛心疾首晝則忘食夜則忘寢不避死亡欲默不能者也易復之初六曰不逺復無祗悔元吉言過而能改雖悔不大也其上九曰迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征言迷而不復凶且有災於君道尤不利也昔秦穆公敗於殽作秦誓曰惟古之謀人則曰未就豫忌惟今之謀人姑將以為親雖則云然尚猷詢兹黃髮則罔所愆蓋悔棄老成之逺慮用利口之淺謀以取覆敗而思補其過也故能終雪前恥強霸西戎漢武帝征伐四夷中國虛耗賊盜羣起又喪二師之軍乃下哀痛之詔曰乃者以縳馬書遍示丞相御史二千石諸大夫郎為文學者皆以敵自縳其馬不祥甚哉公車方士太史太卜皆以為吉今計謀卦兆皆反謬蓋始悟公車方士之諂諛對不以誠致誤國事有悔豫心也故禁苛暴止擅賦力本務農天下復安自國家行新法以來天下之人心祈口禱惟冀陛下之覺悟拯救其失以蘇疲民如望上天之膏澤日復一日以至于今及今改之猶可救也過是則民力屈竭一旦渙然離散乃始勞心安集豈不難哉竊觀陛下詔書畏天災深自咎責丁寧懇切欲有所改為也若徒著之空文而於新法無所變更是猶臨鼎哀魚之爛而益薪不巳將何補哉陛下誠能垂日月之明奮乾剛之斷放逺阿諛勿使壅蔽自擇忠讜為臺諫官收還威福之柄悉從巳出詔天下青苖錢勿復散其見在民間逋欠者計從初官本分作數年催納更不收息其免役錢盡除放差役並依舊法罷市易務其所積物依元買價出賣所欠官錢亦除利催本罷拓土闢境之兵先阜安中國然後征伐四夷罷保甲教閲使服田力穡所興修水利委州縣相度凡利少害多者悉罷之如此則中外歡呼上下感悅和氣薰蒸雨必霑洽矣彼阿諛之人附會執政者皆緣新法以得富貴若陛下以為非而捨之彼如魚之失水必力爭固執而不肯移願陛下勿問之也臣竊聞陛下以旱暵之故避殿撤膳其焦勞至矣而民終不預其澤不若罷此六者立有溥博之德及於四海也又聞京師近雖獲雨而畿甸之外旱氣如故王者以四海為家無有逺近皆陛下之赤子願陛下雖徇羣臣之情御正殿復常膳猶應兢兢業業憂勞四方不遽自寬以為無後災也又諸州縣奏雨往往止欲解陛下之焦勞一寸則云三寸三寸則云一尺多不以其實不可不察也又聞青苖之法災傷及五分則倚閣其間官吏不仁者至有抑遏百姓止放四分以下稅此尤可罪者也臣在冗散之地若朝政小小得失臣固不敢預聞今坐視百姓困於新法如此將為朝廷深憂而陛下曽不知之又今年以來臣衰疾寖增恐萬一溘先朝露齎懷忠不盡之情長抱恨於黃泉是以冒死一為陛下言之儻陛下猶棄忽而不信此則天也臣不敢復言矣光上疏不得其的實月日案疏語云孟夏過半則必是四月十五日以後也今附此王安石罷相前知青州膝甫上疏言新法害民者陛下既知之矣但下一手詔應熙寧二年以來所行新法有不便悉罷則民氣和而天意解矣此據滕甫墓志附見當考鄭俠言行録云時詔求直言欲應詔者甚衆聞俠被劾皆沮縮惟司馬光輩一二文字得逹上前險佞之黨日於匭函假名投書乞留王安石堅守新法仍乞治俠狂妄之罪光疏已具載甫疏但存此其它疏又俱不見言行録或可據今且附見丙戌禮部侍郎平章事監修國史王安石罷為吏部尚書觀文殿大學士知江寧府仍詔出入如二府儀大朝會綴中書門下班安石轉九資元符二年五月二十三日曽布云云可考觀文殿大學士吏部侍郎知大名府韓絳依前官平章事監修國史遣勾當御藥院劉有方齎詔召絳赴闕翰林學士右正言兼侍講呂惠卿為右諫議大夫參知政事安石為執政凡六年先是上一日侍太后同岐王皓至太皇太后宫太皇太后謂上曰吾聞民間甚苦青苗助役錢盍罷之上曰此以利民非苦之也太皇太后曰王安石誠有才學然怨之者甚衆上欲保全不若暫出之於外嵗餘復召可也上曰羣臣中惟安石能橫身為國家當事耳皓曰太皇太后之言至言也陛下不可不思上怒曰是我敗壞天下耶汝自為之皓泣曰何至是也皆不樂而罷此據邵伯溫見聞録云是司馬光記富弼語然伯溫云時宗祀前數日太皇曰天氣晴和行禮日如此大慶也帝曰然太皇人曰吾昔聞民間疾苦必以告仁宗常因赦行之今亦當爾帝曰今無他事太皇又勸帝因赦罷青苗免役錢按四年九月祀明堂時太皇未必有此言七年九月祀明堂則安石以四月去相位矣此時必有差誤今略加刪削使不相抵牾安石益自任時論卒不與他日太皇太后及皇太后又流涕為上言新法之不便者且曰王安石變亂天下上流涕退命安石議裁損之安石重為解乃已會久旱百姓流離上憂見顔色每輔臣進對嗟嘆懇惻益疑新法不便欲罷之安石不悅屢求去上不許而吕惠卿又使其黨日詣匭函假名投書乞留安石堅守新法假名投書乞留安石此據鄭俠言行録上乃遣惠卿以手詔諭安石欲處以師傅之官留京師而安石堅求去又賜手詔曰繼得卿奏以義所難處欲得便郡休息朕深體卿意更不欲再三邀卿之留已降制命除卿知江寧庶安心休息以適所欲朕體卿之誠至矣卿宜有以報之手劄具存無或食言從此浩然長往也乂賜手詔曰韓絳懇欲得一見卿意者有所咨議卿可為朕詳語以方今人情政事之所宜急者安石薦絳代己仍以惠卿佐之於安石所為遵守不變也時號絳為傳法沙門惠卿為護法善神傳法沙門護法善神據吳幵漫堂隨筆人鄭俠言行録云惠卿拜職日京師大風霾黃土翳席逾寸俠又上疏論之不報此當考詳刪定他日上又賜安石手詔曰王韶聞卿解機務頗不安職繼有姦人詐韶云朝廷已有命廢熙河徙帥治秦韶愈憂惑朕雖已降手勑開諭卿可特致書安慰之河東節度使守司徒兼侍中判河陽文彥博判大名府檢正中書五房公事李承之兼同判司農寺兵部郎中陳安石復為户部判官以知諫院鄧潤甫等言朝廷近以京東監司不職例皆罷去而安石到官未久凡官吏之善否新法之弛張容有未知兼體問安石亦嘗發擲過官吏二十餘員故也詔置沅州以懿州新城為治所縣以盧陽為名從章惇請也南江傳云懿州賜名沅州潭陽縣名盧陽縣並繫之七年六月案實録乃七年四月十九日事也正月十九日惇請建州縣城寨當參考九域志云沅州潭陽郡熙寧七年收復溪洞黔衡古顯敘峽中勝富瀛繡允雲洽俄奬晃波宣十七州即唐敘錦奬州地置州治盧陽麻陽黔陽三縣食貨志云章惇初築沅州亦有屯田務又元豐元年六月二十五日九月二日可考又元豐元年七月二十一日罷屯田務此年九月二日以沅州屯田法付劉彛詔監楚州市易務著作伍郎王景彰追兩官勒停并劾違法干繫官吏命官具案聞奏其違法所納息錢給還仍下杭州廣州市易務勘會違法事許令自改正以權發遣淮南東路轉運副使提舉楚州市易司蔣之竒奏景彰違法糴買商人物貨及虛作中糴入務立詭名糴之白納息錢謂之乾息又勒商販不得往他郡多為留難以沮抑之上初令劾之既而謂輔臣曰景彰違法害人事狀灼然若不即行遣更俟劾罪必是遷延無以明朝廷元立法之意使百姓曉然開釋無所歸咎可速斷遣庶妄作小人有所忌憚遂責之戊子遣龍圖閣待制樞密都承旨曽孝寬為河北東路察訪使代吕惠卿也孝寬判軍器監入內都知張若水提點軍器庫以牒移監孝寬言若水屬吏不該用牒詔若水用申狀若水遣其子詣監求解軍器庫孝寬以若水不親至劾之尋命知制誥章惇判軍器監惇判監在孝寬受命察訪後一日劾若水事今附見更須考詳又恐惇非代孝寬者後與惇同勘曽布中書言京朝官選人小使臣試中經書律令大義及議并斷案上等欲與遷官循資堂除差遣中等堂除差遣下等注官換官者依此從之詔韓絳居東府第一位吕惠卿第二位自是居東西府八位不以次詔諸州軍器物料並置庫選職官或曹官一員兼監仍委通判點檢巳丑詔曰朕嘉先生之法澤於當時而傳於後世可謂盛矣故夙興夜寐八年于兹度時之宜造為法令布之四方皆稽合先王參考羣策而繼自朕志已行之效固亦可見而其間當職之吏有不能奉承乃私出已見妄為更益或以苛刻為名或以因循為得使吾元元之民未盡蒙澤雖然朕終不以吏或違法之故輒為之廢法要當博謀廣聽案違法者而深治之間有未安考察修完期底至當士大夫其務奉承之以稱朕意無或狃於故常以戾吾法敢有弗率必罰無赦先是吕惠卿慮中外因王安石罷相言新法不便以書遍遺諸路監司郡守使陳利害至是又白上降此詔申明之元祐本白字下脫漏紹興本因之當求别本考定恐尚有他語也今但云白上降此詔申明之朱史削去吕惠卿慮中外以下三十餘字却先書上以朝廷所降法令官吏推行多失其意乃下詔申明之簽貼云係黃庭堅手筆並無底本照據并起居注時政記元不如此故削去時政記起居注亦何嘗能説事意朱史私為惠卿諱耳今復存之上批聞府界諸縣民闕食令提點司官體量具賑濟以聞又批聞廣州市舶司頓虧嵗課二十萬緡或稱緣市易司之故致舶客不至未知虛實可體量推究以聞庚寅交趾郡王乾德表言去冬十月南界定蕃寨申占城國王領兵三千餘人及王妻子乘舟來降今年正月巳至本道稽顙克伏詔答之新紀於六年十月遂書是月占城降于交趾誤也今不取鄜延路經略司言罷肅戎軍至鄜州十八鋪守烽稅户九十人即有邊事差弓箭手從之上批見根究市易司事可催促結絶吕惠卿言近與曽布同根究市易事其間雖有異同亦己見利害大情及有無違法臣蒙恩命見辭免難同根究乞令中書盡取公案以異同情節逐一比對進呈詔應根究文字盡納中書後兩日布對延和殿條析前後所陳并比較治平二年熙寧六年收支錢物數進呈上以嵗費寖廣為憂令布送中書惠卿由是益不喜太子中允崇政殿説書兼國子監同修撰經義王雱為右正言天章閣待制兼侍講雱以疾不能朝又詔特給俸免朝謝許從安石之江寧仍修撰經義又詔王安石依舊提舉詳定國子監修撰經義參知政事吕惠卿同提舉又詔司農寺下諸路當職官勸諭蓄米之家賖借糶與貧民毋輒增價及差官檢括監糶委轉運提點刑獄司覺察之辛卯賜瀘州軍前效用黔州弩手號忠勝義軍人賜錢三千有功者别議賞淯井蠻冦邊此軍出力死戰蠻隔溪語曰相與無怨何致力也義軍罵曰朝廷遣我擊賊不知其他以藥箭射賊當之者立死賊惡之曰此黔州弩手箭也西京左藏庫副使李浩為供備庫使知沅州餘轉資減磨勘年有差録討蕩竹灘狤狑蠻之功也浩初為廣西路兵馬都監因召對問橫山事改鄜府路勾當公事未行會章惇察訪荆湖薦為辰州凖備差使懿洽既定浩功為多故有是命尋又遷西京作坊副使浩傳云七年為太原府路兵馬都監以南江功遷西京作坊副使仍知沅州浩力辭復為太原府路都監章惇又論浩功擢引進副使熙河鈐轄壬辰中書奏事巳上論及免行利害且曰今日之法但當使百姓出錢輕如往日便是良法至如減定公使錢人猶有以為言者此實除去衙前賠費深弊且天下貢奉之物所以奉一人者朕悉己罷人臣亦當體朕此意以愛惜百姓為心馮京曰朝廷立法本意出於愛民然措置之間或有未盡陛下但當開廣聰明盡天下之議便者行之有不便者不吝改作則天下受賜矣詔中書自熙寧以來創立改更法度令具本末編類進入五月二十一日樞密院亦就中書編類八年五月二十一日范鏜練亨甫修熙寧政録當即編類此也又詔司農寺罷賖糶粳米令三司盡數轉輸河北路常平司以備賑濟檢正中書刑房公事沈括言察訪浙東溫台等州自熙寧四年以後監司未嘗巡歷州縣事廢弛無人點檢蓋監司止在浙西乘船往來文移旁午指揮不一州縣莫之適從逺民無所赴訴近郡困於將迎欲乞以浙東浙西及轉運副使提點刑獄提舉官六員分為兩路杭蘇湖潤常秀睦七州為浙西路置轉運提舉於杭州提點刑獄於潤州越明婺溫台衢處七州為浙東路置轉運提舉於越州提點刑獄於溫州從之朱本削去墨本云方下本路相度至九年五月乃詔分路合併入九年按七年九月十二日丁未勿復分路詔則是年四月二十六日癸巳即從沈括所請矣朱本考之不詳遽削去墨本今依墨本仍具本月日然墨本既於此載沈括云云又於九年五月十一日丙寅重載之亦誤也今止於此詳載削去彼書新本考異殊不辨詰但依朱本蓋踈略耳癸已新權發遣兩浙路提點刑獄太子中允俞充檢正中書户房公事前提舉河隂輦運屯田郎中王珫遷一官虞部員外郎勾當京西排岸司文彥璋減磨勘二年珫等以都水監保明不閉汴口隄岸無虞也於是馮京曰昨王庠等以積凌敗隄各己停替此不可不賞臣終以不閉口為未安每年雖減梢芟一二百萬然自汴口至泗州用兵夫數亦不少若苦寒一夕凌排大積如何施工呂惠卿曰若晚閉早開似亦為便上曰子細更與體問若成得清汴即為萬世之利王庠等停替在二月六日詔判將作監范子竒向宗儒各升一任以三司磨勘本監裁省物料等錢二十九萬緡也詔陳州節度推官富蒙與一子郊社齋郎蒙往蔡州新蔡縣修水田宿村舍民家遺火燔死故録之詔買鹽及鹽倉場監官地分巡檢聼不拘合入逺近奏舉從江淮發運司請也其使臣應短使者仍除重難綱運外餘並與免短使詔開封府界去年災傷殘欠稅物及佃牧地租課並權倚閣甲午河東路同商量地界祕書丞吕大忠言伏見北使蕭禧至闕爭辨地界聞遣韓縝報聘乞下樞密院録前後照據文字令縝齎至敵庭庶令北朝稍知本末詔縝詳大忠所奏及照驗文字地圖以往俟至彼靣言自通好以來本朝遵守舊規未嘗先起事端誠以祖宗誓約各欲傳之子孫長無窮巳如白溝館驛本待兩朝信使往來隨宜增蓋屋宇及安牆眼此乃常事北朝不欲存留已令毀拆雄州舊有關城嵗久頺圯元檢工料六十餘萬十餘年來才役數萬人又非創築於誓書無妨亦已住修河東界至前後己經分畫北朝更欲辨正不欲相違巳專遣人與北朝差來官商量然恐北朝所差官不肯依理同議對執爭占失兩朝敦守歡好之禮如蘇直等莊一帶地前此南北各己遣官定奪標界分白嵗月未久又欲變移彼此大國須存信約如此展轉何以凖慿雖委所遣官商量恐北朝未悉知須至略陳本末大意如此更委縝隨宜應答縝至敵庭不果致但與押燕蕃相李仲熙略相酬對而還此假與密院時政記同六月大忠丁父憂九月十三日乃見其事詔諸城外草市及鎮市內保甲毋得附入鄉村都保如共不及一都保者止令廂虞候鎮將兼管從司農寺請也梓夔路察訪司言瀘州江安合肥縣深在瘴地夷漢事多乞自今知縣並依戎瀘州通判例酬奬如無第二任知縣人候到任三年與減磨勘三年從之又言遂州青石縣合州赤水縣主户各及三千以上昨並廢為鎮人不以為便乞仍舊為縣從之仍令轉運司劾元相度官以聞開封府言乞下三司於新城北靣諸門外更置糶場定價零細糶與流民從之仍令比城中斗減錢五詔媫妤宋氏遇同天節賜親屬霞帔三道自今為例分京東路為東西兩路以青淄濰萊登密沂徐州淮陽軍為東路鄆兖齊濮曹濟單州南京為西路先是鄧潤甫等乞分為兩路財賦金穀並令通融移用至是下京東監司相度如潤甫等所請新紀繫此事於八年正月丙午誤也五年八月已亥己分京西乙未祕書丞權通判河州鮮于師中為祠部員外郎集賢校理録城守之功也先是果莊使諜紿景思立云摩正有衆數千在踏白城將來降請逆諸河上思立信以為可取率精騎往襲之師中知其詐勸思立無往思立不聽遂行師中即治守具思立既敗果莊遂圍河州師中卒全其城故賞之尋又賜絹三百匹餘官悉論城守功減磨勘年有差朱史五月一日又書賜知河州鮮于師中絹三百匹通判李山甫減磨勘三年餘官減磨勘年有差師中知河州實録不書按四月七日己除苗授知河州不應更以命師中恐朱史誤也今不取思立信間諜以為摩正可取此據青唐録置南山堡通會關於河州詔三班差使借差并殿侍犯罪斷訖取補授宣劄批所犯刑名徒以上仍勒停犯除名及永不收敘者即追毀丙申詔聞淮南路推行新法多有背戾役錢則下户太重常平惟務散多更不出榜召人情願有用等第敷錢與民極為不便令本路監司速體量按治以聞又詔近楚州市易務監官違法聞蔣之竒久己知之亦嘗有百姓陳訴而之竒都不案治宜亦體量以聞會之竒丁憂去丙戌之竒已奏王景彰此云不按治當考朱史巳削去密州觀察使知汝州向傳範卒丁酉李憲言摩正出降輔臣皆賀詔摩正及母妻子令王韶李憲發遣赴闕走馬承受長孫良臣押引優厚支錢令緣路供給初韶還至興平聞景思立敗疾馳而西會兵於熙州熙州方城守韶命撒之選兵得二萬謀所向諸將皆欲趨河州韶曰賊所以圍河州者恃有外援也今知救至必設伏以待我且彼新勝氣甚鋭未可與爭鋒不若出其不意以攻其所恃古人所謂批亢搗虛形格勢禁則自為解者此也乃以兵直趨定羌城三月丙午渡洮遣王君萬等先破結河川額勒錦族以斷通夏國徑路斬千餘級韶進兵寧河寨分遣諸將入南山破布沁巴勒等族復斬千餘級賊知黨援既絶且恐斷南山歸道乃拔寨遁去甲寅韶遣諸將領兵旁南山焚族帳斬三百餘級即日通路至河州果莊等餘衆保踏白城西杓摩雅克家等族去河州百餘里四月辛己師自河州閭精谷出踏白城西與蕃賊戰斬千餘級壬午進至銀川破賊堡十餘燔七千餘帳斬二千餘級癸未分兵北至黃河西至南山復斬千餘級又遣將領兵入踏白城葬祭陳亡將士甲申回軍至河州乙酉進築阿納城前後斬七千餘級燒二萬帳獲牛羊八萬餘口摩正率酋長八十餘人詣軍門降王韶言己遣閣門祗候麻宗道等管押摩正赴闕及遣男厚齎表稱賀思立之覆軍也賊勢復張而京師風霾旱災相仍論者欲乘此棄河湟上亦為之旰食數遣中使戒韶駐熙州持重勿出且諭髙遵裕令退保臨江及是告捷上喜甚賜手詔褒諭曰將在軍君命有所不受寧河之行卿得之矣王君萬苗授姚兕等傳並云先攻納木薩勒宗不知納木薩勒宗果安在實録與韶本傳並不言當考四月七日除苗授知河州己附見納本薩勒宗事置岷州榖藏堡遼主遣其樞密副使同中書門下平章事蕭素樞密直學士梁潁議河東地界于代州境上新紀於丁酉日書遼人遣樞密副使蕭素議疆事於代州舊紀無之上批熙河路自恢復以來征伐饋餉人頗勞苦今摩正巳降邉事寧息宜曲赦本路續資治通鑑長編卷二百五十二
