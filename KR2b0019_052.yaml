body:
  text: 續資治通鑑長編卷四十八宋李燾撰真宗咸平四年春正月甲戌德音降死罪以下囚杖罪釋之殿前都指揮使河西節度使范廷召有疾辛巳上親臨問之及卒贈侍中廷召善騎射在軍中踰四十年由顯德以來凡親征未嘗不從也甲申以右正言知制誥趙安仁知審刑院時有將校笞所部卒死議致大辟安仁以軍中之令非嚴不整遂獲免死詔應益州軍民因賊亂殺傷劫盜除官更外皆釋不問時訴訟連結頗難閲實故悉許其自新也中外官上封事者甚衆詔樞密直學士馮拯陳堯叟詳定利害以聞乙酉遣使瘞西川遺骸戊子封歸義節度使曹延祿為譙郡王實録云加歸義節度使檢校太尉今從會要及本傳於是始封王爵也庚寅知河南府武勝節度使贈侍中李至卒其三子皆遷秩授官給俸終喪至好賢樂善為學精力然嚴剛簡貴人士罕得逰其門性吝嗇仕既通顯盡逐李存審養子而取其資財娶妻預出郡告身納采之日送其家為識者所嗤或曰至為參知政事辭位不受祿制行甚髙逐養子預納妻封告蓋毁之或損其真也此據隆平集所言撫水蠻酋蒙漢城等二十三人來朝納摽槍鐶刀四十餘事賜錦袍銀帶器幣有差甲午各授以官己亥祕書丞查道上言曰朝廷命轉運使副不惟商度錢穀蓋亦亷察郡縣庶臻治平以召和氣今觀所至或未盡公蓋無懲勸之科至有因循之弊望自今每使回日先令具任內曾薦舉才識者若干奏絀貪猥者若干朝廷議其否臧以為賞罰從之以棣州防禦使石保興知澶州保興在澶州每捶人輒令緩其杖移晷方訖上聞之謂左右曰如此用刑無乃太酷乎亟戒諭之宗正卿趙安易翰林學士梁周翰上新修屬籍三十三卷唐末喪亂屬籍罕存無所取則周翰創意為之頗有倫貫上召西川轉運使兵部員外郎馬亮入朝問以蜀事蜀自雷有終既平賊黨誅殺不已亮所全活踰千人城中米斗千錢亮出廪米裁其價人賴以濟及至京師會械送為賊所詿誤者八十九人知樞密院事周瑩欲盡誅之亮言愚民脅從者衆此特百分一二爾餘皆竄伏山林若不貸此反側之人聞風疑懼一倡再起是滅一均生一均也上悟悉宥之二月加直史館復遣還部時諸州鹽井嵗久泉涸而官督所負課繫捕者州數百人亮盡釋之而廢其井又除蜀部舊逋官物二百餘萬祕書丞劉炳以屢陳時務召對崇政殿翌日遷太常博士劉炳未見丙午詔廣南諸州先命幕職州縣官權知自今並命京官丁未兵部郎中直昭文館韓援等八人分詣嶽瀆祈雨戊申交州黎桓遣使貢馴犀象屯田郎中楊覃上言春初方盛時雨稍愆輦轂之下繫囚望詔有司未得論決死罪俟降雨乃復常典又請凡決重囚日減膳撤樂以應古義且彰至仁之德焉此事不知其月日今附見慮囚之前癸丑上御崇政殿親慮繫囚死罪再詳覆之餘悉從輕因召宰相李沆等對于殿之西閣至午而罷又遣庫部員外郎程渥等乘驛分詣諸路疏理繫囚杖以下皆釋之程渥未見甲寅以宋州𨽻京東路宰臣李沆等以旱表求罷不許乙卯鹽鐵使張雍言溫州板稅場吏逋髙額錢二百萬詔除之丁巳幸大相國開寶天夀寺上清宫祈雨戊午雨自去冬旱上每御蔬食憂憫切至是日方臨軒決事雨沾衣左右進蓋却而不御壬戍樞密直學士馮拯陳堯叟上言請令羣臣子弟奏補京官或出身者並試讀一經寫家狀以精熟為合格從之祕書丞知金州陳彭年上疏曰夫事有雖小而可以建大功理有雖近而可以為逺計者臣請言之其事有五一曰置諫官二曰擇法吏三曰簡格令四曰省官員五曰行公舉此五者實經世之要道致治之坦塗也夫置諌諍之官開獻替之路堯舜湯武所共然也何者以正直之臣忠信之士參立左右専奉針規有事必言有闕必諌足以逹四方之壅蔽資聖主之聰明今雖有諫官且無言責或出居外任或兼領餘司常箝口以自安少危言而替否是同虛器何補聖猷臣請依六典員數置諌議大夫司諫正言並選孤立無黨忠直不欺言行相符名實相稱者為之俱以才授不以敘遷使其常立朝廷専居諫署入觀朝政出聽輿詞或作事失中或出令未當或遷舉無狀或獄訟有寃小則上章大則廷諍然後陛下察其所言可者從之否者罷之嵗終以言事之多少為課最之髙卑忠讜盡規者甄升依阿固位者懲責自然人皆竭節政必無邪臣下不敢偷安朝廷得以震肅矣又人命所繫在于法官官或非才人必無告古者按大獄議大刑雖本於法律亦輔以經義故釋之定國之為廷尉則無寃人張湯趙禹之列九卿乃名酷吏今國家重文學之選輕刑法之司故其屬僚未得盡善用忠恕之道則為曠官徇深刻之文乃名奉法唯格律而是守豈經義之能詳若是則囹圄何由空虛鈇鑕何由偃息臣請今後廷尉官屬咸委所司慎加銓擇不拘資敘唯擢才能使其理一成之刑務于平允用三宥之法志在哀矜無以愛憎舞文無以髙下希旨自然民知恥格時洽和平又法令者國家之權衡生民之銜轡貴于簡易惡乎滋章久用則民知適從數變則人無所措近者陛下知制敕之頻降懼條科之太繁旋軫聖謨特令刪定既經歷之者皆是名臣則措置之間固皆合理而詔書頒下方及踰年後敕施行又將纍百或刪去者重為條貫或已有者更示申明無益憲章徒繁簡牘且理遵畫一則吏無以欺民令或頻更則人得以弄法損益之際豈不明哉古人有言利不十不變法誠為此也况先朝求理之心陛下繼明之志詔令一出夷夏同歡縱少有於闕文亦無妨于大體豈煩改作以致多門臣請今後有上封言事請變格法者非有大益無改舊章庶使號令愈明刑辟漸措又理世之端審官為本審官之道用賢為先不在具員但期得俊故曰官不必備惟其人又曰省事不如省官今國家州郡至廣官員太多無益公方空蠧國用使有才者莫盡其力不肖者得容其姦請以臣所親經證其利害臣前任蘇州通判日知州喬維嶽疾病獨臣與判官崔端共事次任夀州通判日知州喬維嶽喪亡支使甘鴻漸差出獨臣與推官陸文偉同官此時區分獄訟行遣文書皆得及期亦無闕事即今蘇州知州通判外有職事官三員夀州知州通判外有職事官四員官既衆事益煩增將吏之衙參添簿書之擁滯又臣本州洵陽縣計户一千一百有官三員率皆人戶雕疏路岐荒僻詞訟絶少租賦甚微徒使安間固無勤績臣每見支郡推官軍監判官並名初等職事然有名雖支郡而事倍藩方額是軍監而務多州府或當要路或在邉陲其間支郡則有推官而闕判官軍監則有判官而無通判監當錢穀詳斷刑名凡所責成莫非繁劇然其請受少于判司勞逸不均賢愚共見臣請特選明幹朝臣與諸路轉運使相度管內州縣有公事簡少官屬過多處並量減省以所減之奉依司理司法參軍例添給初等職事則冗長之處既已減員要用之官又各加俸自然官無虛設人皆竭誠創此新規益光至理又為邦之道莫􅋀于求賢求賢之方莫先於公舉然隄防不峻則濫進之路興憲綱稍嚴則明揚之典廢期臻多士在振宏綱臣請依唐朝故事新授常參官朝謝日並進狀舉官自代各隨所長具言其狀或以文學或以吏能或以強明或以清白務存托實不許飾詞儻所諳知無避親黨既經御覽即付宰司俟至年終具名條奏在外者委諸路轉運在京者委本司官長更審其能以驗所舉如薦揚既數採聽非虛即與量才各加進用其後或不修操行故黷彞章則舉主依法科刑以懲繆舉或政績殊異課最有加則舉主隨事旌酬以褒進善賞罰既信清濁自明蓋采羣議則人無以私有常規則衆皆知勸清原正本其在于兹臣又伏見唐太宗常召公卿咨詢理體羣臣多拘近俗莫有逺謀獨魏元成請行王道文皇既從其議果致太平中華則外户不扄四夷則重譯來貢艱難屢作而締搆益新豈非盛德在人餘慶及後所致歟以陛下之德夸越古先誠宜鄙晉魏而不談小髙光而獨出行清淨神明之化恢仁義慈儉之風然後舞干戚以為甲兵畫衣冠以為刑辟建明堂而朝萬國登岱宗而禮百神則天下之民無聲而應海外之俗不召而來矣疏奏詔馮拯陳堯叟參詳之拯等上言竊詳往制常參官及節度觀察防禦刺史少尹畿赤令并七品以上清望官授訖三日內於四方館上表讓一人以自代其表付中書門下每官闕則以見舉多者量而授之今緣官品制度沿革不同伏請令兩省御史臺官尚書省六品已上諸司四品以上授訖具表讓一人自代於閣門投下方得入謝在外者授訖三日內具表附驛以聞仍報御史臺其表並付中書門下籍名每闕官即取舉多者以名進擬如任用後顯有器能明著績用其舉主特與旌酬不如舉狀者即依法科罪如讓表不到委閣門御史臺糾督以聞其上封言事請變格法者望自今令中書樞密院送審刑院刑部大理寺詳議仍照驗前後格敕儻須至改革即具聞奏更委中書樞密院詳酌施行並從之上因謂輔臣曰自今諫官宜精擇其人甲子三司都催欠司引對逋負官物人上親辨問凡七日釋二千六百餘人蠲所逋負物二百六十餘萬已經督納而非理者以內庫錢還之身殁者給其家舍人院上重詳定百官封贈條制詔從之凡現任將相在朝正一品及任中書樞密院官特遣封三代依舊外應東宫一品以下雖曽任將相只依編敕本品追封其三代曽祖母祖母母除中書門下二品及平章事在朝正一品使相封國太夫人外餘只封郡太夫人止如舊有國號者依舊追封其位極將相勳業崇髙薨謝之時特恩追封王爵依舊外如因子孫追贈雖曽任將相並不許封王除祖父先居髙位纍贈至一品外如子孫官髙祖父官卑已贈五品者須歷品贈官方得贈至正一品母妻所封郡縣依本姓望封封國者不拘此限太常寺言樂工習藝匪精每祭享郊廟止奏黃鍾宫一調未嘗隨月轉律望示條約乃命翰林侍讀學士夏侯嶠與判寺郭贄同按試擇其曉習月令者悉增月俸自餘權停廪給再俾習學以奬勵之雖頗振紀綱然亦未能精備蓋樂工以年勞次補不以藝進至有抱其器而不能振作者故難於驟變云丙寅詔學士兩省御史臺五品尚書省諸司四品以上於內外京朝幕職州縣官及草澤中舉賢良方正能直言極諫各一人不得以見任轉運使及館閣職事人應詔十朝綱要得查道王曉等禁民間造銀鞍瓦及金線又禁盤蹙金線己巳改河東𣙜鹽院為永利監詔應外州官吏奏民間利病實封者進奏院即時進入不得拆封會要二月事是月從知黃州王禹稱之請令諸路置病囚院持仗劫賊徒流以上有疾者處之餘悉責保于外此從本志與實録不同據實録則去年四月已置病囚院詔京百司人吏並不得放免下戶差徭科配户部舊有蠲符案主百司人吏蠲免差配給蠲符自此廢之其諸州先貢蠲符亦免三月癸酉樞密院言凖例春季金明池習水戲開瓊林苑縱都人遊賞又大宴于含元殿上以太宗忌月命有司討詳故事以聞史館檢討杜鎬等引晉荀訥唐王及善韋公肅所議以為禮有忌日無忌月其春宴及上已金明池苑並合舉樂從之甲戍撫水蠻酋蒙英等三十六人來朝輸兵器毒藥誓不犯邉並加錫賚授官有差乙亥詔史館修撰韓援等各舉御史臺推勘官丁丑京師及近畿諸州風雪上謂宰相曰霾曀頗甚蓋隂陽不和人事所召朕甚憂畏卿等更思闕政以佐豫治李沆等再表求罷免不許辛巳詔分川峽轉運使為益梓利夔四路益州路總益綿漢彭邛蜀嘉眉陵簡黎雅維茂永康凡十五州軍梓州路總梓遂果資普榮昌渠合戎瀘懷安廣安富順凡十四州軍監利州路總利洋興劒文集壁巴蓬龍閬興元劒門三泉西縣凡十五州府軍縣夔州路總夔施忠萬開逹渝黔涪雲安梁山大寧凡十二州軍監兵部尚書張齊賢上言終南山處士种放守道遺榮孝行純至棲遲衡泌歷二十年願以備賢良方正之舉乃賜放詔及裝錢五萬令京兆府遣官詣山備禮發遣放辭疾不至先是三院御史多有出外任者風憲之職或用他官兼領乃詔本司長吏自薦其屬俾正名而舉職壬午以太常博士張巽為監察御史從新制也張巽未見膳部郎中兼侍御史知雜事范正辭上言治民之官牧宰為急今舉屯田員外郎吳蒨等五人堪知大郡復請令蒨等于前資見任京官令録判司司理參軍簿尉內各舉知縣縣令三人從之吳蒨未見甲申并代州都部署步軍都指揮使彭信節度使髙瓊來朝召之也先是范廷召桑贊所將邉兵臨敵退衄有上封請罪之者上以問瓊瓊對曰兵違將令於法當誅然陛下去嵗已釋其罪今豈宜復行之又方屯諸路非時代易恐衆心疑懼乃止尋命瓊為殿前都指揮使工部尚書贈右僕射張宏卒己丑宴射後苑上言及大射投壺鄉飲酒之禮因命直館各賦射宫詩上歡甚詔羣臣極飲恕其沉醉凡節序賜宴則宗室禁軍大校牧伯諸司使皆令習射庚寅左僕射吕蒙正兵部侍郎參知政事向敏中並守本官平章事中書侍郎平章事李沆加門下侍郎初乾元厯氣朔漸差詔判司天監京兆史序等考驗前法研核舊文取其樞要編為新歷於是厯成來上賜名儀天命翰林學士朱昻為歷序頒行之修厯遷秩改服章賜帛有差辛卯兵部侍郎參知政事王化基罷為工部尚書化基任中書不以蔭補諸子官然能訓導皆有所立以給事中同知樞密事王旦為工部侍郎參知政事樞密直學士馮拯陳堯叟並為給事中同知樞密院事禮部郎中薛映兵部員外郎梁鼎左司諫楊億並知制誥上初欲用著作佐郎直集賢院梅詢命中書召試映鼎及詢等宰相李沆素不喜詢言于上曰梅詢險薄用之恐不協羣議上曰如此則何人可沆曰楊億有盛名上乃驚喜曰幾忘此人仍以億望實素著但召映鼎就試翌日與億並命會要云至道二年四月梁周翰不召試而授知制誥其後薛映梁鼎楊億陳堯佐歐陽修亦如此例據映鼎皆召試會要誤也以國子監經籍賜潭州嶽麓山書院從知州李允則之請也先是放天下逋欠錢物既而三司計可督責及尚須究問本末縲繫追逮頗為煩擾至有久被拘者於是命知制誥薛映梁鼎與三司按籍詳定具名引對上臨軒閲視多蠲除之壬辰御史中丞趙昌言知雜御史范正辭上言內宴更衣百官有徑歸其家及過從于外者臣等昨於春宴前嚴行戒勵雖稍整肅然將期久逺望降敕文自今有違者乞委外彈奏從之丁酉上謂宰相吕蒙正等曰中書事無不總賴卿等宿望副朕意焉凡事無固必惟擇善而行以漸蘇天下之民最為急務也吕蒙正等言備邊經費計臣之責近者但委轉運使至於出入盈虛之數計臣或不能周知此甚無謂也乃下詔申警三司令舉其職儻聞闕誤必正典刑御史中丞趙昌言奏近例臺司多遣人吏巡察請依故事令左右巡使各領其職踰越法制者具名以聞從之夏四月乙巳以保州刺史楊嗣莫州刺史楊延朗並為本州團練使北作坊使繡州刺史無棣張凝為趙州刺史南作坊使髙州刺史李繼宣為西上閣門使領康州刺史上謂宰相曰凝舊事太宗藩邸猶有稱其才者嗣及延朗並出疏外以忠勇自效朝中忌嫉者衆朕力為保庇乃及于此繼宣雖不逮二三輩然亦熟邉事不易得也時嗣與延朗並為緣邉巡檢勇於戰鬬以名稱相上下邉人謂之二楊先是上特召嗣入朝面授團練使嗣言臣久與延朗聨職一旦驟居其上願且守舊官上嘉嗣之退讓即命延朗亦為團練使仍令嗣持告命就賜之楊延朗傳云三年冬敵復來寇延朗伏鋭兵於羊山西自北掩擊且戰且退及西山伏發敵衆大敗獲敵將函首以獻進團練使與楊嗣並命又王漢忠傳云敵大寇中山漢忠率諸將陳於野未戰敵遁追斬甚衆獲其貴將加殿前副都指揮使按上去年春自大名還京師至今年春契丹傳會要本紀實録並不載敵復入寇事其復入寇乃四年冬不知延朗及漢忠所獲敵將果在何時延朗與漢忠同獲一人或各獲一人皆不可知也據楊嗣傳乃因嗣讓初不緣破敵有功而漢忠為殿前副都指揮使據實録本紀則與髙瓊葛霸同遷亦不言獲敵將於中山也疑延朗及漢忠所獲敵將當是二年冬及三年春上在大名時或四年冬事二傳誤載耳今皆不取丙午以馬軍都指揮使感德軍節度使葛霸為并代行營都部署丁未以吏部員外郎陳省華為鴻臚少卿時省華子堯叟權任樞密故特優寵之戊申詔諸路幕職州縣官罷職待遷食貧可憫自今至年終替者宜並放選依例擬官辛亥詔秦州太平監所籍主吏柳延義等資産悉還之初延義等専主銀冶嵗輸定課更三嵗虧常額者四萬二千餘兩有司盡籍其家財以償上憫之故有是命壬子審官院初引對京朝官於崇政殿遷秩有差京朝官磨勘引對自此始上既用孫何耿望等議罷郊祀進改乃命審官考其課績優劣臨軒黜陟之凡三年差遣受代皆引對多獲進改罕有退黜由是官籍寖增云此據本志當考詔京朝官及吏部選人親老無兼侍者特與近任丙辰西川輝和爾汗王祿勝遣使曹萬通來貢玉鞍勒名馬寶器等萬通自言任本國樞密使本國東至黃河西至雪山有小郡數百甲馬甚精習願朝廷命使統領使縛繼遷以獻即授萬通左神武大將軍降詔奬祿勝優賜器服十一月末又入貢當考丁巳上以四郊所取桑葉麥苗示輔臣曰觀此足知嵗事矣己未翰林學士王欽若使西川還對于崇政殿即日以欽若為左諫議大夫參知政事初王均連陷綿漢勢張甚彭州人謀殺兵馬都監以應之時晉江陳從易實為軍事判官攝州事斬其首謀者召餘黨曉以禍福赦之衆皆伏恱乃率厲將吏嚴守械戒其家僮積薪舍後曰吾力不足以守當死於此賊聞有備不敢入境于是王欽若以狀聞召從易為著作佐郎召從易不得其月日今附見欽若使還時更須詳考曹國公元儼將出閣上親録朝臣數人姓名擇可使輔導元儼者以監察御史張巽純謹乃命為屯田員外郎曹國公翊善知益州雷有終轉運使馬亮等上言準詔詳度毁本州羊馬城壕利害竊以郡國城隍其來久矣蓋所以聚民而防他盜也本州頃嵗李順之亂賊自外攻即日而陷此城池頺圯之致也去嵗王均之叛姦由內作經年自固此城池完緝之咎也然而理亂之事雖繫于人亦關冥數誠非常情所可預測况此城頃因蠻寇民受塗炭至唐天成三年節度使孟知祥遂謀創築若緣軍賊誠合去除又慮異時寇盜外攻請仍舊不毁從之先是上以西蜀遼隔事有緩急難於應援故分四路别置官屬又慮漕挽者各司其局失均濟之義庚申命知益州右諫議大夫宋太初兼川陜四路都轉運使上以朝臣外任代還寓於逆旅癸亥置朝集院於朱雀門凡百餘區尋復罷之王欽若等請川陜縣五千户以上並置簿尉自餘仍舊以尉兼簿從之丁卯詔川峽幕職州縣官並二年與替辛未上御崇政殿試制舉人命翰林學士承旨宋白等充考官得祕書丞查道進士陳越入第四等定國軍節度推官王曙入次等以道為左正言直史館越將作監丞曙著作佐郎越尉氏人曙河南人績之後也五月壬申朔御朝元殿受朝德音降京畿流罪以下囚杖罪釋之癸酉以曹國公元儼為平海節度使甲戌詔定州都部署王顯兼河北諸州都轉運使應供軍金帛芻糧並同經度其餘刑獄公事止令轉運使副施行先是轉運使耿望行部至定州顯與宴數勸望酒望素有風裁且不能多飲固拒之顯不恱徐曰它日望都自當飲耳望都契丹兵衝也凡元帥出軍轉運使隨軍給饋餉疾徐惟元帥之命轉運使往往得罪故顯語及之望它日入奏從容具白其事上默然良久曰卿第去勿憂朕自有處分于是命顯兼都轉運使之職顯遂不能委罪于望云此據祖宗獨斷然獨斷乃以此事為太宗所處蓋年月差誤耳今改之按耿望以二年四月丙子為京西漕是年五月甲午為河北漕後甲戌蓋二十日先是固未嘗行北邉也恐獨斷誤又六月庚辰再命王顯領都漕王超副之不知甲戌已命顯六月庚辰又命顯何故或止一命而實録誤故兩出之當考耿望事姑載初命顯時庚辰翰林學士吏部郎中知制誥朱昻罷為工部侍郎致仕昻有清節淡于榮利初為洗馬十五年不遷不以屑意及在內署非公事不至兩府上知其素守故驟加褒進昻纍章告老上不得已從之遣使就第賜器幣謂大臣曰昻侍朕左右未嘗以私事干朕今其歸老可給全俸詔本府嵗時省問如有章奏許附以聞又命其子正辭知公安縣使得就養舊制致仕官止謝殿門外於是上特延見命坐勞問久之令候秋涼上道復遣中使錫宴於玉津園兩制三館儒臣皆預仍詔賦詩餞行恩渥之盛近代無比甲申上覽囚簿自正月至三月天下斷死罪八百人憮然動容謂宰相曰雜犯死罪條目至多官吏儻不盡心豈無枉濫故事死罪獄具三覆奏蓋其重慎也自何代罷之遂命檢討沿革終慮淹繫亦不果行乙酉詔三班自今差使臣知縣勿以先為諸州牙吏及富民受職者充從陜西轉運使劉綜之請也丙戌御史臺言曹州民蘇莊出兵器匿亡命剽民財産小不如意必焚其廬舍積贓計四十萬請籍其家上曰暴橫之民國有常法籍之斯過矣可論如律髙州蠻向君猛遣其弟君泰來貢方物戊子以殿中侍御史卞衮為淮南轉運使仍命衮與本路轉運副使劉師道同領淮南江浙荆湖制置茶鹽礬稅都大發運事時王子輿上表求代詔令自擇其人子輿以衮及師道名聞故有是命衮震之子也至道末罷發運使及子輿兼淮南轉運使尋加都大而不立使名發運使自後並淮南轉運使兼領其務省發運使在至道三年四月子輿以制置茶鹽兼淮南漕在咸平三年八月其加都大發運不見於實録據會要在四年今附此景德三年二月仍復使名上以鹽鐵使張雍齪齪小心三司事重宜有裁制庚寅命户部使王嗣宗代為鹽鐵使雍在三司置簿籍有案前急馬前急急中急之目頗為時論所誚其出典藩鎮務裁節宴犒聚公錢為羡餘以輸官帑集會僚佐糲食而已度支員外郎王子輿為右諌議大夫充户部使上封者言三司官吏積習依違天下文牒有經五七嵗不為裁決者案牘凝滯吏民抑塞水旱災沴多由此致自今請委逐部判官呈覆向來諸路州軍所申請及本司所積滯事疾速與奪然後詣判使會議别白施行如更有稽滯即許諸路轉運使及本州軍聞奏命官推鞫以警弛慢乃詔同知樞密院事馮拯陳堯叟舉常參官幹敏者與三司使議減冗事及參決滯務拯等請以祕書丞直史館判度支勾院孫冕同領其事詔陜西嵗稔穀價甚平宜遣使市糴務廣邉備以息轉餉乃命兵部員外郎董龜正乘傳與本路轉運使經度之辛卯以吏部侍郎陳恕知通進銀臺封駁司恕言封駁之任實給事中之職𨽻于左曹雖别建官局不可失其故號請為門下封駁司𨽻銀臺司從之甲午河北都轉運使光祿少卿劉錫卒上曰錫居漕挽之職以勤劬集事而不任威刑亦可嘉也録其長子為祕書省正字賜其幼子出身
