body:
  text: 續資治通鑑長編卷七十宋李燾撰真宗大中祥符元年九月己未詔告太廟日芝草嘉禾瑞木列於天書輦前及陳於六室仍各標所貢之處庚申命兵部侍郎向敏中權東京留守即赴內殿起居上以敏中舊德有人望故自西京召而用之詔軍頭司引見罪人悉具犯由奏聞送開封府决遣俟東封回日如舊詔京城緣街官渠民汲水課自今蠲之皇城使劉承圭詣崇政殿上新製天書法物有鶴十四來翔天書扶侍使丁謂奏雙鶴度天書輦飛舞良久翌日上顧謂曰昨所覩鶴但於輦上飛度若云飛舞良久文則文矣恐不為實卿當易此奏也謂再拜曰陛下以至誠奉天以不欺臨物正此數字所繫尤深皇帝徽猷莫大於此望付中書載於時政記上俯然許之按實録云劉承圭上法物有鶴十四飛舞於庭本志云有鶴十四至殿上宛轉飛舞正與御座相直封禪記亦同據丁謂所奏止有雙鶴爾豈至殿上者凡十四而飛度天書輦者特其十四之二耶本記並承圭上法物皆不書乃於告廟日書有鶴十四來翔按實録止云告廟有鶴隨步輦至萬嵗殿不言其數本志云還至乾元門有八鶴盤飛空中又曰四鶴飛隨步輦天書初出及還皆有雙鶴翔輦上下疑本紀所稱即通此數也然則上法物及告廟皆有十四鶴來翔矣今兩存之具載上語使後世有考焉泰山玉女池在太平頂泉源素壅而濁初營頓置山下醴泉發池水亦漲及工徒升山其流自廣清泚可鑑味甚甘美衆賴以濟王欽若請浚治之池側有石像頗摧折詔劉承圭易以玉石既成上與輔臣臨觀辛酉遣使礱石為龕奉置舊所令欽若致祭壬戌免夔州地基錢禮儀使言准典禮皇帝飲福酒以上尊太尉而下以罍今參詳告廟及封禪日皇帝所飲福酒蓋上靈降祚以交神明之福望令尚食奉御一員於上尊酌酒以進庶協禮文從之癸亥以權三司使事丁謂為行在三司使鹽鐡副使林特副之是日奉天書於朝元殿上齊於殿之後閣初有司撰儀止致齊一日特詔散齊一日甲子扶侍使等奉天書升玉輅赴太廟南城門內幄殿有頃車駕至詣幄殿酌獻訖奠告六室至太祖太宗室告以嚴配之意上涕泗交下左右執事無不感動行禮次白雲如龍鳳仙人正在廟室上有鶴十四來翔御史中丞王嗣宗立班失儀因自首上曰憲官當守禮法然以其性素粗略不之責乙丑判太常禮院杜鎬等坐誤供九宫神位祭玉罰一月俸丁卯以皇城使昭州團練使劉承圭為供備庫使內侍副都知竇神寶管勾大內公事己巳命殿頭髙品周文質提舉陜西賊盜事上諭之曰封祀在近關右之民游惰者衆慮乘間竊發侵擾閭里爾往宜從宜控制除所部兵外或有警急即召鄜延鳯翔兵給使先是西鄙戍卒叛入蕃族者許本族擒獻而厚賞之亦有妄擒堡壁軍士以邀賞者官司不為詳究枉置於法上聞而憫焉於是詔邉吏審察之有司言舊制車駕巡幸皇帝坐晚朝國忌及暇日不休務今請晚朝視事羣臣不赴起居從之庚午權判尚書刑部填從吉言與省寺衆官覆視刑部尚書溫仲舒等所試舉充審刑詳議官彭愈等刑名通粗多有差互詔問仲舒等仲舒等引禮部侍郎魏庠前試大理寺詳斷官裴常填鍇等所定通為比詔尚書省集百官議定吏部尚書張齊賢等言常鍇所試亦不中程先是鍇以武昌節度推官授著作佐郎充詳斷官至是釐正奪其官彭愈亦罷兵部員外郎直史館張復時知禮部避事不草議狀殿中丞邱雍輒代為之詔罰復金鍇從吉子也彭愈裴常邱雍未見辛未詣啓聖院朝拜太宗神御告行也詔祀事所用醴酒令有司别擇器用精加醖釀至時進內朕躬親題檢以付有司考功員外郎知晉州齊化基削籍黥面流崖州縱逢恩赦不在放還之限其子淄州司理參軍漙同學究出身瀆並削籍與少子滌姪渙分配安鄧汝蔡州化基所至以貪暴聞性凶狠人皆避之在晉州尤為苛刻而諸子受賕五百餘匹又蓄銅器衣塗金袍袴事發遣官案鞫化基狡獪懼罪欵不實凡三易制使又令御史艾仲孺拷訊之乃引伏朝議懲其積惡故令族竄之仍詔諭晉州官吏民庶莫不欣快元推官監察御史歐陽載等三人悉坐停官歐陽載修之叔父集有墓志述載得御史因依馮潔已御史臺記已辨其不然今不取卭部川蠻王阿遒遣將軍趙勿婆來朝貢勿婆請赴泰山陪位許之癸酉詔文武官奉使至兖州當升嶽者並公服令王欽若等察之步軍都虞候鄭誠部前軍先赴泰山甲戌命諸司副使一員視嶽下諸壇牲牢祭器有不恭其事者遇赦不原詔諸司奉祀升山人官給衣服令祀日沐浴服之從官衛士至鄆州即禁葷茹公私羊豕不得至嶽下戊寅西京及諸州民以車駕東巡詣闕貢獻召對勞賜之己卯以簽署樞密院事馬知節為行宫都部署詔給事中張秉左正言知制誥王曽管勾所經州縣父老詣行在者送閣門引對賜以酒食州縣見禁囚具所犯以聞庚辰趙安仁來朝獻五色金玉丹紫芝八千七百十一本龍圗閣待制陳彭年上言曰伏見判太常禮院孫奭奏議封祀白茅止用為藉臣謹按周易曰藉用白茅春秋左氏傳曰包茅不入王祭不供無以縮酒鄭元注周禮云茅以供祭之苴亦以縮酒此用茅有為藉縮酒二義也鄭興注周禮云束茅立之祭前沃酒其上酒滲下去若神飲之故謂之縮杜預注左氏傳云束茅而灌之以酒為縮鄭元注周禮云縮酒泲酒也又注禮記云泲之以茅縮去滓也此則又有灌酒泲酒二義也今詳定儀注之初孫奭亦言其義但緣經典有此互文事涉闕疑理難臆斷是以儀注之內兩存為藉縮酒之說今奭以為宗廟之祭有灌鬱鬯之禮故可束茅沃酒學者不達此㫖又以流俗澆酹之儀遂謂諸祠祭皆當束茅縮酒甚為失所竊詳論語疏云宗廟之祭未殺牲先酌鬱鬯酒灌地以求神此則獨言以鬱鬯灌地亦不指言用茅也若依鄭元之言則茅為泲酒若依鄭興杜預之言則天地宗廟俱滲酒也又周禮祀天神祭祀用蕭茅左氏又言包茅不入王祭不供以祭言之則通於天地宗廟明矣况鄭興杜預已有束茅沃酒之言許氏說文又云酹餟祭也此則酹酒之義鄭興杜預許氏當漢晉之世已言之矣安得謂之流俗哉然而封禪之禮前史不備開元之制最為詳悉按元宗實録唐會要並云其時撫州三脊茅生上封者言齊桓公將欲封禪管夷吾云江淮間三脊茅用以縮酒乃可封禪宰臣奏云臣等博訪貢茅沅江最勝已牒嶽州取訖今稱撫州有茅望令且進六束與沅江相比用之此時宰臣即張說源乾曜刋撰官即說與徐堅韋縚康子元侯行果並該詳舊典號曰碩儒若封禪果無縮酒之義當時豈無駮論既令取茅充用足驗於禮昭然伏以沃茅之文既經典攸載酹酒之祭又聖朝久行若謂致爵方為成禮竊恐寅恭之志未及於宸心改作之譏益生於輿誦其孫奭所奏伏請不行從之辛巳詔外州軍士赴京𨽻役者回日給錦袍遣之壬午始給升山行事官衛士釘鞋以山路險滑故也始丁謂請置隨駕使錢頭子司每賜諸軍鞋錢但給頭子指定於某處支錢軍士各使其家人往請乃詔殿前都指揮使曹璨問諸軍可否士皆曰隨駕得錢難以將行骨肉住營得錢濟用聖恩厚矣遂置使錢頭子司車駕往還支賜略無闕誤丁謂使錢事附見癸未左正言直史館權管勾京東轉運司事張知白言咸平中天下多上祥瑞當時河湟未平臣嘗論奏請一切罷去今天下無事靈貺並至望以泰山諸瑞按品目模寫置正副二本一藏祕閣一納中闈俟昭應宫成飾諸繪事傳之不朽從之二年正月丙戌可考甲申以御史馬亮為契丹國母正旦使西京作坊使魏昭易副之都官員外郎孫奭為契丹國主正旦使侍禁閣門祗候薛貽廓副之昭易咸信子貽廓未詳乙酉上親習封禪儀于崇政殿初禮官已再肄習且言職在有司無帝王親習之文上曰朕以達寅恭之意豈憚勞也既畢謂輔臣曰適見典禮頗有未便如天書未下圜壇朕已先降又金匱先天書降壇送神畢始奉玉匱置䃭石禮儀使奏禮畢在望燎前似未協冝置匱䃭中將作監即領徒封固懼為喧雜可與禮官再議以聞有司言按開寶通禮則燔燎畢封冊開元故事則封䃭後燔燎今若不對神封冊即未稱寅恭或封䃭後送神則併為喧瀆欲望俟終獻畢皇帝升壇封玉匱奉置䃭中印訖次飲福送神樂止燎舉天書降次金匱降禮儀使奏禮畢皇帝還大次俟封䃭訖再拜壇省視緣祀禮已畢更不舉樂從之又以亞獻終獻皆不作樂問禮官具言按開寶通禮親郊壇上設登歌皇帝升降奠獻飲福則作壇下設宫懸降神迎祖退文舞引武舞迎送皇帝則作亞終獻升降在退文舞引武舞之間有司攝事不設宫懸二舞故三獻升降並用登歌今山上設登歌山下設宫懸二舞其山上圜臺亞終獻准親祠例無用樂之文上以對越天地嚴配祖宗不欲分等威特令亞終獻並同登歌作樂髙順州貢奉蠻人入辭上諭之曰各安部族勿相侵擾有自陳親屬為鄰洞所殺求往復仇上曰事往矣勿復論咸拜而退此據㑹要乃九月事是月京東西河北河東江淮兩浙荆湖福建廣南路皆大稔米斗錢七八冬十月戊子朔上謂王旦等曰朕以封禪非常祀自今日素膳旦等曰陛下方將冒寒沍涉道途保衛聖體恐未得宜况南郊亦祀天地不聞預禁葷茹望於致齊或散齊後議進蔬食遂三上表懇請終不許詔內臣傳宣取索並齎御寶文字為號仍先降式赴所由司以辨詐妄知夔州侯延賞言西南溪洞諸蠻素未修貢今以方物來賀請赴泰山從之庚寅詔以御史中丞王嗣宗攝御史大夫為考制度使右正言知制誥周起攝中丞為副使所經州縣採訪民間不便事并市物之價車服權衡度量不法者舉儀制禁之有竒才異行隱淪不仕者與所屬長吏論薦鰥寡惸獨不能自存者量加賑恤官吏政績尤異民受其惠及不守亷隅昧於政理者孝子順孫義夫節婦為鄉里所稱者並條析以聞官吏知民間利病者亦為録奏司天言五星順行同色辛卯有司宿設天書仗位於乾元門晝漏未上三刻自宫中奉天書出乾元門升玉輅黃麾仗前後部鼓吹道門威儀扶侍使等導從而行從臣望拜於殿下有頃上服通天冠絳紗袍御大輦發京師次含芳園之行宫詔行事官職掌人盡恭奉祀有涉懈慢令憲臺及監祭使糾舉遇赦不原壬辰次陳橋驛命宫苑使趙承煦等檢視山上下諸壇牢饌詔行在諸色人有犯罪並赴行宫都部署馬知節諸軍即送殿前副都指揮使劉謙量罪區斷情理重者以軍法從事不須奏聞所在州縣犯罪人送軍頭司未得引見令樞密院詳度指揮上䖍心祀事不欲决罰且虞小民輕冒禁法故預戒之自降詔至訖事未嘗戮一人惟二人犯徒流者癸巳次長垣縣甲午次韋城縣王欽若等言泰山芝草再生者甚衆黃河水今嵗上流多雨雖時泛溢正在中道不臨兩岸其堤防比常嵗用度工役約省數百萬河北緣邊安撫司言契丹防邊人馬自承牒命悉已引去人戶安居商旅不絶乙未次衛南縣丙申次澶州命殿前副都指揮使劉謙西京左藏庫副使趙守倫於山門閲視升嶽之人著籍乃許上丁酉次永定驛詔應乘輿儀仗如城門不可入者由城外而過時大輦至澶州有司以城門卑下將撤之上不許因降是詔戊戌次濮州詔鄆齊單淄等州長吏赴泰山陪位車駕所經黃河護掃軍士並優與特支己亥次范縣庚子次夀張縣辛丑次鄆州壬寅駐蹕知制誥朱巽言奉玉冊玊牒至翔鑾驛有神光起昊天玉冊上亟遣翰林學士李宗諤馳往致謝詔諸州旬設駐泊禁軍諸校其本軍員皆不獲預自今宜并及之癸卯命入內髙班鄧守恩覆視諸壇牢饌甲辰詔扈從人宿頓之所無壞民舍什器樹木犯者重置其罪詔緣路急腳遞鋪止當傳送文字如聞使臣或遣負重以馳咸不堪命自今非宣㫖不得輒私役使乙巳發鄆州夕次迎鑾驛丙午次翔鑾驛命行宫都部署馬知節於山門駐泊都大管勾山下公事殿前副都指揮使劉謙都大提舉山下人馬馬軍都虞候張旻步軍都虞候鄭誠扈從升山提舉宿衛兵行在三司使丁謂言自京至泰山金帛糧草咸有羡餘又民間以官司無所配率芻藁每圍不及三五錢粟麥每斗不及十錢丁未法駕入乾封縣奉髙宫上即詣昊天玉冊前焚香再拜以謝神光之貺占城大食諸蕃國使以方物迎獻道左大食蕃客李麻勿獻玉圭長一尺二寸自言五代祖得自西天屈長者傳云謹守此俟中國聖君行封禪禮即馳貢之戊申上齊于穆清殿王欽若等獻泰山芝草三萬八千二百五十本己酉五色雲起嶽頂上與近臣登後亭望之名亭曰瑞雲知制誥朱巽奉玉冊牒及圜臺行事官並先升山上以回馬嶺至天門路險絶人給橫板各二兩首施綵帛選親從卒推引而上詔河北京東轉運使及使還京朝官未見者許入見陪位庚戌晝漏未上五刻上服通天冠絳紗袍乘金輅備法駕至山門改服鞾袍乘步輦以登鹵簿仗衛列于山下黃麾仗衛士親從卒自山址盤道至太平頂凡兩步一人綵繡相間供奉馬止于中路御帳亞獻寧王元偓終獻舒王元稱鹵簿使陳堯叟從登有黃雲覆輦上道經險峻必降輦步進有司議益扶衛皆却之導從者或至疲頓而上辭氣益壯至御幄召近臣觀玉女泉及唐髙宗明皇二碑前一夕山上大風裂帟幕遲明未巳及上至天氣溫和纎羅不動奉祀官㸃饌習儀于圜臺祥光瑞雲交相輝映是夕山下罷警場辛亥享昊天上帝于圜臺以太祖太宗配命羣官享五方帝諸神于封祀壇儀衛使奉天書于上帝之左上服衮冕奠獻侍從導衛悉减去拂翟止於壝門籠燭前導亦撤之攝中書侍郎周起讀玉冊玉牒文上飲福攝中書令王旦跪稱曰天賜皇帝太一神䇿周而復始永綏兆人三獻畢封金玉匱王旦奉玉匱置于石䃭太尉馮拯奉玉匱以降將作監領徒封䃭上復登臺閲視訖還御幄司天監奏慶雲繞壇月有黃輝氣宰臣率從官稱賀山上下傳呼萬嵗振動山谷上即日還奉髙宫百官奉迎於谷口日有冠戴黃氣紛郁壬子禪祭皇地祗於社首山如封祀之儀上至山下服鞾袍步出大次侍臣言山路峻滑請乘步輦上曰接神在邇敢不徒行五使等復固請終不許前夕隂晦風勢徑猛不能燃燭及行事風頓止天宇澄霽燭焰凝然封䃭訖紫氣䝉壇黃氣如帛繞天書匣悉縱四方所獻珍禽竒獸于山下法駕還奉髙宫日重輪五色雲見鼓吹振作觀者塞路歡呼動天地詔以奉髙宫為㑹真宫增葺殿屋務從嚴潔九天司命上卿加號保生天尊青帝加號廣生帝君天齊王加號仁聖各遣使致告司命加號以王中正之言故也事見二年二月辛卯癸丑有司設仗衛宫懸於朝覲壇下壇在奉髙宫之南方九丈六尺髙九尺四出陛其南兩陛上服衮冕御壇上之夀昌殿受朝賀中書門下文武百官皇親諸軍校四方朝賀使貢舉人蕃客父老僧道皆在列大赦天下常赦所不原者咸赦之內外諸軍將士比南郊例特與加給文武官並進秩賜致仕官本品全俸一季京朝官衣緋緑十五年者改賜服色兖鄆州免來年夏秋稅及屋稅仍免二年支移稅賦工役所過州縣免來年夏屋稅十之五河北京東州軍供應東封者免十之四兩京河北免十之三諸路免十之二屋稅並永免折科德清通利軍例外更給復一年令開封府及車駕所過州軍考送服勤詞學經明行修舉人其懷材抱器淪於下位及髙年不仕德行可稱者所在以聞三班使臣經五年者與考課兩浙錢氏泉州陳氏近親僞蜀孟氏江南李氏湖南馬氏荆南髙氏廣南河東劉氏子孫未食祿者聽叙用賜天下酺三日改乾封縣為奉符縣泰山下七里內禁樵採大宴穆清殿又宴近臣及泰山父老於殿門賜父老時服茶帛始議肆赦上謂宰相曰此赦與常時不同但常赦所不能行者卿等並録出條目共議之務令實惠及民也上齊於行宫朝逈進所草赦書故事召對學士天子著帽而學士止繫鞋逈以方行大禮乃秉笏請對上入改服見之甲寅車駕發奉符縣次太平驛是日始復常膳賜從官辟寒丸紫花茸袍上勞王旦等以久食蔬旦等皆再拜簽署樞密院事馬知節獨言蔬食惟陛下一人耳臣等在道未嘗不私食肉上顧旦等曰知節言是否又再拜曰誠如知節之言知節為人質直類此此據司馬光記聞詔以十一月朔旦幸曲阜縣謁文宣王乙卯次回鑾驛京東西河北陜西淮南江南等轉運司並言自有詔封禪以來諸州進奉使蠻夷入貢及公私往來晝夜相繼鄉邑肅靜物價至賤是時京師至泰山道路駢擁絶無攘竊丙辰次兖州以州為大都督府特賜酺三日詔選人籖符並破官物書寫給付舊例納官錢特免之㑹要十月事籖符當考十一月戊午朔上服鞾袍詣文宣王廟酌獻廟內外設黃麾仗孔氏家屬陪列有司定儀止肅揖上特再拜又幸叔梁紇堂命刑部尚書溫仲舒等分奠七十二人先儒暨叔梁紇顔氏上制贊刻石廟中復幸孔林以樹木擁道降輿乘馬至文宣王墓奠拜詔加諡曰元聖文宣王祝文進署仍修葺祠宇給近便十户奉塋墓又詔留親奠祭器翌日又遣吏部尚書張齊賢等以太牢致祭賜其家錢三十萬帛三百匹以四十六世孫同學究出身聖佑為奉禮郎近屬授官及賜出身者六人又追封叔梁紇為魯國公顔氏為魯國太夫人伯魚母亓官氏為鄆國太夫人先是詔有司檢討漢唐褒崇宣聖故事初欲追諡為帝或言宣父周之陪臣周止稱王不當加帝號故第增美名春秋演孔圗曰孔子母夢感黑帝而生故曰元聖莊子曰恬淡元聖素王之道遂取以為稱又追諡齊太公曰昭烈武成王令青州立廟周文公曰文憲王曲阜縣立廟以右正言知制誥朱巽權知兖州江休復雜志云朱巽草制云某官夙負官材真宗令出典藩當考王欽若等言曲阜縣民東野冝七世同居乾封縣民竇益六世同居詔並旌其門閭仍賜束帛己未上御回鑾驛覃慶樓觀酺凡三日庚申賜輔臣親王百官宴於延夀寺凡二日有金龜集游童衣袂大如榆莢丁謂得之以獻上亟命中使齎示羣臣辛酉上作慶東封禮成詩從臣皆和內侍史崇貴言准詔館伴諸蕃進奉使咸以親逢大慶得預陪列求賜紫袍象笏歸耀國族從之壬戌發兖州次中都縣王欽若趙安仁還奉符縣詔令𬞞食升嶽省視圜封癸亥次鄆州上覩城中巷陌迫隘詢之云徙城之始衢路顯敞其後守吏增市廊以收課即詔毁之甲子宴百官于行宫乙丑御升中延福樓宴從臣又宴父老于樓下詔節度觀察防禦團練刺史因東封為諸州駐泊部署鈐轄者並賜襲衣金帶器幣舊制蕃侯在外遇大禮無賚及之例今特賜焉丙寅次夀張縣丁卯次范縣賜曲阜縣元聖文宣王廟九經三史令兖州選儒生講說又賜太宗御製御書又以經史賜兖州賜兖鄆知州羊酒緡錢令宴諸僚屬行宫司言有扈駕捧日卒彭攀於社首廟前逢一叟衣冠甚偉曰升山之路異於往時動至感應皆聖德所致也從臣皆昔陪唐帝祀嶽者唯八人非然四存而四亡矣言訖西南行不知所往戊辰次濮州己巳宴從臣于告成均慶樓父老于樓下詔緣祀官物合輦還者俟來春於清河廣濟河水運至京師其鋪卒悉放歸營仍給賜甘州回鶻可汗伊嚕格勒巴烏公主及其宰相各遣使來貢賀東封也庚午次永定驛遣翰林學士李宗諤祭澶州河瀆廟辛未次澶州幸河瀆廟酌奠以頓邱縣令兼充廟令以兖州父老吕良攝本州助教良首請東封故也壬申宴從臣父老于駐蹕延禧殿行宫在河南其地迫隘故於宫南當衢結綵為殿因賜名焉王欽若趙安仁自兖州來見總噶爾族大首領溫布等遣使入貢癸酉發澶州次韋城縣宴從臣父老于行宫甲戌次長垣縣宴從臣父老于行宫乙亥次陳橋驛後苑兵匠凌訓獻七寶減輕逍遙輦式上曰前詔乘輿服御悉從儉約訓輒敢違詔可特免罪毁其式丙子發陳橋驛次含芳園時近輔淮甸京東河朔之民自泰山迎候車駕奔走以望天顔者道路不絶詔增天書仗衛六百人其後遂以一千六百人為定制加號河瀆曰顯聖靈源公遣右諌議大夫薛映往河中府比部員外郎丁顧言往澶州祭告又命映祭謝汾隂后土詔天書儀衛使副扶侍使都監夾侍等自今著令凡遇大禮即與五使並命從丁謂之請也丁丑車駕至自泰山扶侍使丁謂奉天書歸大內上御乾元樓召近臣觀衛士甲馬還營賜百官休假三日中書樞密院一日上之巡祭也往還四十七日未嘗遇雨雪嚴冬之候景氣恬和祥應紛委咸以為精誠昭格天意助順之致也壬午契丹使左武衛上將軍蕭永啓聖節度使耶律留寧副使左驍衛大將軍董繼澄衛尉少卿楊又元來賀承天節詔以正月三日天書降日為天慶節休假五日京師於上清宫建道場七日宰相迭宿罷日文武官內職皆集賜㑹錫慶院是夕京師張燈五日內無得用刑仍禁屠宰諸州建道場三日羣臣亦賜㑹丁謂請以天書降後祥瑞編次撰贊繪畫于昭應宫詔謂與龍圗閣待制戚綸陳彭年同編次其贊令中書門下樞密兩制尚書丞郎給諫待制館閣官分撰癸未上謂王旦等曰近覽邊奏皆言今嵗物價甚賤芻藁三錢易兩圍麥粟斛百餘錢此民間儲蓄之時嵗有豐約固亦常理古之善教不若備預也况北戎願保歡好頗見其情但固守封疆足以安吾生聚或言敵多狡詐急當為寇此非逺識也旦曰國家納契丹和好已來河朔生靈方獲安堵雖每嵗贈遺較於用兵之費不及百分之一昨陛下登封告成天地助順蓋人事和而天象應也詔并代州别賜酺三日時承受使臣言前設酺宴不豐軍校皆不預㑹也甲申命宰相王旦攝太尉奉上太祖太宗諡冊知樞密院事王欽若參知政事馮拯攝中書令讀冊文禮畢親享六室先是詔有司參詳百官拜表進名儀式且言慶成喬嶽歸美祖宗雖繫孝思實為古禮比之初上廟號理有不同按唐朝修八陵及遷懿獻二祖禮畢並皆稱賀欲望其日許百官詣閣門拜表賀從之乙酉大宴含光殿勞旋也丙戌詔自今祭告天地社稷宗廟嶽瀆其后土亦致祭著于令十二月丁亥朔封皇第八妹萬夀長公主為隋國長公主出降右龍武將軍駙馬都尉李遵朂遵朂繼昌子也初止名朂上益以遵字而升為崇矩子焉遣中使分往緣邊諸路賜部署鈐轄等羊酒令宴官吏將校詔泰山路以廨舍倉驛為行宫並依舊其奉安天書位謹護之詔東封所過諸州本城軍校邀車駕訴年深未遷者特與改轉令內外諸軍勿得科率部下盛為軍裝初興元府寧朔戍將課軍中服錦繡以壯戎容士伍廩給不充其費因相與亡命為盜上知之故有是誡庚寅知樞密院事王欽若等言皇帝受冊尊號百辟就列稱慶臣等與諸司使副於殿上侍立欲俟上寶冊畢太尉歸位臣等於殿上率侍立羣臣致詞稱賀從之辛卯御朝元殿受冊尊號壬辰謁啓聖院太宗神御殿命丁謂李宗諤戚綸陳彭年等編修封禪記從彭年之請也乙未契丹使蕭永等辭歸國故事契丹使辭當賜宴不視事上以纍屬休假慮機務有壅遣中使諭中書樞密院許先奏事詔瀘州南井煎鹽竈户自今遇正至寒食各給假三日所收日額仍除之有司言祭不欲數請罷太廟臘享其皇后廟及元德皇太后廟如故從之丁酉內出泰山封祀上尊酒及玉女白龍王母池水新醴泉賜輔臣詔東京留守司及在京掌事內臣不該賜物者特給之補延州小胡族朗阿為侍禁賜名忠順是族在州之西北連慶州蕃境鈐轄司言王師每出藉其鄉導故奬之己亥朝拜普安禪院元德皇太后聖容庚子以回鶻伊嚕格勒為特進忠順保德可汗王其母為賢明巴烏公主進奉使悉授官賜袍笏伊嚕格勒常言本道捍禦趙德明乞朝廷發兵署孔目官一名至本道詔諭以德明順命且慮官吏至彼騷擾第遣使偕往辛丑工部尚書平章事王旦為中書侍郎兼刑部尚書平章事楚王元佐為太傅左衛上將軍依前養疾寧王元偓為護國鎮國節度使舒王元稱為平江鎮江節度使並兼侍中廣平郡王元儼為昭武安德節度使進封榮王是日上謂王旦等曰先帝每命宰臣親王降制則不御崇德殿視朝應有故事其㫖以命宰相親賢示帝王不專耶此據㑹要當考癸卯知樞密院事王欽若參知政事馮拯知樞密院事陳堯叟參知政事趙安仁簽署樞密院事馬知節並進官一等太子太師萊國公吕䝉正進封徐國公羣臣並以次覃恩甲辰以宣政使恩州團練使李神福為宣慶使領昭州防禦使先是諸司使極于宣政上特建使額以奬神福焉詔提㸃刑獄朝臣使臣不限品秩及諸班諸軍都虞候並與一子恩詔應天下宫觀陵廟有名在地志功及生民者並加崇飾又詔江淮發運轉運司部內各留三年之儲以備水旱先是江淮米悉運送京師至是司天監言揚楚之分當水旱為沴防患故也丁未詔四瀆祝文自今並進署舊制常祀學士院惟五嶽進署四瀆則否故有是詔先是上謂王旦等曰皇親在環衛者甚衆冝第其久次者俾領郡於是左監門衛大將軍德雍等八人各授刺史右領軍衛將軍允升等五人各遷秩德雍等在班十八年允升等在班七年德雍廷美第四子也己酉詔太常寺别製天書樂章俟親饗圜丘日以奉禋祀又詔取天書降及議封禪以來祥瑞尤異者别撰樂曲以備朝㑹宴饗於是太常寺請郊祀酌獻天書用瑞安曲天書升降用靈文曲又上朝饗用醴泉神芝慶雲靈鶴瑞木五曲請下兩制撰詞從之復州防禦使駙馬都尉柴宗慶遇恩自康州移復州不告謝為有司所舉以違制論當贖銅三十斤有詔末减罰兩月俸辰州大洞狤獠大都頭魏進武及洞主首領覃架圗等以方物來貢西凉府斯多特遣使來貢馬庚戌置京新城外八廂上以都門之外居民頗多舊例惟赤縣尉主其事至是特置廂吏命京府統之辛亥命户部尚書寇凖知天雄軍兼駐泊都部署契丹使嘗過大名謂凖曰相公望重何故不在中書凖曰主上以朝廷無事北門鎖鑰非凖不可爾壬子契丹使左武衛上將軍蕭知可興國節度使蕭留寧副使崇祿卿成永少府監徐備來賀明年正旦入內髙品王承勛等言訪聞賀正使一即國母之弟一即國母之親皆其所委信望比常使量增恩例上以禮數有定不許承勛文夀子也甲寅以南衙為錫慶院先是酺宴則集于尚書省或都亭驛誕節齊㑹則就相國寺上以佛舍中烹飪嬉笑有虧恭潔乃令內臣度館于顯敞者易之南衙即太宗尹京時府邸秦王許王繼居焉厥後虛其正位故以為院詔緣邉并連接溪洞州軍其間通判職位髙於知州者並勘㑹移易詔進奏院不得非時供報朝廷事冝令進奏官五人為保犯者科違制之罪此據㑹要不得其月是嵗天下户七百九十萬八千五百五十五口一千七百八十萬三千四百一契丹主追尊按巴堅廟曰太祖德光曰太宗璟曰世宗鄂約明曰穆宗舒嚕賢曰景宗明記又贈東丹人皇倍為護國皇帝自在太子阮為恭順皇帝
