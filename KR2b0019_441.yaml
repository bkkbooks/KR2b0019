body:
  text: 續資治通鑑長編卷四百三十七宋李燾撰哲宗元祐五年春正月丁卯朔御大慶殿視朝劉摯云仁宗即位之五年行冬㑹神宗即位之五年行元㑹今稽據之澶州觀察使贈開府儀同三司追封崇國公克懼卒庚午詔温明州嵗造船以六百隻為額淮南兩浙各三百隻從戸部裁省浮費所之請也丙子御史中丞梁燾言臣近論奏乞罷裁減浮費所官局葢以為此特戸部一事不當置局别領徒成僥倖無益政體朝廷雖有指揮遣放官吏風聞本局嵗前尚有取索乃是宋肇違詔慢令為遷延之計其終必再有干求隂遂所欲訪聞肇之人品刻薄猥下專以䛕從諂附為事前日差遣全由請託既急於進取又昧於大體凡所裁抑不究本末但以多目為數意在冐竊恩典殊失捄弊之意滋為行事之害至於細碎煩猥搢紳傳以為笑上玷公朝臣實深惜伏望聖慈明察特賜指揮送吏部與合入差遣除已支賜外更不推恩少為黠吏妄作之誡貼黄其裁減之意本為去浮冗之費抑僥倖之軰今来不可却資置局官吏貪冐之私朝廷既有支賜無名更與推恩如有夤縁陳乞伏望一切寢罷或已施行並乞追改庻全公道不招物議燾集自注云正月十日今從之丁丑荆湖南路安撫使謝麟言邵州關峽城歩真良等處團峒元謀作過酋首楊晟進等四十三人投降詔等第補授奉職至軍將充江浙僻郡指使土軍將校隨處羈管戸部言江湖監未有徃外州縣般監管押法乞衡州茶陵安仁縣徃潭州衡山縣般運並依監令郡官管押交割出賣從之新舊録同存此可見江湖賣鹽如故當考己卯媫妤林氏薨贈貴儀二子俱偲庚辰幸凝祥池中太一宫集禧觀大相國寺御宣徳門召從臣觀燈甲申戸部看詳浮費裁省事乞宗室緦麻親再娶身分合得財費房卧錢三分支一袒免親不支宗女係緦麻袒免親出適日依治平故事如臣庻之家止行聘禮增賜舊支房卧等錢其例物進財並罷從之舊録云改宗室嫁娶法非先帝制也新録削去政目裁省浮費所申宗室娶妻財費緦麻二千二百五十千袒免二百五十千再娶緦麻七分袒免全支今後緦麻三支一袒免不支嫁女罷賜婿家錢御史中丞梁燾言尚書左選有本等人不就知州通判知縣貟闕數多雖許權宜發遣湏候過滿起請致常有積壓乞許以次等人指射差注詔吏部相度以聞詔應訴訟事屬樞宻院者經樞宻院從陳師錫請也師錫時任何官職本傳亦不詳當考乙酉范祖禹言臣聞報國之忠莫如薦賢負國之罪莫如蔽賢昔臧文仲知柳下惠之賢而不舉孔子以為竊位又以為不仁臣蒙陛下累加㧞擢寘之諫省又遷門下兼職經筵於今累年受恩深厚無禆毫髮常思竭盡愚慮無有所隱庻幾以此少酬萬一竊慕古人報國以薦賢為忠實懼有臧文仲竊位不仁之罪臣今有劄子四道並乞留中若陛下以臣言薄有可采乞出自聖意處分則臣之幸如以臣言為不然臣不敢避妄言之誅惟陛下裁赦其一曰臣伏見經筵闕官宜得老成之人以重其選韓維素有鯁直之稱先帝以維東宫之臣眷遇甚厚維與王安石不合以此齟齬不致大用未嘗少屈於安石之黨天下皆以為賢陛下用為門下侍郎中外皆謂得人維於政事雖有執滯不通然其人風節素髙疾惡如讐姦邪畏之前年罷免不聞顯過今乆領宫觀乃與章惇為一例甚非宜也先帝東宫之臣惟孫固與維二人見存陛下所宜加禮若召維以經筵之職不惟學識論議足以開益聰明維有人望物論必大以為愜臣竊恐執政以維觸忤陛下故不敢言夫君之於臣如父之於子有過則譴而逐之怒既息則召而使之豈有終怒而不解也陛下嗣位以来言事之臣亦嘗以所言過當上忤陛下或罷其職或出之外任已而皆復召還擢用是以天下皆知陛下聖意至公不以喜怒進退羣臣昔仁宗平生不怒惟是唐介彈文彦博其日仁宗極怒貶介春州别駕㝷復悔之改介英州未乆復召為御史因此重介剛直驟㧞擢至兩制天下皆知仁宗不徇喜怒最為盛徳陛下若出聖意復召韓維天下必皆伏陛下之至公此深為聖徳之美其二曰臣伏聞翰林學士承㫖蘇頌近乞致仕陛下已降詔不允臣竊謂頌博聞強識白首好學至於詳練國朝典故尤非諸臣所及熈寜中王安石用選人李定為御史頌知制誥封還詞頭再三不肯草制坐落職歸班二年方除一郡其後又為姦臣所惡追攝對獄卒無一事恐其進用排斥在外然先帝素重其博洽召令修書眷遇保全以至今日更厯夷險操守不變方今朝臣資望履厯未有先於頌者頌年七十有一精力不減少壯之人陛下左右宜得殫見洽聞之士以􅊀顧問臣竊慮頌别有陳請伏望聖慈且留之經筵其三曰臣伏見知杭州蘇軾文章為時所宗名重海内陛下所自㧞擢不待臣言而可知臣竊觀軾忠義許國遇事敢言一心不回無所顧望然其立朝多得謗毁葢以剛正嫉惡力排姦邪為王安石呂惠卿之黨所憎騰口於臺諫之門未必非此軰也陛下舉直錯枉别白邪正以致今日之治如軾者豈宜使之乆去朝廷况軾在經筵進讀最為有補臣愚伏望聖慈早賜召還今尚書闕官陛下如欲用軾何所不可朝廷選授常患乏才每一官闕乆之不補今有一蘇軾而不能用不知更求何者為才也臣竊為陛下惜之其四曰臣伏見刑部侍郎趙君錫孝行書於英宗皇帝實録昔周宣王欲得國子之能導訓諸侯者樊穆仲稱魯侯孝宣王乃命之大雅宣王之詩曰侯誰在矣張仲孝友言宣王使文武之臣征伐與孝友之臣處内古之選臣先取其孝者人倫之冠百行之首也人君與孝友之人處則徳性粹羙而風俗淳厚是以輔導人君者宜莫如孝也君錫之孝士大夫所共知為人温良恭敬動有䂓矩給事中鄭穆館閣耆儒操守純正中書舍人鄭雍謹靜端潔言行不妄穆雍乆在王府清謹無過此三人者皆宜置左右備講讀之職如經筵闕官伏望聖慈於此選擇丁亥詔徐王壻供奉官石激參班日免試并短使今後親王壻凖此新無御史中丞梁燾言臣竊以朝廷治河之意本為愛全生靈故不吝國力爲之東流北流葢其利害相易本無一偏之私今東流未成邊北之州縣未至受患其役可緩也北流方悍邊西之州縣日夕可憂其備宜急也緩者猶可以嵗月待急者不可以一日弛也今傾半天下之力專事東流而不加一夫一草於北流之上大可憂也臣竊恐此事陛下猶未知之陛下一以生靈為念豈爲西北之重輕耶但以河事為計豈問人謀之同異耶宗何將命之臣謹忽不同如此得不誤國計乎去年屢決之害全由隄防無備水官不職此可痛治仰惟陛下至仁使能期贖以今嵗之有功也臣愚欲乞聖慈特賜指揮嚴責水官修治北流埽岸不得更致踈虞其人兵物料非受朝㫖並不得那移應副庻使二方之民均被惻隱之恩貼黄伏乞聖慈詳酌差李偉兼管勾北流埽岸庻使小人任責不敢作姦敗事仍令都水監常切提舉燾自注云正月元祐宻疏有全奏末稱正月二十一日今從之戊子録石介子師中為郊社齋郎從知樞宻院事孫固門下侍郎劉摯尚書左丞韓忠彦之請也三人請在四年十二月十九日詔京西路提刑司撥十二萬貫坊場名額付轉運司不用出賣條約從本司隨宜經畫資助嵗用舊録云先是坊場舊以酬衙前折其重難而酬不如所費熈寜裁節衙前所費官酬其直以坊塲官自出賣收其贏入常平以録役人及助歛散公私皆便自元祐初廼以𨽻提刑司至是又有是詔新錄辨曰出賣坊場之法元不曾改變乃因新𨽻而强為浮辭自先是以下七十二字合删去己丑戸部言諸路起發正綱及附撘官錢到京例皆少欠元豐公式令諸州解發金銀錢帛通判㕔置簿毎半年具解發物數及管押附載人姓名實封中省元祐𠡠誤有删去合重修立從之三省吏任永夀等以吏額禄文字了當推恩此據劉安世章附三月末政目二月二日三月二十六日可考初文彦博起為太師平章軍國重事是年九月劉摯王巖叟再上疏論韓琦定策功明年二月韓忠彦復上疏既批出付外踰三年莫有言者及賈易為殿中侍御史乃上疏曰臣聞聖主記人之功而不忘故忠臣勸而天下安是以賞一人而天下趨之者誠以不僭不濫而得之至當也則有紀於太常藏諸盟府燦然與日月齊光而傳之不朽又况有能為誕謾以誣亡歿而盗其勲業者哉恭惟仁宗皇帝聖徳居位躋世隆平享年長乆而繼嗣未立英宗皇帝厯數在躬龍潛藩邸天下歸仁而位號未正韓琦忠義動金石精誠貫白日建言定䇿為宗廟萬世之福人神之所慶祐逺近率皆恱服故其生則位極台鼎死則配享廟廷神宗皇帝紹休聖緒緝熈帝業知琦有大勲勞於天下故尊寵異數褒嘉盡禮始終一意恩榮絶等猶以為未也又親撰其神道碑以兩朝定䇿元勲為之名昭示天下後世不刋之烈雖山河之誓無以加此世世忠臣義士孰不激揚而歎服不幸十數年之後有國子博士王同老上䟽自言其父堯臣在仁宗朝嘗任參知政事於至和三年仁宗不豫罷朝七十餘日内外寒心堯臣與宰臣文彦博富弼數陳宗社大計求立英宗皇帝為嗣又率同列各求罷免必兾開納仁宗感悟許之彦博令堯臣草制定立英宗為嗣既而仁宗漸安事遂少緩其後韓琦卒因堯臣文彦博冨弼論議緒餘决定大議又自言罷任趙州過北都彦博道及此事且曰彦博與先君及冨弼皆當日協心論議之人難於自發明故同老又言今惟文彦博冨弼同知此事本末所有先臣親筆撰立英宗皇帝為嗣制草及劄子草本共三道謹緝綴封進於是神宗皇帝因文彦博入對詔問其事令作文字進呈彦博劄子言至和三年正月六日仁宗服藥罷朝兩月餘至四月初仁宗聖體康寜堯臣乃與臣及劉沆冨弼竊議曰朝廷根本不可不早定臣以堯臣乆居禁近因謂之曰必得賢嗣以壓人心堯臣曰豈不知素育於宫中者堯臣以指書案作下貫字臣等各言無易此矣至上前伏奏得請此大事不可如常例退殿廬令堂吏書聖㫖劉沆云沆欲袖紙筆於上前親書翌日於垂拱殿臣等四人具奏春中服藥内外人情非常憂恐葢謂儲副未立仍引西漢故事人主初即位即建儲今當以時立嗣以固根本仁宗淵黙寡言欣然嘉奬曰知卿等盡忠然此大事朕更熟思之臣等再三論奏乃曰知子莫如父嘗選賢者育於宫中計無易此仁宗雖淵黙而首肯之是日晚臣等再聚議謂翌日必得㫖請堯臣宻作詔意欲進呈施行堯臣歸草詔意然未及示臣等既登對復申前請堯臣越次而奏曰願陛下早定此意付外施行仁宗曰朕意已定矣卿等無憂臣等既得此意㫖謂無疑矣是年八月乞召韓琦充樞宻使葢以琦忠義必能當此重事仁宗可之自後繼有議論未幾臣得請判河南府堯臣尋卒竊尋同老之言謂仁宗不豫七十餘日内外寒心堯臣與文彦博富弼求立英宗皇帝為嗣又率同列求罷免仁宗感悟許之彦博令堯臣草制定立英宗為嗣而仁宗漸安遂少緩彦博則言仁宗服藥罷朝兩月餘至四月初聖體康寜堯臣乃與臣及劉沆富弼竊議朝廷根本不可不早定因問堯臣又得賢嗣之言堯臣以指書案作英宗藩邸舊名翌日臣等具奏以時立嗣仁宗欣然嘉奬臣等再三論奏嘗選賢者育於宫中計無易此仁宗首肯之退令堯臣宻作詔意翌日復申前請仁宗曰朕意已定矣卿等無憂是說與同老之言前後牴牾自相矛楯灼然易見兼詳彦博所陳則仁宗未嘗拒而不納何因堯臣率同列求罷免以必兾開納此固不可信者一也又所草詔意將有待於得請而進呈以行也彦博言仁宗云朕意已定矣同老亦云仁宗感悟許之則彦博堯臣等何為不奏知己草詔意乞遂行之此固不可信者二也且建請立宗室為皇嗣天下之事無大於此者其危疑機㑹間不容髪肯容大臣方共謀議已竊草詔命而藏之私家殆如兒戲此固不可信者三也又四月建請而仁宗言朕意已定彦博所言臣等得此意㫖謂無疑矣何至八月乞召韓琦為樞宻使欲當重事而繼有議論直至彦博補外堯臣身死而竟無定議則所謂仁宗欣然嘉奬朕意已定者皆為何事耶此固不可信者四也同老又言道過北都彦博語及堯臣忠義乃言與富弼皆當日協心論議之人難於自發明推迹此言恐渉相期附㑹之意此固不可信者五也又富弼於治平中辭免進官表云竊聞制詞叙述陛下即位時以臣在憂服無可稱道乃取嘉祐中臣在中書日嘗議建儲以此為效而推今日之恩嘉祐中臣雖曾泛議建儲之事仁宗尚祕其請於陛下則如茫昧杳冥之中未見形象安得如韓琦等後来功效之深切著明也如弼此言則何有至和三年與堯臣彦博堅請立英宗皇帝為嗣之事此固不可信者六也又韓琦初作宰相日有劄子言近嵗以来内外忠孝之臣皆以陛下臨御四海三十餘年而皇嗣未育天下無所繫心乞於宗室中擇㓜而可教者權以為嗣臣愚竊怪陛下何疑而不行之然兹事至大當獨斷於聖心如陛下素有所属已得其人則望宣示中書樞宻院使奉而行之以慰中外之望觀琦此奏方以擇宗室為嗣且言如已得其人望宣示而行之則至和中决無定議明矣同老乃以琦謙挹不自有其功謂聖意先定遂取以為其父之功何其不仁之甚狂妄之極耶又李清臣狀琦之行曰仁宗春秋髙繼嗣未立天下以為憂雖或有言者而大臣莫敢為議首公數乗間乞選立皇子他日復進曰惟萬世之業不可不慮臣備位冢宰思所以報陛下為無窮計宜莫先此上顧曰後宫一二欲就館卿其無亟後誕育皆皇女公一日挾孔光傳進對曰漢成帝立二十五年無繼嗣立弟子定陶王為皇太子成帝中材常主猶能之以陛下之聖何難乎此哉太祖為天下長慮福流至今况宗子入繼則陛下真有子矣惟陛下以太祖之心為心則無不可矣仁宗感悟始以英宗判宗正寺英宗力辭公復啓曰陛下属之以大任而不肯當葢其沉逺詳重識慮有以過人非有他也且名未正尚得以辭名體一定父子之分明則浮議亦不復得揺矣仁宗欣納曰如此則宜乗明堂大禮前亟立為皇子又召學士為詔書學士亦請對然後進藁由此觀之堯臣輙草詔意藏之私家以天下大事為兒戲然豈亦嘗竊議而妄作之終不敢建言而死故其遺藁雖在亦何足為功但足彰其愚妄之罪爾用此欲以揜琦之大勲天下之人固未有信之者况天地鬼神臨之在上豈可欺耶加以神考聖作之碑最著於天下其略曰仁宗在位四十二年皇嗣未立天下共以為憂大臣顧避莫敢為上言公乗間進曰皇嗣者天下安危之所繫自昔禍亂之起由䇿不早定也他日又言漢成帝在位二十五年無子立弟之子定陶王為子陛下聰明睿智奈何乆不决也始以英宗判宗正寺英宗懇辭不就命仁宗以問公公曰名分之未定去就之所難也臣竊憂之帝悟遂立為皇子由此論之謂因堯臣論議緒餘决定大議者妄也又太常謚議謂琦素藴忠義尊立明聖固天下之本延生民之命顧大臣所不敢議而身先之彦博自為祭琦之文亦曰正朝廷於指顧定社禝於須㬰然則琦之殊勲偉烈雖平勃霍光不足比倫而堯臣碌碌備位之人曾何足算顧足預於此乎若夫包拯范鎮司馬光呂誨王陶則皆能抗論激切以天下為憂包拯則曰方今大務惟根本一事根本若固則枝葉之患何恤吕誨則曰周爰忠讜審擇宮邸以親以賢稽合天意范鎮則曰太祖捨其子而立太宗陛下宜擇宗室賢者以繫天下人心司馬光則曰為人後者為之子也漢成帝即位二十五年年四十五以未有繼嗣立弟之子定陶王欣為太子今陛下即位之年及春秋皆已過之豈可不為宗廟社禝深慮哉况今亦未使之正東宫之名但願陛下自擇宗室仁孝聰明者養以為子使天下皆知陛下意有所属以係逺近之心王陶則曰去嵗陛下發徳音稽故事擇宗室使知宗正寺厥後成命稍稽四方觀聼豈免憂疑是數人者則皆憂國忘身攄意敢言之人其言則著聞於世非如同老所訟堯臣私竊計議而未嘗敢發之事妄欲希覬恩賞而欺誣白日者也臣昔在踈逺傳聞同老之䟽與朝廷褒稱之詔以為堯臣真有援立之功而韓琦定策乃為緒餘之論臣於是時竊懐憤懣深歎真主在上而小人詐險得行自傷其身卑賤無路叩閽隳裂肝膽以明大義因往来四方捜採公忠信實之言以質其真偽前後所得詔勅碑誌表狀書䟽傳記諡議祭文等凡二十餘篇參考本末可謂詳矣今備數言路稔聞史臣論撰先帝實録未能决議者在此一事夫信史之作垂訓萬世茍史臣顧避不敢建明是非而並載方册傳疑於後恐不足為一代之典其體不輕臣是以敢觸冐仇怨援據實理陳天下之公言非特發韓琦千載之忠實憤懣誠欲敬述仁宗與子之盛徳英皇丕承之休烈神考追述之善志聖謀如皦日麗天後世無敢竊議而獻疑者臣雖隕身死無所恨伏望聖慈深賜省覽推春秋善善之法明詔史臣直筆無隱以伸正論天下幸甚貼黄稱同老碌碌庸人見利㤀義固不足責所可惜者韓琦於仁宗皇帝有君臣千載之遇故以身任天下獨建大議援立聖明以安社稷垂福無疆聲名事業近古未有一旦無根横議攘而取之虧忠義之實悖亷遜之風所損豈小哉且君子生則不可奪志死則不可奪名臣竊傷一代名臣其志與名皆遭掩蔽是以剖心析肝終究其說使賢徳晦而復明公議缺而復著誠有補於仁聖之治伏乞哀憐幸察又稱議者謂韓忠彦方在政府而臣論辯其父勲勞恐招附㑹之言無乃避其形跡為是乎臣則以謂不然葢天下公義為之標的若謂忠彦形跡可避孰與文彦博位勢極人臣之貴乎夫天下以為忠義之事人有盗而揜之者忠義之人所當痛心疾首如救焚溺惟恐白之不早使規規小嫌是畏而為自全之計是公朝無敢言之士也恭惟太皇太后仁聖聰明如韓琦定策大事必聞知最詳伏望濬發徳音宣示史臣俾直筆傳信為萬世法豈不盡善盡美哉臣不勝昧死祈天之至又稱范鎮凡十餘疏皆在至和三年五月已後呂誨司馬光之言皆在嘉祐六年王陶之言又最近後果如王同老所陳已有定議則此數人何為激切開陳如此之至耶尤足驗其狂妄不實陛下纂承大寳實自太皇太后推明先帝與子之意而蔡確軰尚敢希冀盗取定策之名葢其竊迹有自来矣不可不察也國史今已垂成若不早賜降出臣此䟽使之决疑傳信則恐他時不免追改其事不細所宜深慮庚寅太皇太后以易䟽示三省宣諭曰韓琦定䇿功甚詳悉在仁宗朝無敢言此事者惟韓琦一人言之忠彦即稱謝簾前劉摯因請檢元祐初摯與王巖叟二䟽悉付實録院從之或曰易等為此葢傅㑹忠彦攻彦博也彦博由是不安於位尋罷去云舊録云先帝明彦博等功而琦功葢不廢至書其碑額曰兩朝定䇿元勲易詆先帝之詔欲傅㑹忠彦也蘇轍龍川别志云嘉祐二年仁宗始不豫皇嗣未建宰相文富韓三公方議所立參知政事王公堯臣之弟正臣嘗為宗室說書官知十三使之賢即言之諸公諸公亦舊知之乃定議草奏書即欲立之而上疾有瘳即止堯臣私收奏本後韓公當國羣臣相繼乞選立宗子乃定立十三使為皇子及仁宗晏駕皇子踐阼賞定䇿之功以韓公為首及元豐末堯臣子同老上書繳進元奏時諸公惟富文在富公歸老於洛㑹文公入助郊饗神宗訪之公具奏所以神宗恱焉故一時諸公皆被賞而韓氏子惡分其功辯之不已文公之罷平章軍國重事由此故也然英宗之譽布於諸公則始於堯臣而其為皇子嗣寳位則韓公之力不可誣也按仁宗始不豫乃至和三年尋改嘉祐元年轍稱二年誤也又此時韓琦在相州轍稱宰相亦誤也文彦博私記云初先帝既下褒顯之詔有云乃知援立之功厥有攸在嘉祐之詔但宣之耳又宰相王珪贈彦博詩有功業逈髙嘉祐末之句實叙上語韓氏子孫故吏始大切齒後忠彦自髙陽入為給事中數進見陳其父勲又言其初不知有至和之議殆同老軰造為之耳據同老奏狀叙琦之言則前議固已知之帝嘗謂丙吉霍光之事前後兩不相揜而堯臣手蹟在前不容有偽忠彦訴不已先帝察其意大望不過自欲求進非為父勲之不明也遂自給事中超拜禮部尚書王珪以謂遷之太峻前無此例蔡確獨左右之帝曰此特以其父故不可為例也故訓辭専以父勲為言方且覬大用矣明年先帝登遐而元祐初劉摯王巖叟皆在言路皆琦之門人故吏琦治平中薦摯館職又忠彦常舉摯自代巖叟久從琦辟在幕府父子皆出琦門忠彦與其子治又使巖叟與摯累疏申琦定策之勲力詆同老之妄乞付史官備書其事屈公論以報私恩結朋黨以欺聖聽其跡如此未幾忠彦遷職出帥㝎武内懐怏怏將行復上書自列歳餘召還止縁勲閥以致大用御史賈易復承望忠彦風㫖附㑹摯與巖叟之論更唱迭和以是為非詆欺先帝之聖詔蔽惑二聖之聪明葢韓氏門人孫賁孫賁黄州人字公素喻風㫖於易并録忠彦摯巖叟之䟽與之使言仍同草疏故易所叙與忠彦之奏一一符同韓琦書䟽詔諭獨藏琦家又王同老文彦博奏狀等盡在史院并至和議論迨今三十餘年他人無得知之而易何從而盡得之乃賁録於韓氏而與之耳此宰執而下中外士人所共知也特以朋黨方盛莫敢言者易䟽言六不可信摯與巖叟之論大抵以同老所進詔草為不實文彦博附㑹同老以揜琦之功烈也至易疏出外忠彦遂自陳稱謝於簾前又摯奏請檢出元祐摯與巖叟二䟽盡付實録令書其事相為表𠂻欺罔之跡如此易言久在江湖間熟聞其事毎懐忠憤今始得言之且易前為諫官歳餘既詳知之自可言矣豈可直至再為御史忠彦執政方遂論列則朋附之跡自明言在江湖間聞其事者乃欲避孫賁陰受風㫖之跡又言今忠彦方執政而臣論其父勲涉於附㑹之謗孰若文彦博爵位極人臣之貴乎使琦勲烈得明雖死無所恨何嫌疑之足避易為此言巧欲葢其附㑹而姦狀愈明其無所忌憚罔上如此且琦之勲烈英祖神宗褒大顯著炳然共明未嘗掩蔽固無待易等言之則獨出於附㑹執政非為琦發也若使韓氏子孫零落不振朝廷不録其勲則易為之言可矣今韓氏果如何哉為琦門人故吏者當以義報知已為子孫者當簾先父之羙可交利冒進誣詆宗廟上欺二聖而自謂論報舊恩發揚先徳乎使琦有知當媿地下故先帝嘗謂如此恐非韓琦之意也易又引蔡確自稱社稷之臣盗定策之名以謂其竊迹有自而來葢由彦博等竊琦之勲故其流及此易之此論尤為可駭則是彦博之罪大於確矣且彦博未嘗自言此事以為已功也先帝亦未嘗掩琦之勲嘗曰正如丙吉霍光各不相揜至和嘉祐之事前後相成無相奪也葢先帝不獨賞彦博等能建議定策之為難而特以有功不言之為難故聖意具載於詩詔中以為希世之髙行也易乃引確之事以為罪首其説尤為險怪葢欲巧發以中上意而入其姦言耳縁中丞梁燾琦舉館職諫議大夫劉安世父子皆琦與忠彦幕客合為一黨牢不可破上下相應邪説得行無敢辯者賁既通道而巖叟出力助之又方御史闕員論者謂易為此冀得其處䟽方出盛傳易旦夕必有除命不意江東部吏知饒州鄱陽縣梅昌宗之子談以易在江東挾私怨捃拾其父罪方煆煉猶未竟談詣登聞訴其父寃且條上易姦私醜穢之狀十餘事乞辯正其跡甚明奏既付外而所附執政者出死力以左右之格談奏不下卒平其事言路無一人請治之者其交結姦罔如此縁忠彦既由舊勲内挾中宫之援外有間附之衆去年六月元祐四年六月七日遂致大用七月其弟復尚公主未幾諫官范祖禹吳安詩等言祖宗故事戚里宗室不許執政今忠彦弟既尚主宜如故事此本朝至公之大法也恐自此啓例壊法則宰執得以交通宫掖非朝廷之福聖意方許候進財畢而安世巖叟軰出力庇之至九月明堂畢范吳等再欲論列而忠彦陰與摯先是移罷此二人諫職其姦私如此既而忠彦終以親嫌故事不自安故又使賁等交通言者稱揚父勲為已之地以固權位易所以亟有此舉且言路乃二聖耳目之官而遂為執政鷹犬之用顯為大臣論列然則御史之設専為是乎彦博方任師傅易指為罔上冒賞之人朝廷既不白其是非又付之史官以為可信彦博前日不言今日不辯誠無所愧然而朋黨之論上詆祖宗之聖徳以制詔為不實謂先朝為過舉恐非聖時所宜有也又非所以彰二聖之聪明示天下以孝治兹事甚大誠係國體唐李徳裕貶制曰㳟惟元和實録不刋之書擅敢改張罔有畏忌奪他人之懿蹟為私門之令猷正如今日之事豈可使一代信史肆自改易使傳疑於後世兩朝聖作擅加詆議侮滅為不足慿以狥朋蔽之私而為交利之地乎况自古聖賢不以立君為功葢天命所在非由人力故介推有貪天之功以為已力之論仁宗盛年無子養英宗於禁中親付大噐大臣遭際此事奉行而已何名為定策乎雖使英廟未為儲嗣而值仁宗上僊中外屬望之久慈聖之意已定則知神噐固有歸矣恐不假琦之力也私記不知誰作稱去年六月忠彦遂致大用則作此時葢五年彦博罷平章軍國重事後也語多激訐必不出彦博之手葢其子孫或門生故吏軰為之耳先帝謂如此恐非韓琦之意當檢御史方闕員論者謂易奏此䟽冀得其處䟽方出盛傳易旦夕必有除命㑹梅談訟之案易除殿中侍御史乃四年五月二十八日其奏此䟽時任御史久矣稱易冀得御史誤又五年五月二十七日蘇轍除中丞易即請回避改度支郎官及禮部郎官又改國子司業旋出為淮東憲稱易旦夕必有除命若謂超遷它官則可若御史則易固在中也此言亦恐誤今不取梁燾行狀云御史賈易進呈劄子言嘉祐䇿立天下著聞功在韓琦他人豈得乗時妄意邀取宣讀次簾中感傷之燾曰琦不獨嘉祐之功又有治平預建大計之忠太皇必記其事太皇曰記得當時只說有韓琦一人仁祖見英宗便曾宣諭功在韓琦後來慈聖光獻太后亦對神宗備説本末子細燾對曰惟正人能成大功業燾與易葢共攻文彦博者今附見候考陳天倪作潁濱語録載蘇轍云仁廟至和末富公潞公王文忠公堯臣皆在朝一日仁廟服藥而皇嗣未立執政等憂之時王文忠公嘗與富公潞公等議請立英宗為皇嗣事未上而仁廟已勿藥遂絶口不敢道中外無有知者嘉祐間魏公作相英廟入為皇嗣及即位則首尾皆魏公了之至元豐初文忠公之子同老言於朝明其父至和之末與富潞二公嘗議請立皇嗣事議既定而未發今遺稿則存以二公為證時富公在南京潞公留守北都是年秋大享明堂神廟有詔令二公入陪祠事既畢令登對遂以同老事問潞公公具道其事問富公云不知神廟亦弗能强之也有詔令潞公留守西京加太尉寵遇甚厚而富公之意不欲於不分曉處受朝廷恩賞終不肯言亦退居洛不復與潞公相見時潞公作耆英㑹置酒於富公之第及㑹當富公但送羊酒而已葢鄙之也然援立之功歸之潞公則前日魏公一畨恩例亦當奪去時神考但兩平之因言王旦指及潞公晚節嘗為惜之曰血氣既衰戒之在得王同老事見元豐三年閏九月此時富弼致仕久矣弼致仕即居西京未嘗在南京是年明堂文彦博自北京入覲弼亦未嘗赴闕也陳天倪所録差誤又與龍川别志不合志不足據也姑存之御史中丞梁燾兼侍讀燾再辭免從之再辭免得請在二月十二日今并書燾嘗奏䟽曰臣聞自天子至於庶人皆以修身為本本亂而末治者未之有也故曰身修而家齊家齊而國治國治而天下平古之人君能行之者莫如帝堯書曰克明俊徳以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍克明俊徳者自明其徳修身之謂也九族既睦者家齊之謂也百姓昭明者國治之謂也協和萬邦黎民於變時雍者天下和平之謂也其始則正心誠意而不出方寸之間其終則徳業滂洋而徧滿天下是聖人之道所持者約而所致者廣也有天下者能知盡心致力於此而后可以奉天享國矣夫明徳者孰先而能焉必曰學而已矣禮曰大學之道在明明徳謂人君有清明之徳必由學以發之然後能光被四表格于上下以此知雖天子之尊而能成聖必由聖學乎說命曰王人求多聞時惟建事學于古訓乃有獲葢事不稽古從政則迷是君人者不可以無學也又曰惟學遜志務時敏厥修乃來允懐于兹道積于厥躬葢學之在身非一日而致由積善以成之是學之時不可失也恭惟皇帝陛下受天明命早有萬國日就月將學以成性此正其時願擇吉日詔開經筵優接勸講進讀之臣使從容熟復治亂之事究先王之藴辯厯代之蹟無惜聖問再三詢考使聖心曉然無疑日新一日可底大成願加聖意無忽臣又願陛下萬幾之暇留思經筵講讀臣僚所論之事以考政事之從違得失以禆皇帝陛下之聪明屏逺聲色造次不忘古訓博厚髙明與天地並徳臣不勝拳拳懇切之至又奏䟽太皇太后曰臣惟陛下以大公至正之心保䕶皇帝周宻嚴謹委曲纎悉起居寢食之間無不留神而注意如天地久於其道無一日之或怠也誠有大功於宗社有大徳於天下矣陛下鍾愛皇帝如此其至然特為愛之小者非所謂大愛也若教之以大愛者在成其聖徳爾成徳者其必由學也仰惟陛下之聪明非不知其大愛之以成徳而獨以為皇帝冲眇而未暇學乎今皇帝聖年十五齒亦已長矣自古人君十五而冠冠者謂有成人之道在庶人則為童子在天子則為成人何也謂王教之本不可以童子之道理焉故必責善而進之以成人是亦古之學者十五入大學之義謂七八之數陰陽備而志明可以學矣志已明則當識其至善而逺其所不善故孔子曰吾十有五而志於學皇帝清明在躬天禀英異以聖人志學之時稽焉則不可以不學也以天子成人之道望焉則不可以多暇也伏願陛下當天春布徳之元王正授政之始面勉皇帝早開經筵召見儒臣談經讀史從容賜對熟復古今宫中遴選茂俊之人以誘掖誦說審擇謹厚之人以輔視興寢服勤道義為聪明睿知之助踈逺紛華為康寜壽考之資習之既久乃如自然至於誠意喜書正心樂道終副海内聖神之望不貽宸衷逸豫之憂蒙成靜治為太平之眞主焉然則陛下他日退託深宫還辟自處則保䕶之慈有始有卒佑我大宋萬世無疆之休而功徳於此足矣誠清衷素所屬念者臣敢妄論以發之亦惟陛下亟行而無疑非獨臣之願乃天下之願非獨臣之幸乃天下之幸臣不勝惓惓盡節之至是月己丑二十三日命燾兼侍讀而燾卒不受命聴辭在二月十六日今并書之燾二䟽無日月䟽稱當天春布徳之元王正授政之始則當附正月因燾辭侍讀即見於此鄜延路經略使趙卨言累行指揮分畫地界官遵依朝㫖堅執商量如西人要依綏徳城體例修置堡舖未審許與不許本司方圓商議樞宻院同三省奏昨綏徳城分界日御前處分須打量足二十里如約不可令就地形任意出縮三二里地不計恩威輕重但朝廷所堅守不易者約故也其堡障宜自擇地修築後來已於二十里起立界堠即無十里外作兩不耕地十里内修建堡舖指揮今若指定十里内修築堡舖及分生熟地即不惟不依綏州體例兼於已牒過西界相照接連取直為界事理相戾又元約分畫疆界以二十里為定卓立封堠者為分别漢蕃界至界堠内地即漢人所守界堠外地即夏國自占其彼此修築堡舖各於界内取水泉地利為便豈可更展逺近所以前來綏州城外堡有十八里或只有八九里處夏國堡舖亦去所立封堠自便修築既各不侵出封堠之外即是並為本界不可别生事端害講和之意詔卨於二十里相照接連取直為界卓立封堠其堡舖或相度於界堠内三五里擇穏便有水泉去處占據地利修建即不得分立兩不耕地去年十二月末政目云宥牒去城十里作熟地外十里兩不耕作草地詔河東路經略使龍圖閣學士朝請大夫曾布特降一官管勾麟府軍馬趙宗本特追兩官勒停知麟州王景仁通判魏緡罰金有差並衝替同簽軍馬司事折克行贖金以本路將官宋整實病而攝入禁觸階而死故有是責中書舍人王巖叟言布任元帥所宜與諸將同安樂共患難者也失其歡心且不可况致之抱寃而死乎昨陛下以河東全道之師屬曾布使䕶諸將以當一靣所以寄託者重矣而布驕簡自居喜怒隨意蔽於䜛諂不究下情將官宋整實有病狀而不加恤偏信趙宗本挾怨之言按整以罪整以將兵為麟府私占申乞遣還乃是整能謹職事布復偏信宗本狥私之說判收不問整既下不得伸於本州上不得伸於本帥非辜係獄寃憤不勝遂觸階而死按整堂有母室有妻儻非甚寃寜肯輕死此陛下可察也將佐致此不知安用帥臣若不重行竄黜恐無以慰生者之恨平死者之寃今雖降官不害為帥陛下推此考布尚可以統御諸將當帥臣之寄乎伏望聖慈特令黜職降郡稍正典刑以示陛下重人命惜士心之意於四方臣不勝幸甚所有布降官告詞臣未敢行貼黄稱臣聞河東諸將自宋整以寃死無不歸罪於其帥日望朝廷為平其寃今不重黜布無以慰軍心激士氣惟陛下深察詔徙布知河陽曾布年譜五年三月以在太原日武人宋整有罪當逮自殺坐奪一官徙知河陽布責河陽舊録於此并書且云其後中書舍人王巖叟云云按巖叟不肯草詞盖即命下之日也今削去其後字仍附梁燾言政目月日差錯當考布日録紹聖三年五月戊申云云御史中丞梁燾言臣竊聞河東轉運司差官勘到將官宋整觸石身死事朝廷次第行遣誠有意懲惡惟曾布責輕未服公議衆謂孟州為大鎮附近京師學士清班侍從上列皆非罪人所當得之布徇私挾怒妄起大獄趙宗本王景仁刼於帥臣威令事非出已今宗本景仁已被重責而布獨僥倖優㳺如此是帥臣得以喜怒髙下其心壞亂國法輕殘人命茍為快意而無所忌惮非所以制罰之平而為天下之公也臣實為朝廷惜之欲乞聖慈詳酌特賜指揮削布近職與逺小一郡使之循省以示懲勸御史臺閤門言孝惠孝章淑徳章懷皇后忌辰於天興殿西掖庫屋設位行禮從之四后皆祖宗正后神宗升祔大廟而景靈未及享故也政目云四后忌辰移就景靈西掖太師平章軍國重事文彦博言太中大夫致仕程珦身亡一子頥素藴學行嘗為邇英講官今其父亡窘於襄事伏望特賜矜憫優其賻恤知河南府韓縝翰林學士承㫖蘇頌相繼有請詔賜絹二百匹下所屬葬日量行應副舊録珦傳云子顥頥行怪學僻為司馬光等所知新録削去改云二子皆為名儒詔品官及諸軍舊有銅及鍮石腰帶軍噐鞍轡并賜物古噐佛道像鐘磬婦人首飾之類許存留外餘並賣入官元年四月十八日朱光庭云云政目二十四日立銅鍮禁詔親王女郡主遇大禮許䕃親屬一人奏所生子與右班殿直兩遇奏子或孫與奉職即奏子孫若回授與外服親之夫及夫之有服有官者轉一官不得轉升朝官選一人循一資白身者期以下親與借職以徐王府長女京兆郡主申請故有是詔辛夘詔召募神綱官員到吏部日㑹所屬合與差遣方與差注以户部言大名冠氏尉趙峋押錢綱有欠乞追改已注官故也壬辰神宗第九女嘉國長公主薨甲午詔趙槩神道碑以忠純為額户部言前任利州路轉運判官韋驤奏元豐中梓州轉運司請止絶閬州棧門鹽井及創開井恐侵本路鹽課致本州虧减課額乞驗實如委鹹脉變淡許棧門及創開别井煎輸從之尚書省言諸路府界每上下半年奏到賊盗數刑部通前五年已未獲人比較增减多者劾之詔刑部自元祐四年下半年為首比較奏聞仍狀前列旁通圖給事中兼侍讀范祖禹言臣伏聞陛下已許文彦博求退降詔俟至中春議從所欲者彦博年八十五爵位已極惟是得觧重任歸休私第乃其幸也陛下憫其過老以其累請而從之為彦博身計私計則可謂羙矣若為朝廷計則臣請試言之彦博為相四十餘年厯事四朝仁宗時平貝州之亂名聞逺方英宗神宗時為樞宻相八九年先帝已加優禮許其致仕陛下嗣位復召而起之葢藉其威名宿望以為朝廷之重也京師及四方軍民久服彦博之名以為在朝廷必重向若陛下不復召之則亦已矣今既起之則不可使輕去朝廷彦博雖老精力尚强卧置京師足以為重外則西北二方必懐畏憚夫以四海之大若常無事則人人皆可為大臣矣豈無萬一非常之慮哉彦博在朝非謂日日有用葢備緩急或有時而用之耳當先帝之時足以容彦博閑退今二聖垂拱委政大臣尤宜得老成之人以服天下之心詩曰雖無老成人尚有典刑言老成之人重於國之典法也葢以其經厯既多但問以累朝之事所知尤勝他人况其别有所補哉今舊老惟彦博一人若去則其餘在朝者皆是後進無前輩矣老者任用之日不久國家所宜重惜臣自聞陛下許彦博之去朝夕思慮竊謂陛下若欲彦博更得優逸但聽其解軍國重事以太師就第留之京師以備訪問不必再除致仕朝廷有貴老尊賢之羙足以繫屬天下人心所得實多陛下進退元老臣不當預論議然臣職在侍從苟有益於國不敢不言惟陛下深留聖意更賜裁擇其劄子仍乞留中據范祖禹集自注劄子云五年正月上然所稱降詔俟中春從彦博之請却未見即政目云去年十二月二十二日文彦博乞致仕奉聖㫖中春施行也宥州牒除塞門屈曲分畫其餘比接諸城取直畫定其間地土雖甚闊逺亦割屬漢政目正月末事但板數差錯恐是三月末事今兩存之三月十八日可考
