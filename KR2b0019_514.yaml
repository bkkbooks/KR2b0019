body:
  text: 續資治通鑑長編巻五百十宋李燾撰哲宗元符二年五月癸夘朔降授朝請郎權刑部侍郎周之道朝散大夫刑部員外郎許介卿宣徳郎刑部員外郎錢蓋並降一官以參定前秦鳳路提㸃刑獄劉何辨雪制勘公事不當故也復命何提㸃永興軍等路刑獄曾布力爭之閏月辛巳乃罷劉何放罷秦鳳提刑在正月末復為永興軍提刑即五月一日十二日甲寅所録附此布録載何事甚詳悉附見閏九月十二日辛巳何與逺小知州當考章楶奏統兵赴鼐摩㑹進築布録癸夘四月二日楶奏當考甲辰朝奉大夫魯君貺為司農少卿通直郎王峴為軍器少監太常博士崇政殿説書周常為著作佐郎常言伏見厚裕以上諸陵寢中器物止以純銀鍍金而衣裳服用又無珠玉之飾蓋是先帝時常有訓誡務在質素惟裕陵洎宣仁聖烈皇后寢中所藏珠玉服用純金寳器尚多欲収其器服納諸景靈殿寢中以遵先帝遺誡詔令逐陵遣官管押赴奉宸庫送納降授禮賔使熈河蘭㑹路鈐轄李沂改秦鳳路熈河蘭㑹路經略使孫路言鈐轄王愍踏逐到㑹州西地名巴寧㑹地形髙爽土脉堅潤比之古㑹州尤更險要臣欲候齊訥納森等處城寨畢工躬親按視進築詔孫路審度以聞四月二十五日丁酉布録云云已附本日恐與此相重更詳考之殿前副都指揮使姚麟斷魏吉不當開封府得㫖放罪牒閤門責限謝恩曾布言開封府不應如是上然之詔開封府官吏放罪殿前司吏送大理寺取勘仍令三省立法章惇以為不可止放罪詔府官各罰銅二十斤吏送大理寺勘并詔自今命官合勘斷及放罪並依條奏審違者以違制論既而吕嘉問乞免放勘府吏各罰銅八斤殿前司吏經赦特决杖勒停降資衝替布録甲辰又己酉又甲子黄敏用乞移涇原帥府於鎮戎軍以平夏城為鎮戎軍上謂敏用越職衆言奏陳利害恐難坐罪遂不行布録甲辰敏用何官當檢入元符元年六月九日以同管勾成都府利州陜西等路茶事差按視涇原路進築城寨丙午淮南兩浙路察訪孫傑言昨奏前發運使吕溫卿興販簰板事江州稅務看騐得合税錢一百九十貫本簰勾當人吕文廣不伏送納本務監官承事郎張華民具申江東轉運使司稱顯是本人不顧公法欺壓州郡看詳華民廼監當小官正在部屬不畏權勢敢與抗辨以道守官誠未之見望賜奬擢以勸奉公守法之吏詔張華民特與減一任監當令赴部與親民差遣布録是日上詢李雲從者何人布云陛下必記憶吕嘉問知荆南夜留城門徃其家晏飲與其妾閒坐和詩及小詞上云不記莫是元祐事布云乃紹聖事嘉問在荆南買金虧價及他事甚多下湖北路監司體量皆有實狀惇卞此時方相得力主之安燾李清臣乞不原赦亦得㫖既體量到却送嘉問分析便以為無罪斷放當時若以體量狀按治嘉問已粉碎矣外議云皆嘉問合有今日官職故倖免上方云記得仍云李雲從上書極亂道適欲罷差遣以上書故未欲罷熈河蘭㑹路鈐轄折可適知西安州兼管勾沿邊安撫司其撫納降𦍑及招置弓箭手開墾田土應干邊防措置等事内有急切待報不及者聼一面從長相度施行於敕令有妨仍從經畧司奏請朝㫖從章楶所請也從楶所請據布録増入楶又乞與環慶蕃官慕化換漢官詔與凖備差使又乞修天都山廟詔封順應侯仍以順應為廟額丁未刑部言驅磨告發出失陷錢物合推賞者令上户部參驗如有請屬冒賞各杖一百賞錢五十貫文又乞立偽造文鈔及知情者流配告賞等條並從之舊本特詳今從新本戊申權户部尚書呉居厚言乞應官員外任請給並令隨處依條勘給從之鄜延路經畧使吕惠卿言凖朝㫖如収接表狀訖西人欲歸衙頭取禀亦聽從便契勘夏國𦍑威明濟賽等乞詣闕訃告兼令附謝表狀前去其威科卜等只齎公牒前來稱章表見在衙頭待回去聞之國主已令順寧寨將官作本處意度説與西人既章表見在衙頭回去説知國主差使副或使臣送來候得表狀奏取朝廷指揮詔吕惠卿依已降指揮施行二月十一日四月七日二十四日又五月六日詔秦鳳不合勾保甲防守權經畧孫賁罰銅三十斤鄜延奏進築金湯寨畢工賜銀合茶藥是日曾布既與章惇蔡卞等同進呈蹇序辰范鏜制獄再對又言惇卞各有所主卞主序辰惇主鏜此兩人皆惇卞未相失時共力薦引今惇惡序辰卞以鏜舉吕升卿自代疑附惇而異己遂惡之以此議論各有所偏不惟此兩人如周穜吕嘉問亦皆惇卞所主今既相失惇遂惡嘉問而卞惡穜此數人者亦誠各有所専附大約今日士人皆分𨽻惇卞門下如許將黄履既不能有所主亦不為人所趨故皆無門下士臣在西府亦無以威福人兼亦無所黨與故門下亦無人平時以公論稱薦趙挺之郭知章輩亦未嘗與之為黨挺之輩蓄縮避事亦嘗陳於陛下前無所隠只如挺之昨草吕孝亷京東轉運使詞得罪士論既自羞愧却乞外郡諒陛下亦不知其請郡為此其他奔競好進之士不趨惇則趨卞然惇性疎率多為卞所窺雖與卞相失然極畏卞此許將黄履及三省人吏所共嗤笑臣嘗問惇諸處闕官不除人惇曰才除一人又云是元祐黨或有何罪惡以此不能除得其意蓋指卞也卞答之曰元祐黨最分明者莫是劉昱以昱為惇所主故惇黙然惇用昱誠不當以至引蔡肇陳師錫皆卞所指以為元祐人此數人者誠不足引趙挺之云蔡肇譖鄒浩於蘇轍遂被逐師錫亦是軾轍門下儇薄多言之士惇嘗與臣言自來於陛下前不曾言元祐人不可用誠如此乃是公議人才難得豈有一經元祐任使之人便不可用然宰相當曠然以公議収采人才今乃獨偏於劉昱蔡肇輩宜其為卞所非也上曰劉昱並不曾行遣用蔡肇殊不當陳師錫乃先帝所黜亦不當用布曰惇如此所以畏卞然臣常謂大臣能以大公至正之道収用人材危言正色為朝廷分别是非邪正孰敢以為不然者今惇卞各有所偏故是非無以相勝惇初與卞同引序辰嘉問輩今雖悔之何所及如臣則不然自初秉政得事陛下左右便言惇引朱服蹇序辰為卞所誤至今五六年臣此論未嘗變以至與惇卞議事亦未嘗小為之屈臣嘗語人以為卞雖不樂臣然與臣共事必不敢與臣異蓋惟理可以服人也序辰鏜制獄具在六月二十二日癸巳庚戌詔提舉太清宫髙遵禮候再任滿日特更令再任知樞密院曽布言昨髙遵固年八十一乞再任宮觀特㫖從之今遵禮年七十六兼已再任於法皆不得又特從其請中外皆不詳知陛下待遇宣仁親屬敦篤如此當書之以付史官詔朝請大夫王瑛除提㸃江南西路刑獄指揮更不施行以起居郎權給事中孫傑言瑛頃為潤州守無治術徒飾厨傳曲奉吕温卿等故有是命初六日除詔鄜延路金湯新寨賜名金湯城二十八日庚午曽布云云可考朝奉郎韓跂為工部員外郎辛亥淮南兩浙察訪孫傑言被命按察兩浙路監司職事體訪得偏逺州縣多有提舉常平官不曽到處臣詳提舉司所總常平免役農田保甲等乃先朝復古之法所以為民之意至厚條令委曲纎悉在提舉官躬親講究開諭州縣以次推行始可布宣惠澤乞自今提舉官雖與監司互分廵歴並須本司官二年遍所部州縣權提舉永興軍等路常平呉黯言諸路奉差管勾官乞特依熈寧元豐互注法施行吏部勘當諸州管勾官除各依紹聖五年朝㫖占闕外復元豐管勾互注法請許就占闕中用元豐七年朝㫖占換選擇奏差從之權通判廣信軍周綍言沿邊兵器不修者萬數物料不計工力亦有所不逮攻守之器類用毛羽絲枲膠漆經暑則水氣蒸溽修之數少壞之數多詔定州真定府路安撫司指揮諸州軍今後常切㸃檢措置施行如更因循損壞帥臣以下並當重行黜責正月二十九日三月二十一日可考綍又言廣信城北鮑河夏秋山雨暴漲倒流入城渰浸草場漂蕩舍屋及堡寨又廣信安肅三州之兵乞與廵邊司兵滚同差使又河朔馬不足請就近地或府界或西市團綱分配邊城并隄道官八員無職事可領乞罷屯田判官願專置一員所在責逐縣令佐兼領田事詔馬事令太僕寺餘令逐路安撫總管司相度以聞上謂輔臣曰綍所陳頗有理可令召對曽布曰此乃京西轉運判官周純之弟其人材或過於純召對固宜也布因言人材難得顧所収采未廣耳臣嘗言章惇所引舉人多不當如李仲在元祐中希王巖叟風㫖便申乞廢清汴昨既罷提舉官却令開御河遂擢提刑御河為北京患人人知之今年春旱而北京水滿城郭居民倉庫皆被害而無敢言者韓忠彦深以為憂亦不敢言蔡卞亦知之此事恐未便上曰此不難只遣一内侍徃視之便可見布曰臣方欲開陳乞遣一中人徃視之即可知虛實上曰鄒浩亦有文字當令按視之按視竟何如當考鄒浩言臣伏聞北京城内自開貫御河以來民廬僧舍為水所浸見已不少若萬一河流漲溢即必為北京大患事理無疑兼聞本處大姓已有遷居縣鎮豫為避水之計者人心危慮不可不察欲乞下河北路安撫轉運等司疾速相度務令一方永逺無虞上副朝廷興利除害之意伏望聖慈詳酌特賜指揮施行又言臣近以北京城内御河浸漬為患乞賜指揮下河北路安撫轉運等司相度處置臣續訪聞得河北去年大水之時北京幾殆者數矣頼救䕶官司急將御河塞斷以故水不入城今來若只疏畎積水以紓目前之患不惟河髙城卑疏畎之後依舊浸漬其患猶在實恐將來秋水暴集因緣御河引注入城漲溢難防為患必大惟是回徙御河行於城外庶幾一方永無他虞兼聞北京城外舊有河道雖久堙廢自可興復以成御河之利但御河係李仲所開仲方為本路提刑故官吏無敢言者然而一方生靈之害豈可因人而忽之也况今廹近秋水漲溢之期尤不可緩伏望聖慈特降指揮令河北路不干礙官司疾速相度回徙御河自北京城外通行以絶後患癸丑權户部尚書呉居厚試吏部尚書實録無此居厚墓碑亦止云召為户侍明年進權户書滿二嵗為真加龍圖閣權知開封此吏書或當作户書更詳之六月十二日可考奉議郎守監察御史鄧棐為禮部員外郎棐先除殿中侍御史固辭之因改是命除殿中在匹月二十二日涇原奏知平夏城喬松等守城有功松遷三官第一等兩官第二等一官仍減二年磨勘第三等一官將士轉資支賜有差布録癸丑吕惠卿奏西人已諭以不敢収公牒令歸取章表於初三日歸西界訖布録癸丑此當考二月十一日四月七日二十四日五月六日𤼵運司言汴河并諸路鹽糧綱乞並依熈寧四年朝㫖依舊置鎻仗於梁上封鎻遍用省印如押綱使臣人員㸃檢得封印不全或被盗知覺察損動官物即畫時申隨處催綱廵鋪官限當日内同押綱人開封印檢視訖却用隨處官印訖抄上枚歴照驗從之新削安武軍留後提舉崇福宫吕真以本官致仕從其請也甲寅户部言蕃舶為風飄着沿海州界損敗及舶主不在官為拯救録物貨許其親屬召人保任認還及立防守盗縱詐冒斷罪法從之孫路奏已進築齊訥納森寨布録甲寅四月二十五日五月十五日六月八日河北路轉運副使王博聞改陜西路朝請郎呉安憲權河北路轉運副使乙卯朝請郎京西轉運判官曽孝廣入内東頭供奉官勾當内東門司劉友益以補治永裕陵畢工轉一官友益仍寄資四月五日又二十六日河東經略司言靖化堡瑪克宻族蕃官伊錫元是衙頭背嵬投漢累為鄉道致獲全勝近隨折可大討蕩奪渡過河率先立功乞給與驛劵詔伊錫轉三官仍特支驛劵伊錫先見三月十七日詔孫路經營㑹州等處進築須管於八月以前了當布録乙卯六月二十二日減地歩九月一日㑹州畢工丙辰胡宗回言進築白豹旺丹佐城寨畢工詔入役禁軍廂軍弓箭手蕃兵等各賜錢有差二十八日白豹賜名詔熈河環慶應進築處並限八月以前了當布録丙辰河東奏北人過天澗取水已令地分婉順止約去訖章惇言此邊吏蓄縮爾若過界者便與殺了必不敢來因言曽布嘗言趙卨帥延州初分畫綏德地界西人於道路兩旁置鋪行旅苦之數移文及與説話但云我地内置鋪有何不可無如之何遂呼廵檢令夜徃鋪中取守宿者悉殺之西人來理㑹但云已立賞召人捉賊自爾不復敢來布曰此事難指揮邊吏亦須有才畧者方能為之也六月一日可考丁巳賜熈河進築齊訥納森將士特支七百布録十二日進築六月八日畢工戊午兵刑部乞立儀鸞司係公人盗本司官物若知情藏買及為隠寄典賣者編配告賞法應官司差借儀鸞司人物者權同監臨事畢令人齎還從之舊特詳今從新己未太學生楊昊等言本學式令一遵元豐法度獨解名元額未䝉舉行詔依元豐七年例分數取人涇原路經畧司言擒到西界首領額勒齊烏楚肯僂儸可以使喚欲將家屬於鎮戎軍質院拘管從之又言西安州八月畢工九月班師布録己未環慶奏進築之字平等處詔令八月以前了當庚申詔朝奉大夫新知韶州孔仲平責授惠州别駕英州安置左騏驥使英州刺史權發遣梓䕫路鈐轄管勾瀘南沿邊安撫司公事王獻可降一官落遥郡刺史罷見任差遣平仲以元豐末上書詆訕先朝政事獻可以元豐末及元祐中上書議論朝政附㑹姦黨故有是責辛酉詔左藏庫副使梁和如京使延安府都監林大節供備庫副使勾當三館祕閣王佑内殿崇班勾當内藏庫陳嘉言各係梁惟簡陳衍親黨並與逺小監當差遣内梁和特降兩官御集在二十二日今從實録癸亥萬壽觀告遷奉安真宗皇帝神御於延聖殿章懷皇后於廣愛殿溫成皇后於崇華殿先是殿損敝詔權奉安於觀之辛巳堂至是修成故告遷入内殿宰臣章惇以涇原路建西安州及天都等寨諸路築據要害邊面各徑直相通畢工率百官賀於紫宸殿知樞宻院事曽布奉制宣答曰夏羌弗庭命將進討復我境土據賊要衝道阻悉通邊防永固與卿等内外同慶徳音降陜西河東路死罪囚流以下釋之實録此下書以南牟㑹新城為西安州按西安州賜名在四月十七日已書不應於五月再書今削去差官奏告永裕陵舊録云上開拓疆土列置城寨一二年盡有横山之地西夏由是衰弱惶怖請命神宗之功昭美矣新録削去今從新録先是三省樞宻院同進呈熈河已進築齊訥納森賜將士特支章惇因言涇原亦進築天都邊事將了當稱賀上問如何衆皆曰當然曾布曰西安建州包括天都自天都至秦州甘谷城南北一直五百里幅員殆千餘里當時得熈河止是摩正地今所開拓乃夏國地兼據險要並河足以制其死命西人常恭順則已若更作過則趨興靈不逺矣此功非熈河可比然不得熈河則涇原亦無由開拓今涇原進據天都熈河自努扎建城寨至㑹州故兩路邊面相通接而秦州遂為腹裏兼先帝建熈河蘭㑹路今日方得㑹州乃成先帝之志上喜曰蘭㑹方為漢地如此固當稱賀莫須候八月㑹州了否皆曰陜西河東民力困敝因此稱賀便當曲赦與除放倚閣税賦及免支移折變使民受賜恐不須俟八月布曰熈寧建熈河路以熈河洮岷通逺軍為一路此時尚未得河州至今未有洮州此故事也上然之布又言西安㑹州皆為漢地亦當告陵廟惇曰當遣官告裕陵上亦然之已而涇原又奏西安州八月畢工九月班師布遂建白當稱賀上許稱賀仍曰諸路所築凢四十餘壘皆曰未論諸路只天都與熈河邊面相接所包括幅員蓋千里河東鄜延環慶邊面亦各相通此誠非常不世之效也又言赦詞當從政府草定恐學士命詞或不能盡朝廷意熈寧中亦常如此又當明示以休兵息民之意不惟慰安民心亦足以釋二國之疑也上許之赦文有討叛興師蓋非得已息民偃革將自于今之語布所草定也右正言鄒浩奏臣伏見近者北敵遣使為羌人請命已䝉聖恩開以自新之路既而曲赦陜西河東又以息民偃革形於徳音普天之下鼔舞相賀以為羌人罪大勢窮滅在旦夕陛下遂赦不問者直以生靈為念故也然敵使之還徳音之布亦云久矣而邊臣猶或以經畫為事喧傳外議莫不惑之夫朝廷之所以示天下者信而已矣信不可無猶大車不可以無輗小車不可以無軏故雖州里之㣲非信且不可行而况天下乎今來邊臣乃不能上體至意未忘經畫竊慮因此外則為朝廷失信於外國内則為朝廷失信於陜西河東之民别致生事不可不察伏望睿慈特降指揮嚴行戒勵庶幾邊臣謹於遵奉有以副陛下深念生靈之意不勝幸甚浩奏不得其時附徳音後定州路安撫司言深州係次邊州止有兵馬監押一員欲乞城外更差一員與見任監押同共勾當從之三省言按紹聖四年六月十五日指揮諸路折斛錢熈寧年並歸朝廷自元祐以來户部隂有侵用不復更歸朝廷無慮二百萬緡縁係本部已前侵用過數難責今日併償詔將元祐年折斛錢除户部的實已支過錢數與免撥還外其餘數目并紹聖二年所起折斛又提舉司充糴過斛斗價錢並仰元豐庫拘収封樁凖備朝廷支使如户部輒敢侵用並依擅支使朝廷封樁錢物法今後遇起折斛錢並凖此又東南六路上供斛斗嵗額共六百二十萬石毎遇災傷特㫖減放或賑貸借用外多不及額致轉輸京師日有損減今發運司雖有本錢一百五十萬貫緣所糴斛斗止係凖備諸路嵗額未到間先次起發即未償充還實減之數按紹聖元年七月十六日指揮撥兩浙上件糴米本錢並賜發運司乗時計置糴買除凖備諸路年額未到間先次起發外應一切支費並仰補足額數起發仍常管所賜錢本數目毋致放散詔諸路已前折斛價錢仰發運司依紹聖元年七月十六日朝㫖施行甲子龍圖閣直學士涇原路經略安撫使兼知渭州章楶充端明殿學士先是上謂曾布曰章楶求去布曰楶有書與臣及章惇皆云必欲請致仕然新邊方就經營輯理未可闕人蔡卞亦以為不可去惇曰昨已許楶天都了令去上曰且俟來春然事了當進何職衆曰端明殿學士上曰更與轉官布曰職已髙官不足惜布因言適與三省言紹聖二年罷分畫事三年秋西人舉國犯延安至十月鍾傳方進築努扎只三二年間了當亦可謂神速上曰鍾𫝊此功亦不可忘為諸路倡始初興邊事時人人以為不可為從官而下皆以為笑今成就如此誠不易衆曰傳事了當與牽復布曰安燾嘗言努扎先帝所不敢為誰敢議此初罷分畫時韓忠彦堅不肯臣力與之争忠彦云待捉了髙永能後相度臣云若須待捉了鈐轄實羞見天下人忠彦方屈三省及人吏皆聞臣此語既罷分畫安燾猶力説臣云邊事不輕動如此何時可了負責不輕不若如故臣答以已罷分畫何可中變遂已惇等亦皆曰布誠有此語河東經略使林希言北界擅移久良津𣙜場關門不収公牒乞更移牒一次如不収即更不移牒從之六月一日合參照内殿承制吉先特授閤門通事舍人就差權發遣瀘州先以武舉中第選知文州上於禁中得元祐中所上書言諸路城寨不可棄及既廢保甲而已減之兵額不復增緩急致闕事故有是命舊録云旌其豪直敢言不阿時好新録削去詔皇城宿鋪人輙敢擅離地分及不報所部人單獨徃來故意招呼抛擲物色與城下人者徒二年垂下繩索者加一等部轄人不知情者減犯人二等知者與犯人同情實誤者奏裁乙丑左正議大夫守尚書左僕射兼門下侍郎章惇為金紫光禄大夫大中大夫知樞宻院事曾布為右正議大夫右正議大夫守中書侍郎許將為右光禄大夫太中大夫守尚書左丞蔡卞為右正議大夫守尚書右丞黄履為通議大夫皆以諸路進築要害城寨畢工故也先是上諭曾布曰邊事如此皆卿等之力布曰陛下睿明洞照幾㣲邊臣奉被成筭故建立無不如意臣等上禀聖謨何所補益又問執政當遷官否布曰臣等待罪政府皆嘗被遷擢惟章惇自作相以來未嘗遷改惇嘗言元豐末巳是正議大夫是時未分左右元祐中降官不當謂臣草麻日不曾為開陳雖得㫖轉官乃只是復官爾上曰正議改光禄光禄改銀青布曰然上又曰祖宗時有轉官例布曰祖宗朝執政有遷除則宰臣徃徃遷官昨官制行王珪自禮部侍郎改金紫光禄大夫熈河成功王安石雖不曾推恩然罷相日自禮部侍郎遷吏部尚書乃轉九資也惇遂加金紫光禄大夫惇進五等布三等將卞履皆二等詔入内東頭供奉官鄭居安楊震皇甫遘西頭供奉官康奭髙品王竦陳列黄門鄧淵胡秩並進秩一等西頭供奉官張維周減磨勘三年端王申王出居外第示優恩也丙寅如京使涇原西路同總管領蕃兵將韓資罷同總管領蕃兵將令吏部與閑慢差遣以元祐中訴父存寳事語渉不順也樞宻院進呈内侍省押班閻安乞御藥院帯御噐械酬奬上初令與減二年磨勘曾布言押班已是遷擢更叙日前差遣酬奬兼嵗月未滿無此例上曰更不須與遂寢之布録丙寅戊辰詔朕因閲元祐臣僚所上章疏得陳次升任監察御史日一二奏觀其㣲意極其姦邪附㑹權臣詆毁先政如張官置局許之訴理其用法過重事渉寃抑情可矜恕得皆伸雪已而乞放上供封樁錢物不致過有誅求而民無騷擾之患等語朕常含容其過庶使自新畀以諌職復敢狃習故態觀望言事多不中理久居其位殊無小補可罷職與逺小監當差遣遂添差監全州鹽酒税京師富民程竒者家有六嵗小兒其乳婢求去竒不許婢怨竒因與小兒戯教兒自稱官家婢即向兒山呼仍遽出告詔開封府推治婢情得杖脊送畿南編管上以小兒不足深罪而竒坐分析不實但衝替次升言陛下斷此罪出於仁恕乞降付史官免獄吏觀望入人罪上諭輔臣曰次升言觀望朕所不曉蔡卞從而譖之上怒遂有此命此據曾布日録并次升行述増修曾布日録五月庚午布言陳次升因言程竒事出於仁恕乞降付史官免獄吏觀望入人罪上怒其有觀望上意之語遂具其元祐中曾言訴理伸天下之寃及罷封樁免掊剋之弊深詆先朝政事比含容使之自新而不改故態毎事觀望令與逺小處監當差遣遂差監全州酒税程竒者家有六嵗小兒因飲酒戯謔自稱官家為乳婢所告其母亦有與之酬答之語上以其年小不足深罪遂令開封推治乃乳婢教之使為此語上令杖乳婢送畿南編管他皆釋之程竒以分析不實衝替而已都下翕然稱頌上徳故次升有此奏然謂獄吏觀望入人罪誠非所宜言也次升立朝廷無所附麗然此舉士論深惜之恐次升罷蓋不獨緣程竒也姑附見此次升之為御史也嘗劾章惇奏入不報他日上謂次升曰章惇文字勿令絶了次升唯唯退以告王鞏鞏時從吏部調簽書榮州判官事次升因留鞏曰上意未可知且緩行鞏遂詰次升曰上語云然公胡不白上臣任耳目之官帝王猶心也心所不知故耳目為傳逹之心若自知何用耳目陛下既知惇何不罷斥更須臣等文字次升曰良是後數日再對上復語及惇次升即以鞏所言白上上曰未有以代惇者次升自監察御史遷殿中侍御史又遷左司諌首尾凢四年既罷而惇獨居相位訖元符末乃貶此據王鞏甲申雜見編入次升自察院遷殿院乃紹聖二年十一月自殿院遷左司諌乃四年十二月不知劾惇果在何時元符元年十一月八日王鞏以朝散郎追毁出身已來告敕除名勒停送全州編管據元符末邸報云全州編管人前朝奉郎榮州簽判王鞏放逐便然則元符元年十一月八日送編管全州時已自榮州替歸或就榮州送全州也當徐考之王鞏甲申雜見云紹聖初余調簽書榮州判官㕔公事過别殿中侍御史陳次升當時云且緩行上意未可知余深叩之陳曰早來請對上語我曰章惇文字不要絶了余曰公何以報上曰唯唯余曰胡不白上臣為耳日之官帝王猶心也心所不知耳目所以傳道之也心既知之何用耳目陛下既知惇何不罷斥更要臣等文字陳謝曰甚是甚是後數日再對又數日陳召余曰早來對如公之言上但曰未有以代惇者然惇為相終哲宗一朝豈其命歟元豐八年六月次升為監察御史元祐元年九月以監察御史出為淮南憲紹聖二年十月復為察院自察院為殿院四年十二月自殿院為左司諌鄒浩云云附元年末及今年九月二十五日降授奉議郎京西路轉運判官周純進承議郎以應副補治永裕陵溝井有勞故也四月五日五月十二日交州南平王李乾徳乞釋典一大藏詔令印經院印造入内内侍省差使臣取賜樞宻院言河東路外州軍城寨緩急差發兵馬前去經渉山險頗為未便訪聞石州神泉寨至麟州銀城寨之間有形勢之地可以修建城寨兼有材木採斫應副使用若兩寨之間踏逐要害有水泉去處修建三兩寨移近裏城寨戍守兵馬前去使麟府嵐石州管下城寨通接即緩急互為聲援頗為利便詔河東經畧司相度具經久利害及㸔望四至具圖聽候朝㫖吕惠卿奏西人來拆新築烽臺已復修訖詔河東修寨通嵐石麟府兩路限八月以前了當布録戊辰六月二十三日都知梁從政以歲滿乞罷提舉大内修造曾布言從政前後經二府陳狀不一不敢進呈今云歲滿須取㫖上曰須是都知無可差者遂令再任從政以修内司役兵工匠多為御藥郝隨所抽差拘留於後苑作下無人可以辦事故累狀乞免上但云時下緩急修造須至差那却可於諸處差人布云禁中修造恐無例差外處役兵兼從政嘗乞差御藥管勾詔差郝隨雖受宣已數年而今不曽赴修内司管勾上亦知之布録戊辰從政遂託疾在告布録六月甲戍今并此己巳詔朝散大夫試户部尚書吳居厚朝散郎權刑部侍郎周之道各進秩一等發運副使張商英減一年磨勘淮南轉運使張元方賜帛有差開修支河畢工故也環慶路言進築駱駝巷城寨畢工詔賜入役民兵等錢有差四月二十二日布録云己巳環慶築白豹畢後移兵築駱駝巷將士特支庚午環慶又奏已築駱駝等寨章惇云福至心靈胡宗回一併築了城寨亦可嘉進築先後與實録不同今附此庚午奉議郎權發遣陜西轉運判官李譓加秘閣校理馬軍都虞候信州團練使王恩為衛州防禦使四方館使吉州防禦使知蘭州苖履遷引進使皇州使融州刺史雷秀領濰州團練使泰州刺史知鎮戎軍姚雄遷四方館使知應順軍姚古遷東上閤門使權知環州种朴領昌州刺史譓等以進築天都有勞故也西染院使孫侃遷如京使如京使喬青遷莊宅使供備庫使魚贇遷西京左藏庫副使内殿承制劉遇遷供備庫副使東頭供奉官髙榮遷内殿崇班蕃官内殿承制伽裕額伊遷供備庫副使侃等以斬獲羌人故也環慶路言白豹進築畢工詔賜名白豹城賜胡宗回以下銀合茶藥有差金湯白豹皆用舊名上顧二府云如何皆曰自慶厯邊事以來范仲淹之徒皆以為得金湯白豹則横山為我有其名已著故不欲易以他名也布録庚午八日庚戌金湯賜名十三日丙辰白豹已奏畢工陳師道與曾布書乞罷進築其畧云進築不已則兵不得罷盍先已之乎若謂可以制敵則漢取陰山匈奴過而慟哭開西域𤼵兵爭之故謂斷其右臂師道居東莫知今之可否但聞諸路競進日夜奏功而未聞西人舉國而爭則必非其所急也茍不能制其命則老師費財殺人盈野何所用之若謂且築且進漸據横山然後可制其命既數嵗矣横山安在耶若復數嵗則諸將窮富極貴矣人情得所欲肯復出力蹈其所難乎則是横山終不可得徒為將帥取富貴之資爾横山天險也下臨平夏存亡所係彼必舉國爭之恐亦未易得也若謂今之所據即横山也則師道聞之宥州在横山之下南拒米脂三舍而近今延安奏功廣地四百里則宥在其腹然不云得宥州也則四百里之廣豈可信哉胡地惟靈夏如内郡地才可種蕎豆且多沙磧五月見青七月而霜嵗才一収以銀州草惟柴胡蕭關之外有落藜與鹹菽以此知其不宜五種也即可種安得人實之若不徙民則募軍二者孰從乎内則空此以實彼舍易而即艱何益且闢土益廣則去府益逺平常緩請急報卒不相及河東麟府之患世所知也若謂今所據可以制敵而不争者非不敢乃不能爾敵雖蕞爾然元昊用之以抗中國其地與民固自若也而今反不能爭其所急者非養其力以有待則無其人無其人則諸部不為用也若此則師道之憂有甚於前也辛未詔莘王俁睦王偲㓜喪所生母才人馬氏所生之養母實襁褓撫養之俁偲並建王爵出奉外朝例合改封少報勤劬特進封媫妤是月右正言鄒浩奏臣伏以臺諌者人主耳目之官所恃以除壅蔽而廣聰明者也一有曠闕則蔽之所由生將有不勝慮者矣書曰無曠庶官天工人其代之又况耳目之官乎然而自昔以來備置臺諌使奮不顧身以交修厥職殆非朝廷用事之所樂故必在人主獨斷而已不可不察也臣竊見御史臺除不置大夫外由中丞而下有侍御史有殿中侍御史有監察御史共八員今止三員兩省諫官除不置散騎常侍外由諫議大夫而下有司諫有正言共六員今只有一員曠闕之多於兹為甚仰惟陛下躬攬威柄延見羣臣而天鑒所知莫不洞判其間以身許國無所阿徇可以上當聖意者宜多有之伏望斷自宸衷早賜選備庶幾言路不致久闕相與盡忠獻納少助陛下博覽兼聽之意浩奏不得其時按元符二年五月二十六日陳次升以左司諫責浩獨為右正言至八月七日乃以王祖道為右司諫今附浩奏於月末臺官三員蓋中丞安惇察官石豫左膚也
