body:
  text: 續資治通鑑長編卷二百五十九宋李燾撰神宗熈寧八年春正月甲午朔不視朝丁酉四方館使康州刺史王道恭知雄州先是馮行已赴闕上批雄州最當北邊衝要不可久闕正官中書樞宻院可速同選擬進呈因有是命戊戌詔秦鳯路轉運判官劉定提舉常平等事章楶提舉賑救饑民初定言涇原路民闕食常平米不足乞借省倉渭州二萬石涇州徳順軍鎮戎軍萬石許之至是又詔定等提舉定七年九月九日使涇原庚子樞宻副使右諫議大夫蔡挺為資政殿學士判南京留司御史臺挺先以疾賜告至是從所乞也權同判軍器監集賢校理俞充權發遣成都府路轉運副使初中書擬差判将作監范子竒上批子竒方知工作次第未可輟故以命充參知政事右諫議大夫馮京守本官知亳州權發遣户部副使王克臣追一官司封郎中集賢校理丁諷落職監無為軍酒著作佐郎秘閣校理王安國追毁出身以來文字放歸田里内殿承制楊永方追一官汀州編管人鄭俠改英州御史臺吏前慶州録事參軍楊忠信檢院吏孔仲卿撫州進士吳無至並决杖編管忠信郴州仲卿邵州無至永州忠信仍除名永不叙用俠既竄汀州人多憐之或資其行吕恵卿憾俠不置且惡馮京異議欲藉俠以排去京并及王安國乘間白上曰俠書言青苗免役流民等事此衆所共知也若言禁中有人被甲登殿詬罵此禁中事俠安從知此盖俠前後所言皆京使安國導之禁中有人被甲登殿事據俠言行録當是宿州狂人孫真也事見九年五月三日戊午據林希野史載孫真事乃是九年四月一日與鄭所言絶不相闗當别有被甲登殿者非孫真也野史真作珍具注在九年五月三日真决配沙島時上亦疑焉他日問京曰卿識鄭俠乎對曰臣素不識俠侍御史知雜事張琥聞之隂訪求京與俠交通状或語以京嘗從俠借書遺之錢米琥即劾奏京大臣與俠交通有迹而敢面謾云不識乂俠所言朝廷機密事非京告教何得聞此上以章示京京對實不識乞下所司辨琥又言俠自言京為之主按京身為輔弼政事有所未便自當廷議可否豈宜懐貳隂結小人若京實無此俠當坐誣大臣之罪俠雖逐而京之事状未明乞追俠付獄窮治詔送御史臺京乃言俠事因琥案劾則御史官屬不得無嫌且朝廷不過欲見臣與俠有無往還問遺實迹耳乞治扵他司或遣官就御史臺根究詔知制誥鄧潤甫同推究琥請遣奉禮郎舒亶乘驛追俠於陳州索其槖中文字悉封上之獄官又掠治俠令具疏所以交通者皆捕送獄僧曉容善相多出入京家亟収繫考騐取京門厯閲視賔客無俠名潤甫等深探俠辭多所連引獄久不决臺官皆不得歸舊録七年十一月二十二日丙辰上批御史臺推鄭俠事追逮命官甚衆而承制官司並不鎻臺守宿間歸私家可令具状以聞朱本簽貼云本臺奏每夜輪三院直官與差制官一員或二員皆宿各不接見賔客進呈訖合刪今附注此上以其枝蔓有詔趣結絶琥又言俠事連京理須考實而證左有所畏望未肯盡情通説勘司又被㫖催迫無縁窮究况俠毁斥朝政姍罵大臣非有所恃安敢如此若不推見事情明正國典則小人朋比何以禁止乞令盡理根究從之時十二月丙戍也俠素事王雱而議論常與雱異與安國同非新法安國親厚之嘗謂安國曰俠前後以書諫丞相不聴得無為人所誤安國曰安國言且不聴子言彼豈肯信乎彼作一事必得四海九州怨怒然後行之何謂為人所誤及俠上書安國索其草視之俠不與安國曰能言之者子也能揄揚流布於人者我也子必以其章示我俠曰已焚之矣俠詣登聞檢院上書諷判檢院延與坐啜茶詢其所言稱奨之諷又嘗見京語及俠京稱俠文辭甚佳小臣不易敢爾俠監安上門時克臣為鹽鐡副使薦之其逐也有求於克臣克臣長子公約諭次子駙馬都尉師約饋之師約曰師約連姻帝室不敢與外人交請具白金大人自遺之克臣從之遺俠以白金三十兩俠往辭安國安國謂曰子可謂獨立不懼矣於是臺司鞫諷安國及克臣子公約等安國初不承獄吏引俠使證之俠見安國笑曰平甫居常自負剛直議論何所不道今乃更效小人欲為詆讕邪安國即承永方忠信仲卿無至皆嘗與俠游者也獄既具上以京大臣令推究官取信否状并問克臣京等皆引罪潤甫及中丞鄧綰疏俠肆意謗訕朝廷議罪投之逺方此人臣之所共嫉克臣以戚里受國厚恩知俠國之所棄而資給之安國以下士擢置文館而奨激狂妄非毁其兄及永方忠信等傳言惑衆尤為可惡雖犯在赦前及元非朝㫖推究之人據其情状不可不懲遂罷京政事俠逺徙諷等皆得罪曉容勒歸本貫吕惠卿議當俠大辟上曰俠所言非為身也忠誠亦可念豈宜深罪始惠卿事安石如父子安國負氣惡其憸巧數面折之惠卿切齒及安石罷相引惠卿輔政惠卿遂欲代安石恐其復來乃因俠獄陷安國亦以沮安石也安國既貶上降詔諭安石安石對使者泣及再入相安國猶在國門由是安石與惠卿交惡俠雖薦京宜為宰相然實不識京俠又稱元絳孫永王介凡四人自言識絳餘皆未識而琥等獨斥京葢希惠卿風㫖也此叚用王安國本𫝊司馬光記聞朱墨两録并鄭俠言行録刪修見鄭俠言行録云俠既停門局本候郊霈調官出京日羣臣誣罔天聴懐不能已復取唐書内魏徵姚崇宋璟及李林甫楊國忠盧杞傳為两軸題其一日正直君子社稷之臣事業圖其一曰邪曲小人容悦之臣事業圖迹在位臣僚欺君誤國之事暗合林甫輩而反於姚宋者各以類標題復為書上之事皆畫一如大臣對御以三路流民之因皆為南北下各有田若北旱則南南荒又北此皆誣罔上聼臣乞勘㑹河東北陜輔之民自去冬今春流移至今不已何人是南方有田者又聞大臣奏對多以天旱民流百物失所四方背畔兵革不息為有天數臣乞問其臣為學周公邪學孔子邪學孟子邪周公作無逸歴陳人君之享國或三四十年或五六年皆由嚴恭寅畏天命祗懼治民則有永不知稼穡之艱難不聞小人之勞則有短又曰惟不敬厥德乃早墜厥命使周公相陛下而天旱民流百物失所四方兵革不息如此周公曰天數乎孔子告哀公曰存亡禍福皆已而已天災地妖不能加也孟子告梁惠王曰殺人以刃與政有以異乎又曰王無罪嵗使孔孟相陛下而天旱民流百物失所兵革不息如此孔子孟子亦曰天數乎然則羣臣所為學者皆非周公孔子孟軻之道而所以相陛下者皆非周公孔子孟軻之存心則陛下獨立無臣何以為天下臣所謂無臣者非無羣臣無大臣也所謂大臣者非謂大斾髙葢日食萬錢以自肥腯者以道事君不可則止而已若髙爵重禄則總歸於已清資美職則分授子弟中使相望於衢路黄金並聚於私室而天旱民流百物失所四方背侮兵革不息則日天數此為大臣則屠沽僕𨽻誰不克為甲又言當今臺諫譬如芻靈木偶人耳又言禁中有被登殿等事願陛下登宣德門宣示臣庶臣之所言是耶乞懲戢近臣母得公肆欺誕以危社稷所言非耶乞斬臣於衆人之前以塞流言􅍅􅍅之路奏入執政大怒言於上以為謗訕朝廷追毁出身以來文字送汀州編管俠既行吕惠卿入對上問鄭俠一小官如青苖免役等事容於道路聞之至如被甲登殿禁中君臣對面言之何聞之速且訐惠卿對曰俠前後所言皆馮京手録禁中事使王安國持示導之使言也京與惠卿同列議多矛盾惠卿諂事荆公為安國所疾屢諷其兄不寤故惠卿併中之京一日早朝留身奏事上問卿大臣知朝廷有不便事何惜自言乃委令鄭俠入文字縁小官論列朝廷大事理自不順略行貶竄物論甚不然京惶駭對曰臣與鄭俠素不相識上方疑之御史知雜張琥劾京備位輔弼乃結交小人使謗訕朝政京奏鄭俠去貶所未逺乞追回對證使虛實有歸遂付臺推勘俠行至太康忽見奉禮郎舒亶來搜衣槖橐中有銀三十星乃王度支克臣所贐乂得諌䟽二帙皆先朝名臣奏藁及韓范司馬等所言新法不便事題曰楊君所贈楊君者名忠信時為御史臺知班嘗應四月一日詔書言新法不便俠監門日忠信來謁曰御史臺職在諫争皆緘口不言足下一監門爾乃上書不已是言責在監門而臺中無人也探懐中書授俠曰以此為正人助是時御史皆惠卿黨必欲文致京與安國之罪京素不識俠見其數言事屢對判檢院丁諷稱之俠每遣門人吳無至詣檢院投匭輙咨嗟曰當今臺諫不言鄭監門乃能屢入文字耶且為無至言馮参政再三稱奨之語然實未嘗使安國傳道禁中事諸所從得乃内殿崇班楊永芳語也先是永芳與俠隣居每言新法不便且憤大臣誣罔之語多為俠發之俠罷門局時於太廟街行邂逅秘閣校理王安國安國馬上舉鞭揖俠曰賢可謂獨立不懼因隨俠至所居借前後奏草俠答以未嘗存留安國言亦見閣下與家兄書家兄主張太過雖安國之言亦不見聽况閣下乎俠曰不意丞相一旦為小人所誤以至於此安國曰是何為小人所誤家兄所見不同自以為人臣子不當避四海九州之怨使四海九州之怨盡歸於已方是臣子盡忠於國家俠曰未聞堯舜在上䕫契在下而有四海九州之怨安國以為然至是赴對安國初猶不承直至廷辨俠責安國曰凡對制使不當有隠口所言者安得諱之耶天地神祇宗廟社稷日月星辰五嶽四瀆之靈皆在左右學士欲誰欺安國乃伏獄成俠坐改送英州編管楊忠信郴州吳無至道州二人皆真决馮京罷政知亳州丁諷落職監無為軍酒税王安國追毁告身放歸田里王克臣楊永芳各奪一官詔真定府邢趙洺磁相州被災户合輸預買紬絹及賒買官絹錢並倚閣須夏熟又詔倚閣河東路被災户和糴粮草辛丑察訪荆湖路常平等事蒲宗孟言近制民以手實上其家之物産而官為注籍以正百年無用不明之版圗而均齊其力役此天下之良法也然縣災傷五分以上則不與焉且留以竢豐嵗以臣觀之使民自供手實無所擾也何得待其豐穰哉願詔有司不以豐凶弛張其法從之吕惠卿為手實法奉使者至析秋毫天下病之而宗孟乃有此奏諫官范百禄言造簿手實告匿有賞為是法者欲民之均推而行之恐不如法意至於騷動户令雖有手實之文而未嘗行葢謂使人自占必不盡數供通而明許告言則家家有吿訐人人為讎怨禮義廉耻何可得哉據百祿舊傳云百祿為諫官即論此今附見宗孟奏後百禄為諫官乃二年五月二十七日而七年七月十九日方行手實法也張方平言臣竊聞昨有新制開列條目自府畿至諸路郡縣令人戸各自供通財産手實状有所隠漏者許人陳告近已施行公私勞敝鄉閭甚擾但憂增益賦調不復更事生業必有姦猾漸相告訐窺圖賞利獄訟繁興政令浸以滋章民德何以歸厚况中戸以下鮮有葢藏田蠶所收嵗有厚薄戸等耗登何常之有不惟扇惑人情更有紛亂新法以建議者内為之主故當職者人無敢言向者朝廷所立法制葢以便民為本因以成國之利今兹一事專用撓人徒騷擾於天下實無濟於國家伏望聖明博行體問忠於國者必言其無益慮於民者當明其非便憂深思逺早垂止罷庶令億兆欣戴天恩是嵗十月卒罷手實法方平奏今附見不知其時也壬寅熈河路蕃官趙濟忠等見延和殿授濟忠崇儀副使餘除官賜袍帶有差詔蠲懐衞州第四等以下戸去年秋料役錢以民乏食故也乙巳詔熈河路六處置場買馬罷原渭州徳順軍買馬場賜真定府路安撫司囘易本錢二萬緡從本司請佐軍用也兵部司農寺言諸路每嵗解發引見義勇保甲今定開封府界保甲五路義勇每萬人取一人五路保甲萬五千人取一人庶令逐路霑恩從之知成都府蔡延慶言卭部川蠻主苴尅等願賣馬詔延慶優加犒設以招來之議者謂成都府路可市馬故委延慶領其事後延慶又言威雅嘉瀘文龍州地接烏蠻西羌皆産大馬請委知州寨主以錦綵茶絹折買從之仍委延慶提舉威雅文龍買馬在三月十八日今并入此八月一日詔云云九年四月二十三日罷詔中書檢正官有兼局當給添支處增給一處餘官母得援例時馬珫范純粹為檢正官又判兵部乞以兵部添支為茶湯錢兼給故也丙午詔大名府澶定二州守城各備十萬人行營軍器馬軍二分步軍八分文彦博薛向康衛編排不足以諸州軍守城之餘充又不足具數以聞賜江南東路上供米三萬石均給災傷州軍開封府界京東京西路黄牛并水牛角并許通商庚戍冀州言散直王逹與侍禁李可觀等督役治州城雨壊二十六歩法寺當逹公罪杖㑹赦原中書擬逹罰重難差遣一次上批河北諸城工役方興若容其怠慢工成未幾而摧塌恐枉費人力緩急誤事可觀等罰銅達决杖詔河北同提㸃制置屯田使皇城使廉州團練使閻士良復五路都鈐轄資序久任士良治平初責降後稍復任使至是遂還舊資詔權御史臺推直官蹇周輔劾前餘姚縣主簿李逄於徐州初沂州民朱唐告逄有逆謀提㸃刑獄王廷筠等言其無結構之迹但逄謗讟朝政或有指斥之語及妄説休咎雖在赦前且嘗自言縁情理深重乞法外編配告人虚妄亦乞施行上疑未得實故遣周輔先具初劾大情以聞哲宗舊録蹇周輔傳云㑹有上變告餘姚主簿李逄謀為不道捕繫沂獄部使者請并告人按之謂逄語意雖悖無實状上疑之遣周輔往至則悉得逄姦状且連逮宗室子世居詔御史府集臺諫官雜治於中參驗卒無異辭神宗益知其精敏可屬以事即擢開封府推官邵氏見聞録云吕惠卿起李逄獄事連李士寧士寜有道術王安石居䘮江陵與之同處數年惠卿意欲併中安石也司馬記聞云李士寧者蓬州人自言學道多詭數善為巧發竒中目不識書而能口占作詩頗有才思而詞理迃誕有類䜟語專以妖妄惑人周遊四方及京師公卿貴人多重之人未嘗見其經營及有囊槖而資用嘗饒卒有賔客十數珍饌立具皆以為有歸錢術王介甫尤信重之熈寧中介甫為相館士寧於東府且半嵗日與其子弟遊及介甫将出金陵乃歸蓬州宗室世居者太祖之孫頗好文學結交士大夫有名稱士寧先亦私入睦親宅與之遊士寧以為太祖肇造宗室子孫當享其祚㑹仁宗有賜英宗母仙游縣君挽歌微有傳後之意士寧竊其中間四句易其首尾宻言世居當受天命以贈之世居喜賂遺甚厚壬子秦鳯等路都運使熊本言收復洮隴開斥土地尚未墾闢設官置吏以至招納蕃夷屯聚軍馬支費甚廣較其所入惟酒税市易茶鹽為多而盡歸經略司雖臣以區區之見粗嘗規畫然而移用本息付任官吏不在轉運司今蕃部悉更向順而經略使王韶已被召命即金糓調度自當歸之有司中書門下奏欲令本與經略使髙遵裕同共相度以聞上批可改云宜令熊本與髙遵裕同共相度轉運經略司合分認管轄事件疾速聞奏詔陜西近經雪寒僵尸滿道深可憫傷其令永興秦鳯河東路都轉運司速分遣官收瘞以三司錢給其費賜外都水監丞程昉度僧牒千給濬汴河工費詔他官權御史中丞不以官職髙下雜壓並從本班七年九月壬子可考甲寅權發遣荆湖南路轉運副使蔡曄言招諭溪洞蠻舒光旦楊晟堅歸順乞各補一官給俸令守其地詔補光旦右班殿直晟堅三班借職詔罷諸將參謀初置三十七將許舉武學生充參謀諫官范百禄言邊事未有機警何用布衣參謀徒長奔競耳又言今大帥未命而已除將佐有以恩澤用有以潰敗收有未嘗經戰陣有以故羣盗得官者願詳覈其素察所長參任之列甚無状者十有四人姓名曰付之新格責以訓練所至長吏不得預然皆觕暴之才可為人指縱未可涖衆也况委之辟使臣察官吏小人處此必乖戾願依畿縣舊制將佐専部分敎閲即付之州縣而罷參謀上納之詔聞永興秦鳯河東路民饑死者相屬累戒監司給錢榖賑濟而官吏未悉究心其令逐路轉運司及所差官詣所部州軍救恤具死亡埋瘞數上司農寺鄜延路經略使趙卨言涉春以來下户尚多闕食今堡寨城壍未興工者凡四十餘萬工願於常平省倉支錢米二萬貫石募貧民以充役從之乙夘詔融州融水縣尉蒙鼎換右侍禁充宜融州極邊寨柵主兵任使從知桂州劉彛薦也詔察訪體量官使回具所至知州通判為治實状上中書武臣上樞密院諸路監司提舉司各置簿録知州通判功過得替前一月就移者離任半月上中書樞宻院待制觀察使以上不用此令六年八月己夘察訪官先有此令詔諸路轉運司失計置錢物及本路自可移用不闕而過為約度妄有申請支撥并妄訴免指占上供錢物者並委三司奏劾又詔開封府人戸去年納外殘零秋税願納見錢者聽是日詔張方平歸宣徽院供職罷知青州先是方平與滕甫易任方平又辭上問方平祖宗禦敵之䇿孰長方平曰太祖不勤逺略如夏州李彛興靈武馮暉河西折御卿皆因其酋豪許以世襲故邊圉無事董遵誨捍環州郭進守西山李漢超保關南皆十餘年優其禄賜寛其文法而少遣兵諸將財力豐而威令行間諜精審吏士用命賊所入輒先知併兵禦之戰無不克故以十五萬人而獲百萬之用終太祖之世邊鄙不聳天下安樂及太宗平并州欲遂取燕薊自是嵗有契丹之虞曹彬劉延謙傅潜等數十戰各亡士卒十餘萬又内徙李彛興馮暉之族繼遷之變三邊皆擾而朝廷始旰食矣真宗之初趙徳明納欵及澶淵之克遂與契丹盟至今人不識兵革可謂盛徳大業祖宗之事大略如此亦可以鑒矣近嵗邊臣建開拓之議皆行險僥倖之人欲以天下安危試之一擲事成則身䝉其利不成則陛下任其患不可聽也上曰慶厯以來卿知之乎元昊初臣何以待之方平曰臣時為學士誓詔封冊皆臣所草具言本末上驚曰爾時已為學士可謂舊徳矣因及契丹事上問蕭禧將復來敵意安在方平曰敵自與中國通好安於豢養吏士驕惰實不欲用兵昔蕭英劉六符来仁宗命二府置酒殿廬與語英頗泄真情六符數目之英歸竟以此得罪今禧黠人願如故事令大臣與議無屈帝尊與彼交口上曰朕念慶厯再和之後中國不復為善後之備故脩戎事為應兵耳方平曰應兵者兵禍之已成者也消變於未成善之善者也又問河東地界方平曰嘉祐二年敵使蕭扈嘗言之朝廷討論之詳命館伴王洙詰之扈不能對録其條目付扈以歸因以藁上之詔方平歸宣徽院供職實録無月日蘇軾銘方平墓云方平每辭去上輒遷延之三易其期遂詔方平歸院亦不記是何時按御集方平罷知青州依舊宣徽使乃八年正月二十二日事又按方平新舊傳因辭青州得對面進英宗立神宗手詔十五字遂有是命今併附此墓銘乃不載進手詔事似為方平隠此然本傳載方平自陳徙南京過闕上欲除方平宣徽使留京師王安石不可按安石以七年四月罷相方平十月徙南京過闕此時安石不在相位本𫝊誤也安石言方平不可留京師實三年正月未除陳州以前事蘇轍龍州略志云予從張安道南都聞契丹遣汎使求河東界上地宰相王安石謂咫尺地不足惜朝廷方置河北諸將後取之不難及北使至上親臨軒諭之曰此小事即指揮邊吏分畫使者大喜出告人曰上許我矣有司欲與之辯卒莫能得予聞之以問安道安道曰昔在慶厯中契丹遣劉六符等來議和親未至燕人有梁濟世為雄州諜者嘗以詩書敎契丹公卿子弟先得其國書本以獻仁宗性畏慎時許公為相奏曰蕃國求和親漢唐所不免徐議所以答之者耳無深憂也仁宗深以為然及六符至殿上讀書如平時無所問六符失色咨嗟出至殿外幄次曰事已漏矣由此有司與之評議無甚難也今两朝地界犬牙相入非朝廷所詳若以實答之一付邉臣議定以聞邊臣以疆場為職事敢不盡力而其可否尚在朝廷事莫便於此何必而與之决按蕭禧初以七年三月十九日來此時方平實在陳州未除南京禧再以八年三月八日來此時方平實在宣徽院供職與轍言此事當是七年在陳州時及是冬還朝上聞禧當復來因問方平方平遂具以白上也或方平既白上後在南方更與轍追説舊事耳方平所論葢専與王安石相反故詳記之陳師道談叢云故事嵗賜契丹金繒服器召二府觀焉熈寧中張文定公以宣徽使與召衆謂天子脩貢為辱而陛下神武可一戰勝也公獨曰陛下謂宋與契丹凡幾戰勝負幾何两府八公皆莫知也神宗以問公公曰宋與契丹大小八十一戰惟張齊賢太原之戰才一勝耳陛下視和與戰孰便上善之按師道所云當考姑附注此或當修入正文更詳之丙辰知郢州太常博士監察御史裏行唐淑問乞解官尋醫從之此必有故而淑問本𫝊略不載此當考以御侍朱氏為才人詔黄河向著隄岸榆栁自今不許采伐後又詔雖退背隄岸亦禁采伐初大名府修城伐河隄林木為用都水監丞程昉以為言故禁之丁已詔大宗正司具嘉祐七年自濮安懿王邸從先帝入内不曾經治平二年特㫖轉官宗室人數以聞於是右羽林軍大將軍衛州團練使仲騑領汝州防禦使漢州團練使仲伋領沂州防禦使昭州團練使仲濬領解州防禦使楚州團練使仲越領華州防禦使賀州團練使仲遷領登州防禦使仲騑等五人遷官在二月十三日今併書之權永興軍等路轉運使皮公弼言交子之法以方寸之紙飛錢致逺然不積錢為本亦不能以空文行今商虢鄜耀紅崖清逺鐡冶所收極廣茍即冶更鑄折二錢嵗除工費外可得百萬緡為交子本并上可行十二事上批可如所乞委公弼總制營辦二月二日二卜九日三月五日可考食貨志第六卷載公弼此奏與實録並同戊午鎮南節度推官中書戸房習學公事徐禧為太子中允館閣校勘權監察御史裏行詔方農作時雨雪頗足流民所在令州縣曉告丁壯各歸鄉土並聽結保經所屬給糧每程人米豆共一升㓜者半之婦人凖此州縣毋輒驅逐同管勾外都水監丞程昉言開滹沱葫蘆河直河淤田繫浮橋回閉水澾等部役官吏勞績别為三等乞推恩從之朱本簽貼云部役賞功常事法不當書遂削去新本仍存之此可見程昉邀功生事也四月十七日當考已未洮西縁邊安撫司言去嵗夏秋旱羌戸殍死者衆自收復洮河羌人止知畏威而未識朝廷之惠今此饑歉若官為糜粥振其饑急計米一升可給三人則百石當濟三千人矣自二月盡五月給米千五百石費不多而惠極博上批依奏速令經略安撫司指揮相度於蕃市聚集之地給散如數少即量增之交趾郡王李乾徳表言恩情州首領麻泰溢是本道定邊州人移住恩情今改稱儂善美與其屬七百餘人逃過省地乞根問先是廣南西路經略使沈起言知恩情州儂善美與其家屬等六百餘人歸明至七源州臣勘㑹儂善美等舊係省地七源州管人村峒徃年為交趾侵取改為恩情州以賦役誅求煩苦來歸不納必為交趾所戮詔聽歸明厚加存撫至是乾徳以為言乃詔廣西路經略司勘㑹牒報賜乾徳詔不許賜詔不許據交趾王𫝊又詔秦鳯等路提舉買馬監牧司相度起發馬綱合住月及所住月如何養飼具利害以聞又詔去年災傷流移戸請過常平錢榖檢接實係全户流移者未得責同保人代輸候歸業日取㫖仍總具諸縣逃戸數以聞庚申詔前泉州惠安縣主簿辛有儀與注合入官管勾河南府中嶽廟一任仍給本官俸以有儀罷任至南劒州遇谿水漲全家溺死故也權知睦州吳安世言杭蘇秀州發遣歸順下吉州蠻人商大商九等十戸於臣州給以絶戸田五口者一頃縁蠻人暴露寖久多有寒饑雖給山地使之開墾未有地利又無隣里借助乞更給口食半年仍乞諸路蠻人請佃未係耕作収成之月從給田後更支口食凖此從之辛酉詔大理寺丞景思誼免勒停贖銅四十斤不為例思誼坐知春州失入人死當贖銅三十斤勒停上以思誼兩兄皆戰没母老無兼侍故也詔河北諸將下兵馬見有差出在諸處屯駐守把者可責立日限令以不係將下人疾速代歸本將訓練此據御集賜景靈宫使昭徳節度使兼侍中曹佾朝陽門外飛猛第一空營修建佛寺從所乞也御集是月雨木冰實録係之乙夘
