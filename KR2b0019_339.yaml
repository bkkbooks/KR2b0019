body:
  text: 續資治通鑑長編卷三百三十五宋李燾撰神宗元豐六年五月丙子朔御文德殿于闐貢方物見于延和殿上問曰離本國幾何時曰四年在道幾何時曰二年經涉何國曰道由黃頭回紇草頭達勒達董戩等國又問留董戩幾何時曰一年問達勒達有無酋領部落曰以乏草粟故經由其地皆散居也上顧謂樞密都承旨張誠一曰達勒達在唐與河西天德為鄰今河西天德隔在北境自太祖朝嘗入貢後道路阻隔貢奉遂絶又問嘗與夏國戰者豈此達勒達乎曰達勒達與李氏世讎也又問道由諸國有無抄略曰惟懼契丹耳又問所經由去契丹幾何里曰千餘里新紀於丙子書于闐入貢舊紀附年末詔大忌日六曹諸司不為假執政官早出諸官司不得隨出詔京東轉運副使吳居厚所奉新法賣鹽錢三十六萬餘緡令運至北京左藏庫封樁自今嵗具數以聞初朝廷恐居厚所奏賣鹽錢多立虛數上欲驗其實故有是詔六月一日六月十七日涇原路經略司言第五將申熙寧寨硝坑堡巡檢王世隆追賊於水東口戰死弓箭手十將王和等十四人各傷中詔世隆擅領兵過壕又不能策知伏兵致傷折人衆如其生全朝廷必加重責可更不推恩其輕重傷人依格陳亡人依陳亡不勝例詔改加上仁宗英宗皇帝尊諡為奉上徽號令三省官與太常寺官詳定丁丑詔熙河路經制司案未用兵已前每嵗經畫到財利各有定額兼創司之始主管之人並各已曽用所得課息等第推賞訖自元豐四年之後每年並不見本司於嵗末具到上件所入增虧并見在銷破數目未知因依可下本司火急分析聞奏此據御集要考見後來所分析附此戊寅提舉陜西買馬司言階州增茶價恐蕃部馬不至乞量增馬價詔止依舊價如蕃部不願請茶並支錢帛六月二十一日廣南西路轉運司言宜藤融州産白錫黑鉛可於梧州置鑄錢監以十五萬緡為額所出息錢即乞還見欠內藏庫及積欠上供錢七十萬緡候還足並封樁以應軍需詔廣西財利久苦窘乏近嵗軍興尤覺不支可依所奏己卯詔于闐人首領畫到達勒達諸國距漢境逺近圖降付李憲以嘗有朝旨委憲遣人假道董戩使達勒達故也禮部言經有大裘而無其制近世所為惟梁隋唐為可考請緣隋制以黑羔皮為裘黑繒為領袖及裏緣袂廣可運肘長可蔽膝謹案皇侃説祭服之下有袍繭袍繭之下有中衣朝服裼衣之下有裘裘之下有中衣然則今之親郊中單當在大裘之下其袂之廣狹衣之長短皆當如裘伏乞改製從之詔加贈皇城使宋玠領英州刺史以其子滋言玠有收復石堡城功未賞而死故也舒州防禦使克敦進父保靜軍節度使蕭國公承幹文集十卷詔承幹父子世以藝文儒學名于宗藩在朝廷旌善與能之義宜有褒寵可加贈安定郡王克敦仍降奬諭辛巳詔前兩浙路監司蘇獬胡宗師朱眀之各罰銅二十斤坐不舉發知秀州吳安世贓罪故也詔供奉官郭惟賢部九十騎獲首級五十六身重傷及先鋒破賊左藏庫副使髙永翼部五十二騎獲首級一百二各遷五官餘遷官賜絹有差賞從訾虎部兵出界功也又詔髙永翼止遷兩官為皇城使貴州刺史餘三資許回授五服內親陜西轉運副使范純粹乞令提點刑獄胡宗回等不須躬親照管西人頓遞詔撫接西人朝廷自有常體經歷官司供億或過不及皆當治罪純粹昨以張皇輕易已嘗誡敇今此奏陳蓋欲掩覆前過自今宜凡事審重務令合宜勿生邊事四月二十九日純粹云云可考壬午單州團練副使員外置東方戒上飛虎立成陳圖步人制戎騎法乞靣陳利害詔樞密院召問之給事中韓忠彥等言奉議郎郟亶除太僕寺丞案亶方以不職下本道劾罪而便與職事官之選理若未然上批郟亶差除之日本房亦當檢會近降取勘指揮呈白執政將上今數日之間褒貶異論甚失國體其除太僕丞指揮可更不施行癸未詔聞鄜延路新支綱馬分配諸軍頗有新兵未堪出戰例得善馬其有武藝舊人往往闕馬甚非朝廷本意委劉昌祚案驗有實即與改配仍具數以聞國子司業朱服言養士莫盛於太學而士鮮能知射今武學教場𨽻本監欲聽學生每遇假日習射從之夔州路轉運司言萬州鐡礦甚多乞創錢監嵗可收淨利三萬二千緡應副本路從之甲申分命輔臣祈雨禮部狀太常寺修定郊禮嵗夏至皇帝親祭皇地祗於北郊方丘及上公攝事儀詔依親祠北郊儀盡如南郊其上公攝事惟改樂舞名及不備官其爼豆樂縣圭幣之數史官奉祝册盡如親祠元祐五年五月十八日六月十二日七年三月十八日詔漸逼炎暑開封府大理寺繫囚令連夜併力結竟奏案上者都省限三日約法斷下舊紀書甲申詔大暑開封大理獄其趣決之新紀改云以漸暑趣開封大理決獄丙戌詔祠部具去嵗給度僧牒比元豐四年孰為多少已而祠部以年數比較共多五千七百餘道於是又詔自今給度僧牒如過每年數目即未得印給先具以聞御史黃降等言往時御史皆得言事仍同定奪公事惟被詔推獄則輪差向由復置察按而御史六員分領六案故因推勘太學公事有旨令中丞同本察御史根治今後準此後既分三員言事三員領察而本臺失於申眀尚守前日指揮亦止本察御史根治故言事御史自此不預鞫獄案唐六典侍御史糾舉百僚推鞫獄訟監察御史分察尚書六司糾其過失今之言事官大率如唐侍御史之職察官乃唐監察御史之職國朝舊制有四推之名總謂之後推而三院御史皆預領焉今推鞫獄事獨付察官而近準朝旨又以六曹定奪公事亦送本案即於檢察職事有所妨廢况有失察諸司慢違朝廷常加督責兼言事御史既不預定奪又不劾獄則於簽書行遣公事全然稀少欲乞别定條制以正分守詔立法以聞已而尚書省劄子令定奪文字送本曹如合再定即送御史臺本察降又言事之最難者莫如疑獄夫以州郡不能決而付之大理大理不能決而付刑部刑部不能決而後付之御史臺則非甚疑獄必不至付臺再定若御史聮事之衆非如大理刑部必不能勝其責也近有旨定奪文字送本曹如合再定即送本察臣愚以謂與奪刑名事重體大宜仍舊衆官參定餘事則隨曹付察如此則大小繁簡皆得其稱是正疑讞罕有不當其後刑部請鞫獄言事御史輪治其定奪刑名則衆官參定餘事隨曹察從之河東路經略司言知府州折克行招納西界偽鈐轄香布通説事宜并兵馬數已令香布選擇信實人入西界招諭近上頭首歸投去訖詔香布所説兵馬數多與諸處探報不同觀其意趣蔽護夏國之寡弱今雖內向遣歸府州令使人招呼賊界頭首慮亦未是忠白却致傳泄邊界事委王居卿更詳度令郭忠紹密竊防之丁亥詔宗女毋得與嘗娶人結婚再適者不用此法詔降配禁軍營雜役卒在京可輪月刺配先殿前次馬軍次步軍司周而復始詔臣僚恩例陳乞差遣承務郎以上與減一年大小使臣減一年一季磨勘選人免試執政官依五年五月內指揮戊子權提點河北西路刑獄王子淵兼同措置河北糴便罷提點河北糴便司其糧草並令措置司計置應提舉糴便司錢鈔别樁管本司當應副糧草處逐年據數撥與轉運司嵗終具數奏以舊係提舉糴便錢撥還本志以提點河北西路刑獄王子淵兼同措置更謂之措置河北糴便司四年三月十一日始命寋周輔措置西頭供奉官閣門祗候宋眀為供備庫使勾當軍頭引見司以逮事先帝藩邸也詔昨修築蘭州智固勝如尉斗平堡子不堪守禦已毁廢其元相度保眀官李憲苗授李浩康識特放罪苗授樂士宣閻仁武所賜敇書銀絹等並追納二月丁未可考禮部尚書黃履言祀前一日致齋祠宫自來祠宫以職事相聮遂相往來况省官既有出謁之禁欲乞雖在祠宫亦不得通謁從之履謁監祭王桓而不見答故有是奏朱本削去黃履謁王桓事刑部言竊聞京城諸門或不以時啓閉公私或以廢事欲令新城門並以日初出入時為準委開封府檢察從之前知湖州唐淑問言州郡有當衝要者例修賔客往復間有不來謗怒隨之常情未免顧私其間或以廢事吏抱案牘走道路以取決則有漏泄稽滯之失小民持訴牒趨官府則又未必知長吏所之而訟不時決況中外官守均有事任臣欲乞州郡禁謁並依在京百司例詔詳定重修編敇所立法後編敇所乞知州通判縣令非假日不得出謁即謁親屬及職事相干并泛遣使命或知州通判提舉官鈐轄以上者聽西上閣門使果州刺史謝麟言先準朝旨撥托口小由貫保豐山四寨并若水倉𨽻屬誠州緣沅州與誠州元自梅口為界今因割移四堡遂以洪江口為界自洪江口至梅口江約三驛又從托口寨盧陽縣界至梅口江約四驛削取沅州封守附益誠州太廣不惟沅州户賦人兵不足以成郡兼誠州見招約上和潭溪等洞自可以開拓疆封兼結狼九衙等諸洞並在托口寨西南見𨽻沅州水陸道皆出托口寨設或溪洞入冦誠州地逺力不能制沅州又為托口等所隔難便措置或以生事乞以小由托口兩寨依舊𨽻沅州以大由等溪洞割𨽻誠州從之麟時知沅州經制宜州溪洞見正月三十日七年五月十一日八月一日六年五月十三日詔應合移配廣南荆湖福建江南路罪人並配登州雜役庚寅以畿內旱御崇政殿疏決繫囚舊紀書此事於辛卯新紀依實録在庚寅户部言知瓊州劉威相度瓊州昌化萬安朱崖軍民户鄉村坊郭第一至第三等每丁逐月鹽一斤第四第五等及客户僧道童行每丁逐月半斤不以日月為限嵗終買足遇有死亡開落進丁收上看詳所配賣鹽數太多欲乞兩等鹽各減半餘依劉威所定從之詔雍王皓曹王頵乞建外邸十餘年中已數十奏雖數以朔望入侍寶慈宫非便諭止之而確然堅請不已皇太后近亦屢以為言且命如其請宜依所乞令學士院降詔宣諭仍令有司度地以聞已而工部言相視城北馬軍教坊可建第從之辛卯召輔臣觀麥于後苑詔陜西轉運司聞春秋闕雨守臣祈禱未應宜更訪名山靈祠委官恭致朝命精意祈禱御史楊畏言中丞舒亶不罷學士院厨錢事大理寺劾百餘日聞奏案已具而卿丞執議不同留章未決臣竊惟亶所受供給之物皆有文籍宜無諱匿不承之理有司必緣都省彈辭參驗證左經涉時月今宜得其情實豈容復有駮議則是必欲變動獄情而隂懷傅會觀望之意乞垂省察無使留獄以害國體朱本削去壬辰楚棟隴堡賜名通西寨𨽻通逺軍癸未內殿承制閣門祗候李阿邁為內藏庫副使以隨李浩出界斬獲首級故也阿邁忠傑子見閏六月丙子詔撥京西提舉司錢二十五萬緡應副蘭州市糧草范純粹言今體量得种諤未死以前奏請皆是徐勳裁處勳已放罷詔張汝賢麥文炳於延州置司劾勳限十日具案以聞四月二十日八月二十一日十月二十五日詔陜西轉運提舉司熙河蘭會路經制司乘豐熟相度州縣城寨緊慢各限以數自委官收糴每月逐司各具數以聞甲午大理寺上大理正杜純妄議客礬事案當不應言上官減公罪笞該疏決詔杜純特追一官勒停將來敘復永不令典刑獄四月二十五日御史黃降言準六察敇諸彈奏文字本察官與丞知雜通簽即舊所領任內事丞知雜免簽書諸案互察看詳諸案互察止謂察官有舊領任內事合彈劾於義有嫌理當互送今諸案元未嘗承受互察妨礙事既不相關無從察舉若一案有失泛責諸案乃是一官兼有六察之責恐法意本不如此其大理寺見取索互察官吏姓名未敢供報詔自今諸案申臺移察應申不申從私坐其互察仍除之左司郎中吳雍言陜右夏田豐稔自軍興以來倉廪空虛乞民間欠負並許以糧斛據市價增分數折納詔所增不得過一分仍候今秋酌度豐熟次第更取旨熙河蘭會路制置使司言西賊犯蘭州破西關殺管勾左侍禁韋定并虜略和雇運糧于闐人并橐駝詔贈定文思使依永樂例推恩所虜略于闐人畜令制置司優恤之乙未詔蘭州展築北城其南城若依舊則城圍太廣難於守禦若平居多置守兵又耗蠧糧食候展築北城將畢即廢南城熙河蘭會路經略安撫司乞降空頭宣三百從之詔涇原路京東第八將梁用副將趙濳各罰銅二十斤坐部卒常斌指斥乘輿語切害不可録奏經略司以聞故也河東路轉運司言昨自軍興以來費用浩瀚又新收復葭蘆吳堡寨增置官屬及屯兵馬支費倍多近被旨令用鈔廣謀入糴但本司闕錢支用乞依常平例接續支降見錢京鈔三五十萬貫依例加饒庶可召商人入便計置糧草詔宜依年例給末鹽錢京鈔三十萬緡丁酉陜西路制置解鹽司言詢訪並邊鹽價長增乞許本司隨宜增價出賣候邊事寧息裁減從之鄜延路經略司言蕃弓箭手副指揮使齊欽斬先走投西界探事人副兵馬使瑪伊克首詔齊欽賞絹二十匹遷兩資戊戌三班借職王恩普等六人差監在京間慢庫務門及舊城門西第一第二班蕃敢勇三十六人與茶酒新班殿侍皆种諤破米脂寨所納降蕃樂人召見奏樂於崇政殿故也詔都水監增置丞一員又詔沅州公使錢嵗以千緡為額涇原路經略安撫使司奏乞差永興軍兵馬鈐轄种診充本路都鈐轄兼第一將并种診腳色詔种診年齒已髙筋力疲曵難當將領差遣令本路經略司别選官聞奏密記二十三日事己亥分命輔臣謝雨庚子西頭供奉官閣門祗候溫杲知融州詔荆湖南路轉運司應副造上京甲葉二百七十萬并造廣東甲葉四十七萬計工料錢三十五萬緡其以封樁闕額禁軍錢撥還之鄜延路走馬承受霍丙言永樂川諸將與賊接戰第二將李浦部人馬出走不策應鬪敵致副將髙世才陷沒今其兄世亮已具論列詔坐走回因依及安存放罪指揮并髙世亮於經略司所陳狀令范純粹劾實以聞九月十一日辛丑詔銓試中上等二人第一人循一資第二人占射差遣中等七十三人不依名次注官下等百七十一人注官壬寅右正言王桓言聞大理寺獄官多不親訊囚惟囚初到當官收付終至結案或不復見榜掠詰訊一委吏胥非理陵虐無所告訴聞頃者有丞拷囚致死而長二以不與獲免自是以來官屬不復親事陛下建長立二設正陳丞豈欲使之偷脫自便避責不居伏望懲革詔大理寺自今並依條格施行癸卯賜度僧牒百四十修保大軍城詔賜資州孝子支漸粟帛漸資陽人熙寧間喪母纍年始克葬因廬墓側日三時號墓時膝行負土培墳初有雙白雀徘徊松上眀年有狸一馴墳側觀漸上土又眀年夏每行午禮日色炎盛輒有隂雲蔽覆即遇霖雨方負土時亦暫霽又有異鳥一目如丹至漸哭常悲鳴向漸夜有狐狸二呼繞如巡警狀久之有羣鳥集內一鳥白獨日至漸培墳處回旋後有五色雀萬餘隨漸行哭七日而去是時漸已年七十每號慟涕泣如雨日惟食脫粟飯不盥手濯足所衣苴麻至爛碎鬢髮亦皆斷亂見者為之惻楚其居鄰勾氏子自娶妻即棄其親不養觀漸至行因夫婦感慟即日迎其親還舍朝夕視膳不少懈州縣上其事以為漸精誠格物諸祥屢至變其里俗乞旌賞之故有是命是月夏人冦麟州知州訾虎敗之新紀有此蓋因六月辛亥河東經略司奏也舊紀乃係之六月辛亥六月乙巳朔詔御史臺六察案各置御史一員新紀書此舊紀無之太常寺言四后升祔欲準慶歷五年孟冬章獻眀肅章懿三后升祔禮畢遍饗太廟止行升祔饗禮及祭七祀權罷孟冬薦饗又禮部言四后升祔太廟祏室欲以配繼先後為序詔並恭依閏六月三日丁丑七月十二日乙卯詔京東路轉運副使吳居厚具所知通判以上及别路鹽司提舉官可充本路轉運司官協力推行鹽法者及本路行鹽法當選委知州通判以聞五月一日户部言元豐三年諸路管勾官無優等止有劣等三人萊州通判郭槩權濠州團練判官王舜臣鎮戎軍判官趙至詔並降一任丁未知宣州陳侗乞沿江湖州軍各置水軍三五百人以巡檢主之教以水戰當責巡捕詔應已招置土兵巡檢地分如有江河海道令申所屬具舟教戰詔邵州芙蓉石驛等團洞歸眀蠻頭首等與補名目人數並依熙寧九年招納三州一鎮蠻例禮部言祠部給度僧牒準詔及遞年數即止案元豐三年六千三百九十六四年四千一百九十六五年九千八百九十七今取酌中之數欲以三年為額從之大理寺言河東轉運司上部夫官逃死三分五分以上各該德音原免然以屬軍制乞更取旨裁斷詔絳縣王君陳等八人各罰銅三十斤殿直張整等十人各二十斤供奉官焦清等十三人各十斤借職胡奭八斤戊申詔集議大典禮令祕書省長二預議尚書左司言户部被旨已差使臣劉從正吳祐為主事其元奏乃不言見有權主事劉質等而妄作見闕今質未該出職而又遽授以班行皆為失當詔尚書安燾罰銅十斤侍郎陳安石八斤郎中金部朝端彥倉部韓正彥度支陳向六斤劉從正吳祐並依舊劉質梁士永與出職依年月展磨勘户部言乳香民間所用乞依舊條給長引許商販其諸路賣官香亦用舊法從之廣南西路經略使熊本言知宜州和斌通判黃陶相度宜州思恩天河河池龍水等縣所管土丁七千餘人遇有賊盜緩急可以追呼兼普義德謹思立鎮寧四寨控制蠻賊所出入路欲令所屬縣編排土丁分作都分除逐隘舊防托土丁外各增三十人其非防托者遇有盜入省地並許緣邊縣及州追呼遣人部領會合捕殺又言已差提舉左江都巡檢供奉官閣門祗候成卓及監填乃金坑朝奉郎鄧闕同至永平寨約安南定地界依詔以計議辨正疆至所為名並從之七月八日辛亥八月二日乙亥七年五月十二日庚戌奬諭開路功八月七日令成卓供析權發遣鄜延經略司劉昌祚言禁軍逃亡詐為廂軍投換或却投禁軍捕獲或因事敗露乞依本軍法從之又乞自今諸軍逃亡事故其所遺鞍馬許有馬與闕馬人比較武藝內優者與善馬及監牧司所給新馬亦準此從之仍下陜西河東路後昌祚又言案試諸將下新招簡及投換馬軍各請綱馬人數內有將下新招土兵十一人武藝劣等已改給與本將下有武藝闕馬舊人詔以武藝劣等者名下馬通一路簡試有武藝人改給又詔昌祚詳度每十匹以七匹改給武藝髙強人三匹給第二等武藝上名誠州團練使提舉崇福宫李評卒以長大公主孫特贈冀州觀察使賜銀千兩評少頗涉書傳嘗以公主遺奏召試學士院改殿中丞評意不滿辭之後二年再召試復止遷一官評愈不悅至上書辨論前後言事甚多或見施行然天資刻薄在閣門樞密院招權不忌多布耳目采聽外事自效以為忠僥幸大用中外側目及卒人無憐者制置發運司言本司元豐二年被旨賜糴本以一百萬緡為率至今截撥未足況每年總般江淮荆浙六路上供年額六百二十萬石逐路出限不到萬數甚多全賴糴本錢乘時和糴起發上供應辦年計令淮南催促錢帛所牒會問數目本司以無聖旨難議供報然恐其别有申陳詔糴本錢係朝廷特賜今不得一例起發熙河蘭會路經略安撫制置使司言據同總領熙州蕃兵將王贍狀亡父君萬因孫迥言張穆之違法結糴為亡父尚欠六萬餘貫計算折會外計錢二萬三千餘貫贍曾於元豐四年五月內登聞院進狀乞將經制司功利與子轉一官及遺表特與二人恩澤折除上件見欠錢蒙中書判狀不行贍自軍興以來纍立戰功實為出衆所欠錢物無從可得伏望俯矜君萬開拓戰功及贍今來纍立勞效將其家業正行估納入官上批宜檢會元豐四年五月內王贍再進狀陳乞事理特依所乞施行此據御集蓋李憲嘗為之請今冉為之請也君萬卒在三年五月三日己酉詔通直郎試御史中丞權直學士院舒亶免除名止追兩官勒停奉議郎守監察御史頓起衝替係事理重御史臺太府寺官吏以疏決釋之初亶不曉法意誤謂當别置録目因言尚書省不置録目不奉法尚書省辨論既眀亶猶固執他日上諭都省令取亶臺中所置録目必無之亶果不置仍以他簿書增寫録目字與寮屬書押送都省坐此被劾又學士院公使時悉罷而亶輒以本院厨錢自給復坐計贓杖九十兩案具奏上諭近臣曰亶學士院自盜贓罪情至輕而法重其詐為録目乃法輕情重身為中丞詐妄如此不可恕也於是詔亶歷任職事官及知制誥並不為官宜追寄祿兩官故有是命起以阿附亶言録目事不實故亦黜之亶本傳云異時學士革制月給油燭亶承故例取之事下大理初謂誤用法官吳處厚駮之卒抵置罪實録乃不載吳處厚駮案事當考舊紀書中丞舒亶輒用公使坐贓追官勒停田晝作王安禮行狀云三省既建臺諌官頗言省中書至有不當而被斥者時舒亶為御史中丞亶性傾覆有姦雄才而內實暗不曉政事數為舉劾以自逞氣焰灼然見者側目而心獨憚安禮嘗上疏言事其辭有執政官喜為虛語以籠士大夫者意乃指王圭以眀不為安禮發安禮以謂亶姦人身執法言執政大臣豈冇遷就而為疑詞者亶又言尚書省不置録目有旨案責其罪安禮曰尚書省有發放歷録其事目以付法曹不曰録目乎亶曰録目行下始為發放此固非元法安禮曰願得御史臺録目以為式亶視臺中所用歷乃與尚書省同即謬為臺歷注録目字於其首安禮知其姦乃以狀彈之并劾其直學士院冒用公使物有詔雜治獄成具得其贓妄狀安禮奏上曰亶所坐冒用公物則贓輕而法重注録目則事微而情惡願陛下斷而行之以警冇位又曰臣觀陛下行事時輕時重一屈一伸上曰何謂也安禮曰陛下每謫言事官則疑臣等太申以故裁抑執政而亶等乘間敢肆詆欺臣望陛下視理如何循法所在雖百屈百申臣之願也上曰亶論如法于時多右亶者故安禮特為力爭之辛亥詔提舉陜西買馬司更不兼茶場司其博馬茶每馱減價二千更不撥還許為茶場司課息其買馬司所用茶價限嵗終還足四月戊申可考河東經略司言五月西賊入麟州神堂寨知州訾虎等領兵出戰有功詔虎自今毋得輕易出入遇有冦止令裨將出兵掩逐新紀五月書夏人冦麟州知州訾虎敗之舊紀仍於六月辛亥書此今兩存之壬子朝散郎前權知登州趙稱為京東路轉運判官從吳居厚薦也或附正月庚子淮南轉運提點刑獄司言濠州定逺縣尉賈棠以體量愚暗不曉事差替自體量後親捕獲強竊盜四夥乞許令滿任除落差替從之癸丑禮部尚書黃履試御史中丞時大臣有罪罰金履奏賈誼言遇之以禮則羣臣自喜嬰以廉恥故人矜節行羣臣且然況大臣乎故罪在可惡黜之可也可恕釋之可也豈可以罰金而示辱哉時侍郎以下不許獨對殿上著在甲令履言陛下厲精政治博訪得失雖郡縣被召官猶令獨對況法從之臣哉請刋此令此二事據履本傳附初拜中丞時當考從違御史翟思言事有旨詰所自履諫曰御史以言為職非有所聞則無以言今乃究其所自來則人將懲之而臺諫不復有聞矣恐失開言路之意事遂寖此亦據履本傳詔御史中丞門下中書外省官各舉人材堪充言事或治察御史五員詔通直郎右正言王桓罷右正言送尚書吏部宣德郎監察御史翟思楊畏並放罪桓嘗論舒亶罪名不當思與畏亦嘗論列及亶既黜桓等皆待罪故有是命給事中韓忠彥乞以繪像恩增差弟粹彥監相州酒稅詔韓琦有功於國非他臣比特依所乞令吏部自今常授其家子孫一人相州官仍别推繪像恩乙卯詔近以炎暑開封府大理寺繫囚已令督責官屬併力結竟其諸路令刑部指揮提點刑獄司催督檢校禮部尚書南丹州刺史莫世忍為檢校户部尚書給銅牌旗號其子姪九人並賜官勳以經制宜州謝麟言大軍討安化蠻獠世忍獻木弓百弦二百藥箭五千自言世為外臣修貢不懈故有是命河東路經略司言葭􅀢寨巡防兵逢賊以衆寡不敵致陷沒末敢依陳不勝法施行詔陳亡人惟將官使臣等分陳勝陳負諸軍用陳勝例一等推恩涇原路經略司欲以照管修築故寨堡為軍形誘致賊馬近邊令姚麟等掩擊或伺便出寨討襲詔塞內誘致賊馬或出寨討擊並委經略使盧秉便宜施行御集六月十一日措置河北糴便司奏昨準朝旨於瀛定滑三州計置修蓋倉厫今真定府有客人結攬木椽一十七萬餘併已借過官錢就山場採造今若不行收買切恐借錢故難便拘收伏乞朝廷早降指揮更於甚處度地修蓋御批先令契勘北京見管倉舍廣狹丈尺并確的可盛貯斛斗數目畫圖奏聞候到同今狀進呈取旨按四年九月二十三日已修北京等處倉或此御批當係四年六月十一日今附見當詳考三州修倉乃四年四月二十八日今年閏六月十七日賜度牒修北京倉丙辰廣信軍言北界西南靣安撫司纍牒問置教場所因本軍已移牒稱所指處乃村民莊舍昨以兩朝通歡之意已曲令廢毁然莊舍深在當軍界腹內就使是村民習射之所築立墻院修置射垜於信誓全非違礙兼於北朝了無干涉豈煩較辨已而回牒稱自兩朝通好以來戒約緣邊州軍不得創生事端今起築教場練習軍伍有違信誓深為不便請速毁廢及責問生事官吏重加誡斷詔觀其來牒辭理已屈勿更回報時朝廷方經武事增修邊備趨時者爭獻北伐之策吕公著至定州即為上言中國與契丹通好久邊境晏然無事塞上屯軍亦素有節制惟宜靜以鎮之又嘗因走馬承受入都附奏前説既回傳上語諭公著曰邊陲誠無警更須逺斥候廣偵伺以為之防保甲法新行被邊皆設教場日鳴金鼓課人誦戰法聲逹於敵境檄邊郡以為生事違誓約上委公著處其事且賜手詔曰近以北界理會團教場已委卿處置聞奏卿可審為斟量務在事體適中外不致張皇堅敵之疑內使州縣公私無繁擾遷徙傷財之弊且不啓貪冦緣而生事之害乃朝廷意也公著即上奏以為古人之治兵農有疆以周索者有疆以戎索者今遣邊人習戰法於境上尤非宜且非管子寄令之意也請一切罷去專以舊弓箭手法從事不聽河東路轉運司言準朝旨令本司計置糧斛一十萬石於吳堡寨永寧關以備陜西米脂等處支費已依數計置訖却乞以絳州垣曲縣錢監所鑄見在錢數撥還從之丁巳提舉河北路保甲狄咨言衛州逺年牧地乞並撥屬牧地官司拘籍以租課責轉運司從之仍令自元豐元年管認送納詔知渭州盧秉落寶文閣待制降直龍圖閣差遣依舊先是詔秉據本司言近西賊入乾興寨界壕及第六副將向用賢言因孟皓發兵稽遲致不能取獲全勝然本路自去冬以來賊數入冦無不得志而去及令部分兵將伺便酬復又多説事端遷延畏縮不敢應詔鼓勵兵將追討仰具析以聞已而秉言昨令劉昌祚以將下選兵結成陳隊措置一行事法方欲進討忽準詔夏人遣使在境本路兵將未可施行而臣之愚心亦以兵須完養出必萬全非敢故為遷延上違聖訓而熙寧乾興隆德冦入相繼不能有所斬獲蓋臣書生不習軍事臨機防慮過當實不敢稽違詔旨臣不能保護邊防罪已眀白伏望哀憐八十老父免從吏議重行黜責故有是命詔大理寺刑名疑慮及情法不稱奏裁公案送定斷官看詳如非疑慮情法不稱並免收坐從本寺請也元豐間詔大理兼鞫獄所承內降公事上下皆曰是詔獄也意必傅重少卿韓晉卿獨持平核實無所觀望人以不寃上知其才凡獄難眀及事繫權貴者悉以委晉卿尚書省建擢刑部郎中天下大辟請讞執政或以為煩將劾不應讞者晉卿適白事省中因曰聽斷求生朝廷之心也今讞而獲戾讞不至矣議者或引唐覆奏欲令天下庶獄悉從奏決晉卿曰法在天下而可疑可矜者上請此祖宗制也今四海萬里一欲械繫待朝命恐罪人之死于獄多于伏辜者朝廷皆從之此據韓晉卿傳蓋因劉摯墓志也戊午知青州龍圖閣待制鄧綰試禮部侍郎於是給事中陸佃韓忠彥封駮綰命言綰姦回頗僻使典邦禮恐玷清選詔罷之編修天文書所上所修天文書十六卷乞本監收掌外仍頒降翰林天文院測驗渾儀刻漏所從之彭孫言涇原路蕃兵皆富有出入止是雇人僕從軍蓋舊無正官管轄遇軍行始差將副人心不相諳故難指呼乞差蕃官兩員及諳事將官同管轄處置庶皆得素養之兵為用詔經略司看詳立法已而經略司奏漢蕃弓箭手兵馬從來係第二至第十將統領訓練别無不便難以更差蕃官從之已未詔京東路新行鹽法上下交便不妨獲利公家以佐用度推之河北路無可疑者可令蹇周輔李南公於界首約吳居厚靣授京東成法行之此年十月一日可并此元祐元年正月二十八日依舊通商詔以河東經略司招降西夏首領二人瑪克密巴勒為內殿崇班策多克新為三班奉職庚申知沅州兼管勾緣邊安撫司公事謝麟奏臣昨開拓新歸眀溪洞置小由寨豐山堡寨主并巡檢臣奏乞選舉使臣準尚書省符內外官司舉官悉罷至今又已一年未蒙差到欲乞特許臣或本路鈐轄轉運司舉官奏詔特令謝麟時奏舉一次五月十五日七年七月四日八月一日辛酉詔京東路轉運副使吳居厚已發本路增賸鹽錢納北京左藏庫居厚謹於營職敏而有功可降敇奬諭五月日詔右司郎中楊景略乞左右司官依樞密都承旨例禁謁從之景略又嘗言尚書郎有非才望者乞令長官舉不放上或門止故事訖不行景略已見偕孫忱子韓絳女壻此據本傳門止蓋唐故事本傳實因蘇頌所作景略墓志壬戌詔提舉陜西買馬司選三千匹赴涇原路其應副熙河路馬權住支詔吏部四選應犯罪合入逺及逺小處監當差遣人並不許敘祖父母父母老疾指射家便差遣北京留守司河北都轉運司言館陶縣在大河兩隄之間欲遷於髙固村以避水公私以為便從之知登州趙稱乞諸縣主客不及萬户補醫學一人萬户以上二人每及萬户增一人至五人止除合習醫書外兼習張仲景傷寒方書委本州差官補試依得解舉人例免丁贖罪詔禮部立法其後禮部奏諸醫生京府節鎮十人內小方脈三人餘州七人小方脈二人縣每一萬户一人至五人止三人以上小方脈一人遇闕許不犯真決人投狀召保差官於所習方書試義十道及五道者給帖補之犯公罪杖以下聽贖大方脈習難經素問張仲景傷寒論兼巢氏病源二十四卷小方脈習難經兼巢氏病源六卷太平聖惠方十二卷遇醫學博士助教闕選醫生術優效著者充從之知沅州謝麟言管勾機宜文字葉安節等撫納諸蠻宣力為多今蒙賜帛視他賞若未均伏乞比類謝季成推恩詔葉安節減磨勘三年范天益循一資魏洙充試其支賜追收五月戊子庚申七年五月一日詔以永興軍廣教禪院沒官田三十餘頃賜府學養士癸亥詔寺監主簿職事止是專典簿書其公事自當丞已上通議行之今軍器監輒差按閲廣備事藝其官吏特放罪令諸寺監依此遵守甲子提點河東路刑獄黃亷言嵐石等州流移岢嵐軍民户準詔發遣還鄉訪聞流民昨為久雨全損秋田故暫來就種一夏苗麥乞限一月畢田事如允所請其山軍亦乞依此從之仍令亷詣兩軍安集之黃庭堅作亷行狀載此尤詳當刪取之乙丑詔諸路管勾機宜文字及勾當公事並禁謁兼同提舉成都府等路茶場郭茂恂言昨準詔專提舉買馬兼領茶事而茶場司不兼買馬既不任責遂立法以害馬茶價每馱有增十餘千者恐蕃馬嵗不入上誤國事乞併茶場買馬為一司庶幾茶司同任買馬之責四年七月四日茂恂専提舉買馬兼茶場五年十月丙辰但稱奉議郎不稱職任朱本貼簽此云取到户部文字不見茂恂此奏緣見今茶場買馬各為一司即是元不曽施行合刪去新本復存之丁卯詔户部移置錢萬緡均與永興秦鳯路提舉司戊辰吏部言新授岷州大潭縣主簿余宗道母年八十七嵗以上道有疾乞侍養凖敇應注陜西見闕不得乞尋醫侍養長假詔依余宗道所乞專差同提舉開封府界教閲保甲劉琯言開封府界及滑州諸縣保甲元養馬五千匹死損千九百餘匹已催納價錢萬緡乞專委官往來買馬其未納錢亦可就令督趣應副詔吕公雅其買到馬送劉琯從武藝髙者先給之吕公雅時為何官十二月甲申以同提舉保甲言事公雅夷簡從子政和三年十月有傳己巳詔廢罷監收縻費封樁錢物令樞密院承旨司專根究主領餘應封樁錢物令尚書都司取索置簿拘管初中書差堂後官置簿掌封樁錢至是官制既行分𨽻焉龍圖閣直學士權知開封府王存言三院獄空詔開封府官吏並依元豐五年推恩舊紀書開封府獄空新紀削去上批牧馬重事經始之際非左右近臣專總其政隨事奏稟付之有司未易營辦自今霧澤陂牧馬所造法且於畿內置十監俟其就緒推廣諸路施行可差樞密都承旨張誠一副都承旨張山甫專提舉經度制置牧馬條畫奏稟施行依五路保甲例權不𨽻尚書駕部及太僕寺有當自朝廷處分者樞密院施行辛未詔其災傷處第四等以下户闕乏糧種雖非給散月許結保借請雖有欠闕亦聽支給限一年輸納仍與免息壬申詔刑部郎中杜紘罰銅八斤展磨勘二年初邵武軍奏讞婦陳與人姦謀殺其夫已定其夫醉歸陳不鍵門姦者因入殺之法寺當陳謀殺從而不加功而紘議陳加功罪應死不疑又興元府奏讞梁懷吉聞出妻朝病往視因寄粟種朝子輒取食之懷吉毆其子死法寺當朝子盜粟懷吉當雜犯死罪引赦原而紘議朝子食懷吉粟乃受寄輒費用不入捕法議既不同下御史臺定奪御史臺言刑部駮議皆不當故罰及之三月辛酉可考詔應緣信使往還率民治道計其所役日與折春夫從接伴遼使賈青請也癸酉詔宗正等修玉牒合照用日歷所文字並指定所書事令本所節録其關防漏泄並依日厯所法
