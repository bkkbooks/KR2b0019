body:
  text: 續資治通鑑長編卷一百五十一宋李燾撰仁宗慶厯四年秋七月癸亥詔以冬至有事于南郊羣臣毋得上表請加尊號甲子燕王宫火丙寅降知石州洛苑副使劉舜臣為禮賔副使坐盜用公使酒醋法當死上以邊臣特寬之丁卯詔廣西轉運安撫司出榜宜州有獲區希範正辭䝉趕者人賜袍帶錢三十萬鹽千斤戊辰賜鄜延路部署王信等器幣有差初知延州龎籍於吳朝谷創石觜堡而西賊嘗以兵二千餘人來冦信等擊却之故有是賜辛未命知制誥田况提舉河北便糴糧草梓州路轉運司言瀘州教練使生南招安將史愛誘降淯井監夷賊㪷敖等請並補三班差使殿侍淯井監一路招安巡檢從之壬申殿中丞蔡挺管勾陜西河東宣撫機密文字范仲淹請之也挺詭譎多計人莫能得其情實每持仲淹等機事泄於吕夷簡以自售云此據墨史附傳賜修水洛城禁軍及弓箭手緡錢癸酉詔諸告本營結集逃叛而當遷擢者徙𨽻别指揮先是同判太常寺吕公綽言文王之妃曰文母宋共公之妻曰共姜詩稱莊姜宣姜皆以諡從夫也然則古無先夫作諡之文自漢晉隋唐而降歷舉后諡多冠以帝號不然則參同一字惟聖朝循稽作諡之典追合從夫之義祖宗之后共此成法若僖祖諡有文獻后曰文懿順祖諡有惠元后曰惠明翼祖諡有簡恭后曰簡穆宣祖諡有昭武后曰昭獻太祖諡有大孝后曰孝明孝惠孝章太宗諡聖德后曰懿德昭德元德淑德先帝在御特諡二后曰莊懷莊穆及上真宗文明武定章聖元孝之諡而郭后升配即當協參徽號而追正之時無建請莫復典章逮夫奉慈尊名繼循前失况莊穆神主合祔本室名無所屬理固未安宜列繫於丕稱式增隆於大行兼詳乾德禮例改諡明獻皇后故事伏請改上真宗皇后諡皆為章下兩制學士太常禮院議而翰林學士丁度等言公綽所引前代皇后皆從帝諡然漢之帝諡主於一字與本朝名號不同真宗五后祔廟日久神道貴靜難從改諡之禮既而公綽復言真宗五后尊諡終未合典法宜於郊禮前遣官先上寶冊庶循先朝加上六后尊諡故事丙子有詔恭依禮院言乾德中改上昭憲皇后諡中書門下特請改題是時禮官以為不可及祥符中增上六室帝諡天聖初又增上真宗武定之諡止告廟更不改題實為得禮遂如故事戊寅封武勝節度使同平章事馮翊郡公德文為東平郡王寧江節度使允讓為汝南郡王蘇王元偓子安化留後允弼為北海郡王燕王元儼子鎮國留後允良為華原郡王吳王德昭孫左屯衛大將軍逹州刺史從藹為頴國公岐王德芳孫左屯衛大將軍雅州刺史從煦為安國公齊王元佐孫左千牛衛大將軍池州團練使宗說為祁國公昭成太子元僖孫右千牛衛大將軍宗保為建安郡王華王元稱孫右千牛衛大將軍宗達為恩平郡王邢王元傑孫右屯衛將軍宗望為清源郡公上始用富弼議次第封拜宗室以德文屬尊且賢方漢東平王蒼故封東平仍詔德文等十人並列本班之上少前實録云燕王既薨祖宗之後未有封王爵者議者以為自三代以來皆建宗戚用自承助請次第封拜之按議者即富弼河北守禦十二䇿之一也今正言之德文秦王廷美子允讓潤王元份子二人並已前見更不表出德文皇叔允讓及允弼皆皇兄允良皇弟從藹以下六人皆姪今皆削去其得封初不緣服屬故也又從藹舒國公惟忠子從煦髙平郡王惟敘子宗說密國公允言子其得封自以祖故不以父故今亦不復言己卯復四方館使果州團練使張亢為引進使并代副都部署兼知代州兼河東緣邊安撫事壬午降空名宣頭百道下陜西河東宣撫使范仲淹以備賞功癸未契丹遣延慶宫使耶律元衡來告將伐元昊其書略曰元昊負中國當誅故遣林牙耶律祥等問罪而元昊頑獷不悛載念前約深以為愧今議將兵臨賊或元昊乞稱臣幸無亟許其實納契丹降人契丹討之託中國為名也參知政事范仲淹言臣竊見契丹來書志在邀功勢將搆難還答之際尤宜慎重一書中言元昊名體未順特為朝廷行征討其邀功之意又大於前若許他此舉將來何以禮報此一難也一書中次言請朝廷絶元昊竊觀元昊所上書削號稱臣名體頗順雖未為誠信茍遣人來納誓書朝廷何辭以拒之元昊昨來納欵尚不肯言契丹指縱朝廷豈可言契丹之意以拒其和如無名而拒則我自失信而從契丹之請此二難也一元昊於契丹從來未聞有不臣之狀或實於他邊界曽有相傷况止是三二百户彼亦自可問罪何故便要朝廷絶元昊進貢若朝廷因而從之茍元昊不日却謝過於契丹契丹又納其請則與元昊依舊相連我與元昊怨隙轉大朝廷一失其守長四裔輕中國之心此三難也一契丹今來逼朝廷絶元昊之欵我若不敢違拒而遽從之將來契丹却稱元昊已謝過設盟更不討伐却逼朝廷與元昊通和是朝廷已失所守豈能更抗契丹之辭此四難也一朝廷若以契丹之故阻絶元昊大信一失將來却以何辭與他和約縱巧能設辭元昊豈肯以前來所訴屈伏於朝廷必乘我之失大有呼索此五難也一元昊或納誓書既不可阻今契丹所請或即阻之誠朝廷之所重也然契丹元昊本來連謀今日之情未可慿信臣請朝廷建捍禦之謀以待二敵不必求二敵真僞之情邊事如此恐誤大計又言契丹來書稱朝廷曽請契丹止遏元昊今聞名體未順遂舉兵討伐又請朝廷絶元昊進貢契丹安肯為朝廷特舉大兵以討元昊此不可信一也若自與元昊有隙必行討伐其人使即合堅請阻絶元昊何却只問楊守素往來次第是無必討伐之意此不可信二也余靖等言見北主親言須指揮夏州令楊守素入南朝勾當必是動有關報今來敵使却言北朝並不知仔細此不可信三也萬一契丹必有深隙須行討伐必堅要阻絶元昊豈暇問於南朝名體順與不順顯是契丹虛稱為朝廷西征駐重兵於雲朔如元昊以誓書未立入寇河東亦足相為聲援得志則享厚利如元昊更不入寇納誓書于朝廷則契丹自為因行討伐使元昊入貢以此為功而駐兵雲朔以邀重報是契丹進退有利而俱為我害也臣謂朝廷今日答書則易將來禮報必難而專於致賂欲滿敵志則契丹大兵豈肯虛舉而善退願朝廷熟慮此事先且大議備邊之䇿然後遣使往來使敵知我有備無必勝之理則亦可以遏其邀功求報之心縱背盟好亦有以待之少减生靈之禍甲申梓州路運司言夷賊復寇三江寨淯井監指揮使散直王用等領衆擊走之乙酉降渭州西路巡檢內殿崇班閣門祗候劉滬為東頭供奉官著作佐郎新知確山縣董士亷罰銅八斤朝廷雖使滬士亷卒城水洛仍以滬權水洛城主終坐違本路帥命故責及之丙戌詔諸路轉運使副提㸃刑獄察所部知州軍知縣縣令有治狀者以名聞議旌擢之或不如所舉令御史臺劾奏並坐上書不實之罪從范仲淹奏請也先是范仲淹言臣近日屢聞德音以災異數見畏天罪已此實聖帝明王至仁之體也昨日宰臣等再奉聖㫖不須謝過但自行事此又濟時責實之要也臣等敢不惶恐思竭誠志以副宵旰之意臣觀自古國家皆有災異但盛德善政及於天下人不敢怨叛則雖有災異而無禍變如其德衰政暴兆民怨叛故災異之出多成禍變陛下今既畏天之戒上憂宗社下憂生靈固已得堯湯之心矣如更行堯湯之事使天下受賜其有災異適足增陛下之盛德臣待罪輔臣經年無狀四方多事未敢引退恐負君親擢用之意臣竊觀自祥符年後以至今日火不炎上之災已十數度又纍有地震之異今夏蝗秋潦人多妖言雖陛下修德罪已自可以動天地感鬼神而念及生民若不遑處臣請行此數事少助陛下救生民之萬一惟聖心裁擇一委天下按察使省視吏官老耄者罷之貪濁者劾之懦者逐之是能去謬吏而糾慢政也至於激勸善政之術即未著明其官吏中有畏上位之威希意望進或矯修亷節而爭為猛政求集事之名者務為暴斂求盡公之稱者專用深文政尚虛聲人受實弊資産竭於科率舉動觸於刑憲生民困苦善人嗟痛此天下怨叛之本也秦以天下怨叛而亡漢以救秦之弊而興臣請詔諸路按察官除常程糾察舉薦外於轄下知州知縣縣令中别選潔已愛民顯有善政得百姓心如倚父母者各具的實事狀舉三兩人特與改官再任或升陟委用如此則天下官吏知陛下憂赤子之心各務愛民求理不為苛政足以息生民之怨叛也如所舉不實仰御史臺彈糾當議重行貶黜令别進呈唐時選刺史縣令條目便乞約附施行一天下官吏明賢者絶少愚暗者至多民訟不能辨吏奸不能防聽斷十事差失五六轉運使提㸃刑獄但采其虛聲豈能遍閲其實故刑罰不中日有枉濫其奏按于朝廷者千百事中一二事爾其奏到按牘下審刑大理寺又只據案文不察情實惟務盡法豈恤非辜或無正條則引謬例一斷之後雖寃莫伸或能理雪百無一二其間死生榮辱傷人之情實損和氣者多矣古者一刑不當而三年大旱著於史䇿以戒來代非虛言也况天下枉濫之法寧不召災沴之應耶臣請詔天下按察官專切體量州縣長吏及刑獄法官有用法枉曲侵害良善者具事狀奏聞候到朝廷詳其情理别行降黜其審刑大理寺乞選輔臣一員兼領以慎重天下之法令檢尋自來斷案及舊例削其謬誤可存留者著為例冊一今諸道常平倉司農寺管轄官小權輕主張不逮逐處提㸃刑獄多不舉職盡被州府借出常平倉錢本使用致不能及時聚糴每有災沴及遣使安撫雖民委溝壑而倉廩空虛無所賑發徒有安撫之名且無救恤之實又國家養民之政本在務農因民之利而利之則朝廷不勞心而民自養臣請選輔臣一員兼領司農寺力主天下常平倉使時聚糴以防災沴并詔諸路提㸃刑獄今後得替上殿並先進呈本路常平倉斛㪷數目方得别奏公事移任者亦須依此發奏後方得起離仰司農寺常切糾舉及委輔臣等速定勸農賞罰條約頒行天下茶鹽出於山海是地之利以養萬民也近古以來官禁其源人多犯法今又絶商旅之路官自行販困于運置其民庶私販者徒流兵稍盜取者絞配嵗有千萬人罹此刑禍是有司與民爭利作為此制皆非先王之法也及以官販之利較其商旅則增息非多而固護其弊未能革者俟陛下之睿斷爾臣請詔天下茶鹽之法盡使行商以去苛刻之刑以息運置之勞以取長久之利此亦助陛下修德省刑之萬一也仲淹四事因監司擇守令附見其二其三請大臣兼領刑法司農八月辛卯可考茶鹽通商訖未施行三年六月甲辰已有詔議茶鹽利害戊子徙知瀘州左侍禁閣門祗候李康伯同提㸃淮南路刑獄右侍禁劉繼英三班奉職王齊雄並遷一官康伯等皆捕擊夷賊有勞也八月辛卯命參知政事賈昌朝領天下農田范仲淹領刑法事有利害其悉條上初仲淹建議周制三公分兼六官之職漢以三公分部六卿唐以宰相分判六曹今中書古天官冡宰也樞密院古夏官司馬也四官散於羣有司無三公兼領之重而二府惟進擢差除循資級議賞罰檢用條例而已上不専三公論道之任下不專六卿佐王之職非法治也臣請倣前代以三司司農審官流內銓三班院國子監太常刑部審刑大理羣牧殿前馬步軍司各委輔臣兼判其事凡創置新規更改前弊官吏絀陟刑法輕重事有利害者並從輔臣豫奪其體大者二府僉議奏裁臣願自領兵賦之職如其無補請先黜降章得象等皆以為不可久之乃降是命然卒不果行諌官余靖言近者封建宗室藩屛皇家舉前王之令猷補當朝之闕典本支百世之盛美也風聞諸王宫皆封長孫惟吳王宫誤封次孫已有爭訴者臣愚以為宗室至親封建大事固宜詳審猶如此差錯則知天下踈逺之務誤者多矣宗室分爭不可傳聞四方臣曽為禮官頗知屬籍間事吳王德昭五子第二子惟吉追封冀王今聞冀王之子守巽最是諸孫之長有司便以冀王别為一院即推從藹為本宫之長而授封爵今若奪從藹之爵以與守巽則事同兒戲書之史冊傳之外方謬誤之譏取笑于後臣之愚計欲乞朝廷勘㑹詣實若從藹於今實吳王宫長孫則因而推恩不形過舉別以公爵授冀王之子守巽庶幾聖德無所虧損不從守巽惟吉第三子自言於今為最長故也壬辰更封洺州團練使守巽為頴國公甲午樞密副使富弼為河北宣撫使先是輔臣奏事垂拱殿帝面論之曰北敵受禮雲州恐遂襲我河東兩府宜設備弼退而上言臣誤荷奬擢無所施設致此外寇上煩聖慮聞命震驚不遑啓處然退自思念僅得粗略竊謂契丹必不寇河東其事有九無名一也動稱王師不肯竊發二也河北平坦可以長驅必不由河東險阻而來易入難出三也河北富實河東空乏必不肯擊虛乏而驚我備富實之地四也河北無備河東有備以北敵萌南下之心久矣臨事必不肯捨無備而寇有備五也若欲乘我不測而入當行詭道出於倉卒必不肯先報雲州受禮六也契丹始與元昊相約以困中國前年契丹背約與中國復和元昊怒契丹坐受中國所益之幣因此有隙屢出怨辭契丹恐其侵軼於是壓元昊境築威塞州以備之而岱爾族纍殺威塞役兵契丹又疑元昊使來遂舉兵西伐驗之非詐今必無㑹合入寇之理七也契丹惜燕地如人惜心腹若寇河東豈不防攻燕為牽制之術于今不聞備燕八也契丹自得燕薊不復由河東入寇九也臣驗此九事故知契丹不寇河東必矣今臣但論目下不為河東之患過此以往則非臣所知臣謂契丹異日之禍獨在河朔河東只可為牽制之地所以臣近奏河北守禦之䇿因乞守二要郡自行其事下二府議之未合只欲且令田况往彼按臣所說此乃平時悠悠所為非今來確乎至急之意也河朔一二年來雖名為設備其實未堪禦寇乃是張備豫之虛聲適足重敵人之奸計為患愈大不可不思臣前嵗奉使契丹理當無所增賂蓋為朝廷方盡力西鄙未遑北事於是忍羞自屈嵗益所入聊以欵兵緩禍而望雪恥於後也臣今所乞必願俞允不惟訓兵備敵以安元元至於身羞國恥庶幾可刷於是命弼宣撫河北其實弼不自安於朝欲出避讒謗也此月甲子田况往河北在弼宣撫後七日不知弼何以先言之蓋當時已議定遣况而弼又乞自行也保州廣信安肅軍自五代以來别領兵萬人號緣邊都巡檢司亦曰䇿先鋒以知州軍為使置副二人析所領卒為三部使援鄰道太祖常用之有功詔每出巡别給錢糧以優之其後州將不復出內侍為副數出巡部卒偏得廩賜軍中以為不均通判保州祕書丞新昌石待舉獻計於都轉運使張昷之仍請合三部兵更出入季一出即别給錢糧餘悉罷仍請以武臣代內侍時楊懷敏方任邊事尤不悅巡檢司雲翼卒揚言為亂知州如京使興州刺史劉繼宗心不自安乃悉令納私所置教閲器仗㑹都監韋貴與待舉彎弓賭酒而衆辱之貴慿酒慢罵曰徒能以减削兵糧為已功因激其衆是日給軍衣衆遂劫持刀兵入牙門待舉挈家上城出東門入無敵營㑹繼宗亦挈家至與待舉列無敵兵守關城率神衛招收兵却入東門以拒亂兵既而轉鬬不敵繼宗待舉復上城避之遂自下城繼宗渡城濠溺水死待舉藏鹿角中為亂卒所害衆怨待舉甚揭其首衆射之又疑走馬承受劉宗言與待舉同議亦害之始迫緣邊巡檢都監王守一為首守一不從而死乃擁韋貴據城以叛禮賔副使兼閣門通事舍人知廣信軍劉貽孫與走馬承受宋有言臨城諭叛兵有欲降者計未决而諸路各進軍來討遂復固守拒命按保州兵亂乃八月初五日朝廷於初九日始知富弼使河北實以初五日受命此時朝廷未知保州兵亂也弼使河北但欲修飾邊備未行而保州亂作朝廷就委弼措置弼緣此遂行實非始謀也其後弼有辨讒謗劄子却云因保州亂堅乞得河北宣撫蓋小誤然事適同日不妨便文而范純仁行狀蘇軾神道碑及朱墨史附傳並云弼因保州賊平乞出則誤甚矣今不取乙未翰林學士承旨丁度學士王堯臣吳育宋祁知制誥孫抃張方平歐陽修權御史中丞王拱辰侍御史知雜事沈邈等言中書樞密院聚聽召臣等宣示契丹來書并朝廷答書臣等竊謂契丹元昊相攻虛實未可知今來書大意且言以元昊不順朝廷之故遂成釁興兵恐深入討伐之後元昊却歸朝廷乞拒而不納今答書便云於元昊理難拒絶則是不從北鄙之請堅納西人之盟得新附之小羌違久和之彊敵如聞契丹見屯兵甲近在邊陲萬一得書違情生忿回戈戎境有以為名夫患有遲速事有重輕此朝廷不可不審度也若阻契丹而納元昊則未有素備之䇿絶元昊而從契丹又失綏懷之信莫若以大義而兩存之臣等謂宜降詔與元昊言昨許再盟蓋引契丹有書來言彼是甥舅之親朝廷久與契丹結和不欲傷鄰國之意遂議開納今却知國中招誘契丹邊户虧甥舅事大之禮違朝廷納欵之本意當須復順契丹早除嫌隙則誓書封冊便可施行仍乞於契丹回書中言已降詔與元昊若其悔過歸順貴國則本朝許其款附若執迷不復則議絶未晚如此則於西人無陡絶之曲於北鄙無結怨之端從容得中不失大義惟陛下裁擇先是育獨奏疏言契丹被朝廷恩腴為日已久不可納一叛羌失繼世兄弟之歡今二蕃自鬬鬬久不解可觀形便乘機立功萬一過計亟納賊昊臣恐契丹窺兵趙魏朝廷未得元昊毫髮之助而太行東西先有烟塵之警此不可不察也為今之䇿宜使人諭元昊曰契丹汝世姻一旦自絶力屈而歸我我所疑也若無他者當順契丹如故然後許汝歸𣢾告契丹曰已詔元昊如能委謝轅門即聽內附若猶固拒當為加伐如此則二敵不能歸尤朝廷及聚議方平實當筆皆不能易育初議焉張方平墓志銘載此議出於方平方平集有此兩篇後一篇注云議與宋祁同上墓志亦云仁宗以書示方平及宋祁然方平此時但為知制誥未入翰林也蓋輔臣召兩制示以書方平即同祁等上議議實方平所作而吳育議獨最先上及是又與兩制同之今并取育議附見實録又不載知制誥姓名蓋脫誤也丙申詔在京犯罪配𨽻外州軍者不得因差役上京在京諸司亦不得指名抽差時內東門吏犯贓配黃州其親戚多內臣求駕綱上京而作坊射為甲匠權度支判官李參奏恐無以懲姦故禁之丁酉陜西河東宣撫使范仲淹言知延州日見進士張挺有武力膽略乞補三班差使殿侍為隨行指使從之張挺不知本末何如若竟無聞當削去戊戍右正言集賢校理同修起居注余靖假右諌議大夫史館修撰為回謝契丹使先是靖言伏聞契丹耶律元衡來聘道路𫝊言専報西征之事臣雖愚陋竊用憂之且敵人當無事之時尚可窮巧極詐乘我之怯以恣無厭之求况今用兵之際豈得默而無請臣竊料敵人之意不出數策一曰借兵於我同力剪除二曰見乏資糧欲假邉粟三曰軍興費廣先借數年之資四曰元昊與賊連謀不宜更通和好其他狡計不可詳知此皆目前所宜預備者也敵人背約妄起事端不當但務偷安每事輕許我守盟誓拒之有詞若只有借兵之言最可理奪伏緣景德之誓共約休兵只如元昊負恩擾我邉鄙本朝調發卒乘數年于兹未嘗假北敵之兵議誅討今若夾山部落亡入我境則當極力同共驅除境外之師無名可出此則借兵之謀不可許也若以資糧為詞亦當堅拒伏緣國家封疆至廣軍馬至多內有朝廷百官之奉外有賔客四方之事賦入有常度但緣愛惜生靈不忍爭戰故割自奉之金帛以資兄弟之國一國之財而供二國之用固無餘羡以副非意之求此又借糧之議不可許也若云先借嵗聘之數尤當阻之伏緣契丹每言此來再結盟好不同向前固宜謹守誠信以敦萬世之約况近嵗新添金帛割剝已深山澤之利嵗計猶有不足桑蠺所産民力固已無餘比要兩國安寧是用不惜所有今伐一小族便此過求若更有大事如何應副侵凌之勢無時暫已國家之物有限强敵之求無厭欲望不危必不可得此又預借嵗物不可許也若云元昊懷二與賊通謀同盟之國所宜共嫉惟此一事最難處置從之則權在敵人不從則强兵在境酌今之勢不能不從伏緣北敵本參和議彼既有隙勢難兩交若謂元昊已有好意不可拒絶臣恐納元昊而疏耶律則敵人移兵於我矣臣愚以謂元昊之論未定猶可緩之以順北敵之請其餘不可從也臣伏讀唐史竊見回鶻於唐朝有收復兩京之功每嵗止賜絹三萬匹今來契丹嵗取我物五十萬其害深矣伏乞朝廷密敕邉臣嚴設武備儻或敵人過分求索不宜輕許以重取國辱廟堂之上固有謀猷諫諍之官惟憂闕失望朝廷裁之又言伏覩耶律元衡已朝見訖中外臣僚但聞報西征事又知河東邉奏警急並無不憂懼雖北邉事宜云征夾山部落且夾山小族而契丹舉國征之事勢甚大恐似别有謀者臣竊思之朝廷於西北大事前後處置失錯所以敵人乘釁肆其慿凌今者使來必此之故切緣元昊纍世稱藩一旦僣叛招携出討當自圖之而乃屈中國之威假契丹之援借人之勢權在他人此謀始之失也臣去年在敵中敵主親與臣言梁適去時云河西事了遣人來謝及以元昊表示臣俾知元昊畏伏之意又與臣言候乾元節信使回日請仔細報來及臣歸朝首言此事只緣夷簡病退梁適差出便乃隱諱云無此言暨乾元節信使蕭忠孝來屢問館伴張錫錫終不與言元昊商量次第朝廷當元昊叛時則遣使告之及其和約欲就則問而不對必疑朝廷有異議矣此始末不同之失也臣曾具奏陳疑其所謀四事一曰借邉兵二曰借邉粟三曰假數年之物四曰絶元昊之和遙度敵情在此而已必若假借財物拒之有詞惟與元昊絶和最難處置臣竊計之遜詞以謝北敵緩詞以款西戎茍紓嵗月之禍誠當今可施之䇿也然臣愚慮兵禍自此起不宜處置更有失錯今若狥北敵而絶西戎亦有兵禍納西戎而違北敵亦有兵禍二敵連謀共為矛楯之勢北人才去西人必來拒納之間動皆有礙擇禍就輕守之以信使曲不在我即其要矣必若棄元昊以為外虞堅絶其約使北人不能及覆而邀功此最久安之䇿恐謀者不能終之且元昊所以抗中國者僣尊號改年名不稱臣不奏表此其倔强之勢也今皆捨去而歸我矣三年謀之而一朝絶之及其既去北敵使至將又招之彊悍之性豈不懷忿此起兵之禍也契丹所以取重於中國者亦欲成和好之事專與奪之權也今西戎偃蹇而不從朝廷沉吟而不報及其使我絶之而遽即成之桀驁之氣豈不懷怒此亦起兵之禍也然而彼欲舉兵而使我絶約皆北人之狡謀耳臣竊料北人因弋獵之勢為舉兵之名欲邀成功以德於我若報之曰天下之民一也本朝之兵尚不忍令其戰鬬以趨死傷之禍况鄰國之兵冒白刃而不憂其傷非所以為心也寧失一小蕃不可煩兄弟之國蕭偕迥回日曾逹此誠且未嘗乞師無煩大舉若元昊自有釁隙違忤北朝今之出師非復預議又元昊使來每稱北朝之意早緣名體未順難以從之近者稱本朝正朔去羌人僣僞之號而稱臣矣只以事要久逺故須往覆商量今若事體凖前固當拒絶但業已許其每事恭順則受其來歸若來而拒之則似失信且中國以信自守故能與四海㑹同儻失於西人誰復信其盟約若北朝怒其叛而伐之南朝因其服而捨之共成德美亦春秋之義也敵雖强悍固當聞此而悛心矣惟重幣輕使以結之使其有邀功之心則必緩圖我之患也臣又聞前嵗北人解甲後幽州亦遭掠奪財物迫奪婦人發掘墳墓燕人苦之今河東近邉恐有衝突須作隄備以戒不虞臣嘗觀北朝氣凌中國捃拾事緒以起釁端歸於强弩相射利劒相擊而後已不可不早備也惟陛下圖之朝廷以靖言為然於是遣靖回謝其復書略曰若以元昊於北朝失事大之體則自宜問罪或謂元昊於本朝稽效順之故則無煩出師矧延州昨奏元昊已遣楊守素將誓文入界儻不依初約則猶可沮還如盡遵承則亦難却也樞密院言保州兵亂詔遣入內供奉官劉保信馳往視之諌官孫甫力言前有告變者樞密使杜衍不時發之當得罪甫本衍所舉用其不阿如此庚子命知制誥田况保州城下相度處置叛軍仍聽便宜從事辛丑知青州陳執中言奉詔權罷修州城契丹雖遣使再盟然未保情虛實恐未可遽廢防守之備况秋稼大成人心樂於集事舊城比已興工剗削髙下可窺若遂中輟它日不免重困於民乞遂乘時完緝奏可先是有言執中率民錢修州城民甚苦之故有詔罷其役也記聞云集賢校理李昭遘言執中之短詔以昭遘疏示執中執中慙恚上疏乞江淮小郡不許按昭遘三年七月罷陜州入判理缺憑由今年八月為度攴判官不知奏執中時是何職任當考賜保州投來人員兵士特支錢壬寅降敕榜招安保州叛軍詔知雄州王德基諜報北界以保州兵亂本路方領兵捉殺恐緣邉人户驚疑也癸卯右正言知制誥田况為龍圖閣直學士知成德軍充真定府定州路安撫使况言保州緣邉人户多扇言軍賊作亂將引契丹兵馬入界以臣所料必有姦人因欲搖動邉民乞下緣邉安撫司密令捕緝法外施行從之右正言知制誥歐陽修為龍圖閣直學士河北都轉運按察使上面諭修曰勿為久居計有事第言之修對以諌官乃得風聞今在外條事有指越職罪也上曰事茍宜聞不可以中外為辭諌官蔡襄孫甫奏留修不許此據修附傳及晏殊正傳右正言集賢校理同修起居注余靖知制誥仍知諌院右正言直集賢院知晉州尹洙為起居舍人直龍圖閣知潞州舊制諫官御史補外無待闕者洙自慶移晉㑹前守未滿嵗有㫖令洙待闕洙心疑鄭戩譛已因奏乞與戩俱下御史獄辨水洛城事且言戩交結走馬承受麥知微於是遷秩改命而所乞竟不從鄭戩交結中官本𫝊都不載此據尹洙奏狀又碧雲騢載戩結中官黃元吉而進用一日元吉左遷同列戲之曰天休走却爺矣戩笑曰君知我更有一爺在恐戩亦不至此碧雲騢託名梅堯臣然非也元吉事當考祕書丞館閣校勘知諌院蔡襄為直史館同修起居注是日襄言保州軍士閉城作亂殺黨中懦弱十餘人指為首惡以要朝廷招安臣與臣修臣甫已有論列欲令知定州王果引兵隨榜入城盡行誅戮不聞施行竊以天下內外之兵百有餘萬茍無誅殺决行之令必開驕慢叛亂之源今州兵殺官吏閉城門從而招之使傳於四方明朝廷畏衆不殺之恩官吏有觸事可持之勢何憚而不為議者若謂今日北敵妄生釁端不可便於極邉之地張皇其事為敵人所窺是不知制兵之權而昧威武之略也夫中國為北敵所輕者本由朝廷威令不行今以徑兵入城誅三千叛卒以絶天下禍亂之萌而敵人咫尺必將悚動安慮其窺乎况事機不可失惟陛下特發睿斷而行之甲辰資政殿大學士吏部侍郎石中立為太子少傅致仕河北宣撫使富弼奏請殿中丞劉牧掌隨行機密文字從之牧西安人也賜保州城下諸軍將校特支錢乙巳龍神衛四廂都指揮使衛州防禦使郭承祐為宣州觀察使罷軍職樞密使杜衍惡承祐驕恣奏罷之秦州刺史權并代部署狄青為惠州團練使捧日天武四廂都指揮使涇原部署青任涇原權并代當在六月十三日以後朝廷不欲令青沮劉滬也但實録不詳爾水洛既城劉滬又責官涇原已别命帥則青可復還特書此亦足見朝廷委曲用人之意云陜西河東宣撫使范仲淹請以涇原路參謀郭固隨行教習軍陳從之歐陽修杜衍墓銘云范仲淹宣撫河東陜西欲以兵從衍爭不可今觀仲淹辟郭固隨行教習軍陳則仲淹固以兵從是衍不果爭也按富弼奏議韓琦家𫝊則衍所爭乃仲淹欲益發兵爾非為宣撫使不可以兵從也恐歐陽或誤丙午武勝節度使同平章事東平郡王德文為忠武節度使兼侍中寧江節度使汝南郡王允讓同平章事德文等十人既封拜又以宗室久不遷官於是遞進一等凡遷者三百二十一人戊申陜西都轉運按察使天章閣待制程戡言昨遣三司鹽鐡副使魚周詢宫苑使周惟德與臣同體量修水洛城臣等昨離永興軍日涇原部署狄青已部領軍馬至德順軍仍令閣門祗候崔宣指揮使謝能等領軍馬就水洛城收捉劉滬董士亷欲誣以違節制斬之賴滬等不敢抗對由是止械送司理院初令本軍監酒周頌就劾又差平涼知縣李元規代頌面授其意不謂朝廷遣周詢惟德來滬等生得出獄自後臣雖奉㫖劉滬董士亷再往興築臣以蕃部疑變及慮狄青尹洙等破壞此城無以就功纍聞朝廷續差內殿崇班陳惟信令臣與狄青應副興修今幸滬等城水洛已就而蕃部帖然其初本路兵馬鈐轄髙繼元著作郎石輅大理寺丞李仲昌等皆實謀狄青以為水洛不便今既共事其如一黨之人自懷疑忌兼聞既城之後猶欲力遂前非石輅雖已離此繼元仲昌多隂獻計畫務在間諜今除王素知渭州未必不為鬬亂雖水洛城不足惜奈何動扇蕃部棄去漢土不惟為異類報仇兼欲將微臣稔過臣所操心粗能知分雖城百水洛固非臣徼功掠美之地乞候王素過京師特賜宣諭此事庶到邊不為羣小所惑其髙繼元李仲昌仍乞早移别路一差遣不爾沮撓邊事必起後虞宦者閻士良以供備庫副使為蔡州都監頗挾勢驕倨承前貴人多優容之及司勳員外郎陳述古知蔡州獨不加禮士良恚恨㑹去冬雨木氷述古言是所謂木稼亦木介也木有稼達官怕木介革兵之象其占在國家士良擲其語聞上述古因發士良隂事既置劾許州而士良不伏乃命監察御史劉湜再往鞫之己酉士良坐受所監臨贓奪二官述古亦坐所言不實罰銅七斤罷述古堯佐子也司勳郎中張可久責授保信節度副使坐前為淮南轉運使販私鹽萬餘斤在部中也監察御史包拯乞不以見獲斤兩定罪特於法外重行逺地編置以警贓吏故有是命辛亥贈太子太保諡忠憲韓億卒壬子右正言祕閣校理孫甫為契丹國母生辰使如京使夏防副之太常少卿直史館劉為契丹生辰使崇儀使楊宗讓副之鹽鐡判官祠部員外郎祕閣校理張瓌為契丹國母正旦使內園副使焦從約副之開封府推官監察御史劉湜為契丹正旦使東頭供奉官閣門祇候李士勳副之録故德順軍得勝寨主右班殿直閣門祇候裴大雅子得象為三班奉職得一為借職以大雅與西賊戰沒也甲寅詔宗室大功以上親之婦不許改嫁自餘夫亡而無子者服除聽還其家朝議以諸道兵集保州城下未有統領因詔宣撫使富弼促行往節制之再降敕榜招安仍令田况等且退選人齎敕入城若遂開門即一切撫存之如尚拒命則益進攻其在營同居骨肉無老幼皆戮之先是知定州王果率兵趨保州攻城甚急會有詔招安賊不肯降乘埤呼曰得李步軍來我降矣李步軍謂昭亮也詔遣昭亮是日昭亮至與田况同諭賊賊終未信右侍禁郭逵徑踰壕詣城下謂賊曰我班行也汝下索我就汝語賊乃下索即援之登城謂賊曰我班行也豈不自愛茍非誠信肯至此乎朝廷知汝非樂為亂由官吏遇汝不以理使汝至此今赦汝罪又以祿秩賞汝使兩制大臣奉詔書來諭汝汝尚疑之豈有詔書而不信耶兩制大臣而為妄誕耶詞氣雄辨賊皆相顧動色曰果如此更使一二人登城即復下索召其所知數人登城賊信之爭投兵下城降者二千餘人遂開門納官軍其造逆者四百二十九人况具得其姓名令楊懷敏率兵入城悉坑殺之逵本𫝊云范貴史克順侍其臻據保州叛按此時但有韋貴無范貴又云臻貴自剄按臻亦未嘗死不知本𫝊何所據也當考今止用記聞所載事迹李昭亮傳云昭亮從數十人叩城扉袒示城上不以甲楯自蔽為曉譬禍福賊遂降蓋飾說今從記聞按會要亦云遣郭逵入城諭賊昭亮不當專此功也降卒二千餘人悉分𨽻諸州宣撫使冨弼恐復生變與都轉運使歐陽修相遇於內黃夜半屏人謀欲使諸州同日誅之修曰禍莫大於殺已降况脅從乎既非朝命諸州有一不從為變不細弼悟乃止朱史附傳誤以冨弼為夏竦今從蘇轍所作歐陽修傳工部郎中直昭文館知滄州劉渙為吉州刺史知保州渙至踰月雲翼軍士又謀反居人惶急渙以單騎至械其首惡誅之一軍帖然此據渙夲傳按雲翼軍叛既誅之矣渙至又復叛不知果否渙不踰年亦徙登州當考渙知保州乃此月癸丑乙卯上謂輔臣曰如聞諸路轉運按察提㸃刑獄司發擲所部官吏細過務為苛刻使下無所措手足可降敕約束之先是監察御史劉湜言轉運使掎托州縣苛束官吏人不得騁其材宜稍寬假恬不為改乃加繩治此據湜傳按湜三年六月為察官四年十月遷殿院傳載此言在為殿院後恐非也因詔書約束轉運使即附見此包拯言諸道轉運使自兼按察及置判官以來并提㸃刑獄等體量部下官吏頗傷煩碎兼審刑院大理寺奏案倍於往年况無大假罪名並是掎托微纍不辨虗實一例論奏此蓋茍圖振舉之名以希進用之速爾遂使天下官吏各懷危懼其亷謹自守者則以為不才酷虐非法者則以為幹事人人相效惟恐不逮民罹此患無所訴告非陛下委任之本意也其被體量之事或智慮所不及或人情偶不免若非切害亦可矜憫雖欲潔已改過其路亡繇豈不痛惜哉又言天下茶鹽酒稅逐處長吏曲徇轉運使之急以求課額羡溢編民則例遭配買商旅則倍行誅剝為國斂怨無甚於此且朝廷設按察提刑之職蓋欲去貪殘之吏撫疲瘵之俗今乃惟務苛細人不聊生竊恐未為國家之福也比幸屬郊禋盛禮大霈慶澤欲乞於赦書內特行約束凡官吏被體量者情非故犯咸許自新不悛必置於法庶使悔過之人免滋終身之纍其諸處茶鹽稅亦乞除元額外不得擅增課利搔撓人户應係自來諸般調率且乞權罷以安海內生靈之心伏望聖慈少賜省察朝廷既降敕約束諸路按察使備載臺官所上之言歐陽修奏曰臺官意謂按察使等所奏之人多不實或因迎送文移之間有所闕失挾其私怒枉奏平人朝廷都不深思輕信其說臣自聞降此約束日多憂嗟竊思國家方此多事難了之時正當責人展效之際奬之猶恐不竭力疑之誰肯盡其心昨大選諸路按察之初兩府聚㕔數日盡破常例不次用人中外翕然皆為一時之極選凡被選之人亦各負材業久無人知常患無所施為一旦忽䝉擢用各思宣力爭奮所長不惟欲報朝廷寧不更希進用豈可頓為欺罔便狥私情料其心必未至此茍或如臺官所說則是兩府聚㕔數日選得不公之人或其不至如斯何必更加約束竊以任人之術自古所難能力主張猶或有沮者何况過生疑異使其各自心䦨如此用人安能集事况按察之任人所難能或大臣薦引之人或權勢僥幸之子彼按察使下當怨怒上忤權勢而不敢避者只賴朝廷主張而已今按察者所奏則未能與行沮毁者一言則便加輕信皆由朝廷未知官吏為州縣大患而按察可以利民委任之意不堅故毁謗之言已入也所可惜者自差諸路按察今雖未有大效而老病昏昧之人望風知懼近日致仕者漸多州縣方欲澄清而朝廷自沮其事臣欲乞聖慈令兩府召臺官上言者至中書問其何路按察之人因挾私怒茍有迹狀乞下所司辨明若實無人乃是妄說其近降劄子乞賜抽還不使四方見朝廷自沮按察之權而為貪贓老謬之吏所快戊午詔自今除臺諌官母得用見任輔臣所薦之人此詔恐與丁度指孫甫為杜衍門人相關然衍九月二十六日始拜相此詔决不為衍發也富弼言近見元昊所上誓書及表奏辭禮恭順一遵朝廷所約只是𣙜場上微有商量候楊守素到闕日乞與婉順商議示以必和之意使之深信不可為其恭順却於元約事外别有詰難邀勒所宜多方容納令無備我之意則必盡力與契丹相持若二冦自相殺伐兩有所損此朝廷之福天所假也茍議絶和約或大假拖延不成則元昊必復與契丹合而為患如故此必然之理也臣料契丹必未肯與朝廷絶好余靖此去保無他虞將來若遣謝使所齎謝物不可過數茍多無益更乞深加詳擇范仲淹言臣竊觀史籍見前代帝王與外國結和通好禮意甚重非志不髙而力不足也蓋懼邉事不息困耗生民用兵久之必生他變而為社稷之憂如漢髙帝唐太宗身經百戰大勝天下不敢黷武而屈事外國者正為此也及其國力强盛將帥得人則長驅破敵以雪天下之耻今北敵西戎合謀并力夾困中原西兵數年未能平定近方遣使往復以議通順而延州塞門并河東豐州之地舊有屬户居之則為我利自元昊驅掠西去遂為隙地中國利害不繫於此今衆議須欲復得塞門以全疆土借如祖宗朝北陷易州西失靈夏及其和好皆略而不言耻以前失之醜而求無用之地也今西戎驕吝不足與爭但名體已順餘可假借以成和好然後重議邉事退移兵馬减省糧草蘇我生民勤我稼穡選將練士使國冨民强以待四方之變此帝王有道之術社稷無窮之福也如欲與敵人理曲直决勝負以耗兆民以危天下語之則易行之實難臣備位二府當思安危大計不敢避人謗議上下其說纍陛下包荒之德以重增宵旰之憂十月己丑頒誓詔
