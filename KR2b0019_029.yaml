body:
  text: 續資治通鑑長編卷第二十五宋李燾撰太宗雍熙元年春正月壬戌上謂侍臣曰夫教化之本治亂之源茍無書籍何以取法今三館所貯遺逸尚多乃詔三館以開元四庫書目閲館中所闕者具列其名募中外有以書來上及三百卷當議甄録酬奬餘第卷帙之數等級優賜不願送官者借其本寫畢還之自是四方之書往往間出矣甲子有司上竊盜贓至大辟詔特貸其死因謂宰相曰朕常重惜人命如此類者往往貸其極刑但時取其甚者警衆多爾不欲小人知寬貸之意恐其犯法者衆也乙丑上御丹鳳樓觀燈見士庶闐咽謂宰相曰國家承纍世干戈之後朕孜孜求治惟望上天垂佑福此下民今海宇乂安京師繁盛殊以為慰朕居常罕飲今夕與卿等同樂宜各盡醉於是每舉酒以虛爵示羣臣涪陵縣公廷美至房州頗自咎責因憂悸成疾而卒丁卯房州以聞上咽嗚流涕謂宰相曰廷美自少剛愎長益凶惡朕以同氣至親不忍置之於法畀居房陵兾其思過中心念之未始暫忘方欲推恩復舊遽兹殞逝痛傷奈何因悲泣感動左右乃詔追封廷美為涪王賜諡曰悼為發哀成服其後從容謂宰相曰廷美母陳國夫人耿氏朕乳母也後出嫁趙氏主軍器庫副使廷俊朕以廷美故令廷俊屬鞬左右廷俊泄禁中事於廷美日者西池竊發之謀若命有司窮究則廷美罪不容誅朕止令居守西洛而廷美不悔過益怨望出不遜語始命遷房陵以全宥之至於廷俊亦不加深罪但從貶黜朕於廷美蓋無負矣言訖為之惻然李昉對曰涪陵悖逆天下共聞而宫禁中事若非陛下委曲宣示臣等何由知之澶州言民訴水旱二十畝以下求蠲稅者所需孔多請勿受其訴上曰若此貧民田少者恩常不及矣災沴蠲稅政為窮困豈以多少為限耶猶慮諸道不曉此意辛未詔自今民訴水旱勿擇田之多少悉與檢視左諫議大夫參知政事李穆性至孝母嘗卧疾彌年動止轉側皆親自扶掖乃稱母意未嘗少懈初坐涪陵事屬吏穆子惟簡給母穆以奉詔鞫獄臺中及責官還家卒不敢白其母間日輒出訪親友陽為入直暨牽復母終弗知執政月餘遭母喪詔强起之穆不食葷茹哀戚過甚因致毁瘠癸酉穆晨起將朝風眩暴卒上臨哭出涕謂宰相曰穆潔已守道操履純正真不易得朕注意已久方此擢用遽至淪沒非斯人之不幸乃朕之不幸也丁丑上謂侍臣曰朕讀晉史見武帝平吳之後溺於內寵後宫所蓄逮數千人深為煩費殊失帝王之道朕常以此為深戒今宫中自職掌至於粗使不過三百人朕猶以為多矣二月壬午朔上御崇政殿親閲諸將軍校自都指揮使已下至百夫長皆按名籍參考勞績而升黜之凡踰月而畢自是率循其制實録稱終日而畢蓋誤也今從本志謂近臣曰朕選擢將校先取其循謹能御下者武勇次之若不自謹飭則士卒不畏服雖有一夫之勇亦何用耶又曰兵雖衆茍不簡擇與無兵同先帝訓練之方咸盡其要朕因講習漸至精鋭儻統帥得人何敵不克止患將才難得耳舊制諸軍辭見或行間驍果出衆者令將校互相保任散員左班都頭魏能戍邊不為衆所保上曰此人才勇朕可自保之由是稍加進用能鄆州人也以右補闕喬維嶽為淮南轉運使先是淮河西南三十里曰山陽灣水勢湍悍運舟所過多罹覆溺維嶽規度開故沙湖自末口至淮隂磨盤口凡四十里又建安北至淮澨總五堰運舟十綱上下其重載者皆卸糧而過舟壞糧失率常有之綱卒傍緣為姦多所侵盜維嶽乃命創二斗門於西河第三堰二門相踰五十步覆以夏屋設懸門蓄水俟故沙湖平乃泄之建橫橋於岸築土纍石以固其趾自是盡革其弊而運舟往來無滯矣嘗按部至泗州慮獄法掾誤斷囚至死維嶽詰之法掾俯伏且泣曰有母八十餘今獲罪其母不能活矣維嶽閔之因謂曰他日朝制按問第云轉運使令處兹法掾如其言獲免維嶽坐贖金百二十斤罷使職三月壬子大宴於大明殿乙卯日本國僧奝然與其徒五六人自其國來入朝奝然言其國王姓王氏自始祖至今凡六十四世八十五王矣其文武僚吏亦皆世官上聞之嘆息謂宰相曰此島夷爾尚存古道中國自唐季海內分裂五代世數尤促大臣子孫皆鮮克繼祖父之業朕雖德不及往聖然孜孜求理惟恐庶獄有寃未嘗敢自暇逸以田遊聲伎為樂兾上穹降鑒庶幾作子孫長久計使運祚悠逺大臣亦世守祿位卿等宜各盡心輔朕無令逺夷獨享斯慶也因賜奝然紫衣存撫之甚厚丙辰選祕書丞楊延慶等十餘人分知諸州上因謂宰相曰刺史之任最為親民茍非其人則民受其禍昔秦彭守潁川崇尚儒雅教化大行境內乃有鳳凰麒麟嘉禾甘露之瑞足為善政也宋琪曰秦彭一郡守耳政善而天應之若此况君天下者乎何謂太平不可致和氣不可招也延慶未見丁巳上謂宰相曰夏州蕃部並已寧謐向之强悍難制者皆委身歸順凡得酋豪二百七十餘人種族五萬餘帳十年以來戎人所略生口羊馬數萬計悉還其主朕前後遣師將皆諭以柔服之㫖戎人畏威故不煩戰伐皆相率內附朕亦慮轉餉勞擾止令齎茶於蕃部中貿易以給軍食未嘗發民輸送也又謂李繼捧曰汝在夏州用何道制蕃部對曰戎人狡狠臣俾羈縻而已非能制也先是塞房村決河用丁夫凡十餘萬自秋踰冬既塞而復決上以方春播種不可重煩民力乃發卒五萬人命步軍都指揮使田重進總督其役供奉官劉吉自贊請行且言若河決不塞願夷族上壯之使副重進吉親負土與役徒晨夜兼作戒從吏勿言使者至密訪乃得之歸以白上甚喜內侍石全振者領護河堤性苛急號為石爆裂數侵侮吉吉默不校一日吉與乘小船至中流語之曰君恃貴近見凌已甚我不畏死當與君同見河伯耳將蕩舟覆之全振號哭摶頰求哀吉乃止自是不敢侵侮吉矣己未滑州言河決已塞羣臣稱賀吉之功居多即授西京作坊副使賜豫甚厚上作平河歌以美成功蠲水所及州縣民今年田租己丑召宰相近臣賞花於後苑上曰春氣暄和萬物暢茂四方無事朕以天下之樂為樂宜令侍從詞臣各賦詩賞花賦詩自此始明年四月賞花釣魚又賦詩此但賞花㑹要以為曲宴自明年始今兩存之壬申幸含芳苑宴射宰相宋琪曰陛下控弦發矢一如十五年前在晉邸時上曰朕比曩時筋力誠未覺衰然少喜馬射今不復為矣且謂琪曰此地三數年不一至固非數出遊宴也時劉繼元李繼捧等皆侍坐琪因贊頌神武與李昉等各賦詩上為和賜之是春宰相奏事退上謂之曰卿等所奏簿書乃是常事惟時務不便尤須極言其失無有所隱朕當裁酌從長而行茍言不當亦不責也宋琪曰陛下英明臨照無所不周而猶虛懷聼納所恨愚短不能上副聖心夏四月乙酉泰山父老千餘人復詣闕請封禪戊子羣臣上表請封禪表凡三上甲午詔以今年十一月有事於泰山是日幸金明池親習水戰謂宰相曰水戰南方之事也今其地已定不復施用時習之示不忘武功耳因幸講武臺閲諸軍馳射有武藝超絶者咸賜以帛還登瓊林苑北榭賜從臣飲擲錢於樓下俾伶人爭取極歡而罷丙申詔翰林學士承㫖扈䝉學士賈黃中散騎常侍徐鉉等同詳定封禪儀己亥命南作坊副使李神佑等四人修自京抵泰山道路庚子以宰相宋琪為封禪大禮使翰林學士宋白為鹵簿使賈黃中為儀仗使宋琪等議所過備儀仗導駕上曰朕此行蓋為蒼生祈福過自嚴飭非朕意也乃詔惟告廟及至泰山下用儀仗所過不須陳設甲辰布衣趙重慶詣匭上書言皇家當越五代而上承唐統為金德若以梁上繼唐後唐至國朝亦合為金德矧自禪代以來符瑞狎至羽毛之色白者不可勝紀皆金德之應也望改正朔易車服之色以承天統事下尚書省集百官定議右散騎常侍徐鉉等奏議曰五運相承國家大事著於前載具有明文頃者唐末喪亂朱梁篡代莊宗早編屬籍繼立世功親雪國讎天下稱慶即比梁於羿浞王莽之徒不可以為正統也莊宗中興唐祚重新土運自後數姓相𫝊晉以金漢以水周以木天造皇宋運膺火德况國初便祀火帝為感生帝於今二十五年而又圎丘展禮已經六祭自是日盛一日年穀豐登干戈偃戢若於聖統未合天心焉有太平得如今日此皆上𤣥降祐清廟垂休致成恢復一統之運也豈可輒因獻議便從改易恐違眷命深所未安又云梁至周不合迭居五運欲我朝上繼唐統宜為金德且後唐已下奄宅中區合該正統今便廢絶理實無謂且五運代遷皆親承授質文相次間不容髮豈可越數姓之上繼百年之運此不可之甚也按唐書天寶九載崔昌獻議自魏晉至周隋皆不得為正統欲唐逺繼漢統立周漢子孫為王者後備三恪之禮是時朝議是非相半集賢學士衛包扶同李林甫遂行其事至十二載林甫卒後復以魏周隋之後依舊為三恪崔昌衛包並皆逺貶此又前載之甚明也况今國家封禪有日宜從定制上答天休伏乞聖宋永為火德從之是月王延德等至自髙昌延德具言初發京師越明年四月乃至髙昌國師子王避暑於北庭以其舅阿多裕恱守國先遣人致意於延德曰我主舅也使者拜我乎延德對曰持朝命而來雖見王亦不當拜阿多裕恱後數日乃相見然其禮頗恭師子王邀延德至北庭歷交河州上金嶺凡十四日乃至師子王又先遣人致意當擇日以見使者願無訝其淹久至七日乃見王及王子侍者皆東向拜受賜旁有持磬者擊以節拜王聞磬乃拜既而王之兒女親屬皆出羅拜受賜遂張樂宴飲為優戲又連日與延德泛舟遊佛寺髙昌猶用開元七年厯以三月九日為寒食二社冬至亦然佛寺多唐時所建額及經藏亦唐所賜七月令延德先還國王九月乃還時有契丹使者來謂師子王曰聞漢遣使達勒達而道出王境誘王窺邊宜早送至達勒達無使久留因言漢使來覘王封域將有異圖王當察之延德知其語因謂王曰契丹素不順中國今乃反間我欲殺之王固勸乃止延德初自夏州歷王庭鎮黃羊平所過蕃部皆以詔書賜其君長襲衣金帶繒帛其君長各遣使謝恩又明年延德與其使凡百餘人復循舊路而還於是至京師延德初至達勒達境頗見晉末陷北者之子孫咸相率遮迎獻飲食問其鄉里親戚意甚悽感留旬日不得去五月丁亥幸城南觀麥還幸玉津園觀魚宴射謂近臣曰朕觀五代以來帝王始則勤儉終乃忘其艱難恣為逸豫不恤士衆妄生猜忌覆亡之速皆自貽也在人上者當以為戒甲子以監察御史宋璫為陜西轉運使璫先知秦州於是遣韋亶代之璫去秦未百日亶坐事繫獄上以璫前有治績再命知秦州賜錢五十萬璫安集諸戎部內清肅就轉比部貟外郎凡六年乃召歸璫渭南人也丁丑乾元文明二殿災是日既夕隂雲四合風雷暴作夜漏初上大雨震電火發自月華門抱關者不之覺延燒漸北翌日辰巳間乃止是月廢諸州農師詔廣南攝官並給印紙令本州依正官例批書在任功過以將作監丞李元吉丁顧言為堂後官賜緋衣銀帶象笏錢百千京官任堂後官自此始鹽鐵使王明請開江南鹽禁計歲賣鹽五十三萬五千餘貫二十八萬七千餘貫給鹽與民隨稅收其錢二十四萬餘貫聽商人販易收其算從之丁亥詔求直言其略曰既延災於正殿蓋示譴於眇躬豈非刑賞有愆措置乖當或近習屏蔽致物情壅塞賦調未得均一賢良多所淪滯有一於此足斁政經中外羣臣各期無隱因謂宰相曰朕訪求讜直以規已失昔禹拜昌言世稱其明今之諫者茍能切中時病朕豈惜夏禹之拜乎且為君之道要在廣聞外事分别善惡朕御天下兢兢業業行將十年每念封疆萬里深居九重人情未能盡逹若全不采聽則官吏能否生民利病何從而知古者凝旒纊黈用蔽聰明若行於今世則未盡理國之道宋琪曰王者明四目逹四聰所以髙視廣聰導逹物情陛下博訪時事刑獄繁滯者伸理之官吏惰慢者懲警之條制未便者更張之勤行不倦遂致和平天下幸甚本紀以明目逹聰事附七日初太一宫下從寶訓壬辰詔天下幕職州縣官或知民俗利害政令否臧並許於本州附𫝊置以聞所言可采必行旌賞若無所取亦不加罪先是轉運使及知州通判皆得上書言事而州縣官屬則否上慮下情壅塞故降是詔丙申上謂樞密使王顯等曰今年風雨雖調猶慮禾稼未得豐茂昨遣中使分往京畿百里外拔取粟豆數十本皆長數尺大是好苗因出以示羣臣喜形於色是日草澤有上書言時政者引對其詞狂悖上不之罪慰諭而遣之丁酉謂宰相曰前代帝王多以尊極自居凛然顔色左右無敢輒進一言朕每與卿等欵曲商榷時事蓋欲通上下之情無有所隱卿等直道而行杜絶請託勿以衆口鑠金為慮此來中外議朝廷政理為何如宋琪曰陛下勞心致治逺邇無間言上曰雖妄言如昨日草澤上書者朕亦未嘗加譴琪曰狂瞽之人當置嚴辟但芻蕘不棄以開言路上聖之德也庚子始令諸州十日一慮囚壬寅上謂宰相曰封禪之廢已久今時和年豐行之固其宜矣然正殿被災遂舉大事或未符天意且炎暑方熾深慮勞人徐圖之亦未為晚乃詔停封禪以冬至有事於南郊秋七月壬子改乾元殿為朝元殿文明殿為文德殿先是南郊五使皆權用他司印癸丑始令鑄印給之上謂宰相曰御史臺閣門之前四方綱凖之地頗聞臺中鞫獄御史多不躬親垂簾雍容以自尊大鞫按之柄委在胥吏求民之不寃法之不濫豈可得也乃詔自今鞫獄御史必須躬親毋得専任胥吏庚申改匭院為登聞檢院東延恩匭為崇仁檢南招諫匭為思諫檢西申寃匭為申明檢北通𤣥匭為招賢檢仍令諫院依舊差諫官一員主判八月戊寅朔上謂宰相曰每閲大理奏按或節目小有未備移文按覆封疆悠逺動涉數千里外禁繫淹久甚可憐也自今卿等詳酌如非人命所繫即與量罪區分勿須再鞫始令諸州等杖罪不須證逮者長吏即決之勿復付所司羣臣受詔鞫獄獄既具騎置來上有司斷說復騎置下之諸州所上疑獄有司詳覆而無可疑之狀官吏並同違制之坐其當奏疑按亦騎置以聞癸巳有布衣以皂囊封書獻者上覽之皆常事也且詞多狂妄上弗加責因謂宰相曰比下詔訪民間利病然上封事者多不知朝廷次第所言率孟浪不切機㑹本欲下情上逹庶事無壅故雖狂悖亦與容納自古人臣諫君固是好事然須言當其理國家擢任亦須平允之人如賣直沽名僥求升進悉非良善宋琪曰小臣章疏陛下盡與披詳善惡賢愚莫逃天鑒茍百事之中一二可采國家之利也右補闕知睦州田錫上疏曰伏念臣才謀不逮於古人職次忝居於諫列敢不常思補報用答休明六年九月十三日詣閣上書昧死言事陛下於是下御札俾人直諫降敕書奬臣敢言七年十二月十四日又再上奏疏入遞而不知逹與未逹直言雖求用而不知行與未行今日陛下有所因方渴聞至言有所為方切待直諫引咎自誠修德彌新臣聞責在近臣而不在聖躬罪在臣輩而不在陛下日近陛下有朝令夕改之事由制敕所行時有未當而無人封駮者給事中之過也給事中若任得其人制敕若許之封駮則所下之敕無不當所行之事無不精事無不精則垂為典彛敕無不當則編為格式豈有朝令夕改之弊豈有不精不當之虞也臣所以謂責在近臣而不在聖躬也臣又見陛下有舍近求逺之事由言動所為未合至理而無人敢諫諍者是左右拾遺補闕之過也今遺補是侍從之臣而不得在左右職分當獻替之事而未有上封章自此國家有舉事不便於時遺補不敢諫朝廷法令有不合於道遺補不敢言加以時久升平天下混一致陛下謂升平自得資陛下以功業自多日遷月移浸成聖性左取右奉無非睿謀所以陛下出一言乃謂湯武可偕陛下行一事乃謂堯舜可繼自纘大位於今九年四方雖寧萬國雖靜然刑罰未甚措水旱未甚調陛下謂之太平誰敢不謂之太平陛下謂之至理誰敢不謂之至理方欲為民求福報天之功有事於太山展禮於上帝人謀雖克天意未從火於禁中將驚悟於英主詔下海內遂布告於輿人近臣聞陛下感悟之言寧不惕厲諫官閲陛下憂勤之詔誰不倣徨臣所以謂過在近臣不在聖躬罪在諫官不在陛下臣死罪死罪然臣兩度上疏而陛下不用一二今臣數年在外而陛下委之以分憂碌碌隨衆憂曠遺之靡暇遑遑有志思諫諍之未能今幸天啓聖心神贊皇運感陛下虛佇待犯顔之諫致陛下專精求逆耳之言臣是以再罄愚𠂻復伸鄙見臣所謂陛下有朝令夕改者試舉其一二以明之置而尋廢者農師禁而不嚴者車服也臣所謂陛下有捨近謀逺者試舉其一二以明之宰相不得用人而委員郎差遣近臣不專受責而求令録封章也自此章奏必多聽用必廣聽用既廣則條制必繁條制既繁則依從者少既依從者少則是法令不行法令不行由規畫未當有如前年敕下令鄰近州府互差司理判官至今年敕下却令本州仍舊差置又如前年敕下應徴科官吏限前得了即與超升限外未了即當降黜即不以縣有大小之分稅有難易之徵土田沃瘠之不同歲時豐稔之不等風俗勤惰之各異官吏能否之各殊而一槩以程限所拘一例以升降為定自後未聞限外缺者降一官限前了者升一人此無乃垂之空言示之寡信乞今後凡有所奏或有所陳幸陛下察而審之令大臣議而行之蓋臣下言之則謂之封章陛下行之則出為法令法令可簡而不可使繁制度可永而不可屢變變易不定是彰思慮之不精繁多難依是令手足之無措也尚書曰臨下以簡又曰得師者王今宰臣若賢願陛下信而用之宰相非賢願陛下擇可用而任之何以置之為具臣而疑之若衆人也百官各舉其職願陛下聼而用之百官未稱其職願陛下量其才而用之何以置之為備貟而待之若冗秩也臣謂百職若舉則萬務從而自理百官未修則萬務從而亦隳必若任而疑之則上下非一心疑而用之則君臣非一體何則疑能生謗謗能生疑疑從謗生則父子之道偶虧於慈孝謗因疑起則君臣之際或變成於怨仇魏文侯焚謗書陛下故嘗知之令狐楚有辨謗論陛下時宜覽之若然則保得臣下始終全得君上恩信方謂君為元首臣作股肱也此疏得之續錦里耆舊𫝊九月初李繼捧入朝其弟夏州蕃落使繼遷留居銀州及詔發繼捧親屬赴闕獨繼遷不樂內徙時年十七勇悍有智謀僞稱乳母死出葬郊外以兵甲置棺中與其黨數十人奔入蕃族德錦澤距夏州東北三百里出其祖彛興像以示戎人戎人皆拜泣繼遷自言我李氏子孫當復興宗緒族帳稍稍歸附嘗遣所部奉表詩麟州貢馬及橐駝等敕書招諭之繼遷不出是月知夏州尹憲偵知繼遷所在與巡檢使曹光實選精騎夜發兵掩襲德錦再宿而至斬首五百級燒四百餘帳獲繼遷母妻及羊馬器械萬計繼遷僅以身免本紀實録載此事於十月庚寅蓋據奏到耳今移見九月吕誨正惠公補傳云保安軍奏獲李繼遷母太宗喜甚時寇凖為樞密副使上獨召凖謀凖退過宰相幕次不入公使人邀至曰陛下召公何為凖曰議邊事爾公曰陛下戒公勿言于某乎凖曰不然公曰若邊鄙常事樞密之論某不必與聞若軍國大計某備位宰相不可不知也凖以獲繼遷母告公曰何以處之凖曰欲斬於保安北門外以戒凶逆公曰陛下以為何如凖曰以為然令凖之密院行文書爾公曰必若此非計之得也願公少緩其事某將覆奏之即召閣門吏使奏上請對上召入公見上具道凖言且曰昔項羽得太公欲烹之漢髙祖曰願分我一杯羮夫舉大事者不顧其親况繼遷本屬悖逆之人哉且陛下今日殺其母而明日繼遷可擒乎若其不然徒樹怨讎而益堅其叛心爾上曰然則奈何公曰以臣之愚謂宜置於延州使養視之以招來繼遷雖不能即降亦可以繫其心而其母死生在我矣上撫髀稱善曰微卿幾誤我事即從公謀其母後病死延州繼遷尋亦死其子竟納欵請命按司馬光記聞有此吕誨補𫝊無其祖端𫝊所載同考驗乃與正史不合獲繼遷實雍熙元年九月此時端猶未參政凖亦未入樞府淳化二年四月凖始為樞副九月改同知淳化四年六月凖罷端始參政五年九月凖亦參政與俱在中書至道元年四月端拜相凖參政如故至道二年七月凖罷參政端居相位如故咸平元年十月端罷相端在中書首尾凡六年其初為參政凖即罷樞副矣補傳及記聞必誤况獲繼遷母時端及凖俱未顯耶今不取淳化五年四月詔削奪繼遷所賜姓名或凖因事建議欲斬繼遷母而端救之然是年九月凖始參政附此事於九月後乃可或附至道元年九月後奪所賜姓名時兼二人並居政府所云宰相及樞密等字仍須刪改庶不甚抵牾更詳之也上謂宰相曰今歲西成四方大稔人民亦無疾疫皆上天垂佑所致當與卿等力行好事以答天意又嘗謂宰相曰昔楚文王得茹黃之狗苑路之矰畋於雲夢三月不返保申諌之王引席伏地申束箭五十跪加王背者再申趨出請死王召而謝之殺狗折矰務治國事并國三十九朕觀書至此未嘗不嗟賞數四自古君臣非道合何以及此若君不信用雖有直臣亦無以行其道宋琪曰此事一百年來人君亦罕有知者非陛下博覽安能得兹監戒然臣聞知之非艱行之惟艱願陛下勉之上深然其言又嘗謂宰相曰朕於百姓孜孜訪問務欲令其得所感悅人情固亦不難且虎狼之性最難調伏者如苑中畜虎以時餌之便知養育之恩每以馴擾况於人乎二事不知的是何時按實録此月乙亥上云已讀御覽八百卷恐因是言及殺狗折矰事今并養虎事書之别本養虎事在太平興國八年十月壬辰殺狗折矰事在八年十月甲子皆云與宰相論此按宋琪八年十一月壬子乃為宰相恐别本誤今不取冬十月上之即位也召華山隱士陳摶入見於是復至上益加禮重謂宰相宋琪等曰摶獨善其身不干勢利所謂方外之士也在華山已四十餘年度其年當百歲自言經五代亂離幸天下承平故來朝覲與之語甚可聼因遣使送至中書琪等從容問摶曰先生得𤣥默修養之道可以化人乎對曰摶山野之人於時無用亦不知神仙黃白之事吐納之理無術可傳於人假令白日上升亦何益於世主上龍顔秀異有天人之表博逹今古深究治亂真有道仁聖之主也正是君臣協心同德興化致治之秋勤行修鍊無出於此琪等表上其言上益喜甲申賜摶號希夷先生令有司增葺所止臺觀上屢與屬和詩什數月遣還上嘗謂宰相曰朕每日所為有常度辰巳間視事既罷即看書深夜乃寢五鼓而起盛暑永晝未嘗卧至於飲食亦不過差行之已久甚覺得力凡人飲食飽無不昏濁儻四支無所運用更復就枕血脉凝滯諸疾自生欲其清爽得乎老子云我命在我不在天全繫人之調適卿等亦當留意無自輕於攝養也寶訓云此事在九年不知月今附見陳摶後壬辰禁布帛不中度者有違詔復織募告者三分畀其一癸巳嵐州獻牝獸一角似鹿無斑角端有肉性甚馴人莫能辨詔羣臣參驗之且諭㫖曰符瑞之事非朕所尚也右散騎常侍徐鉉右諫議大夫滕中正中書舍人王祐等皆援引圖史以為祥麟宰相宋琪等拜表稱賀上曰珍禽竒獸奚益於事方內大寧風俗淳厚此乃為上上瑞耳比年四方所獻禽獸之異者甚多止令畜於苑囿以遂其生生之性琪等固請宣示於外凡瑞物六十三種並圖付史館辛丑詔閣門自今應承受到中書劄子如有錯誤揩改者未能施行却送中書照㑹十一月丙寅親饗太廟丁卯祀天地於南郊大赦改元初太祖追尊四廟親郊以宣祖配天及上即位禮官以為舜郊嚳商郊冥周郊后稷王業因之而興也若漢髙之太公光武之南頓雖有父之尊而無豫配天之法故三年六年再郊並以太祖配天於禮為允上將東封詔扈䝉定禮儀䝉乃奏議云經曰嚴父莫大於配天請以宣祖配天而太祖配上帝及罷封禪為郊祀遂用䝉議議者非之自張昭竇儀卒朝廷咨訪典故草立儀法皆䝉専焉唐制散官二品京官文武職事五品以上及都督刺史皆帶魚袋國初其制多闕丁卯赦書初許升朝官服緋緑及二十年者叙賜緋紫內出魚袋以賜近臣自是內外升朝文武皆帶凡服紫者飾以金服緋者飾以銀京朝官幕職州縣官賜緋紫者亦帶親王武官內職將校皆不帶癸酉以建州進士楊億為祕書省正字時年十一億徽之從孫七歲能屬文上聞其名詔江南轉運使張去華就試詞藝遣赴闕連三日得對試賦五篇皆援筆立成上深歎賞命中使送至中書又賦詩一章略不杼思宰相駭其俊異削章為賀上曰可與一官留京師時詔令賦詩於前以適意故有是命十二月癸未召京城耆耋百歲以上者凡百許人至長春殿上親加慰撫老人皆言自五代以來未有如今日之盛也各賜束帛遣之丁亥廢嶺南諸州采珠場自是唯商船互市及受海外之貢壬辰立德妃李氏為皇后后以太平興國二年七月入宫至是立為皇后詔辭但云隴西李氏則未始封德妃也按本傳及㑹要等亦不載德妃之號不知本紀何故云爾當考丙申大酺集開封府及諸軍樂人自丹鳳門前至朱雀門東西凡數里遷四市貨殖五方士女大㑹作山車旱船往來御道為魚龍曼延之戲音樂雜發觀者闐咽甲辰大雨雪先是上謂宰相曰今冬氣和暖開春恐有獲癘郊祀酺宴之後若得三五寸雪大佳至是隂雲四合積雪盈尺上嘗語宰相曰統制區夏自有道理若得其要不為難事必先正其身則孰敢不正若恣情放志何以使人凜懼朕每自勉勵未嘗少懈至於內外官吏皆量才任職喻如匠者架屋棟梁榱桷咸不可闕也宋琪曰近見陛下自供奉官殿直承㫖三司大將諸州邸吏咸加選擢褒奬功勤振拔淹滯內外無不知勸上曰此輩久歷艱難皆無曠敗若曾有瑕玷人不保者不預兹選朕非但振舉湮沈亦欲激厲使為好事耳琪曰陛下不以卑冗躬自搜訪量材任職無有棄人所謂竹頭木屑亦不遺棄者也選用三司大將等事寶訓云在九年因取量材任使如作屋等語連書之選用三司大將别本亦在此年七月
