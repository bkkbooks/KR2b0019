body:
  text: 續資治通鑑長編巻一百二十二宋李燾撰仁宗寳元元年夏四月庚午詔天下毋得連用真宗皇帝藩邸舊名癸酉給事中同知樞宻院事王博文卒始博文為三司使言於上曰臣且死不得復望兩府之門因泣下上憐之後數日與陳執中並命位樞宻凡三十六日死時乗輿宴金明池既歸而奏訃至趣駕臨奠贈吏部侍郎愽文以吏事進多任劇繁為政務平恕嘗語諸子曰吾平生决罪至流刑未嘗不隂擇善水土處汝曹志之然治曹汭獄議者多謂博文希章獻㫖縱羅崇勲傅致其罪云初度支員外郎集賢校理張昷之提㸃淮南路刑獄知亳州楊崇勲恃恩為不法械䝉城知縣王申送獄昷之往問得寃狀破械出申遂黥配姦吏十數人甲戌授昷之廣南東路轉運使廣州有急水濠通海姦人乗潮汐出入為盗昷之為作水栅夷人有犯其酋長得自治而多慘酷因請一以漢法從事昷之佖子也乙亥給事中權御史中丞張觀同知樞宻院事帝初諭中書候兩府闕官則用宋庠及王博文卒中書以庠名進上曰觀先朝狀元合先用也蓋譖者之說已行然帝遇庠厚卒用之刑部尚書知陳州晏殊以本官兼御史中丞充理檢使丁丑契丹遣保平節度使耶律幹崇禄少卿秦鑑来賀乾元節乙酉徙知亳州河陽三城節度使楊崇勲知陳州丁亥詔諭天下士勉事厥修勿以累舉叙年冀望恩澤天聖五年四月已有此詔或可削此賜河南府嵩陽書院田十頃辛夘命翰林學士晁宗慤内侍押班史崇信同議茶法壬辰除宜融州夏稅乙未詔自今試舉人非國子監見行經書毋得出題從翰林侍讀學士李淑之請也五月庚子賜進士張宗雅同出身宗雅既下第自陳能講三經詔國子監試而命之仍附春牓張宗雅何人當考不然削去齊賢六子皆連宗字乃無所謂宗雅者駙馬張惇禮先世當考乙巳御崇政殿録繫囚雜犯死罪降從流情理重者刺配五百里外牢城流以下遞降一等杖以下釋之三京畿内特遣官諸路令轉運使副提㸃刑獄踈决之丁未録故㐮陽縣尉劉道濟子初為郊社齋郎以道濟出捕冦渡漢江溺死故也戊申詔吏部流内銓新及第諸科人年十七以下者令守選太常丞直史舘判鹽鐡勾院同修起居注葉清臣父參知蘇州致其仕清臣請外以便養壬子授兩浙轉運副使時太湖有民田豪右據上㳺水不得泄民不敢訴清臣建言疏盤龍匯滬瀆港入於海民頼其利甲寅右司諫韓琦言大中祥符八年敇犯銷金者斬比下詔申警其捕獲者固宜凖敇從事而審刑院創意定罪止徒三年恐壞先朝之法啟奢僭之漸請復用祥符舊敇詔御史臺刑部與審刑院大理寺詳定以聞六月戊辰資政殿大學士宋綬知審官院初翰林侍讀學士梅詢知審官院虞部員外郎潘若冲求為白波發運判官詢怒其求不已因忿詈之若冲亦出不遜語詢即以其事聞乃降若冲小處差遣而詢亦代之西上閤門使康州刺史知雄州葛懐敏召對邊事復遣還雄州特授萊州團練使右司諫韓琦言懐敏在武臣流軰雖粗有才幹却未嘗别著勞效朝廷名器理須愛重若臣僚能顯立邊功未知何以奬勸欲望特行追寢以正濫賞之失不報丙子三司檢法官孫抗請三司刑名之有疑者如開封府例許至大理寺商議從之抗黟人也戊寅罷天下舉念書童子皇祐三年九月可考己夘建州言自正月雨至四月谿水大漲入州城壞民廬舍賜死者家錢有差葬祭其無主者帝留意農事毎以水旱為憂甲申詔天下州郡毎旬上雨雪狀著為令戊子權知司天少監楊惟徳等言來嵗己夘閏十二月則庚辰嵗正月朔日當食請移閏於庚辰嵗則日食在前正月之晦上曰閏所以正天時而授民事其可曲避乎不許張唐英政要云景祐四年冬司天上言明年正旦日食此謂三朝之始人君尤忌之請移閏月以避之上亦以為然以問大臣參知政事程琳曰日者衆陽之長人君之象今有所食蓋陛下乾剛之道或有所虧而致惟修徳政可以免上曰卿言極是朕亦思之不如自責可以答天變上畏天之變不為日者所惑如此己未詔賢良方正能直言極諫博通墳典明於教化才識兼茂明於體用及茂才異等四科並同試策題詳明吏理可使從政洞識韜畧運籌决勝軍謀宏逺才任邊寄凡三科各為策題秋七月丁酉詳定茶法所張觀等請入錢京師以售真州等四務十三塲茶直十萬者又視景祐三年數損之為錢六萬七千入中河北願售茶者又損一千而詔又第損二千於是入錢京師止為錢六萬五千入中河北為錢六萬四千而已戊戍詔以冬至有事於南郊其乗輿服御等物令三司務從簡約辛丑賜討安化州蠻土軍緡錢庚戌新作舍人院紫薇閣上親篆其牓癸丑賜襄州學田五頃丙辰羣臣表上尊號曰寳元體天法道欽文聪武聖神英睿孝徳上不許羣臣五上表上謂宰相張士遜曰唐穆宗云强我懿號不若使我為有道之君加我虚尊不若處我於無過之地朕毎愛斯言卿等亦宜悉此意士遜懇請不已上不得已乃詔英睿二字不稱餘從所請熊克九朝通略上以穆宗之言戒士遜蓋有㫖哉右司諫韓琦言前奉詔詳定鐘律嘗覽景祐樂記覩李照所造樂不合古法皆率已意别為律度朝廷因而施用識者久以為非今將親祀南郊不可重以違古之樂上薦天地宗廟竊聞太常舊樂見有存者郊祀大禮請復用之詔資政殿大學士宋綬御史中丞晏殊同兩制詳定以聞綬等言李照新樂比舊樂下三律衆論以為無所考據願如琦請郊廟復用和峴所定舊樂舊樂鐘磬不經鐫磨者猶存三縣竒七虡郊廟殿廷可以更用乃詔太常舊樂悉仍舊制李照所造勿復施用𤦺以五月上言綬等以七月定議今從本志聨書之都官員外郎魏莊自陕西催市糴糧草還既得對乃面求為省府官右司諫韓𤦺言莊人品凡下止因王随援引得知赤縣而三司希意薦舉俾往陜西辭日已賜三品服今敢復有干凟請劾正其罪戊午降莊通判揚州壬戍御崇政殿策試賢良方正能直言極諫著作佐郎田况大理評事張方平茂才異等邵亢况所對入第四等方平四等次亢與宰相張士遜連姻報罷况遷太常丞方平著作佐郎通判江寕府及睦州况信都人亢丹陽人也實録云亢策字數少不合格今從亢本傳王珪銘亢墓亦云范仲淹薦亢應賢良方正科時布衣被召者十四人皆試秘閣獨得亢一人及試崇政殿除建康軍節度推官㑹有欲中傷宰相者乃宻言亢與之連姻命遂中格人莫知其所以然蓋張士遜娶馮氏子娶邵氏邵偶與亢同姓爾士遜既不能辯亢亦無言而去癸亥策試武舉人八月丙寅試武舉人騎射丁夘復置淮南江浙荆湖制置發運使以兵部郎中直史舘楊日嚴度支郎中楊告為之先是陜西轉運使叚少連言前為淮南轉運偶值豐年而上供之數得以辦集然諸路各任所見不相統屬恐經久誤大計遂從少連之議復命日嚴等癸酉同提㸃京東路刑獄王繼祖請自今諸路提㸃刑獄廵所部内民有訴寃枉者許受理之詔聽受詞狀送轉運司施行乙亥知制誥鄭戬判刑部集賢校理彭乗同判仍詔自今常差大兩省一員給添支錢一萬同判給茶錢五千丙子工部郎中知制誥王舉正為契丹生辰使禮賔副使張士禹副之右司諫直集賢院韓琦為正旦使左藏庫使髙繼嵩副之琦言繼嵩昨知環州因軍士得遺箭繫匿名文字言繼嵩將叛繼嵩心不安乞還朝臣察其事之偽者有二辨其惑者有一繼嵩久在西邊頗以勇敢聞或為西賊所惡設反間而去之不然則馭下嚴而為戍卒巧計以中之此其偽可察二也且繼嵩背義投誠元昊必隂納其説若元昊忠於朝廷則當宻奏其事何必以遺箭逹其叛狀乎此又其惑可辨一也臣愚以謂宜急遣繼嵩還邊其元告匿名文字亦乞論罪如律外以杜黠賊行間之謀内以破惰兵詭中之計次以堅繼嵩用命之心使邊郡聞之孰不畏朝廷之明而厲忠義之懐也庚辰詔繼嵩復知環州以西染院副使兼閤門通事舍人王從益代使契丹從益漢忠子也鎮國軍節度使駙馬都尉李遵朂屬疾奏請納禄援唐韋嗣立故事求山林號詔不許車駕臨問賜白金五千兩辭不受及卒復臨奠之輟朝二日贈中書令謚和文遵朂醖藉力學王旦噐之自以近戚當有補助天聖末嘗奏事殿中上起更衣章獻屏左右問比來外人有何言遵朂唯唯太后固問遵朂曰臣無他聞但議者謂天子既冠太后宜以時還政太后曰我非戀此帝年少内侍多尚恐未能制之耳嘗上三說五事以論朝政太后崩宻論后乳母晋國夫人林氏前多干預國事中外病之宜居之别院限其進見以厭衆論遵朂賜第園池為都城第一所與㳺集皆一時名士師楊億為文億卒為制服及知許州奠億之墓於具茨山慟哭而返又與劉筠友善筠卒周其家尤通釋氏學將死與浮屠楚圓以偈頌相提警遺戒無置金玊槨中甲申詔殿侍換文資須三代曾任文資乃聽之罔冐者勒停仍不以赦原保官亦如之乙酉詔元奏舉縣令人毋得監當塲務丁亥右騏驥使貴州團練使入内副都知張永和為入内都知禮賔副使鄧保信為洛苑副使永和等領作南郊儀仗成特遷之流内銓言選人如曽經轉運使提㸃刑獄或本州體量不至亷謹之類候得替引見量與降資從之九月乙未出内藏庫錦綺綾羅一百萬下陜西路市糴軍儲丁酉度支員外郎崇文院檢討天章閣侍講王崇道罷睦親宅講書及同知太常禮院坐孟秋薦饗太廟及夕月輙不赴祠事也宗道嘗因奏事自陳為王府官二十年不遷上憐之賜以章服御史劾奏事寢不報宗道自陳據記聞及記事不知何時因罷睦親宅講書并見之臺官劾奏事寢不報此據韓𤦺諫稿也太常少卿直昭文舘知廣州任中師言州有市舶使印而知州及通判使臣給銜並帶勾當市舶司事庚子詔知州少卿監以上自今並兼市舶使市舶置使自中師始也辛丑益利鈐轄司言知保州董繼遷卒本部首領請以其子元仲代知保州從之戊申詔應縁祀事已受誓戒而不䖍㳟者毋得以赦原又詔强盗執縛人投水中偶得不死者並同已傷法賜宜融州討蠻兵丁緡錢己酉鄜延路鈐轄司言趙善約特遣人至金明縣與都監李士彬約降已令却之詔鈐轄司及環慶涇原麟府等路各謹斥候如善約特復遣人至但令士彬以己意約囬務令邊防安靜初趙元昊悉㑹諸族酋豪刺臂血和酒置髑髏中共飲之約先冦鄜延欲自徳靖塞門赤城路三道酋豪有諫者輙殺之善約特者元昊從父也數止元昊不聽善約特畏誅先遣人持偽誥詣士彬欲自將兵扼黄河南渡發部落内屬而挈其妻伊克伊羅羅子阿裕爾及親屬三十二人以珍寳名馬來降是月庚子至保安軍知保安軍朱吉以告知延州郭勸勸與鈐轄李渭狐疑不敢受先是善約特等豫寄珍寳於士彬以萬數勸詰士彬士彬利其物答云無有且言未嘗招誘之勸渭亦以為自德明納貢四十年有内附者未嘗留共議遣還仍約束縁邊勿受降者於是奏入因降詔勸渭尋遣善約特還善約特不可即命監押韓周執善約特等送元昊至鼐博坡元昊集騎射兵射而殺之善約特名惟亮與弟惟永分掌左右廂兵其從弟惟序亦親近用事善約特有勇略國人向之元昊惡其不從已嘗語惟序曰汝告善約特反吾以善約特官爵與汝不然俱族滅矣惟序不忍更告善約特善約特欲來降與惟永謀惟永曰南朝無人不知烏珠所為將不信兄兄必交困善約特曰事已至此無可奈何若南朝有福則納我矣遂告其母母曰汝自為計我年八十餘不能從汝去為汝累當置我室中縱火焚之善約特等涕泣如母言及為韓周所執號哭稱寃周見元昊於宥州元昊衣錦袍黄綿胡帽不肯受善約特等曰延州誘我叛臣我當引兵赴延州於知州㕔前受之周說諭良乆乃肯受時元昊自稱烏珠已數年既殺善約特遂謀僣號善約特兄弟姓名並據司馬光日記韓周所言周又言善約特妻李氏先自殺然善約特固與妻伊克伊羅羅來降恐周所言或未審今削此叚不著庚戌徙知慶州復州刺史趙振知環州西京左藏庫使髙繼嵩領昭州刺史為環慶路鈐轄兼知慶州丁巳進封齊國永壽保聖夫人許氏為魏國夫人辛酉罷河北陜西提舉使糴糧草官令本路轉運使副及逐州通判提舉冬十月丙寅詔戒百官朋黨初吕夷簡逐范仲淹等既踰年夷簡亦罷相由是朋黨之論興士大夫為仲淹言者不已於是内降劄子曰向貶仲淹盖以宻請建立皇太弟姪非但詆毁大臣今中外臣僚屢有稱薦仲淹者事渉朋黨宜戒諭之故復下此詔參知政事李若谷建言近嵗風俗薄惡専以朋黨汚善良蓋君子小人各有類今一以朋黨目之恐正臣無以自立帝然其言按實録丙寅詔書専戒朋黨蓋為稱薦仲淹者設仲淹本傳載語士遜云云與實録亦同而若谷傳乃云若谷建言帝悟為下詔諭中外然詔書則與若谷所言異意矣疑此詔既下若谷始納説帝因若谷納説遂釋朋黨之疑耳初下此詔實不縁若谷建言也今畧删潤之以政要云太平日久仕進之人競於趨附多依託權要希進用又臺諫言事瑣細不根治體多挾怨報仇以害良士上甚猒之乃謂宰臣曰古者卿大夫相與譲於朝士庶人相與譲於道周成王刑式不用漢文之時耻言人過今士人交誣朕甚恥之乃下詔戒諭時景祐五年十月也詔既下邪柔者頗增媿景祐五年十月詔即此詔也張唐英蓋不知事實妄記此耳今不取按景祐無五年此似誤鹽鐡副使工部郎中司馬池嵗滿當遷中書進名上曰是固辭諫官者遂命為天章閣待制知河中府己巳以契丹歸明人張惟良為三班奉職賜名慶弟惟成為下班殿侍賜名顯辛未左千牛衛将軍宗實為左領軍衛將軍壬申詔翰林學士至龍圖直學士及諸行侍郎以上宣借六軍兵士各十人給事中諫議大夫知制誥待制各七人授外任無得占㽞其三司使御史中丞知開封府群牧使領三宫觀事已破本處人者毋得差甲戌趙元昊築壇受册僭號大夏始文英武興法建禮仁孝皇帝改大慶二年曰天授禮法延祚元年遣攀宻布伊里瑪竒㸃兵集蓬子山自詣西凉府祠神仍遣使以僭號來告右司諫韓琦請赦前一月約束京師犯盗罪至徒若傷人者勿赦從之丙戌審官院言京朝官授差遣有親戚法當避而不言到任方乞就移者並注逺小處從之己丑改萬春閣為延春閣閣在禁中北臨後苑㳺幸之所經也增置環州弓箭手一指揮庚寅贈太子太保謚僖質趙稹卒十一月乙未以嘉慶院為景靈宫道院録乘氏縣尉孟津子果為太廟齋郎昱為郊社齋郎以津捕盗鬬死特恤之河東轉運司言忻州地震民罹覆壓有李贇等二十五家皆户絶田産當沒官詔如異居親族願承買者聽之仍减元價十之三甲辰詔臣僚陳乞親屬差遣如係京官並須年及格仍試書札讀律乃聽出官詔廣南西路鈐轄司趣宜融州進兵討安化蠻初官軍與蠻戰為蠻所敗鈐轄張懐志等六人皆死直史館蘇紳上疏曰國家比以西北兩邊為患而鮮復留意南方故有今日之患誠不可不慮也臣頃從事宜州粗知蠻本末安化地幅員數百里持兵之衆不過三四千人然而敢肆侵擾者非特恃其險絶亦由往者守將失計而國家姑息之太過也向聞宜州吏民言祥符中蠻人騷動朝廷興兵討伐是時惟安撫都監馬玉勒兵深入多所殺獲知桂州曹克明害其功累移文止之故玉志不得逞至今蠻人畏伏其名而能言者猶惜之使當時領兵者皆如玊則蠻當殄滅無今日之患矣至使乗隙踔邊屠殺將吏其損國威無甚於此朝廷儻不以此時加兵則無以創艾將來而震疊荒裔彼六臣者雖不善維馭自致䘮敗然銜寃負恥當有以刷除之臣觀蠻情所恃者地形險扼據髙臨下大軍難以並進然其土壌磽确資蓄虛乏刀耕火種以為餱糧其勢可以緩圖不可以速取可以計覆不可以力爭今廣東西教閱忠敢澄海湖南北雄武等軍皆慣渉險阻又所習兵器與蠻人略同請速發詣宜州策應而以他兵代之仍命轉運使備數年軍食方秋冬之交嵐氣已息進軍據其出路轉粟補卒為曠日持久之計伺便利即圖深入可以傾蕩巢穴杜絶迒蹊縱使奔迸林莽亦且壊其室廬焚其積聚使進無鈔略之獲退無攻守之備然後諭以國恩許以送欵而徙之内郡收其土地募民耕種異時足以招外夷為屏蔽也仍詔旁近諸蠻諭以朝廷討叛之意毋得相為聲援如獲首級即優賞金帛計若此則不越一年逆冦必就殄滅况廣西溪峒荆湖川峽蠻落甚多大抵好為騷動因此一役必皆震讋可保數十年無俶擾之虞矣上嘉納之時朝廷已命洛苑使榮州刺史馮伸已知桂州兼廣西鈐轄伸已道江陵未至上遣中使諭伸已速行伸巳日夜疾馳至宜州繕器甲訓隊伍募民發丁壯轉糧餉由三路以進伸已臨軍單騎出陣語酋豪曰朝廷撫汝曹甚厚何乃自取滅亡天子使我來問汝汝聽吾言則生不然無噍類矣衆蠻仰泣羅拜曰不圖今日復見馮公也先是大中祥符末及天聖間伸已嘗再知宜州蠻頗服其威信故云明日蠻渠䝉頂投兵械萬計率衆降軍門初部卒以覆將畏匿伸已曰紀律不明將自取敗戰士何罪請貸死約期來歸朝廷從之廣西遂定伸己拯從子也蘇紳傳云蠻渠䝉光月馮伸已傳云䝉頂未知兩人或一人也當考明年正月辛亥廣西鈐轄司始奏安化州蠻平今因趣鈐轄司進兵即附蘇紳䟽及馮伸已臨軍事跡然蠻平要不出今年明年正月辛亥奏到之日也辛亥實正月二十日初蠻攻殺將吏所部卒畏為累而誅謀欲叛提㸃刑獄徐的馳至宜州慰曉之曰爾曹亡將吏固有罪然出力討賊猶可立功以自贖若朝叛則夕死非計也衆皆聽命又以土人習戰奏復澄海忠敢軍卒皆獲其用云乙巳南郊禮儀使宋綬上鹵簿圖記十巻降賜褒諭宋綬傳云郊祀綬攝太僕卿陪玉輅帝問儀物典故占對辨治因上所傳鹵簿圖記十巻按鹵簿圖記以天聖六年上序稱再飭大駕郊見上帝盖天聖二年五年仁宗凡再郊也至是又増飾之耳詳定閤門儀制所言御史中丞率屬官上殿班在開封府上其獨請對自依官序從之時中丞晏殊言故事御史臺奏事班在三司之次開封府之前天聖九年始用内東門儀乃班開封府下故申明之詔廣南西路民有運糧至宜州者免來年夏稅之半宜融二州經蠻寇及以丁夫入溪洞者全免之使臣將校戰沒者各與贈官仍録其子孫以聞戊申朝饗景靈宫己酉饗太廟奉慈廟庚戌祀天地於圜丘大赦改元自今日以前已根磨出積年隠䧟税賦並與除放乙夘復奉舉縣令戊午鄆州言資政殿大學士左僕射王曾卒輟視朝二日贈侍中謚文正曾姿質端厚眉目如刻畵盛服屹然入朝進止有常處平居寡言自奉亷約人莫敢干以私其名重天下少與楊億同在侍從億喜詼諧與曾言則曰余不敢以戯也前後輔政十年其所進退士人莫有知者范仲淹嘗以問曾曾曰夫執政者恩欲歸已怨使誰當仲淹服其言先是有大星墜其寢左右驚白之曾曰後一月當知及期曾果卒皇祐中上為篆其墓碑曰旌賢之碑後又改其鄉曰旌賢大臣碑得賜篆自曾始己未河北屯田司言欲於石塜口𨗳百濟河水以注縁邊塘泊請免所經民田稅從之時嵗旱塘水涸知雄州葛懐敏慮契丹使至測知其廣深乃擁界河水注之塘復如故懐敏事據本𫝊附見庚申詔尚書及刺史以上加恩告敇許其親屬乘驛齎賜十二月癸亥朔封宰臣張士遜為郢國公加恩百官甲子京師地震丙寅鄜延路都鈐轄司言趙元昊反辛未徙環慶路副部署殿前都虞候邕州觀察使劉平為鄜延路副部署癸酉命三司使户部尚書夏竦為奉寕節度使知永興軍資政殿學士吏部侍郎知河南府范雍為振武節度使知延州交趾郡王李徳政為南平王邈川首領保順軍留後嘉勒斯賚為節度使甲戌刑部尚書兼御史中丞晏殊復為三司使龍圖閣直學士給事中知兖州孔道輔入為御史中丞知并州樞宻直學士杜衍加龍圖閣直學士以太原要重藉衍鎮撫故也詔陜西河東縁邊舊與元昊界互市處皆禁絶之丁丑詔有能捕元昊所遣刺探事者賞錢十萬又詔諸路部署廵檢司體量縁邊鎮寨都監監押使臣材勇習知邊事及老疾不任職者以名聞戊寅徙判許州吕夷簡判天雄軍己夘詔以知永興軍夏竦兼本路都部署提舉乾耀等州軍馬涇原秦鳯路安撫使知延州范雍兼鄜延路都部署鄜延環慶路安撫使庚辰命給事中集賢院學士俞獻卿同三司詳定除放天下欠負甲申夏竦乞預借月俸以辦行李詔特借一季乙酉詔三司嵗給嘉勒斯賚綵絹千匹角茶千斤散茶千五百斤丁亥契丹遣髙州觀察使耶律徳廣州團練使崔繼芳来賀正旦初忻州地震翰林學士權知開封府胥偃言地震隂之盛今朝廷政令不專上出而後宫外戚恩澤日蕃此陽不勝隂之效也加之外國内侮宜選將練師以防侵軼及祀南郊趙元昊朝貢不至將議討之偃曰遽討之大暴宜遣使問其不臣狀待其辭屈而後加兵則其不直在彼而王師之出有名矣又奏戍兵代還宜如祖宗制閲其藝後殿次進之㑹有衛卒賂庫吏求揀冬衣坐繫者三十餘人時八月霜雪暴至偃推洪範急常寒若之咎請從末减詔可士卒戍西邊妻子㽞京師者犯法當死帝不忍使就刑或欲以毒置飲食中令得善死偃極言其不可帝亦悔而止宦者程智誠與三班使臣馮文顯八人抵罪帝使赦智誠三人而文顯五人坐如法偃曰恤近遺逺非政也况同罪異罰乎詔并釋之嘗受詔試中書吏而大臣有以簡屬偃者偃不敢發視亟焚之且曰發而言之不亦傷刻薄乎八月霜雪暴至不見於五行志及本紀不知是何年本傳附偃權知開封府後疑與戍卒妻子犯罪及程智誠等坐法皆偃糾察刑獄時事不必在開封當考
