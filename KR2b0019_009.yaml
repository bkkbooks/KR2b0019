body:
  text: 續資治通鑑長編卷五宋李燾撰太祖乾德二年春正月王稱東都事略辛巳詔曰箕子之陳八政食為之首夷吾之述四民農居其一今土膏將起勾萌畢達平秩東作乃其時也諸州長吏等所宜敦率勸課俾民力耕謹視游惰勿令廢業厚生務本副豫意焉癸未幸迎春苑宴射甲申宰臣范質為改卜安陵使上以選人食貧者衆詔吏部流內銓聽四時參選仍命翰林學士承㫖陶榖等與本司官重詳定循資格及四時參選條乙酉吏部尚書張昭請依三祖廟禮例改明憲皇后諡為昭憲從之回鶻遣使來貢丁亥祠部郎中知制誥充史館修撰南陽張淡責授左司員外郎以祕書郎直史館張去華為右補闕賜襲衣銀帶鞍勒馬先是去華上章訴居官久次且言淡及祠部員外郎知制誥盧多遜等文字膚淺願得校其優劣上即詔淡等與去華偕試講武殿命翰林學士承㫖陶榖知制誥髙錫等考之淡所對策不應問故責淡錫素不相能錫因教去華訐其短又與穀共黨去華而黜淡朝議薄去華輕躁自是凡十六年不遷去華誼之子也誼初見晉天福二年僧文瑩玉壺野史稱殿中侍御史師頌亦不中選時號揀停殿院然實録正史皆不載也前開封府尹曹參軍桑塤撾登聞鼓訴吏部條格前後矛盾已當為望縣令乃注中縣詔集三署官議於尚書省以塤所訴為是擢殿中丞塤維翰之子也宰相范質王溥魏仁浦等再表求退戊子以質為太子太傅溥為太子太保仁浦為左僕射皆罷政事先是宰相見天子必命坐有大政事則面議之常從容賜茶而退自餘號令除拜刑賞廢置但入熟狀畫可降出即行之唐及五代皆不改其制猶有坐而論道之遺意焉質等自以前朝舊臣稍存形迹且憚上英武每事輒具劄子進呈退即批所得聖㫖而同列署字以志之嘗言於上曰如此則盡稟呈之方免妄誤之失矣上從之由是奏御寖多或至旰昃賜茶之禮尋廢固弗暇於坐論矣後遂為定式蓋自質等始也此據王曽筆録然質在相位所下制敇未嘗破律命刺史縣令必以戶口版籍為急使者按民田及獄訟皆召見為述天子憂勤之意乃遣之時號賢相己丑內殿起居無宰相太子太師侯章為班首章榆次人纍任方鎮所至貪暴既罷節鉞常怏怏不樂一日於朝堂縱言及晉漢間事坐有輕章者章厲聲曰當北主疾作將議北歸乃有上書請避暑嵩山者此豈忠信之人乎我雖粗人以戰鬭取富貴如此諛佞未嘗為也坐有慙色章初見天福元年庚寅以樞密使趙普為門下侍郎平章事集賢院大學士宣徽北院使判三司上黨李崇矩崇矩初見廣順元年為檢校太尉案宋史宰相表作檢校太保充樞密使上既除普及崇矩乃無宰相署敇上時在資政殿普因入奏其事上曰卿但進敇朕為卿署字可乎普曰此有司所行非帝王事也乃使問翰林學士講求故實陶穀建議以為自古輔相未嘗虛位唯唐太和中甘露事後數日無宰相時左僕射令狐楚等奉行制書今尚書亦南省長官可以署敇竇儀曰榖所陳非承平令典不足援據今皇弟開封尹同平章事即宰相之任也上從儀言壬辰詔曰先所置賢良方正能直言極諫經學優深可為師法詳間吏理達於教化等三科並委州府解送吏部試論三道限三千字以上而自曩及今未有應者得非抱倜儻者恥肩於常調懷讜直者難效於有司必欲興自朕躬乎繼今不限內外職官前資見任布衣黃衣並許詣閣門投牒自薦朕當親試焉丁酉命開封尹光義為改卜安陵使兼轄五使公事己亥以樞密承㫖王仁贍為左衛大將軍充樞密副使庚子改清源軍為平海軍命陳洪進為節度使其子文顯為副使文皓為海州刺史洪進每嵗貢奉多厚斂於民又籍民資百萬以上者令入錢補協律奉禮郎而蠲其丁役子弟親戚交通賄賂二州之民甚苦之案薛應旗續通鑑作一州之民甚苦之壬寅敇趙普監修國史先是宰相兼職皆內出制處分今止用敕非舊典也國朝因唐及五代之故命相分領三館首相為昭文館大學士其次為監修國史其次為集賢院大學士甲辰詔曰廷尉斷獄秋曹詳刑斯舊典也唐長興初始立大中小事之限而周廣順之制不許中書専决品式具在固可遵行比年以來有司廢職具獄來上煩於親覽自今諸道奏案並下大理寺檢斷刑部詳覆如舊制焉其兩司官屬善於其職者滿嵗增秩稽違差失者重置其罪乙巳禁民越訴上幸玉津園宴射賜京城役兵薑茶丁未詔州縣官有昏耄篤疾不任從政者令判官録事紏舉與長吏同署列狀以聞判官録事之能否則委長吏察焉先是詔諸縣令尉非公事無得輒入鄉村及追領人戶節級衙參於是又申明之判官録事察其違者劾罪以聞先詔乃建隆四年五月十七日然實録新舊㑹要並不載也是月昭義節度使李繼勳兵馬鈐轄康延沼馬步軍都軍頭尹勳等帥步騎萬餘攻遼州北漢馬軍都指揮使郝貴超領兵來援戰於城下貴超大敗刺史杜延韜延韜未見危䠞與拱衛都指揮使冀進進未見兵馬都監供奉官侯美侯美未見籍部下兵三千人舉城來降延沼延澤弟也北漢尋誘契丹步騎六萬入侵繼勳復與彰德節度使羅彥瓌西山巡檢使郭進內客省使曹彬等領六萬衆赴之大破契丹及北漢軍於遼州城下本紀不言北漢誘契丹止言契丹六萬騎來援劉筠傳又不載契丹來援事契丹及李繼勳𫝊則皆云北漢誘契丹也今從之契丹𫝊乃以曹彬為武懷節今不取新舊並無此不知的是何時今附見杜延韜以遼州降李繼勳即遣慕容延忠入奏二月戊子朔延忠到闕今於正月末書其事二月戊申朔翰林學士竇儀等上新定四時參選條件諸州印發春季選人文解自千里至五千里外分定日限為五等各發離本處及亰百司文解並以五月十五日前到省餘季凖此若州府違限及解狀內缺少事件不依程式本判官罰直録事參軍本曹官殿選諸州員闕並仰申闕解條樣以木夾重封題號逐季入遞送格式其百司技術官闕解亦凖此季內不至及有漏誤諸州本判官以下罰直殿選亰百司本官奏裁諸司歸司官合格日四時奏年滿俟敇下凖格取本司文解赴流內銓據狀申奏依四時取解參選從之是日幸教船池遂幸相國寺癸丑遣給事中劉載賑陜州饑民命右武統軍陳承昭帥丁夫數千鑿渠自長社引潩水至亰合閔河潩水出密之大騩山歷許田㑹春夏霖雨則大溢害稼及渠成民無水患閔河之漕益通流焉甲寅杜韜等七人案杜韜疑即杜延韜脫去延字至自遼州上赦其罪賜分物有差及楊璘至自府州亦如之唐主上表謝示諭陳洪進事乙卯詔答之丁巳安陵隧道壞役兵壓死者二百人命瘞之賜其家錢帛壬戌詔自今藩鎮帶平章事求休退者每遇朝㑹宜令綴中書門下班先是安逺節度使兼中書令王晏為太子太師致仕上欲優其禮故降是詔丁卯詔曰周廣順中敇應出選門州縣官內有十六考叙朝散大夫階次赤令并歷任曽升朝及兩使判官諸府少尹罷任後及一周年曽任兩蕃營田判官書記支使防禦團練判官罷任後及二周年並與除官諸色選人過三選以上及未成資考丁憂課績官無選可減者令於南曹投狀凖格敇考較無違礙並與除官自恐虧損年限資序願歸選門者亦聽如曽任推巡軍事判官並諸色出選門官並據見任官選數叙理先次除官其昭雪官依例刑部檢勘送銓凖元敇資叙注擬戊辰以鞏縣令兼安陵臺令以遼州降兵分𨽻效順餘為懷恩軍甲戍唐主遣使修貢助安陵改卜也吏部尚書張昭與翰林學士承㫖陶穀同掌選穀誣奏左諌議大夫崔頌以所親屬給事中李昉求東畿令引昭為證上召昭面質其事昭知其不直於上前免冠抗聲言穀罔上上不悅三月丁丑朔昉坐責為彰武行軍司馬頌為保大行軍司馬昭遂三上章乞老乙酉以本官致仕昭為吏部尚書領選事凡亰官七品以下猶屬銓及昭致仕始用他官權判頗更舊制亰官以上無選並中書門下特除使府不許召署幕職悉由銓授矣此據㑹要然建隆初薛居正已權判流內銓矣當考辛巳幸教船池賜水軍將士衣有差還幸玉津園宴射辛卯以襄州隂城鎮為光化軍乙未北漢耀州團練使周審玉等四人來降各賜分物有差以審玉為汾州團練使改名承瑨實録於七月戊戌乃除承瑨汾州今併書之丁酉遣左拾遺梁周翰等馳驛分詣五嶽祈雨詔文武臣寮奉使出外及受代歸闕所經州縣無得輒借官軍部送并津置行李違者重置於罪初唐廢永通大錢更用韓熙載之議鑄當二鐵錢熙載由中書舍人遷戶部侍郎充鑄錢使宰相嚴續數言鐵錢不便熙載爭於朝堂聲色俱厲左遷祕書監不逾年復拜吏部侍郎是月始用鐵錢擢熙載兵部尚書勤政殿學士民間多藏匿舊錢舊錢益少商賈出境輒以鐵錢十易銅錢一官不能禁因從其便官吏皆增俸而以銅錢兼之由是物價益貴至數倍熙載頗亦自悔熙載拜戶部侍郎充鑄錢使十國紀年及朔記在建隆元年二月末拜兵部尚書勤政殿學士在此年六月今并書於此詔諸道騎兵頗為長吏役使失於教習自今禁止之權知貢舉陶穀奏進士合格者八人夏四月丁未朔以前博州軍事判官頴贄為著作佐郎贄應賢良方正能直言極諌科策試稱㫖故也贄未見戊申詔諸州長吏視民田旱甚者即蠲其租勿俟報令河中府發廪賑饑民乙卯改葬宣祖昭武皇帝昭憲皇太后於安陵孝明皇后王氏孝惠皇后賀氏祔葬上欲為趙普置副而難其名稱召翰林學士承㫖陶穀問曰下丞相一等者何官對曰唐有參知機務參知政事乙丑以樞密直學士兵部侍郎薛居正吕餘慶並本官參知政事不宣制不押班不知印不升政事堂止令就宣徽院使㕔上事殿庭别設磚位於宰相後敇尾署銜降宰相數字月俸雜給皆半之蓋上意未欲令居正等與普齊也此據太祖新録百官表大事記太宗實録云普在相位幾十年獨斷政事太祖疑其専恣欲用薛居正吕餘慶為相普惡其與已同列但令參知政事於宣徽㕔赴上位在丞相後但奉行制書不得預奏事以明其異等中書印唯宰相得知事無大小盡决於普居正等恐栗備位而已太祖患之㑹為趙玭所訐盧多遜又旦夕攻之雷有鄰訟中書不法事太祖因令居正等知印押班以分普權按置參政乃陶榖議且此時太祖方獨任普未始厭其専恣也今不取太祖新録竇儀𫝊太祖屢對大臣稱儀有執守欲用為相趙普忌儀剛直遽引薛居正參知政事據此則居正乃普所引非太祖意也足明太宗實録所書非實然新傳謂普抑儀舊𫝊亦無之恐普未必然也為史臣李沆等曰案唐故事裴寂為僕射知政事杜淹御史大夫參議朝政魏徴為祕書監參豫朝政蕭瑀為特進參議政事劉洎為黃門侍郎參知政事劉幽求為中書舍人參知機務然並宰相之任也又髙宗嘗欲用郭待舉等參知政事既而謂崔知溫曰待舉等歷任尚淺未可與卿等同名稱遂令於中書門下同承授進止平章事以此言之平章事亞於參知政事矣今穀不能逺引漢御史大夫亞相故事為對翻以參知政事為丞相下一等榖失之矣議者惜之丙寅前泰州刺史趙玭為左監門衛大將軍權㸃檢三司玭澶州人也玭初見顯德二年丁卯詔侍衛馬軍都指揮使范陽劉光義領兵赴潞州備北漢也己巳命轉涇州粟三萬石以賑靈武饑民新舊録又於十一月丁酉重載此今不取先是追冊孝惠皇后止就陵所置祠殿薦以常食及孝明皇后崩乃議别廟之制壬申祔二后神主同殿異室孝明居上孝惠次之從太常博士和峴之議也令諸司府寺卒吏年老者聽以子弟代永州言諸縣民畜蠱者三百二十六家詔本州徙窮僻處無以充役鄉里勿與婚姻溪叙奬等州民相攻劫遣殿直牛允允未見齎詔諭之乃定此據㑹要及正史並在此月詔尚書省集臺省官翰林學士祕書監國子司業太常博士等詳定內外羣官相見儀頒行之此據禮志附見四月五月丁丑朔詔以舊安陵下宫為奉先資福禪院詔奉宣祖昭憲皇后銅像屯田員外郎知制誥髙錫以弟銑應進士舉屬之開封府推官河南石熙載求首薦銑辭藝淺薄熙載弗許錫深銜之纍於上前言熙載禆贊無狀上謂皇弟開封尹光義曰當為汝擇人以代熙載光義曰熙載居官恪勤此必髙錫譛之也上感悟將罪錫而未有以發㑹遣錫使青州私受節度使郭崇賂遺所過恣其凶率又嘗致書澧州託刺史求僧紫衣為人所告下御史府按得實責授萊州司馬辛巳宗正少卿趙礪坐贓决杖除籍為民案宋史及薛應旗續通鑑皆作宗正卿趙礪癸未幸玉津園宴射六月己酉以皇弟開封尹同平章事光義兼中書令山南西道節度使光美同平章事庚戌皇子德昭為貴州防禦使時年十七前代皇子出閣即封王上以德昭未冠特殺其禮非舊典也辛亥以前武寧節度使郭從義為護國節度使從義先自徐州入朝從義本出沙陀初見乾祐元年無爵里上召使擊毬殿庭從義易衣跨騾馳驟擊拂曲盡其妙將因是以結主知及罷上召賜坐謂曰卿此技誠精絶然非將相所為也從義大慙而退從義家纍巨萬金僕童千人廄馬千餘匹五代以來節度使富强者輒懷跋扈之志上威德震耀衆始絶望從義移鎮河中常鬱鬱不樂謂僚佐曰從義齷齪藩臣摧頽如是當為英雄所笑矣擊毬事當檢從義自徐州入朝時即載之寶訓載此事則云自護國入朝在乾德中未知孰是乙卯以刑部侍郎權知鳳翔府劉熙古權知秦州州接戎境多被寇害熙古至諭以朝廷恩信取其酋豪子弟為質戎人不敢犯法左僕射王溥數勸其父宿州防禦使祚祚初見顯德四年請老祚不得已乃上章且意朝廷未之許也己未以祚為左領軍衛上將軍致仕祚大罵溥曰我筋力未衰汝欲自固名位而幽囚我大梃擊之親戚勸解乃止庚申幸相國寺遂幸教船池玉津園御史臺太常禮院奏東宫三師官一品僕射二品若百官上表未知何人為首詔兩制議之戊辰翰林學士竇儀等奏僕射師長百僚東宫三師臣子之官當以僕射為表首從之此假表疏或可詳載須更檢照後例辛未以左羽林軍大將軍杜審進權知陜州仍命殿中侍御史閻丕通判州事丕未見是月河北關西諸州蝗釋北漢軍俘千人賜衣履分𨽻畿縣民籍七月辛巳幸玉津園還幸新池觀習水戰己丑詔階成二州並直𨽻亰師庚寅中書門下上重詳定翰林學士承㫖陶穀所議少尹幕職官參選條件應拔萃判超及進士九經判中者並入初等職事判下者依常選初入防禦團練軍事推官軍事判官者並授將仕郎試校書郎滿三周年得資即入留守兩府節度推官軍事判官並授承奉郎試大理評事又三周年得資即入掌書記防禦團練判官並授宣德郎試大理評事兼監察御史滿二年得資即入留守兩府節度觀察判官並授朝散大夫試大理司直兼監察御史滿一周年入同類職事諸府少尹又一周年送名中書門下仍各依官階分四等己至兩使判官以上次任即入同類職事者加檢校官或轉憲御觀察判官著緋十五年者賜紫每任以三周年為限閏月不在其內每一周年校成一考其常考並依令録例書中上如經殿罰即降考一等若校成殊考南曹上其功績請行酬奬或考滿未代更一周年與成第四考隨有罷者不在赴集其奏授職事書校考第出給解由並凖新條以備他年參選若兩任以上不成資但通計月日及二周年許折一任成資及敇替省員則取本任解由赴上不得即給以公憑並非時赴集其自以事故不得資停罷及違程不請告身一任者二周年赴集併兩任加一周年併三任者不在赴集限若今任有下考者殿一年入同類官如經恩得雪者免殿如罷任後出給解由每違一季殿一年違兩季以上者殿二年丁憂服闋及非考滿去任者並同罷任如無解由或省校考牒並殿一年或失墜文書而給得格式公驗者免殿降凖格停及使闕人三周年赴集及特敇停任及削官人曽經徒流不以官當者並經恩後本職年限赴集仍於刑部請雪牒如無員闕願入州縣官者將一周年月俸比校如有不同即上下不過十貫者聽與注擬至防團判官以上入州縣官罷任後止理本職事年限赴集其諸府少尹考第亦以三周年為限從之自是銓選漸有倫矣辛卯詔翰林學士承㫖陶穀及殿中侍御史內黃師頌等四十三人各舉才任藩鎮通判者一人甲午令藩鎮無以初官為掌書記須歷兩任有文學者乃許奏辟乙未幸北郊觀稼始於江北置折博務禁商旅過江詔諭唐主恐其挾中國之勢有所侵擾也國史李煜𫝊乃云今年以江南洊饑始開過江折博樵采之禁與實録異蓋誤也是月唐主封長子仲寓為清源公次子仲宜為宣城公詔吏部南曹自今常調赴集選人取歷任多課績而無闕失其人材可副升擢者具名送中書門下引驗以聞當與量材甄奬上慮銓衡止憑資歷英俊或沈於下僚故也選舉志在四年今從故事新舊録並無之八月戊申詔百官內殿起居日兩省御史臺官分班於殿庭東西相向而立金吾將軍各在本班之上故事臺省官金吾將軍俱為侍從班每內殿起居橫行立於一品之前上因見太子太保王溥在拾遺補闕之後謂左右曰溥故相也那得爾遽命分之乙卯幸造船務又幸玉津園庚申以迎鑾鎮為建安軍辛酉初令亰師建安漢陽蘄口並置場𣙜茶自唐武宗始禁民私賣茶自十斤至三百斤定納錢决杖之法於是令民茶折稅外悉官買民敢藏匿而不送官及私販鬻者沒入之計其直百錢以上杖七十八貫加役流主吏以官茶貿易者計其直五百錢流二千里一貫五百及持仗販易私茶為官司擒捕者皆死自唐武宗以下至皆死並據本志當在此年今附見𣙜茶後先是文武官辭見及謝正衙御史臺報閣門方許詣內殿是月上召關南兵馬部署燕人張仁謙訪邉事連值正衙無班未得入對上怪問之有司以故事對上意不平因詔自今見謝辭先赴內殿對後赴正衙受使急速者免衙辭初庫部員外郎王貽孫周易博士奚嶼同考試品官子弟翰林學士承㫖陶穀屬其子戩於嶼戩誦書不通嶼以合格聞補殿中省進馬俄為人所發下御史府按之九月甲戌朔嶼坐受請求責乾州司戶參軍貽孫不知覺責贊善大夫穀奪兩月俸貽孫溥子也癸未權知貢舉盧多遜言諸州所薦士數益多乃約周顯德之制定發解條例及殿罰之式以懲濫進詔頒行之顯德二年詔書舊史有之通鑑弗著戊子南面兵馬都監引進使丁德裕與潭州防禦使潘美朗州團練使尹崇珂衡州刺史張勳帥兵攻郴州克之殺其刺史陸光圖及招討使暨彥贇餘衆退保韶州崇珂相州人也初內常侍禹餘宫使邵廷㻆纍言於南漢主曰漢承唐亂居此五十餘年幸中國多故干戈不及而漢益驕於無事今兵不識旗鼓而人主不知存亡夫天下亂久矣亂久必治今聞真主已出將盡有海內其勢非一天下不能已請飭兵備不然悉內府珍寶遣使通好也南漢主懵然莫以為慮惡廷㻆言直深恨之及是始懼思廷㻆言乃以廷㻆為招討使領舟師屯洸口廷㻆循州人也九國志廷㻆𫝊言王師乘勝克連州劉鋹懼始用廷㻆按他書皆不然今不取永安節度使贈侍中折德扆卒丙申以其子御勳為本州團練使權知府州太子太傅魯國公范質寢疾上數幸其第臨視恐益為勞乃令內夫人問訊質家迎奉器皿不具內夫人奏之上即命翰林司賜以果床酒器復幸其第謂曰卿為宰相何自苦如此質對曰臣曩在中書門無私謁所與飲酌皆貧賤時親戚安用器皿因循不置非力不及也質性卞急以亷介自持好面折人不能容人之短嘗謂同列曰人能鼻吸三斗醋斯可為宰相矣五代以來宰相多取給於方鎮質始絶之所得祿賜遍及孤遺食未嘗有異品疾革戒其子旻以母請諡毋刻墓碑辛丑卒上甚悼惜之贈中書令賻絹五百匹粟麥各百石後因講求輔弼謂左右曰朕聞范質居第之外不植資産真宰相也太宗亦素重質嘗對近臣稱纍朝宰相以為循規矩重名器持亷節無出質之右者其所不足但缺世宗一死耳冬十月癸卯朔以張勳為郴州刺史勳性殘忍好殺每攻城邑但揚言曰且斬頗有橫罹鋒刃者初赴衡州州民皆涕泣相謂曰張且斬至矣吾屬何以安乎戊申周紀王希謹卒世宗之第三子也希謹初見顯德末有司言十道圖無全邵二州名及其望壬戌詔並為中州改廣德殿為崇政殿是月唐宣城公仲宜卒封岐王諡懷獻仲宜早慧昭惠后周氏甚愛之因傷悲得疾十一月唐昭惠后殂先是蜀山南節度判官張廷偉廷偉未見說通奏使知樞密院事王昭逺曰公素無勳業一旦位至樞近不自建立大功何以塞時論莫若遣使通好并門令其發兵南下我即自黃花子午谷出兵應之使中原表裏受敵則關右之地可撫而有也昭逺然其言勸蜀主遣樞密院大程官孫遇興州軍校趙彥韜及楊蠲等以蠟彈帛書間行遺北漢主言已於褒漢增兵約北漢濟河同舉遇等至都下彥韜潛取其書以獻有穆昭嗣昭嗣未見者初以方伎事髙氏於是為翰林醫官上數召見問蜀中地理昭嗣曰荆南即西川江南廣南都㑹也今已克此則水陸皆可趨蜀上大悅後數日上得彥韜所獻書覽之笑曰吾西討有名矣乃并赦遇蠲使指陳山川形勢戍守處所道里逺近畫以為圖五代史實録皆言孫遇為邉吏所獲蓋因詔書也其實不然甲戍命忠武節度使王全斌為西川行營鳳州路都部署案宋史作西川行營前軍兵馬都部署武信節度使侍衛步軍都指揮使大名崔彥進副之樞密副使王仁贍為都監寧江案宋史作江寧節度使侍衛馬軍都指揮使劉光義為歸州路副都部署案宋史作西川行營前軍兵馬都部署內客省使樞密承㫖曹彬為都監合步騎六萬分路進討給事中沈義倫為隨軍轉運使均州刺史大名曹翰為西南面轉運使翰初見顯德元年王仁贍以樞密副使為行營都監在節度使下蓋此時西府品秩殊未崇也上以西川將校多北人賜詔諭令轉禍為福有能鄉導大軍供餼兵食率衆歸順舉城來降者當議優賞行營所至毋得焚蕩廬舍驅掠吏民開發丘墳剪伐桑柘違者以軍法從事命八作司度右掖門南臨汴水為蜀主治第凡五百餘間供帳什物皆具以待其至乙亥全斌等辭宴於崇德殿賜金玉帶衣服鞍馬戎器有差上出畫圖授全斌等因謂曰西川可取否全斌等對曰臣等仗天威遵廟算尅日可定也龍捷右廂都指揮使史延德延德未見前奏曰西川若在天上固不可到在地上到即平矣上嘉其果敢慰勉之又謂全斌等曰凡克城寨止籍其器甲芻糧悉以錢帛分給戰士吾所欲得者其土地耳甲申文思使常岑决杖黥面配沙門島副使宋延思決杖配𨽻陳州坐監主自盜為部曲所告也壬辰畋近郊丁酉太常禮院言上辛祀昊天上帝五方帝從祀伏緣明詔别祀赤帝為感生用符火德一日之內兩處俱祀且祭有煩數之禁况同時並祀在禮非宜其昊天從祀神位請不設赤帝坐從之又言周文王廟舊以師鬻熊太公望並配今太公别封武成王春秋行釋奠之禮但請以師鬻熊配從之壬寅遣作坊副使魏丕如江南弔祭蜀主聞有北師以王昭逺為北面行營都統左右衛聖馬步軍都指揮使趙崇韜崇韜初見顯德二年庭隱子庭隱見長興二年為都監山南節度使韓保正保正初見乾祐元年為招討使洋州節度使李進進初見顯德二年為副招討使帥兵拒戰蜀主謂昭逺曰今日之師卿所召也勉為朕立功昭逺好讀兵書頗以方略自任始發成都蜀主命宰相李昊等餞之城外昭逺手執鐡如意指揮軍事自比諸葛亮酒酣攘臂謂昊曰吾此行何止克敵當領此二三萬雕面惡小兒取中原如反掌爾十二月癸卯朔泉州陳洪進遣使朝貢庚戌畋陽武縣自申師厚逃歸朝廷不復疆理凉州於是蕃部首領數十人詣闕請帥丁巳以供備庫使麴彥饒為河西節度使師厚見廣順元年彥饒未見以西川用兵賜歸陜州民今年秋租已輸者籍之充來年之數辛酉王全斌等攻拔乾渠渡萬仭燕子等寨遂取興州敗蜀兵七千人獲軍糧四十餘萬石刺史藍思綰退保西縣全斌又攻石圖魚關白水閣二十餘寨皆拔之甲子唐主遣使來修貢辛未畋北郊蜀招討使韓保正聞興州破遂棄山南退保西縣馬軍都指揮使史延德以先鋒至保正懦懼不敢出遣兵數萬人依山背城結陳自固延德擊走之追擒保正及其副李進獲糧三十餘萬斛九國志言保正棄興元保西縣王師進攻西縣遂擒保正十國紀年并實録載保正被擒處則三泉也國史保正𫝊與九國志同今從之崔彥進與馬軍都監康延澤等逐北過三泉遂至嘉川殺虜甚衆蜀主燒絶棧道退保葭萌劉光義等入峽路連破松木三㑹巫山等寨殺其將南光海等死者五千餘人生擒戰棹都指揮使袁德宏等千二百人奪戰艦二百餘艘又斬獲水軍六千餘衆初蜀於䕫州鎖江為浮梁上設敵棚三重夾江列炮具光義等行上出地圖指其處謂光義曰泝江至此切勿以舟師爭勝當先遣步騎潛擊之俟其稍却乃以戰棹夾攻可必取也光義等未至鎖江三十里許捨舟前奪浮梁復引舟而上遂頓兵白帝廟西蜀寧江節度使太原髙彥儔彥儔初見顯德二年謂副使趙崇濟崇濟未見監軍武守謙守謙未見曰北軍涉險逺來利在速戰當堅壁待之守謙曰寇據吾城下而不擊又何待也戊辰守謙獨領麾下千餘人以出光義遣馬軍都指揮使陵川張廷翰等引兵與守謙等戰於猪頭鋪守謙敗走廷翰乘勝登其城彥儔整衆將出鬭而廷翰等已入其城中矣彥儔力戰不勝身被十餘創左右皆散去彥儔奔歸府第判官羅濟濟未見勸彥儔單騎歸蜀彥儔曰我昔己失秦川今復不能守此縱人主不殺我我何面目見蜀人乎濟又勸其降彥儔曰老幼百口俱在成都以一身偷生舉族何負今日止有死耳即解符印授濟曰君自為計乃反拒其戶整衣冠望西北再拜登樓縱火自焚後數日光義等得其骨於灰燼中以禮葬之九國志云王師壞門而入彥儔挺劍拒之殺十餘人乃登樓縱火自焚而死十國紀年亦云今不取王全斌以蜀人斷棧大軍不得進議取羅川路入蜀康延澤潛謂崔彥進曰羅川路險衆難並濟不如分兵修棧約㑹大軍於深渡可也彥進遣白全斌全斌許之不數日閣道成遂進擊金山寨又破小漫天寨而全斌亦以大軍由羅川至深渡與彥進㑹蜀人依江而陳彥進遣步軍都指揮使張萬友萬友未見等擊之奪其橋㑹暮夜蜀人退保大漫天寨明日彥進延澤萬友分兵三道擊之蜀人悉其精鋭來拒又大破之乘勝拔其寨擒寨主義州刺史王審超監軍趙崇渥及三泉監軍劉延祚都統王昭逺都監趙崇韜引兵來戰三戰三敗追奔至利州北昭逺等遁去渡桔柏津焚浮梁退保劍門壬申晦全斌等入利州獲軍糧八十萬斛九國志十國紀年蜀檮杌皆言蜀人雖燒棧道而江水淺涸岸路平濶王師皆徒涉而進與國史不同事恐不然今不取新録載大漫天之戰全斌擒其寨主王審超監軍趙崇渥三泉監軍劉延祚全斌本傳乃云趙崇渥逃出復與三泉監軍劉延祚及王昭逺等來戰按明年正月己丑實録書軍前部送大漫天寨主王審超監軍趙崇渥則似同時執獲也今從新録劉延祚又不知究競當考詔西川行營所克復州縣僞署將士有竄匿者限一月於所在陳首釋其罪是月京師大雪上設氊帷於講武殿衣紫貂裘帽以視事忽謂左右曰我被服如此體尚覺寒念西征將帥衝犯霜霰何以堪處即解裘帽遣中黃門馳驛齎賜全斌且諭諸將以不能遍及也全斌拜賜感泣先鋒都指揮使鳳州團練使張暉督兵開大散關路躬撫士卒且役且戰人忘其勞至青泥嶺病卒詔優恤其家是嵗始令諸州自今每嵗受民租及管𣙜之課除支度給用外凡緡帛之類悉輦送亰師官乏車牛者僦於民以充用趙普之謀也此據本志然與明年三月詔書相重或明年詔書乃申此令耳以齊州防禦使李漢超兼關南兵馬都監漢超雲州人也漢超本𫝊為齊州防禦使即兼關南都監按新録漢超為齊州防禦使在建隆二年秋七月不書其兼關南都監也不知𫝊何以即言之徐鉉所為漢超德政碑云建隆二年為齊州防禦使乾德二年乃兼關南兵馬都監當得其實故附見此年之末鉉碑又云開寶二年赴京師其冬復為關南都監而本𫝊不載今亦略之北漢主四遣使詣契丹賀正冬生辰端午契丹皆執其使不報此據九國志然諸書多言北漢引契丹兵入侵平晉軍遼州之役契丹兵皆在焉而遣使修好輒被執豈雖執其使猶借其兵乎當考
