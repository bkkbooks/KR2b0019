body:
  text: 續資治通鑑長編卷七十五宋李燾撰真宗大中祥符四年春正月丙子知茂州郭用之言夷族首領耆老董瓢等頃多侵擾今相率於州北三溪刑牛犬誓不為冦舊制縣吏能招增户口者縣即升等仍加其奉緡至有析客户為主雖登于籍而賦稅無所增入戊寅下詔禁之己卯命開封府推官太常丞李階齎書諭契丹以特祀汾隂令至境上付其疆吏李階未見庚辰詔北緣邉州軍官屬自今不得以迎送為名出城寨馳獵犯者以違制論賜諸王府侍講國子博士張頴器幣頴講尚書終篇故也陜西提點刑獄司言邠寧環慶副都部署陳興縱所部禁兵為劫盜又釋不誅辛巳徙知永興軍王嗣宗代之邠州城東有靈應公廟傍有山穴羣狐處焉妖巫挾之為人禍福風俗尤信向水旱疾疫悉禱之民語為之諱狐及嗣宗至燻而逐之盡塞其穴淫祀遂息詔應汾隂行事官及職掌人敢有懈惰者勿以赦原豐州北藏擦勒西族中族首領弩伊亨全等並遣子來貢癸未代州言粟斗十餘錢甲申趙德明奉表訴言明愛等侵耕其綏州界乞遣使按視詔張崇貴詳度令明愛等還內地乙酉親習祀后土儀於崇德殿初有司詳定止習壇上儀上崇重大祀乃并廟庭及封石匱儀遍習焉命樞密直學士周起閣門祗候郭盛入內殿頭閻文慶編次貢奉給事中种放自終南山來朝丁亥謁啓聖院太宗神御殿普安院元德太后聖容告將行也定州科鹿角數多詔河北轉運使裁減之己丑詔大祀酹酒銀罐器止用常御者非朕恭潔之意其令有司造十五枚付光祿寺别貯仍刻字識之勿他用庚寅詔江湖間貧民捕魚豪户不得封占從知洪州王濟之請也壬辰詔河南府孟鄭州所發浚汴口役夫今年夏稅止令本處輸納甲午客省使誠州刺史李允正為鄜延路部署時趙德明頗踰軼初允正被病授河陽部署以便頥飬不半月亟徒焉仍令內侍密詔存諭允正未至即命計度汾隂行宫道路曹利用權鄜延路部署允正本傳云張崇貴卒亟徙允正按崇貴是年八月乃卒此時未也若病則不可知今且削去更徐考之文思使靳懷德領長州刺史為益州鈐轄懷德歷官以強幹稱然酗酒多失將行别詔戒朂又面誨之懷德在劔外果善於其職軍民畏愛上以靈文疊降盡志欽奉且欲垂訓子孫俾奉事無怠仍為誓文乙未命刻石置玉清昭應宫寶符閣下按本志大中祥符元年四月天書又降大內功德閣而實録本紀並不書實録於此載上語云靈文三錫蓋兼指功德閣也而本志又改三錫為疊降今從本志實録於天禧元年正月壬戌因詔書建節名乃著其事不知前此不以宣示何也丁酉車駕奉天書發京師日上有黃氣如匹素五色雲如蓋紫氣翊仗是夕次中牟縣戊戍次鄭州命龍圖閣學士陳彭年待制王曙同詳定邀駕詞狀己亥次滎陽縣庚子次鞏縣右僕射判河陽張齊賢見于汜水頓侍食畢即遣還任辛丑過訾村設幄殿奉置三陵神座上鞾袍拜哭奠獻是日晴霽始就次蒼煙白霧起陵上俄覆神幄禮畢乃散咸以為上哀慘所感夕次偃師縣詔同州民於沙苑採薪蒸者勿禁壬寅車駕至西京甲辰發西京至慈澗頓太官始進素膳民有耕道旁者召問慰撫賜以茶荈夕次新安縣二月乙巳朔次澠池縣杖太僕寺府史霍鼎先是儀仗中悉以軍士給役而鼎擅集貧民挽軛上知之令禮儀使劾罪科責其判寺官及編排儀仗忠佐特赦不問禁諸色人以進奉為名私染御服繒帛及製乘輿服用之物飾以龍鳯從編排進奉周起之請也命知河南府薛映造輦水小車十乘付行在三司時山路泉深負汲者勞上憫焉俾運載以代其役詔行在部署司凡亡命卒及貧民小竊者不須收捕再犯者準法丙午次硤石縣丁未入陜州是日雨上謂殿前都指揮使曹璨曰諸軍衣裝行止之間泥潦霑汚曽不愛惜此皆出民力可申戒之戊申賜扈駕諸軍緡錢詔奬權東京留守向敏中等以獄空故也己酉次靈寶縣詔緣路病馬悉赴同州沙苑監飬療令羣牧司立殿最之法以賞罰之庚戌次湖城縣辛亥次閿鄉縣壬子出潼關渡渭河次嚴信倉遣近臣祀西嶽癸丑次河中府甲寅工部侍郎馮起為考制度使刑部員外郎兼侍御史知雜事趙湘副之丙辰次永安鎮遣近臣祀河瀆丁巳發永安鎮有黃雲隨天書輦法駕入寶鼎縣奉祗宫遣中使督開浚汴口仍犒設官屬戊午致齋召近臣登延慶亭南望仙掌北瞰龍門自宫至脽上列植嘉樹六師環宿行闕旌旗帟幕照耀郊次眺覽久之趙德明遣使來貢己未寶鼎縣瀵泉湧有光如燭庚申羣官宿祀所辛酉具法駕詣脽壇夾路燎火其光如晝甬道盤屈周以黃麾仗初路由廟南上以未修謁不欲乘輿輦過其前令鑿路由廟後至是從新路至壇次服衮冕登壇祀后土地祇備三獻奉天書於神座之左以太祖太宗並配悉如封禪之禮先是脽上多風及行禮頓止司天言黃氣繞壇月重輪衆星不見惟大角光明少頃改服通天冠絳紗袍乘輦詣廟登歌奠獻省封石匱遣官分奠諸神登鄈丘亭視汾河望梁山顧左右曰此漢武帝泛樓船處也一時之樂垂於千古即日還奉祗宫鼓吹振作紫氣四塞觀者溢路民有扶老擕幼不逺千里而至者或感泣言曰五代以來此地為戰場今乃獲覩天子巡祭實千載一遇之幸也詔以奉祗宫為大寧宫增葺殿室設后土聖母像又遣官祭告河瀆甘州輝和爾蒲端三麻蘭勿巡蒲婆羅大食國吐蕃諸族並遣使來貢蒲端又獻崑崙奴一上閔其異俗離去鄉土命還之壬戌御朝覲壇受羣臣朝賀大赦天下恩賜如東封例河中府特給復一年半建寶鼎縣為慶成軍給復二年距脽上三里禁樵採文武官該敘封欲回授祖父母者聽四品以上官逮事太祖太宗初潛或嘗更邉任家無食祿者録其子孫建隆佐命王公將相邱冡令所在致祭給西京分司官實奉三分之一諸處罪犯人并部送闕下者皆刺滿靣大字毁形頗甚尤可憫傷自今不得更然律令編敕內條目失於重者宜令法官詳定聞奏務從輕典賜天下酺三日大宴穆清殿賜父老酒食衣幣上作汾隂二聖配饗銘河瀆西海等贊湘山野録真宗回蹕次河中長安父老三千人詣行在表乞臨幸种放以三不便諫乃止按國史實録略無此事野録又言放時有兄喪及乞還山林等皆謬誤與正史實録不合今不取癸亥發慶成軍觀瀵泉夕次永安鎮詔緣邉州軍有契丹界飢民逐糧而至者速遣還無得留止命龍圖閣待制查道先還東京備鹵簿儀仗甲子次河中府賜扈駕諸軍緡錢幸舜廟賜舜井名廣孝泉親作贊渡河橋觀鐡牛又幸河瀆廟廟西有西海望祭壇上顧其壇制非廣令有司討尋典故增築登後亭見民有操舟而漁秉耒而耕者上曰百姓作業其樂乎使吏無侵擾則日用而不知矣遂幸開元寺紫極宫逍遙樓賦詩賜從臣召草澤李瀆劉巽瀆以疾辭授巽大理評事致仕瀆瑩子淳淡好古王旦李宗諤與之世舊每勸其仕瀆皆不答於是直史館孫冕言其隱操陳堯叟復薦之既辭疾不至遣內侍勞問令長吏歲時存撫賜西京河中府陜鄭二州緡錢為宴犒肴酒之費也乙丑御詔駐蹕宣恩樓觀酺加號西嶽金天王曰順聖金天王遣鴻臚少卿裴莊祭告又詔葺伯夷叔齊廟丙寅賜親王輔臣百官酺宴于行在尚書省凡二日上作汾隂禮成詩就宴所賜之丁卯賜河中尹寧王元偓衣帶鞍馬錢百萬銀千兩并經度制置使副所過州府長吏器幣有差戊辰發河中府以寒食申嚴火禁過新市鎮渡洛水橋次嚴信倉己巳次華隂縣幸雲臺觀觀希夷先生陳搏畫像除其觀田租庚午謁順聖金天王廟羣臣陪位廟垣內外列黃麾仗遣官分奠廟內諸神又幸巨靈真君觀並除其田租宴從官父老於行宫之宣澤亭紫雲如龍起嶽上上作西嶽贊仙掌詩召見華山隱士鄭隱敷水隱士李寧賜隱號曰貞晦先生隱自言始以經術為業遇道士傳辟榖錬氣之法修習頗驗遂居華山之王力巖按華嶽志無王力巖據雍勝略王刁三洞在華山東竇谷中仙人王遙刁自然登仙處有上中下三洞云二十餘年冬夏常衣皮裘寧精於藥術老而不衰每以藥施人人與金帛多拒之並賜御詩并茶藥束帛隱辭所賚不受辛未次閿鄉縣召承天觀道士柴通元賜坐問以無為之要賜詩茶藥束帛除其觀田租通元年百歲善服氣語無文飾多以修身謹行為説云壬申次湖城縣宴虢州父老于行宫門癸酉次靈寶縣三月甲戌朔次陜州召草澤魏野辭疾不至野居州之東郊不求聞逹趙昌言冦凖來守是州皆賓禮焉為詩精苦有唐人風契丹使者嘗言本國得其草堂集半帙願求全部詔與之野既辭召命即遣使圖上其所居令長吏常加存撫乙亥幸順正王廟作鐡牛詩宴從官父老于霈澤惠民樓又登北樓望大河觀山川形勝賜運船卒時服作詩題棟間是日雨石普請駐蹕城中勿涉泥濘上作詩賜普因令扈從至京丙子次硤石縣丁丑次澠池縣陜西言芮城縣民樊景溫異居四十餘年其家樗樹分生五枝復合為一景溫等感之復同居戊寅次新安縣上之還也以道逺閔衛士肩輿執蓋之勞多乘馬御烏藤帽己卯車駕入西京賜迎駕僧道絹五百匹令京兆府禁民樵採种放莊園先是許人入錢京師就陜西請給轉運使李士龍言管內所收課利匪多支贍亦廣望權罷三年許之庚辰上謂輔臣曰洛陽宫闕壯麗然城北地隘榖洛淺滯輦運艱阻諒非久居之所第因行禮暫巡幸耳時途中屢有甘澍之應皆夕降晨止從官衛士無霑服之患又農務方興耕民瞻望輿駕歡抃相屬上作喜雨述懷歌羣臣畢和又以知河南府薛映有治狀賜詩嘉奬此據本傳詔罷河北緣邉工役非急者癸未張齊賢自河陽來朝召之也甲申幸應天禪院賜監修太祖神御殿官及工匠將士衣服緡錢又幸太子太師吕蒙正第慰撫之賜珍藥御酒衣帶鞍馬金幣問蒙正諸子孰可用對曰臣之子豚犬耳猶子夷簡宰相才也邵氏見聞録載蒙正言有姪夷簡任棣州推官按夷簡於大中祥符元年以大理寺丞舉賢良此時不應尚為幕職也今削去陳堯叟李宗諤自河中府來朝言初經度祀事至禮畢凡土木工三百九十萬餘止役軍士輦送糧草供應頓遞亦未嘗差擾邉民上稱善丁亥召宰臣遍閲諸殿出御製再幸西京記示之詔所經歷代帝王祠廟並令增葺戊子丁謂言有鶴二百餘翔天書殿上又有百餘飛集太清樓知并州劉綜獻豐年圖先是巡幸所至改賜門名己丑御五鳯樓觀酺有司請如例上曰此太祖所建以表瑞應不可更也車駕將朝陵詔自西京至鞏縣不舉樂文武官有先塋在近者並給假拜祭戒扈從人踐田稼雄州言入契丹副使崔可道病卒契丹自幽州具鼓吹衛送其柩以歸詔遣中使護其喪事內侍楊守珍捕賊京東移文應天府造木驢丁架府以聞上以非法乃詔遣使出外無得造慘虐殺賊之具守珍於八年九月又見甲午發西京次偃師縣輿輦繖蓋鳴鞘警場奏嚴金吾喝探悉罷之乙未上素服乘馬至永安縣齋于行宫丙申謁安陵永昌永熙元德皇太后陵上奠獻悲泣感動左右初至永昌陵遇雨有司請徙板位遙奠於門廡間上不許親涉泥塗而進未明禮畢復詣四陵奉辭省視几筵奠酌如初禮又遍詣諸后陵諸王墳致奠命中使遍祭皇親諸墳及詣汝州祭秦王墳西涼府吐蕃多斯結等來貢丁酉次鞏縣右僕射張齊賢辭歸河陽賜衣帶器幣如侍祠例戊戌至汜水縣虎牢關路隘險命執炬火以警行者河陽結綵為樓備樂將奏上以太宗忌辰甫近亟止之賜物如例上每自下旬即不舉樂故也次滎陽縣改虎牢關為行慶關己亥次鄭州詔三陵所管兵士有罪者止得科罰其當杖者送永安縣禮儀使王欽若請躬謁太廟畢親詣元德皇太后廟詔禮官定議議如欽若所請從之庚子召從官宴於回鑾慶賜樓宴父老於樓下不作樂壬寅發鄭州過潘孝子墓命有司表之次中牟縣癸卯次瓊林苑賜諸部署鈐轄羊酒犒設將士夏四月甲辰朔車駕至自汾隂乙巳賜扈從諸班直諸軍及所經戍兵鋪卒諸司官健緡錢有差道病死者悉給其家丁未令江淮轉運司雇客船轉粟以賑登萊州飢民己酉謁太廟又謁元德太后廟自門降輦步入酌獻如太廟設登歌兩省御史供奉官宗室防禦使以上並班於廟內餘於廟外參知政事馮拯趙安仁分告孝惠諸后廟庚戌詔以時漸炎燠京師賜酺宜至今秋放西京皇城內外園苑灑掃役夫六十餘人歸農量增軍士給役辛亥謁啓聖院太宗神御殿普安院元德皇太后聖容壬子左龍武將軍澄州刺史駙馬都尉李遵朂私長公主之乳母謫均州團練副使始遵朂請對言其事欲歸過他人會赦弗問及事露上遣使詰之辭多矯誣上怒然以長公主未嘗言遵朂之失恐傷其意不忍深究也既而輔臣列奏請正朝典乃有是責遵朂尋以疾求徙居蔡州許之司馬光日記云劉攽言李遵朂坐無禮於長公主之乳母貶均州團練副使真宗欲殺之先召長公主觀其意語之曰我有一事欲語汝而未敢公主驚曰遵朂無恙乎因流涕被面僵仆於地乃不果殺及李淑受詔撰長公主碑宣言赦李遵朂事尤美不可不書諸子聞之懼重賂淑不果書按真宗性仁必不至遽欲殺遵朂恐光所聞或誤今不取峽路鈐轄慕容德琛部送為惡蠻人王羣體等至闕下上曰蠻人不識教義向之為亂亦守臣失於綏撫耳並免死配𨽻江浙逺地德琛延釗子也趙德明遣使貢馬賀汾隂禮畢賜德明衣帶鞍馬器幣賓佐將士銀帛茶荈時貢馬子弟或與民相毆有折齒者開封府言當杖脊詔以事付鄜延路令移文德明就彼決遣之癸丑詔迎導天書玉輅將士例外别賜緡錢遣近臣祭謝后土西嶽西海四瀆又遣官分詣諸陵廟致祭秦州輝和安密等貢玉帶賀汾隂禮畢甲寅給事中种放還終南山賜宴賦詩如前例己未詔恭上汾隂后土廟額曰太寧遣中使增葺廟宇令知河中府周起一月一檢校民庶祭賽止拜廷中官吏非祠祭亦勿升殿以河中府進士薛南為試將作監主簿首詣闕請祀汾隂者也録王繼勳子惟德為汝州軍事推官惟德子用和先𨽻軍特令落籍歸侍繼勳坐多殺不辜被誅其家窮窘上以孝明皇后故特恤其嗣同州飢民有鬻子者遣官馳驛存撫賑濟詔兩京諸路本城諸司庫務軍校補職及二十年者特與轉資庚申詔唐相婁師德廟宜禁樵採先是京東轉運使副使馬元方按部至濮州知州蔣信張宴元方倨慢既醉即毆信會赦免劾辛酉徙元方知宿州仍下詔切責之甲子楚王元佐為太尉寧王元偓為成德安國節度使進封相王按原本作襄王誤考真宗本紀及此書八月壬寅增給諸王府公用錢相王舒王嵗萬三千貫則當從本紀作相為是舒王元稱為鎮南寧國節度使元佐而下並兼中書令榮王元儼為安靜武勝節度使兼侍中定難節度使趙德明守中書令乙丑葺尚書省三月而畢八月乙巳畢功丙寅羣臣用壬戍赦書咸以次遷秩客省使忠州刺史曹利用為內客省使領嘉州防禦使日就食於樞密院先是以內客省使廳事為三班院於是令三班院分廳事處之近時蔡廷慶之孫名興宗者著祖宗官制舊典云太祖以內客省使換樞密以延福宫使換宣徽按本志內客省使乃唐置其就食於樞密亦舊例也不知興宗所記換樞密事出何書當考蔡氏又云內客省使纍朝不置崇寧後只除童貫一員而已恩數幾同執政以元自樞密使副換此名也按太祖朝吳廷祚李處耘王仁膽李崇矩曹彬並先後居樞密使副之任獨不見由使副換內客省者為何人當考己巳令并州葺晉祠衡州葺神農廟上謂宰相曰朕閲唐六典起居郎舍人司諌正言凡十二員近者此官多闕可因覃慶選有才望為中外所知者補之於是直史館陳堯佐樂黃目盛元王隨路振崔遵度陳知微李咨陳越等九人悉授兩省官盛元餘杭人後改名度壬申詔諸州勿遣司理參軍監蒞場務是月贈中書令許國文穆公吕蒙正卒五月甲戍朔詔自今宰相官至僕射者並於中書都堂赴上不帶平章事者亦於本省赴上令太常禮院檢討詳定儀注先是中書侍郎兼兵部尚書平章事王旦遷右僕射止於本廳受賀上寵待輔臣遂命振舉舊儀丙子加交址郡王李公藴同平章事洪州言知州刑部郎中王濟卒濟臨終自草遣表以進賢俊退諛佞及罷土木不急之費為言餘不及私己卯閣門言自今內職將校請依文武官例假日不許辭見從之乙酉增皇姪以下月俸先是初授官俸三十千稍加五十千再加七十千行慶之後各求領郡上以新進秩不許但增俸焉丁亥蒲端國主又遣使來貢方物以金板鐫所上表辭己丑遣使籍緣汴裝卸卒分𨽻諸州下軍以其間多強暴之輩騷擾平民也庚寅幸上清宫景德開寶寺遂謁玉清昭應宫京兆府旱詔賑之詔諭諸道設科取士之意俾各盡至公或致遺材當行覆視其應解而不解不應解而解者並行朝典癸巳以內客省使曹利用為鄜延部署代李允正也徙允正知永興軍允正性嚴毅喜行殺戮素病痀僂故罕在要近云王承美請於豐州城內置元聖文宣王廟從之乙未詔加上東嶽曰天齊仁聖帝南嶽曰司天昭聖帝西嶽曰金天順聖帝北嶽曰安天玄聖帝中嶽曰中天崇聖帝命翰林學士李宗諤龍圖閣直學士陳彭年與禮官詳定儀注又作奉神述備紀崇事之意王稱東都事略詔曰峻極之嶽神靈主焉其加上五嶽帝號丁酉御崇政殿慮囚死罪以下遞降一等己亥以主客郎中李巽為度支郎中兩浙轉運副使司勳員外郎王矩為工部郎中京西轉運副使初遣官提點刑獄至是代還命資政殿大學士向敏中等較其殿最以嘗活寃獄者為第二等皆遷秩朝臣為轉運使使臣知州餘為第三等授近地知州監軍巽矩皆入第二等故也李巽已見景德二年四月當考改西京永安指揮曰奉先升為禁軍在清塞之下壬寅詔淮南諸州民今年夏稅租願納錢者並聽從便詔郎中及帶職員外郎已上遇汾隂赦乞保任其子並依例施行
