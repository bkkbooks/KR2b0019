body:
  text: 續資治通鑑長編卷三十九宋李燾撰太宗至道二年春正月已酉親饗太廟辛亥合祭天地於圜丘大赦天下先是禮儀使宋白奏曰伏詳儀注朝饗太廟皇帝先詣罍洗後奠瓉其祀天地望先詣罍洗後奠玉幣上遽召宰相以問吕端等曰王者親執玉帛以事上帝玉帛者接神之物若沃盥而後奠獻亦足以表䖍潔之意白曰如允臣所請止一次升壇上聳然改容曰朕親奉大祭蓋為萬姓祈福若變禮為允當依卿奏如合遵舊典故不以登降為勞端等皆言白所陳得禮之中也遂從其議上以文物仗衛之盛逶迤布濩極望無際因詔有司畫為南郊圗二月壬申朔贈司徒諡文正李昉卒昉溫和無城府寬厚多恕為文章慕白居易尤淺近易曉江南平士大夫歸朝昉多與遊雅厚善張洎而薄張佖及昉罷相洎草制力攻昉之短佖朔望嘗詣昉第人或謂佖曰李公待君素不厚何數詣之佖曰我掌廷尉日李公方秉政未嘗有所請求於我我故重之昉素病心悸每一發必彌年不瘳嘗謂諸子曰我前後典誥命三十年勞役思慮而致是疾爾卒後上嘗謂近臣曰昉本以文章進用及居相位自知才微任重無所彌綸但憂愧而已祠部員外郎主判都省郎官事王炳上言曰尚書省國家藏載籍興治教之府所以周知天下地里廣袤風土所宜民俗利害之事當成周之世治定制禮首建六官即其原也漢唐因之軌範斯著簡策所載煥然可觀蓋自唐末以來亂離相繼急於經營不遑治教故金榖之政主於三司尚書六曹名雖存而其實亡矣謹案六曹凡二十四司所掌事物各有圗書具載名數藏於本曹謂之載籍所以周知天下之事由中制外教導官吏興利除害如指諸掌臣故曰藏載籍興治教之府也今職司久廢載籍散亡惟吏部四司官曹小具祠部有諸州僧道文帳職方有諸司閏年圗刑部有詳覆諸州巳决大辟案牘及勾禁奏狀此外無舊式欲望令諸州每年造户口租稅實行簿帳寫以長卷者别寫一本送尚書省藏於户部以此推之其餘天下官吏民口廢置祠廟甲兵徒𨽻百工疆畔封洫之類亦可籍其名數送尚書省分配諸司俾之緘掌俟朞嵗之後可以振舉官守興崇治教望選大僚數人博通治體者參取古今典禮令式與三司所受金榖器械簿帳之類仍詳定諸州供送二十四司載籍之式如此則尚書省備藏天下事物名數之籍如祕閣藏圗書國學藏經典三館藏史𫝊皆其職也上覽奏嘉之詔令尚書丞郎及兩省五品以上集議其事吏部尚書宋琪等上奏曰王者六官法天地四時之柄文昌列署體象緯環拱之文是為布政之宫王化之本典教所出何莫由斯然而古今異宜沿革殊制或從權而改作亦因時而立法唐之中葉兵革弗寧始建使名專掌邦事權去省闈政歸三司五代相循未能復舊今聖文垂拱書軌無外將循名而責實庶稽古以建官悉舉舊章以蹈前軌而嵗祀寢久曹局僅存有司失傳遺編多闕臣等欲望委崇文院檢討六曹所掌圖籍自何年不係都省詳其廢置之始究其損益之源别俟討論以期恢復上以其迂濶竟寢之王炳奏議不得其日宋琪自吏部尚書遷右僕射在二月今琪猶以吏書見故附此事於二月末實録别本亦載此事於二月乙未夏四月甲申屯田員外郎呂奉天上言司馬遷史記王超五位圖嵗次朔閏皆與經傳不合以為唐堯即位之年嵗在丙子迄太平興國元年嵗亦在丙子凡三千三百一年起商王小甲七年正月甲申朔旦冬至自此之後每七十六年得一朔旦冬至此即古歷一蔀每一蔀積月九百四十積日二萬七千七百五十九率以為常直至春秋魯僖公五年正月辛亥朔旦冬至了無差爽用此為法以推經傳縱小有增减乃經傳之誤皆可發明也古歷到齊梁以來或差一日更用近歷校課亦得符同恭惟聖朝文教聿興禮樂咸備惟此一事久未刋修伏望聖慈許臣撰進不出百日其書必成儻有可觀願藏祕府詔許之書卒不就先是遣使采訪川陜諸州府二之能否多不治者獨知䕫州袁逢吉知遂州李虛已通判查道知忠州邵曄知雲安軍薛顔等七人以稱職聞戊子皆賜詔書奬諭逢吉鄢陵人顔河中人道元方之子也道事母至孝母嘗病思鱖羮方冬苦寒市之不獲道泣禱於河鑿氷脫巾下取之得鱖尺許以饋焉刺臂血寫佛經母疾尋愈及母卒絶意名宦遊五臺將落髮為僧一夕震雷破柱道坐其下了無怖色寺僧異之咸勸以仕乃從進士得官為館陶尉亷介與妻采野蔬雜米為薄粥以療飢稅過期不辦州召縣吏悉枷之既出門它吏皆脫去道獨荷之自下鄉督稅鄉之富民盛具酒饌以待之道不食杖其富民於是餘民大驚道稅立辦道不勝貧與妻謀欲去官賣藥㑹都運使樊宗古素知道節行欲薦之辭以與其縣主簿葉齊宗古曰齊素不識也道曰公不薦齊道亦不敢當公薦也宗古不得已兩薦之齊緣是得改光祿寺丞直史館道尋自遂州徙知果州道為館陶尉薦主簿葉齊此據司馬光日記日記乃以道為主簿葉齊為縣令據葉齊以館陶主簿改光祿寺丞直史館實録載於端拱二年十月日記誤也時冦盜尚有伏巖谷依險為栅者其酋何彥忠集二百餘衆止西充之大木槽彀弓露刃詔書招諭未下咸請發兵殄之道曰彼愚人也懼罪欲延數刻命爾其黨豈無詿誤耶即微服單馬從僕不持尺鐡間關林壑間百里許直趨賊所初悉驚畏持滿外嚮道神色自若據胡床而坐諭以詔意或識之曰郡守也常聞其仁是寧害我者乃相率投兵羅拜號呼請罪悉給劵歸農加賜袍帶驛奏之又賜詔書奬諭七人者又有朱協劉檢二人名迹不顯因削去但有其目朱協恐即是朱昂弟然本𫝊亦不著嘗為川陜何官先是五品以上官任子皆攝太祝上謂宰相曰膏粱之族官勳固已榮貴子孫仕宦者多至四五人每覃慶中書皆授攝官未幾即補正員不數十年遂通閣籍此甚弊政亟宜革之乙未詔自今止賜同學究出身依例赴選集五月辛丑令開封府判官楊徽之等三人按行管內諸州民田旱甚者蠲其租及徽之等上所蠲租數參知政事冦凖曰東畿夏苗嵗收三十萬斛令蠲免五分以上其間貧下及新歸業者理當蠲免內形勢户慮或僥幸上曰自秦變阡陌井田之制不復故豪猾并兼租稅减耗遂致棄本逐末朕常念生人衣食之源貧富不均訟端四起俟三五年嵗時豐稔民庶康樂必擇强幹有執守之人先自兩京立法止取地土頃畝不以見墾及荒田繁重者減省僥幸者增益之嚴其法制務在必行庶使百姓皆足訟端永息也此事據寶訓冦凖既有此言御史因請遣使覆按故王欽若始受知於真宗實録正史皆略焉亦可惜也别本實録於明年六月丁酉載此事與寶訓不同今從寶訓李繼遷率萬餘衆冦靈州癸卯四方館使曹璨自河西入奏上召宰相等於北苑門語其故曰繼遷因剽劫輜重之後頗猖獗自恣輒窺靈武驅烏合之衆頓堅城之下固無持久之理却緣城中人齎表告急為賊所獲賊以為危窘因頓兵未即引去卿等宜熟慮之朕固有成算矣吕端曰靈武軍儲乏少賊黨又據瀚海津要環慶三道各發徑卒約輕齎徑走平夏攻取繼遷帳幕繼遷必顧惜巢穴望風引退如此則靈武之圍解餉道得通矣上曰不然三道起兵深入所發甲卒凡幾萬人何人為將領何人為輜重况塞垣表裏沙磧三道兵馬於何處㑹合須更熟籌其事不可輕舉向者芻粟朕令分三輩護送丁夫悉持弓矢自衛兵給拒馬徑弩令為方陳而行冦至則分布拒馬發徑弩士卒成列以待之誠能遵守紀律豈至敗衄而將校皆自率胸臆不用條教當冦之暴集戰具未暇施設而丁夫已潰亂相蹂而死豈謀之不臧蓋違朕節制所致也參知政事張洎曰盛暑之月水泉乏絶芻粟未集而議者欲三道舉兵深入以分賊勢陛下以為未見其利誠如聖旨時中使竇神寶在靈州賊圍城嵗餘地震二百餘日城中糧糗皆竭潜遣人市糴河外宵運以入間出兵擊賊卒全其城按實録正月乙卯命曹璨知靈州蓋以侯延廣病故二月延廣卒據璨𫝊璨未至即改為麟府濁輪寨鈐轄及繼遷窺靈州部署郭密亦已卒而璨復自河西入奏至六月戊戌乃命慕容德豐復知靈州不知春夏間靈州守臣果是何人獨竇神寶傳略見此因掇出附載更俟考尋司天中官正韓顯符言熒惑犯輿鬼秦雍之分國家當有兵在西北冬官正趙昭益言犯輿鬼中積尸秦分野有兵人民災害之象上語宰相等曰天文謫見如此秦地民罹其殃五星凌犯朕常候之未嘗無其應朕旦夕念之不遑寧處李繼隆等兵馬已到環慶賊聞王師之至固已破膽其如靈州救援未及萬一不守城中皆漢民必盡為此賊所屠戮自閉壁以來居人乏食餓死者必衆上因嗟歎久之辛亥上降手詔曰靈州孤絶救援不及賊遷猖獗未就誅夷居廟堂侍幃幄者正合運竒兵而伸碩畫宜令宰相吕端知樞密院事趙鎔等各述所見利害再護送軍儲至靈武合發軍民多少舉兵深入賊境以分其勢又合用兵幾何何人將領何人監護直書其事言不必文只今日實封來上吕端等相率詣長春殿見上言曰臣等若各陳所見恐乖詢謀僉同之義望共為一狀述其利害張洎越次奏曰吕端等備位廊廟上有所詢乃緘默而不言深失訏謨之體端曰洎欲有言不過揣摩陛下意爾必無逆鱗忤旨之事上默然壬子洎上疏曰李繼遷違天逆命跋扈邉陲既掩截於軍儲復攻侵於藩鎮孤恩負德夷夏共知政當蹶躓之辰復起轉輸之役臣恐緣邉民庶救死之不暇豈敢有望於安堵者乎况靈武郡城介在河上饋運艱阻臣請備陳始末一二條列以言之昔在唐朝吐蕃最盛乘安史之亂陷河隴之地肅宗用靈武之師克復兩京者緣党項率先順命靈武地界與党項接連自長安出鄜畤度塞門經鹽州抵廽樂東坂入靈武東門迄至近代以來謂靈武可以控守者緣路在党項內地無鈔略之患故也今繼遷以党項餘孽邉防狡冦據平夏全壤扼旱海要衝倐往忽來若居袵席之上國家若兵車大出則獸驚鳥散莫見其蹤由若般運載馳則蟻聚蜂屯便行於劫奪向來轉般芻粟既下失地利又上違聖謨致此奔衝理甚明顯其事一也甲馬行役糧草飛挽軍須所急莫若井泉自環抵靈旱海七百里斥鹵枯澤無溪澗川谷荷戈甲而受渴乏雖勇如賁育亦將投身於死地又安能與賊羣爭鋒哉其事二也自羣孽滔天靈州閉壘披猖之衆蹂踐四郊田疇日荒樵蘇絶路負户而汲易子而食備禦理盡飛走望斷豈能復為國家堅守者乎其事三也假使靈州圍解旱海塵清朝廷當須召發甲兵裹送糧草未逾終嵗輦運復興乃是以日繫時而轉輸無己驅秦雍之百姓供靈武之一方使無辜之民膏塗原野朝廷大計豈若是乎其事四也况繼遷或成或敗未足致邦國之安危靈武或存或亡豈能繫邉隅之輕重得失大較理甚昭然或者謂臣曰今朝廷以天下之力而不能救靈武之一郡豈不為耻乎臣對之曰聖智宏深牢籠宇宙處置戎務盡妙窮微向來臣下但於宸算能舉一二而遵行之則繼遷不足擒而靈武安有攻守之慮也今則事機已失奔駟難追豈可不問臧否唯謀克取昔漢武以英材雄略征伐天下然而以造陽之地百里舉而棄之髙祖棄王險之城元帝棄朱崖之郡咸能與時消息垂裕無窮豈德不至而力不任哉事有不利故也或者又曰靈武如不能守則環慶等郡便與蕃戎接境得不危殆乎臣應之曰靈武居平夏西北敻絶一方逆賊制旱海之衝斷飛挽之路議者尚云可守而不可棄今環慶等郡居山南之腹非受敵之所乃云受危不亦過乎况四裔郡城皆在邉上若以外壓戎境便曰阽危甚非公論也或者又曰繼遷逆衆尚在靈州官兵數千未出城邑豈可不謀救援而坐觀陷沒也若國家於環慶丹延鄜府等三處各出兵馬齊驅賊境分頭牽拽繼遷必顧惜巢穴望風而旋城內官軍定免淪胥之禍况環慶一路雖乏井泉清逺軍大有糧草可以就而食焉丹延麟府兩路河水巳足供用但所經蕃部旋加掩襲則餱糧亦無闕矣若以救靈武戍卒復起三道之師當盛暑之辰涉不毛之地芻粟何自而計度水泉從何而卜射茫茫沙塞千里而遙復指何方為所詣之處大軍一發不可停留善敗否臧安能復保若繼遷探三路兵馬取一路可爭之處聚蕃戎之衆據險隘之津以逸待勞攻我師之困乏則轍亂旗靡豈比前日之退衄也一道踈失則兩道不戰而自潰矣謀謨之拙莫甚於斯今者恭奉德音俾陳方略臣以為牽拽賊勢兵甲不可令輒離本處但密𫝊宣㫖令整排士馬張皇氣勢聲言剋日三道齊攻逆賊聞之必不能驅巳老之師頓堅城之下若狃於進退則牽拽之勢可見矣又何必冒兵馬之所忌犯盜賊之所長率易啓行自貽後悔以臣愚見所謂靈武封壤必不可以即時保守靈武士伍必不可以深入應接牽拽兵馬必不可令起離本處若踰此道縱使良平復生亦不能為謀矣比來河西形勢所以為謀不及者稽其始末盡緣違聖君指畫致賊猖狂賊方侈謀事皆倒置養成邉禍傷我國靈乃臣子之罪也然則聖人以天下為度者不以細故為嫌則棄地戢兵事非獲己乃從權之道也况繼遷窮凶極惡罪巳貫盈雖假息邉庭怙亂沙塞一旦上天降禍首裂支分財貨土田咸歸聖日亦猶晉侯璧馬暫寄於外府復何異焉上初有意棄靈州既而悔之及覽洎奏不悅却以付洎謂之曰卿所陳朕不曉一句洎惶恐流汗而退上乃召同知樞密院事向敏中等謂之曰張洎上言果為吕端所料朕以其疏還之矣已未詔西京作坊使叙州刺史帶御器械石普下御史府案問坐為西川巡檢擅離本部又奏事故也上謂宰相曰石普恃在朕左右不畏王法徑赴闕廷朕已令繫治使知有刑獄艱苦昔蕭何周勃韓安國皆將相大臣猶不免於縲紲况此小臣乎既而召見赦其罪復遣之任時賊黨王鸕鷀復聚集剽略僞稱邛南王普因言蜀之亂由賦斂迫急農民失業不能自存遂入於賊望一切蠲其租賦使知為生則不討自平矣上許之普既還揭榜告諭蜀民無不感悅部內以安普太原人也
