body:
  text: 續資治通鑑長編巻三百二十四宋李燾撰神宗元豐五年三月乙酉詔昨應募隨王中正出界開封界大保長雖未嘗立功者各遷一資庶可鼓舞百姓使人人樂於公戰乙酉三月四日熈河路都大經制司奏先據李浩申有新歸順部落子馬凌等稱黄河北有馬凌親家翁哩努卜宻桑一家十五口叫喚乞船過渡浩尋差東頭供奉官孫晞等取接不期西賊設詐捉虜孫晞并當直兵士一名浩輕率無慮欲望許本司取勘從之宻記三月四日事十九日并六月十二日可考提舉江南西路常平等事劉誼言聞道塗洶洶以賣鹽為患望宻遣中使體訪情實稍變法以便民詔江東路提㸃刑獄范峋體量仍下見提舉鹽事官曾伉分析百姓不便所以及州縣違法因依以聞本志載范峋體量事甚畧蓋有所隠也今不取六月七日丁巳峋云云誼又上書云由唐至於五代暴政所興二廣則户計一丁出錢數百輸米一石江東西許之釀酒則納麴錢與之食鹽則輸鹽米供軍須即有鞋錢入倉庫則有蕟錢正税之外又有租錢宋有天下承平百年二廣之丁米不除江南𣙜酒而収麴錢民不得鹽而入米比五代為加賦矣嘉祐中許商通茶乃立租錢茶租以税為本比國初又加賦矣雖然民生不見兵革安於田畆而以財力奉公家未告病也而論者以為無政事故財用不足陛下有憂之起王安石參大政未久而相之又以王安石所推引而任吕惠卿曾布李承之内則議令外則察訪舉天下之法而新之陛下日旰宵中以聽萬務自古好治之君至誠篤信排天下之議論而任安石未有如陛下者為安石者以身當天下之怨以報陛下固亦鮮比當此時朝廷郡縣頗革因循之弊上下日以赴功而一切禁言新令之不便是以法度未備而已敝夫法已有弊智足以知之然則當更而不更者何哉是大臣造法之過而羣臣不言之罪也伏思陛下所立新法本以為民為民有倍稱之息故與之貸錢為民有破産之患故與之免役為民無聯屬之任故教保伍為民有積貨之不售故設市易皆良法也行之數年天下訟之法弊而民病色色有之其於役法尤甚臣請試言其甚者朝廷立一法使民出錢而害法者十臣請遂言之唐壞租庸調法而為兩稅其後毎稅錢千而增二百是庸之外一取矣五代之麴鹽鞋蕟本朝皆入兩稅是庸之外兩取矣又出茶租是庸之外三取矣又出役錢是庸之外四取矣四取之外又出寛剰是庸之外五取矣是謂不原賦稅本末輕重而出錢害法一也陛下以鄉户衙前破民家産故占籍而稅者皆使出錢以助役此良法也然差役以版籍為宗版籍以稅錢為宗避差科者或隠寄稅錢詭名以就下等又稅之重輕不當田之肥瘠議法之臣未嘗講此案天下不正之籍一切隨稅而出錢是謂不正天下之籍而出錢害法二也五等之有差役一鄉不過十人其次七八人在公者少而安居者多矣議法之臣始曰助者取於官户單丁女户寺觀未嘗為役者出錢以助重役爾既而變法不計貧富以稅錢為率而取之謂之免役凡軍人代役則取其錢以還三司及貧民未嘗為役則又取之何哉臣嘗為廣西常平矣廣西凡為稅錢一文者出錢七八或五六夫一年之間出錢五六若未病民也然以五六錢所出方夏秋農趨功時兩至官府公私糜費又且數倍古之養民晝爾于茅宵爾索綯今之貧民以五六錢奪其時甚可憐也故宜融之民逃入蠻洞廉州之民燔屋而逋亦可見矣是謂下户出錢害法三也朝廷以吏為貪墨考古庶人在官之制而與之重禄用河倉法决其賄獄可謂美意矣立法之初蓋當考事局之繁簡吏案之輕重州縣之大小以差制禄可也不論大小輕重之别多者至七八千州縣常平兩案或至六千多者至八千本朝簿尉下縣或七八千今之吏乃數倍於此豈非庸錢太厚乎其它容有徒費者矣如前日既罷之帳司是也是謂庸錢太厚又有徒費害法四也夫庸錢既厚則取民不得不多兩浙之民富溢其等者為無比户多者七八百千其次五百千臣竊以舊法言之役之重者為鄉户衙前其次鹽秤子其次酒務使為上户者十年而一役費錢百萬則是年百千矣今上户富者出八百千則是七倍昔日以一户計之十年之出已八百萬矣如此則民家之錢安得不窮天下財産安得不蹙而法為利民是謂出錢太重害法五也法以役人有定數而年歲有豐凶故立寛剩以備嵗與夫捕虎緩急之用此良法也然司農意規寛剩不立正法行之數年州縣寛剩刻納減放不及之錢貫已朽矣役錢中又出雜支寛剩此為何名而取也是謂寛剩太多害法六也夫男耕女桑不給於買錢以輸公家其勢不得無困窮矣今不䘏卒不幸有方二三千里之水旱則將何以䘏之乎陛下嘗試以近事觀之前日明堂赦書元豐元年以前賦稅苗役逋負一切放免江西雖小所蠲除數百萬一路如此其它可知臣以謂賦稅者朝廷正利尺布㪷粟何可不償今天下之民連年逋負惟幸蠲放一有饑饉仰給於縣官其故何邪蓋役錢雜色輸官已多雖樂歳無贏餘正稅所以不入也昔之人君蓋嘗變法矣然其君臣未嘗不相為終始也昔者陛下以天下之法弊故革而新之則是變法者陛下也承意而立法者王安石也潤色討論之者吕惠卿曾布之徒也故重司農之權以頒法又詔倉官以行法可謂有序矣然而造法之臣不原陛下惠民本意一切以利為本於是患失之徒爭言新法之便司農不問是否隨事立法法未成全而安石惠卿有隙曾布相繼罷去而新法一聼於司農主司農者大抵妄意朝廷志在財用希合而已大臣襲故事不敢復議利害畫而守之行之數年天下受其弊是謂法未成而立法之臣去朝廷害法七也然而上下相目而不言是羣臣持禄養交負陛下也而今日定法之臣又無一言救其弊徒頒條式以減淮浙役人樁留為説責諸路依式成書移東就西減五増十固無毫髪有補朝廷所謂提舉倉官又不肯論列利害意者欲繼前軌趣成書總天下方數見之空文叨天下之功以幸富貴是謂司農不察倉官不救弊害法八也夫二浙之法始於李承之其次沈括其次呉雍凡三遣使矣屢變法矣然民不知法之為利而日益貧者徒知更出錢之法而未嘗減錢以利民也是謂減役人而樁留其錢害法九也自改法來變圓融為和市有司不為陛下惜乃輕為價上督責則下疾驅為縣令者乃一科買於民昔臣過淮南淮南之民科黄河夫夫錢十千上户有及六十夫者湖南買弩樁官估二十百姓為費二千户有及二十條者近江西買軍須衲襖官估八百實費三千其它翎毛竹箭無不數倍夫縣官緩急資於民民出其餘助公上理固然也然民已出役錢又不免於科配是謂百色配買賤價傷民害法十也凡此數弊者不見於上而見於民民情壅於上聞甚可痛也傳曰知予之為取政之寶也今有司但知取民甚無謂也然救今日之弊豈有難哉陛下鑒害法者悉更之民享大利矣伏惟陛下察臣之言不在於私嘉聽幸甚誼又言廵歴洪筠等州據百姓陳狀論訴州縣抑令置鋪置鹽已牒所屬施行臣竊詳蹇周輔元立鹽法以救淡食之民於今民間積鹽不售以致怨嗟賣既不行月錢欠負追呼刑責將滿江西其勢若此則安居之民轉為盗賊其將奈何上批劉誼職在奉行法度既有所見自合公心陳露輙敢張皇上書惟舉一二偏僻不齊之事意欲槩壞大法公肆誕謾上惑朝廷外揺衆聽宜加顯絀以儆在位特勒停六月七日丁巳范珣言可考劉琯始末當考元豐七年正月特授宣義郎元祐元年六月權發遣韶州曾布誌和斌墓云誼欲使斌將兵討黎人斌以為兵出無名必罷既而果然當考丙戍贈司徒郭崇仁曾孫獻卿為左領軍衛大將軍尚冀國大長公主詔官制所檢詳文字劉賡賈種民詣館伴髙麗國使所應答所問律令從使人李子威請也權知開封府王安禮言應刑名疑慮及情理可憫公事乞從本府録奏斷遣如得㫖斷死者乃送糾察司審問從之詔肅州團練使鄂特凌古聞在羌中居果莊之右蘭州之戰又能竭力督勵諸酋堅約不回可除本州防禦使己丑詔涇原路經畧司聞劉昌祚等出界回隨行旗鼓及招撫金帛器用笏帶銀槍戰袍等物悉棄界外可案實具數以聞庚寅詔河南府進士席旦特赴廷試旦汝明子上書論事合意也此據席旦墓誌增入鄧洵武作壬辰御集英殿策禮部奏名進士舊紀具載策問詔司農寺趣諸路提舉司發常平并坊場積剰錢五百萬緡輸元豐庫詔武舉人御試日馬射重修編敇刪定官宣德郎王亘為通直郎權監察御史裏行賜龍圖閣直學士知慶州曾布母仁壽郡太君朱氏冠帔從布請也甲午策特奏名進士又策武舉進士新紀書䇿武舉舊紀不書詔都大經制瀘州夷賊林廣梓州路轉運副使苗時中詳度以新修腹裏武寧大峒開逺平夷四寨約新修樂共江門鎮溪梅嶺大洲等五城對行毁廢城守之具皆可移用可權留開封界第四將兵馬防托其義軍弩手從軍已久并湖北雄畧隔路皆可遣歸乙未手詔沈括聞已遣曲珍部領兵馬前討近界屯聚賊黨珍係本路副帥事體至重非全師出境不可容易輕發宜速諭止令董率將領於並塞遥為聲援止使裨將出界討除仍誡之伺便安穏取勝勿得輕敵有誤國事二十一日壬寅可并此詔荆湖廣南川峽陜西河東經畧安撫鈐轄司具化外覊縻歸明蠻徭夷獠熟户蕃部合補職名資級請受則例及前後所補職名恩數異同以聞按以置籍詔自今入内内侍省初除都知押班中書樞宻同進呈七月庚子又有詔詔熈河路提㸃刑獄司河州官吏和雇守城義勇保甲修城特免取勘手詔李憲裕勒藏喀木等送到蕃字文頗陳情甚有向順之意宜及今屯兵防立堡障之便速為經畫應接并十九日庚子定州路安撫使章惇奏乞將本路團教場漸次營葺責限至十月終以前了當未奉朝㫖今保甲司將緣邊未集教州軍一例修制團教場要一發興修三月終以前了當事渉張皇措置乖方正是安撫司奉法守職所得關言非為侵越欲望下本路許將未集教州軍團教場並限十月終以前修置了當上批宜依惇奏止作朝廷特降指揮疾速行下御集百二十一元豐五年三月十四日下丁酉右侍禁張琦除名送江西編管以糾合富民與右監門衛大將軍世闡議婚也戊戍詔自今太廟祠祭前廟初獻差親王宗室使相節度使郡王后廟初獻差宗室節度觀察使嵗以序差不赴罰俸一月其餘祠祭勑差行事者凖此司天監言四月朔日當食於寅詔自己亥易服避正殿減常膳其日百司守職秦鳳等路提舉保甲司言本路義勇並改為保甲其間多有一家男夫五人已上成丁者若排兩丁或三丁充保即難拘以五家為一小保欲毎五丁為一小保詔保甲以家聯保以丁聯兵小保長以上緣兵置令三路依詳施行如於舊法有礙條畫以聞六月戊午云云熈河經畧司言董戩鄂特凌古使以蕃字來告曰夏人通好已拒絶之且訓整兵馬以俟入討詔苗授李憲師行有期即預以告己亥德音降天下死罪囚流以下釋之為日將食故也舊紀書詔以日將食正陽之月為異尤大自己亥避正殿減常膳赦天下囚罪一等流以下釋之新紀書以日將食避殿減膳赦天下侍御史知雜事滿中行言昨以權知開封府王安禮任性破法犯分干譽欺罔聖德乞正典刑又牒取當察簿書巧匿不送規紊紀綱臨事奏請挾持主恩禦人以口輦轂之下當用正人伏望察情議罪斷以至公上批令安禮具析元奏請改法利害及取索簿書前後不同以聞提舉汴河隄岸宋用臣言面奉聖㫖金水河透水槽阻礙上下汴舟令臣相度措置已行按視可以自汴河北岸超字坊開河一道取水入内徑至咸豐門合金水河將金水河自板橋石㪷門東修㪷門開河一道引水至金明池西北三家店灣還入汴河其舊透槽可廢撤從之六月二十八日戊寅賜名天源河詔杭州以錢氏臨安縣田産課入嵗賜表忠觀錢五百千葺呉越王墳廟新紀書詔杭州嵗葺呉越王墳廟舊紀不書涇原路經略都總管司上諸將出界所部正兵漢蕃弓箭手亡失分數詔除劉昌祚姚麟已降官外趙定髙棟种診孫咸寧戴嗣良賈辯李祥劉玊各追一官徐鎮任端桑湜賈德用各兩官俱千劉珣各追四官張免成恭各五官庚子詔諸緣保甲封樁錢物非有朝㫖而輙支用者論如支封樁錢法李憲言據李浩稱裕勒藏喀木約三月辛卯於堅博投附其情决是詐降與誘誤孫晞事體無異已令李浩不得擅發兵馬應接詔兵謀百變難執一方要在索見敵情不失機㑹孫晞見執自是率易過河即非為賊誘致今裕勒藏喀木稱欲投附及約㑹於堅博即當察情偽隂為隄備相度招納豈可便為姦謀不行應接朝廷經制西賊招納降附自是一事若情實投附而自疑阻即使羌情愈堅向賊實於邊防有害委李憲詳此施行并十四日乙未孫晞事見三月四日又六月十二日知開封府王安禮言司録司獄空外有左右軍廵院獄案皆已斷絶止有見禁罪人丁懷等公案已奏及在糾察司望責近限審録及約法斷遣所貴三院皆獄空從之湖北都鈐轄司言凖詔取問沅州龍賜古監三州知州押案并頭角人等各不願補班行依舊進奉從之辛丑涇原路經畧制置司奏鄜延路兵馬分為五軍共用文武官二百四員雖已奏乞差使臣一百人下本路相添團結諸軍使臣如尚不足權許依去年七月九日指揮不依常制抽差補填所闕人數詔三班院選差使臣五十人應副鄜延路差使如不足差散直宻記二十日事去年七月九日指揮未見壬寅朝散大夫范子儀為廣南西路轉運判官新廣南西路轉運判官朝請郎葉羲叟提舉江南西路提舉常平等事以上批羲叟精神雖不衰而形體癯瘠恐不宜使嶺外故也鄜延路副總管曲珍言出界至金湯遇賊焚蕩族帳七百斬千級詔鄜延路經畧司關逐路經畧司麟府路軍馬司速具功狀以聞此月十四日乙未二十六日丁未可并此又四月八日十一日十三日亦合并此沈括自誌附四月十三日舊紀書壬寅鄜延副總管曲珍敗夏人於金湯斬級千新紀不書知桂州張頡言昌化軍劾符破結九人犯持杖彊盗殺人罪皆死縁係捕盗官招誘令解下弓刀支與酒食然後擒縛若從捕獲法慮致生黎疑懼將來無以示信詔釋之廣西提刑司言朱崖軍黎人素兇頑自至和中因符䕶失奴婢捉廵檢慕容允則為質本軍西北一帶道路至今不通近龍見符隻等峒尤甚若不討蕩以懲誡則恐猖狂不止民不聊生詔張頡依詳近降指揮施行慕容允則事當考詔陜西五路自大軍入塞之後沿路馬遞鋪甚失編排有妨轉送文字專委官整葺陜西差胡宗回王欽臣京西差梁燾癸卯新知潤州朝奉大夫集賢殿修撰盧秉依舊朝請郎為寶文閣待制知渭州軍事並聽李憲節制以种諤自言與統帥素不合不可共事固乞免渭州故也詔諤還鄜延舊任時政記在十一日壬辰今從實録詔下諸路係役廂軍權不以等様選擇少壯人招刺御史王祖道言樞宻院補試本院貼房充令史問目以將校於元豐三年九月逃亡至十月捕獲編勑依在官亡法凖律計日坐罪既稱三年九月即合通閏為坐今以閏計罪者為否不以閏計罪者為通而謂之假法不當數閏道路喧傳以考中宗禮等皆承㫖張誠一挾私徇情乞付有司根治以懲姦罔之吏詔送樞宻院大理寺根治情弊并所言來歴處以聞祖道又言御史彈奏前知延州吕惠卿遣禁軍饋徐禧公使物已詔劾罪而惠卿論奏輙引編勑兩府犯公坐案後取㫖及徐禧無罪不當劾編勑明有三百里饋酒之禁而惠卿廼謂變易他物則酒不出三百里非所禁也舞文玩法罪狀甚明一昨陛下講武西垂規摹一出聖訓邊臣奉行而已惠卿乃謂今日乗幾之舉有助拙速竊觀惠卿越在衰苴不畏名節規免小累饕功自賢意自延安赴闕妄覬陛下有復用之意惟恐釋服之後舊物不可復得近降朝㫖免劾此雖出於陛下終始大臣之恩然竊謂士大夫亷恥不立而朝廷行法宜自貴者始惠卿違法饋送雖已免問而論奏虚妄不可不懲詔劄與惠卿其後根治祖道所論張誠一事為臺吏李景仁所誤劾惠卿事不當皆以赦原其後至赦原朱本增入當考甲辰王安禮言凖朝㫖臣僚上言取索盗賊簿欺罔事令臣具析不同因依勘㑹本府得臺牒取索籍記盗賊姓名簿臣為見臺牒取簿數多逐次許取一道却凖臺牒所封送諸廂賊限都簿不應本臺所取令封送編勑諸盗再犯杖州籍記姓名簿本府遂回報凖一司勑京城府界犯盗並刺環子有此照據所以更不置簿兼臣亦曾面奏並不知前後有何異同詔滿中行分析安禮又言臣智識卑下行能無取誤䝉聖知待罪天邑凡所自為有害無補如言者指臣任情破法犯分干譽侵權自恣横厲無忌尤為切當凡臣奏請已曾論列利害止於如此今别無可分析如朝廷已知言者不誣乞早賜罷黜更用舊法以厭羣論并十八日樞宻都承㫖張誠一言今後諸軍因功或捕賊換大小使臣者許帶舊請受從之詔司農寺於大名府公使庫錢内撥錢千緡與相州及於恩冀二州公使錢内各撥錢千五百緡與邢趙磁三州候遼使行舊路日依舊乙巳御集英殿賜進士明經諸科黄裳以下及第出身同出身五百九十三人裳南劒州人也舊紀書乙巳進士明經諸科賜第及授命者千四百二十有八人新紀書賜禮部奏名進士諸科及第出身千四百二十八人丙午賜奏名進士明經諸科授假承務郎文學助教攝助教八百三十六人新舊紀於丙午日並書雨土今凖例不書丁未詔沈括曲珍軍馬出塞已還帥府非卿指授方略之良及珍戰勇之力曷以膚功如此士卒經去冬飢殍之後人情振奮之初非亟賞之不足以酬其赴敵忠勇之志其促珍保明功狀以聞仍誡以勿濫十四日乙未手詔同遣珍二十一日壬寅珍出界四月八日十一日十三日當并此戊申御試初考官大中大夫蘇頌集賢校理王子韶王陟臣承議郎劉奉世同知禮院楊傑通直郎蔡京覆考官龍圖閣直學士安燾知制誥王存史舘修撰陳睦曾鞏集賢校理趙彦若太學博士張崇詳定官翰林學士蒲宗孟寶文閣待制何正臣集賢校理陸佃各罰銅三十斤坐頌等考黄裳等下上親擢為第一故罰之鮮于綽傳信録云祖宗時狀元通判乃賜茜袍故有不著藍袍便著緋之語其後恩澤稍殺為簽判或知縣袍止賜緑元豐中黄裳為狀元有語黄裳却作緑衣郎就姓名詠之也考官本考裳置第五甲神宗嘗見其文因記其數句至唱名令尋裳巻須臾尋獲進呈神宗曰此乃狀元也乃唱名同時又有劉槩者前此一舉蒲宗孟為省試喜其文考槩作省元以䇿中歲字犯廟諱藩邸名不得已黜落散號日蒲話於衆予槩為省元自此遂知名勑差為學録至是年又為省元神宗聞其名放榜日亦在第五甲神宗呼至軒前問曰卿學録幾年槩曰臣待罪學録三年又曰師何人槩曰䝉陛下教養神宗嘉其應對宣諭曰有司考校失實置卿第五甲今陞第二甲時考試官知制誥曾鞏輩以定黄裳劉槩試巻不當各罰銅三十斤詔頴昌府三縣災傷特支常平倉米三萬石提舉河北黄河隄防司言按視御河陿隘隄防墊弱不能通納大河分水恩州城壁可憂而囘水入大河即不灌塘濼御河綱運惟通恩滄水靜乾寧自可轉入大河不至囘逺所相度閉截徐曲來水併入大河為便從之并二月二十一日詔春銓試中上等二人循一資中等七十六人不依名次注官下等四十九人注官己酉提舉河北路保甲司言諸縣尉通管縣事外惟主捕縣城及草市内賊盗鄉村並責廵檢管勾縁邊把截控扼廵檢兵級並依舊其定州望都曲陽北平唐縣祁州蒲陰保州保塞廣信軍遂城安肅軍安肅順安軍髙陽永寧軍博野滄州清池覇州文安大成莫州任邱雄州歸信容城逼近邊界舊以使臣為尉其職與内地不同鄉村盗賊恐難一例專責廵檢欲並令尉依舊條惟不干預教閲從之詔沈括自出界及接續招納到人口内有酋首及自來羌巢使令之人自歸順後赤心効力擊賊有功者可品第力量髙下立功優劣番次差使臣管押入見
