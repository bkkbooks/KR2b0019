body:
  text: 續資治通鑑長編卷四百九十宋李燾撰哲宗紹聖四年八月壬午朔御文德殿視朝知鄜州崇儀使成州刺史王舜臣權發遣熙河蘭岷路鈐轄元符元年二月二十七日當考鄜當作麟六月末可考癸未降授左衛將軍駙馬都尉韓嘉彥為文州刺史駙馬都尉詔知成德軍吳安持復還兩官安持自陳熙寧中提舉市易嵗課登羡蒙恩加秩而元祐中以為掊克奪兩官故還之詔髙陽關界河司巡檢王溥𣙜場徐昌明霸州刀魚巡檢楊拯劉家渦黃金寨巡檢賈嵒知霸州李昭珙通判侍其琮權通判寇毅並先次差替仍於瀛州供答文字以遼人入霸州𣙜場殺傷兵士及偷拆橋梁昭珙等坐失措置溥等不即救援也先是髙陽奏霸州申榷場北門外橋自元祐三年曽修後為水壞沿邊安撫司令復修及施工北界屢以兵來即令婉順應答過作隄防六月甲辰北界忽將人船千餘夜圍𣙜場呌呼拆橋梯城射傷戍卒四十六人其一人死未明遁去詔雄州未得移牒及令髙陽指揮密切隄備時七月癸丑也已而琮申昭珙示怯太過及界河巡檢承牒不報却往雄州出巡等事詔髙陽體量應干有罪人取勘奏裁於是琮及昭珙等皆先坐責琮亦託出巡避寇故也初章惇與曽布皆言敵聞西羌喪地頗不自安探報多言求助於敵而敵亦自驚疑云有收復燕幽之舉因此欲生事但勿與深較則自無事尋聞敵移牒云橋屬北界合從北界修乃詔邊吏如北人來修橋無得與爭須俟其退却行毁拆時路昌衡自髙陽歸入對亦言修橋比舊太髙故敵驚疑又言霸州纍有探報略無措置琮昭珙等既坐責其後雄州言敵追牛欄監軍及安撫副使赴帳前各決沙囊三百監軍勒停以擅拆橋及殺傷南界戍卒故也實録霸州拆橋事不記今從庚午曽布曰録七月壬戌乙丑丁卯及八月乙未所書增修再責昭珙等在明年六月辛卯翰林學士承旨蔡京言文德殿視朝轉對伏聞昔者堯舜以道在天下而以政事治之其道始於逹四聰明四目而至於惇德允元難壬人其政始於親九族平章百姓而至於協和萬邦蓋聽欲聰故逹之視欲廣故明之惟聰故無所不察而邪説不能行惟明故無所不見而詖行不能容詖行不容則能厚有德而君子之道長邪説不行則難壬人而小人之道消故其治至於黎民於變時雍其和至於百獸率舞臣嘗以為其道甚易知其政甚易行而時君世主以為髙絶莫可跂及特未知其術耳蓋人主單立於萬物之上所以鼓舞羣動役使萬物者以能生能殺能與能奪故也人主操生殺與奪之柄而以道揆天下之事審之以仁義濟之以威權慢令凌政者必誅妨功害能者必放反覆頗僻者必竄讒説殄行者必罰則小大內外孰敢先後孰敢拂違四方將徯志而應不勞而成矣此臯夔稷契所以吁俞歡兜鯀羽所以放殛也其術至約而易知非有髙絶難能之行也臣伏觀陛下畏天愛人有堯舜之資沉潛淵默有堯舜之度含洪光大廣覽兼聽有堯舜之聰明親政四年定志於一而無所回奪可謂聖矣操生殺與奪之柄而坐制太平無事萬里之中國嚬笑謦咳足以風動四方其勢未有利於此時也然姦黨斥矣而或容邪説察矣而未息是非辨矣而未一好惡審矣而未宣臣愚竊謂陛下退託謙抑未以堯舜道術加天下故也夫生殺與奪之柄惟人主所獨制非人臣所可共傳曰惟名與器不可假人是也陛下誠加意乎此勵勸禁於上作威福於下使賢者在位而不賢者不能間能者在職而不才者不能奪其以陛下之聖堯舜不足方矣夫如是則四方豪傑皆作而應陛下之求則臣雖至愚亦願遂畢其説臣前所謂堯舜政事者蓋書之稱堯曰克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍蓋治親然後治朝廷治朝廷然後治萬民政之序也臣觀今日敦宗睦族其制法自熙寧講定遭元祐裁損寖失本旨故服近而親者貴極富溢驕奢淫泆無所不為踈而逺者身為白丁下夷編户有飢寒之憂且富有天下服屬雖逺皆兄弟伯叔之親也而或與民庶為伍則非所以睦九族也承平百年士生斯時者衆矣三嵗一舉無慮萬計此文王多士以寧之時而百年休養之效也員多闕少率三嵗五歲然後調一官士皆低回茍且又無常産因無常心遂自溺於茍賤不亷之地而無砥節勵行之操奔競之風扇亷恥之道衰人材以之乏政事以之弛則非所謂章百姓也人知所尚則士非不多也土無不闢則農非不劭也器無不精則工非不巧也四民之業三民偹矣而商不通故天下之大百年之久民未加富俗未加厚京師者諸夏之本諸夏者京師之本也㕓布日益消細民日益困矣商農相因以為生者也商不通則物不售物不售則賤賤則傷農農商不能交相養此四海之民於平安之時而未免流離於水旱之際則非所謂和萬邦也堯舜之道舉是三者而黎民於變時雍今三者皆未得其道此天下所以未登堯舜之盛也歟臣愚竊嘗慨然太息以陛下之聖有天下之利勢而欲以登堯舜之盛豈有難哉在操主柄以任賢使能則舉是三者措之天下若反掌之易夫以恩制義則九族可睦以官任士則百姓可章以利行商則萬邦可和然施之有方行之有本其詳可得而言也陛下幸聽則臣愚將繼今條上謹先陳其大略仰塞明詔陛下留神加意後蔡京對垂拱殿上曰孟子所謂非堯舜之道不陳卿是矣朕何敢望堯舜京對曰舜何人哉有為者亦若是髙宗三年不言陛下不言九年過髙宗逺矣此堯舜之聖也陛下志於堯舜則堯舜不難到上曰睦九族奚事京曰陛下之親屬恩有不及至於凍餒前日户部勘犯酒事有投軍者二人豈睦族之道上惻然曰俟諭章惇令悉施行京再拜謝曰惇與臣異必不能行陳瓘彈蔡京第四章云章惇初信京卞三人議論如出一口自紹聖二年十月卞為執政於是京有觖望而與惇睽矣四年閏二月林希為執政於是京始大怨而與惇絶矣京所云惇與臣異殆必由此按林希執政在四年閏二月瓘云三月卞執政在二年十月瓘云九月誤也新録辨曰蔡京所上疏其言淺陋無取及其提舉實録乃自載上稱奬之語曰孟子所謂非堯舜之道不陳卿是也豈不上纍哲宗知人之明哉今採擇所論宗室事外並行刪去别修云翰林學士承旨蔡京言帝堯之治始於睦族臣觀今日敦睦宗室之制自熙寧講定遭元祐裁損寖失本旨故服近而親者窮富極貴有驕佚之患服踈而逺者下夷編民有飢寒之憂願以恩制義則九族可睦後京對上問睦族事京曰陛下親屬恩有不及至於凍餒前者户部勒犯酒事有投軍者二人豈睦族之道上惻然曰俟諭章惇令施行京再拜曰惇與臣異必不能行今復存舊本也翰林學士兼侍讀蔣之竒言次當轉對伏以官制之弊久矣名秩舛忤位序顛倒在漢何武嘗請建三公而不能定在周盧辨嘗述著六官而不能久先帝元豐之間慨然一變以階寓録雖用舊文而傅以新意可謂盡善矣然有所未安者試守之謂也蓋所謂試則非正官也今為尚書侍郎者皆正官也而謂之試此失之矣本其始所謂試者為其階之卑也如以其階卑則謂之守可也臣按貞觀令以職事尊者為守職事卑者為行舊制階尊職卑為行階卑職尊為守階與職等者不行不守此三者足以該之矣其不必謂之試亦明矣何以知階卑職尊可以謂之守也守者非真也臣按李固傳注漢故事先守一歲然後為真又馬援傳注曰守者一歲乃為真食其全俸故薛宣入守左馮翊滿嵗稱職為真張敞守太原滿嵗為真王尊守京兆尹後為真又茂陵守令尹公注云守茂陵令未真為之以此考之則階卑職尊者謂之守足矣是不必試也且如正議大夫視六曹侍郎光祿大夫視左右丞通議大夫視給事中今六曹侍郎自正議大夫除則官與階等不守不行也自光祿大夫以上除則階尊官卑謂之行可也自通議大夫以下除則階卑官尊謂之守可也何必云試哉凡此等者皆古之制也今中大夫為尚書侍郎則稱試為左右丞則稱守且新制左右丞為輔臣在尚書之上豈有中大夫可以守左右丞而不可以守尚書侍郎乎此可謂倒置也臣請參酌典故特為釐改凡為正官者皆改試為守庶幾協於名義成一代之盛典議者謂以試為守如制祿之差何臣應之曰定制祿之差使守如試無不可者臣聞明聖潤色祖業傳之無窮先帝考復官名規模宏逺則修飾而潤色之正在陛下惟留神裁幸河東經略司言閏二月十五日西賊六萬侵犯神堂等堡第三將內殿丞制李偀能以少擊衆第一將宫苑使賈嵒冒犯鋒鏑致西賊倉卒首尾不救斬獲近上首領七人因此賊氣沮喪號哭遁去王師乘勝修葭蘆所向討蕩無不克捷望格外重行賞典詔李偀斬獲三釐已上依格合減二年磨勘特轉兩官賈嵒特轉一官更減三年磨勘其餘部隊將等第推恩乙酉湖州觀察使世開為奉國留後封安定郡王司農少卿朝散大夫杜紳知滄州承議郎御史臺主簿謝文瓘為正字丙戍鄜延路經略使吕惠卿言差將官王愍破蕩宥州并燒毁族帳等不可勝計斬獲五百餘級牛羊以萬數詔賜出界軍兵特支有差惠卿家傳云七月遣副總管王愍純制諸將入界二十九日至宥州其洪宥韋三州總都統軍賀朗賚率衆迎戰愍等擊大破之追奔二十餘里斬首五百餘級入宥州焚其官廨倉場刑獄民居五十餘間并偽行宫軍司簿書案籍等發窖藏踐禾稼蕩族帳不可勝計愍據淖河賀朗賚率其衆來襲而首領伊實諾爾凌結鄂裕以數千騎出半入雞川將邀官軍愍率諸將掩擊復破之斬首二百餘級轉戰而南七十餘里壁於秦王井賊復來攻愍使以神臂弓射却之全師振旅還賊登髙不敢追獲器械五十餘件牛羊萬五千餘頭八月復遣兵馬都監劉安攻夏州至朗沁沙與賊遇破其衆斬首五百餘級事見八月二十五日丁亥朝請大夫邵材為刑部員外郎九月末李深云云朝請郎黃敏用同管勾成都府利州陜西等路茶事兼提舉陜西等路買馬公事己丑詔復神臂弓射法舊射一百二十步元祐中減為八十步今復如舊御批大理寺官吏勘斷內中作賊修內司雄武兵士邱安本寺並不奏裁止以京城內竊盜條斷決訖緣本人所犯事理重輕自與常法不同不惟斷遣失當亦無以懲誡除别作施行外其本寺官李孝博特罰銅二十斤朱牧蔣之美杜宗旦滕友各罰銅三十斤推法司等當行人吏送開封府各決臀杖二十放辛卯户部狀元降朝旨同管勾陜西路銀銅坑冶鑄錢許天啓銅苖興發如在京西川路許前去檢踏止為京西及川路與陜西相連接取令本司委官乃至瀘州界以來檢踏緣非陜西相連接處又係靠邊慮致引惹乞申明行下應非與陜西接界州軍不許前去從之四年八月十日聖旨二年十一月二十三日許檢踏壬辰涇原路經略安撫使章楶言伏見故范育任熙河經略使日於元祐棄地畫疆之時獨能抗朝廷意指反覆敷陳利害又嘗陳進築之䇿持論堅確人莫能奪特贈寶文閣直學士恭惟神宗皇帝以范祥興築古渭寨身死贈祕書監又官其一孫祥育父子也皆以進築成功而被賞乃異望更録育之子孫一名詔范育特與子或孫一名郊社齋郎先是蔡碩女壻文康世嘗與碩言劉唐老謂文及甫曰時事中變上台當赤族其它執政奉行者梟首從官當竄嶺南又曰吕大防已死劉摯及梁燾老病蘇轍范祖禹劉安世韓川等當還為執政蓋辛未詔榜五月十八日有幸時事中變之語故唐老云云碩既聞康世言遽令康世録之持示蔡京京具以白上或又告唐老與及甫共謀為變欲誅章惇蔡卞等仍密結嶺南責降元祐人事連知河南府李清臣京西轉運判官周純此據王鞏甲申雜見刪修附京言後上疑其事問三省當何如時淮南轉運副使周秩徙京西路未至也秩自淮南改京西乃六月十六日秩嘗攻文彥博不入元祐黨三省因請委秩體量得實即付獄周秩體量據曽布日録在八月十三日甲午今附本曰尋有詔令秩乘驛赴闕上殿訖之任秩赴闕布録在八月十三日與體量同書後數日同知樞密院林希對上及唐老事謂希曰卿以撰制詞亦在誅戮中希曰臣與曽布但剽聞而己未嘗敢詢三省也布録在八月二十三日希退為布言之布他日見邢恕恕曰體量唐老事盍且已布曰此長者之言也唐老雖謗訕然不及君上所誚大臣爾政當函容恕曰奴婢為主所笞撻亦必怨詈怨詈之人諒何止唐老唐老有此語豈可勝校也布曰事已然但能小了則庶幾矣此據布録在十月十一日辛卯恕深然之時章惇方欲引恕為中丞使排擊元祐責降人而恕與布言乃如此唐老竟得輕置恕與布言在十月十一日辛卯為中丞在十月二十一日壬寅唐老落職監當在十二月十七日丁酉王鞏甲申雜見云周秩重實大觀元年九月得吉州守過髙郵言紹聖中有洛人告言文及甫劉唐老與李邦直等將生變誅章子厚蔡元度諸人下至兩制侍從皆及之召重實為京西轉運使推治之以其嘗攻文潞公也朝旨令先推究體訪候有狀即治之又以運判周純為知情不告云將引用嶺南謫降元祐人同力為之哲宗召重實對曰欲盡誅族大臣已下則將致朕於何地又召吕升卿令國民聽旨俟有其實即遣族諸人于嶺南重實既至西京捕文劉置運司别聽且辟程公孫事管勾察訪於外久之無狀而誅大臣之語則有之凡三請自裁未幾罷邦直留守知成都府且密諭重實令有實則就攝久之公孫忽得二張秀才密語云元謀云候上意變必用元祐人乃有族誅之舉重實即具奏且言不及乘輿不數日令文劉逐便各還朔部並更不推治哲宗之明之仁今世無知者以元旨樞密公案一宗并元狀悉不在有司雖朝廷悉無知者公案藏其家終當上之乞實録書之公孫喜刺人事者也周秩四年正月二十四日先自浙憲除京西漕閏二月十七日改淮南六月十六日又自淮南改京西吕升卿四年十一月十五日自京東運副改河北元符元年二月十七日與董必察訪廣南三月四日罷察訪董必四年十一月二十九日先以湖南提倉往廣西體量蘇軾等周純三年十一月以江西提舉為京西運判元符二年五月猶在任李清臣四年正月二十五日自中侍出知河南四年十二月三日改成都明年正月九日復知河南劉跂辨謗録載劉唐老説靖國元年三月七日跂就唐老家見唐老説丁丑年六月中文康世告妻父蔡碩言及甫與唐老密謗時事言不久必變惇必族減餘執政必竄又云康世見劉唐老親説碩使康世形於手筆携往見蔡卞遂有旨下監司周秩根究此事未了九月中同文事又大作遂先攝及甫下同文獄後來方興洛獄跂見曽右相説先因劉唐老事後有文及甫事與此相符然不曽問得洛獄後有如何結絶必有知之者當問殿中侍御史陳次升言竊以乘輿所在有司供具最冝全固訪聞藉田司思文殿修蓋曽未數月而前簷今已墜墊雖陛下聖德巍巍天地佑護行幸之際必無憂慮萬一驚恐其當如何董役官司若無顯責慮創造北郊宫亦復弛慢望特賜懲戒詔禮部郎官一員同入內侍省使臣一員前去相驗詣實以聞乙未奉議郎校書郎商倚權通判保州從其請也丙申詔罷賜夏國厯日三年十月辛酉布録可考朝奉大夫許介卿為刑部員外郎右朝議大夫知常州吕公雅為少府少監十月五日以新除提錢改知齊州陳次升云云又九月十五日朱彥傳除提餞蔡蹈云云可考丁酉詔贈太師蔡確無辜貶死弟除名勒停又前朝奉郎碩特與敘換內殿崇班承奉郎少府監主簿蔡渭奏臣叔父碩曩於邢恕處見文及甫元祐中所寄恕書具述姦臣大逆不道之謀及甫乃文彥博愛子必知當時姦狀詔翰林學士承旨蔡京同權吏部侍郎安惇即同文館究問初及甫與恕書自謂畢禫求外入朝之計未可必聞已逆為機穽以榛梗其塗又謂司馬昭之心路人所知又濟之以粉昆朋類錯立欲以眇躬為甘心快意之地及甫嘗語蔡碩謂司馬昭指劉摯粉昆指韓忠彥眇躬及甫自謂蓋俗謂駙馬都尉曰粉侯人以王師約故呼其父克臣曰粉爹忠彥乃嘉彥之兄也及甫除都司為劉摯論列又摯嘗論彥博不可除三省長官故止為平章事彥博致仕及甫自權侍郎以修撰守郡母喪除及甫與恕書論請補外因為躁忿詆毁之辭及置對以昭比摯將謀廢立眇躬乃以指上而粉昆指王巖叟梁燾巖叟面如傅粉燾字况之以况為兄也及甫初赴獄京等説之曰此事甚大侍郎無預第對以實即出矣及甫既妄自解釋其書又言父彥博臨終屏左右獨告以摯等將謀廢立故急欲罷平章事問其證驗則俱無有也此用新舊録及參取它書别修元符元年五月四日獄竟紹聖初蔡確母明氏有狀訴邢恕云梁燾嘗對懷州致仕人李洵言若不誅確則於徐邸安得穩便朝廷封其狀不為施行劉唐老文及甫事作蔡渭告章惇曰唐老等何足治曷不治梁燾惇遂檢明氏狀進呈於是并付蔡京安惇究治此據曽布元符元年三月二日所記仍參取實録元符元年五月四日獄竟新録云承奉郎少府監主簿蔡渭奏臣叔父碩曩於邢恕處見文及甫元祐中所寄恕書具述姦臣大逆不道之謀及甫乃彥博愛子必知當時姦狀詔翰林學士承旨蔡京同權吏部侍郎安惇即同文館究問初及甫與恕書自謂畢禫當求外入朝之計未可必聞已逆為機穽以榛梗其塗又謂司馬昭之心路人所知又濟之以粉昆朋類錯立欲以眇躬為甘心快意之地及甫嘗語蔡碩謂司馬昭指劉摯粉昆指韓忠彥眇躬及甫自謂蓋俗謂駙馬都尉曰粉侯人以王師約故呼其父克臣曰粉爹忠彥乃嘉彥之兄也及甫除都司為劉摯論列又摯嘗論彥博不可除三省長官故止為平章事及彥博致仕及甫自權侍郎以修撰守郡母喪除及甫與恕書論請補外因為躁忿詆毁之辭及置對以昭比摯如舊眇躬乃以指上而粉昆乃謂指王巖叟梁燾巖叟面如傅粉燾字况之以况為兄也後蔡確母又言梁燾嘗與懷州致仕李泃言朝廷若存蔡確則於徐邸安得穩便李洵憤姦嫉之嘗以告邢恕詔令恕詳具以聞新録改舊録大抵因劉防等所為劉摯行實及邵伯溫辨誣然行實謂司馬昭乃指吕大防與辨誣不同當以辨誣為正蔡渭上文及甫書邵伯溫以為在紹聖初若然不應四年方起獄蓋紹聖初但訴安州作詩事後為邢恕所教乃上及甫書實録因同文起獄即載之當只是四年七月或八月初也曽布日録元符元年三月二日辛亥布既言吕惠卿不可遣是日晚聞梁燾卒布謂林希曰早如此則不復力爭矣希曰不然其它所陳有補者不一亦不為徒發布又曰留對甚久衆皆云未有如中丞之對也先是紹聖初蔡確母明氏有狀言邢恕云梁燾曽對懷州致仕人李洵言若不誅確於徐邸豈得穩便尋不曽施行既而因及甫唐老事蔡渭告章惇云唐老事何足治何不治梁燾惇遂檢明氏狀進詔下究問所推治究問所以問恕恕云得之尚銖遂召銖赴闕録所陳如恕語云得之李洵又下洵問狀云實聞燾此語遂欲按燾因蔡碩言文及甫嘗有書抵邢恕云劉摯有師昭之心行道之人所共知也遂下恕取及甫書恕以聞遂并付蔡京安惇置究問公事所於别試所攝及甫詰之云得之父彥博然終無顯狀蔡京又令及甫疏摯黨人納於上前龔原孫諤皆是以及甫言未可施行蓋謂摯等交通有廢立之意乃召柳州安置張士良鞫之士良與衍同為御藥主宣仁閣中文字而其言亦無顯狀但云衍常預知來日三省所奏事作掌記與太母為酬答執政之語太母每垂簾但誦之而已又言太母彌留時衍可否二府事畫依畫可及用御寶皆出於衍而不以稟上也既而獄終未決及甫知在西京士良寄禁府司雖議誅陳衍已定而尚於絞斬有疑殊可笑也劉摯行實云初公沒於嶺表所屬為公請歸葬於朝不許已而諸子坐廢徙他郡而不著罪狀雖公之家亦不知也今上踐祚大赦天下公得歸葬文及甫蔡渭皆貶湖外而及甫告詞曰語人不順至形翰墨如其有實胡不以聞如其無實何異誣謗舍人張商英所作也由是人稍稍知其事起於此元祐中及甫持喪在洛陽邢恕謫永州未赴亦以喪在懷州數通書多為隱語及甫又以公任中司嘗彈罷其左司郎官怨公尤深以書抵恕其略曰改月禫除入朝之計未可必當塗積怨於膺揚者益深其徒實繁司馬昭之心路人所知也濟之以粉昆必欲以眇躬為甘心快意之地可為寒心大意謂服除必不得京師官當求外補故深詆當路者然司馬昭之心莫諭其旨至紹聖初恕密以示蔡確子渭渭乃上書訟元祐大臣自吕丞相大防及公而下十餘人陷害父確蓋欲不利上躬謀危宗社事有實狀引及甫書為驗朝廷聞而駭之委翰林學士御史中丞究治焉遂逮及甫屬吏而所供繆悠初無事證但託亡父曽説之究治所問司馬昭謂誰及甫對意謂公也問其證據事狀則曰無有但執政五年而未作相必有怨望疑其事勢畢竟如此又問粉昆謂誰及甫對粉謂王巖叟面白如粉昆謂梁燾字况之况猶兄也初議者傳聞及甫怨詈之語固知不實然謂司馬昭必以吕丞相大防獨當國久或以為謗而及甫獄辭乃以指公又粉昆俗以駙馬都尉為粉侯故王克臣緣子師約人稱粉爹今韓嘉彥尚主必以兄忠彥為粉昆而及甫指巖叟燾按及甫元祐末稍被進用吕丞相除為權侍郎心甚德之而忠彥當時雖罷樞府上眷未衰王梁或貶或死易以陵籍故及甫隂自移其初意委曲遷就獨指公及王梁人皆知其妄朝廷亦覺悟獄事遂緩會公薨聞朝廷乃以不及考驗止坐諸子而已其後諸子皆敘復議喪還鄉里公嗣子跂徑伏闕下投登聞匭上疏又持副封詣都堂叩宰相今韓丞相忠彥及丞相布許中書將皆取實封案牘開視知其謬妄明白如此建中靖國元年二月二十五日有旨文及甫蔡渭所陳顯無實狀已行貶責紹聖五年四月四日指揮更不施行然後殁後誣謗所坐皆得釋劉摯新傳四年春責為鼎州團練副使新州安置十二月卒於貶所不許歸葬是年蔡渭言文及甫嘗以書抵邢恕有司馬昭之心路人所知之語蓋指摯謂嘗有廢立意也於是逮及甫恕等繫同文詔獄命翰林學士承旨蔡京中書舍人蹇序辰等雜治卒無佐驗及甫恕皆被罪猶用蔡京奏明年五月摯已死詔以前尚銖所置辭皆已亡不及考驗明正典刑乃免摯諸子官家屬徙英州邵伯溫辨誣云章惇蔡卞遷謫元祐諸公卞初與惇乞發司馬光墓上不從惇卞意未快遂自青州召邢恕為刑部侍郎又遷吏部尚書恕與惇卞誣造元祐諸公事不已下遷恕為御史中丞用其謀欲誅殺劉摯梁燾王巖叟等十餘人恕又造宣訓之語恕又誘髙遵裕之子士京論其父功恕又教蔡確之子渭以文及甫説粉昆事書投進惇卞遂起同文館用蔡京安惇推治粉昆事者文及甫與邢恕元豐同為館職相善韓魏公之子韓忠彥與魏公門生劉摯王巖叟等常不平潞公不言功事以謂掩魏公之功及章惇撰神宗御製賜潞公詩序云嘉祐之詔但宣之而已忠彥與劉摯等益不平元祐初潞公入為平章重事摯等簾前論列王同老所上文字文彥博教為之乞改史宣仁后曰吾詳知此在至和中仁宗不豫乞立皇嗣者文太師富相公劉相公王參政功也在嘉祐末乞立英宗為皇嗣仁宗升遐䇿立英宗者韓相公功自不相掩不須改史范公既已救蔡新州罷相劉摯拜右僕射韓忠彥拜左丞梁燾拜右丞王巖叟拜簽書樞密院文潞公致仕罷平章事歸洛文及甫罷權侍郎以修撰知河陽時邢恕居憂懷州已有永州監酒謫命恕與文及甫皆怨劉摯韓忠彥梁燾王巖叟者文及甫與恕書故有粉昆朋類錯立司馬昭之心路人所知之語粉乃駙馬蓋忠彥之弟嘉彥尚主也昆為駙馬之兄乃忠彥也朋類錯立者謂劉摯梁燾王巖叟也司馬昭之心路人所知者謂劉摯將謀廢立事也後恕以及甫此書與蔡渭渭馮京宣徽孫壻馮公薨于京師哲宗臨奠渭自幕中出訴以其書進呈既起同文館獄自洛追文及甫為證時潞公已薨蔡京安惇謂文及甫曰此事甚大侍郎無預以實對即可安及甫乃對云文太師臨終時屏左右獨告劉摯等欲我出謀廢立事邢恕言晉州某縣主簿尚洙懷州致仕官朝𣪚郎李洵知劉摯等所謀乃追尚洙下獄李洵以老就問初供昏老不記再問依違供答未幾洵以憂死尚洙無可供放還任文及甫亦放歸此邵伯溫所記也按馮京以紹聖元年四月三日卒即如伯溫所記蔡渭以紹聖元年四月訴粉昆事不知何故直至四年八月乃起同文館獄按實録紹聖元年四月十三日蔡渭訴確冤追贈左正議大夫此時但論作詩非謗訕耳粉昆事邢恕教渭為之當在四年又按文彥博以紹聖四年五月四日卒豈蔡渭先於元年四月訴粉昆事執政謂文彥博在則此事不可詐為故直待彥博死方起獄乎又尚洙知晉州冀氏縣非主簿也邢恕言黃履在元豐末曽有章疏言宣仁后欲立徐邸事伯溫後在同州於曽布之子絣處見曽布手記當時事一編云禁中元無黃履文字黃履家出藁草入獄為證黃履與恕皆未第而交遊相善恕亦與履同謀也王棫京師人有口辨好議論熙寧中為死黨伯溫嘗見王棫尚洙李洵于恕所皆妄人也後章惇因恕薦落棫致仕除知北平軍未幾棫死其子直方不以父為然每為士大夫言父晚年病心直方與朝載之相善以平生所收書畫歸載之觀直方所收書畫於其間得王棫與邢恕往來書一通皆共謀誣造諸人廢立事者畢仲遊謂伯溫曰邢恕可畏人也先是元祐中侍御史朱光庭司諌劉安世聞禁中求乳婢同上宣仁后書乞加保護主上宣仁后簾中諭吕相曰吾與皇帝未嘗相離實無它止為大王宫覔乳婢相公可諭臺諌不須論此吕相無由見臺諌官因經筵起諭諌議大夫范祖禹令以太皇太后聖語諭劉安世等范諌議至後省劉司諌傳聖語劉責范曰公為大諫反傳宣耶范長者為劉所責遂上章以勸講無狀乞出後恕言於章惇蔡卞以謂劉安世朱光庭范祖禹三人上宣仁書有廢上意凡恕言者皆同文獄所治之事也其獄以章惇蔡卞用蔡京安惇尚煆煉不成哲宗疑之因星變赦批出曰朕遵祖宗遺志未曽誅殺大臣劉摯等事可勿治不然數十家皆被誅戮矣然劉摯梁燾同時死於嶺南貶所人亦疑之按星變赦在九月五日後二日又詔元祐餘黨及别有特旨之人皆未得量移則邵伯溫所稱上批朕遵祖宗遺志未嘗誅殺大臣劉摯事可勿治恐未必然也新録於宣仁傳末附上批蓋因伯溫所稱耳赦後治同文獄未嘗少緩若既釋勿治何以直至明年三月九日乃杖殺陳衍及貶張士良五月四日有逐人皆死不及考驗明正典刑摯諸子勒停之詔乎伯溫所稱要未可信也邵伯溫又云有宣仁宫內官某人已編管白州亦追赴獄蔡京安惇誘之曰能證此事不獨還朝當復舊職內臣曰還朝復職固幸然不敢妄通上纍宣仁聖烈皇后下致諸大臣於死地遂復送貶所同文館獄雖不成猶遣使杖殺內臣陳衍於海島毁拆宣仁故宫當時宫人遂出有誅死者尚有隨嫁潛邸老宫人亦編管宿州章惇蔡卞至作廢宣仁詔服未除請哲宗抵靈殿宣讀施行欽后方寢聞之遽起不及納履號哭於宣仁后靈前曰太皇太后皇帝祖母也於皇帝何所負至此哲宗乃已天下聞而怨之范祖禹謂伯溫曰某見內臣梁惟簡自言元豐八年二月初宣仁后諭惟簡曰令汝家製十二三嵗兒可著黃背子來是時神宗疾已危漸欲備哲宗即位也伯溫昔為慶州經略司幕官有內臣走馬承受徐安道頗識道理逮事宣仁后紹聖初亦編管永州遇赦放還伯溫常問宣仁事安道曰謂太皇太后有此心者罪人也哲宗幼氣怯每宫中遊行太皇太后常令臣持繡繖以從飲食起居不相捨又曰宣仁性嚴毅儉約語笑有時服浣濯之衣數問安道曰汝金帶幾何終不賜雨二日即焚香告天旱亦然曰惟誦佛經平居嘗曰吾粗知書史前代賢后妃中如唐長孫后所願也徐安道言如此哲宗性本仁慈自幼時見宫中人以湯潑地曰不可恐殺螻蟻嘗行後苑有衛士避不及匿溝中左右以奏不顧曰吾見必得罪後以章惇蔡卞勸宫中殺人為多皆惇卞之罪也按伯溫所稱內官即張士良事在元符元年三月戊午張士良自紹聖元年六月十三日以皇城使監穎州稅其後不見再貶今以前皇城使對獄罷乃送白州邵伯溫云已編管白州恐悮新録云於雷州取士良必得之但不知何所據耳又按曽布九月二十五日乙亥日録云張士良郴州安置令放逐便發來赴闕章惇以士良嘗在先朝任使後附惟簡輩頗知當時與大臣交通密謀事遂召之衆深憂其妄造以自解也宣仁崩於元祐八年九月三日卞謀廢宣仁當在紹聖末元符初此時宣仁喪既除矣二年十一月三十日宣仁喪除曽布四年五月十九日壬申日録云蔡京曽云仁宗時欲以庶人禮葬章獻京又曽云車駕不可幸楚邸又云天下根本未正意謂不誅楚邸則未安耳是時楚邸未薨故有此論此二事亦可參考又曽布九月十四日日録云蓋自今春以來章惇蔡卞等數陳司馬光等有傾搖之意四月十八日公著光責司户又言范祖禹劉安世欲加意於上皆有姦心浸潤日久故皆痛貶閏二月十五日范劉再貶既而又貶王圭髙士英四月二十四日圭士英貶三省之言寖及宣仁矣據此則此已前未嘗及宣仁也然布言亦未可信當考新録於紹聖元年二月七日宣仁傳後載惇卞追廢事迹大率因邵伯溫辨誣要當詳考反覆尋究惇卞謀廢宣仁當在紹聖四年四月貶王圭髙士英後哲宗焚惇卞所草詔及抵奏于地當在九月星變後詔釋大臣勿治恐星變時未有此兼同文獄自緣無證驗乃已不緣星變也邵氏必誤新録又因之若謂止絶廢宣仁之謀因星變則可新録紹聖元年二月七日宣仁聖烈皇后傳後序邢恕事云先是元豐七年三月大燕中延安郡王侍立王圭率百官賀及升殿神宗又諭王與圭等相見復分班稱謝是冬諭輔臣曰明年建儲當以司馬光吕公著為師保神宗彌留后敕宫人梁惟簡曰令汝婦製一黃袍十嵗兒可衣者密懷以來蓋為上倉卒踐祚之偹太母所以屬意於上者確然先定無纎介疑邢恕傾危士也少逰光公著間蔡確得師保語求所以結二公者而深交恕確為右僕射纍遷恕起居舍人一日確遣恕要后姪光州團練使公繪寧州團練使公紀辭不往明日又遣人招東府確曰冝往見邢舍人恕曰家有桃著白華可愈人主疾其説出道藏幸留一觀入中庭紅桃華也驚曰白華安在恕執二人手曰右丞相令布腹心上疾未損延安沖幼宜早定議政嘉皆賢王也公繪等懼曰君欲禍吾家徑去已而恕反謂后與圭為表裏欲捨延安而立其子皓賴已及惇確得無變確使山陵韓縝簾前具陳恕等所以誣太后者使還言者暴其姦再貶知隨州尋竄新州劉摯拜右僕射恕坐黨與謫監永州酒紹聖二年除恕待制知青州章惇蔡卞執政謀所以釋憾於元祐舊臣者知恕險鷙果於誕罔又銜摯等黜已方思有所逞為確報投荒之怨召為御史中丞日夜論劉摯梁燾王巖叟等謀廢立又造司馬光送范祖禹赴召有主少國疑宣訓事可慮之語以實后屬意徐邸之謗又誘髙士京上書告王圭嘗令髙士充問其父遵裕遵太后之意欲誰立遵裕叱遣士充乃去又教確之子渭進文及甫廋語書有司馬昭之心路人所知等語以斥摯等有廢上謀惇卞起同文館獄使蔡京安惇窮治於是時中人郝隨日夜媒孽稱制時事眩惑左右惇卞交關謀議奉行文書於外作追廢太皇太后詔請上宣讀於靈殿欽聖獻肅皇太后欽成皇后苦要上語甚悲曰吾二人侍崇慶天日在上此語曷從出且上必行此亦可也何有於我上感悟取惇卞奏就燭焚之禁中相慶而隨等不恱明日惇卞理前請上怒曰卿等不欲朕入英宗神御殿乎抵其奏於地同文之獄追逮后殿御藥官張士良脅以刀鋸鼎鑊無所得又適有星變詔曰朕遵祖宗遺志未嘗戮大臣釋勿治恕徒以謀於進取極口造言仇執政以逞適惇卞用事凶德參會捨不利之謀無以激怒人主廢辱之幾上及於君親曽不以為忌而尚何有於臣下之家推迹讒口開禍亂原雖江充息夫躬尚何以加新録大抵用邵伯溫辨誣刪述推邢恕所稱桃著白華反誣宣仁及郝隨媒孽并欽成同欽聖諫上焚奏抵奏不欲入廟等語皆伯溫所不記新録既於宣仁傳後敘此又於張士良貶白州時重出之要當去一存一邢恕以紹聖二年十二月自青州入為刑侍四年正月改吏侍五月權吏書七月兼侍講十月遷中丞司馬光坐宣訓事再貶乃四年四月十八日髙士京上書乃四年二月同文起獄乃四年八月恕作此三月事時皆未遷中丞邵伯溫記事先後或差新録不深考遂因之要當改正乃善新録紹聖四年十一月二十三日劉奉世責郴州後又敘邢恕事於初上之嗣位恕與蔡確自謂有定䇿功既而確死貶所恕亦斥不用心恨之其後恕因帥中山會髙遵裕子士京為將官士京庸暗恕一日置酒從容問士京曰公知元祐間獨不與先丈推恩否士京曰不知又問有兄弟無士京曰有兄士充已死恕曰此乃傳王圭語之人也當時王圭為相欲立徐王遣公兄士充傳道語言於禁中知否士京曰不知恕因誘士京以官爵曰公不可言不知當為公作此事第勿以語人因令所親信王棫崇飾誣辭為士京作奏上之王圭因是得罪至是恕為御史中丞先上章乞追贈髙遵裕次乃以當元祐間附會劉摯傾陷䇿立大臣論貶奉世云蔡絛國史後補黨籍篇云云别見元符元年五月四日朱無惑萍洲可談云廣東提舉常平孫磬與先公言元符二年朝廷欲攝文及甫鞫一事不知其何事也復慮文自斃乃於吏部選委孫往西京督攝之孫赴都堂巡白執政曰欲其不疑乞所至盛供帳孫先往鄭州見文妻家求書然後詣洛中從容纍日方詣文門下傳逹家信已而通名刺求見文果不疑出迎之孫敘致未竟即日朝廷令某召左右非有他也伏吏趍而至文顧無如之何與俱舍郵置見供具盛心少安乃傳詣京師以正月十二日至國門泰陵上仙事亦輟文不得報而歸孫由是知名除使者按紹聖四年十月五日實録書通判應天府孫磬為提舉廣南東路常平無惑記此事必誤攝文及甫應是紹聖四年非元符二年也姑存此更詳之文及甫獄劉跂辨謗録載其事極詳附注元符元年五月辛亥及七月庚午須參照前後定歸一説樞密院言河北沿邊州軍及安撫司各置間諜密伺北邉動靜之實訪聞逐州軍雖探到北邉事久例不經報過雄州並匿而不聞自來與雄州所奏稍相符合者只是一事而重疊奏報朝廷無緣得知緩急有誤事機詔定州髙陽關路安撫司應有探事人通説並畫一以聞即不得觀望畏避輒行隱漏布録丁酉寶文閣直學士知河南府謝景溫請老遷一官致仕未受命卒戊戍詔御河立顯靈順應神妃廟仍賜冠帔李􅌫十朝綱要是日築威武成己亥左中散大夫知潁州趙令鑠為太僕卿庚子置提舉涇原路沿邊新弓箭手官以朝奉郎安師文為之請給人從並依陜西提點坑冶許天啓例從章楶奏請也後數日曽布以師文乞上殿進呈上曰此章惇所喜然正是吕大防親黨章楶舉差遣必得使之舉也布曰臣素不識之前者嘗問之云大防妻安氏已前五年卒與之同七八代無服紀然師文與大防兄弟亦有瓜葛上云若非親黨及其所喜豈肯辟為山陵箋奏布曰此人其他才術不可知然必熟陜西事范熙在西論邊事多中理師文此時乃在幕府上曰育乃大防親黨也布曰師文本令提舉新弓箭手然舊弓箭手法壞亦欲令整葺上曰令上殿然極黽勉也許天啓提舉坑冶在紹聖元年九月安師文初以朝奉郎論熙河蘭岷邉事見五月十一日甲子七月壬戍上謂曽布曰章惇云安師文云是大防門下士兼極尋常布曰臣不識之只曽一見上問曽與語否布曰不曽但聞長安人與大防或是親舊耳八月己亥涇原乞安師文提舉弓箭手依奏九月乙卯布言惇引師文及蔡肇京卞引家彬石嗣慶皆各以其所恱丁巳再對呈安師文措置新舊弓箭手上終以師文為疑勉從之爾左藏庫副使權發遣定州路兵馬鈐轄權知保州張赴為西上閣門副使知雄州兼河北沿邊安撫副使九月末云李深云云禮賔使提點左廂諸監公事林豫為河北沿邊安撫副使仍權兼提點左廂諸監公事是曰章惇為曽布言中書又放過內批行導洛事並不經三省商量及對遂以內批進呈言先朝法度可復者皆已復惟此不可復上未諾布再對罷惇問布曰上詢及此否布曰否惇率布至都堂出藍從熙提舉京城所奏乞復行導洛司事官員商賈等物貨皆載以官舟官員物貨不及百千者許以所乘舟載免納腳錢之半百千以上以違制論餘皆徙官舟於泗州及京師洛口各置垜場嵗收課利二十萬緡又乞麵市嵗課三萬又復牛羊圈嵗課七萬內批付尚書依奏蓋未嘗與執政議也又京城所奏乞就差買修城木植內臣於溫明州等處起發船三百隻赴本所支撥使用付中書中書遂畫旨依已得指揮送門下而門下留不遣遂并論之布謂惇曰此事何可不與執政議如此則失職矣惇曰何止失職喫棒罰銅皆可也布曰四海之富二十萬不難辦嵗供此數可矣惇及蔡卞皆以為然惇又曰水磨茶場自足供此費布曰先朝經營財利志在邉鄙子孫承之敢忘厥志故闊略細故以就大事今幸無此圖何必爾惇曰亦不須如此言要之是先朝不好事當時行之固終身以為恨今豈可為布曰如此即太逆耳惇曰逆耳多矣布曰志在邊事且以為不可况非邉事乎布因語黃履曰此乃正論盍助之履曰固當如此坐中惟惇卞與反復許將甚愧他皆默然履曰且當徐徐開陳庶可回爾已而將在告不出履勸惇俟將出同呈布曰但持之不下緩無害也後三日三省奏事上遂詢三省云導洛文字何為久不呈惇曰見更取索文字進呈次上曰聞此事誠不便但繳進來惇曰來日取旨上曰不須只今日進入可也三省退以語西府後四日布白上曰近者竊聞議導洛事初聞聖意未從臣因言陛下聖質髙明言必中節事有未便必不肯為遂以先帝用宋守約事語三省已而聖意遂回不俟開陳而罷臣等鼓舞稱誦不能自已上曰見説不便布曰肉市麵市皆與細民爭利汴渠初引黃河水湍捍可畏公私舟船多覆溺者惟清汴無復此患然商賈之物悉載以官舟私船不得入汴人實患之上曰內臣亦多云不便云麵市雖泥雨亦須船載來官場中布曰一日有一日課利不可不來宜其不能避風雨也今天下稅務豬羊凡屠宰者皆須日負載入務收稅與此一般至於禁榷鹽酒亦此類然此事行之既久衆人安之兼嵗課數百千萬軍國之費有賴於此理不可罷若導洛之類所得不多國用無所賴於此兼廢罷十年一旦復行則都邑之人鼎沸矣先帝經營四方蓄財利有所待故闊略細故而行之陛下既無此費誠無用此然大臣未及詳陳而已中罷陛下燭理畏義敬信大臣從善納諫如此天下之事何患也兼聖意遽回正與宋守約事等蓋聖質睿明與先帝無少異者臣等以事未施行不敢漏露惟二府執政知之然此事必書之時政記陛下聖明聽納如此萬古不朽矣天下幸甚壬寅曽布再對呈董敦逸言西鄙開邊北敵危疑又拓地近青唐願戒邊吏靜重無使邉人疑駭而敷敘不甚明白上對二府已嘗言敦逸所陳不可曉至是又以為言布因開陳敦逸所言本如此但文字不眀白爾上頷之敦逸數密排擊二蔡京卞深毁之宜上意兩所不恱也癸卯西上閣門使端州刺史權環慶都鈐轄張存落遙郡刺史降本路鈐轄以統制將兵牽制涇原進築因而破蕩鹽州逢西賊鬬敵失亡數多故有是命乙巳承議郎韓粹彥為司勳員外郎七月九日粹彥引見二十七日京東常平司并入彼丙午鄜延奏遣都監劉安擊夏州至朗沁沙與賊遇破其衆斬首五百餘級牛羊千數布録八月丁未云獲二百級今取九月壬子所書并八月丁未又用惠卿傳增入家傳附注八月丙戌戊申蘇州觀察使吳國公宗綘為昭慶軍留後己酉彗星見氐間斜指天市垣光芒約三尺餘至九月戊辰沒天文志云八月己酉彗星出氐宿度中如填星有光色白氣長三尺斜指天市垣巴星主兵喪大水及有赦九月壬子光芒長五尺行入天市垣內主五穀大貴己未犯天市垣宦者星主侍臣有憂庚申犯天市垣帝座星主人民亂大臣憂期以三年戊辰消散不見樞密院言西賊點集人馬待往涇原作過竊慮西賊暗蓄姦謀掩我不偹長驅入近裏於隆德靜邊治平寨以來人煙繁富地分或間慢城寨偹禦不至之處劫掠攻打詔涇原路經略司詳上項事理多方預行講議措置若遇緩急賊馬奔衝深入近裏合差是何將佐如何移那兵馬於是何要害地分控扼得賊馬來路凖偹捍禦不使近裏城寨及人民繁富地分為所抄略攻打落賊姦便仍不失與大兵首尾照應會合掩殺賊衆必取全勝先具已如何講議措置選充統領兵將官職位姓名及將帶若干人馬於甚處駐劄及應干凖偹應敵方略施行次第聞奏此據章楶奏議所載七月二十五日密劄楶具報畫一甚詳乃九月十一日文多不載也是月樞密院言太僕乞修左右天駟監各兩御殿以備北郊乘輿言入監觀馬上笑曰無用曽布因言北郊宫闕壇壝皆已具如聞來嵗且南郊果否上曰議者以為未曽專饗圓丘故先罷合祭於南郊然後祀北郊莫不妨否布曰如此固不妨然外議皆以為暑熱不可祀北郊故罷上曰豈有此理布曰士大夫皆有此言蓋踈逺不知聖意然先帝已嘗罷南郊合祭陛下昨復合祭於南郊今且專祀圓丘亦無害但終不廢此禮以成先帝之志則善矣臣嘗為人言暑熱無甚於坤成節宴設之日君臣上下終日冠帶未嘗以熱廢五月間暑氣未盛五鼓行禮黎明已畢事何熱之有上深然之布録載此在八月丙午日今附八月末旬遣禮部侍郎范鏜左藏庫使兼閣門通事舍人向縡賀北朝生辰太常少卿林邵供備庫使兼閣門通事舍人張宗卨賀北朝正旦此據國信名御録實録云無之
