  - {type: page-break, offset: 0, content: '', id: KR2b0019_WYG_493-1a, image: WYG0322/WYG0322-0394a.png}
body:
  text: 續資治通鑑長編卷四百八十九宋李燾撰哲宗紹聖四年六月癸未朔日有食之隂翳不見羣臣具表賀丙戍三省樞宻院同班致詞賀不見虧蝕上顧三省曰卿等更當修政事以進賢退不肖為意章惇曰朝廷未嘗不以進賢退不肖為事然衆所謂賢者未必賢須考實若全以虚名進退人則却於政事有害曽布曰陛下以進賢退不肖為戒則政事無足為者賢不肖各得其所則政事豈有不修者乎人固難知然君子小人之分則無以逃天下公議若不顧公議則是非貿亂何以辨明匡章通國以為不孝孟子猶禮貎之有孟子在下然後知匡章為非不孝天下人亦信服豈可衆謂之不孝者皆孝謂之孝者皆是不孝恐無此理臣以為君子小人有天下公議在誠不難分别惇曰若盡要為君子誰為小人者布曰臣不敢以小人自處若無君子之心何可居此地若有小人在朝廷以義理言之於陛下前雖同列不可為之隱上笑云同列莫難相指布曰為陛下分别是非何所不可章惇為宰相若同列中有小人為陛下言之亦職事也况在下之人邪正淑慝何可有隱只有近日進呈吳居厚謂之棄瑕録用則可謂之當進則非也惇曰自侍郎遷尚書有何不可謂之當進則非也兼是使能上曰只是使能布曰謂之使能則亦庶幾然尚書地勢不輕未冝以匪人處此惇曰尚書侍郎亦不爭若作執政則不可也布曰執政固不在論議然為尚書亦已過矣又如賈青所至官守踰濫及作監司按吏起獄有至除名編管者後按之皆無罪如此等人豈可付之一方惇曰官所踰濫者何止賈青布曰不知為誰何不按治惇曰青所至職事修舉今但欲以有虚名者為監司為從官則政事皆弛矣布曰神宗每稱漢宣帝循名責實而臣為小官時嘗上䟽言風俗之敝以為士盗虚名吏習偷惰王安石以為名言然亦未可以有虚名者便可廢也布與惇反復其語甚多衆皆黙然惟論賈青時許將及黄履曰青在福建誠過當布又曰若謂賈青為先帝所用則元豐末自犯法勒停惇曰青自為買珠子布謂惇此言尤無理趣也再對布因言前日日食陛下一發徳音退托不逮虧蝕為之不見天人之際其應如響臣等待罪政府臨事既不能有所建明及陛下側躬畏變責臣等以勉思所戒亦莫知所報稱又不能引咎辭位以避賢路其罪已不可勝誅及進謝陛下又以進賢退不肖為戒臣伏聴徳音雖堯舜禹湯之言無以過此大臣既無以將順臣忠憤所激不免喋喋煩聖聽然臣所陳居厚青等皆小人豈所當進今邪慝之人變亂是非以邪為正以直為曲實中外之所不平左右之臣有正人端士願陛下更賜辨察臣固常恐小人黨與相與為一壅蔽聰明外議皆以為言事官議論多與三省大臣不同恐不得安職或假以美名徙之他官或加以罪戾廢黜如董敦逸作侍御史若擢為權侍郎則可謂峻遷然已罷言職其他言者皆恐似此遷除則與大臣異者皆去言路必盡引門下朋比䜛慝之人充塞要地則差除有不公號令有不當陛下雖欲有所聞不可得矣上曰却不曽有此議論布曰中外所憂如此臣不敢不陳陛下臨事之際思慮先定謹聽而審處之爾十二月五日敦逸自侍御史責知興國軍竟不曽權侍郎録故鞏州土刺史皇甫歡孫部為銀青光禄大夫檢校國子祭酒充鞏州土刺史初一日事今附此詔修國史院録歐陽修所撰濮廟議一本進入詔詳定重修勅令所刪修官朝請郎徐發朝奉郎鍾正甫各與陞一任堂除差遣編排官宣徳郎董嗣之與陞一任堂除差遣朝請大夫許介卿與减二年磨勘仍依元豐年例選留刪定官四員檢閲官一員令本所具功力輕重分等第闗司勲擬賞申尚書省丁亥詔兵部支降神臂弓五百張付環慶路經略司新無戊子武昌軍節度使檢校司徒開府儀同三司嗣濮王宗楚卒車駕臨奠輟視朝三日贈太師追封惠王謚曰僖節府州觀察使同知大宗正事仲御為鎮寜軍留後開州防禦使仲聘為同州觀察使己丑詔蕃官作坊使棟懐義特贈東上閤門使忠州防禦使賜銀絹緡錢各一百男殿侍溪棟巴半之仍令經略司各具其孤以聞以涇原戰殁也詔賜蘭州増展金城闗入役廂禁軍弓箭手蕃漢兵民特支有差户部状檢凖治平二年三月四日中書劄子節文三司奏欲應今日已前及今後客人批抄茶稅錢五分依元指定住賣去處内荆湖南路販茶限一年八個月荆湖北路限一年六箇月江南東路兩浙淮南限一年四個月送納了足餘五分並與展限半年如更有客人陳乞展限從省司勾追勘斷奉聖㫖依本部㸔詳治平元立法意已寛商旅又立定不詳展限刑名故拘収課入有凖不誤國計元祐中王巖叟奏請只慿商旅以罷水磨茶剰數為說更要展限奏請不用祖宗已来條約既送户部亦不檢引元條申明遂降指揮展限一季顯見日限太寛走失課入兼自元祐二年沿此後来内外茶稅錢本部置簿每年春季違限倍罰稅錢今㸃檢簿内白脚未勾銷者一千七百四十三件并已有銷了却使元送納處文字到省部月日銷到者一千三百四十八件既無元送納月日則無以勾考違限竊縁每年茶稅錢約七十餘萬貫經今十年失於檢察更元祐中非理展限恐官司上下别有情弊今欲乞外處委提刑司府界委提舉司選官一員在京於本部選郎官一員各一年取索照證文字驅磨施行尚書省勘會元祐二年六月權展朝㫖係一時指揮今来自不合行用外詔依户部所申辛卯權殿中侍御史蔡蹈言近太僕寺主簿李撰遇皇太后幸池道側不引避罰金衝替太學正林虡衫帽乗馬行道望上儀衛不即斂退其不恭略同而特㫖以贖論是大臣子勢可撓陛下法非所以示至公詔虡特差替虡希子也樞宻院言累據環慶等路探報賊界七月一日㸃集河南北人馬已降指揮令逐路講措置備禦應敵方略西賊夏秋之交恐未能㸃集多以虚聲疑我因得稍自休息然諸路亦不可過為隄備但不冝輙自勞擾仍令諸路帥臣隂為持重安静之計而明行文字指揮令諸將各整齊兵馬為大舉次第其間如有利可乗自不妨随宜出入討蕩惟以嚴重飬成士氣為上詔劄付諸路帥臣此月末涇原章楶云云可考甲午樞宻院言鄜延經略司奏相度得延安府延川縣城形勢不便難為守禦合依延長臨真縣例廢作不可守禦縣從之太中大夫寳文閣待制致仕范子竒卒乙未直秘閣吕温卿為鴻臚卿集賢殿修撰權知秦州陸師閔兼都大提舉成都府利州陜西路茶事兼提舉陜西等路買馬公事已見三月四日當存一去一録故溪峒南州田忠遂男洪景為銀青光禄大夫檢校國子祭酒兼監察御史充南州都廵檢户部言承議郎同管勾陜西路銀銅坑冶鑄錢公事許天啟乞依五月六日朝㫖銜内増入京西川路等字從之仍别給付身黄牒十二月十五日改正云云可考樞宻院言熙河蘭岷路騎兵闕馬數多詔専委權提舉買馬陸師閔於年額外更収買二千應副熙河蘭岷路諸軍并漢蕃弓箭手限防秋已前數足内弓箭手合自備馬之人闗經略司依所買錢數寛立期限催納元價送還買馬司仍逐旋具支買過匹數以聞詳定重修敕令所言遇聖駕行衝入禁衛從外第一重者徒一年每一重加二等第五重當行處斬即應在禁衛而越入者一重杖一百每一重加一等入第五重徒二年事理重者奏裁以上誤者各减二等其行立不依儀式非越入者杖八十丙申詔翰林學士承㫖蔡京翰林學士蒋之竒權吏部尚書邢恕各舉監察御史二員以聞七月甲寅曽布云云可考詔江寜府敦遣茅山道士劉混康上京住持上清儲祥宫九月一日給百千路費可并此丁酉賜環慶路修復安疆寨防拓蕃漢官帛有差三月一日二十三日可考朝請大夫知楚州陳敦為軍器少監皇城使漢州刺史張整為環慶路鈐轄戊戍樞宻院言招納賞格内如能設方略傳導信息誘致招到西界内强壮之人許每名支絹十匹縁西界老小婦女亦有歸漢之人慮招納之際以别無立定酬賞不肯一例接引若行約囘即阻歸漢之意詔招到老小婦女每人支絹三匹十嵗以下二匹是日三省樞宻院同呈邊報曽布言涇原築籩江已有緒然環慶又欲築灰家觜以次經營韋州清逺軍灰家觜在青岡峽口入峽行四十里無水泉乃至清逺此地太宗以来經營鄭文寳自長安致林木飛鳥以往皆不可活今雖能進築但恐不免煩朝廷餽餉則闗中困弊矣上曰如此何用章惇曰孫路言有良田千頃可耕足以自給又云史不足信布曰史乃已試之效未敢信路之言令保明委有良田可以自給不煩朝廷餽餉即聽施行上曰如此甚善惇曰拓地不獨此處亦當以此戒之布曰固當如此再對上曰孫路不足聽亦未須令施行且令奏聽㫖布與林希皆稱善七月二十七日戊寅始有詔令檢視壬寅樞宻院言龍猛龍騎係雜犯軍額其闕並不招人止是三年一次於歸逺壮勇人兵内依等様揀到前復累闕兵額數多今欲禁軍犯徒經决不該配兵級經斷及一年令所属官司因嵗揀取問願依等様揀填龍騎指揮者聽等驗發遣赴軍頭司内川廣不用此制詔可甲辰上批為暑熱應在京工役去處並放假三日熙河蘭岷路進築青石硤畢工詔賜入役及防拓軍兵緡錢有差三省樞宻院同呈熙河進築青石硤役兵等并特支并涇原築籩江川並賜茶藥内張詢鍾𫝊欲不賜上問其故因言青石硤只合作六百歩至四百歩堡子𫝊乃欲作千歩城又以盛夏興役非如涇原不得已而為之上曰為之莫不為無補布曰闗陜人自来云須築了石門子便是了當但興作非時爾上曰且與茶藥不妨此不足計校布因言傳以十二日興役有書報臣而不奏此乃可罪見劄下取問候到施行上曰走馬亦不奏布曰必是走馬不知然亦當取問次布又言𫝊不獨此事又欲經營㑹州而探得黄河水道險於峽江却欲以船栰般運官物上曰誰令𫝊如此衆莫敢對上又顧輔臣曰似此不可為者莫不須作衆唯唯及再對布又言章惇雖不以𫝊取㑹州為然而銳意欲令經營卓囉監軍司以窺凉州此二者要皆不可為林希亦言臣初秉政便聞朝廷欲漸為収斂邊事之計今則不然經營殊未已布曰西人今秋必大㸃集若氣勢尚如去秋猖狂則安得不為収斂計上深嘉納曰此不可忽甲辰二十七日事乙巳横海軍節度使開封儀同三司宗祐為青海軍節度使進封嗣濮王舊錄既於此書宗祐封嗣濮王又於八月十七日書之此新錄削存彼按宗楚以此月六日卒後旬日宗祐嗣封恐事理當然若八月十七日則似稍緩今從舊錄止見于此保寜軍留後東陽郡王宗漢為昭化節度使開府儀同三司改封安康郡王權發遣提舉秦鳳等路常平巴宜添差權發遣陜西路轉運判官元符元年八月二十二日可考樞宻院言熙河蘭岷路經略司言據趙醇忠母李薩爾均言孫男永夀䧟夏國請令永壽弟永順永吉管勾族分仍請録永夀男阿克凌承襲官爵永福永保三人更候三年如不出漢請令與弟永順永吉承襲詔阿克凌特與内殿崇班仍賜名世長差充本族廵檢先支與請給候年及格正行管勾餘依李薩爾均所請丙午詔賜𥚹江新寨名為鎮羌寨五月六日始建請進築户部言凡創置場冶處知州監官已有第賞之令而錢本乃轉運司應副今不預賞恐加沮抑且無以激勸請監官合得第一等酬奨者本司官各减二等磨勘從之丁未皇第三女封懿康公主已酉熙河蘭岷路經略司言本路蕃官東上閤門使登州防禦使岷州一帶蕃部鈐轄包誠昨赴涇原䧟殁有子一十三人長如京使哈魯結族廵檢并岷州一帶蕃部廵檢次内殿承制眀斯納族次右班殿直喜次猛並蕃城族次三班奉職文除凌珪族八人未有職名詔包海特與轉一官除遥郡刺史差充岷州一帶蕃部同廵檢包明等四人各特轉一官差充本族廵檢内包文涇原路有功候奏到仍别與推恩斯結木磋等八人特與三班借職差充同廵檢先支與請受仍並賜名斯結木磋名忠結星名信結黙名才嘉木錯名良莽布名武濟實木名勇索諾木名强開佐名毅仍令經略司相度以包誠部族人馬作五頭項分擘與逐人管勾包海仍别作一等分擘餘四頭項將包忠等八人分擘在包明等下同共管勾人馬數目及包忠八人如何分擘於包明等四人族下充同廵檢名目開析以聞太原府地震有聲同管勾陜西路銀銅坑冶鑄錢許天啟乞將銅錫條内銅一百斤權减作七十斤比金一兩理賞金部言元祐七年四月六日已有此指揮欲依天啟所乞從之法冊紹聖四年六月二十七日聖㫖今追附本月日是月樞宻院言涇原路經略司奏凖朝㫖令諸路帥臣隂為持重安靜之計而明行文字指揮令諸將整齪兵馬為大舉次第候得朝㫖即㑹合前去見依朝㫖施行慮諸將謂是的確事機不敢漏泄却致西人不知預不㸃集使自困敝今相度於七八月中下旬從本司兩次遣官詣管下將分或三兩将或逐將聚在一處教習量支酒食犒設便令休息不惟可以鼓作士氣凖備防秋使喚兼攻討聲勢愈更張大決可使西人取信多方備我自取困敝貼黄稱如可采乞遍下諸路施行河東路經略司奏本司已牒鄜延等路經略司於七月半間六路兵馬會合深入西界平蕩巢穴及闗都總管司差發下蕃兵馬赴河外軍馬司交割凖備使喚并牒軍馬司計度軍馬安泊之處器用等一一足備候諸路會合約定月日委統制官分布頭項仰候見行下行兵之日即取徑路深入賊界毁覆巢穴又牒知麟州王舜臣等并劄付諸將依此指揮施行反牒轉運使計辦合用糧糗軍須等去訖詔令陜西河東逐路經略司詳逐路措置從長相度施行楶以紹聖四年六月二十九日具奏其報下必在七月上旬今附六月末七月癸丑熙河蘭岷路經略司奏新寨畢工賜名平西寨即青石硤也差監押廵檢各四員監當一員六月二十二日賜特支三省樞宻院同呈籩江寨奏畢工又同呈章楶乞李忠傑父子赴本路招納上昨許以秋間召章惇督布將上上意終不許曰恐走失布曰走失恐未肯爾熙河一路數州皆有田宅牛馬富盛少比但恐以號令反復爾上曰號令何可爾許將蔡卞皆曰招納未必有效上遂令且已布與林希再對上又及之頗訝數進擬因言忠傑以疑似得罪又未得般家欲且與移京西就便般家上欣然許之翌日詔李忠傑徙潁昌鈐轄世恭徙汝州支装錢百千及坐船令熙河如法津置家属赴任所詔許舒州團練副使循州安置吕大防歸葬始大防卒於䖍州四月十六日上聞之曰大防何至䖍州及其家請歸葬即許之議者由是知痛貶元祐黨人皆非上本意也王鞏甲申雜見云朝請大夫潘适為渭州通判時涇原帥吕大忠被召問邉事既對哲宗語吕曰乆要見卿曽得大防信否對曰近得之上曰安否又曰大臣要其過海朕獨處之安州知之否對曰舉族荷陛下厚恩上曰有書再三説與且將息忍耐大防外為人所賣候二三年可再相見吕再拜謝退而喜甚因章睦州召飯詰其對上語吕盡告之既至渭語潘潘曰失言矣必為深悔後半月言者論其同罪異罰遂有循州之行既死上猶問執政曰大防因何至䖍州吕後請歸葬獨得㫖歸哲宗簡在深矣嗚呼帝王之度非淺識可窺也潘過髙郵語余如此今以此為據增入其地已附三年七月十二日大忠加職時并四年二月二十八日大防貶循州時甲寅寳文閣直學士李南公請將江寜府等九十餘處繁難録事参軍許差奏舉人從之御批契勘入内使臣自来縁求内中諸殿閣祇候止是希冒逐時非汎恩例及本家囬授骨肉恩澤仍有歴仕嵗月未深已轉充近上名目者顯属僥倖可依下項應入内使臣差充殿閣祇候到位實及三年方許將骨肉恩澤及非汎恩例囘授仍並隔磨勘其非汎特㫖改轉者不拘此制自今年正月一日後為始御集七月三日下曽布録作六月盡日今從御集曽布林希同呈御批因言陛下肅清宫闈如此可謂英斷上曰黄門以下理三十年磨勘但營求入殿閣祇候便轉資太僥倖布曰不獨如此如皇太后嵗得八人恩澤及外家者無幾上曰太后近日不如此布又言陛下於宫禁裁抑僥倖外庭尤宜留意士類進退之際所繫不輕近聞有詔舉御史而蔡京與數外議以為卞在政府京何可數舉言事官上曰召對方除布曰雖如此願除擬之際更賜留意審察兼聞林希言有欲舉林自者此人固陛下所知何可在言路上曰不聞希曰聞方經營爾希又曰近日周秩自淮南移京西衆議恐其過都遂留上曰無此議布曰衆論恐如此爾此人儇薄亦恐不可在要地上曰秩曽言鄭雍上舊不以秩論雍為然今似與之布曰臣累言臺諫給舍皆耳目之任今以蹇序辰軰充之嘉言讜論何繇至陛下之耳非所以廣聰明之道也希遽曰臣唯乞陛下勿以執政所恱者為言事官公選正直之士非朋附執政之人為之則為有補布曰臣累曽陳此論以謂言事官不可但用執政所喜之人願陛下留意執政所喜布盖專指蹇序辰也周秩自淮南運副移京西在六月十六日今附此丁巳新知通州朝奉大夫直龍圖閣崔公度管勾崇禧觀從其請也尋致仕遂卒公度卒在八月十日舊傳云公度起布衣卒無所施設元祐中不免附㑹新傳削去朝奉郎直龍圖閣權知陜州游師雄卒戊午詔知通逺軍康謂詣平西寨界至青石硤以来打量堪耕種地土都計若干頃畝可以招置得弓箭手若干人數置籍拘管一面措置召募弓箭手住佃仍具以措置次第以聞六月二十二日當考庚申侍御史陳次升言風聞鍾傳行下陜西涇原等路令將軍糧米舂成白米并一色小豆支與諸軍却减下斗數按傳妄作不遵條例尚書省勘會曽降指揮下陜西轉運司舂變浄米即不令减數支遣若留充出界齎糧最為輕便詔陜西轉運司將見舂變到米過軍行出界即相度量行折數支給詔吳執中韓粹彦鮑朝賔王繹張逄何執中謝文瓘石嗣慶曽孝藴可並令閤門引見上殿御集七月九日當考此九人召對因由吳執中八月四日以朝散郎詳定敕令所看詳利害文字除提舉河北西路常平韓粹彦七月二十七日以衛尉寺丞除京東東路提舉常平八月二十四日以承議郎為司勲員外郎鮑朝賔八月四日以通直郎新權知永州除兩浙提舉二十八日改淮南東路王繹張逄何執中十二月五日以太學博士為諸王府記室参軍石嗣慶八月二十一日以朝散郎除京東西路提舉九月乙卯布録云京卞引家彬石嗣慶曽孝藴八月二十八日以發運司凖備差遣除兩浙提舉辛酉上批沿汴兩岸房廊除堤面依條留一丈五尺外應地歩並交割與京城所其屋宇地基依祖修盖仍令都大并合干地分使臣舖頭兵員等同共照管兼𨽻本管所割御集十日事癸亥太中大夫寳文閣待制知杭州韓宗道卒甲子内中遺火此據御集殿中侍御史陳次升言臣伏聞今月十三日夜禁中遺火者竊以災異之来必有所因自古聖帝明王徳雖甚盛世雖甚治必恐懼修省肅祇天戒故祖宗以来聖徳可謂盛矣治具可謂修矣每遇變異常恐其不逮内則小心以求諸已外則下詔以求直言伏望聖慈追而行之上答天變下逹民情儻愚者之言或有一得庶㡬聖政有補萬分不勝幸甚中書舍人蹇序辰言吏房送到蔡肇除太常博士詞頭按肇本從王安石學及元祐間群姦用事凡安石所論著建立悉遭詆毁肇於此時不能守節顧義遂附會軾轍忘其舊學軾轍喜其背師附已遂擢寘黄本書局由是為清議所棄紹聖初與舒煥李格非等俱補外任已而獨用肇為正字復因言者論列寝罷則今日除授其班品乃在正字之上不當前後自為異同况太常禮樂之司博士與聞議論由此可以循致顯塗當操行純一守正不撓之人以稱所任肇與除寺丞禮部言今後遇僧職有闕所出試題以大議七道墨義三道考校通取文理優長從之乙丑詔降授左衛將軍駙馬都尉韓嘉彦朝参畢歸主第從嘉彦之請也戊辰權吏部尚書邢恕兼侍讀權刑部侍郎李琮為寳文閣待制知杭州試大理卿周之道權刑部侍郎秘書少監安惇權吏部侍郎著作佐郎國史院編修官周穜充崇政殿說書殿中侍御史陳次升言穜貪汚卑猥跡状甚明姦佞傾險清議不與自去年屢有進擢不協公議臣嘗論奏陛下付之有司考實悉如臣言特與放罪且臣嘗為刑部郎官伏見刑部斷例有受寄財物輙費用者所犯杖罪遇恩特㫖衝替穜擅用張綬供給等錢計會弟秩出文帖以寄還為名支付梢工却令手分収取文帖三年並不報知致綬論訟事發方始寄囬澧州所為如此無異於盗原情量重豈止與受寄財物輙費用者為比乎設使就輕姑以受寄財物輙費用論猶有徒罪比之前例衝替有餘朝廷特與放罷臣去年累章弹奏慮煩天聽不敢再三况今日進講經筵在帝左右宜得正人端士則陛下日聞正言見正行而貪婪傾佞之人豈可以充是選伏乞斷自聖衷追寝成命以允公議不聽次升又再言之穜卒罷說書鄜延路經略使吕惠卿言近據諸處探報西賊㸃集人馬欲侵犯本路白波流等處合依前降朝㫖出路牽制及乘間進築今踏逐到開光堡正當西賊来路下臨無定河至綏徳城克戎寨相約三十餘里東可以照應天山等處西可以控扼原平􅒎把嶺一帶賊馬并對境地名杏子河東山有寨地可修一城三面各有大溝四面有大河下面石脚係寨門順寜兩寨之中西與威戎城接連有地名羅渠谷嶺上可以創修一守禦大寨見委官相度請從本司一靣擇利修築從之九月壬申可考御批入内押班馮世寜藍從熈今月十三日夜内中救䕶遺火有勞及統部親從官等出入禁中别無踈虞可特各與使額上轉一官馮世寜除宣政使藍從熈除宣慶使御集七月十七日事世寜從熈辭免降詔奨諭仍各賜銀絹五百兩匹御集七月二十一日今并書又批内中使臣各依此推恩内該轉資者並不隔磨勘劉友端蘓珪黄經臣李瓌楊日言王通賈祥梁昶尹球任𧦬黄汝賢梁道淵楊廸王逵何景王存劉永逹康弼吳庠各轉一資内劉友端更與减三年磨勘黄經臣王逵何景各更與减二年磨勘李翊與减三年磨勘朱祐之梁昭慶江有度李石劉逢特與各减五年磨勘張奭徐彦李敏各减七年磨勘依條比折年月髙震黄洙黄式與减五年磨勘依條比折年月祇候殿頭楊景祇候内品譚稹與各减二年磨勘徐彦與减五年磨勘餘依已得指揮御集七月二十一日下己巳詔罷作北郊竢先罷合祭於圜丘乃行先是有㫖遣近習督修北郊帷宫限八月以前畢三省遂下户部作北郊凖備遣官諸路剗刷錢帛及製造祭服并儀衛法物甚急忽降此詔許將謂曽布曰此盖失於先禀也十二月末蔡蹈云云庚午太史奏火入輿鬼主賊在君側宜備之上遣中人召太史詰之對曰䜛慝之人皆賊也惟親近正人修徳乃所以備之此據曽布日錄天文志七月丁卯熒惑犯鬼宿西北星主執法者憂庚午入輿鬼丙午犯積尸氣主將臣憂與布錄不同當考光禄卿程嗣恭為直秘閣知揚州壬申權兵部侍郎黄裳為試兵部侍郎鴻臚卿吕温卿為直秘閣權發遣江淮等路發運使秦鳳路提刑陳敦夫言捕賊盗給賞官司故為留難乞重其責大理寺立到告捕獲強盗應給賞轉資而官司無故留難者杖一百從之詔大程官承發内降并入進及已得㫖闗録三省文書輙私封發及以示人者徒一年五百里編管贓重者以不枉法論許人告捕賞錢三十貫新無先是樞宻院奏事上曰中書録黄文字大程官輙以示人有闗防否曽布及林希對曰此軰多以轉官及除授差遣報人求貨賂爾二府文字往還亦多實封但恐不免私啓封以示人當更勘會如未有刑名約束當立法上曰當嚴為約束布希退以諭三省遂立此法乙亥幸上清儲祥宫丁丑御批内中遺火勾當内東門司官等有失提舉可依此施行勾當内東門司劉有益降一官更罰銅三十斤會通門上召使臣馮瑀史世康容彭年各罰銅三十斤御集七月二十六日戊寅詔孫路奏乞築灰家觜寨其令路先檢視委有良田千頃地利經乆可足戍守之費不煩朝廷饋餉即依所奏施行六月十六日戊戍環慶始具奏又詔鍾傳相度卓囉該珠一帶攻守之計布録六月二十二日甲辰九月二十二日壬申可考皇城使成州團練使王殊為東上閣門使尋罷勾當皇城司差兼提舉中太一宫集禧觀事太一集禧在八月八日今并此或並削去衛尉寺丞韓粹彦提舉京東東路常平尋改司勲員外郎勲外在八月二十四日
