body:
  text: 續資治通鑑長編卷一百一宋李燾撰仁宗天聖元年八月乙未以鹽鐡判官侍御史劉平為尚衣庫使環慶路鈐轄兼知邠州初真宗欲用平丁謂乘間曰平出將家第宜任邊耳於是太后思謂言故有此命屬羌敏珠爾瑪爾默族數反覆平潛兵殺數千人以功領賔州刺史討敏珠爾族不得其時今皆見于此當考募京東河北陜西淮南民輸薪芻塞滑州決河又發卒伐瀕河榆柳有司請調丁夫上慮其擾民故以役兵代焉丙申德音降天下囚罪一等杖以下釋之東平監所廢牧地聽民請佃本紀及志並云始廢東平監誤也天禧五年正月監已廢庚子出左藏庫絹十萬下陜西緣邊川軍市糴糧草壬寅詔升朝官準御札舉官歲毋得過三人乙巳太常博士曹修古為監察御史孔延魯劉隨並為左正言先是龍圖閣直學士兼侍講户部員外郎馮元主判諫院於是以印送隨等延魯朂子初為寧州軍事推官數與州將爭事有蛇出天慶觀真武殿中一郡以為神州將帥官屬往奠拜之欲上其事延魯徑前以笏擊蛇碎其首觀者初大驚已而莫不歎服後知仙源主孔氏祠事孔氏故多縱放者延魯一繩之以法上言廟制卑陋請加崇飾從之修古建安人上四事曰行法令審故事惜財力辨忠邪辭甚切至丙午命侍御史知雜事薑遵同放天下欠負甲寅有芝生於天安殿柱召輔臣觀之退奉表稱賀乙卯詔羣臣就觀監察御史鞠詠言陛下新即位河決未塞霖雨害稼宜思所以應變災臣願陛下以援進忠良退斥邪佞為國寶以訓勸兵農豐積倉廩為天瑞草木之怪何足尚哉先是錢惟演自河陽赴亳州因朝京師圖入相詠奏惟演憸險嘗與丁謂為婚姻緣此大用後揣知謂姦狀已萌懼牽連得禍因出力攻謂今若遂以為相必大失天下望太后遣內侍持奏示之惟演猶顧望不行詠語左正言劉隨曰若相惟演當取白麻廷毁之惟演聞乃亟去實録國史惟演傳並不記惟演自河陽赴亳州乃云在河陽踰年請入朝加平章事判許州未即行冀復用侍御史鞠詠奏彈之始亟去按惟演乾興元年十一月知河陽天聖元年六月徙亳州七月自河陽徙亳州因朝京師惟演圖入相蓋元年七八月間也其自亳州來朝即加平章事則天聖三年十二月此時鞠詠已罷臺職矣實録正史皆誤今不取詠本傳載論奏惟演在觀芝前按劉隨以八月十四日始除諫官乙卯二十四日也今附論奏惟演於觀芝後庶不失實事馮拯病太后有復相王欽若意欽若時以刑部尚書知江寧府上嘗為飛白書王欽若字適欽若有奏至太后因取字緘置湯藥合遣中人齎以賜且口宣召之輔臣皆不與聞己未欽若至國門始命中書徙知潤州光祿卿王隨代欽若隨在江寧會歲大飢轉運使移府發常平倉米計口日給一升隨置不聽曰民所以飢者由並兼閉糴以邀高價耳乃大出官粟而私價遂平他郡計口以糶者不能自足輒多流死遣內殿承制閣門祗候劉永崇等與八作司分詣八廂治水口凡權豪邸第覆壓占庇填閼不通開封府察舉之以權開封府判官侍御史俞獻卿為陜西轉運使先是宰相連進數人不稱旨既而獻卿在所擬中上曰此可矣即命獻卿往時邊吏多因事邀功涇原路軡轄擅於武延川鑿邊壕置堡寨獻卿度必招寇亟檄罷之未幾賊果至殺掠將士塞所鑿壕而去武延川事更須考年月詔補蔭京朝官監當六年無贓私罪者與親民嘗坐贓私者聽旨庚申王欽若始入見九月丙寅馮拯罷為武勝節度使檢校太尉兼侍中判河南府欽若守司徒兼門下侍郎平章事昭文館大學士拯自還京疾益甚上遣使諭以亮隂不克問疾賜白金五十兩拯叩頭稱謝五上表願罷相於是遣使即卧內賜告及旌纛又遣內司賔撫問還奏其家儉陋被服甚質太后賜以衾裯錦倚屏然拯平居自奉侈靡顧禁中不知也為相氣貌嚴重宦者傳詔至中書不延坐工部尚書林特嘗詣第纍日不得通白以咨事使詣中書既至又遣堂吏謂之曰公事何不自逹朝廷卒不見特大愧而去欽若再入中書謂平時百官敘進皆有常法為敘遷圖以獻冀便省覽然欽若亦不復能大用事如真宗時矣同列往往駁議欽若不堪曰王子明在政府日不爾也魯宗道曰王文正先朝重德固非他人可企公既執政平允宗道安敢不服己巳詔臣僚凖詔所舉朝臣武臣為邊上知州並令赴闕磨勘取旨其有私罪曽降差遣及資遣者罷之京東西路先配率塞河梢芟數千萬期又峻急民苦之王欽若召自江寧見其事言於上曰方勤農豈可常賦外復有追擾甲戌詔州縣未得督發别候旨戊寅詔輔臣於崇政殿西廡觀馮元講論語並賜御飛白書辛巳詔所舉官未改轉而坐贓者舉主免劾癸未中書言近歲三司積下勾磨帳籍頗多至有因循之失而官物遂無所歸欲令三部副使催督送司以歲月為次仍令舉判開折司提舉具每月逐部所磨帳籍以聞從之減鳯翔府歲造船以市木優民也賜滑州修河役卒緡錢丁亥詔諸路糴場以濫惡高估入官許人陳告百石者全給百石以上豫半餘皆沒官戊子以度支副使户部員外郎王臻為賀契丹生辰使內殿承制閣門祇候慕容惟素副之權户部判官太常博士直集賢院同修起居注程琳為正旦使右侍禁閣門祇候丁保衡副之時契丹主在幽州朝廷以為疑琳還奏彼嘗虐用其民恐叛不服特以兵來厭伏耳琳正傳誤以契丹在幽州為乾興元年今改之惟素德豐子也保衡未見庚寅燕崇德殿吏部流內銓請自今試判每道刑名全者為通七分以下為粗三分以下為不仍於卷首定詞理書劄俱優為上一通二粗或二通一不而詞理書劄並稍優者為中三粗一不二不一粗而詞理書劄俱次或低次紕繆者為下全無詞理者雖刑名通書劄優並入中下其超資加階循資殿年並如舊制其判中下內以二不一粗及詞理書劄俱次紕繆者並注久闕官處從之是月流內銓言判司簿尉有闕七年以上者令録有闕三年以上者幕職有闕一年以上者蓋入官各有路分或非情願致久闕未填今欲以半年闕員處排年月作簿該今日以前特放選人充其積久闕次以違礙并衝替選人充如願就逺地亦只填新簿員闕無本資闕願折資者許支前任或今任合入資敘俸料合入江浙荆湖近地判司簿尉不限放選與常選人並以歷任無贓私罪者填江南萬户簿尉司理司法四十一員闕合入江浙荆湖逺地及西川漳泉判司簿尉例注西川見闕詔幕職如無本資願折資者聽支前任俸合入江浙荆湖近地判司簿尉一任或兩任及三考無贓私罪或三次公罪杖以下許選填江南萬户簿尉司理司法參軍四十一員餘有過犯及選敘合入江浙荆湖河北河東等逺近者自依舊規入江浙荆湖逺地乞注西川見闕宜不行會要九月事今附月末當刪取其要閏九月壬辰朔詔如聞滑州修河役兵暴露作苦而所飯菽粟或㸑未熟乃不可食宜遣使臣往視之甲午詔裁造院所招女工及軍士妻配𨽻南北作坊者並放從便自今當配婦人以妻窑務或軍營致逺務卒之無家者權判流內銓晏殊等言按大中祥符三年東封赦文放選時三千餘人赴集銓司擬注不足始擘畫隔年預使季闕後遂為例常隔年奏明季闕選人有不願注擬之處因循積留不補復更預使向前逺季闕次今來待闕人非多欲今後且用見闕及昨奏季闕更不隔季預剗如或全無本資不願折資者即許指射季闕上簿歸鄉其告身簽符等銓司至時入遞給付候大有選人即旋具奏前季闕發遣從之會要閏九月三日事今刪取其要乙未詔開封府六曹官自今無得差出外其府界檢覆災傷並令下審官院差待闕京朝官馮拯病不能赴河陽己亥卒遣入內都知藍繼宗致奠贈太師中書令諡文懿按己亥日干應在戊戌之下緣命凖為衡州司馬事繫一貫難以中分故此變例而書今仍其舊戊戌冦準卒於雷州初太宗嘗得通天犀命工為二帶一以賜準及是準遣人取自洛既至數日沐浴具朝服束帶北面再拜呼左右趣設卧具就榻而殁癸卯始命準為衡州司馬準弗及知也其妻宋氏尋乞歸葬西京許之道出荆南公安縣人皆設祭於路折竹植地挂紙錢焚之逾月枯竹盡出筍衆因為立廟號竹林冦公祠丁未禁彭州九隴縣採金淮南江浙荆湖制置發運使趙賀言蘇州太湖塘岸壞及並海支渠堙廢浸民田即詔賀與兩浙轉運使徐奭領其事伐石增堤浚積潦自吳江東赴海流民歸占者二萬六千户歲出苗租三十萬發運司占𨽻三司軍將分部漕船舊皆由三司吏自遣受賕不平或數得詣富饒郡因以商販貧者至不能堪其役賀乃籍諸州物産厚薄分劇易為三等視其功過自裁定由是吏巧不得施是歲漕米溢常額一百七十萬石塘路成使以下皆賜奬諭敇書事在二年四月今附見于此張綸傳云疏五渠導太湖入於海復租米六十萬與趙賀傳稍不同本志又云賀同內侍張永和為此役今止從賀傳戊申以諫議大夫知蘄州袁煒為衛尉卿分司西京本路轉運使言煒年高在郡不治故也煒蜀人天聖六年七月附傳壬子發運使請所部六路計民稅一石量糴米二斗五升歲可便得二萬以供京師上曰常賦外復有量糴之名是擾民也不許癸丑詔審官院自今知州軍通判知縣人並引對于便殿河南府太微宫成給田五頃歸義節度使曺賢順遣使來貢方物謝大中祥符七年旌節之賜也甲寅以知順州歸德將軍檢校太子賔客田彥晏為寧逺將軍檢校工部尚書故知保順州田彥曉子承恩檢校國子祭酒兼監察御史知保順州先是彥晏率承恩焚劫寧邊寨知夔州史方發兵擊之窮其巢穴俘獲甚衆追彥晏至七女柵降之彥晏等願還所掠金帛器械且輸粟二千石自贖轉運使刁湛令彥晏等飲血上誓狀奏請止給知州告身勿授刺史詔從之仍拒其粟舍其所負金帛第令歸掠去户口焉湛衎子也張方平作刁湛墓志云將漕夔峽屬施州溪洞蠻首領田彥晏等妄干恩典朝議不從即率宗黨攻破寨柵殺吏民燒官舍掠公私物保險為邊患朝廷命夔施州將討擊彌年無功又特遣武臣禁旅圖深入蠻益拒命乃詔公招輯值彥稠死蠻悔懼有善意而武臣欲自以為功閡隔不為納民告疲于調輸會施州地震山崩人壓死者衆朝廷遣中使致祭問邊事公密疏請罷兵使蠻無疑邊事即定中人入奏未幾武臣內徙以兵屬公遣禆校與蠻要約蠻兵徙集不離近徼公令設次于野從親吏數人坐次中醜類千餘挺刃睢盱左右股栗公毅然召彥晏前曰吾丐若餘生是屬奚為者彥晏懼揮却其衆徐命吏引諸酋歃血立誓因犒飲散遣之歡譟動于山谷曰自丁相公後復見今日矣丁崖相謂昔為夔州路轉運使有功利蠻夷懷之故爾朝命授彥晏歸逺將軍被公璽書褒諭自是黔中妥安按墓志所云遣武臣禁旅圖深入并施州地震山崩人壓死者衆朝廷遣中使致祭且問邊事實録正史皆不書又田彥稠死亦不知彥稠於彥晏始謀若何今並附見當細考乙卯以下溪州刺史檢校右僕射彭儒猛為檢校左僕射其子仕端為檢校國子祭酒知溶州儒猛自言仕漢逃歸誘蠻人作亂遣仕端等殺之故有是命仍降敇書奬諭賜以鹽二百斤綵三十匹丁巳詔技術官干請皇族要官論薦希求恩澤者並以違制論冬十月辛酉朔詔減陜西緣邊軍馬分屯內地以寬轉輸癸亥詔滑州募民入粟又詔蔭補京朝官監當有私罪者及八年與親民嘗坐贓聽裁左班殿直劉舜卿為西京陜府界巡檢捕獲盜賊八百餘人壬申特授閣門祇候劉舜卿未見詔臣僚封事下三司者未得即行先具利害以聞濬兩浙運河增國子監進士解額二十人癸酉門下省言吏部流內銓注擬選人請如舊制過堂押定詔自今磨勘選人前一日以磨勘劄子送中書呈驗然後引對要檢尋過堂舊制江淮荆浙發運使趙賀請南京開封府界瀕河縣輦運公事並𨽻本司從之癸未詔諸州典獄者不先白長吏而榜平民論如違制律榜有罪者以失論捕盜官獲盜而未問者榜毋過二十非盜而輒榜之亦以違制論挾私非理虐害平民至死者論如故殺律王欽若復相監察御史鞠詠嫉欽若阿倚數睥睨其短欽若心忌之會詠兼左巡率府率安崇俊入朝失儀詠言崇俊少在邊有勞此不足罪欽若奏詠廢朝廷儀戊子責授太常博士同判信州實録云詠以不彈百官失儀屢罰俸按詠本傳無此今但從本傳十一月丁酉詔如聞諸州軍多專行配遞罪人使妻子流離道路鮮有生還自今罪當配者並録案坐條具所配地里上刑部詳覆戊戌詔江南東西荆湖南北廣南東西兩浙福建路轉運司自今師巫以邪神為名屏去病人衣食湯藥斷絶親識意涉陷害者并共謀之人並比類呪咀律條坐之非憎嫉者以違制失論其誘良男女傳教妖法為弟子者以違制論和同受誘之人減等科之情理巨蠧者即具案取裁先是知洪州夏竦言左道亂俗妖言惑衆在昔之法皆殺無赦蓋以姦臣逆節狂賊末規多假鬼神動搖耳目漢晉張角孫恩偶失防間遂至屯聚國家宜有嚴禁以肅多方當州東引七閩南控百粵編氓右鬼舊俗尚巫在漢欒巴已嘗剪理爰從近歲傳習滋多假託禨祥愚弄黎庶勦絶性命規取貨財所居畫魑魅陳幡幟鳴擊鼓角謂之神壇嬰孺襁褓誘令寄育字曰壇留壇保之類及其稍長傳習妖法驅為僮𨽻民病則門施符咒禁絶往還斥逺至親屏去便物家人營藥則曰神不許服病者欲食即云神未聽飱率令疫人死於飢渴洎至亡者服用言餘祟所憑人不敢留規以自入若幸而獲免家之所資假神而言無求不可其間有孤子單族首面幼妻或絶户以圖財或害夫而納婦浸淫既久習熟為常民被非辜了不為訝奉之愈謹信之益深從其言甚於典章畏其威重於官吏竒神異象圖繪歲增怪籙祅符傳寫日異小則雞豚致祀斂以還家大則歌舞聚人餕其餘胙婚葬出處動必求師劫盜鬭爭行須作水蠧耗衣食眩惑里閭設欲扇搖不難連結在於憲典固亦靡容其如法未勝姦藥弗瘳疾宜頒嚴禁以革祅風當州師巫一千九百餘户已勒改業歸農及攻習針灸方脈首納到神像符籙神杖魂巾魄帽鍾角刀笏沙羅一萬一千餘事已令焚毁訖伏乞朝廷嚴賜條約所冀防萌杜漸以右羣生故降是詔劉舜卿言西京陜府界山路險惡盜賊所聚請自陽湖渡至三門分置六寨扼其要害從之并入十月初授閣職時都官員外郎知漣水軍鄧餘慶受枉法贓閣門祇候三陽寨主荆信監倉自糴粟入中殿直監興平縣酒稅何承勛監進賢鎮鹽酒稅易著明並自盜官物各貸死杖脊配廣南牢城壬寅詔以餘慶等罪狀申警羣吏癸卯詔吏部流內銓自今轉運使舉選人為京官者更增舉主一人先是兩浙轉運使任臯舉崇德縣令向昱為京官上令中書俟再有薦者乃擢之因著為令會要云向昱以舉主少罷之仍令今後似此者更候兩人奏舉即施行當考凡賦入州縣有籍歲一置謂之空行簿以待歲中催科閏年别置謂之實行簿以藏有司或言實行簿無用而率民錢為擾戊申罷之大食國每入貢路由沙州西界以抵秦亭乾興初趙德明請道其國中不許於是入內副都知周文質言慮為西人所掠乞令取海路由廣州至京師詔可初蜀民以鐡錢重私為券謂之交子以便貿易富民十六户主人其後富者資稍衰不能償所負爭訟數起大中祥符末薛田為轉運使請官置交子務以𣙜其出入久不報寇瑊守蜀遂乞廢交子不復用會瑊去而田代之詔田與轉運使張若谷度其利害田若谷議廢交子不復用則貿易非便但請官為置務禁民私造又詔梓州路提點刑獄官與田若谷共議田等議如前戊午詔從其請始置益州交子務實録食貨志皆云寇瑊請官置交子務按薛田附傳則置交子務乃田為轉運使時所請建瑊守蜀始用田議然成都記載此事特詳瑊議蓋欲官私俱不用交子而田議始終皆欲集私造官為主之今置務實從田議瑊無與也實録附傳正傳食貨志俱誤矣己未降侍御史高辨為太常博士職方員外郎吳濟為都官員外郎太常丞直集賢院胥偃為著作佐郎監察御史王軫為太常博士監兖州漣水光化軍郢州酒稅左正言劉隨罰銅五斤初辨等為開封府發解官舉人訟其考試不公上以得解進士三十八人策論令祕閣封彌卷首送翰林學士晏殊覆考殊言舉人作訟以覬覆考頗虧士風因聽止取訟者試卷看詳辨與濟偃乃坐擅拆舉人卷首擇有名者居上軫為封彌官而不以聞隨坐舉人以䇿辭相授隨為巡鋪官而不能察故有是命偃長沙人也吳濟未詳劉隨正傳乃云隨坐此責監濟州稅與實録不同正傳蓋因朱祁墓志按隨後數論事未嘗出也今從實録大理寺丞知彭山縣盧察乞官襄州以掃灑墳墓上問察家王欽若對察父多遜故宰相謫死朱崖上惻然許之後贈多遜尚書亦由察請內殿承制閣門祇候鄧雅言奉詔知宜州有子試校書郎齊參乞對換班行於嶽州側近監當照管家屬上以雅曽經溪洞差使今復逺任特從其請不得為例會要十一月事十二月辛酉詔麟府路軍馬司凡唐龍鎮所報公事其為處置之癸亥大理寺丞路坦特追官勒停坦前為餘杭縣令在官不治又嘗作詩贈押司録事提點刑獄司上所刻詩石本坦既坐謫而轉運使嘗薦坦改官并劾之鄜州鈐轄階州刺史劉寶為右監門衛將軍隨州刺史寶私役兵以橐駝為商旅載物法當追官勒停上特寬之江州民陳藴聚居二百年食口二千而藴年八十且有行義州以聞上曰良民一鄉之表旌之則為善者勸矣甲子授藴本州助教辛未詔吏部流內銓選幕職官知大縣闕京朝官故也丙子詔駙馬都尉自今毋得於清要權勢官私第往還仍令御史臺察視之辛巳涇原路副都部署王謙言密克默特下杏家族都指揮使杏友信都監吹濟鄂羅克等三百九十八人納質子內附詔補杏友信為軍主吹濟鄂羅克為副軍主甲申契丹遣彰武節度使蕭昭古靈州觀察使劉彛範來賀明年正旦乙酉樞密院言在京歸逺六指揮大中祥符六年以軍士亡耗併為三指揮今欲復增一指揮從之是月詔御史臺主簿多是資序合入大理寺丞著作佐郎除授之時並理光祿寺丞及至三年無遺闕却於本資止依敇轉入朝官有此升降不等自今更不理光祿寺丞資敘只守本官仍支與前任請受候三年滿無遺闕依元入官資敘與京朝官如有遺闕公罪兩度以下奏取指揮公罪三度以上及私罪不以度數並送銓依舊幕職州縣官資敘注官是歲天下上户部主户六百一十四萬四千九百八十三口一千九百五十一萬一千八百四十四客户三百七十五萬三千一百三十八口五百九十四萬四千一十五
