body:
  text: 續資治通鑑長編卷二百四十二宋李燾撰神宗熙寧六年春正月乙巳朔不受朝己酉管勾監修昭孝禪寺入內供奉官宋用臣遷一官鄧守恩減磨勘五年故事督工作止加賜上以修奉祖宗陵寺故特遷官左諫議大夫天章閣待制判北留司御史臺郭申錫為給事中致仕中書言欲以市易務上下界商稅院翰林圖畫院雜買務雜賣場諸宫觀真儀法從南郊太廟家事府司檢校等庫都亭懷逺驛三糧料院內軍器五庫𨽻都大提舉諸司庫務上批內軍器五庫官物儲積多在宫禁及收內降物兼自有提舉提點官可不𨽻提舉諸司庫務餘從之王安石請增三司吏祿上批增祿費多所減吏又未可遽減令安石再相度安石言祿不可不增又言不患乏錢之理安石以為初市易行倉法用萬八千緡以故收市例錢九萬緡方以次修法市例所收未有紀極而團併綱運減省上供所省衙前酬奬止京東及成都兩路嵗收已一百萬緡即吏祿不患少可知上從其請安石又言天下吏人當盡為之賦祿上以為然曰但患役法未就未有錢應副耳朱史載此事於三年八月二十八日失先後之序今依日録仍見於此辛亥詔奉僖祖為太廟始祖遷順祖神主藏夾室孟夏祀感生帝以僖祖配始從王安石之議也中書以五年三月八日戊子建議四月三日壬子降詔令共議十一月二十三日戊辰既從中書所議至六年正月七日辛亥始遷二祖舊紀六年正月七日辛亥方具載中書所議即云奉僖祖為太廟始祖遷順祖藏夾室孟夏祀感生帝以僖祖配新紀但書二祖削中書所議及僖祖配感生帝實録亦止書遷二祖新紀蓋因實録也今考究前後别書仍明著始從王安石之議龍圖閣待制兼樞密都承旨同羣牧使曽孝寬為河北路察訪使權發遣開封府界提點縣鎮公事太子中舍趙子幾副之上初欲用李承之副孝寬王安石請用子幾上曰子幾性率不如承之詳密安石曰承之定兩浙役法如何或言亦有役錢不均處上曰諸處大抵如此恐不免小有不均安石曰遣承之固善然子幾亦不見性率如河東所減役錢十餘萬在府亦無過失上曰子幾排保甲倉卒致驚擾安石曰排保甲適以陜西事人或自驚擾出於意外豈可歸咎子幾也上卒用子幾中書門下言閣門看詳禮院所定同天節上夀班臣等參詳欲乞自今樞密使副宣徽三司使殿前馬步軍副都指揮使已上共作一班止進酒一盞其進金器馬並從宰臣體例進表其親王宗室使相至觀察使駙馬都尉管軍觀察使已上皆即赴紫宸殿依本班序立上夀更不赴垂拱殿餘並依舊制從之先是管軍觀察使已上及親王駙馬都尉並於垂拱殿以官序髙下各班上夀酒至八九盞及禮畢而日已晏外朝有班者仍詣紫宸議者以為近瀆故改之樞密使文彥博言臣近言市易司遣官監賣果實有損國體斂民怨乞寢罷至今涉旬未聞施行切慮陛下以事小不恤而臣愚以所損甚大決不可為且京邑翼翼四方取則魏闕之下治象所觀今令官作賈區公取牙儈之利古所謂理財正辭者豈若是乎凡衣冠之家罔利於市搢紳清議尚所下容豈有堂堂大國皇皇求利而不為物議所非者乎斯乃龍斷之事聚斂小臣希進妄作侵漁貧下玷纍朝廷乞賜詳擇於是王安石白上曰陛下近嵗放百姓貸糧至二百萬支十斗全糧給軍一嵗增費亦計數十萬緡以至添選人俸增吏祿給押綱使臣所費又有百萬緡天下愚智孰不以此知陛下不殖貨利豈有所費如此而乃於果實收數千緡息以規利者直以細民久困於官中須索又為兼并所苦故為立法耳彥博所言遂寢不報朱史取去年十一月十二日十三日王安石所言并附此今並依日録見本日丙辰遂州觀察使承錫卒贈鎮寧軍節度使同平章事陳國公諡榮僖辛酉賜荆湖北路轉運使孫桷絹三百桷方經制蠻事舟觸瀨石覆沒僅以身免上閔其勞故賜之癸亥權發遣廣南東路轉運判官許彥先言已牒廣南兩路委諸縣令佐排定保甲其舊置槍手土丁名役乞解放止立保甲一法詔兩路轉運使具槍手土丁自來如何差置教習以聞中書因請令廣南東路轉運司密委官吏就排定保甲遂根括丁口聚散實數具奏以慿立法均定丁米從之此事乃二十八日今并書之當考後來如何均定丁米乙丑翰林侍讀學士左諫議大夫知太平州張瓌為給事中致仕瓌未受命而卒丁卯詔在京市易務勾當公事孫迪同兩浙淮南東路轉運司制置杭州楚州市易務利害以聞詔北江募人築城寨令章惇等優給錢米毋得擾民己巳輔臣同進呈涿州牒言雄州不當令容城歸信縣尉巡歷事樞密院白上朝廷已為北界罷鄉巡弓手今更如此意欲占地轉不遜恐須亦以不遜答之上曰只如常應報不用過當王安石曰甚善北界未必有占地意緣中國亦常言兩屬地合屬中國中國豈有占地意我既疑彼占地彼亦未必不疑我也此據日録二十五日事當考庚午職方員外郎簽書應天府判官趙令鑠言臣應換官補外如在京遇同天節太皇太后皇太后生辰及非次朝賀乞用宗室例許妻入內從之仍自今袒免宗室婦在京亦聽入內中書言御藥院申昨有旨諸路冬夏嵗賜藥盡計直及降方書下轉運司就合賜之而故事嵗差使臣齎賜緣邉將帥因得傳宣勞問今既有法所差使臣恐合隨罷禮房以為勞問使臣自當如故事不廢餘依所定上批三路緣邉舊差使臣本以賜夏藥故因勞問今藥既不賜獨往撫問意頗無謂况所賜藥並題名用寶恩禮甚重今若止令轉運司合散恐失事體昨祕書丞何琬止以川峽路逺艱於時至故乞止賜方書今三路地里既非川峽之比遣使勞賜可且依舊餘依何琬所請王安石為上言欲興起治道須變得風俗今誕謾之俗初不改恐無由興起治道上曰人情千變萬化苦難知安石曰人情要保其往誠難若是誕謾已著不能眀示好惡繼以懲責風俗如何肯變上好信則民莫敢不用情民所以不用情必是陛下好信不篤故也上曰前後為誕謾絀逐亦不少只是却要審安石曰此事誠要審然既審之後不加誅罰以當其罪何緣肯變緣作忠信甚難作誕謾甚易作忠信獨人主所利於衆人皆不利若誕謾即內外更相朋比人各濟其私欲是誕謾於衆人為利於人主乃不利以其衆人不利所以作忠信難以其衆人所利所以作誕謾易不然忠信是美名誕謾是惡名人何故不避惡名而捨忠信為誕謾上曰管仲奪伯氏駢邑三百沒齒無怨言若審處而當罪小人亦自服安石曰管仲以當理而人不怨誠可稱然管仲豈能勝盤庚周公盤庚周公乃不能使人不怨豈是不能審處而當罪蓋有使人無怨之道然而小人妄怨不害為當理若為小人妄怨便以為所處不當理如此則盤庚周公亦為有失不足法上曰鞠真卿素倔強及案江西事當罪便不敢倔強安石曰緣陛下切見真卿罪狀真卿更無人黨助所以不敢真卿在先朝所以倔強者蓋持大臣短長故大臣驕之至此陛下若遇姦人人人能如鞠真卿即誰敢不服今陛下察人不能皆如察真卿故未肯退聽爾小人情狀以市井事觀之即可見市井賣百錢物只著價二三十錢必忿怒若著價三五百錢亦必妄為忿怒邀厚價若恰與百錢即必便肯成交易為能知其情狀故服也今遇小人多不當其情狀此所以不服更紛紛也人情雖難知然亦有可見之道在窮理而已壬申權樞密副都承旨西上閣門副使張誠一言垂拱殿常朝先內侍喝都知以下至宿衛行門等十八班起居次通事舍人引宰臣樞密使以下大班入次親王次侍衛馬步軍都指揮使以下次宗室使相以下十班入方引見謝辭或遇百官起居日自行門後通事舍人引樞密使以下次親王使相以下至刺史十班方奏兩巡使起居引兩省官入次閣門使引宰臣以下大班入起居畢百官出絶兩省班出次兩巡使出中書樞密院方奏事已是日晏况大班本不分别丞郎給諫臺省及常參官乞遇垂拱殿百官起居合親王以下十班為四班親王為一班馬步軍都指揮使為一班宗室使相至刺史為一班使相至刺史為一班其垂拱殿常朝紫宸起居日親王使相巳下班並依舊從之賜許州民賈士眀錢五十萬先是修諸宫觀皆用黃丹燒硫􅲚瓦士明獻瓦法代以黑錫頗省費故賞之察訪章惇言懿洽州蠻殺招諭侍禁李資詔遣入內供奉官馮宗道往荆湖南北路勾當公事及體量蠻殺李資因依以聞後宗道言資泊舟河側蠻輒圍掩殺之乃詔除元造意并下手人許人捕殺與補近上班行仍第行賞餘並釋不問資者辰州流人與張翹同獻策故惇遣資將輕兵入蠻境招諭資𥚹宕無謀褻慢夷獠故為所殺李資事用魏泰東軒録刪修泰録具去年十二月是月置潭州安化縣升七星寨為鎮武經邉防云七星寨控海山洞口太平興國中置魏泰云章惇以潭之梅山邵之飛山為蘇方揚光僭所據遂乘兵勢進克梅山建安化縣又令李浩將兵取光僭師至飛山扼險不能度而還以神宗史南江傳六年正月章惇言辰州南江溪洞盡內屬其新歸地自西以北環數千里依險團族甚衆遣官於懿峽富錦黔州分建城寨是月石鑑言峽冨等十七州首領舒光秀等與蠻一千五百餘人納器甲歸眀已勞遣還其地惇又言辰州南江知州管內軍衙首領等各乞納土為王民詔補向永修為西頭供奉官餘補官有差實録但書安化縣七星鎮與南江傳不同當考是年二月癸巳五月癸丑六月丁丑及七年正月丁巳並合參照翰林學士曾布權知貢舉知制誥呂惠卿天章閣待制鄧綰直舍入院鄧潤甫並權同知貢舉二月乙亥朔詔供備庫副使太原府代州路都監蕭士元罰銅十斤府州都監成恭二十斤先是便殿引呈虎翼軍士蹶張武藝疏弱上問出戍所𨽻以二人對故坐責七年正月士元分畫地界右千牛衛將軍叔婼言姊適侍禁王益廣赴官吉州益廣道病失心刺殺婢繫真州獄以姊無依遣人迎之而貧不能自歸詔真州賜錢三萬津遣仍給驛劵丙子龍圖閣直學士給事中張燾提舉在京諸司庫務燾前知瀛洲遭母喪服除故事起執政以詔近臣以劄子上曰燾近臣冝以詔乃以詔起之禮部貢院言乞依發解條以前次科場明經到省及明經奏名人數同比較係若干人到省取一人奏名外據所剩奏名額並撥添進士奏名即雖到省人數多合格人少亦將不合格明經奏名人額添進士從之丁丑祕書丞崇文院校書朱明之為館閣校勘詔開封府判官梁彥明推官陳忱各罰銅十斤去月十四日宣德門親從官王宣等與宰臣王安石家人從喧競指揮使李師錫擅傳語開封府官行遣而彥明忱不察虛實親從官阮睿本不與喧競亦決杖御史蔡確彈奏開封府官吏曲意迎奉大臣之家望特加重貶故罰及之蔡確疏據陳瓘尊堯餘言兼中書及密院時政記先是安石從駕觀燈乘馬入宣德門衛士呵止之撾傷安石馬安石大怒請送衛士於開封府又請罷勾當御藥院內侍一人上皆從之安石猶不平確奏疏曰宿衛之士拱衛人主而已宰相下馬非其處衛士所應呵也而開封府觀望宰相反用不應為之法杖衛士者十人自是以後衛士孰敢守其職哉上善確言然宰相乘馬入宣德門是非上卒亦弗究也此據陳瓘尊堯餘言請罷勾當御藥院內侍一人不知姓名又不見於它書當考安石自敘其白上語云親從官撾擊坐車及旌斿臣至宣德門依常例於門內下馬又為守門者撾馬及從人臣疑親從官習見從來事體於執政不敢如此今敢如此當有隂使令之都緣臣居常遇事多抗爭曲直臣所以如此者乃為義故豈敢以私事肆為驕騃不遜恐姦人欲以此激怒臣冀臣不勝忿因中傷臣以為不遜臣初所以不敢辨者疑有條制從來承例違越及退檢會乃無條制問皇城司吏亦稱無條制及問體例却據勾當皇城司繳到巡檢指揮使畢潛等狀稱從來合於宣德門外下馬臣初執政即未嘗於宣德門外下馬且宣德門內下馬非自臣始臣隨曾公亮從駕亦如此上曰朕為親王時位在宰相下亦於門內下馬不知何故乃如此安石曰此所以不能無疑欲具劄子乞勘會依條例施行上許之安石又言檢到嘉祐年後行首司日記並於門裏下馬然問馮京則云忘之記得亦有在門外下馬時而文彥博遂揚言云我從來只於門外下馬不知下馬儀制竟何如安石又云中書驅使官溫齊古見堂吏看棚者云守門人自相與言擊宰相馬馬驚致傷損罪豈小一員僚曰我豈不解此但上面逼得緊將奈何齊古以白王圭然齊古者憚入獄置對安石問之乃言不記堂吏姓名安石亦不復以齊古言告上也溫齊古事據日録二月二十八日所載今移入此王銍元祐補録蔡確傳云王安石方用事確揣知上有厭安石意會上元駕出而宫中約嘉岐二王內宴從駕還至禁門岐王馬攙安石先入從者傷安石所乘馬日事送開封府岐王待罪安石堅乞去事未判會確以他事對上忽問岐王從人擊宰臣馬為犯分確忿然對曰陛下方惇友悌以化成天下置上元禁中曲宴以慰慈顔安石大臣亦宜體陛下孝友之意若必以從者失誤與親王較曲直臣恐陛下大權一去不可復收還矣上瞿然驚曰卿乃敢如此言王安石耶自是有大用確意據安石日録并中書密院兩時政記載此事頗詳嘉岐二王從者實未嘗居其間陳瓘論辨亦弗及也不知王銍何所傳聞疑銍增飾之附見當考陸佃所編安石文字有三劄子皆論宣德門事今並附此其一曰臣今月十四日從駕至宣德門依逐年例自西偏門入有守門親事官閉拒不令臣入撾擊臣從人鞍馬從人告訴而臣竊恐成例冇違儀制所以未敢陳奏尋取責到行首司王冕等狀稱自來從駕觀燈兩府臣僚並於宣德門西偏門內下馬却於左升龍門出兼檢到嘉祐八年熙寧四年本司日記體例分明又會問得皇城司吏手狀稱宣德門即無兩府臣僚上下馬條貫尋又令會問自來體例却據勾當皇城司狀稱取到在內巡檢指揮使畢潛等狀稱自來每遇上元節兩府臣僚合於宣德門外下馬切緣臣自備位兩府以來上元節從駕並於宣德門西偏門內下馬門衛未嘗禁止獨今年閉拒不許入而隨以撾擊會問到皇城司又稱即無條貫却只取到在內巡檢指揮使畢潛等狀稱自來合於宣德門外下馬雖據皇城司取到畢潛等狀內所稱如此即與行首司王冕等狀內所稱自來體例不同伏乞聖慈以臣所奏付所司勘會條例施行所有取責會問到文狀謹具劄子繳連進呈取進止正月二十四日臣安石劄子其二曰臣近論奏宣德門西偏門事間已送開封府勘會臣止為自來兩府臣僚下馬有常處而今來皇城司與中書行首司所稱各異理須根究乞付所司定奪使人有所遵守至於禁門中衛之人既見元無條貫遂有止約亦無深罪伏乞聖慈詳酌特加矜恕干冒天威臣無任惶懼之至取進止二月日臣安石劄子其三曰臣檢御無素乃至私人干犯禁衛惶懼震擾不知所圖方俟得望清光昧冒陳敘伏蒙聖恩曲賜慰諭臣誠感誠恐無任激切屛營之至此林希野史云使相在假或云惠卿多變其事不樂如或云上幸苑中因問諸巨閹閹皆伏地叩頭流淚云今祖宗之法掃地無遺安石所行害民虐物臣等知言出必取禍不敢不言願陛下出安石臣等亦乞逺流海外以示非敢害宰相而為身謀又云宣安石上元乘馬從駕還棘圍中回駕觀百戲相公馬至德左扉將入親事官攢骨朵止之馬勢不止大閹張茂則叱止之遂目親事官執其馭者而毆之曰相公馬有何不可茂則曰相公亦人臣豈可如此得無為王莾者乎安石訴茂則毆傷其馭上使驗問傷狀安石不樂遂求去又云上元雱於看棚有指使輩不伏衛士指約喧閙遂提衛士送開封府即時四人各決杖十七合該降配取旨上方知索開封府案閲之送府令再勘上使使喻鞏彥輔曰不可徇宰相意盡公勘之彥輔亦寬其過指使者罰銅大程官書表司各決二十後遂著令指定下馬處按希所云比它書尤詳張茂則鞏彥輔等姓名合增入姑附注此己卯詔淮南轉運使自今小麥若收糴般運每斗價錢七十以上即折納錢初有旨官吏及坊監諸班直諸軍應給小麥而願給錢者聽至是三司乞下發運司權停運小麥故有是詔詔熙州城下洮河及南北關渡口並置浮橋熙河安撫司言熙州新堡寨合置酒場欲且聽蕃部自募人從之庚辰賜諸王府記室參軍王異紫章服侍講鄭穆緋章服以嘉王頵開府而異穆隨府遷也辛巳司封郎中直昭文館知潭州潘夙為太常少卿初夙為荆湖南路轉運使嘗遣邵州通判賈師熊三以兵丁破蠻寨及郭逵知邵州以三千人攻楊昌透為賊兵追襲至牛脊嶺日暮幾陷沒賴夙遣禆將劉杲引兵救之乃免又遣周士隆丁佐堯以衆深入據要害賊窘遂出降使者言其功如此人至今賴之而夙未嘗自陳故有是命夙為湖南運使乃嘉祐三年六月壬午詔應有虎豹州縣令轉運司度山林淺深招置虎匠仍無得它役遇有虎豹害人即追集捕殺除官給賞絹外虎二更支錢五千豹二千並以免役剩錢充從利州路提點刑獄范百祿請也癸未知廣州光祿卿直昭文館程師孟為諌議大夫再任猶以修城功也乙酉詔司農寺體訪西川艱食州縣如有災傷發常平倉減價賑濟諸路凖此以御史劉孝孫言西川年榖不登諸州米價騰踊人艱食故也上批聞濠夀二州去秋被水今春之食可令監司體量以聞庚寅司農寺言近詔天下出錢免役而永興秦鳳比之他路民貧役重恐非朝廷寬恤愛養之意乞詔諸路提舉司併省冗役以次蠲減常留二分寬剩以為水旱閣放之備上批陜西之民數困科調最為貧弱所出役錢獨多諸路誠為可恤宜依所奏辛卯賜熙河經略司錢三千萬緡以備邉費癸巳上批付樞密院章惇奏富州向永晤亦欲搆變以百姓不從遂止詳此乃知內附蠻酋以其不能擅誅剝之利大底皆懷怏怏所樂歸化者獨部民耳惇等昨乞補置職名太為微薄雖朝廷已加等推恩尚慮未愜所望可令更􅋀相度如合再與推恩仰速具奏所有舒光秀光銀允財元長硤民既不欲復來又其壻已背叛必難遣還舊穴如就辰州各優與一差遣不惟弭患亦自不失恩信未知可否并令疾速相度具奏於是樞密院言臣等已依聖旨令章惇再相度推恩欲乞作朝廷意别轉兩資仍令惇相度舒光秀合與差遣更乞空頭宣命二十道付惇凖備填給舒光銀等差遣上批今若因懿洽等州作過應內附蠻酋例遷兩官深慮啓驕長惡事體未便兼如向永晤輩亦恐難與忠順者一等推恩宜降空頭宣命五十道付章惇令就近相度量輕重以使喚或防守得力為名優與補置此據御集前假十九日事後假二十五日事今并書之當考御集二月十四日上批辰州黔江口新寨與土狑生蠻鬪敵得功兵員可令章惇疾速量功狀大小犒賞厚與支賜外仍具保明聞奏當議越等優與轉資酬奬本處即日兵勢寡弱故須當如此指揮以鼓勇士氣也荆湖南北路見修城寨防托等一行兵員土丁並與特支南北江已歸順頭首特與支賜已上可並定例進呈令馮宗道齎去二事並係御集二月十四日上批今附見與正月末所注南江傳合一處看詳土狑當作狤狑丙申西京永昌陵上宫火焚東神門其後西京言永昌陵都監張保夀不覺察軍士門卒等欲陷十將李榮因致此火會德音乞特貶降安陵康為政熙陵張若谷亦乞量責罰詔保夀為政若谷並勒停保夀追一官保夀等責罰在四月十四日是日王韶克河州新紀係之三月丁未蓋因奏到日今不取丁酉詔以秦鳳路軍馬六分屬熙河路人二萬九千七百二十二馬三千二百七十八駐泊兵一萬三百二十八馬九百四十八土兵一萬八千三百九十四馬二千三百二十並屬熙河路遇有邉事則以涇原將官領本路土兵并山外弓箭手防托為䇿應兵先是析秦州威逺寨以西别置熙河經略總管司命王韶張詵及永興軍路轉運使趙瞻同分定兵馬數至是始條上故降是詔王韶趙瞻等受詔分定兩路兵在五年十二月二十三日今并書右諫議大夫提舉上清太平宫閻詢為給事中致仕詢無傳戊戌以歸明人黃全諫為三班奉職辰州指揮使仍賜銀絹袍帶初洽州蠻李光全等欲連富州村囤為亂全諌執送官故賞之其後章惇言賞全諌太優恐難繼其次三人止乞與殿侍上以問王安石安石曰不然則安能使人人踊躍有趨賞之心而懿洽不敢出而求助陛下每恐賞輕重不等即有人觖望如漢高祖功臣未有受封者先封趙子弟四人若畏功臣觖望即不敢如此不敢如此即何以收趙人心今賞全諫正是封趙子弟之意人主作威福若使人臣各自較量厚薄操劵以責人主恐人主不可勝責故太祖責川班援例求賞盡誅之所以銷人臣悖慢之氣而長人主威權若能如漢高祖收趙子弟即人臣有觖望為亂者厚賞令衆誅之而已上極以為然此事見日録五月三日今移附於此己亥詔荆湖北路提舉司撥昨常平本度僧牒五百與轉運司充軍費權判司農寺李承之言常平法並宜作一料給散詔司農寺令諸路具利害以聞辛丑權度支副使刑部郎中集賢殿修撰沈起為天章閣待制知桂州代蕭注也注在桂州自特磨至田凍州酋長逺近狎至注問其山川曲折老幼存亡甚得其歡心故李乾德動息必知之然有獻䇿平交州者輒火其書會起言交州小醜無不可取之理乃罷注歸此據注本傳十一月甲子用注遺表推恩當并此其後起更為征討計卒以此敗初議用起馮京言起前為陜西轉運使慶州兵亂起閉長安城不敢出人疑其怯上曰賊到城下城中又無人守備安可不閉城此非起過也王安石曰起在陜西誠無大過去江寧時臣嘗奏以為可留衆論所以攻起尤􅋀者蓋以起嘗辨正王韶李師中曲直故為人所惡陛下牽於衆毁故不欲留起耳詔開封府界提點司昨引見保丁該免春夫一月如當時免夫日分不及一月即候將來差夫各與通計免之檢正刑房公事李承之言自今試刑法人如經再試當推恩者惟上等依例升擢外餘並比較前得恩例併計施行或昔重今輕者更不推恩從之先是起居舍人直集賢院章衡等使契丹還言罷河北沿邉鄉巡弓手非便於是提點刑獄孔嗣宗復以為言上曰此失之在初也今若復置彼必益兵相臨遂至生事不能已不可不謹既而王安石因嗣宗議修滹沱河枉費且壞塘泊忤安石意遂歷指嗣宗懷姦曰嗣宗前論巡馬過河云敵驕蹇須得奮不顧身以忠許國敢與敵抗之人乃能了邉事此蓋專為張利一逰説也昨見同時奉使者言罷鄉巡非便故嗣宗亦言其非便陛下試思近嵗使契丹人亦嘗有連狀言邉事者否如章衡是憂國好言事者否天下事又豈特此一事可言此陛下當深察人臣情態也元祐史官云孔嗣宗章衡等使還言此紹聖史官因之又云嗣宗奉使契丹與章衡等連狀按嗣宗未嘗為北使也亦未嘗與章衡等連狀也但相先後有言二史官俱失之王安石日録於六年五月二十二日載此事甚詳紹聖史官專以日録為主其筆削乃如此抵牾亦太疏矣今仍采日録刪修庶不失事實延州言順寧寨蕃部逃入西界蕃官劉紹能以兵襲逐不及反捕西人為質上曰自許夏國修貢以來近邉逃背生口皆送還意極恭順今紹能即以兵出界人情必生憤激可嚴戒邉吏自今毋或生事壬寅知許州觀文殿學士吏部侍郎韓絳為大學士知大名府仍詔入覲遇大朝會綴中書門下班出入如二府儀詔乃二月十一日今并書判大名府淮南節度使守司徒兼侍中韓琦判相州從所乞也琦乞解旄鉞不許詔兩浙路提舉鹽事司未得劾諸州軍虧失鹽課且以課利增虧及違法重輕分三等以聞先是王安石以病謁告彌旬乃求解機務且入對上面還其章安石固求罷上不許曰卿每求罷朕寢食不安朕必有待遇卿不至處且恕朕豈宣德門事否安石曰臣所以辨宣德門事正恐小人更以臣為驕僭事既明白又復何言上曰令子細推究實無人使安石曰臣初豈能無疑既已推究復何所疑上曰卿如此必是以朕終不能有成功久留無補所以決去安石曰陛下聖德日躋非臣所能仰望後來賢俊自有足用者臣久妨賢路又病所以求罷非有它上曰朕置卿為相事事賴卿以濟後來可使者何人孰可以為相者卿所見也安石曰豈可謂無其人但陛下未試用耳上曰卿頻求出於四方觀聽不美又引古君臣相終始者曉譬安石安石曰臣前所以求罷皆以陛下因事有疑心義不敢不求罷今求罷真以病故非有它且古今事異久任事積怨怒衆一旦有負敗亦纍陛下知人之明且又病若昧冒必致曠敗上再三曉譬安石乃乞告將理既而上又召安石子雱再三問勞又令馮京王圭喻旨於是安石復入視事留身上謂安石曰必一成安好安石白上猶病昏暗煩憒後來有可用者陛下宜早甄擢臣恐必難久任憂責上曰雱説卿意似不專為病朕亦為雱説必為在位久度朕終不足與有為故欲去耳安石曰陛下至仁聖臣豈有他但後世風俗皆以勢利事君臣久冒權位不知避賢即無以異勢利之人况又病必恐有曠敗致纍陛下知人之眀所以力求罷也陳瓘論曰雱聖其父父賢其子而謂在廷之人皆小人也君子小人自有公論無足辨者至於造神考之言曰度朕終不足與有為則是託訓以薄君父也可不辨乎御集上批夔州路平蕩夷人了當遣入內東頭供奉官勾當內東門司劉惟簡往彼傳宣撫問及賜得功官吏將校軍兵土丁等特支茶藥此據御集乃二月事但無實日又云孫桷已下支賜茶藥將校軍兵土丁等特支依早來處分按孫桷五年閏七月移湖北漕九月改知荆南尋復故此時不在夔路又所稱夔路夷人當是李光吉等三族然三族於四年三月已安集不應踰一年後方有此指揮或恐御集編次偶不詳姑存之待考廢果州流溪縣為鎮
