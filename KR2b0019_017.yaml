body:
  text: 續資治通鑑長編卷十三宋李燾撰太祖開寶五年春正月乙未詔罷荆襄道嵗貢魚臘丁酉禁民鑄鐡為佛像浮圖及人物之無用者上慮愚民多毁農器以徼福故禁之己亥詔自今沿黃汴清御等河州縣除凖舊制藝桑棗外委長吏課民别種榆栁及土地所宜之木仍按户籍上下定為五等第一等嵗種五十本第二等以下遞減十本民欲廣種藝者聽踰本數有孤寡窮獨者免之前鄆州盧縣尉鄢陵許永詣匭自言父瓊年九十有九長兄年八十有一次兄年七十有九而永年七十有五欲求近地一官以就養庚子上召見瓊於便殿問以近事瓊歷歷能記上悅因厚賜之即授永鄢城縣令壬寅省諸道州縣胥吏幹力等吏部尚書致仕陳國公張昭卒戒其子曰吾事數朝無功德及人勿請諡及立碑以重吾過也府州言北漢軍冦方山雅爾兩寨擊走之浚閔河二月壬戍朔以江南進奉使劉崇諒為都官員外郎崇諒仁贍之子也當考崇諒在江南為何官以何事來何時到癸亥詔潭州嵗調紙百七十八萬餘幅特免十年乙亥以荆南荆門鎮為荆門軍權知慶州史福福未見言敗戎人于華池殺百餘人獲牛羊六百餘口時刺史姚內斌入朝久留京師故命福權知州事實録稱慶州刺史史福蓋誤也時姚內斌實為刺史內斌以四年入朝久留京師故命左衛將軍史福權知慶州見于八月內斌尋復還本任至七年二月始卒史福固未嘗真拜刺史也今改之丙子詔開封等十七州府各置河隄判官一員以本州通判充如闕員即以本州判官充己卯令僧尼各不相統攝當受戒者各於本寺置壇庚辰以鳳州屯銀冶為開寶監初職方郎中邉珝掌建安𣙜貨務奏徙務於揚州有富民訴廣陵尉謝圖殺其父本部收尉囚之官吏相繼推劾凡三百日獄未具州以狀聞命珝按鞫盡得其實乃富民畜私憾誣告即反坐之甲申以珝知揚州仍兼𣙜務珝華州人也戊子禁黃河私渡民素具舟濟行人者籍其數毁之庚寅以端明殿學士兵部侍郎劉稽古案宋史帝紀及宰相表皆作劉熙古守本官參知政事上既平廣南漸欲經理江南因鄭王從善入貢遂留之國主大懼是月始改制度下令稱教改中書門下為左右內史府尚書省為司會府御史臺為司憲府翰林為修文館樞密院為光政院從善為南楚國公從鎰為江國公從謙為鄂國公宫殿悉除去鴟吻閏二月辛卯朔皇第二女封延慶公主壬辰權知貢舉扈蒙奏合格進士京兆安守亮等十一人諸科十七人上召對於講武殿始下詔放榜新制也癸巳以江南進奉使李從善為泰寧節度使賜第京師時國主雖外示畏服修藩臣之禮而內實繕甲募兵隂為戰守計上使從善致書風國主入朝國主不從但增嵗貢而已南都留守兼侍中林仁肇有威名朝廷忌之賂其侍者竊取仁肇畫像懸之别室引江南使者觀之問何人使者曰林仁肇也曰仁肇將來降先持此為信又指空館曰將以此賜仁肇國主不知其間鴆殺仁肇仁肇事據江南野録及十國紀年庚子延慶公主出降左衛將軍駙馬都尉石保吉保吉守信之子也庚戍置安化軍於密州令海門造船通交州道初平嶺南命太子中允周仁浚仁浚未見知瓊州以儋崖振萬安四州屬焉上謂宰相曰遐荒炎瘴不必别命正官且令仁浚擇偽官因其俗治之乙卯仁浚列上駱崇璨等四人上曰各授檢校官俾知州事徐觀其效可也以四州屬瓊管乃四年四月事戊午禁道士寄褐及私度人為道士潁州龍騎軍校仇興等醵錢飯僧以謝南郊優賜上聞之謂左右曰軍中自有常制何為若此三月庚午詔潁州出公錢給還仍切戒之辛未占城國王波美稅遣其臣蒲訶散來貢方物壬申幸教船池觀習水戰乙亥遼州言遣招收指揮使王滿領兵入北漢界拔其一寨嶺南民有逋賦者縣吏或為代輸或於兼并之家假貸則皆納其妻女以為質知容州毋守素表其事甲申詔所在嚴禁之乙酉殿中侍御史張穆棄市坐通判定州犯贓錢百萬為部曲鴻遇所告按得實故置於法賜遇錦袍銀帶絹三百匹詔中國每租二十石輸牛革一凖千錢西川尚循偽制牛驢死者革盡輸官蠲去之每租二十石輸牛革一凖錢五百者此據食貨志在此年三月今附見更俟考詳罷兩京緣河諸州每嵗春秋丁帳止令夏以六月冬以十二月申又諸州科納止令縣具單帳供州不得令逐鄉造夾細帳以致煩擾此亦在食貨志今年三月夏四月庚寅朔三佛齊國王釋利烏耶遣使來貢方物上按嶺南圖籍州縣多而户口少命知廣州潘美及轉運使王明度其地里并省以便民甲午初廢白州及常樂州己亥以參知政事薛居正子惟吉吕餘慶子惟恭樞密副使沈義倫子繼宗並為西頭供奉官丙午以水災遣左司員外郎侯陟等四人乘傳分視民田隰州團練使兼晉隰等州沿邉都巡檢周勳築壘北漢界上北漢人襲破之戊午責勳為義州刺史禁嶺南諸州略賣生口五月甲子以晉州兵馬鈐轄武守琦權知晉州事武守琦知晉州事本末不詳實録有此特著之更俟詳考守琦見顯德四年無邑里乙丑遣近臣分詣京城祠廟祈晴廢澄賔潯巒富思明康繡禺順牢黨羅等十三州前後所廢縣又四十九丙寅詔廢嶺南道媚川都選其少壯者為靜江軍老弱者聽自便仍禁民不得以采珠為業先是劉鋹於海門鎮募兵能採珠者二千人號媚川都凡採珠必以石縋索繫於足而沒焉深或至五百尺溺死者甚衆鋹所居棟宇皆飾以玳瑁珠翠窮極侈靡及王師至并府庫悉焚之於是潘美等於煨燼中得所餘玳瑁真珠來獻且言采珠危苦之狀上亟命小黃門持示宰相速降詔罷之辛未河大決澶州濮陽縣壬申命潁州團練使曹翰往塞之翰辭於便殿上謂曰霖雨不止又聞河決朕信宿以來焚香上禱于天若天災流行願在朕躬勿施於民翰頓首拜曰昔宋景公諸侯耳一發善言災星為之退舍今陛下憂及兆民懇禱如是固宜上感天心此必不能為災也癸酉上又謂宰相曰霖雨不止朕日夜焦勞罔知所措得非時政有闕使之然耶趙普對曰陛下臨御以來憂勤庶務有弊必去聞善必行至於苦雨為災乃是臣等失職上曰朕又思之恐掖庭幽閉者衆昨令遍籍後宫凡三百八十餘人因告諭願歸其家者具以情言得百五十餘人悉厚賜遣之矣普等皆稱萬嵗河又決大名府朝城縣河南北諸州皆大水陜州言民范義超周顯德中以私怨殺同里常古真家十二人古真年少脫走得免至是長大擒義超訴於官有司引赦當原上曰豈有殺一家十二人而可以赦論乎命斬之六月戊子朔徙崖州於振州遂廢振州庚寅河決陽武縣汴水決鄭州宋州靜江留後郭廷謂自梓州受代歸辛卯卒遣中使護其喪事丁酉詔沿河州縣官吏勤恤所部民勿令轉徙田畝致損者籍其數以聞乙巳廢壁州戊申發諸州兵士及丁夫凡五萬人塞決河命曹翰護其役未幾河所決皆塞是月下詔曰近者澶濮等數州霖雨洊降洪河為患朕以屢經決溢重困黎元每閲前書詳究經瀆案經瀆猶曰經流宋史記改作詳究溝瀆薛應旗續通鑑改作詳究涇瀆並誤至若夏后所載但言導河至海隨山濬川未嘗聞力制湍流廣營髙岸自戰國爭利堙塞故道小以妨大私而害公九河之制遂隳歷代之患弗弭凡搢紳多士草澤之倫有素習河渠之書深知疏導之䇿若為經久可免重勞並許詣闕上書附驛條奏朕當親覽用其所長勉副詢求即示甄奬時東魯逸人田告者著纂禹元經十二篇上聞之召見詢以治水之道善其對將授以官告固辭父年老求歸奉養詔從之先是女真侵白沙寨略官馬三匹民百二十八口既而遣使以馬來貢詔止之於是首領渤海那等三人復來貢言已令部落送先所掠白沙寨民及馬詔切責其前侵略之罪而嘉其效順之意放還貢馬使者秋七月己未右拾遺通判夔州張恂坐贓棄市丁卯詔五嶽四瀆及東海等廟並以本縣令尉兼廟丞掌祀事常加案視務在蠲潔仍籍其廟宇祭器之數受代日交以相付本州長吏每月一謁廟檢舉焉新録在六月壬辰今從舊録及本紀戊辰前保大節度使袁彥卒彥數領藩翰然發迹戎行不通政術在南曹時為吏民所訟上念勳舊隱而不行於是遣中使護其喪事庚午皇第三女封永慶公主甲申永慶公主出降右衛將軍駙馬都尉魏咸信咸信仁浦子也公主嘗衣貼繡鋪翠𥜗入宫中上見之謂主曰汝當以此與我自今勿復為此飾主笑曰此所用翠羽幾何上曰不然主家服此宫闈戚里必相效京城翠羽價髙小民逐利展轉販易傷生寖廣實汝之由汝生長富貴當念惜福豈可造此惡業之端主慙謝主因侍坐與皇后同言曰官家作天子日久豈不能用黃金裝肩輿乘以出入上笑曰我以四海之富宫殿悉以金銀為飾力亦可辦但念我為天下守財耳豈可妄用古稱以一人治天下不以天下奉一人茍以自奉養為意使天下之人何仰哉當勿復言談苑載此事以為魏國長公主按魏國太宗第七女也當太祖時國未嘗封不當云主家恐有差誤而此事實魏咸信言之因附見公主出降之後俟更考左衛將軍駙馬都尉石保吉領愛州刺史詔曰頗聞諸州州司馬步院置獄外置子城司獄諸司亦輒禁繫人甚無謂也自今並嚴禁之違者重議其罪募告者賞錢十萬三司言倉儲月給止給明年二月請分屯諸軍盡率民船以資江淮漕運上大怒召權判三司楚昭輔切責之曰國無九年之蓄曰不足爾不素為計度今倉儲垂盡乃請分屯兵旅括率民船給以饋運是可卒致乎且設爾安用茍有所闕必罪爾以謝衆昭輔惶恐計不知所出乃徑詣開封府見皇弟光義泣告乞於上前解釋稍寬其罪使得盡力營辦光義許之昭輔出光義問右知客押衙永城陳從信曰為之奈何從信對曰從信嘗遊楚泗間見糧運停阻之由良以舟人日食旋於所歷州縣勘給故多凝滯若自起發即計日併支往復皆然可以責其程限又楚泗間運米入船至京師輦米入倉宜各宿備運卒皆令即時出納如此每運可減數十日楚泗至京千里舊定八十日一運一嵗三運今若去淹留之虛日則嵗可增一運矣又聞三司欲籍民船若不許則無以責辦若盡取用之則冬巾京師薪炭殆絶不若募其船之堅實者令運糧其損敗者任民載樵薪則公私俱濟今市中米貴官乃定價斗錢七十商賈聞之以其不獲利無敢載至京師者雖富人儲物亦隱匿不糶是以米益貴而貧民將憂其餒殍也光義然之明日具以告上上悉從其言由是事集昭輔亦免責焉陳從信傳云事在開寶三年秋寶訓云在二年按楚昭輔權判三司實四年五月安得三年秋已有此事今載於五年秋庶免抵牾冬十月江淮米十萬石至京師即是從信之䇿行也先是大理正內黃李符知歸州轉運司制置不合理者符即上言上嘉之秩滿歸闕上以京西諸州錢幣不登八月癸巳命符知京西南面轉運事書李符到處似朕親行八字賜之令揭於大旗常以自隨符前後條奏便宜凡百餘條其四十八事皆施行著于令丙申命同知廣州潘美尹崇珂並兼嶺南轉運使其原轉運使王明為副使太子中允許九言為判官轉運判官自九言始也隆平集言開寶六年初除徐澤為廣南運判恐誤己亥廣州言行營兵馬都監朱憲領兵大破獠賊二萬餘人於容州城下初嶺南所在賊起偽開府樂範土豪周思瓊等各聚衆負海為亂尹崇珂領兵擊之上遣中使李神祐督戰數月盡平其黨新舊録並於七月癸未言雍容州民誘蠻人為亂本紀亦然今并書于此周思瓊者尹崇珂傳云韶州賊帥潘美傳云土豪崇珂傳又稱偽開府樂範指揮使袁漢瓊及鄧存忠等據五州以叛然不詳五州為何等州也今止從美傳以周思瓊為土豪增樂範一人却依美傳總言聚衆負海不言某州庶免抵牾鄧存忠事已見范旻知雍州時兹不重列癸卯建保靜軍於宿州密州復為防禦廢安化軍節度海門鎮監軍趙令鎔令鎔未見大破亷白州城九月丁巳朔日有食之庚午復壁州禁西川民斂錢結社及競渡樞密使李崇矩與宰相趙普厚相交結以其女妻普子承宗上聞之不喜先是樞密使宰相候對長春殿同止廬中上始令分異之有鄭伸者客崇矩門下幾十年崇矩知其險詖無行待之漸薄伸怨恨擊登聞鼓告崇矩受太原人席羲叟黃金私託翰林學士扈蒙與羲叟甲科引軍器庫使范陽劉審瓊為證上大怒召審瓊詰問審瓊具言其誣上怒稍解癸酉崇矩罷為鎮國節度使賜伸同進士出身酸棗縣主簿後伸死其母貧餓詣崇矩子繼昌乞丐家人競前斥逐繼昌獨召見與白金百兩時稱繼昌長者會要云時樞密使沈義倫一人六年義倫作相以楚昭輔為副使亦止一人在院戊寅徙建寧留後楊重勳為保靜留後楊億説苑云馮暉為靈武節度有威名羌戎畏服子繼業襲其位楊重勳亦世有麟州並稟命朝廷而綏御蕃族為西北邉扞蔽太祖因繼業來朝廷徙鎮同州命儒臣知靈州留務召重勳授以近鎮别命武臣領州事其後二方終煩朝廷經略議者多以此二事為失馬别命武臣領麟州事實録乃無之當考是月崖州牙校陸昌圖作亂燒劫牙署知瓊州周仁俊遣兵擊平之實録於明年五月始載此事今移入禁元象器物天文圖讖七曜厯太一雷公六壬遁甲等不得藏於私家有者並送官冬十月復康州戊戌詔邉逺官嵗才三周即與除代所司專閲其籍勿使踰時初河陽節度使洛陽張仁超以郊祀來朝願留都下庚子卒上遽幸其第哭之輟視朝三日遣中使護喪事優詔贈中書令非常例也癸卯詔功德使與左街道録劉若拙集京師道士試驗其學業未至而不修飾者皆斥之若拙蜀人自號華蓋先生善服氣年九十餘不衰步履輕疾每水旱必召於禁中設壇場致禱其法精審上甚重之己酉詔諸州場院官糧料使鎮將並以三周年為任秦蜀守李氷有廟在永康軍偽蜀初封大安王又封應聖靈感王蜀平詔長吏增飾其廟乙卯改封廣濟王嵗一祀海門監鹽户龎崇等叛監軍趙令鎔擊敗之斬首三百級是月運江淮米十萬石至京師皆汴蔡兩河公私船所載也十一月丁巳朔以辰州都指揮使秦德崇德崇未見為起復雲麾將軍權知辰州兼五溪巡檢使後二嵗德崇罷歸除右千牛衛將軍魏泰東軒録云武陵辰陽澧陽清湘邵陽五州各有蠻徭保聚依止阻江殆十餘萬馬希範周行逄時數出冦邉以至圍逼辰永二州殺掠民畜嵗嵗不寧太祖既下荆湖思得蠻情習險厄而勇智可任者以鎮撫之有辰州徭人秦再雄者長七尺武健多謀在周行逄時屢以戰鬭立功蠻黨畏服太祖召至闕下察其可用靣以一路事付之起蠻酋除辰州刺史官其一子為殿直賜豫甚厚仍使自辟吏屬盡豫一州租賦再雄感激異恩誓死報效至州日訓練土兵得三千人皆能被甲渡水歷山緣塹捷如猿猱又選親校二十八人分使諸蠻以傳朝廷懷徠之意莫不從風而靡各得降表以聞太祖大喜再召至闕靣加奬激再雄伏地流涕嗚咽不勝改辰州團練使又以其門客王元城為本州推官再雄盡瘁邉圉故終太祖世無蠻患五州延袤數千里不增一兵不費帑庾而邉境安妥由神機駕馭用一再雄而已按泰所録再雄事甚美然正史實録無之又不見於他書或此秦德崇即秦再雄也德崇自牙校便知州又起復事必有異惜正史實録不詳及八年正月三十日除右千牛衛將軍已稱前知辰州則德崇在辰州亦不終太祖世今悉注泰所録更俟考求己未連州言供奉官李繼朗藥繼清等領兵大破獠賊於英州城下繼朗繼清未見癸亥禁釋道私習天文地理己巳詔諸道舉人自今並於本貫州府取解不得更稱寄應如從化外至者先投牒開封府奏請得旨方許召試其國學亦不得妄署監生參預薦送甲戌廢春勤二州及化仁等七縣又廢南義州廢南義州本紀實録並不載但載明年復置因追書於此庚辰命參知政事薛居正兼提點三司淮南湖南嶺南諸州水陸轉運使事吕餘慶兼提點三司荆南劔南諸州水陛轉運使事詔翰林學士李昉及宗正丞洛陽趙孚等分撰嶽瀆并歷代帝王新廟碑遣使刻石廟中凡五十二首十二月乙未命近臣於京城諸祠廟祈雪己亥畋近郊遂幸開封尹第視疾甲寅詔流外選人經考入令録者引對方得注擬驅使散官技術人資考雖多亦不注擬杖殺內班董延諤坐監車營務盜芻粟纍贓數十萬鞫之得實故也翰林醫官鴻臚寺丞劉翰為殿中省尚藥奉御又賜道士元祕大師馬志通議大夫階仍各賜器幣及鞍馬開封尹疾有瘳也乙卯大雪乾寧軍言北漢民二千二百四十八户來歸三司鹽鐡户部度支各有勾院及開拆司皆本部判官主之是月詔并鹽鐡户部為一度支如故是嵗大飢初上問宰相趙普曰儒臣有武幹者何人普以知彭州左補闕辛仲甫對乃徙仲甫為西川兵馬都監於是召見面試射且問能擐甲否仲甫曰臣在郭崇幕府屢從征討固嘗被介胄矣上曰汝見王明乎朕已用為刺史汝頗忠淳若公勤不懈不日亦當為牧伯也仲甫頓首謝上因謂普曰五代方鎮殘虐民受其禍朕今選儒臣幹事者百餘分治大藩縱皆貪濁亦未及武臣一人也既而有司命仲甫檢視民田上曰此縣令職爾即令吏部銓擇官代之北漢主始令民輸贍軍錢文武百官皆減俸財用不給故也
