body:
  text: 續資治通鑑長編卷四百三宋李燾撰哲宗元祐二年秋七月庚戌朔日當食隂雨不見辛亥集禧觀使鎮江軍節度使開府儀同三司康國公韓絳加守司空致仕朝奉郎沈季長為少府少監左諫議大夫孔文仲言季長本無學問技能止是王安石門壻鼓唱王氏經義聾昏衆學今一旦召從外路副二寺監季長之黨布散如蟻一季長進則百季長相繼而來不可拒矣左司諫吕陶亦以為言詔罷季長少府少監知秀州罷在八月今并書承議郎豐稷為工部員外郎封靈惠侯為靈惠應感公內降劄子近年京中人民春夏間多有疾疫于靈惠侯廟請水往往痊安宜封靈惠侯為靈惠應感真君七月六日三省同進呈奉聖㫖靈惠侯特封為靈惠應感公制詞云爾父守蜀建三江之利功施于後世爾亦以神顯于西土父子廟食相傳至今比嵗京師賴爾為福民罹札瘥請禱輒應夫有及人之功者必享爵秩之報幽顯雖異朕何間焉建爾上公申錫嘉號式從民志以侈神休見曽肇制集户部言竊以制國之用量入為出必當周知天下金穀之數以察登耗虛實乃能裁節煩冗研究弊病必資成法以為總要國家初置三司官即今户部之職自景德皇祐治平熙寧並修㑹計録事目類分出納具見嵗月已久未及編纂宜復講修以備觀覽請委本部官編集從之太皇太后曰近年减放賦斂甚衆然用度未嘗有所損吕公著言宗室費廣太皇太后曰聞濮王言天聖中宗室奉朝請者才四十七人授官者與外廷等有為崇班者自章獻時始改授環衛官增俸祿多矣因言改作宜審韓維曰古人作事常約盛衰謀始必須慮終吕大防政目云太皇太后宣諭近年雖减賦斂然未節用宰臣奏宗室費最廣太皇太后曰宗室昔為廷臣自改環衛俸始多然昔日員少章獻嘗云宗室奉朝請者四十七人何時更得三人為五十員實録所載與政目小異當從政目安燾行狀云宣仁聖烈皇后一日謂燾曰三省慮國用不足議裁數事于卿意如何燾曰今用度已極節省而户部尚聞艱窘欲使下足而上給固須有術今乃首議裁减宗室俸賜此尤不可者陛下惟當痛抑外家以示至公然此舉恐當深思而熟計之宣仁遽發寤曰樞密議是遂寢此事當考夏人寇鎮戎軍諸堡詔陜西轉運使范子竒體訪詣實及具兵將官姓名以聞要考見諸堡名字及入寇月日又詔府界三路教閲保甲自十一月朔為始若災傷放稅及五分以上者免教或一都保內該免者及半其餘户亦免復課利場務虧額科罰不以去官赦降原减法舊録云元豐間懲慢令之吏覬幸寢罷或恩宥免罪故立前法而元祐初從議者裁定至是户部言其弊復其法新録辨曰法令因革于前後實録中始末皆可見不必解釋今刪去蘇軾自辨疏可參考癸丑朝奉郎軍器少監郭茂恂知晉州詔制科入第三等并進士第一人及第並除承事郎簽書節度或觀察判官㕔公事或知縣代還升通判任滿與試館職制科入第四等除兩使推官代還改次等合入官次第五等除初等職官任滿除兩使推官有官人比類取㫖又詔除諸行侍郎如未歷兩省及待制以上職者並帶權字叙班在諸行侍郎之下雜壓在太中大夫之上祿賜比諫議大夫仍不賜金帶候及二年取㫖其六曹郎中雖係知州資序未實歷知州及監司六曹員外郎開封府推官者並只除員外郎舊録云元豐官制有法至是更之新録刪去知絳州李元輔轉官减年磨勘各追奪一半先是御史吕陶言元輔人品猥下語言舉止如屠販嘗幸其父之將死持以為詞立契劵貸錢于人以資不逞鄉里皆惡其不孝既仕進為薛向鷹犬向之害物元輔有助在邠州與蔡確同官屢以金帛奉確且護其過惡遂獲免其後確貴以元輔為司農屬官向者運變川峽錢物于官本內每十萬貫先尅除三萬貫或四萬貫虛收利息及俵錢與郡縣减價收買物帛侵損民力數路不勝其擾洎物貨才到陜西適㑹鄜延涇原邊事盡數支撥前去元輔却將鳳翔等處實直價例紐算用為羡息計功冒賞轉兩官减二年磨勘自提舉常平遷轉運副使及移淮南路並是蔡確以私舊之恩主張援引以致于此臣自去年三月後來纍次具元輔素行猥惡不為士大夫所齒及冒賞遷官之罪聞于朝廷未䝉指揮臣近見李琮以根括虛稅得罪緣琮受賞者皆已奪官并吕嘉問等因市易虛息遷官盡䝉追奪按元輔運變川峽錢物亦是虗收利息叨冒遷進與李琮吕嘉問事體均一獨此幸免未協公論伏乞勘㑹追改以示賞罰之當故有是命新舊本但云元輔初以轉易川峽錢物有勞遷官至是御史吕陶言其侵損民力虗收息錢冒賞故有是命樞密院言殿前馬步軍司遞年按閲諸軍所支賞銀未有定限分數詔以十分為率選應賞人無過三分嵗止一次甲寅詔諸路每年于八月後解發試武藝人到闕殿前司限次年正月軍頭司限二月以前試驗推恩其呈試第二等第三等武藝之人依此復洺州臨洺鎮為縣乙卯朝奉大夫朱衍特換莊宅使文州刺史苗授薦其沈勇有謀故也尋命衍知金州衍乞依种諤例除三路沿邊州軍差遣仍帶一路分鈐轄都監若以為不可即乞還故官又從之衍復為朝奉大夫在九月三日今并書之事則據曽肇制集云是日朝奉郎權知開封縣羅適為開封推官朝奉郎權開封府推官張商英為提㸃河東路刑獄商英先上書謂三年無改于父之道今先帝陵土未乾奈何輕議變更又嘗移簡蘇軾欲作言事官或得之以告吕公著公著不悅故出之此據徽録商英傳及邵伯溫辨誣修入邵伯溫作章惇傳云惇既拜相薦蔡卞為右丞林希為中書舍人張商英為諌官蔡卞為王荆公復讎又以元祐中除知廣州為置已于死地林希在元祐間自中書舍人以修撰出知杭州不除待制張商英在元祐初為開封府推官欲作言官簡蘇內翰子瞻云老僧欲住烏寺呵佛罵祖一巡如何偶館職孫朴過子瞻竊得其簡示吕申公之子希純希純白申公申公不悅出商英為河東路提刑三人皆怨元祐宰輔者何麒作商英傳云元祐元年除權發遣開封府推官公事時朝廷漸欲更改役法等而諫者或詆斥裕陵公上書曰先帝末年參用韓琦富弼之語釐改新法之不便于民者以十七八計為其子者正當遵用父道以守其成故論語曰三年無改于父之道可謂孝矣今先帝陵土未乾即議更變以理言之得為孝乎今羣臣詆斥者實繁有徒使先帝政事儻有不善當先帝時何不盡言指陳上疏極諫而今乃迎合時好妄肆莠言也臣乃先帝識擢之人難以改節立朝乞除臣外任差遣乃除河東路提㸃刑獄公事陛辭之日又以劄子極言先帝政事不可輕改且言司馬光在先帝時與王安石異論閒廢幾十五年其意必欲自行已學此為有理若他人在熙豐則附熙豐在元祐則附元祐此乃反覆射利之人不可不察因自陳身受裕陵之恩不忍取合羣小之意至于泣下宣仁哀之謂曰卿忠臣孝子也但朝臣多言熙豐政事有未便者已令子細講求利害非輕改也子細之語亦載國史公哽塞而去自是與當時用事者復為仇敵矣王賞在史院作商英傳云元豐八年以太常丞召甫入國門而神宗升遐元祐元年除開封府推官時朝廷稍更新法之不便于民者商英上書言三年無改于父之道可謂孝矣今先帝陵土未乾即議更變得為孝乎除河東提㸃刑獄陛辭極言先帝政事不可輕改因自陳受裕陵恩不忍偷合至泣下宣仁后曰卿忠臣也但朝廷多言熙豐政事有未便者已令子細講求利害非輕改也按商英自府推出為河東憲邵伯溫所記與二傳皆同王賞大率因何麒但稍刪潤之不知麒何據也按商英以元祐元年四月十四日除府推時已罷免役法而麒乃稱漸欲更改蓋不考事實漫書之耳且疑商英初為府推時亦未敢與執政異論當考元祐元年二月三日雖有開封知府與屬官一員同對指揮又按蘇軾三年九月五日上言垂簾以來除宰執臺諌開封尹外更無人得對惟邇英講讀猶或親近張商英以三年七月六日自開封推官出提㸃河東刑獄不知何故獨得對恐此事必不然也今不取丙辰詔諸州軍每嵗土貢除舊進數外其近年添進悉罷丁巳通直郎姚勔落致仕為宗正寺丞勔山隂人嘗為龍游縣令母老思歸請侍養居二年遂致仕于是復起吕公著掌記云姚勔未老休退宗丞紹聖四年三月有傳不知誰所薦當考詔內外學官選年三十以上歷任人充從御史中丞胡宗愈請也學官自罷試多出近臣論薦宗愈言學者初中科遽専師席請擇長吏嘗歷任者充選本傳禮部言請用太常寺以故事修撰到坤成節三師三公宰臣已下上壽儀從之曽肇云云見九日戊午遼國遣崇儀軍節度使蕭德崇中散大夫守太常少卿充乾文閣待制張琳來賀坤成節宴垂拱殿始用樂太師文彥博言北使見于紫宸殿宴垂拱殿左右內侍執用白紙及柿油蕉葉扇率不直十餘錢此止士庶便于日用今萬乘臨軒操用有以見堯舜儉德之美三省宰執及北使侍宴席皆得仰瞻以為漢文帝之服弋綈前史書為盛美方之于今固有慙德乞付史冊詔可中書舍人曽肇言伏見太皇太后陛下昨者深自抑損特發德音不欲臨御外朝退就崇政殿受冊詔書一下中外嗟嘆忠義之士至于感泣况臣待罪侍從嘗獻瞽言不謂偶合聖心特加收採非惟見陛下克己復禮之聖又以知陛下虛心納諫之明士生此時不能竭忠盡智禆補萬一目有所見懷而不言則竊位欺天何所逃責此臣所以不避冒黷之誅傾寫肝膽置于上前儻一言有補萬死無悔臣竊聞近日有司建議坤成節于崇政殿上壽其升殿賜酒并文武百官拜表班次並比附天聖三年故事施行臣伏考天聖三年故事宰臣樞密三司使學士知制誥待制節度使留後觀察使契丹使班于殿廷上壽如禮賜酒三行百官詣內東門拜表稱賀至天聖九年始御㑹慶殿百官上壽如乾元節之儀蓋自天聖三年至八年以前凡六年盡如三年之制亦足以見當時君臣守禮畏義之心可謂至矣今者三省樞密院乃不全用天聖三年故事及今日有司之議特降朝㫖令文武百官諸軍將校隨班行上壽禮此臣之所未喻也太皇太后昨降詔書以為不敢自同章獻太后出臨外朝故就崇政殿受冊竊詳聖意務從抑損今乃令百官將校皆赴崇政殿廷立班上壽則是天聖八年以前之所未有其禮更增于舊在陛下謙恭抑損之志前後本末似不相稱臣愚以為此殆非太皇太后之意特執政大臣失于不思耳伏惟太皇太后陛下躬前世母后不可極之盛德有休息百姓覆育萬物之大功受四海九州歡心愛戴之備養其為尊榮亦已極矣豈待百官將校旅列于廷然後為貴哉臣愚故願特詔有司一用天聖三年長寧節故事比附施行使天下之人知陛下謙恭抑損之志前後如一本末相稱書之史冊垂法萬世豈不美哉書曰不矜細行終纍大德為山九仭功虧一簣惟陛下留意無忽天下幸甚臣以孤逺之迹在朝寡助保全拔擢皆出聖恩常恨不能圗報萬一故遇事輒發不知忌諱伏望陛下澄神省察儻有可採只乞出自聖意速賜施行己未太皇太后詔坤成節可只依天聖八年以前章獻明肅皇后御崇政殿上壽禮曽肇以七月九日論奏十日批出實録並不載今據肇集追書于己未前可見宣仁聖烈從諫之美也庚申交址郡王李乾德進封南平王辛酉樞密院言夏國嗣子乾順已加封冊而未遣使報謝其生日令都亭西驛所下鄜延路經略司未得牒㑹如西人送到生日公牒勿受從之改誠州為渠陽軍從荆湖北路都鈐轄轉運提刑司請也三年十月丙戌又廢軍為寨新舊録並于十二日辛酉書左司諌吕陶為京西路轉運副使殿中侍御史上官均為比部員外郎按陶辭京西運副乞小郡章言韓維杜純已罷免時陶猶領諌職維責鄧州十五日已得㫖二十二日方行出純遷右司實録在二十五日陶不應旬日前改除差遣旬日後領諫職如故恐實録偶誤檢陶京西運副告詞乃十六日也今附十六日然十六日已行出不知何故二十二日猶領諫職或純遷右司亦先得㫖二十二日乃行出也政目陶京西運副均比外亦在十二日寶文閣待制提舉崇福宫王臨卒壬戌御札付中書省曰門下侍郎韓維嘗面奏范百祿任刑部侍郎所為不正及有非理事十餘件經今多日疑無奏牘及令開具聞奏却稱須俟討尋御集賜韓維手札卿向日延和殿奏待與范百祿理㑹十數事可只今開具進入不知是何月日今附此夫輔臣奏劾臣僚當形章疏明論曲直豈但口陳意欲無迹既無明文何異姦說維為輔臣不正如此朕何賴焉可罷門下侍郎守本官分司南京仍放謝辭百祿與維爭收例歸中書事在二年三月二十八日蘇軾三年十月七日云云可考右僕射兼中書侍郎吕公著即上疏言臣伏思陛下自臨政以來慈仁寬大判别忠邪于輔弼之臣每加優禮故得上下安樂人情悅服今來韓維必是進退之間語言乖謬上觸龍鱗然維昨與范百祿爭論刑名等事若以為性强好勝則有之亦未見姦邪事迹若以奏劾臣僚當有章疏則自來大臣造膝密論亦未嘗須有章疏比來批語所罪恐未足以風示四方兼維素有人望久以直言廢棄陛下初政清明方䝉收用忽然峻責罪狀未明慮必有讎嫌之人飛語中傷以惑聖聽况五六十年來執政大臣未曽有此降黜恐中外聞之無不驚駭自此人情不敢自安臣又竊思皇帝陛下春秋方富正賴太皇太后陛下訓以仁厚之道調平喜怒以復仁祖之政若大臣倉卒被罪則小臣何以自保臣受陛下恩與常人不同意欲致君于堯舜措國于不傾以報陛下故今來雖當雷霆之怒不敢愛身以陷陛下于有過之地伏望少回聖慮其批降指揮見只在臣處收掌聽候聖㫖是日公著又言曰臣適來已具奏論韓維不當責降臣待罪宰臣若人主有過舉臣第一合當論列况韓維素有時望今來罪名不顯忽行責降除命若出物論必然大駭皆以朝廷為失政致陛下於有過之地臣亦何安伏望聖慈特賜包容且令安職俟其有請聽使去位以全君臣之大體免致中外譏議是日晚中批付公著曰覽卿所奏為罪韓維事維不惟性强好勝今日觀維族人知識布在津要與卿孰多以此人多不平維之强橫若俟其有請而後罷則今後朝廷何敢行事紀綱自此不復振也卿更詳度作文字進入中書侍郎吕大防亦上奏曰今夜吕公著封送録到降付中書省御批指揮一件為門下侍郎韓維面奏范百祿不當可守本官分司南京及稱一面繳奏元降指揮臣竊詳韓維忠讜有素士望甚髙陛下自初臨政擢維于沉滯之中委以柄用賢士大夫莫不稱頌盛德為之相慶一旦忽以奏事差失遽行譴責恐非所以風示四方開接衆正之體吕公著不令臣知一面論列必已竭盡至誠上禆聖治伏望天慈詳察特為開納况維所坐至細止是拙于奏陳未可加以重責若此命一出則人人有不自安之意繫今日治體之根本伏望深思而熟察之少息雷霆震耀之威使全臣子進退之分臣不勝至懇至願大防劄子其家尚存奏本有封還御寶乃七月十三日所上今附此中批付大防曰覽卿所奏韓維事維為大臣言臣僚過惡自當公行豈有口陳而已者此不為罪何耶宜依已降指揮施行日後果有臣僚煩言營救必當重行貶竄癸亥公著復上奏曰昨日兩具劄子論列韓維不當責降事伏䝉聖恩特降批㫖稍霽威嚴仍令臣更詳度作文字進入者臣所以區區論奏蓋以韓維于兄弟中最有美譽亦别無姦邪顯狀若詔命一出恐必致四方譏議臣伏思陛下自去春以來包容蔡確等使自引去獨于韓維不能少忍耶且門下侍郎位遇至重自非罪惡彰顯必俟其有請始聽去位最為得體伏乞聖慈少留神慮其元降到指揮謹同封進入是日中批付公著曰卿所奏韓維于兄弟中最賢以兄弟推之則粗有虛名若考實則未聞維之欺罔宜在不赦然以卿纍言更不欲重責止以其罪罷門下侍郎與一知州差遣卿宜先定一知州實封進入續降出文字施行公著即上奏曰祖宗朝執政以罪罷亦皆有帶職或轉官告詞內不說事因只平罷者但不因陳請即非美罷近世吳奎神宗以其留韓琦排王陶自禮部侍郎參知政事除户部侍郎資政殿大學士知青州臣兄公弼為與王安石韓絳爭事亦是不因陳請自摳密使刑部侍郎除觀文殿學士吏部侍郎知太原府今來韓維若只不與轉官令帶舊職知州即是罷黜然但恐命下之日執政輔臣及臺閣侍從必更有論執者今擬上鄧襄兩郡及令帶資政殿大學士更乞裁酌甲子詔韓維除資政殿大學士知鄧州然猶用前責辭公著乃與中書侍郎吕大防同奏曰此大事也更乞訪問太師文彥博同知樞密院范純仁言臣竊聞韓維有與外任指揮臣伏見韓維公忠篤實稟于天性議論賞罰據理直陳盡心國家不避嫌謗陛下用為執政可謂股肱之良伏惟陛下寬仁大度委任羣臣進退輔弼咸以至公今韓維未聞别有大過不俟封章陳請遽然逐去必有姦人密行譖訴上誤聖聰致陛下用賢不終使大臣失進退之節實恐正人失望有虧聖政伏望陛下深加睿思或因臣僚開陳却令追寢前命以成帝堯舍已從人之德以繼商湯改過不吝之美臣被恩殊異難以緘默伏望聖慈深賜採察天下幸甚臣與韓維亦霑姻戚既欲上禆聖化難以避嫌自安更乞聖慈遍詢文彥博吕公著已下諸大臣則知維之邪正若維果是正人則雖有些少過失全望陛下主張若以小過去之是使姦人得計恐非天下之福臣聞謗韓維者多言其引用親戚乞陛下將進用過韓維親戚遍問三省元是何人發意因與不因韓維自然有無阿私事狀明白庶不誤陛下至公之意中書舍人曽肇封還韓維詞頭具奏曰竊以朝廷進退執政大臣上繫國體下動人聽茍有未安所害不細今陛下責韓維以嘗面奏范百祿所為不正及有非理事十餘件及令開具聞奏却稱須俟討尋既無明文何異讒毁臣伏思韓維所言誠出于讒則固不為無罪然未見維指陳百祿不正及非理事迹則其言是非尚未可知若百祿果有不正及非理事迹則維言為當罪在百祿若百祿無之則維不為無罪伏望詔維指陳百祿不正及非理事迹然後陛下質以公議則是非自見所有誥詞臣未敢修撰太皇太后批付肇曰輔臣奏劾臣僚豈有案牘不具徒口奏而已者蓋是出于容易謂豫聽覽可欺也以此罷其職豈謂與范百祿較證是非然後為有罪耶宜依前降指揮作文字施行肇復具奏曰臣前日輒稽詔命妄陳所見退省僭冒恭俟刑誅不謂陛下赦其狂愚特賜詔札委曲誨諭如父訓子臣豈不知從命順㫖為得禮逆命咈㫖為有罪然臣一門之內世受國恩陛下擢臣備位近侍德澤深厚臣儻貪於承命懷不盡之心致天下之論謂陛下聽决萬幾三年于此辨别忠邪賞罰功罪無不曲當而獨于此有過舉之纍則臣之負國罪何可逃臣之報君義將安在此臣所以不避萬死之責傾寫肺肝冀有補于萬一也臣前奏乞令韓維指陳范百祿所為不正及非理事迹非欲令維與百祿較證是非正欲考核維之欺君與不欺君爾若維所陳皆中百祿之病則是維為執政敢為朝廷别白邪正是非真得大臣之體雖案牘不具出于口奏豈可謂之欺哉若維所陳皆失事實則其欺君罔上事理灼然明正典刑人心自服蓋執政大臣參預國論其于論議臧否人物不必一一具述文字但顧所言當與不當推而行之人心服與不服爾豈以一無文字便謂之欺惟是百官有司有所陳列須具劄子奏狀自逹非如執政大臣朝夕進見故不得不然也古者坐而論道謂之三公豈以具案牘為事哉今陛下責維徒口奏而已遂以為有欺君之意臣恐命下之日人心眩惑以為陛下以疑似之罪而逐大臣恐于陛下威德不為無損也執政大臣自此以維為戒無敢開口議論臧否人物君臣上下更務形迹恐非陛下推赤心以待大臣之誼亦非大臣展布四體以事陛下之道也夫執政大臣天子之所體貌所與共安危治亂者也古人以為人主之尊如堂羣臣如陛亷逺地則堂髙又言二千石尊重難危乃能使下夫二千石蓋一郡守爾猶不可輕易去之况陛下左右執政之臣有堂陛之勢者乎臣受陛下厚恩食朝廷重祿豈肯私一韓維以負陛下然臣惓惓不能自己者為朝廷惜進退大臣之體爾伏望陛下察臣此心澄神熟慮儻䝉採録乞如臣前奏施行不報先是左司諫吕陶纍章論維怙勢任情隂竊威柄方陛下垂簾聽政不宜使大臣如此専恣若不早賜罷免邪計必行邪黨必勝非朝廷之福也陶家傳云陶五上章論維然未見陶五章實録稱御史論維多除用親屬蓋指陶也陶論維除用親屬亦不止一章及維罷免時陶已為諫官不為御史矣不知實録所稱御史果何人上官均自殿院與陶同日徙他官或均固嘗論維但其章弗布耳今依陶家傳略存此數語更須考詳今徽録均傳亦不載嘗有章劾維奏議亦無及是又言伏聞有㫖差韓維知鄧州此陛下深得制御大臣之術聳動四海懾伏萬官自古聖君英主無以過此宗社幸甚天下幸甚然曽肇敢封還詞頭者蓋肇向忝中書舍人纍有臣僚彈奏維素喜肇力主張之今日肇以此報德耳臣又風聞肇與韓族議為婚姻若果如此聖明更賜審察乙丑左司諌吕陶為京西轉運副使殿中侍御史上官均為比部員外郎陶遷司諌均遷殿中在五月十六日丁卯劉攽制集上官均自殿中侍御史除兵部員外郎葉祖洽自兵部郎中為禮部郎中同一制不知實録何故以均為自殿中改比外當考政目與實録同先是侍御史杜純右司諌賈易等緣張舜民事劾陶均面欺同列而陶亦自請補外上疏論朋黨曰杜純劾陶等欺同列此據朝補之所為行狀且云純坐是忤㫖賈易劾陶則據陶疏均事當考嘗觀古之聖君賢臣相與圖治能闢衆正之路杜羣枉之門功業隆而聲名著者其術無他在乎絶朋黨之患而已朋黨之患不止于忘國家之事以私已自營挾疑似之說以養交固寵其患乃在乎中傷忠直爾忠者先傷則凡懷忠者不容直者先斥則凡任直者不免夫然後率天下之人為不忠不直而相與共欺其君者朋黨之患耳人君不患不能知治道而患不能知朋黨不患不能知朋黨而患在不能去朋黨昔者劉向論朋黨數千言李德裕推廣其說然二人者卒為朋黨所害使人主能知其弊則二人者豈有不能自明之理哉故曰患在不能知之也唐文宗聰明俊偉有志于治歎曰去河北賊易去牛李之黨難始失其制終成其亂雖欲痛治勢所未可故曰患在不能去之也蓋人主所恃以治天下服萬民者公議也朋黨作則公議亡人心無所賴上下相狥毁譽亂真人主雖獨公其心于上天下誰與同其是非憂樂哉臣視往事之變嗟念久矣起自疏逺無左右之助陛下擢于衆人之中付以言責之任感慨自誓恨無死所以報萬一然臣嘗謂諫官御史當尊朝廷肅臣下謹名分正紀綱逺比周然後為稱職故遇事必言不暇恤已抵牾同列亦既多矣違戾權貴亦已甚矣頃因程頥不嚴君臣之分欲就别殿說書臣以為禮貴防微事宜戒漸名分一僭實生厲階乃獻封章論其不可奏削方上而陛下已悟其失有㫖改正則是頤之妄請不待臣言而陛下已辨也臣于頤素無嫌怨所論奏者乃職事耳非欲沮頤以伸已也同舍緣此反目相視不啻仇敵隂懷睚眦伺隙求報未幾張舜民罷職臺諫紛然共議營救亦欲率臣同入文字臣既思慮短暗始欲救之遂諾長二以為可言既而再思理有不可其後全臺具疏力來强臣臣乃詳論舜民之言不可從舜民之罷不當救面却其請不敢雷同及至召赴三省宣諭其人各以為恥懷怨愈深意欲使臣不可獨免遂形惡奏上浼聖聰仰賴陛下睿明天縱照見邪隱社稷神靈弗祐非道斯人黨與不攻自破孤臣獲全復進諌列此天地之造也今韓維之上客程頤之死黨猶指舜民之事以攻臣是朋黨之勢復作而朝廷可欺乃天下之深憂也臣安可忍而不辨忍而不去哉所以辨者小則欲明一身之枉大則欲救天下之害也願陛下垂聽而察焉大凡臺諫供職之始當有章疏所言之事必以逺者大者為先近者小者為後此其體也今政令之得失生民之利害必有大于舜民之事者而不先言之乃汲汲言臣者意非他也其一則賈易為程頤報怨也其一則杜純藉此以悅韓維也韓縝誤神宗之政事韓宗師忝袐閣之除命韓宗儒醜穢之迹郭茂恂贓貪之罪臣纍嘗彈劾則維之憾臣亦深也彼杜純者與韓氏為婚姻絳既判北京乞差純為本路運判朝廷起純于停廢之中而遣之在河北未數月召為大理少卿荷德于韓氏豈肯不報其人天資刻深持法苛峻每斷疑獄主議惟重以求合韓維之意維多從其說于是表裏相成與范百祿異論維因此益嘉之忽有侍御史之除命下之初不協公議臣是時深欲論奏適㑹傅堯俞等事未辨明恐不知臣者謂臣又起爭端遂隱忍而罷則純之言臣以悅韓維迹狀亦明矣至于賈易為程頤之黨則士大夫無不知之今二人者不知何辭以罪臣也謂臣已嘗出言欲救舜民既而不救有反覆之罪乎是不許臣深思而欲臣茍合也昔季文子三思而後行孔子聞之曰再斯可矣蓋中人之性燭理不能盡明凡于事變必再三思慮則庶幾無悔雖聖人亦許之夫以孔子之聖許季文子之再思而臺諫不容臣之深慮亦已過矣謂臣見同官罷職不出力以救之為薄于風義乎則事固有輕重理固有取舍不可執一而言也臣雖不救同官薄于風義其過小也實知不當救而茍為辭說附㑹黨與以救之則欺于朝廷其罪大也臣寧有小過而不敢為大罪寧致同列之深怨而不誤國家之大事臣何愧也臣之罪止于此而言者源源未絶必欲臣廢逐而後已臣深痛朋黨之弊至于斯也夫朋黨之人寄佞于忠託姦于直濟之以智成之以敢不可不察也昔劉崇魯案原本作劉栖楚今據李磎傳改正哭李磎白麻者為諂崔昭緯也張又新搆李紳之寃者為附李逢吉也案歷代名臣奏議張又新作劉栖楚唐書載又新與栖楚同為逢吉搆紳而又新尤甚則作又新為得實今仍原本豈宜聖世復啓此風小分曹類大成黨錮漸不可長也臣伏聞真宗皇帝嘗戒諫官曰不得潛為朋比隂有中傷祖宗訓戒著在史册安可忘哉恭惟皇帝陛下堯仁舜孝規天廣地對揚祖考之光訓對越上帝之景命伏惟太皇太后陛下聖哲仁慈逺出千古四海治理萬幾得失神遇而心悟其于邪正了無遺察臣雖以螻蟻之命立于虎豹之羣慿賴天地之力未賜斧鉞之誅以安其餘生而不憂然臣有喋喋不能已者蓋衆口可以鑠金積毁可以銷骨曽參殺人入市有虎言者三至未免置疑跬步一差遂投朋黨之陷穽此臣之所以深憂也夫竭力事君有死無二死得其義又何憾焉臣之區區惟恐不得死于陛下之斧鉞而將死于朋黨之陷穽則臣猶有憾也伏望陛下哀憐鑒照罷臣言職免使紛紜之議煩惑天聽臣不勝幸甚又言杜純到臺已來朝廷纍送刑名公事付臺定奪純獨持深議意務在殺與胡宗愈等各狀論奏近日阿袁之事是也阿袁事當考此亦可見其附韓維矣賈易既言臣又欲率孔文仲同上殿論奏文仲拒之程頥素不與文仲往還忽謁文仲盛稱賈易言臣之事因以言誘文仲令助言之文仲深不平其說此朋黨可見矣又言新除臺官趙挺之乃邢恕妻兄從程頥學因杜純薦為御史以頥與純之故亦必言臣惟陛下幸察易凡五狀言吕陶其略云傅堯俞王巖叟近嘗彈奏陶為不曾論列張舜民事而面欺同列言已有文字䝉降朝㫖令其分析傳聞吕陶不自引咎尚敢毁誣忠良以為强橫逼使言事如其果然何陶之小人而無忌憚一至如此且堯俞巖叟亮直一心求以報國天地鬼神固亦鑒其誠意縉紳大夫茍有知者孰不稱其賢而深惜其去而陶也詭譎姦人安然復位按陶習尚卑凡猥同市井包藏深阻險于山川託朋附以自安懷機穽而難保編類章疏係二年六月十九日又言竊聞今月十六日三省同奉聖㫖除吕陶上官均差遣執政大臣心知其非而遲疑猶豫近及旬浹竟無所辨正出于不得已而行之且大臣既不為陛下開陳可否之義而臺諫又皆懷私顧忌鉗口養交而已然則陛下何賴于股肱耳目之助乎又言竊聞吕陶之黨與已衆根柢已深有不可動搖之勢誠恐羣邪迷國為天下大患欲為陛下拔其源而塞之無使滋蔓而不救也今陶之死黨遍自執政大臣侍從要官相與馳驅往來晝夜合謀欲盡去正直中立之人然後肆意逞欲以居美權要選忠義之士無不扼腕疾首又言陶之黨人在要路者固已瞋目而怒勃然見于辭色將恐機穽四發擠臣于不測之禍又言外議謂陶之黨人乃近臣之强者與一二大臣素為朋比近以利害劫彼大臣使之進說乞下前命是以密啓于陛下故陶與上官均之命復出此事之虛實惟陛下知之若果如其說其為大臣者亦不忠之甚也編類章疏六月二十八日奏又言吕陶昨寢罷左司諫之命以其有不忠之罪中外公論皆以為當猶恨其斥逐之晚也陶包羞覬幸借託請救乃復得之果以不忠得罪閲月可復乎彼貪利之人志在茍得而無恥乃其常態何至朝廷蔽失如此之甚哉編類章疏七月五日奏今并附此及是陶與均罷言職陶外補而均內徙兩人俱罷言職均內徙而陶外補蓋易攻陶特甚由此除命不同均曲折當考趙挺之除御史在六月二十八日丁卯以雨罷集英殿宴戊辰遼使辭吕公著于便殿復論責韓維事是日內批付公著曰卿適奏改韓維詞頭欲作何意公著即具奏乃詔中書省韓維誥詞宜作均勞逸意舍人蘇轍實為之詔熙河蘭㑹路鈐轄苖履速起發赴任御集七月十九日天章閣待制知襄州吳雍卒庚午兵部言熙河蘭㑹路經略安撫使司奏自開拓本路及諸路用兵以來敢勇效力因立戰功補授甲頭至三班院差使者甚衆欲依軍將殿侍大將三班差使法許換授弓箭手人員比類擬定合換職名從之置河中府龍門縣韓城縣錢監三降授正議大夫知相州崔台符卒辛未正議大夫守門下侍郎韓維為資政殿大學士知鄧州新舊録並書御史論維多除用親屬故罷獨不載御史姓名按論維多除用親屬有吕陶章疏可考然當時罷維乃専坐口陳范百祿過惡而不具文字吕公著家傳載吕大防家所藏御札并曽肇奏議載其事甚詳不知舊録何故都不取而新録又因之左司員外郎王覿為侍御史侍御史杜純為右司郎中御史中丞胡宗愈言純頗僻深刻無學術進不由科第用法狥私乞罷其侍御史執政力為純辨而中㫖令與覿更任宗愈又言純諂附韓絳乃出知相州純知相州在二十八日今并書之執政為純辨據宗愈傳朝奉大夫直龍圖閣知河中府葉康直知秦州元年十一月二十四日初自陜西運副除直龍知秦州曽肇繳還十二月六日蘇轍再繳今年二月二十八日罷之六月二十八日改除小龍河中今更授秦州樞密院以邊事未息合要康定慶厯以來河東陜西用兵典故請借仁宗朝實録候邊事息日送還袐書省從之新無壬申詔還坤成節臣僚所進金酒器復鄚州鄚縣是日手詔付吕公著等令于文臣中擇有才行風力兼知邊事堪大用者三五人具姓名親書實封進入公著即上奏曰臣未凖詔㫖以前固嘗思慮籌度近侍之中卓然能當大事者亦未易得今且于短中取長略具數人觀文殿學士孫固和厚有守曾任樞長及邊帥然才識有所不至吏部尚書蘇頌資性平和諳練典故然人格不至髙户部尚書李常好賢樂善處事平允然風力不甚强吏部侍郎孫覺學術行義衆所推服然臨事或不膚敏又户部侍郎趙瞻和厚曉邊事天章閣待制顧臨忠義倜儻亦好講求邊事然進用未久或可漸次擢任又御史中丞胡宗愈素有直聲然前日彈杜純一事頗為乖繆疑為小人所誤乞更觀察又言今三省職事與舊日中書一般中書宰相參政本以四員為額若未得人三省權不添人及樞密院且令安燾范純仁久任燾在樞府日久頗為習熟純仁䝉陛下不次拔擢至此兼曉邊事雖燾屢有人言純仁嘗自求退罷宜各令安職亦未至闕事按手詔問有才行風力兼知邊事堪大用者范純仁亦被此詔蓋當時遍問執政不但吕公著也公著家傳有所薦人姓名因備載之仍具言付公著等庶不失事實純仁所薦既無姓名更不别出公著家傳載此奏或加刪削蓋私有所避也臣燾得别本于汪應辰今附注在後仍稍增入吕公著奏臣今月二十三日凖御批令臣于文臣中擇有才行風力并知邊事堪大用之人三五人者臣未凖聖㫖以前亦嘗思慮籌度除今日已大用人外其餘兩制以上及前執政並未見卓然有逺識骨鯁能當大事可充柱石之任者其諳曉邊事臣僚尤更難得今且于短中取長略具數人觀文殿學士孫固在先朝任知樞密院事亦曽歷河北邊任和厚有守然才識有所不至吏部尚書蘇頌資性平和諳練古今典故然人格不甚髙户部尚書李常好賢樂善處事平允然風力不甚强吏部侍郎孫覺學術行義為衆所推然臨事或不至膚敏覺見任侍郎或乞日近且進為吏部尚書户部侍郎趙瞻和厚習吏事本是關中人頗曉邊事然進用未久伏乞更觀後效若户部尚書有闕或且試用天章閣待制顧臨忠義倜儻有報國之大志亦好講求邊事然進用未久且乞聖慮記録更試其才御史中丞胡宗愈自來衆皆稱其徑挺有學識然前日彈杜純一事頗為乖繆疑為小人所誤乞更且觀察右更乞聖慈詳酌七月二十四日貼黃稱勘㑹見今三省職事與舊日中書一般中書宰相參政本以四員為額今來若不得人三省權不添人及樞密院且令安燾范純仁久任安燾雖人望不美然在密院亦頗用心習熟范純仁纍任西邊陛下自庶僚擢至輔弼宜且安職亦未至闕事更乞詳酌癸酉皇城使內侍押班權管勾入內省押班公事馮宗道領惠州刺史詔除太僕寺官三省樞密院同取㫖以馬政𨽻樞密院故也詔免死事之孤納不應給俸錢從户部請也乙亥户部言河東路轉運司奏乞將折二大銅錢亦許依小銅錢例收稅從之丁丑端明殿學士光祿大夫提舉崇福宫范鎮乞致仕詔遷銀青光祿大夫仍前職致仕舊録云是時凡得罪先朝者悉相援以起羣姦引鎮以助已鎮力拒之卒不起士論嘉之新録辨曰元祐之政起老成以自輔而鎮以癃老力辭非緣職事不合也史臣之言如此實為厚誣今刪去鎮所以辭不起已具元年十一月二十四日提舉崇福宮時新録要亦未詳詔陜西河東諸路經略使勘㑹邊防大計貴在先慮近者夏人顯肆傲慢不修臣職料其作過必在今秋纍據前後探報看詳夏賊自中國逺討靈州已來常有長驅報復之意又自攻圍金城不利之後或有改圗深入之謀今來賊計狂狡雖未知作過所向若只如常嵗犯邊攻掠則朝廷已降指揮戒敕諸路沿邊過為備禦去訖萬一肆其狂謀不顧成敗併兵一路豕突深入即不委逐路合于甚處可以捍禦使不得奔衝或放令稍入近裏即却合于甚處可以邀截扼其歸路須藉帥臣預為講畫仰各詳前項事理不可下司密切檢詳前後機要圗籍有無曾經措畫備禦深入條畫及更切詢訪經歷舊人參較利害從長議定捍禦邀截兩策各于甚處駐兵可保必勝不致誤事疾速條具聞奏其上件事理止是朝廷今來先慮及此預委諸路相度貴有定䇿萬一倉卒之間不失禦備即不得張皇漏泄却致境內居民先自驚疑不安每有奏事仍令機宜官親自書寫不得少有漏露舊録刪取此詔甚略今具載之環慶路經略使范純粹奏除契勘得前後機要文字法式圖籍內别無備禦深入條畫外臣自領職以來固已念慮及此亦嘗詢訪衆議雖無經歷舊人其間形勢利害粗可究見緣本路內外山谷重復少有廣川大野前此屢經夏賊入寇內熙寧三年賊馬最盛是時只是分兵攻圍慶州沿邊五七城寨一面遣輕騎散行村落搜求虜劫其輕騎之散行者亦曾一至慶州北拒城四十里而去蓋未嘗以全師直抵帥府如將來入寇之數又倍於前則猖狂進嚮或至城下亦無足怪若謂敢踰越帥府直趨內地則理恐未然蓋賊既犯邊若不先以兵衆守閉邊寨則豈敢不顧其後而輒為長驅之計既須先守邊寨然後深入即沿邊次裏不下十餘城寨所占賊兵無慮二十萬此外須别有餘兵十萬衆乃可直造帥府臣自今年夏秋已來便作賊兵攻圍帥府之計其沿邊城寨只令過為守備誡以軍法雖有小利無輒出兵及日近以探報加急已令清野避賊此外先已選擇將佐之可任戰鬬者令團結戰兵排備休息俟賊耗逼近即欲漸次抽那與帥府重兵相合以觀其變縱使賊兵直至帥府遂肆攻圍亦止可堅壁自固蓋彼賊逺來以衆自恃勢大氣鋭必利速戰我既衆寡不敵惟宜按兵不動以頓其鋒彼既知重兵在內不務速戰又既已清野掠無所得而日有傷殘臣料彼賊豈不以歸路自虞恐未敢外捨諸寨內置帥府而遂移內地萬一彼賊尚有餘力既不顧已之成敗又不顧重兵在後而尚更深入則當臨事審畫或出或處或聚或散或乘不意破其間隙或俟氣衰制其歸路並繫至時處决非可預陳臣實至愚偶叨寄任姑自罄竭謂宜如此固不敢自以為必是惟上託朝廷威靈或冀塞責而已自餘纎悉臣已仰體聖籌密切施行文彥博奏中外臣僚上言夏國受朝廷封冊恩禮極優錫賚尢厚而敢忘恩背德輒行公牒傳送疆吏自絶于天不修貢奉天地所不容神人所共怒乞行天討以正其罪欲乞降詔邊帥即出敕榜以諭中外若朝廷姑務息民推天地之大德曲示含容抑羣情之忿怒不與醜羌計較即乞明諭邊臣嚴加守備靜以待之必取全勝所有朝廷續遣大兵且令分屯沿邊州軍以備緩急邊上勾抽此據彥博集自注云元祐二年今附七月末當考范純仁言臣早來與安燾商量為遣中使分往陜西河東撫諭帥臣及做照管沿邊知州因帶取索兵糧器甲數目文字及密行體量邊防未盡未便事件適已進入臣再思之陛下遣使密諭諸帥以委託之重今却令體量邊事恐非陛下専責帥臣之意欲于逐人付身劄子內减去密切體量邊事一節只乞面令密行詢采回日以備訪問純仁所言恐即是此詔然實録不書遣中使當考
