body:
  text: 續資治通鑑長編卷一百二十三宋李燾撰仁宗寶元二年春正月丁酉陜西都轉運使張存請留川峽等路上供銀絹於永興軍鳯翔府以備邊費從之度支員外郎張忭為六宅使涇原秦鳯路安撫都監忭韓城人夏竦薦其才可任也戌戌遣內殿崇班吕清按視河東緣邊州軍兵甲城壘壬寅詔陜西秦鳯鄜延涇原等州鎮戎軍及河北鎮瀛莫雄霸等州通判自今並令審官院選差人丙午以殿前都虞候雍州觀察使環慶路副都部署劉平兼鄜延環慶路安撫副使先是三司軍將耿從古告進士髙肅私藏六壬玉鈐事下開封府治開封府言肅所藏六壬玉鈐首尾不具罪當末减上慮愚民或多抵冒因召司天監定合禁書名揭示之復詔學士院詳定請除孫子吳子厯代史天文律厯五行志并通典所引諸家兵法外餘悉為禁書奏可戊申侍御史知雜事假少連言三班院皇城司羣牧司三司衙司等處比多額外增員或許令再任此皆起於權要僥幸之人請檢用真宗朝逐司所置定員悉罷所增置者詔所增員候嵗滿更無差人己酉河陽言彰信節度使同平章事王隨卒贈中書令諡章惠後改文惠始隨參知政事請與同列日獻前代名臣規諫一事以廣聞聽議者謂非輔弼之職其事遂寢及居相位多屬疾益無所建明外若方嚴而治失於寬晚更卞急朝士有以身事至政事堂自言者輒嫚罵性喜佛慕唐裴休為人然風迹弗逮也辛亥廣南西路鈐轄司言安化州蠻平馮伸已傳云伸已以勞遷西上閣門使按伸己巳遷閣使乃慶厯元年十月甲辰此時未也初元昊遣使稱僞官抵延州郭勸李渭留其使具奏元昊雖僭中國名號然閲其表函尚稱臣可漸以禮屈願與大臣熟議詔許使者赴京師勸等令韓周與俱使者及東華門始去朝服朝廷發函讀其表曰臣祖宗本後魏帝赫連之舊國拓跋之遺業也逺祖思恭當唐季率兵拯難受封賜姓臣祖繼遷大舉義旗悉降諸部收臨河五鎮下緣境七州父德明嗣奉世基勉從朝命而臣偶以狂斐制小蕃文字改大漢衣冠革樂之五音為一音裁禮之九拜為三拜衣冠既就文字既行禮樂既張器用既備吐蕃逹靼張掖交河莫不服從軍民屢請願建邦家是以受册即皇帝位伏望陛下許以西郊之地為南面之君謹遣努舍額濟尼斯們鄂普凌濟威伽崖密奉表詣闕以聞甲寅知延州工部郎中天章閣待制郭勸落職知齊州鄜延鈐轄兼知鄜州四方館使惠州刺史李渭降授尚食使知汝州坐不察虜情也朝廷雖知元昊决反然猶善遇其使者將行不肯受詔及賜物樞密院議數日不决王德用陳執中欲斬之盛度張觀不可卒遣之但却其獻物周復送至境上德用請自將以討元昊不許初議誅元昊使者參知政事程琳以謂古者兵交使在其間宜善遣之以示大體其後使者益驕大臣以為患或議因使者入傳舍壓壞垣令死其下琳曰始不誅以罪有在也今既驕可暴其罪而誅之以明國法又何患耶乙卯以崇儀使趙嘉進子可宗為三班借職嘉進宣祖從子也己未審官院言舊制京朝官到院日各指定所入三路自景祐四年十二月詔始不拘路分而率任意擇地其闕官處擬奏不行今請復令指定三路如經三問闕不就並從本院據合入逺近定差若丁憂服闋并自不搬家地分替者更許一問從之二月壬戌朔太常丞詹庠上所著君臣龜鑑六十卷降敕奬諭癸亥命右諫議大夫任中師同定放天下缺負吏部流內銓言舊制選人並以有無職田注官而州縣所上頃畝多不實今以諸路物價貴賤定為三等京東西湖北淮南兩浙河南幕職令録以嵗收百五十石判司主簿尉百石陜西河東荆湖福建廣南幕職令録以二百石判司主簿尉以百五十石益梓利夔路幕職令録以百石判司主簿尉五十石並為有職田計諸路凡得六百八十餘處其有職田處即不許連任從之甲子中書言翰林醫官院醫官使二人直院七人尚藥奉御七人醫官三十人醫學四十人祗候醫人十三人其員猥多今定使副各二員直院四員尚藥奉御六員其額外將來毋得補人從之戊辰兵部員外郎知制誥謝絳知鄧州絳請之也距州百二十里有美陽堰引湍水溉公田水來逺而少利不及民濵堰築薪土為防俗謂之墩者大小又數十嵗數壞輒調民增築姦人蓄薪茭以時其急往往盜决堰故百姓苦之絳按召信臣六門堰故迹距城三里壅水注鉗廬陂溉田至三萬頃請復修之可罷州人嵗役以水與民未就而卒己巳改新知齊州郭勸知淄州時侍御史言范諷貶官居齊州而勸嘗為諷所薦故改命之庚午司天監主簿元軫言三式者隂陽家所重而學者絶稀請加其俸秩以招來之上謂宰臣張士遜曰隂陽家使人拘忌又多詭怪迂誕之說豈若觀人事之實以應天道也且令司天監以軫所言詳定復奏許明州立學仍給田五頃癸酉慶州言柔逺寨蕃部巡檢圭威招誘白豹寨都指揮使裴永昌以族內附詔補永昌三班借職本族巡檢户部判官郭稹言近日上封論列邊事者甚衆乞差近臣看詳有可采者委中書樞密院施行詔並送翰林學士就本院看詳毋得漏泄於外此據㑹要甲戌知麟州供備庫使朱觀請築外羅城以護井泉從之壬午詔新除近邊知州軍臣僚並令乘遞馬赴任限三月十日已前到時西邊有警故也戊子廢保安軍𣙜場庚寅詳定閣門客省四方館儀制所上新編儀制十三卷三月壬辰朔罷在京諸司庫務界滿監交官壬寅右正言直集賢院吳育言夫朝廷總制天下必建基立本以消患於未萌若政令修紀綱肅財用富恩信洽賞罰明士卒精將帥練則四夷望風自無異志有一未備則黠虜乘間而生心方今天下少安人情玩習而多務因循居常有議及政令紀綱邊防機要則謂之生事或有警急則必至匆遽而莫知所為若稍且安靜又無人敢輒言且夏州久有人往來中國熟見朝廷有因循之勢遂敢內蓄姦謀若以一時之事苟且支持或至爛額救焚揚湯止沸覆視前古厥鑒甚明伏望陛下從容延對左右大臣討論闕政博訪羣議修節用愛民之經求訓兵練將之策則一方小警不足慮也上嘉納之編修院與三司上歷代天下户數前漢千二百二十三萬三千六十二後漢千六百七萬七千九百六十魏九十四萬三千四百二十三晋二百四十五萬九千八百宋九十萬六千八百七十後魏三百三十七萬五千三百六十八北齊三百三萬二千五百二十八後周三百五十萬隋八百九十萬七千五百三十六唐九百六萬九千一百五十四太祖朝二百五十萬八千九百六十五太宗朝三百五十七萬四千二百五十七真宗朝八百六十六萬九千七百七十九寶元元年一千一十一萬四千二百九十先是上御邇英閣讀真宗皇帝所撰正說養民篇見歷代户口登耗之數顧謂侍臣曰今天下民籍幾何翰林侍讀學士梅詢對曰先帝所作蓋述前代帝王恭儉有節則户口充羡賦斂無藝則版圖衰減炳然在目作監後王自五代之季生齒雕耗大祖受命而太宗真宗繼聖承祧休養百姓今天下户口之數蓋倍於前矣因詔三司及編修院檢閲以聞至是上之甲辰西上閣門使唐州刺史并代路鈐轄王仲寶言比年內屬蕃部數逃徙外界蓋懼緣邊博糴配率之苦請一切蠲除緩急有警則可使扞禦邊陲仍乞詔府州折繼宣常加存撫從之丙午吳育又言聖人統御之策中外不同雖有旃裘之長向化賔服終待以外臣之禮羈縻勿絶而已或一有背叛亦來則備禦去則勿追蓋異俗殊方可置度外不足責也今元昊若止是鈔掠邊隅當置而不問若已見叛狀必須先行文告以詰其由不足同中國叛臣即加攻討大凡兵家之勢征討者貴在神速守禦者利在持重况北敵之性惟是剽急因而僞遁多誤王師武夫氣鋭輕進貪功或陷誘詐之機今宜明𤇺候堅壁清野以挫剽急之鋒而徐觀其勢此廟堂逺算也初元昊反書聞朝廷即議出兵羣臣爭言小醜可即誅滅育獨建議元昊雖名藩臣其尺賦斗租不入縣官窮漠之外服叛不常宜外置之示以不足責且彼已僭輿服夸示酋豪勢必不能自削宜援國初江南故事稍易其名可以順撫而收奏入宰相張士遜笑曰人言吳正言心風果然於是育復上奏俱不報心風據龍川别志然别志稱吳舍人則誤矣育時以右正言諫院供職明年五月乃知制誥又明年六月乃為起居舍人丁未徙知潤州范仲淹知越州戊申吳育又言近年以來多有造作䜟忌之語疑似之文或不顯姓名暗貼文字恣行毁謗以害讎嫌或密聞朝廷自謂忠赤若真是公直無隱何不指事明言若憑虛造作必藴邪謀更與隱祕姓名正使姦人得計臣恐自今忠良立身易為傾陷國家舉事便欲動搖惑君害時無大於此在古之法皆殺無赦雖陛下聰明必不熒惑亦不可使聖朝長此風俗詔開封府御史臺覺察以聞庚戌都官員外郎王素為侍御史中丞孔道輔薦之素旦子也壬子右司諌韓琦言乞自今差國信及接伴使副委中書樞密選擇進名若有臣僚輒敢陳乞望賜嚴斷從之㑹要寶元二年三月二十一日事二十一日壬子也癸丑天章閣侍講賈昌朝王宗道編排資善堂書籍其實教授內侍云甲寅詔如聞廣州界盜賊羣行至三百餘人而鈐轄不能巡察其選使臣為海上巡檢益發舟師捕擊之嘉勒斯賚遣李博木喇斡等貢方物乙卯御崇政殿閲試衛士武技擢殿前第一班押班副都知王圭為禮賔副使行門郝質為西頭供奉官特遷者凡九人圭開封人質介休人也丙辰許泉州立學仍給田五頃魏國永聖保夀夫人許氏卒輟視朝三日追號肅成賢穆夫人遣官護葬上為制服發哀視奠其喪葬日又輟視朝己而外間傳言復有繼魏國名秩者六宅使象州刺史郭承祐乘間以為言上謂左右曰宫中事中宫主之至於嬪御自有品秩未嘗預事朕於禁中每務肅靜外間未知此爾然承祐所言亦當申戒之承祐娶華王元稱女性狡獪緣東宫恩又慿藉王邸親既廢復用時輒言事或指切人過失同列謂之武諫官承祐論魏國名秩此據寶訓及政和㑹要也知廬州兵部郎中直史館張億兼提舉廬壽蘄黃光舒濠州無為軍兵甲巡檢公事丁巳鑄皇宋通寶錢國朝錢文皆曰元寶而冠以年號及改號寶元文當曰寶元元寶詔學士院議因請改曰豐濟元寶上特命以皇宋通寶為文戊午賜鄜延環慶涇原秦鳯麟府等路緣邊軍士緡錢趙元昊為書及錦𫀆銀帶投鄜延境上以遺金明李士彬且約以叛候人得之諸將皆疑士彬副都部署夏元亨獨曰此行間耳士彬與羌世仇若有私約通贈遺豈使衆知耶乃召士彬與飲厚撫之士彬感泣不數日果擊賊取首馘羊馬自效李士彬不得其時或附石元孫為副都署前按今年五月夏守贇知樞密六月石元孫為鄜延副部署必代元亨者但史不詳記今附三月末詔權停貢舉夏四月辛酉朔新知兖州李迪加資政殿大學士癸亥以保順軍節度使邈川大首領嘉勒斯賚前妻安康郡君李氏為尼仍賜紫衣妻太原郡君喬氏為永嘉郡夫人子轄戩為澄州團練使默戩覺為順州團練使各賜襲衣金帶器幣及茶仍每月别給綵絹各十五匹時嘉勒斯賚父子猜阻異居不相統屬朝廷欲兼撫之故有是命然轄戩與默戩覺雖各治一城别立文法終不能揔攝諸蕃但自保爾李氏為尼事已附景祐三年末李氏為尼固不假朝廷爵命朝廷但賜之紫衣爾其稱以李氏為尼蓋當時詔辭非事實也戩嘉勒斯賚本傳云默戩覺初補嚴團後以恩團卒按默覺以恩團卒於嘉祐三年五月與本傳同其初補嚴團與實録不同合從實録轄戩默戩覺各居一城事附景祐三年甲子録階鳯等州都巡檢使內殿崇班史繼和子文慶為三班奉職友慶為借職仍賜其家錢十萬絹百匹又録鳯州巡檢左侍禁祖士龍子無偏無頗並為三班借職賜其家錢五萬絹十匹以繼和士龍與羣盜格鬬而死也賜延州修城役卒緡錢乙丑放宫人二百七人上因諭宰臣張士遜等曰不獨矜其幽閉亦可省禁掖浮費也近復有人邀車駕獻雙生二女子朕却而不受士遜對曰前代帝王多為女色所惑今陛下不受其獻又减放宫嬪誠盛德之事也然天聖末士遜亦嘗納女口於宫中為御史楊偕所彈云楊偕以天聖八年七月為監察御史九年三月遷殿中十一月謫官明道間遷侍御史景祐元年四月知雜事其劾張士遜必在天聖末也同州觀察使秦鳯路都部署曹琮兼本路安撫知河南府宋綬言府界民間訛言有冦兵大至老幼皆奔走入城郭又鄉民多為白衣㑹以惑衆請立賞募告者從之又詔官吏不即捕繫當重填其罪丁卯環慶鈐轄髙繼嵩言今元昊將舉兵冦延安請令石隰州發五關塞捉生兵夜濟大河入定仙嶺鐡笳平設伏掩襲從之戊辰命天章閣侍講趙希言楊安國同編排資善堂書籍河北緣邊安撫司請於緣邊河百萬渦寨下至海口泥姑寨空隙處增置巡鋪從之辛未契丹遣彰聖軍節度使耶律九方政事舍人張渥賀乾元節壬申詔昭州運糧丁夫為蠻冦殺害者免其家差徭二年賦稅一年傷者免賦稅一年尋録司户參軍皇甫近子望為郊社齊郎近以督運死於賊故也辛巳頴州言户部侍郎蔡齊卒贈兵部尚書諡曰文忠齊方重有文采不妄言自初仕未嘗至權門丁謂秉政欲齊親已齊終不往然性謙退有善未嘗自伐篤於故舊少與徐人劉顔善顔罪廢齊上其書數十萬言得復官顔卒又以女妻其子庠龎籍楊偕劉隨假少連皆齊所薦後多為名臣諫官吳育言資善堂教授內臣而以編修為名非盛朝所務也癸未詔罷之置信安軍通判一員丙戌環慶部署劉平請下陕西緣邊都部署司如遇蕃冦鈔邊令諸路㑹兵更為應援從之丁亥詔河東陜西募民入粟實邊戊子增賜麟州飛騎指揮皮裘錢一千以其善捍邊也己丑詔御史臺編排勳臣少卿監及正刺史以上子孫五月辛卯朔詔如聞諸州軍命官犯罪而長吏所不說者或傅之深文自今獄具更申轉運提㸃刑獄司差官理問以聞癸巳詔翰林學士至知雜御史節度使至諸司使各舉京朝官及殿直以上有方略材勇通知邊事者各二人甲午太常博士集賢校理李丕諒為尚食副使丕諒家本秦人習知西鄙事右司諫韓琦薦其材而特換之丕諒非所樂也尋引疾自陳復舊官職增永興軍延州通判各一員丙申羣牧司請下秦州增價市馬從之己亥詔皇族之家及諸命婦女冠尼等非朝元節南郊進奉并每嵗孟冬朔毋得入內其親王夫人長主即勿拘先是外戚疏逺多緣嵗時入禁中有所干謁言者請一切禁絶之故降是詔右司諫韓琦嘗言國家祖宗以來躬决萬務凡於賞罰任使必與兩制大臣於外朝公議或有內中批㫖皆是出於宸𠂻只自章獻明肅太后垂簾之日遂有奔競之輩貨賂公行假託皇親因緣女謁或於內中下表或只口為奏求是致僥幸日滋賞罰倒置法律不能懲有罪爵祿無以勸立功唐之斜封今之內降蠧壞綱紀為害至深陛下聖德日新勵精為治惟此久弊沿而未除臣愚竊謂固非陛下聖意聽其妄請付外之後自有攸司執奏而止其如中㫖或至再三不能一一論正臣欲乞特降詔諭今後除諸宫宅皇族有己分事方許於內中奏陳自餘戚里之家及文武臣僚或有奏請事件並於閣門及合屬去處進狀更不許於內中批㫖如輒敢因緣請託及自於內中陳乞特批指揮即望降出姓名并為求奏人並送有司勘劾重行貶責犯者斷在必行如此則聖政無私朝規有叙矣琦此言不得其時家傳在論內侍遷官後存稿在陳恢越職前今且附此更須詳考癸卯司封員外郎直集賢院兼天章閣侍讀賈昌朝上書曰今西夏僣狂出師命將以遺朝廷之憂臣竊謂此固不足慮而國家用度數廣儲蓄不厚民力頗困是則可憂自天聖以來屢詔有司節省用度以至於今未聞有所施行古者四方無事則修政令務稼穡倉廪有積榖府庫有羡財節用愛人以戒不虞卒有水旱冦攘之至而無所憂自三代而下稱王業盛者惟漢耳文景以恭儉故風俗厚財用足至於武帝務勤征伐始算緡錢𣙜酤以助軍旅之給而天下蕭然矣至昭帝議鹽鐡罷𣙜酤省徭役篤耕種凡侵蠧民利者一切寬貸時賜租賦使民得以足衣食內則省宰夫减樂工希文景之風以厚儲蓄數百年間四夷咸服百姓不厭漢德者無他道也節用愛人敦本抑末之所致也宋受命八十載可謂治平矣然節愛之術有所未至邊陲雖寧而兵備不省徭役雖簡而農務不篤外厚幣聘而內豐廪假自餘虛用冗費難以悉數天下諸道若京之東西財可自足陜右河朔嵗須供饋所仰者淮南江東數十郡耳故田稅不足重以𣙜禁凡山澤市井之利靡有厚薄悉入於公上而民不得售加以不耕不織遊惰之俗蠶食為害都人士女燕安太平忘衣食艱難之患習尚奢侈重傷民力農所以困國之儲蓄所以不厚者職此之由夫國財民力靡於無用之日故當其有用不得不憂臣嘗治畿邑有禁兵三千而留萬户賦輸僅能足其三年賞給仍出自內府况他郡邑兵不啻此推是可以知天下虛實矣臣又嘗掌京廪計江淮嵗運糧六百餘萬以一嵗之入僅能充朝廷之用三分二在軍旅一在冗食先所蓄聚不盈數載天下太平已久而財不藏於國又不在於民儻有水旱頻仍之災軍戎調度之急計將安出哉願陛下鑒已往之失察當今之務取景德已來迄於景祐凡百用度靡有巨細校其所入所出之數約以祖宗舊制其不急皆省罷之詔樞密直學士工部侍郎李若谷右諫議大夫任中師右司諫直集賢院韓琦與三司詳所奏定奪減省以聞甲辰詔非出節臣僚及正觀察使已上毋得自宣德門至天漢橋御路行馬若從駕及宗室內庭諸宫院車駕勿拘時著作左郎王師旦行馬御路上既被劾而刑部因言舊條止許近上臣僚行馬而無指定官品故下御史臺太常禮院詳定而降是詔丙午刑部員外郎天章閣待制龎籍為陜西體量安撫使西上閣門使王克基副之度支副使兵部員外郎假少連為河東體量安撫使西染院副使兼閣門通事舍人符惟忠副之仍令所至燕犒將校及蕃部首領徙環慶鈐轄髙繼嵩為涇原鈐轄己酉御崇政殿録繫囚雜犯死罪以下遞降二等杖以下釋之宣徽南院使定國節度使知樞密院事王德用狀貌雄毅面黑而頸以下白晳人皆異之其居第在泰寧坊直宫城北隅開封府推官蘇紳嘗疏德用宅枕朝岡貌類藝祖帝匿其疏不下御史中丞孔道輔繼言之語與紳同且謂德用得士心不宜久典機密壬子罷為武寧節度使赴本鎮德用尋以居第獻詔𨽻芳林園給其直德用傳及紳傳並稱紳論德用時任翰林學士誤也德用罷樞密時紳但為館職開封推官耳傳又云即日獻其第恐未必如是之亟也德用嘗有章自辨當檢附鎮海節度使夏守贇知樞密院事班陳執中上李若谷下守贇時為真定府路都部署召用之既入見帝問西事守贇言平時小寨屯兵馬不及千餘苐可禦草冦耳若賊兵盛至固守不暇安能出鬬耶宜并小寨兵馬共扼衝要伺便邀擊可以成功帝深然之守贇班次乃丙辰日詔今并書韓琦言今欲減省浮費莫如自宫掖始請令三司取入內內侍省并御藥院內東門司先朝及今來賜豫支費之目比附酌中皆從減省無名者一切罷之詔禁中支費只令入內內侍省御藥院內東門司同相度減省報詳定所其臣僚賜豫即許㑹問入內內侍省等處施行琦又言景德至景祐文書有司必不備具若俟取索齊集始議裁減徒成淹久但考今日調度實為浮費者即可蠲省如故將相戚里及權近之家多占六軍耗蠧縣官衣糧有妨征役在京者不啻數千人若此類何必待景德景祐文書較耶詔從之癸丑罷羣牧制置使尋復之乙卯御藥院言今減定本院并內中看經道場大㑹錢絹計萬四千貫六月壬戌詔曰比命近臣議省浮費自乘輿服御及宫掖所須宜如前詔務從簡約若吏兵祿賜毋得輒行裁減時論者或從損吏兵俸賜帝曰祿廪皆有定制毋遽更變以搖人心宜申諭之故降是詔癸亥詔宗室遙郡并大將軍以上遇朔望令其長一人入內參起居丙寅左侍禁魯經為閣門祗候經使嘉勒斯賚還特擢之先是遣經持詔諭嘉勒斯賚使擊元昊以披其勢賜帛二萬匹斯賚奉詔出兵四萬五千嚮西凉西凉有備斯賚知不可攻捕殺遊邏數十人亟還聲言圖再舉然卒不能也初議重賄斯賚使擊元昊因以其地與之參知政事程琳曰使嘉勒氏得地是復生一元昊不若用間使二羌勢不合即中國之利也丁卯天章閣侍講賈昌朝直史館宋祁同修纂禮書戊辰詔朝官嘗犯贓而乞致仕者自今止與轉官更不推恩子孫己巳御崇政殿閲諸軍轉員凡三日庚午上封者言審官院闕有限而奏舉選人日益多或至四考五考改京官者請自今復六考以上方許磨勘嘗犯私罪者加一等從之辛未殿前都虞候榮州防禦使石元孫為鄜延路副都署壬申左千牛衛將軍宗實為右千牛衛大將軍始自宫中出還第時年八嵗英宗實録正史並云豫王生英宗乃還第按豫王以此年八月甲戌生英宗以六月壬申還第實録正史蓋不審也癸酉詔應武舉授班行者多在內地為監當官宜並從陜西緣邊軍塞及捉賊任使以試其能曹濮單三州言蝗初用盛度王隨議許解鹽通商行之一年嵗入視天聖七年增緡錢十五萬明年更增九萬其後嵗益減耗於是諫官韓琦論其利害請召近臣考新舊法擇其利可久者議為之制乙亥命翰林學士宋祁知制誥王堯臣與三司共議祁等以天聖九年至寶元元年新法較之視乾興至天聖八年舊法嵗課損二百三十六萬緡明年即詔京師南京及京東州軍淮南宿亳州皆禁如舊未幾復弛京師𣙜法又明年更議通淮南鹽給京東等八州軍而兖鄆宿亳其後遂皆食淮南鹽此據本志云康定元年即詔禁鹽如舊不知是何月又曰未幾復弛京師禁亦不知何時今並附見又云並詔三司議通淮南鹽實録在慶厯元年正月距此凡二年而本志遂聫書之取行文省便耳今亦附見於此仍别出於彼知滄州萊州團練使葛懷敏王德用之妹壻也德用既謫徐州言者謂方德用當權而懷敏連被擢用詔降懷敏知滁州先是詔陜西安撫使龎籍諭㫖知永興軍夏竦議西鄙事丙子竦言繼遷一族本黨項遺種居呼韓舊地東薄銀夏西並靈鹽南趨鄜延北抵豐㑹迤邐平夏幅員千里太平興國中繼遷逃背鳩集萬騎屢冦朔方嵗發兵夫送糧瀚海邀險肆掠為害不一至道初特遣洛苑使白志榮率重兵護糧四十餘萬遇冦浦洛河兵夫潰走自相蹂籍糧卒並沒志榮等僅以身免朝廷旰食關鋪騷然太宗皇帝召宰臣議而吕端始欲發卒由麟府丹延環慶三路趨平夏襲其巢穴太宗難之且曰三道深入用甲兵幾萬以何人為將帥表裏沙磧於何地㑹合須更熟籌不可輕舉是時邊患方深議者不已至秋遂命李繼隆出環州丁罕出慶州范廷召出延州王超出夏州張守恩出麟州五路趨平夏竭內帑之財罄關中之力繼隆與丁罕兵合行十數日不見賊張守恩見賊不擊相繼引還王超范廷召至烏白池以諸將失期士卒困乏而還是時臣父皓𨽻廷召麾下並見輕舉之害然繼遷當兄繼捧入朝之後為曹光實掩襲之餘遁逃之跡窮蹙可知凉州博囉齊沙州曹延祿皆受朝廷節度使掎角追討靈州河外大掠河西北藏擦勒等數十大蕃族皆有讎怨願助國討除尚猶積年不能撲滅太宗又謂宰臣曰卿等莫有擘畫否時宰臣相顧錯愕莫能對太宗亦不恱久之真宗即位監追討之弊愍關輔之勞惟戒疆吏謹𤇺候嚴卒乘來即驅逐去勿追捕嘗出陜右地圖自指山川堡寨以示輔臣令移民簡費又以涇原最要害屯兵且衆命增置鈐轄都監以僃奔軼此實真宗之逺圖也然拓跋之境自靈武陷沒銀綏割棄以來假朝廷威靈聚中原祿賜略有河外服屬小蕃德明元昊久相繼襲貨易華戎捃剝財利拓地千餘里積貨數十年較之繼遷勢已相萬其於朝廷待以羈縻置而不問芻豢過飽猖獗遽彰議者莫不欲大行誅討然而兵者凶器戰者危事聖人不得已而用之自昔兵家皆欲先勝而後戰即舉無遺策以繼遷窮蹙比元昊富貴事勢可知也以先朝纍勝之軍較當今關東之兵勇怯可知也以興國習戰之師方緣邉未試之將工拙可知也繼遷逃伏平夏元昊窟穴河北地勢可知也若分兵深入則軍行三十里自齎糧糗不能支久須載芻粟難於援送師行賊境利於速戰儻進則賊避其鋒退則敵躡其後晝設竒伏夜燒營栅師老糧匱深可虞也若窮其巢穴須渡大河既無長舟巨艦則須浮囊挽綆賊列寨河上以逸待勞我師半渡左右來擊未知何謀可以捍禦臣以為不較主客之利不計攻守之便議追討者是為無策若善治壁壘修利器械約束將佐控扼險阻但趣過於嵗月不預計於勝負是今之常制也所慮體分勢異衆力不齊曠日持久軍食難繼事不先定必有後憂若詰以威令格以干羽勝决帷幄師行枕席必有成算繫於前籌此非臣之所及也謹上十策一教習強弩以為竒兵二羈縻屬羌以為藩籬三詔嘉勒斯賚父子并力破賊四度地形險易逺近寨栅多少軍士勇怯而增減屯兵五諸路互相應援六募土人為兵號神虎保捷州各一二千人以代東兵七增置弓手壯丁獵戶以僃城守八並邊小寨毋積芻糧賊攻急則棄小寨入保大寨以全兵力九關中民坐纍若過誤者許入粟贖罪銅一斤為粟五㪷以贍邊計十損並邊冗兵冗官及減騎軍以紓饋運當時頗采用之竦正傳云竦在涇州龎籍就竦計事竦因上此奏與實録不同今從實録丁丑益州言火焚民廬舍三千餘區時火起南市知州張逸心疑有變與轉運使明鎬夜領衆往而實不救火故所焚甚衆壬午詔削趙元昊官爵除屬籍揭榜於邊募人擒元昊若斬首獻即以為定難節度使元昊界蕃漢職員能帥族歸順者等第推恩初保忠但賜國姓而詔言除屬籍誤也吕氏家孰記云趙元昊反有詔削奪在身官爵募能生擒元昊若斬首者即以為節度使仍賜錢萬萬許公時在大名聞之驚曰謀之誤矣立削奏曰前代方鎮叛命如此誥誓則有之矣非所以御外國也萬一反有不遜之言得無損國體乎朝廷方改之已聞有指斥之詞矣寶元元年十二月元昊反書聞即絶緣邊互市今詔但削奪官爵設賞格耳本傳并言絶互市蓋誤也甲申右正言知制誥鄭戬權發遣開封府事胥偃在病告也徙監泰州酒稅祕書丞余靖知英州崇信掌書記監郢州酒務尹洙為太子中允知長水縣乾德縣令歐陽修為鎮南掌書記權武成軍判官乙酉博州團練使開封劉謙為環慶副部署兼知邠州謙不知書然區處鬬訟曲直皆當其理前此為守者多強市民物以飾厨傳謙獨無所擾邠人頗愛之莫州刺史任福為嵐石隰州都巡檢使既辭奏曰河東蕃戎往來之徑地介大河斥候踈闊願嚴守備以戒不虞帝善之福開封人也罷街道司令東西八作司領之丙戌詔河東安撫司移文諭契丹以元昊反已奪官除籍及緣邊益兵之意戊子知辰州內殿崇班閣門祗候張昭懿為內殿承制以招輯狤獠三千餘人內附也置威州兵馬監押一員
