body:
  text: 續資治通鑑長編卷十八宋李燾撰太宗太平興國二年春正月丙寅命禮部員外郎賈黃中左補闕程能左贊善大夫馮瓚分掌左藏三庫先是貨泉與金帛通掌嵗久儲蓄盈羡始命分之謂侍臣曰朕以涼德繼守鴻圖凡機務邉事皆奉行先帝成規不敢輒有改易然財貨充溢勢須别置官吏使各專其職耳黃中尋出知升州嘗案行府廨見一室扄鐍甚固命發鑰視之得金寶數十匱計其價直數萬萬乃李氏宫閣中遺物未著於籍即表上之上曰非黃中亷恪則亡國之寶將汚法而害人矣賜錢二十萬黃中知升州不得其月日據本傳在二年今附見於此徐度國紀載之二月庚子不知何據也五代藩鎮多遣親吏往諸道回圖販易所過皆免其算既多財則務為奢僭養馬至千餘匹童僕亦千餘人國初大功臣數十人猶襲舊風太祖患之未能止絶於是詔中外臣僚自今不得因乘傳出入齎輕貨邀厚利并不得令人於諸處回圖與民爭利有不如詔者州縣長吏以名奏聞又申禁藩鎮補親吏為鎮將自此但以牙校為之亦有宣補者禁藩侯不得補親吏為鎮將本志及會要並載於此年實録乃無之今因禁臣僚與民爭利附見其實開寶三年五月已禁矣上初即位以疆宇至逺吏員益衆思廣振淹滯以資其闕顧謂侍臣曰朕欲博求俊乂於科場中非敢望拔十得五止得一二亦可為致治之具矣先是諸道所發貢士凡五千三百餘人命太子中允直舍人院張洎右補闕石熙載試進士左贊善大夫侯陶等試諸科户部郎中侯陟監之於是禮部上所試合格人名戊辰上御講武殿內出詩賦題覆試進士賦韻平側相間依次用命翰林學士李昉扈蒙定其優劣為三等得河南吕蒙正以下一百九人庚午覆試諸科得二百七人並賜及第又詔禮部閲貢籍得十五舉以上進士及諸科一百八十四人並賜出身九經七人不中格上憐其老特賜同三傳出身凡五百人皆先賜緑袍鞾笏錫宴開寶寺上自為詩二章賜之唐時禮部放榜之後醵飲於曲江號曰聞喜宴五代多於佛舍名園周顯德中官為主之上命中使典領供帳甚盛第一第二等進士并九經授將作監丞大理評事通判諸州同出身進士及諸科並送吏部免選優等注擬初資職事判司簿尉寵章殊異歷代所未有也薛居正等言取人太多用人太驟上意方欲興文教抑武事弗聽及蒙正等辭特召令升殿諭之曰到治所事有不便於民者疾置以聞仍賜裝錢人二十萬興文教抑武事此據稽古録賜進士宴在己巳先解褐在壬申得十五舉進士在辛巳注官在三月戊子今并言之都不書曰實録所載人數與國史志不同今從本志或云太祖之幸西京也洛陽人張齊賢獻下并汾富民封建敦孝舉賢太學籍田選良吏懲姦謹刑十䇿太祖召見便坐問之齊賢以手畫地條陳太祖善其四策齊賢堅執其餘策皆善太祖怒令衛士拽出及還語上曰我幸西京惟得一張齊賢我不欲遂官爵之汝異時可收以自輔也於是齊賢舉進士上決欲置之髙等而有司第其名適在數十人後上不悅乃詔進士盡第二等及九經凡一百三十人悉與超除蓋為齊賢故也此事據魏泰東軒記刪修亦未知信否故稱或云且兩存之更俟詳考齊賢通判衡州時州鞫劫盜十餘皆論死齊賢始至為辨理存活者五人獄官及知州事恐懼譴責齊賢曰齊賢初成一名豈欲委罪衆人而自為功乎第令改正而已自江陵至桂州有水遞鋪夫凡數千户皆漁樵細民衣食不給湘江多巨潭險石而程限與陸鋪等或阻風濤隂雨率被笞捶齊賢言其事詔每鋪夫各減半吳越王俶遣其子溫州刺史惟演來修貢賀登極先是諸州掾曹及縣令簿尉皆吏部南曹給印紙歷子外或别給公據壬申詔罷公據申明書歷之制上以榷課未均遣使分詣諸州與長吏同裁定及募髙資人主之癸酉以商鳳為東上閣門使上在藩邸時鳳居典客之任踐阼之五日陳從信以右知客押衙為西上閣門使樞密承旨程德元以藥院押衙為翰林使陳贊以弓箭庫官為軍器庫副使王延德以監厨為御厨副使鳳時在病告中及是愈乃有是命延德東明人也商鳳未見陳贊亦未見乙亥賜鄉貢進士孔世基同本科出身褒先聖之後也丙子幸相國寺還御東華門觀燈己卯吳越國王妃孫氏卒詔給事中程羽為弔祭使庚辰詔以美名易禁軍舊號鐡騎曰日騎控鶴曰天武龍騎曰龍衛虎捷曰神衛五代以來諸方割據罪人率配𨽻西北邉然多亡投塞外誘羌戎為寇己丑詔自今當徙者皆配廣南勿復𨽻秦州靈州通逺軍及沿邉諸州雍州言廣源州蠻酋坦綽儂民富案宋史作坦坦綽農民富以偽漢所置十州首領詔敕來獻欲比七源州內附輸賦稅而思琅州蠻蔽塞使不得通願朝廷舉兵誅思琅州詔授坦綽儂民富檢校司空案宋史作檢校司空御史大夫上柱國令廣州轉運使徐道招來之徐道未見辛卯幸講武池以新龍興寺為太平興國寺初江南諸州官市茶十分之八餘二分復稅其什一然後給符聽其貨鬻商人旁緣為姦踰江涉淮頗紊國法轉運使樊若氷請禁之仍增所市之直以便民李煜舊用鐡錢於民不便二月壬辰朔若氷請置監於升鄂饒等州大鑄銅錢凡山之出銅者悉禁民採並取以給官鑄諸州官所貯銅錢數盡發以市金帛輕貨上供及博糴麥銅錢既不度江益以新錢民間錢愈多鐡錢自當不用悉鑄為農器以給江北流民之歸附者且除銅錢度江之禁詔從其請民甚便之鑄鐡錢為農器别本實録見七月丁亥今并書之然煜用兵際權宜調斂若氷悉奏以為常賦民頗怨懟若氷少貧賤嘗為豫章富人洪氏所辱心恨之既而洪氏掌本郡榷酤負煜時嵗課鐡錢數百萬若氷悉收銅錢洪氏幾至破産案樊若氷宋史作樊若水屢見前第十五卷及第十六卷癸巳吳越王俶遣使來修時貢命户部員外郎兼侍御史知雜事雷德驤提點開封府管界鹽麴商稅課利甲午建鄂州永興縣為永興軍契丹遣使來賀上登極賀正右千牛衛上將軍李煜自言其貧乙未詔賜錢三百萬煜雖貧張洎猶丐索之煜以白金頮面器與洎洎意歉然時潘謹修掌煜記室洎疑謹修教煜素與謹修善自是亦稍疏焉初比部郎中張全操慷慨敢言外事太祖甚寵遇之命知靈州委以邉事全操部送嵗市官馬賂所過蕃族物粗惡戎人恚怒不受全操捕得十八人殺之沒入其兵仗羊馬戎人大擾朝廷遣使齎金帛撫賜其族與之盟始定上怒召全操下獄鞫之丁酉決杖流海島全操江東人也全操當是乾德四年知光化軍進羡利也西山巡檢郭進言北漢胡桃寨指揮使史溫等四十四户二百四十五口內附戊戌詔京朝官出知節鎮者借紫知防團刺史州及通判並借緋罷日依舊以鎮東軍安撫使知越州錢儀為慎瑞師等州觀察使仍知越州宣德軍安撫使知湖州錢信為新媯儒等州觀察使仍知湖州儀信皆吳越王俶之弟儀好晝寢多以夜決府事及遊宴信嘗為僧後反初服因其請而有是命蓋執政者戲之也上為晉王時左屯衛上將軍張鐸嘗假錢百六十萬於是詔悉貰之己亥吳越王俶以山陵有期遣使來修賻禮庚子上改名炅詔除已改州縣職官及人名外舊名二字不須廽避壬寅大宴崇德殿不作樂乙巳幸新鑿池賜役卒三萬五千人人千錢布一端遂幸講武池宴射玉津園丙午始分西川為東西兩路各置轉運使副使兵部郎中許仲宣為西路轉運使考功員外郎滕中正為東路轉運使中正北海人也丁未占城國遣使來貢方物有司言江南諸州榷茶凖敕於緣江置榷貨諸務百姓有藏茶於私家者差定其法著於甲令匿而不聞者許鄰里告之賞以金帛咸有差品仍於要害處縣法以示之詔從其請凡出茶州縣民輒留及賣鬻計直千貫以上黥面送闕下婦人配為鐡工民間私茶減本犯人罪之半榷務主吏盜官茶販鬻錢五百以下徒三年三貫以上黥面送闕下茶園户輒毁敗其叢株者案叢株文獻通考作業樹計所出茶論如法有司又言煮鹽之利以佐用度非申明禁法則豪民專之山澤之出不能盡征於王府矣應江南諸州先通商處已悉禁之凡舄土鹵水民並不得私煮鹽差定其罪著于甲令其諸處池監監臨主者盜官鹽販鬻以規利亦如盜煮鹽之法其通商禁法等處及西路青白鹽各相伺察不得令私鹽侵奪公利犯者自一兩至二百斤論罪有差於是比乾德之禁增闌入至二百斤以上煮鹻及主吏盜販至百斤以上蠶鹽入城市五百斤以上並杖背黥面送闕下初右監門衛率府副率王繼勳分司西京殘暴愈甚強市民家子女以備給使小不如意即殺而食之以槥櫝貯其骨出棄於野外女儈及鬻棺者出入其門不絶民甚苦之而不敢告上在藩邸頗聞其事及即位會有訴者亟命户部員外郎知雜事雷德驤乘傳往鞫之繼勳具伏自開寶六年四月至今手所殺婢百餘人乙卯斬繼勳於洛陽市并斬女儈八人洛陽民三輩皆為繼勳強市子女者長夀寺僧惠廣嘗與繼勳同食人肉上令先折其脛然後斬之民皆稱快戊午宰臣薛居正沈倫盧多遜樞密使曹彬楚昭輔各賜錢五百萬銀三百斤宣徽南院使潘美北院使王仁鎬各賜錢三百五十萬銀二百斤己未諂劉鋹李煜常俸外增以它給賜齊王廷美絹萬匹錢五百萬武功郡王德昭絹五千匹錢五百萬興元尹德芳絹三千匹錢三百萬庚申賜殿前都指揮使楊信馬軍都指揮使黨進銀各六百斤殿前都虞候李重勳馬軍都虞候李漢瓊步軍都虞候劉遇神衛左右廂都指揮使楊美銀各三百斤美即光美也辛酉詔諸道所給幕職州縣官俸其物價當以時定勿令虧損不充七分之數新擬竇州録事參軍孟蠻避逺宦不之任詣匭自陳上怒命決杖流海島祖宗故事有引事惑衆誣罔切害八字疑修書官潤色今從實録戊午幸太平興國寺遂幸造船務賜工徒人千錢布一端還幸建隆觀太祖受禪文武五品以上皆得廕子弟上即位諸道州府各遣子弟奉方物來貢上悉授以試銜及三班舊制以恩澤授散試官者不得同正官赴選於是新授試大理評事王懷挺張擢上言雖迃朝命未有選期願賜甄收許歸銓綜三月壬戌朔詔應授試銜等人特定七選赴集試銜有選自擢等始也癸亥工部郎中侯陟言祠部給僧尼牒每通納百錢於有司請罷之嵗令諸州上僧尼之籍于祠部下其牒俾長吏親給之詔從其請甲子吳越王俶復遣使來修時貢乙丑始頒銅禁於江南諸州侍御史任惟吉前通判陜州為下所告按得其贓丙寅詔削奪官爵配𨽻汝州鎮國行軍司馬王祜惟吉姻也祜知制誥嘗引薦惟吉詔奪祜兩季俸壬申清明始賜近臣新火河陽三城節度使趙普來朝乞赴太祖山陵乙亥授太子少保留京師右千牛衛將軍董繼業前知辰州私販鹽賦於民斤為布一匹鹽止十二兩而布必度以四十尺民甚苦之有詣闕訴其事者下御史獄鞫實於是責繼業為本部中郎將香藥庫使髙唐張遜建議請置榷易局大出官庫香藥寶貨稍增其價許商人入金帛買之嵗可得錢五十萬貫以濟國用使外國物有所泄上然之一嵗中果得三十萬貫自是嵗有增羡卒至五十萬貫熊克九朝通略仍令非出官庫者無得私相易戊寅命翰林學士李昉等編類書為一千卷小説為五百卷初節度使得補子弟為軍中牙校因父兄財力率豪橫奢縱民間苦之洛下有十衙內尤放恣左驍衛上將軍太原田景咸子漢明其一也上雅知其弊始即位即詔諸州府籍其名部送闕下至者凡百人癸未悉補殿前承旨以賤職羈縻之餘五人老病不任事遣還庚寅知江州周述言廬山白鹿洞學徒常數千百人乞賜九經使之肄習詔國子監給本仍傳送之秦州言戎人安家族冦長山寨巡檢使韋韜擊走之韜未見契丹在太祖朝雖聽沿邉互市而未有官司是月始令鎮易雄霸滄州各置榷務命常參官與內侍同掌輦香藥犀象及茶與相貿易熊克九朝通略云後有范陽之師乃罷不與通八作副使綦廷圭病告滿不落籍及愈不朝參即入班中宣徽使潘美王仁贍並坐奪一季俸錢東上閣門使商鳳西上閣門使陳從信責授間廄使閣門祗候餘抵罪有差是年正月癸酉鳳為東上閣門使此事不知在何時今附見三月末更俟考詳夏四月辛卯朔右拾遺郭泌言劔南諸州官糶鹽斤為錢七十豪民黠吏相與囊槖為姦賤市於官貴糶於民斤為錢或至數百望稍增舊價為百五十則豪猾無以規利而民食賤鹽矣從之大食國遣使來貢方物先是詔於潞州北亂栁石圍中築城甲午賜名威勝軍丁酉以鎮州廣陽寨為平定軍己亥以延州永安鎮為保安軍殿中丞劉珝勒停仍永不録用坐知劔州有盜官物者珝募人告獲上言乞賞告者朝廷以珝不用心捕賊擅立賞募人故有是命此據别本壬寅令西川諸州幕職官常俸外更增給錢五千甲寅契丹遣鴻臚少卿耶律敞等來助葬乙卯葬太祖英武聖文神德皇帝于永昌陵太祖宴駕詔翰林學士户部侍郎李昉兼判太常寺昉歸語其子宗諤等曰堂吏不知典故豈有為丞郎而判寺乎若言判寺自丞以下至簿皆可判也何暇别命官乎唐朝丞郎兼判他局者甚多或官髙則言判某官事或官卑則言知某官事或未即真則言權知某官事或言檢校某官事唯太常卿尤為重任未聞可總而判之必朝廷不以吾不才當言權知太常卿事可矣然近者竇儀判大理寺崔頌判國子監此蓋失之久矣宗諤因問凡制敕所出必自宰相今言堂吏不知典故何也昉曰命官判寺宰相必不經心惟堂吏舉近例使押字耳昉又言自太祖臨御以來百司吏艱於選補後進者多不習故事由是臺省舊規漸成廢墜云延州民飢詔以粟二萬斛貸之丁巳以潛龍時講學莊傑為酸棗縣令賜塗金帶銀鞍勒馬白金緡錢等莊傑未見是月作景福殿降詔恤刑自是每嵗夏首常舉行之五月辛酉朔賜永昌陵執事官器幣有差諸司職掌及行事吏部選人第減其選上勵精求理前詔轉運使考案諸州凡諸職任第其優劣尋復遣使分行諸道亷察官吏壬戌河南府法曹參軍髙丕伊闕縣主簿翟嶙鄭州滎澤縣令申廷溫皆坐罷軟不勝任惰慢不親事免官上初即位安逺節度使向拱武勝節度使張永德橫海節度使張美鎮寧節度使劉庭讓皆來朝癸亥以拱永德並為左衛上將軍美為左驍衛上將軍庭讓為右驍衛上將軍制辭云不敢以藩領之任重煩舊德也初兖州龔丘縣李氏女少喪父母病心痛李禱於神不食者半月自是不復食五穀水漿不入口踰八年忽一日縱火焚其舍登山結草為廬以居州遣吏視之圍守經七日不飲食以其事聞甲子詔本州釋之令遂其性乙丑幸新水磑遂幸玉津園宴射丙寅涇州言安定民妻怒其夫前妻之子婦斷其喉而殺之上謂左右曰法當原情此必由繼嫡之際愛憎殊别固當以凡人論也乃詔自今繼母殺傷夫前妻之子及其婦並以殺傷凡人論嘗為人繼母而夫死改嫁者不得占夫家財物當盡付夫之子孫幼者官為檢校俟其長然後給之違者以盜論庚午命起居舍人辛仲甫使于契丹右贊善大夫穆被副之仲甫至境上聞朝廷議興師伐北漢實倚契丹為援遲留未敢進飛奏俟報有詔遣行既至契丹主問曰聞中朝有黨進者真驍將如進之比凡幾人仲甫對曰名將甚多如進鷹犬之材何可勝數契丹主頗欲留之仲甫曰信以成義義不可留有死而己契丹主知其秉節不可奪厚禮遣還上嘗謂左右曰仲甫逺使絶域練逹機宜可謂不辱君命若更得人如仲甫數人朕何患也是日宴崇政殿不作樂蔡州團練使張延範前知廣州火焚公帑香藥珠貝犀象殆盡延範奏不以實又縱私奴三輩於部下受賕御史府案得其狀上先命斬其奴於廣州市癸酉責延範為護國行軍司馬初曹翰屠江州民無噍類其田宅悉為江北賈人所占有詔州長吏訪尋其民之鄉里踈逺親屬給還之知州張霽受賈人賂為隱蔽不盡與民民訴其事戊寅霽決杖流海島常州言民訛言官取良人女充後宫民間相驚不俟媒妁而嫁者甚衆詔捕作訛言者得徐銓等數人悉抵法己卯祔太祖神主于太廟廟樂曰大定之舞以孝明皇后王氏配又以懿德皇后符氏淑德皇后尹氏祔别廟熊克九朝通略又以孝惠懿德淑德三后祔别廟庚辰詔修鳳翔府終南山北帝宮宮即張守真所築以祀神者也辛巳平海節度使陳洪進言已離本道入朝丁亥詔太子中舍陳鄂等同詳定玉篇切韻藝文志載鄂等重詳定篇韻在雍熙中與本紀實録不同恐志誤也今不取六月乙未磁州言保安等縣有黑蟲羣飛夜出晝隱食桑葉殆盡詔免其桑稅癸卯知秦州張炳言先受詔以倉粟糶與貧民使者劉文保復齎詔詔臣罷之民飢益甚轉死溝壑者愈衆臣與文保矯詔開倉救百姓倒垂之急願以屬吏詔釋其罪全州潁州言大水壞民廬舍乙卯幸開寶寺遂幸飛龍院賜從官馬人一匹己未江南西路轉運司言諸州蠶桑少而金價頗低今折稅絹估小而傷民金估髙而傷官金上等舊估兩十千今請估八千絹上等舊匹一千今請估一千三百餘以次增損從之秋七月詔華州元籍入陽平市大吏田宅悉給還之壬戌斬宦者周延峭坐齎詔至宋州視官糴擅離糴所出城飲酒遺失詔書故也開寶末上在晉邸遣親信詣西邉市馬還宿要册湫祠旁中夕夢神人語之曰晉王已即位矣汝可倍道還都使者至京兆果聞太祖升遐是嵗五月靜難節度使宋偓又言白龍見要册祠池中長數丈東向吐青白雲癸亥詔封湫神普濟王為顯聖王增飾祠宇春秋奉祠仍立碑紀其事河陽言河決溫縣鄭州言河決滎澤縣詔客省使翟守素發鄭之丁夫千五百人卒千人塞滎澤之決乙丑澶州言河決頓邱滑州言河決白馬道州言大水壞民廬舍諸州吏護送官物上供守藏者率硾鈎為姦故外州吏負官物或至破産不能償上聞之曰此豈為天下守財之道耶庚午令左藏庫及諸庫所受諸州上供均輸金銀絲綿及他物監臨官謹視主稱無令欺而多取犯者主稱及守藏吏皆斬監臨官亦重置其罪實録及食貨志載詔語與乾德四年張光操論芻粟餘羡詔語略同蓋史筆潤色今不復重見止著其事初周太祖以中書舍人魚崇諒為翰林學士時崇諒母留陜州求解官歸養詔豫長告辭日賜坐慰撫且賚其母衣物甚厚告滿百日屢遣使存問之尋拜禮部侍郎復為學士詔書諭旨令奉母歸闕崇諒再表辭以母老病不願離本土優詔不允屬嵗暮寒冽崇諒請俟春末入朝許之未幾聞周祖喪乃奔赴京師世宗舉行前詔崇諒辭曰先帝許臣至春末就職若因奔喪遽受命非禮也固請如前約及期崇諒將母即路會世宗征髙平崇諒未至陶穀間言曰崇諒宿留不來有顧望意世宗頗疑之崇諒又表陳母病詔許就養陜州訖太祖朝不起上雅聞其名欲召見之崇諒復辭以疾上不奪其志丙子授崇諒兵部侍郎致仕崇諒北海人初見長興四年初太祖為上聘故淄州刺史李處耘女既納幣會太祖崩丁丑始入宮戊寅遣左衛大將軍李崇矩馳驛自陜至滄棣按行河勢視隄岸之缺亟繕治之民田被水災者悉蠲其租自江南平嵗漕米數百萬石給京師增廣倉舍命常參官掌其出納內侍副之上猶恐吏槩量不平遣皇城卒變服覘邏於是亷得永豐倉持量者張遇等凡八輩受賕為姦庚辰悉斬之監倉右監門衛將軍范從簡等四人免官同監內侍決杖辛巳金壇縣尉周楚坐贓棄市詔諸州搜訪先賢筆迹圖畫因是月辛酉祖令孫進王羲之模本書附見詔在十月庚午閏七月庚寅朔以陳洪進將入朝遣翰林使程德元往宿州迎勞之癸巳以曹州定陶鎮為廣濟軍己亥幸白鶴橋臨金水河案宋史作白鶻橋殿直吳舜卿受詔募兵沂兖間至泗水驛被酒手殺平民八人兖州以聞上命械繫送闕下辛丑先折其兩足然後斬之丁未以平南軍為太平州己酉遣翰林學士李昉使吳越汴水溢壞開封大寧堤浸民田害稼詔發懷孟丁夫三千五百人塞之初天雄軍節度使兼侍中李繼勳鎮大名踰八年以疾求歸洛陽就醫藥許之仍賜錢千萬白金萬兩復上表乞骸骨庚戌授太子太師致仕繼勳數典大藩所至雖無善狀然以質直稱性儉嗇服用朴素酷信釋氏每造寺施僧則不計其費與太祖有軍中之舊故特承寵遇後月餘卒贈中書令追封隴西郡王諡莊武甲寅以布衣孫守彬為右領衛將軍致仕時守彬女初入宫也梅山洞蠻左甲首領苞漢陽右甲首領漢陵等率衆劫掠商人上屢遣使招諭冦暴訖不止乃命客省使翟守素發潭州兵往擊之丁巳有司上諸州所貢閏年圖故事每三年一令天下貢地圖與版籍皆上尚書省國初以閏為限所以周知山川之險易户口之衆寡也實録于此下即云時吳晉悉平奉圖來貢者州郡凡四百卷此大誤也按地理志乃雍熙中事今削去會要亦同實録八月癸亥黎州山後兩林蠻主歸德將軍勿尼懷化將軍勿兒遣使王子卑綵副使牟蓋鬼主還祖等七十八人來貢名馬乞頒正朔尋以勿尼為歸德大將軍勿尼等加官在九月己酉今并書之上復以詔諭苞漢陽等漢陽保險拒命乃詔翟守素進兵捕擊時霖雨彌旬弓弩解弛不堪挽明日將接戰守素一夕令削木為弩及旦賊掩至交射之賊遂敗乘勝逐北盡平其巢穴先是潭邵等州大吏富人多與漢陽交通既而得其書訊數百封守素盡焚之反仄以安丙寅陳洪進入見於崇德殿禮遇優渥賜錢千萬白金萬兩絹萬匹上初即位以少府監髙保寅知懷州懷州故𨽻河陽時趙普為節度使保寅素與普有隙事頗為普所抑保寅心不能平手疏乞罷節鎮領支郡之制乃詔懷州直屬京長吏得自奏事於是虢州刺史許昌裔昌裔未見訴保平節度使杜審進闕失事詔右拾遺李瀚瀚未見往察之瀚因言節鎮領支郡多俾親吏掌其關市頗不便于商賈滯天下之貨望不令有所統攝以分方面之權尊奬王室亦強幹弱枝之術也始唐及五代節鎮皆有支郡太祖平湖南始令潭朗等州直屬京長吏得自奏事其後大縣屯兵亦有直屬京者興元之三泉是也戊辰上納瀚言詔邠寧涇原鄜坊延丹陜虢襄均房復鄧唐澶濮宋亳鄆濟滄德曹單青淄兖沂貝冀滑衛鎮深趙定祁等州並直屬京天下節鎮無復領支郡者矣按此時已盡罷節鎮所領支郡矣而實録興國七年五月辛亥又書詔以涇州直屬京不知何也今削去不著然更須考之己卯改報先寺為乾明寺重葺之知資州成肅言凖開寶六年詔川陜諸州犯竊盜計銅鐡錢滿萬強盜滿六千者並棄市川陜鐡錢四直銅錢一願均定其法事下有司請以銀一兩為強竊盜贓銅錢一千雜犯絹一匹論罪從之九月辛卯內品王守忠棄市坐監法酒庫盜官酒三百瓶為其匠王景能所發故也賜景能紫衣銀帶帛五束作崇聖殿吳越王俶將入朝先遣其子鎮海鎮東節度使惟濬來貢壬辰詔户部郎中侯陟至泗州迎勞之及惟濬至賜賚無算乙未幸造弓箭院賜工徒人千錢布一端又幸新修三館賜役夫錢有差唐天祐中兵亂窘乏始令以八十五錢為百後唐天成中又減五錢漢乾祐初復減三錢國初因漢制其輸官亦用八十或八十五然諸州私用猶各隨俗至有以四十八錢為百者丁酉詔所在悉用七十七為百每千錢必及四斤半以上禁江南新小錢民先有藏蓄者悉令送官官據銅給其直初廢嶺南媚川都禁民采珠未幾官復自采容州海渚亦産珠仍置官掌之於是容州始貢珠百斤賜負擔者銀帶衣服壬寅幸水磑賜役夫衣服綵帛遂幸西御園宴射癸卯關南巡檢應州觀察使李漢超卒上甚悼之特廢朝贈太尉忠武節度使遣中使護其喪歸葬丁未渤泥國王遣使來貢方物始通也上屬意戎事每朝罷即於便殿或後苑親閲禁卒取壯健者𨽻親軍罷軟老弱悉分配外州自是藩衛之士益以精強乃令築講武臺於城西之楊村辛亥大閲上與文武大臣從官等登臺而觀殿前都指揮使楊信初董其事上以信病瘖不能言命天武左廂都指揮使崔翰代之翰分布士伍南北綿亘二十里建五色旗以號令將卒望其所舉為進退之節每按旗指蹤則千乘萬騎周旋如一甲兵之盛近代無比上甚悅即遣中使密以金帶賜翰謂之曰此朕藩邸時所服者也因謂左右曰若崔翰者必不仕晉朝矣蓋言晉朝將帥多不得其人軍政隳紊故也楊信即楊義避上改名焉丙辰上始狩于近郊作詩賜羣臣令屬和國子監主簿郭恕先決杖配𨽻登州禁錮恕先即忠恕也初責乾州司户參軍秩滿去官遂不復仕縱放岐雍陜洛之間或踰月不食盛夏暴日中無汗大寒鑿氷而浴人皆異之尤善畫得其畫者藏以為寶上雅聞恕先名既即位召為國子監主簿賜賚甚厚令于太學刋定歷代字書內侍押班竇神興嘗館之恕先美鬚髯一日忽盡拔去神興驚問其故恕先曰聊以效顰耳神興大怒白上以恕先無檢局放縱敗度上稍踈焉恕先益縱酒肆言時政頗有謗讟語聞且擅鬻官物取其直上怒故及于禍恕先行至臨邑謂部送吏曰我逝矣因掊地為穴度可容面俯窺焉而卒藁葬道左後將改葬但得其衣衾蓋尸解云冬十月辛酉命左衛大將軍李崇矩為雍貴潯橫欽賔等州都巡檢使未幾徙瓊崖儋萬麾下軍士咸憚於從行崇矩盡出器用金帛凡直數百萬分給之衆乃感悅時黎賊擾動崇矩悉至洞穴撫諭以己財遺其酋長衆皆懷附在嶺表及海上凡四五年恬然不以炎荒嬰慮舊涉海者多艤舟以俟便風或旬餘或彌月崇矩往來皆一日而度未嘗留滯從者亦皆無恙人謂崇矩純德之報云契丹遣使耶律阿穆爾來賀乾明節己巳幸京城西北隅視衛士與契丹使馳射又召近臣及劉鋹李煜契丹使宴射苑中辛未京西轉運使程能言請𣙜陳滑蔡潁隨郢均鄧金房等州信陽軍酒可獲大利許之仍令太常丞馮頔與內品一員同掌其事馮頔未見壬申黎州山後兩林蠻主勿兒遣使來貢方物賀上登極丙子羣臣請舉樂表三上詔許之詔兩京諸道隂陽卜筮人等向令傳送至闕詢其所習皆懵昧無所取蓋矯言禍福誑耀流俗以取資耳自今除二宅及易筮外其天文相術六壬遁甲三命及它隂陽書限詔到一月送官辛巳畋近郊癸未詔分陜西轉運使為二司以侍御史張渙領陜西河北諸州左贊善大夫韋務升領陜西河南諸州張渙未見詔權停貢舉一年十一月丁亥朔日有食之既庚寅日南至御乾元殿受朝賀退御大明殿上夀復用教坊樂甲午命監察御史李瀆閣門袛候鄭偉為契丹正旦使己亥以天平節度使兼中書令石守信罷節度使為守中書令西京留守守信鎮鄆州凡十七年不徙專事聚斂積財巨萬計尤奉釋教在西京造寺募民輦致瓦木驅督峻急而所給不充其傭直民甚苦之鎮安節度使馬軍都指揮使黨進出為忠武節度使進掌禁衛凡十二年嘗徼巡京師閭巷間有畜竒禽異獸者進或見必命左右取而放之罵曰買肉不供父母反飼禽獸乎上時在晉邸有名鷹親吏養之甚謹進詰責將取放吏欲走白晉王進遽止且與之錢令市肉謂曰汝謹視此無使為他物所傷京師傳以為笑及鎮許下幕府吏小忤意必命左右批其頰其變詐粗暴皆此類也嘗為杜重威家奴重威子孫貧賤進月分俸錢給之人亦以此稱焉下蔡縣主簿張利用冒稱其亡兄秉官求進用丙午詔決杖配𨽻商州禁錮户部郎中侯陟知吏部選事會選人有冒妄事發陟當連坐知雜事雷德驤將劾奏之陟遂造便殿自首服上特赦其罪癸丑以陟為河北轉運使幸御龍弓箭直新班院賜軍士錢帛有差還苑中宴射詔諸道州府監臨官自今不得擅離所任詣闕奏事有所聞見許實封附遞以聞必須面奏者别聽勑旨諸道所送知天文相術等人凡三百五十有一十二月丁巳朔詔以六十有八𨽻司天臺餘悉黥面流海島詔流內銓選人所試判自今分四等定其優劣庚午畋近郊遂幸金鳳園賜從臣飲有司言礬官嵗鬻礬不充舊貫請嚴其禁癸酉詔私販化外礬至三斤私煮及盜至十斤者並棄市餘悉決杖配流已論決而再犯雖所犯不如律亦決杖配流還復犯者死初江南未平私渡江者及舟人並棄市戊寅始除其禁辛巳髙麗國王胄遣其子元輔來修貢賀登極壬午契丹遣太僕卿耶律特爾格案遼史作太保迭烈割禮賔副使王英來賀明年正癸未靜海節度使丁璉遣使修貢賀登極甲申詔先募民斷買場務或有羡利即收入已屬已差監臨之官其主吏犯者法司處以監主自盜或至棄市殊非中典良用惻然自今凖盜論罪止流又詔持刃穿窬法當強盜近者多云棄刃於外空手入室既難覆驗實啓姦心自今以強盜論並從權大理少卿趙齊之請也齊未見是嵗靈州通逺軍諸蕃族剽略官綱詔知靈州安守忠通逺軍使董遵誨討之遵誨部分將出諸蕃族大懼盡歸所剽略肉袒請罪遵誨即慰撫之自是各謹封界秋毫不敢犯上命遵誨兼領靈州路巡檢在通逺軍凡十四年剽略官綱據黨項傳在此嵗因見遵誨事傳稱命守忠遵誨討平之守忠傳既無所載遵誨傳則未嘗出兵也恐黨項傳或誤今略加刪潤初南漢人取昭州偽政酷暴民不聊生周渭率鄉人六百踰嶺避地零陵未至賊起斷道絶糧復還恭城則廬舍煨燼遂奔道州又為賊所襲渭倉惶北走不暇與其妻莫荃訣二子年幼留荃所荃少父母欲嫁之荃涕泣誓志曰渭非久困者今違難逺適必能自奮乃親績碓舂以給朝夕二子皆畢婚嫁凡二十六年於是渭為廣南諸州轉運副使使人訪求得之渭時已改娶欲復迎荃荃曰君既有室我不可復往且吾與婦孫居此久矣不宜舍去時人嘉歎為著莫節婦傳渭亦具奏詔特爵命之并其二子皆賜以官南漢取昭州乃周廣運元年是冬北漢邉候言晉潞邢洺鎮冀等州皆治戎器及攻城之具又轉漕芻粟北漢主甚恐
