body:
  text: 續資治通鑑長編卷一百三十九宋李燾撰仁宗慶歷三年春正月庚午朔御大慶殿受朝封皇第三子為鄂王武昌節度使同平章事仍賜名曦生甫三嵗病既革詔學士蘇紳就宰相第草制未及宣也辛未曦薨贈太師中書令諡悼懿丙子大理寺丞集賢校理同知太常禮院陸經落職監汝州酒稅初鄂王服既除以甲戌燕契丹使下太常禮院議而言天子絶期今鄂王雖有爵命不為殤皇帝制服已除當作樂既燕罷經復論奏以鄂王為無服之殤燕在以日易月之內不宜舉樂上以經前後反覆又援臣庶之禮非是故責及之三司言在京營繕嵗用材木凡三十萬請下陜西轉運司收市之詔減三之一仍令官自遣人就山和市無得抑配於民涇原安撫使王堯臣言至陜西見鄜延環慶路其地皆險固而易以守惟涇原則不然自漢唐以來為西北之衝漢武時胸奴入冦燒回中宫唐則吐蕃回紇再至便橋渭水皆由此路蓋自鎮戎軍至渭州沿涇河大川直抵涇汾以來略無險阻雖有城寨多居平地賊徑交屬難以扞防如郭子儀渾瑊常宿重兵守之今賊昊盡有胸奴吐蕃故地自叛命數年凡由此三入冦今朝廷置帥府於涇州為控扼關陜之會誠合事機然頻經敗覆邊地空虛士氣不振雖兵馬新集未全訓練將佐又多巽懦觀其事形固未可攻取至於守禦之具益不及前願覆視往迹深監近弊選三路曽經戰鬬將佐三五貟及以見戍新兵換舊人五七指揮於本路相兼訓習儻一路事力完實則賊雖欲長驅入冦必生顧慮之心臣略論一路五州軍城寨控扼要害及賊徑交通之處備禦輕重之策凡五事其一鎮戎軍接賊界天都山上百餘里西北則有三川定川劉璠等寨與石門前後峽連接皆漢蕭關故地最為賊馬奔衝之路內三川地勢據險可以保守定川劉璠二寨新經修築而定川城壁不甚完今再須增葺及添兵馬糧草之備其寨主監押當令本路主帥舉辟材勇班行朝廷若謂昨來懷敏之敗定川諸寨不足捍禦遂為棄地則鎮戎軍西北兩路更無保障賊馬可以直趨城下弓箭手亦無依援所給田土難以耕作其東路緣邊有天聖乾興東山彭陽城四寨與原州平安開邊等寨相接近亦為賊馬所擾恐近界敏珠爾密桑等族更為應援此四寨亦當如三川等常須擇人備兵以防入冦其東南至渭州瓦亭寨有師子欄馬平泉三堡師子堡雖城壁隳頽其間甚有居民昨欄馬為賊攻破城門劫蕩人户柵壘多已平毁惟山城倉草場僅存平泉亦嘗經賊火城中之人蓋十云八九此三處俟春益當營築為涇渭之屏備不爾其勢不攻而自下一路隔絶更無斥堠鎮戎遂為故壘矣其二渭州籠竿揚博隆城靜邊得勝四寨在六盤山外內則為渭州藩籬外則為秦隴襟帶地土饒沃生齒繁多內籠竿城蕃漢交易市邑富庶全勝近邊州郡賊久有窺伺之意蓋距賊界則路甚平易去內地則有山川之阻萬一為賊先據其要以兵扼鎮戎軍三川南谷并摧沙木峽一帶路口則鎮戎軍渭州難以出兵應援西寨為賊攻脅力不能支則人心自潰臣已請建置為軍擇路分都按出兵下原本脫二十八字查宋史增入監一員知軍専提舉四寨及令修濬城塹添屯軍馬及時聚蓄糧草以為備禦又瓦亭寨其西則居鎮戎大路其東則歷彈箏峽嵩店安國鎮至渭州其東南控六盤來路其南去制勝關萬嵗寨二十里與儀州相接自唐以來皆宿重兵為控制之地當四路走集最為衝會宜常置一將軍馬以扞其奔軼又州之東北有小蘆新寨耀武鎮至潘原近亦為賊騎所掠全無備禦之具並須增葺之其三原州東南由羅交驛至涇州九十里又西北由開邊平安彭陽城東山等寨至鎮戎軍一百八十里其西有柳泉鎮路通佛空平細腰城至環州定邊寨與敏珠爾密桑及環州蘇州等族一帶蕃部相接其首領至多素無保聚不相維統向背離合所守不常須擇武臣知環原二州相為表裏使招輯蕃部但不為賊用則庶幾少減涇原之患其四儀州地控山險制勝關四五里有流江口東二十里至白巖河南有細巷口又有安化峽一帶上隔隴山並通水洛城生户八王等族即唐吐蕃出入之路今逐處隘口雖有小寨柵控扼然亦備禦未至近亦屢有生户入冦又自黃石池弓門􅔋穰長山寨至秦州止二百餘里由赤城鎮至隴州不及百里或秦隴有急則地界為最近若賊馬引大衆旁縱侵掠則儀州軍馬少將佐未得人禦扞之計甚可憂也又州城低薄才周四里有餘壕塹淺狹三分軍民二分在外設若賊至瓦亭南趨制勝關或緣隴山假道水洛城或由秦隴州直抵州界皆能入冦至時雖能城守居民必大遭剽掠亦宜預慮之其五涇州雖為次邊然緣涇河大川道路平易當賊騎之衝西北八九十里是大蟲前後巉其東北接原州彭陽縣及本州長武寨俱有徑路與敏珠爾密桑等族相通此實近裏控扼之會其張村直入州路宜營作關柵或斷為長塹以遏奔衝朝廷近差韓琦范仲淹於此開置帥府亦足以建威壓敵也臣今來所請增葺要害城寨若無丁夫可役處許以省錢給帶甲兵士令畨築之仍量添守兵積蓄糧草繕完器械如西賊大假點集其緣邊屬户各有骨肉在賊界居住宜多與金帛探候預令蕃漢人戶入保近裏城寨一則兵少處得人共守二則免為驅虜致邊地空虛仍先密諭諸寨官員或遇圍閉各令監守本路將帥即未得出救兵慮為賊誘枉遭敗覆既未出兵則可𨽻於邊人及諸軍內召募驍勇敢死之人令伺隙夜燒賊營俟其潰動掩擊之其圍閉之時且令持重觀釁庶無速戰之禍議者或曰若爾則必有深入之患我師未出冦必大獲而去臣以謂昨定川之敗賊知近裏城寨空虛遂乘勝而入今若城寨並益屯兵馬示有備禦之具須防後虞未敢有長驅之計縱其來攻則各堅壁以守之若散行剽虜則其勢自分可以出竒邀擊况已經畫諸路常置一將軍馬於近界上緩急應接賊果長驅而來則選徑兵伏截嶮隘又路有寬狹必不能方行而前首尾差逺難以相衝宜自取敗覆也其一路事形臣熟與邊臣計議謂當如此預備望下韓琦范仲淹相度施行從之鄂王之喪會契丹使燕辭及休假無廢朝之實丁丑詔自今復三日不視朝戊寅太子中允直集賢院通判秦州尹洙為太常丞知涇州辛巳詔三司下諸路轉運司具析諸州縣差徭賦斂之數委中書樞密院議蠲減之樞密直學士楊偕言竊見新定行軍約束貪財物資畜而不赴殺賊者斬又合戰而爭他人所獲首級者斬是知臨戰之際恐其錯亂行伍故爭財物與爭首級同然又有斬首級受賞之條使其衆必爭之古者雖有斬首幾千級蓋是槩衆斬獲之數非賞所獲首級以誘士卒之亂也自劉平石元孫之敗多因爭首級之故請自今殺賊之後計所獲首級本隊論賞從之戊子詔陜西諸軍將校死事而無子孫者其同居親屬亦録之庚寅募關中流民補振武指揮咸平中選鄉兵為振武後益衰耗至是嵗數不登因有是詔辛卯詔陜西沿邊招討使韓琦范仲淹龐籍凡軍期中覆不及者皆便宜從事用安撫使王堯臣議也此據劉敞所作王堯臣行狀歐陽修墓志銘建渭州籠竿城為德順軍亦用王堯臣議也初曹瑋開山外地置籠竿等四寨募弓箭手給田使耕戰自守其後將帥失撫馭稍侵奪之衆遂怨怒遂劫德勝寨主姚貴閉城門叛堯臣適過境上作書射城中諭以禍福且發近兵討之吏白堯臣曰公奉使且還歸報天子耳貴叛非公事也堯臣曰貴土豪頗得士心然初非叛者今不乘其未定速招降之後必生事為朝廷患貴果出降堯臣為申明約束如瑋之舊乃歸趙滋傳載姚貴叛事與堯臣傳不同今附見于後當考初姚貴殺監押崔絢劫宣武神騎卒千餘人叛攻揚博隆城涇原儀渭鎮戎軍都巡檢趙滋馳往諭降八百餘人貴窮走出寨招討使令滋給賜降卒及遷補將吏滋以為如是是誘其為亂藏其牒不用還為招討使所怒故賞不行滋開封人也滋士隆子士隆以邠寧環慶都監戰沒録滋三班奉職事在天聖三年此據滋傳所稱招討使不知謂誰傳又稱范仲淹韓琦經略陜西舉滋可將領則招討使非范韓或是王沿也壬辰以華州明法狄國賔為本州助教國賔仁傑之後分仁傑告身以與樞密直學士狄棐棐因奏録國賔一官而自稱仁傑十四世孫癸巳延州言元昊遣偽六宅使伊州刺史賀從朂來納款先是龎籍因李文貴還再答旺榮等書約以元昊自奉表削僭號始敢聞于朝於是文貴與從朂持元昊書至保安軍籍令保安軍簽書判官事邵良佐視其書元昊自稱男邦尼鼎國烏珠曩霄上書父大宋皇帝從朂又言契丹使人至本國稱南朝遣梁適侍郎來言南北修好已如舊惟西界未寧知北朝與彼為婚姻請諭令早議通好故本國遣從朂上書緣本國自有國號無奉表體式其稱烏珠蓋如古單于可汗之類若南朝使人至本國坐蕃宰相上烏珠見使人時離雲牀問聖躬萬福而從朂亦自請詣闕籍使謂之曰天子至尊荆王叔父也猶奉表稱臣今名體未正終不敢以聞從朂曰子事父猶臣事君也使從朂得至京師而天子不許請歸更議之籍乃具以聞且言虜自背叛以來雖屢得勝然喪和市之利民甚愁困今其辭稍順必誠有改事中國之心願聽從朂詣闕更選使者往其國申諭之彼必稱臣凡名稱禮數及求丐之物當力加裁損必不得己則少許之若所求不違恐豺狼之心未易盈厭也此據龐籍附傳正傳及司馬光墓志王圭神道碑并取實録所載賀從朂語增入之但實録稱梁適到延州始令龐籍難從朂及從朂請自赴闕與本傳碑銘略不同今從本傳碑銘所載蓋籍先嘗問難從朂及從朂請自赴闕籍為請于朝廷朝廷遣梁適來就籍議遂聽從朂赴闕實録先後之序恐參差未可信也甲午録賀州巡檢左班殿直王明子成象為三班借職成德為下班殿侍先是荆湖南溪洞蠻猺侵擾連賀衡永數州明與賊格鬬而死故恤及之乙未詔河北轉運提點刑獄安撫司提舉修完城壘丙申王堯臣又言唐隴右河西范陽安西四鎮嶺南五府節度兼領經略使咸平五年始以右僕射張齊賢為邠寧環慶涇原路經略使判邠州令環慶涇原路及永興軍兵馬並受節度是嵗又以鄧州觀察使錢若水為并代經略使判并州自後更不除人自陜西用兵夏守贇夏竦陳執中並以兩府舊臣始為陜西經略安撫招討使韓琦范仲淹止為副使既而張存知延州王沿知渭州張奎知慶州俱是學士待制之職亦止管勾本路部署司事及夏竦陳執中既罷四路置帥逐路遂各帶都部署及經略安撫招討等使因而武臣副部署亦為副使今韓琦范仲淹龐籍既為陜西四路都部署緣邊經略安撫招討等使四路當稟節制而諸路尚帶經略使名者九人各置司行事名號不異而所稟非一今請逐路都部署副部署並罷經略只充緣邊安撫使副從之堯臣正傳云堯臣使還上言既而滕宗諒以為請遂罷之按宗諒但請罷招討事在去年十二月堯臣又請罷經略乃今年事傳并招討經略二事為一事且謂宗諒繼堯臣請之蓋誤也吕夷簡數求罷上優詔未許陜西轉運使孫沔上書言祖宗有天下垂八十餘載未嘗以言廢人景祐以前綱紀未甚廢猶有感激進説之士觀今之政是可慟哭無一人為陛下言者臣誠痛之願陛下留聽夫州郡承風者刺史也皆猥懦老耄縣邑稟令者牧守也多昏戇罷軟制敕之下人以為不足信奏請已行人以為不能久未幾而果罷利權反覆民力殫竭師老于邊夷狄爭長事至危而陛下以為安人皆憂而臣下惟緘口何也由宰相多忌而不用正人也往者章獻總政陛下恭默有王曾張知白魯宗道李迪薛奎蔡齊以正直迭居兩府曹修古李紘劉隨鞠詠孔道輔以亮節更任論列于時斜封僥幸閽寺威福雖未悉去然十餘年間中外無大故自吕夷簡當國黜忠言廢直道及以使相出鎮許昌乃薦王隨陳堯佐代已才庸負重謀議不協忿爭中堂取笑多士政事寖廢即嵗罷免又以張士遜冠台席士遜本之逺識致隳國事兵革漸起於邊陲卒伍竊發於輦轂舍轡徒行滅燭逃遁損威失體殊不愧羞尚得三師居第此蓋夷簡不進賢為社稷逺圖但引不若己者為自固之計欲使陛下知輔相之位非已不可兼復思已而召用也陛下果召夷簡還自大名入秉朝政于兹三年不更一事以姑息為安以避謗為知西州將帥纍以敗聞契丹無厭乘此求賂兵殱貨悖天下空竭刺史牧守十不得一法令變易士民怨咨隆盛之基忽至于此今夷簡以病求退陛下手和御藥親寫德音乃謂恨不移卿之疾在于朕躬四方義士傳聞詔語有泣下者夷簡在中書二十年三冠輔相所言無不聽所請無不行有宋得君一人而已未知何以為陛下報今天下皆稱賢而陛下不用者左右毁之也皆謂纎邪而陛下不知者朋黨庇之也契丹復盟西賊􅍁塞公卿欣欣日望和平若因此振紀綱修廢墜選賢任能節用飬兵則景德祥符之風復見于今矣若恬然不顧遂以為安臣恐土崩瓦解不可復救而夷簡意謂四方已寧百度已正欲因病默默而去無一言啓沃上心别白賢不肖雖盡南山之竹不足書其罪也若薦賢才合公議雖失之于始而得之于終猶可寬天下萬世之責苟遂容身不救前過以柔而易制者升為腹背以姦而可使者任為羽翼以諂佞為君子以庸懦為長者使之在廊廟列臺閣上惑聖明下害生靈為宗社計則必危為子孫計亦未可保終吉是張禹不獨生于漢李林甫復見于今也在陛下察之而已書聞帝不之罪議者喜其蹇切夷簡謂人曰元規藥石之言但恨聞此遲十年爾人亦服其量云陳繹拜罷録云仁宗遣沔自持書詣夷簡第示之按沔此時方為陜西漕本傳亦不載沔在朝不知繹何據今不取按二年五月沔自浙憲移陜西漕此時決不在朝政要亦稱沔在陜西自謂雖外臣不可忘本朝所上書與本傳合繹所載必誤二月己亥朔詔吏部流內銓緣邊州軍地臨兩界處自今毋得注進納人癸卯知并州明鎬請自今并代路置制軍馬事連契丹界者委經略使便宜處分從之置濵州甜水渦戰棹巡檢一員詔禮部貢院渭州鎮戎軍進士劉紳等二十四人嘗被甲乘城與免將來文解乙巳詔陜西經略司自今落蕃軍人首身與免罪其經陷陳或因取薪水為虜捉去者禁軍長行與淮南勇截押官節級十將以上遞遷一資廂軍以下送淮南本軍仍與遷資元走投外界者止𨽻江南荆湖本城並不許差出丙午賜陜西四路招討使韓琦范仲淹龐籍錢各百萬庚戌右正言知制誥梁適假龍圖閣直學士右諫議大夫使延州與龐籍議所以招懷元昊之禮也於是許賀從勗赴闕乙卯韓琦范仲淹等言臣等久分戎寄未議策勳上玷朝廷俯慙邊鄙然心究利害目擊勝負三年于兹備詳本末今元昊遣人赴闕將議納和其來人已稱六宅使伊州刺史觀其命官之意欲與朝廷抗禮竊恐不改僭號意朝廷開許為鼎峙之國又慮尚懷隂謀卑詞厚禮請稱烏珠以緩國家之計臣等敢不為朝廷思經久之策防生靈之患哉臣等謂繼遷當時用詐脫身竊弄凶器德明外示納款內實養謀至元昊則悖慢侮常大為邊患以纍世姦雄之志而屢戰屢勝未有挫屈何故乞和雖朝廷示招納之意契丹邀通好之功以臣等料之實因纍年用兵蕃界勞擾交鋒之下傷折亦多所獲器械鞍馬皆歸元昊其下胥怨無所厚獲其橫山界蕃部點集最苦但漢兵未勝戎人重土不敢背賊勉為驅馳爾今元昊知衆之疲聞下之怨乃求息肩養鋭以逞凶志非心服中國而來也臣等謂元昊如大言過望為不改僭號之請則有不可許者三如卑詞厚禮從烏珠之稱亦有大可防者三何謂不可許者三自古四裔在荒服之外聖帝明王恤其邊患柔而格之不吝賜與未有假天王之號者也何則與之金帛可節儉而補也鴻名大號天下之神器豈私假於人哉惟石晉藉契丹援立之功又中國逼小才數十州偷生一時無卜世卜年之意故僣號於彼壞中國大法而終不能厭其心遂為吞噬遽成亡國一代君臣為千古之罪自契丹稱帝滅晉之後參用漢之禮樂故事勢強盛常有輕中國之心我國家富有四海非石晉逼小偷生之時元昊世受朝廷爵命非有契丹開晉之功此不可許之一也又諸處公家文字并軍民語言皆呼昊賊人知逆順去就之分尚或逋亡未有禁止今元昊於天都山營造所居已逼漢界如更許以大號此後公家文字并軍民語言當有西朝西帝之稱天都山必有建都郊祀之僭其陜西戍兵邊人負過必逃蓋有所歸矣至於四方豪士稍不得志則攘臂而去無有逆順去就之分彼多得漢人則禮樂事勢與契丹並立夾困中國豈復有太平之望邪此不可許之二也又議者皆謂元昊畨人也無居中國之心欲自尊於諸蕃爾臣等謂拓跋圭石勒劉聰苻堅赫連勃勃之徒皆外國也並居中原近則李克用父子沙陀人也進居太原後都西洛皆漢人進謀誘而致之昨定川事後元昊有作偽詔諭鎮戎兵民定關輔之言此其驗也蓋漢家之叛人不樂處沙漠中必謀侵據漢地所得城壘必使漢人守之如契丹得山後諸州皆令漢人為之官守或朝廷假元昊僭號是將啓之斯為叛人之助甚矣此不可許之三也何謂大可防者三元昊以纍世姦雄之資一旦僭逆初遣人至猶稱臣奉表及劉平之陷賊氣乃驕再遣賀九言至上書朝廷便不稱臣其辭頓慢而後屢勝當有大言過望乃人情之常也若卑詞厚禮便肯從烏珠之稱皆隂謀也是果以山川之困暫求息肩使中國解兵三四年間將帥懈慢士伍驕惰邊備不嚴戎政漸弛却如前來暴發則中國不能支梧此大可防之一也又從德明納款之後經謀不息西擊吐蕃回鶻拓疆數千里至元昊事勢稍盛乃稱尊悖禮背負朝廷結連北敵情迹盡見大為邊患偶未深入今復起詐端以款我兵而休息其衆又欲併力専志西吞嘉勒斯賚等諸蕃去秦州一帶籬落為將來再舉之利緣元昊初叛之時親攻延州是本有侵陷郡國之志今復強盛豈便息心且朝廷四十年恩信所被一朝反側豈有發既叛之謀畜未挫之鋭而能久守盟信者乎此大可防之二也又從德明納款後來使蕃漢之人入京師賈販憧憧道路百貨所歸獲中國之利充于窟穴賊因其事力乃興兵為亂今兹五年用度必困乃卑詞厚禮迎合我意欲復圗中國之利待其給用必却求釁興兵以快本意狼子野心固難馴伏今若通和或再許靈夏蕃漢之人依前出入京師深為不便緣自前往來叛狀未彰情無蠧害今既為強敵之人稔禍未巳必窺伺國家及夾帶亡命入蕃或與姦人别有結連或使刺客竊發驚擾朝廷又此類必所在恣縱甚於昔時有事何以處置此大可防之三也臣等欲乞朝廷俟元昊所遣人至觀其所請彼如大言過望堅求僭稱則乞朝廷答云上畏天地宗廟不可私許大號壞中國之法彼卑詞厚禮止是求烏珠之稱則按唐單于可汗故事有可許之理亦須預防其隂謀嚴飭邊臣修完城寨訓練軍馬儲蓄糧草以備虛詐俟一二年間見其表裏及邊備牢固方可那減戍兵於近裏屯泊緣西戎自古翻覆朝廷不可休兵以啓不虞之變如求割屬户則乞答云靈夏甚有漢户能割歸朝廷否况橫山蕃部安于內附一旦驅之則驚擾生事必不為西界之用彼如求至京師依前來出入賈販則乞答云昨來戰鬬之後甚有軍民沒陳其子孫骨肉銜怨至深必恐道途之中多有讎殺致西界相疑更却生事只於邊上建置𣙜場交易有無各得其所彼如邀我自今而後罷修城寨則乞答云邊界熟户生户多有讎怨常相侵害須藉城寨駐兵方能鎮靜使各安居爾若自餘更有非禮之求朝廷或難應副則且款之不必從也但厚遣來人善詞回答使遷延往來即逾四月賊不能舉矣至秋則無足畏也何以言之臣等觀朝廷信賞必罰今已明白帥臣奉詔得以便宜又舊將漸升前弊稍除將責實效約束將佐不令輕出訓練軍馬率多變法但今極邊城寨或未堅完新集之兵未可大戰若賊今春便來以臣等計之尚可憂慮然大軍持重竒兵夜擊宜無定川之負也如候秋而來則城寨多固軍馬已練或堅壁而守或據險而戰無足畏矣臣等已議一二年間訓兵三四萬使號令齊一陳伍精熟又能使熟户蕃兵與正軍參用則橫山一帶族帳可以圖之降我者使之納質厚其官賞各令安居籍為熟户拒我者以精兵加之不從則戮我軍鼓行山界不為朝去暮還之計元昊聞之若舉國而來我則退守邊寨足以困彼之衆若遣偏師而來我則據險以待之蕃兵無糧不能久聚退散之後我兵復進使彼復集每嵗三五出元昊諸廂之兵多在河外頻來應敵疲於奔命則山界蕃部勢窮援弱且近於我自求內附因選酋豪以鎮之足以斷元昊之手足矣然乞朝廷以平定大計為意當軍行之時不以小勝小衄黜陟將帥則三五年間可集大功仍詔中外臣僚不得輒言邊事以沮永圖我太祖太宗統闢四海創萬世之基業今以三五年之勞再定西陲豈為晚邪契丹聞國家深長之謀必懼而保盟不復輕動然後中國有太平之期矣臣等所以言彼賊非禮之求不必從者蓋有此議也或曰今王師不利者數四而未思戢兵何也臣等謂不然國家太平日久將不知兵兵不習戰而致不利也非中國事力不敵四裔非今之軍士不逮古者蓋太平忘戰之弊爾今邊臣中有心力之人鑑其覆轍各思更張將有勝賊之計昔漢楚之戰不以多負罷兵而終有天下安祿山之亂所向無前郭子儀等日夜謀慮王師復振而終滅大盜今國家以天下全盛之勢豈以偶勝偶負而自謂中國不可振而邊陲不可禦邪斯惑之甚矣或曰兵不可久久則民困而財匱臣等謂不然爭勝逐利之師則有巧遲拙速之異如其外禦四敵則自古未嘗廢兵是以山海之利皆歸邊用抑為此也况目前邊上城壘經今春修完漸以險固兵民力役自當減罷又每嵗春夏之交軍馬甚可抽退于數百里間就食芻糧亦足省入中之費減饋運之勞庶乎民不困而財不匱非如西事之初人人畏懼未測敵情所屯軍馬不敢少退臣等更思興利減費之算以為之助臣等早蒙聖奬擢預清班西事以來供國粗使三年塞下日勞月憂豈不願聞納和少圖休息非樂親矢石之間蓋見西賊強梗未衰挾以變詐若朝廷處置失宜他時悖亂為中原大禍豈止今日之邊患哉臣等是以不敢念身世之安忘國家之憂須罄芻蕘少期補助其元昊來人到闕伏望聖慈於納和禦侮之間審其處置為聖朝長久之慮則天下幸甚此疏據范仲淹集以二月十七日上韓琦家傳亦有之疏稱臣等蓋兩人同上也今附見是日乙卯集賢校理余靖言臣竊聞昊賊差私署官入境相次到闕欲與朝廷通和事伏以息兵減費邊陲順命國家大臣至于邊將咸欲息肩以休士卒臣愚料之以謂挫契丹之氣折西羌之鋭不如不和最為得策假如元昊貪我財貨甘心臣伏此之為禍大于今日臣請别白言之伏自國家用兵以來五年之間三經大戰軍覆將死財用空虛天下嗷嗷困於供給今乃因敵人一介之使馳其號令遂使二國通好君臣如初吾數年之辱而敵人一言解之若敵人又遣一介有求于我以為其謝其將何詞以拒之若國家又有所惜必將興師責我謂之背惠則北鄙生患二境受敵矣矧西戎自僭名號未嘗挫折何肯悔禍輕屈於人今若因其官屬初來未有定約但少許之物無滿其意堅守名分以抑其僭雖賜以甘言彼必不屈則吾雖西鄙受敵而契丹未敢動也何以知之昨梁適奉使之時契丹面對行人遣使西邁意氣自若自言指呼之間便令元昊依舊稱臣今來賊昊不肯稱臣則是契丹之威不能使西羌屈伏彼自喪氣豈能來責故臣謂今之不和則吾雖西鄙受敵而契丹未敢動也若便與西戎結盟則我之和好權在契丹中國之威於是盡矣契丹責我則二鄙受敵其憂深矣伏願陛下與執政大臣密謀而深思之無令陷敵計中必不得已而與貨財須作料錢公使名目便將靈鹽銀夏作兩鎮則賜與倍于往時而君臣名分不改矣或欲速成和好而屈名分則天下共恥之雖強兵在境有血戰而已矣若他年賊自有釁來求和者權在於我則不必拒之也惟陛下裁之余靖所言附見韓范疏後辛酉國子監言自今補説書官請以四人為定額及嵗所試監生不合格且留聽讀三試不中者黜之仍請立四門學士以庶人子弟為生貟以廣招延之路並從之考判監者姓名癸亥以西界內附偽觀察使楚鼐裕勒囊為內殿崇班其子威瑪為三班借職甲子以渭州屬户格隆族都虞候延正為三班借職本族巡檢渭州再經大戰內屬蕃部逃潰不可遏延正屢誘不從特擢之王稱東都事略遣梁適使于契丹
