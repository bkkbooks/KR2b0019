body:
  text: 續資治通鑑長編卷四百七十二宋李燾撰哲宗元祐七年夏四月癸丑朔資政殿學士胡宗愈為禮部尚書龍圗閣待制知永興軍蔡京為龍圗閣直學士知成都府宗愈京除命政目在三月二十八日翰林院學士梁燾言元豐侍從可用者多唯蔡京不可用前有除授燾在言路嘗論之矣或曰聞舊帥多滯事此人有才要使料理燾曰今若用此人必非成都之幸數日命未下燾適在告其命遂行京至成都果以輕舉妄作盜發正晝燒藥市幾盡後又為萬僧㑹窮極侈麗兩川騷擾齊集纍日士女雜亂惡少羣輩殺人剽奪一日十數處云行狀又云御史有言移知永興按京在成都府以户書召行狀誤也今不取甲寅詔尚書左丞蘇頌撰渾天儀象銘左正言姚勔言先帝表章聖學用經術取士誠欲以大道於變斯文然議者以謂師用一家之說習以成蔽不能貫通是以前日明詔復用詩賦此固陛下開廣育材之路求賢取士之深意也然臣竊見學者自復詩賦以來於今五六年頗未有能工者以臣衡論人材其已學者復之難成不至如此就詢其由良亦有說蓋今貢舉之法習詩賦者仍試經義既學者期於必得則務在兼通至有司責其俱優則兩難盡善何則業經者直求先王之道斷聖人之心至於辭賦雕鐫離析破碎主以聲病為急二者不可得全猶責善視者必有聽也若用意散漫則兩俱不精儻能偏長則必有一短又經義一科行之稍久壯齒以上所業已成一旦銷磨亦甚可惜而况通經辨道不猶愈於雕蟲又或聞將來經義舉人所取分數不多而詩賦兼經者又皆滅裂則是經義之名茍存而六藝之學寖廢也臣欲望朝廷並立詩賦經義各為一科隨所試人數多少均為取士之格如此則永逺可行而學者專精一藝易見成就惟陛下裁擇天下幸甚七年四月二日敕臣僚上言近覩科場限字條制不便再具論列乞今後賦論䇿經義並不限字數今已得㫖䇿過二分更不降等而賦論經義未䝉指揮臣之愚慮以謂聖朝以言取士而禁其多言未應古義且非朝廷取士之良法凡舉人稍以文學自負者於廣場中不自騁其才力夸示該博使有以異於衆人則不能嶄然見頭角故能文者常患乎太多此理之常也往時開封舉人路授倡為長賦幾干言但為浮辭不求典要當時能文者往往效之得張方平擯斥而其文遂正嘉祐初劉幾輩喜為怪僻得歐陽修革去而其風復雅此但繫主司之風化耳今朝廷立法不問其文之澆淳而校其字之多寡責其不及猶有勸懲禁其多文殊無義理經義之初士人各務衒其師學故爭為怪說以鼓動人聽就使尚爾亦在精擇考官仍參定考校法式使之力省而易考如泛濫不經之語自可黜去使學者知朝廷意在於文之邪正而不在於字之多寡不亦善乎伏望朝廷更賜詳酌詔賦論過二分並不降等其經義文理優長者凖此此編録册七年四月二日聖㫖今掇取附見䇿過二分更不降等乃從給事范祖禹奏在六年六月十四日實録有此政目無之經義猶依前降指揮范祖禹再封還此據祖禹家傳實録無之政目七月四日朱光庭封還不限字數文字實録無之已附六年六月十四日金部郎中李傑言利州路興州青陽鎮見有銅坑一百餘處舊係西河邊防財用司舉官招誘收買又本錢亦是本司計置應副昨廢罷本司將上件銅場併入陜西轉運司管勾自併入後來將銅價僅减一半又本錢多不敷足雖有所舉監官無由辦集採銅之人逐旋散潰所收漸少課利日虧今相度欲乞每斤量與添錢多行計置本錢依舊兼用銀絹於稱下堆垜及比附韶州岑水場例選官量與酬奬使設法措置必有所增詔於利州路常平錢內借錢五萬貫充買銅本錢每斤依本處見買價錢餘並從之新本削去乙卯左僕射吕大防言夜來甘雨諒寬聖慮太皇太后曰雨想已霑足大防曰臣聞董仲舒曰天心仁愛人君蓋欲扶持而全安之今自涉春旱乾滋久陛下精祈感格遂致霑足得非天意扶持而全安之也亦在人君至誠而已丙辰御史中丞鄭雍言伏見比年稍愆雨雪上軫聖慮推經考事咎在弛緩臣竊見元祐二年詔㫖以時雨稍愆慮尚書六曹有四方牒訴奏讞於上或賞罰難明廢置未决郎官怠於省覽胥吏茍逃期㑹過為沮抑姦詐百端俾抱寃之人無所赴訴此乃聖政仁明照見今日之弊然當時詔㫖如此而官司未有以奉承明詔之意臣待罪臺憲嘗覩中外臣民曾經所屬及六曹等處詞訟率經年嵗無所子奪衆口怨嗟有傷和氣以今仁聖在上而官司弛弊至此甚無謂也臣近嘗建眀乞選官鈎索六曹行遣蠲除弊事裁立法式等事未䝉施行伏望聖慈察隂陽交泰之由在天人相與之際懲革弛弊肅振紀綱毋為煩文責成實效然後內外百職為官擇人則隂陽調和休氣應矣右正言虞䇿言臣恭聞十六日德音疏理繫囚蕩滌圜扉此誠布德修刑之事然德音所及止於帝畿以天子推恩而猶有所吝臣竊恐澤不雱霈未足以大召天下之和氣也伏望聖慈推此德音遍及四海至於有司一切滯留與夫不急煩擾之事宜速者速可緩者緩則庶幾民氣舒蘇雨澤來應也監察御史董敦逸言臣聞人君所為天也故命為天命官為天官謂之天則人君不可得而私况人臣乎作威作福人君之權承命而行人臣之事要之是而已臣因考班籍在京若省臺寺監之官在外若郡守監司之任內外所授逸勞不均歷歷可數謂如郎官之類有更數部丞簿之類尤多貴家有補外官或不之任有未受代或先定差在外者有易數州有移數路有才牽復已與升遷有自逺官依前入逺受差遲速之不一待闕逺近之相遼詩云或息偃在牀或不已於行豈不然歟然此豈公朝之事哉雖祖宗時在邊在庭亦嘗久任若竇儀再直禁林陳恕久居計省才術功效絶類離倫又非滔滔常材之比也臣以謂從官而上不同常貟與夫才效過人朝廷有所倚藉者或令久任或别升遷一切簡拔自從特㫖其餘中外之官在京者定以考任雖有恩賞自陳等事不得過若干任在外者分逺近合入之差就移牽復之類以到任月日至闕者並以先後為名次則孤寒勢力據狀可明差除之權無所移易一有定論皆任至公丁巳熙河蘭岷路經略司言邊事未寧乞蕃兵五將各添差管押蕃兵使臣二員依條令本將選擇諳曉蕃情使臣申本司審察奏差候邊事息日減罷從之新削二月己巳可考戊午詔南北外兩丞司管下河掃今後令河北京西轉運使副判官府界提㸃各分認地界至內河北於銜內帶兼管勾南北外都水公事詔永興軍權駐泊京東第三將權戍涇原路以經略司言西賊於鎮戎德順軍出沒乞增兵故也睦州言青溪縣百姓宋安世九代一門伏望旌奬以風四方詔賜米絹各五十石匹三事並繫己未嫌與立后事相間今移見戊午初三省樞密院進呈太史局勘婚文字吕大防曰男女年命卦變得生氣則百事俱不避只如仁宗戍生光獻辰生辰戌相衝亦變卦得生氣太皇太后曰國家不比常人家長道不勘婚則便已內間誰敢擔當公等執政敢擔當否大防又曰雖云勘婚先須門閥於門閥中勘乃可王巖叟曰不取於勳德之家無以服人心大防因及陳子城事太皇太后曰仁皇聖明御藥閻安具知子細其父士良當時正親近一日仁皇曰汝何不賀我士良曰賀何事曰賀我選得皇后士良曰誰家曰陳子城家士良曰子城官職乃奴𨽻也富民用錢買之仁皇遽曰幾乎錯了明日以語吕夷簡夷簡賀聖明人言吕夷簡先言非也乃仁皇說與聖明如此大防及巖叟皆曰願陛下體此意太皇太后曰一事甚悔前日乃往問帽子田家見說是家凡十縣主每五千貫買一箇國家寧要汝錢也是何門當户敵韓忠彥及巖叟皆曰人臣家亦求門户不可不謹大防曰太史局皆小人若不取門閥却恐此等人家計㑹妄合年命亦宜防之太皇太后曰太皇太后與英宗不曾勘婚然仁皇於三命六壬皆通曉衆曰此豈偶然太皇太后言仁宗通曉三命六壬意謂仁皇亦自與英宗勘婚也他日大防又曰不知陛下以門閥為主邪勘婚為主邪太皇太后曰要門閥亦要勘婚大防等皆言如此但恐難得耳久之二月乙卯太皇太后始宣諭云近選得九家十女惟孟家女最可但長三嵗然顔殊未及巖叟曰不知是正出否應曰王廣淵女嫁孟在生此女大防等因言只恐為勘婚又難成就太皇太后曰今臺官鄭雍楊畏諫官虞䇿姚勔總有文字乞不用隂陽之說亦欲與公等評駁更不勘婚如何皆贊美大防因言祖宗以來俱未嘗勘婚太皇太后納其言三省退樞密院再奏事巖叟又言自古聖人不取隂陽小說陛下今放得下此事深為得體太皇太后又曰臺諫文字未嘗令皇帝看也巖叟曰此事只合斷在太皇太后乃宣諭令同三省進入文字巖叟謂大防曰太皇太后要文字當不止為保明孟家實要取外議以破勘婚之說耳大防即草奏曰奉聖諭選納皇后更不勘婚巖叟曰如此則不勘婚出聖意更安用大臣文字須見議出於衆乃合聖意蘇轍亦以為然遂於選納皇后字下添入今來衆說四字及添入臣等纍嘗奏隂陽拘忌亦宜簡略後兩日遂進呈納后不當勘婚并孟家考察選召劄子樞密院再對太皇太后問忠彥等亦聞孟家子細否對曰孟在善人小官門户靜别無事又宣諭曰不欲選於貴戚家政恐其驕驕即難教忠彥曰如孟在等人家自應不驕亦須易教不在富貴中生則必謹畏太皇太后曰然時二月乙卯也二月二日乙卯及是月甲寅太皇太后又宣諭孟家女入內能執婦禮可降制立為皇后大防奏曰當擇日應曰今日明日皆好只就明日降制王巖叟曰太皇太后宜降一手書付學士院庶於事體為順從之又語及賜豫后家故事大防曰漢時賜豫厚應曰漢時逺且說唐時大防曰唐時不見又問本朝大防曰有之但都無文字必是出於內庫若不賜豫必作債應曰曹琮嚮日還債極多琮光獻叔父也退聚都堂召范百祿梁燾諭以今日降手書及於制中要見奉母命之意又令國史院檢孟元傳送學士院乃擬手書草藁進入初欲就丙辰降手書以皇帝本命遂改用戊午手書曰吾近以皇帝年長中宫未建歷選諸臣之家參求賢德故馬軍都虞候贈太尉孟元孫女閥閲之後以禮自持天姿端靖雅合法相宜立為皇后付學士院降制施行其他典禮並依已降指揮不勘婚事實録略載於六年八月二日今取王巖叟繫年録刪潤編入可見朝廷議論之難非一二日而成也吕大防言仁宗不勘婚及陳子城事太皇太后悔問田家事皆在六年八月二十二日大防又言要門閥并要勘婚恐難得在六年十二月二十六日宣諭得孟氏女及大防等議更不勘婚在七年二月二日宣諭立后在四月初二日今並書於四月二日惟始得孟氏女宣諭仍著其日月己未內出制書立故馬軍都虞候眉州防禦使贈太尉孟元孫女為皇后仍令所司擇日册命玉牒云上春秋盛未議納后者久之由姦臣擅政懼其復辟故也中外􅍅􅍅因臣僚屢有言乃始播告中外立焉玉牒不知誰撰必邪黨也附見當考翰林學士梁燾言臣今月六日當制恭承太皇太后手詔立皇后伏惟陛下為皇帝留神選納淑哲踰年方始中選其於安國家之功益崇矣朝廷慶事天下幸甚臣敢為兩宫之賀因得以獻所當言者四事朝廷奉陛下詔㫖講求迎納皇后典禮甚備誠一代盛事所當次第施行不宜少損使天下明知國家敬重大昏之禮垂法萬世此一也陛下既為皇帝得賢助於內又當多進正人輔佐聖德於外正人多則政事純一政事純一則朝廷安靜姦邪自銷可以終無憂悔矣此二也俟慶事已成內中合有推恩之人宜出自聖意早賜處分不須更待臣下奏請貴恩德上歸所不可緩此三也今來有大慶事上下人心所共欣仰宜有恩霈以慰羣情乞面諭大臣商量特與指揮不可全無亦不可至薄此四也四者皆關於今日急務可濟中外歡心簡而易行足廣聖德望深留宸念貼黃臣昨日欲面對此等事既不得面對區區孤忠必欲自逹故輒見於文字上徹聖聽伏望采察又言所謂恩霈者天下刑獄恐有冤濫逺方之人可以遍為德音在京諸軍必有覬望可與等第特支此為費不多為惠至廣足以召集和氣慰恱衆志其特支必須支給其等第乞令大臣參酌其錢恐户部不易遽辦亦乞詳酌指揮伏望斷自聖意處分又言皇后淑德賢行固已早成更望太皇太后陛下出於聖意謹選寬和有識無忌老成曉事之人左右輔佐仰惟聖慮深逺已必有處分臣妄意及此燾又二疏乞還政附五月末納皇后後甲子詔皇后六禮尚書左僕射兼門下侍郎吕大防攝太尉充奉迎使同知樞密院事韓忠彥攝司徒副之尚書左丞蘇頌攝太尉充發册使簽書樞密院事王巖叟攝司徒副之尚書左丞蘇轍攝太尉充告期使皇叔祖同知大宗正事宗景攝大宗正卿副之皇伯祖判大宗正事髙密郡王宗晟攝太尉充納成使翰林學士范百祿攝宗正卿副之吏部尚書王存攝太尉充納吉使權户部尚書劉奉世攝宗正卿副之翰林學士梁燾攝太尉充納采問名使御史中丞鄭雍攝宗正卿副之吏部言欲應奏舉職官知縣縣令依常調本資序係判司簿尉人差充諸州教授願滿四考者聽從之秦鳯路經略司言凖朝㫖增修隴陽逹罕吹藏堡今方農事之際又去秋災傷蕃漢弓箭手闕乏兼對境賊馬嘯聚且須専治禦備之計欲候來春興工從之范育言鄂特凌古差遵博斯吉齎到蕃字來乞隆博羅安昨擒果莊同時獲首領十人尚斯們等四人已病死摩溫濟特棟錫二人已得朝㫖賜鄂特凌古餘四人內隆博羅安在岷州包順處羈管今鄂特凌古詞意恭順其隆博羅安雖羈縻在漢於事無補欲依鄂特凌古所乞遣還從之丙寅詔河東陜西路諸帥府敢勇一百人為額募有户籍行止年二十以上壯勇堪任使喚稍識字不曾犯徒武藝中格人收補專𨽻經略司新無殿中侍御史吳立禮言臣近見丁憂服闋人程頤除授直祕閣權判西京國子監以其進職無名曾具狀論列未䝉施行今來竊見頤上表辭免觀其辭語略不引咎自訟乃敢要君乞歸田里人臣狠愎公然肆無忌憚未見有如此者按頤素履非正狂妄躁進言其內行則娶甥以為妻論其沽名則素隱而行怪以游說為事業以捭闔為功能邪說詭辭足以亂政兼頤昨以罪譴謫曾未滿秩即丁父憂朝廷因其除服免喪躐進儒館之職可謂異恩既上章求避不自以寵渥逾分懇辭優命而乃望望不足自欲歸就田里夫人臣進退固有大義苟無意祿仕自當求致王事以禮而去未聞去就輕率敢爾要君茍不明正典刑何以懲戒在位三月二十二日立禮初言今再言五月四日董敦逸言丁卯詔宗室外戚臣僚之家違犯酒禁如纍及三次並勾收槽杖新無己巳太常寺言將來皇后納采前擇日告天地册禮前一日告宗廟檢㑹景祐元年立皇后故事行册禮前擇日告天地宗廟社稷宫觀諸陵今參詳欲並於行册禮前一日差官奏告從之户部狀凖都省批送下白劄子臣僚上言伏謂救荒猶救病也正災傷時猶病正作救死而已災傷之後猶病新除未可忽也正須扶養以就安耳饑疫之年鄉村人户迫於朝夕往往逃移但緣逃移既多或鄰人亦自逃移遂無當時耆鄰申報或官司亦未暇一一檢覆了當及至歸業官司便以不經申報檢覆不肯依歸業放稅施行緣此等人户實是逃移歸業朝廷有放稅優恤之法而澤不下究伏望聖慈矜憫特出厚恩許依歸業放稅條貫施行本部今契勘緣已有歸業條貫勘當欲乞下諸路依條施行尚書省勘㑹上件逃移人户蓋為諸縣官避免批罰及轉運司存惜稅額致不依條檢覆詔依所乞舊録云尚書省言災傷人户逃移但緣逃移後或鄰人亦自逃移遂無當時耆鄰申報或官司亦未暇一一檢覆及至歸業官司便以不經申報檢覆不肯依歸業放稅條施行遂使放稅優恤之法澤不下流望許依歸業放稅條從之或只用舊録亦足也庚午西頭供奉官閣門祗候孟在為崇儀使榮州刺史政目十八日孟在正任實録乃是遙刺當考左司員外郎宇文昌齡為太常少卿辛未禮部言將來納皇后文武百僚係婚禮依典禮不賀所有册禮依景祐元年故事拜表稱賀尋㑹到太常寺治平元年立皇后文武百官並詣東上閣門拜表賀皇帝又詣內東門拜表賀太皇太后皇太后訖於內東門上箋賀皇后欲依上件禮例施行又參詳皇太妃欲乞比附皇后禮例上箋稱賀從之癸酉寶文閣直學士中大夫兵部侍郎李之純降授左中散大夫知開封府日廨宇火故也政目云斷開封遺火官吏去年十二月十八日凖究遺火及是斷也甲戌三省言諸路考察縣令課績等第者本條未有限定人數今以一路所管縣多寡為則委知州通判考察課績以德義有聞清慎明著公平可稱恪勤匪懈為四善以獄訟無冤催科不擾稅賦别無失陷宣敕條貫案帳簿書齊整差役均平為治事之最農桑墾殖野無曠土水利興修民賴其用為勸課之最屏除姦盜人獲安處賑恤窮困不致流移為撫養之最仍通取善最分為三等七事為上五事為中餘為下限次月申監司類聚每半年一次同行審覆若有能否尤著者别為優劣上半年限八月下半年限次年二月具事狀保明以聞知州除大中大夫觀察使以上及三京留守安撫使鈐轄不考察外其餘並委監司依此考察以上並令吏部開析等第申尚書省即知州通判到任未滿一月監司未滿兩月者並展一月其知州縣令在任不及一年罷任者更不考察從之舊録新録於四年八月五日壬寅並載吏部言考課四善三最等法又於七年四月二十二日甲戌皆重載之但詳略稍不同今就七年四月二十二日甲戌具書削四年八月五日壬寅所載不入政目二十二日云范純禮刑侍實録無之按純禮六年五月自給中為刑侍七年六月乃自刑侍改吏侍不知政目何故云爾當考丙子右正言虞䇿言臣伏覩吏部見有合引見改官者二百餘人及知縣闕稍多臣伏謂上件人須二年以上間居伺候引見及至改官授得差遣并待闕又須一二年以上既各是舉主足才行政事必有可觀堪以任使之人宜及時甄用令宣力四方惠飬百姓不應使四年五年間僅同間廢兼小官罷俸間居日久貧之殆甚恐非所以飬亷臣伏聞祖宗朝有併甲指揮當時極以為便欲望聖慈特降睿㫖下有司檢㑹施行以便一時䇿又言人受天地之和氣以生者也一失其和疾癘興焉死生繫之神農區辨百物黃帝有內外諸經周官有醫師疾醫瘍醫之官掌萬民疾病蓋飬人之事凡可以致力者聖王未嘗不為之留意也恭惟祖宗已來廣裒方論頒之天下嘉祐詔書復開元故事郡置醫生熙寧已來縣亦如之然郡縣奉行未稱詔㫖有醫生之名無醫生之實講授無所傳習未聞今要藩大郡或罕良醫偏州下邑遐方逺俗死生之命委之巫祝縱有醫者莫非强名一切穿鑿無所師法夭枉之苦何可勝言臣謂宜申敇天下州府軍監訪采精於醫術衆所推服堪以教授者為之闢官舍置醫學命以教授資給之類稍優異之凡願學者皆許就學焉此亦先王以五福錫庶民使之康寧壽考之事也丁丑大理寺言伏覩五月十六日納后文臣承務郎使臣殿直以上並赴陪位大理評事雖有選人補充者緣據雜壓評事叙位在通直郎之上欲乞特降指揮並許陪位庶使凡任職事官之人皆得伸臣子之禮及預觀儀物之盛從之其選人充在京職事於雜壓在承務郎之上者亦凖此太常寺言將來納后臨軒命使册后前一日禮部進冊寶入內及本日自內中奉出至文德殿後閣並行第應奉皇后行第受册禮合差擡冊寶并法物等主當內侍二人前一日於內東門交割入進至行禮日早降出赴文德殿後逐閣訖却赴皇后行第同主當內臣交割應奉行禮管勾供赴本殿又行第皇后受册寶禮訖其皇后赴內擡擎寶册人緣經由殿庭合差輦官四十二人並從之太常寺言檢凖近降六禮儀注進重翟車內僕令一人在左內僕丞一人在右各書令史二人步從內謁者監四人給事一人內常侍二人已上分在左右內謁者監以後各內給使一人步從內給使一百二十人分左右單行後盡宫人車內寺伯二人領寺人六人分左右夾重翟車從之戊寅天平軍節度判官常立為陳州教授立初領崇文院校書及官制行循一資罷踰十年乃有是命政目二十六日事薦者當考熙寧八年十月十九日校書元豐五年四月二十七日循一資罷紹聖三年六月二十一日己卯立責己卯陜西轉運司言商虢州有人户告發銅窟見今差官檢踏烹燒亦有舊銅今相度欲將虢州新興銅窟燒到銅貨并舊銅就便般赴陜西應副鑄錢外有興州銅若般赴陜府地里遙逺枉費腳乘欲將興州銅只就近般赴永興軍錢監鼓鑄錢寶從之新無蘇軾八月五日乞罷稅務嵗終賞格奏狀云今年四月二十七日敕廢罷諸路人户買撲土産稅場此事當考此月二十七日初廢江南路土産稅場七月七日乃并諸路當考核别修是月三省樞密院同奏册皇后故事在京諸軍各有小特支依端午例吕大防曰景祐元年册光獻時為明肅喪未除皇帝不曾臨朝發冊今既臨朝欲與大特支太皇太后曰依冬至例大防曰當如此又曰欲并在外禁軍廂軍皆與禁軍五百廂軍三百大防曰比太皇太后受冊時宜略有等差同列皆以為難又曰且要均溥衆曰候商量再進呈復曰公等且熟議之既退大防具出天下禁軍廂軍人數禁軍五十五萬餘人約支三十餘萬緡廂軍二十餘萬人約支七萬緡巖叟曰錢雖不多事體甚大聖意令執政熟議盍盡事理開陳大防曰昨者聖意亦謂錢不多待用右曹錢禁軍封樁錢上供錢等似不費力巖叟曰朝廷縱不惜錢須惜禮大防曰禮亦臨時施宜巖叟又曰無故事且踰光獻又與太皇太后等此皆所繫甚大大防不答蘇轍謂大防曰要須以不支為主不得已方别商量豈可便承當前人不足吾儕笑之豈可却令人笑也大防默然巖叟退謂韓忠彥曰此大事便承當得穩便否不知何事大臣合理㑹忠彥曰後日且當以非故事踰光獻對太皇太后開陳巖叟曰甚善後兩日大防謂同列曰檢得四例天聖二年明肅受册內外特支景祐元年册光獻在京特支熙寧二年光獻及太皇太后皇太后受册只執仗人特支元祐二年太皇太后受册內外特支意亦從巖叟等所議也及進呈太皇太后曰不為受册為納后耳大防曰景祐乃納后例也巖叟曰若內外皆有即是母后例當惜事體太皇太后曰此無他意第恐渠輩觖望巖叟曰外人不望今咫尺郊禮只望此若分外與今後却生僥幸應曰如此則已大防曰或過後三兩日别作名目減數略與之忠彥及巖叟皆曰如此又無名大防曰邊上戍兵不易宜略與之太皇太后曰要是無名遂已王巖叟繫年録三月二十七日吕大防檢録景祐元年十一月三日冊皇后特支在京諸軍遂與三母后家轉官事欲進呈四月二十六日三省樞密院同奏乞依端午例小特支二十七日巖叟等與大防爭議五月二日又同奏遂不行今附見四月末政目五月四日納后特支依冬至與此不同當考初太皇太后因輔臣進呈景祐特支故事遂問當時喪娶大臣不言何也神宗亦嘗問此不知何故今臣庶家亦自不肯如此耳吕大防等皆不知所對已而樞密院再奏事王巖叟乃具對以所聞於韓琦者太皇太后笑曰固疑其必有以也韓忠彥曰應是恐妃嬪中有驟進者太皇太后曰此等寧識君臣事體巗叟曰須正后則事體自正太皇太后曰亦嘗語皇帝選得賢后有內助之功此非細事巖叟曰內助則賴賢后其如正家須在皇帝聖人言正家而天下定要當謹之於始太皇太后即顧謂上曰正家須在皇帝如是者再巖叟退取歷代皇后事迹可以為法者編成一書名曰中宫懿範上之巖叟進中宫懿範實録在四月初十日今移附月末禮部侍郎兼侍講范祖禹言臣伏見王存端方厚重素有人望前已執政若使之進讀足以重經筵之選蘇軾文章為天下第一其名亞於司馬光但忌嫉者多此在陛下主張而用之耳趙彥若父師民以經行淳懿久侍仁宗書筵彥若德性類其先人博學多聞詳練故事去年為其子得罪其事可諒非有大過不可久棄鄭雍自為中書舍人臣嘗言其可備勸讀自居言職風望愈髙今讀官有闕此四人者實允衆論程頤本末别具論列孔武仲學問該洽講說明白仁宗時賈昌朝曾公亮皆以知制誥兼講職今武仲若以中書舍人兼職自如故事吕希哲是司空公著之子公著嘗言此子不欺暗室其人經術履行識者皆謂可備勸講今已五十四嵗但希哲是臣妻兄故臣久不敢稱薦今將去朝廷竊謂言之可以無嫌更乞陛下詢問大臣參考其人吕大臨是大防之弟修身好學行如古人臣雖不熟識然知之甚久以宰相之弟故不敢言陛下素知臣不附執政又臣已乞外任故不自疑望陛下記其姓名以備他日選用吳師仁自為布衣以行誼稱於士大夫元祐初朝廷特召為學官衆論皆謂師仁宜入侍經筵臣前後已三薦師仁更乞采於衆論又奏臣伏見元祐之初陛下召程頤對便殿自布衣除通直郎充崇政殿說書天下之士皆謂得人雖真宗之待种放亦不過此也孔子曰舉逸民天下之民歸心焉夫舉一人而天下莫不歸心者何哉為善於幽隱者知其必不廢也陛下用頤實為希闊之美事才及嵗餘即以人言罷之頤之經術行誼天下共知司馬光吕公著與頤相知二十餘年然後舉之此二人者非為欺罔以誤聖聽也頤在經筵切望皇帝陛下進學故其講說語常繁多頤草茅之人一旦入朝與人相接不為關防未習朝廷事體迂疏則固有之而謂頤欲以故舊傾大臣以意氣役臺諫其言皆誣罔非實也蓋當時臺諫官王巖叟朱光庭賈易皆素推服頤之經行故不知者指為頤黨頤匹夫也有何權勢動人而能傾大臣役臺諫自古處士入朝無不被謗毁蓋處士本不求仕進能輕富貴公卿大夫自以已不能如此故無不稱重將謂處士入朝必有過人之能致太平之術故其責望常重至於不賢者則直以處士為矯詐為沽激為釣名又處士多不次得美官故其憎疾常多夫以賢者責望之重不賢者憎嫉之多是以處士入朝未嘗無謗毁也陛下謹擇經筵之官如頤之賢乃足以輔導聖學至如臣輩叨輔講職實非敢望頤也臣久欲為頤一言懷之纍年猶豫不决纍使頤受誣罔之謗於公正之朝臣每思之不無恨也今臣已乞去職若復召頤勸講必有補聖明臣雖終老在外無所憾矣時祖禹屢請知梓州執政擬從其請進龍圗閣待制太皇太后曰皇帝未欲令去且為皇帝留之執政諭㫖祖禹乃不敢復請
