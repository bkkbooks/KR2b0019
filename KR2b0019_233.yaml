body:
  text: 續資治通鑑長編卷二百二十九宋李燾撰神宗熙寧五年春正月辛巳朔御大慶殿受朝己丑廢內物料庫入御厨從編修三司敕孫亶請也詔鄜延路經略使趙卨詢問降羌如有願歸夏國者先以名聞諸路准此仍牒宥州令于逐路界首交割初上論西人內附者或以脅迫非其誠心欲令願歸者從之不願者隨便措置可以省糧食免檢察且足以示廣大推恩乃下諸路詳議已而有是詔此據朱本新本因之去年十二月戊午緣狤勝事已詔諸路此蓋重出或此詔但令先以名聞與前詔異也其後知原州种古言招降蕃部可用為鄉導不當問其願歸蓋漢官多惡蕃部恐迫脅令歸即反害恩信上曰如王廣淵計但欲遣歸蓋廣淵與韓絳不相能安石曰今絳已被斥留得蕃户陛下亦必不以此為功縱遣去亦不復加絳罪不知廣淵為此何意上曰欲表見絳所為皆非安石曰陛下但當論利害不當探人未必然之私意臣固嘗論留得此輩無所利但恐為患臣近見張守約言古渭一帶屬戶多餓死者今邊障極虛中國久來熟戶尚不暇救恤乃更欲招夏國老弱收養豈為得計上曰中國人固多誠不賴夏人然言者謂收納夏國人使彼人少即于彼有害安石曰陛下欲弱彼則先須强此欲害彼即先須利此令陛下所御將帥一心奉陛下所欲為然後可任以整緝邉事邉事各有條理然後可以撓夏國今熟户餓死將帥不能救恤陛下尚不得聞知如何乃能困夏國臣愚以謂方今所急在知將相之情以道御之使不敢偷惰欺謾然後邉可治邉可治則如秉常者雖欲掃除極不為難若未能如此即無困夏國之理人主計事當先校利害若利害果合如此恐不須妄疑其人心有所挾如此則人人各懷形迹孰敢復為人主盡力如西事之初陛下謂臣及韓絳皆欲以西事為已功故有此言臣以此於西事不能不存形迹然事至不得已亦不敢默默蓋人臣之義量而後入故不能先事極爭先事極爭則無後事之驗臣終身受妨功害能之嫌臣以為如此害於臣智故不敢然懷不能已固嘗論奏非特臣所懷如此前日執政大臣例皆如此今日計事陛下尚疑有傾韓絳者則誰復敢不避形迹為陛下計事陳瓘尊堯集邉機門論安石云云四年五月二十日又二十六日又六月十二日五年正月九日又六月二十六日瓘論附六月二十七日上曰王廣淵每事輒言宣撫司過失如趙卨多奪韓絳所與酬奬人官職然至降羌事則以為但當善遇之必得其用廣淵則專欲遣歸安石曰陛下不當怪廣淵屢奏宣撫司過失方慶州兵未變廣淵數為韓絳言如此役使兵士非便絳屢詆毁廣淵以為不忠陛下亦疑廣淵後果如廣淵所奏廣淵反降兩官廣淵豈能內無不平之心內無不平則其言自然如此陛下以种古為曉蕃情今令問蕃人願歸者聽歸豈有蕃人不曉蕃情者若蕃人曉蕃情即無緣有歸而盡被殺戮之理上曰恐邊吏欲其歸不免多方迫脅安石曰若遣歸果被殺戮則豈憚內徙除內徙外何事可迫脅兼此事關衆有何急切乃非理迫脅不畏為人所言上曰問之無傷要須别遣人問僉欲令計㑹地界人往上曰如張宗諤即欲遣歸文彥博曰王文郁乃欲存留安石令計㑹地界人與邉吏聚問必不敢非理迫脅上又言王慶民前奏招到人袒膊殺賊甚力後乃言不可存留止為人情反復難信安石曰彼若誠心內附已受官職祿賜即為我袒膊殺賊固本分事如王慶民所言者是也彼若父母妻子皆在彼乃為人虜掠而來欲望其盡心殺賊即無有此理如前日結星是也此非但不可望其殺賊亦恐更為內患种古但云可為鄉導即不知如此人乃能為賊鄉導今若推恩問願留者留去者去即留者皆為我用去者亦必懷惠異時討伐固宜有為內應報德如食秦繆駿馬盜袁盎侍兒之類則我雖遣去未為不得其用也自其後知原州种古云至不得其用也皆日録正月二十四日事朱本附九月今因之但朱本多所刪削如安石存形迹等語皆依日録添入府州言寧化軍送北界西南靣都招討府牒稱南朝兵騎越境施弓矢射傷轄下人其牒中官號有犯廟諱嫌音者詔河東緣邉安撫司劾元承牒官吏仍移牒北界招討府依理施行辛卯同管勾外都水監丞程昉言塞決河當增市芟草三百二十萬乞舉官四員置場于懷衛州及舉官一員提舉并優立賞格從之仍給常平司錢十萬緡所差官盤置及八分以上取㫖其餘草數委轉運司召人進納毋得抑置先是朝廷委河北轉運司計置稍草本司必欲科配百姓且言不爾必敗事及議安置場地又言别無處所乞㑹問提舉塞河所至是中書召問昉昉乃有是奏甲午詔自今賜同天節齊筵於尚書省丁酉趙卨言西賊數至綏德城抄掠牧放既奉朝㫖通和不敢追襲乞牒宥州詰問夏國令止絶詔卨依慶厯七年正月指揮遇有人馬殺逐出界仍牒報宥州卨又乞牒宥州催打量綏德城地界王安石請勿催上曰今不催即邉事未解嚴又恐彼謂可便得歲賜故不急安石曰彼必有定計催之不能使移易定計徒示汲汲生其驕易且歲賜須降誓詔降誓詔須待地界了當彼自當汲汲上曰彼既云依命或不須計㑹便令人往打量如何安石曰彼若誠肯退二十里地界則理須計㑹彼首領分擘界至彼若尚首鼠詎聽我打量上乃從安石言賜權發遣江淮等路發運副使皮公弼銀絹二百仍賜敕書奬諭初公弼言漕運涉淮有風波之險乞開洪澤河六十里稍避其害詔委公弼提舉至是功畢人以為便故也四年十一月壬寅始開河侍御史知雜事鄧綰言內侍押班李若愚以勞績求官其子違祖宗舊制且內臣僥求亂法不可長從之若愚尋言於樞密院乞解押班文彥博云若愚恐有人欲傾奪其位者故求罷王安石白上前密院與若愚子轉官臣不見條貫不許故進呈劄與密院密院若已刪去此條即合劄與中書云本院已刪去此條即中書亦不管密院所刪當否更但須理㑹却云特依皇城司條貫所有不許回授恩澤條貫令今後遵守施行若愚既非勾當皇城司如何用皇城司條貫既是已刪條貫如何却令今後遵守施行緣事有違法非但臣所不敢遵行雖檢正官亦皆以為不允臣茍不言是違法阿近習義所不能為非於若愚有利害與奪不知若愚辭差遣何意上曰若愚言為廢前省奏人故乞罷安石曰前省不奏人干若愚何事聞密院說恐有傾奪其位者上曰若愚為與程昉不相得安石曰此非臣所知也戊戌王安石以試中學官等第進呈且言黎侁張諤文字佳第不合經義上曰經術令人人乖異何以一道德卿有所著可以班行令學者定于一安石曰詩已令陸佃沈季長作義上曰恐不能發明安石曰臣每與商量季長錢塘人安石妹壻也黎侁未詳邑里二月十八日戊辰前衡州推官黎侁為光祿寺丞崇文院校書七年五月卒月張諤武昌人沈括筆談詳之司馬光熙寧五年正日記有㫖令曽布撰詔書付直史館進從來所解經義委太學編次以教後生己亥詔自今奉祠太廟命宗室使相已上攝事先是侍御史知雜事鄧綰言伏見著令郊廟大祀常以宰臣攝太尉受誓致齊動經纍日中書政事多所廢滯祭祀之禮于古則專以宗伯治神于唐則宰相之外兼用尚書嗣王郡王下至三品以上職事官通攝而本朝車駕行大禮亞獻終獻亦有以親王及宗室近親攝事者方陛下講修百度政府大臣翊贊萬機而又使之奉郊廟四時獻享之禮實恐淹廢事務欲乞明詔有司凡四時郊廟大祠專使宗室近親兼使相者攝上公行事故有是詔賜河東經略司銀絹各二十萬召人賒買收本息封樁以備邉費是日王安石留身白上以郭逵激智緣使攻王韶又謝景溫亦害韶事今秉常方弱正合經營外國之功雖不足貪然陛下欲大有為則方外國可以兼制之時不可失不宜為人所壞上曰外國功非所貪然須圗難于易以弭患難因問安石何以處此安石請即用韶帥秦徙逵他處上曰韶輕易如蘭山族才來請料錢便言舉屬內附安石曰韶但急于見知故不為髙逺若肯就招納即言內屬亦不為過考其前後計事乃無遺策于衆人窺伺傾側之中能立事不可謂無氣略比趙卨尤勝上曰且更待其有功欲用吕公弼代逵曰公弼易驅策委以韶事必盡心安石亦稱公弼可用上曰與何官安石曰向來罷樞密使亦無顯狀又經受遺詔當與節度使或宣徽使乃可上曰與宣徽使安石又白上陛下向欲移王廣淵如何上曰馮宗道體問得慶卒尚危疑未可易帥也辛丑陜西轉運副使太常少卿母沆知涇州祠部郎中趙瞻復權陜西轉運副使沆子娶吕大防女大防新知華州沆乞避親也尋召大防判流內銓大防以父老乞終華州任以便私養許之大防召判銓乃正月二十九日今併書司天監靈臺郎亢瑛言天久隂星失度宜罷免王安石于西北召拜宰相斥安石姓名署字引童謡證安石且為變仍乞宣問西南京留臺張方平司馬光并都知押班御藥看詳所奏及禀太皇太后上以瑛狀付中書安石遂謁告馮京等進呈送英州編管上批令刺配英州本城安石翼日乃出林希野史亢瑛上書論五緯失度建月久隂政失民心强臣專國行有大變王安石大怒送英州編管既行又追而大黥其靣𨽻牢城枷頃而遣之瑛受黥長呼曰瑛為百官所言冀國家改政事以消變乃為朝廷忠謀何罪而黥乎使瑛言不驗雖腰斬以謝衆亦未晚慨然自若録皇城使郭慶子實為左侍禁宰為右侍禁以慶與西賊戰沒也尚書右丞致仕何郯卒壬寅詔罷給西京蠶鹽令民止輸錢先是轉運副使陳知儉言京西九州軍歲給蠶鹽一百九十三萬斤為錢四萬八千二百五十緡然以鹽賦民數竒零民多不願請者乞止令輸錢又募商人入抵當請射此鹽增錢為五萬四千緡其所兑蠶鹽合折價并腳乘路費錢乞令制置解鹽司别封樁聽省司移用故有是詔詔兩浙察訪李承之先體量本路災傷同監司一靣擘畫賑濟以聞成都鈐轄司言昨威州為蕃賊侵凌而知西山霸州董永錫等領兵驅逐出界乞加旌賞詔永錫等加檢校官仍賜茶綵上批近中書畫㫖施行事止用申狀或檢正官取索到文字此事體不便可檢㑹熙寧三年條約遵守先是三年有詔須急速公事方得用申狀施行也王安石白上近緣河上事急速所以只用申狀行且用申狀施行亦必得㫖乃如此即於事體未有所傷理分不為專輒但要事務早集而已非過也臣竊觀陛下所以未能調一天下兼制外國止為不明於帝王大略非謂如此小事有所不察也上曰天下事只要賞罰當功罪而已若賞罰或以新近之故與疏逺所施不同則人不服安石曰臣自備位以來每自省念惟斷法官罪與在外官失出入人罪不同蓋以謂不如此即法官不可為非敢私之也他即不省覺乞宣諭令臣得以思愆上曰法官即當如此安石曰法官之外不知陛下所見聞何事上曰朝廷固無阿私但外方亦未免有用意不均事如勘河決事乃獨遣程昉安石曰陛下已令分析但恐有說緣昉開漳河後來又在京師提舉淤田當以此故不勘兼程昉要作第五掃堤被外監丞不肯所以致河決昉恐不當勘上曰如此亦合聲說安石曰若不當勘又何須聲說縱失聲說亦有何利害未得為阿私傷政體上曰程昉性行輕易昨上殿說中書每有河事必問臣臣說了方㑹得聞張茂則亦被昉迫脅云已得中書意㫖令如此作文字外官被昉迫脅可想見然才幹却可使但要駕馭爾安石曰中書所以用程昉者為河事無人諳曉又無人肯擔當故也塞河是朝廷事非臣私利陛下試思中書所以委任程昉不知有何情故曾蓋庇却程昉何等罪惡不知陛下聞得程昉復有何負犯上曰聞昉所舉買草官悉是內臣攬作文字人安石曰陛下所聞臣恐亦未必實豈有許多人悉是攬作內臣文字人就令如此中書亦無由知但轉運司買梢草不得須至委昉委昉即須許之舉官臣愚以謂先王使人用馮河馮河之人不擇險阻輕於進取然其用之乃不害國如昉是也若是妨功害能膚受浸潤之人雖能便辟伺候人主眉睫間最能敗壞國事恐如此人乃合覺察今陛下於此輩人乃似未能㸃檢陛下修身齊家雖堯舜文武亦無以過至於精察簿書刀筆之事羣臣固未有能承望清光然帝王大略似當更討論今在位之人有事韓琦富弼如僕妾者然陛下不能使之革靣契丹非有政事也然夏國事之極為恭順未嘗得稱國主今秉常又幼國人饑饉困弱已甚然陛下不能使之即叙陛下不可不思其所以此非不察于小事也乃不明於帝王大略故也陛下以今日所為不知終能調一天下兼制外國否臣愚竊恐終不能也陛下若謂方今人才不足臣又以為不然臣蒙陛下所知拔擢在羣臣之右臣但敢言不欺陛下若言臣為陛下自竭即實未敢緣臣每事度可而後言然尚或未見省察臣若自竭陛下豈能察臣用意此臣所以不敢自竭臣尚不敢自竭即知餘人未見自竭者忠良既不敢自竭而小人乃敢為誕謾自古未有如此而能調一天下兼制夷狄者如臣者又疾病屢與馮京王圭言雖荷聖恩然疾病衰憊耗心力於簿書期㑹之故已覺不逮但目前未敢告勞然恐終不能上副陛下責任之意上默然良久乃曰朕欲卿録文字且早録進安石曰臣所著述多未成就止有訓誥文字容臣綴緝進御上批見御集正月二十三日日録録此段亦在正月二十三日明日安石又白上程昉七月八日自淤田所離京赴河上第四第五掃乃七月八日決兼昉自從提舉修漳河即不曾管勾第四第五掃所以不曾取勘上以為然安石又具言昉所舉買草官五人者姓名且曰陛下昨謂攬作內官文字者必髙晦也晦嘗以所為詩來見臣與語亦惺惺幹得粗事今既許昉舉官止要能買草耳髙節上士豈肯就昉求舉但能買草即昉非謬舉若所舉人曾攬作內臣文字恐未合罪昉或作過敗事然後罪昉可也中書所以用昉止為河事不然交結昉將欲何為上曰程昉何用交結安石曰今議河事如李立之輩計料八百萬工朝廷必不能應副即立之輩自不肯任後患而張茂則與程昉獨肯任此比之懷奸自營之人宜見念察如李若愚言恐程昉讒害乞罷押班臣與王圭並曾問昉皆言與若愚無隙若其有隙不知是何時有隙如何今日乃始乞罷押班以避昉上曰若愚不為程昉乞罷押班安石曰臣但見密院如此說上曰密院只是料其如此昉不曾有此言安石曰不然陛下何以知昉與若愚有隙上曰為淤田司事異同有文字安石曰陛下自令若愚體量李師中王韶中書見其不實乃具前後情狀乞别差官不然則朝廷賞罰為姦人所移安用彼相既沈起體量王韶果無一罪文彥博反謂沈起附㑹又謂王韶之勢赫赫於關中陛下以此不能無疑故奪韶一官當是時韶實無一罪後因韓縝打量韶所言荒地始明白然陛下未嘗究問從初體量不實之人昨王韶奏生羌舉種內屬陛下便以為不合如此况蕃戶既受官職請料錢不肯屬夏國即是舉種內屬縱似矜功未為誣罔陛下即已非其如此至於妨功害能罔上不實即一切不問如此即人孰肯為陛下盡力盡力有何所利上曰王韶非不拔擢安石曰妨功害能沮害國事而陛下任用名位過於王韶者何可勝數則王韶受拔擢未為優過亦未足以勸人為忠此二十三日日録此兩段更須刪修癸卯詔自來修河差兵官領兵士不過一二百人名為防虞實不足應事今開修二段河所聚人夫十餘萬復以場地迫窄聚一處功役可差髙陽關路鈐轄康慶大名府路都監髙政各領兵一千于役所駐劄甲辰詔權提㸃江南西路刑獄提舉常平倉金君卿落權字仍賜敕書奬諭先是君卿奏昨王直溫蘇澥同議科定役錢召募人押錢帛綱入京每一萬貫匹支陪綱錢五百貫足本司詢問曾押綱鄉户衙前之家皆不願行遂用熙寧三年十二月并四年六月中書指揮選得替官貟使臣人員管押施行仍以向者王直溫等陪綱錢數太多相度每紬絹萬匹止支錢一百緡足錢萬緡支錢七十緡足募到官五十餘員管押及差人船上京交納並不差鄉戶衙前乞自今依此故有是詔于是王安石白上曰此事諸路皆可行但令監司稍加意許令指占好舟差壯力兵士及時遣行則替罷官人人爭應募之不暇茍或不然則雖詳立法度亦無益于事也知太原府劉庠言昨負糧入界及運修寨木植防拓義勇欲乞等第量免來年支移折變詔無和糴州軍據劉庠所定免七分支移者與免八分五分者免六分四分者免五分其下等戶全免折變太優幸令止免其半仍並作二年免放詔蠲陜西河東諸路熟戶蕃部弓箭手見缺貸糧乙巳樞密使文彥博言繼聖堂乃祖宗燕射之地今為造弩樁所運斧斤置爐煆䙝黷至甚乞移置他所或歸有司從之丙午延州言夏人集兵界上恐以地界延袤為說先自立堡寨樞密院言若于二十里內作堡寨須止約王安石曰未降誓詔不須止約彼必已有定計方欲通和決不肯爾或猶倔彊非止約可禁兼約二十二日㑹議今已二十六日降指揮亦無所及但當委自延州應接上從之丁未知邠州光祿卿直昭文館張靖知陜州避王廣淵也樞密院言本院守闕貼房補破食貼房闕新條試行遣公事自後試揀已是難得合格今後逐房副承㫖欲每遇大禮許保引親屬兩名充守闕貼房主事令史一名書令史兩遇大禮一名及十六歲以上召命官二人為保遇有破食貼房闕一例試補如闕數少所試合格人多即别編排不為黜落數如試不中又不該編排但及三次以上在院習學及三年周者並勒出院其子孫弟姪出院之後復能習學進長候合保引人年分更許保引一次蓋所以使人才有可搜擇而激厲來者非如向時止據見在守闕人數于纍試黜落之餘短中求長而已非獨如此又保引者别無沮勸不肯公心引致欲令後一試便中者所保引令史書令史升一名再試中者兩人以上升一名主事以上合升一名者候出職日減一年磨勘如所引人三試不中勒出院者併及二人以上令史書令史降一名主事以上出職日展一年磨勘本院令史欲參用三班使臣流外選人與隔間收補仍以十人為額使臣取殿直以下至借職曾經一任流外選人三考以上者充每一闕取兩人赴院于所闕房試公事滿兩月揀一名充資序髙者補令史次者補書令史不中者與指射差遣內刑房有闕亦許選取曾任刑法選人使臣充從之延州以夏人牒來上牒稱除綏州外各有自來封堠濠塹更無整定上批差官照認地界文字且令未要發去文彥博吳充因言諸路不須打量况自來爭競亦不因地界多緣邉吏侵彼王安石曰侵爭之端常因地界不明欲約束邉吏侵彼亦須先明地界彼所以有此言者惟欲速了耳陛下當察人情緩急而應彼既自急即我當以緩應之我以緩應彼彼自當急而就我上以為然又曰恐不須問彼便可自立界至安石曰如此即不可彼牒稱免見頻損要盟有傷大體今及未降誓詔以前不與先定界至降誓詔後若彼却有爭占不可便與絶好便與絶好則傷國體不與絶好則彼已得歲賜於應報未肯汲汲宜令延州牒宥州云今來界至雖不全要整定然自來亦有封堠濠塹不分明及全無封堠濠塹處須合差官重别修立若不計㑹夏國首領又慮邉臣或以侵占久逺却起爭端上從之二月辛酉實録書折克雋事更須參考先是曾孝寬為王安石言有軍士深詆朝廷尤以移併營房為不便至云今連隂如此正是造反時或手持文書似欲邀車駕陳訴者于是安石具以白上文彥博曰近日朝廷多更張人情洶洶非一安石曰朝廷事合更張豈可因循如併營事亦合如此此輩乃敢紛紛公肆詆毁誠無忌憚至言欲造反恐須深察又恐搖動士衆為患吳充曰併營事已久人習熟何緣有此近來惟保甲事人情不安昨張琥亦言軍士一日兩教未嘗得賞賜而保丁才射即得銀楪又免般糧草夫力軍人不如也安石曰禁兵皆厚得衣糧未嘗在行陳頃陛下與十分支糧非不加恤也今朝廷教誘保丁于軍士有何所負而遽敢怨望者以軍士怨望遂一不敢有所為乃是衆卒為政非所以制衆卒也上曰如此即與唐莊宗無異矣充曰如慶州事令屬戶在前募兵在後當矢石者屬戶也於募兵無所苦而反何也安石曰募兵與屬戶同出戰其勞費等至遇賊取功賞則惟屬戶專之募兵皆不預至令貧窘無以自活則其為亂固其所也豈與教誘保丁事類上曰宣撫司所以致軍人怨怒非一事如奪騎士馬使屬戶乘之又一降羌除供奉官即差禁軍十人當直與之控馬軍人以此尤不平安石曰如此事恐未為失蓋朝廷既令為供奉官即應得禁軍控馬如何輒敢不平如漢高祖得陳平令為護軍諸將不服令盡護諸將乃不敢言小人亦要以氣勝之使其悖慢之氣銷但當深察其情不令有失理分而已上言太祖善御兵又言斬川班事安石曰五代兵驕太祖若所見與常人同則因循姑息終不能成大業惟能勇故能帖服此輩大有所為然恃募兵以為國終非所以安宗廟社稷今五代之弊根實未能除上曰如慶卒柔逺之變賴屬戶乃能定慶卒所以不敢復偃蹇者懲柔逺之事恐屬户乘之故也然則募兵豈可專恃朱史乃以吳充張琥所言係之三月二十二日韓絳貶後誤矣史官初不知王安石因禁卒詆併營事故專以募兵為不可恃其言殊激切不平非主韓絳崇奬蕃部也今依日録仍見於此上欲得詆毁軍士主名樞密院請責殿前馬步三帥安石請委皇城司上曰不如付之開封府乃令安石召元綘至安石第諭意不知究竟何如當考林希野史云初司馬光貽書王安石闕下爭傳之安石患之凡傳其書者往往隂中以禍民間又僞為光一書詆安石尤甚而其辭鄙俚上聞之謂左右曰此決非光所為安石盛怒曰此由光好傳私書以買名故致流俗亦效之使新法沮格異論紛然皆光倡之即付獄窮治其所從得者乃皇城使沈惟恭客孫杞所為惟恭居常告杞時事又語常涉乘輿戲令杞為此書以資笑謔獄具法官坐惟恭等指斥乘輿流海島杞棄市以深禁民間私議己者其後探伺者分布都下又明年曽孝寬以修起居注侍上因言民間往往有怨語不可不禁安石乃使皇城司遣人密伺于道有語言戲笑及時事者皆付獄上度其本非邪謀多寬釋之保甲民有為匿名書揭于木杪言今不聊生當速求自全之計期訴于朝安石大怒乃出錢五百千以捕為書者既而村民有偶語者曰農事方興而驅我閲武非斬王相公輩不得休息邏者得之付獄安石以為匿名書者必此人也使煆錬成獄民不勝榜掠而終不服法官以詬罵大臣坐徒三年上笑曰村民無知止令臀杖十七而已開封推官葉溫叟在府不及一歲凡治竊議時事及詬罵安石者三十餘獄林希所云須細考之七月己亥閏七月癸酉皆有匿名事當并考又四年三月己酉孝寬乞立賞捕扇惑保甲人與此相關戊申度支副使兵部郎中楚建中為天章閣待制陜西都轉運使王安石以謝景溫害王韶事欲罷之上問誰可代景溫者王圭言建中可用上許之安石因請與建中轉職又言建中强幹與蘇寀榮諲不類故有是命尋命景溫知襄州又改曺州景溫知襄州在二月一日改曺州乃三月二日今并書詔編揀添修弓弩供備庫使胡拱西京左藏庫副使王文質各遷十資提舉官入內副都知張若水東上閣門使李評賜金帛有差先是軍器庫弓弩歲久多損折不可用上閔科買工作勤人力而費國財乃命有司料簡整治數年得二十餘萬故賞評等賀州别駕种諤量移潭州上批諤已經大赦可使過嶺北也此據御集己酉試校書郎王安禮為著作佐郎崇文院校書安禮先掌河東機宜吕公弼薦於朝謂材堪大用代還召對稱意欲遂加峻擢兄安石辭之乃有是命林希野史云云已附注四年十月壬申王安石白上西事稍定宜經制邉防須先定大計以次推行不可臨時采衆人議論如此必無成上曰當先部分百姓令習兵安石曰誠當如此仍減屯戍之卒積財穀嚴紀律上曰邉頭屯戌近已大減馮京曰惟蔡挺奏減上曰郭逵殊不肯減安石曰太祖時將帥或令兒男乞增兵不許至哭泣出國門若縱將帥自便則朝廷無定計上曰太祖時將帥亦豈盡過人但能以道御之而已上曰言王韶事當應副足可經制張守約言若欲取橫山當令所備處重則橫山輕而易舉今蘭州界近涼州即取橫山為易安石曰此蓋王韶本謀上言古渭建軍及城武勝為便又曰韶亦須更得人助之如欲招舊勇敢作新勇敢殊未安安石具論其不然且曰此樞密院與郭逵妄奏惑上也招敢勇事三月十四日四月十七日更詳之上又論流品限人非是聞舊為吏人雖作諸司使副見舊所服事官不與同坐此何理馮京曰此條貫安石曰此但是弊法非有義理王命之則成矣豈復當計其初賤京曰此輩或經笞撻安石曰今或名位顯所為合服重刑者豈少如此人自為可賤若以地勢卑賤小過為人笞辱但為不幸非義當不齒之人上意亦以為然安石曰古人立賢無方如陛下自醫工技溫杲為職官職官雖多然如溫杲者自少自木工技楊琰為殿直殿直雖多然如琰者自少上曰風俗既成人各不自知理分如琰自不敢與內臣同坐飲食自以為本賤故也備要云春正月置京城邏卒廢北京永濟縣滄州饒安縣為鎮忠州桂溪縣入墊江是月命皇城司卒七千餘人巡察京城謗議時政者收罪之此據司馬光日記係五年正月末事今附見此更詳考之十月戊辰馮京云云蓋指此也
