body:
  text: 續資治通鑑長編卷一百八十二宋李燾撰仁宗嘉祐元年春正月甲寅朔上御大慶殿受朝前一夕大雪至壓宫架折上在禁庭跣足禱于天及旦而霽百官就列既卷簾上暴感風眩冠冕欹側左右復下簾或以指抉上口出涎乃小愈復卷簾趣行禮而罷戊午宴契丹使者于紫宸殿宰相文彥博奉觴詣御榻上壽上顧曰不樂邪彥博知上有疾錯愕無以對然尚能終宴巳未契丹使者入辭置酒紫宸殿使者入至庭中上疾呼曰趣召使者升殿朕幾不相見語言無次左右知上疾作遽扶入禁中彥博以上旨諭契丹使者云昨夕宫中飲酒稍多今不能親臨宴遣大臣就驛賜宴仍授國書彥博與兩府俟於殿閣久之召入內副都知史志聰鄧保吉等問上至禁中起居狀志聰等對以禁中事嚴密不敢泄彥博怒叱之曰主上暴得疾係宗社安危惟君輩得出入禁闥豈可不令宰相知天子起居欲何為耶自今疾勢小有增損必一一見白仍命引至中書取軍令狀志聰等素謹願皆聽命及夕皇城諸門白當下鎖志聰曰汝自白宰相我不任受其軍令由是禁中事宰相無不知者庚申詣內東門小殿問起居上自禁中大呼而出曰皇后與張茂則謀大逆語極紛錯宫人扶侍者皆隨上而出謂彥博等曰相公且為天子肆赦消災彥博等退始議降赦茂則內侍也上素不之喜聞上語即自縊左右解救不死彥博召茂則責之曰天子有疾譫語爾汝何遽如是汝若死使中宫何所自容耶戒令常侍上左右無得輒離皇后以是亦不敢輒至上前諸女皆幼福康公主稍長時已病心初不知上之有疾侍上側者惟十閣宫人而已上既不能省事兩府但相與議定稱詔行之兩府謀以上躬不寧欲留宿禁中而無名辛酉彥博與富弼建議設醮祈福於大慶殿兩府監之晝夜焚香設幄宿于殿之西廡史志聰等白故事兩府無宿留殿中者彥博曰今日何論故事也遣近臣禱于在京寺觀天下長吏禱于嶽瀆諸祠壬戌上疾小間暫出御崇政殿以安衆心癸亥賜在京諸軍特支錢是日兩府求詣寢殿見上史志聰難之富弼責之曰宰相安可一日不見天子志聰等不敢違兩府始入福寧殿卧內奏事兩制近臣日詣內東門問起居百官五日一入甲子大赦蠲被災田租及倚閣稅戊辰罷上元張燈自是上神思寖清寧然始不語輔臣奏事大抵首肯而已己巳命輔臣禱天地宗廟社稷壬申罷醮兩府始分畨歸第不歸者各宿於其府知開封府王素嘗夜叩宫門求見執政白事彥博曰此際宫門何可夜開詰旦素入白有禁卒告都虞候欲為變者執政欲收捕按治彥博曰如此則張皇驚衆乃召殿前都指揮使許懷德問曰都虞候某甲者何如人懷德曰在軍職中最為良謹彥博曰可保乎曰然彥博曰此卒必有怨於彼誣之爾當亟誅之以靖衆衆以為然時富弼以疾在告彥博請劉沆判狀尾斬於軍門彥博初欲自判王堯臣揑其膝彥博悟因請沆判之及上疾愈沆譛彥博於上曰陛下違豫時彥博斬告反者彥博以沆判呈上上意乃解蘇頌作孫抃行狀云禁門不開幾旬日雖執政大臣不得進見但通名於內東門候起居抃率同列謂宰相不宜坐待宰相用抃言乃叩閽入禁中按上以元日不安初七日宰相即入禁中此云禁門幾旬日不開誤也今不取富弼責史志聰此據范純仁行狀弼以疾在告王堯臣揑文彥博膝皆從司馬光記聞弼責志聰記聞亦有之記聞又載樞密使王德用開便門入中書彥博執守門親事官送開封府撻之明日謂同列曰悔不斬守門者天子違豫禁中門户豈得妄開乎恐此事未必然若然則兩府安得無隙今不取壬午大雨雪木氷西蕃默戩覺首領來貢方物二月甲午詔兩制以上日問候于內東門餘皆罷之實録稱兩制以上記聞稱兩府近臣今從實録丙申廣西安撫司言桂容等州蠻人楊克端等一百三人內附甲辰御延和殿帝康復丙午宰臣率百官拜表稱賀辛亥吏部流內銓請入令録選人舉主不犯贓濫及非致仕分司者聽用之奏可三月癸丑朔鹽鐡副使司勳郎中李參文思副使竇舜卿為荆湖北路安撫使初以本路轉運使李肅之及知辰州宋守信討蠻人彭士羲而知荆南王逵與肅之論事不合互奏曲直故遣參等體量知諫院范鎮言竊聞彭士羲父子相攻邊臣不奏朝廷擅出兵助其子以攻其父甚非王師問罪之體欲根究從初生事之人先正其罪仍令李參一面招撫免致荆湖虛被騷撓肅之與逵異論肅之傳終不詳逵又無傳據曽鞏志銘亦闕此丁巳詔禮部貢舉廣西安撫司言修雍州城成戊午吏部郎中天章閣待制張擇行為户部郎中集賢殿修撰提舉仙源縣景靈宫太極觀始擇行知諫院言陳執中命妾笞婢於律不當坐御史固迫之擇行因中風不能語於是左遷庚申兵部郎中直龍圖閣知陜州錢延年為集賢殿修撰張擇行既左遷朝廷命延年待制天章閣以補擇行之闕御史范師道趙抃言待制始置二員今處中外已十五員矣侍從不為乏人縱罷擇行闕何勞補延年庸猥無狀衆所共知若謂預有指揮則著例甚明不當引用知制誥賈黯亦言延年不才不可為侍從封還詞頭故改命之己巳侍御史梁蒨言伏聞天聖條制河北河東沿邊安撫副使都監并同管勾安撫司公事使臣等到闕奏事只得住十日近年多不遵守每入奏妄作名目住滯或敢面邀聖旨乞展日限留身京城幹辦私事經營岐路希望恩澤不惟妨本任管勾兼亦紊煩朝廷請申明前制從之會要二月十七日事辛未司天監言自至和元年五月客星晨出東方守天關至是沒壬申聖體康復命宰相謝天地社稷宗廟寺觀諸祠癸酉契丹遣順義節度使右監門衛上將軍蕭信右諫議大夫王行已來謝契丹主以朝廷屢遣使恤其喪因名信等為都謝使閏三月癸未朔樞密副使給事中王堯臣為户部侍郎參知政事給事中參知政事程戡為户部侍郎樞密使以戡與文彥博姻家故也詔閣門自今前後殿間日視事己丑殿中侍御史趙抃言臣昨覩聖旨以減省奏薦子孫親戚恩澤下兩制及臺諫官定奪尋已具條件聞奏竊聞再下中書密院重行詳定至今多日未降指揮伏緣聖節在近中外臣僚未知定制必是各依常年體例奏薦實為僥幸况此一事乃澄汰濫官之本源也當聖明之世或不能決行則因循之弊久而寖深朝廷紀綱日益弛廢伏乞早賜頒下所貴釐革冗員自今嵗始從之此據趙抃奏藁辛卯翰林學士王洙為翰林侍讀學士兼侍講學士知制誥劉敞知揚州敞王堯臣姑子洙堯臣從父堯臣執政兩人皆避親也洙罷一學士換二學士且兼侍讀國朝未嘗有知諫院范鎮請追還過恩且令洙依敞例出補外官又言洙在太常壞陛下禮樂為學士時進不由道資性姦回恐終纍堯臣章六上卒不報鎮安節度使同平章事程琳既歸本鎮上書言臣雖老尚能為國守邊未報得疾遽卒丁酉贈中書令諡文簡琳為人敏厲嚴深長於政事章獻時嘗上武后臨朝圖外人莫知帝後於邇英講讀謂近臣曰琳心行不佳蓋指此也然琳卒蒙大用議者謂上性寬厚無宿怒云巳亥占城國遣使貢方物實録於辛丑日又載詔書戒妄陳濟邊之䇿者與皇祐三年二月所下詔書辭意不異今不復載癸卯詔河北緣邊商人多與北客貿易禁物其令安撫司設重賞以禁絶之丙午録邵武軍進士吳彥方為郊社齋郎初廣西安撫司言彥方比應募擊賊親獲首級又嘗隨蕭注入洞招誘蠻人內附故録之殿前司言萬勝二十指揮元管五百人後來揀配逃走全然數少欲乞撥併為一十指揮下十指揮併入上十指揮見管軍頭十將節級數多欲選稍年髙有功一百五十五人送軍頭司收管祗候差使從之夏四月壬子朔李仲昌等塞商胡北流入六塔河隘不能容是夕復決溺兵夫漂芻藁不可勝計丙辰翰林學士兼端明殿學士翰林侍讀學士李淑兼龍圖閣學士落翰林學士淑復召入翰林未閲月御史中丞張忭等言淑姦邪又嘗匿服亟罷之知諫院范鎮言臣伏見御史言李淑姦邪不當為翰林學士竊緣李淑屢為翰林學士皆以姦邪罷去不待彈治而後為可廢也御史言之朝廷不即施行劄付李淑使淑自御史中丞而下歷加詆訾又諫官言王洙嘗由員外為翰林學士又以侍讀學士兼侍講學士皆是壞典故以僥幸干進事理至明白朝廷亦不即施行劄付王洙使洙妄稱與臣有隙茍自求免此大臣不任責以至煩瀆聖聽而虧損國體也臣竊惟陛下置御史諫官者使言朝廷是非也置執政大臣者使為陛下辨是非以處決朝廷天下之事也今御史諫官為陛下言之而大臣不為陛下辨之反以彈文示洙淑使相紛辨是何異州縣長官不為百姓辨曲直而令百姓自相鬬辨也御史諫官所言是與不是而已如其不是即當明正其罪以戒妄言如其是亦當即與施行今不即與施行仍以章奏示被彈之人而使紛紜如此臣恐朝廷之事益多而陛下之聽愈不得簡聖慮日以煩也端明殿學士左司郎中集賢殿修撰知鄭州曽公亮為翰林學士兼侍讀學士公亮治郡有能名盜賊悉竄他境至外户不閉民呼為曾開門初龍圖閣直學士李柬之請更定選舉補蔭之法知諫院范鎮請見任二府止許蔭已之親兄弟父之親兄弟若親兄弟之子正任團練使以上蔭曽孫知雜御史以上蔭孫帶職員外郎諸司副使止蔭子其嵗奏一人者三嵗一奏之侍御史毋湜請見任二府節度使以上再經乾元節蔭親屬一人知雜御史閣門使以上遇郊一奏薦餘必再經郊科場取士百司入流悉減半罷內臣蔭子孫及輸錢粟授官下兩制議而翰林學士承旨孫抃等言今二府及使相宣徽節度使三年蔭二人已減舊恩之半餘文武官請一嵗當任子者皆倍之內臣毋得過二人嬪御皇族約此為法罷南省特奏名百司入流者如吏部格弗聽減年或換武遂敕中書樞密院裁定於是詔見任二府使相宣徽節度使御史知雜悉罷乾元節恩蔭學士以下遇郊聽蔭大功親再遇郊蔭小功親郎中帶職員外郎初遇郊聽蔭子若孫再遇郊蔭期親四遇郊蔭大功以下親初該蔭而年六十無子聽蔭期親皇族大功以上妻皇族大功以上妻會要作皇親大將軍以上妻再遇郊亦聽蔭期親廣南東西路轉運使提點刑獄奏子孫若親兄弟一人益梓秦延并廣知州陜西河東河北廣西帶一路安撫使知州及益梓利夔路轉運使提點刑獄聽奏親屬已有官入優便地一人若子孫仍升一資京朝官升一任其員外郎知州而理監司資序舊得蔭者罷之嘗任兩府分司致仕遇郊奏聽旨分司大兩省官以上降一等郎中以上子孫未有官許蔭一人止凡致仕恩大兩省以上降一等郎中員外郎許奏子孫若弟姪一人毋得奏同宗無服之親三丞以上止與親屬徙優便官科場取士以皇祐四年進士限四百人諸科無得過其數皇祐四年不見此指揮至和二年十月己酉王圭奏疏亦止稱近詔不稱皇祐四年按皇祐五年三月賜鄭獬等及第出身凡五百二十人限以四百必在五年三月後四字或誤也志上卷亦無年號下卷乃爾當考罷南省特奏名百司入流必如吏部格無得敘勞減年及換武明年三月賜章衡等二百六十二人及第一百二十六人同出身又賜諸科三百八十九人及第又賜特奏名進士諸科二百十四人同出身此云罷南省特奏名當考其武臣閣門使已上至節度觀察留後統軍上將軍樞密都承旨及管軍節度觀察留後龍神衛四廂都指揮使捧日天武龍神衛左右廂主帶遙郡團練使已上遇郊蔭大功親再遇郊蔭小功親諸衛大將軍諸司使樞密副都承旨副承旨諸房副都承旨已上再遇郊乃聽蔭子若孫及期親初該蔭者遇郊即聽或已該蔭而子孫今未有官者亦凖此自後須再遇郊始聽之諸衛將軍諸司副使樞密院逐房副承旨以上再遇郊乃聽蔭子若孫陜西河東河北緣邊部署聽奏親屬有官入優便地一人若子孫與減磨勘年諸路鈐轄除廣東西及知雍宜州聽蔭子孫及期親外益梓利夔四路但聽奏有官親屬入優便地子孫與減磨勘年諸司使除諸衛大將軍致仕聽蔭子若孫一人如無子孫降等蔭期親或子孫已有官願升資者亦聽餘並依纍降條約此據成都編録條貫册增修國史遂削去武臣一節蓋比類文臣即可知然要未備也自是每嵗減入流者無慮三百員此據文同所作毋湜墓志當考國朝任子之令比前世最為優典凡得以官嵗上其名者數百人入流既繁仕路紛雜湜深疏其弊章下近臣會議類皆顧已謂久令遽更之不宜湜持之益堅道利害上前卒得請無慮嵗減三百員其源少清孤寒者獲敘進范鎮奏議國史所取甚略今取奏藁詳注之鎮言臣謹按唐制五品以上蔭孫三品以上蔭曽孫而無蔭兄弟叔姪之文今文官自知雜御史以上嵗奏一人自帶職員外郎以上三嵗奏一人武官自橫行以上嵗奏一人自諸司副使以上三嵗奏一人又無兄弟叔姪曽孫之品限而旁及疏從所以入流寖廣仕路益雜臣欲乞見任兩府聽蔭兄弟叔姪見任學士正團練使以上比唐三品得蔭曽孫知雜御史正刺史以上比唐五品得蔭孫帶職員外郎諸司副使以上專得蔭子兄弟叔姪降曽孫一等曽孫降孫一等孫降子一等又嵗奏一人與三嵗奏一人者自有京官試銜齋郎之别武官亦宜如是欲乞嵗奏一人者亦令三嵗奏一人於所得官上遞加一等或二等以優異之若得奉禮郎太祝者與大理評事諸寺監丞之類議者若曰今自學士而下捨兄弟叔姪而專任子孫非所以廣親愛之道臣切以為不然兄弟叔姪於公則刑不相及於私則財不相及著令因官置到資産不及兄弟叔姪於朝廷爵賞輕加之為不可也臣欲乞除品令得蔭外朝廷必欲徇其私愛加惠旁宗但令奏補無使入流如有才藝自隨科目貢舉課試中科目者比類白身人優與推恩其無子孫者特聼奏旁親一人入流如此則下不失私親之愛上無冗官濫賞之弊鎮又言唐制皆無蔭兄弟叔姪之文亦無一嵗二嵗三嵗之差惟以品數為限今諸司副使才比給事中舍而與帶職員外郎同得任子為太優幸欲乞諸司副使須歷路分鈐轄以上差遣方得奏補以比員外郎帶職者國朝典章大抵皆習唐故以其近而可用也惟是奏補之法未盡循用蓋國初天下新定人未樂仕至有敦遣富人使為官者故於兄弟叔姪之制未遑議也今太平日久入官者衆其於條革非稍放唐制不可伏乞檢會臣前奏令執政大臣一處參酹施行又言臣竊聞議者欲自兩制以上二嵗奏一人郎官以下六嵗奏一人郎官任官非三十年未能至乃是陳力之人今既有品數又限以年竊恐未均未均則下必怨下怨則行之不久閣門言垂拱殿上壽皇親郡王使相樞密使副宣徽使三司使至管軍駙馬共六班今權請合為四班仍減拜從之戊辰罷大宴以聖躬近康復也壬申殿中侍御史趙抃言臣伏覩今春朝廷指揮商胡北流口候至秋冬閉塞其條河司李仲昌張懷恩等全不依稟制旨妄稱水勢自然過六塔新河盛夏之初遂爾閉合一日之內果即衝開失壞物料一二百萬溺沒兵夫性命不少民力疲敝道途驚嗟豈非意在急功力覬恩賞失計敗事罪將誰歸伏望陛下特賜宸斷其仲昌懷恩及應管勾臣僚使臣等亟加貶黜以正典刑謝彼方之生靈誡後來之妄作此據趙抃奏藁以四月十一日上癸酉權鹽鐡判官屯田郎中沈立體量六塔河及北流河口利害以聞立歷陽人也甲戍御崇政殿録繫囚雜犯死罪降一等徒以下釋之入內副都知石全彬領寧逺留後任守忠領洋州觀察使鄧保吉領榮州防禦使史志聰領嘉州防禦使並以聖體康復給事有勞也己卯右司諫知制誥賈黯知陳州以父疾自請也尋改許州先是詔兩制兩省官惟公事許至中書樞密院見執政黯心知其非而嫌於自言及是乃奏他官皆得見執政而侍從近臣反疏斥疑間如此嘗聞先朝用王禹稱請百官候謁宰相並於政事堂樞密使亦須聚坐接見以防請託令下左正言謝泌上言以謂非人主推赤心待大臣大臣展四體報人主之義即時追寢前詔此據黯正傳劉攽作黯行狀獨不書此不知何也又不知即追寢前詔謂先朝之詔或至和二年七月詔也五月甲申詔以九月於大慶殿行恭謝之禮就支南郊賞給宋朝要録權罷冬至親祀南郊其賞給並如南郊例施行左千牛衛大將軍宗實幼養于宫中上及皇后鞠視如子既出還第問勞賞賜不絶諸宗室莫得比上始得疾不能視朝中外憂恐宰相文彥博劉沆富弼勸帝早立嗣上可之參知政事王堯臣之弟純臣為王府官數與堯臣言宗實之賢堯臣以告彥博等彥博等亦知宗實上意所屬乃定議乞立宗實為嗣既具藁未及進而上疾有瘳其事中輟至和議立嗣諸家各有記述要當以龍川别志為得實蓋彥博等私議英宗當立已曽具奏但未及上爾其詔草亦非偽蓋當日羣臣預為此奏可即降詔事不容緩其理勢亦當爾今國史及文氏私記皆云已奏詔草則恐未然今從别志止稱奏議不載詔草更俟考詳别志乃云事在嘉祐二年且謂韓琦與彥博弼同為宰相則誤也今不取是日知諫院范鎮上疏曰陛下置諫官者為宗廟社稷計也諫官而不以宗廟社稷計事陛下者是不知諫官之任也陛下不以臣愚任之諫官臣敢不以宗廟社稷計獻于陛下乎二月中臣使契丹還過河北河北之人籍籍紛紛皆謂陛下方不豫時有言曰我惟宗廟社稷計以憂勞而成此疾陛下所謂宗廟社稷計而憂且勞者得非皇嗣未立乎是時中外皇皇莫知所為而陛下方以宗廟社稷計為念是陛下之計慮至深且明也今陛下既已平復御殿聽政願推向者之言而終行之行之之術非明則不審非果則不決惟審與決而宗廟社稷之計定矣今祖宗後裔蕃衍盛大信厚篤實伏惟陛下拔其尤賢者優其禮數試之以政與圖天下之事以系天下之心異時誕育皇嗣復遣還邸則真宗皇帝時故事是也初周王既薨真宗皇帝取宗室子養之宫中此天下之大慮也太祖皇帝捨其子而立太宗皇帝者天下之大公也宗廟社稷之至計也伏惟陛下觀太祖皇帝大公之心考真宗皇帝時故事斷于聖心以幸天下臣不勝大願臣考之於昔參之於今謀之於心書之於疏疏成而纍月不上者大懼無益於事死今之世以纍陛下之明伏惟赦臣萬死之罪審之決之以定宗廟社稷之至計非獨臣蒙更生之賜乃天下之人之心也五月三日入范鎮奏疏並不載於實録鎮所修不欲自表見爾今悉以月日追載周王薨真宗養宗室子當考疏奏文彥博使提點開封府界諸縣公事蔡挺問鎮何所言鎮以實對明日挺謂鎮曰言如是事何不與執政謀鎮曰鎮自分必死乃敢言若謀之執政或以為不可亦豈得中輟也觀文殿大學士兵部尚書宗庠自許州徙知河陽戊子入朝詔綴中書門下班出入視其儀物己丑御史中丞張忭等言近聞知諫院范鎮乞上殿奏事未蒙俞允竊以臺諫之職是朝廷耳目之官凡所奏陳動關機密自陛下服藥調適僅將半年至今未得上殿比聞聖體漸康况中外機密萬務在臣等職業合奏之事甚多若祗上章疏難為周悉須合面陳伏乞特賜指揮依自來體例令臺諫官上殿此據趙抃奏藁五月八日全臺同上五月八日己丑也甲辰文思副使竇舜卿為西京左藏庫副使權荆湖北路鈐轄兼知辰州代宋守信也乙巳工部侍郎集賢院學士魏瓘為龍圖閣直學士知荆南代王逵也徙提舉江南西路刑獄度支員外郎王綽為荆湖北路轉運使領兵馬事代李肅之也肅之既與逵交訟又同守信入洞討蠻弗克故皆易置焉丙午彰德節度使兼侍中王貽永卒贈太師中書令諡康靖時帝初康復不及臨喪詔二府宗室往奠龍圖閣直學士右諫議大夫夏安期知延州州東北阻山無城敵騎嘗乘之安期至即命大築城方暑諸將白士卒有怨言安期益廣計數百步令其下曰敢有一言動衆者斬躬自督役不踰月而就延袤六里丁未遣官祈晴以晝夜大雨權增京城裏外巡檢六月辛亥朔詔雙日不御殿伏終如舊右監門衛將軍仲軻等九人各罰一月俸初仲軻等父宗説坐亂其子婦貸死除名廢居别第仲軻弟遮宰相哀訴而大宗正司請懲戒之宗説奉化侯允言子已見慶厯四年七月皇祐中坐法貸死除名與治平元年三月事相關丁巳供備庫使并代鈐轄蘇安靜領忠州刺史留再任安靜與契丹爭辨寧化軍天池廟地界既定特擢之事具皇祐五年正月戊午龍圖閣直學士給事中施昌言為樞密直學士知澶州時六塔河既修復決朝廷猶欲成之因以澶州授昌言冀便役事云命昌言知澶州以便役事此據昌言本傳六月壬子朔六塔河已決不知何故昌言今乃加職又後此三日李璋皆責而昌言獨免至十一月甲辰昌言始責殊不可曉今據趙抃奏議增修己未鎮海節度使同平章事判亳州陳執中為左僕射觀文殿大學士知亳州如故執中以疾自請之殿中侍御史趙抃上疏曰臣聞聖人之制變不可無權宜天下之能事不可失機會至於去禍以歸福却亂以格治救亡以圖存轉危以置安者用權宜適機會也向者伏覩陛下聖體偶一違豫中外人心莫不動搖賴宗廟社稷之降靈天地神明之垂祐四海蒙福宸躬濅康然猶上有謫見之文殆無虛月下有妖言之俗至于再三天其或者豈非以陛下皇嗣未立人心未有所係垂厥祥異明白丁寧警誡陛下意欲陛下深思逺圖亟有所為而然也權宜也機會也今其時矣書曰一人元良萬邦以貞易曰大人以繼明照於四方叔孫通以謂天下之本奈何以天下為戲韓愈亦云前定可以守法不前定則爭且亂臣不勝大願願陛下思所以答謫見妖星之警誡思所以固三聖百載之基業思所以安中外臣庶之憂惑思所以破姦雄隂賊之窺覬斷宸衷發天意擇用宗室賢善子弟或教育宫闈或封建任使左右以良士輔𨗳以正人磐石維城根本深固有是二者惟陛下示天下以至公而裁擇焉伏况陛下春秋富盛福夀延洪一旦皇子慶誕少陽位正儲二事體何損權宜方今施為且適機會轉禍亂危亡將然之勢為福治安存無疆之基豈不盛哉豈不休哉臣職有言責計無家為戴陛下之恩極泰山之重顧愚臣之命等鴻毛之輕儻一毫有益於朝廷則萬死甘從於鼎鑊此據趙抃奏藁以六月九日上辛酉降知澶州修河都部署天平留後李璋知曹州河北轉運副使同管勾修河司封員外郎燕度知蔡州提舉開封府界縣鎮公事同管勾修河度支員外郎蔡挺知滁州修河都鈐轄北作坊使果州團練使內侍押班王從善為濮州都監供備庫副使張懷恩為內殿承制提舉黃河掃岸殿中丞李仲昌為大理寺丞癸亥御史中丞張忭等言臣等於五月八日已後纍次奏乞許臺諫官依例上殿尋聞已奉聖旨以臣等所上章疏降付中書此蓋陛下聖心察臣等愚忠有開可之意至今逾月未蒙施行乃是執政大臣不欲臣等進對故為沮遏臣等遂於今月十三日同詣中書面問不上殿因依觀宰臣已下詞語無為臣等執奏之意緣朝廷置臺諫官為耳目之任所宜日親旒扆上補陛下聰明今逾半年未有一員得對雖中外急切幾務事繫安危陛下深居九重何從而知之臣等竊謂言路阻絶未有如今日之甚者伏望陛下早賜英斷指揮中書許令臺諫官依例上殿臣等必不敢以瑣細事務上煩宸聽尋有詔許中丞上殿此據趙抃奏藁不知以何日上奏藁編次在六月十九日前十二日後今附十四日蓋此奏藁云十三日同詣中書問因依必次日遂具奏也七月一日始詔羣臣復上殿奏事己巳殿中侍御史趙抃言臣昨彈奏李仲昌等不稟制旨不恤人言妄於盛夏之初修閉六塔河口失壞物料重困兵民願正典刑亟加貶黜朝廷且責後效掃約隨又破決急夫暴斂河北幾無聊生餘波橫流博州首被衝注近覩責降李仲昌張懷恩並充監當李璋蔡挺各移知州轉運使燕度等尚未加罪中外籍籍人情不平皆謂如數年前王建中在河隂只是進約過當致下流淺澀即時追官勒停又緣黃河隄防泛濫去處官員使臣雖去官者亦例皆衝替今仲昌等姦謀辨口誣惑朝廷邀利急功興起力役為害不淺敗事已多固宜行竄殛之刑豈得蒙寬宥之詔伏望特賜指揮其李仲昌張懷恩李璋蔡挺燕度等並從公議改置嚴科謝列城愁怨之民示公朝刑罰之當轉災沴為和氣在此舉也庚午殿中丞集賢校理通判并州司馬光上疏曰人臣之進言者捨其急而議其緩則言益多而用益寡矣人君之聽納者忽其大而務其細則心益勞而功益淺矣故明主不惡逆耳之言以察治亂之原忠臣不避滅身之禍以論安危之本是以上下交泰而事業光美也陛下自首春以來聖體少有不康天下之人側足而立纍氣而息恟恟然憂懼若蹈氷炭間雖痊平而民間猶有訛言以相驚動者雖有司以嚴刑束之彼口不得言中心惶惶何所不慮也陛下何不試思其所以然者何哉豈非儲二者天下之根本根本未定則衆心未安也賈誼有言抱火厝之積薪之下而寢其上火未及然因謂之安可乎當誼之時漢孝文帝春秋鼎盛有孝景為太子中外乂安公私富溢誼猶有是言使誼處於今日當云何哉陛下好學多聞且以前古之事迹之治亂安危之幾何嘗不由繼嗣哉蓋得其人則治不得其人則亂分先定則安不先定則危得失之幾間不容髮朝廷至大至急之務孰先於此而陛下晏然不以為憂羣臣愛身莫以為言此臣所以日夜痛心疾首忘其身之疏賤而不顧鼎鑊之罪也今夫細民之家有百金之寶猶擇親戚可信任者使謹守之况天下之大乎三代之王以至二漢所以能享天下之祿若是其久者豈非皆親任九族以為藩輔乎使親者猶不可信疏者庸足恃乎竊惟陛下天性純孝振古無倫事無大小關於祖宗者未嘗不勤身苦體以奉承之况祖宗光明盛大之基業豈可不為之深思逺慮措之於安平堅固之地以保萬世無疆之休哉天子之孝非若衆庶止於養親而已蓋將謹守前人之業而傳於無窮然後為孝也禮大宗無子則同宗為之後為之後者為之子也故為人之後者事其所後禮皆如父所以尊尊而親親也伏惟祖宗受天明命功德在人本支百世子孫千億而陛下未有皇嗣人心憂危伏望深念祖宗艱難之業斷自聖志昭然勿疑遴擇宗室之中聰明剛正孝友仁慈者使攝居儲二之位以俟皇嗣之生退居藩服儻未欲然或且使之輔政或典宿衛或尹京邑亦足以鎮安天下之心如此天神地祇宗廟社稷實賴陛下聖明之德况羣臣兆民其誰不歡呼鼓舞乎昔魯漆室之女憂魯君老太子幼彼匹婦也猶知憂國家之難蓋以魯國有難則身必危矣况臣食陛下之祿立陛下之朝又得承乏典册之府非比於漆室之女誠不忍坐視國家至大至急之憂而隱默不言臣誠知言責不在臣言之適足自禍然而必言者萬一冀陛下采而聽之不勝憤悶之誠上在位久國嗣未立及不豫天下寒心而莫敢言惟諫官范鎮首發其議光聞而繼之又與鎮書言此大事不言則已言一出豈可復反顧願公以死爭之於是鎮言之益力辛未詔開封府界及京東西河北轉運司水潦害民田其選官蠲放稅賦乙亥雨壞太社太稷壇戊寅兵部員外郎知制誥韓絳為河北體量安撫使西上閣門副使王道恭副之時宰相文彥博富弼主李仲昌六塔河議及敗事人莫敢盡言絳至河北具得其狀始請置獄劾治仲昌等由是俱被竄廢此據絳行狀劉攽所作也初議塞六塔河北轉運使周沆獨言近計塞商胡用薪蘇千六百四十五萬工五百八十三萬今仲昌計塞六塔用薪蘇三百萬工一萬共是一河所費財力不容若是之殊蓋李仲昌故先為小計以求興役爾今又河廣二百餘步六塔渠才四十餘步必不能容且橫隴下流自河徙以來填淤成髙陸其西堤粗完東堤或在或亡前日六塔水微通分大河之水不十分之三濵水之民喪業者已三萬户就使如仲昌言全河東注必橫潰泛濫齊博德棣濵五州之民皆為魚鱉食矣今自六塔距河千餘里若果欲壅河使東宜先治水所過兩隄使皆髙厚仍備置吏兵分守其地多積薪蘇以防衝決乃可為也然其勞費甚大恐未易可辦以臣度之六塔實不可塞不從及仲昌敗沆又上言民罹水災皆結廬隄冢糧乏可哀臣欲輒發近倉賑之顧大恩當自上出願亟遣使者案視收恤從之此據周沆本傳不知沆疏李仲昌議不可用在何時至和元年十二月遣使與河北京東漕臣詣銅城鎮相度河勢恐沆因此上疏然二年十二月沆猶被命同權知澶州應副修六塔河若既與仲昌議駁則不應更受此命或朝廷雖有此命而沆卒辭之故河決獨免責也今附見沆事於朝廷遣韓絳體量河北後時京師自五月大雨不止水冒安上門關折壞官私廬舍數萬區城中繫筏渡人命輔臣分行諸門而諸路亦奏江河決溢河北尤甚民多流亡令所在賑救之水始發馬軍都指揮使范恪受詔障朱雀門知開封府王素違詔止之曰方上不豫軍民廬舍多覆壓奈何障門以惑衆且使後來者不入耶知諫院范鎮言臣伏見河東河北京東西陜西湖北兩川州郡俱奏水災京師積雨社稷壇壝輒壞平原出水衝折都門以至宰臣領徒監總堤役其為災變可謂大矣然而災變之起必有所以消伏災變亦宜有術伏乞陛下問大臣災變所起之因及所以消伏之術仍詔兩制臺閣常參官極言得失陛下躬親裁擇以塞天變庶幾招徠善祥以福天下己卯詔羣臣實封言時政闕失王稱東都事略詔曰乃者淫雨降災大水為沴兩河之間決溢為患皆朕不德天意所譴其令中外實封言時政闕失毋有所諱范鎮又言伏見天下以水災奏者日有十數都城大水天雨不止此所謂水不潤下也傳曰簡宗廟不禱祠廢祭祀逆天時則水不潤下陛下恭事天地神祇肅祗祖宗山川之祠罔不秩舉至於號令必順天時非逆天時也非廢祭祀也非不禱祀也然而上天出此變者曉諭陛下以簡宗廟也宗廟以承為重故古先帝王即位之始必有副二以重宗廟也陛下即位以來虛副二之位三十五年矣臣近奏擇宗子賢者優其禮數試之以政系天下人心俟有聖嗣復遣還邸及今兩月餘而不決政所謂簡宗廟也此天變所以發也伏惟陛下深念宗廟之重必有副二以臣前一章降付執政大臣速為裁定以塞天變鎮以五月三日初上疏此云兩月餘則當在七月十日庚寅未謝晴以前或兩月餘字誤更詳之
