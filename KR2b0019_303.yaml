body:
  text: 續資治通鑑長編卷二百九十九宋李燾撰神宗元豐二年七月戊辰同管勾經制熙河路邊防財用駕部員外郎霍翔復為秦鳯路提㸃刑獄上批翔昨因申請乞免出巡朝廷慮其職事不專遂罷所領提㸃刑獄乃聞翔意氣沮喪無心經營職業可復兼舊職庶使自安任滿更不差人贈嘉王頵妻父故東頭供奉官王克善成州團練使妻母張氏延安郡太君詔汴口閉斷黃河水遣禮官致祭都水監丞范子淵言去月甲子已塞汴口故也又詔導洛入汴己通漕嚮緣河水湍怒綱運阻難增置河隄使臣河清軍士拔頭水手廨舍營房請受水腳工錢及汴口每年開閉物料兵夫之費自可裁損其令發運使盧秉條析以聞權發遣福建路轉運使兼提舉鹽事賈青請自諸州改易賣鹽酌三年之中數立額監官並産鹽州巡檢使臣不以課額高下令銓院選差從之同判國子監張璪言太學內舍上舍生中選者免解或免禮部試舊以直講考校不無挾情容有私取請自今補內舍上舍皆自朝廷差官考校送詳定學制所上封事者言雍州東北地勢高濶望仙坡尤高中有甘泉汲而不竭可徙城之並徙經略司於雍州詔知桂州曾布等相度利害布等言增築舊城自可守禦若城望仙坡不惟地勢欹斜亦恐公私勞費雍州地僻尤難致錢糧若徙經略司須增置吏員益屯馬軍宜如舊便從之己巳三佛齊詹卑國使來貢方物詹卑國當考二十七日並八月二十二日賜三佛齊物亦不及詹卑元豐五年十月十七日合參照右監門衛大將軍仲芮右千牛衛將軍叔益令攝令優令貫各遷一官叔益賜進士出身並以祕閣考試中等也宗室賜出身始此御史中丞李定言知湖州蘇軾初無學術濫得時名偶中異科遂叨儒館有可廢之罪四昔者堯不誅四凶至舜則流放竄殛之蓋其惡始見於天下也軾初騰沮毁之論陛下猶置之不問容其改過軾怙終不悔其惡己著一也古人有言曰教而不從然後誅之蓋吾之所以俟之者盡然後戮辱隨焉陛下所以俟軾者可謂盡矣而狂悖之語日聞二也軾所為文辭雖不中理亦足以鼓動流俗所謂言僞而辨當官侮慢不循陛下之法操心頑愎不服陛下之化所謂行僞而堅先王之法所當首誅三也刑故無小蓋知而故為與夫不知而為者異也軾讀史傳非不知事君有禮訕上有誅而敢肆其憤心公為詆訾而又應制舉對策即己有厭弊更法之意及陛下修明政事怨不用己遂一切毀之以為非是四也罪有四可廢而尚容于職位傷教亂俗莫甚於此伏望斷自天衷特行典憲御史舒亶言軾近上謝表頗有譏切時事之言流俗翕然爭相𫝊誦志義之士無不憤惋蓋陛下發錢以本業貧民則曰贏得兒童語音好一年强半在城中陛下明法以課試羣吏則曰讀書萬卷不讀律致君堯舜知無術陛下興水利則曰東海若知明主意應教斥鹵變桑田陛下謹鹽禁則曰豈是聞韶解忘味邇來三月食無鹽其他觸物即事應口所言無一不以詆謗為主小則鏤板大則刻石傳播中外自以為能並上軾印行詩三卷御史何正臣亦言軾愚弄朝廷妄自尊大詔知諫院張璪御史中丞李定推治以聞時定乞選官參治及罷軾湖州差職員追攝既而上批令御史臺選牒朝臣一員乘驛追攝又責不管别致疏虞狀其罷湖州朝㫖令差去官齎往詔開封府界沿流諸縣修造軍營倉庫材木並令提㸃司應副如用度不足令三司償其費從將作監請也辛未以聽宣趙氏為掌簿同知尚書內省都大提舉導洛通汴司言洛河清水入汴己成河道疏濬司依舊攪起沙泥却致淤填乞權罷疏濬從之壬申權陜西轉運判官太常博士葉康直兼同管勾經制熙河路邊防財用司代王君萬也代君萬據御集癸酉三司言江浙等路提㸃坑冶鑄錢司舊管五錢監近年江池饒州增歲鑄額及興國軍睦衡舒鄂惠州創置六監提㸃官一員通領九路水陸巡按不周欲增置官一員分路提㸃從之乃以太常少卿錢昌武領淮南兩浙福建江南東路李棻領荆湖廣南江南西路詔應給事東宫三班使臣再與指射差遣一次從龍人右侍禁王從壽乞恩故也甲戌詔陳世儒家産令開封府檢校河北緣邊安撫司言緣邊州軍主管刺事人乞選募人給錢三千以使臣職員或百姓為之緣邊安撫司廣信順安軍各四人雄州北平軍各三人霸州七人保州安肅軍各六人其雄霸州安肅廣信軍四榷場牙人於北客處鉤致邊情乞選舉通判及監官考其偵事虛實如至和元年詔賞罰從之至和元年詔當考宣徽南院使檢校太傅東太一宫使張方平為太子少師宣徽南院使致仕舊紀書此新紀不書乙亥詔陜西路轉運司年額鹽鈔許經制熙河路邊防財用司認數收買以李憲言轉運司常苦無錢以鹽鈔和糴輒為富人收蓄坐牟厚利而計置司積錢市物貨須藉鹽鈔輕齎故也西京左藏庫使孟德基西京左藏庫使忠州刺史彭孫提舉訓練荆南團結諸軍丁丑起居舍人集賢院學士沈括復龍圖閣待制戊寅詳定朝㑹儀注所言太常樂節樂器並文武二舞未應典禮伏請皇帝舉第一爵登歌奏和安之曲堂上之樂隨歌而登第二爵笙入奏慶雲之曲止吹笙餘樂不作第三爵間歌堂上歌嘉禾之曲堂下笙瑞木成文之曲一歌一吹相間第四爵合樂奏靈芝之曲堂上下之樂交作别定二舞制度文舞所執翟羽依聶崇義圖以翟羽為之舊攢疊雉尾插於髹漆之柄其狀如帚者廢勿用武舞當左執干右執戈舊承誤執玉戚非是又言作樂丹墀之上巢笙和笙各二人請增倍為八人丹墀東西各設三巢一和又請將作樂時先擊鞞次擊應然後擊建鼓又請去樂縣內散鼓設晉鼓以鼓金奏又請宫縣內設鼗以為樂節仍並乞付有司講習參定可否詔下太常寺以為可行乃從之詳定儀注所又言案儀禮堂上樂無鐘磬鄉飲酒記磬階間縮霤鄉射禮磬于洗東北大射儀樂人宿鐘磬于阼階東惟歌工與瑟工則席于西階上雖據士大夫及諸侯禮為說然以天子禮求之則周禮太師帥瞽登歌擊拊此堂上樂也磬師掌教擊磬擊編鐘說者曰教教視瞭也視瞭掌凡樂事播鼗擊頌磬笙磬鐘師掌金奏凡樂事以鐘鼓奏九夏皆在庭之樂以虞書言之則䕫曰戛擊鳴球搏拊琴瑟以詠戛擊柷敔也球玉磬也搏拊所以節樂琴瑟所以詠詩皆堂上樂也磬本在堂下鄭氏曰尊玉磬故進之使在上若擊石拊石則當在庭後世不原於此以春秋左氏𫝊載鄭人賂晉侯歌鐘二肆乃於堂上設歌鐘歌磬蓋歌鐘者謂堂上歌之堂下以鼓應之耳歌必以金奏相和故孔眺注晉語云歌鐘鐘以節歌是也豈謂堂上有鐘邪歌磬之名本無所出晉太常賀循奏置登歌簨虡采玉造小磬蓋取舜廟鳴球之制後周登歌備録鐘磬隋唐迄今因襲行之皆不應禮伏請正至朝㑹堂上之樂不設鐘磬太常寺以謂堂上鐘磬用之己久今若去之則歌聲與宫縣相遠難以相應伏請堂上設鐘磬如舊詳定儀注所又言古者歌工之數鄉飲酒禮工四人二瑟說者曰四人大夫制也二瑟二人鼓瑟則二人歌也此鄉大夫飲酒而云四人大射諸侯禮而云六人燕亦諸侯禮而云四人燕禮輕從大夫制也若然士當二人天子當八人為差次也案大射工六人四瑟則是諸侯鼓瑟以四人歌以二人天子八人則瑟與歌皆四人也魏晉以來有登歌五人隋唐歌者四員本朝因之是歌工四人周制也禮登歌下管貴人聲也故儀禮瑟與歌工皆席于西階上隋唐相承庭中磬虡之下擊以偶歌琴瑟非所謂升歌貴人聲之義今堂上琴瑟比之周制不啻倍蓰而歌工止四員音高下不相權蓋樂有八音所以行八風是以舞佾與鐘磬俱用八為數伏請罷去庭中歌者而堂上歌工增為八員琴瑟之數凖此其筝阮筑並罷太常寺以謂禮歌者在上而後世設於庭中誠為非是然而漢唐以來宫室之制寖廣則堂上比庭中甚遠其上下之樂節有不相應則繁亂而無序欲且如舊又朝㑹之禮本起西漢則後世難以純用三代之制筝筑等器小乞如舊詔並如舊詔兩浙路坊郭户役錢依鄉村例隨家産裁定免出之法初詔坊郭户不及二百千鄉村户不及五十千並免輸役錢續詔鄉村合隨逐縣民户家業裁定免出之法至是提舉司言鄉村下等有家業不及五十千而猶輸錢者坊郭户二百千以下乃悉免輸錢輕重不均故有是詔樞密直學士錢藻言五帝壇宫隘狹敝漏望祭殿宇不嚴執事之人寢興其上前事之夕牲牢脯醢無吉蠲之室以待薦羞疲老之兵負祭器於道路尤為䙝慢下禮院禮官請增修五帝齊宫殿四旁立紗槅子禁人非時升降别建神厨饌庫出太常祭器分置五帝齊宫餘數藏太常以備他祀並從之己卯詔中書四方詔獄及根治事皆逾年淹繫未能結正宜令諸房具出據輕重緩急隨宜立限約以稽違刑名逐房置簿勾考違者具姓名取㫖兩紀並書詔中書籍四方詔獄以考稽違詔知青州龍圖閣直學士陳薦禮部侍郎滕甫右諫議大夫李肅之權知青州轉運使祠部郎中王居卿通判比部員外郎張求等十一人各罰銅三十斤恩州清陽縣尉成象罰銅二十斤坐失察青州民楊和真自熙寧六年𫝊習妖教薦等迭為州守及通判都監也庚辰淮康軍節度使濮國公宗暉加同平章事兩紀並書此右監門衛大將軍仲營領秀州刺史仲營太皇太后母族馮氏出也上批以馮氏之後單微親寡太皇太后孝思慈愛之故特有是命詔陜西鹽鈔歲分三限即印給以制置解鹽李稷言民間鹽鈔價踴貴而折博務無見鈔可以平之致豪商居鈔以取利蓋三司不以時給鈔使然上批三司給鈔如舊無日限宜分科次責限行下故有是詔詔潤州制勘院告示華申甫如前案招通不實不用併計當議編管內詞涉王安石不得取問時呂嘉問已坐報上不實落職衝替復乞再勘朝廷以申甫所𫝊報與嘉問事狀已明恐其潛相附㑹反覆嘉問又妄引安石為證欲以自解上察見其姦故有是詔賜廣西經略轉運司度僧牒二百償商人入中錢餘給雍州修造之費經制熙河路邊防財用李憲言盧甘丁吳于闐西蕃舊以麝香水銀硃砂牛黃真珠生金犀玉珊瑚茸褐駝褐三雅褐花蘂布兜羅綿碙砂阿魏木香安息香胡連氂牛尾狨毛羚羊角竹牛角紅緑皮交市而博買牙人與蕃部私交易由小路入秦州避免商稅打撲乞詔秦熙河岷州通遠軍五市易務募博買牙人引致蕃貨赴市易務中賣如敢私市許人告每估錢一千官給賞錢二千如此則招來遠人可以牢籠遺利資助邊計從之朱本削去新本從朱本壬午詔歲給憲州公使錢千緡朱本以小事不當書今姑存之詔在京獄案有繫囚者法官先斷奏從大理卿崔台符請也舊紀書此詔新紀削去癸未詔諸路轉運司相度當置學官州軍以聞詔責檢校水部員外郎秀州團練副使沈起追先任刑部郎中勒停坐失舉也甲申詔太常博士館閣校勘王伯虎落館閣校勘罰銅十斤衝替西京左藏庫副使元日宣八斤內殿承制張九思四斤伯虎為密院檢詳文字坐貸日宣錢聽請求並殺驢鬻其肉以人馬借新及第進士而分錢于婢子及門客日宣九思並坐請求伯虎前己罷檢詳至是劾具皆特責也詔應新科明法舉人試斷案許以律令𠡠自隨乙酉知都水監丞范子淵請移河隂輦運司於行慶關兼管勾洛口從之西賊寇綏德城大㑹平等四將高永能等擊敗之此據密院時政九月一日呂惠卿所奏七月十九日事丁亥增修左騏驥院命鳳翔府鈐轄王君萬專管勾熙河路新置監牧及給散蕃部馬種君萬責鳳翔鈐轄未逾月也先是盡籍君萬家産以償所貸結糴錢猶缺官本萬餘緡君萬憤甚不一歲遂死後三歲乃悉除之君萬責鈐轄在此年五月二十七日死在三年五月三日李憲云云在六月十七日除所負在六年六月四日今并書之按李憲云云原文不載疑或有脫誤詔在京開封府界見封樁闕額諸軍請受可並送內藏庫别封樁詔罷沆州屯田務募人租佃役兵還所𨽻從轉運使徐禧請也熙寧七年四月十九日置沆州元豐元年六月二十五日可考詳定禮文所言古者薦新于廟之寢無尸不卜日不出神主奠而不祭近時乃擇日而薦非也禮曰未嘗不食新言新物之出未薦寢廟則人子不忍食新孝恭之道也薦新見於經者豳詩曰四之日其蚤獻羔祭韭周頌曰猗歟漆沮潛有多魚周禮漁人春獻王鮪鄭氏云祭以首時薦以仲月謂大夫士也若天子諸侯物熟則薦不限孟仲季月故月令孟夏薦麥孟秋薦稻魏高堂隆曰天子諸侯以仲月季月薦新蓋失之也禮文殘闕經之所載止於四物而已呂氏月令一歲之間八薦新物即仲春獻羔開氷季春薦鮪孟夏以彘嘗麥仲夏以雛嘗黍羞以含桃孟秋登榖仲秋以犬嘗麻季秋以犬嘗稻季冬嘗魚是也開元禮加以五十餘品景祐中禮官以謂呂紀簡而近薄唐令雜而不經於是定四時所薦凡二十八物視詩禮月令增多十有七品雖出於有司一時之議然歲時登薦已久禮緣時制損益不必同依於古則太略違於經則無法今欲稍加删定存先王所當享用見於經者其不經者去之伏請自今薦廟孟春薦韭羞以卵以葑仲春薦氷季春薦笋羞以含桃孟夏以彘嘗麥仲夏以雛嘗黍羞以瓜季夏羞以芡以菱孟秋嘗粟與稷羞以棗以梨仲秋嘗麻嘗稻羞以蒲季秋嘗菽羞以兔以栗孟冬羞以雁仲冬羞以麕季冬羞以魚今春不薦鮪實為闕典伏請季春薦鮪以應經義無則闕之可也凡此二十七物其新也人君不敢嘗必薦于寢廟不貴非時而出而時亦不可後也今太廟薦新之品出於玉津瓊林宜春瑞聖諸園及金明池後苑所供其所無者乃索諸雜物務然池苑所出與市鬻之物多至後時人已屬饜而方用登廟有乖薦新之義謂宜嚴敕有司凡新物及時即日登獻既非正祭則禮不卜日漢舊儀嘗韭之屬皆於廟而不在寢故韋𤣥成傳以為廟儀二十五祠而薦新在焉自漢至隋唐因仍其失薦新雖在廟然皆不出神主今出神主則失禮尤甚伏請依韋彤五禮精義所說但設神座俟寢廟成薦新于寢庶合典禮從之詔王鮪闕以魴鯉代戊子檢正中書禮房公事㑹陜西五路年計王震言異時陜西糧草取具於轉運解鹽司時調中都以佐緩急比年以來兵有寓政而士無冗食宜若日就省羡如呂惠卿所陳八年之內四亡其三盈縮相殊豈應如此蓋移用之才獨賴心計今臣考閲八年列其前後施行則轉運使之才可以畢見願因奏事條上其略而朝廷擇焉又言並塞屯兵芻粟為急其數至廣仰給有司送受待用宜有定法賴陛下聖德四方無事歲亦屢登而臨時調度常苦不足執事相諉每煩朝廷非所以為法也今兹遣使考計使上其實此要事也臣願得五路應屯之兵以率歲費通一歲豐凶之中以約物價量三司轉運司常辦之數以賦五路而加足焉以立每歲之定法從之呂惠卿所陳四亡其三當考詳六月十八日遣震知都水監范子淵言固護黃河南岸畢工乞中分為兩掃詔以廣武上下掃為名癸巳詔殿中丞國子監直講龔原追一官勒停展三期叙國子監直講和州防禦推官審官西院主簿沈銖國子監直講潤州金壇縣令葉濤各罰銅十斤銖勒停濤衝替原坐受生員張育銀綾及直講王沇之請求升不合格卷子為上舍銖坐受育瓷器竹簟濤坐受育茶紙並非假日受生員謁沇之介子銖季長子濤處州人也上批岐王皓嘉王頵歲支公使錢皓六千緡頵五千緡其半折絹可歲各實使錢八千緡賜三佛齊國進奉錢六萬四千緡銀一萬五百兩以進奉使羣陀畢為寧遠將軍判官陀旁亞里為保順郎將初三日可考甲午權發遣提舉三司帳司勾院磨勘司太常博士直集賢院王安禮兼直舍人院上批命之提舉成都府路常平等事比部員外郎范子諒言本路役錢釐毫以下者圓零就分其圓零出剩錢與役錢一處收附臣竊詳議法之初本以民稅為定制計輸役之數以為常費立例出錢則錢有限使民信而易知今則始為奇零不齊又復圓零覆折增加不定且取財入官亦當明白不宜文理委曲徒令吏史旁緣為姦今相度民户供輸自合圓零就整減放釐毫以下錢數不多庶文簿簡省易為㑹計從之是月詔諸路教閲禁軍無過兩時此據本志增入八月丙申朔鄜延路經略使呂惠卿言蕃部吹凌結受西人伊都報西界㸃集入寇日賊果於是日自滿堂川大㑹平殺傷防田人馬兵官李浦等逼逐出寨詔增給伊都綵銀各百吹凌結綵百舊紀書夏人寇大㑹綏德城都監李浦敗之新紀書寇綏德城恐新紀誤當考丁酉詔春秋釋奠昭烈武成王廟令三班院選差使臣為讀祝捧幣分獻官戊戌賜故祠部郎中同提㸃在京倉草場劉昭逺家銀絹各百以提㸃沈希顔言其家貧故也權提㸃梓州路刑獄穆珣言資州廣安軍有子為人所殺而父母受財私和者皆決以親屬被殺私和朞親徒二年半律案刑統稱子孫之於祖父母皆有祖父子孫之名其有相犯多不據服而斷賊盜律有所規求而故殺朞以下卑幼者絞鬬訟律子孫違犯教令而祖父母毆殺者徒一年半故殺者加一等今子孫被殺父母乃坐私和徒二年半則是私和之罪重於自殺舉重明輕難從旁期之法止當用不應得為輕重法乞下有司申諭天下從之詔罷澶齊冀深太平州奏職員帳以天聖時令敕有職員帳季一奏而他州無之故也己亥權陜西轉運使都大提舉成都府路茶場李稷乞徙提舉茶場司於奉州從之導洛通汴司言提舉在京蔡河隄岸司不時報應人兵工役乞劾罪詔管勾使臣王處厚乃孫固妻弟王詵之叔父小人之情慿恃親貴故此陵慢可送大理寺劾之後處厚坐罰金詔濮安懿王子贈濟州防禦使宗邈特贈建寧軍節度使成國公以其子登州防禦使仲覽等乞優贈故也庚子改太常博士監察御史裏行唐淑問為工部員外郎權發遣宣州淑問前以御史裏行權知郢州丁母憂服除罷臺職故遷之大理評事崇文院校書權檢正中書禮房公事蔡京為太子中允館閣校勘詔西京左藏庫副使楊從先如京副使張述供備庫副使裴景六宅使忠州刺史彭孫各遷一官以安南招討司言從先等率舟師入交址力戰有功也上批見修敕令格式諸所析正自朝廷立法付有司者委樞密承旨司詳定聞奏付諸房遵行辛丑召輔臣觀榖于後苑計議措置邊防事所言以涇原路正兵漢蕃弓箭手為十一將第一第二將駐渭州第三將原州第四將綏寧寨第五將鎮戎軍第六將彭陽城第七將德順軍第八將水洛城第九將靜邊寨第十將隆德寨第十一將永興軍奉天縣並從之詔於分定將內别定一將策應熙河路兩紀並書分涇原路兵為十一將壬寅詔諸修敕式局看詳合釐正朝廷與有司相照立式事委檢正中書户房畢仲衍編修又詔翰林學士司封員外郎知開封府蔡延慶落職知滁州開封府見鞫李憲妻王氏事移大理寺先是王氏母詣府訟憲婢謀害王氏延慶初欲避免簽書又謂王氏欵辭有狀外事不當治推官蔡承禧爭之與延慶更論奏乃下審刑院刑部定以為應受理於是御史舒亶言開封府官吏觀望畏縮獄辭所逮或置不問詔本府盡理根治然尤以準御寶批專勘公事為名追捕上批此蓋府官回避畏忌不敢據告發事施行令開封府具析以聞仍令左右㕔推判官同鞫外餘並依常事行遣亶又言延慶於行遣偷為一切以脫怨怒乞重行黜責故有是命三年六月二十一日楊汲辨憲誣或附此蔡承禧奏議有可刪取增入者舊紀書蔡延慶不窮治李憲惟薄落翰林學士罷知開封府知滁州新紀不書以判吏部流內銓樞密直學士錢藻權知開封復八作司為東西兩司各置監官文臣一員武臣二員遇大禮及大興造即同管勾八作司舊分東西後合為一將作監以為非便故復之癸卯詔聞熙州軍資庫自六月以來官吏俸諸軍傔料隨依蕃官請給修城支用等錢闕二萬餘緡慮河岷州通遠軍亦如此其令陜西轉運司速應副仍具析以聞又詔西京左藏庫副使楊進等二十三人各展磨勘二年坐試諸軍武藝誤給銀萬餘兩為殿前司劾奏詔免備償故薄懲之甲辰知制誥李清臣為遼主生辰使西上閣門使曹評副之主客郎中范子淵為正旦使皇城使雅州刺史姚兕副之後子淵免行以太常丞檢正中書户房公事畢仲衍代之詔出三司錢十五萬緡付鄜延路經略司市封樁糧草同修起居注王存言古者左史記事右史記言唐貞觀初仗下議政事起居郎執筆記于前史官隨之其後或修或廢蓋時君克己勵精政事其職修或庸臣擅權務掩過惡則其職廢皆理勢然也陛下臨朝旰昃睿明四達動心稽古言必本經至於裁决萬幾判别疑隱皆出羣臣意表欲望追唐貞觀典故復起居郎舍人職事使得盡聞明天子德音退而書之以授史官儻以為二府奏事自有時政記即乞自餘臣僚前後殿對許記注官侍立著其所聞關於治體者庶幾謨訓之言不至墜失上諭存曰史官自黃帝時已有之至漢武帝有禁中起居注今起居注之名當始於此近世誠為失職且人君與臣下言必關政理所言公則公言之所言私則王者無私自非軍機何用祕密蓋人臣奏對有頗僻或肆讒慝謂人君必須涵容難即加罪因而無所忌憚若左右有史官書之則無所肆其姦矣卒不果行丙午詔修起居注官雖不兼諫職如有史事宜於崇政殿延和殿承㫖司奏事後直前陳述從修起居注王存請也王安禮傳云安禮同修起居注故事左右史記言動毋得輒有所陳至是詔許直前奏事自安禮始蓋安禮與王存同修注其實存請之熙寧四年七月末兼諫職者乃許直前以熙河路鈐轄東上閣門使李浩為四方館使浩熙寧十年有戰功詔候二年轉四方館使至是遷之詔無料錢京官差知縣縣丞者給令丞俸罷添支驛料丁未右諫議大夫知河南呂公孺知河陽洛口役兵千餘人憚役不稟令排行慶關不得入西趨河橋其徒有來告者諸將請出兵擊之公孺曰此曹亡命窮之則生變乃令曰敢殺一人者斬於是乘馬東出令牙兵數人前諭曰爾輩久役固當還然有不稟令之罪若復度橋則罪加重矣太守在此願自首者止道左衆皆請罪索其為首並助謀者黥配之餘置不問復送役所語洛口官曰如尚敢偃蹇者即斬之衆帖然不敢動乃自劾不俟命詔釋之此據本傳或自有時今附公孺初除時遣司農寺都丞吳雍同兩浙路提舉官講議役法催促結絶中書言應朝㫖置獄究治事欲委審刑院刑部置簿管勾非特旨立限者及一季未奏下所屬催促無故稽留若行移迂緩並所屬不催舉並劾奏責刑房季終㸃檢從之賜澶州度僧牒六百五十償水利司錢以嘗出監主簿齊郎告牒募人入錢而久無應募者故也詔昨遣殿前步軍司虎翼十指揮赴順州及機榔縣太平寨戌守比已歸營皆瘴癘死亡之餘可並升補神勇指揮仍免兩季簡選內已減為剩員者與免減為小分戊申上批導洛水入汴及治隄捍河悉有成績可令宋用臣范子淵具總事效力官吏第賞詔濬淮南運河自邵伯堰至真州十四節分二年用工從轉運司奏也詔在京賣麴以百二十萬斤為歲額斤錢二百五十候賣及舊額復舊價酒户所負白糟糯米錢更展限二年帶納京師麴法自熙寧四年定以八十萬為歲額斤錢二百後多不能償雖屢倚閣未請麴數及減歲額為百五十萬斤斤增錢至二百四十猶不免逋缺酒户又負市易務白糟糯米錢五十餘萬緡至是命户房檢正官畢仲衍太常博士周直孺同三司講究利害乃請減麴額為百二十萬斤斤為錢三百均給七十店令月輸錢周歲而足月輸不及數計所負倍罰又炊醖不以時擅增器量及用私麴皆立告賞法悉施行之而裁其價又有未請麴數十萬斤悉蠲之都提舉市易司言諸路民以田宅抵市易錢缺不能償公錢滯而不行缺户有監錮之患欲令賖當在官於法當賣房廊田土重估實直如賣坊場河渡法未輸錢間官收租課不惟稍寬缺户禁錮而公家亦享實利在京市易務凖此又言本司歲出本錢計置畿縣第四等戶體量草關由開封府界提㸃司而提㸃司自熙寧八年至去年尚逋草價十三萬緡乞限歲終仍自今委三司隨秋稅催促提舉司拘收封樁聽從本司支用如敢借兌支遣乞論如封樁錢法又乞選本司勾當公事官一員專管簿籍並從之御史何正臣言近彈奏安燾張茂則驗覆導洛通汴利害不當竊聞詔候來年歲運了日取旨以臣所聞則自不須如此燾等以為盛夏洛水外溢大河內漲新淤沙隄當二水腹背交攻之患其勢未易支梧今既秋矣二水交攻之患固未嘗有燾等又以為洛水盛夏暴漲甚於大河雖盛夏亦有乾淺之時今自夏秋以來蓋亦屢雨而河未嘗漲亦有經旬不雨而水亦未嘗乾舟行往來晝夜不輟安俟考察而後見乎伏望重行誅竄詔燾茂則各罰銅二十斤龍神衛四廂都指揮使秦鳯等路副總管向寶卒推恩外許其家陳乞二人差遣已酉以殿中丞高鎛權發遣荆湖北路轉運判官鎛初除權發遣登州事得對上批鎛進對論事精神詳敏方今難得人材之際置守支郡深亦可惜淹廢其能宜特除一小使者俾陳力補過故有是命天章閣待制羅拯言高禖壇廣二丈六尺卑狹不足以行禮下太常議太常言禖祠以青帝為主請如青帝壇廣四丈又下詳定郊廟禮文所講求制度乃言詩曰克禋克祀以弗無子所謂禋祀者乃郊禖祀天以高禖配於郊外故謂之郊今郊禖壇祀青帝於南郊以伏羲高辛並配又於壇下設高禖之位殊為爽誤伏請凖古郊禖改祀上帝以高禖配祠以太牢其壇圓其位在國南以石為主乞略倣南郊為壇而圓以青帝壇制增築之詔高禖典禮依舊壇制如太常所奏禮文載詳定所言在四年十月十九日今從實録並入此庚戌詔諸路郡縣增募弓手詳定禮文所言昊天上帝太廟以中書大臣及宗室親王使相攝事皇地祗則以兩省大臣在輕重先後之序有所未安蓋王者父天母地其禮一也親祠與使人代祭其誠亦一也伏請祭皇地祗用太尉中書攝並乞下將作監修展齊㕔從之詔祠部員外郎史館修撰劉瑾落職瑾前知䖍州戰棹都監楊從先遣其子三班奉職懋至䖍募兵輒檄諸邑巡檢弓兵集于州瑾詰之懋虛稱聖旨以拒瑾為瑾所奏懋亦奏瑾嘗懟懋言毋以朝旨脅州郡往時薛向嘗移文內有五十餘處聖旨瑾尚不應副蓋瑾一時忿辭無實也下江東鞫治瑾先稱疾尋醫又乞居家供答皆許之於是瑾懋皆引伏大理當瑾杖一百特有是責懋坐徒一年當追一官詔贖金免勒停瑾尋醫在元豐元年五月己丑乞居家供答在九月庚寅今並書于此辛亥同知諫院張璪言知鄆州陽榖縣光祿寺丞周沃謝表稱述安南帥臣示人以執政尺牘欲言者沮謀等事臣竊以交賊不順朝廷命將討伐安南師出無功沃領漕運糧食不繼不為無罪今沃以謂帥臣持宰府書示監司使不敢言而因以獲罪殆有非辜之意且朝廷賞罰本以勸沮天下而被罪者其辭如此中外聞之不能無疑沃初被旨差夫二十萬隨軍入溪峒差發不如數餽軍失期為郭逵奏劾責知陽榖縣謝上表自訴故璪以為言詔沃分析而沃上對不以實詔逵上軍行所與執政往還書送御史臺命御史丁執禮舒亶何正臣同鞫之沃斷旨在三年八月乙卯壬子詔大理寺鞫呂氏為陳世儒請求事移御史臺內命官兩問不承即聽追攝兩省以上取旨中丞李定言已遣王彭年就濠州劾蘇頌乞令彭年逮頌詣臺對獄餘當追命官除兩省外依勘太學公事己得指揮從之元年六月送開封府二年正月己卯移大理寺八月壬子移御史臺九月丁丑世儒伏誅權陜西轉運使都大提舉成都府路茶場李稷言陜西路有茶場司本息錢帛至多不能運動乞遇榖賤别司不糴處許茶場接糴轉徙從之仍詔本息錢毋過二十萬緡癸丑改沂州承縣尉孫師諤為左班殿直本路巡檢副保正潘翌為三班差使安撫司指使給賞錢百千論捕盜功也甲寅上批蜀中見積司農錢可選官經制運至陜西並塞要郡封樁遂命司農寺主簿李元輔往仍令立耗折分數以聞閏九月辛亥並三年正月已酉合參考詔免永興軍長安等五縣民夏稅支移以災傷限內失訴也丙辰權江淮等路發運副使刑部員外郎盧秉為集賢殿修撰或移下貢羡餘事附此詔以教駿營地修宗室克稟等五位徙教駿營於他所詔權知開封府翰林學士起居注舍人兼侍讀許將落職知蘄州前司録參軍虞部郎中李君卿降一官前士曹參軍蔡洵並衝替國子監丞祕書丞王愈追一官勒停直講周常差替開封府判官許懋李寧祕書丞熊臯罰銅有差初進士虞蕃訟太學不公事付府推治辭連上舍生既追就對而逼禮部試將奏以為無罪出之後蕃所指以為不公者並及將之妻弟與其鄉人乃移御史臺蔡確舒亶治之將父子相繼下獄竟坐奏釋上舍生為不實而君卿洵懋寧皆坐阿隨將愈坐為進士陳雄請囑升舍臯常皆轉相牽連特有是責五月甲申元絳罷正與此相關舊紀書許將釋上舍生不實落學士罷開封知蘄州新紀不書丁巳光祿寺丞集賢校理陸佃為太子中允崇政殿說書詔益太學生員舍為八十齊每齊屋五間命入內東頭供奉官宋用臣管勾修展詔韶惠州當送內藏庫錢並自今歲入折二錢並市銀輸內藏庫審官西院言磨勘供備庫副使劉希奭歷任兩以邊功遷官在格當異常調詔希奭與轉七資仍詔自今身經戰鬬酬奬遷官方理為戰功著為令賜三佛齊國羣陀畢羅等銀水罐交椅骨朵二對銀洗羅一面及賜僧紫衣二師號度牒各一初羣陀畢羅等乞私自買置詔依注輦國例特賜之詔刑部詳斷檢法官再任並二年為一任任滿詳斷官減磨勘二年檢法官減一年以刑部言詳斷檢法官雖許再任無願就者故優其恩也五月十九日丙戌當考詔權發遣京西南路提舉常平等事張商英罰銅十斤免衝替坐越職治提㸃刑獄司事也戊午太常寺言奉詔祠祭以法酒庫內酒坊酒實諸尊罍以代五齊二酒今法酒庫酒曰供御曰祠祭曰常供內酒坊酒曰法糯曰糯曰常料各三等糯酒常料酒止給諸軍吏工技人以奉天地宗廟社稷恐非致恭盡物之義乞止以三法酒及法糯酒奉祠祭從之元年七月癸酉朔己未詔新賜進士第二人王渙之特許注官渙之年十九礙銓格故也又詔諸司關報史館文字歸起居院其關報日限舊五日者為旬終十日者為月終月終歲終者依舊以修起居注王存言近制諸司供報事直供編修日歷所則起居注之職除臣僚告謝詔事外更無文字可備編録恐失置官之意又淳化中定諸司關報日限或以五日或以十日或以月終或以歲終而近制改五日並月終報者並為旬終歲終報者為月終且三司金榖之增耗經費之出納版圖之升降固非月終可見者必待歲終而㑹計也今使月終一報恐有司徒費虛文無益事實故有是詔詔以潁州為順昌軍節度潁故團練州因知州事天章閣待制羅拯以上舊封為言故下是詔九月十八日又降德音舊紀書升潁州舊封國為順昌軍節度使新紀不書因依庚申東上閣門使文州刺史种諤權鄜延路副都總管辛酉詔判大宗正司宗旦舊例添厨食料雖有後條衝革可以見領宗正特給他官雖等非職事同者無得援為例又詔封濮安懿王子洋州觀察使宗晟所生母仁壽郡太君孫氏為定安郡太夫人詳定編修諸司敕式所上入內內侍省敕式詔行之判國子監張璪言治禮舉人比易詩書人數絶少乞自今在京發解禮部進士周禮禮記比他經分數倍取從之壬戌上批龍圖閣直學士韓縝見領樞密都承旨事繁兼常有奏禀軍務可免祠祭攝事廣南西路經略司言雄略澄海指揮闕額乞諸路配送𨽻牢城卒所犯情理稍輕及少壯任披帶亦許選補上批可依所奏庶稍得補完兵額有以更代緣邊久戍瘴癘之人癸亥知宗正丞趙彥若言伏見禮院更定薦新仲秋茭萌不經以蒲白易之壬戌薦新于兩廟既徹方驗蒲盡老硬無復有白蓋議禮者但取茭之同類以相代而不思蒲之過時不可食也臣竊考之於詩韓侯秋見䔩用筍蒲皆是其菹非謂新物周禮醢人掌加豆之實深蒲醓醢筍菹魚醢祭祀供薦羞之豆實賔客亦如之此則肉之醢菜之菹賔祭內羞四時不闕維筍及蒲固所以待賔客其義明矣鄭氏注深蒲云蒲始生水中者草木蟲魚疏云蒲周禮以為菹始生取其中心入地蒻及云菰蔣亦可用並言蒲始生自不在秋故本草曰蒲四月採唐本注云蒲初春生用白為菹是也唐禮薦新多不限月筍蒲茭藕各維其時今近地茭白特饒舊制參於秋薦即菰蔣也廣雅曰菰蔣其米雕胡說文作雕苽周禮食醫膳食之宜魚宜苽菱是其萌徐鍇歲時廣記所謂苽草為茭者也雖亦春生至秋可食與蒲有異臣據詩言食鬱及薁烹葵及菽以同時言及則維筍及蒲亦自可知况當薦筍之辰正是食蒲之始伏請改從春獻用協天時從之三司言發神騎等指揮戌桂州後止令駐湖南有多給路費特支錢萬六百九十五緡詔蠲之甲子詔看詳太學條制所以國學條貫與見修學制定為國子監一司敕式詳定朝㑹儀注所言周禮天子視朝則皮辨服十五升衣積素以為裳記所謂皮辨素積是也諸侯視朝則委貌冠其服緇布衣亦積素以為裳所謂緇衣之宜兮是也凡在朝君臣同服漢氏承秦改六冕之制但元冠絳衣而己魏以來名為五時朝服隋唐謂之具服一品以下九品以上皆絳紗禪衣其冠有五梁二梁一梁之别隋志曰梁别貴賤自漢始也綬則以組為之本以貫佩玉相承受戰國尚武而去佩但留其繫璲而秦乃以采組連於璲轉相結受因以為飾所謂綬也韋彤五禮精義曰以别尊卑彰有德故漢制相國至百石吏綬有三采二采一采之等然則冠以梁之多少别貴賤綬以采之粗縟異尊卑其來尚矣古者制禮尚物不過十二天之數也自上而下降殺以兩畿外諸侯遠於尊者而伸則以九以七以五從陽奇之數王朝公卿大夫近於尊者而屈則以八以六以四從隂偶之數本朝衣服令通天冠二十四梁為乘輿服蓋二十四梁以應冕旒前後之數若人臣之冠則自五梁以下與漢唐少異矣至於綬則乘輿及皇太子以織成諸臣用錦為之一品二品冠五梁中書門下加籠巾貂蟬諸司三品三梁四品五品二梁御史臺四品兩省五品亦三梁而綬有暈錦黃師子方勝練鵲四等之殊六品則去劒佩隋唐冠服皆以品為定蓋其時官與品輕重相凖故也今之令式尚或用品雖因襲舊文然以官言之頗為舛謬槩舉一二則太子中允贊善大夫與御史中丞同品太常博士品卑於諸寺丞太子中舍品高於起居郎內常侍才比內殿崇班而在尚書諸司郎中之上是品不可用也若以差遣則有官卑而任要劇者有官品高而處冗散者有一官而兼領數局者有徒以官奉朝請者有分局蒞職特出於一時隨事立名者是差遣又不可用也以此言之用品及差遣定冠綬之制則未為允伏請以官為定庶名實相副輕重有凖仍乞分官為七等冠綬亦如之貂蟬籠巾七梁冠天下樂暈錦綬為第一等蟬舊以玳瑁為蝴蝶狀今請改為黃金附蟬宰相親王使相三師三公服之七梁冠雜花暈錦綬為第二等樞密使知樞密院至太子太保服之六梁冠方勝宜男錦綬為第三等左右僕射至龍圖天章寶文閣直學士服之五梁冠翠毛錦綬為第四等左右散騎常侍至殿中少府將作監服之四梁冠簇四雕錦綬為第五等客省使至諸行郎中服之三梁冠黃師子錦綬為第六等皇城以下城司使至諸衛率服之內臣自內常侍以上及入內內侍省內東西頭供奉官殿頭前班東西供奉官左右侍禁左右班殿直京官祕書郎至諸寺監主簿既預朝㑹亦宜以朝服從事今參酌自內常侍以上冠服從本等寄資者如本官入內內侍省內東西頭供奉官殿頭三班使臣陪位京官為第七等皆二梁冠方勝練鵲錦綬高品以下服色衣古者韠韍舄屨並從裳色今制朝服用絳衣而錦有十九等其七等綬謂宜純用紅錦以文采高下為差别惟法官綬用青地荷蓮錦以别諸臣後漢志法冠一曰柱後執法者服之侍御史廷尉正監平也或謂之獬豸冠南齊志亦曰法冠廷尉等諸執法者冠之今御史臺自中丞而下至監察御史大理卿少卿丞審刑院刑部主判官既正定厥官真行執法之事則宜冠法冠改服青地荷蓮錦綬其梁數與佩凖本官從之志同郊社局令辛公佑言五郊齊宫卑隘頺敝乞下將作監廣而新之齊宫向去祠壇數里考於行事非便乞徙置壇側齊宫什物多故敝亦宜增完舊禁祠壇外焚瘞尸柩耕牧樵採皆有步數歲久封堠不明宜立石刻詔令為識下禮院請如公佑議從之廢慶州府城寨全村堡平戎鎮環州大拔寨
