body:
  text: 續資治通鑑長編巻一百八十五宋李燾撰仁宗嘉祐二年春正月癸未翰林學士歐陽修權知貢舉先是進士益相習于竒僻鉤章棘句寖失渾淳修深疾之遂痛加裁抑仍嚴禁挾書者及試牓出時所推譽皆不在選囂薄之士候修晨朝羣聚詆斥之至街司邏吏不能止或為祭歐陽修文投其家卒不能求其主名置于法然文體自是亦少變乙酉詔廣州賜占城國進奉使蒲息陀銀千兩以息陀至太平州江岸崩沉其行李故也己亥刑部郎中天章閣待制兼侍讀孫甫卒特贈右諫議大夫甫性踈簡善持論毎言唐君臣行事以推見當時治亂若身履其間而聽者曉然如目見之故時人言終嵗讀史不如一日聽孫甫論也著唐史記七十五巻詔藏祕閣知桂州張子憲乞差前知貴州周約通判本州非常例也詔以桂州帶一路安撫使聽舉通判一員二月戊申禮部郎中知制誥唐詢知蘇州避参知政事曽公亮親嫌也己酉詔乞試武藝人自今毋得直遣赴闕梓䕫鈐轄司言三里村夷斗還等百五十人謀入㓂有黄土坎夷斗葢長寧州人也先以其事來告淯井監引兵赴之捕斬七十餘級請加賞之詔賜斗葢錢三十萬錦袍銀帶明年又補斗葢長寧州刺史是役也轉運使李虞卿駐江安縣使斗葢以其衆同招安將白進豐率子弟兵焚蕩其巢穴賊乃相率來降虞卿始調兵閲其戈楯不便于用更造龜筩甲長槍鏢藤楯革笠木弩頗輕利夷人畏焉此據李虞卿傳附見庚戌御崇政殿録繫囚降死罪一等徒以下釋之三京及輔郡遣官踈决甲寅太子賔客致仕王渙為禮部侍郎渙退歸鄉里十五年餘因其從子参知政事堯臣言特遷之己未西蕃首領轄戬遣人來貢方物壬戌澧州言羅城峒蠻内㓂發兵擊走之太子太師致仕杜衍退寓南都凡十年性不殖産第室庳陋數十楹居之裕如也出入從者才十餘人烏帽皂綈袍革帶親故或言宜為居士服衍曰老而謝事尚可竊髙士名耶王洙嘗謁告歸應天府有詔撫問及被病帝遣中使賜藥挾太醫徃視已卒贈司徒兼侍中諡正獻衍臨終戒其子努力忠孝歛以一枕一席小壙卑墳以塟自作遺疏其略曰無以久安而忽邊防無以既富而輕財用宜早建儲副以安人心語不及私忠武節度使同平章事王徳用卒車駕臨奠贈太尉中書令諡武恭加賜其家黄金初麟府西南接銀州西北接夏州皆中國地也慶厯中元昊既納欵知麟州禮賔副使張繼勲奉詔定界至而文案無在者乃問州人都廵檢王吉及父老等皆云繼遷未叛時麟州之境西至伊濟軍營及寧西峯距屈野河皆百餘里西南至雙烽橋杏子平彌勒長干鹽院等距屈野河皆七十餘里咸平五年繼遷圍麟州䧟濁輪軍馬等寨大中祥符二年始置横陽神堂銀城三寨皆在屈野河東以衙前為寨將使蕃漢義軍分畨守之又使寨將與縁邊酋長分定疆境横陽寨西至故伊濟寨四十里州城西至大横水六十里西南至朗爽平五十里神堂寨西至伺候峯三十五里西南至赤犍谷掌四十里次南至葉勒塢三十里銀城寨西至榆平嶺四十里西南至清水谷掌五十里次南至洪崖塢四十里次南至道光谷中嶺上六十里天聖初州官相與訟河西職田久不決轉運司乃奏屈野河西田並為禁地官私不得耕種自是民有竊耕者敵輒奪其牛曰汝州官猶不敢耕汝何為至此由是河西遂為閑田民猶嵗輸税不得免謂之草頭税自此敵稍耕境上然亦未敢深入也及元昊之叛始挿木置小寨三十餘所于道光洪崖之間盗種寨旁之田比至納欵所侵才十餘里是時朝廷以更定誓詔不欲與敵分明界至乃令修河濵堡閤門祗候張宗武諭張繼勲曰若西人來且即答以誓詔惟延州保安軍以人户所居中間為定餘路則界至並如舊未定之處若西人固欲分立則詳其所指之處或不越舊境差官與之立牌堠以為界繼勲遂列前後界至地名奏之且云今若以河西為禁地則益恣其貪心進逼河西之地耕墾畜牧或興置寨柵與州城相距非便若用咸平五年以前之境則太逺難守請以大中祥符二年所立之境為定詔繼勲與宗武先審定之即不得明行檢踏以致生事繼勲復申經略司前所議疆境已得其實無以復易乃遣臨寨堡監押三班借職馬寧指使殿侍康均待西人于境上及令麟州通判領其事西人言我馬足所踐即為我土與相辨詰久之㑹西人數遣人求通寧星和市繼勲使均等以此邀之其把闗太尉曹勉及管勾和市曹勍謂均等曰若通寧星和市其麟府疆界請一切如舊經略司令詣保安軍自陳未㡬果詣保安軍朝廷以為疆界既如舊乃許之及繼勲坐事去後知州事者懲其多事取敗各務自守以矯前失㑹有指使過河西為西人所掠乃禁吏民皆不得過河西王吉甞過河西廵邏州司輒移文劾之自是無敢過者諸堡寨亦利民不過河而敵無踰境嵗滿得遷官故禁之尤急西人初猶顧望未敢數嵗之後習知邊吏所為乃放意侵耕然其州西猶距屈野河二十餘里自銀城以南至神林堡或十里或五七里以外皆為敵田矣敵明指屈野河中央為界或白晝逐人或夜過州東剽竊貲畜見邏者則逸去既渡水人不敢追也及管勾軍馬司賈逵行邊見所侵田以責主者知州王亮懼始令邊吏白其事經略司遂奏士人殿直張安世賈恩為都同廵檢以經制之張安世為都廵在至和二年十一月賈恩未見然敵侵耕久晏然自以為已田又所收皆入其酋宻藏鄂特彭故安世等廹之則格鬬緩之則不肯去經略司屢列舊境􅊾之使歸所侵田鄂特彭之妹使其親信部曲嘉伊克來視之還白所耕皆漢土乃召還鄂特彭欲還所侵地㑹嘉伊克作亂誅而國母死鄂特彭益得自恣甲戌經略使龎籍言西人侵耕屈野河地本宻藏鄂特彭之謀若非禁絶市易竊恐内侵不已請權停陜西縁邊和市使其國歸罪鄂特彭則年嵗間可與定議詔禁陜西四路私與西人貿易者屈野河西並為禁地此司馬光河外諮目天聖四年五月事實録載此大抵因司馬光河外諮目先是光禄卿張子憲遷右諫議大夫知桂州子憲被疾久未行而御史呉中復劾其稽留及言子憲前知洪鄂二州皆無治狀三月丁丑朔改命廣東轉運使工部郎中蕭固宜昭文館知桂州子憲罷為祕書監尋復為光禄卿子憲自陳不當増秩也戊寅賑河北被火民庚辰以雄覇地震詔縁邊長吏安撫軍民轉運提㸃刑獄司察其疾苦及刑獄之有寃濫者辛巳御崇政殿試禮部奏名進士又試特奏名壬午試諸科丁亥賜進士建安章衡等二百六十二人及第一百二十六人同出身是嵗進士與殿試者始皆不落己丑賜諸科三百八十九人及第又賜特奏名進士諸科二百十四人同出身及補諸州長史文學李復圭記聞云是春以進士羣辱歐陽修之故殿試並賜及第不落一人當考癸巳夏國遣人以其母遺留馬駞來獻乙未契丹遣林牙左監門衛大將軍耶律防樞宻直學士給事中陳顗來求聖容嘉祐二年三月遼使耶律防陳顗等至防等屢乞傳國語依常例𫝊奏畢近前面奏事奉聖㫖只令那一歩舎人𫝊奏館伴使錢明逸奏防令通事皇帝令依常例𫝊奏畢近前面奏事使副兩人齊跪令陳顗奏聞通事舎人夏防言自來𫝊奏只是舎人今使人而親奏已得聖㫖只令那歩亦是舎人𫝊奏如𫝊奏不當更請宻學子細𫝊與舎人陳顗入殿門裏言與館伴恐𫝊奏不盡悉寫劄子咨問二朝誓書内有此今附注當考丁酉徙京西路提㸃刑獄度支員外郎鮑軻為廣東轉運使既而御史言軻前提㸃廣東刑獄方儂智髙圍廣州乃避賊韶州無所經畫詔罷軻新命復歸故官復提刑在四月丁巳今并書之戊戌右諫議大夫權御史中丞張昪為回謝契丹使單州防禦使劉永年副之初契丹主宗真送其畵像及隆緒畵像凡二軸求易真宗皇帝及上御容既許之㑹宗真死遂寢至是遣使冄求故命昪等諭令更持洪基畵像來即予之翰林學士胡宿草國書奏曰陛下先已許之今文成即世而不與則傷信且以尊行求卑屬萬一不聽命責先約而遂與之則愈屈矣不從昪等至契丹果欲先得聖容昪折之曰昔文成弟也弟先面兄于禮為順今南朝乃伯父當先致恭契丹不能對初以未如其請夜載巨石塞其門衆皆恐永年擲去之由是世𫝊永年有神力淮南轉運司言淮水自夏秋暴漲浸泗州城知州朱處仁通判蔡選並有固䕶之勞降詔奬諭庚子陳州言䕶國節度使同平章事狄青卒帝發哀苑中贈中書令諡武襄青為人謹宻寡言其計事必審中機㑹而後發師行先正部伍明賞罰與士同飢寒勞苦雖敵猝犯之無一士敢後先者故其出常有功喜推其功以與將佐始與孫沔破賊謀一出青賊已平經制餘事悉以諉沔退然如不用意者沔始服其勇既又服其為人自以為莫及也尹洙以貶死青悉力賙其家事宋朝要録嘗從尹洙談兵洙以為有古良將才夏四月丁未御崇政殿閲諸軍轉員凡三日右司諫吕景初左藏副使李綬為河北體量安撫使以河北地數震也癸丑貸隨州参軍李抃父阮死罪初阮毆佃客死而其子抃願納所受敕吿以贖父罪上矜而許之仍免决送湖南編管丙辰契丹國母遣昭徳節度使右監門衛上將軍耶律昌福右諫議大夫知制誥劉雲契丹遣武安節度使蕭矩引進使泰州團練使劉從備來賀乾元節丁巳徙知常州侍御史范師道為廣南東路轉運使舊補攝官皆委吏胥無先後逺近之差師道始置籍次第之丙寅雄州言北界幽州地大震大壊城郭覆壓死者數萬人詔河北宻為備禦之計以契丹歸明人趙二南為蔡州司士参軍馬錫為茶酒班殿侍京東安撫司指使仍各賜田二頃己巳主客員外郎殿中侍御史裏行呉中復為殿中侍御史充言事御史以中丞張昪言本臺闕言事御史乞除中復故也實録云言事御史自慶厯四年置此後不復除按置言事御史在天禧初後久不除慶厯五年復置此云四年恐誤又自慶厯五年後為言事御史者不一人至和二年十月俞希孟罷後始闕實録云慶厯四年後不復除誤也今不取辛未通判黄州殿中丞趙至忠上契丹地圖及雜記十巻此據正史契丹𫝊實録云上契丹建國子孫圗及纂録事三冊與本𫝊不同按北庭雜記今具在實録所稱悉在其間矣至忠來歸在慶厯元年八月熙寧二年七月乃致仕范鎮雜記稱至忠嘗為契丹史官契丹稱中書舎人或中書舎人即兼史職也三年二月又上國俗官稱儀物録六年五月又獻契丹蕃漢兵馬機事十冊并契丹出獵圖癸酉侍御史朱處約為荆湖北路體量安稳使以下溪州蠻彭仕羲未附也甲戍太常博士集賢校理陸詵提舉開封府界諸縣鎮公事咸平龍騎軍本羣盗遷𨽻因廪給不時共毆監給官既還營不自安軍校柴元扇之將作亂詵承詔徃詔元以不死使自取為亂者贖罪軍以無事詵餘杭人也詔西蕃進奉轄戬依例賜金箔藥物司天監言據崇天厯己亥年日當食正月朔乞定戊戍年十二月為閏以避之詔不許火峒蠻儂宗旦者智髙之族也據險聚衆數出剽略知邕州蕭注欲發大峒丁擊之知桂州蕭固獨請以敕招降轉運使王罕以為宗旦保山溪篁竹間茍設伏要我軍未必可勝徒滋邊患乃獨領兵次境上使人召宗旦子日新謂曰汝父内為交阯所仇外為邊臣希賞之餌歸報汝父可擇利而行于是宗旦父子皆降南事遂平以宗旦為忠武將軍日新為三班奉職王罕事據神宗實録王罕𫝊所載正史則云知桂州蕭固招宗旦内屬以宗旦為忠武將軍又補其子知温悶峒日新為三班奉職今参取之王安石銘固墓亦云固招宗旦補西頭供奉官補官不同不知孰是今從正史月按宋史儂宗旦入㓂書於是己巳與此小異五月丙子朔詔廣南東西路經略安撫轉運提㸃刑獄司體量本路知州及主兵官㳂邊城寨使臣懦怯者以名聞戊寅賜太常博士任伯𫝊錢五萬令梓州敦遣赴闕與堂除差遣伯𫝊丁母憂自京師徒歩䕶䘮歸永泰縣廬墓三年留鄉里久之不起御史朱處約為言故有是命詔河北路今嵗豐稔民力稍寛其所部官吏務加安恤毋得調率以擾之庚辰崇儀使并代鈐轄管勾麟府軍馬郭恩與夏人戰于斷道塢死之走馬承受入内東頭供奉官黄道元府州寧府寨監押劉慶被執又死者使臣五人軍士三百八十七人已馘耳鼻得還者百餘人亡失噐甲萬七千八百九十九馬二百八十初夏人嵗侵屈野河西地至耕穫時輒屯兵河西以誘官軍經略使龎籍毎戒邊將敵至歛兵河東毋與戰敵屯月餘食盡而去者屢矣是嵗正月宻藏鄂特彭領兵至境上比及三月稍益至數萬人又自鄜延以北發民耕牛計欲盡耕屈野河西之田㑹國人有與之異議者復召其兵還衆皆空壁去然銀城以南侵耕者猶自若葢以其地外則蹊徑險狹杉栢叢生漢兵難入内則平壤肥沃宜粟麥故敵不忍棄也于是籍􅊾通判并州司馬光行邊至河西白草平數十里無敵患時知麟州武戡通判夏倚已築一堡為候望又與光議曰乗敵去出不意更増二堡以據其地可使敵不復侵耕請還白經略使益禁兵三千役兵五百不過二旬壁壘可成然後廢横戎臨塞二堡撤其樓櫓徙其甲兵以實新堡列烽燧以通警急從衙城紅樓之上俯瞰其地猶指掌也有急則州及横陽堡出兵救之敵來耕則驅之已種則蹂踐之敵衆盛則入堡以避如是則堡外三十里之田敵必不敢種矣是州西五十里之内無患也籍遂檄麟州如其議于是恩及戡道元等以廵邊為名徃按視之㑹詗者言敵屯沙克朔勒朗亘十五里恩欲止不行道元怒以言脅恩夜率歩騎一千四百餘人不甲者半循屈野河北而行無復部伍夏人舉火卧牛峰戡指以謂恩曰敵已知吾輩出矣道元曰此爾曹為之欲以沮止俄又聞鼓聲道元猶不信行至谷口恩欲休軍曰天未明可須曉乃登山道元奮衣起曰㡬年聞郭恩名今日懦怯與賈逵何殊恩亦愠曰不過死爾乃行比明至呼爾敦敵數十皆西走相去數十歩止恩等踞胡床遣從騎呼之敵不應亦不動俄而起火敵騎張左右翼自南北交至堆東有長塹其中有梁謂之斷道塢恩等東據梁口與力戰自旦至食時敵自兩旁塹中攀縁而上四面合擊恩衆大潰倚方在紅樓見敵騎自西山大下與推官劉公弼率城中諸軍閉門乗城戡走東山趣城東抉門以入恩與道元皆為敵所執恩不肯降自殺敵尋遣道元還詔贈恩同州觀察使封其妻吕氏為京兆郡君官其子弟有差給舊俸三年恩開封人也辛巳追封乳母戴氏為崇國夫人内侍副都知昭宣使果州團練使武繼隆遷宣政使尋罷之此據百官表不詳何事韓絳行狀神道碑及本𫝊並云内侍武繼隆遷官絳封還詞頭因數其過惡遂出為鄆州鈐轄當即此事不知實録何故不書癸未命樞宻副使田况提舉殿前馬歩軍司編敕知制誥劉敞言此時敞在揚州三年十月乃自鄆州召還臣伏聞朝廷選官刪定殿前馬歩軍等司編敕條貫誠為要務臣以謂科律雖詳執而用之者吏也若不審則獄容有濫今殿前等所以統諸軍刑罰不少而鞫訊論决一委胥吏曽無掾曹士大夫参其間即有猾吏因事侮文其勢不難獄者重事人命所繫自古以來未甞獨任小吏不闗搢紳者也又漢唐大將軍營衛幕府或設軍政議郎録事兵曹分職聫事其員甚衆今誠制度太簡略欲盡如古難可且毎司置獄官一員専典鞫獄令流内銓選補如左右軍廵判官例如此獄可使不寃刑可使不悮庶㡬上副朝廷欽恤之意愈于専修編敕而已四年七月置檢法官或由此更詳之賜國子博士㓂諲銀絹五十兩匹諲上其祖凖所著文集也初禮官張師中論禖壇卑陋保章正皇甫定請徙於圜丘東鎮安軍文學参軍鄭孝先以為當在東方長男位禮官與司天監議曰漢晉禖壇在城南齊隋祀於南郊壇之西南今其地卑濕宜徙圜丘東南爽地甲申改築禖壇於圜丘東南庚寅詔吏部流内銓磨勘選人其歴任已經除落過犯者無得更用貼黄聲述辛卯西南蕃鶼州遣人來貢馬壬辰殿中侍御史吳中復言勾當内東門東頭供奉官劉恢進女口而同勾當劉温禮舉按之今並責降出外非所以示懲勸也詔温禮復本等資序恢未得與移差遣丁酉詔樞宻院近臣嘗舉文臣換右職者自今遇邊要闕人即差擇以聞戊戍廣西轉運使王罕言右江丁壯隨蕭注擊賊而未經賞者乞特免夏税一年從之已亥詔審官三班院文武官舊皆自投文字乞磨勘轉官有妨廉節自今更不許自陳其任西川廣南官嵗滿前三月餘路前兩月令本院預舉行之又詔凡舉官已施行者後雖有改節不許自首及被舉之人無得納舉主尋詔在部内守官而改節者許發摘同自首法是月河北路言蠶麥豐熟流民復業
