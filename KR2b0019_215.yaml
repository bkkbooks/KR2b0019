body:
  text: 續資治通鑑長編巻二百十一宋李燾撰神宗熈寧三年五月庚寅朔知明州衛尉卿王罕言州濵大海外接蕃界城壁頽圯比嵗鄰郡荐饑多盜而戍卒不滿二百乞降度僧牒以完州城詔止以役兵修築先是上謂執政曰諸處奏罪人多踰城走逸城亦不可不修王安石對曰南方修城恐非急過費財用亦可惜止令轉運司漸應副可也故有是詔辛卯秘閣校理同修起居注陳襄兼直舍人院判吏部流内銓兼天章閣侍講先是上患無知制誥執政以祖宗故事有直舎人院欲令襄為之王安石曰如此除人則可不輕與人資序而官易得人故襄有是命襄辭直院及侍講手詔諭襄曰近除卿知制誥以言事未遂懇不受命且求外補朕素慕卿經術行己深惜逺去特還舊職庶㡬左右經席漸摩道義以釋所願聞今覧來奏尚欲固辭豈未悉朕意歟還卿來章當亟就職襄終辭許之許襄辭直院及侍講乃十六日乙巳今并書之襄辭召試已附四月癸未九月五日安石論襄辭召試乃云今春豈召試實在春時乎是日上論魏鄭公但以太宗所為多過差能直諫而已亦不見其有經綸天下之才王安石曰鄭公所見雖非髙逺然於事理卑近之間甚識利害如與温彦博論事雖為彦博彊辯所奪然其利害終如鄭公所爭上言此乃處置蕃部事也安石又言魏鄭公不欲以賔客待蠻荒以為篤論上曰鄭公諫太宗封禪事云四裔雖服無以勝其求此言是也癸巳詔莫覇保雄州安肅廣信順安信安乾寧保定軍皆並邉阻塘濼及西山少耕稼之利毋給百姓青苗錢太白晝見乙未召輔臣觀麥於後苑司封員外郎直史館同修起居注蔡延慶兵部郎中集賢校理王益柔直舎人院王安石謂益柔舊人且行義修飭不廢學問故與延慶並命直舎人院自太平興國以後不復除時安石建議欲令直舎人院者草李定詞已乃除知制誥因舉祖宗舊例初以命陳襄襄辭不為遂并授兩人天章閣待制孫固兼權管勾御史臺知通進銀臺司代陳薦也王安石謂薦必封駮李定除命韓絳又疑薦不放定入臺故言於上罷薦而用固丁酉命淮南江東轉運使即揚州宣州體問前秀州軍事判官李定不持所生母䘮事虚實以聞權管勾御史臺陳薦言定所生母亡不解官持䘮定家揚州又嘗任宣州涇縣主簿故也於是止定除命以待兩路之報詔雄州北兩屬户遇災傷即以貸糧接續分給仍作料次輸納從河北沿邉安撫使張利一請也日録四月五日張利一奏兩屬户不得青苗甚不足上曰如此足明青苗非抑配僉議㳂邉更不俵己日晚餘不及議而退當俟别奏五月五日又論㳂邉青苗指揮上曰兩屬户不欲令異内地百姓如何指揮無妨餘乃從上㫖弗爭也條例司言權陜西轉運副使陳繹不依條案治部内違法抑配青苗錢官吏乃擅止環慶等六州給散青苗錢且欲留常平倉物凖備緩急支用壊常平久行之法詔繹特放罪戊戌上批中書所修條例宜令簡約有理長乆可施行遵守仍先令次第編排方可刪定取捨今中書編條例聞已千餘冊遇事如何省閱雖吏人亦恐不能悉究可令先分出合為中書海行一司條例為三等仍别見行已革重複者例或分明與條無異止録其已施行者或自有正條違之以為例者或不必著例自可為條者或條不能該必須例為比者使各自為處然後中書日以三五件參定存去修剏之朕所見大槩當如此卿等宜更審度恐尚有不盡事理近見閤門編儀制取索文字費力盖吏人不喜條例分明亦須量立賞罰以防漏落宣州涇縣主簿編校昭文館書籍林希為館閣校勘希福州人也治平二年九月初為編校官是日上問王安石條例司可併入中書否安石曰待修中書條例有端及已置屬則自可併為一今尚有合與韓絳請間奏事恐未可上曰豈防曽公亮異議乎又問陳升之何如安石曰升之猶可與共事公亮多用機巧又專欲守其故態自吕公著齟齬以来及得升之叶助益難與議事上曰公亮老亦且去矣此据日録在五月六日今附見詔集賢校理孫洙館閣校勘蒲宗孟同看詳轉對封章以封章條事甚多欲采用之也是月壬寅當并考四年六月丁巳罷庚子著作佐郎俞充大理寺丞李承之編修中書條例充鄞人也詔祖宗袒免親孝贈男赴朝錢絹各四十貫匹未赴朝年十一嵗已上錢絹各二十貫匹女在室年十一歲已上錢絹各十五貫匹出適錢絹各三十貫匹所生母妻錢絹各二十貫匹未赴朝年十一歲已上錢絹各十貫匹女在室年十一歲已上錢十貫絹五匹出適錢絹各十五貫匹所生母并妻錢各十貫絹五匹已上女出家入道並依出適例先是袒免親右武衛大將軍衡州刺史叔璨卒内侍省言法惟送殯祔葬得給賜其孝贈已不支蓋新法漏此上令更定而降是詔叔璨卒在四月克架子也辛丑詔少府監新知池州郭永與宫觀以永知漳州日課績非優且衰老故也手詔聞陜西蕃部首領等多執歸明蕃人殺之妄言把截廵綽鬬敵所獲首級不獨僥倖恩賞且枉殺無辜令逐路經略司自今須驗實賊馬蹤由保明以聞不得止據城寨申報壬寅詔百官轉對章奏分委館職看詳所陳當否送司馬光詳定令中書取㫖上既命孫洙蒲宗孟看詳至是又付三館令已有法者即明具條貫欲以見館職材能因以考知轉對官知法理與否也自又付三館以下新本並削去盖朱本緣王安石意増入安石議建三館祗候見二年十二月丙寅至四年六月罷新紀書詔百官轉對封事三館條其當否令司馬光詳定舊紀不書先是丙戌赦書令諸路搜訪士有行義為鄉里推重者以名聞凡得二十九人於是詔令九月崇遣赴闕仍給驛料至則館於太學送舎人院試䇿論各一道舊紀書詔舎人院試諸路崇遣之士二十九人新紀不書癸卯上批近以秀州軍事判官李定為太子中允權監察御史裏行知制誥李大臨蘇頌累格詔命不下乃妄引詔中丞薦舉條絶無義理而頌於中書面乞明降特㫖方敢命辭洎朝廷行下反又封還輕侮詔命飜覆若此國法豈容大臨頌可並以本官歸班大臨及頌時皆為工部郎中先是宋敏求封還定辭頭詔送别官而頌當命辭頌言本朝舊制進補臺官皆詔中丞知雜與翰林學士於太常博士以上中行員外郎以下互舉曽任通判者即須特㫖方許薦為裏行儻非其人或至連坐所以重臺閣之選也去嵗詔㫖專令中丞舉官雖不限資品猶以京秩薦授縁已有前詔故人無間言今定自支郡幕職官入居朝廷糾繩之任超越資序近嵗未有議者或曰唐世多自諸侯幕府入登臺省臣謂不然在唐方鎮盛時有奏辟郎官御史以充幕府者由此幕府増重祖宗深鑒此弊一切釐改州郡僚佐皆從朝廷補授大臣出鎮或許辟官亦皆隨資注擬滿嵗遷秩並循銓格非復如唐世之比而今之三院事任又重於昔時况定官未終更非時召對不由銓考擢授朝列不緣御史之薦直寘憲臺雖朝廷急於用才度越常格然隳紊法制必致人言其除官制未敢具章詔再送舎人院次至大臨大臨亦封還廼詔頌依前降指揮撰辭頌又言祖宗之朝或有起孤逺而登顯要者蓋天下初定士或棄草萊而不用故不得不廣搜揚之路自真宗仁宗以來雖幽人異行亦不至超越資品蓋承平之代事有紀律故不得不循用選授之法今朝廷清明俊乂並用進任臺閣動有成規而定以逺州幕官非有積累之資明白之效偶因召對一言稱㫖即授御史他日或有非常之人又過於此奏對稱㫖則復以何官處之寖漸不已誠恐髙官要秩或可以岐路而致謹案六典中書舎人之職凡詔㫖制敕皆案典故而起草制敕既行有誤則奏而正之故前後舎人論列差除用典故而䝉更正者非一今三院御史須中丞學士薦舉朝臣乃典故也或不應此其敢無言去歲以京官除授所以無言者以前有詔令故也今若先立定制許於幕職官中選擢三院則臣等復有何言而敢違拒朝廷以定才實非常則當特與改官别授職任隨資超用無所不可不必棄越近制處之憲綱也若臣上懼嚴誅靦顔起草誠慮門下封駁縱門下不舉則言事之臣必須重有論列或定畏議固執不敢祗受是臣一廢職事而致論議互起煩瀆聖聽則臣之罪戾死有餘責上曰裏行本不計官資故令於御史裏行欲令止以判官出敕為之衆以為不可安石曰已令改官於義有何不可而乃封還辭頭若遂從之即陛下威福為私議所奪失人君之道矣既而安石進呈舉御史新條并録初立條時奏對語白上曰胡宗愈以此為臣私意蓋不知陛下立此法時德音故也上曰李定詔須令草之安石曰陛下特㫖雖妨前條亦當施行也曽公亮曰特㫖固不當以條限但不知定何如人恐非常人乃當不用常法爾於是上批檢㑹去年七月六日詔今後臺官有闕委御史中丞奏舉不拘官職髙下令兼權如所舉非其人令言事官覺察聞奏自後别無續降條貫頌大臨等又言臣等看詳從前臺官須得於太常博士以上中行員外郎以下舉充後來為難得資序相當之人故朝廷特開此制云不拘官職髙下者止是不限博士與中行員外郎耳非謂選人亦許奏舉也所謂兼權者如三丞以下未為監察故且令止權裏行員外郎以上不可為侍御故令下兼皆不為選人設文也若不拘官職髙下并選人在其間則是秀州判官亦可以權裏行不必更改中允以此言之選人不可超授臺官明矣至如程顥王子韶已先轉京官因中丞薦舉方遷中允止權監察今定是初等職官資序若特改京官已是優恩更超授朝籍處之憲臺先朝以來未有此比臣等所以喋喋有言不避斧鉞之誅者非它也但為愛惜朝廷之法制遵守有司之職業耳大抵條例戒於妄開今日行之它日遂為故事若有司因循漸致隳紊誠恐倖門一啓則仕塗奔競之人希望不次之擢朝廷名器有限焉得人人而滿其意哉前世所以愛重爵賞不以假人雖有竒材異倫亦須試以職事俟有成效然後超擢者以此也復詔頌依前降指揮撰辭頌執奏如初而又於中書白執政言雖云特㫖而頌軰無以為據草制即必致人言乞批降云特㫖所除不礙條貫方敢草制又詔所除李定是特旨不礙近制令頌疾速撰辭頌又言果出聖意㧞擢即須非常之人名聲聞於時然後厭服羣議為朝廷美事昔馬周為常何作奏條陳得失二十餘事皆當世切務唐太宗㧞于布衣近世張知白上書言事論議卓越真宗㧞于河陽職官此二臣者可謂有顯状矣逢時遇主可謂非常矣然周猶召直門下省明年方用為御史裏行知白召還奏對稱㫖亦命試舍人院然後授以正言非如定逺州職官素無聲稱偶因諌官論薦一賜召對便䝉超授誠恐天下才辯之士聞之皆思趨走勢要以希薦用此門一開未必為國家之福也欲望陛下米聽羣議或詢訪近臣若謂定之才果足以副陛下特㫖之擢則臣自當受妄言之罪若臣言不虗即乞别授一官寘之京師俟它時見其實状進用未晚如此不惟臣等職事併舉兼亦可以養成定之才資免招異日之論議也上即欲黜頌别除知制誥令草制安石乞且降旨令草若更執奏乃施行于是曾公亮乞批付大臨等同草韓絳曰止是頌建白難付大臨等公亮曰頌意欲如此安石曰恐大臨不肯草即便稽留聖旨乃直付頌而頌復辭以不當日遂再送大臨大臨又繳還故有是責大臨及頌之未責也詔趣直舍人院蔡延慶等就職及責大臨等延慶遂草定制既進草又上奏乞罷之知通進銀䑓司孫固再封駮卒行下此據司馬光日記及御集御集第一百五十二巻知銀臺司兼門下封駁事孫固奏竊聞有旨李大臨蘓頌落知制誥蔡延慶未敢命詞大臨與頌昨以除選人李定為監察御史裏行以故事開陳除命未當不敢自為反覆欲望陛下寛大臨與頌之責而特從延慶之請不勝幸甚御批蔡延慶元不曾不肯命辭兼蘓頌等亦不曽論李定自是罪他反覆抗命要卿知可速發下固又奏陳御批敕内著罪状甚明無可疑慮可速發下韓瓘劉安世語錄云章衡草定制誤也衡八年十二月乃修注案宋敏求等三人之罷天下謂之三舍人然敏求之罷在四月頌與大臨在五月盖同事而異時續綱目及宋史敘次俱誤詔杭州洞霄宫永康軍丈人觀亳州明道宫華州雲臺觀建州武夷觀台州崇道觀成都玉局觀建昌軍仙都觀江州太平觀洪州玉隆觀五嶽廟太原府興安王廟自今並依嵩山崇福宫舒州靈仙觀置管勾或提舉官時以諸臣歴監司知州有衰老不任職者令與閑局王安石亦欲以處異議者故増宫觀貟朱夲削去王安石欲處異議者又為之説曰因使人各得便卿里且以優老示恩今並用初夲詔以禁軍分五部法檢治廂軍㑹要三年五月十四日事今用兵志所修増入甲辰詔近設制置三司條例司夲以均通天下財利今大端已舉惟在悉力應接以趣成效其罷歸中書先是文彦博等皆請罷制置條例司上謂彦博曰俟羣言稍息當罷之不欲亟罷恐傷王安石意故也既罷又以手札諭安石有司結絶所施行事乆之乃罷吏人屬中書為額外堂後官樞宻院者為副承旨三司勾覆官並除供奉官朱夲簽貼云勘㑹指揮罷局月日在前後來却有申請事故増入有司結絶所施行事乆之乃罷等語新夲削去今復存之上乆欲罷之恐傷王安石意及謂文彦博云云并吏人恩例此據司馬光日記刪修乙巳龍圗閣直學士兵部侍郎集賢殿修撰何郯提舉成都府玉局觀病故也郯遂請老以尚書右丞致仕初文彦博論置宫觀差遣非是且如何郯兩制乃令提舉玊局觀郯雖無耻然朝廷不當如此安石曰如郯者既衰病不能治事遂肯分司致仕夫豈不善若未肯而朝廷彊使之去則於人情或以視遇羣臣為薄即使領州郡則又廢事務害百姓故廣置宫觀使食其俸給而不害事也且提舉在外宫觀亦無甚異何足為耻自増置宫觀昏病闒茸之人就者已多少清州郡之選不為無補也郯為御史論事鯁切無所避為仁宗所知晚節稍回畏不及其初及在梓州乃因地震言隂盛臣彊譏切韓琦又乞召還王陶以中上意既老被病猶冀復用上屢薄之初欲但令以夲官致仕王安石曰除右丞已不厚乃除右丞郯以右丞致仕在六月十一日今從舊錄并書之詔前永安縣主簿崇文院校書邢恕與堂除近地試銜知縣先是外人譁言将以新進士為校書陸佃甞從王安石學張安國無為人安石客也吕升卿乃恵卿弟皆外人所指目者于是知諫院胡宗愈言故事崇文院校書如未歴外官及不滿任者不得選舉昨邢恕以新進士除校書盖朝廷未有法制近聞新進士縁此奔走權要廣為道地乞自今須歴一任乃除上曰何嘗有此乃令罷恕恕夲吕公著所引用安石方惡公著故因宗愈言而有是命熈寕二年十一月三日初為校書十年三月己巳恕復校書本傳所云可考左衛将軍駙馬都尉張敦禮為光州刺史丙午詔直舍人院只理本資序候知制誥不闕即罷始王益柔等遂自謂某為知制誥既而上謂益柔等文詞非工故有是命此㨿日錄并日記刪修工部郎中權發遣鹽鐡副使沈起度支貟外郎權河北轉運副使吕大防並直舍人院條例司言常平新法宜副司農寺乞選官主判兼領農田差役水利事遂命太子中允集賢校理吕恵卿同判司農寺祕書丞集賢校理同判寺胡宗愈改兼判仍候有兩制可差即改差一員蒋静作吕恵卿家傳云三年五月兼判司農寺初淳化中始置常平倉賤糴貴𤼵至祥符六年併開封祥符兩縣倉為在京常平倉斛斗經二年即以為軍糧而以新好者封樁而糶糴之政乆廢公乃請以本寺見管封樁兊換𤼵運司新米逐倉寄敖收管遇物貴賤即糶糴如本法以平市價九月一日行恵卿言州縣差役之法乆以為弊重役之家至冇破産而僥倖者役不一名有衙前承符散從之類色役非一其弊尤甚不可勝言于是朝廷置局詳定利害而以文字送制置條例司看詳司農實兼領之公以謂今欲除去宿弊使民樂從然所寛優者則鄉村朴憃不能上逹之甿所裁取者則仕官并兼易致人言之豪户以至衙司縣官皆恐無以施誅求巧舞之姦新法之行尤所不便官吏既不能明見法意抑又惑于言者之多築室道謀難以成就于是為牒具析所以措置施行之状極於詳盡檄諸路監司使之如法推行卒罷差役法令當役人户以等第均出曰免役錢而一切募人充役隨本役輕重以錢給之其坊郭第户及成丁單丁女户寺觀品官之家舊無色役者皆以等第均岀曰助役錢四年十月一日乃頒募役法比部郎中提舉江南西路常平等事王直温權夲路提㸃刑獄兼提舉常平如故提㸃刑獄兼提舉常平自直温始是月又除董儀今削去止存事始翰林學士承旨王珪等言英宗時文臣磨勘已展為四年比之武臣年限相若其武臣不可更展乞自今應正任刺史團練防禦使已上遷官未滿十年者非有顯效遇非次恩止與移改州鎮十年内有過犯者仍比文臣展年從之丁未詔青苗錢委諸路轉運開封府界提㸃提舉司毎年相度留錢穀以備非時賑濟岀糴外更不限時月止作一料給散却作一料或兩料送納以便人情如願分兩料請者亦聴司馬光云王廣亷在河北民不能償春料乃更俵秋料使償之民受之知縣㕔即輸之主簿㕔此事當考廢管勾睦親廣親宅并提舉郡縣主宅所歸大宗正司從知宗正丞張稚圭請也先是宗室舉動皆為管勾内臣所拘制稚圭始請罷之上令并罷郡縣主宅提舉管勾内臣拘制據司馬光日記庚戌著作佐郎張琥編修中書條例琥洎孫也琥墓誌王存撰實錄闕傳詔歐陽修不合不奏聴朝廷指揮擅指散青苗錢特放罪修在青州嘗奏䟽曰伏見朝廷新制俵散青苗錢以來中外之議皆稱不便多乞寝罷至今未䝉省察臣敢條陳三事其一議者言青苗錢取利於民為非而朝廷深惡其説至煩聖慈命有司具述夲末委曲申諭中外以朝廷夲為恵民之意然告諭之後搢紳之士論議益多至于野田之民蠢然固不知周官泉府為何物但見官中放債毎錢一百文要二十文利是以申告雖煩而莫䏻諭也臣亦以謂等是取利不許取三分而許取二分此孟子所謂以五十歩笑百歩者以臣愚見必欲使天下曉然知取利非朝廷夲意則乞除去二分之息但令只納元數夲錢如此始是不取利矣盖二分之息以為所得多耶固不可多取于民所得不多耶則小利又何足顧何必以此上累聖政其二檢詳元降指揮如災傷及五分已上則夏料青苖錢令於秋料送納秋料于次年夏料送納臣竊謂年嵗豐凶固不可定其間豐年常少而凶年常多今所指揮盖只言偶然一料災傷爾若連遇三雨料水旱則青苖錢積壓拖欠數多又若纔遇豐熟却須一併催納則民永無豐嵗矣于中小熟之年不該得災傷分數合于夲料送納者或人户無力或頑猾拖延夲料尚未送納了當若令又請次料合俵錢數則積欠轉多必難催索臣今欲乞人户遇災傷本料未曾送納者及人户無力或頑猾拖延不納者並不支俵與次料錢如此則人户免積壓拖欠州縣免鞭扑催驅官錢免積欠失䧟其三竊聞議者多以抑配人户為患所以朝廷屢降指揮丁寕約束州縣官吏不得抑配百姓然諸路各有提舉管勾等官徃來催促必須盡錢俵散而後止朝廷雖指揮州縣不得抑逼百姓請錢而提舉等官又却催促盡數㪚俵故提舉等官以不能催促盡數㪚俵為失職州縣之吏亦以俵錢不盡為弛慢不才上下不得不逓相督責者勢使之然各不獲已也由是言之理難獨責州縣抑配矣以臣愚見欲乞先罷提舉管勾等官不令催督然後可得責州縣不得抑配其所俵錢任民情願専委州縣隨多少散之不必須要盡數亦不必須要闔縣之民户口盡清如此則自然無抑配之患矣臣不能深識逺慮所見目前止于如此然而青苖之議乆已喧然中外羣臣乞行寝罷者不可勝數其所陳乆逺利害必已詳盡而無遺矣一日陛下赫然開悟悉採羣議追還新制一切罷之以便公私天下之幸也若中外所言雖多猶未能感動天聽則見行不便法中有此三事尤繫目下利害伏望特賜裁擇又奏勘㑹今年二麥纔方成熟尚未収刈已係五月又合俵散秋料錢數竊縁夏料已散錢尚未有一户送納若又俵㪚料錢竊慮積壓拖欠枉有失䧟官錢臣已指揮本路諸州軍並令未得俵㪚秋料錢别候朝廷指揮去訖臣伏思除臣近所起請災傷未納及人户拖欠不納者乞且不俵次料一事外臣今更有愚見不敢緘黙臣竊見自俵青苖錢已來議者皆以取利為非朝廷深惡其説遂命所司條陳申諭其言雖煩而不免於取利然猶有一説者意在恵民也以臣愚見若夏料錢于春中俵散猶是青黄不相接之時雖不户户闕之然其間容有不濟者以為恵政尚有可説若秋料錢於五月俵散蠶麥成熟人戸不乏之時何名濟闕直是放債取利爾若二麥不熟則夏料尚欠豈冝更俵秋料錢使人户積壓拖欠以此而言秋料錢可以罷而不散欲望早降指揮中書言修擅止給青苖錢欲特不問罪王安石論修殊不識藩鎮體乃降是詔先是上復欲用修執政問王安石以修何如邵亢安石曰修非亢比也又問何如趙抃安石以為勝抃它日又問何如吕公弼其意欲以代公弼也安石謂勝公弼又問何如司馬光安石亦謂勝光上遂欲用之安石曰陛下宜且召對與論時事更審察其在政府有補與否乃遣内侍馮宗道賜以太原告敕諭令赴闕朝見訖之任安石又曰修性行雖善然見事多乖理陛下用修修既不盡燭理有能惑其視聽者陛下宜務去此軰上問誰與修親厚良乆曰修好有文華人安石盖指蘓軾軰而上已黙諭明日安石又白上曰陛下欲用修修所見多乖理恐悮陛下所欲為上患無人可用安石曰寕用尋常人不為梗者上曰亦須用肯作事者安石曰肯作事固佳若所欲作與理背即誤陛下所欲為又陛下毎事未免牽于衆論或為所牽即失事㡬此臣所以不能不豫慮也時已除修宣徽南院使判太原府四月十二日上曰待修到更徐議之于是安石知修决不附已益毁之曰臣固嘗論修在政府必無補時事但使為異論者附之轉更紛紛耳它日上論文章以為華辭無用不如吏材有益安石曰華辭誠無用有吏材則能治人人受其利若從事于放辭而不知道適足以亂俗害理如歐陽修文章于今誠為卓越然不知經不識義理非周禮毁繋辭中間學士為其所誤㡬至大壊時修方力辭新命上未許也七月三日辛卯聽辭宣徽太原詔以京朝官曾歴通判知縣者四人分治開封府新舊城左右廂凡鬪訟杖六十已下情輕者得専决及逋欠婚姻兩主靣語對定亦委理斷其先所差使臣並罷之從權知開封府韓維請也皇城使開州團練使沈惟恭除名瓊州安置進士孫棐處死惟恭貴妃沈氏之弟故宰相倫之孫棐開封人惟恭門下客也惟恭以干請恩澤不得志觖望嘗為棐言皇子生必不乆語渉咒詛又假他人指斥乗輿之言以語棐棐希惟恭意毎見輙詆時事亦嘗指斥乗輿後又詐為司馬光陳五事章䟽以示惟恭詞極不遜惟恭轉以示人四方館歸司官張澤得之以示閤門使李評評奏之故敗棐既伏誅餘傳寫人皆釋罪四月八日吕公著責時魏泰妄載棐事已辨之于彼考林希野史云初司馬光貽書王安石闕下争傳之安石患之凡傳其書者徃徃隂中以禍民間又偽為光一書詆安石尤甚而其辭鄙俚上聞之謂左右曰此决非光所為安石盛怒曰此由光好傳私書以買名故致流俗亦效之使新法沮格異論紛然皆光倡之即付獄窮治其所從得者乃皇城使沈惟恭客孫杞所為惟恭居常告杞時事又語嘗渉乗輿戲令杞為此書以資笑謔獄具法官坐惟恭等指斥乗輿流海島杞棄市以深禁民間私議已者其後探伺者分布都下希所云孫杞即孫棐也自此探伺者分布都下要當表而岀之五年正月丁未曽孝寛云云制置條例司言諸路科買上供羊民間供備㡬倍而河北𣙜場慱買契丹羊嵗數萬路逺抵京則皆痩惡耗死屡更法不能止公私嵗費錢四十餘萬緡近委著作佐郎程博文訪利害博文募屠户以産業抵當召人保任官豫給錢以時日限口數斤重供羊人多樂從得以充足嵗計除供御膳及祠祭羊依舊别圏養棧外仍更棧養羊常滿三千為額以備非常支用從之博文所裁省冗費凡十之四人甚以為便先是進呈條例上批曰屠户情願夲家宰殺亦聽一節可刪去恐以死肉充故也羊事條目極多而上一閲遂見此人莫不稱歎盖上于天下所奏報利害擿其精要類如此朱夲用日録刪改舊夲新夲並從朱夲今亦從之羣牧判官王誨上羣牧司編敕十二巻行之誨舉正子也詔武臣諸州未立定合兼鈐轄州軍今後除河北河東陜西知州帶經畧安撫使及都總管外河北雄滄河東代潞並兼本州駐泊兵馬鈐轄餘州軍兼管勾本州駐泊軍馬公事其正任防禦團練使以上知州自依舊制元年十二月乙卯可參照又詔廣南西路㳂邉外州軍别無通判㦯别官兼職官處止令知州専管勾常平其㸃檢諸縣錢榖即差曺官或縣官辛亥京東安撫司言青州益都進士蘓丕天聖五年嘗至禮部自後絶意進取四十餘年今七十六嵗乞以丕合該恩澤賜一處士名目詔賜丕號安退處士壬子詔罷入閤儀先是翰林學士承旨王珪等言謹案入閤者乃唐隻日紫宸殿受常朝之儀也唐紫宸與今同而唐宣政殿即今文徳殿唐制天子坐朝必立仗於正衙若止御紫宸即喚正衙仗自宣政殿東西閤門入故謂之入閤五代以來廢正衙立仗之制今閤門所載入閤儀者止是唐常朝之儀非為盛禮不可遵行故罷之江淮等路發運使薛向言上供米六百二十萬石見已装發其吕募客綱所運二十六萬餘石入京已過元額乞理充来年嵗計之數從之二年九月十六日可考工部尚書致仕李兊卒丁巳京東轉運使工部郎中直龍圖閣王廣淵為河東轉運使曽公亮初欲差權王安石以為廣淵在京東宣力當正除且曰廣淵與周孟陽俱侍讀孟陽已得修撰廣淵不應但權轉運使上從安石言遂正除廣淵為京東漕在二年十二月八日詔國家以西樞内輔賛翊本兵任為重矣而狃于舊制自右職升朝以上必兼擇而除之是以三公府而親有司之為非所以遇朕股肱之意也今使臣増貟至衆非張官置吏以總其事則不足以一文武之法而礪中外之才宜以審官院為審官東院别置審官西院差知院官兩貟専領閤門祗候以上至諸司使磨勘常程差遣命右諫議大夫天章閣待制齊恢為知院兵部郎中韓縝同知仍以太常禮院治所為審官西院其禮院歸太常寺置局先是上論及大使臣磨勘及常程差遣欲付之三班王安石與韓絳以為不如置西院付之上即令置然未嘗與樞宻院議也及文彦博等對乃言其不便曰屢與大使臣因差遣相見尚患不知其人付之審官則愈不知緩急難為選擢矣上曰欲知之不在數見又曰如王慶民事宻院乃當知大使臣常程差遣何足預安石曰省細務乃可論大體絳曰此事于樞宻吏人即不便彦博曰果合如此亦不論吏人便與不便彦博退上語及西院事安石曰樞宻院亦止是五代分置曽公亮曰欲分宰相權耳上曰前代亂豈緣不分樞宻院乎安石曰綱紀修視聽不蔽則人主權自然歸一不然則樞宻亦能専權如史𢎞肇之徒是也五代用武故政岀樞宻宰相備位而已非治法也故降是詔議者謂絳及安石協謀欲沮彦博且奪其權因建此議然先時大使臣差遣皆屬樞宻院無先後名次時人亦頗患其不平也頗患其不平此據司馬光日記是日上曰韓縝言王慶民部内城壁不葺軍械不修弓箭手多是疲小虗名數任之間累為帥府所薦朝廷遷擢不一豈可不案治欲差官徃案治王安石曰韓縝是本路轉運使自當案治只可召縝諭旨令舉劾吕公弼曰見韓縝言數處器甲城壁不整齊其使臣却幹事可惜所以重于案劾安石曰朝廷要立法即惜人材不得上曰諸葛亮尚能斬馬謖非不惜謖材盖不斬謖則法不立故也安石曰前代有白衣領職者若有罪當黜罰而其材足藉尚可䇿勵即以權領舊職無妨如此則法立而材不廢上卒從安石言戊午新作來逺驛増葺舊馬軍都虞候公廨為之以待蕃客舊紀書作來逺驛新紀不書知鬱林州趙奎言夲州嵗役車丁運鹽輸容州北流縣給容邕等州岀賣初官給錢買牛造車其後牛死車敗皆車丁自辦遇運鹽月人給錢二百米一石仍禁以牛車乗載私物車丁不堪其苦欲乞自今車丁不給錢米之月聽以牛車雇載私物從之先是修内司軍士孔用等白晝入内閣盗金銀器物提舉修内副都知張若水自劾不覺察詔釋之知諌院胡宗愈言若水等當重貶竄以懲不恪詔候開封府案上取旨宗愈又言若水嘗在慶州韓絳素結之隂庇䕶若水宗愈尋斥案宗愈因諫分審官西院之不便且言李定非才故黜不縁此事也若水卒不問上封者言宗室正任刺史以上聽差殿侍或三班差使殿侍祇應其餘宗室所授殿侍乞以親事輦官及近上軍分補充其書表宅案客司等亦乞裁損詔大宗正司定奪以聞朱本簽貼云事小兼㑹問不見施行合刪去李􅐉十朝綱要云是月夏人大舉入冦慶州築納斡堡知慶州李復圭遣鈐轄李信等繫之敗還復圭又遣将梁從吉别攻夏人金湯白豹等寨破之
