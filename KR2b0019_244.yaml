body:
  text: 續資治通鑑長編卷二百四十宋李燾撰神宗熙寧五年十一月辛亥梓州言知州司農卿直龍圖閣趙尚寬卒賜錢五十萬以尚寬有功於民故也癸丑知慶州寶文閣待制王廣淵為龍圖閣直學士再任初議廣淵再任上曰與轉官或轉職既而曰廣淵能了叛卒事誠不易得與轉職睦州團練推官知於潜縣郟亶為司農寺丞兩浙路提舉興修水利郟亶眀年五月二十三日追官日録載上語云郟亶且勿移動按亶事訖無成故安石專以此事為出上意今不取林希野史云癸丑正月一日中旨郟亶修墟未得興工官吏所見不同各具利害聞奏乃赴司農稟覆亶奉使浙西六郡三十四縣比户調夫同日舉役古未嘗有轉運提刑皆受約束民愁苦無訴逃移已多聞此㫖如獲更生亶到郡方二日怙勢作威郡縣苦之慚沮無以自容十五日士民二百餘人詣亶方與李瑜同坐衆突入驛庭亶大駭識楊季孺及一姓王者乃以溫辭勞之曰可上㕔說話二人云以公事來不敢上㕔亶再三邀之二人既登衆從而擁之衆問作墟不便之事亶方條陳衆隨詰之亶即入幕中取文書展示云前所行下條件尚有未盡今皆改正衆云寺丞本以利便上于朝廷今何得却云錯誤衆大噪罵曰瞎漢誑惑聖聰欺罔朝廷罵聲喧然亶兵士指約衆益前亶幞頭墮地一小兒在旁亦為衆人所擊庭下張燈為衆蹂踐宅門亦破季孺姪同出最後為兵士所執衆又奪去之亶遂指李孺姓名牒州根問亶曰我制使也此可謂拒捍而無臣之禮者不得以常法處之初衆詣郡投狀嚴倅令除去罵亶語遂易狀再投於州又以狀詣王漕狀首全矩年七十一又易狀以次為首郡方窮治民遂畏縮而亶便欲興役盡遣諸令出郊標遷墟地官吏愁苦忽中旨到郡令罷役亶靣如死灰闔郡傳之諸令鳴鐃而人民皆歡呌如脫重辟按亶責在六年二月三日希云六年正月一日恐誤河州首領轄約等來降詔以為內殿崇班本州蕃部都監仍賜姓包名約約者順之兄摩正謀主也摩正既敗約始歸熙州聽命內園使燕達權發遣環慶路駐泊總管每年賜公使錢一千五百緡仍先借支二年先是綏州之役達首戰有功及罷婁城堡戍達率衆護義勇數千人南歸賊尾擊甚急達力戰破之部曲無所失威名著於邉部故自鈐轄躐等遷擢然以資淺故令權發遣權發遣總管自達始也詔河北緣邉安撫司提舉𣙜場賣銅錫甲寅詔四園苑差遣不許用恩澤陳乞此據御集丙辰太常丞集賢校理檢正中書刑房公事李承之兼提舉三司帳司勾院磨勘司殿中丞詳定諸司庫務利害兼提舉在京市易司吕嘉問兼同提舉詔涇原路經略司簡發鎮戎德順軍第一等弓箭手五千并景思立所管第六將下正兵一千准偹䇿應熙河路以思立向所部兵少而熙河方圖進取故命濟師丁巳權發遣提㸃開封府界諸縣鎮屯田員外郎吳審禮兼提舉淤田司封郎中知越州孔延之庫部員外郎通判裴士傑並衝替以兩浙提舉鹽事司言延之等沮壞鹽法虧嵗額也上謂王安石曰市易賣果實審有之即太繁細令罷之如何安石曰市易司但以細民上為官司科買所困下為兼并取息所苦自投狀乞借官錢出息行倉法供納官果實自立法以來販者比舊皆即得見錢行人比舊官司兼并所費十减八九官中又得好果實供應此皆逐人所供狀及案驗事實如此每年行人為供官不給輒走却數家每糾一人入行輒訴訟不已今自立法數月以來乃有情願投行人則是官私利便可知止是此等皆貧民無抵當故本務差人逐日收受合納官錢初未嘗官賣果實也陛下謂其繁細有傷國體臣愚切謂不然今設官監酒一升亦賣設官監商稅一錢亦稅豈非細碎人不以為非者習見故也臣以為酒稅法如此不為非義何則自三代之法固己如此周官固己征商然不云須幾錢以上乃征之泉府之法物貨之不售貨之滯于民用者以其價買之以待賣者亦不言幾錢以上乃買又珍異有滯者斂而入於膳府供王膳乃取市物之滯者周公制法如此不以煩碎為耻者細大並舉乃為政體但尊者任其大卑者務其細此先王之法乃天地自然之理如人一身視聽食息皆在元首至欲搔癢則須爪甲體有小大所用不同然各不可闕天地生萬物一草之細亦皆有理今為政但當論所立法有害于人物與否不當以其細而廢也市易務勾當官乃取賈人為之固為其所事煩細故也豈可責市易務勾當官不為大人之事臣以謂不當任煩細者乃大人之事如陛下朝夕檢察市易務事乃似煩細非帝王大體此乃書所謂元首叢脞也陛下修身雖堯舜無以加然未能運天下者似于大體未察或代有司職未免叢脞書稱庶績咸熙又曰庶績其凝帝王收功當如陽之熙如隂之凝陛下于政事尚未能熙固未能凝譬如天方春時陽氣將熙乃吹以凉風摧以霜霰即萬物豈能敷長物尚不能敷長即何由致成實上笑且曰買得果實誠比舊極佳行人亦極便但行人皆貧弊宜與除放息錢安石曰行人比舊已各蘇息可以存活何須除放息錢若行人已蘇息比舊侵刻之苦己十去八九更須除放息錢即見今商稅所取不擇貧富固有至貧之人尚為稅務所困亦合為之蠲除既未能蠲除彼何獨蠲除此今諸司吏祿極有不足乃令乞覔為生不乞覔即不能自存乞覔又犯刑法若除放息錢何如以所收息錢增此輩祿安石又曰陛下不殖貨利臣等不計有無此足風化天下使不為利至於為國之體摧兼并收其贏餘以興功利以救艱厄乃先王政事不名為好利也此假朱史乃繫之六年正月七日今仍附本日眀日進呈內東門及諸殿吏人名數白上曰從來諸司皆取賂於果子行人今行人嵗入市易務息錢幾至萬緡欲與此輩增祿上曰諸殿無事惟東門司事繁當與增祿安石曰如入內內侍省吏人亦當與增祿蓋自修宗室條制所減貨賂甚多故也上又曰大宗正司吏人亦宜與定祿法免困擾宗室宗室漸有官卑及不得官者不宜更令吏人乞取困擾之先帝每遷官此輩所乞取須數十千安石曰宗正吏止十二三人更與量增祿即可行重法此假朱史乃繫之三年八月二十三日今依日録仍附見此安石又言市易務如果子行人事才立得七行法如此類甚衆但以陛下檢察太苛故使臣畏縮不敢經制臣以謂陛下不當擾之使怠惰因循令細民受弊也王省惟嵗嵗月日時無易乂用眀俊民用章今陛下未見叢脞乃責市易務煩細此乃所謂嵗月日時既易士之有能有為者畏縮不敢有為俊民與怠墮無能之人同即微而不章矣又録㕓人泉府事白上曰此周公所為也上曰周公事未能行者豈少安石曰固有未能行者若行之而便於公私不知有何不可而乃變易以從流俗所見上因言重祿法曰聞吏舊日受賕多於今祿所得安石曰所得雖多然須姦猾敢犯法者乃多得而懦善畏法者所得未必多於今也左藏自來號為脂膏然招人常不足自賦重祿以來所招人乃不闕上曰賦祿立重法兼可召得顧惜行止人兼為免刺靣所以人樂應募也朱史以重祿法附三年八月二十三日今仍見於此陳瓘論曰神考聖訓謂市易法苛細恐其有害細民故初欲罷之所以懷保小民也而安石則曰非帝王大體此書所謂元首叢脞也神考沮抑吕嘉問所以去蟊賊而養嘉穀也乂之用明何以加此安石則曰俊民不章矣借典謨洪範之言以文私意豈獨此哉戊午殿前都虞候雍州觀察使環慶路副都總管竇舜卿為刑部侍郎提舉西京崇福宫先是舜卿罷環慶夜行失道墮澗中幾死以疾自請換文資故也王安石白上曰舜卿曽為朝廷了荆湖蠻事以身親矢石定一方之難又在西方領兵亦有勞今以病去職為觀察使月請料錢二百千故不敢當乞換文資雖世俗所見亦以為舜卿須換文資不可坐受重祿如舜卿以身狥國亦粗有勞更請觀察使料錢閒坐二十年亦不過數萬貫然人情皆以為厚祿非安坐所當享今一州一縣便須有兼并之家一嵗坐收息至數萬貫者此輩除侵牟編户齊民為奢侈外於國有何功而享以厚奉然人情未嘗以為此輩不當享此厚奉者習所見故也天命陛下為神眀主毆天下士民使守封疆衛社稷士民以死狥陛下不敢辭者何也以陛下能為之主以政令均有無使富不得侵貧彊不得凌弱故也今富者兼并百姓乃至過於王公貧者或不免轉死溝壑陛下無乃於人主職事有所闕何以報天下士民為陛下致死庚申詔杭州選捍江兵四百人為教閲捍江指揮專習武藝候教閲精熟於昨差屯駐京東一千人內減四百人兵部員外郎知制誥提舉崇禧觀錢公輔卒章惇言招諭梅山蠻猺令作省户皆歡喜爭開道路迎所遣招諭人得其地東起寧鄉縣司徒嶺西抵邵陽白沙寨北界益陽四里河南止湘鄉佛子嶺又言南北江事亦各有序且言恐進奏院漏泄所奏事上令入內內侍省下文字此據㑹要五年十月事今附見壬戌龍圖閣直學士吳中復知永興軍天章閣待制知永興軍李肅之知青州知慶州龍圖閣直學士王廣淵知渭州陜西都轉運使天章閣待制楚建中知慶州時方議責郭逵欲用張詵帥慶移廣淵帥渭僉謂前有處置叛卒之語用詵恐慶卒驚疑安石曰慶渭有何異若詵可帥慶何不可帥渭上以為渭非詵所任僉以為如上旨乃議用劉庠李肅之孫永張景憲及建中上以李肅之非其任安石曰此數人者永差勝上曰永前帥秦極不善安石曰差勝庠及肅之耳又曰慶與渭皆帥府詵可帥慶即可帥渭文彥博曰美錦不可使學者製必須經諳乃可用建中頗嘗歷西事詵在秦州亦熟秦州事若秦帥有闕用詵為允上曰詵應副熙河事亦穩審吕公弼見乞罷令詵帥秦甚善髙才則無所不宜若中才即經諳乃可用安石曰人茍非才家事亦不曉茍才則所至能辦事張詵在䕫路了蠻事豈詵素習應副熙河穩審又非素到熙河今諸路同對一夏國平時但以奉行朝廷政令訓練士卒為職業職業一耳茍可帥一路即餘路皆可上終欲留詵帥秦乃曰廣淵亦欲移令廣淵帥渭建中帥慶安石曰建中帥慶恐不及詵建中雖見任待制置帥不應論官職大小上曰詵固勝建中也又曰人多非廣淵及帥慶乃能了叛卒事馮京曰廣淵非端良故人多毁之安石曰廣淵在慶州奏事皆實殊無詐妄論其才即素不謂如建中也彥博曰人必須經諳事如李石被逐於太原李絳被殺于興元總為不經諳彼處軍情耳安石曰此兩人無可悔恨自是朝廷無紀綱不能制馭小人小人放恣所以被逐被殺豈得云絳不經諳事故被殺若朝廷所為如此絳雖經諳事將如彼何命秦鳯路鈐轄周永清專提舉訓練本路上等義勇從吕公弼請也權發遣都水監丞周良孺言奉詔相度陜西提舉常平楊蟠所議洪口水利今與涇陽知縣侯可等相度欲就石門創口引水入侯可所議鑿小鄭泉新渠與涇水合而為一引水並髙隨古鄭渠南岸今自石門以北已開鑿二丈四尺此處用約起涇水入新渠行可溉田二萬餘頃若開渠直至三限口合入白渠則其利愈多然慮功大難成若且依可等所陳回洪口至駱駝項合白渠行十餘里雖溉兩旁髙阜不及然用功不多既鑿石為洪口則經久無遷徙之弊若更開渠至臨涇鎮城東就髙入白渠則水行二十五里灌溉益多或不以功大為難成遂開渠直至三限口五千餘里下接耀州雲陽界則所溉田可及三萬餘頃雖用功稍多然獲利亦逺詔用良孺議自石門創口至三限口合入白渠興修差蟠提舉又令入內供奉官黃懷信乘驛相度功料先是上閲鄭渠利害王安石曰此事正與唐州邵渠事相類從髙㵼水決無可慮陛下若捐常平息錢助民興作何善如之上曰縱用內藏錢亦何惜也癸亥翰林侍讀給事中知定州滕甫為禮部侍郎先是上批甫十二月滿二年令取旨於是執政進呈上曰誰可代甫者或且令再任蔡挺曰河北諸鎮與陜西不同二年為一任推恩太優恐合三年為任或謂陜西若無事當與河北同以三年一任為允王安石請自今以三年為一任甫仍乞依舊例推恩上從之詔宣徽南院使雄武軍留後判渭州郭逵落宣徽南院使知潞州通判秦州太常少卿馮潔已管勾機宜文字殿中丞蕭敦善河南府鞏縣主簿張繢司理參軍張續勘官光祿寺丞杜純並衝替前知通逺軍王韶罰銅八斤初商人元瓘與韶以利交後投韶效用時有中書劄子元瓘不得於市易司勾當去年正月韶託以瓘諳習商販令管勾機宜黃察因幹事入京投狀待漏院乞瓘依舊勾當未報而韶赴闕改瓘名仲通令在本司變轉茶綵及雇女奴與川交子五千緡并度牒置公用仲通尅留六百餘千逵知仲通違朝旨勾當即捕仲通令敦善繢訊鞫得韶贓狀又㸃檢官鈔歷不同奏韶侵貸官錢送仲通司理院潔已監勘仲通稱韶借智緣銀二百兩并逮黃察治劵馬錢事連部將王君萬韶申有緊切事已遣君萬入蕃勾當候回日發遣純奏韶託以邉事侮玩制問不肯發遣㑹純遭父喪改御史蔡確就劾盡變其獄遣確在七月戊子至是奏案上逵反坐慿仲通虛詞指定韶罪潔己續禁無罪命官察敦善繢不申長吏取判枷考罪人純奏韶處置邉事輕舉無謀雖㑹赦或去官猶責及之朱本云逵坐奏劾王韶盜貸官錢不實潔已等以附㑹逵推勘不直韶以違朝旨與元瓘改名及狀內虛妄具獄上雖皆㑹赦降去官特責之與墨本差不同今附注此上初欲候純喪除别與差遣王安石曰純奏韶出入不眀不可根勘乞更不治中書條析問難及奏至乃略無不眀之事若非純挾姦何故如此且被㫖令勘事乃言不可勘至討奄東事非職事所預又在勘院初不知事端乃反奏韶不合誅殺不知此是何意上乃令純依衝替例司農寺言已定京東路役法欲自熙寧七年推行若雇錢及役使重輕尚有未盡委轉運提㸃刑獄提舉司詳具申寺從之甲子詔賜廣南西路常平司度牒千為糴本詔熙河路置鈐轄二員路分四員走馬承受一員熙州通判二員曹官三員駐泊監押三員物務監官九員詔令皇城使程昉河北緣邉安撫司屯田司同相度滄州界塘泊利害及邉吳淀灘地令人户指射栽種桑棗榆桞先是議者以河朔地平自保塞東雖以塘泊隔敵騎而西至滿城僅二百里乃無險可恃故向者敵入冦嘗取道於此謂宜植榆為塞異時可依為阻固以禦奔突之患故有是詔乙丑知熙州王韶言招納穆楞川東瑪爾巴一帶大首領溫布察克罝等及所部首領三百八十七人各補副軍主等職名仍第支料錢丁卯貶太子中允權監察御史裏行張商英為光祿寺丞監荆南稅先是商英言博州官吏失入贓不滿軍賊二人死罪樞密院檢詳官劉奉世黨庇親戚令法官引用贓滿五貫絞刑斷例稱博州官吏不見斷例失奏裁止從杖罪取勘又院吏任逺恣橫私狥凡十二事而樞密院黨庇不案治外人莫不聞知於是樞密使副文彥博吳充蔡挺因此不入院遣吏送印於中書中書不受上問之遣使促彥博等入院彥博等言臺官言臣等黨庇吏人與之相知漏泄乞以其章付有司眀辨黑白然後正臣等違命之罪商英又言乞以臣所言博州失入刑名下有司定奪并以任逺事送開封府根治若臣言不當甘伏斧鉞於是王安石曰博州事官吏本無罪密院尚不合令科應奏不奏之罪上曰博州事分曉任逺事如何安石曰若言取受甚多令有司如何推究又恐新法已前于法不得受理上曰此在新法前安石曰如此則無可推究者上曰商英當如何行遣安石曰密院方治御史李則事商英乃隨攻博州事以報之李則事御史所治誠不當不自咎更挾忿攻人豈所謂懷忠良以事君者故有是命先是臺勘劫盜李則死罪失出奉世駁之詔糾察刑獄司劾治商英遂上章歷詆執政言此出大臣私忿願陛下收還主柄自持威福使臺諌為陛下耳目無使為近臣脅遷上為停詔獄商英坐是與安石忤及言博州事彥博又疑商英隱附中書故不能平商英既坐出上謂安石曰御史言事不實亦常事彥博等别有意乃以為御史欲併樞密院歸中書不知御史初無此議論也安石曰中書欲併密院果何利若謂臣與彥博等多異論故併密院臣顧與彥博合議政事姑以利害言之臣何苦欲併密院任逺李則事商英本章未見劉孝孫柏臺集有奏議可考蓋沂州元斷軍賊李則罪當斬審刑院大理寺皆以沂州所斷為是而刑部詳覆官陳端謂則當減等劉奉世遂舉劾詳孝孫奏議御史乃失入而實録張商英𫝊乃云失出新𫝊又改云從輕典不知何故當求商英本章參定刪修又密院時政記十月五日御史臺坐失入李則死罪與劉孝孫合與實録及新傳俱不同任逺事見六年四月十三日文彥博集有彥博等所上七章今具注此彥博等言以臺官上言黨庇密院吏人任逺及稱樞密使副與任逺相知又引姚崇只為庇一吏人罷相今早已靣奏臣等以才薄體輕頻致御史論奏難以冒處樞要乞便歸西府杜門待罪今䝉聖慈特降中使傳宣各令便歸院供職臣等內訟實難更赴密院伏望聖慈早賜罷免又言臣伏䝉聖慈降中使促令歸院供職臣與吳充等已具劄子奏乞早賜罷免今䝉再降中使𫝊宣便令歸院緣臣等被臺章所言深切謂如姚崇尚罷相即臣之望輕德薄固難冒處機軸伏望聖眀照察祇罷免臣庶幾協中外之議又言臣以臺官奏論樞密院事與吳充等並各待罪府第所有本院印兩次送納中書逐次各令送納回續䝉差中使押印付臣收管緣臣與吳充等見各待罪俟命所有樞密院印伏望聖慈令中書收管又言臣等纍違聖旨不即赴院然事有不可須至陳論今臺官言樞密使副黨庇吏人又與之相知漏泄上語此非人臣所可為况於偹位二府者乎若二府大臣有此便當伏兩觀之誅豈可更處此位如臺官誣罔自繫聖斷二者含糊不決茍且取容不惟四方觀聼謂臣等為何人實亦上纍聖德早來文字並已靣納乞以臺官章疏付之有司眀辨黑白然後正臣等違命之罪望陛下幸察又言臣等纍具奏聞見家居待罪不敢入院所有密院印及公事檢㑹國朝㑹要大中祥符七年命宰臣向敏中權發遣樞密宣徽院公事時王欽若陳堯叟馬知節皆罷冦凖未謝故也自後若樞密皆罷即命權掌如此例今欲乞聖慈早賜指揮又言臣以待罪西府奏乞送樞密院印於中書及檢祥符中敏中故事權發遣樞密院公事未嘗指揮適又凖李舜舉傳宣令今日且在西府發遣文字來日入見臣等以中書未肯收印實懼住滯急速文字容臣等來日入對天顔口陳誠懇乞遂前請又言臣等早來靣陳誠懇乞遂前請伏䝉宣諭盡賜照察兼聞德音已令開封府推究任逺取受及試補第充帖房事其餘所言俱無實跡更不施行緣臣等今來待罪本為臺官言樞密使副與任逺言語往還及漏泄上語只乞辨明虛實今乃聞先罷臺官而臣等所乞辨明事節却未䝉施行於理未安欲望聖慈盡以臺官所言付開封府根究臣等不敢固違聖旨今且在樞密院發遣急速文字伏乞早賜免罷以厭公議戊辰御史中丞鄧綰言臺諫官為朝廷耳目若小有過差不少加優容使皆以言為戒非所以廣聞見也望還商英言職不從上謂王安石曰商英被劾綰乃至出涕言前此未有此事安石曰若以被劾為恥自當平時講習文法既不能講習致有失誤安可免劾馮京言皇城司近差探事人多人情頗不安上曰人數止如舊探事亦不多藍元震又小心緣都不敢乞取故諸司不安僉言外間以為若十日不探到事即決杖故多捃托細碎上曰初無此處分此輩本令專探軍中事若軍中但事嚴告捕之法亦可以防變安石曰專令探軍中事即無妨若恃此輩伺察外事恐不免作過孫權曹操用法至嚴動輒誅殺然用趙達吕一之徒皆能作姦亂政陛下寬仁不忍誅罰焉能保此輩不作姦三代聖王且不論如漢髙祖唐太宗已不肯為孫權曹操所為但眀示好惡賞罰使人臣皆忠信不敢誕謾天下事安有蔽匿不聞者細碎事縱不聞何損於治體欲聞細碎事却致此輩作姦即所損治體不細上以為然正月末巡察謗議時政者可考中書奏太常禮院言奉旨詳定僖祖神主祧遷而判院章衡等請以僖祖為始祖張師顔等請以僖祖為别廟同知禮院蘇稅請以僖祖祔景靈宫者竊以聖王用禮固有因循至於逆順之大倫非敢違天而變古今或以夾室在右謂於宗祏為尊或以本統所承措之别宫為當類皆離經背理臣等所不敢知伏請奉僖祖神主為太廟始祖遷順祖神主藏之夾室依禮不諱孟夏祀感生帝以僖祖配詔恭依先是壬子詔書四月三日令學士院集兩制議已而兩制乞與待制臺諌禮官共議之上曰人本乎初豈復議功當時合便施行不須根議王安石曰宗廟重事令兩制議之足矣上曰兩制誰欲如此王圭曰聞韓維欲如此上曰維意謂何安石曰聞維意未以為然然不知維意欲如何恐付之禮官即更紛紛若維特有所見不妨異論何勞博引議者為助欲止令兩制議議定送禮官草儀注而已上曰善于是翰林學士元絳知制誥王益柔陳繹曽布直舍人院許將張琥上議曰自古受命之王既以功德饗有天下皆推其本統以尊事其祖故商周以契稷為始祖者以其皆承契稷之本統故也使契稷自有本統承其後而文王又為别子之後則自當祖其别子不復以契稷為祖矣所以祖契稷者非以有功與封國為重輕也諸儒適見契稷有功於唐虞之際故以謂祖有功若祖必有功則非有功者莫如鯀而夏后氏何以郊鯀乎今太祖受命之初立親廟自僖祖始僖祖以上世次既不可得而知然則僖祖之為始祖無疑矣倘以謂僖祖不當比契稷為始祖是使天下之人不復知尊祖而子孫得以有功加其祖考也况於毁其廟遷其主而下祔於子孫之室此豈所以稱祖宗尊祖之意哉傳曰毁廟之主陳於太祖未毁廟之主皆升合祭于太祖今遷僖祖之主而藏於太祖之室則是僖祖順祖翼祖宣祖祫祭之時皆降而合食也情文不順無甚於此詩序生民曰尊祖也文武之功起於后稷故推以配天焉蓋言尊祖而不言尊有功言文武之功而不言后稷之功則知推后稷以配天者非以尊有功也秦漢以來典章殘闕祖宗廟祧始失先王所以尊祖之意諸儒異論無所據考臣等考之經傳質之人情謂宜以僖祖之廟為始祖之廟則合於先王之禮意無所悖戾翰林學士韓維别議曰臣伏以親親之序以三為五以五為九上殺下殺旁殺而親畢矣聖人制事存送終之禮皆以是為限是衆人之所同也若其所不與衆人同者則又因事之宜斷之以義而為之節文也昔先王既有天下迹其基業之所由起奉以為太祖所以推功美重本始也蓋王者之祖有繫天下者諸侯之祖有繫一國者大夫士之祖繫其宗而止亦其理勢然也荀卿曰王者天太祖諸侯不敢壞大夫士有常宗所以别貴始貴始德之本也蓋有天下之始若后稷有一國之始若周公大夫之始若三桓所貴者配天也不祧也有常宗也此所以别也今直以契稷為本統之祖則是下同大夫士之禮非荀卿之所謂别也或曰湯文武去契稷皆十有餘世其間子孫衰微奔竄者非一湯文武之有天下契稷何與哉南宫適曰禹稷躬稼而有天下孔子曰君子哉若人禹之有天下則然矣稷諸侯也而曰有天下何哉豈非積纍功德至文王而興乎孟子曰王不待大湯以七十里文王以百里然則小國亦王之所待也所謂七十里百里者非契稷所受以遺其子孫之國乎由是言之商周之所以興契稷不為無所與也正考父作頌追道契湯髙宗商所以興子夏序詩稱文武之功起於后稷豈虛語也哉國語亦曰契勤商十有四世而興后稷勤周十有五世而興榖梁曰始封必為祖南宫適孟軻卜子夏左丘明榖梁赤生於周代其所言皆親聞而見之者其學問又俱出於孔子宜若可信則尊始祖以其功之所起秦漢諸儒亦有所受之也後世有天下者皆特起無所因故遂為一代太祖所從來久矣伏惟太祖皇帝孝友仁聖睿智神武兵不血刃坐清大亂子孫遵業萬世䝉澤功德卓然為宋太祖無可議者僖祖雖於太祖髙祖也然仰迹功業未見其有所因上尋世系又不知其所以始若以所事契稷奉之竊恐於古無考而於今亦有所未安也臣以為均之論議未有以相奪仍舊為便若夫藏主合食則歷代嘗議之矣然今之廟室與古殊制古者每廟異宫今所以奉祖宗者皆在一堂之上西夾室猶處順祖之右考之尊卑之次似亦無嫌至於禘祫自是序昭穆之祭僖祖東嚮禮無不順所謂子雖齊聖不先父食者也孔子曰於其所不知蓋闕如也如臣絳等議非臣所知此臣所以闕而不敢同也天章閣待制孫固上議曰臣聞先王之禮本之人情而為之節文者也故不慕古而違當世之宜不因文而失沿情之實親有踈戚世有同異此禮文所以損益變正之不一也伏惟太祖皇帝受天命一四海創業垂統為宋立萬世無窮之基其為宋始祖而配天受饗理在不疑今聞乃欲以僖祖為始封之祖復其祧主夫既以僖祖為始祖則遂當受饗配天此臣竊所未安也七世之廟親盡而祧此萬世大公之通法未聞有以易之者也故僖祖之主於陛下之世以親盡而祧在禮適為得正而今議者以謂人必本乎祖太祖既已追尊僖祖則今日當以僖祖為本始之祖是未推王者興起有殊異而所當之世各不同也夫開國者其先嘗有功而受封則後之子孫有天下而推以為始祖可矣若未膺受天命特起而得天下者為太祖亦宜矣此實先王之禮人情之所順而前世之所已行也今為議者乃鄙絶漢唐之所行而純取三代之制以為法故有僖祖之廟與契稷無異之說臣竊以為過矣夫本朝之興與商周異商周之王本由契稷故自湯武而上其流有源皆可推而考之契布五教民以知禮其興雖略與周同而猶不若周之懿也周自后稷公劉以來積功纍行以至太王王季世世修德益茂逮於文武受命而得天下則源流之來豈不有自哉故仲尼曰郊祀后稷以配天宗祀文王于眀堂以配上帝則周公其人也夫周而上堯舜夏商之世非不美也其祭祀之禮仲尼不談而獨舉周者豈非其德與世獨為備哉故曰周公其人也言惟周公能備此禮爾夫稷當堯民阻饑之時始播百榖使萬世粒食其為功大矣詩曰思文后稷克配彼天言其德能配天也夫以文武之王而不得預配天之祭者特以后稷之功大爾使周無后稷之祖則周公之祀宜不得舍文武而及他人且後世之興其先既無周之后稷而郊天之配不先創業之君而逺取追尊之祖此豈先王之禮而近于人情者哉今之議者又以祭法禘郊祖宗之禮言商周非絶嚳以其自有本統承之本朝自僖祖以上世次不可得知則必以僖祖為始祖臣又以謂不然矣自秦滅學六經皆被焚棄不復為完書而禮經尤為殘蕩其後漢之諸儒髣佛聖人之餘言曲加意而編綴之故多駁雜不經之說附以鄭康成牽合之言而聖人之意益不眀若祭法之禘郊祖宗者是其一矣其言曰商人禘嚳而郊冥祖契而宗湯信斯言也則禘祭宜無易嚳者今商頌之長發大禘之詩也其曰有娀方將帝立子生商又曰𤣥王桓撥受小國是達受大國是達者乃專歌述契之功德一篇之間了無及嚳之語則祭法之言禘嚳者臣亦未敢取以為信也雖然就其說而考之亦自非大有功德者不可以郊天取配何則鯀障洪水雖疏道失宜而禹因之以成功身被殛死故夏人郊之冥業其官而死於水故商人郊之后稷粒食之功被於萬世故周人郊之今未見冥稷之功而欲同冥稷之祀臣竊以為非宜也漢髙之得天下與商周異故太上皇不得為始封而光武之興不敢尊舂陵而祖髙帝景皇帝唐室始封之君而元皇帝親神堯之父髙祖之時以景皇帝為配而太宗之初已奉髙祖於圜丘景皇帝不得與郊天其後杜鴻漸等復請以景皇帝郊配天地黎幹力詰其非禮而正之夫景皇帝親受唐國之封且不得配天則未嘗啓有土宇而欲以為始祖臣亦慮其難矣恭惟太祖皇帝削平禍難功格上天百餘年間天下之人涵泳生養而安樂於無事者太祖之恩德也今天下惟知尊奉太祖而乃欲替其親郊配天之祀豈厭於人情哉今議者遂將斥絶唐漢上法商周此臣所謂慕古而違當世之宜者也太祖皇帝受周禪僖祖始被追尊而建隆之郊配以宣祖僖祖不得與焉夫以太宗真宗仁宗英宗之世未嘗郊配僖祖而陛下一日隆而祀之蓋有所隆者必有所替今使太祖之禮有替於四宗之時此豈孝思之心哉此臣所謂因文而失沿情之實者也夫非所居而祀之則神有所不受非所宜而配之則天有所不饗所謂郊而配天者以天於萬物其德不可形容故人君之有大功德被生靈而施後世者謂足以配之而已今僖祖之德不昭見於生民不眀被於後世乃欲以齊后稷之廟當始祖之禮臣恐僖祖之神非所居而不受上帝之靈非所配而不饗非陛下所以尊祖事天之意也陛下為太祖子孫繼太祖基業據南靣之尊而饗四海九州之奉者皆太祖皇帝之所授也則今日之所尊事宜莫加於太祖矣或曰禮别子為祖契稷皆帝嚳之子而得姓者故商周以為祖而奉之今宋自僖祖為始祖臣曰是又不然也若以得姓者為祖則趙之得姓逺矣自造父封於趙城而趙襄始得姓今若必欲推考其先世則遂欲上祖趙襄其可乎其不可眀矣或又曰今朝廷欲存僖祖為始祖爾至於祀天為配亦不輕議也臣曰是不可也今既以僖祖為始祖始祖必配天僖祖配天則太祖之祀替矣此臣所為不可者也或又曰今毁僖祖之廟藏其主夾室而下祔子孫可乎臣曰是不一室夾室在西祧主藏室中而居順祖之右固已順矣蓋非所謂下祔子孫之室而替其尊也必猶以為不可者臣今欲乞特為僖祖立室置祧主其中由太祖而上親盡迭毁之主皆藏之僖祖之室當禘祫之時以僖祖之主權居東嚮之位太祖之主順昭穆之列而從之取其毁廟之主而合食焉則僖祖之尊自有所伸此韓愈所謂祖以孫尊孫以祖屈之義也以僖祖立廟為非則周人别廟姜嫄不可謂非禮今以陛下之時因情立禮取聖人之制為萬世法不亦美歟事與商周有殊禮文從而亦異此臣所謂先王之禮本人情而損益變正之不同者也如曰不然臣恐違古今之義逆天人之情而天地祖宗之神靈有所不饗也伏惟陛下聰眀仁孝以宗廟重事恐其於禮小有乖違故令下兩制臣僚議陛下茍以臣言為可用伏乞裁自聖斷如或猶以為疑乞送禮院參詳臣竊惟宗廟祧配朝廷大禮反覆思慮於心有所未安不敢茍立異說伏望陛下力加納採安石等先呈兩制所議上曰韓維昨言文武之功起於后稷以起為因故推后稷配天安石曰經稱文武之功非稱后稷之功稱尊祖非稱尊有功言起於后稷者謂非文武之功不能有天下則不得行祭天之禮文武非后稷焉出故行祭天之禮則以后稷配天此乃所謂尊祖也上曰維又引王不待大以為亦有待小國而王者安石曰孟子論湯文王不待大國然後有天下前代固有不待有國而王天下者故楊雄以為禹以舜作土上曰鯀治水或有封國亦未可知安石曰若據書傳即封於有夏氏曰有姒者禹也無與鯀事上曰尊祖不計有功無功此理無疑安石曰維言夾室在右自為尊處此尤無理若子孫據正室使父祖在偏廂乃以偏廂為尊處豈不悖理又言遇禘祫即令僖祖東向如此何以遷其主毁其廟况古無所謂遷廟主東向之理又古者言遷王皆升合食今乃降合食古亦無此理上曰此兩事不可眀甚但疑郊配當如何耳安石曰前代郊配亦不一如商則祖契而郊冥與周祖文王而郊后稷不同然以理言之若尊僖祖為始祖即推以配天於理為當先王之制禮事亡如存事死如生推太祖之孝心因欲推宣祖自宣祖以上其心與太祖宜無以異即推僖祖配天必當祖宗神靈之意上曰宗祀眀堂如何安石曰以古言之太祖當宗祀今太祖與太宗共一世若迭配眀堂亦於事體為當上曰今眀堂乃配先帝如何安石曰此乃誤引嚴父之說故以考配天孝經所謂嚴父者以文王為周公之父周公能述父事成父業得四海歡心各以職來助眀堂宗祀得嚴父之道故也若言宗祀則自前代已有此禮上曰周公宗祀乃在成王之世成王以文王為祖則眀堂非以考配眀矣馮京請令禮官議之安石曰禮官皆無定議惟王存與韓維意同維本欲御史諫官集議朝廷既不從乃獨議此初欲别為僖祖立廟元絳等皆笑之故復有西夾室為尊之說上曰韓維意欲求衆為助耳然姑令禮官議之更盡衆說安石乃已又呈孫固議上復疑配天事安石曰萬物本乎天人本乎祖故王者天太祖配天以祖非以有功若以有功即鯀以無功殛死豈得謂之有功然夏后氏郊鯀其非有功可知也上又疑禹因鯀功安石曰鯀障水禹道之是革也非因也上又疑僖祖非始祖安石曰僖祖非始祖誠是也然僖祖與稷禹事既不盡同即郊與不郊裁之聖心無所不可緣於逆順之理無害故也若藏其主夾室下附子孫即逆尊卑之叙不可不改上以為然乃不從固議令禮官并郊配别議之安石又言固謂姜嫄别廟亦欲為僖祖立别廟此與韓維意同自古無為祖立别廟之禮姜嫄所以有别廟者蓋嫄禖神也以先妣故盛其禮歌舞皆序於先祖之上不然則周不立嚳廟而立嫄廟何也遂詔以維等二狀及固議下太常禮院同郊配一處詳定以聞判太常寺兼禮儀事宋敏求言治平四年先帝祔廟祧遷僖祖時臣實為禮官撰定祧遷文字既有前議不敢異同今兹難以預聞詔免敏求詳議同判太常寺兼禮儀事張師顔同知禮院張公裕梁燾等議曰伏以天下大禮莫重於宗廟崇孝事神以臨昭四海是以聖王重之必務極其至當伏惟僖祖神主祧藏夾室於禮不順有司失之矣宜其輔臣建立眀詔訪逮而垂為萬世法然議者因其藏主有失遂欲推為始祖臣等敢以此為議昔者商周之興本於契稷考諸前載其指有二曰因其始封也䝉其功德也契有大功始受封國十有餘世世祀不失至湯而有天下修其封國舉天下之大而謂之商者由契以致之也稷有大功始受封國十有餘世世祀不失至武王而有天下修其世祀因其封國舉天下之大而謂之周者由稷以致之也稷契為商周之祖其禮素定後世固無得而易之矣奉以為太祖以主廟祀有以盡一時之宜也詩之長發言商家興廢之久歷夏之世其來長逺昊天有成命言后稷已有王命生民思文皆歌后稷之功傳稱禹稷躬稼而有天下不可謂為祖不因功德也後世受命之君功業特起不因先代則親廟迭毁身自為祖鄭康成云夏五廟無太祖自禹與二昭二穆而已唐張薦云夏后以禹始封遂為不遷之祖是也若始封世近上有親廟則擬祖上遷而太祖不毁魏祖武帝則處士迭毁晉祖宣帝則征西迭毁唐祖景帝則𢎞農迭毁此前世祖其始封之君以法契稷之眀例也既已法契稷矣則上之親廟不得不毁勢當然也借使魏晉欲不祖武宣而越取處士征西不惟上推世數未知更當及於何人且其如始封何唐有天下因以為法韓愈有言事異商周禮從而變臣等取之矣要之始封世近則親廟不可不立若特以親廟及逺便為始封而抑之則前古未嘗聞也晉琅琊王德文曰七廟之義自由德厚流光饗祀及逺非是為太祖申尊祖之祀其說是也禮天子七廟而太祖之逺近不可以必故但云三昭三穆與太祖之廟而七未嘗言親廟之首必為始祖也國家治平四年以僖祖親盡而祧之奉景祐詔書以太祖皇帝為帝者之祖是合于禮矣而議者曰商周之祖自以别子之故非以有功與封國為輕重不然也别子之法自謂公子不繼世故子孫為大夫士者祖之百世不遷非天子諸侯之禮也使湯武但為諸侯則尚不祖此别子况天下之君而可用大夫之法乎若夫禹不先鯀則所謂子雖齊聖不先父食自以正文公之逆祀非尊祖之論也唐仲子陵所謂安知非夏后廟數未足之時而言禹不先鯀邪伏惟宋之為宋由太祖皇帝應天受命首創洪業建大號于天下異乎商周之為商周可知也僖祖雖為聖裔之先而有廟直由太祖親盡則遷古之正義今欲以有廟之始為說扳而進之以為始祖臣等固疑其與契稷異矣使契稷本無功德初不受封引以為據庶其或可若其不然臣等不得判然無疑也設欲必據此論則臣等又有可言者焉蓋三昭三穆是不刋之典一定之論國初張昭任徹之徒不能逺推隆極之制因緣近比請建四廟遂使天子之禮下同諸侯若使廟數偹六則更當上推兩世而僖祖次在第三亦未可謂之始祖也若謂世次不可推則斯言也詔㫖所不著史臣所不録歷百餘年莫知當時之實不敢以私意逆推而言也謹按建隆四年親郊崇配不及僖祖開國以來大祭虛其東向斯乃祖宗已行之意也自祖宗以來不以太祖之位易之今而易之恐失祖宗之意矣巍巍太祖如神如天垂祚萬世無以云報奉之以為帝始祖於禮無不宜者或謂儀禮諸侯及其太祖天子及其始祖之所自出今謂始祖為太祖乃諸侯制也臣等以為逺祖受封子孫世襲親雖盡而廟不毁是謂諸侯及其太祖也若始封之君既以為其國之祖矣後世子孫自諸侯而為天子則始祖不易理勢自然是謂天子及其始祖也若必求太微之精神靈之威謂為始祖之所自出將見遷就生說竒譎無己彌失聖人之意矣唐神龍初議云既立七廟須崇始祖而張齊賢云始祖即太祖太祖之外更無始祖此前儒講之熟矣大抵契稷不以功德為祖無必然之論特起之君自為一代之祖無不可之理若乃藏主未順宜必改定蓋夾室者子孫廟之偏室非廟之正也議者謂神道尚右失其㫖矣然則僖祖之主必有所歸按周禮守祧掌守先公先王之廟祧其廟則有司修除之其祧則守祧黝堊之所謂廟者后稷文武諸廟也祧者所藏先公先王之遷主也先公遷主藏于后稷之廟僖祖猶周之先公也宜有藏主之祧雖無始封逺祖上為之主而先公之祧不可以闕臣等參詳乞略倣此制築别廟以藏之大祭之嵗祀于其室太廟則一依舊制虛東向之位郊配之禮仍舊無改事之宜而情之順也魏晉及唐嘗議逺廟之主矣魏鍾繇髙堂隆衛臻皆當世名儒並云據上當遷故景初之制三祖不毁其餘四廟親盡則遷一如后稷文武廟祧之禮晉永和中尚書議云周人之王太祖世逺故遷有所歸今晉廟宣帝為王而四祖居之是屈祖從孫也祫祭在上是代太祖也范宣謂可别築一室以居四主四主迭遷則宣帝位正矣自虞喜劉詡韋泓王松之蔡謨之徒並同其議唐陳京議請據魏晉舊例改築别廟以藏獻懿栁冕王韶等七十餘人亦同其說雖卒藏於興聖廟然本無異于别室也惟顔真卿引蔡謨權東向之一句而不本其改築之議獲譏於時此前世之論皆有考據本於經意不敢謂後世之史而一切黜之也記曰禮雖先王未之有可以義起又曰亡於禮者之禮况有前人商確盡理之論乎或曰别廟而登非所謂合食也臣等應之曰夾室非便當為别廟則既正其大節矣合食要皆孝饗之道但以於屬既尊不可置昭穆之列依准前代祭之别廟得禮之變復何嫌哉若云不可分食當合于太廟不惟永虛東向且使下從子孫孰為得失是則僖祖别藏列聖不動神靈安妥情文皆得其於義也合矣恭惟陛下仁孝天成尊事宗廟古之盛王所不逮也臣等學術淺陋討論非長徒能述遵朝廷正失之意别白議者未通之論冀以稱上聖因情制禮之道焉惟陛下幸留神詳擇同知太常禮院蘇梲議曰臣伏聞天下大義莫尚乎尊祖天下大事莫重乎宗廟之祀故有天下者推尊尊之義以及乎上治祖禰下以遺萬世法盛德之舉也王者必及其始祖之所自出所以别於諸侯也今聖朝未有始祖之祀於大典禮猶有所闕故相臣以為言陛下留聽而善之復下訪於羣有司豈非以宗廟為甚重改作為至難極嚴恭寅畏之意欲博問以盡臣下之慮乎而臣末學小知曷足以上當詢謀敢不論次其所聞宣究其所思惟陛下擇焉伏以三代廟數雜見于經其詳不可得而推先儒謂夏后五廟商人六廟周人七廟竊惟先王之道未嘗不同其歸而别作名數不能無小變損益以從時者其於尊嚴祖考稱情立文之意則一也至於立廟或五或六或七者所因之迹有隆殺故制禮以報之不得而同也是以殊時者不相沿樂異世者不相襲禮欲其事與時並名與功偕故也秦漢而下典禮廢缺多不足法而猶有能適變合情足以便於一時而已聖朝追原先帝事祖之意欲盡傳聞之所及止於其所不及而因奉以為始祖又以正神靈之班尊尊之至也臣伏思僖祖與商周之祖雖詒謀隂德無所先後而時有汙隆道有顯晦故其迹亦緣而少異謂宜追崇之禮因小有所損益庶乎稱情立文而為之極以遺萬世不刋之法也若乃七世之廟必欲奉先尊本雖隆於夏商可也若于太廟之右特立僖祖一廟則祖考不附于子孫此所謂有踈而無絶有逺而無遺因情制禮而不踐迹者類於是矣臣維臣固謂夾室在右為尊於正室不思之甚非臣之所敢同也至於郊配之禮在於太祖之世嘗行之矣自太宗至于英宗不復追配而奉宣祖崇配曰有其舉之莫敢廢也而臣詳觀建議之文亦未嘗及追配之說如臣之愚謂仍舊便臣再詳祖廟之制設若聖朝不欲于太廟興作而務崇尚簡質追迹古始而參用近代之法庶乎易行則有唐貞元以懿獻二祖之主祔于興聖德眀之廟蓋尊咎陶武昭以為逺祖之廟故升懿獻於尊卑為順也臣又伏見外傳曰成天地之大功者子孫未嘗不章虞夏商周是也史記載趙氏之祖出於柏翳佐大禹平治水土事虞訓育上下鳥獸皆有功其後造父事周穆王為御以救中國之亂而受趙城之封子孫因以為氏今景靈聖祖每嵗陛下躬行酌獻之禮亦近興聖德眀之類歟若升祔僖主或因以祀柏翳造父如唐德眀興聖之比則不為下祔於子孫雖不合經而免於瀆祖亦因時制禮之道也伏緣宗廟重事非小臣所能詳究敢乞聖聰垂聽咨訪大臣而謹用之若猶以為未安則臣又聞古者有疑必謀及卿士龜筮庶人所以盡人神之意也卿士者謀于人者也龜筮者謀于神眀者也今朝廷未有龜筮之官宜若可舉而行而又自咸平至有唐歷朝有宗廟疑議必下尚書省集臺省諸司百官㑹議而後朝廷斷而從之乞此二者付有司檢詳施行臣陋儒淺學智慮止于其所聞見至于通變達節乃聖哲之任非愚臣之所及也惟陛下裁之又言唐㑹要開元十年明皇特立九廟獻祖復列于正室以偹禘祫猶虛太祖之位則是以始祧而藏於西夾為非便故復立廟正與僖祖事體相類也同判太常寺兼禮儀事周孟陽同知太常禮院宋充國禮院檢詳文字楊傑議曰竊以宗廟重事前代闕疑不質諸經難以折𠂻今檢按儀禮周禮禮記毛詩經傳具如後按儀禮曰都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其太祖天子及其始祖之所自出注云太祖始封之君始祖者感神靈而生若契稷也疏云及始祖所由出謂祭感生帝還以始祖配之王者之先祖皆感太微五帝之精以生則不止后稷與契而已其實帝王皆有所感而生也天子始祖諸侯太祖並於親廟外祭之臣等看詳古制王者宗廟有始祖太祖之别諸侯則止於太祖無始祖也又按毛詩大雅生民之序曰生民尊祖也后稷生于姜嫄文武之功起於后稷箋云周之始祖其生之者是姜嫄也正義云周始祖后稷也周以后稷為始祖文王為太祖雍禘太祖為文王也后稷之所經緯是也若文王以受命之大惟得稱太祖不得言始祖也又按周頌雍之序曰雍禘太祖也注云太祖謂文王正義云祭法禘嚳而郊稷禘謂祭天圜丘也大傳曰王者禘其祖之所自出禘謂祭感生之帝于南郊也知太祖謂文王者以經文假哉皇考又言文武維后是此皇考為天下之人后眀非后稷若是后稷則身非天子不得言維后也又其言曰既右烈考亦右文母注烈考武王也文母太姒也臣等看詳周以后稷為始祖文王為太祖與儀禮之文相為表裏又按禮記大傳不王不禘王者禘其祖之所自出以其祖配之注凡大祭曰禘大祭其先祖所由生謂郊祀天也王者之先祖皆感太微五帝之精以生皆用嵗之正月郊祭之蓋特尊焉孝經曰郊祀后稷以配天配靈威仰也宗祀文王於眀堂以配上帝泛配五帝也正義云此禘謂郊祭天也然郊天之祭惟王者得行故云不王不禘也臣等看詳王者始祖當配祀感生帝故周郊祀后稷配靈威仰也又按祭法曰夏后氏禘黃帝而郊鯀祖髙陽而宗禹商人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王注云禘郊祖宗謂宗祀以配食也此禘謂祭昊天于圜丘也祭上帝於南郊曰郊正義云必知此是圜丘者以禘文在于郊祭之前郊前之祭惟圜丘爾臣等看詳夏禘黃帝商禘嚳蓋圜丘之禘也是冬至圜丘惟身饗天下者得以配焉又按周禮大司樂冬日至于地上之圜丘奏之若樂六變則天神皆降可得而禮矣注周人禘嚳而郊稷謂此祭天圜丘以嚳配也疏云王者皆以建寅之月郊所感生帝還以感生祖配之若周郊以后稷配之也郊與圜丘俱是祭天之禘郊之禘以后稷配圜丘之禘以嚳配臣等看詳周圜丘以嚳配祀感生帝以后稷配與禮毛詩經傳相為表裏又按守祧掌守先王先公之廟祧注云遷主所藏曰祧先公之遷主藏于后稷之廟先王之遷主藏于文武之廟疏太王王季之主不可入文武祧亦當藏於后稷廟也臣等看詳先公遷主藏于后稷之廟先王遷主藏于文武之廟是祖考遷主不可下藏於子孫夾室臣等參詳諸經傳古者天子必尊始祖配祀感生蓋以追崇統系本始非謂推有功也諸侯則不然但推始封之君以為太祖而不及始祖也是以周有天下上推統系至于后稷后稷者帝嚳之子周不可以祖帝嚳故以后稷為始祖商推統系上至于契契亦帝嚳之子商不可以祖帝嚳故以契為始祖夏推統系禹之父曰鯀鯀者髙陽之子夏不可以祖髙陽故以鯀為始祖示與諸侯之制異也至秦并六國嬴政自號始皇帝漢襲秦故以髙皇帝為太祖之廟不復如禮經追崇始祖蓋一用諸侯之制爾魏晉而下傳繼勿永接以衰亂禮文殘缺爰及有唐雖世數綿久而宗祧制度多不稽古本朝藝祖平定區夏追立親廟玉牒帝系自僖祖始僖祖而上世次既不可得而知則僖祖之為始祖宜矣伏請依儀禮周禮禮記毛詩經傳以僖祖為始祖配祀感生帝其舊制以宣祖配侑今請停其禮自餘祀饗天地眀堂祖宗配侑並如舊制别無更易人情禮意莫不為順臣等謹按商以太甲太戊武丁為三宗周以文王武王為二祧世世不遷非三昭三穆之數兼覩景祐制書曰太祖為帝者之祖太宗真宗為帝者之宗三廟並萬世不遷宣布天下以示後世則順翼宣三祖皆在昭穆之內同判太常寺兼禮儀事章衡議曰臣竊以宗廟重事禮經不完學者所執異同論議難一非上聖莫能眀斷非大儒莫能考正伏惟皇帝陛下天錫睿智孝通神眀力救時弊鼎新朝政而廟祧之序遷毁未安覽輔臣之奏矍然發德音延訪近侍又屬諸禮官詳審採擇務從其當臣雖學不到古而職在參論今請先舉衆說之失然後博考于經折中其議一曰僖祖皇帝在七世之外禮當祧遷臣以為不可謹按儀禮曰諸侯及其太祖天子及其始祖之所自出說者謂太祖始封之君始祖感神靈而生若稷契也故商周之王斷自稷契以下者本統相承重始也我太祖受命之初立親廟自僖祖始僖祖以上世次不可得而知則僖祖之為始祖與稷契無以異其可毁其廟而遷其主乎二曰契勤商十有四世后稷勤周十有五世而興以其功之所因故推以配天焉今僖祖之烈不昭見于生民不眀被于後世而欲以所事稷契而奉之於古無考臣以為王者尊本統之祖德厚者流光故上推所始非必有功與封國也不然夏后氏可以郊鯀乎三曰神道尚右夾室在西僖祖主祧藏于其中猶處順祖之右尊卑之次似亦無嫌臣以為不可夫替其祖考之尊下祔於子孫之室而曰以右為尚何以異堂皇正位卑者都之而列尊屬於榮廡之間其可謂之禮乎四曰僖祖為始祖宜立别廟臣又為不可夫别廟之制經典無文周之姜嫄則今之后廟是也豈可以始祖之尊而與后妃為比乎五曰昔者魯立煬宫春秋非之以其已毁既藏而遂其失乎章衡等議並據王圭㑹要五曰下當有脫文政和㑹要載羣議甚略當求别本考正五者之說皆為非是臣聞儀禮疏義曰王者之先皆感太微五帝之精以生不止契稷而已詩序生民尊祖也說者謂周以后稷為始祖文王為太祖故雍禘太祖謂文王也自古有天下者必尊始祖秦漢而降典章殘缺廟祧遷次始失先王所以尊祖之意今陛下纂承大統參事宗祏宜正有司之失以合先王之禮伏請尊僖祖皇帝為始祖而順祖神主在次當遷此所謂子為父屈以定七廟之制其于郊配則禮記大𫝊曰王者禘其祖之所自出以其祖配之與儀禮周禮疏義皆同說者謂祭感生帝則配以始祖伏請自今以僖祖配饗感生帝之祀而罷宣祖侑神之位此所謂祖以孫尊孫以祖屈以稱祖宗追孝之心自餘祀饗天地眀堂祖宗配侑並如舊典于情文為順臣之愚陋據經納說伏乞斷自天心詒法萬世上既閲禮官議狀謂執政曰士大夫好以禮文為己任故但議宗廟事即務為紛紛馮京曰士大夫皆以太祖不得東向為恨安石曰野人曰父母何算焉都邑之士則知尊禰矣學士大夫則知尊祖矣詩人稱奉璋峩峩髦士攸宜蓋奉宗廟供祭祀當擇學士大夫之髦俊者與之從事豈可以合野人為當上乃從元絳等初議絳等初議安石所主也上又曰初不令議配天諸議者何故及此安石具以白上且言本朝配天之禮亦皆不合經禮但此事未害逆順大倫欲釐正之有所未暇耳上曰今兹當從誰議安石曰宣祖見配感生帝欲改以僖祖配上曰善安石本議以僖祖配天上頗難之故更以配感生帝以僖祖配感生帝以章衡及周孟陽宋充國楊傑所議亦與安石合故也安石又白上此事當中書具奏降詔施行上皆從之眀年正月七日乃遷二祖及以僖祖配感生帝禮志第二卷上治平四年禮院言嘉祐詔書定太廟七世八室之制今先帝祔廟有日僖祖當祧請并文懿皇后神主祧藏於西夾室以待禘祫祔英宗神主第八室自仁宗至順祖以次升遷事下兩制議如所言九月壬午奉安八室帝后神主奏告太廟祧藏僖祖文懿皇后神主西夾室癸未遍告天地社稷宗廟宫觀甲申上齊于垂拱殿乙酉祔英宗太廟上步導神主出至宣德門羣臣奉慰如典禮罷僖祖諱及文懿皇后忌日然上疑非禮乃與安石議至熙寧五年八月中書門下言萬物本乎天人本乎祖故先王廟祀之制有疏而無絶有逺而無遺商周之王斷自契稷自稷以下者非絶嚳以上而遺之以其自有本統承之故也若夫尊卑之位先後之序則子孫雖齊聖有功不得以加其祖考天下萬世之通道也本朝自僖祖以上世次不可得而知則僖祖有廟與契稷疑無以異今毁其廟而藏其主夾室替祖考之尊而下祔于子孫殆非所以順祖宗孝心事亡如存之義求之前載雖或有然考合于經乃無成憲因情制禮實在聖時願陛下下近臣詳議擇取其當詔答曰廟祧之序蓋有典彜所以上承先王下法後世朕嗣宅大統獲奉宗祀而世次遷毁禮或未安討論經常屬我哲輔于以佐朕不逮而仰稱祖宗追孝之心覽之矍然敢不祗服宜依所請翰林學士元絳知制誥王益柔陳澤曽布直舍人院許將張琥言自古受命之王既以功德享有天下皆推其本統故也使契稷自有本統承其後而湯與文王又為别子之後則自當祖其别子不復以契稷為祖矣所以祖契稷者非以有功與封國為重輕也諸儒適見契稷有功于唐虞之際故以謂祖有功若祖必有功則夏后氏何以郊鯀乎今太祖受命之初立親廟自僖祖始其上世次既不可得而知則為始祖無疑倘以謂不當比契稷是使天下之人不復知尊祖而子孫得以有功加其祖考也况于毁其廟遷其主而下祔于子孫之室此豈所以稱祖宗尊祖之意哉𫝊曰毁廟之主陳于太祖未毁廟之主皆升合祭于太祖今遷僖祖之主而藏于太祖之室則是僖祖順祖翼祖宣祖于祫祭之時皆降而合食也情文不順無甚于此詩序生民曰尊祖也文武之功起于后稷故推以配天焉蓋言尊祖而不言尊有功言文武之功而不言后稷之功則知推后稷以配天者以尊祖而非以尊有功也考之經傳質之人情謂宜以僖祖為始祖之廟學士韓維言昔先王既有天下迹基業之所由起奉以為太祖所以推功美重大始也蓋王者之祖有繫天下諸侯之祖有繫一國大夫士之祖繫其宗而止亦其理勢然也荀卿曰王者天太祖諸侯不敢壞大夫士有常宗所以别貴始德之本也蓋有天下之始若后稷有一國之始若周公大夫士之始若三桓所以貴者配天也不祧也有常宗也此所以别也今直以契稷為本統之祖則是下同大夫之禮非荀卿之所謂别也或曰湯文武去契稷皆十有餘世其間子孫衰微奔竄者非一湯文武之有天下契稷何與哉南宫適曰禹稷躬稼而有天下孔子曰君子哉若人禹之有天下則然矣稷諸侯也而曰有天下何哉豈非纍功德至文武王而興乎孟子曰王不待大湯以七十里文王以百里然則小國亦王之所待也所謂七十里百里者非契稷所受以遺其子孫之國乎由是言之商周之所以興契稷不為無所與也則正考父作頌追道契湯髙宗商所以興子夏序詩稱文武之功起于后稷豈虛語也哉國語亦曰契勤商十有四世而興后稷勤周十有五世而興穀梁曰始封必為祖南宫適孟軻卜子夏左丘眀穀梁赤生于周代其所言皆親聞而見之者其學問又俱出于孔子宜若可信則尊始祖以其功之所起秦漢諸儒亦有所受之也後世有天下者皆特起無所因故遂為一代之太祖所從來久矣太祖皇帝孝友仁聖睿智神武兵不血刃坐清大亂子孫遵業萬世䝉澤功德卓然為宋太祖無少議者僖祖雖于太祖髙祖也然仰迹功業未見其有所因上尋世系又不知其所始若以所事契稷奉之于古無考于今亦有所未安也均之論議未有以相奪仍舊為便若夫藏主合食則歷代嘗議之矣然今之廟室與古殊制古者每廟異宫今所以奉祖宗皆在一堂之上西夾室猶處順祖之右考之尊卑之次似亦無嫌至于禘祫自是序昭穆之祭僖祖東向禮無不順所謂子雖齊聖不先父食者也孔子曰于其所不知蓋闕如也如元絳等議非臣所知不敢同也天章閣待制孫固請特為僖祖立室置祧主其中由大祖而上親盡迭毁之主皆藏于所立之室當禘祫時以僖祖權居東向之位大祖順昭穆之列僖祖之尊亦自有所伸也若以立廟為非則周人别廟姜嫄不可謂非禮乃繼下禮院詳定議者不一章衡等同元絳等議張師顔等同孫固議而蘇梲又請以僖祖祔景靈宫於是禮院復言聖王用禮固有因革至于逆順之大倫非敢違天而變古今或以夾室在右謂於宗祏為尊或以本統所承措之别宫為當離經背理所不敢知請奉僖祖神主為太廟始祖遷順祖神主藏之夾室依禮不諱孟夏祀感生帝以僖祖配詔恭依先是帝趣裁定廟議安石曰考之先儒無說三代亦未有此比獨義理當然爾帝問韓維以文武之功起于后稷故推以配天安石曰經稱文武之功非稱后稷之功稱尊祖非稱尊有功蓋非文武之功不能有天下不能有天下則不得行祭天之禮而文武非后稷焉出故行祭天之禮以后稷配天此乃所謂尊祖也帝曰維言王不待大以為亦待小國如何安石曰孟子自以湯文王不待大國然後有天下何預尊祖事乎且夏禹郊鯀禹非因鯀受封然後有天下前代固有不待有國而王天下者禹是也故楊雄以為禹以舜作土帝曰鯀治水或已有封國安石曰傳有之封於有夏氏曰有姒者禹也萬物本乎天人本乎祖王者天太祖若以有功則郊鯀豈得為有功哉維言夾室在右為尊此尤失禮若子孫處正室列父祖于偏廂以為尊處豈不悖理其言至禘祫時僖祖東向如此何以遷其主毁其廟况古無以遷主東向之禮蓋遷主皆升合食今乃是降而合食也如孫固欲為僖祖立别廟以比姜嫄則古無此禮姜嫄禖神也以先妣故盛其禮與歌舞皆序于先祖之上不然則周不為嚳廟而立姜嫄廟者何也帝曰郊配如何安石曰商祖契而郊冥與周祖文王而郊稷前世郊配已不同以理言之尊僖祖為始祖則推以配天于禮為當先王之制禮事亡如事存事死如事生推太祖之孝心固欲推宣祖自宣祖以上其心與大祖無以異則推僖祖配天必當祖宗神靈之意然僖祖非始祖如何安石曰誠如此與稷卨事既不盡同則郊與不郊無害逆順之理裁之聖心無所不可但朝廷配天之禮亦未應禮特以無所害于逆順大倫未遑釐正耳宜改以僖祖配感生帝帝曰士大夫以禮文為己任故議宗廟事務為紛紛馮京曰士大夫皆以太祖不得東向為恨安石曰野人曰父母何算焉都邑之士則知尊禰矣學士大夫則知尊祖矣詩人稱奉璋峩峩髦士攸宜則奉宗廟供祭祀當擇學士大夫之髦俊者與之從事豈可以合野人為當也上以尊祖不計功之有無理無疑者皆嘉納焉户部侍郎致仕范鎮上言伏見英宗皇帝即位議祧遷僖祖陛下即位祧遷僖祖今復還僖祖祧遷順祖則是僖祖長東向而為不遷之主矣太祖皇帝自宋州節度使有天下國號為宋與髙祖起漢中國號漢正同僖祖不當復還竊見國朝大臣定諡皆下太常尚書省集百官參議况宗廟祧遷最為大禮而未更講論竊恐未當祖宗之意伏惟陛下特降聖㫖下太常尚書省集百官定議庶為萬世之傳不從此據范鎮集增入鎮本傳但云太祖起宋州有天下與漢髙祖同僖祖不當復還乞下百官議傳蓋因墓銘也復還僖祖固令兩制議之兩制乞與臺諫禮官共議王安石乞止令兩制議尋下禮官禮官議同安石而鎮所乞又將遍詢百官宜安石之不從也元祐元年二月十日可考己巳西京左藏庫使新涇原路鈐轄和斌帶御器械上批斌數立戰功資歷已深久未擢用故也斌前為廣西鈐轄秦鳯帥亦以鈐轄辟之廣西固請留斌詔以與廣西及是召對上曰議者謂交州可取何如斌謂取之無益願戒邉臣勿妄動上歎曰卿質直如此乃知兩路爭卿有以也庚午詔廣西經略司自今教閲不得追集壯丁委兩江提舉司犒設從和斌請也京西轉運使吳幾復言郢唐均房金五州易得林木而淮南鉛銅積多若由襄郢轉致鉛銅至郢唐等州置監鑄錢可以紓錢重之弊其利且博而中書户房以為鉛銅於法當由水漕今淮南轉致非獨道路迂逺其間必須陸運則其費不償所得上批內庫昨以兩經優賞及頻年應副邉用闕乏若朝廷非次别有支遣必更無可應副茍如幾復言就山林可鼓鑄即且令嵗鑄五十萬緡于內庫封樁既而罷之御集云十一月二十五日下三司依户部所申王安石言幾復謂置監鑄錢開闢山林可得地耕種此言不可用今岑水聚浮浪至十餘萬所收銅已患無本錢可買若京西又置監不惟無本錢可買又餘無用鉛銅兼更誘引耕民奔赴坑冶失本業趨末利人衆既聚即難驅逐使散京西平地尚乏人耕種縱開闢山林豈有人治田但恐山林無人耕種而平地之農更棄而為坑冶即廢京西農事上以為然司農寺丞新提舉兩浙路興修水利郟亶言臣已申司農乞將向日凡言兩浙水利文字付臣看詳或召言者詢問如實利便及其人可任使乞令分頭主管官員依部役官舉人依曹孝立例給請受候興修隨功利大小等第酬奬從之曹孝立當考又見七年十月林希野史云熙寧間凡言水利或理財或更改利害者或胥或商或農或𨽻或以罪廢者使乘驛赴闕或召至中書或赴司農不驗虛實便令興役其糜費官財興調民力不問其數微有效則除官賜金帛無效者費調雖多不問其罪有司知其妄不詰難詰難即直訴司農以為嫉功避事立加按劾如沈披欲築江障湖為田徙福建民耕初信以為然衆謂迂誕駭絶事未行披徙陜西如王廷老俞希旦陳睦膚東張靚皆新進以農田水利為職竟無可成功張若濟知華亭言知水利遂别創一司崑山富人郟亶以蘇田盡如江南築墟岸召赴司農及曹孝立者亦獻水利召赴蘇經畫民懼興大役皇皇不自安又司農賜米七百萬斛俾使者興水利逾年無可興者司農詰責廷老乃議采石增築蘇湖漕河塘科賦諸縣募民發掘山隴取石妨廢農事科賦之家倍出其直受傭之户多獲厚利此塘之作於水利實無損益大抵以費官財勞民力者稱職上下欺蔽無敢言希所云王廷老築蘇湖漕河塘當考年月因曹孝立姓名初見附注此郟亶事具五年十一月癸丑及六年五月乙丑辛未詔自今諸司使副磨勘歷任中嘗以戰功改官者轉七資餘五資其閣門通事舍人帶御器械兩省都知押班勾當御藥院使臣等轉七資條例並除之舊制諸司使副有戰功者磨勘改官率用常制轉五資上謂無以褒勸而閣門兩省職事皆左右近習非勳勞不可超躐故有是命壬申詔乾儀州近已併廢又以熙河等五州軍為一路通舊鄜延等五路共三十四州軍今分永興保安軍河中陜府商解同華耀虢鄜延丹防環慶邠寧州為永興軍等路轉運使於永興軍提㸃刑獄于河中府置司鳯翔府秦階隴鳯城涇原渭熙河洮岷州鎮戎德順通逺軍為秦鳯等路轉運使於秦州提㸃刑獄于鳯翔府置司仍以永興鄜延環慶秦鳯涇原熙河分六路各置經略安撫司㑹要在十二月丁亥今不取是月廢陵州為陵井監以貴平籍縣為鎮𨽻成都府
