body:
  text: 續資治通鑑長編卷二百十四宋李燾撰神宗熙寧三年八月戊午朔宣徽南院使靜難軍留後判延州郭逵加檢校太尉雄武軍留後令再任先是夏人以親軍夾河壯騎侵順安綏平黑水等寨諸將請擊之逵曰賊逺來利在速戰其鋒未可當令毋得輕出諜告曰賊糧欲盡矣逵稍出兵應之已而綏德城告急曰賊益兵大至定仙山煙火皆滿逵曰賊師其遁諸將皆疑逵曰鷙鳥之擊必匿其形兵果來豈示人以衆此張虛聲惟庸將乃疑耳終不大出兵賊侵漢地築城鄣暴掠尤甚逵曰可矣乃使李安李顒出綏德彭達出順安燕達出綏平賈翊出安塞􅊾宥州及使人諭賊曰夏國違誓詔侵城漢地其罪甚大若能悔過悉聽汝還或不從誅無噍類既而賊棄順安走縱之拒官軍者諸將合攻之斬首數百餘皆棄城遁去八月十四日辛未郭逵事當參考案郭逵傳敘次與此小異於是上與執政議欲令逵再任王安石曰但當移鎮曽公亮曰移鎮必不樂不如且已上曰蔡挺已嘗轉官逵如何且已公亮言程戡例安石曰節度使豈可輕授人知陛下吝惜名器逵亦必絶望程戡例固難用於今日上曰節度使誠可惜既又與樞密院議之文彥博議與曾公亮同彥博曰唐時藩鎮從尚書轉尚書云軍中但聞尚書轉僕射武臣與文臣不同文臣不計官職但知報國武臣不免計較官職安石曰唐時藩鎮與今日事勢不同太祖使將帥平江南尚只賜錢今逵何功便敢望節鉞彥博曰太祖時事與今日又不同上曰郭逵不至如此若果如此尤當節限不可妄與官職唐藩鎮與今日事勢不同令移鎮再任厚加錫賜可也兵部員外郎直昭文館傅堯俞權發遣鹽鐡副使先是三司副使闕執政擬用堯俞上曰堯俞茍且比上殿乃言諸路轉運使太急州縣不得自如宜稍令寬曾公亮曰比多舉此人作言事官者王安石曰堯俞正是合流俗養譽之人不可令作言事官但今資序可為省副者更無人所以姑用之公亮謂堯俞當正除安石欲令權僉以為當正除是日韓縝超除待制安石因不果爭退乃密啓上謂堯俞但當權發遣亦不當權上從安石奏令權發遣公亮固爭上乃令權既而批付中書曰昨嘗諭卿等以堯俞性緩趨向因循宜别擇人後以中外難得人材遂不克改今再詳堯俞資序甚淺先朝自知諫院擢為御史知雜實不曾受命尋出補外官丁憂服除到闕未久今兹超越倫輩擢置要職恐無以鼓動務切實之流而因循者得以僥幸今既命之慮難以奪可止權發遣安石惡堯俞不附已故專以資序抑之時敇已付閣門復亟改命權慶州東路巡檢內殿承制姚兕遷四官北路都巡檢供備庫副使林廣柔逺寨蕃部巡檢內殿崇班趙餘慶各遷三官環慶路都監文思副使安成慶州大順城界藩部巡檢內殿崇班趙餘德各遷兩官餘各遷一官兕等以西賊入寇進戰有功故賞之兕五原人廣萊州人也舊紀於戊午日書夏人寇慶州巡檢姚兕等敗之新紀書是月慶州巡檢姚兕敗夏人於荔原堡鈐轄郭慶都監髙敏死之慶敏事在是月草四日辛巳先是環慶鈐轄李信與賊戰荔原堡北不利廣將兵深入破十二盤等四寨喀托克印州堡攻白豹金湯城皆先登夜過洛河有賊來襲廣揚聲令軍中選弩數百列岸側待賊實卷甲疾行賊聞疑不敢度廣以兵護走馬承受中使行邊至懷安鎮還將及烏雞川遽率衆由間道蔽山而行道遇屬羌以路險遠告廣不聽賊果伏兵烏雞川及聞廣已由他道還遂引去而屬羌來告者亦賊諜也賊既不得廣乃益兵攻柔遠初柔遠外城處屬羌賊攻外城急廣夜納其老幼保內城諸將以為屬羌反覆虞有他變廣曰屬羌久為藩翰急時棄之後不為我用賊初圍城廣預戒守者有變不得輕動已而火起積薪中城守寂然賊計不得行翌日賊置馬平川大持攻具來衆洶懼廣被甲引兵開他門示將出奪其馬賊去城救馬廣復入遂得益修守備因募屬羌敢死者夜出潛攻賊營賊數不利引去王安石日録七月二十一日與密院進呈慶州得首級官員上差定其賞甚精悉又言林廣先設計謀故優與遷轉御集三年八月五日下環慶經略司奏林廣先設計謀會合兵馬殺退西賊畫到圖子一面書貼逐人與賊鬬敵去處以聞上批見勘李信等可趣令結案昨得功將官安成并將校不知推恩指揮曽與未曽降下按實録廣遷三官安成遷兩官在八月二日矣御批蓋問此也廣先設計謀不知何等據廣本傳附見更須考詳四年六月十一日宣司言賊圍柔遠寨廣與李克忠開城納蕃兵併力攻守廣賜銀三百兩上批涇原等路諜報西賊結集舉國人馬七十以下十五以上取八月半入寇綏州及分兵犯甘谷城已差韓縝為本路經略使可免謝辭令上殿訖速赴本任王安石嘗言陜西諸帥稍探得西人欲作過即勾下畨兵馬宜約束勿使然慶厯中西事所陷沒不過十萬人計天下一歲飢饉疾疫所死何翅十萬人於天下未覺有損也天下以西事故大困窮者緣妄費糧餉耳此最方今所當戒於是安石奏曰西人豈無鄰敵如何七十以下十五以上盡來而不憂鄰敵窺奪其國若果耳則是西人無謀亦不足畏苻堅舉國南伐故為東晉所敗東晉非能敗苻堅以苻堅驅率舉國之人既不樂行則自潰而敗故也以臣料之此或是西人張虛聲使我邊帥聚兵費糧草糧草費則陜西困陜西困則無以待西賊而使我受其實弊也上又論及西事以為城寨或為西人大兵所破則不便所以邊臣不免聚兵安石曰未有事聚兵坐困糧食則有事無以待敵且陜西所以困者以輕費糧草故也今不聚兵則省糧草假令西賊以大兵犯城寨我堅壁以待之彼悉力攻小城寨小城寨被破於彼未為得利而於我苟能大省糧草則猶不為失計而况城寨又未必破壞乎兵法以為愛民可煩精潔可辱今惜破小城寨則是可辱也惜一小城寨而常聚兵費糧草坐困陜西則是可煩也上説此假乃七月十五日所録朱本并附此今從之上又言今兵無紀律有紀律則足以勝敵矣安石曰紀律所以自治算數所以勝敵故兵法曰多算勝少算不勝况於無算乎今非但無紀律尤患無算數於是上稱鄜延走馬歐育曉事言欲西人和則不須先自屈比者作過即先於問西人牒中説必是緣邊首領所為如此語當待西人自言安石曰誠當如此然今朝廷事未能初終皆舉若稍示西人以強而西人未肯退聽則朝廷何以待之若交兵則今日勢所未能若不交兵則如何可已先示強而後更摧屈則尤為非便度時事之宜故姑務柔之柔之未為失計也上論攻守之計衆以為兵須委將帥難從中制安石曰兵雖不可中御然邊事大計亦須朝廷先自定也此假乃七月二十五日所録朱本并附此今從之罷看詳銀臺司文字所熙寧二年八月置今罷之己未京西同巡轄斗門太常博士侯叔獻著作佐郎楊汲並權都水監丞專提舉沿汴淤溉民田先是或言祥符中牟之民以淤田故大被水患上問王安石安石謂初不聞此上乃遣內侍往視還言民甚便淤田而水患蓋無有且言汲等皆盡力上復以語安石安石曰今歲功緒未就都水不協心故也且言來歲興作之方因命汲等並兼都水此據司馬日記并王安石日録增修二年閏十一月戊申十二月乙酉三年正月辛亥丙辰可參照又四年五月乙未河渠志第三卷三年三月上謂王安石韓絳曰淤田不叶力者卿知其故乎安石曰不知上曰都水所以沮壞者以侵其職事爾安石曰若都水無意沮事則固不當侵其職也必欲任屬當以楊汲為都水監然汲未經試用陛下能使臺諫無議論否上曰用新法權理資序有何不可汲豈不愈於王荀龍安石曰若用汲使為之屬亦不能獨濟蓋每事稟於沈立張鞏汲何能辦集别為一司則畏其沮壞七月上曰有言淤田侵民田稼屋宇甚多安石曰不聞有此有即宜聞之上乃令馮宗道往視明日上稱宗道所奏以為説者妄也八月以侯叔獻楊汲並權都水監丞提舉沿汴淤田閲環州弓箭手都虞候胡士元等騎射補士元三班借職以次補殿侍者九人庚申分命輔臣祈雨增置司農寺丞一員與主簿通為二員從同判寺吕惠卿請也尋詔寺丞月添支錢十五千主簿京朝官十二千選人十千無廨舍者月給宅錢五千添支并給宅錢在八月癸未今并附此上批陜西秋旱又緣邊見屯軍糧草宜早為計遂詔陜西轉運司具四路見在糧草及約所支月日數目聞奏辛酉光祿卿苖振責授復州團練副使前明州司理參軍辛肅特勒停國子博士裴士堯依衝替人例振坐前知明州不法及故入士堯罪而肅以阿隨故也初士堯知奉化縣振所為不法事下縣士堯皆格不行振怒械繫士堯於獄且文致其贓罪案上士堯勒停經恩未得敘用已而士堯擊登聞鼓自訴至是重罪皆得雪獨有帶沽耗酒私罪徒一年貸所監臨坐贓論笞二十會赦故有是命於是嘗簽書士堯獄事者雖去官皆罰銅二十斤通判丁諲降遠小處差遣又明州胥吏十人挾振恣橫號十大卿者內七人特編管初上欲止降丁諲曰通判與知州體敵不能救正所以當深責王安石曰方今官小者大抵莫肯任責以救正其長若示不足責則愈不知懼乃并罰之壬戌上批付樞密院鄜延路奏昨攻討綏州側近西賊堡寨有功將校可早處分今戎事未息邊吏賞罰宜速仍關中書當給敇告者限當日給之癸亥著作佐郎同管勾淮南常平事林旦為太子中允權監察御史裏行旦希弟也旦與范育並命育已見七月二十五日屯田郎中權淮南轉運副使孫圭太常博士集賢校理權開封府判官劉瑾兩易其任初圭受命奏事上不以為然故用瑾孫圭所奏何為當考疑遣劉瑾乃王安石先為李定地也當考屯田員外郎提舉河北常平等事王廣亷兼權發遣本路同提點刑獄詔直舍人院吕大防監司天監官詳定今年八月進行朔望有無差謬先是崇天厯以八月戊午為朔而望在十七日司天中官正周琮撰明天厯則以已未為朔而望在十六日琮言古今注厯望未有在十七日者崇天厯官舒易簡等言乾興元年厯七月注十三日望則今注十七日望不為非朝廷從易簡等説而琮爭不已故命大防詳定既而大防言易簡等所指乾興厯注十三日望乃私厯之誤已自屈伏然據諸家厯議雖有十七日為望之法但頒厯即無注十七日為望者自天聖三年後三望在十七日皆注十六日為望盡十七日晨度已前定望猶屬十六日夜故也今年八月朔於崇天厯本經不當進但於十六日注望可矣詔如大防議詔江淮發運湖北運司體量殿中丞直史館蘇軾居喪服除往復賈販及令天章閣待制李師中供析照驗見軾妄冒差借兵卒事實以聞侍御史知雜事謝景溫劾奏故也景溫與王安石連姻安石實使之窮治卒無所得軾不敢自明久之乞補外上批出與知州差遣中書不可擬令通判潁州上又批出改通判杭州軾通判杭州不得其時墓志云知雜御史誣奏公過失公未嘗以一言自辨乞外任避之通判杭州然軾自此留京師幾一歲明年夏末秋初乃出都由陳州赴杭州按軾有與其弟書云六月除杭州倅乃明年事今因謝景溫劾奏遂附見景溫劾軾已附注三月丁酉軾例當作州亦見彼注案軾本傳云王安石惡其議論異已遂以判官告院當即此事也甲子大理寺丞董京為內殿崇班韓琦言京嘗為南官縣令捕賊有功至是因磨勘特換右職手詔今日开贇引呈所教排手觀其進退輕便不畏矢石誠為利器可令殿前馬軍司於出軍諸軍步人指揮內擇槍手伉健者百人依贇法教閲藝精與免本指揮差役仍留廣捷排手二人為教頭此假或可削乙丑司馬光對垂拱殿乞知許州或西京留司御史臺國子監上曰卿何得出外朕欲申卿前命卿且受之光曰臣舊職且不能供况當進用上曰何故光曰臣必不敢留上沉吟久之曰王安石素與卿善何自疑光曰臣素與安石善但自其執政違忤甚多今忤安石者如蘇軾輩皆毁其素履中以危法臣不敢避削黜但欲茍全素履臣善安石豈如吕公著安石初舉公著云何毁之云何彼一人之身何前是而後非必有不信者矣上曰安石與公著如膠漆及其有罪不敢隱乃安石之至公也上又曰青苖已有顯效光曰兹事天下知其非獨安石之黨以為是爾上又曰蘇軾非佳士卿誤知之鮮于侁在遠軾以奏藁傳之韓琦贈銀三百兩而不受乃販鹽及蘇木瓷器光曰凡責人當察其情軾販鬻之利豈能及所贈之銀乎安石素惡軾陛下豈不知以姻家謝景溫為鷹犬使攻之臣豈能自保不可不去也且軾雖不佳豈不賢於李定不服母喪禽獸之不如安石喜之乃欲用為臺官鮮于侁者閬中人嘗為蔡河撥發熙寧初應詔言十六事皆人君謹始者上愛其文出示御史中丞滕甫曰此文不減王陶丙寅以久旱御崇政殿踈決繫囚雜犯死罪以下第降一等杖笞釋之詔聞長安同華等州秋旱特甚已有流民往京西路就食其令陜西京西轉運司速體量賑恤仍出常平倉粟減價以利貧民於是王安石進曰歲飢則移民就穀今令關西人入京西就穀乃甚利也大理寺言浯州羈縻州巡檢供奉官苖承祐不覺獠賊入界劫略漢民會德音當罰銅六斤上批職為捕盜致賊肆行劫略不即擒捕又奉朝旨猶敢怠慢不出討賊可特勒停庚午召輔臣觀穀于後苑龍圖閣直學士工部郎中張掞為戶部侍郎致仕御史知雜事謝景溫劾掞年老不退因以警曽公亮云上批聞衛州極旱其令轉運司賑恤仍蠲租稅辛未兩浙轉運使太常少卿賈昌衡同提點刑獄南作坊使李惟寶前轉運使光祿卿侯瑾並降一官昌衡仍降副使餘各降一等差遣坐不按劾祖無擇苖振又考振課績入中等故也先是四月夏人遣兵二萬侵綏德城築八堡近者四里郭逵曰彼氣方鋭不可與戰又不可止但聽使為之俟其去而平之賊既成堡各留三二百人戌之五月逵遣其將燕逵等攻其二大堡一日克之餘堡人皆逃去敵築八堡當考八月戊午朔所書時賊又築堡於慶州荔原堡北曰納斡在境外二十餘里及聞延州堡敗亦止不築申牙頭求罷而兵留境上蕃部巡檢李宗諒地近敵堡害其佃作乃帥衆千餘人與賊戰于納斡李復圭使鈐轄李信等助之信按兵堡中不出宗諒戰不利還趨堡信閉門執劒拒之曰經略命敢入堡者斬宗諒還戰皆沒復圭責信等觀望信等懼丁未引兵三千往十二盤擊賊十二盤亦在境外非漢地也信等先射賊敵曰我與宗諒有仇不與汝宋兵戰信曰宗諒亦我熟戶也復射之敵曰汝直欲戰也乃縱兩翼圍之且令曰殺兵勿殺將又開圍一角使信等得逃去朝廷聞之命復圭酬賽復圭使其將梁從吉等别破金湯白豹蘭浪萌門和市等寨賜復圭詔奬諭七月壬寅復圭又使其將李克忠襲金湯賊伏兵衝之斷而為二克忠東出延州以餘衆還是月壬申賊遂舉國入寇李復圭附傳云憂人十萬築壘于其境不犯漢地復圭徼幸邊功遣鈐轄李信等三千人自荔原堡夜出襲擊不利歸罪斬信等人以為寃别破金湯白豹蘭浪萌門和市秉常舉國入冦屯榆林去城四十里九日而退知雜御史謝景溫劾復圭擅興致寇責授保靜軍節度副使此元祐本也又云夏人以兵十萬距境上築壘而復圭遣鈐轄李信等三千人自荔原堡約時襲擊信等逗遛違師期取敗朝廷即慶州置獄劾信斬之復遣偏將梁從吉等别破金湯白豹蘭浪萌門和市等寨手詔褒賞未幾秉常舉國入寇圍大順城屯騎抵榆林去州四十里陜右大警積九日賊乃解圍遁去知雜御史謝景溫劾復圭擅興致寇責授保靜軍節度副使此紹聖本也王安石專主復圭故紹聖史官輒改元祐本然元祐本亦自不詳今用司馬光日記刪修范鎮作復圭墓銘亦為復圭緣飾今不取復圭在環慶喜生事時慶州荔原堡納西夏降酋且侵耕其地夏人因此大舉五月丁未趨納斡堡築城衆號十萬又築城於十二盤蕃兵與戰不利復圭遣鈐轄李信監押种詠都巡檢劉甫都監郭貴等以兵三千出戰大敗歸走又遣都巡檢林廣等分兵出境破賊城寨夏人怨怒至八月舉國犯大順城復圭每奏出兵朝廷輒戒以非賊犯邊及築堡侵漢界毋得深入邀利復圭不遵行十二盤所築城在賊境非漢界也此元祐本所書初復圭在環慶喜生事時慶州荔原堡招納西夏降酋且侵耕其地夏人因此大舉五月丁未趨納斡堡築城衆號十萬蕃部巡檢李宗亮領兵與戰不利又築城於十二盤復圭乃遣鈐轄李信監押种詠都巡檢劉甫都監郭貴等以兵三千出戰大敗歸走又遣都巡檢林廣等分兵出境破賊城寨夏人怨怒至八月舉國犯大順城一路遂警方環慶路諜知西人欲修納斡堡朝廷止令復圭先以理道攔納如西人拒捍即與捉殺不得貪爭小利及納斡兵敗上頗罪復圭處事輕脫至出兵戰十二盤手詔又戒以非賊犯邊及築堡侵漢界地即毋得出兵候將來畢工羌賊兵解别聽旨而十二盤所築城乃非漢界復圭不聽命故致然此紹聖本所書今參取刪修大抵以司馬光日記為正實録兩本並稱林廣等破賊城寨日記又稱德明之子襲和市今從紹聖附傳出梁從吉姓名而李克忠姓名則惟日記有此耳四年六月十一日并七月二十八日又有克忠事案宋史本紀及李復圭傳載此事俱據元祐本編輯而李信等之觀望致敗則略而不書蓋欲歸獄于復圭故耳續綱目載復圭既斬信等復出兵追夏人殺其老幼二百與此小異不知何所本也先是上與王安石稱王韶不可得有建功名之意安石為上言韶誠不可得欲結連一帶生羌又能輕身入裕囉格勒帳中可謂有智勇今其所擘畫決知無後害惟須及早應副上曰今相度得事已審安石曰朝廷措置事誠要審然亦要敏速乃不失事機如王韶所擘畫本路早從之則無托碩董裕之變及有變若早募獲首惡亦必已定疊兩事皆失於不敏速遂至今未了又言韶欲於古渭置市易非特一利而已使蕃部得與官司交關不患邊人逋欠既足以懷來蕃部又可收其贏以佐軍費古渭固宜聚兵但患財穀不足若收市易之贏更墾闢荒土即將來古渭可以聚兵決矣上曰市易耕田與招納乃是一事爾安石曰誠如此臣聞亓贇説并滔河一帶為夏國所有則絶買馬之路此又不可不招懷也上曰誠有此安石曰秦州常患地闊遠難管攝若得古渭蕃盛因建軍令救應側近城寨分秦州憂責接引滔河一帶蕃部極為長利如王韶者令領古渭軍事亦無害也臣聞亓贇説青唐族有七八萬人就令不及七八萬人固當有三四萬人朝廷取綏州所費極多然所利無幾今若得青唐建以為軍其首領便與一諸司使副名目令為軍使亦未為過何則秦州若得青唐要領建以為軍使漢官輔之又建古渭以為軍即秦州形勢遂長足以抗西賊一諸司使副何人不為而乃惜之乎此事非陛下特逹主張則邊帥度朝廷自來不能如此行事必不敢議及若使樞密院同議亦必以未曽有此體例沮詰惟陛下特達主張然後此事可必成無疑也向王韶奏狀言一歲不過費二三千貫錢者此是欲朝廷肯聽從所以不敢大作擘畫陛下須恢張此輩意氣令盡理經畫勿拘守自來體例漢高祖封沛令使乘輪馳騁由此諸城皆向風慕利而降今厚撫初附則諸羌欣慕爭來投漢然後可以收其酋領明示約束使異日為用不然則徒費料錢不免與西人交通臨時不為用實無補也此段並據八月十三日日録朱本乃於十月己卯附見非也今改之蒯通説武信君封范陽令非漢高祖封沛令也安石誤記今姑仍其舊於是上令安石作書諭韶具曰事當申經略司者但令奏來安石因言韓縝雖粗有材氣然非欲建立功名者陛下與一待制已滿愜內迫大臣論議外又困於衆人語言又本無立功名志氣兼見縝所辟人已草草要恐未能副陛下任使陛下常須驅䇿令向前乃可今陛下主張王韶議者必以為因此更令人轉嫉韶適所以害之此大不然漢祖令陳平護軍平無行受金諸將不服高祖令盡護諸將乃不敢言人主須彈壓得衆定乃可立事陛下用手詔戒飭縝輩然不如痛行遣李師中使知警懼則陛下不言人自奔走以承聖旨如其不能即雖手詔亦未免壞廢也譬如天以陽氣興起萬物不須物物澆灌但以一氣運之而已陛下剛健之德長則天下不命而自隨若陛下不能長剛德則流俗羣黨日強陛下權勢日削以日削之權勢欲勝日強之羣黨必不能也此段見十五日日録今因之附十四日辛未後壬申王安石獨對上謂安石曰司馬光甚怨卿安石請其故上曰光前日上殿乞出言謝景溫言蘇軾必及舉主若朝廷責范鎮臣亦住不得蘇軾剛正謝景溫全是卿羽翼安石曰臣每稱景溫平直者但見韓琦用事朝廷士大夫號為有名者亦皆屈意交琦妻弟崔公孺公孺至常人而爭為延譽韓琦見有名者皆為公孺延譽便謂公孺有識可信而士大夫因此憑託公孺進取獨景溫不肯為公孺少屈臣以此稱之及吳充為京西轉運使遇公孺如常人不加禮上因問吳充可為兩府否安石曰充乃臣親家上曰不須避此安石曰若以人望言即吳充亦合為兩府今兩制如孫永韓維最為可者然其志未嘗欲助興至理也上曰充比維輩却曉吏事又曰兩府闕人多須更得數人安石曰陛下曽説蔡挺亦必可用惟有材之人敢作姦即最難測陛下但深考道理明用典刑則人雖有材而欲為姦者亦不敢萌姦心如司馬光輩又安能惑陛下也癸酉權三司使吳充言三路屯聚士馬費用不資河北緣邊歲於榷貨務給緡三二百萬以共便糴非次應副不在其數陜西近年出左藏庫及內帑錢銀紬絹數百萬計河東歲支上京鈔不少當無事之時常苦不足乞自明年歲減江準漕米二百萬石委發運司於東南六路變易輕貨二百萬緡五年外漕米如舊所得無慮緡錢千萬轉致三路封樁寬為期限與民變轉見錢兼令商人入粟優給物貨委提點刑獄司主管仍以三司封樁平糴備邊錢斛為目三司歲遣官三兩員點檢催促詔三司度可否三司請如充議從之仍詔止撥往河東陜西更便州軍樁管依常平新法量穀貴賤糶糴先是充奏至王安石以為錢當付之常平常平新法本所以權邊糴待緩急也曽公亮以為不然上令付常平如安石議公亮曰二百萬石恐太多不如止百萬石可也安石曰今必欲變二百萬石米則米必斗賤必欲置二百萬貫輕貨則貨必斗貴矣上曰止令客舟運米抵京師即京師糶錢為便安石曰臣本議亦及此然京師一歲欲糶二百萬石米即恐米復賤兼數太多即難糴恐亦須令發運司度諸路有米貴處折錢或變為輕貨乃便也甲戌詔莊宅副使程昉以修御河有勞遷一官餘第賞之仍命同提點河北刑獄王廣廉相度漳河等水利以聞司馬光日記云帶御械程昉遷七資賞開御河之勞也先是永濟河自武城東趣永靜軍後為黃河所截北趣長蘆泊前歲又為黃河所閼會地震李村口決北趣五千渠至是黃河東行昉復開之復循黃河故道趣永靜軍河渠志漳河本西山水由磁洺州南入翼州新河鎮與葫蘆河合流其後變徙入于大河熙寧三年八月詔程昉王廣廉相視四年二月開修役兵一萬人長一百六十里五年斷工管勾官程昉李宜之知洺州黃秉推恩有差先是上論財用文彥博曰足財用在乎安百姓安百姓在乎省力役且河久不開不出於東則出於西利害一也今大發夫開治徙東徙西何利之有王安石曰使漳河不由地中行則或東西為害一也治之使行地中則有利而無害茍為或東或西利害一也則禹何為乎濬川何為乎盡力溝洫勞力先王所重然以佚道使民雖勞不可不勉後卒開之民以為利四年二月二十一日役兵萬人已增入上論財用等語自先是至不可不勉四年五月十一日劉摯楊繪云云詔差沿界河寨鋪卒轉送公用及私物者以違制私罪論從知雄州張利一請也權河北監牧使周革言本朝建黎陽為通利軍調度賦役與古不殊而戶口比古才十分之一民困於力役為甚乞廢軍為縣還屬衛州從之舊紀於月末書廢通利軍新紀不書於是上謂執政曰河北大抵立州縣太多王安石因論秦小邑并大城卒以致強及唐築三受降城事且曰今市人公人不願併合併合即多進狀朝廷又多從之已併復析者非一小人狃見如此所以每併一縣輒言不便凡言不便多是近縣廨有資産豪宗及公人而已朝廷若能察此則河北州縣可併處甚多也上問唐河北州縣安石曰唐時或是藩鎮欲張虛名縱唐州縣亦不足問但計方今利害何如爾陳瓘輕北重南之論當附此乙亥詔殿前馬步軍司大辟囚並如開封府法送糾察司録問上批河北緣邊安撫都監王光祖面奏昨巡歷至廣信安肅軍聞散青苖錢官吏多不聽民自相團保乃令上戶均保下等貧民亦有直以一村約度人數自配給者可更廣察訪施行遂下河北緣邊安撫司體量後安撫司言二軍並取民情願在外結成保甲赴縣未嘗抑勒亦無以逐村計口支散者詔光祖具析以聞已而特放罪光祖圭子也丙子提舉陜西常平等事蘇涓等言鄜延秦鳯涇原環慶等四路並邊州軍常闕軍食不免支移內地民賦百姓苦於陸運今欲自河洛運入鄜延路至延州自渭運入秦鳳路至秦州自涇運入涇原環慶路至渭慶州又四路中綏德城尤遠亦可自河入無定河運至綏德城詔前知華隂縣寧麟前鳯翔府普潤縣令梁仲堪乘驛行視以聞先是上問陜西糧草何以為計王安石曰陜西陸地無可漕惟厚與價使民競入中以供軍糧爾上因問相度河涇及無定河漕如何王安石言未見奏至上曰亦恐或可為也安石曰向寧麟言見衢州山溪行舟恐陜西或有類此者臣言瞿唐峽習水者或可用於陜西令麟相度或欲得衢州及峽路習水者即具以聞上言黃河無石磧與山水不同如何安石曰瞿唐峽方暴漲時非復有石磧之患但水湍急難上下須習彼水者乃能行恐黃河上流及無定河亦如此因白上促麟等相度其後仲堪等奏至中書戶房言本處山河峻急石磧險惡恐難以通漕乞罷前議從之卒罷水運據朱本今新本削去恐失事實故復存之但移見催麟等相度後是日上又問東南民力如何安石言其窘急上以為生齒多故也又問東南地荒闢如何安石言荆湖淮南固有地不闢兼陂塘失修治或修治不完固或溝洫墟垾廢壞州縣吏失提轄此地利所以未盡也養民在六府六府以水土為終始治水土誠不可緩也詔御史臺定奪李定合與不合追服所生母喪定既分析上遂欲除定官如何曽公亮不可定未嘗追服當令禮官定奪王安石曰禮官陳薦今為長豈可使禮官定奪乃送御史臺實録八月丙子乃送御史臺定奪司馬光日記於七月已酉載之恐誤也右諫議大夫燕達卒戊寅司勳郎中權戶部副使張景憲為遼主生辰使供備庫副使劉昌祚副之主客郎中戶部判官李立之為正旦使內殿承制劉鎮副之天章閣待制孫永為遼母生辰使供備庫使楊宗禮副之度支員外郎直舍人院吕大防為正旦使供備庫副使張述副之既而吕大防辭行改命祠部郎中開封府判官趙瞻瞻十二月四日又以府判除知鄧州豈瞻亦辭行乎不知又以何人代瞻中書上刑名未安者五條其一曰歲斷死刑幾二千人比前代殊多自古殺人者死以殺止殺也不當曲減定法以啓凶人僥幸之心自來奏請貸死之例頗有未盡理者致失天下之平至如強劫盜並有死法其間情狀輕重有絶相遠者使一例抵死良亦可哀若據為從情輕之人特議貸命别立刑等如前代斬右趾之比足以止惡而除害自餘凶盜殺之無赦禁軍非在邊防屯戍而逃者亦可更寬首限以活壯夫之命收其勇力之效二徒流折杖之法禁網加密良民偶有抵冒便致杖脊衆所醜棄為終身之辱愚頑之民雖坐此刑其創不過纍旬而平則已忘其痛楚又且無愧耻之心是不足以懲其惡也若令徒流罪情理非巨蠧者復古居作之法如遇赦降止可第減月日使良民則免毁傷肌膚但苦使之歲滿得為全人則可以回心自新頑民則囚之徒官經歷年歲不能侵擾善良如此則俗有耻格之期官有給使之利三刺配之法大抵二百餘件愚民罕能知畏使其骨肉離散而道路死亡者甚衆防送之卒勞費尤苦其間情理輕者亦可復古徒流之坐移鄉之法俟其再犯然後決刺充軍諸配軍並減就本處或與近地凶頑之徒自從舊法編管之人亦迭送他所量立役作時限不得髠鉗四令州縣考察士民有能孝悌力田為衆所知者委鄉里耆老與令佐保明州給付身帖如遇有過犯杖已下情輕可恕者特議贖罰如再犯復行科決五奏聽敇裁條目繁多致淹留刑禁亦合刪定詔付編敕所詳議立法初刪定編管官曽布上肉刑議曰臣聞先王之制刑罰未嘗不本於仁然而有斷支體刻肌膚以至於殺戮非得已也蓋人之有罪金贖不足以懲者故不得已而加之墨墨之所不可懲故至於為劓為剕為宫乃至乎為大辟猶以為未盡也則有被之鞭撲為已輕宥之五刑為已重於是乎有流宥之法此先王所以制刑之敘也自唐虞三代歷數百千年其治亂盛衰而世重世輕則有之矣然而未之有改也戰國及秦務為慘核然後有參夷之誅烹鑿之酷漢興與民休息約法三章而傷人者刑猶莫之廢至文帝遂除肉刑而定笞箠之令外有輕刑之名而死者蓋愈多矣後世因之定為律令大辟之次遂處以流刑以代墨劓剕宫之法此不惟非先王流宥之意而又失重輕之差蓋律之所謂流方古之五流蓋已輕矣古者井天下之地夫受之田畝宫室宗族墳墓鄉田同井守望相助疾病相扶持故人人有安土重遷之意及流之遠方則不受之田畝不給之賙餼徒𨽻困辱以至終身其距於死無幾也近世之民離鄉輕家東西南北轉徙而之四方固不以為患而居作一年即聽附籍乃欲以懲創罪鄰於死之人蓋已踈矣况今又行折杖之法則流徙杖笞等之為古鞭撲之刑耳夫死刑重生刑輕故犯法者多而鞭撲之不能禁止者不幸皆置之於死以刑為不忍而不免於殺之是欲輕之而反重也揚子曰肉刑之刑刑也惟相時之宜而增損之則輕重有倫而不失古之所以制刑之意矣蓋治世刑重亂世刑輕故五刑之屬三千而周官大辟之罰五百至穆王度時作刑而大辟之屬二百而已今大辟之目至多稍取其間情可貸者處之以宫剕之刑則人之獲生者甚衆若軍人逃亡應斬賊盜贓滿應絞刖其足犯良人於法應死而情輕者處宫刑之類至於劓墨則刺配之法稍已近之降此而後處以流徒杖笞之罪則制刑之等略備矣夫死刑之次莫重於宫今刑無罪之童幼以備閽寺之職惟其習熟聞見故天下莫以為非誠取於法應死之人刑而生之茍以為不可甚矣其惑且妄也世之議者必以謂肉刑之廢其由來久矣今教化未行風俗未成而欲復古之刑仁者之所不為也此殆不然夫刑期于無刑辟以止辟古之所以制世者無以易此又况乎推先王之法順當時之變明刑罰之敘而以生易死以重即輕其為仁也孰甚焉至乎教化行風俗成而人猶有犯禮義姦文網者則刑之將不止於此矣臣以謂宜於死刑下增剕宫二刑以代死罪之情輕者裁定刺配之法以倣古人劓墨其次乃處流罪於理為當於是上問執政曰布所言肉刑可即行否安石曰理誠如此即行亦無害但務斟酌所當施肉刑者如禁軍逃走未曽結構為非又非在征戰處諸合斬者刖足可矣馮京以為壞軍法安石曰前代軍法但行於征伐時若罷兵即解約束律在軍所與平時法自不同也上曰如盜賊可用肉刑更無疑斬趾亦是近世法京言唐太宗亦終不用安石曰太宗雖用加役流代斬趾然流終亦不可獨行故唐已有決杖配流之法蓋當時自有别敇施行不專用律若專用律則死罪外即用流法無以禁姦決不可行也檢正中書戶房公事曽布言近言刑統刑名義理多所未安乞加刋定朝旨令臣看詳今條析刑統疏義繁長鄙俚及今所不行可以刪除外所駮疏義乖謬舛錯凡百事為三卷上之詔布看詳刑統如有未便續具條析以聞元祐實録四年二月五日庚申有此朱史削去王安石日録四年二月五日乃有上問曽布所論肉刑可行否朱史却附見三年八月二十一日戊寅不知孰是當考今姑從朱史并布肉刑論就此書之仍附駮律錯謬事布始為編敇刪定官即言立法必本於律律所未安不加刋正而獨欲整齊一時號令是舍其本而治其末也因乞先刋正律文詔布條析具上布言律疏義繁長鄙俚及今所不行可刪除外凡駮其舛錯乖謬百事為三卷上之詔布如有未便續條析以聞司馬光云布素為王安石所厚使之改定律文不知究竟如何當考中書又言奉手詔以天下戌兵迎送役苦欲開遠官就移之法勘會川廣等路遠官往還動涉年歲道路艱難行李糜費以此赴任稽遲或多方規免致在任者過期不得代或久闕正官差注不行兼遠方兵民迎送勞敝欲應川峽廣南福建七路除堂除堂選知州外委本路轉運司置逐等差遣員闕簿録逐官到任月日成資替者到任及三年三十月替者及一年三年替者及一年半收為闕次依審官東院流內銓例逐月上旬檢舉員闕牒所部州軍闕報本處官如見任官去替期半年以下或已得替人並許依本資序指射員闕內京朝官監當合入親民合闕升差遣選人合入職官令録及循資並聽依今任滿日合入資序指射差遣限檢舉後一年滿日轉運司定合差注入姓名申審官東院流內銓保眀申奏降敇告差移如舊任未滿或替人未到仍聽在舊任待闕如新任非次闕官即令赴新任如闕有兩人以上指射差先得替人縣令即先差係奏舉人如俱係奏舉亦差先得替人應本州官願再授本州差遣本貫川峽四路人願再授本路差遣者並聽其所使闕如一年內無人指射即申審官東院流內銓差官如未差官却有本路官指射亦聽申奏施行如已差即限十日牒知如將來因此致審官東院流內銓合入七路人難得員闕許權差入次遠及近地應合詳具條約令審官東院流內銓及逐路條奏其逐路職由仍令三司均定聞奏審官西院三班院使臣令樞密院依此具制置條件以聞從之仍詔七路轉運司各舉一官員管勾文字初上督執政指揮川廣等路遠官就差文字曽公亮欲且令提點刑獄轉運使同舉王安石曰如此則得再任者少矣及具草安石欲云除堂除堂選知州外盡許就差公亮韓絳以為知州當自朝廷除之至是上改定如安石所草又讀至見在審官銓合入遠人令權入近地上曰當增云次遠及近地其後馮京言川峽差本土人知州不便上問其故京曰今仕宦一任遠一任近而四路人許連任就四路則是常得家便實為大幸安石曰所以分遠近者均勞佚甘苦今內地人不樂入四路四路人樂就家便用新法即兩得所欲何須苦之使兩失優便且此非特便於士人省吏卒迎送勞費尤為善法也其後馮京云云日録在四年三月二十五日新舊紀並書詔川峽福建廣南七路之官罷任迎送勞苦其令轉運司立格就注免其赴選具為令上因論及西事王安石曰邊事極易了止是朝廷綱紀未立人趣向未一未可論邊事若論邊事不須遠引先王且令柴世宗有如此晏然之中國當西夏數州之地數歲之孤兒不知還能掃除得否安石因論當奬用功實變移風俗又言乾君道也非剛健純粹不足以為乾曽公亮言當兼用道德上曰今一輩人所謂道德者非道德也安石曰鄉原似道德而非道德也上曰其間亦有是智不能及者安石曰事事茍合流俗以是為非者亦豈盡是不能也安石又言治天下譬如醫用藥當知虛實寒熱方虛寒時純用烏頭附子不患過熱又言京師畿內劫賊多今減降不當貸劫賊上皆以為然己卯樞密都承旨左監門衛將軍元仁政為左藏庫使榮州團練使除宫觀差遣東上閣門使李評為樞密都承旨都承旨舊用閣門使以上或大將軍其後專用樞密院吏而更用士人復自評始初上欲除評問故事如何王安石曰事果可不須問故事為物所制者臣道也制物者君道也陛下若問故事有無是為物所制上以為然故有是命八月丙戌九月乙未已酉斬環慶路鈐轄李信慶州東路都巡檢劉甫初夏人以兵十萬築壘于其境內李復圭出陳圖方略授信甫及監押种詠使自荔原堡約時日襲擊信等如其教未至賊營賊兵大至信等衆才三千與戰不利多所失亡退走荔原堡復圭急收前所付陳圖方略執信等付寧州命州官李昭用劾以違節制詠以瘐死獄成信等伏誅荔原堡都監郭貴坐不策應除名免刺面決配廣南牢城於是王安石白上言復圭斬李信事甚當上曰文彥博馮京皆不以為然朕謂彥博等卿且置官職試以人命觀之信所陷至八百人如何反不死乎其實夏人初不犯漢地復圭徼幸邊功致信等敗戮人皆寃之既而彥博等欲牒夏人以復圭擅出界事且乞降詔王安石曰夏人但見復圭屢出侵之不知所以或當少有畏憚若便牒報示以情實往往旅拒上曰善乃不果牒實録云夏人犯大順城復圭命信等出戰按信等敗處乃荔原堡北非大順城也荔原堡北事在五月犯大順城在八月方敵犯大順城時信等久已下獄且將誅矣朱本以王安石故多為復圭諱輒改墨本云信等違復圭教令取敗其附傳又云信等逗留違師期皆非事實范鎮銘復圭墓亦云信以違節度斬蓋緣飾也今並從元祐墨本及司馬光日記刪修文彥博欲移牒降手詔據日録在二十六日今並書新紀書己卯環慶路鈐轄李信巡檢劉甫坐與夏人戰敗伏誅舊紀於十月丙子乃書二人伏誅事案宋史亦以斬李信劉甫等為夏人犯大順城時其荔原堡北之敗則缺而不書俱誤提舉河北路常平等事王廣廉言一縣之事不以繁簡惟令佐二員而主簿縣尉所職各異茍事有謬誤非所職者雖坐視其弊而莫得救止止欲令主簿專管勾稽簿書尉專管捕盜依舊外縣事並令通管從之詔中書應大卿監以下陳乞恩澤並檢條例進擬不須面奏庚辰廢清平軍為章邱縣宣化軍為髙苑縣初景德三年即二縣置軍分兵屯戍至是京東路監司以為無用廢軍額為縣如故仍歸戍兵於齊淄二州舊紀廢二軍附月末新紀不書著作佐郎刪定編敕曽布編修中書條例四月五日編敕九月六日中允説書十四日集校二十五日戶檢夏人自壬申傾國入冦攻圍大順城柔遠寨荔原堡淮安鎮東谷寨西谷寨業樂鎮兵多者號三十萬少者二十萬圍或六七日或一二日辛巳環慶路都監東頭供奉官閣門祗候髙敏鈐轄皇城使郭慶經略司指使三班借職魏慶宗秦勃並為敵所殺初敵聲言齎百日糧趨鄜延敏屢白李復圭曰兵家聲東擊西兼環慶嘗破金湯白豹等寨釁隙已深不可不備已而秉常果以三十萬趨環慶副都總管楊遂駐兵大義寨令敏為先鋒將敵奪大順城水寨攻圍愈急敏力戰通路自寅至午且戰且前斬獲頗多至榆林援兵不至中流矢死敵屯榆林距慶州四十里遊騎至城下陜右大震積九日敵乃退髙敏等戰敗自十月丙寅移見于北賊屯榆林遊騎至慶州城下積九日乃解圍去並據李復圭附傳及司馬光日記新紀云云已注戊午日河東轉運使工部郎中直龍圖閣王廣淵為寶文閣待制知慶州知雜御史謝景溫劾李復圭擅興致冦故以廣淵代之初欲除廣淵修撰王安石曰韓縝知秦州已得待制兼廣淵數年前嘗為侍讀當與待制上曰如廣淵亦須察恐飽則揚去然卒從安石言既而御史范育言廣淵外雖敏給中挾諼詐不宜在侍從之列况西戎未懷謀帥為重乞選文武謀勇之士使帥一道則邊患日清中外蒙利矣不聽右羽林軍大將軍邵州團練使令晏為左騏驥使仍領團練使為許州都監先是詔袒免親將軍已下聽補外令晏雖大將軍以首應詔宗正司同學官保明堪任使特命之令晏為許州都監在九月已丑今并書翰林學士司馬光言奉職考試武舉人而法當先試弓馬若合格即試策緣弓馬者選士卒之法非所以求將帥者也不幸而不能挽強馳突則有策略將帥之才不得預試恐非朝廷建武舉之意况試弓之法挽與把齊猶不應格自今欲乞試策優并挽弓及把者皆聽就試中書請如舊制上批再相度卒如中書所奏朱本以為不曽施行遂削去今依新本復存之若謂不曽施行即削去則當削去者又何止此也詔惠州阜民監錢專給韶州岑水場買銅之費有餘即給轉運司移用初三司判官張頡請罷本監鑄錢而本路以謂歲得錢二十萬緡用本錢外計得子錢十三萬緡罷之可惜故也又詔嘉蜀二州違朝旨不報提舉常平倉司文字委知成都府陸詵劾罪以聞詵尋卒不果劾詵卒在八月乙酉今并書初遣使提舉常平倉貸青苖錢詵言川峽四路與內地不同刀耕火種民食常不足至種芋充飢今本路省稅科折已重蜀民輕侈不為積蓄萬一歲儉不能償官適陷民於死地可哀願罷四路使者如其故便并言差役水利事皆不當改為其後卒罷三路之使獨置成都府路提舉官一員朱本簽貼云會到陸詵後來别無劾到文字遂刪去今依新本復存之詵奏疏據司馬光日記在三月十八日墨本云疏奏遂罷三路之使朱本改遂字云朝廷為罷三路之使要當考究三路罷使實月日姑如此附見云知嘉州司門郎中王浹二年四月到任知蜀州駕部郎中髙良佐二年四月到任三年正月替比部郎中燕介三年十一月到任日記壬午二十五日又載司農奏成都轉運司決陵州公人為以稅錢為青苗令分析恐范純仁得罪或緣此當考三月二十五日李南公兼常平可考癸未上批聞在京諸班直并諸軍所請月糧例皆斗數不足內出軍家口虧減尤多請領之際倉界斗級守門人等過有乞取侵尅甚非朕所以愛養將士之意宜自今每石實支十斗其倉界破耗及支散日限斗級人等祿賜告捕關防乞取條令三司速詳定以聞先是諸倉吏卒給軍食欺盜劫取十常三四上知其然故下詔且命三司條具於是三司言主典役人歲增祿為錢一萬四千餘緡丐取一錢以上以違制論仍以錢五十千賞告者會赦不原中書謂乞取有少多致罪當有輕重今一錢以上論以一法恐未善又增祿不厚不可責其亷謹宜歲增至一萬八千九百緡在京應干倉界人如因倉事取受糧綱及請人錢物并諸司公人取受應干倉界并糧綱錢物并計贓錢不滿一百徒一年每一百錢加一等一千流二千里每一千加一等罪止流三千里其過致并與者減首罪二等徒罪皆配五百里外牢城流罪皆配千里外滿十千即受贓為首者配沙門島若許贓未受其取與過致人各減本罪一等為首者依上條內合配沙門島者配廣南牢城仍許人陳告犯人該徒給賞錢百千流二百千配沙門島二百千若係公人給賞外更轉一資已上人仍亦許陳首免罪給賞從之會要提舉三司帳司曽布云熙寧三年九月二十五日河倉條貫按此乃是八月二十七日立倉法舊紀書癸未詔諸倉給受槩量者臨時多寡並緣為姦剋軍食十常三四其增諸倉役人祿立勾取重法由是歲減運糧卒坐法者五百餘人姦盜以故得不縱後推以及內外吏吏始重仍法新紀削去削去其諛辭可也如立倉法安可不書初上言三司副使不才如何更擇人王安石以為材難須務考績上曰劉晏在江淮所任多年少俊鋭之人今如榮諲輩頽墮不曉事何所用之曽公亮曰令吳充奏更用人可也已而遂罷榮諲張芻等皆令補外上又論判官多不才者兼三司多侵奪有司職事事非其事安石曰三司所治多是生事以取賂養吏人不然則三司何至事多如此止如綱運抵京必令申三司然後庫務敢納此不過吏乞千數百錢然因此留滯綱運而送綱者所費不但千數百錢而已又三司所治事近則太詳遠則太略所以詳近者凡以為吏人便於取賂而已若欲省此等事則當先措置吏人使廪賜厚而員不冗然後可為也人主理財當以公私為一體今惜厚祿不與吏人而必令取賂亦出於天下財物既令資天下財物為用不如以法與之則於官司皆利此以上見日録二年八月十四日今依朱本附此繼而上又謂執政曰吏人及場務倉庫官當人人賦祿今不賦祿令受賕既不免衣食公私之物而因其受賕生事壞法費財者甚衆若賦祿則亦不過斂取公私之物還以衣食之而已故有是詔此與五年五月二十六日詔相似然有不同處仍合留存本志全因日録聯此作一假刑法志因日録聯書作一假略云中書請更定約束十條行之其後內則政府外則監司多倣此法倉法之設內外歲增吏祿至百餘萬緡皆取足於坊場河渡市例免行役利息錢既不耗縣官亦不加賦於民而吏祿以給云云又食貨志云京師歲增吏祿四十一萬三千四百餘緡監司諸州六十八萬九千八百餘緡然皆取足於坊場河渡市例免行役利息錢等而縣官歲入財用初無損少焉當考又詔蔡河撥發隄岸斗門公事等並𨽻都大制置發運司甲申賜大渡河南卭部川山前山後百蠻都首領苴尅敕書器幣襲衣銀帶以賀登位貢馬等故也知唐州光祿卿髙賦提點陜西路刑獄上批近令司農寺專主天下常平廣惠倉農田水利差役事今後每歲終具下項事節聞奏如有未盡事理更增損指揮天下常平廣惠倉見在錢斛若干數目夏秋青苖錢散過若干數目合收若干斛斗已納若干未納若干倚閣若干糴到諸色斛斗若干斗直若干出糶過若干都收息錢若干賑貸過若干天下水利興修過若干處所役過若干人功若干兵功若干民功淤溉到田若干頃畝增到稅賦若干數目農田開闢到若干生荒地土增到若干稅賦天下差役更改過若干事件寬減得若干民力此據會要實録刪修云上批司農寺專主天下常平廣惠倉農田水利差役事自今歲終可具常平廣惠倉錢穀見在夏秋青苗錢斂散納欠倚閣糴糶本息賑貸水利興修所役兵民淤溉田畝及開闢生荒所增稅賦差役更改數以聞發運使薛向等言近奏舉職方員外郎張穆之虞部員外郎李文卿開封府兵曹參軍張渙權管勾本司公事及凖備差遣勾當今來收受裝發已成倫序欲乞並差充本司勾當張穆之仍乞與理運判資序詔從之張穆之候一年如職事修舉即具保明聞奏會要八月二十七日事今附見看詳編修中書條所言看詳合歸有司二十二事乞臣僚舉選人轉官循資狀今銀臺司直送銓收使官員身亡令止申審官院等內外辟舉官并兩制及亡沒臣僚之家陳乞親戚差遣乞止中書批送所屬施行及乞今後差除官員合有支賜即劄下三司依式其宗室支賜亦依此見任少卿監以上并分司致仕少卿監宗室小將軍以上身亡孝贈並劄下入內內侍省支賜乞在京委三司在外委所在州軍支給并乞罷進選人授差遣家狀新授京官三代表品官之家陳乞服內成親乞令立條封王并節度使初除及移鎮等合行管內布政止令學士院檢舉並從之令臣僚支賜及孝贈候修成式關送入內內侍省依舊取賜先是上怪中書事多稽滯王安石言臣屢奏中書事多宜減省歸有司欲諭編修例官先具合減省名件逐旋進呈上許之乙酉命提舉在京諸司庫務王圭李壽朋同三司使副使提舉編修三司令式候成各賜一本令三司通共遵守施行丙戍閲濟州等武衛指揮兵九百五十六人􅝑排軍陳以提舉教閲左藏庫副使劉舜卿為閣門通事舍人指使梁寶等三人第減磨勘年賜絹􅝑排兵十人教頭二人鎗刀手鬬擊刺十人並遷一級餘賜帛有差詔令三司今後應不帶職臣僚直舍人院及權領兩制差遣者並支與見錢請受會要八月事知大宗正丞張稚圭言今相度到宗室諸般請受劵厯分擘合為四百一十九道乞付三司勾厯逐月止隨料錢請勘委實簡徑從之會要八月事記聞載張稚圭有當考者詔近除東上閣門使李評充樞密都承旨慮士人領職本院待遇體式故事與吏人不同可檢會先夏守斌楊崇勳領職日體例施行龍圖閣直學士知成都府陸詵卒實録八月二十九日已附二十四日此可削去
