body:
  text: 續資治通鑑長編巻四百二十宋李燾撰哲宗元祐三年閏十二月戊辰詔以皇帝生辰年例度僧牒六十六紫衣二十三賜上清儲祥宫充修造費新削去是月右正言劉安世言臣四月以後凡十三次論列胡宗愈罪惡乞行罷黜至今未䝉施行臣竊惟自昔臺諫宫彈擊執政未見是非不决如此之乆伏尋故事盖嘗有留百官班廷諍及闔門待罪自求貶降之例而臣所以包羞忍耻渉歴九月而不敢輕為去就者誠欲廣陛下納諫之盛徳致賤臣愛君之孤忠與其速去以潔身不若盡言而報國是以剖析義理援引古今凡可以上助聰眀之萬一者臣皆披瀝肝膽而盡言之矣陛下雖未加臣狂瞽之誅而公議已及臣失職之罪循省微陋實不足以勝天下之責恭惟祖宗以來體貌大臣雖用捨之道主於至公而登拜罷免亦有時㑹今龍興之後正當進退大臣之機伏望特奮剛斷早去宗愈使中外知陛下聖徳之日新而朝廷君子之道長非獨臣一人之幸實天下之幸也失今不圗養虎遺患則臣所謂留班廷諍闔門待罪之下䇿將不得已而為之矣惟冀聖慈審察公議出臣前後章䟽付外施行又言臣竊謂二聖臨御以來勵精求治遵守法度曾無過舉諍臣之職最以優為惟君子小人消長之機實係天下國家治亂之本要在分别真偽判白忠邪使上心明辨而無疑則羣小不攻而自破今之急務獨此為先臣伏見宗愈以姦囬之資挾宰相之援欺君亂法盗取名器更相朋比無復畏憚中外之論皆謂宗愈之進非陛下之本意為大臣之所誤臣是以採摭衆議稽參實迹歴指宗愈之罪凡十二事皆有按據昭如日星雖陛下意在并容未加考驗而微臣官有言責豈敢遑寧伏望聖慈特垂省察若臣之所言稍渉誣罔則乞重行降黜以戒虚妄若宗愈罪惡如臣所奏亦乞速賜罷免以警姦慝臣與宗愈義難兩立惟冀早施睿斷以决是非使諫官職業不自臣廢豈勝幸甚又言臣竊惟二聖臨御以來開廣言路天下之事幽逺必逹顧臣愚陋獲厠諌列實千載一時不可逢之嘉㑹豈不貪戀聖徳願効萬一然而數月之間止以宗愈一事章十五上未䝉聽納夙夜憂懼若在塗炭豈臣精誠不至無以感動天心議論不切莫能開悟聖意何所言之乆不效也自昔臺諌官論列執政未嘗有兩全之理今朝廷未加臣妄言之罪則是陛下粗以臣言為信而乃依違累月未覩施行搢紳之間不知諌䟽之留中徃徃指目譏誚臣等以謂容身懼禍堕廢職事遂使小人乆汚廊廟公議若此安可不畏臣聞天下之理惟是與非為人君者惟當正心誠意以審其是而已願陛下博考僉言詳加聖慮以臣所言宗愈十二事反覆紬繹若非誣罔即乞罷免宗愈以從人望進有徳以尊朝廷或宸𠂻以為不然亦乞出臣章䟽明正其罪使臣上不負陛下之㧞擢下不失諫官之職業惓惓之忠罄盡於此又言臣自四月後來凡十六次奏䟽論列胡宗愈罪狀乞行罷免至今未奉指揮臣廹於公議不敢中輟頻煩天聽宜被譴逐陛下曲示兼容未加竄斥臣若知難而止不復盡言則上可以結執政之驩下可以圖一身之利何獨自苦力犯大姦臣雖甚愚竊亦有說輙傾丹懇再冒聖聰仰冀睿慈留神聽納臣聞聖人之治天下有禮義亷耻之教有刑罰誅殛之威禮義亷耻所以待天下之君子刑罰誅殛所以待天下之小人非聖人有厚薄之私盖禮義亷耻由賢者出則不可以治小人者待之也伏惟陛下恭己於巖廊之上而聽政於萬里之外所與朝夕圖講天下之事者執政數人而已若得當世之賢者而任之則朝廷尊嚴四方率服茍非其人則堂陛陵夷取輕中外不可不謹也今宗愈匿宰相之親嫌盗中司之要任欺罔人主之聽隳廢祖宗之法立朝有朋黨之實行已多貪濁之惡自叨大任臺諫官前後論列不知其數而宗愈偃然自若殊無愧心禮義亷耻固已掃地陛下猶以治君子之道而待之望宗愈之自引以全體貌臣竊以為過矣管仲有曰禮義亷耻是謂四維四維不張國乃滅亡古之善觀人國者惟以此道而逆知其盛衰今宗愈犯義如此豈能為陛下設張四維以致天下之治乎臣聞十人之聚無不公盖以其好惡是非難蔽於一偏之說而衆心之所服者惟理而已臣向者嘗言宗愈十二事皆搢紳士大夫之公言明有按據惟陛下虚心澄慮詳繹庶言以臣章䟽付之外司特令推究如稍渉虚誕臣甘受罔上之戮或皆有實狀即乞早罷宗愈以慰天下之望臣無任跼蹐俟命之至御史中丞李常侍御史盛陶殿中侍御史翟思監察御史趙挺之王彭年言臣等近者累次論奏乞以經義别為一科令與詩賦科並行均取者盖以見行科場詔條稱將來一次科場如有未習詩賦舉人許依舊法取應解發合格人不得過解額三分之一以此觀之則是朝廷更無用經術設科取人之理止以舊人未習詩賦且於將來一次科場量以分數收取而欲隂消之故也臣等所以區區者非特為舊習經義舉人頓然失業為言直以上之好惡不可不謹以義理論之則以經術勸士為先聲律為下以教化言之則通經術者為利博事聲律者為害大通經術則天下之士知道徳之奥講禮義之要脩身治性乃能履忠厚崇亷耻其磨礲成就十有八九必為良士異日擇取以為公卿相與修明政刑宣揚教化其為利顧不博哉事聲律則渉獵浮靡講習淺近所謂徳道之奥禮義之要弗學可也而欲望其成忠厚亷耻之風則末矣凡勸厲士人而禮義亷耻之風不立則中上之才巧佞姦慝無不為矣為害顧不大耶臣等採之公議且願以經義與詩賦各設一科材性自有所長謂經義盖非止以一經而又示之以新意之謂也其詳今附之於後臣等承乏言責固不敢以苛末小故及自執鄙見屢凟天聽重念設科取士其是非得失實係時政之盛衰今朝廷立法黜抑經術崇尚聲律天下皆知其非者以干治亂之體為不細也臣等若緘黙不言雖或言之不能詳盡是謂失職惓惓之誠所以屢獻而未已也臣等竊聞今太學舉人與四方之士觀望朝廷意㫖已皆不復治經㫖凡干義理之書一皆斥而不談博士所講與其父兄之訓不復更及髙逺羣居切磨惟是論聲韻調平側事屬對校比擬以輕巧靡麗為務此臣等所以慮道術日衰以就廢絶將復如唐末五代時學子志識淺陋此有志之士毎多太息而流涕也熈寧中改科場乃欲以經術消詩賦於道則順言理則直所不善者以私意教人耳今也欲以詩賦消經術於道不順為理不直孟子曰吾聞用夏變夷未聞變於夷者也今施設乖戾義理舛忒亦何以異於斯耶今將忘所以賛教化成人材之大義而變之於理安乎倘以人材性有工於辭華而或有可用也莫如并取之為至當臣等輙冒斧鉞之誅博採輿言妄條其設科取士之所宜以俟聖鑒而裁擇焉臣等今採之輿議欲以經義詩賦各設為一科一經義進士科欲試四場第一場試經義六道每經二道欲於易書詩春秋禮記周禮内第一場各出題二道人許占對三經以古今注䟽及已見所長文理通贍者為合格不得如舊日止記誦一家之義第二場試經義三道毎經一道論語孟子各一道共五道第三場試論一首第四場試䇿三道並問子史時務一詩賦進士科四場第一場試詩賦各一首第二場試經義四道出題同第一場人許占對一經試本經三道論語孟子一道第三場試論一首第四場試䇿三道並問子史時務右伏望聖慈深惟國家教化之大陶冶人物之重四海執經之士七八萬人仰俟命令之所嚮詔以臣等愚瞽之言付之有司如或不謬特降指揮不勝幸甚又言伏聞外論紛紛以科場之議至今未定舉人惶惑莫知所向臣等以謂詩賦既已復用而經義一科豈可輙廢盖以士人操術趣向皆視朝廷好惡今於詩賦科内雖曰量留一經若廢經義本科則天下學者必謂朝廷好聲律惡經義不復更為根柢義理之學相師浮薄靡然成風則人材自此壊矣朝廷立法本欲興治救弊乃於科場之中立破壊人材之法此豈為社稷萬世之利哉今之毁經義崇詩賦者以謂國朝以來名卿賢相事業著於世者皆自詩賦科舉得之盖不知學士大夫有聞者由素講經術義理决科之後進學不已發其聰明乃能自立非由辭賦之技所能成也或者又謂詩賦有章句平側於有司考校為易經義汗漫於有司考校為難此則尤為偏蔽不尊經術之論且六經之有義理其簡易如天地昭明如日月用以取人猶權衡規矩誠陳而方圓輕重不可欺也議者不能深考乃謂六經之義髙逺而難通淵奥而難明因欲以私意曲學謀漸廢之是將聾瞽天下之士使不知道也士不知道則不能誠於身信於朋友孝於其親忠於其君無施而可也孟子謂陳相吾聞出於幽谷遷於喬木未聞下喬木而入於幽谷者今科舉之法貴於誘進成就人材乃抑經術重聲律是使學者下喬木而入於幽谷豈不陋乎況王者之政務順人心朝廷不以聲律取士近二十年略計天下言之挾經應舉者凡七八萬人一旦使之棄其所學而習其所不學捐其所能而强其所不能則皆顛沛失業因有終身不復更望仕進者事雖有繫天下之大利害亦不當矯革遽暴如此况有害而無利乎恭惟陛下遵廸祖宗之遺訓務以順人豈欲拂天下之士心至於此哉議者又謂詩賦之法一定豈必更恤士人之不能為者是勸朝廷以不仁為政推此心也亦將何所不至伏望陛下深加省察必存經義一科令與詩賦並行均取以為萬世之利又言臣等伏以設科取士係天下利害為不細前後臣僚累有奏請乞留經義與詩賦各為一科而均取其人臣等近亦别狀奏聞區區之誠未能上悟聖心臣等夙夜不遑安處臣等竊聞論者以科場之設為取士一術其人材美惡與得人失人不繫於此經義詩賦又何擇焉今朝廷遂黜經義存詩賦則是必用詩賦乃為得人矣不爾安肯拂天下之士心而力為之哉此議論之臣特欲行其私意而不知壊天下人材始於今日臣等極為陛下惜之朝廷設法本於忠厚而其弊猶或至於凉薄設法於凉薄而其弊反歸於忠厚者自古未之有也今以經義設科是朝廷率人以知禮義其有不知禮義者非經術之罪而士之罪也今以詩賦設科是朝廷率人以浮靡其相率為浮靡者非士之罪而詩賦之罪也倡率天下學士大夫趨向操術不為禮義而為浮靡可以謂之良法哉浮靡成俗則士無操行士無操行則囬邪姦慝無所不為已且朝廷公卿百執事皆由此塗而進今設科育材取士以為公卿百執事將不謹其初耶夫堯舜三代之治迹詩書存焉賞罰褒貶之大法春秋存焉禮以治其顯易以治其微道徳性命之理人情事物之變立身行已仁民愛物之術無不備載先王用之訓廸天下士猶有學而不知道者又况絶之以為無用哉雖今詩賦舉人兼治一經或並設而不均以分數取之則名存而實亡以多而誘其寡蓋學者曉然知科舉雖存經義其去取升降皆不在是尚復留意講習耶異時不過如昔日帖經為一場之數此與不令治經何以異也又以多而誘其寡度不數年經義之學絶矣古之為賦者亦有法度與規諷其言又多瓌竒美麗揚䧺猶鄙之以為雕蟲篆刻而謂文麗用寡者相如也如王襃張子僑輩作為歌頌詞賦其才固美矣武帝止以為賢於倡優博奕然則文章之不主於義理者歴世之所不貴况如今日之賦文章義理兩皆失之徒為殘毁經義破壊道徳之一術爾校其得失何啻倍蓰千萬也臣等所言蓋非出於私意自有詩賦以來名卿鉅儒深排力詆不可勝數伏望聖慈特加審察如詩賦未即廢罷伏乞存留經義一科並行均取不及十年當見磨礲成俗必有通今博古殊才異行之人間出以資公卿輔佐之選將書之史䇿則以為美談行之天下則以為美政矣李常前二奏據本集不得其時後一奏元祐雜錄有之具列臺官姓名稱閏十二月上今因此並附前二奏明年四月八日詔應進士不兼詩賦人許依舊法取應増治一經増試一場常等此奏乞存留經義一科並行均取豈朝廷果嘗欲廢經義科乎當考元祐元年四月三日蘇轍上官均議可參考右正言劉安世言臣伏見蘇州崑山縣百姓朱迎徐宗唐遂朱育四人經戸部陳狀各稱有田産元係抵當市易官錢後來連值災傷不能如期結絶所納息罰已過官本其餘逋欠自合依元祐元年閏二月二十八日朝㫖特與除放今來州縣官司不惟廢格命令不為施行而又章惇作其男名目將朱迎等不願出賣田産逼逐人湏令供下願賣文狀並從賤價强買入已或不即承伏縣官畏惇之勢徃徃誣以他罪屢加刑責必使如意而後已異日迎等遍詣本州及轉運提刑司次第陳訴並不依公理斷雖一偏之詞未足盡信而民負抑屈無所伸告不逺數千里赴訴省部流離顛頓恐不徒然按惇以大姦之才抱死黨之志方陛下踐阼之初布平易近民之政惇備位大臣不能輔成上徳而包蓄詭計動為異論陽示强鯁隂助姦慝以至悖慢帷幄之前殊無君臣之禮陛下以天地之量赦而不誅止罷執政出之藩鎮謂宜退省前過痛自懲艾而長惡不悛陵蔑國法刼持州縣强市民産前後大臣肆行姦惡未見如此之甚者臣竊謂惇閑居里閈不與政事而氣燄凶暴官司莫之敢忤寧屈陛下之法不敢違惇之命使惇得行其志則天下之弊將有不可勝言者矣伏望詳此事理留意逺民特降指揮下戸部取朱迎等四狀選差臺臣置獄推勘若惇果有上件罪即乞特行竄殛以戒亂政䟦扈之臣其州縣及監司承望風㫖殘害平民亦乞重行追奪以懲奉法不謹之吏庶存公道以召和氣又言章惇抱死黨之志而濟以隂謀藴大姦之才而輔之殘忍因縁王安石吕恵卿之黨遂得進用而造起邉隙僥倖富貴在先帝時以坐買田不法嘗罷執政元豐之末再叨大任陛下嗣位擢置上樞而内懐姦謀沮壊聖政公肆悖慢殊無臣禮陛下曲示容貸未忍加誅出之近藩已屈公議繼以家難退歸里閈而敢憑恃凶豪陵暴寡弱使無辜之民流離失業不逺數千里求直於戸部覽其訴牒可為心惻臣竊謂崑山縣輙違詔㫖將朱迎等不願出賣田産逼以威刑須令供下願賣文狀使惇並以賤價强買入已則是縣官畏惇也朱迎等詣本州及轉運提刑司陳訴而逐處不敢受理則是州郡及監司畏惇也朱迎等抱負屈抑赴訴省曹本部明知兩浙監司皆有妨礙雖提刑楊傑係後來到任而其人孱懦齷齪苦無風力自合申禀朝廷選官根究而姑欲應法止委楊傑則是户部畏惇也國家設置御史本以紏察百僚今自中丞以下未聞有一言繩其亂法則是御史臺畏惇也臣忝備諫職不忍緘黙輙據事狀奏䟽論列而執政不能明正典刑惟務姑息不即選差公方正直不畏强禦之士俾之窮治而視為常事止送發運司體量則是執政畏惇也夫州縣監司之畏惇而廢格詔條以害良民則國家之憲章具在猶可按劾今執政大臣及御史臺尚亦畏惇則朝廷之綱紀復何望哉願陛下明詔輔弼共守直道有功必賞有罪必罰無使邪正雜揉枉直混淆好惡不明是非莫辨依違畏縮徒為自全之計則陛下威福之柄不至陵夷而姦䧺䟦扈之臣少知畏矣仰望聖慈檢㑹臣前奏事理特賜指揮施行又言臣近奏章惇强以賤價買朱迎等田産事乞委臺臣置院推勘繼聞朝㫖送發運司體量尋再具狀論列未䝉施行竊聞朝廷不欲輕信偏詞遽興詔獄然無告之民不逺數千里赴愬省部以情度之不應全然虚妄縁本路監司見朱迎等訴牒不為受理即是各有妨礙而轉運司與發運司自來職事相干今若委之根究深慮顧惜人情滅裂其事伏望聖慈詳酌特降指揮令自朝廷選差公方正直不畏强禦之人前去體究所貴逺民屈抑有所伸雪貼黄據朱迎等狀稱已曾經蘇州及轉運提刑司陳訴並不䝉依公施行今來若止下本州及監司體量必恐䕶短遂非曲為蔽匿淹延刑禁虚煩行遣欲乞朝廷詳酌選擇官吏置司推劾所貴易見情狀不失有罪又言竊聞發運司所委體量官止於崑山縣取索公案㸔詳遂具囬奏以謂買田之事雖有實狀而於條法别無違礙臣竊謂姦吏附㑹權勢暴虐良民必不肯於案牘之間明著逼脅之迹徃徃假託公道捃摭他故使無辜之民不勝刑獄然後命狡猾之吏取責自願承買之狀則是外無違法之形而内有奪民之實也今若信其文具而不顧其本意則逺民屈抑終無所伸須至辨明以破其妄檢準編勑節文侍從官待制以上不得廣置産業與民争利前章所言者止據朱迎等四户爾訪聞發運司體量到乃有二十一户是舉蘇州之内官賣田産皆惇所有也自來州縣估計抵當物業止納一半之直盖官司防異日失陷之弊不敢盡用實價今惇利其甚賤公違條制劫持州縣侵害良民争利之罪莫大於此臣又檢準律文祖父母在而子孫别籍異財者徒三年若祖父母父母令别籍者徒二年子孫不坐臣謂惇用其子承事郎援之名投狀承買使惇初不預聞則援宜得罪若惇自為之則咎將誰執况朱迎等狀内陳其矯妄之事條目甚多此四人者粗有褁糧故不逺千里求直於省其餘貧病之徒不能自給斂手去業遂至流亡陛下可不念之乎臣聞西漢軹有儒生侍使者坐客譽郭解生曰解専以姦犯公法何謂賢解客殺此生吏以責解觧實不知殺者亦竟莫知為誰吏奏解無罪御史大夫公孫宏議曰解布衣為任俠行權以睚眦殺人解不知此罪甚於解知殺之當大逆無道遂族解臣竊謂惇以威勢廹逐平民不顧國法賤買其田又非郭解之不知也若今以姦吏舞文粗能應法害民之實略而不問恐非春秋誅意不誅事之義伏望陛下詳閲朱迎等四狀事理特降指揮劾本縣官吏挾情不公之狀按惇矯詐亂政之罪明正典刑以戒天下其蘇州及本路監司不受朱迎等辭訴乞並行黜責庶權豪知畏逺民安堵范百禄趙君錫既受詔同行相視東西二河度地形究利害見東流髙仰北流順下知河決不可囬即條畫以聞其一曰王孝先唐義問陳祐之張景先同共講議稱凖朝㫖節文王令圖與張問相度得於北京第四舖去河近處開引水簽河導水分入孫村口還復故道處躬親將帯屬官相視打量到髙下丈尺等㸔詳大名埽第四舖欲開河取水入孫村口還復故道處河深二丈一尺六寸至二丈三尺稍似港别無𦂳着港勢據打量得流分尺寸開掘到井筒深淺比照只過得水一尺八寸五分至二尺四寸五分尚有二丈一尺一寸五分至二丈五寸五分取引不過委是即目難以還復故道除此外未有可以興修去處已録奏聞去訖臣等㸔詳顧臨等從初與王孝先同議孫村口難復故道之時並係衆官躬親相視得西京左藏庫副使孫勍等開到井筒一十七箇連泥水三尺七寸至七尺四寸及九尺衆定得尚有二丈一尺一寸五分至二丈五寸五分取引不過遂行申奏稱難以還復故道今凖敇命却係王孝先奏乞於上件去處取水入故道臣等尋牒修河司㑹問擘劃上件事理日打量得大河水深若干取到井筒多少丈尺并兩面地形髙下及港勢流行次第續凖本司牒稱去年十月講議河事所曾打量同銜申奏後來王孝先獨出已見奏陳遂専牒王孝先㑹問曾與不曾再行打量檢視囬報凖本官公文稱自去年十月後來至申奏日前即更不曾打量檢視臣等勘㑹講議所欲於孫村口囬河即取撅井筒檢量得尚有大河深水二丈五分取引不過遂奏稱難以回河今臣等躬親按視檢量得修河司開下隄外第一處井筒一箇通水深共七尺内除水深一尺五寸外有五尺五寸十一脉却行打量得大河水最深處一丈五尺五寸河岸髙八尺四寸通髙深二丈三尺九寸打量比折得隄外地面髙如河底一丈九尺九寸一分尚有一丈四尺以上取引不過即與前來所驗無異而孝先獨出已見更不再開井筒較量地形髙下可與不可回河執以為便顯是鹵莽獨任偏見誤國大事其二曰臣等㸔詳河北轉運司公文已奏乞於諸路計置修河司約用閉口物料及舊河諸埽并馬頭上下約通計人工一千四百七十九萬九千六百七十工半物料計五千八百八十四萬八千八十二條束塊口即目收買年計物料三箇月方買到四萬九千餘束梢草今提舉修河司王孝先俞瑾奏稱合趁來年放水入孫村口歸還東流委是可以回復故道臣等竊詳孝先初奏乞開減水河即云竢其行流通快新河勢緩人工物料豐備然後徐議閉塞及召赴都堂又供申稱元祐五年方議閉塞北流今來朝廷再取果决事狀却稱來年取水過後若河流順快人工物力有備便合接續閉塞北流如此則却是不竢新河勢緩人工物料豐備然後徐議閉塞有此前後異同縁回河事大不容措置如此反覆兼詳孝先瑾等専領修河職事豈不知合用物料五千餘萬未有指揮見買年計已經一季未及毫釐所闕不貲全無涯涘便云來年放水入孫村口委可以回復故道彼豈不知此事理終不可為故為大言近期倉卒以謂朝廷必難應副則須報罷不然安得五千餘萬物料於來年數月之間遽能及期辦集也孝先等又云若失此時萬一河勢變移背了口地豈獨不可減水即水無可囬之理者臣等竊謂河流轉徙乃其常事水性就下固無一定若假以三五年或六七年使數路休養民力沿河収積物料以漸開濬故道修復舊隄嚴敕所司常切體訪一旦港勢改變别就得穏當口地當此之際審議事理釃為二渠分𣲖行流均減漲水之害則勞費不大功力易施庶經乆稍見稳便豈得謂之一失此時永無回河之理但顧形勢順否利害何如耳竊詳孝先等所奏於事理顯是未經思慮其三曰孝先等稱契勘得衛州已下及新閉口已上堤埽自是係都水監照管兼自來修河即不曾通管向上堤道今來並係南北外丞司地分自合管認修䕶臣等㑹到北外都水丞司公文稱契勘見相度孫村口開河若欲全回大河東入故道於未閉塞北流已前本司地分内黄三埽臨河一埽并對岸臨平等埽合當預先添修固䕶逐處埽岸縁内黄三埽堤岸怯薄雖修河司閉斷三河門竊慮大河閉塞河口之後向上臨河地分并三門河上下漲水出岸奔流出内黄逐埽𦂳着堤岸其勢必定猛惡最係喫力不測踈虞及對岸臨平等埽亦恐淪没刷溢分走水勢深足為患今修河司興作河事閉塞北流向上堤岸稱不通管又稱係都水監照管外丞司地分自合管認修䕶候將來如降朝㫖依其所陳即上件逐埽合倍加準備所有人工物料乞一面移牒澶州百禄等奏不得其時據明年正月二十八日已前所附奏稱乞罷修河司將近一月故斟酌附今年閏十二月末按百禄等條具河不可回當不止此三項湏更討求増益之第三項後必有别項又當結云右具如前並乞罷修河司等語始為全備今姑依所傳本附此兼百禄等條畫多渉吏文亦湏稍加修飾之乃可是嵗宗室子賜名授官者五十五人天下上户部主户二百一十三萬四千七百二十三丁二千八百五十三萬三千九百三十四客户六百一十五萬四千六百五十二丁三百六十二萬九千八十三斷大辟二千九百一十五人
