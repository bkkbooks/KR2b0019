body:
  text: 續資治通鑑長編卷四十三宋李燾撰真宗咸平元年春正月辛酉朔改元癸亥賜近臣嵗節宴于宰相吕端第自是遂以為例丙寅有司上皇太后李氏諡曰元德翰林學士楊礪等受詔知貢舉請對上召坐語之曰貢舉重任當務選擢寒俊精求藝實以副朕心礪建隆初及第為榜首上在開封時嘗問礪何年及第礪唯唯不對上然後知之謂礪不以科名自伐益重焉礪性剛狠傲僻為文尚多無師法每作詩一題或數十篇在翰林制誥迃怪大為人所𫝊笑壬申昭宣使王延德上太宗皇帝南宫事迹三卷命送實録院癸酉始令諸王府記室翊善侍讀等官分兼南北宅教授南北宅始此當考詳時南北宅又有伴讀然無定員是年十一月賜南宫侍讀李文益緋然不知始于何時今附見百官志繫之祥符二年後誤也甲戍詔諸路塲務逋欠官物令主典備償者監臨官非同為欺隠勿令填納初李至判國子監上言本監先校定諸經音疏其間文字訛謬尚多蓋前所遣官多専經之士或通春秋者未習禮記或習周易者不通尚書至于旁引經史皆非素所傳習以是之故未得專詳伏見國子博士杜鎬直講孫奭崔頥正皆苦心强學博貫九經問義質疑有所依據望令重加刋正除去舛謬太宗從之丁丑蔡州學究劉可名又上言諸經板本多誤上令擇官詳校因訪羣臣通經義者至復以頥正對上曰朕宫中無事樂聞講誦因召頥正于後苑講尚書大禹謨賜五品服他日謂輔臣曰頥正講誦甚精卿等更于班行中選經明行修之士一二人具以名聞自是日令頥正赴御書院侍對講尚書至十巻頥正雍邱人也戊寅上御崇政殿召御龍直二百七十餘人閲試武藝遷擢者二十六人庚辰審刑院詳議官監察御史韓見素表求致仕時年四十八上問輔臣曰見素齒髪尚少遽求致仕何也吕端曰見素性恬退喜修煉上難之李至曰近世朝行中躁競求進者多知止求退者少若允其請亦足以激勸薄俗上黙然乃授刑部員外郎致仕見素鳯翔人退居華山年八十餘乃卒甲申有彗出營室北光芒尺餘二月壬辰詔禮部貢院考試畢日録合格人姓名以聞當議降敕放榜賜及第如覆試有繆濫知舉官重行朝典上謂輔臣曰朕即位以來罔敢暇逸庶涉治道至于和平今彗出甚異将奈之何吕端等言變在齊魯之分上曰朕以天下為憂豈獨一方耶李至曰陛下此言可以却妖星矣甲午詔百官極言得失避正殿減常膳乙未慮繫囚詔諸州長吏平决獄訟申理寃濫先是吏部郎中直集賢院田錫出知泰州未之任會星變錫上疏言臣自去年七月至冬節已後三上章所言者朝廷宻謀所陳者國家大體識見雖淺不足動于宸聰果敢所陳亦足伸于忠節每至奏覆公事咫尺天顔亦望聖聰畧賜宣問豈謂陛下略不詢所陳之事殊不訪所貢之言退有憂皇慮獲罪戾進無聽納固不遑寧所以輙拜封章乞歸館殿旋承勅命令知泰州已䝉聖恩給與假限許至三月初進發臣既受勅不合立班唯候朝辭以赴任所于二月八日方覩御札許貢芻詞臣子之事君親愚直之逄明聖有所見聞豈敢緘黙臣聞君不宻則失臣臣不宻則失身臣去年所上第一章下在中書第二第三章留中不出臣慮外人窺其曾有貼黄乞未付中書且宣召宰臣樞宻使問其可否然尚有不敢形于奏疏擬俟面陳所慮者非輕慮陛下失臣所憂者非細憂㣲臣失身今日陛下若許臣面言容臣口奏即乞宣召必得敷陳臣于正月十二日得實録院牒要臣太宗朝所上諫疏臣已冩録于二月二日送實録院記其間可行之事可用之言先皇帝亦聽納而行之亦優容而用之伏乞陛下令實録院進呈畧賜披覧有先朝未行者乞擇而行之有今日可用者乞取而用之御札云良由時事舛誤政化鬰堙臣謂李繼遷不合與夏州又不合呼之為趙保吉雖賜姓與名已自先朝然狼子野心終是異類昨以陛下登極雖來進奉錫之優詔奬以來王識其奸謀辨其詭計則可錫之土宇授以節旄則非以臣愚䝉料彼變詐必不肯乆奉朝命必不能永保塞垣既如此惠之懷之而弗來討之除之而未得翻成姑息似失機宜臣謂闗輔勞擾從此生國家費耗從此起是時事舛誤之大者宻院公事宰相不得與聞中書政事樞宻使不得與議相承既乆驟改固難致兵謀不精國計未善求之近騐即去年靈州之役闗西之民死者十五餘萬生民無辜而死者十五餘萬罪在何人而不問咎將誰執而不知此政化鬰堙之大者也臣今為陛下言其大者逺者自餘𤨏屑之事何足為陛下言之錫疏論彗星自注云三月七日上移附此疏奏即日召對移晷將行又貢封事復召對謂曰卿第去不半嵗召卿歸矣事有當面論者聽乗傳赴闕再遣中使賜與之甚厚將行封事獨未見當考戊戌詔以乆停貢舉頗滯時才令禮部據合格人内進士放五十人諸科百五十人來嵗不得為例改太平軍為亷州先是吏部銓擬官告身悉書其過犯三月癸酉詔自今勿復書淳化初宗正少卿趙安易言别廟祭饗懿徳皇后在淑徳皇后之上臣未測升降之由乃有司亂昭穆為逆祀請改正之太宗不許及議合食有司咸請以懿徳升配安易又言百官論議茍且隳凟尊卑若序以後先當用淑徳配食詔尚書省集學士兩省知雜御史諸司四品南省六品以上及禮官同詳定上議曰淑徳皇后生無位號没始追崇况在初潜早已薨謝懿徳皇后饗封大國作配先朝雖不及臨御之期但夙彰賢懿之美若以二后之内則升祔當歸懿德伏請奉懿德皇后神主升配太宗室又按張昭等議以周世宗神主祔廟必若宣懿同祔即正惠神主請加太字若升祔懿德即請加淑德太字仍舊别廟詔曰禮非天降地出酌于人情都省以懿德皇后雖未正位中宫亦合配饗先帝恭依所請庶恊從宜至于太者尊極之稱加于母后施之宗廟禮即未安淑德皇后不加太字仍舊别廟祭饗夏四月己丑朔詔諸州長吏潔除牢獄疏理淹繫有疾病及貧乏者療治資給之甲辰改御帶曰帶御器械以授供備庫副使張旻等三人旻開封人嘗給事藩邸云上謂宰相曰諸路逋欠先朝皆令蠲放而有司尚更理納頗聞細民愁嘆此甚亡謂也已酉遣使乘傳與諸路轉使州軍長吏按百姓逋欠文籍悉除之始用王欽若之言也除逋欠凡一千餘萬釋繫囚三千餘人上由是眷欽若益厚五月壬戌始命内侍充宫闈令限年與代令居廟中與知廟官同掌宗廟祀事從屯田郎中楊延慶所請也史官曰宫闈令但掌遷皇后神主豈宜輙居廟中專掌廟事乎延慶不知典故君子非之六月庚寅宻州發解官鞠𫝊坐薦送非其人當贖金特詔停任仍令告諭諸道以警官吏上謂輔臣曰凡所舉官多聞謬濫宜先擇舉主以類求人今外官要切惟轉運使卿等可先擇人令舉之辛卯詔三司使學士兩省尚書丞郎知雜御史各于常參官内舉材堪轉運使者不限人數上又言諸州長吏奏舉官屬慮有請託并須條約之乙未詔諸路知州軍通判自今舉管内京朝幕職州縣官各具勤績實狀如經擢任有違犯并連坐之先是判太常禮院李宗訥等言伏見僖祖稱高祖翼祖稱曾祖宣祖稱祖太祖稱伯文懿惠明簡穆昭憲皇后並稱祖妣孝明孝惠孝章皇后並稱伯妣案爾雅有考妣王父母曽祖王父母高祖王父母及世父之别以此觀之唯父母得稱考妣今請僖祖止稱廟號順祖而下即依爾雅之文于是禮官言伏請僖祖室止稱廟號后曰祖妣順祖室曰高祖后曰高祖妣翼祖室曰曽祖后曰曽祖妣祝文並稱孝曽孫宣祖室曰皇祖考后曰皇祖妣祝文稱孝孫太祖室曰皇伯考妣太宗室曰皇考妣每大祭太祖太宗昭穆同位祝文並稱孝子其别廟稱謂亦請依此詔令禮官再討典故禮官言按太宗饗祀太祖二十有二年稱曰孝弟此不易之制又安可追改乎唐元宗謂中宗為皇伯考德宗謂中宗為高伯祖伯氏之稱復何不可臣等參議自今合祭日太祖太宗依典禮同位異坐太祖位仍舊稱孝子奏可秋七月壬戍詔京朝官非公事不得輙入制敕院犯者論如法凡中書堂後官以下所處吏舍總名曰制敕院中書吏舍總名制敕院此據三朝及兩朝正史職官志増入先是有詔諸路課民種桑棗廣西轉運使陳堯叟上言曰臣所部諸州土風本異田多山石地少桑蠶昔云八蠶之綿諒非五嶺之俗度其所産恐在安南今其民除耕水田外地利之博者惟麻苧耳麻苧所種與桑柘不殊既成宿根旋擢新榦俟枝葉裁茂則刈穫是聞周嵗之間三收其苧復因其本十年不衰始離田疇即可紡績然布出之市每端止售百錢蓋織者衆而市者少故也有遺利而民艱資今臣以國家軍須所急布帛為先因勸諭部民廣植麻苧以錢鹽折變收市之未及二年已得三十七萬餘疋自朝廷克平交廣布帛之供嵗止及萬較今所得何止十倍其多今樹藝之民相率競勸杼軸之功日以滋廣欲望自今許以所種麻苧頃畆折桑棗之數諸縣令佐依例書歴為課民以布赴官賣者免其筭税如此則布帛上供泉貨下流公私交濟其利甚博詔從之先是黎桓加恩為交州國信使者必獲贈遺數千緡桓責賦斂往往斷民手足趾堯叟知之遂奏請召其子授以朝命而知其私覿之言嶺表炎蒸人多瘴癘請官給紙墨冩攝生藥方散付諸州從之八月丁亥朔詔三司經度茶鹽酒税以充嵗用勿得增加賦斂重困黎元諸色費用並宜節約并條析未盡事件以聞辛卯京西轉運使姚鉉上言諸路官吏或彊明莅事惠愛及民者則必立教條除其煩擾然所更之弊事多不便于狡胥候其罷官悉藏記籍害公蠧政莫甚于兹欲望應知州府軍監通判幕職州縣官于所在有經畫利濟事可經久者嵗終書厯替日録付新官俾之遵守不得妄信下吏輙有改更若灼然不便州以上聞幕職以下聞于長吏俟報改正禮云其人存則其政舉其人亡則其政息語云舊令尹之政必以告新令尹此實聖人之格言國家之急務也詔從之乙已工部侍郎集賢院學士錢若水等上太宗實録八十巻上覧書流涕賜詔褒諭賜賚有差時若水判集賢因用院印史館無所預纔九月而畢初太宗有畜犬甚馴常在乘輿左右及上仙犬輙號呌不食因送永熈寢宫李至常作歌紀其事以遺若水其斷章云白麟朱雁且勿書勸君書此懲浮俗而若水不為載吕端雖為監修而未嘗涖局書成不署端名至抉其事以為專美若水稱詔㫖專修不𨽻史局又援唐朝故事若此者甚衆時議不能奪已酉上謂輔臣曰朕觀士大夫中多有名無實何言行之相違也對曰君子之道闇然而日章歴試既久自當見矣上然之癸丑詔監倉京朝官無得以羡餘為課九月己未秦國延夀保聖夫人劉氏卒上即時臨喪輟朝三日親奠哭遣東宫舊給使軰素服申哀改號曰成聖繼明上以乳保之恩事之如母自被疾親調藥餌者逾月既終將舉哀以太宗喪始朞頗疑其事令禮官定議遂發哀于苑中羣臣奉慰葬日給鹵簿前一日又臨奠焉初錢若水受詔修太宗實録引左正言直集賢院楊億參其事億所獨草凡五十六巻故奏篇最速億自言母老求出守就養命知處州既而上以億有史才留不遣億固請往甲子召對加賜而遣之先是太宗命張洎重修太祖實録其書未成㑹洎死己巳詔宰相吕端集賢院學士錢若水同領其事若水懇辭上曰卿新修太宗實録甚為周備太祖事多漏落故再命卿毋多讓也豹林谷隠士种放母死貧不克𦵏遣僮奴告于翰林學士宋湜等湜與錢若水王禹偁同上言先帝嘗加召命今無以葬母欲行私覿是掠朝廷之美也壬申優詔賜放粟帛緡錢丁丑上謂宰相曰轉運使按察官吏事權甚重非其人則州縣受弊近地猶易為聽察逺方固難便聞知太寛則弛慢太猛則苛刻必須廉平之吏寛猛適中卿等其謹擇之綾錦院有錦綺機四百餘上謂左右曰錦綺非軍國常須可令悉改織絹甲申始以新織絹進御舊制國子監開封府舉人有與發解官親戚者止兩司更互考試上慮涉私徇是秋特選官别試冬十月宰相吕端久被病詔免朝謁就中書視事累上疏求解戊子罷為太子太保初李惟清自知樞宻院左遷御史中丞意端抑已及端免朝謁乃彈奏常參官有疾告逾年受俸者又教人訟堂吏過失欲以累端端曰吾直道而行無所媿風波之言不足慮也按本傳端自今夏始被病詔免朝謁而實録于三月辛酉已書李惟清卒然則惟清彈奏常參官時端尚未移疾也恐此𫝊或誤又按百官表載惟清卒于今年八月實録當誤此傳不誤也戸部尚書張齊賢加兵部尚書與户部侍郎參知政事李沆并平章事工部尚書參知政事李至罷為武勝節度使至以目疾解機務及授旄鉞入見懇辭上曰此唐朝故事廢之久矣特命振舉示優賢也又賜御製詩寵其行己丑吏部侍郎參知政事温仲舒罷為禮部尚書樞宻副使給事中夏侯嶠罷為戸部侍郎樞宻副使户部侍郎向敏中加兵部侍郎參知政事翰林學士楊礪為工部侍郎宋湜為給事中并為樞宻副使先是有攀附居近職者乘寵放恣民家子既定昬彊取之其家詣開封訴焉知府事畢士安即請對白其事卒得民家子還其父母使成昬攀附者日夜訴士安于上前士安因求解府事上許之復入翰林為學士翰林學士承㫖宋白嘗獻擬陸贄牓子集上察其意欲干事任乃命白權知開封府既而白自倦于聽斷不半嵗亦丐罷云畢仲游文簡公事迹載文簡白上卒得民家子還其父母使成昬今從之仲游又載文簡之請對也事連王禹偁故其人日夜訴文簡及禹偁于上前乆之文簡罷開封復入翰林請出遂知潞州禹偁亦責黄州按士安明年四月乃出知潞州禹偁事在今年十二月亦與本史不合今不取詔縣尉司無得置獄庚寅上謂輔臣曰群臣中有謗言逹于朕聽者詢之於衆似得其實然人誰無過但能循省遷革則為善矣朕固不以一𤯝廢終身之用也乙未宰相張齊賢李沆入對上諭之曰上下和睦同濟王事忠孝之誠始終如一齊賢曰君為元首臣為股肱上下一體豈有不同其心而能濟國家政事者哉上曰推其公共思而後行惟宜謹審無至差失况先朝皆有成憲但與卿等遵守期致和平爾先是朝議以淳化後盡至道末續降宣勅頗為繁宻張齊賢時為户部尚書詔齊賢專知刪定監察御史王濟等同知刪定舊條持仗行刼不計有賍無賍悉抵死齊賢議貸不得財者濟曰刑期于無刑以死懼之尚不畏可緩其死乎因與齊賢廷諍數四濟詞氣甚厲手疏言齊賢腐儒不知適時之要齊賢復表陳濟當同議定而復有異論上問輔臣孰可從者吕端對曰立法尚寛忌于嚴急周官刑平國用中典此經制也然利不百不變法當改革者宜從衆議乃詔尚書省集百官議之并劾濟未幾齊賢入相丁酉齊賢奏臣今在中書不欲與庶寮争較曲直願收前詔上欣然嘉其容物遂罷集議濟得免劾而刑名卒如齊賢之請自是犯盗者嵗亦不増先是三班不免仗罸齊賢請以贖論遂為定制論者稱其平允時戚里有争分財不均者更相訴訟又因入官自理于上前更十餘斷不服齊賢曰是非臺府所能决也臣請自治之上許焉齊賢坐相府召訟者問曰汝非以彼所分財多汝所分財少乎皆曰然乃命各署狀給實即遣兩吏送甲入乙家乙入甲家貲財皆按堵如故分書則交易之訟者遂止明日以聞上大悦曰朕固知非卿莫能定者己酉崇政殿視事至午而罷上自即位每旦御前殿中書樞宻院三司開封府審刑院及請對官以次奏事至辰後還宫進食少時復出御後殿視諸司事或閲軍士校試武藝日中而罷夜則召儒臣詢問得失或至夜分還宫其後率以為常聖政録云召侍講讀學士按二年七月初置講學士此時未有今改為儒臣庶不相妨癸丑命修太祖實録官錢若水等覆考開封府得解進士試卷故事京府解十人已上謂之等甲非文業優贍有名稱者不取時以髙輔堯為首錢易次之易頗為流軰所推許輙不平遂上書指陳發解官所試朽索馭六馬賦又詩論䇿題意涉譏訕又進士數百軰詣府訟薦送不當輔堯亦投牒遜避請以易為首開封府以聞故有是命仍令兩制議所訟題時翰林學士承㫖宋白深右易考官度支員外郎馮拯奏易與白交結狀上大怒遣中使下拯御史獄拯力言易無行不可冠天府多士上亦以為士流紛競不可啓其端且欲鎮壓浮俗乃詔釋拯罷兩制議及覆考止令若水等擢文行兼著者一人為首乃以孫暨為第一輔堯第二易第三餘并如舊暨開封人􅀈之孫輔堯保寅之子也易初以輕俊被黜既而太宗與蘇易簡論唐時文人且歎不與李白同時易簡言易能為歌詩殆不下李白太宗驚喜曰誠如是吾當白衣召置禁林㑹盗起劍南事乃止是月詔以縁邊屯戍之兵日勞饋餉分三司議定經久之制無致擾民仍令鹽鐡使陳恕監議此據本志實録無之十一月丙辰朔河西軍右廂副使歸德將軍結布伊朗布來朝河西軍即西凉府也伊朗布四世受朝命為酋長雖貢方物未嘗自行今始至獻馬二千餘疋伊朗布自言河西軍東至故原州一千五百里南至雪山吐谷渾蘭州界三百五十里西至甘州同城界六百里北至部落三百里周囬平川二千里舊領姑臧神烏畨禾昌松嘉麟五縣户二萬五千六百九十三口十二萬八千一百九十二今但有漢民三百户城周圍五十里如鳯形相傳李軌舊治也加伊朗布安逺大將軍結布伊朗布即逾龍缽但諸書皆不正言當考之戊午上謂輔臣曰國家所謹儉約為先節用愛人民俗自化張齊賢曰書稱大禹克儉于家老氏三寶儉居其一上之所好下必從之上好儉則國有餘財下不僣則家有餘貲自然亷讓興行盗賊鮮少蚩蚩之衆登于冨夀也臣等恭聞聖訓期共遵守三司上經費之數上曰先帝以財賦國之大本莫不求諸中道而為其永制輔臣曰先帝非止愛人嗇費至于節損服用躬御澣濯之衣蓋前古哲王莫能偕也上初命三司具中外錢穀大數以聞鹽鐡使陳恕久而不進上命輔臣詰之恕曰天子冨于春秋若知府庫充羡恐生侈心故不敢進也上聞而善之此事不得其時因三司上經費數并書之内侍裴愈監三館秘閣書籍嵗久不治命内品劉崇超代之尋詔知制誥朱帛與秘閣校理杜鎬莊宅使劉承珪排整著為目録戊辰西京左藏庫使楊允恭言凖詔估蕃部及諸色進貢馬價請鑄印詔以估馬司印為文置估馬司始此凡市馬之處河東則府州岢嵐軍陜西則秦渭涇原儀環慶階文州鎮戎軍川峽則益黎戎茂雅夔州永康軍皆置務遣官以主之嵗得五千餘匹以布帛茶他物凖其直招馬之處秦渭階文之吐蕃回紇麟府之党項豐州之藏擦勒族環州之巴特瑪家保家宻什克族涇儀延鄜火山保德保安軍唐龍鎮制勝闗之諸蕃每嵗皆給以空名敕書委縁邊長吏擇牙吏入蕃招募詣京師至則估馬司定其直三十五千至八千凡二十三等其蕃部又有直進者自七十五千至二十七千凡三等有獻尚乘者自百一十千至六十千亦三等十二月先是詔給事中柴成務等重定新編敇丙午成務等言曰自唐開元至周顯徳咸有格敇并著簡編國初重定刑統上行編敇四巻洎方隅平定文軌大同太宗臨朝聲教彌逺遂増後敇為太平編敕十五卷淳化中又増後敕為淳化編敕三十卷編緝之始先帝親戒有司務存體要當時臣下不能申明聖意以去繁文今景運重熈孝心善繼自淳化以後宣敕至多命有司别加刪定取刑部大理寺京百司諸路轉運司所受淳化編敕及續降宣敕萬八千五百五十五道徧共披閲凡敇文與刑統令式舊條重出者及一時機宜非永制者并刪去之其條貫禁法當與三司參酌者委本部編次之凡取八百五十六道為新刪定編敕其有止為一事前後累敇者合而為一本是一敕條理數事者各以類分取其條目相因不以年代為次其間文繁意局者量經制事理増損之情輕法重者取約束刑名削去之凡成二百八十六道别為一卷附儀制令違者如違令法本條自有刑名者依本條又以續降赦書徳音九道别為一巻附淳化赦書合為一巻其釐革一州一縣一司一務者各還本司今敇稱依法及行朝典勘斷不定刑名者并准律令格式無本條者准違制令故不躬親被受條區分臣等重加詳定衆議無殊伏請鏤板頒下與律令格式刑統同行優詔褒答之刑部郎中知制誥王禹偁預修太祖實録或言禹偁以私意輕重其間甲寅落職知黄州按禹偁黄州謝上表則此出端坐史事而本傳乃云宰相張齊賢李沆不協意禹偁譖其間故罷職今但從記聞更須考之或云禹偁撰太祖增上徽號冊文語涉譏訕此大誤也江休復云真宗初即位禹偁謁畢相于開封云某事某事舊僚宜有規諷出知黄州此亦誤真宗初即位禹偁實自揚州召入當其責時畢相去開封矣是嵗以如京使栁開知代州開上疏言國家創業將四十年陛下紹二聖之祚精求至治若守舊規斯未盡善能立新法乃顯神機臣以益州稍静望陛下選賢能以鎮之必須望重有威即羣臣畏服又西鄙今雖歸明他日未可必保茍有翻復須得人制禦若以契丹此議為患更深何者契丹則君臣久定蕃漢有分縱萌南顧之心亦須自有思慮西鄙積恨未冺貪心難悛其下猖狂競謀兇惡侵漁未必知足姑息未能感恩望常預備之以良將守其要害以厚賜足其貪婪以撫慰來其情以寛假息其念多命人使西入甘凉厚結其心為我聲援如有動静侵掩令彼有後顧之憂乃可制其輕動今兵革雖衆不及太祖之時人人練習謀臣猛將則又懸殊是以比年西北屢遭侵擾養育則月費甚廣征戰則軍捷未聞誠願訓練禁戢使如往日士伍必求于勇敢指顧無縱于後先失律者悉誅獲功者必賞偏禆主將不威嚴者去之聽斷之暇親臨殿廷更召貔虎使其擊刺馳驟以彰神武之盛臣又以宰相樞宻朝廷大臣委之必無疑用之必至當銓總寮屬評品職官内則主掌百司外則分治四海今京朝官則别置審官供奉殿直則别立三班刑部不令詳斷别立審刑宣徽一司全同㪚地大臣不獲親信小臣乃謂至公至如銀臺一司舊屬樞宻近年改制職掌甚多加倍置人事則依舊别無利害虛有變更臣欲望停審官三班復委中書樞宻宣徽院銀臺司復歸樞宻院審刑院復歸刑部去其繁細省其頭目又京府大都萬方軌則望仍舊貫選委親賢今皇族宗子悉多成長但令優逸無以試才宜委之外藩擇文武忠直之士為左右贊弼之臣又天下州縣官吏不均或冗長至多或歳年久闕欲望縣四千户以上選朝官知三千户以上選京官知省去主簿令縣尉兼領其事自餘通判監軍巡檢監臨使臣并酌量省減免虛費于禄利仍均濟于職方又人情貪競時態輕浮雖骨肉之至親臨勢利而多變同寮之内多或不和伺隙則至于傾危患難則全無相救仁義之風蕩然不復欲望明頒告諭各使改更庶厚化源永敦政本恭惟太祖神武太宗聖文光掩百王威加萬國無賢不用無事不知望陛下開豁聖懷如天如海可斷即斷合行即行愛惜忠直之臣體察奸諛之黨臣久塵著位浸荷恩寵辭狂理拙唯聖明恕之開至州葺城壘戰具諸將多沮議不叶開謂其從子曰吾觀胡星有光雲多從北來犯境上冦將至矣吾聞師克在和今諸將怨我一旦冦至我其危哉因上言請徙他州尋改知忻州
