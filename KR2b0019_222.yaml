body:
  text: 續資治通鑑長編巻二百十八宋李燾撰神宗熈寜三年十二月丁巳朔管勾兩浙路常平等事著作佐郎王醇令審官東院就移合入差遣以殿中丞審官西院主簿張靚代之醇在任不推行新法故也六月二十八日張靚趙子雲並為主簿從韓縝所舉四年四月十八日癸酉醇及林英張峋皆衝替當移此附彼㑹要云以英等在任不推行新法與實録稍異詔全道郴潭衡邵永州桂陽監有溪峒蠻猺處縣主簿尉及逐州監銀銅鉛錫坑冶官令轉運司依川廣七路法就差戊午詔三司歲給濮王宫公用錢五千緡先是詔濮王宫兄弟量剋俸錢奉濮王四仲月祭饗至是宗樸言近制不許剋宗室俸錢故以公錢給之詔宣撫使韓絳不須親至河東上移文往來其非招撫部族開拓疆土勾抽兵馬取索錢糧事更不闗預上批邉事方起河東嵐石隰麟府州最是緩急應援陕西之地近嵗虛屯軍馬頗聞糧草闕乏令三司出錢三十二萬緡或紬絹與轉運司市糴遂下麟府豐石隰五州募人入中上批豐州之北僻逺孤絶城小不可多聚軍馬緩急移餉城堡路亦險艱必自少人入中可令更於定逺客户伏落津寨計置已未内出開封府界及諸路兵更戍之法府界元係河北京東西淮南所差畸零守把兵士京東路元係府界京西所差屯泊兵士京西路元係府界淮南河北京東所差兵士河北路元係京西及府界京東所差兵士河東路元係京東所差兵士陕西路元係京東西河北河東府界所差兵士已上並係畸零屯泊者盡撥還本處其府界京東西以諸路抽回就糧兵填役内京東仍分畨盡如武衛𨽻屬河北四路屯戍京西仍以近西州軍分畨往陕西近南往湖北及䕫州路屯戍其下畨者各於本路守把河北以京東上畨全指揮兵河東以陜西抽回就糧兵陜西以京西上畨全指揮兵填役其河東仍以河北西路所差戍兵立定人數令更互於河北中路及大名府路差撥所有河北三路差撥上件人州軍却以京東上畨兵充役益梓利䕫路見屯泊諸路畸零兵士並候年滿撥還自今更不差撥其益利梓路止於在京及府界互差䕫州路止於湖北京西抽挪如湖北闕兵却以京西戍兵充數以上並直𨽻諸路更不每次降宣先是上批諸路戍兵多是畸零不成隊伍致不整齊因乖紀律及互換差撥絡繹道路往来寒暑公私不以為便故立是法更戍法墨本太簡今從朱本吕公弼傳云公弼議更東南教閲兵以戍二廣稍減北軍之踰嶺者當考然公弼七月壬辰已罷樞宻使新紀書詔立諸路更戍法舊以它路兵互屯者還之舊紀書詔戍兵畸零無隊伍因乖紀律道路往来公私不便立更戍法兵志第五巻三年詔諸路戍兵畸零不成部伍致乖紀律或互遣郡兵更相往来道路艱梗宜悉罷之易以上畨全軍或就糧兵為戍當遣者並𨽻總管司以詔令從事詔閤門今後樞宻都承㫖遇崇政殿坐日令於上殿班後約人奏事庚申封皇第二女為寳慶公主侍御史知雜事謝景温言知青州鄭獬卧病乞别選近臣代之詔知杭州資政殿學士趙抃知青州仍令京東轉運司體量獬疾狀以聞抃至青州時京東旱蝗蝗將及境遇風退飛墮水而盡青州無害青州無害此據本傳體量獬疾究竟如何開封府判官祠部郎中趙瞻知鄧州瞻因出使得奏事上問曰卿爲監司乆乃當知青苗法便也瞻對曰青苗法唐行之於季世擾攘中掊民財誠便今陛下欲為長乆計愛百姓誠不便王安石隂使其黨俞充誘瞻曰當以知雜御史奉待瞻不應由是不得留京師瞻時出使未還也瞻除鄧州墓誌及本傳並不書但載瞻不得留京師出為陜西轉運副使方此時瞻方使北度其將還故有此除瞻使歸亦不赴鄧州仍以開封判官除陜西漕乃眀年三月十四日也供奉官田紹廸等言押甲赴河中府永興軍乞增差使臣上批陜西遞鋪見般銀銅絹及弓弩豈可重増此役遂詔陜西都轉運司簡永興軍及近裏州軍甲輦送逐路更不自京起發詔髙陽闗路上闗駐泊軍馬虛食縁邉糧草緩急勾抽地理不逺恐不必駐於上闗令安撫使詳度以聞究竟如何陜西宣撫使韓絳言延州百姓馬志誠造作妖言謀為不順語連將官禁勘多日取到案欵委轉運使孫坦躬親録問别無飜異已詳酌逐人情罪等第斷遣及與免所斷之人親屬縁坐去訖從之此據中書時政記三年十二月四日庚申事馬志誠再見四年三月十九日甲辰司馬光日記云折繼世以綏州功除左騏驥使果州團練使賞賜無筭去歲病風以御藥使醫傅守視繼世迎妖人馬志誠欲奉之發兵據青澗城指揮使拓䟦忠諫使止之首下獄案驗乆不決子華至延州斬志誠等二十餘人以繼世有功不問辛酉右諫議大夫知鄧州吕誨提舉嵩山崇福宫先是九月上欲移誨知河南命未下而寢誨雖在外遇朝廷有大得失猶言之不置於是以疾求閒故有是命壬戌給空名敕百告五十付陜西宣撫司其告令吕大防臨時撰詞開封府界提㸃司言差官視諸縣官職田頃畝肥瘠立租課不得臨時制定遇灾傷依稅減放從之甲子知制誥楊繪為翰林學士梓州路轉運判官李竦言奉詔令具財用利害伏見江淮荆楚之地民業窳薄率以水田為生地多瀕江帶山髙下不等雖有耕耘之勞而罕勤隄防之利雨暘稍愆常度必罹暵潦之災雖有編敕興復水利指揮而郡縣少能用心詢采臣前任知舒州太湖縣日訪聞諸鄉民田有邉臨溪江者頻歲力耕疾種不潦則旱體問得皆有古來隄堰瀦洩水勢或因積年大水決潰因循不復修葺臣因乗其農隙勸募傍近地主備工料興築民俗始未堅信粗亦勉從凡築成隄岸數處次年積雨溪江暴泛頼新堤障遂免漫溺自昔不植之地一旦遂為膏壤由是令復加増葺衆始恱隨尋屬臣去約太湖所修十未一二以天下計之遺利固亦多矣欲乞特詔郡縣委長吏令佐訪求境内有古來陂堰積年毁壊荒廢者并諸色人具利害興修次第指陳官司預行計置俾因歲豐農暇據占植地利人户以頃畝多少為率勸誘備工料興修或量破廣惠倉斛斗以充口食不得以威刑驅逼并専行覺察公人耆保等接便騷擾俟興築畢工本州申提刑轉運司委官檢視及候秋成的免水旱之患其勸督之官乞依編敕量功利大小特行酬奬元指陳修築人亦與免本户一次色役或户例不該差役之人即量給小可酒稅場務充賞所貴地利不遺民食充衍詔淮南提舉常平廣惠倉司相度施行此據㑹要三年十二月八日事今附本月日淮南倉司相度後當考大理寺丞勾當開封府界常平等事趙子㡬為太子中舎權發遣同提㸃諸縣鎮公事其見任武臣别與差遣先是詔罷諸路武臣提㸃刑獄以文臣代之而府界同提㸃舊亦兼用武臣故并易之趙子㡬已見降知夀州太常丞鞠真卿為太子中允坐前任江西轉運使抑勒百姓以苗米折納錢該去官勿論特責之去年十二月乙亥責夀州今又責御史薛昌朝言成都府路自監司以下飲宴過多無復忌憚詔提㸃刑獄薛繗李元瑜宻體量以聞范純仁謝景温初忤執政事迹當就此附見侍御史知雜事謝景温言近除喬叙湖南路轉運判官聞叙知濮州雷澤縣贓汚狼籍一歲之間斂鄉民之絲萬兩不知所歸詔京東同提㸃刑獄孔宗翰知濮州鄭燾宻體量以聞其後下曹州制勘叙除買絲無罪外但坐嘗賣馬於所監臨有剰利贓杖八十特勒停右諫議大夫李徽之提舉鴻慶宫徽之在病告四年至是乞赴朝參而有是命四年五月十二日上云徽之多大言詔開封府收京城内外貧寒老疾孤幼無依乞丐者分送四福田院額内人日給錢候春暖申中書罷舊紀詔收貧民老幼無依者月給錢至春暮止新紀不書乙丑駙馬都尉成州團練使王師約同管勾三班院國朝主壻未有委以事者上始用師約管勾三班後果稱其職云此據徽宗録王師約傳國朝不委主壻以事當考中書言司農寺定畿縣保甲條制凡十家為一保選主户有材幹心力者一人為保長五十家為一大保選主户最有心力及物産最髙者一人為大保長十大保為一都保仍選主户有行止材勇為衆所伏者二人為都副保正凡選一家兩丁以上通主客為之謂之保丁但推以上皆充單丁老幼疾患女户等並令就近附保兩丁以上更有餘人身力少壯者亦令附保内材勇為衆所伏及物産最髙者充逐保保丁除禁兵器外其餘弓箭等許從便自置習學武藝每一大保逐夜輪差五人於保分内往来廵警遇有賊盜畫時聲鼓報大保長以下同保人户即時救應追捕如賊入别保遞相擊鼓應接襲逐每獲賊除編敕賞格外如告獲竊盜徒以上每名賞錢三千杖以上一千同保内有犯彊竊盜殺人謀殺放火彊姦略人傳習妖教造畜蠱毒知而不告論如五保律其餘事不干已除勑律許人陳告外皆毋得論告知情不知情並與免罪其編敕内鄰保合坐者並依舊條及居停彊盜三人以上經三日同保内鄰人雖不知情亦科不覺察之罪保内如有人户迯移死絶並令申縣如同保不及五户聽併入别保其有外來人户入保居止者亦申縣收入保甲本保内户數足且令附保候及十户即别為一保若本保内有外來行止不眀之人並須覺察收捕送官逐保各置牌拘管人户及保丁姓名如有申報本縣文字並令保長輪差保丁齎送仍乞選官行於開封祥符兩縣團成保甲候成次緒以漸及他縣從之先是同管勾開封府界常平等事趙子㡬言昨任開封府曹官往來畿縣鄉村察問民間疾苦皆以近歲以來㓂盜充斥刼掠公行雖有地分耆壯鄰里大率勢力怯弱與賊不敵縱能告捕赴官其餘徒黨輙行讎報極肆慘毒不可勝言詰其所以稔盜之由皆言自來鄉户各以逺近團為保甲務覺察姦偽止絶㓂盜歲月寖久此法廢弛兼初置保甲所在茍簡别無經乆約束是致凶惡亡命容於其間聚徒乗間公為民患今欲因舊保甲重行櫽括逐縣見户口都數除疾病老幼單丁女户别無附保係籍外其餘主客户兩丁以上自近及逺結為大小諸保各立首領使相部轄如此則富者逸居而不虞㓂刼恃貧者相保以為存貧者土著而有所周給恃富者相保以為生使貧富交相親以樂業者謂無如使之相保之法也所有置保及捕賊賞格保内廵邏更相約束次第條例願陛下赦臣狂愚假以詰盜之權使因職事遍行畿縣得奏差選人一兩員及得選委主簿尉與當職官吏參校舊籍置法於編户之民不獨生聚寜居使桴鼓不鳴若遂行之綿以歲時不為常情狃習所廢規模施設推及天下將為萬世常安之術乃下司農寺詳定至是增損行之二年九月十二日十月五日十二月十三日三年三月十七日四年三月九日朱本於此下云上始欲更立法度即毅然以措置民兵為急務然甚重其事其與執政反覆相論難義勇弓社民兵等事者數矣至是始集其意更創保甲法命行之既而保甲之法備故義勇等條約亦卒㑹歸於一焉新本並削去今從新本朱本又取日録七八項事揔載於此今並掇出名附見本日新舊紀於乙丑並書立保甲法它日上謂王安石曰用募兵與民兵亦無異若役之過苦則亦變矣安石曰役之過苦則變誠然募兵多浮浪不顧死亡之人則其喜禍亂非良農之比然臣已嘗論奏募兵不可全無周官國之勇力之士屬於司右有事則可使為選鋒又令壯士有所覊屬亦所以弭難也上論變義勇為民兵當先悦利其豪傑則衆可敺而聽因言漢髙祖封趙子弟事安石曰何獨漢髙祖先王為天下亦然盖周得天下之父二人則天下從之矣有天下之父有一國之父有一鄉之父能得一鄉之父則足以收一鄉能得一國之父則足以收一國能得天下之父則足以收天下上曰民兵雖善止是妨農事如何安石曰先王以農為兵因鄉遂寓軍旅方其在田什伍已定須有事乃發之以戰守其妨農之時少今邉陲農人則無什伍不知戰守之法又别募民為戍兵盡邉人耕織不足以給衣糧乃至官司轉輸勞費尚患不足遇有警急則募兵反不足以應敵無事則百姓耕種不足以給之豈得為良法也上曰止是民兵未可恃以戰守奈何安石曰唐以前未有黥兵然可以戰守臣以謂募兵與民兵無異顧所用將帥如何爾將帥非難求但人主能察見羣臣情偽善駕御之則人材出而為用而不患無將帥有將帥則不患民兵不為用矣朱本以此事繫之行保甲後日録檢未見今且從朱本縁日録印本及冩本並自三年十月至四年正月揔闕四箇月事也當博求之後檢秘書省國史院本亦只如此中書言開封府優輕場務令府界提㸃及差役司同共出牓召人承買仍限兩月内許諸色人實封投狀委本司收接封掌候限滿當官開拆取着價最髙人給與仍先次於牓内曉示百姓知委從之此據瀘州編録冊熈寜五年二月十三日刑部帖三年十二月九日中書劄子指揮今附本月日實封投買坊場實録未見的月日須别考詳三年十一月七日四年二月一日三月十四日並合參考遍賣天下酒務則在五年二月二十一日詔河北糴便司置勾當官一員令提舉官保舉權知開封府韓維言本府衙司投名及鄉户衙前等人數差遣不均良民頗受其害盖由條例繁雜猾吏縁以舞弄今相度減罷本府鄉户衙前八百三十五人揔減重難十八萬一千餘緡其諸處勾當或召稅户及諸色人或就差見充押録或剏差三司軍將或更不差人從之事既行時以為便乃降詔奬諭鄧綰傳云免衙前八百三十餘人歸農即此事四年正月二十二日注可考丁夘吏部侍郎參知政事韓絳依前官平章事昭文館大學士遣使即軍中拜之賜以手札曰卿其益勵忠誠以副朕素望所有制命宜即欽承又賜以手札曰雖卿少懐忠義有志功名比遣卿西路者朕意實有望於卿必可成就疆事卿其深體眷注勿替初終也右諫議大夫參知政事王安石為禮部侍郎平章事監修國史翰林學士承㫖端明殿學士翰林侍讀學士禮部侍郎王珪守本官參知政事前一日使者數軰召珪至左掖門已闔赴右掖門久之傳㫖啟闗乃得入上御小殿諭以相韓絳王安石因出御批示珪曰已除卿參知政事矣林希野史云王珪參知政事謝景温曰珪徒有浮文執政豈所宜邪上曰珪久次姑容之中書三員韓絳奉使遇齋祠告遂無可押班且當用珪薛昌朝曰執政繫天下輕重豈但充位押班者陛下待執政意何薄也上曰兩制中誰可易珪者昌朝曰臣位賤職卑豈敢預此以臣觀之司馬光豈不賢於珪上曰吾非不知光光待朕薄豈肯為朕用乎昌朝曰陛下何以言之上曰仁宗末年琦弼用事光是時處諫諍侍從未嘗有所避朕用為樞副而不肯受豈非薄我乎昌朝曰人孰不欲富貴今希㫖為利徼倖名位者徧天下光獨勸陛下崇義而絀利非獨言之而又懇辭大用冀以感悟聖心孟子與齊王言仁義而不及利齊人莫如孟子愛王臣謂羣臣愛陛下未有如光者按景温昌朝云云不知何時今附注此須别考詳陜西河東宣撫判官度支員外郎直舍人院吕大防知制誥集賢校理同知諫院鄧綰代李夀朋兼直舎人院夀朋直舎人院未久以文字非工故罷賜布衣陳知彦進士出身試銜知縣王輔同進士出身試銜大郡判司大縣簿尉知彦以樞宻副使吴充翰林學士承㫖王珪薦其辭學輔以太原府敦遣赴闕並試於舎人院中等也日録四年七月八日九日有知彦事宣撫司言鄜州崇儀副使孟徳基自陳前知鎮戎軍嘗召募彊人及欲展北邉壕外五里以來古城其說皆可采用已差徳基權知鎮戎軍替楊文廣文廣權知鄜州乞優遷徳基使額正除文廣徳基上件差遣從之仍遷徳基供備庫使戊辰詔大名府路州軍災傷縣分衙前公人百姓等欠負官物如本户放稅及五分以上實貧闕者權住催理候夏稅豐熟送納三班院言殿直雷珣乞試六韜孫吴兵書義十道仍試騎射中選詔免珣使權邉寨監押廵檢代還依武舉人例差注三班使臣乞試兵書自珣始也舊紀書初聽三班使臣試兵書新紀削去改南北作坊為東西作坊其使副名額亦然軍頭司言備軍元額千九百六十人今闕千一百九十八人詔以千人為額如闕白直以歩軍司剰員代之己已侍御史知雜事謝景温兼考校諸路轉運使提㸃刑獄課績置荆湖南北江南東西路轉運司主管文字官各一員編修中書條例所言内外職員人吏遇大禮加恩並加勲階檢校官憲銜及軍員諸班殿直殿侍自來加恩或加功臣食邑盖襲唐末敝法紊亂名分並乞寢罷其將校帶遥郡以上係中書給勑告者即因遷官改職任就與加恩從之仍詔將校未經加恩者遇大禮與加十一月乙未條例所初建請今行之詔京東路提㸃刑獄提舉常平官分詣災傷州軍體量昨檢校放稅賦有未盡分數致人户艱於輸納處令據見欠數並倚閣是日十三日己巳此據御集知太原府吕公弼言种諤申乞下鄜府軍馬司發兵與諤㑹銀夏州收接歸順蕃族望朝廷明降指揮詔公弼一聽宣撫司處分樞宻使文彦博等又奏欲令公弼如諤所請速差麟府軍馬司元定得力將官領兵㑹諤仍多募鄉導逺設斥堠無致墮賊姦計詔依此與約束庚午宣撫司言延慶環三州義勇節級已上係第三等户有田瘠薄無力買馬者並乞官給馬一匹若死即令自備償從之權成都府路轉運使兵部員外郎直集賢院范純仁為陜西河東宣撫判官韓絳引純仁自助樞宻院得㫖差至中書寢不行王安石惡純仁不附己也涇原路經略司言夏人夜引輕騎過邉壕抄掠鎮戎軍三川寨獨冡堡弓箭手廵檢趙普伏兵壕外邀其歸擊之獲馬十二匹而還上批觀其應敵頗有智數可遷普一資舊紀夏人㓂鎮戎軍廵檢趙普敗之新紀不書右諫議大夫宋敏求為史館修撰敏求既罷知制誥以本官奉朝請逾七月乃有是命四月壬午二十二日敏求罷知誥四年九月加集學録故宰相盧多遜孫戒為試將作監主簿壬申右諫議大夫宋敏求等言淳化二年詔正月一日御殿皇帝更衣再坐執圭俟太尉進酒差官受圭第四盞畢進圭其後有司失於奏請再坐上夀遂不執圭今欲如舊儀正至御殿朝臣自太子中舎洗馬以上及攝南班官皆得赴坐賜酒惟宗室大將軍以上至率府副率不與坐亦無侍立眀文當賜酒時徘徊階陛班列不肅縁是日宗室正任以上亦皆赴坐今欲令將軍以上赴坐率府副率以上隨班上夀訖先退並從之廣南西路經略司言交趾使人李繼元乞進方物今其兵丁刼掠省地乞令先歸所掠人口乃許依例引伴進奉人赴闕是日召樞宻使文彦博等對資政殿彦博等上在京開封府界及京東等路禁軍數上亦自内出治平中兵數參照顧問久之遂詔殿前司虎翼除水軍一指揮外存六千指揮各以五百人為額總計三萬四百人在京增廣勇五指揮共二千人開封府界定六萬二千人京東五萬一千二百人兩浙四千人江東五千二百人江西六千八百人湖南八千三百人湖北萬二千人福建四千五百人廣南東西各千二百人川峽三路共四千四百人為額在京其餘指揮并河東陜西京西淮南路前已撥併其河北以人數尚多須後議治平四年閏三月二十二日熈寜元年十月末二年十月十二日三年十一月二十三日並合參考癸酉詔聞福建路災傷不減放稅賦物價踊貴令發運使羅拯以廵按為名乗驛往體量丙子韓絳言方委种諤乗機進取乞免令赴闕從之此據御集諤十月六日令赴闕於是絳駐延州命諤往城婁聴以便宜招納討擊領兵二萬出無定川四路經略司皆毋得干預諸將聽諤節制權宣撫判官趙卨極言大舉非䇿且曰婁孤絶亡水草糧道阻絶不早棄徒資㓂耳絳不從初絳檄河東發兵與諤㑹銀州有不如期令諤斬其將然河東兵由麟州神木砦趍生界度十五日僅得至銀州諤但與期五日河東兵洶洶以為言卨指圖白絳曰麟銀地里非五日可至且深入賊境猝遇賊柰何此諤姦謀詭稱横山民欲歸漢先製青巾二萬金帛稱是以待降者其實誕謾隂籍河東兵驅廹河外石州部族來降指為横山之民也絳憂之欲追諤恐不禀命卨謂絳宜檄諤趣領衆自銀州趍中路迎接河東兵揣諤必不敢踐生界顧自違節制其敢復斬人絳從之諤果不行而河東兵竟踰半月始㑹銀州此據种諤本傳并范百禄所為趙卨墓銘卨權宣判此據范百禄墓銘及卨本傳皆稱詔㫖然實録并御集並無其事疑是絳辟范純仁不從朝廷暫委卨也當考龍圖閣直學士吕居簡卒丁丑天章閣待制李師中為龍圖閣直學士知河南府代王陶也以陶知汝州主客員外郎監宣州鹽稅蔣之竒權福建路轉運判官之竒初責道州以表哀謝上覽表知其有母而憐之詔移近地遂改宣州居道州才五月也於是擢付漕事盖使行新法云詔宣徽使郭逵序位參知政事樞宻副使之下逵被召赴闕自言故事參知政事樞宻副使宣徽使以入先後為序今請立其下故從之侍御史知雜事謝景温言知瀛州龍圖閣直學士張燾軍政不修燕飲無度詔監司體量以聞燾尋以母䘮去詔廣南攝官月俸錢三千可增二千仍支實錢先是中書請廣南攝官委轉運司二年一次差官考試分五場毎試公案五道每道刑名五七件取合格人差攝不中者許再試故增俸以勵之新紀書增廣南攝官俸舊紀文繁合從新紀又詔審官東西院三班院流内銓主簿看詳本司條制有未便事如何裁定刪去繁複務令眀白可以經久施行其簿書如何增損具畫一條上又詔近指揮陜西河東諸路如有夏國投來蕃部不以多少並令接納厚加存撫近日惟鄜延環慶屢奏投來人户而諸路並不知有無可詢具實封以聞河北屯田司言保州閉北竒水口居民張用張吉張澄鳴鼓集衆遮止乞流配中書擬配用衛州吉懐州澄澶州編管上批配過河與淮南朱本以此段事小削去新本復存之戊寅虞部員外郎蘇澄駕部員外郎馬玘並通判河南府時初行免役法欲省西京諸縣特選澄等委之馬玘十月十八日赴宣司備提舉義勇太子中允李定為崇政殿說書定固辭尋改授集賢校理檢正中書吏房公事定固辭改授據㑹要并附此月二十二日當考明年四月二十一日乃以集校檢吏賜西蕃董戬詔并衣帶鞍馬先是秦鳯路言昨夏人聚兵犯環慶諜報西蕃董戬嘗乗虚深入其境殺獲甚多朝廷下其事令韓縝參驗既而上批蔡挺所奏董戬事與縝探報頗同可賜詔奬激之仍遣使臣押賜故有是詔己夘三司言儀鸞司闕條氊三千乞下河東製造上批前日提舉司言物料庫牛羊司所蓄氊毛舊以給宗室嫁娶昨一例折支錢今已委積數萬斤皆同糞壤三司不以見在物料為之而逺勤民力於河東可令據見在并自今所收白羊毛擀造其褥骨之類即許用黒毛代之庚辰命王安石提舉編修三司令式并勑及諸司庫務歲計條例翰林學士元絳權三司使李肅之權發遣鹽鐡副使傅堯俞權户部副使張景憲度支副使王靖同修起居注李夀朋集賢校理陳繹並同詳定太子右贊善大夫吕嘉問光禄寺丞楊蟠崇文院校書唐坰權許州觀察推官王覿三司推勘公事喬執中檢法官李深勾當公事張端著作佐郎趙藴周直孺均州軍事判官孫亶並為刪定官覿秦州人也孫亶周直孺趙藴張端已見李深喬執中已見王覿秦州人唐坰已見吕嘉問已見李壽朋已見傅堯俞已見王靖旦孫已見張景憲師徳子已見樞宻都承㫖李評等上本院吏收補校試賞罰之法詔依所定上批陜西縁邉修葺城寨所役廂軍數不少本路廂軍近年逃亡頗多役使不足兼累有重難般運糧草之類極為疲之可勘㑹諸河功役當於陜西河東京東差者並權罷令併力以完邉備詔京朝官合入川廣福建如祖父母篤疾無兼侍雖年未及七十許召保官與家便差遣辛巳編修中書條例所言人臣非有罪惡致仕而去人君視遇之如在位之時禮也近世致仕者並與轉官盖以士多昧利而少知退之人欲加優恩以示勸奬推行巳久且合依例施行至於舊例兩省正言以上官三班使臣大使臣横行正任等並不除為致仕官及致仕帶職者並須落職而復優遷其官看詳别無義理但致恩例不均如諫議大夫不可改給事中並轉工部侍郎乃是超轉兩資又如吏部工部尚書並除太子少保乃是超轉六資至知制誥待制官卑者除卿監縁知制誥待制待遇非與卿監為比今他官致仕皆得遷官此獨因致仕更見退抑以至供奉官侍禁本八品除率府副率並同六品諸司副使承制崇班七品除將軍乃三品至於節度使除上將軍防禦團練使刺史並除大將軍縁諸衛名額不一至有刺史除官髙於防禦使者今若令文武官帶職人致仕者並許依舊帶職止轉一官及文臣正銜武臣借職以上皆得除為致仕官即不致輕重不等以至選人令録以上並除朝官經恩皆得封贈䕃及數世旁支例得贖罪免役又京官致仕亦止遷一官若光禄寺丞致仕有出身除祕書省著作佐郎無出身除大理寺丞而令録職官乃除太子中允或中舎殊未為當及進納出身人例除京官至有經覃恩遷至陞朝官者類多并兼有力之家皆免州縣色役及封贈父母如京官七品除衙前外亦免餘色役尤為僥倖條例繁雜無所適從如録事參軍或除衛尉寺丞或除大理評事或除奉禮郎恩例不同可以因縁生弊今定凡文臣京朝官以上各轉一官帶職仍舊條許不轉官乞親屬恩澤者依舊條選人依本資序轉合入京朝官進納及流外人判司簿尉除别駕在京諸司勒留官依主簿尉以上親賢勞舊合别推恩者取㫖歴任有入已贓不得乞親戚恩澤仍不遷官其致仕官除中書樞宻院外並在見任官之上致仕及三年以上元非因過犯年未及七十不曾經叙封及陳乞親戚恩澤却願仕官並許進狀叙述并有人薦舉者各依元資序授官其才行為衆所知朝廷特任使不拘此法從之自此宰相以下並帶職致仕議者不以為是自此宰相以下並帶職致仕議者不以為是元祐史官之論也紹聖本已削去新本復存之今從新本元祐史官不以為是當考新紀書許致仕官仍帶職舊紀不書詔令都水監每年直牒三班審官院差使臣監淘公私河渠更不逐年降宣壬午遼主遣秦州觀察使蕭遵道太常少卿直乾文閣楊規訓其母遣奉國軍節度使耶律寜起居郎知制誥成堯錫來賀正旦癸未宣撫使韓絳言陜西用兵之際切要準備縁邉糧草而又鹽馬一司頗失規例鈔法益輕伏見薛向通知闗陜錢鹽移用之術乞增差充陜西都轉運使候事息復令管勾東西財利詔以向為陜西河東路宣撫副使中書言知制誥吕大防見為判官職在待制上恐亦當改副使上批宰相充使自來班著降一等者惟參知政事樞宻副使及宣徽使今大防與向止是知制誥待制可並充判官向領發運如故未至京師復詔還職京西轉運司言許州長社等縣有牧馬草地四百餘頃先為不堪牧放權聽人租佃今相度可收入官決邢山潩河石限等水溉種稻田從之以下溪州彭師晏所歸仕義侵地為鎮溪寨仍賜知辰州文思副使張宗義勑書奬諭及銀絹各五十以宗義招納師晏及築鎮溪寨有勞也尋又遷左藏庫副使宗義遷官在明年正月二十八日今并書于此九年正月乙夘師晏降詔原渭州徳順軍自今三年買馬三萬匹買馬官以十分為率買及六分七釐轉一官餘三分三釐均為三等毎增一等更減磨勘一年歲給三司及成都府梓利州三路納絹共十萬與陜西賣鹽錢相兼償馬價初三州軍買馬三年共萬七千一百匹而羣牧判官王誨言嘉祐六年以前秦州上京劵馬歲不下萬四五千匹嘉祐七年置買馬司於原渭徳順三州軍皆選良馬售以髙價於是劵馬法壊類多死損枉費錢帛請令原渭徳順増買歲共一萬匹使臣優加酬奬及出錢帛以償馬價故有是詔司馬光奏䟽曰臣以不材誤承朝廷委用待罪長安兼領一路十州兵民大柄朝辭之日伏䝉陛下面諭以凡邉防事機及朝廷得失有所聞見令一一奏聞臣受命以來且愧且懼所愧者聖知深厚責任至重所懼者知識淺短無以堪稱夙夜疚心不敢寜居臣自入境以來見流移之民道路相望詢訪閭里皆云今夏大旱禾苗枯瘁河渭以北絶無所收獨南山之下稍有所存而入秋霖雨經月不霽禾雖有穂往往無實雖有實往往無米率皆細黑一斗之粟舂簸之後不過得米三四升穀價踊貴民間累年困於科調素無蓄積不能相贍以此須至分房減口就食西京襄鄧商虢等州或傭債客作或燒炭采薪或乞匄剽竊以度朝夕當此之際國家惟宜鎮之以静省息諸事減節用度則租稅自輕繇役自少逋負自寛科率自止四患既除民力自足民財自饒閭里自安流亡自還固不待陛下憂勤於中宰相劬勞於外然後人人得其所也苟或不然國家雖欲輕租稅寛逋負其所費之財何由可得雖欲少繇役止科率其所營之事何由可成四患不除雖日下恩澤之詔民猶不免於流移轉死也盖欲止沸者莫若絶薪欲安民者莫若省事此目前之驗非難知也臣到官以來伏見朝廷及宣撫等司指揮分義勇作四畨欲令以次於縁邊戍守選諸軍驍銳及募閭里惡少以為竒兵造乾糧􅀈飯布囊刀車以備餽運悉取歲賜秉常之物散給縁邉諸路又竭内地府軍甲兵財物以助之且以永興一路言之所發人馬甲八千副錢九萬貫銀二萬三千兩銀椀六千枚其餘細𤨏之物不可勝數動皆廹以軍期上下相驅急於星火官吏狼狽下民驚疑皆云國家將以來春大舉六師長驅深入以討秉常之罪臣以踈賤不得預聞廟堂之議未知兹事為虚為實昨者親承徳音以為方今邉計惟宜謹嚴守備俟其入㓂則堅壁清野使之來無所得兵疲食盡可以坐收其敝臣退而思念聖謀髙逺深得王者御外國之道實天下之福及到闗中乃見凡百處置皆為出征調度臣不知有司在外不諭聖意以致有此張皇將陛下黙運神算不令愚賤之臣得聞其實也臣不勝惶惑晝則忘食夜則廢寢心寒股栗竊為陛下危之夫兵者凶器聖人不得已而用之自古以來國家富强將良卒精因人主好戰不已以致危亂者多况今公私困竭將愚卒懦乃欲驅之塞外以捕狡悍之敵其無功必矣豈惟無功兼後患甚多不可盡言也若朝廷初無出征之意則何為坐散府庫之財疲生民之力訖無分毫之事萬一將來敵騎入㓂府庫已竭民力已困將何以禦之臣先任御史中丞日朝廷將興綏州之後臣曾上言國家先當舉百職修庶政安百姓實倉庫選將帥立軍法練士卒精器械八事皆備然後可以征伐四外今此八事未有一者勝於曩時而况闗中飢饉十室九空為賊盜者紛紛已多縣官倉庫之積所餘無㡬乃欲輕動大衆横挑猛敵此臣之所大懼也或者又云國家未討秉常先欲試兵誅一小族若果如此猶為不可何則今者竭闗中之財力大興師衆乃捨有罪之强㓂誅無辜之小種勝之不武不勝為笑將無以復號令外國矣此二䇿者皆為不可伏望陛下深鑒安危之機消之於未萌救之於未形速下眀詔撫諭闗中之民以朝廷不為出征之計其義勇更不分畨於縁邉戍守亦不選募竒兵凡諸調發為饋運之具者悉令停罷愛惜内地倉庫之儲以備春深賙救飢窮之人如此豈惟生民之幸亦社稷之福也臣不勝憂廹直輸赤誠惟陛下裁察此䟽不得其時光以十月十九日面謝於崇政殿又永興謝上表云今月十四日到任表稱今月必十一月也䟽稱今夏大旱盖三年夏也又稱今春大舉則當是四年春矣既先稱今夏即不當更稱今春疑今春字當作來春此䟽或以十一月末或十二月間上也姑附十二月末更須詳考富弼言弼所言據劄子集見于此竊知陜西用武諸路入討至今已是數月調發輸斂不無勞費陛下躬親萬務勤於訪逮臣所恨未能一効死力少寛陛下西顧之憂且念靈夏數州自太宗割賜之後㡬及百年所存惟是空壘而已今所得城壁竊恐未償所費既已克下又須守禦自此勞費卒無已時臣又有愚慮者伏縁西夏與北敵視朝廷常為犄角之勢盖北敵山前後十八州每恐朝廷有復取之意慶厯初因元昊叛仁宗不免討伐而北敵遂有嫚書興割地之隙其書大意自謂我與西夏是舅甥之國南朝不合加兵臣不能盡記其辭惟記一句云殊無忌器之嫌此大可見其意也臣其時兩使北廷每見元昊遣人在彼宻令詢問云來借兵此皆臣始末親經目覩不是剽聞以昔校今不敢謂必無此事今北敵亦須疑朝廷既平西夏即移兵北伐必有借助西夏之謀不可不過慮及此也更或二敵相應兩下起事即國用人力如何枝梧其間軍情民心須常加防察不可使至於此極也况今天威已振王師已捷或且令退修邉備講守禦之䇿更俟表裏完葺别圖後舉以為萬全之計亦為未晚伏乞陛下特賜詳擇而審處之四年二月五日弼已為趙濟所劾六月二十一日罷使相此劄子首云臣自去冬十一月乞罷使相三詔不允去冬盖指二年則此劄子必三年事但所稱王師之捷不審是何處今臆度附司馬光䟽後韓絳既出使其初亦必屢以捷聞但實録不詳耳是歲宗室子賜名授官者四十五人斷大辟三千五百二十三人新舊紀並書是歲河北陜西旱飢詔賑䘏之交趾入貢廣源下溪州蠻内附下溪見十二月二十七日餘各見本月日此不别書
