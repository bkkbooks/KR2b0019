body:
  text: 續資治通鑑長編卷一百二十六宋李燾撰仁宗康定元年春正月丙辰朔日有食之知諫院富弼請罷宴徹樂雖契丹使在館亦宜就賜飲食而已參知政事宋庠以為不可弼曰萬一契丹行之為朝廷羞後使契丹還者云契丹罷宴如弼言上深悔之弼熙寧初久旱乞罷御筵指名宋庠勸仁宗不納其言今從之壬戌賜國子監學田五十頃甲子權增涇州通判一員鄜延環慶經略司言元昊遣偽供僃庫使美英多吉等至境上欲議通和詔所上表如不虧臣禮即受之癸酉初用范雍奏賞破後橋寨及討蕩吳家等族帳之功環慶路鈐轄洛苑使髙繼隆為左藏庫使知慶州禮賔使張崇俊為洛苑使柔逺寨主左侍禁閣門祗候武英為內殿承制淮安鎮都監西頭供奉官閣門祗候劉政比路巡檢使左侍禁閣門祗候郝仁禹並為內殿崇班東谷寨主右侍禁賈慶柔逺寨監押右侍禁王慶並為西頭供奉官東谷寨監押三班奉職張立為左班殿直仍詔戰沒及被傷軍士月給外别賜兩月錢糧西夏傳云繼隆崇俊攻後橋英入自北門拔之英本傳乃不詳傳蓋因范雍所奏也記聞云康定元年正月十八日鄜延環慶路經略使范雍奏體量到洛苑使環慶路鈐轄髙繼隆禮賔使環慶路駐泊鈐轄知慶州張崇俊領本部兵馬入西賊界打破賊後橋寨先令蕃官奉職巡檢李明領蕃部圍寨繼隆崇俊領本軍繼進與賊鬬敵相殺又擘兵甲令柔逺寨主左侍禁閣門祗候武英監押左侍禁王慶東谷寨監押奉職張立左侍禁閣門祗候北路都巡檢郝仁禹攻打寨城其武英先打破寨北門入城又令淮安鎮都監西頭供奉官閣門祗候劉政東谷寨主左侍禁賈慶各部領兵馬入賊界駐泊牽拽策應西破蕩却吳家外藏克金舍利遇家等族帳又領入內頭供奉官走馬承受公事石全政把截十二盤路口其殿侍軍員兵士及蕃官使喚得力或斫倒人頭或身中重傷係第一等功勞者凡一百一十五人伏乞體念今來此賊不往來沿邉作過正當用人之際各轉補名目所貴激賞邉臣及將士各更效命奉聖旨髙繼隆張崇俊於見今使額上各轉七資劉政郝仁禹以下各轉官有差初西賊自承平寨退聲言將攻延州此據司馬光記聞又許懷德傳云賊攻承平寨不克去屠金明縣復進圍延州懷德遽還夜遣禆將以步騎千人出不意擊之斬首二百級遂入延州按賊以去年十一月攻承平寨今年正月乃屠金明縣其間相距凡兩月餘必不自承平即抵金明懷德傳聫書之恐非事實固當以司馬記聞為正范雍聞之懼甚即奏疏言延州最當賊衝地闊而寨柵踈土兵寡弱又無宿將為用請濟師疏入未報疏已載去年末而元昊詐遣人乞和雍信之不為僃元昊乃盛兵攻保安軍自土門路入壬申聲言取金明寨李士彬嚴兵以待之夜分不至士彬釋甲而寢翌日奄至士彬父子俱被擒遂乘勝抵延州城下雍先以檄召鄜延環慶副都部署劉平於慶州使至保安與鄜延副都部署石元孫合軍趨土門及是雍復召平元孫還軍救延州平得雍初檄即率騎兵三千發慶州行四日至保安與元孫合軍趨土門有蕃官言賊已入塞直指金明而雍後檄尋到元孫遂引還乙亥復至保安素輕賊謂其下曰義士赴人之急蹈湯火猶平地况國士乎因晝夜倍道兼行丁丑至萬安鎮平元孫領騎兵先發步軍繼進夜至三川口西十里止營令騎兵先趨延州奪門時鄜延都監黃德和將二千餘人屯保安北碎金谷巡檢万俟政郭遵各將所部分屯雍皆召之為外援平亦使人趣其行戊寅旦步兵未至與元孫還逆之行二十里乃遇步兵及德和政遵所將兵悉至五將合步騎萬餘結陳東行五里平令諸軍齊進至三川口遇賊時平地雪數寸平與賊皆為偃月陳相嚮有頃賊兵涉水為橫陳遵及忠佐王信薄之不能入官軍爭奮殺賊騎五七百人乃退賊復蔽盾為陳官軍亦擊却之奪盾殺獲及溺死者又八九百人平左耳右脛皆中流矢日暮戰士上首級及所獲馬論功平曰戰方急且自記之悉當賞汝語未已賊以輕兵薄戰官軍却引二十餘步黃德和居陳後見軍却率麾下軍走保西南山衆軍隨皆潰平遣其子宜孫馳追德和執其轡拜之曰當勒兵還并力拒賊奈何先引去德和不從遂策馬遁與宜孫皆趣甘泉平遣軍校以劍遮留士卒得千餘人力戰拒賊賊退還水東平率餘衆保西南山下立七寨自固距賊一里所賊夜使人至寨問主將所在平戒軍士勿應復使人詐為戍卒送文牒者至則殺之夜四鼓環寨大呼曰幾許殘卒不降何待平使人應之曰狗賊汝不降我何降也明日救兵大至汝衆庸足破乎已卯賊黎明復呼曰汝降乎不然當盡死又使人應之曰汝欲和者當為汝言之於朝賊舉鞭麾騎自山四出合擊官軍平與元孫巡陳東偏賊衝陳分為二遂與元孫皆被執賊圍延州凡七日及失二將城中憂沮不知所為會是夕大雪賊解去城得不陷万俟政慶州東路都巡檢三月乙卯贈子官郭遵開封人延州西路都巡檢使三月癸酉贈官王信太原人御前忠佐龍衛都虞候兼鄜延巡檢劉平石元孫被執實録稱是月十九日按司馬光記聞及趙珣聚米圖經皆不然光所記日尤詳且與珣合今從之王稱東都事略元昊圍延州劉平石元孫與賊戰於三川口王師敗績平死之驍騎左第一都指揮使郭能杖脊除名配許州員僚剩員直案五字疑有錯誤能戍鄜延路而臨陳退走法當死特貸之庚辰鄜延走馬承受薛文仲入奏元昊寇安逺寨六宅使化州刺史金明縣都監李士彬與其子左班殿直懷寶並戰沒詔鄜延副都部署石元孫都監黃德和領兵防邊鄜延環慶副都部署劉平援之其士彬所部蕃漢人户仍令延州亟加招集時朝廷猶未知延州被圍平等已敗故也士彬世守金明有兵近十萬人延州專使控扼中路衆號鐡壁相公夏人畏之元昊叛遣使誘士彬士彬殺之元昊乃使其民詐降士彬士彬白范雍請徙置南方雍曰討而禽之孰若招而致之乃賞以金帛使𨽻士彬於是降者日至分𨽻諸寨甚衆元昊使其諸將每與士彬遇輒不戰而走曰吾士卒聞鐡壁相公名莫不膽墜於地狼狽奔走不可禁止也士彬由是益驕又以嚴酷御下而多所侵欲其下多怨憤者元昊乃隂以金爵誘其所部渠帥往往受之而士彬不知是春元昊遣衙校賀真來見范雍自言欲改過歸命朝廷雍喜厚禮而遣之凡先所獲俘梟首于市者皆斂而葬之官為致祭真既出境賊騎大入諸降賊皆為內應士彬時在黃堆寨聞賊至索馬左右以弱馬進遂鞚以詣元昊與其子懷寶俱陷沒士彬先使其腹心且多軍主以珠帶示母妻使逃母妻䇿馬奔延州范雍猶疑之使人詗賊皆為所禽雍初聞賊大舉令士彬分兵守三十六寨勿令賊得入懷寶諌曰今當聚兵禦冦分則勢弱不能支也士彬不從懷寶遂力戰死或曰元昊得士彬割其耳而不殺後十餘年乃卒於賊中此據司馬光記聞又按聚米圖經云元昊本舉兵趨延州延州悉發兵捍東西兩路士彬所部兵既分保極邉小寨但以數千人屯黑兒寨賊併兵入中路衆寡不敵一日間三十餘寨盡破士彬父子俱死與記聞不同今附見此更俟考詳壬午賜鄜延環慶涇原秦鳳麟府并代嵐石隰州戍卒緡錢新知滑州引進使郢州防禦使魏昭昞知同州尋加鄜州觀察使知諫院富弼言昭昞乳臭兒必敗又言殿前副都指揮使鄭守忠馬軍副都指揮使髙化故親事官皆奴才小人不可用不報此據富弼神道碑碑云昭昞以觀察使知同州而實録但書防禦使及四月責降乃書觀察使不知何時遷改據本傳云徙同州改觀察使亦無月日恐相繼即有此命故碑云爾今附見碑又云弼論鄭守忠髙化故親事官皆奴才小人不可用為殿前都指揮使步軍都指揮使按守忠為殿前副帥化為馬軍副帥乃景祐四年閠四月弼此時未知諫院今年十二月守忠罷殿前副帥除安逺節度知徐州化自馬軍副帥代守忠為殿前副帥又與碑不合因昭昞知同州並附見更須考詳癸未朝廷始知劉平石元孫等兵敗被執延州奏到故也詔陜西轉運使明鎬往鄜州同河中府點募強壯以備邉上召左侍禁閣門祗候魯經對便殿欲再遣使嘉勒斯賚經辭不行甲申降為右班殿直落職監吉州稅乙酉詔陜西州軍有勇敢智謀之士識西賊情偽與山川要害攻取方略者悉詣所在自陳敦遣赴京師選京東淮南兩浙諸州本城兵士分𨽻禁軍增自京至陜府馬遞四十四鋪驛馬募京城內外捕索元昊刺事人獲一名者賞錢三十萬公人仍轉兩資百姓優與廂鎮知而不告者法外重誅之其妻孥仍配廣南編管二月丙戌朔詔并代副部署孫亷趨鄜延界併力擊賊仍令秦鳳涇原鄜延環慶部署左右援之先是環州趙振慶州髙繼隆以經略司檄各出兵救延州及至賊已出境亷被詔繼往未至延州賊出境蓋踰月矣實録於丙戌書此又於丁亥書徙并代副部署馬軍都虞候英州防禦使孫亷知河中府按此時楊偕知河中尋與陜州狄棐兩易又按亷附傳亦不載其嘗知河中又實録四月亷自馬候英防遷殿候並不載其知河中五月乃書徙知河中殿候英防孫亷為環慶副部署恐亷雖曽除知河中實未起發即改環慶部署也不然狄棐何以與楊偕兩易今削不著以示疑亷等兵至延州賊出界已一月餘日此據聚米經劉平石元孫敗黃德和誣奏兩人降賊知樞密事夏守贇頗辨其枉引康保裔事為質自請將兵擊賊丁亥換宣徽南院使陕西都部署兼經略安撫等使仍以入內供奉官勾當御藥院張德明黎用信為陜西都大管勾走馬承受公事掌御劔隨之參知政事宋庠請嚴守備於潼關從之知諌院富弼言天子守在西夷今城潼關自關以西為棄之耶己丑皇城使文州防禦使入內副都知王守忠領梓州觀察使為陜西都鈐轄知諌院富弼言唐代之衰始疑將帥遂以內臣監軍取敗非一今守忠為都鈐轄與監軍何異昨用夏守贇已失人望願罷守忠勿遣不聼神道碑及實録附傳並云詔罷守忠不遣按守忠以二月受命赴陜西五月乃自陜西罷赴闕碑傳皆誤矣或弼上言在五月間守忠卒因言故罷當考四方館使果州團練使鄜延鈐轄知鄜州張宗誨領興州防禦使仍許便宜從事劉平石元孫之敗黃德和遁還鄜州時鄜城不完且無備傳言虜騎將至人心惴恐宗誨乃嚴斥候籍入而禁出使老幼各任其力守禦之計備虜亦自引去德和正月二十五日到鄜州張宗誨附傳及正傳云德和遁還延州不納又走鄜州宗誨曰軍奔將懼而無所歸亂也乃納之拘德和以聞此蓋因尹洙所為宗誨墓志按實録載德和事云德和遁至甘泉掠居民七日至鄜州誣奏劉平等又與宗誨同問王信以平所在此時宗誨實未嘗拘德和也及德和還延州范雍即使人代領其衆遣歸鄜州聼命所稱宗誨拘德和當在此時德和前至尚有部曲又自稱力戰得脫宗誨何緣不納後至則范雍既奪其兵安能作亂墓志所云軍奔將懼而無所歸亂也蓋飾説爾附傳及正傳考之不詳遂承用之誤矣今削去宗誨拘德和事迹且德和見劉平等戰稍却即先遁去其意必謂延州危急將旦暮陷安肯却入延州及延州圍解乃自鄜州復還延州范雍已劾其罪固應不納遣還鄜州聼命則為宗誨所拘其理勢亦當然也禁僧道往河東及度潼關以西庚寅詔嘉勒斯賚速領軍馬乘元昊空國入冦徑往拔其根本若成功當授銀夏節制仍密以起兵日報緣邉經略安撫司出師為援别賜襲衣金帶絹二萬匹雖被詔然卒不能行也陜西轉運使兵部員外郎直史館明鎬為工部郎中陜西隨軍轉運使仍聼與夏守贇王守忠同議邉事辛卯天文官李自正上星變圖且言月與太白俱犯昴當有邉兵大起上謂輔臣曰隂陽占候中否參半紂以甲子亡武王以甲子興王者當祗畏天道要在人事應之何如耳壬辰命夏守贇兼緣邉招討使宰臣張士遜等言禁兵戍邉久其家在京師者或不能自存既退上召內侍就殿隅索紙筆自指揮使而下條為數等復召士遜等示之曰朕不欲費三司特出內藏緡錢十萬以賜之士遜等因請遣使安撫陜西於是起居舍人知制誥韓琦適自蜀歸論西兵形勢甚悉即命琦為陜西安撫使上謂琦曰異類猖獗官軍不習戰故數出無功今因小警乃開後福癸巳西上閣門副使符惟忠為陜西安撫副使詔延州戰沒軍士官為瘞埋祭酬之賜自京至陜西馬遞急腳鋪卒緡錢甲午祕書丞通判鎮戎軍管勾隨軍糧草田京簽書陜西經略判官事從夏守贇之請也京本傳云守贇罷經略京還闕應運籌決勝科不就試去又參夏竦軍事與朝宗慤議不當大舉及任福敗責通判廬州不知參夏竦軍事是何時其議不當大舉附十二月乙巳詔京畿京東西淮南陜西路括市戰馬馬自四尺六寸至四尺一寸其直自五十千至二十千凡五等敢輒隱者重置之法宰臣樞密使聼畜馬七參知政事樞密副使五尚書學士至知雜閣門使以上升朝官閣門祗候以上二餘命官至諸司職員寺觀主首皆一節度使至刺史殿前馬步軍都指揮使至軍頭司散員副兵馬使皆勿括出內庫珠償民馬直又禁邉臣私市闕者官給出內庫珠還馬直乃月末事今從本志并書本志云並邉七州軍免括馬蓋此後事今削去韓琦言陜西科擾頻仍民已不勝其困請免括此一路安衆心從之此據家傳丙申徙知河中府龍圖閣直學士楊偕知陜州偕與夏竦議不協故徙之偕初聞劉平石元孫戰沒乃偽為書馳告延州曰朝廷遣救兵十萬至矣命傍郡縣大具芻糧什器以俟比書至賊已解去及竦節制陜西韓琦又言偕當避竦乃詔與河東都轉運使髙覿換任覿仍加集賢院學士徙河東在六月辛亥今併書之詔民間以喪柩寓僧寺而久不能收葬者官為埋瘞之又詔陜西所募強壯止留捍守城池毋得遣戍邉又詔京朝官選人三班使臣有文武器幹者並許經所屬官司自陳當量材試用諸路轉運使提點刑獄其察訪習知邉事者以名聞丁酉詔樞密院自今邉事並與宰相張士遜章得象參議之即不須簽檢國朝舊制以中書制民樞密主兵故元昊反邉奏皆不關中書翰林學士丁度嘗建言古之號令必出於一今二府分兵民之政若措置乖異則天下無適從非國體也請軍旅重務二府得通議之知諌院富弼又言邉事係國安危不當專委樞密院而宰相不與乞如國初令宰相兼樞密使上參取其言而降是詔士遜等以詔納上前曰恐樞密院謂臣等奪權弼曰此宰相避事爾非畏奪權也時西蕃首領䇿卜騰沁沙克䇿卜騰善沁自嘉勒斯賚界各稱偽將相來降詔補三班奉職借職羇置湖南弼言二人之降其家已誅夷當厚賞以勸來者上命以所言送中書弼見宰相論之宰相初不知也弼嘆曰此豈小事而宰相不知耶更極論之士遜等乃不敢辭左千牛衛大將軍綿州刺史從誨等六人上言幸託肺腑尸厚祿顧無以自效願得從邉以捍西賊大宗正糾其事不由本司詔從誨等自今有所陳宜關大宗正司以聞從誨德昭孫也賜陜西緣邉戌兵緡錢巳亥詔中書樞密院三司自今大節大忌給假一日餘小節旬休並赴後殿奏事降西頭供奉官薛文仲為侍禁廣南監當文仲為鄜延路走馬承受方元昊入冦輒欲挈族還京師以搖民心故責及之權停并州永利東監煎鹽三年庚子以西蕃首領三班奉職䇿卜騰沁沙克三班借職䇿卜騰善沁並為左千牛衛將軍各賜帛三十匹茶三十斤使還本族捍賊始用富弼之言也㨂在京諸坊監及宫觀雜役修倉備征借事河清馬遞鋪卒升補禁軍是日賜永興軍草澤髙懌號安素處士懌季興四世孫幼能屬文通經史百家之説從种放隱終南山與張嶤許勃號南山三友會詔舉沈淪草澤知長安冦凖聞其名薦之辭不起景祐中録國初侯王後懌推其弟所得官及范雍建京兆府學召懌講授諸生席間常數十百人至是杜衍乞賜以處士號乃命為大理評事懌固辭上嘉其守特賜之詔州縣嵗時禮遇仍給良田五百畝其後文彥慱又言懌經術該通有髙世之行可勵風俗復賜第一區辛丑出內藏庫緡錢八十萬付陜西市糴軍儲壬寅出內軍器庫鎧甲弓弩一萬九千給陜西諸軍癸卯以延州安逺寨都監左侍禁邵元吉為西頭供奉官權塞門寨都監永平寨監押右侍禁王繼元王懿並為左侍禁贈安逺寨主東頭供奉官蔡詠為萊州刺史栲栳寨主左班殿直髙益為監門衛將軍監押左班殿直韓遂為左千牛衛將軍環州大拔寨主三班奉職曹度為太子右司禦率府率經略司指使借職王至為太子右清道率府率初元昊既陷金明寨遂攻安逺塞門永平等寨而安逺最居極邉賊攻破其門再重至第三門元吉等縋軍士擊却之拒守纍日乃引去屯延州之北三川口列十寨復扣州城呼譟叢射城上諸軍縱擊賊死者頗衆明日皆遁而詠等悉追戰死之故有是命永平寨主監押初欲斂兵匿深山避虜指揮使史吉帥所部數百人遮城門立於馬前曰寨主監押欲何之二人以其謀告吉曰如此兵則完矣如城中百姓芻糧何此往還之迹何可掩異日為有司所劾吉為指揮使不免於斬願先斬吉於馬前不然不敢以此兵從行也寨主監押慙懼而返虜至圍城吉率衆拒守卒完城寨主監押以功各遷一官吉曰幸不喪城寨吾豈論功乎記聞云吉後官至團練使女為郭逵夫人甲辰詔兵部自今試武舉人以䇿論定去留弓馬定髙下弓弩不得加斗力其合格者免監當與緣邉差遣乙巳詔選殿前諸般材勇者赴陜西極邉任使賜延州守城兵緡錢丙午德音赦延州保安軍流以下罪背叛姦細人不赦見屯將士並與特支其非中傷而潰散者不在此例賊所劫掠第蠲其夏租軍民及內屬蕃部為賊所害者量賜其家緡錢若諸軍更與一季請受是日改元仍於尊號去寶元二字悉許中外臣庶上封議朝政得失自范仲淹貶禁中外越職言事知諌院富弼因論日食以謂應天變莫若通下情願降詔求直言盡除越職之禁於是上嘉納焉丁未詔陜西安撫使韓琦與轉運司量民力蠲所科芻糧調民修築城池悉具數以聞當加優恤官吏因軍興受賕者聼人告比令諸州軍點集丁壯止欲防護城池亦不刺手面除教習外無得他役若姦人妄有扇搖委所在擒捕之先是詔陜西點募強壯命琦撫諭仍促本路如詔言者又以增數為請琦奏曰轉運司及郡縣尚未點集必謹重此事慮有驚擾蓋民情既為強壯且憂刺以充軍本路近嘗添差弓手耳目皆已習熟必無疑懼請除商虢二州外各於逐縣見管鄉村三丁巳下主户內選差一名充弓手更不差強壯使減稅免立階級分番教習著為條約甚備詔悉如所請將佐懦怯者並令罷去停諸州上供不急之物數十萬時慶州人陳叔度等陳邉防䇿既而補官東南琦奏曰士忠義憤悶為國獻計雖稍取用乃置於僻左實羈縻之何得自效非所以開示誠意來人才也詔皆徙邉任先是詔陜西點募強壯以下並據韓琦家傳附見初華州進士張源逃入賊界言者請因而懷撫以反間之戊申賜其家米十石錢二十千五月九日捕家屬赴闕六月乙未送房州田畫記張源吳昊事云元昊倚二人為謀主時二人家屬羇縻隨州張吳間使諜者矯中國詔釋之人未有知者後乃聞西人臨境作樂迎此二家駿馬輕束而去己酉知延州范雍言今陜西用兵之勢冝令大臣以重兵守永興軍河中府涇原環慶等路有警則以永興兵援之鄜延等路則以河中兵援之今夏竦在永興則臣當在河中以張諸路兵勢其延渭環慶極邉並以武臣宿將守之以備戰鬬而朝廷終未以為然臣又請選兵官及益河東兵馬二十指揮至延州亦不得報西賊既知本路無鋭兵宿將遂悉舉衆而來攻圍李士彬父子寨柵三日之內徑至州城下是時城中若得河東兵馬縱未能掩捕應亦接得劉平入州平既軍馬逺來為賊隔斷衆寡不敵遂致陷沒今金明一路塞門安逺兩寨圍閉經月息耗未通萬一復來冦城亦未免為閉門自守之計欲乞且差趙振為副都部署及選差鈐轄都監三兩員别濟兵五萬分守要害即一路尚可無憂昨朝廷更詢臣深討之計且天兵有數而犬羊之衆無限中國習鬬戰有時而賊能飢寒不避暴露善涉險阻日以劫略為事又沙漠遼敻赤地千里糧餽不繼臣未知深入之利也太宗朝繼遷猶是新集烏合之衆命李繼隆等五路進兵亦無功而還况今倚契丹為援吞并西土三十年聚蓄國家所賜財貨與當時固不相侔然臣以為朝廷久以恩信接契丹願試遣一介之使令其出師助我復厚以金繒賂嘉勒斯賚及二子亦令舉兵掎角而前庶此賊可指期而滅如得綏宥銀夏數州即每嵗更增賜契丹十萬縱未能必取亦可以破其借助之謀也庚戌右千牛衛將軍兖州都監曹英為西染院使環慶都監英前知鎮戎軍坐疏邉壕為賊騎所襲降官至是復起之曹英未詳夏竦乞罷統軍第一表云曹英敗于新壕即此事也但不得月日爾罷郡縣主宅巡護禁軍壬子新陜西隨軍轉運使明鎬為陜西轉運使兼隨軍轉運使命殿中侍御史陳洎東頭供奉官閣門祗候王滋提舉催促陜西州軍修築城池洎彭城人也王滋未詳贈延州金明縣令陳説為工部郎中録其子仲舒為左班殿直先是元昊冦金明而説固守力戰以死故恤及之癸丑降振武節度使知延州范雍為吏部侍郎知安州坐失劉平石元孫也象州防禦使環慶副部署知環州趙振為龍神衛四廂都指揮使鄜延副都部署兼知延州捧日天武四廂都指揮使登州防禦使秦鳳路副部署劉興為洋州觀察使環慶副部署兼知環州始元昊將反為金冠珮隱飾甲騎遺屬羌振在環州潛以金帛誘取得冠珮銀鞍三千甲騎數百請告鄰部俾以環為法庶可披賊勢不聼於是東茭金明萬劉諸族勝兵數萬一旦不戰悉為賊所有延州幾殆唯環慶獨無患時賊兵尚圍塞門安逺寨延州諸將畏避莫敢出救及聞范雍責命衆憂駭訴於安撫使韓琦願無使雍去琦奏雍二府舊臣盡瘁邉事邉人德之且乞留雍以安民心趙振粗勇俾為部署可矣若謂雍節制無狀勢當必易則宜召越州范仲淹委任之方陛下焦勞之際臣豈敢避形迹不言若涉朋比誤國家事當族三月乙邜朔贈慶州東路都巡檢使万俟政子天益為太子右內率府副率以天益與西賊戰沒也万俟政正月與郭遵俱以巡檢所部兵會三川口當是延州此云慶州更須考之會要録死王事子孫乃云元年政與西賊戰沒録其子天益為太子右內率府副率與實録不同又韓琦三月末疏云政為降虜當考丙辰內出手詔賜兩府及執政舊臣俾條上陜西攻守之䇿戊午原州乾興寨主西頭供奉官李繼明監押左班殿直孫佶並杖脊刺面配沙門島坐賊圍鎮西堡而不即救援也乾興寨鎮西堡後並屬鎮戎軍庚申再降工部郎中郭勸為兵部員外郎尚食使惠州刺史知滋州李渭為右監門衛將軍三門白波都監元昊侵邉不已軍中擾攘言者追咎勸渭不當拒絶善約特故再降之按郭勸傳再責時實知磁州而李渭傳又云渭在磁州再責實録亦載渭知磁州勸但書官不記差遣蓋踈略也同知樞密院事陳執中言元昊乘天下久不用兵而竊發西陲以遊兵困徑卒用甘言悅守臣一旦連犯亭障延安幾至不保范雍納詭詐之説失於戒嚴劉平任輕躁之心喪其所部上下紛攘逺近駭驚自金明李士彬族破而緣邉籬落大壞塞門至金明二百里須列修三城每城屯精卒千人招土民為弓箭手冦大至則保城壘小至則自驅逐每城選閣門祗候以上為寨主都監别以諸司使為盧關一路都巡檢以填士彬之闕仍以兵二千人屬之使為三寨之援上下接應左右相顧為不可攻之勢並邉熟羌久居漢地未嘗逃徙者委邉臣拊存之潛通賊謀反覆者破逐之至於新附黠羌尤為難信議者乃欲結西域諸國為天兵之援且羌人貪而無親勝不相下徒耗金帛終誤指縱如涇原康努卜密桑大蟲數族久居內地常有翻覆之情儻不剪除恐終為患議者更欲命轄戩為緣邉巡檢彼既不孝於父安肯納忠於國若交兵之際與賊互出首尾則疆埸之憂百倍於前矣邉兵小屈皮膚之傷也民力既窮腹心之患也凡軍須出於民夫運而妻供父挽而子荷道路愁歎井落空虛今復遍修城池欲如河北之制及夏須成使神運之恐猶未及況民力乎四路用兵之郊列城禦冦之地騎罕並轡車不方軌惟涇州鎮戎軍似少平易若不責外守而勞內營誠取笑狂童未為上䇿大役既興春種不入食竭必亡力竭必亂嘯聚千百惡黨相從小則掠道途大則攻縣鎮賊兵外擾群盜內侵臣恐宵旰之憂不在於一方矣請且修緣邉城池其次邉如延州之鄜同環慶之邠寧不過五七處量為營葺則科率既減民力稍蘇仍須廣土兵減騎卒蓋土兵增則守禦有備騎卒減則轉餉可蠲優爵秩之科以誘兼并寬茶鹽之利以邀入中靜守以驕其志畜鋭以挫其鋒更須主張將臣使橫議不及則忠臣得以盡節虎士得以忘生也時手詔咨訪輔臣攻守方略執中既合議上對退復奏此疏上嘉納之此據實録并執中正傳修入附傳無有也辛酉詔嚮許邉臣便冝行事者除夏竦外餘悉令封還所受詔書又詔諸路部署鈐轄司毋得納元昊界內附者右正言直集院修起居注吳育言比嘗建議乞通回紇以破昊賊且漢通西域諸國謂之斷胸奴右臂蓋諸戎內附雖有黠虜不敢獨叛唐太宗常賜回紇汗并與其宰相詔書及納其貢奉答以金帛真宗命博囉齊攻殺李繼遷其子德明遂歸順昊賊見朝廷比年與西域諸戎不通先以財物啖鄰境使巢穴無虞然後萌狂悖之心冝募機辨有膽略者使多方招誘散離其黨此伐謀之要也若經嘉勒斯賚及他蕃部亦密諭以朝廷之意使并力以攻均其恩賜同其功利以情料之無不聼命者又録真宗時通西域諸國并昊賊父祖始末事迹上之癸亥萊州團練使葛懷敏為涇原路副都部署兼涇原秦鳳兩路經略安撫副使懷敏前坐王德用責知滁州於是復用既入對以曹瑋嘗所被介胄賜之令制置鄜延環慶兩路存廢寨柵詔陜西城池委都轉運使張存與安撫使韓琦殿中侍御史陳洎相度且治邉要之處餘令以漸興功毋致傷農用陳執中之議也乙丑御崇政殿閲虎翼軍士習戰詔鄜延至鄜州環慶至邠州涇原至涇州及秦州本界各置𤇺候先是但走人偵報韓琦以為請乃從之辛未詔延州籍戰沒軍士之子孫以月糧給養之壬申以宫苑使逹州刺史髙志寧為河北諸州軍安撫使兼兩路營田使元昊初反志寧時知隰州亟上言請乘賊未發選驍將鋭兵分道急趣覆其巢穴所謂疾雷不及掩耳章數十上不報徙知貝州及劉平石元孫陷於賊志寧歎曰前䇿不可復用矣朝廷始思其言即召至闕問今冝為何䇿志寧曰今將不逹權而兵不識法制故敗乃請禁兵五百以古陳法教之既成上臨試之復下禁衛諸帥議諸帥出行伍不逹古法乃曰與今所習異不背用志寧又言元昊北與契丹通冝為備故有此命俾經略之此據韓琦墓志癸酉太子中允知長水縣尹洙權簽書涇原秦鳳經略安撫司判官事從葛懷敏之辟也洙先從葛懷敏辟但為涇原秦鳳兩路經略安撫判官其後夏竦韓范復辟洙始為陜西路經略安撫判官實録於此即云陜西誤也太子中允阮逸上鐘律制議并圖三卷詔送祕閣延州之役左侍禁閣門祇候郭遵以西路都巡檢使屬劉平麾下既與賊遇馳馬入陳殺傷數十人賊出驍將揚言當遵遵揮鐡杵破其腦兩軍皆大呼復持鐡槍挺進所向披靡會黃德和引兵先潰去賊戰益急遵奮擊期必死獨出入行間軍稍却即覆馬以殿又持大矟橫突之賊知不可敵使人持大弮索立髙處迎遵馬輒為遵所斷因縱使深入攢兵注射之中馬馬踠仆地被殺於是特贈遵果州團練使以其父斌為太子右清道率府副率母賀封仁壽郡太君妻尹安康郡君弟青右侍禁逵三班奉職四子尚幼上悉為賜名忠嗣西頭供奉官忠紹左侍禁忠裔右侍禁忠緒左班殿直女舊為尼亦賜紫方𫀆遵所用鐡杵鎗矟共九十斤其後耕者得其器於戰處皇祐中乃并與衣冠葬之河南遵開封人也司馬光記聞載韓琦奏郭遵死事與史略同王向集有記慶厯二年客語云郭遵舍軍親造黃德和壁趣救兵德和不從遵還與劉平石元孫同擊賊既敗走東原大崖下趨環州聞德和已斬死事者皆得封遂匿不敢出今傳所稱覆馬以殿持矟橫突賊持大弮索迎遵馬縱遵深入皆因客語也餘並不取客語又云德和先分兵萬餘屯西陂亦與史不合客語要未必俱可信爾乙亥御延和殿擢諸班殿直衛士有材武者二十九人散直都虞侯王逹授宫苑使昌州刺史東西班指揮使許遷為供備庫使逹開封人遷邢州人也丙子大風晝暝經刻乃復是夜有黑氣長數丈見東南丁丑罷大宴申詔中外言闕政先是改元詔求直言群下猶未有所獻故也天章閣侍講賈昌朝言今災變屢見初莫不恐懼已則秦然為無事竊考災異之所從固不虛發願陛下修飭五事以當天心雖罷大宴未足以厭塞天變也戊寅工部侍郎知樞密院事王鬷右諌議大夫知樞密院事陳執中給事中同知樞密院事張觀並罷鬷知河南府執中知青州觀知相州天聖中鬷嘗使河北天聖中鬷使河北當是六年八月事過真定見曹瑋瑋謂曰君異日當柄用願留意邉防鬷曰何以教之瑋曰吾聞趙德明嘗使人𣙜易漢物不如意欲殺之元昊諌曰我戎人本從事鞍馬間而與漢𣙜易不急之物己非䇿又從而斬之失衆心不可德明為貰不殺吾使人覘元昊狀貌異常他日必為邉患鬷時莫究所謂比再入樞密元昊果叛帝數問邉計不能對及劉平石元孫等敗議刺鄉兵久不決帝不悅宰臣張士遜言軍旅之事樞密院當任其咎於是鬷及執中觀三人同日罷鬷乃思瑋言因以語所親厚者云三樞密同日罷用張士遜議此據張方平傳沈存中記三人罷樞密并及夏守贇按守贇先以南宣徽使經略安撫陜西不與三人俱責存中誤也三司使刑部尚書晏殊資政殿大學士禮部尚書知河南府宋綬並知樞密院事保安節度使檢校太傅駙馬都尉王貽永同知樞密院事殊在三司請罷內臣監兵不以陳圖授諸將及募弓箭手教之以備戰鬬又請出宫中長物助邉費凡他司之領財利者殊奏悉罷還度支事多施行帝初以手詔賜大臣居外者詢攻守之略綬在河南畫十䇿以獻於是復召之與殊及貽永同管樞密龍圖閣直學士起居舍人鄭戩權三司使事龍圖閣學士刑部侍郎知永興軍杜衍權知開封府西邉用兵關中民苦調發吏或促辦因以侵漁衍為之區處計畫量物有無貴賤道里逺近寬其期會使得次第輸送永興比他州民費省幾半及為開封於民政尤盡力權近素聞衍名莫敢干於事者吏部員外郎知越州范仲淹復天章閣待制知永興軍始用韓琦之言也儀州刺史鄜延副部署許懷德既破賊於承平寨賊去屠金明縣復進圍延州懷德遽還夜遣禆將以步騎千人出不意擊之斬首二百級遂入延州於是授懷德鳳州團練使專領延州東路茭村一帶公事詔諸路轉運使提點刑獄及知州通判升朝官各舉部內才任將帥者以名聞從知諌院富弼言也初黃德和自三川口引麾下先遁至甘泉縱掠居民七日逹鄜州明日有敗卒從間道至德和問以劉平石元孫所在對曰方戰時相失不知何在或言以失亡多不敢歸已降賊矣德和曰若爾平降賊明矣今當作奏言吾與汝轉戰得出不唯罪得解且可以收功卒既出乃揚言平實降賊有蕃落將呂密者親見賊執平及元孫亦紿對德和曰賊以紅旗𨗳平等西去德和喜與其意合乃命親吏作吕密等狀諭以今列名者皆得賞吏又私增軍士數人即上奏言賊以生兵衝破大陳臣與劉平等阻西山為寨再接戰而平敗降賊臣等不受屈力戰得出後數日平親隨王信自延州來德和與知鄜州張宗誨問平所在信惡大將見執紿言賊使李金明來約和平令帳下李康往答之既而還言元昊欲太尉面相約平即乘馬入賊中從者不得入德和起就東廡謂信曰人皆言太尉降賊而汝獨言約和何也信曰非信所知也他日德和復召信告之曰我已奏太尉降賊與汝異同朝廷將有制獄汝能受枷禁乎我丐汝一銀叉鬻之亟去勿留時鄜延已使人拘信信不得去會天寒甚信乃為書遺平之子曰信從大尉與賊戰不利入賊與賊約和今人乃言太尉降賊信當以死明之今衣裝悉為賊所掠願少有所濟保太尉一家鄜延路走馬承受得其書馳驛以聞德和還延州至城南范雍不納使人代領其衆遣歸鄜州聼命尋徙同州德和懼且奏言臣盡忠於國而范雍誣臣棄軍又以書抵盧守勤及薛文仲曰如有中貴人來當為我營護之守勤得書又以聞朝廷乃命殿中侍御史文彥博入內供奉官梁致誠就河中府置獄復遣天章閣待制龎籍馳往訊之河東都轉運使王沿又言訪聞延州有金明敗卒二人自虜逃還云平等皆為賊縳去平在道不食數罵賊云狗賊我頸長三寸餘何不速斬我縳我去何也彥博牒延州求二卒竟弗得始朝廷信德和奏已發禁兵圍平等家將收其族天章閣侍講賈昌期言漢殺李陵母妻陵不得歸而漢悔之先帝厚撫王繼忠家卒得其用平事未可知而先收其族使平果存亦不得還矣乃得不收龍圖閣直學士任布亦言平非降賊者知諌院富弼力奏平引兵赴援行不淹日以姦臣不救故敗竟罵賊不食而死宜恤其家而延州吏民復詣闕訴戰沒狀上即命撤圍各賜平及元孫家絹五百匹錢五百貫布五百端時河中獄猶未決也賜平等家錢布乃三月二十三日此時河中獄雖未決德和誣奏亦稍辨矣故朝廷有是詔始朝廷信德和誣奏却發兵圍平等家乃有是賜則圍必撤矣不待斬德和後也寶録本傳皆云斬德和後贈平等官始撤兵蓋甚踈略又云御史按得實延州吏民方詣闕訴平等戰沒狀此又不然方遣使置制獄吏民即當詣闕矣既得實狀又何訴然今悉刪潤使不相抵牾延州之圍既解鈐轄盧守勤與通判臨卭計用章更訟於朝廷亦命文彥博等即河中府劾之時內侍用事者多為守勤遊説既改除守勤陜西鈐轄知制誥葉清臣聞朝廷議薄守勤罪而流用章嶺南即上疏曰臣聞衆議延州之圍盧守勤首對范雍號泣謀遣李康伯見昊賊為偷生之計計用章以為事急不若退保鄜州李康伯遂有寧死難不可出城見賊之語自昊賊退守勤懼金明之失二將之沒朝廷歸罪邉將又思倉卒之言一旦為人所發則禍在不測遂反覆前議移過於人先為奏陳冀望取信止如黃德和誣奏劉平欲免退走之罪尋聞計用章亦疏斥守勤事狀詔文彥博置劾未分曲直是非而遽欲罪用章康伯特赦守勤此必有議者結附中人營惑聖聼以為方當用師邉臣不可輕起大獄臣觀前史魏尚陳湯雖有功尚不免削爵罰作案驗吏士何况擁兵自固觀望不出恣縱羌賊破一縣禽二將大罪未戮又自蔽其過矯誣上奏此而不按何罪不容設用章有退保之言止坐畏懦而守勤謀見賊之行乃是歸欵二者之責孰為重輕望詔彥博鞫正具獄茍用章之狀果虛守勤之罪果白用章置重科物論亦允無容偏聼一辭以虧王道無黨之義知諌院富弼言盧守勤黃德和皆中官怙勢誣人冀以自免宜竟其獄樞密院奏方用兵獄不可遂弼又言大臣附下罔上獄不可不竟時守勤子昭序方勾當御藥院弼奏乞罷之葉清臣上疏不得其時蓋清臣聞朝議欲赦守勤即上此疏時獄猶未具朝廷亦未明降指揮微有所聞疏即先上爾按三月三日守勤改陜西鈐轄恐清臣緣此上疏然疑不敢決今附見三月未賜劉平家錢帛之後清臣以此月未上疏四月二十七日守勤乃與用章等同責所以責守勤則清臣上疏之力然用章等責比守勤猶重故傳云守勤才降湖北都監也今於四月二十七日守勤責時仍記其事始延州民詣闕告急上召問具得諸將敗亡狀執政惡之命邉郡禁民擅赴闕者富弼言此非陛下意宰相惡上知四方有敗爾民有急不得訴之朝則北走契丹西走元昊矣己邜工部郎中直史館同修起居注吳遵路為天章閣待制河東路計置糧草遵路嘗建議復民兵於是并詔遵路籍河東鄉丁為邉備仍下其法於諸路庚辰詔參知政事同議邉事仍書檢從知樞密院事晏殊之請也辛巳德音降天下囚罪一等徒以下釋之賜京師河北陜西河東諸軍緡錢蠲陜西夏稅十之二減河東所科粟癸未詔中書别置廳與樞密院議邉事遂置廳於樞密院之南殿中侍御史文彥博言比者用兵西鄙有臨陳先退望敵不進之人及置獄鄰郡而推劾之際枝蔓淹延啓幸生之路稽慢令之誅將何以厲衆心而趨大敵乎且將權不可不專軍法不可不峻兵法曰畏我者不畏敵畏敵者不畏我非嚴刑何以濟乎故對敵而伍中不進者伍長斬之伍長不進什長斬之以什伍之長尚得專殺統帥之重乃不能誅一小校則軍中之令可謂隳矣議者以今冦非大敵師未深入將校有犯冝從中覆夫冦非大敵兵未深入尚臨陳先退儻遇大敵則孰奮邪穰苴之戮莊賈非大敵也止於會而後期爾孫武之斬美人非深入也止於習戰而非笑爾終於齊師勝晉吳人入郢委任專而法素行也國朝著令禁軍將校之有過而從中覆當施之於平居無事之時今防邉用兵逾數十萬將不専權軍不峻法何以禦人哉上嘉納之延州之圍也范雍禱於嘉嶺山神其夕賊望城上若有鬼物持兵狀遽解圍去雍以其事聞甲申詔封山神為威顯公時吏民上書者甚衆初不省知諌院富弼言知制誥本中書屬官可選二人置局中書考其所言可用用之宰相以付學士弼言此宰相偷安欲以天下是非盡付他人也乞與廷辨此據墓碑不得其時附見二月末陜西安撫使韓琦上疏言臣素昧兵機不經邉任昨以冦犯延塞陜右驚騷陛下不以臣不才俾用安集受命引道徑趨西陲晝則奔走長途夜則評遣局事凡至邉郡率須宴犒故經度亷采不能纎悉究知然前語以謂口説不如親逢耳聞不如目見今既周歷疆鄙管穴所得粗有一二思欲歸覲之日面陳旒扆之前又慮後於事機先合敷奏臣竊以昊賊包藏逆志積有嵗年朝廷待之不疑養成凶慝今甲馬雄盛金帛富饒誘納亡命之徒助成狡計與賊遷跳梁之日事勢其實百倍故敢驅脅醜類直擾延安破寨逼城號三十萬且朝廷命劉平統兵三路蓋極一時之選石元孫委任次焉已并為之禽矣偏禆之勇鷙者如郭遵万俟政孟方張異者又為俘馘矣藩籬熟户李士彬米知順李思之族亦為之降且虜矣米知順保安熟户寶元二年十二月初見其降虜月日未見李思又不詳何處熟户當考戍卒陷沒者蓋不啻萬人諸路聞風惕然喪氣從而可知范雍緣此降移已有趙振為代趙振二月二十八日自環慶移知延州七月十六日責絳州今延州之民兵雖益而未補於舊若范雍之䇿慮彈壓劉平之謀勇有望禆將郭遵之強悍敢鬬後來者未聞過之所存熟户既難以自保不無去就之意而又鄜州去延安止二小程其城周圍二十里跨二土山在其中正當狗道嶺賊馬來路川原坦闊昨來張宗誨張宗誨寶元二年十一月知鄜州康定元年二月四日領興防二十三日改永興鈐轄應卒繕完未甚周備制度低小木植細弱其埀鍾板盡以人户獨扇門為之至今無材料修換王德基王德基正月二十七日為鄜延鈐轄知鄜州四月八日責廬州都監到任後冉行計度人工材木萬數甚多轉運司又無可應副近知張亢張亢四月六日自涇原移鄜延知鄜州交替便有物力營葺亦須冬末了畢况在城所屯兵馬不滿三千之數萬一賊計不測直攻延州但恐即目備禦未能固守鄜州不能守則延州城寨非朝廷之有也况鄜延路一帶係昊賊納欵之時出入道路山川險易盡曽涉歷而復咫尺銀夏便於巢穴臣慮出其不意再來奔奪故禦捍之備宜以鄜延為先鄜延若有重兵必無深入之患其次則環州最逼賊境新用劉興劉興二月二十六日為環慶部署兼知環州知州久闕部署髙繼隆環慶鈐轄張崇俊知慶州雖有心力不經行陳未可全然倚任駐泊都監之內亦無得力之人夏竦節制涇原等路復用葛懷敏副之葛懷敏三月九日為涇原部署兼秦鳯兩路經略安撫副使四月二十五日為涇原副都部署若取其謀智則懷敏非夏竦之比若籍其勇戰則懷敏平生未識偏伍亦與一書生無異鄜延涇原本路經略使二員分護諸將自范雍得罪之後更不選人經略一司已明無用是徒使夏竦懼而求免豈能成功惟秦鳯一路去賊甚逺比之别路未足多虞同州河中府與鄜延不遙宿兵策應魏昭昞王克基魏昭昞正月二十七日知同州四月八日責峽州王克基正月二十六日為河中鈐轄五月二十一日徙潞州未嘗出離京闕便使領衆禦戎昨來暫至延州皆己破膽加以諸路城寨軍屯勢分大抵一州之兵半守諸寨邊臣因舊重改不逹時變謀及廢置率皆異同殊不知承平之時邊臣無事競務增置寨柵以邀賞恩止為熟户防家於國實有何益至今孤囚軍旅蓄聚資糧犬羊衆來舉以遺冦所在將率例復失和妬能害功動至矛楯東兵驕而好走內臣戰則失利此方今之大弊也臣深為朝廷憂之兼逐處主兵臣僚多為無益得兵馬無不恐怯朝廷又舉昔年之數止絶陳乞臣切料劇賊果復傾竭種落併侵一路彼衆我寡戰必敗亡所至嬰城避其鋒鋭因而長驅關輔人户驚逃大邑富居任其屠掠都輦之下豈不動搖陛下宜訪帷幄之嘉謀審攻守之良算早圖平殄以安生靈非臣淺慮所及也臣今為陛下計者莫若差鋭兵三五千或於同州河中府等處分減進屯鄜州選才望大臣一員復本路經略之任兼知鄜州處置邊事令張亢張亢四月六日知鄜州固以為鄜延鈐轄矣十二月乃加都鈐轄就充本路鈐轄於鄜州駐劄用朱觀朱觀六月六日以供備忠刺為鄜延鈐轄知環州就差葛懷敏充環慶部署如朝廷必以經略一司更不合置即乞專於鄜州益兵使葛懷敏知涇州充替夏竦葛懷敏五月二十五日知涇州夏竦同日知永興自然事體均一不撓邊臣之心早賜選差才勇帥臣充環慶部署令秦州曹琮兼管勾涇原路兵馬公事曹琮四月十二日同管涇原兵五月六日又同管恐四月所書或誤準僃分擘秦鳯間兵互相策應其沿邊堡寨除自來係大寨廣屯兵馬之處外其餘孤小寨柵斷自朝廷委經略部署司須移那兵馬分食舊積糧草無使餘羡然後併兵入城只留人員兵士三二十人以為斥候量事又差弓箭手防護所有沿邊路分都監都巡檢等闕額即於諸班新換右職臣僚內選差催發其河中府同州部署鈐轄别差稍知邊事臣僚充替魏昭昞四月七日魏昭昞已責陜州王克基五月二十一日王克基以河中鈐轄徙潞州所有沿邊州軍招置蕃落保捷等指揮多是夲土勇悍之人只為拘定等仗失人甚多亦乞速降指揮促收但以其人材壯勇堪任披帶者充今後更不拘等仗愚短所見願早裁擇上皆納之琦上疏當在三月末或四月初故王克基魏昭昞以四月八日責官此疏獨猶未及知然張亢以四月六日移知鄜州疏云近知張亢交替則上疏當在四月六日後又疏云就令張亢為鄜延鈐轄按亢知鄜州即兼鈐轄不知琦疏何故云爾或是亢先以涇原鈐轄來交替王克基元未正除鄜延鈐轄交替後德基責降乃正除也今附此疏於三月更須詳考是月詔權停貢舉
