body:
  text: 續資治通鑑長編卷一百五十八宋李燾撰仁宗慶厯六年春正月戊子翰林學士兼龍圖閣學士戶部郎中知制誥王堯臣罷三司使為翰林學士承旨兼端明殿學士羣牧使堯臣主計凡三年前使姚仲孫借內藏錢數百萬久不能償堯臣悉按籍償之而軍國之費猶沛然有餘蓋未嘗加賦於民也益梓夔三路轉運使皆乞增鹽井課歲可為錢十餘萬堯臣固不從上問其説對曰庸蜀僻逺恩澤鮮及而貢入常倍民力由此困朝廷既未有以恤之而又牟利焉是重困也雖小有益將必大損矣上善其對然權幸因緣多見裁抑京師數為蜚語及上之左右往往讒其短者上一切不問而堯臣為之自若已而言於上曰臣之術止於是矣且臣母老願解煩劇既罷上慰勞之堯臣頓首曰非臣之能惟陛下信用臣爾初學士蘇易簡丁度自郎中進中書舍人充承旨及堯臣為承旨獨不遷官宰相賈昌朝抑之也先是夏國遣楊守素持表及地圖來獻鄂尚綳烏伊特恰布等城寨九處并理索過界人四百餘戶然所獻城寨並在漢地但以蕃語亂之其投來邊戶元屬漢界不當遣還己丑降詔諭夏國主又增設誓條自今過界者雖舊係邊户亦不得容納其緣邊封界以誓詔所載為定壬辰判并州夏竦請親領兵巡邉經置西北事宜從之癸巳以如京副使內侍押班石全斌為并代鈐轄仍從夏竦巡邉詔殿前司自今引試武藝人文武臣僚子孫與補班行若諸軍班即聽於軍籍就遷之贈太子太師諡忠獻范雍卒雍為治尚恕好謀而少成在陜西嘗請於商虢置監鑄錢後卒不可行又括諸路牛以興營田亦隨廢頗知人喜薦士後多至公卿者狄青初為小校坐法當斬雍貸之商虢鐵錢訖不行八年六月未詳之甲午命翰林學士孫抃權知貢舉丙申翰林學士禮部郎中知制誥史館修撰蘇紳為吏部郎中翰林侍讀學士集賢殿修撰知河陽紳鋭於進取善中傷人衣冠憚疾之言者斥其狀故命出守紳自揚州復入翰林未三月也是歲卒於河陽紳與梁適同在兩境人以為險詖故語曰草頭木腳陷人倒卓正傳云紳陰疏王德用宅枕乾岡貌類藝祖帝惡之匿其疏不下遂出紳按德用以寶元二年五月罷樞密此時紳未入翰林紳既入翰林則德用不在樞密院矣宅貌二語孔道輔亦以奏德用不獨紳也附傳但云言者斥紳急於進取故出無疏德用事今從之魏泰雜録云仁宗既逐林瑀謂執政曰卿等謂瑀去朝廷遂無小人耶執政未喻上旨仁宗曰蘇紳可侍讀學士知河陽按林瑀以慶歷二年二月逐蘇紳三年七月始自內翰知揚州其知河陽又在六年正月魏泰誤甚今不取詔道州桂陽監猺賊未息權置都巡檢使一員丁酉許州都監左屯衛大將軍趙振領解州防禦使為峽州鈐轄末年十二月落致仕為許州都監今又遷改不知何故當考或削去癸卯禮部貢院請自今試進士並如諸科例印所出經義題從之詔陜西河東就糧士兵元置社買馬若死者並給本指揮貿之以助買馬乙巳龍圖閣學士給事中權知開封府楊日嚴罷開封事判官祠部貟外郎田京知蔡州惟官太常博士祕閣校理楊孜知濮州並坐繫囚送獄而道死也戊申詔廣南東路轉運鈐轄司方春瘴起戍兵在邉者權徙善地以處之庚戍録湖南捉蠻賊胡元兄子定塞軍士澄為十將妻劉氏及女並加封邑仍賜絹三百匹郭正子扆為三班借職褒為三班差使殿侍趙鼎子良卿良臣並為三班差使殿侍王孝先子永隆為茶酒班殿侍二月壬子朔賜太傅致仕張士遜月俸百千癸丑司天監言日當食三月朔上謂輔臣曰日食之咎蓋天所以譴告人君願罪歸朕躬而無及臣庶也凡民之疾苦益思詢究而利安之宰臣賈昌朝對曰陛下發德音足以應天弭變臣等敢不夙夜悉心上副恤民之意樞密使保寧節度使王貽永加同平章事宣徽南院使保靜節度使判相州王德用加同平章事宣徽南院使河陽三城節度使判并州夏竦加同平章事判大名府河北安撫使資政殿大學士工部尚書知大名府程琳為武昌節度使陜西安撫使知永興軍庚申太常少卿知廣州魏瓘為右諫議大夫再任癸亥荆湖南路轉運使周沆言本路蠻寇未息而官軍久戍請嵗給公使錢一千貫以犒設將校從之沆又言蠻驟勝方驕未易懷服冝須秋冬進兵蠻地險氣毒其人驍悍善用鋋盾北軍不能與之角請選雍宜融三州澄海忠敢知其山川習其伎藝者三千搗巢穴餘兵絡山足出則獵取之俟其勢窮力屈然後招撫也朝廷用其策卒平蠻寇沆奏平蠻策據沆本傳附見丁卯侍御史劉湜言比聞石元孫以升祔赦書量移襄州元孫失軍辱命朝廷貸而不誅今若例從量移何以勸用命之士請仍舊編管全州從之罷陜西諸路經略安撫使都部署司便宜行事其緩急賊馬入寇應機制變不及中覆者聽之戊辰詔陜西經略司未用兵以前邉上失於防察纍有不還之人投入西界宜密諭緣邉官吏及蕃部弓箭手有能以計捕獲者當不次遷擢之戊寅青州地震詔陜西經略安撫及轉運司朝廷開納夏國本欲寬財息民自其受封進誓已及一年而調度猶不減用兵時其議裁節諸費及所增置官貟指使使臣今無用者悉條奏之從樞密副使龎籍之言也籍本傳云籍言自陜西用兵公私困匱請併省官屬退近寨之兵就食內地於是邉費頗省己卯徙華州都監洛苑使蔣偕為荆湖南路鈐轄權同知禮部貢舉張方平言文章之變與政通今設科選才專取辭藝士惟資性之敏而學問以充之故道義積於中英華發於外然則以文取士所以叩諸外而質其中之藴也言而不度則何觀焉今之禮部程式定自先朝繇景祐之初有以變體而擢髙等者後進傳效皆忘素習爾來文格日失其舊各出新意相勝為竒至太學盛建而講官石介益加崇長因其好尚寖以成風以怪誕詆訕為髙以流蕩猥煩為贍逾越繩墨惑誤後學朝廷惡其然也屢下詔書丁寧戒飭而學者樂於放逸罕能自還今貢院試者間有學新體賦至八百字以上每句或有十六字十八字而論或及千二百字以上策或置所問而妄肆胸臆條陳他事絀之則辭理粗通取之則公違詔意重虧雅俗驅扇浮薄忽上所令豈國家取賢斂材以備治具之意邪其增習新體而澶漫不合程式者悉已考落請申前詔揭而示之詔從其請時御史王平又請賦毋得過四百字而禮部復謂才藝所取一字之多遂至黜落殆非人情自是復以舊數為限本志以方平此奏繫之八年誤矣合從實録三月辛巳朔日有食之御崇政殿録繫囚雜犯死罪以下遞降一等杖以下釋之丙戌詔荆湖南路鈐轄洛苑使蔣偕前知原州焚蕩蕃部八十餘帳凌持俘獲頗為慘酷今特選經制蠻猺事宜其務宣布恩信以招懷之若猶拒命即出兵掩捕毋得過行威虐己丑上謂輔臣曰如聞交州李德政近取占城慮漸畜姦謀為五嶺之患宜下廣西轉運司預經制以聞於是樞密院檢自唐以來通交趾水陸道路凡一十六處令轉運使杜把密行按視置兵戍守庚寅登州地震岠嵎山摧自是震不已每歲震即海底有聲如雷辛卯邈川首領嘉勒斯賚遣人來獻方物癸巳詔凡寺觀有御容所在及景靈宫天興殿自今皆設褥位庭下西向命禮官贊升降之禮丁酉詔陜西四路經略司凡民間利害及邉事並報知永興軍陜西安撫使程琳戊戍詔提點陜西路刑獄太常博士曺頴叔與轉運使柳灝任諸路相度減省邉費灝開從子不知頴叔誰人也庚子詔諸路轉運司凡夏秋稅支移折變自今並於未赴納半年前揭榜曉諭之民有未便者許經所屬投狀申轉運司詳度施行壬寅御崇政殿賜進士賈黯等二百三十人及第一百九十人出身一百十七人同出身黯穰人也癸卯賜諸科及第并出身者四百五十人甲辰賜特奏名諸科七百二人同出身及諸州長史司馬文學丙午太常博士監察御史裏行孫抗落御史裏行知復州初抗受命安撫湖南奏事不合意有章自劾故罷絀之御史中丞張方平言抗責輕乞授小處監當不報荆湖南路轉運判官李上交知筠州以在部苛察也翰林侍讀學士葉清臣赴池州道由京師因請對與宰相陳執中不協故斥令守邉且言執中之短丁未改命清臣知澶州尋又改青州記聞載清臣與執中有隙緣草制考之不合已見去年十二月今不取夏四月壬子權御史中丞張方平言臣向在翰林為學士見天聖中具貟兩制兩省官不及三十員今已五十餘員及領御史中丞見本臺天聖班簿京朝官不及二千員今二千七百餘員又嘗領三班院見景祐中使臣不及四千員今六千員又領吏部流內銓約在銓選人僅以萬計以此逐處率遞用一年半闕比罷任候差待闕五六年間未成一任而又所養非所用設有一煩重之地不免旋須擢人仍舊不革恐數年間官濫不勝其弊其中書樞密院自用兵以來權宜所置官請先裁罷從之方平又言臣竊聞近有恩旨將來聖節自大卿監以上陳乞恩澤並依舊者慶歷四年范仲淹奏定臣僚任子弟之制其間難行如國子監尚書省等事並已衝改只恩例見行今自知雜御史以上何勤於國嵗奏補京官一員祖宗之時未有此事近歲積纍僥幸為此弊法仲淹所請略從裁損考之理道已是適宜臣近曽具天聖景祐中及見今文武官貟數進呈據今京官比景祐中已多七百餘員經久之圖何以處置其臣僚恩例乞且依新制為便若朝廷議論惟是之從又不可以人廢言也方平此奏附見其間難行如國子監尚書省等並已衝改所衝改事當考又不知方平此言從違如何並此月戊午所書皆當考奏八年三月甲寅方平答聖策猶言少卿監以上每歲蔭子弟則是方平之言初不從也或方平此言在八年三月以後更詳之癸丑罷開封府界及諸道招軍殿侍令所屬自招刺之甲寅上謂輔臣曰蠻猺未平兵久留戍南方夏秋之交常苦瘴霧其令醫官院定方和藥遣使給之降新河東轉運使刑部郎中集賢校理李昭遘知澤州坐奉使契丹其從者嘗盜敵中銀杯也昭遘從者既杖死詔以銀杯送敵中議者謂盜已正法送銀杯於體有損判大名夏竦亦奏乞罷送不聼知雄州王仁旭直納軍資庫人稱其得體此據江休復雜志乙卯封左金吾衛大將軍舒州團練使從藹為潁國公先是從藹誤得封尋奪以與守巽及是守巽已卒乃更封之守巽以三月乙未卒誤封事在四年八月戊午詔使相節度使以下正刺史殿前都指揮使至龍神衛四廂都指揮使帶遙郡團練使以上奏薦班行思例自今並依舊制餘依前後條貫施行此據會要實録無之必是改三年十一月范仲淹等所定條貫但史不詳爾餘悉依前後條貫或與是月壬子張方平所言不可以人廢言相關當考辛酉契丹國母遣保安節度使蕭德嚴州團練使姚居化契丹遣左千牛衛上將軍蕭伸太僕卿李雲從來賀乾元節辛未進封美人張氏母安定郡君曹氏為清河郡夫人詔賜三路夏藥使臣母得受邉臣所遺金帛壬申遣官祈雨以湖南都監供備庫副使宋守信兼知桂陽監候猺賊平乃罷夏國主請以禁邊臣納過界蕃戶事附入誓詔甲戌詔從其請西蕃默戩覺遣使入貢方物丙子四方館使榮州刺史知定州王德基為衛州團練使知雄州兼沿邉安撫使初守臣畏生事未嘗出獵德基至乃縱騎獵境上關城居民甚衆而故堞隳廢久莫敢修德基豫調兵夫築完之契丹嵗遣使獻果餌皆改服以見德基接以常禮及每移文至者例以郡官主勞至是以指使代焉此據德基附傳皆德基知雄州時事今悉附見己卯權御史中丞張方平言中書樞密院比嵗除授多預批聖旨俟半年或一二年後與轉官或改職且遷除之體率有常規若因勞應賞而擢之不次孰曰不然事出僥幸縱賖日月曷厭羣議譬之賈人交易於市作為契劵立期待償非唯滋長濫恩實亦有虧治體請自今文武官輒援前比而希遷改者並明行責降從之五月甲申京師雨雹地震乙酉知潭州劉夔言擊敗猺賊唐和于銀江源夔初至遣人諭蠻首使降不從乃舉兵討之和既敗遂進破其巢穴蠻逺遁去前將以帛購蠻首至是有持首取購者按問乃輒殺平民誅之而罷購州境獲安丙戌御崇政殿録繫囚雜犯死罪以下遞降一等杖以下釋之丁亥命戶部副使工部郎中夏安期往陜西與提點刑獄曹頴叔相度興置緣邉屯田戊子賜湖南討蠻軍士特支錢減卭州鹽井嵗額緡錢一百萬川峽西路鹽課縣官之所仰給然井源或發或微而責課如舊任事者多務增課以為功往往貽患於後人朝廷切於除民疾苦尤以逺人為意有司上言輒為蠲減前後不可悉數至下赦書亦每及之初鹽課聽以五分折銀紬絹鹽一斤計錢二十至三十銀一兩紬絹一匹折錢九百至一千二百後嘗詔以課利折金帛者從時估於是梓州路轉運司請增銀紬絹之直下三司議以為銀紬絹直視舊雖增至三千以上然鹽直亦非舊比鬻於市斤為錢百四十則於民未見其害不聽後卭州亦以為言三司亦以此折之於是卭州聽減銀紬絹一分論者謂歲損縣官錢二萬餘緡辛卯秦鳯經略司言奉詔相度修秦州夕陽鎮且秦最為關隴之盛而敻在一隅黠羌久有窺圖之心伏羌寨之北盡是屬戶蕃部所居距西界止百餘里無山川之險茍賊馬忽踰伏羌以南斷入州道則失腹背之援有不測之虞其夕陽下鎮東距州六十里嵗積糧草而無城壁器械之備賊至徒委以資之又西北五里有夕陽上鎮當伏羌永寧兩路之隘古有城基尚存若就上鎮創一寨置兵戍守緩急有警收旁近蕃漢老幼孳畜而入保之實為經久之利從之壬辰置青鄆州路分都監以知登州吉州刺史劉渙兼青州路都監內殿崇班竇舜卿為鄆州路都監時上封者言京東武衛宣毅軍皆土人凶悍者衆請選置青鄆州路分都監各一員以時訓練之舜卿安陽人也丙申詔夏安期與四路經略司招誘蕃部入中蕃馬是日腰斬京東進士劉雍五經劉沔胡信於都市以淄州講書劉曉為右班殿直尚書學究孫佐龍為三班奉職雍等謀反而曉及佐龍告發之也戊戌詔環慶經略司比夏國人馬纍至後橋蕉蒿堡十二盤開築舊堡其地雖係漢界用兵所得然夏國今納欵稱臣不欲出兵拒絶其令彼土蕃戶住坐如故仍畫壕為界壬寅以興元府西縣鑄錢監為齊逺監徙陜西駐泊軍士月給錢糧多者屯近裏州軍癸卯東平郡王德文卒德文晚被足疾不能朝然天性畏謹疾革上親臨視以太醫所調藥進之訃聞復臨哭贈太尉中書令封申王諡恭恪丙午封左金吾衛大將軍濟州防禦使承簡為徐國公承簡廷美孫德鈞子也丁未上謂輔臣曰新羅髙麗諸國往年入貢其舟船皆自登州海岸往還如聞女真三韓已為契丹所併儻出不意則京東諸郡何以應敵宜下登州訪海外諸國道里逺近及究所以控禦之策具奏先是御史中丞張方平言臣聞陜西夏旱二麥不收近雖有得雨處秋田亦未必可望民已艱食頗有流移邉境雖寧兵戎尚衆因之飢饉事實可憂芻糧委輸最為切務朝廷雖懷柔夏寇本為休兵息民若其役費不紓必見物力日困經久之計殆無以支又比來諸州纍報地震考諸咎證由陰有餘夫陰者妻道也臣道也民也四裔也此時後宫無過制外廷無權強所當戒慮者民與四裔爾內安民而外待四裔其要在貨力有備而已今境上堡寨兵分力微假如寇來勢必不能出戰如其守也即隨處土人自應足用况春夏之際敵人必無大舉若每年三月以後緣邉所屯東兵一􅋀抽向內地就食至八九月復遣出戍又邉城一馬之給當步卒三人既多羸駑不任馳敵平時虛糜芻粟動輒兼人齎送若今後所發緣邉屯駐馬軍約度足以巡邏外稍用步軍替還寬減調度此其略也近聞勾抽陜西提點刑獄曹頴叔到闕欲令簡省邉計臣兩見頴叔據其説畫亦恐虛行今邉臣惟務留兵朝廷無肯任咎悠悠大計其將奈何必在內外協心休戚齊慮乘邉隅之粗間極夙夜以疚懷儻詳利害之原猶有異同之論斷之欲獨當繫聖裁頴叔此行每事乞明與處分凡干冗費深加裁減如恐其勢輕事難獨任或推選近臣一員承命而往其陜西四路部署乞各賜一詔書諭知此意使與頴叔公共議之所有陜西轉運使亦乞察臣前言早賜别行擇任六月庚戌朔降御前劄子下夏安期等比令與陜西諸路經略安撫司議減節邉費其務悉心經畫以成朝廷悠久之利詔判大名府夏竦與轉運使提點刑獄司銓審諸路帥臣及諸州長吏之不任職事者以聞其禆佐令主帥各舉所部能者代之癸丑詔監察御史唐詢更不赴廬州詢肅子也初吳育在翰林薦詢為御史未至喪母服除育方參政而宰相賈昌朝與詢亦有親育數為昌朝言詢用故事當罷昌朝不得已以詢知廬州時四月乙卯也凡官外徙者皆放朝辭而詢獨許入見中丞張方平因奏詢材質美茂宜留備言職詔許之育爭不得詢由是怨育而附昌朝方平留詢且譖育世皆以為昌朝意云方平希昌朝意據方平傳丙辰命度支判官侍御史仲簡往陜西和市軍儲丁巳流星出營室南大如杯其光燭地隱然有聲北行至王良沒占曰兵出辛酉詔河東經略使鄭戩裁減本道邉費以聞又詔三司開封府御史臺凡大辟囚將決而獄吏敢飲以毒藥及諸非理預致死者聽人告論之賞錢十萬河北安撫使夏竦言奉詔相度界河約束請自今北界人無故南渡者並捕送契丹其打魚為風濤所漂即令自還從之壬戌詔樞密院凡臣僚應詔敇奏舉使臣其令三班院籍記姓名俟歲終録一本進內癸亥帝謂輔臣曰比有上言星變者且國家雖無天異亦當修警况因謫見乎夫天之譴告人君使懼而修德亦猶人君知臣下之過先示戒敇使得自新則不陷於咎惡也賈昌朝等皆引咎再拜丙寅詔開封府久旱民多暍死其令京城去官井逺處益開井於是八廂凡開井三百九十丁卯東染院使向綬削官除名編管潭州初綬知永靜軍為不法疑通判江中立發其陰事於監司因造獄以危法中之中立遂自經綬故相敏中孫賈昌朝陰佑之知審刑院髙若訥希昌朝意欲從輕坐吳育爭曰不殺綬示天下無法卒減死一等流南方戊辰詔廣南西路諸州接連交址控制夷落其令轉運使察長吏罷老不任事者以聞辛未知益州文彥博言益彭卭蜀漢五州非用馬之地而遂州共屯軍馬凡二千餘人請皆易以步軍詔易三之一壬申詔河北教閲諸軍並用祖宗舊定陳法其後來所易陳圖亦令主將間習之時判相州王德用言河北所教陳法已熟而輒易之恐難以應敵也德用本傳乃云乞不出陳圖與此不同當考甲戌賜黃河役卒衫袴乙亥詔自今皇族之喪皆官為製服初諌官李京言皇叔德文卒而在宫緦麻以上親並不給服蓋因近嵗減省致此甚非厚親飾哀之道下太常禮院議而復給之河東經略使鄭戩言本路義勇鄉兵昨因明鎬建議遇邉事有急即勾集之經今二年未嘗教閲恐武伎惰廢欲令每嵗九月農隙約多少分畨於本縣先習勒半月上州亦如之從之髙陽關路都鈐轄入內押班楊懷敏兼管勾緣邉安撫司事此據百官表乃乙亥日事實録無之丙子封左龍武大將軍池州團練使承顯為康國公德文長子也上封者言教閲諸軍方盛夏蒸潤而挽習弓弩非便請自今夏三月唯試槍刀從之參知政事吳育與宰相賈昌朝不相能監察御史唐詢既怨育遂希昌朝意上奏曰賢良方正直言極諫茂材異等科由漢涉唐皆不常置若天見災異政有闕失則詔在位薦之本朝稽用舊文訖真宗世三建此科陛下即位增科為六令兩省若少卿監以上奏舉後又止用賢良茂材二科隨進士科設之近年率不用保任之臣皆自名科目且賢良方正茂材異等名號至美使舉而為之猶曰近古即自顓其美顧所未聞又有經親試前集有司而所出論目悉用經史名數及對詔策不過條列義例稽合注解主於強記博聞虛辭泛説而已若輔國體陳治道則未見其有補也初應詔才數人後乃至十餘人今殆至三十餘人一中此科曽未纍歲悉至顯官雖非其人例不可抑况直言極諌非當無事而求茂材異等豈謂循常之選其弊若此固宜圖之今條上兩漢故事漢武帝建元元年詔丞相御史列侯中二千石二千石諸侯相舉賢良方正直言極諌之士元封元年以名臣文武欲盡詔州郡察吏民有茂材異等可為將相者凡五十四年一舉賢良一舉茂材孝昭始元元年詔三輔太常舉賢良各二人孝宣地節三年令內郡國舉賢良方正可親民者元康四年遣太中大夫強等十二人循行天下察吏治得失舉茂材異倫之士凡二十五年二舉賢良一舉茂材其後孝元初元元年地震元光二年日蝕成帝建始二年災異屢見河平四年日蝕水災鴻嘉三年數遭水旱元延元年日蝕星隕光武建武六年七年日蝕章帝建初元年地震五年日蝕和帝永元六年凶饉安帝永初元年日蝕五年日蝕地震順帝延光四年京師大疫永和六年日蝕或詔丞相御史或詔郡國守相司𨽻州牧或詔大將軍舉賢良直言者十六舉茂材者一而已本朝但用兩漢之名而不用兩漢之制請自今不與進士同時設科若因災異非時舉擢宜如漢故事親策當世要務罷祕閣之試疏上帝刋其名付中書育奏疏駮之曰三代以來取士之盛莫如漢唐漢文帝十五年詔舉賢良文學之士上親策之則有若朝錯者出焉是時非有災異而舉也武帝建元元年詔舉賢良方正直言極諌之士元光元年詔賢良對策則有若董仲舒公孫宏者出焉所舉亦非因災異但策中語或及者亦陳事之一端爾唐開元二年六月甲子制其有茂材異等或令自舉是年設直言極諫科逮憲宗元和間制科尤盛有若元稹白居易皆特出之材觀當時策目所訪者皇王之要道邦家之大務可以覆視固不專於災異也此漢唐故事有足據者其間或因天變又非時親策者則亦有之厥後時君或居常自逸謂毋闕政及天災已著時蠧已形然後下詔舉之欲救於臨事此則取士之弊風而後王之末造也豈足法哉陛下自復制科于兹纍年隨貢舉而開踈數適中若必俟災譴然後詔舉非惟失設科本意且尤不可者有三一則使天下賢俊滯淹之士待災異而進非所以養廉耻也二則平居不詢造形乃問非所以懼天災也三則輕改信令示天下毋渴士之心非所以廣賢路也且漢唐所立孝廉及進士等科皆每歲常選故制舉不隨而開今禮部進士數年一舉因以制舉隨之則事適其宜何害於時須此紛易况災異之出不常厥期或彌年所無則此舉奚設或比歲而有則於事太煩既不因乎天災又不隨乎貢部而曰非時詔舉浩無端倪乃是遂廢此科芻蕘稍詢則言路有寄餼羊一去則禮意都忘今無故而更張使遺材絶望其傷國體不亦大乎乞并下臣奏兩制詳定上是育言不復下兩制即詔禮部自今制科隨進士貢舉其著為令仍須近臣論薦毋得自舉上因諭輔臣曰彼上言者乞從內批以行今乃知欺罔也育又奏曰隂邪沮事正當明辨人臣言涉機密欲歸德於君或入告謀猷成國之美此類可以刋名付外制策天下公共廢置可以明述豈宜陰為沮革欲自上行此正姦罔所為非睿聽昭察則挾邪蠧國何所不為願出姓名按劾以申國法育本由制策進上數稱其賢以為得人故詢力排詆意在育不在制科也育弟娶李遵朂妹有六子而寡詢又奏育弟婦久寡不使改嫁欲用此附李氏自進大抵希昌朝意且報怨爾上訖不聽
