body:
  text: 續資治通鑑長編卷五十三宋李燾撰真宗咸平五年冬十月癸亥朔詔并汾二州大通監得替幕職州縣官自今免其守選丙寅西凉府六谷首領博囉齊遣使上言李繼遷送鐡箭誘臣部族已戮一人縶一人以聽朝㫖詔褒之聽自裁處丁卯以盧多遜子寬為襄州司士參軍寬雍之弟雍既卒乃復録寬及寬考滿詔仍給其俸寬考滿給俸在三年二月今并書己巳遣使齎藥賜鎮戎軍將士以其地潟鹵早寒人飲水多疾故也鹽鐡使王嗣宗言自今三司奏事有可紀者請令判使一人撰録送史館上曰三司務繁若日有著撰必妨公務可令逐季録送乙亥參知政事王欽若言司封員外郎髙如晦頃知蔡州逃主户二千五百九家失國賦五萬三千餘貫薦士有十否之繆在官無三異之稱罔知省循冒進詞狀且曰陛下止見臣面不見臣心不能恤臣故令擯斥狂躁之甚乃敢若茲臣請以審官院考課文籍并如晦所進狀付有司施行詔下御史獄案其罪如晦坐削兩任貶沂州别駕髙如晦事當考丙子詔諸州亡命卒捕獲决訖者經二十日乃令赴役知萊州齊化基獻白鷹詔還之化基不詳邑里大中祥符元年九月以贓敗戊寅詔河東轉運司河西戎人歸附者徙內地給以閒田遂州觀察支使陸文偉言諸州大辟案上委本判官録問或有初官未詳法理慮其枉濫非朝廷重惜民命之意也乃詔自今並須長吏通判幕職官同録問詳斷先是上於龍圗閣藏太宗御書己卯召近臣觀之上手執目録以示近臣謂曰先帝聖文神筆朕集綴既久至於題記時事片幅半紙及書在屏扇或微損者悉加裝背巳三千七百五十卷矣辛巳涇原部署縶內屬蕃部之謀叛者九十一人赴闕請誅之上曰戎心反覆蓋其常爾國家方推恩信以示招懷貰之可矣乃命分配諸州給閒田處之并賜糧種癸未洛苑使李繼和言鎮戎軍控扼邉要望擇防禦團練使蒞之上曰屢有人言緣邉州軍宜如往制止除牧守朕熟思之但得其人斯可也前代兵權民政悉付方伯其利害亦可見矣初左領軍衛將軍薛惟吉不能齊其家妻柴氏無子惟吉有子安上素與柴氏不協柴既寡盡蓄其祖父金帛計直三萬緡并書籍綸誥以謀改適右僕射張齊賢定娶之自京兆遣牙吏約車來迎行有日矣安上詣開封府訴其事府以聞上不欲置于理命有司即訊柴氏柴置對與安上狀繆異上不得已下其事於御史獄柴因擊登聞鼓訟兵部侍郎平章事向敏中賤貿惟吉故第又常求娶已不許以是教安上誣告母且隂庇之上以問向敏中向敏中言實以錢五百萬貿安上居第近喪妻不復議姻未嘗求㛰於柴也上亦不復問柴又伐鼓訟益急遂并其狀下御史獄鞫之乃齊賢子太子中舍宗誨教柴為詞遂驗問柴之臧獲發取瘞藏得金貝僅二萬計安上兄弟素不肖先是嘗爭競財貨遂有詔不許其貿易父祖資産而向敏中乃違詔貿其居第令安上日出息錢二千御史獄索要契驗向敏中所署字非一體鹽鐵使王嗣宗素忌向敏中因對言向敏中議娶故駙馬都尉王承衍女弟密約已定而未納采上詢於王氏得其實因面責向敏中以不直丁亥向敏中罷為户部侍郎張齊賢責授太常卿分司西京宗誨削一任貶海州别駕柴用䕃贖銅八斤安上坐違詔貿居第笞之以所得瘞藏金貝贖還其居第仍令臺府常糾察焉既而上謂吕䝉正等曰向敏中所負如此騰於清議不可不加黜免朝廷進退宰輔亦非細事卿等更思持正守道以輔朕躬先是翰林學士宋白嘗就向敏中假白金十鋌向敏中靳不與於是白草向敏中制書極力詆之有云對朕食言為臣自昧向敏中讀制泣下詔天下有竊買祠部牒冒為僧者限一月于所在陳首釋其罪違者論如律少壯者𨽻軍籍先是麟府部署曹璨請遣别將王萬海萬海未詳屯豐州與王承美同主戎事上曰豐州迂僻不足為邉隅扞蔽故命承美自庇其部族朝廷因授團練之任俾之防遏受俸同蕃官例今若復委萬海又須挽運芻糧非惟外分兵力久益勞民不可許也于是豐州言修城工畢又請葺護水城上曰若再興版築勞民亦甚矣不若量留戍兵扞部族之耕種如寇至即歸部署司併力拒戰足以張軍勢而免勞內地民力也三司小吏賈用自北靣部署司主案代還上封言部署兵籍機事皆親吏掌之及主帥受代即擕文簿以去使後來者無所檢案因致漏泄庚寅詔西北靣部署司自今擇從行使臣主兵馬機宜事勿復委親吏待御史知雜事田錫言伏覩內殿起居近罷轉對封章迭送今已踰年復令百官轉對在三十年十一月壬午此云罷已踰年當考或罷字誤景德三年四月乙未又令羣臣轉對豈咸平五年嘗罷轉對而史失不記乎在班行之中頗有竊議蓋為上章應詔並無旌酬失儀被彈即有責罷雖左右巡使見失儀不敢不彈在輔相大臣知此事不合不奏國家比開言路將導化源既欲求其讜言又不捨其小過雖弭是非之論寧符虗佇之懷况芻蕘之詞尚有可採豈簮纓之列略無所長蓋未嘗奬一嘉謀亦未曽降一優詔今郊禋俯近慶賜將行可令中書檢尋轉對分其優劣奏其姓名或降奬諭敕書或與轉改官秩所貴知陛下鑒其用意感陛下賞其盡忠表明君好諫之心彰至仁待下之意臣又覩近敕戒勵大臣謂其不守廉隅多置資産祿厚而不知恥者尚應慊恨官崇而能自省者豈不憂慙斯乃陛下示之以止足之訓詞責之以貪叨之顯過然敕文尚有漏略事意未得精詳蓋文武班官僚不該戒勵似王者命令有失均平更須頒行詔書遍下分明條貫在京則已行止絶外郡則未有指揮况近畿闤闠之間悉大臣資産之地好利忘義未知云何擅富兼貧一至於此可以檢郡縣稅籍自然見公卿户名其務殖貨財不知紀極以貪化下安得風俗淳和忘國憂家豈令官吏廉潔今敕命施行之後兼文武豪富之家可於赦書更布新令食厚祿者不得與民爭利居崇官者不得在處回圖此乃申明舊章備載前史可師古制以戒貪夫臣又聞有勞績稍殊未與區别有刑禁久滯未與辨明今略舉一二言之其如都官郎中李韶差在廣濟河令催輦運訪聞自前界分每年般得八萬餘石今來李韶界分一年般得四十五萬石未見酬奬却歸東京又聞屯衛上將軍王漢忠頗讀儒書甚知方略輕財重義臨事有謀未嘗交結中官亦不曲奉同列昨赴京闕似失聖恩遽令歸班又差典郡聞於輿論疑其被讒今已云亡孰不嗟惜臣今聞奏貴陛下細知慮侯伯之中有素秉忠良不事權貴介然公直因致讒言况臨事有謀者求之實難輕財重義者尤不可得良將之體漢忠得之未諭此時棄而不用今若有似王漢忠輩望陛下選擇用之注意求之推誠待之必有英傑可副指呼又聞齊州制勘公事頗甚淹延著作佐郎張檢國子博士張瓘並是制勘使臣欲望宣令對揚問其事意或法寺受人請囑固稱奏案未圓或上司有人主張使令詣闕披訴張檢等必一一聞奏望陛下亦一一審詳又訪聞密院中書政出吏胥行遣只檢舊例無舊例則不行樞相商議别無逺謀别無逺謀則多失失於邉計者去年失清逺軍今年失靈州失於邦計者不知府庫有無不知倉廩虛實戎夷深入則請大駕親征將帥無功則請聖慈裁斷所以倉廩盈虛過不在樞密院邉防動靜事不屬中書因此相承寖以成例聖恩若且任用則不失享富貴聖㫖若令罷免則不過歸班行昔漢之三公若罷免則放之歸農若誅戮則賜其自盡其任用既重則黜責非輕操國柄者所以不敢不盡心持兵權者所以不敢不盡節今則不然臣下得優逸而君上但焦勞勞逸失於尊卑實為倒置也故隂陽不順水旱不調法令滋章盜賊多起尚率京城父老與百辟千官五度上章請加尊號賴聖君英睿以為天不可欺御劄丁寧示志不可奪必斷來表深愜羣情由是見宰相以甘言佞上求聖知以國計軍機非已任蓋自來任重責輕之所致也今之所急者國家帑藏無餘錢倉廩無積粟但急備邉之用不思經國之謀地愈荒而黎民愈貧事彌繁而資貨彌少官吏自救過不暇國家欲求治實難若加以水旱之災乘以戎夷之患不知在廟堂者用何智略總軍兵者作何籌謀臣不曉機務但以稽古聞於逹聰望陛下詳臣所言聽臣所奏賞罰二柄不必一一問中書通變萬機不必一一由密院然後所切者辨認讒謗察訪忠良速究危亂之已萌早覺衰微之有漸也錫自注云咸平五年九月二十一日按錫稱近敕大臣不守亷隅多置資産蓋指宰相向敏中也向敏中罷相在十月丁亥不應在九月便有此奏當是九月字誤今移附十月十一月壬辰朔詔麟州給復一年癸巳命度支員外郎李士衡內殿崇班閣門祗侯李溥詣陜西諸州增酒𣙜之課時士衡言陜西𣙜酤尚多遺利今西鄙屯戍至廣經費實繁望遣使經度其事可濟邉用而不擾民故有是命由是嵗增錢二十五萬焉本志云萬餘緡今從李溥傳甲午六谷首領博囉齊遣使來貢馬五千匹詔厚給其直别賜綵百匹茶百斤仍宴犒其部族雄州言偵得契丹調兵將謀入冦上曰北敵知郊祀有日張此虛聲以聳邉境耳輔臣言北面雖有兵備而押陳使臣猶在輦下宜令進發詔使臣有在河北河東及近京諸州者可就遣之乙未民有自眉州來貢奉者上念其遐逺詔禁止之辛丑享太廟前一日微雨至是開霽壬寅合祭天地於圜丘大赦諸路缺咸平四年已前殘稅河北河東缺五年貸糧并天下逋負升州廣德軍率分錢洪筠州臨江軍酒麴腳錢婺州竹園虛收孳生竹四十億六千一百五十一萬悉除之申嚴銷金衣物之禁初議南郊三司使王嗣宗等以郊祀經費繁重請止行謁廟之禮而推慶賜宰相呂䝉正曰前代停郊謁廟蓋因災沴今無故罷祀典禮無據上曰不惟典禮無據郊壇一日之費所省幾何殊非寅恭事天之意也因詔三司非禋祀所須並可减省於是省應奉雜物十萬六千功九萬九千左藏庫監官郭守素言淮南升潤州細絹價髙望不給冬服留充郊祀賞給可獲數倍之利上曰朝廷方覃大慶豈復規小利也罷之郊祀禮畢有司請用是月丁亥或辛亥大宴時許國長公主在殯上曰主以丙午啓攢此二日柩方在途未葬之前朕情所不安咸曰王者禮絶朞上曰禮能行之即為例矣因詔用乙巳大宴就未啓攢之前也丙午大雪上謂宰相呂䝉正等曰昨郊祀之際重隂變晴今兹成禮又獲嘉雪朕以薄德託於人上守祖宗基業日謹一日不遑寧居至於奉天事神未嘗不夙夜祗戒惟恐未臻治道而靈貺荐至蓋天意敷佑蒸黎亦卿等調燮之力豐年可期矣太常少卿盧之翰在廣州無亷稱上以職方員外郎直史館凌策熟南海風俗戊申賜策金紫命往代之翰徙之翰知永州之翰傳云與轉運使凌策不叶策發其隂事按策傳此時在朝廷不在南海也策固嘗為轉運使蓋前此矣己酉以皇子祐為左衛上將軍封信國公宰相執舊典請加王爵上不許庚戌左僕射平章事呂䝉正加司空門下侍郎平章事李沆加右僕射羣臣咸以序加恩十二月丁丑宋白等罰俸楚王元佐為右羽林衛上將軍按宋史本紀是日楚王元佐為右羽林軍上將軍雍王元份守太傅兖王元傑守太保曺國公元儼同平章事此編所載似有脫文議者云唐德宗朝六軍各置統軍秩從二品羽林龍武神武是也十六衛置上將軍與統軍同左右衛驍衛武衛威衛領軍金吾監門千牛衛是也今楚王當為統軍而以上將軍命之且王前為左金吾上將軍按儀制金吾在統軍上將軍之上是則王乃降秩非遷秩也有司失於討閲矣壬子詔陜西振武軍士逃亡捕獲曽為盜及情理蠧害罪至徒者所在處斬訖奏杖罪部送闕下首身如舊法振武兵皆取自鄉民俸錢惟五百而他物給半及其逃亡則依禁軍罪至死上以其祿廪頗殊而條禁太重故有是命癸丑以職方員外郎分司西京樂史直史館史年七十餘於是奉留司表入賀上召見嘉其筋力不衰且篤學好著書故授以舊職悉取所著書藏祕府史與其子黃目俱直史館時人榮之乙卯以內侍髙品張仁恭為內侍省內侍殿直仁恭從晉國長公主積嵗頗勤幹主為言求遷秩上以仁恭遷殿頭髙品而給事主第其名非便故特置此職命之仍給殿頭髙品俸料己未令近京諸州募强壯願充軍者給衣服裝錢送闕下庚申河陽節度判官清池張知白上疏曰臣聞創王業期於無窮者必政事為基是以王業盛者其政事必經久可取逺大可法然後速見治平之運竊以古今之言事者鮮不以防邉為急務故多舉西北二隅攻守之事以獻方略由是竒兵之謀紛然競興夫五行之中金為兵以五事配之則金為義兵之為用實不可去也乃知言弭兵者罪莫大焉窮兵者亦罪莫大焉夫史籍所載京師為陽而諸夏為隂蓋取諸內外之義也陽主生物隂主殺物故知四夷擾邊不足異也在制之有道爾又和樂為陽愁苦為隂王者必先內和人心而後制四夷此崇陽抑隂之義也臣伏見去春大雪今夏暴雨稽洪範之書則繫乎咎惡之文伏惟陛下自即大位日謹一日而復溫厚恭肅祗畏勤儉討論方册思廣治道聖德無缺則咎惡何從而起豈非政令之間有不便於天時者乎今夫春者發生之月也可生而不可殺也國家每嵗春夏將交之時禁止採捕是仁及鳥獸而不聞禁决死罪夫人者萬物之靈豈不重於鳥獸今建寅之月三元之始孟夏乃是正陽之月於卦為乾况正律所載有秋分已前不决死罪之制月令當春則曰無肆掠謂不可以隂政犯陽又曰宜行仁而不可以舉義事及夏則曰挺重囚出輕繫並無决死刑之文唐朝悉依此制若罪在十惡尤為巨蠧者則决不待時自唐氏失馭政事多隳今刑統內惟存晉天福七年敕立春立夏兩日不决死罪蓋以天福之間方為戰國天下生靈犯罪戾抵淫刑者不可勝紀殺戮之刑僅無虛日故不可全避春夏盛德之月止取其兩日以代兩季今天下每嵗所决大辟至鮮一嵗之中凡有二十四氣每氣各主十五日臣以為天下列郡每嵗所决死罪雖不可禁春夏兩季亦可於立春立夏氣至之時各禁十五日以應一孟之節全發生之陽氣若罪在十惡决不待時者亦可改斬為絞以免流血之刑自餘雜犯死罪若有已斷具獄可取半月外行决其邉防屯兵之地以軍法從事者不在此限又按禮經季夏中氣之後十五日不可興土功為土將用事氣欲靜也請詔天下每嵗起季夏中氣後至立秋節半月內非邉陲防警捍敵浚城及完治隄防以禦水害餘並不得起創土功其整葺頽隳者不在此限臣又聞周禮六官其一曰秋官主刑又月令孟秋中氣之後則命有司繕囹圄具桎梏斷薄刑决小罪秋風則申嚴百刑斬殺必當無留有罪無或枉撓此並順上天行肅殺之令也命使决獄多不拘於此時或在三春或當九夏雖勤恤庶獄慮有滯留其如未順四時之令也欲望自今除盛夏仍舊降詔恤刑每嵗自孟秋中氣後秋分前遴選周行分道决獄如此則順天行刑萬務必乂而又四方之風謡因之得以知列郡之綱條因之得以振且一嵗之中必順令决獄與其行之於别季不若行之於此時臣又聞先王垂訓重德教而輕刑罰所以見王道之盛也今法令之文大為時所推尚自中及外由刑法而進者甚衆雖有循良之吏亦改節而務刑名也然則刑法者治世之具而不獨任必參之以德教然後可以言善治矣夫德教之大莫若孝悌若捨此而欲使民從化是猶釋利楫而求濟於無涯之津也故宜旌勸孝悌以厚風俗臣伏見朝廷明有詔命優恤孤窮無告之民令異其姓名别為一簿每遇有科徭賦斂則令去重就輕蠲勞為逸斯則蘇疲羸療疾瘵之一術也其如官吏鮮能奉行成制鄉縣之內因而别致慘舒若令佐盡得其人則孤窮無告之民皆得上簿不得其人則委之人吏責自鄉胥狥私任情移易貧富嗷嗷之民孰敢吐一言以伸訴散為流庸委棄溝壑是故將欲興禮義在舒民心將欲舒民心先在均貧富欲均貧富先在正簿書然養民之道郡踈而縣親故知百里之長不可不精採擇蓋列郡之牧數至少而睿鑒可以周知邑宰之任官至卑而朝廷難以遍察夫親民之官亷而不明者則失於馭下明而不亷者則失於徇私必待亷明兼備中和在躬者然後可用是故備其位者則多中乎選者彌少邦國至大也庶官至衆也有人而置諸散地未可知也當其位而不能使盡其心亦未可知也臣是以夙夜為國家思求人之術宜歷選周行有經公舉者擢而用之使先蒞大邑試其政事朞年之間較其成績茍能正其簿書均其户籍而孤窮之民得庇者為上然後酬之以不次之恩臣又聞聖人居守文之運者將欲清化源在乎正儒術古之學者簡而有限其道粹而有益今之學者其書無涯其道非一是故學彌多性彌亂至於經史子集其帙殆萬在於前者悉謂之古法在於編者悉謂之古書殊不知法有可法不可法也書有可𫝊不可傳也若盡使知之則可謂勞而少功博而寡要當年不能究其學纍世不能窮其業今進士之科大為時所進用其選也殊其待也厚進士之學者經史子集也有司之取者詩賦策論也故就試者懼其題之不曉詞之不明惟恐其學之不博記之不廣是故五常六藝之意不遑探討其所習泛濫而無著非徒不得專一又使害生其中何為其然且羣書之中真僞相半亂聖人之微言者既多背大道之宗㫖者非一若使習而成功得不糅淳粹之性蕩中正之氣其為吏也安能分挈治柄使教令不黷哉中庸曰率性之謂道修道之謂教孔子曰性相近也習相逺也是知為儒不可不重其所習董仲舒曰春秋大一統者天地之常經古今之通誼今夫師異道人異論百家殊方指意不同是以上無以持一統法制數變下不知所守此仲舒譏漢之失引春秋大一統之說言諸侯統於天子不得自專亦猶百家之說不得與聖教並進懼乎亂皇王之大道也今之世望漢之世其章句之學彌盛而異端之書又滋多乎數倍矣安可不定其成制哉况夫儒者之術不以廣記隱奧為博學不以善攻竒巧為能文若使明行制令大立程式每至命題考試不必使出於典籍之外參以正史至于諸子之書必須輔於經合於道者取之過此並斥而不用然後先策論後詩賦責治道之大體捨聲病之小疵如此則使夫進士之流知其所習之書簡而有限知其所學之文正而有要不施禁防而非聖之書自委棄於世矣不加賞典而化成之文自興盛於世矣上覽而嘉之召知白赴闕試含人院除左正言此疏當刪修正傳又太略今姑存之十二月壬戌朔石隰副都部署耿斌等言准詔徙河西投降雜户𨽻石州平夷等縣給以閒田今州界絶無曠土上曰此輩凡二萬餘户雖署以職然未有養生之計慮其失所宜令轉運司籍部下逋民田給之乙丑賜侍禁劉守素白金百兩守素繼元之子以貧求外任上曰朕知其貧已嘗賜與然廣南西川江南諸國僞主親屬率多窘乏此僭侈之後不知稼穡艱難靡費無度之所致也己巳知寧化軍劉永錫製手炮以獻且言戎冦攻逼城壘唯此可以抗拒詔緣邉造以充用劉永錫未見西凉府及密本族各遣使來貢上曰靈州河外賀蘭山側有大凉小凉部族甚盛舊與賊遷修好朕慮其合勢為患近纍得邉奏知與賊遷有隙迭相攻掠今西凉密本使來可召問其委曲因其歸俾齎詔撫諭令助討遷賊俟立功則重賞之壬申遣使分詣黃汴河視守凍軍士其冬衣未給者就製與之開封府言諸司獄空無繫囚詔奬之先是公主郡縣主以下諸親外命婦之入內者因誕節郊祀許奏戚屬恩澤初無定制於是有求補閣門祗侯者上以宣贊之職非恩澤可授乙亥詔自今叙遷者至殿直止實録於明年十一月甲寅重出此詔今不取丁丑以宰臣呂䝉正李沆並兼門下侍郎舊制三師三公左右僕射平章事並兼兩省侍郎先是學士宋白梁周翰草二相加恩制書遺忘舊制既而上問白等白等不能對第請改正不復降制止帖麻用印重寫告身白等各罰一月俸涇原部署陳興等言若賊衆奔突則請并東山隴山等七堡兵入鎮戎軍合力以拒賊詔許之仍令逺其斥堠其七堡芻粟軍器防城什物等無得多畜士午賜京城老人祝道嵒爵一級道嵒百十九嵗率其徒百五十四人上尊號上嘆其夀考故奬之餘賜時服茶帛廣南轉運司言新州劉鋹日因運茶嵗久積棄以其價數十萬分配部民郭懷智等百餘丁輸之遂以為常民貧力所不逮請均賦諸縣詔悉除之先是麟州界首領拉爾結瑪等三族千五百帳以濁輪寨失守相率越河內屬遂分處邉境既而帥臣屢言拉爾結瑪常往來賊中恐復叛去乃命徙置憲州樓煩縣遣使賜金帛慰撫俟賊界寧謐即放還濁輪寨失守史不曽載其月日當考上以龍圖閣及後苑所藏書籍尚多舛誤欲重加讎對甲申詔流內銓於常選人內擇歷任無過知書者十五人以聞命吏部侍郎陳恕知制誥楊億試之於是得館陶尉大名劉筠等七人給本官俸料大官供膳就崇文院校之踰年而畢並授大理評事祕閣校理丙戌令審官院考校京朝官今任及五年已上無贓私罪者以名聞當遷其秩諸路轉運使副令中書進擬是月上謂宰臣曰御厨嵗費羊數萬口市於陜西頗為煩擾近年北面𣙜場貿易頗多尚慮失於豢牧呂䝉正言洛陽南境有廣成川地曠逺而水草美可為牧地即遣使視之㑹要乃咸平五年十二月事或移見他處則當削彼存此熙寧三年五月二十一日始罷買𣙜場羊是嵗契丹稍侵掠邉境所在擊走之卒不深入於十一月甲寅北面諸州奏敵騎悉散去上曰吾固知其虛聲也輔臣曰陛下頃者不令趣遣押陳使臣聖斷誠得之實録於十一月甲寅書北面諸州奏契丹遁去事無首尾今削去特著此事於嵗末詔自來臣僚奏異姓親及門客或除簿尉賜出身自今並罷之止許奏同姓親如當除簿尉者授試寺監主簿已有官者不得求遷㑹要稱五年無其月侍御史知雜事田錫言錫奏議無月日因改五年附此竊覩唐憲宗即位改元元和元和四年冬十月御宣政樓册皇太子又按李絳論事集元和三年翰林學士李絳等上言古先哲王以天下為大器知一人不可以獨理四海不可以無本立太子以副已設百司以分職然後人心大定宗社永寧有國家者不易之道也陛下嗣膺大寶四年于兹矣而儲闈未建典册不行是開窺覦之端乖重謹之義非所以承宗廟重社稷也憲宗依所請下制敕所司擇日備禮册命今陛下自纂承大位改元以來五年于兹矣儲闈未建典册不行豈不慮窺覦之端豈不思重謹之義宜速以宗社永寧為大本人心預定為逺圖也
