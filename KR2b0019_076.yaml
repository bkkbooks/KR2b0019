body:
  text: 續資治通鑑長編卷七十二宋李燾撰真宗大中祥符二年秋七月甲寅朔詔右僕射張齊賢户部尚書溫仲舒右丞向敏中御史中丞王嗣宗知雜御史盧琰各舉才堪御史者一人內東門司言皇親諸命婦應入宫廷覲見者承前未嘗預奏皆不待報而入有司無由致詰望自今並前一日具奏待報詔長公主不須待報餘依所請先是開封府劾進士廖符械繫庭中曝裂其背訊之無狀上以炎暑之月罪未見情橫罹虐罰良可嗟惻丁巳特置糾察在京刑獄司命金部員外郎知制誥周起侍御史趙湘領之應御史臺開封府及在京凡有刑禁處徒以上罪即時具收禁移報內未盡理及淹延者取欵詞駮奏若曠於舉職致有枉濫因事彰露則重罰之三司請出內藏綾萬匹以助經費從之侍其旭至瀘州夷人即來首罪殺牲為誓旭案行鹽井夷復拒之旭率部兵百餘生擒其首領三人斬數十級而部下被傷者幾二十人旭遂趨黎州以其事聞時黎州夷人斗婆亦數出為冦上以旭輕敵致侮己未降詔諭旭令篤恩信設方略制禦無尚討伐以滋驚擾實録云旭按行鹽井部下被傷遂還黎州按旭受詔招撫戎瀘夷人初不及黎州不知何以遂來黎州而實録且稱還也黎州與戎瀘夷人固相通然道里亦稍逺矣其後遣將出兵又以黎雅巡檢為名其所討伐則多戎瀘邊界不知何也據旭本傳云夷人斗婆行出冦黎州詔旭領兵討之乃不云治江安殺任賽事與實録㑹要及正史俱不合疑瀘州及黎州皆有夷人作過而正史實録㑹要載首尾踈略也今略依旭傳删修更須詳考之閣門祗候盧鑑言前知儀州有軍士亡命入蕃自首者皆從減等至有再亡命者蓋罰輕之弊望自今並從斬决上曰首而戮之是使人無自新之路也遂詔緣邊諸州軍士亡命入蕃自首者並械送赴闕其後法寺定制卒請斬之妻子免緣坐情重者論如律咸平初鑑為鄜延路承受李繼遷聲言石隕帳前有文曰天戒爾勿為中國患鑑入奏其事且云賊詐為此以疑朝廷也冝厚設備以待未幾靈州陷上思其言擢知儀州諜者言繼遷將由制勝關大入冦詔徙老幼芻粟于內地鑑奏以為搖民心且示以弱不可徙已而賊亦不至鑑金陵人也罷夀州市木以勞民故也辛酉詔昭應宫𨽻役禁軍自今每月更代廂軍及冬並休息之初禁軍每季一易上欲均其給賜復有是命復以萬安宫為滋福殿詔羣牧司在京及外坊監自今息及五分死失不及分者使臣軍校第賜器幣孶育不及數而死失踰分者節級科罪從制置使之請也先是有詔減鄜延路駐泊兵九指揮歸營乙丑鈐轄李繼昌等言邊防備豫望許如舊上以部落安靜冀省轉輸之勞不許實録於明年七月乙未復書此事聖語稍不同其事則無異蓋重出也丁卯太常禮院言准詔詳定淄州通判石中孚所奏州縣祭社稷元聖文宣王所用器服今檢討典禮諸州縣祭社稷釋奠雖載祭官祭服三獻之說伏緣八籩八豆禮與京諸小祠同其諸州縣獻官請止用公服行事從之庚午詔開封府界提㸃縣鎮官察舉諸縣刑獄上諭宰臣曰京朝官諸司使副將赴外任有上殿者朕皆諭以當行之事期以舉職其不上殿者自今宜為辭誡勵摹印賜之知樞密院陳堯叟言幕職州縣官亦望誡勵從之帝曰先朝嘗以儒行篇賜臣僚今亦當復賜也㑹要七月十七日事十七日庚午也辛未以昭應宫為玉清昭應宫初置養病院上以宫禁有罪者古有掖庭獄處之今不欲置于內遂以通逺門內官宅為之上封者言諸州縣祈謝雨雪多因緣率斂癸酉詔自今所須禮物並從官給乙亥京東徐齊淄青兖等七州水詔遣使馳驛按視仍令本路轉運使提㸃刑獄官分道檢校堙塞之傷田悉蠲其租戊寅詔封元聖文宣王廟配享先儒魯史左邱明等十九人爵為伯贈蘭亭侯王肅司空當陽侯杜預司徒命近臣各撰贊改內衣庫為尚衣庫審刑院大理寺上折杖贖金條承前犯加役流而下一罪先發已經論罰餘罪後發又計前杖科决上以細民膚革薦傷殊非哀矜之意詔申定制止贖金以滿餘數若情理凶惡者即復决杖庚辰侍御史趙湘祠部郎中判三司都催缺司彭惟節等條上封禪赦前天下逋負總千二百六十萬七千悉除之辛巳禁河北諸州民棄農業學禁咒槍劔桃棒之技者光化軍民曹興為盜將刑稱寃軍遣縣尉覆按刑部言尉本捕盜復令鞫案慮其避收逮平民之罪或致枉濫乃詔自今大辟案具臨刑稱寃者並委不干礙官覆推之如闕官即白轉運提㸃刑獄使者就鄰州遣官按之壬午令兖州遣兵百人駐奉符縣以警盜詔內侍宣賜有送錢者冝令本省差定其數勿使過當時軍校有亡沒者賜錢五十千其家以十千奉使臣上封者言之故命條約八月癸未朔以祠部員外郎直集賢院主判三司開拆司梅詢知濠州度支判官太常博士黃宗旦知衢州詢宗旦在計省不能靜畏自守故出之黃宗旦未見州邑按詢本傳出守坐議天書不知宗旦所坐姑用實録所載當考詳改定實録蓋諱其事也侍其旭言蠻人僻在巖險未即首罪尚集徒黨拒扞望發兵三五千與近界巡檢並赴淯井監脅誘如尚敢陸梁即因而討之甲申以文思副使知慶州孫正辭為黎雅等州水陸都巡檢使東染院副使環慶駐泊都監張繼勳及旭為同巡檢使仍發陜西兵嘗經戰陳者付之緣邊給兵器又録曹利用討宜州賊賞罰格示正辭等遣陕西轉運使李士龍乘傳與正辭等偕行供給軍須其將士計程俾冬初到彼以春夏瘴毒故也張繼勳子懷信內臣也繼勳亦必內臣當檢乙酉糾察刑獄周起等言所閲案牘止是節狀慮事涉曖昧無由辨其枉濫如實有寃抑及官典非理考掠望聽已决囚詣司自陳如未經科察陳訴無得輒詣鼓院從之詔糾察官依審官院例御厨給食丙戌詔鄆淄齊等州避水民所過津渡勿算仍令所在以官船助之初河北諸監言邢趙芻地甚廣請就邢州置監羣牧制置使遣判官括視間田得萬餘頃可牧馬萬匹且言邢州去京稍逺乞就洺州置大名第三監從之峽路都監侯延賞病上以蠻冦未寧發兵招遏慮施黔䕫峽夷人擾懼戊子命閣門祗候康訓同管勾峽路駐泊公事往慰撫之康訓未詳邑里轉運使舉侍禁張明請以代延賞上曰丁謂嘗在䕫峽當更詢謂如可兹授即進秩遣之因言邊城須諳山川道路民間情狀者苟徒有材未熟其事亦難責其效馬知節曰逺守尤冝遴擇但近臣中未識其人上曰朕亦未識既有公舉即可任也此據寶訓附見張明用否當考是年十月洪州都監張明改釐務當别一張明也己丑令湖南發卒數千人屯洞庭山初上出山圖以示輔臣曰此山在水中四靣去岸十餘里聞歉歲則攘奪者多竄匿焉故命巡警之庚寅審刑院奏議法寺所斷夏縣尉安起捕百姓三人以為盜靣令公人拷掠百數加非理刑破其踝骨而本縣令不知其人既傷所由司僞作本人狀言其跟損皆父兄毆擊致然非官司也法寺斷令尉公罪仍以本司及公人為首上令知院事劉國忠讀其案節上曰靣行拷掠豈專由公人邪國忠始言合作私罪當免二官於是再拜待罪詔釋之上嘗議擇官知審刑院謂宰相曰當須詳悉法令之人王旦曰令法官奏斷案牘則大理寺有法直詳斷審刑又置詳議官分主其事知院者但能曉達事理詳究物情不必熟法令者上然之給大理寺公用錢月二百三十千其先給茶罷之詔杭明廣州市舶司自今蕃商齎鍮石至者官為收市斤給錢五百以初立科禁也三司定直斤止錢二百上特增之祕書丞董溫上言漢以霍山為南嶽望令夀州長吏春秋致祭詔禮官與崇文院檢討詳定上奏曰按爾雅云江南衡注云衡山南嶽又霍山為南嶽注云即天柱山濳水出此則非特霍山為南嶽舜五月南巡周之王制皆以衡山為南嶽惟漢武帝以衡山遼逺取䜟緯之說而祭灊霍至隋復以衡山為南嶽况奉祀已久國家疆宇敻廣難於改制其霍山如有祈請及特祭即委州縣奉行從之癸巳詔洞真宫及諸公主宅自今所須之物任便市易令雜買務供應時駙馬都尉柴宗慶家僮自外州市炭入京城所過免算至則盡鬻以取利復市於雜買務家僮輩競有求丐上曰宗慶不能治家故縱其下亦可醜也乃加條約焉上之後宫杜氏入道在洞真宫故與諸公主同例杜氏昭憲皇后姪女也上禁銷金嚴甚還自東封杜氏乃服以迎車駕上見之怒遂令出家為道士由是天下無敢犯禁者杜氏入道事迹國史不載今據江休復雜志編入江云太和宫誤也甲午京城西積水壞民田遣中使與閣門祗候康宗元領徒畎導宗元等因請大修堤防上曰沮洳之際何以施工且堤防峻隘决壞必多况秋水已落冝俟來春修築仍豫經度畫圗以聞康宗元未見乙未遣使臣督京東路導治積水知雜御史趙湘言臣聞君臣之際禮義攸行朝廷之儀進退有度故辨色而皆入或假寐以待時苟夙興之不勤何匪懈之能竭况乎稱疾尤屬慢朝若無察視之規孰執曠官之咎伏見常參文武官每日趨朝並早赴待漏院候開內門齊入今以辰漏上始放朝故多後時乃入望許令知班驅使官二人常在正衙門視之有入晚者具名申奏又風雨寒暑稍甚即多稱疾請假望委御史臺酌度聞奏遣官診視如顯有狂妄即具彈劾從之丙申詔旌表門閭人自今二稅外免其諸雜差役按先朝旌表人即云二稅外免其他役不知何故今乃有是詔也當考令澶州勿禁牛渡河先是上謂王旦聞河北牛疫京東有以耕牛往貿易者澶州河梁津吏止之此甚不便當諭周瑩任其所適因言水潦所至秋稼固已有傷水若早退二麥猶或可望苟泛濫不已九月方退雖或多種地亦不堪旦曰河水所經謂之河淤乃成膏腴上曰若占地既久即亦不堪此老農之說也丁酉吏部侍郎趙昌言卒戊戌益州言黎州蠻已招安有未寧輯者望就選使臣撫諭詔梓州路轉運使滕涉及侍其旭等如孫正辭等未至第依前詔安撫按兵勿出候正辭等至彼即聽便宜從事僞唐保大中封三水府神為王己亥詔别加新號令江太平潤州遣官祭告詔河北緣邊州軍公吏毋得非禮使之時邊城以契丹遣使朝聘常肄習樂部以備宴犒復教公吏為俳優至有以醜言斥軍校咎纍供戲笑者人或不堪上以為非馭下之體故戒之益州言卭部川蠻殺保塞賣馬蠻十八人即移牒黎州得報稱卭部川與山後兩林素有讎隙殺保塞蠻乃大渡河外蠻也因下詔戒敕勿使相侵擾又詔邊臣不得輒入溪洞邀功生事辛丑令陜西轉運使李士龍權管勾梓州路公事時本路轉運使滕涉至黎州遇疾士龍部糧赴彼因命之癸卯封皇第八妹陳國長公主為吳國長公主出家號報慈覺正大師賜名清裕所居院曰崇真資聖先是上謂王旦等曰長公主賜師號當降制否旦等曰據典禮無之上曰當進封大國因而降制旦等曰如此則可也公主入院有日上召而誨諭之仍慮悠久廢忘乃筆記大略以賜他日出示王旦等曰諸妹出降朕但教之婦道恭順而已吳國今自主院事不得不曲為之防又詔崇真資聖禪院自今於雜買務市物具數以聞慮擾人也買物具數在九月丙寅今并書甲辰西南蕃王龍漢􅚜遣使來貢方物賀東封也詔加漢􅚜寧德大將軍所遣使百餘人並增秩有差河東緣邊安撫司言出巡至府州有蕃部獻羊馬食物等不欲違其意因留食物慮自今出巡復有來獻者欲准例以官物償其直從之是月詔開封府凡出榜示衆並當具事聽朝㫖初本府榜街止絶牙保引致民家卑幼舉借輝和資財者上曰國家惠綏逺人天下無外京師四方所凑豈可指言回鶻耶故有是詔九月壬子朔入內供奉官王承勛言准詔於洺州塞障河水口本州差權推官祖百世監督兵夫頗見勤藎望即授正任上曰州縣官除幕職皆自特恩內臣豈當論請即令吏部銓擬官代之管勾南宫北宅事趙湘等言北宅供奉官承慶等兩赴朝參不及請按問勾當使臣上曰承慶已有狀訴云諸叔將軍等假日許由元武門入唯承慶輩皇城司條約止令入東華門仍俟諸叔上馬始由東華門入以故多就班後時甲寅乃詔承慶以下假日朝參許入元武門凡內侍有過者責為灑掃院子乙卯賜其名曰散內品丙辰録故度支員外郎知磁州何邴子知崇為太廟齊郎又徙其姪平夷縣尉知古為滏陽縣尉邴先守象州有勞歷知澤磁二州卒其家人詣州言知崇始十餘歲願徙知古為磁州官近制省郎物故無賞延之例上念邴前效特甄録焉戊午給秦州長道縣水漂溺民米人一斛孫正辭等以北兵不諳山川道路因㸃集鄉丁目曰白芀子弟給兵器使為嚮導又請濟師上以邊徼窮僻供億非易不許仍詔正辭等如蠻冦不受招安已經誅翦畏服勿窮追之又言蠻性獷悍往者丁謂䕫州安撫有誡誓並令㰱血為盟署鐡石柱以志其事條制甚多詔樞密院録示正辭等壬戌合鎮州定州路部署為一命定州副都部署雍州觀察使王能領之鈐轄都監路分如故鎮定舊各置部署既罷兵亟省其一尋又分命桂州觀察使石普於是普遷保平留後便道之任乃復合為一初合鎮定為一乃景德二年正月癸巳癸亥徙秦州採造務為馬鬃寨從知州楊懷忠之請也甲子命工部侍郎馮起為契丹國母正旦使南作坊使李繼源副之殿中侍御史趙稹為契丹國主正旦使六宅使嘉州團練使杜守元副之太常博士直史館樂黃目為契丹國主生辰使東染院使潯州刺史潘惟吉副之李繼源未見初汴水漲溢自京至鄭州浸道路詔選使臣知水者乘傳減汴口水勢圖上利害既而水勢斗減阻滯漕運復遣使浚汴口乙丑詔奉使夏州私覿之物前後名品不等自今令定數官給其直先是命供備庫使謝德權决金水河為渠自天波門並皇城至乾元門歷天街東轉繚太廟皆甃以礲甓樹之芳木車馬所度又纍石為梁間作方井宫寺民舍皆得汲用復東引由城下水竇入于濠京師便之丁卯德權奏功畢詔宗正告廟室賜役卒緡錢司天言太隂當食之既翌日皇帝本命請禳祀之上曰經躔已定何可祈也不許既而候之不虧宰臣表賀戊辰詔左右騏驥院馬數自今旬奏月比省日奏之煩也以吳國長公主出家受誡訖普度天下僧尼道士及宫觀寺院每十人度一人不滿十人及各禮師者亦度一人庚午詔自今郊祀列周伯星位于氐宿夀星之次永為定式從翰林天文邢中和所請也審刑院大理寺言准詔定違制及不躬親被受等條今請應宣敕內有稱依法科罪及朝典勘斷不定刑名者並合准律令格式無本條者准違制分故失及躬親被受與不躬親被受條區斷內情重者奏裁仍令自今羣官到任應承前宣敕並交付遵守其有違犯不得以未知條貫為辭從之辛未衛州獻金文龜有司以前詔却之牙吏伏闕下纍日上聞之特令放於宫沼壬申詔河北諸州軍城壘有經夏雨摧圮者並完葺之邵州防禦使廣平公德彛言女適殿直郭中和家族頗衆欲為别置一第上曰中和有父母若從其請則婦事舅姑之禮闕矣不許郭中和未見甲戌遣使齎辟瘴藥賜戎瀘州軍民乙亥無為軍言大風拔木壞城門營壘民舍壓溺者千餘人詔遣內臣馳驛恤視蠲來年租收瘞死者家賜米一斛李繼周卒詔邊臣擇諸子可襲其職者以名聞邊臣言其子殿直士彬選懦從子士用性朴忠練邊事為部落所伏丁丑詔士彬管勾部族事士用為金明巡檢都監以左右之賜鳳州水溺民米人一斛先是上謂王旦等曰朕在東宫講尚書凡七遍論語孝經亦皆數四今宗室諸王所習惟在經籍昨奏講尚書第五卷此甚可喜也於是召寧王元偓等赴龍圖閣觀書目上諭之曰宫中常聽書習射最勝他事元偓曰臣請侍講張頴說尚書閒日不廢弓矢因陳典謨之義上喜甚乃詔每講日賜食命入內副都知張繼能主其事尚慮元偓等輕待專經之士又加訓督焉先是詔諸州有藏太宗御書者悉詣闕以獻於是令樞密院標題用印復付其家是秋京西河東陕西江淮荆湖路鎮定益梓邛密等州言豐稔京師粟斗錢三十冬十月癸未雄州奏契丹改築新城上謂輔臣曰景德誓書有無創修城池之約今此何也陳堯叟曰彼先違誓修城亦此之利也上曰豈若遺利而敦信乎且以此為始是當有漸宜令邊臣詰其違約止之則撫馭逺俗不失其歡心矣斬濠州民齊睿坐惡逆逃亡㑹東封首露州用赦原之知定逺縣王仲微言通判度支員外郎直史館趙况受睿錢三百千不以上聞請重置其罪詔特斬睿論况枉法除名為民况范陽人右丞上交子也上交見天福十二丁亥詔宣祖昭武皇帝昭憲皇后忌前一日不坐忌日羣臣進名行香禁屠廢務著于令式戊子詔如聞江浙運糧兵卒雖經冬不得停役自今令休憩兩月庚寅令殿前馬步軍頭司自今選補諸軍每指揮准舊例滿五百人止初命諸州簡閲以補禁旅所取既廣或踰舊額而營舍素定或至二人共一室者故申敕焉御史中丞王嗣宗言許州積水害民田蓋惠民河不謹堤防每歲决壞即詔閣門祗候錢昭厚經度之昭厚請開小潁河分導水勢上曰泄其上源無乃移患於下流乎昭厚不能對判陳州石保吉復言此河浸廣則郡當水衝為害甚大乃命白波發運判官史瑩視之瑩請修頓固雙斗門於減水河口為束水鹿港以均節壅溢奏可因詔三班選幹局習事者巡護隄岸殿最如黃汴法自是吏謹其職而水災稍息實録選使臣視隄岸在八月丙戌今依本志載史瑩建議之後昭厚瑩邑里未詳甲午詔諸路州府軍監關縣擇官地建道觀並以天慶為額民有願捨地備材創蓋者亦聽先是道教之行時罕習尚惟江西劔南人素崇重及是天下始遍有道像矣殿中侍御史張士遜上言今營造競起逺近不勝其擾願因諸舊觀為之詔從其請賜戎瀘捕蠻將士緡錢以蹊路峻險食物不給故也庚子樞密院言三班使臣在外有過衝替及降任者皆候替人動踰歲月所釐事務益復隳壞請自今詔命到日即令離任擇官權蒞事從之兖州雨霜害稼甲辰遣使巡撫詔如聞翰林御厨儀鸞司所逋官物皆積耗散三司令均數備償甚無謂也並冝除之乙巳內侍省言近日本省使臣保任子弟多求𨽻入內內侍省望行禁止從之遣內侍以御製太山銘贊賜編録封禪記丁謂等謂因援太宗賜蘇易簡故事請就三司署集近臣同觀又赴崇文院朝堂示百官上曰朕何敢上比先帝謂等固請乃許之又遍賜近臣丁未詔河西諸蕃部以夏州納欵其素與為隙者自今無相侵略仍令緣邊吏召集首領曉諭之并州民鬻石炭者每䭾抽十斤己酉詔除之庚戌詔夏州進奉外有以私物貿易久而不售者自今官為收市辛亥中使史崇信言侍其旭等以衣服紬布誘降夷人斗婆行將按誅其罪上以旭召而殺之是違招安之實乃降詔諭旭等有來赴招安者勿殺如敢抗拒即進兵討伐國史西南蕃傳以斗婆行降與上賜侍其旭詔令務恩信勿生事繫之元年此誤甚今不取上以御筆所記送闌馬事示宰相曰雄州奏得闌馬送契丹又奏近有盜馬以歸投者亦止稱䦨遺牒送此詐也彼豈不知耶冝諭雄州自今有若此者當閲實還之無涉欺誕㑹要載此事於月今附見御史中丞權判吏部銓王嗣宗剛果率易無所畏憚每進見極談時事或及人間細務頗輕險好進深詆參知政事馮拯之短而結宰相弟旭使達意於旦以為助旦疾其醜行因力庇拯嗣宗大恚知制誥王曽有從妹適孔冕家而閨門不睦曽從東封因至冕家啜茗中毒得良藥乃解事己暴露曽密疏言方行大禮願罷推究宰相亦以冕先師之裔將有褒擢遂隱其事而嗣宗獨謂曽誣陷冕懼反坐乃求寢息㑹愆雨嗣宗請對言孔冕為王曽所訟儻朝㫖鞫問加之煆煉則冕終負寃枉又侯德昭援赦叙緋年考未滿以欺詐得之非吏部令自陳首亦無由知沿堂行首李永錫坐贓除名復引充舊職尋送銓授令録上亟召王旦等詰其事旦曰孔冕之罪朝議特為容隱不令按問誠非寃枉也德昭據吏部奏驗乃行制命及其首露即已追奪永錫先為本部節度使市羊不輸算除名沿堂闕人李沆以其資質魁梧因選擬官訖復用為副行首祗事四年陳牒乞班行叙用因復送銓上曰止此乃致旱邪嗣宗理屈復以他辭侵旦旦等不之抗乃已是月嗣宗請對言去歲八月至今年十月不雨宿麥不登及秋兖鄆苦雨河溢害稼蓋刑政有失致成災沴因復言孔冕寃枉播在人口而王曽尚居近班願示黜退以正朝典臣請露章以聞上謂王旦等曰曽實無罪若嗣宗上章亦須裁處旦曰孔冕不善之迹甚衆但以宣聖之後不欲窮究謂其寃枉感傷和氣恐未近理趙安仁曰今若再行按問冕何能免罪欽若曰臣請蕃問嗣宗或再鞫冕不能自隱則如何區處翌日嗣宗復對且謝前言之失上優容之其狂妄多如此類詔糾察刑獄官如有公事上殿即赴內殿起居仍免常朝十一月壬子朔知鄧州張知白言陕西流民相續入境有欲還本貫而無路糧者臣誘勸豪民出粟數千斛計口給之以半月為凖凡就路總二千三百家萬二百餘口其支貸有餘者悉給貧老詔奬之衛尉卿權判刑部填從吉言准淳化三年敕諸州所奏獄空須是司理院州司倚郭縣俱無繫囚又准後敕諸路自今獄空更不降詔奬諭奏至委刑部以逐處旬奏狀㸃勘不謬即具以聞伏見提㸃刑獄司所奏獄空本司比對多不應舊敕外州妄覬奬飾沽市虗名近邠滄二州勘鞫大辟囚枉詿數人裁一夕即行斬决伏見前代京師决獄尚五覆奏蓋欲謹重大辟豈宜一日之內便决死刑朝廷比務審詳恐有寃濫非有求於急速其間州府不體朝廷邀為已功但務獄空必無所益欲望依准前詔不行奬諭其諸州府軍監以公事多少分為三等第一等公事多處五日其次十日其次二十日並須州司理院倚郭縣全無禁囚及責保寄店之類方為獄空委提㸃刑獄司據等第日數勘驗詣實書為印歷從之癸丑令彈射鷙禽傷生之類不得入宫觀寺院甲寅遣使以太宗御製御書各六十二卷賜輔臣人一本皆未嘗頒示於外者後數日又出太宗鏤文紅管筆賜王旦以下人一雙乙卯河東緣邊安撫司言麟府州民多齎輕貨於夏州界擅立榷場貿易望許人捕捉立賞罰以懲勸之上曰聞彼岐路艱嶮私相貿易其數非多冝令但准前詔量加覺察可也丙辰上作文武敕七條賜文臣任轉運使以下至知縣者武臣任部署以下至巡檢者賜幕職州縣監物務官誡勵敇上謂宰相曰羣臣奏事朕以職業戒之因念漢制刺史以六條問事齊有五條晉亦有六條武臣有諸葛亮七戒朕今參求要道以警勵羣臣又思先朝以儒行篇賜近臣今可以并賜一軸七月庚午可考戊午瓊崖等州同巡檢王釗言黎母山蠻遞相讎劫臣即移牒委首領捕送為惡者悉還剽奪資貨及償命之物飲血為誓放歸溪洞皆已平靜上曰朕常戒邊臣無得侵擾外夷若自殺傷但用本土之法苟以國法繩之則必致生事羈縻之道正在此爾己未詔先充北朝國信副使及曽接伴人等每有北朝人使到闕並令依所借服色官位稱呼立班坐宴庚申遣內侍分詣麟府洎緣邊川峽等州賜戍兵銀錢自西北罷兵已來久無是賜至是特命焉壬戌西凉府斯多特遣使來貢癸亥詔徐州淮陽軍不訴水災户今年田租特放十之三上以是州軍雖已蠲賦猶慮民間失於自陳故申命之河中府言廣濟軍士徙𨽻集津以船載家纍於黃河中漂溺凡數十人詔遣使撫問仍給緡錢收瘞劾舟子不謹之罪河北安撫司言緣邊巡檢捕得北界民李守明檢括行裝部送保州訖上曰此輩雖至境上既非奸詐又無禁物不必拘留也乃詔保州給還行裝以酒殽犒而遣之甲子詔諸路官吏有蠧政害民辨鞫得實本路轉運使提㸃刑獄官不能舉察者論其罪先是知晉州齊化基知鄜州何士宗皆坐贓抵法監司初不以聞故申𠡠之何士宗鄜州事當考至道二年正月自河東漕責華州上嘗謂宰相曰為國之要在乎賞當其功罰當其罪不任情於其間則賞罰必當懲勸必行萬方必理和氣必生自然天地降祥四方無事以此思之可不戒乎又言聞隴州推官陳漸不能謹潔轉運使以堯叟諸姪不即按舉昨因違越被劾堯叟特為請令罷任自今儻如此必正其罪不復貸矣此二事據寶訓前屬元年後屬二年今并附此與官司不能舉察官吏事或相類爾當考廣州蕃商凑集遣內侍趙敦信馳驛撫問犒設之即詔知州馬亮等定蕃商犯罪决罰條亮等請應大舶主及因進奉曽受朝命者有罪責保奏裁自餘悉論如律從之乙丑詔諸路差權管軍員歲滿而不獲代者員數頗多蓋事皆申覆樞密院詳驗訖始付有司待報而遣以故留滯自今委殿前侍衛司籍其日月依次遣人代之丙寅入內高班史崇信言孫正辭張繼勳侍其旭等率兵分部入夷界村落招撫尋有詔督正辭等令三日一具事以聞詔三日一奏事在十二月丙子今聫書之己巳三司請假內藏庫錢三萬貫許之癸酉雅州砂平路羅嵒州蕃部王阿黎等十八人來朝貢始通也詔授阿黎懷化司戈禮賔院言輝和爾僧哈尚貢奉赴闕乞赴五臺山瞻禮上曰戎羯之人崇尚釋教亦中國之利可給糧聽其請甲戌契丹遣使右衛上將軍蕭塔喇噶崇義節度使耶律阿固達木副使給事中裴元感將作監張文來賀承天節乙亥詔諸州採木軍士有經冬𨽻役者所在休息之丙子夏州進奉使白守貴等請市弓矢及弩上以弩在禁科不許餘從之庚辰賜近臣宴于王旦第舊制賜宴當以冬至今就旦生日寵之也晉國賢靖大長公主薨十二月辛巳朔詔罷承天節上夀及來年正旦朝㑹先是京城民舍有侵占官地已改正者科積年合納租錢詔悉除之癸未交州黎至忠遣使來貢并獻馴犀一上以犀違土性不可豢畜欲拒而不納又慮逆至忠意俟其使還乃令縱之海澨至忠又遣使表求甲胄具裝詔從其請且求互市於雍州本道轉運使以聞上曰瀕海之民數患交州侵冦承前止許亷州及如洪寨互市蓋為邊隅控扼之所今或直趨內地事頗非便詔令本道以舊制諭之求甲胄及互市㑹要並在二年十二月貢馴犀後而本傳並以其事屬之三年實録亦載求甲胄於三年正月嫌其與廣西漕臣經度鎮撫相亂今從㑹要悉聫書之己丑詔所賜契丹使餼羊如聞在道驅牧頗亦勞止冝就雄州給之初契丹使館伴使有私覿馬馬悉輸官而答禮皆已物至是翰林學士朝逈為館伴使言其事庚寅詔自今館伴使所得馬官給其直副使半之辛卯以東上閣門使李允則領奬州刺史仍知雄州初契丹遣使右武衛上將軍耶律圖嚕庫廣德軍節度使耶律錫爾寧副使右驍衛大將軍冦卿太常少卿邢祐來賀明年正旦錫爾寧中途遇疾壬辰詔遣使撫問錫爾寧免冠膜拜稱謝圖嚕庫等入見在此月丁巳嫌其與涿壬州告哀牒相亂因遣撫問錫爾寧并於辰日書丙申昭宣使誠州團練使內侍左右班都知張崇貴為鄜延路都鈐轄初崇貴自鄜延召還願留京師上以崇貴練悉邊要故復遣之面諭屬任之意仍許每歲詣闕奏事别賜公用錢嵗二百萬庚子史崇信自瀘州入奏孫正辭等分三路入夷境夷人皆震懾伏罪其不赴招安者多已逃竄有蠻斗引者深入藏避已遣人就所匿村舍招諭正辭等領兵直赴淯井又言邛部蠻深憤瀘州夷人相殘乞舉兵助討上曰若邛部蠻成功則過有覬望不若令其自首也辛丑三司使丁謂等上泰山封禪朝覲祥瑞圖百五十昭宣使劉承圭上天書儀仗圖一召近臣觀于滋福殿俄又示百官于朝堂壬寅賜戎瀘州巡檢軍士緡錢癸卯命江州葺唐白居易舊第上與輔臣言及居易嘉其能保名節故有是命契丹國母蕭氏卒年五十七諡曰宣獻契丹主哭必嘔血遣天平節度使耶律信寧馳騎來告涿州先牒雄州雄州以聞甲辰詔廢朝七日令禮官詳定服制內出開寶禮為蕃國發哀儀下輔臣使參擇而行復命太常博士直史館王隨內殿承制閣門祗候郭允恭為祭奠使太常博士判三司催缺憑由司王曙供奉閣門祗候王承瑾為弔慰使賻以衣五襲綾羅帛萬匹乙巳賀正使耶律圖嚕庫初入見既還館令客省使曹利用以涿州牒示之戊申告哀使耶律信寧至閣門使受書進內詔圖嚕庫等就開寶寺設位奠哭中書門下樞密院三司使學士知制誥已上詣都亭驛弔之己酉上於內東門制服發哀召信寧入內親加恤問羣臣進名奉慰蕭氏有機謀善馭左右大臣多得其死力先是蕃人毆漢人死者償以牛馬漢人則斬之仍沒其親屬為奴婢蕭氏一以漢法論每戎馬入冦親被甲督戰及通好亦出其謀然天性殘忍多殺戮始歸政于契丹主未踰月而卒無幾何耶律昌運亦卒昌運即韓德讓也內外制服與蕭氏同柩而葬無子以吳王隆裕子承業為後詔河北河東緣邊安撫司應近邊不逞之輩有妄言以惑境外者嚴加捕詰河北緣黃河先禁採魚小舟上聞細民頗賴以資給詔弛其禁是冬黎至忠卒交趾亂或云至忠為其下所殺詔廣西路轉運使於緣海州軍經度鎮撫時具事以聞是歲天下戶八百四十萬二千五百三十七按每嵗末户口並載此處疑脫口數併左藏庫錢金銀絲綿三庫為一庫淳化三年末可考趙德明帥所部出侵回鶻常星晝見德明懼而還此據仁宗實録德明附傳他書無有不知何時也書之歲末俟考
