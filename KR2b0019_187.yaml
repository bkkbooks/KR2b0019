body:
  text: 續資治通鑑長編卷一百八十三宋李燾撰仁宗嘉祐元年秋七月辛巳朔詔三司開封府臺諫官審刑院復上殿奏事仍日引一班自上不豫惟二府得奏事至是始引對羣臣壬午降同提點廣南東路刑獄公事左藏庫副使馮文俊為廣南西路都監初審刑院斷文俊前知鎮戎軍失入死罪二人引去官勿論上以人命至重特降之癸未禮院言按明道元年天安殿恭謝設太祖太宗配位又皇祐五年南郊三聖並侑今請大慶殿設昊天上帝皇地祇位以太祖太宗真宗並侑前一日享太廟詔恭依乙酉詔京東西荆湖北路轉運使提點刑獄公事分行賑貸水災州軍若漂蕩廬舍聽於寺院及官屋寓止仍遣官體量放今年稅其已倚閣者勿復檢覆丙戌賜河北路諸州軍因水災而徙他處者米人五斗其壓溺死者父母妻賜錢三千餘二千此必因周沆奏請也文彥博富弼等之共議建儲未嘗與西府謀也樞密使王德用聞之合掌加額曰置此一尊菩薩何地或以告翰林學士歐陽修修曰老衙官何所知於是上疏曰臣伏覩近降詔書以雨水為災許中外臣僚上封言事有以見陛下畏天愛人恐懼修省之意也竊以雨水為患自古有之然未有災入國門大臣奔走淹浸社稷破壞都城者此蓋天地之大變也至於王城京邑浩如陂湖人畜死者不知其數其幸而存者屋宇摧塌無以容身縳筏露居上雨下水纍纍老幼狼籍於天街之中又聞城外墳冢亦被浸注棺槨浮出骸骨飄流此皆聞之可傷見之可憫生者既不安其室死者又不得其藏此亦近世水災未有若斯之甚者此外四方報奏無日不來或云閉塞城門或云衝破市邑或云河口決千百步濶或云水頭髙三四丈餘道路隔絶田苗蕩盡是則大川小水皆出為災逺方近畿無不被害此陛下所以警懼莫大之變隱惻至仁之心廣為咨詢冀以消伏竊以天人之際影響不差未有不召而自至之災亦未有已出而無應之變其變既大則其憂亦深臣愚謂非小小有為可塞此大異也必當思宗廟社稷之重察安危禍福之機追已往之闕失防未萌之患害如此等事不過一二而已自古人君必有儲副所以承宗祀之重而不可闕者也陛下臨御三十餘年而儲副未立此久闕之典也近聞臣僚多以此事為言大臣亦嘗進議陛下聖意久而未決而庸臣愚士知小忠而不知大體者因以為異事遂生嫌疑之論此不思之甚也且自古帝王有子至三二十人者甚多材髙年長羅列於朝者亦衆然為其君父者莫不皆享無窮之安豈有所嫌而斥其子耶若陛下鄂王豫王在至今則儲宫之建久矣世之庸人偶見陛下久無皇子忽聞此議遂以云云爾且禮曰一有元良萬國以貞蓋謂定天下之根本上承宗廟之重亦所以絶臣下之邪謀自古儲副所以安人主也若果如庸人嫌疑之論則是常無儲副則人主安有儲副則人主危此臣所謂不思也臣又見自古帝王建立儲副既以承宗廟之重又以為國家美慶之事故每立太子則不敢專其美必大赦天下凡為人父後者皆被恩澤所以與天下同其慶喜然則非惡事也漢文帝初即位之明年羣臣再三請立太子文帝再三謙讓而後從之當時羣臣不自疑而敢請漢文帝亦不疑其臣有二心者臣主之情通故也後唐明宗惡人言太子事羣臣莫敢正言有何澤者嘗上書乞立太子明宗大怒謂其子從榮曰羣臣欲以汝為太子我將歸老於河東由是臣下更不敢言然而文帝立太子之後享國長久為漢太宗是則何害其為明主也後唐明宗儲嗣不早立而秦王從榮後以舉兵窺覬陷於大禍後唐遂亂此前世之事也况聞臣僚所請但欲擇宗室為皇子爾未即以為儲二也伏惟陛下仁聖聰明洞鑒今古必謂此事國家大計當審重而不可輕發所以遲遲爾非惡人言而不欲為也然朝廷大議中外已聞不宜久而不決昨自春首以來陛下服藥大臣侍於左右如人子之侍父自古君臣未有若此之親者也下至羣臣士庶婦女嬰孩晝夜祈禱填咽道路發於至誠不可禁止以此見臣民盡忠蒙陛下之德厚愛陛下之意深故為陛下慮之也今之所請天下臣民所以為愛君之計也陛下何疑而不從乎中外之臣既言陛下聖躬康復又欲見皇子出入宫中朝夕問安侍膳於左右然後羣臣奉奏表章為陛下賀詞人墨客稱述本支之盛為陛下歌之頌之豈不美哉伏望陛下出於聖斷擇宗室之賢依古禮文且以為子未用立為儲副也既可以徐察其賢否亦可以俟皇子之生臣又見樞密使狄青出自行伍遂掌樞密始初議者已為不可今三四年間外雖未見過失而不幸有得軍情之名且武臣掌國機密而得軍情豈是國家之利臣前有封奏其説甚詳具述青未是竒材但於今世將帥中稍可稱爾雖其心不為惡而不幸為軍士所喜深恐因此陷青以禍而為國家生事欲乞且罷青樞務任以一州既以保全青亦為國家消未萌之患蓋緣軍中士卒及閭巷人民以至士大夫間未有不以此事為言者惟陛下未知之爾臣之前奏乞留中而出自聖斷若陛下猶以臣言為疑乞出臣前奏使執政大臣公議此二者當今之急務也凡世所謂五行災異之學臣雖不深知然其大意可推而見也五行傳言簡宗廟則水為災陛下嚴奉祭祀可謂至矣惟未立儲二易曰主器莫若長子逮此之警戒乎至於水者隂也兵亦陰也武臣亦陰也此推類而易見者天之譴告茍不虛發惟陛下深思而早決庶幾可以消弭災患而轉為福應也臣伏讀詔書曰悉心以陳無有所諱故臣敢及之若其他時政之失必有羣臣應詔為陛下言者臣言狂計愚惟陛下裁擇疏凡再上皆留中不出韓琦舊傳云歐陽修因水災再上疏皆留中修傳亦云水災即嘉祐元年事而修傳乃於作樞副後載之誤也修奏議自有月日王德用事據江氏雜志誤云富范蓋誤以文為范也今改之知制誥吳奎言王者以社稷為本宗廟為重社稷必有奉宗廟必有主陛下在位三十五年而嗣續未之立今之災沴乃天地祖宗開發聖意不然何以陛下無大過朝廷無甚失輒降如此之災異乎在禮大宗無嗣則擇支子之賢者漢成之於哀帝孝和之於安帝皆兄弟之子也若以昭穆言之則太祖太宗之曾孫以近親言之則太宗之曾孫陛下所宜建立用以繫四海之心者也况陛下春秋猶盛俟有皇子則退所為後者頗優其禮數使不與他宗室等亦何為而不可臣願陛下勿聽陰邪巧説以誤大事使萬一倉卒之際柄有所歸致社稷宗廟不血食書之史册為後世歎憤臣不願陛下以聖明之質當危亡之比也臣恐此事不宜優遊願速以時裁定之不速必有姦人陰賊其間然亦不獨陛下之過輔弼之臣未聞力爭致宗社無本鬱結羣望感召沴氣毒流天下所宜深罪推之咎罰無大於此范鎮疏云三十五年吳奎云三十四年奎蓋誤也當作三十五年奎疏不得其時因歐陽修疏附見修內制奎外制官職亦相近也殿中侍御史吕景初亦言此隂盛陽微之戒也商周之盛並建同姓兩漢皇子多封大國有唐宗室出為刺史國朝二宗相繼尹京是欲本支盛強有磐石之安則姦雄不敢內窺而天下有所繫望矣願擇宗子之賢者使得問安侍膳於宫中以消姦萌或尹京典郡為夾輔之勢又言天象謫見妖人訛言權臣有虛聲兵衆所附中外為之恟恟此機會之際間不容髮蓋以未立皇子社稷有此大憂惟陛下早為之計則人心不搖國本固矣景初數詣中書白執政請出青文彥博以青忠謹有素外言皆小人為之不足置意景初曰青雖忠如衆心何蓋為小人無識則或以致變大臣宜為朝廷慮毋牽閭里恩也丁亥環慶路經略司言環州轄裕勒等族叛和州張揆以蕃官慕恩等九萬七百餘人往討之斬首一千一百俘三十四人羊牛二千餘黨各獻馬投降即令依舊住坐巳丑出內藏庫絹二十萬匹銀十萬兩賑貸河北水災州軍其人户預買紬絹權與倚閣庚寅遣官謝晴壬辰罷京師舊城裏所增巡檢殿中侍御史趙抃言臣近兩次彈奏李仲昌等乞行竄殛以正典刑近覩中書劄子仲昌等奉聖旨將來經恩並不得復官及差遣唯轉運使燕度元係管勾修六塔河并固護掃約明知不便默無一言盱睢隨人終致敗事今仲昌等聊示貶降獨度未蒙黜罷有何顔面尚擁使權公議物情甚未平允臣伏望早賜黜罷燕度職司以慰安河北人心免更生事又以示朝廷用法不私也據趙抃奏藁以十二日上壬辰十二日也巳亥工部郎中直史館張瓌為户部郎中都官員外郎劉述為兵部員外郎屯田員外郎王彥臣為都官員外郎知審官院胡宿等言三人者自明堂覃恩逮今六年不下磨勘文字特遷之劉述湖州人王彥臣沖子庚子賜祁州團練使李珣大例俸給仍毋得為例以珣章懿太后之姪也辛丑三司使户部侍郎楊察卒贈禮部尚書諡宣懿察勤於吏職雅多益善癰方作猶入對商𣙜財利歸而大頓人以為用神太竭云癸卯武康節度使知相州韓琦為工部尚書三司使唐制節度使納節不降麻本朝丁謂自節度使為參知政事止舍人院命詞今除琦三司使降麻非故事也乙巳貸水災民麥種詔麟府州見定屈野河界至期令邊吏毋得蹂踐田苗如西人內侵即相視逺近驅逐之事具二年二月甲戌是月有彗出紫微坦厯七星其色白長丈餘八月庚戌朔日有食之司馬光又上疏曰竊以為國家者政有小大事有緩急知所前後則功無不成議者或曰當今之務大而急者在於水災泛濫是大不然彼水災所傷不過汚下及濵河之民若積雨既止少疏而塞之則民皆復業豈能為國家之患哉然則在於穀帛窘乏是又不然夫以四海之富養之有道用之有節使良有司治之穀帛不可勝用也豈能為國家之患哉然則在於強敵侵盜是又不然夫強敵侵盜不過能驚擾邊鄙之民御之有道備之有謀可使朝貢相繼豈能為國家之患哉以臣之愚當今甚大而急者在於本根未建衆心危疑釋此不憂而顧彼三者是捨其肺腑而救四支也不亦失乎借有髙才之臣能復九河之道儲九年之食開千里之邊而本根未建尚何益也况復細於三事哉今陛下聖體雖安而四方之人未能遍知尚有疑懼者不以此時早擇宗室之賢使攝居儲副之位內以輔衛聖躬外以鎮安百姓萬一有出於意外之事可不過為之防哉竊意陛下洞照安危䇿應已定而尚密之未欲宣示於外審或如此亦恐不可何則今天下之人企踵而立抉耳而聽以須明詔之下然後人人自安又何待密哉若以儲副體大非造次可定或且使之輔政或典宿衛或尹京邑亦足遏禍難之原靖中外之意今朝廷朝夕所議大抵皆目前常事非甚大而急者臣恐髙拱雍容養成國家之患從而理之用力難矣此臣所以寢不能安食不能飽不避死亡之誅進言不已者也壬子詔秦鳯經略司西界移文保安軍乞抽還修古渭寨軍及索叛去張訥芝臨占等古渭寨乃秦川屬地張訥芝臨占世為蕃官其令保安軍以此報之癸丑復龍圖閣直學士兵部員外郎知池州包拯為刑部郎中知江寧府江南東路轉運使工部員外郎直集賢院唐介為户部員外郎時殿中侍御史裏行吳中復乞召拯介還朝宰臣文彥博因言介頃為御史言臣事多中臣病其間雖有風聞之誤然當時責之太深請如中復所奏召用之故有是命詔大臣自今無得乞子弟及親舊賜進士出身是日知諫院范鎮言臣伏見五月間二星相繼西流一出天江一出天市出天江者主大水出天市者主散財當是時朝廷不知觀天之變以圖消伏又不知為防以備其災才及一月而都城大水居民室廬及軍營漂壞者不知幾十萬區天變之不虛發也如此近日以來彗出東方孛于七星其色正白七星主急兵色白亦主兵天意若告陛下將有急兵至欲陛下與大臣相敕警以求消伏之術不可晏然復如前日也陛下自正月不豫至于今二百餘日既已平復羣臣稀得進見設有得進見者又不與謀天下大計天下之人其心皇皇所以感動上天之變也方此時豈無乘間觀釁起為盜賊如大水之入都城者乎陛下即位三十五年以納諫為德以畏天為心至於小小論議未嘗不虛懷開納今及宗廟社稷之計反拒諫而不用違天而不戒乎臣職當言不敢愛死默默以負陛下陛下以臣言為然乞以臣前所上章與大臣速定大議以臣言為不然乞加臣萬死之罪何者陛下素有納諫之美因臣奏疏使陛下有拒諫之名臣更不敢復奉朝請謹闔門以待萬死之罪甲寅鎮復遺執政書言鎮前後六奏宗廟社稷安危大計而兩奏親納中書厯月踰時寂然不見有所猷為此鎮任言之責不可以不待罪也古之人三諫而不從則去今鎮已六諫矣古之人仕魯不合則去之齊不合則去之衛之晉惟其意之所之今天下一統鎮去而何所之乎惟有待罪而已相公又教以不可效干名希進之人鎮退而竊自惟念不敢奉教而決然為之者義當死朝廷之刑不可以死亂兵之下也此方是鎮擇死之時尚安暇顧干名希進之嫌而不為去就之決哉夫事有緩而不可急為者亦有急而不可緩為者當緩而急當急而緩其為患均天之見變亦然流星與彗之變是也今彗之變當急而朝廷尚欲緩之此鎮寧死於朝廷之刑也伏願諸公攜鎮之書言於上前速定大計如其不然即賜鎮之死放鎮歸田解鎮之職而置之散外皆諸公之賜也乙卯鎮又言臣前六奏宗廟社稷之大計四奏進入兩奏奉聖旨送中書陛下不以臣章留中而令送中書者是欲使中書大臣奉行也臣兩至中書而中書遞相設辭以拒臣以此觀之是陛下欲為宗廟社稷計而大臣不欲為也為大臣而不欲為宗廟社稷計非所以為大臣也臣竊原大臣之意恐行之而事有中變故畏避而為容身之計也今星變主急兵萬一兵起大臣家族首領顧不保其為身計亦已疏矣就使事有中變而死陛下之職與其死於亂兵不猶愈乎乞陛下以臣此章示大臣使其自擇死所丁巳鎮又言臣伏見天禧二年六月彗星見未幾而册陛下為皇太子方是時真宗皇帝只有陛下一人天下人心已有所係然真宗皇帝遽立陛下為皇太子者欲預定其分塞覬覦之路也非私為陛下也為宗廟社稷之計與應天譴之變皆當然也今陛下未有皇嗣天下人心無有所係故天初見流星繼以大水告陛下以簡宗廟之罰陛下君臣不知覺悟故天又出彗以告陛下而陛下君臣晏然復如前時此臣當言之責所以恐懼而待罪也初流星示變時大臣豈意必有大水乎及大水入都城大臣親領徒役以捍水患今大水已定而不知致大水之本本由簡宗廟而為宗廟計故天又示彗也彗之變主急兵大臣又不先定大計以備兵變及兵如水之至而後親捍之雖勤勞如捍水之時亦無益矣陛下為民父母已視民有壓溺之患又忍使遭戮辱之禍而不為宗廟社稷計以答天譴乎庚申起居舍人直祕閣同知諫院范鎮為户部員外郎兼侍御史知雜事鎮固辭不受曰陛下以臣言為非即當加臣萬死之罪以臣言為是豈可不先宗廟社稷計而遽為臣轉官遷職也辛酉降湖南轉運使李肅之知齊州知荆南王逵知兖州知辰州宋守信為鄧州都監通判辰州賈師熊通判邵州以肅之守信師熊等入洞討彭士羲而軍士被傷者四十餘人逵給軍士不均也癸亥樞密使護國節度使狄青罷樞密使加同平章事判陳州青在西府四年京城小民聞青驟貴相與推説誦詠其材武青每出入輒聚觀之至壅路不得行上自正月不豫青益為都人所指目又青家犬生角數有光怪知制誥劉敞請出青於外以保全之未聽敞出知揚州又極言今外説紛紛雖不足信要當使無後憂寧負青無使負國家并謂宰相曰向者天下有可大憂者又有可大疑者今上體平復大憂去矣而大疑者尚存具以青事告之宰相應對唯唯敞既至官拜表又遍遺公卿書曰汲黯之忠不難於淮陽而眷眷於李息朝廷皆知為青發也及京師大水青避水徙家於相國寺行坐殿上都下喧然執政聞之始懼以熟狀出青判陳州自皇祐末有日食之變敞嘗獻救日論三篇備言所以防姦禦變之術青見而惡之謂所親曰劉舍人以此洗滌青邪敞初建言或以為過至是乃服此據劉攽行狀攽又云敞出知揚州見上請出青於外上曰可諭中書按仁宗自正月得疾至七月乃見羣臣攽所云必誤蓋上疏論列爾今略加刪修庶不失事實三司使工部尚書韓琦為樞密使端明殿學士兼龍圖閣學士吏部侍郎知益州張方平為三司使自西鄙用兵兩蜀多所調發方平還自益州奏免橫賦四十萬貫匹及減興嘉卭州鑄錢千餘萬蜀人便之始方平主計京師有三年糧而馬粟倍之至是馬粟僅足一嵗而糧亦減半因建言今之京師古所謂陳留天下四衝八達之地非如雍洛有山河形勝足恃也特依重兵以立國爾兵恃食食恃漕運汴河控引江淮利盡南海天聖以前嵗發民浚之故河行地中有張君平者以疏導京東積水始輟用汴夫其後淺妄者爭以裁減費役為功河日以堙塞今仰而望河非祖宗之舊也遂畫漕運十四策宰相富弼讀方平奏上前晝漏盡十刻侍衛皆跛倚上太息稱善弼曰此國計大本非常奏也悉如所啓施行退謂方平曰自慶厯以來公論食貨詳矣朝廷每有所損益必以公奏議為本凡除主計未嘗敢先公也其後未期年而京師有五年之蓄或取方平集奏議詳載之然不當即附此年先是樞密直學士右諫議大夫權知開封府王素數與歐陽修稱譽冨弼於上前弼入相素頗有力焉意弼引已登兩府既不如志因加詆毁且求外官於是改龍圖閣學士知定州詆毁事據司馬光記聞當考以冀州新河鎮為新河縣廢堂陽鎮本州言堂陽人户稀而新河交易所會故也是夕彗星滅范鎮言臣近以都城大水及彗星謫見為變非常故乞速定大計以答天譴闔門待罪祈以死請臣人微言輕固不足以動聖聽然所陳者乃天之戒陛下縱不用臣之言可不畏天之戒乎彗星尚在朝廷不知警懼彗星既滅則不復有所告戒後雖欲言亦無以為辭此臣所以恐懼而必以死請也今除臣侍御史知雜事則臣之言責益重於前所有告敕未敢祗受鎮又言臣本為諫官有言責不見從故闔門待罪待罪之中除臣知雜御史是臣之言責益重也使臣何以處之若陛下寬臣之罪不置以死即乞解臣言責使歸館供職或除臣逺小處一知州差遣則陛下再造之賜於臣為無量也甲子出恭謝樂章隸於太常詔三司出絹三萬市馬於府州以給河東騎軍殿中侍御史趙抃言臣去年春夏間纍次彈奏宰相陳執中乞正其罪而罷之是時范鎮不顧公議一向陰為論列營救執中上惑聖聽臣尋與御史范師道抨鎮阿黨之狀今朝廷除鎮知雜臣見居臺職風憲之地趣向各異難為同處伏望特賜指揮除臣江浙一州軍合入差遣且以避鎮亦臣之私便也初奏十五日甲子也二十六日再奏今止存初奏范鎮言臣竊聞趙抃因除臣知雜御史言與臣論陳執中事不同乞淮甸一小郡者初臣自河北送伴還陛下諭臣御史言卿中路有文字救雪執中不知卿初無文字臣奏臣有無文字惟陛下可知臣在外亦聞此説未以為信今陛下既宣諭臣容臣却與御史理辨自後兩奏仍乞榜朝堂不蒙施行及陳執中罷去陛下諭臣御史言執中與其女子姦通臣奏執中身為宰相有此大惡固當斬於朝堂以令天下豈可復為使相兼判亳州如其無此為御史所誣亦乞斬御史以令天下無使讒言公然得行自後三奏乞窮究仍乞劄付御史亦不蒙施行竊慮臣前後五奏留中趙抃不知本末至今交結毁臣不已伏乞檢會前奏并今狀降付中書明辨施行仍劄示趙抃免致小人陰相架扇以中傷臣所有臣乞免知雜御史事已具前奏臣深不欲上煩聖聽然趙抃為御史而持論如此乖謬終不覺悟反以為能臣若不乞明辨竊恐壞國傷化事體不細也丙寅刑部員外郎知制誥石揚休為契丹國母生辰使文思使康州刺史沈惟恭副之刑部員外郎直史館同修起居注唐詢為契丹生辰使東頭供奉官閣門祗候王鍇副之侍御史范師道為契丹國母正旦使供備庫副使劉孝孫副之右司諫馬遵為契丹正旦使內殿崇班閣門祗候陳永圗副之尋以祠部員外郎判度支勾院集賢校理刁約代師道師道被疾故也沈惟恭王鍇刁約劉孝孫陳永圖未見宰臣文彥博等請罷恭謝前一日謁太廟表二上許之仍詔宰臣攝事翰林學士胡宿知審刑院詳議官闕判院者當擇人薦於上宿與同列得二人此二人才智明法無上下一人者監稅河北以水災虧課同列議曰虧課小失不足白上以纍才宿不可至上前悉白之且曰此人小纍才足惜上曰果得才小纍何恤遂除詳議官同列退誚宿曰詳議欲得人公固欲白上緣是不得奈何宿曰彼得與不得一詳議官爾是固亦有命也宿以誠事主今白首矣不忍絲髮欺君以喪平生節為之開陳聽主上自擇爾同列驚曰某從公久乃不知公所存如此此據胡宗愈所作胡宿行狀不知同列者謂誰當考宿嘗奏河朔被水災濵棣德博四州之民皆歸罪於李仲昌張懷恩蔡挺三人乞斬此三人以謝河北因進呈韓絳體量劄子仲昌懷恩挺卒坐重責戊辰禮院言大慶殿恭謝請如明堂故事用鑾駕儀仗從之乙亥朝謁景靈降京城繫囚徒罪一等杖笞釋之初李照斥王朴樂音髙乃作新樂下其聲太常歌工病其太濁歌不成聲私賂鑄工使減銅齊而聲稍清歌乃協然照卒莫之辨又朴所制編鐘皆側垂照及胡瑗皆非之及照將鑄鐘給銅於鑄寫務得古編鐘一工不敢毁乃藏於太常鐘不知何代所作其銘云粵朕皇祖實和鐘粵斯萬年子子孫孫永寶用叩其聲與朴鐘夷則清聲合而其形側垂瑗後改鑄正其鈕使下垂叩之弇鬱而不揚其鑄鐘又長甬而震掉聲不和著作佐郎劉羲叟謂人曰此與周景王無射鐘無異上將有眩惑之疾已而果然於是范鎮言臣伏見國家自廢祖宗舊樂用新樂以來及今四五年日食星變冬雷秋雹大雨不時寒暑不節不和之氣莫甚此也使樂無所感動則已樂而有所感動則衆異之至未必不由是也去年十二月晦大雨雪大風宫架輒壞元日大朝會樂作而陛下疾作臣恐天意以為陛下不應變祖宗舊樂而輕用新樂也不然何以方樂作之時而陛下疾作此天意警陛下之深也自初議樂時臣屢論新樂非是其間書一通最為詳悉今再具進呈乞下執政大臣參詳臣書有如可採伏乞且用祖宗舊樂以俟異時别加制作丁丑詔太常恭謝用舊樂戊寅詔湖北鈐轄司下溪州刺史彭士羲侵擾邊境為患不已其相度招安之初魏瓘受命帥荆南建言五溪之險師行鳥道諸將貪功生事於國家何所利因條上三䇿以招安為上守禦為下攻取為失不報後卒如瓘䇿己卯詔麟府鈐轄賈逵自今無得差禁軍回易初逵令五人為一保給錢十萬凡回易五十日出息錢四十萬以備犒軍及下轉運司體量以為舊例如此即無私入故戒約之
