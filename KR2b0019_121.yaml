body:
  text: 續資治通鑑長編卷一百十七宋李燾撰仁宗景祐二年秋七月甲申詔特賜㓂凖謚曰忠愍賜武原修河役卒緡錢丙戌詔以冬至有事於南郊環慶路部署司言西界首領約噶等數入冦邉請下鄜延路移文約束從之封崔府君為䕶國顯應公府君唐貞觀中為滏陽令再遷蒲州刺史失其名在滏陽有愛惠名立祠後因𦵏其地咸平三年嘗命磁州葺其廟而京師北郊及郡縣建廟宇奉之如嶽祠於是因民所向而封崇之賜横壠埽廵守卒緡錢壬辰詔吏部流内銓選人厯任嘗有過者毋得更名免天下獨孤之民支移折變癸巳復詔輔臣觀新樂於崇政殿自是再觀焉此據㑹要戊戍羣臣請上尊號曰景祐體天法道欽文聰武聖神孝徳表五上從之庚子侍御史曹修睦言李照所改厯代樂頗為迂誕而其費甚廣請付有司按劾之帝以照所作鐘磬頗與衆音相諧但罷其増造仍詔諭脩睦知杭州鄭向言鎮東節度推官阮逸頗通音律上其所撰樂論十二篇并律管十三詔令逸赴闕壬寅詔如聞河北河東有不逞之民隂相朋結號為􅀈子社亦曰沒命社自今捕獲者决配它州牢城為首者奏裁能自首者除其罪癸夘詔選人入為諸王宫教授外任成資者二年與京官未成資三年與幕職官又二年與京官先是修撰樂書所上言縣設建鼓初不考撃又無三鼗且舊用諸鼓率多陋敝於是勑馮元等攷求典故甲辰元等言建鼓四今皆具而不撃别設四散鼓於縣間撃之以代建鼓乾徳四年秘書監尹拙上言散鼓不詳所置之由於古無文去之便時雖奏可而散鼓於今仍在又雷鼓靈鼓路鼓雖撃之皆不成聲故常頼散鼔以為樂節而雷鼗靈鼗路鼗闕而未制今既脩正雅樂謂宜申勑大匠改作諸鼓使考撃有聲及創為三鼗如古之制使先播之以通三鼓罷四散鼓如乾徳詔書奏可時有上言以為雷鼓八面前世用以迎神不載考撃之法而太樂所製以柱貫中故撃之無聲更令改造山趺上出雲以承鼓刻龍以餙柱面各一工撃鼔一工執左鼗以先引凡圎丘降神六變初八面皆三撃椎而左旋三歩則止三者取陽數也又再撃以為節率以此法至六成靈鼓路鼓亦如之建鼓植於四隅皆有左鞞右應乾隅左鞞應鐘亥之位也中鼓黄鐘子之位也右應太吕丑之位也艮隅左鞞太簇寅之位也中鼓夾鐘夘之位也右應姑洗辰之位也巽隅右應仲吕已之位也中鼓㽔賔午之位也左鞞林鐘未之位也坤隅右應夷則申之位也中鼓南吕酉之位也左鞞無射戌之位也宜隨月建依律吕之均撃之詔可范鎮東齋記事云周禮雷鼓鼓神祀靈鼓鼓社祭路鼓鼓鬼享鄭康成云雷鼓八面鼓也靈鼓六面鼓也路鼓四面鼓也鼓之數不見於經然神有尊卑則其數有多寡隆殺理或然也必漢時尚然所以康成云爾㡬面猶言㡬兩車㡬區宅㡬壥田也唐開元中蜀人有繪圗以獻者一鼓而八面六面四面既不可考撃乃於縣内别置散鼓國朝仍之郊廟設而不作景祐中馮章靖公言雷鼔靈鼓路鼓並當考撃而散鼔請准乾徳四年詔廢不用然不言鼔之制非是甚可怪也後元等復以殿廷僃奏四隅建鼓既随月協均顧無以節樂而周官鼓人以晉鼓鼓金奏應以施用詔依周官舊法制焉於是縣内始有晉鼓矣古者鏄鐘撃為節檢而無合曲之義大射有二鏄皆亂撃焉後周以十二鎛相生撃之景徳中李宗諤領太常摠考十二鎛鐘而樂工相承殿庭習用三調六曲三調者黄鐘太簇㽔賔也六曲者調别有隆安正安二曲郊廟之縣則環而撃之宗諤言金部之中鎛鐘為難和一聲不及則宫商失序使十二鎛工皆精習則遲速有倫随月用律諸曲無不通矣真宗因詔黄鐘太簇二宫更増文舞武舞福酒三曲至是詔馮元等詢考撃之法元等奏言後周嘗以相生之法撃之音韵克諧國朝亦用随均合曲然但施殿庭未及郊廟謂宜使十二鐘依辰列位随均為節便於合樂仍得併施郊廟若軒縣以下則不用此制所以重備樂尊王制也詔從之戊申賜老人張環絹十疋米五斛紫衫銀帶時父老上尊號者以百數而環年百嵗視聽不衰特賜之詔三司使至御史知雜舉朝官通判一任以上才堪劇繁者一人廢西京采柴務以山林賦民官取十之一巳酉詔廣延雄三州知州自今聴辟通判一貟禮院言南郊第一龕饗五方帝大眀夜明神州地祗北極天皇大帝比嵗止差司天保章正攝事且五帝尊神而獻官秩卑饗接非稱請第一龕以少卿監正郎第二第三龕以貟外郎壇下及内壇之外以京官或保章正分獻從之八月壬子朔詔改强盗法不持仗不得財徒二年得財為錢萬及傷人者死持仗而不得財流三千里得財為錢五千者死傷人者殊死不持仗得財為錢六千若持仗罪不至死者仍刺𨽻千里外牢城既而有司言竊盗不用威力得財為錢五千即刺為兵反重於强盗請竊盗罪亦第减之至十千刺為兵詔可尋又詔京城持仗竊盗得財為錢四千亦刺為兵自是盗法惟京城加重餘視舊益寛矣後詔實録在此月壬申今並書之又詔依本志附此癸丑知樞宻事李諮落起復甲寅燕紫宸殿初用樂丙辰詔天下配役人在今年五月戊申詔書前者並釋之又詔有能吿羣盗刼殺人者十人以上賞錢十萬不及十人計數給之辛酉上作警嚴曲付太常𨽻習名曰振容歌從李照之請也尋以振容於義無取改名奉禋改名奉禋在十月乙夘今并書之同知太常禮院宋祁言前祠部貟外郎集賢校理郭稹㓜母邉更適士人王渙生四子稹無伯叔兄弟獨承郭氏之祭今邉不幸而稹觧官行服按五服制度敕齊衰杖朞降服之條曰父卒母嫁及出妻之子為母其左方注謂不為父後者若為父後者則為嫁母無服下禮院御史臺詳定侍御史劉䕫曰按天聖六年敕開元五服制度開寳正禮並載齊衰降服條例雖與祁所言不異然假寜令諸䘮斬衰三年並觧官齊衰杖朞及為人後者為其父母若庶子為後為其母亦觧官申心䘮母出嫁為父後者雖不服亦申心䘮注云皆為生已者律䟽云心䘮者謂妾子出妻之子合降其服二十五月内為心䘮載詳格令子為嫁母雖為父後者不服亦當申心䘮又稱居心䘮釋服從吉及忘䘮作樂冐哀求仕者並同父母正服今龍圗閣學士王博文御史中丞杜衍並嘗為出嫁母觧官行䘮若使生為母子沒同路人則必虧損名教上玷孝治且杖朞降服之制本出開元禮逮乎天寳已降别𠡠俾終三年然則當時已悟失禮晉袁凖謂為人後服嫁母據外祖異族猶廢祭行服知父後應服嫁母劉智釋云雖為父後猶為嫁母齊衰昔孔鯉之妻為子思之母鯉卒而嫁於衛故檀弓曰子思之母死栁若謂子思曰子聖人之後也四方於子乎觀禮子盍謹之子思曰吾何謹哉石苞問淳于睿曰為父後曰不為出母服嫁母猶出母也或者以為嫁與出不異不逹禮意雖執從重之義而以廢祭見譏君為詳正睿引子思之義為答且言聖人之後服嫁母明矣稹之行服是不為過詔兩制御史臺禮院再定議曰按儀禮父卒繼母嫁為之服朞謂非生已者故父卒改嫁降不為已母唐上元元年敕父在為母尚許服三年今母嫁既是父終當得申本服唐紹議云為父後者為嫁母杖周不為父後者請不降服至天寳六載敇五服之紀所宜企及三年之數以報免懐其嫁母亡宜終三年又唐八座議吉凶加减禮云凡父卒親母嫁齊衰杖朞為父後者亦不以私親廢祭祀惟素服居堊室心䘮三年免役觧官母亦心服之母子無絶道也按通禮五服制度父卒母嫁及出妻之子為母及為祖之後祖在為祖母雖周除仍心䘮三年侍講學士馮元言儀禮禮記正義古之正禮開寳通禮五服年月勅國朝見行典制為父後者為出母無服惟通義纂引唐天寳六載制出嫁母並終服三年又引劉智釋義雖為父後猶有出母齊衰卒哭乃除或疑二者之相違竊詳天寳之制言諸子為出母嫁母故云並終服三年劉智言為父後者為出母嫁母故猶云為齊衰卒哭乃除各有所謂故無疑也况天聖五服年月𠡠父卒母嫁及出妻之子為母降杖朞則天寳出母嫁母並終服三年之制不可行用又但言母出及嫁為父後者雖不服亦申心䘮即不言觧官若専用禮經則是全無服式施之今世理有未安若俯同諸子杖朞又於條制更相違戾既求禮意當近人情凡子為父後無人可奉祭祀者依通禮義纂劉智釋義服齊衰卒哭乃除踰月乃祭乃申心䘮即與儀禮禮記正義通典通禮五服年月勅為父後為出母嫁母無服之言不相逺也如諸子非為父後者為出母依五服年月勅降服齊衰杖朞亦觧官申心䘮則與通禮五服制度言雖周除仍心䘮三年及刑統言出妻之子合降其服皆二十五月内為心䘮其義一也以此論之則國朝見行典制盡與古之正禮相合餘書有偏見之説不合禮經者皆不可引用郭稹若無伯叔及兄可奉父祖祭祀應得子為父後之條又縁觧官行服已過朞年難於追改後當依此施行詔自今並聼觧官以申心䘮劉䕫議在此月己夘兩制御史臺禮院再定及馮元議並在明年九月戊寅今並從本志聨書之畧其月日壬戌知制誥李淑同勾當三班院淑以妻父韓億見領樞宻副使引例乞避詔勿避甲子饒州防禦使劉平為温州防禦使馬軍都虞候平上䟽自列召對問状仍復管軍詔勾當皇城司五貟自今遇車駕行幸常留在内録故雷化州同廵檢左班殿直許政子佶為三班借職仍賜帛五十疋以政與蠻賊戰死也丙寅幸奉先資福禪院謁宣祖神御殿戊辰以鹽鐡判官度支郎楊日華為契丹生辰使禮賔副使張士禹副之太常博士直史館修起居注鄭戬為正旦使供奉官閤門祗候柴貽範副之日華日嚴兄也有司言修製皇帝尊號冊寳請用純金從之天聖二年九月庚寅明道二年正月十七日可考己巳御崇政殿召輔臣觀新樂上出䨇鳯管下太常𨽻習之其制合二管以足律聲管端刻餙䨇鳯施兩簧焉時又出兩儀琴及十二絃琴二種以偹雅樂兩儀琴者施兩絃十二絃琴如常琴之制而増其絃以象律吕之數又敇更造七絃琴九絃琴皆令圎其首者以祀天方其首者以祀地命李照同修樂書辛未詔薦獻景靈宫朝饗太廟郊祀天地自今同日受誓戒始用王曽之言也又詔陕西諸州前代名臣墳墓碑碣林木委官司常檢視從知永興軍陳堯佐之言也初章獻遣官起浮屠於京兆城中姜遵盡毁古碑碣為用堯佐奏曰唐賢臣墓石十且亡七八矣始其子孫意美石善書欲傳千載而一旦與磚甓同誠亦可惜其未毁者願敇所在完䕶甲戌幸安肅門砲場觀諸軍放砲又令諸軍習戰其撃刺騎射之精者悉遷補之遂燕從臣於幄殿丙子詔入内内侍省同禮院裁定衮冕制度仍先繪圗以聞所服衮冕華飾太甚欲從簡質故也丁丑内出景祐樂髄新經六篇賜羣臣其一釋十二均二明所主事三辨音聲四圗律吕相生并祭天地宗廟所用律及隂陽數配五十二管之長短六歴代度量衡皆本之於隂陽配之於四時建之於日月通之於鞮竺演之於壬式遁甲之法戊寅祕書監孔朂分司南京専領文宣王祠廟仍賜絹百匹米五十斛羊酒副之己夘右諫議大夫知兖州孔道輔為龍圗閣直學士時近臣有獻詩百篇者執政請除龍圗閣直學士上曰是詩雖多不如孔道輔一言遂以命道輔議者因是知前日之斥果非上意也初命朝臣為浙江荆湖福建廣南等路提㸃銀銅坑冶鑄錢公事其俸賜恩例並與提㸃刑獄同詔朝臣提㸃銀銅坑冶俸賜恩例並與提㸃刑獄同實録在十月乙丑今并書實録是月己夘書徙知楚州屯田貟外郎魏兼為浙江荆湖福建廣南等路提㸃銀銅坑冶鑄錢公事盖鑄錢等事舊屬𤼵運使既罷發運使故别置官然兩朝國史志及㑹要職官部並不載提㸃坑冶鑄錢不知何故姑存此更加考詳九月辛巳朔李照言今太常所用柷其四面皆畵時卉未合古制請易以青龍朱雀倮蟲白虎元龜以配五方從之照又與鄧保信新作銅方響五架詔教坊凖聲以授諸噐初照既定雅樂而聲極下故又製燕樂之噐欲冩其聲已而樂工以爲不可施用罷之隋制内宫縣二十四簴以大磬代鏄鐘而去建鼓唐武后稱制改用鏄因而莫革及是詔訪馮元等曰大磬應何法考撃何禮應用癸未元等具言古者特磬以代鎛鐘本施内宫遂及柔祀隋唐之代繼有因改先皇帝東禪梁甫西瘞汾壤並仍舊章陳於縣奏若其所用吉禮則中宫之縣祀禮則皇地祗神州地祗先蠶今之奉慈廟皆應陳設宫縣則三十六簴去四隅建鼓如古便若考撃之法謂宜同於鎛鐘比縁詔㫖不俾循環互給而立依均合曲之制則特磬固應不出本均與編磬相應為之樂節也詔可乙酉賜原武縣修河役卒緡錢丙戍兵部貟外郎張錫為京東轉運使淄青齊濮濟鄆六州民買耕河壖地數起争訟錫命籍其地嵗收租絹二十餘萬而訟者亦息辛夘詔貟外郎以上知諫院自今遇大禮許任子一人壬辰詔翰林學士張觀等刋定前漢書下國子監頒行前代經史皆以紙素傳寫雖有舛誤然尚可参讐至五代官始用墨版摹印六經誠欲一其文字使學者不惑太宗朝又摹印司馬遷班固范曄諸史與六經皆傳於是世之寫本悉不用然墨版訛駁初不是正而後學者更無它本可以刋騐㑹祕書丞余靖進言前漢書官本謬誤請行刋正詔靖及國子監王洙盡取袐閣古本對校踰年乃上漢書刋誤三十巻至是改舊摹本以從新校然猶有未盡而司馬遷范曄等史尤脱亂惜其後不復有古本可是正也癸巳大燕集英殿午漏上以雨甚罷之乙未詔司天監制百刻水秤以測候晝夜丁酉祠部貟外郎集賢校理李照為刑部貟外郎賜三品服入内供奉官勾當御藥院鄧保信為理賔副使以造新樂成也自餘修製官屬諸工凡七百餘人悉遷補有差初照謂舊樂聲髙乃以太府尺為法實比古一尺二寸有竒照獨任所見更造新噐所定黄鐘律人聲極下樂工龡其韵中無射倍聲又鑱破舊鐘磬欲一用新器上時博求知音者聼照所言音官樂工雖知其不可而不敢非之又因入内都都知閻文應推言其功故特改官起五月造止八月成金石七縣而照自造新樂笙竽琴瑟笛篳篥等十二種皆不可施用詔但存大笙大竽二種而已照謂今篳篥乃豳詩所謂葦管也詩云一之日觱發二之日栗烈且今篳篥首伶人謂之葦子其名出此於是製大管篳篥為雅樂議者嗤之賜虞部貟外郎李思恭帛五十疋米五十斛思恭持母䘮邢州而廬墓三年州上其狀故賜之工部郎中天章閣待制劉随卒擢待制未旬日也隨與孔道輔曹修古同時為言事官皆以清直聞臨事明鋭敢行蜀人以為水晶燈籠始使契丹還㑹貶而官收所得馬十五乗及是帝憐其貧賜其家錢六十萬壬寅御崇政殿按新樂詔中書門下樞宻院大臣與觀焉詔勾當御藥院自今選内臣入仕三十年以上經十年不遷而累有勞者為之候五年與遷一資仍㽞在院非過犯而三年替者遷一資自餘不得輙乞改官其内東閣龍圗天章閣並令入内内侍省選差人癸夘詔内臣自今不得以歴任勞績投進文字及御前陳乞非次改官甲辰詔比劾廣西轉運使擅貸蠻賊及宜州廵檢妄増賊數並特釋之賜鄭州學田五頃戊申詔三司使副以下自今母得輙進状自叙勞績求非次轉官初諸王邸散居都城過從有禁非朝謁從祠不得㑹見己酉詔即玊清昭應宫舊地建宫合十位聚居賜名睦親宅命三司使程琳總其事入内都都知閻文應等典領工作参知政事宋綬上所編修中書總例四百一十九冊降詔褒諭堂後官以下賜噐幣有差先是吕夷簡奏令綬為此既而謂人曰自吾有此例使一庸夫執之皆可為宰相矣皇祐五年十二月續編翰林學士承㫖章得象等言宋祁所上大樂圗義其論武舞所執九噐經禮但舉其凡而不著言其用後先故旅進軰作而無始終之别且鼗者所謂𨗳舞也鐸者所謂通鼓也錞者所謂和鼓也鐃者所謂止鼓也相者所謂輔樂也雅者所謂陔歩也寜有導舞方始而参以止鼓止鼓既揺而亂以通鐸臣謂當舞入之時左執干右執戚離為八列别使工人執旌最前鼗鐸以發之錞以和之左執相以輔之右執雅以節之及舞之將成也則鳴鐃以退行列築雅以陔歩武鼗鐸錞相皆罷而不作如此庻協舞儀請如祁所論奏可按得象等所言乃祁大樂圗義論武舞所執九噐先後之一節耳得象無所増益但請如祁所論固不及餘論也别本或有餘字恐誤今不取是月詔今後内臣入仕三十年以上累有勞效經十年不曽遷轉者仰勘㑹明保取㫖冬十月辛亥朔復置朝集院以待外官之還京師者先是太子中舎陸東獻文得召試學士院賜進士出身改太子中允而東性狷躁意望帖職三館乃擲敇不受坐停見任官處州安置詔河北比嵗大稔穀賤傷農其令轉運司並以見錢於縁邉平糴如不足三司助之壬子許蔡州立學蔡州言左武衛大將軍分司西京石普卒普倜儻有膽略凡預討伐聞敵所在即馳赴之兩平蜀盗大小數百戰摧鋒與賊角衆推其勇頗通兵書隂陽六甲星厯推歩之術太宗嘗曰普性剛驁與諸將少合然藉其善戰每厚遇之嘗令善工製金帶普時帶御噐械方侍立輒進曰願以賜臣帝即予之既坐罪廢遇太宗忌日必盡室詣佛寺齋戒以為常乙夘詔為昭成太子元僖邢王元傑華王元偁立後丙辰詔東西班殿侍自今有逃亡帶甲五班比禁軍條聼㫖不帶甲七班比廂軍條决訖不刺面其受命以出者在官以無故亡律論權管軍籍者從軍分将校定罪主管官物者比三司大将條殿侍凡十二班東第一第二班西第一弩手班龍旗直凡五班月廪錢千五百謂之帶甲西第二班下茶酒新舊班凡二班月領錢千東第三西第三第四班南班北班凡七班月廪錢七百謂之不帶甲己未省覇州永清縣徙文安治永清辛酉重脩后廟成禮院言周官朝日祀五帝則張大次小次説者以為祀昊天上帝亦然大次在壇壝外猶更衣幄殿小次在壇側今所未行案魏武帝祠廟令降神訖下堦就蕞而立湏奏樂畢似若不愆烈祖遲祭不速訖也故吾坐俟樂闋送神乃起爾然則武帝坐俟容湏别設近次與周官義符請設小次於皇帝版位少東每獻畢降壇若殿就小次至終獻撤豆復就版位從之詔舉閤門祗候自今須嘗經邉任有材武善弓馬者乃聼之都大提舉館閣書籍所上校勘兩庫經史凡八千四百三十五卷賜校勘官以下噐幣有差癸亥復置羣牧制置使仍詔自今止以同知樞宻院或副使兼領之明道二年五月十二日罷今復置寶元二年五月二十三日又罷尋復置甲子詔民訴災傷者聼留苖色根槎以俟官司檢覆餘即令改種禮院言春秋五年考仲子之宫初獻六羽何休范寗等咸謂不言佾者明佾則干舞在其中婦人無武事獨奏文樂也江左宋建平王宏皆㨿以為説故章太后廟獨用文舞至唐垂拱以来中宫之縣既用鎛鐘其後相承故儀坤等廟獻武舞備金石之樂尤為失禮前詔議奉慈之樂有司援舊典已用特磬代鎛鐘取隂教尚柔以静為體今樂去大鐘而舞進干盾頗戾經誼請止用文徳之舞奏可上封者言諸路嵗以緡錢輸京師致四方錢重而貨輕丁夘詔江東五萬緡自今並市紬絹綿福建廣東各十萬廣西八萬並市銀上供淮南湖北各五萬兩浙五萬五千輸緡錢如故己巳出内藏庫緡錢七十萬左藏五十萬下河北轉運司市軍儲許蘇州立學仍給田五頃辛未知樞宻院王随上傳燈玉英集乞摹印頒行從之癸酉詔河北有塘泊處知州軍兼並管勾屯田隄道事景祐初劉平去真定楊懐敏領屯田司如故塘泊日益廣至吞沒民田蕩溺邱墓百姓始告病乃有盗决以去水患者懐敏奏立法依盗决隄防律於是知雄州葛懐敏請立木為水則以限盈縮從之葛懐敏請立水則實録在此年劉平以景祐元年二月去真定此皆據本志附見丙子詔増諸州通判當直兵士其命官所過亦許量假人十一月辛巳朔以應天府書院為府學仍給田十頃癸未祕書丞國子監直講林瑀勒停坐謁告違詔限也當考戊子金庭教主冲静元師郭氏薨后之獲罪也上直以一時之忿且以閻文應所譛故廢之既而悔之后居瑶華宫上累遣使勞問於是又為樂府辭以賜后后和答語甚悽愴文應大懼㑹后小疾文應與太醫診視遷嘉慶院數日遽不起中外疑文應進毒然不得其實時上致齋南郊不即以聞及聞深悼之詔以后禮𦵏其兄西京左藏庫使昌州刺史中和遷昌州團練使内殿崇班閤門祗候中庸遷禮賔副使度支判官右正言集賢院王堯臣請推舉左右侍醫者不報此據國史並記聞己丑升蔡州為淮康軍南郊大禮使吕夷簡言宗室詣中書受誓戒不至者六十餘人詔勿以陪位癸巳朝饗景靈宫甲午饗太廟及奉慈廟乙未祀天地於圎丘以太祖太宗真宗並配大赦天下録唐梁後唐晉漢周及諸偽國後建隆以来臣僚将校沒於戰陣無子孫食禄者於所屬自言宗室並與轉官仍自諸司使以下至殿直皆換西班官令審刑院大理寺别減定配𨽻刑名為敇五巻㑹要五年十月四日上减定敇五卷今附此放并州永利監鹽戸積欠鹽七萬七千七百餘石乙巳封宰臣吕夷簡為申國公王曽為沂國公荆王元儼為淮南荆南節度大使行荆州揚州牧仍賜入朝不趨二州牧自元儼始武勝節度使徳文同平章事上以徳文屬尊常稱曰五相公而不名安化留後允譲為江寜節度使允讓元份第二子也上之㓜也真宗擇宗室子年相若聰悟可親者與遊召允讓入禁中旦暮誦讀共學凡動作燕嬉無一不中節及上出閤始用雲韶樂導送允讓歸外邸云丙午宗子都司使領諸州刺史者十二人換諸衛大將軍領諸州團練使諸司使十九人換諸衛大將軍領諸州刺史諸司副使十九人換諸衛大將軍内殿承制以下一百三十人並為將軍率府率副率用乙未赦書也先是宗子無遷官法唯遇稀曠大禮則普遷一官及南郊並侑三聖宗子皆上表乞推恩故有此制舊自借職十遷乃至諸司副使今副率四遷即遥領刺史八遷即為節度使云宗子換官姓名實録與百官表略不同今参取之元自正刺史以上遷改者不在此數記聞載呂申公當國見上體不安故擢允讓管勾宗正司宗室聼換西班官皆申公之策也故時自借職十遷至諸司副使及換西班官自率府副率四遷即為遥郡刺史俸祿十倍於舊國用益廣至今為患按上不豫乃去年八月其九月即康復然則允讓管勾宗正及宗子換官自别有所為也宗子換官沈括筆談當得其實允讓管勾宗正當從實録正史筆談云宗子換南班官世𫝊王文正太尉為宰相日始聞此議不然也故事宗子無遷官法唯遇稀曠大慶則普遷一官景祐中初定祖宗並配南郊宗室欲縁大禮乞推恩使諸王宫教刁約草表上之後見宰相王沂公公問前日宗室及遷官表何人所作約未測其意答以不知歸而思之恐事窮且得罪乃再詣相府沂公問之如前約愈恐不復敢隐遂以實對公曰無他但愛其文詞耳再三嘉奨徐曰已得㫖别有措置更數日當有指揮自此遂有南班之授近屬自初除小将軍凡八遷即為節度使遂為定制諸宗子以千縑謝約約辭不敢受予與刁親舊刁嘗出表稿示予按實録正史並稱換西班官百官表獨南班官當考丁未加恩百官戊申改宜桂州廵檢諸監為宜融邕欽四州縁邉溪洞廵檢使十二月辛亥朔復知宻州太常卿李廸為刑部尚書知徐州昭宣使恩州團練使入内都都知閻文應領嘉州防禦使落都都知為秦州鈐轄尋改鄆州鈐轄改鄆州鈐轄在此月癸丑今並書其子入内供奉官勾當御藥院士良為内殿崇班罷御藥院時諫官姚仲孫髙若訥劾文應方帝宿齋太廟而文應叱醫官聲聞行在郭皇后暴薨中外莫不疑文應置毒者並請士良出之故有是命文應又稱疾留仲孫復論文應乃亟去文應専恣事多矯㫖付外執政不敢違天章閣待制范仲淹將劾奏其罪即不食悉以家事屬其長子曰吾不勝必死之上卒聼仲淹言竄文應嶺南尋死於道竄閻文應嶺南尋死於道此據富弼所作墓誌案閻文應景祐二年十二月辛亥落入内都都知以昭宣使領嘉州防禦使為秦州鈐轄後兩日改鄆州鈐轄百官表同景祐四年四月乙丑文應徙潞州鈐轄百官表同寳元二年九月癸夘文應卒此據百官表贈邠州觀察使此據實録未嘗有竄嶺南指揮及死於道事迹不知弼何據也今姑從弼墓誌竢考秦州走馬承受言趙元昊舉兵攻嘉勒斯賚請下陜西預修邊備從之承受不得其姓名壬子以西蕃邈川首領寜逺大將軍愛州團練使嘉勒斯賚為保順軍留後嵗給俸錢令秦州就賜之時元昊遣索諾爾將兵二萬五千攻嘉勒斯賚敗死略盡索諾爾被執元昊自率衆攻氂牛城一月不下既而詐約和城開乃大縱殺戮又攻青唐阿爾總噶爾帶星嶺諸城嘉勒斯賚部將阿薩爾以兵十萬絶歸路元昊晝夜戰三百餘日阿薩爾敗然部兵溺總噶爾河及饑死過半屠氂牛城趙珣以為在明道中誤也當在此年正傳云阿薩爾敗復取𤓰沙肅三州誤也𤓰沙肅三州自屬回紇不與嘉勒斯賚接今删去自攻青唐以下及取𤓰沙肅必不在今年今附見元昊又嘗侵嘉勒斯賚并兵臨河湟嘉勒斯賚知衆寡不敵壁鄯州不出陰間元昊頗得虚實元昊已渡河挿旗幟識其淺嘉勒斯賚潜使人移植深處以誤元昊及大戰元昊潰而歸士視幟渡溺死十八九所虜獲甚衆嘉勒斯賚傳挿幟誤元昊後云自是數以竒計破元昊元昊不敢窺其境蓋飾說也今不取拔幟誤元昊即或與屠氂牛城相接今且附見又不知氂牛城與鄯州同異逺近然二事皆參差不齊須通考前後别修嘉勒斯賚來獻㨗朝廷議加嘉勒斯賚節度使同知樞宻院韓億以為二部皆藩臣今不能諭令觧仇乃因㨗加賞非所以御四裔也議遂寢李埴十朝綱要其後復舉兵攻蘭州諸羗侵掠至馬銜山遂有夏銀綏静宥靈鹽㑹勝甘凉瓜沙肅之地兵五十餘萬癸丑詔嘗為入内都知押班而落職者自今毋得復任其見任者毋得勾當皇城司親戚毋得勾當御藥院戊午贈保慶皇太后三代皇后三代又進封延安郡夫人唐氏為舒國太夫人癸亥龍圗閣學士右諫議大夫權知開封王博文為給事中知天雄軍禮部員外郎天章閣待制范仲淹為吏部貟外郎權知開封府仲淹自還朝言事愈急宰相隂使人諷之曰待制侍臣非口舌任也仲淹曰論思政侍臣職余敢不勉宰相知不可誘乃命知開封欲撓以劇煩使不暇他議亦幸其有失亟罷去仲淹處之彌月京師肅然稱治甲子左禁侍桑懌為閤門祗候賞平蠻獠之功也懌辭不受請推其賞以歸已上者不許或譏懌好名懌歎曰士顧其心如何爾當自信其心以行若欲避名則善皆不可為也詔廣南東西路民家不得私置博刀犯者並鍜人並以私有禁兵律論初轉運使言民為盗者多恃博刀捕獲止科杖罪法輕不能禁故更此條禁益梓䕫利路民夜聚曉散𫝊習妖教徒中能自紏摘及他人告者皆賞錢三萬乙丑贈翰林侍讀學士兵部侍郎兼祕書監楊徽之為太子太師諡文莊徽之嘗侍真宗藩邸初贈尚書参知政事宋綬其外孫也為請而加贈之許孟州立學仍給田五頃太平興國三年初以文宣王四十四代孫宜襲封文宣公宜卒於雍熙三年至道末乃以宜子延世襲封延世卒於景徳初子聖祐尚㓜天禧五年始命聖祐襲封聖祐卒且十年無子遂除襲封彭城顔太初因許希請立扁鵲廟作詩指除襲封事諷在位者得路反忘先師又致書参知政事蔡齊齊為言於上辛未詔聖祐弟北海縣尉宗愿為國子監主簿襲封文宣公癸酉詔翰林學士承㫖章得象御史中丞杜衍知制詔李淑編次赦書所訪唐五代諸國及本朝臣僚子孫以名聞先是御史臺辟南京留守推官石介為主簿介上䟽論赦書不當求五代及諸偽國後不合意罷不召熊克九朝通略遂罷介為鎮南書記館閣校勘歐陽修貽書責中丞杜衍曰介一賤士用不用當否未足害政然可惜者中丞舉動也主簿於臺中非言事官然大抵居臺中者必以正直剛眀不畏避為稱職介足未履臺門之閾而已用言事見罷正可謂正直剛明不畏避矣度介之才不止為主簿直可為御史也今斥介而它舉亦必擇賢而舉夫賢者固好辨若舉而入臺又有言則又斥而他舉乎如此則必得愚暗懦黙者而後止也衍卒不能用太子中允知淮陽軍梁適亦上疏論朱全忠乃唐之賊臣今録其後不可以為勸上是其言記適姓名於禁中尋召為審刑院詳議官適顥之子也録瓊崖州同廵檢右班殿直李至忠孫光郎為三班借職賜名延賞以至忠與蠻獠戰死故也乙亥契丹遣利州觀察使耶律睦大理少卿薄可乆来賀正旦丙子詔天下舊有陂塘溝洫乆廢而長史令佐能勸民興修及闢荒田増税額至百千以上者當行甄賞轉運使副提㸃刑獄能督部吏規畫者賞亦如之丁丑御史臺言諸衛大將軍將軍並係三品一行序立諸衛率府率副率並係四品一行序立今新除皇親諸衛大將軍将軍八十五貟諸衛率府率副率五十一員縁皇親大將軍以下並内殿起居貟數稍多殿庭難為排立及非次曲宴殿上窄隘即重行員數更與十一月丙午参詳戊戍賜太常博士陳希亮五品服以嘗辨寃獄也希亮已見天聖二年七月是嵗契丹主加號文武仁聖昭孝皇帝
