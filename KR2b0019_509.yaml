body:
  text: 續資治通鑑長編卷五百五宋李燾撰哲宗元符二年春正月甲辰朔御大慶殿以雪罷羣臣及遼使東上閣門拜表賀羣臣又詣內東門賀如儀乙巳館伴髙麗所言髙麗使尹瓘等欲十三日朝辭詔髙麗使到闕未久冝以朝廷再三優異待遇𣢾留之意委曲開諭御集别見去年十二月三日當存此去彼巳酉涇原路經略安撫使章楶奉㫖差使臣兵員防護如法拘繫木檻擡􅐝威眀阿密穆賚多卜并妻母及大小首領等發遣赴闕者勘㑹穆賚多卜等是天都監軍其諸族帳首領見捕獲此二人接續扶擕老幼爭來投降並欲依附穆賚多卜今若拘繫木檻則西夏歸附之人生疑安敢更有來者欲望特命之官優加賜與及欲多方閲試若見得委是忠白向漢肯為我用因興舉之時充戰陳使喚若朝廷欲識面乞降指揮候來年興舉了日發遣御批看詳所奏事理緣係兵馬深探巢穴勢窮就擒自與忠白向漢事體不同可疾速行下威眀阿密穆賚多卜特與免木檻如法拘繫前來餘並依已降指揮施行御集正月六日下布録己酉以戊申得御㫖令涇原二酋免木檻發來赴闕而章楶奏大小首領若悉遣行無主管降羌者乞量留章惇又欲留候進築了遣來上極難之布為陳二酋在軍前則敵人情通易於捍禦又降羌未至者可以因而招納於邉計誠有補蔡卞迎上㫖頗不以為然而上竟開納如布請去年十二月十八日穆賚多卜己免木檻阿密當考詔差慕容將美勘熙河香愛公事人有告香愛謀叛者經略司以為誣告已斷配訖而香愛復叛走故劾之布録庚戌庚戌户部郎中徐彥孚權發遣陜西路轉運副使尋改右司郎中彥孚先往秦州斷鍾傳等詐冒上首級數在元年九月九日改右司在此月十八日今并此三月二十二日秦州獄乃斷訖祕閣校理提㸃開封府界刑獄郭時亮權發遣河東轉運副使右正言鄒浩言致治莫先於用人用匪其人民受實弊臣竊見朝廷開封府界郭時亮自到本任不務宣導朝廷德澤惟以掊克凌暴為事去年積雨陛下所親見而天下所共知畿甸之內鮮不被患凡人户以水訴者時亮一切痛抑之諸縣順承惟恐不及間有官吏不忍百姓實無所出力為檢放即怒罵捃托無所不至民人怨嗟聞者感動夫畿甸者諸路之首近在陛下耳目之前至易察也而時亮敢爾略不以罔上損下為恤又况逺在千里之外者乎今來不惟未治其罪方且擢為河東轉運副使一時公議拂然惑之抑恐諸路監司見時亮本合得罪而反䝉遷擢其奉法愛民者將解體而莫勸違法殃民者將率意而莫懲則逺方赤子殆有困苦無告甚於畿甸之內者矣是由失賞刑於時亮一身之微而致天下元元不得實受陛下仁厚之賜此尤不可不慮也伏望睿斷罷時亮新命追正其罪以謝畿甸之民以釋公議之惑以示懲勸於天下不從六月一日時亮以河東運副論事入內供奉官髙陽關路走馬承受歐仔言瀛州河間縣以人户稅絹足外零剩絹充填正數詔歐仔越職奏事特贖金八斤布録云仔奏北界泛使中有夏人為上節又奏樂専河間縣不公事按此處文義未明疑有訛誤洛苑使權發遣秦鳯路鈴轄李沂徙熙河蘭㑹路詔給空名度僧牒三百付涇原路經略司回易應副本路鈐轄折可適照管新歸順蕃部監察御史鄧裴言嗣濮王宗漢託疾家居不赴朝參慢令侮上無人臣禮伏望以義斷恩明正典法詔劄付宗漢熙河蘭㑹路經略使孫路言蘭州之西喀羅川口有古浮橋舊基自喀羅川口北四十里至該珠城又北至濟桑約三百里間有古城十餘所每城相去不過三四十里自濟桑以北則入甘凉諸郡即漢武帝斷胸奴右臂之遺跡乞於喀羅川口復修浮橋於橋之北置七八百步一城延袤該珠喀羅漸至濟桑以通甘凉隔絶西蕃夏賊往來便道乞措置施行樞密院以喀羅川口正與西蕃切鄰今修建浮橋及築城經營該珠喀羅未委於青唐有無引惹若致青唐夏國合力爭占本路事力可與不可枝梧及與應副涇原進築期㑹有無相妨詔孫路體度邉情斟酌勢力保明以聞孫路先以紹聖二年正月十三日除陜漕六月三日加直龍圖閣知慶州四年三月一日加寶文閣待制元符元年三月九日加龍圖閣直學士八月二十七日自慶州改熙州於是建議築城喀羅川口二月七日十三日三月末當并考布録二月庚辰涇原路經略司言近差郭成折可適統制軍馬出塞擒到統軍威眀阿密穆賚多卜今押赴闕招納到生口三千餘人并牛羊駝馬等於靈平鎮羌九羊通峽蕩羌寨安泊詔令經略司措置存恤無令失所去年十二月十八日奏捷今年正月十九日賞功布録庚戌涇原奏捷捉到羌人三千四百餘口孳畜十萬計皆阿密等一行種落也環慶路經略司言差定統制官出兵討蕩招納不順部族今據統制官張誠稱與威眀特克濟沙克鬬敵斬獲到百餘級又稱大順城新歸順蕃部走投西界慮未詣實詔令環慶路經略司根究如顯有實狀即具逃亡人職次姓名及逃亡月日保明聞奏髙陽關路走馬承受公事所言訪聞北界人言已差下泛使蕭德崇等於二十四日已離京上節中帶夏國二人同行要作照明令河北沿邉安撫司密切體問詣實奏聞雄州言涿州牒稱為夏國差人使告奏稱南宋興兵侵討合有計㑹公事已差定國信使副緣自慶歷二年至嘉祐二年北界泛使一行並只於白溝驛交割至熙寧七年蕭禧將牽馬擔擎人等於雄州交割當日接伴為不依久例差人說諭其蕭禧不肯依從遂直到本州城下永安亭前交換慮今人使入界亦要依上件體例於北亭子交換駝䭾乞指揮接伴使副於白溝交換詔接伴使副計㑹雄州密切商量從長施行二月二十四日曽布鄒浩云云可考涇原路經略使章楶奏準元符元年十二月二十二日樞密院劄子節文樞密院奏朝廷近體問得熟知邉事人稱令環慶涇原秦鳯熙河路選精鋭人馬量帶衣甲於正月半巳後乘月色各齎半月人糧馬料結陳徐行各至黃河討蕩仍各一面招納四路之兵並㑹合於鳴沙勘㑹涇原路近已差發兵將討蕩蕃部落因此驚移過河無可招捉虛有舉動兼涇原雖纍經出界逺不過百里不曽到威經山後亦有可以再往之理三省樞密院同奉聖㫖令章楶詳上項事理更切相度如探伺得的確部族巢穴所在可以於正月半後再遣發將兵直至鳴沙以來討蕩招納之時即具的確利害聞奏仍一面關牒逐路帥臣尅期遣發兵將分頭討蕩期約㑹合去處多方迫脅招誘西界人户速令出漢內有不順者即并力痛行掩殺右臣伏詳前項朝㫖欲㑹四路兵馬出塞討蕩本為將來本路進築之時慮賊人前以重兵對壘别以輕騎邀我糧道却致般運梗澀於版築有害或來㳂邉抄掠亦費枝梧不若先發以制其命此獻計者為涇原舉動之本意固臣之所願為然臣於昨來出塞將士處參錯體問得近日兵馬所到去處例皆闕草來往止是首尾六日馬已有一日兩日無草料餵飼者今來四路人馬出塞便指準界外打草餵飼更不齎負外其合用糧料每馬一匹騎士一名逐日共物料一斗半月之間計用一碩五斗若行裁减亦須用一碩一二斗除此外更合䭾負些少乾糧及衣甲器械被氊等物就如人馬能䭾載得起趨利欲速今乃以負重故無緣能逺行緩去則又於事無及臣恐未有所得却已疲之官軍人馬比至回到逐路休息餵飬半月十日之間何緣得全復如舊决須妨進築使喚此臣之過慮也又如環慶涇原人馬至鳴沙㑹則可以半月來往若熙河秦鳯竊恐地里窵逺半月之間不能往來且侵襲之事以巧速神密為主今乃合四路人馬未說出塞聲勢巳大於未舉動以前須有漏泄且只論出塞之後將人馬結陳徐行縱黃河凍開凌片塞河不能過渡亦恐西界人户能隱藏於山林崖谷間官軍迫於期㑹何由能追逐搜尋兼臣密問得威眀阿密稱阿密在西界日已商量了欲候氷消起遣人户過河臣再三思慮若如此舉動恐枉却四路兵力虛有拖拽不若且令逐路乘機伺間更出迭入以迫脅討蕩困擾西人不致甚勞人馬可保全勝臣愚所見如此更合取自朝廷指揮黃帖子臣見斟酌事勢探問的確西界人户即今住坐去處相度逺近難易若有機㑹可以前去亦便調發本路人馬出塞誘脅招降不敢以近日曽出塞薄有所得便不接續經營若無機㑹亦難彊為伏乞詳察又大凡獻策之人多只是見得一邉利害只如李忠傑每與臣言將來進築先了鼐摩㑹則近裏生活極甚容易蓋防賊馬出來爭占如修鼐摩㑹時其合用材植磚椽糧草錢物百色所須之物隨人馬一發便到不須遣人般輦如此則賊馬出來爭占或行抄掠無緣近得自家臣詳進築在百里之外千步城寨其百色所須之物豈有能一發般運前去之理邉人論事大率如此更乞詳酌又西界諸處闕草蓋緣去年夏國㸃聚諸監軍人馬踐踏食用兼聞諸監軍地分窖藏斛斗今來若㑹四路人馬出塞只便指凖因糧草於西界必是闕誤却致拋擲飢餓損折人馬不但沮喪士氣增張賊勢兼恐至時上下逃責遞相推注致起刑獄敗壞邉事不可不預前思慮更乞聖慈鑒察又近日遣萬騎直至銼子山鹻隈美巴等處生擒二大首領以常情言之則為至難以今日事觀之又若甚易蓋不知臣之設心措意乃在一年之外自臣到任後遣師淺攻者凡四次而三次兵馬所至不過百里事至於再三賊以為其技止此又以我為怯乃不思墮臣多方誤之之計故二酋安居山林謂漢兵不能深入今日既獲二首之後賊中震恐事勢又異賊之待我豈得如前日全不為備故臣之愚見以為正月出兵恐無大利更望聖慈詳察是日曽布奏事畢乞致仕上不許徑出居僧舍上遣中使蘇圭封還市所上致仕表仍押入視事後二日乃復故辛亥初九日復視事如故壬子軍頭司引見蕃官吕永信等內永信并男蘇沁定瑪等試藝各賜靴袍並自陳乞賜姓趙從之莘王俁上表請就外第詔不允自是三上表乃從之永寧郡王偲上表請出閣詔不允自是三上表乃從之河東轉運副使吕升卿權發遣越州尋改江寧府改江寧在二月二十九日今并附此中書舍人郭知章言外路官司被受省符專委官置簿驅催回報從之甲寅朝獻景靈宫乙卯幸開寶寺慶夀崇因閣丁巳幸醴泉觀御宣德門觀燈涇原路經略使章楶奏去年十二月二十七日入內內侍省東頭供奉官幹當龍圗天章寶文閣徐湜到渭州宣諭臣近者西賊猖獗侵犯邉壘若非措置有方精心體國一道之民獲免塗炭致使賊兵不戰而屈極可嘉尚故專使宣勞卿更宜悉心畢慮以副朕意應今後合有奏陳邉徼機速利害可並於入內內侍省投進臣自念才質駑下過䝉朝廷寄委使當方面凡百措置悉受陛下成算至於昨來防秋準御前劄子約束尤更丁寧臣遵奉聖訓行下諸將遂至賊馬寇犯之時别無踈虞今陛下不收功於聖算却以為臣措置有方精心體國一道之民獲免塗炭又令奏陳機速利害並於入內內侍省投進仰荷恩奬至於感泣臣雖衰老筋力不强營辦職事有死而巳悉心畢慮敢違詔㫖恭惟陛下慈仁恭儉有祖宗之風恤民愛物又出天性臣今輒有邉防利害須至奏陳涇原自進築已來官中費用過錢物糧草臣不能㑹計但見諸處倉庫空虛凡百調度多是逐時旋行計置年歲豐稔猶有辦有不辦之處或遇水旱之災一兩年不熟臣恐不免貽聖主之憂且㳂邉事和顧車乘頭口及調發保甲之類蓋出於不得已雖是官中優與顧直及口食錢物亦非民情所願兼亦不免妨廢農作根本如此不得不慮又如兵馬一年之間凡五六七次調發暴露拖拽不無勞苦今日朝廷既展築城寨開拓疆土一則要占據地利傾覆賊巢二則亦欲招置弓箭手耕鑿種孳使之自衛家室漸减戍兵今以邉事未定人人未能休息之故所得地土並各荒間耕墾全未成次第邉人為言曰城裏是漢家城外是蕃家臣曽為執政言此竊慮未達聖聽昨纍凖朝㫖令相度進築天都鼐摩㑹等處務要通接熙河邉面臣以為如此措置乃有了當期程兼據却天都鼐摩㑹正走西界膏腴耕牧衣食根本之地又更咫尺黃河爾後只是全補邉面可望休息遂具可以興舉利害上之朝廷已得回降指揮見今營辦伺候春暖舉動伏望陛下候將來進築天都了當便務翦截邉事休息兵民久逺之利若聽邉臣及好大喜功之人紛紛論議更務向前進築深恐邉事無有結絶之期耗蠧國家財用及使邉民常食貴物大非治安長久之計况邉人議論只是見得一邉利害如臣前奏李忠傑曽告臣言先往南牟㑹進築時將所須樓櫓磚椽糧草防守器具百色所須之物一起般運前去忠傑更不計腳乘闕少無緣能一起般運此是只見得一邉利害宰執等與他不當責任之人若聞忠傑如此語言必以為鼐摩㑹便可依此興舉都不知空說則易行之實難又新歸順人或擒捉到人所陳利害亦有可聽有不可聽者如威眀阿密穆賚多卜等為官軍收捉過來急欲自效立功爭來獻陳計畫以為靈武可去或要人馬三萬或說五萬然都不計行軍輦致糧草次第又不詳知本路兵馬多少臣固難為與之詰難默自籌度而已如臣上項所陳事理邉人與新歸順人及其他不當責任人所說利害固自有是有非只在朝廷去取如何伏望聖慈斟酌兵民之力及㳂邉儲蓄厚薄財用多寡耕種已成與未成邉事可為與不可特從睿斷施行臣非敢愛惜軀命畏怯避事犬馬之誠實恐興作不己一有敗闕損國威靈以滋後患惟乞聖慈深賜矜察黃貼子臣聞外國天之一氣從古無滅絶之理為今之計但當練兵理財修飭邉備使中國形勢常强四方不敢侵侮畏威聽命乃是治安之策若欲深窮巢穴掃蕩覆滅亦恐民力殫屈財用匱竭因之以水旱他日雖悔無及惟望聖慈深思逺慮斷自淵衷天下幸甚楶以正月十二日奏此今附十四日後庚申資政殿學士大中大夫知大名府韓忠彥資政殿學士右正議大夫致仕王存各降一官先是中丞安惇言存忠彥奏雪謝景初語言不順各罰銅三十斤議罪未愜故有是命去年十二月十二日罰銅三年二月十二日復官三省言元祐中陳州别駕湯戩上書乞除揚王為左僕射臨江軍草澤祝望上書乞用揚王為師荆王為保詔湯戩除名送新州編管永不放還祝望杖脊配朱崖軍河東路經略司言統制官張世永折克行遣準備勾當折可大領人馬出界逄賊鬬敵藏擦勒山下斬首千餘級驅奪牛羊孳畜燒蕩族帳甚衆詔各特支有差所有得功將佐等仰經略司疾速具功保明以聞覽墓志云折可大以兵三千四百踰入藏才斬千四百級敵兵不敢出及使世永克行城端正平文振城烏龍川辛酉開封府言殿直趙士瓁充仲龎繼嗣因附葬開仲龎棺取物詔士瓁追元授因仲龎所得恩澤以來文字勒歸本房蕃官趙懷明言有親男侍禁約尚奉職趙世忠尚格親姪差使李羅壘借職尚裕頗習弓馬自效順各立戰功未曽授橫山至宥州一帶都巡檢使牌印兼懷明係正任刺史每行香却在漢小使臣之下乞依官資序位詔蕃官立功優異方得換授漢官差遣其兒姪各賜名約尚名世良尚格名世勤李羅壘名世順尚裕名世恭內趙世忠並特差充本族巡檢其印以橫山寨宥州蕃部都巡校使印為文仍令經略司候懷明立到優異功勞即保明以聞當議與特授漢官秦鳯奏乞免差階州保甲從之令環慶相度進築定邉城二月二日助以鄜延兵十五日乞進築三月七日定邉城畢工壬戌詔西蕃邈川首領河西軍節度使冠軍大將軍檢校太保轄正落起復授金紫光祿大夫仍西蕃邈川首領詔東上閣門使雄州防禦使涇原路鈐轄郭成為引進使皇城使成州防禦使權涇原路都監折可適為東上閣門使權涇原路鈐轄蕃官東上閣門使雄州防禦使李忠傑為引進使皇城使管勾環州永和平逺等寨蕃兵人馬公事慕化為遙郡刺史以生擒六路統軍威明阿密錫碩克監軍穆賚多卜賞功也甲子中大夫知杭州林希充端明殿學士知太原府從章惇曽布議也希落職未滿一年布請與復職且欲用蒲宗孟例與資政上曰且與端明既而御史中丞安惇言希輕躁寡謀不可帥太原上問何如曽布曰去年可同知樞密院今年豈得不可帥太原兼臣曽奏在外無人可差或在京差人去上默然章惇曰他日有人當易之遂已是時孫覽知太原至四月二十五日乃差提舉崇禧觀蓋先九十餘日徐林希為代也詔涇原路經略使章楶擅違朝㫖前後奏報異同特罰銅三十餘斤先是上御批令涇原二酋免木檻發來赴闕楶言大小首領若悉遣行無主管降羌者乞量留又章惇欲留候進築了遣來上極難之曽布曰二酋在軍前則敵人情通易於扞禦又降羌未至者可以因而招納於邉計誠有補蔡卞迎上㫖頗不以為然而上竟從布所請已而楶卒遣穆賚多卜等赴闕上以其前後奏報反覆故有是罰邸報有楶謝表云羌酋就縛宜加桎梏之防幾事難言妄瀆冕旒之聽公違明制合正嚴誅詔元祐訴理事件內公人軍人百姓其語言非於先朝不順者令看詳訴理文字左右司更不看詳先是曽布纍乞罷上不許既復就職因言臣衰老空虛無補國事實有避賢路歸休之意非敢矯情飾辭欺罔聖聽但以恩禮優異不免尋復就職在臣舉措實有愧士論兼臣自得侍清光論議與衆不同常恐有中傷讒毁之語上纍聖聽臣亦無緣自知上曰却無此布曰近日以來小人側目者愈衆窺伺釁隙搜抉瑕疵無所不至然臣於職事不敢不盡心鮮有闕謬至於私事亦不敢不兢畏故未有以發若臣於公私之間小有不至尚何可容臣以此彌不自安然臣以直道事君乃其素守亦不敢畏忌小人妄為之屈更賴睿明每加照察况臣前後纍曽開陳以為善惡邪正君子小人之分不可變易為國之道但能分别邪正處君子小人各得其所則天下不足為也然邪正混殽自古之公患非獨今日蓋君子小人各自言有憂國愛君之心故人君於聽納之際有所難察然小人懷姦變亂是非若以理察之亦不難見舜典云而難壬人蠻夷率服人主能逺壬佞之人則蠻夷率服况中國乎人主所務無大於此人固難知善惡邪正誠不易分别若以類觀亦不難曉且以閭巷小人言之愛喫酒者須與喫酒者相得睹錢者須與睹錢者相得以至屠沽負販盜賊之類莫不皆然士大夫所趨善惡不同其黨類亦正如此以此觀之豈難分别上欣然曰善惡各自有類布曰陛下知此則人何難知之有臣固以赤心事陛下然有所欲陳欲啓口而隱忍不敢言者十有八九今日言及於此不敢不盡為陛下區别邪正進君子而退小人乃宰相之職宰相得人則陛下何所用心章惇作相舉措乖錯不為人所服自士大夫至閭巷小人無不倡言慢罵故於此一切不能彈壓衆論陛下分别賢愚善惡使陛下不得不勞心於此以至刑政失當致天下論議如元祐之人罪戾深重者悉巳貶竄其他扳聨之人亦皆巳黜責但有過當無不及者自紹聖至今五六年間纍更赦宥至今施行未巳方且更於章疏中窮治語言緣詆訾先朝衆所共怒者皆已行法其間一言之差一向搜求有何窮盡又如看詳訴理事臣亦嘗言刑部釐為兩司一則斷刑一則雪罪熙寧得罪之人亦有曽於元豐中得雪理者何獨於元祐中一切不許雪况自祖宗以來以至今日被罪之人鮮有不乞叙雪者今日斷遣明日欣雪者比比皆是兼今日來看詳所近上臣僚悉已行遣執政中唯臣與蔡卞不預章惇而下皆不免指陳侍從言事官監司亦多已被責今所餘者不過班行州縣官之類何從窮治臣嘗以為人主當以恩德結天下心不當與在下為仇敵蓋人主當以天地為度豈可孜孜與匹夫爭較語言與人為仇敵人臣事君亦不當為國斂怨事在已往無可言者然其餘尚可濶略兼趣令結絶以安天下反側之心上曰待催令結絶後數日遂諭三省令濶略在下者而三省批㫖但云公人軍人百姓更不看詳而已髙麗國進奉使尹瓘等言乞賜太平御覽等書詔所乞太平御覽并神醫普救方見校定俟後次使人到闕給賜禮部言今後諸陵歲時合係內人朝拜因而不赴者於酌獻日辰本陵官一面恭謹排設酌獻從之詔朝奉大夫降授寶文閣待制河東路經略安撫使孫覽特降一官以上章言語失當故也覽所上章乞宫觀有云陛下既未能照察臣區區之私而臣不自披露則終莫能動陛下之聽及先謝降職并屬郡官吏降官詞頗躁忿上初令罰金或云太輕遂得㫖降一官既而御史有言遂有㫖奪職候林希到行下四月二十五日落職奉祠墓志云以功進樞密直學士而以擾奪二職為寶文閣待制猶守太原公上表謝又曰謝語不䖍可責也復褫待制提舉崇禧按覽先以謝語不䖍降一官尋禠職奉祠墓志略降一官不書謝表當檢秦鳯路經略司言西界鈐轄烏莽格等三百九十二人投漢並無田土給與耕種體訪得納木斯賚川接巴經谷至甘谷城約四十里地土肥美水草饒衍川谷平慢可以摽撥招刺弓箭手及令歸順西人耕種并烏莽格稱有弟烏明沙克於涇原路出漢乞發遣一處住坐已牒涇原路經略司發遣前來詔秦鳯路經略司如㳂邉城寨側近别無地土摽撥即相度將新歸順人部族於甘谷城西堡之外摽撥住坐仍量逺近修置護耕堡及展築烽臺遮護耕種布録二月乙亥烏莽格特與承制賜銀絹各五百三月十四日可考東上閣門使文州刺史定州路都鈐轄曹誘為本路副總管初誘求于上乞升總管有㫖候誘按閲回日與升誘又自言於密院曽布不諾既而上諭布以聖慈故令契勘資任布具白上上笑曰此輩不知義理不足責遂與之耀州觀察使世逸卒贈開府儀同三司追封曹國公先是楚王孫從式以藝祖之後最長特封郡王從式既卒宗室推世逸為首未報而卒乙丑朝散郎知海州陸佃為集賢殿修撰知蔡州詔以佃係元祐餘黨於同時人中情實有異禠職已久故也此據邸報增入承議郎京西路轉運判官周純降授奉議郎周純降官當考王鞏見可參照右中散大夫集賢殿修撰知鄆州王宗望提舉崇福宫從其請也宗望尋卒二月五日卒今附此丙寅朝奉大夫知曹州吕孝亷為京東轉運副使紹聖四年正月十一日葉祖洽繳曹州敕京東轉運副使王瑜知亳州先是遼使蕭昭彥謂接伴劉逵曰北朝遣泛使只為西人煎迫住不得若南朝肯相順其善逵曰事但順理無順情是日輔臣進呈逵語録衆皆稱之上問曽布何如布亦稱善涇原乞王舜臣準備使喚從之元符元年九月十七日秦州制勘所乞追王舜臣二年三月二十二日除名勒停準備丁卯看詳訴理文字所言元祐訴理所公案前知徐州趙鼎在任於官船附帶私物及以買絹為名差破人船案此句未詳蓋亦當時吏文也附載骨肉各坐私罪徒特衝替勒停元祐二年勑前斷私罪徒該赦負犯特與除落本所看詳訴理所附㑹權臣將違法附帶私物並稱情實可矜不論輕重盡與訴雪顯屬觀望乞詳酌施行及吏部供元祐四年吕大防等劄子陛下臨御之初察鼎非辜移知晉州未到任身亡其家無人食祿深可矜憫子景先推恩補郊社齊郎詔元祐二年指揮更不施行仍奪趙景先元授恩澤朝散郎知吉州周邠送吏部與合入差遣以訴理不當故也鄒浩云云詔鄜延涇原熙河環慶路見管軍賞銀絹不多慮緩急闕用特於內藏庫支發銀絹共二百萬匹兩赴逐路經略司封樁専充凖備邉事及招納之用內鄜延涇原路各六十萬匹兩熙河環慶路各四十萬匹兩仰户部交割計綱起發前去既而內藏庫闕銀以絹七十萬匹貼支上止令應副五十萬以封樁夏國歲賜絹二十萬貼支因諭曽布等曰內藏絹才百萬已輟其半布曰公私匱乏如此邉事何可不收斂關中民力困憊已甚涇原與熙河通接邉面便須為休息計上欣納之此據布録二月甲戌并辛巳涇原路經略使章楶言乞降賜度僧牒五十付本司分劈與逐州軍及縣鎮城寨堡子置樓櫓炮架木植及修築城壁磚椽從之戊辰詔翰林學士承㫖蔡京館伴北朝泛使初三省密院同呈除目章惇曰密院不曽具除目吏人當罰曽布曰三省罷帥及帥臣辭恩命多不與密院同呈吏人亦當罰惇曰此却當理㑹改正布曰甚善遂取索及再對上又欲用范鏜布曰泛使乃兩府鏜官輕恐須用京上然之布又言熙寧中泛使蕭禧來先帝因集英春宴遂宴泛使百官軍校皆赴坐與宴紫宸事體不同遼使以為非常待遇然實不為禧設今泛使來政在三月亦可以春宴勞之上欣納宴泛使布録在二月丙子今附此己巳詔解州鹽池昨經霖雨衝壞差太常博士一貟往彼致祭去年十月乙亥朔云云宗正寺丞陳覺民言乞將先帝玉牒內聖政令本寺修玉牒官抄寫封送國史院從之涇原路經略使章楶言秋葦川至蕩羌并鼐摩㑹正據要害并合於沒煙峗頭修通過堡子詔令章楶相度的確要便合進築去處次第進築不得迂回枉費財力及分擘諸路將兵務令均當分擘將兵以布録丁卯所書增入庚午熙州奏乞以空間地給新招蕃弓箭手從之環慶奏乞增置敢勇二百人從之鄜延奏夏人欲遣使來驛路說話詔帥臣面諭邉吏如有文字密録奏未得收接但云見申取保安軍指揮仍奏聽朝㫖曽布以西人方干求北敵乞和又議扣關請命然亦未審虛實故有是詔章楶言郭成折可適薦其子綡乞取勘上令罰銅二十斤李譓亦坐薦綡罰銅如成可適之數賜故相王安石宅一區元年九月十八日就京賜第今又賜當考陳瓘云云命前信州司法參軍吳良輔太常寺按協雅樂楊時中立墓志可考張商英云云詔賈青罷知河中府以御史鄧棐論列青罪狀故也去年十二月十八日鄧棐云云朝請大夫荆湖北路轉運副使莫君陳提舉洞霄宫從其請也辛未詔張舜民畢仲遊孫朴趙睿梅灝陳察李昭玘並罷館職此當考詳畢仲遊墓志云自禮部郎中出為秦鳯提刑又移永興路改祕閣校理知虢州未行改耀州坐黨與落校理張舜民傳云罷館職送吏部實録乃不書送部當考仲遊墓志亦云送部張舜民元祐十二月除祕閣校理紹聖二年八月改直祕閣元符元年三月十二日自袐閣加直龍圖閣尋罷畢仲遊元祐元年十二月除集賢校理孫朴元祐元年十二月除袐閣校理趙睿元祐元年十二月除袐閣校理梅灝元祐元年十二月除袐閣校理陳察元祐元年十二月除集賢校理紹聖二年四月改祕閣校理李昭玘紹聖元年四月以袐閣校為袐丞未見初除袐校時昭玘但落職仍為京東提刑朝奉郎談掞為户部貟外郎曽布云云當檢附或削去四月四日降官壬申涇原乞守禦人與進築者一等推恩從之詔河北安撫司督責修㳂邉城壁軍器等布録壬申二月二十二日密院奏可考是月恩州地震都水使者鄭佑言河溢博州堂邑掃下入博鄆等州地分流行乞行堤塞從之此據趙鼎臣河渠書正月事今附見月末詔秦鳯路提㸃刑獄劉何罷任赴闕曽布言何先在永興軍路知河中府猗氏縣王發嘗言鄜延保申顧人日陪錢三千及移秦鳯原州推官慕容將美申熙河冒賞事皆為何捃托不已違法任情故有是詔五月一日何復為永興提刑閏九月十二日責逺小知州此事實録並不書按曽布日録追書之
