body:
  text: 續資治通鑑長編卷十七宋李燾撰太祖開寶九年據資治通鑑例年號皆以後來者為定武德元年從正月便為唐髙祖武德元年更不稱隋義寧二年明皇先天元年正月便不稱景雲三年梁開平元年正月便不稱唐天祐四年按太宗於開寶九年十月二十一日即位十二月二十二日改元不俟踰年與常例不同今仍稱開寶九年春正月戊辰朔御乾元殿受朝辛未曹彬遣翰林副使太原郭守文奉露布以江南國主李煜及其子弟官屬等五十五人來獻上御明德門受獻煜等素服待罪詔並釋之各賜冠帶器幣鞍馬有差時有司議獻俘之禮如劉鋹上曰煜嘗奉正朔非鋹比也寢露布不宣煜初以拒命頗懷憂恚不欲生見上守文察知之因謂煜曰國家止務恢復疆土以致太平豈復有後至之責耶煜心始安徐鉉從煜至京師上召見鉉責以不早勸煜歸朝聲色甚厲鉉對曰臣為江南大臣而國滅亡罪固當死不當問其他上曰忠臣也事我如事李氏賜坐慰撫之又責張洎曰汝教李煜不降使至今日因出帛書示之乃王師圍城洎所草召江上救兵蠟彈內書也洎頓首請死曰書實臣所為也犬吠非其主此其一耳他尚多今得死臣之分也辭色不變上初欲殺洎及是竒之謂曰卿大有膽朕不罪卿今事我無替昔之忠也壬申德音降死罪囚流以下釋之男子婦人配役者聽自便乙亥以李煜為右千牛衛上將軍封違命侯其子弟皆授諸衛大將軍宗屬皆授諸衛將軍丙子以煜司空知左右內史事湯悅為太子少詹事太子太保徐遊左內史侍郎徐鉉為太子率更令右內史舍人張洎王克貞為太子中允克貞新塗人在江南守道中立國人稱其長者鉉性質直無矯飾有盧氏簿謝嶽者鉉之故人也凡銓選之制年七十即罷去嶽與虢州刺史有隙奏嶽年過不堪其任時江南人士爵齒有司疑者必質於鉉嶽求哀曰犬馬之齒公實知之嶽家貧親屬多仰俸祿以給今罷去即填溝壑願公言不知鉉曰我實知而言不知是欺天也卒以實對吏部遂罷嶽官然故人子弟及親族之孤貧者來依鉉鉉必分俸開館以納之以兩浙都鈐轄使沈承禮為威武節度使初圍潤州城中兵夜出焚柵或請往救之承禮曰兵法所謂擊東南而備西北者此也命士擐甲不動既而焚柵兵去攻他壁諸將不設備者悉驚擾獨承禮所部敵人不敢窺焉初盧絳在宣州聞金陵陷乃帥衆趨福建欲割據嶺表至歙州刺史龔慎儀閉城拒之絳怒攻拔其城殺慎儀縱火大略所過莫不驚擾傳檄至福州觀察判官查元方斬其使己卯上聞綘叛遣其弟龔未見龔時為何官齎詔書招諭之幸左飛龍院觀衛士射遂幸北苑令衛士與契丹使騎射庚辰詔幸西京將以四月有事于南郊濟州團練使李謙溥以疾自隰州肩輿還京師上遣中使持湯劑就賜之又遣太醫診視謙溥纍上章納祿不許壬午卒上甚悼焉賻贈加等葬事官給癸未命翰林學士李昉知制誥扈蒙李穆等於禮部貢院同閲諸道所解孝弟力田及有文武材幹者凡四百七十八人及試問所習之業皆無可采而濮州以孝弟薦名者二百七十人上駭其多召問於講武殿率不如詔猶自言能習武復試以騎射則皆隕越顛沛上顧曰止可𨽻兵籍耳衆皆號泣求免乃悉令退去劾本州官司濫舉之罪丙申遣太常丞魏咸熙於開封府諸縣定三等人户稅額咸熙仁浦之子也浚洛水二月己亥羣臣再奉表請加尊號曰一統太平上曰燕晉未復遽可謂一統太平乎不許羣臣請易以立極居尊上不得已許之太子中允髙易從太子洗馬商致用判太僕寺時方議郊禋俾繕修車輅也易從致用未見庚戌以宣徽南院使義成節度使曹彬為樞密使領忠武節度使樞密領節度自彬始山南東道節度使潘美為宣徽北院使節度領宣徽自美始侍衛馬步軍都虞候李漢瓊領振武節度使步軍都虞候劉遇領大同節度使賀州刺史判四方館事田欽祚領汾州防禦使東上閣門使梁迥領汾州團練使西頭供奉官李繼隆為莊宅副使賞江南之功也彬歸自江南詣閣門進榜子云奉敕差往江南勾當公事回時人嘉其不伐始彬之行上許彬以使相為賞及還語彬曰今方隅尚有未服者汝為使相品位極矣肯復力戰耶且徐之更為我取太原因密賜錢五十萬彬怏怏而退至家見布錢滿室乃歎曰好官亦不過多得錢耳何必使相也上愛惜爵位不妄與人類此會要云彬以平江南故不罷旄鉞才九月而罷凡以檢校官兼中書令侍中同平章事者並謂之使相唐制皆署敕五代以來不預政事朝會親王則分班餘官則綴本官正衙見謝則押班凡定制除授者敕尾存其銜而不署側汪使字上聞吳越王俶將入朝辛亥遣皇子興元尹德昭至睢陽迎勞之契丹遣太僕卿耶律延寧等來賀長春節馬步軍副都軍頭毅州刺史史圭坐漏泄省中語甲寅出為光州刺史初內客省使丁德裕監吳越兵平江南德裕恃勢剛狠不恤士卒黷貨無厭吳越王俶奏其事乙卯出德裕為房州刺史戊午盧多遜加吏部侍郎落起復己未吳越王俶及其子鎮海鎮東節度使惟濬等入見崇德殿宴長春殿先是車駕幸禮賢宅案視供帳之具及至即詔俶居之寵賚甚厚俶所貢奉亦增倍於前也庚申大宴大明殿後四日召俶惟濬宴射苑中又三日幸禮賢宅初上即位召供備庫副使魏丕謂曰作坊久積弊爾為我修整之即授作坊副使丕在職甚盡力居八年乃遷正使上討澤潞維揚下荆廣收川峽征河東平江南皆先期諭旨令治兵器無不精辦舊床子弩射止七百步丕增造至千步三月己巳以丕領代州刺史仍典作坊時京師有作坊諸州有作院皆有常課作坊所造兵器每旬一進上親閲之列五庫以貯焉尋又分作坊為南北别置弓弩院分作坊為南北在九月置弓弩院據會要亦在此年而無其月日今并書之庚午命吳越王俶劔履上殿詔書不名辛未以俶妻賢德順穆夫人孫氏為吳越國王妃宰相謂異姓諸侯王妻無封妃之典上曰行自我朝表異恩也即令其子惟濬持詔賜之先是上數召俶與惟濬宴射苑中惟諸王預坐俶拜輒令內侍掖起俶感泣又嘗令俶與晉王光義京兆尹廷美敘兄弟之禮俶伏地叩頭固辭得止上將西幸俶懇請扈從不許乃留惟濬侍祠遣俶歸國是日宴講武殿謂俶曰南北風土異宜漸及炎暑卿可早發俶泣涕願三嵗一朝上曰川途迂逺俟有詔乃來也先是羣臣皆有章疏乞留俶而取其地上不從於是命取一黃袱以賜俶封識甚固戒俶曰途中宜密觀及啓之則皆羣臣乞留俶章疏也俶益感懼既歸每視事功臣堂一日命徙坐于東偏謂左右曰西北者神京在焉天威不違顔咫尺俶豈敢寧居乎益以乘輿服玩為獻製作精巧每修貢必列於庭焚香而後遣之俶在太祖朝止一入覲記聞及東軒録等或云江南未平俶來朝太祖遣歸江南既平復來朝皆謬也五代史又云俶還國益以器服珍竒為獻不可勝數太祖曰此吾帑中物無用獻為按太祖待俶甚寵當無此語此語蓋出於魏王繼岌破蜀時或傳者誤節之今不取舊儀將有事于南郊必先告太廟於是將如西京不欲載神主俱行壬申上親告太廟常服乘步輦百官班於廟庭不設樂懸止一獻不行祼禮不飲福酒不祭七祀及祀圜丘于西京前二日復命東京留守告宣祖廟焉癸酉以皇子德芳為貴州防禦使以宰相沈義倫為東京留守兼大內都部署左衛大將軍案宋史作右衛大將軍王仁贍權判留司三司兼知開封府丙子車駕發京師己卯次鄭州庚辰上謁安陵奠獻號慟左右皆泣既而至闕臺西北嚮發鳴鏑指其所曰我後當葬此賜河南府民今年田租之半復奉陵户一年談苑載上自西京還乃謁安陵蓋誤也今從實録正史辛巳上至西京見洛陽宫室壯麗甚悅召知河南府右武衛上將軍案原本作右武上將軍考宋史職官志無此名號應是右武衛上將軍此脫去衛字耳謹增入焦繼勳面奬之加彰德節度使繼勳女為皇子德芳夫人再授旄鉞亦以德芳故也而繼勳性吝嗇公府用度多所減削時論非之丙戌以王仁圭領義州刺史李仁祚為八作副使丁亥召沈義倫赴西京命王仁贍兼大內都部署開封推官左贊善大夫真定賈琰權知府事庚寅分命近臣遍禱城中祠廟久雨故也辛卯幸龍門廣化寺開無畏三藏塔是月發卒千人自洛城菜市橋鑿渠抵漕口二十五里以通餽運是春權停貢舉先是流民歸業者止輸所佃之稅俟五嵗乃復故額以是及五嵗輒逃夏四月己亥令再逃者勿得還本貫有司言凖令宗廟殿庭宫懸三十虡郊社二十虡殿庭加鼓吹十二虡開寶四年郊社誤用宗廟之數今嵗親郊欲用舊禮有詔圜丘增十六虡餘如前制庚子合祭天地于南郊國史改稱雩祀恐失其實今從實録正言之還御五鳯門大赦有司將奉册上尊號上卒不受初雨彌月不止上遣中使齎三木與嶽神約宿齋日雨不止當施桎梏又使禱無畏三藏塔不如約則毁之及期始晴霽以訖成禮都民垂白者相謂曰我輩少經亂離不圖今日復觀太平天子儀衛有泣下者壬寅大宴廣夀殿癸卯以崇義留後王全斌為武寧節度使昭化留後崔彥進為彰信節度使上謂全斌曰朕頃以江左未平慮征南諸將不持紀律故抑卿數年為朕立法今已克金陵還卿旄鉞仍加厚賜上生於洛陽樂其土風嘗有遷都之意始議西幸起居郎李符上書陳八難曰京邑凋弊一難也宫闕不完二難也郊廟未修三難也百官不備四難也畿內民困五難也軍食不充六難也壁壘未設七難也千乘萬騎盛暑從行八難也上不從既畢祀事尚欲留居之羣臣莫敢諌鐡騎左右廂都指揮使李懷忠乘間言曰東京有汴渠之漕嵗致江淮米數百萬斛都下兵數十萬人咸仰給焉升下居此將安取之且府庫重兵皆在大梁根本安固已久不可動搖若遽遷都臣實未見其便上亦弗從晉王又從容言遷都非便上曰遷河南未已久當遷長安王叩頭切諫上曰吾將西遷者無它欲據山河之勝而去冗兵循周漢故事以安天下也王又言在德不在險上不答王出上顧左右曰晉王之言固善今姑從之不出百年天下民力殫矣李懷忠為節度使在太平興國二年冬此時但領富州團練使三朝聖政録稱節度使者誤也晉王事據王禹稱建隆遺事正史闕之甲辰始下詔東歸乙巳宴從臣於會節園還經通利坊以道狹撤侵街民舍益之命太子太師王溥與百官先歸京師尚書左丞吕餘慶卒餘慶始罷政上欲授以旄鉞會其疾不果於是贈鎮南節度使輟一日朝遣中使護喪事丙午車駕發洛陽宮己酉次鄭州辛亥至東京初李煜既降曹彬令煜作書諭江南諸城守皆相繼歸順獨江州軍校胡則與牙校宋德明殺刺史據城不降詔先鋒都指揮使曹翰為招安巡檢率兵討焉江州城險固翰攻之不克自冬訖夏死者甚衆丁巳始拔之衆猶巷鬭則時病甚卧床上翰執縳責其拒命對曰犬吠非其主公何怪也命腰斬之并殺德明先是上命右補闕張霽知江州與翰俱入城翰兵掠民家民訴於霽霽按誅翰兵翰以江州民拒守又忿民訴誅其兵發怒屠城死者數萬人取其尸投井坎皆填溢餘悉棄江中誣奏霽徙知饒州民家貨資巨萬皆為翰所得霽未見上聞江州城垂破遣使持詔賜翰禁止殺戮使者至獨樹浦值大風不能渡比至城已屠矣翰因請載廬山東林寺五百鐡羅漢像歸至潁川新造佛舍遂調發巨艦十餘艘盡載金帛置鐡像於其上時號為押綱羅漢己未詔自今旬假不視事賜百官休沐壬戌以荆湖南路轉運使太子中允許仲宣為刑部郎中京西轉運使起居郎李符為比部員外郎左補闕權知升州并江南轉運使楊克驤為兵部員外郎皆以調發軍儲有勞也江南之未平也左贊善大夫知漢陽軍李恕屢率兵渡江破賊甲子以恕為駕部員外郎是日宴近臣及節度使於講武殿丙寅大食國遣使來貢方物五月己巳幸東水磑遂幸飛龍院觀漁金水河盧綘承詔赴闕方引對時龔慎儀之兄子潁為右贊善大夫遇絳於朝詰之曰反賊汝專殺我叔父我伺爾久矣今乃在此耶遂執絳訴寃上以絳屬吏樞密使曹彬言絳驍勇願宥其死上曰絳狀貌酷類侯霸榮安可留也乙亥斬首西市盧絳被誅舊無其事此據新録本紀乃云斬絳於西京不知何故按絳死於固子陂葬於夷門山似不在西京也且車駕時已還大梁矣何用於西京斬之此必字誤江南野録載絳歸朝實曹翰部送之太祖詰絳不即降絳言李煜未受王爵故不即降太祖嘉其忠因授冀州團練使及龔潁訴寃曹翰復言絳不可留乃殺之又言鐡劵氊褥等事皆與國史異今不取然國史絳傳蓋與九國志同當更考之庚辰幸講武池遂幸玉津園觀稼宋州言大風壞官舍民居凡四千六百餘間癸未降申州為義陽軍甲申以東上閣門副使田守竒賀契丹生辰右贊善大夫房彥均副之彥均未見晉州以所獲北漢嵐憲石三州巡檢使王洪武等二十九人來獻洪武未見辛卯左司員外郎知制誥扈蒙權知荆南府盧多遜惡之也此據本傳未知所惡何事也遣司勳員外郎和峴江南道採訪六月己亥以潁州團練使曹翰為桂州觀察使仍判潁州賞平江南之功也上以晉王光義所居地勢髙仰水不能及庚子步自左掖門至其第遣工為大輪激金水河注第中且數臨視促成其役王性仁孝上雅鍾愛尹京十五年庶務修舉上數幸其府恩禮甚厚嘗疾病殆不知人上亟往問親為灼艾王覺痛上亦取艾自灸自辰及酉王汗洽蘇息上乃還疾良愈復往視之賜以龍鳯氊褥又嘗宴宮中王醉不能乘馬上起送至殿階親掖之王帳下士蒙城髙瓊左手執鐙以出上顧見因賜瓊等控鶴官衣帶及器帛勉令盡心間謂近臣曰晉王龍行虎步且生時有異必為太平天子福德非吾所及也蔡惇夔州直筆云太祖以晉王尹京對罷宣諭曰久不見汝所乘何馬牽來一觀遂傳呼至殿陛下御馬臺敕令晉王對御上焉太宗皇懼辭遜乃密諭曰他日汝自合常在此上下馬何辭焉太宗駭汗趨出命近侍挽留送上馬遂再拜乘馬馳走回旋於殿庭而出太祖示繼及之意也按太祖繼及之意蓋先定於昭憲榻前矣今不取癸卯吳越王俶遣使入貢謝朝覲蒙殊禮及放令歸國也武寧節度使贈中書令王全斌卒全斌輕財重士不求顯赫之譽寬而容衆軍旅樂為之用其黜居外郡幾十年怡然自得識者多之秋七月戊辰幸晉王第觀水入新池初永安留後折御勳以郊祀西洛來朝道病後期丙子徙御勳為泰寧軍留後召御勳弟御卿為間廄副使知府州是日幸京兆尹廷美第視疾後兩日復幸焉平海節度使陳洪進以江南吳越入朝不自安戊寅遣其子漳州刺史文皓來貢方物且乞修覲禮詔許之洪進行至南劔州聞國有喪乃歸鎮發哀先是令諸州賣鹽斤六十錢者減為五十四十者為三十至是顆鹽減至四十四乙酉令復減四錢命近臣祈晴於京城祠廟丁亥詔新修歷代帝王及嶽瀆祠廟與縣鎮相近者移治所就之舊制天下刑獄大理寺詳斷刑部詳覆去年秋嘗有詔令兩司參議同奏時右贊善大夫張佖判刑部比部員外郎李符判大理符性剛強頗輕重其法佖多駁正之屢至忿競案牘轉復稽滯佖上疏請復舊制不報因求外任八月戊戌以佖權知榮州初偽朝官出領外任者入辭必戒飭再三及佖辭上謂曰惟汝不必朕言方擢用汝佖在州果有善政兩司共斷文案據佖疏乃去年七月詔旨而實録本紀不著今因佖出附見己亥幸新龍興寺乙巳幸等覺院遂幸東染院賜工人錢又幸控鶴營觀騎士射賜帛有差又幸開寶寺觀經藏丁未命伐北漢以侍衛馬軍都指揮使黨進為河東道行營馬步軍都部署宣徽北院使潘美為都監虎捷右廂都指揮使楊光義為都虞候己酉進等入辭各賜戎服金帶鞍馬鎧仗遣之初平江南袁州刺史劉茂忠與吉州刺史屠令堅相約拒命會令堅死監軍侍其稹權知吉州其事遂寢乃與稹俱入朝茂忠常侵掠邉邑上詰之茂忠曰臣事李煜惟力是視雖陛下親征臣當殞身不顧上嘉其忠慤庚戌以茂忠為登州刺史稹為間廄使稹未見晉州獲北漢諜者趙訓械送闕下上釋不誅給裝服遣之廢江南諸縣偽署制置使辛亥命鎮州西山巡檢洺州防禦使郭進為河東道欣代等州行營馬步軍都監壬子以樞密副使楚昭輔右衛大將軍判三司王仁贍分領宣徽南北院事自後宣徽使闕即命樞密使副兼領院事宣徽使除授其後不備書此其始事故特出之丙辰詔分兵入北漢界西上閣門使郝崇信與解州刺史王政忠出汾州內衣庫副使閻彥進與澤州刺史齊超超未見出沁州內衣庫副使孫晏宣晏宣未見與濮州刺史安守忠出遼州引進副使齊延琛延堔未見與晉隰州巡檢汝州刺史穆彥璋彥璋未見出石州洛苑副使侯美與郭進出欣代九月甲子幸綾錦院乙丑開封府言京城諸官司獄皆空無繫囚丙寅始令刺史郎中將軍以上私忌給假丁卯以庫部員外郎范旻勾當淮南諸州并淮北徐海沂等州水陸計度轉運公事上謂旻曰朕委卿以方面凡除去民隱漕輦軍儲悉許便宜從事不用一一中覆也且聞卿素貧茍有所須但那官錢用之旻嵗運米百餘萬石給京師當時稱有心計髙麗國王王昭卒其子胄權領國事庚午遣使趙尊禮入貢且請命壬申黨進帥兵抵北漢城下列寨於河汾之南敗其軍數千人於太原之北獲馬千餘匹及兵仗六百餘副癸酉户部尚書致仕贈左僕射劉熙古卒初平江南命著作佐郎建陽楊徹通判虔州就曹彬分兵之任節度使郭載興載興未見方擁兵自固徹單騎直趨其壘諭以國威信載興即委符聽命辛巳命載興為海州刺史徹悉料城中軍士之勇壯者五百人為一綱部送京師土豪黎羅二姓依山聚黨作亂徹討平之擒二豪械赴闕下辛巳郭進言領兵出欣代路俘北漢山後諸州民三萬七千餘口庚寅幸城南池亭遂幸禮賢宅又幸晉王第冬十月甲午朔定難節度使李光睿率所部兵次于天朝定朝兩關遣使言伺黃河凍合即入北漢界丁酉安守忠言與洛羅寨兵馬監押馬繼恩繼恩未見領兵出遼州路焚北漢四十餘寨獲牛羊人口數千按八月遣內衣庫副使孫宴宣與濮州刺史安守忠取遼州路入河東界守忠傳亦載守忠時知遼州與馬繼恩入界事而舊録乃云遼州知州齊超上言蓋誤也齊超實澤州刺史别取沁州路入界非遼州也新録止稱遼川當是覺舊録誤故改之今直書安守忠齊超言領兵出沁州路敗北漢軍五百人擒三十人此據本紀也新舊録無之疑實録脫誤或與安守忠同日奏到耳當考己亥幸西教場觀飛山軍士發機石庚子郭進言破北漢夀陽縣俘其民九十餘口黨進言又敗北漢軍千餘人於太原城北初涇州官嵗市馬彰義節度使張鐸厚增其直而私取之纍積至十六萬貫及擅借公帑錢萬餘緡侵用官麴六千四百餘餅事發召歸京師本州械繫其子保常及親吏宋習上以鐸宿舊詔釋不問但罷其旄鉞而已其所侵盜皆蠲除之保常洎習亦得免庚戌以鐸為左屯衛上將軍鐸河朔人也初有神降于盩厔縣民張守真家自言我天之尊神號黑殺將軍玉帝之輔也守真每齋戒祈請神必降室中風肅然聲若嬰兒獨守真能曉之所言禍福多驗守真遂為道士上不豫驛召守真至闕下壬子命內侍王繼恩就建隆觀設黃籙醮令守真降神神言天上宫闕已成玉鎖開晉王有仁心言訖不復降此據國史符瑞志稍增以楊億談苑談苑又云太祖聞守真言以為妖將加誅會晏駕恐不然也今不取上聞其言即夜召晉王屬以後事左右皆不得聞但遙見燭影下晉王時或離席若有所遜避之狀既而上引柱斧㪬地大聲謂晉王曰好為之此據吳僧文瑩所為湘山野録正史實録並無之野録云祖宗潛躍曰嘗與一道士遊於關河無定姓名自曰混沌或又曰真無每有乏則探囊金愈探愈出三人者每劇飲爛醉生喜歌步虛為戲能引其喉於杳冥間作清徴之聲時或一二句隨天風飄下惟祖宗聞之曰金猴虎頭四真龍得真位至醒詰之則曰醉夢間語豈足憑耶至膺圖受禪之日乃庚申正月初四也自御極不再見下詔草澤遍訪之人或見於轘轅道中或嵩洛間乃開寶乙亥嵗也上已祓禊駕幸西沼生醉坐於岸木隂下笑揖太祖曰别來喜安上大喜亟遣中人密引至後掖恐其遁去急回蹕見之一如平時抵掌浩飲上謂生曰我久欲見汝決尅一事無他我夀還得幾多生曰但今年十月二十日夜晴則可延一紀不爾則當速措置上酷留之俾宿後苑苑吏或見宿於木末鳥巢中或數日不見上常切切記其語至所期之夕御太清閣以望氣是夕果晴星斗明燦上心方喜俄而隂霾四起天地陡變雷電驟降移仗下閣急傳宫鑰開門召開封尹即太宗也延入大寢酌酒對飲宦官宫妾悉屏之但遙見燭影下太宗時或避席有不可勝之狀飲訖禁漏三鼓殿下雪已數寸太祖引柱斧㪬雪顧太宗曰好做好做遂解帶就寢鼻息如雷是夕太宗留宿禁內將五鼓伺廬者寂無所聞太祖已崩矣太宗受遺詔於柩前即位逮曉登明堂宣遺詔罷聲慟引近臣環玉衣以瞻聖體玉色瑩然如出湯沐太祖英武其達生知命蓋有如此者文瑩宜不妄故特著于此然文瑩所言道士不得姓名豈即張守真耶或復一道士也恐文瑩得之傳聞故不審如云於西沼木隂下笑揖太祖止宿後苑鳥巢中言卜月二十日夜晴則聖夀可延一紀疑皆好事者飾説未必然也又云太宗留宿禁內此亦謬誤太祖既不豫寧復自登閣且至殿庭㪬雪乎今略加刪潤更俟考詳顧命大事也而實録正史皆不能記可不惜哉蔡惇直筆云太祖召陳摶入朝宣問夀數對以丙子嵗十月二十日夜或見雪當辦行計若晴霽須展一紀至期前夕上不寢初夜遣宫人出視回奏星象明燦交更再令出視乃奏天隂繼言雪下遂出禁鑰遣中使召太宗入對命置酒付宸翰屬以繼位夜分乃退上就寢侍寢者聞鼻息聲異急視之已崩太宗於是入繼按惇所載與文瑩略同但即以道士者為陳摶耳摶本傳及談苑並稱摶終太祖朝未嘗入見恐惇亦誤矣當是張守真也王禹稱建隆遺事云上將晏駕前一日遣中使急召宰相趙普盧多遜入宫見於寢閣上曰吾知此疾必不起要見卿等者無它為有數事未暇行之卿等將筆硯來依吾言寫之身後切須行之吾瞑目無恨也遂授普等筆硯上自陳述普等依上言而寫數事皆濟世安民之道普等因嗚咽流涕而言此則謹依謨訓而行之然有一大事未見陛下處置上曰何事也普等曰儲嗣未定陛下儻有不諱諸王中當立何人上曰可立晉王普等復曰陛下艱難創業卒致升平自有聖子當命未可議及昆弟也臣等恐大事一去卒不可還陛下宜熟計之上曰吾上不忍違太后慈訓下為海內方小康思得長君以撫之吾意已決矣願公等善為我輔晉王遂出御府珠玉金器賜普等令歸第翌日上崩於長慶殿由是晉王聞普等有此奏議大銜之嗣位後坐多遜事連秦府貶死於嶺表趙普以婦人取媚於禁中遂獲免謹按世所傳建隆遺事十三章此其第十一章也事尤悖謬不可信蓋開寶六年八月趙普已罷相出鎮河陽後三年太祖晏駕此時趙普實在河陽安得與盧多遜並居相位耶又遺事第七章稱杜太后及太祖召晉王秦王南陽王等相約傳位陶穀為誓書趙普告天地宗廟此固不然也設如所言則太祖傳位晉王約已定於建隆初矣開寶末命宰相又何請耶就使復請則決非趙普也且遺事乃一人所著其首尾固當參同今第七章既云爾其第十一章又云爾豈不自相矛盾耶臣燾嘗反覆推究此章則普之怨家仇人多遜親黨所為欲肆其詆毀故託名禹稱竄寄遺事中實非禹稱作也禹稱事太宗坐直言屢黜故羣小因之然禹稱素識道理忠義人也決不敢鑿空駕虛汚衊君父若此不顧且禹稱集所載表章多代普作禹稱傳亦稱普雅愛重禹稱縱禹稱書惡不為普隱亦須驗實傳信方太祖晏駕時普不在相位士大夫孰不知之而此章乃云與盧多遜同入宫其非禹稱所著蓋明甚必多遜親黨不習朝廷之故者所妄作也且非獨此章為不可信其它章要不全是蓋禹稱用文章名天下今所傳遺事語多鄙俗略不似禹稱平日心聲故臣燾竊有疑焉特信其可信耳學士大夫以書託名禹稱則遽信之不復推究此最害義者故不可不辨以曉來世云癸丑上崩于萬嵗殿時夜已四鼓宋皇后使王繼恩出召貴州防禦使德芳繼恩以太祖傳國晉王之志素定乃不詣德芳徑趨開封府召晉王見左押衙程德元先坐於府門德元者滎澤人善為醫繼恩詰之德元對曰我宿於信陵坊乙夜有當關疾呼者曰晉王召出視則無人如是者三吾恐晉王有疾故來繼恩異之乃告以故扣門與俱入見王且召之王大驚猶豫不行曰吾當與家人議之入久不出繼恩促之曰事久將為它人有矣時大雪遂與王於雪中步至宫繼恩使王止於直廬曰王且待於此繼恩當先入言之德元曰便應直前何待之有乃與王俱進至寢殿后聞繼恩至問曰德芳來耶繼恩曰晉王至矣后見王愕然遽呼官家曰吾母子之命皆託於官家王泣曰共保富貴勿憂也此據司馬光記聞誤以王繼恩為繼隆程德元為賈德元今依國史改定按開寶皇后以開寶元年二月入宫德芳以開寶八年七月娶焦繼勳女出閣時年十七嵗德芳傳不載母為開寶皇后后傳亦不言有子疑德芳非宋出也當考國史方技傳馬韶平棘人習天文三式之學開寶中太宗以晉王尹京邑時朝廷申嚴私習天文之禁韶素與太宗親吏程德元善德元每戒韶不令及門九年十月十九日既夕韶忽造德元德元恐甚且詰其所以來韶曰明日乃晉王利見之辰也德元惶駭因止韶於一室中遽入白太宗太宗命德元以人防守之將聞于太祖及詰旦太宗入謁果受遺踐阼數日韶以赦免按此與程德元傳所稱宿信陵坊夜有扣關疾呼趣赴宫邸事不同疑必有一誤今但從德元傳及司馬光記聞一甕牖間評嘗觀王禹稱所撰建隆遺事載立晉王之節皆太祖之心自欲如此初非出於杜太后也前一假云太祖欲立太宗議已定太后遂令趙普作誓書留之禁中既而太宗即位後一假云太祖將晏駕方召趙普於寢閣間及趙普欲立太祖之子而太祖不允遂立太宗其後太宗聞之故與普有隙夫以書中前後所載一事乃不同如此何耶甲寅太宗即位羣臣謁見萬嵗殿之東楹帝號慟殞絶乙卯大赦天下常赦所不原者咸除之令緣邉禁戢戍卒毋得侵撓外境羣臣有所論列並許實封表疏以聞必須面奏者閣門使即時引對風化之本孝弟為先或不順父兄異居别籍者御史臺及所在糾察之先皇帝創業垂二十年事為之防曲為之制紀律已定物有其常謹當遵承不敢踰越咨爾臣庶宜體朕心丙辰羣臣上表請聽政不允丁巳宰相薛居正等同見上頓首固請乃許之即日移御長春殿謂居正等曰邉防事大萬機至重當悉依先帝舊規無得改易以開封府判官著作郎陸澤程羽為給事中權知開封府推官右贊善大夫賈琰為左正諫大夫樞密直學士門人襄邑郭贄為著作佐郎正諫即諫議也避上名改之內出大行遺留物賜近臣有差庚申以皇弟永興節度使兼侍中廷美為開封尹兼中書令封齊王皇子山南西道節度使同平章事德昭為永興節度使兼侍中封武功郡王貴州防禦使德芳為山南西道節度使同平章事帝友愛尤篤不欲德芳異其稱呼并詔王石魏氏三公主皆依舊為皇子皇女焉宰相薛居正加左僕射沈倫加右僕射倫即義倫也參知政事盧多遜為中書侍郎平章事樞密使曹彬加同平章事樞密副使楚昭輔為樞密使彬前以樞密使領忠武節度至是始罷彬加平章事罷節鉞此據會要它書並不詳當考命齊王廷美為山陵使壬戌封昭慶公主為鄭國延慶公主為許國永慶公主為虢國李光睿言率兵入北漢界破保寨斬首七百級擒寨主侯遇獲牛羊鎧甲數千計光睿尋改名克睿有司言官階州縣名與御名下字同者皆改之彰義軍為彰化軍義成軍為武成軍保義軍為保平軍感義軍為感德軍義武軍為定武軍昭義軍為昭德軍崇義軍為崇信軍歸義軍為歸化軍大義軍為大順軍義州為儀州南義州為南儀州義陽軍為信陽軍鎮寧節度使劉光義改名庭讓武定節度使祁廷義改名廷訓先是茶鹽𣙜酤課額少者募豪民主之民多增額求利嵗或荒歉商旅不行至虧失常課乃籍其資産以備償於是詔以開寶八年額為定勿輒增其額又詔應諸色選人有自外引見取旨或令降資或不與官者仰銓司檢勘本無違礙及疾病者各依資注授其有自令録降簿尉者却與復資或經逺官合放選而令守選者亦許赴集此據會要十月詔十一月甲子追册故尹氏為淑德皇后越國夫人符氏為懿德皇后尹氏崇珂之女兄上微時娶焉丁卯詔齊王廷美武功郡王德昭位在宰相上王稱東都事略詔曰帝堯之化實先於敦族成周之制爰後於異姓自今朝會齊王廷美武功郡王德昭位宜在宰相上又詔中外官除拜出入自今並於正衙辭謝違者有司議其罰始復舊制也宰相薛居正上大行皇帝陵名曰永昌詔恭依戊辰詔細民以農桑為業頃制奉户月輸緡錢營置良苦今皆罷之官奉並給官物令貨鬻及七分仍依周顯德五年十二月詔增給米麥分遣使者以大行遺留物賜外諸侯庚午以齊州防禦使李漢超為雲州觀察使判齊州仍護江南屯兵洺州防禦使郭進領應州觀察使判邢州兼西山巡檢如故國初并益廣南各僭大號荆湖江表止通貢奉西戎北狄皆未賔伏太祖垂意將帥分命漢超及進等控禦西北其家族在京師者撫之甚厚所部州縣管𣙜之利悉與之恣其回圖貿易免所過征稅許令召募驍勇以為爪牙凡軍中事悉聽便宜處置每來朝必召對命坐賜以飲食錫賚殊異遣還由是邉臣皆富於財得以養士用間洞見蕃夷情狀時有冦鈔亦能先知預備設伏掩擊多致克捷故終太祖世無西北之憂諸叛以次削平武功蓋世斯乃得壯士以守四方推赤心置人腹中之所致也國史論及祖宗故事經武聖略所列將帥凡十四人李漢超屯關南馬仁瑀守瀛州韓令坤鎮常山賀惟忠守易州何繼筠鎮棣州以拒北契丹郭進控西山武守琪戍晉州李謙溥守隰州李繼勳鎮昭義以禦北漢趙贊屯延州姚內斌守慶州董遵誨屯環州王彥升守原州馮繼業鎮靈武以備西戎其十三人各隨時自見獨武守琪戍晉州事未詳當考之時瀛州防禦使馬仁瑀監霸州軍仁瑀雖兄事漢超而多自肆擅發麾下兵入敵境略奪生口羊馬由是二將交惡上恐生邉釁即遣使齎金帛賜漢超及仁瑀令置酒講解尋徙仁瑀知遼州漢超在齊州凡十七年為政簡易吏民信愛嘗詣闕請立碑頌德詔太子率更令徐鉉為之文與士卒絶甘分少及其死軍中皆流涕漢超立碑在開寶八年十一月今附此進守西山凡二十年少貧賤無賴依巨鹿富人家富人子欲殺之其婦竺氏濳以告進得免及為邢州即使訪竺氏婦竺時已死家甚困得其女撫養之如己子將嫁為大校妻女辭以世本農畝進乃擇民家子配焉在洺州日城四面悉令種栁壕中雜植荷芰蒲葦後益繁茂州人見之有泣者曰此郭公所種也令諸州大索明知天文術數者傳送闕下敢藏匿者棄市募告者賞錢三十萬詔諸道轉運使各案舉部內知州通判監臨物務京朝官等以三科第其能否政績尤異者為上恪居官次職務粗治者為中臨事弛慢所蒞無狀者為下嵗終以聞將大行誅賞焉乙亥以權知髙麗國事王胄為髙麗國王以太子少詹事湯悅率更令徐鉉並直學士院太子中允張洎直舍人院直舍人院自洎始以供奉官薛惟吉為右千牛衛將軍沈繼宗及鄉貢進士盧雍並為水部員外郎雍多遜子也起家授官即與繼宗同多遜時方寵幸上特命之非舊典云壬午遣著作郎馮正著作佐郎張玘使契丹告終稱嗣也正未見壬辰遣左司禦副率于延超司農寺丞徐昭文使髙麗昭文未見詔諸色選人有曽經引對特奉詔降資不許授官者有司案驗如别無遺闕並與依資注擬是月劉鋹封衛國公李煜封隴西郡公煜去違命侯之號十二月癸巳朔翰林學士李昉上大行皇帝諡曰英武聖文神德廟號太祖上初即位詔罷河東之師癸卯宣徽南院使潘美侍衛馬軍都指揮使黨進皆自行營歸闕十國紀年云十一月宋師失利燒營而歸與此不同當考壬子毀江南諸州城上白露屋太宗至仁應道神功聖德文武睿烈大明廣孝皇帝紀一據資治通鑑例則於今年正月便合為太宗皇帝紀緣太宗改元不俟踰年與常例不同今特於改元之月乃别為紀仍就此卷不分出太平興國元年十二月甲寅上御乾元殿受朝懸而不樂大赦改元文班常參官衣緋緑及二十年者有司上其名京官見釐務職滿者仍給俸料羣臣上夀大明殿上以親政踰月特與天下更始非故事也丁巳以樞密直學士左正諫大夫賈琰為三司副使三司置副使自琰始戊午契丹使鞍轡庫使蕭巴固濟來修賻禮上命引進副使田守竒勞于城外加賜以遣之先是川峽分路置轉運使峽鹽悉趍荆南西川民乏食太祖遣使劾兩路轉運使罪及上即位皆釋之於是命西川轉運使申文緯遙兼峽路轉運副使韓可玭兼西川路使鹽策流通也文緯見建隆三年恐非此可玭未見己未幸講武池遂幸玉津園祕書丞安璘杖脊除籍為民坐知道州日受賕枉法故也是嵗髙麗國人金行成始入學於國子監
