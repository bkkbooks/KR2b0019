  - {type: page-break, offset: 0, content: '', id: KR2b0019_WYG_326-1a, image: WYG0319/WYG0319-0449a.png}
body:
  text: 續資治通鑑長編巻三百二十二宋李燾撰神宗元豐五年春正月癸未朔不受朝戊子環慶路經畧司言涇原路第八將隊將李貴扇揺兵衆逃歸乞特行遣以懲後詔盧秉昨行營軍還逃歸之人情理巨蠧無若貴者及今根治不致已經釋罪之人驚疑即具案以聞秉言貴情非巨蠧昨以出界兵將上下失律臣即權宜傳放罪指揮兼已奏得朝㫖若更追劾恐致驚疑詔釋其罪朱本刪去乞特行遣以懲後一句今從新本仍存之京西路轉運判官唐義問言比聞多有陜西軍前亡卒首身乞降指揮招諭令隨所在自陳給券送歸所屬詔已降指揮令開封府界京東京西路軍前士卒因寒凍闕食逃歸者依陜西河東首限施行鄜延路經畧司乞以新收復米脂吳堡義合細浮圖塞門五寨地土招置漢蕃弓箭手及春耕種其約束補職並用舊條從之詔下吳堡義合等寨具去年十二月六日戊午沈括又言新收五寨雖各據地利險阻然守具未全糧儲露積人兵無所存庇欲於側近那廂軍三二千應副工作及指揮轉運司糧儲但輸安塞堡候城寨可守則移運從之詔陜西諸路士卒軍前所犯並與放罪官司毋得詰問己丑詔判都水監李立之凢為小吳决口所立隄防可案視河勢向背應置埽處并都大巡河使臣窠名無致虛設官司横潰兵夫物料庚寅翰林侍讀學士知審官東院錢藻卒上遣使視其家甚貧賜錢五十萬辛卯命翰林學士李清臣權知貢舉知制誥舒亶侍御史知雜事滿中行權同知貢舉判司農寺天章閣待制王居卿知太原府代王克臣也先是五路出師討夏賊無功王中正言經畧司姑息亡卒實誘之使無固志乃召克臣知東審官院改命居卿克臣知審官乃甲午日今并書詔自今皇太后行幸百司儀衞宜依太皇太后萬歲日施行是日濟陽郡王曹佾告謝命坐對之涕泣撫諭良久詔王中正以自京及沿路選募軍馬悉付都總管司發來赴闕官屬除見充將副及合留充部隊將外有差遣歸本任餘並令隨赴闕録左侍禁羅遘子昌嗣為奉職弟遜為借職攻米脂城中箭死也特封韓國大長公主女錢氏為宜春郡主甲午詔自今毋以大理寺官為試院官上批代州諸寨踏成蹊徑二十有七處及瓶形寨地圖令河東經畧司指揮代州并凖備提舉管勾開壕立堠官候北界來計㑹即自團山子鋪以西分水嶺脊依畫圖商量取直開立壕堠其向西踏成蹊徑處同行修治俱令依舊不得展縮四年八月七日又十一月五日此月二十五日又一月六日措置麟府路軍馬司言自今逃走兵員乞許人告捕或斬級支賞不立首限從之詔陜西河東縁邊事差辟官舊任處年滿替人未至並歸本路如替人已至除知州軍縣並額外權置候年滿日罷如不願補塡許所屬依減罷人例承差遣其知州軍縣人準此安化軍留後魯國公贈鎭海軍節度使北海郡王宗肅卒己亥大宗正司言宗室以髙年抱疾恩許私家乘垂簾肩輿出入聞擁從猥多驕不可長欲乞許乘肩輿者量出踏引籠燭照夜毋得過兩對如有違犯從本司察舉從之開封府界提㸃司言詔發十將赴熙河路費錢九萬七千餘緡乞權借咸平等縣封樁錢從之詔陜西集教場出等義勇保甲昨案閲官誤以馬歩射弓相湏拍試其一藝應格者不得解發可再檢視元試弓弩一事應格即解赴闕詔開封府界提㸃司聞知管城縣陸宣職事不修體量事實以聞提㸃司初不按舉承詔即言宣闇慢迂疎事多逋滯糾擿稽違數條以應詔上批陸宣先衝替仍劾罪朱本云初帝下提㸃司令案陸宣而提㸃司案故衝替仍劾其罪前史官妄以為不案但應詔而已皆渉詆誣刪去今從新本太學言生員萬臯等五人曾經屏斥未嘗叙雪而改名補試入學詔並斥出學實殿一舉今後妄冒入學者徒一年白虹貫日兩紀並係己亥日庚子河北都轉運使寋周輔乞應結糴封樁穀所收息錢並令措置糴便司收從之大宗正司請外任宗室毋得造酒許於舊宫院尊長及近親處寄醖從之詔彊盜保甲教閲軍器者處死情輕奏裁竊盗箭二十隻徒一年弓徒二年弩流三千里徒罪配五百里流罪配千里獲竊盗保甲教閲軍器一人比二人推賞詔差諸班直百一十六人分與熈河環慶涇原路押隊詔諸路戍兵逾期久未更代慮人情思歸守戍之人展一年為替限權發遣涇原路轉運副使葉康直奏臣伏思兵勢貴聚而惡分莫若諸路並進相為犄角則賊兵易以殄滅等事權發遣環慶路轉運判官事李察奏攻取之計若先得横山則山川險阻人馬族帳已失其所恃靈州雖存其實孤壘指日可下等事並詔留竢此密記十八日事今附見辛丑降授西上閤門使知坊州髙遵裕責授郢州團練副使員外本州安置初詔曾布根究遵裕將下損折亡失命官吏卒鞍馬器甲及斬戮命官使臣未報而遵裕用軍失律多戮無辜事狀已明故有是命遵裕自讁籍上書言臣熙寧初獲對便殿嘗進横山之議不幸种諤暴舉遂誤事機繼而王韶建議青唐久為秦亭之患毎至防秋結連諸虜有窺蜀之心而轄氏鼎分有可乘之勢臣適當秦鳳兵行戍守古渭特䝉驅䇿與王韶上憑聖算易武勝為鎭洮即領軍事既開河西又總兵制及景思立全軍覆沒臣在岷州新城有必陷之形帥府有不救之議而臣奮張死力粗振軍律復䝉㧞置禁衞領帥熙河以臣不才數干吏議廢而復起常恐孤奉國恩今者以環慶之節將陛下天討之威以兩路軍馬破覆巢穴正在此舉而臣稽留天誅不副神武之畧罪當萬死然覆轍可以為後舉之戒臣得昩死言之昨至慶州精卒壯馬悉為林廣選去本路九將之兵老弱相半又所得開封府界及京東西十一將逼期至軍困於道塗人氣未復一不勝也羣牧司所給新馬百匹中可戰者不過二三二不勝也大軍啓行器械未備師次授兵不暇簡閲甲胄重大弓弩堅强中下之軍皆不為用三不勝也李察計運寡謀多用驢畜前則窒軍行後則費營䕶四不勝也五路並入本出聖謨獨臣以環慶涇原之師直抵靈武而諸路之兵中路不進五不勝也又議者罪臣不能破賊外援力下東關盖東關賊之餌兵軍法勿食劉昌祚禆將也利在一戰臣主帥也務全三軍蓋靈州至東關四十里仍阻七級渠主客異勢難保萬全昌祚亦知利害如此今日特以偏詞藉口自計保全又李察以夫驢運糧而安行中軍未嘗親臨大寨夫衆都無部勒棄抛糧草望風遁歸因乘西賊奔衝並指為鈔畧之數初抵瀚海賊馬坌至李察臨敵畏怯因失包指自言喪手及不知所乘馬之存亡突入中軍問漢兵敗未皆傳以為笑竊恐昌祚察軰偶以今日避禍得效不改故態他日上誤國事故一為陛下言之遵裕所言西師不勝之形頗得事實然方師行時遵裕豈不知而不先事極言儌倖一勝如忌昌祚成功不許其擊東關保聚致失因糧之利而滋賊勢則皆遵裕之罪然能聽裨將种診計冒法回軍粗保其衆有可稱者朱本云遵裕敗事被謫言多不實兼無施行合刪今依新本仍存之遵裕本傳云久之許從便居不知許從便居果在何時八年五月八日復官邵伯温云云可考新舊紀並書高遵裕伐夏人失律擅殺無罪貶郢州團練副使癸卯詔河北路保甲司團結不及兩大保即分附鄰近團教其山河隔絶去教處逺或每及兩大保以上許别置一團教場如隔河歴亭縣人户即附武城縣團教陜西河東準此鄜延路轉運司言昨大軍出界差廂軍二百人驢六十頭赴京東第三將軍回止餘廂兵六人詔劾將副石舜臣宿夀以聞詔縁軍興差借户馬並給還死者依羣牧司賣馬上價給錢詔沈括立功士卒依格不待朝命推賞者其亟施行訖奏所加賜絹仍湏親視恐有雜惡及主者受賕蓋本路用兵以來累經推賞人情久則生怠其下常得以伺隙作姦方今正宜督察不可怠於事始也又本路見守吳堡米脂義合細浮圖寨並據横山地分聞山界部落家屬賊已放歸宜廣招納而未見措置次第卿可急經制也雄州言準涿州牒奉留守指揮準樞密院劄子以夏國遣使入朝稱為南朝無名起兵討伐不知事端指揮燕京留守司委涿州移牒雄州聞逹南朝㑹問上批夏國主秉常見受本朝封爵昨以並邊部落來告秉常見為母黨囚辱比令邊吏移問爭端其同惡首領專輒不報繼又引兵數萬侵犯邊畧義當往征今彼以屢遭敗衂故遣使詭情陳露意在間惑想彼必已悉察令雄州具此移牒涿州虜人得此移遂不至賜河北都轉運使集賢殿修撰蹇周輔轉運判官朝奉郎李南公銀絹二十五匹兩仍降勅書奬諭以提舉移建人使驛亭道路於人使未過界前畢備故也甲辰詔三路集教大保長除教騎人兼習馬槍外其教歩弓弩兼習歩槍其團教保丁依元降二分指揮教騎兼習馬槍四分教弓四分教弩如不堪教弩者即依開封府界勅教槍雖多不得過二分詔就差諸路使臣剗刷軍器京東路馮彝京西路謝禋荆湖路甘承立兩浙福建路鄭居簡淮南江南路胡忠順詔除故柴宗慶等八十六員負進奉馬價錢萬緡侍御史知雜事滿中行言元豐四年下半年終御史分察案合取㫖更易詔宇文昌齡領吏工案王祖道兵刑案豐稷户禮案降充永興軍路鈐轄劉昌祚姚麟並改充涇原路鈐轄去年十二月十五日昌祚以涇原總管麟以副總管並降充永興軍路鈐轄今還為本路鈐轄乙巳福建路轉運使賈青言准朝㫖相度年額外増造龍鳳茶今度地力可以增造五七百斤仍乞如民間簡牙别造三二十斤入進詔增額外五百斤龍鳳各半别計綱進又言所乞造簡牙茶别製小龍團斤為四十餅不入龍腦從之詔彭孫追供奉官趙福劾其怯懦走回之罪斬訖奏福初隨涇原兵進討𨽻孫將下至靈州糧道斷絶中路逢賊躡戰大軍夜相失皆潰走盧秉奏已得㫖放罪而福在秉幕下任事見孫不為禮孫因以惡語奏福在軍中不殺賊故也彭孫起於㓂盗數年擢任將領以母老乞封一郡又乞弟鐸備荆南一將以奉親子傑擅以私書發馬遞孫自言願以功除過領士馬出界所亡十之八自上不及半在邊郡賣從軍在蜀時物又自言以犒軍恐為當職者所言上皆曲從其欲有罪貸不問冀得其死力故也朱本削去彭孫起於冦盗之下以為並前史官語今依新本復存之熙河都大經制司言奉朝㫖根治報甘谷城事不同情理勘㑹縁邊城寨探報前此亦多異同當在帥司審度虚實應接今止是甘谷城報事蕃部誤指地名即無情理若根治恐自今刺事人疑慮或失事機乞更不問又言近差康識行定西城一帯自通逺軍榆木坌接蘭州界通過四堡皆為控扼當先興功乞下經制邊防財用司應副並從之二事朱本削去今從新本翰林學士王安禮言詳定渾儀官歐陽發言至道皇祐之器皆差而無據今造渾儀浮漏木様準詔進呈及歐陽發具新器之變舊器之失臣等看詳除司天監浮漏踈謬不可用乞依新様改造外至道皇祐之器及景表各有差繆欲依歐陽發條奏施行從之兩紀並書作新渾儀浮漏提舉河北東西路保甲司言奉議郎簽書恩州觀察判官公事張損措置編排保甲場地率先辦集詔賜損緋章服令本司責以盡心職事任滿保明别與差使丙午奉議郎黄降為監察御史裏行領察案代王祖道為言事官先是御史臺兵察案察吕惠卿前知延州違法遣禁軍齎毛段遺徐禧詔送大理寺惠卿時居母喪即具奏御史按劾不當又事在赦前御史意欲中傷大理亦有妨礙仍自列治邊勞効詔送本察及大理看詳於是御史大理各條上惠卿違法情狀詔惠卿特免勘餘令大理寺依前降指揮施行御史宇文昌齡言惠卿欺罔乞以所奏付有司考騐其罪明正典刑不報實録但云御史臺大理寺條上前知延州吕惠卿違法遣禁軍齎毛叚送徐禧詔惠卿免劾今據宇文昌齡集增修承議郎集賢校理蔡承禧權發遣淮南路轉運副使承禧先為開封府推官因進對上面諭以向覽卿臺章甚合理道凡有所聞見宜密具章䟽不可以不在其位而遂緘黙也承禧因復上數十事多指摘時病留中不出議者謂必復言職既而有此命此據蘇頌所作承禧墓銘承禧與蔡延慶爭李憲公事延慶罷開封事在元豐二年八月七日時承禧已為開封推官奏延慶不合避免狀稱六月三日對垂拱殿面奉聖㫖令密進章疏然則密進章疏乃二年夏末事也吕惠卿家傳云承禧除淮南運副蓋執政欲令承禧伺惠卿過失惠卿時居喪揚州即求避焉今附此元豐二年二月十七日承禧自府界改府推三年六月十七日遷府判四年三月六日兼帳司勾院磨勘司五年正月二十四日出使七年十二月十二日卒詔開封府界諸路封樁禁軍闕額錢除三路外及淮浙江湖等路增剩鹽錢江西賣廣東鹽福建路賣鹽息錢並輸措置河北糴便司先借支内藏庫錢三十萬緡與河北糴便司以福建路鹽息還詔在先朝時女眞常至登州賣馬後聞女眞馬行道徑已屬髙麗隔絶歲久不至今朝廷與髙麗遣使往還可降詔國王諭㫖女眞如願以馬與中國為市宜許假道後女眞卒不至女眞卒不至據汪藻金盟本末增入丁未代州言據瓶形寨申有北人欲於瓶形寨地壕堠盡處取直向東徃團山子過徃當令監押吉先説諭令回上批已嘗圖付代州候北人來立壕堠准此施行即是聽其過徃今却約攔乃是全不曉事曲煩朝廷行遣啓侮敵國宜令分析聽北人取直過徃四年八月七日又十一月五日此月十二日又二十五日又二月六日太常寺言開封人葉防言太常寺大樂鼓吹兩局樂舞節奏不應古法送前同議樂楊傑看詳傑言防所言二事可行其言金奏不用晉鼓節金奏於經有據又言簨簴之制不合經禮乞因大禮雅飾更詳考改正從之以葉防為樂正按宋史載樂志楊傑論葉防所言以為非是且云其説難行與此互異戊申詔文武散階除化外人依舊除授外餘並罷三年九月十七日丙子已并書此合重出之客省副使知誠州謝麟言本州旁近户口或逺𨽻它州見有封疆不足城守乞增割户口山川并降屬縣名額詔沅州新修貫保托口小由豐山堡寨係控扼蠻蜑形勢之地宜以瀕渠河貫保寨為治所合置渠陽縣𨽻誠州仍以麟知沅州管勾沅州緣邊安撫公事又以西京左藏庫副使閤門通事舍人周士隆知誠州置兵馬監押職官司户參軍各一員並令謝麟舉官一次誠州官任滿依沅州酬奬己酉以四方館使熙河路總管李浩為熙河蘭㑹路安撫副使副總管兼知蘭州辛亥知渭州朝請郎集賢殿修撰盧秉為朝奉大夫知潤州御史王祖道言秉近乞浙西一郡已除知潤州議者以秉班在常參朝廷擢委邊寄王師西討秉當一路之衝大兵啓行秉不能綏靖張皇役民晝夜城守道路傳以為笑秉之措置無狀衆所共知而秉方乞便郡廼更進秩應罰而遷何以懲勸不聽龍神衞四廂都指揮使鳳州團練使鄜延路經畧安撫副使种諤知渭州宣慶使宣州觀察使入内副都知都大專切經制熙河路邊防財利事李憲為涇原路經畧安撫制置使四方館使知蘭州兼熙河蘭㑹路經畧安撫副使李浩兼權涇原路經畧安撫副使諤浩於制置司並用階級法進士鍾𫝊為蘭州軍事推官涇原路安撫制置司管勾機宜文字以李憲奏充効用又言其從軍有功故擢之𫝊樂平人也上批涇原路轉運副使葉康直權管勾環慶路轉運判官公事李稷已令再上殿奏事候上殿畢限三日兼程赴任計㑹李承之幹辦軍湏尋又促康直先發此據御集乃二十九日事今附見促康直先發事在二月五日今并書張舜民作葉康直神道碑云五年夏再議靈州之舉欲自鎭戎軍熙寜寨築堡大小十五以傅靈武康直方計事在京神宗召康直面問所以康直力言其不可大體以公私財力困匱士氣疲敝之意且如十五堡大小相補毎一堡計工十五萬是為工二百二十五萬食不在焉即於扆前自運籌策上為俛然久之若曰卿且與中書密院商量時宰主再舉之議見康直不說變色乃曰人皆謂可為而君獨以謂不可何也康直徐曰言可為者茍且面諛之人也異日舉事不卒將追罪面諛之人乎為復諸公身當其敝凢事貴制於未然毋使後悔也是時已遣李憲等之涇原開制置經畧使幕府調淮南京西役兵抵關中勢將必為即放朝辭遣歸本路既歸又率同事上言乞罷進築之舉有吳道純者本司勾當公事適在行熟見康直對上本末道純本利門子天資更險即迎為之說曰葉某所以湏索浩瀚者重難其事爾上即遣道純馳驛之涇原俾與公辯是非尋察知道純之為人亟止之涇原進築亦罷按密院時政記二月二日涇原轉運副使葉康直奏竊以大軍再行攻討修築城寨糧草材植最為大計欲乞早下諸路多刷廂軍前來等事詔令制置司相度那融差撥按此則康直亦奉行進築指揮矣舜民云云當考都提舉市易司賈青言市易既革去結保賖請之弊專以平凖物價及金銀之類抵當誠為良法乞推抵當法行之畿縣從之詔今再議西討种諤暫輟赴涇原其新復城寨招降人口委沈括完葺照管若有疎虞當行軍法權發遣熙河路經畧安撫都總管司公事苗授言臣統領見在行營將佐等直趨靈州應援環慶涇原軍馬近凖樞密院降到臣與李憲等奏議内樂士宣稱親見苗授奉宣聖㫖據苗授稱人馬疲羸已分逐將歇泊看詳苗授未有行日竊念臣孤逺不才誤䝉朝廷奬擢昨以師行日久士卒疲羸不堪逺役兼兩路軍馬已還境上臣雖即時統率應援實動衆而無功遂具利害奏陳士宣軍中巨細無不詳知及朝廷再調軍馬更不䘏軍事成敗惟是倚詔作威望風㫖以固寵不能以實上聞乃欲陷臣必死上賴天聽特寛誅戮竊恐緩急臨機沮壞如此不惟動揺人情必害大計臣職領方面所繫安危乞許㢠廻避移臣别路上批軍中事樂士宣自當聞奏令苖授安心供職沈括等言所奏舉文武官應有違礙並乞追差諸處不得占留上批本路使臣直追取仍以聞其餘並禀朝㫖詔三師三公宰相執政官開府儀同三司節度使嘗任宰相者觀文殿大學士已上金毬文方團帯佩魚觀文殿學士至寶文閣直學士節度使御史大夫中丞六曹尚書侍郎散騎常侍御仙花帯内御史大夫六曹尚書翰林學士以上及資政殿學士特班翰林學士上者仍佩魚此年四月二十七日元祐五年十一月十二日紹聖元年十一月十二日崇寜二年七月二十五日四年二月十三日大觀二年五月十七日當并考李徳芻欷歔子云太宗製毬文笏頭方圓帯以魚袋賜文臣執政官罷免常服之祥符中趙安仁罷參政為散丞郎後除景靈宫使眞宗命廷賜御仙花帯自後二府罷者學士散官通服此帯景祐中詔金帯曾經賜者許繫之宰相罷免並依舊服笏帯李廸自秘書監來朝除刑部侍郎服之仁宗朝嘗以賜張耆李用和王貽永曹佾神宗朝宗室儀同三司皆賜王拱辰自宣徽使除西太一宫使辭日特賜之熙寜中馮京吕惠卿罷政皆服黒帶佩魚元豐中元絳罷政神宗面命取荔枝帶賜服之章惇罷參政蒲宗孟罷左丞即服黒帶故事入兩府自黒帶卿賜金笏帶太宗朝例甚多祥符中張知白自待制為中丞而參政事天聖中姜遵自三司副使為諫議大夫副樞密元豐中蔡確自御史中丞直學士院為諌議大夫叅政事即皆賜之景祐中李諮為知制誥衣緋出守荆南召為學士閤門用例賜金帶而不可加於緋衣乃并賜三品服慶厯中張友直為待制衣緋仁宗因宴坐見之命賜紫元豐中蔡京王震為中書舍人尚衣綠謝日皆賜緋震遷給事中例賜金帶始併賜三品服故事直學士以上賜金御仙花帶結銜皆云賜紫金魚帶而惟奉使館接伴始佩魚御仙之制乆廢而皆作荔枝帶元豐中新官制始議學士侍郎以上服金帶尚書大資政翰林學士佩魚給事諌議舍人中丞非自學士除者服紅鞓犀帶佩魚時舒亶為給事中交結張誠一忽中㫖易給事中丞服金帶而廢紅犀之儀元祐中復罷給事金帶而不敢削中丞者故事特從官有服緋緑者中謝日多引賜服色近時並三省除日擬定降誥即賜是人主特恩移於執政矣内臣舊有管勾天章閣之類政和中擇三十人用事者改稱直睿思殿宣和殿及祗應人御佩魚按徳芻所云多不實具注此當考綱要是月詔淮西路始𣙜鹽
