body:
  text: 續資治通鑑長編卷一百十八宋李燾撰仁宗景祐三年春正月丙戌詔刑部自今臣僚雪罪經它司覆視而不當者其元奏斷及檢書官毋得以赦原戊子命知樞密院事李咨參知政事蔡齊三司使程琳御史中丞杜衍知制誥丁度同議茶法咨以前坐變法得罪固辭不許時三司吏孫居中等言自天聖三年變法而河北入中虗估之弊復類乾興以前蠧耗縣官請復行見錢法度支副使楊楷亦陳三説法十二害見錢法十二利以謂止用三説所支一分緡錢足以贍一嵗邊計故命咨等更議仍令召商人至三司訪以利害楊偕以此月壬寅始自度支副使除河北都漕今未也本志即稱都漕蓋誤矣翰林學士承旨章得象等上所定王公國名請自今封建王公自小國升次國次國升大國其宋趙梁壽如舊制不以封從之辛卯降前知大名府龍圖閣直學士給事中狄棐知隨州鈐轄六宅使朱允中為齊州都監通判都官員外郎張周物比部員外郎宋純並與監當先是南郊給賞庫帛不善驍武卒李玉等十人輒譁譟詣宋純求換易既不得乃以瓦甓投廨舍中棐不時治事聞命侍御史劉夔按視未及境衆不自安棐馳騎白夔請紿以行他事夔至與都轉運使李紘誅其首惡棐坐罷懦與允中等皆坐責西天僧善成等九人貢梵經佛骨及銅牙菩薩像崇政殿説書賈昌朝請加賜束帛遣還無以所獻示外從之壬辰追册故金庭教主沖靜元師郭氏為皇后命知制誥丁度內侍押班藍元用同護葬事尋詔中書門下停其諡册祔廟丁酉葬於奉先資福院側鹵簿儀物並用孝章皇后故事時上元節有司張燈俟乘輿出右正言王堯臣言后復位號今方在殯不當遊幸同知禮院王拱辰亦以為言帝為罷葬日張燈録屯田員外郎李宏子允為郊社齋郎三司舉宏監在京𣙜貨務未赴而卒三司使程琳言其家素清貧而長子因宏病割股中風卒特恤之乙巳賈昌朝言臣幸得侍經禁中陛下每以清燕之間嚮學稽古微言善道取髙前聖事在雙日杳隔嚴宸時政記史館日厯及起居注莫得纂述臣自景祐元年春迄二年冬凡書筵侍臣出處升絀封章進對燕會賜與皆用存記列為二卷乞送史館詔以邇英延羲二閣記注為名命章得象等接續修纂丙午四方館使榮州刺史夏元亨言閣門儀制自大中祥符中陳彭年詳定後續降詔敕或有重復請復編次之命學士承旨章得象知制誥李淑同詳定康定元年四月修成閣門儀制十二卷客省條例七卷四方館條例一卷戊申置荆王府翊善一員己酉許洪州密州立學仍各賜田五頃紏察刑獄胥偃言權知開封府范仲淹判異阿朱刑名不當乞下法寺詳定詔仲淹自今似此情輕者毋得改斷並奏裁初偃愛歐陽修有文名置門下妻以女及偃數紏仲淹立異不循法修方善仲淹因與偃有隙偃紏仲淹史不得其時會要在此月十三日今附見史稱數紏此但其一爾二月庚戌朔詔宗室諸衛大將軍領刺史者其妻遇南郊許奏親兄弟及兄弟之子與茶酒班殿侍未領刺史者止許奏兄弟與下班殿侍復置杭秀二州鹽場壬子贈許國鄭國曹國長公主並為大長公主甲寅置代州五臺山勾當寺務司及真容院兼興善鎮煙火巡檢事京朝官使臣各一員詔廣桂荆潭鼎澧六州各增置雄略一指揮與歸逺軍更戌廣南州軍先是上以三司胥史猥多或老疾不知書計詔御史中丞杜衍入內押班岑守素與本司差擇之事在去年九月己酉今并此已而三司後行朱正周貴李逄吉等數百人輒相率詣宰相吕夷簡第喧訴夷簡拒不見又詣王曾第曾以美言諭之因使列狀自陳既又詣衍第投瓦礫且言因衍上言致朝廷議欲揀汰又各持料錢歷欲自毁裂肆醜言乃去眀日衍對請下有司推究而曽具得其姓名乙卯正貴杖脊配沙門島逄吉等二十二人決配逺惡州軍牢城其為從者皆勒停連去年九月及今年三月事并書詔三司御史臺開封府舊制不得接見賔客其申眀之丙辰詔翰林學士馮元禮賔副使鄧保信與鎮江節度推官阮逸湖州鄉貢進士胡瑗較定舊鐘律瑗海陵人以經術教授吳中范仲淹前知蘇州薦瑗知音白衣召對崇政殿與逸俱命又命章得象等重定刻漏水稱既而得象等言水行有遲速請增置平水壺一渴烏二晝夜箭二十一從之太常少卿直昭文館開封扈稱言京師天下之本而士民僣侈無法室居服玩競為華靡珠璣金翠照耀路衢一襲衣其直不翅千萬請條約之壬戌詔兩制與禮院同詳定制度以聞以校勘史記漢書官祕書丞余靖為集賢校理大理評事國子監直講王洙為史館檢討賜詳定官翰林學士張觀知制誥李淑宋郊器幣有差省安肅縣主簿令尉兼之甲子命崇政殿説書賈昌朝王宗道同編次太宗尹京日押字時范仲淹權知開封府上太宗所判案牘故令昌朝等編次四年十一月昌朝編次成書凡七百一十卷詔廣南地多瘴霧之毒凡軍民有疾者給官錢市藥療治之陜西都轉運使王沿言白渠自漢溉田四萬頃唐永徽中亦溉田萬頃今裁及三千餘頃蓋官司因循寖致堙廢請調兵夫修復之丙寅詔從沿請戊辰審官院言見在院待缺官凡九十二人員多缺少欲並以到任一年半使缺候見任官滿三十月許赴任交替從之壬申廣西轉運司言雍州甲洞蠻掠思陵州慿詳洞生口及殺登琬鎮將已會兵追擊之交址附傳云三年其甲洞及掠州門州蘇茂州廣源州大發洞丹波縣蠻寇雍州之思陵州西平州石西州及諸洞掠居人馬牛焚室廬而去下詔責問之且令捕酋首正其罪以聞正傳同此今但從實録癸酉免八品以下官物故者子孫色役丙子泰州司馬林獻可授漳州參軍給料錢五千本州常切羇管勿放出城獻可坐擅離本州進機密文字合從違制失杖一百私罪特有是命此據會要三月丙戌三司揀試所上所定諸案吏功過詔能知錢穀利害者以次遷補之再犯贓者並勒停庚寅太子中舍陸東滁州安置初東擅離貶所援赦乞敘用已詔復舊官而為知雜御史司馬池劾奏仍命安置焉壬辰以龍圖閣直學士知秦州張宗象兼管勾秦隴鳯階成州鳯翔府路駐泊軍馬秦隴鳯階成州鳯翔府自為一路由此始癸巳許潞州常州立學乙未御崇政殿召輔臣觀所定鐘律丙申詔比訪天下善候氣及曉鐘律之人未有應書者其令所在更博求之翰林侍講學士馮元等上秬黍新尺别為鐘磬各一架戊戌詔致仕官舊皆給半俸而仕嘗顯者或貧不能自給非所以遇髙年養亷恥也自今大兩省大卿監正刺史閣門使以上致仕給俸如分司官長吏嵗時以朕意勞賜之御史中丞杜衍罷為工部侍郎樞密直學士知永興軍翰林學士張觀權御史中丞改維州為威州以與濰州文移相亂也甲辰濬河北城濠禁植蒲蓮犯者計所入以贓論丙午度支副使郭勸四方館使夏元亨同點檢修橫壠掃所儲錢糧芻藁及行視王楚掃所開減水河利害以聞詔三司使至天章閣待制舉三班使臣殿直以上曾歷邊任有武勇智略者各一人又詔臣僚應敕葬而其家不願者聽之又詔開封府曹官有缺令銓司依條揀選不許陳乞及本府奏舉審官院言諸路提點刑獄得替磨勘緣前來並差官置司詔只令審官院例磨勘權判戶部勾院葉清臣請弛茶禁以嵗所課均賦城郭鄉村人户其疏曰山澤有産天資惠民兵食不充財臣兼利草芽木葉私不得專封園置吏隨處立管一切官禁人犯則刑既奪其資又加之罪黥流日報踰冒不悛誠有厚利無資能濟國用聖仁恤隱矜赦無辜猶將弛禁緩刑為民除害度支費用甚大榷易所收甚薄刳剝園户資奉商人使朝廷有聚斂之名官曹滋虐濫之罰虛張名數刻蠧黎元建國以來法弊輒改載詳改法之由非有為國之實皆商人協計倒持利權幸在更張倍求竒羡富人豪族坐以賈贏薄販下估日皆朘削官私之際俱非逺䇿臣竊嘗校計茶利嵗入以景祐元年為率除本錢外實收息錢五十九萬餘緡又天下所售食茶并本息嵗課亦祗及三十四萬緡而茶商見通行六十五州軍所收稅錢已及五十七萬緡若令天下通商祗收稅錢自及倍數即榷務山場及食茶之利盡可籠取又况不費度支之本不置榷易之官不興輦運之勞不濫徒黥之辟臣意生民之弊有時而窮盛德之事俟聖不惑議者謂榷賣有定率征稅無規準通商之後必虧嵗計臣案管氏鹽鐡法計口受賦茶為人用與鹽鐡均必令天下通行以口定賦民獲善利又去嚴刑口出數錢人不厭取景祐元年天下户千二十九萬六千五百六十五丁二千六百二十萬五千四百四十一三分其一為産茶州軍內郭鄉又居五分之一丁賦錢三十村鄉丁賦二十不産茶州軍郭鄉村鄉如前計之又第損十錢嵗計已及緡錢四十餘萬榷茶之利凡止五十餘萬緡通商收稅且以三倍舊稅為率可得一百七十餘萬緡更加口賦之入乃有二百一十餘萬緡或更於收稅則例微加增益即所增至鮮所聚愈厚比於官自榷易驅民就刑利病相須炳然可察詔三司與詳定所相度以聞皆以為不可行及嘉祐四年卒行之清臣又嘗請遣使循行天下知民疾苦察吏能否興太學選置博士許公卿大臣子弟補學生重縣令諸科舉人取眀大義責以䇿問省流外官無得入仕聽武臣終三年之喪罷度生僧廢讀經一業訓兵練將謹出令簡條約凡九事是月李咨等請罷河北入中虛估以實錢償芻粟實錢售茶皆如天聖元年之制又以北商持劵至京師舊必得交引鋪為之保任并得三司符驗然後給錢以是京師坐賈率多邀求三司吏稽留為姦乃悉罷之命商持劵徑趣榷貨務驗實立償之錢初奭等雖增商人入錢之數而猶以為利薄故競市虛估之劵以射厚利而入錢者寡縣官日以侵削京師少畜藏至是咨等又請視天聖三年入錢數第損一千有竒入中增直亦視天聖元年數第加三百詔皆可之又詔前已用虛估給劵者給茶如舊仍給景祐二年已前茶既而咨等又言天聖四年嘗許陜西入中願得茶者每錢十萬在所給劵徑趣東南受茶十一萬一千茶商利之爭欲售陜西劵故不復入錢京師請禁止并言商人輸錢五分餘為置籍召保期年半悉償失期者倍其數事皆施行輸五分錢召保立限見實録康定元年正月今依本志附此咨等復言奭等變法嵗損財利不可勝計且以天聖元年至景祐二年較之五年之間河北緣邊十六州軍入中虛實費緡錢五百六十八萬今一旦復用舊法恐豪商不便依託權貴以動朝廷請先期申諭於是帝為下詔戒敕而縣官濫費自此少矣三月癸巳復行見錢法罷交引壬申榷務給交引以景祐二年茶五月勒陜西入中交引並赴京師十二月禁豪商請託今並從本志聫書之詔權停貢舉夏四月辛亥詔廣州海南畨商毋得多市田宅與華人雜處癸丑詔諸路同提點刑獄武臣與所部州軍長吏各以官髙下除之乙卯詔命官因罪輒逃去者自今毋得以赦原仍永不録用丙辰閣門奏宗室自大將軍至率府副率預朝參者百四十餘人乾元節錫慶院宴席不能容請大將軍領刺史以上者乃得預坐從之已未契丹遣鎮國節度使耶律信政事舍人吕士宗來賀乾元節辛酉置乾寧軍釣臺寨主一員辛未詔翰林醫官自今非遷盡同正官毋得遷尚藥奉御及直院乙亥詔知真楚泗州者自今並兼管勾催遣綱運事許衡州立學丙子荆湖北路鈐轄司言澧州蠻五百餘人寇邊而知州禮賔副使崔承祐畏避不以聞詔劾承祐罷之五月戊寅朔范仲淹言臣近親奉德音以孔道輔曾言遷都西洛臣謂未可也國家太平豈可有遷都之議但西洛帝王之宅負關河之固邊方不寧則可退守然彼空虛已久絶無儲積急難之時將何以備冝託名將有朝陵之行漸營廪食陜西有餘可運而下東路有餘可運而上數年之間庶幾有備太平則居東京通濟之地以便天下急難則居西洛險固之宅以守中原易曰天險不可升地險山川邱陵王公設險以守其國此之謂也先王修德以服逺人然安不忘危故不敢去兵陛下內惟修德使天下不聞其過外亦設險使四夷不敢生心此長世之道也伏望聖慈未煩下議且留聖意可矣據仲淹乞修京城劄子云景祐三年五月初請修西京今附見朔日孔道輔去年八月以龍直知楚州庚辰購求館閣逸書丙戌天章閣待制權知開封府范仲淹落職知饒州仲淹言事無所避大臣權幸多忌惡之時吕夷簡執政進者往往出其門仲淹言官人之法人主當知其遲速升降之序其進退近臣不宜全委宰相又上百官圖指其次第曰如此為序遷如此為不次如此則公如此則私不可不察也夷簡滋不恱帝嘗以遷都事訪諸夷簡夷簡曰仲淹迂闊務名無實仲淹聞之為四論以獻一曰帝王好尚二曰選賢任能三曰近名四曰推委大抵譏指時政又言漢成帝信張禹不疑舅家故終有王莽之亂臣恐今日朝廷亦有張禹壞陛下家法以大為小以易為難以未成為已成以急務為間務者不可不早辨也夷簡大怒以仲淹語辨於帝前且訴仲淹越職言事薦引朋黨離間君臣仲淹亦交章對訴辭愈切由是降黜侍御史韓瀆希夷簡意請以仲淹朋黨榜朝堂戒百官越職言事從之時治朋黨方急士大夫畏宰相少肯送仲淹者天章閣待制李紘集賢校理王質皆載酒往餞質又獨留語數夕或以誚質質曰希文賢者得為朋黨幸矣質嘗知蔡州州人嵗時祠吳元濟廟質曰安有逆醜而廟食於民者毁之為更立狄仁傑李訴像而祠之蔡人至今號雙廟李紘送仲淹附傳有之新傳削去今追載丁亥司天監主簿王升言太嵗及嵗星並在北方請飭邊備又言本監嵗上細行厯不載日月交蝕請自今先行測定以朱書之庶預祗天戒從之戊子同知樞密院事韓億言昨蒙宣諭范仲淹嘗密薦臣臣自歷周行惟厲忠朴宸聰過聽擢贊樞密未嘗涉朋比之迹結左右之容况臣與仲淹既匪姻親又非故舊緣何契義輒有薦論若仲淹舉臣以公則臣素無交託伏望曲照孤𠂻免攖浮議必若以臣備位無補即進退之際惟陛下裁賜優詔答之許許州立學審刑院詳議官殿中丞王果言河北地勢庳下積沙為岸若導河東流恐不能禦湍悍之患欲望博詢羣議罷塞橫壠詔郭勸夏元亨同按視以聞果饒陽人也去年八月戊辰稽古録已載權罷塞橫壠今王果乃上言稽古録蓋誤也趙州言管內佛寺嵗係帳童行千有餘人檢會皆等第稅户茍避州縣之役已令逐寺各量留一二人外其不應條者並勒歸農請自今出家童行須度為僧方聽免身役從之辛卯以儀鸞使雅州刺史內侍副都知王守忠為澶州修河鈐轄內殿崇班李保懿為都監崇儀副使楊懷敏管勾黃河南岸諸掃內殿崇班吕清管勾北岸諸掃范仲淹既貶諫官御史莫敢言祕書丞集賢校理余靖言仲淹前所言事在陛下母子夫婦之間猶以其合典禮故加優奬今坐刺譏大臣重加譴謫儻其言未協聖慮在陛下聽與不聽爾安可以為罪乎汲黯在廷以平津為多詐張昭論將以魯肅為粗踈漢皇吳主熟聞訾毁兩用無猜豈損盛德陛下自專政已來三逐言事者恐非太平之致也請追改前命壬辰靖落職監筠州酒稅許潤州立學詔都進奏院自今內外臣僚聽以家書附遞交趾郡王李德政遣使來貢方物以進奉使何逺為順州刺史副使杜寬為勒州刺史癸巳御崇政殿召輔臣觀洛苑使端州刺史趙振所獻陳圖其子右班殿直珣三班奉職瑜試武藝皆左右馳射括雙箭蹶強弩擊劒盤矟几二十七技召振升殿靣加敦奬仍詔舍人院䇿試珣瑜方略以聞甲午授振復州刺史珣尋加閣門祗候瑜為右班殿直乙未貶太子中允館閣校勘尹洙為崇信軍節度掌書記監郢州酒稅先洙上言臣常以范仲淹直諒不回義兼師友自其被罪朝中多云臣亦被薦論仲淹既以朋黨得罪臣固當從坐雖國恩寬貸無所指名臣內省於心有靦靣目况余靖素與仲淹分踈猶以朋黨得罪臣不可幸於茍免乞從降黜以眀典憲宰相怒遂逐之詔臣僚在任丁憂若物故者在職田限內即與權官分給之權官未至者全給其家丙申御崇政殿録繫囚帝又廣其恩流已下罪皆得釋因詔有司自今罪覺被逮逮未至者同見繫原減之逃亡軍士免刺靣戊戌貶鎮南節度掌書記館閣校勘歐陽修為夷陵縣令初右司諌髙若訥言范仲淹貶職之後臣諸處察訪端由參驗所聞與敕榜中意頗同固不敢妄有營救今歐陽修移書詆臣言仲淹平生剛正通古今班行中無與比者責臣不能辨仲淹非辜猶能以靣目見士大夫出入朝中稱諫官及謂臣不復知人間有羞恥事仍言今日與宰臣以忤意逐賢人責臣不得不言臣謂賢人者國家恃以為治也若陛下以忤意逐之臣合諫宰臣以忤意逐之臣合爭臣愚以為范仲淹頃以論事切直急加進用今兹狂言自取譴辱豈得謂之非辜恐中外聞之謂天子以忤意逐賢人所損不細請令有司召修戒諭免惑衆聽因繳進修書修坐是貶西京留守推官仙逰蔡襄作四賢一不肖詩傳於時四賢指仲淹靖洙修不肖斥若訥也泗州通判陳恢尋上章乞根究作詩者罪左司諫韓琦劾恢越職希恩宜重行貶黜庶絶姦諛不報而襄事亦寢詔比刑部定諸縣令尉捕獲強盜非因躬親者皆不應格甚非所以激勸之道自今有能設方略遣人捕殺全伙七人不全伙十人及凶惡者三人以上宜比類酬賞之許真州立學仍給田五頃丙午詔澶州權停塞橫壠決河自是河東北行不復由故道徙修河都監楊懷敏專固護大名府金堤自是河東北行不復由故道此據去年八月戊辰稽古録所書眀年十月河北漕司又奏早撥修塞橫壠決河錢糧不知何也先是臺諫官數言政事得失宰相吕夷簡厭之滄州副都部署劉平前在定州為轉運使蘇耆所劾落軍職意不能平於是奏疏曰臣見范仲淹等毁訾大臣此必有要人指授仲淹輩欲逐大臣而代其位者臣於真宗朝為御史顧當時同列未聞有姦邪黨與詐忠賣直所為若此臣以淺文薄技偶致顯用不識朝廷典故而論事者浸淫遂及管軍將校且武人進退與儒臣異路若掎托短長妄有舉劾則心搖而怨結矣願眀諭臺諫官毋令越職仍不許更相引薦或缺員則朝廷自擇忠純耆德用之平疏蓋希夷簡意也平疏不得其時今附范仲淹等絀責之月光祿寺主簿蘇舜欽上疏言歷觀前代聖神之君好聞讜議蓋以四海至逺民有隱匿不可以遍照故無間愚賤之言擇而用之然後朝無遺政物無遁情雖有佞臣邪謀莫得而進也臣覩丁亥詔書戒越職言事播告四方無不驚惑往往竊議恐非出於陛下之意蓋陛下即位已來屢詔羣下勤求直言使百僚轉對置匭函設直言極諌科今詔書頓異前事豈非大臣壅蔽陛下聰眀杜塞忠良之口不惟虧損朝政實亦自取覆亡之道夫納善進賢宰相之事蔽君自任未或不亡今諫官御史悉出其門但希旨意即獲美官多士盈庭噤不得語陛下拱默何由盡聞天下之事乎前孔道輔范仲淹剛直不撓致位臺諫後雖改它官不忘獻納二臣者非不知緘口數年坐得卿輔蓋不敢負陛下委注之意而皆罹中傷竄謫而去使正臣奪氣鯁士咋舌目覩時弊口不敢論昔晉侯問叔向曰國家之患孰為大對曰大臣持祿而不及諫小臣畏罪而不敢言下情不得上通此患之大者故漢文感女子之説而肉刑是除武帝聽三老之議而江充以族肉刑古法江充近臣女子老人愚耄踈隔之至也且以義之所在賤不可忽二君從之後世稱聖况國家班設爵位列陳豪英故當責其公忠安可教之循默賞之使諫尚恐不言罪其敢言孰肯獻納物情閉塞上位孤危軫念於兹可為驚怛覬望陛下發德音寢前詔勤於采納下及芻蕘可以常守隆平保全近輔若詔榜未削欺罔成風則不唯堂下逺於千里竊恐指鹿為馬之事復見於朝廷矣國史舜欽傳及舜欽集皆稱乙亥詔書誤也今改之舜欽集云此疏以五月二十八日上今附見月末按景祐元年舜欽登第授光祿主簿知蒙城縣二年正月丁父憂三年五月上此疏居喪才一年後爾冒哀論事前賢不以為譏何哉當考六月戊申朔許越州立學仍給田五頃賜緣河州軍掃岸役卒衫袴己酉翰林學士承旨章得象等上科場發解條制下所司頒行命官重校隂陽地理書詔自今舉使臣為閣門祗候者須步射弓力九斗騎射七斗為合格仍送三班院量䇿邊事然後臨軒覆試之庚戌以河北久旱遣官詣北嶽祈雨壬子許階州立學仍給田五頃甲寅流內銓言選人試律斷案如律義已合格更須斷案一道通或二道粗方與往優便官從之又言選人資考合注西川逺官者或稱親屬仕彼乞入逺官權移近地候親屬得替却注合入逺官又父母未及七十便稱年老無人侍養乞折資注近官法亦聽許自今應合入川逺處選人與近官者親屬得替便行移注乞折資注近官者須是父母實年七十已上方行從之丙辰以新修樂書為景祐樂記丁巳石州定胡縣監押右侍禁髙永錫為西頭供奉官以永錫與蕃賊戰斬其酋一人特遷之壬戌禁以鹿胎皮為冠甲子許真定府博州郢州立學各給田五頃丙寅禮賔副使鄧保信上所製樂尺并籥且言其法本漢志可用合律度量衡詔馮元聶冠卿宋祁同較定以聞戊辰詔臣僚多占職田或剩取租者計贓坐之元無田而率配人户者以枉法論壬申南丹州首領莫淮戟挈族內附詔以為湖南州團練副使不管勾公事仍加存撫之江西轉運司言久雨江水溢壞虔吉諸州城郭廬舍詔賜被溺之家緡錢有差甲戌工部郎中兼侍御史知雜事司馬池言文武官年及七十者乞並令自陳致仕依舊勑與一子官如分司官給全俸若不自陳許御史臺紏察以聞特令致仕更不與子官及全俸其已曾自陳有詔特留者不在此限所貴減冗員勵曠職仍乞文臣下審官院依舊逐旋供報年幾家狀赴臺武臣下樞密宣徽院凖此其外處以敕到日為始限滿不陳乞者亦許御史臺紏舉詔榜朝堂
