body:
  text: 續資治通鑑長編卷三百十五宋李燾撰神宗元豐四年八月乙卯朔以西上閣門使提舉永興秦鳯等路義勇保甲兼提點刑獄狄詠權環慶路副總管東上閣門使英州刺史秦鳯路副總管姚麟權涇原路副總管遇出界狄詠髙遵裕姚麟與劉昌祚俱行詔近發開封府界第四將赴南平軍援彭孫如已到瀘州止令副將張誡分兵一半往南平軍聽彭孫節制詔中書自今堂選並歸有司兩紀並書罷中書堂選闕悉歸吏部詔學士院降敕榜付都大經制瀘州蠻賊林廣曉諭乞弟今朝廷再命將帥總領大兵至界進討旁近生蠻部族元非入冦之人橫遭誅戮許乞弟出降當免罪如乞弟迷執如故即行誅殺八月七日九月十三日可考上謂輔臣曰自來邊探多不得實如瀘南興師人多言旁邊百里內林箐險阻道路難進今得走馬奏大兵至落始兜村乃有良田萬頃頗多積穀其林箐乃在數百里外去邊百里之間探報尚且如此乃知傳聞多不足信昔趙充國願至金城圖上方略馬援聚米為山川蓋傳聞不如一見耳丙辰詔蠲河北東路災傷州軍今年夏料役錢詔自南北通和以來國信文字差集賢院學士蘇頌編類頌因進對上曰朝廷與契丹通好歲久故事儀式遺散者多每使人生事無以折正朕欲集國朝以來至昨代州定地界文案以類編次為書使後來得以稽據非卿不可成然此書浩繁卿自度幾歲可畢頌曰願盡二年因令置局於樞密後廳仍辟官檢閲文字知南平軍莊宅副使魏從革言領兵至栗子園得楊光震羅氏鬼主等狀已擊銅鼓會部族首領指天地為誓不得助乞弟惟助大朝詔彭孫相度應接翌日丁巳夔州路轉運司言從革開路還至生界為獠賊射殺詔差梓夔路鈐轄髙遵治副二彭孫同提舉捉殺瀘州蠻賊詰問射殺魏從革是何蠻賊及死傷人數以聞始彭孫迫從革以六月四日大暑深入開路為獠賊伏弩所中彭孫自恐失律乃言轉運司糧運不繼從革回軍督運故沒於賊云此月二十七日又十二月二十二日又明年七月十六日可考詔應出界戰兵除家糧外各支口食米二升并鹽菜錢又詔已令李憲等取日近與董戩期約乘便同擊夏賊今董戩約八月半出兵其熙河路都大經制司至今未奏措置進兵次第令依前詔若小稽緩致誤師期必正軍法并下同經制通直郎馬申等先是种諤既被旨招納夏人賊中覺之有願歸漢者悉為酋長所制或逼之內徙不使近塞又亟出兵以索降人諤曰諸羌欲降而弗得非應接之使敗約失機則反為吾敵矣是日丙辰初二日諤先帥兵駐綏德城外遣諸將招納賊盛兵禦我力戰敗之日記二十五日己卯所書事據范育志諤墓日案魏從革條事連次日已類記之此三條又係丙辰事故下復以丁巳另起丁巳上批諸路乞馬朝廷歲入有限無可應副戰騎所繫甚大平日尚不可闕以待四方之用况今軍興尤為要急可督提舉陜西買馬監牧郭茂恂速措置招買往來諸場督趣又詔熙秦鳯買馬場以馬價畫一付經沁伊達木凌節等令使回入蕃告諭又詔以本志增入河東都轉運使陳安石言自來軍興差夫運糧骨肉相送號泣於道路傳逹朝廷多蒙嗟惻為之中罷今師行般糧廂兵不足不免差夫必存故態伏乞體察詔河東諸州軍城寨等處並以義勇代壯城廂軍盡數以給饋運尚不足即於緣邊差夫詔京東西路諸州近以起發將兵纍陳乞增兵巡守朝廷以所在兵有數多已寢而不報緣州郡實有負山帶海姦盜所窺亦不得不過為之慮可令長吏等多方招募其招補新入與免貼軍并差出一年庶應募者衆稍補巡守之缺開封府界亦委都監招募戊午王中正言乞行遣麟府路文字以措置麟府路軍馬司事為名行遣鄜延等三路文字以照管鄜延環慶涇原三路軍馬司為名從之沈括种諤言定八月壬戌八日出師及追張世矩等領麟府路兵會於寧星和市詔沈括等已奏定九月吉日兼諸路差發將兵軍器並未齊集令种諤等未得輕易出兵悉依前詔并指揮張世矩依去月癸丑詔時諤已出兵次綏德城矣己未上批今進兵畫一中既除去先下興州者總節度將來四路兵出界所向自如更無人誰何中書樞密院可更審議於是中書樞密院言王中正已措置麟府路兼照管鄜延環慶涇原三路欲令總兵官與中正議定方得進兵乃詔兵馬出界後並聽中正節制秦鳯路經略使曽孝寬言本路止有五將一將先差往甘谷城防托今凖朝旨李憲熙河兵馬分擘不足更抽秦鳯四將臣本州及諸城堡寨亦當極邊乞留合存將兵上批昨吕惠卿沈括相繼已委官與經略司措置戰守兵馬各有分定經略司已同保明委無未盡未便事理何因孝寬復有此奏令具析以聞此用御集刪修究竟如何本傳云兵卒不徙當考八月五日令孝寬分析十一月九日孝寬徙河陽朱本簽貼云密院進呈不行削去王中正言乞移開封府界第一將兵赴臣麾下并七月以前逃亡自歸並許帶行及乞下王克臣選兵二萬人詔府界第一將已至鄜延中正所乞不行餘皆從之內選兵令王克臣先選於河外不足即以次於近裏將分貼差其後詔移第一將與之庚申史館修撰曽鞏兼同判太常寺詔鞏專典史事更不預修兩朝史上曰修史最為難事如魯史亦止備録國史待孔子然後筆削司馬遷材足以開物猶止記君臣善惡之迹為實録而已王圭曰近修唐書褒貶亦甚無法上曰唐太宗治僣亂以一天下如房魏之徒宋祁歐陽修輩尚不能窺其淺深及所以成就功業之實為史官者材不足以過其一代之人不若實録事迹以待賢人去取褒貶爾荆湖北路轉運司言已招懷辰州上溪州蠻當漸築城堡緣本屬生蠻地全藉兵威彈壓辰州雄略指揮今戌桂州乞追回應副防托上批荆湖北路作應副沅州謝麟於歸明蠻界置堡寨民力已困逺輸豈堪更有作興轉運司既止承準朝命招安遂乃妄意謀立城柵若不嚴與誡約則希功小人浸淫越職為國生事宜令髙鏄分析後鏄上言昨與轉運使孫頎權知荆南王臨同乞招諭上溪諸蠻量益戌兵所貴諸蠻即降遂謀築寨緣前奏已開陳故有此請詔釋之上批陜西諸路見議攻討然守禦之備亦不可懈深慮將帥日夜講求出戰之具思慮或有疏略宜申敕處分令日夕戒嚴其畫定人兵戰具修整畢備毋得稍有缺弛又批今日鄜延走馬承受奏西賊犯綏德城本城殺逐退散其有功之人速依格推賞外獲級者每級加賜絹十匹自今應邊寨殺獲準此髙遵裕乞降空名敕告宣劄紫衣師號敕度僧牒詔更給敕告宣頭劄子八百五十紫衣師號敕度牒八百環慶路經略司乞續支袍帶錦綺等詔續給公服百象笏七十錦綺衣著令釗援取旨編排又金帶三十交椅水罐手巾筒水義子各五十傘百及軍器監給雜綵轉光旗三百辛酉後苑房廊所言取蔡河南房廊屋并舊左騏驥院地修蓋寄囤蔡河賈人穀及堆垜六路百貨從之朱本簽云事小削去元豐二年十月四日泗州初置三年二十四日京城外置此月十五日宋用臣與馮景事可考提舉河東路義勇保甲兼提點刑獄司言準轉運司牒已定太原府代州等義勇保甲運糧草詔河東都轉運司依近降指揮止於邊近河外州軍差撥毋得於鄰接北界州軍仍具析因何全不思慮措置乖失以聞鄜延路走馬承受楊元言西賊二萬餘人於無定河臨川堡出戰斬獲首級上批朝廷於諸城寨未嘗侵犯夏國未知有何道理輒領大兵入冦緣所定師期尚逺宜下鄜延路經略司令保安軍牒宥州詰問庶使彼辭愈曲我師出境其名益直新舊紀辛酉夏人冦臨川堡詔董戩會兵伐之蓋追書也又失事實今不取手詔李憲得所奏以團結漢蕃軍馬分置將佐部分陳隊審定出兵所向及計度賊屯重兵之所且論諸道進師首尾之勢甚善然閫外之事朝廷屬在將帥趨利避害固難居中預度惟爾臨敵自圖擇之茍能奮張威武鼓勵三軍之士徑指梟巢與諸將合力俘執醜類然後退視各郡居要害者城而守之是為上䇿若大本未殄顧未有闢地守之之術或謀置城賊中必是自貽患悔切宜審之其他制賊方略或攻或守雖千百為無不可者所有秦鳯一路已有指揮俾爾兼總節制可便宜施行軍中所須已命有司一一應副詔中書樞密院近已降敕榜許乞弟親出投降今來師期在近若便分布兵馬謀為進討慮乞弟驚疑不肯出降令林廣密行相度若止留軍馬五七千人選委得力將官一兩員總領防托邊界如乞弟決不出降徐行討捕所有林廣彭孫并其餘軍馬並行勾回如此施行於邊防有無不便仰具指實利害以聞密記八月七日中密同被旨九月十二日可考雄州言涿州牒蔚州稱雙井新寨鋪邊吏妄遮止北人不令於壕北過往請詰邊吏及擅越疆界人等罪詔河東提點刑獄黃亷往代州定驗北人有無侵越舊界及邊人有無侵北界地樵採具圖以聞吉先邊防具注在十一月五日明年正月十二日又二十五日又二月六日可考黃亷行狀八月麟府軍興兼權轉運判官又差定代州地界亷條具分析為十二寨圖以進且言建議者以分水畫界恐地勢不能盡然啓外人心失中國險固其後遼人果責分水之言包取兩不耕地據有形勝下臨雁門父老於今以為恨又詔河東轉運司河東應於今來軍興所行事件常切審謹不得張皇漏露所有邊近地界州軍如不係干照去處不得一例行下及仰選擇吏人行遣如能謹密候事了日優與酬奬仍覺察體量部吏傳報張皇者勘劾以聞壬戌樞密院編到自郭稹而下至沈括等二十七番泛使䇿并目録總三十一䇿進呈乞降本院禮房檢用施行詔令進入密記二十七番泛使當考朝散郎直龍圖閣曽肇言伏覩修定官制即百司庶務既已類别若以所分之職所總之務因今日之有司擇可屬以事者使之區處自位敘名分憲令版圖文移案牘訟訴期會總領循行舉明鈎考有革有因有損有益有舉諸此而施諸彼有捨諸彼而受諸此有當警於官有當布於衆者自一事以上本末次第使更制之前習勒已定則命出之日但在奉行而已蓋吏部於尚書為六官之首試節而言之其所總者選事也流內銓三班東審官之任皆當歸之誠因今日之有司擇可屬以事者使之區處自令僕射尚書侍郎郎中員外郎以其位之升降為其任之繁簡使省書審決某當屬尚書侍郎某當屬令僕射各以其所屬預為科别如此則新命之官不煩而知其任矣曹局吏員如三班諸房十有六諸吏六十有四其所别之司所𨽻之人不必盡易惟當合者合之當析者析之當損者損之當益者益之使諸曹所主因其舊習如此則新補之吏不諭而知其守矣憲令版圖文移案牘訟訴期會總領循行舉明鈎考其因革損益之不同與有舉諸此而施諸彼有捨諸彼而受諸此有當警於官布於衆者皆前事之期莫不考定如此則新出之政不戒而知其敘矣夫新命之官不煩而知其任新補之吏不諭而知其守新出之政不戒而知其敘則推行之始去故取新所以待之者備矣其於選事如此旁至於司封司勳考功當𨽻之者內服外服庶工萬事當歸之者推此以通彼則吏部之任不待命出之日聞而後辨推而後通也試即吏部而言之體當如此其於百工庶職素具以待新政之行者臣之妄意竊以謂無易此也夫然則體雖至大而操之有要事雖一變而處之有素一日之間官號法制鼎新於上彛倫庶政率行於下內外逺近雖改視易聽而持循安習無異於常詔送詳定官制所藉田司言近奉詔均種諸穀水陸皆備本以待車駕臨幸夏秋以來九穀皆稔觀麥視禾臨幸儀注恐未修講欲乞令大臣先案視修建崇飾至於西成穡事將畢遣近臣觀穫稻凡有創興未合典禮之事因而講議不報是日种諤遣諸將出界遇賊破之斬首千級此事實録見二十五日己卯今掇出附此本傳云諤帥軍次綏德城遣將出師招納賊禦於境上戰敗之斬首干級朝廷以諤先期輕出命還師延安改命諤及麟府事並聽王中正節制出界遇賊當即是初二日丙辰所書賊益兵禦我力戰破之同此一事也欲詳記諤軍行次第故復著此仍以傳所云斬首干級繫之癸亥詔魏從革為獠賊所射自是從革失備不繫用兵輕重委彭孫更詳酌如南平軍路實可進討即措置詳審而往或道路艱梗難趨賊巢穴亦速具利害以聞朝廷必不以前後異同為罪乙丑上批已指揮秦鳯一路兵付李憲節制深慮經略司猶宿留不肯依應調發誤熙河軍期可再下都大經制司依詳朝廷屬任之意便從節制處分上批熙河路已列定兵馬必須照應董戩所約師期出界蕃中出兵與否無可為據宜令經略司選使臣一二人入蕃軍照驗仍約鄂特凌古遣首領一二人來與官軍同出庶彼此分明不誤大事罷環慶路副總管姚麟兼第一將從經略司髙遵裕奏也知延州沈括言曲珍八月丙辰於西界大里河北接應西界首領額琳等十餘人并家屬數百口牛羊馱馬近八千已赴安定堡外有投來首領見於西界招呼元結約人户來降八月丙辰初二日也括奏或附初二日种諤次綏德城後彭孫言乞從瀘州合江縣納溪九支池便路討乞弟候破蕩畢驅率楊光震部族討捕生獠以報魏從革之寃從之後一日罷之事在乙亥二十一日丙寅涇原路經略司言應副軍行戰守等事乞權許便宜指揮詔本路措置事稍大奏候朝旨如小事礙常法許一面施行鄜延環慶河東路經略司熙河路都大經制司措置麟府路兵馬司依此先是詔遣宿衛七將之師戌鄜延已再頒矣而鎮兵未嘗有所賚沈括以謂禁兵雖重而為國守邊無歲不戰者鎮兵也賞賚不均此召亂之道乃矯詔賜鎮兵錢數萬緡而封藏詔書以驛聞不數日復馳驛詔括曰樞密院漏行頒書賴卿察事機不然幾擾軍政自此事不獲聞者得以專制蕃漢將卒自皇城使以降皆得承制補受此據沈括自志附見丙寅日當考十一日丙午劉惟簡乞均賜病還軍士當考詔諸路進討行營漢蕃兵惟可使之出力破賊毋令小費私財委李憲髙遵裕王中正常切照管體當舉動大小進兵逺近量給所費令足用外人常有霑潤又不可過為姑息詔王中正將來大兵出界慮遼人亦遣兵征討或為援助或於境上自防若與諸路兵相遇即先遣使臣説諭或移文以夏國內亂囚制國王不知存亡朝廷回賜賀同天節并遣使賜生日等物無人承受鄜延路纍牒問宥州皆不報近又纍犯邊朝廷遣兵問罪與北朝不相干涉如阻隔進兵或先犯官軍方得應敵令中正密掌之詔鄜延環慶涇原河東路經略司并總兵官熙河路都大總制司應副措置事如有乖失令逐路轉運司具以聞詔定州髙陽關真定府路安撫司河東路經略司河北河東緣邊安撫司密戒沿邊州軍與北界應干邊防事一切皆循常毋得輒創生更改又詔入內省選差使臣二人自京分詣陜西沿邊麟府等路於遞鋪內選可充急腳遞鋪兵對換不堪走轉文字之人仍相度鋪分地里遙逺去處添置腰鋪又詔河東陜西諸路轉運司及同經制馬申等應副軍興各已分撥錢物自可擘畫計置其須至於民間賃借等事件即仰明給價直不得直行科率仍常切撫存人户務令安靜無致騷擾如有措置乖失令提刑提舉司密具事由聞奏當議重行廢黜有失覺舉與同罪是日韓存寶伏誅七月十九日詔誅存寶八月十二日乃伏法丁卯殿前副指揮使武泰節度使盧政卒輟視朝臨奠之贈開府儀同三司館閣校勘邢恕為史館檢討從曽鞏請也詔諸路應投來首領等令邊臣密問以夏國變亂及今點集屯聚處所動息以聞詔步軍副都指揮使雍州觀察使太原府路副都總管劉永年赴闕供職主管步軍都指揮使兼主管馬軍司己巳馬軍副指揮使金州觀察使燕逹為殿前副都指揮使武康軍節度使舊紀書逹為節度使新紀不書詔白馬縣復為滑州𨽻京西繫浮梁葺城壘宜得幹劇之人以朝請大夫周革知州奉議郎蘇注通判州事如速辦無擾事畢優與推恩兩紀並書復滑州熙寧五年八月五日廢滑州以白馬韋城昨城三縣𨽻開封都大提舉汴河隄岸宋用臣言本司沿汴及京城所房廊地並召人僦納官課紙紅花麻布酵行皆𨽻本所為堆垜場令馮景拘攔賣紙及送紙行班文昌於開封府侵奪課額欲乞據本司已立逐行外餘令馮景拘攔所貴課額各辦詔八月以前已賃隄岸司及京城所房堆垜物在地者更不起遣餘無得妄拘攔騷擾行市朱本簽貼云事小刪去新本已復存之可見當時雖小事神宗必親剖判也三年十月四日泗州初置堆垜場三年二月二十四日置京城堆垜場是月七日又置蔡州庚午廣西經略司言交址入貢百五十六人比舊制增五十六人上批宜令據今已到人數赴闕今後準此新紀書交址入貢附年末舊紀乃於五年年末書之沈括奏乞近便處發三兩將兵應副呼使上批昨降指揮止為招到並邊部族少壯從軍老小等從便近城寨安存其大兵出界後降附部族若盡徙內地人情必不樂從少壯自當驅以隨軍老小等即其地撫之如此內徙人數必不猥多守禦人數足以照管可劄付沈括种諤依詳施行權發遣環慶路經略司髙遵裕言準密院劄子降營陳法臣究覽雖知梗概尚恐未諭深旨欲望一諳曉營陳使臣付臣詢訪營陳出入竒正相生之要令乘驛前來詔燕逹選諳曉營陳使臣一人申樞密院辛未河東路經略司言王中正未到本路間有西人投降未審許與不許收接詔河東路經略司如有西界投來人口令逐處守臣分布於穩便城寨安存給食仍密察姦詐髙遵裕言覘知西界大點集欲遣兵擁遏賊鋒詔遵裕纍奏本路兵馬器械未備令候齊集依約定期日進兵毋得妄動如有人口來追逐犯境即照會七月壬寅指揮上批開封府界教成大保長已放散多日以次團教之法久未推行聞以無弓弩溫習甚有退惰者蓋劉琯獨力生疏未有倚仗辦事可令狄咨不妨見領河北職事兼權王中正提舉開封府界保甲時中正奉使河東陜西故也劉琯提舉府界保甲在四年三月狄咨先以二年十一月提舉府界保甲三年六月改提舉河北西路義勇保甲兼提點刑獄壬申詔録故知南平軍魏從革三子一人為三班奉職二人為借職詔樞密直學士權三司使李承之落樞密直學士為寶文閣待制知汝州坐奏請濮州墳所遺直院與陳留縣開福寺對易既得旨其姪孝伯詐增制書立榜欲取開福常住入墳院為僧所訟承之虛稱元乞易寺乃臣從兄給事中致仕徽之所奏下大理根治而徽之亦言承之與子孝伯陳乞院額以致人言承之從臣敢欺聖聽乞直貶黜如臣言有不當亦甘坐罪開福院額乞下陳留縣依舊濮州更不創院時承之兄龍圖閣直學士肅之知鄆州亦言大理寺鞫承之奏請寺額濮州舊遺直院殿宇尚在兼父祖墳營在彼遂乞以陳留所廢開福院額於濮州復舊院或慮未盡情理望别差官根治詔遣開封府其後改送御史臺承之坐報上不實及遣吏詗獄事故有是責事始在二月二十一日戊申舊紀書樞密直學士三司使李承之奏易墳寺不實降為寶文閣待制知汝州手詔沈括近據本路及諸路探報賊人聚兵在緣邊對壘今諸將以种諤驅迫使不量衆寡直入賊境招納既不能招致又甚虧損威重致賊測知漢兵淺深賴今諸將稍知形便不致冒險深去可速料事機如未可前宜且迤邐還據漢地庶諳知山川道徑曲折曉夜易為斥堠控禦初种諤以鄜延兵先招納夏人是月丙辰次綏德城壬戌分遣諸將出界遇賊破之朝廷以諤輕出遂命諤聽王中正節制此實録二十五日所書因詔諤完養士氣依王中正議定期日與諸路協力進討遂附此今移入十八日詔沈括以諤不能招致虧損威重之後蓋十八日詔猶有責諤輕出意至二十五日并二十六日則已稱諤未為失謀既稱諤未為失謀則令諤聽中正節制必在十八日非二十五日以後也故自二十五日移入十八日更須詳考之癸酉詔馬申胡宗哲兼權管勾熙河秦鳯路轉運判官公事其行移文字並以熙河秦鳳路轉運司為名乙亥鄜延路經略司言保安軍遣人齎牒宥州據順寧寨申西界驛路自界首把口人及民户盡起發赴近裏公牒無憑交割詔鄜延路經略司更不移牒六月二十七日令保安軍牒宥州林廣言乞指揮彭孫且在南平軍枝梧即日邊事詔近彭孫奏欲取瀘州合江路討賊緣本路已屬林廣進兵路分今以彭孫權涇原路鈐轄速領本軍赴渭州聽髙遵裕節制事在十一月乙丑丙子詔中書降敕榜曰西南蕃羅氏鬼主下蠻首領沙取省都大經制瀘州蠻賊公事林廣奏沙取令趙二以狀來言今落莫部已與沙取議乞弟投降事其有都掌已遣人往諭降人稱我止依十州例與我稅賦更不以兵隨乞弟及沙取令蒲成等密來言若乞弟不降即領都掌等往掩殺今沙取若能諭乞弟早降朝廷當厚加爵賞如有未肯降沙取能掩殺赴官即賞真金五百兩銀五千兩錦帛五百匹綵絹五千匹更當優加官爵其下得力蠻兵賞鹽萬斤牛百頭如殺到乞弟以下蠻兵每級賞絹二十匹夷兵十五匹小首領三十匹大首領六十匹其逐處部族都大頭領亦重賞委沙取撫諭都掌等部族頭領早出投降即依十州例令輸稅賦及厚賞錦袍銀綵等涇原路經略司言將來如盡出境即本路守禦人至少乞於近裏發三兩將赴本路詔髙遵裕詳酌除先分畫定守禦人外更量留兵馬防托具所留數以聞丁丑河東路經略司言豐州弓箭手沈興等二人為西人所執已牒理索詔諸路已議進兵攻討其嚴飭邊備如有虜去人口更勿行牒沈括奏曲珍言西賊欄截糧草殺獲首級上批鄜延路近邊諸將出界今已漸抽回其有斬獲賊首及傷中之人宜速推賞以伸信士卒可下經略司并下种諤候諸將回入漢地即從行司專差官厚以酒食犒賞漢蕃將士所招頭首如當補授即書填空名宣劄給付河東依此上批近差措置麟府路軍馬王中正兼管鄜延環慶涇原軍馬止謂未出界以前與逐路帥臣將官議定進兵月日及軍行所向其出界後王中正止令遵稟宣命節制鄜延一路諸將兵其環慶涇原朝廷自專委髙遵裕節制中正更不當干預慮中正未審宣命出界之後猶欲節制涇原環慶之師致分畫責任臨時攙搶令王中正細詳宣命施行毋得侵越俟先下興靈方依畫一總六路軍馬節制近差中正兼管延慶渭三路要見的日或止緣种諤先出故有此指揮此在二十五日己卯是日李憲總領七軍至西市新城遇賊約二萬餘騎官軍掩擊敗之擒首領三人殺獲首領二十餘人斬二千餘級奪馬五百餘匹是日丁丑八月二十三日也自九月五日戊子移入此要見諸路降兵先後耳戊寅詔涇原路經略司本路兵悉出界更不赴涇原其本路兵當用糧草丁夫令髙遵裕牒涇原轉運司照會詔已指揮將來出界涇原兵聽髙遵裕節制緣涇原廣濶利進大兵本路止是團結諸將未嘗益兵出戰軍馬不名慮出界遇賊難驅逐令遵裕相度以環慶兵取涇原路會合或以涇原兵從環慶路會合出界進討所貴氣勢益壯易以破賊所當用丁夫糧餉計會兩路轉運司應副己卯詔給度僧牒千買木修景靈宫諸神御殿种諤言諸將已有功還乞早降朝旨同日進師詔昨降指揮合諸路期約進兵一舉撲滅賊巢近种諤先行招納遣諸將淺攻各有斬獲之勞未為失謀今師期不逺其務完養士氣依王中正議定期日與諸路協力進討實録於此又書初种諤以鄜延兵先招納夏人是月丙辰次綏德城壬戌分遣諸將出界遇賊破之朝廷以諤輕出遂命諤受王中正節制今移入十八日壬申削此不書鄜延路經略使沈括言乞明立約束畫定人馬留本路防守不許差出外别乞差準備應援軍馬詔令沈括留兩將軍馬防托或种諤出界未見次第即不許追呼如已捷須兵馬分頭討定部族若來勾抽不得占留庚辰詔鄜延麟府兵出界招納已回斬獲有勞並賜特支錢上批據种諤奏分遣出界淺攻諸將皆會已追兵回駐並遣諸寨朝廷昨於諸路大發師徒本候齊集與逐路邊兵併力擇時鼓行覆賊巢穴不為焚蕩塞上微小族帳驅略甌脫守望羌人所以近纍丁寧誡敕俾遵已定師期今淺攻之兵既量有應接降人凡戰又能小捷及斬獲賊庭酋長即斂兵歸亦未失計仰种諤更推明朝廷賞罰鼓勵士心全養氣力以俟師期成就大功詔熙河路李憲等八月辛未與董戩人馬期會攻討夏賊緣鄜延路師期尚在九月下旬之初令李憲等如兵馬出界遇賊已見克捷即進兵深討若賊兵阻遏未可長驅即擇控要便於饋運之所權立營寨以伺諸路師期首尾相應又詔李憲今來舉動不同凡敵圖人百年之國甚非細事茍非上下畢力將士協心曷以共濟須不惜爵賞鼓勵三軍之氣使冒鋒摧敵若能初戰取功則其他迎刃而解矣宜勿吝金帛旌拊戰士茍有以激發衆心皆可便宜從事朝廷惟務滅賊其他固無愛惜王中正种諤奏涇原環慶會兵取靈州渡討定興州麟府鄜延先會夏州候兵合齊進取懷州渡討定興州乞下涇原環慶遵守從之是日李憲駐兵努扎谷九月十二日乙未奏辛巳修國史院編修官趙彥若言與司馬光同修百官公卿年表成十卷并臣修成宗室世表三卷詔進入後並送編修院賜銀絹有差光仍降詔奬諭夔州路轉運司言準提舉捉殺司送到射殺魏從革獠賊木八等已付南平軍根治詔轉運判官席汝明考實以聞壬午權判都水監李立之言準朝旨小吳決口不閉令臣經畫臣自決口相視河流至乾寧軍分入東西南塘次入界河於劈地口入海通流無阻今檢計當修立東西隄防計役三百十四萬四千工詔知制誥知諫院舒亶度支副使直史館寋周輔再相視檢計詔升南京青登鄧鄆曹齊洺濮州有馬軍教閲廂軍及真定府北寨徑勇環州下蕃落未排定指揮並為禁軍佛泥國遣使入貢佛泥不入貢者九百餘年矣兩紀並附年末明年十二月二日使人乃歸舊紀既於此年末書佛泥入貢明年年末又書蓋重出也新紀已削去
