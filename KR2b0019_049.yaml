  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0019_WYG_049-1a, image: WYG0314/WYG0314-0589c.png}
body:
  text: 續資治通鑑長編巻四十五宋李燾撰真宗咸平二年秋七月壬午羣臣表請聽樂詔不允自是凡五上表乃從之上聞契丹将入㓂甲申以馬歩軍都虞侯忠武節度使傅潜為鎮定髙陽關行營都部署西上閤門使富州刺史張昭允為都鈐轄洛苑使入内副都知秦翰為排陣都監莱州防禦使田紹斌為押先鋒崇儀使石普同押先鋒單州防禦使楊瓊為䇿先鋒甲申初四日受命癸邜二十三日乃行遣先鋒實録在乙巳今并書之宰相張齊賢請給外任官職田詔三館秘閣檢討故事申定其制以官莊及逺年逃田充悉免其税佃户以浮客充所得課租均分如鄉原例州縣長吏給十之五自餘差給其兩京大藩府四十頃次藩鎮三十五頃防禦團練州三十頃中上刺史州二十頃下州及軍監十五頃邉防小州上縣十頃中縣八頃下縣七頃轉運副使十頃兵馬都監監押寨主釐務官録事參軍判司等比通判幕職之數而均給之初三司欲令職田戸依例輸税虞部郎中杜鎬等言推尋故事歴代並無輸税之文乃止召横海節度使知鎮州王顯入朝己丑罷旄鉞依前檢校太尉為樞宻使止加食邑止加食邑此本㑹要庚寅陜州言靈寳縣暴雨崖圯壓居民二十三戸詔賙其存者米口一斛五户有傷者給復一年八户有死者給復二年壬辰詔以冬至有事扵南郊司封員外郎髙如晦上言三司每下牒諸州多失通濟或折料物色非其所産或移割税賦不便於民或言若狥公而意在私曲或事若利官而貽患扵後如此條件甚衆外方既為所統一例遵承欲望自今許諸州軍長吏詳視如理實有害即具駮奏從之髙如晦未見癸巳蠲淮陽軍田租十之三旱故也丁酉鹽鐡使陳恕言袁州牙吏晏賢部茶綱至舒州值風覆舟估直千餘緡已籍其貲産詔釋其罪所籍悉還之知朗州内殿崇班閤門祗候孫存忠以亷幹聞辛丑賜詔奬之存忠未見壬寅陳堯叟自廣南使還上言西路諸州旱命國子博士彭文寳往權轉運司事量所損蠲其租賦賑飢民彭文寳未見癸卯清逺軍裕勒榜族首領多拉来貢甲辰上幸國子監召學官崔偓佺講尚書大禹謨還幸崇文院登秘閣觀太宗聖製墨跡惻愴久之賜秘書監祭酒以下器幣偓佺頥正弟也乙巳羣臣表上尊號曰崇文廣武聖明仁孝詔不允自是五上表乃從之丙午置翰林侍讀學士以兵部侍郎楊徽之戸部侍郎夏侯嶠工部郎中吕文仲為之置翰林侍講學士以國子祭酒邢昺為之初太宗命文仲為翰林侍讀寓直禁中以備顧問然名秩未崇上奉承先志特建此職擇老儒舊徳以充其選班秩次翰林學士禄賜如之設直廬於秘閣侍讀更直侍講長上日給尚食珍膳夜則迭宿令監館閣書籍中使劉崇超日具當宿官名於内東門進入自是多召對詢訪或至中夕焉八月辛亥朔上御文徳殿百官入閤右司諫直史館孫何次當待制上疏曰六卿分職邦家之大柄也故周之會府漢之尚書立庶政之根本提百司之綱紀令僕率其属丞郎分其行二十四司粲然星拱郎中員外判其曹主書令史丞其事四海九州之大若網在綱有吏部焉辨考績而育人才有兵部焉簡車徒而治戎備有戸部焉正版圖而阜財賦有刑部焉謹紀律而誅暴强有禮部焉祀神祇而選賢俊有工部焉繕宫室而修堤防六職舉而天下之事備矣有唐貞觀之風最為稱首于時封疆甚廣經費尤多亦不聞别分利權改創使額而軍湏取足𤣥宗侈心既萌貪地無已北事奚契丹南征閤羅鳯召發既廣租調不充扵是蕭景楊釗始以地官判度支而宇文融為租調地稅使雖利孔始開禍階将作然版籍根本尚在南宫肅代之世物力蕭然於是有司之職盡廢而言利之臣攘臂扵其間矣征税多門本扵專置使額故徳宗之初首降詔書追行古制天下錢糓皆歸文昌咸謂故事復興太平可致而天未悔禍叛亂相仍經費不充使額又建於是裴延齡以利誘君甚扵前矣憲穆而下或廹扵軍期切扵國計用救當時之急率以權宜裁定五代短促曾不是思國家三聖相承五兵不試太平之業垂統立制在兹辰也所宜三部使額還之六卿或曰禄百辟贍六軍皆是物也臣亦有其説夫鹽鐵者葢筦𣙜山海之謂也而物非自集須假牢盆戸部者葢均一征税之謂也而財非自生須計田賦度支者葢供億軍國之謂也而粟非自行須資漕運但檢押專一相沿置之耳今莫若謹擇戸部尚書一人專掌鹽鐵使事俾金部郎中員外分判之又擇本行侍郎二人分掌度支戸部使事各以本曹郎中員外分判之則三使洎判官雖省猶不省也仍命左右司郎中員外總知帳分勾稽失遺或曰事有便宜從之已乆何必改作逺師昔人斯又非通論也但雅俗兼資新舊參列則進無掊克之慮退有詳練之名職守有常規程既定周官唐式可以復矣兹事非艱在陛下行之與否耳癸丑右正言知制誥判大理寺王欽若上言本寺公案常有五十至七十道近者三十日内絶無昔漢文帝决獄四百唐太宗放罪三百九十人然猶書之史册號為刑措當今四海之廣萬類之多而刑奏止息逮乎逾月足彰恥格之化式漸太和之風請付史館用昭聖治從之丁巳大宴崇徳殿始作樂戊午上作社日五言詩賜近臣屬和宰執求免次韻上曰君唱臣和亦舊制也無煩多讓庚申以太常博士盧琰為開封判官秘書丞李防為推官上謂宰相曰人之有材未易盡知歴試而後可見矣占謝日特召升殿諭以府事繁劇遴選之意各賜錢十萬琰淄川人防内黄人也防嘗受詔括磁相州逃戸得隠賦十餘萬因請均定田税又言縣有逃戸破五十者令佐降下考若百戸殿三選二百戸停所居官其能招携者賞之又言凡逃田宜即召人承佃使人不敢輕去而官賦常在扵是建言天下多寃獄請與判官間三五日入府司軍廵院獄有未明者得以訊之尋出為陜路轉運副使先是沿江水遞八十九舗嵗役民丁甚衆頗廢農作防悉用本城卒代之民以為便壬戍詔得替幕職州縣官及丁憂服闋者並免選注擬癸亥判大理寺王欽若上言本寺案牘簡少請罷詳斷官四員止留八員從之國初大理正丞評事皆有定員分斷獄訟其後擇他官之明法令者若常參則兼正未常參則兼丞謂之詳斷官凡六人漸加至十二人尋去兼丞正之名扵是始以八員為定丙寅大閲先是詔有司擇地扵含輝門外東武村為廣塲乙丑夜三鼓殿前侍衛馬歩諸軍二十萬分出諸門遲明乃絶上按轡出東華門宗室近臣尚書侍郎御史中丞給諫上将軍節度觀察防禦團練刺史並賜戎服以從上至行營諸軍陣于臺前左右相向歩騎交屬諸班衛士翼侍扵臺後有司奏成列上升䑓東向召從臣觀之殿前都指擇使王超執五方旗以節進退又於兩陣中起候臺相望使人執旗以應之初舉黄旂則諸軍旅拜舉赤旂則騎進舉青旂則歩進每旂動則鼓作鼔作而士譟皆三挑而後退次舉白旂則諸軍復再拜呼萬嵗有司奏陣堅而整士勇而厲欲再舉上曰可止矣遂舉黒旂以振旅軍扵左者略右陣以還由䑓前出西北隅軍扵右者略左陣以還由䑓前出西南隅以歸上御東華門閲諸軍還營顧謂王超曰士衆嚴整戎行練習卿之力也丁卯近臣諸軍将校内職皆賜飲詔大閱所踐民田蠲其租辛未詔定節鎮防團軍事州知州都監通判常從軍士人數有差壬申詔諸路轉運使副自今啓請事冝及保舉移易官屬皆須重覆詳審委是公私利濟無所私狥乃得奏聞當議降敕施行如異日事有乖當必行重責癸酉樞宻副使工部侍郎楊礪卒上謂宰相曰礪介直清苦方當任用遽此淪謝甚可悼也即冒雨臨其䘮礪私舎委巷中乗輿不能入上為歩進益嗟憫之贈兵部尚書中使䕶葬乙亥以樞宻使贈中書令追封濟陽郡王武惠公曹彬配享太祖廟庭司空平章事贈太尉中書令文惠公薛居正忠武軍節度使同平章事贈中書令武惠公潘羙右僕射贈侍中元懿公石熈載配饗太宗廟庭丙子以司封郎中知制誥朱昻為𫝊法院譯經潤文官始太宗作聖敎序上亦繼作悉編入經藏上又嘗著崇釋氏論以為釋氏戒律之書與周孔荀孟迹異道同大指勸人之善禁人之惡不殺則仁矣不竊則亷矣不惑則正矣不妄則信矣不醉則荘矣茍能遵此君子多而小人少又上生三途之説亦與三后在天鬼得而誅之言共貫也鹽鐵使陳恕嘗建議以為傳法院費國家供億力請罷之言甚懇切上不許戊寅度支判官兵部員外郎陳堯叟供奉官閤門祗候陳采户部判官太常博士丁謂右侍禁閤門祗候焦守節分至西川及峡路體量公事守節繼勲子也陳采未見曹彬之寝疾也上召其子四方館使麟府等州濁輪寨鈐轄璨歸闕彬既沒起復為客省使鄜延路副都署九月癸未加趙州刺史副都署如故西羗之衆因仇怨相攻璨與之誓盟頗致不犯此事更須詳考否則削去樞宻都承㫖王繼英以契丹入冦請車駕北廵丙戌命繼英馳𫝊詣鎮定髙陽關路視行宫頓置宣慰将士丁亥命比部員外郎直史館洪湛供奉官閤門祗候韓紹輝往荆湖路體量公事韓紹輝未見上謂輔臣曰賞罰二柄乃馭民之銜勒賞功而誤猶或可耳行罸不當人将何告宜謹重之甲午奉安太宗聖容扵啓聖院之新殿上即時朝拜瞻仰號咽哀動左右賜修殿内侍兵匠緡錢有差自是每嵗用正月朝拜太常卿賛導侍臣進沃酹戊戍邛部川蠻王諾驅遣王子部的等来貢方物諾驅又表乞賜大渡河南山前後都鬼主印詔有司鑄以給之庚子令杭州明州各置市舶司聽蕃客從便壬寅以殿直齊璘為供奉官寧化軍監押時三班引對璘自言本太原人太祖朝来歸頗蒙驅使趨走邉郡屢殺蕃㓂上問殿前都指揮使王超超曰使璘莅他務則非所長惟諳練邉事老而益壮上問其年璘曰臣七十三嵗矣然陛下儻任用猶能禽剪醜敵上壮之故有是命加賜白金百兩江淮兩浙制置茶鹽度支員外郎王子輿言江淮兩浙賣茶鹽都收錢三百九十七萬餘貫比舊額增五十萬八千餘貫尋詔子輿兼制置礬税仍領荆湖路兼礬税及荆湖據㑹要附此不得其月初傅潜遣先鋒田紹斌石普等戍保州普隂與和州楊嗣出兵撃敵及夜未還紹斌疑其敗衂即領衆援之普嗣果為賊所困渡亷良河頗䘮師徒及紹斌至即合勢疾戰斬首二千餘級獲馬五百疋兵仗鎧甲稱是嗣信之子也癸卯潜遣右侍禁郭均馳騎奏㨗上方宴射後苑從臣再拜稱賀甲辰又相帥詣崇徳殿稱賀本紀實録並稱亷良路紹斌𫝊稱嚴凉河普傳稱炎凉城嗣𫝊亦稱亷良今從嗣傳及本紀實録案宋史石普傳亦稱亷良城注引炎凉疑誤保州縁邉都廵檢使楊延朗時在遂城城小無備敵攻之甚急長圍數日敵母親督戰衆心危懼延朗集城中丁壮登陴賦噐甲䕶守會大寒汲水灌城上旦悉為氷堅滑不可上敵乃潰去獲其鎧甲器仗甚衆此事實録不記其月日今附見亷良河破敵之後乙巳贈故知宜州内殿崇班馮勵為左武衛大将軍故桂昭等州廵檢供奉官武繼榮為驍騎将軍蠻賊冦邉勵等領兵深入戰沒上憫之故有是命仍厚䘏其家先是供奉官張從古知宜州屢破溪蠻轉運使陳堯叟上其状累遷内殿崇班閤門祗候在宜州凡八年馮勵戰沒乃復命從古知宜州蠻遂無事從古平子也歐陽修誌楊大雅妻張墓載從古再知宣州事比本傳差詳然極顛倒今參取刪修從古先見淳化五年五月恐别一人詔羣臣月俸折支物無收其筭太子太保吕端居病告再滿三百日有司屢言當罷俸上皆不許丁未端疾愈對扵崇政殿是秋河西叛羗和諾克族長䝉吉布及府州所部多鄂等引趙保吉之衆冦麟州萬戸谷進至松花寨知府州折惟昌與從叔同廵檢使海超弟供奉官惟信率兵拒戰于城會時保吉衆頗盛惟昌以所部力鬬矢中左臂墜馬兵小衂惟昌攝弓而起旁得禆将馬突圍而出海超惟信死之上遣中使勞問惟昌賜金丹上尊酒錦袍金帯名馬器幣未逾月保吉之黨旺布伊特滿復来㓂惟昌與駐泊宋思恭鈐轄劉文質合兵撃敗之于埋井峰斬馘禽生甚衆奪其牛馬橐駝弓矢詔書褒奨焉思恭未見見于祥符二年五月者恐非其人冬十月庚戍朔以兩浙荆湖旱命庫部貟外郎成肅等四人分路體量賑䘏辛亥詔諸路轉運司自今轄下官吏慢公不理並須明具指實畫一聞奏如朝廷差官勘鞫斷遣後本人却有陳訴再行覆勘顯有虗妄其轉運使副必加深罪時上封者言轉運司劾奏部内官吏多渉愛憎故條約之此據會要壬子宜州部送溪洞蠻酋三十餘人見于崇政殿上詰曰爾等安得輙肆侵軼對曰臣等蠻陬小民安得騷擾邉鄙但廹扵飢寒耳上顧左右曰昨不欲盡令勦絶若縱殺戮即無遺類矣因釋其罪賜錦袍冠帯銀帛勞而遣之癸丑補捧日軍士李榮為虎翼副都頭初榮父璠為虎翼指擇使戍河西與繼遷遇手格殺數十人身被數鎗力戰未巳會馬中矢而踣遂沒于陣上哀其死事故録其孤因語殿前都指揮使王超曰繼遷領衆萬餘㓂邉與官軍遇扵隘口遂掩襲之殺獲甚衆李璠者向非馬倒亦不至扵敗超曰王師雖勝敵情難測望益謹邉備上深納其言詔澧州勿收蠻界歸業民租甲寅詔如聞小民知有恩赦故為刼盗自今不在原免之限令諸路轉運使自今管内增益户口及不因災傷逃移者並書扵厯委三司考較報審官院以為殿最乙卯福建轉運使請除漳州塘賣蓮花錢俾民獲利而便扵灌溉詔從之先是福建路不置惠民倉庫部員外郎成肅以為逺俗尤宜存撫請增置焉戊午詔從肅請癸亥漳州言山水泛濫壊民舎千餘區有溺死者詔為瘞埋免存者租賦給口糧丙寅令諸路轉運司申淳化惠民之制嵗豐熟則增價以糴嵗歉則減直而出之戊辰以囉朗族十六府大首領歸徳大将軍恩州刺史馬斡領本州團練使綏州界裕勒沁族首領李繼福為歸徳将軍充本族軍主辛未刑部員外郎直史館陳靖為度支判官靖屢上疏論勸農事又言國家禦戎西北而仰漕東南食不足則誤大計請益修勸農之法以殿最州縣官吏嵗可省江淮漕百餘萬復詔靖經畫以聞靖建議請刺史行春縣令勸耕孝弟力田者賜爵置伍保以檢察姦盗籍㳺惰之民而後作之詔京西轉運使耿望與靖共商度望奏靖所議皆可行又下三司議三司乞就委靖望等分路提舉勸農事然卒不果行也癸酉免杭州中等戸今嵗丁身錢旱故也户部使右諫議大夫索湘受詔詳定三司編敕與河北轉運使刑部員外郎王扶交相請託擅易版籍甲戍湘坐責為将作少監扶為監丞處州言稻再熟如京使柳開上言臣去年蒙陛下差知代州今年移知忻州毎見北界歸明人言契丹排比入冦次第甚大臣初未敢决然信之伏自八月以来聞河北邉上敵人屯結甚衆又數侵瓶形寨騷擾邉軍度其姦謀必不輕退深恐大寒之際契丹轉肆衝突臣愚乞陛下郊禋既畢慶賞才行五七日間速起聖駕徑至鎮州躬御六師奮揚武威勿生遲疑之慮勿聽猶豫之謀周世宗及我太祖太宗近事皆可法也况陛下諒隂三年禮無違者復此順動其誰敢當聖駕若過河北契丹當自引退四夷八蠻無思不服政在此舉矣契丹冦定州次懐逺驛詔遣南作坊使李繼宣領兵三千往襲之至則敵已壊橋繼宣梁木而度追奔五十餘里敵又焚常山中度二橋繼宣復領兵趨焉契丹聞之㧞寨遁去繼宣鋭扵撃敵數詣都部署傅潜請行潜每抑之不令逺襲以故無功此事不得其時附見十月末十一月庚辰朔廢齊州龍山冶務壬午以太常丞劉綜為河北轉運副使綜嘗上言州縣幕職官以昏耄放罷者其間有本實亷謹之士或㓜累無託或邱園無歸止藉禄養以濟朝夕一旦停廢則罹飢寒當在聖朝似傷和氣望自今並除致仕官又言法官斷獄皆引律令之文以定輕重之罪及其奏御復云慮未得中别取進止殊非一成不變之道且復煩扵聽斷望示約束不得復然河北承兵㓂之後民户凋弊吏部銓所除幕職州縣官皆四方之人不習其風俗且有懐歸之思以是政事多因循不舉請自今並以河北人充冀其安土樂居勤于職業詔自今親王領大都督節鎮州府者勿復兼長史乙酉饗太廟至太宗室泣下沾襟丙戍合祭天地扵圜丘奉太祖太宗並配升壇奠玉帛訖方諸罍洗再升壇如舊儀大赦天下御朝元殿受冊尊號丁亥宰相兵部尚書張齊賢加門下侍郎李沆加中書侍郎太宗時郊祀行慶群臣率多進改故孫何有釐革遷轉議左司諫耿望亦為言扵是内外文武官止加階勲爵邑云此據本志宰相轉官舊制兵書當轉吏部户侍當轉禮書今但加門侍中侍非進改也門侍中侍合班儀在六尚書常侍之下大中祥符元年始升在常侍之上合班次六尚書甲午以左神武大将軍徳恭為右衛大将軍判虢州左武衛大将軍徳隆為右神武大將軍判滁州徳恭等拜章願奉朝請從之豐州河北蔵擦勒八族大首領莭桑羅等以名馬来獻乙未詔以邉境繹騷取来月暫幸河北實録載親廵河北詔在十二月辛亥今從本紀命宣徽北院使周瑩為随駕前軍都部署邕州觀察使劉知信副之内侍都知楊永遵為排陣都監保平節度使駙馬都尉石保吉為北面行營先鋒都部署磁州防禦使康廷翰副之洺州團練使上官正為鈐轄楊永遵康廷翰未見丙申内園使曹珝坐閨門不肅責授均州團練副使珝彬子秦王女壻也己亥上狩扵近郊詔諸色違礙選人及白衣選人並與放選自是訖天禧三年凡七下此詔辛丑賜京城父老祝賛等九十一人布帛衣服兩浙轉運使請出常潤州廪米十萬石賑飢民從之戊申以宰相李沆為東京留守濠州刺史李著為大内都部署權知開封府魏羽判留司三司鹽鐵使陳恕為随駕轉運使宋朝要録以定國節度使魏咸信為貝冀路行營都部署上以太子太師分司西京張永徳宿将召入對便坐屢訪邉要十二月辛亥命為京城内外都廵檢使癸丑賜輔臣戎服散馬甲寅車駕發京師乙卯次長垣縣登行宫之東亭因視城郭謂左右曰民物甚蕃亦佳邑也遣使以茗果徧賜衛士命捧日左廂都指揮使張美等自澶州至天雄軍往来廵檢張羙未見丙辰次韋城縣登行宫之東亭見車坊後卒有弊衣者賜以緡錢丁巳次衛南縣戊午駐蹕澶州己未知冀州張旻遣使馳奏敗契丹於城南殺千餘人獲馬百疋蔚昭敏正傳云昭敏為貝冀行營都監契丹以五千騎突至冀州城南昭敏帥所部兵與戰敗之得其噐甲賊遁去而我師不失一人真宗聞之喜按實録此㨗以十二月己未到行在後八日丁卯乃書内殿崇班蔚昭敏為都監恐㨗時昭敏未為都監也當考是日斬捧日知糧軍典呉榮等三人於市坐盗減軍糧故也辛酉宴從臣于行宫以殿前都指擇使王超權都虞候張進為先鋒大陣往来都提黠馬步軍都軍頭呼延賛馬軍都軍頭王潜為先鋒濵州防禦使王榮馬步軍副都軍頭王繼忠為䇿先鋒内出陣圖示超等令識其部分進曲阜人繼忠開封人也王潜未見壬戍賜輔臣甲胄弓劔幸浮橋登臨河亭賜澶州父老錦袍茶帛癸亥十四日次徳清軍甲子次大名府上御鎧甲於中軍樞宻使王顯副使宋湜分押後陣横亘數十里威虜軍言契丹来冦出兵撃敗之殺其酋帥冦始至知軍石保興擅取庫物分給戰士主者固執不可保興曰城危如此何暇申覆事寧之後願償家財及㓂退具以聞上赦不問保興守信長子也河北民多驚擾丙寅遣屯田郎中李璠等八人分往邢洺祁趙雄霸貝冀諸州遍詣閭里諭以車駕已至大名速令歸業仍詔州縣倍存䘏之上登大名之子城南門樓問知府事劉知信曰城中居民幾何知信對曰主客合數萬家上顧謂輔臣曰河朔藩鎮兹為都會矣翌日名見父老八十四人勞賜之丁卯左侍禁閤門祗候衛居實自府州馳騎入奏駐泊宋思恭與知州折惟昌鈐轄劉文質等引兵入契丹五合川破巴罕太尉寨盡殺敵衆焚其帳千五百餘所獲戰馬牛羊萬計鎧甲弓劍千事賜居實錦袍銀帯束帛遷供奉官就賜思恭等錦袍金帯立功将士並升擢之賜蕃部首領物有差衛居實未見以濵州防禦使王榮為貝冀州行營副都部署先是都部署石保吉至天碓進師頗緩有詔督之及貝州則敵已退矣即召保吉還初河北轉運使裴莊屢條奏傅潜無将略恐失機會樞宻使王顯與潜俱起攀附頗庇之荘奏至輙不報潜屯于定州縁邉城堡悉飛書告急潜麾下歩騎凡八萬餘咸自置鐵撾鐵捶爭欲撃敵潜畏懦閉門自守将校請戰者輙醜言詈之無何敵破狼山諸寨悉鋭攻威虜兩晝夜不勝遂引兵略寧邉軍入祁趙大縱抄刼㳺騎出邢洺間百姓驚擾擕挈老㓜争入城郭鎮定路不通者踰月朝廷屢間道遣使督其出師會諸路兵合撃其都監秦翰及定州行營都部署范廷召等屢促之皆不聽廷召怒因詬潜曰公性怯乃不如一嫗耳潜不能答都鈐轄張昭允又勸潜潜笑曰賊勢若此使吾與之角適挫吾鋭氣耳聞者莫不扼腕廷召促潜不已潜乃分騎八千歩二千付廷召令扵髙陽關逆撃仍許出軍為援然潛固無出意及上遣石保吉上官正自大名領前軍赴鎮定與潜會撃潜卒逗留不發丙子詔御史中丞魏庠諭百官各上封章直言邉事此據孫何集乃此月二十六日事於是工部侍郎集賢學士錢若水言陛下躬擐甲胄駐于魏郡已踰浃旬戎㨗未至今所切者大率不過即今御戎之䇿将来安邉之術爾臣聞孫武著書以伐謀為上漢髙将将以用法為先伐謀者何葢将帥能料敵制勝也用法者何葢朝廷能賞罰不私也今則傅潜領數萬雄師閉門不出坐看敵人俘掠生民上則辜委注之恩下則挫鋭師之氣葢潜軰不能制勝朝廷不能用法使然也軍法曰臨陣不用命者斬今若申明軍法斬潜以徇然後擢取如楊延朗楊嗣者五七人增其爵秩分授兵柄使将萬人間以强弩令分路討除孰敢不用命契丹聞我将帥莫不用命退則亦死豈不懼哉懼則豈獨思遁抑亦来嵗不敢犯邉矣如此則不出半月可以坐清邉塞然後鑾輅還京則天威懾扵四海矣臣嘗讀前史周世宗即位之始劉崇結契丹入㓂遣大将楊衮領騎數萬随崇至髙平當時懦将樊愛能何徽等臨陣不戰世宗知之翌日大陣宴會斬愛能徽等㧞偏禆十餘人分兵撃太原劉崇聞之股慄不敢出契丹即日而遁是以兵威大振復収淮甸下秦鳯平關南如席卷耳陛下睿聖神武豈愧于世宗乎此所謂即今御戎之䇿也其将来安邉之術臣不敢廣引前事止以近事言之太祖制置最得其宜以郭進在邢州李漢超在關南何繼筠在鎮定賀惟忠在易州李謙溥在隰州姚内斌在慶州董遵誨在通逺王彦昇在原州但得縁邉廵檢之名不授行營部署之號率皆十餘年不易其任立邉功者厚加賞賚其位或過觀察使位不髙則朝廷易制乆不易則邉事盡知然後授以聖謀不令生事来則掩殺去則勿追所以十七年中北敵西蕃不敢犯塞以至屢遣戎使先来乞和此皆布耳目陛下之所知也伏望遵太祖故事遴擇名臣分理邉郡罷部署之號使不相統臨置廵檢之名俾遞相救應如此則出必撃冦入則守城不數年間可致邉𤇺罷警矣起居舎人直史館李宗諤言國家馭邉之術制勝之謀将帥之短長兵衛之多寡宸算廟略盡在彀中今之言事者不過請陛下大出甲馬益貯糧儲并力驅除分道掩殺此蓋言之甚易行之則難始受命則惟以攻堅䧟陣為壮圖及遇敵則惟以閉壘塞門為上計辜君父之重委致生靈之倒植興言及此誠可太息以臣所見有異於斯自古行軍出師無不首擇将帥夫将帥者不必居上鎮握禁兵者方付以閫外之事必先觀其取與察其智謀能摠千人者委以千人之權能敵萬人者授以萬人之職各令守一郡控一城分領驍雄爭據要害来則急撃去則勿追又豈須置三路部署之名制六軍生死之命使有材力之士不得施為縦欲立竒功報厚遇為人所制莫可得也今秋陛下推轂命将委以北面之事精兵鋭旅悉萃中山縁邉諸城皆受其節度選任非不至也權位非不重也吿戒非不丁寧也處置非不專也及匈奴犯邉河朔騷動冀趙之地生民罹灾田園一空老㓜四散以至嚴沍之月輿駕親征曽不聞出一人一騎為之救援即不知深溝髙壘秣馬利兵欲安用哉臣以為臨軍易帥㧞卒為将正在此時也有功者賞於朝不用命者戮扵市亦在此時也臣不敢逺引古事上煩聖聽近者周世宗西取秦鳯南平淮甸北收關南三數年間威震天下契丹屏氣不敢南牧其故何哉誠由髙平之戰斬大将何徽樊愛能數軰耳繇是将校股慄知法令必行無所假貸人人争効死力所向成功今駐蹕全魏咫尺疆場旦夕望有㨗奏當陳破敵之䇿焉可但引責帥之言迂懦之辭無益於事威令不振軍法不行雖有茍且之功蓋非長逺之道設若今兹戎敵遁去明年乘秋復来蹂踐田苖憑陵郡邑陛下復命前将使之扞禦乎此非臣所知也邉臣得以相效必曰彼為大将握重兵堅壁端坐不聞獲罪吾軰欲何為哉此則行姑息之道務因循之政致河北數千里精甲數萬坐餌於匈奴也前所謂易帥㧞将罸罪賞功時不可失惟陛下速行之然後下哀痛之詔行蠲復之恩囬鑾上都垂衣當宁豈不盛哉右司諫直史館孫何言陛下嗣位以来訓師擇将可謂至多以髙祖之大度兼蕭王之赤心神武冠扵百王精兵倍扵前代足以斷匈奴之右臂受呼韓之来朝分閫仗鉞者固當以身先士卒為心賊遺君父為恥而列城相望堅壁自全手握彊兵坐違成算遂使契丹焚刼我縣城繫累我黎庶陛下攄人神之憤怒憫河朔之生靈爰御六師親幸澶魏天聲一振敵騎四逃雖鎮定道路已通而徳棣烽塵未息此殆将帥未甚得人邉奏或有壅閼鄰近不相救援糗糧須俟輦輸之所致也将帥者何或恃勇無謀或忌功翫冦但全城堡不恤人民邉奏者何䕶塞之臣固禄守位城池焚刼不以實聞老㓜殺傷託言他盗不救援者何縁邉城邑地比犬牙如輔車唇齒之相依若頭目手足之相衛或託稱兵少不出或要之奏可乃行俟輦輸者何敵騎往還猋馳鳥逝贏糧景從萬兩方行迨乎我来賊已遁去此四者當今之急務也簡擇将帥則莫若文武之内參用謀臣防壅閼則莫若凡奏邉防陛見庭問合救援則莫若督以軍令聽其便冝運糗糧則莫若輕齎疾驅角彼趫㨗今大駕既駐鄴下契丹終不敢萌心南牧所慮荐食者惟東北無備之城繕完周防不可不謹且蕃冦西畏大兵北無歸路餘孽尚或稽誅奔突亦宜預備大河津濟處處有之亦望量屯勁兵扼其要害則單于係頸不日可俟矣右正言直集賢院趙安仁言臣以為當今有急務者三經乆有大要者五急務三者其一激勵戎臣舉賞罰之典自防秋已来有保一軍守一壘而有功者有握重兵居重地而無效者故未能屏桀黠之迹止狡獪之謀今若有功被加等之賞益以强兵使居要害之地無効者奪主兵之柄賜之重罰懲逗撓之失則軍威自振邉塵自消故賞罰不可不舉也其二振救邉民行優䘏之惠自契丹擾邉以来邉民有鬭敵之時沒於兵刃者遣使收瘞之有骨肉支離廬舎焚毁者本部撫䘏之有保守城壘失扵種蒔者有司給復之故優䘏不可不行也其三請車駕還京重神武之威陛下光宅中區明照四海以一方騷動勞萬乗撫廵今封疆之臣既行信賞邉鄙之俗又協來蘓所宜歸奉宗祧以安逺邇神武不可不重也大要者五其一選将略當今士卒素練而其數甚廣用之邉方立功至少誠由主将之無智略也豈非有一夫之勇者不足以為萬人之敵乎昔郤縠将中軍敦詩書說禮樂杜預平呉馬上治春秋葢儒學之将則洞究存亡深知成敗求之當世亦代不乏賢太祖太宗親選天下士今存在中外不啻數千人其間知兵法可為将者固有之矣若選而用之則總戎訓旅安邉制敵不猶愈扵有一夫之勇者乎况其識君臣父子之道知忠孝弟順之理與夫不知書者固亦異矣其二持兵勢京師天下之根本也澶魏河朔之咽喉也鎮定股肱之地也是知根本在乎深固咽喉在乎控制股肱在乎運用兵之衆寡貴得其宜若支大於體末重於本是以利噐授人也其三求軍謀古者用兵必有成算諮謀籌畫以賛戎機比来用軍都無此選自今凡命将守邉仍取識孤虚成敗知冦戎情状者參謀入官階資優與遷陟况今武舉已議復行其軍謀宏逺武藝絶倫科望依唐室故事復開此選其四修軍政古之名将必得衆心師克在和戰則必勝投醪挟纊史册具陳若非畏愛兼行豈得士卒樂用故糓梁傳云善師者不陣善陣者不戰言敵人畏其法令也今之将帥請先以軍政能否黜陟之則人人自謹於法令矣其五愛民力國家邉備尚嚴經費尤廣今嵗輦運固已重勞或未議蠲租與免縁科折變不須給復可息疲羸仍望特戒有司務令省事用全民力以備軍須陛下以上聖之資兼神武之略盪平敵冦正在朝夕臣之狂言姑以竭愚忠之一効烏足資廟勝之成筭哉右司諫梁顥言臣聞自古用兵之道在乎明賞罰二柄而已然而賞不可以獨任罰不可以少失故兵法曰罰之不行譬如驕子不可用又曰善為将者威振敵國令行三軍盡忠益時者雖讎必賞犯法敗事者雖親必罰故孫武斬隊長而兵皆整穣苴斬監軍而敵遂退以此言之兵法不可不整也昨者命将出師乘秋備塞而傅潜奉明詔握重兵逗撓無謀遷延翫冦守陴閉壁選懦以自全鋭卒精兵局束而不用以至蕃馬南牧邉塵晝驚河朔之民流移未息魏博以北蹂踐一空遂至鑾輅省廵聖君櫛沐殘妖未殄餘冦尚存此所謂以賊遺君父者也人怨神怒罪不容誅乃或赦而不問則何以謝横死之民或黜而不戮則何以恢用兵之略以軍法論之固合斬潜以徇軍中降詔以示天下如此則協前古之典章戒後来之将帥然後擇邉臣之可用者就委用之臣嘗讀前史漢李廣屯兵於邉行無部伍行陣就善水草人人自便不撃刁斗以自衛逺於斥堠未嘗遇害而廣終為名将匈奴畏威士卒樂用又唐髙祖之備北邉也選勁兵為㳺騎不賫軍糧随逐水草遇敵則殺當時以為得䇿望扵邉将中不以名位髙卑但擇有武勇謀略素為衆所推服者取十人人付騎士五千噐甲完備輕賫糧糗逐水草於邉上往復扞禦不得入郡邑亦不得一處相聚遇有敵冦随時掩殺仍令烽堠相望交相救應縁邉州郡守城兵帥即堅壁以待之遇㳺騎近城掩殺敵冦即城内量出兵甲援救如此則乘城者不堅閉壘門免坐觀於勝負扞邉者不茍依郡郭可行備於冦攘雖匪良籌且殊膠柱趙安仁梁顥疏上或恐在明年春今悉附見西川自李順平後人心未寧益州鈐轄鳯州團練使符昭壽彦卿之子也驕恣不親戎務有所裁决但令僕使傳道多集錦工織作纎麗所須物輙配市人賫納踰半嵗不給其直又縱部曲掠取之廣糴稻麥敗即勒僧道備償僕使乗勢陵忽軍校其下皆怨知州右諫議大夫牛冕寛弛無政事時神衛軍戍成都者兩指揮都虞候王均及董福分主之福御衆整肅故所部優贍均好飲博軍装悉以給費是月甲子十五日冕與昭壽大閲扵東郊蜀人喜逰觀兩軍衣服鮮弊不等均所部皆慚憤出不遜語戊寅晦冕具酒肴犒其牙隊而昭壽則無所設軍士益忿故趙延順等八人謀作亂
