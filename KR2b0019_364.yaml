body:
  text: 續資治通鑑長編卷三百六十宋李燾撰哲宗元豐八年冬十月甲子夏國遣竒朗威明濟勒阿克尼張聿正進助山陵馬一百匹己巳太皇太后諭輔臣曰民間保馬宜早罷見行法有不便於民者改之此據政目八日事今特書之詔緣邊禁樂除民庶軍營已有㫖外餘並俟三年初太常寺以治平四年禁樂故事緣邊臣僚止百日詔俟祔廟畢弗禁至是雄州言故事送迎北使及犒設北界取銀絹人皆不作樂故復有是詔命輔臣詣寺觀謝晴舊録云詔改新配法初神宗以流人離去鄉邑或疾死於道而護送禁卒失教習有往來勞費故倣古犯罪應流者加决刺隨所在配諸軍重役至是中丞黃履有言故令應配者悉配行如舊法新録因之按九月四日乙未所書即此詔也已入九月乙未此可削庚午臣僚言在京市易帳狀舊申三司勾考官制行分屬户部左曹元豐七年內外市易右曹總其政今改𨽻太府其帳當歸右曹從之辛未欣國長公主卒年四嵗神宗第八女也與上同母改贈鄧國特輟視朝三日癸酉詔倣唐六典置諫官其具所置貟以聞從劉摯之言也摯言在九月十八日甲戍詔已廢徐州寶豐監令户部速具諸監可裁減者以聞實録云詔徐州寶豐監罷鼓鑄以本路轉運司言闕銅而官吏糜廪給此據范純粹奏議五月末巳罷鼓鑄實録又於九月十九日書罷寶豐下監矣不應十月十二日方罷鼓鑄實録蓋誤也今改之十二月十四日又罷增置十四監丙子左藏庫副使趙懷義西頭供奉官䇿木多西京左藏庫努卜鼐齊各加恩轉兩官賞蘭州渡河進討之功也丁丑詔尚書侍郎給舍諫議中丞待制以上各舉堪充諫官二員以聞初中㫖除朝議大夫直龍圖閣知慶州范純仁為左諫議大夫朝請郎知䖍州唐淑問為左司諫朝奉郎朱光庭為左正言校書郎蘇轍為右司諫正字范祖禹為右正言令三省樞密院同進呈太皇太后問此五人何如執政對協外望章惇曰故事諫官皆令兩制以上奏舉然後執政進擬今除目從中出臣不知陛下從何知之得非左右所薦此門不可寖啓太皇太后曰此皆大臣所薦非左右也惇曰大臣當明揚何以密薦由是吕公著以范祖禹韓縝司馬光以范純仁親嫌為言惇曰臺諫所以糾繩執政之不法故事執政初除親戚及所舉之人見為臺諫官皆徙他官今皇帝幼冲太皇太后同聽萬幾當動循故事不可違祖宗法光曰純仁祖禹作諫官誠協衆望不可以臣故妨賢者進臣寧避位惇曰縝光公著必不至有私萬一他日有姦臣執政援此為例引親戚及所舉者居臺諫蔽塞聰明非國之福純仁祖禹請除他官仍令兩制以上各得奏舉故有是詔淑問光庭轍除命皆如故純仁改為天章閣待制祖禹為著作佐郎尋復以純仁兼侍講純仁待制即丁丑十六日祖禹為著作十七日純仁兼侍講乃二十五日今并書之純仁在慶州屢言邊事其初言伏見夏國差人詣闕多日未見放回近日探得賊中事宜漸却添屯兵馬必是發情疑阻却欲别生邊患伏望聖慈以陜西生靈之故稍從其欲使復常貢庶幾可以罷兵俾華夏復見太平則陛下好生之德洽于生靈祖宗社稷享萬世之安皆在陛下一言之賜爾臣嘗讀後漢光武報臧宫馬武詔書良有深誡臣恐陛下欲聞謹録繳進惟聖心採擇又言昔孟子謂以大事小可以保天下光武之詔其㫖亦同皆古聖賢至當之論前漢樊噲願得十萬衆橫行胸奴中及五代景延廣稱晉有橫磨大劔十萬口此皆前代武夫輕妄之言方今庭議之際伏望陛下採至當之論黜輕妄之言以安國家則天下幸甚又言近樞密院降到熙河奏邈川大首領溫錫沁所探事宜言夏國今年大旱人㬠饑餓及涇原路探到事宜亦言夏國為天旱無苗難㸃人馬臣亦恐西界只似昨來陜西㳂邊少雨其傳多有過當如漢詔所謂傳聞嘗多失實是也向來未舉靈武之師諸處皆言西夏衰弱及至永樂之圍致諸將輕敵敗事此可為近鑒也又言臣近聞夏國纍次遣使赴闕禮意恭順外議皆謂漸可罷兵竊知西人頓買漢物數目過多似不為頻來之計臣愚慮或恐分畫地界之際後欲阻兵脅盟臣已指揮㳂邊諸將寨柵常為意外之備更望朝廷戒敕邊臣不得少有懈慢其向來所增軍馬及創添吏員且與存留候將來畫定地界納到誓書抽减未晚蓋朝廷舉動夷夏所瞻固宜謹重及臣所奏請邊防利害并舉辟官屬亦望不付有司特降聖㫖施行免用常格阻礙臨時闕事萬一落賊姦便上貽宵旰之憂則臣不早陳述之罪萬死難贖矣詔監察御史兼言事殿中侍御史兼察事始用吕公著及劉摯之言也舊録云非先帝官制也新録云既云監察兼言事殿中侍御史兼察事事始於此則非先帝官制可見今去非先帝官制也六字按吕公著及劉摯實先後建白今明著其所以然政目云監察兼言事止四貟殿中兼察事止二貟前京東路轉運使吳居厚責授成州團練副使黃州安置副使吕孝廉添差監郴州茶鹽酒稅以御史言其苛刻故也五月十二日取勘政目云並坐違法掊刻以希進用朝散大夫傅堯俞為祕書監六月末司馬光薦承議郎集賢校理顧臨為朝奉郎吏部郎中詔夏國遣使進奉其以新歷賜之詔罷義倉其已納數遇歉嵗以充賑濟已卯資政殿學士正議大夫兼侍讀提舉中太一宫兼集禧觀韓維為資政殿大學士仍依守尚書例給俸廪以維先帝宫臣也政目云支尚書職錢米麥宫觀侍讀錢不支又十一月十六日御史劉拯言其不當實録不書正字范祖禹為著作佐郎承議郎孔文仲為校書郎陜西轉運副使葉康直李察並遷一官再任政目朝散大夫賈青提舉太平觀通議大夫天章閣待制楚建中通議大夫韓璹並轉官致仕政目權提舉淮南東路常平黃實提㸃開封府界諸縣鎮公事實好古子也元年十一月十八日孫升云云可考詔比者詔令屢下冀以均寬民力便安公私如聞官吏狃習故態不切奉行或致廢格使逺近之人未盡被惠自今仰悉心奉行監司檢察倘有違戾即御史臺彈奏侍御史劉摯言臣竊謂州縣之政廢舉得失其責宜在監司夫監司之任亦重矣人一有賢不肖則環地數千里休戚繫之曩時朝廷大更法度選建推行之人故不以資任務得果健强鋭焱厲風生之才蓋規以就事倚辦於一時及法行事立矣而其後用人猶復因襲未曽權量時宜有所張弛之也是以至今使者之政刻核𥚹迫相師成風郡縣承望亦莫敢不然使民不見德與義而惟刑是覿惟利是聞者蓋亦久矣斯豈政令之本意然哉奉宣繆戾積習至此故也比䝉聖㫖哀念元元取監司罪惡已甚者既去之矣然其餘人材頗尚駮雜情志未一各懷所私蓋其隂有觀望者則必習常而慢令以致惠澤之壅其淺中覬利者則又將矯枉而過正或廢其所宜治之事二者不可不察也惟得其人庶懲此患臣欲望聖慈詳酌河北河東陜西素號劇部向來所用使者出於暴進多非更歷民事人微望輕雖自過為威刻而下終不服今宜稍復祖宗故事於三路各置都轉運使用兩制臣僚充職以重其任自餘諸路亦望推擇資任稍髙練達民政識治體近中道之人分補監司之任明授之以詔令使忠厚安民而不失之寬弛肅給應務而不失之淺薄部使者誠如此州縣之政隨之則先帝之仁政陛下之恩德庶幾下究而與民休息無難矣考察見任之無狀者一切澄汰罷之被罷之人茍非有顯過宜還其資考别為任使要令不至於失職無聊而已方今先務恐實在此伏望詳酌施行摯言因此詔故附詔下詔內外所造軍器據見在料工製造其餘兵匠歸所屬民工放罷舊録云天下承平日久戎器不治先帝鳩工繕修以待不虞至是罷之新録辨曰熙寧繕修兵器已見神宗實録不必書於此自天下承平至罷之二十四字並刪于闐國貢奉使為大行皇帝飯僧追福降敕書奬諭禮部言舉人有永停取應及殿舉未滿未得入學者欲令應舉入學從之河次大名府小張口金部貟外郎范鍔同河北轉運相度鹽法先是監察御史王巖叟言竊見河北二年以來新行鹽法考觀其文纎悉皆具所以用意於國家收利於公上不為不至然立法之初必以謂官不勞而法可行民無苦而利可得臣今觀之大異於此運載之車名為和雇而郡縣鎮寨或無可雇者則不免有配車於上戶之擾主司移文則謂之和雇郡縣應辦則其實均科一嵗之間或至數四其能勝乎載而至官官自賣之勢須凖留以備消耗故買者又不免有分兩不足之弊平日商旅通行隨力大小乘時輦置更逺更僻鹽亦有餘民間不知有闕絶之患今車腳既艱運載不續則又不免有時時無鹽之歎謂之良法固如此乎臣竊度計議之人必曰止籠商賈之利以歸公家而無所增於民今則在在處處民間鹽價增貴一倍乃是既奪商賈之利又增居民之價以為息爾所以萬口咨嗟以謂不慣日食貴鹽如此又未嘗買之艱難如此也仍聞去城稍逺貧家下户往往不復食鹽至有以鹽比藥之語夫增價於民而收息於官以為異效其誰不能雖十倍之亦無難也顧於百姓何如爾伏惟河朔天下根本祖宗以來推此為惠願陛下不以損於民為利而以益於民為利復鹽法如故以為河北數百萬生靈無窮之賜貼黃稱慶歷六年嘗有臣僚擘畫鹽法一嵗之間比舊數可增錢五十九萬二千八百餘貫利之所得可謂厚矣仁宗曾不以為意而惻然發德音云朕慮河北軍民陟食貴鹽可且令依舊至今耆舊言之往往流涕其敕書刻石於北京今録本上進庶幾陛下得見仁宗之意體而行之以益盛德為社稷無疆之休又稱慶厯六年鹽稅嵗額止一十九萬餘緡今若依元豐六年未推行𣙜法以前嵗收鹽稅為額自己三十三萬餘緡比舊不為不增矣於是巖叟又言伏覩朝㫖差范諤相度河北轉運使范子竒所奏乞令鹽稅收十分稅錢事臣昨在河北亦知商賈有自請於官乞罷𣙜買而願納倍稅者蓋出於商賈患𣙜買之奪其利而巧為此謀主計者但知能於商賈倍得稅緡以為利不知商賈將於民間復增賣價以為害也臣近因論河北鹽法𣙜買不便事嘗録慶歷六年仁宗敕書繳進意謂得經聖覽不復更有此指揮今既未然理當再有論列伏以仁宗既不行三司榷買之法又不從都運司增稅之請直批云朕慮河北軍民陡食貴鹽可且令依舊一言感人淪於骨髓刻之琬琰明若日星方是時計嵗所增幾六十萬緡仁宗豈不知為公家之利溥且久邪意以謂藏之官不若藏之民圖於近不若圖於逺故特捐數十萬緡無窮之息以為數百萬家無窮之惠嵗月雖舊而恩意則新今陛下即位之始正宜復以祖宗一言感恱天下者不宜以小利失人心也夫小利得之易人心得之難得之難者陛下豈不惜邪借使使者復命以增稅為可行陛下遂將用其言而增之邪然則如仁宗勑書何勑書之語自河而北人人共知不可違而違之如陛下名義何臣誠知陛下無此心竊計為朝廷議者未之思耳且以利害義非善謀也以怨易恩非忠告也要之前日之德音不可忘今日之歡心不可失至理在目了無可疑臣乞罷鍔勿遣特以慶歷敇書申諭言者以昭陛下惠愛之心以塞計臣聚斂之意則不獨河北之人幸甚實天下幸甚實録但書范鍔同河北轉運司相度鹽法不書轉運使范子竒建議乞收十分鹽稅也獨巖叟章有此明年正月二十八日河北鹽法悉依舊當是不復從子竒所請豈巖叟此章力歟言之不可已也如是大抵舊録於元祐新政多抹殺不備載新録考之不詳多所因循更張美意往往不甚别白良可歎也王巖叟朝論云論遣范鍔增河北鹽稅云藏之官不若藏之民益於上不如益於下慶歷六年有人擘劃鹽法嵗增五十九萬貫餘仁宗云恐河北之民陡食貴鹽不從今敕書具在願陛下以祖宗為法即位之初正宜收人心不宜以小利失人心也再論增鹽稅不便上云更待商量奏云縱陛下未欲專斷而任大臣共議則願陛下以臣所奏章潜觀大臣之意其間詭辭以護一時之事者可見直辭以救百姓之患者可見幸陛下每出天語以申忠賢之論而主救患之謀亦足沮姦心行聖澤巖叟又言臣伏以朝廷知江西湖南鹽法為害之深而民無聊生首遣使以按之陛下惻怛而欲救之之心可謂至矣聞兩路之民北望鼓舞而相語曰幸朝廷知我之苦而念我矣立法以罔上之人將正其罪矣有相與為佛事於通衢以祝頌萬壽者有酌酒於市歡呼以相賀者有焚香於頭炷香於頂煉香於臂以迎使者推此以觀其於望陛下之恩何如哉雖解倒垂無以喻其急也臣竊知使者須明年仲夏乃可復命朝廷若必待使者之還而後更其法則逺民何負宛轉荼毒間尚此其久邪獨不念艱難之一日非平安之一日也臣恐有不及待陛下之澤而死者矣伏望陛下即降德音先罷其法以俟使者奏書而復議將來之所行則兩路生民雖死無恨元豐六年十二月初委陳思張士澄推行鹽法八年四月丁丑命陳次升察舉五月戊申次升兼領湖南元祐元年二月辛巳蹇周輔等責閏二月壬辰士澄等責巖叟上言不得其時附河北鹽法後庚辰侍御史劉摯言檢㑹准元豐五年五月七日門下省劄子門下省奏據給事中㕔狀封駮房勘㑹昨舊封駮司元豐三年七月十八日劄子節文御史中丞李定狀奏乞應有差除並令封駮司限當日關報本臺奉聖㫖依奏續准當年九月二日中書劄子節文同知諫院蔡卞奏乞應有差除及改更事件並令封駮司抄録關報奉聖㫖應差除及改更事件到封駮司者並令抄録關報者勘㑹近准新制撥封駮司歸門下省為封駮房其舊封駮司准朝㫖廢罷又凖官制新條諫院已廢諫官係中書門下官外即不言舊條合與不合行使所有本房承受差除及改更事件今來未敢依舊關報亦未敢便行住關白帖子稱如合依舊關報未審以何司存為名如以本房緣已𨽻門下省若以本省無關報外司之理及檢㑹公式令即無門下省關牒外司條式奉聖㫖更不關報臣竊以朝廷謹於出令故使官司更相檢察內之則門下得以封駮外之則臺諫許其論列然朝省之上事有漏泄法禁不輕誰敢傳者若非門下以時關移則臺諫所聞常在命令已行之後此定與卞之所以有請而先帝所以從之也其後給事中徒以封駮改司為房又疑內省不可關報外司遂作申禀致有續降指揮釐革今來惟是敕命已至六曹逐曹已作奉行方始隨事關報理有未安給事中失於駮正或雖駮而失當其差除之告命政令改更之制往往已授受施行矣而臺諫官方從其後論之雖以聖慈優容聽納必無難於追改若或者以謂號令已行不可反汗則是設官而無補於事也故臣愚欲乞且用元豐三年指揮凡差除及改更事件並令門下封駮官依舊於當日關報諫官御史臺所貴成命未下先事禆補而朝廷亦易於施行貼黃稱封駮司改為房名雖異而事任不殊若謂不可用關恐合以給事中移牒逐處乞詳酌不報元祐元年閏二月二十六日摯又言此癸未龍圖閣待制趙彥若兼侍讀祕書監傅堯俞兼侍講先是侍御史劉摯言臣竊以聖人之德其聰睿神智固天性之所自有然孔子曰吾非生而知之好古敏以求之者也孟子亦謂人皆有是四端猶火之始然泉之始達在乎充之而已茍不充之將失其本昔者周成王幼冲踐祚其師保之臣傅之德誼導之訓教者周公召公太公其人也夫左右之人既如此則成王雖幼其耳目所入蓋無有不正者矣我仁祖之初亦以盛年嗣服用李維晏殊為侍讀馮元孫奭為侍講惟兹數人皆名儒宿德極天下之選是時方親庶政聽斷之暇每於雙日召使入侍講說經典或讀祖宗故事盛明之政慶澤無窮恭惟皇帝陛下紹膺天命傳繼統業夫以異禀之質夙夜之善而又上有太皇太后陛下之至仁厚德保護開佑所以成就者罔不備至矣然方春秋鼎盛在所資養左右前後宜正人與居語默見聞宜正事是接所以起善養源保微謹始尊德美而長智習致廣大而熙光明則勸講進讀輔𨗳之官其可不審擇也哉伏見兼侍講給事中陸佃蔡卞皆新進少年越次暴起論德業則未試語公望則素輕使在此官衆謂非宜伏請罷其兼職以允公議仍欲望聖慈於內外兩制以上官內别選通經術有行義忠信孝悌淳茂老成之人以充其任遇非聽政之日便殿燕坐時賜延對使之執經誦說陳天下之義理今古君臣父子之道以廣睿智仰副善繼求治之意於是佃卞皆罷而彥若堯俞有是命陸佃蔡卞罷經筵實録並不書政目十八日垂簾諭講筵將開宜得老成端士趙彥若傅堯俞二人如何陸佃蔡卞年少代之夏國使吕則依威明快普等見于延和殿以其母梁氏之喪來告也詔皇太妃出入肩輿升降于㑹通門舊録云妃帝母非禮也新録辨曰皇太妃出入肩輿升降于㑹通門恐不可為非禮今去六字乙酉葬神宗英文烈武聖孝皇帝於永裕陵紹聖二年九月崇寧三年十一月政和三年十一月凡三加尊諡今但舉初葬時宋洪山集祭神宗皇帝文云維元豐八年嵗次乙丑十月六日大行皇帝遷玉坐于裕陵乾坤慘悽而變色臣庶奔走而同悲橋山一封人世萬古具官臣馮某恭聞大事屬在兹辰嚴恩已表於追崇薄奠薦伸於報慕逺通神鑒少述哀辭其辭曰自唐中葉凋喪衰圯生民荼毒禍燼五季祖功宗德開廓天地五聖光華羣生茂遂百三十年蓋古無治天心眷佑帝業增熾恭惟大行皇帝應運挺生寖昌寖明仁逺孝至文昭武成任相不疑隨弊變更憂民至勞度宜經營漢法新美舜官和平思古名將復唐府兵才謀兼資械用必精靈旌所向獷俗以寧威通西域教浹南溟金閶六部璧水三舍法度淵藪文章陶冶寒暑七閏胚渾一化方舉云亭之盛節逺追唐虞之逸駕嗚呼豈謂道髙德尊厭世乘雲大寐遽爾九齡徒云內聖慈親重明嗣君俯仰付托始終憂勤丹青之貴訓猶在鐘磬之洪音不聞嗚呼哀哉河洛初霜兮鴈飛緱嵩欲曉兮風悲玉輿停輪金阜啓扉弓劔藏而永閟几席撤而猶疑宫車寂寞以將返仙馭逍遙而不歸嗚呼哀哉守土職縻去國路遙銜恩兮孺慕送往兮魂銷感神遊於泉海徒灑淚於雲霄嗚呼哀哉恭惟尚饗丙戍詔寺監事干外路應取㑹催督者聽行下從刑部郎中杜紘請也舊録云自官制行寺監不治外事惟都水監大理右治獄得移文至是刑部郎中杜紘觀望改易制度援唐制有請從之新録並削去當考詔罷方田舊録云稅役不均久矣富者輕貧者重故下户日困先帝憫焉立法以方之其法詳悉徭役無偏重之患遽罷之新録辨曰神宗憫稅役之不均故立方田之法以均之然官吏不得人以致騷擾至是乃罷非遽也自稅役至遽罷之四十字並刪去熙寧五年八月始頒方田條式權發遣京西路轉運副使沈希顔管勾太平觀侍御史劉摯言希顔於本路妄有興作非法聚斂朝廷既委官究實尚以所按事狀下吏勘劾虛為煩擾乞先賜放黜使他路知戒故有是命舊録云以詔書言其貪新録因之今用劉摯奏議增修政目六月十二日令分析七月二十四日體量此云手詔希顔在任掊克朝散郎直龍圖閣權提㸃開封府界諸縣鎮公事范峋落職知臨江軍峋初乞免應奉山陵户部不許與户部更相論奏後乃乞行管認詔御史根究曲直劉摯言峋當黜責也密疏御史臺奏准尚書劄子戶部狀准都省送下朝散郎直龍圖閣權提舉府界諸縣鎮范峋奏應奉大行皇帝山陵依治平年故事自板橋至滎陽共七頓應干用度並係在京諸司排辦約用錢草斛㪷三十餘萬舊係三司支降己申户部乞行支撥臣備員畿內所集財賦粗足充用今來七頓支費欲乞以本司錢物管認應副所有在京合支撥見錢草斛更不煩戶部給降本部勘當府界財賦自前並係三司所掌至熙寧四年內方歸府界提㸃司支移其治平年自是三司應副元豐三年山陵合係府界應副排辦本司全不依元豐三年故事應副須要本部支降本部再下抄録三司許支錢物指揮文字又却隱占不肯繳申前來所奏却稱所集財賦粗足充用更不煩戶部給降即見前後申奏異同伏望特賜施行奉聖㫖令御史臺根究曲直所在聞奏本臺看詳今來大行皇帝山陵有司自當循例應辦其府界提㸃司明見元豐三年已應副錢物自合據當日名色管認排辦施行其提㸃司前後纍稱即無應副過錢物事件理曲奉聖㫖范峋落直龍圖閣與知軍差遣知吉州安福縣上官公頴奏伏覩詔書許中外臣僚實封直言朝政闕失民間疾苦臣先於六月初四日獻書言政令法度施之未得其宜行之未至於備者其弊有六內一件為免役取民之制未完臣以為使力田之民脫身於公游手之民仰公而食此朝廷立法之本意故因其産業之多寡輸錢於公公為募游手之民以用之又使其錢所入不與常賦相雜內之戶部則有左右曹之殊外之監司則有轉運常平官之别此朝廷示大公於天下明其所以取民者特以雇役而不以充國家之常用然臣竊怪耆壯户長法之始行也皆出於雇及其既久也耆壯之役則歸於保甲之正長户長之役則歸於催稅甲頭往日所募之錢除承帖人及刑法司人吏許用外其餘一切封樁若以為耆壯户長誠可以廢罷即所用之錢自當於百姓均减元額今則錢不為之减又使保正長為耆壯之事催稅甲頭任戶長之責是何異使民出錢免役而又使之執役也臣聞朝廷去嵗下四方修完役書今猶未降臣願陛下因其未降也詔有司以耆壯尸長封樁錢一切與民間均减元額又使寬剩之數其少者仍舊其多者不得過二分以備編户之逃移水旱之升降然則朝廷取民皆有藝極利澤之施莫此為厚伏望特賜詳酌施行蘇息元元使免困乏詔府界諸路耆長户長壯丁之役並募充耆長許第三等户長第四等以上戶應募等第給雇錢其舊以保正代耆長催稅甲頭代戶長承帖人代壯丁並罷如元充保正户長保丁願不妨本保應募者聽府界諸路合支雇錢權於役錢寬剩內支給其餘逐路所樁耆戶長壯丁錢數撥入役錢內一處支用通寬剩並不得過二分有剩即行均减舊録云詔耆長戶長壯丁之役皆募充其保正甲頭承帖人並罷新録因之舊録又云熙寧初聯比其民十家為一保選主户有心力者一人為保長五十家為大保選主戶最有心力及物力髙者一人為大保長十大保為一都保選主戶有行止心力材勇為衆所服及物力最髙者二人為都副保正相保相任古什伍法也至是罷新録辨曰熙寧保伍之法神宗實録紀之詳矣不必更載於此既詔耆長壯丁之役皆募充則保正副之罷自明自熙寧至是罷九十四字並刪去按此時保甲固在保正長亦未嘗廢新舊録皆誤也此據湖州新編元豐至元祐續令修入六月四日獻書言六事姓名當考據元祐密疏乃上官公穎也丁亥夏國主母殂差使副吕則依威明快普等詣闕訃告詔送學士院降回詔依嘉祐元年例支賜孝贈及安葬物色遣朝奉郎刑部郎中杜紘充祭奠使東頭供奉官閣門祗候王有言充弔慰使仍借供備庫使密記十月二十六日實録但書杜紘祭奠王有言弔慰吕大防奏川峽軍人犯法百姓犯盜並申鈐轄司酌情斷配從之又奏川峽官乞並從吏部差授詔吏部相度以聞二事據大防政目增入酌情斷配據密疏則從差官事令吏部相度元年四月十八日又六月二十二日可考天章閣待制范純仁兼侍講朝議大夫趙瞻為太常少卿開封府推官趙君錫為司勳郎中承議郎吕大忠為工部郎中己丑詔景福殿使武信軍留後李憲依赦勿問特罷內職其因功除授留後告令繳納尚書省以憲奏事不實不當引常赦不原之例故有是命此假新録並依舊録殊未詳盡當考政目云李憲罷內職落留後亦不載事因樞密院言定州新樂縣民賈澄進狀訴民間疾苦事內保甲每縣差監教官三人巡檢一員三班二人提㸃及行杖人於一場保丁五十人處科罰至四十九人仍各臀杖十三只决一邊更留一邊後次巡試科决又弓弩過硬致保丁頻負杖責擬定欲府界三路巡教保甲官并指使如保甲有犯並牒本縣無縣即申州軍行遣所有元降朝㫖許科决指揮更不施行從之詔提舉府界三路保甲官並罷令逐路提刑及府界提㸃司兼領所有保甲止冬教三月仍自來年正月一日施行實録書罷府界三路提舉保甲官諸路以提㸃刑獄兼領其保甲止冬教三月保甲自十月起教至正月罷見七月六日樞密院言逐將下公事自來並係將司施行緣知州知縣亦合同行今立條諸將下公事並本處知州同管在縣即知縣同管從之密記二十八日實録書樞密院言將司公事欲令所在守令同治從之免故相吳充家見缺買户絶産錢以其妻李氏自言也韓維言臣竊見先帝時大興甲兵西討夏國始以問罪為名既而收其地遂致夏人有辭違失恭順彼國之俗以不報仇怨為耻今其國力漸復必來攻取故地若不幸復奪去則先帝纍年勞師所得一旦失之似為可耻若興師拒戰則邊隙自此復開臣恐兵連禍結未有已時臣竊思兵之不可不息者有三地之不可不棄者有五請為陛下陳之伏惟皇帝春秋尚富太皇太后深居九重豈常習聞軍旅之事萬一寇兵犯塞邊書狎至發兵調食應接不暇或恐震驚上心焦勞聖慮此兵之不可不息一也自靈州之役永樂之敗關陜之力雕耗士氣未復今若再興大役必有失律違命散而為盜賊者外虞方作內患又起臣恐朝廷之憂不在夏國此兵之不可不息二也綿地千里屯兵數十萬必藉沉謀重望之臣為之統御忠義拳勇之將出當戰鬬幹事宣力之臣促辦糧餽歷數見在之臣復推近事之驗恐未足以充備此任而又兵械皆捐棄之餘帑庾有乏絶之憂此兵之不可不息三也先帝以秉常受朝廷爵命而國母擅行囚廢故發兵問罪今梁氏已死秉常復位所為恭順有藩臣之禮若及此時復其故地則神宗問罪之名不為虛語嗣皇賜地之意實為先志此地之不可不棄一也朝廷自得熙河之地嵗費緡錢五六百萬後得蘭州又費百萬以上所得愈多所費益廣拓地之無利亦已明矣此地之不可不棄二也議者或以為蘭州趨夏人巢穴至近最為形勝自餘亦有要害可以增置城堡棄之非便陛下若欲再興師旅收復靈夏之地則存之可也若無此意勞人費財奉空虛之地則是又添一熙河也伏望陛下以清靜為心仁惠為政竊恐此事不得更興於今日此地之不可不棄三也遼夏二國世為婚姻且有脣齒之勢萬一遼國貽書援先帝興師之意以梁氏死秉常復位為辭來請所失地則先得我之義理而又奪我之機㑹矣此時朝廷欲與地則是聽遼國之命而恩歸於彼矣不與則是章先帝之過虧大國之信而邊患復興矣此地之不可不棄四也中國之所以為可貴者為有禮義恩信也彼俗之可賤者貪婪暴虐也今操可貴以臨所賤則中國尊與其所欲以成吾所不欲則敵人服此地之不可不棄五也臣聞古公亶父居豳為鄰國所攻欲得地與民民皆怒欲戰古公曰有民立君將以利之今鄰國所為攻戰以吾地與民民之在我與在彼何異民欲以我故戰殺人父子而君之豫不忍為乃與私屬去豳止於岐下豳人舉國扶老擕弱盡復歸古公岐下及他旁國聞古公仁亦多歸之古公亶父周之先王也敵人所攻乃古公封國之本地尚不忍殺人父兄而有之其仁心感人之深故豳人扶老擕弱復歸之及他旁國亦多歸者其後世因其仁愛得民至於武王遂有天下今乃奪人之地又欲殺人父兄而守之與古公亶父異矣陛下試計修德行仁之效與用兵拓地之利孰為多少臣又聞齊宣王坐堂上有牽牛而過其下者王見之曰牛何之對曰將以釁鐘王曰舍之吾不忍其觳觫若無罪而就死地孟子以謂是心足以王矣今恩足以及禽獸而功不至於百姓是不為也非不能也臣伏見皇帝嗣位太皇太后陛下稱制以來凡令有不便於民者去之利有可及於衆者與之收進直溫之臣罷黜貪殘之吏始自京師以及諸夏歡欣仰戴如慈父母可謂仁之至矣今陛下之恩足以及中國而功不至於外裔真孟子所謂非不能也是不為也陛下誠能於此時特降明詔盡以向者王師所得土地還賜夏國則其君長荷陛下之恩意人民感朝廷之惠澤至於鄰敵聞中國之行仁政吾民與兵知人主之惜人命則其歡欣之聲戴仰之心將有甚於京師與諸夏者矣伏惟陛下監古公之修德推宣王之用心察孟子之至言亮愚臣之忠計濬發誠心斷而行之臣料不獨夏人感恱上天監德助順亦宜福祐無疆矣書曰惟德動天又曰至諴感神矧兹有苗此皆前代聖王行之已有成效願陛下勿疑若夫計已往之費吝難保之地耗金帛動甲兵以爭不可知之勝負而且有後患皆世俗之常談豈足為陛下道哉臣輒撰成賜夏國詔草一本并以上進貼黃稱臣今所陳竊恐邊防之機陛下或未盡經聖慮故不避喋喋陳述或輔臣奏請之際可以仰助睿斷只乞留中作主意施行又稱臣所陳述極有義理且思當今所宜無出此策願陛下詳覽而深思之若爭地用兵則向後禍福不可知矣又稱陛下若濬發誠心以息兵愛民為意自足以動天感人亦不須待其來請地然後賜之也又稱古人之所以待要荒但當自計利害而不當與之校也臣竊以為朝廷今日未是用兵勞民之時前代聖王屈已事小非一皆是此意况今自處義理甚髙非為屈也又稱臣今所言須及時為之乃可若夏國興兵來犯塞北人貽書為請地則失我機㑹不可用矣古人修德行仁不計一時利害何則修德行仁之功大世俗所計利害小大小相去如天地之逺也又稱臣今此策蓋以實先帝問罪之意廣陛下行仁之德內慰士民之心外消虜人之患尚未盡邊防利害竊聞朝廷已召知慶州范純仁純仁父子世為帥臣熟知北情邊事伏望聖慈更促純仁入朝面賜詢問庶為詳審其賜夏國主詔草曰向者神宗皇帝以爾世受封爵為我藩屏而國母與其用事之臣擅行囚廢故大興師旅以問厥罪比聞國母傾逝卿復領國事自先帝上仙繼遣人致弔與祭所為恭順有藩臣禮朕甚嘉之朕受天命統臨萬國效順者褒納違命者誅絶義無親踈朕嘉卿之復位率職哀爾民之喪地失業成先皇帝之聖志今以向者王師所得土地還賜爾國卿其明諭人民依舊住坐耕作毋蹈後患服我休命並勵忠勤維奏此策不得其時具位稱資政殿學士正議大夫兼侍讀按維十月十八日已加資政殿大學士又十六日除范純仁天章閣待制二十五日除侍講維言已召純仁則當在二十五日後既在二十五日後則當稱資政殿大學士疑編録偶脫大字耳又維草詔稱國母傾逝按秉常來告梁氏之喪乃十月二日則維奏此策必在十月末或十一月初也附見十月末更考詳侍御史劉摯言准吏部牒十月十六日三省樞密院同奉聖㫖唐淑問除左司諌等事又牒十月二十八日三省樞密院同奉聖㫖陸佃等罷侍讀事臣竊睹自來朝制及近降官制格凡差除有中書進擬者有樞密院進擬者有三省樞密院同進者蓋建官分職各有所治法無相參也三省樞密院同取㫖者似止於差除帥臣邊鎮大吏內臣近上差遣而已今差諫官罷侍講不委樞密院何為而預也外言籍籍皆以三省容縱密院侵紊政體莫不疑異臣竊謂國家所恃者在綱紀大臣所宜守者在名分綱紀正於上則下無邪志名分治於下則政無多敗一有奪移何患不起朝廷今日正當尊强君道謹守祖宗法制嚴臣下之分以消壓權僣之心今廢置官吏陛下大政而三省之事樞密院本非其職踰法出位橫造議論公然犯分臣恐積微至著交亂官守漸行私意以害政事上則陛廉之等慢下則傾奪之患生杜漸防微實繫國體欲望聖慈特降詔㫖戒諭三省樞密院臣僚凡以差除擬進者各依自來條制班次取㫖所貴正名定業事無侵逾以尊朝廷以正在位貼黃稱臣又慮上件差除諫官等事曽降聖㫖特許樞密院同進借有特㫖乃是聖恩優禮執政欲合同衆論之意而大臣之節自當引義辭免惜朝廷綱紀以安分守不應乘便冒進漸恐隳失體制監察御史王巖叟言風聞章惇於簾前問陛下御批除諌官事曲折再三語涉輕侮外庭傳聞衆所共憤謹按差除諫官自屬三省無所預於密院而惇不循所守越職肆言乃敢如此况陛下所除數人皆是天下公議從來願得以為諫官御史之人惇為大臣既不能薦賢以助國見陛下用賢又從而忌嫉之沮抑之臣不知惇何心以事陛下且御批除諌官祖宗以來亦是常事而惇以為陛下不當自除陛下聰明博問能得賢而進之不肖而退之乃是盛德而惇又謂陛下何從而知是不欲威權在人主端良入朝廷惇之用心不忠可見侵官犯分慢上瀆尊義所不容國有常憲乞行顯黜以嚴臣職以重主威又言臣聞外庭喧然皆言惇之强橫不獨侮玩衆人又敢輕易陛下臣當言職既有所聞不敢不言然此事惟陛下知之如臣言不妄乞付外施行劉摯又言伏見今月六日神宗皇帝靈駕進發凖敕前一日五使三省執政官宿于兩省及幕次竊聞宰相蔡確獨不曽入宿中外莫不疑駭伏以山陵國之大事遷坐發引葬之大節故前夕羣臣宿于內者陛下是夜躬行祭奠之禮臣子之心同於攀慕不得安寢于其私也下逮執事奔走之衆誰敢不䖍奉期㑹以共厥事而確位冠百辟身充山陵使正當典領一行職務而乃於是夜獨不赴宿慢廢典禮有不恭之心謹具彈劾以聞伏望聖斷特賜詳酌施行又言確如曽到禁門遇已鎖閉亦合立具因依奏入别禀處分不當公然便以不宿為是不報此第一疏十二月六日第二疏十二月十四日第三疏十二月十八日第四疏元年正月二十一日第五疏第六疏第七疏二十七日第八疏二月七日第九疏二月十五日第十疏左正言朱光庭言蔡確先帝簡拔位至宰相送終之際殊不盡恭靈駕發引在道確為大禮使當與扈從臣僚先後徐行常以妥安神靈為慮而確不務此每靈駕行輒先馳去數十里之逺以自便安而靈駕一行在後略不顧省為臣不恭莫大於此又言章惇欺罔肆辨韓縝挾邪冒寵章數上其言甚切此據新傳附見當求本章隨事編入初蔡確與章惇邢恕等共謀誣罔太皇太后自謂有定策功韓縝素懷不平及確為山陵使縝乃於簾前具陳確等姦狀由是東朝與外廷備知之及確使還欲以屬官髙遵惠為待制張璡為郎官韓宗文為館職太皇太后以問縝縝曰遵惠太皇太后族人璡中書侍郎璪之弟宗文臣之姪賞擢非次傳聞中外則是羣臣各私其親何以示天下然遵惠等卒用故事推恩此據韓縝新傳不知得之何書邵伯溫辨誣云縝素不平蔡確章惇用邢恕姦謀誣罔太母遂於簾前具陳之太皇太后與外廷方知其詳新傳或據此也確初為山陵使劉摯劾其不恭蓋第一章也山陵事畢確還朝不退言者踵至蓋十一月間其發端則自摯始外廷既知確邪謀而不敢正言之不知何故確先罷縝尚少留當緣發確等姦狀故東朝以為忠耳更須考詳先是有僧惠信者經開封府訴僧録司吏受贓違法差僧及無戒牒沙彌等赴福寧殿道場冒受恩澤知府蔡京憑僧録司回申惠信坐妄訴杖臀二十已而惠信復訴於祠部祠部符大理寺依法施行大理寺纍牒開封府取案開封府不報具申都省稱六察舉劾本府不當公事皆須奏禀朝㫖上簿或送寺推勘今祠部不問本府如何行遣徑送大理寺非法也乞根究有詔祠部分析祠部言惠信訴僧録司重祿公人及小師取乞金錢依條受理送大理寺即非舉劾開封府事本府乃以六察舉劾為言殊不類是月詔惠信經祠部所陳文狀更不施行據劉摯奏議更不施行惠信狀乃十月十六日聖㫖今附十月末侍御史劉摯言看詳重祿吏人因事受賕於法許告法之所當告則告之所當受也惠信之訟祠部之行皆是不違于理矣大理以惠信曽有訴於開封故取前案將有所質而開封前此謂惠信為不干已以杖一百坐之矣惠信狀內若雜有干已不干己事則不干已者當坐而干已者當行若狀詞皆不干已則惠信雖坐而僧師受贓於開封為所部犯法猶當舉劾行之故開封自疑不當恐因罥罣所以不肯出前案及引六察舉劾須禀朝㫖謂祠部不當直送大理為此奏者蓋所以護其失也及朝廷取到祠部分析狀自以依法受狀送所司未嘗及開封府前斷之當否則祠部開封互狀所論明白而事在大理者殊無相妨自當推結今乃因開封妄奏遂罷祠部大理所當治之獄則臣所未喻也若猶以祠部開封曲直未明故兩罷之在祠部開封則可也而惠信無辜被刑何其不幸吏受贓得免獨何幸耶吏受贓已告僧告之或誣而皆不治廢法也許之告許之受而不行廢法也有司出入人罪而不問廢法也法者天下公共守在有司雖人主不得而私之也今此指揮若謂出於聖意緣天下之公法陛下豈肯自廢之故臣知其必不然竊慮左右奏事畫㫖日失於詳述是非開陳滅裂致有此處分伏望聖慈更賜詳酌指揮令大理寺將惠信所告事推究虛實依法施行若祠部開封亦有罪狀伏乞一就勘結以正典憲貼黃稱凖國朝詔赦節文或詔令不允並仰舉奏今上件公事雖係已有聖㫖緣理有未盡須至申請內殿道場所用僧數不少皆出入宫禁而僧司並不選擇又吏人因而受贓輦轂之下敢冒法禁理無可恕者摯言從違實録不載按明年閏二月中孫升劾蔡京奏稱惠信緣臣僚論列送大理寺推治僧録司贓狀已明然則朝廷果從摯言令法官究竟此獄也但不知如何行遣耳明年正月二十九日摯章可考
