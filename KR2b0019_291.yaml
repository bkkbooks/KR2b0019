body:
  text: 續資治通鑑長編巻二百八十七宋李燾撰神宗元豐元年春正月庚戌詔河北轉運司令所在長吏躬禱名山靈祠旱故也壬子命輔臣祈雨魏國安仁保佑夫人張氏乞依赦封二代從之神宗乳母熈寕八年二月自崇國改封魏國甲寅右諌議大夫提舉崇禧觀沈立卒乙卯集禧觀使鎮南節度使同平章事王安石為右僕射觀文殿大學士集禧觀使放朝謝安石辭使相乞以本官領宫觀屢詔不允而安石辭不已故有是命交阯郡王李乾徳上表言伏䝉賜詔從臣所請自今復脩職貢己令安撫司各差人畫定疆界毋得輒侵犯臣已奉詔遣人送方物乞賜還廣源机榔等州縣詔候進奉人到闕别降疆事處分又詔河北路轉運司檢放水災民戸秋税欠負展限輸納又詔京西淮南路轉運司訪名山靈祠委長吏禱雨雪權御史中丞鄧潤甫言知虢州鄧綰近復龍圗閣待制中外之論皆謂綰在言路肆為邪慝隂連公府掾屬數為大臣祈㤙乞除大臣之子館職𫝊笑四方傷辱國體近世處言職者未嘗有也陛下以綰操心頗僻賦性姦回論事薦人不循分守故斥逐之今綰去位未㡬亟還近職搢紳藉藉莫知所謂葢蘇頌奪職八年而後復諌議大夫曽布五年而後得待制綰何人獨此超越乞追寢成命以厭公論詔綰罷龍圗閣待制以本官充集賢院學士知河陽丁巳詔國子監丞主簿省一員戊午判太常寺樞宻直學士陳襄崇政殿説書同修起居注太子中允集賢校理黄履太常博士集賢校理李清臣秘書丞集賢校理王存詳定郊廟奉祀禮文太常寺主簿秘書丞楊完御史臺主簿著作佐郎何洵直國子監直講宻縣令孫諤充檢討官先是手詔講求郊廟奉祀禮文訛舛宜令太常寺置局仍差定禮官數員及許辟除官屬討論歴代沿革以考得失故命襄等五年四月十一日成書熈寕十年十二月甲午黄履云云舊紀書命官詳定郊廟祝文皇城使達州刺史入内副都知蘓利渉為海州團練使時利涉校年止當遷官而詔以利渉逮事先朝藩邸故特有是命減併陳留捧日天武第七軍第一武騎帯甲剩員亳州第一龍衛帯甲剩員陳留第一亳州第二尉氏驍猛第二南京雄威第八咸平雄勇第二第三鄆州第五許州第六管城第七白馬第八總十三指揮每軍止各置一指揮並以五百人為額餘數聽額外收管經制熈河路邊防財用乞封樁息錢以備朝廷移用如鑄錢鹽井之類與轉運司錢本相干者並以熈寧九年為額本司認數撥還從之己未荆湖南路安撫使謝景温言奉詔相度轉運司乞補徽誠州溪峒蠻職名俸給事臣詳朱初平招撫楊光僣等各與官職請受其歸明地依舊住坐縁楊族諸蠻顧戀巢穴本亦不敢輕犯邊境昨既得官資請受安土樂業悉如故時所以近上首領争出聽命比至初平等不帶兵甲親入招安遂生驚疑己恐朝廷經畫其地故楊昌普等遮擁道路殺害使臣㡬成邊患今若修建城寨留戍官兵必以為朝廷利其土田増置州縣人懐遷徙之憂勢疑事迫必合而為姦今近上首領既已受命利於俸給其餘族類自不敢動又己有闗峡武陽兩寨控扼更不湏别作防守若二三年間恩信浹洽使其向化之人轉相勸諭然後經制城寨亦未為晚所欲補楊晟堅巡防名目縁晟堅號為桀黠蠻人畏服今忠順之誠尚未可保而遽補之職名萬一假朝廷之勢役屬諸蠻黨類附從非我之利謂當如舊為便其朱初平招納之時所差使勾當人楊晟勝等或先率衆通道或招同類來歸委有勤効未嘗推㤙及熈寧五年先歸明見為衙職者緫五十人並乞依轉運司所奏等第推㤙三州一鎮自未歸明以前每嵗進奉緫請劵二千四百餘緡昨補逐人官職料錢衣絹嵗計三千七百餘緡以進奉劵錢折除外嵗不過給七百九十餘緡若依轉運司所乞續補楊晟勝等名目湏給請受縁逐人所給止是一卒之費終其一身以嵗月較之不過十餘年盡矣詔如景温所奏令轉運司具合與楊晟勝名目請受以聞賜廣濟河輦運司上供米十萬石付徐州淮隂軍出糴以賑水灾饑民三司言建州熈寧六年買茶三十二萬九千餘觔有麤惡茶剥納錢三萬六千餘緡當於園户及干繫人名下理納雖淹嵗月以致破産未必能償乞計其直令復凖茶入官以寛逺民監催追擾之弊從之本志有此但改熈寧六年作今嵗則誤也提㸃南郊事務向宗儒乞自東壝門内布黄道至望燎位下禮院詳定闗報入式從之庚申詔權御史中丞鄧潤甫翰林學士許将與三司并都理欠司同詳定該赦合放欠負以聞辛酉詔川廣福建路官在任或替移未出本路身亡雖已請接送雇人錢許差坐船一隻又詔諸路州軍闕雨雪過多委提舉司月一申中書進呈令司農寺注籍癸亥詔自今學官非公筵不得豫妓樂㑹從知永興軍吕公孺請也判司農寺熊本言近諸路皆言甲頭催税未便今相度欲令諸路依元定役法錢數雇募戸長如未有人應募據税戸多寡輪四等以上保丁催税每都保毋得過五人每人湏催百戸以上量所催多少支給雇錢共毋得過元雇戸長錢數依舊一税一替願再充者聽如有違犯並依舊條内甲頭減戸長一等詔送司農寺相度以聞置催税甲頭在熈寧八年閏四月乙巳詔經制熈河路邉防財用司兼秦鳯路財用司御批改用字作利字改用作利此據御集其後却並作用字不知何故當考熈寧十年十二月辛丑己詔經制司兼秦鳯此又重出遣西京左藏庫副使元日宣兩浙路文思副使曹詔江南東路㸃閲團結諸軍降前知真定府龍圗閣直學士吏部侍郎致仕韓贄一官追其孫思純将作監主簿告通判鄭淵簽書判官王欽臣各降一官判官許章推官劉處厚各衝替司𨽻參軍劉舜理以下三人勒停北寨主楊充徳以下三人除名編管並不用赦降去官坐牒易州捕盜誤以解子平為北界地啟其争疆之隙也此事當考詳贄新舊傳俱不載此贄知真定時乃治平二年詔提舉成都府等茶場司李稷相度置場買茶聽商人於熈河路入錢及糧草定價給引指射請販利害以聞甲子詔入内内侍省闕官罷都知張茂則都大提舉修閉澶州曹村决口命龍神衛四廂都指揮使榮州防禦使燕達為提舉本所兵馬總管仍於北京差禁軍二千人𨽻總管司詔權發遣䕫州路轉運副使董鉞成資日升一任留再任仍自今夔州路轉運使副判官提㸃刑獄如令再任者並取裁與升任或減磨勘年審官東院言廣南兩路員闕願就之人少欲乞水土惡弱處為一等繁難處為一等其餘並為一等令轉運司保明申奏從之司農寺言諸路命官使臣因軍期亡殁其子孫不該廕免者本户役錢減放五年從之詔免京東西路轉運司年紀封樁錢糧以本路言水災闕之故也乙丑遣官謝雨詔自今樞宻院諸房副承㫖出職與主事請受為州鈐轄權發遣三司使李承之言近年以來朝廷寛假資格稍髙之人為其衰遲或不任事未欲遽令休退故置提舉管勾宫觀之職優與俸禄以示始終恩意之厚不立員數而臣僚趨閒貪禄冒昧無耻或精神未衰年齒方壮便私避事亦求此職條制既寛初未釐革故今内外宫觀約百餘員無纎芥職事嵗費廩食不下數萬緡臣竊惜之乞今後在京宫觀提舉提㸃管勾官共毋得過十五員諸路倍之如有除授令依例待闕所貴勤勞官守之人有以區别不虚費國用詔自今陳請宫觀等差遣人年六十以上聽差仍毋過兩次宫觀限年及次數墨本在二月辛亥今從朱本移入此詔以太皇太后聖體乆未康平其令開封府及諸路訪衆所見效口齒科給装錢乘驛赴闕又詔經制熈河路邊防財用司根括冒耕地為官荘限半年聽民自陳其方田更不施行舉貸止支錢納日計市直許以糧折納收息二分願納錢増一分熈寧七年三月六日又元豐元年十二月十七日可考司農寺請令諸路依舊置牙司從之丁卯詔提舉永興等路刑獄公事王孝先置獄涇州根治摩丹當博事能自陳即免罪若告得實者與班行酬奨事具二年五月乙未成都府等路茶場司言應賣茶官如非其人許本司選擇於事簡處對移如闕正官即於得替待闕官内差權或指名牒轉運司差從之樞宻院言昨降濶閃弓樣令軍器監依樣打造今一千三百六十張己了九百三十張己了未樺一萬張未計料詔其己了并未樺兩色内共先次支二千張與提舉教習馬軍所元豐元年正月二十一日手札戊辰録三班奉職劉通一子為三班借職通随軍攻討山後生羌充中軍大部騎隊戰殁故也後父昌祚言通無子以其弟逸之子維為後詔授維官為通後詔秦鳯等路轉運副使同經制熈河路邊防財用太常博士趙濟候經畫就緒與除館職又詔司農寺應常平存留一半錢糓糶糴數目每嵗終類聚於次年春季㸃校仍開具逐路以聞賜度僧牒百付京東路轉運司撥還徐州築城興置木岸等所借常平錢前司門郎中王伯瑜乞改京東河北四路産鹽場為市易鹽務官買於竈戸以售商人詔都提舉市易司召伯瑜審議蘓軾上韓絳書論此軾時在宻州葢熈寧七八年事當考伯瑜提舉河北京東鹽税再任在熈寧五年十二月詔同提舉荆湖北路常平等事著作佐郎張琬衝替坐越職言荆南張頡不當也熈寕十年七月辛未頡自京南帥移廣西漕元祐元年七月己丑頡除户侍蘓轍論奏張琬所劾事具注熈寧十年七月辛未頡移荆南時張昪有子名琬不知即是此人否己巳著作佐郎權檢詳兵房文字范育復崇文院校書詔河北路權停折納以經水災糧草貴也刑部員外郎知制誥熊本落知制誥為屯田員外郎分司西京饒州居住大理寺丞權外都水監丞陳祐甫為潁州團練推官權知都水監主簿司農寺主簿婺源縣丞史邈追兩官與逺小處合入差遣權外都水監丞主客郎中范子淵追一官差遣依舊並免勒停權河北東路轉運副使金部員外陳知儉追一官衝替文彦博特放大名府冠氏臨清清平縣干繫官吏并東流南岸都大司並令提㸃刑獄司劾之其運河置牐令都水監再相度本坐按視濬河不實縁疏濬有河退地二萬二千三百頃而附㑹報不以實法非因公事不得赴州郡酒食而本違法赴彦博㑹子淵所稱河退地雖實而以二年數誤併為一年奏上祐甫邈知儉皆附㑹失實故有是命濬川杷僅同兒戯子淵所稱固多妄然邈初勸本先行河决利害乃見彦博而本言彦博三朝舊臣小利害安能動揺又修私敬於彦博子淵具以告故上不直本也朱史削去濬川杞同兒戯及上不直本等語專以元㫁案修定新本已復存之元斷案固不可隠落而墨史所書乃實事也九年十二月癸未始命本相視舊紀書熊本按視濬河附下失實落知制誥分司西京新紀不書鄧潤甫作熊本神道碑云㑹中貴人程昉欲於衛州西南鑿隄引河通江淮都水丞范子淵建疏濬司以鐵龍爪疏黄河謂可回奪河勢欲附㑹退灘地為疏濬功事下河北安撫司帥臣文潞公言小臣興功罔利皆非實詔公覆視公還奏昉云六隄引河非是䟽濬計功皆妄願先罷提舉司已而諫官論公甞以議事㑹食大名府非法坐降屯田員外郎分司西京然亦廢漕河罷䟽濬司碑蔡卞書彭汝礪作本墓銘云㑹中貴程昉欲作運河通江淮都水丞范子淵以鐵龍爪䟽河謂可回大河之勢而附㑹退灘地為䟽濬功文潞公判大名府言小臣興功罔利欺上皆非實公被命覆視将行執政以利害啗公公哂之既至具得欺罔状還奏乞先罷都大提舉司寖與時齟齬公論之益急言者遂斥公嘗以議事㑹食大名非法坐降屯田員外郎分司西京未㡬運河塞䟽濬司亦罷庚午詔屯田郎中前知洺州萬賾除落差替令河北西路提㸃刑獄韓宗道具析體量賾違慢詔條不實因依以聞初宗道奏賾奉行條法有違而賾自列辨正朝廷知其無罪也其後宗道以體量不當罰銅十觔十年三月二十一日河北憲司言賾不堪治洺却不載差替指揮辛未命度支員外郎秘閣校理同修起居注檢正中書戸房公事安燾假左諫議大夫史館修撰為髙麗國信使著作佐郎集賢校理同知太常禮院林希假右正言直昭文館副之先是權知髙麗國王王徽比年遣使朝貢上嘉其勤誠待遇良厚故遣燾等使其國九月二十一日回至明州舊紀但書遣官新紀乃出安燾姓名詔河北東路縁邉軍留糧三年餘州軍留二年支遣外其餘聽依市直量減價糶毋損元價其錢封樁候嵗豐糴入元數詔成都府路轉運司劾成都府官司越職受理茶場司事者茶園户等如有罪亦劾之已決者具析以聞以李稷言知成都府劉庠受名山知縣楊少逸越訴事不可提舉茶場司故也初少逸因民訟以状白庠願聞於朝督茶吏路玠盜𫝊郵而藏之庠具奏其事且言𣙜茶害逺方請重黜玠而稷方主玠論庠越職故有是詔此據吕陶誌庠墓三司乞量増在京酒行麴錢於年額減麴三十萬觔遇閏年増造萬觔均給從之熈河路經畧司張詵乞下監司收捕遊邊人𫝊押歸本貫詔經略司發遣許人告賞錢百千犯者不用䕃官員具案聞奏壬申光禄卿知潞州史炤再任炤考課為河東第一故也詔樞宻副都承㫖張誠一與髙麗國信使副同詳定一行儀物上批故贈康王宗樸先帝近親其子仲容仲壬候服闋各遷一官女二人與縣主後毋得援以為例癸酉司農寺言淮南東路提舉司乞本路縣並用鄉村民戸物産實直錢數敷出役錢從之復桂州修仁鎮為縣閏正月丙子朔權發遣户部副使兵部郎中陳安石為集賢殿修撰河東都轉運使尋詔河東路十三州嵗給和糴錢八萬餘緡自今罷之以其錢付轉運司市糴糧草先是安石乘驛與知太原府韓絳同轉運司講求邊儲利害絳乞改和糴之法減放原數三分罷官支錢布但寛其支移之苦則實惠己及於民遇災傷十七則又除之而安石言十三州二税以石計之凢三十九萬二千有餘而和糴之數凢八十二萬四千有餘所以災傷舊不除免葢十三州税輕又本地恃為邊儲理不可闕故也其和糴舊支錢布相半數既畸零民病入州縣之費以鈔貿錢於市人畧不收半公家支費實錢而百姓乃得虚名欲自今罷支糴錢歲以其錢支與縁邊州郡市糧草封樁遇災傷據民不能輸數補填如無災傷三年一免輸以封樁糧草充數即不湏如韓絳減數三分及災傷除十七朝廷以為然乃命安石為河東都轉運使悉推行之又降是詔詔乃初十日事今并書之熈寕九年十一月十四日韓絳云云十年九月十八日絳又云云食貨志第五巻熈寧九年十二月知太原府韓絳云云元豐元年閏正月詔遣三司户部副使陳安石詣太原府與絳及本路轉運司共議其事安石言永利東西監鹽請如慶厯前商人輸錢於麟府豐代嵐憲忻岢嵐寧化保徳火山等州軍本州軍乃給劵於東西監請鹽以除加饒折糴之弊仍令商人自占所賣地即鹽已運至場務者商人買之加運費如是則官鹽平商販通於事簡便朝廷行其説即除安石為河東都轉運使安石請犯西北青白鹽者以皇祐敕論罪首從皆編配又青白鹽入河東犯人罪至流所歴官不察者罪之四年七月安石自言元豐元年奉詔治鹽事歲有羡餘及増收忻州鹹城鐺户馬城池鹽課詔安石遷官賞其屬五年四月詔安石前後奏請和糴鹽礬坑冶之類施行已就緒召為户部侍郎其職事委荘公岳蔡煜奉行之三年閏九月十一日議鹽賞河東轉運副使國子博士趙子㡬提㸃三司帳司勾院磨勘司仍自今依三司判官法差人提舉修閉澶州曹村决口所兵馬總管燕達言所總士卒甚衆如有犯無禮及呼萬嵗者即於豁口處斬若有扇揺軍人畧奪財物及叫呼動衆為首情重者亦乞斬訖以聞為從者減等配千里外牢城從之仍詔差雲騎第六一指揮為達牙隊中書言在京舉差選人處欲並令舉京朝官或使臣見任選人聽滿任惟市易上界監官檢估官雖進納選人聽差從之仍候見任人滿日施行提舉修閉曹村決口所言以今月丙戌築簽隄開脱水河遣權判太常寺李清臣乘驛祭告就差走馬承受韓永式齎香建道場三晝夜仍令候河水稍渾閉口即毋得沙損京東一帶民田丁丑詔自今大禮聴起居郎起居舎人奏薦親族至六年復罷中書時政記云熈寧十年十一月南郊奏薦恩澤共四百餘員因有詔添入兩史官奏薦河東經畧使韓絳言麟州静羌寨星最朗木𤓰舖地委係省田即非兩不耕地管勾軍馬邢佐臣偏見遂非遷延不決中書進呈詔劾佐臣罪既而上批早來取勘邢佐臣不處畫地界事恐自有理可且令分析以聞後佐臣言既為經司體量豈有不實乞移河北一任遂移恩州鈐轄戊寅三司請應在官司支係省錢物及抛降計置出納移用並闗申三司相度指揮從之荆湖北路提㸃刑獄司乞辰州㑹溪城黔安寨依沅州城寨例置牢屋區斷公事從之前知曹州劉攽言伏見知濟隂縣羅適開導古滉河決洩積水有功適議以為若明年春許差人夫及聽民願併力施功則爾後水害可使永除乞下本州速與應副上批可記適名姓俟府界劇縣有闕與差以考其治能之實於是以適知陳留縣仍詔適留舊任候見任官成資日交替八年五月十八日攽已薦適今又薦詔提轄修京城所於廣固軍士内選及等者給羣牧司馬教習武藝俟有精熟引見填配管城武騎白馬寧朔指揮闕額己夘秦鳯等路提舉常平司乞増募州縣裁減過當役人及増雇錢從之東上閤門使曹評為西上閤門使以太皇太后生辰恩也前安南道經畧招討司言昨官軍奪決里隘福建路有應募二百二十一人詔各以功次遷補及賜帛有差權荆湖南路轉運副使朱初平言下班殿侍楊昌鑎是徽州黄石團奉職光鎮子自陳三州一鎮補班行人甚衆未有一人出官者望優與推恩詔授昌鑎三班借職増差監潭州税詔河北東西永興秦鳯京東東西京西南北淮南東西路轉運司並依未分路以前通管兩路其錢榖並聴移用除河北陕西外餘減判官一員庚辰命御史中丞鄧潤甫知制誥孫洙並兼詳定重修編敕詔開封府界提㸃諸路轉運副使判官罷兼提舉常平司又詔權同判都水監劉璯覆檢計曹村決口功料以聞司馬光記聞云元豐元年春塞曹村決口發民夫五十萬役兵二十萬云欲鑿故道以導之不行則決河北岸王莽河口任其所之恐其浸淫南及京城故也天章閣待制韓縝都水監丞劉璯河北轉運判官汪輔之掌之按韓縝於正月戊午相視決河囬乞止用新河量興功増修後不見縝督役河上不知司馬光何以云然今因劉璯覆檢計功料附注更當考詳上批近降相州吏人於法寺謂求失入死罪刑名事縁開封府刑獄與法寺日有相干深恐上下忌礙不盡情推劾致姦贓之吏得以幸免宜移送御史臺相州獄乃鞫法司潘開行賂實録具有姓名蔡確傳獨稱馮言獄馮言即失入死罪者見六月辛酉初韓琦判相州有三人為刼為隣里所逐而散既而為魁者謂其徒曰自今刼人有救者先殺之衆諾他日又刼一家執其老姥榜棰求貨鄰人不忍其號呼來語賊曰此姥更無他貨可惜榜死其徒即刺殺之州司皆處三人死刑房堂後官周清本江寕府法司後為三司大将王安石引置中書且立法云若刑房能駮審刑大理刑部斷後違法得當者一事遷一官故刑房吏日取舊案吹毛以求其失清以此自大将四年遷至供備庫使行堂後官事相州獄已決數年清駮之曰新法凢殺人雖已死其為從者被執雖經拷掠若能先引服皆從按問欲舉律減一等今盜魁既令其徒云有救者先殺之則魁當為首其徒用魁言殺救者則為從又至獄先引服當減等而相州殺之刑部不駮皆為失入死罪事下大理大理以為魁言有救者先殺之謂執兵仗來鬭者也今鄰人以好言勸之非救也其徒自出己意手殺人不可為從相州斷是詳斷官竇苹周孝恭以此白檢正劉奉世奉世曰君為法官自圗之何必相示二人曰然則不可為失入奉世曰君自當依法此豈必欲君為失入邪於是大理奏相州斷是清執前議再駮復下刑部新官定刑部以清駮為是大理不服方争論未决㑹皇城司奏相州法司潘開賫貨詣大理行財枉法初殿中丞陳安民簽書相州判官日斷此獄聞清駮之懼得罪詣京師歴抵親識求救文彦博之子大理評事及甫安民之姊子吴充之壻也安民以書召開云爾自來照管法司竭其家貲入京師欲貨大理胥吏問其消息相州人髙在等在京師為司農吏利其貨與中書吏數人共耗用其物實未甞見大理吏也為皇城司所奏言齎三千餘緡賂大理事下開封按鞫無行賂惟得安民與開書諫官蔡確知安民與充有親乃宻言事連大臣非開封可了遂移其獄御史臺葢從確請也辛巳翰林侍讀學士寳文閣學士提舉中太一宫吕公著兼端明殿學士知審官西院先是上批公著侍從舊臣宜除翰林學士承㫖兼舊職而公著以齒髪向衰辭不就故改是命太常博士集賢校理劉奉世直史館為修國史院編修官詔開封府劾權户部判官主客郎中張充宗内殿承制勾當右騏驥院髙遵制接伴遼使縁路不法事先衝替聴追攝後充宗遵制各追一官勒停坐以違禁物償遼使所亡器皿於驛舎與雜户通故也斷㫖在六月己巳今并書詔京東路轉運司許借封樁差軍代役人錢五萬緡西路轉運司許借坊場錢十萬緡預置上供紬絹壬午廣南西路經畧司言縁邉寨鎮使臣年滿及見闕無人願就乞自今權免同罪更不取願就状詔本路縁邉寨鎮使臣自今並依五路舉官條奏舉權免取願就状候交人入貢取㫖權發遣本路提㸃刑獄劉宗傑言邕州修城不依宣撫司指揮丈尺乞下經畧司相度修築詔干繫官並劾罪其提舉官劉宗傑自案舉特免劾委經畧司相度所築城如堪乆逺守禦即督功完就若低怯難以禦敵别計工以聞復置三司帳司催驅官一員從李承之奏請也禮部言禘祫之外親祠太廟並以功臣配享從之去年十二月甲辰初有詔兩紀並書此詔中書立給散常平錢榖賞罰法以聞又詔常平錢糓當輸錢而願輸糓若金帛者官立中價示民物不盡其錢者足以錢錢不盡其物者還其餘直常平倉錢糓其在民者有常錢春散之斂從夏秋税有所謂緩急闕乏而貸者皆定輸息二分糓則嵗豐量増價以糴嵗饑減時價糶之以賑饑又聽民以金帛易糓而有司少加金帛之直凢錢糓當給若糶皆用九年詔書通取留一半之餘此據食貨志第一卷係之元豐元年檢尋月日未見今附此立給散常平錢官賞罰後實録稱賞法恐字誤當作罰也七年九月二十六日并九年正月九日又二十二日並合参照五月十七日實録有詔常平錢穀願以穀及金帛准市直中價計二分息折納者聴即此事也或移此附彼法寺奏新知福州曽鞏遷延不之官等罪詔特罰銅十觔癸未宣徽使王拱辰請以女童代集英殿大燕小兒隊舞從之知諌院蔡確言伏見陳繹復知制誥案繹汚醜狼藉道路共傳徃在鄧州遂致閨門之禍其子與婦一夕同命而繹傲然無哀戚慙赧之容及還京師隂與中書屬官張諤練亨甫等交相朋附因公事受張諤私簡蹤跡己露不可更汚侍從詔陳繹落知制誥為秘書監集賢院學士斬内殿崇班机榔縣巡防地分陳嵩刺配三班差使机榔縣守把胡清沙門島坐妄稱賊至無故擅棄城寨而走也甲申以光禄寺丞上官均為太子中允權監察御史裏行中丞鄧潤甫知雜蔡確薦也均家𫝊云均用蔡確薦為御史四月乙夘可見内殿承制謝季成權提舉訓練福建路團結諸軍詔編修明堂式所併歸提㸃南郊事務所比較熈河財利所併歸經制熈河財利司其詳定編修令式及詳定一司勅並併歸修内諸司式所一路一州一縣勅併歸重修編勅所詳定閒冗文字所令孔目房檢正官結絶以上除見存外並罷局餘並依限了畢限外官吏罷添給又詔刑部大理寺自今奏舉習學公事並舉曽試刑法得循兩資以上人賜度僧牒百付河北東路轉運司買材木應副大名府澶州修倉先是上元張燈太皇太后以齒疾不能食不出觀乙酉上復令禁中張燈露臺妓樂皆入太后疾尚未平酒數行而起此據司馬記聞丙戍詔應捕盜公人罰銅錢並充轉運司捉賊賞錢丁亥大名府元城縣主簿吳璋上所注司馬穣苴兵法三巻詔送武學看詳其後武學言有可采詔璋候武學教授有闕試兵機時務䇿各一道取裁戊子太子中允權監察御史裏行彭汝礪為館閣校勘江南東路轉運判官既而汝礪辭校勘從之辭日復上疏論時事且言不患無将順之臣患無諫諍之臣不患無敢為之臣患無敢言之臣上察其忠慰諭乆之命刑部員外郎檢正中書吏房公事向宗儒太常丞檢正中書户房公事畢仲衍並編修中書備對宰相吳充以聖問多出意表故請為此書聖問多出意表據李清臣與許将書三年八月十一日書成己丑詔贈尚書令韓琦依趙普例不加贈又詔河北路以常平米賑濟饑民庚寅福建路體量安撫司言捕獲廖恩黨龍騎卒李員楊禪乞法外重斷所兾元刺充軍之人有所畏憚不敢走竄上批並處斬梟首示衆辛夘中書禮房習學公事蔡京言御寳批降指揮未經編録成册恐嵗月滋乆本末不全乞委官編録從之仍命京管勾詔宣徽院等處供報修注事旬終月終自今更不供起居院直供編修院日厯所壬辰以權知開封府樞宻直學士右諫議大夫孫固同知樞宻院事右諌議大夫集賢院學士同修國史蘓頌知開封府癸已詔任縁邉及黄河地分官試刑法者並湏任滿待闕在一季内者亦如之三司乞裁定諸路預買匹帛價羣牧司乞於徳順軍置場買馬並從之詔大理寺丞王欽臣展磨勘四年前降一官指揮更不施行其轉太常丞及降太子中允勅並追毁坐定奪解子平地界不實案未上年例當遷已改太常丞及案奏特㫖奪一官而法當自未遷官時責降故也甲午詔提舉官並差朝官資任服色添給錫賜序官人從並依轉運判官例其當舉於開封府界提㸃諸路轉運使副判官提㸃刑獄見舉官數内均減之後立法諸路提舉所舉官計二百有九人内一百有一人均減増定此墨本所書朱本簽貼云取㑹到數各不同亦不湏載削去詔鄆州壽張知縣范規濟州鄆城縣牛在天各與堂除差遣以縣水災率市民䕶城有勞也又詔提舉司天監近校月食時分比崇天明天二法已見新厯為宻又前閏正月嵗在戊子今復閏於戊午恐理亦不謬宜更不湏考究其所差講究新厯官等並罷衛朴給路費錢二十千先是朴在熈寕初更造新厯至十年議者以為占月食差故再詔朴集議至是罷之熈寧九年正月二十七日沈括奏并注云云並合参考新本削去先是以下乃朱本所增也又詔兩浙轉運使蘓澥與知明州李定同計置造髙麗國信過海船如别奉朝㫖幹事並聴牒提㸃刑獄或轉運判官又詔諸命官因事以財行求雖行倉法處非曲法者不坐受財者論如法丙申中書言陜西轉運使聴帶制置解鹽使其副使判官悉罷兼領安燾等奏乞差校書郎豐稷充書状司並從之稷鄞人也賜徐州乾明寺塔名曰靈慧僧真寂大師號曰靈慧大師先是徐州言河水為患九十餘日州城危甚長吏率官屬詣塔齋禱期浃日水退當奏乞諡號至六日水果退而隂雨連日城中水潦無所决泄居民憂恐告病復禱於塔即時開霽真寂姓張氏名仁節河東人唐開元天寳間住持泗州盱眙縣先福寺應化頗類僧伽父老相𫝊唐末亂離真身迎自泗州泝流而上止於彭城州人相與置乾明寺至慶厯中始建今塔乞賜師號塔名以旌靈應故也張仁節𫝊李昭玘集有之丁酉廢提㸃熈河蕃部司廣南西路轉運司言昨退交人表以犯廟諱及送還人口發使人入貢三事今交人並已悛改經畧司勾當公事楊元卿未肯收接恐致猜阻詔元卿等速受表附逓以聞入貢使人發遣赴闕其畫定疆界送還人口别聴處分又言邕州太平寨乞依陕西縁邉例増主簿一員從之御史臺閤門言忌日神御殿行香自今令羣臣班殿下宰相一員升殿上香跪爐從之先是三司使李承之言伏見神御殿酌獻設皇帝位於庭下升降再拜而國忌日兩府列於殿上輕重相形於義未安故詔御史臺閤門詳定而著為令上批據髙遵裕所奏西人理索伊克等事此必嘗有熟户出界因索不獲遂於和市縱火以攄一時之忿深恐羌人酬賽結成邊隙可速指揮鄜延路經畧司止作凖環慶路牒訪聞柔逺寨熟户因理索人口嘗私侵入西界地分見根究移宥州照㑹庶羌酋知此非朝廷意亦顯本路未嘗容其侵擾後十餘日再批令吕惠卿更詳羌情緩急萬一或未嘗侵犯彼界即勿發此牒熈寧十年八月壬午九月乙卯當考元豐二年五月遵裕坐得罪元豐元年五月戊戌范純仁責官當参照戊戌知慶州髙遵裕言乞避轉運判官孫迥詔迥移河北路遵裕與迥嘗互訟市易及以結糴起詔獄故也己亥太傅兼侍中致仕魯國公曽公亮卒年八十上奠哭之輟視朝三日贈太師中書令配享英宗廟廷諡宣靖及𦵏恩禮視韓琦其碑首曰兩朝顧命定䇿亞勲之碑前一日車駕又臨之特恩非故事也上嘗語輔臣曰公亮謹重周宻内外無間受遺輔政有始有卒可方漢張安世公亮喜薦士多得人然性吝嗇殖貨至鉅萬持禄固寵為世所譏晚年昬病以歌舞沉酣日夜初詔遺表外増推恩二人子比部員外郎孝宗遷一官殿中丞孝純賜同進士出身孫太祝說詠誼詵各遷一官後孝純辭出身乞以所得恩官其族人之未仕者許之孝宗等推恩依朱木自三年二月己亥移入墨本論公亮短處朱木悉以無照據刪去新本復存之有己附見熈寧三年九月者庚子日中有黒子如李自是至戊午凡十九日日本國通事僧仲回來貢方物知諌院蔡確同御史臺鞫相州失入死罪審刑院大理寺定奪不當干繫官吏令開封府劾之潘開事下御史獄旬餘所案與開封無異乃詔確與御史同鞫確以擊搏進吳充素惡其為人㑹充謁告王珪奏用確上從珪所請也此據司馬光記聞辛丑詔簽書樞宻院事曽孝寛遭父䘮令依舊簽書此據宻記當考二月四日候卒哭起復壬寅環慶路經畧司言環慶二州闕乏蕃部及弓箭手去年合納欠負乞依漢戸等倚閣七分至将來秋料納從之廣南西路轉運司言桂州増屯兵馬乞於全永等州撥糧二十萬石及於衡州鑄錢監給十萬緡應副支遣詔糧於荆湖南路轉運司撥錢以本路去年未起發年額等錢五萬三千餘緡充仍具軍興所餘後來己支現在數以聞癸卯入内副都知經制熈河路邉防財用等事李憲言同經制官及同管勾經制官分巡所至州軍各稱行司官吏上下難以遵禀乞同經制官以下凢遇分巡如事干邊防蕃部弓箭手及差移官吏勾抽役兵改易措置候囬本司與長吏從長商議所貴上下易於禀從從之仍許憲銜内増都大二字本司管勾官並申状修閉曹村決口所言昨計修閉之功凡役兵二萬人而今止得萬五千人有竒詔河北東路開封府界差雇萬人甲辰權荆湖南路轉運副使朱初平乞以耕牛博買器甲又乞廣南西路軍興剩數糧草撥充合搬上供額並從之詔河北被水户如過河逐熟即於白馬縣河陽橋差官賑濟之
