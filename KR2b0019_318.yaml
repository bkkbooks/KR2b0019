body:
  text: 續資治通鑑長編卷三百十四宋李燾撰神宗元豐四年秋七月丁亥鄜延路經略司言延州南關城外逼髙山賊乘髙發矢石城上城中皆不可立况城內初無庫務止有官私屋五百餘區人百餘戶如卒急遇冦欲盡令遷入大城南關城更不守禦從之吕惠卿家傳可考詔䕫州路轉運司彭孫駐南平軍不日進兵乃聞糧草未辦可速排備七月庚子可并此詔彭孫若别路進討所統軍馬聼節制如與林廣㑹合即聼林廣節制詔河北三處封樁糧草朝廷已專命官總領自今三司更不聞奏止委寋周輔每季具元額合樁及今截日已有見闕都數以聞戊子上批陜西馬遞鋪人馬多闕方軍興飛書遣使此最先務冝令兩路提㸃刑獄文臣㸃檢補填數足申明條約開封府界委提舉官詔陜西緣邊見聚兵馬其經營轉輸全賴諸郡守倅同力幹辦其間多審官用格差注必恐不任今日職事冝令轉運司體量舉差聞奏要地令佐凖此己丑太白晝見權發遣羣牧判官郭茂恂言準詔以陜西博買蕃部馬并糧草所用錢物不一不如蕃部所欲致所買數不多欲專以茶博買馬以綵帛博買糧穀及以茶馬并為一司令臣具經久利害臣竊聞昔時亦是以茶折馬價雖兼用金帛等亦從其便自是局既分近嵗始專用銀絹及錢鈔等况賣茶買馬事實相須令提舉買馬官通管茶場實為職務相濟從之仍以茂恂專提舉買馬監收兼同提舉茶場其雅州名山茶令專用博馬候年額馬數足方許雜買六年六月二十一日可考本志云自是蕃部馬至者稍衆詔种諤速舉可為出兵副二者一人尋以皇城使康州刺史夏元象權鄜延路副總管庚寅手詔鄜延環慶涇原河東路進兵入界可令依此畫一指揮一軍行有日主將以賞罰申諭將士能立大功蕩除賊巢穴當比熙河賞功三倍即臨賊不用命並家誅戮鹵獲不以多寡聼自與官不檢校一應能擒戮拒命賊帥並量大小與節度使以下至班行一今朝廷本以李氏世為藩臣一朝為母黨篡逆興師誅有罪之人應先在國主左右及威明諸部族并同心為主者並不誅殺令展轉告諭與官軍共力討除國賊當隨功大小各有爵命一賊廷府庫所藏金帛並主將親檢校均給有功士卒一糧草數少降附之家或有蓄藏與文記借給候事定償其價一諸路軍馬勢力相及並須更互照應即一路受敵觀望不即赴救回日主將當處斬一應降附並邊部族其少壯驅以從軍老小遷使近城寨給口食安存之一降附部族諸將士卒輒希功殺戮者主將即時處斬一前後叛亡軍民明行告諭令自拔歸順即有能知賊中道路為官軍鄉道有功當隨輕重酬奬一應近上酋領能知禍福率先效順者優與賞賜置之軍中常加羈察一大兵所過有孔道通接契丹處並選要害之地分兵把截嚴誡將士不得輒令侵犯一主將敢以攻取近塞賊壘塞命不加窮討輒議班師者當行軍法一諸路兵馬㑹合至賊大郡或有守具須當攻擊者並分地分不得輒以彼我爭功一賊若窮蹙當以選騎於要路伏截一獲賊符印文籍並藏中軍一河北州郡須候撫定賊巢穴然後分兵討除或招諭歸降以上進兵並須明逺斥堠多設竒計勿使賊得併力一面枝梧官軍仍切照管糧道無令艱阻餘臨敵措勝非可豫為計者並隨冝經畫務在審中毋得輕發新紀庚寅以夏人囚其主秉常令陜西河東路伐罪按實録初發兵時未有此指揮蓋追書也今不取舊録書庚戌詔夏人囚其主秉常陜西河東路以九月丙午出師伐之今亦不取詔環慶涇原路經略司支封樁錢十萬緡招納蕃部辛卯詔廣州司法參軍曾緒與堂除差遣以瓊管體量安撫朱初平言瓊管四川自來官吏務為貪墨獨故知瓊州曽楷亷潔自守不犯秋毫楷本攝官出身嘗任廣西轉運判官乞録其子故也上批鄜延路已有㫖隂遣人招懷橫山部落緣環慶事體相同又正當山界之中族帳尤更繁夥冝令李稷依鄜延路已得指揮施行涇原凖此李稷時權環慶路帥事上批夏國涇原環慶熙河路對境圖并說語付中書樞密院庶知賊中地形曲折覽畢可復進入經制司走馬承受麥文昞言乞令曽經征討將官赴瀘州與林廣豫講進兵次第及乞梓䕫兩路入蠻界人夫令轉運司刺其額如諸將獲首級委官看驗并將來進兵乞差使臣二人部轄士卒其道病不能逐隊者近便寄留詔令將官與林廣豫講進兵次第可即依奏餘令林廣與轉運司詳酌施行如有入蠻界殺人夫以充首級者其主將當重行朝典提舉河北路義勇保甲兼提㸃刑獄狄咨言懷衛澶恩冀相洺邢瀛趙州并北京教場所教義勇節級保甲大保長等武藝先奏乞於八九月引見令至磁州教場案試已皆應法詔先引呈澶澤州其餘州别聼指揮內澶州以八月中旬起發令狄咨劉定部領澤州九月上旬起發令王崇極部領赴闕其所教人自離場日人日給食錢百壬辰崇文院校書元耆寧為館閣校勘勾當洞霄宫令隨侍耆寧校書未二年以父絳致仕特恩也上批麟府路最當契丹夏人交通孔道今大兵進討深慮賊勢窮蹙遣使求援冝豫有措置遂詔河東第一副將張世矩與第六將髙遵一對換仍令世矩到任與第七副將王愍將河外三州漢蕃軍馬除量留城守人外盡數團結聼种諤節制其軍須令經略轉運司應副前河北轉運判官吕大忠言天下二稅有司檢放災傷每嵗僥幸而免者無慮三二百萬其餘水旱蠲閣類多失實民披訴災傷狀多不依公式令諸縣不㸃檢所差官不依編敕起離月日程限託故辭避乞詳定立法中書房言熙寧編敕約束詳盡欲申明行下從之朱本削去癸巳詔熙河地形據賊上游水陸皆可進討委李憲等廣募鄊導多設竒計今雖於河州界與董戩攻取仍相度置船筏於洮水上流或漕軍食或載戰士或備火攻其所用材木可於末邦山取辦其兵匠冝取於鳯翔府船務即已有兵馬分擘不足更可發秦鳯路四將相兼如部分已定即取日近約董戩同攻擊賊界新修邈川地內城寨如賊兵赴救即遵守近降指揮鼓勵將士合力奮擊若大兵不至則相度機便率兵東下徑趨巢穴或北取甘凉出賊之背與諸道之師共力攻討其近降遣蕃弓箭手應副董戩指揮更不施行餘並依鄜延等路畫一指揮通直郎直集賢院兼侍御史知雜事何正臣為寶文閣待制權判刑部通直郎館閣校勘權監察御史裏行滿中行直集賢院兼侍御史知雜事甲午鄜延涇原環慶熙河麟府路各賜金帶一十五條銀帶錦襖七百銀器萬兩交椅水罐手巾筒水義五十副鞍轡纓二十副象笏三十面仍計置輕疾步乘付逐路經略司內麟府路付王中正御史朱服言判刑部陳睦舉程伯孫為詳議官伯孫非試中刑法於朝㫖不應薦聞程氏家冨與睦以貨交又為婚姻之家隂相請託昨章俞奏案睦不躬親約法止令議官莫君陳書名及章惇案上又令斷官李世南代書且惇之父子有罪麗法有司自應案文決正而睦委曲回避如此乞付有司根治詔除章惇案令斷官代書已施行外餘送大理寺戊戌詔自今汴河水漲及一丈四尺以上即令於向上兩隄相視地形低下可以納水處決之己亥詔陜西諸路運軍須糧草部夫官違期致闕者依乏軍興法轉運司熙河路同經制馬申等一面施行訖奏兵夫凖此又詔將來入界陜西義勇保甲除占使并應募人外許差饋運糧草如不足即差夫河東路都轉運使陳安石言元豐元年閏正月奉詔幹集本路鹽事臣自到任推行新法官場課辦私鹽禁止及召商人入中錢算請永利兩監積鹽已通行嵗有羡餘及增收欣州鹻地鐺戶馬地池鹽課絳州曲沃金坑澤州陵州錫窟各已措置訖今保明官吏以聞詔減磨勘年循資有差晏明減磨勘二年孫宰蔡礪各循一資與堂除差遣燕復減磨勘一年庚子䕫州路轉運司言彭孫不取南平路入蠻界已指揮所差雇夫及牛馬於歸涪忠等州上批近指揮彭孫止令擇便路進討南平可出賊不意亦不失詔㫖未審轉運司既未見彭孫指定進兵路分憑何便稱不由南平仍擅放運糧人夫足見鮮于師中畏法避事先令具析以聞仍令轉運司如彭孫止取南平路進討軍須有闕以乏軍興論時彭孫所部兵皆龍猛指揮及降賊廖恩徒黨所至多不法孫才涉䕫境即與師中不協云七月丁亥可并此壬寅詔已令涇原環慶熙河路約日出兵其並邊首領若有歸順之意今拒而不納必為夏人遷徙拘質至親骨肉或遭屠戮即將兵俱為死敵若便招納又慮歸附人衆夏國必引兵追來理索因而犯境令髙遵裕等相度如逐路添差兵馬雖未齊集止據本路兵力足枝梧及保護歸投之人不致返遭殺戮即審度機㑹招納甲辰朝奉大夫集賢校理鄭穆為朝散大夫知越州穆任諸王府侍講十二年求補外特遷之上批河北陜西河東三路見教民兵第一畨除澶澤陜州已有指揮外據狄咨奏並已教成若久不接試不惟枉費錢糧兼防他處起發第二畨及轉教之法卒不得頒降冝差承議郎天章閣待制判兵部趙卨文思使文州刺史內侍押班李舜舉依開封府界已引見格逐一案閲推賞仍差入內東頭供奉官宋鼎臣髙品劉友端充承受兼監視案閲舊紀書遣官按河北陜西河東路民兵鄜延環慶路經略司奏乞差大小使臣應副軍期詔各選差有武勇使臣及軍大將百人不足即選散直以往詔斬四方館使忠州團練使韓存寶於瀘州入內東頭供奉官韓永式除名配沙門島朝散郎管勾機宜文字魏璋除名編配賀州梓州路轉運副使董鉞除名先是存寶經制瀘州蠻賊無功而永式照管軍馬實同其事朝廷遣侍御史知雜事何正臣鞫存寶等與乞弟戰以纍敗怯避乃止令禆將禦敵致賊酋走逸反招諭乞弟投降兾以回軍而晏州蠻人叛以急欲回軍故不討及疑底蓬褒上下底行等村蠻為冦因其勾㸃不齊乃起兵討蕩欲藉此以蓋前過并不依朝㫖立城寨餘罪上言不實魏璋為從案既具於是刑部奏存寶逗遛不克請如庚辰詔書行軍法知諫院蔡卞亦言乞正存寶軍法并置永式典刑而正臣又言董鉞隨軍親見存寶等舉事乖謬罔上不忠又教以防他人窺伺檢獲鉞賀納元惡表本稱存寶功效誣罔尤甚今存寶永式冝即重誅而鉞朋比誕謾望特行竄斥朝廷懲安南無功時方大舉伐夏故誅存寶以令諸將隨軍主簿鮮于溱第二將吕真求合存寶意虛作申報詔提㸃刑獄司劾之朱本簽貼云朝廷懲安南無功等語無出處又云鮮于溱吕真事小削去今復存之存寶伏誅在八月十二日丙寅舊紀書存寶討乞弟失律伏誅新紀書存寶坐逗遛伏誅皆係七月十九日甲辰戎州録事參軍孫敏行素為鉞所厚鉞先令敏行草賀表敏行正色止之曰彼既罔上公又從而實之公亦隨受禍矣鉞不聼卒命他官草表敏行眉山人也丙午上批韓存寶出師逗撓遇賊不擊殺戮降附招縱首惡已正軍法可劄下鄜延環慶涇原路經略司熙河路經制司令知詔涇原路盧秉近奏報全不及軍事慮未悉朝廷舉動之意可專下秉速依應施行如誤師期必正軍法詔在京每年秋差官閲賞軍銀器冝以去年所用數為額自今更不差使臣止付管軍臣僚令於年內親依畫一閲賜所支銀器並以羣牧司封樁銷廢寬衣天武及􅘫直左射指揮請受內計數令三司折留關羣牧司照㑹又詔差在京備軍將作監見修營廂軍壯役雜役狹河崇勝奉化共一萬人并河北澶州以下退背岸河清萬五千人與鄜延環慶熙河路轉運司并同經制財利馬申等令一面分擘貼補并諸般差使涇原路經略司言近凖朝㫖修渭州城置炮臺已畢防城戰具止有大小合蟬床子等弩案武經總要有三弓八牛床子弩射及二百餘步用一槍三劒箭最為利器攻守皆可用乞下軍器監給弩箭各三副赴本路依樣造以備急用軍器監言弩每座重十餘斤難運致乞圖其樣付本路作院從之丁未上批以指揮熙河路都大經制司領兵乘機取徑道攻賊巢穴或北取凉州與董戩兵㑹其先擬修城寨更不興築令報諭董戩使知又批入西蕃撫諭使苗履等奏己期約董戩㸃集六部族兵馬十三萬取八月半分三路與官軍㑹下涇原環慶鄜延路經略司并王中正照㑹戊申命權判吏部集賢院學士蘇頌同詳定官制仍權免吏部事十朝綱要以吏部蘇頌言以武選歸吏部於是吏部始分左右曹立四選法上批出界諸軍特支禁軍錢千民兵廂軍剩員降一等詔麟府都巡檢使知府州折克行㸃兵三千選擇有官子弟部押𨽻張世矩等以髙遵一奏乞克行領蕃兵别為一軍而朝廷以克行守郡不可行故也詔鄜延環慶涇原熙河麟府路各給諸司使至內殿崇班敕告百東頭供奉官至三班奉職軍頭二百鄜延路别給三班借職至殿侍軍大將劄子百如軍前有效命奮力可以激勵衆心者隨功大小補職書填給付燕逹言神衛剩員中甚有年三十五以下少壯之人欲乞自京選一千人分擘與將下充樵汲諸般差使詔候王中正選募在京軍兵畢揀選己酉手詔朝散郎直龍圖閣曽鞏素以史學見稱士類方朝廷叙次兩朝大典冝使與論其間以信其學于後其見修兩朝國史將畢當與三朝國史通修成書冝與鞏充史館修撰專典史事取三朝國史先加考詳候兩朝國史成一處修定仍詔鞏管勾編修院鞏所為文章句非一律雖開闔馳騁應用不窮然言近指逺要其歸必止於仁義至其行不能逮其文也吕公著常評鞏以為為人不及論議論議不及文章田畫作王安禮行狀云曾鞏以文學稱天下在熙寧元豐間齟齬不用王安禮薦於上曰鞏之詞采足傳於後今老矣願俾修文當代成一家言上曰公著嘗謂鞏行義不及政事政事不逮文學果然無足為者安禮曰誠如其言請取其最上者上乃用鞏為史官按安禮此時猶以內翰知開封未執政賜故都官員外郎通判綿州費琦家銀二百兩琦部瀘州夫糧出界以病瘴死故也同知諫院蔡卞言武學教授蔡碩近留修軍器監敕於樞密院置局碩執政之弟與丞㫖張山甫聮親慮交相黨援得復備員席勢營私漸不可長乞罷免以協公議詔樞密院别差官保章正馮士安魏成象等言聞祖宗朝嘗於永熙陵東西三男位築隄以鎮土已獲感應今可於永厚陵及濮安懿王園東寅卯辰三位天柱壽山行鎮土之術仍乞於鎮土隄逐方位以珍寶玉石為獸埋之冝因鄆王舉葬祭告諸陵斬草之日興動土工可無妨忌詔送提舉司天監所集官詳定尋奏所定於隂陽書及國音别無妨礙從之其鎮土事仍令衆官詳定申中書究竟如何四月辛酉合參照泰州言七月甲午海風夜起繼以大雨浸州城壞公私屋數千間詔淮南路轉運副使李琮案視以聞新舊紀並附年末庚戌知諫院舒亶言御史臺見根治太學生蔡師曾乞重立賞許告捕詔立賞錢百千朱本簽貼云事小刪去廣南東路轉運司言西路關報交人入貢乞令自荆湖路詔交人如欲水路赴闕令廣西經略司指揮須依舊所行道路毋得創改鄜延路經略使沈括等言同環慶路約定出界月日詔用九月丙午令先關牒環慶涇原路毋得漏泄舊紀庚戌詔夏人囚其主秉常陜西河東路以九月丙午出師伐之此蓋追書非事實也今不取苗履等言西蕃大首領經沁伊達木凌節齎鄂特凌古蕃書稱七月戊子喀羅城蕃家守把堡子納木宗向下地名錫羅克谷有夏國三頭項人設伏劫掠蕃兵夏國兵賊斬首三百級降百二十三人壬子入內副都知同簽書涇原路經略安撫總管司公事王中正言乞更不選揀義勇保甲一萬人止於逐縣大小保長內募願隨者內已得官者自依官鋪遞馬驛劵及鋪卒未得官者乞日支錢米從之時中正自鄜延環慶經制邊事回上即令中書樞密院召問中正進兵大略此據御集羣牧判官郭茂恂言乞應蕃部馬入漢界並令入買馬場除中官外價髙馬許諸色人就場交易乞立法從之䕫州路走馬承受王正臣乞移吕真一將䇿應彭孫詔發開封府界第四將赴南平軍為聲援聞瀘州南平軍七月八月間烟瘴正盛令林廣彭孫更斟酌進兵國子監言學生入學乞令同縣五人以上為保如犯第一等罰不覺舉者與同罪許人告賞錢三百千未入學以前違礙亦凖貢舉法從之癸丑詔內外官司舉官悉罷令大理卿崔台符同吏部審官東西三班院議選格林廣言阿生等送乞弟降狀未肯身至瀘州詔中書降敕許令投降貸死仍密指揮林廣候乞弟降日押送赴闕詔張世矩等並𨽻王中正前降𨽻种諤指揮更不行又詔王中正措置麟府兵馬兼管鄜延環慶涇原三路軍馬仍下逐路入界總兵官與王中正從長議定方得進兵于闐遣蕃部阿錫克上表稱于闐國僂儸有福力量知文法和罕王書與東方日出處大世界田地主漢家阿舅大官家大約言路逺傾心相向前此三遣人入貢未回本國重復數百言董戩使人導阿錫克至熙州譯其書以聞詔于闐三輩使皆已赴闕朝見館遇甚厚賜賚發遣已回本道可賜勑書諭之兩紀並附年末
