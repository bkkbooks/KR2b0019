body:
  text: 續資治通鑑長編卷二百七十七宋李燾撰神宗熙寧九年秋七月丙辰廣南西路提㸃刑獄司言朱崖軍黎賊黃嬰等為寇詔經略司令都大提舉管轄昌化朱崖萬安軍俞瑊飭兵備禦丁已詔雍欽廉州被害土丁之家更蠲一料稅賦戊午詔成都府路鈐轄監司於川峽四路舉官知茂州己未詔郭逵等訪聞雍欽二州溪峒及外界山獠以所居之地寶産至厚素所擅有深慮一旦交賊蕩滅朝廷列其土為郡縣美利悉歸公上以勢異患同之故及交相黨與或陰持兩端或未决效順須前詔外得一詳悉敇榜赦其罪惡與其所利誘之以爵賞迫之以誅戮如此則賊勢必分大功亟立未知所言如何卿等宜審議條可否疾速以聞逵等言看詳朝廷前降敇榜竊慮蠻夷不曉文告之辭須至畫一直說事理所貴人人易曉乃條上八事請散榜州縣溪峒從之於是賊將黃金滿岑慶賓皆來潜輸誠款此據郭逵征南文字所受七月五日御寶劄子并逵墓志然墓志云黃金滿岑慶賓來降彼黃金滿等未嘗來降但潜通降款耳今略加刪改其詳具注十二月十一日攻拔門州時庚申上批自關以西秋稼頗有順成之望近忽生蝗蝻虸蚄可令監司速分定州軍往來督趣官吏打撲靜定以聞辛酉上批河北京東時有結集羣盜攻劫鎮市殺傷官吏聞多是新條所配河清軍亡其條近雖己衝革然前此配人己多若不措置河上廂軍營率與州郡相逺上下羈束不嚴後日為患不細可速相度指揮先是中書言河清兵近經揀選諸掃各闕人乞令河北陕西等路除凶惡劫賊并合配鄰州及沙門島人外竝刺配河清指揮俟諸掃人足止之時己不用此法而復降是詔壬戌詔宰臣王安石候王雱終七供職仍令太子右贊善大夫王安上護雱喪歸葬江寧此據時政記增入舒州團練推官蔡京權流內銓主簿京興化人也此據時政記增入權流內銓主簿不足書為蔡京故特書十年七月二十四日改校書習學癸亥安南招討宣撫司言襄葉郟縣巡檢殿直劉永安坐擅殺被劾如情理可恕乞令隨軍效用以功贖過從之初年李貴率衆卒不推兵器車永安手殺之大理寺當以死然情輕且㑹赦故特從所請廣南西路轉運司言凖詔給錢四十六萬餘緡付本司己市糧三十六萬石粟豆四萬四千八百餘石草三十六萬餘束并牛羊豬酒應副宣撫司須索詔送李平一與周沃蔡燁同具給用實數以聞成都府路體量邊事王中正言茂州所管靜州州將楊文緒因蕃部謀燒劫市戶圍逼州城并率張仁貴結連背叛今雖擒獲文緒然已病困恐且死無以狥衆遂輒斬之其張仁貴并妻女等乞裁斷詔仁貴陵遲處死并楊文緒妻子並依謀叛已上當法仁貴茂州牙校也詔廣西死事官無子孫者許奏親屬一人為之後新舊紀云無子孫者立後知廉州李時亮言雍廉州見今重建州縣除雍州已有廂軍充役其欽廉二州須籍民力欲乞特免搬運糧草止從本州役使從之上批陜西諸路纍年諸色缺負今嵗豐稔倍常收斂時不可失宜令元主借貸官司用心拘催每月終具收到錢斛數目以聞先是郭逵次潭州遣知欽州任起領兵襲賊界永安州玉山寨是日起攻拔永安州此據郭逵征南文字七月二十一日奏乙丑提舉永興軍等路常平等事杜常言奉詔供家譜世裔謹上諸房世次圖詔每遇大禮諸房輪一人與恩澤以昭憲太后之族多不及仕宦故也丙寅遣同知禮院林希乘驛祭謝洪州順濟侯廟順濟侯俗曰小龍以安南行營器甲舟行人多見之故也後希還上言臣至廟齊宿是夜龍降於祝歐陽均肩入石香合蟠屈行禮之際微露其首祭畢自香合出於案上供器間盤旋往來徐入帳中其色及長短大小變易不一執事官吏百餘人皆見之乃詔封順濟王中書言宗室試換欲令學士院於所占一經簽貼二百字以上令靣講說以不悖義理為通從之九月戊寅令始中格入內供奉官郝士良言廣州新開西北壕止濶十丈乞下本州再開通闊二十丈詔蘇寀相度開濬己巳詔郭逵等近纍據朱初平奏邵州管下楊氏諸蠻相繼內附其光僭光銜雖遷延未即出漢觀其事勢必恐非久須當歸命然接納撫御固不宜失其歡心機㑹但恐經度之官於光僭輩既出之後便要建立城寨增置戍守若不須軍馬防托自可修置極為善計如必俟將兵前去未知何處取辦及城寨既成之後用若干軍馬鎮守方其未舉動之間卿等其勿依違速與畫一裁處無致綴留大軍有妨南討害國重計逵等言初平欲於己歸明陸家地名上里建立一寨乞差軍馬及下轉運司應副錢糧兵夫臣等固未之許今相度止可令巡防使臣等部領土丁弩手於要害處駐劄往來照管候其人情馴熟漸次經營措置斯為順便此據郭逵征南文字增入六月八日十七日十一月二十一日可并考壬申提㸃成都府路刑獄張諷言蠻人以犀香入嘉州已牒州婉順發遣詔張諷釋越職罪癸酉詔以東頭供奉官宋明給事英宗藩邸嵗月勞久除閣門祗候近裏州都監又詔閣門近許宗室遙郡團練使以上大燕赴坐自今大慶殿㑹上夀宜亦令預乙亥詔諭郭逵等諜言交賊既歸巢穴日聚其黨教以戰陳及搜集象馬閲習奔衝此蠻素狡獪今又操危心慮大患其於姦智必有出人意外者深恐八月中果來犯雍州見在彼將官傷於忠勇便與接戰慮誤大事蓋深入之師利於速戰故也仰更切審為處置嚴與戒約此據郭逵征南文字刪修丙子詔訪聞陜西自罷濫錢後軍民交易尚為兼并之家不肯以省樣鐡錢與銅錢一般行使虧損官私深屬不便可令兩路轉運司分眀榜諭州縣如有所犯即行嚴斷仍令衆五日六月二十五日周君云云戊寅䕫州路轉運副使太常丞董鉞特遷一官以募人佃牧地之勞也己卯詔贈皇太后曾祖贈衛王高瓊諡曰烈武祖贈康王高繼勳諡曰穆武命權發遣利州路轉運判官太子中允黃廉太常丞王子韶並提舉陜西折納缺負廉秦鳯路子韶永興路仍令諸路轉運提舉司應折納斛㪷並取在市實直揭榜許人情願仍臨時量增價錢內五路如願以草折者聽令分定州縣每月一具依市直增錢折納數以聞以上批陜西兩路折納缺負官司小估穀價令民艱於輸納今三邊洊飢振發不少若不乘此豐嵗急謀收斂恐後或值災傷迤邐展移期限反致陷失故也十二月十七日又遣子韶復放歸田里人王安國為大理寺丞江寧府監當命下而安國病死矣壬午罷程昉同管勾外都水監丞令都大制置河北河防水利並依制置屯田使例施行此據㑹要尋有詔制置河北河防水利更不置司其職事並依外都水監丞例施行此據實録乃八月十二日詔今并入此時政記又在十月初九日是月安南行營次桂州郭逵遣廣南東路鈐轄和斌及楊從先等督水軍涉海自廣東進諸將九軍自廣西進此據郭逵本傳及墓志附見其次桂州傳及墓志並無月日六月十五日移軍奏計期必在七月初耳更須考詳張方平奏云桂州至雍州十四程八月甲申朔上批河北鹽法可速依舊庶商人不致疑惑虧損課額遂詔三司河北鹽法依舊施行如舊法有未便即與河北京東提舉鹽稅司同相度仍具去年實收鹽稅錢以聞於是始罷章惇𣙜議惇議𣙜河北京東鹽在八年六月十八日沈括自志及司馬紀聞張景溫事可參考蘇軾與文彥博書又吕陶奏議可考吕奏在元祐元年閏二月録齊州劉宏鎮監稅左班殿直孫紀一子為三班借職以紀與賊鬬死故也乙酉三司言管勾軍器將作監買木宋述得㫖除絹外給錢十萬緡述擅支十七萬七千餘緡理當推問緣事屬軍器將作欲乞降朝㫖驅磨仍自今應支三司錢物雖係别司亦許㸃檢從之侍御史周尹言河北西路轉運判官李稷苛刻佻薄務為氣勢摧辱官吏至相州專捃吏人小過委官决責務以凌蔑韓琦從來州有兩門其東知州出入其西以待賔客稷怒閽者不啓東門追赴本司杖之知琦適與客㑹食故往謁琦琦聞稷來徹食退客遽易冠帶迎稷稷復引去行移公牒言詞侮慢吏民皆以琦將相大臣而為稷肆意輕辱萬口嗟憤及體量司程之才等欲案劾其人乞罷稷監司以快衆怒據稷罪狀如修趙州城枉費材用暴伐林木當北使路削白大書充修城木後安撫司恐北使見之遂遣人塗抹又移牒相州通判稱郡守以下不如一逃走賊人意在罵琦又牒諸州稱如課利增剩即其他細事一切不問如課利虧少即一一案劾前後不法又沮抑體量司搬糧種等事未覩朝廷施行詔提㸃刑獄司案實以聞後提㸃刑獄司體量伐木罵琦等事皆無有其他如尹所言詔劄與稷令知尋命稷與河北東路轉運判官汪輔之兩易其任兩易乃二十三日事今并書之伐木罵琦事皆無有此據朱本知代州劉舜卿言凖詔相度代州城壕取平壕中隄隔通作一重引河水入壕不惟功大兼東北勢高峻引水不至止依舊重數可為隔限從之仍依端拱二年十一月辛丑詔河北緣邊城壕中墠削如斧刃五路州軍凖此端拱二年十一月辛丑詔未見丙戌詔命程昉相度淮南路有無可興水利以聞初中書奏差昉制置淮南路水利而上批未須制置可止暫差往本路相度故有是命又詔陜西河東難值豐嵗今年夏秋幸得成熟所在軍乏食當職官司若不乘時竭力計置萬一邊堠小警必致狼狽費財誤事可令三司嚴督責體量措置乖方不悉力者劾之戊子河東節度使守司徒兼侍中判大名府文彥博加太保再任彥博辭太保許之文彥博辭太保乞止受所加封邑再任從之乃九月二十二日事今并書之寶文閣待制同判國子監常秩提舉中太一宫秩以疾請故也上批贈太尉劉從廣妻普寧郡主太宗皇帝之孫吳王元儼之女於皇家為尊屬可增俸錢二十千餘人不得為例又批聞安南兵過嶺多疾病其令宣撫司曉告毋食生冷嚴立酒禁賜茂州行營兵級特支錢己丑命給事中程師孟為遼主生辰使皇城使嘉州團練使劉永夀副之度支員外郎祕閣校理安燾為正旦使文思使高遵治副之宣撫司言徽州團峒首領龍廷威等四人歸明乞補下班殿侍從之仍各賜錦袍銀帶庚寅上批熙河近嵗減罷使臣至京多日其間有戰功者宜稍旌異內嘗該轉資之人先次與注一差使辛卯權發遣䕫州路轉運副使董鉞言近發黔施等義軍赴安南招討慮農作失時乞盡免夏秋稅中書言逐户稅多少不等若不槩免即為不均欲令董鉞裁定務令均濟從之壬辰遼國毋遺留使林牙懷化軍節度使蕭質翰林侍讀學士右諫議大夫知制誥同修國史成堯錫來見置酒垂拱殿不作樂後燕紫宸殿亦如之宣徽南院使判應天府張方平言司農寺言近降新制應祠廟並依坊場河渡募人承買收取淨利管下五十餘祠百姓己買閼伯廟納錢四十六千五百宋公微子廟十二千並三年為一界閼伯主祀大火火為國家盛德所乘微子開國于宋亦本朝受命建號所因又有雙廟乃唐張巡許逺以孤城死賊所謂能捍大患者今既許承買小人以利為事必於其間營為招聚紛雜冗䙝何所不至慢神黷禮莫甚於此嵗收細微實損大體欲乞朝廷不賣此三廟以稱國家嚴恭典禮追尚前烈之意上批司農寺鬻天下祠廟辱國黷神此為甚者可速令更不施行其司農寺官吏令開封府劾之又批擅鬻祠廟為首之人乙劾罪其赦後不覺舉改正官可并劾之又詔司農寺市易司創改條制可並進呈取㫖毋得一面擬進行下甲午成都府利州路安撫司言知霸州董永錫疾病乞以牌印付長子孝忠本司己依例給帖令權管勾乙未詔安南道行營戰棹都監楊從先所總兵甲既不過海洋宜令悉取招討司處分其空名宣劄及節制朝㫖並令送招討司六月十七日辛丑招討司奏云云觀此則是從所奏也中書言近置南平軍以無屬縣割涪州隆化縣𨽻之其知軍奏舉選人改官欲依信安軍例舉一員從之詔使臣己試換文資者毋得復換武詔制勘熙河路結糴缺負聞有事連本路兵官慮欲希功贖過令經略司覺察正約毋致引惹生事權永興軍等路轉運使皮公弼奏本路以荐飢減放租賦而賑貸之餘已無幾今軍儲乏甚乞借次年所得鹽額錢乘此嵗豐糴買芻粟於是中書奏欲借來年所合出鹽鈔糴買其來年鈔宜更不出從之丁酉名茂州篳篥溪寨為鎮羌詔南陽關安撫司檢舉先降條制禁民闌出穀北邊已亥召輔臣觀榖於後苑衛尉少卿直昭文館石鑑知䖍州上批鑑昨罷桂州非緣罪戾今到闕未有差遣可却與東南一藩郡故也尋改知桂州改知桂州乃九月五日今并書始鑑登對具言交賊機智姦巧極不可輕上即令李舜舉諭郭逵等曰如鑑所說賊勇鋭致死或在夏國之右緣此舉近繫二廣安危逺關四方觀望若不萬全致勝於國計深為不便切宜穩審也此據郭逵征南文字刪修石鑑乃八月初五日對此詔亦初五日下今附此庚子占城貢方物壬寅宗室外宅鎖閉宗說卒廢朝一日子孫哀請還所免官特許之甲辰昌州團練使龍神衛四廂都指揮使苗授知河州乙已天章閣待制知秦州張詵知熙州時鮮于師中及高遵裕皆坐違法結糴方被劾故授詵代之度支員外即吕大防為龍圖閣待制知秦州詔江東福建路轉運司召人告捕信州强賊仵小八如能捕獲與三班奉職本路巡檢徒中能自殺併與推恩丙午京東西路轉運判官右贊善大夫蔡朦徙東路京東東路轉運判官太子中舍李察徙西路從朦父資政殿學士判南京留司御史臺挺所請以南京屬東路故也知茂州太子中舍范百常追一官衝替免勒停坐修展州城失撫諭蕃部致寇也既而鈐轄司言初計修展州外城並城東實蕃部董振珠元佃種地而百常乃於他蕃部搜索淳化中誓書界至為據用以興築仍勒停丁未上批近迥回北界理㑹河東疆事牒宜録一本劄下韓縝等照㑹此據御集八月二十四日增入存此要見疆事回牒戊申詔司農寺不覺察公使庫吏詐欺官錢十連官吏并開封府元録問官吏並送三司劾之侍御史周尹言都水監劾司農寺吏劉道冲等盜公庫錢聞張諤以簡請求權知府陳繹於三數日結案故出罪人且開封府司農寺檢正官皆委任不輕乃敢朋邪欺罔其為害甚大不可不懲詔令張諤陳繹具析以聞而二人皆言無之尹又言諤曲庇吏同盜官錢私書請求繹等故出人重罪及杜亮恐迫所轄吏致盜官錢兼嘗曲法受贓不當補三班奉職勘官劉柄因詣臣說兼府司元勘及今劉柄再勘案驗甚明乞檢㑹臣前奏并案牘施行詔提舉在京諸司庫務司根治十二月二十二日繹等坐責又詔中書秀州制獄見禁繫干連人已不少其勘官又日有枝蔓卒未見結絶次第可速指揮并秦鳯等路制勘院亦令速結絶詔自今應緣邊入中及輸納糧草並免打撲錢庚戌權判都水監程師孟言臣昔提㸃河東刑獄兼河渠事本路多土山高下旁有川谷每春夏大雨衆水合流濁如黃河礬山水俗謂之天河水可以淤田絳州正平縣南董村旁有馬壁谷水勸誘民得錢八百緡買地開渠淤溉田五百餘頃其餘州縣有天河水及泉源處亦開渠築堰皆成沃壤凡九州二十六縣共興修田四千二百餘頃并修復舊田五千八百餘頃計萬八千餘頃嘉祐五年畢功攢成水利圖經二卷付州縣遵行逮今十七年近聞南董村田畝舊直三兩千所收榖五七斗自灌淤後其直三倍所收至三兩石今權領都水淤田竊見纍嵗淤京東西鹹鹵之地盡成膏腴為利極大尚慮河東路猶有荒瘠之田可引天河淤溉乞委都水監選差官往與農田水利司并逐縣令佐檢視有可淤之處具頃畝工料以聞俟修畢差次酬賞從之於是奏遣都水監丞耿琬管勾淤河東路田食貨志同師孟提舉京東西淤田在五月末九月十六日同提舉京東西淤田明年六月卜四日賞功辛亥大理寺丞館閣校勘崔公度檢正中書禮房公事壬子荆湖路察訪蒲宗孟言兩路元敷役錢太重民間出辦不易至每年所收廣有寬剩詔荆湖路寬剩錢各權減二年又詔見在廣南路僧道權停判慿出外以廣東轉運司言聞交址昨陷欽廉等州執僧道百餘人奪其公慿而殺之令間牒詐為僧道以偵事故也提舉開衛州界運河程昉言衛州界創開運河口取黃河水入沙河下合御河以通江淮漕運又於遙堤次上修置木閘畢功詔河北西路提㸃刑獄司案視保明以聞昉先以淤五鹿城口地賞已遷一官至是中書再進呈論賞上令且未施行俟保明沙河取㫖乃令案視焉七年七月九日九月七日八年八月十九日并此年十二月癸未朔當參照九月甲寅朔侍御史周尹言欲乞應川陜商旅不許挈家屬入威茂州及本處人與蕃部交易止得於州縣城內不得出接連蕃部處城門如有移家往居及以婦女看親須經永康軍及綿州龍安縣給公慿乞自朝廷立法所貴邊禁稍嚴姦謀遂寢從之乙卯環慶路經略司言委官體量牟尼扎布事跡本司看詳牟尼扎布雖有貪黷之實然蕃官類不知文法又因部轄嚴峻致有訴訟若所坐稍重則恐熟戶扇惑倣效其餘酋領心不自安乞止於本路州軍監管候經赦令别立邊功贖過録用上批近據諜報西界緣邊首領申衙頭以漢界慕家數族欲投來乞領人馬等應接今首領牟尼扎布不得本族人情恐實有密謀向背之人宜下經略司嚴覺察須見有無確實并下种古仍令經略司選慕恩一門內得力可以彈壓部族人權同管勾其牟尼扎布送環州監質候經恩取㫖權發遣兩浙轉運副使蘇澥言秀州華亭縣有外國幸忠等二十人至青墩南洋語難辨問令書字與中國同稱高內國以語音宜是高麗國人及將文字髣佛辨認因乘船遇風飄泊海岸止說金隄郡水軍隊納米事詔秀州如參驗實非姦細即居以官舍給食候有本國使人入朝取㫖其後王徽使至因賜帛遣歸丙辰中書言先差范子淵提舉疏濬黃河李公義勾當公事公義乞且用船五十隻鐡龍爪五十副役兵四百疏濬大河中流令水行地中起北京至海口驗一過之功今已一年有餘未嘗案驗欲令都水監遣官檢覆兼子淵疏濬所亦恐用人船官屬太多皆未嘗案驗欲令都水監遣官就覆驗可與不可裁減以聞從之李公義疏濬大河在八年五月已丑罷公義等在此年十一月癸丑朔戊午駕部員外郎知都水監丞霍翔提舉疏濬汴河詔廣南西路依五路例賜衣襖以方討交址特恩也辛酉詔自今應干買馬事並樞密院施行詔應不教閲路分保正大小保長並三年一替不願替者聼內都副保正如保內第三等以上無堪選戶許以次選差乙丑占城願以兵助討交賊詔坐使人所乞令學士院别降敕書又詔安南宣撫招討總管司應四路宣布德澤安撫軍民等事屬宣撫司謀猷機策等事屬經略招討司行營將校軍馬等事屬都總管司往來文字並相關牒上聞郭逵與趙卨不相能故有是詔實録云以職分不定或有相侵故有是詔按所稱職分不定或有相侵即郭逵與趙卨不相能也今正言之丙寅廣西經略司言武侯峒假惟誠歸明詔惟誠與三班借職贈皇城使逵州團練使帶御器械程昉為耀州觀察使官其二子賜宅一區以昉任水事有功特恩也昉挾王安石勢多所陵慢後安石覺其虛誕疏之昉以憂死昉舊傳云陵慢韓琦今改云多所陵慢舊傳昉以憂死新傳削去今存之丁卯詔河北東路轉運司民訴旱災已出限乞减放稅今既過時何以體量可見實災傷分數令具析以聞戊辰廣南西路轉運判官周沃乞令廣東指揮舟船回日於本路州軍㸃檢催促徑赴雍州計置糧草入峒詔送糧草司相度施行訖以聞己巳命權同判都水監劉璯提舉賣修置清汴材木兼衛州界運河同管勾外都水監丞范子淵同提舉衛州界運河兼賣河北淤田及材木等事都水監丞耿琬兼同都大提舉京東西淤田明年六月十四日賞功中書言陜西官司所納不堪用私鑄錢百一十五萬九千八百餘緡初言止有二十餘萬緡一年可改鑄畢今其數乃如此又稱每年止鑄大錢九千一百五十餘緡其違法納私錢官司欲令三司依法施行從之後來如何行遣尹六月二十五日周云云七月二十二日詔可考詔自今樞密都承㫖兼羣牧使副都承㫖兼副使更不兼别差遣庚午樞密院言安南諸將所召募人緣路多不法未有約束詔令將官量人數權立人員管轄有犯依階級法至死者奏裁辛未中書言市易務收息錢市利錢總百三十三萬二千餘緡法應酬奬詔提舉官金部員外郎吕嘉問太子中允吳安持各遷一官升一任賜錢三百千嘉問更減一年磨勘餘監官以下等第推恩仍自今三年一比較從之壬申中書言欲令市易司發錢三萬緡於鄜延環慶兩路同經略司糴榖封樁其令本司指射撥還從之仍令市易司止於今次息錢內除破所支錢秦鳯路經略司言禽獲擅入界蕃僧旺遵詔經略司於質院監質可更收捕密卜尊等三人候捕獲如悉是旺遵同行人即止作本司意放回令報董戩旺遵已收禁若早遣般擦出漢必放旺遵還後經略司言已依朝㫖以旺遵付董戩般擦首領諭以兩界通和令歸本道乞下熙河路經略司譯寫蕃字諭董戩送還所略漢口庶用命陷陳之人復得生還從之仍令計議司譯寫甲戌召輔臣觀稻於後苑乙亥河北西路轉運司言諸巡檢下欲且揀留步兵二十馬軍一十相兼擒捕盜賊多處依所奏施行時以義勇保甲方上畨故也丙子詔廣南東路經略司指揮諸州長吏如得西路關報或探交趾事却當關報前路州軍者不得下司並親書寫經略司即令管勾機宜官書寫毋得漏泄仍關牒本路監司凖此詔安南兵馬非久出界宜有以振作士氣昨任起等攻賊界玉山寨功雖不大然首能奮擊其得功人可倍推賞訖奏仍布告將士使聞知郭逵墓志云師次潭州遣知欽州任起攻永安州拔之傳又云率郡兵峒丁三道進討永安州拔之左右江悉效順門州首領黃金滿岑慶賔降永安州玉山寨即七月九日事其餘當考上批聞秦州制勘院多逮繫熙河路官員今本路都副總管既新移易或方在道萬一有邊事乃是都無人倚托必重貽朝廷憂顧可速議指揮中書樞密院請令制勘院見禁繫熙河路官員徒以下罪狀已明即發遣歸本任有因追禁闕官處委轉運司於本路及鄰路選差得替待闕見任官權管勾從之賜綾錦院堧地為樞密五房院以都承㫖司言邊奏有緩急而諸房吏散居舊城內外往來回逺或漏泄事機且不可以應猝故也上批開封府界諸縣遭旱人戶所納秋色苗稅可第等疾速量與蠲減此據御集丁丑廣南西路轉運司言大理評事勾當公事魏森遣募宜州土丁以瘴癘死乞録一子官詔賜其家銀四百兩又詔大名府棣洺州未獲盜甚多令河北路轉運司體量不任事捕盜官以聞戊寅右監門率府率令始為太子中允堂除監當以學士院說詩中等也七月丙寅可考熙河走馬承受長孫良臣言本路嵗豐乞支見錢以廣糴於是中書言市易司見入中四十萬緡今欲更令市易司就支本路錢十萬緡與秦鳯等路轉運司計置熙河糧草仍於息錢除破從之詔前知䖍州劉彜知黃州路京等十五人减磨勘年升名次各有差知池州鄭雍通判海州李清臣等十四人降考降名次各有差以三司上比較諸路熙寧五年鹽稅增虧故也己卯遼國回謝使長寧軍節度使耶律英太常少卿韓君儀見於紫宸殿置酒垂拱殿詔宣撫司所至訪求死事文武官家屬流寓無歸者指揮州縣安存願還本貫者差人津遣其先遭冦略者多方購求有能獲送赴官並與優奬忠義死節未甄録者保明以聞陳亡將士昨官為瘞埋聞聚為墳壟乃與儂智髙逆黨京觀相雜甚非所以旌别可令别為表識所過以官錢致祭庚辰樞密院言莊宅副使張守節昨以死事朝廷厚加恩典今逐處體量守節軍行挈娼婦與俱臨敵怯懦不能使人其下兵級又多降賊教令作炮攻雍州以至失守已追還贈官其子五人恩乞止與二人詔子二人與奉職入內供奉官黃懷信等獻修城飛土梯運土車詔將作監試驗辛巳前將作監丞蘇子元為殿中丞起復權發遣通判雍州仍賜緋章服從知桂州石鑑所請也是秋宣徽南院使判應天府張方平上表乞致仕詔答不允方平因奏疏論率錢募役之害曰臣竊為天之生民以衣食為命故衣食者人事之確論非高談虛辭之可致者也昔者聖人所以治民之道别其四業任之九職農夫效稼穡之力虞衡主山澤之利百工飭庀八材商賈阜通貨賄各率所事以奉其上而上之所以取於民惟田及山澤關市此財用之所出也沿革損益雖歷代不同要之必本於此過是則非王制矣伏見近制募役之法令人戶等第輸錢夫錢者人君之所操不與民共之者也人君以之權輕重而御人事以平凖萬貨故為國者必親操其柄官自冶鑄民盜鑄者抵罪至死示不得共其利也夫錢者無益饑寒之實而足以致衣食之資是謂以無用而成有用人君通變之神術也本朝經國之制縣鄉版籍分戶五等以兩稅輸榖帛以丁口供力役此所謂取於田者也金銀銅鐵鉛錫茶鹽香礬諸貨物則山海坑冶場監出焉此所謂取於山澤者也諸管榷征算斥賣百貨之利此所謂取於關市者也惟錢一物官自鼓鑄臣向者再總邦計見諸爐嵗課上下百萬緡天下嵗入茶鹽酒稅雜利僅五千萬緡公私流布日用而不息上自社稷百神之祀省御供奉官吏廪祿軍師乘馬征戍聘賜凡百用度斯焉取給出納大計備於此矣景德以前天下財利所入茶鹽酒稅嵗課一千五百餘萬緡太宗以是料兵閲馬平河東討拓跋嵗有事於契丹真宗以是東封岱宗西祀汾睢南幸亳宋未嘗聞加賦於民而調度克集至仁宗朝重熙纍盛生齒繁庶食貨滋殖慶歷以後財利之入至三倍於景德之時而國計之費更稱不贍則是本末之原盈虛之數其疏闊不侔久矣陛下憫時事之積敝志在變而通之以財成天下之務故創立法制所大措置事以十數要在經國利民崇德而廣業也其中率錢募役一法為天下害實深通都大邑要扼之地以之併廢重鎮將吏之倫以之散遣游民敝夫而委以倉庫案牘之事軍員卒長而付以錢榖簿書之責如此不便之事因緣極多至於五等版籍萬戶之邑大約三等以上戶不滿千此舊制任差役者也四等以下戶不啻九千此舊制不任差役者也今令五等一槩輸錢是率貧細不足之民而資高强有餘之戶也且舉應天府為例畿內七縣共主客六萬七千有餘戶夏秋米麥十五萬二千有零石絹四萬七百有零匹此乃田畝桑功之自出是謂正稅外有沿納諸色名目雜錢十一萬三千有零貫己是因循敝法然雖有錢數實不納錢並係折納榖帛惟屋稅五千餘貫舊納本色見錢大體古今賦役之制自三代至於唐末五代未有輸錢之法也今乃嵗納役錢七萬五千三百有零貫又散青苖錢八萬二千六百餘貫纍計息錢一萬六千六百有零貫此乃嵗輸實錢九萬三千餘貫每年兩限家至戶到科校督迫無有己時天下謂之錢荒搜索殆盡而又弛邊關之禁開賣銅之法外則泄於四鄰內則恣行銷毁鼓鑄有限壞散無節錢不可得榖帛益賤變轉既難民日益困逺方僻路無所措其手足臣故曰募役之法為天下害實深凡公私錢幣之發斂其則不逺百官羣吏三軍之俸給夏秋糴買穀帛坑冶場監本價此所以發之者也屋廬正稅茶鹽酒稅之課此所以斂之者也民間貨布之豐寡視官錢所出之少多官錢出少民用己乏則是常賦之外錢將安出或曰募錢輸官還以募役錢既出入非蓄聚也臣對之曰夫募錢者率之農民散於惰游市井自如南畝空矣或曰四等以下率錢數少民易輸也臣對之曰彼窮鄉荒野下戶細民冬正節臘荷薪芻入城市往來數十里得五七十錢買蔥茄鹽醯老稚以為甘美平日何嘗識一錢向聞役法初行其間刻薄吏㸃閲民田廬舍牛具畜産桑棗雜木以定戶等乃至寒瘁小家農器舂磨鏟釡犬豕莫不估價使之輸錢吏以刻削為功干賞蹈利朝廷開賞典而勸寵之則諸趣時進取之人安得不從風而靡豈復知朝廷經久之體耶陛下本欲以美利利天下至於施為見於行事非復聖意所存者矣陛下聖㫖一出執政奉行從而增益至於有司苛細甚矣頒下諸路職司之官各出所見展轉文害本同而末異朝行而夕改郡縣承用以至不勝其敝且民田二稅水旱檢放自有常制青苗之息或遇災傷猶暫倚閣募役之錢年雖大殺無減免之理往時州縣之役若身充若雇傭率三分其費而二分以薪糧取給豈悉資於錢也大鄉戶衆一役代歸十餘年間安居無所預矣募法之行且六年初年民始大駭既而伐桑棗賣田宅鬻牛畜比年稍荒歉處民流散多矣至今紛紜變更意莫能定其法上不能富國强兵成公家之利下不能便民濟物為天下之福若但坐觀其敝莫之改圖臣恐國家之憂不在四邉而見伏戎於莾矣伏惟陛下深思宗社之重俯察下民之情申命高才逺識之臣通議率錢募役之法蓋愚而不可欺弱而不可勝者民也動危甚易安之實難故民者天地之心而國家之本也是以聖人甚畏之甚重之欲保家國必先得民是謂藏身之固置器於安之道也臣以衰疲不任陳力近已上章乞骸骨歸田里伏念上荷聖恩至深至重故不能自忍於天下生靈披瀝肝膽以致補報之心儻精誠上達天光下燭得以涓埃少禆海嶽一旦先犬馬填溝壑亦無遺恨惟陛下留神省察又言臣伏覩見行役法天下共苦不便陛下天高聽卑必聞其利害竊恐中外臣僚未有為國家深憂逺慮精言其本者臣既以方拙上荷知眷今拜章乞致仕方俟命解謝言念重恩思有以補報而去故不避誅絶上此奏封極陳保邦便民之大計切務非徒詭激以抗高論而已陛下至聖大明儻察臣言實有益於國家即乞發自清衷特下明詔停罷此法復行舊制舊制之中有所未安稍為增損參定施行詔下之日四方萬姓若有匹夫匹婦不慰悅抃蹈上感德澤者則臣請受罔上迷國壞法亂紀之罪投放遐裔以正典刑若陛下猶謂臣言未足為信古者有大疑謀及卿士庶人協同而後有作即乞露布臣章俾在廷百辟以至諸路郡縣官吏共得盡其公議二者惟在陛下發於神斷以定天下是非若但送之中書詢之執政無益也則乞留中不下非惟有以保全孤臣抑以忠義之言廣四聰之逺不勝為國憂慮區區之心惟聖明諒察方平乞致仕據集載不允批答有秋冷之語則其論役法必是八九月間今附秋末
