body:
  text: 續資治通鑑長編卷三百八宋李燾撰神宗元豐三年九月庚申朔知諫院蔡卞請應差除及改更事並令封駮司關報諫院從之元符三年五月己卯龔夬云云可考辛酉命翰林學士蒲宗孟知制誥李清臣兼詳定官制檢正中書户房公事畢仲衍檢正中書禮房公事王震並兼檢討文字權知都水監丞公事蘇液言河北京東兩路緣河決被患人户䝉朝廷優恤賑濟放稅計錢穀等共七十二萬七千二百七貫石有畸而靈津廟碑失載其實乞以其事付史官從之壬戌詔定州東安村宣祖皇帝祖墳四至各益地五頃守園人十户新紀書此舊紀不書經制熙河路邊防財用司奏乞以年額川交子一十萬貫並支赴本司移用更不兊賣與茶場司及乞減約立定熙河路四色錢鈔等事詔四色錢鈔依奏撥充經制司年計并以熙河路所收諸色稅賦課利相兼支用其每年合用紬絹布絲令陜西轉運司依例應副陜西言虢州等處捕獲張晏賊徒光萬等七人詔賊黨已潰慮捕盜人貪獲首級之賞因害平民令提㸃刑獄司指揮捕盜官吏如遇賊非拒捕者並須擒送所屬勘鞫癸亥御史王祖道言太常丞汪輔之除廣東轉運使輔之即乞分司致仕朝廷為改成命令依舊為開封府推官臣竊以平日無事差一監司聽避免而不行萬一二廣有邊陲之警誰復肯為陛下行者望從輔之之請詔許輔之分司八月七日豐稷云云又言陜西四十二將河北京東府界三十七將皆朝廷所選擇然尚多庸人其餘淮浙福建荆湖交廣雖有團結訓練之法而未見教閲案試之實豈非將領非人故事功未效且以陜西一路言之如李亨劉鎮程博古輩人材懦弱臨事昏謬使之趨敵赴功足以速敗其他路固有如李亨劉鎮之比者望密下諸路經略監司體量將副人材第為三等朝廷再加審察而去其疲弱不稱事者此正今日邊防之急務也召河東節度使守司徒兼侍中判大名府文彥博陪祠先是彥博乞罷使相領宫觀手詔諭令過明堂聽㫖於是召之仍遣內侍迎賜茶藥手詔諭彥博據御集乃五月十三日詳定禮文所言謹按虞書曰豫欲觀古人之象日月星辰山龍華蟲作㑹宗彛藻火粉米黼黻絺繡先儒謂虞夏之制天子祭服十有二章日月星辰山龍華蟲此六者畫於衣故言作㑹以法天之陽氣六律也宗彛藻火粉米黼黻此六者繡於裳故云絺繡以法地之隂氣六吕也至周以日月星辰畫於旌旗所謂三辰旗旗是也而冕服九章登龍於山登火於宗彛則衮以龍為首鷩以華蟲為首毳以宗彛為首國朝衣服令乘輿服衮冕十二章日月星辰山龍華蟲火宗彛八章在衣藻粉米黼黻四章在裳少二章與虞書之文相戾自東漢明帝革去秦故初服冕旒衣裳天子備日月星辰十二章無宗彛而以粉米為二與孔安國說頗相合晉因循不革梁及隋唐則以日月星辰山龍華蟲火宗彛畫繢於衣藻粉米黼黻絺繡於裳蓋當時諸儒因鄭氏注禮以為周冕服九章登龍於山登火於宗彛則衮之衣五章裳四章厥後循用虞夏之制既以日月星三章復畫在衣而不以火宗彛二章歸之於裳所以衣有八章裳有四章不應古義伏請改衣裳之章各六日也月也星也龍也山也華蟲也畫以為繢火也宗彛也藻也粉米也黼也黻也絺以為繡又衣服令衣錦領織成升龍蔽膝隨裳色繡升龍二亦無所稽謂宜衮紱之上兼為升龍降龍又古者冕服皆𤣥衣纁裳而今衣色用深青殊無所本宜改用𤣥以象天色詔衮冕繢繡章采宜依舊制二年八月十四日其八章在衣四章在裳宜别詳定以聞於是詳定所言國朝衣服令乘輿服衮冕十二章日月星辰山龍華蟲火宗彛八章在衣藻粉米黼黻四章在裳則與虞書之文相戾今欲乞依虞書之文繪日月星辰山龍華蟲六章在衣繡宗彛藻火粉米黼黻六章在裳詔送禮院三年九月四日癸亥送禮院甲子詔陜西諸軍馬社闕額斂率不易自今並罷所闕馬令買馬司支填詔賜茶場司錢二十萬緡付涇原路安撫司糴買糧草封樁都提舉市易司王居卿言市易之法有三結保賖請一也契書金銀抵當二也貿遷物貨三也三法之中惟賖保之法行之積年逋負益衆去歲有㫖先罷結保見錢惟賒請物貨舊法未革然尚恐久逺未便何則舊缺之户多以出限規避不輸既費催督又繼以再賒物貨之人勢亦如此宿貸新貰歲增月纍其間消折不能備償者十有四五則與賒取現錢同歸于弊是宜解而更張者也欲乞自今後市易務許人户賖請物貨歲不過二百萬貫别置簿支收惟聽舊户賒請以接濟在京行鋪之家期以五年所收息巳逾元數然後或止或行更不取朝廷裁度其非舊請人户則惟用抵當貿遷二法可以斂滯貨通餘財如此則法全利逺而用不窮矣其諸路市易錢穀以四分為率量留一分以濟舊戶外亦不行賒借之法如䝉朝廷施行乞於每歲所收息錢內量減萬數其監官等酬奬亦與降等推恩雖取息稍薄而所收皆實利庶使此法行之無弊也詔中書户房立法以聞已而户房乞在京物貨許缺户賒請斂而復散通缺數不得過三百萬貫諸路市易貨以四分為率以一分許舊缺賒請斂而復散通缺數不得過一分並别置簿支收從之二年正月九日二月十九日當考居卿又言免行所月納或季納見錢官為雇人代役使此朝廷立法之意欲以寬恤下民也然有其名而無其實蓋建法之始失以貧富為較但以其人作業為等納錢輕重不一雖貧者至輕而日不自給何暇輸官催理科較或至禁錮誠可矜惻臣竊詳元定免行租額錢三萬四千八百餘緡每歲額外常有增羡今且以雜販破鐡小販繩索等貧下行人共八千六百五十四人月納自一百以下至三文二文計嵗納錢四千三百餘緡其所出至微猶常不足故貧者私不足以養公不足以輸欲乞將額外增羡以補舊額其貧下户並與除放庶幾小民實免行役均被朝廷之恩如將來舊額却有虧損不及下户所放之數即乞於本司市利或息錢內撥填然月納一百以下行人其間薄有物力者乞且如舊法庶得平允從之仍令將來赦中施行居卿又言新本削去詔押賜夏國主生日禮物中冬持服使人將來到夏國許比附三路沿邊臣僚並令聽樂以太皇太后服未滿期故也丙寅御殿復膳兩紀並書此詔江南東路轉運使太常少卿孫圭權發遣提㸃刑獄贊善大夫王安上各追兩官勒停安上圭交訟不實故也丁卯詔建州百姓張勝等案刑部至今一年有餘未决其判刑部杜紘詳斷官李世南各特罰銅十斤詔權三司使李承之前副使韓忠彥判官黃好謙各展磨勘二年百姓閻慶杖脊刺配廣南牢城先是慶詐為中使程昭吉狀稱內中降錢買三司銅鑄鐘三司不詳真僞己聽買乃覆奏故承之等有是責先是忠彥權發遣户部副使嘗有詔任滿與落發遣字令再任及大理寺根究閻慶事未决中書進呈上批且候已而忠彥除寶文閣待制知瀛州竟坐慶事展年忠彥待制瀛州在七月二十一日今附見庚午以太子中允館閣校勘監察御史裏行何正臣直集賢院兼侍御史知雜事中書進呈誥詞云爾其正直是與勿苛勿撓使是非淑慝不壅於上聞上批宜改苛字作枉字詔審刑院詳議官劉賀展磨勘二年溫希道應適張伸各一年伸仍别與差遣曹平半年王僖罷支賜並以中書比較元豐二年內有失入人死罪等特責也知諫院舒亶言中書檢正官張商英與臣手簡并以其壻王溈之所業示臣臣職在言路事涉干請不敢隱默其商英手簡二紙并溈之所業一册今繳進詔商英落館閣校勘監江陵府江陵縣稅初亶為縣尉坐手殺人停廢纍年商英為御史言其才可用乃得改官至是反陷商英士論惡之太常博士集賢校理新權知湖州陳侗言伏見陛下若稽古先修飾萬事而崇奉郊廟百神之祀考求典禮尤為嚴備惟五嶽四瀆之兆未設謹按周禮小宗伯之職兆五帝於四郊四望四類亦如之鄭氏注四望謂五嶽四瀆也四類日月星辰也今四郊有五帝及日月星辰之壇而獨四望之壇不建或遇朝廷有祈焉則設位皇地祇壇下甚非古制欲乞依周禮建四望壇於四郊以祭五嶽四鎮四瀆庶合於經而且以稱陛下奉祀之意詔送詳定禮文所詳定所請以國朝祠令所載嶽鎮海瀆兆四望於四郊岱山沂山東海大淮於東郊衡山㑹稽山南海大江嵩山霍山於南郊華山吳山西海大河於西郊常山醫巫閭山北海大濟於北郊每方嶽鎮則共為一壇海瀆則共為一坎以五時迎氣日祭之皆用血祭瘞埋有事則請禱之又以四方山川各附于當方嶽鎮海瀆之下别為一壇一坎山共一壇川共一坎水旱則禱之其北郊從祀及諸州縣就祭如故詔四方嶽鎮共為一壇望祭餘依奏元豐三年九月十一日庚午依奏壬申以右正言直龍圖閣趙濟為右司諫仍升一任故引進使王君萬遷一子官駕部員外郎霍翔為主客郎中入內副都知李憲賜城北園一所權發遣永興軍等路提㸃刑獄葉康直減磨勘二年皆以經制熙河邊防財用司奏收課利功也癸酉以知同州右諫議大夫集賢殿修撰張景憲嘗舉知襄城縣于石犯入已贓刑部奏景憲合徒二年勒停中書言景憲合依劉庠例追一官免勒停移小郡緣內省官例進呈取㫖上批可依庠例乃降一官知房州知保州西上閣門使嘉州團練使張利一亦坐舉石當徒二年追團練使一官免勒停仍衝替樞密使言利一係極邊職任取㫖上批依斷免衝替勒停與展一朞叙五月乙亥于石除名乙亥知諫院舒亶言開封府界提舉官陳向近於樞密院議養馬事知樞密院薛向等論議喧悖中外傳播囂然臣竊以養馬之法乃自本院行下其利害本末向等所嘗與議茍以為便當身先推行使人趨赴豈宜倡為浮說搖動流俗如曰不然則議法之初宜有建明不應今日始為此紛紛也大臣謀國如是其意必有所在乞令陳向具向等語辨治施行詔陳向具析司馬光記陳向事具注薛向罷樞密時向罷樞密在此月二十七日丙戌後此十一日詳定官制所上以階易官寄祿新格中書令侍中同平章事為開府儀同三司左右僕射為特進吏部尚書為金紫光祿大夫五曹尚書為銀青光祿大夫左右丞為光祿大夫六曹侍郎為正議大夫給事中為通議大夫左右諫議為太中大夫祕書監為中大夫光祿卿至少府監為中散大夫太常至司農少卿為朝議大夫六曹郎中為朝請朝散朝奉大夫凡三等員外郎為朝請朝散朝奉郎凡三等起居舍人為朝散郎司諫為朝奉郎正言太常國子博士為承議郎太常祕書殿中丞為奉議郎太子中允贊善大夫中舍洗馬為通直郎著作佐郎大理寺丞為宣德郎光祿衛尉寺將作監丞為宣議郎大理評事為承事郎太常寺太祝奉禮郎為承奉郎祕書省校書郎正字將作監主簿為承務郎又言開府儀同三司至通議大夫以上無磨勘法太中大夫至承務郎應磨勘待制以上六年遷兩官至太中大夫止承務郎以上四年遷一官至朝請大夫止候朝議大夫有闕次補其朝議大夫以七十員為額選人磨勘並依尚書吏部法遷京朝官者依今新定官其祿令並以職事官俸賜祿料舊數與今新定官請給對擬定並從之十二月十六日當考新紀書乙亥正官名以侍中中書令同平章事為開府儀同三司左右僕射為特進吏部尚書至將作監主簿為寄祿官檢校僕射以下及階散憲銜並罷舊紀但書頒以階易官寄祿格選舉志云元豐三年修定官制開府儀同三司至通議大夫無磨勘法太中大夫至承務郎應磨勘待制以上六年遷兩官至太中大夫止承務郎以上四年遷一官至朝請大夫止歷中散大夫則七歲乃遷朝議大夫以七十員為額有闕則以次補又詔應遷官除授者並即寄祿官自官制行以舊少卿監為朝議大夫諸卿監為中散大夫祕書監為中大夫故事兩制不轉卿監官前行郎中郎超轉諫議大夫前行郎中於階官為朝請大夫諫議大夫於階官為太中大夫上以為磨勘者古考績之法所與百執事共之而禁近獨超轉非法也於是下詔待制以下並三年一遷仍轉朝議大夫中散大夫中大夫三官所以正名實抑僥幸云詔在十二月六日丙子詔開府儀同三司為使相不繫大敇銜見任宰相使相食邑實封通及萬户前任宰相食邑及萬戶並封國公宗室如舊例又詔臣僚加恩並依舊勳巳至上柱國即併加食邑實封給諫待制許加實封省副知雜許併加勳勳巳至上柱國食邑自今當加食邑減數令中書本房立法本房尋奏自來大禮加功臣階勳食邑實封凡五等今己罷功臣及以階易官即止有勳及食邑實封凡三等勳上柱國而食邑當依舊法自三百四百五百七百至一千户實封自一百二百三百至四百戶仍乞各於舊條官序上遞減一等加之如食邑令加千戶止加七百户之類其實封亦以此為率即食實封一百戶并初封實邑三百戶仍不減欲乞先行下候成書日别副定從之中書言近朝㫖館閣臺諫兩省兩制官不拘常制各舉教授不以在任不在任令給驛劵並乘驛赴闕差官於祕閣試經義三道今上項朝㫖見係諸路學制所修立欲乞不候學制頒行先以朝廷見取索及臣僚舉到并得替學官類聚候及十員以上令國子監主判考試其所宿等並依貢舉條施行從之又言據官告院狀諸班直都知押班長行等諸軍使副都兵馬使都頭副都頭如未曾授加恩者遇大禮授銀青光祿大夫檢校國子祭酒兼監察御史武騎尉緣見今臺省寺監之官易之以階則所授銀青光祿大夫為階而國子祭酒監察御史乃職事官皆不合用為加恩今明堂諸如此類未加恩者並乞加武騎尉欲送官告院照㑹施行從之又奏官制所申朝㫖除三公三師外餘檢校官并階散並罷所有宗室及武臣正任至內常侍以上內臣供奉官以下選人伎術官將校中書樞密院主事以下及諸司吏人所授勒留官衙校等各有見帶文散階檢校官及憲銜欲並除去其僧官並溪峒蠻人知州鎮及化外蕃官所帶散官等合自朝廷指揮從之其後遂詔文武散階除化外人依舊除授外餘並罷化外人依舊除散階在五年正月二十六日戊申今并書之沅州奏乞下湖南密計置候本州修築托口等寨畢同時創築古誠州貫保寨詔令湖南鈐轄司沅州依近降朝㫖指定合修城寨處各隨便宜建置其古誠州楊晟堅等依訪察司指揮割屬湖北路詳定禮文所言南郊式尚衣庫供拂翟內侍省差內侍二員執之各公服繫鞋每大慶殿宿齊景靈宫太廟南郊自大次至小次皆用以前導原其所出乃漢乾祐宫中所用其制不經伏請除去從之禮文元年九月十七日依奏十七日丙子也戊寅齊于文德殿百官齊于明堂已卯薦饗景靈宫齊于太廟庚辰朝饗于八室齊于文德殿辛巳大饗于明堂綱要以英宗配御紫宸殿羣臣稱賀御宣德門大赦民缺元年以前二稅免役常平息錢及在京免行月納百錢以下者皆除之癸未尚書禮部侍郎平章事王圭換正議大夫右諫議大夫參知政事章惇蔡確並換太中大夫工部侍郎同知樞密院薛向換正議大夫右諫議大夫同知樞密院孫固換太中大夫並樞密副使乙酉詔即景靈宫作十一殿以時王禮祀祖宗新舊紀並如此書㑹要有合删取增入者遣勾當御藥院竇仕宣往北京勾當內東門司閻安往澶州編排㸃檢封樁兩九軍軍器什物具析依樣與否及可用不可用以聞仍下軍器監給元樣觀文殿大學士集禧觀使左僕射舒國公王安石為特進改封荆國公宣徽南院使檢校太尉西太一宫使王拱辰落開府儀同三司並以官制行正名故也詔拱辰判大名府拱辰辭曰臣老矣不足以任事上曰北門重地卿舊治也勉為朕行劉摯作拱辰行狀云時三路籍民為保甲下户皆不免日聚教之提舉官禁令苛急河北保甲往往為盜賊百十為羣州縣不敢以聞拱辰極論其弊謂非止困其財力害其農桑所以使為不良者法驅之也將恐浸淫為大盜可憂願蠲裁下戶於是主者指拱辰沮法異論拱辰曰此老臣所以報國也章入不巳天子始悟保甲之為盜也按今年二月十八日令諸路坊郭物力户養馬蓋因拱辰建議而摯不書獨書拱辰論保甲為盜不知果有是否本傳但云三路初籍民兵拱辰謂稍蠲下户亦不如摯所書也當考蠲下户事在七年二月十二日知河南府翰林侍讀學士給事中王陶為正議大夫觀文殿學士知汝州端明殿學士兼翰林侍讀學士龍圖閣學士右諫議大夫韓維寶文閣學士右諫議大夫兼侍讀陳薦並為通議大夫資政殿學士樞密直學士兵部郎中孫永為太中大夫端明殿學士陶等以東宫舊臣因換官特遷之罷議樂修樂局其范鎮令降敕奬諭仍賜銀絹各一百匹兩楊傑五十匹兩劉几許特用明堂恩奏子若孫一人鎮初召對為上言定樂當先正律上曰然雖有師曠之聰不以六律不能正五音鎮作律尺籥合升豆區釜斛欲圖上之又乞訪求真黍以定黃鍾而几即用李照樂加四清聲而奏樂成及是鎮謝曰此劉几樂也臣何與焉六月庚子初召鎮丙戌正議大夫平章事集賢殿大學士王圭為銀青光祿大夫兼門下侍郎平章事兼修國史新舊紀並書王圭監修國史泰寧鎮海等軍節度使檢校太尉同平章事岐王皓守司空開府儀同三司依前泰寧鎮海等軍節度使進封雍王兩紀並書保信保靜等軍節度使檢校太尉同平章事嘉王頵守司空開府儀同三司依前保信保靜等軍節度使進封曹王兩紀並書河東節度使檢校太師守司徒兼侍中判大名府潞國公文彥博守太尉開府儀同三司依前河東節度使判河南府兩紀並書景靈宫使護國軍節度使檢校太師守司徒兼中書令河中尹金鄉郡公曹佾兩紀並書佾為郡王鎮南軍節度使檢校司空同平章事豫章郡王宗諤淮康軍節度使同平章事濮陽郡王宗暉崇信軍節度使同平章事判大宗正事天水郡公宗旦並為開府儀同三司佾濟陽郡王宗旦華陰郡王上欲厚慈聖光獻皇后家故特封佾謂翰林學士李清臣曰佾異姓而王非例也為朕述此意新紀書宗旦舊紀不書武寧軍節度使檢校太師守司空同平章事致仕韓國公富弼依前檢校太師守司空開府儀同三司通議大夫知樞密院馮京為正議大夫樞密使皆加食邑實封故事大禮宰臣以下惟加恩至是因改官制故圭皓頵彥博京特遷官以寵之新紀書京為樞使舊紀乃不書天平軍節度使均國公傭武寧軍節度使承裕殿前副都指揮使寧逺軍節度使楊遂建雄軍節度使韓絳皆加食邑實封翰林學士以下侍從官內外兩制並換新階加恩相州觀察使同知大宗正宗惠為武昌軍留後正議大夫同知樞密院薛向本官知潁州以陳向具析養馬而上批向論事反覆無大臣體故也初向在外時策邊事精密饋餉治辦其入見論兵皆上所欲聞故任以執政且欲與計西北事而向在政府專以持重養威無先開端為言非上所望於向者最後向極知民不便畜馬令議欲改為士大夫皆言向論不謬及其與提舉官忿爭上乃獨察知向資不忠實故黜之此據墨本向傳朱本簽貼云巳係取問刪去新本復存之今從新本附向責時司馬記聞云開封府府界提㸃陳向建議令民資及三千緡者養戰馬一匹民甚苦之薛師正時為樞密副使初無異議及事巳施行向詣樞密院白事師正欲厭衆議折難甚苦向怒以告諫官舒亶劾奏師正為大臣事有不可不面陳而背誹以盜名由是罷為正議大夫知潁州諱言又言其罷黜之後不杜門省愆念咎而賔客集其門日以百數對客有怨憤語改知隨州翰林學士御史中丞李定坐不紏彈落一官知河陽舊紀書薛向論事反覆罷知隨州新紀但書向罷詔嘗任翰林學士除資政殿學士以上更不别兼學士知沅州謝麟言古誠州并小由四旗竹灘大田托口等處溪峒人户各己歸明臣續招懷九衙二十三州地林十三州依例奏補名目把托邊界又招納詳州等處洞酋首通計七千餘户乞添築沿邉城寨堡鋪及差戌兵綏輯人户籍為省民從之丁亥以户部侍郎同知樞密院事吕公著為正議大夫樞密副使薛向孫固以二十四日改樞副馮京以二十七日改使公著以二十八日改樞副先後不同當考樞密院時政紀公著改樞副又在閏九月一日新紀於丁亥日書公著為樞副舊紀不書公著與馮京薛向孫固同在西府三人者屢於上前爭論公著獨不言既而上顧問之公著乃徐為開析可否言簡而當上常納之三人者亦不能違也出則未嘗語人外皆譏公著循默不副衆望公著亦不辨也而同僚或為辨之上數與輔臣論天下事一日謂公著曰民間不知有役矣公著對曰然上户昔以役多破家今則飽食安居誠幸矣下户昔無役今率錢則苦矣上曰然則法亦當更也二事據司馬記聞今附見詔都大提舉淤田并官莊𨽻司農寺又詔改知外都水丞南北司公事為知南北外都水丞南北外都水丞依舊澶州置司命權發遣度支副使寋周輔相度江西廣東賣鹽江廣賣鹽乃郟亶建議舊録在六年十二月戊子新録在七年九月十二日已酉元祐元年閏二月四日壬辰并月末吕陶奏令參考增入此四年三月一日周輔上廣東江西二法戊子詔前權河北東路轉運副使陳知儉權發遣河東路轉運判官黃莘各追一官罰銅十斤衝替並坐失舉也嘉王頵奏妻再從叔王克復乞於文資安排詔以克復係無服親不許熙河路經略司言乞先團結蕃弓箭手從之是年詔凡弓箭手兵騎各以五十人為隊置引戰旗頭左右傔旗及以本屬酋首將校為擁隊並如正軍法蕃捉生蕃敢勇山河户亦如之五十人為隊熙寧九年五月六日保甲如此凡募弓箭手蕃捉生彊人山河户不以等樣第募有保任年十七以上弓射七斗任負帶者鄜延路新舊蕃捉生環慶路彊人諸路漢弓箭手鄜延路歸明界保毅蕃户弓箭手皆涅於背此據兵志第三卷並係之元豐三年今附九月末熙河團結蕃弓箭手後當更考詳月日
