body:
  text: 續資治通鑑長編卷一百九十一宋李燾撰仁宗嘉祐五年春正月戊戍降新知信州屯田員外郎蔡挺知南康軍初挺與李仲昌開六塔河坐罪勒停以祫享赦起知信州而監察御史裏行王陶言挺前罔朝廷以希功賞使濵河以來民被其害至今未已故復降之己亥度支員外郎集賢校理知登州胡俯特勒停兵部郎中祕閣校理知濰州解賔王落職知建昌軍始賔王以營葬求知登州及俯代賔王乃言營葬者不得請鄉郡又因事杖其妻黨賔王銜之遂訟俯嘗擅役軍匠伐州𪠘桐木作私器俯既坐自盜而知諫院范師道言賔王與俯並在館閣事緣鄉里囂然作訟頗虧士風故并黜之俯共城人也二人鄉里不同與師道所言異當考賔王知濰州據江氏雜志賔王蓬萊人已見至和元年録劉繼元孫允為三班借職允自言其家無食祿之人故特録之己酉奉安宣祖皇帝昭憲皇后御容于奉先資福禪院慶基殿初慶基殿繪宣祖像具鞾袍而昭憲皇后具冠帔至是别繪衮冕及后服二像而舊像入禁中庚戍酌獻于慶基殿辛亥改新鄜延路鈐轄閻士良復為京東西路鈐轄以監察御史裏行王陶言其性黠多生事不可處於邊地故易之甲寅封皇第九女為福安公主第十女為慶夀公主乙卯省御書院并翰林圖畫待詔以下額外所增員戊午大食國首領蒲沙乞貢方物授蒲沙乞武寧司階己未知諫院唐介言河北沿邊州軍多差軍士採萑蒲令日納錢名為地利錢以入公使請行禁止從之是月有大星墜西南光燭地有聲如雷占者曰天狗同知諫院范師道言漢晉天文志天狗所下為破軍殺將伏尸流血甘氏圖天狗墜大賊起今朝廷非無為之時也而備禦盜賊未見其至雖有將帥不老則愚士卒雖多徑勇者少邊陲可保也如州郡何州郡可保也如邊陲何小人思亂伺隙乃作必有包藏險心乘間而動者宜擇將帥訓練卒伍詔天下防其未然監察御史裏行王陶言去年日食今年星墜皆在正旦天狗主兵宜豫防之請詔中外舉智武才勇之士以備將帥今武舉取格太輕宜倣唐制設科優待以官無若招士伍然正旦星墜實録本史並不書今取范師道王陶傳所論列附見月末二月辛酉內殿承制劉溫禮為供備庫副使溫禮嘗發劉恢私進女口事下入內省劾之溫禮亦坐不實溫禮寄資已深出為內殿崇班御史論其非改內殿承制至是又援赦自陳故復遷之恢進女口事在二年五月壬戍御崇政殿録繫囚雜犯死罪以下遞降一等徒以下釋之癸亥太子少傅致仕王舉正卒贈太子太保諡安簡賜黃金百兩甲子詔河北河東陜西廣南東西荆湖南北路經略安撫轉運提㸃刑獄司體量所部兵官有不能訓戢軍旅肅靜冦姦者密以名聞丙寅禮部貢院請增江浙福建川廣諸州軍解額凡一百三十五人從之戊辰太常丞監察御史裏行王陶為右正言諫院供職親事官夜入延福宫為盜有司用疏決以常盜論陶言宫掖之嚴而以民間為比非所以尊天子也於是配海島皇城司皆論罪上自服藥以來寡於語言羣臣奏事頷之而已陶言王者之言羣臣所禀受以施於天下者也今政事無大小皆决於中書樞密陛下一無所可否豈為人主之道㦲又言皇嗣未立宜擇宗子昭穆同者育之以同列志趣不合數請監靈仙觀不許詔殿前馬步軍司每三嵗將校轉員其病老不任事者先密具名以聞壬申知諫院唐介言朝廷昨支定州糴軍糧絹五萬前知定州宋祁用一萬王素用四萬皆質易河東而素以所易布配賣與禁軍三十餘指揮凡出贏利僅萬緡而多所侵費亦嘗兼質私物至移郡時猶追索未足輒取公使庫錢數千緡以去及詔本路安撫司體量其狀無私入而止癸酉詔陜西經略安撫使如聞西人多驅牛馬於沿邊博糴民榖其令所在禁絶之甲戍鎮潼留後李端懿為寧逺節度使知澶州御史中丞韓絳言端懿無功不當領旄鉞乃以留後赴澶州復為留後乃三月乙未今并書端懿本傳云自鄆代還除寧逺節度知澶乙亥户部判官太常博士集賢校理錢公輔知眀州先是牙前法以重難積勞差次三等應格者聽指買酒場然富者數得應格而貧者以事繫留日益困應募者鮮至闕額則役鄉户為之民或竭産不足以償費公輔乃取酒場官賣收錢視牙前役輕重而償以錢悉免鄉户人皆便之然酒場既收無以酬牙前舊勞輒預借省錢二十萬取而後奏朝廷亦不加之罪也此據神宗史公輔傳丁丑觀文殿學士兼翰林侍讀學士尚書左丞提舉景靈宫田况為太子少傅致仕庚辰詔入內省內臣曽犯贓私罪勒停雖經赦毋得復𨽻入內省壬午汝州録事𠫭軍楊從簡為殿中丞致仕特賜五品服以從簡自契丹歸眀守官二十年無他過也三班院言奉詔看詳同勾當三班院楊畋所請諸路走馬承受雖是使臣緣預聞邊要主帥機宜公事職任非輕理當遴選乞應中書制敕院沿堂五院樞密院出職人並依諸司人吏更不預選走馬承受差遣乞依畋請從之舊制東頭供奉官并諸司人吏臣僚家僕及伎術進納人等並不許選諸路走馬承受㑹要二月十七日事今附月末三月辛卯詔城外四面巡檢自今並選閣門祗候以上嘗經外任親民而無贓私罪者為之壬辰詔禮部貢舉癸巳陳州言觀文殿學士刑部尚書劉沆卒贈左僕射兼侍中知制誥張瓌草詞詆沆其子館閣校勘瑾訴于朝帝為改命詞臣其家不敢請諡帝又為作挽辭且篆其墓碑曰思賢沆性豪率少儀矩然任數善刺取權近過失隂持之故雖以髙科仕其進用多由此議者乃謂緣結附至宰相焉甲午詔三司河東路糴糧草舊支一分見錢三分茶自今並以見錢給之四年二月己巳㢮茶禁不應此時尚有茶以糴糧草當考乙未罷滄州路嵐石都巡檢司代州駐泊司走馬承受公事減髙陽關路廣信等軍都巡檢司麟府路成都府路利州路走馬承受使臣一員滄州都巡檢使當與治平二年十二月相參又治平三年十月郭緒以滄州總管兼雄霸州沿界河至海口及滄州界沿海都巡檢使更須考詳别修嵗星晝見丙申客省使眉州防禦使張亢為祕書監亢初授河陽部署以疾辭御史中丞韓絳言亢前守懷衛二州貪橫不法今不可復用而亢亦自請復文資因許之踰月又歸故官復為客省眉防乃五月壬辰今并書丁酉光祿寺丞致仕孔􅌈知龍興縣知許州賈昌朝薦􅌈有髙行特起之􅌈復辭不起是嵗卒贈太常丞贈官在十一月癸丑今并書戊戍詔流內銓自今歸眀人年二十五以上聽注官初泗州司士參軍徐濟自陳歸眀時八嵗今年四十八不得注官因著此條壬寅封嘉勒斯賚妻太原郡君喬氏為安定郡夫人本傳云董戬年九嵗斯賚為請于朝命為㑹州刺史而喬氏封太原郡君初封太原時當考按寶元元年四月喬氏已自太原郡為永嘉郡夫人不應此時更以太原封安定當考丙午詔廣南東西路攝官處皆荒逺災瘴之地而月俸不足以自給其月增錢一千五百壬子詔曰天災流行蝗潦相繼雖發廪蠲賦而民之捐瘠者尚多或鬻賣妻子或轉死溝壑方春之時羣物欣豫乃令吾民不聊若此朕心􅉃怛惄焉靡寧其令災傷路轉運使提㸃刑獄督州縣營濟之察不稱職者初御史中丞韓絳言諸路災傷朝廷雖行賑恤而監司親民官未盡究心致民之流徙者衆宜其丁寧訓之故下此詔癸丑知雄州曹偕言幽州人杜清自來與雄州探刺事宜今事覺挈家來歸請補外州一教練使給良田數頃仍以月俸贍之從之録周世宗後柴元信為三班借職甲寅詔登州改配沙門寨罪人三十二人於諸州牢城三年十二月六日王舉元奏可考丁巳詔書既弛茶禁論者猶謂朝廷志於便人欲省刑罰其意良善然茶户困於輸錢而商賈利薄販鬻者少州縣征稅日蹙經費不充知制誥劉敞翰林學士歐陽修頗論其事敞疏云古人有言利不百不變法蓋言立事之難也朝廷變更茶法誠欲便百姓阜國用而已自變法以來由東南來者更言不便徒以初詔不欲人立異故一切緘默莫敢正言其大要以謂先時百姓之摘山者受錢於官而今也顧使之納錢於官受納之間利害百倍先時百姓冒法販茶者被罰爾今悉均賦於民賦不時入刑亦及之是良民代冒法者受罪子子孫孫未見其已先時大商富賈為國貿遷而州郡收其稅今大商富賈不行則稅額不登且之國用此三者最其害也或以謂法遂不變則中家必困小家必流若因緣驅逼起為盜賊甚非國家之利也臣愚欲乞申敕有司益采輿議且收格前詔極論可否若朝廷能粲然復三代之舊風捐山澤之末禁則乞一弛茶法恣民勿問設為國用尚繁利源未可悉除猶當擇其利害變而通之使公私兩濟若求益反損求利反害臣恐東南數十州之民由此而困則所謂利不百不變法者也未知其可臣暗於時事不足以商功利然耳之所聞心之所疑不敢不陳望朝廷因臣之言以求便國惠民之䇿至於細民委曲臣亦不能盡也修疏云朝廷近改茶法欲救其弊失而為國誤計者不能深思逺慮究見本末惟知圖利而不圖其害方一二大臣鋭於改作之時樂其合意倉卒輕信遂決而行之令下之日猶恐天下有以為非者遂直詆好言之士指為立異之人峻設刑名禁其論議事既施行而人知其不便者十蓋八九然君子知時方厭言而不肯言小人畏法懼罪而不敢言今行之踰年公私不便為害既多而一二大臣以前者行之太果令之太峻勢既難回不能遽改而士大夫能知其事者但騰口於道路而未敢顯言於朝廷幽逺之民日被其患者徒怨嗟於閭里而無由得聞於天聽陛下聰眀仁聖開廣言路從前容納補益尤多今一旦下令改事先為峻法禁絶人言中外聞之莫不嗟駭語曰防民之口甚於防川川壅而潰傷人必多今壅民之口已踰年矣民之被患者亦已衆矣古不虛語於今見焉臣亦聞方改法之時商議已定猶選差官數人分出諸路訪求利害然則二三大臣不惟初無害民之意實亦未有自信之心但所使之人見朝廷必欲更改不敢沮議又志在希合以求功賞𫝊聞所至州縣不容吏民有所陳述直云朝廷意在必行但要一審狀爾果如所傳則誤事者在此數人蓋初以輕信於人施行太果今若眀見其害救失何遲患莫大於遂非過莫深乎不改臣於茶法本不詳知但外論既喧聞聽漸熟古之為國者庶人得𫝊言於朝正為此也臣竊聞議者謂茶之新法既行而民無私販之罪嵗省刑人甚多此一利也然而為害者五焉民舊納茶稅今變租錢一害也小商所販至少大商絶不通行二害也茶稅不登頓虧國用三害也往時官茶容民入糴故茶多而賤今民自買賣須要真茶真茶不多其價遂貴四害也河北和糴實要見錢不惟商旅得錢艱於移用兼自京師嵗嵗輦錢於河北理必不能五害也一利不足以補五害今雖欲減放租錢以救其弊此特寬民之一端爾然未盡公私之利害也望詔主議之臣不護前失深思今害黜其遂非之心無襲弭謗之迹除去前令許人獻說亟加詳定精求其當庶幾不失祖宗之舊制是時朝廷方排衆論而行之敞等雖言不聽也及治平中嵗入臘茶四十八萬九千餘斤散茶二十五萬五千餘斤茶户租錢三十二萬九千八百五十五緡又儲本錢四十七萬四千三百二十一緡而內外總入茶稅錢四十九萬八千六百緡史臣曰推是可見茶法得失矣及治平至得失矣並用本志修入三項錢總一百三十萬二千七百八十六緡龔鼎臣東原録云歐陽永叔與劉原甫言新定茶法不便乞别立法富鄭公上前言近罷𣙜茶改一百餘年之弊法不能無些少未便處須略整齊可矣譬猶人大病方愈須用粥食湯藥補理即漸平復矣上頷之修敞論改法非便他書並不載君相當時不從之說惟鼎臣記此今附注云夏四月庚申權同判尚書刑部李綖言天下上刑部一嵗之中死刑亡慮二千五百六十其殺父母叔伯兄弟之妻殺夫殺妻殺妻之父母凡百四十故謀鬬殺千有三百劫盜九百七十姦亡命百有一十夫風俗之薄無甚於骨肉相殘衣食之窮莫急於盜賊今犯法者衆豈刑罰不足以止姦而教化未能𨗳而為善歟欲令刑部依刑名分門列天下所斷大辟罪嵗上朝廷以助觀省從之癸亥御崇政殿閲諸軍轉員凡三百己巳契丹國母遣林牙左驍衛上將軍耶律格崇祿卿吕士林契丹遣瑞聖節度使耶律素東上閣門使張戩來賀乾元節庚午賜閬州州學教授程讓粟帛以轉運司言其髙退有行義也己卯度支判官祠部員外郎直集賢院王安石同修起居注安石以入館才數月館中先進甚多不當超處其右固辭之癸未樞密副使吏部侍郎程戡罷為觀文殿學士兼翰林侍讀學士同羣牧制置使戡與樞密使宋庠同府戡語多俗庠鄙之自是不協爭議屢至失聲色諫官御史兩論之戡亦自請罷故也據吕誨奏議乃爭馬懷德管軍事當考去年十一月甲寅四方館使英州刺史馬懷德為象州防禦判官兼都虞侯鄜延路副部署翰林學士承㫖兼侍講學士禮部侍郎知制誥孫抃為樞密副使抃久居侍從泊如也人稱其長者及程戡罷宰臣進擬例以三司使御史中丞知開封府一人補其員上曰朕欲用舊人即以命抃抃得兩府湘山野録以為由草章懿升祔制當考甲申降右司諫祕閣校理吳及為工部員外郎知廬州太常博士監察御史裏行沈起落裏行通判越州初諫官陳旭建議裁節班行補授之法下兩制臺諫官集議已定及起乃擅改議草令買撲興國軍磁湖鐡冶仍舊與班行主磁湖鐡冶者大姓程叔良也翰林學士胡宿等劾及等職在臺諫而為程氏經營占錮恩澤乞詔問其狀及等引伏故並黜之丙戍命權三司使包拯右諫議大夫吕居簡户部副使吳中復同詳定均稅又命天章閣待制張掞在六月丙寅又命樞密直學士吕公弼在九月丙申又命吕景初在六年五月丁酉又命司馬光在六年七月薛向行狀向為陜西漕六年四月遷司勳員外郎専切主管均稅五月戊子朔降户部郎中知制誥張瓌知黃州祕書郎館閣校勘劉瑾落職初瓌草瑾父沆贈官告詞言沆特鄉里豪舉以附㑹至宰相瑾上章訴於朝不報乃衰服遮宰相自言并醜詆瓌私事六七章不已監察御史裏行陳洙劾奏之兩人俱坐黜責洙建陽人也侍御史陳經言劉沆子瑾以張瓌撰父贈官告辭不當五狀訴理朝廷已黜瓌知黃州奪瑾校勘之職風聞瑾所奏狀並於內東門進入瑾身居草土名落班籍未知何緣得至於彼慮瑾隂結左右內臣諭令收接並乞根鞫情幸嚴行降責中書尋取到御藥院狀乃內降指揮從瑾奏請依晏殊例凡陳乞沆身後事並於御藥院投進詔今後臣僚乞於入內內侍省御藥院內東門投進文字者令逐處申中書再取㫖詔京師大疫貧民為庸醫所誤死者甚衆其令翰林醫官院選名醫於散藥處參問疾狀而給之己丑京師地震西上閣門使英州刺史郭咨獻所造拒馬車咨嘗知潞州言懷保二郡旁山可以植稻定武唐河抵瀛莫間可興水田又作鹿角車陷馬槍請廣獨轅弩於他道詔咨置弩千分給并潞咨又言臣自冠武辨未嘗一日不思禦戎之計頃使契丹觀幽燕地方不及三百里無十萬人一年之費且烏合之衆非二十萬不敢舉若以術制之使舉不得利居無以給不踰數年必棄幽州而遁慶厯初經畫河北大小水界斷敵疆乃其術也臣所創車弩可以破堅甲制奔衝若多設之助以大水取幽薊如探囊中物爾㑹三司議均田租召還咨陳均括之法四十條復上平燕議曰契丹之地自瓦橋至古北口地狹民少自古北口至中京屬奚契丹自中京至慶州道旁才七百餘家蓋契丹疆土雖廣人馬至少儻或南牧必率髙麗渤海逹靼黑水女真室韋等國㑹戰其來既逺其糧匱乏臣聞以近待逺以佚待勞以飽待饑用兵之善計又聞得敵自至者勝先據便地者佚以臣所見請舉慶厯之䇿合衆河於塘泊之北界以限戎馬然後以景德故事頓兵自守步卒二十萬騎卒三萬强壯三萬嵗計糧餉百八十三萬六千斛又旁河郡邑可由水運以給保州然後以拒馬車三千陷馬槍千五百獨轅弩三萬分選五將臣可以備其一來則戰去則勿追幽州糧儲既少敵不可久留不半年間當遁沙漠則進兵斷古北口塞松亭關𫝊檄幽薊燕南自定昔漢髙祖提三尺劍定天下唯胸奴未滅至孝武時始逐出漠北唐太宗建義旗取天下唯吐蕃未滅至代宗時始入貢稱藩我太祖駿膺天命天下咸服亦唯契丹未滅當俟聖謀奉行天討且彼之所恃者惟馬而已但能多方致力使馬不獲伸用則敵可破幽燕可取帝壯其言詔置獨轅弩二萬尋命咨同提㸃在京諸司庫務及揀內軍器庫兵仗下南北作坊繕完特命咨提舉同提㸃百司在七月甲辰提舉修完兵器在八月己未今并書之貴人董氏生皇第十一女庚寅進位美人固辭之乞增父官一級如其請壬辰賜修狹河木岸役卒緡錢癸巳賜眀州進士楊適粟帛以轉運使言其文行稱于鄉里也詔西川廣南罷任官有侍行子孫歸本貫取解不及鎖㕔人在川廣福建罷任及元係川廣福建人見在本鄉守選待闕者並許就本路轉運司取解應眀經諸科省試三場以前九否十否者令貢院再考校本處解送試卷若以否為粗以粗為通及出義不依條制致有妄薦者以舊條坐之不在末減若考校通粗及出義依條别無差繆省試三場前九否十否即考試官於元條上減一等定罪舊條合殿選者與免殿選選人該衝替者實殿一選京朝官勤停者與衝替衝替者與監當監當者與逺處差遣先是祕閣校理陳襄等言諸科之弊在於𫝊義難禁而考試官止較其文莫能檢察及到省所對十否而考試官多坐罪勒停原情定罪宜在末減乃下兩制與貢院議而裁定之甲午觀文殿大學士户部侍郎龎籍為太子太保致仕籍自定州召還既入見詣中書白執政求致仕執政曰公康寧如是且上意方厚奈何欲去之堅也籍曰若待筋力不支人主厭棄然後去斯不得已爾豈得為止足㦲遂歸卧于家前後凡七上表其劄子不可勝數乃許之仍詔籍出入如二府儀乙未詔京城疾疫其蠲官私房錢十日丁酉詔三司置寬恤民力司六月乙亥遣使本紀但書遣使不書置司己亥潁州進士常秩為試將作監主簿本州州學教授翰林學士胡宿等言其文行稱于鄉里也秩臨汝人嘗舉進士不中退在陋巷二十餘年為學求自得尤長於春秋學者常以孫復所學問秩秩曰此商君法爾步過六尺與棄灰於道者皆有誅不近人情甚矣秩皇祐六年賜粟帛甲辰光祿寺丞致仕梁造為太常寺太祝知單父縣京東安撫使言其節行聞于鄉里故特起之丙午祕書監林濰致仕先是濰知汝州秦悼王墳域在汝宗室祔葬役兵無慮五千人濰以汝近鄉閭因役兵畢功使採薪芻冶鐡石輦致其家衆怨憤謀殺濰㑹日暮城門閉不能入遂劫大校相率叛走濰匿不敢出通判大理評事竇卞破鑰唘關招之反復說諭衆已稍定因紿語曰此輩特醉酒狂呼耳密推為首者羈之請於朝悉從配徒因詔濰致仕卞寃句人也濰附傳及本傳並不載致仕因由今取竇卞傳所書附此戊申樞密直學士吏部郎中權知開封府陳旭以足疾罷為右諫議大夫同提㸃在京諸司庫務樞密直學士禮部郎中知泉州蔡襄為翰林學士權知開封府降右諌議大夫權御史中丞韓絳知蔡州初絳彈奏宰臣富弼且言張茂實人以為先帝子而引用管軍事密難測既而居家待罪自言不敢復稱御史中丞上遣中使召不出翌日臺屬官往勸之乃出又不秉笏穿朝堂知諫院唐介右正言王陶侍御史知雜事范師道御史陳經吕誨裏行陳洙等皆言茂實頃為狂卒誣詆已經朝廷辨白兼復用管軍乃中書密院同議人亦無間言今絳茍欲以危法中傷人臣而不知主無根之言搖動衆聽翻為朝廷不便兼絳舉措顛倒不足以表率百司故出之賜國子博士新通判眀州趙至忠銀百兩絹百匹至忠數以契丹機密事來獻故也實録云至忠獻契丹蕃漢兵馬機密事十冊并契丹出獵圖嫌與二年四月辛酉相重因稍刪潤之癸丑以侍御史趙抃為右司諫諫院供職甲寅以淮南江浙荆湖福建等路提舉運鹽公事職方員外郎朱處仁為屯田郎中時新置運鹽司處仁嵗滿當遷官已除祠部郎中命未下而處仁自援例請改名曹故奪而下遷之乙卯御崇政殿録繫囚雜犯死罪已下遞減一等徒以下釋之六月乙丑詔戒上封告訐人罪或言赦前事及言事官彈劾小過或不關政體者時殿中侍御史吕誨言故事臺官許風聞言事者蓋欲廣其采納以輔朝廷之闕失比來中外臣僚多上章告訐人罪既非職分實亦侵官甚者詆斥平素之缺暴揚曖昧之事刻薄之態寖以成風請懲革之故下是詔王稱東都事略詔曰朕聞前代之稱治者君臣同心上下輯睦人知禮義之節俗無激訐之風何其德之盛也朕雖弗敏竊嘗慕焉自今臣僚如有輒上封章告人罪及以赦前事言者並當訊劾之言事之臣雖許風聞宜務大體如事關朝政無憚極論自餘細故勿須察舉丙寅命天章閣待制張掞同詳定均稅戊辰寧國節度副使孫沔為光祿卿分司西京辛未翰林學士胡宿御史中丞趙槩磨勘轉運使提㸃刑獄課績壬申詔禮部貢院內外鎖㕔并親戚舉人並同引試解十分之一如不及十人亦許解一人四人以下送鄰路聚試乙亥遣官分行天下訪寬恤民力事五月丁酉初置司張耒明道雜志曰韓魏公當國遣使出諸道以寬恤民力為名既行魏公大悔之每見外來賔客必問寬恤使者不擾郡縣否意恐詔使搔擾民重不安也無幾皆罷之此事當考今雲安軍下巖寺有石刻滎州資官令孔嗣宗奉詔寬恤民力嘉祐六年十月十五日過此不知竟用何時罷遣寬恤使者然則耒所稱無幾蓋不然也戊寅廣西經略司言雍州甲峒等蠻賊五十餘人內冦詔雍州發兵攻討之辛巳詳定編敕所言皇親宫院有違禁衣服首飾器用之類及雖係所賜或父祖所置者聽百日中改造如違令本宫使臣覺察申大宗正司施行從之甲申詔審院官京朝官當入西川廣南福建路差遣而用薦舉規避者委本院執奏之三司減省冗費所言比嵗內人請俸倍多乞酌天聖初嬪御以下人數著為定額從之閣門編纂條例所言伏見臣僚以疾乞免大起居舞蹈之類竊以臣下見君當極恭肅一有不至罰必及之以疾自言乞損拜伏人取其便非所以致恭肅尊朝廷也且有疾與告著令所容殺禮見君古訓無有自今敢干請者乞令閣門彈奏重致其罰惟勳德大臣必藉任使自從特㫖又昨崇政殿進呈大樂依觀雙竹例宣召羣牧判官檢㑹儀制游晏宣召皆著定式而羣牧判官不與蓋當時有司之失遂開此例欲乞今後非次遊宴觀看不須更召其帶館職充者自從館閣官例又都知押班如趂班不上今别作一班起居臣等以為朝廷之儀皆有定制茍不及禮謂之不恭不恭有罰未聞預設别班以待不及禮者伏請蠲去又三人內及第正權三司判官者並賜緋臣等以為古制有其官者服其服未聞一官之中更以入仕之階為之輕重恐非聖朝平均奬勸之道伏請蠲去又大朝㑹綴中書門下班坐杌子戴凉傘中書樞密院下馬處之類皆是特恩異禮近嵗大臣例多得之看詳前件禮數皆朝廷所以尊異執政大臣也非其人無其位者不當有也若人人得之則車服輕而不尊車服輕而不尊則賢者怠而不肖者有慢上之心矣其漸不可不謹也已别具編録非以為例蓋備天子非常之詔加禮於老成勳德之臣訪故事於有司則以對也仍乞令閣門今後非詔㫖詢問不得輒自申舉並從之此據㑹要乃六月二十六日事今附月末又言諸賜與物等多是逐人自乞方得支給然賜與者乃人君所以優寵臣下有祗受之禮無自請之文今當賜者有司不即舉行必待自言或至援引此例章訴紛然殊失上下之體內文臣及軍員授右職者多是進狀乞賜公服鞾笏腰帶乞今後凡換右職者便令閣門舉例支賜又臣僚放免朝辭更不支賜分物看詳連值假故或有急速差遣方許放免有當賜分物例須自陳亦有近侍朝臣不免如此尤失事體乞今後臣僚放免朝辭非罪纍被譴者便於特降指揮後著合得分物令閣門依例支給又使臣朝辭雖非親民差遣如宣命內理為親民資序並依監押例支朝辭分物如宣命不著本官稱合係親民資序即㑹問三班院支給則是使臣分物不以差遣髙下乃係本人資序乞下三班院今後如使臣受差遣理為親民資序不是情願乞充監當者畫時關報閣門其知州折資充通判通判折資充簽判知縣非因過降授者並依資序支朝辭分物欲乞令審官院依三班院體例關報從之此據㑹要五年六月事但無其日今附此
