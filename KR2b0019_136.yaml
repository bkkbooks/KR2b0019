body:
  text: 續資治通鑑長編卷一百三十二宋李燾撰仁宗慶厯元年五月己酉朔詔諸路各置招撫蕃落司以知州通判或主兵官兼領之此事實録殊不記惟此月朔書命知麟州苗繼宣管勾招撫屬户事因采田况奏議特書之辛亥詔陕西經略安撫緣邊招討使判永興軍夏竦候陳執中至領兵出巡邊乙卯詔以銅錢出外界一貫以上為首者處死其為從若不及一貫河東河北京西陕西人決配廣南逺惡州軍本城廣南兩浙福建人配陕西其居停資給者與同罪如捕到蕃人亦決配荆湖江南編管仍許諸色人告捉給以所告之物其經地分不覺察官吏減二等坐之初權三司使公事葉清臣言朝廷務懷來四夷通緣邊互市而邊吏習於久安約束寬弛致中國寶貨錢幣日流於外界比年縣官用度既廣而民間貨易致不通方羌戎為叛指日待誅姦人出入邊關蕩然無禁故於舊條第加其罪丁巳御崇政殿録繫囚雜犯死罪以下遞降一等杖以下釋之戊午以右班殿直閣門祇候趙珣為閣門通事舍人陕西經略安撫招討都監珣初隨其父振在西邊訪得五路徼外山川邑居道里凡地之利害究其實作聚米圖經五卷韓琦言於帝詔取其書并召珣至又上五陳圖兵事十餘篇帝給步騎使按陳既成臨觀之於是陳執中薦珣為緣邊巡檢使吕夷簡宋庠共奏曰用兵以來䇿士之言以萬數無如珣者即擢任之珣自以年少新進未有功辭都監授兵萬人賜御鎧仗令自擇偏裨參佐居涇原兼治籠竿城瑪展當羅百餘帳處近寨為暴珣白府引兵二萬自靜邊歷貴烏抵默寧襲賊俘獲千計靜邊將劉滬殿後為賊所掩珣登阪望見從騎數百復入拔滬之衆以出士皆歎服轄戩居康谷無所屬珣與書招之遺以綈錦轄戩聼命數事附見恐别有日月則當追改本傳云珣辭都監按此月丁卯即罷都監不緣珣辭也不知珣不為都監後以何官治籠竿城據范仲淹奏議慶厯二年二月五日奏看詳珣所上劄子猶帶都監且云去年十一月赴籠竿城駐劄則是珣未嘗辭都監都監亦未嘗罷也當考己未代州言陽武寨有北界人侵耕禁地蓋由前寨主彌文寶等失巡防所致請自今緣邊諸寨有失巡防致北界侵耕者凖透漏賊盜條論罪從之壬戌詔入內內侍省都都知內侍省左右班都知比景福殿使入內內侍省都知內侍省左班都知右班都知比宣慶使入內內侍省副都知內侍省左右班副都知比宣政使入內內侍省押班如本官諸司使以上者比昭宣使諸司副使以上並班皇城使之上從閣門所奏也吕夷簡初入相即升都知押班班次天聖七年九月於是三入又降此詔然未嘗關報御史臺故當時任都知押班者每遷官則必奏免正衙議者非之先是左正言孫沔奏太宗初置京朝官考課院即今審官院是也凡中外守任咸給印紙厯子或功績可紀清白有守過犯度數舉主姓名盡得書之無所遺俾至闕下赴院磨勘第其等而升黜之此朝家激勵賢才驅策駑蹇之至術也自後因循咸以磨勘為轉官之階梯不復有尚功之志節但居官三周例遷一級雖數有失亦不退覆故士大夫以無過犯為能是使庸愚不肖之人晏然自得不十年間坐致員外郎是以居常則朱紫相隨應用則玉石難辨茍不更張弊轍必恐寖廢政綱臣欲乞今後應京官升朝官並依舊許三周年一次磨勘如明有理迹亷名者即與轉官有公私罪者等第降黜無功過者且守舊資如此足以旌别賢愚永著甲令亷勤公幹之士聞之必激節顧行者衆矣更乞差近上臣僚别定格式亦一時之懿範也沔又奏國朝自景德祥符間屢行大禮旁流慶澤凡文資自帶職員外郎武職自諸司副使已上每遇南郊及知雜御史刺史以上逐年聖節並許奏蔭子孫弟姪雖推恩至深而永式未立今臣僚之家及皇親母后外族皆奏薦略無定數多至一二十人少不下五七人不限才愚盡居祿位未離襁褓已列簮紳或自田畝而來或從市井而起官常之位已著而僕𨽻之態猶存是則將國家有數之品名給人臣無厭之私惠故使父兄不敦教訓子弟不修藝業俾之從政徒只害民若不急為更張已見積成弊幸欲乞今後帶職員外正郎只許蔭敘一名子弟少卿給諫與二人丞郎三人尚書四人僕射以上與五人致任及物故各更與一人武職等比類官品皇親母后之族及兩府大臣亦乞約立人數伏乞特差近上臣僚定其久制以為萬世之法於是沔又奏臣前日上殿曽有劄子乞差近上臣僚重定文武班磨勘官資年限蔭子孫人數事已蒙聖旨送中書訖竊見內侍省近年改官亦無定制率不踰紀便至使名况國朝已來自有故事今半載之內四為防禦既無殊績又匪年勞未知何名當此異寵復又奏蔭飬男人數不少伏望特降嚴命指揮令限年遷轉及約品蔭敘為昌朝之永式沔又奏臣竊聞內侍别立主司中官自通禁省有唐四品不通於典制五局兼著於令丞所以分中閫之政不使挾外廷之議如此檢節尚至侵陵故聖宋已來明制斯在太宗著令式之文真宗述針規之訓能詔近習各謹吹噓所繫安危尤加約束是以先朝秦翰等數人履行端謹節義深厚心皆好善意不害人出則總邊方之寄歸則守內庭之職俾之兼領亦不侵官止守使名終無殊命今聞欲以都知押班之資升於閣門引進之上隳國家之舊典起宦寺之威權况內殿起居則别班朝集宴會則不預安用異數竊據橫行蓋因勾當局務之間多與文武官員同事爭列名銜自尊位貌遂欲改革品秩僥冀寵榮誰啓厲階輒敗經制今邊陲用武賞罰是先慎揀官資尚難激勸豈宜閽寺之人更居侯伯之上竊恐將帥之臣耻居其下策勳之際不重此官大紊紀綱事亦非細伏望守祖宗之規式戒左右之權幸則朝廷之福天下之幸也所有先降劄子下閣門重定都知押班位乞更不施行沔又奏竊見天聖之間多有內降莫測夤緣盡由請託蓋頗邪之輩巧宦進身求左右之容僥滎濫賞假援中闈實玷朝直昔唐之斜封終汚圖史洎景祐初元陛下勤政首革時弊澄清仕途天下之人抃足稱快近嵗以來此路復起未知以何事迹逹於聰明妨公起謗無甚於此中人佞人得以希意隂結所知率由斯道故有位臣僚引薦親戚干冒寵榮惟務奔趨不顧亷耻豈非風化使然伏望特發宸𠂻止絶內降如有合自中出之事令兩府及諸司依公執奏勿使阿諛上纍聖明仍乞别降手詔戒告中外沔五奏並據沔家集并畢仲遊神道碑沔五奏皆與大臣牾又薦田况歐陽修張方平曽公亮蔡襄王素可任諫官自代此據畢仲遊神道碑甲子沔罷左正言為工部員外郎提點兩浙路刑獄出內藏庫緡錢一百萬助三司給陜西軍費仍令轉運司聽商人於緣邊及內地入見錢給以香藥象牙鹽茶或與恩澤乙丑贈皇長子為太傅封褒王賜名昉諡懷靖與豫王同葬于永安丁卯罷陜西經略安撫緣邊招討都監庚午龍圖閣直學士權三司使葉清臣知江寧府權知開封府天章閣待制吳遵路知宣州陜西都轉運使龍圖閣直學士姚仲孫權三司使知制誥賈昌朝為龍圖閣直學士權知開封清臣與遵路相厚宋庠鄭戩皆同年進士四人據要地鋭於作事宰相以為朋黨請出之辛未右諫議大夫參知政事宋庠守本官知揚州樞密副使右諫議大夫鄭戩加資政殿學士知杭州先是吕夷簡當國同列不敢預事唯諾書紙尾而已獨庠數與之爭論夷簡寖不悅上顧待庠頗厚夷簡忌之巧為所以傾庠未得及范仲淹擅通書元昊又焚其報夷簡從容謂庠曰人臣無外交希文何敢如此庠以夷簡誠深罪仲淹也他日於上前議其事庠遽請斬仲淹樞密副使杜衍力言其不可庠謂夷簡必助已而夷簡終無一言上問夷簡夷簡徐曰杜衍之言是也止可薄責而已上從之庠遂倉黃失措論者喧然皆咎庠然不知實為夷簡所賣也於是用朋黨事與戩俱罷時西兵數衄上憂之欲遣輔臣戩請行不許庠戩同罷戩獨加職此必有説當考翰林學士兵部郎中知制誥王舉正為右諌議大夫參知政事舉正厚重寡言前一夕吏有報者舉正方燕居齋舍徐謂吏曰傳者必妄不然安得漏禁中語既入謝上曰卿恬於進取未嘗干朝廷以私故不次用卿樞密直學士右諫議大夫知益州任中師龍圖直學士給事中知河南府任布並為樞密副使先是布數上書論事帝欲用之吕夷簡薦中師才不在布下遂俱擢任或曰中師前罷廣州嘗納賂於夷簡於是樞密副使闕上謂夷簡用諫議大夫任姓者蓋指布也夷簡遽進中師名上徐曰今在西川夷簡因言中師可用乃并用兩人此據日記右諫議大夫集賢院學壬楊日嚴為樞密直學士知益州時三司急財用有詔析户版為十等第賦役民以歲租占佃官田廬者髙其估募輸錢就市為已業人苦其擾又陜西奏收市益梓路溪洞馬而不知其實無馬也日嚴皆奏罷之日嚴此事恐自有時日則此除當削去詔陜西經略安撫招討使判永興軍夏竦屯鄜州同陜西經略安撫招討使知永興軍陳執中屯涇州時兩人議邊事不合故分任之壬申徙知耀州龍圖閣直學士范仲淹知慶州兼管勾環慶路部署司事初元昊反隂誘屬羌為助環慶酋長六百餘人約與賊為鄉導後雖首露猶懷去就仲淹至部即奏行邊以詔書犒賞諸羌閲其人馬立條約讎已和斷輒私報之及傷人者罰羊百馬二已殺者斬負債爭訟聽告官為理輒質縳平人者罰羊五十馬一賊馬入界追集不起隨本族每户罰羊二質其首領賊大入老幼入保本寨官為給食即不入寨本家罰羊二全族不至者質其首領諸羌受命恱服自是始為漢用知慶州天章閣待制張奎為陜西都轉運使癸酉內六班散都頭都知郭興等試武藝於崇政殿擢興為左藏庫副使餘並優遷之甲戌虞部員外郎監百里鎮酒務郭志髙復為六宅使涇原路都監尋以親喪復為虞部員外郎太常丞直集賢院簽書陜西經略安撫判官田况上兵䇿十四事一曰昊賊弄兵侵噬西蕃開拓封境僣叛之迹固非朝夕始於漢界緣邊山險之地三百餘處修築堡寨欲以收集老弱併驅壯健為入冦之謀初貢嫚書亦未敢擾邊范雍在延州屢使王文思輩先肆侵掠規貪小利賊遂激怒其衆執以為辭王師伐叛弔民之體自此失之劉謙髙繼嵩等破龐青諸族任福襲白豹城皆指為有功者也無不殺戮老弱以為首級彼民皆訴寃於賊以求復讎此皆吾民受制敵人而又使無辜被戮毒貫人靈上下文移皆謂之敵人吁可愧也或謂國家久不能用兵將卒未練欲使趨功騖利習於戰鬬爾然賊界諸處設備甚謹屢見打族非利俘獲無幾陷沒極多如郝仁禹打旺額依族亡三百四人無所獲任政打納斡堡亡一百九十三人秦鳯部署司打隆博族亡九十六人各獲首一級麟府軍馬司入賊界牽制亡三百八十八人斬馘者十八其餘大亡小獲無足言者以此計之實傷挫國威取賊輕侮自今宜且罷打族但嚴設守備以俟賊至然後别為之策以破姦謀二曰自昊賊冦邊王師屢戰不利非止人謀不善抑亦衆寡非敵近因好水川之敗士氣愈怯諸將既沒牙隊之兵罪皆當斬朝廷普示含貸欲為招集伸恩屈法事非獲已軍中相勸以退走自全為得計陜西雖有兵近二十萬戍城寨二百餘處所留極少近又欲於鄜延環慶涇原三路各抽減防守駐兵於鄜慶渭三州大為屯聚以備賊至然今鄜延路有兵六萬六千餘人環慶路四萬八千餘人涇原路六萬六千餘人除留諸城寨外若逐路盡數那減屯聚一處更會合都監巡檢手下兵併為一陳極不上三二萬人賊若分衆而來猶須力決勝負或昊賊自領十餘萬衆我以三二萬人當之其勢固難力制議者但欲以寡擊衆幸於偶勝然非萬全策也夫能以寡擊衆徼一時之勝者或得地利或發竒策非可恃以為常今必敗之形洞可前照而恬然坐視莫或為計議者又謂賊若併兵而入則可率他路兵以禦之且賊每入冦既有所得飈馳霧卷一夕而去他路固無所及矣或謂收保邊民持重以觀其勢可擊則擊不可則已賊不過破毁民生因食野積而歸爾此茍一日之不敗則可也深慮後患有異於斯臣去冬在都下嘗聞士大夫相與言謂小羌不足憂何則叛命之初我無邊備若兵隨檄至則關中安危未可知此賊計之失也自劉平石元孫陷沒中外震駭賊若長驅而至誰能當之此二失也臣始聞此説謂賊之易與也今觀其包藏變譎圖全擇利乃知所謂失策者實賊之得計也且賊未敢長驅亦猶我之未敢深入所以然者主客異勢進退懷疑邊防之兵並出其後險要之地或斷其歸是決成敗於一舉豈勝算哉自李士彬被虜劉平等敗沒延州之境蕩然一空日者山外之民殺掠奔潰已亡大半是渭州之境又漸空矣料賊今秋來春猶且驅劫不已必使我藩籬盡空表裏可見然後攻城破邑漸謀長驅則無後顧之患臣所謂關中安危漸不可測願朝廷為勇斷之計也斷之勇者在乎發內帑之財募陜西河東強壯之民五七萬分屯鄜延環慶涇原三路甫及防秋則以逐處弓手分畨戌守城寨而參以正名每路及五六萬人以上精加訓練我軍既衆其氣自振也必曰募民兵則衆情不安增邊戍則大費不贍此循常拘近之論也且民兵之法祖宗所行訖今軍中餘老多在加之出財選募非同差點其中必有樂聞效用者內帑之積祖宗本為用兵今乃其時也三曰用兵之法當先有部分部分進退權於大將旗鼓旗鼓常在軍中自西陲用兵每戰必敗好水川之戰任福實大將而不能指麾統制以為已任乃自率一隊前當劇鋒矢盡勢窮而後陷沒忠勇之節雖可嗟閔然論其才力止一卒之用夫部分不明多則不能辨少則不能勝進無所勸退無所止一有紛亂則其勢北矣欲矯此弊在乎先求大將之才峻其威權而尊寵之如葛懷敏為鄜州部署張亢為鈐轄當以偏裨之禮奔走麾下若犯令即當誅之乃平牒往來動皆鈞禮韓琦范仲淹為經略安撫副使葛懷敏見之禮容極慢上下姑息三軍之士何所法耶夏竦陳執中以儒臣委西略不能身當行陳為士卒先至於選擇大將明立部分乃其職也乞朝廷降詔令更互巡邊采察邊臣中有材任大將者特與不次拔擢其驕怯之將徒自顧重不為國家盡力者奏罷之則部分立而功可冀矣四曰自古用兵未有不由間諜而能破敵者也昊賊所用諜者皆厚賞賂極其尊寵故窺我機冝動必得實今邊臣所遣刺事人或臨以官勢或量與茶綵只於屬户族帳內采道路言便為事實賊情變詐重成疑惑今請有入賊界而刺得實者以錢帛厚賞之賊將葉勒綱朗凌約噶之徒皆元昊親信分廂主兵俯近漢界出入從者不過一人若能隂募死士陷胸碎首是去賊之手足王沿嘗欲用此策但朝廷不惜美官重賂則功豈難圖五曰唐置都護府掌撫慰諸蕃征討斤候及行賞罰敘録勳勞其屬有長史録事功倉户法諸曹得為開府之盛國朝承五代之後事歸邊防當西陲安輯時朝廷固無意及此今賊大肆殺掠緣邊屬户各顧家族心生向背又使姦人縱行誘脅以此賊勢轉盛而邊候無復扞蔽今新置招撫蕃落司所謂招撫者非飲食不足以得其歡非賞賂不足以回其意非變術不足以鼓其勇非刑誅不足以制其驕曩者曹瑋在秦州誅賞並行戎落懾伏比涇原用韓質秦隴用張僎皆韓琦隨行指使雖各有武勇至於招撫之術豈可倚邪環慶一路屬户未嘗經賊殘破部族完整人堪戰鬬若綏御有術可得精兵數萬請令都部署舉官與王懷端王懷端同招撫見七月丙辰協力招撫仍只令韓琦王沿龐籍張奎同領之事之大者關報部署司其餘知州通判更不兼管以養正兵萬人一嵗之費為招撫之具則事無不濟自來屬户販鬻青白鹽以來厚利今一切禁絶之欲以困賊然絶屬戶之利無以資其生太宗朝鄭文寶言禁青白鹽以困遷賊可以不戰而屈人兵詔自陜以西市之者皆坐死其後犯法者甚衆戎人乏食冦鈔邊郡內屬萬餘帳歸繼遷命錢若水馳傳視之因詔盡復舊制戎人始漸歸附今日之勢若厚加招撫稍寬鹽禁則屬户無不得用議者以邊饋已窘而又興費不資非至計也且國家通使嘉勒斯賚欲誘以為用賜帛二萬以促其師終無實報是捨屬户近成之效而信西蕃逺望之言豈至計邪自昊賊破氂牛城築瓦川會而嘉勒斯賚逺竄哩沁城偷安茍息其子默戩覺轄戩自立皆為仇敵尚不能制矧能為昊賊輕重邪溫布且乃嘉勒斯賚親信首領之豪其子伊實濟嚕有衆萬餘最為強盛乃與昊賊結姻嘉勒斯賚日益危弱今欲為國家用非臣之所能知也以是論之招撫屬户不猶愈於彼乎六曰環慶路投來蕃部極多夏竦等懲延安之前失慮賊馬奔衝內應為患欲遷襄唐州界給曠土使就生業又皆不肯離住坐驟加起遣則戎心動搖或致生事若招撫蕃落司得人令躬至族帳察其心之向漢者給緣邊間田編於屬户或度其後必生變者徙之內地然恩威裁制其事百端茍非權謀未易集事也七曰蕃落廣鋭振武保捷皆是土兵材力伉健武藝精強戰鬬常為士卒先自昊賊擾邊以來惟土兵踴躍志在爭功其如請給甚微不及東軍之下者振武料錢五百而五十為折支積數月一支又皆糜敝不堪之物如新添虎翼兵自南中選填材質綿弱自云不知戰鬬見賊恐死傳者皆以為笑朝廷但寨數為名而已若月添土兵請給事恐難行請遇特支比常優加其數或别定南郊賞例以激其心則其立功必不在東軍之後矣八曰緣邊屯戍騎兵軍額髙者無如龍衛聞其有不能被甲上馬者况驍勝雲武二騎之類馳走挽弓不過五六斗每教射皆望空發箭馬前一二十步即已墮地以賊甲之堅縱使能中亦不能入况未能中之請密料邊兵益步卒而減騎軍但五分得一足矣以一騎軍之費可贍步軍二人而又寬市馬之煩擾違害就利莫善於兹也九曰西賊每至諸城寨不料衆寡並須出戰稍有稽違皆以軍法從事使趙奢李牧周亞夫授任於今日獲罪必先於諸將矣邊臣甘心死事猶獲子孫之福不敢持重伺隙自取嚴誅今若遇冦大至且堅壁以守須會合諸路兵馬可以取勝則令出戰若賊衆不多而畏怯不即追討並即誅之十曰主將用兵非素撫而威臨之則上下不相附指令不如意西賊首領各將種落之兵為之一溜少長服習如臂之使指既成行列舉手掩口然後敢食慮酋長遙見疑其語言其整肅如此昨任福在慶州蕃漢漸各信服士卒亦已諳練一旦驟徙涇原適值賊至麾下隊兵逐急差撥諸軍將校都不識面勢不得不陷覆今請諸路將佐非大故無得輕換易庶幾責其成功十一曰古之良將以燕犒士卒為先所以然者鋒刃之下死生俄頃固宜推盡恩意以慰其心李牧備胸奴市租皆入幕府為士卒費趙充國禦羌戎亦日饗軍士太祖用姚內斌董遵誨抗西戎何繼筠李漢超當北敵各得環慶齊棣一州征租農賦市牛酒犒軍中不問其出入故得戎冦屏息不敢窺邊臣前通判江寧府因造紙甲得逺年帳籍見曹彬攻江南日和州逐次起餉豬肉數千斤以給戰士近范仲淹在延州奏乞比永興秦州支米造酒有司之吝以為無例而罷今請渭延慶三州及諸路部署司並特支米造酒仍都部署司别給隨軍錢務令贍足除軍貟及其餘士卒每一季或因都閲或值出入並須量有霑及以慰勞苦古者命將出師閫外之事無不專制裁量用度豈有異同今主兵者皆力敵權鈞紛然相制豈國家任人責功之大體邪十二曰工作器用中國之所長非夷狄可及今賊甲皆冷煆而成堅滑光瑩非徑弩可入自京齎去衣甲皆軟不足當矢石以朝廷之事力國之伎巧乃不如一小羌乎由彼專而精我漫而略故也今請下逐處悉令工匠冷砧打造純鋼甲旋發赴緣邊先用八九斗力弓試射以觀透箭深淺而賞罰之聞太祖朝舊甲絶為精好但歲久斷綻乞且穿貫三五萬聫均給四路亦足以禦敵也十三曰今春昊賊冦邊棄下攻城之具極為拙鈍此特緩吾備也料賊年嵗間破盡緣邊籬落必驅迫漢民屬户使為先登以攻城邑儻邊城一有不守事固可憂今修築城寨雖漸完固其如軍民不知守城次第請下河北選守城卒三五人分諸處指教繕治器用大為之備賊動必求全常顧後患若邊城堅守攻之不拔則亦未敢長驅而深入也十四曰昊賊蓄謀嵗深盡更漢法自作妖書非恩信可以縻文令所能動若非天威震赫大挫姦鋒則其勢未已緣邊與賊山界相接人民繁庶每來入冦則科率糧糗多出其間山界之民引弓甚徑與賊為戰所謂步奚此皆去賊地遙向漢甚邇若乘戰勝之氣賊皆散歸乘其不備分路進兵而攻取之抗禦者誅殛降順者招來老弱無辜係之南徙其間險要可守之地則築堅壘以據之所得土田給與有功屬户必不可守則縱兵破蕩以弱賊勢若請命歸款則裁割縱舍制之在我弭患如此則邊陲可安矣上嘉納之十四策本傳乃殊不載今依實録備載乙亥右正言同管勾國子監梁適言近制本監舉人無戶籍者聽召京朝官有出身者保三人無出身者保二人今秋試在近而逺方寒士難於求保請應見任并在銓幕職州縣官非伎術流外及歷任有贓者並聽為保從之丙子龍圖閣直學士右司郎中知鳯翔府孫祖德為右諫議大夫知永興軍六月壬午改新知永興軍孫祖德知河中府新知河中府吏部侍郎范雍知永興軍初命夏竦判永興又以陳執中知永興及兩人分出按邊而領府事猶如故乃復使雍守京兆於是一府三守公吏奔趨往來不勝其擾自昔未嘗有也甲申詔舉縣令之法本欲試其治能而流內銓乃注過滿見闕僻小之處自今令所部指定繁劇或無治效則奏舉之會要六月七日二十五日凡兩事今并為一戊子詔選人乞侍養者須及三年乃聽於所在給文憑赴流內銓注官壬辰中書上鎖廳舉人姓名上謂吕夷簡曰比開此路以奬勵世祿子孫何其盛也又顧王舉正曰卿世為參知政事可謂榮矣右正言梁適為直史館判太府寺適以妻從父任中師為樞密副使請罷諫院既貼以館職仍詔候起居注闕補之司馬光記聞云梁適與任中師有姻知其賂吕夷簡事明往視之日宜繩子舍未幾得修注按此則適初罷諫院已即有此旨矣七月乙丑楊察出為江東漕適代修注所以出察或專為適地當考詔陜西諸路部署司自今西賊犯塞方得出兵掩擊諸族以牽其勢自餘毋得擅行侵掠始用田况之言也癸巳詔臣僚舉官已擢用而復首陳若體量無實狀勿以為負甲午詔近制在京庫務及諸處𣙜務茶鹽等場並舉官監當近聞多涉干請自今審官三班院流內銓選差人丙申西界偽圑練李興為供備庫副使壽州都監初興既內附而部署司言興元昊親信恐不得其情故徙之南方丁酉同陜西經略安撫招討使知永興軍陳執中言朝廷比令夏竦互出巡邊常留一員在關中臣猶恐使名甚重而將兵不多使賊界探知轉生狂慮今又奉宣與夏竦分路屯近邊而兵共不滿萬人茍賊以徑卒入冦動挫國威加以炎酷之際出師按邊未得措置之策臣昨與竦議欲專以靜勝敵杜其蹊徑絶其資糧益自訓練軍旅濬理城池安輯人民減節經費三二年間可使窮虜自歸今復輕為舉動暴露師徒但啓戎心實滋邊患望朝廷察此事機凡有更張密下帥臣共議方可施行執中既屯涇州令諸部曰冦藉吾水草鈔邊圖利不除且復至命悉焚之己亥陜西體量安撫使王堯臣言四路緣邊所守地界約二千餘里屯兵二十萬鄜延六萬八千環慶路五萬涇原路七萬秦鳯路二萬七千餘分屯州軍縣鎮城寨及疲懦殘傷不任戰鬬外總其可用者僅十餘萬人每賊繇一路入冦其所領兵常多官軍數倍延州之戰李士彬帳下蕃兵數萬先被驅虜反為其用賊大寨在五龍川去延州三里其後隊至虞家莊不絶虞家莊去延州二十里較其衆十餘萬劉平等自延慶赴援所將才八千餘人其勢固不敵及再犯鎮戎軍亦不下五六萬諸將以兵力寡弱又諸路策應未至及披城結陳自固故所折不多然郊野人户及西頭弓箭手破蕩殆盡今年冦山外其衆如延州之數韓琦在鎮戎軍以見在兵馬盡授諸將是時任福等才萬八千人賊未亡隻矢而諸將已覆軍賊凡三至而三勝繇衆寡之勢不侔也彼常以十戰一我常以一戰十其為勝負甚明雖議者謂劉平任福之兵由晝夜馳逐芻糧不繼人馬飢疲遂至敗陷然強弱勢異雖使不飢不疲未見全勝之理今須較四路之勢因其事形益屯兵馬以待其來其先涇原路接天都山去賊巢穴為近山川平易可以出大兵若徑騎疾馳則渭州旦暮可至自渭以東緣涇河大川直抵涇邠略無阻閡彼若大舉為深入之計須由此路而原州界敏珠爾密桑等族其迹多向背朝廷雖令招撫其應命者皆非首領其所賜物色旋送賊所以作歸投質驗每賊至常出人馬為助兼此路見在屬户萬餘帳從來驕黠山外之戰觀賊入冦道路會戰之處一如宿計彼之逺來安能知此皆屬户為之鄉導也四路之中今此路最為急須益兵三萬屯渭州以備出戰為鎮戎山外之援以萬人屯涇州控扼要會為原渭聲勢如此則可以杜深入之患其次環慶路素為險厄之地臣等昨由馬嶺禾波鎮至環州川路平直兩邊雖有土山山外皆髙原谷道交屬何往不通土人皆言此路非險於鄜延蓋賊從來未及此又務張虛聲欲朝廷不過為備所管屬户強壯人馬約及二萬餘其間向漢者甚多去年破白豹後橋及經納等寨皆蕃族首領導致之力向者賊冦延州謂其利在虜掠財蓄則蕃户所有不如山外漢人之饒其先延而後渭者利於破蕩向漢屬户爾况慶州東路華池鳯川與賊界金湯白豹相接兼北路東西谷所距甚近若分頭入冦則何以支梧今所管兵才二萬仍分在環慶二州近發新團立指揮以代舊兵仍不及元數慶州之西七十里即馬嶺寨北十餘里即背漢蕃部殺牛族有強壯人馬二千餘皆負險而居自來招輯不至多擾緣邊若更與他族連結要斷馬嶺則環慶二州之兵不能更相為援必須益兵二萬於環慶二州屯近邊城寨來則合力以戰居則分頭以守亦足制賊之衝突也其次秦州絶在西南去賊界差逺其入冦之路東則自儀州西南生屬户八王族界經過至水洛城北是賊界當羅等族地水洛城南與秦州冶坊和爾揚寨相接其西路自山外石門硤正南百餘里至篳篥城轉三都谷至安逺伏羌寨次西乾川谷在古渭州西北約二百餘里至寧逺寨亦合於伏羌然皆與山外城寨相近彼若深入為冦則慮涇原之兵斷其歸路今秦州所管兵馬共二萬七千分屯諸城寨外正兵不及萬雖然驗其事形若有所恃儻用禦捍亦未為全勝之師必須益兵萬人分屯安逺伏羌冶坊和爾揚弓門寨清水縣以扼東西之來路冦至則據險守隘以塞其前出山外之兵要其後未必能為邊患也其次延州自殘蕩以來西自保安軍東自白草寨四百餘里北自邊界南至金明縣百餘里無居人惟東路近裏有延川等數千户西路有蕃官胡繼諤界族帳不多賊若不攻圍延州必不出大衆以趨小利若偏師而來本州兵馬見總六萬分置六將上下親附士卒樂用足以禦捍不須添兵今防秋甫近若不蚤為處置一失機便為患不細其三路添兵六萬人冝於鄉弓手內揀本户三丁以上者取一人刺手背圑為土兵况淳化咸平中已曽點括耳目相接若處置得宜亦不至驚擾仍乞降敇告諭候平賊放歸農且賊之犯邊不患不能入患不能出近寨山原川谷雖險易不同而兵難行小道大衆須由大川大川之中皆為寨柵控扼然其逺引而來利在虜掠人自為戰所向無前若延州之金明塞門寨鎮戎之劉璠定川堡渭州山外之揚博隆城靜邊寨皆不能扼其來故賊不患不能入也既入漢地分行鈔略驅虜人畜齎至財貨人馬疲困奔趨歸路無復鬬志以精兵扼險強弩注射旁設竒伏斷其首尾且逐且擊不敗何待故賊之患在不能出也賊屢乘戰勝重掠而歸諸將不能扼其歸路追逐掩殺者由兵寡而勢分也若尚循故轍終無可勝之理又鄰路兵馬會合策應率皆後時而前年賊冦延州環州趙振引援兵却由慶州取直羅赤城路入鄜州方至延州城下約近十程比至則賊馬出境已數日矣初若自環州取徑道由華池鳯川德靖寨抵保安軍出賊之後可速數程乃云緣邊徑路俯接賊界經歷屬户慮致不虞豈有被甲執兵擁數千之衆不敢過屬户界中顯是逗撓為自全之計請嚴敇部署司令逐處蕃落將亟公人百姓內選熟知山川道路者檢踏州軍往來徑路修治令通軍馬每賊至令鄰路即時領兵策應違者軍律論本傳載此疏甚略亦頗有不同處當參合刪修堯臣又言范仲淹韓琦皆天下選其忠義智勇名動逺方不宜以小故置散地且任福坐違節度致敗尤不可深責主帥由是忤宰相意并他議多格不行并他議格不行據歐陽修墓志西北邊皆有蕃兵蕃兵者塞下內屬諸部落團結以為藩籬之兵也羌戎種落不相統一保塞者謂之屬户餘謂之生户陜西則秦鳯涇原環慶鄜延河東則石隰麟府其大首領為都軍主百帳已上為軍主都虞候指揮使副指揮使軍使副兵馬使以功次補者為刺史諸衛將軍諸司使副使承制崇班供奉官至殿侍其充本族巡檢者俸同正貟添支錢十五千米麵傔馬有差為刺史諸衛將軍請給同蕃官例首領補軍職者月俸錢自三千至三百又嵗給冬服綿錦袍凡七種紫綾二種十將而下皆給土田元昊反先破金明寨殺士彬父子蕃部既潰乃破塞門安逺寨圍延州蓋其籬落先亡矣於是王堯臣建言涇原路熟户萬四百七十餘帳帳之首領各有職名曹瑋帥本路威令明著常用之平西羌其後邊備稍懈守將惟務姑息寖成驕黠自元昊反鎮戎軍及渭州山外皆被侵擾近邊熟户亦遭殺虜蕃族之情最重酬賽因此釁隙激怒之可復得其用請遣人募首領願效用者籍姓名并士馬之數及千人聽自推其謀勇者一人授以班行及巡檢之名使將領出境破蕩生户所獲財畜官勿檢核得首級及傷者給以賞物仍依本族職名補遷及增俸錢詔如所請此據本志附見所言蕃官遷補次苐略已見曹瑋時當考右騏驥使象州防禦使入內副都知王守忠得疾大書以授其子崇吉等曰公直忠孝事國保身而不及其私辛丑卒贈武康節度使諡僖恭壬寅中書奏近添差弓手準備捕盜昨令淮南江南兩浙荆湖諸州軍招置宣毅指揮充本城禁軍今已成次第所有添差弓手須議減放欲於見第二第三等户內選留少壯有勇力者於舊額外增兩倍每五十人置節級一名其餘揀退者及指揮使並遣歸農從之罷指揮使蓋用張方平奏議當考方平奏議附二月辛丑癸卯命翰林學士王堯臣聶冠卿知制誥郭微之看定三館祕閣書籍乙巳詔陜西河北河東三路方用兵之際而知州通判縣令有司銓授頗拘資格其令翰林學士承旨丁度以下各同選舉廉幹吏以名聞丙午知并州楊偕遣曲陽主簿楊拯獻龍虎八陳圖及所製神楯劈陳刀手刀鐡連枷鐡簡且言龍虎八陳有竒有正有進有止逺則射近則刀楯擊之彼蕃騎雖衆見神楯之異必遽奔潰然後以驍騎夾擊無不勝者蓋歷代用兵未有經慮及此其陳法臣已授拯拯頗知兵望特賜召問此神妙之機願藏祕府帝閲于崇政殿降詔奬諭擢拯幕職官其後言者以為器重大緩急難用云秋七月戊申朔出御製觀文鑒古圖記以示輔臣己酉上謂輔臣曰鄜延都鈐轄張亢與本路部署許懷德不能同心協謀何由了邊事冝令都部署司戒諭若故為此以求內徙當悉奪官安置極邊詔京朝官使臣選人久待闕京師而近制不得取京債廉士或至貧窶不能自給自今受差遣出外聽私借錢五十千鄜延都鈐轄知鄜州張亢言太平日久人不知兵自元昊叛逆以來民力雕敝而邊機軍政措置未得其宜今輒陳臣之所疑者十事臣竊謂師每出不利豈非節制不立號令不明訓練不至器械不精或中賊之詭計或自我之貪功或左右前後自不相救或進退出入未知其便或兵多而不能用或兵少而不能避或為持權者所逼或因懦將之所牽或人馬困飢而不能奮或山川險阻而不能通此皆將不知兵之弊也未聞深究致敗之由而處置之雖徒益兵馬亦未見必勝之理臣之所疑者一也去春賊至延州諸路發援兵而河東秦鳯各踰千里涇原環慶不下十程去秋出鎮戎又逺自鄜延發兵且千里逺鬬豈能施勇如賊已退乃是空勞師徒異時更冦别路必又如此此不戰而自敝臣所疑者二也今鄜延副都部署許懷德兼管勾環慶兵馬環慶副都部署王仲寶復兼鄜延其涇原秦鳯部署等亦兼鄰路雖令互相策應然環州至延州十四五驛直路亦不下十驛涇原至秦鳯又逺于此若一處有事冝皆發兵赴援而山路險惡人馬巴困欲責其功何由可得臣所疑者三也四路軍馬各不下五六萬朝廷盡力供億而邊臣但言兵少每路欲更增十萬人亦未見成功且兵無節制一弊也無竒正二弊也無應援三弊也主將不一四弊也兵分勢弱五弊也有此五弊如驅市人而戰雖有百萬亦無益于事臣所疑者四也古人教習須三年然後成功今之用兵已三年矣將帥之中孰賢孰愚攻守之術孰得孰失纍年敗衄而居邊要者未知何謀設更數年或未罷兵國用民力何以克堪若因之以飢饉加之以他冦則安危之策未知如何臣所疑者五也今言邊事者甚衆朝廷或即奏可或使定奪以聞或劄下逐處或不令下司前條方遂施行後令復即衝改胥吏有鈔録之勞官員無看詳之暇邊陳軍政一無定制臣所疑者六也夏竦陳執中皆朝廷大臣凡有邊事當付之不疑今但主文書守詔令每有宣命則翻録行下如諸處申稟則令候朝廷指揮如此則何必以大臣主事臣所疑者七也前河北用兵減冗官以省費今陜西乃日增員且如制置清白鹽使副招撫蕃部使臣等千餘員所占兵士千餘人請給嵗約萬緡復有都大提舉馬鋪器甲之類又諸州一例招到新兵克敵制勝保捷廣鋭宣毅等指揮久未曽團立教閲但費軍廪無益邊備臣所疑者八也國家竭財用以贍軍今軍士有手藝者管兵之官每指揮抽占三之一如延州諸將不出即有兵二萬除五千守城之外其餘止一萬五千若有事宜三日內不能圑集况四十里外便是賊境一有奔衝緩急何以支梧臣所疑者九也陜西教習鄉兵共十餘萬人其中無賴之輩各挂尺籍心薄田夫豈無姧盜雜於其中茍無措置他日為患不細臣所疑者十也乞暫許臣赴闕面陳利害如以臣言狂率不可用則乞重行降黜之不報辛亥詔以冬至有事于南郊時議者或謂西兵未息請罷大禮上不許壬子翰林學士王堯臣兼龍圖閣學士本傳不載詔自今內侍省押班及帶御器械闕員並以歷邊任有功者補之又詔陜西都部署司邊兵未經教閲者權移近裏州軍俟訓練精熟乃遣戍邊癸丑上謂輔臣曰古人良將皆能察士卒之好惡而同其甘苦故衆心親附如聞邊臣多執獨見偏裨之屬罕蒙聽納其密諭朕意令將佐日夕博議軍政庶下情可通而士樂為用也王堯臣又言昨安撫陜西體問得延州鎮戎軍渭州山外三敗之由皆為賊先據勝地誘致我師將佐不能守險擊歸而多倍道趨利方其疲頓乃與生兵合戰賊始縱鐡鷂子衝突繼以步奚挽強注射鋒不可當遂致掩覆此主帥不思應變以懲前失之咎也今防秋及時望敇主兵之官常訓練軍馬逺設探候遇賊入界先度逺近俟立定營寨然後量敵奮擊毋得輕出詔以其言戒邊吏甲寅夏竦言乞調兵夫修浚鄜州城隍詔以城隍近方修治必須營葺止役本處兵士毋得調夫料物此據朔厯廣南西路轉運司奏冝州蠻屢擾邊已發軍士防禦詔增冝州戍兵此據朔厯知制誥吳育言大臣宗室之喪自今須大斂成服然後請車駕臨奠事下太常議乃云天子臨喪禮不可緩若奏訃在交未前即當日出未後則以次日從之乙卯詔言邊事補班行者自今不許換文資丙辰知永興軍吏部侍郎范雍兼管勾陜西轉運司計度糧草公事仍加資政殿學士加資政在戊午日今并書命祕書丞通判同州蔣偕與環慶都監王懷端同招撫蕃落用田况之言也王懷端初不見是何官職按范仲淹慶厯二年六月奏稱環慶駐泊都監權都巡檢王懷端今用之資政殿學士尚書右丞知應天府盛度為太子少傅致仕度尋卒贈太子太保諡文肅度卒在八月辛巳今并書己未中書樞密院言昨降宣命陜西三路屯聚重兵近據逐處纍乞添兵朝廷去年差撥軍馬赴陜西約三萬人已是河北河東多方剗那即今實難抽點欲令陜西都部署夏竦更將逐路新募及續配兵士防守城寨更易精卒屯聚不足即以便冝謀畫不管誤事從之此據朔厯降江南東路轉運使司勳員外王隲知密州以本路體量安撫方偕言隲在部掊刻故也復前金部郎中李宗簡為主客郎中宗簡母朱氏上真宗賜其父沆手詔特復之詔諸路本城廂軍軍員闕馬聽自市三嵗以上十三嵗以下髙四尺一寸者官用印附籍給芻粟辛酉陜西經略安撫招討副使曹琮言近招誘堪坡界青雞川等處戎人內屬請下秦鳯路部署司常加存撫其酋長能立勞效者優與補官又請三都谷至渭州靜邊堡路置堡寨控扼賊馬並從之兩浙轉運司始奏鄂鄰叛狀且言已發兵捕逐之壬戌置萬勝軍二十指揮選神勇宣武虎翼諸軍之在營年四十五以下者為之立神勇之上朔厯在己未今從實録甲子詔將來南郊羣臣毋得請加上尊號乙丑右正言直史館梁適同修起居注太常博士直集賢院判度支勾院同修起居注楊察為江南東路轉運使六月壬辰當考詔鄜延路部送保安軍小胡等族巡檢內殿承制閣門祗候胡繼諤赴京仍令部署司擇諸族酋長才勇者代繼諤領其衆以知延州龐籍言繼諤誅剝蕃部其下多怨讟故也及繼諤至京師陜西轉運使卞咸乃言邊人頗思繼諤因以繼諤為虢州都監不復加罪授繼諤虢州都監十月庚寅今并書丙寅中書言比聞有浮薄之人撰長韻詩以謗大臣請下開封府募告者賞錢三十萬願就官者亦聽從之歐陽修從諫集云前年宋庠等出外時京師先有無名子詩一首傳于中外尋而庠罷政事疑即此詩也韓琦言今之試武藝弓弩惟務斗力多而不求所射疏密其左右斫鬃腰射腦射一綽筈子放數箭之類乃是軍中之戲又馬槍止試左右盤弄而不較所刺中否皆非實藝而使臣軍員緣此例得拔用故諸軍亦循守常法而無所更以此臨陳對冦罕能取勝臣常熟思之縱得武士挽三石力弓踏五石力弩不能射中仍與空手無異常閲武部式見唐取人皆較實藝今定凡射弓弩於四十步內各射箭十弓一石五斗以上七中為第一一石二斗以上五中為第二九斗以上三中為第三弩三石五斗以上八中為第一三石以上七中為第二兩石五斗以上五中為第三凡馬射鹿子或筍椿各箭十弓一石以上八中為第一九斗以上七中為第二八斗以上五中為第三凡馬上使槍左右十刺得五中木人為及等馬上鐡鞭鐡簡棍子雙劒大斧連枷之類並是一法每兩條共重十斤為及等但取左右實打有力者為中馬槍鐡簡俱及等為第三步刺槍步斫劒即勝者為第三馬上盤鋸刀木槊五十斤以上勇力過人者為第一以上若一件入第一請優與遷擢入第三量材録用如二件以上入第一三件以上入第二四件以上入第三并槍簡及等皆不次奬拔詔送樞密院欲乞今後較試弓弩皆令射十箭馬皆令刺木人並以中多者為上只如此寫出亦可己巳徙秦州駐泊都監右侍禁閣門祇候李緯為涇原路管勾招撫蕃落公事緯紘弟也詔河東諸州所籍強壯若雇人自代者復其身朔厯云仍以所招到勇鬭兵士改作禁軍𨽻宣毅指揮今附見庚午以右班殿直西京等處都巡檢使謝雲行為閣門祇候初雲行為澠池縣尉捕殺軍賊李士忠等三人身被數創補三班奉職為巡檢言者以為賞薄乃遷右班殿直為都巡檢仍賜銀百兩至此又加職焉詔河北河東近經霖雨恐城壁墊壞及甲鎧弓弩損濕其令轉運安撫司點檢完葺所部有衰疾不任職者選吏代之又詔陜西自兵興以來多法外從事自今情理與本法不類杖以下罪聽之其自入徒流或加刺配者須奏聽裁辛未賜河北河東路戍兵嵗滿未代者緡錢乙亥中書樞密院言陜西緣邊蕃部歸降者多在蕃官帳下請令部署司察其向背者徙家內地給間田以處之奏可始從田况議也况議在五月是月元昊冦麟府州
