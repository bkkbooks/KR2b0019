body:
  text: 續資治通鑑長編卷四百六十三宋李燾撰哲宗元祐六年八月戊子朔知開封府范百祿轉對言三事其一曰臣伏惟二聖臨御以來朝廷清眀海內乂安邊隅弭兵革之災田里無狗吠之警耋老倪稚咸樂其生德之休眀治古何逺原其所以誠由舉措施設率循祖宗典故而然人無智愚莫不共知此説豐功美實何可殫陳獨有視學之行缺而未舉臣伏見太祖皇帝建隆元年正月是嵗二月四年四月太宗皇帝端拱元年八月淳化五年十一月真宗皇帝咸平二年七月皆幸國子監仁宗皇帝天聖二年八月己卯幸國子監謁文宣王召從臣升講堂令直講馬龜符説論語一篇賜龜符三品服恭惟祖宗隆儒師古躬化天下之意如此今陛下天縱將聖日進於道光眀緝熙體合自然聖學之積可謂勤矣然方領矩步之士挾書觀光者四方萬里竭蹶而來遊於京師分處庠序未嘗一聞鑾輿之音而望屬車之塵意者陛下専事講筵遊心經史而祖宗以來至天聖故事猶有未遑暇及者乎臣愚欲望陛下特詔有司檢舉祖宗視學故事以待萬機之暇而賜臨觀焉令耆儒博士橫經進説以示天下文眀之化豈不盛哉伏惟聖慈留察恕其狂僭天下幸甚貼黃禮記文王世子曰天子視學大昕鼓所以警衆也衆至然後天子至乃命有司行事興秩節祭先聖先師焉有司率事反命注使有司攝其事舉常禮先師先聖不親祭之者視學觀禮耳非為彼報也其二曰臣聞太祖皇帝建隆三年詔自今每五日內殿起居翰林學士及文班常參官轉對並須指陳時政得失朝廷急務刑獄寃濫百姓疾苦咸采訪以聞事有要切者許非時詣闕上章不得須候次對既又命尚書省集官議其可行者則行之為民求治之心可謂至矣真宗皇帝詔有司録轉對章疏一本留中聽言擇善之意可謂勤矣祖宗之於轉對其勤且至也如此今一嵗之中視朝有數臣僚當轉對者每次二員凡不過十餘人借使人悉知言言皆見用亦不過十數事耳臣竊惟太皇太后陛下皇帝陛下固常有太祖為民求治之心真宗聽言擇善之志然於此事今昔有異心迹未侔補闕拾遺必在旁通於衆志博覽兼聽未能全美於前聞臣雖甚愚切惜言路之未廣而惜人情之恬默茍有所未聞積為弊塞伏願陛下法堯之詢於衆蹈舜之取諸人使四目盡眀庶言必達則時政之得失可以周知朝廷之急務能無小補刑獄冤濫百姓疾苦必無壅於上聞而有裨於聖德矣孔子曰四方有敗必先知之斯可謂民之父母茍不周咨於人言則何以臻兹伏望宸慈詔執事審議轉對之制率由太祖真宗之舊章則天下幸甚其三曰臣伏以每嵗四立及中央迎氣於四郊祀五帝配以五神國之大祠也古者天子皆親帥三公九卿諸侯大夫以虔恭重事而導四時之和氣焉周官大宗伯之職曰若王不與祭祀則攝位此天子不親之而大宗伯攝行其事之眀文也二漢以來公卿迎氣四郊見於史册後世去古寖逺鑾輿一出兵衛扈從經費從之誠不可以數也然而因仍故事至於今兹人情狃於茍安禮意怠於沿襲頽弊日積玩為空文每四立季夏名曰大祀比之中祠其實不及吏部所差三獻皆常參官其餘執事以至贊相之人皆班卑品下不得視中祠行事者之例乃七月辛未立秋西郊祀白帝與同日西方嶽鎮海瀆之祭是也臣竊得之道聽以為嶽瀆八牢而西郊止於四牢膰胙差殊審其如是而望誠忱感通帝神歆止不亦異乎乞下禮部與太常寺官講議其當而新之凡曰大祠宜以公卿攝事餘皆重其所使而必致其敬與禮焉庶或饗之以導致四時和氣詩曰昭事上帝又曰敬恭明神書之稱曰恤祀又曰毖祀其戒曰謂祭無益又曰瀆於祭祀蓋神必敬尊而不可慢祀宜謹恤而不可瀆也伏惟聖慈丁寧訓飭而釐正則國之典祀於是乎嚴矣臣蒙國厚恩待罪內史京師浩穰日恐不逮以煩吏議比來侍從獻替之職荒落不修誠懼亡以報稱萬一今視朝轉對概循故事臣之愚忠尚冀有益毫髮不敢空為文飾以應儀範而已今所陳三事皆祖宗典故先王陳迹幸太學可以美文眀之化采衆言可以知天下之事嚴大祀可以臻上神之祐而致四時之和惟是芻蕘不以賤廢庶幾塵露或有補云是日御史中丞趙君錫侍御史賈易奏疏論前知樞密院安燾不可復用內降實封付三省燾前以母喪去位九月朔當除喪即告故也此據劉摯日記增入閏八月八日乃進呈同日又以趙君錫論秦觀疏付三省劉摯私志其事云初除觀為正字用君錫之薦既而賈易詆觀不檢之罪同日君錫亦有一章曰臣前薦觀以其有文學今始知其薄於行願寢前薦罷觀新命臣妄薦觀罪不敢逃也觀亦有狀辭免今日君錫之疏曰二十七日觀來見臣言賈御史之章云邪人在位引其黨類此意是傾中丞也今賈之遺行如觀者甚多中丞何不急作一章論賈則事可解觀之傾險如此乞下觀吏究治之緣臣與賈易二十六日彈觀才一夕而觀盡得疏中意此必有告之者朝廷之上不密如此觀訪臣既去是日晚有王遹來蘇軾之親也自言軾遣見臣有二事其一則言觀者公之所薦也今反如此其一則兩浙災傷如此而賈易楊畏乃言傳者過當欲令朝廷考虛實朝廷從其奏於是給事兩諫官論駮以謂當聽其賑恤不可先以核實之旨恐之夫臺諫之言不同如此中丞豈可不為一言臣以為觀與遹皆挾軾之威勢逼臣言事欲離間風憲臣僚皆云姦惡乞屬吏施行夫君錫之薦觀也非本知觀也未拜中丞時觀多與王鞏遊飲君錫在焉緣此習熟既為中丞鞏迫令薦之觀軾之客也故凡不喜軾者皆咎君錫及易至亦以君錫薦觀為非會觀有正字之除易率先一章君錫遂翻然首之首觀可也今日之章似乎太甚君錫與軾極相友善兼所傳言無他禱請遽白之朋友之道缺矣不白之於義未有害也摯謂君錫深惜此舉議者以君錫為易所凌劫至於如此云己丑三省進呈納后六禮儀制宰臣吕大防等奏曰昨蒙宣諭禮官等奏謂內有可行有不可行未審今來降出臣等裁定文字如何太皇太后曰卿等所定已是得中可行大防等曰昨曽誥及勘婚一事臣等尋於祕書省取索見行文字看詳多是民間俗禮恐國家大禮難以盡依據莫若擇所繫至重者即回避其餘小有拘忌似可除去若太拘忌則恐近下臣僚家或有相當者而門閥不相稱尤為不便太皇太后曰然此非小事今若滅裂異時或致論議即追悔不及須當詳處昨卿等曽言欲於后族之家取索家狀近向家供到未有相當者髙家諸女少得合相法者或有疾病未應采擇者亦乞早定議又云選后當以賢德為先不在姿質固知如此然亦似不思大凡人家女子養於閨閣賢與不賢人安得悉知選擇之際惟見門閥與人物耳此事亦繫其人之福力可勝只如仁宗皇帝選納光顯日一入宫中便定當時亦不豫知其賢德後來母儀婦道輔佐功烈絶超今古雖是聖賢異稟亦由仁宗聖眀福德之所招感豈人力也英宗初為頴王納妃揀選近八十餘家最後向太后入見英宗一見便稱許以今日事勢言之豈不由皇太后福厚所致大防等曰惟聖意裁擇早有定議不勝大幸太皇太后曰固夙夜在懷也御史臺太常寺言諸陪祀事官祀前七日赴尚書省辨色知班引百官至侍郎次兩省常侍以下次節度使至副率次御史臺官次侍從官次一品二品文官次禮直官引贊官分引執政官以上各就位掌涖誓戒如太常寺儀讀訖協律郎奉禮郎太祝郊社令太官令先退在位官皆再拜乃退從之户部言乞下陜西路轉運司將香藥鈔止得算給客人外其在任官員等及公使庫并其餘官司並不得假作名目算鈔如違並依官司以回易公使等錢收買販賣鹽引法從之新無又言河東路都轉運司奏請一路條敕有不以去官赦降原減條如本路州軍和糴糧草等諸縣典押書手作弊移減石束之類其犯人並依二稅條斷遣雖該赦降更不原免寧和橋窠坐兵士衷私差占役使並科違制私罪赦降去官不免如此太重並乞刪去該赦降去官不原免之文從之新無太子太保致仕李端願卒輟朝臨奠賻典加等贈開府儀同三司仍以旌舊為神道碑額端願獻穆公主子好交喜名所與遊皆一時賢士大夫故慨然數論天下事晚得目疾聞時事有抵掌談説聽者忘倦蔡確母邀駕事在八月二十四日左朝議大夫王彭為刑部郎中左朝請郎禮部郎中集賢校理崔公度為徐王府侍講左朝請郎祕閣校理徐王府侍講喬執中為徐王府翊善侍御史賈易言臣讀唐史見皇甫鎛姦邪隂結權幸以求宰相崔羣數言其不可用既而入對語及開元天寶事羣因推言其極曰安危在出令存亡繫所任眀皇初得姚崇宋璟盧懷謹輔以道德蘇李孜孜守正則開元為治其後逺正士昵小人李林甫楊國忠恃寵用邪則天寶為亂世謂祿山自范陽起兵是治亂分時臣謂罷賢相張九齡専任姦邪李林甫則治亂固已分矣用人得失所繫非小辭意激切左右為之感動惜乎如憲宗剛眀猶且不悟卒相鎛以兆禍亂臣愚伏思忠臣不顧其身欲竭情盡智以安宗社而忠未必見信終以為無補可為慟哭臣於今日遭遇聖眀擢臣於仇怨忌嫉棄捐之中任以紀綱之地是臣效死報國之秋也然則何所顧避而不言乎又况豺狼當路將肆其毒以害忠良而啓危亂者臣雖朝彈暮黜死無所恨伏冀聖慈幸聽而加省焉謹按尚書右丞蘇轍厚貌深情險於山川詖言殄行甚於蛇豕昔以制科召試而程文謂不應格仁宗顧其直言極諫之名不欲罷黜亦容濫進其後因與兄軾誹謗先帝放斥於外元祐之初例蒙湔滌擢任司諫是時亦嘗妄言浚治城壕發掘骸骨遍野及差官檢視漫然無實方二聖開廣言路之初示天下以不諱幸免其罪任中書舍人日因吕陶挾邪觀望靣欺同列罷左司諫轍當命辭則密召吕陶至西省示之相與出力謀為排陷正直之計人皆嫉之然其善為詭譎以諂交固黨至於用巧得為御史中丞於是肆其禍心無所忌憚所毁者皆睚眥之怨所譽者皆朋比之私以王覿為附蔡確則恨其嘗言蘇軾譏毁祖宗論者皆謂王覿任諫官日排擊衆邪因以擊確縝惇璪播在人口至今為美談其言豐稷為非才則怒其草王鞏告辭斥言中執法轍言汝又上官均告辭止曰言事失當而不深詆之也論者皆謂稷之素履可為縉紳矜式博學可為士人師仰以范純禮為無所建眀忿其封駮張耒不候朝參先許供職以茍俸給之事論者皆謂純禮此舉深眀朝廷典禮可使臣下亷敬無違此其挾私怨蔑公義之大略也間有劫其屬官使言者尤為非義不可悉數陕西地界識者皆知不與為是轍則助其蜀黨趙卨徼幸私已之邪議力排憂國經逺之公言進擬張利一軍帥陛下察其不當許將力陳亦嘗爭之不得而轍則乘其同列不平之隙隂使秦觀王鞏往來奔走道達音旨出力以逐許將既而遂竊其位義士扼腕仁人切齒為其背君父而營姦利也知王鞏有罪而假託司馬光方欲擢用之辭褒薦之致誤陛下擢任旋復罷免則其欺罔之迹不攻自破矣其兄軾昔既立異以背先帝尚蒙恩宥全其首領聊從竄斥以厭衆心軾不自省循益加放傲暨先帝厭代軾則作詩自慶曰山寺歸來聞好語野花啼鳥亦欣然此生已覺都無事今嵗仍逢大有年書於揚州上方僧寺自後播於四方軾內不自安則又增以別詩二首換詩板於彼復倒其先後之句題以元豐八年五月一日從而語諸人曰我託人置田書報已成故作此詩且置田極小事何至野花啼鳥亦欣然哉又先帝山陵未畢人臣泣血號慕正劇軾以買田而欣踴如此其義安在謂此生無事以年逢大有亦有何説乎是可謂痛心疾首而莫之堪忍者也後於䇿題又形譏毁言者固嘗論之及作吕大防左僕射麻制尤更悖慢其辭曰民亦勞止庶臻康靖之期識者聞之為之股栗夫以熙寧元豐之政百官修職庶事興起其間不幸興利之臣希冀功賞不無掊刻是乃治世之失何至比於周厲王之時民勞板蕩之詩刺其亂也軾之為人趨向狹促以沮議為出衆以自異為不羣趨近利昧逺圖效小信傷大道其學本於戰國縱橫之術真傾危之士也先朝行免役則以差役為良法及陛下復行差法軾則以免役為便民至敢矯稱先帝之意欲用免役羡錢盡買天下附郭良田以給役人向使朝廷輕信而行之則必召亂賴言事者排其謬妄聖眀察見其傾邪故斥其説而不用也其在杭州務以暴橫立威故決配稅户顔章兄弟皆無罪之人今則漸蒙貸免矣既而専為姑息以邀小人之譽兼設欺弊以竊忠藎之名如纍年災傷不過一二分軾則張大其言以甚於熙寧七八年之患彼年飢饉疾疫人之死亡者十有五六豈有更甚於此者又嘗建言以興修水利者皆為虛妄無實而自為奏請浚治西湖乞賜度牒賣錢雇役聞亦不免科借居民什器畚鍤之類虐使捍江廂卒築為長隄於湖中以事遊觀於公私並無利害監司畏其強無敢觸其鋒者况敢檢按其不法耶今既召還則盛引貪利小人相與倡言聖眷隆厚必求外補非首相不可留也原軾轍之心必欲兄弟専國盡納蜀人分據要路復聚羣小俾害忠良不亦懷險詖覆邦家之漸乎臣自被命以來數使人以甘言誘臣者或云軾深歎美恨相知之晚或云今之除授轍有力焉而臣之朴愚不喜詭隨不知為身謀故漠然未嘗答也况蒙陛下天地大恩未能捐糜以報萬一嘗欲進忠若趍利論政若訴冤豈可見事虧聖德政損清時而惜身不言仰屋嘆息是臣負陛下也臣雖萬死無以塞責惟不顧禍患盡誠極論旁忤幸臣上犯聖旨以此獲罪是陛下負臣也臣雖死之日猶生之年無所愧恨也伏望聖慈覽觀用人得失所繫輕重赫然發於睿斷特行斥免天下幸甚貼黃稱神宗以不世出之資勵精求治追迹二帝三王之盛德樂與賢人君子共立太平之基而聖覽髙眀察知軾轍姦險用之必為天下患故疏斥而不用兩人者相與誹怨無人臣禮先帝以其文藝小才猶且生全之自元祐以來寖厯清顯蓋非二聖一旦尊寵之特異於先帝也臣固知有以誤陛下聰眀者今其邪心悖志見於事迹者如此尚可忍乎臣雖糜爛鼎鑊膏血鍖鑕不敢言也又稱軾轍不仁善謀姦利交結左右百巧多門臣區區賤愚激於忠義列其邪惡必有出力營救之者臣獨仰恃天日照臨無所回曲庶幾公義可申爾此疏新舊録俱無據元祐章奏第一册增入易以戊子朔奏疏翌日太皇太后封付吕大防劉摯且諭令未得遍示三省官此據吕大防家所藏詔扎辛卯執政奏事罷大防摯獨留久之乃退此據王巖叟繫年録復封易疏進入此據大防家所藏奏藁八月四日與摯同上劄子云臣等今日簾前靣奉聖旨所有初二日降出賈易文字令實封進入今謹具同封進納易先有別疏宰臣執政於延和殿簾前進具言易疏前後異同之語并簽貼元疏進入退復具奏曰易疏云比年以來登用二三執政物議洶然未以為當或巧官詐忠徼幸茍合或齪齪取容自名寬厚又云雖莫敢為邪以害政又貼黃云自二聖臨御以來聖政日新公義日勝俊哲端良森布朝列臣詳易疏既云朝廷登用執政多非其人致物議􅍅然矣却云聖政日新公義日勝俊良滿朝伏緣聖政之要當以用捨大臣為先若用執政不當則纍聖政多矣何由有日新之説執政既不當則公義亦從而淪墜又何由有日勝之説執政既非其人則所進擬人材必非俊良矣又安得有森布朝列之效易疏云執政者巧官詐忠徼幸茍合又云莫敢為邪以害正其人既巧詐僥幸矣安得不為邪以害正既莫為邪以害政矣又安得有巧詐僥幸之説臣竊詳易疏前後異同自相矛盾大抵以朝廷今日政事為非且執法之官既知執政巧詐傾邪自合眀具封章指陳實狀論其過惡必擊去而後已豈有不立主名謬悠陳述而但乞朝廷謹擇而已既乞朝廷謹擇大臣則是止欲納忠於上無所干於有司而易疏貼黃却乞降付中書省易久在朝廷豈不知除用執政非三省所預所以然者其意蓋欲買直於人使聞之者不安其位而後行其私意臣竊知易乃王安禮所善安禮嘗以十科薦之今羣失職之人皆在江淮莫不與今日執政為仇易實江淮之士來自東南今日之疏不惟搖動朝廷政事亦隂以申羣怨之憤臣雖忘身犯怒為國去邪固不敢茍避怨仇為偷安之計然如此人與之同朝共事臣實難安伏望聖慈深賜詳察六年三月二十八日賈易自淮東憲復除殿院此奏云易來自東南則此疏乃六年事當在八月一日以前今因劾蘇轍附見此奏按雜録第四册有此奏不著姓名既非劉摯必吕大防也是此奏不指執政姓名故大防或摯有此論列後劾蘇轍太皇太后因以劾章付大防摯理勢政因如此然疑不敢著更須考詳是日執政奏事罷蘇轍獨進曰昨見趙君錫章言臣兄軾交通言語事晚聞臣兄云實有此然非有所干求已居家待罪臣兄所以知朝廷文字實緣臣退朝多與兄因語次遂及朝政臣非久亦當引咎請外已而大防摯留身稟昨封易疏宣諭曰排擊人太深須與責降大防對曰易誠過當然若遽責降則恐言事臣僚不見因依定須論列今若早欲定疊不若并蘇軾兩罷為便可之仍曰易勿太優摯因奏言事官須審聽人言語次第易為人所使今兩罷甚平且可以息事容進入文字遂退摯謂易誠剛果敢言然自再召盛氣而至既至頗為羣衆以直臣許之扶舁擡駕咻之以事而易橫身任之殊不知彼咻之者各自伸其私耳曽不審擇之乎識者固已危之亦有以是忠告之者今果以忿峭言不中理而罷比年言路風采頽塌自易之至翕然聳人望輒不閲月不自謹重徇人而去殊可為深惜也軾髙才使少循步驟誰能過之者夫知自貴蓋有道者之事古人所難也又謂易論軾轍皆掇拾舊事前後言事官嘗所論者軾雖無事然却有趙君錫所陳王遹云云乃實迹故兩罷之壬辰翰林學士承旨兼侍讀蘇軾為龍圖閣學士知頴州侍御史賈易本官知廬州先是一日內降批付三省軾纍乞外任可依所奏易言事失當可與外任也是日輔臣聚都堂蘇轍道其兄軾意於吕大防劉摯聞昨既有旨與外任而諸公欲以南京處之固甚幸然王鞏在彼恐兩有未安與之友善必於公家有難為願得陳頴之類幸也乃同入文字以軾知頴州易知廬州奏失當事無文字實迹欲更帶出止作平除蘇頌云承旨罷當除端眀殿學士衆云今罷略有因依不若平去省事也乃復為龍圖閣學士既而軾熟狀畫可易狀批云可用早來降出鄭雍文字作施行蓋熟狀云失當事無實迹故也雍言君錫前此徇人輒薦秦觀畏憚賈易又輒首之反復欺君士論所醜與王鞏欵昵鞏去京趣詣船別鞏姦諛柔佞之人不足以執憲中司又言賈易剛狷酷烈挾私肆忿在臺惟務劫持上下要合已意昨除曽肇中書舍人臣等與君錫議欲同論奏君錫云韓維之黜肇能封還有逆龍鱗之直按維執政多引親戚陛下察見私徇令罷之肇何所補乃謂肇逆鱗蓋肇與韓氏連姻而易出韓氏門下故如此爾易大率所言多為韓氏報私怨又臣昨論王鞏不檢事訪聞朝行中書易必不放鞏鞏云易必不敢蓋易與鞏嘗同燕遊靡所不至易果無一言乃言兩浙災傷乞加究實此皆私意使易在朝必無安靖之理又鄱陽知縣梅昌宗訴易在梅州問昌宗求婢不得攟拾昌宗其狀見在伏望斷自宸衷特行譴逐是日先以雍二狀并軾待罪章付三省翌日三省奏易事諭云恐無名罷去用鄭雍狀如何同奏云自來移改言事官內外差遣不必盡有罪名雍狀所論易事皆非大罪其論災傷自合如此其云出韓氏之門多為報仇酬恩亦無實迹至如言易曽買梅昌宗婢不得挾恨發其罪此又未經按實恐難用雍狀又曰向來臣僚纍言須辨是非今無名責易又恐未是兼雍所言皆道著易罪劉摯奏曰必欲有名只依久來例用昨日批旨云言事失當亦不妨可之吕大防曰既如此即廬州恐優蘇轍曰廬帶鈐轄太優兼聖諭欲辨正其罪委是好事摯謂轍所以云云蓋不知易所以忤旨別有故於轍亦自有妨礙遽欲重易之責曽不知嫌當避也又進雍論君錫太無執持見人道秦觀好便舉却見人言觀罪便首如此莫難住也吕大防曰欲別擬一差遣劉摯曰恐難用一諫官言便罷中丞進退亦繫朝廷事體傅堯俞曰莫少俟之君錫必與雍難共立須至陳乞候至時指揮可之退集都省擬易夀州而轍尚不肯簽以夀為優再三言之大防曰如此得也兼與公有妨礙轍曰不過是曽言轍持密命告人之事爾摯以為轍蓋不知易有大軸也又豈不知易事連軾乎蘇賈之仇可駭久之轍乃肯簽夀州文字初六日事吕本中雜説賈易明叔雖號切直然論事甚偏視二蘇如深仇建中靖國間召至京師每謂人蘇軾若不去時陳衍須作內樞密使東萊公謂易曰二蘇某不敢知果如公言則宣仁為何等主邪易不能答東萊公本中父好問也因摯云蘇賈之仇可駭附注此易尋具申三省以州名犯父諱不敢冒居乃復改廬州奏入畫可十一日事翌日又諭輔臣以廬州帶鈐轄恐太優莫若只與夀州同奏父名在禮法當避而二郡地望相若鈐轄止是巡檢司兵甲賊盜又諭曰廬終是優只令往夀却不避父名可也退追易廬州敕而邸吏云已發因奏知候垂簾別議此宣諭在十二日今掇出聨書之後兩日輔臣又稟易廬州事諭曰恐帶鈐轄再三開説自來多常調人知州見今是常調俞希旦兼難得去處又須移動乃可之既而御史楊畏虞䇿皆言易不當為廬州上亦必欲改之易竟改宣州易改宣州在十六日癸卯今聨書之仍別見於癸卯日蘇軾之未除潁州也上章自劾其章云軾章同鄭雍二狀以五日付三省蓋四日所上也合仍附五日臣今月三日見弟尚書右丞轍為臣言御史中丞趙君錫言秦觀來見君錫稱被賈易言觀私事及臣令親情王遹往見君錫言臺諫等互論兩浙災傷及賈易言秦觀事乞賜推究臣愚憃無狀常不自揆竊懷憂國愛民之意自為小官即好僭議朝政屢以此獲罪然受性於天不能盡改臣與趙君錫以道義交遊每相見論天下事初無疑間近日臣召赴闕見君錫崇政殿門即與臣言老繆非才當此言責切望朋友教誨臣自後兩次見君錫凡與言皆憂國愛民之事乞問君錫若有一句及私臣為罔上君錫尋有手簡謝臣其略云車騎臨過獲聞誨益諄諄開誘莫非師保之訓銘鏤肝肺何日忘之臣既見君錫從來傾心以忠義相許故敢以士君子朋友之義盡言無隱又秦觀自少年從臣學文詞采絢發議論鋒起臣實愛重其人與之密熟近於七月末間因弟轍與臣言賈易等論浙西災傷乞考驗虛實行遣其尤甚者意令本處官吏觀望風旨必不敢實奏行下却為給事中封駮諫官論奏臣因問弟轍云汝既備位執政因何行此文字轍云此事衆人心知其非然臺官文字自來不敢不行若不行即須羣起力爭喧瀆聖聽又弟轍因言秦觀為趙君錫薦舉得正字今又為賈易所言臣緣新自兩浙來親見水災實狀及到京後得交代林希提刑馬瑊及屬吏蘇堅等書皆極言災傷之狀甚於臣所目見臣以此數次奏論雖蒙聖恩極力拯救猶恐去熟日逺物力不足未免必致流殍若更行下賈易等所言則官吏畏懼臺官更不敢實言災傷致朝廷不復盡力救濟則億萬生齒更有溝壑之憂適會秦觀訪臣遂因議論及之又實告以惡易所言觀私事欲其力辭恩命以全進退即不知秦觀往見君錫更言何事又是日王遹亦來見少事謁中丞臣知遹與君錫親自來密熟因令傳語君錫大略云臺諫給事中互論事中互論災傷公為中丞坐視一方生靈陷於溝壑略無一言乎臣又語遹説與君錫公所舉秦觀已為賈易言了此人文學議論過人宜為朝廷惜之臣所令王遹與趙君錫言事及與秦觀所言止於此矣二人具在可覆按也臣本為見上件事皆非國家機密不過行出數日無人不知故因密熟相知議論及之又欲以忠告君錫欲其一言以救兩浙億萬生齒不謂觸忤君錫遂至於此此別無情理臣既備位從官弟轍以臣是親兄又忝論思之地不免時時語及國事臣不合輒與人言至煩彈奏見已家居待罪乞賜重行朝典時君錫與易又各先有章論軾題詩時章不降出軾初未知也易初二日大疏已論軾題詩事大疏惟大防摯見之轍亦未見既却封入後二章亦不出兩人既得旨與外任其日易又上章論秦觀王遹事云臣近因秦觀除正字言其刻薄無行不可汚辱文館翌日中丞趙君錫與臣言昨晡歸自臺中秦觀來見謝乃言賈侍御有文字言觀首云邪臣得位則引其類充滿於朝是擊中丞也便請中丞却言賈易有罪與觀無異如此則事可解矣觀既去近晚有主簿王遹來相看乃出蘇軾柬帖別紙云専令親情王遹去相見希諒察其王遹遂道蘇軾之言與秦觀之言不別君錫以為朝廷設風憲之任見小人濫進安得不言今以蘇軾氣勢頥指中丞與侍御史自相攻擊以眩惑人主取笑天下已具此論矣臣竊伏思念陛下擢臣使在言路必欲臣無所顧避為朝廷分別淑慝有如秦觀險薄無行所為不逞天下莫不非之既見其侵長而臣獨畏蘇軾兄弟強愎故噤口咋舌不敢直言則是臣上負天日死有餘責及乎忠言一出則怒鋒如火直欲破臣為虀粉果使狡計得行孰不震懼雖甚姦惡賊害端良至於迷國滔天無復敢言者可不痛乎若臣有毫髮自為身謀豈肯犯觸巨猾以速謗禍邪伏惟二聖保佑忠良開廣言路至公無私鑒其邪枉特賜睿旨出趙君錫所奏與此疏付外考究庶俾枉直分眀典刑不紊臣退入三泉死無所恨貼黃蘇軾兄弟隂結權幸分布腹心伺察中外茍有與之少異者必能中傷摧辱故貪利小人競相趨附而秦觀狡獪尤甚當其鷹犬之寄同惡相濟謀害正直不顧國家利害朝廷得失以間諜趙君錫使與臣自相攻擊此一事驗之可察其底裏惟在聖眀深念小人亂邦之戒特賜辨正天下幸甚編類章疏易奏以八月五日并今附本日章入不報君錫繼上兩章言賈易何罪易前此曽示臣一大疏攻彈蘇轍今不辨是非遽罷侍御史無以示天下至公又言臣昨論於先帝上仙之初作詩喜幸乞正典刑及易劾軾之罪不可使之外補事體至大並未蒙施行臣伏以前日蔡確之事坐不言與救解自宰臣以下罷黜者凡八人是朝廷深責臣子之背公死黨使天下眀知無禮於君者不可不急擊而必去之也今易憤軾之負恩懷逆首行彈劾而言才出口反蒙貶逐豈非與前行事大相違戾乎蓋蔡確無禮於太皇與軾無禮於先帝其罪一也豈可確則流竄遐荒軾則一切不問太皇不行此事將何以教天下之為母者也皇帝不行此事將何以教天下之為子者也有臣懷悖逆之心形容於言辭如此而朝廷不能亟正其罪將何以教天下之為臣者也伏望二聖質以近事早賜睿斷以解釋天下之非議又狀申三省乞敷奏靣請降出易章眀作行遣後二日內降君錫兩章付三省并諫議大夫鄭雍右正言姚勔論君錫各一章雍論君錫傾邪柔佞風節不立供職之初即言百僚見執政官謁禁蓋向來宰臣欲求自便故設此禁君錫觀望言此衆目為趕客中丞在臺中惟持兩可昨朝廷方用臣言按王鞏不檢事君錫與鞏杯酒相從獨不言鞏仍詣船別之望斷自宸衷竄逐以警在位又論賈易以為君錫弱易強君錫薦秦觀既除正字易彈秦觀無行不可以汚文館君錫即自劾蓋出於易劫持也勔論君錫本無風節偶置從班昵近少年追遊戚里昨除中憲內外駭聞及領職以來雷同低昂無所建眀稱觀才美既極薦論及屬官有言旋行陳首取捨翻覆貽笑多士翌日輔臣奏事延和殿次至臺諫交章蘇轍進曰伏見趙君錫狀言與賈易各論臣兄軾作詩事臣問兄軾云實有此詩然自有因依乙丑年三月六日在南京聞裕陵遺制成服後蒙恩許居常州既南去至揚州五月一日在竹西寺寺門外道傍見十數父老説話內一人合掌加額曰聞道好箇少年官家臣兄見有此言中心實喜又無可語者遂作二韻詩記之於寺壁如此而已今君錫等加誣以為大惡兼日月相逺其遺制豈是山寺歸來所聞之語伏望聖慈體察今日進呈君錫等文字臣不敢與遂先下殿既進稟諭君錫莫須罷中丞相公悶莫且要朝廷事寧貼君錫少持守兼所言軾事怎生行得此與蔡確事全別兼確自以姦邪為惡昨恐官家奈何此人不得久逺為朝廷大患故貶之其作詩亦是小事劉摯曰君錫舊為吏部侍郎欲令還舊官君錫却實是端人但此事首尾思慮不至諭曰亦深知君錫好人只被賈易所使自家執守在甚處還他舊官甚好吕大防曰軾詩亦須取軾一文狀諭曰莫不銷摯曰此事不可便已朝廷須要做箇行遣他日未免人指點今可令軾分晰因依可之退以君錫帶舊待制為吏部代李之純尹開封開封范百祿還翰林兼侍讀之純百祿具熟狀進入奏以進呈日逺故取畫遂得畫可摯謂君錫與二蘇友善非一日忽為此舉又不能量事可否制其要害而去取失宜誠為賈易逼持反招諫官所詆而罷深可惜也然諫官之論公邪私邪意其必有所在矣二蘇雖剛喜自用然要之自上即位首拔擢意實向正又其文學如此挺然毅氣足以摧姦禦亂可謂善類小有偏處不過喜引儇子此等可略也而掇拾不已殊不以久逺事為意坐快邪黨可為深惜已而內降軾章辨題詩事曰臣見臣弟轍與臣言趙君錫賈易言臣於元豐八年五月一日題詩揚州僧寺有欣幸先帝上仙之意臣今省憶比詩自有因依合具陳述臣於是嵗三月六日在南京聞先帝遺詔舉哀挂服了當迤邐往常州是時新經大變臣子之心孰不憂懼至五月初間因往揚州竹西寺見百姓父老十數人相與道旁語笑其間有以兩手加額云見説好箇少年官家其言雖鄙俗不典然臣實喜聞百姓謳歌吾君之子出於至誠又是時臣初得請歸耕常州蓋將老焉而淮浙間所在豐熟因作詩云此生已覺都無事今嵗仍逢大有年山寺歸來聞好語野花啼鳥亦欣然蓋喜聞此語故竊記之於詩書之當途僧舍壁上臣若稍有不善之意豈敢復書壁上以示人乎又其時去先帝上仙已及兩月決非山寺歸來始聞之語事理眀白無人不知而君錫等輒敢挾情公然誣罔伏乞付外施行稍正國法所貴今後臣子不為仇人無故加以惡逆之罪又一狀云被旨分析已具劄子奏入乞降付三省已上皆初八日事宋朝要録右正言姚勔諫議大夫鄭雍言其雷同低昻風節不立也初賈易論蘇軾題詩怨謗君錫亦相繼論之太皇太后不悅諭三省曰君錫全無執守吕大防曰誠如聖諭大抵賈易強君錫弱為所劫持也後四日因輔臣奏賈易換廬州事不許吕大防曰諫官猶以丞雜之罷為輕聖意以為如何諭曰相公執政道如何對曰臣等謂如此行遣已是酌中諭曰如此儘得也劉摯曰外議亦以為平穩然臣有愚意伏見蘇軾趙君錫賈易鄭雍輩皆是善人端士忠於朝廷陛下擢用至此他日得力可用之人今來却自相攻殘徒快小人之意臣深惜之此數人望太皇官家保全愛養以待異日任使况今日人才難得切望留意太皇聞自相攻殘之語笑曰只為是他悶不肯省事大防曰聞今日二諫官上殿必及君錫事緣無顯罪止為秦觀事無執守爾望以此止其説可之賜専切措置荆湖北路邉事朝奉郎直龍圗閣唐義問銀絹一百匹兩以渠陽貫保罷戍護領居民出漢無虞也實録係辛卯日嫌與賈易事相亂移入此紹聖元年九月十六日追責詔令御史臺候至元祐十年有臣僚父母亡歿無故十年不葬之人即依條彈奏及令吏部候今來限滿點檢得尚有違條不葬父母品官即未得與關升磨勘如失點檢亦許御史臺奏工部言陜府虢解州縣人户納免夫梢錢乞今後並許展限至六月終納足從之實録係壬辰日嫌與蘇軾事相亂移入此
