body:
  text: 續資治通鑑長編巻四百七十七宋李燾撰哲宗元祐七年九月辛已朔熙河蘭岷路經畧使范育言凖朝㫖具本路如何應援今相度西賊並邊嘯聚雖未測所嚮本路可豫於通逺軍界屯兵為備若賊犯秦鳯本路擇便出竒撓擊或斷其糧道或擊其惰歸若本路被冦秦鳯亦爾則鄰路合勢併力足以制賊又依得䇿應掎角指揮秦鳯路經畧使吕大忠言方今防秋熙河既未肯逓遣將兵若涇原有冦欲且遣第四將行其熙河有冦本路除䇿應牽制外亦難别那兵將前去已依此指揮統制官施行訖詔涇原有㓂令秦鳯量事勢遣發一將或兩將軍馬赴援其雞川甘谷兩將仍常留一將通管本處邉面餘依熙河蘭岷路經畧司所奏仍遵守前後所降掎角牽制䇿應指揮施行壬午資政殿學士知永興軍蒲宗孟知大名府集賢殿修撰知河陽文及為太僕卿詔自今虧欠糯米油麻綱運如收糴不足即據本綱所欠少數目將干繫人請受依糧綱少欠條先次借半年内半分請給糶賣拘收見今令排岸司差人監糴送納不足並依糧綱少欠條仍至三釐止三釐外計贓以盗論新無詔應以朝廷機宻事及實封要重文書傳報者以違制論撰造事端謄報惑衆者亦如之事理重者奏裁即雖傳報而於事無害者杖八十應官司擅置獄者徒一年公私諸色人因公事追捕人未解所屬私以杻鏁之類闗留者杖一百新無癸未臣僚言朝㫖在京并諸路應合取索㸃檢公案去處除刑名許依舊外其餘若事未經結絶非因陳訴不得取索在京即察案亦豫計以察案有一司專法唯詐毎次只取一件限不過三日送還今若一槩住罷理有未安竊謂𨽻察官司不可不許取索伏望特依御史臺一司專法許取索未結絶公案㸃檢詔許取一年以上未結絶公案餘從之甲申王子韶罷秘書少監以將命使遼而御下苛細致指揮使刃其子并傷子韶故罷之八年十二月十六日除集校乙酉西南羅蕃遣人貢方物户部言本部假日諸處申解公事並送廂寄禁至假開日方押赴部勘斷其間甚有情法至輕而偶假故連綿禁至五七日頗為未便今欲乞假日輪本部官一員午前入省輪推司杖直各二人直日杖以下罪事非追究者聽决遇本省官當宿日只令宿官以時入省斷遣其省曹官吏畏避諸處問難㸃檢多務因循不即結絶亦不恤小罪非理淹留如許施行其顯有推避不即結絶亦乞約束從之丙戌端明殿學士知蔡州鄧温伯知永興軍太僕卿劉忱加集賢殿修撰為陜西路都轉運使三省言朝廷以募役之法常使無役下户一槩出錢助免上户差役行之嵗乆頗困細民故議改法將不可執役及力重役輕人户令等級出錢却充空閑不及四年處雇募州役仍令本路將多補少移那支使逐縣毎年准備存留不得過一分積留不得過五分之處餘錢並用雇人今㸃檢得諸路助役錢大數每年支用止及一半以來却致狹鄉縣分差役頻併盖是當職官吏不體朝廷法意務為占吝不切雇募以寛民力及檢㑹坊場河渡等自來止用支酬衙前自募法後方行出賣收錢助役今來上件錢專充衙前等支用外尚有寛剰數目不少亦合補助其餘役人今欲令諸路監司州縣依下項畫一指揮施行如受此指揮後依前因循不務子細推行致有違誤朝廷必定遣官按察别有施行一合差役人户第三等以上户空閑四年第四等以下户空閑六年如空閑不及逐等年限即據所闕役人雇募如本路役錢支不及二分其空閑年限各逓展一年一狹鄉縣役人除已雇衙前州手力并壮丁不雇外許并雇州縣人役上三等户並貼雇令空閑及四年下二等户並貼雇令空閑及六年本縣紐計逐等合役人户除空閑年外各合差若干户充役如不足合雇若干人立定二額差者役滿却差人承替雇者有闕却募人填闕後來户口别有升降差雇不齊且依舊額候三年重造簿日别定差雇之額仍限今來指揮到日今佐據合雇人額便行召募仍自州及縣先從重役替放先入役之人如無合雇州役即便雇縣役其州縣役若本等不足並依近降條約差次一等比本等内下户物力及七分以上人以籍為定如次等委無及七分户只以本等理空閑年一寛鄉縣役人除已雇衙前州手力外並輪差如已依舊條雇到州役即未得開落别作一項聲説一官雇弓手先雇曽充弓手人不足以有武勇行止人充役人願雇者准此一壮丁於本村合差人户依版簿名次實輪充役半年一替除本等應副他役外如一村有四十户合差壮丁之人本村壮丁二人處每一年輪四户祗應十年輪遍周而復始一一州一路有狹鄉役頻縣分募錢不足申提刑司依條以一路移那助役寛剰錢支用不足申本司乞支坊場河渡寛剰錢謂支衙前雇食支酬綱運接送人等錢外寛剰數目仍據每年合用支酬衙前等費用錢以十分為率每年更留二分准備衙前等支用樁留至五年止謂如衙前等每年合支用錢一千貫将寛剰錢存留二百貫五年留一千貫更不樁留又不足申户部依此移那别路逐色寛剰錢一助役錢依舊條每年存留一分如見今已有寛剰及自來積留錢數即便作五分樁留遇有支動即補填一應差軍人接送除代有雇錢役人者並以用過事軍人身分請受嵗終計數令提刑司撥還轉運司餘依舊條一應重役人合行替放願應募依舊在役請雇錢者聽一應今後募到役人湏有稅産不得募䕃贖并曽犯徒刑及諸上㙯人並召有家産二人委保仍不得過舊募雇錢數一衙前如人户願依陜西鎮戎徳順熙州衙前法以官田充募者聼其官田合出租課即以坊場河渡錢撥還所屬一諸縣依今來立定新式供状一本申州本州類聚繳申監司監司聚議連書繳諸州状申户部監司仍别具本路移用及寛剰縣分錢數申部所供状縣限半月州限一月監司限兩月州縣監司如有未盡未便事理各具利害許實封入逓申尚書省状式某縣今奉指揮供具本縣合係寛狹鄉及差募役事件一本縣某色為重役某色為次役某色為輕役一本縣係寛鄉或係狹鄉一衙前若干雇募未足輪差鄉户若干支錢若干若全支雇食錢計支錢若干一州役若干合差若干合募若干若干已募嵗支錢若干若非全年雇者只據實支錢數開説若干未募合支錢若干其錢在某處一縣役若干依前開已上五項内有本縣不該開説事件即除下一五等户若干逐等户若干逐等差役若干本等差人若干次等及七分物力差人若干空閑若干上等四年以上若干下等六年以上若干一助役錢除樁留及雇人外剰錢若干一坊場河渡錢若干即不得将非坊場河渡錢滚同支用一界三年計錢若干一年計錢若干若干已収若干未納年支若干衙前雇食錢若干應縁募人費用錢若干諸般支費若干已上一項如内有非本州事件即具州状開説詔並依仍先次施行吕大防政目七年九月六日書白劄諸路役法即此也實録刪修太畧今以法册所編録者詳著之元祐於役法留意如此不久復為紹聖所壊甚可惜也舊録云云仍附見三省言諸路差役第三等以上户空閑四年第四等以下空閑六年不及逐等年限即雇募狹鄉縣役人並許雇州縣役寛鄉縣役人並輪差重役人合替放願應募者聽募役人湏有稅産不得募有䕃聼贖人衙前如有人户願以官田充募者聼及請依今來立定新式供本縣輕重役法次等並從之樞宻院言昨熙河經畧司奏乞招納河南部族朝廷以鄂特凌古未失臣節已降指揮不得擅便招納近聞鄂特凌古於河南增屯兵馬疑邊官頗有漏洩致令驚猜漸為防備縁自青唐不寜熙河未嘗與鄂特凌古通問又前令開諭鄂特凌古本路亦以謂未可遣人前去慮因此隔絶情意不通若鄂特凌古審知熙河已曽招其部族又有轄揚烏爾之釁復又西賊拘質其使從此合謀未為安便檢詳元祐元年内為鄂特凌古與其首領不和亦曽降詔戒約今可俲此詔令范育將先降下開諭指揮秖作帥臣意隨宜増損别以勾當為名速選有心力善辯之人往諭鄂特凌古並包容轄揚烏爾招安斯納等族早至安帖無致滿裕克窺伺生心如令其知漢憂已而無疑熙河招納之意則於今日邊情為便青唐録誤以此事為六年九月今改之吕大防等奏臣䝉恩差充南郊大禮使准式常賜外更有加賜臣等備員宰政賦禄已優稠疊受賜於義未安兼辭免加賜已有前比伏望聖慈特賜寢罷御批宰臣等引前來明堂例辭免加賜今南郊與明堂事體不同宜降詔不許辭免御集云七年九月六日降詔今附此政目十二日吕大防等免加賜即此也丁亥詔軍人不許習學乞試隂陽文書如違犯並從私習條戊子召輔臣觀稻于後苑東上閤門使吉州防禦使苖履為涇原路都鈐轄知鎮戎軍熙河蘭岷路經畧司言探聞青唐聚兵一公城防托洗納族兼自來青唐未嘗於河南地分㸃集雖稱防托洗納人户又慮别有他謀詔令范育宻諭康識王克平詳探所添人馬因依以聞仍隂為隄備不得張皇康識王克平差遣合檢附先是詔侍從官及六曹長貳給舎臺諫禮官集議郊祀典禮三月十八日於是翰林學士兼侍讀顧臨翰林侍講學士范祖禹權户部尚書錢勰御史中丞李之純户部侍郎蔣之竒中書舎人喬執中殿中侍御史呉立禮太常博士張瓛等八人議曰臣謹按經曰昔者明王事父孝故事天明事母孝故事地察禮曰天子祭天地四方祭山川祭五祀嵗徧三代之禮天子無不親事天地周禮冬日至祀天於地上之圜丘夏日至祭地於澤中之方丘自玉器牲幣樂舞皆不同由漢以來乃有合祭之文至於國朝踵為故事元豐中神宗皇帝用禮官之議詔定北郊親祠之議始罷合祭之禮陛下嗣位於今八年將肇祀圜丘而疑於未見地祇欲循祖宗之舊則禮不經見欲如元豐之制則慮北郊或未可行故下有司博議此誠欲崇明祀謹重之至也臣等議書曰惟天地萬物父母禮曰地載萬物天垂象取財於地取法於天是以尊天而親地王者父事天母事地皆不可以不親今三年而一郊已非古典而北郊未有親祠之日若不親見地祇則是尊天而不親地事父而未事母也朝廷審能以夏日至盛禮備物躬祀北郊舉千餘年之墜典此則三王之盛復見於今矣其誰敢以為不然然臣等竊恐北郊之禮未必親行徒崇空文則天子長無親事地之禮亦非聖情之所安也伏請合祭天地如祖宗故事竢将來親行北郊之禮則合祭可罷臨祖禹又言竊以天地特祭經有明文然自漢以來不能行之千有餘年矣時異事變不能盡同先帝朝獻景靈宫十一殿一日而徧陛下一嵗乃徧亦因時制宜欲可行也太祖建隆四年初郊至元豐百二十年已成一代之禮惟元豐六年用詳定郊廟奉祀禮文所議遂遷皇地祇之位先帝所以行之者决欲親祠北郊也若先帝能力行之而陛下未能猶當且復其舊况先帝尚未行乎設先帝已行而復知其難未必不改而從舊也宋興以來太祖郊四太宗郊五真宗郊五仁宗郊九英宗郊一神宗郊三皆合祭不合祭者惟元豐六年一郊而陛下他日果能行北郊之禮然後罷合祭未為失也臣等不知今日欲親祠北郊如之何而可也一年再郊此必不能且夏日之至未易行也減損北郊之儀以就可行是於父母有隆殺也南北郊與明堂間祀則南郊愈踈亦未為得禮也或六年或九年而一郊此豈周禮乎今近捨祖宗百餘年已行之禮而欲逺復三代千餘年不舉之祭守周禮為空文虛地祗之大祭失今不定後必悔之伏乞圜丘合祭依熙寧十年典禮吏部侍郎范純禮彭汝礪户部侍郎范子竒禮部侍郎曽肇刑部侍郎王覿豐稷權知開封府韓宗道樞宻都承㫖劉安世中書舎人孔武仲陳軒太常少卿盛陶宇文昌齡侍御史楊畏監察御史董敦逸黄慶基左司諫虞䇿禮部郎中孫路員外郎歐陽棐太常丞韓治博士朱彦宋景年閻才等二十二人議曰南郊合祭天地不見於經王者親祠天而地則闕焉亦非典禮神宗皇帝考按古誼詔罷合祭元豐六年止祀昊天上帝於圜丘配以太祖又詔親祠北郊如南郊儀仍命有司修定儀注則於承事神祇禮無違者至於二郊之祭或不並行則有司攝事亦自有典禮合於周官大宗伯王不與祭祀則攝位之文唯是北郊先帝未及躬行然詔㫖明甚所宜遵守但當斟酌時宜省繁文未節則親祠之禮無不可為盖天地重祀尢當敬重不宜數有廢舉若昨罷合祭違悖經典固湏改正既已合禮而又紛更恐失朝廷尊事神祇之意伏請並依先朝已得詔㫖施行武仲等又請以孟冬純隂之月詣北郊親祠如神州地祇之祭權兵部侍郎杜純議請於苑中設望祀位置爟火於壇所俟躬祀南郊之嵗則夏至北郊上公攝事每獻舉爟火詔拜工部侍郎王欽臣議宜如祖宗故事並祭天地一次申謝丕貺汝礪又言臣凖𠡠與兩制尚書侍郎等議南郊合祭事是非盖未有定犬馬之誠竊不自勝嘗恐縁諸儒一偏之説紊國家莫大之禮朝廷已行之命輒殫悃愊庶禆萬一臣聞禮者體也體不備君子謂之不成人設之不當猶不備也故先王之郊於神明也既祭之以禮又求之以一類其時日牲幣器服聲音顔色無或非其類者或非其類謂之非禮非禮之祭鬼神不饗此其言似迂逺而難知然其禮甚切至而必驗臣謹以一事明之春為陽故以正月迎於東郊秋為隂故以七月迎於西郊聖人有作莫之或改也今使迎春則在西郊而用秋之時迎秋則在東郊而用春之時樵夫野叟猶怪以駭而况於鬼神乎天之與人非有異也今因祭方澤也而合於圜丘用夏至也而用冬至盖何以異此夫前日之議論非是後日行之而不安昔人盖有變之者矣先帝欽若承順天心罷黜邪説是正太常行之厯年中外禔福聖作明述神明欣愜今何疑何恤而欲更之也家人小祀尚謹廢舉天地重大豈容輕議臣聞之神無常饗饗于克誠天無私親親于有徳朝廷誠能富民阜財明道崇義致帝者之用成天地之化使粒食之民晏也粲也則上帝是祐而諸福之物皆可畢致改命實非所願惟朝廷謹之重之反之復之務求至當以稱先帝所以尊奉神靈之意黄貼子稱合祭議臣等謂不可者二十二人謂可者八人揚子曰人是其所是而非其所非将誰使正之曰萬物紛錯則占諸天衆言淆亂則折諸聖在則人亡則書周禮聖之言也合祭肇於漢末其言不經朝廷近制考之方䇿告之宗廟行之天地布之天下以憲萬世或委聖言而從不經不可也先帝既改之善矣又欲變之不可也或曰親祠未能且從合祭可乎親祠非不可行以事而使攝焉亦禮也合祭不用而從非禮不可也夫規矩誠設不可欺以方圓繩墨誠陳不可欺以曲直今議祭而不從禮議禮而不從經則是非並起終無所歸宿舎規矩而察方圓舎繩墨而觀曲直不可也先帝留意經術曲折皆有稽據固非羣臣所能窺見髙下小大惟太皇太后陛下皇帝陛下明詔執事質於是非無從一偏之論决於大小無安順從之説如此則是非可决而經正矣五年五月十八日六月十二日七年三月十八日汝礪以初六日上奏今復移入十二日顧臨等議後是日肇又言臣近奉詔集官議南郊合祭天地事已具議状奏聞訖臣職在典禮再三思惟此天地大祭國家重事况當陛下郊祀之初尤宜敬重舉措一有未安貽議萬世尚慮前状開陳未盡敢再冐昧以聞伏以天地合祭非先王之禮學士大夫所共知之不待臣言而信也然使合祭於承事神祇無不順之理雖非先王之禮何為而不可行盖以聖人之於祭祀求之於茫昧不可知之中故必因其方順其時而用其類以致之是以因髙而事天因下以事地兆五帝於四郊朝日於東夕月於西兆司中司命於南兆風師於北兆山川邱陵墳衍各因其方而春夏秋冬各順隂陽之性其於祭或燔或瘞或沉或埋以至圭幣牲牷坎壇樂舞各從其類先王非茍為之以謂求之如此之盡然後庶幾神之來享也茍為反是則其於格神也難矣今論者以罷合祭則天子未有親見地祇之時夏至親祠北郊則以五月行禮為難欲因南郊併舉地祭此於人事以求自便則可矣以此為親見地祇之實則未也何則事之非其方致之非其類又違其時施於羣小祀且猶不可况地祇之尊乎以此事地祇地祇未必來享而便謂此為親見地祇之實此臣之所未諭也且屈已以從神與屈神而從已二者孰安今以五月行禮為難而引地祇以就冬祭茍從人事之便恐失陛下恭事地祇之意此又臣之所未諭也聖人之事神洞洞乎其忠屬屬乎其敬舎忠舎敬常情所不肯為而謂陛下肯安之乎臣愚故謂合祭不可復親祠不可廢但當斟酌時宜省去繁文末節則親祠之禮無不可為已於前状論之矣惟陛下留神省察逺惟先帝復古之心持以至誠不倦之意無從茍簡自便之説以伸躬事地祇之實則上下神祇孰不顧享元豐三年五月甲子初議北郊四年四月己巳詔親祠北郊元祐五年五月十八日許将建請壬辰太皇太后垂簾三省進翰林學士顧臨等郊祀議太皇太后曰宜依仁宗先帝故事吕大防曰天地之祭自漢以來分合不一唐天寳後惟天子親祠乃合祭於南郊其餘時祀並依禮分祭國朝以來大率三嵗一親郊並祭天地宗廟因行赦宥於天下及賜諸軍賞給遂以為常亦不可廢雖欲嵗嵗親行於本壇乃不可得今來諸儒獻議欲用禮官前説南郊不設皇地祇位惟祭昊天上帝不為無據但於祖宗權宜之制未見其可蘇頌曰適來䝉聖諭仁祖先帝故事臣伏見仁宗皇帝九郊皆合祭天地先皇帝四郊三並合祭惟元豐六年用禮文所叅議止祀上帝而北郊之祭雖從所議修定儀注然未見親行今年南郊乞准故事蘇轍曰議者持合祭别祭二説各有所據欲望朝廷酌量事體輕重大小斷自聖意自熙寜十年神宗皇帝親祠南郊合祭天地今十五年矣皇帝即位又已八年未嘗親見地祇乃朝廷闕典不可不正范百禄曰祖宗皆遵故事每遇南郊嵗並合祭天地神宗皇帝聖學睿斷必以為圜丘無祭地之理遂詔禮官考求先王典禮至元豐六年南郊止祀昊天上帝配以太祖記曰有其廢之莫可舉也先帝所廢稽古據經未可輕改越二日再進呈大防言先帝因禮文所建議遂令諸儒議定北郊祀地之禮然未經親行今來皇帝臨御之始當親見天地而地祇獨不設位恐亦未安况前代人君親祠並祭多縁便於己事本朝祖宗即不然直以恩霈四方慶賚將士若非三嵗一行則國力有限今日宜為國事勉行權制候將來議定北郊制度及太廟享禮行之未晩百禄言祖宗圜丘合祭皆是循用後代權時之制神宗皇帝元豐六年南郊不合祭地祇乃是復行先王典禮今已著為太常寺元祐禮且昨來夏至已詔吕大防以上公攝事隆禮備樂以祭地祇於北郊况祭不欲數今冬至圜丘地祇未合再祭大防又奏曰百禄之言雖是典禮未易遽行盖為國事太皇太后曰吕大防之言是也非不知此盖為國事頌又言古者人君嗣位必郊見天地今皇帝初郊而不祀地恐未合古若云必復先王典禮臣竊以謂先王典禮未必盡同且虞夏之禮商周亦不相襲至如唐虞之代一嵗四廵方岳遍祀羣神夏商則五載一廵守成周十二年乃遍豈是盡行先王典禮况三代去今年祀益逺非商周去虞夏之比而國朝制作多循漢唐之舊郊丘宗廟之祀典章儀物之盛恩霈賚予之費事與古異豈勝變復今以皇帝初郊依熙寧十年故事合祭天地俟將來遇郊禮再下有司舉行先帝詔㫖詳議南北郊祭亦未為晩轍言周禮一嵗遍祀天地皆王者親行自漢唐以來禮文日盛費用日廣故一嵗遍祀不可復行唐明皇天寳初始定三嵗一親行致齋之日先享太清宫次享太廟然後合祭天地從祀百神所以然者盖謂三年一行大禮不徧及則人情不安此近世變禮非復三代之舊而議者欲以三代遺文参亂其間亦失之矣今别祭之議有欲當郊之嵗皇帝先以夏至親祠北郊者有欲移夏至之祀行於十月者有欲三年祀天三年祀地者夏至暑雨方作以行大禮勢必不可夏至之禮行於孟冬其為非周禮與冬至無異而數月之間再舉大事力何以堪若天地之祀互用三年則天地均為六年乃獲一祭而以地廢天以卑畧尊尤為不順鄭雍言合祭天地自漢唐以來常行本朝六聖並是合祭先朝元豐六年方特祀昊天上帝然而先帝熙寜中已曽三次合祭與今事異自古帝王受命之初未嘗不郊見天地者大防又言適來所陳恐禁中未盡見本末欲來日畧具祖宗及臣寮所議進入從之翌日三省修具祖宗以來郊祀禮及顧臨等所議上聞既而太皇太后宣諭曰皇帝即位以來未曽親祠天地今且合祭似属有名大防等曰適於殿閣中同議方欲縁皇帝郊見之始特設地祇位於圜丘則於先帝議行北郊之禮並不相妨今䝉聖諭正如衆議欲依此令學士院降詔及言致齋日躬行廟享亦未合禮欲於詔中令議官與北郊事并議施行太皇太后曰可舊録云先是元豐中詳定郊廟禮文以皇帝親郊之嵗設皇地祇位於圜丘並祭非禮有詔下議而議者或以當郊之嵗冬夏之日分祭南郊北郊以軍賞為二而分給之或以致齋三日郊廟各一日而祀偏或欲於圜丘之傍别營方丘而望祭或以夏至盛暑天子不可親祭改用十月或欲親郊圜丘之嵗夏至日遣上公攝事於方丘先帝降詔定親祠北郊如南郊儀併定上公攝事之禮至元祐五年尚書右丞許將建言三嵗冬至天子親祠遍享太廟祀天圜丘而其嵗夏至方澤之祭乃止遣上公即是皇地祇遂永不在親祠之典此大闕禮不可不議始詔侍從官及尚書侍郎給舎臺諫禮官集議既而臨等八人議宜如祖宗故事合祭天地俟將來親行北郊之禮則合祭可罷吏部侍郎范純禮等二十人議天地重祀不宜數有廢舉昨罷合祭既復古禮而又紛更恐失尊事神祇之意請依先朝已得詔㫖施行兵部侍郎杜純請於苑中設望祀位置爟火於壇所俟躬祀南郊之嵗則夏至北郊上公攝事每獻舉爟火詔拜工部侍郎王欽臣議宜如祖宗故事並祭天地一次申謝丕貺中書舎人孔武仲等議請南郊專祀上帝而間以孟冬詣北郊親祠改先帝北郊祭皇地祇之儀冬至祀天夏至祀地先王之制也先帝是正禮典至是猶復合議惟蘇頌議論稍有經據頗合禮典自餘皆狂説異意唯務變革良法善政更相阿附而吕大防悖繆亂常為姦惡之渠魁其罪甚大卒保首領未足為姦臣之誡新録自改先帝北郊以下至為姦臣之誡並削去仍別修云詣北郊親祠皇地祇議既不同故太皇太后宣諭及吕大防等議以皇帝即位以來未嘗親祠天地行合祭之禮為有名遂降詔云且辨誣曰上文乃太皇太后垂簾三省進顧臨等郊祀議太皇太后曰宜依仁宗先帝故事蘇頌云仁宗九郊皆合祭天地先帝四郊三並合祭惟元豐六年用禮文所参議止祀上帝而北郊之祭未見親行又云人君嗣位必郊見天地皇帝初郊而不祀地恐未合古其説皆與吕大防蘇轍合唯范百禄獨言神宗元豐六年南郊不合祭天地乃是復行先王典禮於是太皇太后宣諭曰皇帝即位以來未曽親祠天地特設地祇位於圜丘今史臣力主不合祭之論而云惟頌有經據則合祭果是矣又云自餘皆狂説異意則范百禄獨主元豐者乃狂説異意矣又云大防罪甚大卒保首領不足為姦臣之誡則是議與蘇頌合者當得罪而寛之哲宗為失刑矣此三説顛倒無稽乃誣謗宣仁又及哲宗不可以訓合刪去八十八字顧臨曽肇等議並合載於九月初但不知其日據理當在初八日彭汝礪奏前後今移入十二日前鮮于綽傳信記云神宗皇帝以南郊合祭天地不見於經詔罷合祭元豐六年南郊止祀昊天上帝於圜丘配以太祖又詔親祠北郊如南郊特命有司修定儀注然未及行元祐初郊右丞許將建議當講祭皇地祇事於是下有司集議卒為數議議不合祭親祠皇地祇者二十二人吏部侍郎范純禮直學士院孔武仲中書舎人陳軒禮部侍郎曽肇權知開封府韓宗道樞宻都承㫖劉安世吏部侍郎彭汝礪户部侍郎范子竒刑部侍郎王覿豐稷太常少卿盛陶宇文昌齡侍御史楊畏左司諌虞䇿禮部郎中孫路員外郎歐陽棐太常丞韓治監察御史董敦逸黄慶基太常博士朱彦宋景年閻才議合祭者八人翰林學士顧臨翰林侍講學士范祖禹户部尚書錢勰中丞李之純户部侍郎蔣之竒中書舎人喬執中殿院吳立禮太常博士張瓛乞欲祭皇地祇於後苑望祀者一人兵部侍郎杜純欲權用祖宗謝天地故事並祭一次以申謝丕貺者一人工部侍郎王欽臣議既上執政中所主亦不同左僕吕大防門下侍郎蘇轍欲從合祭之議中書侍郎范百禄欲從不合祭之議交論於上前㑹范中書引周禮圜丘方澤玉幣樂舞不同之文敷奏宣仁聖烈意主合祭謂公曰此等言語莫是人念得否遂終定合祭議議不合祭者二十人當從實録中書舎人兼直學士院孔武仲雖議不合祭又與二十人稍異實録稱武仲等當是陳軒亦同此議鮮于綽并數此二人故云二十二人也曽肇亦云二十二人蘇轍龍川畧志云三代舊禮一嵗九祭天再祭地皆天子親之故所祀神祇逐祭各異而一嵗皆遍自漢以來毎嵗親祠天地或合或别已不可常矣至唐開元中始定毎嵗常祀皆有司攝事一如三代舊典惟三嵗天子親郊則於南郊合祭天地及從饗百神國朝因之凡冬至圜丘孟春祈榖孟夏雩祀季秋明堂大慶恭謝凡皇帝親郊皆用合祭之禮盖毎嵗常祀而三年親郊古今異宜不可復合其來舊矣至元豐末神宗親祠圜丘罷皇地祇及從祀百神識者疑馬元祐改元上將親饗明堂轍時為右司諫奏乞依皇祐明堂神位諸公皆牽於故學不逹時變奏入不省及七年上將親祠圜丘予與諸公面議衆議多以合祭為允惟吕㣲仲本好古學詳論乆之乃聽而范子功横議意謂天子之事天地如家人之養父母雖不可廢一不養要不可同養於㕔事耳予應之曰父母不可同養於㕔事此禮之㣲文也三年親祠而地祇不預此即廢一不養禮之大闕也爭之終不能合及議於上前轍奏曰合祭別祭各有所據若非朝廷酌量事體輕重大小斷自聖意臣恐無由了當竊見熙寜十年神宗親祠南郊合祭天地至今已十五年皇帝即位又已八年人主並未嘗親見地祇臣謂朝廷此乃闕典不可不正也議猶未决它日復於上前議之轍奏曰周禮一嵗遍祀天地皆人主親行故郊丘有南北禮樂有同異自漢唐以來禮文日盛費用日廣事與古異故一嵗遍祀不可復行唐明皇天寳初始定三嵗一親郊於致齋之日先享太清宫次享太廟然後合祭天地從祀百神所以然者盖謂三年一次大禮若有不遍則於人情有所不安故也此近世變禮非復三代之舊而議者欲以三代遺文参亂其間亦失之矣今別祭之議有欲當郊之嵗皇帝先以夏至親祠北郊者有欲移夏至之祀行於十月者有欲三年祀地者然夏至暑雨方作以行大禮勢必不可夏至之禮行於孟冬其為非周禮與冬至無異而數月之間再舉大事力何以堪若天地大祀互用三年則天地均為六年乃獲一祭而以地廢天以卑畧尊尤為不順此皆朝廷大禮今范百禄之言皆禮文末節耳恐難以施行吕大防曰范百禄之言皆合周禮臣等亦知之但事不可行耳太皇太后宣諭日卿等非不知此盖事有礙耳議尚未决它日將决於上前至崇政殿門㣲仲驟謂予曰今廢三代舊典而行開元故事可乎予日今捨三代而從漢唐者非一事矣天子七廟今乃一廟九室廟祀一帝一后今諸后並配事各適時豈必三代㣲仲乃服及對太皇太后以衆議為允於是始復合祭詔入國接伴使副今後不得將帶親屬并有官人充職員小㡳違者罪之其入國使副實有宿疾聼帶親屬一名充小㡳不以有官無官具奏聼㫖先是惟汛使出疆以老疾自陳有例得帶親屬自熙寜後為通法奉使者稍稍以親戚自隨因縁干擾故條約之詔諸路提刑司遇轉運司借撥糴本即疾速應副不得非理問難致糴買後時及令轉運司糴買州軍並以見在市價趂時糴買務使惠及農民所蓄數廣以左司諫虞䇿言也都水監言准𠡠五百里外方許免夫自來府界黄河夫多不及五百里縁人情皆願納錢免行今相度欲府界夫即不限地里逺近但願納錢者聼從之支衲襖五萬領付河東陜西帥府政目九月十二日事當考甲午監察御史楊畏言應吏部銓量官吏職位姓名請依三省樞宻院奏除人例關御史臺以憑考察詔今後銓量到人依條聞奏外仍關吏部置簿籍記實録係甲午郊議巳見上今不别出宗正寺言本寺令宗室無服親連名非上下同者如立之與宗立之類及音同字異皆聼撰祖宗袒免以上親見依上件令文撰賜名外今來非袒免親既許本家撰名竊慮員數日増取名漸多若皆令依上條一一照對廻避必至拘礙訓撰不行今欲乞令太祖太宗秦王下子孫無服親各於本祖下即依令文撰名若係别祖下無服親除所連名自合别取字外餘雖犯别祖下本字並許用所貴久逺訓撰得行從之又言宗室撰名自來並用兩字内取一字相連所以别源派異昭穆也昨自熙寜中立法非祖宗袒免親更不賜名授官後來逐時凖大宗正司關到本家所撰名多是重疊至有數人共一名者又或與别房尊長名諱相犯或兄弟不相連名或只取一字為名而偏傍不相連者名稱混殽難以分明昭穆之序竊恐年祀寖乆流派逾逺譜籍漸無統紀除重疊共一名者昨來寺司申請已得朝㫖見令改撰外所有犯别房尊長名諱兄弟不相連名并以一字為名恐亦合改撰欲乞宗正司告示逐宫院將見今名犯尊長諱并字不相連及单名者並令改撰仍從本寺定取一相連字取名稍寛者關宗正司告示令依倣撰名所貴稍得齊一從之丙申韓縝言火山軍至石州沿河邊靣闊逺若賊乘河氷如履平地縁慶厯元年二年元豐六年皆凖朝㫖於火山軍界惹凌下流保徳軍嵐石州可使千里不凍以限賊馬所用工料不多本司已差殿前燕渙等相度百子㑹歸子口可以惹凌從之戊戍詔曰國家郊廟時祀祖宗以來命官攝事惟三嵗一親郊則先饗清廟冬至合祭天地于圜丘元豐間有司援周制以合祭不應古義先帝詔定親祠北郊之儀未之及行是嵗郊祀不設皇地祇位而宗廟之饗卒如權制朕以凉昧嗣承六聖休徳鴻緒今兹禋禮奠幣上帝祼鬯廟室而地祇大神乆未親祠矧朕方修郊見天地之始其冬至日南郊宜依熙寜十年故事設皇地祇位以嚴並貺之報仍令有司擇日遣官奏告施行厥後躬行方澤之祀則修元豐六年五月之制俟郊禮畢依前降指揮集官詳議親祠北郊事及郊祀之嵗廟享典禮以聞蘇軾元祐八年二月二十五日圜丘六議稱九月二十二日詔與此十八日不同當考御集第十七巻改北郊詔一道翰林學士顧臨奏白劄子祖宗以來郊廟常祀皆以時分祭遣官攝事惟三嵗一行親郊之禮因偏享廟室並祭天地於園丘昨因詳定郊廟禮文所建議親祠合祭不應古義先帝有詔定親祠北郊之儀命下而未果行是嵗圜丘罷設皇地祇位而廟享尚循權制今朕以臨御之初郊見上帝因得躬享太廟然地祇大祀獨闕不講深惟王者察於事地義不可緩其今嵗圜丘宜依熙寜十年故事設皇地祇位以申始見之禮候親祠北郊依元豐六年五月八日指揮宜令有司擇日遣官奏告施行令學士院依此降詔今撰到詔本進呈勅門下國家郊廟時祀祖宗以來命官攝事惟三嵗一親郊則先享清廟冬至合祭天地于圜丘元豐間有司援周制以合祭不應古義先帝乃詔定親祠北郊之儀未之及行是嵗郊罷設皇地祇位而宗廟之饗則如權制朕以凉昧嗣承六聖休徳鴻緒今兹肇禋祗見上帝祼鬯廟室而地祇大神也闕而不修謂朕事察之義何其冬至日南郊依熙寜十年故事設皇地祇位以申始見之禮以嚴並貺之報宜令有司擇日遣官奏告施行厥後躬行方澤之祀則修元豐六年五月之制仍俟郊祀畢依前指揮集官詳議親祠北郊事及郊祀之嵗廟享典禮聞奏御批乆未親祠加以朕躬方此祇見天地之始貼却大神字下至義何字減去一十二字用此一十六字元祐七年九月十八日進入神宗是正禮文改合祀之失追三代之典以夏至之日祭於方丘至是始又合祭時方垂簾姦臣擅朝故也左朝奉大夫韋驤為主客郎中左朝奉大夫王彭年為都官員外郎己亥房州觀察使宗喬卒贈司空追封南陽郡王謚恭康壬寅河東節度使太師致仕文彦博乞免南郊陪位從之癸卯詔諸宫院教授差宣徳郎已上親民資序人范育言凖朝㫖若夏賊累攻邈川即本路合如何施行令臣深計熟慮豫為方畧臣前所陳乞定河南之䇿正為此也前日河南之人宻輸誠欵欲因而撫定非貪土地盖河南既定足以威制外裔下臨河北若視諸掌其衆盡為屬國可以控夏賊腹背制其死命脱使賊攻邈川本路力不足則前日所陳邊勢之利反為夏賊所有矣樞宻院言河南諸羌懐漢願附雖是乆逺邊防之利第以青唐未有失節而夏賊方謀合從故未可輕議所以前降指揮不得擅便施行令撫定河南部族又豈能制夏賊死命詔范育依詳前降指揮悉心講慮豫為謀畫賊果犯邈川難以出兵即張大軍聲於要害處遥為聲援以解賊勢若所探非實不得張皇八月二十八日九月一日六日甲辰詔旬試諸軍以㸃出指揮若七日值雨雪沾濕聼於九日依格閲試若至日尚未可試即令軍頭司次旬取㫖餘旬凖此先是元豐八年八月十五日得㫖若閲試值雨雪許軍頭司於次旬施行故别為條約新無太子少傅致仕韓維乞再免南郊陪位從之刑部言欲常法地分窩藏强盗不該配逺惡沙門島者許人告依重法地分窩藏人給賞錢及財産之半其依上條許捕者亦凖此支給從之新無丙午岳州言左朝奉郎前通判潭州黄誥廬父墓三年生芝草甚衆詔黄誥令本州支賜絹伍拾疋與堂除合入差遣一次其後以誥知歙州刑部言夜聚曉散傳習妖教者欲令州縣以斷罪告賞全條於要㑹處曉示監司毎季舉行從之舊本太繁今從新本丁未宗正司言玉牒宗藩慶系録仙源積慶圖内宗室子有未及立名而卒者亦皆開列以其無可稱呼故但曰不及名縁宗支蕃衍圖牒巻帙漸已浩大既不及名即無官爵事迹可考又其生出先後之序已各載於屬籍類譜復列圖牒頗見冗長宜於玉牒宗藩慶系録内凡不及名者止於其父名下總計其數注入仙源積慶圖更不開具所有宗室女早卒者玉牒亦依不及名例止注其數從之禮部侍郎曽肇言臣伏覩詔書冬至日南郊宜設皇地祇位以嚴並貺之報此盖皇帝陛下急於親祭地祇不待考正典禮遽下此詔然臣竊詳詔㫖亦云合祭不應古義今則設皇地祇位於南郊乃是復行合祭之禮即以為非又自行之一詔之中前後違戾詔書又云厥後躬行方澤之祀則修元豐六年五月之制是則異時北郊禮行合祭復罷天地大祀國家重事而輕易變更頗類兒戲廢置神位幾於奕碁此臣所以聞詔愕然不知所措也臣伏思陛下之意無他以謂王者父天母地尊親並行即位以來親見上帝而未及地祇乖明察之義又為議者所惑以謂五月祭地必不可行則是長闕事地之禮故因南郊并舉地祭欲以致誠敬於大祇爾以臣所見欲以致誠反近於怠欲以致敬反近於凟何則南郊非祭地之處冬至非見地之時樂以圜鍾為均其變以六非致地祇之音燔柴升煙非祭地之禮不問神之享與不享姑欲便於人事不近于怠乎今之人家有尊長所居異宫子弟致敬必即其處尚不敢屈致一堂况天子事地可不如家人之禮哉前日以合祭為非而罷之今日復行異日復罷謂神無象廢置自由不近於凟乎陛下志在誠敬而所行反近於怠且凟此無他為陛下謀者以古為迂率意改作務從茍且趣便一時故也臣愚不逹時變竊為陛下痛惜之陛下即位八年兩行明堂大享之禮今兹有事南郊凡屬天神舉皆從祀次第行之則將來郊祀之嵗親祠北郊并及地理神固未為晩何苦遽為此舉以渉非禮之議哉况五月祭地前世之所嘗行本朝開寳中亦曽四月行雩祀之禮古人尚以六月出師孰謂夏至有不可行禮者哉臣愚伏望陛下速降徳音收還前詔今冬南郊禮畢即令有司詳定親祠北郊儀物仍令斟酌時宜省去繁文末節以從簡便俟至郊祀之嵗斷在必行如此則於承事神祇不失誠敬先帝已正禮文不至無名改作使萬世之後以謂復行先王祭地之禮自陛下始不亦善乎臣䝉恩擢備從官職在典禮朝廷舉措得失臣與其責故自聞詔以來彷徨累日言之則為逆㫖不言則為失職熟慮再三寜以逆㫖獲罪不敢失職以負陛下任使也是以罄竭狂愚觸犯忌諱庶幾萬一有補聖明臣雖受重誅所不敢避唯陛下留神省察不勝幸甚貼黄伏見詔書擇日差官奏告敢望聖明因臣此奏更詔大臣熟加講議務求至當以協典禮所有差官奏告且乞未賜施行肇集自注云第二状九月二十四日合祭詔下時在私忌假二十五日講終尚書有宴次日再具奏草九月二十七日入巳酉蘭州鎮戎軍永興軍言地震曽肇又言謹按周禮稱昊天上帝稱上帝稱五帝文各不同昊天上帝則一帝而已五帝則五方之帝理自明白不待辨而知唯上帝之稱世或專以為昊天上帝或專以為五帝然以周禮考之肆師之職類造上帝封于大神按周禮凡稱大神皆謂天也以上帝為天則不應復云封于大神矣又典瑞四圭有邸以祀天旅上帝兩圭有邸以祀地旅望先儒以謂四望非地則上帝非天斷可識矣而孝經亦曰郊祀后稷以配天宗祀文王於明堂以配上帝正與祀天旅上帝之文相合盖郊明堂異祭后稷文王異配則天與上帝亦宜有異以此推之謂上帝專為昊天上帝者非也又掌次王大旅上帝則張氊案祀五帝則張大次小次上帝五帝所張不同則謂上帝專為五帝者亦非也然則上帝果何謂歟按書稱類于上帝孔安國傳以謂告天及五帝孔頴逹從而釋之曰昊天五帝上帝可以兼之繇是推之所謂上帝者盖兼昊天五帝言之西漢已有是説矣故安國用此以解經文至鄭康成引䜟緯之書傳㑹以為六天乃謂昊天上帝為北辰之星五帝為太微宫中五帝座星此則康成以䜟解經之罪非先儒之説本然也然則不曰昊天五帝而曰上帝何哉盖言昊天上帝則不及五帝言五帝則昊天不與舉上帝則昊天五帝皆在其中以昊天及五帝皆有帝之稱故也按周禮王祀昊天上帝則服大裘而冕祀五帝亦如之盖先王尊事五帝與昊天同服冡宰掌祀五帝與祀大神祇之禮同則明堂并祀昊天五帝不為過也秦祀白青黄赤四帝揚雄以為僣祭天之禮漢武帝祀泰一五帝於明堂奉髙皇帝坐配之盖天神貴者曰泰一其佐曰五帝雖出於方士之言然所指泰一即昊天也故武帝皆祀於明堂以髙帝配食則明堂并祀昊天五帝於此可見歴代明堂或并祀昊天五帝或止祀五帝其去五帝坐專祀昊天上帝者唯晉太始唐顯慶中爾本朝皇祐中大享明堂参用南郊䄍祀之禮嘉祐七年禮官始議改正設昊天上帝位以真宗配次設五方帝位次又設五人帝位以五官神從祀自是遵行遂為故事至元豐中始詔祀英宗於明堂惟以配上帝而五帝不與論者以為未安詔臣等集議臣等稽之經典既如彼迹之故事又如此伏請自今宗祀神考於明堂以配昊天上帝并祀五方五人帝五官神以稱嚴父之孝以成大享之義此議因二月十八日詔乃上方下詔時肇猶未入朝六月十入日乃除禮侍顧臨等議社稷宫架亦縁三月十八日孫諤奏請至八年三月八日乃上但不知肇此議從違何如當考據肇集自注九月二十七日上此議今附月末
