body:
  text: 續資治通鑑長編巻二百八十三宋李燾撰神宗熙寧十年六月己夘朔詔典言李氏追封華原郡夫人以上批李氏入宫七十餘年給事章懿太后洎仁宗皇帝襁褓供奉之勤著聞宫掖故也寳文閣待制檢正中書五房公事李承之言鄜延路累年災傷今年夏税乞許隨秋料及來年秋料分納從之遣入内供奉官楊日新楊安民自京至邕州津遣安南行營疾故士卒歸住營處其陜西河東應募人遣上京詔交阯偽左郎將阮根免死補下班殿侍從招討司奏也上批安南行營勾當公事李舜舉走馬承受劉惟簡韓永式可並與轉兩官見寄資者仍寄資辛巳詔左班殿直權宿亳州都廵檢安寧濠州鍾離縣廵檢武天祐右侍禁定逺縣廵檢王守忠各轉一資蘄縣尉黄約循三資保正戴權與下班殿侍本路指使以淮南東路轉運副使寋周輔言蘄縣桐墟鎮軍賊王海殺廵檢劉震寧約率兵迹逐天祐與賊鬭斬十一級溺死者甚衆權齎糧率衆至滁河北岸為援故并賞之壬午注輦國貢方物其使以金蓮花盛真珠龍腦登陛跪望御座而散之謂之撒殿上遣内侍勞問之林希野史云他國進奉未有陞殿者附注當考詳詔知誠州楊光僣子右侍禁楊昌逵等六人各轉一資長孫楊晟照為下班殿侍湖南轉運副使朱初平言光僣死請推恩也詔向經子宗囬為禮賔使榮州刺史宗良為禮賔使英州刺史癸未詔莊宅副使權秦鳯路第一副將髙遵一提舉福建路招捉賊盜捕盜官並聽遵一指揮及遣左侍禁閤門祗候彭保於陳留縣選募馬歩軍三百人以徃又遣王中正選募馬歩軍二百令陳濟方陳從周部送彭保五月二十二日已遣彭孫今又遣彭保舊紀癸未日書遣官提舉福建路捕盜詔南京鄆兖曹徐齊濮濟單沂澶博棣亳壽濠泗宿州淮陽軍開封府之東明考城長垣白馬胙城韋城邢州之鉅鹿洺州之鷄澤平恩肥鄉縣盜賊並用重法詔宗室大將軍以下有通一經兼論語孟子者二年一許投狀乞試丙戌閱安南囘軍上以管押使臣曲珍張世矩王愍三人効力甚勤而其馬皆斃各特揀賜良馬二及金帶愍求衣甲又賜之降右諫議大夫吕公孺知蔡州以前知真定府失入死罪也本𫝊以為鄆州失入時政記三月二十六日前知鄆州吕公孺令於澶州聽㫖公孺以御史中丞鄧潤甫言其不材替罷又詔刑部疏駁知真定府日失入死罪見行取勘故也十月三日知永興通判邕州殿中丞蘇子元令持服廣東轉運司言其任性用刑故也丁亥徙權淮南東路轉運副使寋周輔權福建路轉運使候賊平依舊尋詔周輔乗驛兼程赴任應縁捕殺廖恩事禀朝㫖不及者一面施行捕盜官有逗漏不進情渉怯懼者以軍法從事仍與提㸃刑獄徐總商議此十九日事今并書四月九日總除憲又詔髙遵一徐總寋周輔如在一處應干捕賊事並同商議若在軍前捕盜並聽遵一指揮此七月九日事今并書詔武學教授𫝊授以四員為額辛夘以太常丞直集賢院侍御史知雜事蔡確為右正言直院知雜事如故莊宅副使知欽州劉初兼閤門通事舎人權知邕州二月丙午石鑑知邕州初代鑑也定州路安撫司言凖詔相度安肅軍合留南闗城其樓櫓令漸修完仍乞復置監押一員從之壬辰秦鳯熙河路計議措置邊事司言山西得功蕃官皇城使康州刺史包順忠白向漢衆所推服昨日岷南出兵兼旬深入竭數㸃集差次功狀不在行營將副之下今所推賞未厭衆論及内藏庫副使趙紹忠供備庫使包誠皆戮力効死亦望别議賞典詔順領榮州團練使又與一子轉資誠為文思使紹忠為崇儀使合州防禦使趙思忠卒贈鎮洮軍留後官給塟事許以牌印從塟録其子左侍禁懐義為内殿承制右侍禁秉義為内殿崇班以鎮南軍節度使同平章事判江寧府王安石為集禧觀使居金陵從其請也始安石罷政除江寧懇辭使相請宫觀上遣梁從政齎詔敦諭須其視事乃還從政留金陵累月安石請不已至是許以使相領宫使宋朝類苑王荆公初罷相以吏部尚書觀文殿學士知金陵薦吕恵卿為参政而去既而恵卿得君怙權慮荆公復進因郊禮薦荆公為節度使平章事方進熟上察見其情遽問曰王安石去不以罪何故用赦復官吕無以對明年復召荆公秉政而王吕益相失矣權判都水監程師孟減磨勘一年監丞耿琬三年管勾官霍翔與有官親屬一名指射差遣餘推恩有差以師孟等引河水淤京東西沿汴田九千餘頃也去年八月二十七日師孟琬建請同修起居注黄履言上殿臣僚乞令於當日或次日録聖語封報起居院從之秦鳯熙河路計議措置邊事司言昨討山後生羌五軍諸軍并弓箭手將校兵級等獲首級及輕重傷人乞加賞賚詔毎級轉一資至三級止仍賜絹二十匹輕重傷轉資賜絹有差甲午允州蠻舒光勇為三班奉職安州監當以知沅州謝麟言光勇先納土而逃今詣州自陳乞依南江溪峒例補授故也詔修青州城建樓櫓南岸置釣橋從轉運使王居卿請也詔茂州監押賈辨遷一資子宗範為三班奉職以王中正言宗範與土人孟仁富捕獲恭州將張仁貴皆辨之謀畫宗範親捕得故賞之乙未以羽林軍大將軍仲恕為燕國公仲恕宗保嫡長子當襲封奉祀事也詔交阯近克伏應縁安南軍興權宜指揮並如故有當且從權者具因依以聞賜工部郎中集賢院修撰提舉靈仙觀呉申家絹二百匹申卒於廬山王韶以為言常賻外特有是賜又令擇近親可托者視其家事丙申録内殿崇班劉滬孫全夀為三班借差以涇原路經略使蔡延慶言滬慶厯中有勞於邊邊人至今奉祠保其家如滬猶在而全夀乃為白丁非所以勸也故有是命知制誥孫洙言熙寧四年中建言者患制誥過為溢美以為磨勘遷官非有績效不當専為訓詞又謂典誥之臣皆有兼官殫費文辭慮妨其他職事遂著令磨勘皆為一定之辭文臣待制武臣閤門使以上方特命草制其餘悉用四句定辭遂至羣臣雖前後遷官各異而同是一辭典誥者雖列著名氏各殊而共用一制一門之内除官者或數人文武雖别而并為一體至於致仕贈官薦舉叙復宗室賜名宗婦封邑齋文疏語之類雖名體散殊而格以一律嵗嵗遵用雖曰茍趨簡易然而示陋非所以訓百官詔後世也前世典章本朝故事未嘗有此陛下天縱神聖言成典謨博鑒古今循責名實毎聞天語訓敕臣下手扎宣示二府皆言有法義曲盡事情天下傳誦史官紀述而典誥之臣乃茍簡如此豈稱明詔所以垂立一代制度之意哉伏望皆令隨事撰述但不得過為溢美以失事實詔舎人院撰詞少卿監以下奏薦叙封毎遇大禮一易恩澤舉人毎科場一易封宗室婦女逐時草制文武轉官致仕并選人改京朝官知縣並隨等撰定其後舎人院又請百官封贈嘗任待制觀察使以上其子封贈並隨事别撰從之丁酉手詔今嵗嶺外大熱病瘴者多方屯兵未解官吏將校在彼者衆深慮難於醫藥枉致死傷醫官院選差醫學三人賜絹五十匹遣赴桂州委趙卨分擘差使候及一年差替經略司具所愈人數保明聞奏己亥詔應廢監係省錢諸路提刑司府界提㸃司並封樁中書拘轄辛丑樞宻院言聞邕州欽州峒丁其人頗驍勇但訓練不至激勸無術欲委經略司選舉才武廉幹之人為都司廵檢等提舉訓練毎季分徃案閲逐峒嵗終具武藝精强人數首領等第給俸提舉官以武藝精强五分以上議酬奬仍令五人附近者結一保五保相附近者結一隊毎案閲保隊各相依附至於戰鬭互相救助勇怯分為三等有戰功或武藝出衆為上等免差役人才趫㨗為中等免科配餘為下等常日不妨農作習學武藝遇提舉官案閲即聚一村按試毋得豫集邊境有盜賊令首領相關報從之壬寅賜天章閣待制韓縝四方館使榮州刺史李評衣帶及銀絹各百五十縝仍許服金帶以分畫河東地界之勞也其凖備差使供備庫副使燕復等各減磨勘年有差燕復本末當檢蘇轍奏議宻院時政記云縝服金帶依知制誥待制權發遣三司例七月十七日復除減年三司言鑄大錢欲乞且依舊額今後如有添鑄乞除陜西河北河東外諸路並鑄小錢又言河北西路轉運司請於邢磁州置監鼓鑄折二鐵錢十萬貫今相度欲於永興軍路鑄折二鐵錢十萬貫却於河北西路添鑄大銅錢並從之本志於並鑄小錢下又云民錢濫惡公私患之乃令以惡錢輸官者毁棄之葢元豐元年十月二十五日事沈括自誌云河北轉運司議鑄鐵錢嵗二十萬緡以助經費括以為不可異時河東嘗鑄鐵錢民干禁致死者嵗以千計而姦錢益出百姓失業貨易不售而鐵幣竟罷今河北磁邢之地鐵與土半民冒利忍死以謾法殆不足勝也陜西舊行鐵錢民久安習今河北要錢二十萬緡獨可罷陜西銅錢二十萬緡改鑄於河北之淇水監西益為鐵錢二十萬緡以補陜西之入則河北所欲無待改法而濟也上嘗問公私錢幣皆虛錢之所以耗者其咎安在括對曰錢之所以耗者八而其不可救者兩事而已其可救者五無足患者一今天下生齒嵗蕃公私之用日蔓以日蔓之費奉嵗蕃之民錢幣不足此無足怪又水火淪敗刓缺者莫知其㡬何此不可救者二也銅禁既開銷錢以為噐者利至于十倍則錢之在者㡬何其不為噐也臣以謂銅不禁錢且盡不獨耗而已異日富家備冦攘水火之敗惟蓄鹽鈔而以藏鏹為不利鈔之在民以千萬計今鈔法數易民不堅信不得已而售鈔者朝得則夕貿之故鈔不留而錢益不出臣以謂鈔法不可不堅使民不疑於鈔則鈔可以為幣而錢不待益而自輕矣古為幣之物金銀珠玉龜貝皆是也而不専賴於錢今通貴於天下者金銀獨以為噐而不為幣民貧而為噐者寡故價為之日輕今若使應輸錢者輸金髙其估而受之至其出也亦如之則為幣之路益廣而錢之利稍分矣錢利於流借十室之邑有錢十萬而聚于一人之家雖百嵗故十萬也貿而遷之使人饗十萬之利遍于十室則利百萬矣遷而不已錢不可勝計今至小之邑常平之蓄不減萬緡使流轉於天下何患錢之不多也外國皆仰中國之銅幣嵗䦨出塞外者不貲議者欲𣙜河北之鹽鹽重則外鹽日至而中國之錢日北京師百官之饔餼他日取牛羊于私市者惟以百貨易之近嵗以疥疾乾沒之為蠧一切募民入餼牽于京師雖革芻牧之勞而牛羊之來於外國皆私易以中國之實錢如此之比洩中國之錢於北者嵗不知其㡬何此皆作法以驅之私易如此者首當禁也此可以救者五也河湟之間孤絶一隅嵗運中都之幣以實塞下者無慮嵗數十萬緡而洮岷間冶鐵為幣者又四十萬緡嵗積于三州之境物出於三州者有窮異時粟斗百錢今則四五倍矣此錢多之為禍也若不以術洩之數十嵗之後芻粟何止率鍾而致石今莫若洩之羌中聽其私易貫率征錢數十嵗得已數萬緡以吾之滯積而得戰馬餼羊有用之物嵗入之芻粟遂減數倍之價一術而數利中都嵗送之錢但以劵鈔當之不徒省山運之勞而外之所洩無過岷山之鐵耳此不足為害者一也癸夘以殿中丞薛昌朝為檢詳樞宻院兵房文字前安南道經略招討司言李舜舉燕達等保明隨軍至富良江有功使臣軍兵凡百四十四人内麟州飛騎十將白保獲太子洪真廣勇長行鄧忠禽左郎將阮根詔白保與左班殿直鄧忠轉三資三班借職蔡説以下轉資賜絹有差後飛騎十將薛徳經逹自陳攻决里隘獲洪真首賣與保保坐决杖降廂軍長行授徳三班奉職甲申録左侍禁柴演子植青閏並為借職以計議邊事司言演因戰重傷而死也乙巳詔廣西經略司分畫邕順兩州溪峒𨽻兩安撫都監司是月思州武城縣大風壊縣廨知縣李愈妻姚氏主簿冦宗奭妻之母楊氏以壓死賜愈宗奭絹五十匹置岷州鐵城堡實録有此又見元豐元年八月末今但存此秋七月辛亥詔以十一月甲戌有事于南郊詔諸路保明將官並具功罪及其能否訓練精觕以聞詔權發遣羣牧判官公事太常丞王欽臣徃秦州鳯翔府以來應接買馬以羣牧行司為名上批范子淵見疏濬汴河可差入内供奉官馮宗道徃彼監視此據御集記聞蔡確劾濬河事所逮證左二百餘人獄久不决上頗疑焉初命宗道自用杷試之汴水宗道辭以疾上令俟疾愈必徃試宗道乃請與子淵俱故有監視之命壬子上批已立賞購捕廖恩及遣募士討除可更降敕榜付劉定相度事勢招降庶一方生聚早遂安處中書擬敕榜廖恩本南劒州大姓昨因呉笋冦略與族人承禹等同力討除本路奏功不實以至恩賞不均今乃嘯聚徒衆敢行剽刼屠害官兵已令本路進兵及選差兵官前去翦除况恩等本是平民有勞未奬陷於大戮宜開一面使得自新上批草竊偷生小賊恐不煩朝廷如此委曲洗雪𫝊布四方必啟姦民窺易之心於體未便可檢㑹自來招安盜賊榜依倣指揮乃告劉定候到相度如山林深嶮未能翦除即於要路出榜及選募人齎敕招諭許率領同火伍所在歸首或徒中自相殺併及禽捕送官除放罪外優與等第安排詔宗室換授外官遭䘮解官行服者全給前官請俸詔提舉成都府等路茶場都官郎中劉佐知彭州屯田員外郎吕陶並衝替令轉運司劾罪佐坐買茶措置乖方陶不即聽受堋口茶園戸訟也五月二十一日可考癸丑新管勾廣南西路常平等事寋序辰改京西北路序辰周輔子也周輔言序辰䝉召對委使一道義當必行然臣父子並祗命逺方家無所託乞改一近地故有是命按宋史序辰以泗州推官主管江西常平周輔上言乃易京西西上閤門副使知沅州謝麟為東上閤門副使再任降敕奬諭賜銀絹二百以湖北轉運司言麟招納有勞故也中書言開封府界諸路今秋豐稔欲遣官提舉折納民户欠負虞部員外郎楊景芳淮南西路太子右賛善大夫曽孝綽兩浙路山南東道節度推官李孝博永興秦鳯等路澶州司户参軍黄好信河北東西路三司言江淮等路災傷發運司未運上供糧三百五十餘萬石欲下本司相度如計置不行權許折變見錢毋過百萬石限本年十月以前至京省司收糴以備軍儲並從之甲寅分命輔臣祈晴國子博士李稷提舉成都府等路茶場熈河路市易事代劉佐也三司言江淮東西荆湖南北路兩浙各乞别立限般上供年額斛㪷今年欲令淮南東西兩路第一限十二月第二限二月第三限四月止令在本路州軍封樁外江東第一限十二月第二限三月第三限五月江西荆湖南北兩浙第一限二月第二限四月第三限六月從之詔今後廣南西路係惡弱水土州郡合差醫官處如額外祗候人願徃者聽乙夘命宰臣呉充為南郊大禮使權御史中丞鄧潤甫為儀仗使判兵部許將為鹵簿使判太常寺陳襄為禮儀使權知開封府孫固為橋道頓遞使著作佐郎崇文院校書張載兼知太常禮院載議禮於有司不合亟罷歸載亟罷歸以載事増入上謂輔臣曰元昊昔僣號遣使上表稱臣其辭猶遜朝廷不先詰其所以然而遽絶之縱邊民蕃部討之故元昊常自謂為諸羌所立不得辭請於朝廷不得已而反西師戰輒敗天下騷然仁宗悔之當元昊僣書來獨諫官呉育謂夷狄難以中國叛臣處之或可稍易以名號議者皆以為不然卒困中原而使加嵗賜封册為夏國主良可惜哉丙辰以太子中允黄廉為監察御史裏行詔中書樞宻院檢正檢詳并習學官並不許奏舉臺官以御史中丞鄧潤甫薦亷與權檢正中書户房公事畢仲衍才任御史故因命廉而下此詔詔南郊青城寢殿後至寳華門御道不得用花塼鋪砌以上於青城凡㳺觀之具悉已裁罷至此閱有司計功數多故又罷之丁巳工部員外郎寳文閣待制檢正中書五房公事李承之權發遣三司使翰林學士起居舎人權三司使沈括守本官為集賢院學士知宣州先是侍御史知雜事蔡確言括以白劄子詣呉充陳説免役事謂可變法令輕役依舊輪差括為侍從近臣既見朝廷法令有所未便不明上章疏而但於執政處隂獻其説兼括累奉使察訪職在措置役法是時但欲裁減下户錢未嘗言復差徭今非其職而遽請變法前後反覆不同朝廷新政䂓畫巨細括莫不預其於役法講之固熟如輕役之不用差法括前日不以為非而今日不以為是者其意固不難曉葢自王安石罷相括恐大臣於法令有所改易故潜納此説以窺伺其意為附納之資爾括自選人不數年間㧞擢至此宜如何圖報而乃頗僻飜覆挾私害政甚非陛下待括之意也且括自主計以來一無所補其馭下則取悦而已其事上則觀望而已中外之所共𫝊聖明之所盡照而隂以異論干執政欲變更役法一事尤為顯著竊聞中書亦嘗以此劄子進呈下司農寺相度天慈兼容既不加詰而臣以彈邪繩姦為職安敢避黙伏望陛下推括之情特行罷黜詔劄與括知括言臣自惟超冒時久無一補稱釁累日深臣僚所言皆中臣罪豈可復當事要臣見在所居待罪有詔令括就職確又言近彈奏括罪狀未䝉施行或聞括詭求罷免有詔却令供職儻如所聞朝廷待括如此臣竊惑焉且括謂役法可變何不言之於檢正察訪之日而言之非職事之時不言之於陛下而隂言之於執政括之意豈在朝廷法度但欲依附大臣巧為身謀而已伏望陛下去邪屏姦斷在不疑正括之罪故有是命去年十一月二十六日括論兩浙役法當考沈括自誌云公嘗請事于相府是時正肅呉公充當政問翁免役之令民之詆訾者今未衰也是果於民何如翁應之曰以為不便者無過士大夫與邑居之民習於復除者驟使之如邦人其詆訾無足恤也惟㣲户素無力徭今使之嵗出金此所當念也括嘗奏議兩浙嵗入可減五萬緡而弛㣲户二十八萬餘家使天下悉如此㣲户盡除其輸雖小徭不足為病也公以為然而表行之御史乃詆翁始但議減課今乃隂易其説使悉除之首鼠乗刺隂害司農法翁坐謫集賢院學士知宣州事御史葢未嘗思以一路言之為減者以戸言之葢除也今附見當考元豐元年八月十一日云云上批廖恩累敗官軍徒黨已熾若不及時措置深慮愈致交結脇附人衆養成巨患為朝廷重憂昨彭保雖召募歩騎五百餘人前去酌今賊勢猶恐不足應用中書樞宻院宜同議經畫仍益募人續發庶凶徒翦滅一方生靈免被塗炭遂遣昭宣使嘉州團練使入内副都知王中正都大提舉福建路招捉賊盜公事選募兵三千及當用大小使臣具名以聞應兵官及捕盜官等並聽中正指揮又詔凡劄下劉定事並令中正處置庶軍事有所總一人情不至矛盾軍中但拊循士卒修利械噐蒐簡病弱不任戰者以厚賞募人為間并分將官守要害無令賊徒犇軼秋熱師徒在野宜檢視醫藥飲食全養士氣以須中正之至五月二十二日已遣彭孫六月五日又遣彭保今又遣中正八月五日召中正赴闕劉定先為福建體量安撫八月癸未被責詔諸路嵗上知縣縣令考課優等治狀委主判官審校取最優者上簿司農寺主簿及提舉常平官有闕選最優者充即治狀尤異或資任已髙須别加陞擢者以聞舊紀云詔縣令嵗課令吏部審校最優者注籍可陞擢者具以名聞新紀云令諸路嵗上縣令課委判鈐轄審校籍其最優者陞擢之詔河北河東陜西五路常平免役坊場剰錢毋得起發上京及應副别路惟留本路以備邊賞詔河東陜西河北西路民因災傷典賣田産者許依元價隨年限出息收贖如過五年并買時不虧價者不用此令己未韓縝等奏刪定清野備冦預行條件宻院同中書奉㫖令五路經略安撫使看詳有無未盡未便及添改事件令機宜官書寫聞奏不得下司宻記十一日事辛酉羣臣拜表上尊號曰奉元憲古文武仁孝詔荅不允表五上終不允提舉靈仙觀駕部郎中李直躬為衛尉少卿直躬以老疾請宫觀於審官格不當磨勘宰臣呉充言直躬素有風力雖老不衰累歴職司所至稱治天資恬退乞與閒局故有是命朱史簽貼時政記載直躬甞自請磨勘改官無足書新本亦削去福建路提㸃刑獄司言本路都監沈披申凖牒捕殺廖恩縁披前任國子監博士換禮賔使未諳軍政恐悞任使詔披先衝替劾罪以聞壬戌上批建昌軍南豐縣尉黄克俊自廖恩為冦上誅賊䇿畫者甚衆然未有如克俊知賊發端之詳及措置方略之善宜召來審問若實出已謀可令隨王中正管勾文字於是中書召克俊問狀乃遣之賜中書公用錢五百緡手詔皇伯祖保大軍節度使承選攝太尉孟秋薦饗太廟承選年髙難於拜起可特免差攝甲子寳文閣待制權發遣三司使李承之兼詳定編修三司令式乙丑河大决於澶州曹村下埽二十八日河南徙樞宻副都承㫖張誠一上刪定義勇保甲制敕五巻總例一巻樞宻院奏知忻州蕭士元持服秘書丞吕大忠昨按視河東地界内有不於圖子上貼畵出所指地名及分水嶺去處未當事理詔蕭士元吕大忠累經赦恩並特放罪河東分畫地界所燕復等檢踏天池西南無横嶺地名後再檢視有故寨嶺亦名横嶺詔復等所得減年磨勘内各除一年宻記七月十七日事六月二十四日可考己巳分命輔臣祈晴于郊廟社稷庚午西上閤門副使知代州劉舜卿為客省使知太原府韓絳言舜卿八年不磨勘故也廣西轉運司言探得交阯兵甲見在机榔縣外等事詔机榔縣既為交賊襲據未見本路合作何措置及决里順州久逺可與不可固守如何即不損國威及經久兵力財費得免勞之委趙卨李平一苗時中同共審計確的利害不得依違顧避致誤朝廷一方大事候議定仍親書入急遞聞奏辛未以權知荆南屯田郎中張頡直集賢院為廣南西路轉運使蘇轍元祐初彈頡疏云訪聞頡昔知荆南所為貪虐提舉官張琬按發七事内一事頡下行買烏頭行人蔣三供緑烏頭頡凡三四次退換蔣三揣頡意要附子遂買附子作烏頭供納頡方肯納下緑烏頭附子色額不同價例亦别此一事係贓罪又一事勒部下玉泉寺僧修治諸官園亭費用常住人牛錢物不少以修唐齊已草堂為名令頡鄉僧居止其中此一事係私罪琬奏既上前宰相王珪等為與頡私有情分遂移頡差遣而以越職勘琬特行衝替頡當時若無上件贓私忝為士人理須訐雪頡曽不敢以一字自明受移而去則其罪狀顯然無疑張琬衝替在元豐元年正月戊辰太常丞集賢校理知湖州鞠真卿為太常博士直秘閣以宣徽北院使王拱辰權御史中丞鄧潤甫言真卿自改官至登朝三十年非特恩未嘗陳請磨勘故也上御資政殿監修國史呉充率修國史宋敏求編修官王存黄履林希以仁宗英宗紀草進呈上服靴袍内侍進案敏求進讀上立聽顧問終篇始坐壬申太常丞集賢校理權判都水監俞充為直史館檢正中書五房公事初茂州羌叛既請盟充故稽留以待王中正又撓使有言乃加討擊用為中正功與中正深相結至使妻出拜之中正還因力薦充可用尋自成都召入權判都水監未㡬復有此命充使妻拜中正據曽肇銘彭汝礪墓彭汝礪章附九月十八日并十月三日至十二月五日充罷黄亷云云附八月九日舒州團練推官權流内銓主簿蔡京為崇文院校書中書禮房習學公事九年七月八日為銓部詔提㸃浙江等路鑄錢坑冶太常少卿錢昌武罰銅十斤監官侍禁崔坦差替坐改置永平監大鑪鑄錢怯薄也令三司自今諸路鑄錢並依省様毋輒改規摹多求增數委提舉司㸃檢詔三司月具在京所支金銀錢帛總數以聞癸酉詔自今親祠南郊乗舊玉輅還内乗大輦新玉輅更不從行乙亥詔宥州牒稱凌羅指揮者自今並奏聽㫖夏人謂偽樞宻院為凌羅也詔修信州邵武建昌軍城如坊郭户願出夫者聽之以福建盜未獲人情思得保聚故也詔河北霖雨浹日不止頗害秋稼令長吏精禱名山靈祠貶宣徽南院使雄武軍留後郭逵為左衛將軍西京安置吏部員外郎天章閣待制趙卨為左正言直龍圖閣依舊知桂州以御史知雜蔡確言逵經制安南移疾先還卨措置糧草乖方及不即平賊也時政記云以逵始初獨上封章請専經制不能須時進討乗勢蕩平移疾輒便先還卨亦坐措置糧草乖方及不即平賊故有是責今從實録具去年十一月癸酉詔以宜桂等州運夫未足令趙卨析以聞范百禄為趙卨墓誌云初議南征上憂糧運卨奏兵食當相須臣願任責庶大事可辦上大悦遂以卨兼都大提舉糧草至湖南問調發之叙轉運判官唐義問曰軍期不敢緩當一運而足安撫使曾布曰人何以堪請為二畨以紓民力義問曰安撫建此欲某就戮耳卨問廣西糧至者㡬何曰九十萬斛役夫㡬何曰二百七十萬卨計見糧足以辦兵食烏用羨溢以病民謂義問曰役可省矣有如不給僕自任此因奏罷之湖南民得保生戴上之徳而感卨不忘既措置海運燕達等平廣源獲糧萬斛並州之民獻禾供十日糧且負其餘以歸師還太平亷州積錢穀甚夥藤梧羡糧二十餘萬按卨方以措置糧草乖方被責八月一日又責李平一蔡曄周沃等皆縁漕運不辦貶降不知百禄何故云爾今不取河既大决於曹村下埽甲戌澶州言北流繼絶河道南徙又東匯於梁山張澤濼分為二流一合南清河入于淮一合北清河入于海凡灌州縣四十五而濮齊鄆徐尤甚壊官亭民舎數萬田三十萬頃已上據㑹要葢因孫洙靈津廟記但記以絶流為壬申耳本志亦與㑹要同新舊紀於丙子日乃書河决澶州曹村埽十七日大决曹村丙子澶州乞遣官救䕶詔入内都知張茂則權同判都水監劉璯同相度閉塞詔熈河路經略司指使左侍禁張守榮右班殿直張徳三班借職劉吉各降兩官衝替坐不察熟户强遵所總蕃兵叛與果莊兵殺害官軍也詔三司蠲江寧府等州軍民去年秋税之半餘倚閣以江東轉運司言民因疫癘失耕種也福建路捉殺賊盜彭孫言廖恩走信州界有狀乞降詔委孫招降部押赴闕其餘捕盜官案兵守隘毋得争功捕殺如賊徒實首身捕盜文武官等敢殺戮委孫捕繫之士卒即處斬詔河東永興秦鳯等三路就糧諸軍及漢蕃弓箭手蕃兵常經召募赴安南行營有染瘴癘者御藥院以安南軍前治瘴藥方下逐路經略司修合隨病證給賜詔太常禮院續修禮閣新編此據㑹要七月二十七日事實録無之恐㑹要誤姑附月末待考文彦博言臣於今年正月六日奏為據徳州申大河自去年秋夏至今冬河底淤澱通流不快河勢變移不循故道見今四散漫流兩岸俱被水患臣詳黄河下流淤澱疏濬不行泄水不快即上流水勢須至壅遏若不預行經制竊虞將來河水泛漲必為魏博恩澶等州决溢為患自後不聞水監别有擘畫只是固䕶東流北岸今年五六七月聞大名金新堤一帶諸埽非常危急果致澶州决溢備要云此非天災人力不至也臣又檢㑹今年正月八日奏為近年以來河防官吏以減省物料指望酬賞只縁三四年來黄河非常水小埽岸偶無危急是致減得物料即非久逺常制必恐埽岸漸次有失添修若將來河水泛漲如舊必致踈虞伏乞檢㑹舊條不以減省物料指望酬奬今年夏秋水漲諸埽危急多稱物料少數今來曹村埽决溢自熈寧八年九年十年檢計春料合行接貼低怯之處三年之中並不曽應副接貼兼本埽兵士多在别處占使或駕船裝般水利司小麥外見在只有兵士十七人實役致今來以隄身低下怯薄遂致决溢臣前來因論列河事并及水官乞行審擇今河朔京東州縣人民被水患者莫知其數嗷嗷籲天上軫聖念而水官不能自訟猶汲汲以希賞於理何安臣前後所陳出於至誠本圖補報非敢激訐輕有干冒伏望聖慈垂察熈寧十年奏今附七月末河决後河大决乃七月十七日也彦博又言臣於去年冬奏衛州王供埽下開隄取黄河水作運河置閘引水入御河深為不便以為大則决溢小則淤澱尋聞差官定奪利害今來果致黄河水入運河防遏不住决過閘口衝注下流州府縣鎮為患甚大竊慮定奪所未知得今來運河之害乞指揮定奪所下衛州及大名路安撫司取索自七月四日及十四日後來申報决溢一宗文字看詳定奪是月河復溢衛州王供四年十月河溢王供溢懐州黄沁溢衛州汲縣上下埽溢滑州韓村遂大决澶州曹村此據河渠志増入月末實録但於二十八日書曹村埽河决耳然曹村大决乃十七日也韓村於八月四日始書黄沁於八月十四日始書
