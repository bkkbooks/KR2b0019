body:
  text: 續資治通鑑長編卷三百九十五宋李燾撰哲宗元祐二年二月丙戌詔內外官司承傳宣內降或奏請得㫖並即隨事申尚書中書省樞密院覆奏若事小或已得㫖不候覆奏及須索限即日供奉許官司施行訖申尚書省或樞密院月終類聚詣實照據新録無此今從舊録紹聖元年閏四月十八日戊子并六月八日丁丑可考丁亥禮部尚書韓忠彥為樞密直學士知定州據劉摯奏議論韓琦定䇿功有兩篇第一奏無月日第二奏稱去月十六日不知去月指何月也張舜民志王巖叟墓云九月除侍御史論韓琦定䇿功條上十一事第一奏凡九事或墓志以九作十一又摯奏稱臣等則此二奏必與巖叟同上今以墓志為據繫此奏於九月摯十一月即執政不在九月則在十月耳據王巖叟朝論則實在十月先是御史中丞劉摯侍御史王巖叟言臣等聞有功而不見知則無以勸天下之忠有德而不及報則無以勸天下之義忠義息心誰與為國此自古明王賢主所以不敢一日忘此雖微必録雖久必伸以為天下萬世忠義之勸也伏見故贈尚書令忠獻公韓琦當仁祖春秋髙儲嗣未立琦位輔相自任憂責遺身忘家觸嫌疑而犯忌諱請建大本纍年之間其言不可勝紀又嘗挾孔光𫝊進呈面指漢成帝立弟之子定陶王為太子事卒能感動仁祖天心開悟英祖遂自宗藩立為皇子曽未踰年纂紹大統使琦猶豫畏縮如衆人以全軀保妻子末計遲回數月之間安危大䇿蓋未可知此琦之功萬世之功也恭惟仁宗皇帝出潜膺籙乃天之所命以開佑無疆顧人臣何功之有哉而聖人以謂天命必假人以發之故推功臣下然則固當考是非較難易以核其實乃可以示天下信後世也琦與同時在位者殁既久矣乃有貪功徼幸之人出而攘之元豐三年故參知王堯臣子同老上書言其父至和中與三四執政請立皇嗣大議已嘗定矣願發明先臣忠烈書既入朝廷疑之有所詢考卒無明證確論有以信天下者朝廷於是行疑賞於倉猝詔下之日公卿士大夫知當時事者莫不謂朝廷過舉於時史官阿意迎合又請其事書之公論為之憤鬱今者伏遇編修先帝一朝大典及纂述故事以立傳臣等以為不可不明辨直書傳信後世謹疏列九事以考是非按同老繳進家傳之文謂是堯臣議建儲日預撰詔草嘗懷之而進意俟仁祖開允即宣之以定其事今詔草非得於禁省而出於同老則其有無真僞猶未可知借令有之緣堯臣復懷之而退乃是未嘗得請議已格矣詔草雖在何功之有果有已定之㫖則此詔用之矣不應懷而歸也然則至和之間大議未定此可明言者一也按元豐詔書褒諸臣之功曰中外搢紳近臣莫有知者臣等竊觀英祖即位踰年范鎮作富弼遷官制詞云往在至和之中嘗司冢宰之任屢陳計䇿請建國儲逮茲纘承乃出緒論則是當時搢紳近臣非不知弼等有建儲之請而朝廷亦非不報其德矣但不聞大本已有所屬也故弼自為辭官表云臣嘉祐中雖曽泛論建儲之事仁宗尚祕其請其於陛下如在茫昧杳冥之中未見形象安得如韓琦等後來功效之深切著明也弼自言止曽泛議則明是當時所請别無主名又云尚祕其請則是仁祖未有允意至和之間大議未定此可明言者二也今攘功者之言曰至和三年四月已有議定臣等按諌官范鎮其言五月初乞預建儲副以安國本比至十月凡十九疏言皆感切不見聽用於是待罪乞郡又兩移書執政責其不恤國計若四月已有議定則何至使鎮半年間懇懇如此安得不略形已定之意止鎮再三之瀆至和之間大議未定此可眀者三也御史中丞包拯言方今大務惟有根本一事而猶豫不决惟祈聖心開悟斷而行之按拯此疏在嘉祐二年閏十二月則至和之間大議未定可明者四也仁祖末年一日降出諌官司馬光及知江州吕誨請建儲章疏琦屢以光奏進說懇請甚力遂定大計故參知政事歐陽修論光云自仁宗至和服藥之後羣臣便以皇嗣為言五六年間言者雖多而未有定議最後光以諌官極論其事敷陳激切感動主聽仁宗遂决不疑考修此言則至和之間大議未定可明者五也按諫官王陶乞仁宗遣親信中人就第督英宗即赴宗正寺供職其疏有云前日未經傳命時人人上言早建儲嗣今日與一宗正寺差遣人人觀望陛下風㫖不復肯言何哉非前日人忠今日人不忠也蓋前日未有主名泛為公言而陛下不疑也以此考之堯臣之時决未敢有所主名至和之間大議未定可明者六也堯臣輩言因樞府闕官乞召韓琦充樞密使以琦忠義必能當此重事此則不攻自破之語也既云上意已定又曰謂無疑矣固當乘時决䇿成之於手何必引琦使成之夫媢嫉者之情見他人所就尚且奪之况功在其手可成於呼吸俯仰之間而乃肯以屬人乎至和之間大議未定可明者七也琦自入為樞密使即有建儲之議至為宰相曲謝之日首進劄子乞擇宗室為嗣其略曰如陛下已得其人則望宣示中書樞密使使奉而行之以慰中外按琦為宰相去堯臣輩未甚逺儻前日已有定計則因其進言必有宣示何緣尚厯數年請者百計而不聞一言哉至和之間大議未定可明者八也嘉祐末琦請愈切一日仁宗發言曰朕有意多時但未得其人因問琦宗室中誰可琦曰宗室不與外人接臣等何由知其人此在陛下聖擇耳仁宗曰宫中常養二子小者近不慧其大者今三十許嵗矣琦曰其一人既陛下知其不慧更不須論蓋琦之意欲專屬英宗也自此仁祖意有定歐陽修時與琦同對退而書之今其家親筆具在至和之間大議未定可明者九也凡自皇祐至於嘉祐中聞臣子以皇嗣為請者莫知其數不可盡知也如堯臣輩在輔弼之地以此開𨗳亦其宜也但其議紛紛終無敢有所主名而請之者直至嘉祐六年十月琦輩進說於是英宗為子之䇿始定於君臣都俞之間矣臣等載惟人臣之於廟社大計以言之為難乎以成之為難乎以屬人為難乎以己任為難乎人為其易琦為其難廟社之功難忘也同老上私藏之虛文徼天下之實功同時之人又助其攘是可歎也琦挺身危疑援立聖嗣以為宗廟社稷計非以自為計也非以為子孫計也天下知之亦可不知亦可於琦誠心足以貫天地列神明者無所加損而所惜者朝廷信賞可以竒謀取而不中於懲勸之義忠賢勳烈可以單辭奪而輕變於存亡之間使真忠失意於九泉公議乖望於四海至於歐陽修以英偉之才忠諒之莭與琦協心决定大䇿其助最力皆勳效顯著天下共知二人既殁衆從其後攘而有之豈不惜哉伏望聖慈特賜下詔辨正是非褒顯琦及一時同列之功使之明白以慰士大夫之心仍乞以臣等章付實録院照㑹考正以成信史詔之當世而無疑垂之將來而不謬非臣等之幸天下之幸貼黃稱陛下繼明以來如范鎮張述等止是曽於仁宗朝泛泛上章乞建儲二者猶已被旌録獨琦手定大策以成大勳反為攘奪未䝉辨正褒顯此於朝廷闕典之大者時元祐元年十月也摯巖叟又言臣等去月十六日奏事延和殿論韓琦等定䇿以立英宗勳烈顯著近年為人掩奪其功乞賜明辨方懼僣冒俯聽罪誅伏䝉聖慈開納宣示本末不待臣言而自己曉然見是非之正臣等退而感歎因竊思念自至和已後臣子以國本未建為言者蓋不可勝數或泛乞早定儲二或願擇宗室之賢者至於請立誰何有所主名則萬一無敢及之者至嘉祐六年琦與歐陽修輩用司馬光疏日日叩請開𨗳引翼天意感悟大議始有主名而英宗皇子之詔遂下矣言之者雖多而為之者琦也憂之者雖衆而任其責者琦也此四海之所共聞天地祖宗所鑒照而今日莫如太皇太后陛下之所詳知也琦等有社稷之功而不能自保於存殁之際王同老為父貪功上其私室所藏之文引中書同列竊議之語乃云至和已有定議神宗以謂賞疑從豫恩寧過僣於是進官録子所以褒顯之者傾動一時而詔㫖直謂嘉祐立子之詔但宣至和已定之命而已嗟夫大忠元勳移彼而就此失所豫奪矣此公議之所以不服而是非之際不可以不辨也循迹考理皆有證佐臣已列九事具之前疏同老乘琦與同時執政皆亡而慈聖光獻皇后上仙之後謂無有知其事乃出而攘之而不虞太皇太后陛下之知之也臣等區區非為琦修等家橫冀恩澤亦非欲追革同老等賞典但乞降一詔書辨正定䇿大功所在布之天下付之實録院以昭信史以伸公論以慰士大夫之心為萬世忠義之勸伏望早賜指揮貼黃稱前後臣僚乞建儲者雖多然琦等嘉祐未定䇿之日正用諌官司馬光章疏琦等日持其疏懇請於前其功業皆相濟以成之也伏望於今來詔書中明賜别白褒顯以示天下其元豐旌賞之事自無相妨元年十月十八日王巖叟朝論可考也編年云五年二月太師平章軍國重事文彥博山南西道莭度使致仕初彥博既入劉摯等簾前論列謂熙寧間王同老所上文字皆彥博教為之乞改史太皇太后曰吾詳知此事至和中仁宗不豫乞立皇嗣者文太師當相公劉相公王參政功也嘉祐末乞英宗為皇嗣仁宗升遐立英宗者韓相公功也自不相掩不須改史至是摯拜相琦之子忠彥及其客王巖叟秉政彥博立求去按劉摯此時未拜相六年二月乃為右僕射又太皇太后所言不知編年何從得之摯等第二奏云䝉宣示本末不待臣言而自己見是非之正豈即編年所記乎當考王巖叟朝論云元祐元年十月十六日同劉摯對延和摯言臣等有一事欲奏陳此事體甚大巖叟曰緣為今來修神祖實録須要合辨明摯曰太皇太后陛下合記得不知當日英宗立為皇子是至和間已定邪直到嘉祐五年方定耶不知宰相是何人太皇太后曰宫中必知是韓琦已前文彥博富弼時雖曽言只是乞選宗室賢者幾時敢指名巖叟曰既陛下分明知得此是子細不勝幸甚摯又叙王同考上書之由遂表讀進御一章巖叟曰文字頗多願陛下少垂聖聽讀至半又曰大臣言者豈敢指名只是乞選立宗室耳至宫中嘗養二子又曰一人名宗實昭成太子第二子仁宗嘗言道較純厚又言韓琦之功更不說也見說富弼沒膽不敢做神宗只稱文彥博不言有乞建儲之功不謂曽指名也神宗一子與韓琦家做親便為報他功也又云今為修實録須好進取入來摯巖叟皆奏乞陛下宫中子細看巖叟又曰此事若明韓琦雖在九泉無所恨此已附見元年十月十八日又别注于此及忠彥出守亦自言曰臣竊見元豐三年故參知政事王堯臣之子同老上書述其父與至和執政大臣請立英宗為皇子又繳其父所為詔草神宗始亦疑之遂有所質問而當時大臣乃傅㑹同老之說以實其事遽下詔褒賞數人者且曰乃知援立之功厥有攸在嘉祐之詔但宣之耳時章惇為御製詩序云至和之末議既定矣而史臣又乞降其事紀於正史由此是非雜揉寖失本源儻承誤書於實録何以追改臣竊聞同老所奏多引當時竊議之語及於上前不敢明有主名故後來富弼因轉官謝表亦自謂止曽泛議建儲則今所請立英宗為嗣者妄也堯臣所撰詔草既未嘗進呈即是不曽得㫖今云議定者亦妄也臣不敢逺引事證謹以素所聞於先臣者陳其大略仁宗在位久皇嗣未立中外臣僚言雖衆而所上章疏多不降出及富弼丁憂先臣進位首相曲謝日即親書劄子面請其略云如陛下已得其人則望宣示中書樞密院使奉而行之以慰中外既未得請相繼論列凡十一次仁宗尚未開納先臣聞司馬光為并州通判嘗有立嗣之奏遂進光為諌官光果伸前請先臣既得光奏即以上陳又一日自懷孔光𫝊於上前大議於此始定若謂至和之間已得意㫖何不遂行堯臣所草之詔豈有數年之後中外交章輔臣力請始有許可之意况仁宗初諭二人實猶未决若非君臣一心以主大議則事固未可知也前所謂至和已定之說欺罔可見自後英宗立為皇子及踐阼之始服藥日久光獻垂簾聽政當是時憂危萬端公議頗有知者臣更不敢具述不意身薨四五年後同時執政多以殂謝慈聖太后亦已登仙因一故臣之子妄意恩賞言無考驗遂使朝廷謂援立之功在於至和之臣嘉祐之詔但宣至和之議如此則先臣奉行前人已成之事何勞之有輒當前人之異恩賞亦無名臣等諸孤以父勳書之行狀上於朝廷勒於金石乃為欺罔使先臣九泉之下豈得遑安神宗晚年臣屢因奏事親聞德音每念先臣之勞嘗有感歎之語而前日褒功之詔事已施行雖聖心追悔顧無及已今日修先朝大典茍於此時又不能辨正其事則方冊之上前後異同後世何所取信伏維太皇太后陛下輔翼英宗入自宗藩始末事實皆聖明親所聞見如䝉聖慈以臣言為不妄乞即付之實録院特𠡠史臣正此差誤則仁宗與子之意明嘉祐定䇿之議正昭示萬世可謂信史臣今所言非為已也忝在近列非徼恩也直以謂援立之事歸在至和則先臣有冒功之恥以故悲憤不忍不言於是內批至和嘉祐中雖或有奏立皇嗣者豈若琦議之確以至終成大事琦功莫比宜詳所奏録實編修時元祐二年三月也韓忠彥此疏神宗實録墨本奏於元豐三年閏九月二十六日朱本削去今掇取附忠彥出守定州時實録云時元祐二年三月也按忠彥以二月四日除定州當即上此疏三月乃批出耳樞密院言元豐八年四月八日詔後殿軍頭司合引見樞密院應自來合豫行事悉如故事應呈試事藝人申樞密院令承㫖司與軍馬司按試若從軍馬司選試人即委不干礙軍馬司如並干礙即委軍頭司同試以聞應不呈試事藝人即樞密院審驗關所屬應見謝軍及還過軍並門見門謝及其應賜物軍頭司關申如令式應引見人有自陳軍頭司狀申樞密院詔見謝軍還過軍如詔㫖餘俟從吉日如故內鈞容直謝依候今秋取㫖新削此元豐八年四月辛未有此指揮今不須全載或削去又言夏國嗣子乾順降詔封册為夏國主按慶厯八年封册諒祚熙寧二年封册秉常皆不曽更賜印詔如故事詔左司諫朱光庭乘傳詣河北路與監司一員遍視災荒按纍降指揮措置賑濟有未盡未便事並得從宜事體稍重即奏禀仍訪本路從來如何賑濟今流移倍多如緣官吏奉法不䖍即按劾以聞范祖禹作光庭墓志云大發倉廩所全活甚衆舊録朱光庭傳云河北饑詔光庭行視乃大發廪庾豪强所獲十倍而貧弱實不䝉恩惠先帝積年兵食之儲至是無餘改左司員外郎遷太常少卿右正言丁隲論光庭昔為小官曲奉權要推行法令又劇殘苛黨附程頥傾敗善類奉使北河邀求民譽並邊州郡儲蓄一空言雖不行士論快之云云元符初三省按治劉摯黨與而光庭纍疏誣罔聖聽隂蓄邪謀新録辨曰漢汲黯使行河內失火而賑廪以活饑民前史以為美談况光庭奉使有㫖而乃以散先帝積年兵儲罪之何哉其下言光庭纍疏誣罔聖聽亦可知其誣也今刪去新録削去舊録乃大發廪庾豪强所獲十倍而貧弱實不䝉恩惠先帝積年兵食之儲至是無餘等語但云發廪庾以濟饑民而議者謂耗先帝積年兵食之儲按陳師道詩有嗚呼行亦似不與光庭此舉師道詩今附見于後去年米賤家賜粟百萬官倉不餘掬青錢隨賜費追呼昔日剜瘡今補肉今年夏旱秋水生江淮轉粟千里行不應逺水救近渴空倉四壁雀不鳴似聞為政不為費兩不相傷兩相濟十年斂積用一朝驚濤破山風動地十一月六日甲寅運淮浙所糴穀四十萬斛賑濟京東二十六日甲戍御史趙挺之方䝉劾光庭詔光庭具析右諌議大夫梁燾言竊聞朝廷以河北災傷差左司諌朱光庭體量賑濟竊緣左諌議大夫鮮于侁見在疾苦未奉朝謁今又差出光庭即左省全闕諌官欲望聖慈特賜指揮令光庭在省供職别選臣僚出使宣㫖不報知邢州中散大夫鞏彥輔言施黔戎瀘州南平軍極邊之地保甲多居山林閲每嵗農隙令縣尉親詣其居如監司按閲法一月而畢母復支賞監司三嵗一閲如舊法從之鮮于侁建議在正月十二日崇寧四年六月十七日復元豐法此據遂寧府編録冊所載今附見不别出彥輔嘗為䕫州路提㸃刑獄凡六年徙梓州路又二年每嵗與轉運提舉司官分詣諸處按閲知其無益于國有害於民故建是請從之據遂寧府編録册增入戊子知頴昌府韓縝言交趾小國其使人將過臣境臣嘗備近弼難以抗禮按元豐中迓以兵官餞以通判使副詣府謁其犒設令兵官主之請如故事從之仍詔所過郡凡前宰相執政官知判者亦如之己丑詔知河南府觀文殿學士孫固知鄭州資政學士張璪兩易其任龍圖閣直學士蔡延慶為工部侍郎祕書監張問為給事中禮部言太皇太后玉寶請以太皇太后之寶六字為文皇太后金寶以皇太后寶四字為文皇太妃金寶以皇太妃寶四字為文從之詔尚書右僕射吕公著撰太皇太后册文中書侍郎吕大防書册寶門下侍郎韓維撰皇太后册文尚書左丞李清臣撰皇太妃册文皆并書册寶户部言奉詔裁損浮費按元豐𠡠抵當所嵗收息除經費每千緡以十緡賞官吏緣自有添俸請母給賞從之詔户部裁减冗費著為令在元年四月十八日舊録云先帝理財以裕民足國故以其餘賞勞能之吏今以為浮費省之新録辨曰既有添俸而又計緡加賞故罷之今删去先帝理財以下二十五字右司諌王覿言臣伏見江寧府朝散大夫致仕假縫於熙寧中任職方員外郎知興國軍以所屬永興縣嵗輸免役錢一萬九千餘貫實支才千餘貫縫不忍民力之困而所取寬剩錢過多奏乞裁减先朝下其章司農寺委本路相度而提舉司以一路役法錢數已定為辭事寖不報縫繼有論列言甚激切神宗特從其請錢得减半未幾召縫赴闕除知潤州又易泰州未到官言事者反謂縫沮壞新法不當與名郡改差通判閬州縫家貧多病不能逺適乃求分司後遂致仕縫居間十數年安貧守道為江東搢紳之望臣愚以謂縫為守臣知忠君愛民挺志不奪以伸其言使朝廷知逺方困於重斂而得以施惠澤於民先帝又以縫為賢特賜驛召與之善郡此盛德也當時言事者不能將順先帝之美乃以縫為沮法遂徙之逺州致縫謝事以歸公論歎息今聞縫精力未衰尚可用也臣欲乞朝廷除縫東南一便郡或宫觀差遣以示旌别以成先帝嘉賞直言愛惜百姓之本意而使為人臣者知忠君愛民之人初或不偶而終亦有報也臣已於去年五月十二日具狀聞奏至今未䝉處分伏望聖慈更賜詳酌特降指揮施行貼黃稱臣素不識假縫熟聞其所為如此而當時言者不察其忠誤有論列致先帝奬拔之意鬱而不伸臣竊惜之惟聖慈特賜旌别以勵臣莭覿自注云二月四日上此辛卯詔朝散大夫致仕假縫落致仕差管勾宫觀縫知泰州在元豐元年二月甲寅詔賜富弼神道碑以顯忠尚德為額仍命翰林學士蘇軾撰文從其子紹庭請也太師文彥博言廂軍舊録樞密院新制改𨽻兵部且本兵之府豈可籍樞密院言官制行廂軍分𨽻户兵工三部於兵部工部置籍揭貼詔逐部自今進册以其副上樞密院仍更互揭貼王令圖張問奏先奏乞分河水入孫村口已䝉依奏尋准㫖不行令乞依前奏開修從之政目八日事此當考詳問前奏在去年十一月二十二日又十二月六日令圖再按視二年二月八日詔從王令圖張問奏開修孫村河實録並不書此據吕大防政目然既從二人所奏開修令圖尋卒於三月十七日其次日即命王孝先代之孝先亦同欲開修孫村河者也四月十二日又命顧臨代范子竒為轉運使政以河議未决二十六日乃詔轉運使副與水官共議開修的確利害據此則二月八日雖降開修指揮尋却寖罷今又復令有司别議梁燾王巖叟所以云云蓋緣此也今取燾巖叟奏附四月二十六日前癸巳右司諫王覿言臣伏覩今年正月十七日𠡠莭文舉經明行修人委州縣當職官同狀保任申監司監司再加考察仍於發解前牒報本州與充本州解額臣竊以朝廷設經明行修之舉非徒欲以得其人而任使又將勸後進之士篤於學行也今若以州縣所舉之人充本州解額則臣恐未足以勸學行而先有以敗風俗矣夫古之所謂士者莫不以廉退自重也自以科舉取士而士之不能以廉退自重亦已久矣今天下州郡應舉者甚多而解額至狹凡挾册讀書而未免於干祿者莫不有競進之心也使經明行修而被舉者不在解額之中則後進之士視其鄉之經明行修者其勢必須出力推薦而人人有君子長者之風矣使經明行修而被舉者遂奪其解額則後進之士視其鄉之經明行修者其勢必有內懷忌嫉而謗讟詆訐無不為者矣如此則學者之完人益少而經明行修之舉不幾於廢乎蓋必然之理也臣故曰若以州縣所舉之人充本州解額則臣恐未足以勸學行而先有以敗風俗也夫天下之風俗澆薄淳厚之不同豈皆其天性哉顧所以導之如何爾臣伏望聖慈指揮於前項𠡠內改與充本州解額六字作於本州解額外解發庶可以久行而無弊也貼黃臣兼看詳前項𠡠內逐路所舉各有人數惟不及畿內恐是漏落不可謂王畿之內而無經明行修之人也亦乞指揮添入覿自注云二月十日其言之從違當考存此亦欲見正月十七日指揮或於本月日别增入此乙未工部郎中盛陶為祕書少監軍器少監郭茂恂為工部郎中三月十四日二人新除並罷殿中侍御史吕陶言臣去年三月中曽彈奏郭茂恂曽任陜西監牧日枷禁無罪婦人阿黨等令陪錢雇女使及在秦州永興軍皆有不檢之迹醜聲流播道路喧聞不可為省郎并相度監牧䝉朝廷采納臣言罷茂恂庫部郎中更不遣經畫牧地仍除軍器少監當時士大夫謂朝廷既知茂恂猥惡如此而尚不許補外者蓋執政以親舊之愛曲為庇護姑且處之京局俟人言稍息必復進用今日果如所料乃以茂恂任工部郎中詔命既傳頗駭羣聽且進善退惡者天下之公議信賞必罰者人主之大權貪廉既禀於天資安有昔汚而今潔升黜動關於國體豈可前是而後非儻有輔弼之主張必誤朝廷之任使伏願陛下深明本末洞察公私特罷恩除庶清郎選况茂恂領軍器監以來仍更違法冒請製造神御帳興工下手莭料了畢等錢貪猥之行久而不革臣已嘗彈奏伏請論罪如律豈可不治其過又復遷官也詔奉議郎管勾中嶽廟趙濟降授通直郎監唐州酒稅務以濟向知熙州與僚屬博戲受錢故也王巖叟朝論二年四月十八日對延和奏知熙州趙濟曰濟險薄侫邪卑汚貪猥為帥守無儀法將佐僚吏皆苦其蒱博之戲不稱陛下分閫之寵諂事李憲憲為帥府日憲之床簀溷厠皆親閲視不可不罷黜按趙濟二月十二日已責監酒不應四月十八日巖叟猶乞罷黜蓋朝論載事多失先後之次不可憑也姑附注此監察御史上官均言臣愚嘗以為政令法度出於朝廷而奉行之在於郡縣朝廷之所重在民而牧飬之責在守令夫以四方萬里之逺官吏不能人人通曉法令之意又有慢法曠職之吏壅遏朝廷之德澤天下之民有受其弊者矣周官之制匡人掌建法則匡邦國而觀其慝使無反側以聽王命撢人掌誦王志道國之政事巡天下之邦國而詰之使萬民和悅而正王面漢唐之時間遣使四出刺察郡縣有繡衣直指觀省風俗之類神宗勵精治道整齊法度參考舊制始定諸路每三嵗一次取㫖遣郎官或御史按察監司職事至元豐八年立為著令夫監司雖按察郡縣而患監司或非其人有過舉故縱之弊憲臺雖得兼察內外而患四方之逺有傳聞不詳之病此遣使考察之法所以不可廢也自陛下臨御以來損益政事條目非一然而法之利害被及四方而繫民之休戚者莫重於力役今役書已下四方郡縣之吏且禀承而布之於民矣然臣愚竊恐郡縣之吏或狥文而昧朝廷之意或慢職而無惠民之誠而又患監司寬者失於不察而有縱姦之弊苛者失於任情而有慘刻之過四方萬里之逺朝廷耳目之所不及民有受其弊而不能自達於京師者此不可不慮也臣欲乞檢舉近制選端厚明敏之臣每道遣使一人假以朞嵗令遍厯郡縣取海行逐路役書與近年法制繫大體者按視奉行之吏有差謬不完者即行改正有墮廢不舉者具名論奏至如利害之未興除法令之未安便獄犴之寃濫監司官屬之賢否皆得上聞擇監司官吏善惡之尤著者每路黜陟一二以勵其餘則四方百吏靡然修職人人爭奮無怠惰茍且之弊矣陛下垂衣拱手於法官之中而四方之利病與夫郡縣官吏之賢愚皆得以周知而海隅山谷之民皆得以䝉被德澤矣若夫患使者之張皇威勢則在審擇其人患郡縣之厨傳侈費迓送廢職則在定逺近多少之莭以陛下至誠求治之心而明諭使者以朝廷之意誰敢不勉如陛下以臣愚言粗可施行乞先詔以諸路候役書行下半年以後遣使按省庶幾官吏先事警飭不敢懈弛以取譴斥從之實録但書監察御史上官均言請先詔諭諸路俟役書行半年遣使按省庶幾官吏先事警飭從之今以均集增入其當日頒下亦具載均言但不出姓名耳均又上言臣竊以謂朝廷政事加於天下措施之利害繫民之休戚者莫重於力役今諸路役法既已頒下四方矣臣嘗以為天下政事有議之善者施之未必便便於此者彼未必宜蓋人情風俗參差不齊又事之利害試而後見雖明者議法往往不能坐察而預計及其法已行而見於政事則雖中材皆能覩其利害而論其得失何則顯晦逺近之異也比來役書類聚諸路申到文字大槩固以因民情而立法矣臣竊恐去取損益之際未能曲當又差役之法久廢不講諸路官吏所申文字亦恐未能盡民間利害輕重今既頒行當否方見其間法有窒礙難於久行重輕之間有所未稱若不許郡縣申明因而完補竊恐政未盡美民有受其弊者矣臣欲乞明諭四方諸路各候役書已頒下半年後推行之際見有未盡未便事並畫一申州州申運司運司類聚奏聞委户部詳度損益如法有未便不務申明或申明疏略不切事情並令監司覺察舉劾庶幾郡縣守令人人警飭不敢匿情慢令而四方利害朝廷可以坐覽役法修具人情安便富庶休養之術無急於此伏願陛下特加留意鄜延路經略司言夏國主卒今遣使謝奠慰賻贈詔本司選官引伴赴闕仍戒毋輕易與語新録無仍戒毋輕易與語七字今從實録丁酉詔應宗室磨勘止法可勘㑹抄録進入御集二月十四日朝奉郎孔平仲為集賢校理奉議郎劉唐老為祕閣校理以召試學士院皆中格也樞密院言內外坊監使臣任滿當被賞無責罰有舉主二員者令再任次任如之第三任滿取勞最者與補騏驥院闕任內職事修舉亦與再任次任如之第三任與理路分都監資序任滿取勞最者與補提㸃左右廂監闕仍升一等資序並太僕寺考察以聞從之詔于闐國進方物已回賜外更如元豐八年例賜金帶錦袍襲器幣監察御史上官均言臣聞監司督察一路官吏實為朝廷耳目之任當選擇端平明敏之士以充是選庶幾奉行法令以安逺俗黜陟能否皆當其分臣竊見新除江南西路轉運判官王祖道人品汚陋天資巧佞向緣附㑹權貴兼更要任昨知泉州內則閨門不治有帷薄之汚外則才識暗滯而郡事廢紊比者朝廷遣張汝賢按察本路至泉之日過飾厨傳曲為諛悅以蓋愆惡至以錦繡覆地被諸墻壁其他越禮侈費莫不稱是閩中士人至京師者皆能語其詳今既未加顯黜復使宣布使指才行如此安能公心黜陟奉行法令使部吏望風信服欲乞追寢成命别與一間慢差遣或一小郡庶使諸路官吏知朝廷博覽明照萬里之外人人自飭不敢踰義廢法以干譴斤祖道除江南西路運判在二月十四日因附見均言戊戍右諌議大夫梁燾右司諌王覿言臣等伏見軍器少監蔡碩盜用官錢乞取貨賂計贓共及萬緡論法當坐極典碩前宰相確之親弟也初碩奏以錢二十萬緡計置軍器物料仍乞從本監舉官分領其事乃是碩之指意本欲與其私黨共為姦利事下工部勘當工部乞吏部選官確方執國政不用工部之議而狥碩之本謀欺罔聖聰頒降朝㫖特依本監所請舉官碩乃得引用竇長裕劉仲昕付之官錢同為侵盜遂致贓汚狼籍夫宰相者正身齊家以表儀百官進善退惡以佐佑天子者也確不能防間其弟使不犯法已是罪人而况廢省部之申陳假朝廷之號令使得自引私黨濟其姦謀此而恕之孰不可忍確今以觀文殿大學士守輔郡縣有玷名器伏望聖慈特行貶黜以慰公議貼黃臣等本欲朝廷延斷蔡碩之後論被罪狀今竊聞蔡碩案已具多日確不從工部之議而使碩得引用私黨以成其姦見於奏牘事理已明則確之罪不待斷碩之後而可見也伏望聖慈詳察早賜施行覿奏集自注云二月十五日與梁燾同發己亥刑部大理寺言奉議郎前軍器監計置材料劉仲昕前軍器少監蔡碩並貸使官錢論法抵死並特貸命免真决各追毁出身以來告𠡠文字除名勒停仲昕送昭州碩韶州編管去年十月十六日攝碩仲昕等政目劉次莊除名實録不書詔觀文殿大學士正議大夫知陳州蔡確落職守本官知亳州以御史中丞傅堯俞等劾奏確位居宰相竊㺯威福放縱其弟養成姦贓故也二十八日確再責三省言知州考課請令吏部上其事於尚書省關中書省取㫖賞罰其劣等應罰而已衝降者仍從衝降法縣令已下即本部賞罰從之詔京東西路安撫司强盜權聽本司酌情處决俟寇賊衰息奏裁即罪不至死者亦聽從宜處置訖具事狀以聞餘路如之先是京東嵗荒民艱食多盜師臣上聞故有是詔新録無四月十七日權宜指揮當考詔吏部選人改官每嵗以百人為額從侍郎孫覺請也舊録云治平以前選人用保任資考應格當引見而滯於有司者率三二年或緣事阻隔則終身有不調者熙寧初神宗惻然憫之始更定銓法繇此無復淹滯之歎而覺乃復舊法故有限員之請新録辨曰選人限員乃祖宗法昔廢今復澄冗濫也刪去治平以前至限員之請數句覺在吏部幾二年初領右選右選萬五千員而闕不滿六千有三年不得調者覺請自軍功保甲進者補指使袒免親從員外置一日得闕數千改領左選於是復限磨勘員此據覺傳元年七月覺自給事為吏侍三年四月改中丞在吏部凡一年九箇月也左選磨勘限百人二年二月十六日已見右選得闕數千當考舊新傳皆同恨不詳耳當采覺奏議稍增入紹聖元年閏四月詔見磨勘改官人權依元豐令五日引一甲每甲引三人每年不得過一百四十人户部狀檢㑹近降朝㫖本部分立格目將應舊三司事並收歸部緣向者三司直轄庫務無寺監付委今若將舊事並行勾收不問冗末則省曺繁劇其力不任寺監虛間苦無職事一將近降收録錢穀事務格目條具合收其關申并依舊𨽻諸部寺監事件一侍郎欲分左右曹左曹領本曹度支右曹兼領金部倉部一如有該說未盡事件並從本部相度比類施行如事體稍大即申取指揮一近降奴𨽻錢穀事務條格內除修立到支用錢物關申户部二條事不係錢穀割屬别曹事件依舊外餘乞更不施行一今來條具到關收分𨽻事件應該說未盡並從本部比類收𨽻伏乞朝廷詳酌先次施行從之法册二年二月十六日􅎁政目十六日吕升卿衝替坐僞封物免稅不知升卿以何衝替當考政目八年五月八日升卿以兵部接遼使辛丑翰林學士承㫖鄧溫伯等言參考皇太妃冠服禮令不載亦無故事請參酌裁定其生日莭序請損皇后五分之一詔依所定內冠朵用牙魚元年十二月二十二日紹聖元年二月二十六日可考韓忠彥傳云詳定皇太妃典禮忠彥稽參厯代逮及本朝故實以上宣仁初欲以皇太妃故少降殺之其後卒用忠彥議畢仲游作忠彥行狀乃無此又仲游作歐陽棐傳已附去年十二月二十二日可并考陳恬作畢仲游墓志云有詔詳定皇太妃儀制當是時朝臣希勢鋭進者則欲降其禮以避東朝之尊求寵於歸政之後者則欲極尊崇以盡天子之孝而公獨不然援引經傳及先代典禮務稽古不為偏私遷就其說於是搢紳大夫又服公之純正詔諸路巡檢土兵以元額之半差禁軍以樞密院言土兵本以諳悉山川地里易於捕寇今嵗久以親戚鄉里之故或庇其為姦請以禁軍相兼故有是命詔陜西河東逐路經略司並行䇿應牽制法鄜延環慶涇原秦鳯路除極邉屯戍兵將外各於鄰路近便處留屯所定䇿應兵將平居無妨本路調發遇賊衆入寇須鄰路救援即互相關報仰被關路分量賊勢䇿應如差定兵將發盡即復移內郡兵將填補鄜延路於環慶路環慶路於鄜延涇原路涇原路於環慶秦鳯路秦鳯路於涇原熙河路熙河路於秦鳯路鄜延路於河東路河東路於鄜延路更不豫置䇿應將兵遇鄰路事宜止令互相關報相度出兵牽制始用范純粹元豐五年十一月奏請也純粹初以元豐五年十一月十一日奏再以元祐元年閏二月十一日奏又以元年四月三日奏至二年二月十四日乃降此約束舊録併就二月十四日書權環慶路經略使范純粹言舊制諸路並於平日豫定兵將以備應援或賊大舉聚入一路除已定兵將外仍許逐路發兵䇿應昨因徐熙議悉罷䇿應若敵兵大舉一路攻圍力有不勝而鄰路拱手坐觀其不拔者幸耳請修明戰守救援之法令諸路按行詔云云至出兵牽制按所載純粹奏乃閏二月十一日所奏也閏月十一日蓋第二奏矣四月三日又第三奏至二年二月十四日方依所奏今悉檢討前後令相貫穿此但具載詔書仍結云始用純粹元豐五年十一月奏請庶首尾不至間斷且足以見奏請報應之不易云是日辛丑三省同奉聖㫖將來太皇太后受册依章獻明肅皇后故事皇太后受册依熙寧二年故事皇太妃與皇太后同日受册皇帝於殿上發册令禮部太常寺詳定儀注聞奏右諌議大夫梁燾亟率同列請對曰太皇太后將來欲過文德殿受册不知果有此議否太皇太后曰大臣要行此禮太皇太后意謂必難行燾對曰誠如聖慮願堅執勿許且母后權同聽政蓋出一時不得已之事臨朝受禮乃大臣妄意迎合欲誤太皇太后貽後世譏議聖明既已謂非禮誠合公議乞速罷之因引明道二年參知政事薛奎諌章獻明肅皇后不當以王服見太廟事敷陳太皇太后欣納丙午中書舍人曽肇言臣伏聞已降𠡠命將來太皇太后受册依章獻明肅皇后故事臣伏考故事皇帝於大安殿發册今大慶殿皇太后於文德殿受册今來詔㫖遵用舊典臣子之義復何所言然臣伏見太皇太后自聽政以來止於延和殿垂簾視事受契丹人使朝見亦止御崇政殿未嘗出踐外朝豈非以聽決萬機出於權宜垂簾視事蓋非得已而外朝者天子之正寧太皇太后崇執謙德不欲臨御以為天下後世法耶推此言之受册外朝殆非太皇太后之意特以故事當然爾竊詳故事天聖二年兩制定皇太后受册於崇政殿仁宗出自聖意特詔有司改文德殿此蓋人主一時之制非臣下之所得議也今皇帝述仁宗故事以極崇奉之禮孝敬之誠可謂至矣臣愚竊謂太皇太后儻於此時特下明詔發揚皇帝孝敬之誠而固執謙德屈從天聖二年兩制之議止於崇政殿受册則皇帝之孝愈顯太皇太后之德愈尊天地神靈孰不歡喜中外臣民孰不推仰兩誼俱得顧不美歟伏惟太皇太后睿聖慈仁功德之被天下堯舜禹湯不能逺過非獨秦漢以來母后之所不及則雖日御外朝未足為過而臣乃於一受册之際猶以為言者誠見太皇太后執心謙冲至公至正動容周旋必務中禮非如漢唐母后私於其身必不以受册外朝為己之欲臣愚故願因此增廣盛德使天下曉然知聖心所在垂之萬世以為典則而後之言禮者必曰母后不踐外朝自太皇太后始豈非希世之髙行哉臣伏見昨日者太皇太后志在愛人毅然獨斷令即英宗神御殿後建神宗神御殿詔㫖深切聞者感動至於垂涕此自古明智之君未必能為而太皇太后行之無毫髮之吝則知今日退就便殿受册必非所難此臣所以敢言而不疑也夫一日出踐外朝事至微也然臣竊有私憂過計者不得不豫言之章獻皇后非獨受册文德殿而已元日御㑹慶殿受朝賀南郊禮成御㑹慶殿受賀長寧莭㑹慶殿百官上夀其後又入太廟行恭謝之禮此皆天聖明道故事竊恐有司以次行之不足以仰稱太皇太后為宗廟社稷權宜聽政之心克己復禮謙恭抑損之盛德臣之私憂過計實在於此也太皇太后博覽古今詩書以來母后得失蓋無不知則於此舉必能自擇豈待臣言而後悉然臣待罪侍從以論思為職茍有所見不敢默默重念臣至孤至愚昨䝉聖恩擢自踈逺之中言者攻排無所不至而陛下斷然不疑保全庇護恩德深厚非臣殺身所能報稱使犯顔逆耳猶當言之况聖度包荒樂於從諌臣而不言負國多矣伏望聖慈試加省察儻䝉采録非臣之幸實天下萬世之幸如以臣為狂妄干犯忌諱重加誅戮亦所甘心輕冒天威死有餘責辛亥知瀛州龍圖閣直學士吕公孺知秦州五月二日改祕書監前降葉康直除直龍圖閣知秦州指揮更不施行此據曽肇奏議增入康直初除在元年十一月二十四日并十二月六日又今年六月二十六日當考新除知亳州蔡確知安州以給事中顧臨言確凶險姦貪因緣治獄致位宰相與弟碩論議國事進退人物因納賄賂理無不知落職移郡不足示懲右諌議大夫梁燾右司諌王覿皆乞重行屏斥覿言臣竊聞知陳州蔡確落觀文殿大學士移知亳州成命過門下省而給事中封還以公論之未允也確前宰相也緣其弟之罪而落職知郡公論猶以為未允者何也蓋論者以謂若朝廷但罪確以不能深察其弟縱情冒法而失於防間則落職移郡亦足矣然確之不可恕者乃不在於此而已也夫碩所以得盜用官錢如取己物者正緣計置軍器物料官竇長裕劉仲昕皆其私黨故也確為宰相使其持心正直無所屈撓用工部之公議委吏部以選官而碩不得自引私黨濟其姦謀則碩雖欲盜用官錢勢不可得惟其聽碩舉官乃所以成碩之惡也由是觀之則確之謫命公論未以為允亦其宜矣然陛下務以恩禮遇大臣而不欲深譴確則亦當與一逺小郡庶幾可以稍厭公議彼陳亳皆輔藩今自陳移亳地望均等此公論之尤不允者也惟聖慈詳酌施行故確有是命覿自注云二月二十五日今附二十八日燾先與覿同言在二月十六日此或亦同上也政目顧臨繳還蔡確敕以為罪之太輕改知安州舊録既於十六日載傳堯俞等劾奏云云又於此載顧臨云云并載右諌議大夫梁燾言確容碩之惡亂法無憚右司諌王覿言計置軍器物料官竇長裕劉仲昕皆碩私黨確為宰相聽碩舉官以成其惡乞重行屏斥按燾覿所言已備見十六日乞重行屏斥蓋因顧臨繳駁再上此章舊録不詳新録又因之今别載如上去年十月十六日攝蔡確今年二月十六日行遣是月代州地震有聲
