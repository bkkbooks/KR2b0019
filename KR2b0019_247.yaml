body:
  text: 續資治通鑑長編卷二百四十三宋李燾撰神宗熙寧六年三月甲辰朔詔秦鳯路效用進士竇長裕竇解招納蕃部有勞貢院考試不中格宜依特奏名人例就試丁未權知開封府翰林學士兼侍讀元絳兼侍讀學士提舉在京諸司庫務御史劉孝孫言絳決獄多徇私情乞改除散局而絳亦懇求罷府事故也知瀛州龍圖閣直學士孫永為樞密直學士權知開封府永在瀛州凡二年於是召入白溝界河常患北人絶河捕魚巡檢趙用擅引兵北渡焚族帳故敵數侵略境上上遣中使密訪虛實因奏南北通好久但緣趙用起釁若罪之則無事矣頃之敵聚兵連珠等寨亘四十里邀邉臣會議永遣使諭以邉吏冒禁已繫獄矣何至是耶敵曰若罪人已治能以醪糒犒師則當歸永令霸州遺而遣之責趙用在五年閏七月十三日熙河路經略司言二月丙申二十二日克復河州斬千餘級摩正遁走生擒其妻子是日守香則城鈐轄奚起言蕃賊數千犯城掠輜重糧草侍禁田瓊部弓箭手七百餘人救援至牛精谷及其子永吉皆戰死丁酉二十三日遣苖授等領騎至香則城殺退蕃賊臣等以大軍繼之進討牛精諸谷助賊蕃部焚蕩族帳獲千餘級即日回香則城經度版築以道路尚阻戊戌二十四日又遣景思立王君萬通路斬三千級復得所掠及獲牛羊糧斛等不可勝數於是輔臣皆賀上謂王安石曰非卿主謀於內無以成此紹聖二年九月苖授傳授上黨人從韓琦辟為陜西經略司準偹差使纍遷供偹庫副使熙寧五年朝廷新復鎮洮明年授以兵從王韶為先鋒破香則城進拔河州賊退圍香則城以迎歸師韶遣禆將田瓊救之鬬死乃以五百騎屬授夜馳往授勒所部令日晨當擊賊士卒皆賈勇大敗之休卒二日賊猶要我于喀木滂注矢如雨衆懼授聲言曰苐進無恐氊排數日且至前驅者傳呼賊驚亂力戰數十里斬首四千級居數月又破賊牛精谷斬首三百級遂取河西諸城城之賜號定羌又城香則賜號寧河寨始盡得河湟故地徙知德平軍授知德順在五月四日黃琮劉舜卿薦授四月二十七日可考時河洮岷州雖共為一路而實未復韶方圖進兵上手詔令所議不須申覆及上奏亦不必過為詳謹妨事韶以香則城為大軍來往根本地乃先令城守然後領兵由此討定河州摩正戰敗棄城躍去會降羌反變復圍香則而諸羌結集屯積慶寺以應之韶回軍欲擊諸羌而摩正已復入河州韶兵首尾不相及乃止解香則圍破積慶寺諸羌而還詔贈田瓊禮賔使妻封縣君父普弟祥各遷一官賜銀絹各三百録其子孫三人永吉子一人仍令厚撫其家已而王韶奏瓊所部兵亦獲三百餘級然失主將欲不與賞蔡挺以為非親兵當賞王安石曰明告諭以有功特放罪更不賞則足以明法又議瓊親兵文彥博曰前後行遣不得政緣事干衆爾挺曰李憲欲俱不與賞安石曰將死事若左右前後力可以救助之人不能救助而不誅即今後將官難保首領兼將官御士卒尚嚴若將死而左右前後之人可以無誅即因兵交之際害其主將主將被賊殺者有矣以此須宜懲其左右前後力可以救助而失於救助者若本不在左右前後而力戰有功反以失主將不賞又或加罪即不為允緣兵事左右有局各司其局勢不能相及即無緣任其罪責雖復殺之於後何所懲艾臣以謂須下王韶令推問瓊左右前後兵級力能救瓊死者禁奏聽裁其餘有功者令依例疾速保明聞奏或以為當密或以為動衆上卒從安石議安石又論瓊父子死事一子又傷宜以瓊所合遷官於例外更遷其子官上以為然上連日悼痛瓊不已也熙河路副都總管髙遵裕言臣初欲同領兵收復河州以牒知夏國點集甚盛遂議留臣為熙州聲援甲午二十日大軍行後三日告捷會牒報西兵至不知其數見已過黃河在天都山蘆子川去本州裁三驛又馬銜山後康古見有人馬五七千出沒巡綽臣已報王韶等請分率已勝兵馬數千回赴本州以威示夏人使知已復河州以折其內侵之謀為熙州根本之固上批恐遵裕以不得預河州之行故張大夏國聲勢希功生事可嚴誡約但令謹備毋得小有侵犯已而上令止用可嚴誡約以下批語付之初議取河州遵裕曰古謂舉事先建堡寨以漸進取故一舉拔武勝今兵未足糧未充一旦越數舍圖人之地使賊能阻要害我軍進無所獲退不得旋殆矣王韶與李憲笑曰公何遽相異耶檄遵裕守鎮洮韶既行或傳賊且至熙人大恐遵裕單騎宿城外衆恃以安此據遵裕本傳今附見詔遵裕謹備後衆恃以安等語當考上既閲河州奏曰聞外間紛紜以為王韶全軍覆沒此必髙遵裕唱之王安石曰造作如此語言者衆恐非因遵裕唱之也遵裕但不能料夏國不敢來爾如王韶即從初便料知夏國不敢來上曰若不能料即不敢往河州矣初河州未聞吉語蔡延慶牒張守約令留千兵守二堡以三千赴救王韶開道路守約奏準催促軍須所牒如前臣以為二堡不足守今韶以精兵萬人尚為賊所扼臣以三千人往必恐敗事臣以此不敢依軍須所牒盡領五千人往蔡挺言守約當絀事與髙渙相類才見賊便逗留避事不絀無以御將帥安石曰守約但不從軍須所牒留人非避事不往挺曰軍須所牒固不當從緣與髙遵裕商量髙遵裕即合節制守約者文彥博曰但言與遵裕商量却無遵裕牒挺固言守約當絀上笑曰守約非不行第要盡將兵去耳挺及馮京皆言守約不合多要兵安石曰若如所聞韶以精兵萬人往而見扼即守約以三千人為少不足怪挺又爭曰經略使被圍三百人亦當往三千人乃不肯往安石曰軍須所牒守約恐不當遵稟上曰固也既而樞密院乞下王韶相度如經略總管不在本州合令何人權節制上曰自是蔡延慶不合干預節制髙遵裕當節制分明安石曰朝廷置官各有職分今不當旋問王韶挺言經略使出副總管一面指揮兵馬從來有此例安石曰只為近年無經略使出外副總管在內事然不妨副總管節制得兵官挺又言臣巡邉時副總管亦不敢行文書安石曰從來副總管不敢干帥府權柄又經略使雖出實無事可施行故不敢行文書耳若經略使圍閉隔絶即副總管指揮偏禆會合孰敢不從且孰以為越職彥博因言髙遵裕懷姦若通逺軍空虛致夏國兵來疏虞即以為蔡延慶罪安石曰通逺軍疏虞則髙遵裕亦不容委罪蔡延慶上曰或是匆遽如此無它意否但令髙遵裕分析如何不行遣却令軍須所移牒馮京曰蔡延慶等得此疑朝廷責怒必惶擾上曰無妨蔡挺又言恐王韶既往康樂城髙遵裕未知所領職分安石曰但下指揮問經略使在河州副總管自合節制因何却令軍須所行遣軍事令分析聞奏即遵裕自知職分上以為然吳充等又言恐韶不欲以節制付遵裕故令相度安石曰若韶疑遵裕害事自當奏乞移却如未移却當各守職分上曰除移却即可若不移却自合還彼職分已而蔡延慶自劾擅指揮軍事以倉猝故乞上坐臣罪僉謂延慶無可罪安石曰延慶終以為都總管不在故無人可指揮軍事髙遵裕亦習見目前事不謂可以節制諸將固當分明説與令知職分僉欲立條安石曰不用更立條但云都總管既出即副總管自合節制以次官指揮軍事僉以為須事干機速申稟不及者乃聽如此吳充曰恐鄰路難關牒上曰若軍須所關牒鄰路亦自可承稟安石曰新條鄰路事應出兵不出兵致闕誤即有責雖一使臣行文書若合出兵即無不肯出兵之理蔡挺又曰事干機速若髙遵裕要討岷州王韶不在本司便用此指揮出兵如何安石曰若出兵應機會不致闕誤即奚傷但恐不應出兵而妄舉動即自不可文彥博亦以為然乃詔諸路都總管遇出入本司兵馬機速事申稟不及者副總管聽專行詔下乃四月十八日辛卯今并書于此詔提點秦鳯等路刑獄張穆之與熙州官吏制置市易條約以聞初王安石議遣穆之上曰蔡延慶己自任責更遣穆之恐非延慶所樂安石曰市易事穆之經畫頗有序欲令穆之往彼助王韶勾當上曰苐恐韶未暇安石曰固為韶未暇所以遣穆之若穆之勾當即都不妨韶經畫邉事而市易事亦漸成立上曰善戊申河北都轉運使天章閣待制韓縝知瀛州中書始欲用縝知許州上曰縝可惜令間乃召孫永而使縝代之太子中舍權發遣開封府界提點諸縣鎮公事趙子幾權發遣河東路轉運副使時子幾副曾孝寬察訪河北未還也日録此時欲令子幾察訪河北今乃除河東漕不知何故兼子幾副曽孝寬使河北此時亦未還當考己酉御集英殿試禮部奏名進士庚戌試特奏名進士上以特奏名人闒茸而多與官害治又言學校法終當革王安石曰此餘事恐久逺須立法命知制誥吕惠卿兼修撰國子監經義太子中允崇政殿説書王雱兼同修撰先是上諭執政曰今歲南省所取多知名舉人士皆趣義理之學極為美事王安石曰民未知義則未可用况士大夫乎上曰舉人對策多欲朝廷早修經義使義理歸一乃命惠卿及雱而安石以判國子監沈季長親嫌固辭雱命上弗許已而又命安石提舉安石又辭亦弗許丁卯舊紀書詔王安石設局置官訓釋詩書周禮義即此事也今不别出辛亥試奏名特奏名明經諸科甲寅中書言御藥院誤以義由散通禮張簨等五人作義題欲别試簨等諸中書從之令御藥院具析以聞究竟如何當考若無它即當削詔熙河州效順蕃部首領厚加撫賜令三司以銀帶三百付本路端明殿學士工部尚書致仕諡懿敏王素卒丙辰宣徽南院使檢校太尉西太一宫使贈太尉諡惠穆吕公弼卒司天監言四月朔日當食九分詔自十四日易服避正殿減常膳仍內出德音降天下死罪囚流以下釋之先是三日上批時雨應祈稼穡是賴獲此嘉應非朕敢任其赦天下與民均福王安石曰民每欲雨陛下輒一祈未嘗不輒應此陛下至誠感天之效然今歲日食正陽之月恐宜以此降德音上從之樞密都承旨曽孝寬等言定武臣敘法詔依所定施行先是武臣犯贓經赦敘復舊官後更立年考升遷上曰若此何以戒貪吏故命改法至是孝寬等議定大略倣中書文臣敘法而少有增損比樞密院舊敘例為寬比舊敘例為寬朱史削去不知改法初欲戒貪吏後乃從寬何故當考己未太常丞集賢校理檢正中書刑房公事李承之察訪永興秦鳯兩路常平等事大理寺丞京西北路提舉司勾當公事李察副之承之本傳云轉運判官楊蟠恃勢不法承之悉按以聞舊紀載二人察訪新紀削去詔諸路學官並委中書選京朝官選人或舉人充又詔諸路擇舉人最多州軍依五路法各置教授一員委國子監詢考通經品官及新及第出身進士可為諸路學官即具所著詞業以聞新舊紀於己未並書置諸州學官供偹庫副使苖授為西京左藏庫使內殿崇班閣門祗候王存為內藏庫副使西頭供奉官閣門祗候王君萬為崇儀副使左侍禁韓存寶為供備庫副使左班殿直魏竒為內殿崇班三班借職劉普為左侍禁披帶班殿侍趙簡為左班殿直左班殿直繳順為東頭供奉官右班殿直郝貴為西頭供奉官三班借職毛政為右侍禁三班差使孟志王維新為左班殿直三班借差趙亶下班殿直吉慶並為右班殿直凡十四人皆以河州功最經略司請先行賞故也後又第有功人為六等自三官至一官及遞減磨勘年限有差上初閲河州奏亟令下王韶速具功狀諭以當厚賞王安石曰但如下熙州時為復加厚上曰熙州已厚既而曰熙州時許以厚賞後乃不如儂智髙時人失望安石曰諭以比下熙州時更優加酬奬可也上又曰河州戰人已屢勝自計各有功更令復往恐疲苦須更代僉以為太宗取河東遂取幽州無功正為如此安石曰人情或未可知但合問願往者且留願歸者即聽歸據數于涇原選代可也上曰善先是王韶與李憲連奏河州事于是蔡挺白上功狀只下王韶定或并下李憲上令只下王韶曰韶正立事必不肯為私安石曰王韶是大帥自合委韶何用更委李憲上從之此據日録係初八日事今附見它日安石又論李憲獨奏邉事及與王韶連奏經略司事皆非體文彥博亦以為韶不當如此上令指揮憲勿書經略司事及獨奏蔡挺曰如此即憲却要奏事不得上曰憲自要奏事無妨但不當獨奏及連書經略司兵事爾然指揮竟不批出此據日録二十四日事今附見王安石以為蔡挺作姦也安石又白上曰陛下賞功不當倦人臣用命甚難人君出爵祿甚易陛下出爵祿尚倦則人臣用命豈能無倦又曰凡軍賞不厭厚初雖費財及其士勇勝敵四夷率服會當櫜鞭而治豈復患軍賞費財此見日録二十日今附此庚申詔春試出官人上等賜進士出身中等以上升一季名次四年十月改立銓試法六年三月始書春試恩例八年亦但書春試九年十年則春秋並書大抵實録初無義例今亦因之辛酉夔州路勾當公事著作佐郎曽阜為太子中允權發遣夔州路轉運判官先是阜將命措置保甲還朝得對遂擢用之侍御史劉孝孫言龍圖閣直學士張燾不奉詔條不忠先帝當官貪墨臨事暗狠在成都日有部吏李孝寬嘗作忠孝書責之燾不能答今具繳進乞出燾守間郡詔成都府路轉運司考實以聞竟無聞明年正月丙辰張燾知河中或因此壬戌御集英殿賜正奏名進士明經諸科余中以下及第出身同出身同學究出身總五百九十六人中常州人也賜新及第進士錢三千緡諸科七百緡為期集費進士諸科舊以甲次髙下率錢期集貧者或稱貸于人至是始賜之右正言直集賢院兼天章閣侍講知諫院管勾國子監常秩罷天章閣侍講及諫院從所請也秩初免修起居注未幾復面乞罷去上驚曰方賴卿德義何遽求去也於是又以疾求歸上遣內侍就第諭旨秩固稱疾詔賜告仍聽免二職王安石白上曰風俗患不忠信無亷恥至甚如秩美行宜加崇奬留之在朝足以表勵風俗如諸葛亮以許靖有人望使為三公此己自不情非所以率人為忠信上曰鄉者秩人望極甚曽公亮嘗言召出必壞却安石曰人各有所用如秩安貧守節在朝不為無補也詔改環州通逺縣尉為主簿仍減罷弓手其州界盜賊責管界都同巡檢鎮寨等處盜賊責地分巡檢從知州种診所請也癸亥御集英殿賜特奏名進士明經諸科同學究出身試將作監主簿州長吏文學助教總六百九十一人太子中允集賢校理同修起居注直舍人院知諫院張琥為集賢殿修撰知蔡州先是知制誥闕中書擬用琥上不許曰琥脫空又無能問時事都不對乃言它事王安石曰以人望言琥行義豈不及蔡延慶上曰延慶行義亦自有所闕安石曰如此則難使在職陛下當明著其反覆罪狀罷之上又以為罪難明安石曰陛下若以言語前後不復放廢人即左右前後虛位宜多陛下固有明見其誕謾而都不以為非者上曰見即更不進用也於是琥三上章乞出上謂安石曰前議琥得無漏乎安石曰雖不漏琥豈容不覺故有是命張琥事見日録五年十一月十八日是日上謂王安石曰宿衛親事官有擊指揮使傷首者而主名未立宿衛法不可不急變革安石曰臣固嘗論此此固易變但要措置有方使見在人無苦而來者有以制見在人則雖變革無患陳瓘論曰安石欲變宿衛之法先於經義創立新説然後造為神考聖訓謂當急變其法蓋託於先訓則可以必聖主遵行文以經術則可以禁士大夫竊議二者行於前三衛作于後漸危根本忠義寒心人皆獨罪于卞京安知謀發于私史若非陛下守藝祖之宏規循纍朝之成憲使彼二書之説以敘行之今日不知其如何矣又陳瓘上書曰臣又望陛下特垂聖問問洵仁等曰日録書神考之言曰宿衛親事官有擊指揮使傷首而主名不立宿衛法不可不急變國家自有宿衛法以來果有衛士擊傷指揮使而捕捉不得者乎嗚呼安石欲變宿衛之法也久矣先於經義創立新説然後矯託聖訓書于日録二書行于前三衛作于後搖動大法忠義寒心卞等繼安石之志昴等述蔡卞之事而執此動搖之計以為國是豈不誤朝廷之繼述乎臣道之專強可不辨哉又陳瓘封事别奏蔡卞等傾搖大法曰臣竊惟大法者宿衛之法也改為三衛卞唱之也新經有張本之議日録有包藏之迹違神考畏憚不改之訓行安石果斷速改之請按書定計以使厥兄當面讚成退而匿迹京由之而不悟它人豈測其用心運籌于手足之間睥睨我爪牙之地嗚呼昨者若非陛下聖斷不惑則其傾搖未遂止也人皆獨罪于卞京而新經之詭説日録之匿論反復詳密纍數千萬言皆巧搖之策也孰為陛下略陳之乎按王安石欲變宿衛法二年閏十一月十九日及十二月十三日自後纍嘗致意矣經義創立新説當考兵志第一卷云元豐中義勇保甲逐上畨以代禁兵其巡檢縣尉司所省募兵亦數萬詔闕額弗補者會其材費儲之專以待武偹之用自後民兵數遂踰募兵而國用亦省又議欲擇民之材武者若唐府兵法畨上以備宿衛事雖未行然其規模宏逺矣要見宿衛法卒不果變因附注此甲子交州李乾德遣使貢方物乙丑太子中允史館檢討沈括為集賢校理丁卯羣臣再上表請御殿復膳不許詔自今進士諸科同出身及授試監簿人並令試律令大義或斷案與注官如纍試不中或不能就試候二年注官曽應明法舉人遇科場願試斷案大義者聽如中格排于本科本等人之上四月二十六日可考詔别試所考試官館閣校勘蒲宗孟黃履各展磨勘三年點檢試卷官蔣夔范祖禹並降逺小處差遣坐進士李士雍對義犯仁宗藩邸名誤以為合格故也秦鳯路經略司言二月丁亥十三日熙河通逺軍西路蕃漢都巡檢文思副使劉惟吉領兵及永寧等寨兵五百策應滔山等寨己丑十五日至滔山庚寅十六日又得臨江寨報有蕃寇攻圍惟吉即率所部潛由實卜沙谷辛卯十七日至臨江有蕃賊約二千餘惟吉力戰追奔過江詔經略司速具將士戰守功狀以聞其陷敵人口優給賵恤所焚廬舍給修造錢已而經略司言賊攻二寨諸將互戰有功詔帷吉遷西京左藏庫使餘推恩有差先是朝廷以臨江寨兵止三百人而蕃賊攻圍者甚衆詔王韶分兵救應而韶奏今方修築康樂城賊欲牽制故攻圍臨江若輟兵以往則賊計得行不如委臨江與攻弗救萬一有敗事俟城康樂畢工回兵蕩除未晚王安石曰韶奏甚當且以臨江委賊攻之未必能破文彥博曰此豈可不救向王韶料河州必不用兵乃過河殺六七千人韶所計未必是安石曰韶若不領涇原精兵往為賊所敗即是失計既領精兵八九千自隨即是防賊旅拒非乖本謀也安石又曰將帥居常未有敢言委城寨與賊攻而不救以敗事為不足恤者王韶獨能如此亦恃陛下知故也若非陛下知則必以疏濶得罪朝廷矣上曰自來將帥非盡不能誠不敢爾已上見日録此月二十日朱史并書之然將來修築次序如何安石曰韶已有奏必是先修康樂畢即修香則最後修河州也上曰蕃戶既未定香則如何可守安石曰蕃人既已屢經討蕩所存餘衆固已氣索就令作過圍城若城中有五百精兵豈易攻破况城外盡是蕃戶又未須官軍保護加以去熙州救援止五十里豈憂難守已上見三月二十二日安石又白上今將校士卒見殺賊易以得功則人人且欲以討蕩為事恐韶難于逆衆遂至多殺今兵威已振宜施恩德手詔王韶招撫上以為然已上見二十二日因論慶厯邉事安石言大臣以門客故人之故開方略之科因此繆及京師市井間富人買策求得官者甚衆方仁宗旰食邉人肝腦塗地之時乃更營不急之私如此則其不憂邉計可見何由勝敵乎上曰此所以書稱難任人蠻夷率服也已上見二十日新舊録並稱今月丁亥蓋誤也丁亥二月十三日今改之戊辰大理寺丞京西北路提舉司勾當公事李察同管勾本路常平等事置諸路提點刑獄司檢法官各一員從檢正中書五房公事吕惠卿請也賜西界歸明人李崇貴開封府界屋租錢日五百初上批賜崇貴田十頃後復改之己巳詔試中刑法莫君陳遷一官為刑法官次四人送法寺試斷案或充提刑司檢法官次五人各循二資十一人各循一資餘各不依名次路分指射差遣一次及止免試注官京朝官比類酬奬仍自今試法官斷案刑名約七件以上十件以下庚午制授李乾德靜海軍節度使安南都護交址郡王權江淮等路發運副使度支郎中皮公弼權永興軍等路轉運使職方員外郎張頡權發遣江淮等路發運副使頡首議開梅山及章惇往經制頡時居夏鼎之桃源數遺京師書言南江殺戮過當非辜者十八九以至浮尸蔽江下流之人不敢食魚者數月惇病之欲弭其謗乃言今成功乃因頡謀詔賜絹三百匹執政猶恐其異論會頡服闋亟移公弼陜西以頡代之令便道赴江淮于是不敢食魚之謗遂息此據魏泰東軒録七年十一月四日又賜銀絹常州團練推官吕升卿為館閣校勘提舉詳定修撰經義所檢討升卿惠卿弟也王安石極稱之故有是命賜夔州路轉運司度僧牒五百置市易于黔州選本路見任或得替官一員專監仍以知州或通判提舉壬申詔詳定職田知州藩府三京京兆成德太原荆南江寧鄜延秦楊杭潭廣州二十頃節鎮十五頃餘州及淮陽無為臨江廣德興國南康南安建昌邵武興國軍並十頃餘軍監七頃通判藩府五頃節鎮四頃掌書記已下幕職官三頃五十畝防禦團練軍事推官軍監判官三頃令丞簿尉萬户以上縣令六頃丞四頃不滿萬户令五頃丞三頃不滿五千户令四頃丞二頃五十畝簿尉各減令之半藩府節鎮録參比本判官餘比幕職官藩府節鎮曹官比萬户縣簿尉餘比不滿萬户縣簿尉發運轉運使副比節鎮知州開封府界提點比餘州知州發運轉運判官常平倉司提點官比藩府通判同提舉官比萬户縣令發運司勾當公事轉運司管勾文字提點刑獄司檢法官比節鎮通判蔡河許汝石塘河都大催綱管勾機宜文字開封府界提點司勾當公事比節鎮判官總管比節鎮知州路分鈐轄比餘州知州安撫路分都監州鈐轄比節鎮通判藩府都監比本判官承受諸州都監都同巡檢都大巡河並比節鎮判官巡檢堡寨都監寨主在州監當及催綱撥發巡捉私茶鹽賊盜駐泊捉賊並比幕職官巡轄馬遞鎮監堰并諸州鎮寨監當並比本縣簿尉諸路州學教授京朝官比本州判官選人比本州曹官此據會要增入
