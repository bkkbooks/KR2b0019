body:
  text: 續資治通鑑長編卷四百八十一宋李燾撰哲宗元祐八年二月己酉監察御史黃慶基言涇原一路內總師律外控羌戎邊面曠逺最為重地自非深謀逺略智勇過人者不可輕以畀付如張利一不特人材凡下不足以當其任而又以惡逆之家其弟兄嘗以從叛而蒙顯戮安可委以強兵付以重任侍御史楊畏監察御史來之邵言利一素無望實兵機將略皆非所長權給事中虞䇿言利一於武臣之中雖薄有可稱實未足以當大帥之選詔利一罷知渭州正月二十三日利一除渭州政目正月二十四日云姚勔繳利一詞實録乃無之賜熙河蘭岷路鈐轄康識并諸將銀合茶藥有差以出塞牽制至打繩川討蕩有勞也廣南西路鈐轄司言轄下知州內有係知縣資序人欲乞除雍欽廉宜融賔橫武臣知州外餘知州係知縣資序差接人乞依知軍監人例從之新無又言諸路役兵見相度利害外有官員乘船所差接送人內據合破人數差三分之一欲改為四分之一從之新無京東東路提點刑獄張元方言諸州比較賊盜等事按提刑司已是上下半年比較及捕盜官亦有立限責罰外欲乞諸知州及一年以上罷任者除侍從官外將任內已未獲強盜殺人賊人數比折如通獲不及五分即具奏若獲及五分申尚書省從之户部言輒誘母或祖母改嫁而規欲分異減免等第者依子孫别籍異財法加二等為首者配本州許人告給賞從之舊録自八年二月二日並闕新録緣此所書事比前益疏史院至今未得舊録闕卷當考王銍補録亦復草草云庚戌户部言勘會無為軍崑山白礬元條禁止官自出賣昨權許通商每百斤收稅五十文準元祐敕晉礬給引指住賣處納稅沿路稅務止得驗引批到發月日更不收稅其無為軍崑山礬欲依晉礬通商條例詔依户部所申詔西南龍蕃進奉人安化將軍龍以擎等舊有官者遞遷一等其未霑真秩者並補官太皇太后宣諭三省曰大寧郡王已下漸長欲令就學可擇教導官二人二月八日辛亥左朝奉郎直龍圖閣知荆南府唐義問為集賢殿修撰知廣州政目在三月二十七日義問知廣州今從實録左朝散大夫集賢校理知潭州李湜知荆南政目在三月二十七日左朝散大夫知廣州路昌衡知潭州政目三月二十二日知荆南三月二十七日自荆南改潭今從實録中書舍人孔武仲言準中書省吏房送到直龍圖閣知荆南唐義問除集賢殿修撰知廣州詞頭臣伏以廣州嶺外之重鎮節制南方控遏蠻徼府庫之藏市里之聚其富不資一方有事則蠻人肆力甘心於此前日儂智高是也擇將命守所宜謹重臣竊見義問天資狷薄所至多與同僚以事相把持無一人恱服者何以臨鎮萬里為國藩屏此其不可使者一也近湖北轉運司取會渠陽新舊費用義問與之辨較曲直文狀狼籍追訐轉運使喻陟赴任遲回人皆怪其險薄不惜事體將何以師帥列郡令逺方取法此其不可使者二也昨措置渠陽事義問馳牒湖南江南兩路應副軍糧器甲文移急於星火官民盡力奔走道路以應之及既至則委積無用却令般回若二廣有事大於渠陽以義問之躁擾豈不生事此其不可使者三也昨廢渠陽義問處置無素定之䇿一旦令兵將棄城僅脫性命金帛委於空垣人民坐受俘戮其處事疏繆如此况使之坐制逺方不測之變乎此其不可使者四也朝廷慮四方之患非不至也今嶺外雖無事然豺狼之心不可知當國家間暇之際所倚以為干城腹心者惟在將帥得人而已委任失宜至於誤事雖重貶之亦何所救如義問之輕肆淺近誠不可任伏望别擇沉深有謀之臣付以一面以銷未然之患慰逺人之心所有制詞不敢具草政目八年三月二十二日路昌衡知荆南實録無之太中大夫知宣州王安禮復端明殿學士政目四日事舊録既脫亡新録於七月十九日乃書今從政目禮部尚書蘇軾言高麗人使乞買書籍其册府元龜歷代史太學敕式本部未敢支賣準尚書省批狀送禮部許賣其當行人吏上簿者臣伏見高麗人使每一次入貢朝廷及淮浙兩路賜豫餽送燕勞之費約十餘萬貫而修飾亭館騷動行市調發人船之費不在焉除官吏得少餽遺外並無絲髮之利而有五害不可不陳也所得貢獻皆是玩好無用之物而所費皆是帑廪之實民之膏血此一害也所至差借人馬什物修飾亭館暗損民力此二害也高麗所得賜豫若不分遺契丹則契丹安肯聽其來貢顯是借寇兵而資盜糧此三害也高麗名為慕義來朝其實為利度其本心為契丹用何也契丹足以制其死命而我不能故也今使者所至描畫山川形勢窺測虛實豈復有善意哉此四害也慶歷中契丹欲渝盟先以增置塘泊為中國之曲今乃招來其屬國使每歲入貢其曲甚於塘泊幸今契丹恭順不敢别有生事萬一異日桀黠之敵以此藉口不知朝廷何以答之此五害也臣熙寧中通判杭州日因其饋送書中不稟朝廷正朔却退其物待其改書稱用年號然後受之仍催促起發不令住滯及去歲出知杭州却其所進金塔不為奏聞皆是臣素意欲稍裁節其事庶幾漸次不來為朝廷消久逺之患今既備員禮曹乃是職事近者因見陳軒館伴申乞盡數差相國寺行鋪人入館鋪設以待人使賣買不唯徙市動衆以奉小國之陪臣有損國體兼亦抑勒在京行鋪資吏人廣行乞取弊害不少所以具狀申都省伏乞施行其多方作弊官吏並不蒙都省略行取問今來只依陳軒等不待申請直牒國子監收買諸般文字臣聞河北𣙜場禁出之書其法甚嚴徒以契丹故也今高麗與契丹何異乃廢𣙜場之法兼竊聞昔年高麗使乞賜太平御覽先帝詔令館伴用東平王故事為詞却之近日復乞詔又以先帝遺旨不與今歷代史册府元龜與御覽何異故申都省止是乞賜詳酌指揮未為過當便蒙行遣吏人上簿書罪臣竊謂無罪可書雖上簿至為末事於臣又無絲毫之損臣非為此奏論所惜者無厭之求事必曲從官吏茍徇其意雖動衆害物不以為罪稍有裁節之意便行詰責今後無人敢逆其請使意得志滿其來愈數其患愈深所以須至極論又近者館伴所申乞為高麗使買金箔欲於杭州粧佛臣未敢許己申稟都省竊慮都省復以為罪竊緣金箔本是禁物人使欲以粧佛為名久住杭州騷擾公私竊聞近歲西蕃鄂特凌古乞買金箔朝廷重難其事量與應副今來高麗使朝辭日數已逼乞指揮館伴以打造不及為辭更不令收買又近據館伴所申乞與高麗使抄寫曲譜臣謂鄭衛之聲流行海外非所以觀德若朝廷特旨為抄寫尤為不便其狀臣已收住不行臣忝備侍從事關利害不敢不奏詔所買書籍曾經收買者許依例金箔特許收買餘依奏吏人免上簿軾又言臣所以區區論奏者本為高麗契丹之與國不可假以書籍非止為吏人上簿也今來吏人獨免上簿而書籍仍許收買臣竊惑之檢會元祐編敕諸以熟鐵及文字禁物與外國使人交易罪輕者徒二年看詳此條但係文字不問有無妨害便徒二年則法意亦可見矣以為文字流入諸國有害無利故立此重法以防意外之患前來許買册府元龜及北史已是失錯古人有言一之謂甚其可再乎今乃廢見行編敕之法而用一時失錯之例後日復來例愈成熟雖買千百部有司不敢復執則中國書籍山積於高麗而雲布於契丹矣臣不知此事於中國得為穩便乎昔齊景公田招虞人以旌不至曰招虞人以皮冠孔子韙之曰守道不如守官夫旌與皮冠於事未有害然且守之今買書利害如此編敕條貫如彼比之皮冠與旌亦有間矣臣當謹守前議不避再三論奏伏望聖慈早賜指揮貼黃稱臣點檢得館伴所公案內有行下承受所收買文字數內有一項所買册府元龜雖不曾賣與然高麗之意亦可見矣又稱臣已令本部備録編敕條貫符下高麗人使所過州郡約束施行去訖亦合奏知詔高麗買書自有體例編敕乃禁民間令依前降指揮軾又言臣前所論奏高麗入貢為朝廷五害事理灼然非復細故近又檢坐見行編敕再具論奏並不蒙朝廷詳酌利害及編敕法意施行但檢坐國朝會要已曾賜豫便為收買竊緣臣所論奏所計利害不輕本非為有例無例而發也事誠無害雖無例亦可若其事有害雖百例不可用也而况會要之為書朝廷以備檢閲非如編敕一一皆當施行也臣只乞朝廷詳論此事當遵行編敕耶為當檢行會要而已臣所憂者文書積於高麗而流於契丹使敵人周知山川險要邊防利害為患至大雖曾賜豫乃是前日之失自今止之猶賢於接續許買蕩然無禁也又高麗人入朝動獲所欲頻歲數來馴致五害如此之類皆不蒙朝廷省察深慮高麗人復來遂成定例所以須至再三論奏兼今來高麗人已發無可施行貼黃今來朝旨止為高麗已曾賜豫此書復許接續收買譬編敕禁以熟鐵與人使交易豈是外國都未有熟鐵耶謂其已有反不復禁此大不可也詔高麗買書自有體例編敕乃禁民間令依前降指揮新録繫之三月六日今并附此元符元年四月十二日宋球傳舊録云副陳軒館伴高麗使使求册府元龜樂譜金箔蘇軾為禮部尚書以先朝柔逺非是乘此沮之且誣館伴規其私遺陳請勿與球曰先朝蓋嘗賜之矣此非中國所祕不與何以示廣大朝廷是其議卒與之新録辨曰按蘇軾奏狀論高麗使買書籍金箔利害甚詳未嘗詆先朝柔逺為非是亦未嘗謂館伴規其私遺也不知史官何據而書誣誕明矣館伴人使者陳軒也球為之副爾買書等事主議亦不在球今刪去七十二字壬子中書省檢會元祐五年五月二十五日指揮諸路開封府界提刑司每歲終具諸獄瘐死人數仍開析因依申刑部內數多者申尚書在京禁繫委御史臺取索報刑部看詳上件朝旨即無許分別禁繫人數目至元祐七年諸路具到獄死人數刑部遂分每禁二十八人以上死一人者更不開具即是今後應繫囚處歲禁二百人許破十人獄死深慮州縣獄官公然懈弛甚非欽恤之意詔刑部今後更不得分禁繫人數依元降朝旨將瘐死人數多者申尚書省元祐五年五月二十五日指揮附見不别出七年十二月壬子當考詳癸丑于闐請討夏國不許乙卯新知慶州孫覽知渭州政目八日事實録脫此覽知慶州在正月二十三日紹聖二年六月七日乃自渭召入權户部侍郎范子奇為集賢殿修撰知慶州政目初八日事實録在十九日今從政目子竒六年十一月十八日以集撰權户侍八年二月八日自户侍又以集撰知慶州紹聖元年二月八日自集撰除寶制舊編載韓駒云云已修入三月八日舊注一百二十四字今削去詔大寧郡王以下出就外學宜令於親王舊第置學舍及差官二員充諸王説書就差逐位內侍四員充管勾官二月三日已未詔就差逐位管勾官四員指揮勿行罷差逐位管勾官必有説當考門下侍郎蘇轍奏臣今月八日以式假不預進呈公事竊見三省同奉聖旨北流軟堰依都水監所奏候下手日先將檢計到功料奏取指揮竊緣臣從來都堂聚議常謂軟堰不可施於北流利害甚明蓋東流本人力所開止百餘步冬月河流斷絶故軟堰可為今北流是大河正溜比之東流何止數倍見今河水行流不絶軟堰何由能立蓋水官之意欲以軟堰為名實作硬堰隂為回河之計耳朝廷既已覺其意則軟堰之請不宜復從昨已於正月二十八日面奏大略以為昔先帝因河決導之北流已得水性惟隄防未立每歲不免決溢之患小小決溢是黃河常事本不為大害而數年前朝廷議欲回河王孝先吳安持因此橫主河事昔北京以南黃河西岸有闞村等三河門遇河水決溢即開此三門放水西行空地至北京之北却合入大河故北京生聚無大危急自建議回河先塞此三門又於西隄作鋸牙馬頭約水東流直過北京之上故北京連年告急緣此水勢向東故去年東流遂多於昔由此言之分流之説非徒無益實亦有害也何者每年秋水泛漲分入兩流一時之間稍免決溢此分水之利也河水重濁緩則生淤既分為二不得不緩故今日北流已見淤塞此分水之害也然將來漲水之後河流東北蓋未可知臣等昨問吳安持安持亦言去年河水自東安知今年河水不自北太皇太后宣諭曰水官尚如此言餘人更安敢保臣又奏曰昨來安持等因河流稍東乞於東流添掃五七緷稱此機會不可少緩臣等恐安持意欲因此指揮多添掃緷壅遏北流不為穩便即指揮所增掃不得過元乞數然時方河漲掃緷皆不到地所稱機會悉是妄言安持等既未如意即又奏乞北流河門只留一百五十步蓋北流河門本闊三百餘步今若塞其大半河流既未可保其不北若使所塞堅壯不可動搖則漲水咽怒必為上流之患京師以東皆未免憂也若所塞浮虛漲水一至隨流蕩去人工物料無慮數百萬頃刻而盡民之膏血深可痛惜然臣愚意亦非敢便謂河水必北而不東也但欲候今年夏秋漲水之來徐觀河勢所向水若全東則北流不塞自當淤斷水若復北流則北河如舊自可容納朝廷作事務在萬全若行險徼幸萬一成功此則水官之意臣不敢從也安持等既見前計不得行則又要橫截北流以為軟堰見今北流稍緩安持等只恐因此生淤故立北堰然却因作堰欲盡留使臣人工物料積漸增卑撩淺即是用河上諸掃人力般土填河數月之後積土成山不知與見今河淤孰為多少名欲分水實是回河決不可許臣欲乞先令安持等結罪保明河流所向及土堰若成有無填塞河道致將來之患然後遣使按行具可否利害以聞太皇太后曰水官猶不能保河之東北時暫遣使又安能知且可重别商量轍奏曰臣迫於異同之論故乞遣官若出自聖斷只朝廷商量亦無不可太皇太后曰縱令水官結罪待其敗事然後施行於事何補轍奏曰誠如聖旨昔修六塔河先責李仲昌狀其功不成隨即責降此是富弼等當時繆政不足復用今來聖旨極為允當臣退思之嘗聞頃歲北流河門闊十餘里水面闊七八里今來河門止闊三百餘步蓋水官數年以來堙塞大河一至於此使洪流不安誰任其咎又東流河門止闊百餘步每年漲水東行已有滿溢之懼今復欲併入北流理難包蓄遂指揮中書工房令作畫一問都水監至今未有回報朝廷欲作軟堰當候問得此二事委無妨礙及臣等看詳實有利無害乃可施行若不待報遽降依奏指揮必恐有誤國事雖云先具功料奏取指揮然已令依奏下手則是邪説已行必致驚動衆聽且貽後患伏乞聖慈特賜詳察降臣此議付三省所有八日指揮乞未行下俟臣參假商量取旨河事至重措置不當一方生靈被害非細臣時在告心有所見不敢默已兼看詳軟堰之議吳安持等本只是奏乞令外丞司相度北流水勢如更有減落即令用軟堰權閉元未敢乞下手今朝廷指揮更不相度便令下手即依奏之言深屬未當兼將來敗事安持等得以歸過朝廷尤為不便臣忝預執政只合每事反復商量不當獨入文字只為此命一行臣自度參假之後必不敢爭若大臣爭已行之命顯異同之迹非所以示天下故須至密入此疏仍已一面密申三省乞未施行至是入對奏曰自去年十一月後來至今百日之間水官凡四次妄造事端搖撼朝廷第一次安持十一月出行河先乞一面措置河事舊法馬頭不得增損臣知安持意在添進馬頭即指揮除兩河門外許一面措置安持姦意既露第二次乞於東流北添進五七掃緷臣知安持意欲因此多進掃緷約令北流入東即令轉運司同監視不得過所乞緷數安持姦意復露第三次即乞留河門百五十步臣知安持意在回河改進馬頭之名為留河門即不許安持計窮第四次即乞作軟堰凡安持四次擘畫皆回河意耳臣昨已令中書工房問都水監兩事其一勘會北流元祐二年河門元闊幾里逐年開排直至去年只闊三百二十步有何緣故其二勘會東流河門見闊幾步每年漲水東出水面南北闊幾里南面有無隄岸北京順水隄不沒者幾尺將來北流若果淤斷漲水東行係合併北流多少分數有無包蓄不盡今兩問猶未答便即施行實太草草太皇太后以為然時吕大防不入故未及以文字進呈也此據潁濵遺老傳龍川略志并欒城集所載劄子月日並係二月十二日而實録繫之三月十二日恐誤也今從集及志傳庚申刑部言元祐七年十一月十四日南郊所降御札指揮及官司謄本關報諸處合以先到者為始從之辛酉尚書禮部言光祿少卿韓宗師奏欲今後應大祠合奉爼處並令儀鸞司計會太常寺設捧爼饌幔太廟於東神門外社稷於西神門外諸大祠於壝門外量地之宜從之御史中丞李之純言西戎未附邊鄙用兵守土之臣不宜屢易蓋欲責其實效必須假以歲月况帥臣總握中權指授規畫日久而後士心信服料敵打衝立威制勝日久而後敵心知畏未有歲月淺近施設尚疏而可立武事也近者慶渭二帥召還移替皆未成資若以護邊有功猶宜增秩以久任若以備敵亡狀豈當免過而優遷欲望精選材臣付以閫外應機制變得以專行明示三載考績之限非以功進非以罪黜更不先期除代庶幾邊事整備而敵人欵服癸亥正字余中為祕閣校理政目十六日事當考甲子詔俵散蠶鹽徐州淮陽軍許依元祐敕京東路河東晉絳隰磁州並罷乙丑左朝議大夫直龍圖閣淮南等路發運副使謝卿材知相州從所乞也實録在二十九日今從政目司農少卿王宗望為發運使政目有此六年十月初八日為司農淮南路轉運使王子淵為司農少卿政目有此六年九月十八日為淮漕江南西路轉運副使張商英徙淮南路政目新京西轉運副使賈易與知蘇州范鍔兩易其任政目有此實録見七年十二月六日今不取甲戌改徐州丙寅尚書右僕射兼中書侍郎蘇頌奏伏覩侍御史楊畏言昨差賈易知蘇州稽留詔命二十餘日謂臣獨主其事論議疏違致有臺劾按其罪戾宜即嚴誅見歸私家待罪又請早賜黜責詔皆不允初賈易坐言事出既復為京西路轉運副使經郊祀赦恩乃與知蘇州范鍔對易頌言易為御史號敢言更赦乃下遷非是或請加易館職頌又持不可或指易為姦邪者頌曰士大夫立朝姦邪何可當也須以實事論之既無實事安可謂之姦邪有旨再議而楊畏及來之邵等遽劾頌頌竟坐此罷去賈范對移事見七年十二月六日政目於今年二月十八日書賈易對移二十七日書易知徐州詔旨蘇頌傳云會牽復前侍御史賈易知蘇州爭不決至論於上前頌曰易與臣本無雅故以其為御史不避權要號為敢言又法應牽復既已為監司矣乃徙知蘇州則是經恩反下遷赦令為虛文矣衆欲加易以館職頌又以為不可時有謂易姦邪者頌曰士大夫立朝姦邪豈易當也須以實事論之既無實事安可謂之姦邪有旨再議而諫官楊畏來之邵言頌稽留詔命頌聞之即歸私第待罪上謂宰執曰言者論列中書省稽滯而不及侍郎何也時范百祿為中書侍郎有旨出知河中而數遣使召頌頌三上章乞致仕不許固以老病辭去乃拜觀文殿大學士集禧觀使他日入謝上曰相公求去位甚力朝廷不得已從所請也九月出知揚州按楊畏時為侍御史來之邵為監察御史傳稱諫官誤也又頌以二月七日罷百祿以十四日罷傳稱百祿先頌出知河中又誤也今不取頌墓志云頌論議持平務循故事避逺權寵不立黨援進退人材弗專主已理有未當亦不茍從侍御史賈易坐言事出既復監司更赦降知蘇州公謂易論事不避權勢號為敢言更赦除州非允論於簾前未決而御史楊畏來之邵劾公稽留制書公即拜章待罪纍上不許固辭老病八年三月罷為觀文殿大學士集禧觀使九月出知揚州梁燾行狀云右僕射蘇頌中書侍郎范百祿論知宣州賈易直祕閣為權京西轉運以易嘗任侍御史不當帶權字除命未當議别取旨同列多不合至上前燾曰太常祕書皆闕長二願以召易同列謂易小人不可用燾對曰謂易差除不當即可如易剛直人多不喜以易為小人則過矣陛下嘗知其人忠孝往在言路聖諭面奬使之盡節必記其為人行狀載賈易事與頌本傳頗不同附見當考李清臣與許將小簡云容功之罷雖言者乘之殆別有謂非面敘莫悉也當考己巳監察御史來之邵言天章閣待制林希除禮部侍郎按希在元祐初嘗除中書舍人臣僚論希平日受知於宰臣王圭圭薨圭之諸子以圭墓銘屬希既已諾其請而為之文矣然其心以圭非時望所屬不欲自為外示相好之迹乃假李德芻之名及得王氏贈遺則與德芻中分之當時論者以希行誼浮薄不可處之侍從故輟西省之命而假以偏州未幾朝廷授以外制易守餘杭希不能修省圖報而乃喜怒任情不循法度杭州外沙巡檢馬信係左藏庫副使因轉運司委信以治河事希怒信之不關白也遣卒呼至送當直司收勘既無可書之罪也則又釋之吳山有堂曰有美有亭曰介相距數里本無可通之路希一日大發修江兵卒披荆棘夷山谷而使之通焉既而聞術者謂二堂相通不利守臣則又發修江兵卒為之障塞其施設見於政事者如此方且擢二春官入陪法從恐非所以明黜陟示勸沮伏望追寢前命七年十月二十八日除禮侍八年三月初八日出知亳州辛未監察御史黃慶基言南郊赦書將來科場依元祐二年例薦舉經明行修進士此誠朝廷搜求人材慮有遺逸欲取之數路而僥幸之徒因緣請託不容無濫進者向者薦經明行修之士既與免解赴省試及省試不合格又例與特奏名是凡被薦舉者皆可以入官也臣聞元祐二年諸路所薦者甚有不協士論惟福建路薦朱朝倚其人素有學問久為太學職事江西路薦李存其人素有節操纍獲鄉舉如此二人乃可充選傳曰進真賢舉實廉則天下治欲乞朝廷申諭諸路監司郡守凡薦經明行修之士必須精加考察委有術業行誼為鄉黨所尊士論所服者方許奏薦或不如所舉則以貢舉非其人之法坐之庶幾朝廷有得人之效從之八月十七日李堯臣殿舉御史中丞李之純言比歲朝廷十科舉士之令蓋已行之纍年近臣所薦者多而拔用甚少乞委輔臣詳擇稍稍進任其智勇過人可備將帥科多是武臣推舉其類必有可用之人宜加考察是日三省進呈蘇轍所議河事吕大防曰今來軟堰已不可作無可施行轍曰軟堰本自不可作臣本論吳安持百日之間四次妄造事端蘇頌前乞遣官按實是非明示賞罰此言極當乞依此施行安持小人要動搖朝聽若令依舊供職病根不去河朔被害無已不可信用大防曰水官弄泥弄水別用好人不得所以且用安持轍曰水官職事不輕奈何以小人主之易曰開國承家小人勿用未聞有小人可用之地也實録繫之三月二十四日今從潁濵遺老傳及龍川略志移入二月二十四日兵部員外郎崇政殿説書吕希哲為右司諫政目二十四日事新録乃無之希哲固辭之此據希哲家傳政目二月十六日希哲辭諫官蘇軾在邇英見希哲除命戲謂希哲曰法筵龍象當觀第一義希哲笑而不應退謂范祖禹曰若辭不獲命當以楊畏為首時畏方在言路以險詐自任故希哲云爾此亦據家傳壬申端明殿學士兼翰林侍讀學士禮部尚書蘇軾言臣伏見九月二十二日詔書節文俟郊禮畢集官詳議祠皇地祇事及郊祀之歲廟享典禮聞奏者九月十八日戊戌詔此云九月二十二日不知何故臣恭覩陛下近者至日親祀郊廟神祇饗答實蒙休應然則圜丘合祭允當天地之心不宜復有改更臣切怪議者欲變祖宗之舊圜丘祀天而不祀地不過以謂冬至祀天於南郊陽時陽位也夏至祀地於北郊隂時隂位也以類求神則陽時陽位不可以求隂也是大不然冬至南郊祀上帝則天地百神莫不從也古者秋分夕月於西郊亦可謂隂位矣至於從祀上帝則以冬至而祀月於南郊議者不以為疑今皇地祇亦從上帝而合祭於圜丘獨以為不可則過矣書曰肆類于上帝禋于六宗望于山川遍于羣神舜之受禪也自上帝六宗山川羣神莫不畢告而獨不告地祇豈有此理哉武王克商庚戌柴望柴祭上帝也望祭山川也一日之間自上帝而及山川必無南北郊之别也而獨略地祇豈有此理哉臣以是知古者祀上帝則并祀地祇矣何以明之詩之序曰昊天有成命郊祀天地也此乃合祭天地經之明文而説者乃以比之豐年秋冬報也曰秋冬各報而皆歌豐年則天地各祀而皆歌昊天有成命也是大不然豐年之詩曰豐年多黍多稌亦有高廪萬億及秭為酒為醴蒸畀祖妣以洽百禮降福孔偕歌於秋可也歌於冬亦可也昊天有成命之詩曰昊天有成命二后受之成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之終篇言天而不及地頌所以告神明也未有歌其所不祭祭其所不歌也今祭祀於北郊歌天而不歌地豈有此理也哉臣以此知周之世祀上帝則地祇在焉歌天而不歌地所以尊上帝故其序曰郊祀天地也春秋書不郊猶三望左氏傳曰望郊之細也説者曰三望太山河海或曰淮海也又或曰分野之星及山川也魯諸侯也故郊之細及其分野山川而已周有天下則郊之細獨不及五嶽四瀆乎嶽瀆猶得從祀而地祇獨不得合祭乎秦燔詩書經籍散亡學者各以意推類而已王鄭賈服之流未必皆得其真臣以詩書春秋考之則天地合祭久矣議者乃謂合祭天地始於王莽以為不足法臣竊謂禮當論其是非不當以人廢光武皇帝親誅莽者也尚采用元始合祭故事謹按後漢書郊祀志建武二年初制郊兆於洛陽為圓壇八陛中又為重壇天地位其上皆南鄉西上此則漢世合祭天地之明驗也又按水經注伊水東北至洛陽縣圜丘東大魏郊天之所準漢故事為圓壇八陛中又為重壇天地位其上此則魏世合祭天地之明驗也唐睿宗將有事於南郊賈曾議曰有虞氏禘黃帝而郊嚳夏后氏禘黃帝而郊鯀郊之與廟皆有禘也禘於廟則祖宗合食於太祖禘於郊則地祇羣望皆合食於圜丘以始祖配享蓋有事大祭非常禮也三輔故事祭于圜丘上帝后土位皆南面則漢嘗合祭矣時褚無量郭山惲等皆以曾言為然明皇天寶元年二月敕曰凡所祠事必在躬親朕不親祭禮將有闕其皇地祇宜如南郊合祭是月二十日合祭天地於南郊自後有事於圜丘皆合祭此則唐世合祭天地之明驗也今議者欲冬至祀天夏至祀地蓋以為用周禮也臣請言周禮與今禮之别古者一歲祀天者三明堂饗帝者一四時迎氣者五祭地者三饗宗廟者四凡此十五者皆天子親祭也而又朝日夕月四望山川社稷五祀及羣小祀之類亦皆親祭此周禮也太祖皇帝受天眷命肇造宋室建隆初郊先饗宗廟並祀天地自真宗以來三歲一郊必先有事景靈遍饗太廟乃祀天地此國朝之禮也夫周之親祭如彼其多而歲歲行之不以為難今之禮親祭如此其少而三歲一行不以為易其故何也古者天子出入儀物不繁兵衛甚簡用財有節而宗廟在大門之內朝諸侯出爵賞必於太廟不止時祭而已天子所治不過王畿千里惟以齋祭禮樂為政事能守此則天下服矣是故歲歲行之率以為常至於後世海內為一四方萬里皆聽命於上幾務之繁億萬倍於古日力有不能給自秦漢以來天子儀物日以滋多有加無損以至於今非復如古之簡易也今所行皆非周禮三年一郊非周禮也先郊二日而告原廟一日而祭太廟非周禮也郊而肆赦非周禮也優賞諸軍非周禮也自后妃以下至文武官皆得廕補親屬非周禮也自宰相宗室以下至百官皆有賜賚非周禮也此皆不改而獨於地祇則曰周禮不當祭於圜丘此何義也議者必曰今之寒暑與古無異而宣王薄伐玁狁六月出師則夏至之日何為不可祭乎臣將應之曰舜一歲而巡四嶽五月方暑而南至衡山十一月方寒而北至常山亦今之寒暑也後世人主能行之乎周所以十二歲一巡者唯不能如舜也夫周已不能行舜之禮而謂今可以行周之禮乎天之寒暑雖同而禮之繁簡則異是以有虞氏之禮夏商有所不能行夏商之禮周有所不能用時不同故也宣王以六月出師驅逐玁狁蓋非得已且吉甫為將王不親行也今欲定一代之禮為三歲常行之法豈可以六月出師為比乎議者必又曰夏至不能行禮則遣官攝祭亦有故事此非臣之所知也周禮大宗伯若王不與則攝位鄭氏注曰王有故則代行其祭事賈公彥疏曰有故謂王有疾及哀慘皆是也然則攝事非安吉之禮也後世人主不能歲歲親祭故命有司行事其所從來久矣若親郊之歲遣官攝事是無故而用有故之禮也議者必又曰省去繁文末節則一歲可以再郊臣將應之曰古者以親郊為常禮故無繁文今世以親郊為大禮則繁文有不能省也若帷城幔屋盛夏則有風雨之虞陛下自宫入廟出郊冠通天乘大輅日中而舍百官衛兵暴露於道鎧甲具裝人馬喘汗皆非夏至所能堪也王者父事天母事地不可偏也事天則備事地則簡是於父母有隆殺也豈得以為繁文末節而一切欲省去乎國家養兵異於前世自唐之時未有軍賞尤不能歲歲親祠天子出郊兵衛不可簡省大輅一動必有賞給今三年一郊傾竭帑藏猶恐不足郊賚之外豈可復加若一年再賞國力將何以給分而與之人情豈不失望議者必又曰三年一祀天又三年一祭地此又非臣之所知也三年一郊已為疏闊若獨祭地而不祭天是因事地而愈疏於事天自古未有六年一祀天者如此則典禮愈壞欲復古而背古益逺神祇必不顧饗非所以為禮也議者必又曰當郊之歲以十月神州之祭易夏至方澤之祀則可以免方暑舉事之患此又非臣之所知也夫所以議此者為欲舉從周禮也今以十月易夏至以神州代方澤不知此周禮之經耶抑變禮之權耶若變禮從權而可則合祭圜丘何獨不可十月親祭地十一月親祭天先地後天古無是禮而一歲再郊軍國勞費之患尚未免也議者必又曰當郊之歲以夏至祀地祇於方澤上不親郊而通爟火天子於禁中望祀此又非臣之所知也書之望秩周禮之四望春秋之三望皆謂山川在境內而不在四郊者故望而祭也今所在之處俯則見地而云望祭是為京師不見地乎此六議者合祭可否之決也夫漢之郊禮尤與古戾唐亦不能如古本朝祖宗欽崇祭祀儒臣禮官講求損益非不知圜丘方澤皆親祭之為是也蓋以時不可行是故參酌古今上合典禮下合時宜較其所得已多於漢唐矣天地宗廟之祭皆當歲遍今不能歲遍是故遍於三年當郊之歲又不能於一歲之中再舉大禮是故遍於三日此皆因時制宜雖聖人復起不能易也今並祀不失親祭而北郊則必不能親往二者孰為重乎若一年再郊而遣官攝事是長不親事地也三年間郊當祀地之歲而暑雨不可親行遣官攝事則是天地皆不親祭也夫分祀天地決非今世之所能行議者不過欲於當郊之歲祀天地宗廟分而為三耳分而為三有三不可夏至之日不可以動大衆舉大禮一也軍賞不可復加二也自有國以來天地宗廟唯饗此祭纍歲相承唯用此理此乃神祇所歆祖宗所安不可輕動動之則有吉凶禍福不可不慮三也凡此三者臣熟計之無一可行之禮伏請從舊為便昔西漢之衰元帝納貢禹之言毁宗廟成帝用丞相衡之議改郊位皆有殃咎著於史䇿往鑒甚明可為寒心伏望陛下詳覽臣此章則知合祭天地乃是古之正禮本非權宜不獨初郊之歲所當施行實為無窮不刋之典願陛下謹守太祖建隆神宗熙寧之禮無更改易郊祀廟饗以寧上下神祇仍乞下臣此章付有司集議如有異論即須畫一解破臣所陳六議使皆屈伏上合周禮下不為當今軍國之患不可但執周禮更不論當今可與不可施行所貴嚴祀大典以時決定貼黃唐制將有事於南郊則先朝獻太清宫享太廟亦如今禮先二日告原廟先一日享太廟然議者或亦以為非三代之禮臣謹按武王克商丁未祀周廟庚戌柴望相去三日則先廟後郊亦三代之禮也詔集議官集議聞奏合祭六議據東坡集乃稱八年三月空日奏今從實録實録蓋因政和會要也軾又言臣近奏論圜丘合祭天地非獨適時之宜亦自然上合三代六經為萬世不刋之典然臣不敢必以為是故發六議以開異同之端欲望聖旨行下令議者與臣反復詰難盡此六議之是非而取其通者則其議可得而定也今奉聖旨但云令集議官集議聞奏竊慮議者各伸其意不相詰難則是非可否終莫之決雖聖明必有所擇而人各自為一議但欲遂其前説豈聖朝考禮之本意哉臣今欲乞集議之日若所見不同即須畫一難臣六議明著可否之狀不得但持一説不相詰難臣非敢自是而求勝也蓋欲從長而取通也若臣議不通更不廢前説以從衆論此劄子據本集乃三月二十二日奏實録不載今增入范祖禹家傳云朝廷欲從蘇軾之請令議者相詰難祖禹遽白吕大防曰當自朝廷酌其可否行之若使相詰難必致紛爭失體於事何補也大防以為然但批送集議而已按先已送集議軾又奏乞須相詰難尋又罷集議豈用祖禹之言乎然家傳載議郊祀事頗失先後之次今不取罷集議在四月十一日政和會要第三十八卷郊議第四卷元祐八年二月二十五日蘇軾奏六議詔令集議聞奏即載四月十一日罷集議詔不載乞加反覆詰難劄子新録因之今乃掇取增八劉安世嘗語人云軾此議元不曽上誤也或傳曰假託欺詐固當以會要為據政和諸人豈肯虛載軾議乎甲戌知徐州曾肇知江寧府知蘇州賈易知徐州十八日對易當考實録在三月二十五日戶部員外郎胡宗師為成都府路轉運副使國子監丞李師德為梓州路轉運判官三事並政目所有新録無當考詳刪入丙子天章閣待制知陳州趙君錫知鄭州政目三月十六日乃自陳州改鄭州合從實録尚書省檢會市易欠户已降今年正月朝旨每保五百貫已下依赦除放大姓仍不得過三保其已該除放人户更不奏裁外所有其餘諸般係官欠負錢物有一名少欠數窠名者若總計名下逐窠名欠數五百貫以下除放慮恩惠不廣詔每名各隨逐窠名依數除放仍不得過三窠名其已該除放人户更不奏裁法册八年二月二十七日敕今附月末明年二月二十四日可考
