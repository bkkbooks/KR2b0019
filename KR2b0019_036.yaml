body:
  text: 續資治通鑑長編卷三十二宋李燾撰太宗淳化二年春正月先是供奉官殿直有四十年不遷者乙酉始置內殿崇班在供奉官之上左右侍禁在殿直之上差定其俸給以次授之改殿前承旨為三班奉職端拱中置借職承旨於是改為三班借職舊有文班承旨率以貢舉有材武試弓箭中選者為之端拱後各遷秩或物故因不置上嘗與近臣論將帥因言前代武臣難為防制茍欲移徙必先發兵偹禦然後降詔若恩澤始息稍似未遍則四方藩鎮如羣犬交吠周世宗時安審琦自襄陽來朝喜不自勝親幸其第今且無此事也吕蒙正曰上之制下如臂使指乃為合宜儻尾大不掉何由致理上曰今之牧伯至于士卒盡識朕意茍稍聞愆負固無矜恕之理所以人人各務檢身也王沔曰周李穀以宰相招討淮南卒無顯效上曰朕當時在兵間偹覩之矣穀但深居髙處列校稀見其面茍見之則直省吏揖而進以介胄之士為趨揖之容甚踈濶也當拔寨之際非李重進以徑卒授之幾狼狽矣二月上修正殿頗施彩繪左正言直史館謝泌上疏諫癸丑命悉去彩繪塗以赭堊丁巳涼州觀察使判雄州事劉福卒贈太傅忠正節度使福武人不知書御下有方略為政簡易人甚便之在雄州五年境內寧謐百姓遮轉運使願追述治迹以其狀聞詔許立遺愛碑於牙門外福既貴諸子嘗勸福建大第福怒曰我受祿甚厚足以僦舍庇汝曹固當以身許國未有尺寸之效以報恩豈可營居第為自安計乎卒不許沒後上聞其言以白金五千兩賜其子令市宅以居焉三司嘗建議劍外賦稅輕詔監察御史張觀乘傳按行諸州因令稍增之觀上疏言逺民易動難安専意撫之猶慮其失所况增賦以擾之乎設使積粟流行用輸京師愈煩漕挽之力固不可也分兵就食亦非全安之策徒斂怨于民未見國家之利上深善其言因留不遣其後觀復上疏言臣慿藉光寵偹位風憲每遇百官起居日分立于庭司察不如儀者舉奏之因見陛下天慈優容多與近臣論政德音往復頗亦煩勞至于有司職官承意將順簿書叢脞咸以上聞豈徒褻瀆至尊實亦輕紊國體况帝王之道動則左史書之言則右史書之列於緗素垂為軌範不可不謹也若夫方今之急者丐奴未滅邉鄙猶聳隂陽未序倉廩猶虛淳朴未還奢風尚熾縣道未治逋逃尚多刑法未措禁令猶密墜典未復封祀猶闕凡此數者朝廷之急務也誠願陛下聽斷之暇宴息之餘禮貌大臣與之揚榷使沃心造膝極意論思則治體化源何所不至臣又嘗讀唐史見貞觀初始置崇文館命學士耆儒更直互進聽朝之隙則引入內殿講論文義商榷時政或日旰忘倦或宵分始罷書諸信史埀為不朽况陛下左右前後皆端士偉人幸望端拱凝旒收視反聽釋尋常之務飬浩然之氣深詔近臣闡揚真風上為祖宗播無疆之休下為子孫建不拔之業自然成康文景不獨専美于昔時堯舜禹湯自可追蹤于今日與夫較量金穀割析毫釐以有限之光隂役無涯之細務者安可同年而語哉上覽而善之召賜五品服以為度支判官閏二月以鄭文寶為陜西轉運使許便宜從事恣用庫錢會歲歉文寶誘豪民出粟三萬斛活飢者八萬六千餘人戊寅祕書監李至進新校御書三百八十卷上因從容謂之曰人之嗜好不可不戒不必逺取前古祗如近世符彥卿纍任節鎮以射獵馳逐為樂于是近習窺測其意爭獻鷹犬彥卿恱而假借之其下因恣橫侵擾故知人君當淡然無欲勿使嗜好形見於外則姦佞無自入焉朕年長他無所愛但喜讀書多見古今成敗善者從之不善者改之斯已矣至拜舞稱賀庚辰以瀛州防禦使安守忠知雄州守忠嘗與僚屬宴飲有軍校謀變衷甲及門閽吏狼狽入白守忠言笑自若徐顧坐客曰此輩酒狂耳即時擒獲人頗服其量己丑詔京城無賴輩相聚蒲博開匱坊屠牛馬驢狗以食銷鑄銅錢為器用雜物令開封府戒坊市謹捕之犯者斬匿不以聞及居人邸舍僦與惡少為匱坊者同罪是月命翰林學士賈黃中蘇易簡幹當差遣院李沆同判吏部流內銓學士領外司自此始也史臣梁周翰論其失當今不取內出御製飛天蛾大海求眀珠二碁勢示三館學士皆不能曉上召中使裴愈授以指要史館修撰范杲等相率上表稱謝三月己巳上以歲旱蝗手詔吕蒙正等曰元元何罪天譴如是蓋朕不德之所致也卿等當於文德殿前築一臺朕將暴露其上三日不雨卿等共焚朕以答天譴蒙正等惶恐謝罪匿詔書翌日而雨蝗盡死先是上召近臣問時政得失樞密直學士冦凖對曰洪範天人之際其應若響大旱之徵蓋刑有所不平頃者祖吉王淮皆侮法受賕贓數萬計吉既伏誅家且籍沒而淮以參知政事沔之母弟止杖于私室仍領定逺主簿用法輕重如是亢暵之咎殆不虛發也上大悟明日見沔切責之是月翰林學士宋白等上新定淳化編敕三十卷夏四月庚午朔詔罷端州歲貢石硯辛巳以樞密副使張齊賢給事中陳恕並參知政事宣徽此院使簽書樞密事張遜為樞密副使樞密直學士溫仲舒冦凖並為樞密副使樞密副使張宏罷為吏部侍郎宏懦謹無他策略居內廷見胥吏必先勞揖性吝嗇好聚蓄不為時所重度支使李惟清為鹽鐡使惟清嘗以帳式奏御上曰費用若此民力久何以堪曷由簡省即便裁度惟清曰比開寶興國之際其數倍多蓋以邉事未寧屯兵至廣臣觀將帥誠未得人臣聞漢有衛青霍去病唐有郭子儀李晟西戎北敵望而畏之如此則邉事息而支用減矣望國家精擇將帥以有威名者護塞庶節費上曰此一時也彼一時也今之玁狁羣衆變詐與古不同朕每計之自有成算至于選用將帥亦須深體今之機宜如韓彭雖古名將若以彼時之見便欲制今之敵亦恐不能成功名今縱得其人未可便如往時委之能成功業此乃機事卿所未悉初趙普出守西洛吕蒙正以寬簡自任王沔怙恩招權政事多決于沔沔先與張齊賢同被進擢掌機務頗不叶齊賢出守代州沔遂為副使參知政事陳恕管鹽鐡性苛察亦嘗與沔忤於是齊賢與恕並在中書沔心不自安慮羣官有以中書舊事告齊賢等己丑左司諫知制誥王禹稱上言請自今羣官詣宰相及樞密使並須朝罷于都堂請見不得于本廳延揖賔客以防請託沔喜即白上施行之仍令御史臺宣布中外左正言直史館謝泌上言以為如此是疑大臣以私也書云任賢勿二去邪勿疑張説謂姚元崇外則踈而接物內則謹以事君此真得大臣之體今天下至廣萬機至繁陛下以聰明寄於輔臣茍非接見羣官何以悉知外事若令都堂候見則羣官請見咨事無時是大臣常須百執事于都堂無解衣之暇古人有言曰疑則勿用用則勿疑若政在大夫祿去公室國祚衰季強臣擅權當此之時可以為慮今陛下鞭撻宇宙總覽豪傑朝廷無巧言之士方靣無姑息之臣禮樂征伐自天子出書云無偏無黨王道蕩蕩今日之謂也奈何疑執政大臣為衰世之事乎昔孔光不言溫室中木顧雍封侯三日家人不知謝安石對客圍碁捷書至而客不覺大臣當謹密如此雖妻子猶不得聞况他人乎使非其人當斥而去之既得其人任之以政又何疑也設若杜公堂請謁之禮豈無私室乎塞相府請求之門豈無他徑乎此非陛下推赤心以待大臣大臣展四體以報陛下之道也王禹稱識量庸淺昧于大體妄率胸臆以蔽聰明狂躁之言不可行用上覽奏嘉歎即命追還前詔仍以泌所上表送史館國初不喜人附會權勢故大臣不于私第見客百官亦罕造門只詣中書請謁日不下百輩宰相動至午際不得就食敕牒或未印署堆積几案政事停壅其中干以私者蓋十八九議者以禹稱所論不為不當但病其須于政事堂邀宰相相見為難爾此據章德象會要王圭因之當考五月乙巳復置折博倉折博倉即折中倉也端拱二年九月初置尋以歲旱中止今仍復之左正言謝泌數奏章論時政得失上嘉其忠藎丙辰擢左司諫賜金紫并錢三千萬泌一日得對便殿上復靣加賞激泌謝曰陛下從諫如流故臣得以竭誠昔唐末有孟昭圖者朝上諫疏暮不知所在前代如此安得不亂上動容久之六月甲戌忠武節度使同平章事潘美卒贈中書令諡武惠乙酉汴水決浚儀縣壞連堤泛民田上昧旦乘步輦出乾元門宰相樞密使迎謁於路上謂曰東京飬甲兵數十萬居人百萬轉漕仰給在此一渠水朕安得不顧車駕入泥淖中行百步從臣震恐殿前都指揮戴興叩頭懇請車駕回興遂捧承步輦出泥淖中詔興督步卒數千塞之日未昳而堤岸屹立水勢遂定始就次太官進膳親王近臣皆泥濘沾衣知縣事宋炎亡匿不敢出上特赦其罪丁亥詔右正言直史館王世則殿中丞直史館王旦張復殿中丞直集賢院程宿贊善大夫史館檢討兼祕閣校理杜鎬祕書郎直史館李宗諤等檢討皇太子親王皇族后族等故事仍令史館修撰賈黃中等編録進呈復開封人也都官員外郎知雜事范陽張都上言正衙之設謂之外朝羣臣辭見及謝皆先詣正衙見訖御史臺具官位姓名以報閣門方許入對此國家舊制也自乾德以後始詔先赴中謝後詣正衙至今有司遵行而文武官中謝辭見之後多不即詣正衙致朝經之隳廢欲望自今內外官中謝後次日並赴正衙內諸司遙領刺史者及閣門通事舍人已上新授者皆同百官例並赴正衙辭謝出使急速免衙辭者亦須具狀報臺違者罰一月俸都又言案令式每假日百司不奏事陛下憂勤萬機雖遇旬假亦親聽斷邇來文武百官多就假日辭謝貴就便坐以免舞蹈之儀望自今假日除內職級將校閣門不得引接辭謝其受急命者不在此限又言內殿起居百官皆露立于廊廡之下望自今前一日設幕次于閣門外及復令御史重戴詔皆從之重戴者大裁帽之遺象也本巖叟野夫之服以帛為之後魏文帝自雲中徙代以賜百僚國初但御史服之其後詔兩省及尚書省五品以上皆服樞密三司使副則否太宗初即位申嚴正衙辭謝之制張都至今猶以為言豈太平興國之詔蓋未施行故耶當考秋七月己亥上謂三司使李惟清等曰夫貨財所以濟用度或取之不以其道違朕惠養庶民之意豈能召和氣乎當共務均節無致厚斂于下己亥初二日也本紀専著上語不因他事實録無之寶訓則以此語繫之端拱二年二月李惟清請調河南民運糧之後不知寶訓何據然寶訓于年月先後或多不得其實本紀又専著此必不妄今從之李繼遷聞翟守素將兵來討恐懼奉表歸順丙午授繼遷銀州觀察使賜以國姓名曰趙保吉保吉又薦其親弟繼沖上亦賜姓改名保寧授綏州團練使封其母罔氏西河郡太夫人王禹稱草繼遷詔詞先是祠祀文命著作局官屬臨事撰進多不合典禮祕書監李至撰成數百道號正辭録凡三卷以進詔永為定式八月丁卯朔詔兩浙諸州先是錢俶日募民掌𣙜酤酒醨壞吏猶督其課民無償湖州萬三千三百四十九瓶衢州萬七千二百八十三瓶台州千一百四十四石越州二千九百四石七斗並毁棄之勿復責其直上欽恤庶獄慮大理刑部吏舞文巧詆己卯置審刑院于禁中以樞密直學士李昌齡知院事兼置詳議官六員凡獄具上奏者先由審刑院印訖以付大理寺刑部斷覆以聞乃下審刑院詳議中覆裁決訖以付中書當者即下之其未允者宰相復以聞始命論決蓋重謹之至也會要稱法官議覆居道安獄依違鹵莽皆坐遷謫因置審刑院今實録八月己卯初置審刑院己卯十二日也九月戊戌王禹稱等始免官戊戌初二日也先後或失其序豈禹稱等繫獄二十餘日乃論決耶不然會要誤也今但依實録所書更須考之司馬光記聞稱趙普出鎮太宗患中書權太重且事衆宰相不能悉領理向敏中時為諫官上言請分中書刑房置審刑院按實録向敏中雖以左司諫知制誥初不聞有此議國史及他書亦弗載不知光何所據也且置審刑院其意不過欽恤庶獄耳豈能分中書權省其事耶疑此説或誤更須考之楊億談苑但云審刑院本中書刑房宰相所領之職于是析出亦不云中書權太重故也丁亥并州言戎人七十三户四百餘口內附上因謂近臣曰國家若無外憂必有內患外憂不過邉事皆可預防惟姦邪無狀若為內患深可懼也帝主用心常須謹此九月丁丑户部侍郎參知政事王沔給事中參知政事陳恕并罷守本官初給事樊知古屢任轉運使甚得時譽及為户部頻以職事不治詔書切責名益減與恕親善上每言及計司事有乖違者恕具以告之欲令知古盡力知古後因奏對遂自解上問知古何從得此知古曰陳恕告臣上怒恕泄禁中語嫉知古輕脫并知古皆罷之沔以弟淮故數為樞密副使冦凖所詆上亦寤沔任數好詐非廊廟器遂與恕同日俱罷沔奉詔見上涕泣不願離左右不數日鬚鬢皆白上嘗謂近臣曰屢有人言儲二事朕頗讀書見前代治亂豈不在心且近世澆薄若建立太子則宫僚皆須稱臣宫僚職次與上臺等人情之間深所不安蓋諸子沖幼未有成人之性所命寮屬悉擇良善之士至于臺𨽻輩朕亦是揀選不令姦險巧佞在其左右讀書聽書咸有課程待其長成自有裁制何言事者未諒此心耶于是左正言度支判官宋沆等五人伏閣上書請立許王元僖為皇太子詞意狂率上怒甚將加竄殛以懲躁妄而沆又宰相吕蒙正之妻族蒙正所擢用己亥制詞責蒙正以援引親昵竊祿偷安罷為吏部尚書初溫仲舒與蒙正同年登第情契篤密仲舒前知汾州坐私監軍家婢除籍為民窮棲京師者屢年蒙正在中書極力援引遂復籍驟被任遇反攻蒙正蒙正以之罷相時論醜之命左僕射李昉兼中書侍郎參知政事張齊賢為吏部侍郎並平章事翰林學士賈黃中李沆并為給事中參知政事沆初判吏部銓因侍曲宴上目送之曰李沆風度端凝真貴人也不數月遂與黃中俱蒙大用上嘗召見黃中母王氏命坐謂曰教子如是真所謂孟母矣作詩賜之頒賜甚厚庚子以右諫議大夫權御史中丞王化基為御史中丞化基嘗慕范滂攬轡澄清之志獻澄清略言五事其一復尚書省曰國家立制動必法天並建官屬以尊王室且尚書省上應天象對臨紫垣六卿擬喉舌之官郎吏應星辰之位斯實乾文昭著政事具明方今省曹之名未稱朝廷之盛夫三司吏額乃近代權制判官推官勾院開拆磨勘慿由理欠孔目勾押前行後行皆州郡官司吏局之名也臣今請廢三司止于尚書省設六尚書分掌其事廢判官推官設郎官分掌二十四司及左右司公事使人掌一司廢孔目勾押前行後行為都事主事令史書令史廢勾院開拆磨勘慿由理欠等同歸比部及左右司如此則事益精詳且盡去其州郡職局鄙俗之名也六卿如闕本官即選名品相近有才望者權其尚書郎官如闕本官即于兩省三院選明幹有清望者依資正除所貴尚書省無駁雜之官其二十四司公事若繁簡不同望下本官屬參酌其類均而行之其二謹公舉曰朝廷頻年下詔以類求人但聞例得舉官未見擇其舉主欲望自今别立名籍先擇朝官有聲望者各令保舉所知其舉到職官員數仍置簿籍并舉主名姓録在籍中其受舉之官如經任使實著亷能所司舉行賞典特旌舉主若所舉官貪贓敗露舉主並當連坐臣又思陛下自登寶位十有餘年七經掄選甚得英俊竊慮久沉下位或處逺官望令採訪及州長吏察亷以聞次第升擢亦同置籍中其三懲貪吏曰夫貪吏臨民其損甚大或則屈法或則濫刑或因公以逼私或緣事以行虐使民受弊甚于蠧焉蠧盛則木空吏貪則民弊若乃不求人聽不以法繩則夷齊不能守正亷之規顔閔不能持德行之操蓋中人以降其性如水器方則方器圓則圓固無定質悉由拘制也望令諸路轉運使副兼採訪之名令覺察部內州府監軍長吏候澄清一部見其實效到闕日待以殊常不次之命置以殿廷侍從之名所貴顧問知四方之事抑亦勸外官之求治也其四省冗官曰昔唐虞建官惟百亦克用又故曰官不必備惟其人斯乃率從簡易去其煩擾也國家封疆民物廣逾前世恢張萬務分設庶官方之近朝實倍常數意欲豐財厚利盡入牢籠其如蠧國耗民轉加殘弊臣嘗思二十年前客遊江淮諸郡其間揚楚最曰衝要水陸兩途咽喉數國務穰事衆地廣民繁然止設知州一人在衙區分其餘通判本州推官及州官等並皆分掌鹽鐡商稅倉場庫務當時亦聞辦集兼少刑獄爭訟臣昨十年前任揚州職官時見朝廷添置監臨事務及朝廷使臣等有逾本州數倍實恐天下諸州似此繁多慮傷費用兼長刑名今以朝官諸色使臣及縣令簿尉等所費髙卑相半折而計之一人月費不翅十千以千人約之歲計用十餘萬更倍約之萬又過倍此或皆是亷白之吏止傷于公府之費爾若或貪婪之吏布于天下則兼更取於民間者又數倍焉祖吉之類是也如此則得非蠧國耗民乎望令逐部轉運使副與知州同議裁減及諸縣令簿尉等自前多不置縣尉以主簿兼之亦乞令相度廢省其五擇逺官曰負罪之多人非良善或貪婪殘暴凶狠踰違若授以逺地親民之官或秉性不悛用情自任事欺遐僻毒縱傷殘逺民罹殃卒莫上訴甚非撫人懷逺之意也望自今凡負罪之人不許任四川廣南為長吏書奏上嘉納其言即有意大用辛丑責宋沆為宜州團練副使甲辰以樞密副使張遜知樞密院事溫仲舒冦凖同知院事知院之名自此始遜仲舒凖仍並帶副使自後或以正官或檢校官為之秩與副使同初宋沆與左正言尹黃裳馮拯右正言王世則洪湛共伏閣請立皇太子沆既先黜乙巳命黃裳知雍州拯知端州世則知象州湛知容州黃裳世則湛皆直史館並解其職湛上元人也上聞殿中丞郭延澤右贊善大夫董元亨皆好學博通典籍詔宰相召問經史大義條對稱旨冬十月丁卯並命為史館檢討延澤廷謂之子也董元亨附延澤傳未見邑里辛巳翰林學士承旨蘇易簡續翰林志二卷以獻上嘉之賜詩二章紙尾批云詩意美卿居清華之地也易簡願以所賜詩刻石昭示無窮上復為真草行三體書書其詩命待詔吳文賞刻之因遍賜羣臣又飛白書玉堂之署四大字令中書召易簡付之榜於廳額上曰此永為翰林中美事易簡曰自有翰林未有如今日之榮也左諫議大夫韓丕起寒素以沖淡自處不奔競于名官上甚嘉重之己丑命丕守本官知制誥為翰林學士十一月丙申詔自今內殿起居日復令常參官兩人次對閣門受其章實録云漢乾祐三年給事中陶穀奏乞停五日轉對皇朝因之遂無轉對之事至是上勵精求理務廣言路始復舊制按太祖新舊録及本紀建隆三年二月甲午詔自今每遇內殿起居百官以次轉對然則轉對舊制在太祖時己復不知錢若水何所據乃云遂無也新録亦若水所修那得如此差謬意者太祖雖復舊制行之未久仍廢至是仍復舉行若水考之不詳故耳建隆三年八月丙戍朔御崇元殿文武百官入間工部尚書竇儀待制太常卿邉光範次對禮畢賜廊食明年夏四月壬午朔工部侍郎艾穎待制給事中馬士元次對八月庚辰朔給事中劉載待制諫議大夫崔頌次對其後遂不復書乾德四年夏四月丙申朔又書御殿入閣賜食如常儀但不見次對官姓名疑次對自此却停至淳化二年始復故今若水誤記也直云遂無轉對之事亦誣矣庚戌左諫議大夫史館修撰楊徽之次對上言方今文士雖多通經者甚少願精選五經博士增其員各専業以教胄子此風化之本上顧謂宰相曰徽之操履無玷真儒雅之士出理州郡非其所長置之館殿正得其宜矣刑部郎中知制誥范杲數致書宰相求入翰林為學士又嘗出制誥一編示李昉曰先公謂杲才任學士故以此付杲不敢失墜昉每開釋之於是獻玉堂記請備其職上惡其躁競終不使居內署改右諫議大夫出知濠州以考功員外郎知制誥畢士安為翰林學士初執政欲用右諫議大夫張洎因對言洎文學久次不在士安下上曰極知洎文學資任不下士安第德行不及耳執政乃退上以入閣舊圖承五代草創禮容不備於是命史館修撰楊徽之等討論故事别為新圖十二月丙寅朔遂行其禮于文德殿實録又云唐敬宗始于紫宸殿展入閣之禮而五代以來諸事草創禮容多闕國朝久廢其禮至是始復舊制謹按太祖即位之年八月朔御崇元殿文武入閣仗衛如儀既罷賜百官廊食至乾德四年四月朔猶講其禮非久廢也太宗太平興國二年詔以八月一日入閣會雨而止淳化二年十二月一日乃復行之若水倘指太宗朝則可耳右諫議大夫張洎既與徽之等同撰定新儀又獨奏疏曰竊以今之乾元殿即唐之含元殿也在周為外朝在唐為大朝冬至元日立全仗朝萬國在此殿也今之文德殿即唐之宣政殿也在周為中朝在漢為前殿在唐為正衙凡朔望起居及册拜妃后皇子王公大臣對四夷君長試制策舉人在此殿也今之崇德殿即唐之紫宸殿也在周為內朝在漢為宣室在唐為上閣即隻日常朝之殿也東晉太極殿有東西閣唐置紫宸上閣法此制也且人君恭已南面向明紫微黃屋至尊至重故巡幸則有大駕法從之盛御殿則有鈎陳羽衛之嚴故雖隻日常朝亦須立仗前代謂之入閣儀者蓋隻日御紫宸上閣之時先于宣政殿前立黃麾金吾仗俟勘契畢喚仗即自東西閣門入故謂之入閣今朝廷且以文德正衙權宜為上閣甚非憲度况國家丕承正統宇內洽和凡百憲章悉從損益惟視朝之禮尚屬因循竊見長春殿正與文德殿南北相對伏請改創此殿以為上閣作隻日立仗視朝之所其崇德殿崇政殿即唐之延英殿是也為雙日常時聽政之所庶乎臨御之式允叶前經今輿論乃以入閣儀注為朝廷非常之禮甚無謂也臣又案舊史中書門下御史臺為三司謂侍從供奉之官今起居日侍從官先入殿庭東西立定俟正班入一時起居其侍從官東西列拜甚失此面朝謁之儀請凖舊儀侍從官先入起居畢分行侍立于丹墀之下謂之蛾眉班然後宰相率正班入起居雅合於禮臣又聞古之王者躬勤庶務其臨朝之疏數視政事之繁簡唐初五日一朝景雲初始修貞觀故事自天寶兵興之後四方多故肅宗而下咸隻日臨朝雙日不坐其隻日或遇大寒盛暑隂霪泥濘亦放百官起居雙日宰相當奏事即時特開延英召對或蠻方入貢勳臣歸朝亦特開紫宸引見陛下自臨大寶十有五年未嘗一日不雞鳴而起聽天下之政雖剛健不息固天德之常然而遊焉息焉亦聖人之謨訓倘君父焦勞于上臣子緘默於下不能引大體以爭則忠亮之心有所不至矣臣欲望陛下依前代舊規隻日視朝雙日不坐其隻日遇大寒盛暑陰霪泥濘亦放百官起居其雙日於崇德崇政兩殿召對宰臣常參官以下及非時蠻方入貢勳臣歸朝亦特開上閣引見並請凖前代故事處分奏入不報辛卯翰林學士承旨蘇易簡於本院會學士韓丕畢士安祕書院李至史館修撰楊徽之梁周翰知制誥柴成務吕佐之錢若水王旦直祕閣潘謹修翰林侍書王著侍讀吕文仲等觀御飛白書玉堂之署四字並三體書詩石上聞之賜上尊酒太官設盛饌丕等各賦詩以記其事宰相李昉張齊賢參知政事賈黃中李沆亦賦詩以貽易簡易簡悉以奏御上謂宰相曰蘇易簡以卿等詩什來上斯足以見儒墨之盛學士之貴也可别録一本進入以其本賜易簡先是左司諫直史館謝泌奉詔發解國子學舉人黜落既多羣聚喧詬懷甓以伺其出泌知之潛由他徑入史館數宿不敢歸請對自陳上問何官騶導嚴肅都人畏避有以臺雜對者癸亥命泌為虞部員外郎兼侍御史知雜事國子學發解舉人别敇差官主之蓋自泌始也是歲女真首領伊勒錦等上言契丹怒其朝貢中國去海岸四百里立三柵柵置兵三千絶其朝貢之路于是航海入朝求發兵與三十首領共平三柵若得師期即先付本國願聚兵以俟上但降詔撫諭而不為出師其後遂歸契丹時定安國王子大元因女真使上表後亦不復至上又以渤海不通朝貢詔女真發兵攻之凡斬一級賜絹五匹為賞
