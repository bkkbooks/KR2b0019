body:
  text: 續資治通鑑長編卷三百八十六宋李燾撰哲宗元祐元年八月乙巳六部言皇帝問皇太妃起居合用箋皇太妃答皇帝用書今來明堂宿殿當用上儀從之丙午詔將來明堂刑部留郎官一員免赴受誓戒專一行遣斷勑文字其支賜依例給今後凖此右司諫蘇轍言臣今年二月曽上言朝廷初行差役之法其間衙前一役最為重難民間所苦宜以賣坊場錢及坊郭官户寺觀單丁女户所出役錢量行裁減雇募衙前以免民間重役之害後來蒙朝廷差臣兄軾詳定役法軾議論與臣無異致與本局商量不合陳乞罷免尋蒙朝廷依軾所乞臣以兄弟之嫌未敢再有論列今竊聞監察御史陳次升奏以役法大要未定人情熒惑乞敕詳定役法所疾速議定合差合雇色額及官户寺觀單丁女户等合出役錢則例先次施行其州縣事體不同難以直行處分者候諸處申到相度裁定蒙聖旨批送詳定役法所臣看詳次升所言役人合差合雇色額及官户寺觀單丁女户合出役錢則例實係役法要節當今所宜先定其詳定役法所並不公心定奪奏稱準元祐元年二月七日敕應天下免役錢一切並放其諸色役人並依熙寧元年以前舊法定差及七月三日朝旨司馬相公申明指揮招差役人大要已定終不明言何役合差何役合雇至於官户寺觀單丁女户合出役錢只言七月三日朝旨未得施行亦不明言合如何立為則例據此奏陳但務求合取容雖言事官所陳更不講論曲直况司馬光雖為宰相而君前臣名禮有定分今詳定役法所乃於奏狀中謂光為司馬相公茍申私敬不顧上下之禮曲意推奉一至於此而朝廷望其能别白是非立為成法亦已難矣臣恐此風一扇臣主之分自此陵夷不惟朝廷之害亦非所以安光之道也謹按詳定役法官皆侍從儒臣不容不知朝廷儀式伏乞取問奏狀中不名宰相出何典法及勒令早定役人合差合雇色額及坊郭官户寺觀單丁女户合出役錢則例申奏行下令民户早知定法不知惶惑七月三日指揮不見恐即是司馬光六月二十八日所奏至七月三日乃行出也九月十八日始立坊郭等助役法丁未刑部郎中王振為大理少卿二十六日王覿云云二十七日劉摰上官均云云擢趙普曽孫西京左藏庫使思明為西上閣門副使從劉摰等薦也內侍省押班馮宗道梁惟簡並添差勾當皇城司中書侍郎張璪以疾辭明堂儀仗使詔知樞密院安燾代之尚書左丞李清臣鹵簿使尚書右丞吕大防橋道頓遞使詔今來明堂諸軍素隊樂不作罷支賜詔吏部今後選走馬承受依舊條選無過犯人仍令門下中書後省别立法以聞禮部言太常寺協律郎榮咨道奏天子之樂合用玉磬先帝詔臣製造請今後廟堂之上依舊用編鐘玉磬登歌今年親祀明堂便可施用所貴章明盛典從之户部言出賣戶絶田宅已有估覆定價欲依買撲坊場罷實封投狀從之據劉安世言元年六月七日有敕罷實封買撲坊場法而實録乃於十一月四日方載之今八月二十二日已書依坊場罷實封則是實録先後差誤已取十一月四日事載六月七日詔應諸路轉運使副除河北河東路陜西京東京西淮南兩浙成都府路外其餘路分許差判官兩員户部言在京錢榖文帳已發歸本部外餘見係轉運提刑司點磨文帳請自今並上本部從長二摘取選吏點磨從之蘇軾云七月二十四日請帳法一切如舊此蓋不從其言也詔溫州團練副使沈起監南嶽廟政目二十二日事他書無之當考龍圖閣待制知揚州楊景略卒戊申荆湖北路都鈐轄轉運司言誠州大由楊溪古鐵地林吉狼等洞與西道胡耳塞溪事理不同廪給已依沅州先定錢數勘給若非時官有改易即乞依奏請并所統治事乞依誠州先招納歸明溪洞例其舒守疆等二十一人著籍本州勾當各乞依元補名目并請受按本處則例支給從之詔外監事令太僕寺依元羣牧司法施行此據王存目奏舊録在九月十一日并月末可考己酉皇太妃兄東頭供奉官守寄班祗候任瑜特差充在京新城外北面同巡檢不為例詔編修會要所檢閲文字陳知彥特改次等官從鄧溫伯等薦也詔近降下陜西河東路巡綽探事賞格內獲級人每三級升一資改作兩級重傷人及三次與轉一資改二次新本無此詔強盜州縣力不能制或凶惡臣蠧十人以上先選募本州不係將兵收捕不足或無即牒將官選募軍馬非將副駐劄處知州選募仍捕盜官統之若軍馬二百人以上牒將副一員親行並聞奏違者委安撫總管鈐轄司奏劾著為法樞密院言將官兼都監緣兵馬司事務內有例合申逐將者恐於理未便及邊要州軍并人使經由道路若一例差兼却減本處兵官亦慮闕事欲除邉要州軍及人使經由道路更不差兼外京東青州第四將鄆州第五將齊州第六將曹州第八將京西穎川府第二將河陽第三將陳州第四將鄧州第六將河東汾州第三將潞州第五將第六將晉州第七將第八將岢嵐軍第十一將河北冀州第七將陜西河中府鄜延第八將永興軍涇原第十一將淮南亳州第一將荆南第七將並差副將一員兼本處都監遇全將差撥令本路轉運司相度如合差官權即選見任官一員兼權都監或待闕合入親民資序使臣權充候本將回日依舊其晉潞州只令下番將一員兼都監從之新本削去辛亥宰臣司馬光言先舉孫準行義無闕堪充館閣聞準與妻黨訟坐罰金舉非其人請連坐上批還其奏曰準緣私家小事罰金安有連罪光又言臣舉狀稱準行義無闕今準閨門不睦妻妾交爭是行義有闕於臣為舉非其人臣不敢逃刑况臣近奏設十科或有不如所舉其舉主從貢舉非其人律科罪雖見為執政朝廷所不可輟者亦須降官示罰臣備位宰相身自立法首先犯之此而不行何以齊衆乞如臣所奏從貢舉非其人律施行所貴率厲羣臣審謹所舉不從尋詔準更不召試館職右司諫蘇轍言臣三月中奏乞令汴口以東州縣各具水匱所占頃畝每歲有無除放二稅仍具水匱之可與不可廢罷如決不可廢即當如何給還民田以免怨望尋蒙朝旨令都水監差官相度到中牟管城等縣水匱元舊浸壓頃畝及見今積水所占及退出數目應退出地皆撥還本主應水占地皆以官地對還如無田可還即給還元估價直聖恩深厚棄利與民無所靳惜所存甚逺然臣訪聞水所占地至今無官地可以對還而退出之田亦以迫近水匱為雨水浸淫占壓未得耕鑿知鄭州岑象求近奏稱自宋用臣興置水匱以來元未嘗以此水灌注清汴清汴水流自足不廢漕運乞盡廢水匱以便失業之民臣愚以為信如象求之言則水匱誠可廢罷欲乞朝廷體念二縣近在畿甸民貧無告特差無干礙水部官重行體量若信如象求所請特賜施行不勝幸甚又言臣竊聞監察御史上官均上言極論官冗之弊已蒙朝上降付給舍左右司看詳施行臣伏見祖宗舊法凡蔭補子弟皆限二十五歲然後出官及進士諸科釋褐合守選人并州縣選人除司理司法縣尉外得替日皆合守選逢恩放選乃得注官所從來久逺仕者習以為常雖涉歲月不以為怪及見先朝患天下官吏不習法令欲誘之讀法乃令蔭補子弟不復限二十五歲出官應係選人皆不復守選並許令試法通者注官自是天下官吏皆爭誦律令於事不為無益然人既習法則試無不中故蔭補者例減五年而選人無復選限遂令吏部員多闕少差注不行訪聞見今已使元祐四年夏秋季闕官冗之患亦云極矣臣愚以為方人未習法誘以免選於理亦宜及其既習雖無免選不患不習且為吏而責之讀法本事之當然不為過也謂宜追復祖宗守選之舊而選滿之日兼行先朝試法之科此亦今日之便也欲乞以臣所言付給舍左右司一處看詳立法均言朝廷設官分職所以治事才者任用則職修而事治才者不用則事紊而職廢才否並用則政事之不治者常半今之士大夫列於版籍者可謂至冗矣京官自承務郎至朝議大夫凡二千八百餘人選人一萬餘人大使臣二千五百餘人小使臣一萬三千餘人舉天下之員闕不足以充入仕之人故吏部左右選用闕京朝官及大小使臣大率一年以上選人須及二年以上或三年而闕次之逺者莫如選人大抵一官之闕在任與夫已授而又擬之者凡三人故自得替如不該移令待試法之中否須近一年而後擬差必待闕三年而後就職七年之間方成一任京朝官待次幾一年而得差遣待闕一年然後就職五年之間方成一任以常人言之三十而仕又十五年而改官至七年而致政共成七任耳又况三十未必仕仕者未必皆至七十而又有不幸私故陷於吏議年雖及之未必滿七任也故舉天下之士大夫其才可以治事不至曠職者未必及半就令及半居間之日常多而治事之日常少此天下之郡縣所以不治閭井之民未純被朝廷之德澤者良以此也臣以為欲郡縣之治在夫才者居職欲才者居職在乎使其居間之日少欲其居間之日少在乎清入仕之源竊觀今之自文職入流者凡四進士補蔭與夫納粟得官百司胥史是也自武職入流者凡三武舉補蔭與夫百司胥史是也計其才行可以居官治事者納粟胥史不如補蔭補蔭不如進士武舉何以言之為進士者自十歲就學加之十年而後能治經閲史綴緝文詞又加之十年而後能問學通博成就其志其學可謂勞矣及夫有司試之必擇其明逹義理而稍工文詞者方得薦送又求其尤者始預禮部之選又加廷試而後賜第擇之可謂詳矣三年一舉士舉天下學者羣試於有司亡慮數萬人而賜第者僅五百人取之可謂至艱矣彼貴逰子弟恃其父兄之蔭補類多驕惰不學但僅通經義稍成文詞者則必中選就令屢試不中年及三十亦得出仕其視進士篤志講學趣操自立宜有間矣百司胥史主行文書積年寡過例該祿仕又豪右之家以資授官其才品庸下素不知義又外臺郡守奬薦之所不及彼固分甘自處於卑賤之地豈復有奮勵之意其視蔭補子弟聞父兄之教少壯就官有嚮進之心宜有間矣由此觀之計才量行可以居官治事者納粟胥史不如補蔭補蔭不如進士理之必然也又進士科所謂特奏名者凡五例其最濫者但一次預薦僅及三十年即該推恩其就廷試則試題平易字數減少有司考校又加寬假但粗成文理不至甚紕繆者皆置第四等以上年未滿七十者即便不須保任便許出官昨元豐八年特奏名係第四等以上者四百餘人可謂冗矣夫進士自秋試至省殿三處考校於三千人中僅取五百其間尚容幸得又况偶或一薦纍試見黜年髙才耗學術忘廢其比進士實固相逺而又五路學者鮮少取人數寬但獲一薦雖不事學坐待及三十年便該祿仕大率多年五六十以上既仕官誰肯薦保夫以血氣衰耗有茍得之心薦保不及無向進之意其能精明治事亷潔自守者十無一二其智識才力方之進士固有間矣夫以特奏得官與夫補蔭流外之人學術才行皆不足以方進士而入仕之數常多於及第之人並趨吏部吏部按格不計入流清濁才行髙下但以到部先後注授差遣以此待次者常至七八百人注擬二年以上員闕故負才可用之人率為特奏得官與夫資蔭胥史之流冗占壅滯比肩待闕居間之日多而治事之日少者常以此也不清其源欲官之不濫才者之獲進不可得也臣以為四者之冗有可罷者納粟得官是也有可以裁抑者特奏名資蔭胥史是也竊聞嘉祐四年以後係特奏名者才百十人自治平至熙寧三年止百有三人自熙寧六年至今每次推恩入仕不減四五百人臣欲乞參酌祖宗故事須實曽取到文解或經殿試計若干舉方許就省試實得文解及經殿試若干舉方許就殿試文理稍優者方得充四等以上每等限定人數不過若干人其在四等以外者不理選限其曽預一薦雖及三十年不在推恩之限蓋纍曽取到文解或經殿試即須稍有文學不至空踈四等以上限以人數則有司所取不至冗濫如此則稍可以革特奏之弊矣臣又見廣南攝官取本路曽預兩薦者權作簿尉一任無過遂得正授雖曰優假逺方士人然僥幸太過若重加舉數即可以損入流之冗矣臣以為古之仕者世祿蓋使為之後者一人世焉祿廩之而已矣時人之所譏謂棄賢者之後絶功臣之世今之寄祿官自大夫以上初升大夫即奏補子弟一人其後兩經郊恩與致仕之日皆許奏蔭其為大夫以上歲月深久往往奏薦多至數人夫亷謹無過積日敘遷而為大夫者未必有功而賢者也官其子弟一二人以寵其後固已厚矣臣欲乞自兩省兩制以下至大夫奏補之數宜加裁減限以多少則可以革資蔭之濫矣百司胥史積勤纍日大率須及二十年方得出仕惟三省人吏最為優幸每以點檢諸處文書酬奬減年出官最速其不願出官者坐理資任至為郡守宜加裁抑使無過厚則可以損雜流之弊矣四弊既損則入任之源清而才行可用者不久於待闕不久於待闕則治事之日多而職業無不舉矣臣聞張官置吏所以為民今若損虛授之祿以養害民之吏姑息不才之士以妨有才之進豈為民設官之意耶願陛下明詔有司講求官冗之弊澄清入仕之源以幸天下實非小補十月六日王覿云云可參照均又言臣聞官以治事不聞事少而官多吏行文書不聞文書寡而吏衆今京師百司吏之冗者莫如六曹每歲出官不知幾何而吏祿之費多至四十萬冗官費財月增歲積若有司姑息而不敢議論朝廷因襲而不思裁損則將來之弊無時而已也六曹冗吏臣不能遍舉請陳其一二以推其餘竊以六曹事之簡者莫如兵曹四司自主事以下至貼司共一百一十九人兵部每日承受生事大抵多止於四五十件或六七十件少止於一二十件或三十件其承受都省批付文字少止於一二件或三四件多止於十餘件而兵部人吏自主事至貼司凡五十八人大略計之每日所分事件逐人多止於十餘件少止於三五件又所行之事止於民兵廂軍街司及蕃夷屬户授官等數事而已職方每日承受生事大扺多止於十餘件少止於三五件其承受都省文字一旬之內或四五日無所承受或止於二三件而職方手分貼司凡八人逐人所分事件不過一二件所行之事止於州縣廢復蕃夷歸明及天下地圖等數事而已庫部每日承受生事多止於三四十件少止於一二十件其承受都省文字止於二三件而庫部手分貼司凡十八人逐人所分事􅟢不過一二件所行之事止於軍器儀仗防城件物等數事而已以三曹言之所受文書既已簡少又所行之事多承襲故常不至費力鉤考反復契勘由此推之吏史間冗兹可見矣舊日未行官制以前三司人吏止六百餘人自行官制三司事務散入諸部十有三四而户部四曹人吏通計四百八十七人則是事少而吏衆矣由此推之他曹吏冗蓋可見矣臣竊以政有因革各沿其時法有損益各因其事蓋官制之初每事創立簿書紛紏行移報應倍勞心力故不得不多置吏史以集其事今官制之行已六七年綱紀張設庶務就緒又有事既減省或歸他司而吏額如故臣請以一二言之昔户部右曹所以事冗者以總領常平一司故人吏之多至於八十四人今則助役變為差役州縣已有成法青苖罷而不散水利因而不作苗役逋欠一切蠲除則右曹所主事務十去七八矣昔之兵部所以事繁者以主義勇保甲也故吏史之多至於五十八人比年以來義勇保甲既歸樞密院矣則兵部所主事務十去一二矣夫法隨事立事異則法從而變吏緣事置事省則吏從而損今法改事省而吏額如故非所以汰冗官而節國用也且吏之廪祿既不欲遽損而吏之冗占又不加裁損則耗財妨賢之弊終不能去也臣以為知曹事之繁簡難易無親於本部長屬乞特詔六曹尚書侍郎將見今吏額令逐部郎官親自看詳隨事裁減務在吏與事稱多少適當俟其議上更令左右司及兩省官同加參覆庶幾詳盡既已裁損立定新額則見權者可罷而闕者可勿補見行案者且令仍舊而移補它部之闕或無闕可補則候將來出職更不撥填如此行之十年以後吏數大減省官節用之利必見其效矣臣以為朝廷損益法度以義為主若恤世俗之浮論而欲人人之便安則弊無時而可去法無時而可立願陛下審義度時斷在必行天下幸甚此據均奏議第九卷增入二年三月末均又奏疏元豐五年五月三日行官制云官制有已六七年則此奏必是元祐二年或三年非元年也今姑附言冗官後九月二十三日蘇軾云云三年十月二十六日翟思云云可并考官制雖以元豐五年五月一日行其議改更則固前此矣只附此為允是日蘇轍又言臣訪聞諸路所定役法限日已滿近日夔州等路文字相繼申到旋已逐一進呈施行臣竊惟諸路役法所係民間利害至深至廣雖逐路事體各别條目各有不同而朝廷變法從便措置大意所謂海行條貫者不得不同也臣竊恐詳定役法所急於行法每遇逐路申到文字不候類聚參酌見得諸路體面即便逐旋施行因此致諸路役法大體參差不齊使天下之民不得均被聖澤欲乞指揮本所候諸路所申文字稍稍齊集見得諸處役法不至大段相逺然後行下右正言王覿言臣伏聞為治之要莫先於用人故書曰惟治亂在庶官官不及私昵惟其能爵罔及惡德惟其賢夫自古以來為國家者豈不欲皆得賢者能者而官爵之惟其私有所自蔽則不能者有時而以為能惡有所難知則不賢者有時而以為賢焉此官爵所以不得皆及於賢者能者而治亂亦不得不異也臣竊見近日差除多不協於公議夫監司者一路生靈百城官吏休戚之所繫也可得而輕授耶然而闒冗不才如王公儀庸暗無耻如盛南仲與賈青朋姦如程髙為李憲奴使如孫路者而皆得以為之則彼一路生靈百城官吏休戚之所繫者乃在此曹可不為之痛惜哉且陛下之用監司不謂不謹矣既委執政以擇之又命侍臣以薦之所用宜皆得人也今猶公議不以為然者蓋人之難知亦已久矣非特今日也今侍臣雖薦之而於能不能之間豈皆無惑哉執政加察而用之可也執政雖用之而於賢不賢之間豈皆無惑哉言事官操公議而論之可也言事官之言誠不妄則陛下行之何疑若以為侍臣既薦之矣執政不當復察其人雖非亦用之執政既用之矣言事官不當復論而其言雖是亦置之如此而欲任用之得人不亦難乎方二聖臨朝羣臣輔政不應有此弊臣但見比者除授既多失當及言事官論列又不施行故竊疑之此非朝廷之福也臣前日伏聞除刑部郎中王振為大理少卿自郎官為少卿雖非遷擢然振之為大理官久矣當楊汲作卿之際因其滿罷又薦以為大理正振憸巧刻深最為楊汲崔台符所愛信汲台符鍛錬之獄多振力也前日作郎官已駭物論今又使之治獄不惟恐故態復作以害良善兼衆論必以為朝廷復用酷吏為廷尉矣非所以安人情也臣愚竊謂承崔台符楊汲王孝先之後須用稍通經術性質忠厚之人為之卿而使天下無寃民乃有補於聖政如振者當與台符汲孝先同黜安可以復用也臣又聞執政所薦館職非免召試外議籍籍亦謂其人有不足以辱文館者夫執政大臣各舉其所知以應詔豈不欲髙才大德之士以稱陛下之任使哉蓋潔其進者皆不保其往愛其才者或不察其行故未免人言之多也臣亦望陛下宣諭執政更加採聽而去取之庶幾召試之後人無異論臣智識淺陋豈敢自謂知人然今所論列皆得之於公議也惟聖慈詳察覿自注云八月二十六日蘇轍云云在八月二日王公儀七月二十二日程髙七月二日盛南仲六月二十八日政目九月十八日南仲知衡州孫路二月十二日王振九月戊辰復自少卿大理為刑中壬子御史中丞劉摯言臣伏見刑部郎中王振除大理少卿按振闒冗有餘人品極下前在大理為丞為正刻害險酷著聞於人以此奉事崔台符楊汲多為其所薦引向來寃濫之獄振皆預其事台符等既多以舞獄無狀次第黜逐振當連坐而典憲未伸公議憤之近乃無故召自舒州以為刑部正郎衆人莫不怪笑臣方欲彈論今又無故進於卿列臣竊以陛下哀念斯人深患前日獄吏之失其守故有所澄汰中外拭目以觀陛下之所選用謂必得持平知義至公不撓之人乃可以副聖明矜恤庶獄之意今首乃用振臣恐刑獄之弊將有甚於前日矣伏望速降指揮追振新命及罷刑部差遣依台符等例特行降黜以副公論貼黃稱昨者朝廷以蘇頌為刑部尚書鮮于侁為大理卿中外莫不曉然知陛下於用刑法治獄之意矣侁雖以老癃辭免而繼之者遽復用如此何謂哉多士之中求一廷尉不至乏人願速罷振命早行黜責遴選其人以慰天下元祐元年八月二十七日監察御史上官均言臣竊以刑部大理之官聽訟折獄死生輕重之所繫所以為天下之平為之長二者尤在謹擇剛明端良之士以充其選則刑罰當其罪而天下無寃民矣臣竊見朝廷以昨來大理卿二崔台符楊汲王孝先等元豐以來承勘內降公事深刻鍛鍊多陷無罪皆奪官褫職出補外郡擢前吏部侍郎蘇頌為刑部尚書又除太常少卿鮮于侁為大理卿命出之日人心厭服兹見朝廷恤刑任人之意鮮于侁既遂辭免前日乃聞除刑部郎官王振為大理少卿中外之論深所未諭臣竊聞王振人品猥冗天資刻薄往年用崔台符楊汲薦引為大理丞勘鞫內降公事相為左右狂陷無辜不可勝數原心論罪數人之惡未知輕重台符既已奪官罷職而王振自外召為省官今既含容未正其罪復於數月之間驟加進擢不惟賞罰不明不足以厭服衆心而王振天性刻深恐終不革舞法濫刑上負陛下寬恤之意欲乞寢罷除命别加選擇剛明端良之士以協公論先是詔文彥博子貽慶居中可罷外任各與在京差遣如未有闕即於員外添置三省欲特除貽慶都官員外郎居中宗正寺主簿並員外添置詔貽慶先任都官員外郎可升一省曹員外郎居中依奏癸丑貽慶改司封員外郎既而貽慶辭新命乞依舊為白波輦運詔從所乞仍特與理轉運判官資序九月十五日御史中丞劉摯言臣自待罪風憲屢曾以天下監司為言乞澄汰選擇誠以朝廷政令使監司得其人則推行宣布可以諭上旨而究惠澤茍非其人則所謂徒善而已終於民不得被其利夫上之所好下必有甚朝廷以名實為事行總核之政而下乃為刻急淺迫之行朝廷以教化為意行寬厚之政而下乃為舒緩茍簡之事皆習俗懷利迎意而作故所為近似而非其意本然也今雖因革之政有殊而觀望之俗自在但所迎之意有不同耳其為患一也昨差役之法初行監司已有迎合爭先不量可否不校利害一槩定差騷動一路者朝廷察其意固已黜之矣推此以觀人情大約類此且天下之事散在諸路總制於監司其大者治財賦察官吏平獄訟考疾苦茍使者皆務為和緩寬縱茍於安靜則事之委靡不振世之受弊不可勝言也向來黜責數人者皆以其非法掊斂意在求進害民太甚者爾非欲使之漠然不省其職廢所宜治之事謂之寬厚也昧者不逹故矯枉或過其正則臣謂此俗不可滋長要須大為之禁伏乞聖慈詔執事者申立監司考績之制以常賦之登耗郡縣之勤惰刑獄之當否民俗之休戚為之殿最每歲終以詔誅賞仍自今歲始焉庶幾有所櫽括裁制之使循良者不入于弛肅謹者不入于薄然後上副聖明制治用中之意夫察時之寬猛緩急觀俗之過與不及而張弛其政正今日事也又言臣先準朝旨看詳訴理熙寧以來罪犯并元豐後來探報斷遣公事應事涉寃抑情可矜憫並許上聞數內一件制勘太學公事龔原等二十二日已具看詳事理奏聽指揮去訖伏緣事有未盡須至論列臣謹按太學公事本因學生虞蕃就試不中狂妄躁忿上書告論學官隂事自此起獄又因勘官何正臣迎合傳會將赦前狀外於法不該推治之事奏乞皆行推治親畫特旨依奏自此獄遂大熾上自朝廷侍從下及州縣舉子逺至閩吳皆被追逮根株證佐無慮數百千人無罪之人例遭箠掠號呼之聲外皆股栗臣聞論者謂近年慘酷寃濫無如此獄其所坐贓大率師弟子贄見之禮茶藥紙筆好用之物皆從來學校常事雖經有司立法而人情踵故未能遽革盡以監臨枉法當之終身放廢可謂已甚其間雖有實負罪犯之人終以下訐其上事發不正獄官希合拷虐太過故雖得其罪論者猶不以為直又况學士大夫不堪囚辱類多虛引自誣並坐重責深可嗟憫臣所看詳緣止是據案考事而獄吏等從來鍛鍊文案惟恐平反故首尾牢密曲直莫辨况此獄出於正臣希功用意尤極巧詆今雖已具案內事狀奏聞然在於實情天下之所知者有所未盡若不曠然加惠一切昭洗止用有司看詳之文誠恐寃抑不申不足上副聖仁矜恤之意臣愚不勝拳拳欲望陛下特出睿斷將太學制勘命官舉人等優賜恩旨等第除落罪名又言見今看詳訴理所若於公案內見得寃抑或可矜事狀即本所自可陳奏其雖有寃抑可恤之情衆所共知而案內文致完密非看詳所能見如此獄者若有司不能以事實上聞則寃者無由可伸臣待罪言路義不可以避嫌自默惟陛下酌情制事毋拘常法特與優加除雪以示寬大仍乞作特旨施行摯前章乞立監司考績之制後章特寬太學獄奏議相屬在乞召張方平陪祠前劉仿等所次行實亦聯書之新録摯傳蓋因行實稱用是罪多減貸乃行實云爾不知監司考績之法竟立與否傳及行實俱不言也今并取二章附八月末徐更考也宰臣司馬光言故職方員外郎張述在仁宗朝嘗議建儲今其家無人食祿詔述子申伯特與太廟齋郎故殿中侍御史裏行陳洙亦曽具奏乞建儲忘身徇國繼之以死而天下莫知乞依述例特與洙一子官録張述後在五月己未録陳洙後在五年五月四日
