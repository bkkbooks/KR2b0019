body:
  text: 續資治通鑑長編卷一百九十八宋李燾撰仁宗嘉祐八年春正月己酉翰林學士范鎮知貢舉癸丑詔夏國主諒祚所遣進奉人石方稱宣徽南院使非陪臣官號自今宜遵用誓詔無得僭擬丙寅翰林學士范鎮提舉校正醫書龍圖閣直學士知審官院韓贄兼判都水監初置都水監欲重其事以知雜御史判至是知雜趙抃辭以不知水事故命贄焉戊辰宰臣韓琦言秦州永寧寨以鈔市馬自修古渭寨在永寧之西而蕃漢多互市其間因置買馬場凡嵗用緡錢十餘萬蕩然流入敵境實耗國用詔復置場永寧罷古渭寨所置場蕃部馬至徑鬻於秦州己巳充儀俞氏為昭儀媫妤楊氏為修儀周氏為婉容二月癸未帝不豫甲申德音降天下囚罪一等徒以下釋之乙酉太子少傅致仕田况卒贈太子太保諡宣簡况寬厚明敏有文武才與人若無不可至其有所守人亦不能移也其論天下事甚多至併樞密院於中書以一政本日輪兩制館閣一員於便殿備訪問以錫慶院廣太學興鎮戎軍原渭等州營田汰諸路宣毅廣捷等冗軍䇿元昊勢屈納欵必令盡還延州侵地無過許嵗幣併入中青鹽請録陜西陷殁主將隨行親兵其論甚偉然不盡行也始契丹寇澶州略得數百人以屬况父延昭延昭哀之悉縱去因自脫歸中國生八男子多知名况長子也保州之役况殺降卒數百人朝廷壯其決後大用之然卒無子以兄子為後丙戍中書樞密院奏事於福寧殿之西閣見上所御幄帟裀褥皆質素暗敝久而不易上顧韓琦等曰朕居宫中自奉止如此爾此亦生民之膏血也可輕費之哉三月甲辰詔前鄆州觀察推官孫兆邠州司户恭軍單驤診御脈上初不豫醫官宋安道等進藥久未效而兆與驤皆以醫術知名特召之按此條原本為甲申日事然二月已有甲申不應三月復見且帝崩于三月辛未距甲申已四十餘日不應是一月中事其為甲辰無疑也醫官宋安道原本亦訛作朱今並改正丙午詔中書劾宋安道等罪以聞丁未詔進士七舉諸科八舉曾經御試年四十以上進士五舉諸科六舉曾經御試及進士六舉諸科七舉曾經御試年五十以上河東河北陕西舉人遞減一舉令禮部貢院特以名聞戊申太子太保致仕龎籍卒時上不豫廢朝臨奠皆不果第遣使弔賻其家贈司空兼侍中諡莊敏籍曉律令長於吏事持法深峭軍中有犯者至或斷斬刳磔或纍笞至死以故士卒聞風畏服而治民有惠愛及為相為言者所詆聲望減於治郡時案此不載言者姓名宋史載籍嘗受道士趙清貺賂韓絳論之不已乃罷知鄆州或即此事也甲寅昭德軍節度使同平章事李昭亮卒贈中書令諡良僖昭亮為人和易諳練近事於吏治頗通敏善委僚佐故數更藩鎮無他過然妻早亡三妾並嬖迭擅家政昭亮莫能制也丁巳詔加號上仙隱影唐將軍曰道化真君上靈飛形葛將軍曰護正真君直使飛真周將軍曰定志真君仍於在京宫觀營建殿宇先是上不豫夢三神人自言其姓號若在左右翊衛之既寤而疾稍平乃詔遍求神祠而無有後得於上所受籙中特表異之春明退朝録當考詳案春明退朝録載此為嘉祐初年事苐云上夢至大野迷失道有葛將軍送至宫闕與此微有不同壬戍孫兆為殿中丞單驤為中都令仍令校正醫書封神應侯扁鵲為神應公皇城使巴州刺史宋安道等皆降官癸亥御內東門幄殿甲子御延和殿賜進士許將等一百二十七人及第六十七人同出身諸科一百四十七人及第同出身又賜特奏名進士諸科一百人及第同出身諸州文學長史將閩人也乙丑以聖體康復宰臣詣東上閣門拜表稱賀辛未晦上暴崩于福寧殿是日上飲食起居尚平寧甲夜忽起索藥甚急且召皇后皇后至上指心不能言召醫官診視投藥灼艾已無及丙夜遂崩左右欲開宫門召輔臣皇后曰此際宫門豈可夜開且密諭輔臣黎明入禁中又取粥於御厨醫官既出復召入使人禁守之夏四月壬申朔輔臣入至寢殿后定議召皇子入告以上晏駕使嗣立皇子驚曰某不敢為某不敢為因反走輔臣共執之或解其髮或被以御服召殿前馬步軍副都指揮使都虞候及宗室刺史已上至殿前諭旨又召翰林學士王圭草遺制圭惶懼不知所為韓琦謂圭曰大行在位凡幾年圭悟乃下筆至日昳百官皆集猶吉服但解金帶及所佩魚自垂拱殿門外哭而入班福寧殿前哭韓琦宣遺制英宗即皇帝位見百官於東楹百官再拜復位哭乃出帝欲亮陰三年命韓琦攝冢宰輔臣皆言不可乃止蔡氏直筆云仁皇暴崩慈聖光獻皇后祕不發喪密召英宗入禁中降內批宣大臣明日却問候曉開內東門乃啓垂拱殿後門宣上旨令大臣由垂拱殿入宰相韓琦而下至福寧殿下再拜升階扣簾欲進內侍言皇后在此琦却立后發哭曰天下不幸夜來官家忽然上仙大臣發哭后曰怎奈何相公官家無子琦曰皇后不可出此言皇子在東宫何不便宣入后曰只是宗室立了他後莫有人爭琦曰更何可擬議后乃曰皇子已在此方命捲簾時英宗已即位了琦退謂同列曰適來敢亂發一言耶於是宣班草遺制殿帥郝質戒殿前班兵曰今入殿候見吾山呼拜時汝輩方得山呼質扣殿階白宰相欲上殿看官家琦稟后后許之時英宗散髮被靣覆以帽子質徐搢笏拂開髮審觀之降殿山呼拜殿前亦山呼拜時朝論稱有如此宰相殿帥天下豈不晏然按司馬氏日記則英宗在外翌旦召入韓琦家傳亦云遣中使扶侍皇子須臾皇子到與日記略同如直筆所載琦對后語若果有之家傳必不肯遺恐出于傳聞未可信也又此時殿帥乃李璋而郝質實為馬軍帥直筆蓋誤今並不取邵氏聞見録亦云仁宗大漸之夕光獻即召英宗入翌日大臣方入英宗即位與蔡氏直筆同然實録本紀皆云輔臣至福寧殿皇后傳遺旨命皇子即位不云先召皇子入也神録曹太后傳獨云先召皇子入翌日乃召輔臣更須考詳癸酉大赦除常赦所不原者百官進官一等服緋紫及十五年者與改服色優賞諸軍如乾興故事所費無慮一千一百萬貫匹兩在京費四百萬時禁衛或相告乾興故事內納食物中有金既而宫中果賜食衆視食中無有紛紛以為言殿前副都指揮使李璋呼其長謂曰爾曹平居衣食縣官主上未臨政已優賞爾何功復云云敢喧者斬衆乃定職方員外郎判吏部南曹王端言公卿子弟襁褓得官未嘗涖事而錫服與年勞者等何以示勸請從涖日始遂著為令端質弟也命引進副使王道恭告哀契丹左藏庫副使任拱之告哀夏國拱之仍齎賜大行遺詔及遺留物三司奏乞內藏庫錢百五十萬貫紬絹二百五十萬匹銀五萬兩助山陵及賞賚從之宣慶使石全彬提舉製造梓宫以畫樣進詔務為堅完毋得過有華飾武勝軍節度使李璋案此即前殿帥李璋蓋兼武勝軍節度使也鎮東留後李端願同州觀察使李瑋乞隨宗室别班赴臨詔璋管軍同百官入端願瑋從所乞上初即位與輔臣言皆不名及將責降醫官有欲為孫兆單驤地者言於上曰先帝初進兆等藥皆有驗不幸至此乃天命也非醫官所能及上斂容曰聞兆等皆兩府所薦信乎對曰然上曰然則朕不敢與知唯公等裁之皆惶恐甲戍兆編管池州驤峽州同時責降者十二人獨兆驤得逺地云乙亥羣臣表請聽政不從詔天下官名地名人姓名與御名同者改之改名部署曰總管命韓琦為山陵使先是輔臣奏事帝必詳問本末然後裁決莫不當理中外翕然皆稱明主是日晚忽得疾不知人語言失序復召已責降醫官宋安道甄立里秦宗一王士倫等入侍疾丙子尊皇后曰皇太后丁丑羣臣三上表請聽政戊寅詔許之既而以疾不果有司請改日大斂司天監言卜近日則不利上及太后上令避太后而己巳卯大斂上疾增劇號呼狂走不能成禮韓琦亟投杖褰簾抱持上呼內人屬令加意擁護又與同列入白太后下詔候聽政日請太后權同處分禮院奏請其日皇帝同太后御內東門小殿垂簾中書樞密院合班起居以次奏事或非時召學士亦許至小殿皇太后處分稱吾羣臣進名起居于內東門從之韓琦投杖褰簾擁護英宗事據家傳及王嵓叟别録國史並無此庚辰遣供備庫副使夏僖等二十人告諭諸路官吏軍民以先帝升遐及上嗣位之意諫官司馬光等言竊見大行晏駕已近旬日其告哀契丹使者猶未進發兼聞不曽素戒使者對答繼嗣之辭臣等竊議深恐未便何則國家既與契丹約為兄弟遭此大喪立當訃告彼中刺探之人所在有之今天下縞素彼中豈得不知而訃告之人尚未到彼將謂中國有何事故能不猜疑自古大宗無子則取於小宗以為後著在禮典豈為國惡若敵人有問盡以實對有何所傷今問繼嗣於使人而使人對以不知事體豈得穩便陛下初為皇子之時詔書已布告天下彼中安得不知今若答以虛辭不足詐彼而適足取其笑侮爾國家自與契丹和親以來五十六年生民樂業今國有大故正是鄰敵窺伺之時豈可更接之失理自生間隙臣等願朝廷早決此議令使人晝夜兼數程進發若彼中問及繼嗣皆以實告孔子曰言忠信雖蠻貊之邦行矣此之謂也辛巳命契丹賀乾元節使保靜軍節度使耶律榖等進書奠梓宫見上於東階放夏國使人見令閣門以書幣入始契丹使者至德清廷臣有欲却之者有欲候其至國門諭令出者議未決太常丞集賢校理邵亢請許其使者奉國書置柩前俾得見上以安逺人詔從其言前此契丹使介並書惟此但書耶律榖等今因之龍圖閣直學士周沆充館伴契丹使者初未許見先詔取書置柩前使者固請見曰取書非故典也上以方衰絰辭焉使者執書不肯授閣門沆曰昔北朝有喪南使至桞河而還今朝廷重鄰好聽北使至京師逹命於几筵恩禮厚矣奈何更以取書為嫌乎使者立授書然上亦卒見榖等朝廷未知契丹主之年沆從容雜他語以問使者出不意遽對以實既而悔之相顧愕然曰今復兄事南朝矣案沆先以龍圖閣直學士知慶州此時已召知通進銀臺司判太常寺矣此猶稱直學士官與本傳不合未知孰是壬午輔臣入對於柔儀殿西閣皇太后御內東門小殿垂簾聽政初議帝與太后同御東殿垂簾輔臣合班以次奏事及是上方服藥權居柔儀殿東閣之西室太后居其東室輔臣以政事復奏於簾前云癸未內出遺留物賜兩府宗室近臣主兵官有差富弼文彥博時居喪皆遣使就賜之賜富弼文彥博在庚辰日今并書之天章閣待制知諫院司馬光言蒙恩賜以留物如臣所得已千緡况名位漸髙必霑賚愈厚舉朝之內所費何翅巨萬切以國家用度素窘復遭大喪纍世所藏幾乎掃地傳聞外州軍官庫無錢之處或借貸民錢以供賞給一朝取辦逼以捶楚當此之際羣臣何心以當厚賜况將來山陵所須全未有備國信往來又當供億萬一更有水旱軍旅之虞不知朝廷何以處之若國用不足必重斂于民民已困窮何以供命飢寒所驅必為盜賊此乃安危之本願陛下深思熟慮勿以為細事而忽之也臣誠知乾興之際曽有此例亦恐當時所賜不至如此之多况當時帑藏最為富實今事力耗竭十無一二豈可但云舊例不思損益况委質為臣共圖國事股肱耳目譬猶一體安則俱安危則俱危豈得多得金珠然後輸忠盡力恐非所以遇士大夫之道也今天崩地坼率土哀摧羣臣各遷一官不隔磨勘恩澤已厚誠不忍更受賜物因公家之禍為私室之利伏望聖慈許令侍從之臣各隨其意進奉金帛錢物以助山陵之費如此則君恩下流臣誠上逹上下相愛洽於至和既可以少舒民力又不至有傷國體光遂與同列詣客省進奉詔以乾興年無此例却之光又言方今國家多虞人心危懼正是朝廷斟酌時宜損益變通之際豈可不究利害但詢舊例而已况所賜羣臣之物比舊例過多幾倍而羣臣有所進獻則云舊例無之雖聖恩務在優隆然羣臣有亷恥之心者何面目以自安又州縣鞭撻平民逼取錢物以濟時之急不知乾興年中何嘗有此例也以此見國家虛實緩急逐時不同豈可專執舊文不加裁損今大喪之後內外困窮凡百在位之臣皆當焦心克已以救其患若受此非常之賜恬然有之曽不為愧則士衆必曰我輩勞苦而所得微薄羣臣安坐而専享厚利其心安得不怨百姓亦曰我輩剝膚椎髓以供賦斂而浩浩入羣臣之家如泥沙不惜其心安得不怒近者怨逺者怒為國計者可以不深思逺慮乎是以臣輩區區欲輸此物非謂可以增帑藏之富助用度之急也其意蓋以通上下之情慰逺近之心塞無厭之怨解重斂之怒伏望朝廷留心省察知其為安危之本非誇小亷競小忠也朝廷卒不許光乃以所得珠為諫院公使錢金以遺其舅氏義不藏於家甲申宰相韓琦加門下侍郎兼兵部尚書進封衛國公琦本傳稱進封衛國實録稱魏國今從本傳拜按宋史進封衛國公與山陵使同命後太后還政復魏國公曽公亮加中書侍郎兼禮部尚書樞密使張忭參知政事歐陽修趙槩並加户部侍郎樞密副使胡宿吳奎並加給事中司馬光上皇太后疏曰羣生無福大行皇帝奄棄天下皇帝繼統哀毁成疾未能親政恭請殿下同決庶務臣愚伏計殿下念宗廟社稷之重為四海黎元之計不得已而臨之非中心所欲也若皇帝聖體不日康寧殿下必推而不居若藥石未效則殿下方且總攬萬幾未暇自安故凡舉措動靜不可不謹戒留心焉方今天下之勢危於纍卵小大戰戰憂慮百端若非君臣同心內外協力夙夜勤勞以徇國家之急則禍難之生豈可勝悔哉夫安危之本在於任人治亂之機在於賞罰二者不可不察也若中外百官各得其人賢能者進不肖者退忠直者親讒佞者踈則天下何得不安任職之臣多非其人賢者退不肖者進忠直者踈讒佞者親則天下何得不危賞不因喜罰不因怒賞必有所勸罰必有所懲則天下何得不治喜則濫賞怒則妄罰賞加於無功罰加於無罪則天下何得不亂然則天下安危治亂不在於他在於人主方寸之地而已矣凡御下之道恩過則驕驕則不可不戢之以威威過則怨怨則不可不施之以恩恩威之道聖人所以制世御俗猶天地之有陰陽損之益之不失中和以生成萬物者也夫恩者欲物之親已也有時而生怨威者欲物之畏已也有時而生慢小人之性恩過則驕驕而裁之則怨矣爵祿賞賜妄加於人則其同類皆曰我與彼才相若也功相敵也彼得之而我獨不得何哉是出一恩而召羣怨也故曰恩有時而生怨也威嚴太盛則人無所容刑罰煩苛則濫及無辜濫及無辜則其類皆曰是過也人誰無之彼既不免行將及我於是乎窮迫思亂為其上者乃更恐而求姑息是始於嚴而終於慢也故曰威有時而生慢也如是則為人上者豈不至難哉蓋善為人上者不然恩必施於有功而罰必加於有罪恩雖至厚而人不敢妬者何也衆人之所與也罰雖至重而人無所怨者何也衆人之所惡也大行皇帝天性至仁羣臣之功或未足言而賞之已厚罪或不可容而罰之至輕善則善矣而小人不識大恩者或幾乎驕慢臣竊意殿下今兹繼而為政必紏之以嚴紏之以嚴誠是也然天下之人涵濡大行皇帝聖澤日久一旦暴加繩檢恐駭而離心伏願殿下徐以義教之戒之有不聽從而尤無良者然後加刑罰焉則誰敢不肅此善之善者也往者大行皇帝嗣位之初章獻明肅皇太后保護聖躬綱紀四方進賢退姦鎮撫中外於趙氏實有大功但以自奉之禮或尊崇太過外親鄙猥之人或忝汚官職左右讒諂之臣竊弄權柄此所以負謗於天下也今殿下初攝大政四方之人莫不觀聽以占盛德臣以為凡名體禮數所以自奉者皆當深自抑損不可盡依章獻明肅皇后故事以成敬順之美副四海之望大臣忠厚如王曽清純如張知白剛正如魯宗道質直如薛奎者殿下當信之用之與共謀天下之事鄙猥如馬季良讒諂如羅崇勳者殿下當踈之逺之不可寵以祿位聽采其言也臣聞婦人內夫家况后妃與國同體休戚如一若趙氏安則百姓皆安况於曺氏必世世長享富貴明矣趙氏不安則百姓塗地曺氏雖欲獨安其可得乎是故政者正也為政之道莫若至公臣願殿下熟察羣臣之中有賢才則舉之有功則賞之雖賤如厮役憎如仇讎逺在千里之外皆不可棄遺如此則人誰不勸矣羣臣之中職事不修則廢之有罪則刑之雖貴為公卿親為兄弟近在耳目之前皆不可寬假如此則人誰不懼矣夫為善者勸為惡者懼百姓稱職萬民樂業天下之安猶倚泰山而坐平原也尚何憂哉然後俟皇帝聖體平安授以治安之業自居長樂之宫坐享天下之飬則殿下聖善之德冠絶前古光映後來雖周之文母漢之明德不足比也乙酉作受命寶命歐陽修篆其文曰皇帝恭膺天命之寶發諸路卒四萬六千七百八十人修奉山陵丙戍以國子監所印九經及正義孟子醫書賜夏國從所乞也丁亥以皇子右千牛衛將軍仲針為安州觀察使光國公右內率府副率仲紏為和州防禦使樂安郡公仲恪為博州防禦使大寧郡公翰林學士王圭上言聖體已安皇太后乞罷權同聽政即命圭草還政書既而不行司馬光日記十六日丁亥王圭乞皇太后還政實録無其事又據王圭集有皇太后第一次還政書注云嘉祐八年四月十八日辰時通進司降到御寶劄子令撰當日未時進入十八日己丑也實録亦無其事今依日記載此更須考詳熒惑自七年八月庚辰夕伏積二百四十九日命輔臣祈禳於集英殿己丑晨見東方癸巳權三司使蔡襄奏大行山陵一用永定制度於是右司諫王陶上言民力方困山陵不當以永定為準其後京西轉運使吳充楚建中知濟州田棐繼上言請遵先帝遺詔山陵務從儉約皇堂上宫除明器之外金玉珍寶一切屏去建中須城人也禮院編纂蘇洵亦貽韓琦書切諫至引華元不臣以責之琦為變色乃詔禮院與少府監議唯省乾興中所增明器而已其他猶一用定陵制度盧士宗傳云士宗為少府監典工作造方中諸物比乾興省費十餘萬緡按實録云省乾興所增明器而已然則一種自費十餘萬緡也士宗傳似飾説今不取右司諫直集賢院同修起居注鄭獬上言大行山陵依乾興制度雖未為過多以今校昔蓋有不同乾興帑藏充積財力有餘故可以溢祖宗之舊制今國用空乏財賦不給近者賞軍已見橫斂富室嗟怨流聞京師雖三路州郡頗能支梧蓋將纍嵗邊備一日費之不知何年復能充補萬一嵗凶民飢小有風塵之警則將何䇿以善其後豈可用乾興為法也夫儉葬之制周公非不忠曽子非不孝以為褒君愛父不在於聚財此前世之極論臣不復言竊惟先帝節儉愛民出於天性無珠玉竒麗之好無犬馬遊觀之樂服御至於浣濯器玩極於朴陋此天下之共知也今山陵制度乃取乾興最盛之時為準獨不傷先帝節儉之德乎臣以為宜敕有司條具名數再議減節獬疏據本傳附見實録不載也上自不豫以來喪皆禮官執事羣臣奉慰則垂簾不坐乙未大祥上始親行禮又捲簾坐受慰人心稍安丁酉起復文彥博固辭表三上乃聽終喪尋有詔給俸賜比宰相之半彥博又辭許之給俸賜在七月乙卯今并書己亥羣臣上表請臨朝聽政表三上乃許之立京兆郡君髙氏為皇后北作坊使遵甫之女遵甫繼勳之子也母曹氏皇太后親姊后四嵗與上同育於禁中仁宗常謂太后他日必以相配太后許諾既長出宫慶厯七年歸於濮邸封京兆郡君於是正位案立后係庚子日事此與己亥連書疑誤戊戍司馬光上疏曰臣愚竊惟大行皇帝春秋未甚髙以宗廟社稷之重昭然逺監確然獨斷知陛下仁孝可守大業擢於宗族之中建為嗣子授以天下其恩德隆厚踰於天地固非微臣所能稱述今不幸奄棄萬國陛下哀慕泣血以夜繼晝過於禮制以至成疾中外聞者無不感泣知大行皇帝能為天下得人治平之期企踵可待羣臣百姓不勝大幸今者聖體痊平初臨大政四海之人拭目而視傾耳而聽舉措云為不可不審易曰君子以作事謀始召誥曰王乃初服嗚呼若生子罔不在厥初生自貽哲命夫為政之要在於用人賞善罰惡而已三者之得則逺近翕然嚮風從化可以不勞而成無為而治三者之失則流聞四方莫不解體綱紀不立萬事隳頺治亂之原安危之機盡在於是臣願陛下難之重之精心審慮如射之有的必萬全取中然後可發也陛下思念先朝欲報之德奉事皇太后孝謹撫諸公主慈愛此誠仁孝之至過人逺甚臣願陛下雖天性得之復加聖心夙夜匪懈謹終如始以結億兆之心形四方之化則福祚流於子孫令聞垂於無窮矣古者人君嗣位必踰年然後改元臣願陛下一循典禮勿有變更於中年也三年之喪自天子逹於庶人一也自漢氏以來始從權制以日易月臣願陛下雖仰遵遺詔俯徇羣情二十七日而釋服至於宫禁之中音樂遊燕吉慶之事皆俟三年然後復常以盡送終追逺之義焉禮為人後者為之子故為所後服斬衰三年而為其父母齊衰期為所後者之親皆如子而為己之親皆降一等蓋以特重於大宗則宜降其小宗所以專志於所奉而不敢顧私親也漢宣帝自以為昭帝後終不敢加尊號於衛太子史皇孫光武起於布衣親冒矢石以得天下自以為元帝後亦不敢加尊號於巨鹿都尉南頓君此皆循大義明至公當時歸美後世頌聖至於哀安威靈或自旁親入繼大統皆追尊其祖父此不足為孝而適足犯義背禮取譏當時見非後世臣願陛下深以為鑑杜絶此議勿復聼也凡此數者臣伏計陛下聰明皆素知之然臣復區區進言者誠懼不幸有諂諛之臣不識大體妄有開説自求容媚陛下萬一誤加聽從欲捐軀爭之亦無及已是以不敢不先事而言庶幾聖德純粹完美不有秋毫之缺使一夫竊議於草萊者臣之志也五月癸卯進封公主為長公主岐國改越國福安改康國慶壽改惠國永壽改榮國寶壽改順國以皇子位伴讀太常少卿李受為左司郎中皇子位説書屯田員外郎王獵為刑部員外郎並充天章閣待制受兼侍讀獵兼侍講管勾皇子位昭宣使瑞州刺史右班副都知石全育領原州團練使充入內副都知故事都知四人至是並全育而五詔後有闕勿補任守忠鄧保吉甘昭吉李允恭石全育並為入內都知凡五人也庚戍封長女為德寧公主第二女為寶安公主第三女為壽康公主中書奏用故事并長公主皆賜告罷其册禮詔山陵所用錢物並從官給毋以擾民詔雖下然調役未常損也此據司馬光日記王圭集亦載此詔文三司計山陵當用錢糧五十萬貫石而不能備或請移陕西緣邊入中鹽於永安縣轉運副使薛向陳五不可且乞如其數以獻許之此據薛向傳附見右司諫王陶為户部員外郎直史館充皇子位伴讀屯田員外郎周孟陽祕書丞孫思恭充皇子位説書孟陽自以王宫教授與上有潛龍之舊而李受王獵皆非上故識顧先得待制由是觖望固辭説書不拜司馬光言臣聞三代令主置師傅保以教其子又置三少與之燕居至於左右前後侍御僕從之人皆選孝弟端良之士逐去邪人毋得在側使之日見正事聞正言然後道明而德成心喻而體安福被兆民功流萬世此教之所以為益也今王陶等雖為皇子官屬若不日日得見或見而遽退語言不洽志意不通未嘗與之論經術之精微辨人情之邪正究義理之是非考行已之得失教者止於供職學者止於備禮而左右前後侍御僕從或有佞邪讒巧之人雜處其間出入起居朝夕相近誘之以非禮導之以不義納之以諂諛濟之以詐偽雖皇子資性聰明端慤難移然親近易習積久易遷諂諛易入詐偽易惑如此則雖有碩儒端士為之師傅終無益也臣聞孟子曰雖有天下易生之物一日暴之十日寒之未有能生者矣吾見亦罕矣吾退而寒之者至矣又曰一齊人傅之衆楚人咻之雖日撻而求其齊也不可得矣臣愚伏望陛下多置皇子位與皇子居處燕逰講論道義聳善抑惡輔成懿德其左右前後侍御僕從亦皆選小心端慤之人使所屬官司結罪保明然後得入仍專委伴讀官糾舉施行即時斥逐不令在側若皇子自有過失再三規誨不從亦聽以聞如此則必進德修業日就月將善人益親邪人益踈誠天下之幸也丁巳案丁巳原本誤作乙巳今改正賜鄭州公使錢五百貫以靈駕所過故也冨弼既除喪戊午授樞密使禮部尚書同平章事庚申翰林學士王圭奏謹按曽子問曰賤不誄貴幼不誄長禮也惟天子稱天以誄之春秋公羊説讀誄制諡於南郊若云受之於天然乾興元年夏既定真宗皇帝諡其秋始告天於圜丘史臣以為天子之諡當集中書門下御史臺五品以上尚書省四品以上諸司三品以上於南郊告天議定然後連奏以聞近制唯詞臣撰議即降詔命庶僚不得參聞頗違稱天之義臣奉命撰上先帝尊諡欲望明詔有司稽詳舊典先之南郊而後下臣僚之議庶先帝之茂德休烈可信萬世之傳詔兩制詳議翰林學士賈黯等議如圭奏從之甲子集慶節度使知曹州張茂實請改名孜從之戊辰皇子仲針仲糾始就東宫聽讀是日初御延和殿上疾猶未平命輔臣祈福於天地宗廟社稷及景靈宫寺觀又遣使二十一人禱嶽瀆名山六月癸酉上復以疾不出是時唯兩府得入對柔儀退詣內東門小殿簾帷之外覆奏政事於皇太后如初先是禮院言大行祔廟而太廟七室皆滿請增置一室詔兩制及待制以上與禮官考議觀文殿學士孫抃等議曰自十月丙戍日移入此謹按禮曰三昭三穆與太祖之廟而七書曰七世之廟可以觀德曰世與昭穆云者據父子之正而言也若兄弟則昭穆同不得以世數數之矣商祖丁之子曰陽甲曰盤庚曰小辛曰小乙四子皆有天下而商之廟有始祖有太祖有太宗有中宗若以一君為一世則小乙之祭不及其父祖丁是古之兄弟相及昭穆同而不世數數之明矣故晉之廟十一室而六世唐之廟十一室而九世中宗睿宗之於髙宗恭宗文宗之於穆宗同居穆位國朝太祖為受命之祖太宗為功德之宗此萬世不遷者也故太祖之室太宗稱孝弟真宗稱孝子大行皇帝稱孝孫而禘祫圖太祖太宗同居昭位南向真宗居穆位北向蓋先朝稽用古禮而著之於祀典矣大行皇帝神主祔廟伏請增一室為八室以備天子事七世之禮詔從之於是龍圖閣直學士兼侍講盧士宗天章閣待制兼侍讀司馬光議曰臣等謹按禮天子七廟三昭三穆與太祖之廟而七太祖之廟萬世不毁其餘昭穆親盡則毁示有終也自漢以來天子或起於布衣以受命之初太祖尚在三昭三穆之次故或祀四世或祀六世其太祖以上之主雖屬尊於太祖親盡則遷故漢元帝之世太上廟主瘞於寢園魏明帝之世處士廟主遷於園邑晉武帝祔廟遷征西府君惠帝祔廟遷豫州府君自是以下大抵過六世則遷其神主蓋以太祖未正東嚮之位故止祀一昭一穆若太祖已正東嚮之位則并三昭三穆為七世矣唐髙祖初立祀四世太宗增祀六世及太宗祔廟則遷洪農府君神主於夾室髙宗祔廟又遷宣皇帝神主於夾室皆祀六世此前世之成法也惟明皇立九室祀八世事不經見難可依據今若以太祖太宗為一世則大行皇帝祔廟之日僖祖親盡當遷於西夾室祀三昭三穆於先王典禮及近世之制無不符合太廟更不須添展一室詔抃等再議於是復上議曰先王之禮自王以下降殺以兩故有天下者事五世自漢以來諸儒傳禮者始有夏五廟商六廟之説其説出於不見伊尹之言而承用禮家之誤蓋自漢唐至周廟制不同而大抵皆七世王制所謂三昭三穆與太祖之廟而七者是也今議者疑僖祖既非太祖又在三昭三穆之外以為於禮當遷如此則是以有天下之尊而所事止於六世不稱先王制禮降殺以兩之意且議者言僖祖當遷者以為在三昭三穆之外則於三代之禮未嘗有如此而不遷者臣等以為三代之禮亦未嘗有所立之廟出太祖之上者也後世之禮既與三代不同則廟制亦不得不變而從時且自周以上所謂太祖亦非始受命之主特始封之君而已今僖祖雖非始封之君要為立廟之始祖方廟數未過七世之時遂毁其廟遷其主考三代之禮亦未嘗有如此者也漢魏及唐一時之議恐未合先王制禮之意臣等竊以為存僖祖之室以備七世之數合於經傳事七世之明文而亦不失先王之禮意詔恭依戊寅翰林學士權三司使蔡襄為修奉太廟使襄乃以八室圖奏御又請廣廟室并夾室為十八間從之侍御史吕誨上疏曰陛下踐祚於今纍月哀慕日深摧毁過禮聖躬違豫久而未平萬幾滯留皆期英斷法宫嚴閴不覩清光臣子之心若為啓處傳聞太醫所上湯劑鮮用服餌臣居外罔知其然陛下必以方術無狀當更選上醫精加調護若謂勿藥有喜計日可待則臣恐宣節失宜五行二氣浸淫汨戾邪得干正非所以保聖躬為宗社計也且居喪之禮毁不滅性聖經深戒士人承家猶曰弗克况萬乘之重耶商髙宗居亮陰中謂傅説曰啓乃心沃朕心若藥弗瞑眩厥疾弗瘳平居尚及於此况陛下實攖美疢其可不念臣敢祈明斷節損哀泣申致二府責成太醫講求藥餌無俾玩疾切須瞑眩期於必瘳使天下傾聳知禮樂政刑行於朝夕皇太后惟疾之憂歡然慰懌豈不休哉又安止孝德充塞髙厚將見藥石之言自聞於上丕命其承昌明於聖世矣誨以六月八日上此疏八日戊寅也今附見帝自感疾即厭服藥餌韓琦常親執藥杯以進帝不盡飲而却之藥汚琦衣太后亟出服賜琦琦不敢當太后曰相公殊不易皇子仲針侍側太后曰汝盍自勸之帝亦弗顧也十一月吕誨乞大臣及淮陽王侍藥後移此附彼然附此為允更詳之癸未同知禮院祠部員外郎直祕閣吕夏卿奏請定九廟之制及請俟大行山陵復土百官班迎靈駕還內山陵使先入見日中行始虞之祭虞主不題諡號九虞既畢然後行卒哭之祭明日而祔廟詔兩制及待制以上與禮官會議觀文殿學士孫抃等奏夏卿所陳九廟事不經見其言周漢以來九虞之祭皆在十六日外欲俟大行靈駕還內日中行始虞之祭緣古之葬去國近平旦而葬日中而虞於寢今之葬逺虞主在途日遷舍不可以無祭其言漢制不題諡虞主及終虞而行卒哭之祭則如夏卿從之丁亥詔今嵗制科舉人著作佐郎趙商等十七人權罷將來判場便赴祕閣就試商安仁人也案原書作趙卨然卨係卭州依政人與此不合又一本作商今從之兵部郎中權判大理寺陳太素知明州太素常為大理詳斷官審刑詳議官權大理少卿又判大理寺任刑法二十餘年朝廷有大疑獄則必召與議太素推原人情以傅法意衆皆釋然自以為不及雖號明習法令然所論建亦或有不中每臨按牘至忘寢食大寒暑不變子弟或止之答曰囹圄之苦豈不甚於我也在大理以耳疾數求罷案耳疾原本作身疾今據宋史改執政以為任職弗許久之乃出守太素常謂有司議法當據文直斷不可求曲當求曲當法所以亂也翰林學士范鎮言竊聞大行皇帝受命寶及公寶法物與平生衣冠器用皆欲舉而葬之恐非所以稱大行皇帝恭儉之意其受命寶伏乞陛下自寶用之且示有所傳付若衣冠器玩則請陳於陵寢及神御殿嵗時展視以慰思慕詔檢討官討尋典故及命兩制禮官詳議翰林學士王圭等奏曰受命寶者猶傳國璽也宜為天下傳器不當改作古者藏先王衣服於廟寢至於平生器玩則前世既不納於中方亦不盡陳於陵寢謂今宜從約以稱先帝恭儉之實然時已更造受命寶而圭等所議弗用癸巳司馬光上太后及帝疏曰臣聞天地交謂之泰天地不交謂之否天地者上下之象也施諸人事君仁而臣忠父慈而子孝兄愛而弟恭皆泰也君不仁臣不忠父不慈子不孝兄不愛弟不恭皆否也泰則上下之情通內外之志和國以之治家以之安否則上下之情塞內外之志乖國以之亂家以之危治亂安危之分不在於他在於審察否泰之端而已矣書曰立愛惟親立敬惟長始於家邦終於四海自古明王治天下之道未有不自孝慈始者也恭惟先帝屬籍之親凡數百人獨以天下之業傳於聖明皇太后承顧命之際鎮撫中外決定大疑其恩德隆厚踰於天地何可勝言皇帝至性蒸蒸哀以執喪恭以致養夙夜憂勞以成疾疹其餘慈孝之美可謂至矣然臣竊有懼不可不過慮於萬一先事而進言者臣聞金隄千里潰於蟻壤白璧之瑕易離難合况社稷之重非特金隄也骨肉之親非特白璧也在於守之至謹執之至固完美無間然後福祿無疆也夫姦邪之人專窺主意釁隙則因乘之於是離間人君臣交鬪人父子使之上下相疾內外相疑已然後得奮其詐謀以盜其大權利其重利自古以來喪國敗家未有不由此者也今雖睿聖在上朝廷清明中外之臣咸懷忠良然禍福之源其來甚微舉措聽納不可不慎臣愚竊惟今日之事皇帝非皇太后無以君天下皇太后非皇帝無以安天下兩宫相恃猶頭目之與心腹也皇帝聖體平寧之時奉事皇太后承順顔色宜無不如禮若藥石未效而定省溫清有不能周備者亦皇太后所冝容也孔子曰孝哉閔子騫人不間於其父母昆弟之言蓋言誠信純至表裏著明而他人不能間也孟子曰父子責善賊恩之大者也蓋言骨肉至親正當以恩意相厚不當較錙銖之是非也臣愚伏望皇帝思孔子之言皇太后無忘孟子之戒萬一姦人欲有開説涉於離間者當行誅戮以明示天下使咸知讒佞之徒不能欺惑聖明也方今天地鬼神羣臣百姓鳥獸草木皆恃兩宫以為安兩宫歡欣於上則天地鬼神得以歆其禮祀鳥獸草木得以遂其生息况羣臣百姓孰不保首領以樂太平之化哉癸巳二十三日據本集附此帝初以憂疑得疾舉措或改常度其遇宦官尤少恩左右多不悅者乃共為讒間兩宫遂成隙太后對輔臣嘗及之韓琦因出危言感動太后曰臣等在外見得官家內中保護全在太后若官家失照管太后亦未安穩太后驚曰相公是何言自家更切用心琦曰太后照管則衆人自然照管矣同列為縮頸流汗或謂琦曰不太過否琦曰不如此不得間有傳帝在禁中過失事衆頗惑之琦曰豈有殿上不曽錯了一語而入宫門即得許多錯固不信也傳者亦稍息此據琦家傳及别録但略加刪潤大意與十一月末所載略同蓋此時琦未赴昭陵彼時歸自陵下不妨兩出之戊戍山陵使韓琦奏山陵諸頓所調物過多乞選朝臣一員付之計度乃命鹽鐡判官楚建中往裁其數時三司使蔡襄揔應奉山陵事凡調度供億皆數倍勞費既廣已而多不用議者非之此據蔡襄傳附見入內副都知甘昭吉充永昭陵使上即位之夕昭吉直禁中翊衛有勞自文思副使超遷供備庫使康州刺史昭吉奏曰臣本孤微無左右之舉而先帝知臣朴直自小官拔用至此分當從葬今願得西掃陵寢足矣上嘉其忠特有是命上疾既平猶未御正殿御史中丞王疇上疏曰王者以一心應萬幾之務莫不始於憂勤終則逸樂受命之初德澤未有以及人聰明未有以照物上下之誠未交中外之心未和故必勤其所當事憂其所未濟夜思晝行惟恐不及然後功業成而可以深拱無為矣此始終勞逸先後之序也祖宗丕受天祿四聖相授未嘗不以天下為憂陛下濳養藩邸而先帝發知子之明決承後之託天授有德固宜自勉以承靈心今四方之人翹足引首傾耳注目願觀新政者纍月於兹而未御正殿以見羣臣議者皆謂聖躬固已平復但以未經先帝卒哭不忍視朝此實天子之孝逾於髙宗矣今易月之期已在卒哭之外惟引禮割情顧思大誼早御前殿南面聽政赫然日升萬物咸覩臣民之望也
