body:
  text: 續資治通鑑長編卷一百十一宋李燾撰仁宗明道元年春正月乙亥以新知江陵府杜衍為河北都運使初命衍守荆南殿中侍御史郭勸言衍清直當留在朝不冝處外不聽㑹河北乏軍費乃遷衍一官往經度之不増賦於民而用足本𫝊云衍在荆南按衍初除荆南未赴即改河北𫝊蓋不詳也丙子契丹遣左千牛衛上將軍耶律順衛尉卿王義府來賀長寜節戊子降閤門宣事舍人夏元正為閤門祗候坐捧契丹書失儀也己丑降前益州路轉運使兵部貟外郎髙覿同判杭州覿在益州時有宦者挾富人請置場采金于彭州廣磧麗水二峽覿以聚衆山谷間又逼蠻部非逺方所冝且得不償失奏罷之王䝉正恃太后親多占田嘉州詔勿收賦覿又極論其不可既而知嘉州張約受賕法當死特杖脊配連州覿坐失察舉故貶官天聖八月二月庚辰可叅考癸巳詔按舉官奏劾所部官吏而反為所訟者自今毋得受理是月池州言民饑二月癸夘監修國史吕夷簡上三朝寳訓三十卷賜編纂官直集賢院王舉正三品服李淑五品服以泰州司馬劉舜卿為左班殿直捕河東軍賊甲辰召輔臣于崇政殿西廡觀講書丙午詔入廣南官者毋得過兩任初監察御史蔣堂言五嶺炎瘴之地人所憚行而比部貟外郎江澤三任皆願官廣南若非貪黷何以至此故條約之堂嘗知臨川縣民李申恃冨多為不法前令莫能制堂戒諭不悛白州以兵索其家得僣乗輿物寘申死堂宜興人也庚戌知許州定國節度使張士遜為刑部尚書平章事吕夷簡加中書侍郎初授夷簡中書侍郎兼兵部尚書固辭兵部尚書乃令學士院貼麻仍遣内侍都知藍繼宗就閤門賜之壬子除明温台三州海蛤沙地民税癸丑廢河中府慶成軍賣鹼場民有盗刮鹼土者令所在收捕之甲子詔貟外郎以上致仕者録其子為秘書省校書郎三丞以上為太廟齋郎丙寅詔淮南民大饑有聚為盗者其令轉運使張億經書以聞丁夘以真宗順容李氏為宸妃是日宸妃薨宸妃始生帝皇太后即以為已子使皇太妃保視之帝即位踰十年宸妃黙黙處先朝嬪御中未嘗自異人畏太后亦無敢言終太后世帝不自知宸妃所出也疾革乃進位遽薨年四十六三宫發哀成服苑中贈妃曽祖應已及祖金華主簿延嗣為光禄少卿父左班殿直仁徳為崇州防禦使母童氏為髙平郡太君攅塗于嘉慶院𦵏于洪福院之西北隅始宫中未治䘮宰相吕夷簡朝奏事因曰聞有宫嬪亡者太后瞿然曰宰相亦預宫中事邪引帝偕起有頃獨出曰卿何間我母子也夷簡曰太后他日不欲全劉氏乎太后意稍解有司希太后㫖言嵗月未利夷簡黜其説請發哀成服備宫仗𦵏之時有詔欲鑿宫城垣以出䘮夷簡遽求對太后揣知其意遣内侍羅崇勲問何事夷簡言鑿垣非禮䘮冝自西華門出太后復遣崇勲謂夷簡曰豈意卿亦如此也夷簡曰臣位宰相朝廷大事理當廷爭太后不許臣終不退崇勲三反太后猶不許夷簡正色謂崇勲曰宸妃誕育聖躬而䘮不成禮異日必有受其罪者莫謂夷簡今日不言也崇勲懼馳告太后乃許之鑿垣事據魏泰東齋記事宸妃以二月二十六日薨輟視朝三日三月初一日𤼵哀成服初四日贈三代十四日𦵏又輟朝今并書之宸妃之號前此亦未見恐是創置也詔京朝官就移差遣不拘以中書審官但自近移逺者即及三代並與磨勘詔選人求試律斷案者須歴任三考以上三月乙亥詔淮南饑民有願𨽻軍而不中者聽𨽻下軍丙子詔舉人授上佐文學助教叅軍者聽自便以蘄州言文學戚元彧嘗舉進士授散官而例與負販者不得私出入也己夘詔永興軍毋縱畜牧蹂踐秦始皇陵廟先是縁邉主兵官多役軍士斬薪燒炭往往逃避山谷或聚而為盗庚辰下詔禁之仍令轉運使察舉戊子始行天聖編敇詔淮南災傷州軍募人輸粟以濟飢民實録於十二月癸丑再書募淮南民入粟捄飢者今止一書李􅌫十朝綱要淮南江東大飢太常博士眀鎬者安丘人初為蘄州幕職知州鄧餘慶貪暴不法州事皆鎬持正之薛奎領秦州益州皆辟鎬自隨於是鎬罷益州通判還朝賜對上問輔臣以鎬所能者奎曰鎬文妙學博而沈鷙有謀能斷大事願陛下亟用之己丑命鎬權開封府推官尋即真初李宸妃入宫其弟用和纔七嵗後不復相聞知用和窮困鑿紙錢為業居京師妃既生子太后使劉羙及張懐徳訪妃親屬得用和於民間補三班奉職累遷右侍禁閤門祇候癸巳特遷用和禮賔副使三司請下陜西市材木二十九萬詔减其半甲午天章閣待制王鬷為准南災傷州軍體量安撫使閤門祇候韓永錫副之丙申龍圖閣直學士馬季良為江南東路災傷州軍體量安撫使西上閤門使曹儀副之遣官祈雨丁酉詔河北路練士馬葺噐械毋得弛備上封者言在京百司嵗補正名者三十餘人又選滿出官者無定數望自今罷逐年試補及出官惟遇南郊許試補五十人其出官之數亦如之詔可尋復詔毎嵗試補以二十人為額仍毋得陳乞優試舊制百司人問律文并䟽義既所對合格復令口誦之蓋防懐挾傳授之弊其自叙勞績或臣僚為之陳乞特免口誦謂之優試者率中選故條約之後詔乃四月己酉今聨書之黎州言卭部川山前後百蠻都王黎在請三嵗一入貢詔諭以道路遐逺令五年一入貢戊戌詔曰江淮之間仍嵗旱暵民之失職朕甚憫焉比遣使安撫其與長吏慮繫囚流以下降一等杖笞釋之兩浙轉運司言大中祥符五年已放諸路丁身錢而婺秀二州尚輸錢如故己亥詔悉除之詔權停貢舉四月丙午御崇政殿録繫囚辛亥契丹遣安東軍節度使蕭好古太僕卿王永孚來賀乾元節戊午詔流内銓自今初等幕職官本資應入令録而願知縣者聽之詔近臣非受詔毋得舉官乞試館職其已試而推恩者毋得再求試武昌留後錢惟濟在定州五年於是入覲命再守成徳以疾不行惟濟喜賔客豐宴犒家無餘貲帝特賜白金二千兩舊負公使錢七百萬一切貸之及卒别賜賻錢二百萬絹千匹惟濟頗知書少挾文藝性皦察自謂有將帥才前在成徳凡六年曹瑋將兵屯真定頗稱其能戢下然苛忍所至牽蔓滿獄凡重囚棄市或令人斷手足探肝膽加備諸毒用以威衆觀者莫不色動而惟濟自若人畏之道不拾遺在定州有婦人視其夫前妻之子不仁至燒銅錢以灼臂惟濟取其所生兒置雪中械毋使視兒死其惨如此惟濟卒在是年十二月因是月命再知成徳附見此事五月癸酉命内殿崇班閤門祇候劉永釗㸃檢河北東西路城池噐甲仍宻訪官吏能否及縁邉利害以聞庚辰詔大理寺所斷舊皆納中書刑房而嵗乆殘蠧自今令月用堂印封送刑部别庫蔵之仍令舊詳覆官一員季一檢舉又詔太常禮院日輪知院一員在院㸃檢典禮公事初同知太常禮院薛紳言漢魏以來朝廷大政必下禮官博士定議唐六典太常置博士四人今知禮院官蓋古博士之任也國朝同知院四貟日更直本院其後或别領職事因循廢直請如故事輪一貟在院乃下兩制議而翰林學士馮元等言咸平元年正月敇太常禮院同判院官輪一貟在院㸃檢典禮公事又大中祥符七年四月敇同判院官四貟張復楊嵎專領祠祭而宋綬晏殊常在禮儀院祇應文字後移三館於右掖門西與禮儀院相接而同判院官皆帶館職因而更不赴今既廢禮儀院又三館移入禁中請如紳所奏施行紳映子也壬午廢杭秀二州鹽場丙戌詔贈父官父官卑者毋得過其子三資中書樞宻院節度使以上及一品者並不定所止其見任大两省大卿監上將軍防禦使遥郡觀察使景福殿使客省使以上或父嘗歴是官亦許贈至三公開封府言編敇禁軍糧錢三百犯階級者斬刑名太重壬辰詔増至五百乙未以後宫尚氏父延福為國子四門助教據尚氏本𫝊父乃名繼斌景祐元年四月庚子除右侍禁八月甲戌編管鄧州今明道元年五月乙未乃有後宫尚氏父延福為國子助教不知何也或别一尚氏當考初譯經潤文使夏竦請注釋御所製三寳讃及皇太后發願文既許之於是又請擇館職官同注釋詔以命直集賢院李淑集賢校理鄭戬尋又詔宰臣吕夷簡都大叅詳六月丁未除江寜府便錢税殿中侍御史張存上䟽曰陛下嗣統以來延納至言罔有忌諱函夏之人共思讜直自前秋忽詔罷百官轉對去冬黜降御史曹修古等昨又聞進士林獻可因奏封事竄逺惡人心惶惑中外莫測臣恐自今忠直之言與理亂安危之機蔽而不逹因歴引周昌朱雲辛慶忌辛毗事以廣帝意存冀州人也存上䟽不得其時按蘓舜欽作林書生詩云生得罪未十旬禁中火則生奏封事蓋五月間存上䟽必相繼今附見六月末林獻可本末史失不載今取舜欽詩附見更竢考求詩瞽説聖所擇愚謀帝不罪况乎言有文白黑時利害前日林書生自謂胸臆大潜心摭世病成謂可賣投顙觸諫函獻言何耿介云昨見凶星上帝下警戒意若曰昬㧻出處恣蜂蠆安坐弄神噐開門納珍賄宗支若繫囚親親禮日殺大臣尸其柄咋舌希寵拜速速代虎叢無使自沈瘵陛下幸察之聰明斯不壊如覩賤臣言不瞬防禍敗一封朝飛入群目己睚眦力夫暮塞門執縳不容喟十手捽其頭如負殺人債幽諸死牢中擊灼若龜蔡亦既下風指黥而播諸海長塗萬餘里一錢不得帶必令朝夕間渴飢死於械從前冇口者縮脰氣如鞴獨夫已去除易若吹櫸稗奈何上帝明非徳不可盖倐忽未十旬炎官下其怪乙夜紫禁中一燎不存芥天王下牀走蒼猝畏挂礙連延舊寢廷頓失若空寨明朝黄紙出大赦徧中外嗟乎林書生生命不可再翻令㓙惡囚纍纍受恩貸按天文志是年三月癸巳星出中台貫北河入東井没炸烈有聲燭地食頃又有星出天市垣宗人側東流入濁四月乙巳星出貫索大如杯没于鉤星側光照地又六月六日乙巳客星出東北方近濁木星太㣲有芒彗至丁巳凡十三日而没不知舜欽詩所指㓙星是何星也又云宗支繫囚亦不詳所謂七月庚午朔詔知大名真定京兆鳯翔河中江陵江寜等府兖鄆青陳許亳襄鄧孟潞并延秦陜潭杭越蘓揚洪泉福等州自今並理三司判官轉運使副資序録故延州膚施縣令張歸正子思齊為郊社齋郎以歸正頃䧟契丹及為縣嘗辨寃獄未及賞而卒特録之辛未廣真州羅城壬申録馮道王朴後益利路鈐轄司言自今兩川配𨽻軍籍之人其元犯兇惡者不得還鄉里從之甲戌以龍圖閣直學士知永興軍王博文為樞宻直學士知秦州前二嵗博文知秦州走馬承受賈徳昌入朝毁博文詔徙鳯翔府又徙永興軍於是徳昌坐贓敗乃命加職復知秦州初縁邉軍民之逃者必為熟户畜牧又或以遺逺蕃易羊馬故常没者數百人其禽生蕃部則以錦袍銀帶茶絹賞之間雖有自歸而中道為畨所得亦不能辨坐法皆斬博文乃遣習知蕃事者宻持信紙往招至則悉貸其罪由是歳減殊死甚衆朝廷下其法旁路又言河西回鶻多縁互市家秦隴間請悉遣出境戒守臣使稽察之天聖四年十月己亥已載蕃部執送逃軍事但不詳耳詔淮南轉運使並治楚州而諸州申𤼵文字報復不時其徙一員治廬州許夀州立學仍賜九經知州侍御史朱諫請之也乙亥上封者言外任官有貪汚不公而監司不即按法乃奏見體量者其後事敗因免從坐之責而貪汚者或得善代以去請自今但曽經監司體量替日並降差遣從之壬午除澤州晉城縣逃户乾食鹽錢乙酉工部侍郎叅知政事王曙罷為資政殿學士户部侍郎以疾自請也封天章閣待制范諷母萬年縣太君劉氏為永嘉郡太君時上御藥張懐徳𫝊宣中書而特封之置黔州永安寨永州古城寨庚寅録冝州普義寨監押左班殿直髙徳子信為下班殿侍以徳與蠻賊戰死也辛卯以門下省為諫院徙舊省於右掖門之西先朝雖除諫官而未嘗置院及陳執中為諫官屢請之置諫院自此始丙申詔諸路轉運使舉通眀經義可為國子監講官者以名聞丁酉詔天下舉人依大中祥符八年額觧五分外其人多額少處許計就試人數解十之二戊戌權免淮南災傷州軍耕牛税又免頴州正陽渡錢是月太白晝見終月八月辛丑以三司使兵部侍郎晏殊為樞宻副使乙巳治大名古遥堤丙午以樞宻副使晏殊為叅知政事位在趙稹上詔淮南災傷州軍作糜粥以濟饑民辛亥權免江南災傷州軍果税壬子以鹽鐡副使刑部貟外郎劉隨為契丹國母生辰使内殿承制閤門祗候王徳基副之開封府判官職方貟外郎楊日嚴為國主生辰使客省副使王克基副之太常博士直集賢同修起居注胥偃為國母正旦使閤門宣事舍人王從益副之監察御史崔暨為國主正旦使東染院副使趙振副之尋命内殿崇班閤門祗候張懐志代振徳基超子克基承衍孫日嚴河南人也甲寅以殿前副都指揮使鎮南節度使楊崇勲為武寧節度使宣徽南院使兼樞宻副使除安利軍客尸乾食鹽錢乙夘詔河東陜西諸州向罷軍士伐薪燒炭如聞苦寒公用不給自今知州部署聽差廂軍七人鈐轄五人都監三人每季代之過其數者以違制論丙辰樞宻使山南東道節度使同平章事張耆加右僕射賜方團金帶佩魚丁巳以捧日天武四廂都指揮使興州防禦使曹儀為環慶路副都部署兼知邠州先是儀季父瑋知邠州有弓箭手都校李文扆者習知蕃漢事邊人多畏服其後帥府亦以為腹心一日輙為人告將叛朝廷下儀察其狀文扆惶恐不自安而儀益委用之於是邊人皆感悅戊午詔國子監重修七十二賢堂其左丘明而下二十一人並以本品衣冠圖之庚申詔淮南荐飢長吏有能撫存流亡者轉運使具以聞辛酉以邈川大首領嘉勒斯賚為寧逺大將軍愛州團練使雅仁結首領温布且為歸化將軍始埒克遵與曹瑋戰三都谷不勝又襲西凉兵敗斯賚遂與埒克遵不協更徙邈川用温布且為倫布數使人至秦州求内屬故有是命已而温布且作亂囚斯賚置穽中出收不附已者守穽人間出斯賚集兵殺温布且徙居青唐壬戌修文徳殿成是夜大内火延燔崇徳長春滋福㑹慶崇徽天和承眀延慶八殿上與皇太后避火於苑中癸亥移御延福宫甲子放朝近臣詣宫門問起居以宰相吕夷簡為修葺大内使樞宻副使楊崇勲副之殿前副都指揮使夏守贇都大管勾修葺入内押班江徳明右班副都知閻文應管勾令京東西淮南江東河北路並發工匠赴京師乙丑詔羣臣直言闕失又詔隻日權御崇政殿視朝百官並入拱宸門先是百官晨朝而宫門不開輔臣請對帝御拱宸門追班百官拜樓下宰相吕夷簡獨不拜帝使問其故曰宫廷有變羣臣願一望清光帝舉簾見之夷簡乃拜丁夘大赦其營造殿宇宜約祖宗舊制更從减省時宦者置獄治火事得縫人火斗已誣伏下開封并使具獄權知府事程琳辨其不然乃命工圖火所經處且言後宫人多所居隘其鍋竈近板壁歳乆燥而焚此殆天災不可以罪人監察御史蔣堂亦言火起無迹安知非天意陛下冝修徳應變今乃欲歸咎宫人且宫人付獄何求不可而遂賜之死是重天譴也帝為寛其獄卒無坐死者是月殿中丞滕宗諒祕書丞劉越準詔上封事宗諒言夫攻玉必以石濯錦必以魚物有至賤能成至貴者人亦有之故頴考叔舍肉以啟莊公之孝少孺子挾彈而罷吳王之兵臣之區區竊慕於此伏見掖庭遺燼延熾宫闥雖縁人事實繫天時詔書亟下引咎滌瑕中外莫不感動然而詔獄未釋鞫訊尚嚴恐違上天垂戒之意深累兩宫好生之徳且婦人柔弱箠楚之下何求不可萬一懷寃足累和氣祥符中宫掖火先皇帝盡索其類屬之有司明寘以法欲申戒於後人若患可防而刑可止豈復有今日之虞哉况變警之來近在禁掖誠願修政以禦之思患以防之凡逮繫者特從原免庶幾咎災可消而福祥來格也又言國家以火徳王天下火失其性由政失其本因請太后還政而越請太后還政言尤鯁直皆不報宗諒河南人越大名人也九月庚午以景福殿使雅州防禦使入内都知韓守英為都知仍月増俸三萬宫苑使忠州防禦使入内都知藍繼宗為昭宣使西京作坊使文州刺史入内押班江徳眀為如京使入内副都知賔禮使入内押班盧守懃領昌州刺史又自上御藥而下至内品凡遷擢十五人並以宫庭火録衛乗輿之勞也火始作小黄門王守規獨先覺自寢殿至後苑門皆擊去其鏁亟奉帝及太后至延福宫回視所經處已成煨燼及執政候起居帝曰非王守規引朕至此幾與卿等不相見乃以守規為入内殿頭守規承勛㓜子也甲戌詔百官五日一朝降涇原路副都部署捧日天武四廂都指揮使龔州防禦使髙化為滑州部署知渭州西上閤門使安繼昌知丹州涇原都監左騏驥使英州刺史王懐節為河陽都監知鎮戎軍内殿崇班閤門祇候髙繼嵩為陜西都監並坐掩撃敏珠爾族失利也先是化等以盛夏出兵徑抵賊帳一日行幾百里兵素不整渉險皆困乏既與賊遇首尾不能相救遂自奔潰騎士渴死者又三之一自是指敏珠爾為彊族不敢復言攻取云此據聚米圖經丁亥永興軍言左衛大將軍分司西京李士衡卒其後諸子訴其父有勞於國非意左遷詔追復同州觀察使士衡前後筦計二十年雖才智過人然素貪家貲至累鉅萬建大第長安里中儼若官府云當附士衡復官時己丑廢真定府石炭務貸淮南災傷州軍貧民種糧庚寅重作寳册命叅知政事陳堯佐書皇帝受命册寳叅知政事薛奎書尊號册寳宰臣張士遜書上為皇太子冊寳叅知政事晏殊書皇太后尊號冊寳以舊冊寳為宫火所焚也既而有司言重作冊寳其沿寳法物凡用黄金二千七百兩詔易以銀而金塗之二年正月十七日景祐二年八月十七日可考丙申詔以皇太后及上閤中金銀噐物量㽞供需外盡付左蔵庫易緡錢二十萬助修大内丁酉環慶走馬承受李徳言西賊冦邉詔都署司嚴飭兵備又令鄜延路移文夏州戒約之此當是元昊襲甘州及西凉府時也戊戌賜修内役卒緡錢冬十月甲辰改崇徳殿曰紫宸長春殿曰垂拱滋福殿曰皇儀㑹慶殿曰集英承明殿曰端明延慶殿曰福寜崇徽殿曰寳慈天和殿曰觀文大寜門曰宣祐宣和門曰寜陽左右勤政門曰左右嘉福乙巳以知江寜府太常少卿李允元兼江南東路災傷州軍安撫使知揚州兵部郎中王立兼淮南災傷州軍安撫使己酉再賜修内役卒緡錢甲寅夀州言歳飢乏稻種請於浙西市三萬斛以貸民從之以鎮戎軍新修赤蒿城為懐逺城乙夘詔災傷州軍監臨官虧課而已科罰者勿以為負丁巳令漢陽軍𤼵廪粟以賑飢民戊午加贈鎮王元儼母昭媛王氏為太儀元儼事母孝謹毎有疾躬侍藥劑晨夕盥潔焚香以請命憂念或至不食及其終哀戚過人十一月甲戌上以修内成恭謝天地于天安殿遂謁太廟大赦改元優賞諸軍百官皆進官一等不隔磨勘選人及十二考歴任無贓罪並許磨勘引見百官進官一等此據本紀不隔磨勘此據朔厯實録但云加恩若止加恩則非進官實録誤也今州縣所有慶厯新編赦書亦與本紀朔歴同祖宗故事云明道改元非次恩賞尚有不滿之意朝廷别為施恩此事當考是日還自延福宫己夘冬至百官賀皇太后於文徳殿上御天安殿受朝癸未宰臣吕夷簡加右僕射兼門下侍郎張士遜加中書侍郎兼兵部尚書夷簡固辭所加官乃令翰林貼麻改門下侍郎兼吏部尚書鎮安忠武節度使太尉尚書令兼中書令鎮王元儼為河陽三城武城節度使守太師徙封孟王樞宻使張耆改為昭徳節度使兼侍中副使楊崇勲改山南東道節度使夏竦為尚書左丞趙稹為吏部侍郎叅知政事晏殊為尚書左丞陳堯佐薛奎並為禮部侍郎定難節度使守太傅尚書令兼中書令西平王趙徳明封夏王乙酉進封鄧國大長公主為楚國冀國大長公主為魏國戊子如京使文州刺史入内副都知江徳明為文思使普州團練使左蔵庫副使右班都知閻文應為洛苑使開州刺史並録管勾修内之勞也其餘督作承受奏事遷擢者又十三人庚寅以左驍衛上将軍劉承珪子左蔵庫使從愿為洛苑使内侍髙品從政為殿頭孫惟恭惟明並為三班借職弟供奉官承鈞為内殿崇班時承珪妻申國太夫人彭氏卒特推恩也兵部貟外郎知信州梁頠坐受賕及盗官碌礬法當死以更赦特除名本路轉運使蕭貫失察舉降知饒州有撫州司法叅軍孫齊者初以明法得官㽞其妻杜氏里中而紿娶周氏入蜀後周欲訴于官齊斷髪誓出杜氏乆之又納倡陳氏挈周所生子之撫州未踰月周氏至齊捽置廡下出偽劵曰若傭婢也敢爾邪乃殺其所生子周訴于州及轉運使皆不受人或告之曰得如饒州蕭使君者訴之事當白矣周氏以衣書姓名乞食道上馳告貫撫非所部而貫特為治之更赦猶編管齊濠州辛夘孟王元儼徙封荆王為永興鳯翔節度使詔舒州吳塘堰自今令本縣令佐一貟歳檢功料以上户為陂頭部衆修築之仍禁民近塘置水碓磑及於陂腹種蒔其盗决者論如律初淮南安撫使王駿言舒州民多近塘置碓磑以奪水利事下淮南轉運司而轉運使舒式言吳塘聚竹落石為堰其長百丈折水而南歴五門北至竹子陂凡十七堰溉田千頃非官為修治則寖以墮廢故條約之壬辰交趾郡王李徳政加同平章事夏王趙徳明凡娶三姓黙穆氏生元昊宻克黙特氏生沁裕勒額蔵渠懐氏生沁威元昊小名葉邁羌語謂惜為崖冨貴為埋性凶鷙猜忍圎面髙準長五尺餘少時衣長袖緋衣冠黒冠佩弓矢從衛步卒張青蓋出乗馬以二旗引百餘騎自從曉浮屠學通蕃漢文字案上置法律書常擕野戰歌太乙金鑑忽引兵襲伊嚕格勒罕破之奪甘州數諫徳明無臣中國徳明輙戒之曰吾乆用兵終無益徒自疲耳吾族三十年衣錦綺衣此聖宋天子恩不可負也元昊曰衣皮毛事畜牧蕃姓所便英雄之生當王覇耳何錦綺為既䧟甘州復舉兵攻拔西凉府未踰時徳明死元昊繼立延州以聞詔輟視朝三日贈太師尚書令兼中書令命開封府判官度支貟外郎朱昌符為祭奠使六宅副使内侍押班馮仁俊副之賜賻絹七百匹布三百匹副以羊麵上尊酒將𦵏賜物稱是皇太后所賜亦如之帝與皇太后為徳明成服於苑中百官奉慰實録正史並稱徳明既攻䧟甘州㧞西凉府未踰時乃死甘州及西凉府䧟没實録正史並不記其年月日所稱未踰時或即是徳明死之年然徳明每不聼元昊用兵其攻䧟甘州及西凉府想非徳明意𫝊又稱元昊忽引兵襲甘州可見徳明不在其間西凉府亦必元昊自㧞之徳明不與也實録正史載此事不詳因徳明死時乃附著之蓋誤矣今皆刪修使不相牴牾要檢尋他書或載甘州及西凉府䧟没時則别修附癸巳制授元昊特進檢校太師兼侍中定難軍節度夏銀綏宥静等州觀察處置押蕃落使西平王以司封貟外郎判開拆司楊告為旌節官告使禮賔副使朱允中副之元昊既襲封即隂為叛計時改元明道而元昊避父名輙稱顯道於國中雖奉貢然僣巳萌矣初對使者設席自尊大而告徙坐即賔位不為屈又聞屋後有數百人鍜聲知其必叛獨畏懦不敢言告允恭子也告或已見允恭没時淮南江東民飢詔制置發運司轉米三十萬斛賑濟之詔上御藥自今比内殿承制上御藥供奉比崇班仍居本品之上乙未詔三班院宗室壻年及格者與在京差遣丙申詔蘓州所没丁謂庄田還給其家仍以其子前内殿承制珝為供奉官十二月庚子詔以來年二月躬耕藉田先請皇太后恭謝宗廟權罷南郊之禮其恩賞並就禮畢施行辛丑命直集賢院王舉正李淑與禮官詳定藉田及皇太后謁廟儀注禮官議皇太后冝準皇帝衮服减二章衣去宗彛裳去藻不佩劍龍花十六株前後垂珠翠各十二旒以衮衣為名詔名其冠曰儀天又言皇太后乗玉輅服禕衣九龍花釵冠行禮服衮衣冠儀天冠皇太妃皇后乗重翟車服鈿釵禮衣以緋羅為之具蔽膝革帶珮綬履其冠用十二株花釵太廟行禮並服禕衣詔可之敇有司製禮衣及重翟以下六車始太后欲純被帝者之服參知政事晏殊以周官王后之服為對失太后㫖輔臣皆依違不决薛奎獨争曰太后必御此見祖宗若何而拜固執不可雖終不納猶少殺其禮焉殊事據神道碑正傳不改奎墓誌云太后乃改他服誤也壬寅知天雄軍天平節度使王曽加同平章事知天雄軍如故又加彰徳節度使柴宗慶同平章事宣徽南院使兼樞宻副使山南東道節度使楊崇勲為樞宻使崇勲曲謝太后與上言先帝最稱崇勲質信可任大事又超遷之甲辰以宰相吕夷簡為恭謝太廟藉田大禮使張士遜為禮儀使樞宻使張耆為儀仗使楊崇勲為鹵簿使樞宻使夏竦為橋道頓逓使丙午追封秦國賢肅長公主為大長公主秦國降王承衍羣臣上皇帝尊號曰睿聖文武體天法道仁明孝徳上皇太后尊號曰應天齊聖顯功崇徳慈仁保夀凡五上乃許之壬子江東轉運司言本部災傷請權罷上供物從之太常博士楊偉郭稹並為集賢校理殿中丞宋祁為直史館太子中允韓琦為太常丞直集賢院大理評事石延年趙宗道上元縣主簿吳嗣復合肥縣主簿胡宿並為館閣校勘仍詔館閣校勘自今須召試毋得陳乞偉億從弟琦安陽人延年宋城人宗道賀子宿晉陵人也稹祁已見嗣復未見職方貟外郎陸叅為崇文院檢討叅少好學淳謹獨與母居鄰家失火母急呼叅不應蹴之堕床下良乆束帶執燭而至曰大人嚮者呼叅叅未束帶故不敢應及長舉進士及第嘗為縣令有刼盗被縛甚急叅愍之呼謂曰汝廹於飢寒為是耳非性不善也命緩其縛一夕逸去吏亟以白叅命捕之嘆曰我以仁惻緩汝汝乃忍負叅如何脱復捕得胡顔見叅又有訟田者判其状尾而授之曰汝不見虞芮之事乎訟者齎以示所司皆不能觧復以見叅又判其後曰嗟乎一縣之人曽無深於詩者人皆傳以為笑蔡齊以為有淳古風薦之朝授以館職叅未詳邑里其本末據司馬光記聞及江休復雜志丙辰以給事中李若谷知夀州安豐芍陂皆羙田多豪右分占盛夏雨溢壞田輙盗决若谷擿冐占者逐之毎决輙調瀕陂諸豪使隄塞其後盗决乃止戊午詔獲刦盗而情渉巨害者毋得擅行凌遲湏奏聽裁初廬夀光等州都廵檢使梁紹熈言獲累行刼盗者六人凌遲處死故條約之己未上封者言比詔淮南民飢有以男女雇人者官為贖還之今民間不敢雇傭人而貧者或無以自存望聽其便從之庚申命樞宻直學士權三司使李諮翰林學士盛度侍讀學士王隨同議解鹽法天聖八年始聽解鹽通啇行之一年嵗入視天聖七年増緡錢十五萬明年更損九萬其後嵗益耗故令諮等議之度隨皆初以通商為便者也壬戌契丹遣奉先軍節度使蕭式少府監張推保來賀皇太后正旦癸亥契丹遣左驍衛上將軍蕭察安東軍節度使夏亨謐來賀正旦是嵗契丹主改元重熈邉吏言諜知契丹將大入邊輔臣争言擇帥備邉之策叅知政事薛奎獨曰先帝與契丹約和歳遺甚厚必不敢輕背約已而皆如奎所料帝嘗謂輔臣曰臣之事君多見其有始無終者奎對曰保終之道匪獨臣下然也如唐明皇開元之初勵精為治天下晏然及其末也放意荒侈卒至大亂此不可不監也帝深然之上封者言自河南六監廢京師須馬取之河北道逺非便詔遣左廂提㸃王舜臣往度利害舜臣言鎮寜靈武東平淳澤四監雖廢然其地猶牧本監并騏驥院馬洛陽單鎮監去京師近罷之非便乃詔復二監以牧河北孶生馬此據本志不得其時附見年末
