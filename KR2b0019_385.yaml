body:
  text: 續資治通鑑長編卷三百八十一宋李燾撰哲宗元祐元年六月甲寅下詔曰朕惟先帝臨御以來講求法度務在寬厚愛物仁民而搢紳之間有不能推原朝廷本意希旨掊克或妄生邉事或連起犴獄積其源流久乃知弊此羣言所以未息朝廷所以懲革也敕正風俗修振紀綱兹出大公蓋不得已况罪顯者已正惡巨者已斥則宜蕩滌隱疵闊略細故不復究治以纍太和夫疾之已甚孔子不為御衆以寬有虞所尚為國之道務全大體應今日前有涉此事狀者一切不問言者勿復彈劾有司毋得施行各俾自新同歸美俗布告中外體朕意焉舊録云時先帝法度廢改殆盡前朝所用之官棄逐無一人在廷乃降是詔然彈劾罪斥相繼不已新録辨曰當時既有所竄逐慮在職者不安故降手詔以示寬恩此朝廷仁厚之至也既云前朝所用之臣無一人在廷彈劾不已則安用此詔其説非是自時先帝至不已刪去三十五字下詔以六月二十八日甲寅此據舊録王覿奏議乃云六月八日不知何故當考吕大防政目六月二十八日手詔諭懲革政事之意即此詔也其頒降則在七月十一日蓋緣言者紛紜踰旬乃宣布耳給事中胡宗愈奏中書省敕內有言者勿復彈劾有司毋得施行之語臣愚竊以謂此二句於體未便欲望去此二句則盡善矣元祐密疏後所頒詔無言者勿復彈劾六字蓋從宗愈奏也七月十一日可考始鄧綰責滁州言者未已范純仁勸太皇太后勿行太皇太后因欲下詔以慰反側既而中輟及吕公著救賈種民太皇太后復欲下詔公著以為當然遂從之或謂公著曰今除惡不盡將貽患他日公著曰治道去太甚耳文景之世網漏吞舟且人才實難宜使自新豈盡使自棄耶此據吕公著家傳詔之未下也言事官交章論其不可御史中丞劉摯言臣聞朝廷議欲降詔中外慰安人情傳聞二三臣不敢言若果如此臣實未諭伏見陛下即位以來修先朝政事增損法令進退官吏大要專以安民四方曉知上指坦然明白矣於懷私負釁貴近不赦而忠信之言雖小必録此又人人皆能道之臣獨不知國家尚安所疑欲家至而户曉也若謂日者黜責一二臣僚恐附麗黨與不無反側故以詔書安之臣謂人情無甚相逺不從上令而從其意動民以言不若示之以事自古而然朝廷果將吹毛洗垢搜抉宿過則詔令隨行人亦不信今但朝廷罰罪之意出於公議惟貴大體不問其餘則雖無所言何患人不知之近者朝廷法令方具功罪明白吏民安堵自如正宜鎮靜無事何故自生疑二猥欲以言語區區過自分説以勝士大夫之心臣恐中外有以窺陛下也前世自漢唐以來因誅鉏叛逆或剋復僣偽危疑之始慮有動搖故亟下詔令慰撫未萌今升黜官吏何時無之何至張皇自生不安之意臣竊以為過矣抑臣聞之人才實難自非大姦大猾懷邪怙終此外安有終身棄置之理古人以功補過所謂使功不如使過良以此爾前以罪退後以功進是乃國家所以公天下者見之一二則中外將不待言而信矣臣謂安反側之計無以尚此何必空言哉伏望睿斷寖降詔之議免四方疑惑以幸天下雜録第二册有日月云元年六月二十九日貼黃稱臣得於傳聞未知虛實萬一有之所損不細須至先事奏論伏望寖罷以全大體此用遺藁增入又言臣近聞朝廷議欲降詔中外得於傳聞未見本末然竊謂朝廷舉動不可不謹昨已具狀論列今者外議籍籍又異於前大意謂陛下即位以來增損法令進退官吏今日改意自悔故欲下詔委曲解説又深厭臺諌言事故欲指約多士轉相告語且謂自此臣僚雖有罪犯無復憂畏臺諌雖有聞見無復敢言詔令未下人已非議臣備位言路所聞如此不敢不論臣以謂刑賞豫奪天下公器非茍順人情惟當而已日者朝廷加惠元元取官吏蠧國賊民之尤無狀者顯黜一二以勵其餘此甚大惠陛下以為當耶未當耶誠以為當則足矣何必家至户曉自啓疑二之意使忠義自失姦罔幸免臣所未諭也臺諫臣僚類皆踈賤孤寒之人而使以譏切主上彈治貴近為職其勢固以不勝若稍加沮抑且使有誅夷之憂則人人顧私自便誰敢盡言又况聽與不聽上繫朝廷去取大抵欲言十事退思反顧已去五六其言雖上又經裁擇則言而聽者率不過十一二然則朝廷聽言可謂審重論議雖多言者何罪且臺諫以言為職今若明出詔令戒使勿言則是豫之官而奪其職為小人之所睥睨輕誚必不能自立相率引去然則言路塞絶誰復以利害之計上聞又臣所未諭也臣思慮纍晝夜其事甚易見不知為陛下建此計者誰乎臣願陛下深思臣言無忽速賜寢罷降詔以安士論若本無此議臣聞之誤妄罪當萬死貼黃稱竊料詔意謂前日弊事已革舊罪已除故下詔令與吏民改行自新臣獨疑之若果然則為害益大臣謂朝廷大約修明先帝法令去其犯法之人是乃文武成康相成之治今云與更新自今日始則臣不知以先朝之治為何如哉以此示天下實傷國體多士之論已有及此者不可輕發又貼黃稱臣寮若有舊罪宿惡天下所不容者今日言者雖且依詔旨不敢彈治一旦將此等人别有進擢而言路又將不論則無乃負朝廷而失官守哉故雖有誅戮必須爭之是今日之詔不足以禁其必言也又貼黃稱陛下欲撫安小人使不自疑惟在今後掩覆小過不賜行遣足矣恐不可明示以一切不問之意使肆意無所忌憚非所以神明其權尊嚴綱紀者也仍望檢臣前奏一處詳覽又貼黃稱治平中濮廟之議執政不能勝公論以至出榜朝堂委曲開諭而人心終不以為是以此知理勝則不必示人以言惟在正已謹行事而已又貼黃稱陛下修正法度進黜善惡出於至公天下幸已慰服今無故自生疑二自信不篤區區以言語收拾人情傷國大體又言臣近兩具狀奏乞寢罷降詔指揮未知聖意賜與不賜省察士大夫臆度風旨轉相傳誦不無非議臣謂降詔本欲安人情而詔令未下事已宣露反使人情疑惑則利害固己可見甚非陛下鎮靜中外之意臣備員言路此而不論臣則有罪是以不避煩瑣願畢其説臣謹按齊桓公與管仲謀伐莒謀未發而聞於國人國人曰君子善謀小人善意臣竊意之也故朝廷之人不為則已茍有所為雖祕謀密計人且意而知之况陛下已修政事已清人物遂欲闊略細故含垢匿瑕示天下以寬大誠大惠也但此意一定何患人知不知若更施於行事一二則中外諭意坦然洞逹矣何必空言喋喋過自分辨急於取信無乃害國家大體乎詔書大意不過以謂罪惡者已治欲使其餘改行自新恭惟先皇帝飬育人材布滿內外其中邪慝不能無之今已行懲勸則是乃所以成就先帝之美若必形於詔書示蕩滌之惠使之自新則似分别前日政事虧損治道無大於此然則人情安與不安乃在陛下立意行事其意如何耳不在降詔詔下之後事體窒礙其害乃至如此臣願陛下深賜省照特罷降詔以全大體臣不勝拳拳貼黃稱仍乞檢會臣前兩狀一處詳覽又貼黃降詔自疑殊非國體又聞詔意更復戒約言者謂舊惡宿姦自今皆不得彈治尤恐非便蓋臺諌官本為人主耳目以督察姦邪今置言事官而禁其言事是有耳目而自蔽之不使有所聞見也小人欺天罔上不忠不義其罪既均而乃限以今日以後一切不問則今日以前已被罪者何獨不幸也小人身有罪戾常使懼於暴發則庶幾有所忌憚若明告之曰汝前此雖有罪今不以大小不問矣不使言者及汝矣臣恐朝廷綱紀不肅下有肆慢之心又貼黃稱臺諌所言在陛下聽與不聽爾若言不中理或挾邪懷二朋姦立黨則竄逐罷免無不可者不當無故禁戒令不得彈治罪惡使小人睥睨自肆也又貼黃稱民可使由之不可使知之今陛下欲以曠然大度包掩瑕疵但因事行之不可預以告人示天下以自疑之意也殿中侍御史林旦言近者風聞朝廷欲降詔書戒約言事官不冝疾惡太甚動搖人心初聞之以謂此妄意朝廷之言耳殊不以為信既而傳者益衆不能不為疑竊惟陛下臨政之初虛已聽納招徠讜言四方之人孰不欣戴此實宗廟社稷之福也今方踰嵗若遂厭言有詔戒止凡傾耳以聽企足以望者得不解體耶此必有造謀以誤陛下者臣度其意不過兩端而已一則務為姑息以掠譽於小人一則持此自獻謂能不謗於先帝夫有國之要道在於使君子道長小人道消而已君子道長則德澤日被於天下而為朝廷之福小人道消則疾苦不加於百姓而得四方之心豈有為民除去疾苦而反致人心之不安也若此則虞舜不當放四凶孔子不當誅少正卯矣聖人於戕賊不仁之人殺之而不疑今朝廷寬大見其罪惡不過慰塞人望量褫其官職降其差遣而已何損於其身何愧於天下而便致人心之不安也此等小人本無愛君利民之心人疾之久矣又何足矜恤而更姑息甚倒置也且先帝聰明睿智憂勤庶政不愛髙爵重祿而與士大夫共之乃望其盡忠竭誠以報稱其恩寵也彼乃結黨相因公肆欺侮醜穢慘虐無所不至使上之人雖有良法美意而澤不下流隂受小民之怨望其負國罔上之罪何可勝誅也向日執政之臣言事之官目擊耳聞不肯以告故使朝廷未正其罪今罪惡悉已暴露然朝廷終不忍深誅而顯戮之雖有貶降亦只是奉行先帝聖意譴斥不忠不良之人且示天下以前日失當之事自各有建言之人奉行之吏非出於先帝之本意也如此豈得為謗先帝乎大凡言事之官招仇觸怨豈所欲為朝廷過奬借之猶有畏懼觀望而不肯盡言者况又有所沮抑之則彼安肯奮不顧身以輸忠於陛下乎臣竊恐由此遂使亮直之人反為羣小指笑玩侮必懷畏避而不得安其位矣若其言事彈擊不實喜怒任情朝廷摘示羣衆罷之可也竄之可也但不當泛下一詔均沮遏之耳今日朝廷正恐姦邪乘間作過惟藉耳目之官防察糾正若自為壅塞以啓小人之幸則此後執政大臣欲進擬前日不忠不良罪慝顯著之士置在要近誤朝廷委任遂有以藉口而鉗閉臺諫官之言矣此甚非計之得也臣不敢恥過作非而重於去位止是愛惜國體恐天下之人誤認朝廷之意而起疑惑觀望之心爾利害所繫不少願陛下謹之重之貼黃稱陛下即位之初首下求言之詔其間嘗以迎合扇搖犯分要譽為戒當時中外欲言之人尚畏憚而結舌賴六月再申詔諭於是人始敢言以求言之詔少形戒約人猶不敢言况今下戒言之詔明使不得論列則又豈復有敢言者耶若姦邪進用略有指陳必為犯令若默而不言豈忠臣志士所以事君報國之義乎則此詔一出於國體所繫可謂甚重陛下不可以不慮也旦疏不得其時附劉摯後監察御史上官均言臣竊聞陛下詔書慰安中外大臣以前日宿姦舊惡一切置而不問臺諫仍不得彈治臣始聞之疑惑不信數日以來搢紳士人傳者愈衆以為信然臣以不肖備位風憲聞而不陳則為隱情疑而不論則為曠職仰負陛下任使之意臣竊惟詔旨必以謂前日黜去一二大吏姦諛刻深掊斂罔上之臣恐黨與反側無自全之意故為此詔以慰安之臣以謂賞罰者人主之大柄所以示天下之公議使為善者勸為惡者懼要在處以至當斷以必行而已若懲一二姦臣而以同類恐懼為疑又為善辭以慰勞之則是行姑息之政非所以信賞罰而示天下之公議也不知陛下以前日斥去一二姦諛險詖之臣為是耶為非耶以為非耶則命出之日天下之士莫不心悅而誠服皆以為陛下聰明睿智洞照枉直不當疑其非也以為是耶去邪勿疑不當惑而中止為姑息之政也夫諌官御史以言為職至於政事之得失人臣之邪正凡繫天下之利病理亂者皆得上聞所以廣朝廷之耳目而通天下之情也自古求治之君𨗳之使言戒其鉗默者有矣未聞預詔曰某事不當言如天下之事必待詔許而後得言則御史為徒設天下之事朝廷有所不得聞矣陛下臨御之初詔四方士民下及芻蕘之賤皆得上議朝政下言利病是時天下之人莫不歡欣鼓舞罄竭所聞以裨日月之明而又歌頌詠歎以為陛下有寬明從諫之實今日之詔乃戒言職不得有所彈治儻或有之實恐上纍陛下納諫之美異乎前日開闢言路之意也方今法度未為備具生民未為富實內有未舉之政事外有未賔之蠻夷實朝廷廟堂孜孜夙夜講求利害博採衆言之時若使諫官御史上觀朝廷之旨次窺大臣之意中心宛結有所懷者不得論列天下之事不得上逹恐非朝廷之福也若陛下之意以為宿愆舊惡務為覆蓋許以洗心自新則言者有發摘細故不足深治者陛下置其言而勿用可也誠恐不當預戒以不得彈治仰纍陛下從諫納善之美臣愚區區欲乞追寢詔書以副前日開闢言路之意伏願陛下留神詳察天下幸甚據元祐章奏録上官均乃以七月五日上此今附見劉摯後不復移出它皆倣此左司諫王巖叟言臣纍日來風聞陛下欲降詔書以安人心反側事臣不知果有果無然臣既有所聞不可不先事而言以備采擇未審此事出於聖慮耶出於左右者之謀耶出於聖慮則臣以謂陛下私憂過計耳出於左右者之謀則臣以謂誤陛下矣自古以來朝廷黜邪退姦亦是常事何須過當以為憂疑反動姦人之心將謂陛下畏之必潛增凶𦦨隂造禍機傾搖善良窺伺新政矣可不戒哉伏惟陛下即位以來上合天心下從民欲斥逺姦邪登崇忠直納天下善言而不厭革天下弊事而不疑故能使四夷靖安百姓歌詠以復見祖宗太平之盛陛下惟當日篤此心隆此道以永社稷無疆之休不宜少移初意也夫姦心抑之且不可止况於進之直言求之且不可得况於沮之長君子而消小人在陛下一言長小人而消君子亦在陛下一言此國家否泰之關而天下治亂之幾也陛下不可不深思不可不豫防臣恐詔書一出則言之後時故冒犯而先論願陛下納臣愚忠收詔勿下使羣邪自靜以飬朝廷之威使衆正自安以重國家之勢天下幸甚貼黃稱臣竊思降詔之後老姦宿邪則安矣而忠臣義士必不自安陛下方求天下大治以追祖宗之盛而使忠臣義士不得盡其心非陛下之福也願因臣之言反復思之重此詔書之發幸甚舜去四凶當時四凶之黨不應無人尚在中外未聞下詔安四凶之黨也臣自風聞下詔寢食不復自安必料陛下畏見多言故有此指揮不知令臣今後如何居職有言則犯令不言則負恩進退之間未知所處幸陛下察之無誤此舉言事官當忠於主上公於天下是為稱職忠則不肯立朋黨故言無所隱公則不敢任喜怒故言無所欺或朋邪罔上或意在報私或厚誣其人或以訐為直或隂懷顧忌則陛下當深察其情罷之則可也竄黜之則可也以為約束一切閉其言則不可也如果有詔書即望陛下采納臣言只作聖意取入禁中以安言路之心巖叟又言臣前日以風聞欲降詔書安搢紳之心輒犯天威論奏不便乞收詔勿下深慮言之未切聖心未加采納竊緣此事出於陛下舉動所繫國體至重臣不敢茍且自安便為俯默負陛下平日待遇之意伏覩陛下即位以來惟以求言為盛德納諫為聖功天下風聞莫不鼓舞雖前代英主有所不及正宜日進此道不倦以終之以副天下之望今方踰年而遽下此詔雖名為安慰罪人其實乃約束言者竊恐四方流聞疑朝廷厭言而拒諌有損陛下盛美臣謂此詔之出上無益於聖德中無益於治體下無益於忠言惟是挫端良之心增姦邪之意耳不獨如此而又將有人睥睨朝廷以為可以窺測侮易政令以為可以動搖自古欲治之主惟患言之不多天下之善惡有所不聞以塞其聰明未聞禁言者使之不言也言者言之陛下擇可行者而行之仰不纍陛下之明俯不失言者之職則言雖多而何傷臣初為諌官對於簾下親聞德音丁寧諭臣等曰天下之事無大小一一言來當一一主張臣感激至恩恨不傾瀝肝膽以為補報今日詔書臣所未諭陛下求言如此之切不應厭言如此之早也近古好諫莫如唐太宗敢諫莫如魏鄭公太宗一日問曰今日所行與往者何異鄭公曰貞觀之初恐人不言𨗳人使諌三年已後見人諌諍悅而從之一二年來不悅人諌雖勉以聽受而終有難色太宗曰如何事如此鄭公遂一一陳之太宗曰誠如公言非公無能道此者人皆苦不自覺公向未道時都自謂所行不變及見公論説過失堪驚公但存此心朕終不違公臣讀之至此每歎美太宗之服義景仰鄭公之盡忠願陛下慕太宗貞觀之初心𨗳人使諌羣臣亦當有希魏公事君之大節以報陛下者以詔書未宣布間惟陛下斷自清衷早賜追還天下幸甚臣不勝激切之至貼黃稱臣竊謂進此説者非純誠愛君之人也或出於全身之謀或出於為子孫之計或出於飬譽邪正之間欲收人情而兩得或出於懷姦計以事陛下浸開間隙傾陷忠良援引邪佞復為前日之過深可懼也惟陛下精慮而深思之臣恐詔書既下正士知陛下有厭言之心不敢遑安稍自引去後來者不過得循默之人以為稱職其次得茍且偷惰之人廢壞紀綱又其次得阿諛柔順之人靡敝政事皆所以與姦為黨壅蔽下情欺罔之罪復結矣陛下深拱簾幃之中久而安之浸不復得聞天下之事此非陛下今日求治之本意也衆人之説皆謂詔書欲以安反側臣竊疑之所謂反側者乃前世伐叛討逆之後餘黨畏懼誅戮有懷生偷安之心當時恐其為變故以詔書安慰之乃禍亂之時姑息之事也今朝廷清明王道平直自以至公之理行典刑此曹何為而有反側之心陛下何憂而下安慰之詔甚無謂也下詔之後忠良之在近者日益疏則在逺者疑畏而不敢進姦佞之在近者日益親則在逺者踴躍而以類至此人情之所易見而事理之所必然者也巖叟又言臣自風聞朝廷欲降詔書安慰搢紳之心雖兩上章論奏不便以聞之未審故言之未詳臣今頗得大槩信如所聞甚可怪也事有大不可者三陛下豈容易而發竊知其間敘列先朝搢紳之惡無所不有雖云臣下所為然於先帝之明如何也陛下下詔之善意本在掩蓋前事不知反所以彰先帝之失此大不可一也陛下即位以來未嘗以喜怒愛憎妄責一人凡有所行必本天下公議大姦大惡不得已而黜者又曲從寬恕百分罪惡不過行一二分而已有何太甚之事今聞詔引疾之已甚之語如是則是陛下臨御以來所行之事皆為過當反成自誣以傷國家之體此大不可二也姦人誑惑陛下張大其事言人心反側故致陛下有下詔之意陛下不可不自察今天下生靈之心安與不安何如往前今天下生靈之心所以安只因陛下明辨邪正黜去欺君罔上人數輩耳若復見陛下姑息此曹未測將來之好惡則天下之心將疑而搖矣陛下意雖欲以安罪惡不知反所以動天下之心此大不可三也陛下下詔未見一利而有大不可者三何可為哉臣非故敢逆陛下之情也蓋欲以惜朝廷之舉動全吾君之盛美耳夫為國之道惟渾然深厚湛然無迹泯迹言語之間使天下君子小人皆不可得而窺不可得而議乃為清寧之本也何為自生疑心無故下詔使天下可得而窺可得而議哉臣恐益為紛紛不能成清寧之治誤陛下初心爾願陛下拂除姦人先入之言省察愚臣繼進之説或蒙聖心曠然一賜開納臣今日即死無所恨矣惟陛下察其愚幸甚貼黃稱兹事非臣一人之意臣博訪有識之士皆以為今已安靜不消降詔反動衆心臣復恐下詔之後呂惠卿張誠一之徒必生怨憾以為朝廷行法不平只爭詔後詔前有幸有不幸臣以謂若不下詔則都不見此迹也右正言王覿言臣復聞外議謂朝廷以近者放黜一二大姦十數巨蠧恐人情不安特降詔書以安之又將戒言事者凡臣僚舊事不得復言臣固未詳其虛實誠出於此臣恐四方有識之士輕議朝廷也夫人君之聖德如虞舜則無以過矣然舜之馭羣臣乃在於黜陟幽明四罪而天下咸服當是時不聞人情不安而亦不聞有詔書以安其黨類也人臣之賢德如孔子則亦無以過矣然孔子之為魯司寇攝行相事七日而誅少正卯而魯國治當是時亦不聞人情不安而有命令以悅其朋黨也蓋人君之所以御天下者黜陟二柄而已陟一善而天下之為善者勸黜一惡而天下之為惡者懼則是黜陟之效也豈以其為惡者懼而朝廷亦為之懼哉惟至於誅亂臣伐叛國而以其脅從者多汙俗懼罪則必至於下惟新之詔施曠蕩之恩而一洗之也茍不至於此則何疑而降詔乎伏自陛下臨政以來開廣言路黜陟幽明公議莫不以為宜人情莫不以為悅所逐一二大姦十數巨蠧其門人故吏皆與其人比肩事主者誰肯甘心以黨與自名不過中心愧懼而不敢襲故態以為惡而已是乃朝廷黜幽之效見於此矣遽然下詔臣竊駭之若臣僚舊惡使言事者皆不得言尤非臣之所諭也且惡有顯晦罪有輕重若陛下聖意必欲慰安邪黨之心則凡人之曖昧之惡詿誤之罪言事者及之則寢而不報可也惡之甚晦者由衆言而既明罪之甚大者因進用而已著置於君側則欺君委以事權則敗事彼言事者方且遵奉詔旨默而不言則果為朝廷之福乎居言責而不言尚可以安其職乎臣伏望陛下斷自聖心如大臣之論果有以詔書為請者使熟議焉其可止也或詔書已成願陛下留中而勿出乃天下之幸也覿奏别集自注云七月一日奏五日又奏今並附此覿又言臣伏聞近者朝廷以放黜一二大姦十數巨蠧恐人情不安又將戒言事官凡百僚舊惡不得復言臣固未詳其虛實誠出於此臣恐四方有識之士輕議朝廷也其狀已投進訖臣今又聞詔書有言者勿得彈劾有司毋得施行之戒竊以為過矣夫為陛下之耳目者言事官也為陛下之股肱者有司也小人情偽萬狀宿惡舊姦初多隱伏幸而發露著見則言事官論之有司行之然後小人不得大肆而朝廷清寧陛下可以無為而治矣蓋小人之宿惡舊姦發露著見而言事官鉗口而不得言有司束手而不得治則小人肆行而無所憚矣使小人肆行而無所憚則欺君壞法蠧民害物者蜂起鱗集而爭奮矣朝廷尚安得清寧陛下尚安得無為而治哉或言事官忠憤而違詔以舉職有司疾惡而違詔以行法則陛下之詔書乃成虛設言事官有司之違詔者亦不為無罪又須按治則紀綱紊亂賢不肖混淆而意外之憂知者有所不能謀賢者有所不能救矣夫君子小人勢不兩立而迭為盛衰者也故在易君子道長小人道消則為泰小人道長君子道消則為否夫否泰者君子小人消長之間也今朝廷優恤小人而使言者勿復彈劾有司毋得施行是乃消君子而長小人嵗月之間邪黨漸勝則天下不幾於否乎昔帝舜雖臨下以簡御衆以寬孔子雖謂人而不仁疾之已甚亂也亦未嘗聞鉗言者之口而使不得言小人之姦廢有司之職而使不得治小人之惡也今陛下必欲下寬大之詔以安羣小之情則惟用闊略細故以諭之可矣何至壞朝廷之紀綱使小人舊姦宿惡之發露著見者其事狀雖涉于罔上亦一切不問而言者勿復彈劾有司毋得施行以為小人之資也伏望聖慈審納之熟講之重於出令無為異日之患天下幸甚貼黃臣待罪諌官專以論議政事為職朝廷進賢退不肖須以素履及已試之事驗之方可信據子曰吾之於人也誰毁誰譽如有所譽者其有所試矣雖譽之猶當以其已試之事况彈劾哉然則今日已往奉詔之後若論及臣僚之素履及其已試之事則不犯詔禁者少矣奉詔愈謹則諌官御史愈成虛設故臣以詔書中言者勿復彈劾有司毋得施行之語尤不可以宣示中外也又借如臣僚或在侍從或處權要今日以前嘗有罔上之罪今日以後方乃發露論罪則可戮論詔則不可言居言責者守詔而不言則坐視侍從權要之地有罔上之人將為天下之大患違詔而進説則不惟廢朝廷之詔令而又將得違詔之罪進退猶豫而不能決則遂至於天下雷同而姦凶得志矣陛下如何處之言事官每有論列動觸權貴之怒豈若不言之安但不敢輒為身謀以誤陛下而已臣深恐詔令輕出之後不可追改竊聞詔書今尚未下惟聖慈詳酌覿自注此章以七月五日上今并附此七月十一日竟下詔王巖叟朝論奏云臣風聞朝廷欲降詔書以安反側説者二三皆謂兩宫厭言者之煩欲以拒言者陛下即位以來惟以排去凶邪登用忠良革天下弊事致得百姓謳歌以為再逢祖宗太平之盛臣於此時備位言職豈不自喜遭遇陛下所以不避怨仇不恤形迹誓以身許陛下陛下何可中道而改何須分外降詔却動姦邪之心使姦者每有臆度將謂陛下畏他又謂陛下助他必將潛增氣𦦨窺伺朝廷深為不便蓋姦邪退盡則朝廷清寧若留姦邪欲望朝廷清寧必無此理降詔之後忠臣義士必皆不安既不自安必皆解體非國家之福陛下方來天下大治希祖宗之時萬萬不可作此舉錯臣前日以風聞朝廷欲降詔書以安反側事犯天威論奏不便乞陛下納臣愚忠收詔不下未知聖意垂聽否臣再三為陛下思之若詔書止是開諭宿惡仍令自新猶為庶幾然已非國家自處以至公自示以不疑漠然無心之大體若草詔之人懷姦挾邪承望風旨而因寓意於詞沮抑言路四方傳布不知陛下心者疑朝廷有厭言拒諫之心於陛下聖德所損甚大臣所以力言乞止此詔也若為言之合公議行之合公議則何安反側之有為國家之道惟公是守惟直是行惟重自持為國家之道惟渾然深厚不見畛域不露淺深近所共棄者皆大姦大惡不得已而黜之論其罪惡則百分中止得一二分安有太甚事姦人誑惑陛下言人心不安故風令陛下下詔不可不察此乃是姦人之計陛下安可遂信故嘗以事觀之自陛下即位以來四海內外億萬生靈各皆安心假令有不忠不孝小人失勢自危乃是國家本分合教如此乃至安之道至盛之德也承議郎傅傳正為兩浙路轉運判官用三月癸未詔也三月二十六日詔皇太妃兄故任左班殿直任隆贈宫苑副使監察御史上官均言臣聞書曰欽哉欽哉惟刑之恤哉蓋死者不可復生斷者不可復續先王所以明謹用刑而司刑決獄之官所審於聽斷也臣竊見刑部侍郎崔台符寶文閣待制知廬州楊汲大理卿王孝先自元豐以來相繼為大理卿每有內降公事不能悉心持平推考情實專務刻深髙下其意雖知所告不實事或微末不度是非一切徇報者之語委成獄吏不復親聽而報者所聞往往得於仇怨之人巧譛誣陷無所不至一入犴獄如落檻穽鍛錬羅織必致以罪三木所加何求不得又於元報事狀外曲行推究至有罪薄罰輕又妄為論奏乞行編配陷害善良不可勝計至於覘夫察𨽻遍滿京邑報逮紛紜填滿牢狴都人惴栗不敢偶語兢兢朝夕莫能自保皆台符輩觀望傳會相為表裏以至如此聖朝明燭萬里而台符輩治獄都城密近輦轂輒敢肆為誕謾殘虐無罪中外側目共懷憤疾日者朝廷灼見寃濫立司辨理而台符輩或尚居侍從典領藩郡列卿棘寺晏然自若曽不愧憚夫邪虐不斥無以戒暴吏侍從不清無以正紀綱刑官非其人無以安善良願陛下因臣之言察中外之議特行黜罷以允公論仍乞精選儒臣通明端厚之士典領刑獄庶幾刑不失中獄無濫及以副陛下寬仁好生之意又言嘗具奏論列刑部侍郎崔台符寶文閣待制知廬州楊汲大理卿王孝先等元豐以後相繼為大理卿承勘內探公事不能悉心持平推考情實專為觀望傅會欺罔聖明陷害善良不可勝計乞特仃黜罷至今已及月餘未蒙施行臣以為有德者進則朝廷尊去邪勿疑則小人懼台符等姦憸深刻迹狀眀白天下之人孰不聞知今尚為侍從列居九卿是疑於去邪非所以進有德也竊以陛下以昨來探報公事率多寃濫故臨御之初即罷探卒尋又置司理訴辨明幽枉黜降中官石得一使居間地下至探卒郭鯨等二人繼行斥逐中外之人莫不欣快皆以為陛下聰眀睿斷與衆棄惡以厲姦黨竊緣探報公事雖造端於石得一然鍛錬傅會笞掠窮治陷於深文以成就石得一之志者實由台符等若台符等平心推治别白枉直有罪者繩之見誣者釋之則石得一將內懷愧懼不敢復縱探卒妄告細故陷罔無罪足以全先朝廣覽之至明好生之大德夫廷尉天下之平端意操法雖人主之喜怒所不敢聽又况觀望中人風旨以為高下出入耶推原台符等之罪雖非造端然同惡相濟終始相成為朝廷斂怨於下不當置而不治也不獨置而不治又使之偃然居侍從九卿之列搢紳惡薄恥與為伍中外之人實所未喻皆以為陛下至公至明好賢嫉惡洞逹旁照獨台符等未行斥罷必有左右之臣為之遊説以掩覆其惡以面謾陛下者願陛下參稽中外之論兼聽而熟察之則台符等不得為釋然無罪也昔唐太宗詔百官議張亮罪皆以為當誅獨李道裕以為不可太宗嘉其直擢為刑部侍郎又嘗缺大理少卿太宗以為大理人命所繫以戴胄清直遂以任之夫刑部大理鞫獄議刑所繫甚重死生輕重皆出其意宜得端良明恕之士以稱其任台符等刻薄詖險迹狀明白久居省寺竊恐舞文巧詆任意出入將使無辜之人陷於刑獄上負陛下寬仁之德為害非小伏乞斷自宸衷早行黜罷以允衆論監察御史孫升言近曽劾刑部侍郎崔台符大理卿王孝先在先帝服藥日於案外增添兩和情願之文全出宰相王圭親姪仲京在官非監臨贓罪台符孝先本以庸材叨國厚祿被遇先朝恩顧不淺一旦先帝不豫忍乘此時幸以為私結權臣之恩曽無犬彘向主之心何以參綴從班玷汙清列伏望聖慈詳酌事理重行竄黜為士大夫附下罔上為臣不忠之戒至今多日未蒙指揮施行臣愚竊恐朝廷以刑部大理未有習刑法之人可以當其任者臣實疑之夫明先王之意為天下之平歸於忠厚斷以禮義者乃司刑之長然則非經術之臣不足以當其任也茍欲專習刑名引法傅條則有斷議屬官且非司長之事若刑部大理之長必待習刑名之人為之則一法吏之事爾先王忠厚之意天下至公之理彼何足以知之祖宗以來刑部大理審刑糾察之長多任侍從儒臣故舞文巧詆之風息而忠厚之俗成也昔張釋之于定國豈世習司空城旦之書乎舜命九官而臯陶若稽古作士故能明五刑以弼五教而刑期於無刑也稽古之德惟堯舜臯陶稱之則司刑之任豈俗吏可為且忠孝之人持心近厚鍛錬之吏持心近薄台符孝先鍛錬附會為臣不忠知輕重其心舞文為姦而已何嘗以近厚為意哉伏望聖慈詳察檢會臣前後奏陳早賜指揮罷黜選任公明經術之人庶仁聖之治可至乎無刑天下幸甚詔寶文閣待制知廬州楊汲落待制知黃州刑部侍郎崔台符知相州大理卿王孝先知濮州仍各降一官制詞云豈有數年之間坐致萬人之獄中書舍人蘇軾所草也台符六年十四日已除潞州於是改相州與汲孝先並降一官台符汲傳皆可見實録載此極不詳政目云汲台符孝先並坐元豐中斷王仲京曲法左司諌王巖叟言李定不持所生母仇氏服乞行竄殛詔定責授朝請大夫少府少監分司南京滁州居住五月十八日定初以通議大夫分司南京揚州居住蘇軾范百祿論定責輕及今再責巖叟朝論云云已附注五月十八日御史孫升言六曹奏鈔自來左右僕射丞例皆簽書按左右僕射各兼别省事及奏鈔送門下省左僕射合親書審奏顯見重復詔六曹奏鈔左右丞簽書僕射押檢本省代書送門下省承議郎都大提舉成都府永興軍等路𣙜茶買馬監牧公事陸師閔降授奉議郎主管東嶽廟先是御史中丞劉摯言臣嘗於去年論列川茶利害乞遣使考察措置近蒙朝旨已差户部郎中黃亷前去竊以川茶之害臣於前奏略已詳悉又聞言者繼多今不復再有陳説然事之首尾干涉者數路從來提舉𣙜茶馬所行職事他司皆不得與聞至於取索茶事公案文字亦不許州縣供報以此提舉司官吏事權震灼恣為不法倚茶為名興販百貨掊克苛細奪民衣食其於患害根株深牢若非周咨博訪難見底裏今雖遣使者而提舉官陸師閔尚在本任深恐上下吏民畏其權熖不敢盡以疾苦告於使者有所蔽隱却致所聞滅裂兼慮師閔護匿其事議論懷私不肯協心公共措置無以副聖明惠綏逺方之意臣欲乞指揮先罷陸師閔職任所貴人情稍安可以究詢利害貼黃稱京東吳居厚等福建王子京皆先罷任乃行體量今來陸師閔合依此例若使者按察得本司别無違法害民之事則師閔可却還本任及是師閔乃黜舊録云劉摯毁先帝茶法因言師閔領數以路與為姦者衆也新録辨曰師閔以臺章罷任降官乃摯為毁先帝茶法非也刪去六字按摯論師閔蓋久之乃行今取摯所上章具載之舊録所書並削去摯前奏具二月十四日此奏以閏二月二十二日上今并入此朝奉大夫户部郎中黃亷直祕閣都大提舉𣙜茶買馬監牧公事始言者論𣙜茶六害請通商復劵馬如舊制蜀人疾茶官之專在位者亦多主罷𣙜朝廷遣亷按實廉奏𣙜茶如前使者所為誠有害若悉以豫民則邉計不集蜀貨不通而園户將有受其弊者請熙河秦鳳涇原如故勿改以制蕃市而許東路通商南茶無侵陜西以利蜀貨定博馬以萬八千匹為額所奏皆可即有是命使推其法行之此據亷本傳亷除茶馬不得其月日據題名記以元祐元年八月十四日到任當是代陸師閔也今附師閔罷後四月二十五日蘇轍上言可考二月十四日亷出使四月二十五日五月四日云云當并考黃庭堅作亷行狀云元祐初除户部郎中治左曹二月差按察成都等路茶事兼體量卭州蒲江鹽井利害先奏罷陸師閔所行公私甚病者乃具為奏曰臣被使旨所至訪求利害至熟𣙜茶之法實有害於川陜之民蓋官司不原朝廷立法本意希功幸賞以得息為多於是禁網滋繁百姓受弊陸師閔立法最虐故取利最多上纍國體下斂民怨中外臣僚所言茶事害民之科皆有事實若遽論之不若盡以豫民使園戶自賣商賈自販官收稅引及歇馱錢並復熙寧以前博馬之䇿無交易之煩無腳乘之勞抉去故弊一從私便無復可議若致詳於公私之際則先當議民其次商賈其次邉計利害各有所在也今蜀民通患幣輕錢重商旅齎携息不償費若捐𣙜茶盡豫商賈則百貨未能通流腳乘未能猝備非惟園民之貨鬱滯絶其資生之路若蕃市交易萬一不繼亦足以害經久之法今若捐十一州之茶與商賈仍以川峽四路及關中諸路與之為受茶之地冝若可以盡泄川茶以補蜀民久困而官以善價取雅州興元府所産以贍熙秦諸州酌中法以為邉備於理為可於是朝廷許同轉運司盡公私之便商度立法公又奏曰産茶之地盡在川路賣茶之地全占陜西其發至陜西六路者為綱茶𣙜於川陜四路者為食茶若産茶之地除𣙜買侵刻取息太重搜捕苛擾差雇不和配賣賖欠預俵折納濫賞諸弊則賣茶之地隨事制宜其目有云一曰路分全占陜西州縣又𣙜取京西之金州以東南望之疑若專利以天下觀之阜通川陜之利以備邉而不病東西則勢均矣故以熙河秦鳳涇原為禁茶舊路以永興鄜延環慶為通茶新路不禁舊路無以制蕃市不通新路無以便民欲使通塞常相權則公私可以共利二曰賣茶給歷抑配及官賣末茶今除宿弊又禁南茶無入陜西使川茶不失中價則民不知𣙜茶之害三曰茶色不等蓋漢茶食嫩蕃茶食老雅州之名山自蘭州入邈川至于于闐興元之大竹自階州入歐家自河州入今默伯洋州之西鄉茶自河州入默伯至于賽音隆和谷區别衆品以入趙路則可遵漢蕃所宜四曰價直騰踴則害馬價今以茶價馬直以斤對寸髙下適等矣因宜增損則可以制備邉之費五曰博易奪市易之權汙吏撓法不可為汙吏廢今邉市博茶大者在馬其次金帛去貪者之害乃可以通邉市之利六曰腳乘不均蓋緣軍興腳乘踴貴故髙立雇直遂以諸場所博汙濫之物髙估折支若斟酌髙下損其餘以資鋪兵則可以均力使之任并定博馬嵗額以萬八千匹又蒲江鹽事云邛鹽舊價太髙以蒙朝廷權減斤為八十五錢然汙雜濕惡積弊未除今欲止絶汙淋灰土及煎膽水止用九井正水煮一色鹽用權減價為定法專用食邛州禁外來官鹽及小井鹽其汙淋等鹽八百六十二斤乞於正額除之仍寬鹽户舊欠十分除一分邛民數十年之病於是悉除所奏即皆施行權知開封府謝景溫言京師新舊城內惟有二廂遇夜公事解送遙逺請於新城內分左右置二廂通為四廂添舉文臣二員量增人吏從之河東路經略司言請以葭蘆吳堡寨軍馬留守禦外那人過河於定胡寨就食及減放歸嵐州從之司馬光言臣先曽上言乞直降敕命應天下免役錢一切並罷其諸色役人並依熙寧元年以前舊法人數委令佐揭簿定差蒙朝廷一一如臣所請臣竊聞降敕之初百姓莫不喜悅一兩月間州縣定差已了别無辭訟人情安帖無何續有雇募不足方行定差指揮人始疑惑既而屢有更張號令不一又轉運使各以已見欲合本路共為一法不令州縣各從其宜是致州縣惶惑不知所從或已差役人却放或已放雇人却收或依舊用役錢雇人或不用招人充役朝夕不定上下紛紜往往與二月六日敕意相違竊緣臣元初起請及朝廷所降敕明言委逐縣官看詳依今來指揮若有妨礙致施行未得仰具利害擘畫申州州申轉運司奏聞委執政官再加看詳隨宜修改别作一路一州一縣敕施行務要曲盡其宜豈是當日所言一字不可移易但患轉運司州縣不肯奏陳耳臣今欲申明元初起請內聲説不明不盡事件謹具畫一如後一臣起請雖云依熙寧元年舊法人數定差若舊法有於今日不可行者即是妨礙合申乞改更人數或太多或太少惟本州縣知得的確合消數目合酌中立額申乞依數定差朝廷難為遙度一臣起請雖云若所差人不願充役任便選雇有行止人自代雇錢多少私下商量若所雇之人邀勒被差人廣求雇直官司亦當裁抑不得過自來官中雇錢之數其州縣官員即不得指占所雇之人令被差之人雇覔一臣起請雖云見雇役人候差到役人各令逐便若所雇之人自有田産情願充役者亦自可依舊存留又曹司一役新差之人多不諳熟書算行遣及案下之字未曽交割合留所雇之人給與雇錢令與新差之人同共行遣限半年內交割了畢方放逐便一臣起請雖云今日衙前賠補少於嚮日不至破家若猶以為户力難任即乞於官户僧道單丁女户有屋業每月掠錢及十五貫莊田中年所收斛斗及百石以上者並等第出助役錢不及此數者與放免臣意以為十口之家嵗收百石足供口食月掠房錢十五貫足供日用二者相須此外有餘者始令出助役錢非謂止收一百石即令助役也若嫌太少及所收掠課利難如實數即乞應係第三等以上令出助役錢第四等以下放免若本州坊場河渡等錢自可支酬衙前重難分數得足則官户等更不消出助役錢一臣起請從來諸州招募人投充長名衙前若招募不足方始差到鄉户衙前此自是舊法今來别無改更惟是舊日將坊場河渡折酬長名衙前重難令自出賣今來官中出賣坊場河渡收錢依分數折酬長名衙前重難只此與舊法有異若鄉户差補已足續有投名即先從貧下放鄉户歸農鄉户願投充長名亦聽一臣起請委逐縣看詳具利害擘畫申州本州類聚擇其可取者擘畫申轉運司轉運司類聚諸州所申擇其可取者擘畫奏聞朝廷伏緣知逐處民間利害子細轉運司不如州州不如縣竊慮逐縣逐州有擘畫得事理切當而本州及轉運司抑遏刪去不以上聞致敕下之日依舊妨礙施行未得欲乞更降指揮下州縣如有似此擘畫切當被在上刪去者許逐縣直申轉運司本州直申奏所貴下情無壅曲盡事冝仍乞降指揮下詳定役法所只得以諸路州縣申到利害詳其可否立為定法其不當職之人為髙竒之論不切事情者不得施行亦不可將一路一州一縣利害作海行條貫一詳定役法所奏請行下指揮若有妨礙難行之事亦乞如臣起請委逐路州縣看詳具利害擘畫申上隨宜修改右臣所言若有可取乞遍頒下諸州縣除此外並依二月六日所降敕命施行從之舊録云司馬光請行差役法天下始紛然自為異同訖元祐法不得定新録辨曰光所奏役法千餘言乃欲於民情事宜務令曲當未嘗偏執非自為異同也自司馬光至得定刪去二十四字蘇軾八月二十一日奏稱官户等役錢詳定所稱七月三日朝旨未得施行今七月三日不見此恐即光所奏至七月三日乃行出是詔招㨂禁軍年二十五已下短一指許刺填從樞密院請也看詳編修國子監太學條制所狀凖朝旨同共看詳修立國子監太學條制及續凖指揮國子律學武學條貫令一就修立外檢凖官制格國子監掌國子太學武學律學算學五學之政令今取到國子監合干人狀稱本監自官制奉行後來檢坐上件格子申乞修置算學凖朝旨踏逐到武學東大街北其北地堪修算學乞令工部下所屬檢計修造奉聖旨依今看詳上件算學雖已凖朝旨蓋造即未曽興工其試選學官未有人應格竊慮將來建學之後飬士設科徒有煩費實於國事無補今欲乞特賜詳酌寢罷詔罷修建元豐七年十二月七日立算學右司諌蘇轍言臣竊見先帝因夏國內亂用兵攻討於熙河路增置蘭州於鄜延路增置安疆米脂等五寨議者講求利害久而不決其一曰蘭州五寨所在峽逺饋運不便若竭力固守坐困中國羌人得以養勇窺伺間隙要之久逺不得不棄危而後棄不如方今無事舉而棄之猶足以示國恩其二曰此地皆西邉要害朝廷用兵費財僅而得之聚兵積粟為金湯之固蘭州下臨黃河當西戎咽喉之地土多衍沃略置堡障可以招募弓箭手為耕戰之備自開拓以來平治徑路皆通行大兵若舉而棄之熙河必有晝閉之警所謂借寇兵資盜糧其勢必為後患此二議者臣聞之久矣然以夏戎背叛雖屢有信使而未修臣職未請侵地則棄守之議朝廷無因自廢今聞遣使來賀登極歸未出境而使者復至講和請地必在兹舉雖廟堂議論已得詳熟而小臣憂國不能默已輒嘗核實其事以為前件棄守之議皆非妄言然而朝廷決從一議欲決此議當論時之可否理之曲直算之多寡誠使三者得失皆見於前則棄守之議可以一言而決也何謂時之可否方今皇帝陛下冨於春秋諒暗不言恭默思道太皇太后覽政簾幃之中舉天下事屬之輔相當此之時安靖則有餘舉動則不足利在綏撫不利征伐今若固守不與西戎必至於爭甲兵一起呼吸生變緩急之際何所咨決况陜西河東兩路比遭用兵之厄民力困匱瘡痍未復一聞兵事無不狼狽若使外患不解內變必相因而起此所謂時可棄而不可守一也何謂理之曲直西戎近嵗於朝廷本無大罪雖梁氏廢放其子而遐荒外臣本不須治以中國之法先朝必欲弔伐但誅其罪人存立孤弱則雖悍鷙之衆猶將伏以聽命今乃割其土地作為城池以自封殖雖吾中國之人猶知為利而不知其為義也曲直之辨不言可見蓋古之論兵者以直為壯曲為老昔仁祖之世元昊叛命連年入寇邉臣失律敗亡相繼然而四方士民裹糧奔命惟恐在後雖捐骨中野不以為怨兵民競勸邉守卒固而中國徐亦自定無土崩之勢何者知曲在元昊而用兵之禍朝廷之所不得已也頃自出師西討雖一勝一負而計其所亡失未若康定寶元之多也然而邉人憤怨天下咨嗟土崩之憂企足可待何者知曲在朝廷非不得已之兵也今若固守侵地惜而不與負不直之謗而使關右子弟肝腦塗地臣恐邉人自此有怨叛之志此所謂理可棄而不可守二也何謂算之多寡棄守之議朝廷若舉而行之其勢必有幸有不幸然臣今所論於守則言其幸於棄則言其不幸以較利害之實今夫固守蘭州增築堡塞招置土兵方其未成而西戎不順求助北敵並出為患屯戍日益飛挽不繼敵兵乘勝師喪國蹙蘭州不守熙河危急此守之不幸者也割棄蘭州專守熙河倉庾有素兵馬有備戎人懷惠不復作過此棄之幸者也二者臣皆不復言何者利害不待言而決也若夫固守蘭州增築堡寨招置大兵且耕且戰西戎懷怨未能忘爭時出虜掠勝負相半耕者不安餽運難繼耗蠧中國民不得休息此守之幸者也割棄蘭州專守熙河西戎據蘭州之堅城道熙河之夷路我師不利復以秦鳳為境修築廢壘復置烽堠人力既勞費亦不小此棄之不幸者也夫守之雖幸然兵難一交仇怨不解屯兵饋糧無有休日熙河因此物價翔貴見今守而不戰嵗費已三百餘萬貫矣戰若不止戍兵必倍糧草衣食隨亦增廣民力不支則土崩之禍或不可測也棄之雖不幸然所棄本界外無用之地秦鳳之間兵民習熟近而易守轉輸所至如枕席之上比之熙蘭難易十倍有守邉之勞而無腹心之患與平日無異也夫以守之幸較棄之不幸利害如此而况守未必幸而棄未必不幸乎且朝廷以天地之量赦其罪惡歸其侵疆復其嵗賜通其和市雖豺狼野心能不愧恥縱使酋豪內懷不順而國恩深厚無以激怒其民臣料一二年間其勢未必能舉動萬一不然而使中國之士知朝廷棄已得之地含垢為民西戎背恩彼曲我直人懷此心勇氣自倍以攻則取以守則固天地且猶順之而况於人乎故臣願朝廷決計棄此然後謹擇名將以守熙河厚養屬國多置弓箭手於熙蘭往還要路為一大城度可屯二三千人以塞其入寇之道於秦鳳以來多置畨伏之兵以為熙河緩急救應之備明敕將佐繕治守備常若寇至先為不可勝以待敵之至庶幾可以無後患臣自聞西使復來謹采衆議以三事參較利害反覆詳究理無可疑是以輒獻狂言惟陛下裁擇貼黃稱臣竊見二聖臨御除去煩苛天下之民想見太平之風今西戎已有向化之漸若朝廷靳惜蘭州等處堅守不與激令背叛使邉兵不解百費復興則自前苛政皆將復用太平之期不可復望深可痛惜伏乞陛下與二三大臣詳議其事以天下安危為念勿爭尺寸之利以失大計則社稷之幸也臣竊聞議者或謂若棄蘭州則熙河必不可守熙河不守則西蕃之馬無由復至而夏戎必為蜀道之梗臣謂此皆劫持朝廷欲必守蘭州之説而非國之至計也臣聞熙河屬國強族甚多朝廷養之極厚必不願為西戎所有若帥臣能以恩信結之統之以戍兵備之以弓箭手又於熙蘭要路控以堅城臣恐西戎未易窺伺而西蕃之馬何遽不至乎至於蜀道之虞自非秦鳳階成等處蕩然無城池兵馬之備則西戎豈敢輕為此計臣謂此説亦空言而已臣又聞説者謂韓縝昔與北朝商量河東地界舉七百里之地以畀之近者臺諌以此劾縝由此罷相故今朝廷議欲以蘭州等處復與西戎無敢舉其議者臣謂蘭州等處與河東地界不可同日而語河東地界國之要地祖宗相傳誰敢失墜舉而與人非臣子之義至於蘭州等處本西戎舊地得之有費無益先帝討其罪而取之陛下赦其罪而歸之理無不可不得以河東地界為比也文彥博奏彥博自注云元年六月奏今因蘇轍論西事附此臣伏蒙太皇太后陛下皇帝陛下不以老臣不才以其逮事四朝出入藩輔垂五十年追起於休退之中令平章軍國重事臣敢不極盡所藴上副虛佇臣於簾前纍蒙宣諭將來西人求復疆界令與三省執政熟議臣以所議地界不出二理其一論義理曲直其一計利害大小所謂論義理曲直者出兵取其地土皆邉臣希功賞欺罔朝廷為國生事取怨外夷今若推朝廷恩信因秉常訴求而賜與之有以懷服外夷之心光大朝廷之德所謂計利害大小者今所得堡寨并蘭會並荒徼沙漠之地本無城邑人煙惟是朝廷創築城壘屯兵戍守嵗費百萬以上困竭中國生民膏血以奉無用之地但恐不能支久却須自棄如向時婁城之比其蘭州本屬董戩夏人得之已三十八九年董戩元不藉其地夏人得之已久亦不曽築堡寨戍守只有一小頽廢池塹如中國荒僻村落朝廷不知將謂如中國小小郡縣徒煩兵守所費不資兼會州又未知在甚處蓋是李憲當時怯懦不曽領兵赴靈州城只領兵馬過蘭州廢壘之下遂欺罔張大云收復蘭會以圖茍免不至靈州城下軍令之誅遂誤朝廷以至於此臣亦聞議者謂地界彼求而與之亦用兵不與之亦用兵語尤欺罔但向去欲免主議不與起釁之責且秉常來求我如其意而得之必須感戴恩德三數年間方且保無事朝廷近經靈州永樂不振之後可以粗得整齊兵勢全養民力異時或有邉事用兵庶幾有備無患今若不推恩信靳與其地凶狠之性因此不遂所求便作點集酬報之勢朝廷方此多事之際兵力未全可高枕乎近年以來為新進書生不曉蕃情邉事兵政者誤朝廷多矣願陛下審察而詳處之老臣年過八十感陛下厚恩惟知竭力補報固無觀望希進之言貼黃今檢録到祖宗以來處分邉事詔書西人事迹共幾件進入乞賜詳覽或曰蘭州宜如充國可置屯田添助兵食今若有田多屬蕃族不可盡奪如向時王韶謂熙河可耕以助兵食人牛種子徒有所費終無所成今聞轉運判官節減蘭州嵗計猶須一百餘萬又當計會知州并帥臣保認可以足用否七月八日云云可考乙卯監察御史上官均言臣昨於五月二十九日嘗具奏論列青苗有惠民之名而無惠民之實有目前之利而為終嵗之害乞行今年閏二月八日聖旨罷散青苗事經今一月未蒙施行夫知而不言則為不忠講之不熟則為妄言青苗本末臣愚非敢臆説考前日已然之利害參搢紳庶民之議論頗為詳熟臣敢罄惓惓之愚重浼天聽臣竊原青苗之法其説出於周禮泉府凡民之貸者以國服為之息殘文缺簡措置法令之詳不可得而推考三代而下天下富足號為至治如西漢之文景孝宣東京之光武明章唐之太宗眀皇其治民之具班班見於史册不聞其用青苗斂散之法也惟王莽變更政令務師古始援周禮祭祀無過旬日喪紀無過三日之文民或之絶欲貸以治産業者均授之除其費計所得受息嵗過什一其餘法度紛紛數易民愁盜起以至於敗自熙寧以來議臣建青苗之法行之天下十有餘年國帑日豐民用日蹙今猶未艾也考之漢唐之事則如彼驗之近年之效則如此其利害較然不待詳説而可知也議者惑昔日有司之散青苗主於為利故強民多貸今日之散主於利民必無強抑之弊又民財方窘資之以為利勢未可罷臣以為不然以為利民耶則臣前日所謂有惠民之名而無惠民之實有目前之利而為終嵗之患是也以為利國耶則國以民為本移患於民而為國之利非朝廷愛民之意也以為不欲遽變先朝之法度耶則政有因革各適其時前日罷京東之鐡冶減南方之鹽課省京師財用之局罷民間之役錢更法便民者非一何特疑於青苗耶臣以為舉天下之民空乏不足者十之六七粗足者既不就貸空乏者願給而病於難償寬之則逾期不輸而令佐有虧失之責急之則追呼督責縲絏鞭笞無所不至昔之為惠適所以虐之而已抑而不散則非立法惠民之意散而斂之則不免於督責勞擾之弊委曲計之無一可者况無知之民恃青苗之散誘一時之利往往侈用妄費不圖難償之後患迫而斂之賤賣穀帛破産失業者固非一二前日之弊是也臣所謂有惠民之名而無惠民之實有目前之利而為終嵗之害甚者為終身之患為此也今若罷而不散則無知之民無所引誘將不敢侈用而妄費其有吉凶緩急費用之不得已者可以貸於豪右之家其息雖倍於青苗然償之蚤晚多少得以自便非如青苗有追呼督促道途往來之煩費賤售穀帛之弊也又况舉天下縣令寬厚通明嚴於馭吏勤於恤民者固不易得制馭少緩斂散之際滯留追呼乞取侵尅之弊搔擾百出異時掊斂好利之臣又繼之以強抑多散襲前日之患遐方窮壤無所控告今日青苗之纍非小失也臣竊意論議之臣以為青苖不可罷者不出於臣之説臣竊以為未究事之終始利害之逺近茍持一端之論以動聖聽臣欲乞檢會臣前章付大臣熟講而詳計之庶使四方之民蒙被實惠無後日之患天下幸甚是月復衛州黎陽縣為通利軍左司諌王巖叟言臣纍上章言中書侍郎張璪姦邪巧佞不可在陛下左右多漏泄中書語不可處機要好賣國恩以為已惠不可任大臣恐久之不去養成禍源誤天下蒼生陛下雖悔無及竟未蒙省覽臣實以為憂陛下勿謂自能有以防之雖其姦邪亦無能為爾臣竊以為不然惟使陛下不能防乃所以為姦邪如其可防即是踈拙非姦邪也臣輒以一事卜之但覺陛下去之稍難疑其姦邪已有以惑陛下矣今天下公議日益不容臣何敢不言以負恩德自違事君之義哉臣伏讀新詔曰罪顯者已正惡巨者已斥臣竊以陛下出一言必欲天下信行一事必欲天下服今所謂罪顯者莫如惠卿誠一惡巨者莫如蔡確章惇而璪實同之欺君罔民天下稱其一體固宜並行竄逐以信服天下之心也而璪乃獨留廟堂偃然自若臣不知惠卿之輩見此詔書還肯服否天下之人見此詔書還肯信否此臣之所以為陛下惜也陛下得誠一不孝之狀甚明將深誅而顯黜之以警厲四方而璪隂諷中書舍人蘇軾使於告詞掩蓋誠一不孝之迹賴軾執義不從遂得陛下典刑明白不然則王言國命為姦臣移奪以成其私矣諌官王覿言吕升卿矯稱先帝德音事陛下才降出諌章璪即時告之升卿使奔走經營於上下其安於為私狃於黨惡而不忌憚朝廷敢如此陛下思得天下英材而用之故詔執政各舉可充館職者三人璪曽不體陛下心為國求賢乃舉一宣德郎陸長愈者應詔按長愈前為晉州學教授不惟文學荒謬衆口共嗤而贓汙狼籍無所不至晉人採其事實作百韻詩以嘲之陛下試令體量即見情狀璪若自賢其人而薦之則無識甚矣不知其人因干請而薦之則不忠甚矣陛下察璪所為國家之事可倚賴否伏惟陛下至公至明聽政以來無賢不升無佞不黜何獨於璪不斷如此此天下有識之士所以痛心疾首恐其浸淫惑亂吾君而安身益固立黨益多為謀益深復成天下之患也臣愚茍非為君父計為國家計何苦力與權臣結子孫之仇哉伏望陛下察臣之心納臣之諌一奮威剛正璪之罪斥璪之惡以信詔書於天下臣不勝昧死納忠之至又言竊以為國之要無先於察姦邪而去之姦邪不去雖有善意無以成善治蓋隂有所害而人主不知也臣讀祖宗故事得太宗一言敢陳於陛下惟陛下體而行之幸甚太宗一日語侍臣曰國家若無內患必有外憂外憂不過邉事皆可預防惟姦邪無狀若為內患深可懼也帝王於此常須用心此人君萬世之戒也臣觀自古人君常於有形者則憂而不敢忽無迹者乃忽而不曽憂曽不思有形者事淺無迹者禍深臣所以勤勤懇懇為陛下論姦邪之不可在左右也按張璪與蔡確章惇其為姦邪大體則同而將之者小有異焉確將之以驕惇將之以強而璪將之以巧惟驕與強猶有以見於聲音顔色之間足以激人之怒心而使人不能容若巧則不可得而見矣優柔曲折以求入宛轉便佞以取容無難人之意無忤人之辭其言似信其情似親使人主惑而不知其所以獨旁觀靜聽者乃覺其隂有以移人之意耳臣初亦易之今始知巧之為患深於驕強之為患也驕強者已斥而巧者不去此臣之所以憂也夫所謂姦邪無迹者非終無迹也方其進言用意之初則無迹及其禍患之成也迹能逃乎璪在先朝與確輩共為欺罔之時固若無迹及陛下聽政天下之民爭以疾苦告訴而璪等前日欺罔之迹方暴著而不能掩非陛下惻然以天下為憂而勇改之則不獨為百姓之患且將成國家之禍矣可不懼哉陛下雖云已知其人不復聽信然朝多在側寧無薰蕕浸潤使陛下不覺而受之者乎語其薰蕕浸潤之際安有迹耶待其迹成則事已晚矣天下蒼生豈容再誤伏望陛下鑒璪前日罪惡已然之迹防璪今日姦邪未成之謀深以太宗之言為戒早發睿斷斥而逺之非特臣之幸四海生靈之幸也貼黃稱近日吕公著以姪女之喪在式假張璪亦適有一大功之服合在式假中書事自有其餘執政可以權攝而璪不緣朝旨輒自請以闕人不敢在假臣伏料陛下照見此意蓋幸於獨對從容簾下伸私意而肆邪説以欺聖聰耳先王於有服之親隨其輕重制為假令不奪以事而許其致哀所以篤風教厚人倫也今璪同列既不乏人朝廷又無急難之事何得自壞禮法乞不在假考其迹則似勤國事察其心則實為身謀自古以來憸人投隙乘間以進其姦者正此類也願陛下窺其用意審其所言辨其所行勿誤信之幸甚崇政殿説書程頥上疏曰臣愚鄙之人自少不喜進取以讀書求道為事于兹幾三十年矣當英祖朝暨神宗之初屢為當途者稱薦臣於斯時自顧學之不足不願仕也及皇帝陛下嗣位太皇太后陛下臨朝求賢願治大臣上體聖意搜揚巖穴首及微賤蒙恩除西京學官臣於斯時未有意於仕也辭避方再而遽有召命臣門下學者半勸臣勿行半促臣行勸者則曰君命召禮不俟駕勸臣勿行者則曰古之儒者召之則不往臣以為召而不往為子思孟子則可蓋二人者處賔師之位不往所以規其君也已之微賤食土之毛而為王民召而不至邦有常憲是以奔走應命到闕蒙恩授館職乃以義辭遂蒙召對臣於斯時尚未有意於仕也進至簾前咫尺天光未嘗以一言及朝政陛下視臣豈求進者哉既而親奉德音擢置經筵事出望外惘然驚惕臣竊內思儒者得以道學輔人主蓋非常之遇使臣自擇所處亦無過於此者臣於斯時雖以不材而辭然許國之心實已萌矣尚慮陛下貪賢樂善果於取人知之或未審也故又進其狂言以覬詳察曰如小有可用則敢不就職或狂妄無取則乞聽辭避章再上再命祗受是陛下不以為妄也臣於是受命供職以來夙夜畢精竭慮惟欲主上德如堯舜異日天下享堯舜之治社稷固無窮之基乃臣心也臣山林野人稟性朴直言辭鄙拙則有之至於愛君之心事君之禮告君之道敢有不盡上賴聖明可以覽照臣自惟至愚蒙陛下特逹之知遭遇如此願效之誠庶幾毫髮之補惟陛下留意省覽不勝幸甚伏以太皇太后陛下心存至公躬行大道開納忠言委用耆德不止維持大業且欲興致太平前代英主之所不及也但能日謹一日天下之事不足慮也臣以為今日至大至急為宗社生靈長久之計惟是輔養上德而已歷觀前古輔養幼主之道莫備於周公周公足為萬世之法也臣願陛下擴髙世之見以聖人之言為可必行勿狃滯於近規勿遷惑於衆口古之所謂周公豈欺我哉周公作立政之書舉常伯至於綴衣虎賁以為知恤者鮮一篇之中丁寧重復惟在此一事而已書又曰僕臣正厥后克正又曰后德惟臣又曰侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽是古人之意人主跬步不可離正人也蓋所以㴠養氣質薰陶德性故能習與智長化與心成後世不復知此謂人主就學所以涉書史覽古今也不知涉書史覽古今乃一端耳若止如是則能言文人可以備勸講知書內侍可以充輔道何用置官設職精求賢德哉大抵人主受天之命稟賦自殊歷考前史帝王才質鮮不過人然而全德有道之君至少其故何哉皆輔養不得其道而位勢使之然也伏惟皇帝陛下天資粹美德性仁厚必為有宋之令主但恨輔養之道有未至爾臣供職以來六侍講筵但見諸臣拱手默坐當講者立案傍解釋數行而退如此雖彌年積嵗所益幾何與周公輔成王之道不同矣或以為主上方幼且當如此此不知本之論也古之生子能食能言而教之大學之法以豫為先人之幼也知思未有所主便以格言至論日陳於前雖未曉知且當薰染使盈耳充腹久自安習若固有之雖以他言惑之不能入也若為之不豫及乎稍長思慮偏好生於內衆言辨口鑠於外欲其純全不可得也故所急在先入豈有太早者乎又以為主上天資至美自無違道不須過慮此猶非至論夫聖莫聖於舜而禹臯陶未嘗亡規戒至曰無若丹朱好慢遊作傲虐且舜之不為慢遊傲虐雖至愚亦當知之豈禹而不知乎蓋處崇高之位警戒之道不得不如是也且人心豈有常哉以唐太宗之英睿躬歷艱難力平禍亂年亦長矣始惡隋煬侈麗毁其層觀廣殿不六七年復欲治乾陽殿是人心果可常乎所以聖賢雖明盛之際不廢規戒為慮豈不深逺也哉况沖幼之君間邪拂違之道可少懈乎伏自四月末間以暑熱罷講以至中秋蓋踰三月古人欲旦夕承弼出入起居至今三月不一見儒臣何其與古人之意異也今士大夫家子弟亦不肯經時纍月不親儒士初秋漸涼欲乞於內殿或後苑清涼處召見當日講官俾説道義縱然未有深益亦使天下知太皇太后用意如此又一人獨對與衆見不同自然情意易通不三五次便當習熟若不如此漸致待其自然是輔道官都不為力將安用之將來伏假既開且乞依舊輪值日所貴常得一員獨對開發之道蓋自有方朋習之益最為至切故周公輔成王使伯禽與之處聖人所為必無不當真廟使蔡伯希侍仁宗乃師古也臣欲擇臣僚家子弟十嵗以上十二以下端謹頴悟者三人侍上左右所讀之書亦使之讀辨色則入昏而罷歸常令二人入侍一人更休每人擇有年宫人內臣二人隨逐首承不得暫離常情語笑亦勿禁止惟須語言必正舉動必莊仍使日至資善堂呈所習業講官常加教勸使之嚴憚年方十三便令罷去嵗月之間自覺其益自來宰臣十日一至經筵亦止於默坐而已又間日講讀則史官一人立侍史官之職言動必書施於視政之時則可經筵講習之所乃燕處也主上方問學之初宜心泰體舒乃能悅懌今則前對大臣動虞有失傍立史官言出輒書使上欲遊其志得乎欲發於言敢乎深妨問學不得不改欲乞特降指揮宰臣一月兩次與文彥博同赴經筵遇宰臣赴日即乞就崇政殿講説因令史官入侍崇政殿説書之職置來已久乃是講説之所漢唐命儒士講論亦多在殿上蓋故事也邇英迫狹講讀官內臣近三十人在其中四月間尚未甚熱而講官已流汗况主上氣體嫩弱豈得為便春夏之際人氣蒸薄深可慮也祖宗之時偶然在此執為典故殊無義理欲乞今後只於延和殿講讀後楹垂簾前置御座太皇太后每遇政事希簡聖體康和時至簾下觀講官進説不惟省察主上進業於陛下聖德未必無補兼講官輔𨗳之間事意不少有當奏稟便得上聞亦不勞煩聖躬限以日數但旬月之間意適則可一往也今講讀官共五人四人皆兼要職獨臣不領别官近差修國子監太學條制是亦兼也五月十二日差修學制乃無一人專職輔𨗳者執政之意可見也蓋惜人材不欲使之間爾又以為雖兼他職不妨講讀此尤不思之甚也不敢言告君之道只以告衆人言之夫告於人者非積其誠意不能感人也故聖人以蒲盧喻政謂以誠化之也今夫鐘怒而擊之則武悲而擊之則哀誠意之感人也告於人亦如是古人所以齋戒而告君者何謂也臣前後兩得進講未嘗敢不宿齋豫戒潛思存誠覬感動於上心若使營營於職事紛紛其思慮待至上前然後善其辭説徒以頰舌感人不亦淺乎此理非知學者不能曉也道衰學廢世俗何嘗聞此雖聞之必以為迂誕陛下髙議逺見當蒙鑒知以朝廷之大人主之重置二三臣專職輔𨗳極非過當今諸臣所兼皆要官若未能遽罷且乞免臣修國子監條制俾臣夙夜精思竭誠專佐輔𨗳不惟事理當然且使天下知朝廷以為重事不為間故也陛下擢臣於草野之中蓋以其讀聖人書聞聖人道臣敢不以其學上報聖明竊以聖人之學不傳久矣臣幸得之於遺經不自度量以身任道天下駭笑者雖多而近年從者方衆方將區區駕其説以示學者覬得傳於後不虞天幸之至得備講説於人主之側誠使得以聖人之學上沃聖聰則聖人之道有可行之望豈特臣之幸哉如陛下未以臣言為信何不一賜訪問臣當陳聖學之端緒發至道之淵微陛下聖鑒高明必蒙照納如其妄偽願從誅殛頥明年三月再上疏云去年六月中嘗有奏陳今即附六月末奉議郎劉誼權發遣韶州三月十八日孫升乞復誼職今乃除州此據蘇軾集并張莘所編劉江西萬言集附見責宫祠在三年三月二十一日
