body:
  text: 續資治通鑑長編卷三百二十五宋李燾撰神宗元豐五年夏四月壬子朔雲陰日不見食兩紀並書日食不見參知政事蔡確上元豐法寶録知開封府王安禮言三院獄空詔送史館安禮遷一官推判官許懋胡宗愈劉仲熊並賜章服軍巡判官畢之才以下十四人為三等第一等遷官第二等減磨勘二年第三等一年吏史轉資仍賜銀絹錢為絹千匹銀百五十兩錢五百千舊紀書開封府獄空新紀不書安禮事至輒斷庭無留訟久繫待辨者一切論決於是以獄空揭諸府門遼使過見歎息稱為異事上曰昔由余聘秦觀政內史廖輩從容爼豆以奪其謀者秦有人也安禮留意吏事能駭動北國於古無愧矣同知樞密院吕公著從者得匿名書於道事涉不順公著以聞上手封付安禮治已而又得二本詔遼人在館而此書滋多亟捕之無使宣布書所斥百餘家而其一家三人焉中有姓薛者安禮曰余得之矣薛至詰之曰若豈有素所不快者邪對曰里有以筆求售者拒之鞅鞅而去意其見仇也安禮遽捕致訊所告皆其平時睚眥者狀具詔遣近侍覆之無異辭即日梟於市初不逮繫一人鮮于綽傳信録或云獄空時安禮密諭畿邑使暫停解送公事御史知雜滿中行彈擊之上不説曰豈不知獄空朝廷美事乎中行言獄空事不驗又雜言和甫他事不勝出知無為軍同知樞密院吕公著奏臣給使人於通衢中得匿名書以示臣事涉不順不敢不以聞上以手詔付安禮推治己而從中復降二本其詞皆同上敕諭安禮曰遼人方在館而此書滋多脫流播外國者非便亟為捕之安禮視書中所載一百八十餘家最後一書家三人馬有薛其姓者安禮召邏者誡曰治獄當治其獨為余召薛生者來俄而薛生至安禮問曰爾亦有仇怨乎薛曰某邑某里有某人者常以筆一束為託某拒之鞅鞅而去意其為讎也安禮曰吾事辦矣遣人捕之果得訊書中所載皆其睚眥者安禮具其狀以聞上遣近侍馮宗道覆之信然即日梟首都市初不逮證一人京師譁然稱頌以為神明此據田晝所作安禮行狀本傳已修入更詳之行狀又云自安石為侍從時嘗議按問自首減等法以從寬而經問始隱者尚不得減安禮乃言曰臨罪而懼人之常情一問不服便得全坐則讞者得以誣具獄情後有不承而書案者不在減例詔從之著以為令至今全活者莫知紀極宗室令騑有妾騫始售其直數十萬間被酒炙敗其面因訴於官督歸其直安禮曰妾之所以直數十萬者以善姿首也今炙敗之則無能自鬻此與炮烙何異乃奏於上請勿復其直并厚譴之以為戒上曰令騑魯王之裔席寵怙勢鮮克由禮朕以近戚故每優假之比聞被按踧踖如不容且相戒毋敢犯卿今朕為卿罰其俸則過於受譴矣令騑乃仲騑事見五年二月十五日又十一月二日可考後宫造油箔始與民約三年損者追其直後一年箔有損者中官持箔詣府請責其直如約詞氣甚厲安禮曰庸詎非置之不得其地為風雨燥濕所壞耶今用之既久乃退取其直每如是則無復得直者約不可用也大璫甘師顔居官第頗有增建而求售者黃門王瑜酬之善價欲自結於甘即以别舍質於市易得千緡以與之頃之瑜且死其母欲歸其舍安禮曰父母在為之子者妄易舍業以成其私非法也俾瑜母與師顔互以錢業為主師顔挾貴勢嗜利逼下稽其期弗肯償安禮曰是知瑜母月輸其息於官故欲以困瑜家者遂列其事後有輸息者令師顔承之師顔聞之即日還其直自是宗室中貴人嚴憚之安禮既在翰林舊制尹京者不行詞時髙麗修貢數以奏來上而所用答詔以十數有旨學士等槩為之執政欲人取一二通以塞旨而上乃獨用安禮所為者其後為執政每下大詔令與通好外蕃多屬於安禮已上五事並安禮行狀當刪取之上因論為治之道不可不知幾故聖人圖難於其易為大於其小事已著者常人知之而無補於救敗張良之於漢其謀甚微而救患則大若借箸銷六國之印追項破養虎之謀即拜齊王先封雍齒皆漢之所以存亡羣臣之所不及良以三世相韓為其子孫者當為韓報仇而漢祖之才足以有天下因而輔之皆能致其義而去其去就超然不纍於物蓋體道者也蕭何足以為漢大吏良乃師臣爾甲寅始御正殿復常膳上以自春亢旱靡神不宗及此雨尺餘喜見於色謂輔臣曰禁中令人掘地潤及五寸秋成當復有望殆天助也兩紀並書御殿復膳遣御史宇文昌齡鞫鄜延鈐轄劉紹能於鄜州四年二月二十八日乙酉紹能升鈐轄七月十七日庚子押赴闕五年四月三日甲寅遣昌齡六月一日辛亥詔催結案十四日甲子二十二日壬申七月五日甲午十三日壬辰二十二日辛丑十二月十八日甲子昌齡使回六年正月十三日己丑獄竟鄧洵仁志昌齡墓云鄜延帥司奏劉紹能將通結西賊作過邊境神宗察其非實俾勿治帥司固執再以狀聞詔委昌齡就鄜州制勘皆卒如聖慮昌齡請懲戒生事邀賞官吏以安邊人猜嫌之心既還奏對稱旨賜五品服密院時政記五年六月十四日甲子鄜州制勘院奏已疏出劉紹係能祗候取問未圎情節其星鄂克已疏放逐便并將不緊切干照人蕃部等共四十二人疏放及知在外奏聞事貼黃稱勘會蕃官郝守素吹邁劉永隆劉永德各為供狀時行用錢物係事發在德音後及郝守素等在經略司曾有虛撰造到劉紹能事節各係有罪見照勘同三省奉旨今鄜州制勘院勘會郝守素吹邁劉永隆如不是故入劉紹能死罪亦仰先次疏出二十二日壬申鄜州制勘院奏見勘劉紹能公事所有經略使副沈括种諤各有奏發劉紹能等不實情罪欲乞除見禁官吏等一面結案外將沈括种諤並於案後收坐同三省奉旨見禁官吏一面結案其沈括种諤案後收坐七月五日甲申樞密院奏勘會到鄜延路將副奉旨劉紹能與移環慶路將官差遣十三日壬辰鄜延路鈐轄劉紹能帶到銀器衣物等見在府司校庫寄納物色候有便使臣管押往環慶路交付本人二十二日辛丑劉紹能已令依舊充鄜延路鈐轄兼第三副將已附七月五日張誠一言近者發兵西征告乏者數郡朝廷遣官裁削冗占僅始足用若三路則無慮皆𨽻將下近裏州有不𨽻者亦籍在緣邊分時畨上故凡差使率用將兵遇調發時近裏逐州惟有義勇保甲與小分共守空壁竊以諸處壯城其錢糧與下禁軍無甚相逺欲隨州軍大小稍增舊額取諸路所減廂軍請給以佐其費十分人數以五分教弩及挂搭守城五分專治壁壘或值將兵俱出則量數差發以代其役惟不許出城從之户房檢正官吳雍王震上都提舉市易司敇詔開封府界提點司速捕絶蝻蟲毋令害稼丙辰手詔李憲蘭州新造之區財用艱急若非省約何以經久近李浩奏乞差凖備將領及無用職官等八十餘人浩止知習熙河姦利故輒務在引援親舊不恤朝廷斥境長久大計緣熙河經始弊害爾身所經歷後來致人多言率由冗費不節今日不可不痛思懲艾宜早裁定仍詰浩不因長司擅便聞奏情罪丁巳遼主遣懷逺軍節度使耶律永端太常少卿乾文閣待制韓資襄來賀同天節侍御史知雜事滿中行言王安禮元奏御史臺取籍記賊盜名簿乃本府日用文書及令分析乃言以臺牒别取簿數多遂奏乞逐次止取一簿隱落前奏虛稱日用文書一節此乃安禮前後欺妄不實上批中行奏事不實不當落侍御史知雜事以直集賢院知無為軍鮮于綽云中行坐論安禮獄空不實故黜已附注壬子朔當考戊午上批仲潦新婦文安郡夫人曹氏昨以太皇太后遺恩進封增給俸錢等有司自陳以為誤支可依舊支破仍免追理大理卿崔台符言本寺獄空詔送史館台符減磨勘二年少卿韓晉卿楊汲一年舊紀書戊午大理寺獄空新紀不書河北都轉運司言都水監專領河事平時措置本司初不與聞近歲決溢則均任其責今新舊掃崖廢置開塞之際實繫本路公私休戚伏望許令本司同議如不賜允從乞免同坐詔河防事免同坐如轉運司曲有沮壞都水監按劾以聞大名府安撫司言宣德郎致仕常升母李年百有十歲升纍歷資任以母老不能之官遂求致仕家素貧遇歲飢無以為養乞令升依京官致仕例給以半俸從之己未沈括奏欲遣曲珍將兵於綏德城照應討除賊界葭蘆寨左右見聚羌落詔如括奏且誡毋得恃勝輕敵責將吏常持小心以保勝勢餘更隨宜裁剸勿失機會有功士卒切在以時推賞收其歡心惟此輩樂於趣戰則所向無堅敵矣三月十四日二十二日二十六日四月十一日十三日可併此壬戍詔沈括葭蘆寨可乘勢取之固善萬一賊壘堅完閉壁自守不得疲耗士卒攻擊惟令將官多設機智開之以利致之出戰然後多為竒伏邀而敗之崇文院校書楊完編類元豐以來詳定郊廟奉祀禮文成二十卷以進元豐正月十三日有旨討論三年閏九月二十五日初有旨編類癸亥詔聞鳳翔府鳳階成等州飢民流移東來以數萬州郡未有安集之計令提舉司案實以聞兩紀附年末上曰常平賑濟之法州縣或不能盡行夫以政殺人與刃無異今出入一死罪有司未嘗不力爭至於凶年飢歲老稚轉死溝壑而在位者殊不恤此出於政事不修而士大夫不知類也天地郊廟之祭當用太牢議禮者固以為不可民間殺牛法所當治而州縣多不禁止論議之偏槩如此也詔李憲所奏將來隨軍糧食轉運司經制膠柱需索浩大雖傾關中事力佐以此路金穀亦未應副所辦如此是必無可舉動之理所以自任計置米五十萬石乾糧二千萬斤自從本司運致出塞若非左右忠力之臣豈能操心任責如此已指揮本司責勒葉康直等須管於六月終旬依所要之數計置於鎮戎髙平熙寧三軍寨樁積可照會疾速督促施行惟是所乞金帛等未有捷近取辦去處雖已令盡行剗刷應副尚慮其數未充又自關東運致道路隃邈恐不及事宜就彼更切經度具析奏來權管勾涇原路轉運判官兼同管勾經制熙河路邊防財用承議郎胡宗哲降授承事郎權發遣同經制熙河路邊防財用事通直郎馬申降授承務郎展磨勘八年坐闕軍糧餉也甲子上批欽州極邊煙瘴知州許依雍宜二州奏子孫一人恩澤著為令詔自葭蘆堡至米脂寨創添堡寨從沈括請也三月十四日二十一日二十六日四月八日十一日并此日又二十八日皆合并入初大軍還自五原夏人瞰我師既老乃保金湯以窺鄜州括使龍神衛四廂都指揮使絳州防禦使曲珍將步騎二萬治師於東川言欲襲葭蘆出鄜延東道夏悉衆備東方師行數里反斾而西三日至金湯拔之斬首千五百級俘宥州觀察伊克衆數千人而還乃移軍討葭蘆遣曲珍屯綏德以圖之虜兵塞明堂川以拒珍括陰遣别將李儀自河東客户津夜絶河以襲葭蘆河東將訾虎率麟豐之甲會之虜救葭蘆還得地二百里控弦四千人以守河梁據括自志詔隨軍出界掌機宜官及走馬承受不得干預軍事乙丑承議郎直龍圗閣勾當三班院徐禧知制誥兼權御史中丞初召禧試知制誥禧辭不許既就試即命兼中丞丙寅手詔李憲近聞夏人復遣間使許董戩喀羅以西地求平及契丹亦繼有使人到青唐深慮為夏賊成和近鄂特凌古纍請師期未報恐羌情生疑姦者乘隙壞約可於秋初速與一期日遣人伺問上件事實令董戩勿聽契丹言與夏國和其他斟酌諭之戊辰熙河蘭會路經略司言經制司欲於熙河州戰兵對替蘭州瘦病不勝甲將士緣本管兵不多乞自朝廷應副詔發在京拱聖驍騎雲騎武騎各一指揮殿前步軍司虎翼各五指揮其蘭州不勝甲卒並赴隴州鳳翔府駐泊委官訓練詔蕃弓箭手陳亡依漢弓箭手給賻漢弓箭手出戰義勇保甲在界因傷及病羸不能自還者並許依諸軍例賜其家林廣言乞弟巢穴已給賜後蕃羅氏鬼主乞授以羈縻歸徠州銅印從之詔軍入大箐破蕩乞弟巢穴諸以瘴死者特降處分疾速檢録安南例推恩無致遺漏差錯上批鄜州百姓陳訴昨鄜延路軍興日科率之物名件不一內亦有非軍中要急使用方陜西供軍用度公私艱急若更非理耗費何以枝梧可下李承之等除軍中委的要用之物方得科買製造外敢此外配率及耗費官錢收買當重行黜降并仰提點刑獄司覺察己巳李憲繪奏將來進兵出塞築立堡障及制賊方略乞從中裁詔地之險易所嚮先後自非目擊與敵變化謦咳之間首末已異豈隃度於千里之外得能之乎理固難中覆也惟是探要鈎賾敵之強弱與夫待我顯伏情狀內顧己之兵食足以加賊繼餉使軍不虛發財不徒費發必可以摧敵費必有濟國事乃注委之深意惟將帥博謀善圖之上批付苖授聞夏人求和於董戩甚急纍請不獲又邀契丹使同往以平日強弱大小之勢論之無容自屈如此疑必有深關國之存亡利害故爾卿所部接羌境必已知其情狀大懼西蕃與官軍合趣覆其巢耳卿宜精圖地形博謀智者未審可為之否亟以聞沈括言嘗遣景思誼措置邊事受使即行不擇難易乞賜試用詔思誼乘驛赴闕殿前司言御龍骨朵直弓箭直弩直東西班招箭班日赴崇政殿祗候遇放朝參改御延和殿諸班都虞候指揮使押班在東華門謻門橫門排立距後殿且二里乞依龍直例入拱宸門赴延和殿迎駕起居從之詔殿前馬步軍司及河東都總管司諸亡命入塞士卒限外首獲依在京降配法斷遣庚午詔徙梓夔路鈐轄司於瀘州東上閣門使梓夔路鈐轄王光祖免前罪為梓夔路鈐轄知瀘州兼瀘南緣邊安撫使遇有邊事安撫鈐轄司措置施行轉運司更不干預二十七日云光祖坐打誓不實被劾此云前罪當即是打誓不實也光祖此已書知瀘州十二月十一日張克明乃以知瀘州論事十九日又書光祖知瀘州不知何故當考此年七月戊申并大觀三年六月八日云云可考詔判都水監李立之理三司副使資序勾當官吏轉官支賜有差賞相度新河裁省工力之勞也壬申詔秦鳳路經略司如無賊馬犯邊毋得出兵淮南東路提點刑獄范鏜上捕賊使臣詔錢盛名程保民各遷一官嶽全減磨勘二年移將副差遣馬德減三年郝寧與右班殿直閣門祗候展磨勘三年其殺獲正賊兵級依本路賞格開封府判官杜常言應陜西見管妄通兵士乞並刺填所在廂軍從之仍下諸路凖此妄通兵士當考河東經略司言乞選麟州飛騎府州威逺子弟二十五以下短兩指二十以下短三指並刺充從之癸酉銀青光祿大夫兼門下侍郎同中書門下平章事監修國史王圭依前官守尚書左僕射兼門下侍郎太中大夫參知政事蔡確依前官守尚書右僕射兼中書侍郎感德軍節度使充萬夀觀使髙世則於紹興六年十一月申史院云今續於舊文字檢尋到禁中論蔡確事云蔡確既責降禁中尚有前朝寵遇及用事之人交結或進言於太皇太后曰蔡確先帝任為宰相前後蒙太皇太后包容今日更乞聖意少加寬貸太后曰若論蔡確玷纍先帝處多一切不問今自取罪戾非太皇之私意也先帝初任確為相舊相富弼自西京上言陛下左右不宜任用小人確朋黨多後來確知此事一日殿上奏事正色問先帝富弼言神宗怒曰卿何從知富弼之言確已不能對神宗復曰老臣獻豈可沮用已而富弼再上言臣前所謂小人者蔡確是也神宗亦深信弼言悔相確今先朝劄子具在遂取富弼元上劄子以示哲宗并皇太妃等史院案踏今具存世則所録蔡確新傳云富弼在西京聞確拜右僕射兼中書侍郎上言蔡確小人不宜在陛下左右神宗亦悔之蓋以此為據也按蔡確固為小人富弼固嘗言於神宗竊恐未必在確初拜相時今附注此更俟考詳六年閏六月二十三日弼薨王安禮云云或即指此也舊紀書癸酉官制成詔以五月朔頒行以王圭為尚書左僕射兼門下侍郎蔡確為右僕射兼中書侍郎新紀書官制成圭確為某官不書以五月朔頒行詳定禮文所言太廟每室設豆籩十二蓋承唐顯慶舊制情文不稱乞從典禮籩豆各用二十有六詔候廟制成日取旨禮文第十一卷豆籩俎簋鼎鉶之實并禮料改更事件有十二項此但第一項耳亦無月日及取旨等語不知實録何據當考詔百官見執政三省給事中舍人侍郎以上寺監長官及待制橫行以上詣府餘官並詣三省樞密院聚聽處即有所請召并屬官及親戚不以服紀不用此法詔河東提點刑獄黃廉知汾州周覺晉州王説平定軍康昺各展磨勘三年先是追官勒停人余行之以謀逆伏誅廉等坐嘗遺酒及差人護送原赦特責也三司言朝旨給鹽鈔二百萬貫與涇原路陜西轉運司勘會印鈔紙見闕四十八萬餘張若伺候商虢等州科買起發顯見住滯欲用雜物庫襄州夾表紙印造上批紙色不依自來所用非便宜止令依久例所用上色甚好紙印造詔陜西都轉運司涇原路逐司係去年六月以前舊有窠闕文武官料錢米麥支諸般請受依舊勘請外後來因軍興創添員闕并諸般差使除身分料錢米麥外餘添支諸般請受並權於關東州軍或在京支給甲戍詔中書五月朔行官制舊紀係之癸酉新紀於五月一日乃書行官制太中大夫知定州章惇守門下侍郎太中大夫參知政事張璪守中書侍郎翰林學士承議郎蒲宗孟為中大夫守尚書左丞翰林學士朝奉郎王安禮為中大夫守尚書右丞先是宗孟詳定官制樞密都承旨張誠一亦領官制局事頗肆橫脅制同列宗孟於上前疏其姦上察其不阿故與安禮俱蒙大用翰林學士承議郎李清臣試吏部尚書尋詔清臣特遷奉議大夫曰安有尚書而猶承議郎者降授中大夫龍圖閣直學士權發遣三司使安燾試户部尚書禮兵刑工四部尚書皆闕不除通直郎寶文閣待制權判尚書兵部兼知審官東院何正臣試吏部侍郎大中大夫集賢院學士判尚書吏部蘇頌為通議大夫守吏部侍郎仍詔頌管左曹左曹據御集通議大夫知潭州謝景溫大中大夫知制誥知應天府李定並守户部侍郎朝散郎龍圖閣待制知鄆州許將試兵部侍郎太中大夫大理卿崔台符守刑部侍郎通直郎知制誥知院兼判國子監農寺舒亶試給事中朝奉郎檢正中書户房公事吳雍守左司郎中通直郎館閣校勘檢正中書禮房公事王震試右司員外郎於是開天章閣初用官制除拜詔震及雍從輔臣執筆入記聖語面授以左右司仍使自書時論榮之新舊紀既書王安禮等執政已乂書省臺寺監以次除授詔自今更不除館職見帶館職人依舊如除職事官校理以上轉一官校勘減磨勘三年校書減二年並罷所帶職詔唐贈太尉段秀實八代孫文酉為隴則助教復其家兩紀並書三省上擬定百官畨宿門下省給事中左諫議大夫左司諫左正言起居郎中書省舍人右諫議大夫右司諌右正言起居舍人尚書省尚書侍郎郎中員外郎詔給事中中書舍人左右諫議大夫尚書侍郎以上並免宿尚書都省及六曹一員遞宿省寺監長二五日點一宿餘官畨直詳定官制所言唐制內外職事有品者給告身其州鎮辟置僚佐止給使牒本朝亦以品官給告身無品及一時差遣不以職任輕重皆中書門下給黃牒樞密院降宣今若盡如唐制例給告身則職卑而事微恐不勝盡給今擬階官職事官選人凡入品者皆給告身其無品者若被勑除授則給中書黃牒吏部奏授則給門下黃牒樞密院差則仍舊降宣於事簡便從之詔招軍軍員一年內招係將下就糧兵士及五百人轉一資乙亥龍圖閣直學士太中大夫知成都府鄧潤甫為翰林學士承議郎知制誥同修國史王存為龍圖閣直學士權知開封府改新守户部侍郎謝景溫守禮部侍郎朝請郎天章閣侍制河東路都轉運使陳安石試户部侍郎他日安石與右曹侍郎李定同奏事上目留安石曰卿豈非嘗任淮南轉運使而不保李定者乎安石曰有詔問臣不敢不以實奏上曰以實事君朕所與也詔應除職事官候官制行日罷舊職事尚書省執政官不用此例丙子朝奉郎集賢殿修撰知廣州熊本試工部侍郎朝散郎史館修撰判太常寺曾鞏朝散郎集賢校理同修起居注趙彥若通直郎集賢校理同修起居注陸佃並試中書舍人鞏彥若佃集皆有謝表彥若佃表首皆載仍改賜章服獨鞏表不載承議郎祕閣校理羣牧判官畢仲衍為朝奉郎守起居郎通直郎集賢校理管勾國子監兼崇政殿説書蔡卞為奉議郎試起居舍人給事中舒亶權直學士院通直郎館閣校勘知諌院朱服試國子司業諫院惟舒亶朱服兩人亶既除給事服又除司業未見除授司業人明年四月乃以王桓為左正言監察御史裏行奉議郎黃降通直郎豐稷王桓並為監察御史詔安疆寨招廂軍百人令陜西應合刺配五百里以上除強惡賊外押送經略司刺充以保寧為名丁丑正議大夫同知樞密院吕公著為光祿大夫資政殿學士知定州始議五路舉兵伐夏公著諫不聽尋上表求罷仍謁告不出上封還其奏賜手詔曰在廷之臣可託腹心之寄無逾卿者安得自外自逸公著乃復起視事及西師無功公著言外議皆謂王中正宜正典刑於是用李憲策將圖再舉公著又固諫上不悅會章惇自定州召為門下侍郎公著因乞代惇守邊上曰朕待卿不止此卿其少安或謂公著曰今官制新行所用為相者或素出公下又西府方以二員為制而公與孫和甫韓玉汝為三人有溢員上以是詔未用二員之制今遽求去得毋近於躁乎公著曰所謂大臣者病不能以義進退耳皇恤其他章繼上乃有是命及李舜舉入奏上意悟欲罷西師公著入辭上慰勞之曰卿不當居外行且召卿矣四年十一月甲辰詔樞密院置知院同知院餘悉罷記聞云公著諌再舉西師上不悅因除定州及李舜舉入奏西師若再舉關中必亂上乃召公著慰勞之按公著以四月二十六日除定州五月二十一日始有詔罷涇原進築六月五日令李憲還熙河舜舉入奏時恐公著已去京師矣或舜舉入奏在二十一日以前公著猶未入辭也按公著家傳入辭以五月十六日記聞所云慰勞之語當即是卿不當居外行且召卿矣更須考之十六日入辭距罷李憲令還熙河尚半月又恐舜舉入奏不應彌兩旬乃有指揮當考神宗史職官志云元豐五年六月改官制議者欲廢樞密院歸兵部上曰祖宗不以兵柄歸有司故專命官統之互相維制於是得不廢上又以樞密聯職輔弼非驅使之官乃定置知院同知院二人時有知院事孫固同知院事吕公著韓縝凡三員官制既行上欲以禮退公著逡巡數月公著始請補外乃以資政殿學士出知定州按志所稱上欲以禮退公著蓋作史者私意公著自緣議論不合故罷耳二員之制更須考詳四年十二月二十二日甲辰已其注在彼孫固以元年閏正月壬辰除同知吕公著以元年九月乙酉與薛向並除同知三年九月癸未三人並改副使丙戍向罷四年正月辛亥固改知院公著改同知韓縝初除同知舊紀書丁丑吕公著罷以資政殿學士知定州新紀但書丁丑吕公著罷太中大夫龍圖閣直學士判將作監王益柔為祕書監奉議郎集賢校理知禮院林希為承議郎行著作佐郎宣德郎館閣校勘邢恕為校書郎詔中書舍人罷職事官日除龍圖閣待制又詔尚書省寓舊三司龎元英文昌雜録云以時有營繕未畢凡寓治四所一舊三司二舊司農寺三舊尚書省四三司使廨舍承議郎知制誥權御史中丞徐禧言中丞糾彈之官赴舍人院行詞似有妨礙乞免赴直詔禧守本官試御史中丞戊寅降告七十五道敕三十道宣四百八十七道劄子八十六道付沈括賞曲珍出塞時立功將官有輕重未當者以聞詔六曹尚書依翰林學士例六曹侍郎給事中依直學士例朝謝日不以行守試並賜服佩魚罷職除他官日不帶行賜服佩魚當考李德芻欷歔子云故事直學士以上賜金御仙帶結銜皆云賜紫金魚袋而惟奉使館接伴始佩魚御仙之制久廢而皆作荔支樣元豐中新官制始議學士侍郎以上服金帶尚書大資政翰林學士佩魚給事諫議舍人中丞非自學士除者服紅鞓犀帶佩魚時舒亶為給事中交結張誠一忽中旨易給事中丞服金帶而廢紅犀之儀元祐中復罷給事金帶而不敢削中丞者按德芻所著欷歔子多不實附注當考中丞服御仙花帶已見此元豐五年正月二十九日矣若謂此四月二十七日緣亶則猶可又元祐五年十一月十三日紹聖元年十一月十二日崇寧二年七月二十五日四年三月十三日大觀二年五月十七日並合參考罷修五朝史當考求所以罷修之故先是曾鞏上太祖本紀篇末論所論事甚多而每事皆以太祖所建立勝漢髙祖為言上於經筵諭蔡卞曰鞏所著乃是太祖漢髙孰優論爾人言鞏有史材今大不然於是遂罷鞏修五朝史事此據鞏上神宗寶訓宇文粹中所編者當考太祖篇末論乃四年十月十一日詔司農寺市易淤田水利等司於河北計置封樁糧草並歸措置糴便司步軍都虞候英州刺史林廣為衛州防禦使馬軍都虞候入內東頭供奉官都大經制瀘州夷賊司走馬承受公事兼照管一行軍馬麥文昞遷兩官寄資皇城使忠州團練使姚兕領果州防禦使右騏驥使吕真為皇城使忠州刺史東上閣門使王光祖為四方館使賞討乞弟功也將校依本等推賞兼功人並纍賞初中書樞密院言姚兕當減磨勘四年緣皇城使改官不用減年當至元豐六年七月遷遙郡防禦使內殿承制秦世章當遷三官先坐打誓不實被劾及破乞弟當遷一官如京副使張仲安劉甫各當遷一官不能戢士卒殺人夫為賊級候奏功取旨王光祖當減磨勘三年坐打誓不實被劾及昨破乞弟當減磨勘四年供備庫使髙遵治西京左藏庫副使張燾當減三年東頭供奉官杜議當減四年各坐殺降人級作鬭敵被劾詔姚兕遷遙郡防禦使秦世章張仲安劉甫並如前詔王光祖通用減磨勘七年遷一官更減磨勘二年髙遵治張燾杜議候案上取旨故兕光祖等先推恩也賜河北提舉義勇保甲狄咨每年公使錢千緡專給犒設己卯詔內外市易務錢在京酒户欠糟米錢各展三年均作月限納限內罰息並除之沈括奏曲珍已分遣將佐城葭蘆寨詔近據麟府軍馬司張世矩已領兵出討除左廂屯聚賊馬宜移報曲珍照會誡敇所遣出界將佐照管士卒穩審取勝勿輕敵也三月二十一日二十六日四月八日十二日十三日並合并此庚辰上批付沈括麟府路牒報西賊於神木堡聚兵其首領皆牙頭選募血戰之人本路兵出塞當此地分不可不小心接戰可與曲珍誡責將官詳審措置詔皇城司選募親事官一指揮以五百人為額守奉景靈宫置誠州貫保縣舊紀書置貫保縣陜西路轉運司官范純粹等奏伏見朝廷聚兵涇原謀為進築堡寨侵復土疆之計而臣等聯職漕計約計一行軍馬并應干傔從諸雜占使以致負運芻糧什物之人萬數浩大師出有期帑藏匱之芻糧未備事力有限飛挽難繼夙夜憂懼未知所以為策深慮他日或誤國謹具條列下項一今來會聚諸路兵馬併在涇原約正兵廂軍二十萬馬四萬輦致芻糧百姓又約二十萬頭口二萬凡一牛馬所費當五人之食約總其數日費萬石而草不預焉且以百日計之所損百萬斛矣契勘去年涇原路兵興廂禁軍才六萬馬一萬七千師出而還不踰兩月又朝廷所賜錢斛皆是纍年所積倉廩充實然猶公私匱乏乃已如此自軍回以來屯戌之兵糧食傔料至于犒賜及纍次特支之類皆係所賜錢斛內支費所餘無幾今以公私困弊之餘而所計兵馬三倍于前所齎出界之糧數百萬又須為接續饋餉之計若新修城堡既成更當儲積以備守禦臣等度今公私之力恐決無辦具之理一軍行餽運芻糧并輦致材木什物等人除候制置司分擘廂軍外見相度合雇大小車及駕喝人約二十萬縱所雇人車悉得足數而一運糧斛才十餘萬石僅可充十餘日之費其輦致材木腳乘不與焉雖擘畫轉摺計往還八九運方足百萬之數須略無艱阻才且粗給緣山涉水不無艱險之厄經歷時月不無風雨之阻深入賊界不無抄掠之虞駕喝之人往來界外不得止息勞苦既久不無逃散之患車乘頭口衝冒暑雨負重致逺飼秣不時暴露綿久不無死損之數宿兵在外不幸於五者之中有一於此即決誤大事一近凖朝旨節文修築般運並用廂軍及和雇百姓契勘已蒙朝旨下諸路團結廂軍陜西人數修築工役外餘路共止四萬有餘並𨽻制置司仍令制置司隨宜分擘應副縱制置司全不他用亦是難足今來運糧之役竊度關中民力自經去年調發隨軍之後凋殘驚畏雖給雇直必不願受雇出塞州縣若無人應募不免差雇以應期會則是名為和雇實為調發前日朝廷明降德音曉諭百姓更不差夫出界各令安業詔敇之下兆姓歡呼歌頌聖政今復差雇出界切恐不副陛下降詔推恩之意萬一人情騷動别致生事不可不慮右臣等竊以去年興兵倉卒大功未就有負朝廷伐罪之意今竭關陜公私之力事此一舉必圖萬全而事勢如此無可濟之理臣等固知危言異議自速罪悔誠以職事所在不敢緘默是敢昧死上聞伏望聖兹心深賜省察純粹此奏云與本司官同上然則當時為轉運使副判官者悉是也須詳考姓名列出之純粹五月一日又獨上奏純粹此奏自注云五年四月而空其日今附四月末
