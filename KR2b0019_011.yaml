body:
  text: 續資治通鑑長編巻七宋李燾撰太祖乾德四年春正月丁卯朔御文眀殿受朝乙亥遣中使塟樞宻直學士趙逢妻朱氏時逢權知閬州上聞其妻病死京師故令官給塟事逢性慘酷其在閬州㑹賊蠭起攻逼州城逢捍禦有功及事平誅滅者近千家丙子遣供奉官都知曹守琪守琪未見等分詣江陵鳳翔賜偽蜀郡臣家屬錢帛疾病者給以醫藥丙戌詔三司鹽鐡度支戸部判官除各行本司公事外自今應有改移制置支撥折科増減條流轉輸供億凢干起請並繫商量切在從長務令允當若或事未諳詳理須詢訪即宜關牒以問别司别司纔受公文便須盡理囘報具眀可否方得施行茍渉稽違當行黜責若或因而更改頗叶便宜仍具奏聞並充課績若在省曽徧咨謀事猶未決即許牒逐路轉運使問其利害其轉運司承受公文亦准此應報或當軍期不在此例應三司使或有行遣未當本判官並須執諮如事理顯眀不肯依據即許靣取進止或事有己經敷揚稱奉㫖施行者若未通便亦許指陳或本司判官避事不言仍許别部判官及逐路轉運使直具利害聞奏賞罰之典斷在必行應逐司判官各置歴批書課績與判使通署每至年終當議考較黜陟或眀知利害而循黙不言便當舉行不須嵗終應三司各置推官一員令總斷逐司公案兼專掌勾司公事仍别給印應三司使如㸃檢得判官等起請行遣不當公事亦置歴批書諸道轉運使如見三司行下公事有不便於民者許直具事状以聞不得隠避其所行公事及申奏起請改正條件亦仰置歴批上逐季進呈以憑校定考第眀行黜陟丁亥以客省使丁德裕為西川都廵檢使與引進副使王班内班都知張嶼同領兵數千人赴西川時全師雄之黨猶未殄滅也張嶼未見己丑幸迎春苑宴射詔達州偽蜀時刺史於部下無名科率並罷之北漢入冦命西北諸鎮出兵禦之是月契丹又侵易州監軍任德義德義未見撃走之令關南兵馬都監及雄覇瀛鄚等州刺史勒所部兵校獵於幽州境上以耀威武此據國史契丹𫝊本紀但書關南及四州耀武事不書任徳義事乃於開寳四年正月始書徳義事恐本紀誤也二月癸卯上親視宫城版築遂幸北園宴射丙辰安國節度使羅彦瓌言與西上閤門副使田欽祚大破北漢軍於靜陽砦斬首千餘級擒其將鹿英等獲馬三百匹兵仗三萬餘于闐國王遣其子徳從来貢方物初渝州賊杜承襃刼衆圍州城外援不至判官卞震躬率士卒拒守為流矢所中有詔襃之創甚不能臨軍而州兵重傷巻甲宵遁刺史陳守習守習未見通判氏居方遂降賊承襃入據州署以偽官厚賄誘震震皆斬其使因遣人說賊黨東章述朝廷威徳諭以禍福章者本州校也既懼且信伏兵擊承襃承襃雅不為備衆遂大潰震與守習等分部餘賊討平之既而有司言守習居方嘗失守降賊當死震以前功得贖丁巳守習為淄州教練使免居方官震成都人也卞震𫝊以陳守習為陳文襲今從實録辛酉令西北諸州俘獲北漢生口並給以田及農具種食權知貢舉王祜言進士合格者六人諸科合格者九人上恐其遺才復令於不中選人内取其優長者第而升之甲子賜西川諸州今年夏租之半無苖者復之岳州言火焚衙署倉廩庫務居民廬舍殆盡三月癸酉詔廢義倉以民重疊供輸復成勞擾故也甲戌始賜百官新火占城國遣使朝貢乙亥殿前都虞候楊義暴疾失音上幸其第賜錢二百萬命掌軍如故義忠實無他膓故上委任之不疑雖不能言而指顧之間衆皆禀令軍政肅然有童奴田玉者善揣度義意每上前奏事及對賔客或戒敇部下義必囘顧玉畫掌中為字玉盡曉焉因代義開說皆如義所欲己卯淮南諸州言江南饑民數千人来歸令所在發廪賑之賜沿邊將士薑茶癸未詔川峽諸州長吏察民有偽蜀日所輸煩苛詔所未蠲者悉便宜除之僧行勤等一百五十人請逰西域詔許之仍賜錢三萬遣行乙酉幸玉津園令衛士騎射賜從官飲大理正髙繼申繼申未見言准刑統三品五品七品以上官親屬犯罪各用䕃減贖伏恐年代已深子孫不肖為先代曽有官品不畏憲章欲請自今犯罪人用祖父親屬䕃減贖者即須祖父曽任皇朝官據品秩得使前代官即須有功及國有恵及民為時所推官及三品以上者方可從之夏四月丁酉占城國王悉利駞盤遣使貢方物禁荆湖諸州造蠱厭庚戌修崇元殿成改曰乾元殿召近臣諸軍校觀之賜近臣噐幣軍校帛役夫錢前絳州防禦使彭城郭廷謂廷謂初見顯徳四年為靜江留後權知梓州偽蜀時有莊屯户車脚戸皆直𨽻州將鷹鷂户日獻雉兎田獵户嵗入皮革又有鄉將都將等互擾閭里廷謂至悉除之壬子罷光州嵗貢鷹鷂放養鷹户丁巳契丹天徳節度使于延超與其子仁愛來降以延超延超仁愛未見為右千牛衛大將軍領天徳節度使實録於庚申始載延超除右千牛衛大將軍今并書於此河南府進士李靄案宋史及薛應旂續通鑑皆作李藹決杖配沙門島靄不信釋氏嘗著書數千言號滅邪集又輯佛書綴為衾裯為僧所訴河南尹表其事故流竄焉戊午以両浙衙内都指揮使台州團練使錢惟治領寧逺節度使依前両浙衙内都指揮使惟治吳越王俶之長子也庚中幸燕國長公主第視疾辛酉詔以江南洊饑許沿江百姓過江樵採貿易獨商旅禁之如故本紀在七月今從實錄是月詔曰出納之吝謂之有司儻䂓致於羡餘必深務於掊克知光化軍張全操全操未見上言三司令諸處場院主吏有羡餘粟及萬石芻五萬束以上者上其名請行賞典此茍非掊納民租私减軍食亦何以致之宜追寢其事勿復頒行除官所定耗外嚴加禁之食貨志載此詔於乾徳四年四月不得其日張全操江東人再見興國二年二月疑即此全操也五月乙丑朔詔川峽諸州偽蜀政令有煩苛刻削害及民者累詔禁止蠲除之吏或不能遵守奉行未忍悉置於罪自今其勿復令部曲主掌事務及於部内貿易與民争利違者論如律庚午幸玉津園宴射癸酉始令諸司法物以文繡易彩繪唐主遣使来貢賀文明殿成也甲戌光祿少卿郭玘棄市玘知衛州以贓聞詔左拾遺袁仁鳳鞫其事罪不至死又遣左拾遺張純覆實乃寘於法仁鳳純未見先是上遣右拾遺孫逢吉逢吉未見至成都收偽蜀圖書法物乙亥逢吉還所上法物皆不中度悉命焚毁圖書付史館孟昶服用奢僣至於溺噐亦裝以七寳上遽命碎之曰自奉如此欲無亡得乎上躬履儉約常衣澣濯之衣乗輿服用皆尚質素寢殿設青布縁葦簾宫闈帟幕無文采之飾嘗出麻屨布裳賜左右曰此我舊所服用也開封尹光義因侍宴禁中從容言陛下服用太草草上正色曰爾不記居甲馬營中時耶上初命宰相譔前世所無年號以改今元既平蜀蜀宫人有入掖廷者上因閲其奩具得舊鑑鑑背字有乾徳四年鑄上大驚出鑑以示宰相曰安得已有四年所鑄乎皆不能答乃召學士陶榖竇儀問之儀曰此必蜀物昔偽蜀王衍有此號當是其歳所鑄也上乃寤因嘆曰宰相須用讀書人由是益重儒臣矣趙普初以吏道聞寡學術上每勸以讀書普遂手不釋巻此事不知果何時既無所繫因附見收偽蜀圖書法物之後上性嚴重寡言獨喜觀書雖在軍中手不釋巻聞人間有竒書不吝千金購之顯徳中從世宗平淮甸或譖上於世宗曰趙某下夀州私所載凡數車皆重貨也世宗遣使騐之盡發籠篋唯書數千巻無他物世宗亟召上諭曰卿方為朕作將帥闢封疆當務堅甲利兵何用書為上頓首曰臣無竒謀上贊聖徳濫膺寄任常恐不逮所以聚書欲廣聞見増智慮也世宗曰善丙子詔西川幕職州縣官料錢先以他物折充者自今並給實俸丁丑令諸州長吏察民有父母親屬疾病不視醫藥者深懲之實錄但指西川今從本紀庚寅上親試制科舉人姜渉等於紫雲樓下從容謂翰林學士承㫖陶榖曰則天一女主耳雖刑罰枉濫而終不殺狄仁傑所以能享國者良由此也因論前代帝王得失日晡乃罷渉等所試文理踈畧不應策問並賜酒食遣之保寧留後虎㨗左右廂都虞候權知侍衛歩軍司事王繼勲恃恩驕恣為部曲所訟付中書鞫實六月已亥奪其軍職命左金吾衛大將軍杜審瓊代之以繼勲為彰國留後左拾遺權知濰州徐雄坐隠官物除名流沙門島甲辰河決澶州觀城流入大名境壊民廬舍王全斌破賊帥全師雄於灌口寨擒其黨二千人師雄以衆趨金堂新舊録並不著此事本紀於河決觀城下即書之而闕其日按實録河决觀城乃甲辰六月十一也十三日丙午本紀載私飬宦者詔與實録同其間獨無乙巳然則全斌破師雄亦當是十一日甲辰乎更須詳考平蜀實録載全師雄以二年十一月二十七日病死金堂與國史異今但從國史丙午詔内官及三十以上乃許養一子士庶不得以童男養為宦者澧州刺史白全紹免官以縱紀綱於部内擾民䂓財故也丁未詔西川轉運使沈義倫於成都寫金銀字金剛經傳置闕下辛亥南州蠻進銅鼓一請内附甲寅契丹横海節度使桑進興進興未見来降以進興為左千牛衛將軍達勒達國天王娘子及宰相于允越皆遣使来修貢國史及㑹要俱稱四年夏因附此新舊録無之秋七月乙丑詔自今諸州吏民不得即詣京師舉留節度觀察防禦團練使刺史知州通判幕職州縣官若實以治行尤異固欲借留或請立碑頌者許本處陳述奏以竢裁丙寅詔自京至成都沿路州縣有偽蜀職官將吏及其親屬疾病者所在給醫藥賜以錢帛戊辰王全斌言西南夷首領兼覇州刺史董景等内附案宋史及薛應旂續通鑑皆作董暠己巳幸造船務又幸開封尹北園宴射癸酉賜西川行營將士錢帛有差甲戍以前永州刺史晋陽安守忠為漢州刺史守忠初䕶屯田兵於河隂王師克興元上召守忠謂曰逺俗苛虐南鄭走集之地卿為朕撫和之即遣守忠權知興元於是移守漢州時王師未還供億倍費公帑不足守忠助以私錢上每遣使必戒之曰安守忠在蜀能自律已汝見當效其為人丁丑溪州刺史田思遷以銅鼓及方物来貢戊寅禁淮南道私鑄錢庚辰詔罷劍南道米麫之征令華州民無出今年租旱故也丁亥給州縣官俸户詔書言准漢乾祐二年敕按舊史在七月而通鑑不載賜川峽諸州民今年秋租之半復置靜戎軍於梓州令諸州就州廨作檢納㕔以受民租是月以孔子四十四代孫宜為曲阜縣主簿宜舉進士不中因上書述其家世特命之八月丁酉詔西川民欠偽蜀臣僚私債者悉令除放辛丑召宰相樞宻使開封尹翰林學士竇儀知制誥王祐等宴紫雲樓下因論及民事上謂宰相趙普等曰下愚之民雖不分菽麥如藩侯不為撫飬務行苛虐朕斷不容之普對曰陛下愛民如此乃堯舜之用心也㑹要以為乾徳元年八月九日今從實録本紀竇儀元年十一月乃為學士王祜三年二月乃知制誥安得元年八月二人便以两制與宴㑹要誤也壬寅詔以憲府繩姦天官選吏秋曹讞獄俱謂難才理宜優異應御史臺吏部銓南曹刑部大理寺自知雜御史郎中少卿以下本司莅事滿三歳者遷其秩御史中丞尚書侍郎大理卿别議旌賞其奏補歸司勒留官令史府史各减一選先是上與趙普言樞宻直學士右諫議大夫馮瓚材力當世罕有真竒士也嘗欲大用之普心忌瓚因蜀平遂出瓚為梓州潛遣親信為瓚私奴伺察其過間一歳奴遂亡歸擊登聞鼓訴瓚及監軍綾錦副使李美通判殿中侍御史李檝等為姦利事美檝未見上急召瓚等赴闕面詰之下御史鞫實而奴辭多誣普復遣人至潼關閲瓚等囊裝得金帶及他珍玩之物皆封題以賂劉嶅嶅時在皇弟開封尹光義幕府嶅未見瓚等乃皆伏辜獄具普白上言瓚等法當死上欲貸之普執不可上不獲己庚戌詔並削名籍瓚流沙門島美海門島嶅免所居官李檝者嘗與王徳裔佐王饒幕府徳裔未見上以孝明皇后故識之徳裔輕率而檝謹厚上薄徳裔而厚檝至是檝特免配流未幾復御史劉嶅附見賈琰傳云嘗事太宗藩府至户部郎中天禧中録其孫從簡為三班奉職不知當此時為開封府何官也真宗實録天禧四年四月載嶅母張表言嶅嘗為太宗府佐淪没至今三十年子孫絶無禄食者上憫之故命從簡以官然亦不記嶅官為何等也建隆三年九月丁丑以開封府判官刑部員外即劉嶅為工部即中充職然則嶅在藩府實為判官也新録又稱劉嶅等已從别𠡠處分恐瓚金帶等不獨賂嶅一人也大抵新舊録載此事亦若有所避忌故不甚詳當細考之辛亥幸玉津園宴射壬子衡州大火焚公廨倉庫居民廬舍九百區甲寅詔以夏麥既登秋稼復稔令州縣長吏勸民謹儲蓄戒佚遊以備凶荒王偁東都事略詔曰豐年之詠播於頌聲廣蓄之訓垂於載籍今三時不害百姓小康田里無愁歎之聲壠畆有遺滯之穗州縣長吏等職司牧飬義當勸率俾及嵗穰各務儲積或值凶歉不至匱乏古者倉廪實禮節興所宜禁民蒱博勿致㳺惰戒其崇儉免於糜榖申嚴條教稱朕意焉乙卯上御講武殿親録繫囚多所原減河决滑州壊靈河大堤詔殿前都指揮使韓重贇馬歩軍都頭王廷乂等督士卒丁夫數萬人治之所漲泛民田悉蠲其秋租至十月堤成水復故道廷乂景之子也閏八月甲子以灌口鎮為永康軍王全斌言破賊帥吕翰克雅州翰走黎州為其下所殺棄尸水中新舊録皆無之本紀載此事於丙寅後乙亥前丙寅初五日乙亥十四日也不知此事的在何日按實録是月乙丑以酒坊使扈繼能權知雅州乙丑初三日也或者朝廷因全斌奏克雅州始命扈繼能故移此事載於乙丑前更須考詳初蜀置靜南軍使扼卭崍百丈曹光實父子繼居其任光實後遷永平捕盗逰奕使有夷人張忠樂者常群行攻刼且憾光實嘗殺其徒黨乗蜀之亡夜率衆數千環光實所居鼓噪並進光實負其母揮戈突圍以出賊衆辟易不敢近光實舉家三百餘口賊殺之無噍類又發其父塜壊棺槨光實詣全斌訴其事且圖雅州地形要害及用兵攻取之計請官軍先下之全斌壯其勇敢遂令為大軍鄉導果克其城獲忠樂而甘心焉全斌乃署光實為義軍都指揮使光實又以所部兵盡平黎州殘冦全斌令光實權知黎州兼黎雅二州都廵檢使安集勞来蠻夷懐之乙丑曹州言河水匯入南華縣壊民廬舍丙寅詔吏民先䧟蜀踰十五年者除墳塋外其田宅不得理訴己巳澶州言河水匯入衛南縣界民登邱阜以避之庚午索殿前諸軍亡頼者得十數人悉黥配義豐監癸酉命殿前侍衞將校大閱戎事於軍中五代以来常檢視見墾田以定歳租吏縁為姦稅不均適由是百姓失業田多荒萊上惻然憫之乙亥下詔禁止許民闢土州縣不得檢括止以見佃為額王偁東都事略詔曰五代以来兵亂相繼國用不足庸調繁興朕歴試艱難周知疾苦省嗇用度未嘗加賦優䘏灾沴率從蠲復所在長吏明加告諭自今百姓有能植桑棗墾闢荒田者只輸舊租癸未鄆州言黄河水入界乙酉淄州刺史李處耘卒上特為輟一日朝贈宣徳節度使遣中使護喪事賜塟地於洛陽偏橋已丑幸開封尹北園遂射於後苑以棣州團練使何繼筠為本州防禦使唐主遣使來貢助修乾元殿本紀及新録皆無之獨舊録於己丑日載此詔殿前侍衛諸軍及邉防監䕶使臣不得選中軍驍勇者自為牙隊草澤盧誼誼未見言西川官已不拘選限注授有懐𠡠不赴僥倖近地員闕者請罰之詔復與一月限違者削官賜誼同學究出身是月詔求亡書凡吏民有以書籍来獻者令史館視其篇目館中所無則收之獻書人送學士院試問吏理堪任職官具以名聞是嵗三禮渉弼三𫝊彭榦學究朱載皆應詔獻書總千二百二十八巻命分置書府賜弼等科名此據㑹要王全斌等械送孫進吳壊等二十七人至京師上親詰其叛亂之狀皆具服九月壬辰朔戮諸門外進尤凶恣遂族之初西川戌卒或亡命在賊黨中有請按誅其妻子上以語樞宻使李崇矩崇矩曰彼叛亡固當孥戮然按其籍死者幾萬餘人上曰朕慮其間有被賊驅脅非本心者乃盡釋弗誅庚子重陽宴長春殿甲辰占城國遣使貢馴象乙巳幸教船池遂幸玉津園觀衛士騎射丙午詔吳越王俶復㑹稽縣五户奉禹冢禁樵採春秋祠以太牢乙卯命刑部員外即和峴改築南郊壇距京城九里許尋復止之丙辰左衛大將軍權㸃檢侍衛歩軍司事贈太保寜國節度使謚恭僖杜審瓊卒丁巳以龍㨗左右廂都指揮使馬邑黨進權侍衛歩軍司事先是禁軍校自都虞候以上悉以所掌卒伍之數細書於所執之梃謂之杖記如笏記焉進本出外裔不識文字上一日問進兵籍幾何進不能對舉梃曰盡在是矣上笑謂其忠實益厚之進每擐甲胄則髭髯皆磔𥪡目光如電視之若神人普州言兎食秋稼殆盡庚申詔曰朝廷比設賔佐兼置掾屬同參郡政務守詔條豈可使紀綱之僕干與公務甞申約束著于甲令近者武寧節度使髙繼冲元從軍將髙從志輙紊經制凟我憲度果以賄敗俾從竄逐諸藩侯州牧等其謹守前詔勿自貽悔冬十月辛酉朔詔太常寺自今大朝㑹復用二舞先是晉天福末中原多故禮樂之器浸以淪廢上始命判太常寺和峴講求修復之别造宫懸三十六虡設於庭登歌兩架設於殿上又置皷吹十二案及舞人所執旌纛干戚籥翟等與其服皆如舊制云癸亥詔歴代帝王陵廟皆給守户致祭禁樵採諸州長吏縣令佐常檢察之初興州刺史王晉卿為漢州刺史時冦盗充斥晉卿嚴武備設方略擒捕翦滅靡有遺漏由是劇賊無敢窺其境者然以黷貨聞上惜其才不問秩滿歸闕移疾求散官乙丑授左監門衛將軍奉朝請晉卿貢重錦十匹白金十兩稱謝上欲以廉節風厲之詔却不受晉卿河朔人也己巳詔諸州長吏告諭蜀邑令尉禁耆長節級不得因徴科及廵警煩擾里民規求財物其鎮將亦不得以廵察鹽麴為名輙擾民户壬申南郊齋宫壊詔奪權判三司趙玭度支判官侯陟俸各一月坐不以時完葺也太常寺掌事吏並罰金玭本𫝊云坐損壊軍食失於檢視奪一季俸乃去年事也齋宫壊本𫝊不書今從新錄即以玭為三司使則誤也今從本𫝊及百官表丙子改閬州保寧軍為安得軍詔偽蜀時邉郡守將遣牙校齎信幣入黔南井院及思費播夷獠南辰錦等州率用私覿以邀厚報頗聞夷獠甚苦其事自今諸州當遣使者勿得受其獻先是上以雅樂聲髙近於哀思命判太常寺和峴討論其理峴上疏曰十二月聲含在寂黙古聖設法演而出之先立尺寸作為律呂三分損益上下相生取合其音謂之形器但以尺寸長短非書可𫝊故累秬黍求其凖的後代試之或不符合臣謂西京銅望臬可校古法即今司天臺影表上石尺是也取王朴所定尺校之短於石尺四分樂聲之髙盖由於此夫影表能測天地律管所冝凖繩上乃令依古法别造新尺并黄鍾九寸之管使工人校其聲果下於朴所定管一律又内出上黨羊頭山秬黍累尺校律亦相契合復下尚書省集議衆皆僉同遂重造十二律管以取聲由是雅樂音始和暢十一月癸巳日南至上御乾元殿受朝畢常服御大明殿羣臣上夀初用雅樂登歌及文明武功二舞酒五行而罷自平湖南諸州皆置通判既非副貳又非屬官故多與長吏忿争常曰我監州也朝廷使我来監汝長吏舉動必為所制或者言其太甚冝稍抑損之乙未詔諸道州通判無得怙權狥私須與長吏連署文移方許行下㑹要云時以偽官初録用慮未悉事故有是命本紀詔語亦與㑹要略同惟新録不然今從新録仍以歐陽修歸田録附益之彰國留後王繼勲自罷兵柄常怏怏専以臠割奴婢為樂前後被害者甚衆一日天雨墻壊羣奴突出守國門訴寃上大駭命中使就詰之盡得繼勲所為不法事丁酉詔削官爵勒歸私第仍令甲士守之俄又配流登州未至改右監門衛率府副率戊戌詔荆湖西蜀官為郡國長吏者初奉條詔未能詳悉必資僚屬以佐其治事無大小冝與通判或判官録事同裁處之上以翰林學士禮部尚書竇儀在滁州時弗與親吏絹事在顯徳三年三月每嘉其有執守屢對大臣言欲用為相趙普忌儀剛直遽引薛居正及吕餘慶參知政事陶榖趙逢髙錫等又相黨附共排儀上意中輟癸丑儀卒上憫然謂左右曰朕薄祜天何奪我竇儀之速也優詔贈右僕射上嘗納涼後苑召儀草制儀至苑門見上岸幘跣足而坐因却立不肯進閤門使以奏上自視㣲笑遽索冠帶而後召入未及宣詔意儀亟言曰陛下創業垂統宜以禮示天下臣雖不才不足以動聖顧第恐豪傑聞而解體也上歛容謝之自是對近臣未嘗不冠帶或以此事為陶榖誤也榖必不辦此丁謂談録亦稱竇儀詔重寛鹽麴法官鹽闌入至百斤煑鹻至五十斤主吏販易及闌入百斤以上乃死蠶鹽入城市及商人闌入至三百斤以上加役流杖徒之等亦從釐減私造酒麴至城郭五十斤以上鄉閭一百斤以上私酒入禁地二石三石以上至有官署處四石五石以上者乃死法益輕而犯者鮮矣十二月庚辰斬妖人張龍兒等二十四人龍兒有幻術與衛士楊宻剛又遇李丕聶贇劉暉馬韜承㫖戴章百姓王裕等共圖不軌事事覺伏誅龍兒及宻丕贇皆夷族上於後苑親閱殿前諸武藝不中選者三百餘人悉授外職此據㑹要是嵗于闐國王李聖天遣其子徳從来貢方物蓬州請以租絲配民織綾給其工直詔不許此據本志丁徳裕與西川兵馬都監潞城張延通同帥師擒賊都統康祚磔於市康延澤既城普州王可僚復合數州兵來攻延澤擊走之追奔至合州全師雄病死金堂其黨推謝行本為主羅七君為佐國令公羅七君與宋懐威唐陶鼈等共據銅山之險為寨延澤旋破謝行本㧞銅山擒羅七君徳裕及王全斌等分兵招撫賊衆悉平此等事本紀及新舊録並不詳不知的是何時今并附之嵗末克雅州在閏八月王全斌傳載全師雄死皆在克雅州後其時盖可隠度也獨康祚被擒劉澤王可僚敗走按丁徳裕及康延澤傳皆無蹤跡可尋其日月耳延澤𫝊乃稱王全斌已誅成都降卒延澤俄出兵敗劉澤王可僚盖誤也師雄既保灌口劉澤始與吕翰合勢逐普州刺史劉楚信而延澤追王可僚亦至合州此必在延澤為普州刺史之後非作西川兵馬都監之前也不然延澤才出成都安得便過普合間耶北漢主遣侍衛都虞候劉繼欽等復取遼州此據九國志及十國紀年他書皆無之乾徳二年正月克遼州乃不見新除守將或果再失之乾徳六年三月乙未始書以齊州團練使李守節知遼州南漢西北面招討使吳懐恩為部下所殺先是南漢主命懐恩治戰艦於桂州懐恩督役嚴材有良窳不等及制度䟽略者輙行捶撻執役者皆怨之於是作龍舟成懐恩躬自臨視以緜冪其手徧捫鈎楯匠區彦希在側因運斤斫其首墮船中左右驚散後數日乃擒彦希斬於市懐恩為將數有功及被害國人愈恐南漢主命潘崇徹代其任懐恩初見天福八年崇徹見廣順二年皆宦者也九國志世家言懐恩被殺在大寳三年大寳三年顯徳六年也據懐恩𫝊稱王師取郴連後懐恩乃死又潘崇徹𫝊云崇徹代懐恩嵗餘罷兵柄而世家載崇徹之罷在大寳十一年春則懐恩被殺當附此年末也王師取郴州後六年乃取連州今并言郴連盖誤耳潘崇徹不知以何官代懐恩當考司馬光朔記載此事於建隆元年四月且云懐恩被害乃是月庚辰龍舟成之日也盖用十國紀年今不取
