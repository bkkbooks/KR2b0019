body:
  text: 續資治通鑑長編卷四百八十四宋李燾撰哲宗元祐八年五月丁丑朔戊寅監察御史黄慶基言朝廷仁愛斯民捄患恤災使無失所之歎者在加意於賑濟故比歳淮甸旱倉廪不足以給民至以上供綱運米賙之前年浙西水本路歲計不足至使江西湖北運米以濟之所費無慮數百萬然而不惜重費以濟一時不若修舉良法以垂恵於萬世蓋義倉者良法也始自隋長孫平建議曰古者三年耕有一年之積九年作有三年之儲雖有水旱人無菜色皆由勸導有方蓄積先備故歴世行之以為利焉元豐間先帝復行其法以為隋唐取於民太重慮民不堪其求於是納苗米一石者輸義倉米五升可謂至薄矣夫樂歲粒米狼戾雖多取之不為虐又况納苗米一石止輸五升固非重斂也蓄積稍豐或有水旱則所至倉廪自足以濟民矣臣去歲道過太平州見饑民甚衆而無流亡溝壑者蓋猶有當目義倉所積之米足以賑濟故也又聞蘇湖之民雖蒙朝廷運米以濟之然饑者朝不及夕往往不得霑上之恵而殍踣者多矣乃知義倉誠天下之良法今其條制具在望自今歳復行詔令户部詳度知越州蔡卞知潤州卞及服古並政目二日事知廬州朱服知夀州服知廬州在六年八月十六日秘書少監王古兼國子祭酒己卯新除吏部尚書李清臣為資政殿學士知真定府以權給事中姚勔論清臣不當召用故也政目無此六月十八日又召庚辰承議郎簽書潁州節度判官事趙令畤為光祿寺丞政目五月四日事黄慶基云在十五日辛巳王崇極為引進使政目初五日事當考癸未蘇軾同吕希哲呉安詩豐稷趙彦若范祖禹顧臨上言臣等猥以空疎備員講讀聖明天縱學問日新臣等才有限而道無窮心欲言而口不逮以此自愧莫知所為竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多𫝊於古人若已經效於世間不必皆從於己出伏見唐宰相陸贄才本王佐學為帝師論深切於事情言不離於道徳智如子房而文則過辯如賈誼而術不疎上以格君心之非下以通天下之志但其不幸仕不遇時徳宗以苛刻為能而贄諫之以忠厚徳宗以猜疑為術而贄勸之以推誠徳宗好用兵而贄以消兵為先德宗好聚財而贄以散財為急至於用人聽言之法治邊馭將之方罪己以收人心改過以應天道去小人以除民患惜名器以待有功如此之流未易悉數可謂進苦口之藥石鍼害身之膏肓使徳宗盡用其言則貞觀可得而復臣等每退自西閣即私相告言以陛下聖明必喜贄議論但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文為之太息魏相條晁董之對則孝宣以致中興若陛下能自得師莫若近取諸贄夫六經三史諸子百家非無可觀皆足為治但聖言幽逺末學支離譬如山海之崇深難以一二而推擇如贄之論開卷了然聚古今之精英實治亂之龜鑑臣等欲取其奏議稍加校正繕冩進呈願陛下置之坐隅如見贄面反覆熟讀如與贄言必能發聖性之高明成治功於歲月臣等不勝區區之意甲申尚書左丞梁燾表稱疾病乞守藩詔不允燾再請補外詔斷來章及與寛假將治御集在十六日詔南郊合祭依元祐七年例政目八日事合取四月丁巳詔詳考之今姑兩存左宣徳郎蔡肇校勘黄本明年六月十三日出御史中丞李之純復中大夫國子司業趙挺之為京東路轉運副使十五日黄慶基云云司封員外郎丁騭知宿州七年十月二十八日為封外駕部員外郎胡宗炎提㸃京西刑獄比部郎中孫亞夫為兩浙轉運副使自蔡肇至孫亞夫皆從政目惟亞夫實錄有之乙酉翰林學士兼侍講范祖禹言近令講讀官同將漢唐正史内可以進讀事跡進呈按講筵故事講官講經讀官讀史若令同進讀漢唐史書即是講官兼讀官之職乞専令讀官鈔節進讀從之丁亥詔禮官罷議合祭政目十一日事合取四月丁巳詔詳考之今姑兩存罷廣南東西路鑄折二錢實錄十一日事政目乃無此己丑錄京畿囚政目十一日事辛卯監察御史董敦逸黄慶基皆罷敦逸為荆湖北路轉運判官慶基為福建路轉運判官坐言尚書右丞蘇轍禮部尚書蘇軾不當也新錄既於十五日載二人罷御史除運判且略載吕大防蘇轍對上語矣十六日又詳載之顯是重複今削去略語但存二人除目政目二人除運判在初四日壬辰三省同進呈董敦逸四狀言蘇轍黄慶基三狀言蘇軾吕大防奏曰敦逸言轍應三省同簽文字皆以為轍之罪慶基言軾曰法者天下之平也雖天子之尊不敢以喜怒而輕重况於人臣乎為人臣者茍欲廢法以私恣喜怒則上竊國柄下貽民患其禍非小也按禮部尚書蘇軾天資凶險不顧義理言偽而辨行僻而堅故名足以惑衆智足以飾非所謂小人之雄而君子之賊者也陛下擢之於罪廢之中寘之於侍從之列出守大藩固宜奉法循理而乃専以喜怒之私輕廢朝廷之制昨知潁州日違法令都㕔置簿拘收賞錢不依條例妄行費用及失入丁真配罪見係京西路提刑司按發取勘干繫官吏軾已移楊州又入為兵部尚書矣乃敢驀越申陳致朝廷徇其所請將監司按𤼵公事指揮不得取勘致令遷延該赦考軾之意特欲姑息小人蓋庇舊吏以沮壊法令而已軾前知杭州日有百姓顔益顔章以受納官不肯領絹率衆人論訴非有大過也軾不遵法令判令刺配雖嘗自劾䝉朝廷放罪而軾之所喜雖監同按發公事乃妄陳横議令不得取勘軾之所怒雖所犯止於杖罪乃判令刺配此何道也書曰惟辟作福惟辟作威臣有作福作威害于而家凶于而國蓋言威福之柄惟人君可以専之也軾為人臣乃欲恣喜怒而出入人罪原其不遵法令之意蓋有輕蔑朝廷之心其不忠之罪大矣軾自進用以來援引黨與分布權要附麗者力與薦揚違迕者公行排斥昨薦王鞏既除宗正寺丞又通判楊州竟以不持行檢敗近者薦林豫自東排岸不問資序遂差知通利軍前者除張耒為著作郎六年十二月二十四日近者除晁補之為著作佐郎七年十月二十六日皆軾力為援引遂至於此至如秦觀亦軾之門人也素號獧薄昨除秘書省正字既用言者罷矣猶不失為校對黄本書籍是以奔競之士趨走其門者如市惟知有軾而不知有朝廷也為人臣而招權植黨至於如此其患豈小哉近者高麗人使乞賜書籍此乃祖宗朝故事且屢嘗賜書與之矣軾乃拒違詔㫖極言不可及都省批送禮部令吏人上簿固非重責也軾乃蓋庇吏人力陳強辨期必勝而後止夫都省總領六曹自有上下之分豈有論事不當尚敢力爭原其凌轢都省之意乃有輕視朝廷之心其不忠之罪又可見矣軾在先朝恣為歌詩謗訕朝政有司推治實迹具存衆皆以為罪在必死獨先帝憐之止從輕典送黄州安置先帝之於軾可謂有再造之恩矣雖天地父母無以過之軾不能感戴厚恩而乃内懐怨望二聖陛下臨御之初以軾為中書舍人軾因行制誥公然指斥先帝時事略無忌憚𫝊播四方士大夫讀之有識者為之痛心有志者為之扼腕考軾之意特欲刺譏先帝以攄平昔之憤爾軾行李之純除河北都轉運使誥云乃者役錢貸息之敝民兵馬政之勞萃於北方又云河溢為災老㓜奔走流離道路十年於此矣嗚呼其孰能為朕勞來安集使復其舊乎夫宣王承厲王之後萬民離散不安其居而能勞來安集之故見於鴻鴈之詩先帝時北方安得有老㓜奔走流離道路之事謂縁役錢貸息民兵馬政以致天災必待陛下然後能遣使以勞來安集是以先帝方何代乎乃以厲王之亂相擬也軾行蘇頌除刑部尚書誥云乃者法病於煩官失其守盜賊多有獄市紛然夫先帝明慎用刑哀矜庶獄始復大理寺刑部詳定及三省㸃檢獄案之制安得法病於煩官失其守至於盜賊多有獄市紛然惟漢武帝時暴征逺戍於是盜賊競起至遣直指之使以督捕之此乃可謂紛擾先帝時何嘗聞有此也軾為此言是以先帝方何代乎乃以武帝之暴相擬也軾行劉誼知韶州誥云爾昔為使者親見民病盡言而不諱阨窮而不憫安知有今日之報乎夫劉誼得罪於先帝自以職在奉行法度有所不至當公論之而乃張皇上書用此罷江西提舉安得為盡言乎至於安知有今日之報此語尤不忍聞陛下奉承宗廟當有以顯揚先帝之鴻業休徳豈欲報先帝得罪之人乎軾行唐義問除河北轉運使誥云朕修賦役之法黜聚斂之吏去薄從忠務以養民夫先帝立法豈不欲養民邪先帝用人豈不欲去刻薄而從忠厚邪今以為務以養民是指先帝之不能養民也今以為黜聚斂之吏是指先帝用聚斂之吏也軾行貶吕恵卿誥云茍有蠧國以害民率皆攘臂而稱首夫先帝立法乃欲與天下同利豈有先帝之聖神英睿冠絶百王如此而乃肯從蠧國害民之謀乎軾所行制誥皆在舍人院願陛下試取而觀之蓋有聲述不盡者臣請以常人論之對人之子詈人之父猶且義不勝誅况軾職代王言而實詆先帝按之以法當如何哉陛下奉承先帝之宗廟歲時薦享未嘗不懐怵惕霜露之感今乃使譏刺先帝之人列於侍從寘在朝廷臣恐先帝之威靈在天亦當垂憤怒也使軾當今日得保首領已為幸矣今乃驟遷之亟用之唯恐不及臣恐天下之人亦有以議陛下也昔楊惲以田彼南山蕪穢不治之語譏刺漢朝宣帝尚戮於市竊以譏刺朝廷其罪小至於譏刺宗廟則其惡不可容矣陛下以軾為有大功而不敢治則軾自擢用以來未聞有毫髪之功也以軾為有厚徳而不可貶則軾之行已貪汚積惡靡所不有至如結託常州宜興知縣李去盈強買姓曹人抵當田産致其人上下論訴進狀者凡八年方與斷還其穢惡之迹則未敢上瀆聖聰不可謂有徳者也自軾進用人望其改過自新而乃恣為喜怒自擅威福援引朋黨紊亂紀綱公行制誥指斥先朝原其不敬宗廟之意乃有輕視陛下之心然而累年於兹人不敢言者以轍身為執政朋黨親戚布在要路權勢熏灼内外能立致人於禍患故畏憚而不敢言爾臣雖至愚非不知言發則禍至然而義激於中不能自止故力為陛下言之望賜英斷上以釋先帝之謗議次以正今日之典刑仍令中書省削去軾所行誥辭言涉刺譏者以示人臣大不恭之戒又言曰治天下者必先於正朝廷正朝廷必先於破朋黨自非明足以察微公足以兼聽睿足以獨斷者未有不為姦邪所蔽也當有唐之世王叔文韋執誼柳宗元之徒結為朋黨瀆亂紀綱一時名士莫不歸之幾壊天下賴憲宗剛明立行斥逐故小人不得以行其志文宗時牛僧孺李宗閔楊虞卿之徒更相傅㑹上則蔽人君之耳目下則擅朝廷之權柄文宗至臨朝興歎然終不能去也觀憲宗之所以治文宗之所以亂可為治世之鑒戒矣不謂今日親見此敝臣近言禮部尚書蘇軾已歴疏其所為矣竊見門下侍郎蘇轍懐邪徇私援引黨與怙勢曲法務與其兄相為肘腋以紊亂朝政軾則外許人差遣而公薦之轍則内為之應而引用之附㑹者立與進用違忤者公行排斥上不畏國法下不顧公義臣請疏其顯然之迹按軾與吕陶交結至厚昨者薦陶自代遂除為起居舍人近日中書舍人陳軒縁館伴高麗人使請賜書籍事軾惡軒之不附己也遂公奏於朝力加排詆意欲使軒補外乃遷陶為中書舍人陶遷中書舍人在後六月八日夫詞掖近臣乃陛下之侍從軾猶敢公然排斥不附己之人而陰欲進其黨與其擅威福之罪大矣軾知潁州日趙令畤為本州簽判軾與之往還甚宻每赴趙令畤筵㑹則坐於堂上入於卧内惟兩分而已其家婦女列侍左右士論極以為醜軾乃公薦於朝稱其才美訪聞蘇轍見議除令畤差遣其肆欺罔之罪大矣五月四日令畤光禄丞國子司業趙挺之為御史日屢言軾不公事迹軾居禮部統轄國子監日務攟摭太學中事凡所判狀多不依學制意欲沮抑挺之使之補外訪聞蘇轍見議除挺之為轉運副使以同列商議未合故未敢進呈其挾私怨而忘公義乃至於此太府寺丞文勛以篆字游於軾之門初不以公正吏才稱也軾既援引轍遂除為福建路轉運判官在正月十九日夫監司按察一路寄委不輕豈可以非才而授其職徇私情而棄國法乃至於此馮如晦為䕫州路轉運使日按𤼵公事不當見係御史臺推治未結絶間轍以川人遂除館職差知梓州近斷敕方下如晦雖以法奪官而差遣與職竟不動也可謂循法用人乎其恣横乃至於此趙卨帥鄜延日欲棄熙河而不敢獻議乃以書抵大臣是時轍為中丞得其書即為論列賴諫官劉唐老疏其交通誣罔之迹謀遂不行陛下雖不加罪而亦略無愧恥欺罔乃至於此前日臣嘗言執政不務協和凡欲行一事除一差遣商量累日多不能合甚者幾於忿爭極傷國體蓋轍欲進其黨與故衆論不肯相從爾士大夫不顧節義而競相結託以希進身者由大臣倡率之也臣愚不知大臣之交結黨與其意何所為也方今侍從之間為其黨者十有四五矣省寺之間為其黨者十有六七矣館閣之間為其黨者十有八九矣其餘陰相傅㑹者不可一二言也軾嘗自言陛下稱其兄弟孤立以為必不疑也是以敢交結黨與而無所忌憚又其黨言陛下許軾大用以為必見信也是以士大夫莫不爭趨其門以圖進取上下唱和合為一黨牢不可破浸淫日乆臣恐其權勢愈甚朋黨愈多則為國家之患良未已也陛下可不深慮耶且人臣事君惟有忠爾一言涉於欺罔則終身不可以誠信委之按轍薦王鞏累數百言陛下真以為可用也既而淮南提㸃刑獄鍾浚根究王鞏在任日穢惡狼籍實迹具存遂謫為監當而轍亦怡然自若略不引咎程之邵轍之表弟也昨任䕫州路轉運判官按知雲安軍孫拱事拱與之邵互論見係推治未見曲直乃除之邵為都大提舉茶事六年十二月六日除之邵且事在有司當原情定罪豈可以親戚之故乃驟移差遣更獲美遷且為人臣者不當有己豈有兄之所喜則立加進用兄之所怒則隂為排斥忘盡忠體國之誠而用招權徇私之志不加斥免何以控御臣下至如軾之罪惡其最大而不可容者乃忘先帝保全之恩忽陛下擢用之意因行制誥公肆刺譏以法論之指斥乗輿罪在不赦而况指斥宗廟乎雖陛下仁聖欲示兼容然而軾之情理不順其如國法何其如公議何此固人神之所共惡也揚雄曰天地無不容也不容於天地者其帷不仁不義乎陛下試考軾轍所為可謂不仁不義者矣是安可容邪孔子曰惡居下流而訕上者蓋以其輕肆語言不知忌憚則無所不為故可惡也陛下試觀軾轍所為稍失控御則何所不至蓋既敢訕謗則是懐無上之心矣自古奸臣未見此比惟其權勢熏灼内外故士大夫各懐顧望不敢盡言於是吕大防蘇轍等奏曰慶基言軾所撰李之純等六人誥文涉譏毁先帝其間陸師閔誥一道係范百禄詞非軾所撰臣竊觀先帝聖意本欲富國彊兵以鞭撻四方而一時羣臣將順太過故事或失當及太皇太后與皇帝臨御因民所欲隨事救改蓋事理然耳昔漢武帝好用兵重斂傷民昭帝嗣位博采衆議多行寢罷明帝尚察屢興慘獄章帝改之以寛厚並當時天下恱服未有以為謗毁先帝者也至於本朝真宗即位弛逋欠以厚民財仁宗即位罷修宮觀以息民力凡此皆因時施宜以補助先朝闕政亦未聞當時士大夫有以為毁謗先朝者也近日元祐以來言事官有所彈擊多以毁謗先帝為詞非唯中傷士人兼欲揺動朝廷意極不善若不禁止久逺不便蘇轍又奏曰臣昨日取兄軾所撰吕恵卿誥觀之其言及先帝者有曰始以帝堯之仁姑試伯鯀終焉孔子之聖不信宰予兄軾亦豈是譏毁先帝者耶臣聞先帝末年亦自深悔己行之事但未暇改耳元祐初改正追述先帝美意而已太皇太后曰先帝追悔往事至於泣下當時大臣數人其間極有不善不肯諌止吕大防曰聞永樂敗後先帝嘗曰兩府大臣略無一人能相勸諫然則一時過舉非先帝本意明矣太皇太后曰此事皇帝宜深知大防曰皇帝聖明必能照察此事於是得㫖敦逸慶基並與知軍差遣大防轍等云云新錄並㨿龍川畧志但不載與二人知軍差遣今並增入敦逸慶基除運判政目於初四日書其事甲午户部言左班殿直趙叔嶢自陳係袒免親為父亡解官持服乞比附宗室換官體例支給請受按宗室小使臣丁憂並不許解官所以不罷俸給今若依外官丁憂例更不支給俸錢慮或失所欲乞應宗室任小使臣丁憂父祖俱亡者袒免親許給俸非袒免親許給半俸從之權户部尚書錢勰為龍圖閣直學士知開封府勰權户部當檢寳文閣待制權知開封府韓宗道為户部侍郎六年十二月以戸侍為寳制知開封端明殿學士鄧溫伯為兵部尚書政目十八日實錄在二十三日龍圖閣待制知陜州王震知永興軍政目十八日實録無集賢院學士知河中府李周知陜州政目五月十八日工部員外郎孫朴為司封員外郎政目五月十八日四月初二日工外乙未尚書左丞梁燾奏乞便郡養疾詔不允丙申左朝請郎新荆湖北路轉運判官董敦逸知臨江軍左朝請郎新福建路轉運判官黄慶基知南康軍敦逸慶基既有㫖與知軍差遣而御史中丞李之純及侍御史楊畏監察御史來之邵亦言二人誣陷忠良朝廷容貸止令出使臣恐後人觀望得任私意敢肆狂誣故遽責之據蘇轍龍川畧志進呈二人疏日已有㫖與知軍差遣不縁御史章也李之純等時亦有言耳今據略志稍加刪修紹聖元年四月乙巳當參考戊戌校書郎陳師錫為工部員外郎集賢校理著作佐郎時彦為兵部員外郎集賢校理政目二十二日實錄無朝奉郎常安民為開封府推官政目二十八日三年五月八日安民自太博為丞四年二月二日為江西運判太僕寺丞劉當時為河北轉運判官政目二十二日己亥皇弟武成節度使祁國公偲加開府儀同三司政目在二十六日黄慶基董敦逸既責蘇軾以劄子自辨曰臣自少年從仕以來以剛褊疾惡盡言孤立為累朝人主所知然亦以此見疾於羣小其來久矣自熙寧元豐間為李定舒亶輩所讒及元祐以來朱光庭趙挺之賈易之流皆以誹謗之罪誣臣前後相𫝊専用此術朝廷上下所共明知然小人非此無以深入臣罪故其訃須至出此今者又聞臺官黄慶基復祖述李定朱光庭賈易等舊說亦以此誣臣并言臣有妄用潁州官錢失入丁真死罪及強買姓曹人田等雖知朝廷已察其姦罷黜其人矣然其間有關臣子之大節者於義不可不辨臣先任中書舍人日適值朝廷竄逐大姦數人所行誥詞皆是元降詞頭所述罪狀非臣私意所敢增損内吕恵卿自前執政責授散官安置誅罰至重當時䝉朝㫖節錄臺諫所言恵卿罪惡降下既是詞頭所有則臣安敢減落然臣子之意以為事涉先朝不無所忌故特於誥詞内分別解說令天下曉然知是恵卿之姦而非先朝盛徳之累至於竄逐之意則已見於先朝其畧曰先皇帝求賢若不及從善如轉圜始以帝堯之仁姑試伯鯀終焉孔子之聖不信宰予發其宿姦謫之輔郡尚疑改過稍畀重權復陳罔上之言繼有碭山之貶反覆教戒惡心不悛躁輕矯誣徳音猶在臣之愚意以為古今如鯀為堯之大臣而不害堯之仁宰予為孔子之高弟而不害孔子之聖又况再加貶黜深惡其人皆先朝本意則臣區區之忠蓋自謂無負矣今慶基乃反指為誹謗指斥不亦矯誣之甚乎其餘所言李之純蘇頌劉誼唐義問等誥詞皆是慶基文致附㑹以成臣罪只如其間有勞來安集四字便云是厲王之亂若一一似此羅織人言則天下之人更不敢開口動筆矣孔子作孝經曰如臨深淵如履薄冰此幽王之詩也不知孔子誹謗指斥何人乎此風萌於朱光庭盛於趙挺之而極於賈易今慶基復宗師之臣恐陰中之害漸不可長非獨為臣而言也又慶基所言臣行陸師閔誥詞云侵漁百端怨讟四作亦謂之謗訕指斥此詞元不是臣行中書案底必自有主名可以覆驗顯是當時掌誥之臣凡有竄逐之人皆似此罪狀其事非獨臣也所謂侵漁怨讟者意亦指言師閔而已何名為謗訕指斥乎慶基以他人之詞移為臣罪其欺罔類皆如此又慶基所言臣妄用潁州官錢此事見䝉尚書省勘㑹次然所用皆是法外支賞令人告捕強惡賊人及逐急將還前知州任内公使庫所少貧下行人錢物情理如此皆可覆驗又慶基所言臣強買常州宜興縣姓曹人田地八年州縣方與斷還此事元係臣任團練副使日罪廢之中託親戚投狀依條買得姓曹人一契田地後來姓曹人却來臣處昏賴爭奪臣即時牒本路轉運司令依公盡理根勘仍便具狀申尚書省後來轉運司差官勘得姓曹人招服非理昏賴依法決訖其田依舊合是臣為主牒臣照會臣愍見小人無知意在得財臣既備位侍從不欲與之計較曲直故於招服斷遣之後却許姓曹人將元價抽收仍亦申尚書省及牒本路施行今慶基乃言是本路斷遣本人顯是誣罔今來公案見在户部可以取索案驗又慶基所言臣在潁州失入丁真死罪此事已經刑部定奪不是失入却是提刑蔣之翰妄有按舉公案具在刑部臣竊料慶基所以誣臣者非一臣既不能盡知又今來朝廷已知其姦妄而罷黜其人臣不當一一辨論但人臣之義以名節為重須至上煩天聽也太皇太后令轍諭軾曰縁近來衆人正相攟拾且須省事軾乃具劄子稱謝曰天慈深厚如訓子孫委曲保全如愛支體感恩之涕不覺自零伏念臣才短數竒性疎少慮半生犯患垂老困讒非二聖之深知雖百死而何贖伏見東漢孔融才疎意廣負氣不屈是以遭路粹之寃西晉嵇康才多識寡好善闇人是以遇鍾㑹之禍當時為之扼腕千古為之涕流臣本無二子之長而兼有昔人之短若非陛下至公而行之以恕至仁而照之以眀察消長之往來辨利害於疑似則臣已下從二子游久矣豈復有今日哉謹當奉以周旋不敢失墜便須刻骨豈獨書紳庶全螻蟻之軀以報邱山之徳癸卯禮部尚書蘇軾言臣伏見元祐貢舉敕諸詩賦論題於子史書出如於經書出而不犯見試舉人所治之經者聽臣今相度欲乞詩賦題許於九經孝經論語子史并九經論語注中雜出更不避見試舉人所治之經但須於所給印紙題目下備錄上下全文并註疏不得漏落則本經與非本經舉人所記均一更無可避兼足以示朝廷待士之意本只以工拙為去取不以不全之文掩其所不知以為進退於忠厚之風不為無補詔依奏今來一次科場未得出制度題目龍圖閣直學士知成都府蔡京請便郡詔不允甲辰秘閣校理余中為著作佐郎政目二十八日二月十六日除秘閣校理侍御史楊畏言伏覩近降指揮令兩省各舉臺官兩員者風憲之任治忽所繫人主耳目所寄之地可謂重矣未聞令宰相屬官舉御史御史與宰執最為相關之地執政已不自差而使其屬舉之其異於自差無幾矣詔前降兩省舉臺官指揮更不施行王銍元祐八年補錄五月事附見月末當考六月戊申建武軍節度使駙馬都尉李瑋卒上奠哭之贈開府儀同三司贈開府政目十八日事今附此庚戌太妃門客兖彦章補假承務郎政目四日事明年三月七日當考陜西轉運使判官張景先陞為副使政目四日事來之邵云云在七月二日辛亥禮部言檢準元祐五年二月十六日𠡠勘㑹科場新兼詩賦慮諸路闕詩賦試官其通判内有可差之人亦許差充又元祐五年三月十九日禮部狀準條諸州應舉不滿百人轉運司預相度指近便州併試欲諸州應舉不滿一百五十人者權依上條併試從之甲寅起居郎兼權給事中姚勔起居舍人吕陶並為中書舍人五月十六日黄慶基言可考政目同秘書少監王古為起居郎政目初八日秘書丞吕希純為起居舍人政目初八日監察御史來之邵為殿中侍御史政目初八日知潤州集賢校理崔公度為秘書少監公度辭不至加直龍圖閣仍知潤州公度先以集校知潤州在六年閏八月六日政目初八日公度秘少實錄無之紹聖二年十一月六日乃以新除秘少知宣州按公度𫝊知潤州以起居郎召辭章再上七年正月二十六日復知潤州未滿歲除秘書少監辭如初除直龍圖閣仍知潤州召赴闕復辭紹聖二年再除秘書少監又力辭得知宣州據公度𫝊除直龍圖閣不見的月日今附此右朝奉郎司農少寺丞秦定為江南東路轉運判官政目初八日實錄在二十一日王筌沖照處士政目初八日書王筌沖照處士其事當考筌何人禮部尚書蘇軾乞知越州詔不允戊午中大夫守尚書左丞梁燾充資政殿學士同醴泉觀使先是燾以疾求罷有詔與在京宫觀使宰相奏以故事非宰相不除使遂置同使之名以寵之七月八日知潁昌梁燾罷政必有因縁而實錄但稱以疾新舊𫝊皆然邵伯溫作楊畏𫝊云畏寄聲章惇云以蘇吕勢逐劉摯梁燾則燾亦必被彈射也當考政目同觀使亦係十二日元祐六年正月馮京已除中太一宫使京亦未嘗為宰相也不知燾𫝊何以云然當考燾初以議邊事不合即屬疾求罷章累上皆遣内侍封還仍問所以必去之理并宻訪人材燾曰信任不篤言不見聽而詢人材之可用者非臣敢當也使者再至乃具手奏謂人材可大任者聖主當自知之但須識別邪正公天下之善惡使官家左右前後皆得正人則天下受福宗社有慶矣陛下必欲知可大用之人無過於圖任舊人中堅正純厚有人望者不牽左右好惡之言以移聖意天下幸甚既授資政殿學士同醴泉觀使又四上章求補外出知潁昌臨行遣内侍賜茶藥宣諭曰已用卿言復相范純仁矣出知潁昌在七月八日此據梁燾行狀刪修其信否當考梁燾行狀張舜民作公力陳疾自佚懼廢國事雖曲示優眷義非敢安章三入遣内侍封還公又力辭之先是公論邊事不決預以書箧衣囊寄置別舍翌日空府第遷觀音佛祠引去表再上詔不允仍斷來章賜以優告公意謂大臣議論多不得行何以補報決以得請為期章累拜不已上連遣近璫相繼至第封還劄子問所以必去之理及令宻訪人材公曰信任不篤言不見聽而詢問人材之可用者非臣敢當也使者再至即為手奏謂人材可大任者聖主當自知之但須識別邪正公天下之善惡使官家左右前後皆得正人則天下受福宗社有慶矣陛下必欲知可大用之人無過于圖任舊人中堅正純厚有人望者不牽左右好惡之言以移聖意天下幸甚而公請愈堅又明日宣仁諭宰相許解機政令與在京宫使故事非宰相不除使遂置同使之名以資政殿學士同醴泉觀使公辭特置使名恩禮優重官制以來未有前比臣不敢當願得便郡以就安養兩宫遣近臣宣諭曰官家不欲卿去方且大用公但感激恩遇而已尋復疏陳前所言力辭同醴泉觀使章四入改知潁昌府充京西北路安撫使以疾免謝辭出都之日上命中貴人賜茶藥宣諭已用卿言用舊人復相范純仁候知卿安即召矣手札賜吕大防曰見任執政官闕員稍多今欲先除右僕射一員若以見任人遞遷除授又慮中外人情不與必致議論紛紜今思之不若且於舊人中圖任欲除范純仁作右僕射不知如何或得穏當且先遣一御藥院官齎詔書召赴闕然後降麻大防奏進用大臣非臣所敢僭預如所宣示實允羣議己未遣勾當御藥院李倬齎詔書賜觀文殿大學士太中大夫知潁昌府范純仁令乗驛赴闕先是侍御史楊畏言外議以蘇頌初罷恐必用尚書右丞同知樞宻院事二人而已一則天資褊狹非有疎通濟務之材且徇已強愎未必無懐恩報怨之意一則器業節操材望之類一切未見可取只縁聨姻近戚而處本兵中外已籍籍不平况任宰相乎右丞鄭雍同知樞宻院韓忠彦於是聞將以純仁為右僕射畏又言治天下者賞罰號令而况宰相佐人君出賞罰號令以示至公哉純仁去歲帥太原府守邊無狀上下失備西賊乗之犯麟州蹂踐千里死者數萬人方罷帥降官名在謫籍而陛下遽命以為相是賞罰不正而功罪未判也以為功則罪籍未除以為罪則未應除召况為相哉陛下命相而賞罰未明何以昭示天下哉自是七疏皆不聽監察御史來之邵又言純仁師事程頤闇狠不才於國無補及純仁至畏又言純仁自潁昌府被召未入見而張蓋過内門為不恭太皇太后皆不聽此據王銍元祐八年補録增入銍又云太皇太后覺言者觀望吕大防蘇轍意屢攻罷宰相執政以純仁舊徳故召用待至國門始下制畏與之邵俱論純仁不當為宰相當時皆謂畏等陰受風㫖非公論也銍所云蓋與邵伯溫畧同須更考詳或曰畏與蘇軾轍俱蜀人前擊劉摯後擊蘇頌皆陰為轍地太皇太后覺畏私意故復自外召用純仁畏尋又言轍不可大用云此據邵伯溫辨誣畏為轍地恐未必然已見六年十月十八日并二十八日當與王銍所錄并考政目召范純仁係十二日或改己未十三日作是日戊午辛酉資政殿大學士右光禄大夫知揚州張璪卒贈右金紫光禄大夫賜絹五百疋謚簡翼此據王存墓誌新錄闕璪傳縁舊錄闕巻故也王銍補傳亦當別修政目於二十八日書贈璪金紫於七月十二日書賜絹五百疋璪墓誌王存作雜錄第一冊有之壬戌門下中書後省言準朝㫖編修在京通用條貫取到在京諸司條件修為一書除係海行一路一州一縣及省曹寺監庫務法皆析出關送所屬内一時指揮不可為永法者且合存留依舊外共修成勑令格式若干冊所有元祐三年十月終以前條貫已經刪修收藏者更不施行其十一月一日以後續降自為後𠡠及雖在上件月日以前若不經本省去取并已行關送者並合依舊施行仍乞隨𠡠令格式名冠以元祐為名從之端明殿學士兼翰林侍讀學士禮部尚書蘇軾言臣伏見元祐五年秋頒條貫諸民庶之家祖父母父母老疾無人供侍子孫居喪者聽尊長自陳驗實婚娶伏以人子居父母喪不得嫁娶人倫之正王道之本也孟子論禮色之輕重不以所重徇所輕喪三年二十五月使嫁娶有二十五月之遲此色之輕者也釋喪而婚㑹鄰於禽犢此禮之重者也先王之政亦有適時從宜者矣然不立居喪嫁娶之法者所害大也近世始立女居父母及夫喪而貧乏不能自存並聽百日外嫁娶之法既已害禮傷教矣然猶或可以從權而冒行者以女弱不能自立恐有流落不虞之患也今又使男子為之此何義也哉男年至於可娶雖無兼侍亦足以養父母矣今使之釋喪而婚㑹是直使民以色廢禮耳豈不過矣哉春秋記經禮之變必曰自某人始使秉直筆者書曰男子居父母喪得娶妻自元祐始豈不為當世之病乎臣謹按此法本因卭州官吏妄有起請當時法官有失考論便為立法臣備位秩宗前日又因邇英進讀論及此事不敢不奏伏望聖慈特降指揮削去上條稍正禮俗癸亥詔從軾請甲子資政殿學士知真定府李清臣為户部尚書政目六月十八日實錄在八月二十五日復召清臣必有議論但未見記錄者當考求追附資政殿學士同醴泉觀使梁燾知潁昌府此據政目燾與劉安世同出實錄在七月癸未今不取寳文閣待制樞宻都承㫖劉安世知真定府政目六月十八日實錄在八月二十七日今從政目韓瓘云云當附注八月二十七日提㸃河東路刑獄畢仲游為職方員外郎政目乙丑左宣徳郎秘書省校對黄本秦觀為正字政目十九日實錄在七月二十四日丙寅刑部言修立到司門條内陳請廢置移復城門關津橋道並申刑部及部送官物出入畫時具部送人姓名申所屬寺監及尚書本部從之戊辰詔諸元無縣學處輒創及舊學舍損壊許令人户出備錢物修整者各杖一百以尚書省言外路多違法科率造學故也權工部侍郎王欽臣權吏部侍郎政目二十二日都水監丞魯君貺為水部員外郎政目二十二日秘閣校理徐王府記室龔原為兩浙轉運判官政目二十二日辛未吏部言應轉運提刑司依赦奏到知州縣令在任政迹優異者乞與升名次從之壬申禮部尚書端明殿學士翰林侍讀學士左朝散郎蘇軾知定州按蘇軾奏議八月十九日以端明侍讀禮書論讀漢唐正史則六月二十六日不應已除定又實錄於九月十三日再書除定州恐六月二十六日所書或誤不然六月二十六日初除尋不行故九月十三日再除而實錄不能詳記所以也當考六月八日軾乞越州不允七月二十四日軾又以新知定州乞改知越州詔不允政目亦於二十六日書蘇軾知定州資政殿學士知定州許將知揚州政目六月二十六日癸酉尚書省言昨勘㑹官員因恩賞與占射差遣者到部凡在選乆待名次之人皆被陞壓有及一二年已上未到注授者慮亦有可減與別等恩例送吏部子細參照申初謂占射差遣亦或可減與別等恩例仍為事不當得此酬奬或已得轉官循資而涉僥倖者即與刪削或與改授指射陞名之類非謂必欲全罷占射今吏部一例改換減年磨勘却是歲增轉官䕃補請給本部四選合再行看詳從之尚書省言訪聞諸路兵夫多被姦惡之人以貸賣熟食為名隂加屠害其部轄官司地分干繫人又以弊源深逺刑名至重不切擒捕只以逃走為名致無由究治縁未有特立告捕賞罰専條其本縣令佐及部轄兵夫官司并地分人同隊兵夫等亦各未有覺察賞罰連坐之法合付刑部立法從之甲戌都水使者呉安持為太僕卿政目二十八日三年十一月十八日安持為都水六年十二月二十六日再任乙亥左朝散大夫權發遣河北路轉運副使葉伸落發遣字緣七月二日來之邵論張景先及葉伸故特出此或削去可也是月直龍圖閣知秦州吕大忠加寳文閣待制再任據大忠本𫝊云除直龍圖閣知秦州滿歲加寳文閣待制再任行狀云除寳制再任在八年按大忠以元祐五年六月二十八日加直龍圖閣知秦州至八年六月恰滿三歲因附見月末更竢考詳或附年末
