body:
  text: 續資治通鑑長編卷五十六宋李燾撰真宗景德元年春正月丙戌朔御朝元殿受朝大赦改元京東西淮南先㸃集强壯未配諸軍者並放歸農川峽廣西路官自今聽携家之任己丑北面三路都部署王超等請募沿邊丁壯及發精兵入賊境上曰無故發兵不足以挫敵徒生事於邊陲可亟止之戎人南牧但於境上驅攘而已無得輕議深入麟府路言附契丹戎人雅爾鼐巴罕太尉率三百餘帳內屬巴罕本大族居黃河北古豐州前數犯邊阻市馬之路其首領容貌甚偉有智勇桀黠難制契丹結之署為太尉今悉衆欵塞詔府州賜茶綵給公田依險居之計口賦粟且戒唐龍鎮無得侵擾巴罕太尉尋遣其子鄂雲來朝即授以官按宋史係此事於此月丁亥庚寅詔安化軍留後孔守正光州刺史知沂州陳文覬赴闕朝臣言其無牧守才故也辛卯上謂宰相曰近者羣臣言事頗罕若有所畏避何也因言唐室朋黨漸不可制遂至卑弱又言及姦邪難辨李沆曰此盧杞所以䝉蔽德宗也上曰雖一時難辨亦久自當露耳涇原路言隴山外至王家利家延家三族歸順詔授其首領官按宋史吐蕃傳作隴山縣壬辰詔開封府及諸路轉運司部內津渡先免課利者並官設舟楫以濟人遣中使賜种放藥三司使寇準言河東轉運副使鄭文寶熟兩邊事可任用甲午徙文寶為陜西轉運使增秩賜金紫尋出手札戒令與僚屬叶議勿得過有須索重擾于下詔河北諸州所募强壯自今或有逃亡不須增補先是戚綸自河北使還言磁州㸃集强壯上問樞密王繼英曰河北之民豈得無故追擾繼英對曰近磁州奏强壯有逃亡者不及額故再㸃集上亟令止之因降此詔乙未以後宮劉氏為美人楊氏為才人劉氏華陽人楊氏郫人也上初為襄王一日謂左右曰蜀婦人多材慧吾欲求之劉氏始嫁蜀人龔美美携以入京既而家貧欲更嫁之張旻時給事王宮言於王得召入遂有寵王乳母秦國夫人性嚴整不恱固令王斥去王不得已出置旻家旻亦避嫌不敢下直乃以銀五百兩與旻使别築館居之其後請於秦國夫人得復召入於是與楊氏俱封旻因改姓劉為美人兄云司馬光載章獻事自有兩說其間於襄王宮指使者與神宗實録劉永年傳首所書合故從之賜峽路諸州軍戍卒錢有差丙申威虜軍莫州並言契丹奚王及南宰相皇太妃令公各率兵四萬餘騎自鑒城川抵涿州聲言修平塞軍及故城容城上曰敵騎利野戰繕完城堡或非其意即詔邊臣謹斥堠敵若有事於三城則併力城望都以大兵夾唐河令威虜靜戎順安軍北平寨保州嚴兵應援仍廣開方田以拒戎騎若猶未也則以修築寨為名儲木瓦於定州渭州言康古蘭家族首領遵錐滿丕伊朗及便粗克等各獻名馬願帥所部助王師討不附者又言西凉市馬道出本族自今保無他虞詔賜馬直以便屬等為郎將是夜京師地震庚子詔西南蕃牂牁諸國進奉使欲親至朝廷者令廣南西路發兵援之勿抑其意先是龍光進來朝上矜其道逺人馬多斃因詔宣州就給恩賜至是本蕃懇請詣闕從之辛丑詔圖緯推步之書舊章所禁私習尚多其申嚴之自今民間應有天象器物䜟候禁書並令首納所在焚毁匿而不言者論以死募告者賞錢十萬星算伎術人並送闕下壬寅詔司天監翰林天文院職官學士諸色人自今毋得出入臣庶家占課休咎傳寫文書違者罪之癸卯免府州蕃部博糴芻粟髙州五姓義軍指揮使田文鄯等來貢石隰州言河西蕃部四十五族首領李尚默特等率其屬內附詔諸州强壯放歸農者其先置兵仗等並於所在送官是夜京師地復震乙巳廢髙州三年五月仍復之莫州路掌御劔中使馮仁俊與本路部署石普互相論奏事多瑣細上曰獨罪仁俊恐將帥驕恣亦不必推窮之也丁未遣使代仁俊歸闕是夜京師地震屋宇皆動有聲移時而止上謂宰相李沆曰坤道貴於安靜京師大衆所聚而震動若此皆朕聽覽不明所致夙夜內省中外之政敢不盡心但慮命令之出或有枉撓沆頓首引咎上又曰朝廷命令尢宜謹重每出一令輿人不免謗議或稍抑之又塞言路沆曰人之多言固可畏也冀州地震庚戌平虜城火焚廬舍甚衆詔閣門祗候謝德權乘傳至寧邊軍㑹孫全照同按其狀軍民剽掠財物者並論以軍法不知情者杖配它州壬子北面都鈐轄閻承翰上言請自嘉山東引唐河三十二里至定州釃而為渠直蒲陰縣東六十二里㑹沙河經邊吳泊入界河可行舟楫不唯易致資糧兼可播種其旁且設險以限戎馬從之李繼遷之陷西凉也都首領博囉齊僞降繼遷受之不疑未幾博囉齊集六谷蕃部及咱隆族合擊之繼遷大敗中流矢創甚奔還至靈州界三十井死其子阿伊克嗣位改名德明二月丁巳環慶鄜延部署相繼以聞且言阿伊克尚幼輔臣等請降詔招諭阿伊克及其部下能相率歸順者厚加爵賞鄜延鈐轄張崇貴先遺阿伊克書得其報稱未葬難發表章乞就便具奏崇貴因請遣使弔問仍令大臣至邊召賊所親信張浦面議事宜上曰阿伊克既孤宜即招撫然其人多狙詐儻內蓄姦謀外示柔順止居靈州河外遣使修貢行商貿易私繕兵革干求無度小不如意乃竊發為寇則患益深矣宜令崇貴與約如果歸順則須獻靈州歸夏州治所盡還蕃部質子放散甲兵即授銀夏節制儻以銀夏荒殘為辭則河西先歸順人户見居河東管界者並追還之乃賜德明詔諭意且告以信人未至故未遣使弔問也繼遷傳及吐蕃傳並載繼遷死在去年十一月稽古録亦云獨本紀實録仍於今年二月載之恐傳録因西凉事并書其實在今年正月也若果在去年十一月則不應二月始奏聞也當考戊午又詔諭靈夏綏銀宥等州蕃族旺善旺威龎密倫布安鹽州李文信萬資都虞候及都軍吳守正馬斡等能率部下歸順者授團練使賜銀萬兩絹萬匹錢五萬緡茶五千斤其軍主職員外郎將校補賜有差其有自朝廷叛去者並釋罪甄録環州馬步軍都指揮使王延順任職歲久頗蓄欺罔戎人情僞或失其實邊臣屬有論薦乞授供奉官或除刺史上不許召其子補三班借職以羈縻之於是延順願解軍政因徙為永興軍馬步都校仍加給賜促令上道博囉齊遣其甥斯端來獻捷且貢名馬詔奬之遣中使齎手詔諭西面緣邊部署鈐轄等宜乘賊遷既死速圖攻取之䇿飛驛以聞辛酉以河陽三城節度使王顯知天雄軍府兼駐泊都部署顯上疏請於文武羣臣中擇曉邊事者擢為宣徽使委之方面蓋位高則威名著識逺則勳勞立又武臣先以罪戾黜降者宜匿瑕再用必能效死臨敵之際事當責成監軍寵臣不須多任十羊九牧古人所譏每歲防秋精旅分屯三路由是合戰多違期㑹望申約束如逐敵人並令掎角相應自然軍威倍壯人心增勇矣尋乞入覲許之甲子令莫州部署石普移屯乾寧軍以省饋餉己巳遣使賑陳蔡沂密州饑民先是李繼隆援送靈武軍儲康努卜族輒出抄掠居迫蕭關與大蟲巉諸族為唇齒恃險及衆桀黠難制於是涇原部署陳興等帥兵進討窮其巢穴俘老幼獲器蓄甚衆盡焚掘其窖藏詔書褒之甲戌賜川峽至京驛遞卒錢乙亥鎮寧軍節度使柴禹錫自陜州來朝特詔魯國長公主就其第謁見行舅姑之禮禹錫固辭不得貢名馬稱謝丁丑鄜州言飛騎卒靳進斬蕃酋當補指揮使有司以賞格太重但擬本部十將上曰朝廷懸賞示信不可踰也亟令授之度支副使工部員外郎杳道儒雅迂緩治劇非所長與鹽鐡副使卞衮同候對將升殿衮遽出奏牘遣道同署及上詢問則事本度支道素未省視錯愕不能對己卯罷職道卒不自辨亦無愠色道為吏務行寬恕胥吏有過未嘗笞責民訟逋負者或出已錢還之以故頗不治嘗為轉運使出行部路側有佳棗從者摘以獻道即計直掛錢於樹而去收養孤遺篤於僚舊祿賜所得散施隨盡搢紳服其履行云壬午翰林學士梁灝等上新定閣門儀制六卷詔頒行之上以閣門儀制多出於胥吏之言殊無規矩故灝等别加刪修䕫州路轉運使丁謂招撫溪洞夷人頗著威惠部民借留凡五年不得代乃詔謂舉自代者謂以國子博士薛顔為請癸未擢顔虞部員外郎䕫州路轉運副使召謂入朝是月益黎雅州地震詔川峽諸州戍兵先以二年為限其權管將校亦如之先是上曰劔外戍兵更代已有定制而將校或至五七年此殊未安也故降此詔三月乙酉朔知威虜軍魏能言破契丹於長城口追北過陽山斬級獲戎器甚衆詔奬之賜錦袍金帶將士緡錢有差賜西凉府蕃族首領雅爾藏虎皮翻披蕃俗受此賜者族人推奉之故博囉齊為請焉戎人寇洪德寨供奉官閣門祗候段守倫率兵拒之凡三日力戰擒獲甚衆以守倫為內殿崇班戊子詔三班使臣年七十已上視聽未衰者與家便監臨其老耄不任事及七十五已上者借職授支郡上佐奉職殿直授節鎮上佐不願者放還鄉里先是有司言使臣年七十已上頗有壯健可以涖事者其老昧不任差役者願除贓罪放逐便外借職與近便宣補教練使奉職殿直與長史司馬别駕侍禁供奉官已上與致仕官餘並依前詔上曰使臣無過置之牙校不可也因降詔如前麟府路言栁谷川蕃部入寇率兵擊敗之生擒千三百人斬獲甚衆定州民詣闕貢馬乞留知州吳元扆并求立德政碑命還其馬賜元扆詔褒之元扆在定州凡五年屬久旱州吏白召巫作土龍祈雨元扆曰巫本妖民龍止獸也惟精誠可以格天乃集道士設壇醮潔齊三日百拜懇祈信宿而雨丁酉直祕閣黃夷簡等上校勘新寫御書凡二萬四千一百六十二卷校勘官六人賜緡帛有差五年十二月初命官校勘萬安皇太后疾未愈上親調藥餌每對近臣憂形於色或稍加言必流涕以重賞購民間善醫者詔屢下己亥后崩於萬安宮辛丑羣臣請聽政三表不允乙巳李沆等兩詣宮門懇請又覩上毁瘠過甚繼上五表復詣宮門求見言西北用兵機務不可暫曠上不得已從之戊申麟府路言敗戎人於神堆破其寨柵俘獲甚衆己酉上始於崇政殿西廊縗服慟哭見羣臣夏四月甲寅朔詔威虜軍魏能率所部兵次順安軍以備戎寇先是知鎮戎軍許均與鈐轄秦翰領兵入蕃界斬賊獲生口招降部落甚衆又課戍卒浚隍塹設險人甚便之嘗出巡警至隴山木峽口上以其無故離屯且無應援慮為狂寇奔突詔書切戒焉俄以其不明吏治自渭州徙曹瑋代之乙卯瑋言康努卜族咱伊等率其屬來歸且言繼遷殘忍人不聊生始聞詔書招撫爭求觀之無不泣下曹瑋徙鎮戎在二月辛巳今附此丙辰詔髙陽關都部署周瑩等會兵境上以備戎寇鄭國懿順長公主薨上對近臣語之慟哭不勝哀有司言皇親諸親並居皇太后喪以重包輕請不成服上以情所不忍命皇后臨奠諸王就其第成服駙馬都尉王貽貞初以尚主賜第及是歸之有司其後卒賜焉戊午徙石州駐泊兵馬屯汾州庚申上始御崇政殿聽政辛酉詔北邊諸路巡檢魏願等赴髙陽關東路李致忠等赴乾寧軍荆嗣等會劉漢凝田思明等率兵至莫州順安軍以備戎寇魏願李致忠未見壬戌邢州言地震不止上問守臣為誰宰相以上官正對上曰郡國災沴民不寧居尤在牧守以道鎮靜則封疆無事正纍典藩郡以知兵自許但未知能以鎮靜欽恤為意否天下之廣未免焦勞正為此爾癸亥詔御史臺刑部大理寺推直詳斷官未滿歲諸司不得奏舉甲子以陜西轉運使刑部員外郎鄭文寶為京西轉運使以度支判官工部員外郎直史館朱台符代之賜台符金紫或言文寶張皇生事故也以溪蠻寧息民多復業蠲澧州石門縣租二年乙丑羣臣三表請御正殿從之丁卯鎮定高陽關都部署王超言敵或誘襲王師恐大軍不可輕動請分擊之詔超隨宜裁制仍令押陳使臣禀其節度辛未上曰保州屯田漸見功緒若墾闢不已必大有成但治田兵夫多為轉運司移易他使故未能集事耳乃詔保州專置屯田兵籍自今轉運司復敢移易者以違制論又謂宰相曰朕閲順安靜戎軍所上營田河道圖參驗前後奏牘多有異同昨自順安界築堰聚水迄今猶未至靜戎地形髙仰恐勞而無功近王能又言此河之北有古河道繇靜戎抵順安歲或多雨亦可行舟楫欲興功開𨗳之乃詔閣門祗候郭盛等乘傳與長吏經度以聞癸酉沙州節度使曹宗壽遣使來貢方物丙子雄州言契丹統軍常從李可來降己卯令北面三路屯兵㳂流州軍離營歲深者各放還詔原州鎮戎保安軍流內銓承例擬官並為近地自今同環州例為逺官免其守選瀛州地震辛巳命知制誥朝逈詣北嶽祈雨壬午詔北面諸州軍休役兵賜衣服緡錢有差以歲旱大熱故也按熱字原本訛作熟字考真宗本紀是月丁卯以隆暑休北邊役兵應即此事但此係之壬午日與史稍異知雄州何承矩上言乾寧軍西北有古河渠抵雄州可疏通漕則不復入界河免戎人邀擊之患計浚治之役工凡二千萬上曰工作甚大又非其時矣乃令承矩須候如戎人修古狼城寨設兵備即具以聞當徐議之詔北平寨築隄導河水灌才良淀者宜罷之先是上以北面功役煩重漸及炎夏慮長吏不能優恤又閲北面地圖才良淀勢極卑下至夏秋積水不假人力故有是詔二事見經武聖略不得其時並附之四月末令諸軍廂主至員僚自今各作一職次一階一級歸伏事之儀違者處斬其御前忠佐軍頭見排陳使部署亦如之高陽關周瑩言忠佐軍頭多新補未知條制乞申明告示之上曰用兵之際忽又舉行前詔諸軍必致驚疑俟有違犯乃舉行因具瑩所言可也仍令軍頭司自今新補軍校並加曉諭是月命殿直宋垂逺乘傳往原渭儀等州及鎮戎軍案視放草牧地垂逺璫子先是垂逺言四州軍有草可歲刈取百餘萬束以秣飼戰馬上曰西鄙未能罷兵飛芻最困民力儻如所言非小補也故有是命張崇貴屢請遣大臣至邊議趙德明事五月甲申朔以兵部侍郎知永興軍府向敏中為鄜延路緣邊安撫使崇貴築臺於保安北十里許召戎人所親信者與定盟約經置大小皆出崇貴而敏中實總其議焉記聞云李繼遷兵敗被傷自度孤危且死屬子德明必歸朝廷曰一表不聽則再表雖纍百表不得請不止也繼遷死德明納欵上亦欲息兵詔向敏中知延州受其降按德明未嘗先納欵其報張崇貴書云未葬難發表章觀其意猶倔强不服朝廷多方詔諭僅得其欵附耳繼遷此等語疑德明假託故三年後方言之非其實情當此時固未言也敏中但為安撫使此年十月仍在長安明年九月除知延州記聞蓋疏略云實録及㑹要云敏中為四路緣邊安撫使今從之蒲端國王遣使來貢方物戊子禁中國人隨外蕃進奉使出境邊吏嚴加伺察違者論如律仍傳送闕下先是襄州人聶廷憲等數輩有謀竊入蠻界為判官至巫山津吏捕得以聞因著條約令諸州節度觀察至刺史本部兵隨行給使者以三年為限己丑詔諸軍將士犯罪按軍令除資産合入官外餘並還其家甲午遣常參官詣五嶽四瀆祈雨是日大雨遂留不遣令邠州路部署許均率所部兵退屯永興軍丁酉鎮定高陽關部署王超言邊部寧肅願暫還京闕省視家事從之翰林侍讀學士户部侍郎兼祕書監判吏部流內銓夏侯嶠引選人候對於崇政殿暴中風眩詔亟取金丹上尊酒餌之肩輿還第遣內侍召內外名醫診視其夕卒贈兵部尚書賻賜加等中使護喪事録其子孫三人嶠在近侍恩顧甚異卒後數月畢士安為相士安撫坐歎曰夏侯峻極在吾豈當先據此位也己亥邢州言地連震不止詔賜民租之半免鄰道轉餉之役壬寅西州回紇遣使來貢方物先是尚書左丞陳恕寢疾上言其長子太祝淳不率教多與非類遊處居常惟習武藝願黜為外州軍校上曰戎校管鎮兵非丞郎家子弟所涖之職也以為滁州司馬甲辰知并州王嗣宗言淳即其女壻實無他過恕吝嗇淳私用錢故怒而逐之請留其家給養詔許焉恕精於吏道性公直人不敢干以私深刻少恩類如此居半月恕卒贈吏部尚書詔復淳官淳亦終以賄敗云恕以六月庚申卒今并書丁未歸義節度使曹宗壽遣使來貢癸丑詔諸路州府軍監見禁罪人宜令長吏以下躬親詳勘限三日內斷遣了畢不得妄有枝蔓淹延若是重罪照證不具斷遣未得者亦須催促了畢每三日一遣官按視掃灑獄房滌洗杻械如闕什器即時收市上不欲遣使恐其煩擾但嚴敕長吏疏决而已本志載此詔於七月按實録七月無此事疑即五月癸丑也當考給事中柴成務判尚書刑部本司小吏倨慢成務怒而笞之吏擊登聞鼓訴寃有詔問狀成務歎曰吾為長官抶一胥吏而被劾何面目據堂决事耶遂求解職詔不許成務尋病卒六月丙辰詔諸州民詣闕舉留官吏多涉狥私或非素願因而率斂重有煩勞自今百姓僧道更不得輒詣闕庭及經鄰部舉留官吏如實有善政候轉運使到州即得舉陳仍委本使察訪能否以聞如敢違越其為首者論如律上密采羣臣之有聞望者得刑部郎中邊肅殿中丞鞠仲謀司勳員外郎朱協比部員外郎陳英郝太沖李元太常博士馬景何亮周絳謝濤衛太素國子博士陳昭度太常丞崔端高謹徽祕書丞趙湘張若谷姜嶼殿中丞皇甫選滕涉陸元圭李奉天太子中允崔遵度中舍曹度將作監丞陳越凡二十四人內出其姓名令閣門祗候崇政殿再坐引對外任者乘驛赴闕每對必往復紬繹其詞氣或試文藝多帖三館職或命為省府判官或升其差使焉仲謀髙密人協昂弟湘華州若谷南劔州涉虞城遵度淄川人也好事者因號越等為二十四氣以比唐修文館學士四時八節十二月之數云陳英李元馬景周絳衛太素陳昭度崔端高謹徽陸元圭李奉天曹度十一人不詳其邑里邊肅郝太沖何亮謝濤姜嶼皇甫選陳越七人已前見嶼亦不詳其邑里二十四氣據劉筠所撰皇甫選墓銘丁巳令諸路轉運使代還日條上在任興利除害升黜能否凡所經畫事辛酉馬步軍都虞候天平節度使王超自定州來朝留二十二日復赴行營七月甲申赴行營今并書壬戌命知制誥陳堯咨詣北嶽祈雨洪德寨言繼遷蕃部都指揮使都威等率其屬內附甲子詔川峽廣南福建州軍承天節自今三千里內仍舊入貢三千里外止具表以聞交州黎桓遣其子攝歡州刺史明提來貢懇求加恩使至本道慰撫遐裔許之仍以明提為歡州刺史明提為正刺史在十月二十八日今并書之實録於十月二十七日又書明提入貢蓋誤乙丑豐州團練使王承美來朝以其守邊歲久遷本州防禦使遣還任戊辰西州回紇遣使金延福來貢己巳知鎮戎軍曹瑋言近知賊衆攻掠西蕃因率兵邀擊於石門川俘獲甚衆癸酉右金吾衛上將軍判復州趙保忠寢疾上言有子永竒凶惡不遵教訓乞配𨽻春梅州上以保忠戎人性獷悍且被病恐所奏不實又疑其止有一子若逺竄則舉家無託乃授永州别駕令監軍察其事以聞如永竒實無賴保忠有他子則促令上道保忠尋卒贈威塞節度使葬事官給乙亥環慶部署張凝言河西蕃部額羅愛尼率族歸順丁丑西凉府都首領博囉齊遣其兄帕勒布齊入奏且欲更率部族及回鶻精兵直抵賀蘭山討除殘孽請與王師㑹靈州上曰博囉齊屢乞會師朝議遷延未許今若沮之則其心離矣然以道逺難刻師期乃詔涇原路部署陳興等俟博囉齊報至即勒所部過天都山䇿應勿復奏俟朝命帕勒布齊又言前賜博囉齊牌印官告衣服器械為遷賊劫掠有詔别給之初繼遷種落敏楚克巴及日布結羅丹二族云歸咱隆族而欲陰圖博囉齊是月繼遷之黨來攻咱隆博囉齊率百餘騎急赴將議合擊遂為二族戕於帳下咱隆凡十三族而六族附敏楚克巴及日布結羅丹西凉府既聞博囉齊遇害乃率康古蘭州總噶爾密諾爾族攻咱隆六族悉竄山谷諸豪乃共議立博囉齊弟斯多特為首領斯多特剛決平恕每㑹戎酋設觴豆必先卑者犯令雖至親不貸數更戰討一境服其威名云實録㑹要並載焦贊於十月奏此事乃云嵗六月皆誤也當云是嵗六月别給牌印等實録在七月乙未今從本傳上謂宰相曰今年北面防秋兵馬已各有制置順安靜戎軍先開河道屯田導治溝洫以為險阻蓋欲保庇邉民俾其耕殖今聞戎人欲自西路入寇必先分兵堙塞此溝洫河道靜戎順安軍屯兵既少難於赴援若果為敵所堙塞即異時修復倍為煩費况此設險之計蓋邊臣上言因從其請朕嘗諭之若羣冦犯邊須别為備禦此險亦不足恃平時賊騎偵邏即有所限隔自迄役以來邊民得遂耕種頗亦安堵朕􅍄計此若必須固護河渠即至時令莫州部署石普移兵屯馬村西寧邊軍部署楊延朗壁靜戎軍之東楊延朗去年六月癸酉以莫防為保州威虜靜戎軍緣邊都巡檢代李繼宣八月甲寅猶在保州不知何時改授寧邊軍十月甲子以寧邊軍經蕃寇蠲其夏秋稅或延朗改授政在此時又按今年正月庚戌平虜城火謝德權至寧邊㑹孫全照同按其狀則今年正月全照猶為寧邊軍部署也或延朗即代全照者不然延朗雖有此命尋復故當考之兩軍屯田庶獲無虞且可以斷黑蘆口萬年橋敵騎奔衝之路及會諸路兵掎角追襲其地里稍逺難於守護處縱為賊所堙塞異時修復人亦自無異議卿等以為如何或難於分兵守護亦無固必也李沆等咸以為便庚辰詔諭延朗及普等仍益延朗兵滿萬人務申嚴斥堠以備侵軼又詔北面緣邊州軍河渠隄堰及屯田溝洫宜令所在常切固護毋使墮廢上語近臣曰河渠屯田皆自朝廷遣人興葺如聞在處官吏以為非始謀因不切固護仍申警之環州洪德寨言蕃部羅尼天王本族諸首領各率其屬歸順壬午以盛暑罷京城工役遣使分賜療暍者藥仍頒其方於天下上以明德皇太后在殯久闕時薦秋七月癸未朔命昭宣使李神福等分詣太廟后廟備牙盤食薦享不出神主始班臨陳賞罰之令於北面諸軍兵志言景德初班臨陳賞罰之令遣中使齎御劒赴北面以肅軍令按實録則先後差殊今從實録甲申王超赴北靣行營先是上召翰林學士梁灝夜對詢及當世臺閣人物灝曰朝逈篤於詞學盛元敏於吏事上不答徐問曰文行兼著如趙安仁者有幾灝曰安仁材識兼茂體裁凝逺求之具美未見其比也既而灝卒乙酉以知制誥趙安仁為翰林學士元餘杭人也後改名度令延州監軍一人分步騎之半屯鄜州俟有警急即追發應援丙戌右僕射平章事李沆寢疾上臨問賜其家白金五千兩車駕方還宮而沆卒年五十八上聞之驚嘆趣駕再幸其第哭之慟謂左右曰沆為人忠良純厚始終如一豈意不享遐壽言畢泣下贈太尉中書令諡文靖録其三弟一子甥及妻之兄子皆賜同進士出身上之初即位也沆日取四方水旱盜賊奏之參知政事王旦以為細事不足煩上聽沆曰人主少年當使知人間疾苦不然血氣方剛不留意聲色犬馬則土木甲兵禱祠之事作矣吾老不及見此參政他日之憂也時西北用兵邊奏日聳便殿延訪或至旰昃弗遑暇食旦慨然謂沆曰安得企見太平吾人當優游燕息乎沆曰國家强敵外患適足為警懼異日天下晏然人臣率職未必髙拱無事君奚念哉記聞稱和好成沆獨憂蓋因此事誤也沆死於七月十二月和好始成司馬光偶未考耳今從蘇轍龍川别志及王曽筆録上雅敬沆嘗問治道所宜先沆曰不用浮薄新進喜事之人此最為先上問其人曰如梅詢曽致堯李夷庚等是矣上深然之故終上之世數人者卒不進用在中書未嘗密進封章上嘗詢其故沆曰臣備位宰相公事當公言之茍背同列密有所啓此非讒即佞臣實嫉此事豈復自為之耶九月丁酉上言沆往往别具所見當考上再三嗟賞沆重厚淳質退公輒終日危坐所居湫隘處之晏然未嘗問家事對賓客尤寡言人有請求無所辨别既抑退失望則多歸咎焉沆亦不介意弟維嘗乘間勸沆稍屈意接納士大夫沆曰吾非不知此也然今羣臣皆得升殿言事無有壅蔽封章論奏多下有司吾悉見之矣至於西北大計朝廷所欲聞者薦紳中如李宗諤趙安仁皆一時英秀與之談猶不能啓發吾意其餘通籍之子坐起拜揖尚周章失措即席必自論功最希寵奬此又何足與語乎茍勉强酬答則世所謂籠罩之事吾未能也沆自言居重位實無補萬分惟四方言利事者未嘗一施行聊以此報國爾朝廷防制纎悉備具或狥所陳請妄有更張即所傷多矣常喜讀論語或問之沆曰為宰相如論語中節用而愛人使民以時兩句尚未能行聖人之言終身誦之可也戊子陜西轉運使言西面緣邊諸州於保毅軍內簡集成振武軍四十指揮上曰數年前賊圍靈州諸路部署遣人乘傳飛奏請援兵者曽無虛日當時河東兵不可減乃議立此軍尚慮簡閲未精冗食邊廪纍遣使臣精加選擇所存皆少壯拳勇漸習武藝朕詢于知兵及詳練邊事者皆云自立此軍邊聲頗振戎人畏懼不敢侵寇矣己丑上謂侍臣曰近頗亢旱有西州入貢胡僧自言善呪龍祈雨朕令精舍中試其術果有符應事雖不經然為民救旱亦無所避也李沆死中書無宰相上意欲擢任三司使寇準乃先置宿德以鎮之庚寅遷翰林侍讀學士兵部侍郎畢士安為吏部侍郎參知政事士安入謝上曰未也行且相卿誰可與卿同進者士安因言準天資忠義能斷大事臣所不如上曰聞準剛使氣奈何士安曰準忘身狥國秉道嫉邪故不為流俗所喜今天下之民雖䝉休德涵養安佚而北戎跳梁未服若準者正宜用也不閲月遂與準俱相以濟州防禦使王能為邢洺路部署冀州防禦使石普為冀州路部署鄭州防禦使魏能為寧邊軍路部署寧州防禦使張凝為定州路部署先是能等各自邊任召還由團練使遷防禦使於是復遣出戍張凝傳云凝以寧防代楊嗣為定州部署按楊嗣傳蓋未嘗為定州部署也魏能傳云能以鄭防出為寧邊軍部署按六月庚辰楊延朗實為寧邊部署不知能即代延朗者否又不知延朗徙何官傳又云能表求為軍鋒再任威虜其再任威虜實録又不載當考辛卯詔西面緣邊有都監監押處省其駐泊都監壬辰鹽鐵副使刑部員外郎卞衮卒詔録其子弟衮明敏幹事有吏才纍掌財賦精心治局以稱職聞然性慘毒掊克嚴峻專行箠楚至有大蟲之號於是上謂近臣曰衮自前月疽發於背朕纍遣醫工療之卒不能起衮臨事首公無所畏避竭力盡瘁人罕能及然頃在外任頗傷殘酷所至州縣纎微之過無所容貸大凡督察部下糾繩愆違若非大故所宜矜恕官吏自當畏威懷惠不敢二過公家之事亦無不濟乃知為吏之方適中為善也先是光祿少卿宋雄監河陰屯兵雄習知河渠利害因領護汴口均節水勢以濟江淮漕運居十數年三遷將作監不易其任職務修舉朝廷賴焉於是雄卒三門發運使水部郎中許元豹上書請兼領以自效乙未命元豹兼河陰都監知縣事元豹未見詔三班使臣以補䕃未歷事者不得令監在京諸倉發河東廣鋭騎兵赴鎮州以備戎寇十二月發歸詔北面都部署自今與敵鬭陳既成列除東西拐子馬及無地分馬外更募使臣軍校拳勇者量地形逺近押輕騎以備應援先是以大陳步騎相半敵諜知王師不敢擅離本處多盡力偏攻一靣既衆寡不敵罕能成功故有是詔河北轉運副使工部員外郎盧琰調發軍儲有功召入遷刑部員外郎賜金紫復遣還任戊戌知并州王嗣宗言西面所市馬以給北面戰士中有瘠弱者即送闕下暑月道逺多死汾州地凉接樓煩諸監美水草請就牧從之并州境有卧龍廟每窮冬闔境致祭值風雪寒甚老幼踣于路嗣宗亟命毁之己亥以盛暑賜儀州制勝關採木軍士緡錢有差詔并代緣邊戍兵逾二歲者並代之仍自今所上兵籍明注出外年月不得隱漏先是并代戍兵苦寒逃亡相繼上閲兵籍知遣戍止自逐處替移有至七年十年不得代者乃降是詔據經武聖略此詔乃景德元年不得其月因張旻為并代鈐轄附見仍削旻不著鎮州路副部署深州團練使楊嗣年耆不能肅軍政壬寅命保州團練使鄭誠代之徙嗣為趙州駐泊部署同押大陳張凝傳云凝代楊嗣為定州部署按嗣傳實未嘗為定州部署疑傳誤也今不取癸卯詔修邢州城以地震未止故也上謂輔臣曰聞威虜軍指揮使李晏久在邊城頗能效命每襲賊必先登深入近者被創尤重本軍向來一切條上功狀致朝廷無從分别可特志之異時優加奬擢明年三月以死事贈官初欽康定三陵尚未修奉上即位有言順祖翼祖葬保州者詔內侍與長吏詢訪又令中書門下定議遂迎奉至京奉安於佛寺將卜改葬上因覽太祖實録定康二陵皆在幽州頗疑其事即手詔宰相與樞密院詳定咸請停改葬之禮量加營奉務從省約徐俟辨明别申遷卜遂以一品禮葬于河南縣乙巳令北靣諸軍分屯近南州軍俟都部署追發即赴定州省饋運以便民也賜邢州修城卒緡錢有差丙午以刑部郎中知恩州邊肅為兵部郎中知邢州賜金紫肅自貝州召還奏事便殿稱上㫖故奬任之詔以崇文院所校晉書新本分賜輔臣宗室上曰昨有言兩晉事多鄙惡不可流行者參知政事畢士安曰惡以戒世善以勸後善惡之事春秋備載上深然之戊申知光州光祿卿李昌齡分司西京轉運使言其被病弛職故也壬子三司請雇民車載鎧甲赴河北緣邊上曰盛暑水潦之際不可擾民天雄軍等處鎧甲非少當就給焉如京使何士寧言准詔禁軍各依等級並行伏事之禮違者按軍法其廂軍未立條制欲望約前詔減一等定令上曰禁衛軍士無他役使唯習戎藝耳且廪給優厚欲其整肅有所禀畏故設此條制若廂軍又約此施行必恐滋彰難以經久但依律文可也何士寧未見
