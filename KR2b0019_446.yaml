body:
  text: 續資治通鑑長編卷四百四十二宋李燾撰哲宗元祐五年五月丙寅詔陜西河東地界近已定議以知潁昌府觀文殿學士范純仁知延安府知延安府樞密直學士中大夫趙卨為端明殿學士仍遷太中大夫知太原府特賜銀絹各一千匹兩御史中丞梁燾言臣竊聞除范純仁知延安府延安府為極邊密制羌境雖從來遴擇帥臣而近未有以舊相臨之者一旦忽命純仁竊恐事體太重非所以尊嚴國威而徒使黠冦妄意窺我以謂中外之材其下無可任者又謂舊相事權非常將必有所經營由此懷疑生事朝廷本以重延安而不知所以增羌人之疑也愚慮所及不敢遂默欲乞聖慈别賜處分又言陜西四路自置帥以來真宗朝故相張齊賢向敏中皆曾領延州緣當時趙德明雖納欵信約未定故命向敏中經略李繼遷叛擾邊塞故命張齊賢經略距七十餘年蕃漢之人耳目所不接又當納欵貢奉之時驟加相臣臨之必恐挾疑生事伏望聖慈早賜施行尋改命純仁知太原趙卨知延安如故二十四日改命知太原府龍圗閣直學士滕元發為龍圗閣學士知揚州知揚州龍圗閣待制蔡京知潁昌府戊辰詔故屯田貟外郎陳洙嘉祐中任殿中侍御史裏行常請選宗室立為皇子特録其子或孫一名郊社齊郎司馬光元年八月末有言陜西轉運司言諸路係差他處權官並不得依正官到罷例受供饋只准所權本職月給例到罷並不得過一月之數其只在本處權攝者不在給限從之新本削去戶部郎中髙鎛言敗闕場務乞只减淨利庶不虧係省課額從之己巳宣州觀察使贈開府儀同三司追封和國公諡安修克敦卒庚午中書舍人顔復為天章閣待制國子祭酒翌日卒賻錢五十萬以嘗任經筵故也政目十二日復卒今依實録衛尉少卿林英提舉崇禧觀英以疾自請也直祕閣韓宗師為衛尉少卿辛未都大提舉成都府利州陜西等路茶事司言應雅州管下盧山榮經縣碉門靈關寨威茂龍州綿州石泉縣界並為禁茶地分如敢侵犯並依秦熙等路法施行從之壬申詔踈决天下罪人內强盜至死情輕者申安撫鈐轄司詳斷是日雨此據政目五月八日事增入當考陜西路轉運副使章楶為右司郎中朝端彥為江淮荆浙等路發運使端彥自都司出為發運新舊本俱不載其由當是坐違法擬四吏賞言者攻之又按杜常以三年八月為左司郎中五年十二月十八日遷太常少卿據蘇轍十二月疏稱常在都司希合時忱任永壽等㫖意施之政事前後纍為臺官所劾又劉安世論酬賞過優亦稱御史言常赴忱㑹不知何故常乃久留左司而端彥先罷右司也或端彥之罷初不由此更須考詳盛陶作端彥墓志云為右司郎中時僕丞多公交遊公論議不阿吕丞相尤不喜異說公議罪有必罰者議賞有必與者前後十數丞相以七十而仕者不得任子諭公立法公執以為不可曰任其力受其責獨不得從其所厚耶蔡新州故吏訴吏部不録前所受責公曰有格在吏部非是可録之丞相以手指蔡新州姓名示公曰如此二字何笑而謂曰其惟右司敢乎公正色對曰敢丞相滋不說㑹李端禀疾不起公曰吾可以去矣尋乞補外拜江淮荆浙發運使江淮荆浙等路發運使路昌衡知荆南詔差役法內有未備事令中書舍人王巖叟樞密都承㫖韓川與諌議大夫㸃檢户曹文字劉安世同看詳具利害以聞五月八日先是安世言臣伏見朝廷欲變役法今已四年選官置局講求利害天下之議悉使折衷而承詔立法之意惟以仁民愛物為務謂嘉祐差役之制已便矣然當時常見其害者今則損而去之元豐約束之制民以為利者今則取而益之至於風俗之殊尚南北之異宜本州人情裁以國論隨方條列罔不具備而又申以明詔諭㫖若施行之際或窒礙而未通節文之間或踈略而未盡更俾建明為之增損有以見陛下至仁至厚重惜民事之深意也新書之下輿情慰恱中外帖息初無間言而姦邪之人內懷顧望造播橫議已欲沮毁遂致一二小臣敢執偏見妄進邪說欲罷差役依舊雇募當職官吏不能為朝廷固守法度而依違遷就屢有變更天下人情莫不疑惑此最當今之大患也臣聞自古取民之道止於粟帛與民力而已三者皆生之無窮而取之不竭故堯舜三代以來莫之能廢議者乃謂不役其身止令輸錢則公私兩便臣請有以折之國家泉貨經費所資設官鼓鑄嵗有定額民或盜為罪至論死今棄其易出之力而責其難致之錢固已非理又使上户止納數千則優遊卒嵗日益兼并下戶自來無役者例使加賦日脧月削寖以窮困損九分之貧民益一分之上户輕重倒置孰甚於此臣竊謂以一家一嵗觀之則輸錢若省而易給以終身纍世計之則所出不資而難供今聚斂之臣惟欲追剝生靈而不為天下長久之慮詎可信哉議者又謂人户輸不及三畨處恐役太重臣亦有以折之且治平之前天下户口一千二百七十餘萬而舊法役人五十三萬六千餘人元豐之後户口一千八百三十五萬九千有竒較之治平已增五百六十餘萬而新定役人止放四十二萬九千餘人比之舊法却减十萬七千之額以為輪差不足亦已過矣然而天下州縣或有連值凶嵗人戶流移畨次不足之處則在有司通融補助必不可以小節而廢大法也臣伏觀國家受命以來百有餘年差役之法已更六聖隨時損益既皆中理考觀已試之效固可行之不疑而纍年於兹尚容移奪臣竊謂知法之未良改之不可不速知法之已善守之不可不固今差法已善陛下正當信而守之執政大臣尤宜協心體國堅拒邪說而乃縱使姦慝倡為異論搖動人情惑亂天下故議者謂今日紛紜之患不在於無知之庶民而特在於邪說之士大夫也臣聞執狐疑之心者來讒賊之口持不斷之意者開羣枉之門願陛下特奮乾剛力主差役深詔執政固守初議母使輕徇浮言妄有變易庶使祖宗之成法不為姦人之所奪天下幸甚貼黃臣勘㑹自行差役後來臣僚執一偏之見妄有申請衝改過事目不少其間甚多疏略抵牾反為民害者欲望聖慈特降指揮下户部令畫一條析聞奏再委執政聚議除利害的確須合更張及一州一路自有所宜不可通用外其應緣邪說遷改變動去處並乞却令依舊施行所貴法度純一天下不惑詔太師致仕文彥博特依前任宰臣添賜公使仍令河南府管勾支用詔三路帥臣監司於本轄見任及前任武臣諸司副使以上係軍班出身內精加選擇才略聲迹為衆所推之人一兩員堪充路分以上主兵任使者限一月密具職位姓名實封保明以聞如已係路分以上及將領亦聼選舉候舉到令樞密院籍記姓名遇有任使暫抽赴闕本路更加審察如委可任使即取㫖升擢御史中丞梁燾言臣竊以提舉出賣解鹽委任事權不輕例得就移監司今聞除授宣義郎孫逈頃在謫籍朝廷特差通判永興軍又移權發遣懷州猶未到任未有功狀可以别當恩奬况今搢紳之間有才無過者甚衆若以公議采擢於孤寒踈逺之地不為乏人何必區區求之於罪纍之餘以示不廣殆無以感勵材能忠厚之士恐非陛下仁明至公之㫖也伏望聖慈特賜指揮罷逈上件差遣且使為懷州以觀後效貼黃逈誠有風力所臨治辦但以從事於賈青之刻薄故得罪清議今若且使為郡俟政有愷悌之實然後用之未晚也八月十二日逈知濮州六年四月六日當考實録五月八日提舉出賣解鹽程髙為利路運判政目五月八日孫逈提舉解鹽實録乃不書癸酉吏部言改修到嵗舉大使臣及小使臣充升陟者並通融奏舉諸路知州小使臣幕職官以不知州者非外條保官稱知州者准此通判桂陽鹽使六貟黃河都大司官掃岸使臣二十員者准此不滿二十員者四員從之新削乙亥羣臣拜表請御正殿復常膳詔答不允表四上乃允之舊録云自去年冬無雪至是始雨按政目是月八日已得雨矣今不取新本因之丙子知沅州胡田言渠陽塞蠻人作過臣領兵處置畢詔軍兵等令運司各賜錢有差鄜延路經略司言保安軍封到宥州牒稱請廢蘭州勝如等處堡詔熙河蘭岷路經略司密勘㑹勝如智固兩堡內見屯蕃漢兵馬并巡檢使臣等人數其城壁樓櫓守禦之具各有何次第自元豐五年修後有何事迹或文據可為西界照驗今當何辭折難回牒及所稱廣割嶺是何處繪圗以聞六月八日上官均言可考月末范育奏或附此蘇轍上言四事并合參照政目三月末宥牒納葉勝如經且智固埒克節努扎三處創壁請毁去四月末令保安牒智固及勝如建置年月戊寅樞密院言令舉人及曾教學人并隂陽卜筮州縣停間人㑹造兵器工匠並不得入溪峒與歸明蠻人相見違者以違制論許人告每名賞錢二十貫仍委本地分巡檢縣尉覺察從之辛巳直龍圗閣樞密都承㫖韓川為中書舍人壬午中書舍人王巖叟為龍圗閣待制樞密都承㫖三省言尚書右丞許將奏臣近準敇差夏至祭皇地祇攝事竊考祀儀見乃者詳定禮文所奏親祀南郊合祭天地非禮乃建議罷圜丘皇地祇并從祀位郊祀之嵗不及親祠地祇即遣冢宰攝事已具為儀行之臣伏以王者父天母地並為大神自古制祀雖有異同然未有偏止而不躬行者也且三嵗冬至天子親祀遍享宗廟祀天圜丘而其嵗夏至方澤之祭乃止遣上公則是皇地祇遂永不在親祠之典此大闕禮也不可不議伏望聖慈博詔儒臣講求典故斟酌其宜明正祀典以作萬世法詔禮部太常寺同共詳議以聞元豐六年五月九日六月十二日又詔政目云許將乞合祭地祇當考政目又於是日書勘蔡碩今實録乃於八月四日書之合從實録侍御史孫升言臣竊觀歷代以來君子進則天下治安小人用則天下危亂載在方册明如日星可為深戒何則君子進則上能尊君下能愛民汲引善良放逺邪佞是以朝廷肅清天下治安凡所謂小人者逺之使不能為姦惡而已非有意於害之也故周易曰君子以逺小人不惡而嚴也小人則不然一日得志於天下則懷姦以罔上朋邪而附下黨與交結惟利是市賊害善類中傷忠良賢人既亡亂亦隨起故周易曰小人勿用必亂邦也由是言之則為天下萬世計者不可不以防微杜漸為戒也臣按贓滿貸命編管韶州人蔡碩當其兄蔡確為宰相之日表裏相應挾權納賄驕奢淫佚無所不為前後姦贓莫知其數昨緣軍器監計置物料止一事爾侵盜欺隱官錢至數萬燒焚帳歷僞作簿書國朝以來姦贓盈滿未有其比朝廷特貸其死置之善地然凶焰未息而懷邪市利之黨猶有交結臣訪聞韶州自來買銅未有見錢支結出照帖與銅戶俗謂之油糧主守候嵗月依次第支錢昨來韶州郡縣官員交結蔡碩使於油糧主守處每一貫照帖止用錢數百收買遂冒法不依資次一頓支給官錢與碩不月餘日蔡碩贏落官錢千餘貫蔡碩遂於䖍州用錢打造大船乘載姬妾鼓噪順流浮江西下自以為王法所不能制也方其貸死之日姦黨交結且猶若是况其得志耶伏望聖慈詳察特降指揮下廣南東路不干礙官司體量韶州冒法支官錢與蔡碩官員詣實因依重行黜責以戒附下罔上惠姦賊民之黨從之元祐五年五月初九日升上此奏政目十八日書勘蔡碩即此蓋升以九日上奏十八日得㫖施行也實録於八月四日乃書今兩存之癸未詔今後轉運提刑司巡所部州縣二年一周仍嵗按其半舊條有故不能遍者更不施行以臣僚上言監司便文茍簡多不遍行本部故也丙戍祕閣校理張舜民為殿中侍御史六月十二日改金外工部貟外郎楊康國為監察御史康國共城人劉摯銘其父整監察御史楊畏為工部貟外郎諌議大夫劉安世朱光庭等纍奏乞罷畏臺職而畏亦自求免故與康國兩易所除御史在三月二十六日太常寺狀欲乞今後應輟朝並輟聞哀之眀日如前殿即輟起居遇後殿起居或日參並准此假日及後殿垂簾假日合入官起居輟以次日從之詔贈太子太師元絳神道碑以懿文為額從其子蓍寧請也戊子新知延安府觀文殿學士范純仁為觀文殿大學士知太原府五月二日除梁燾云云詔供備庫使趙永寧為相州鈐轄以翼祖之後特從其請也户部言應外官赴闕割俸或全留在外請領不帶歷身隨行者乞令所屬勘驗給公據朝見閣門㸃檢報太府寺給二分料錢小歷勘請從之新無六年五月二十六日可考己丑尚書省白劄子勘㑹府界諸路人戶積年諸般缺負名件稍多前後官司奏請分展年料催納不一及有纍經展閣去處若併行催理慮人戶輸納不易詔將府界諸路人戶應見缺諸般缺負以十分為率每年隨夏秋科各帶納一分願併納者聽仍置簿文定逐戶諸般見缺併為一處及每年合納數目今年夏科為始理納如係各司錢物即各置簿催理所有前後纍降催納缺負分科展閣指揮更不施行編録法册元祐五年五月二十五日聖㫖今掇取附見蘇軾奏目六年五月二十六日聖㫖恐蘇軾誤今兩存之六年閠八月八日王巖叟云云可考庚寅御史中丞梁燾權戶部尚書左諌議大夫劉安世為中書舍人燾安世並以乞罷鄧溫伯承㫖除命不從辭所遷官不拜詔遣中使諭燾促令受告仍押赴省供職燾於六月十四日方受命劉摯記此甚詳今别見彼燾既稱謝即言過坤成節上壽訖當請外而安世以病卧家訖辭之八月十八日可考燾為中丞時嘗言蔡確姦以事君誤先帝多矣陛下優恩容貸處以善郡小人忘義不自揆度若吳處厚所箋詩章乃安陸前古人物遺迹所在章詠偶及之至於怨謗君父必不敢至此若譏侮臣下則有之故臣在言路嘗論確姦惡欺君害物未嘗專指詩什伏覩祖宗以來如丁謂嶺海之責不過三數年還之陛下聖度好生何所不容臣聞確母老憂思成病有可愍者唐劉禹錫凶愎姦險王叔文篤信之幾傾唐室貶播州裴度以其母老為言憲宗曰為人子宜謹事不貽親憂若禹錫比他人尤不可赦憲宗徐曰朕所言責人子事終不欲傷其親乃易連州今陛下聖德天度唐憲宗豈足以望萬一然事頗相類願陛下哀之特與內徙湖湘間既足以明確忘親為惡之罪又足以勵天下孝子事親之心然此事不當出於臣子願陛下宸斷又言風聞中貴陳衍採訪外事密奏兩宫衍近來頗自表異陵押羣輩氣岸不遜臣以謂兩宫聖明輔陛下施為有宰執論事得失有臺諌百司各守其職循名責實則事無廢弛豈可使閹竪賤𨽻上玷聰明若人言為信有傷聖德漸不可長疏纍上又面論之此據梁燾行狀蓋為中丞未升户書日有言今附此新舊本並不載此不知何故行狀乃張舜民據燾子鼎吉等所編次參以舜民所聞見而作時黨禍再起矣當考右諌議大夫朱光庭言新除太學博士秦觀素號薄徒惡行非一豈可以為人之師伏望特罷新命詔觀别與差遣辛卯侍御史孫升殿中侍御史賈易同奏編類章疏五月二十七日臣等近全臺彈劾新除翰林學士承㫖鄧溫伯無中立不倚之操有朋姦罔上之迹未䝉省察施行御史中丞梁燾已居家待罪臣等義難自安謹録白溫伯為諌官日朋附吕惠卿誣陷王安國及在翰林日隂交蔡確於制命之中獨推確為定策當時既無危疑之事大臣何有定議之功茍推保佑之功以為蔡確之功則致危疑之罪將使誰當確之怨望謗訕自溫伯發之蔡確流竄逺方而制文傳播天下溫伯進退實係消長朋姦罔上迹狀著明恭惟皇帝陛下聖德日躋正須直亮之人朝夕輔導如溫伯姦邪不正豈冝內相人主親承天命夫察邪正辨是非朝廷設御史之意也臣等非為身謀實惜國體伏望特回睿眷省覽臣等所奏早賜處分三月十六日五月二十七日六月八日七月二十四日凡四狀貼黃言王圭首相止云預定議於禁塗其比方止於漢之樊侯賦命而已蔡確之制尤嘉定議之功其比方乃如周勃則當時豈有危疑不决之議如漢之諸吕賴蔡確而後定哉大事之屬既歸蔡確則危疑之罪將使誰當負國欺天莫大於此壬辰翰林學士蘇轍為龍圗閣直學士御史中丞轍言臣以空踈備位執法當得僚佐以助不逮竊見兩院御史見止三人而兩人辭免未入不獨言者寡少於朝廷得失有所不盡而六察所治事務至煩力有不及則百司殆廢頃者貟缺不補動經嵗月衆論莫不疑怪臣竊見唐制臺官皆大夫中丞自辟有不由此除授敇命雖行皆拒而不納至本朝雖稍損其舊然亦必令本臺與兩制分舉而人主自擇其可者用之初無執政用人之法也然人才之難非獨今日故自唐太宗以來設監察裏行以待資淺之士而祖宗舊制亦許用京朝官知縣以上立法稍寬易於應格近日舉法須得實歷通判一考人物衰少莫甚於今而獨於言事者重為艱阻實未允當臣頃在內外制見每有詔下同列相視患無合格可行之人所舉既上又多不用却於前任臺官中推擇任使雖云舊人不免出自執政所可殊失祖宗博舉之意臣今欲乞並詔本臺及兩制舉升朝官初任朝通判以上或第三任知縣通判以上及知縣人所舉各半從聖意選擇補足見闕仍依元置監察內行所貴祖宗選任臺官舊法不致隳壞而綱紀之地易於得人亦免遺曠此章附見初除日轍以五月二十八日除中丞日孫升已為侍御史今年三月賈易已為殿中去年五月二十二日先罷察院楊畏除張舜民殿院楊康國察院而舜民辭不受官賈易亦請避嫌轍所稱兩院御史見止三人而兩人未入者謂易與舜民其一人蓋康國也易既以六月八日罷舜民以二十二日罷康國遂改殿院因詔轍及升同舉察院二人轍又言臣聞孟子有言有官守者不得其官則去有言責者不得其言則去故祖宗朝凡任臺諌言而見聽則居職言而不用則黜罷理之必至前後悉然惟有去年臺諌論回河不當言既不從其言者皆獲美遷今年復論鄧溫伯不可任翰林承㫖言既不效而言者亦並進職雖人臣迫於朝命黽勉就位而中外觀望不知曲直所在為損不細誠使朝廷偶有過舉聞善而改適足以增開納之光其或言者論事不當據法罷免亦足以示進退之公今者不辨是非一加進擢朝廷則負諱過便私之毁臣下則被苟簡懷祿之非風俗漸成士節陵替載之史册不為美事臣今待罪執法才力疲軟何能發明然在職思憂不敢不勉若所言中理望陛下力賜主張行之無吝一有不當亦乞明加流竄以懲妄言惟乞勿為隱忍包含之計使臣主俱受其謗不勝幸甚此章不得其時附初拜中丞日雖必不在此日亦必先有此章然後及他事也吏部侍郎兼侍讀范百祿為翰林學士給事中鄭穆為寶文閣待制國子祭酒右諌議大夫朱光庭為給事中光庭固辭詔令中使諭之受告仍押赴省供職遣中使據王巖叟紀年録光庭受命在六月十四日劉摯行年後記甚詳今别見於彼太常博士祕閣校理劉唐老為右正言太中大夫知虢州蒲宗孟復資政殿學士知河中府詔應沿邊事創添置官陜西轉運司管勾公事五貟河東轉運司勾當公事一貟河東經略安撫司凖備差使一貟並减罷依省貟罷任施行河東并陜西諸路經略安撫司聽候差使各一十五貟令逐司放罷並令後更不差人户部言乞太府長二每月各分巡轄下庫務一兩處㸃檢簿歷官物具有無舉發改正事件申省即不得預定時日所㸃檢事却有姦弊露者㸃檢官本部奏劾詔左藏南北庫榷貨務商稅院依此新無賜度僧牒五十令杭州開西湖政目二十八日事從知州蘇軾請也杭本江海之地水泉鹹苦民居稀少唐刺史李泌始引西湖作六井民足水故井邑日富及白居易復浚西湖放水入運河自河入田所溉至千頃然湖水多葑自唐及錢氏嵗輒開治故湖水足用近嵗廢而不理至是湖中葑田積二十五萬餘丈而水無幾運河失湖水之利則取給於潮潮水渾濁多淤河行闤闠中三年一淘為市井大患而六井亦幾廢軾始至濬茆山鹽橋二河以茆山一河専受江潮以鹽橋一河専受湖水造堰閘以為潮水蓄泄之限然後潮不入市且以餘力復治六井民稍獲其利軾間至湖上周視良久曰今欲去葑田葑田如雲將安所置之湖南北三十里環湖往來終日不逹若取葑田積之湖中而行者便矣人喜種菱若種菱收其利以備修湖則湖當不復堙塞乃取救荒之餘得錢糧以貫石數者萬復請於朝得度牒半百以募役者堤成植芙蓉楊柳其上望之如圗畫杭人名之蘇公堤軾墓志云僧度牒百今從政目宥州牒保安軍蘭州地界如前月令保安軍再牒㑹熙州政目五月事是月范祖禹對邇英劄子言臣伏見仁宗皇帝慶厯元年七月出御製觀文鍳古圗記以示輔臣皇祐元年十一月御崇政殿召近臣三館臺諌官及宗室觀三朝訓鍳圗臣竊以古之帝王常觀圗史以自戒仁宗皇帝講學之外為圗鍳古不忘針警以養聖心又圗寫三朝事迹欲子孫知祖宗之功烈如目覩之二圗皆嘗頒賜臣僚禁中必有本臣願陛下以永日觀書之暇閒覽此圗可以見前代帝王美惡之迹知祖宗創業之艱難不惟有所戒勸易於記省亦好學不倦之一端也侍御史孫升言臣聞之書曰咸有一德克享天心說者謂君臣皆有純一之德則天心享之矣若君謹守法度而臣有僣差上推至誠而下或䝉暗則亦未獲天心之享也洪範五事之咎徴則曰䝉恆風若僣恆暘若久旱不雨謂之恆暘暴風無節謂之恆風然則䝉者下有䝉暗而上不知則亦謂之䝉臣有僣差而君不治則亦謂之僣天心之所以愛人君而為之戒告丁寧反覆如此臣竊以陛下委任大臣謹守法度憂念元元至誠惻怛可以格於穹昊無難然自春以來雨澤愆期暴風無節祈禱益䖍而亢陽曰甚未副焦勞之意者何哉五年春旱二月癸卯禱雨嶽瀆自去冬無雪至五月壬申始雨蓋政事之失而天變為之應若合符節臣愚以謂今日䝉暗之咎不在上而在下僣差之咎不在君而在臣何以言之北京去闕庭無數驛而回河之役陛下决以為不可而罷之遂又興减水之役蓋名為减水實作回河五年二月四日吳安持提舉修减水河近日北京留守與本路轉運司奏論暑字坊截河堤與止水鋸牙之患乃回河之具也咫尺闕庭公然欺罔陛下有所不知况四方萬里之弊害乎豈非下有䝉暗之咎耶尚書省乃天下四方取則之地而都司官吏壞法亂紀違條冒賞擅擬特㫖不申中書大臣重惜私恩廢格公議罪惡顯著力為主張昵於貴近陛下從而不治則內外百司四方郡縣習為亂法何以制之乎豈非臣有僣差之咎耶恭惟陛下推至誠守法度而臣下䝉暗僣差以纍聖明之德此天之所以告戒開悟陛下之意也伏望陛下廣耳目以消䝉暗之患明威令以正僣差之罪下以慰中外之公言上以答皇天之告戒則天下幸甚此章不得其時附見五月末升又言回河事曰臣竊以昔人謂謀從衆則合天心自古及今未有人謀不同而天應之者也今回河之役論者紛然是非不一乃以順復為符應臣實疑之且大河本因漲水衝溢遂决梁村口約水以入孫村故道大河之勢未分而東流之口已淤矣河勢因上流進約遂著沙堤直堤既决壅蓄漲流若簽堤不可捍則北都遂危又開順水堤兩口以舒其急雖漲流初泄其勢由孫村而東然霜降水落之後孫村之口果自東流乎此未見順復之理明矣茍以順復為符應以示必行回河之議則人將無敢言者而愚臣區區竊以為未見萬全之畫也何則竭四海之力委萬人之命損不可資之費以幸萬有一成之功固已危矣又况論者之不一也方今天下無事內外晏然而遽興大役以擾民耗國既不僉諧人謀而乃假託天意其始順流則推之於天其終敗事將歸之於神而人不任其責矣此愚臣所以為疑而中外之所甚憂也伏望聖慈更加審察博采羣臣僉諧衆議或下尚書省集議或再選公忠不倚之臣與安撫轉運提刑司按視同共保明利害待萬全而舉之則天下幸甚貼黃李偉吳安持等議者謂未嘗令結伏罪狀委得不至敗事故敢輕肆狂圗愚臣以謂事之可否由朝廷主行茍不謹於謀始雖殺輕狷小臣何補於國哉實録於三月二日書吳安持奏信水向生可考實録於三月八日載升乞罷黜偉及安持已見三月初三日又言臣伏見北京留守司奏准四月九日敇節文於內黃第一掃第三鋪地分荒字號坊內修打遮欄槐花村一帶披攤出岸漫水小堰一道至闞村物料場西僉合留守司勘㑹昨來回河係修河司措置先於西岸閉斷闞村陽邵樊河三河門并置立暑字坊截河堤及修置指水鋸牙馬頭欄劈大河水勢正指本府東岸契勘已前年分西岸未有槐花村修打堤堰時漫水向北行流尚自去年沙河直堤抹岸刷成口子水勢湍緊簽堤橫堤大假危急其口子後來展塌已及九百餘步今來若更於西岸修打堤堰截却漫水更不向北行流顯見劈欄水勢一布東注衝刷府城之上簽橫順水等堤為害不細伏望朝廷詳酌下都水監住罷更不修打上件堤堰免致府城被水者朝廷下都水監勘當本監止憑一管勾惠民河王景申述不致為害遂為允當回報朝廷乞依王景所申臣竊以大河利害為國重事北京輕重所繫一方而都水使者未嘗躬親行視端坐都城止據管勾惠民河王景所說便以為據殊不思北京所繫輕重而馮京為國大臣當方靣之寄自任憂責茍非事切豈敢奏陳今來都水監官輕忽國事乃至如此若大河漲水東如北京留守司所奏為害北都雖誅百千王景且復何補伏望聖慈詳酌特降指揮令都水使者躬親前去相度如槐花堤委是將來漲水於北京不至為害具詣實保明聞奏庶其身當責任不敢輕忽貼黃朝廷分設寺監皆以卿少命官獨都水謂之使者蓋都水之事非躬行按視不可故其長以使者命之豈有大河利害端坐都城止取一惠民河使臣文狀便以為據回申朝廷利害之責將誰任又言臣竊以河朔州縣為國肘腋朝廷所宜加惠而大河為患者纍年於兹矣不可不為之救治也然自興回河之役議者紛然是非不一蓋言其可回而有利者少指其不可回而為害者多此愚臣所以為疑而嘗力言之矣恭惟聖聽亦不能無疑也古者有大疑則謀及乃心謀及卿士謀及庶人謀及卜筮自古及今未有衆謀不同而能成大事者也今回河之役可謂大事矣然朝廷所信者李偉吳安持二人爾使偉與安持皆忠信厚重之君子猶恐其有偏蔽之患况二人利口輕狷見利忘義吳居厚興鐵冶於京東殘民傷國者偉之謀也市易之罔上壞法害及公私者安持之力也以河北轉運使謝卿材誠實有守河北都轉運使范子竒精敏喜功卿材子竒既當付委之重親見利害之實豈敢固違朝廷㫖意而與二人者異論乎彼必審所擇矣臣聞自卿材與子竒因異議而罷一路官吏吞聲屏息無復敢言不獨河北官吏如此今朝廷士大夫莫不以言回河為諱豈有謀大利興大役而固執一偏塗衆人之耳目蔽塞其議論以幸萬一之成甚可怪也古人言為水者决之使導為民者宣之使言又曰防民之口甚於防川水壅而潰傷人必多民庶之言且不可壅况士大夫之議論乎伏望聖慈特降指揮應曾經歷河事臣僚並令實封詳具大河經久利害詣實聞奏又詔河北州縣臣庶應有諳知大河利害並許實封於所在官司投進然後朝廷博采衆議審擇可否選委忠實審練通逹世務一二近臣與本路安撫轉運提刑司同共相度保明待萬全而舉之則庶幾有成也伏望少留聖聽則天下幸甚卿材自河北徙河東在四年八月十二日子竒還河東在十月二十三日恐升奏此必不在五年更詳考之
