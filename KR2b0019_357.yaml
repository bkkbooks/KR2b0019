body:
  text: 續資治通鑑長編卷三百五十三宋李燾撰哲宗元豐八年三月乙未大赦天下其赦法用第二等兩紀並書赦天下差官禱於天地宗廟社稷諸陵新紀書遣官禱於天地宗廟社稷諸陵舊紀不書丁酉皇太后遣勾當御藥院梁從政問王圭等欲以溫州僧道親前年所進龍夀丹進皇帝卿等議其可否圭等言今疾勢如此醫工束手無如之何尚冀此藥靈異萬一有效因以進御然亦無及也初元豐五年秋上不豫道親詣尚書省自陳前年在鴈蕩山巖崖間逢一老人自上而下與道親語付藥一丸其大如彈曰爾速入京以進皇帝此藥以萬嵗藤膏熬成可以金盂玉鉢研之日三服三日九服此可保九九之數藥名龍夀丹道親得之數月未行再於山林遇之仍趣其行比至都已聞上不豫依老人語不敢隱避尚書省異之不敢受其狀後因奏事言及之上命從政取其狀并藥及問所欲道親云見老人但戒進藥仍言乞濟拯孤窮禁天下勿捕龜又乞太嵗本命四立日節酒藥此外無所需也上遣從政至鴈蕩山燒香為名訪之無所見示皇太后遣人于睿思殿求得之藥與道親二狀皆上手自封題其言九九上即位至是十八年又云四立日節酒藥上以立春日得疾云命吏部尚書曽孝寬為䇿立皇太子禮儀使翰林學士鄧潤甫撰册文户部尚書王存書册文禮部尚書韓忠彥書寶王性之默記神宗初即位慨然有取山後之志滕章敏首被擢用所以東坡詩云先帝知公早虛懷第一人蓋欲委滕公以天下之事也一日語及遼事曰太宗自燕京城下軍潰遼兵追之僅得脫凡行在服御寶器盡為所奪從人宫嬪盡陷沒上股中兩箭嵗嵗必發其棄天下竟以箭瘡發云蓋遼人乃不共戴天之讐反捐金繒數十萬且事之為叔父為人子孫當如是乎已而泣下久之蓋已有取遼大志其後永樂靈州之敗故鬱鬱不樂者尤甚愴聖志之不就也章敏公為先子言戊戍上崩於福寧殿宰臣王圭讀遺制哲宗即皇帝位尊皇太后為太皇太后皇后為皇太后德妃朱氏為皇太妃應軍國事並太皇太后權同處分依章獻眀肅皇后故事如向來典禮有所闕失命有司更加討論史臣曰上聰眀英睿天性孝友事兩宫竭誠盡力天下稱孝慈聖光獻太后之喪哀毁過甚既除喪思慕不已嵗時酌獻每至繼仁殿必哭哀動羣臣禮遇皇后宫廷肅正親愛二弟無纎毫之間終上之世乃出居外第待諸公主宗室恩意篤備聖學髙逺言必據經深造道德之藴而詳於度數每論經史多出人意表間日一御邇英講讀雖風雨不易禁中觀書或至夜分在東宫素聞王安石有重名熙寧初擢輔政虛已以聽之安石更定法令中外爭言不便上亦疑之而安石堅持之不肯變其後天下終以為不便上亦不専信任安石不自得求引去遂八年不復召然恩顧不衰司馬光吕公著雖議論終不合而極口稱其賢勵精求治如恐不及總覽萬務小大必親遇休暇猶間御殿決事或日昃不暇食至兩宫遣人趣之侍臣有以為言者上曰朕享天下之奉非喜勞惡逸誠欲以此勤報之也將定官制獨處閣中考求沿革一年而成人皆不知雖治尚嚴整知勇果斷而造次必以仁恕羣臣進見顧問或不能對上恐其失次輒顧而言他有忤意者雖甚不樂終保全之每當用兵或終夜不寢邉奏絡繹手札處畫號令諸將丁寧詳密授以成算雖千里外上自節制機神鑒察無所遁情恩威相濟人不敢不盡力如李憲張誠一輩雖甚親用然未嘗一日弛其銜策無不畏上之威眀而莫敢肆欲先取靈夏滅西羌乃圖北伐積粟塞上數千萬石多儲兵器以待及永樂陷沒知用兵之難於是亦息意征伐矣在位十有九載興為建立法三代由漢以下陋而不取而謙沖退讓去華務實終身不受尊號此誠帝王之盛德也紹聖史官簽貼云前史官所記聖德為未盡臣等掇其大者具於卷末所不次者候修正史隨事而録又移修官制事入職官志正史職官志今無墨本所書飛蟲事入一百三十三卷元豐二年五月六日不聽趙卨言入棄廣源州處元豐三年十月十三日放北界馬入契丹傳附元豐元年十二月五日今正史契丹傳亦無此其卷末所書今兩存之是非故不待辨而後眀也紹聖本云上睿哲仁孝自在藩邸一無所嗜好而獨刻意於問學微旨奧義從容自得雖老師宿儒莫敢望嘗以為先王之迹息滅時君世主祖述不及三代其施為卑陋不足法自初嗣服慨然思以其所學逺者大者措之於天下見歷世之弊欲變通之患流俗蒙蔽以在位之臣無足與計者一見王安石即知其可用遂任以政而不奪於讒邪之口立政造令悉法先王典謨所載風雅所歌實稽之以決事操之以驗物其所建立非近世所習見故皆言令不便上取成於心理之所在無復回遹去壬人而國是定修政事而財用理損資格以任賢使能核名實以彰善疸惡天下擴然大變當是時韓琦富弼曽公亮歐陽修吕公著司馬光吕晦與蘇軾蘇轍之徒羣起而非之以本業賑貸為取利以出泉而祿庶人之在官者為橫賦以修泉府之政為侵商賈以遣使道主意為擾民以救弊更法為變常以君臣相與為失威福之柄上舍己從衆以理反覆諭琦等而光晦軾轍之徒終迷不返遂疏不用然聞一善優容開納言者雖甚狂忤不以為罪博採兼聽惟恐不及故拔王韶於片言盡復河湟故地數年間百度修舉吏習而民安之乃什伍丁壯教以武事追比閭族黨之制興置學校迪以經術復鄉舉里選之法亹亹乎向三代之盛矣惜乎志業未就而遽上賔譬猶四時之運方睹春夏之敷榮而未及乎秋冬之成物也其事兩宫竭盡誠志有匹夫不能為者友愛二弟盡家人之歡纍請居外第終不許則其正心誠意修身齊家文足以經緯武足以震服御衆之寬臨政之勤操利勢而坐制萬里之外前世帝王有一於此為甚盛德而上兼有之嗚呼聖矣哉王眀清玉照新志神廟聖意鋭於圖治熙寧之政既一切變更法度開邊之議遂興洮河成功梅山拓地然後經理西南小羌韓存寶以僨績誅繼而永樂大衄徐禧之徒死之繇是耻於用兵上亦鬱陶成疾元祐初政廟堂諸公共議捐其所取紹聖崇寧紹述之説舉竄逐棄地之柄臣取青唐進築湟鄯銀夏至童貫蔡攸乃啓燕雲之役馴至靖康之禍悉本二字紹述思之令人痛心疾首焉殿前副都指揮使燕逹乞守宿內東門外從之諸門增兵防與神宗即位時悉同惟燕逹乞守宿內東門外前此未有也舊録燕逹傳因載神宗寢疾益甚會蔡確母入禁中皇后使諭確外託主兵官燕逹等輔立皇太子逮神考升遐宿衛於內東門百官朝晡臨繇垂拱殿入皇族親王繇內東門逹謂人曰天子新即位我坐甲於此以備非常萬一有姦人隨皇族而入則事起不測又豈能人人辨之將入上奏人或止之曰皇族之事非所當言言之恐被罪達曰我蒙先帝大恩拔擢常在衆先言之茍當死何害遂奏上大臣嘉歎之紹興史官辨誣曰蔡確誣謗事朝廷已追正其罪託燕逹輔立太子事合刪去密記三月五日燕逹奏差殿前指揮使六十人赴內東門坐甲合親詣守奉旨依應是達創有陳情非舊例也又以閣門通事舍人朱伯材部禁兵五十人於軍器庫前巡察增兵防至成服罷此故事也惟燕達守宿內東門外及朱伯材巡察軍器庫前則故事並無有此殆蔡確邢恕等邪謀與蔡京領劊子携劍入內庭相類更須考詳朱伯材巡察密記亦具載陳國長公主卒近侍不即聞先以求醫為請太皇太后曰無紿我昨夢慈聖光獻皇后大行皇帝及主宴廣殿固疑非祥也追封燕國大長公主諡惠和己亥大赦天下如故事緣邉官吏禁戢軍民毋令侵擾外界務要盡守疆埸命閣門通事舍人宋球告哀于遼權改名淵庚子以宰臣王圭為山陵使尊皇太后為太皇太后皇后為皇太后德妃朱氏為皇太妃尊太皇太后五日遺制七日乃奉行故兩存之詔在內坐甲及內外創添守把捉門兵級今月十三日放罷又詔內東門司坐甲內侍省使臣殿前指揮使人員及內外創添巡檢守把捉門兵級親從親事官並賜茶酒錢有差此樞密院時政記初七日事今掇取前附本日要考創添因依辛丑羣臣詣閣門上表請皇帝聽政又詣內東門請太皇太后聽政皆批答不允自是表三上從之詔開修京城壕人夫及製造軍器兵匠滿三千者各遣歸所屬州仍賜錢有差內侍押班梁從吉劉有方為入內押班帶御器械趙世良為內侍押班左班殿直李溱為內殿崇班賞戰功也壬寅景福殿使宣州觀察使李憲復領武信軍留後四方館使榮州團練使王文郁為引進使榮州團練使東上閣門使嘉州刺史康識領榮州團練使東頭供奉官宋安道為內殿崇班蕃官皇城使忠州刺史羅凌領康州團練使皇城使曹稜稜領嘉州刺史皇城使阿克密領昌州刺史前此憲率師渡河討西夏自瑞巴普克掄井羅噶爾轉戰斬首四千七百餘級獲牛羊駝馬器甲凡八萬餘至是賞之憲舊傳云賊再舉不捷諸將以為無復事矣憲曰賊之不得志於我也歸無以藉手將伺我怠以輕騎出吾不意未幾諜有告點集者憲選精甲萬騎遣其子從諸將渡大河行五百里與賊遇一戰破之斬四千餘級牛馬器械以數萬計幕府上功將佐遷官三等憲狀未列會臺劾皇甫旦獄坐責新傳云諜有告點集者選精騎渡河與賊遇破之幕府上功將佐遷官三等不載憲語要是不足載也新傳又載皇甫旦獄事與舊傳不同已具三月一日按憲以三月一日奪武信留後此月九日復武信留後而新舊傳俱不載可謂踈略矣舊傳云憲狀未列此説謬矣癸卯詔賜內直長上諸班緡錢有差乙巳樞密院言皇城使登州防禦使陳州鈐轄令晏等一十八員皆以宗室換授外官嘉祐治平年例無遺賜詔各依宗室官序支賜太常寺言治平四年故事山陵前宗廟輟祭享遇朔望以內臣行薦食之禮俟祔廟畢仍舊今景靈宫神御殿已行上食其太廟朔望薦食自當寢罷從之丙午分遣使臣二十一人齎詔告諭諸道詔三省樞密院各歸治事更不止宿御集十二日詔自十三日後更不止宿丁未詔尚書省權於門下中書省治事己酉以皇帝即位分遣三省官奏告天地社稷宗廟內臣分詣諸神祠壬子詔應該登極赦官員犯自盜贓已上及強盜凶惡餘犯巨蠧者並令具案以聞禮部言大行皇帝山陵宜依治平四年故事靈駕所經由地分及西京城內俟神主到京日方許開樂從之甲寅上御迎陽門聽政見百官瞻大行皇帝像於集英殿宰臣等及文臣御史武臣橫行已上以次升殿舉哭盡哀而退乙卯三省樞密院言按儀注未釋服已前遇隻日皇帝御迎陽門日參官並赴起居依例奏事每五日遇隻日於迎陽門垂簾皇帝坐於簾內之北宰臣執政官升殿奏事權屏去左右侍衛有機速公事並許非時請對及賜宣召禮部御史臺閣門奏討論故事詳定御殿及垂簾儀每朔望六參皇帝御前殿百官起居三省樞密院奏事應見謝辭班退各令詣內東門進榜子皇帝雙日御延和殿垂簾日參官起居太皇太后移班少西起居皇帝並再拜三省樞密院奏事三日以上四拜不舞蹈候祔廟畢起居如常儀簾前通事以內侍殿下以閣門凡軍頭司引呈公事可以權付有司者續具條奏吏部磨勘奏舉人垂簾日引應見謝辭臣僚遇朔望參日不坐並先詣殿門次內東門應臺賜者並門賜從之丙辰上御迎陽門幄殿同太皇太后垂簾宰臣親王已下合班起居常制分一十六班至是合班以閣門奏請故也戊午羣臣上表請御正殿批答不允表三上乃從之己未太中大夫知樞密事韓縝門下侍郎章惇中書侍郎張璪同知樞密院事安燾並為通議大夫中大夫尚書左丞李清臣為太中大夫詔雍王皓曹王頵賜贊拜不名五日一朝見如大長公主之儀詔李憲已罷入內副都知其見領職任並改差入內押班梁從吉詔太皇太后父魯王遵甫宜避名下一字餘依章獻眀肅皇后故事中書省奏應今年正月九日赦前衝替人並以事理輕重遞減其差替者並與差遣赦前衝替而赦後定輕重者準此其三月二日六日兩次赦前犯者並依此遞減從之刑部言敘用人不得併敘兩官今來連遇三赦乞依赦敘用便與盡三赦合敘之官從之兵部侍郎許將給事中兼侍講陸佃祕書少監孫覺並權知貢舉以遺火再試也樞密院言欲自今年降下緣邉事稍重者並與三省同進呈從之大行皇帝遺賜西蕃董戩金帶錦衣銀帛茶等令李憲以蕃字書選使臣齎賜庚申銀青光祿大夫守尚書左僕射兼門下侍郎郇國公王圭為金紫光祿大夫進封岐國公太中大夫守尚書右僕射兼中書侍郎蔡確為通議大夫泰寧鎮海等軍節度使守司空開府儀同三司雍王皓為成德橫海等軍節度使進封揚王保信保靜等軍節度使守司空開府儀同三司曹王頵為武昌武安等軍節度使進封荆王並加守太保皇弟鎮寧軍節度使檢校太尉寧國公佶進封遂寧郡王山南東道節度使檢校太尉儀國公佖進封大寧郡王定武軍節度使檢校太尉成國公俁進封咸寧郡王集慶軍節度使檢校太尉和國公似進封普寧郡王並拜開府儀同三司中太一宫護國節度使守司徒開府儀同三司濟陽郡王曹佾守太保殿前副都指揮使武康節度使燕達為殿前都指揮使建雄軍節度使知河南府韓絳為鎮江軍節度使進封康國公觀文殿大學士集禧觀使特進荆國公王安石守司空羣臣皆敘遷如制詔以登位賜致仕前宰相守太師潞國公文彥博前執政宣徽南院使太子少師張方平觀文殿學士知河陽馮京觀文殿學士提舉崇福宫孫固資政殿大學士知揚州吕公著資政殿學士知太原府吕惠卿資政殿學士知亳州蒲宗孟端眀殿學士知江寧府王安禮寬衣金帶銀帛有差新舊録於辛酉二十八日並載詔孟子同顔回配享文宣王荀况揚雄韓愈同左邱眀從祀令學士院修撰贊文按此己見七年五月二十四日今並削去壬戍刑部言差使借差殿侍停降并軍員降配雖非命官緣各有敘法係赦書該説不盡欲乞並與三次赦恩例期而收敘從之初司馬光四任提舉崇福宫既滿不敢赴闕再乞西京留司御史臺或國子監未報會神宗崩光欲入臨又避嫌不敢已而聞觀文殿學士孫固資政殿學士韓維皆集闕下時程皓在洛亦勸光行乃從之衛士見光皆以手加額曰此司馬相公也民爭擁光馬呼曰公無歸洛留相天子活百姓所在數千人聚觀之光懼會放辭謝遂徑歸洛講義曰所貴乎大臣者非以其有過天下之材智也必其有服天下之德望也王安石所以變舊法之易者以其虛名實行足以取信于人司馬光所以改新法之易者以其居洛十五年天下皆期之為宰相也安石其權臣溫公其重臣歟太皇太后聞之詰問主者遣內侍梁惟簡勞光問所當先者光乃上疏曰臣聞周易天地交則為泰不交則為否君父天也臣民地也是故君降心以訪問臣竭誠以獻替則庶政修治邦家乂安君惡逆耳之言臣營便身之計則下情壅蔽衆心離叛自生民以來未有不由斯道者也夫猶岐路近差跬步逺失千里今皇帝陛下新臨大寶德性髙眀太皇太后同斷萬幾聖謨光大初發號令不可不謹此乃治亂之岐塗安危之所分也當以切要為先以瑣細為後臣竊見近年以來風俗頺弊士大夫以偷合茍容為智以危言正論為狂是致下情蔽而不上通上恩壅而不下逹閭閻愁苦痛心疾首而上不得知眀主憂勤宵衣旰食而下無所訴公私兩困盜賊已繁猶賴上帝垂休嵗不大飢祖宗貽謀人無異志不然者天下之勢可不為之寒心乎此皆罪在羣臣愚民無知往往怨歸先帝此臣所以日夜憤痛焦心泣血不顧死亡思有開發於朝廷者也臣愚以為今日所宜先者莫若眀下詔書廣開言路不以有官無官之人應有知朝廷闕失及民間之疾苦者並許進實封狀盡情極言仍頒下諸路州軍於所在要閙處出榜曉示在京則於鼓院檢院投下委主判官畫時進入在外則於州軍投下委長吏即日附遞奏聞皆不得取責副本強有抑退其百姓無産業人慮有姦詐責保知在奏取指揮放令逐便然後望陛下以聽政之暇略賜省覽其義理精當者即施行其言而顯擢其人其次取其所長捨其所短其狂愚鄙陋無可採取者報聞罷去亦不加罪如此則嘉言日進羣情無隱陛下雖深居九重四海之事如指諸掌舉措施為惟陛下所欲斯乃治安之源太平之基也陛下若以臣言為可取伏乞決自聖意下學士院草詔書施行羣臣若有沮難者其人必有姦惡畏人指陳専欲壅蔽聰眀此不可不察也光録云神宗崩光請入臨人駭其來知其必用此誣辭也程皓勸光入臨據邵伯溫辨誣餘則據光集並雜傳及行狀神道碑
