body:
  text: 續資治通鑑長編卷二十二宋李燾撰太宗太平興國六年春正月庚子朔御乾元殿受朝癸卯以保塞軍為保州以梁門口寨為靜戎軍乙巳詔曰百里之長字民之要官也今縣邑廣而闕貟多選曹拘以常調歷年未補非所以振淹恤惠吾民也適變通方冝從新制其令諸路轉運使下所屬州令長吏擇其見任判司簿尉之清亷明幹者具以名聞當驛召引對授以知縣之任焉辛亥易州言破契丹數千衆斬首三百級馬五百匹器甲以千數乙卯建易州大保寨為平寨軍實録又於此月丙寅書改靜戎軍為靜安軍按周顯德二年三月辛未於深州下博縣李晏口置靜安軍雍熙二年軍始廢自周置軍即名靜安未嘗更名靜戎也或者靜安亦嘗更名靜戎而史失不記及是别置靜戎軍於梁門寨乃還靜安故名耶會要與實録同然都不記改靜安為靜戎在何時恐實録會要相承致誤今削去不書丁卯令諸道轉運使察訪部內官吏有履行著聞政術尤最及文學茂異者各舉二人是月遣八作使郝守濬等分行河道抵于敵境皆疏導之又於清逺界開徐河雞距河五十里入白河由是關南之漕悉通濟焉此據河渠志三交西北三百里地名固軍溪谷險絶敵之所保多由此入冦潘美潛師襲之敵棄城遁軍吏安慶以其族來降因積粟屯兵守之自是敵不敢侵軼邉民以安安慶來降實録無之據潘美行狀乃六年正月事今附月末徐度國紀繫之四年八月癸亥又云三交口即固軍誤也二月癸巳詔曰古者懋建庶官分治百職考其幽明之狀以申黜陟之典今則無聞焉故京朝官釐務於外者咸給以御前印紙令書治迹而三司不能彰明臧否但以細碎之事混淆其間非所以副朕詳求之意也自今循常之務非課最者不得書為勞績其殿犯無有所隱丁酉令羣臣居喪被詔起復者須卒哭朝謁其俸料自詔下日給之國初以供奉官殿直承旨為三班𨽻宣徽院三班多貴族子弟豪縱徼幸未立程凖而奉使者多訴勞逸不均是月始命御厨副使洛陽楊守素等點檢三班公事權以內客省使廳事為局總其名籍差定其職任考其殿最焉此據會要及楊守一傳也實録于雍熙四年七月庚辰書詔置三班院以蔚進掌其事然後書三班訴勞逸不均蓋誤也東京官賣麯斤為錢二百詔減五十三月丁未令諸司職掌自今遷轉只於本房本司無得越局己酉山南西道節度使同平章事德芳卒年二十三贈中書令追封岐王諡康惠癸丑詔曰峽路轉運使言知渝州路憲知開州郤士堯知逹州張元等弛慢不治並已衝替宜令諸路轉運使察部下官吏有罷軟不勝任怠慢不親事及瀆貨擾民者條其事狀以聞當遣使按鞫其清白自守幹局不苛亦以名聞必加殊奬丙辰以霸州淤口寨為破敵軍雄州親鎮為平戎軍丁巳髙昌國王阿爾斯蘭汗始自稱西州外生師子王遣都督邁遜來貢方物戊午通逺軍使羅州刺史董遵誨卒詔遣中使護其喪歸葬京師賻賵加等録遵誨子嗣榮為殿直己未以淮南節度副使崔仁冀為衛尉卿淮南王俶言其才可用故也交州行營言破賊軍萬五千衆於白藤江口斬首千餘級獲戰艦二百艘甲鎧以萬計於是侯仁寶率前軍先進孫全興等頓兵花步七十日以俟劉澄仁寶屢促之不行及澄至并軍由水路抵多羅村不遇賊復擅還花步賊詐降以誘仁寶仁寶信之遂為所害有二敗卒先至邑市奪民錢轉運使周渭捕斬之後至者悉令解甲以入民乃安時諸軍冒炎瘴又多死者轉運使許仲宣馳奏仁寶戰沒且乞班師不待報即分屯諸州開庫賞賜給其醫藥謂人曰若俟報則此數萬人皆積尸於廣野矣乃上章自劾詔書嘉納之遣使召劾澄等會王僎病死澄與賈湜並戮於雍州市徴全興等下獄全興伏誅陳欽祚郝守濬崔亮皆責授團練副使欽祚慶州守濬磁州亮嵐州贈仁寶工部侍郎官其二子孫全興伏誅陳欽祚等責降實録在十一月丁巳侯仁寶贈官在明年二月庚寅獨不知戮劉澄等是何月日今并書于此詔諸州大獄長吏不親決胥吏旁緣為姦逮捕證左滋蔓踰年而獄具自今長吏每五日一慮囚情得者即決之上不欲天下有滯獄乃建三限之制大事四十日中事二十日小事十日不須追捕而易決者無過三日三限别本實録繫之五月丙辰今從本志又詔囚當訊掠則集官屬同問勿委胥吏榜決别本實録在四月丁丑今從本志附三限後夏四月戊辰廢湖州織羅放女工五十八人辛未幸太平興國寺相國寺禱雨上躬親聽斷京城諸司獄有疑者多臨決之是嵗自春涉夏不雨上意獄訟有寃濫會歸德軍節度推官李承信市蔥有爛者笞園户病創數日死己卯承信坐棄市丙戍高麗國遣使來貢方物禁東西川諸州白衣巫師五月辛丑契丹以七千人入冦平寨軍守將擊走之所殺獲甚衆詔褒之此據别本實録恐即是六月丙子所奏也然别本特以為二事當考詳癸丑令內侍省細仗內先衣黃者並衣碧吏部黃衣選人改為白衣選人甲寅遣供奉官王延德殿前承旨白尚勳使髙昌己未德音降死罪囚流以下釋之禱而雨故也太子中允潘昭緯知天長軍擅增價鬻官茶為商人所訴乙丑昭緯坐除籍為民六月甲戍贈太尉中書令諡文惠司空同平章事薛居正卒居正風度瓌偉操行方正為相任寬簡不苛察士君子以此多之其妻悍妬不生育惟吉其養子也有勇力不習文與沈繼宗等俱拜官獨授諸衛將軍喜聲色交遊非類居正不能止於是上臨其喪出涕其妻拜於喪側上存撫數四素知惟吉之行因問不肖子安在頗改節否恐不能負荷先業奈何惟吉伏喪側聞之驚懼愧赧不起自是盡革故態謝絶素與交遊者居喪甚得禮既而多延接賢士大夫亦稍涉獵書史上知其修飾故數委以大藩所至稱治纍遷左千牛衛大將軍遭母喪故事卒哭當起復惟吉懇求終制優詔不許時論異之丙子平塞軍言破契丹萬餘衆此據實録别本實録亦同恐即五月辛丑日事本紀無之當考秋七月丙申朔延州言大水溢入城壞官寺民舍千六百區上將大舉伐契丹遣使賜渤海王詔書令發兵以應王師其略云聞爾國本是大藩近年頗為契丹所制爾迫于凶醜屈膝事之讒慝滋多誅求無已雖欲報怨力且不能所宜盡出族帳助豫攻取俟其剪滅當行封賞幽薊土宇復歸中朝沙漠之外悉以相與然渤海竟無至者河中府鄜州皆言大水乙卯嵐州言戎人五十三户三百六十三口內附遣戍卒迎之為敵騎所邀因擊破其衆斬首十七級初上幸大名彰德節度使李漢瓊以鎮州兵馬鈐轄見于行在陳計策頗合上意即日命為滄州都部署賜戰馬金甲寶劍戎具以寵之於是被疾召還京師八月乙丑朔上親幸其第問勞賜白金萬兩及卒贈中書令漢瓊無嗣上聘其女為皇第四子德嚴夫人漢瓊為滄州都部署實録不載今附見皇子德嚴後改名元份庚午詔免兩浙東北路轉運使王德裔仍削兩任追先所賜白金千兩坐簡慢不親事部內不治也寧州言大水乙酉詔諸道知州通判知軍監縣及監𣙜物務官任內地滿三年川廣福建滿四年者並與除代詔州縣官坐事配流諸州者改𨽻京百京按此條疑有脫誤九月乙未朔日有食之舊制賜勑葬者皆內諸司供帳或言其不便戊戍始令所在州府以官錢賃僦東上閣門使程德元攀附至近列上頗信任之衆多趨其門或言其交結太盛庚子出為崇信行軍司馬别本云坐懈于事而不副所任今不取先是中書請以著作郎洪雅田錫為京西北路轉運判官錫不樂外職拜表乞居諌署且獻升平詩三十章上悅之翌日改授右拾遺直史館時盧多遜専大政有司受羣臣章奏不先稟多遜則不敢通錫初從幸大名欲獻平戎歌多遜許之始得進御又嘗詣閣門獻書請皇帝東封其書不實封且言已白多遜閣門吏乃受其書又令錫依常式署狀云不敢妄陳利便希望恩榮錫自念有言責欲關説于上猶如此委曲事體非便乃貽書多遜乞自今諌官上章勿令閣門署具狀多遜不悅壬寅以錫為河北南路轉運副使錫因入辭直進封事曰國史田錫傳載諌官閣門署狀書云獻趙普真宗實録亦云謹按普復入相乃六年九月辛亥在錫為河北轉運後凡十日又實録載錫所獻書比本傳尤詳書言從駕漳州及二月十六日請皇帝東封皆非普當國時明甚書又言相公佐先帝取吳越事今上平并汾其稱多遜亦明甚不知兩朝史官何以如此差誤也使趙普蒙此惡聲豈不寃乎今别取錫所著咸平集檢其謝敕書奬諭表獻宰相書升平感遇詩參考日月蓋錫自太平興國五年九月二十三日由著作郎除左拾遺直史館至今年八月十五日獻多遜書九月授河北轉運十三日入辭遂上封事十九日敕書奬諭但不記授河北轉運之日耳今據實録在壬寅初八日也其他則用錫書表等辭刪修仍略其日以便筆削按錫為諫官幾一年蓋未嘗言事詣閣門一再所獻皆歌頌盛德耳至是始敢直言故其升平感遇詩云皂囊初上聊供職也為諌官幾一年事之可言者固多矣而多遜逆閉其途雖有章疏亦不得通非因出使入辭實封直進御座則雖太宗之聖終亦不聞此也嗚呼姦臣之蠧國豈不甚哉臣職在針規理難循默敢獻軍國要機者一朝廷大體者四惟陛下留神察之夫賞不踰時國之令典頃嵗王師薄伐克平太原未賞軍功逮兹二載今范陽堅壁竊據強封獯鬻荐居不修朝聘若煩再駕固當用兵雖稟宸謀必資武力願陛下因郊禋耕藉之禮議平晉之功而賞之則駕馭戎臣莫兹為重此要機之一也按四年十月乙亥巳行太原之賞錫今猶以為言或者賞未遍及故也今交州未下戰士無功春秋謂老師費財兵書曰鈍兵挫鋭臣聞聖人不務廣疆土惟務廣德業聲教逺被自當來賓臣嘗讀韓詩外傳周成王時越裳九譯來貢周公問之曰本國天無迅風疾雨海不揚波三年矣意者中國有聖人盍往朝之是知不必加兵自然內附交州謂之瘴海得之如獲石田願陛下念征戍之勞思用度之廣愛人惜力無屯兵以費財修德服荒無略內以勤逺亟詔執事寬其誅鋤又何必蕞爾蠻陬勞於震怒此大體之一也案六典左右拾遺補闕掌供奉諷諫凡發令舉事有不便者小則上封大則廷爭給事中職在封駮詔書封謂封還不行駮謂駮正所失起居郎舍人立赤墀之上記録言動即古左右史之任也邇來諌官廢職制詔有所未當給事中不敢封還駮正遺補亦不貢直言其失起居郎舍人不得升陛紀言動聖朝美事或有所遺陛下德音或有不録又御史不能彈奏左右丞今尚闕員中書舍人典掌書命未聞訪之以事臣意其各有所蓄欲待顧問望因清燕召而詢之俾盡悃誠以觀器業又集賢院雖有書籍而無職官祕書省雖有職官而無圖籍伏讀去年九月丁未詔書戒勵百官並于朝堂習儀及委憲司糾察斯蓋復古道振朝綱然但見習儀未見舉職若職業各舉則威儀自嚴陛下擇才任之使各司其局此大體之二也今宇縣平寧京師富庶軍營馬監靡不恢崇佛寺道宫悉皆輪奐加又闢西苑廣御池雖周之靈囿漢之昆明未足為比唯尚書省前代所建湫隘尤甚郎曹無本局尚書無本廳官司相參何以區别至於九寺三監寓天街之兩廊狹室蕭然具體而已禮部無貢院每貢士就試或就武成王廟是豈太平之制度耶欲望别修省寺用列職官此大體之三也每於衢路頗見羈錮之囚荷以鐡枷不覺自駭案獄官令枷杻有長短鉗鎖有輕重尺寸斤兩並載刑書未有以鐡為枷者也昔唐太宗觀明堂圖見人之五臟皆麗於背遂減徒刑况隆平之時將措刑不用于法所無去之可矣此大體之四也即賜詔書曰省所上書陳古諷今有犯無隱居獻替之地揚蹇諤之風尋繹久之深所嘉尚然邦國之事抑有由焉朕以交趾稱藩代修職貢昨聞賊臣篡奪害其主帥之家聊舉師徒用申赴救非貪土地尋罷干戈京西間田勢本窪下不可樹藝止為汚瀦因而鑿池用停水潦戈船習戰可威外國調役軍卒不煩農民髠鉗之刑前王所用比之劓刖蓋有等差朕以昧死之囚貸其斷頸之戮遂設此法以全其生實免鈇鑕之誅且非炮烙之酷其餘申明經制皆是舊章方屬承平漸期振舉覽兹獻納嘉乃忠勤自今有所見聞無辭獻替斷之在獨出自朕躬勉於盡規以副虛佇因賜錢五十萬或謂錫曰今日之事鮮矣宜少晦以逺讒忌錫曰事君之誠惟恐不竭且天植其性豈一賞可奪耶至河北復驛書言邉事曰夫動靜之機不可妄舉動謂用兵靜謂持重應動而靜則養冦以生姦應靜而動則失時而敗事今北鄙繹騷蓋亦有以居邉任者規羊馬細利為捷矜捕斬小勝為功起釁召戎實由此始伏願申飭將帥謹固封守還所俘掠許通互市使河朔之民得務三農之業不出五載可積十年之儲前嵗俶擾邉陲親迂革輅今兹張皇聲勢頗動人心若玁狁來侵六龍夙駕烽煙既息萬乘方歸是皆失我幾先落其術內勞頓耗斁可勝言乎軍國大端固當謹始戎族未亂無煩強圖冦勢未衰何勞力取願考古道務恢逺猷示綏懷萬國之心用駕馭四夷之䇿事戒輒發理在深謀又謂安危之理不可輕言國家務大體求至理則安舍近謀逺勞而無功則危為君有常道為臣有常職是務大體也上不拒諫下不隱情是求至理也帝王之道忌萌欲心漢武帝躬秉武節遂登單于之臺唐太宗手結雨衣往伐遼東之國率義動之衆徇無厭之求輸常賦之財奉不急之役是捨近謀逺也沙漠窮荒得之無用蘖芽繁衍殺之更生是勞而無功也位卑秩下敢言者少言而見聽則進而無疑言而不從則退而懼罪又謂利害相生變易不定故兵書曰不能盡知用兵之害者不能盡知用兵之利蓋事有可進而退則害成之事至焉可退而進則利用之事去焉能審利害則為聰明以天下之耳聽則聰以天下之目視則明惟此聰明在無壅塞盡去相蒙之弊乃協先知之神又謂取捨不可以有惑思慮不可以不精國家圖燕以來兵連未解財用不得不耗人臣不得不憂恢復弔伐之名雖建洪業可否禍福之實宜留聖心願陛下精其思慮決其取舍無使曠日持久也據錫本傳錫為河北轉運即上此疏太宗嘉之按錫睦州所上疏具言六年九月十三日上疏蒙詔奬七年十二月十四日再上疏即不報不云别有此疏也然此疏若施之明年十二月則似元不知十月癸亥巳降詔戒邉臣侵掠錫方守大名理不應爾疑錫所言不報者必有别疏指陳他事而非此疏也按十月癸亥詔則此疏固亦暗合又何必云逹與不逹行與未行乎范仲淹志錫墓云在河北及湘州纍章論邉事此可證錫所上不但此二疏也今姑從本傳或附後疏於明年五月不知何據當考丙午詔應京朝官除兩省御史臺自少卿監以下奉使從政於外受代而歸者並令中書舍人郭贄膳部即中兼御史知雜事滕中正户部郎中雷德驤同考校勞績品量材器以中書所下闕員類能擬定引對而受之謂之差遣院按前代常參官自一品以下皆曰京官其未常參止曰未常參官今謂常參曰朝官祕書郎而下未常參者曰京官舊制京官有員數除授皆云替某官或云填見闕京官皆屬吏部每任三十月為滿嵗校其考第罷任取解赴集國初以來有權知及通判諸州軍監臨物務官無定員月限既滿有司住給俸料而見釐務者申牒有司復支所釐之務罷則已但不常參除授皆出中書不復由吏部至是與朝官悉差遣院主之太子太保趙普奉朝請纍年盧多遜益毁之鬱鬱不得志普遷太子太保正史實録及百官表並不記太宗所撰神道碑云既靜妖氛爰覃爵賞蓋普從征晉陽以功遷秩也當在太平興國四年冬十月行狀則云五年郊祀後遷太子太保今從行狀普子承宗娶燕國長公主女承宗適知潭州受詔歸闕成婚禮未踰月多遜白遣歸任普由是憤怒會如京使柴禹錫等告秦王廷美驕恣將有隂謀竊發上召問普普對曰臣願備樞軸以察姦變退復密奏臣開國舊臣為權幸所沮因言昭憲顧命及先朝自訴之事上於宫中訪得普前所上章并發金匱遂大感寤即留承宗京師召普謂曰人誰無過朕不待五十已盡知四十九年非矣辛亥以普為司徒兼侍中不待五十已知四十九年非此太宗盛德要語也今正史乃削去可不惜哉今依實録具載聖語實録又云即日復相恐未然正史稱未幾復相當得其實也丁謂談録又云上元夜召普觀燈即命為相亦與正史不合今不取始太祖傳位於上昭憲顧命也或曰昭憲及太祖本意蓋欲上復傳之廷美而廷美將復傳之德昭故上即位亟命廷美尹開封德恭授貴州防禦使實稱皇子皆緣昭憲及太祖意也德昭既不得其死德芳相繼夭絶廷美始不自安浸有邪謀他日上嘗以傳國意訪之趙普普曰太祖已誤陛下豈容再誤邪於是普復入相廷美遂得罪凡廷美所以得罪則普之為也王禹稱遺事云太祖孝於太后友愛兄弟曠古未有萬機之暇召晉王秦王秦王上弟宣祖第三子名廷美亦杜后所生今本傳言王是太宗乳母王氏所生非也其有旨哉及皇子南陽王德昭東平王德芳皆上子也及皇姪公主等共宴太后閣中酒酣上白太后曰臣百年後傳位於晉王令晉王百年後傳位於秦王后大喜曰吾久有此意而不欲言之吾欲萬世之下聞一婦人生三天子不謂天生孝子成吾之志令晉王秦王起謝之既而后謂二王曰陛下自布衣事周室常以力戰圖功萬死而遇一生方致身為節度使及受天命將逾一紀無日不征無月不戰歷盡艱危方成帝業汝輩無勞安坐而承丕緒豈不知幸乎久後各不得負陛下吾不知秦王百年後將付何人秦王曰願立南陽王德昭后又喜曰是矣是矣然則陛下有此意吾料之亦天意也他日各不得踰踰者罪同大逆天必殛之上又令皇子德昭謝太后太后又謂上曰可與吾呼趙普來令以今日之約作誓書與汝兄弟傳而收之仍令擇日告天地宗廟陛下可以行之否上即時如太后旨召趙普入宫令製文普辭以素不能為文遂召陶穀為文别日令普告天地宗廟而以誓書宣付晉王收之上崩興國初今上以書付秦王收之後秦王謀不軌王幽死書後入禁中不知所之上子南陽王尋亦坐事逼令自殺傳襲之約絶矣按禹稱遺事既與國史不同要不可信然廷美尹開封德恭授貴州防禦使頗與太宗傳位之迹略相似恐昭憲及太祖意或如此故司馬光記聞亦云太后欲傳位二弟蓋當時多有是説也今兩存所云趙普請使陶穀草誓書轉以相付則必不然今不取又云秦王既幽死誓書收入禁中南陽王尋亦坐事逼令自殺此尤誤不知德昭自殺乃太平興國四年八月德芳死乃六年三月而廷美七年三月始罷開封尹也大抵遺事言多鄙近不似禹稱所為或出於怨家仇人肆口謗訕託名禹稱故不可遽信然亦不可全棄也兩存其説則祖宗盛德自著後世必知其誣矣又云廷美乃太宗母弟則於昭憲顧命時已辨之江休復嘉祐雜志云太宗涪陵各相去十數嵗生與遺事略同足明當時多有是説也是日以樞密副使刑部侍郎石熙載為户部尚書充樞密使用文資正官充樞密使自熙載始也天禧二年十一月丁謂乾興元年七月錢惟演可考熙載以文資正官充樞密使不知帶檢校官否據仁宗實録并會要不帶檢校官乃自惟演始壬子秦王廷美乞班趙普下從之詔中外文武官等自今或知民間利病及時政得失並得上書直言無有所隱王稱東都事略有詔曰古者振木鐸於路所以采四方之風謡設獸樽於庭所以延羣臣之諌諍在朝內外官自今或知民間利害及時政得失並得直言無隱乙卯詔以冬至有事于南郊丙辰知易州白繼贇言契丹來冦逆擊之於平塞寨北斬首二千級獲鎧甲羊馬甚衆綿州妖賊王禧等十人以妖法惑衆圖為不軌斬于市己未髙州言大風壞官寺民舍五百餘區詔諸路州府每月第給係省酒充公用自三石至一石各有差冬十月癸酉羣臣奉表加上尊號曰應運統天睿文英武大聖至明廣孝凡三上乃許之京西轉運使言管內諸州闕員多以前資官承攝不給俸祿恐難責其廉耻願一切停罷詔從之乙亥令諸道悉部送前資官赴闕特與免選注擬諸州無得占留庚辰詔自今下元節冝如上元並賜休假三日著於令甲申以河陽節度使崔彥進為關南都部署馬軍都指揮使米信為定州都部署此事崔彥進傳殊不載獨米信傳有之亦不并及彥進也當考丙戍詔郊廟行事官自今並須洗沐濯浣以供祀事違者以不恭論命駕部貟外郎知制誥賈黃中與諸醫工雜取歷代醫方同加研校每一科畢即以進御仍令中黃門一人專掌其事己丑復置觀察支使或已有掌書記即不得兼置甲午蘇州言太一宫成先是方士言五福太一天之貴神也行度所至之國民受其福以數推之當在吳越分故令築宫以祀之密州先以官牛給民嵗取其租牛既死而租未免詔悉除之太子中舍魏羽受詔乘傳詣瀛州核軍市租得隱沒者數萬計因上言本州録事參軍郭震十年未代河間令崔能前任即墨未滿嵗徙秩有司選調失於平均下位疏逺何由聞逹願罪主者以肅欺弊上覽奏謂左右曰疏逺之臣乃能言此亦可賞也即令簿責有司既得其事優詔賜羽曰郭震守官十年拘常調而難替崔能視事未久緣近詔而當移汝逺有指陳可謂不畏強禦更須傾盡以沃朕心十一月丁酉監察御史張白棄市白前知蔡州假貸官錢居糴粟麥以射利故也膳部郎中知雜事滕中正嘗薦白責授本曹員外郎甲辰改武德司為皇城司上嘗遣武德卒潛察逺方事有至汀州者知州王嗣宗執而杖之縛送闕下因奏曰陛下不委任天下賢俊而猥信此輩為耳目竊為陛下不取上大怒遣使械嗣宗下吏削秩既而怒解嘉嗣宗直節令遷其官記聞與本傳略不同今參取刪潤且不知其時附見改官司名下先是上將討擊契丹乃以詔書賜定安國王令張犄角之勢其王烏元明亦怨契丹侵侮不已欲依中國以攄宿憤得詔大喜於是女真遣使朝貢道出定安烏元明託使者附表來上且言扶餘府昨叛契丹歸其國此契丹災禍大至之日也表稱元興六年十月上復優詔答之仍付女真使者令齎以賜焉庚戍親享太廟辛亥合祭天地于圜丘大赦御乾元殿受册尊號先是有秦再思者上書願勿再赦且引諸葛亮佐蜀數十年不赦事上頗疑之以問趙普普曰國家開創以來具存彛制三嵗一赦所謂其仁如天堯舜之道劉備區區一方用心何足師法上然其對赦宥之文遂定大同節度使殿前都虞候劉廷翰當追封三代廷翰起微賤不能記其祖名上親為撰名書以賜之景德三年聖語可附壬子令諸州監臨官不得擅詣闕奏事有所聞見許附驛須面奏者俟報癸丑詔諸州長吏察部內民有輕薄無賴愆於孝義貨鬻田業追隨蒲博者深加勸誡之或聞義不服為惡務滋者條其姓名以聞當置於法己未宰相趙普封梁國公普已下並進爵秩有差以辛亥赦書加恩故也樞密使楚昭輔被病家居僅周嵗上始命石熙載代其任昭輔亦不求解職上猶未忍罷之己未乃以昭輔為左驍衛上將軍車駕嘗幸昭輔所居省疾見其湫隘令有司廣之昭輔叩頭願不治恐侵四鄰地上嘉其意賜白金萬兩使别市宅昭輔忠謹無他才略性復吝嗇前後賜與以億計悉聚而蓄之每謂人曰我無汗馬勞致位樞近此財貨為國家守耳且當復獻于上賓客故舊至必引使縱視及罷乃悉以市善田宅時論鄙其虛矯壬戍詔封太平宫神為翊聖將軍從道士張守真之請也冀州阜城縣民李罕澄纍世同居漢乾祐末詔改鄉里名旌表門閭於是長吏以漢所賜詔書來上復旌表之十二月戊辰詔嶺南西川江南兩浙職官等先不許親屬至治所自今得以期功親一人隨行仍不得參預政事淮海王俶等賀郊祀貢馬皆駑為廄吏所發辛未詔釋其罪癸酉詔諸州士庶家有藏醫書者許送官願詣闕者令乘傳縣次續食第其卷數優賜錢帛及二百卷已上者與出身己任官者增其秩未幾徐州民張成象以獻醫書補翰林醫學自是誘致來者所獲頗衆己卯畋近郊還幸講武臺賜從官飲甲申詔強盜放火凖律不至死者勿復並妻子部送闕下戊子皇第四女封雲陽公主出降左監門衛將軍駙馬都尉韓崇業公主秦王廷美之女崇業重贇之子也辛卯禁民私市戎人馬壬辰詔中外官不得以告身及南曹厯子質錢違者官為取還不給元錢朝廷患官文書落規利之家故禁絶之是嵗廢沁州先是諸州罪人皆錮送闕下道路非理而死者十常六七所坐或夤緣細微情可憫惻江南西路轉運副使左拾遺張齊賢上言罪人至京請擇清強官慮問若顯負沈屈則量罰本州官吏自今令只遣正身家屬别俟朝旨千繫人非正犯者具報轉運使詳酌情理免錮送虔州嘗送三囚坐市牛肉并家屬十二人悉詣闕而殺牛賊不獲齊賢悉縱遣其妻子自是江南送罪人嵗減太半齊賢又言刑獄繁簡乃治道弛張之本于公隂德子孫即有興者况六合之廣能使獄無寃人豈不福流萬世州縣胥吏皆欲多禁繫人或以根窮為名恣行追擾租稅逋欠至少而禁繫纍日遂至破家請自今外縣罪人令五日一具禁放數白州州獄别置歷委長吏檢察三五日一引問疏理每月具奏下刑部閲視有禁人多者即奏遣朝臣馳往決遣若事涉寃誣故為淹滯則降黜其本州官吏或終嵗獄無寃滯則刑部給牒得替日較其課旌賞之齊賢又言巡內州軍縣鎮官地棚房錢輕重不等蓋偽命日有軍營人衆且用鐡錢易得自收復後諸軍皆送闕下又改納銅錢市井蕭條民益困乏禁錮科責沒其資産猶不能償至有雇妻賣子者昨降德音死罪皆免獨貧民逋負依前禁留雖漕運之職在於聚斂然民乃邦本豈可坐令困窮乞委諸州據地基屋室重定僦直使久逺得濟其舊欠負人特與蠲放又吉州緣江有勾欄地錢地已漂沒入江或官占為船場而所輸錢如故民舊於江中編木為筏以居者量丈尺輸稅名水場錢今禁民筏居而水場錢猶在亦請並與蠲放詔悉從之贊善大夫韋務升殿頭髙品王文夀建議李氏取民稅錢三千以上及丁口多者抽點義師户一人黥面為字令自備器甲輸官庫出軍即給之有馬軍每出軍人支口糧日二升自收復之後皆放歸農然久行伍不樂耕作多為追胥幹力之類雇倩充役或放鷹走狗有作賊者頗擾民望遣使選擇堪充軍旅者並家屬部送赴闕乃詔三班二人至江南與轉運使商度條上其利害齊賢奏偽命義師排門具有例皆稅户本是農夫江南要務虛聲且張軍數而百姓遭其配黥無所逃避粗應抽點諒非訓習克復之後便放歸農久被皇風並皆樂業或遷移别縣或商販外州若或逐戶搜求排門追勘忽兹驚擾交駭物情斂怨速尤事實非細縱令本城係籍亦未便冝法貴有常政尚清靜江外久從安定不冝遽有驚擾前敕久放營農不若且仍舊貫齊賢勤究民弊務行寬大行部遇投訴者或召至傳舍榻前與語多得其情偽江南人久益稱之相州民有張姓者殺一家六人詣縣自陳縣以上州知州張洎詰之曰某家之姻貧困常取息少有所負被其詬辱我熟見而心不平思為姻家報仇幸畢其志然所恨七口而遺其一使有噍類私讎已報願就公法洎曰殺人一家寧無黨乎對曰某既出身就死肯復連及同謀又曰汝何不亡命對曰姻家即某鄰茍不獲盜豈得安堵又曰汝不即死何就縲紲曰我若滅口誰當辨吾姻之不與謀又孰與暴其事於天下等死死義可乎洎曰吾將言聞上免汝之死曰殺人一家而茍活且先王以殺止殺若殺人不誅是殺人終無已豈願以一身亂天下法哉速死為幸洎嗟嘆數四卒案誅之何朔間多傳其事云
