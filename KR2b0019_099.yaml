body:
  text: 續資治通鑑長編卷九十五宋李燾撰真宗天禧四年春正月戊午以滑州將塞决河命翰林學士盛度乘傳致祭乙丑以華州觀察使曺瑋為宣徽北院使鎮國軍留後簽署樞密院事簽署兼領藩鎮自瑋始也以使兼領自彬始吏部流內銓言諸試銜官齊郎奏授出身白衣選人未經歷任無所升降請自今更不引對依格敇注擬知制誥吕夷簡言諸州軍續降宣敕多闕編録望令諸路提㸃刑獄司常切檢視從之丙寅令利州路轉運司賑貸貧民旱故也己巳幸元符觀資善堂辛未鄜延部署言宥州蕃族拉爾率衆劫熟戶密威族延州金明縣監押西頭供奉官李士彬部兵擊之斬拉爾梟七十餘級奪馬三百匹餘衆悉擒詔部署司以其事報趙德明擢士彬為都監加東頭供奉官閣門祇候士彬弟殿直士筠為右侍禁依前提㸃族帳事補蕃卒色伊喇勒為軍主餘第遷之仍賜衣帶茶綵俸料詔諸民僞立田産要契託衣冠形勢戶庇役者限百日自首改戶輸稅限滿不首許人陳告命官除名餘人決配所在揭榜示之丙子改諸路提㸃刑獄為勸農使副使兼提㸃刑獄公事仍詔所至取民籍視其差等有不如式者懲革之勸恤農民以時耕墾招集逃散檢括陷稅凡農田一事已上悉領之仍各賜農田敇一部詔銓司增注桂廣等州幕職官常及五員擇壯年幹事者充令供本職外仍備轉運刑獄司差遣庚辰詔三京諸州取進士諸科三舉已上曽經御試無罪犯者量試藝業揀材質書札解送赴闕當議於班行録用如經御試者數少許即選五舉以上南省終場下第人充辛巳命右諫議大夫張士遜詣滑州祭河詔馮守信俟河平留兵萬人護之二月癸未朔以淮南江浙穀貴民飢命都官貟外郎韓億閣門祇候王若訥乘傳安撫發常平倉粟減直出糶以賑之民有以糧儲濟衆者第加恩奬其乏食持仗盜糧者並減等論罪乙酉廣州言注輦國遣使入貢方物其使者至州死以其表來上詔本州宴犒其部下賜器幣緡錢遣之丁亥戶部貟外郎兼太子右諭德魯宗道言伏見代州寨主吳太初以捕獲私鹽决訖撤去殿直田夢澤於公廨課子弟種麥半畝咸以贓罪不許叙用竊惟天下羣官如此類甚衆慮涉秋荼之繁仰玷春臺之化欲望委刑部自今羣臣除故枉法受贓外其因事計贓情可憫者並奏裁從之宗道又言臣往任歙州判官日坐預借俸錢贖銅六斤赴調日刑部定為公罪大理定為私罪及再詳議刑部翻為私罪大理翻為公罪兩司更互僅同兒戲徒使選人淹延費用望自今選人有罪令銓曺於刑部大理寺兩司中止問一處庶免稽留望銓曺自今刑部大理寺定選人罪名不一即送審刑院速詳定以聞定罪名在五月辛酉今并書戊子右街講僧祕演等表請以聖製述釋典文章命僧箋注附於大藏有司按太宗朝故事請許之詔可仍遣近臣詳覆中貴人掌其事辛卯參知政事李迪等上一州一縣新編敕三十卷本志作一州二縣㑹要并言一司一務一州一縣今從本志祠部員外郎祕閣校理李埀言準詔至大名府滑衛德貝州通利軍與長吏計度疏塞河流有無妨閡臣所至並稱黃河水入王莽沙河與西河故瀆注金赤河必慮水勢浩大浸蕩民田難於隄備臣以謂河水所經不無為害少命疏治之則本州長吏不得專其封土矣今者河決而南為害既多而又陽武掃東石堰掃西地形汙下東河泄水又難或者云今決處槽底坑深舊渠逆上若塞之旁必復壞如是則議塞河者誠以為難若決河而北為害雖少一旦河水注御河蕩易水徑乾寧軍入濁流口遂及戎境或者云因此搖動邊鄙如是則議疏河者又益為難臣於兩難之間輒畫一計請自上流引北載之髙地東至大伾復㵼於澶淵舊道使南不至滑州北不至通利軍界何以計之臣請自鄆州東界曺公所開運渠東五里河北岸亞處就岸實土堅引之正北近東十三里破伯禹古隄注裴家潭徑牧馬陂又正東近北四十里擊大伾西山釃為二渠一逼大伾南足決古隄正東八里復澶淵舊道一逼通利軍城北曲河口至大禹所道西河故瀆正北稍東十里開南北大隄又東七里入澶淵舊道與南渠合夫如是則載之髙地大伾二山於脽股之間分酌其勢浚㵼兩渠匯注東北不逺三十里復合澶淵舊道則滑州不治自涸矣其通利軍如河陽中城於兩河之間加以大伾二山居中作固莫能壞也朝廷必欲漸而緩成先疏大伾南足一渠則滑州亦已無患矣臣請以兵夫二萬自來年二月興作除三伏半工外至十月而成其均厚禆薄俟次年可也疏奏朝議懼其煩撓罷之癸巳以利州路階成民飢遣侍御史姜遵閣門祇候張士安馳驛安撫之張士安未見詔欣州知州入辭日升殿奏事時命供奉官閣門祇候張淡成知欣州事知州舊無上殿例因淡成之請特有是詔㑹要二月十三日事張淡成當考令并代欣三州減直糶常平倉以濟飢民甲午密州莒縣馬耆山九經楊光輔為國子四門助教加賜束帛詔長吏常存問之光輔聚徒講授三十餘年知州王博文為言故命以官負海有鹽場歲饑民多盜鬻者吏捕逐則羣起捍鬭皆坐法當死博文請弛鹽禁俟歲豐乃復從之弛鹽禁不得月日今附見丙申詔曺濮鄆單徐州淮陽軍賑貸貧民以決河為害故也丁酉以樞密直學士左司郎中知秦州李及為右諫議大夫依前充職滑州言河塞詔奬之己亥命翰林學士承㫖朝迥致祭又遣官謝京城宫觀諸陵嶽瀆靈山勝境庚子羣臣詣崇德殿稱賀賜修河部署鈐轄轉運都監官吏使臣等衣服金銀帶器幣將士緡錢有差是役凡賦諸州薪石楗橛芟竹之數千六百萬用兵夫九萬人上親製又刻碑以紀其成功李若谷𫝊云若谷為京東轉運使河決白馬調取楗芻同列盧士倫協三司意趣刻擾州縣若谷寬之士倫不悅譖諸朝徙若谷知陜州實録乃無此事今不取辛丑令唐鄧等八州發常平倉粟減價出糶以濟貧民壬寅詔應緣滑州役卒亡命者限兩月首罪優給口糧送𨽻本軍其因罪為部署司所移配者亦送還本籍所在揭榜告諭之戶部員外郎知制誥李咨不為冦準所知每草辭必再三却之令換易乃已咨嘗用淑慎字準難之曰淑慎婦人事也咨執毛詩詣閣呈準曰淑慎君子其儀不忒此安有婦人之事準性強固又别加詆誚卒改之咨因是積憤又以父留鄉里請外乙巳命咨知荆南府代給事中樂黃目知潭州長沙月給舊減於荆者特詔增之又諭以兵賦繁綜寄任之意詔諸州所須醖酒黃糯米染色紅花紫草等自今乘時收買無以抑貧民丙午明州言髙麗夾骨島民闊達以風漂舟至定海縣岸詔本州存問給度海糧遣還自今有此類準例給遣訖以聞己酉馬軍都虞候并代副部署楊崇勳為客省使依前英州防禦使兼羣牧使同勾當三班院皇城司其月俸如管軍防禦使例初羣牧置使皆以文臣領之惟崇勳自都監至為使凡九年屬天下久罷兵有言鬻廄馬者崇勳曰馬者戰之備雖無事可去耶遂寢其奏庚戌賜光祿寺丞沈惟溫同進士出身惟溫倫之孫獻太祖太宗與倫御署書求賜科名故也三月戊午淄州民飢貸以牛糧詔翰林學士以下龍圗閣直學士以上自今官未至給諫者該恩叙封母妻並如給諫之例初王曙既改舊制盛度以兵部郎中為學士因乞封其母許之乃降是詔其後天章閣直學士亦如龍圗閣直學士庚申甘州輝和爾可汗王伊嚕格勒圭呼遣使來貢甲子令府州賑貸蕃部去歲旱故也乙丑右司諫直集賢院祖士衡言伏見大宴皇帝更衣降坐羣臣謝賜花止拜於坐次欲望自今每更衣所司揖羣臣下殿候皇帝降坐則羣臣班於殿庭皇帝升坐乃上殿如賜花則拜於庭又常朝起居日長春崇德殿假日後殿中書樞密院文武合班而閣門祇候一員在前隨班再拜側立贊謁以臣愚見未協矩儀欲請自今令通班閣門祇候在前殿則與內殿供奉官以下同起居後殿則與軍頭司官同起居然後立殿庭贊謁從之戊辰改禎州為惠州罷給揚州蠶鹽一年從韓億之請也庚午詔審官院流內銓自今羣官中川峽人有科名歷任無贓罪經薦舉者三任內許一任去本貫三百里外守官其年老致仕者亦聽還鄉壬申令西凉府輝和爾自今貢奉並由秦州路出入秦州言蕃部阿錫逹納質歸順先是詔以近年開封府舉人稍多屢致詞訟令翰林學士承㫖朝迥等議定條約於是迥等上言諸州舉人多以身有服制本貫難於取解遂奔凑京轂寓籍充賦人數既衆混而為一有司但考其才藝解送之際本府土著登名甚少交起喧競亦由於此欲請自今有朞周卑幼以下服者聽取文解寄應舉人實無戶籍者許召官保任於本府戶籍人數外别立分數薦送詔從之仍取大中祥符七年寄貫人數中進士解十之三諸科十之五癸酉詔川峽廣南諸州自今依先定條制解合格舉人外更有藝業可取者悉取薦送本志不及廣南當考又當考合格舉人元數乙亥以益梓州路物價翔踊命知制誥吕夷簡引進副使曺儀乘傳賑恤之夷簡等請所至勞問官吏將校仍取繫囚與長吏等原情從輕決遣民願出穀救飢民者元詔第加酬奬望給空名告敕付臣賫往從之丙子詔自今縣尉獲鬭殺全火賊資考當入令録者授節察推官戊寅詔三司言前詔江淮兩浙荆湖五路部綱殿侍聽挈屬隨行其惠民石塘廣濟黃御蔡河押薪炭者望令準例從之前詔乃二年九月二十八日見㑹要己卯左僕射兼中書侍郎平章事向敏中卒上即時臨哭之慟贈太尉中書令諡文簡五子洎諸壻並遷官親族授官者又數人敏中端厚愷悌多智寡交特為人主所重以至顯達歷踐中外曉民政善處繁劇識大體密靜達權纍在衡軸門無私謁諸子不令釐務雖當大事若已不預焉謹於采拔不妄推薦姿表瓌碩有儀矩能談論為大僚幾三十年時以重德目之上所優禮故雖衰疾終不得謝亦以此為恨及追命制入上特批一幅敏中端謹溫良冝益此意其恩顧如此夏四月壬午朔翰林學士錢惟演言伏以春秋朝陵載於舊式公卿親往蓋表至恭歷代以來國章斯在唐顯慶中始詔三公行事天寶以後亦遣公卿巡謁蓋取朝廷大臣不必須同國姓後唐參用太常宗正卿晉開運中亦命吏部侍郎李詳其例甚多近年以來止遣宗正寺官人輕位卑實虧舊制望自今於丞郎諸司三品內遣官或闕官即差兩省諫舍以上所冀仰副追孝之心以成稽古之美詔付有司詳定且言按唐顯慶五年詔三公備鹵簿分行二陵太常卿為副長慶元年通取尚書省四品以上清望官及諸司五品以上清望官充開寶通禮差太常宗正卿今請依禮三陵用太常宗正卿如闕官即差尚書省四品以下兩省五品以上諸司三品或卿監其分拜官二員用尚書省五品以上詔可如闕卿監以上官即以次差攝審刑院刑部大理寺奏自今所舉幕職州縣官充詳斷法直官請試律五道取三道以上仍斷案三二十道稍合格例則保明聞奏從之丙戌令杭州葺故吳越王錢氏廟從其孫惟演之請也以旱遣近臣分詣諸宫廟寺觀禱雨丁亥大風起西北飛砂折木晝晦數刻命中使詣宫觀建道場禳之翰林學士承㫖朝迥纍表求解近職庚寅授工部尚書集賢院學士判西京留司御史臺許一子官河南以就養命工部侍郎楊億為翰林學士大中祥符末億自汝州代還久之不遷或問王旦曰楊大年何不且與舊職旦曰大年頃以輕去上左右人言可畏賴上終始保全之今此職欲出自清𠂻以全君臣之契也踰六年乃復入禁署於是令億序班在惟演下盛度上惟演言億景德中已為學士况今與臣並官丞郎望升億班在臣上從之詔自今奏舉選人令有司候參選日考較有私罪及非時贊者别聽進止餘即報中書門下遣官同判銓官考試引見分江南轉運使為東西兩路從戶部判官滕涉之請以便按巡也出內藏錢七萬貫付京西路市軍糧壬辰詔茶場𣙜務自今令三司副使判官轉運使副制置茶鹽司舉歷任無贓私罪者監𣙜務以京朝宫殿直以上使臣充茶場以幕職令録充京西轉運使言知襄州夏竦勸部民出粟八萬餘石賑濟飢民詔奬之丙申杖殺前定陶縣尉麻士瑶於青州其兄大理評事致仕士安削籍配𨽻汀州姪右正言直史館溫舒太常丞直集賢院溫其並削職溫舒改太常博士監升州糧料溫其監光州酒稅家僮范辛等及州院司理院典級冒名買場務人借詞進士王圭等並黥面決配廣南福建逺惡州軍牢城家僮五十人分𨽻諸軍以臨淄宅一區給其家邸店資財取十之三均給其族自餘悉籍之其田莊本因平債吞併典質者許元主收贖本路勸農使副青州知州通判悉降等差遣初士瑶祖希夢事劉銖為府掾專以掊克聚斂為己任兼并恣橫用致巨富至士瑶纍世益豪縱郡境畏之過於官府士瑶素帷箔不修又私蓄天文禁書兵器姪溫裕先有憾常欲訟之士瑶懼乃縶之密室命范辛等三僕更守絶其飲食數日死即焚之又嘗怒鎮將張圭遣家僮張正等率民夫伺圭於途中毆殺棄其尸頃之圭復蘇訟於州典級輩悉受士瑶賂出其罪承前牧宰而下多與抗禮未嘗敢違忤及鎮海節度推官孫昌知臨淄憤其凶惡有犯必訊理之士瑶常聲言遣人刺昌昌乃送其族寓於他郡每夕宿縣廨列人嚴更為備士瑶復與王圭誣告昌不公事又借同邑人姓名買場務先是侍御史姜遵風聞士瑶幽殺其姪事奏遣監察御史章頻推直官江鈞往鞫之姜遵劾麻氏不法實録在二月丙戌今附此於是併得他罪故悉加誅罰焉仍詔刑部遍牒三京諸路揭榜諭民擢遵為工部郎中孫昌為大理寺丞依前知臨淄縣賞其發摘姦伏也國史載麻希夢事蓋因王皥百一編也司馬光記聞景德初契丹冦澶淵遊兵至臨淄麻氏率莊人千餘據堡自守鄉里賴之全濟者甚衆至今基迹尚存謂之麻氏寨兵退麻氏斂器械盡輸官留什二三以衛其家鄉里賴麻氏以全濟此事當考或可增修然光載姜遵為轉運使欲因此以立威名則誤矣遵在仁宗時乃將􅒩京東今不取浮梁縣民臧有金者素豪橫不肯輸租畜犬數十頭里正近其門輒噬之繞垣密植橘柚人不可入每歲里正常代之輸租及臨涇胡順之為縣令里正白其事順之怒曰汝輩嫉其富欲使順之與為仇耳安有王民不肯輸租者耶第往督之里正白不能順之使手力繼之又白不能使押司録事繼之又白不能順之悵然曰此租必使令自督耶乃命里正取藁自抵其居以藁塞門而焚之臧氏皆迸逸順之悉令掩捕驅至縣其家男子年十六以上盡痛杖之乃召謂曰胡順之無道既焚爾宅又痛杖汝父子兄弟爾可速詣府自訟矣臧氏皆懾服無敢詣府者自是臧氏租常為一縣先府嘗遣教練使詣縣順之聞之曰是固欲來煩擾我也乃微使人隨之隂記其入驛舍及受驛吏供給之物既至入謁色甚倨順之延與坐徐謂曰教練何官也曰本州職員爾曰應入驛乎教練使踧踖曰道中無邸店暫止驛中又曰應受驛吏供給乎曰道中無芻糧故受之又曰應與命官坐乎教練使趨下謝罪順之即械繫獄置暗室中以糞十甕環其側教練不勝其苦因順之過獄呼曰令何不問我罪順之笑謝曰教練幸勿訝也今方多事未暇問也繫十日然後杖之二十教練不服曰職貟也有罪當受杖於州順之笑曰教練久為職貟殊不知法杖罪不送州耶卒杖之自是府吏無敢擾縣者州雖惡之然不能罪也於是為青州幕僚發麻氏破其家皆順之之力云髙麗嘗入貢道出州境中貴人挾以為重使州官旅拜於郊順之曰青大鎮在唐押新羅渤海縱其國王來尚當與之均禮今見陪臣奈何卑屈如此獨不拜因上書論辨朝廷是之既誅麻氏上記其名召見改著作佐郎優與差遣正史順之𫝊豪橫者乃休寧汪氏休寧屬歙州浮梁屬饒州今從司馬光記聞光載此事尤詳故也𫝊云改官知常熟縣光云簽判洪州不知孰是當考丁酉詔寄班祇候自今準三班使臣所定年限考詔三司言福州官莊舊止隨私産一例收租請估直許見田民買之詔第遣常參官一員與轉運使依漳泉州例均定租課尋罷不遣罷遣使在八月辛丑今并書戊戌謁啓聖院太宗神御殿遂謁景靈宫開寶寺先是度支員外郎直集賢院祁暐出知濰州母亡殯於州城之南暐既解官就殯所築小室號泣守護蔬食讀佛經者三載徒跣經冬足墮二指有白烏白兔馴擾墳側州異之以狀聞己亥降詔旌美及其歸葬又賜帛三十匹粟三十石令州長吏每月就所居存問暐膠水人也庚子謁玉清昭應宫癸卯利州路轉運使李防請雕印四時纂要齊民要術付諸道勸農司以朂民務從之乙巳詔訪聞欣代州民秋後結朋角抵謂之野場有殺傷者自今悉禁絶之丁未閣門請自今庶子已下至京官閣門祇候至三班使臣並為一班文武羣官值假三日則朝見辭謝於崇政殿其酒食緡帛賜於門外奏可時上不豫故多從省約之制先是左正言知制誥張師德移病出守潁州五月癸丑師德言皇弟德雍現任本州防禦使其署銜望降規式中書門下言據御史臺稱每大朝㑹立班皇親防禦團練使刺史並次節度使下稍退序立因詔師德署銜於德雍之下非典故也凡知制誥著位兩省則次給諫南省御史臺次丞郎外官則在觀察使上云此據掖垣志甲寅詔禮部權停貢舉一年丙辰詔奬涇原路都監李餘懿等補指使殿侍趙榮為三班借職以其擊殺蕃冦故也丁巳令京兆鳯翔減直糶粟賑秦隴諸州流民戊午開封府請撤民舍侵街陌者上以勞擾不許將作監丞通判果州張觀上言父居業見任越州支使年踰耳順猶滯選門臣今䝉恩授祕書郎願回授父詔流內銓召居業考課引對其祕書郎告仍以付觀己未益梓路安撫吕夷簡言秦隴利等州飢民稍多望令逐處募充本城諸軍從之初感德軍節度使知陜州王嗣宗以老病再表願入朝且言得一見即歸田里優詔召還㑹郊祀改靜難節度使留京師纍月竟以足疾不任朝謁復上表求再知許州宰相冦準素惡其為人庚申特命以左屯衛上將軍致仕嗣宗乃請面辭詔免舞蹈許其子扶掖之對數刻賜錢百萬及準罷相又特從其請令月給實俸五十千嗣宗歷事三朝最為宿舊所至以嚴明御下尤傲狠務以醜言凌挫羣類家有恩仇簿已報者即勾之晚年交遊皆入仇簿為中丞日嘗忿宋白郭贄邢昺七十不請老屢言於上請敕其休致又遣親屬諷激之及嗣宗眷厚祿不忍去嘗謂人曰僕惟此一事未能免物議爾衆皆嗤焉雅好為文而朴繆尤甚奉祀歲近臣皆令為頌記宰相以嗣宗所撰不足發揮盛德慮為後所誚乃不許刻石然敦睦宗族待諸姪如己子臨終著遺戒訓子孫毋析居又令以孝經弓劒筆硯置壙中云壬戌廣南東路轉運勸農司言準詔計度徙春州於古城請依例於土人內注無贓罪幕職州縣官充通判兼知州量與恩賜支録事參軍俸給滿日依潭州龍巖等縣例優奬從之據本志景德元年移治陽春界明石津古城大中祥符九年又併入新州天禧四年復置甲子環州界熟戶密覺族軍主錦尼納質歸化以錦尼領順州刺史首領日木多等十五人補蕃官有差丙寅詔自今天下犯十惡劫殺謀殺故殺鬭殺放火強劫賊官典正枉法贓僞造符印厭魅呪詛造妖言𫝊妖術合造毒藥禁軍諸軍逃亡為盜罪至死者每至十二月權住區斷過天慶節決之餘犯至死者十二月內及春夏未得斷遣禁錮奏裁又詔大辟有先準詔即行處斬者自今除惡逆四等準律用刑自餘斬刑遇春夏止決重杖處死俟秋分如故以上封者言皇帝誕月及春夏長育之時宜貸嚴科故也張知白趙湘奏議可考知白見咸平五年十一月湘見景德四年九月丁卯兩浙淮南勸農使王貫之等導海州界石闥堰水入漣水軍溉民田知定逺縣江擇知江隂軍崔立率部民修廢塘浚石溝以灌髙仰之地詔並奬之仍令代還日考課引對因諭諸路勸農司應塘堰可以利民者準此繕修崔立事在明年六月今從本志并書于此甲戌以時雨沾洽遣官謝廟社宫觀寺院保安軍小蕃族都虞候日威巡檢胡懷節等擊賊有勞並進秩己卯詔應緣河州軍自今每歲令長吏等與巡河及本地使臣躬親檢視隄岸當浚築者連署以聞勿復減省功料以圗恩奬違者重置其罪光祿寺丞謝綘上言帝王之興必推五行之盛德所以配天地符隂陽也神農氏以火德有火星之瑞聖祖以土德地蚓黃龍見夏以木德青龍止於郊商以金德山澤自溢周以火德有赤烏之符國家膺開先之慶宜黜五代紹唐土德以繼聖祖猶漢之黜秦興周火德以繼堯也臣聞太祖生而包絡黃及受命五緯聚于奎而鎮星是主陛下升中泰山日抱黃珥朝祀太清宫有星曰含譽其色黃而潤澤其餘神龜珍獸自逺至者或毳或介僉有厥應非土德之驗乎茲事體大惟陛下勿以變古為疑且漢興至武帝越九十年始寖尋於火德至光武蓋二百載方習定乎正運國家受祚猶在五紀陛下謙而弗答氣壅未宣河決遂潰豈不神哉考六府之厭鎮驗五行之勝尅亦宜興土之運禦時之災不可因循舊典廢天人之休也其度量律歷之則車服衣冠之法圜丘方澤之事明堂辟雍之制宗廟薦饗之序方國朝貢之典政教禮樂文質增殺願下搢紳鴻碩之士參議條奏然後升中嵩告上帝循五載見羣后以示中方之位以符用五之數時大理寺丞董行父請用天為統以金為德詔兩制議皆言用土德則當越唐上承於隋用金德則當越五代紹唐而太祖實受終周室豈可弗遵傳繼之序綘行父議皆黜不用絳濤子也行父未見六月甲申右諫議大夫李應機言嶺南惠州河源韶州翁源循州興寧錫場梅州管界縣分屬嵐瘴多處其令佐及梅州知州監押望並用廣南人充所冀習其風土從之乙酉陜西轉運使劉楚言自今陽武掃逃亡軍士有親屬在營者望令同華州依滑州修河例給三月錢糧有子願充軍量材質録之詔可己丑上御崇政殿親慮庶獄徒流遞減杖以下原之壬辰詔通泰楚等州煎鹽亭戶因災沴之食預請錢糧逋缺者悉蠲之審刑院言詳刑之官雖各勤盡然閲實之際不無繆誤一有差舛即行勘劾頗塞自新之路慮增巧詆之文請自今每大理寺封草檢至院有以杖從徒以徒從杖以流入死以死入流之類即劄還本寺如斷官顯知誤失自首改正則更不奏劾如其不然致再下詰問顯章錯誤則具名奏劾從之殿中侍御史王博文言密州民有經大中祥符九年後纍歲災沴飢乏親屬散在民間為人所收養及充奴婢妻口本無契券離書者望令畫時放還如有訴認官司不為理者並論違制罪從之癸巳三班院言自今內地駐泊捉賊使臣請以合任逺地監押巡檢殿直以下習戎事者充仍支監押例添給代還日復任逺地從之甲午以太常少卿直史館陳靖為太僕卿集賢院學士知建州靖丁謂所善也詔從翰林學士楊億等所請選官箋注御製文集仍令宰相等參詳丙申以右僕射兼中書侍郎平章事冦準為太子太傅萊國公先是準為樞密使曺利用副之準素輕利用議事有不合者準輒曰君一夫爾豈解此國家大體耶利用由是銜之而丁謂以拂須故亦恨準及同為樞密使遂合謀欲排準翰林學士錢惟演見謂權盛附離之與講姻好而惟演女弟實為馬軍都虞候劉美妻時上不豫艱於語言政事多中宫所決謂等交通詭祕其黨日固劉氏宗人橫於蜀奪民鹽井上以皇后故欲赦其罪準必請行法重失皇后意謂等因媒孽之凖嘗獨請間曰皇太子人望所屬願陛下思宗廟之重𫝊以神器以固萬世基本丁謂佞人也不可以輔少主願擇方正大臣為羽翼上然之正傳云丁謂錢惟演佞人也不可輔少主按此時惟演但為翰林學士不當便與丁謂同日而語附傳亦不載惟演恐正傳誤增之今不取張唐英仁宗政要又載準言丁謂恃才挾姦曺利用恃權使氣恐唐英所載亦不得實利用恃權使氣在太后垂簾時今猶未也陳繹拜罷録亦止稱丁謂準乃屬翰林學士楊億草表請太子監國且欲援億以代謂億畏事泄夜屛左右為之辭至自起剪燭跋中外無知者既而準被酒漏所謀億自起剪燭此據附𫝊今正𫝊削去龍川别志乃云億私語其妻弟張演曰數日之後事當一新語稍泄丁謂夜乘婦人車與曺利用謀之不知别志何所據然别志所稱立太子廢劉后則是準罷相後用懷政之謀而億所草乃太子監國表爾雖附傳亦以為微服過利用為在此時蓋誤也拜罷録與附𫝊同今正𫝊已改之附𫝊及拜罷録並云草制正傳但云草表今從正𫝊謂等益懼力譖準請罷準政事上不記與準初有成言諾其請㑹日暮召知制誥晏殊入禁中示以除目殊曰臣掌外制此非臣職也乃召惟演須臾惟演至極論準專恣請深責上曰當與何官惟演請用王欽若例授準太子太保上曰與太子太傅又曰更與加優禮惟演請封國公出袖中具員冊以進上於小國中指萊字惟演曰如此則中書但有李迪恐須别命相上曰姑徐之殊既誤召因言恐泄機事臣不敢復出遂宿于學士院及宣制則非殊疇昔所見者不知殊所見除目又何等也殊不以告人故亦莫得其詳云仁宗實録冦準附𫝊陳繹拜罷録司馬光記聞張唐英政要曽氏隆平集蘇氏龍川别志並誤以準初罷相時事即周懷政所謀蓋不考其月日故也國史正𫝊已略正之但不詳耳今取錢惟演口記及江休復雜志附益之請太子監國準奏也傳位太子廢皇后周懷政謀也準以監國奏泄罷相以懷政謀泄逺貶二事初不同諸書見準坐懷政絀即謂準本謀如此其實謀出懷政凖未必知爾仁宗景祐元年四月以王曙言追諡楊億使亦但云草奏請太子親政不云草制也龍川别志又云億草詔書遣曙出使誅異己者曙藏去之恐實不然今止從實録監察御史章頻嘗受詔鞫印州牙校訟鹽井事劉美依倚后家受賕便人市其獄頻請捕繫上以后故不問出頻知宣州頻事因冦準請治劉氏附見不得其時也錢惟演日記五月二日冦公將制院文字上事連劉馬軍冦請赴臺勘上怒曰管軍自前豈有此例卿要送臺但送下冦惶恐而退曺丁並奏天旱不宜更起寃獄中傷平人乞罷之上云便罷便罷冦又上殿上甚不悅其日冦沮喪甚惟演所言雖未可盡信章頻出知宣州必在此時今附見當考吕夷簡言淳化末蜀民或從草冦刺面為應運雄軍今請擇其情罪重者分配潼關已東州府牢城從之滑州言河決於天臺山下初議修河以天臺決口去水稍逺聊興葺之及西南隄城乃於天臺口旁築月隄亦非牢固議者咸請再葺修河都部署馮守信曰吾奉詔止修西南掃此非所及也㑹馬軍都指揮使王守贇外任京師缺舊城巡檢守信承召亟歸及是河復決走衛南汛徐濟害如三年而益甚人皆以罪守信焉守信通孝經論語後遷威塞節度使五年三月其弟嘗欲上其子為守信子以取髙䕃守信對之慨然曰吾自行伍䝉主上擢至此欲棄軀久矣顧未有所奈何欺之是歲并已子無所䕃曰以明吾心於弟非有愛也人亦以此多之此據日記己亥補教駿軍士李謙為本軍小校賜緡錢時軍使武贊為逃卒霍興所刺謙急持興以身蔽捍中十六創贊得走免上善其義勇特召見而奬之辛丑鄜延路鈐轄周文質言趙德明繼遣人騎冦略熟戶望多發軍馬於慶州界破蕩族帳以遏侵擾上以邊候興兵或致生事止令文質偵邏密為之備壬寅上御崇政殿親試禮部奏名舉人命官考覆如常例授三班奉職者九十二人借職者十三人其不合格者補諸州上佐文學自奉職至殿侍悉免短使與家便差遣丙午姜遵自陜西還言知襄州夏竦撫俗有方蒞事無滯詔奬之又言知階州許申知文州胡靖知三泉縣房中正皆有治績詔審官院記姓名代還日升陟任使胡靖房中正未見戊申判吏部流內銓陳堯咨言舊制河北河東緣邊幕職州縣官不許挈家赴任代還日免其守選近準赦文並許挈家赴任儻官滿日仍舊免選注近官頗為優幸請自今依江浙荆湖逺地得替例守選從之詔樞密院凡給賜錢銀每季進納數目劄子自今歲作一冊進內詔牛羊司三棧圈自今只差三班使臣勾當內侍省勿差嘉祐四年六月可考
