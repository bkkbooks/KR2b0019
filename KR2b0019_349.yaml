body:
  text: 續資治通鑑長編卷三百四十五宋李燾撰神宗元豐七年夏四月辛未大食貢方物西上閣門使寧州刺史王湛領成州團練使蕃官皇城使羅凌領忠州刺史如京副使解政為莊宅副使西京左藏庫副使李儀為文思副使並兼閣門通事舍人論出界功也河東經略司言蕃官三班借職屈德宜獲級詔以一級遷奉職其一級充本族巡檢秀州軍事推官桑景彛侔皆博徒以功勝陟錢案原本有脫誤并坐汙濫也澶州觀城縣保甲三百餘人持梃入舊縣鎮奪攘民財命吕公雅赴澶州監劾詔為首人郭萬領赴元作過處特處斬吕皓依法决訖特刺配本州禁軍指揮雜役二月一日十四日十七日并四月二日十二日可參考别修壬申權提㸃河北東路刑獄李仲甫言兩浙路歲散和買紬絹錢乞依江東例止用舊十分之三給鹽下本路轉運鹽事司相度詔開封府界三路提舉教閲保甲官并本司勾當公事官指使每再遣官教閲通比三等武藝及五分與减磨勘三年六分减四年七分遷一官以上每分更减一年至十分取㫖如止及三分展磨勘二年二分展三年一分以下降一官甲戌陜西轉運副使葉康直言凖朝㫖應副秦鳯路軍器什物本路見闕若盡製造十二年可了欲除本路應副外更乞給賜詔據所乞三分給一乙亥遼主遣歸州觀察使蕭浹太常少卿乾文閣待制侯庠來賀同天節福建路轉運使賈青言昨提㸃江西刑獄編排䖍州諸縣槍杖手立額依保甲為法歲一案閲民以為便江西一路可以推行詔下本路依䖍撫州建昌軍等處見行法丙子戶部言本曹每歲收支常平免役場務義倉金帛米數及田産已佃未佃已賣未賣水利或增或廢前此未有以勾考乞從本部立法從之河東經略司言三月中旬西賊夜入安豐寨境焚民居殺掠詔遭爇斃者依例支賜三月甲子墨本所書當參考提舉府界保甲司括畿內馬凡得三千四百七十六匹詔劉琯以給教騎人丁丑京東都轉運使吳居厚言去年收息錢內以七萬三千餘緡給河東保甲司賞賜支用詔黃亷據數交割石得一奏接伴遼使下親從官隨行虧法乞令過位覺察詔許之其入位與北人私相交易及轉逹事情者察之餘勿舉朱本陜西轉運副使葉康直専計置鄜延路糧草京東東路提舉常平等事燕若古言沂登密青州人田訟最多乞擇三五縣先方田詔候豐歲推行八年十月二十五日罷方田賜饒州童子朱天錫五經出身天錫年九歲禮部試誦七經皆通上召入禁中取諸經試之隨問即誦嘆曰此童誦書不遺一字又無所畏懼乃天禀也延安郡王時在旁上指天錫而撫王曰汝能如彼誦書乎面賜天錫錢五萬使買書以歸戒以後無廢學天錫後無聞或當削去并十月庚辰其弟天申上指天錫云云據林希野史增入希時任禮部郎中實主試事元豐七年甲子四月番陽人朱擬携其子天錫年十有一能誦五經語孟凡百卷詣登聞自陳有㫖送禮部試驗即召天錫詣部試以五經各五篇語孟各三篇應聲如流又使秉筆自書其鄉里姓名部為保明作奏神宗召赴睿思殿親試易乾卦禮樂記周禮考工記皆全篇百餘通宫人環視天錫殊不懾哲宗時九歲為延安郡王侍膝下神宗指天錫而撫之曰汝能如彼誦書乎面賜天錫五經出身仍賜錢五十千使買書以歸再三戒以不要廢學戊寅客省副使曹誘言乞本省治事畢候三省樞密院出方計出局詔客省四方館所治職事全簡少徒糜占人吏端坐無補可令治務罷即出上第六女卒輟視朝三日追封莘國公主年才五歲母德妃朱氏也庚辰罷集英殿大燕命宰臣賜遼使御筵于都亭驛舊紀云以莘國公主喪罷同天節燕新紀不書陜西轉運副使奉議郎范純粹為左司員外郎除郎不必書因欲載范純仁知河中故書事在五月辛酉辛巳手詔李憲每年兩畨西使到來常求市行牛角甚急若不與一二聊慰其意則情色怏怏頗傷朝廷待遇逺人之厚故歲歲常與之三兩對乃可厭其竒好即今有司與禁中見闕可廣收市五七對以進每歲准此京東西路轉運判官沈希顔言西京創蓋倉敖其費無慮五萬緡先給到度僧牒百道不足支用詔再給五十道提舉河北東路保甲司言大名府朝城澶州觀城等縣相州臨漳縣保甲百姓等羣以解質為名公行彊取錢物乞嚴立約束內未獲人每名賞錢二百千募諸色人告捉自今保甲輒敢如此並乞依此立賞詔從之此據御集附奏裁前二月一日十四日十七日四月二日并此十四日當考詔河北保甲司以保甲買賣質借投託為名狀實彊盜應在各所粉壁曉示犯者情涉凶惡罪不至死奏裁詔諸將官差經親民兩任人副將差經一任人升一任為權升兩任為權發遣戶部乞改市易下界依舊為𣙜貨務其上界為市易務從之廣南西路經略司言已自融口通開石門溪峒路欲於新路側創僧寺化諭蠻人乞給度僧牒五道及降御書歲度僧一人從之壬午詔陜西路提舉保甲東上閣門使狄詠朝奉郎胡宗回各遷一官勾當使臣雷勝等七人减磨勘年有差以按閲集教官奏論也鄜延經略司言新復四寨深在生界未有堡障應接若遣人牛耕種或恐見侵略勢不萬全乞候地界了日施行從之三月庚申及七月丁未當考詔四方館使榮州團練使知蘭州王文郁子右班殿直師古三班奉職師魯師孟各遷一資以熙河蘭㑹路制置司言昨夏賊圍蘭州師古等皆守城晝夜力戰也甲申以涇原路經略使寶文閣待制盧秉為龍圖閣直學士東上閣門使英州刺史姚麟為四方館使榮州團練使麟以討西賊功秉以措置麟軍馬出界有勞也秉傳云西賊既犯熙寧乾興隆德寨秉失備禦坐落待制未幾復職葫蘆河川開噶平距寨二百里秉諜知其恃險不為備乃密遣姚麟彭孫掩擊之斬獲萬數牛羊馬駝不可勝計捷聞上大喜進龍圖閣直學士湖北轉運使都鈐轄司言誠州凖朝㫖選使臣招納西南一帶溪峒并開路畢功詔右侍禁劉詔遷一官减磨勘二年權誠州軍事判官陳尚能為宣德郎軍大將蔡義轉三班借職右班殿直楊昌堯王㦸楊晟臻各减磨勘三年李開减六年召募進士梁𫝊郡州司士參軍李䕫並為三班差使吏兵支賜有差乙酉溪峒楊晟敢等十五人授左右班殿直者七人奉職者三人借職者五人楊晟臺别賜絹五十餘賜絹有差湖北轉運鈐轄司上知溪峒州授漢官人招納開路功也丙戌景靈宫官言芝草六生於天元殿門廣南東路轉運副使孫迥提舉常平等事朱伯虎各降一官知廣州王臨落寶文閣待制知濠州通判畢居卿司句文字連希元並衝替臨坐鞫孫迥受求囑居卿隨從臨迥不檢舉轄下兵替換優重差遣及失出入鄧滿等罪伯虎奏事不實伯雄鞫何卿私鹽事不盡諤鞫石大受事不盡大受以官板造匣拷平人希元隨順雖㑹赦降特責也六年四月二日郭槩勘迥元豐八年十一月王臨自陳私家榮遇其略云臣在廣州二年因發摘一作過贓吏曽具事狀奏聞後來朝廷因臣僚言本路運使孫迥是郭槩舉主黨庇孫迥出脫了贓吏罪狀却來勘臣作上書不實是時臣為在逺方不敢申訴䝉恩落職差知濠州方欲具因依奏聞值先皇帝服藥以至上仙不曽開陳此事附見當考舊紀書知廣州王臨鞫事受請囑落寶文閣待制知濠州新紀不書孫迥紹聖元年八月丙戌為戶中給事中韓忠彥言朝奉大夫俞希旦權發遣祥符縣希旦近知滑州以拷無罪人死衝替應入監當祥符為朝廷選闕始著令乃首選希旦恐非立法擇人之意詔改差人御史臺閣門言本朝舊合班儀嗣王在郡王上宗姓又在同列之上近例郡王領使相者得吏二人前引雖出特㫖緣嗣王恩數尤宜加隆今參詳嗣王若止隨本官立班當在本班之上使相即用雙引從之荆湖路相度公事所言邵州蒔竹縣歸明侍禁楊昌嚮於上里堡建一佛寺乞賜名額及許度僧詔賜為感化寺二年度僧一人詔定州路都總管司以忠猛一指揮分入驍武第七第八第九並帶請受河東路經略使言將領張世規等出界至明堂川遇敵有功人乞酬奬詔張世規死賜其家絹五十匹子孝經遷一資丁亥朝散大夫知均州張頡直龍圖閣知廣州頡言謫守偏郡遽蒙牽復然臣二子一孫相繼亡殁孤老無託慮因此不任事伏望矜憐檢㑹前奏除臣一宫觀差遣乃詔頡罷直龍圖閣提舉洪州玉隆觀五月二十九日丁卯乃除宫觀今并書頡本傳殊不載此據御集李憲言疾病乞罷任詔候與夏人分畫地界赴闕戊子三省言工部郎中權左司范子竒言尚書左右司獨創增吏額分為别司非是欲乞依門下中書省例每有判送文字更不離房事重者郎官親呈事輕則擬定令本房請判筆從之令左右司著為令其吏人遣歸逐處中書省言汀州軍賊藍載等行劫走梅州界又殺惠州歸善縣巡檢詔權宜州沿邊溪峒都巡檢左班殿直閣門祗候程建乘驛與提㸃刑獄司選募兵民土丁鄉丁槍杖手百人給口劵隨行捕殺其去賊百里內不拘路分捕盜官並聽程建處分獲賊首人授班行賞錢五百千次頭首三百千其餘徒黨除依條酬賞外更支錢百千許徒伴自相殺併告首亦推恩大理卿王孝先言本寺獄空降敕奬諭仍詔自今有司上獄空令御史臺刑察案實上以開封府大理寺比歲務為獄空恐為文具以希賞故也舊紀書戊子大理寺獄空新紀不書中書省言河北路頻奏羣黨一二十人以至三二百人盜取河隄林木梢芟等欲令監司體量有無如盜跡明白即依纍降指揮督捕如續有盜河隄林木梢芟等非凶惡羣黨一面依此覺察收捕月具人數捕獲次第以聞從之賜涇原路經略司度僧牒百修德順軍靜邉寨城朱本簽貼云元書德靜軍城非是今以十五房聖㫖修改辛卯上批范子淵乞發夫萬人重修直河適當農時非次調撥初出於不得已今河口既未成功則其他掃岸皆不須為之可更不起發其見在河上急夫亦令放散上以子淵所修直河不為功徒費工料以數十萬計故也既而子淵自言兩修進鋸牙河口幾塞不虞漲水及風雨暴至功敗於垂成乞候霜降水落修閉詔子淵降一官仍不理提刑資序八月十六日罷修河韓駒云范子淵建言開廣武導水回逺則京城常無淹浸之慮踰年役不就故責詞云汝以有限之財興必不可成之役初神宗喜其言及罷役闔臺論之才貶一官駒所云當考詔諸遞鋪轉送金字朱牌無遲滯四次者轉一資或賜絹五匹餘每次絹一匹又詔客省四方館使副各領本職外官最髙者一員仍兼領閣門事給事中韓忠彥言去年七月乙巳詔給事中駮正事赴執政禀議如有異同即據狀取㫖今月丁亥門下省得㫖舉駮事依中書舍人封還詞頭例庚寅中書奉㫖給事中駮事赴執政禀議如有異同即具狀繳奏臣詳中書省再得指揮乃是不許依舍人封還詞頭例但改舊文據狀取㫖為具狀繳奏而已竊以給事中與中書舍人職任頗均如有所見一則不禀白而聽封還一則許舉駮而先禀議於理未允久失申明昨蒙處分事體方正况朝廷已施行事三省僉同給事中或有管見仰裨萬一即是已與執政異論自當求决於上豈宜更禀可否於執政乞依丁亥詔所貴兩省官輕重體均獲申獻納之分從之時章惇為門下侍郎乙巳詔乃惇意也畢仲遊作忠彥行狀可考壬辰朝獻景靈宫至天元殿觀芝草宰臣王圭等稱賀仍宣從官以上賜茶自是朝獻畢皆御齊殿賜茶是日將至繼仁殿攝太常卿趙彥若度上必哭因附入內都知石得一奏之上遂不哭繇是中元朝獻唯上湯一慟而已癸巳西賊犯安塞堡五月四日奏到吕新紀夏人冦延州安塞堡將官真敗之五月一日并十九日可考敗舊紀書第五將吕真之甲午上批近中書省言提舉河北路保甲狄咨對執政官言所部見教保甲借户馬二萬餘匹初疑所言非實今據本路承受奏數乃極相逺可下咨具析以聞朱本新本並削去存此可見當時提舉保甲官所言多不實也河東路提舉常平司言去年災傷民户闕食義倉穀不多乞於常平封樁糧支三五萬石賑濟從之知荆南朝議大夫孫頎降敕奬諭賜銀絹二百轉運副使朝奉大夫祕閣校理趙楊轉運判官承議郎高鎛知誠州西京左藏庫副使閣門通事舍人周士隆各遷一官以招納潭溪上和等處歸明人及開道通廣西融州王口寨功畢也詔簡中保寧六指揮所闕人數依蘭州創置壯城指揮例於團結廂軍投換每指揮額外量增五十人以備逃亡填闕令經制司依例給轉軍錢京東路都轉運使吳居厚言徐州利國監鐡柔良堪用乞置實豐下監每歲除供給公使外鑄折二錢二十萬緡委清河輦運司以次附帶上京寄納却令三門輦運司具舟載至河中府因回腳鹽車入陜府轉移用度歲歲如此不為無助乞從臣相度條畫立法詔畫一具合費用及自利國監至京腳直以聞今約鑄折二鐡錢二十萬緡當費用及至京腳直計萬五千四十緡詔付户部關工部並如居厚所奏詔東南諸將無馬處並改造步人器甲乙未詔襄州編管人劉彛放逐便密州民苖茂投匿名書誣告板橋鎮監官張獻臣謀反有司言茂已經赦詔特杖脊二十刺配沙門島丙申詔陜西軍須經費錢物近已降指揮各為一窠支用其令京師總計司勾考侵冒初置總計陜西軍須錢物所實録不詳今全用御集本文庶易曉也復置兖州鄒縣舊紀書復鄒縣五月己亥朔御文德殿視朝召輔臣觀麥于後苑宣德郎校書郎邢恕為著作佐郎十一月乙巳遷職方降授宣德郎葉祖洽為校書郎祖洽初除知湖州上批祖洽熙寧首榜高第可與祕書省職事官也涇原路經略司言自今沿邉將官城寨使臣坐事衝替去再下本司察審軍前得力人量事大小於酬奬折除或展年降官依舊在任從之詔吏部立法六月辛巳可并此詔鄜延環慶涇原熙河蘭㑹河東路各給空名宣頭劄子二百庚子詔荆湖南提舉常平司㑹計兩路所置溪峒州縣城寨歲費實數以聞從右司員外郎孫覽請也此月十一日八月一日六年五月十二日可考詔自京選將校補廣南諸軍將校者並官給路費壬寅詔知延州劉昌祚去月癸巳西賊犯安塞堡第五將以少擊衆獲其酋豪非將副謀臧士卒用命豈能如此若無非常之賞何以使勇於公戰者知勸除朝廷已特支外可以經撫庫金帛或御前降去銀器先賞衆所親見用命有功之人其諜知賊馬信驗者優豫酬奬初賊數萬冦塞門昌祚遣米贇以本將拒之斬級一百一十六殺統領伊實巴特瑪副統軍密烏瑪大首領鈐轄等五人伊實巴特瑪密烏瑪實主永樂之事至是中外稱快因圖形以進上喜甚遣近侍即軍中慰勞諸將皆優擢此據張舜民墓志昌祚傳亦同新舊紀已見四月二十四日癸巳又五月十九日丁巳可考龍圖閣直學士權知開封府王存為樞密直學士再任存辭不拜免再任詔三路保甲借民私馬習藝者聽依舊甲辰邢州司法參軍鄜延經略司勾當公事李夷行為承奉郎經略司上夷行隨軍獲一級也侍御史張汝賢言比部員外郎宇文昌齡倚任吏人鄭世隆自守當官差權正名令史世隆用事援引使臣趙元為主事而元不曉錢穀昌齡庸暗偏任小人竊恐敗事詔昌齡具析朱本云具析到無施行合删今復存之昌齡墓志可考上批司封員外郎吕升卿乃吕惠卿弟奏乞往河東受辭既非朝廷専命但與告歸少異爾可特依所乞不住請給支驛劵仍帶親隨吏升卿初乞依奉使例故也又批京東東路第二將歐育昨防托修永樂城移疾於米脂寨及以書間諜沈括种諤可罷將官賜鄜延路經略司見錢鈔五十萬緡乘秋稔市芻糧以劉昌祚言軍資庫及轉運司軍須年計才可支三兩月也丙午宣德郎大理評事咸平來之邵為監察御史用中丞黃履薦也八月丙子罷詔內人朝陵諸陵使臣毋得差伎樂迎送著西京令丁未以供備庫副使文貽慶兼閣門通事舍人以父彥博致仕推恩擢之西頭供奉官武欽蕃官西京左藏庫副使歸仁各遷一官文思副使折可適侍禁嚴顯殿直耿端彥齊誠城磨勘二年半權河陽節度掌書記張績循一資鎮寨使臣分三等减磨勘年賜絹以根括蕃兵論賞也環慶路走馬承受公事黃誥乞令諸州軍城寨積石以備守禦詔下陜西河東路施行供備庫副使知火山軍康昺衝替以在任籍行人糧斛故也詔自今髙禖祝版與配坐並進書己酉詔皇后父祖墳寺左街資福禪院可除每年撥放外遇同天節度僧二人紫衣一人荆湖路相度公事左司員外郎孫覽言沅水已招懷結狼九衙等百三十餘州峒乞委本州隨其風俗量宜約束不必置官屯守自困財力盧陽麻陽之間有生莫徭五百餘戶乞招撫補授令把托道路自誠州至融州融江口十一程可通廣西鹽乞許入錢於誠州買鈔融江口支鹽增息一分可省湖北歲餽誠州之費辰沅州凖此徽誠蠻多典賣田與外來戶乞立法溪峒典賣田與百姓即計直立稅田雖贖稅仍舊不二十年蠻地有稅者過半則所入漸可减本路之費乞下誠沅邵三州施行又沅州官水陸田山畬乞許射佃候耕墾熟限年立課辰州土丁三千自建誠沅州分在逐州屯守裹糧畨休相繼於道人力不易欲乞募歸明人及內都每土丁十人兼雇四人漸可减罷土丁緣邵州屬湖南誠沅州屬湖北融州屬廣西地跨四州分屬三路緩急措置不相照應欲乞誠沅融邵四州內擇地里居中要便一州令知州帶提舉誠沅融邵四州緣邉溪峒兵甲公事或緣邉安撫都監名目如逐處溪峒有合措置並許申禀提轄抽那應副詔誠州買廣西鹽立蠻人地稅免租課佃官地並施行其乞誠沅融邵四州擇知州帶四州兵甲事下逐路相度此月二日七月四日八月一日六年五月十三日可考初朝廷既治五溪而蠻猺介荆湘桂管之間官兵鎮守勢不能相屬數困侵掠覽奉使相視要害增築障塞道荆湘桂管溪峒使相通逹兵不留行蠻費大省而患亦息㑹議者欲招徠誠州西道胡耳等而辰沅又欲籍蔣波六猺人為民覽曰西道胡耳之蠻猶禽獸也即奏罷之及還見上因極言徽誠內屬當時從事者官過其望雖趨走給使之賤皆欲資蠻以為官未有已期蠻猺散漫山谷不能羣聚說諭招徠冝無難者然地不可賦人不可使廣無賦之地籍不使之民而大農之費纍百巨萬願畀之郡縣羈縻之不以纍中國後有言者唯陛下察之上納用焉此據畢仲游志覽墓附見五月十一日覽奏請後五年十一月十二日周士隆云云可考環慶路經略司乞增馬軍三二千騎防秋詔發在京馬軍五指揮權駐邠寧州支十分馬詔高麗人齎王子僧統書及金銀遺秀州僧淨源源有答書即明州移牒報之庚戌龍圖閣待制知桂州熊本賜銀絹三百仍降詔奬諭以招納廣南西路潯融王江溪峒蠻并開路功畢也其勾當文武官趣經略司上功狀五年七月八日本知桂州六年六月四日辨正疆至七年六月四日除吏侍八月九日詔候辨正赴闕十月二十二日賜交趾詔此辨正事也開路功此月十一日己酉二十七日乙丑六月十三日辛巳八月一日戊辰九日丙子可考崇寧三年王祖道云云當并考詔昨西賊圍蘭州有投來蕃部倫約克先報最為信驗與遷三資如不願遷資支錢三百千雄州言主管覘事人馬傑探報北界事有驗詔與二班差使詔涇原路經略司促姚麟速上出界將副部隊將下元部馬步軍人數以聞欲行賞也詔北界牒理㑹寧化軍差人過天池地分捉拏人口事可下經略司契勘緣故詣實疾速依理施行回牒訖奏御集辛亥權知開封府龍圖閣直學士王存為兵部尚書存固辭且言左丞王安禮之妻乃臣故妻之妹法亦當回避詔不許後旬日改户部尚書改戶書乃二十五日今并附此詔提舉河北永興秦鳯等路保甲司官各兩貟自今奏請文字並聨書機速事不用此法詔自今提舉保甲武臣須委有面陳事即許夏季入奏壬子踈决在京獄囚彊盜鬪殺輕者减一等雜犯抵死降流流以下第降杖以下第降以下釋之開封府界諸縣凖此兩紀並書此西頭供奉官劉奭為閣門祗候後毋得為例奭永年子章獻明肅太后族孫故擢之詔環慶路土兵三千人留戍鄜延歲餘人情非便其令罷歸癸丑龍衛軍使李真換右侍禁减磨勘四年為本路隊將從熙河蘭㑹經略司奏也詔遣使案閲將兵武藝將副應殿最者最不及五分殿不减三分不賞罰乙卯詔著作暫闕官校書郎或正字兼權龍圖閣直學士定州路安撫使蔡延慶奏伏望下都總管司今從定州河北駐劄第一第二將每月一次輪馬步軍一指揮赴州衙教場帥臣親按閲提舉詔令依將敕施行案記十八日事丁巳皇城使忠州刺史吕真領嘉州團練使米贇為內園使雄州刺史內殿崇班張仲元為內殿承制閣門祗候以上批安塞敗賊實由吕真斥候明審米贇得以收漢蕃入堡安塞被圍即領所部應援與副將合力驅除雖斬獲不多亡失過甚推其存心忠勇不以彼我為念冝奬之以勸協力國事者贇等以單孤一寨守兵不滿千人却賊數萬斬獲著名凶悍酋豪十數賊喪氣逃遁與前後出寨俘斬老弱不同可優厚推恩故也四月二十四日并此月四日可考詔自今客省四方館閣門暫闕官即互權己未河東路提舉常平司言提舉河東保甲乞借糧於停積之家貸闕食保甲常平司以常格止絶若貸非保甲户即為侵越已奉詔聽本司施行勘㑹保甲司勸誘多勒令出辦教事錢糧乃其本職賑濟當關本司豈非侵越詔提舉保甲司放罪提舉常平司撥糧二十萬石約保甲隨處封樁保甲司有災傷奏聽朝㫖賑濟河北陜西凖此河北等路各十五萬石永興等路各二十萬石秦鳯路各十萬石提舉河東保甲司言保甲並起團教乞輸小保人戶逐村修鋪屋備更鼓巡宿從之庚申通直郎寶文閣待制知潭州何正臣奉議郎提㸃湖南刑獄劉載各降一官通判潭州李綱罰銅十斤正臣知廬州載綱並衝替綱坐私忿提㸃刑獄司吏教人舉首而案其罪正臣載坐互論奏故以不實也五年五月二十七日正臣知潭州詔明州昌國西監巡檢司招土兵百人於明州崇節指揮除其數以鈐轄司言昌國西監兼岱山鹽場控扼海道也詔中書舍人蔡卞給假一月令往江寧府省視王安石疾病此據御集八月三日催赴闕辛酉白虹貫日兩紀並書正議大夫知筠州滕甫知湖州正月乙巳可并此朝散大夫直集賢院權管勾西京留守司御史臺范純仁權知河中府官制初行上欲召純仁用之王圭蔡確言純仁好異論且疾病不可用及純仁弟純粹由陜西轉運副使入對上問純仁無恙否純粹對以實上悟尋有是命此據邵伯溫聞見録伯溫云即除龍圖閣誤也純粹除郎在四月庚辰純仁至河中時督教保甲甚嚴非老弱不許在家農事皆廢純仁上疏言竊見陜西今夏二麥將欲成熟要衆手併力收穫入倉當如冦盜之至若稍過時或值風雨則所損極多不惟可惜一年民力耕種之勤况當邉陲用兵之際糧儲不可少乏緣今來保甲並是彊壯之人却以五日一次教閲有妨農事又况夏熱筋膠軟弱人力不健非閲武之時伏望聖慈特賜指揮應令保甲於此農忙之際權住教閲將來冬寒農隙却令補填合教日數所貴不奪農時人不之食又百姓兩丁之家一丁保甲須一丁供送則治生全然失力其間更有地少貧弱之人尤為不易伏望朝廷更賜采察又言今秋陜西田稼豐稔將來軍民必皆足食然收穫不可稍遲當如冦盜之至蓋子實才熟即有雀鼠侵耗之害兼易為迸散遺落萬一忽遇風雨即所損極多緣今來少壯農夫多係保丁却以五日一次教閲及往還頗妨收穫伏望聖慈特與權住教閲候至將來收穫了畢即令補填權住過日數如此則公私不失其利亦使務農教戰各得其時如臣言可采乞作聖意施行不報提舉京東保馬霍翔言買馬法無過八歲及十五歲給公據斥賣竊以牡馬十歲方壯牝馬十七歲猶生駒乞許買十歲以下牡馬十三歲以下牝馬十七歲以上斥賣馬錢先以提舉司錢代支民戶均助錢令隨役錢納民有物力在鄉村而居城郭謂之遙佃戶欲乞鄉村保甲養保馬均出助價及單丁女戶見與保甲同等第人第三等以上推排主養官户守官在外及第四等以下女户單丁止出助錢寺觀有物力乞依附戶從之仍下京西路施行翔又言約京東路齊淄青鄆密濰六州産馬最多可减為五年濮濟兖沂徐單曹州淮陽軍南京産馬差少可减為七年登萊二州馬雖多往往不及格可依舊十年取足詔五年者展為六年七年者展為八年餘依奏志有壬戌戶部言河北轉運司借支河北糴便司封樁及舊糴便司三司封樁六十餘萬石無寬剩錢物撥還乞除放詔通限十年還詔自今春秋釋奠以鄒國公孟軻配食文宣王設位於兖國公之次荀况揚雄韓愈以世次從祀於二十一賢之間並封伯爵况蘭陵雄成都愈昌黎初晉州州學授陸長愈言近封孟軻為鄒國公謂宜春秋釋奠與顔子並配下太常而太常少卿葉均博士盛陶王古楊傑辛公祐謂凡配享從祀皆孔子同時之人今以孟軻並配非是禮部看詳唐貞觀二十一年詔以漢伏勝高堂生晉杜預范寧之徒二十一賢與顔子俱配享孔子廟堂至今猶為從祀豈必其同時人也孟子於孔聖之門當在顔子之列久未配食誠為闕典伏請自今春秋釋奠以鄒國公孟子配食荀况揚雄韓愈並以世次先後從祀於左邱明等二十一賢之間左邱明至范寧等二十一人並封伯爵乞荀况揚雄韓愈亦封伯爵自國子監及天下至聖文宣王廟皆塑鄒國公像其冠服同兖國公仍畫荀况等像於從祀之列荀况在左邱明之下揚雄在劉向之下韓愈在范寧之下冠服各從封爵均等又以為非是禮部言均等援據不經無足取者於是從禮部議而有是詔又詔學士院修撰贊文據林希傳此議實自希出希時為禮部郎中墨本此時已從禮部所請朱本又加詳焉而哲宗實録新舊本並於元豐八年三月二十八日辛酉書詔孟子同顔回配享文宣王荀卿揚雄韓愈同左邱明從祀令學士院修撰贊文似重復也蓋三月二十八日但令學士院修撰贊文耳其配享從祀則七年五月二十四日既有詔矣今并見于此兩紀並書於此詔諸路帥臣監司等舉大使臣為將領癸亥御史蹇序辰乞下江西提舉鹽事司考校諸州軍同提舉管勾兼監官功狀比租額多者比附福建路近例擬定行賞詔下司勳施行提舉京西保馬司言本路養馬十五年數足乞每都先買二十匹限歲終足許本司較量知在能否聞奏升黜詔依元降年限每年買及一分志有甲子詔京西京東路民已養户馬者免保馬廣南東路轉運司言軍賊藍載等除䖍梅二州人外其餘皆汀州人乞下福建路提㸃提刑司及汀州協力捕殺詔兩路監司合兵捕逐毋擅招誘如逗遛養冦當不用常法停竄尚書省言自行官制以來諸寺監不治外事唯大府寺市易案事與諸路相關看詳興置市易當令所在官司量度州縣間要遇賤則買遇貴則賣元置市易詔半夏出息一分一年以上出二分然所在物價增减難以期定而一州一縣價所增减相去亦必不甚逺則貨或積而難售所在州縣物價不同又不能遍知今若每旬令一路州軍估定物價報提舉司提舉司報轄下軍州州下所屬榜募人出抵當或見錢市易司收息一分至二分令商人自賣則官收二分之息又有餘利以資販者則商賈流通貨無堙滯稅額敷羡物價常平若無可抵當而貨須變易者但不虧元價亦賣詔具為令乙丑禮部乞六曹於所𨽻寺監寺監於所𨽻司局各許抽摘㸃檢稽遲者稱事書罰或上簿上下半年各取索㸃檢從之詔廣南西路總略司管勾機冝文字承議郎程節為朝散郎勾當公事宣德郎程遵彥為通直郎知融州西頭供奉官閣門祗候溫杲都巡檢西頭供奉官劉舜賔王口寨監押右侍禁杜臨各遷一官餘遷官减磨勘年賜絹有差經略使熊本上招納融州溪峒通道置驛功畢故賞之十二日賜本銀絹八月一日可考神虎都虞候吕釐免解發并戰功升五資換內殿承制為涇原路第十一部將丙寅上批付劉昌祚夏人昨者不承詔命繼舉大衆攻圍蘭州傷夷敗散續為諸路討擊勢頗摧喪近於本路出沒又為邉吏斬其酋豪自此忿氣應更增倍若不開示招徠深慮蜂蠆有毒困獸猶搏用兵未有休時卿可相度具可與不可開導朝廷恩意以聞中書省言熙寧二年天下應有馬十五萬三千六百三十四詔兵部取索內外馬數比較以聞詔給末鹽錢鈔三十萬緡為河東路轉運司糴本熙河蘭㑹路經略安撫制置使李憲奏勘㑹熙河岷通逺四州軍百物踴貴米斛四百七十足今幸二麥有十分之望經制司全無糴本臣欲乞於賞功不盡絹內支撥絹二十五萬匹剗刷借支錢五萬貫并採買木植司借支錢五萬貫及乞下𣙜茶司於熙州借撥見錢一十五萬貫通以五十萬貫匹趂時收積軍實從之御集丁卯提舉京西路保馬司言體問上等户私馬有三兩匹者願盡印為保馬乞許養至三匹除役錢保內巡宿催稅甲頭等依元法减免外以所養馬每匹各聽次丁一人凖法公私罪杖非侵損於人者用贖從之京東路凖此五年二月五日丁巳霍翔陳請已移入七年二月八日賜綾錦院營御厨營修三省六房院初三省吏自言樞密院昨置五房院主事以下集居公私以為便三省總領中外之事理冝謹密乞於舊城內置官舍以備緩急付受行遣詔置三省六房院令録事至令史集居至是以營地賜之後不果置御史寋序辰言聞知杭州張詵於部下雇乳婢留三月限滿其夫取之詵乃言元約三年其夫訴于轉運副使許懋取契照驗實三年也始悟引致人見罔挾刃往刺既不相遇旁中四人卒與俱死杭人寃之望下本路體量如實乞行顯罰詔提㸃刑獄司考實以聞後提㸃刑獄司言無之其奏遂寢詔文臣中大夫武臣諸司使以下致仕更不加恩以雍州延衆寨為冨州按元豐九域志冨州廢於開寶五年省馬江思勤二縣入龍平𨽻昭州三朝地理志同不知何故復置冨州又不知何年仍廢當考
