body:
  text: 續資治通鑑長編巻二百五十一宋李燾撰神宗熙寧七年三月庚子分命輔臣祈雨知處州都官員外郎劉彝直史館知桂州知桂州刑部郎中天章閣待制集賢殿修撰沈起令於潭州聴㫖初廣西轉運使張覲言都廵檢薛舉擅納儂善美於省地而起不之禁上批熙河方用兵未息而沈起又於南方干賞妄作引惹蠻事若不早為平治則必滋長為中國巨患實不可忽宜速議罷起治其擅招納之罪以安中外於是中書請以孫桷或康衛代起時桷為荆湖北路轉運使衛知潭州上批章惇不久赴闕湖北事恐且須孫桷照管康衛不知其為人如何若熊本可輟以往甚善而王安石陳升之等皆言本方經畫瀘州夷事瀘桂相去絶逺而廣西即今須人應接江淮發運副使張頡知䖍州劉彞恐可使代起而彛便道趨桂尤近乃詔遣彛而又令以前日付起約束付之且使彛體量起納善美事後彛體量奏至仍命起知潭州沈起知潭州乃五月六日事今并此劉彛體量云何實錄新舊本皆不書彛盖為起隠者八年十二月二十二日彜於潭州聽㫖辛丑釋河州亡失主將景思立兵校等仍令自首上以思立輕敵取敗特有所縱舍亦不復贈思立官涇原路經略使王廣淵言自渭州至熙州運米斗錢四百三十草圍錢六百五十諸處闕廂軍若差倩義勇之類騷費尤甚必大失生業如支移糧草乞詳酌所以應副詔劄與王韶都提舉市易司言近遣試將作監主簿劉黙相度置市易務於成都府路乞借司銀十萬買茶從之壬寅錄繫囚雜犯死罪第降一等杖以下釋之賜自京至熙河急脚遞舖特支錢有差王安石白上將帥利以多殺為功熙河諸羌但能存恤結以恩徳全惜兵力專事董戬即諸羌自為我用若專務多殺乃驅之使附董戬令敵愈强而自生患不惟非計亦非所謂仁義之師也上以為然令速諭王韶先是上謂安石曰蕃部非痛殺不可服高遵裕討蕩谷口阨中蕃部承受問遵裕此無罪遵裕言今雖不作過若有事宜必先梗道路安石曰若如此宜其擾攘不定項羽至强但以多殺故人相聚而畔趙充國言羌人所以畔亦以漢兵不分黒白故曰撫我則后虐我則讎此古今夷夏之大情且青唐一族不經誅戮又陛下厚撫包順所以盡力殺賊乃以恩信結之故也上言河北事絶未有實然形迹已露王安石曰彼汎使來我戒懼而為備使彼聞之亦何所害但不當非理怒之耳且如保甲不可閉匿而成就也馮京曰此等事不宜倉卒安石曰因循至今所以不免倉卒然亦何嘗倉卒上曰如造車車未成而騰説已紛紛安石曰既造進車樣廷試車非懐握可藏之物中外共見如何免人騰説且此事雖著亦何所妨上患諸將行軍都無行陣之法曰據理用兵全未得安石曰誠如聖㫖若要用兵先須朝廷因古今之宜討論法制然後擇將帥授之兵乃可用今人人以私意妄相搏撃殊無法制人命至重誠宜早計深慮吳充建議乞棄岷州上曰自可守何須棄王安石言岷州若棄必有取而為主者則階秦熙河皆受敵上曰誠然是於兩路脅股間又生一夏國也翌日邊奏摩正果荘大兵轉入岷州上以為憂安石與王珪皆言彼師已老必難渉險逺攻岷州保亡慮馮京獨不謂然已而奏至果如安石等所料安石珪言岷州保亡慮㨿安石日錄上又憂熙河城寨氣道未相接安石曰城寨非少若更増添即糧饋難給今此沮敗止縁景思立輕出非闗城寨但當急撫定蕃部收其豪傑為用耳不然則官軍但能備蕃為變未有力制秉常董戬也又蕃部亡蓄積失田作饑窮必聚而為寇但隔商旅即河州供饋自須倍費以此計之不早撫定蕃部賑其乏絶使饑窮合而為寇非得計也上令安石速與王韶書言之四月十二日高遵裕為岷州團練使以守城功則賊固嘗攻圍岷州也安石珪之言當考詔災傷路委監司各分地檢計合興農田水利及隄岸溝河道路栽種林木土功之類可以募夫者並具利害以聞又詔災傷州縣所發常平倉糧斛不足令轉運司兊那應副其第四等以下户應納役錢而饑貧無以輸者委州縣保明申提舉司體量詣實於役剰錢内量分數或盡蠲之即不得以故支用有闕河北西路察訪使曽布請依鄧潤甫察訪京東例本路士人有行義為鄉黨所服智識才武足備器使者以名聞遣赴闕如有可采即隨能錄用從之知酸棗縣祕書丞王正辭廵檢内殿承制郭千並衝替坐違法令保丁置衣裝也癸卯詔以旱避正殿減常膳甲辰王韶奏已領兵自秦州入熙州上深怪韶輕易王安石曰韶此行不為輕易西賊在馬銜山外摩正在洮西寧河寨左右韶日行秦熙境内若賊入須有烽火斥堠安能近韶若防刺客之類即五百人不為少况又沿路城寨所收兵五六千人何所懼而不進因言唐太宗與頡利語事上曰太宗有兵隨其後至安石曰韶去賊逺又已集兵通逺臣竊以為無可慮者韶昨與臣書已進呈欲阨要害勿與戰須其人心離潰乃要而撃之且欲以修常阿納城致賊皆不為失計兼累書及累奏皆言持重必不肯率易取敗上令安石作書戒韶安石謂不須如此先是上言韶若入熙州堅守為得計安石曰恐韶不得堅守必擇要害地據而扼之候其師老人饑然後討撃乃為得計已而韶報安石書所計悉與安石同乙巳白虹貫日王安石言提舉編修三司敕式成四百巻乞修寫付三司等處從之新提㸃秦鳳等路刑獄鄭民憲言奉詔同熙河路經畧司相度借助應募弓箭手買種糧牛具造屋及今夏耕種乞帯審官西院主簿舒亶往從之亶慈溪人也前為臨海縣尉負山瀕海民剽悍成俗有使酒逐其叔父之妻至前者亶命執之不服即斷其首投檄去王安石聞而異之欲召用㑹丁父憂服闋乃除審官西院主簿十一月七日民憲以營田圖入對荆湖北路察訪章惇言邵州新化縣已建學乞下轉運司給水田二百畝為學田從之詔役錢每千别納頭子五錢其舊於役人圓融工費修官舍作什器夫力輦載之類並用此錢不足即用情輕贖銅錢輙圓融者以違制論不以去官赦原先是凡公家之費有敷於民間者謂之圓融多寡之數或出臨時汚吏乘之以為姦其習獘所從來久至是始悉禁焉上患修河北守偹而北敵疑以問輔臣王安石曰明告其使北朝屢違誓書要求南朝於誓書未嘗小有違也今北朝又遣使生事即南朝不免須修守備修守備緣不敢保北朝信義故耳若南朝固不肯違誓書先起事端如此則彼亦或當知自反上以為然丙午太子中允崇文院校書黎侁為館閣校勘權三司使曽布上熙寧新編大宗正司敕詔付本司施行知諫院鄧潤甫言御史黄履近罷臺職中外之論皆以為履言事有所不合既而傳聞履因求對懇辭臺職且引馬援戒兄子之言曰吾欲汝曹聞人過失如聞父母之名以此不敢安職臣恐内外大小之臣皆務為持循拱嘿而不言人過如此四海之人當有受其弊者惟陛下稽之古人折之義理亟令履就職且以明人臣事君之義不報二月二十三日履免御史分遣使臣十人諸路選募熙河効用武藝高强軍人量増料錢凖備呼使如經一年願復歸本營者聴每路兵五百人既而知雄州馮行己奏縁邊州軍乞不選募乃命除諸路兵中選者籍名以聞未得輙遣外河北河東所募兵悉罷手詔累據廣西經畧司奏探報交趾聚兵欲犯省地深慮邊臣不量彼已輕出兵逺離城寨迎敵宜速指揮蘇緘如蠻人敢直來侵犯邕州仰按兵固守無得貪功輕敵戊申手詔河洮岷州為寇蕃部多是脅從若更討蕩是驅使附賊本路兵力適足備内患不復能及外寇今王韶已到熙州大兵聚集蕃部必各懷恐懼令韶乘此氣勢招撫蒐擇强壯濟其糧食授以方略責令討賊自効若有功即厚酬賞貴全兵力兼收蕃部為用從王安石之言也權許州觀察推官李公義為衛尉寺丞右侍禁李希傑不依名次指射差遣三邊借職王尹樞宻院與差遣句容縣令耿憲開封府界提㸃司勾當公事鄒極各堂除差遣並以用濬川杷鐵龍爪疏濬汴河増深推恩也初王安石請與公義改京官上難之第令轉資安石固請乃有是命公義初見六年十一月八日本志云五年賞濬川之功公義與堂除六年王安石為上言用杷濬二股河及間塞魚助河之利曰今諸埽疏去沙觜即水自移徙若不輟工雖二股河上流可使行地中上乃與公義改京官按公義改京官乃七年三月十一日本志係之六年誤也與公義堂除實錄亦不載詔諸軍教閱止令都總管司施行先是詔五路自安撫司以下提舉教閲諸軍義勇保甲嵗取㫖陞黜而知大名府韓綘言諸路安撫司盡兼都總管訓練乃其職事内提舉諸軍教閲逐時提振行遣與諸軍供報文字増至一倍乞教閲諸軍責總管司外義勇等事即依今處分故有是詔當并入二月十一日秦鳳等路都轉運使蔡延慶言今經畧司已兼制置糧草其軍須司乞行減罷所貴事理歸一州縣易於承禀從之詔梓夔路察訪熊本體問戎瀘黎雅間夷人戰馬如何設法可買及逐年買數以聞要見本後來如何具奏庚戍屯田員外郎權發遣提㸃開封府界諸縣鎮公事吳審禮勾當公事大理寺丞張景温殿中丞前權發遣提㸃開封府界諸縣鎮公事劉淑各減磨勘二年並以引見開封等縣新教保甲也神宗寳訓五年王安石言吳審禮近巡按保甲上畨人還言人多願且留上畨其較藝得錢多者極歆豔習學事藝至忘寢食上曰法當如此太祖諸營戰冇功乃令闔營增俸此人所以樂戰也今虎翼一營例給五百料錢人何所勸安石曰曩者非但軍人至於士大夫亦各自計資級若稍稽留即生觖望及陛下稍分别才否黜陟不復盡用資序士大夫乃始粗知有勸已附五年十二月三日賜知岷州高遵裕子士充同進士出身士充管押蕃部赴闕詔試出身而遵裕言寓通逺軍極蹇乏人照管乞候邊事寧息遣赴試遂特賜之仍令乘驛亟還詔熙河死事官親屬欲歸鄉者除孝贈外大使臣以上給路費錢一百五十千小使臣百千差使殿侍五十千其該説不盡者比類支給以旱遣官分禱京城畿内諸祠其五嶽四瀆並委長吏致祭仍令諸路監司檢察廵按所部淹延枝蔓刑獄審刑大理未斷公事疾速結絶以聞兩浙察訪沈括言兩浙上供帛年額九十八萬民間賠備甚多後來發運司以移用財貨為名増兩浙預買紬絹十二萬乞罷之以寛民力從之仍令兩浙提㸃刑獄司根究配買因依劾罪以聞詔兩浙淮南河北京東西陜西等路災傷州軍逋負官物權停催理又詔問鎮定州民有拆賣屋木以納免役錢者令安撫轉運提舉司體量具實以聞其後逐司奏體量得諸縣去秋旱災以故貧下户亦有拆屋賣錢以給己家糧及官中諸費者非專為納免役錢也王安石白上百姓賣屋納役錢臣不能保其無此縁以今之官吏行今之法必多輕重不均之處然論事有權須考問從前差役賣屋納役錢孰多孰少即於役法利害灼然可見在逺或難據見但問鄭滑則天下事理可知矣上又批問安石百姓為貸市易抵當所錢多沒産及枷錮者安石對自置市易以來有六户賣抵當納欠錢然四人以欠三司錢或以他事折欠故賣産有納户教唆令衆人並不須納錢且申展限故送三司枷錮納錢若請官錢不立供抵保法即理不可行若供抵當即本備違欠出賣償官若不許出賣償欠即亦理不可行兩年之間而賣産償欠及枷錮催欠止於如此乃無足怪今天下三年一郊所放欠至一百餘萬貫即其賣産償欠及枷錮催理多少可知然議者何以不言陛下何以不怪而問之上曰人言賣産極多枷錮乃至無人可監守安石曰人言必知賣産主名及見枷錮人所在陛下何不宣示言者姓名付所司推問若實有之市易司蔽匿不言即罪固不可輕斷若實無此而妄言不知陛下含容此人於政事何補上曰言市易擾人不便者衆不知何故致令如此安石曰文彦博之徒言朝廷不合言利此乃為臣而發其餘左右近習誣罔市易即以吕嘉問首公奉法與内藏庫内東門司都知押班御藥争曲直其事皆經論奏又嘉問每事欲盡理與三司開封府屢争職事雖未嘗不直然衆怨由此起向時有言市易賒物後抵當納欠不足乃令私下買所賒人物者償欠及根究乃是三司賒糶糯米如此追逮直至河北京西若市易但有如此一事必無不上聞之理今三司如此陛下亦聞之乎不知陛下何故乃不聞此而但聞市易擾人此無他由憑附近習與不憑附近習故也今人臣皆憑附近習然後免責一與近習忤即吹毛求疵無所措手足臣恐治世無此事壬子上問輔臣曰聞汎使來人甚恐如何王安石曰汎使來不知人何故恐但不逞多口之人因此妄説爾上曰王陶言大旱又汎使來人惶擾必致大亂安石曰亂亦何難致若人主失計則天下大亂矣人主茍無失計徒以旱故遂大亂即無此理馮京曰大旱盜賊起何為而不亂安石曰君子在位若旱而不能除盜賊亦無此理但恐陛下所任未盡君子而已詔見留秦州蕃官轄烏察等令王中正等常切安存照管癸丑羣臣上表請御正殿復常膳詔不許表三上猶不許是日上謂輔臣曰成都且休置市易務如何王安石曰己遣李把相度竢其還不置亦無傷上曰若不置更相度即蜀人必致驚擾安石曰不知置市易有何驚擾况但相度因何驚擾上曰天旱民饑欲且省事安石曰若因天旱人饑便廢修政事恐無此理臣初固言成都市易必致異論今市易近在闕門之内然讒訴日出若於萬里之外置務即異論必更多當此時陛下便令不相度即已今既遣使相度乃憂蜀人驚擾為變而罷此豈不為四方有識所笑以為朝廷臨事憂怯如此上乃己日錄二月二十三日安石云如未能無疑即不如勿遣李杞凡四五行今并附此不重出四月五日罷相度市易上問安石納免行錢如何或云提湯缾人亦令出錢有之乎安石曰若有之必經中書指揮中書實無此文字馮京曰聞後來如此細碎事都罷矣安石曰馮京同簽書中書文字皆所親見如何却言聞不知先來如何細碎收錢後來如何都罷若據臣所見即從初措置如此非後來方不收細碎事不知馮京何所憑據有此奏對且言提湯缾亦令出錢必有人陛下何故不宣示付所司考實陛下觀詩書所載豈有函容小人誕妄都不考實而能治者不惟詩書如此律上書詐不實徒二年口奏亦是所以如此人主當愛日故也寸隂可惜乃以聴小人誕妄之故棄日臣誠為陛下惜之陛下治身比堯舜實無所愧臣誠無復可以論諫至於難任人疾讒説即與堯舜實異如市易司非吕嘉問孰敢守法不避左右近習非臣孰敢為嘉問辨明以忤近習且市易事亦頗為勞費精神正以不欲背負所學為天下立法故也若每每忤聖意而又召致近習讒毁乃作擾害百姓之事不知臣欲以何為以為名則不善以為利則無獲陛下試察臣所以區區為此者何意上曰何故士大夫言不便者甚衆安石曰士大夫或不快朝廷政事或與近習相為表裏今大小之臣與近習相表裏者極有陛下不察爾自古未有令近習如此而能興起治功者陛下欲知近習之害政不難但觀朝廷小大之臣以不敢犯義之故不避近習者能有幾人若使異時在廷之臣皆莫敢忤近習表裏架合更相庇覆以欺陛下臣恐致亂不難也甲寅賜龍圖閣直學士秦鳳等路都轉運使蔡延慶詔奬諭初王韶自熙州入朝延慶權領州事㑹元夕張燈西賊乘間伏兵北闗下遣賀英等二十九人偽來請降與摩正先遣刺事人王遂等合謀將舉火為内應延慶覘知斬首以狥北闗伏兵惶擾遁去事聞故有是命詔殿侍散直充指使廵檢及縁邊把托及七年教押軍隊及十年委官吏保明牒殿前司磨勘奏轉三班差使詔三司以發運蕃息到錢物扵合屬處别項封樁以備朝廷移用判司農寺吕恵卿言本寺主行常平農田水利差役保甲之法而官吏推行多違法意及元法措置未盡欲榜諭官吏諸色人陳述其官司違法事並從本寺按察從之七月二十七日恵卿又有申請大抵類此魏泰東軒錄云熙寧已來几近臣有風望者同列忌其進用多求瑕累以沮之百端挑動以惑上聴曽子宣罷司農也吕吉甫代之遽乞令天下言司農未盡未便之事張粹明罷司農舒亶代之則納丞簿言不了事件甚衆又河北陜西河東為帥者各務矜功徼進徃徃暴摘邊事汚衊隣帥得罪則邊功在已也此風久矣而熙寧元豐最為甚也三年五月十七日恵卿判司農今年二月一日兼判司農記聞蘇兖云曽布改助役為免役吕恵卿大恨之當考食貨志云司農言始議出錢助民執役今悉募充請改助役為免役制可係之鄧綰劾李瑜前恐志誤已附三年九月八日當徐考乙夘太子中允崇文院校書檢正中書戸房公事張鍔直集賢院仍升一任縉雲縣尉制置涇原秦鳳路軍馬糧草司勾當公事郭逢原循一資仍堂除差遣供備庫副使賈顯内殿承制張濟各升一任以編修三司勑令及諸司庫務嵗計條例成也太常博士檢正中書禮房公事向宗儒太常丞集賢校理檢正中書吏房公事蒲宗孟減磨勘二年黄巖縣主簿崇文院校書曽肇循一資宗儒以編修太宗正司勑宗孟以八路勑肇以將作監勑成也詔三司以永興軍等路所鑄折二錢十萬緡付秦鳳等路轉運司備熙河支用四年三月十四日當考權三司使曽布判司農寺吕恵卿言臣等出使河北看詳邊儲仰給便糴自來措置無術胥吏專斗厚取賄賂而又官闕見錢及時收糴若朝廷借以一年糴本明給吏禄繩以重法其糴官亦以所糴石斗次第給賞於事為便乞與本路當職官司詳定條約以聞從之詔澶衛二州自今如河北饑民流移過河月具數以聞丙辰遼主遣林牙興復軍節度使蕭禧來致書見於崇政殿書曰爰自累朝而下講好以來互守成規務敦夙契雖境分二國克保於驩龢而義若一家共思於悠永事如間於違越理惟至於敷陳其蔚應朔三州土田一帶疆里祇自早嵗曽遣使人止於舊封俾安舖舍庶南北永標於定限徃來悉絶於姦徒洎覽舉申輙有侵擾於全屬當朝地分或營修戌壘或存止居民皆是守邊之冗員不顧睦鄰之大體妄圖功賞深越封陲今屬省廵遂令案視備究端實諒難寢停至於縷細之縁由分白之事理巳具聞達盡合拆移既未見從故宜伸報爰馳介馭特致柔緘逺亮周隆幸希詳審據侵入當界地里所起舖形之處合差官員同共檢照早令毁撤却於久來元定界至再安置外其餘邊境更有生創事端委差去使臣到日一就理㑹如此則豈惟疆埸之内不見侵踰兼於信誓之間具無違爽兹實便穏顓俟凖依先是執政多以為蕭禧來必復求闗南地王安石曰敵情誠難知然契丹果如此非得計恐不至此此不過以我用兵於他夷或漸見輕侮故生事遣使示存舊態而己既示存舊態而巳則必不敢大叚非理干求亦慮激成我怒别致釁隙也禧書未拆上猶以為疑安石謂必無它或是争河東疆界耳及拆書果然上諭禧曰此細事疆吏可了何須遣使待令一職官徃彼計㑹北朝一職官對定如何禧曰聖㫖如此即不錯上問禧復有何事禧言雄州展托闗城違誓書上曰誓書但云不得創築城池未嘗禁展托然此亦細事要令拆去亦可禧曰北朝只欲南朝久逺不違誓書上曰若北朝能長保盟好極為美事又問禧復有何事禧曰無他事也此據王安石日錄乃蕭禧初對時事實錄於禧辭日方書之未知孰是今兩存俟考實削一處據蘇轍龍川别志則禧初至時上既面諭之矣事見八年正月二十二日張方平墓誌云蕭禧至以河東疆事為辭上復以問公公曰嘉祐二年敵使蕭扈嘗言之朝廷討論之詳命館伴王洙詰之扈不能對錄其條目付扈以歸因以槀上之禧當辭偃蹇卧驛中不起執政未知為言公班次二府因朝謂樞宻使吳充曰禧不即行使主者日致饋而勿問且使邊吏以其故檄敵中可也充奏用其説禧即日行按方平六年十二月知陳州七年十月徙南京過闕蕭禧初來方平盖未嘗在朝也恐墓誌誤或指禧再來時則可上批方農事時秦鳳路多起義勇以妨田作將來穀價踊貴邊糧愈難計置可指揮張詵如自京差發兵馬至本路即先放散義勇令歸詔河北河東陜西京東西淮南路轉運司具轄下巳得雨州軍以聞朱史以此事小削去是未知春秋閔雨之義也今復存之戊午詔工部員外郎集賢殿修撰檢正中書五房公事李承之綴中書省班立起居舍人下又詔開封府今日以前見欠罰銅錢並除之王安石因辨市易事言自熙寧五年至今罰銅者凡千數百人開封府不能催納了當又不依條矜放極為擾人故也權河北西路轉運使劉航言自冬以來頗愆雨雪乞遣中使於曲陽大茂山真人洞投龍以禱從之兩浙路察訪沈括言泗州都鹽務免納船户而以官鹽等第敷配并給歴抑配居民寺觀違法詔淮南東路轉運提舉鹽事司根治以聞後實有抑配狀而官已罷去獲免手詔聞齊鄆等州比多盗賊轉運提刑司並不具奏聞可令速體量督責捕盗官嚴行追捕其闕食人户亦多方謀所以賑濟之新本以事小削去今從朱本先是上批問王安石取免行錢太重人情咨怨至出不遜之言卿還聞否是日安石與輔臣皆對欲留身白上㑹進呈取索免行文字上又具道所聞安石曰前御史盛陶亦言此臣曽奏請令陶計㑹市易司召免行人户問其情願即令出錢若不願即令依舊供行如此則不須更聽浮説上言如此問不得見説匹帛行舊有手下抱緼角人今亦盡收入行安石曰此事臣所未曽勘㑹恐未必有也法固有不及處須因事修改乃全無害若果有害惟當立法限定錢數不許更増足矣上曰市易如米麥之類能平價便民固好其他細微須害細民縁市易務既零賣即民間零賣不得安石曰此事亦不然細民必資於大姓大姓取利厚故細民收利薄令官收利薄即細民自得利豈有害細民之理上曰近臣以至后族無不言不便何也兩宫乃至泣下憂京師亂起以為天旱更失人心如此安石曰近臣不知誰為悉力朝廷有所聞必考覆事實欲以開陛下聰明者但聽諸不逞所説即以上聞耳且其用意多端在陛下聰明考察陛下但明示姓名付中書令對定虛實即人自莫敢妄言陛下所聞皆是實事如其不然即日昃坐朝但為崇長欺謾令政事日壞有何補如后族即向經自來影占行人因催行免行新法遂依條收入經嘗以牒理㑹不見聽從又曹佾賒買人木植不還錢太后殿内勾當修曹佾宅内臣却偽作曹佾宅幹當人狀云被市易强買已定下木植及勾到客人乃云但有曹侍中已賒買過木植不還錢即無曹侍中已定木植却賣與市易司吕嘉問具此牒送開封府勾曹佾幹當人乃云元不曽過狀根究得此狀乃是太皇太后閤臣偽作姓名過狀誣告市易司官員開封府但牒市易司照㑹而已元不曽行遣此内臣等罪過陛下試觀此兩事即后族何縁不結造語言吕嘉問典領市易司與開封三司據法爭職事三司開封皆所不悦又以職事犯忤都知押班御藥非一事陛下試思吕嘉問如此何意若為身計即大不便但顧禮義亷恥不欲以利疚於回邪故也果其用心如此不知何故却欺罔朝廷專以害人為事且既與内外衆人乖違如此不知如何却作得欺罔事凡作欺罔即先須交結陛下左右外締朋黨然後能遏塞人論議不知如吕嘉問所為能遏塞人論議否馮京曰行人初聞人説不投狀有罪便争投狀後來見投狀出錢細碎却多不收安石曰馮京所言非人情京師行人盡狡猾者如何並不計經久利害但聞人説遂争投狀乎京曰人皆如此言安石曰凡士大夫不逞以馮京為歸故馮京獨聞此言臣未嘗聞此言也上曰見説中書亦嘗案問市易事安石曰案問非一然終不見市易有違法害民事所以奏對敢保任其無他上曰出錢至少者可放安石曰若一一根究見人情便否然後陛下特蠲除下戸豈非人所甚願者上曰善衆退安石獨進曰陛下左右前後殊無親臣不知不顧利害肯為陛下盡言情實以補陛下聰眀者為誰上曰如此人誠難得安石曰如此人誠難得陛下果好信即人孰不欲用情為善陛下不好信即雖忠信之人亦且随時暫易又况素行淺薄者因言李憲庇景思立數有大罪陛下不治皮公弼交結内臣開河無狀得罪甚薄又言三司開封府於近習事輙撓法容之故不為近習所譖免譴怒然則陛下喜怒賞罰不以聖心為主惟左右小人是從如此何由興起治道唐二百年危亂相承豈有他故但以左右近習擾政而已臣以衰晚之年備位於此若陛下但如此即臣雖夙夜勤勞何能有補臣非私畏陛下左右議論故出此言誠以害陛下國家大計故爾若臣有罪亦不待此軰敷陳臣同列必不肯掩覆也臣自初得見陛下即論奏以為小人有言不可信但當一一考實若欺罔即加之罪罰然後天下情實畢陳於前臣之言豈欲閉塞陛下聰明令人不敢言但欲令人不敢妄言爾己未祕書丞集賢校理兼同修起居注章惇為起居舍人知制誥惇堅辭至五六上命改右正言充職都官員外郎檢正中書户房公事熊本為刑部員外郎集賢殿修撰詔戸絶莊産委開封府界提㸃刑獄司提轄限兩月召元佃及諸色人實封投狀承買逐司季具所賣闗提舉司封樁聽司農寺移用増助諸路常平本錢同知審官東院鄧潤甫乞以京東十七州選官四員各分定專管勾方田今欲先差著作佐郎知費縣張鍔前建昌軍錄事參軍劉源分定州縣三年為一任從之舊紀於己未書詔民田疆界不明租賦不均立方田法新紀亦於己未書立方田法案食貨志則方田始自五年八月矣兩紀皆誤已具五年八月末注四月二日四日六日十月三日當考先是上欲赦以捄旱災僉謂一嵗三赦非宜是日上復欲赦王安石曰湯旱以六事自責首曰政不節歟若一嵗三赦即是政不節非所以弭災也乃止王安石進呈市易改免行文字白上曰已令吕嘉問等具析如聖㫖所諭事仍乞陛下擇可信内臣令躬親體問行户如有不同即乞降付中書推見詣實且曰陛下昨宣諭兩宫憂致亂臣亦憂致亂然所憂致亂之由乃與兩宫所憂適異詩曰亂之初生僭始既涵臣之所憂乃在於此陛下試思詩書之言不知可信否如不可信即歴代不當尊而寳之開設學校以教人孔子亦不當廟食如其可信即亂之生乃實在此齊威王三年不治國事一旦烹阿大夫即舉國莫敢不以情實應上國遂治兵遂强僭之生亂弱信之生治彊如此願陛下熟計上欲減省行人所納免行錢安石曰下戸已自減省不少若更減省不知却令何人出錢給吏禄上令除禄吏錢外減省安石曰如此固善然謂免行錢非人願擾人即非事實上曰京師人素優幸分外優饒之亦不妨安石曰如此即是陛下聰明為左右所蔽實未知京城百姓疾苦臣曽雇一洗濯婦人自言有兒能作餅縁行例重無錢賠費開張不得未出免行以前大抵如此其為官司困擾百端陛下乃以為優幸令盡為除去如此事却賦吏禄禁以重法令不得横擾乃反為不如未立法以前盖陛下為左右所蔽故有所不察爾陳瓘論曰京師者萬國之本也吕嘉問欲取免行錢以擾京師之民神考欲減省之以安京師而安石對曰如此則是陛下聰明為左右所蔽實未知百姓疾苦夫優饒京師而謂之不知百姓疾苦者何哉唐徳宗不恤京師之民陸贄先事進言曰聚斂之法轂下尤嚴貴而不見優近而不見異其為憤絶又甚諸方誅求轉繁庶類恐懼興廢無已羣情動揺朝野囂然而京邑關輔不寧矣嗚呼唐有賢臣而徳宗不能聽神考有聖訓而安石不肯順可為流涕也已上又患置官多費用安石曰凡創置官皆須度可以省費興治乃創置如將作監即但用諸置局處食錢已足養創置官而所省諸費固不勝數如帳司即一嵗磨勘出隱陷官物少亦數倍其他置官類此豈得為冗上曰即如此何故財用不足若言兵多則今日兵比慶厯中為極少安石曰陛下必欲財用足須理財若理財即須斷而不惑不為左右小人異論所移乃可以有為上曰古者什一而税足矣今取財百端不可為少安石曰古非特什一之税而已市有泉府之官山林川澤有虞衡之官其絘布總布質布㕓布之類甚衆闗市有征而貨有不由闗者舉其貨罰其人古之取財亦豈但什一而已今之税亦非重於先王之時但不均又兼并為患耳陳瓘論曰神考曰古者什一而税足矣安石對曰古非特什一而已其對如此為必須理財故也必須理財乃熙寧元年語也為政七年尚守此語而神考反復折難稽什一之法以百姓不足為慮以取民百端為戒臣著之以見神考愛民之本意而又於理財論詳其本末庚申詔河東永興秦鳳等路管勾常平官遇有闕依河北路提舉司奏舉上批熙河路經畧使王韶見領兵在外聞折博務官見權知州可令秦鳳等路都轉運使蔡延慶且權州事已差通判亦速令赴任自今如知州領兵在外並令監司官權管詔京城門外草市百姓亦排保甲聞多是城裏居民逐利去來今為保伍人情非所便安况又不習武藝排之亦無所用可速罷之詔荆湖川廣近邊州軍保丁候教成即免籍定土丁其餘州軍土丁並依舊人數注籍教閲賜永興軍等路轉運司所鑄折二錢十萬緡以備夏糴冬衣郊賞等費六年十月二十三日賜岷州修城防托禁軍特支錢有差辛酉詔翰林學士承㫖韓維知開封府孫永據詳定行戸利害所供行尸投行事追集行人體問詣實利害以聞於是王安石以吕嘉問等具析條件并案牘進呈曰此皆百姓情願不如人言致咨怨也上曰韓維極言此不便且云雖取得案牘看詳亦無補安石曰維既有此言欲差孫永同維集衆行體問上從之前此嘉問等盡括行户細碎無所遺已而有詔詳定所更勿遣人體問自貧下行特減錢一萬緡維等言方集衆行體問利害全繫納錢多寡須竢臣等見得的確合減分數别降指揮今如此則是吕嘉問等所定有得而臣等所言為不足信伏乞改命可信之人使畢其事詔維等依前降指揮速體問結絶初議者多謂朝廷既知行役之獘當即罷省不可更令出錢而詳定所奏朝廷所以許民間輸直免行者盖人情無不欲安居樂業而厭於追擾若一切罷去則無人祗應又公人禄廪素薄不免有求於行人非重法不能禁以薄俸申重法則法有時而不行縣官為給則三司經費無窮今取於民薄而公人各知自重不敢冒法此所以使上下交濟臣等推行之本意也議者乃謂既知行役重當為除法不可斂錢此殆不然民未嘗不畏吏方其以行役觸罪罟雖欲出錢亦不可得今公人之禄可謂厚矣然竊聞未比昔日於民間所得之半今本司收免行錢計所入尚不足以償朝廷因行戸事増録行倉法處料錢則不惟公人不得如向來誅求之半而民間所出又未及増禄之半以此推窮孰便孰不便較然可見今略具司録司左右軍廵院雜賣場左藏庫内藏庫内香藥庫内東門司上項八處公人係自來於行户及請納人處乞取錢物今朝廷先以坊場市例錢禄吏於見在免行錢撥還外已少二千八百餘貫今又䝉朝廷減放錢一萬緡計每嵗虧官一萬二千八百餘貫若其餘三司開封府并在京百司乞取行人錢物猶不在此可見民間所輸不多矣奏至詔令送體問所體問所尋奏稱糠米等行乞不納錢依舊祗應而詳定所奏以為昨米行有當旬頭曹贇者以須索糯米五百石不能供至雉經以死又言臣等竊知近日體問所勾集行人内有言情願祗應議者乃謂行人既欲祗應仍舊則從前不願納錢可知此又不然縁本所未置局立法以前三司等處未盡行倉法雖雜買務未支一色見錢官司置買公用及供家之物承例行下時估雖無添減亦須逐旬供申又官物不限多少並差行人看騐自免行後來買賣造作不得下行看估委自市司如此之類甚多無非自來騷擾今若許以官司依舊行倉法除去自來煩擾却與免出錢仍舊祗應則行人孰不為便者然恐非朝廷委維等體問之意後卒罷維等議此叚參取朱墨二史并日錄修定吕嘉問等奏有不通處當求别本校正之新史全用墨史一字不敢易也三司言河北路有銅五十七萬九千九百餘斤錫九千八百九十餘斤及市易務於𣙜場賣銅皆百萬斤詔河北西路轉運司相度若以兩路見在銅錫鑄錢即當何處置監具利害比較本息以聞後詔衛州置黎陽監嵗鑄錢三萬五千緡三月十八日壬戌命權判三司開拆司太常少卿劉忱河東路商量地界知忻州禮賔使蕭士元檢詳樞宻院兵房文字秘書丞吕大忠同商量地界綱要云㑹其臣樞宻副使蕭素等於代州境上共議之忱子襄州司户叅軍唐老随行書寫機宜文字大忠言竊聞敵主孱懦朔應諸州久不知兵習以畏戰可遣諜者游説以撓其謀遷延數年繕我邊計因彼釁隙乃可得志其餘諸羌可以傳檄而定其合召募錢帛乞下經略司應副委臣稱事優給如商量地界未定或敵使未至乞臣以㸃檢為名因於河外召募從之仍下河東轉運司支錢二千緡如須金帛於數内給卲氏見聞錄云熙寧七年春契丹遣汎使蕭禧來言代北對境有侵地請遣使同分畫神宗許之而難其人執政議遣太常少卿判三司開拆司劉忱為使忱對便殿曰臣受命以來在樞宻府考核文據未見本朝有尺寸侵敵地且鴈門古名塞雖跬歩不可棄奈何欲委五百里之疆以資敵乎臣既辱使指當以死拒之惟陛下主臣之言幸甚帝韙之忱出疆帝手勑曰敵理屈則忿卿姑如所欲與之忱不奉詔以秘書丞吕大忠為副使命下大忠丁家艱詔起復未行忱亦使囬敵又遣蕭禧來帝開天章閣召執政與忱大忠同對資政殿論難久之帝曰凡敵争一事尚不肯已今兩遣使豈冇中輟之理卿等為朝廷固惜疆境誠是也然何以弭患大忠進曰彼遣使相來即與代北之地若萬有一使魏王英弼者來求闗南之地則如何帝曰卿是何言也大忠曰陛下既以臣言為然今代北安可啟其漸忱曰大忠之言社稷大計願陛下熟思之執政皆知不可奪罷忱為三司鹽鐵判官大忠乞終䘮制大忠事國史略有之忱事絶無聞當考王韶言河州近城川地招漢弓箭手外其山坡地招蕃弓箭手每寨三五指揮以二百五十人為額人給地一頃蕃官兩頃大蕃官三頃仍募漢弓箭手等為甲頭候招及人數補人員與蕃官同管勾自來出軍多為漢兵盗殺蕃兵以為首功今蕃兵各願於左耳前刺蕃兵字從之元祐元年三月二十八日罷提舉熙河等弓箭營田蕃部司初吕嘉問以户部判官提舉市易務挾王安石勢陵慢三司使薛向且數言向沮害市易事安石信之其實向於嘉問未嘗敢與之校曲直凡牙儈市井之人有敢與市易争買賣者一切循其意小則笞責大則編管嘉問自知不直慮間已故先以沮害加之使其言不信於安石市易本𨽻三司而嘉問氣𦦨日盛三司固多出其下及曽布代向為三司使素知嘉問驕恣懷不能平又聞上數以市易苛細詰責中書意欲有所更張未得間也是月丁巳上夜降手札賜布曰聞市易務日近收買貨物有違朝廷元初立法本意頗妨細民經營衆語諠譁不以為便致有出不遜語者卿必知之可詳具奏布先受命察訪河北辟魏繼宗為察訪司指使繼宗實監市易務嘉問自初建議以至其後増損措置莫不與聞布因召繼宗問之繼宗憤惋自陳以謂市易主者𣙜固掊克皆不如初議都邑之人不勝其怨布遂攜繼宗見安石具言曲折安石責繼宗曰事誠如此何故未嘗以告安石繼宗曰提舉日在相公左右何敢及此提舉謂嘉問也安石黙然布謂安石曰布翊日當對欲悉以此白上安石諾之辛酉布對於崇政殿具奏所聞扵繼宗者曰嘉問等務多收息以干賞凡商旅所有必賣於市易或非市肆所無必買於市易而本務率皆賤買貴賣重入輕出廣收贏餘誠如繼宗所言則是挾官府而為兼并之事也上覽之矍然喜見於色問布曰王安石知否又問安石以為何如布皆對以實且言事未經覆案未見虛實上曰朕久己聞之雖未經覆案思過半矣諭布姑留劄子於榻後布又言所召問行人往往涕咽陛下以久旱焦勞誠埀意於此足以致雨上曰必欲考見實狀非卿莫可布曰臣雖罷軟不敢不盡力上曰如此則却取劄子付中書布始得對方待次安石先奏事上謂安石曰曽布言市易不便知否安石曰知之上曰布言如何安石曰布今上殿必自言遂留身白上市易事臣每日考察恐不致如言者陛下但勿倉卒容臣一一推究陛下更加覆驗自見曲直若陛下為衆毁所揺臨事倉卒即上下協力承望為欺恐致忠良受枉上曰布言此何故安石曰布與嘉問不相足争互牒事亦可見上曰布或縁與卿素親厚故如此安石曰臣不敢逆料人情但依實考驗事情要見曲直而已因言備位久無補時事不能令風俗忠厚幸陛下早改命臣久如此必負陛下寄託布所言既送中書是夜上批問安石恐嘉問實欺罔非布私忿移怒安石具奏明其不然於是有詔令布與吕恵卿同根究市易務不便事詣實以聞大抵安石意主嘉問不以布所言為是故使恵卿居其間也他日安石又言鄉者開封祥符兩縣人三日擁門求請常平錢不得而朝廷之上方争論抑配不已陛下亦疑其事乃即位之初也今陛下即位已久言市易事乃復如此足以觀風俗之如故也刑部員外郎集賢校理竇卞太子中允集賢校理兼史館檢討沈括並同修起居注癸亥遼使蕭禧辭於崇政殿上面論蔚應朔三州地界俟修職官與北朝職官就地頭檢視定奪雄州外羅城乃嘉祐七年因舊修葺元計六十餘萬工至今已十三年纔修五萬餘工即非創築城隍有違誓書又非近年事也北朝既不欲如此今示敦和好更不令接續増修白溝館驛亦俟差人檢視如有創盖樓子箭窻等並令拆去創屯兵級並令抽囬朝廷已來約束邊臣不令生事如昨來趙用擅入全屬北朝地分雄州職官十餘人並已停降今來郭庠侵入全屬南界地分兼先放箭射傷廵人理須應敵况北朝近差廵馬已是創生事端其郭庠事并其餘細故並循常例别無違越無可施行禧奉詔而退投以報書曰辱迂使指來貺函封歴陳二國之和有若一家之義固知鄰寳深執信符獨論邊鄙之臣嘗越封陲之守欲令移徙以復舊常竊惟兩朝撫有萬宇豈重尺土之利而輕累世之驩况經界之間勢形可指方州之内圖籍具存當遣官司各加覆視儻事由夙昔固難徇從或誠有侵踰何恡改正而又每戒疆吏令遵誓言所諭創生之事端亦皆境堠之細故已令還使具逹本因𬗟料英聰洞垂照悉翰林學士呂惠卿之辭也呂惠卿撰國書此據宻院時政記惠卿集載此國書具逹本因下有自今以還凡此之類只委守臣之移檄免煩使節之交馳庶邦好之不渝亦民疑之交釋六句與此不同當是宻院削去其詳見八年四月五日注呂惠卿家傳契丹遣泛使蕭禧要求地界傲慢無禮當遣不辭中書樞宻院議欲移檄本國施行惠卿押賜御筵乃上疏曰竊聞使臣此來頗甚驁慢朝廷有意督過之臣愚謂敵人講和垂七十年嵗賜金帛以數十萬計雖違首足上下之義猶得以大事小之權今陛下聖德光充神武獨運西覆洮隴南平荆蠻彼以無事坐受數十萬之賜於中國則其勢不能不震疊故因使人輙爭小事示無所畏而為自安之謀其狀可見矣為今之計莫如一切置而不問乃所以深制之之術也何以言之湯之事葛也無犧牲則遺之牛羊無粢盛則使亳衆徃為之耕及其可征也一舉而葛服冒頓之平東胡也求寳馬則與寳馬求閼氏則與閼氏東胡愈驕不為備乃襲而滅之盖翕張勝敗之勢有至於必然者雖冒頓猶如此也今朝廷之於北敵誠不失舊好不當無事而使之疑茍有經營鎮撫之心不當先事而使之知故臣以為一切置而不問伏惟陛下恢天地之量法成湯之智以朝廷中國之未治為憂而不以契丹之未服為患則聖人有不怒一怒而安天下之民者此也上賜手詔曰得卿奏論方今朝廷當遇契丹之宜悉如卿之言深符朕意政臣欲令有司詳數其驁慢之狀移檄敵中戒敕之已令寢之矣後數日對上曰前日文彦博等堅欲檄契丹責其使者朝廷方多事豈宜如此得卿来奏助朕多矣此據惠卿家傳增入當考彦博此時不預政事答詔所問又在八年四月家傳云云必誤甲子兵部郎中天章閣待制韓縝假龍圖閣直學士給事中為回謝遼國使遣檢正中書戸房公事張諤減定在京諸門税額司馬光記聞云鄭俠言新制使選人監京城門民所賫物無細大皆征之使貧民愁怨此事當考去年十二月二十四日詔合參照上批聞都下米麥踊貴可令司農寺發寄倉常平米不計元糴價比在市見賣之直量減錢出糶時米價斗錢百五十已詔司農寺以常平米三十二萬斛三司米百九十萬斛平其價至斗百錢至是又減十錢益置官場出糶民甚便之乙丑詔中書曰朕涉道日淺晻於致治政失厥中以干隂陽之和乃自冬迄今旱暵為虐四海之内被災者廣間詔有司損常膳避正殿冀以塞責消變歴月滋乆未䝉休應嗷嗷下民大命近止中夜以興震悸靡寧求惟其咎未知攸出意者朕之聽納不得於理歟獄訟非其情歟賦斂失其節歟忠謀讜言鬱於上聞而阿䛕壅蔽以成其私者衆歟何嘉氣之久不效也應中外文武臣僚並許實封言朝政闕失朕將親覧考求其當以輔政理三事大夫其務悉心交儆成朕志焉翰林學士承㫖韓維之辭也先是維對延和殿上曰久不雨朕夙夜焦勞柰何維曰陛下憂閔旱災損膳避殿此乃舉行故事恐不足以應天變書曰惟先格王正厥事願陛下痛自責己下詔廣求直言以開壅蔽大發恩令有蠲放以和人情後數日又言近日畿内諸縣督索青苖者甚急往往鞭撻取足至伐桑為薪以易錢貨旱災之際重罹此苦夫動甲兵危士民匱財用於荒夷之地朝廷處之不疑行之甚鋭至於蠲除租税寛裕逋負以救愁苦之良民則遲遲而不肯發望陛下自奮英斷行之過而養人猶愈於過而殺人也復請對靣論上感悟即命維草詔詔出人情大悦維本傳云詔出人情大悦是日乃雨然實錄不載是日雨恐本傳或有潤飾今不取本傳又云有㫖根究市易免行利害權住方田編排保甲罷議東西川市易按此詔未出維巳同孫永根究免行利害矣權住方田保甲等見四月二日時不當就此并書㑹要三月六日有詔求直言而實錄此二十八日又有此詔一月不應兩詔㑹要誤也知制誥王益柔言試將作監主簿麻皓年嘗注孫吳二書及唐李靖對問頗得古人意㫖兼自撰臨機兵法甚精當欲望許進所注書或可採錄乞加試用從之李靖兵法世無全書畧見於通典今對問出於阮逸家或云逸因杜氏益之也詔諸路安撫使司許差機宜官出入提舉訓練義勇保甲上批比來流民往京西者經過京師恐無資糧或致餓殍可相度賑濟中書言民既失業流移道過京師茍給以糧食逺近相傳來者不己則難以周給而近畿又未有興工用衆之役以募之臣等以為莫若詔流民所往州郡募其少壮者充役疾病老㓜者則計口給食遂詔京西路監司官分定州軍速檢計隨處當興大小工役募流民給錢糧興修又詔河北河東京西荆湖淮南江南福建兩浙永興秦鳯梓州路災傷州軍賊盗罪至死者減死決配發墓贓及二千以上刺配廣南牢城不滿二千刺配千里外牢城强劫不殺傷人元謀及下手人各依法餘刺配廣南牢城非闕食饑民自依常法令諸路轉運司體量轄下災傷州軍因闕食而為盗者依𠡠斷遣毋得下司候豐熟日繳納中書斬内殿直行王進康德於班門本班長行傅随告其給假逃背為盗鞫之得實也以随為右侍禁王韶言是月甲寅走馬承受公事張佑齎𠡠字黄旗付本司告諭熈河將士如能協力一心用命破賊廣有斬獲當比収復河州倍加酬賞士皆感奮軍聲大振李憲傳云河州危甚憲趣馳至軍晨起帳中張𠡠字黄旗告吏士曰此旗上所賜也視此以戰帝實臨之士爭奮用命按王韶所言乃張佑齎至不知與憲所張為一為二曾布既受詔同呂惠卿根究市易事或為布言中書每以不便事詰嘉問嘉問未嘗不巧為蔽欺至於案牘徃徃藏匿改易如不懲草此弊雖根究無以見其實布又聞嘉問己呼胥吏持案牘還私家隠藏更改遂奏乞出牓以厚賞募告者明日二十六日上批依奏付三司施行布即牓嘉問所居又明日二十七日惠卿至三司召魏繼宗及行人問狀無一有異辭者惠卿退以繼宗還官舍詰布所以辟繼宗為指使縁由再三誘脅繼宗令誣布以增加所言繼宗不從反具以吿布恵卿又遣弟温卿宻造王安石言張牓事且曰行人辭如一不可不急治繼宗若繼宗對語小差則事必可變而嘉問訴扵安石尤切安石欲夜收張牓左右白以有御寳批乃止是日二十八日恵卿以急速公事求獨對布亦具繼宗所吿曲折以聞并言恵卿所見不同不可共事乞别選官根究未報而中書建白三司承内降當申中書覆奏取㫖乃擅出牓欲按治詔使特釋罪其元批依奏指揮更不施行牓仍繳納中書布論三司奏請御批例不覆奏且三司嘗申知中書慮無罪可放尋有詔如布請恵卿等愈側目矣續資治通鑑長編巻二百五十一
