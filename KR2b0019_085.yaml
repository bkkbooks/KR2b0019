body:
  text: 續資治通鑑長編卷八十一宋李燾撰真宗大中祥符六年秋七月癸巳內侍江德明言上清宫道場獲一龍于香合中甲午賜諸路天慶觀逃田藩鎮十頃諸州七頃軍監五頃改上九天司命上卿保生天尊曰東嶽司命上卿佑聖真君初封禪畢詔上保生天尊之號至是以聖祖肇臨名稱相類故改上焉據此則保生天尊乃聖祖也佑聖真君乃東嶽也祥符初誤以聖祖為東嶽及今方知其别故改命要是聖祖及東嶽皆有司命之號云王中正事更詳之乙未上謂王欽若曰訪聞河北州軍城池廨宇頗多摧圮皆云赦文條約不敢興葺今雖承平無事然武備不可廢也宜諭令及時繕修但無改作爾詔皇族嵗時進獻皆無用之物徒成冗費自今除天慶天貺先天降聖四節進供養物外餘悉罷之相王元偓等奉表懇請仍舊不許先是晏州多剛縣夷人㪷望行牌率衆劫淯井監殺駐泊借職平言大掠孳畜知瀘州江安縣奉職文信領兵趨之遇害民皆驚擾走保戎州轉運使寇瑊即令諸州巡檢㑹江安縣集公私船百餘艘載糧甲張旗幟擊銅鑼鼓吹自蜀江下抵清浮壩樹營柵招安近界夷族諭以大兵將至勿與望等同惡未幾納溪藍順州刺史史個松生南八姓諸團烏蠻狃廣王子界南廣溪移恱等十一州刺史李紹安山後髙鞏六州及江安界娑婆村首領並來乞盟用夷法立竹為誓門橫竹繫猫犬雞各一於其上老蠻人執刀劔謂之打誓誓曰誓與漢家同心討賊即刺猫犬雞血和酒而飲瑊給以鹽及酒食針梳衣服署大榜付之約大軍至日揭以别逆順不殺汝老幼不燒汝欄棚蠻人大喜於是峽路鈐轄王昭遜言淯井事狀上遣內殿崇班王懷信乘傳與瑊等議攻討招輯之宜瑊奏㪷望等嘗以二年春燒淯井監殺吏民更赦貸其罪而復來寇邊聲言朝廷且招安得飲食衣服矣若不討除則戎瀘資榮富順監諸夷競起為邊害今請發嘉眉兵捕剪以震懼之本傳以此事為五年蓋誤也實録又不詳今從㑹要乃詔懷信為嘉眉戎瀘等州水陸都巡檢使閣門祗候康訓符承訓為同都巡檢使及發陜西虎翼神虎等兵三千餘人令懷信與瑊啇度進討上因謂樞密使陳堯叟曰往時孫正辭討蠻有虎翼小校率衆冒險者三人朕志其姓名今以配懷信正辭嘗料簡鄊丁號白艻子弟以其識山川險要遂為鄉道今亦令懷信召募又益州有忠勇軍士二百前討王均有功可給懷信為先鋒又使臣宋賁屢規畫溪洞事中適機㑹可遷其秩使知江安縣令懷信等每與同議實録不載命懷信等出軍但有上謂陳堯叟等語今取㑹要及正史增入然㑹要及正史並以出軍為九月事今因上語陳堯叟等併載之于此符承訓彥卿孫昭願子景福殿使新州觀察使劉承圭久病羸瘵上為取道家易名度厄之義改圭為規疾甚聼還私第皇城常務止印日內藏庫有創制就取啇量承規再表求罷丙申授安逺留後左驍衛上將軍致仕上謂王旦等曰兩使留後古非致仕官國朝以來上將軍亦罕除拜以承規逮事三朝纍著勤效故優之也初承規使人私請於上欲求節度使上諭王旦旦曰陛下所守者祖宗典故典故所無不可聼也當問諸有司翌日上又曰承規言死在朝夕願聞在廷之告則瞑目無憾旦曰陛下若聼承規所請後必有邀朝廷求為樞密使者矣此必不可上乃止承規尋卒乃贈鎮江節度使諡曰忠肅承規性沉毅徇公上深所倚信尤好伺察人多畏之上崇瑞命修祠祀飾宫觀承規悉預焉作玉清昭應宫尤為精麗屋室有小不中程雖金碧已具必毁而更造有司不敢計其費及宫成追贈侍中仍遣中使詣墳祭告二聖殿塑配饗功臣特詔塑承規像于太宗像側令河北緣邊寺院不得留契丹界人為行者詔聞瀛州率民納防城火牛茭草頗甚勞費自今宜令軍卒刈雜草為備勿以擾民鄜延部署曹利用言北境克實克軍主率衆過大里河南侵熟戶羅壘族多拉擊走之請以多拉為本族指揮使從之仍詔利用約飭族帳謹守封疆無得出境追襲以權三司使林特為修玊清昭應宫副使特勤於吏職善承上接下每見修使丁謂必拜一日三見亦三拜之與吏卒語喣喣惟恐傷人由是人皆盡力事無不集至道末有司請以懿德皇后配饗太宗廟室或言淑德實當升侑議久未决時元德猶未追崇而明德方在萬安宫都官員外郎吳淑駮議曰禮緣人情事資適變蓋處其事必有其實據其位必有其功淑德懿德或佐潜躍之前或承藩邸之際並未嘗正位中宫母儀天下配饗之禮誠為未允至若虛其祔合無乃神理有虧求之前古實有同配夫母以子貴義存在昔漢昭即位追尊母趙媫妤為皇太后此聖賢之通義也賢妃李氏處太任之尊有彌月之實誕生聖嗣天下䝉福而擬議不及臣竊惑焉唐開元四年睿宗昭成皇后祔廟而肅明初饗儀坤至二十年又迎肅昭神主升於太廟知與竇氏同配明矣則並位兼配於義何嫌伏請行追崇之命以賢妃李氏處尊極之地升於清廟居同配之位其淑德懿德依舊饗于别廟庶協禮制不聽後賢妃尋加號皇太后但饗别廟而已大中祥符三年十月判宗正寺趙湘復以為請始令禮官參議之庚子中書門下言恭以元德皇太后翊贊先朝茂揚內則誕生聖嗣繼撫中區育德堯門宣功媯汭徽音所洽寰宇攸同陛下順考古經遹追慈訓奉尊名於懿冊修時饗於閟宫未升侑於崇祊止奉祠於别廟誠遵典故尚欎孝思竊念后稷諸侯故姜源異祭於帝嚳開元皇室故昭成祔饗於睿宗舊典可知輿情難奪今與禮官參議請改上徽名曰元德皇后升祔太宗廟室近臣及文武百官繼表陳請詔從之有司言按唐先天元年祔昭成肅明二后于儀坤廟肅明雖睿宗在藩之日立為妃昭成以帝母之尊故位居其先今請升祔元德皇后於懿德皇后之上詔曰尊親之道蓋惟極致在于陟降非敢措辭唯以祔廟之嵗時用為合饗之次序恭以元德皇后神主祔于明德皇后之次王拱辰語司馬光云真宗時有司請躋元德於明德之上上手批曰言其親則皆母也言其尊則皆太后也朕不敢置輕重于其間其恭依典禮光視河録載此三司言河北積布甚多請令京東西河東北夏秋稅並納本色糧斛罷折納布或須衣布則於河北輦致之向敏中言河東止産布儻官弗納恐民間難於貿易望仍舊餘路則依所奏辛丑太常博士齊革言蜀民以射生為業民私蓄弓矢請行禁絶上曰平時民家或用防盜不必禁也齊革未見壬寅太常寺請令齊郎經三次大祀乃得赴選集其從父兄出外並奏候朝㫖從之初知濵州吕夷簡上言請免河北農器之稅上曰務穯勸耕古之道也豈獨河北哉癸卯詔諸路勿稅農器尋命夷簡提㸃兩浙路刑獄丁未詔諸煎鹽井役夫遇天慶等四節並給假戊申保安軍言熟户敗蕃賊二百餘人奪牛馬焚其寨柵上曰此無益于國徒生事爾宜令謹守疆埸無或輕舉上又曰如聞趙德明牙校所過州軍犒設而官吏頗輕待之國家比念逺人豐給厨傳茍不接以禮必生其慢心可遍戒諭之己酉亳州官吏父老三千三百六十人詣闕請車駕朝謁太清宫召對崇政殿慰賜之辛亥詔茶鹽酒稅及諸場務自今總一嵗之課合為一祖額較之有虧損則計分數其知州軍通判减監臨官一等區斷大臣及武臣知州軍者止罰通判以下時上封者言諸路嵗課增羡知州通判皆書厯為最有虧則無罰請行條約故也壬子詔自今文武官特奉詔㫖専有處分即為躬親被受犯者以違制論自餘例受詔敇海行條約非有指定刑名者各論如律無本條者從違制失斷先是違制之法無故失率坐徒二年翰林學士知審刑院王曽建議乃降是詔未幾有犯者曽斷以違制失帝不懌曰如是無復有違制者曽曰天下至廣豈人人盡知制書儻如陛下言亦無復有失者上然之自是决徒者差減上嘗對近臣稱其協中曽為學士一日晚坐承明殿召對久之既退使謁者諭曰向思卿甚故不及御朝服其見禮如此癸丑詔在京諸軍選江淮習水卒於金明池按試戰棹立為水火翼軍置營池側其江浙淮南諸州亦令凖此選卒置營初太祖立神衛水軍及江淮平定不復振舉上以兵備不可廢故復置焉甲寅申禁內外羣臣市官田宅既稱申禁則前已禁矣當考保安軍言河流暴漲浸城壘壞廬舍詔軍民溺死無家屬者官為收瘞仍遣使致祭丁巳文武羣臣上表請車駕幸亳州謁太清宫詔許之己未召輔臣觀粟於苑中詔入內內侍省內侍內供奉以下併寄班等自今有乞差遣者並送逐省勘㑹定奪取㫖候得處分者即送樞密院勘㑹定差樞密副使王嗣宗言請復天下幕職州縣俸户帝曰頃年楊礪夏侯嶠言立俸户便於官員於國亦無所妨俸尸亦欲為之但慮人或踰制科率則俸户不任有受弊者却成擾人此為不便中書更檢討典故從長而行王旦奏曰此事恐未可遽行俟檢詳聞奏八月庚申朔詔以來春親謁亳州太清宫先于東京置壇回日恭謝天地如南郊之制辛酉以參知政事丁謂為奉祀經度制置使翰林院學士陳彭年副之謂仍判亳州又命五使及遣計度芻糧詳定儀注部修行宫治道增置亳州官屬如汾隂之制甲子出後園嘉榖圖示百官乙丑禁緣邊集軍中子弟閲習聲樂上封者言其勞擾故也丙寅禁太清宫五里樵採亳州罪人至死者送鄰州裁斷己巳以起居舍人知制誥陳堯咨為工部郎中龍圖閣直學士知永興軍府長安多仕族子弟恃廕縱橫二千石鮮能治之有李大監者堯咨舊交其子尤為强暴一日以事自至府庭堯咨問其父兄宦遊何方得安信否語甚勤至既而讓之曰汝不肖亡賴如是汝家不能與汝言官法又不能及汝終無恥矣我與爾父兄善猶骨肉當代汝父兄訓之乃引于便坐手自杖之由是子弟亡賴者皆惕息然其用刑過酷有博戲者杖訖桎梏列於市置死馬其旁腐臭氣中瘡輒死後來繫於先死者之足其殘忍如此庚午詔加上真元皇帝號曰太上老君混元上德皇帝改起居院詳定所為禮儀院以兵部侍郎趙安仁翰林學士陳彭年同知院事初置詳定所即命彭年領之彭年時修起居注故就起居院置局於是徙起居院于三館詳定所自元年四月置於是改名禮儀院壬申樞密使王欽若等上新編修君臣事蹟一千卷上親製序賜名冊府元龜編修官並加賞賚左正言直史館陳越前死無子同列為奏其事上閔之賜其兄咸同三𫝊出身故事中書章表皆舍人為之東封後朝廷多慶禮舍人或以它務嬰率乃擇三館祕閣官得盛度路振劉筠夏竦宋綬洎越分撰宰相嘗以名聞其後皆相次掌外制唯越不及登擢時論惜之甲戌詔諸軍所缺今年夏秋稅大小麥許以秋苗折納丁丑詔奉祠一路諸色人無得以伎巧雕繪寶裝物來獻參知政事丁謂上新修祀汾隂記五十卷禮儀院請朝謁太清宫日設宫懸二十架牙盤素饌樽罍籩豆悉如朝元殿恭謝之制玉用四圭有邸幣用碧一獻飲福鄰州長吏亳州貢舉人本宫道士悉陪位詔改用蒼璧備三獻以盡嚴恭餘從之又言聖號冊寶請就醮壇天寶臺下以石匱封祕中設玊匱長廣二尺髙如之檢厚一寸二分刻金繩五道封以金泥印以受命寶石匱三層各長五尺三寸下層髙二尺中層半之上層為蓋皆刻深四分填以石泥印以天下同文寶奏可庚辰涇原鈐轄曹瑋等奏鎮戎軍至原州開浚濠塹功畢詔奬之賜督役使臣軍校緡錢有差丙戌出御製靜居集三卷併法寶録序示王旦等先是趙安仁凖詔編修藏經表乞賜名製序詔從其請賜名大中祥符法寶録八年七月法寶録乃成戊子宜州西南蕃都部署龍光進等千五百人來貢九月庚寅朔賜戎瀘州軍士白艻子弟緡錢詔王懷信等溪洞蠻人非同惡倍加安撫又遣使齎名方詣益州委凌䇿選醫工給藥材赴軍中祗應辛卯詔如聞民間質賣邸舍而鄰並權要家留其契劵以艱難之可申明條約無使復然遣使葺南海廣利王廟壬辰詔慶州延州熟户蕃部有親族在趙德明界者不得潜致音問癸巳宜州言撫水蠻首領都指揮使蒙但挈其族歸順詔于宜桂州給田居之乙未賜饒州樂縣暢亮爵公士錢二萬常租之外免三年徭役以其率家人捕獲羣盜故也丙申環州言熟户旺家族首領春州刺史都資先為夏州蕃部所略今復來歸又有三族隨至詔遣使勞賜之先是有詔擇明經者補學官前江隂縣尉馮元自陳通五經時右諫議大夫謝泌領銓事笑曰古治一經或至皓首子能盡通之耶對曰達者一以貫之可矣泌嘉其對因問以疑義隨輒辨析遂以為國子監講書於是擢大理評事崇文院檢討國子監直講元廣州人也丁酉出苑中占城稻示百官壬寅以知棣州太常博士孫冲為殿中侍御史都監內殿崇班衛承慶為內殿承制奬修固河防城壘之勞也癸卯知荆南府朱巽罰銅二十斤荆湖北路轉運使梅詢削一任通判襄州坐擅發驛馬與廣州邵華子令省親疾而馬死故也先是巽以知制誥兼羣牧使出守藩郡兼領如故於是始解使職自是不復有外任兼領者矣丙午河北安撫司言契丹使往來路由冀州請擇武臣為守於是命澤州團練使魏榮代太常博士齊革丁未詔河北𣙜務入中布其數甚多用為博糴亦所未便自今除北界互市仍舊外悉罷之唐瀘州刺史陸弼有廟在射洪縣之白崖山僞蜀嘗加王爵庚戌改封靈濟公按陸弼廟碑記則弼蕭梁時人實録本志並稱唐當考辛亥上謂輔臣曰掌法之官宜務求中道勿用深文者如聞親民之官有酷刑以邀譽此甚無謂也卿等宜詢察而遷徙之壬子詔御厨所賜羣臣燎羊自今以八節熟羊代之或言其過為楚毒故也乙卯以翰林學士朝逈為契丹國主生辰使崇儀副使王希範副之龍圖閣待制查道為正旦使供奉官閣門祗候蔚信副之上謂輔臣曰向者東封西祀皆遣使馳書諭契丹今謁太清宫密邇京師重于遣使就令逈等以此意諭之可也逈等使還言始至長泊泊多野鵝鴨遼主射獵領帳中騎擊扁鼓繞泊驚鵝鴨飛走乃縱海東青擊之或親射焉遼人皆佩金玉錐號殺鵝殺鴨錐每初獲即拔毛插之以鼓為坐遂縱飲最以此為樂又好以銅及石為鎚以擊兔每秋則衣褐裘呼鹿射之夏月以布易帳氊藉草圍棊雙陸或深澗張鷹此據契丹傳及㑹要王希範顯子蔚信未詳有言逈與遼人勸酬戲謔道醉而乘車皆可罪上曰此雖無害然使乎絶域逺人觀望一不中度要為失體王旦曰大抵逺使貴在謹重至於飲酒不當過量上然之此據寶訓丁已令諸州官吏每天慶先天降聖三大節建道場散齊致齊如大祀之制從王欽若之請也詔龍圖閣學士直學士結銜在本官之上初杜鎬陳彭年之為是職也職在官下至是陳堯咨建言故更之冬十月辛酉祔元德皇后于太宗室先一日攝太尉王旦先奉冊寶詣后廟上徽名改題神主是日祔太廟禮畢百官詣閣門稱賀有司言后廟殿室當毁詔宗正扄鎖之上作慶升祔禮成詩賜近臣和壬戍合龍猛十一指揮為八詔西南蠻人朝貢回應隨行兵仗令有司為驛遞至蠻界給付先是蠻人以槍槊自隨在道被酒因迫脅驛吏故有是命甲子詔太府寺自今祠祭行禮官並於入內內侍省請御封香乙丑詔朝謁太清宫自離京至奉祀以前不得舉樂所過州縣無令樂人來迎詔如聞諸路先天降聖承天等節宴㑹先一月召集樂工按習于司理院頗妨推劾自今止令前七日按習違者置其罪河北轉運使李士衡貢助奉祀絲綿縑帛各二十萬詔奬之丙寅詔京城諸倉所納秋賦宜令均平不得稽滯侵擾仍委開封府亷察之丁卯三司借內藏庫錢帛五十萬以備奉祀賞給亳州言太清宫檜再生真源縣菽麥再實上作歌示近臣癸酉謁玊清昭應宫禮儀院請太初明慶殿親行禮神御殿親焚香紫微已下諸殿遣官以素饌薦獻集靈殿翌聖閣遣官焚香詔令近臣分獻遂著為永式甲戍命直集賢院石中立等修車駕所過圖經以備顧問龍圖閣待制孫奭上疏言陛下封泰山祀汾隂躬謁陵寢今又將祠太清宫外議籍籍以謂陛下事事慕效唐明皇豈以明皇為令德之主邪甚不然也明皇禍敗之迹有足為深戒者非獨臣能知之近臣不言者此懷姦以事陛下也明皇之無道亦無敢言者及奔至馬嵬軍士已誅楊國忠請矯詔之罪乃始諭以識理不明寄任失所當時雖有罪已之言覺悟已晚何所及也臣願陛下早自覺悟抑損虛華斥逺邪佞罷興土木不襲危亂之迹無為明皇不及之悔此天下之幸社稷之福也帝以為封泰山祠汾隂上陵祀老子非始於明皇開元禮今世所循用不可以天寶之亂舉謂為非也秦為無道甚矣今官名詔令郡縣猶襲秦舊豈以人而廢言乎作解疑論以示羣臣然知奭朴忠雖其言切直容之弗斥也丁丑詔奬戎瀘州蠻洞首領狃廣以轉運使寇瑊言其控扼道路助遏外夷故也己卯上作步虛詞六十首付道門以備法醮辛巳神雀集真遊殿道場丁亥知荆南朱巽言辰州瀘溪縣土丁都頭魏進武等率山徭侵擾城寨已遣本州知州監押部兵掩襲上曰守臣兵官不宜並出亟諭巽留一員在州仍遣使齎詔諭進武等令還溪洞如有所訴委本州裁酌施行若無故嘯聚即便宜撫遏條析以聞因命知洪州馬亮與巽對易其任詔今嵗秋成如聞諸路和糴不均民户頗有煩擾可令河北陜西京東西轉運司各蠲其半中等户已下免之權判吏部流內銓填從吉言格式司用十道圖較郡縣上下緊望以定俸給法官亦用定刑而户嵗有登耗未嘗刋修頗誤程品請差官取格式司大理寺刑部十道圖及館閣天下圖經定新本付逐司行用詔祕閣校理填鏞邵焕集賢校理晏殊校定翰林學士王曽總領之天禧三年書成凡三卷詔付有司初選人試判多藉地而坐從吉以公錢市莞席給之臨事敏速勤心公家所至務皎察數請對言事上嘉其無隱鏞從吉子也邵煥未見祥符元年七月除校理十一月癸巳遣使乘𫝊詣陜西與轉運使計度軍糧乏少處增價市糴甲午詔昌州牙校有願率子弟助討蠻寇者俟其立功第賞之以水潦免濵棣州牛稅一年都官員外郎知成州劉晟推官時羣録事參軍孫汝弼並勒停初同谷縣民勾知友妻張縊殺其夫其子婦杜因省親言于其父父以聞州州鞫張伏辨晟等論杜告其夫父母罪流三千里仍離之張同自首原其罪轉運司移鄰州檢斷張凖律處斬杜無罪詔劾晟等法寺言當贖金上曰牧民之官用刑乖當一至于此特命停官仍暴其事狀戒飭諸道乙未三司借內藏錢二十萬丁酉詔恭謝天地壇青城卒方在嚴冬尚聞野次可給官舍居之癸卯罷淮南和糴以頻年薄稔今始有秋也丁未詔車駕巡幸其近京州軍兵田寇盜事令東京留守提舉之京東西淮南諸路即以藩鎮知州領之庚戌遣使撫問戎瀘州巡檢王懷信等仍加犒設玊清昭應宫太初明慶殿有舍利出上謂宰相曰三教之設其㫖一也大抵皆勸人為善惟達識者能總貫之滯情偏見觸目分别則于道逺矣遂作感應論以著其事癸丑賜御史臺九經諸史從所請也甲寅丁謂自亳州來朝獻芝草三萬七千餘本契丹遣使長寧軍節度使耶律阿果副使左衛大將軍石弼來賀承天節乙卯龜兹進奉使李延慶等三十六人對于長春殿獻名弓箭鞍勒團玊香藥等優詔答之丙辰以東頭供奉官張綸為辰州都巡檢使招撫蠻人內侍殿頭江德源副之綸汝隂人也按此所云招撫蠻人當是魏進武等綸本傳乃言溪洞彭氏蠻內寇以綸知辰州綸至築蓬山驛路賊不得通乃遁去與實録事似不同𫝊蓋因范仲淹神道碑也當考天禧二年三月當考令閣門具內諸司使已下班簿進內以備選任丁巳詔近京州軍增屯兵處加給公用錢以備宴犒令長公主宅諸河所置舟船止免差徭其關市徴算如式申舊制也十二月戊午朔日有食之庚申回紇可汗伊嚕格勒遣使來貢涇原鈐轄曹瑋言發兵夜過渭州襲原州界藏擦勒族討違命者捕獲甚衆丙寅以兵部尚書寇凖權東京留守入內都知閻承翰都大管勾大內公事權三司使林特為行在三司使己巳天書扶侍使趙安仁等上新製天書車輅鼓吹儀仗上御崇政殿召宗室宰相觀之辛未內出丁謂所貢芝草列文德殿庭宣示百官從冦凖所請也壬申酌獻天書于朝元殿遂告玊清昭應宫及太廟庚辰御史臺上言常參官失儀條內語笑喧譁入正衙門執笏不端直班行立不正赴宴言語交錯舉動不肅並請坐私罪從之又請祠祭官致齊日早赴齊所遇大祀行事及陪位官並午前集朝堂宿齊違者坐之詔可辛已以翰林學士王曽攝御史大夫為考制度使刑部員外郎兼侍御史知雜事假華攝中丞副之知制誥錢惟演等編次迎駕父老及州縣繫囚右諫議大夫填從吉等詳定詞狀惟不置編次貢奉知天雄軍府周起言五臺山僧鏤木飾金為冠上設釋迦等象誑民求錢自今此類請行禁止從之壬午戎瀘州都巡檢使王懷信等言蠻寇悉平詔奬之令籍立功將士以聞先是懷信等分將諸州兵及白艻子弟緣溪入合灘至生南界斗滿村遇蠻賊二千餘人擊之殺傷五百人奪梭槍藤牌㑹暮收衆保寨蠻黨三千餘分兩道張旗喊呼來逼懷信出擊皆潰散進壁婆娑遇夷二千于羅固募村又破之追至斗行村上屏風山連破四寨一日三戰俘馘百餘人奪資糧五千石槍刀什器萬數焚羅固募斗引等三十餘村菴舍三千區懷信又引兵至斗行村追擊過羅雲射仆三百餘人爇其欄棚千數分遣部下于羅箇頰羅能落運等村及龍峩山掩殺大獲戎具斬首級重傷投崖死者頗衆燒舍數千及積榖纍萬兩路兵㑹于涇灘置寨轉運使寇瑊及懷信議遣康訓部壕寨卒修涇灘路以度大軍俄為蠻賊所邀戰不利訓顛于崖死之懷信引兵急擊大敗賊衆追斬至涇灘峽寨于宴江口瑊與符承訓偵知賊諜欲乘夜擊宴江馳報懷信即自涇灘拔寨赴之比至宴江山蠻衆萬餘已自南東合勢逼懷信寨懷信彀强弓環寨射賊瑊等整衆乘髙策援蠻人大懼而却合擊破之死傷千餘人蠻酋斗望又三路分衆來鬭又為官軍大敗射殺數百人溺江水死者萬計蠻人震讋詣軍首服納牛羊銅鼓器械瑊等依詔撫諭還軍淯井㪷望及諸村首領悉赴監自陳願貸死永不寇盜邊境因殺三牲盟誓辭甚懇苦即犒以牛酒感恱而去據㑹要及西南蕃𫝊自夷酋斗望分三路來鬬已下至感恱而去並係明年正月及二月事按實録則今年十二月王懷信等已奏夷寇悉平本紀稽古録亦同今從實録并書之大理寺言舊制審刑詳議官大理少卿詳斷官三年滿無遺闕考課改官景德中詔嵗滿四經書罰者審官院以聞量其輕重殿降差遣如詳刑允當優與升奬向來審刑詳議官年滿雖有責罰亦優獲差遣而本寺詳斷官偶有責罰不及四次者止授知縣則是詳斷官資序與監臨場務無異况京朝官充刑部詳覆官開封府諸曹參軍任滿日並通判諸州今本寺日有檢斷鮮能無纍欲望嵗滿書罰不及四次者授通判諸州以勵官屬詔自今兩經書罰情輕者奏取進止本志載此事于去年十月又云詔兩經書罰情輕者與小州通判今從實録兵部郎中龍圖閣待制孫奭自言父年八十二家居鄆州求典近郡以便侍養癸未命知密州奭請扈從還赴任從之契丹遣使始平軍節度使耶律逺寧副使起居舍人趙為箕來賀明年正旦
