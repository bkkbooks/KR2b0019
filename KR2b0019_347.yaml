body:
  text: 續資治通鑑長編巻三百四十三宋李燾撰神宗元豐七年二月庚午朔河北轉運使措置河北糴便吳雍言見管人糧馬料總千一百七十六萬石竒贏相補可支六年河北十七州邊防大計倉廩充實雖因藉豐年實亦吏能幹職同措置王子淵在職九年悉心公家望考察成效以勸才使詔賜子淵紫章服六年五月十三日子淵同措置其提舉糴便糧草則在熈寧八年四月矣定子淵傳云舊制邊防常儲三年粟至是真定儲八年州九年詔書嘉奬賜三品服按賜服縁吳雍論薦八年九年之儲雍功不及此恐傳飾説當考李憲上蘭州城守追敗西賊公狀詔憲保守一路有勞降勑奬諭賜銀絹三千統領東上閤門使王文郁為四方館使榮州團練使皇城使康識為東上閤門使嘉州刺史走馬承受梁安禮遷三資同總領蕃兵將西京左藏庫副使韓緒遷二資閤門祗候馬仲良及管當公事李彀遷一資寄資諸將第一等西染院使王恩等八人各遷二資减磨勘二年第二等供奉官崔朝等六人各遷二資第三等承奉郎王秉等五人及監司張太寧馬申胡宗哲管勾文字使臣李宇各遷一資選人鍾𫝊循二資内侍省高品凖備差遣羅承憲換入内高品餘以格推賞陣亡諸軍賻絹軍員三十匹下至遞鋪二十匹李彀此月二十四日乃除熈河路勾當公事此已云勾當公事不知何故又據御集正月二十五日手札入内内侍省内侍殿頭勾當延福宫李彀守蘭州有功今來赴闕可特遷東頭供奉官仍特添差勾當後苑然則此云勾當公事誤也河北轉運司言保甲三百許人入澶州觀城舊縣鎮刧民財物詔追赴澶州根勘同提舉開封府界保甲吕公雅監之先體量作過因依以聞樞宻院言公雅與知澶州吕希道乃叔姪欲改差河北西路轉運使吕温卿詔止差京東路提㸃刑獄李冝之改差李冝之此據御集此月十四日十六日四日一日可并考寳文閣待制知渭州盧秉知湖州此月八日丁丑依舊任辛未文彦博乞免入覲日都城外御筵及見日對御賜宴詔許免郊勞御筵詔聞西賊犯蘭州有鳯翔府庫貟節級自城中投賊令李憲具逐人投賊因依及骨肉親踈服紀以聞又詔鄜延環慶路如有合興工城寨許和雇人日支錢百米二升禁軍願就雇者聽樞宻院檢㑹今年正月二十八日范純粹奏舊條保甲遇旬上每人日支口食米三升鹽菜錢一十文契勘正兵每遇差出以至戍邉每人只日支口食二升至二升五合今來保甲既有鹽菜外其口食又増多正兵所請之數伏乞將應係保甲請給錢米舊條並行刪修除鹽菜錢依舊支給外其口食每人並只支二升詔依舊日支錢一十文外攴與口食二升半河東依此宻記二月二日壬申詔官吏遷入新寺監如輒敢穿穴牆屋移毁門窻者計所損坐贓論罪輕杖一百冩畫屋壁從不應為重法鄜延經略司乞選保安軍蕃族貧闕單丁弓箭手刺充捉生從之天章閣待制知慶州趙卨知渭州二月八日丁丑依舊任李憲乞招討西賊及上撓耕䇿詔盧秉昨得蘭州關牒不具以聞及不遣兵牽制已令趙卨徃代其令李浩同姚麟領兵出界招討委李憲計㑹趙卨詳度施行其逐路出界將兵可乗隙伺便為倐徃忽歸之計毋得調夫運糧元豐八年八月八日王覿言可考詔自今外任官乞赴闕奏事如到闕無所陳或所陳皆常事非不可形於文字者委御史臺彈奏御史寋序辰言左司貟外郎曽伉前任江西提㸃刑獄廵歴至洪州受公使庫月給及以官錢自貸職田所得米備償乞正其罪詔轉運司體量以聞伉尋卒遂已賜秦州度僧牒百十五以修城癸酉詔録蘭州守城功内不願轉資人賜絹二十匹太僕少卿吳安持等言昨奉使至遼於十二月問館伴耶律儀知高麗使在遼廷儀言高麗國王徽今秋卒長子勲嗣位六十日又卒今立徽次子運權知國事已遣使封冊此月丙戌可考按遼史載記高麗大安元年冊勲子運為國王今以運為徽次子與遼史互異甲戌文彦博入覲置酒垂拱殿上命酌御罇酒一巵賜彦博面諭云知酒量未退可飲盡彦博再拜以謝舊紀書甲戌彦博來朝燕垂拱殿新紀不書復西上閤門使狄詠為東上閤門使客省副使張守約為西上閤門使詠等先坐亡所部兵被責以朞叙復也詔諸陵三廵檢下土兵各以百人為額都提舉汴河隄岸司奏乞不許在京賣茶人户等擅磨末茶出賣許諸色人告首依私臈茶科罪支賞從之此據鹽法冊元豐七年二月六日敇増入要考見初置水磨月日六年二月二十七日初置水磨又八月十二日又是年六月一日丙子門下省言度僧牒已著令每道為錢百三十千檢㑹敇䕫州路轉運司每道三百千以次减為百九十千欲送中書省價高處别取㫖從之丁丑宣徳郎新權發遣同管勾河北西路保甲張亞之權發遣陜西路轉運判官既而與盧秉趙卨范純粹並依舊上批宣徳郎曽孝廣乆官鞏洛諳悉公私人情利害論事詳敏可就差知外都水監丞詔京東西路保甲免教閱每都保養馬五十匹給價錢十千京東限十年京西十五年數足其當優卹量佐芻粟等令轉運提舉司同議仍専置官提舉其京東西路鄉村以物力養馬指揮不行五年二月二日又九月十四日又七年三月二十三日本志云京東京西路既置提舉保馬司乃罷此兩路鄉村以物力養令而諸路户馬悉廢専為保馬矣初置户部在三年二月二十八日先是㸃檢京東東路刑獄霍翔言齊淄等州民號多馬禹城一縣養馬三千牝馬居三之一臣近因廵歴宻案視民養馬雖土産者骨格亦高大可備馳突之用兼齊州第六將騎兵多是東馬與西馬無異雖民間比官中養馬芻秣不多然而不有所免則無以為勸縁民之所欲免者在於支移折變春夫賊盗敷出賞錢保正保副大小保長催稅甲頭保丁廵宿十事臣即以此事自付禹城縣勸諭願養馬之家已應募者計馬四百四十八牡馬二百六十三牝馬百八十五然未見所免之利而願飬者已多乞應諸路鄉村户不拘等第高下如願養馬並許自陳除依條分畨教閲及覺察同保違犯并勾集追捕賊盗外與免十事内有田五頃許養馬一匹五頃以上二匹十頃以上物力高强恐妨差使不在養馬之限其牝馬須四尺二寸以上牡馬四尺三寸以上大縣毋過五百匹許飬牝馬三之一及委本州通判春秋呈驗當日放散外其餘約束一依朝廷近降民馬指揮上批送吳居厚相度居厚言馬政實為國家大務其次莫如財利民之安平又無若制禦盜賊今轉運軍須年計大半出於折變之物稍有侵耗即無從補助自保甲之法行於諸路其正副盡得一鄉材武之士譏察盗賊所在衰减今募民飬馬之法若與免大小保長支移催稅甲頭春夫賊盗敷出賞錢保丁廵宿七事實便公私可施行手詔三省樞宻院進議京東西保甲養馬事謂當留俟兩路使者以決可否惟朝廷大政廟堂之上令所自出若持心狐疑無堅决定論反求可於將命使者自非明於利害忠特不囬之人孰不觀望措議二三破壊其事可更審詳若果有害民必不可施行所見官具事理論奏茍無弊也即冝并心一意協力奉行時五年二月也於是悉施行之霍翔二年八月除京東憲六年十月徙成都七年二月十二日提舉京東保馬舊録載霍翔奏及手詔並於五年二月五日丁巳朱本移入七年二月五日甲戌今附八日丁丑又疑手詔不在五年當是六年冬末或七年春初也中書省言御史翟思論延州通判吳安憲務専郡事多自判决始送知州劉昌祚書押昌祚每有可否輒復沮抑遷怒吏史或至竄逃今昌祚言州事大小元立定施行次第與安憲協力推行安憲才力彊敏頗有顯效上下分守實無侵越詔翟思析奏思言御史風聞言事若詰其所從來則自今人人相戒無敢復言臣恐言路壅塞無以稱耳目之任范純粹奏議有辨安憲不䘏浮言劄子乃正月十一日昌祚云云盖與純粹同安憲倅延純粹所辟也知明州馬珫言凖朝㫖募商人於日本國市硫黄五十萬斤乞每十萬斤為一綱募官員管押從之戊寅上時御延和殿户部司農以職事對也己卯詔已降指揮宫城西北建二王外第可速計度限二年畢功以雍王顥等屢請出居故也提舉經度制置牧馬司言見差供奉官劉威於京東路揀買騾馬已五箇月餘方揀買過南京曹濮濟鄆州五處中格馬四百八十匹縁本路尚有十四州軍欲乞就差本司揀買馬供奉官白居古計㑹劉威分定到州軍揀買所責早得辦集上批新令已賦馬於京東西諸都保内均養其牧馬司恐更難與百姓爭市以增平日之直可更相度處分此據御集庚辰詔牧馬司毋得差官其買馬亦毋選鄉村所養只委劉威選諸軍市户馬御集云本路更不買馬今從實録熈河蘭㑹路經略司言董戩遣人以蕃書來已回蕃書約令引兵深入瑪爾黙滿裕克家詔朝廷素知董戩事力不能大抗西賊但不與夏人結和已於邉防有助委李憲自今所與蕃書不須過當督責秦鳯路經略司言對境尚有賊馬未敢放漢蕃諸軍詔諸路無冦已散遣兵馬委經略司詳度如賊不大入冦即以次放散李憲言本路上下畨土兵自軍興以來未嘗更下近乞歸營補洗詔昨新發徃永興軍駐泊將兵可權差半將徃代下畨人潞州觀察使贈彰信軍節度使開府儀同三司濟隂榮王宗輔卒濮王第七子也上既臨奠手詔曰朕自嘉祐中從先皇帝入居儲宫離濮邸已二十餘年今日縁奠故伯宗輔因得趨謁濮安懿王祠堂顧瞻諸伯叔父所存者無幾皆齒髪衰遲儀形非徃日之比深用惻然其議加恩諸父兩紀皆略載詔語癸未日封嗣濮王等熈河蘭㑹路經略安撫制置司奏夏賊舉國圍蘭州將士隨機應敵殺賊數萬城壁無損乞優當官吏并録舉人鄭暉等功詔推恩官吏暉等與諸州文學賜知開封府王存奬諭敇書銀絹百匹兩府推判官胡宗愈等銀絹三十匹兩初存等奏獄空命如故事遷官而門下省謂前此存等以獄空遷官或賜章服才半歲今又推賞不可乃命止賜詔及銀絹而已辛巳提㸃成都府路刑獄朝散大夫霍翔提舉京東路保馬同提舉開封府界保甲朝散郎吕公雅管勾京西路保馬資任請給恩數同三路提舉保甲並賜紫章服降引進使高州防禦使李浩為四方館使皇城副使吉州防禦使苗履為左藏庫使以奏賊犯蘭州事異同也知大名府王拱辰奏勘㑹貧下保甲潜投軍者甚衆逐時覺察依條科斷卻押歸本保數内有柴立林貴二人曽有祈告辭狀情甚懇切謹具繳連進呈臣以保甲賊盗繫民休戚所以輒冒啟陳惟望聖慈深察特賜裁幸上批契勘禁保甲投軍條其賣盡地土之人該與不該勒還本色進呈是日詔不候造簿免第五等户保甲事状限令詔到三日内聞奏此據御集又劉摯作王拱辰行状云三年秋大享明堂詔入陪祀既畢召對曰北門常須舊徳而卿故治也當再勞卧鎮之又屈指數曰某年召卿歸矣時三路籍民為保甲下戸皆不免日聚教之提舉官禁令苛急河北保甲徃徃為盗賊百十為羣州縣不敢以聞拱辰極論其弊謂非止困其財力害其農業所以使為不良者法驅之也將恐浸滛為大盗可憂願蠲裁下戸於是主者指拱辰沮法異論拱辰曰此老臣所以報國也章入不已天子始悟保甲之為盗也六年三月拜安武軍節度使再任按拱辰以三年九月二十六日除知大名府摯行状即繫論保甲為盗於其下拱辰論保甲為盗盖再任後乃言之七年二月十二日御集所載是也拱辰傳稱初籍民兵請稍蠲下戸當即指此然實録不載不知下戸竟免否當考壬午詔新定京東西保甲司計都保養馬雖已頒下而畫一未具有司觀望必持兩端冝趣吳居厚燕若古沈希顔速赴闕與新差提舉官於中書省兵房同六房舍人議定畫一以聞若古時為京東提舉常平希顔為京西轉運判官御集三月六日令居厚等上殿又詔州縣除依條不許干預教閲外其保甲有違犯及當撫諭彈壓廵教官指使違法自當覺察施行若失舉察保甲司按劾從同提舉河北路保甲李寧請也李寜同提舉永興等路保甲改河北路乃二月二日癸未皇伯淮康軍節度使濮陽郡王宗暉為鎮安軍節度使進封嗣濮王武勝軍節度使天水郡公宗晟為安化軍節度使高宻郡王皇叔彰武軍留後宗綽為建寜軍節度使建安郡王保平軍留後宗隠為昭化軍節度使安康郡王鎮寜軍留後宗瑗為崇信軍節度使漢東郡王定武軍留後宗愈為感徳軍節度使華原郡王涇州觀察使宗勝為武勝軍留後祁國公亮州觀察使宗楚為鎮寜軍留後鄖國公蘇州觀察使宗祐為定武軍留後鞏國公淄州團練使宗漢為成州防禦使鄴國公以手詔推恩也并庚辰日嗣濮王自宗暉始新紀止書宗愈以上六人舊紀並書宗勝以下四人樞宻院言聞澶魏作過保甲多為人倡率别無情理官司已許首身欲降指揮首身保甲如為首倡率及拒捕傷人並追鞫餘皆放罪令赴教從之是時狄諮劉定縱保甲暴横州縣不得拘問澶魏保甲白晝刧略驚動一路而朝廷不聞其實自此河北盗賊公行多保甲也朱本簽貼云自是時至多保甲也無本底前史官之妄合删今從新本復存之此月一日十七日又四月二日觀城事并十四日朝城臨漳等事可考御集七事與狄諮劉定相關今悉附見賜狄諮勘㑹河北民兵教肄之初方籍諳曉始末之人委仗近得卿奏假疾遽欲觧去甚辜付任之重訓民紀律雖綱目出於朝廷而左右推廣輔行悉在事始選任緫轄官司朝廷本意固非輕有付授擬欲俟劾實著見増秩賜金終老其事况卿朕所自擇雖異日就膺節鉞尚不可易此職任况今事方革昧乎冝體朕意更不得别有奏陳劉定凖此諭之俾知朝廷選任本意安心職守兼璋已令依舊勾當去訖御集第一百五十六巻無月日璋己令依舊勾當不知是何人當考數又賜劉友端勘㑹本路保甲近日已來頻有生事如十人羣行盗斫榆栁及强入鎮市典質物色并趕逐廵檢等不少顯是廵教官不得人有以致之及提舉司失於譏察縁上件民兵是第一件朝廷大法深恐因循損害可面諭狄諮等更切用心多方防範照管及仰躬親火急前去上項曽經生事去䖏體量因依聞奏如河東與本路宻邇縁提舉官王崇拯為事宻細分外用心職事至今保丁事藝亦已增進凡百並得安貼可亦諭與狄諮使知原委御集第一百六十巻亦無月日又樞宻院奏奉㫖内黄縣作過保甲令追付大名府并廵教官指使使臣不合聚集保甲在一教場教閲並根究取勘具案聞奏未審令劉友端與王子淵同共監勘御批王子淵充専一推勘劉友端依已降指揮監勘餘依擬定指揮元豐七年正月二十八日下保又提舉河北東西路保甲狄諮奏契勘内黄縣作過甲已収捉到一十七人推究外有二百三十八人赴縣已令依舊在場教閱務要衆心安貼今來北京留守司指揮宻切知在本司看詳衆人既已散在村落難以宻切知在若行拘管又恐人心驚疑别致生事致本司難以施行伏望朝廷特賜處分御批其北京留守指揮顯不中理難為施行可火急劄下保甲司照㑹元豐六年二月六日下又提舉河北東西路保甲狄諮奏凖樞宻院劄子奉㫖内黄縣作過保甲令勾赴大名府并廵教官指使使臣不合聚集保甲在一場教閲差王子淵就本府専一推勘其提舉官失覺察並於案後収理臣恐王子淵近日到北京取索供荅文字待罪又恐違出廵日限御批冝令依例火急出廵訖奏元豐七年二月七日下又權發遣同提舉河北東路保甲權管勾提㸃刑獄劉定奏凖朝㫖為定安鎮韓張鎮定安鎮屬大名府元城縣韓張鎮屬大名府朝城縣等處保甲及羣賊等强觧錢物事令躬親監督捕盗官掩捉者體問得當日因保長捉刧賊在寺保丁楊萬夀等同守罪人只有李福王定等八人曽到市戸家解錢除李福等八人未獲楊萬夀五人見禁外别無多人所有定安鎮元申兇惡三二百人及稱鬬敵顯是虛張事勢不惟意望功賞兼欲歸咎保甲官司已推究想申報不實及㑹到酒務内墻見在元不推倒已牒本府施行御批詳定所奏其元初作賊事理本情亦無兇惡跡状乃是素懷不忠異議之人張大扇揺意在破壊保甲成法以至上逹朝廷為之動心再行處分兼特差官窮治其事致騰播張皇駭聞四方極為不便冝火急下劉定令宻切具析元初張皇官司火急聞奏仍令不得輙有避忌不盡元豐七年二月八日下實録見十六日劉又權發遣同提舉河北東路保甲權管勾提㸃刑獄定奏體問澶州勘觀城縣觧錢公事禁繫三十餘人節次不住勾人欲乞指揮承勘官司不得容見禁人枝蔓追證御批檢舉近日已降指揮令勘院火急將不係首謀作過之人指揮到日並行踈放訖奏仍令王子淵李冝之並發歸本任及元廵歴去處止令劉定徃來催驅結絶仍並從急逓中指揮更不送門下省元豐七年二月十七日下甲申詔京東轉運司高麗使入貢依式用妓樂如使人辭免即聽乙酉刑部言沈括凖赦量移詔更候一赦取旨手詔李憲趙卨上章祈免易守平涼朝廷以其情辭廹切已可其奏又内外在位近臣尠有練逹邉務冝膺是選者不得已始令盧秉復還舊任爾冝照㑹近日處分施行朱本増入新本削去上批據劉定言澶魏保甲初無凶惡跡状乃是素懷不忠異議之人張大扇揺破壊保甲成法以至上逹朝廷為之動心差官窮治其事駭聞四方可下劉定宻切具析元初張皇官司以聞無得避忌不盡仍下李冝之王子淵見鞫保甲事限十日結絶杖以下勿禁下劉定據御集在二月八日又十七日令王子淵李冝之歸本任只委劉定結絶所有限十日令李冝之王子淵結絶御集乃無之四月十二日徙知秦州天章閣待制劉瑾知應天府以御史朱京言瑾狠愎傲虐乞選忠厚可属任者代之故也責授昭化軍節度行軍司馬均州安置王詵為諸衛將軍潁州安置丙戌詔高麗王子僧統從其徒三十人來遊學非入貢也其令禮部别定儐勞之儀吏部乞於四選補筭學博士闕從之御集二事今附此明州奏高麗國發禮部侍郎崔思賢前去告哀及有國王子僧統大師領僧約三十來人欲同告哀使來本朝作功徳本州未有高麗告哀使及王子僧統到州迎送館設等儀式安泊差人引伴沿路驛程供給並未有定式御批宜令本州通判引伴赴闕其待遇禮數專下馬珫依倣王子赴闕已定式令從僧俗權宜裁定一面施行訖奏即不得稍有削薄虧損朝廷待遇恩意其安下去處即令火急選擇本州將好僧院一所併治整㓗仍令差下引伴赴闕通判官同在本院筵伴上宿仍隨所闕噐用諸般物色逐旋差僧一一畢備齊足不得小有闕悞仍從急逓中指揮更不送門下省其僧統左右得親近者三兩人比附上節例施行元豐七年二月十七日下亦奉國軍奏入高麗國温式舩回到定海縣稱新國王是身亡見今國主是前國王第三子及稱欲遣僧來作功徳呼為僧統御批除迎候王子僧統自從别降朝㫖外餘並依常使例惟不用花樂仍仰轉牒縁路州軍凖此元豐七年二月十七日下李憲乞遣李浩出兵偽示取靈州詔憲只依先降撓耕指揮及行招納新格又詔御史臺以侍御史知雜事為侍御史不帶知雜事以言事官為殿中侍御史六察官為監察御史侍御史恩數並如知雜事左右廵使及監察使名並罷左右廵案令本臺隨事併入朝堂百司案驅使官仍除去四團字主簿檢去官仍舊各一人文彦博言先凖勅立家廟歲入祭用酒以臣隨行公使酒供辦今臣致仕不欲沽酒以祭乞於河南府公使庫逐祭寄造酒十石從之詔陜西河東沿邊舊城寨見闕官處委經略司選才力使臣自今見任官毋得移近裏及别委勾當違者監司體量以聞丁亥歩軍副都指揮使邕州觀察使劉永年卒輟視朝臨奠之贈崇信軍節度使諡壮恪後詔弟永夀遷遥郡防禦使更官其親戚一人戊子手詔李憲得回奏淺攻擾賊春耕若如所畫理固甚善所未可知者我兵出境非十餘萬衆果可以致傾國㸃集否又天都老小茍聞大兵之出果震驚不奔駭渡河而肯置之㑹州之側使我得以招携否使上件聚落如我所料團聚不散則所謂二十二鈐轄者果可以一呼使之改衽内附否此事首尾恐未詳宻則不若且如去年三月中及暮秋李浩苖履楊吉等出塞已見事驗為忽徃倐歸之計甚便宜審圗之朱本増入新本並削去庚寅左班殿直馬誠自言本徳順軍弓箭手遷官皆以戰功吏部右選有徳順軍廵檢闕以臣土人法礙差注欲望以戰功差授上批吏部雖當用常格縁邉寨主兵官正要得生長彼方諳習山川迂直向背之人乃可緩急將兵出入不失地利冝依所乞癸巳李憲言子彀漸可驅使乞一隨行差遣庶得倚信上批特差彀充熈河蘭㑹經略安撫制置司勾當公事又詔憲近據具析到熈河岷州通逺軍及河州擬修三關堡合用守禦器具萬數非本路可辦今擇其𦂳急要用者黄樺神臂弓黄樺烏梢金線弓各三千張斬馬刀劈陣刀各一萬柄新様齊頭刀一萬五千口黒漆獨轅弩二千枝黑漆床座一千副竹手牌五千面起節長弰弩五千枝錐槍一萬條氊二萬領黒漆欒竹長牌一千面躬甲弓長箭二十萬隻神臂弓箭三萬隻獨轅弓箭二十萬隻馬黄弩箭五十萬隻神臂弓火箭十萬隻火藥弓箭二萬隻鐡甲三千領皮笠子一萬頂火藥火炮箭二千隻火彈二千枚鐡額子五千枚先次發去仍令憲督促役兵修治城壁去大河結凍時月空隙無逾百十日寸隂至為可惜理須上下竭力俾工作日見程緒乃所望也朱本增入新本削去大河結凍恐非二月未所當云更詳之甲午熈河蘭㑹路經略司言虎翼卒郝貴等捕獲逃亡未獲守城有功詔依例給賜銀絹以守城功除其罪丙申陜西路轉運副使王欽臣言近凖朝㫖軍須經費令經略轉運司通管臣見范純粹說昨入奏嘗乞用王震㑹定法臣竊以出納之吝謂之有司不愛財用者將帥之事兩者得其人則交濟若合為一職則勢有所不行而帥臣是費用之地雖使之通同聚歛所入不補所出唯倍責財本雖王震㑹定之法亦未可行然亦不須改法候邊事少息物價復常乃申前制伏望且使仍舊則有司不失其守詔轉運司官合議以聞既而葉康直李察皆言沿邊糴買事乞依㑹定法施行軍須經費難令經略司通管詔依康直察所奏其正月己未指揮勿行正月己未十九日也又六月二十七日乙未當考自既而以下朱本増入却删六月二十七日墨本知河南府韓絳言故宰臣張知白止有一子早卒無人承繼䝉恩欲望於其本宗擇一子承知白後從之其家舉故虞部貟外郎昭立子敷繼知白下禮部言敷昭立嫡子不當為人後又故虞部郎中張珣妻高氏言第三子沂屬尊且長乞以為知白後不受所賜官詔河南府令知白族人依世次推擇有行誼一人以聞殿前都虞候沂州防禦使苖授為容州觀察使歩軍副都指揮使丁酉以蕃官如京副使高永堅為莊宅副使統領官副緫管曲珍知環州張守約降敕奨諭各賜銀絹二百將官杜紹折可適劉甫張誠各遷一官蕃官吹羅以下功次遷官減磨勘年有差環慶路經略司上珍等出界功也永堅或與曲珍張守約同功賞但實録不詳耳當考詔鄜延環慶熈河蘭㑹路經略司西賊昨經蘭州傷敗又向夏暑非舉動之時頗留戍邊兵馬虛食邊粟可相度依差去先後減遣歸營戸部言見緡不多請發東南諸路積剰錢百萬緡置物貨輸元豐庫變易見錢以備支用從之詔開封府界户馬並以家産鹽稅為定五年五月五日霍翔云已移入七年二月八日又五年八月七日并七年二月八日及此日又三月二十三日皆合參考戊戌詔門下中書外省立三省樞宻院吏不通轉額法
