body:
  text: 續資治通鑑長編卷四百二十九宋李燾撰哲宗元祐四年六月庚子朔范純仁王存並出居於外上章乞罷皆留中不岀亦不批答亦不封還亦不遣使宣押文彦博同執政入對遂定議其夕鏁院甲辰宣制以大中大夫守尚書右僕射范純仁依前官為觀文殿學士知潁昌府政目於四日書純仁觀學知潁昌今從實録以純仁附五日中大夫守尚書左丞王存為端明殿學士知蔡州朝廷既貶蔡確或勸純仁引去獨明己之力盡純仁曰我方慕古人願為良臣不願為忠臣安能楚楚自見邪言者果劾奏純仁及存遂俱罷存在熈寜中論事純仁固己推之及同執政趣又多合然純仁嘗建議罷教畿内保甲存獨言今京師兵籍益削又廢保甲不教非為國家根本長久之計且先帝不憚艱難而為之既已就緒無故而廢之不可論者亦稱其不茍相比云議罷教保甲或自有本月日則不當附此更詳之附此亦可純仁及存既罷劉摯為王巖叟道簾前奏對語曰太皇太后謂純仁差錯久矣初以其有大名又司馬光所甚重遂用之不意如此也蓋止得虚名耳文彦博因言純仁父仲淹亦得虛名然比純仁則有材略太皇太后又曰諫官言純仁黨確則恐不然但所見偏繆耳又曰王存殊無執守前日為范純仁所目便留身同救蔡確又問執政曰覺純仁如此否彦博曰純仁自䝉大用頗恍惚大防等言毎與言多不聽又曰王存在省中諷臣令救確臣不敢聽其言而純仁納之太后曰純仁用過其量故至此也此叚並據王巖叟所記修入當考王巖叟記蔡新州事丙戌九月得此於汪應辰今附此元祐四年四月五日知漢陽軍吳處厚奏蔡安州作詩譏訕六日右司諫吳安詩上疏八日進呈吳疏簾中云安詩論確謗訕却不見文字乃是通封入作常程便降付尚書省矣有㫖令進入要看遂并後状同封進入尋復降出自七日後右正言劉安世右諫議大夫梁燾相繼各有兩䟽十二日進呈有㫖令蔡確開具因依聞奏及令安州知州錢景陽繳進十八日再進呈梁燾一章有㫖下安州促報限三日入馬逓中書舍人彭汝礪宻䟽救解大槩以處厚開告訐之路此風不可長為言雖不以語人而議論之㣲意可見御史中丞李常侍御史盛陶自十二日後知朝廷行遣及聞簾中語意遂合一章備禮聲言助諫垣然意在佑確而不敢顯言實欲罪處厚而不敢明論五月二日安州文字回云初確書詩於牌既移鄧州行一驛復使人取牌去洗盡使還安州公使庫是日簾中云確黨多在朝廷范堯夫進云確無黨吕㣲仲進曰蔡確有朋黨在朝范純仁之言非是中書劉莘老亦助㣲仲言有之退而吕范各有實封入前此數日太師同三省入對簾中云蔡確事都無人管使司馬光在必不到如此諸公慙懼不知所對是日但都不敢進呈文字初四日制以吏部侍郎傅堯俞為中丞代李常為兵部尚書太常少卿朱光庭與侍御史盛陶易地五日鄧州開具文字到皆自辨之詞云本無意又言子瞻作聖節口號亦用桑田豈譏誣也初安厚卿對諸公云子瞻亦用海變桑田作聖節詩語已而南陽之説符衆皆以為厚卿宻通意諷今引之以為解吳傳正上疏擊曾肇教彭汝礪救確而不自言其姦過於汝礪劉噐之亦詆二君并及右相以為交結而為確地五日噐資又一疏自辨十二日進呈確事責授左中散大夫光禄卿分司南京噐資是日入省初未見詞頭云若得輕佳既見此命并責盛陶已下四御史遂不草詞亦不封還但别為一状論之及申中書稱疾謁告歸第中書遂令余權十三日入省得詞頭確責降安州作詩内渉譏訕事新除太常少卿盛陶可差知汝州殿中侍御史翟思可通判宣州監察御史趙挺之可差通判徐州監察御史王彭年可差通判廬州四人臣寮上言蔡確怨望指斥謗訕事盛陶居風憲之地目覩確無禮於君親而依違觀望曽不糾劾及朝廷行遣方始備禮一言而是非交錯亦持兩端皆無定論翟思以下仍更不見章疏御史如此紀網何頼自十四日後三諫有章連言太輕新坡范祖禹亦助十八日再有㫖責投英州别駕新州安置給逓馬發遣令逐州差承務郎以下官伴送如無即差職官是日公肅在式假又當余權行制既而右相與中書侍郎皆召遂往見之三公皆云初以母老不欲過嶺而簾中云山可移此州不可移諸公不復敢進言命遂下但不差使臣諸公以此為喜十九日批出却差入内内侍省供奉官裴彦臣三班奉職馬經押送四諫及中司皆欲救止而恐與初論相戾且非體復不敢發范相云某亦不敢言惟劉莘老云明日當與諸公於簾前論之十二日垂簾不見有指揮彦臣申請三項内一云如遇確疾病乞用兠轎擡擎前去王正仲救三御史云今以不言責之恐後來者不擇而言紛紛可厭簾中云言之多何害朝廷與他辨是非十八日梁况之吳傳正再登對大稱奨云卿輩於此事大有功言事長如此當有天佑是日李常以龍圖閣知鄧州曽肇以待制知潁州彭汝礪落中書舍人知徐州韓川自潁州復以太常少卿召中丞傅堯俞疏邢恕為確腹心之黨乞行遣此一人餘勿問侍御史朱光庭亦論恕附確右正言劉安世䟽恕所謂四社稷臣蔡確章惇定策於内中丞黄履助之於外恕往來預議於其間乞明辨以正其罪事在有司可明者四元豊七年秋宴先帝令延安郡王出見羣臣事已定一也延安郡王即今上先帝疾浸亟太母不令二王入侍逺嫌如此二也二月二十九日太母手出皇帝所冩為神考祈福消災經一巻令大臣看當日遂降詔立皇太子三也親賢宅才畢不候服除太母便令二王遷出四也二十八日恕落職降一官添差監永州鹽酒税候滿日更不差官令所在官司收告候本官服閤日給付三十日降出臺諫言范堯夫王正仲章付左省六月一日范相遷入報恩禪院王左丞遷入安厚卿宅二公入劄子乞外任皆留禁中不出亦不批答亦不封還亦不遣使四日垂簾太師亦入遂定議其夕鏁院五日宣麻純仁以觀文殿學士知潁昌府王存以端明殿學士守蔡州其口莘老召余遂見於省中具道其事簾中云純仁察其差錯久矣初以其聲名大又司馬相公薦之甚重遂大用之不意其如此也元來只是虚名太師進曰其父仲淹亦以虚名得之然比純仁有材畧太母又曰諫官言純仁黨確却恐不然只是其所見偏謬耳又曰王存全無主執前日只被范純仁覷便是他任又問諸人曰覺純仁如此否潞公曰純仁自大用來有些恍惚諸公亦曰每言之不聽㣲仲曰王存每在省中諷臣令救臣不敢聽其言而純仁納之太母又曰純仁用過其量以至此巖叟所云十二日恐是二十日又云十八日恐是二十八日但傳本如此姑因之後又得劉摯行年記於摯諸孫荀與王巖叟所録畧同今併附注此摯云四年五月貶安州蔡持正為英州别駕新州安置范堯夫罷相以觀文知許州王正仲罷左丞以端明知蔡州中丞李常為兵書侍御史盛陶知汝州王彭年翟思趙挺之分補通判舍人彭汝礪噐資以本官知徐州曽肇子開改給事中繼以待制知潁州持服人前知河陽邢恕和叔落職奪一官監永州税下衛州候服闕發遣先是知漢陽軍吳處厚得確安州所刻詩十篇内三四有怨訕語處厚箋釋繳上之勑確問状奏至深自辨訴諌官梁燾劉安世吳安詩等連章乞正典刑而臺諌官惟中丞常一言陶一言持兩端餘嘿嘿汝礪知純仁存意佑確乃附之為確辨論乞罪處厚及除確光禄卿分司封還詞頭肇許汝礪同論已而不作汝礪獨上之出語惡肇以為賣已初上意不深罪確故余與諸公進呈間亦為開陳之本止於分司而諸君紛紛不已陷於朋附范王屢于簾對及留身切切營救范私語客曰先子在明肅時專論簾中之短客正色對曰相公之言誤也時有不同今日簾下有何闕失客退太歎憤以語於人范之子報確親曰家公救得有次第也於是諫院收拾此等事上之并劾相君左轄舍人臺官至十餘䟽今年春已來恕遣親信至都下唱言于衆謂確也有受遺定策大功不可令在外經營復召多為岐路而其迹詭祕上下危慄未有以發㑹此事自暴人情疊疊大惡之而范王諸君又激之上意不樂遂及大潰上當衆諭宰執曰山則可移此事不可移也純仁存既不得意請去簾中諭文太師曰覺純仁差誤多否始以其有名譽故進用却只要牢籠惡人不知因何致虚名如此太師奏曰此人輕鋭非宰相噐專務收籠人情近日尤更恍惚其父仲淹所以致名譽亦用此術諭曰當聽其去合如何除職予以中書職名次叙及近時宰相除外任為大學士數人故事進呈諭曰固合用例然似全無分别冝除次一等職名故與王正仲皆有是命肇初改夕扉間言者及之故亦請外大抵確事簾中既怒而諸人者又為此紛紛遂成之資政殿學士知潁昌府曽孝寛知鄭州政目在四日實録同今移附五日樞宻院言諸路奏報並邉時有人馬及諜言賊界亦有㸃集慮邉臣見夏國遣使因失備禦詔陜西河東逐路經略司宻切伺察賊意過作枝梧仍戒敇沿邉城寨兵将官明逺斥堠用意隄防無致緩急墮其計中御史中丞傅堯俞言臣聞夏人款塞傳者謂必縁地而來臣竊思之方今邉備未豐士氣未振民力未全賞罰不明将帥難倚其尤可慮者議論不齊平居講事或經時曠日而不能合茍必至於用兵豈能迎機猝應制變於千里之外哉臣竊為陛下憂之自古和戎未有能抗天威而快人意者惟所屈者益深則所伸者益逺願陛下姑務柔之以德專以繼好息民為意則天下幸甚據堯俞奏議附見月日當考乙巳左諫議大夫梁燾言臣伏聞元祐初中㫖罷修京師城隍都人之心上下安悦歌呼鼓舞傾動里郭一日復興大役羣情愈為憂恐况重困民力以来怨嗟輕損國用其費浩瀚朝廷以人情未静為恤此非安民之道也以財力未饒為念此非節財之理也此役一罷兩利俱得誠為急務願留宸斷貼黄臣訪聞今來費用官錢每年約九萬餘貫以四年為限每日雇夫二千人今又促限為二年日役四千夫只是併得年限元不減得人工其於費用無所省節臣訪聞西北兩面城壕開修已有次第東南方始興工欲乞先次指揮更不開修東南兩靣以安人心仍仰開封府疾速指揮多出文牓告示人户及嚴切覺察妄作名目起動民居之人結罪奏聞重賜行遣庶使輦轂之下明知朝廷恩意竊以起遣居人發掘墳墓生事死葬兩不得安前日羣情驚憂正為如此及中㫖罷役人皆感悦今來不可却為騷擾伏乞連賜指揮罷去據見修處以廣固人兵略為結齊了當所有人夫即令放散誠為省便廣固指揮自有役兵三千餘人毎年更有諸路差到廂軍二千人可以責辦工料漸次修治舊管使臣土員可以分頭管幹今若不開東南兩面壕地只用廣固役兵修緝已了城隍經久誠為安便臣聞將作少監胡宗炎在先帝朝曽上地理之説尤為詳當此書必在禁中乞賜指揮檢討聖鑒便見利害如可降出即乞封付三省却令進入恐嵗月稍深難為檢㝷欲望聖慈詳酌下胡宗炎取索副本進入宗炎見任開封府推官七月七日又言十月十八日可考范祖禹云云在五月末要考見幾月日罷幾月日却修丙午翰林學士左朝議大夫許將為中大夫守尚書右丞許将傳云将為尚書右丞每討論熈豐故事陳之以資政殿學士知定州樞宻直學士朝奉大夫户部尚書韓忠彦為中大夫尚書左丞樞宻直學士中散大夫簽書樞宻院事趙瞻為中大夫同知樞宻院事右諫議大夫范祖禹之妻與忠彦之妻從兄弟也祖禹引嫌乞廽避右司諫吳安詩言忠彦之妹嫁其子右正言劉安世言其子娶忠彦之女皆乞廽避詔特不廽避仍不得為例祖禹等力辭訖不許殿中侍御史孫升言伏以朝廷設諫官御史為人主耳目正欲檢察大臣之私今諫官御史七員而令諫官三人不避大臣之嫌則是人主耳目已廢其半矣雖陛下待大臣以至公責諫官以大義然固有成法既許避親則人之常情不無私意既廢國法又抑人情故公議有所未恊臣竊恐於忠彦亦不能自安在諫官且何以逃責伏望聖慈詳察指揮聽令依條廽避以慰公議不報左諫議大夫梁燾言臣恭以國家之治務在急賢材人材之難莫如宰相方今多事宰相之任尤宜得人陛下聰明勤儉夙夜求治抜擢輔臣覬成公道邪人多過上負聖恩任用之際不可再失必欲注意仰成固在留神審擇先之以徳噐次之以材能有徳噐則不肯為姦有材能則可以濟事徳噐者人望之所歸材能者士論之所服在此二者必得一長使命下之日中外歡然有光陛下知人之明以重天下觀國之勢誠為宗社之福也臣前日䝉陛下面詢臣已具奏所知不敢有隐如陛下未以為允乞少虛其位深留聖意審察而詳擇之貼黄若求經綸全材未易遽得不得已且求敦厚誠實之人雖然材力有所不逮且不敢為朋比欺罔君臣之間可以委信但使推廣恩徳謹守法度則自然漸致安静矣陛下聰明必已自得人臣妄言納忠庻或有補臣聞新除左右丞才薄望輕士論不服朝廷已行之命臣不敢輕議然大臣數易非安静之道又其人未有顯然過惡伏願陛下面加戒飭使盡忠當事試之嵗月徐觀其效若便仰成恐誤聖意燾面奏所知當考右諫議大夫范祖禹言臣伏見新除韓忠彦左丞許將右丞執政大臣繫國家安危天下治亂必妙選人望不可不重臣不知陛下用此二人何所取也二人者皆風節不立人望素輕置之廟堂無以重國不惟無所禆益未必不為回邪陛下久當自知之耳忠彦韓琦之子琦之所長一無所有惟能隨時俛仰觀望朝廷附㑹權勢以取富貴而已陛下以韓琦功業欲望於忠彦臣竊以為過矣若以韓琦之故而用忠彦則執政非賞功之官也許将亦無才能唯善希合執政凡議論多為兩可之言士大夫無不輕之自元豐八年出知成都陛下固未嘗識昨召還翰林今兹大用人不厭服陛下臨御數年羣臣本末必皆照知今用此二人竊恐聖意察之未熟若出於大臣薦引則是背公立私以誤陛下臣前上言若且虛右丞一員亦未至闕事蓋所用不得人而希望者衆也今兹之舉使賢者無所勸慕而庸常之人誰不僥倖雖得如忠彦等百數何益於朝廷前後除用執政皆出陛下聖選無不大愜天下之望惟是韓縝作相不協物論其餘所用皆有可稱今此二人殊不類前後差除若出大臣之意自此威福權柄漸移於下此臣之所甚憂也臣已奏乞避親嫌然陛下以諫官為耳目有所聞見不敢不使陛下知之伏望陛下自今執政有闕親加選擇審觀熟察詳審用人無失天下所望臣不勝區區之愚此用祖禹家所藏奏藁増入之中書省言尚書侍郎學士待制及兩省御史臺監察御史以上左右司郎官國子司業各限一月舉内外學官二員今後有闕日亦合依此其召試之法自當衝革并元祐令諸奏舉内外學官須進士出身年三十以上無私罪停替歴任及二年者其行業純備淹滯草澤或登科嵗久恬於仕宦雖未歴任亦許奏舉而日近内外臣寮所舉學官甚衆不應前法請候有闕遇降朝㫖方許奏舉從之左諫議大夫梁燾言臣恭聞祖宗治財經費良法屢講當其時上令甚舒民力甚暇國用甚餘其故何哉商賈通而貨財無壅滯之弊也祖宗之法冝便萬世惟陛下面稽而力行之當有補於大計矣欲望聖慈指揮户部檢㑹舊日三司并𣙜貨務已行之法悉上朝廷伏乞選差官限一月看詳取其尤冝於今者與户部官參議著為定令飭執政大臣覆視次第施行貼黄所有户部檢㑹舊法乞朝廷嚴責近限具委無漏落結罪節次聞奏其看詳官如要合照使文字許一面於所屬去處取索限三日内却送本處仍只得用逐官㕔人吏兼行量支紙筆外不得别乞添給等如文字了日奏取朝廷指揮燾六月七日奏十六日差范育等十一月末燾又言丁未夏國遣使入貢穆衍傳云四年夏人遣使入朝欲以還四寨易蘭州及塞門寨命衍押伴折之以理夏使辭屈傳蓋因張舜民誌衍墓也今墓誌乃多誤字當從衍傳衍時為户部員外郎誌又云其後夏人入賀興龍坤成節皆命衍押伴夏使欲有所發輙憚衍而止當考左諫議大夫梁燾言朝廷昨來割棄陜西河東堡寨已失於前今外議又傳大臣欲以蘭州定西一帶割賜西人臣聞周詩昔先王受命有如召公日辟國百里正今日之戒也大臣不務畫策制伏外敵使逺人懷徳而畏威但日欲割棄疆土以損國勢非盡忠也臣聞此地皆西人要害之處必欲得之勝得他處前日蓋嘗有此議范純仁吕大防爭之得止今純仁去大防獨當國柄冝申前議不當含糊畏避也大防西人習知利害願兩宫責以盡忠無隠此據燾行状當考户部侍郎蘓轍為吏部侍郎後三日改翰林學士詔新除京東路提㸃刑獄周秩别與差遣秩初以都官員外郎有此命而諫官論其不當於是改命權知宿州初除四月二十四日當考言者為誰知海州王鞏知宻州知海在三月二十六日罷宻在九月二十二日知滄州朝請大夫韓正彦為少府監知鄭州承議郎邵䶵為金部郎中右正言劉安世言臣伏見去年十二月内蘇州崑山縣人户朱迎朱育等經户部論訴章惇彊以賤價買百姓抵當産業遂具論列乞正其罪自後䝉朝廷委發運司考騐虛實今年正月間本司體量奏到事状雖依違滅裂不盡本情然其大槩已見朱迎等所訴不至誣罔如惇用其子承事郎援之名投状收買官賣田共二十一户皆有按據最為要切臣以為章援不告其父私承交易則當得異財之罪若惇假託名目則自有降等之法兼朱迎等状内亦指定下状之日援在京就試則惇之矯詐又甚明白遂以合用勑律奏聞必謂便可議罪今已累月未聞施行上下畏憚一至於此按惇閒居里閈而氣燄凶暴官司嚴憚寜屈陛下之法不敢逆惇之意使惇有權得行其志則天下之弊將何如哉今體量到事迹既皆有實無可疑緩而故為留滯臣恐有與惇隂為地者更将捜摘細故㑹問往復則明堂赦恩必遂原免然則大姦何幸而平民何不幸也伏望聖慈詳此事理明勑三省早令結斷其州縣監司不受朱迎等訴状亦乞特行降黜所貴亂政䟦扈之臣奉法阿私之吏知有典刑易為制馭逺民抑屈有所伸雪又言臣伏自去年十二月後來累曽劾奏章惇劫持州縣不顧國法彊以賤價買百姓抵當田産致朱迎等四人不逺數千里赴愬省部後來䝉朝廷下發運司體量已有實状而遷延半嵗未䝉施行臣前月二十四日延和殿再具奏列伏䝉宣諭便令結斷今又踰月未覩指揮臣竊謂惇氣燄凶悖陵暴寡弱詐以男名廣置田産公然别籍殊無忌憚罪狀顯著曽非隠伏而尚書故為留滯以幸赦宥甚非所以稱陛下仁愛元元之意伏望特降睿㫖早正典刑庻幾亂法䟦扈之臣不至倖免逺民屈抑有所伸雪左諌議大夫梁燾亦言古者大臣與民爭利猶以為非諫官論事久抑不行亂是非之公傷聽納之明使惇真不知猶不為無過望賜施行以為懲勸是日詔章惇違法買田罰銅十斤田産改正差遣候服闋日取㫖其蘇州崑山縣違法給賣官并本州及本路監司不受理詞状官令發運司具職位姓名以聞候到與體量不當官蕭世京併取㫖不以赦原其後世京止坐罸銅十斤舊録載章惇買田事極不詳盖為惇諱也然於六月八日猶書蕭世京等不以赦原指揮而新録又削去不知何也今從舊録舊録又於七月二十二日載梁燾劉安世吳安詩言惇責太輕未厭公議况惇與蔡確黄履邢恕素相交結自謂社稷之臣天下之人指為四凶陛下無恤反汗之嫌自遺養虎之患冝候惇服闋特行廢置詔留候新録並依舊録按安世集亦有此章乃第七章也無恤反汗之嫌自遺養虎之患此兩句獨無之或史官以安世等詞意别加刪潤耳然所稱詔留候三字殊不了按安世等第八章云論列罰銅不當今已踰月未䝉施行第九章亦云第十章又云今已累月未䝉施行則新舊録所稱詔留候三字盖未可信也詔留候即是無施行遂不報安世等乎至八月二十二日乃有候服闋與宫觀指揮新録又全依舊録可惜太踈畧也曾布日録元符元年八月癸未差蕭世京燕若䝉為差使剰員官上問如何布因言世京元祐五年曽兩上章乞復免役法詞甚切至閤門批到實有投進月日而三省檢文字未見故未䝉推恩上云禁中煞有文字待令檢再對布又及之因言王森乞復青苖便得郎官世京因天旱連章請復役法儻可檢見因激奨亦足以勸上再三許之布又言世京元祐中體量章惇買田事云不違法遂罰銅十斤乞差遣於都堂吕大防云勾當事不了如何得差遣世京竟不自陳至今脚色有此過作廣東提舉常平滿二年役書成成於其手而蔡京以為申請措置不當送吏部人實寃之給事中趙君錫駮奏章惇罪惡不當止以贖論請加降黜不聽君錫駮奏章惇罰金事據本傳戊申賜温州刺史知蔡州向宗回詔曰日者有司備盗不謹寖長弗制滋擾於民汝以戚藩實任州寄指授機略訖使殄平厥功有聞深用嘉歎樞宻院言夏國主乾順上表奏告事宜今擬回答詔曰省所奏事具悉所有蘭州塞門兩處地土前詔指述已明無復更有論請其永樂陷殁人口縁自諜報後來經隔嵗久慮其間實有死亡或後來却有續㝷到人數今已降指揮下鄜延路經略司候將來送還到日若與元報人數不同亦令據數交割計口食與賞絹仍将葭蘆米脂浮圖安疆四寨約一日給賜所有應合立界至去處並依已降朝㫖及自來體例計㑹鄜延路經略司關牒逐路帥臣各委官隨冝相度認定守把不得更相侵越從之元年七月八日并二年三月末此年此月八日十月末當考辛亥承議郎直集賢院起居舍人王巖叟權吏部侍郎仍賜三品服朝奉郎直龍圖閣光禄卿范育兼權户部侍郎起居郎兼侍講顔復兼權中書舍人並候有正官日罷八月八日復正除中書舍人五年六月六日復以中書舍人除天章閣待制侍講國子祭酒七日卒右正言劉安世為起居舍人兼左司諫安世進對太皇太后諭曰臣寮才得富貴便多改節卿宜常如今日安世頓首此據安世奏䟽及名行録改命知樞宻院事安燾為明堂禮儀使門下侍郎孫固為儀仗使中書侍郎劉摯為鹵簿使同知樞宻院事趙瞻為橋道頓遞使趙卨言夏人近遣使詣闕謝恩續遣使賀坤成節請嚴戒邉吏勿侵犯引惹詔陜西河東經略司戒約沿邉兵将官不得容縦邉人以廵綽硬探為名生事詔今後官吏差替並即時放罷從江南東路轉運司官孔平仲之請也壬子詔自今年於逐路保甲冬教見封樁錢内河北與減一萬五千緡樁三萬五千緡河東與減五千緡樁二萬緡陜西與減一萬緡樁二萬緡如遇支使不足即将災傷年分剰錢補填今後雖有災傷事故免教人數多亦不得乞免封樁左諫議大夫梁燾右諫議大夫范祖禹等言臣等伏見安燾本蔡確章惇之黨朝廷獨未罷免中外之論固以不平今其母年髙久病燾自當謁告省侍醫藥然猶造朝視事無異平日蓋燾以次相虚位徼倖進用搢紳指目無不鄙薄大臣如此恐無以助成陛下孝治之風伏望聖慈察其有忘親貪位之心特給寛假使之侍疾梁燾自注云後數日安燾丁憂七月六日十二日當併此翌日祖禹又言臣伏見自范純仁罷免右相虚位古者三公官不必備蓋充此位者未易得人宰相代天理物繫安危治亂茍非其人則天下解體國家禍敗隨之寜且闕人亦未有害先朝宰相亦不並置陛下近用吕公著凡三年方别命相深得先王敬謹用人之意今之執政有當去而不去衆論共以為姦邪者固不可用若後進之人亦未允愜夫㧞出於衆人之中不數年至宰相若非有名徳久為天下所信則人心先已不服不能與朝廷為重如范純仁本有人望陛下採其聲名用之稍過政事不能厭服人意是以易致顛覆凡忠良之臣亦須養以嵗月待其人望稔熟然後用之則中才之人皆可使為賢相今若不止於人望未屬或更用非其人則治亂自此遂分是乃因除去大姦反成國家之患也臣竊憂之伏望陛下審詳此舉不必急遽萬一誤用悔之無及伏乞重留聖意癸丑禮部言太常寺申故事明堂享太廟雖遣官攝事其逐室所設祭噐特用親祠噐将來明堂大禮太廟差官攝事其逐室所陳祭噐及祠官罍洗之類請依此從之禮部言邈黎國般擦冷移四抹粟迷等齎于闐國和罕王并本國蕃王表章貢奉縁自來不曽入貢請比附于闐國進奉條式從之仍詔今後更有似此而不依解發條乞貢並説諭許就本處交易訖令歸本國尚書省言諸處奏案禁囚有待報未决淹繫日久者請立日限舉催督察以絶淹延之弊從之户部言店宅務修造至多其監修軍大将不許諸處抽差從之乙夘詔權户部侍郎范育户部郎中穆衍限一月㸔詳舊三司𣙜貨務已行之法冝於今者與户部參酌著為令此月七日梁燾云云十一月末又云云國子司業盛僑為祕閣校理徐王府記室參軍丙辰户部言光禄衛尉寺少府軍噐監并太常寺人吏不以新舊請給内将見錢於太府寺分數支折仍依舊行倉法從之丁巳寳文閣直學士知成都府李之純為户部侍郎龍圖閣待制知瀛州蔡京為寳文閣直學士知成都府諫官梁燾范祖禹吳安詩御史朱光庭等皆言其不可曰竊以之純謹厚豈弟詳練政事前將使指在蜀八年繼任帥事忠厚鎮静民益安悦驟以輕薄少年代之逺方之民必不被朝廷惠澤况京汚穢無恥奢縦無憚東平惡政臣等方欲論列今任之逺鎮何以表厲風俗又京在蔡確黨中最號兇健隂險利誘羣小助為虚聲心懷姦罔勇為非義至則必徼才能之名以盖前輩妄作聰明必不肯以持循安静為意也蜀民一為動揺恐别致生事為異日之憂伏望聖慈特賜指揮選老成忠良厚徳之士以綏寕逺人或優詔之純再任使逺方之民知宸衷加惠憂恤之意燾六月十八日奏此祖禹又言成都兼兩路鈐轄方面之任最為要重祖宗以來尤謹付與聞之純寛厚簡静蜀人安之冝且令終任或増秩再任今户部雖欲得人而逺方數千里休戚安危所繫亦不為輕京雖有才能而年少輕鋭非端厚之士又故事自成都府囬者執政其次猶為三司使知開封府朝廷方當分别邪正如京者在所裁抑不宜崇長今進職逺帥則資任愈隆為他日大用之漸實未允惬伏望且令依舊詔京為江淮荆浙等路發運使罷寳文閣直學士知成都府指揮之純依舊知成都府任滿再任之純及京改命在二十五日今并書按京前此未嘗知鄆恐東平字誤六年閏八月六日可考詔今後太學政録並依熈寜法選上舍生充上舍生闕選内舍生其見任人候任滿日罷已差下人别與差遣政目云罷國學政録官詔孤遺給錢米二十口以上錢二十貫米十石七口以下十貫七石五口以下七貫五石三口以下二貫一石政目十八日事今附此知陳州資政殿學士胡宗愈言本州霖雨相繼河流泛漲今年夏税請遞展限一月從之吏部侍郎范百禄進所撰詩傳補注二十巻賜詔奨之以其書送祕書省詔賜夏國主曰省所奏昨差人赴延州計㑹将永樂等人口及所還四處城寨交換寨門蘭州雨處地土實在朝廷酌中賜一裁决事具悉爾嗣守世封䖍修貢職頃屬罷兵之後繼陳復地之言累降詔音備諭朕志豈謂歴時之久尚稽聞命之行忽覽奏封深諒誠款顧改圖之議猶有披陳然事大之恭實聽裁決再惟忠順殊用歎嘉雖易地之求當一遵於前詔而酌中之請冝别示以優恩除漢蕃地土指諭已明難從換易外所有嵗賜據前降詔命合候地界了日依舊今推特恩已敇有司更不候地界了當便仰檢㑹依例施行爾其體朝廷恩信之隆遵封疆謹守之戒永思安靖用保悠長己未荆湖南路提㸃刑獄張綬言今變事寜息尚慮人户歸業未安合於𦂳要溪峒量留兵甲弩手控扼已牒逐州權置寨分屯兵甲戍守仍毎季一替官貟即本州逐月論替從之新無癸亥翰林學士蘓轍兼吏部尚書政目二十四日事權河北路轉運使直祕閣朝議大夫謝卿材今任滿日令再任十月六日兼領都水寳文閣待制蒋之竒為河北路都轉運使直祕閣以大熟給在京工役假三日御史中丞傅堯俞言臣伏見今嵗諸路蠶麥並熟處甚多其價隨而過賤風聞逐處監司将積年逋負並行催督不惟虛費鞭朴亦徒長公人貪暴乞取之弊必不能用一熟之力以了納積年之欠至使民聲愁嘆謂豐稔不如災傷盖纔有水旱則舊欠俱閣若稍獲豐登便宿逋並納欲乞朝廷指揮諸路監司日令帶納一料候秋成更令帶納庻幾疲瘵頗獲安濟貼黄竊慮過時或不及事如賜允從乞早行下乙丑知陳州胡宗愈言本州地勢卑下至秋夏之間許蔡汝鄧西京及開封諸處大雨則諸河之水並由陳州沙河蔡河同入潁河不能容受故陳州境内瀦為陂澤今沙河合入潁河處有古八丈溝一道可以開浚分決蔡河之水自為一支由潁夀界直入于淮則沙河之水雖甚洶湧不能壅遏昔有項城縣令姚闢曽建此議竊見朝廷已差府界提刑羅適計㑹京西淮南按行水利請專委羅適取姚闢并本州所陳利害㸔詳如可行即均調兩路州縣夫役應副施行詔羅適依胡宗愈所奏仍兼提舉淮南西路接連合治水利舊録於二十六日載范祖禹論京城事已入五月二十八日丙寅大理寺言本寺官吏每遇迎駕欲乞於禁圍外起居庶免衛士擁隔詔添閤門祇候一員今後於鈞容直按宋史作鈞容直原本作軍容誤今改正樂前通喝起居應地位窄狹官吏多處並凖此新本削去丁夘美人陳氏卒贈充儀命延福宫使寜國軍留後入内内侍省都都知張茂則䕶𦵏事徽宗母也知樞宻院事安燾乞罷不允詔勿受燾章奏崇儀使董正叟押賜夏國主生日禮物如京副使李玩押賜夏國主中冬時服湖北轉運司言荆南長林縣今已復為荆門軍其諸軍指揮人額并差撥屯駐人數並合如舊從之戊辰左諫議大夫梁燾言凖朝㫖差押賜大寜郡王佖生日禮物縁有書送事例恭聞祖宗差宫省親信左右之人並為非次恩澤後來頗及侍從近年多在言官大懼隳損朝廷故事寖失祖宗馭臣之意望許免行以協公議詔改差入内供奉官勾當御藥院閻安燾又言臣伏覩科舉之制以經義詞賦進士各取五分竊聞進士多從詞科十常七人或舉州無應經義者如此則五分之限固不可行臣愚欲乞聖慈特賜指揮更不以兩科分取止以兩科入試人數多寡用解額均取合格之人南省奏名依此所貴事歸乎一允協至公上副陛下樂育英材之意焉貼黄假令有十人解額却有百人入試七十人經義三十人詞賦即以七人解經義三人解詞賦如有零分則通取詞理優長之人燾此奏不得其時因七月末論數事不行且附此六月燾集附為中丞後恐誤也詔南北郊祀既差執政官充初獻已受誓戒而有故不赴聽本祭内職事官髙者通攝行事
