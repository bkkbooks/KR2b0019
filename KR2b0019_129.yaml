body:
  text: 續資治通鑑長編卷一百二十五宋李燾撰仁宗寶元二年十一月戊子朔出內庫真珠估緡錢三十萬賜三司上諭輔臣曰此無用之物既不欲捐棄不若散之民間收其直助糴邉儲亦可少紓吾民之斂也刑部郎中直集賢院王皥上唐餘録六十卷降勑奬諭壬辰詔禮部貢院自今省試舉人設簾都堂中間而施帷幕兩邉令內外不相窺見點檢試卷官及吏人非給使毋得輒至堂上其詩賦論題並以注疏所解揭示之不許上請或題義有疑當請者仍不得俯近簾前御試考校並分上中下三等初考用墨其點抹於卷後通計之若塗注脫誤四十字以上頗為不謹亦依禮部格少字數退黜之癸巳以皇子生燕宗室於太清樓讀三朝寶訓賜御詩又出寶元天人祥異書示輔臣其書蓋上所集天地辰緯雲氣雜占凡七百五十六釐三十門為十卷甲午以河東大通監𨽻并州仍命京朝官為知監兼交城縣事丁酉降寧武節度使知樞密院事盛度為尚書左丞知揚州尚書左丞參知政事程琳為光祿卿知頴州御史中丞孔道輔為給事中知鄆州刑部貟外郎天章閣待制龎籍知汝州開封府判官金部郎中李宗簡追一任官勒停司封貟外郎直集賢院同修起居注麻溫其落職監當司門貟外郎張純堂後官國子博士李僃逺處監當光祿寺丞程琰荆湖北路監當前太常博士直集賢院吕公綽前太常博士吕公弼王疇罰銅十斤奉禮郎中丁諷罰銅四斤先是權知開封府鄭戬按使院行首馮士元姦贓及私藏禁書事而士元嘗為度強取其鄰所賃官舍故樞密副使張遜第在武成坊其曽孫偕才七歲宗室女所生也貧不自給乳媪擅出劵鬻之琳隂使士元諭以偕幼宜得御寶許鬻乃售其乳媪以宗室女故入宫見章惠太后既得御寶琳即市取之及令弟琰同士元市材木籍與公綽公弼皆嘗令士元雇女口溫其坐託士元賖買鹽虛作還錢月日而純與僃亦坐託士元引致親戚為軍巡推司及府貼司疇諷並嘗以簡屬士元理逋負士元既杖脊配沙門島而宗簡輒私發公案欲營救之開封府推官王逵具以白戬遂奏移鞫御史臺獄具詔翰林學士栁植録問是日旬休上特御延和殿召宰臣等議決之初張士遜素惡琳而疾道輔不附已將并逐二人察帝有不悅琳意即謂道輔上顧程公厚今為小人所誣宜見上為辨之道輔入對言琳罪薄不足深治帝果怒以道輔朋黨大臣又事初下臺止隔戬籍入朝而不隔度及琳故特貶焉宗簡沆子疇博文子諷度子逵濮陽人也戬強敏善聽決喜出不意獨假貸細民即豪宗大姓繩治愈急府白直陶信杖箠能輕重為民間所憚戬按其罪竄流之治士元獄朝議畏其皎核公綽等既被罰言者又奏父夷簡失義方之訓夷簡時判天雄軍上恐傷夷簡意賜詔慰撫公綽公弼時丁母憂王疇父博文去年四月卒故皆稱前官戬傳以為辭連宰相吕夷簡者誤也夷簡時為鎮安節度使同平章事判天雄軍即不在中書戊戍翰林學士工部郎中知制誥栁植為右諫議大夫權御史中丞兵部郎中知制誥聶冠卿為契丹生辰使代龎籍也冠卿五世祖師道楊行密叛奏號問政先生鴻臚卿及使契丹契丹主謂曰君家先世奉道子孫固有昌者嘗觀所著蘄春集詞極清麗因自擊毬縱飲命冠卿賦詩禮遇特厚已亥上謂輔臣曰所決馮士元獄如聞頗愜中外之論張士遜對曰臺獄阿徇非特出宸斷無以肅清朋邪上曰若周之十亂可謂同心同德大抵法令必行邪正有别則朝綱舉矣詔盛度等如有章表所在毋得受庚子內殿承制米知順為禮賔副使兼權茭村等族巡檢以禦西賊有勞也米知順未詳何許人此必因賊冦保安故知順有守禦功當與盧守勤等同一事今既先賞知順及後月守勤等遷官則知順但降褒詔不更遷官實録載此事不詳當考韓琦明年奏疏云知順為元昊降虜不知事在何時亦當考琦疏附明年五月賜延州東路經戰陳蕃官茶綵辛丑許建州立學仍給田五頃壬寅右諫議大夫參知政事王鬷為工部侍郎知樞密院翰林學士刑部貟外郎知制誥宋庠為諫議大夫參知政事癸卯詔曰左右輔臣人所視效中執法朕之耳目而度乘髙勢以侵占民居琳嘗尹京邑以巧譎市第道輔又隂為之地奏請寬貰咸已正治厥罪其申告中外使知狀焉刑部貟外郎直史館同修起居注宋祁次當知制誥以兄庠在中書乃授天章閣待制同判禮院時陜西用兵調費日蹙祁上疏論三冗三費曰兵以食為本食以貨為資誠聖人所以一天下之具也以天下取之以天下用之量入為出故天子不得私焉今左藏無積年之鏹太倉無三歲之粟南方冶銅匱而不發承平如此已自雕困何哉良由取之既殫用之無度今朝廷大有三冗小有三費以困天下之財財窮用褊更欲興數十萬衆以事外國可謂無謀矣陛下誠能超然逺覽燭見根本去三冗節三費專僃西北之屯尚可曠焉髙枕無匱乏之患何謂三冗天下有定官無限貟一冗也天下廂軍不任戰而耗衣食二冗也僧道日益多而不定數三冗也三冗不去不可以為國請斷自今日僧道已受戒具者姑如舊其方著籍為徒弟子者悉還為民勿復嵗度而州縣寺觀留若干僧道定若干後毋得過此數此業一舉得耕夫織婦數十萬人一冗去矣天下廂軍不擇孱小尫弱而悉刺之才圗供役本不知兵亦且月費廪糧嵗費庫帛數口之家不能自庇於是相挺逃匿化而為盜賊者不可勝計朝廷每有夫役更籍農民以任其勞假如廂軍可令驅以就役又且别給口劵復覬賜錢廣募之無益請罷天下招廂軍其已在籍者許備役終身如此則中下之家悉入農業又得力耕者數十萬則二冗去矣國家郡縣素有定官譬以十人為額常以十二加之即遷代罪謫足以無乏今則不然一官未闕十人競逐紆朱滿路襲紫成林州縣之地不廣於前而官五倍於舊吏何得不茍進官何得不濫除請詔三班審官院內諸司流內銓明限貟以為定法其門廕流外貢舉之色實置選限稍務擇人候有闕官計貟增吏則三冗去矣何謂三費一曰道場齋醮無日不有或七日或一月或四十九日各挾主名未始暫停至於蠟蔬膏麵酒稻錢帛百司供億不可資計而主者利於欺攘故奉行崇尚峻於典法皆以祝帝夀奉先烈祈民福為名欲令臣下不得開説臣愚以為陛下上事天地宗廟次事社稷百神醴酪粢盛犧牲玉幣使有司端委而奉之嵗時而薦之足以竦明德於天極介多福於黔庶何必道場齋醮希屑屑之報哉是國家抱虛以考祥小人誣神而獲利耳宜取其一二不可罷者使略依本教以奉薰修則一費節矣二曰京師寺觀或多設徒卒或增置官司衣糧所給三倍他處帳幄謂之供養田産謂之常住不徭不役坐蠧齊民而又别飭神祠爭修塔廟皆云不費官帑自募民財此誠不逞罔上之尤者夫民藏於國國藏於民財不天來而由地出也役不使鬼而待人作也捨國取民其傷一焉請一切罷之則二費節矣三曰使相節度不𨽻藩要貪取公用以濟私家迹夫節相之建或當邉鎮或臨師屯也公用之設所以勞民而饗賔也今則不然大臣罷黜率叨恩除取生人之資力為無功之奉養坐靡邦用莫此為甚請自今地非邉要州無師屯者不得建節度已帶節度不得留近藩及京師則三費節矣臣又聞之人不率則不從身不先則不信陛下若能躬服至儉風示四方衣服醪膳無溢舊規請自乘輿始錦綵珠玉不得妄費請自後宫始然後天下嚮應民業日豐人心不搖師役可舉雖使風行電照飲馬西河蠢爾戎酋可玩之股掌中矣寧與今日誅求則用課鹽𣙜名為戚戚之計者同日語哉祁疏附見祁以二年二月權度支判官本傳載此疏於權度攴判官後或當移見二月甲辰贈右侍禁閣門祗候潘湜為登州刺史其子若愚若谷並為右班殿直若沖三班奉職若欽三班借職湜為延州東路巡檢與西賊戰并其二子俱沒故優恤之辛亥贈太子右衛率府率世豐為左領軍衛將軍仍賜進士及第世豐少喜學聚書率勵兄弟講習能為詩有聲宗室間因侍燕太清樓以善書褒贈繒帛尤慕為進士學嘗曰吾安得預科舉哉既卒其父從藹上其詩二百篇特追賜焉是月西賊冦保安軍鄜延鈐轄盧守勤等擊走之賊冦保安稽古録在十二月據范雍疏則在十一月實録於十二月初九日書盧守勤等功賞凡功賞必因奏到乃行保安被賊決在十一月不在十二月也今從范疏繫十一月末更須考米知順遷官事賊又以三萬騎圍承平寨鄜延部署許懷德時在城中率徑兵千餘人突圍破賊己而賊復成陳有出陳前據鞍慢罵者懷德引弓一發而踣賊乃解去懷德均子也賊圍承平據司馬光記聞乃十一月事又據范雍年末所奏疏亦稱十一月賊五頭項入冦承平當在其間今附年末承平所以不拔許懷德之力而范雍奏疏乃稱懷德不歷軍陳莫知何故當考按宋史許懷德傳載承平寨事與本文同環慶鈐轄髙繼隆等出兵破西賊後橋寨及破吳家外藏圗克金舍利遇家等族破後橋寨實録載於明年正月十七日蓋記其行賞耳稽古録載破寨於此年十二月聚米經在十一月據范雍疏論諸路出兵牽制則聚米經十一月當得實今從之并附賊冦保安後十二月庚申詔審刑院大理寺刑部自今毋得通賔客犯者以違制論若請求曲法之事則聽人陳告之賜自京至鄜延路馬遞及急腳鋪卒緡錢又賜鄜延路戍兵緡錢乙丑賞保安軍守禦之功鄜延鈐轄六宅使榮州防禦使盧守勤為左騏驥使寧州都監東頭供奉官閣門祇候鄭從政為內殿崇班權東路都巡檢左侍禁張建侯南安寨策應左侍禁李惟熙並為東頭供奉官東路巡檢右侍禁閣門祗候孟方為西頭供奉官保安軍北路巡檢左侍禁南安寨䇿應右班殿直趙瑜為右侍禁都巡檢司指使𣪚直狄青為右班殿直蕃官巡檢禮賔副使米知順降敕書奬諭青功最多故超四資授官青西河人也劉懷忠之與西賊戰也其妻黃賞怡率兵來援多所俘獲丙寅封賞怡永寧縣君帝嘗問參知政事宋庠以唐入閣儀戊辰庠上奏曰夫入閣乃唐隻日於紫宸殿受常參之儀也唐有大內又有大眀宫在大內之東北世謂之東內自髙宗以後天子多在大眀宫宫之正南門曰丹鳳門門內第一殿曰含元殿大朝會則御之對北第二殿曰宣政殿謂之正衙朔望大册拜則御之又對北第三殿曰紫宸殿謂之上閣亦曰內衙隻日常朝則御之凡天子坐朝必須立仗於正衙殿或乘輿止御紫宸即喚仗自宣政殿兩門入是謂東西上閣門也以本朝宫殿視之宣德門唐丹鳳門也大慶殿唐含元殿也文德殿唐宣政殿也紫宸殿唐紫宸殿也今或欲求入閣本意施於儀典即須先立仗於文德之庭如天子止御紫宸殿即喚仗自東西閣門入如此則差與舊儀合但今之諸殿比於唐制南北不相對值為殊耳故後來論議因此未明又按唐自中葉以還雙日及非時大臣奏事别開延英殿若今假日御崇政延和是也乃知唐制每遇坐朝日即為入閣而叔世離亂五朝草創大昕之制更從昜簡正衙立仗因而遂廢其後或有行者常人之所罕見乃復謂之盛禮甚不然也今相傳入閣圗者是官司記常朝之制如閣門有儀制敕雜坐圖之類何足為希闊之事哉况唐開元舊禮本無此制至開寶中諸儒增附新禮始載月朔入閣之儀又以文德殿為上閣差舛尤甚蓋當時編撰之士討求未至太宗朝儒臣張洎亦有論奏頗為精洽或朝廷他日修復正衙立仗欲下兩制使豫加商𣙜以正舊儀然議者以為今之殿閣與唐制不同難復行之己巳降侍御史王素為都官貟外郎知鄂州初中丞孔道輔與素連姻及舉素為臺官而未嘗以聞道輔既坐鞫獄阿徇貶故并素出之詔吏部流內銓自今府州府谷麟州新秦銀城連谷等縣皆注正官為縣令庚午詔審官院吏部流內銓自今當入益梓利夔廣南東西路官者若同居之親已在逐路聽權入近地辛未知廬州祠部郎中集賢校理王質坐決獄非是責監舒州靈仙觀前通判廬州比部郎中陳執方通判潭州執方已去官法不應坐上謂輔臣曰執方乃同知樞密院執中之兄今獨免則人以為用執中故私之雖當入知州可更令通判一任也壬申詔中書自今御史闕官宜如先朝舊制具兩省班簿來上朕自擇官令舉人初中丞與知雜御史例得舉臺官及孔道輔舉王素上以為比周故降是詔録故右諌議大夫范杲孫軫為郊社齋郎軫嘗以郊祀恩當得仕而與弟翺爭訟於有司既報罷而軫自陳不已上曰軫范質之後不可使為編民特録之癸酉以益梓利夔路飢罷皇子降生進奉從韓琦之請也異時有司督責賦役煩急收市上供物不以其直琦悉為輕減蠲除之逐貪殘不職吏罷冗役六百六十餘人活飢民一百九十餘萬明道中簡州勸誘納粟復糶之為錢十六餘萬悉歸常平琦曰是乃賑濟之餘非官緡也發庫盡給四等以下户孔道輔既貶鄆州始知為張士遜所賣頗憤惋行至韋城發病卒然天下皆以遺直許之乙亥祕書丞田京通判鎮戎軍著作佐郎令狐挺通判延州祕書丞夏侯觀為內園副使邠州都監著作佐郎劉質為內殿承制寧州都監並以近臣薦召試方略而特命之京鹿邑人挺山陽人也庚辰詔文武臣僚所舉使臣之有方略者並與召試其在邉及西川廣南者須代還丁亥教閲在京宣效指揮閏十二月庚寅禮部貢院言鎖廳舉人見任者自來止於鄰近州軍取解不曽立定解額昨者逐州並於舉人額外解發朝廷例皆收試遂降敕旨不得於額外解發本院看詳逐州試官多以親戚舉人送鄰州取解妨占本土孤寒舉人解額遂送轉運司别差考試每十人解三人為額今來却將鎖廳人於本州額內解發妨占本土孤寒深未便允乞送鎖廳人於轉運司考試别立一項解發詔兩制詳定翰林學士丁度等言鎖廳人今後在京於别試所在外於轉運司差官與親戚舉人同試十人解三人不及十人與二人五人已下與一人餘並依親戚發解例施行從之乙未閣門請上御宣德門宰臣親王樞密使使相自今許帶從人三人參知政事樞密副使宣徽使二人並至第三重門兩制節度使至觀察使宗室正刺史以上一人並至第二重門從之先是每御樓從臣各挾所親上門闕初無定限知開封府鄭戬言乘輿所在禁衛不嚴故下閣門裁定此制甲辰詔自今轉運使副提點刑獄若部內知州軍通判知縣兵馬部署都監監押幕職官一貟餘官二貟知州軍通判若部內官一貟犯贓至流而失於按察以至朝廷采訪民吏訴論或御史臺彈劾者方聼旨施行時以按察官所部廣而吏有一事覺多坐纍降黜故稍寬之己酉開封府推官太子中允直集賢院富弼知諫院辛亥契丹遣天德軍節度使蕭溥太僕少卿韓志德來賀正旦壬子賜陜西及麟府石三州緣邉軍士緡錢是月元昊復遣賀九言齎嫚書納旌節及以所授敕告并所得敕榜置神眀匣留圭年族而去其書略曰特命之使未還南界之兵躁動於鄜延麟府環慶涇原路九處入界又曰南兵敗走收奪旗鼓符印槍刀矛戟甚多兼殺下蕃人及軍將士不少又曰既先違誓約又别降制命誘導邉情潛謀害主諒非聖意皆公卿異議心膂妄圖有失宏規全忘大體又曰蕃漢各異國土逈殊幸非僣逆嫉妬何深况元昊為衆所推蓋循拓跋之逺裔為帝圖皇有何不可又曰鄂特伽回將到詔書乃與界首張懸敕旨不同又曰元昊與契丹聨親通使積有嵗年炎宋亦與契丹玉帛交馳儻契丹聞中朝違信示賞惑亂蕃族諒為不可又曰伏冀再覽菲言深詳微懇回賜通和之禮洊行結好之恩據夏臺事迹有元昊嫚書稱天授禮法延祚二年十二月蓋此年冬末也嫚書言邉兵九處入界實録都不詳當考是嵗天下上户部主户六百四十七萬九百九十五口千四百三十九萬九千九百五客户三百七十萬八千九百九十四口六百一十九萬五千四百二直史館蘇紳陳便宜八事一曰重爵賞先王爵以詔德祿以賞功名以定流品位以居才實未有無德而據髙爵無功而食厚祿非其人而受美名無其才而在顯位者不妄賞人非愛財也蓋賞非其人則徼幸者衆也非特如此則又敗國傷政納侮貽患上乖天氣下戾人心災異既興妖孽乃見故漢世五侯同日封而天氣赤黃及丁傅封而其變亦然楊宣以為爵土過制傷亂土氣之祥也二曰遴選擇今內外之臣序年遷改已為官濫而復有論述微效援比希進者朝臣則升監司使臣則有授橫行不問人材物望可與不可並甄録之不三數年坐致清顯如此不止則異日必以將相為賞矣三曰明薦舉今有位多援親舊或迫於權貴甚非薦賢助國為官擇人之義若要官闕人宜如祖宗故事取班簿親擇五品以上清望官各令舉一二人述才能德業陛下與執政大夫參驗以擢之試而有效則先賞舉者否則黜責之如此則人人得以自勸又選人條約太嚴舊制三人保者得遷京官今則五人舊轉運使提點刑獄率當三人今止當一人舊大兩省官嵗舉五人今才舉三人升朝官舉三人今才舉一人舊不以在任及所統屬皆得薦舉今則須在任及統屬方許論薦驅馳下僚未免有賢愚同滯之歎也四曰異章服朝廷中有執技之人與丞郎清望同佩金魚內侍班行與學士同服金帶豈朝廷待賢才加禮遇之意宜加裁定使采章有别則人品定而朝儀正矣五曰適才宜古者自黃散而下及隋之六品唐之五品皆吏部得專去留今審官院流內銓則古之吏部三班院則古之兵部不問官職之間劇才能之長短惟以資歷深淺為先後有司但主簿籍而已欲賢不肖有别不可得也太宗皇帝始用趙普議置考課院以分中書之權今審官是也其職任豈輕也哉宜擇主判官付之以事權責成選事若以為格例之設已久不可遽更或有異才髙行許别論奏如冦凖判銓薦選人錢若水等三人並遷朝官為直館其非才亦許奏殿如唐盧從願為吏部非其才實者並令罷選十不取一是也六曰擇將帥漢制邉防有警左右之臣皆將帥也唐室文臣自貟外郎郎中以上出為刺史團練防禦觀察節度等使皆是養將帥之道豈嘗限以文武比年設武舉所得人不過授以三班官使之監臨欲圖其建功立事何可得也臣僚舉換右職者必人才弓馬兼書算䇿略亦責之太備宜使有材武者居統領之任有謀畫者任邉防之寄士若素養不慮不為用七曰辨忠邪夫忠賢之嫉姦邪謂之去惡惡不去則害政而傷國姦邪之陷忠良謂之蔽明明不蔽則無以稔其慝而肆其毒矣忠邪之端惟人主深辨之自古稱帝之聖者莫如唐堯然而四凶在朝圯毁善類好賢之甚者莫如漢文然而絳灌在列不容賢臣願監此而不使譽毁之説得行愛憎之徒逞志則忠賢進而邪慝消矣八曰修備預國家承平天下無事將八十載民食宜足而不足國用宜豐而不豐甚可怪也往者明道之初蟲螟水旱幾遍天下始之以飢饉繼之以疾疫民之轉流死亡不可勝數幸而比年稍稔流亡稍復而在位未嘗留意於備預夫備預之道莫若安民而厚利富國而足食欲民之安則為之擇守宰明教化欲民之利則為之去兼并禁遊末恤其疾苦寬其徭役則民安而利矣欲國之富則必崇節儉敦質素蠲浮費欲食之足則省官吏之冗去兵釋之蠧絶奢靡之弊塞雕偽之原則國富食足矣民足於下國富於上雖有災沴不足憂也書奏帝嘉納之尋除史館修撰除修撰在閏十二月己酉今附此紳又請詔西邉將帥為入討之計且曰以十年防守之費為一嵗攻取之資不爾則防守之備不止於十年矣又曰今邉兵止備陜西恐賊出不意窺河東即麟府不可不慮宜稍移兵備之鄜延與原州鎮戎軍皆當賊衝而兵屯衆寡不均或冦原州鎮戎軍則鄜延不能應援陜西屯卒太多永興為關隴根本而戍者不及三千宜留西戍之兵壯關中形勢緩急便於調發郡縣偹盜不謹請增尉貟益弓手籍其論利害甚多此據正傳附見傳云趙元昊反紳請云云不記其日月附傳無此知延州范雍言自昊賊不臣鄜延環慶涇原三路並近賊界河南麟府亦接連延州最連要害其地闊逺而賊所入路頗多又寨柵踈逺土兵至少無宿將精卒熟諳山川形勢昨僣稱使人直來本州當時以邉備未修不欲約回及朝廷却其蕃部馳馬益慢侮不肯收接復要開置𣙜場既不得如請積懷姦謀遂招降熟户要壞緣邉籬落近於十一月中盡點其衆作五頭項每頭項八溜共四十溜欲盡收熟户於所住坐處下寨上假天威偶然殺戮得退今緣邉七百里兵相繼不絶虜劉懷忠族冦保安軍雖盡遣兵官分路以出但虜賊衆倍多未能禦敵然自有邉事以來當州常是控制不暇其環慶路邉寨甚密逺者不過四五十里近者三十里列據要害土兵得力賊又不習知彼處山川道路兼有宿將劉平趙振在彼其涇原路即鎮戎軍渭州城壁堅固屯兵亦衆復有弓箭手蕃落騎精強况髙繼嵩纍經任使其餘偏禆並是諸處選換之人兼有西蕃轄戩牽制賊衆不敢輒近河東逺在一隅地阻兵強並無事宜惟知此路官軍不多土兵又少間出衝突今東路自承平至安逺約二百里自長寧至承平百餘里自長寧至黃河一百里中間空闕並無城寨舊分三道兵馬控扼每處約三千人正軍每軍須得閣門祇候諸司使副一兩人指使班行四五人前後排布緣臨陳鬬敵事不可測緩急更須藉人今旋抽差同州都監朱吉環州都監孟方各領一將兵馬其孟方近因抗對副總管許懷德捃拾申奏雖已告朝廷權留尚慮其人懷不安之心且懷德新落軍權未嘗歷軍陳東路巡檢髙繼升又在道物故保安軍德靖寨控數路之要而鈐轄盧守勤亦在病告遂差都監黃德和往彼恐不為將士所服見全闕兵官先曽奏謂如賊入一路即令諸路舉兵以牽制之朝廷已降處分及賊奔衝之時移牒諸路惟環慶洎河東路出兵深入因得破賊後橋今聞上言者以為引惹生事乞不酬賞是欲坐觀此路被害更無首尾相救之勢萬一敗事臣雖盡死節已誤國家之寄望察不當職臣僚上言之弊更嚴下約束如諸路因牽制而獲功者即明行軍賞儻一路獲全則諸路皆得無虞仍乞早選差兵官共力禦賊實録於明年正月二十一日丙子載此疏按疏稱近十一月則是指今年事也雍必以今年奏疏明年正月二十一日乃到故移見此按延州去京二十四程明年八月十七日賊冦鎮戎軍時二十五日奏到凡九日耳知制誥葉清臣上言當今將不素蓄兵不素練財無久積小有邉警外無重兵舉西北二陲觀之若濩落大瓠外示雄狀而中間空洞了無一物脫不幸戎馬猖突腹內諸城非可以計術守也自元昊僣竊因循至於延州之冦中間一嵗矣而屯戍無術資糧不充窮年蓄兵了不足用連監牧馬未幾巳虛使蚩雖之氓無所倚而安者此臣所以孜孜憂大瓠之穿也今羌戎稍却變詐無窮豈宜乘即時之小安忘前日之大辱又將泰然自處則後日之視今猶今之視前也延州之冦當即是范雍所言五頭項者然則清臣此奏未必在今年也鄜延環慶副都部署劉平上攻守之䇿曰五代之末中國多事四方用兵惟制西戎似得長䇿於時中國未嘗遣一騎一兵逺屯塞上但任土豪為衆所伏者以其州邑就封之凡征賦所入得以贍兵由是兵精士勇將得其人而無邉陲之虞太祖廓清天下謂唐末諸侯跋扈難制削其兵柄收其賦入自節度使以下第其俸祿或四方有急則領王師行討事已兵歸宿衛將還本鎮雖為長䇿然當時大臣不能逺計亦以朔方李彛興靈武馮繼鄴徙於內地自此靈夏漸敝中國命將出守發兵就屯千里就糧逺近騷動十年之中兵民交困靈武既失守趙德明以僻守一隅且懼問罪亟馳驛奏願偹藩臣朝廷姑務息民即以靈夏兩鎮授之德眀潛治甲兵日滋邉患當時若止棄靈夏綏銀四州限山為界使德明逺遁漠北無今日之患既以山界蕃漢人户并授之而鄜延環慶涇原秦隴嵗宿兵數萬今元昊僣逆恣行殺害衆叛親離復與嘉勒斯賚相持已久結隙方深此乃天亡之時臣聞冦不可玩敵不可縱或元昊一旦為人殺戮酋豪代立與嘉勒斯賚通和約契丹為表裏則西北之邉未可測矣若以鄜延環慶涇原秦隴四路軍馬分為兩道益以蕃漢弓箭手步騎得精兵二十萬比元昊之衆三倍居多乘人心離散與嘉勒斯賚立敵之時緣邉州軍轉徙糧草二百餘里不出一月可坐致山界洪宥等州招集土豪授以職名給衣祿金帛自防禦使以下刺史以上第封之以土人補將校勇者貪於祿富者安於家不期月而人心自定或授嘉勒斯賚以靈武軍節度使西平王使逼元昊河外族帳復出鄜延石州蕃漢步騎收河西部族以厚賞招其酋帥其衆離二則以大軍進討以所得城邑而封之元昊不過竄身河外窮冦爾今倚山界洪宥等州蕃部為肘腋以其徑勇而善戰鬬若失之是斷其左右臂靈夏綏銀不産五榖蕃部馳騁不習山界道路每嵗供給資糧以贍之若收復洪宥以山界慿髙據險下瞰沙漠各列堡障量以戍兵鎮守此天險也彼靈夏綏銀千里黃沙本非華土往年調發逺戍老師費糧官私疲敝以致小醜昌熾此謀之不臧也或朝廷貸元昊之罪更亦含容宿兵轉多經費尤甚恐北敵謂朝廷養兵百萬不能制一小戎有輕中國之心然亦須議守禦之長計或元昊潛與契丹結為聲援以張其勢則安能減西兵以應河北譬如一身二疾不可並治必輕者為先重者為後也請召夏竦范雍與兩府大臣議定攻守之䇿令邉臣遵守本傳云平奏此疏未報而元昊盛兵攻保安軍由土門路入冦平自慶州往援延州兵敗被執平被執乃明年正月二十三日則此疏必是年冬末所奏也慶州去京二十七程初夏竦請增置土兵易戍東歸令既下知河中府龍圖閣直學士楊偕言西兵比繼遷時十增七八縣官困於供億今州復益一二千人則嵗費緡錢又增百餘萬國用民力恐繇此屈若訓習士卒使之精鋭選任將帥求之方略自然以寡擊衆以一當百又竦云土兵募足量加訓練可代東兵此徒虛語耳自德明納欵以來東兵猶不可代况今日乎朝廷下竦議竦奏陜西防秋之弊無甚東兵一則不慣登陟二則不耐寒暑三則飲食難充驕懦相習四則廪給至厚倍費錢帛今募土兵一則徑悍便習各護鄉土人自為戰二則識山川道路堪耐飢寒三則代東兵歸衛京師四則嵗省芻糧巨萬五則今嵗霜早收聚小民免至春飢起而為盜六則增數十指揮精兵讋伏賊氣乃國家萬世之利臣嘗奏云慮有不忠小人以謀非出已或為人所使曲要破壞果有楊偕上書熒惑聖聼且偕云以寡擊衆以一當百以臣所見此乃虛言古者名將王翦南取荆楚須六十萬人韓信北舉燕趙亦請益兵三萬惟光武昆陽之戰乘纍捷之後前史曽云無不一當百乃一時之言非持久之事若偕能之乞命以代臣盡減並邉兵馬萬人留百百人留十果以此數平凶蕩冦即乞不次旌賞如其不能乃是挾私或懷希望亦乞嚴譴以戒讒慝詔以竦章示偕偕復奏云臣之所陳蓋以增兵習既不精徒費國用是虜未平而中原困矣竦乃比臣為不忠小人及為人所使此其用意非獨欲中傷臣亦欲傾朝廷大臣也且竦引王翦事為解夫秦楚敵國也楚多勇士故翦有此言今元昊一小賊爾豈與本朝為敵國哉自古將帥深入邊廷未有用六十萬人者霍去病與輕勇騎八百直棄大將軍數百里赴利斬捕首級過當後又將萬騎踰烏盩討遫濮涉狐奴歷五王國過焉支山千有餘里合兵鏖臯蘭下殺折蘭王盧侯王執昆邪王子收休屠祭天金人趙充國亦以萬騎破先零李靖以驍騎三千破突厥又以精騎一萬至隂山斬首千餘級俘男女十餘萬擒頡利以獻此數將之兵皆不過萬人其餘深入蕃境或至西域諸國用少擊衆不可勝數今竦在涇原守其城壘據其險阻來則禦之去則釋之不聞出師討伐何用兵衆蓋竦意戰或敗衄欲以兵少為辭爾又竦言土兵各護鄉土此乃淺近之見自古兵有九地士卒近家謂之𣪚地言其昜離𣪚也且以近事言之閣門祗候王文恩入敵界為敵兵所敗土兵皆竄走惟東兵近二百人拒捍射殺敵兵甚衆以此知兵之強弱不繫東西將有謀則兵雖寡必精而難陷將非才則兵雖衆必驕而易敗今邉郡參用東兵土兵正得其宜若盡罷東兵亦非計也古人曰非隴西之民有勇怯乃將吏之制巧拙異也有必勝之將無必勝之民世嘗謂河北兵勇臣以為不然昔袁紹曹操戰於官渡沮授謂紹曰北兵雖衆而徑果不及南軍紹不聼果敗今江浙兵最稱懦弱然昔項羽領江東子弟八千諸侯不敢仰視是知兵不繫土地繫於將帥訓習節制撫養激勵之如何爾今防邉東兵人月受米七斗五升土兵二石五斗而竦乃言東兵廪給至厚此又不知之甚也竦又言土兵募足量加訓練以代東兵且土兵數萬須募足訓練雖三二嵗未得其用兵精用之猶恐奔北豈有量加訓練而能取勝哉竦議遂屈或移見明年二月丙申偕自河中徙陜時
