body:
  text: 續資治通鑑長編巻八十八宋李燾撰真宗大中祥符九年九月壬寅朔曺瑋言縁邉熟戸近為嘉勒斯賚所誘又埒克遵輩許以名職若無覊縻或慮脅去望給以告身從之癸卯雄覇州言界河汎溢詔本州發卒䕶之甲辰兵部尚書參知政事丁謂罷為平江節度使謂上章請外即授本鎮旄鉞以寵其行尋命謂知昇州謂請歸拜墓許之謂忽請外任當有説而實録正史皆不載疑此未得其實也内殿承制閤門祗候李繼元表述其祖保大定難節度使朔方郡王拓㧞思恭仕唐剪滅黄巢賜姓父克文率族歸闕與李繼遷本五從兄弟名同上字心實恥之願改名守元上嘉其志乙巳擢守元為供備庫副使詔如聞廣南東西路物價稍貴宜令轉運使提㸃刑獄官分路撫䘏發官廩減價賑糶獄繫多處促其裁處或有冦盜即時擒捕無縱驚擾詔民負息錢者無得逼取其莊土牛畜以償丙午以翰林學士陳彭年為刑部侍郎王曽為左諫議大夫權御史中丞張知白為給事中並參知政事樞宻直學士任中正為工部侍郎樞宻副使曽知白彭年等與王旦同在中書嘗乘間謂旦曰曽等㧞擢至此公之力也願有所裨補旦曰願聞之曽曰每見奏事其間亦有不經上覽公但批㫖行下恐人言之以為不可旦遜謝而已一日奏對旦退曽等俱留上愕曰何事不與王旦同白曽等乃以前説聞于上上曰所行公否皆曰公上曰王旦事朕多歴年所朕察之無毫髪私自東封後朕諭令小事一面專行卿等當謹奉之退而謝於旦曰上之委遇非曽等所知也旦曰向䝉諭及不可自言先得上㫖今後更頼諸公規益此據王旦遺事録附見右諫議大夫凌策自成都代還上将擢任之㑹策已病嘗謂王旦曰策有才用治益部敏而能斷旦曰策性質淳和臨莅彊濟上曰然於是命為給事中權御史中丞丁未曺瑋言總噶爾嘉勒斯賚蕃部馬巴咱爾岳居戩等率馬銜山蘭州康古氊毛山滔河河州兵三萬餘人入冦至伏羌寨三都谷即領軍擊敗之逐北二十餘里斬首千餘級生擒七人獲馬牛雜畜衣服器仗三萬三千計馬巴咱爾等遁去官軍被傷者百六十人陣沒者六七十人其立功将校使臣凡百三十九人望賜酬奨詔賜瑋及駐泊鈐轄髙繼忠都監王懐信錦袍金帶器幣立功者第遷一資仍賜金帛陣沒者䘏其家先是翰林學士李廸召對龍圗閣命草詔書徐謂廸曰曺瑋在秦州屢請益兵未及遣遽辭州事邉将誰可代瑋者對曰瑋知嘉勒斯賚欲入冦頗窺關中故請益兵為備非怯也且瑋有謀諸将皆非其比何可代陛下重發兵豈非将上玉皇聖號惡兵出宜秋門耶今關右兵多可㑹其羡益發赴瑋因問闗右兵幾何對曰臣向在陜西以方寸小冊書兵糧數備調發今猶置佩囊中上令自探取目内侍取紙筆具䟽某處當留兵若干餘迷赴寨下上顧曰真所謂頗牧在禁中未幾嘉勒斯賚果犯邉秦州方出兵復召問曰瑋戰克乎對曰必克及瑋㨗書至上謂廸曰卿何料之審也廸曰嘉勒斯賚大舉入冦使諜者聲言以某日下秦州㑹食以激怒瑋瑋勒兵不動坐待其至是則以逸待勞臣用此知其决勝也司馬光記此事多差誤今不取並依本傳涇原路駐泊都監周文質請令知鎮戎軍李餘懿以所部兵赴籠竿城駐泊防䕶儀渭等州納質熟戸詔文質與曺瑋及餘懿協議而行之以渭州吹莽城帳族都首領張碩噶為順州刺史大首領雅克沁等五人並為本族軍主秦州永寜小洛門威逺寨大首領四十七人並補軍主加檢校官階勲皆奨其内附也碩噶以兵助破裕木扎卜沁故命加等初張佶置四門寨侵羗地羌人多叛去曺瑋招出之令入馬贖罪還故地者至數千人每送馬六十匹給綵一端或訴其薄瑋叱去曰聽爾贖罪尚希利耶上以瑋撫捍得宜特詔嘉奨實録於三月初即載此事且云瑋破裕木扎卜沁戮尚揚丹二虜皆埒克遵鄉𨗳由是前拒王師者皆伏匿瑋誘召之按戮尚揚丹則在三月破裕木扎卜沁乃在九月實録并言之于三月初誤甚矣今削去此等語但取瑋本𫝊文附見張碩噶為刺史後命輔臣分祈天地廟社神祠宫觀佛寺旱故也先是中書請以工部郎中知制誥盛度為右諫議大夫權知開封府上曰可更問王旦旦時屬疾在吿中書具聖語就問之旦曰度必不樂此任既而度果詣中書自言幸以文字進不願處繁劇中書并以聞上曰王旦銓量才品極當必使人各得其所此豈可不問也於是樂黄目以兵部員外郎知制誥兼㑹靈觀判官屬辭淹緩朝議不以為稱職乃授黄目右諫議大夫權知開封府改命度為㑹靈觀判官知制誥如故黄目初召試上以黄目久任外官止試制誥二篇入西閣不一月遂罷戊申詔自今參知政事樞宻副使宣徽使立位並以先後為次侍御史李行簡使陜西還言闗外蝗傷民田登實者十之七虢州言飛蝗越境秋稼豐茂己酉命樞宻直學士工部侍郎薛映為契丹國主生辰使東染院使劉承宗副之夀春郡王友戸部郎中直昭文館張士遜為正旦使供備庫使王承徳副之映士遜始至上京自中京正北八十里至臨都館又四十里至官窑館又七十里至松山館又七十里至崇信館又九十里至廣寜館又五十里至咸寜館又三十里度潢水石橋旁有饒州盖唐朝嘗於契丹置饒樂州也今渤海人居之又五十里至保和館度黒河七十里至宣化館又五十里至長泰館西十里許有佛寺民舍云即祖州亦有祖山山中有按巴堅廟所服鞾尚在長四五尺許又四十里至上京臨潢府自過崇信館即契丹舊境盖其南皆奚地也入西門門曰金徳内有臨潢館子城東門曰順陽入門北行至景福門又至承天門内有昭徳宣政二殿皆東向其氊廬亦皆東向臨潢西北二百餘里號凉淀在漫頭山南避暑之處多豐草掘丈餘即堅氷云劉承宗知信子王承徳審𤦺子以太子右贊善大夫髙志寜為供備庫副使知忻州賜紫袍銀帶志寜時獻封事上曰朕聞其知兵而未嘗言故命換秩任以邉寄曺瑋言總噶爾昨遣馬巴咱爾率兵到大小洛門脅誘熟戸尋呼集令納質于永寜寨有隆博圖沙瑪二族不至臣在城假牒請髙繼忠王懐信領兵招換續得繼忠等報二族合衆拒戰破馬巴咱爾斬首二百餘級晚度渭河水漲失道為蕃衆所襲溺死者二十五人傷死者百人庚戍以不雨罷重陽宴利州言水漂棧閣萬二千八百間賜監修使臣役卒緡錢涇原路走馬承受麥永慶言嘉勒斯賚率蕃族人馬至青雞李子篳篥川駐泊都監周文質王應昌領兵戍瓦亭寨防遏之賊尋夜遁去賊夜遁據應昌本傳癸丑并州言秋稼豐稔蝗不為害甲寅上作詩賜新授參知政事陳彭年令諸路轉運使督民焚捕蝗蝻無使滋育李士衡等言河北南郊賞軍紬絹綿承前並自京運送今本部所積頗多望許充賞給詔天雄軍相衞貝博等州物帛依舊輸内藏庫自餘從之時以愆亢有龜山僧智悟請就開寳寺福聖塔斷左手祈雨是日雨降自秋不雨上憂形于色減膳徹樂徧走群望及是霑霈中外忻慶分遣官致謝于所祈處上作甘雨應祈詩近臣畢和丁巳徙兩浙轉運副使都官員外郎楊塤知歙州塤庭璋子在職不能清謹故也又令中書戒諭之詔諸州蝗旱今始得雨方在勸稼所宜省事常制務假其更延一月八年以前婚田未得受理俟豐稔如故凡諸營造悉罷之曺克明等言撫水蠻人雖已伏罪其擄鈔人口器械悉未歸納請益兵討之即詔克明等曰昨奏用澄海軍及募丁壯可以平賊又俞獻可言蠻人去邉止二三日程發軍掩襲速可蕩定朝議慮其輕敵續遣禁軍濟之且興舉甲兵尤當謹宻風聞汝等期以此月深入又令九州廵檢開路俟蠻人出即留之騰説如此彼必為備動關利害無失機宜茍道路艱險難於進討但攝其酋領索所掠生口因而撫之亦汝之功矣時克明與楊守珍領軍入環州樟嶺路馬玉與内殿崇班王文慶趨宜州西路王文慶據撫水蠻𫝊則與玊並為安撫都監克明𫝊亦云然不知何時除授故但舉其官當考又令宜桂都廵檢程化鵬取樟嶺西古牢隘路㑹合化鵬遇蠻於上房兩水口擊破之文慶玉至如門團為蠻所扼不能進克明守珍乃過横溪思徳寨召山獠嚮𨗳開路進師蠻依篁竹間時出戰鬭輙敗走旬餘上黄泥嶺杉木隘路溪谷險邃蠻據要害以拒官軍至午大潰其黨遂過覇苑抵帚洞乃入中房前村克明等頓兵下寨中夕羣蠻大譁譟擊鉦皷攻寨甚急出兵擊之傷殺頗衆因縱火焚其廬室積聚自此恐懼竄入山谷又縁龍江南岸而東至昏暮過石峽隘險士不並行蠻復連弩北岸克明遣猛士歩與鬭至即退走寨于下房博賀村克明設伏寨外其夜蠻衆復大集遇伏發與寨兵合擊追斬殆盡乘勝捜山悉得馬牛士卒克明等知其窮蹙乃曉諭恩信許以改過於是酋帥䝉承貴等面縛詣軍自首克明厚加犒宴且數責之皆俯伏謝罪及聞詔㫖赦令勿殺莫不泣下北望稱萬嵗悉還所掠漢口資畜乃㰱猫血立誓自言奴山摧倒龍江西流不敢復叛勒銘奴山後二日遇文慶及玉于如門寨遂還軍冝州蠻人納器甲凡五千數願遷漢地者七百餘口詔分置廣西及荆湖州軍賦以官田獻可等又言殿直䝉肚知歸化州州與撫水相接數遣其子文寳及妻族甘堂偵軍事又其子格與官軍鬭敵悉部送赴闕有蒙隻者亦肚之子先嘗告賊署為昭州押牙並黥配登萊州克明入撫水州不得其的月日據克明正𫝊云是冬按詔書云九月深入又克明𫝊云月餘乃至撫水州約其時盖秋末舉兵冬初平賊也今附見詔書後詔書以丁巳降丁巳九月十六日也徙配蒙肚父子實録在十一月癸卯今亦附見戊午申禁諸路貢瑞物時遼州獻白荆門軍獻綠毛龜故也己未詔諸州縣七月已後訴災傷者准格例不許今嵗蝗旱特聽受其牒訴大常少卿李應機言廣南勾當市舶司使臣自今望委三司使副判官或本路轉運使奏㢘幹者充選從之博州蝗旱民有訴而州縣抑輸常賦運司不為之理庚申詔遣官按視即蠲之上謂輔臣曰平定軍等處運糧採木始勞百姓後役軍士今山路漸逺多致亡逸大率臨事罕能酌中以愛民為心者不恤士卒以士卒為任者罔念蒸庶此實蠧政之本也河東安撫司言管内粟豆㪷直十九錢壬戌卭部川山前後百蠻都鬼王新都王黎吠遣歸徳将軍趙勿婆等四十三人來貢方物㑹要及本𫝊並不載此當考癸亥詔三司使副自今同上殿奏事判官有大事亦許升殿舉舊制也乙丑知并州周起言嵐石州皆近邉望令安撫司管勾從之丁卯詔如聞杭州葺江岸卒執役水中苦足疾而死者甚衆宜令知州馬亮拯療之戊辰詔外任京朝官滿三年當考課者聽附驛上状先是羣官代還京師而本官秩滿者乃預考課其移授有累年不遷者故降是詔以宫觀成權禁公私采木石令京東西陜西江淮南兩浙荆湖等路曽經採木石處遣長吏及佐官建道場設醮以申報謝或七日或三日青州言飛蝗投海死海水所激積於岸側僅百里己巳詔聞益州頻雨榖貴令發官廪糶濟之所修玉局觀上清宫悉罷詔玉清昭應宫景靈宫㑹靈觀移牒並本使署檢副使已下署銜發遣詔災傷州軍有以私廪振貧民者二千石與攝助教三千石與大郡助教五千石至八千石第授本州文學司馬長史别駕河北安撫司言縁邉官地所種榆栁望令逐處官籍其數以時檢校從之庚午内出北面榆柳圗示輔臣數踰三百萬上曰此可代鹿角也雄州李允則頗用心於此朕嘗詢其累任勞課書歴否對曰設官本要莅事但得竭力何得更謀課最此言亦可嘉也詔廣南東西荆湖南路選兵千人合澄海軍四百人署曰忠敢分三指揮戍宜桂象州以備蠻冦詔秦州選軍士堪充床子弩手二百人立為定功指揮從曺瑋之請也又言當州諸寨日收打撲錢寨主監押等雖以公用為名多輙入已望自今官籍其數以備犒設從之是嵗六月京畿京東西河北路蝗蝻繼生彌覆郊野食民田殆盡入公私廬舍七月過京師羣飛蔽空延至江淮趨河東及霜寒始盡飛蝗之過京城也上方坐便殿閣中御膳左右以告上起臨軒仰視則蝗勢連雲障日莫見其際上黙然還坐意甚不懌乃命撤膳自是聖體遂不康真宗屬疾諸書多言但不得其時此據王曽筆録當得其實也今附見九月末冬十月壬申朔詔以來年正月二日詣景靈宫奉上聖祖徽號禮儀院言正月天書降用上元日朝拜玉清昭應宫十月聖祖降請以下元日朝拜景靈宫著為定式大名府民伐登聞皷訴秋旱且言本部吏不納其辭詔遣官按視蠲其賦丙子以崇儀使賈宗領平州刺史既而宗上言北界平州常有書牒往來名稱非便遂改領髙州初王中正授左武衞将軍致仕其後遷左武衞大将軍領髙州刺史又改領汀州又遷官神武大将軍領康州團練使每國家舉大禮及有營繕中正必逹靈命以藥金銀為獻前後累巨萬數於是病卒贈鎮海節度使塑像景靈宫命入内押班周懐政䕶䘮𦵏事官給仍特封其妻施氏為吳興郡夫人諸子皆任殿直中正初得神術在貧困中權豪以威脅利誘終不泄露及遭時被寵祿賜甚厚黄冶所化惟振施貧窘崇奉道釋而已上為製靈遇贊述其始終詔京東西河北河東陜西淮南廵檢使臣縣尉自今獲賊如贓仗靈驗事實顯白而拒抗不即承引及隠蔽徒伴者許量行栲訊數勿過二十無得因縁傷平民及容賊妄指讎隙重成煩擾趙徳明遣牙校劉仁朂貢馬二十匹因上言伏以蕃陲部落戎冦雜居刼掠是常逋亡不一臣自景徳中進納誓表朝廷亦降詔書應兩地逃民縁邉雜掠不令停舍皆俾交還自兹謹守翰垣頗成倫理自向敏中歸闕張崇貴云亡後來邉臣罕守舊制天庭遐逺徼塞阻修各務邀功不虞生事遂至綏延等界涇原以來擅舉甲兵入臣境土其有叛亡部族刼掠生財去者百千返無十數臣之邉吏亦務蔽藏俱失奏論漸乖盟約臣今欲索所部應有南界背來蕃族人戸乞朝廷差到使臣就界上交付所有臣本道亦自進納誓表後走投南界蕃戸望下逐處發遣歸回未賜俞允即望敦諭邉臣悉遵詔約肅静往來之姦冦止絶南北之逋逃俾臣得以内守國蕃外清戎落豈敢違盟負約有始無終虛享爵封取誚天下但恐朝廷不委兹事詔下未察本心須至剖陳上干聽覽詔答卿世濟勲庸任隆屏翰翊忠規而奉上正師律以守方布露懇誠條成章疏載加閱覽備認傾輸且國家奄宅中區統臨四海咸推覆育豈限邇遐凡命将帥之臣唯存禦備之戒所有文字來往辭説異同部族貪殘展轉讎報掠過生口彼此交還其如不見端倪互相誣執或因縁懐竊増飾邀求朝廷固不細知邉壘亦為常事及詳來奏深究弊源難悉推窮常申約束已令鄜延涇原環慶麟府等路部署鈐轄司今後約勒蕃部不得輙相刼奪擅興甲兵凡於交争須盡公辦理其有廣占阡陌隠庇逃亡畫時勘窮押送所管卿本道亦仰嚴戒部下不得更有藏匿各遵紀律共守封疆嘉歎之懐不忘寤寐自徳明納欵凡有表奏並令延州承受入遞其使者不復詣闕其後向敏中言事有當詣闕者請令延州伴送及仁朂至延州以其所奏異於他日留仁朂具以聞詔特許赴闕戊寅詔京東淮南蝗旱所傷田據遣官按定合放數外所納税物三分以下者並與倚閣四分已上者更放一分己卯王欽若表上翊聖保徳真君𫝊三巻上製序壬午詔戸部尚書馮拯等五十人各舉殿直以上有武幹者一人俄又詔須兩任廵檢監押各二年半者乃得行其後兩任五考者亦聽之乙酉中書門下言凖御札來年躬上六室冊寳復行薦饗慮成煩縟望依舊典先令有司攝事然後躬行薦饗不許自是三請乃許之是日召輔臣至龍圗閣出聖祖篇翰藥金銀像什器錢寳花樹等物及降臨内記真紀示之丙戌謁景靈宫免利州官莊經水租十之五庚寅以引進使英州團練使知秦州曺瑋為客省使領康州防禦使崇儀使秦州駐泊鈐轄髙繼忠領髙州刺史供備庫副使駐泊都監王懐信為西京作坊副使職任如故渤海都虞候兼御前忠佐馬軍都軍頭李恕為馬歩軍副都頭領奨州刺史依前都虞候自餘将士並賜緡錢賞其擊敗總噶爾也前秦州司馬張從政黥面配梅州本城遇赦不得還先是曺瑋言久令從政和斷蕃部反與部落協比以邀姑息盖本性狡妄専事間諜遂詔配漳州衙前瑋後言慮異時亡逸過闗或投北界望刺配逺地故投之嶺表壬辰以金部郎中李虛已為兵部郎中侍御史李行簡為兵部員外郎並充龍圗閣待制大理評事崇文院檢討國子監直講馮元為太子中允直龍圗閣並賜金紫上作詩二章分賜之直龍圗閣自元始序位在本官之首仍預内殿起居上因言行簡勤學篤行臺中劾事皆先委主簿獄情具始自引問人以為得體臺官以月給茶錢不足欲表増其數行簡獨不署字人多稱之初祠部員外郎吕夷簡提㸃兩浙路刑獄時京師大建宫觀伐林木於南方有司責期㑹峻急工徒至有死者則以亡命收繫其妻子夷簡疏請緩役又言盛冬挽運艱難宜須河流漸通以兵卒番送及代歸上謂曰觀卿所奏有為國愛民之心矣乃擢刑部員外郎侍御史知雜事賜緋嵗蝗旱夷簡請責躬修政嚴飭輔相思所以共順天意及奏彈李溥專利罔上冦凖判永興黥有罪者徙湖南道由京師上凖變事夷簡曰凖治下急是欲中傷凖爾宜勿問益徙之逺方上從之夷簡數事必不同時也今附見當考先是丁謂力庇李溥主行新法言不便者雖衆謂持之益堅及謂罷政羣議復起上謂王旦等曰茶鹽之利要使國用贍足民心和悦卿等宜熟思之旦等曰此屬邦計欲選官與三司再行定奪臣等參詳可否奏裁上曰卿等宜即具詔明述䘏民之意丁酉下詔曰朕思與蒸黔共登富夀山澤之禁雖有舊章措置之宜慮傷厚斂将期惠物無憚從寛専命朝臣僉謀邦計使共詳於通制庶俯洽於羣心宜差翰林學士李廸權御史中丞凌策知雜御史吕夷簡與三司同共定奪務要茶園鹽亭戸不至辛苦客旅便於興販百姓得好茶鹽食用仍送中書門下參詳并令𣙜貨務告示客旅應入中筭射茶鹽等一依常例更不别生名目致有疑誤虧損盖欲濟人固非言利商旅等各安乃業以竚於樂成有司等無棄予言免彰於掊克㑹要繫此事于十五日丁酉今從實録丁謂罷政乃命李廸等此據本志是月知秦州曺瑋等言本州先管保毅六指揮共三千人後放四指揮歸農縁皆土人諳識蕃情便習射藝况今逐戸姓名并本管人員見在欲乞即勾㸃教閲凖備防扼樞宻院言景徳二年以秦州保毅義軍三千人自來分番邉寨守把甚有貧困不諳練之人費耗家産祿廩遂令選留少壮有家産者千人外餘並放歸農其後知秦州王承衎楊懐忠等累乞並放所留千人詔樞宻院以此諭瑋等令看詳具奏瑋尋選得三百七十四人詔名曰建威詔召建威實録在明年五月今并書之十一月甲辰三司言諸州欠商賈飛錢欲罷來年官市繒絹償之詔發内藏錢二十萬緡以給其費乙巳黜天武右廂都指揮使興州團練使鹿信為陳州馬歩軍都指揮使領郡如故先是京城北民舍火信領兵救之部卒毋謙等五人盜民家白金五百兩命斬謙等仍先斷手足信以所部不肅故及於責都虞候而下咸决杖配江淮本城上封者言河北河東陜西諸路廂軍皆無征役詔諸州各料簡五百人教習武藝當升為禁軍丁未曺瑋言三陽定西伏羌静戎冶坊三門和爾揚等七寨熟戸蕃部都首領已下凡一百四十六人有功乞賜告身詔二人授都軍主四十一人授軍主五十七人授指揮使餘悉補蕃官戊申大名府澶相州民伐登聞皷訴霜旱宰臣請令轉運使體量上曰比者轉運使固言無災傷故州縣不為蠲減雖慮支計不充然期廷矜䘏之意不可稽也即命常參官分往按視而蠲復焉河西節度使知許州石普上言九月下旬日食者三又言商賈自秦州來言嘉勒斯賚欲隂報曺瑋請以臣嘗所獻陣圗付瑋可使瑋必勝先是上方崇符瑞而普請罷天下醮設嵗可省緡錢七十餘萬以贍國用遂忤上意於是上益怪普言踰分而樞宻使王欽若因言普欲以邉事動朝廷上怒欲遣使就劾宰相王旦請先召還命知雜御史吕夷簡於京城南置院推鞫入内押班周懐政監之獄具集官參驗九月下旬日不食普坐私藏天文罪應死而官當議乃下百官尚書右丞趙安仁等議處死詔除名配賀州遣使縶送流所上謂輔臣曰普出㣲賤性輕躁干求不已既懵文藝而假手撰述以揣摩時事朕以先朝故每容忍之而普言益肆録其㣲効俾貸極典聞普在流所思㓜子輙泣下流人有例擕家否王旦等曰律無禁止之文詔許挈族以行才至賀州授太子左清道率府副率房州安置增房州屯兵百人守䕶之熊克九朝通略移杭州安置普倜儻有膽略凡預討伐聞敵所在即馳赴兩平蜀盜大小數十百戰摧鋒與賊角衆服其勇頗通兵書隂陽六甲星歴推歩之術太宗嘗曰普性剛驁與諸将少合然藉其善戰每厚遇之嘗令善工製金帯時普帯御器械方侍立輙進曰願以賜臣太宗即予之及普以罪廢每太宗忌日必盡室詣佛寺齋薦嵗以為常壬子以客省使康州防禦使知秦州曺瑋為秦州都部署依前兼涇原儀渭州鎮戎軍縁邉安撫使以禮部郎中李及為太常少卿知秦州時瑋數上章求觧州事上問王旦誰當代瑋者旦薦及可任上即命之衆議皆謂及雖謹厚有操行非守邉才不足以繼瑋秘書監楊億以衆言告旦旦不答及至秦州州之将吏心亦輕之㑹有屯駐禁軍白晝掣婦人銀釵於市中吏執以聞及方坐觀書召之使前略加詰問其人服罪及不復下吏亟命斬之復觀書如故将吏皆驚服不日聲譽逹京師億聞之復見旦具道其事曰鄉者公初用及外廷之議皆恐不勝其任今及材器如此信乎公知人之明也旦笑曰外廷之議何其易得也夫以禁軍戍邉白晝為盜市中固當斬也烏足以為異政乎旦之用及者其意非在此也夫以曺瑋知秦州羌戎讋服邉境之事瑋處之已盡其宜矣使他人往必矜其聰明多所變置敗壞瑋之成績旦所以用及者但以及重厚必能謹守瑋之規模而已億由是益服旦之識度此事據司馬光記聞然光謂瑋在秦州七年及以樞宻直學士代之則誤及代瑋知州事耳瑋總兵馬如故且瑋去年九月方自渭徙秦其在秦方一周嵗實未久也及為宻學乃天禧四年正月今但為太常少卿瑋雖總兵馬而及知州事禁軍白晝盜民物守臣固可斬不必為主将也光又云及為主将恐亦誤盖誤以及即代瑋總兵馬者故云爾今略刪改使不相牴牾更須考之及在秦州不知凡幾年當考癸丑詔以果州水災放今年秋税十之三濟州言任城縣梁山泊生藕根蒲穗民掘搗為麵頗濟乏餒乙卯詔改來年元曰天禧癸亥召近臣觀書龍圗閣秘書監楊億知雜御史吕夷簡預焉上作詩五章分賜宰輔宗室兩制諸帥待制等命儒臣即席皆賦丙寅契丹遣使右千牛衞上将軍耶律延寜副使崇祿卿張岐來賀承天節丁卯吏部銓言前興化縣令胡辟陛見之際衷表以獻請付御史臺劾其罪詔自今選人凡有表疏文章許銓司收受為進詔宜融環鎮寜懐逺等州軍壮丁從討撫水蠻者委曺克明徧加撫諭有顯効者賞之禁廣南西路白蠟王欽若嘗自言過圃田夜起視天中赤文成紫㣲字後使蜀至褒城道中遇異人告以他日位至宰相既去視其字則唐司徒裴度也及貴遂好神僊之事常用道家科儀建壇場以禮神朱書紫㣲二字陳於壇上戊辰欽若言度墳在鄭州祠宇毁壊欲自以家財完葺詔可仍録度孫垣為鄭州助教欽若又請以新廟編入祀典從之仍作文著其事凡天書及諸祠祭皆欽若發之雖以濟其邪佞亦其素所蓄積者然也明年六月癸酉欽若始上表請以新祠編入祠典今并書王皥百一編云楊文公億才俊明辨時共推服王欽若好為詭誕常自言生于黄鶴樓又自謂裴度後身文公特辨折之曰非也若云臯䕫稷卨之後身吾不敢證若以為裴度後身吾謂必不然夫釋氏以為人之轉化如寤寐如反掌耳裴度相唐時浙西奏有聖水出人飲之愈疾逺近奔走求飲者無筭即批其状委觀察使填塞禁止其妖遂絶今冀公興造祥源觀特為倡導此前後身之相背足驗其矯耳搢紳𫝊快以為談助焉此可刪附詔知秦州曺瑋於内殿承㫖已上至諸司使内舉兩人堪充鎮戎軍知軍者宻以名聞十二月壬申承天節羣臣上夀賜㑹用蔬食有司備仗衞道門威儀鈞容樂導聖製玉清昭應宫頌赴宫詔臣僚經南郊承天節奏䕃骨肉止一次陳乞無得重疊㑹要此月事今附見甲戍詔利州民田為水壊者免今年秋税十之三丙子詔川峽代還軍馬遇江水泛漲閣道阻隔之處口糧芻粟勿停給辛巳召輔臣至崇徳殿觀新製真聖寳冊衮服仙衣等又至崇政殿觀玊皇法從道具物刑部員外郎王文震自棣州召還命知梓州或言其資望輕者上曰東川大藩當擇任宿徳遂改命文震提㸃福建路刑獄玉清昭應宫舊儀設上板位於丹墀亞獻三獻板位於龍墀上以方上玉皇聖號板位乃居寳冊前未盡嚴恭之意壬午詔徙丹墀板位於龍墀龍墀板位於沙墀俟奉寳冊訖薦獻即如舊甲申詔三京諸路災傷昨因蠲減秋賦猶慮民力不逮令所在長吏再加體量以聞上謂王欽若曰司天言星象災異屬秦隴之分可諭曺瑋西鄙蕃部聞已畏服餘未順者當漸招誘之無得輕議興兵辛卯詔河北京東民以車糴糶種糧者縁河津渡勿收其筭俟稔嵗奏以待報甘州輝和爾罕王伊嚕格勒圭呼遣使來貢言其父伊嚕格勒卒於是年三月九日宰相諸部落奉伊嚕格勒圭呼主國事又言蘇守信死其子羅莽領西凉府事回紇遣兵攻破其族帳百餘斬級三百奪其馬牛羊甚衆實録云巴烏公主宰相遜守貴並遣使來貢今削去但書伊嚕格勒圭呼據前年敦敏歸稱巴鳥公主已死不知今所謂巴烏公主者復何人也當攷甲午令諸州以來年二月設酺㑹用景靈宫成徳音也乙未契丹遣使右林牙刑部尚書蕭延寜副使衞尉卿李可舉來賀明年正旦丙申權三司使馬元方等詣崇政殿上新作天書金輅上服鞾袍命輔臣臨觀焉丁酉有司奉玊皇寳冊衮服聖祖寳冊仙衣二聖綘紗袍至長春殿中書樞宻院修奉寳冊副使迎拜庭中道門威儀禁衞援䕶安于崇徳殿戊戍奉天書置天安殿玉皇寳冊衮服二聖綘紗袍于文徳殿上致齋于崇徳殿己亥上酌獻訖奉天書及玉皇寳冊衮服赴玉清昭應宫聖祖寳冊衮衣赴景靈宫上遂宿齋于玉清昭應宫
