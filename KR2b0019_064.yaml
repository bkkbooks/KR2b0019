body:
  text: 續資治通鑑長編卷六十宋李燾撰真宗景德二年五月戊申朔幸國子監閲書庫問祭酒邢昺書板幾何昺曰國初不及四千今十餘萬經史正義皆具臣少時業儒觀學徒能具經疏者百無一二蓋傳寫不給今板大備士庶家皆有之斯乃儒者逢時之幸也上喜曰國家雖尚儒術然非四方無事何以及此先是館閣博聚羣書精加讎校經史未有印板者悉令刋刻或言三國志乃姦雄角立之事不當傳布上曰君臣善惡足為鑒戒仲尼春秋豈非列國爭鬬之書乎先是印書裁截餘紙皆鬻之以供監中雜用昺請歸此錢於三司禆國計自是學者公費不給講官益厭其寥落云或附此於昺卒時宣徽北院使雷有終倜儻自任不拘小節歷任藩閫能撫士卒豐於宴犒公費不足則傾私帑給之或言其無亷稱然奉身甚薄止有銅鞍勒京師崇仁里第本其父德驤所創有終在蜀嘗借用庫錢數百萬奏納第以償優詔蠲免於是自并州入為宣徽使上知有終家無餘財己酉命特給亷鎮公用錢二千貫王繼英時掌樞密頗忌有終進用屢言其在蜀及守邊厚費以收士卒心上終保護之居數月卒身後宿負猶不啻百萬會要言有終貪墨事當參考知雄州何承矩言契丹新城𣙜場都監劉日新致書遺氊羊酒詔承矩受之答以藥物初李繼隆遺奏親屬牙校等凡三十人有司請援曹彬潘美恩例上曰繼隆乃太后兄可引杜審進為比因求其案籍具得之於是繼隆子姪並超等遷秩至於疏屬給使輩咸收敘焉其弟洛苑使繼和耻受延賞不列於遺奏庚戍特拜西上閣門使先是賊有王長壽者本亡命卒有勇力多計慮聚徒百餘抵陳留剽攻郡縣捕之不獲朝廷専遣使益兵追逐於澶濮間會契丹南侵夾河民庶驚擾長壽結黨愈衆人皆患之磁州刺史許均自永興帥所部兵赴行在至胙城長壽與其徒五千餘入縣鈔略均部下兵袒裼與鬬設方略生禽長壽梟獲惡黨皆盡上以方禦戎冦未欲因捕賊奬均但賞其所部兵被傷者賜帛遷級焉於是追敘前勞擢為本州團練使霸州言得北界永清都監牒部民李加興先以錢二十千贖得南界掠來婦人阿杜為妻近同至霸州鬻席為前夫齊鸞擒去請追捕還付加興本州以杜本鸞妻難復追還已牒報訖上曰此乃修好前所掠或再有求索當官為出所贖錢以還加興詔河東諸州軍兵馬都監監押有二員者省其一辛亥詔陜西緣邊州軍蕃部罰納獻送羊馬悉著籍以供公費先是蕃部有罪納資為贖及守臣出處更代多以畜産為賀並入於長吏至有生事以邀其利者使之不寧上亷知其弊欲遽止之復慮戎人犯禁無以為戒乃降是詔殿前都虞候寧州防禦使張凝忠勇好功名纍任西北善訓士卒繕完器仗所至常有奮勵效報之志前後賞賜甚厚多以犒師家無餘資京師無居第上嘗與近臣論將帥曰選用武臣實難儻未嘗更歷則不能周知其才太宗所擢甚衆而優待者唯凝與王斌王憲等數人每賜與絶殊倫輩乃知先帝知人之明也於是凝為髙陽關副都部署卒上甚惜之賻贈加等遣中使護其喪歸葬王憲未見王斌有傳在天禧元年四月陽翟人自有事二邊戍兵寖廣師行饋運仰於博易有司務優物估以來輸入河北有水運而地里差近亦有京師輦送者其入中大約人糧斗增六十五錢馬料增四十五錢西鄙回逺及涉磧隂運載甚難其入中之價靈州斗粟有至千錢以上者自餘州率不下數百邊地市估之外别加擡為入中價無定皆轉運使視當時緩急而裁處之如粟價當得七百五十錢者交引給以千錢又倍之為二千切於所須故不吝南貨初商人以鹽為急皆競趨焉及禁江淮鹽又增用茶當得十五六千至二十千輒加給百千又有官耗隨所饒益其輸邊粟者非盡行商率其土人既得交引持詣衝要州府鬻之市得者寡至京師京師有坐賈置鋪𨽻名榷貨務懷交引者湊之若行商則鋪賈為保任詣京師榷務給錢又移文南州給茶若非行商則鋪賈自售之轉鬻與茶賈及和好罷兵邊儲稍緩物價差減而官給交引虛錢之名未改既以茶代鹽而買茶所入不充其給交引停積故商旅所得茶指期於數年之外京師交引愈賤至有裁得所入芻粟之實價者官私俱無利於是命鹽鐡副使林特與宫苑使劉承圭崇儀副使李溥就三司悉索舊條制詳定特呼豪商問訊别為新法其於京師入金銀綿帛直錢五十千者給百千實茶河北緣邊入金帛芻粟如京師之制而增茶十千次邊增五千河東緣邊次邊亦然而所增有八千六千之差陜西緣邊亦如之而增十五千次邊所增如河北緣邊之制其三路近地所入所給皆如京師仍約束山場園户謹其出納議奏集三司官視其可否咸言其便詔如所議壬子以溥為制置淮南江浙荆湖茶鹽礬稅兼都大發運事委成其事實録於九月壬戌書三司請許商賈於河北河東陜西州軍依在京例納見錢金銀每實錢五十五貫給海州茶準百貫從之今從本志并書于此實録但云兼都大發運事會要乃云發運使按景德四年八月溥以發運副使遷發運使則初除必非使今從實録又景德三年二月馮亮初除發運使會要及本志並云景德三年復置發運使一人蓋發運自此始立使名馮亮為使李溥為副使也儀州言前制勝關寨主郤勳貿易侵漁蕃部強市諸軍給賜物有軍士與部民爭鬬決訖令荷校示衆者二百七十餘日至是為部民所訟上曰人固不易知勳往時多奏臣僚不法事以是或稱其盡公稍加任用敢爾貪暴轉運使亦不能按舉何也宜以兹事遍諭諸路劾勳罪以聞癸丑遣淄州團練使康進虢州團練使慕興濮州刺史郭自明濰州刺史冦達乾州刺史樹超並還本任以嘗護邊無聲績故罷其兵職郭自明冦達樹超未見以太常博士張檢知趙州國子博士張紳知洺州上慮河北列郡以邊鄙寧謐懈於武備故遴選守臣因密詔檢等凡城壘池塹防扞之具常加完葺張檢張紳俱未詳知天雄軍府趙昌言奏所部冦竊未除已下令軍民有能告賊者賞以金帛及署牙校鎮將遷補軍職下其狀樞密院王繼英曰鄉閭小有攘竊不當擅為賞格從之非便上曰然則昌言所下令反為虛語使長吏失信於天下政教何以興行可使易其文止云當為上言請行旌賞而已知鎮戎軍曹瑋言軍境川原夷曠便於騎戰非中國之利請自隴山而東緣古長城鑿塹以為限從之又言邊民應募為弓箭手者皆習障塞蹊隧解羌人語能寒苦有警可參正兵為前鋒而官未嘗與器械資糧難責其死力請給以境內間田永蠲其租春秋耕斂出兵而護作之詔人給田二頃出甲士一人及三頃者出戰馬一匹設堡戍列部伍補指揮使以下校長有功勞者亦補軍都指揮使置巡檢以統之其後鄜延環慶涇原并河東州軍亦各募置給田蠲租在甲子日今并書秦翰傳云先是西鄙無藩籬之固翰為涇原儀渭鈐轄規度要害鑿巨塹計工三十萬役卒數年而成不煩民力有詔嘉奬此必與瑋事相關當考又祥符七年四月瑋掘緣邊壕五十一里更詳之或可附塹壕尺度及給田市馬法光祿卿分司西京李昌齡請致仕中書進擬上曰昌齡素無清譽不可牽復丞郎甲寅授祕書監致仕詔葺西京大內及諸司廨舍將朝陵故也將朝陵從會要翰林學士承旨宋白翰林學士梁周翰年衰思減書詔多不稱旨乙卯並罷白為刑部尚書集賢院學士判院事周翰為給事中判昭文館事以起復右諫議大夫知制誥朝逈起居舍人知制誥李宗諤並為翰林學士宗諤在舍人院嘗牒御史臺不平空中丞呂文仲移文詰之宗諤答以兩省與臺司非統攝文仲不平聞於上有詔辨析宗諤引八事證其不相統攝且言中書門下兩省自正言以上皆天子侍從之官立朝敘班不與外司為比故在正衙則與宰相重行而立於通衢則與中丞分路而行常參則師傅入於兩省之前朝會則臺官次於兩省之後地望特峻職業有殊官局之間不相統攝御史臺每牒本省並不平空所以本省移報亦如其儀而文仲止慿吏人之言遽有聞奏且無典章為據伏惟臺憲之職所宜糾察姦邪辨明寃枉廷臣有不法之事得以奏彈下民有無告之人得以申理而於文牒之內爭平空與不平空其事瑣細烏足助於風威哉卒如宗諤所言守職者韙之以起居舍人直昭文館种放為右諫議大夫放謝病乞遊嵩山詔許之仍命河南守臣常加存撫召對賜宴賦詩餞行恩禮甚厚刑部員外郎知制誥丁謂為右諫議大夫權三司使事仍詔謂內殿起居立知制誥上丙辰陜西轉運使請繕治金湯白豹等鎮以處投降蕃族上慮勞民弗許先是上以天文地理隂陽術數之書率多舛誤乃命司天少監史序等同加編次掇其精要以類分之為乾坤寶典四百一十七卷丁巳序等上其書上作序藏祕閣蠲道州永明縣民逋租交州黎桓死其仲子龍鉞嗣立龍鉞兄龍全劫庫財而遁其弟龍廷殺龍鉞自立龍廷兄明護率扶闌寨兵攻戰國信使邵曄駐嶺表以其事聞戊午就命曄為廣南西路緣邊安撫使聽以便宜設方略桓子明提先入貢還在路詔送伴使臣倍加安撫國史交趾傳載黎桓死乃以為明年事誤也邵曄除緣海安撫使時桓既死矣國史便文因失事實今改之會要於明年二月始書桓死亦誤也詔雄州契丹請榷場市易者優其直與之詔麟府鈐轄司自今蕃部歸投不須發兵接引己未詔三司每歲較天下稅簿登耗以聞從度支判官黃世長之請也夔州路轉運使薛顔等言投降蠻人首領皆已自署職名請因而命之上曰向者川峽屢擾多擅補巡檢將頗桀驁縱恣今蠻人所署復有此名不可從也苐令次補牙校詔殿前侍衛軍校十五年已上不遷者具名引對先是詔禮部貢院别試河北貢舉人其曽援城者進士雖不合格特許奏名諸科例進二場至三場者許終場五舉及經御試并年五十者並以名聞雖不更城守應七舉年六十及瀛州有勞效者亦如之庚申上御崇政殿親試凡七日得進士范昭等五十一人賜及第四十五人出身諸科賜及第同出身并試秩署州助教者六百九十八人特奏名進士諸科賜及第出身至攝助教𨽻殿侍者六百六十二人上以去歲河北用兵民甚驚擾其乘城捍冦奮勇力者多出士人欲廣示甄采所問經義有兩出者或具引為對考官將黜去上親為發明焉特奏名進士李正辭論文武先後以為文者本乎靜武者本乎動動以止亂而主乎靜則先後可知上嘉其近理將擢上第會有言其嘗犯杖刑遂補三班奉職撫州進士晏殊年十四大名府進士薑蓋年十二皆以俊秀聞特召試殊試詩賦各一首蓋試詩六篇殊屬辭敏贍上深歎賞宰相冦準以殊江左人欲抑之而進蓋上曰朝廷取士惟才是求四海一家豈限遐邇如前代張九齡輩何嘗以僻陋而棄置耶乃賜殊進士出身蓋同學究出身後二日復召殊試詩賦論殊具言賦題嘗所私習上益愛其淳直改試他題既成數稱善擢祕書省正字祕閣讀書仍命直史館陳彭年視其所學及檢察其所與遊者壽春縣主上言其夫兄掌芻藁之職以廢職為有司所舉請宥之上不許使正其罪主楚王元佐女也戊辰權三司使丁謂言往者川峽諸州屯兵調發資糧頗擾而積鹽甚多募南人輸粟平其價償之以鹽今儲粟漸充請以鹽易絲帛詔諸州軍糧及二年溪洞州及三年者從其請己巳詔自今諸州官吏雪活得人命者並理為勞績先是著作佐郎曹定言官吏雪活乃其職分不當論課最於是太子詹事判刑部慎從吉言誤失用刑率皆受責雪活寃獄曽不霑恩懲勸之間恐未協理望頒新制以朂盡心從之時承平日久掌財賦者法禁愈密悉籠取遺利凡較課以祖額前界遞年增之榷務連歲有羡餘三司即取多收為額上以其不俟朝旨或致掊克癸酉詔增額皆奏裁甲戌以前知興元府太常博士趙湘前知通州殿中丞趙稹同判宗正寺上以宗正職奉陵廟其任至重簡擇宗姓朝臣有才望者領其事以申嚴恭之意聞湘等有治聲故驛召而命焉比至並賜緋魚白金二百兩月俸皆見緡仍别給錢十千稹宣城人也詔幕職州縣官例當免選者有贓罪及行止踰濫並俟選滿日注官內緣酒食計贓者不在此限乙亥知雄州何承矩言將來契丹使入界欲令暫駐新城俟接伴使至迎於界首從之承矩又言使命始通待遇之禮宜得折中庶可久行乃悉條上手詔嘉納仍聽事有未盡者便宜裁處凡契丹使及境遣常參官內職各一人假少卿監諸司使以上接伴內諸司供帳分為三畨內臣主之至白溝驛賜設至貝州賜茶藥各一銀合至大名府又賜設及畿境遣開封府判官勞之又命臺省官諸司使館伴迓於班荆館至都亭驛各賜金花銀灌器錦衾褥朝見日賜大使金塗銀冠皂羅氊冠衣八件金䩞鞢帶烏皮鞾銀器二百兩綵帛二百匹副使皂紗折上巾衣七件金帶象笏烏皮鞾銀器一百兩綵帛二百匹鞍勒馬各一匹其從人上節十八人各練鵲錦襖及衣四件銀器二十兩綵帛三十匹中節二十人各寶照錦襖及衣三件銀器十兩綵帛二十匹下節八十五人各紫綺襖及衣四件銀器十兩綵帛二十匹並加金塗銀帶上節中節又加絲鞋就館賜生餼大使粳粟各十石麵二十石羊五十法酒糯米酒各十壺副使粳粟各七石麵十五石羊三十法酒糯米酒各十壺承天節各别賜衣一襲遇立春各賜金塗銀鏤幡勝春盤又命節帥就玉津園伴射弓賜來使銀飾箭筒弓一箭二十其中的又賜錦窄袍五件金束帶鞍勒馬在館遇節序則遣近臣賜設辭日長春殿賜酒五行賜大使盤毬暈錦窄袍及衣七件銀器三百兩綵帛二百匹副使紫花羅窄袍及衣六件銀器二百兩綵帛一百匹並加金束帶雜色羅錦綾絹百匹從人各加紫綾花絁錦袍及銀器綵帛將發又賜銀瓶合盆沙羅注碗等又令近臣餞於班荆館開封府推官餞於郊外接伴使副復為送伴沿路纍賜設初命內侍右班副都知閻承翰排辦禮信議者欲以漢衣冠賜契丹使者承翰曰南北異宜各從其土俗可也上從承翰所議承翰又請徙在京渤海契丹諸營於外上曰南北通好重勞人也遽此煩擾則非吾意不許命承翰排辦禮信會要在五月而實録無之今并書于此月末六月丁丑朔詔應進士諸科同出身試將作監主簿者並令守選故事登科皆有選限近制及第即命以官咸平三年初復廷試賜出身者亦免選至是䇿名之士尤衆多設等級以振淹滯雖藝不及格悉賜同出身試秩解褐故令有司循用常調以示甄别又下詔勸學權停貢舉二年時命兩制各撰勸學詔趙安仁所作最切於科試之病特俾用之申禁行濫物帛戊寅詔欣代州緣邊諸寨自今北界齎牒至者並送代州仍準條給物以其回報裁處類例不一故也己卯刑部大理寺三司法直官令吏部銓選流內官一任三考以上謹幹無過工書判者具名引對試斷案五道中格者授之三司大理寺一年刑部三年無私罪者授京官先是悉自令史遷補端拱中冦準判銓奏用士人至是復舉前詔京東諸州蝻蟲生庚辰遣使掩捕仍精潔致祭知永興軍府兼提舉諸州兵甲向敏中請徙環渭戍卒屯涇慶州以省邊用從之辛巳有司言契丹清朔禽戎剩員軍士十八人老病當停詔殿前司詢問無親屬者許仍舊願停者從其便上以異域歸順之人老而擯退或無所依故也司天言星文有災在吳越之分詔益升洪杭福州屯兵令六宅使康繼英等四人分任駐泊都監提舉本路諸州兵馬巡檢事安肅軍言部民數輩私至北界易州州將執之送還詔諭邊臣如北人擅至封內亦登時執送壬午監察御史臨川崔憲言前知廣德軍有祠山廟素號靈應逺近之民多以耕牛為獻自偽命已來聽鄉民租賃每一牛歲輸絹一匹供本廟費近者絹悉入官望給四百匹完葺祠宇上曰如載在祠典有益於民則當官為崇飾何必租絹因令本軍葺之癸未詔諸州商稅年額及三萬貫以上者令審官院選親民官監蒞仍給通判添支丁亥以盛暑減京城役課夏州趙德明遣牙將王旻奉表歸欵賜旻錦袍銀帶遣侍禁夏居厚齎詔答之曹州民趙諫與其弟諤皆凶狡無賴恐喝取財交結權右長吏多與抗禮率干預郡政太常博士鄭人李及受詔通判諫適來京師投刺請見及拒之諫大怒慢罵而去因帖榜言及非毁朝政及得之以匿名事未敢發會大理寺丞任中行本諫同鄉里盡知其姦慝密表言之上即遣中使就訪京東轉運使施護知曹州謝濤并及皆條諫兄弟醜迹乃逮繫御史獄又詔開封府曹州吏民先為諫諤恐喝者得自首露釋罪命搜其家得朝士內職中貴所與書尺甚衆計贓巨萬己丑並斬於西市黨與決杖流嶺外與之遊熟者並坐降黜因詔自今訟不干已事即決杖荷校示衆十日情理切害屢訴人者具名以聞仍配𨽻逺處上初欲窮治與諫交遊者內出姓名七十餘人付獄中丞吕文仲請對言逮捕者衆或在外郡茍悉索之慮動人聽上曰卿執憲當嫉惡如讎豈公行黨庇耶文仲頓首曰中司之職非徒繩糾愆違亦當顧國家大體今縱七十餘人悉得姦狀以陛下之慈仁必不盡戮不過廢棄而已但籍其名更察其為人置於冗散或舉選對揚之日擯斥之未為晚也上從其言施護未見庚寅詔自今宗廟忌日西京及諸節鎮給錢十千防團州七千軍事州五千以備齋設無得率斂辛卯鄜延路鈐轄張崇貴言趙德明已奉表歸欵令河西蕃族各守疆界詔諸部如德明無所侵擾則勿縱兵出境癸巳召知鄭州太常博士管城段曄入朝賜五品服遣還任曄前通判鄆州會知州丁謂入權三司使即以曄知州事謂且薦曄之才故有是命甲午張崇貴自延州入奏詔諭以繼遷昔時變詐之狀今當使德明自為誓約納靈州土疆止居平夏遣子弟入宿衛送略去官吏盡散蕃漢兵及質口封境之上有侵擾者稟朝旨凡七事則授德明以定難節度使西平王賜金帛緡錢四萬貫匹兩茶二萬斤給內地節度使俸聽回圖往來放青鹽之禁凡五事仍遣閣門通事舍人焦守節偕往呼德明親信示之如能順命即降恩制既而德明使張浦詣崇貴等靣議及致書疏但多徼求不肯自為誓約也乙未賜殿前都指揮使髙瓊板本經史從所乞也上崇尚文儒留心學術故武毅之臣無不自化髙品陳延慶言監修亳州太清洞霄兩宫事畢遣使致醮增具什物給兵灑掃丙申令開封府察受納夏稅場無使遲滯寧州山水泛濫壞民舍軍營命中使馳傳存撫給錢糧溺死者官為埋瘞葺其居定州軍城寨言得契丹西南靣飛狐安撫使牒請諭採木民無越疆境命轉運司與本州據部民取材之所召其疆吏同立標幟以示衆辛丑以西上閣門使孫全照為東上閣門使領英州刺史全照形短精悍知兵以嚴毅整衆然性剛使氣専任刑罰中書初進擬嚴州上曰全照深刻常慮人以嚴察謗已今授此州似涉譏誚乃改命焉朝廷每歲準禮例修馬祖先牧馬社馬步之祭於是羣牧司請令內外坊監擇地建廟立四神像每歲四仲月委本院致祭詔崇文院詳閲典故檢討官杜鎬上言四神各有本壇以時奉祀唯物不備乃詔自今每祀用一羊其置廟罷之壬寅令司天監始置監生選厯算精熟者為之詔自今僮僕盜主財五貫配本州牢城十貫配五百里外二十貫以上奏裁改咸平六年之制慮其淹繫也是月上謂輔臣曰殿前侍衛司禁兵老疾者衆蓋久從征戍失於簡練比因抽移至京師雖量加閲視亦止能去其尤者今多已召還宜精加選擇雖議者恐其動衆亦當斷在必行昔太祖亦常患其若此遂盡行擇閲當時衆情深以為懼而厥後果成精鋭樞密使王繼英曰禁旅比昔時數今已踰倍若乘此息兵簡退疲冗實甚便上曰然苐以北界請盟西戎納欵若即行此則軍旅之情必謂國家便謀去兵惜費不若先從下軍選擇勇力次補上軍亦可鎮壓浮言使衆不惑也其老疾者俟秋冬遴簡將臣令悉搜去之殿前侍衛司上言開封府追取禁兵證事皆直詣營所事頗非便上曰朕察此意蓋止欲就本司決遣耳有唐之弊方册可視自今除逮捕證佐悉如舊制軍人自犯杖罪以下本司決遣至徒者奏裁上嘗戒軍校曰犯法者須以軍法治之然憫惻之意不可不存其間置濵州通判一員以刺史周緒赴本任也上謂武人多不閲政理非通判亷幹則民受弊乃詔應防團刺史在本任及知州處見任通判令轉運司密具能否以聞秋七月己酉改勾當制置羣牧司事為羣牧副使以內侍左班副都知閻承翰為之制置羣牧使去制置之號但為羣牧使庚戌羣牧使趙安仁言按唐制馬有左右監各以土地為名遂改諸州牧龍坊悉為監賜名鑄印給之辛亥上封者言刑部舉駮外州官吏失入死罪準斷獄律從流失入死罪者減三等徒二年半公罪分四等定斷官減外徒三年為長者追官餘三等徒罪止罰銅伏以法之至重者死人之所保者生儻官司不能盡心則刑辟乃有失入傷和平之氣違欽恤之仁蓋幕職州縣官初歷宦途未諳吏事長吏明知從罪不至追官但務因循不自詳究又雍熙三年七月敕權判刑部張佖起請失入死罪不許以官當贖知州通判並勒停咸平二年編敇之時輒從刪去致長吏漸無畏懼輕用條章臣以為若以格法舊條似虧懲勸或準張佖起請又未酌中欲望自今失入死罪不致追官者斷衝替候放選日注僻逺小處官連署幕職州縣官注小處官京朝官任知州通判知令録幕職受逺處監當其官髙及武臣內職奏取進止詔可丙辰羣牧判官王曙上羣牧故事六卷詔藏於本司丁巳詔以十一月十三日有事於南郊戊午閲神勇軍士習戰於崇政殿己未詔詣闕訴事人須因州縣理斷不當曽經轉運使訴理月日鼓司登聞院乃得受庚申重鑄門下省等五十四印先是印文皆有新鑄字因判刑部慎從吉上言改易之甲子詔復置賢良方正能直言極諫博通墳典達於教化才識兼茂明於體用武足安邊洞明韜略運籌決勝軍謀宏逺才任邊寄等科令尚書吏部傳告諸路許文武羣臣草澤隱逸之士來應委中書門下先加考試如器業可觀具名聞奏時上謂冦準等曰方今文武多士豈無才識優異未升進者耶至於將帥之任尤難得人前代試以制䇿觀其能否用求材實亦為國之逺圖也因出唐朝制科之目采其六用之景德復置六科蓋用盛度議其詳具天聖七年復置六科時田錫亦先建請當考安國軍節度推官李宏上言諸路每置院鞫囚或值夏月望令十日一滌杻械如州獄之制從之李宏未見丙寅詔以廬山太平興國乾明寺田租十之三充葺寺宇經像令江州置籍檢校選名行僧主之張知白使還言寺僧不謹故也己巳詔八月一日已後持仗強盜遇南郊恩赦不在原免之限庚午大理寺言郊禮在近諸州奏案多不精詳冀於覆駮延留以俟寬宥請自今有侵損贓私事狀明白公然抗拒當駮退者即具情由定斷以絶僥幸詔可又詔諸謀殺人不至傷殺而情理凶惡不可留本處者具獄以聞辛未羣臣三上表請聽樂詔郊廟用樂如禮事畢復寢軍頭司引對員僚直二十九人年老當𨽻剩員上以其嘗經戰陳特令月給錢五百壬申詔減江浙荆湖福建廣南等路得替官送還公人數有差從殿中丞趙稹之請也癸酉宰臣等固請誕節用樂上曰若以北使之故其至日作樂於外可也宰臣復上表陳述終不許甲戌遣御前忠佐八人分往京東西路教閲諸軍丙子龍圖閣待制戚綸與禮部貢院上言今歲諸道進士僅三千人諸科萬餘人其中文理紕繆以及經義十不九不者甚衆茍非特行立法約束必恐益長因循又慮官吏坐此殿罰因而避事全不薦人竊惟取士之方合垂經逺之制今請諸色舉人各歸本貫取解不得寄應及權買田産立户諸州取發寄應舉人長吏以下請依解十不人例以科罪其開封府委官吏覺察犯者罪如之鄉里遐逺久住京師者許於國子監取解仍須本鄉命官委保判監引驗乃得附學發解日奏請差官考試近年進士多務澆浮不敦實學惟鈔略古今文賦懷挾入試昨者廷試以正經命題多懵所出舊敕止許以篇韻入試今請除官韻略外不得懷挾書䇿令監門巡鋪官潛加覺察犯者畫時扶出仍殿一舉咸平三年詔旨進士就試不許繼燭每歲貢院雖預榜示然有達曙未出者今請除書案外不將茶厨蠟燭等入如酉後未就者駮放之仍請戒勵専習經史自今開封府國子監諸路州府據秋賦投狀舉人解十之四如藝業優長或荒繆至甚則不拘多少開寶通禮義纂請改為義疏今後通禮每場問本經四道義疏六道六通為合格本經通二義疏通三亦同今歲秋賦止解舊人新人且令習業西川廣南舊取解舉人並許免解今後及第三史通禮三禮三傳除官日比學究明法望授月俸多處貴存激勸上以分數至少約束過嚴恐沮仕進之路乃詔兩制知貢舉官同詳定以聞於是翰林學士朝逈等上議令諸州約數解送或自來舉子止有三兩人者欲聽全解或其間才業卓然不羣者别以名聞南省引試前一日分定坐次榜名曉諭勿容移徙逺人無籍者令召命官保識就京府取解文武升朝官嫡親許附國學先寄應令還本貫者不得敘理前舉尚書周易學究明法經業不廣宜各問疏義六道經注四道六通為合格三禮三傳所習浩大精熟尤難請問經注六道疏義四道以疏通三以上為合格餘如戚綸等條奏從之本志既於此載逈議又於祥符四年五月重載之其議並同蓋因實録致誤按祥符四年四月則諸道貢舉人初未到闕逈安從知其數且其數即與此年合其誤審矣今削去
