body:
  text: 續資治通鑑長編卷四百六十五宋李燾撰哲宗元祐六年閏八月庚申知杭州林希言太湖積水未退為蘇湖大患乞専委監司躬詣瀕海泄水處相度開決庶使積水漸退民田復出流移歸業詔左朝奉郎邵光與本路監司同導積水辛酉刑部言強盜發而所臨官司不覺察致事發他處或監司舉劾者候得替以任內曽覺察功過相除外每火降名次一月至三季止捕盜官降名次外五火杖六十十火或凶惡五火者仍奏裁其非吏部差注官依所降月數展磨勘並不依赦原從之壬戍監察御史安鼎言伏見春秋祀九宫太一用羊豕而太一十神皆無牲以素饌加酒焉竊詳十神太一九宫太一共是一神無異也今所薦不同似非禮亦恐貴神未必歆血食也詔禮部太常寺詳定以聞給事中范祖禹狀申門下省云凖樞密院録白皇城使果州刺史梓夔路鈐轄管勾瀘南沿邉安撫司兼知瀘州張克明元祐三年十二月二十七日冉任已過滿近差下王克平未曽赴任左藏庫使成都府利州路鈐轄王惟純八月十四日奉聖旨就差王惟純充梓夔路鈐轄管勾瀘南安撫司公事兼知瀘州替張克明過滿闕檢會梓夔路鈐轄元置在遂州元豐中因蠻賊乞弟作過用兵討捕初移鈐轄司於資州又移於瀘州皆取一時應副近便即非經久之制後來蠻事寧息因仍至今不改伏詳祖宗時置鈐轄司於遂州本以形勢控制兩川非專為戎瀘邉事而梓夔路鈐轄司轉運使亦得通管與成都府利川路鈐轄不同自瀘州置鈐轄以來以兩路兵權付一武臣沿邉支郡反節制數十州末大本小邉州偏重事理不順且以西北言之如髙陽之雄州定州之安肅軍渭州之鎮戎軍慶州之環州皆帥府在內邉州在外今瀘州於東川路若比雄州安肅鎮戎軍環州亦須隸屬帥府豈可令一武臣專制更無同領之人况戎瀘邉事至小豈得與西北同日而語哉并檢會元祐元年十一月因臣僚上言乞依舊移鈐轄司在遂州朝廷下梓夔路鈐轄司與梓州路轄運等司相度轉運提刑司尋具相度梓夔路鈐轄司依舊歸遂州委是經久利便樞密院奉聖旨令鈐轄司且依舊在瀘州更候三五年邉事一向定貼奏取指揮自降聖旨將及六年更無邉事已是一向定貼今因張克明交替欲乞檢會前降指揮其新差官更不令帶梓夔路鈐轄如瀘州須留兵屯守止存留沿邉安撫一司其梓夔路鈐轄依舊移歸遂州措置事件並依祖宗時故事所貴西南經久安便門下省并録白送樞密院續凖樞密院批所差王惟純等已得聖旨所有移瀘州鈐轄司歸遂州見别具契勘施行祖禹奏臣伏見河北陜西惟是安撫經略司專委帥臣至於馬步軍都總管即有副總管成都府利州兩路鈐轄亦有兩鈐轄為之副二今梓夔路鈐轄及沿邉安撫兩司專委一武臣既不𨽻屬帥府又無别官同領當用兵之際或可從權於無事之時則為偏重伏詳祖宗朝置鈐轄司於遂州蓋以西南逺方外接蠻夷內則戎兵客主相雜或姦人窺伺大盜竊發淳化咸平中蓋嘗如此是故兩川各置兵馬鈐轄司鎮守互相牽制夷事緩急照應逺近適中并檢會梓夔路鈐轄司舊制揀選蠻馬編配罪人並與轉運司同管勾惟是戎瀘夷事則引用皇祐四年樞密院劄子今轉運司相度事勢牒起鈐轄將兵討除外應干軍馬事件鈐轄司相度一面行遣措置至熙寧七年察訪熊本奏請應干戎瀘夷事並要梓州路轉運司梓夔路鈐轄司同管勾竊詳先朝制置梓夔路鈐轄司與成都府利州路不同東川既非帥府而鈐轄須在遂州故稍輕其權任主者不一今以瀘州節制兩路以一武臣專領兩司諸路邉州未有此比况瀘南蠻賊作過本因羅茍夷爭不償骨價事至微細都監王宣耻不預打誓遂出兵與乞弟接戰邀功以至於敗沒朝廷用兵誅討兩川為之騷然自林廣蕩平巢穴諸夷畏懾一向安貼梓夔鈐轄理當復舊欲乞檢會元祐元年十一月先降聖旨早行措置所有轉運司通管或依皇祐舊法或從熙寧近制乞朝廷更賜詳酌其瀘州止存留沿邉安撫一司梓州路轉運司官須常置副使一員遂州知州選差及任滿升擢並如祖宗朝故事所貴兵權不輕付與西南久逺安便乞下三省樞密院并檢會前後臣僚所奏及臣前狀施行貼黃臣竊聞瀘州自置鈐轄司以來官員使臣酬奬供給例皆優厚武臣知州素無綱紀是以彼州官吏惟恐鈐轄司復歸遂州檢會元祐元年朝廷已下梓夔路轉運司同相度轉運司提刑司尋具相度鈐轄司依舊移歸遂州委是經久利便臣竊謂事理明白無疑欲乞更不冉下本路相度只從朝廷措置若瀘州存留沿邉安撫一司令𨽻屬鈐轄司又不減戍兵亦足以防遏夷寇不為無備詔梓夔路鈐轄梓州路轉運提刑司相度瀘州樂共城差大使臣充知城更不帶路分都監以梓夔路都監一員知瀘州兼管勾瀘南安撫司公事移梓夔路鈐轄歸遂州與遂州共治鈐轄司軍馬又同商議戎瀘州邉事其合行改更等事並條具畫一以聞舊録誤以范祖禹為范百祿又刪取奏狀太略今依祖禹集所載詳著之詔語則依舊録按此詔令梓夔路鈐轄司及梓州路漕憲同詳度條畫既而鈐轄訖不歸遂州樂共城及瀘州亦無所更張蓋是諸司相度條畫不以范祖禹奏請為然實録既不書求之瀘南案籍亦無有姑附注此更俟考詳樞密院言纍據諸路沿邉探報夏國首領梁葉普統領河南北人馬揚言謀欲犯邉詔陜西河東諸路經略司嚴飭邉備仍不得先自張皇希功賞引惹生事右朝請大夫李茂直為兵部郎中左朝請郎集英殿集賢校理崔公度知潤州七年正月二十六日以左史召不至癸亥正議大夫前知樞密院事安燾為右正議大夫觀文殿學士知鄆州燾既除喪執政檢舉進呈吕大防曰據理當還舊職又緣有趙君錫賈易兩章論列太皇太后難之王巖叟曰若還舊職必致人言太皇太后隨曰必致人言大防因請除鄆州詔可燾尋以父老辭行改知鄭州九月四日改鄭州君錫易章在八月一日今方進呈劉摯日記云爾甲子龍圖閣待制知鄆州蔡京知永興軍初執政議用梁燾守鄆州移京帥渭代劉舜卿召舜卿宿衛王巖叟謂京雖三為帥元不更西事未可付以平涼今西人方崛強時出沒舜卿亦未可動或試京慶陽召章楶還令權諸曹侍郎劉摯不欲多置權侍郎吕大防請移京守雍從之此用劉摯日記王巖叟繫年録增修縱梁燾行狀云為御史中丞又論蔡京輕險貪在鄆州贓汚貪籍無復亷耻不當知成都府未報冉論京才姦行汚今任之逺鎮何以表厲風俗京在蔡確黨中最號凶健隂險利誘群小助為虛聲心懷姦罔勇為非義無所顧藉至則必邀材能之名以蓋前輩妄作聰明必不肯循理安靜逺方之民必不被朝廷惠澤德按蔡京以元祐元年閏二月二十二日自開封改成二年十二月十四日自成德改瀛州四年六月十八日自瀛州除成都二十四日改發運七月二十八日又改揚州五年五月二日自揚州改潁昌六月二十六日又改鄆六年閏八月六日自鄆改永興七年四月一日自永興改成都政目在三月二十八日大按燾初論京在四年六月二十八日此時燾為諫議夫未為中丞京亦未嘗知鄆州也其自永興改成都則在七年四月一日燾已為學士不為中丞矣恐行狀字誤己於四年六月二十八日自瀛除成都時附注今更附此須别考詳之龍圖閣待制王震知陜州震執喪終制故有是命太僕寺言犬馬非其土性不畜前代皆置牧於西北之地藉其地氣髙涼今單鎮原武置監皆地炎熱馬失其性嘗比較洛陽監死損孳生分數皆勝單鎮原武二監詔改單鎮監作雜犬馬監牧養調習一千五百匹其見管馬除留本監外餘相度洛陽原武草地多寡分𨽻逐監雜右廂諸監雜馬及買馬司買到馬每年撥一千匹入單鎮放牧換經調習馬一千匹入京新録削牧養調習以下今復增入夔州路轉運提刑夔州路兵馬鈐轄司言今後施州清江建始兩縣防托人戶每遇輪差在諸寨防托外其本寨官員將校等如敢輒役並科違制論罪赦降去官不原許被役人陳告如合要修城寨申取轉運司指揮從之江南東路鈐轄司言本路舊有路分都監二員在池州江寧府駐劄其在江寧府者自元豐間差丁海兼東南第五將罷任後止差到將官至今無路分都監緣本司統制江東軍政乞循舊制差路分一員詔東南第五將武端民兼權是日執政會議都堂吕大防劉摯欲以李清臣為吏部尚書王巖叟曰此非密院所預然必有議論摯曰前執政為尚書固不過但恐公議不肯放入來耳既而奏可巖叟謂同列曰必致人言大防亦自以為然録黃過門下省給事中范祖禹封還進呈不允祖禹執奏如初祖禹二奏並録在後先是摯語大防曰若欲寧帖須召夕拜諭之乃可大防曰俟明日摯曰俟明日則不及矣除命既下左正言姚勔又論其不當勔奏亦在後各并入此或依日别見巖叟謂蘇轍曰邦直如何轍曰給事中已冉封駮諫官亦有言今更欲用蒲宗孟為兵部尚書那得安靜巖叟曰子由宜力爭轍曰彥霖盍相助巖叟許諾及會議巖叟謂大防曰一人議論未已更可進一人否大防曰宗孟却無他事巖叟曰要之亦非公議所與轍曰且候邦直命下然後議此如何皆不應轍欲於簾前敷陳巖叟曰此所望也及簾前大防奏請諸部久闕尚書見在人皆資淺未可用又不可闕官須至用前執政上有黽勉從之之意轍遂言前日除李清臣給諫紛然爭之未定今又用宗孟恐不便太皇太后曰奈闕官何轍曰尚書闕官已數年何嘗闕事今日用此二人正與去年用鄧溫伯無異此三人者非有大惡但與王圭蔡確輩並進意思與今日聖政不合見今尚書共闕四人若並用似此四人使互進黨類氣勢一合非獨臣等奈何不得亦恐朝廷難奈何矣且朝廷只貴安靜如此用人臺諫安得不言臣恐自此閙矣太皇太后曰信然不如且靜遂卷除目持下轍又言臣去年初作中丞首論此事聖意似以臣言為然今未及一年備位於此若遂不言實恐陛下怪臣前後異同上曰然乃退然大防摯更欲清臣知揚州代王存召存入為吏部尚書巖叟意不然亟以語摯摯曰缺許多官曹却著甚人補巖叟曰用與今日政事意同之人摯默然巖叟又語摯曰公引此等人付之此地敢保否摯曰保則不敢巖叟曰公宜無忽范祖禹封還清臣除命第一奏云臣竊以李清臣素行回邪士大夫之所共知臣不敢言其細事請舉其立朝大節以明之治平中清臣舉賢良方正時韓琦當國清臣韓氏之親及對制策依阿大臣不肯指言時政之失天下以為不直元豐中韓琦既沒清臣以翰林學士修兩朝國史先帝褒賞文彥博等建儲之議以其事付史官清臣即推功於彥博等而抑韓琦熙寧中韓絳宣撫陜西奏辟清臣管勾機密文字絳發兵討伐西夏及慶州兵叛朝廷下詔罪已罷兵貶絳知鄧州清臣齎宣撫司文字赴闕規欲自全多毁絳之短以明已不預其後市易司奏差李璋指使張吉夫為管勾公事吉夫辭以李璋方在責降一旦捨去義所不安先帝歎曰十室之邑必有忠信吉夫小人陳義甚髙賢於李清臣逺矣先帝薄之如此元豐末清臣執政三月五日升遐六日陛下登極赦書令緣邉不得侵擾外界務要靜守疆埸至十六日三省樞密院同奉聖旨劄下陜西河東復令痛行討殺務要近邉西賊不容著業住坐耕種且先帝棄天下才十日陛下方在哀疚必未遑省覽臣不知三省樞密院何緣得此聖旨四月吕惠卿發兵入西界討蕩當朝廷倉卒之際降赦書方十日而執政復降擾耕指揮以應副惠卿故惠卿敢公違赦書發兵大臣應之於內姦臣行之於外自非有無君之心者豈至於此乎臣旋觀清臣所為韓琦生則附之死則背之韓絳成則隨之敗則毁之進退反覆無非為利陛下即位十日即違赦發兵大臣無所不至朝廷方欲登進忠良退逺佞邪今清臣以前執政除吏部尚書固非遷擢然既召而使之則將有復用之勢失天下望伏望聖慈令清臣且守外任以協公論亦不失富貴之也所有録黃未敢書讀行下詔依前降指揮行下編類章疏閏八月九日奏其第二奏云臣竊以朝廷進一人當使天下之賢者無不勸退一人當使天下之小人無不沮則人知所好惡不敢為邪僻矣李清臣自立朝以來專為姦邪未嘗有益於公家惟利是視臣不知陛下何所取而用之也臣前所論清臣大節陛下不過以昔年之事不當追咎發兵之詔不獨由清臣而先朝執政不須盡不用獨清臣柔而易制故復收進之爾臣愚以為人臣不能無過失朝廷固當匿瑕含垢無所不容若有所短亦有所長有所得亦有所失則捨短而取長棄失而就得用之可也至於天資回邪操心不正此則終身不改無有久近不可用也清臣為人不端人皆知之天下傳之且三十年矣當先帝新棄天下陛下未省覽政事之時執政之中茍有一鯁正之臣必不唯唯隨人豈肯雷同降詔發兵陛下不以此責執政不知更俟有何大罪乃責之也元豐中御史王祖道言清臣奉使北庭回以物帛可直百千遺中書承受內降吏人白隨士議喧傳有識鄙笑清臣為翰林學士乃以賄賂隂結堂吏乞重行廢斥此事書於時政記載於史册臣豈敢誣之若取其柔而易制此又非臣之所知也書曰難任人又曰去邪勿疑孔子曰逺佞人又曰佞人殆古之覆邦家者不必強臣其初皆佞人也臨利害則變故背君父危國家而不顧所以聖人深戒用佞人今清臣以前執政居外不為失職又召而處之待用之地天下必曰佞人入朝矣然則朝廷豈得尊嚴政事何所望乎所有録黃不敢書讀行下皆不從編類章疏閏八月十二日奏左正言姚勔奏云編類章疏係六年閏八月十六日臣伏聞李清臣除吏部尚書物議未以為允臣聞清臣曽任執政官昨在朝廷阿附時相隨邪用事無大臣之節前後臣僚備曽論列今久在外任陛下一旦召之彼意以謂陛下復用勢不止為吏部尚書也蓋吏部尚書緊次樞轄又清臣舊執政他日有執政官闕陛下欲舍清臣除他人則似非其體又使大臣失望而其心不安不靜可無故而復出之也若陛下且復用之則其人所為未可知此臣所以為陛下惜焉今二聖臨御委成於二三大臣所貴合謀同力一德無間以熙庶政則陛下優遊穆清恭己而治若置非其人則其體不同所趣有異議論相違如氷炭共器必須上煩聖慮伏望陛下深察其機且除其大藩於清臣未為失所未可輕召之也孟子曰國君進賢如不得已臣區區蓋為朝廷久大之計亦所以全大臣進退周旋之道清臣除吏部尚書之命卒罷劉摯云去年有詔尚書許用前執政稍異其儀免巡白請朝謁别設次俸料隨職雜給清臣實始召用云王巖叟又與執政言聞諸縣説近日五年十料之法却已衝動人情甚不樂同列皆漠然不知所以巖叟曰因戶部申遂改之吕大防曰戶部吝故破前説劉摯曰摯殊不知必是批下戶部狀巖叟曰或茍可追大防摯及轍皆欲收回前日指揮巖叟曰此事利害繫天下若信戶部無由可行須主張定乃可雖云十料取之似少然必納不作料次汗漫催督必且推延不納未必為得計退而又移簡諷摯及轍答云都省批戶部狀有所限隔已追罷批狀一切依元降敇命矣初患天下積欠名目多法令不一公私難於奉行巖叟在開封嘗乞隨等第立貫百為催法兖州鄒令張文仲尋有狀申都省陳其不便乞改制遂立五年十料之法閏八月初八日事五年五月二十五日詔當考蘇軾七年五月十六日論積欠第六項云元祐六年五月二十六日聖旨將有府界諸路人戶應見欠諸般欠負以十分為率每年隨夏秋料各帶納一分所有前後纍降催納欠負分料展閣指揮更不施行法册乃是五年五月二十五日聖旨八月初三日尚書省批戶部狀依申施行本部看詳人戶見催納逐年拖欠夏秋稅租贓賞課利省房沒官等錢物若不係因災傷許分料展閣理納之數自不該上條是日刑部尚書范純禮彭汝礪過都堂論列刑名劉摯謂近日斷勑下刑部連􅌳三案求貸凡獄既取旨則輕重出於朝廷有司議法則可駮特旨則非從來未有稽留制命曲求寬貸之事者純禮汝礪實始為之此事壞法惠姦别無義理此據劉摯閏月八日所記修入惜乎不載所􅌳三案是何事也二十六日壬午汝礪云云可考之乙丑戶部言在京諸炭場監官界終受納炭不及八十萬稱滿二年以上與理一任不滿並理元到部名次從之丁邜太僕寺言駝坊駝每年除差出死數及在京在牧月日外以實在坊月日積計紐算繫飼頭數十分為率比較從之戊辰詔西蕃鄂特凌古進奉大首領三十人與副軍主首領已有職名人與轉一資未有職名人與都虞候溫錫沁人下小首領依此推恩大理寺言軍人逃亡後強盜放火謀殺人若持仗竊盜滿二貫捕獲者配千里即因強盜謀殺人配充軍而犯者不以赦前徒罪皆配廣南流罪配沙門島重法地分人窩藏重法地分劫盜罪至死者配逺惡處冉犯者配沙門島盜者情重窩藏人當行處斬盜罪至徒流者配五百里冉犯者配二千里並許人捕給窩藏人賞錢之半知欲為強盜及持仗竊盜之情而舍食令得為盜及已犯而令得隱匿者盜罪至配本州盜應配者配本城即強盜係死罪重者配逺惡處冉犯者不以赦前後配沙門島從之刑部言墓田及田內林木土石不許典賣及非理毁伐者杖一百不以蔭論仍改正從之故知溪洞奉化州田忠猛男洪萬為銀青光祿大夫檢校國子祭酒知溪洞奉化州兼監察御史武騎尉己巳兵部言諸軍指揮各置籍細開將校軍人等姓名差使優重次數遇有差使委當職官躬親對簿點檢務均勞逸其因疾病權免者預日先差若限年合替者前期檢舉闕人者申轉運司於别州應副不檢舉差人或占留合替人及妄作名拘占及過限六十日不差者各徒二年每季州委官點檢具有無不當申州監司巡歷覆視失當者按舉禁軍則知州通判同共點檢從之庚午前朝奉郎直龍圖閣髙遵惠依前官職為太僕少卿遵惠執喪終制故有是命兼改鴻臚卿改為鴻臚卿在十八日左朝奉大夫集賢校理太僕卿杜常為河北路轉運使鴻臚卿杜純為光祿卿將作監趙令鑠為鴻臚卿尋改衛尉卿十八日改衛尉衛尉卿李杲卿為太僕卿十八日事今并此司農少卿王兢為將作監政目五年六月二十二日為農少八年三月四日王兢京西使御史中丞鄭雍言故事御史有闕詔本司薦屬官以正名舉職自官制初行御史中丞與兩省各舉按今兩省官屬門下中書與聞政事互舉既非故事省官體更有嫌乞止從本臺奏舉如或稱涉徇私即重行降黜詔御史中丞舉殿中侍御史二員翰林學士中書舍人同舉監察御史二員給事中舉監察御史二員以聞雍又言臣謂風憲之地責任所專儻使官屬多由他司所薦恐非朝廷責任之本意如未許本臺專舉且乞用故事專舉一次如以御史員尚少即用兩畨互舉之法詔令御史中丞更舉監察御史二員以聞更舉二員乃二十二日詔今并書詔今後管勾御藥院內東門司使臣年滿合該轉官未係皇城使者非有特旨不許改轉遙郡左朝議大夫光祿卿杜欣為直祕閣提舉鴻慶宫左朝奉大夫祕閣校理太常少卿盛僑為直集賢院知越州各從其請也僑尋卒贈絹百匹贈絹據政目九月二十二日事今附此辛未大理評事梁子竒言官員犯罪應坐舉主者乞今後會問合斷人依舊取勘定斷又犯罪者與大理寺曽薦舉之人乞本寺丞司直評事依元祐編勑被差檢法有嫌聽回避法許自陳差别官定斷從之壬申資政殿學士知永興軍李清臣知成德軍寶文閣直學士知成德軍謝景溫知揚州八年四月十八日清臣又以吏書復改知成德軍資政殿學士知揚州王存為吏部尚書實録在十七日今從政目御史臺言借用官物豫將事訖月日先報所借官司借出官物過元數事訖五日不回納者報所屬拘收從之新本削去左朝議大夫權工部侍郎李周為集賢院學士知邠州始周自陜西運使以太常少卿召遂權工部侍郎言者論周在陜西自便親黨周亦自請補外乃除集賢殿學士出守集賢院學士自官制行不復除周始為之尋詔集賢院學士如曽任權侍郎已上人充者班列在太中大夫之上周權工侍在去年十二月十八日班列乃閏月二十八日詔今并書李周舊傳云周與孫固厚善上即位固預大政詔為職方郎中新録辨曰大臣舉其類職也其人儻可用雖親故有所不避若周之召果出於孫固安知固非薦材而直以為與之厚善乎刪去十一字按周除職方郎中乃元豐八年九月九日也舊傳又云入權工部侍郎言者論周在陜西自便親黨固請外除集賢院學士知邠州凡恩數視待制自周始言者又論其因緣徼幸紊亂名器而朝廷未之改也新録辨曰按邵伯溫辨誣曰周自權侍郎出朝廷不欲與待制乃除集賢院學士集賢院學士自官制行不置奏薦恩例如修撰儀物如權侍郎所謂凡恩數視待制紊亂名器者本無是事特出私意詆誣合刪去三十字舊録又云紹聖四年坐所附會姦黨人同惡相濟追貶唐州團練副使新録辨曰姦黨同惡詆誣之常言合刪去六字邵伯溫辨誣云吕相不立黨門下士不能進用喜秦觀不敢除正官職創置校黃本書用之李周以熙寧中為監司元祐為省郎為太府卿權侍郎除陜西都轉運使不敢與待制除集賢院學士集賢院學士自官制行不置奏薦恩例如修撰儀物如權侍郎紹聖初章惇為蔡卞所劾以吕相除李周集賢院學士除秦觀校黃本書為罪責嶺表以死可傷也按大防當日被責何止此二事然二事亦惇卞所指耳太子太保致仕張方平辭免宣徽使恩命章四上詔可七月六日除使環慶路經略使章楶言前經略使范純粹奏慶州華池寨與華池鎮夾河兩城相去密邇枉費戍守財用乞廢罷華池寨只以華池鎮為寨臣竊見廢華池寨雖與華池鎮隔河相去稍近正當控扼西戎來路兩寨之南係一大川直入鄜延坊慶州界深慮緩急西賊冦邉遂可深入為害不細乞並存華池兩寨令寨主在寨監押在鎮通管仍分為東西寨從之癸酉詔三路保甲今後冬教五都保以下不及千人縣分作一月及千人或六都保已上分作兩月及一千五百人或十都保已上分作兩月仍須弓弩教場屋舍足備如有不備即依舊條先是逐路提刑兼提舉保甲司相度以併月聚教為便故有是詔大理寺言配軍並不許特行投換在京已投換者但犯杖以上罪並依元犯重數配出若自首并己投換充作坊工匠而犯杖以上罪非犯盜及餘犯情重者聽免從之甲戍太僕寺言與左廂根究利害魏公旦提點諸監司段綽詢訪鄆州東平監乞增置棚井候將來增添馬數申奏取旨又言衛州淇水監乞改為第一監養牧孳生羣馬復置第二監牧養調習雜犬馬二千匹並從之丁丑降授承議郎監永州鹽邢恕展一期敘恕責在四年五月二十八日此據政目增入戊寅户部言六曺寺監親事官若承送人及杖直獄子因違犯逃亡或已經勒停不許於本司冉投即元犯非情重者滿一年聽於别官司投名以理斷日為始經非次赦在原免而元不曾結斷者以遇非次赦日為始並狀中通具前犯因依年月召保二人取會舊司詣實當職官審量收係若隱落過犯或改易姓名於本司及别官司投名者杖六十保人知情與同罪不知情減二等許人告每名支賞錢一十貫從之新無己卯刑部言決大辟以刑名類聚每半年於春秋季以聞仍籍數至歲終比前一年所斷多少凖式造册限次年春季投進從之庚辰詔降授皇城使管勾舒州靈仙觀宋用臣與敘忠州刺史政目二十四日宋用臣敘遙刺九月四日范祖禹繳還今并祖禹奏議却係之二十五日給事中范祖禹封還詔書言臣竊以宋用臣凡所建置莫非害民大興土木無時休息陛下嗣位才及旬日用臣所領一切停罷京城之民無不鼓舞用臣所用縣官財物有司終不能計其多少之數隱盜出沒皆不可知此乃國之大賊民之大蠧所宜流竄遐荒以謝萬姓陛下初止用寬典今敘復遙郡刺史則州團練防禦使將來皆以嵗月次第還之何以懲戒姦宄之人伏望聖慈原其罪惡永不收敘詔用臣候今任滿日取旨先是吕大防與同列議南都宫闕不修可以五萬貫修之因移用臣為管轄鴻慶宫令措畫王巖叟密以短封告大防及劉摯曰若復使用臣預土木必動議論摯甚然之大防不答逾半嵗而用臣敘復卒罷之九月初四日寢敘忠州刺史之命今并書之吕大防欲令用臣修南京據王巖叟三月二十八日所録七年八月二十二日可考九朝紀事本末云吕大防劉摯朋黨戶部言災傷縣放稅及七分賑濟廪糧不足者令佐勸諭積貯之家減價出賣或以錢粟借與貧家乏人户雖有利息候豐熟日官為受理若猶不足者預具見在及約用之數奏聞從之壬午詔今後左右廂諸監使臣並依舊河南北監牧司敇令提點官奏舉是日夏人以十五萬衆入冦圍麟州及神木等寨諸將不敢與戰蕃漢居民為所殺掠焚蕩廬舍驅虜畜産甚衆先是知太原府范純仁聞熙河分畫之議久未決恐邉臣不守大信致西夏猜阻乃奏疏言伏見陛下臨御以來懷柔西戎恩德備至至於册封賜地皆出宸斷遂使纍年之間戎馬不能犯塞蕃漢生靈全活無數好生之德格乎皇天故使百榖屢登四海豐樂此帝王之盛事太平之大本也近日傳聞熙河邉臣分畫地界吝惜向來久廢寨地以為要害未欲給賜致其偃蹇不從以至未能罷兵邉事難了竊恐蓄疑敗謀事久生變萬一姦人間諜復致猖狂容之則虧損國威討之則前車未逺連兵不解勞費無期若或飢饉相因兵民之食則雖有智謀之臣未易為計如此則功虧一簣併棄前恩伏望陛下深留聖念特務逺圖不舍易而為難不以小而妨大檢會元約朝旨特賜允從遵孟子樂天之言稽虞舜舞干之德則天下幸甚臣受恩至重職與邉臣過計深憂不能緘默惟陛下矜憐曲加采納又言司馬光為陛下陳棄寨之策及後來換易生口并降賜封册臣實皆與其議昧者尚多不以為然至朝廷力行浮議方息今與西夏君臣體分已定惟有分畫地界所較不多若去城寨二十里內雖夏人無厭亦可以理開諭必肯依從以臣愚慮但恐邉將貪功生事不樂罷兵將去城寨二十里外聖恩已許給賜或向來用兵之時不曾保據之地指為要害却欲築城占守則虧朝廷大信誤國家前謀不可不察議者或謂夏人無厭與之必將更有邀求竊以祖宗朝兵勢國力尚因德明歸順賜以數州元昊稱臣加國主之號蓋欲安民息戰不以小利玩兵後來彼國果自服從亦何嘗更有干犯而况今日所損利害絶小惟聖明深慮昔樊噲欲以十萬橫行胸奴中季布指為面謾武夫邉將之言多若此類上誤先朝不少今可為鑑又言臣近入劄子為夏國分畫地界未定恐邉將靳地失信復致用兵所陳利害頗明必已上逹天聽近日伏覩樞密院指揮及諸路關報西人頻有點兵侵犯漢境或聞邉將多亦乘此希功先動恐至秋涼冉為邉患臣是以夙夜過憂不能緘默臣伏見陛下始與司馬光等議定大計今乃為邉將貪鄙之論沮害逺圖前捨四處已成之寨換易生口以示輕地愛人之德今乃傳聞復留兩堡從來不守之地冉起事端以招纒兵致冦之患昧聖君舞干之化進市道茍得之謀則其是非輕重不待詳陳蓋今日靳地之邉臣多昔年生事之黨類朝廷若不早悟必恐復繼前車將致聖恩無由下通天威不以義動生靈受弊後害難量臣之區區實在於此日近坤成節夏人進貢在庭若有所請不至乖悖伏望聖慈特賜寬納或令押伴宣諭所有地界早令分畫或邉臣未能宣逹朝廷詔旨有所不盡特許奏陳候朝廷相度指揮然後嚴戒邉臣分畫地界並依已行詔旨不得虧失大信别起事端則息民偃革指日可期天下幸甚臣前來所上劄子更乞檢會看詳特垂收采又真廟朝與契丹講和懷撫有道兩國情通小人不敢生事間諜今將百年生靈安帖自古和戎所未曽有今來西夏雖是小國亦未可輕况自興兵以來恩信未孚動生疑阻加以邉將慣得厚賞樂於生事邀功多是先自引惹却稱西人侵犯造起邉患朝廷不知致使逺人之情無由通達此風不除難得安靜伏望朝廷常加審察纍奏不報及是即引罪自劾乞賜譴絀又纍奏乃移河南十一月九日移河南十二月十八日降中大夫控范純仁行狀云熙河分畫地界邉將以兩不耕地為扼而不與以故持久不決公因上言臣與司馬光陳棄寨之策為陛下議地大計以示輕地愛人之德今將蓄疑敗謀復留兩堡之地將冉起事端以招後患望詔邉臣速令分畫悉依己行詔旨三上章並乞録示邉臣夏人犯麟府神木寨無所得而去朝廷猶詰責將吏公一無所辨纍上書待罪上曰無所得而去何罪之有公請不已曰非將吏失律乃臣之罪也人君賞罰必信不可為老臣屈乃不得已降公一官移河南府紹聖三年正月二十七日樞密院奏當考初刑部有劫殺人獄侍郎彭汝礪引例乞加貸配執政不以汝礪所言為是降特旨皆殺之汝礪執不可其一狀云臣看詳刑部自祖宗以來法與例兼行強盜殺人不分首從在法皆死強盜一次及盜殺人其非為首及元不曽商量殺人後來徒中殺人或殺人不曽見不曽聞不曽知或曽有悔戒之言在例皆貸前後甚多冉詳劉儉舊不曽為強盜後來受楊宗結架劫劉寶家財物到本人家等人出來劉儉為行得腳困於本處地上睡著財主劉談開門出來其楊宗刺傷劉談隨入堂前用槍刺傷劉清劉寶其楊宗把劉清等控縛時劉儉方睡覺入堂前劉儉叫道不要傷他人皆應前項一次強盜不為首及不曽商量殺人後來徒中殺人及殺時不見不聞不知及曽有悔戒之言合行貸放等例刑部一次具因依取指揮奉聖旨依斷後來又詳具因依申都省乞更詳酌指揮及刑部官至都堂巡白臣亦與同部范純禮至宰相處巡白皆不聽臣辭已盡臣力已竭無所可以關説緣今來刑部雖已付開封府施行緣須御史臺審察欲望聖慈深加哀恤特賜指揮下御史臺取索前後公案及體例仔細看詳取旨施行庶幾盡古人欽恤之慈全二聖好生之德上存祖宗之故事下安有司之分守或朝廷以臣所論不當雖坐流竄不辭其二狀云臣檢會近聞開封府奏軍人張全為殺死阿蘇合處死者臣伏念祖宗恩德博厚法令寬簡其風化入人也深故有司詳閲案牘上下皆以矜恤為事每有一事可疑議論反覆至於三至於四其言未嘗不從厚至於大辟必其無可奈何然後敢行其明謹用刑前代蓋未有也今朝廷一日萬幾不及細務其原察情實必不能如有司之深盡其間閲視案牘必不能如有司之詳其檢用條例必不能如有司之熟今有司皆以為不可殺朝廷必以為可殺是朝廷敢於殺人不敢於生之也朝廷好惡有司以為表其所行有司以為例上有好者下必有甚焉今朝廷議刑欲重則有司皆將以深入為事其弊可立待夫朝廷所行則有司便據以為例昔者強盜不與謀者貸今殺之強盜殺人而不與聞知者貸今殺之自此殺人不可勝數矣於二聖好生之德其為纍不淺此不可不謹臣恭惟太皇太后陛下大仁普施兼並天地雖一草木螻蟻猶欲愛全保惜况於人民哉伏望陛下茍有可生亦何所吝執政怒降旨責罰刑部官吏而釋汝礪不問汝礪言愚陋不習刑名之學貪恩冒昧動即顛謬臣竊詳元祐公式令諸奉制書及事已經奏而理有不便者速具利害奏聞臣以許萬等刑名繫於生死雖已得旨猶不敢決是致冉具狀申尚書省乞更賜詳酌指揮其議論多自臣始今來郎官人吏皆被責罰臣獨蒙免實所未安欲乞明正典刑以懲不恪臣見兼權吏部侍郎更不敢供職見居家聽候指揮又言臣比蒙恩差充皇帝賀北朝生辰使既已受命今臣以議刑不當已奏乞明正典刑以懲不恪乞照會改差官前去又言中書省奏上件申請未有體例臣檢會式令在前竊以謂天下之事雖聖人不能無失也失而能救之雖失而非失也故命令之出尚書省勘會中書省取旨門下省封駮若有不便有司得論蓋非妄也刑莫重於殺人今殺人有疑而不得議其為失大矣夫在下者肯與在上者辨甚難在上者能致在下者之言亦難今朝廷操是非擅禍福以臨有司蓋甚可畏使其有所辨也至或威之以責罰其誰敢有言哉今日有司守法至於特旨即非有司所當與決可否今殺人固大矣使事有大於殺人者而有失焉有司其可以不請乎今殺強盜一名而已使殺人多而有誤焉有司其可以不請乎又言刑部近凖戶部左曹闕凖􅎁斷罰官吏臣已具狀奏乞加貶逐除東南一差遣去訖緣逐項申稟各有情理因依及前後條例須致逐項開析除許萬已得旨貸配更不須開析外其張全劉儉雖有逐項罪犯然各有可憫情理今略具始末即知有司所申稟者非妄也張全母阿开自小為父所棄阿开不得侍養父死後方得母同居不分阿蘇將母阿高親去馬僕射家作衣飰被人非説以為羞辱及阿蘇鬬唆母要分離全存住不得自投河及自縊不死後因此殺死阿蘇比之故殺人其情不同又後來事未敗露能自言殺人情由及自叫收捉與興化軍施滿謀殺貸配例略同劉儉受楊宗結架初不曽計謀殺人逐賊到門外人少不敢行威力只在中門外等被傷主出來其劉儉為病腳因去彼睡著不至被傷主開門是劉談楊宗入中門殺傷人劉儉睡覺走入中門口稱道不要傷他人其被傷主亦聞此語自來強盜不見被傷主人各有例貸配汝礪前後凡五六奏不聽仍詔汝礪疾速赴部供職癸未閏八月二十七日汝礪又言臣纍奏乞特加貶逐不敢赴部供職詔令疾速赴部供職臣不肖既自失厥職更以愚誠上瀆至三至四栗然震懼寢食并廢臣伏念人臣之視其君其尊則天地也其親則父母也萬物無所逃於覆載人子不可一日去其親若夫愚懦不得其官鄙固或病厥事則下不敢自安上亦無所用矣冉念臣罪戾餘生加以病疾冒恩就職必不克濟惟皇帝太皇太后天地父母哀而憐之投諸冗散使得自省改畀賢才典司邦憲庶能奉法守以稱二聖好生之德臣雖屏廢蓋猶有補臣終不敢赴部供職見居家聽候指揮伏乞檢會纍奏施行貼黃稱臣頃以罪戾出知徐州後蒙恩賜還戴天履地未報萬一復此失職理當自劾使臣稍可以處何敢至於三四不恭為罪臣且自知將致人言復汙邦憲惟祈矜恤即賜允從後六日詔汝礪改禮部侍郎九月四日改禮侍今并書政曽肇志汝礪墓云自禮部徙刑部會有具獄執以為可殺汝礪以為當貸而執政以特旨殺之汝礪執不下執政怒舍汝礪而罰其屬汝礪言奉制書而有不便許論奏法也且非屬罪自劾請去章四上御史亦助之言遂并屬免罰汝礪猶未出冉徙禮部賜告其家御史助言并其屬免罰當考詳增入劉摯謂汝礪純禮壞法惠姦蓋猶指此事八月甲子可考甲申詔淮南路轉運司根治馬守珍交通趙君錫王鞏事狀以聞從右正言姚勔論奏也勔論奏在八月二十八日已載全書實録於閏月二十八日乃書其大略并下淮南運司根治指揮今别刪修仍存實録於後或移勔全章入此削八月二十八日所書十月六日鞏特衝替右正言姚勔言朝奉郎王鞏昨為揚州通判日以本州人吏馬守珍為腹心其後踰違發覺朝廷本下路體量是時鞏令御史中丞趙君錫以踏逐為名收馬守珍充御史臺人吏守珍即乞假往揚州為鞏營救竊以御史臺者朝廷紀綱根本糾正官邪之地而君錫身居侍從任中執法以彈劾為職不思正心奉上而與王鞏交通為姦潛結內外以欺朝廷不加懲創何以杜私枉之門詔淮南路轉運司根治以聞都水監言請諸路沿河隄堰物料聽相度緊慢多寡移那支用從之京東西路提刑司言諸路州軍公庫器皿什物等若不係年額錢物置到除遇造麴時月或物價乘賤闕錢支用委非假託侵使聽典質應副知州限任內抽收了當外其餘即不得於民間及抵當庫質當錢物如有違犯其干繫官吏依編敇以官文書質當錢物法科罪從之新削祕書監王欽臣乞差真靖大師陳景元校黃本道書每月支錢五千緡詔從之仍令祕書省具道書目録付陳景元據目録於道藏取索先校定成本供祕書省委本省官對校給事中范祖禹言臣竊惟祖宗置三館祕閣以待天下賢材公卿侍從皆由此出不專為聚書設校理校勘之職亦非專為校書也六經之書不可不尊孔氏之道不可不明至於諸子百家神仙道釋蓋以備篇籍廣異聞以示藏書之富無所不有本非有益治道也嘉祐中增置編校之官繕寫黃本自此書籍益廣充牣四館朽蠧相仍居中者固未能周覽而遍校也今又使道士陳景元校道書臣竊所未諭議者必曰漢成帝時劉向校經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校數術侍醫李柱國校方技今使道士校道書亦其比也臣竊以為不然漢之時以竹簡寫書在天下者至少非祕府不能備非如後世以紙傳寫流布天下所在皆有也劉向總校羣書非一人之力所能獨了故又用任宏等三人然兵書數術方技皆為有用非異端之學也任宏等非異教之人也今館閣羣聚天下賢材宜有殫見洽聞之士博極羣書乃使陳景元先取道藏之書校定成本供祕書省委本省官對校書皆取正於景元不亦輕朝廷之體羞朝廷之士乎又道書除老子莊列已立學官其餘多虛誕不經儒者所不道天下名山宫觀自有道藏館閣所藏惟備數可矣不必使方外之士讎校以崇長異學也漢武帝時董仲舒對策以為諸不在六藝之科孔子之術者皆絶其道勿使並進武帝感其言遂罷黜百家表章六經今館閣之書下至禆官小説街談巷語道聽塗説之所造者無所不有既使景元校道書則他日僧校釋書醫官校醫書隂陽卜相之人校伎術其餘各委本色皆可用此為例豈祖宗設館閣之意哉夫聖王作事必防其微命出於上不可不謹昔熙寧中王韶開拓熙河王安石使其門僧智緣隨韶誘説摩正時人號為安撫大師今館職之外已置校黃本官又於黃本之外有校書道士天下之人必謂之編校大師事雖至微實損國體祕書省所請乞更不施行祖禹自注此疏以閏八月八日上今附月末其從違當考詔罷少府監造皇后禮冠首飾御集閏八月二十八日
