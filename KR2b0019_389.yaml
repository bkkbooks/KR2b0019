body:
  text: 續資治通鑑長編巻三百八十五宋李燾撰哲宗元祐元年八月壬辰皇弟偲為武成軍節度使滑國公右司諫蘇轍言臣近奏言杜紘除右司郎中不當不䝉采納伏以紘文法俗吏才不過人昔以誦習偶爲法官天資邪佞能謟事宰相遂復致身刑部朝廷必欲量才授官已爲過分今一旦若為右司中外驚歎若止以人才猥下事無實狀臣亦未敢干凟朝廷紘昔在熙寧中手編害人之法今復為詳定親改其書俯仰隨時略不知愧頃與楊汲崔台符同在刑部所斷刑獄寃枉過半汲台符以此得罪而紘以此擢用同罪異罰十目所指至公之朝不宜有此臣以爲事干朝廷大體職在言責不敢不言今䝉置而不用竊料紘必有以自結大臣致誤此舉不然陛下何取於紘而擢任至此哉臣竊聞廟堂之論謂二十年來失於飬才臨事而求每有無人之歎如左右司吏户禮郎官左右史臺諫官皆用人之津梁侍從近臣之所從出若已踐此途而不致之清要則養才之地竟當安在若非其人而遂用之數年之後使杜紘為侍從則是更得一崔台符豈不爲天下笑哉伏乞稍取衆議追寢前命轍初奏已附七月二十八日所言訖不行癸巳朝請郎王諤為水部郎中西京左藏庫副使兼閤門通事舎人勾當御前忠佐軍頭引見司朱伯材任滿令再任詔出戰弓弩遇寒月各遞减一等斗力排垜給散其下等弓不得减過七斗弩不得减過一石八斗願請本等者聽新無詔太僕少卿髙遵惠計㑹工部及軍器監取索内外作坊并諸州都作院元管兵匠人數見造軍器名件及出産材料造作當據要用軍器酌中立為嵗課及上供年額接續應副支遣其餘非要切名件並令權住新無右司諫蘇轍言臣六月中與王覿上殿言張璪非次進用文及甫韓宗師欲結文彦博韓維為自安之計璪天資邪佞列位丞弼朝夕出入左右易以為姦宜斷自聖心以時除去䝉聖明洞鑒德音宣諭但以璪久經任使欲因其求退去之以禮比經兩月璪覺聖意稍緩遂端然據位不復自請臣竊惟璪性極巧佞遇事圓轉難得心腹昔王安石吕惠卿首加擢任被以卵翼之恩收其鷹犬之効與章惇等並結為死黨熙寧弊法皆璪等所共成就今二聖在上因民所欲降黜羣邪變革衆弊清净之風日月滋長獨璪仍在重位與聞大政不惟正人所共側目而璪之私意亦自不安但以同列無傾邪之助臺諫有彈擊之請是以見今且自歛戢未敢為非度其中心未嘗一日無窺伺之邪謀忘王吕之故黨也譬如蛇蝎遇寒而蟄盗賊逢晝而止及春陽發動暮夜隂闇故態復作誰敢保任陛下不可見其進退恭順言詞柔利而遂以為可用也如璪深心厚貌何所不至但使陛下君臣防閑少懈璪畧能援引一二邪人寘之要地則變故之出殆不可知矣况今新舊之政更張未定邪正之黨相持未决正是姦臣用智伺便竊發之時天下有識見璪任事誰不危懼如江河決溢初復故道惟日夜牢固堤防乃免於患若小有蛇鼠穿漏或能復奪河身況璪方爲執政乗釁而動其害必深臣聞璪意欲候過眀堂大禮求出補外惟陛下為社稷計順中外人心早從其請天下幸甚轍又言伏見舊法縣尉皆用選人自近嵗民貧多盗言事者不知救之於本遂請重法地分縣尉並用武夫自改法以來未聞盜賊為之衰少而武夫貪暴不畏條法侵漁弓手先失爪牙之心騷擾鄉村復為人民之患臣竊惟捕盗之術要在先得弓手之情次獲鄉村之助耳目即廣網羅先具稍知方略易以成功舊用選人雖未能一一如此而頗知畏法則必愛之使之出入民間於勢為便不必親習騎射躬自格鬬然後能獲賊也今改用武夫未必皆敢入賊而不習法律先己擾民訪聞河北京東淮南等路凡用武夫縣分民甚患之欲乞復令吏部依舊只差選人所貴吏民相安不至驚擾詔除沿邉縣尉依舊外餘並差選人詔在二十四日己酉今并書之右正言王覿言覿自注八月八日上殿劄子臣向者嘗有封事論吕惠卿在太原違赦出兵等事己䝉朝廷施行在惠卿罪惡固自不一然惟是違赦出兵於國家安危治亂所繫尤重臣於前䟽已嘗乞兼治經歴官司之罪是時臣以所聞出兵本末未甚詳悉故不敢繼有論列今竊聞去年二月二十七日劄子三省樞密院同奉聖㫖令陜西河東經略制置使司各選差近土兵官統制沿路將副兵馬若賊馬近邉屯聚審度賊勢擇利施行臣契勘去年二月二十七日正是神宗違豫多日人情憂恐之時不審三省樞密院如何得同奉聖㫖擇利用兵又三月十六日劄子檢㑹去年二月指揮擾耕是時令陜西河東逐路經略司選擇將官差兵馬三五千人忽徃倐來覔便討殺三省樞密院同奉聖㫖所有將兵使臣兵馬並須斟酌賊衆數目不須拘以三五千人相度多少將帯前去痛行討殺臣今契勘三月十六日正是神宗上僊二七日聖情哀痛之時不審三省樞密院如何同奉聖㫖用兵討殺伏縁其時三省樞密院臣僚七人内蔡確韓縝章惇張璪四人皆惠卿之死黨惠卿雖在外欲有所為則四人者合謀一意而莫之逆也其餘備員固寵之人安能獨正其事哉葢去年春間四人者專秉國政惠卿乗此時隂有所求無不如欲於二月二十七日既降擇利用兵指揮又於三月十六日復降不拘三五千人指揮惠卿乃得出兵二萬餘衆深入西界其意不過欲偶有㣲功則黨人可以援引庶㡬復至於大用而已非四人者居中用事敢為欺罔同惡相濟則其肆意妄為豈至於是哉故前項兩次朝㫖遍下河東陜西諸司而惟惠卿敢於此時大出師旅者恃其與執政大臣陰相為謀而無所畏忌也若確縝惇璪至今同在廟堂使得盡騁其凶徳則何所為而不可哉頼宗廟社稷之靈陛下奮發英斷罷確縝惇政事而置之外郡矣惟璪尚當重任陛下若不速去璪使得為姦黨之地則臣恐確縝惇璪内外交結之患不止如前日與惠卿廢赦用兵之事而已惟聖慈詳酌貼黄稱去年二月二十七日三月十六日三省樞密院取聖㫖因依陛下必能記憶大凡指揮邉帥用兵國之大事安危所係奏陳之際豈容草草元豐七年神考當國家無事之時其擾耕之兵尚限以三五千人今更不拘以數者葢惠卿欲之而己彼確縝惇璪委天下安危之計而徇其私黨豈以國家為恤哉况計其出兵既多則其為大事又可知矣若其時三省樞密院奏陳之際不為大事而僅同細務則璪等欺罔之情狀又可見也甲午占城國遣使入貢乙未詔開封府大辟公案應依斷者令本府依舊條申奏斷遣丁酉御史中丞劉摰兼侍讀十月十八日可考詔以鄆州處士王大臨為太學録以司馬光言大臨通經術嘗召不起故也大臨未及受命而卒太常寺言將來眀堂禮畢一皇帝於内中恭謝太皇太后外其百僚稱賀縁係在神宗皇帝服制内欲且依冬年例令百僚於内東門拜表稱賀從之詔陜西路保甲冬教並自十一月一日起教至次年正月終罷詔尚書省速差官據宋用臣見在錢物交割其前降㸃磨指揮更不施行㸃磨指揮在正月十四日當并去年十一月十四日參考右司諫王巖叟言竊以事付有司必有終始不容知其有弊而容之又不容含糊不以為䘏而縱之朝廷私一用臣則可而公法由是不行貪人由是不畏此於國家所損甚大陛下何惜不盡究其事使錢物有所歸著則用臣罪之輕重在陛下耳然半途而止則天下之人將疑陛下為姦人蔽惑曲庇用臣自壞大法伏望特賜睿㫖施行右司諫王覿言宋用臣操持利柄侵奪民財欺罔朝廷冐辱恩賞求之近世少見其比以至木工楊琰因縁其力累官以至西京左藏庫副使如專副張慥等數人元係軍將今亦為侍禁殿直用臣與琰等專爲姦利曽無忌畏擅用官錢有如己物臣訪聞自㸃磨以來眀見欺隠情弊及誤支失䧟者錢約一萬七千餘貫動使等物約三百餘件其未見歸著己行取㑹者錢約四萬四千貫蘇木等物約四十六萬餘斤未經㸃磨者尚多當去年春間條築京城之際朝㫖令遇旦望以酒食管設使臣而用臣取用酒食錢物送遺權貴及所親之人率皆贓狀灼見於文據其餘既磨未竟忽有前項敕㫖更不㸃磨公論深以爲疑愚臣尤所未諭朝廷若謂用臣所領錢物出納不眀勾考難見則惟其不眀乃惟勾考然後可以得其欺隐之實也況金部㸃磨已自有緒既見貪贓之狀理難中輟葢干繫人等皆是通同作過深畏㸃磨以致敗露故累經朝省乞造帳結絶今既差官只據見在交割即何妨且將文歴一面㸃磨以破其姦計今天下命官監主自盗計贓一疋以上即至除名而不用赦原陛下何獨私於用臣軰耶若用臣軰可恕即是陛下所恕者乃贓多罪大之人而所不恕者乃贓少罪輕之人也如此何以使法令公平人情畏服今朝廷持法雖有犯必行而無所屈撓如用臣等軰猶且公然冐犯若更撓法以惠姦邪則異日貪墨姦僻之吏稍有所挾者復何畏憚而不爲哉伏望聖慈指揮户部其宋用臣名下錢物除差官據見在交割外將文歴等依舊對行㸃磨其違法輙受送遺之人並付所司施行如内有合該赦原者所受物亦合依條追理稍為貪吏之戒三省樞密院言河東路經略安撫使司奏昨有河東路安撫使吕惠卿奏本路見管蕃兵不少自來未有部分其間亦有事藝淺軟或年已老弱恐緩急出入未得齊整臣差官依禁軍例團成指揮乞永逺遵守准朝㫖河東路令經略安撫司牒麟府路軍馬司相度利害聞奏本司牒麟府路軍馬司相度實為不便兼第十二將止是府州折氏下蕃部昨令折克行充正將外更添差到副將一員部隊將共一十五員其蕃軍遇上畨分擘在第六第八將副下隨正兵出入差使至下畨日各歸逐堡寨地分本家耕作今欲將本路蕃兵依舊堡寨管轄内府州蕃兵係折氏專一管勾外其麟嵐石州蕃兵并捉生更不𨽻屬將下各令本州知州提舉管勾應合差守把舗分等差使及緩急随將佐出入並依舊例所有元豐七年朝㫖内蕃兵捉生𨽻屬將下一節并當年十二月蕃兵團五指揮部分朝㫖乞更不施行及除折克行依舊兼帯第十二將外其副將并部隊將並乞廢罷所貴於蕃情邉計各得安便從之司馬光劄子勘㑹近嵗法令尤為繁多凡法貴簡要令貴必行則官吏易為檢詳咸知畏避近據中書門下後省修成尚書六曹條貫共計三千六百九十四册寺監在外又據編修諸司敕式所申修到敕令格式一千餘巻册雖有官吏彊力勤敏者恐不能遍觀而詳覽况於備記而必行之其間條目苛密牴牾難行者不可勝數昨者條貫初下吏部侍郎左選差注不行者數目不免再有奏陳復依舊法必料諸曹條貫皆有似此拘礙難行者今將特降指揮下尚書六曹委長貳郎官同共看詳本曹新舊條貫内有海行已有及全無義理於事無益防禁太繁難為遵守者盡令刪去惟取紀綱大體切近事情朝夕不可無者方始存留作本司條貫限兩月申奏施行從之舊録云三省言中書門下後省修成六曹條貫及看詳共三千六百九十四册寺監在外又據編修諸司敕式所修到敕令格式一千餘巻其間條目苛密牴牾難行者不可勝數欲下尚書六曹委長貳郎官同共看詳刪去本曹舊條已有及防禁太繁難為遵守者惟取紀綱大體切近事情者存留作本司法限兩月以聞從之先帝分釐六官下逮寺監諸司咸有職責法守未備人無遵承故分兩局立敕令格式内已有得先帝㫖頒行者官吏由是不相侵紊亦不能高下其手今以爲太繁改之雜録依此但削去先帝分釐以下等語今專取司馬光劄子其載左選差注不行事當考詔徳順軍靜邉寨置市糴場廣行收糴及令本路五州軍和糴場坐倉收糴官員并諸軍斛斗其和糴塲仍並用見錢糴買内坐倉收糴官員諸軍斛斗並召情願不得抑勒以户部相度到熈河蘭㑹路經制財用司所奏故也詔頒門下中書後省修到度支大禮賞賜等敕令格式并刪去共一百二十四册是日司馬光以疾作先出都堂遂謁告自是不復入朝矣此據吕公著家傳己亥給事中胡宗愈為太皇太后賀遼國生辰使客省副使李琮副之中書舎人蘇軾為皇帝賀遼國生辰使西京左藏庫副使兼閤門通事舎人髙士敦副之朝奉郎直龍圖閣守太僕少卿髙遵惠為太皇太后賀遼國正旦使左藏庫使李嗣徽副之朝散大夫司勲郎中晁端彦為皇帝賀遼國正旦使供備庫使楊安立副之軾辭行實録乃不書當檢附户部言欲支撥糴便司見錢二十萬貫應副河北路轉運司糴買從之禮部言自來大禮皇帝詣景靈宫太廟皆乗玉輅今來眀堂止詣景靈宫行禮欲乞依嘉祐故事徃回皆乗大輦又言自來眀堂前三日皇帝自内乗輦赴文徳殿御幄改服通天冠絳紗袍升御榻受百官奏請致齋訖降坐歸御幄今來皇帝就垂拱殿致齋本殿地歩隘窄陳設御幄外難以安置御榻欲請皇帝自垂拱殿改服乗輦赴文徳殿並如常儀俟百僚奏請畢却歸垂拱殿宿齋自餘幕次悉依令式陳設又言玉輅前導駕官並合依雜壓官次分左右前導更不於正任刺史下少絶别作一項並從之揚州言故大理寺丞魯有儀妻孟氏夫亡守志能𦵏夫之親屬凡七喪乞旌表門閭及加以封號詔特封旌徳縣君右司諫蘇轍言臣伏以朝廷典章百世所守因事變法為患常多祖宗之世使相節度不領京師官局其奉朝請必改他官或為東宫三師或為諸衛將軍太平興國中以趙普元勳自河陽還朝止為太子少保以向拱張永徳之舊並為環衛至今諸道鈐轄總管以防團歸老者亦以諸衛處之葢其遺法也至眀道中錢惟演以章獻皇后親嫌罷樞密使始以保太節度為景靈宫使治平中李端愿以長公主子以武康節度為醴泉觀使恩倖一啟自是戚里以節察居京邑不治事者肩相摩也然猶未見以罪降黜而以觀察團練享厚禄居謫籍者近日李憲以宣州觀察使提舉眀道宫王中正以嘉州團練使提舉太極觀二人貪墨驕横敗軍失律罪惡山積雖死有餘責聖恩寛貸皆寘之善地而又首亂國憲假以使名臣恐後世推壞法之始歸咎今日謂宜考修制度追還誤恩以存舊典且使罪人知有懲艾從違當考四月十八日李憲降觀察使明道宫是日王巖叟朱光庭入對延和殿巖叟進劄子論及人材之難上曰只為難得全者有材者無徳有徳者無材巖叟曰亦惟執政大臣湏當用材徳兼備者其餘各随合用處用之若當局務之任則用材可也若當獻納論思之地在陛下左右則湏用徳方可簾下甚然之光庭進曰才亦湏不害事者乃可用諭光庭曰卿言范祖禹亦聞其賢己用之經筵也又曰卿言杜純在河北事却為命己行又曰所言不當頻移易甚當然有不奈何須移者又曰漢世用人如所在有效即就加秩賜金予看京房論地震之變縁時郡國屢易人將迎太勞羣陽騷動此不可不審因奏以如近日移吕大忠淮南發運大忠關中事用之未曽見效却移東南非大忠所知此甚未當上謂巖叟曰卿言支移事每斗更納錢一十八文者甚好已令行也如此甚便巖叟曰支移雖有條然實支移則無可奈何若實不去而令納錢則極不可臣初言却只令本司分析本司分析必有一偏之理眩惑聖聽乞令别司體量上曰已有行遣也又曰青苖已罷巖叟曰此非陛下聖徳高眀何以能行天下幸甚上曰又恐國用不足奈何目下未覺五七年後恐不足巖叟對以此非陛下所憂青苗是困民之法今既罷之數年之後民將自足民既足國家何憂不足又曰太皇太后一身則得恐數年之後教他官家闕用不便巖叟曰陛下但自今日飬民比至歸政已成太平豐富之世矣却不湏如此過憂又曰今不可比祖宗時縁添起宗室百官不少國家所入却只這箇是巖叟曰自古國家有歴世數百年者何嘗逐旋増賦歛自然亦足上曰此則可知又曰今固不敢用兵然怎生不防他對曰勸陛下平日飬民力正為欲以防邉患也陛下若無事時困却民力不知緩急之際却於何處可取遂黙然既而又曰邉人多變詐何可保對曰陛下但務安静彼豈不願安靜頗然之巖叟又進曰天下有四民若四民各安其業便是國家富足之道今四民已安業矣自古人主志在富足則必致困民若志在養民則國家將自富意甚允納巖叟又曰天子不問有無諸侯不言多寡光庭曰孔子云百姓足君孰與不足巖叟又曰孔子言不患貧而患不安願陛下安心臣等方事陛下若他日於國家不便豈敢賛陛下行之上曰這箇則可知巖叟又進曰陛下若如此憂不足恐小人窺伺陛下之意妄獻功利之說以迎陛下陛下切不可信必誤陛下上曰這箇則不到得光庭曰放債富國終不是好事上曰此則可知上曰太皇太后在簾中何由知外事全頼輔弼得人及臺諫官公正言事巖叟光庭皆謝曰頼陛下聽納臣等所以得盡愚忠又諭曰卿等公正所言事皆好又謝曰荷陛下知遇愚忠惟恨不足稱副若有聞有見不敢不言巖叟又進曰臣累言姦邪之狀指張璪事皆有實狀陛下必經聖覽此人在左右不便上曰己曽諭卿自有時節不須更着文字對曰既有姦邪欺罔之事合逐旋奏知上曰如教蘇軾改張誠一告詞事誠一不孝怎掩得亦莫是衆家意巖叟曰不然只是此人黨惡諷諭中書舎人令不顯不孝事耳頼蘇軾不從故得告命眀白不然為姦人曖昩以失陛下懲惡本意陛下以此觀其心於正道如何上曰㑹得又奏曰更有事須合奏聞陛下令薦館職以廣人材即合上體陛下之心求賢而薦之却舉一無行極不佳之人臣前䟽已言之璪自不識之葢此人是起居郎林希妻弟因希干請故薦之以結希結希乃所以結林旦大臣若與臺諫官通私意交結共為欺罔陛下何由得知即憤然曰臺諫官比來要覺察大臣若共大臣做一片怎得遂復問曰甚姓名奏曰陸長愈曰舉做甚官又奏曰做館職國家清途將來要大用之人豈可薦此軰若是賢材則雖舉不妨也其實只是相交結大臣與言事官以私意相通是第一件不忠事言事官以私意交通執政大臣亦第一件不忠事如此則足可見得欺罔此事合奏聞恐陛下不知别做成大叚欺罔事將來於朝廷不便臣等亦是罪人其人見舉主首贓今却舉做館職初雖不出於同列意却既被他謾過後乃於理須却承當以此見用著姦人并好人壞了和法度壞了如王存之事是也臣乞陛下批出指揮令陸長愈更不得召試即姦謀遂破矣乃曰眀堂了必有文字待教去奏曰如此天下幸甚因啟曰臣聞璪燾清臣三人相結待同入文字求退此亦是姦謀必料陛下三人俱請則難盡從乞陛下㑹取此意問曰此三人如何答曰三人皆不可大用但安燾李清臣不及璪之巧上然之又曰此是如何地位如何名噐須是用天下有公望之人乃可陛下用一人要當百人之用也豈可用無狀之人天下何所仰望上曰朝廷得人則重對曰誠如聖諭朝廷輕重只繫用人得賢人則重得匪人則輕上曰極是光庭奏惠卿擅興兵事蔡確章惇等欺罔方先帝彌留何以畫聖㫖蓋要應副惠卿所以如此巖叟又曰先帝二七日晏駕太皇太后陛下正是哀荒之際作熟事進呈畫下聖㫖去興兵太皇太后曰恁時那裏理㑹得只做熟事來謾過巖叟曰據此何所不可為先帝待遇如此忍如此欺罔又憤然曰蔡確軰因甚教去巖叟曰幸頼陛下照見姦邪情狀太皇太后曰只為并王珪韓縝欺罔奏曰願陛下常在意姦臣敢如此欺罔不可用臨下又問曰早來言者甚長愈再對遂下又奏曰臣知言出禍來臣之所言觸怒取怨於大臣甚多然臣區區之忠既有所聞不忍不以告陛下惟陛下憐臣之直恕臣之狂臣死不忘報上曰甚知卿忠直此據王巖叟朝論増入吕大忠正月七日除陜西運副十月二十八日依舊陜西運副其間不見改除據朱光庭所云則大忠蓋嘗改除發運而實録失不載也政目亦不載大忠改除發運當考除發運當是謂蔣之竒在八月四日杜純以元豐八年十二月以權發遣河北運判為運副元祐元年七月二十八日改刑部外郎范祖禹八月六日以著作郎兼侍講巖叟他日又入對再奏張璪事曰臣知璪初八日曽留身自奏事必是肆其邪說欺罔聖聰陛下但察引過自咎者乃是君子推過與人者乃是小人臣料度璪必無自咎之語此陛下不可不察也上曰㑹得又奏曰太宗謂侍臣曰國家若無内患必有外憂外憂不過邉事皆可預防惟姦邪無狀若為内患深可懼也聖哉英主之言惟太宗知治道之本故能成天下之大治以遺累聖陛下固當求此心而師之上甚允納又奏諫官王覿今日言吕升卿詐稱先帝玉音事而升卿眀日已知盖璪以惠卿之故而私其弟密諭之使得奔走上公之門以自救此可見其黨惠卿之心也蔡確章惇欺君罔民之罪惡乃知璪無一事不恊力焉奈何不同四姦之竄上曰朝夕當有指揮庚子江淮荆浙等路發運副使蔣之竒言江淮荆浙六路捕到私鹽除官給鹽犒賞錢外更於犯人名下别理賞錢並依條先以官錢代支其逐州縣代支過轉運司者甚多無由納足竊計失䧟不貲以至未獲犯人先支三分充賞比以舊法亦復太多况舊法募賞已備足以禁止豈須枉費官錢以申無益之禁今相度欲一遵嘉祐勑告捕私鹽未獲徒伴即據獲到鹽數十分中官給一分充賞從之新本無此辛丑密州觀察使檢校司空駙馬都尉張敦禮磨勘為武勝軍留後尚書省言减六曹迂枉事受急速者限畫時餘次時付諸房如遇夜非急速者次日辰時六房受制書應行下急速者限三時遇夜次日已時非急速者次日未時及本省受内降已有御札指揮者事大者依元送中書省取㫖事小及急速者止尚書省具聖㫖劄子或批狀行下訖奏知仍關門下中書省照㑹即礙條於事未便者自當執奏從之監察御史孫升言近降朝㫖紏察在京刑獄司𨽻御史臺省察開封府奏斷公案乞許取索詔開封府徒罪已上公案依奏許取索壬寅詔内人張氏嘗侍皇帝藩邸日讀書勤謹特以為典賛夫人明堂禮儀使司言今左僕射免侍祠攝事合以右僕射誓百官於朝堂門下侍郎誓宗室於太廟刑部尚書於朝堂涖誓刑部侍郎於太廟涖誓從之太常寺言自來大禮行事執事官並服祭服非祠祭行事官並服朝服至元豐七年吕升卿請行事及陪祠官並服祭服今看詳應行事執事百官合並服祭服所有賛引皇帝行事禮儀使太常卿太常博士閤門使樞密院官進接圭殿中監縁係供奉皇帝其陪位官止係導駕押宿及管勾事務并他處行事官並合依舊服朝服從之癸卯通直郎充崇政殿說書程頥兼權判登聞皷院頥再辭之再辭據頥集從之當考本傳乃無此詔不帶職官充侍讀侍講崇政殿說書其請俸依職事官例支見錢頥在講筵嘗質錢使或疑禄薄問之乃自供職後不曽請俸尋詰户部户部索前任歴子頥言起草萊無前任歴子其意以為朝廷待士便當廪人繼粟庖人繼肉也即令户部自為出歴子户部初欲折支執政奏請館閣官皆請見錢豈有經筵反折支又檢例縁久無崇政殿說書故户部只欲與折支久之始給見錢詔户部員外郎劉昱詳定役法八月癸夘詔入内東頭供奉官勾當御藥院馮宗道見寄右騏驥使梁惟簡見寄文思副使宗道爲係隨龍惟簡久在太皇太后殿祗應各有勤績可與改寄正官並特除内侍押班更不簽書内侍省公事餘人不得援例入内侍省押班梁從吉久更邊任宣力居多特與轉遙郡團練使遷入内副都知昭宣使嘉州刺史内侍押班劉有方特除内侍右班副都知左司諫王巖叟言臣不知此事有舊例否若有舊例則可若無舊例特然今日如此則於事體有所未安公議有所未允臣須當爲陛下言之如宗道惟簡固小心謹畏兩宫有勤勞陛下欲推恩典以酬之理無不可然不循階級超越等倫而進之則於理未可使天下之人有以議陛下在彼之分復爲未安陛下寵之以非常不若愛之以徳愛其人不若循階而進其職使無人言乃所以愛之也乃所以寵之也一招人言使其享之不敢以爲榮居之不敢以爲安豈不反失陛下所以賞其勤勞之意邪臣以為若且令經厯御帶不久而又遷之其誰曰不可然不循階序超越等倫則人必驚異以爲非兩宫今日謹法度嚴紀綱以率天下之理恐天下之人竊有以議陛下者此臣之所以當言陛下亦自當惜也陛下誠嘉其人進而用之何爭數月之遲以全事體以息議論以成其人之美臣累日博聽外廷士大夫公論莫不同者非臣一人私見獨敢妄言惟陛下聴納幸甚貼黄稱若且依次序遷職而陛下特許其入内則無不可也臣竊料二人自以恩數非常必有辭免陛下若因其辭免聴之且令依次進職在上則主恩固在下則公議亦安又於其人終久進用無所妨害陛下一賜聴納而三善皆得矣九月十七日惟簡又遷官十一月二日蘇轍論惟簡遷官詔明堂大禮命嗣濮王宗暉爲亞獻髙密郡王宗晟爲終獻華原郡王宗愈爲太廟初獻節度觀察留後仲論爲亞獻觀察使世開爲終獻吏部言故駕部郎中王温恭乞致仕青州發奏留滯不及親受詔特與致仕恩澤詔河北路保甲見欠弓箭錢如係第四等以下户委經灾傷檢放今年秋稅並權住候來年夏熟日拘催詔今後三路委安撫司於七月八月間體量轄下縣分如灾傷約及五分即具保明以聞當議與免冬教又詔府界今年秋灾傷縣分具保明令提㸃司不以分數並闗保甲司權免今年冬教又詔今後朱崖萬安昌化軍令經略轉運司同奏舉大使臣充軍使兼溪洞廵檢到任得替並轉一官甲辰刑部言重法地分刼盗因按問首告减等依常法妻子不縁坐慮有已行編管者請令逐便從之先是户部言乞於尚書㕔置都拘轄一司又言舊三司所管場務官制行後並不曽差官㸃檢欲乞除依條所轄寺監季㸃外今後每季令本司檢舉牒本部郎官詣場務㸃檢具事理供申内有已經寺監㸃檢了當去處如有乖違不職其寺監所差官亦許郎官舉劾如不係本部所轄塲務亦依此闗所屬㸃檢訖報本部從之右正言王覿言户部所乞㸃檢場務係寺監季㸃外每季更牒郎官㸃檢即是每場務一歲之中郎官及寺監共八次㸃檢臣每見場務當所轄官㸃檢之時皆是預先數日㸃對簿書編排官物具截日見在之數書寫門牌以俟㸃檢未㸃檢間逐日如此於場務不無所妨而㸃檢官亦未必如期而徃偶爲他事所奪即更遷延其場務須經㸃檢了畢官吏方得自安又隨行人吏鮮不受賄或情屬於未㸃檢之前或酬酢於已㸃檢之後官司無縁禁察平時寺監一年四次㸃檢場務固已苦之何可更増一倍煩擾若於國家生財之道必有所係則非臣所知如但欲官物齊整簿書詳實則寺監一年之中四次㸃檢亦自足矣兼上條稱内有已經寺監㸃檢了當去處如有乖違不職其寺監官亦許郎官舉劾如此則郎官被牒請者雖未行舉劾之條而寺監畏舉劾者必爭爲苛急之事場務官吏何所措其手足况户部置拘轄司所以總領天下財用非止京師也督察諸路之場務則有州郡監司督責京師之場務則有寺監臺察若京師場務必須郎官㸃檢則諸州場務安得郎官而遍詣之耶臣竊聞舊來三司與提舉諸司庫務各差勾當公事官互換㸃檢一季每年亦只共四季㸃檢縁提舉司自是一司非三司所轄既三司自欲知所轄場務職事廢乃即差勾當公事官與提舉司官互換此處㸃檢理無不可今寺監已是省部所轄其寺監長貳等與郎官何異寺監逐季已㸃檢豈須更遣郎官且户部郎官所治皆劇曹其本曹文書多更四方利權諸路疑事指揮措置之間所繫事體甚大爲郎官者常苦日力不足故有稽違差繆之弊公議方且患之若逐季區區㸃檢本轄場務則又須分奪日力不免有所妨廢豈朝廷責任郎官之意所有前項郎官詣場務㸃檢指揮欲乞更不施行貼黄稱郎官專行文書寺監分治事務並係省部屬官其㸃檢場務只委寺監爲便若場務别有因依須至隔手㸃檢自可臨時别差官特行㸃檢豈須郎官逐季奔走以生煩擾之弊乞聖慈詳酌覿自注云八月十五日
