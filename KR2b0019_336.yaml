body:
  text: 續資治通鑑長編卷三百三十二宋李燾撰神宗元豐六年春正月丁丑朔御大慶殿受朝先是上以朝㑹儀物敝當改為詔閣門御史臺詳定朝㑹儀更造仗衛輿輅冠服至是始陳於殿既而儀鸞司夜半撤覆輅幕屋屋壞毀新玉輅上不懌久之乃詔儀鸞司監官衝替案大理寺問罪并案太僕寺殿宿官以聞後寺丞安宗奭王得君各罰銅三十斤衝替入內西頭供奉官王達殿頭李永吉各追一官罰銅三十斤勒停高品陳惟和追兩官勒停龎元英文昌雜録云除夜三更大風北來拔幕屋壞新玉輅入地數尺玉飾皆碎觀者駭愕與實録略不同舊紀書御大慶殿受朝始用新樂覆輅屋壞毁玉輅新紀但改覆輅屋作幕屋林希野史云元豐六年癸亥正月丁丑上御大慶殿受朝前此有詔重詳定元㑹儀比舊多所更易羣臣冠服佩綬廷中仗衛一新值慈聖上仙今始行之門下侍郎奏祥瑞舊有表辭中書省申明畫㫖令禮部撰表余首為之給事中陸佃押案至東階下侍郎章惇受以升詣御座前搢笏跪續上壽時百官未及班𫝊㫖屢促班始半上已升座三省官奔走而赴退易常服至內東門拜表余入省首拜此表舊五輅設於殿門外今設於廷中有司預設幕屋於廷東以藏輅命以是日四鼓出輅而除幕屋自三館便門輦屋木權置館中余質明先至廷中聞廡閒有人呻吟甚苦疑而不敢問也見廷中但設四輅而舊輅處己無屋見一物傾仆於地品目甚多尚昏黑莫能辨問守衛者何物云玉輅也中夜為屋倒所壞及朝㑹畢入館中正字鄧謹思館吏王元云昨夕宿直親開館門內其輦木至中夕有三中貴示拆屋方出四輅遽遣百餘人登屋而拆之昏暗中又去其旁支之柱以故屋摧而玉輅壞百餘人皆隕地折手足壞頭面號哭之聲喧然扶輿而出死者四人餘皆困重將死余出左扉尸橫屋道左以俟檢驗妻子守之而哭䝉紫袖衫即儀鸞司也本司官三人王逵李永吉陳惟和惟和最橫是夜以杖驅逼人登屋玉輅非太僕所藏上命宋用臣劉援於後苑新創者但用太僕駕士耳二丞王得君安宗奭自請入守宿中夜惟和逼之拽輅二人不從惟和遂撤屋急引四輅而屋隕矣上批付大理禁勘聽時斷御藥竇仕宣法服而侍立上受賀畢起入閣仕宣忽自御座踣於地跌其足冠佩狼籍扶歸不能起二事可怪按希所載甚詳國史太簡因附注此戊寅詔救護廣武掃官吏轉運副使向宗旦以下六人減磨勘一年餘人各减年升名賜帛有差己卯荆湖南路轉運司言邵州蒔竹縣接近芙蓉石驛未歸明溪洞各願納土乞增賜公使錢詔賜錢千緡兩紀並附年末詔造軍器及戰車所不𨽻御史上察壬午趙卨奏近西人齎到文字已具聞奏竊慮再遣人齎文字來界首堅要赴本司出頭未審許與不許收留詔如西人再將到文字仰繳連聞奏差來人留住聽候朝㫖續詔其留住人止作經略司意度不得稱聽候朝㫖密記六日事癸未詳定禮文所言祭之有蠟所以報萬物之成功然嵗之豐荒有異四方之順成不等則報功之禮亦不得一故記曰八蠟以祀四方四方年不順成八蠟不通歷代蠟祭獨在南郊為一壇伏請蠟祭四郊各為一壇以祀其方之神前期司農關有不順成之方不報其息民祭仍在蠟祭之後從之郊廟禮文載此事在元豐四年十月九日此從政和會要甲申白虹貫日兩紀並書乙酉詔晉州神山縣尉李茂昭除名坐部糧至鄜州道亡歸也詔聞新城四面濠溢毁公私舍屋土田委楊景略估直給之或還以官地其官營房及民墳寺舍屋責京城所管認撥移修蓋詔殿前司選習新法弓馬使臣五人以名聞於是本司以雷瑜等來上詔分差充提舉河北東西路保甲司勾當公事以教逐路保丁開封府言奉詔勘開封縣保正率錢祭神其被率人衆未敢追逮詔止以見禁人劾罪以聞提舉熙河營田蕃部司言蘭州及定西城新招弓箭手貧乏無種糧牛具乞貸錢十五貫與之俟墾地得榖償納從之仍增賜十萬貫己丑層檀貢方物層檀南海旁國也國城距海二千里海道須便風百六十許日晝夜行經勿巡古林三佛齊國乃至廣州國主名亞美羅亞眉蘭𫝊國五百年十世矣春冬暖貴人以好越布纒頭服土産花錦白疊布不服綾羅絹帛出入乘象馬官有奉其法輕罪杖重者死有稻麥粟胡羊山羊沙牛水牛駝馬魚犀象薰陸木香血竭沒藥鵬砂阿魏蘇合油真珠玻璃葡萄千年棗密沙華三酒交易用官鑄錢三分其齊金銅相半而銀加一分禁私鑄人語如大食國語新紀書己丑層檀入貢舊紀附年末詔鄜延路經略副使种諤管勾機宜文字汲光各罰銅三十斤蕃官劉永隆降一官朱忭等以赦原諤及經略使沈括輕信汲光奏將劉紹能遇敵不力戰與西人交通皆不實汲光妄信蕃官吹邁造作蜚語教令蕃部誣紹能事以狀告經略司及增秉常以所乘馬遺紹能姪永德以幸賞永隆坐賕支皆會赦勘官御史宇文昌齡言案發紹能自汲光始輕捐金帛巧設覘刺旬月之內告狀雜遝蓋皆自外不根之言未析端窽而光之用意隂有所幸故遂操而為實潤色張皇沈括輕聽易搖曾不以理推較遽憑其狀質於朝廷去年秋師招納之後繼為光說所閒官吏牽於希合證左不索其情然其閒所具欵詞尚有不奪其實而括之剡奏去是存非欲置之無疑以邀朝廷必信朱忭偷安曲從今有司推核首尾皆誣括為帥臣乞重行譴黜括先坐别罪安置故特責諤命已行門下省覆奏以為罰輕乃詔諤罰銅四十斤光仍衝替四年二月乙酉紹能升鈐轄五年四月甲寅遣昌齡鞫獄辛卯太子少師致仕趙槩卒年八十六贈太子太師諡康靖癸巳詔給事中陸佃中書舍人蔡卞看詳御史中丞舒亶論奏尚書省録目事案罪以聞先是亶奏尚書省凡有奏鈔法當置籍録其事目尚書省違法擅不録目既案奏而乃以發文書歷為録目之籍亶以為大臣欺罔而尚書省取御史臺受事簿亦無録目字亦奏亶為欺妄於是詔尚書刑部劾罪而御史翟思王桓楊畏言中丞按尚書省事不應付其屬曹治曲直故改命佃等二月戊午可并此詔御史六察罷上下半年更易法奉議郎駕部郎中王欽臣為陜西轉運副使專在本司前此轉運司言本司官法當分巡州縣嵗遍不敢留官在司凡有承受朝省文字不免於巡歷所在追逐故報上行下率多稽違欲乞自今常令一員在司主領職事故欽臣有是命甲午朝奉大夫直龍圖閣前知桂州張頡落職知筠州坐不能察蠻賊為冦會赦也頡三年閏九月除桂州五年七月替今責降按頡坐不能察蠻冦落職降差遣而本𫝊不書乃書陳被賞薄且云海外無事可謂疏謬矣徐禧弟祕言禧沒於王事所得二資官不忍受詔許之奉議郎魏綸權知吉州以上批吉州方推行鹽法緊要得人故也此據御集元祐初孫升有章乙未以魯國長公主子莊宅副使曹曄為右騏驥副使改為如京副使陳國長公主子宫苑副使王殊為東染院使崇儀副使殖為六宅副使衛國長公主子如京副使張秉淵為莊宅副使詔周漢以來帝王陵廟久闕修治其令州縣以陵地所入租課葺之兩紀並書詔修周漢以來陵廟詔諸路提㸃刑獄司各置檢法官一員尚書省言御史臺編一司敕於官制後違法請公使錢御史中丞舒亶直學士院日於官制後違法請厨錢臺察官朋蔽不言並乞付有司推治詔大理寺鞫之太府寺言畿邑抵當之法外路殊未施行今欲乞許將諸路常平司市易賖借錢寬剩錢五路各借十萬緡餘路各借五萬緡充抵當本錢從之河北提舉保甲司言都副保正多於教成大保長內選補係主教人員團教一都保人武藝方且責成又令管本都保公事應副州縣役使以至期㑹稽違必遭刑責不惟有妨主教恐非朝廷教養之意乞應合係本縣於本都保追呼公事止責承帖人計會追呼毋令親身勾當及管解赴縣從之丙申經制宜州溪峒西上閣門使果州刺史知沅州謝麟言昨具狀乞濟師討蕩建置城邑奉詔接納羣酋不得進兵巧以方略措置遂選差將官進屯控要縣寨招降元謀賊首羅世念并逐峒頭領種族四千八百人齎所劫溪峒都巡檢使印赴軍前衣甲器械二萬并生界思廣峒酋長具到人煙户千四百二十七口六千二百六十三納土歸順其傑黠酋首已付有司聽朝㫖措置兩紀書安化州思廣峒內附於嵗末詔謝麟領果州刺史减磨勘三年皇城使昭州刺史帶御器械和斌領榮州團練使知安化州及思廣等五十二洞首領羅世念為內殿承制䝉承想䝉全聖䝉光趙並為西頭供奉官䝉全呌䝉令件䝉懷忽䝉光速潘曹並為侍禁潘全劒為奉職並給俸與春冬衣初安化上中下三州及北遐鎮月赴宜州公參及中賣板木宜州嵗四管設及三嵗聽蠻人二百九十四輸所貢兵械於思立寨本州支給賞賜及其道費補知州奉職監州借職有官遷一資其班行則加勳皆宜州溪峒司施行前知宜州錢師孟通判曹覯擅裁損例册酒食不如舊買板木不及賈賞答貢物估賈虧其實遷補文字至五年不給故自五年三月侵掠省地經略司問致冦狀而宜州但以山稻不稔溪峒大雪牛羊死為言經略司亦不能察也其五月效用前如京使費萬戰死六月知宜州王竒戰死事聞詔以麟斌經制溪峒事以覯師孟屬吏焉世念兄弟兒姪百六人補西頭供奉官右侍禁披帶班下班殿侍令謝麟分擘於廣南荆湖路監當物務及指使去年九月庚寅可并此先是和斌為廣西鈐轄經略司委斌率步騎三千討羅世念當盛暑晝夜趣兵趨懷逺寨曰此要害之地得之則生矣或曰奈何背龍江邪斌笑曰此所以生也因示弱以驕之將士悉恐斌暇逸自如既兼旬乃大閲蠻人覘知兵少果大至斌親至營出俸錢為酒肉以勞諸軍曰吾雖老思效死以報國翌日見敵進退惟吾所視不如令者誅夜選將迎敵密戒以望敵則走衆聞報皆恐斌安卧不動凌晨報益急斌從容會食度誘之至平坂列八陳以待之張疑兵左右山上戒軍前賈販者瞰江壁立賊登佛子嶺見兵衆大驚斌分騎兵出其傍身不乘馬被甲步出䇿先鋒陳將士皆力戰蠻人大敗遣北遐鎮䝉利等求納欵時謝麟被命經制未至而斌已破賊矣或欲益兵進討開置城邑會朝廷以斌同經制事斌從容講畫進屯要害以圖撫納世念遂率其酋黨內附云此據曾布作墓志斌六年正月二十日為榮團二月二十四日為巡檢使八月二十四日知雍州西南龍蕃進貢使龍已達補保順將軍餘六十餘人各補將軍郎將有差丁酉詔陜西河東路常平倉糴價不得過轉運司河北諸司糴價不得過措置糴便司陜西轉運副使范純粹奏臣訪聞得本路州縣民閒甚有闕食去處及逃移過主客人户數目不少本司近行下體問虛實今先次據永興軍長安萬年兩縣及鳯翔府寶雞一縣共三處申到文狀已是逃移過五千餘户其餘州縣若供申齊足必是數目極多臣體問得蓋緣纍年不熟又自軍興以後調發雇率凋弊為甚而集教團教之法方此推行兼民閒以邊事未平妄意私憂加之向春闕食遂此流散臣愚不知所以救止之方深慮關陜根本益致殘弊所繫不輕伏望聖慈更賜採察如臣言不妄即乞詳酌特降詔敕丁寧撫諭及將團教集教之法住罷推行如朝廷相度更有可以安輯休養事件並乞聖慈特賜處分貼黃臣體問得集教團教去處內集教百姓除一身在官外不免别遣家丁往復饋餉其團教之人雖去家不逺亦於農作不無妨廢當凋弊流移之際欲其安輯休養則今來教法恐非先務臣愚不識忌諱誠以上體陛下愛育百姓之意不敢雷同坐視緘默避隱輒以狀上聞此狀係臣所辟管勾文字官胡僧儒書寫印發不敢付吏以防漏露如䝉施行只乞作朝廷訪聞內賜指揮純粹奏議乃六年正月二十一日發二十六日有㫖罷團教集教或因純粹奏也戊戌詔自今樞密院已得㫖事更不送尚書省具鈔徑送門下省覆駮訖自樞密院直下尚書省施行五年九月十四壬辰詔合參考詔右監門率仲蕝貸死除名依從黨例鎖閉坐令侍婢以藥粥毒妻夏氏死也詔太醫生八人四廂使臣各轄二人凡商旅與窮獨被病者録名醫治㑹其全失為賞罰法人月支合藥錢二千從兩浙轉運副使許懋請也大理寺言內侍黃門宋訪下直日闌入需雲殿裏幞被當闌入殿門私罪徒該赦原詔勒歸本院班己亥禮部言每嵗祀昊天上帝感生帝祭皇地祇神州地祇皆祖宗配序差中書舍人一員前二日詣太廟本室奏告或時闕員改差不逮看詳宗廟時享既用宗室攝事奏告亦用宗姓奉承廟享為宜從之太常博士何洵直言祀感生帝祭神州地祇以祖宗配而三獻奉俎官與祀上帝祭皇地祇不同臣伏請自今祀感生帝神州地祇並依南北郊禮神州之祭既當與地祇為一體謂宜致齊之內不游幸不作樂禮部看詳神州地祇感生帝視南北郊即有隆殺之節天地之祭自有著令餘乞且仍舊貫又言諸祠祭以禮部為獻官以户部兵部工部為奉俎官而吏部刑部無事於其閒非所謂官聨也臣伏請自今諸大祠除執政官宗室節度使以上為初獻官掌誓戒外餘以吏部尚書掌之仍以刑部尚書涖誓戒禮天神升烟惟親祠以百束為定制餘祀少者乃止一束而已每祠爝火熒然恐非達氣報陽以類求神之意欲積薪髙廣而燎之不必以柏欲依洵直所請從之四年十月甲子當考詔皇城使丹州刺史張藻左藏庫副使張永昌各遷三官賞出界獲級也詔涇原路經略司近西賊入隆德寨老幼牛羊橫見剽略乃是寨官不禀戒敕預為清野之計可械繫案罪以聞後寨主賈宗諒衝替巡檢張志等勒停餘監押以次各贖銅降官有差詔客省使王淵入內東頭供奉官勾當御藥院梁從政按閲開封府界第一第二將兵庚子樞密院上景福殿使武信軍留後入內副都知李憲磨勘詔憲昨坐拘欄商人貨𣙜買報上不以實雖該德音可展磨勘一年尚書省乞都司置御史房主行彈糾御史察案失職并六察殿最簿從之此年二月十六日甲子并政和四年九月二十四日丙申并合參對詔宗室非袒免親䕃補外官父祖俱亡年未及者於合出官年限內减半支本官俸從宗室令埤請也詔京東轉運副使吳居厚本路轉運判官闕具名以聞六月壬子除馬稱自今禁軍馬軍保甲教閲𨽻樞密院辛丑詔權京西路轉運使向宗旦權判官唐義問不能經營財利每有費用悉干朝廷職事不修各特衝替時上以吳居厚使京東財利豐羡故宗旦義問有是責詔廣南西路提㸃刑獄司劾本路轉運判官吳潛以聞潛妄奏交趾欲借米故也壬寅户部言凖朝㫖諸路提舉官散斂常平物可自行法至今酌三年之中數取一年立為額嵗終比較增虧今以錢銀榖帛貫石匹兩定年額散一千一百三萬七千七百七十二斂一千三百九十六萬五千四百五十九元豐三年散一千三百一十八萬六千一百十四斂一千五百萬四百二十二比較散增二百一十四萬八千三百四十二斂增一百三萬四千九百六十三元豐四年散一千三百八十三萬七千七百三十六斂一千一百九十七萬八千九百九十四比較散增二百七十九萬九千九百六十四斂虧一百九十八萬六千五百一十五詔三年四年散多斂少及散斂俱少處户部下提舉司分析以聞食貨志同但增自熙寧立法之初至元豐末凡水旱賑恤饑饉之財用取具至今賴焉今不取連州言軍賊李小八等持兵行劫詔委提㸃刑獄陳知和擇使臣選募勇敢一百人督捕詔權開封府推官祖無頗內東頭供奉官甘師顔各減磨勘一年以修治開封府界至滑州虜使道路畢也詔廣南西路轉運判官許彥先提舉常平等事劉何赴樞密承㫖司講議廣西峒丁依開封府界保甲集教團教法所用錢糧與經略轉運司計置工部言據都大提舉修護西京河陽黃河隄掃內殿承制李崇道等言凖都水使者范子淵牒已得㫖疏治廣武掃對岸石叫渡大和坡舊河分行水勢以紓南岸今欲自溫縣大河港開雞爪河接續至大和坡下武陟縣界透入大河分減得廣武掃水勢用夫四萬七千三百看詳欲依崇道所乞從之詔官司如轄下有申請並須明具合用條例行下不可泛言依條施行從提舉京西常平等事黃定請也以聽宣周氏為掌簿管勾尚書內省公事門下省駮奏福州威果十將鄭青以功轉副都頭妻詈母毆妻死中書擬杖脊刺面配五百里情輕法重不當捨功而專論其罪詔於副都頭上降兩資仍杖之上批聞陜西永興秦鳯兩路人户以連年薄收加之軍興調發人力不易往往逃移轉食者若不多方存恤必是轉加流亡及聞提舉保甲司見㸃擇團教及勾呼集教百姓亦是以方今邊事未息轉相驚疑藝成之後分戍極塞情尤不安兼近以轉運司未封樁闕額禁軍衣糧已降朝㫖第三番集教候封樁錢糧日施行訖以此人情財用目下皆施行未得可速降指揮仰提舉保甲司將已選擇在集教場見教人依舊教閲候事藝成就聽朝㫖按試放散外餘應兩路集教團教並權罷候邊事了日施行并合賑濟逃亡事件仰提舉司疾速體量艱食去處依條施行并下提㸃刑獄司遍巡轄下州軍體量見今彊劫賊盜除一面嚴緊捕捉外其未獲大數疾速聞奏此據御集正月二十六日事今實録朱本乃於是日書云詔河北兩路集教團教權停其艱食逃移户如法賑貸之朱本蓋不詳也二十一日范純粹奏云云此詔實施行之癸卯詔滑州通判蘇注修北使道路有勞其先緣小吳口決衝替可特免施州言乞詔置勇敢注籍依舊著業習學武藝應副緩急事宜從之太常博士何洵直言春秋遣官拜陵用牲牢俎豆具祭服行事殊不應禮謹案自秦漢即陵所為寢殿有事生之具今四時孟月朝獻景靈宫純用時王之制則與陵寢義歸一體伏請自今朝拜諸陵並薦牙盤食獻官常服行事又儀制令廟社宫門立㦸二十四六陵下宫乃藏衣冠之寢請依令立㦸從之荆湖南路提㸃刑獄司言被詔買修京城楠桑檀木等欲依河防例於民閒等第科配上批只令於出産處採買及置場募人結攬和買不得配擾乙巳上御崇政殿閲燕達所肄習殿侍七十人各步射一石四㪷弓上問能加力否皆曰願射一石七㪷力上令易弓皆引滿顧謂樞密都承㫖張誠一曰人材事藝大抵相若教幾多時誠一對曰半年上曰在教未久首能應格並與三班借職各賜袍笏銀帶沿邊指使上又顧燕達曰殿侍教者幾人達曰八十二人上曰在教者不獨殿侍八十一人中幾人為殿侍達不能對詔户部尚書安燾同本部郎官立省曹寺監新舊吏祿法宣德郎守大理正賈種民為吏部員外郎給事中陸佃繳奏吏部郎官實與選事非種民刑法之吏所宜冒處乃改駕部御史王桓翟思楊畏言前知沂州朝請郎董揚休授臣文字一卷指說京東路轉運判官吳居厚提舉常平等事彭持不公事乞根治詔揚休本京東監司案發衝替其說事又非干已可勿治詔西賊渡河直抵蘭州城下人數不少本州並不預知此乃候望之人全不得力委李憲一面行遣訖奏提舉河北保甲司言乞義子孫舍居壻隨母子孫接腳夫等見為保甲者候分居日比有分親屬給半詔著為令
