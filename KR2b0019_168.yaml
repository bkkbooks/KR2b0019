body:
  text: 續資治通鑑長編卷一百六十四宋李燾撰仁宗慶厯八年夏四月己巳朔封曩霄子諒祚為夏國主祠部員外郎任顓為冊禮使供備庫副使酸棗宋守約副之諒祚生甫三月諸將未和議者謂可因此時皆以節度使命諸將使各統所部以分弱其勢冀絶後患判延州程琳按判延州程琳薛應旗王宗沭續通鑑皆作陜西安撫使與此互異言幸人之喪非所以示國體不如因而撫之或請乘隙舉兵知慶州孫沔亦言伐喪非中國體上諾其言遂趣有司行冊禮然議者頗惜其失機㑹各以節度使授諸將以分弱其勢今何郯奏議有此不知當時復有何人當考程琳本𫝊又云朝廷既行冊禮夏人方圍慶陽琳止詔使於鄜曰諒祚貪此可紓慶陽之難乃具禮幣賜豫之數移報之果喜即日迎冊使而慶陽圍亦解按諒祚此時方自保不暇何敢更圍慶陽本傳必誤按附傳及歐陽修墓銘神道碑亦不載此事不知本傳何所據也今不取工部侍郎參知政事丁度數請罷御史何郯又言臣竊以朝廷正二府之名重大臣之選皆有副二以相參維或用之有勞固當進任或試之不效安可備員伏見丁度由近侍之班預顯用之柄列在三事于兹纍年而位望益隆才名益損但務保身而寡過曽無經國之逺圖况方講戎機動資廟略謀茍多誤事何以安度又素被輕媚之名殊非沉逺之量上無所益國體下不能服人心兹為具臣難處重任且用人當否繫國重輕執政之臣事體尤大不可以恩假不可以幸遷必須其材乃授此位材茍不稱則莫如闕焉伏乞斷在不疑退之以禮辛未度罷為紫宸殿學士兼翰林院侍讀學士從度之請也度罷以癸未今從百官表端明殿學士給事中權三司使明鎬為恭知政事文彥博自貝州入相數推鎬功故丁度罷而鎬代之壬申知澶州禮部侍郎王拱辰落翰林侍讀學士兼龍圖閣學士給事中栁植落翰林侍讀學士知蔡州知益州刑部郎中程戡落樞密直學士知鳯翔府右諫議大夫魚周詢落權御史中丞知永興軍並坐嘗薦張得一也癸酉給事中知蔡州吳育為資政殿學士知河南府先是御史何郯言朝廷新置紫宸殿學士代文明殿學士在資政殿大學士上班列絶髙未嘗輕授丁度既罷政遂䝉特除且兼侍讀之職聖意良以二府大臣於進退之間務推恩禮竊見吳育去歲罷樞密副使出知許州不聞顯過止改給事中一官况育才業於時少比使居學士之列適其宜也至今尚未䝉加一職名恐於待舊臣之禮殊未均一欲望存録舊德比丁度例加一職名所冀均行寵數敦奬材傑從之甲戌御從政殿閲諸軍轉員凡三日翰林侍讀學士户部郎中知永興軍葉清臣為翰林學士權三司使咸平末并三部為使官輕者則為權使公事康定初清臣已為權使公事今再領三司當為使而又為權使中書誤也自是遂分權使與權使公事為兩等此據㑹要又三司使舊班在翰林學士之上權使即與正同三司使結銜皆在官職之上及是宰相陳執中欲抑清臣降敇時移權三司使在職下結銜其後遂班翰林學士之下尋有論列者結銜雖依舊而權三司使初除閣門取㫖間有叙學士上者然不為定制此據沈括筆談祠部郎中天章閣待制張堯佐為兵部郎中權知開封府侍御史知雜事張忭言堯佐緣恩澤進用太驟非所以公天下不報河北轉運使兵部員外郎直集賢院杜把為天章閣待制環慶都部署經略安撫使兼知慶州把前平廣西蠻坐殺降賞不行於是把上言殺降者臣也得罪不敢辭將吏惟臣所使其勞未録臣不敢先受命因悉為行賞自曩霄既稱臣而數犯約抄邉邉吏避生事縱不爭把始至蕃酋䝉桑率衆千餘人內附事聞詔杞如約把言如約當還而蒙桑得罪夏人勢無還理遣之必反為邉患議未决夏人以兵入界求䝉桑䝉桑走自匿夏人遂殺邉户掠牛馬而求䝉桑愈急有詔責把把言彼違約舉兵䝉桑不可與因移檄夏人不償所掠則䝉桑不可得夏人不肯償所掠把亦卒不與蒙桑蒙桑事不在把始至時今附見不知杞果以何時至慶州程琳𫝊所言夏人圍慶陽或即指此也然必不與冊禮同時且近邉小小冦抄爾慶陽元未嘗被圍若慶陽被圍則關輔駭矣琳𫝊必誤今不取丙子再降知池州左諫議大夫張存知郴州坐嘗舉張得一也詔科場舊條皆先朝所定宜一切無易時禮部貢院言四年宋祁等定貢舉新制㑹明年詔下且聽須後舉施行今秋試有期緣新制諸州軍發解但令本處官屬保明行實其封彌謄録一切罷之竊見外州解送舉人自未封彌謄録以前多採虛譽茍試官别無請託亦只取本州曽經薦送舊人其新人百不取一封彌以後考官不見姓名即須實考文藝稍合至公又新制進士先試策三道次試論次試詩賦先考策論定去留然後與詩賦通定髙下然舉人每至尚書省不下五七千人及臨軒覆較止及數百人蓋詩賦以聲病雜犯易為去留若專取策論必難升黜蓋詩賦雖名小巧且須指題命事若記問該富則辭理自精策論雖有問目其間敷對多挾他說若對不及五通盡黜之即與元定解額不敷若精粗畢收則濫進殊廣所以自祖宗以來未能猝更其制兼聞舉人舉經史疑義可以出策論題目凡數千條謂之經史質疑至於時務亦抄撮其要浮僞滋甚難為考較又舊制以詞賦聲病偶切之類立為考式今特許倣唐人賦體及賦不限聨數不限字數且古今文章務先體要古未必悉是今未必悉非嘗觀唐人程試詩賦與本朝所取名人辭藝實亦工拙相半俗儒是古非今不為通論自二年以來國子監生詩賦即以汗漫無體為髙策論即以激訏肆意為工中外相傳愈逺愈濫非惟漸誤後學又恐後來省試其合格能幾何人伏惟祖宗以來得人不少考較文藝固有規程不須變更以長浮薄請並如舊制故降是詔五年三月己卯已詔貢院所試詩賦經義並如舊制本志以為楊察建議而實録但云上封者言新制不便不出主名八年四月丙子又下詔乃具貢院申請貢院申請即本志所書楊察初議也按察本傳察權判貢院初建此議當五年三月既已施行八年四月貢院復有申請其議則實察五年所建者但不知此時察仍判貢院或已罷爾今兩存之仍於此年依實録不出察主名本志又於此詔後書張方平知舉請下詔戒辭賦新體按方平以六年二月知舉夲志誤矣初詔外州發解到省差官覆考尋罷之蓋慮因此或致抑退寒士故也此據成都編録條貫册乃五月十八日指揮丁丑詔開封府畿赤諸縣丞主簿尉不許他處奏辟己卯契丹國毋遣左監門衛上將軍蕭惟信寧州觀察使趙為航契丹遣安逺節度使耶律章起居舍人知制誥史館修撰吳湛來賀乾元節辛卯置河北四路安撫使命知大名真定府瀛定州者領之資政殿學士給事中韓琦知定州禮部侍郎王拱辰知瀛州右諫議大夫魚周詢知成德軍先是賈昌朝判大名已兼河北安撫使矣昌朝判大名在七年三月初朝廷經制河北武備議者欲增兵屯程琳自大名府徙永興軍徙永興軍在六年二月上言曰河朔地方數千里連城三十六民物蕃庶川原平坦自景德以前敵數入冦官軍數衆罕有成功蓋定州真定府髙陽關三路之兵形勢不接召發之際交錯非便况建都全魏以制北方而兵𨽻定州真定府路其勢倒置請分河朔兵為四路鎮定十州軍為一路合兵十萬人髙陽關十一州軍為一路合兵八萬人滄霸七州軍為一路合兵四萬人北京九州軍為一路合兵八萬人其駐泊鈐轄都監各掌訓練使士卒習聞主將號令猝緩即成部分下其章判大名府夏竦議竦奏鎮定二路當敵冦之衝萬有一警各藉重兵控守要害迭為應援若合為一則兵柄太重减之則不足以備敵又滄州久𨽻髙陽關道里頗近瀕海斥鹵地形沮洳東北三百里野無民居非敵人蹊徑萬一有警可決漳御河東灌塘淀隔閡敵馬未易奔衝不必别建一路惟北京為河朔根本宜宿重兵控扼大河內則屏蔽王畿外則聲援諸路請以大名府澶衛濱棣德博州通利軍建為北軍路四路各置都部署一人鈐轄二人都監四人平時祗以河北安撫使總制諸路有警即北京置四路行營都部署擇任兩府重臣為之議未决夏竦入為樞密使賈昌朝判大名復命規度昌朝請如竦議惟保州沿邉巡檢并雄霸滄州界河二司兵馬自國朝以來於諸邉最號强徑今未有所𨽻請以沿邉巡檢司𨽻定州路界河司𨽻髙陽關路於是下詔分河北兵為四路北京澶懷衛德博濵棣州通利保順軍合為大名府路瀛莫雄恩冀滄州永靜乾寧保定信安軍合為髙陽關路鎮邢洺相趙磁州合為真定府路定保深祁州北平廣信安肅順安永寧軍合為定州路凡兵屯將領悉如其議惟四路各置安撫使焉兵志云凡兵屯將領悉如其議按竦及昌朝初議四路各置都部署等而河北安撫使仍以知大名者領之今四路各置安撫使非竦昌朝初議也蓋亦略增損矣故特表而出之韓琦言兵勢太分請合定州真定府為一路髙陽關大名府為一路朝廷以更置甫新不報詔四路兵依陜西遣部將往來按閲又詔自今戍兵回揀充捧日龍衛天武神衛等軍此並據本志云時契丹來議關南地朝廷經制河北武備按議關南地乃慶厯二年與程琳徙陜西不相關琳徙陜西則慶厯六年也今削去時契丹來議關南地八字實録於七年八月乙丑先書析河北為四路蓋誤也已削去甲午命權御史中丞楊察同定奪陜西河東銅鐡錢利害具六月末交州入貢以進奉使兵部員外郎蘇仁祚為工部郎中副使東頭供奉官陶惟權為內殿崇班仁祚等初來時未見丁酉降衛州團練使知澶州王德基為四方館使榮州刺史西上閣門使知保州王中庸為引進副使殿中侍御史劉元瑜罰銅三十斤並坐嘗舉張得一也初改文明殿學士為紫宸殿學士丁度罷政首以命之御史何郯言紫宸不可為官稱五月乙巳詔改舊延恩殿為觀文殿仍改紫宸殿學士為觀文殿學士班次如舊制乙卯兵部員外郎知諫院宋禧出為江南東路轉運使己未改荆湖北路禧雖罷諌職猶得為監司議者非之御史何郯言臣聞治天下者欲保邦於常安無他道焉其要在核名實别邪正而任之爾夫邪與正不相須治與亂不相逺用君子而消羣枉則治之表用小人而黜衆正則亂之階所以自古聖哲於治亂安危之際未嘗不丁寧切至以進君子抑小人為戒非其好惡有所偏蓋以邪正雜揉而進則國之興衰未可期焉民之否泰未可保焉故不得不辨明矣然知人之難歷聖所病雖遇睿哲之君不無奸慝之臣以堯之聖而其臣有毁信廢忠之害以舜之明而其臣有讒說殄行之惡然雖始失而任使終悟而放黜此二帝之所以稱聖明也以古揆今邪正之徒無世不有雖有邪僞而使之不能害理者其由人君公用舍而已伏見樞密使平章事夏竦其性邪其欲侈其學非而博其行僞而堅有纎人善柔之質無大臣鯁直之望事君不顧其節遇下不由其誠肆己之欺誣謂可以蔽明任己之側媚謂可以矯正犯紀律之所戒而不耻冒名教之所棄而不疑聚斂貨殖以逞貪恣不可格以亷耻之行比周權幸以圖進取不可語以忠正之方夫以此厚祿極竦之量可謂盈矣以此寵位稱竦之材可謂過矣而猶其求無厭其進不止動有覬望務為竒邪人之無良一至於此近者衛兵為亂突入宫掖變故之大可為寒心凡在職守失於防察責其慢官宜置大戮而竦只緣管皇城司內臣楊懷敏素與交通曲為掩藏欲以結納主憂於上而不為之恤民議於下而不知其非但欲私相為恩未嘗公議其罪所以致官司之責不均一賊黨之惡不究窮是謀為己利則慮深圖去君害則計淺居股肱腹心之任所舉如此不忠莫大焉今千百具僚皆謂懷敏失察賊亂只緣官責其罪小夏竦多懷顧慕不奮臣節其罪大今懷敏既黜而竦獨留中外之心無不憤激况竦兩以明恩進拜皆用清議改除衆口謂之姦邪聖心諒已諳悉棄而勿用兹謂至公而方且謂之有才任而不改其於含垢匿瑕則為過甚其於去邪除惡竊所未安且前代立法本為束縳有才姦邪而才必亂天下若不防之於始又何以救之於終况以陛下唐堯虞舜之資而監竦檮機窮竒之行置之有罪斷然不疑伏望陛下上為社稷之謀下慰臣庶之望與衆永棄示人不私豈不盛哉豈不快哉臣以孤生屢抗大議犯權貴而為私室之計則拙斥讒邪而為公朝之利則忠臣料夏竦知臣上言必是指臣為矯誣目臣為朋黨然竦明有過惡安得謂之矯誣臣素無附麗何以謂之朋黨竦若猶飾其過臣請面議其辜仰祈聖明俯臨肝膽當時言竦姦邪者必不止郯一人而郯𫝊獨稱郯言竦不可為樞密使又郯奏議有此章甚備故具載之辛酉樞密使河陽三城節度使同平章事夏竦罷樞密使判河南府言者既數論竦姦邪㑹京師同日無雲而震者五上方坐便殿趣召翰林學士俄頃張方平至上謂曰夏竦姦邪以致天變如此亟草制出之方平請撰駁辭上意遽解曰且以均勞逸命之何郯又言伏聞夏竦陳乞一殿學士職名且欲預在侍從緣朝廷進退大臣恩禮至厚竦之此拜已極寵榮安可更不顧亷耻冒有陳請况竦姦邪險詐久聞天下陛下特出聖斷罷免樞要中外臣子莫不相慶固不宜許其自便留在朝廷孔子謂逺佞人蓋佞人在君側則必為政理之害其夏竦伏乞不改前命仍指揮催促赴任從之夏竦乞殿學士職名留京師國史不見今據何郯奏議及郯墓銘附見給事中參知政事宋庠加檢校太傅行工部侍郎充樞密使壬戌樞密副使左諫議大夫龎籍為參知政事詔諸道非鞫獄而差知縣縣令出者以違制坐之其被差官據在外月日仍不得理為考時權三司使葉清臣自永興召還言所部知縣有沿牒他州而經數時不歸者恐假領之官不能盡心職事故條約之七年六月辛酉可考乙丑出殿中侍御史張經知蘄州以所上臺章荒謬也丙寅詔諸軍校營在新城外者每赴朝留其半以部勒士卒丁卯詔應中外官自今須滿三周年方許差替其在任三年及三十箇月者自如舊制見溢員處並罷之其俸祿仍不得越本官支給時營進者或不時滿遷去又在京多員外置官至有諸司副使請正使俸防禦使請觀察使俸之類故降是詔六月戊辰朔詔近臣舉文武官才堪將帥者以名聞壬申資政殿學士户部侍郎知曹州任中師為太子少傅致仕癸酉河決澶州商胡掃甲戌遣官祈晴丙子遣權發遣户部判官事燕度行視澶州決河庚辰詔轉運提㸃刑獄司自今體量所部官吏並須明指事狀以聞先是選人劉世隆因引對自言前為監司挾情奏衝替己而御史言在外貪暴之吏監司不欲盡發其罪止奏乞衝替致還銓得以為言故條約之壬午太子太師致仕徐國公張耆卒贈太師兼侍中諡榮僖耆為人重密有智數安佚富盛踰四十年家居為曲欄積百貨其中與羣婢相貿易有病者親為診切以藥賣之欲錢不出也所歷藩鎮人苦其擾子二十四人御之極嚴早見即令出就外舍得一既坐降賊誅可一後與羣婢賊殺其妻亦棄市己丑户部副使刑部郎中向傅式為太常少卿直昭文館知亳州𫝊式敏中第二子權三司使葉清臣言其庸陋不任事也河北轉運使刑部貟外郎直集賢院包拯為户部副使拯前自陜西徙河北才五浹日召入三司奏罷秦隴所科斜谷務造船材及罷七州所賦河樁竹索皆數十萬八年五月二日自陜西改河北六月二十二日除户副庚寅祠部貟外郎集賢校理張掞為河北體量安撫使壬辰帝語輔臣曰春夏久雨朕日蔬食夙夜禱於上帝儻霖淫未止當去食啜水冀移災朕躬然不欲使外聞之嫌其近名耳宰臣文彥博對曰今景氣澄晏實聖德感通也癸巳遣官謝晴給事中參知政事明鎬疽發背帝謂輔臣曰鎬忠亮有勞及其未亂思一見之是日臨問惻然曰方賴卿謀國事何遽被疾鎬氣憊猶能頓首謝甲午卒贈禮部尚書諡文烈鎬端挺寡言所至安靜有體而遇事不茍為世所推重乙未詔館閣官自今須經親民一任方許入省府及轉運提㸃刑獄差遣按宋史入省府下有及字今增入丙申司空致仕章得象卒故事致仕官乘輿不臨奠帝特往奠之贈太尉兼侍中諡文憲初陕西軍興移用不足知商州皮仲容康定元年十二月始獻議采洛南縣紅崖山虢州青水冶青銅置阜民朱陽二監以鑄錢既而陕西都轉運使張奎慶厯元年五月奎為陕西都漕知永興軍范雍慶厯元年五月雍知永興軍兼漕事請鑄大錢與小錢兼行大錢一當小錢十奎等又請因晉州積鐡鑄小錢元年九月及奎徙河東二年十月又鑄大鐡錢於晉澤二州亦以一當十以助關中軍費未幾三司奏罷河東鑄鐡錢而陕西復采儀州竹尖嶺黃銅置博濟監鑄大錢據實録在四年朝廷因敇江南鑄大銅錢而江池饒虢州又鑄小鐡錢悉輦致關中江池饒三州見元年十一月虢州未見當是范雍所議數州錢雜行大約小銅錢三可鑄當十大銅錢一以故民間盜鑄者衆錢文大亂物價翔踊公私患之於是奎復奏晉澤石三州及威勝軍實録云在五年日鑄小鐡錢獨留用河東而河東鐡錢既行盜鑄錢者獲利十之六錢輕貨重其患如陕西言者皆以為不便知并州鄭戬六年二月戬知并州請河東鐡錢且以二當銅錢一行一年又以三當一或以五當一罷官爐日鑄但行舊錢知澤州李昭遘六年四月昭遘知澤州亦言河東民燒石炭家有槖冶之具盜鑄者莫可詰而北敵亦能鑄鐡錢以易並邉銅錢而去所害尤大朝廷嘗遣魚周詢四年三月歐陽修四年四月分察兩路錢利害又數命官議正月己酉四月甲午於是翰林學士張方平宋祁御史中丞楊察與三司使葉清臣先上陕西錢議曰六月乙未關中用大錢本以縣官取利太多致姦人盜鑄其用日輕比年以來皆虛髙物估始增直於下終取償於上縣官雖有折當之虛名乃受虧損之實害救弊不先自損則法未易行請以江南儀商等州大銅錢一當小錢三案宋史食貨志三作二又言姦人所以不鑄小鐡錢者以鑄大銅錢得利厚而官不必禁若鑄大銅錢無利又將鑄小鐡錢以亂法請以小鐡錢三當銅錢一既而又請七月辛丑河東小鐡錢如陕西亦以三當一且罷官所置爐朝廷皆施用其言自是奸人稍無利猶未能絶濫錢也其後詔商州罷鑄青黃銅錢皇祐二年二月又令陕西大銅錢大鐡錢皆一當二嘉祐四年二月盜鑄乃止然令數變兵民耗於資用類多咨怨久之始定實録於六月乙未載陕西議七月辛丑載河東議今從本志并書之此月末秋七月戊戌資政殿大學士户部侍郎知并州鄭戬加吏部侍郎留再任尋改宣徽北院使檢校太保判并州初契丹與元昊方交兵邉奏互上獨戬未嘗以聞詔遣使問其故戬對敵自相攻中國不足憂也麟府間有棄城曰草城戬募土人為弓箭手計口給田自河東行鐡錢山多炭鐡鼓鑄利厚重辟不能止戬乃請以三當一令既下兵民相煽動數十人邀走馬承受訴承受中貴人不能遏又羣譟州門守門者拒不得入兵馬都監孫惟忠慮變起使人衣甲而持兵判官張伯玉謂曰此法亂非百姓亂也若縱兵殺一人則事不可平矣戬聞悉召至庭下推首謀者數十人黥𨽻他州張茂實傳云茂實為并代部署河東更鐡錢法人情擾惑兵相率至帥府欲訴閉門不納是日幾亂茂實䇿馬從數卒往諭之皆散還營按鄭戬𫝊則戬悉召至府廷與茂實傳不同今止從戬𫝊詔河北水災其令州縣募飢民為軍己亥右領軍衛大將軍果州團練使知夀州張亢為將作監知和州陕西轉運使言亢所易庫銀非自入故稍復遷之癸卯度支判官刑部員外郎周沆為直史館知潭州兼荆湖南路安撫使仍詔沆位提㸃刑獄之上若轉運使即以官敘之先是北軍戍湖南山溪者有再期乃代去多死瘴癘沆奏請皆以期年為斷詔可敘位乃八月癸巳今并書戍以期年為斷據本𫝊附見甲辰詔河北四路安撫司凡移用軍糧錢帛並牒報轉運司辛亥分遣內侍詣河北陕西河東京東西淮南六路募民獻薪芻授以官癸丑賜黃河役卒緡錢甲寅命河北都轉運使户部郎中天章閣待制施昌言都大管勾澶州修河事四方館使榮州刺史知澶州王德基同都大管勾通判澶州屯田員外郎張諤國子博士張士程同管勾修疊河口衛州言大雨水入城諸軍出城走避今數日絶食已借支七月糧而軍食未繼望特蠲除從之丙辰命馬軍副都指揮使武安留後郭承祐為澶州修河部署戊午加建武節度使庚申即以承祐權知澶州尋又加殿前副都指揮使遷殿副乃是月癸未今并書辛酉權發遣户部判官屯田員外郎燕度同知澶州兼管勾修河事甲子命翰林學士宋祁入內都知張永和往商胡掃視決河及覆計工料
