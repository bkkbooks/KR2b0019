body:
  text: 續資治通鑑長編卷一百二十八宋李燾撰仁宗康定元年秋七月乙卯詔臣僚赴官罷任所過山險之處量差軍士防送毋得過迎送人數之半丁巳詔諸軍戍邊其在營家屬並給以茶鹽戊午太常寺丞集賢校理李昭遘上太宗藩邸聖製三卷永熙政範二卷降詔褒諭癸亥鄜延鈐轄張亢上疏言舊制諸路部署鈐轄都監各不過三兩員餘官雖髙止為一州部署鈐轄不預本路事今每路多至十四五員少不減十員皆兼路分事權均勢敵不相統制凡有議論互執不同按唐總管統軍都統處置制置使各有副二國朝亦有經略使排陳使請約故事别創使名每路軍馬事止三兩員領之其已係路分部署鈐轄都監者且仍舊職並屬新置使處分所貴事出於一又涇原一路自部署鈐轄都巡檢及城寨所部近六十餘處多者五七指揮少者一二指揮兵勢既分不足以當大敵若賊以二萬人為二十溜而來多張聲勢以綴我軍然後以三五萬人大入奔衝則何以枝梧又比來主將與軍伍移易不定人馬强弱品配未均今涇原正兵五萬弓箭手二萬鄜延正兵不減六七萬若能預為團結明定節制迭為應援以逸待勞則烏合饑餒之衆豈能窺我深淺乎請下韓琦范仲淹分按逐路以馬步軍八千以上至萬人擇才位兼髙者為總領其下分為三將一為前鋒一為䇿前鋒一為後陳每將以使臣忠佐兩三人分屯要害之地若賊小入則一將出大入則大將出量賊數多少又使鄰路出兵而應接之此所謂常山蛇勢也今萬人以上為一大將一路又有主帥延州領三大將鄜州一大將保安軍及西路巡檢德靖寨共為一大將則鄜延路兵萬人矣原渭州鎮戎軍各一將渭州山外及瓦亭各一將則涇原路五萬人矣弓箭手熟戶不在焉昨延州之敗蓋由諸將自守不相為援請令邊臣預定其法賊寇某處則某將為先鋒某將出某處為竒兵某將出某處為聲援某城寨相近出敢死士某處設伏都同巡檢則各扼其要害又令鄰路將取某路救應仍須暗以旗幟為號昨劉平救延州前鋒軍馬陷賊寨者四指揮平猶不知又趙瑜領軍馬間道先進而趙振與王逹等趨寨門至髙頭平踏白馬報賊張青蓋駐山東振麾兵掩襲乃其子瑜也臣在山外䇿應未嘗用本指揮旗號自以五行支干别為引旗若甲子日本軍相遇則先者張青旗後者以緋旗應之此是干相生也其干相尅支相生支干相生尅亦如之蓋兵馬出入晝則百步之外不能相認若不預為之號必誤軍期又國家承平日久失於訓練今每指揮藝精者不過百餘人其餘皆疲弱不可用且官軍所恃者步人弩手爾臣知渭州日見廣勇指揮弩手三百五十人其弩力及一石二斗者才九十餘枝其餘止及七八斗正欲閲習時易為力爾臣以跳鐙弩試之皆不能張閲習十餘日僅得百餘人又教以小坐法亦十餘日又教以帶甲小坐法五十餘日始能服熟若安前弊而應新敵其有必勝之理乎又兵官務要張皇邊事劉平之敗正繇貪功輕進鎮戎軍最近賊境每探馬至不問賊之多少部署鈐轄知軍都監皆出至邊壕則賊已去矣蓋權均勢埒不肯相下若其不出則恐得怯懦之罪又諸路騎兵不能馳險要計其芻粟一馬之費可飬步軍五人馬髙不及四尺三寸者宜悉還坊監自今止留十之二餘以西川荆湖等路步人代之又比來諸班諸軍有授諸司使副至侍禁殿直者亦有白身試武藝而得官者諸路弓箭手生長邊陲父祖效命纍世捍賊乃無進擢之路何以激勸邊民且用兵以來屢出無功若一旦更議五路深入臣竊以為未可且山界諸州城寨距邊止三四百里西夏之兵雖器甲精利其如戰鬬不及山界今使敵人不得耕牧畏首畏尾周顧不暇可令步人負十日糧又日給米一升為湯飲馬軍給新粟四升草五分賊界草地亦可以半資放牧新粟堅凉可減挽運之半王師既行使嘉勒斯賚及九姓回紇分制其後此蕩覆巢穴必矣又言陜西民差配之苦數倍常嵗止如鄜州買駱駝驢騾牛羊紅花紫草橋瓦鞦轡箭翎白氊三事子羊皮裘牛皮筋角弓胎之類宜一切權罷仍令安撫司與逐州長使減省他役顓應邊上科率及乞遣殿侍軍將各三十人駝驢各二百留其半河中以運鄜延保安軍軍須物其半留乾州或永興軍以運環慶涇原鎮戎軍軍須物分轉運使一員専董其事又鄜州四路半當衝要嘗以間慢路分遞鋪兵卒之半貼衝要二路每驛得百人每三人挽車載物二百五十斤至三百斤若團併般運邊計亦未至失備而民可以寬矣初亢請乘驛入對詔令手疏上之其後多施用者乙丑遣刑部員外郎集賢校理同修起居注郭稹供備庫副使夏防使契丹告以方用兵西邊也議者謂元昊潛結契丹恐益為邊患故特遣稹等諭意契丹主厚禮之與同出觀獵延稹射一發中走兔契丹愕視契丹主遺以所乘馬及他物甚厚防守贇子也補京兆府僧道信為三班借職陜西都部署司指使本司言其習知邊事也丙寅權御史中丞栁植言中丞知雜舊舉三院御史而近嵗乃詔兩制舉之請自今復下臺舉官如故事從之己巳降捧日天武四廂都指揮使象州防禦使鄜州副都部署趙振為白州圑練使知絳州賊自正月攻圍塞門寨振代范雍守延州有兵七千八百餘人按甲不動寨中兵才千人屢告急五月初振始遣百餘人赴之寨遂陷振嘗語人曰賊乘新勝必徑進茍延州弗支則陜西未可量也方幸賊不至塞門雖危吾寧以大易小於是都轉運使龐籍劾奏振畏懦不出故坐貶自金明陷敗安逺塞門二寨在金眀之北振既不能救安逺遂棄之又移書塞門寨主髙延德曰可守則守不可守宜拔兵民以歸延德城守將半嵗振卒不救乃率衆棄城虜據險邀之與衆皆沒振移書延德此係據記聞振本傳稱振至延州謂將吏曰今賊乘新勝之始必徑進吾傷夷之後宜固守然慮諸城不能如吾謀茍延州弗支則陜西未可量此天下安危之機幸賊百日不至則吾備巳固不然驟至吾方以大易小未一月賊冦塞門按賊自正月攻圍塞門至五月陷之兵未嘗去而復來也范雍以二月二十八日貶安州振即自環州代雍度其至延州必三月間而塞門以五月十二日陷方塞門之陷振在延州已一月餘傳乃謂振至延州未一月賊復寇塞門皆非事實也大抵振實怯懦又延州守備未固恐兵出誘賊賊復驟至城下故不敢救塞門所云以大易小者振藉口爾而使臣猥信之且著論力為振地今不取但略存振語使後世有考焉庚午御延和殿閲諸軍習戰陳上封者言諸軍止教坐作進退雖整肅可觀然臨敵難用請自今遣官閲陳畢令解鐙以弓弩射營置弓三等自一石至八㪷弩四等自二石八㪷至二石五㪷以次閲習詔行之陜西河東河北路又詔教士不袵金革緩急不足以應敵自今諸軍各豫鎧甲十馬甲五令迭披帶又命諸軍班聽習雜武技勿輒禁止此據本志附見布衣吕渭李元振姚嗣宗皆上封事陳方略召試學士院壬申並授幕職官知縣渭真定人元振京兆人嗣宗華人也陜州言陜西副都部署兼緣邊招討副使耀州觀察使夏隨卒隨始受命上面諭曰方以邊事委卿毋得以父在機密為嫌時隨已病或勸須疾愈乃行隨曰邉事方急可以疾辭乎及卒贈昭信節度使諡壯恪遣中使護喪隨頗好儒學多從士大夫游雖在邊無戰功亦自嚴重寡過云乙亥太常博士陜西河東制置青白鹽使薛宥為監察御史時陜西都轉運使龐籍薦宥經度西鹽且請假要官以重其事朝廷既從其請因詔諸路自今毋得薦人求換御史前保信行軍司馬范諷為將作少監知淮陽軍丙子宫苑使逹州刺史河北安撫使髙志寧為西上閣門使知滄州初命志寧經度河北諸州軍城池為戰守備既而議者恐契丹寖有所疑故罷之韓琦墓志云本道有嫉志寧統制而故有此言今但從實録戊寅皇子初賜名昕授檢校太尉忠正節度使封壽國公置旌節於資善堂命端眀殿學士李淑典其書奏故事皇子封國公食邑三千户食實封一千户而中書誤封邑千戶實封三百戶翌日詔當制學士貼麻改正之是月以龍神衛四廂都指揮使眉州防禦使涇原副都部署葛懷敏為捧日天武四廂都指揮使鄜延副都部署八月癸未朔命翰林學士兼龍圖閣學士朝宗慤右騏驥使象州防禦使入內都知王惟忠齎手詔至永興軍與夏竦等議邊事宗慤傳云關中宿師久以宗慤安撫陜西與夏竦議攻守策實録乃無安撫之命當考乙酉太常丞田况為陜西經略安撫司判官試校書郎胡瑗為丹州軍事推官經略安撫司勾當公事况從夏竦瑗從范仲淹之辟也詔京朝官徙益梓利䕫四路而父母老疾或謀葬者詔權入近地監當賜修金明等寨役卒緡錢丁亥詔諸路罪人多犯徒情理重選少壯者刺配永興軍牢城候及三百人選置軍校團為威捷指揮教閲武藝分𨽻逐路部署司以備前鋒有能效命者加拔擢之又詔鄜延路諸兵戍守日久者令番休戊子改贈劉平為朔方節度使石元孫為定難節度使前贈忠武忠正皆非化外鎮凡初除節度使必先歷化外故也癸巳遣西京左藏庫副使段微明往視渭州房村掃及回河廟南摧墊隄岸仍規度修塞工料以聞陜西經略安撫副使韓琦言緣邊部署鈐轄下指揮使臣每禦敵皆臨時分領兵馬而不經訓練服習將未知士之勇怯士未知將之威惠以是數至敗衄昨諸班中選武藝優者為寨主監押然拘於一城未能各適其用欲下陕西都部署司分所試中人鄜延路十五員環慶涇原秦鳯路各十員為逐路教押軍陳以士卒所習精粗重行賞罰如此則老懦者不能自容勇壯者各思奮身復免主將爭占精兵専為已衛也又臨敵取勝必有竒兵若併力出攻則所向皆潰今士卒非無驍果膽力出於儕類緣分在逐指揮每指揮不過二三十人與中常之兵混而為一禦敵之際勢分力寡多為懦卒所纍雖欲挺身奮擊其可得乎欲乞委臣與范仲淹龐籍等分路於屯駐駐泊并本土領禁軍內選馬上使􅘫刀槍槊鐡鞭鐡簡棍棒勇力過人者為平羌指揮以五百人為額其衣糧如龍衛而立驍捷之上鄜延環慶涇原秦鳯四路各置兩指揮本路土兵一指揮屯駐駐泊兵士一指揮鄜延路屯延州鄜州環慶路屯環州慶州涇原路屯涇州鎮戎軍秦鳯路並屯秦州若已請龍衛以上請受者即以為節級若後來人闕即選試殿前馬步軍司龍衛以下諸指揮武藝有男力者補填之本路土兵止選就糧指揮其選中屯駐駐泊兵士聽三年一代仍令諸州軍揭榜以募投平羌者送經略司揀試給禁軍例物外别給錢十千絹十匹無馬者以牡馬給之詔都部署司相度以聞家𫝊云從之今據實録乙未刑部員外郎知制誥蘇紳為契丹國母生辰使西京左藏庫副使向傳範副之傳範敏中子也右正言知制誥吳育為契丹主生辰使東頭供奉官閣門祗候馮載副之右正言梁適為契丹國母正旦使西染院副使張從一副之從一耆子太常丞史館修撰富弼為契丹主正旦使供備庫副使趙日宣副之據富弼語録副使乃張從一非趙日宣也弼入辭便殿建言朝廷􅊖發京東西淮南江南荆南湖北兩浙福建廣南東西凡十一道兵以屯關中十一道兵素寡弱又遭此調發故關中得之未足以充而十一道之兵盡朝廷獨念京東鄰河朔京西接關陕此二道不可以無備遂遣使閲鄉民俾習武以代官兵東南九道則不之省伏思朝廷用度如軍食幣帛茶鹽泉貨金銅鉛銀以至羽毛膠漆盡出九道朝廷所以能安然理天下而不匱者得此九道供億使之然爾此九道者朝廷所仰給也固宜保守之今盡取其兵且不加保守一日乘虛盜起梗其津要則京師無故而坐困矣今九道大小一百三十餘郡若每郡皆宿兵固不可得也臣欲乞於九道中擇要害約十餘郡如泗揚升洪吉潭荆桂廣福杭越之類按地理相去均者於本處募兵大郡五千小郡三千以多補少不過四五萬人以東南百五十郡之冨豈不能贍飬哉訓為精兵勿復他役每郡置二督護專領之每道别置一都護經略之九道置一總統者居中以節制之如此則欲為寇者知朝廷有備豈不憚耶設有盜起則發兵有所濟師有地乘其未甚熾而撲滅之不為難矣又言京東西鄉兵要未足恃亦請擇要害數郡别募兵立帥如東南之制因歷舉隋唐巨盜以證其言執政謂弼不當引聖朝比隋唐昏亂之時遂寢其奏弼以八月受命十月入辭今附見戊戌罷天下寺觀用金箔飾佛像詔知桂州都官郎中任昊兼提舉廣南西路軍巡檢兵甲溪峒公事庚子禁陜西緣邊主兵官與屬羌交易犯者以違制論癸卯遣屯田員外郎劉渙使邈川諭嘉勒斯賚出兵助討西賊渙請行也渙出古渭州循末邦山至河州國門寺絶河踰廓州抵青唐嘉勒斯賚迎導供帳甚厚介騎士為先驅引渙至庭嘉勒斯賚冠紫羅氊冠服金線花袍黃金帶絲履平揖不拜延坐勞問稱阿舅天子安否道舊事則數十二辰屬曰兔年如此馬年如此渙溥詔已嘉勒斯賚召酋豪大犒約盡力無負然終不能有大功也渙所經行地理據筆談戊申宣徽南院使鎮海節度使同知樞密院事夏守贇罷為天平節度使判澶州守贇以子隨卒引疾求罷從之龍圖閣學士刑部侍郎權知開封府杜衍同知樞密院事工部郎中天章閣待制吳遵路為兵部郎中權知開封府己酉工部郎中天章閣待制知廣州段少連為龍圖閣直學士知涇州廣州多蠻徭雜四方遊手喜乘亂為寇敓上元然燈有報蕃市火者少連方燕客作優戲士女聚觀以萬計其僚請罷燕少連曰救焚不有官乎作樂如故須臾火息民不喪一簮衆服其持重范仲淹經略西邊薦少連才堪將帥故有是命命未至而少連卒於廣州矣少連通敏有才遇事無大小决遣如流不為權勢所屈上甚嗟惜之庚戌陜西經略安撫副使范仲淹兼知延州徙知延州張存知澤州先是諸將爭言攻取之策存以為殊方狂僣自古有之今大兵出征臣恐生民偏受其弊若元昊果有悛悔懷服之心無他邀求雖名號未正臣謂亦可闊略與其責虛名於外域曷若拯實弊於生民也乃自陜西都轉運使徙延州遷延不即行既至與仲淹議邊事乃云素不知兵且以親年八十求內徙仲淹因自請代存從之先是詔分邊兵部署領萬人鈐轄領五千人都監領三千人有寇則官卑者先出仲淹曰不量賊衆而出戰以官為先後取敗之道也為分州兵為六將將三千人分部教之量賊衆寡使更出禦賊賊不敢犯既而諸路皆取法焉賊相戒曰無以延州為意今小范老子腹中自有數萬兵甲不比大范老子可欺也大范蓋指雍云據范仲淹八月十八日奏議如京使鄜延都監朱吉第一將內殿丞制鄜延都監梁紹熙第二將供備庫使延州都監許遷第三將供備庫使延州都監周美第四將內殿從班閣門祇候延州都監鄭從政第五將西頭供奉官延州都監張建侯第六將辛亥詔范仲淹葛懷敏領兵驅逐塞門等寨敵騎出境仍募弓箭手給地居之壬子以益州草澤伊縝為試校書郎縝少倜儻不為章句學再舉茂才異等不中元昊反數上疏言事丁度楊偕薦其才召試學士院而命之延州都監周美言于范仲淹曰賊新得志其勢必復來金眀當要衝我之蔽也今不亟完將遂失之仲淹因屬美復城如故數日賊果來其衆數萬薄金明陳於延州城北三十里美領衆二千力戰㑹暮援兵不至乃徙軍山北多設疑兵賊望見以為救至即引去既而賊出艾蒿寨遂至郭北平夜鬬不解美悉衆使人持一炬從間道上山益張旗幟四面大譟賊懼走獲牛羊槖駝鎧甲數千計遂募禁兵築萬安城而還賊復寇金眀美引兵繇虞家堡並北山而下賊即引去此據周美本𫝊不得其時今附八月末賊再冦金明陳于延州城北三十里及出艾蒿寨它書皆無之范仲淹奏議亦不關載當考美以夏竦薦為都監實録在康定元年四月己酉九月甲寅􅉸州言河水泛溢壞居民廬舍丙辰遣三班借職杜贇諭西蕃轄戩族令出兵討賊工部侍郎參知政事李若谷以耳疾纍章辭位戊午罷為資政殿大學士吏部侍郎提舉㑹靈觀事宫觀置提舉自若谷始此據葉夢得石林燕語當考禮部尚書知樞密院事宋綬為兵部尚書起復翰林學士兼龍圖閣學士左司郎中知制誥朝宗慤為右諌議大夫並參知政事宗慤時使陜西未還㑹朝廷以金飾胡床金汲器賜唃厮囉宗慤言仲叔于奚辭邑請繁纓孔子曰不如多與之邑繁纓諸侯之馬飾猶不可與陪臣况以乘輿之器賜外臣乎必欲優其禮不若加賜金帛也龍圖閣直學士起居舍人權三司使鄭戩為諌議大夫同知樞密院事戩在三司才半嵗復轉運使考課格分别殿最又勾較三司出入得羡錢四百萬緡己未右正言知制誥葉清臣為龍圖閣直學士起居舍人權三司使事中書進擬三司使清臣不在選帝曰葉清臣才可用遂以命之清臣始奏編前後詔敕使吏不能欺簿帳之叢冗者一切刪去內東門御厨皆內侍領之凡所呼索有司不敢問乃為合同以檢其出入初三駕皆以待禮事而車駕近出止用常從以行議者以為近于闊略於是參知政事宋庠言車駕行幸非郊廟大禮具陳鹵簿其常日導從唯前有駕頭後擁扇繖而已殊無前典所載公卿奉引之盛其侍從及百司官屬下至厮役皆雜行道中步輦之後但以親事官百許人執檛以殿謂之禁衛諸班徑騎頗與乘輿相逺而士庶觀者率隨扈從之人夾道馳走喧呼不禁所過有旗亭市樓皆垂簾外蔽士民慿髙下瞰而邏司街使曽不呵止威令弛廢習以為常且黃帝以神功盛德猶假師兵為營衛蓋所以防違禦變也漢魏以降有大駕法駕小駕之儀至唐又分殿中諸衛黃麾等仗名數次序各有施設國朝承五代荒殘之弊事從簡略鳴鑾遊豫僅同藩鎮而盡去戈㦸旌旗之制非所謂旄頭先驅清道後行之謹也此皆制度放失憚于改作之咎謂宜委一二博學近臣檢尋前代儀注及鹵簿令於三駕諸仗內參定今以乘輿常時出入之儀比之三駕諸仗酌取其中稍增儀物具嚴法禁上以尊宸極下以防未然革去因循其在今日詔太常禮院與兩制詳定遂合奏諸班直禁兵步騎為禁衛仍舊數復增清道馬百佩弓矢為五重騎而執罕畢者一騎而執牙門旗前後四騎而執緋繡鳯氅二十四雉扇十有二皆分左右天武兵徒行者執柯舒親從兵增其數三百殿前指揮使增為二百並騎左右相對開二門門間容二丈以擬周禮之人門凡前牙門旗後後牙門旗前為禁衛輒入者論以法禁乘髙下瞰垂簾外蔽夾道喧呼馳走者頗著於令其後寖弛云柯舒字當考江休復雜志駕頭乃初即位御坐其詳具嘉祐六年七月詔天下商稅務今年所增稅物名件盡除之都官員外郎景泰為左藏庫使泰普州人元昊未反時嘗通判慶州言元昊雖稱臣奉貢然包藏禍心特未發爾今主將率任軍伍無長策而器械鈍缺士卒惰窳城池不修資糧無備一旦有警何以應敵三疏不報已而元昊果反泰復上邊臣要略二十卷平戎䇿十五篇於是有薦泰知兵者召對稱㫖故換武秩使知寧州詔開封府曉諭進邊事人所陳方略有可行者與恩澤外其無可采已行告示并給盤纒錢令逐便者自今無得復接駕進狀希望恩澤㑹要九月七日事庚申范仲淹遣殿直狄青侍禁黃世寧攻西界蘆子平破之此據奏議乃是月八日辛酉降知杭州天章閣待制司馬池知虢州池性質易不飾厨𫝊剸劇非所長又不習知吳俗以是謗譏聞朝廷轉運使江鈞張從革劾池决事不當十餘條及稽留德音坐是左遷始轉運使既奏池㑹吏有盜官銀器繫州獄自陳為鈞掌私厨出所費過半又越州通判載私物盜稅乃從革之姻遣人私請或謂池可舉劾以報仇池曰吾不為也人稱其長者賜陜西軍士羊裘初言者以塞下苦寒請以羊裘賜戰士三司計一裘用五羊皮聽軍士自製其傅毛者給次邊既而配率諸路每一羊皮至直五六千督取嚴急民甚苦之壬戌降龍圖閣直學士張存為天章閣待制諌官梁適言存初以知延州進職今既內徙澤州則前所授命當奪故也賜秦州小洛門採造物役卒緡錢癸亥降白州團練使知絳州趙振為太子清道率府率潭州安置鄜延部署鳯州圑練使許懷德為寧州刺史鈐轄文思使文州防禦使史崇信為資州圑練使供備庫使帶御器械王從德落帶御器械都監如京副使朱吉為供備庫副使賊既陷塞門寨執髙延德殺王繼元有軍士趙義者亡歸妄言賊嘗殺犬與延德誓使為內應振信其言奏之賊復攻安逺寨急振卒不敢救乃奏云五月己巳臣領屯兵延州北三川口㑹連日風雨使人覘候賊盛兵嘗在寨門而安逺路泥淖蓬蒿深至人腋又分兵渾州川等處絶官軍歸路臣恐賊乘虛襲延州遂令都監朱吉將所部兵屯金明臣以大兵屯魚家莊以備奔突既而經略司言振觀望逗撓請論如律延德繼元家人復訴於朝廷振時已責絳州未行再命侍御史方偕就同州勘問振罪當斬偕奏兵寡不敵茍出以餌賊無益也由是得不死而懷德等四人並坐不救二寨與振同貶詔自今都部署司應有寨柵申報賊寇入界不以多少逺近並須畫時救應乙丑詔河北河東路强壯陜西京東西路新置弓手皆以二十五人為團置押官四團為都置正副都頭各一人五都為指揮置指揮使各以階級伏事年二十係籍六十免取家人或它戶代之聽私置弓弩每嵗十月後正月前分畨上州教閲半月即遣歸農或遇非時勾集守城及捕盜賊日給糧二升嵗正月縣以簿上州州以籍奏兵部按舉不如法者實録所書太繁今用本志及朔歷刪修河北河東强壯事始見咸平三年及景德元年陜西河東弓箭手見建隆二年及景德二年京東西新置弓箭手當考丙寅詔陜西諸路部署司揭榜告諭凡經蕃賊圍劫軍民逃避末還者限百日於所在首身是日西賊寇三川寨鎮戎軍西路都巡檢楊保吉死之明日涇原路都監劉繼宗李緯王秉等分兵出戰皆失利繼宗為流矢中頥時涇州駐泊都監王圭將三千騎來援自瓦亭寨至師子堡賊圍之數重圭奮擊賊披靡獲首級為多叩鎮戎城請益兵不得城中縋糗糧豫之師既飽因語其下曰兵法以寡擊衆必在暮吾兵少乘其暮氣之衰可得志也復馳入有賊將持皂幟植槍以詈曰誰敢與吾敵者槍植圭胸而傷右臂圭左手以杵碎其腦繼又一將復以槍進圭挾其槍以鐡鞭擊殺之一軍大驚將引去㑹圭以馬中箭而還賊遂留軍縱掠凡三日聞涇原鈐轄知渭州郭志髙率大兵趨三川乃退三班借職郭綸困守定川堡得不陷劉璠堡本軍指使散直王遇弓箭手都虞候劉用以事急出降并陷乾溝乾河趙福三堡是役也官軍戰沒者凡五千餘人郭綸實録韓琦奏並作倫據蘇轍欒城集郭綸詩載綸守定川事差詳乃作綸字今從之韓琦奏王圭力戰事與本傳不同琦奏圭以孤軍千餘人本傳云三十琦奏圭中三矢而退本傳云圭傷右臂馬中箭而還今從本傳云賊一軍大驚遂引去圭亦以馬中箭而還按琦奏則圭退賊留軍大掠三日聞郭志髙援兵來乃引去恐傳誤也今從琦奏丁卯香藥庫使兼醫官使姚可久權落醫官使赴陜西體量蕃部公事姚可久事當考戊辰刑部尚書知樞密院事晏殊為檢校太傅充樞密使同知樞密院事保寧節度使駙馬都尉王貽永刑部侍郎杜衍右諫議大夫鄭戩並為樞密副使己巳涇原鈐轄四方館使端州團練使王仲寶為滁州團練使涇原部署庚午大理寺丞簽書定國節度判官事种世衡為內殿承直知延州青澗城世衡放兄子幼從放學任氣有才略嘗知涇陽縣里胥王知謙以姦利事敗法當徒遁去比郊赦輒出世衡曰送府則㑹赦杖其脊而請罪於府知府李咨奏釋之後通判鳯州州將王蒙正干以私不聽䝉正怒諷知謙訟寃而陰助之世衡坐流竇州徙汝州李紘宋綬狄棐等相繼為辨其誣久乃復官安逺塞門既陷賊東路無藩籬賊益內侵世衡言於范仲淹請營故寬州州西南直延安二百里當賊衝右捍延安左可致河東粟北可圖銀夏仲淹為請於朝詔世衡即廢壘興築壘近敵屢出爭世衡且戰且城初苦無水鑿地百五十尺至石而不及泉工以為不可穿世衡命屑石一畚酬百錢卒得泉城成賜名青澗世衡改秩主之世衡開營田二千頃募商賈貸以本錢使通貨得利城遂冨實間出行部族慰勞酋長或解與所服帶嘗㑹客飲有得敵事來告者即豫飲器繇是屬羌皆樂為用無定河蕃部抄邊率屬羌討擊前後斬首數百辛未追諡曹利用曰襄悼壬申環慶副都部署任福等攻西賊白豹城克之凡燒廬舍酒務倉草場僞太尉衙及破蕩恭邁等四十一族兼燒死土埪中所藏蕃賊不知人數及禽僞張團練并蕃官四人瑪魁七人殺首領七人獲頭級二百五十馬牛羊槖駝七千一百八十器械三百三印記六官軍死者一人傷者一百六十四人賊時盛兵寇保安及鎮戎軍福等自慶州東路華池鳯川鎮聲言巡邊召都巡檢任政華池寨主胡永錫鳯川監押劉世卿淮安鎮都監劉政監押張立同議入界以牽制賊兵庚午行至柔逺寨明日犒熟戶蕃官且戒以不得離席遂部分諸將以駐泊都監王懷政圍白豹城西面攻僞李太尉衙守神林北路都巡檢范全圍城東面守金湯路柔逺寨主談嘉震監押張顯圍城北面守伊實族路走馬承受石全正圍城南面駐泊都監武英入城福押大陳居城南又遣别將驅所犒蕃官行前自柔逺至白豹七十里夜漏未盡抵城下四面合擊平明城破縱蕃部軍人等掠焚巢穴委聚方四十里是日晚還軍諸軍既還賊遣數百騎襲其後范全設伏崖險賊半度邀擊之斬首四百級生獲七十餘人全開封人後改名恪甲戌詔三班院殿前馬步軍司曉諭使臣諸班諸軍有武藝謀略者並許自陳命翰林學士丁度西上閣門使李端願入內押班藍元用同選試之凡得一百八十人遷補有差從范仲淹所請也乙亥判吏部銓吳育言選人非監臨而受酒食藥物果茹計贓不滿足及賣買剩利非强市杖六十以下罪經兩任無私罪有舉主十人及因燕飲用妓樂犯偷盜者十年無私罪並許磨勘引見從之戊寅以保安軍北巡檢內殿崇班閣門祗候劉懷忠子化基為內殿崇班閣門祗候保安軍北巡檢初懷忠與賊力戰既陷化基請領兵襲賊故就命之辛巳御崇政殿閲龍衛軍士習戰陳擢材勇者六十六人各遷一資壬午陜西經略安撫副使韓琦以三川寨諸將敗書聞且言劉繼宗權本軍才一日李緯等未曽經行陳倉卒出戰遂至退衄望特免推鞫但量其罪輕重等第削官或更移降差遣責其後效王圭以孤軍摧鋒血戰鬬殺賊兵不少既身被重創尚求益兵出鬬軍中皆服其勇節失忘數多蓋衆寡不敵望貸其罪必能感勵奮身盡死為報從之鄜延部署葛懷敏出保安軍北木場谷圭年嶺襲西賊破之是月合奉宸五庫為一庫在延福宫內舊名宜聖殿五庫一曰宜聖殿內庫二曰穆清殿庫三曰崇聖殿庫四曰崇聖殿受納真珠庫五曰崇聖殿樂器庫於是合五庫為一改名奉宸仍鑄印給之
