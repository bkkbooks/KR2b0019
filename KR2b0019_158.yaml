body:
  text: 續資治通鑑長編卷一百五十四宋李燾撰仁宗慶厯五年春正月辛酉四方館使榮州刺史曹𫝊卒特輟朝二日贈保信節度使諡恭懷故事官非三品無諡及輟朝𫝊特以皇后兄故也甲子內殿承制宋守信為供備庫副使捕湖南蠻賊有勞也乙丑賜延州東路修復栲栳鎌刀南安承平四寨及保安軍新建順寧寨官吏役卒等銀絹有差丙寅以細腰城𨽻環州己巳三司言更造錫慶院乏材費多而敵使錫宴之所不可闕詔復以太學為錫慶院如故别擇地建太學甲戌右正言祕閣校理孫甫為右司諫知鄧州先是甫言陳執中不效數請補外不許帝嘗問丁度用人以資與才孰先度對曰承平宜用資邉事未平宜用才甫又劾奏度因對求大用請屬吏上諭輔臣曰度在侍從十五年數論天下事顧未嘗及私甫安從得是語度知甫所奏誤力求與甫辨宰相杜衍以甫方使契丹寢其奏度深銜衍且指甫為衍門人及甫自契丹還亟命出守度侍經筵歲久上每以學士呼之而不名嘗問蓍龜占應之事乃對卜筮雖聖人所為要之一技而已不若以古之治亂為監也丁度正傳云度對上言承平宜用資邉事未寧宜用才度時在翰林已七年而朝廷方用兵故對及此附傳又云朝廷方用兵事邉按元昊四年八月已進誓表邉事亦少寧矣而傳乃云方用兵事邉蓋誤也今不取然則孫甫所為劾奏豈以度承平用資之語若有所希合故耶附傳正傳恐因行狀墓志銘緣飾之辭爾不知度行狀墓志銘誰所作當考孫抃作度神道碑但云西師未解上問用人以資與才孰先云西師未解猶可也若云方用兵事邉則誤矣不知史臣何所據蓋不細考耳丁度指甫為衍門人或當附見四年八月戊午無以見任輔臣所薦者為諌官御史詔後然衍九月二十六日乃拜相此詔决不緣衍也罷河東陜西諸路招討使乙亥復置言事御史以殿中侍御史梅摯監察御史李京為之摯新繁人唐制御史不專言職故天禧初始置言事御史六員其後久不除至是以諌官員不足復除之今御史臺中丞㕔之南有諫官御史㕔蓋御史得兼諌職也丙子契丹遣林牙彰聖軍節度使耶律宗睦來告討夏人回先是元昊既敗契丹遣使進表獻俘詔却其俘而受其表及宗睦來知制誥余靖言朝廷受表却俘此誠欲敦示大體兩存其好也竊緣臣昨到契丹敵中君臣將元昊表狀皆示與臣其間亦有毁讟本朝之語但敵主佯詈元昊小人翻覆交鬬兩朝如此而已臣愚以為今亦宜使館伴宗睦者將元昊獻俘表示與宗睦兼言本朝不受所獻復令送還北朝之意使敵人知本朝聞其敗衄不敢分外邀求也樞密副使韓琦言朝廷已冊封夏國又契丹以西征回來告當此之時若便謂太平無事則後必有大憂者三若以前日之患而慮及經逺則後必有大利者一請略言之自羌人盜邉以來於今七年小入大至未嘗挫其鋒今乘纍勝之氣而與朝廷講和者得非凡軍興之物悉取其國人而所獲不償所費又久絶在邉和市上下困乏故暫就稱臣之虛名而歲邀二十萬之厚賂非為得計耶且契丹勢素彊而夏人尚敢與之抗若使其歲享金繒及和市之利國內充實一旦我之邉備少弛則有窺圖關輔之心此臣所謂後必有大憂者一也契丹昨以羌人誘致邉民遽往伐之既不得志而還見朝廷封冊曩霄其心必因不樂近諜者傳契丹國人語云往河西趨沙漠中所得者唯牛羊爾若議南牧則子女玊帛不勝其有臣恐契丹異日更有邀求或請絶西人之和以隳盟誓且河北兵驕不練忽爾奔衝則必震動京師此臣所謂後必有大憂者二也又昔石晉假契丹之力以得天下歲才遺繒帛三十萬今朝廷歲遺契丹五十萬夏國二十萬使敵日以富彊而國家取之於民日以朘削不幸數乘水旱之災則患生腹心不獨在二敵此臣所謂後必有大憂者三也昨契丹自恃盛彊意欲平吞夏人倉卒興師反成敗衄契丹之性􅋀於復讎必恐自此交兵未巳且二敵相攻者中國之利此誠朝廷養晦觀釁之時也若能內輯綱紀外練將卒休息民力畜斂財用以坐待二敵之敝則幽薊靈夏之地一舉而可圖振耀威靈彈壓中外豈不休哉此臣所謂後必有大利者一也臣願陛下深思去大憂而取大利則為天下之福今范仲淹富弼往河東河北經制邉事必有所陳然臣久在陜西敢陳陜西合措置事且鄜延環慶涇原秦鳯四路雖罷招討使而邉備不可弛請仍選有才望近臣為之主帥特降手詔委之久任使其經營一方以備羌人翻覆之變又四路所駐兵十分中宜留六分在邉二分令東還二分徙近裏州軍其鄜延路徙屯河中府環慶涇原路徙屯邠州永興軍秦鳯路徙屯鳯翔府逐路分鈐轄一員駐泊都監二員與逐處知州同行訓練而本路仍領之非有事宜不得輒抽動其徙屯軍馬處知州才望輕者請選人代之又逐路所抽就糧土兵請委逐路帥臣相度嵗分兩畨留一畨在邉一畨放歸本處不唯減節邉上糧草兼使無久戌之勞又陜西州軍經南郊賞給之後官帑例皆空虛今范仲淹若過陜西宣撫則又有軍間特支徒益所費若臣策可行陜西亦别無處置不必仲淹更往也復見諸路昨招置宣毅兵僅十一萬然朝廷物力未充何以贍給况閭里竊發自有巡檢縣尉可捕擊若防羣盜只當益屯一路都㑹之地不必每州盡要防守其宣毅兵欲乞除河北河東外其京東京西淮南兩浙江南荆湖福建等路每指揮可減以三百人為額後有闕即招填之今天下兵冗不精耗蠧財用陜西河東河北京東州軍已曽差官㨂選其餘路亦請選近上內臣分往㨂選所貴冗食可蠲而經費可給也上悉施用其言丁丑復郢州防禦使魏昭昞為鄜州觀察使滑州都部署戊寅施州溪洞蠻田忠顯等一百九十人入貢方物賜潤州草澤邵餗號冲素處士知州王琪薦餗守道邱園素有節行故也餗上表固辭許之此據㑹要庚辰右正言知制誥史館修撰余靖為回謝契丹使引進使恩州刺史王克基副之克基承衍孫世隆子癸未詔自今諸處官員因被彈奏雖不曽取勘責罰但有因依非時改移差遣者並四周年磨勘甲申命宰臣章得象撰御製傳法院譯經碑後記河東經略使明鎬言克胡寨捉生指揮使髙璘入西界誘僞團練使莽布賽十二戶內附請補璘為軍主從之乙酉右諌議大夫參知政事范仲淹為資政殿學士知邠州兼陜西四路緣邉安撫使樞密副使右諌議大夫富弼為資政殿學士京東西路安撫使知鄆州仲淹弼既出使讒者益甚兩人在朝所施為亦稍沮止獨杜衍左右之上頗惑焉仲淹愈不自安因奏疏乞罷政事上欲聽其請章得象曰仲淹素有虛名今一請遽罷恐天下謂陛下輕絀賢臣不若且賜詔不允若仲淹即有謝表則是挾詐要君乃可罷也上從之仲淹果奏表謝上愈信得象言於是弼自河北還將及國門右正言錢眀逸希得象等意言弼更張綱紀紛擾國經凡所推薦多挾朋黨心所愛者盡意主張不附己者力加排斥傾朝共畏與仲淹同又言仲淹去年受命宣撫河東陜西有詔戒勵朋黨心懼彰露稱疾乞醫才見朝廷别無行遣遂拜章乞罷政事知邠州欲固已位以弭人言欺詐之迹甚明乞早廢絀以安天下之心使姦詐不敢效尤忠實得以自立明逸疏奏即降詔罷仲淹弼是夕併鎖學士院草制罷衍而衍不知也自蘇舜卿等斥逐衍迹危矣陳執中在中書又數與衍異議蔡襄孫甫之乞出也事下中書甫本衍所舉用於是中書共為奏言諫院今闕人乞且留甫等供職既奏上頷之衍退歸即召吏出劄子令甫等供職如故衍及得象既署吏執劄子詣執中執中不肯署曰向者上無明㫖當復奏何得遽爾吏還白衍衍取劄子壞焚之執中因譛衍曰衍黨顧二人茍欲其在諌院欺罔擅權及臣覺其情遂壞焚劄子以滅迹懷姦不忠上入其言故與仲淹弼俱罷衍為宰相才百二十日也丙戌工部侍郎平章事兼樞密使杜衍罷為尚書左丞知兖州制辭略曰自居鼎輔靡協巖瞻頗彰朋比之風難處咨謀之地顧羣議之莫遏豈舊勞之敢私學士承㫖丁度之筆也明逸疏據墨史本傳得仲淹遽上謝表據記聞然司馬光蓋之龎籍或未可信更須考詳出陳執中譛衍亦據記聞然蔡襄以去年十月十七日知鄧州恐中書所奏但乞留甫不及襄也或襄雖已有除命猶未去京師故中書乞并留二人更須考詳仲淹謝授邠州表云詔㫖復從留居丞弼之位表章再露願陳邊徼之機疑仲淹再表必是請對故章得象之譛遂得行也樞密使工部侍郎賈昌朝依前官平章事兼樞密使宣徽南院使兼樞密副使保寧節度使王貽永為樞密使資政殿學士給事中知鄆州宋庠為參知政事上既罷范仲淹問章得象誰可代者得象薦庠弟祁帝雅意屬庠乃復召用之翰林學士禮部郎中權知開封府吳育為右諌議大夫龍圖閣直學士左諫議大夫知延州龎籍並為樞密副使時西北邉事甫定育因上言今夏人納欵契丹講盟朝廷為息肩之計則可未足恃以為安也議者必謂二敵相攻乃中國之利臣謂不然二敵連兵士馬益練一敵幸勝則氣驕而勢橫别啓貪求必致生事又元昊殘忍使無北患則跳梁西陲難保安靜此深可虞者今邉警既息正當孜孜以前事為戒後事為念申飭二府講求經武備邉之策敵國聞之可彌患於未萌也育初尹開封范仲淹在政府因白事數與仲淹忤既而仲淹安撫河東有奏請多為當國者所沮育取可行者固執行之育言因本傳附見二月己亥先是田况言比來災咎頻仍蝗潦繼作陛下責躬引咎不遑寧處以至躬祈道佛並走羣望薰祓之意可謂至矣然觀當世之弊驗致災之由其實役斂重而民愁和氣傷而沴作役斂之重由國計之日窘國計之日窘由冗兵之日蕃今天下兵踰百萬比先朝幾三倍矣自昔以來坐費衣食養兵之冗未有如今日者雖欲斂不重民不愁和氣不傷災沴不作不可得也昔董仲舒劉向謂春秋所書螽螟之災皆政貪賦重之所致今陜西河東河北三路民玩弊人共知之臣不復言矣且以江淮之間言之今江淮菽麥己登而官責民輸錢數斗之費不供一斗之價物遂大賤而農傷稅絹已輸矣民間貿易無餘而暴令復下又配市之織絍之家寒不庇體而利盡于畜賈纍年以來刻剝不已民間泉貨皆以匱竭其他百色科調峻法爭利不可勝言傳聞東南之民大率中産以下往往乏食民之愁窘致傷和氣如此而未聞陛下與兩府大臣議所以救之之術乃欲以一爐香數祝板上塞譴咎此臣所以不得已而言也夫國家所養之兵其上者戰其下者役茍不能堪此則為冗食於諸路宣毅廣捷等軍其間孱弱者甚衆大不堪戰小不堪役逐處唯欲廣募以邀賞格豈復顧國家之利害哉宜分遣幹臣㨂選諸路宣毅廣捷等軍其不堪戰者並降為廂軍其廂軍之不堪戰者並放停議者必曰兵驕久一旦遽加澄汰則恐立以致亂此慮事者之踈也且孱弱之兵既不堪戰則勇彊者亦耻為伍去年韓琦汰邉兵萬餘人豈聞有為亂者今天下財用不足以贍冗食之兵尚或顧恤細故不思求弊之原臣竊憂之唯陛下財擇實録繫况此奏三年七月癸未蓋誤也按三年但旱未見蝗潦又韓琦三年八月始為陜西宣撫使汰邉兵况安得於七月遽言之若謂琦去年已汰邉兵則二年邉備殊未撤也琦家𫝊載汰邉兵事亦在三年冬實録誤審矣按五行志四年京師旱飛蝗蔽天實録於七月戊午乃書雨自後亦不聞水潦為災四年七月况遂出使河北當考不知竟用何時奏此五年二月始遣使汰諸路兵恐緣况此言也今附見正月末更詳之二月戊子朔分遣內臣往諸路選汰羸兵宫苑使周惟德京西路北作坊使武繼隆淮南路東染院使任守忠兩浙路供備庫使陳延逹江南東路左藏庫副使王懷正江南西路內殿承制張志福建路黃元吉荆湖南路供備庫副使盧道隆荆湖北路諸州宣毅軍過三百人者無得更募用韓琦議也辛卯詔曰比京朝官因人保任始得叙遷朕念廉士或不能以自進其罷之時監察御史劉元瑜言近年考課之法自朝官至員外郎郎中少卿監須清望官五人保任方許磨勘適長奔競非所以養士廉耻也望酌祖宗舊規别定可行之制故降是詔康定初元瑜嘗言范仲淹以非罪貶既復天章閣待制宜在左右尹洙余靖歐陽修皆坐朋黨斥逐此小人惡直醜正也及仲淹迹危元瑜即希章得象陳執中意起奏邸獄劾竄陸經又言前除夏竦為樞密使諫臣數人托其舊過召至都門而罷之自兹以進退大臣為己任以激訐陰私為忠直薦延輕薄列之館閣與相倡和扇為朋比近除兩府出自聖斷中外相慶獨黨人以進用不出於已議論譁然臣恐復被疏罷矣前日孫甫薦葉清臣毁丁度效此也磨勘保任之法實仲淹所建仲淹繼黜故元瑜亟奏罷之元瑜傳云與靖等相失然不載相失事大抵元瑜姦邪欲希合求進爾與靖等未嘗相得何相失之有又云修靖深惡之由是論者以為姦邪元瑜姦邪著矣豈必修靖惡之然後論者以為姦邪史臣於元瑜蓋相假借爾知制誥余靖言臣伏覩近降中書劄子今後臣僚奏薦子孫親屬內長子長孫皆不拘年甲諸子諸孫須年十五以上弟姪等並須年二十以上方得奏薦所薦親屬並須五服內者竊以朝廷推恩延賞比要嗣續門戶其有老登郎署晚得職司親的子孫尚多限以年幼不得陳乞而乃旁䕃踈逺房從年長之人則是舍親而用踈遺近而取逺殆非國家善善及子孫之意伏乞自來奏蔭幼年子弟並須二十五嵗以上方許出官雖授京官亦不破官中請受於國家别無妨礙兼臣今來奏臣親弟年已及格不礙新條但緣年老臣僚不得奏其親的而旁奏踈屬於理不便伏乞特降指揮應合奏蔭親屬臣僚所奏子孫弟姪特令不拘年甲以廣賞延之典從之據成都編録條貫冊余靖奏請乃慶厯五年二月四日中書劄子與劉元瑜所論同行下今附此壬辰徙涇原鈐轄六宅使嘉州刺史髙繼元為河中府鈐轄本路安撫使王素言其議邉事不協也詔殿前司殿侍非邉功及陳亡之家或蕃官補置若父兄物故致仕放停録用者餘皆十載以上方聽請給而差使之夏國主曩霄初遣鼎努關興則等來賀正旦自是歲以為常時聿則以留延州議事故後至也癸巳改新知邢州郭承祐為河陽部署滑州部署魏昭昞為陜州部署殿中侍御史梅摯右正言錢明逸皆言承祐貪汚而昭昞人才猥下故也富弼之至近畿也堂後官大理寺丞朱濟出迎之諫官以為言乙未出濟監泗州糧料院丙申御邇英閣讀漢書元帝紀上語及漢元成二帝政理丁度因言頃者臣下不知大體務相攻訐或發人陰私以圖自進賴陛下聖明覺悟比來此風漸息上因攻訐之弊曰凡此皆謂小忠非大忠也戊戌講詩起雞鳴盡南山篇先是講官不欲講新臺帝謂曽公亮曰朕思為君之道善惡皆欲得聞况詩三百皆聖人所刪定義存勸戒豈當有避也乃命自今講讀經史毋得輒遺翰林學士兼侍讀學士宋祁為侍讀學士兼龍圖閣學士避兄庠執政也兵部貟外郎兼侍御史知雜事趙及權判吏部流內銓初銓吏匿貟闕與選人為市及奏闕至即榜之吏部榜闕自今始己亥提㸃荆湖南路刑獄殿中丞楊畋為太常博士賜五品服前轉運使司勳貟外郎周陵同提㸃刑獄內殿承制閣門祇候王翌降敇書奬諭並以招捕蠻寇有勞也詔陜西河東經略司夏國雖復稱臣其令邉臣益練軍毋得輒弛邉備其城壘器甲逐季令轉運提㸃刑獄司按察之從樞密副使吳育之言也育言當自前月初拜樞副日移見此知制誥余靖言昨聞西人與契丹約和尋復侵掠必恐契丹兵忿不解前又遣使來以告西伐則將命者不絶蠧耗財用無有盡時臣今奉使契丹欲先諭以元昊反覆小臣其去就不足為兩朝重輕設或携叛亦是常事彼此只邉上關報更不專遣使臣從之庚子司封郎中判太府寺吳待問為光祿卿初待問用年勞當遷少卿上以其子育為樞密副使特優遷之癸卯詔天久不雨其令州縣毋得淹繫刑獄安靜節度使允迪居父喪命伎女日為優戲宫中妻昭國夫人錢氏告之詔入內副都知岑守素即本宫案問甲辰降授右監門衛大將軍絶朝謁錢氏亦度為洞真宫道士允迪元儼第三子也乙巳以馬軍都虞候公𪠘為太學右正言錢明逸言閣門儀制每日上殿不得過三班緣三司開封府日有公事上殿外只有審刑院或大兩省班次即其餘並皆隔下且諌臣職在諌爭大扺言朝政得失詔令賞罰稍稽頃刻則事涉已行隨而更張國體非便欲乞今後諌臣有本職事求對雖已有三班外亦聽上殿敷奏從之補慶州星葉族蕃官安順子吹博迪為三班奉職本族巡檢庚戌御邇英閣讀三朝經武聖略出陳圖數本并陜西僧所獻兵器鐵渾撥以示講讀官辛亥祈雨于相國天清寺㑹靈祥源觀癸丑桂陽監言黃捉鬼餘黨唐和等復內寇甲寅詔乾元節合奏僧道紫衣師號人數自今聽如舊初歐陽修奉使河東還言河東之患在盡禁緣邉之地不許人耕而私糴北界粟麥以為邉儲其大利害有四以臣相度今若募人耕植禁地則去四大害而有四大利河東地形山險饋運不通每歲傾河東一路稅賦和糴入中博市斛斗支往緣邉州軍人戶既不能輦致遂齎金銀錢絹就北界貴糴之北界禁民以粟馬入我境其法至死今邉民冒禁私相交易時引爭鬬輒相斫射萬一引惹而生事端其患一也今吾有地不自耕植而偷糴鄰界之物若敵常歲豐及緩法不察而粟過吾界則是有可望茍敵歲不豐或與我有隙頓嚴閉糴之法則我軍遂致乏食是我師饑飽繫於敵人其患二也代州岢嵐寧化火山四軍緣邉地既不耕荒無定主而敵得以侵占往時代州陽武寨為蘇直等爭界訟久不决卒侵地二三十里今寧化軍天池之側杜思榮等人又爭侵地二三十里岢嵐軍亦爭掘界壕賴米先濬多方力拒而定是自空其地而誘北人歲以爭界其害三也禁膏腴之地不耕而困民之力以逺輸其害四也臣謂禁地若耕三二歲間可使不糴北界粟麥則邉民無爭糴引惹之害我軍無飽饑在敵之害緣邉有定主無爭界之害邉州自有粟則內地之民無逺輸之害是謂去四大害而有四大利今四州軍地可二三萬頃若盡耕之則歲可得三五百萬石仍下緣邉議以為岢嵐火山軍其地可耕而代州寧化軍去敵近不可使民盡耕也於是詔并代經略司聽民請佃岢嵐火山軍閒田在邉壕十里外者然所耕極寡無益邉備嵗糴如故范仲淹墓志云代郡西四州軍附邉有廢地尤廣著令禁不得耕郡縣以敵嫌不敢正視歐陽修來使籍其利害請弛禁許人耕以輸可代轉挽之勞以帥議不協罷仲淹至知其利大且無所嫌者屢奏如修議便後止耕岢嵐一境而塞粟已充矣據本志乃云所耕者寡無益邉備當考月本志載耕岢嵐事亦與范志不同注在至和二年正是日雨乙卯幸相國天清寺㑹靈祥源觀謝雨上封者言伏覩去年八月一日勑今後省府判官轉運使副提㸃刑獄轉運判官更不循例差除委待制以上每年於館閣朝官臺官提㸃刑獄知州內舉一貟充省府判官或轉運使副於知州軍轉運判官內舉一員充提㸃刑獄於通判內舉一員充轉運判官者臣竊聞自來省府判官轉運使副在太宗時並是上意特除洎真皇時參令中書選擢今若令兩省以上保舉不唯上侵宰執之權又下長奔競之路遂令端士並起馳騖不因請託則人莫肯言洎于自陳則扇成薄俗非所以敦厚風教旌别材良之術也蓋是向來中書差人後多被諫官論列指摘往日小疵家私猥事以致差遣不定屢有改移遂此更張庶絶羣誹况朝廷用才責其立功立事豈以昔日板築屠釣牧豎為嫌哉且待制以上僅五十人若嵗舉三人每歲當及一百五十人數年之後人數倍多何以處置其所舉之人既舉之後便望朝廷不次差遣未得之間更相謗毁此非為選才乃作不靖也伏望特罷此詔一切令依舊中書自銓擇吏才明敏望實兼稱者充轉運使副省府判官提㸃刑獄則官吏盡心於職事請託稍抑於輕浮人無僥幸之心事存經久之體從之仍令御史臺遍牒諸道州軍歐陽修奏疏曰臣竊詳臣寮上言悉涉虛妄蓋由近日陛下進退大臣改更庶事小人希合欺罔天聰臣請試辨之據上言者云若令兩制以上保舉則下長奔競之路方今上自朝廷下至州縣保舉之法多矣只如臺官亦是兩制以上舉以至大理詳斷審刑詳議刑部詳覆等官三路知州知縣通判選人改京官學官入國學班行遷閣職武臣充將領選人入縣令下至天下茶鹽場務𣙜場及課利多處酒務凡要切差遣無小大盡用保舉之法皆不聞以奔競而廢之豈獨於省府等官偏長奔競而可廢此其欺妄可知也上言者又云遂令端士並起馳騖自是小人豈名端士至如自來舉官之法多矣豈能盡絶小人干求况自頒新勑以來何人舊是端士頓然改節馳騖於何門而得舉乞賜推究姓名若果無則其欺妄可知也上言者又云不因請託人莫肯言此又厚誣之甚也今內外臣僚無小大曽受人舉者十八九可盡因請託而得自兩府大臣而下至外處通判以上人人各曽舉官豈可盡因請託而舉若云其他舉官不請託只此敕舉官須請託即非臣所知也今兩制之中好人不少繁重要害之地皆已委信而任之豈可不如外郡通判等不堪委任舉官而况兩制之臣除此敕外亦更别許舉官豈舉他官則盡公惟此敕則斗徇私請此其欺妄可知也又云每歲舉一百五十人致人多而爭差遣臣算一人有三貟舉主方敢望差遣一百五十人須一歲內有四百五十貟兩制為舉主今兩制不及五十人使人人歲舉三人則是三人共一舉主豈敢便爭差遣况有不曽舉人者或舉不及三人者乞賜檢㑹去年終兩制以上舉到人數便可知其恣情欺妄也近日改更政命甚多惟此一事尤易辨明故臣不避煩言而辨者伏冀陛下因此深悟小人希合而欺妄也緣自去年陛下用范仲淹富弼在兩府值纍年盜賊頻起天下官吏多不得力因此屢建舉官之議然亦不是自出意見皆先檢祖宗故事請陛下擇而行之所以元降敕文首引國書為言是也當時臣僚並不論議近因仲淹等出外與朝廷經畫邉事讒嫉之人幸其不在左右百端攻擊只如此事朝廷不復審察使與施行臣昨見富弼自至河北㳂山傍海經畫勤勞河北人皆云自來未見大臣如此其經畫所得事亦不少歸至國門臨入而黜使河北官吏軍民見其盡忠而不知其罪狀小人貪務希合不為朝廷惜事體凡事攻擊至今未巳况朝廷用人屢有進退故令法度改更如此紛紜豈有定制伏望陛下審察愛憎之私辨其虛實之說凡於政令更審改張臣檢詳元降舉官勑意本是於國書檢用祖宗所行之法今上言者即云因諌官論列致差遣不定而有更張事涉臣身不敢自辨然臣在諫署日言事無狀致今來臣僚指以為辭豈可貪冒寵榮不能自劾請從黜罰以弭人言臣伏見陛下聖德仁慈保全忠正之士進退之際各有恩意此所以能使忠臣義士忘身報國至死而不已也其今後臣僚希附上言攻擊兩府所行之事乞賜辨明擇其實有不便者方與改更庶全大體則天下幸甚疏入不報臣寮上言遍牒諸道州軍此據成都編録冊乃五年四月七日成都進奏院牒坐三月一日御史臺帖准中書劄子云云施行訖希公文回示中書劄子必在三月一日前今附見二月末歐陽修疏據本集
