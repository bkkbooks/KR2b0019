body:
  text: 續資治通鑑長編卷三百二十九宋李燾撰神宗元豐五年八月庚戍朔詔工部郎中范子竒與都水監同相度滑州天臺掃衛州齊賈上掃如浮梁壅遏水勢權拆去以聞工部言二掃危急故也封御侍武氏為才人詔吏部限三日選差團教保甲巡檢巡教使臣十九人赴永興軍路詳定官制所言尚書省施行政令分屬六曹之事都省總之或有稽違所當察舉而任其責今擬立法諸六曹事有稽違而不察舉者以律上官案省不覺坐之令僕丞為一等左右司為一等都司主事為一等令史以下為一等從之朱本云無施行合刪今仍存之辛亥詔酒行下户倍罰麴錢除三分中已放一分外更免一分河北轉運司言凖朝旨令兵部以三路自置保甲後教過年分實費錢糧裒取一年數為自今封樁額充保甲支費勘會保甲冬教錢糧朝廷已不封樁今悉令本司承認慮久逺不能供億詔自元豐四年降指揮後封樁陜西河東凖此河東經略司言麟州神木堡與西賊鬭敵監押賈默以衆先退致賊殺巡檢高素詔河東轉運司劾罪舊紀書辛亥夏人冦麟州神木堡巡檢高素死之新紀不書新權發遣廣南西路轉運副使吳潛乞遣陜西路馬軍五七百騎戍桂林詔差在京馬軍兩指揮涇原路制置司行營總管劉昌祚言昨本路兵出界抵瑪伊克隘賊兵負險拒敵禽其酋領斬首級三千獲人口孳畜萬數每遇大敵常獲全勝後諸將聽高遵裕節制但聚為一軍不往外援師老退還臣蒙恩簿責纍及諸將蓋各有亡失分數緣內有攻城傷殘飢殍拖後人數不少即非戰敗亡失伏望矜察諸將總兵深入纍獲勝捷量推恩賞詔瑪伊克隘得功將副朝廷於賞格特加等其亡失人兵會計分數等第降罰即與諸路同法所有軍前死傷以故不能自還不會入亡失之數劄與劉昌祚知廣南西路經略司言蠻人蒙光但言賣板木於宜州都監等不依例給見錢上批送謝麟麥文昞依公體量不得以路由桂州為張頡所惑致移易事實七月丙午詔判司農寺曾孝寬罰銅八斤丞王端臣主簿莫士先各十斤以申明條制不當故也壬子天平節度使均國公傭為彰武軍節度使開府儀同三司進封延安郡王昭容朱氏進位賢妃兩紀並書此但不書節度儀同耳户部言日者鹽鈔數多價賤難售相度所支陜西五路計置軍儲鈔計二百萬緡鈔內隨逐路所得各減半凡百萬緡其逐路糴買糧草錢即於減罷樁還陜西見錢鈔末監錢內隨數分與逐路令商人入便從之祕書省言宗正寺修上玉牒借登位以來至熙寧十年起居注時政記日厯照用檢會無許借指揮詔宗正寺官就祕書省修定涇原路經略司言秦州甘谷城歸順文思副使日卜聚瑪伊克手下部落軍使巴雅爾等二十九人馬二十三匹走回西界已追逐捕獲乞下提舉蕃部司同體量以董戩進奉人經沁伊達木凌節為瓜州團練使阿克信為靜州刺史各增賜茶綵賞軍前功也癸丑詔熙河秦鳯兩路買馬切見買逐等馬價畫一取索劄付經沁伊達木凌節等令使臣入蕃告諭權管勾同經制熙河蘭會等路邊防財用趙濟言臣以七月甲辰至尉斗坪聞得癸卯不覺西賊五百餘騎至堡外殺漢蕃人口驅掩士馬而去及諜知鐡牟山嘯聚已數萬欲以本路及涇原秦鳯漢蕃兵約日出其不意會合掩擊詔涇原路經略制置司熙河蘭會路都大經制司如覘候有實度兵力可勝即便宜施行詔故豫章郡王宗諤子仲營等轉一官女已封郡君者封縣主未有封邑者封郡君詔三省樞密院祕書殿中內侍入內內侍省聽御史長官及言事御史彈糾先是置監察御史分六察隨所𨽻察省曹寺監而三省至內侍省無所𨽻故以長官言事御史察之甲寅詔知頴昌府資政殿學士韓維再任為丁巳日曾鞏罰銅書賜蕃官皇城使阿克密以下二十五人物帛有差熙河蘭會路都大經制司言本路努扎川伽羅總二城堡未築已相度因今防秋興工省財力而辦事已牒李察合團結河東京西廂軍九千接續應副從之詔河東轉運判官蔡曄專管勾每年入中或移稅糴從便計置軍糧十萬石於吳堡寨永寧關封樁斗不得過五百十其價錢於絳州垣曲監撥還仍令陜西轉運司計置運入米脂寨即不得兑充吳堡寨永寧關經費饒州景德鎮置瓷窰博易務從宣義郎都提舉市易司勾當公事余堯臣請也乙卯以文思副使曹識女始興郡君封同安郡夫人以上批先育於慶壽宮故也封御侍林氏為永嘉郡君詔執政官退朝上馬宰臣於樞密院隔門內知樞密院以下於隔門外都堂聚議退左丞於門下侍郎廳右丞於中書侍郎廳涇原路制置司行營總管劉昌祚言已至鎮戎軍乞量賜公使錢詔給二千緡七月二十七日丙午朱本創書昌祚為涇原總管此猶帶制置司行營恐朱本誤也七月雖有旨罷制置司官屬其實李憲尚在涇原領制置使如故十月十四日辛酉憲自涇原歸熙河制置司官屬乃罷故昌祚十月十五日壬戌始不帶制置司行營專為涇原總管也鄜延路總管曲珍率兵出界討明堂川部將皇城使資州團練使李德明所部五十人折外獲三十六級獲及七分詔二子與三班奉職二孫與三班借職丙辰詔自今內批指揮如别無奏稟更不進呈詔夷門山樊家岡并向外百步內及角橋東以南至岡自今毋得葬埋令開封祥符兩縣覺察先是司天監主簿亢天經言夷門山屬國音主山福德生王之方三男陽氣之位岡之上多民庶墳墓死氣浸灌岡脈則為尸厭近鄆王薨此其驗也若因鄆王葬盡遷岡上墳墓補闕陷則永除妖咎之根矣下其事令提舉司天監所集定奪圍禁步數以聞後開封府言如天經奏則墳墓當徙者十三萬有竒詔别聽旨後卒不徙而有是詔亢天經奏請在四年九月丁亥今依朱本並入此四年四月辛酉當參照葬鄆王乃四年九月丁酉日官亢天經建言四郊臣庶墳墓迫近都城不利於國嗣有詔悉令改卜且計其數無慮數十萬中外訩懼不知所出知開封府王安禮因見白上曰陛下以周文王為聖乎曰然曰文王卜世三十亦不過掩骼埋胔而己未聞遷人之冡以利其嗣者臣謂陛下莫如師文王上惻然為罷此據王安禮行狀附見或削去開封縣言養馬户未審止以屋業為物力或通計營運財物祥符縣言自頒養馬令民買馬後質賣家産或於市易務拘管抵當未審合與不合養馬詔以屋契錢數並屋租為物力隱匿契者以鹽稅為定如有質賣馬亦隨之若已抵當或因事在官拘管本户不得課利者驗實與免二月五日霍翔云云并九月十四日又七年二月八日又二十八日又三月二十三日當考王安禮行狀云京師坊郭户率以家資二千緡畜馬一匹謂之户馬有訴於堂者安禮言之上許用食鹽錢為法計三千緡始畜一馬賴免者甚衆此事與此相關須更考詳七年二月二十八日有府界户馬並以家産鹽稅為定恐安禮行狀云云合附彼時尚書右丞王安禮先在開封時大姓負市易息錢者纍訴於庭安禮既為執政言於上曰市易之法行之已久取息滋多而輸官不時者又有罰息方天下無事而行法之弊民至窮困竊為朝廷惜之臣願陛下渙然下詔蠲其罰息則天下幸甚上曰卿言有理羣臣未有為朕言者其詔使大姓以限輸納除其罰息安禮退批詔語加內外字蔡確曰方上有旨時無外字公欲增詔耶安禮曰亦不指言內字卒加之此據行狀當考時京城置堆垜場物貨居積商賈患之安禮奏曰堆垜所獲之息既微而商稅正額必損徒有利民之名而無富國之實願罷之上曰卿可否與馮景謀景內侍也實總其事既而會其息緡不滿十萬上曰近聞市易變染幣帛此誠可鄙千金之子猶恥居肆况朝廷乎上且有意於改作會有沮滯者其事竟寢此據行狀當考應諸處廣濟橋道並𨽻都水監丁巳詔翰林學士獨員三直免一宿詔中書舍人曾鞏罰銅十斤先是知頴昌府韓維再任鞏草制詞稱維曰純明直諒練達今古先帝所遺以輔朕躬又曰參角之間韓延壽黃霸之迹在焉興禮教而勸農桑以追參於前烈皆爾素學其尚懋哉上批維不知事君之義朋俗罔上老不革心非所謂純明直諒姑以藩邸舊恩使守便郡又非可仗以布政宣化今辭命乖戾不中本情傳播四方甚害好惡可復送中書省改詞行下故罰之韓維再任頴昌在此月甲寅戊午詔付鄜延路計議邊事司承受文字張禹勤應短兵相接惟是刀斧取勝可一面指揮沈括近降劈陳大斧五千可令諸將選擇鋭兵授之仍面諭徐禧等今既同預總兵要在拊御士卒均甘苦平賞罰力行前日垂拱之言佇待竒績也命樞密院副都承旨客省副使張山甫入內供奉官勾當御藥院劉惟簡案閲提舉河北路保甲司所教大保長武藝其承受並監視案閲令入內內侍省差內臣六員詔鄜延路諸招納歸順蕃部壯人十人老少婦女四十人並遷一資十嵗以下不計纍遷不得過三資即不及與減磨勘年不及減年及遷資止每一壯人支絹四匹老少婦女一匹殺降人者許人告每人賞錢三十千至百人止告殺五人以上者仍遷一資殺降人者斬庚申上以疾不御前後殿兩紀並書庚申上有疾墨本於庚申日書張禹勤言自癸丑雨至壬戌約數尺師次綏德城朱本改癸丑為己未按庚申八月十一日癸丑八月四日己未八月十日壬戌乃八月十三日不應先繫之庚申朱墨本皆誤今削去兼師次綏德城其日亦與它書不同當考修定景靈宮儀注所言案周官四時之祭皆於首時蓋君子感時物之變而思其親得數之中者也伏請以四孟月吉日朝獻景靈宮天子常服行事薦聖祖殿素饌神御殿止膳羞器服儀物悉從今制登降薦獻參酌朝謁之儀凡古之事一切不雜以合先王事亡如存之義從之兩紀並書詔嵗以四孟月朝獻景靈宮鄜延路經略司言漢户及歸明界弓箭手自買馬乞依蕃弓箭手例每匹給撫養庫絹五匹為賞從之環慶路凖此永興軍等路提點刑獄司言本路十八州軍多未獲強劫賊盜即無立定年額捉賊賞錢增給欲乞以四千緡為額從之仍給場務錢每嵗永興軍五百千河中陜府同華耀商州各三百千虢解邠鄜州各二百千延慶寧丹州各百五十千環坊州保安軍各百千壬戍上御殿資政殿學士呂惠卿知太原府後七日加大學士先是惠卿知延州將滿三年有詔除資政殿大學士再任方辭免會以喪去於是復申前命己巳加大資政今并書十月癸酉責單州徐禧李舜舉及沈括等以丙辰發延州蕃漢十餘軍所將凡八萬役夫荷糧者倍之李浦將前軍呂真佐之曲珍將中軍高永能佐之王湛將後軍景思誼佐之李稷主饋餉治版築而謀畫進止禧實專決括與同而已發延州日據御集餘悉據張舜民永樂客話但客話稱禧等以八月十五日甲子發延州今不取禧素惡种諤此據禧傳既定議而諤還自京師極言城永樂非計禧怒變色謂諤曰君獨不畏死乎敢毁成事諤曰城之必敗敗則死拒節制亦死死於此猶愈於喪國師而淪異域也禧度不可屈奏諤跋扈異議不可與偕行有詔留諤守延州此據客話令禧護諸將往城括移經略府並塞以濟軍用此據沈括自志是日次綏德城十三日壬戌也此據張禹勤奏實録即以此奏繫之庚申十一日誤矣括所云移府並塞當是米脂寨也更須考詳乃正書之癸亥上以初康復不御前後殿供奉官閣門祗候權知橫州溫杲知欽州知安州滕甫言內供奉謝禋奉旨買紅花萬斤今又繼買五萬斤而一州所産止二萬斤耳恐不足數上亟詔寢之隨州産紅蛾資其毒以為箭藥州縣承命甚嚴民有自殺者王安禮以為言上曰此非朕思玩徒欲為兵器衛社稷耳安禮曰陛下平日喜孟子獨不聞民為貴社稷次之之説乎且紅蛾箭鏃之資其為利也微即不得於社稷未有害也就使有利亦望陛下以民為先上首肯之隨州紅蛾事據王安禮行狀附紅花後當考庚午上御殿詔銓試中上等二人第一人循一資第二人占射差遣一次中等七十九人不依名次注官下等二百二十六人注官辛未知太原府天章閣待制王居卿知瀛州尋復故知瀛州承議郎寶文閣待制韓忠彥為遼主生辰使引進使榮州團練使曹評副之朝奉郎守禮部郎中劉贄為正旦使內殿承制張赴副之後三日以忠彥試給事中忠彥辭使遼曰臣嘗使遼矣若復往無乃使敵人妄意中國為乏人乎上曰西事未定無以易卿者遼人使趙資睦迓因語及西事忠彥曰此固小役也何問為使參知政事王言敷燕於館言敷問夏國胡大罪而中國兵不解也忠彥曰夏人之罪中國既以報北朝矣盍取而視諸言敷曰聞已還兵塞上何如如此則南北之好可保也忠彥曰問罪西夏於二國之好何所與乎連拒言敷及還資睦曰先侍中之制置西事有攻䇿今取城寨數十使侍中而及見之快可知也忠彥歸上遣中使勞問面賜嘉奬龍神衛四廂都指揮使鳯州團練使种諤降授文州刺史金州觀察使提舉西太一宮王中正降授嘉州團練使以上批昨大兵出界种諤迂路捨取直之利可降一官王中正不審議道路迂直利害及不討蕩左廂地分賊黨可降兩官並不用敘復法故也初令諤分析諤乃言橫山之徑兵在東先時已聞賊據米脂及銀夏等處故我迎其鋒敗之軍聲既振千里之行無敢抗者若由西路取直雖近巢穴大敵出於前重兵躡於後則有背腹之憂矣不知何以禦此此據范育志諤墓趙起作种太尉傳乃云坐徐勳事降文州刺史當考詔皇城使昭州刺史帶御器械廣南西路鈐轄和斌同經制宜州溪洞詔內殿崇班段貴攻靈州中箭死特支銀五十兩絹八十匹錢八十千二子希斌與三班奉職希演與借職壬申詔付張禹勤今出兵塞外欲日聞動靜可詳説軍事逐日侵星發奏若有事宜不以時飛奏詔罷增減幕職州縣官俸先是有旨令吏部以繁簡減天下選人俸錢而吏部以事簡則僻逺而員少事繁則當要而員多逺則人不願行要則趨之者衆俸不可減遂寢癸酉前河北轉運副使周鞏言熙寧中外都水監丞程昉於真定府滹沱河中渡繫浮橋比舊增費數倍又非形勢控扼虛占使臣兵員乞皆罷之每嵗八九月修板橋至四五月防河拆去權用船渡從之編修軍器什物法制所言凖朝旨應將敕所載軍器什物擇其精緻者修為法式本所據軍器監弓弩作尹抃見造插稍弓功料閻守勤所定摹則法度最為詳密乞更舊造弓法從之權荆湖北路轉運副使趙揚等言巡歷至誠州城池樓櫓足以保民防患上江多星銅鼓羊鎮等團並至城下貿易可漸招撫置城寨及下荆湖南路安撫轉運司委知邵州關把於蒔竹縣招諭芙蓉石驛未歸明人户詔且令招納未得置城寨甲戌張禹勤言師次永樂川第四埭明日經略使沈括與轉運使李稷爭使臣不協徐禧為分畫令稷止應副修城用度其修城並聽括節制乃平是日永樂城始興工此據九月九日御集並實録九月六日奏新紀亦書甲戌城永樂舊紀則於七月戊子書之乙亥髙陽關路安撫使韓忠彥言轉運司欲移乾寧軍於滄州乾符寨廢軍為縣以避河患人不以為便知滄州趙瞻亦言乾寧民心恟懼皆謂河水頗已順行又增隄防數倍堅固移軍實有害無利乞速罷以安邊民從之環慶路經略使曾布言洛原故城可以建一城白豹和市可以建一寨官馬川可以建一堡從之令李察應副候鄜延兵勢相接方興版築丙子詔應緣修城開壕事並許雇募戊寅河決原武掃兩紀並書此知樞密院孫固乞解機務授陳或潁州詔答不允此據御集乃八月事固字朴野衝替在三年八月九月己卯朔上不豫罷朝三日詔中書省事應面奏者以狀擬進壬午再罷朝五日分命輔臣祈福於天地宗廟社稷癸未張禹勤言諜報西賊發六監軍司兵次銀州川沈括徐禧見戒勒諸將分定戰地甲申永樂城成初興版築夏數來爭皆敗去及是畢工使景思誼以兵四千人守之思誼留兵守城此據沈括自志曲珍總行營護作樓櫓治廬舍與李稷俱留城中先是西夏調民為兵十丁取九得三十萬人齎百日糧屯涇原之北俟官軍出塞而擊之既聞城永樂乃引兵趨鄜延邊人來告者前後十數徐禧等皆不信且曰賊若大至是吾立功之秋也上賜禧黃旗曰將士立功受賞當倍於米脂禧恐沈括分其功謂括曰城略已就矣當與存中歸延州括從之乙酉禧括及舜舉以兵八千人俱還米脂此據司馬記聞曲珍傳云諜言敵聚兵甚急珍以它詞諷禧等先還按禧非可以它詞諷者其還米脂特不欲括留耳今不取敵騎尋自明堂川入駐寨城側與夏州烽臺相對置陳無定河西覘望官軍此據沈括十四日壬辰報及括自志曲珍遣馳使報禧禧曰黠羌敢送死乎亟引兵二萬五千人往赴之且謂括曰存中大帥不可輕出僕與李常侍上所遣宜亟行舜舉初不欲禧強之乃同往或謂禧曰被詔相城城已成矣禦冦非職也禧不聽兵數據沈括自志餘則據禧及珍傳並客話丙戍詔賜永樂城名曰銀川寨先是徐禧等言已定永樂下埭作寨地形險固三面阻崖表裏山河氣象雄壯八月甲戍興工凡用工二十萬新城去永樂上埭八里故銀州二十五里米脂寨五十里永樂蓋以小川為名城前正據銀州大川乞賜名故有是詔實録云禧等奏八月甲戌興工九月甲申城成甲戌八月二十五日甲申九月六日若城已成乃奏則奏到朝廷不應如此之速蓋豫言之朝廷以禧等前奏度城必以此月六日成故八日遂賜名不待禧等奏畢工始賜名也永樂客話云八月戊辰至永樂環兵外向旬有二日城成自戊辰十九日至九月庚辰初二日凡十二日然所稱戊辰庚辰與實録俱不同又呂惠卿志禧墓及禧傳皆云十有四日城成與客話及實録亦不同禧傳大率依墓志無别據也今並從實録蓋八月二十五日甲戍初築城九月六日甲申城成七日乙酉夏人即來爭城八日丙戍賜城名九日丁亥夏人遂圍城耳禧綱要云夏人聞城永樂自涇原舉兵三十萬來爭徐李舜舉亦自米脂引兵趨銀川寨禦之管勾永興軍等路常平等事張大寧徙秦鳯路提舉秦鳯路常平等事陳康民徙永興軍路以提舉弓箭手營田蕃部事康識置局在渭州大寧兼提舉故移就本路也徐禧李舜舉復入永樂城曲珍謂禧曰聞賊兵甚重給事與敕使宜退處內寨檄諸將督戰可也禧笑曰曲侯老將乃爾怯耶不聽丁亥賊三十萬衆攻城珍率兵禦之將官冦偉李師古髙世才夏儼程博古及使臣十餘人士卒八百餘人戰沒賊遂圍城此據沈括十七日奏報新紀書丁亥夏人冦永樂將官冦偉等死之舊紀不書出綱要云丁亥夏人冦銀川寨鄜延路副總管曲珍戰敗績己丑德音降在京及畿縣死罪囚徒以下釋之上服藥康復故也兩紀並書此先是著作佐郎豐稷除吏部員外郎稷言臣昨任御史日屢言尚書右丞王安禮罪狀乞賜罷免詔從之稷除吏部在八月二十五日今并見於此庚寅鄜延路經略司言凖宣發馬軍五千指揮替京東西九將歸營緣各已出塞詔可併三將團集練訓凖備驅使謝麟言奉詔置誠州未畫地里四至慮邵州蒔竹縣爭占誠州新城管分聞邵州已撥潼村屬新城潼村距誠州四十里蒔竹縣八十里道路峻險經九疊坡腳大小盤攔深山長林正係湖南至誠州行旅之路今屬蒔竹比之誠州地里已逺又遙𨽻邵州二十二驛或有寃訟縣堡不能決去州既逺則民無所欣乞自昌蒲嶺脊分水西屬誠州東屬邵州蒔竹從之七日丙午十月己卯詔河北河東陜西已訓民兵什長藝成當推行開封府界團教之法其所須錢糧設置官吏可依例令樞密承旨司取索會校承旨司言今以河北西路為始酌中取元豐二年收錢數會校減耆長四萬二千三百五十六緡户長九千五百六十二緡壯丁三萬二千八百一十五緡併廢禁軍六指揮十一萬一千一百八十六緡看詳河北西路州軍十六縣寨五十五弓手千四百九十八縣尉既不領鄉村弓手理當裁減其五十三縣弓手除十縣以使臣為尉合依舊管弓手外其餘四十三縣各定以十五人為額二寨各八人共留弓手千三十六人計省萬四千三百九十二緡保甲四百一十都保保下承帖人九百六十六人雇錢不同凡二十等嵗支錢萬六千四十八緡義勇改為百五十六都保二百八人各二十四緡費錢二萬六千六百二十六緡詔自今年十月首樁收兵志載會校數有不同處今并録於此志云詔三路見訓民兵非久什長藝成須便行府界團教之法錢糧官吏并如畿縣未知及期能辦與不若更稽延月日必至有誤措置大法可令承旨司取索會校之此詔在四年正月二十一日其年府界河北河東陜西路會校保甲都保凡三千二百六十六正長壯丁凡六十九萬一千九百四十五嵗省舊費緡錢一百六十六萬一千四百八十三嵗費緡錢三十一萬三千一百六十六而團教之賞為錢一百萬緡有竒不與焉凡集教團教成嵗遣使則謂之提舉按閲率以近臣挾內侍往賞給按格令從事諸路皆以番次藝成者先按閲率五六嵗一遍獨河東以金帛不足以賞乃至十一嵗上詔晉人勇悍俗尚武事又介居二敵之間講勸宜不可後其加賜緡錢十五萬焉此因本志附見須考其實月日知沅州謝麟奏安化州羅世念作過已立賞購募并具分兵進取安化州利害從之仍詔在京驍騎兩指揮并江南東西將兵一千五百人福建路將兵二千人並赴宜州從麟所乞也尋詔麟且以方略措置未得進討其諸路兵勿遣麟又奏沿邊保甲欲自效者衆乞量給錢米從之七日丙午辛卯詔近服藥有瘳遣官謝天地宗廟社稷宮觀大理卿楊汲等言獄空詔付史館詔賜陽武縣廣勇廣德兩指揮兵級錢有差時河決原武軍人移營避水故也又詔吳潛體量朱崖黎洞事宜候宜州邊事定日别聽旨六月壬申又七月戊戌壬辰手詔原武河決口已引奪大河四分以上不大為應副玩成深患貽朝廷巨憂可輟修尚書省及汴河堤岸司兵五千人併工修閉令楊景略往應副物料雖屬它司亦支撥訖以聞給事中陸佃言讀吏部奏鈔宋彭年擬太常寺丞太常典司禮樂亦宜選稍有學術之士非彭年所堪乞令别擬彭年差遣從之詔開封府界河水所至縣百姓有聚在髙阜不通往來致絶糧食者委劉仲熊乘驛遍詣有水縣規畫船筏運致民户安集於無水處齎薪糧就支三日一具所濟人數上尚書省舊紀書遣官安集畿縣民被河患者乃無其日新紀於壬辰書此蓋因實録也太原府路鈐轄專管勾麟府路軍馬張世矩言照應葭蘆川版築至葭蘆故城及新寨等處逢賊殺敵有功蕃官左侍禁神木寨結當族巡檢楚默親斬六級詔楚默遷五資餘一級并加賜共支絹四十匹詔户馬法以屋契錢為物力用住宅計者元契三千緡房錢計者二千緡各養一馬其住宅房錢相兼者以分數組折二月五日八月七日當考詔諸縣給納月分無丞處主簿非檢覆本縣災傷勿差出遇壅併權免縣事鄜延路走馬承受公事楊元孫言新修永樂城畢九月乙酉沈括先部中軍右軍虞候軍至米脂寨候總管曲珍將四軍及選鋒至進築城寨又言進築城寨功不可遲西賊既失橫山非晚必須絶滅上批付沈括徐禧李舜舉若留兵三五千在銀川寨為戰守之備移大軍修築以次城寨如此措置有無利害詳度一面施行時朝廷以沈括奏但知夏人來爭永樂猶未知徐禧等已被圍故有此命趙濟言凖苗授關牒見分遣使臣搜取不係團結漢蕃弓箭手悉赴行營以禦賊衝詔苗授所搜取人如無益於事更不得追集指揮到日據邊情便宜施行并劄與李憲詔凡指揮邊事更不送門下省覆奏朱本云時以邊事急速不送門下省覆奏今從墨本又詔樞密院自今應被御寶批旨别無稟議事理即送門下省繳覆本院更不覆奏别無稟議事理據樞密院時政記增入六年正月二十二日戊戌合參考又詔應修明法式並尚書省議定上中書省速者先次施行餘半年一頒其樞密院並不𨽻六曹者下刑部緣功賞者下司勳修立還送尚書省議十二月十五日六年九月一日七年三月六日重修編敕癸巳熙河蘭會路司言定西城遣譯語彭保六人入界刺事得實有勞詔並遷一資人賜絹二十匹甲午詔應吏部陳乞留臺宮觀國子監人年六十以上兼用執政官恩例者通不得過三任詔涇原環慶秦鳯路兵馬見起發赴鄜延路救應可並與特支錢此據御集乙未詔以新經服藥罷秋宴沈括言西賊圍永樂城詔河東經略司及麟府軍馬司速發河外屯守漢蕃兵須二萬以上令張世矩訾虎部領更差得力將官共取河裏河外便道赴永樂寨奮擊救接寨內兵將有功人比自來功賞倍推恩應起發禁軍特支錢千民兵降一等仍令轉運司官一員部糧隨軍斟酌便宜施行其河外近邊州軍城寨起兵處令各為堅壁清野之計又詔李憲留兵二萬於涇原餘並統領赴鄜延應援特支外更給與路費沈括言臣領兵至無定河川欲分兵救永樂城及應接糧道為賊大兵所隔不得前又言已轉戰往綏德城部督將兵照應諸寨時敵遊騎犯米脂括退保綏德故有是奏永樂之始圍也括僅有卒萬人不足以戰方命濟師於延州羌酋凌結阿約勒以八萬人南襲綏德屬羌三百人欲翻城應之阿約勒之弟興嫩以告括括集將佐議曰永樂之勝敗未繫邊勢之重輕綏德國之門户失綏德則延州為敵所逼勝敗未可知關中必震此大機會也寧釋永樂而救綏德先期之一日括入綏德取反者三百人尸諸城阿約勒以衆退延州之師未至有詔括退保綏德無得輒救永樂以待援兵之集永樂之始圍也以下一百六十字據括自志客話云己亥敵遊騎迫米脂括退保綏德按永樂以己亥陷己亥二十日也括此奏乃十七日到則括棄米脂必不在二十日也种諤言臣止與所留病羸怯懦兵四千竭死力守護延州諤初議進城橫山本意身任統帥成大功在已而為徐禧沈括所外及永樂被圍諤據城觀望故託名守延不即往救鄜延路走馬承受公事霍丙陜西轉運司管勾文字奉議郎李秬並言西賊二十餘萬重圍永樂城危急秬稷弟也詔徐禧李舜舉為西賊圍閉雖朝廷已多發應援慮城守未備與賊衆寡不敵或糧道隔絶不可堅守委沈括种諤選募膽勇可信之士厚許爵賞令齎已會兵救應文字取間道往密諭禧等如必不可守宜以機便委棄前來詔中書李稷在永樂城圍閉見闕轉運司官宜差李秬權管勾轉運判官西京留守文彥博言提舉崇福宮司馬光昨以編修資治通鑑非積嵗月未可成書纍乞間官以便修述今再任將滿欲乞更許再任庶不妨編修從之仍詔光再任滿三十箇月不候替人發來赴闕不候替人發來赴闕此據光集再乞留臺狀或移見七年十二月除資政時詔內弓箭南內外兩庫軍器法物上供寶御帳及本庫帳毋以帳供兵部衛尉寺丙申上批付沈括永樂城至為危急若不斟酌便宜措置則恐誤朝廷事愈重今雖發諸路兵赴救度可齊集須更十數日卿可相度遣間人與賊約抽退軍馬當追回永樂人兵給還地界如委可行即依指揮若恐益增賊勢即勿施行今永樂諸將既已失利事出無可奈何卿宜勿惶撓整頓精神措置邊事安撫在城人情招集散亡士卒使臣惟是上下一心堅守城池收拾民户焚毁委積勿以滋責乃目前重事小小援兵毋得輒遣恐更長賊凶焰消沮士氣所有今日以前纍降處分軍前事可多方募人傳逹令求方便潰圍棄城丁酉上批付苗授兵久暴露不惟徒費供餽兼孤軍在野楚棟隴堡小不能容萬一賊馬或有奔衝既不可野戰兼帥臣在外根本空虛宜速分定在屯軍馬駐熙州通逺軍徑歸帥府治事其通逺軍令苗履總領照管詔給度僧牒八百付都水監應副原武天臺齊賈三掃物料實録於此下書李秬种諤沈括奏戊戌永樂城陷漢蕃官二百三十人兵萬二千三百餘人皆沒朱簽貼云永樂事係十月一日奏到移在後以此見實録亦有誤以事繫日也大宗正司言自來宗婦宗女有過事涉違越者本司録奏置獄窮治法官發帷箔之醜曲折以聞黷禮滋甚乞自今有犯者送入內省委官劾實節案以聞不行淮南轉運司言奉朝旨令淮西一路官自賣鹽以年終實收課額比奏從之本志但於五年書明年推周輔法於淮南西路戊戌永樂城陷初沈括謂徐禧曰吾衆才三萬彼雜集之兵數十萬豈易當也不如委永樂以困之禧不從先有詔選徑卒為竒兵而禧即欲以竒兵為前鋒括謂禧曰此一軍之鋭也敵氣方進而以千人攖其鋒勢必不敵則我喪其鋭不戰自敗矣禧又令軍中不以斬馘論級必破敵然後均賞括曰不以得級為功則戰士無所激均賞則容僥幸沮摧鋒之士禧皆不從復還永樂軍無斥候比入城敵傾國至諸將皆請乘其未集襲之禧又不從髙永能言尤切曰羌性輕率出不意而輒加之笞叱則氣折不能害人若持疑不斷縱其跳梁將無所不至今先至者皆精兵急與戰破之則駭散後雖有重兵亦不敢跬步進此常勢也塵埃障天必數十萬之衆使俱集則衆寡不支大事去矣禧岸然捋其鬚謂永能曰爾何知王師不鼓不成列永能退拊膺謂人曰吾不知死所矣敵騎稍逼禧乃命曲珍等悉城中兵陳於崖下水際禧植黃旗手劍坐城上臨視之敵先以騎五萬當我禧即遣竒兵突而前陳堅不可動三戰敵全師俱進竒兵奔我師遂潰曲珍扣城謂禧曰兵敗矣敵人當我者皆其精鋭前軍勝而惰在後者皆老稚公可速出濳師踰西山繞出其後擊其老稚敵衆必亂此攻心法也禧閉壁不應珍乃犯關入保收散亡得萬五千人騎兵皆棄馬緣崖而上禧怒汗如雨永樂城依山無水下濱無定河為井十四築壘營之敵衆驟至李稷惜軍食不納役卒卒以所持耰鍤掘壘為磴道爭先登敵乘之遂奪水寨城中掘井三及泉僅足飲將領於是士卒渴死者大半至絞馬糞而飲之禧日懷二燒餅往來巡城親以矢石擊賊困則枕卒股假寐士皆扶瘡忍渴以拒賊賊蟻附登城者積尸如山踐之以登新城守具未備賊知沈括退保綏德永樂孤絶攻愈急髙永能謂李稷曰新城久雨土濡且壞不若盡運幣以募死士突圍直出十猶可得七八不然坐致死耳曲珍亦以告禧禧訖不從又責珍曰曲侯已敗軍又欲棄城耶敵圍城浹日遣使呼城上人求和禧亦知勢不敵乃遣呂文惠應之文惠至敵帳敵帥坐文惠於地曰爾小將不可議約當令曲太尉來即遣文惠還禧以曲珍總軍政不可遣而景思誼自請行禧曰萬一蹉跌恐傷國體思誼曰今勢已逼倘能以口舌説之使緩攻以待外援不亦可乎欲活數萬人命豈顧一身耶敵帥見思誼言若還吾蘭會米脂即當解去思誼曰此係朝廷非邊臣所得專也敵囚之初思誼去時惟禧舜舉有水兩壺諸將絶飲已三日敵亦不知攻稍緩是日忽於城下呼曰漢人何不降無水已三日矣禧以壺水揚於外示之曰無水此何物也敵笑曰止於此矣由是疑思誼泄之是夜大雨敵兵四面急攻士卒飢疲不復能拒夜半城遂陷禧及舜舉俱死稷為亂兵所殺曲珍及王湛李浦逃歸士卒得免者什無一二舜舉將死裂衣襟草奏云臣死無所恨願朝廷勿輕此敵稷亦草奏云臣千苦萬苦也禧不知所終或言禧實不死有自敵還者嘗見之禧不死據張舜民小史髙永能死附十月丙寅運舊紀書戊戌夏人陷永樂徐禧內侍李舜舉陜西轉判官李稷死之新紀書戊戍夏人陷永樂徐禧內侍李舜舉陜西轉運判官李稷死之已亥措置河北糴便司言準朝旨於瀛定二州修倉六所先後給度僧牒千五百其錢已盡用乞更增給二千詔給一千六年倉始成本志云賜自京至陜西河東邊事文字經由急腳鋪馬遞鋪兵級特支錢有差詔沈括候种諤至綏德城即歸延州詔客省引進四方館各置使二員東西上閣門共置使六員客省引進閣門共置副使八員閣門置通事舍人十員內閣門副使以上並依諸司使副條例磨勘閣門使以上遇有闕改官及五期者樞密院檢舉如歷閣門職事後犯贓及私罪杖以上事理重者遇遷日並除他司閣門四方館使及七年無私罪未有闕遷者與加遙郡其特旨與正任者引進使四年遷團練使客省使四年遷防禦使皇城使康州刺史權鄜延路副總管兼第一將夏元象為西上閣門使康州團練使以种諤言元象充中軍將於無定河川分隊出戰及自攻米脂城兩立功也庚子朝奉郎試吏部侍郎李承之權陜西都轉運使乘驛往候邊事畢如故遣太常博士王古致祭原武掃靈濟夫人廟以築堤塞決河也吏部上重編排考試刑法所等第詔第一等孫輔道令大理寺試斷案三十道如堪充職委長二保第二第三等循資占射差遣免試升名次有差詔河東陜西援兵皆屬种諤統制令种諤便宜以厚賞鼓激前進庶不誤事詔如京副使王竒贈皇城使忠州防禦使與六資恩澤賜銀絹各百千費萬子與三班借職賜銀絹五十匹錢五十千覃俊無子無弟贈下班殿侍賜絹二十匹錢二十千褒死事也覃俊未見王竒死事在七月辛巳新紀於此月庚子日始載竒死事蓋弗詳考也新舊紀並書安化蠻冦宜州知州王竒死之福建路監司上斬獲康詵人功狀詔東南第十將下押隊散直程建為首功授右班殿直閣門祗候劍州都巡檢使宜州使喚劉福黃周壘各遷二資吳谷遷一資李士昌李慶與下班殿侍獲首級人全支賞錢外每級更遷一資其殺獲康詵妻男及虜略去人依正賊例推恩助手兵級每獲一級助手人賞錢百千纍獲并纍賞傷中水手依正兵例康詵事始當考詳附見辛丑詔詳定官制所罷局六曹等條貫送編敕所其未了事限十日結絶先罷官吏請給入內供奉官馮宗道上景靈宮供奉敕令格式六十卷押賜董戩官告使种誼等上討夏國有功首領詔上等十三人與本族都軍主嵗給茶綵有差詔應緣義勇保甲事並𨽻樞密院其餘民兵悉𨽻兵部壬寅詔應沿黃河神濟夫人並稱顯靈神妃以靈津廟為額詔河東路提舉常平等事趙咸權轉運判官奉議郎莊公嶽各降一官坐大軍出塞糧饋不繼人夫亡者過半而報上不實御史王桓奏論故也癸卯种諤言奉詔援永樂城未知延州守禦大計所付詔胡宗回權管勾延州事候沈括至交割仍詔沈括止帶衙兵回延州詔司農少卿亷正臣減磨勘一年以提舉糴在京封樁糧收錢百萬緡也滑州言刀馬河水泛溢韋城以南至長垣人馬不通詔開封府界並滑州信使所行道專委通判滑州蘇注管勾新紀書癸卯滑州河水溢舊紀不書廣南西路提舉司言凖詔依朱初平劉誼所乞瓊州昌化萬安朱崖四州軍不行役法依舊差役人今欲以海北諸州寬剩役錢充海南州軍雇役從之修定景靈宮儀注所言儀制令諸廟社門宮門各二十四戟唐太清宮九門亦設畫戟竊惟景靈宮天興門及宮外門本以欽奉天神不應立戟神御諸殿既緣生禮以事祖宗謂宜依儀制令宮門之制每門立戟二十四從之又言舊制國忌無神御殿者赴佛寺行香今諸神御殿皆在景靈宮忌日並赴本殿僖祖翼祖請設位於天興殿文懿簡穆皇后請設位於保寧閣忌日並張次於天興殿前之左宮官先遷神位於次事畢而復從之詔樞密院龍猛龍騎指揮雖已令簡填其闕數尚多可差曹詔彭鐸分往開封府界京東京西江淮荆湖路簡填令滿足額乙巳上再御崇政殿宣宰臣已下至中書舍人觀察使以上觀景靈宮御書十一殿額皇第十子薨母淮陽郡君郭氏生次日失之不及賜名封爵後賜名偉舊紀書甲辰皇子偉生乙巳卒新紀但書乙巳皇子偉薨丙午詔司農少卿亷正臣董詵並理提刑資序是秋判河南府文彥博言臣去嵗冬輒率愚瞽纍奏陳陜西邊事今春蒙差臣男貽慶特賜臣二月二十五日手詔撫諭後蒙聖慈矜寬不責狂易恭讀詔旨曰六軍還寨將士已殫勞黎民已告病今日之勢豈可復逺舉深入哉惟固境自備而已近命涇原制置城寨亭障制敵衝軼非有前日圖也臣仰味聖言伏增欣抃有以見陛下推堯舜之心恤生靈之困罄兹溥率廣被涵育幸甚幸甚然自今秋以來復有遣戍開疆運糧深入此必是邊臣希功規為僥幸開陳端緒誑惑朝廷料敵不精致見撓敗進此計者升下必知其人乞行顯誅以戒今後干賞蹈利之輩免致向去更誤朝廷大事望以今年二月二十五日詔書大旨密諭邊臣嚴設預備固境自全來則禦之去則勿逐更年嵗間士氣復振民力復蘇足食足兵何求不可醜羌聞之自當屈服臣又聞謀攻料敵老將所難不當與新進白面書生惟務髙談虛論容易而計畫之今以天下之大士人之衆豈無深識逺慮懷忠守正更事歷試之人願陛下詳求而審用之如祖宗朝所用扞邊守塞宿將名臣見於國史者多矣乞詳察之臣之此言非不知觸犯時怒蓋耄耋之年被三朝重任蒙陛下眷奬尤深乃心本朝義均休戚豈當隨例緘默上負聖明伏望天慈諒其區區竭盡之誠此據文彥博集增入附五年九月末輔綱要云是月凖西路始推行蹇周鹽法
