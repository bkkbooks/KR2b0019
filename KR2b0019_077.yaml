body:
  text: 續資治通鑑長編卷七十三宋李燾撰真宗大中祥符三年春正月癸丑天慶節詔兩京諸路宫觀道士每十人度一人不及十人亦如之甲寅賜戎瀘州巡檢軍士緡錢丁巳邉臣奏韓德讓死上曰德讓頗有智謀專任國事今既喪國母德讓又死臣佐中未聞有其比者王欽若曰國主懦弱自今恐不能堅守和好上曰朝廷始終待以誠信彼之部族亦當順從也德讓死已見去年十二月己未兩浙提㸃刑獄太常博士皇甫選罰金三十斤徙江南路選以部內繫囚悉寓禁他所妄奏獄空為知杭州王濟所發故有是責劉筠作選墓志云職思其憂席不暇暖躬欵圜土每振滯繫評定疑法覆視協中罪有抵死情實可矜得以輕比而全活者三十餘人凡部下十三郡之治迭奏獄空積一千五百餘日繄公是賴咸被詔奬獨不載罰金事蓋諱之也詔利州路轉運司自今命官使臣欲修易棧閣者須述經久利害待報無得擅行先是川峽多建議修路以􅌽恩奬或經水潦即墜石隔閡舊路又隨而廢至是利州有以新改閣道請賞建議者上知其弊故條約之上聞瀘州三月即苦瘴毒詔孫正辭侍其旭等及二月即領軍馬分屯近郡如戎人尚敢抗拒量留兵守要害以禦之壬戍詔自今謁啓聖院太宗神御殿如饗廟之禮設褥位西向再拜升殿酌酹畢歸位俟宰相焚香訖就位復再拜永為定式丙寅賜輔臣御馬人二匹己巳內侍副都知閻承翰使夏州還言趙德明於綏夏州各建館舍以待王人望於浦洛峽置驛上以其地荒敻勞於役守不許詔左右騏驥院諸坊監官自今並以三年為滿如習知馬事欲留群牧司保薦以聞當徙蒞他監壬申權判吏部銓王嗣宗等言吉水縣尉范世昌在任户長彭昉告縣典王雅受贓世昌連杖昉三次致死顯批下吏不容論訴吉州止坐公罪贖銅九斤望自今幕職州縣官非理决人致死並具案奏裁仍令本路轉運提㸃刑獄司察舉責懲殘暴之吏詔可世昌仍不得與官甲戌入契丹使馮起等言所送國母禮物本國以母亡懇讓不受种放歸終南山有使來自秦雍者得放答陳堯叟詩五章以聞上嘉之謂宰相曰放隱居力學嘗言古今殊時不當背時效古此最近於理乃詔放赴闕放表乞賜告上許之詔答云儻再召勿復辭也又作歌以賜并賚衣服器幣令京兆府每季遣幕職就山存問放為弟汶求官即授祕書省正字同判太常禮院孫奭言釋奠舊禮以祭酒司業博士為三獻新禮以三公行事近年止命獻官二員兼攝伏恐未副崇祀嚮學之意望自今備差太尉太常光祿卿以充三獻詔可乙亥減瀘州淯井監鹽課三之一丙子詔京朝官換武職諸司使以下換文資者並試時務䇿三道不習文辭者許直述其事其換武職問以邉事又詔幕職州縣官須三任六考方得論奏丁丑荆湖轉運使奏舉祕書丞監瀛州酒稅竇隨廉幹可委繁重上謂宰相曰近有言其貪濁者命察訪之王旦曰人固難知茍有材行寧不為人所忌比令察訪正為此耳竇隨未見知天雄軍冦凖言振武軍士援送契丹使過境臣已各給裝錢上謂輔臣曰冦凖好收人情以求虛譽卿等今見之矣乃詔諭凖不當擅有給賜命備錢償官實録又云王旦對上以為此事忠臣必不為之别一本乃無此語恐旦果無此語也今削去是月陜西民饑上謂樞密院曰管勾國信閻承翰等纍奏應副契丹使事例多有增損不同事繫長久可盡取看詳或有過當於理不便者並改正之咸令遵守緣路修館舍排當次第已曽畫一指揮不至勞煩可降宣命悉令仍舊尋又詔送伴契丹使回日依程赴闕不必匆遽時王時送伴遽回故有條約二月癸未史崇信等言瀘州夷人有助斗引者剽劫商旅攘奪轉餉見與孫正辭等分兵討捕即遣使賜以辟瘴藥去年十二月崇信入奏遣人就村舍招諭斗引今尚有助斗引為冦者則斗引竟不赴招安也大抵國史實録序此假事跡都不詳備耳甲申兖州言㑹真宫成給以間田邸店𬞞圃澧州言慈利縣蠻相攻劫知州劉仁霸請帥兵討捕上恐深入蠻境使其疑懼止令仁霸宣諭詔㫖遂皆感服丁亥廣南轉運使言宜州軍校陳定黃晚有破賊功望徙𨽻近郡上曰微定晚則象州不守矣朕優加奬擢蓋激忠節若徙𨽻他處或致失所非所以賞之也乃詔本州厚給裝錢傔夫遣牙吏護送赴闕補禁軍都虞候重賜金帛戊子詔禁軍都虞候已上有疾須速療者自今通進司即以聞契丹主暗弱自其母及韓德讓相繼死其弟隆慶尤桀㸃衆心附之言事者謂因遣使特加恩隆慶上曰柔逺之道務存大體正當講信修睦使之和協如其不法豈宜更加禮耶吏部銓引對選人有張祥者嘗坐贓黜為江州參軍復叙至主簿尉三任皆有勞績上曰此當為何官王旦曰以資當為令録而轉運使奏舉堪充幕職上以前犯止授令録仍自今常選人坐贓濫能自新有勞績者雖非奏舉亦許入令録知廣州馬亮言夏熱欲停諸軍教閲上曰朕記國朝已來廣南西川以遐逺之地屯泊軍士未嘗給兵器習武藝亮遽行此事恐非便乃詔樞密院檢原降指揮及近例密諭亮令遵守之三司使丁謂請承天節禁刑罰屠宰從之辛卯詔三班使臣有素負材能久沈下位者聼其自陳雄州言入契丹副使潘惟吉卒惟吉嘗得對便殿上謂之曰凡人臣立朝茍專務宴安不以勞能而升不足貴也惟吉即表求外任命為天雄軍駐泊都監未行選副樂黃目使契丹受命入謝時已病上察其羸瘠遣使詢之且言不病入北境疾作即肩輿而還詔遣其子乘驛往迎至雄州而卒上憫之令其弟閣門祗候惟清馳往護喪官給葬事惟吉雖連戚里能以禮法自修飾前後將命中外咸以勤幹稱癸巳升州民以知州張詠秩滿願借留即授工部尚書令再任仍賜詔奬焉廣西轉運使何亮言交州黎至忠苛虐不法衆心離叛其卒也一子才十嵗弟明提明昶用兵爭立大校李公藴率土人逐而殺之公藴年始二十六至忠最所親任常令以黎為姓既而自領州事稱安南靜海軍權留後且移文言見率方物奉貢請降制命上曰至忠不義而得公藴尤而效之益可惡也即詔亮安撫邉民察視機事以聞先是至忠遣使貢奉猶在京師上令以其狀諭之如欲行服亦聼使人聞之掩泣而已黎至忠卒李公藴殺其二弟遂據交川至忠未嘗被殺也國史云公藴遂圖至忠又云至忠年才二十六皆誤今但從實録㑹要及稽古録戊戌禮部尚書贈右僕射王化基卒己亥詔每嵗春夏令所在長吏申禁民間彈射罝網獵捕之具上封者言孫正辭等不能以方略招誘諸蠻入其境行無斥堠糧餽有被奪者內出其狀示輔臣陳堯叟曰已降詔督責然昨遣嘉州小校往彼招誘慮其邀功未即悉心諭蠻人以朝㫖致其疑而未復今請加申戒若蠻人安集則賞否則部送闕下使有所畏懼上然之庚子孫正辭等言安撫蠻人悉已平定降詔嘉奬正辭等又言蠻羅忽餘素忠順防援井監捕殺違命者不已上遣內臣郝昭信褒慰之且諭以赦蠻黨前罪勿復邀擊又慮正辭等兵還巖穴或有嘯聚乃命史崇貴權管勾瀘州軍馬事閣門請自今朔望除三司開封府審刑院外自餘升殿奏事官非有急切並須次日其羣臣起居日見辭謝止兩班從之右僕射判都省張齊賢言玉清昭應宫繪畫符瑞有損謙德及違奉天之意又屢請罷土木之役不聼辛丑齊賢出判孟州甲辰詔聞兩京諸路𨽻忠靖徒役人刺配者即給衣糧不刺配者止給囚人日食各有家屬或至匱乏宜令自今依例給之詔開封府諸縣祭社稷元聖文宣王廟禮料並從官給乙巳禁荆南界殺人祭稜騰邪神戊申社宴羣臣於王旦第先是社日止賜㑹中書不張樂惟輔臣洎待制已上奉內朝者預焉至是始宴私第張樂僕射尚書丞郎給諌悉集遂為定制閏二月壬子遷左右街僧官舊例僧職遷補止委開封而濫選者衆至是命知制誥李維等宿中書出經題考試而後序遷焉道官尋亦用此例道官用此例在四月壬戌今并書甲寅冬官正韓顯符造銅候儀成并上所著經十卷其制則本唐李淳風及一行之遺法云先是孫正辭等兵入溪洞多焚其積聚帝曰彼雖蠻貊亦吾民也不可使乏食乙卯詔轉運使貸以口糧丙辰詔如聞諸處捕獲逃亡兵士或以鐡烙其腕及碎脛骨方始斬决西北緣邉軍興以來軍民有罪情重者斷肢體而戮其罪不至死亦鞭之過數自今無得法外行刑初羣臣出使陳乞賜馬即時裁遣多不均乃令樞密院定其條制僧尼道士女官犯公罪者聽贖戊午遣官葺舒州靈仙觀常州宜興洞靈觀己未河北轉運使李士衡言本路諸軍嵗給帛七十萬當春時民多匱乏常假貸於豪右方納租賦又償逋負以故民間之利愈薄請官預給帛錢俾及期輸送民既獲利官亦用足詔從之仍令優與其直其後遂推其法於天下咸平二年五月丁酉馬元方事與此相關已在彼詳注太宗及秦王許王之為開封尹皆在南衙視事至道初上始復居府廨太宗命府東建堂習射於是權知府事周起奏曰陛下常所聽事臣不敢居遂空之丁卯上幸射堂宴射又至西堂閲太宗御書圖畫上作詩從臣皆賦賜開封府將吏器幣戊辰德音降東京畿內死罪以下囚將吏逮事太宗藩府者並賜物赤縣父老令本府宴犒年九十者授攝官賜粟帛終身八十者爵一級甲戌增葺射堂為繼照堂設帟張樂許士民遊觀三日學士院舊例赦書德音不鎖院及是宰相召朝逈等問之逈等言除南郊赦書緣車駕在外並合預先進入降付中書難以鎖院外自餘赦書德音請自今依降麻例鎖院從之龜兹國王遣使來貢方物三月庚辰朔河東轉運使言并州官吏以知州劉綜嵗滿列狀請留詔奬之辛巳比部郎中蔡汶使西川還言川峽每春州縣聚遊人貨藥謂之藥市望令禁止之上曰逺方各從其俗不可禁也乙酉詔泰山采碑石洎燒石灰所歷民田踐禾稼者特與給賜國家每嵗初夏即降詔恤刑上慮守臣或因循怠忽丙戍特降詔申警之戊子詔在京軍員選為川峽諸州都校還無遺闕者並許引對當行升奬壬辰以孫正辭為西染院使侍其旭為內殿承制賞平夷之功也張繼勳先卒詔録其嗣所部禁廂軍及輦送護援兵健子弟皆賜緡錢隨行使臣軍校及牙吏等各第其功而賞之繼勳子懷信為入內髙班繼勳亦必是內臣也李公藴遣使入貢上以蠻夷不足責即用黎桓故事授公藴靜海節度使封交趾郡王賜衣帶器幣丁酉上謂王旦等曰自北鄙修好疆埸不擾朕居安慮危罔敢暇逸嘗著文自警置之座右乃出貴廪食珍田夫吟念農歌自戒針以示旦等太康縣民有起妖祠以聚衆者令開封府禁之三司貸內藏錢三十萬貫河陽令錢若冲有僕酗酒若冲杖之百數僕夜挾長刀潛入室中斷其臂若冲呌呼得不死其從子死焉又擊傷二人若冲若水弟也時若水母尚無恙上念之遣使存問優賜緡帛羊酒又賜若冲帛三十匹副以藥餌詔磔僕夫於其門己亥上謂宰相曰刑獄之官尤須遴擇朕常念四方獄訟若官非其人寧無枉濫且單弱之人不能披訴朝廷無由知之頃嵗有縣胥醉酒與驛遞鋪卒相毆夜歸胥踣於路或以告卒夜寒恐僵死卒亟往視之則已死有司遽執此卒遂以毆殺人論母訴於州州不能察杖之母歸告其婦曰何忍子之屈死母即詣闕伐鼓詔使案覆又不能原其情母坐上言失實杖背放歸其婦已罄資而去私適他族此不由刑官非人以致孤弱受弊乎天書殿屢有祥異上以語輔臣王旦等曰陛下至誠奉天天示寶符神物相之固其宜矣辛丑詔戎瀘州給復一年民艱食者賑之癸卯徙環慶路鈐轄東上閣門使髙州刺史曹瑋為鎮定路鈐轄上以瑋立效西鄙欲其諳河朔戎事故有是命上作念邉詩賜近臣和禁䖍州民造黐膠甲辰上謂輔臣曰將帥才難今文武中固亦有人蓋不經戰陳無由知之雖天下無事然兵不可去戰不可忘古之道也馬知節曰將帥之才非可坐而知之顧臨事機變如何耳咸平中將帥方略無聞措置未便不能擒戮戎冦蓋以未得其人故也今朝廷士馬雄盛城壘堅固器甲犀利茍契丹渝盟邉候有警陛下得人授之成算可使無噍類矣上曰自頃契丹入冦備禦之䇿無日不講求而將帥不能决勝陳堯叟盡知此事堯叟曰咸平中契丹侵軼亭障國家嵗嵗防秋六年舉國而來羣議咸請大為之防陛下親降手劄詢于中外雖繼上謀畫皆未盡善乃特出聖斷控守險要排布行陳又擇鋭卒散為竒兵俟戎首南侵即命諸路直赴幽燕取其車帳俾邉郡援應皆以方略示之而將帥非其人故殊勳不集上曰知節久任邉防以為禦戎之䇿何者為善知節曰邉防之地橫亘雖長然據要以扼其來路惟順安軍至西山不過二百里若列陳於此多設應兵使其久莫能進衆將疲敝時以竒兵輕騎逼而擾之如敢來犯即命將深入力戰彼必顛覆不暇今諸將喜用騎兵以多為勝且騎兵之多者布滿川谷而用之有限茍前進而小有不利則莫之能止非所謂節制之師也臣嘗謂善用騎兵者不以多為貴但能設伏觀戎冦之多少度地形之險易冦少則邀而擊之衆則聚而攻之常依城邑以為旋師之所無不捷矣因自陳年齒未暮五七年間尚可驅䇿如邉候有警願偹戎行但得副部署名目及良馬數匹輕甲一聨足矣上曰誠知卿可屬任但願四方無事乃命製鋼鐡鎖子甲以賜焉已酉侍衛馬軍司言河北河東禁軍器過河緣諸州軍合用閲習木鎗弩弦等望據數封記齎往從之是月鄜延路言趙德明母亡宰臣奏曰德明頃年已告母喪朝廷行起復之命贈賻之典今復喪母蓋蕃戎之俗諸母衆多朝廷自合遵守禮法諭之俟其有請别加商議上可之既而德明卒不自言糾察刑獄司言伏覩犯罪經赦後事發准律有離之正之之文今法離正之外仍糾本罪用法似深帝曰比行赦宥事發不免其罪理合商量但此事行之已久宰臣王旦曰經赦不自陳首非有發露無由離之正之所以律文有赦後不首之罪且事有幽隱而經赦既不自首發則亦獲免罪於理非便遂令法寺參議以聞左屯衛將軍允言非理捶其女僕兄允升誨焉允言出語不遜上亷知之命管勾南宫北宅事趙湘按其罪夏四月辛亥責授允言太子左衛率府副率絶其朝謁壬子詔兩浙路赴京木筏職員軍士月給緡錢溫台等州民獻木助修玉清昭應宫者優給其直鎮安節度使同平章事駙馬都尉石保吉卒于京師時夜漏已上訃聞上亟令入內都知秦翰開元武門往視喪事廢朝三日贈中書令諡莊武屬孟夏饗太廟未即臨喪遣使諭其家禮畢乃臨哭之保吉姿貌瓌碩頗有武幹重世將相家富於財所在有邸舍别墅雖饌品亦飾以綵繪性驕倨好殺歷藩鎮多擾細民待屬吏不以禮帥大名葉齊查道皆知名士悉命械頸以督糧運初程能將漕京西保吉託其治私負能不聼至是其子宿亦為吏屬將加苦辱㑹為張永德所辟乃止喜弋獵畜鷙禽數百令官健羅鳥雀飼之有規勸者輒加詬怒在陳州盛飾廨舍以迓貴主因完葺城壘疏牖于上以瞰衢路如箭窗狀未嘗上聞賔佐諫之不聼頗涉謗議上曰保吉用刑峻急惠不及下此謗議所從起也乃密詔戒之知施州侍禁孫詡坐擅賦斂入已私役所監臨計絹二十匹削籍為民甲寅占城國遣使來貢使還日賜以馬及器甲從其請也其國主言前所賜白馬與炎土不宜乞改賜黃赤色者亦從之占城是嵗此月一入貢其王即施離霞鼻麻底也實録誤以此為普居毗茶室禽故於七月又重出此事據他書並無今削去陜西民疫乙卯遣使齎藥賜之丙辰詔諸州司法參軍有檢法不當出入徒流已上罪者具案以聞經三次誤錯者替日令守選及委長吏察舉從兩浙轉運使陳堯佐之請也因謂輔臣曰詳明平允由性識耳如窮經之士諷讀雖久有不能通其義者法官能曉律意猶學者之能逹經㫖縱與時事不同但依之亦可尚也丁巳龍圖閣待制陳彭年上奉詔纂歷代帝王集二十五卷上作序名宸章集時京師竹有華司天言主嵗不登上曰數嵗豐稔物價甚賤但小民不能愛惜飲食之餘多所棄擲宜令開封府嚴禁之戊午詔曰朕以六合之大庶官惟艱雖遴簡為宜而綱條未舉廣薦揚則或滋奔競絶任保則慮失俊髦爰議酌中垂為經久用防過聼庶協僉謀自今每年終翰林學士以下常參官並舉外任京朝官三班使臣幕職州縣各一人明言治行堪何任使或自己諳委或衆共推稱至時令閣門御史臺計㑹催促如年終無舉官狀即具奏聞當行責罰如十二月內差出亦須舉官後方得入辭諸司使至內殿崇班曽任河東陜西及川廣鈐轄親民者亦同此例諸路轉運使提㸃刑獄官知州軍通判結罪奏舉部內官屬不限人數明言在任勞績如無可舉及顯有逾濫者亦須指述不得顧避以次年二月二十五日已前到京如有違限委都進奏院具名以聞當依不申考帳例科罪三司使副即結罪奏舉在京掌事京朝官使臣仍並令中書置籍先列被舉人名銜次列歷任功過及舉主姓名薦舉度數一本留中書一本常以五月一日進內次年籍內仍計向來功過及薦舉度數使臣即樞密院置籍兩省尚書御史臺官凡出使回並須採訪所至及經歷鄰近羣臣治迹善惡以聞轉運使副提㸃刑獄官知州通判到闕各具前任部內官治迹能否如鄰近及經由州縣訪聞羣官善惡亦許同奏先於閣門投進後方得入見或朝廷要人任使及有不治州縣難了公事並於上件籍內選過犯少舉任及課績數多并資歷相當者差委仍於宣勑內盡列舉主姓名或能一任幹集即時與遷轉苟不集事本犯雖不去官亦移閒慢僻逺處內外羣臣併舉及三人幹事者仰中書樞密院具名取㫖當與酬奬如併舉三人不集事坐罪不至去官亦仰奏裁當行責降或得失相參亦與折當諸路轉運司諸州軍管內有未中倫理及繁難事務須朝廷選官臨涖者三司審刑院有纍經㑹問舉駁未了錢穀刑獄公事委是州縣不能結絶須自朝命遣官者亦於籍內選差幕職州縣官三任七考以上使臣在班十年已上歷任無私罪實有課績無人奏舉者亦許經所由司自叙即令主判官驗問材地可否選人試刑名時務各三道使臣須試邉事及刑名時務者亦聽如實有可取即送中書樞密院再加考核取裁如流內銓三班院體量得選人使臣别無干纍顯有勞績書判材識實堪任使者亦許先送中書樞密參詳别與引見每年各不過十人不得將勢家子弟充數近臣除郊祀承天節及委寄差使舊有恩例外更不得非次為親戚陳乞恩澤虞部員外郎權判大理寺王秉式言本寺官屬多避繁重自今望令權詳斷官未替不得别求任使如實不明法律委本寺衆官體量聞奏方許外任正詳斷及檢法官年滿亦俟替人方得出寺詔從之其權詳斷官以半年為限先是曹瑋及張崇貴上涇原環慶兩路州軍山川城寨圖己未上出以示王欽若等曰處置咸得其宜至於儲備亦極詳悉宜令别畫二圖用樞密院印一付本路一留樞密院按圗以計事詔京東西河北河東有屯兵處並選諸司使副及御前忠佐為都監駐泊令以時訓練辛酉賜泰山隱士秦辨號貞素先生放還山辨自言百三十六嵗上召至京與語多言五代事亦無他術但能服食致長年耳癸亥詔幕職州縣官除廣南福建路令預借俸錢外江浙荆湖逺地麟府等州河北河東緣邉州軍自今並許預借兩月俸餘近地一月是日後宫李氏生子知開封府周起方奏事上謂起曰知朕有喜乎起曰臣不知也上曰朕始生子即入禁中懷金錢出探以賜起李氏杭州人初入宫侍劉修儀莊重寡言上命為司寢既有娠從上臨砌臺玉叉墜心惡之上私卜叉完當得男子左右取叉以進殊不毁上喜甚已而果生子後封李氏為崇陽縣君復生一女不育李氏所生子是為仁宗甲子契丹主葬其母於顯州北二十里詔以是日廢朝仍令邉城禁樂三日丙寅廢秦州破他嶺採木務務本楊懷忠所置以車乘往來艱苦故廢之簽署樞密院事馬知節言前知秦州按視得蕃界大小洛門皆巨材所産已於逐處及緣路置軍士憩泊營宇令蕃部感朝廷綏撫各思保塞望遣使諭諸族令防援軍士同力採取况俯臨渭河可免牽挽之役從之戊辰詔應內外官犯罪被鞫事理昭然不即引服規望滯留者並權格俸給仍不得領務常從亦罷去之先是虞部員外郎知通州李泰清以不察鹽場官為盜纍遣官按劾不承為御史臺所舉故有是詔太常博士石待問上時務䇿十數條大率言北鄙凶變非與中國渝盟即遭其弟篡奪乞選將綀兵為之備豫又言先朝多任中人陵轢將帥故罕成功上曰人臣指陳時政有關朕躬過失雖不近理亦當優容之待問乃以祖宗制度所無之事恣為矯誣是不可恕也待問制科䇿名必將升用但謹其操履胡施不可何乃自貽躁妄之咎乎即命翰林學士李宗諤詰之待問辭窮已而責授滁州團練副使不得簽署州事歐靖聖宋掇遺云待問上疏諫修昭應宫云羣臣皆以陛下在堯舜之上臣謂不及唐太宗逺矣坐是被黜附見當考初封泰山命宰相王旦撰封祀壇頌知樞密院王欽若撰社首壇頌陳堯叟撰朝覲壇頌甲戍旦加兵部尚書欽若戶部尚書堯叟工部尚書頌成示賞也乙亥出內庫錢五百萬贖故宰相吕端居第賜其子蕃先是上謂王旦等曰端諸子皆幼長子蕃病足家事不理舊第已質於人兄弟有不同處者昨令中使視之蕃扶杖附奏求賜差遣朕思之不若出內庫錢贖還舊第令其聚居又僦舍日得千錢可以贍養然蕃頗懦當諭㫖凡有支用置簿嵗上內侍省後六年蕃為弟蔚娶妻又表獻居第求加賜豫且言負人息錢甚多旦曰陛下恤孤念往以勸人臣而蕃重煩聖念不可聽上曰宜别出內庫金帛賜之俾償宿負蕃弟荀仍與西京差遣令蕃同往自今無得借使他財命有司為掌僦課給其家復詔樞密院察其妄費旦曰陛下推恩終始極矣唐元和中遷魏徴舊第止降一詔何嘗委曲如是耶王旦所云事在八年八月今并書上封者言戎瀘州夷人前嵗為梗蓋淯井監深在溪洞官司少人往來致兹稔惡丁丑詔江安縣監軍量分兵巡警之戊寅詔訪聞關右民每嵗夏首於鳯翔府岐山縣法門寺為社㑹游惰之輩晝夜行樂至有姦詐傷殺人者宜令有司量定聚㑹日數禁其夜集官吏嚴加警察太常丞乞伏矩奏川界弓手役户多貧乏困於久役州縣拘常制不替以至破壞家産况第一第二等户充耆長里正不曽離業却有限年弓手係第三等户久不許替深未便安乞自今滿三年與替情願在役者亦聽其第三等户不足即於第二等户差充奏可㑹要祥符三年四月事是月知雄州兼河北安撫使李允則言久戍邉乞給假暫乘傳赴闕詔從之此據㑹要允則過天雄時冦凖實知府事謂允則曰聞君在雄設宴特盛能為凖作小㑹否允則曰方入奏不敢留還日當奉教及還凖與之飲妓樂器用皆極華侈意將壓之謂允則曰許凖作㑹來日可乎允則唯唯凖顧左右曰妓樂如今日但無設百戲幄帟床榻留以假之允則曰妓樂皆如今日其他隨行可略具也明旦視其幄帟皆蜀錦繡床榻皆吳越漆作物物稱是凖已愕然及百戲入允則曰恐外尚有雜仗使召之則京師精伎至者百數十人凖視之大驚使人詢之則床榻脫卸氊裹駝載雜伎變服為商賈以入凖深服其才亟薦于上雄之僚吏尤允則曰冦公尚氣奈何以此勝之允則曰吾非欲勝之姑示以軍行出沒之巧耳雄之諜者常告遼國要官隂遣人至京師造茶籠燎爐允則亦使倍與直作之纎巧無毫髮之異且先期至則擕入𣙜場使茶酒卒多口者夸說其巧令北商遍觀之如是者三四知遼官所市者已過乃收之不復出遼中相傳謂允則賂之恐有姦變要官無以自明乃被殺其知術大抵類此此據龍川别志五月辛巳內出手札示編修君臣事迹官曰張揚為大司馬下人謀反輒原不問乃屬之仁愛門此甚不可者且將帥之體與牧宰不同宣威禁暴以刑止殺今凶謀發覺對之涕泣愈非將帥之事春秋息侯伐鄭大敗君子以為不察有罪宜其喪師今張揚無威刑反者不問是不察有罪也可即商度改定之壬午以西凉府密諾爾族瘴疫詔賜首領溫布等藥上謂輔臣曰西鄙鹽犯者甚衆當更寬之馬知節曰寬之則犯者愈多不若減解池鹽價陳堯叟曰解池鹽已行商不容官減其價誠能減之則青鹽之禁不必寬也癸未詔權停今年貢舉甲申京西提㸃刑獄官知河陽髙紳修黃河岸以棄石纍之計省工巨萬而又堅固賜詔奬紳東封嵗南陽郡康孝王惟吉有疾不克從屢賜手詔朂以調養稍愈馳詣行在車駕還頓鄆州惟吉迎謁上勞問再三喜形于色明年疾復作不能朝謁車駕屢臨省之或親視其灼艾日給御膳為營佛事設科醮令開封府揭榜募能醫者及增劇八日之內臨問者五丙戌車駕方自其第還聞其不起復往哭之慟翌日對宰相語及又泣下惟吉好學喜屬文雅善草𨽻飛白性至孝初太祖命孝章皇后撫養之后親為櫛沐及上仙哀過所生咸平初賜諸王太宗聖容又特以太祖孝章畫像服玩器用賜惟吉嵗時奠饗哀慕不自勝每誦詩至蓼莪父母劬勞之句涕泗交下宗室中有賢明之稱焉丁亥度支判官曹谷言內外羣臣上封者衆尤煩省决自今望令言錢穀者先檢㑹三司前後編敕議刑名者引律令格式刑統詔條論户稅者須按農田勑文定制度者並依典禮故事各於章疏具言前後詔勑如已有條貫者即明言雖有某年月日詔敕今來未合便宜乞行更改方許承接從之曹谷未見是年有河中通判曹谷又别一人己丑詔河東安撫司半年一入奏邉事如有急切不拘此限癸巳補虎翼軍士張福郭玘盧興為軍小校劉福為隊長賜錦袍銀帶福等𨽻戎瀘州巡檢討蠻保於百井谷茵幫山寨栅峻不可陟福等六人願先登捫蘿躡石纍足一跡而上遂破之二人死焉是日軍還對於便坐特加奬擢有司又閲其籍凡一百二十五人以年老當退為剩員上曰此兵討賊還不當拘以常例並命復本軍他日上語近臣曰孫正辭等初入蠻境駐軍夾灘蠻人據險為寨路狹而峻望之若不可上軍卒有先登者徑入其寨蠻人盡走始知畏懼然正辭等遇賊頗多殺戮誅其有罪猶不獲已童稚無知不能矜免此甚可念固知軍旅一出必有橫被其禍者可不戒乎甲午詔奬知益州任中正轉運使言吏民列狀願借留之也中正及并州劉綜皆以善政聞上謂輔臣曰藩方重地切於得人朝行中亦難其選自今須歷方面始可擢為大官卿等志之乙未御崇政殿慮囚死罪以下遞降一等庚子詔河東陜西夏秋租稅並令輸送本屬不得支移辛丑京師大雨平地數尺壞軍壘民舍民有壓死者賜以布帛癸卯以益州路轉運使祠部員外郎張若谷為度支員外郎陜西路轉運使屯田員外郎李士龍為都官員外郎賞戎瀘供餽之勞也環州髙繼忠言國家西陲軍壘宜常完葺趙德明雖稱藩然頗不遵誓約近有所部蕃族釀酒召內屬户飲之欲誘其背叛被飲者皆以其事來告上謂宰相曰方今四海無虞而言事者謂和戎之利不若克定之武也王旦曰止戈為武佳兵者不祥之器祖宗平一宇內每謂興師動衆皆非獲已先帝時頗已厭兵今柔服異域守在四夷帝王之盛德也且武夫悍卒小有成功過求爵賞威望既盛即須姑息往往不能自保凶于國而害于家此不可不察也上深然之丁未封州刺史錢惟濟獻所為詩上以其王公之後留意文學甚嘉之因謂王旦等曰今文章體格與近代不同館閣中頗勤職業每覽歌頌皆以典雅相尚至於該洽之士如杜鎬者亦少且言鎬雖老手不釋卷陳彭年亦勤於筆硯常日書萬字又曰彭年近令編次龍圖閣太清樓書又赴編修君臣事蹟所以備討論仍掌三館檢討修起居注凡有詢訪應答甚敏亦不多得也是月契丹所部南北大王皮室伊實本布大師奚室韋黑水女真等賦車二千乘於幽州載戎器將伐髙麗按女真不屬契丹此舉又為髙麗及女真所敗不知所調車乘何以及女真豈别種耶殺其臣邢抱朴召劉晟知政事又召隆慶隆慶反側辭以避暑不行輒繕完兵甲遣親信以私書交結國中貴幸其親信録書來告雄州訴其主不能敦協親族國人思漢上知隆慶教為之密諭邉臣沮其意六月庚戌賜石隰州都巡檢使汝州防禦使髙文岯綵二百匹茶百斤文岯母在晉州因其請告寧省特有是賜文岯尋以母喪起復甲寅起復今并書供備庫使謝德權言准詔𨗳太一宫側積水今開渠抵陳留縣界入亳州渦河望令於逐處造橋以濟行者仍約束緣河州軍疏治從之癸丑屯田員外郎知河中府楊舉正言得本府父老僧道千二百九十人狀請車駕親祀后土節度使寧王元偓復以為請上曰此大事也詔不許其父老僧道欲詣闕者止之乙卯汴口淺澀命知制誥孫僅祭告既而㴻雨水漲公私無滯知雄州李允則言契丹界纍嵗災歉闕食多來近邉市糴詔本州出廪粟二萬石賤糶以賑之丙辰頒諸州釋奠元聖文宣王廟儀注并祭器圖先是陜西饑民有鬻子者口不滿千錢詔官為購贖還其家實録正月末書是月陜西小饑今乃書前嵗陜西小歉民有鬻子者兩書差互略刪潤之詔在京店宅務自今止以元額為定不得輒增數剗奪翰林侍讀學士禮部尚書郭贄卒故事無臨喪之制上以舊學故親往哭之廢朝二日贈左僕射諡文懿録其三子為大理寺丞評事庚申詔泰山修崇宫廟有輦取土石傷踐民田者並加給賜辛酉定持仗劫盜本無彊意傷人者罪上以舊條未適中令法官參議而差減之壬戌以都官員外郎知制誥知兖州朱選為兵部員外郎京東轉運使金部員外郎馬元方為司勳員外郎餘並如故賞泰山修封之勞也使臣軍校兵匠悉第遷之癸亥保安軍言趙德明率所部營於𨫼子山大起居第戊辰開封府言咸平尉氏縣蝻蟲生庚午詔諸州大辟罪及五人以上獄具請鄰州通判幕職官一人再録問訖决之辛未令南康軍長吏祭蛟時內侍趙敦信使還言江中有蛟為行人害舟筏多覆溺者因請飾其廟宇上曰害及吾民而守臣不以聞何也乃詔轉運使按察之尋又作戒蛟文刻之江側作戒蛟文乃六年十月事今并書之翰林侍讀學士禮部尚書邢昺被病請告詔太醫診視上親臨問賜名藥一奩白金器千兩繒綵千匹國朝故事非宗戚將相無省疾臨喪之行惟昺與郭贄以恩舊特用此禮儒者榮之昺二子皆為外官即日命內侍傳㫖中書召還視疾及卒廢朝二日贈左僕射三子並進秩雍熙中昺獻禮選二十卷上嘗因內閣曝書覽而稱善召昺同觀作禮選贊賜之昺言家無遺藁願得副本上許之繕録未竟而昺卒亟詔寫二本一本賜昺家一本俾置冡中昺在東宫及內庭侍上講說孝經禮記者二論語十書十三易二詩左氏春秋各一據傳疏敷繹之外多引時事為喻深被嘉奬洪湛之得罪也昺力居多王欽若德之昺絶寵幸亦欽若左右之也其後昺妻每至欽若家欽若迎拜甚恭昺子仲寶貪猥不才舉止率易士大夫無不鄙笑其為人及欽若在中書用為三司判官有蔡守讓者善射太宗嘗令在東宫侍射後至殿直及上省昺疾因記守讓令訪其子孫而子已死有孫才三嵗以為三班奉職壬申詔完築豐州城甲戍以多雨遣皇城親從卒八人分往畿縣察視民田還言積潦廣處至五十七步而苖稼無所傷
