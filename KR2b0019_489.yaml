body:
  text: 續資治通鑑長編卷四百八十五宋李燾撰哲宗案自元祐八年七月至紹聖四年三月原本並闕紹聖四年夏四月乙酉詳定敕令所言諸路應有改更役法衙規事件並令户部看詳申尚書省候推行成緒即依元豐舊法一事令户部指揮季終聞奏從之新本削去樞密院言河東路自去秋及今折克行等纍統制軍馬出塞無不勝捷前後共獲賊首三千餘級近出師援助修築葭蘆師旅方還數日間將兵出界照應涇原進築直至西界地名長沙川以來討蕩賊巢斬級二千獲孳畜鎧仗焚蕩族帳不少賊衆緣此逺遁不敢並邊耕牧近據鄜延路經略司奏日近西賊遇夜直至大里河以來耕種晝則却歸賊界公然往返全無畏憚蓋是本路軍聲不振自來不曽敢出塞討擊致賊界敢爾輕視今彼界於近邊尚敢如此安然往來耕種即界外三二百里間人户耕農皆不失業向去秋夏廣有收成資助賊糧即必又為併兵大舉之計侵犯邊防使邊人不免被害欲令鄜延環慶路經略司詳此當切多方體探賊界有賊馬屯聚或部族住坐去處決有萬全可乘之利即不限時月選遣精鋭兵將前去痛行討蕩使賊界兵不解嚴人户不敢安居耕種免致秋成更為邊患况今來西人已困當乘勢攻擾使其不得時暫安居則可以坐致困敝諸路帥臣如能精選將佐整齪兵馬常為分畨迭出討蕩之計仍大作聲勢如將深入使知我不測分兵處處為備仍乘伺間便可以擾擊倐往忽來出其不意隨宜討蕩則城界部落不得安居耕種失業不惟無以資糧食侵犯邊境兼近邊人户疲困無以為生亦因此易為招納實於邊計為便詔令熙河涇原河東經略司依詳已降指揮施行若賊界對境有屯聚賊馬及耕種住坐人户知得逺近多寡次第委是有利可乘即不限時月相度出兵掩擊新本刪修云樞密院言河東路自去秋及今折克行等統軍出塞數奏膚功近出師應援修築葭蘆復將兵照應涇原進築直至長沙川焚蕩賊衆不敢並邊耕牧近鄜延路經略司奏西賊遇夜直至大里河耕種晝則却歸賊界蓋是本路軍聲不振不敢出擊致賊界敢爾輕視欲令鄜延環慶路經略司多方體探賊馬屯聚決有萬全可乘之利即選遣精鋭痛行討蕩况今西人已困當乘勢攻擾如諸路帥臣能選精鋭為迭出之計使賊知我不測分兵為備仍乘伺間便出其不意則賊界部落不得安居兼近邊人户疲困無以為生易為招納詔令熙河涇原河東路經略司依已降指揮若賊界對境委是有利可乘即不限時月出兵掩擊丙戌三省言元豐差官職位高下稱事立為畫一革去臨時旋有申請輕重不倫之弊元祐中遂行罷去詔今後並依元豐條施行于闐國貢方物二十七日又見當存一處捧日天武四廂都指揮使康州團練使太原府路副總管王崇極知代州兼管勾河東沿邊安撫司事元符三年二月十二日曾布云云可考東上閣門使成州團練使涇原路副總管王文振為太原府路副總管知麟州張世永復崇儀使權發遣太原府路鈐轄管勾麟府路軍馬事布録元符三年二月十一日同呈王恩躐遷在崇極及張璨之上是時河東方收復葭蘆寨張構王舜臣等引兵渡河而崇極不出諸路副帥於進築討蕩之際未有不統制軍馬出寨者克行以崇極管軍副帥而邊事之際乃不與驅䇿遂罷知代州及管軍遞遷遂擢王恩於其上又每以元祐末除崇極張璨為管軍不當上再三云張璨作管軍尤可怪今在否布云已作宫觀丁亥翰林學士承旨蔡京言三學補試外舍法春以二月秋以八月今來太學公試亦是同月竊慮參雜詔補試外舍生春用正月秋以七月新無可削水部員外郎趙竦請濬十八里河令賈種民往吕梁百步洪相度添移水磨與淮口相去不逺詔令計會發運并轉運司同相度利害及合用功力以聞閏二月十九日可參考刑部大理寺言諸獄皆置氣樓涼窗設漿飲薦席罪人以時沐浴食物常令溫暖遇寒量支柴炭貧者假以衣物其枷杻暑月五日一濯又獄州縣當職官半年一次躬行檢視修葺務令堅固從之戊子朝獻景靈宫至於己丑詔宣政使梁從政用勾當皇城司酬奬除宣慶使依舊榮州防禦使是日曽布白上太學博士鄭居中上殿如何上曰蔡京力薦布曰章惇常言市井險薄不可用上曰見説却作得文字可以别用布曰只是一有詞業舉人爾在太學中本與林自相倡和近却大罵林自近見臣却為龔原抱屈稱道非常云序辰不當繳告命又云只因林自不喜故衆惡之其為人反覆可見矣林豫在此近對臣及林希言福建只有二凶人一在館閣一高科乃林自方天若也林自凶慝尤不可用上曰章惇亦自言林自是凶人布又言臣嘗言安惇辭權舍人果然今徐鐸又辭蓋龔原之命繳則得罪衆人不繳則得罪執政以此人無敢當者願陛下察此情則原之命當否可知矣退見惇問居中何以上殿惇曰市井險薄則不可取文藝亦有可取爾布又曰上言公亦以林自為凶人惇曰凶人則非但狂狷爾布以林豫之語告之遂默然殿中侍御史陳次升言臣伏聞翰林承旨蔡京同林希先薦太學博士鄭居中充御史已聞不召今又聞有旨令上殿臣不知所由未審别欲用居中耶為復令充御史耶謹按居中弟久中故祕書省正字王雱之壻也雱乃尚書左丞蔡卞妻之親弟也居中與卞係婚姻之家又聞與中書侍郎許將知樞密院曽布二家亦聨姻親今若令為御史是廢祖宗故事若别與差遣是孤寒之士無階而進其所引進者執政之親黨耳况居中周穜林自輩實為徒侣惟事讇巧憸佞士論所不與今多士盈庭豈無如居中者何居中之必進也今既召對乃朝廷已行之命臣不敢乞罷欲乞賜對之日陛下察言觀行退之進之斷自聖衷抑權貴親黨而使寒士有可進之路仍乞今後大臣引薦人材伏望聖慈詢問是與不是執政親黨然後詳酌指揮施行不勝幸甚正月十七日京希被詔同舉御史壬辰西京左藏庫副使兼閣門通事舍人种朴為涇原路都監知鎮戎軍詔恤刑條制依元豐令提點刑獄司嵗於四月十月上旬檢舉下諸州長官行訖奏聞知兖州溫益言孔子廟宅元祐中置教授一員本家子弟在學不過一二十人欲乞罷置從之詔殿前都虞候泰州防禦使權發遣熙河蘭岷路經略安撫司事王文郁罷軍政權提舉崇福宫文郁以目疾有請也樞密院言蘭州日近修復金城關繫就浮橋本州邊面已是宰固緣涇原又進築古高平沒煙峽城寨下瞰天都不逺尚未與熙河邊面通徹如將來涇原舉動進築天都鍬钁川蕭瑪伊克隘等處又須得與熙河兩路聲勢相接乃可互為肘臂久逺無虞理宜更自熙河安西城東北青石峽口齊訥納森東楞摩至會州以來相度逺近修建城寨仍自會州却入打繩川建置堡塞直截與鼐摩會相接即與涇原通徹互相照應近便河南之地夏賊無由更敢爭占將來耕墾稍及分數則芻糧豐賤邊費減省方為久計詔令章楶鍾傳究心體訪山川地理逺近與控扼要害合修築處斟酌敵情兵力合如何舉動可保全勝具狀以聞章楶奏臣元祐年中任陜西轉運使巡歷至涇原後又承乏環慶與涇原為切鄰講求邊防利害乃知有葫蘆河川原野廣濶别無山谷巇嶮之患資藉水草民兵易集故臣到本路不旬日間條上進築之䇿朝廷幸聽其計授以成算假兵他路乘機以進兩城並築上賴宗社之靈天地助順甫及再旬悉皆了當然兩城初建百事草創深入賊境未敢耕牧道路梗澀籬落不全東西兩山賊路數條抄掠之患朝夕必有若不於古高平上下褊江川等處修築堡障則今日二城寨猶為孤絶理當先固根本俟糧草有備兵民安居然後更議斥大疆土勢須在二三年之後今若遽欲有為不獨糧草未至足備兼亦未知前去有無險隘可與不可通行車乘若非車乘只用人力頭口須十倍於今日進築之數或遇險隘糧道為賊邀截必須誤事至如昨來修築石門城好水寨既以重兵當其鋒又分擘環慶秦鳳兩路二萬人及本路兵馬一萬人使當東西兩山賊馬旁來之路又遣兵馬於懷逺三川定川等處張大聲勢緩急照應其糧草般運往來道路又差巡檢三員褁送防托然猶時有賊馬至好水峗濟嚕新結溝等處濳伏伺隙欲出捎擊糧道若使當時備禦不嚴或西賊不顧存亡遣三百騎出大川衝突糧道人夫必致潰散今於他處修築若道路不至明快則饋餉之虞十倍前日兼熙河秦鳳路臣平生未到故彼處山川道路及逺近地里臣都不知况又欲出生界修築青石峽東楞摩等處決難遙度只如本路沒煙峽石門城在平川之內去邊壕不逺其地里逺近及山川形勢據大兵至彼後畫到圖子與前日傳聞百無一同則青石峽等處利害豈敢臆度欲乞只令鍾傳相度或别委通知邊事練達機權之人子細商榷又臣聞賊人所長者戰鬬所重者報復本路去年攻破賊堡殺數千人今又於其心腹之地建兩城寨殺獲近二千級所結仇怨比諸路特深其建築去處皆係膏腴諜者傳西人語唱歌作樂田地都被漢家占却又云奪我飯碗觀此事勢必須竭力盡死來爭自今以後百計枝梧尚慮不逮若將來那輟本路兵馬過他路臣恐必有踈虞合先具奏知又臣今來準朝旨相度修築去處雖未知朝廷欲興舉限期逺近若在三二年之後邊塞連歲豐熟公私稍有儲蓄本路所築兩城寨籬落稍全然後更議進築方保成功若欲於今秋或來春便接續興舉臣未見其可且如熙河兵馬自去年九月安西城之役以來調發暴露八個月之間才得兩月休息人力疲弊耕種失時若不稍加全養猝又驅使恐不如意及臣度朝廷所以急欲成就進築之事必謂西賊連年點集事力困疲人人怨咨無有鬬志諸道交攻應命不暇遂致今春以來諸處進築攻討皆有成功雖臣亦以謂西賊凋弊如此至考昨來前石門之戰則大不然彼以人馬十餘萬衆分頭暴至鎧仗精明紀律嚴整鋒謫既交各盡死力鏖戰分合十數次過河逼寨奔突殺人仍各攜草一束鍬钁一件意要填疊壕塹斸掘城身欲如永樂之事幸而諸將同心奮擊託社稷之靈以取勝捷遂至我軍還寨無復追襲之患不然事未可知以此而觀則不當以困弊無能為待西人朝廷不可不知也黃貼子今來進築二壘雖蒙朝廷添屯東兵一十指揮已抽那土兵兊換戍守及於諸處權剗刷弓箭手貼數分擘在逐城寨防托諸處已覺闕事須防今秋舉國入寇便合作十分枝梧茍非假以歲月招置弓箭手耕墾土田難為戰守長久之計若便謀進築不惟未有人馬可那戍守亦恐糧運艱辛别生邊患臣不敢不先事開陳輒逃忤旨之誅尚冀聖明垂照臣自到本路既條上進築之䇿首會沿邊城寨見在錢糧草料度其力可以舉動方敢自必今因應副石門好水兩城寨支用如熙寧高平定川三川鎮戎軍年計及諸司見在錢斛今皆所存不多糴買過時别無他術補助又夏苗旱甚秋種未入將來軍儲尚未可知而熙寧寨等處更當廣行計置儲蓄以備緩急宿兵臣方憂之計未知所出若依今來朝旨更議進築臣恐兵食匱乏别生他患乞下劉何巴宜會計今來石門好水兩城寨進築的確所費及見今沿邊城寨應干諸司見在錢斛奏聞然後乞朝廷斟酌事力别降指揮又臣契勘前月二十一日前月乃三月也會合四路軍馬役兵進築石門好水兩城寨糧草樓櫓弓矢畚鍤防守器具般輦並進所恃大川别無艱阻據轉運司關牒和雇到大車三千七百餘輛小車數千輛人夫一萬人頭口一萬六千往來鎮戎髙平熙寧等處般運差官驅催絡繹於路其所運糧草一日只供得一日僅免闕乏逮至分屯所餘無幾今來若依朝旨所坐到地名便議進築地里遙逺山川險阻若欲留兵控扼以護般運則軍勢已分若只聚兵護築則聲援相逺糧道不繼萬一賊出抄掠未免腹背之患此不可不慮者更望朝廷相度車夫頭口可與不可再行和雇四路兵力可與不可併往一路錢糧草料足與未足議定計審徐徐為之未晚也黃貼子勘會自熙寧寨到石門進築處只是四十里道路至廣其車乘方軌並轍往來凡二三十輛晝夜不絶般運樓櫓糧草僅能給足竊恐他時卜築處地里稍逺或道路有狹隘處須當分兵扼據而所般運之物必不如今來通快至時遇事或恐有不如朝廷之意更望博賜采聽審詳裁處天下幸甚章楶奏議實録不載今以其家文字增入當稍加刪取不必全載甲午樞密院言熙河進築金城關畢功詔王文郁除正任觀察使賜銀絹各五百匹兩鍾傳轉兩官除直龍圖閣充熙河蘭岷路經略安撫判官張詢除祕閣權陜西路都轉運使仍比修安西城加一倍支賜王贍轉遙郡防禦使更減四年磨勘回授有官兒男康謂轉一官各升一等差遣賜銀絹各一百匹兩將佐等令經略司具功狀以聞詔金城關名仍舊及差王亨為關使置監押二員以鍾傳有請也大觀元年正月鍾傳本傳云章楶帥涇原修沒煙髙平等寨詔傅所置將苗履統精兵三萬集涇原之靈平城夏人力戰以拒我師傳提步卒二萬騎兵三千出不意為浮梁以濟河作金城關六日而就自是夏國右廂兵馬不復集矣以功遷直龍圖閣為熙河路經略安撫判官三月七日苗履申乞造浮橋建金城關是役賞功乃不及履當考九月三日金城關畢功賜履金帛河東路進築葭蘆寨畢功本路轉運司判官郭茂詢吕仲甫各轉一官涇原路經略司言同統制折可適申有西賊一千餘騎與伏雲路慕化人馬鬬敵即時將帶前軍救應追捉到沒煙峽接戰至午時退續據苗履言差熙河馬軍照應折可適等行七八十里遇西賊接戰間伏兵起隔斷擁入溝澗除漢蕃兵外有同總領岷州蕃兵供備庫副使張德等未知存亡詔折可適令涇原路經略司疾速取勘仍先具的實傷折亡失人馬數目其後樞密院言熙河路同統領岷州蕃兵將佐供備庫副使張德等近差赴涇原路因出界照應折可適以致陷沒雖未知存亡及已立賞召人營購去訖詔特加賻贈録用子孫張德贈客省副使與六資恩澤外更與一資王道李應祥並贈皇城使各與四資恩澤更與親屬一名三班差使包誠贈虔州觀察使趙永夀贈忠州刺史趙永福趙永保並贈皇城使遙郡刺史楊玉與三資恩澤更與親屬一名三班借差張從志何昱各與兩資恩澤更與親屬一名三班借差楊保等四人並與父職名更與男一名下班殿侍漢蕃官等第賜銀絹錢酒等令熙河蘭岷路經略司疾速具蕃官包誠等兒男人數職位開析以聞並優與推恩仍差官就逐人家各以詔旨致祭告諭所得恩例倍加存恤折可適等斷罪在九月二十七日是日西賊十餘萬衆寇涇原所築新城王文振馬仲良等擊之此據布録十一日事章楶五月六日奏或可刪取增入府州觀察使仲御同知大宗正事乙未三省言中書舊條國名內有莒郯夔芮薛鄖鄣羅國今來司封格內無此國名乞行添立從之刑部言前知宿州朝請大夫盛南仲并妻三泉縣君王氏在任贓汚事詔盛南仲除名免其決流送永州編管王氏追封邑罰金校書郎陳瓘通判滄州初太學博士林自用蔡卞之意倡言於太學曰神考知王荆公不盡尚不及滕文公之知孟子也士大夫皆駭其言於是瓘謁章惇求外任因具以告惇惇大怒召自而罵之章蔡由是不咸瓘集敘竄詩一百韻有云哲宗怒常立自注云常立以塗炭必敗之語詆誣神考而蔡公薦之哲宗震怒再竄常立當時同列方覺為蔡公所賣再竄常立乃三年六月事敘竄詩又云時宰罵林自自注云紹聖四年春謁時宰求外補因以林自滕文公之語告之時宰以自詆誣召而詈之章蔡由此不咸林自以太學博士除正字在紹聖三年二月二十三日滕文公之説見尊堯集理財總論自言滕文公必在三年二月以前也理財總論已附注三年六月二十五日瓘自敘云初在太學與林自同為博士自以主張國是自任為蔡卞所厚自之言曰神考知王荆公不盡尚不及滕文公之知孟子也士大夫固駭其言矣蔡卞引選人常立為假通直郎崇政殿説書又力薦之請賜對對之明日復請躐除侍從官哲宗謂卞曰立詆神考而卿薦之何也又顧章惇曰卿不見其語乎惇謝不知因請其語哲宗怒曰語在常秩行狀其語云自安石罷相以後民生塗炭又云自秩與安石去位而識者知政事必敗其尊厚安石而詆薄先烈如此卞薦之何也即命中使史院取秩行狀哲宗親指塗炭必敗四字以示宰執惇以下皆頓首謝罪請貶立退擬立監夀州酒稅給事中葉祖洽駁曰立詆毁先烈謫輕地近乃改立永州監酒而撰秩行狀者某人特勒停自是蔡卞始惶恐改意而林自滕文公之語亦自此不敢宣言於衆矣紹聖四年春自校書郎謁惇求外補因問惇曰主上聖孝篤於繼述然今日廟堂之所謂繼述者述神考乎述荆公乎因道林自滕文公之語曰相公亦聞之乎自謂元豐中為荆公道此語相公信以為然否惇曰林自妄言荆公豈信渠語瓘曰荆公不信林自士大夫所共喻也即不知元度信其言否惇默然自是惇呼林自罵斥之惇卞自此不咸瓘自為小官時即特立敢言紹聖初章惇以宰相召道過山陽瓘適相遇隨衆謁之惇素聞瓘名獨請登舟共載而行訪以當世之務曰計將安出瓘曰請以乘舟為喻偏重其可行乎或左或右其偏一也眀此則可行矣惇默然未答瓘復曰上方虛心以待公公必有以副上意者敢問將欲施行之序以何事為先何事為後何事當緩何事當急誰為君子誰為小人諒有素定之論願聞其略惇復佇思良久曰司馬光姦邪所當先辨無急於此瓘曰相公誤矣此猶欲平舟勢而移左以置右也果然將失天下之望矣惇厲色視瓘曰光輔母后獨宰政柄不務纂紹先烈肆意大改成緒誤國如此非姦邪而何瓘曰不察其心而疑其迹則不為無罪若遂以為姦邪而欲大改其已行則誤國益甚矣乃為之極論熙豐元祐之事以為元豐之政多異熙寧則先志固已變而行之溫公不明先志而用母改子之説行之太遽所以紛紛至於今日為今之計惟當絶臣下之私情融祖宗之善意消朋黨持中道庶乎可以救弊若又以熙豐元祐為説無以厭服公論恐紛紛未艾瓘辭辨淵源議論徑正惇雖忤意亦頗驚異遂有兼取元祐之語留瓘共飯而别惇到闕召瓘為太學博士瓘聞其與蔡卞方合知必害於正論遂以婚嫁為辭久而赴官於是三年不遷瓘為太學博士薛昻林自之徒為正録皆蔡卞之黨也競推尊安石而擠元祐禁戒士人不得習元祐學術卞方議毁資治通鑑板瓘聞之用䇿士題特引序文以明神考有訓於是林自駭異而謂瓘曰此豈神考親製耶瓘曰誰言其非也又曰神考少年之文爾瓘曰聖人之學根於天性有始有卒豈有少長之異乎林自辭屈愧歉遽以告卞乃密令學中置板高閣不復敢議毁矣瓘又嘗為别試主文林自復謂蔡卞曰聞陳瓘欲盡取史學而黜通經之士意欲沮壞國是而動搖吾荆公之學卞既積怒謀將因此害瓘而遂禁絶史學計畫已定惟候瓘所取士求疵立説而行之瓘固預料其如此乃於前五名悉取談經及純用王氏之學者卞無以發然五名之下往往皆博洽稽古之士也瓘常曰當時若無矯譎則勢必相激史學往往遂廢矣故隨時所以救時不必取快目前也此據丁未録陳瓘傳增入不知作傳者係何人須别刪修乃可用耳曽布同林希白上近聞陳瓘補外瓘登高科二十二年猶作權通判罷校書郎若與除一校理不為過以人材論之豈在周穜鄧洵武之下上曰章惇亦言其當作館閣但議論乖僻嘗欲以長女妻之以其乖僻故止布曰瓘不見其乖僻但議論詆訾蔡卞爾他無所聞林希曰瓘嘗為越州簽判與卞論事不合遂拂衣去然人材實不可得布曰主張士類正在陛下願少留聖意上欣然納之布退告惇等以上語惇曰平生不知所謂髙科為可用布云亦采士論人材否惇言士論亦不足聽布曰士論乃天下之公是公非安得不聽况人材亦不待士論而後知瓘莫不在周穜鄧洵武之下否惇曰瓘文藝固可為館職若罵蔡元度怨元度皆惇所不恤只是議論乖僻却云神宗晚年踈斥王荆公不用此乃是蘇軾之語如此豈不是乖僻布曰此語布所不聞蔡卞曰渠怨卞亦大非卞屢薦之於丞相惇默然衆方訝其言不情徐又曰王荆公惇自來只知是王介甫如今亦只見他是王介甫却不曽喚他作真人至人聖人布曰誰以王荆公為真人至人聖人惇曰吕公著等皆嘗有此語後又非之布曰此毁譽皆過其實何足道林希曰瓘是校書郎除一校理乃一般職名惇曰未及二年衆默然惟黃履笑而顧布以為然布目許將曰鳳池莫亦須主張士類將唯唯而已晚見林希大怒曰惇語言顛倒如此何可與語瓘納忠於惇凡密語却皆以告卞殊可怪議論如此豈復更可開曉樞密更休管他謂布也希自度亦立朝不得鬱悶而已布録在戊戌今附此丙申翰林學士權知貢舉林希等言應試舉人止試䇿一道大略欲乞依進士試䇿三道詔自今發解省試添試䇿一道吕惠卿言已差路分都監劉安統制兵馬出塞修復浮圖寨詔出戰并入役諸軍特給錢有差甲辰賜名克戎寨鍾傳言節次有西夏右廂一帶首領遣人通知信息願舉族歸漢厚以官爵金帛誘至仍諭以禍福速急施行去訖詔張詢鍾傅差人以近降敕榜分明告諭彼界上下人人通曉朝廷補官賜豫金帛招撫之意如有出漢之人即多方收接務令安穩仍速相度合補名目書填空名宣劄并合賜物當官給付或合補大使臣已上亦仰具合補職名奉降恩命若帶到人户并地土歸降即令依舊住坐仍留至親骨肉為質厚加存恤如止是拔身投漢或將帶到家屬合給與田土即委官躬親標撥地土住坐及常切安存無令失所及不可遷延疑二阻其向化之意是日樞密院言自二年八月以後諸路出界淺攻除硬探斬獲首級更不計數外鄜延環慶涇原河東四路共獲一萬一千六百五十級鄜延五百九十三環慶四千六百九涇原三千一百九河東三千三百四十五前月壬午惇布云云可考丁酉樞密副都承旨宋球等言近詔自元豐八年五月以後至元祐九年四月十一日終臣僚章疏及申請事件逐名編類修寫成册申納樞密院今共編類到一百四十三册詔令録本進入三月二十八日元符三年四月二十五日罷戊戌吏部户部言水磨茶埸監官錢景逢任內收到息錢等一十六萬餘貫吕安中收到息錢二十萬餘貫詔錢景逢與轉一官吕安中候任滿日保明以聞刑部言前臨江軍判官李適在任失入三人死罪合追兩官勒停兩遇大禮合該原免詔李適依斷免勒停與逺小處差遣己亥舒州團練副使循州安置吕大防卒於虔州大防卒於虔州信豐縣此據王康朝行狀七月二日歸葬王鞏甲申雜見云朝請大夫潘適為渭州通判時涇原帥吕大忠被召問邊事既對哲宗語大忠曰久要見卿曽得大防信否對曰近得之上曰安否又曰大臣要其過海朕獨處之安州知之否對曰舉族荷陛下厚恩上曰有書再三説與且將息忍耐大防誠朴為人所賣候二三年可再見大忠再拜謝退而喜甚因章睦州召飯詰其對上語遂盡告之既至渭語潘潘曰失言矣必為深悔後半月言者論其同罪異罰遂有循州之行既死上猶問執政曰大防因何至虔州及後請歸葬獨得旨歸哲宗簡在深矣嗚呼帝王之度非淺識可窺也潘過高郵語豫如此吕大忠二年九月二十六日自秦鳳改帥涇原以涇原帥赴闕在三年正月二月間大防責循州乃四年二月二十八日王鞏云還渭後半月大防有循州之行誤也大防責循州距大忠入對蓋一嵗矣若謂言者因是發端則可大忠集有辭直學士乞量移大防狀其除直學士乃三年七月十二日恐言者發端在大忠乞免加職量移大防時七月十二日後也王鞏所云哲宗欲用元祐人故章惇輩更起誅戮計恐事或因此也大忠集有回報臣僚所陳利害狀十二月二十一日乞暫赴闕則得召對必在三年正月或二月也三年二月二十五日大忠以渭帥再言邊事三年七月十二日自渭州特除寶直知秦州毛漸權渭帥十一月十一日自秦州改同知十二月三日除寶制大防舊傳云大防狠愎當軸日內與閹寺陳衍輩交結刺宫禁動靜外引羣邪同謀國政附會司馬光力陳先帝法不便一切改革上聖德日躋天下事多不進呈及宣仁寢疾猶簾前奏事初未嘗請上親政又與蘇轍輩同惡相濟如吕公著之拜司空范純仁之再相皆手詔密訪提舉神宗實録竟造成謗史紹聖初以言者始暴其惡落職知隨州再貶祕書監分司南京郢州居住繼坐實録詆誣降授通議大夫又降中大夫守光祿卿分司南京安州居住大防持權久罪惡貫盈雖三貶而中外未服新録辨曰謂大防罪惡貫盈其言誣甚前已實書其事今刪去浮辭庚子詳定敕令所言編修常平免役條令至今年二月終後來陸續有衝改者欲乞編入從之提舉明道宫鞏彥輔乞再任詔令致仕吕惠卿言知保安軍李沂申今月五日統制兩將人馬入西界討蕩七日到洪州城逢威眀鼐濟特沙克人馬接戰獲首級一百六十有五俘二人及燔毁洪州城內外首領人民族帳等甚衆得牛馬駝畜二千餘詔賜出戰諸軍特支錢有差吕惠卿家傳云四月遣將李沂以兵攻洪州破之焚其官舍民居討蕩族帳千餘所斬首一百六十級是時當國者固已忌惠卿之進用而樞府本兵之地復挾昔憾害惠卿尤甚因取索陳亡將士虜殺人口責以奏報稽留而出討進築謂惠卿畏避觀望既令河東環慶聽惠卿期約而復令兩路有利可乘則不候關報先自出兵而鄜延獨責以不度事勢不顧兩路邊面所期會處不當緩急誤事重行典憲惠卿方牒問兩路而河東帥孫覽遽奏惠卿期約之謬誤事舉動凡所以為沮抑者略如前疏所陳而隂為機穽以謀中者復如此惠卿獨恃上之聖明不為之屈指其匿情條上之以自明因乞罷兩路聽期約事目無使臣以虛名而任實責也既而遂進築平羌寨以功遷右光祿大夫平羌寨賜名已見三月二十二日
