body:
  text: 續資治通鑑長編卷四百宋李燾撰哲宗元祐二年五月壬子朔侍御史王巖叟言臣連上封奏乞復張舜民言職尚未蒙指揮臣以舜民志在盡忠雖一言失當而無可罷之罪清議沸騰以為過舉義不敢安理當極論惟陛下少賜采納臣讀汲黯傳每竊歎息其為人憃直而好諫遇事輒發如公孫宏張湯輩懷詐飾智以阿人主他人所不敢言黯常面觸之故不獨漢庭之臣知所畏憚至淮南王欲謀叛以黯在朝為之寢謀直臣之于國家戢姦慝消禍亂其益如此故天下之愛其君者莫不願得而用之愚臣區區之衷實在于此今日之論非私于舜民也為陛下惜一敢言之臣也非爭一屬官也為陛下惜言路也言路重則朝廷尊風憲陵遲國體隨弱必然之理也陛下于此幸加反思非好臣之説勝也好人主之道勝也臣以言為職言而見用與言而得罪皆所以報陛下惟知而不言則為背德爾舜民得敢言之名朝廷被罪言之謗臣竊恨之伏望聖慈檢會臣等前章早賜付外施行使怨歸言路而美在朝廷臣不勝大願貼黃稱陛下之意常欲朝廷清淨人無間言甚盛德也然而事順理則靜逆理則爭此必然之勢也今御史以言為職却以一言微侵大臣便行罷斥數日以來滿廷之臣喧然不平唯説此事蓋緣事不順理所以如此臣等雖欲自靜不可得也須至交章煩瀆聖聰伏望陛下深思所以順事理息人言天下幸甚巖叟又言臣纍上章言張舜民罷職非罪乞令還臺未蒙采納施行此事所繫不在一張舜民而在人主在國家臣所以夙夜憂懼不知所處陛下開言路之初即言事官多與權臣為敵怨仇不易當每德音丁寧既慰藉之又嘉賞之謂朝政闕失大臣私邪百姓疾苦事無大小一一但言欲賜一一主張言事之臣恃陛下照鑒如此故敢遇事必言無所回隱然古今之公患患在執政大臣多不便之而隱為巧説以害其忠必使人主信之而不覺終至于忠言不用而權臣得以行其志所以人言曰寧觸人主怒莫忤權臣意蓋人主無心雖怒必解權臣私意一忤不忘此人情不得不畏也茍非守節死義之士誰能忘其家而遺其身以取權臣之怒哉陛下雖加奬激未必便得其人今又罪而斥之臣恐忠義知難而退藏佞邪乘間而進取隂附大臣為自安之計不復以陛下之事為事矣前日御史中丞黃履殿中侍御史劉次莊隂附蔡確為姦方確用事陛下何由得知不幸確去而其姦始敗使確且在位履與次莊進用蓋不可量今日舜民忠嚮陛下因論邊事偶有一言旁及大臣反無所傷遽以大臣不悅而罷之是附人主不若附權臣也此事在目非臣妄言臣伏覩陛下初降出舜民論封册疏必不以彥博照管奉世之言為毁傷彥博亦未必須欲朝廷逐御史臣恐執政大臣有忿舜民攻其所諱而增飾老臣之言以動聖心而擠舜民以快其私忿者陛下不可不察又非獨擠一張舜民也其意乃欲盡傾言路也蓋知舜民之罷臺諫必爭封奏紛紜言詞憤激必拂聖意不喜則言路皆可搖而去矣此其姦謀陛下又不可不察也姦人以此嘗陛下一事既行後必有甚于此者此士大夫之所以為朝廷憂也臣度聖心豈不欲復舜民言職應恐不能慰彥博意故兩難耳臣竊伏思陛下特屈公議黜御史以為老臣者亦足矣至矣今以公議不可奪而復還之非陛下得已也老臣豈不諒陛下之心哉尚何以為憾乎由此而言臣以為陛下處之不兩難耳臣聞君子之愛人也以德而不以姑息願陛下以德愛老臣勿使受姑息之譏則陛下所以待之者厚于黜御史矣誠蒙陛下幸聽臣言則朝廷過舉反而為盛德老臣謗議變而為美談破姦謀于欲肆激忠氣于已銷社稷之福多矣非臣之利也臣傾盡肝膽以告陛下今日遂死無所恨矣惟聖主留意無忽舜民疏言廟堂欲茍免一時之責任又曰夏人強弱之勢可謂都不知又曰執政大臣不能為陛下盡心謀謨臣觀舜民此言于國則忠于身則愚矣願陛下憐而察之既而中丞傅堯俞又與全臺及諫議大夫梁燾列奏臣等竊以言事之官許令風聞祖宗之詔曲全過當許風聞則豈皆責實全過當則必欲盡言舜民昨論列四事及因劉奉世乃天子左史下使屬羌恐失事體衆謂因文彥博照管且非斥言彥博又非専擊奉世其大意在尊朝廷愛國體而已其間侵詆論議大臣之言為多故中外之人以謂舜民之罷名為言及于彥博實由觸怒于柄臣臣等竊以朝廷罷一御史必當正其罪名布告中外可以示天下勵臣節正紀綱貽後世今舜民既無朋附中傷之迹又非犯顔逆鱗之過不當以一言風聞之失遂罷御史以快柄臣之意違祖宗曲全過當之詔損仁聖至誠聽納之德非所以示天下貽後世勵臣節正紀綱也臣等惓惓愚衷至于再三不能自己伏望皇帝陛下太皇太后陛下少霽天威曲回睿詔省察臣等前後章奏付三省施行如臣等所論不當乞行貶責以謝中外曲全過當天禧元年二月詔知開封府錢協言府界諸縣盜賊未至禁戢諸縣有重法地分乞依河北等路特降權宜指揮從之舊録有此新録削去權宜指揮在四月十七日舊録亦不載癸丑觀文殿大學士知頴昌府韓縝知永興軍龍圖閣直學士新知秦州吕公孺為祕書監資政殿學士中散大夫知永興軍曽孝寬特遷中大夫知秦州孝寬二十四日改頴昌吕陶云云附六月末殿中侍御史孫升言公孺文學本非所能行義不為人稱徒以世家致位通顯昨自髙陽移就秦隴堅辭疾病乞就間散或以宫觀自便或以小郡茍安班資雖髙于人材行不稱其任祕書之長公孺非宜若果有疾則當遂其所請若實無恙則豈宜偃蹇挾持抗君命而不行伏惟聖慈詳察别賜指揮以允公議公孺二月二十八日知秦州孫升談圃云公孺除秦州辭不行請宫觀即以祕書少監領宫祠升言近嘗有某官亦如此請因得罪不宜以宰相弟遂撓法公著不悅出升知濟州按出升知濟州自為張舜民事又公孺為祕書監非少監亦不領宫祠談圃皆誤也今不取政目四月十一日吕公孺提醴實録不書更詳考之詔御史中丞傅堯俞侍御史王巖叟同舉監察御史二人據王巖叟奏藁舉御史乃五月四日敕今依實録繫之二日或仍移見四日堯俞巖叟言臣等先凖敕同舉監察御史遂薦承議郎張舜民伏蒙除授近者舜民因言事罷職差判鼓院臣等以舜民居官有補被黜無名清議沸騰不以為允纍具論奏乞陛下特賜優容許歸言職上以全國體下以息人言臣等日俟開納施行其監察御史闕難别舉官所有敕二道不敢祗受已具狀繳申尚書省去訖又申尚書省曰堯俞等以舜民憃直敢言無所回隱昨論封册夏國主乞使者緩行以審其事及論起居郎天子近侍不可屈使屬羌亦自有理止以一言旁及大臣遽行罷斥書之為罪彰示四方非所以塞阿諛勸忠義風厲天下以為後世法也雖言官被責目以為常而為國惜名不當緣此况自兩宫臨御二年于兹惟聞從諫之美聲罔有罪言之過舉今日之事天下惜之謂言路長循默之風朝廷生壅蔽之患當自此始恐非二聖所以望執政之心亦非執政所以報兩宫之事遂而不改所損益深已纍上疏論列乞復舜民言職日俟允從其監察御史闕難别舉官所有敕書不敢祗受已具奏聞去訖謹具狀繳申尚書省伏望特賜敷奏施行詔知州人年七十已上合入監當監廟差遣者給驛劵鄂特凌古既立以朝廷畏已乃與夏國偽相梁葉普通約以熙河岷三州還西蕃蘭州定西城還夏國果莊又隂以印信文字結漢界屬戶為內應四月遂舉兵冦洮州虜趙醇忠及殺屬户大首領經斡穆等數千人駐兵常家山分築洮州為兩城以居北城周四里樓櫓十七南城周七百步樓櫓七跨洮州為飛橋是日五月二日癸丑引步騎七萬圍河州南川寨焚廬舍二萬五千區發窖粟三萬斛脅從杓羊家二族六千餘口并導夏人數萬衆攻定西城敗官軍殺都監吳猛而去八月十四日募殺葉普者圍南川十八日并二十四實録乃見今書其始攻之日此據汪藻青唐録藻稱三月冦洮州虜趙醇忠等按四月二十二日劉舜卿猶言果莊於洮州生熟户雜居地分迤東一帶打虜亦羌人常事則虜趙醇忠殺經斡穆必非三月當是四月末也虜趙醇忠殺經斡穆不知藻據何書當考月夏人冦定西城殺吳猛實録亦不書其月日但於六十二日因推恩猛等始書之今因藻録並見於此猛乃定西城監押藻録脫略今補填之庶不失事實甲寅詔應樞密院差除官因體量乞先次衝替差替對移差遣並申取樞密院指揮乙邜以交趾進奉使朝散郎户部員外郎黎鍾為吏部員外郎副使宣節副校尉西頭供奉官閣門祗候杜英輩為東頭供奉官西京左藏庫副使雍州左右江都巡檢使成卓責授內殿承制添差均州酒稅仍令差人伴押前去交割以樞密院言其保任交人不當及擅將黎文盛所上書狀録與安南等罪故也詔前廣南東路經略安撫使張頡提點刑獄林顔各展二年磨勘轉運副使髙鎛轉運判官張升卿各降一官升卿仍與小處通判坐言者論頡等不戢將佐因捕岑探殺及平人故也詔廣南東路鈐轄楊從先生擒岑探未嘗殺戮特遷一官同立功人李佛郎與右班殿直仍賜名忠梁仲文李養並與三班借職耿章等五人共賜錢五十萬命經略司等第給之樞密院言四月二十六日詔西關堡防托禁軍和雇入役人若西賊犯蘭州已逼城下方得結成陳隊靠險避賊或退歸熙河州不得迎賊墮其計中本慮西賊大兵深逼蘭州須當以西回避今探報必無大兵深入若委有賊馬漸逼役所須衆寡不敵方可退擇要便據險捍賊欲入側近堡寨併力守禦更不退歸熙河州致賊追襲其役所和雇禁軍一千五百人亦須樁留甲仗器械凖備戰敵詔劉舜卿會元降詔旨施行詔大使臣如曾任將副不因罪犯替罷見今合入親民差遣年五十七以下並許依條選具腳色仍于引驗狀內别立項開排申樞密院户部言河東經略安撫使吕惠卿奏本路太原汾等一十四州軍正稅外别有和糴據其田畝視其苗稼等第科糴而未嘗用錢請委監司體訪州縣民情别議立法又臣僚上言請委官講議除河外三州理為邊州不和糴外有二十一州軍于理合一槩均上件和糴或請將和糴四色都大石束數目減三分於自來不著和糴處收糴詔令河東轉運提點刑獄提舉常平司與經略安撫司同相度立法以聞本部欲請應和糴並于見納年額十分中取八分為額各隨户色分數減定更不給錢遇災傷隨秋稅分數減放以轉運司應給價錢補之其以四色糧草互相折納及折納黍秫米並仍舊如本户災傷不及五分聽依久例支移不得創有科折及諸易和糴之名為助軍糧草從之惠卿家傳載惠卿元奏合附元豐八年六月八日新録削去吕惠卿奏請委監司體訪州縣民情别議立法等字今仍舊本吕惠卿家傳元豐八年事河東和糴之弊蓋已百年惠卿始至既以其事上聞乞蠲久負猶以元豐四年以前為限及是大赦應二稅沿納錢將自來倚閣者並與除放而和糴不預惠卿乃上疏曰本路太原汾等十三州軍正稅之外别有和糴體問得始據田畝視其苗稼等第科糴米每斗錢三十文粟十六文大豆二十二文草每束十文雖估價頗賤而民于登稔之際先期得錢未以為病中間有司彌失其指四分中一分見錢三分折茶而又以一時科糴之數立為定法遇有典賣推割一如正稅而夏秋災傷乃執和糴之虛名不得與正稅檢放於是民始病之至嘉祐中有司又以折色之物虛估非實復裁定米每斗一十二文五分粟十文大豆九文五分草每束四文並支見錢則其價又減大半矣至熙寧以來復以鹽布見錢中半支給至元豐元年有司復請和糴價錢更不支與人户今轉運司趂時赴沿邊州軍糴買糧草封樁如遇災傷據糴買下數目折充人户納數如無災傷三年一次充折茶於是和糴始不用錢契勘本路積欠和糴推嘉祐四年十月祫享赦恩及七年九月明堂赦恩並截定年分特與除放及治平二年十一月熙寧元年十一月郊赦恩又只除放第四等已下其餘赦恩並不開説以此至今所在積欠萬數不少則是雖有和糴之名而人户未嘗得錢乃不得與災傷檢放倚閣及不得隨赦恩蠲而近上人户又支移于邊上送納每斗米賣錢有三百文者則比之稅租尤為可矜今論者不過以謂河東邊儲實賴和糴雖有積欠不可蠲免臣以為不然今本路嵗額和糴約計八十二萬四千餘石雖遇豐稔所納不過七分使民力更可催促即無積欠已自足支年計如不可催即當年正額尚不能足何能逺及積欠縱令有司鞭撲督趣使之輸納必却欠下當年正數則朝廷雖不蠲放徒令有司用督趣之虛文胥吏因緣為姦終無補於國用之實也伏惟皇帝陛下新登寶位太皇太后陛下出護聽斷賦正之初方以深仁恩澤大賚於萬方於此之時若不特與蠲免則一路之弊無時而蘇况河東人户自軍興以來科率調發其為雕敝朝廷所知而又賦稅困於支移之逺耕夫分於武事之習去秋復遭水災為患則其為疾苦尤所宜恤而積欠與年額正數事不兩集其理灼然誠罷之則是捐簿籍之虗數而為朝廷之實惠也從之惠卿復以謂雖放其積欠而不正其根本則是凶年取盈使民流離之患猶存而不知數年之後積欠之弊復如前日乃請據逐户所認和糴數目官中合支價錢尅除分數外其餘並割充秋稅正額送納遇災傷合行檢放倚閣並如稅法元豐八年六月八日可考編類神宗皇帝御製所言中外臣寮之家有賜到御批詔劄除涉邊機外餘若意在嚴奉不欲令官司校對者請令實封送所在官司繳納從之丙辰宣義郎鄧忠臣為正字丁巳中書省言河北陜西京東京西淮南舊分東西南北兩路每路置提點刑獄官一員近已併路以二員共領州縣闊逺遇有盜賊刑獄公事公移稽滯督捕巡察不得專一詔分路差官及逐司差官檢法仍舊制詔故參知政事吳奎特與一子占射差遣一次以中書侍郎吕大防同知樞密院范純仁言奎在仁宗朝為知制誥於嘉祐元年嘗上言請立英宗為皇嗣故也詔應官員緣市易增羡酬奬惟身亡致仕及得減一年以下磨勘人並免其餘轉官升任減年磨勘循資者並各追奪一半循一資升一任以磨勘年數比類減之選人俟改之後展其循資已改官并減年磨勘不成一資者並以磨勘年限對展內吕嘉問追三官展四年磨勘吳安持追兩官賈昌衡追一官先是右司諫王覿乞並行追奪冒賞詔户部具其事户部列上姓名當追奪者凡一百餘員侍御史王巖叟言臣竊以黜陟審則勸沮眀勸沮眀則天下之事省而治道清一失其當則欲用以勸沮者反所以啓人心而生禍端也臣聞罰當罪則姦邪止賞當賢則臣下勸不當其罪適啓其所以為姦邪也故一與一奪不可以不審今冒賞之人雖為非義則均然即而考之任責有重輕用事有淺深為害有多寡不可不别前日之賞已為濫矣今正其罰而復濫焉則猶為失也乞免一槩鐫減施行于是尚書省擬定取旨故有是詔去年十一月四日戊午用王覿言令户部具冒賞者姓名王巖叟章據本集附見舊録云市易計息旌其勞能先帝已行賞久矣至是乃以為濫追之新録辨曰市易之法緣吕嘉問等奉行失當為患尤甚至是變法追賞猶為輕典今刪去四十八字己未詔坤成節聽臣寮進奉如興龍節例又詔內藏庫應內降兊換匹帛等依左藏庫已得旨估見賣直價供納從户部請也御史中丞傅堯俞諫議大夫梁燾侍御史王巖叟司諫朱光庭王覿御史孫升韓川論張舜民不當罷御史纍奏不絶庚申詔三省樞密院召臺諫官赴都堂宣諭曰朝廷選任卿等為耳目之官正要别白是非視聽無惑故自來章奏多所允從今張舜民所言不當豈止言文彥博主張劉奉世一事且如建言乞問罪夏國事或從其言豈不為國生事乃只令解罷言職蓋恐將來更有論奏難于取信若復留在言職恐誤視聽今將舜民元奏示卿等冝詳悉之堯俞等皆不受命退而奏疏言臣等仰認聖懷不勝感懼此非陛下諒舜民之志本在盡忠而察臣等之心主于惜體則何以慰藉若此臣等幸甚欲報至恩莫知死所聖諭謂且如建言乞問罪夏國事或從其言豈不為國生事臣等詳閲舜民章奏云今臣所奏請不是欲興師問罪亦非要終了不封秖乞止使人不必如此遄速此語甚眀别無他意惟欲朝廷審慎而已伏望聖慈更加省覽則舜民之過冝蒙恕矣既罪之之實不見于文又罷之之名有傷于體臣等所以不得不言願陛下開逹聰眀盡四方之聞見言責之臣事雖過計無惜採收語或小差亦皆包納使人人敢展四體以事君傾腹心而報國則臣等之願也伏乞降臣等前後章疏付三省公議早賜施行又言臣前日蒙聖恩召赴都堂令執政宣諭張舜民罷職事已具别章論奏臣有親聞于都堂上與外議所傳相契之事不敢不盡以告陛下臣之愚忠以謂有隱而偷榮不若盡言而得罪韓維自言舜民之責是維于簾前奏乞施行仍云權重權輕難惜一新進御史此維誤陛下之聽也若論張舜民則輕若御史天子耳目之官朝廷紀綱之任則不為輕矣今黜耳目之官是將塞人主之聰眀隳紀綱之任是將亂國家之法制究觀歷代惟有蔽言路則啓禍源不聞抑權臣而生後患也然則師垣之有無未比憲司之興廢而維以御史為輕臣不知其可也又范純仁語雖喋喋不切義理臣謂韓維所論豈不上負陛下之望下失士大夫之心哉朝廷慰安老臣當自有道必使上下無損老臣可安乃善謀也今為之摧風憲壞紀綱動天下之心傷國家之體而欲以安老臣使老臣而少知義其能安乎陛下意欲安之不知反所以使之不安也幸陛下降意思之恐不若改之為便也聖人之所以為聖人由改過不吝爾吝而不改恐德日益虧改而勿憚則美日益全惟陛下擇之自古正人端士誰不欲盡忠於人主人主亦豈不欲聞盡言常患執政大臣離間於中使明主之初心遂移忠臣之雅懷不盡以為痛恨爾執政之蔽惟欲人主不信言事官則得以行其私陛下不可不知也舜民一賤士不能為禍福于臣臣何苦上違陛下之情下忤權臣之意而言之不已此陛下之所當察也陛下博通書史觀古今治亂之迹熟矣國家之事有臣力諍則善耶無人諍則善耶臣以言為職言而不用亦何面目出入朝廷間哉願蒙竄黜以謝無功貼黃按舜民本疏論册封夏國主事但有移文致詰之言元無興師問罪之語而左右之臣便以移文為興師誑惑陛下殊不言邊上移文往來自是常事安有興師之理至如雄州與北人事無大小亦朝夕文字相問何嘗有他虞蓋不言用兵則不足動陛下之心而激怒聖意此權臣陷害忠良之深計也陛下信之正落其計耳又言臣等所論張舜民等罷職不當事宣諭後又兩疏開陳舜民本無罪由大臣架成乞賜照察復許還職尚未蒙聽納施行臣等恐進説者以謂御史無已罷復還之體請舉故事陛下考焉方開元之初明皇勵精于事是非明而不可欺紀綱正而不可欺典刑無私而不以姑息事有蒙蔽不知則已知而必行端良得以盡其忠姦邪無以用其巧時崔日知為京兆尹貪暴不法御史楊瑒與御史大夫李傑謀劾舉之傑反為日知先譛罷言職瑒廷奏曰紏彈之司若遭恐脅以成姦人之謀則御史臺固可廢矣上以其言切直遽令傑依舊視事貶日知為歙縣丞當時天下不稱楊瑒之能言而服眀皇之能聽不矜日知之被逐而喜李傑之復用不髙風憲之自全而快姦言之終破眀皇不吝改過而其益如此史册一書流美萬古今大臣以是為非誤陛下之聽有甚于日知御史憃直敢言忠信獲罪有寃于李傑言責之臣守義以爭且多于楊瑒又陛下明聖十倍眀皇察之宜深改之宜速而遲遲如此此愚臣之所惑也不知自古設諫官御史者欲以順朝廷之意耶欲以正朝廷之事耶若欲其順意臣以謂不須置若欲正其事則臣以謂不可廢陛下以萬乘之尊與臣論勢臣之言不得而行也陛下虛方寸之地與臣論理臣之言庶幾于用也伏望陛下觀開元之所以盛思眀皇之所以賢聖心略回破姦言而全風憲易若反掌矣臣以堯舜望陛下非敢以眀皇始勤終倦遂比全德也陛下以為可則乞行臣之言以為非則乞罷臣之職紀綱之地由臣等不正以為朝廷羞得蒙竄斥以塞至公臣等之幸也又請對延和殿言臣等伏見殿中侍御史吕陶監察御史上官均初皆稱罷監察御史張舜民不協公議各言曽有章疏論列陶嘗于理檢院衆坐間自舉疏中語均亦嘗于御史廳對王巖叟韓川口誦其章並謂四月二十五日進入臣等信以為然竊覩今月九日內批聖旨召臣堯俞臣燾臣巖叟臣光庭臣覿臣升臣川等七人赴都堂宣諭而惟陶及均不預召按御史自來言事不關白長官臣等非強陶等論列自是陶等對臣堯俞臣巖叟言有奏章今都堂之召既不預數方疑陶均未嘗有言如此乃是公肆靣欺何以保信竊恐前後所上封章亦非情實有誤聖聽不敢不奏伏望令勘會如果無章疏乞賜指揮施行詔陶均分析陶狀云謹按唐御史大夫李承嘉嘗召諸御史責之曰近日御史彈事不咨白大夫禮乎監察御史蕭至忠進曰臺中無長官御史人君耳目比肩事主得自彈事不相關白若白大夫而許彈則彈大夫又不知白誰也承嘉默然蓋朝廷本置臺諫欲其人人各出所見以助聰眀是故前世名卿偉人亦無須得同僚交章互言故事臣伏見近日以來欲言一事本臺上下往往預先商議定為一説以至諫官結為一黨不顧事理是非務以衆力求勝公議取必朝廷臣之區區竊嘗患此乃者張舜民罷王巖叟道須著理會臣始未深思只見同官因言被罷亦欲與之辨雪遂對巖叟云也待入箇文字續往中丞廳見傅堯俞將出留舜民奏狀一紙令臣讀了臣對堯俞云亦待理會退而草得奏檢數句乞朝廷保全言路存留舜民之意文字首尾未全尚未録出次日在理檢院見王巖叟問臣道文字如何説臣對巖叟道方思量得數句遂念云舜民天資抗直遇事輒發雖思慮小有不密其心殊無阿附蓋臣是時有欲論列之意因巖叟見問便將上件數句言語説與巖叟即不曽言四月二十五日進入其時傅堯俞元不在坐亦不聞上件語言臣既而自後反覆子細思忖張舜民自入臺以來言數事大率疏略不可施行遂記得與舜民同上殿日見舜民開陳邊事乞罷西夏封册且令問罪臣以謂陛下始親大政太母垂簾正宜安靜之時舜民却乞問罪西人顯于國體不便朝廷罷之與移一般差遣不為過當况衆人已有文字臣更不須論奏自後來堯俞巖叟不問臣道文字入與未入臣亦不曽告之至今月六七間到侍御史廳巖叟將出孫升所撰奏藁一紙示臣道相次會中丞處列名上章臣既眀知舜民所言不可施行今長二素不謀及連章一旦忽然牽率須欲連名上章恐有雷同朋附之嫌遂與上官均韓川往堯俞處欲説破本末是時巖叟已先在彼臣白堯俞巖叟云此事根本不正却只論其枝葉難為協力見説已有二十餘章若減陶一名亦不為少又白中丞侍御但公論時見張舜民所言邊事當與未當堯俞道他又已去同舍且與愛惜巖叟道如此更不奉強蓋舜民是堯俞巖叟薦為御史今耻其不稱職力欲率衆救之緣臣是逺方寒士在朝孤立自辨眀朱光庭彈奏蘇軾䇿題後來堯俞巖叟常懷恨怒並不與臣論議近日又為講筵臣僚欲于别殿説書臣獨論奏堯俞自此相見往往不交一談數人者或在臺中或于幕次多是囁嚅耳語臣皆不得預聞臣亦不敢強去親之每詢訪得朝廷政事及民間利害只是自度是非或言或不言往往與衆不同亦不可一一告人今蒙朝旨分析理盡于此從來臺諫言事自非懷姦罔上本無分析之理蓋緣近日因堯俞等言事不當敕三省召赴都堂宣諭中外喧傳以為口實而臣與上官均獨免故堯俞等愈更忿恨必欲求臣瑕疵醖釀粉飾以逞私意誣臣以公肆面欺臣以謂欺君罔上則罪不容誅臣只是不敢比附而堯俞等乃加臣以面欺之罪臣前後封章或留中或降出陛下聖眀必已察見情偽臣更不敢自辨止是聞舜民罷職之初思慮未熟輒對堯俞巖叟道也待入文字亦待理會後子細思忖見有不必言之理恐成輕發遂不論奏豈是面欺堯俞伏乞聖眀察其本末均狀云臣向聞張舜民以言失實罷臺職嘗奏疏乞察其踈直以開諫諍之路既而反覆思慮舜民解去臺職以館職判鼓院即非竄貶在朝廷之命未為過誤續王巖叟有實封小簡與臣言藝事曾再論否臣愚以為人臣論事各須竭盡已見不當捨已雷同所以不能隨順傅堯俞王巖叟等再有論奏併録其簡以聞藝者舜民字也御批臺諫官論事自當各盡已見覽上官均分析其間王巖叟簡帖與均言藝事曽再論否眀是須要率衆同歸己意若此風寖久豈不成朋黨耶不知御史臺自來言事許各述己見為復須相隨順可令王巖叟分析曽與不曽將簡帖與上官均言再論藝事具詣實聞奏并降出張舜民為旱乞治秉常事尤見舜民之迂踈御集五月二十一日有此今掇取增入實録云均分析實嘗奏疏不妄乃禁中誤不以付外按御集不載此當考巖叟言臣昨因張舜民罷職文字到臺衆臺官遂來過廳臣公言風憲既許風聞言事不當以論大臣一言失實便罷言職其上官均等互有此言元無異論尋知各有章疏論列臣每以至誠待同官不復疑外後經多日不知均曾與不曾再言遂曾將小簡子與均云藝事曽再論否蓋是詢問之辭即無強率之意又臺中章疏間或相示皆是同官常事為與不為自繫其人即非臣能使之協力若均從初無文字臣自不復問兼臣昨于簾前奏陳時亦只是乞賜勘會有無章疏耳堯俞等又言臣等纍上封章論張舜民不當罷御史及延和殿面奏不蒙開納施行臣等愧負言責難以冒居伏望特賜降黜自今更不敢詣臺供職徽録上官均傳云監察御史張舜民論邊事因及宰相文彥博而舜民左遷判登聞檢院均言風憲之任許風聞論奏所以廣耳目也舜民所論得於傳聞使其言是冝虛心行之其言非茍無邪任附會之意亦當恕其疏直無他以開諫諍之路今以一言之失遽行罷黜臣恐自是言者以為戒願還舜民職任不報中丞王巖叟侍御史孫升吕陶約均再論均謂事小不當再論巖叟等劾均未嘗奏論而罔同列均繳疏草以聞巖叟等補外均遷殿中侍御史按王巖叟此時但為侍御史孫升為殿院吕陶初未嘗約均傳皆誤也門下侍郎韓維言臣近見臺諫官于都堂聼其所言大抵以臺諫官許風聞言事不當以一言之失便行退罷臣諭以臺諫官雖風聞言事豈不得朝廷考察其言以知其能否而進退之文太師年過八十三先朝舊相名重四夷二聖曲加恩賜不聽其去而新進御史以所無之事形于奏詆致其有言太皇太后若不為主張使其忿恨引去豈不于恩禮前後不相稱而又失一威望大臣可不惜哉御史以失言之故罷其職事尚帶館職釐務京師其為責豈不甚薄太皇太后辨大臣無實之謗推誠加禮以盡其心則為大臣者冝如何報其于體豈不甚重哉又續降御批論舜民言夏國事若聽其言豈不為國生事此又義理眀白燦如日星如聞臺諫章疏至今未止臣預聞國論不能厭息浮議致上煩聖聽日夜惶恐甚不自安然熟思之治天下之要惟在審義理而已義理若眀餘非所恤臣願陛下毋以多言過勞思慮惟在鎮之而已自餘誠懇候十六日垂簾更具面陳同知樞密院范純仁言純仁所言不得其日今附見韓維後臣聞舉直錯諸枉則民服故陛下臨御之初舉用二三正人而天下悅服蓋有泰卦拔茅連茹彚征之象所謂上下交而其志同則陛下得以裁成天地之化而太平可致也近日頗有匪人架造謗言毁黷良善始以疑似之事玷汙一二忠良漸興朋黨之名將以盡逐善類若陛下辨之不早必至雅正難分眩陛下知人之眀失陛下求治之意浸成遁卦否卦之象則是小人道長亦恐聖功難成臣伏惟陛下深居九重博采羣議惟以至公臨御天下故進退百辟悉用臺官諫官之言然臺諫之所風聞未必皆是善人之好惡凡所彈奏亦在深詳臣又聞孔子曰衆惡之必察焉衆好之必察焉又曰鄉人皆好之何如曰未可也鄉人皆惡之何如曰未可也不如鄉人之善者好之其不善者惡之大抵善人少而不善人多則是君子不免為小人所惡故雖衆而必察若専取善人之好惡則不善人架造之言易於眀辨純仁奏更詳之或移入王覿貶時右僕射吕公著慮言者將激怒上意致朝廷有罪言者之失奏曰伏見陛下臨政以來開言路登直臣納諫之盛近古未有然臺諫官數人例各供職日久前後言事既多不能一一盡中若以其言失當便行罷黜則今日以前不避仇怨為朝廷言事不少欲且一向包容則慮過當日甚或向後愈更紛拿朝廷却不能保全臣夙夜惟念欲乞稍與優遷令解言職更擇有名望學識臣僚使備諫諍如此則陛下于言事之臣可以全其恩意不至駭動物聽癸亥御札付吕公著覽卿奏以臺諫官供職日久欲稍與優遷令解言職更擇有名望學識臣僚使備諫諍事詳卿忠意深用嘉歎卿冝先具可罷言職之人各開坐欲除擬次第密具實封進入公著即依旨條上眀日復降手札數條付公著問可否且言不須别作文字只于逐條下帖出奏入後數日堯俞等皆遞遷蓋用公著之言也
