body:
  text: 續資治通鑑長編巻四百二十五宋李燾撰哲宗元祐四年夏四月辛丑朔壬寅户部請南安軍不禁户酒從之癸卯給事中趙君錫奏蘓軾乞外任遂除杭州雖聖恩優渥待軾不替而中外之望闕然觧體何者軾之文追攀六經蹈藉班馬自成一家之言國家以來惟楊億歐陽修及軾數人而已中間因李定舒亶輩挾私媢嫉中傷以事幾陷不測頼先帝聖明卒得保全洎二聖臨朝首被㧞用軾亦感激非常之遇知無不言言之可行所補非一故壬人畏憚為之消縮公論倚重隐如長城誠國家雄俊之寳臣也今軾飄然去國則憸邪之黨必謂朝廷稍厭直臣姦人且將乗隙侵㝷復進實係消長之機軾領遠藩承流牧民亦足發其所存但設施有限所利未廣豈若使之在朝用其善言則天下䝉福聼其讜論則聖心開益行其詔令則四方風動姦邪寢謀善類益進伏望收還軾所除新命復留禁林仍侍經幄以成就太平之基此據編類章䟽趙君錫二件内一件即此乃四年四月三日乙巳于闐國遣使入貢宰臣吕大防等以旱求罷政詔荅不允時自春不雨至于是月左諫議大夫梁燾對延和殿奏以春夏屢隂不雨皆人主猶豫不斷之象願面詔大臣協忠决議無留政事方皇帝富於春秋太皇太后保祐聖躬制政簾帷臣下易為䝉蔽願正紀綱明法度採用忠言講求仁術坐使明恩實惠徧及四海望皇帝陛下時親政事將來臨御獨斷練熟機務太皇太后曰近來内中進呈常同商量官家出意决事皆有聖斷燾對曰聖徳日新天下幸甚此太皇太后保佑之功也願官家更進聖學日課經史熟記寳訓故事上納之燾又論不當用近習之言進退人材自古禍亂之興皆由中官眩惑主聽况在今日尤宜深戒燾嘗奏臣聞湯以六事禱旱其一曰政不節歟今朝廷議减官俸罷吏禄君子嗟惻小人愁怨公利所得不多人心所失已甚减俸傷飬亷之名罷禄有縱貪之實其近政不節矣伏望聖慈批降寝罷以安羣情貼黄户部置局减省已乆四方取索文字紛紛不絶不惟减刻之名虧傷國體而又行移之迹動揺人情官吏坐食更増浮費但見所損未知所益伏望聖慈詳酌此事終是不便速賜指揮罷議浮費局但委本部郎官結絶减省一事今來人情嗟怨議論沸騰必已上逹聖聽若忽降中㫖罷局益得中外歡心臣所以乞批降中㫖所貴恩徳上歸兩宫事體自合如此招怨動衆非今日可行之事伏乞深留聖意仍乞今後深察妄議一切不行漸就安静上副清衷據燾集所奏不得其時且附四月梁燾對後更徐考浮費局果罷不罷或削去丁未䕶國軍節度使守太保開府儀同三司中太一宫使濟陽郡王曹佾卒贈太師封沂王上為臨奠輟朝成服推遺表恩十人戊申陜西路轉運使直龍圖閣李周為太常少卿以提舉河北路糴便陳佑之為河北路轉運判官以河事故特書不然并糴便皆削去河北路轉運判官承議郎張景先為陜西路轉運判官中書舍人曽肇言于中書省曰檢㑹元祐二年十一月顧臨謝卿材王孝先唐義問陳祐之張景先同共議講河事稱王令圗張問相度開河取水孫村口還復故道處打量得流分尺寸取引不過委是難以還復故道至十二月景先却奏諸人獻陳文字莫如張問之說利害已盡臣伏讀問之語至於再三以謂方今論河不出于此淆亂之言可以折衷朝廷不議還河則已若議還河湏自北京以上滑州以下仍湏先自孫村口而下濬治舊河横堤臣更不敢張皇上煩朝廷添差兵夫物料只乞各用本埽人兵物料及合得年例春夫客軍變料應副且漸為回河之計朝廷採景先及王孝先等之言自京東移景先於河北命同王孝先提舉修河興役一年論者紛然朝廷以為疑乃召景先等赴闕使之條陳利害景先與孝先俞瑾同状稱除第四輔外更無可復故道去處仍湏先治舊堤故道預作枝梧乞更展一年所貴期限稍寛易為應辦既而景先自畫兩說一言故道復還之議未易可已一言便議閉塞北流未知所以為利决知所以為害及朝廷畫六事使之條對復與孝先等别議且言限以二嵗之中與大河角力竊謂未能詳盡按景先初謂開孫村口難復故道㝷却奏張問之說利害已盡初乞展限一年㝷却奏二嵗之中未能詳盡前後反覆左右依違當官論事豈容若此今王孝先自都水使者罷知濮州俞瑾自監丞罷為莫州通判而景先不失為監司仍在三路罪同罰異恐無以示天下若謂景先不專主回河之議與孝先等不同何緣景先同為提舉興役一年曽無異議及朝廷詰問乃持兩端意在免責觀望懐姦尤為可罪使為監司者皆效景先用心朝廷何所頼乎伏望取景先前後所陳更加考究便見反覆依違觀望之状重行降黜以正典刑詔應進士不兼試詩賦人許依舊法取應於本經外増治一經増試一場論語孟子分兩場試合格人將觧額與兼試詩賦人各觧五分令禮部立法以聞十八日禮部建請政目乃先此叚詔罷明堂五使及大禮前奏告郊廟等執政官加賜從三省樞宻院請也己酉詔大食麻囉㧞國貢使加立特授保順郎將辛亥荆湖南路安撫鈐轄謝麟言臨口寨將官成贇雷瑜等六人禦蠻㓂有功詔各陞一資餘減二年磨勘給賜有差壬子詔陜西河東經略司修葺並邊将下及城寨噐甲先是朝散郎知漢陽軍呉處厚言伏見朝廷牽復知鄧州蔡確觀文殿學士此則朝廷念舊推恩無負於確矣然確昨謫安州不自循省包蓄怨心實有負於朝廷而朝廷不知也故在安州時作夏中登車盖亭絶句十篇内五篇皆渉譏訕而二篇譏訕尤甚上及君親非所宜言實大不恭臣以食君之禄義切于己雖不在言責之地忠憤所激湏至冒昧萬死仰凟天聽緣其詩皆有㣲意確欲使讀者不知臣謹一一箋釋使義理明白内五篇不渉譏訕亦一例冩錄連粘投進所貴知臣言之不妄其詩云公事無多客亦稀朱衣小吏不湏隨溪潭直上虚亭裏卧展柴桑處士詩一川佳景踈簾外四面凉風曲檻頭綠野平流來遠棹青天白雨起靈湫右以上二篇别無譏謗静中自足勝炎蒸入眼兼無俗物憎何處機心驚白鳥誰人怒劒逐青蠅右此一篇只是譏刺執政即不謗及君親紙屏石枕竹方床手倦抛書午夢長睡起莞然成獨笑數聲漁唱在滄浪右此一篇稱莞然獨笑亦含㣲意况今朝政清明上下和樂即不知蔡確獨笑何事西山髣髴見松筠日日來看色轉新聞說桃花巖石畔讀書曽有謫僊人右此一篇亦别無譏謗風揺熟果時聞落雨折幽花亦自香葉底出巢黄口閙波間逐伴小魚忙右此一萹是譏刺昨來言事者及朝廷日近擢用臣僚亦不曽謗及君親矯矯名臣郝甑山忠言直節上元間釣臺蕪沒知何處歎息思公俯碧灣右此一篇譏謗朝廷情理切害臣今箋釋之按唐郝處俊封甑山公上元初曽仕髙宗時髙宗多疾欲遜位武后處俊諫曰天子治陽道后治隂徳然帝與后猶日之與月隂之與陽各有所主不相奪也若失其序上謫見于天下降災于人昔魏文帝著令不許皇后臨朝今陛下奈何欲身傳位天后乎天下者髙祖太宗之天下非陛下之天下正應謹守宗廟傳之子孫不宜持國與人以䘮厥家由是事沮臣竊以太皇太后垂簾聽政盡用仁宗朝章獻明肅皇后故事而主上奉事太母莫非盡極孝道太母保聖躬莫非盡極慈愛不似前朝荒亂之政而蔡確謫守安州便懐怨恨公肆譏謗形於篇什處今之世思古之人不思於它而思處俊此其意何也借曰處俊安陸人故思之然安陸圗經更有古迹可思而獨思處俊又㝷訪處俊釣臺再三歎息此其情可見也臣嘗讀詩之衛風綠衣衛荘姜嫉州吁之母上僣其卒章曰我思古人實獲我心釋者謂此思古之聖人制禮者使妻妾貴賤有序故得我之心也今確之思處俊㣲意如此溪中曽有戈船士溪上今無佩犢人病守翛然唯坐嘯白鷗紅鶴伴閑身右此一篇亦無譏謗未結茅廬向翠㣲且持盃酒對清輝水趨夢澤悠悠過雲抱西山冉冉飛右此一篇亦無譏謗喧豗六月浩無津行見沙洲束兩濵如帶溪流何足道沈沈滄海㑹揚塵右此一篇稱沈沈滄海㑹揚塵言海㑹有揚塵時人夀幾何尤非佳語處厚又奏昨為蔡確安州詩譏訕朝廷上及君親遂有状繳奏竊慮確妄有分析稱所思郝處俊不為此事臣今以舊唐書考之處俊所進諫者數事或有在咸亨初或有在咸亨間或在上元初唯進諫此事乃在上元三年即上元間也故確詩云忠言直節上元間則正思此也又最後一篇云喧豗六月浩無津行見沙洲束兩濵今問得安州城下有溳河每六七月大雨即河水暴漲若無津涯不𢾗日晴明即涸而成洲故確因此託意言此小河之漲溢能得幾時滄海㑹有揚塵時又滄海揚塵事出葛洪神僊傳此乃時運之大變㝷常詩中多不敢使即不知確在遷謫中因觀溳河暴漲暴涸吟詩託意如何翌日據王巖叟所記呉處厚以四月五日繳奏確詩呉安詩以六日上䟽左司諫呉安詩上䟽論確譏訕後二日進呈安詩䟽太皇太后宣諭安詩論確謗訕却不見確文字勘㑹得呉處厚繳奏乃是通封只作常程便降付尚書省令再進入要看遂同後䟽進入㝷復降出時左諫議大夫梁燾右正言劉安世各已兩上䟽據王巖叟所記安世及燾自七日後各上兩䟽今並附此燾䟽年月日安世䟽月日仍存之王鞏隨手雜錄云初呉處厚箋蔡持正詩進于朝邸官已全本報之凡進入三日而寂無聞執政因奏事稟于簾前宣仁云甚詩未嘗見也執政云已進入未降出簾中云待取看至午間遣中使語執政曰已降出矣三省皆云不曽承領上下疑之明日乃在章奏房與通封常程文字共為一複盖初進入亦通封明日進呈殊不怒但云執政自商量繼而處厚復有䟽執政請送蔡確分析諫官呉安詩劉安世論列而分析未上間㑹梁燾自潞州召為諫議大夫至京日北過河陽邢恕極論蔡確有䇿立勲社稷臣也諫官以恕之言論之日益切宣仁始怒焉泣諭執政曰當時誰曽有異議官家豈不記得但問太妃遂促蔡相謫命鞏所錄與王巖叟稍不同今但從巖叟若梁燾言邢恕稱蔡確有社稷功則具之五月二十八日丁酉燾言臣風聞呉處厚繳進蔡確詩十首其間怨望之語臣子所不忍聞者伏乞聖慈指揮付外施行貼黄士民憤疾清議沸騰一日之間傳滿都下不敬不道自有典刑又言臣近以蔡確怨望見於詩章包藏禍心合黨誕妄上欲離間兩宫下欲破滅忠義清議沸騰中外駭懼以為確不道不敬罪状明白朝廷不當有疑而猶豫未斷緣確黨與之人牽連中外恐有專以私暱為心出力救觧隂啟邪說眩惑聰明其說若行則君威不振國法遂廢矣臣不勝激切納忠之至伏望睿慈早賜指揮付有司施行貼黄呉處厚孤寒小官不畏大姦獨以君臣大義納忠朝廷是能不虧臣子之節竊恐黨人反謂處厚險薄而以為罪如此則是朋姦罔上伏望聖慈深察其言以辨邪正燾又别状言臣伏以事係君親臣子有不能自己義干社稷人主有不得自私伏見蔡確以前宰相怨望謗讟詞意切害臣曽奏乞早正其罪事有未盡合更論列臣聞當時先帝登遐大臣力請太皇同聼政太皇再三辭避曰婦人豈能了天下事况官家聰明大臣輔佐自可為治何必垂簾也當時大臣以章獻明肅故事奏陳乞為社稷計暫同聼政皇帝自謂幼年未厯軍國之務願太皇太后上體國家同治天下太皇累拒不得辭當時確備位宰相親見本末豈不知垂簾臨朝非太皇本意盖以保䕶皇帝聖躬為切又以安定大業為慮事不得已乃從權宜今確乃思慕處俊自見其意以謂太皇不當臨朝聼政作為流言惑亂羣聼隂懐姦宄動揺人心以為異日誣誕之基其為悖逆無甚於此雖欲示太皇之仁徳深恐損皇帝之聖孝天下之人所宜共棄朝廷之士不可並立此臣所謂臣子不能自己者也大臣者同國休戚以安社稷福生民措當世長乆為心者也身雖在外乃心無不在王室蔡確身為大臣弟碩之罪確既不能救正反故縱之聖慈特寛其刑不能省躬自責乃以責降為恨而輕絶事君之義有幸滄海揚塵之志兩宫何負於確而確忍為此言其包藏豈易窺測夫為人臣幸國家之變以逞其忿而不顧四海生靈之患其為悖逆無甚於此陛下所當尊隆太皇之慈愛行天下之公議謹用祖宗之法快慰臣民之心此臣所謂人主有不得自私者也伏望聖慈以其事下有司議正其罪以尊主威以嚴國典為今日戒為後日訓不勝激切忠憤之至又言臣近累章論奏蔡確罪惡乞正典刑至今未行公議沸騰臣所以不敢循黙輙復紊煩聖聼國體所繫願留宸斷謹按確姦貪便辟險譎阻深因緣朋黨盗據相位挾寵用事公肆矯誣辜負先帝人人痛心若𢾗其罪誅殛有餘而罷相之日猶得大學士出守近郡則是陛下即位之初已有大恩於確也其弟碩為軍噐少監盗用官錢以巨萬計贓汚狼籍近時所鮮自取敗沒有司議法當死無赦陛下以確之故特屈常刑止從羈管則是陛下再有大恩於確也確荷國厚恩身為宰相親弟犯贓明有知情故縱之迹朝廷曲示包容不加窮治以全體貎但落職移郡而已則是陛下三有大恩於確也使確少知人臣之義宜如何感戴兩宫無負於確至矣而確曽不思此猶復歸怨不平之氣發於篇詠蓄異意於太皇藏禍心於王室忠臣義士所不忍聞漢楊惲失位後有詩曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳湏富貴何時宣帝見而惡之抵惲顯戮陛下考惲之詞味確之語抱恨孰深寓意孰切可以斷之而無疑也伏望聖慈早賜指揮依法施行以快忠義之心以為姦凶之戒安世言伏見呉處厚繳進蔡確知安州所製車盖亭詩十篇多渉譏訕而二篇尤甚非所宜言犯大不敬者臣按確得性隂險立朝姦邪象恭滔天有共工之惡言辨行偽挾少正卯之才遭遇幸㑹致位宰席不能正身率下宣明教化而縱其弟碩交結羣小公納賄賂盗用官物不知紀極閨門之内奉養豪侈飲食聲色衣服噐玩肆為奢僣制踰王公是時碩為軍噐少監俸入有限而用度若此確實同居豈不知其所來乎朝廷既不窮治又貸其弟之死止以失教為名出守安陸天下公論咸謂罰不能當其罪固宜痛自懲艾圖報大恩而乃不自循省輙懐怨望借唐為諭謗訕君親至于滄海揚塵之語其所包藏尤為悖逆確自謂齒髪方盛足以有為意在它日時事變易徼倖復用攄泄禍心䟦扈懐梁冀之姦睥睨蓄魏其之志此而可捨國法廢矣伏望陛下察其情理斷以至公出處厚之奏付之有司特行按治明正其罪以謝天下安世第一章四月七日上又言確之朋黨大半在朝造播巧言多方救觧且謂處厚事非干已輙爾弹奏近於刻薄此風浸長恐開告訐之路臣竊以為過矣西漢酈寄天下謂之賣友然而摧吕祿以安社稷前史謂誼存君親不以為貶確之罪惡固已貫盈不自循省肆為訕斥人神之所共怒覆載之所不容處厚外官雖無言責見確悖逆不道發於忠憤名則出位情實愛君取舍重輕未為無理惟陛下勿恤浮議早正典刑使大姦無倖免之門朝廷無異日之患天下幸甚安世第二章四月十日上是日進呈安世等䟽詔令蔡確開具因依實封聞奏仍令知安州錢景陽繳進確元題詩本此叚並据王巖叟所記増修巖叟所不記者亦闕之王鞏雜錄云宣仁令執政自商量而處厚復有䟽執政請送蔡確分析與巖叟所記畧不同龍圗閣學士新知杭州蘇軾言臣近䝉聖恩哀臣疾病特許補外臣竊自惟受恩深重不敢以出入之故便同衆人有所聞見而不盡言竊聞臣僚有繳進蔡確詩言渉謗讟者臣與確元非知舊實自惡其為人今來非敢為確開說但以此事所係國體至重天下觀望二聖所為若行遣失當所損不小臣為侍從合具論奏若朝廷薄確之罪則天下必謂皇帝陛下見人毁謗聖母不加忿嫉其於孝治所害不淺若深罪之則議者亦或以謂太皇太后陛下聖量寛大與天地等而不能容受一小人怨謗之言亦於仁政不為無累臣欲望皇帝陛下降勅令有司置獄追確根勘然後太皇太后内出手詔云吾之不徳常欲聞謗以自儆今若罪確何以來天下異同之言矧確嘗為輔臣當知臣子大義今所繳進未必真是確詩其一切勿問仍牓朝堂如此處置則二聖仁孝之道實為兩得天下有識自然心服臣不勝愛君憂國之心出位僣言謹俟誅殛不報軾奏議繫此於四月十一日當考軾墓誌云宣仁心善軾言而不能用軾出郊未發遣内侍賜龍茶銀合用前執政恩例所以慰勞甚厚此事當考之中書舍人彭汝礪言臣竊聞呉處厚言蔡確作詩語渉譏謗有㫖使確分析詔令一出人言紛然臣夙夜反覆顧慮至廢忘寝食求於義理未得所處欲黙則臣茍祿安然甚負陛下欲言未必有補而身之危先見然臣既出而事陛下又名在陛下從官𢾗分在當言更不及身謀矣使臣自謀而安雖脫人禍鬼神其捨諸昧死上狂惑草茅之愚惟陛下幸察確偹位大臣習為姦惡陛下以其被遇先帝不忍流竄猶使典大州帥一路徳至厚也恩至無量也確宜恐懼修省以捄罪惡而言非所宜靡復嫌忌此雖童子猶能知其不可赦然臣聞之王者之於萬物其覆之如天其容之如地其愛養之如子一發號出令必本仁義是故上下和平風俗醇厚隂陽順時草木鬯茂二聖臨御以來言動政事一無非道凡人有善惟恐長養之不至有惡惟恐盖覆之不盡天下聞之拭目想見唐虞成周之太平今緣小人告訐遂聼而是之又從而行之其源一開恐不可塞人有一言且将文餙之以為是譏謗時政者有一笑且将揣度之以為包藏禍心者疑惑自此日深刑獄自此日作風俗自此日敗壊却視四顧未知其所止也臣聞之三代之盛莫如周成王時其忠厚至於牛羊之吏不踐履草木其次莫如漢文時其盛至於小人恥言人過失夫自寒而暑非一日積也彼其至此所由來漸矣陛下盛徳至行得於天性其仁厚及物已深其事見於天下已信行之不已其為周甚不難為漢不足道今日之舉有識甚為陛下歎息布於天下書於史册其為累甚不細惟陛下反覆思之確罪戾著於朝廷者衆茍欲廢奪理無不可何必用處厚言哉確於臣非有恩臣所言為陛下計為天下宗廟社稷計惟陛下察之所有令蔡確分析詔書尚未遠布欲乞出自宸斷寝罷别聼候指揮外人聞之皆曰確之惡如此陛下容之如此已出令矣有言者乃罷之其從善又如此顧豈不韙哉急於救過言不能文茍䝉聼從有補毫髪雖伏斧鉞臣猶甘心彭汝礪奏以四月十三日上今附見蘇軾後軾奏據本集以十一日上今移入於蔡確分析後甲寅右監門衛大将軍士香特換朝請郎轉至左通議大夫止涇原路經略安撫司請將隴山一帶弓箭手人馬别置一将管勾仍以涇原路第十三将為名詔令本司奏舉大使臣二員充訓練官候二年減罷戊午詔引進使忠州團練使定州路鈐轄知保州曹誦赴闕供職以客省副使李諒代之詔陜西河東河北轉運司廣收菽麥毋與民爭糴禮部言經義詩賦進士聼習一經第一場試本經義二道論語孟子義各一道第二場賦及律詩各一首第三場論一首第四場子史時務䇿二道經義進士並習兩經以詩禮記周禮左氏春秋為大經周易書公羊榖梁儀禮為中經願習二大經者聼即不得偏占兩中經其治左氏春秋者不得以公羊榖梁為中經第一場試本經義三道論語義一道第二場本經義三道孟子義一道餘如前並以四場通定髙下去留不以人數多寡各取五分即零分及元額觧一人者聼取辭理優長之人從之初八日并十九日可考新紀云戊午立試進士四場法按二年十一月十二日已立四場法度詔應臺察事已弹察後及一月以上遇赦降者其稽違本罪不得原減從侍御史盛陶言也尚書省言大河東流為中國之要險自大呉决後由界河入海不惟淤壊塘濼兼濁水入界河向去淺澱則河必北流若河尾直注北界入海則中國全失險阻之限不可不為深慮詔吏部侍郎范百祿給事中趙君錫條畫以聞百祿等言臣等昨按行黄河濁流口至界河又東至海口熟觀河流形勢并取到㳂界河至海口舖寨地分使臣等状各稱界河未經黄河行流已前濶一百五十歩以下至五十歩深一丈五尺以下至一丈自黄河行流後來見今五百四百至三二百歩深三丈五尺以次至二丈顯是河性就下行疾自刮除成空而稍深與前漢書大司馬長史張戎之論正相符合自元豐四年河出大呉一向就下奪入界河行流勢如傾建經今八年不舎晝夜衝刷界河兩岸日漸開濶連底成空趨海之勢迅快非常雖遇元豐七年八年元祐元年非常大叚泛漲而大呉以上数百里終無决溢之害此乃下流歸納處河川深快之致驗也塘濼雖有限敵之名而無禦㓂之實今之塘水又異昔時淺足以褰裳而渉深足以維舟而濟冬寒氷堅尤為坦途如滄州等處商胡之决即已澱淤今四十二年迄無邊㓂之警亦無人言以為深憂自回河之議起首以此為辭是欲動煩聖聼若謂直注北界失險阻之限是大不然何者大呉初决水未有歸猶不北去今河流八年矣入海湍迅界河益深誠不宜過慮設果有此則中國據上㳺北敵豈不慮乗流而擾之乎自古匈奴入㓂之路朝那蕭闗雲中朔方定㐮鴈門上郡太原右北平之類無險而不入豈塘濼界河之足限也哉臣等竊謂本朝以來未有大河安流合於禹迹如此之利便者其界河向去只有深濶必無淺澱河尾安得直注北界中國亦無全失險阻之理貼黄今黄河所經固有淤澱盖遇平壌灘漫行流稍遲則泥沙自然留淤若趨深走下湍激奔騰則惟有刮除無由淤積况界河非止為濁水衆流所衝刷加之朝夕兩次海潮之所渲蕩必無向去淺澱之理乞勿上煩聖慮百祿等答詔據奏藁増入行状即載使歸時今依實錄附四月十八日但實錄刪取大畧欲究河事本末故詳載之百祿附傳大抵因行状君錫附傳尤不詳也得元豐四年詔已於正月二十八日辨其先後是日左諌議大夫梁燾又䟽論蔡確譏訕罪状明白便當付獄不湏更下安州取索元本及令確分析詔安州限三日趣具報朝廷既用呉處厚奏令確分析御史中丞李常侍御史盛陶亦各上䟽意乃佑確實欲罪處厚而不敢正言之此據王巖叟所記先是左諫議大夫梁燾右司諫呉安詩右正言劉安世共奏早來臣燾臣安詩延和殿進對具陳蔡確怨謗君親情理切害因曽上禀言路更有何人論列伏䝉宣諭唯卿等及劉安世外别無章䟽臣等竊伏思念國家設置御史本欲肅正紀綱紏察百僚雖小犯朝廷之議猶俾弹治今來蔡確悖逆不道指斥乗輿而御史臺職在按舉曽無一言挾邪不忠黨惡無憚未見如此之甚者臣等前章固嘗以確之朋黨大半在朝慮其造播巧言多方營救不謂御史當可言之地並不紏劾又慮姦黨變亂公議别有奏陳恐開告訐之路臣等竊謂古人見無禮於君者如鷹鸇之逐鳥雀豈有目覩姦豪陵蔑朝廷謗訕君上乃欲置而不問茍非今日確之事發則其黨與未易彰敗臣等尚慮御史臺知臣等已有論奏備禮一言以塞外議若果如此則其包藏奸状益更明白伏望陛下留臣等此奏候蔡確事畢明正其罪特行竄逐庶使邪正有辨不敗國事安世集此係第三章注云與梁燾呉安詩同上於是安世又言臣近以蔡確指斥乗輿情理切害㝷具論奏乞正其罪雖聞已降指揮下安州取索元本及令確開具因依至今未見回報臣聞上自執政下至堂吏確之黨與殆居其半百端營救齊奮死力若使邪說得行揺動正論則朝廷之事極有可憂此臣所以夙夜寒心而過為陛下之計臣竊觀自二聖臨御以來日新聖政蔡確之徒不得逞其奸志隂懐怨望窺伺頗急然而深情厚貎未嘗形見今乃無故作為此詩臣恐祖宗神靈天地眷祐疾確貫盈而以此機授陛下也臣伏見李常盛陶居風憲之地目覩蔡確無禮於君親而依違觀望曽不紏劾及朝廷已有行遣方始備禮一言而又是非交錯皆無定論翟思已下仍更不見章䟽御史如此紀綱何頼焉彭汝礪在侍從論思之列不以疾惡為心反用開告訐之路為觧其餘進說之人臣雖不能知其名氏然所主之論計與汝礪不甚異也臣竊謂李常等居可言之地而不言或雖言而隂持兩端彭汝礪等不任言責輙敢進䟽宜有髙遠之慮出於世俗之表而義存君親者反責其告訐悖逆不道者欲置而不問夫告訐之不可長則是矣至於睥睨君親包藏禍心者乃為可長乎朋邪罔上孰此為甚若非確之事發則小人比周無由彰敗惟望陛下聖心先定勿惑流言誅鋤姦慝决行威斷庶幾朝綱振舉邪正明辨天下幸甚安世集此係第四章李常五月二日除兵書盛陶常少左諫議大夫梁燾又言風聞臣僚之間有隂進邪說營救蔡確及有請罪呉處厚者在朝之臣驚相傳播以謂忠於確者多於忠朝廷之士敢為姦言者多於敢為正論之人以此見確之氣熖凶赫賊化害政為患滋大夫是非者天下之公議也百千私言不可亂也賞罰者人主之利噐也二三妄臣不可侵也如使公議可屈利噐可揺何以安宗社正朝廷示萬方以無私耶陛下聰明洞照至公無惑真偽邪正人人盡知不待臣多言而後能察也臣謂首此妄作者其說有二若非出於畏忌即是牽於朋黨畏忌者恐朝廷典刑不正有復來之危急朋黨者恐蔡確權勢盡去無自託之階梯切身利害表裏相符縱横庇䕶諜謾欺罔但循養交之私遂失為臣子之節惟憂負確而不憂負國惟知愛確而不知愛君有臣如此國家何頼臣觀古今之間人君欲罪其臣下而羣臣以理救觧者甚多然而皆以其心有可恕也以己之心度彼之心與之同則引理開陳指事辨白幸人主盡明其心而畧其跡也今確怨望悖逆包藏禍心無可恕者何人之心可與之同而更為之救觧哉其以告訐之風不可長而責處厚者是亦不然所謂告訐者等軰之間茍快怨憤擿其隂私以相傾陷傷敗風俗誠為不誡至於自納罪惡凌犯君親忠臣孝子忠義切於上聞不當妄引告訐以為比擬也况法所不加義所不制欲以何名議罪處厚謂如告訐之風猶不可長則如確悖逆者其可長乎告訐之長不過傾陷一夫一家悖逆之長至於危亂天下豈傾陷之害可憂而危亂之禍不䘏耶此奸人之言欲以惑聰明而亂正論挾狡獪而行私恩無毫髪忠敬之意不可不治也其臣僚所上章奏候貶責蔡確了日伏望聖慈特賜指揮付外施行以正其罪貼黄臣此章乞候斷遣蔡確了日同臣僚所上章奏降付三省從來患在是非顛倒邪正混淆朝廷之間未得清明今因蔡確事盡見在廷之臣内懐向背即是非邪正於是分明不可不行也伏望特賜聖斷以曉中外法不行於大臣乆矣確過惡数發朝廷之法已屡屈故確敢肆胷臆極口謗詛畧無忌惮謂法必不行竊慮大臣之間亦有敢於附黨傲於玩法專以䕶確為計無尊敬兩宫意此不可不戒也確罪既正姦人自銷或又屈法縱之則後日必有甚於此者恐為國家之憂不可不慎於此舉也燾集係第四章己未昭宣使入内副都知永州團練使梁從吉領康州防禦使詔元祐二年以前諸科舉人改應新科明法聼取應外自今更不許改其獲冒應人仍増舊賞從禮部刑部請也初八日十八日壬戍詔三省執政官月以時政記及三省同得㫖宣諭事輪修政目云三省同得㫖時政記侍郎左右丞輪月修先是中書舍人曽肇言臣伏覩内降指揮皇太妃親屬滑州韋城縣百姓侯偁昨因斷撲酒務少欠官中課利并本息錢等認納前界少欠錢可與均作七年送納所有已拘收抵當契書子利等並特先次給與本人餘人不得援例仍與免差人監催臣竊伏思皇帝陛下太皇太后陛下以百姓侯偁是皇太妃親屬之故特為寛展納年分限給還契書子利等在於縣官事至㣲末然此令既行竊恐因緣戚屬轉相扳援日月積累寖紊朝政長干請之風開僥倖之路故先王立事必慮其敝忠臣事君常諫其漸盖以此也况皇太妃位號隆重海内承仰必不肯以私親小故浸隳紀綱塵玷徳美盖是廹於人情有不得已者然臣竊謂皇太妃儻哀彼困窮予之金帛可也恐不足以上煩詔令啟此倖門使天下聞之有以窺測此臣尤為皇太妃愛惜事體也伏望聖慈詳思臣言如萬有一得宜及指揮未出猶可追還庶使道路之人無所竊議増廣宫闈盛徳所補不細傳曰君子之愛人也以徳細人之愛人也以姑息臣心無他竊抱惓惓愛君之忠不敢為姑息而已惟聖明照察幸甚貼黄稱詔㫖既下臣恐州縣以皇太妃親屬之故豈敢有所詰問况又有免監催指揮則雖有七年之限亦恐未必及時送納伏望聖明更加詳酌乃詔侯偁所少欠課利特許将子利充数已拘收抵當契書依舊在官許納錢抽取所欠少錢與均作七年仍免差人監催餘人不得援例於是户部侍郎蘓轍言臣竊以民間欠負合放皆有條法上下共守凡有寛貸皆先經户部勘㑹於法無礙然後施行未有如候偁之比直自朝廷批下聖㫖更不問條法可否一面行下仍令衆人不得援例者本部官吏皆竊疑怪不敢奉行深恐此令一行應干欠負之家皆懐不平之意已具状申尚書省乞朝廷裁酌施行去訖臣今竊聞侯偁皇太妃親戚二聖篤於恩愛特為降此指揮踈賤之臣不當更有論奏然臣職在右曹專掌坊場法度祖宗條約當與天下共之不宜以宫禁之私輙有撓敗臣恐此門一啟宫中遞相扳援其漸可畏臣若失職不舉其罪大矣竊惟皇太妃供養二宫動循禮法外廷雖踈逺未聞有過差之事今侯偁所欠不過萬数千緡耳若以私親之故出捐金帛以濟其急下足以存骨肉之恩上足以全祖宗之法天下傳誦無復間言公法既全國勢増重其於太妃盛徳亦非小補也臣不勝區區守法愛君之心欲乞追還前命使天下明知朝廷不以私愛害公議干冒鈇鉞俯伏待罪貼黄稱契勘人户承買場務如有拖欠官錢已拘收抵當在官其所收子利自合納官兼拘收抵當亦合依條出賣今所降指揮有此違礙其從違當考五年二月四日侯偁借補借職皇太妃舅也詔在京院坊監牧馬草地近係太僕寺拘收者聼民間仍舊承佃從太師文彦博請也樞宻院言荆湖南路安撫鈐轄謝麟措置蠻事有勞詔降𠡠書奨諭仍賜金帛癸亥宿州鄉貢進士張初平生母劉氏為宗室克懼婢初平願納雇直歸其母而克懼弗許御史臺請從初平以敦風教從之甲子權京東路轉運副使胡宗回為吏部郎中廣南西路轉運使髙鑄為户部郎中承議郎新陜西路轉運判官張景先為京東路轉運判官中書舍人曽肇言先凖吏房送到詞頭景先自河北轉運判官移陜西路臣素不知其人但見朝廷昨移景先於河北令同都水使者王孝先提舉修河遂取景先前後言河事文字㸔詳盡見反覆依違觀望事實㝷具劄子納中書省乞行降黜未敢撰詞今又準吏房送到詞頭改差景先京東路轉運判官臣竊以謂陜西京東雖路分不同轉運判官事任則一豈有不可於彼而可於此者朝廷以四方萬里視聼所不能周故置監司寄之耳目必得忠信醇正有守之人然後可以付託如景先已試迹状甚明恐不足以當一路寄任伏望聖慈詳察景先所為寝罷新命重行降黜庶使諸路監司聞風畏懼在於朝政不為無補臣待罪從官職當書命有所不知不敢妄發既見景先所為如此而包羞茍且急於順命上誤朝廷賞罰下失㣲臣官守區區私義實所未安故不違再三冒瀆天聼儻臣言有可取乞賜施行如渉欺誣亦甘竄謫其論列景先劄子今冩錄繳連在前所有送到詞頭未敢修撰後二十日詔景先知同州五月十八日景先知同州今并書吏部郎中章楶權發遣陜西路轉運使都官員外郎周秩權發遣京東東路提㸃刑獄校書郎集賢校理李徳芻為都官員外郎右司諫呉安詩言徳芻徃任宗正司憑藉王安石氣燄後為王珪耳目又殿中侍御史翟思言其娶婦論財乃詔徳芻依舊校書郎依舊校書在五月八日今并書知大宗正丞事黄裳為校書郎宻州莒縣濤洛廵檢下土軍孫福等殺所部官李寧提㸃刑獄石𢋫奏寧性暴決責羣卒致懐怨望請從配法詔降𢋫知台州以三省言𢋫求貸姦盗為失職故也丙寅詔宻州至聖文宣王廟置教授一員以五經出身尹復湊充用轉運司及太師文彦博薦也詔階州㳂邊闗寨三丁巳上之家正身係保甲者與免冬教從經畧安撫司言也開封府言本府流以下公事内有刑名疑慮情法不稱並依乆例及一司𠡠令奏斷近修到户部開封府勑並斷定罪名報刑部㝷申明乞依舊法令凖𠡠御史臺㸔詳内有所犯委是情重乞特行刺配之人不得直乞降付本府斷遣依大理寺右治獄條降付尚書省施行若便改已行之法慮囚禁壅滯請将新條止入户部一司勅其本府奏斷公事悉依舊法從之丁夘詔開封府申奏公案除刑名疑慮及未約定刑名者並降付大理寺外其已約定刑名案只刑部擬例定斷仍令本府状内貼說乞降付去處户部公案凖此以尚書省言自官制行並由大理寺奏請類皆迂枉故也右正言劉安世言臣近以自春渉夏旱暵為虐地震星殞巨異仍出輒奏狂瞽之論粗陳消復之理方陛下祇畏天戒側身修行日俟明詔採用一二今既浹旬未覩施行惓惓之心不能自己再瀆天聼幸垂省察臣嘗考禮記春秋月令以謂毋聚大衆毋置城郭掩骼埋胔毋起土工有以見聖人奉順隂陽取法天下力役之事不奪農時行道之殣亦順生氣是以風雨時若災害不生天人和同上下交泰其或賦政違道役使過中人力疲勞善氣揺動則國有水旱之變民罹疾疫之災此繼天奉元之君所以夙夜恭敬而不敢忽也春秋荘公三十一年冬不雨五行傳以謂是嵗一年三築臺僖公二十一年夏大旱五行傳以謂作南門勞民興役災祥之應各以類至著於方䇿皆可稽考臣伏見京師修城開壕功費重大兵夫之衆已至数千徒庸之計幾八百萬穿㙭墳墓乖掩骼之仁違逆天時犯無戎之戒人困於役國傷於財然則嘉氣之乆不效未必不由於此也臣聞天下有道守在四夷今帝王之都而為守敵之具則外之屏翰将安用之必謂州郡為不足恃則平陸之一城恐非用武之地况國家利源前日去其大半用度漸窘正務裁節陛下躬行法度為天下先而乃以不貲之費棄於無用之所可不惜哉或謂先朝已嘗興作欲終其事則乞罷雇人止以廣固之兵不計嵗月漸令修葺自餘土木不急之役伏乞特降指揮悉俾停罷所貴順承天意以致膏澤梁燾亦有兩章月日不同更湏考詳
