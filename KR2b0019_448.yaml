body:
  text: 續資治通鑑長編卷四百四十四宋李燾撰哲宗元祐五年六月辛酉權户部侍郎韓宗道為刑部侍郎直龍圖閣知熙州范育為户部侍郎龍圖閣知秦州葉康直為寶文閣待制知熙州知陜州呂大忠為直龍圖閣知秦州殿中侍御史賈易為國子司業其新除禮部員外郎命勿行六月八日除禮外七月八日又改淮憲江淮等路發運使苗時中為陜西都轉運使命右朝散郎段與京置場出賣府界保甲司緣保甲省到及內藏庫見寄帳封樁收租匹帛等新無有案此條疑脫誤户部言開封府推官王詔近附府界諸縣催斷合該踈决公事竊見府界民戶嵗出體量和買稈草最為不易嵗不過六百萬數每束支錢二十八文三等以上戶以京東布折價第四等給見錢並赴在京諸場送納所支價直已是不多又嘗得之後時乞今後支俵錢布限至九月終須管了畢從之新無先是知熙州范育言因蘇轍六月末論育生事附此育以四年七月十二日除熙州此稱臣至本路當是四年秋或冬間發此奏臣至本路體探得鄂特凌古謀害溫錫沁之迹然自殺覺來瑪斯多卜後來溫錫沁父子畏逼為備兼知朝廷有意令好看溫錫沁及與巴烏凌斡巴桑多爾濟結官職鄂特凌古自此勢雖少緩而謀愈深多遣質户來邈川換易舊住人戶去其腹心剪其羽翼又使巴烏隂制其內溫錫沁父子勢益孤危錫沁以目疾多不管事巴烏亦以看經為說鄂特凌古勾喚皆不去青唐人往來多凌辱邈川人户邈川人情極不安鄂特凌古又密遣般擦與夏國結和並不由邈川只近北往來有共殺錫沁并吞邈川之謀然羌酋亦不自悟若青唐與夏賊共取邈川則夏賊勢強青唐勢弱其勢必不兩存正如晉取虢及虞行及彼爾臣愚以謂邈川存則有西蕃為夏賊障蔽邈川亡則西蕃必為夏賊所併西蕃併則其旁諸蕃部皆為所役屬西南接巴蜀東北至河東地界幾及萬里其強盛正如唐之吐蕃必為中國大患臣愚竊以朝廷綏撫四方蓋欲使中國外國皆安永無兵革之患爾若今日安而後日有患則不可恃以為安西蕃之勢是也臣蒙朝廷付以邊寄茍三二嵗無事容身而去則於臣私謀甚安然遺西鄙無窮之患則臣上負國恩死有餘責臣雖至愚所不忍為也臣謂為朝廷熟計邈川不可不存溫錫沁不可不救鄂特凌古不可不正其罪凡此皆出於不得已時不可後機不可失蓋有一動而為萬世之安者今日是也臣近又據岷州都總領蕃兵李祥報臣結斡磋使人來趙醇忠處云鄂特凌古待起人馬去邈川為溫錫沁勾不來洮西安撫王光世報臣探得青唐質戶一千七百戶在邈川舊城裏住坐却將舊城裏首領蕃部儹出又言㸃集志家一千來人馬待十一月內奔斫斯博城來裏又言錫沁父子及族下有評泊言漢家有力量時自家偉投漢去沒力量時儻父子一就取上將青唐城去又說錫沁父子被青唐人監管著裏臣觀此事勢鄂特凌古之謀已急錫沁父子之心已危若今日失此機㑹不為救恤則錫沁為鄂特凌古拘執遂并邈川矣臣體訪得邈川有戰兵萬數其人心皆附錫沁錫沁自來心向漢其力非不能拒鄂特凌古兼鄂特凌古自殺巴羅羅遵後河南部族人人懷怨森摩乾展亦怨鄂特凌古殺董戬妻并近上首領徒以逼近勢不得不服蕃僧卦斯敦其徒千餘人國中上下所共敬信自鄂特凌古妄行殺戮亦頗有恚忿之言曽斫禁院門奪出斯吉溫河南隆博喬家等族皆㸃集不起鄂特凌古又將諸首領親屬及董戩族人趙醇忠姊妹皆疑忌囚繫人自為敵將報其怨為日久矣然觀錫沁輩與諸酋雖內有怨鄂特凌古之心外有拒鄂時凌古之勢而隱忍事之雖將就拘執逼死亡而不發者蓋謂鄂特凌古為朝廷所立通其和好放過般擦恩澤撫存之甚厚度其不為已助故畏憚而不敢爾臣謂鄂特凌古乃篡國之賊自既得志肆行暴虐誅不附已者始與夏賊合謀冦邊賴天誅挫其賊鋒擒獲酋首故俯然效順自朝廷蠲釋其罪猶且㸃集兵馬為滿裕克聲勢誅巴羅羅遵謀害溫錫沁今嵗夏秋諸蕃逺近豐稔獨青唐久雨震雹大水漂溺人不聊生國人之所共憤天意之所不容其罪大矣今若朝廷尚務含容使此賊酋謀行計得先併錫沁則其諸部族畏威帖服必與夏賊締交復為邊患一旦為夏賊所圖則臣前所言中國大患不旋踵生矣不可不深憂不可不早計臣今已遣間人告諭錫沁若鄂特凌古更遣人馬來邈川時速來告急臣欲乞量發蕃漢兵馬以助錫沁為聲勢錫沁知朝廷為援方敢出兵拒鄂特凌古且使錫沁結諸酋長及遣河南諸族相應舉事送趙醇忠過界因其人心先聲傳諭以鄂特凌古當得罪趙醇忠當立為辭此則兵雖不交而賊酋之首可致於麾下宣朝廷威德立醇忠以續董戩後寵綏部族錫命首領不改其舊則邈川自存青唐自安不踰月之間事大定矣醇忠既襲其國上德朝廷世世忠順為漢西藩控夏人之腹背制其死命使不敢犯邊存亡繼絶以示大義四方聞之罔不悅服豈獨弭西邊之患乎一舉而獲萬世之利矣如此經制則依得朝旨不敢有失事機却致邊患伏乞朝廷速賜指揮育又言此奏稱正月中當是五年正月也今并前奏附六月末六月二十八日育罷熙帥除戶侍臣竊以禦戎之要防患在於無形制勝在於未然患至而後圖安未有不危者也兵交而後求勝未有不敗者也臣觀本路有無形之患其端已具其憂甚大臣䝉朝廷假以方面之寄若容身自謀依違不言使患至形成上貽朝廷憂下為一方害則臣辜負明恩不忠之罪大矣故臣敢極陳其說臣伏見近日朝廷詔本路與夏人分畫疆界依綏德例非所賜城寨外以二十里為界通逺軍定西通西榆木等城寨朝廷指揮拶邊相照取直西人執以逐寨外取二十里蘭州智固勝如堡前日朝廷令常作守據之計本路按視合取二堡外立界西人指為非舊堡寨要自康古寨打量此二事若朝廷從夏人之請則於本路邊面形勢有無窮之大害若不從夏人必起兵爭占有害今日和議而西兵未有可息之期臣請陳其故蓋定西北與夏人接境通西榆木等處則賊境在東若皆取二十里則今日所棄邊面多者已三二十里所徙弓箭手已數百千戶失膏腴之地數千畝又定西孤絶賊兵可從中斷其歸路其勢决不可守則通逺之邊面所蹙又不啻數十里而賊兵每出可至通逺通逺受敵則熙河一路有扼吭不通之患矣蘭州向藉智固勝如川地五十餘頃皆膏腴上田有水泉可以灌溉其收畝數斛無慮置弓箭手三千人昔之堡障未立不敢就耕而以名目占坐不去者已千有餘人若從康古二十里為界則二堡之地皆不可耕蘭州捨此北距河南介山東西境壤無餘其耕種之地既不足以自食其州粟日益貴費日益廣又况賊兵一出則立至州之西野增兵嚴備無時而已豈不危哉此所謂從夏人之請於本路邊面有無窮之大患者也臣訪聞定西一帶川原廣闊昔喀木所居西市夏人置倉以積穀智固勝如川僞號御莊自歸本路其土人皆走天都山及㑹州之境地瘠人貧未嘗一日不回思其地又聞夏人嘗使此方之人自謀爭奪之計昨正月中西界所差分畫首領與邊臣議論不合而去今其再至探得集兵數萬屯於境上時出游騎道不遜之語度其意蓋將必爭而後已雖至於用兵廢絶和事皆且不顧此所謂不從其請將見兵爭而不解未有可息之期者也以臣計之不與則用兵雖速而患小蓋吾邊有易守之形也與之則用兵雖緩而患大蓋吾邊有難安之勢也然此二事皆已形之患又有未形之患大於此者不可不慮臣請終言之竊聞青唐鄂特凌古昔以篡國朝廷既行封爵嘗與夏賊同謀冦邊賴朝廷威斷邊將出兵生擒果莊斷河橋以挫其鋒遂寢姦謀納質效順自心數嵗之邊患今聞鄂特凌古常疑其下有怨讎之謀日圖誅殺易置首領且與夏賊結約甚歡遣人往夏國詰其與漢和激其用兵之意蓋二方氣類既同其嗜欲既一勢必相為而又鄂特凌古篡於前梁葉普篡於後昔也相視而成其謀今也同心而濟其惡理必然矣臣恐二賊締交夏賊出兵於通逺金城之郊本路嚴兵以禦之里賊又出兵河岷之郊則本路分兵而力不給朝廷方且益發兵增備不知幾何而止也商者不得安於途耕者不得安於野則所仰之粟不知幾何而足也五州之境邊面二千餘里二賊據吾腹背嵗嵗不可弛備一日不可减兵備其東則西出備其南則北出左提右挈四面受敵朝暮相救之不暇一有交兵則五州之勢岌岌乎皆有動搖之憂萬一至於敗撓而不可支可不慮哉此臣所謂無形之大患可為朝廷憂者也以臣愚計欲防此未形之患必為制勝未然之術臣願朝廷垂聽毋忽臣昨纍曽經畫青唐邈川利害朝廷未賜俞允近鄂特凌古再召溫錫沁愈懷疑懼邈川人情亦不安又殺圭羅族四人錮其酋首及勾隆博喬家族首領徙杓魯新族其人戶不從遂拘執首領致有五百餘戶走入河州界約欄未去自朝廷除結斡磋鎮州刺史勾在青唐拘留不還又勾界邊斯博格亦留青唐其國人携二酋長憂懼愈甚於前近又探得鄂特凌古病甚或云已死匿哀不發欲踵前日篡董戩之迹此逆酋之暴虐與人情之怨叛較然可見矣臣觀夏賊之於邈川地近而形勢便青唐情通而利害同彼兩地之動息夏人知之固熟徒以葉普始篡及疆議未决故遲遲計未發爾使其志得謀行移兵以舉邈川并青唐若振槁木之易其為西邊大患臣前日已嘗具奏于朝矣就其未能二賊方且合謀為患如臣今日所陳其勢必矣臣又聞古人善為謀者因禍而為福轉敗而為功今本路欲與夏人交議地界當賊兵之鋒而爭口舌之勝臣未見其可也不若緩其所當爭而出其所未發先為之計伐夏賊之謀而絶其交乘青唐之變而定其國用臣前策納趙醇忠繼董戩後醇忠既立忠順戴漢因撫諸酋悉皆內向則二賊之交絶矣董戩既死人心皆服虐亂既除國內舉安則青唐之變定矣夏賊失青唐之援則有背腹之憂本路得邈川之歸則有形勢之利彼之所恃者復在我吾之所患者復在彼如此則區區之夏賊將假息於巢穴而不敢窺吾邊鄙通逺金城之疆錫之則為朝廷之德不與則亦不敢爭吾兵不用而可以制夏賊之猖獗平西賊之禍亂威行萬里義服四方雖唐虞三代之禦戎不是過矣將見本路之氓有卧鼓息烽之安趣耕稼而成樂俗矣復何邊鄙之憂哉此所謂制勝於未然之術也臣伏思朝廷大計務欲安邊息民不用兵革臣為此謀其始惟護趙醇忠假以兵力因其人心助其聲勢過此以往更不煩兵其津遣趙醇忠鎮撫部族合措置事件如蒙朝廷賜可乞别具條析聞奏臣雖述此利害或恐更有未盡事理朝廷若行詰問却致往復已依近降朝旨選差本司勾當公事种朴乘遞馬赴闕詣三省樞密院稟議去訖伏乞朝廷檢㑹臣纍狀及今奏事理早賜處置指揮結斡磋授鎮州刺史乃四年七月二十四日蘇轍十二月十四日初上官均云云可考是月令保安軍牒宥州熙河地界如前已申樞密院候指揮政目六月末事夏人犯智固勝如二堡政目六月末事七月十二日令牒宥州御史中丞蘇轍言臣伏見西夏輕狡屢叛為患莫測昨與延安商量地界遷延不决捨歸本國招之不至邊人之議始謂地界自此不可復議而坤成賀使亦當不至矣今者天誘其衷使者既已及境而地界復議如故方其未遽告絶招懷之計猶可復施此實中國之利也然臣恐朝廷忽而不慮不於今日窮究端由窒其釁隙必俟邊患既起而後圖之則無及矣臣聞熙河近日創修智固勝如二堡侵奪夏人御莊良田又於蘭州以北過河二十里議築堡寨以廣斥堠夏人因此猜二不受約束其怨毒邊吏不信朝廷不言可見矣徒以嵗賜至厚和市至優是以勉修臣節其實非德我也非使之稍有便利豈肯帖然不作過哉何者中國既失大信則外國不可復責故也臣竊惟朝廷之於西夏棄捐金帛割裂疆土一無所愛者纍年于兹矣而熙河帥臣與其將吏不原朝廷之心徼求尺寸之利妄覬功賞以害國事深可疾也頃年熙河築西關城聲言次築康古果莊疑懼遂舉大兵攻擾一路瘡痍至今未復今既城智固勝如其勢必及康古夏人驚疑正與董戩事同由此言之則曲在熙河非夏人之罪也夫蘭州之為患所從來逺矣昔先帝分遣諸將入界李憲當取靈武畏法不敢深入遂以此州塞責自是以來築城聚兵完械積粟勞費天下動以千萬為計議者患之久矣好事之臣因此講求遺利以為今城本漢屯田舊地田極膏腴水可灌溉不患無食患在不耕不患不耕患無堡障凡西關康古智固勝如與過河築城皆所以為堡障也從來熙河遣兵侵耕此地皆為夏人所殺况於築堡致冦無疑而朝廷恬不為怪坐視邊釁之啓深可惜也夫蘭州不耕信為遺利矣若使夏人背叛則其為患比之不耕蘭州何啻百倍故臣以為朝廷當權利害之重輕有所取捨况蘭州頃自邊患稍息物價漸平比之用兵之時何止三分之一若能忍此勞費磨以嵗月徐觀間隙俟夏人微弱决不敢爭乃議修築如此施行似為得策臣不知邊臣何苦而為此匆匆也昔唐明皇欲取吐蕃石堡城隴右節度使王忠嗣名將也以為頓兵堅城費士數萬然後可圖恐所得不酬所失請厲兵馬待釁取之帝意不快忠嗣由此得罪其後帝使哥舒翰攻拔之雖開屯田獲軍實不為無補而士卒死亡略盡皆如忠嗣之言唐史以為深戒此則今日之龜鑑也若朝廷不用臣言臣料夏人久必復叛用兵之後不免招來其為勞費必甚今日敵人強梁則畏之敵人柔服則陵之恐非大國之體也惟陛下留神省察貼黃稱臣聞朝廷欲遣孫路以㸃檢弓箭手為名因商量熙河界至臣觀孫路昔在熙河隨李憲等造作邊事由此蒙朝廷擢用深恐路狃習前事不以夏人逆服利害為心而妄圖蘭州小利以失國家大計伏乞明賜戒敕若因界至生事别至夏人失和勞民蠧國罪在不赦八月二日穆衍代孫路措置熙河蘭州弓箭手田土不知孫路以何時往必在六月間或因蘇轍言遂不遣路然據范育奏則孫路亦往熙河但未得其時轍又言臣近以熙河帥臣范育與其將吏种誼种朴等妄興邊事東侵夏國西挑青唐二難並起釁故莫測乞行責降至今未蒙施行臣已别具論奏臣竊伏思念熙河邊釁本由誼朴狂妄覬幸功賞今育雖已去九月二十八日知熙州范育除户侍葉康直知熙州而誼朴猶在新除帥臣葉康直又復人才凡下以臣度之必不免觀望朝廷為誼朴所使若不並行移降則熙河之患猝未可知加以朝廷議論亦自不一臣請詳陳本末惟陛下察之昔先帝始開熙河本無蘭州初不為患又李憲違命創築此城因言若無蘭州熙河决不可守自取蘭州又已十餘年今日欲築智固勝如以侵夏國良田遂言若無智固勝如蘭州亦不可守展轉生事類皆浮言蓋以邊防無事將吏安間若不妄說事端無以邀求爵賞此則邊人之常態而自古之通患也今若試加詰問理則自窮何者二寨廣狹幾何所屯兵甲多少夏人若以重兵掩襲其勢必難保全既克二城乘勝以擊蘭州則蘭州孤危何異昔日今朝廷不究其實而輕用其言以隳大信夏國若因此不順外修朝貢以收賜豫之利內實作過以收鹵獲之功臣恐二寨所得地利殊未足以償此臣所謂智固勝如决不可城者由此故也昔先帝綏御西蕃董戩老而無子趙醇忠其族子也先帝常遣苗履多持金帛率醇忠見之是時聖意蓋有在矣事既不遂而董戩昏病遂為鄂特凌古所殺鄂特凌古本董戩之家奴先亂其家次取其國董戩之臣如果莊溫錫沁等皆有不服之志此實一時之機㑹也是時朝廷若因機投隙遣將出兵擁納醇忠則不世之功庶幾可立而一時大臣不知出此遽以旄鉞寵綏篡奪之臣使得假中國爵命之重以役屬蕃部臣主之勢由此而堅然自是以來頗亦外修臣節未顯背叛之迹而育等欲於此時復舉前策蓋已踈矣昔曹公既克張魯劉曄言於公曰公既舉漢中蜀人望風破膽劉備得蜀日淺蜀人未恃也誠因其傾而壓之蜀可傳檄而定若少緩之蜀人既定據險守要不可犯矣公不從居七日聞蜀中震動公以問曄曄曰今已小定未可擊也夫機㑹一失七日之間遂不可為今乃於數年之後追行前計亦足以見其暗於事機而不達兵勢矣臣聞种諤昔在先朝以輕脫詐誕多敗少成常為先帝所薄今誼朴為人與諤無異誼於頃嵗偶以徑兵掩獲果莊以此自負而西蕃懲於無備久作隄防亦無可乘之勢况育自到任屢陳此計咫尺蕃界誰則不知臣謂兵果出境必有不可知之憂矣兼聞近日擅招青唐蕃部數以千計納之則本無朝㫖未有住坐之處却之則於彼為畔必被屠戮之苦據此專擅罪名不輕臣不曉朝廷曲加保庇其意安在若不並行責降臣恐朝廷之憂未有艾也借使鄂特凌古因此怨叛結連夏人同病相恤更出盜邊羽書交馳勝負未决當此之時大臣相顧不敢任責而使聖君聖母憂勞帷幄之中雖食主議者之肉復何益乎臣所謂鄂特凌古决不可取者由此故也凡此二事皆國家安危邊民性命之所繫禍機之發間不旋踵故臣願陛下早發英斷黜此三人外則使異域知此狂謀本非聖意易以招懷內則使邊臣知賞罰尚存不敢妄作此當今所宜速行者也然臣尚謂熙河遭此破壞彼此相疑却欲招納令就平帖非得良帥未易安也臣觀葉康直之為人深恐未足倚仗何者康直頃緣權貴所薦節制秦鳳路邊面至狹號為無事而康直於前年冬無故展修甘谷城致令夏國大兵壓境兵役已集康直恐懼不敢興功妄以地凍請於朝廷役既不成敵兵乃去既無將帥靖重之略而當熙河搖動之秋臣恐陛下西顧之憂未可弭也要須徙置他路更命熟事老將以領熙河仍特賜戒敕使知朝廷懷柔逺人不求小利之意如此而邊患庶幾少息矣貼黃稱葉康直頃嵗差知秦州中書舍人曽肇諫議大夫鮮于侁皆言康直昨因兵興調發芻糧一路騷然及令兒男掘取窖藏斛斗貨賣及建言欲由涇原路入界和雇車乘人夫為知永興軍呂大防所奏有違詔敕先帝欲深置於法康直數事李憲憲營救得免按其為人如此今熙河方反側未安而付之此人中外知其不可也种朴昔因永樂覆師之後父諤權領延安之日與其親戚徐勳矯為諤奏妄自保明勞效仍邀取諸將賂遺并奏其功先帝覺其姦詐欲加極典既而釋之並特降官落職停替諤因此憂恚發病至死狂妄如此若不加貶責臣恐熙河終未寧靖也翰林學士范百祿言臣竊聞熙河邊帥有請欲令趙醇忠遙領青唐節度以代鄂特凌古如其拒抗則進兵入討而禽之以威夏國者臣伏惟太皇太后陛下皇帝陛下自臨御以來日務安邊息民以惠天下常程法式之事猶須謹重循理而行至於控禦四裔八蠻未嘗輕易舉動豈聽此狂謀以開邊釁自貽後悔鄂特凌古嘗被詔書恩數酋長一國夫羌戎荒忽叛服去來固其常事是以自古帝王知其如此皆不臣之而以度外置焉使不為中國叛臣也今若謂鄂特凌古本無向化之心其下族屬率多怨叛如其醜類自相殘賊並來求哀猶當從而綏之以示中國恩信此乃天子守在四夷之道豈謂遣人刺探得其徒黨離二便可選置得力蕃官而使代之耶此計誠行彼鄂特凌古者安肯聽順而受代乎彼必拒抗則吾即舉兵彼既知此舉兵豈不先事㸃集作過以犯吾邊鄙乎議者若以比昨來禽致果莊之易則恐亦思之未審臣竊聞往者朝廷許令便宜進兵指揮至彼未久遂能密切舉事掩襲果莊出其不意因以成禽竊料自此後來彼方酋長雖甚庸謬安得不以果莊之故各自警戒豈肯更如前日令我邊吏出其不意而生禽之乎事非萬全何可妄動臣竊意廟堂皆耆儒碩畫必不以之為然萬一不擇嘗試為之臣恐邊臣之功未可必望毫髮徒啓夏國唇齒疑叛之隙忿鷙不服之心為國生事雖悔無及臣愚不自量輒敢先事言之寧冒僭狂之罪若知而不言臣實恥之干凂宸聽惶恐萬死欲乞置臣此章於禁中以參考羣言特出聖斷天下幸甚貼黃臣竊聞昨來諸路奏探得夏國主母皆被殘害以至朝廷信之比下别路審細保明及以永樂回歸生口照驗元無此事蓋從來報探之人多虛少實徒規賄利終無罪責何可輕信今來探得鄂特凌古醜類怨叛何以辨其真虛而欲望一旦倉卒內應悉為我用誰能保其必然乎若萬一指揮行下後鄂特凌古未能成禽即趙醇忠遙領之命如何了當自古以來有此措置傳之四裔則招侮一時書之史冊則貽笑久逺國家置帥所寄非輕敢乞聖裁更賜詳酌漢武帝時胸奴來請和親上下其議韓安國曰和親便王恢曰不如勿許舉兵擊之於是恢首為馬邑之謀因聽恢用兵敵覺遁去無功遂誅恢以謝天下是後兵連禍結餘三十年武帝悔之終下哀痛之詔亦無及已蓋議兵之不謹也如此百祿疏不得其時因蘇轍言范育謀納趙醇忠附見其後更須考詳御史中丞蘇轍言臣今月二十四日面奏司馬康久病諫官闕人乞早賜選擇除授尋奉聖㫖只為難得人臣退而思之知人之難莫如已試之驗竊見前左司諫呂陶右司諫吳安詩昔任言責知無不言雖各曽罷去並不緣過惡同時臺諫已斥復用者逮今已遍惟陶以言韓維不公韓氏黨與強盛為衆所疾安詩以言王讜進用不當讜連姻權勢無由復進質之公議皆為不平若蒙聖恩還付舊職俾得盡心圖報必有可觀方今臺諫並闕臣雖備位執法才短無助深恐言職曠弛無補聖明謹采衆論冒昧塵獻乞更加採察特賜録用不勝幸甚四年七月二十四日安詩論王讜十月四日為直集賢院兼侍講五年六月四日司馬康除左司諫轍又言臣竊見祖宗舊制河上夫役止有差法元無雇法始自曹村之役夫功至重逺及京東西淮南等路道路既逺不可使民間一一親行故許民納錢以充雇直事出非常即非久法今自元祐三年朝廷始變差夫舊制為雇夫新條因曹村非常之例為諸路永久之法既已失之矣而都水使者吳安持等因緣朝㫖造成弊政令五百里以上不滿七百里每夫日納錢二百五十文省七百里至一千里以上每夫日納錢三百文省團頭倍之甲頭火夫之類增三分之一仍限一月過限倍納是嵗京東一路差夫一萬六千餘人為錢二十五萬六千餘貫由此民間見錢幾至一空差人般運纍嵗不絶推之他路槩可見矣近因京東轉運使范鍔得替回論其不便安持等方略變法罷團頭火長倍出夫錢工部知罰錢之苦又乞立限至六月以前雖苛虐比舊稍減然訪之公議終不穩便何者朝廷本欲寬恤民力故許出錢雇夫若其錢足以充雇則朝廷將復何求今河上雇夫日破二百而已昨來京城雇夫每人日支一百二十文省則河上支二百文已為過厚雖欲稍增數目為移用陪補等費亦不當過有掊斂以傷民財也故衆議皆謂七百里以下與七百里以上人戶若係差夫則一人效一人之力耳今乃利其逺近有費用多寡之殊遂令逺者多出五十以為寬剩此豈朝廷恤民之意兼一夫出二百五十亦已自過多如臣愚見若於每夫日支出二百文外量出三十以備雜費則據上件京東所差夫數止約合出一十一萬貫省比本監所定五分之二耳昔王安石為免役之法只緣多取寬剩致令民間空匱怨讟並作二聖臨御為之改法今瘡痍猶未復也安持本安石之黨昔日主行市易多出官本散無根之人虛樁息錢以冒不次之賞雖略行追奪而尋復任使蓋從來習為聚斂之政至今不改是以雇夫之法名為愛民而隂實剝下臣欲乞聖慈特降指揮應民間出雇夫錢不論逺近一例只出二百三十文省所貴易為出備不至艱苦兼臣聞自來諸路計口率錢百姓如遭兵火若用之河防之上一無枉費於理尚可也今取之良民之家而付之河掃使臣壕寨之手費一稱十出沒不可復知民獨何負而為此哉且今河掃梢樁之類納時數目不足及私行盜竊比之他司官物最不齊整及其覺知缺少或託以火燭或諉以河决雖有官司無由稽考今以免夫錢付之類亦如此矣兼訪聞河上人夫自亦難得名為和雇實多抑配臣今仍乞令河北轉運提刑司同共相度如何處置關防所支雇夫錢以免欺盜之弊亦乞體量所雇人夫有無抑配具結罪保明聞奏然後朝廷裁酌從長施行貼黃今嵗修河夫人數不少且以逺近各半約之仍據見行法逺者每人一日多出五十文省則其錢數亦必甚多若蒙聖恩便令裁減則民間受賜不少乞指揮速賜施行范鍔除金外在七月二日今因以此奏附六月末更須考詳轍又言臣頃於門下中書後省詳定吏額文字已具進呈後來都省吏額房别加改定施行其間二事最為不便人情不悅是致六曹寺監吏人前後經御史臺論訴者不一本臺亦曽為申請終未見果决行下臣既措手綜其事今又目覩所訴理難默已謹具條列如後一自官制以來六曹寺監吏額纍經增添人溢於事實為深弊臣既詳定既依先降指揮取逐司已行兩月生事分定七等因其分釐以立人數然是時案此下永樂大典原本重出逐司至是時共二十三字詳前後辭義當是衍文考蘇轍欒城集中亦無之今據文刪去逐司之吏僅三千人皆懼見沙汰不肯供具臣遂稟白三省執政言事干衆人既懷疑懼文字必難取索雖或以朝廷威勢逼令盡供及至裁損必致紛競於體不便不若且據事實立成定額俟將來吏人年滿轉出或死亡事故更不補填及額而止如此施行不過十年自當消盡雖稍似稽緩然見在吏人知非身患必自安心極為穩便當時執政率皆許諾遂於元祐二年十一月內具狀申尚書省其略曰今來參定吏額本欲稱事立額量力制祿惟務人人效實事務相稱即非茍要裁損人額及減廩祿縱人額實有可損亦俟他日見闕不補即非便於法行之日徑有減罷若非朝廷特降指揮曉諭本意終恐人情不以為信致供報不實虛陷罪名尋准當月九日尚書省劄子奉聖㫖依所申臣等遂備出榜曉示逐司自此數月之間文字齊足方得裁損成書却被吏額房違廢上件聖㫖指揮將所減人數便行裁撥失此信令人情洶洶又緣此任永壽等得騁其私意近下人吏惡為上名所壓者即為撥上名於他司侍郎左司為下名樂毅在吏額房故為撥上名孔仲卿等於考功之類是也間慢司分欲遷入要局者即自寺監撥入省曹於大理寺撥任永壽親情任中立等十人入考功之類是出任永壽坐受任中立贓决配六年五月十八日可考任情紛亂弊幸百出由此舊人多被排斥以至失所凡所訴說前狀已具開陳下則衆口怨謗感傷和氣上則朝廷失此大信今後雖有號令誰復聽從臣今欲乞只依前件聖㫖將所損人額直候他日見闕不補見在人數且依舊安存况尚書左選撥到兵部手分近已准都省指揮發遣歸原來去處伏乞檢㑹此例一體施行一六曹寺監吏人多係官制以前諸司名額其請受多少及遷轉出職遲速髙下各不同及官制後來分𨽻逐司一司之中兼有舊日諸司之吏臣詳定之日與衆官商量以謂若將舊日諸司之吏約入今日逐司名額則其請受選轉出職參差不齊理難均一蓋將逐司數種體例併為一法其勢非薄即厚非下即髙若不虧官必至虧私虧官則默而不言虧私則不免爭訴俱為不便况今舊司吏人並權依新額請受許從多給遷補出職皆依舊司並有見行條貫若且依此法可以不勞而定及吏額房創意改更務欲一例從新以顯勞效遂除見理舊司遷轉已補最上一等名目見理年選更無遷轉職名之人即聽依舊條出職若就遷試補填闕者令候降到新法施行所有舊司遷補出職指揮更不行用竊緣舊諸司吏人根源各别立法不同不可槩以一法新法雖工止於一法而已以待新法吏人則可以待舊法吏人則不幸者必衆求其無訟不可得矣見今刑部田受賢等經臺理訴勢必難抑欲乞止依後省所用舊條庶幾便可止絶臣聞孔子論為政之本欲去兵去食而存信曰自古皆有死民無信不立今初議吏額羣吏疑懼陛下與二三大臣既令臣等明出榜示告以將來雖有所損直候見闕不補聖㫖明白人謂信然競出所掌文案輸之有司臣等賴之以立條例曽未逾嵗書入他司凡有所損即行裁撥棄置大信略無顧惜此正先聖之所禁也兼前件二事如後省所定皆人情所便極為易行如吏額房所定皆人情所不便極為難守今棄易即難以招詞訴又政事之大失也伏乞聖慈速命有司改從其易以安羣吏之志轍疏不得其時斟酌附六月末更須考詳始中書門下後省准詔同詳定六曹條例元豐所定吏額主者茍悅羣吏比舊額幾數倍朝廷患之命量事裁減已再上再却吏有白中孚者告中書舍人蘇轍曰吏額不難定也中孚昔嘗典其事知弊所在轍曰其弊安在中孚曰昔流內銓侍郎左選也事之最煩莫過於此矣昔銓吏止十數而今左選吏至數十事不加舊而用吏數倍者昔無重法重祿吏通賕賂則不欲人多以分所入故竭力辦事勞而不辭今行重法給重祿賕賂比舊為少則不忌人多而幸於少事此吏額多少之大情也舊法日生事以難易分七等重者至一分輕者至一釐以下積若干分為一人今試抽取逐司兩月事定其分數若比舊不加多則吏額多少之限無所逃矣轍以中孚之言為然即與僚屬議曰此羣吏身計所係也若以分數為人數必大有所損將大致怨訴雖朝廷亦將不能守乃具以白執政請據實立額俟吏之年滿轉出或事故死亡者不補填及額而止如此不過十年自當消盡雖稍似稽緩而見在吏知非身患則各自安心事乃為便執政以為然遂申尚書省乞取諸州兩月生事而吏人不知朝廷意皆疑懼莫肯供遂再申乞榜示諸司使明知所立吏額候他日見闕不補非法行之日徑有減損時元祐二年十一月也後數月諸司所供文字皆足因裁損成書以申三省左僕射呂大防得其書大喜欲此事必由已出將别加詳定而三省諸吏皆不能曉無可委者任永壽本非三省吏也為人精悍而猾嘗預元豐吏額事適以事至三省獨能言其曲折大防悅之即於尚書省創立吏額房使永壽與吏數輩典之凡奏上行下皆大防自專不復經由兩省一日內降畫可二狀付中書其一裁定宗室冗費其一吏額也省吏白中書侍郎劉摰三年四月六日摰自左丞遷中侍録黃誤下當在此後不必此時也四年十一月十七日自中侍改門侍請封送尚書省摯曰當時文書録黃過門今封送何也對曰尚書省以吏額事每奏入必徑下本省已久今誤至此摯曰中書不知其他當如法令遂作録黃永壽見録黃愕然曰兩省初不與乃有此耶即稟大防乞兩省各選吏赴局同領其事大防具以請摰摰曰中書行録黃法也豈有意與吏為道地今乃使就都省分功何耶他日大防又持奏藁示摯曰吏額事本欲謹密而速故請徑下然未經立法欲三省同奏依致仕官文書法致仕官法者近制以臣僚疾病請致仕多緣經歷迂滯不及被受而亡故立法文書雖三省簽入而直付都省摯曰此非其類也當聚議明日大防復出奏藁謂摯曰勢不可不爾摰乃從之吏額事尋畢永壽等推恩有差議者皆指為僥幸永壽急於功利不顧後省前已得㫖又嘗榜示諸司更勸大防即以立額日裁損吏員仍以私所好惡變易諸吏局次凡近下吏人惡為上名所壓者即撥出上名於他司凡間慢司分欲入要地者即自寺監撥入省曹吏被排斥者紛然詣御史臺訴不平臺官因言吏額事在後省成就已十八九永壽等攘去才數月而都司擅擬優例冒賞徇私不可不懲諫官繼以為言章數十上永壽等既逐而吏訴祿額事終未能决蘇轍時為中丞轍為中丞在五月二十一日改尚書右丞在六年二月二日具言後省所詳定皆人情所便行之甚易而吏額房所改皆人情所不便極難守且大信不可失宜速命有司改從其易以安羣吏之志大防知衆不伏徐使都司再加詳定大略如轍前議行之此據蘇轍遺老傳龍川志略欒城集第四十四卷奏議劉仿王知常所編劉摯行實增修仍各具注于後蘇轍龍川别志云豫為中書舍人與范子功劉貢父同詳定六曹條例子功領吏部元豐所定吏額主者茍悅羣吏比舊額幾數倍朝廷患之命量事裁減已再上再却矣豫偶坐局中吏有白中孚者進曰吏額不難定也中孚昔嘗典其事知弊所在豫曰其弊安在中孚曰昔流內銓今侍郎左選也事之最煩莫過於此矣昔銓吏止十數而今左選吏至數十事不加舊而用吏至數倍者昔無重法重祿吏通賕賂則不欲人多以分所入故竭力辦事勞而不辭今行重法給重祿賕賂比舊為少則不忌人多而幸於少事此吏額多少之大情也舊法日生事以難易分七等重者至一分輕者至一釐以下積若干分為一人今試抽取逐司兩月事定其分數若比舊不加多則吏額多少之限無所逃矣豫曰汝言似得之矣即以告屬官皆莫應獨李之儀曰是誠可為也即與之儀議曰此羣吏身計所係也若以分數為人數必大有所損將大致怨訴雖朝廷亦將不能守乃具以白宰執請據實立額俟吏之年滿轉出或事故死亡者不補填及額而止如此不過十年自當消盡雖稍似稽緩而見在吏知非身患則各自安心事乃為便諸公以為然遂申尚書省乞取諸司兩月生事而吏人不知朝廷意皆莫肯供遂再申乞榜諸司使明知所立吏額候他日見闕不補非法行之日徑有減損如此數月之間文字皆足因裁損成書以申三省時左相呂微仲也極喜此事以問三省諸吏皆不能曉有任永壽者本非三省吏也嘗預元豐吏額事以事至三省能言其意微仲悅之即於尚書省立吏額房使永壽與堂吏數人典之小人無逺慮而急於功利即背前約以立額日裁損吏員復以私所好惡變易諸吏局次凡近下吏人惡為上名所壓者即撥上名於他司凡間慢司分欲入要地者即自寺監撥入省曹凡奏上行下皆微仲專知不復經由三省法出中外紛然微仲既為臺官所攻稱疾在告而永壽亦以恣橫贓汙狼籍下開封府推治府官觀望久不肯决至宣仁后以為言乃以徒罪刺配久之微仲知衆不伏徐使都司再加詳定大略依本議行下轍所記呂大防稱疾在告不知在何時八月劉摯求出大防相繼亦求去然大防稱疾在告必在摯求去前也按轍為中丞在五年五月二十八日任永壽坐受任中立贓决配在六年五月十八日龍川别志云微仲為臺官所攻稱疾在告而永壽亦以恣橫贓汙狼籍下開封府推治府官觀望久不肯决至宣仁后以為言乃以徒罪刺配久之吏額乃從轍議則從轍議必在六年五月後也既不得其的月日且以轍議附五年六月末并别叙吏額曲折于此八月一日劉摯遂求去蓋與吏額事相關也四月八日大防與同列皆以旱求免轍所稱在告當非此時稱疾必是六年五月九日也范百祿傳云為吏部侍郎兼詳定省寺敕令患吏胥猥冗議加澄汰宰相呂大防遽欲廢其半百祿白失職者衆法必不行莫若以漸銷之自今犯法及死亡皆勿補不數嵗所减過半矣大防不從按蘇轍自敕吏額事蓋轍代百祿領此此議未必自百祿出今不取元祐元年二月六日詔三省元豐八年九月十八日後來增置職級逐省從上各留録事都事兩人後永為定額更不得增置其以次合遞遷之人依舊外餘並罷此蓋吏額事祖不知何時復委後省别加詳定當檢劉仿等編摯行實云摯為中書侍郎一日降畫可二狀其一裁定宗室冗費其一裁定六曹吏額房吏請封送尚書省摯曰常時文書録黃過門今封送何也對曰尚書省以吏額事每奏入必徑下本省已久今誤至此摯曰中書不知其他當如法令遂作録黃初尚書令史任永夀精悍而猾與三省吏不相能數以姦弊本末告諸宰執右僕射呂大防深然之是時户部裁節冗費後省裁定吏額皆逾年未就大防盡取其事置吏額房於都省射司空府為局召永壽輩領之次第就緒矣至是永壽見録黃愕然曰兩省初不與今乃有此耶即稟大防命兩省各選吏赴局同領其事大防具以白摯摯曰中書行録黃法也豈有意與吏為道地今乃使就都省分功何耶他日大防又持奏藁示摯曰吏額事本欲謹密而速故請徑下然未經立法欲三省同奏依致仕官文書法致仕官法者近制以臣僚疾病請致仕多緣經歷迂滯不及被受而亡故立法文書雖以三省簽入而直付都省摯曰此非其類也當聚議明日大防出奏藁示摯曰勢不可不爾摯曰諾其事尋畢永壽積勞補官時忱蘇安靜時惲皆遷有差於是外議喧然不平臺諫交章論列謂事在後省成就已十八九永夀等攘去才兩月而都司擅擬優例都司擅擬優例當在四年十二月末或五年正月間據劉安世第三章云正月二十三日敕具載時忱等恩例然則必在正月也冒賞徇私章數十上大防不懌而摯已遷門侍摯遷門侍乃四年十一月十七日每於上前開陳吏額本末曰此皆被减者鼓怨言者風聞過實不足深罪大防亦語客曰使上意曉然者劉門下力也然而士大夫趨利者交攻其事謂大防與摯且有隙於是造為朋黨之論摯語大防曰吾曹心知其無他然外論如此非朝廷所宜有願少引避大防曰行亦有請是嵗八月一日奏事畢少留奏曰臣久處近列器滿必覆願賜骸骨避賢者路既退連上章出就外第期必得請上遣中使召摯入對太皇太后諭曰侍郎未得去須官家親政然後可去使者數輩趣入視事摯不得已受命未幾大防辭位亦不許明年摯繼為宰相六年二月不滿嵗前日洶洶者在言路詆摯摯竟去位朋黨之論遂不可破蓋其本末如此摯新傳大略刪取此此劉仿王知常所編摯行實也行實蓋崇寧元年正月葬時所作宣和四年七月劉安世作劉摯文集序云公在中書一日內降畫可二件其一裁節宗室冗費其一减定六曹吏額房吏請封送尚書省公曰常時文書録黃過門今封送何也對曰尚書省以吏額事每奏入必徑下本省已久今誤至此公曰中書不知其他當如法令遂作録黃初尚書令史任永壽精悍而猾與三省吏不相能數以姦弊告諸宰執呂丞相大防信任之時户部裁節浮費後省裁定吏額皆經年未就呂丞相專權狠愎盡取其事置吏額房於都省射司空府為局召永壽輩領之未嘗謀及同列也永壽見録黃愕然曰兩省初不與今乃有此即稟丞相命兩省各選吏赴局同領其事以是白公公曰中書行録黃法也豈有意與吏為道地今乃使就都省分功何耶是日又持奏藁以丞相指稟公曰吏額事本欲謹密而速故請徑下然未經立法欲三省同奏依致仕官文書法公曰此非其類也更當聚議明日呂相又袖藁厲色示公曰勢不可不爾公不欲立異勉應曰諾其後事畢永壽以勞進官時忱蘇安靜時惲皆遷秩有差於是外議喧然不平臺諫交章論列以謂事在後省成就已十八九永壽等攘去才兩月而都司不用司勳格擅擬優例冒賞徇私章數十上時公已遷門下每於上前開陳吏額本末此皆被省者鼓怨言章風聞過實不足深罪呂丞相亦以語客曰使上意曉然者劉門下力也然自此怨公益甚隂謀去之遂引楊畏在言路諫官疏其姦邪反覆章十餘上竟不能回士大夫趨利者訩訩交攻其事於是朋黨之論起矣公語丞相曰吾曹心知無他然外議如此非朝廷所宜有願少引避丞相曰行亦有請是嵗八月一日奏事畢少留奏曰臣久處近列器滿必覆願賜骸骨避賢者路上遣中使召公入對太皇太后諭曰侍郎未可去須官家親政然後可去使者數輩趣入視事公不得已受命頃之呂丞相亦求退不許明年公繼為丞相不滿嵗前日訩訩者在言路詆公竟去位朋黨之論遂不可破其本末如此事在後省成就已十八九而吏額房攘去才兩月都司擅擬優例按摯自三年四月為中侍四年十一月十七日乃遷門下侍郎如劉仿等所言都司擅擬優例約度在五年正月所稱兩月則吏額房創建當在四年十一月初或十月末也蘇轍遺老傳龍川志略及奏議二年十一月九日得㫖依所申出榜曉示逐司自此數月之間文字皆足因裁損成書申三省左僕射呂大防遂創吏額房不知創吏額房果是何時大防三年四月始為左僕射創吏額房必在四月後即與劉仿等所云吏額房攘去才兩月殊不合以意約度大防雖以三年四月為左相摯亦以三年四月為中侍其創吏額房不必在此時或於四年始創吏額房但不得其月要不必在四年十月末十一月初蓋劉仿等既去才兩月似太迫而蘇轍云數月之間即成書申三省又愈迫恐俱未然須詳考之録黃誤下中書亦不得其時既與裁定宗室冗費同下按裁定冗費置司乃三年閏十二月八日詔其誤下録黃必在四年十一月十七日摯未遷門侍以前顧不知果是何月耳此又足明創吏額房不在三年决也後得劉摯日記載吏額房事甚悉録黃誤下乃四年秋八九月間今别見五年八月十八日庚戌年復改易先所述者俱存兩說亦自有例云
