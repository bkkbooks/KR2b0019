body:
  text: 續資治通鑑長編巻三百三十六宋李燾撰神宗元豐六年閏六月乙亥朔夏國主秉常奉表乞修職貢詔曰朕以爾膺受封爵世為藩臣職貢之修嵗時無怠朝廷待遇恩數加隆頃以權彊敢行廢辱逹於予聽良用震驚嘗令邊州就往移問匿而不報繼犯邊陲王師徂征蓋討有罪義存拯患非獲已焉今者遣使造庭辭禮恭順仍聞國政悉復故常朕心釋然深所嘉納已誡邊吏毋輒出兵爾其遵守先盟愈勵臣節永綏寵禄庸副眷懐初三省樞密院以詔草進呈上批辭意已得允當惟勘㑹自來詔書曽與不曽稱朕與爾三省樞密院具奏故事乃用之詔書據御集兩紀並書秉常請修貢許之丙子詔中書尚書省外取使臣等勿著正官寄理磨勘資任遷補壬午日當并此熈河蘭㑹路制置司言皇城使環州刺史李忠傑討西賊有功應遷四資乞回授三資與子内藏庫副使阿邁遷六宅使阿邁已見五月癸巳鄜延路經略司言弓箭手於近裏縣置田兩處立户及四丁以上乞取一丁為保甲一丁為弓箭手有二丁至三丁即且令充弓箭手詔保甲願充弓箭手者聽其見充弓箭手與當丁役毋得退就保甲陜西河東準此丁丑太常寺言四后陞祔三室内當増四祏室與后室同制從之六月一日乙巳七月十二日乙卯戊寅詔皇城使登州防禦使宋用臣與將來一子入仕者遷一官賜銀絹二百皇城副使曹貽孫内殿崇班閤門祗候楊琰右侍禁任緯各遷一官並以開天源河有勞而用臣為提舉故也詔右班殿直南平軍夷界廵檢菊曩二遷内殿崇班夷界都廵檢使賜金百兩雜綵五百義軍指揮使菊曩大為右班殿直夷界同廵檢王用祥為三班借職歸正寨監押借職馮正符為右班殿直䕫州路轉運判官席汝明上討除射殺魏從革獠賊功也上批汝眀督趣經營斬獲獠賊首級有功可亦遷一官四年八月二日二十七日十二月二十二日五年七月十六日御集有汝眀二事今附見當考䕫州路轉運判官席汝眀奏安平軍夷界廵檢菊曩二義軍指揮使菊曩大狀蠻賊乞弟作過木琴大木琴三并木鷂放箭射殺魏莊宅情願捕捉送官能自用命擒戮獠賊木八木四木鷂木琴三并男及手下獠子都共八人赴官及蕩除木琴三一族浄盡功不在楊光震兄弟殺宋阿訛之下御批可勘㑹昨斬獲宋阿訛朝廷賞賜楊光震名目物件並光震見請俸給畫一進呈元豐六年六月九日進呈訖䕫州路轉運判官席汝眀奏瀘州安撫司奏稱臣在南平軍多日奉㫖令臣具析因依聞奏臣奉㫖委臣應接菊曩大王用祥捉獲木琴翁等不住催促殺獲木琴二并男及手下獠人五級南平軍係水土惡弱春夏之間煙瘴盛發豈願久住彼處蓋䖍奉君命恐煩朝廷興兵今已擒捕木琴三等了當實非無故久住彼處御批席汝眀督促經營斬獲先戕殺南平知軍魏從革獠賊首級有功宜議賞進呈元豐六年六月二十日候奏到取㫖詔陜西河東經略司夏國奉表辭禮恭順朝廷已降回詔許通常貢可誡約邊吏無輒出兵除自來邊界依舊戍守外其新收復城寨止於三二里内廵綽防托毋得深入仍詔押伴夏國使人王震以此意説諭使副兩紀並於戊寅日書詔陜西河東路無輒出兵己卯鄜延路經略使劉昌祚指名乞差使臣三十六員填將官及諸城堡寨見闕上批雖有違碍者可並依所奏詔入内省東頭供奉官甘師顏除名坐私使鈞容直兵皇城司親事卒也權開封府推官祖無頗言準詔提舉京城所奏度量京城裏壁四面離城脚三十歩内妨礙官私地歩舍屋令臣專管勾案圖摽撥内係百姓税地及舍屋參驗元契并估計時價以聞今度量除係官舍屋更不估計其百姓税地并舍屋共一百三十户計直二萬二千六百餘緡已牒將作監訖詔集禧等觀當拆修舍屋令京城所管認其餘係官屋並令將作監拆修其百姓屋價錢令户部以撥養馬錢給之詔熈河蘭路㑹安撫司近遣楊吉等出界討賊冒險過河兵少而斬獲多令制置司於賞格外優賜之其沉溺人厚加撫卹辛巳吏部言二廣承務郎以上任煙瘴處差遣除知州係朝廷差外餘過滿一年乞放罷從之熈河蘭㑹路經略安撫制置使司言擒獲西界探事宜部落子策木多莽緣其人善斫造蕃鞍邊人頗稱之乞令押赴京製造軍器所從之已而軍器所言策木多莽所造鞍二面實可用詔策木多莽特免死刺配欽州牢城壬午詔梓州路轉運副使李琮罰銅二十斤坐前任江淮發運使因奏計時嘗乞住煎池州緑礬而池州實自嘉祐六年已住煎故也詔尚書省六曹諸司主事自今更不帯正官止寄理磨勘資任或併丙子日癸未開封府言陣亡侍禁郝師尹妻劉氏乞以所携養子郝惇與夫弟等均推恩從之熈河蘭㑹路制置使司言秦鳯路兵馬鈐轄兼第三將張之諌子三班奉職義甫乞以父回授減三年并已押隊所獲減二年恩例併遷一官詔義甫身有軍功及父以戰功回授可特許之詔以西頭供奉官郭世及子公彦為三班借職以世及隨京西第三將鄜延路軍出界沒於白鹽池故也詔聞陜西諸路逃亡兵卒尚有未投首人數見在鄉村慮逐處官司不急捜捕致騷擾人户宜令永興軍秦鳯等路提刑司除督責當職官司速收捉外仍依近指揮增立賞錢曉示諸色人捜捕早令浄盡乙酉御史臺言先準詔每半年御史一員取摘三省諸房簿㸃檢稽滯差失然未有輪差及置局取吏之法詔三省各一員於言事官察官内序差以本臺吏就逐省㸃檢太常博士王古言竊見修定陞祔儀注内四后更不造册臣竊以謂奉上二帝徽號陞祔四后神主其事則殊其為宗廟大禮一也今陞祔不發册則大慶廷授上公載輅儀衛鼓吹等亦皆緣此而罷止於太廟有司攝事而已如此則加號之禮顯陞祔之事隠蓋發册之禮雖為祔廟之節文而陞祔之重乃由發册而後顯今既行陞祔而反廢其重禮恐萬方觀聽或有以輕重議朝廷者矣或謂故事用册者皆以改上尊諡或字有增損之故今四后諡無所改則不可用册然臣以謂郊廟用册其事多矣非必主於增改諡號而後可為今自别廟而陞始正帝后同室之位決歴世之疑議舉宗廟之大禮據經稽古至陛下而後定其事至重顧使減於諡號增改使有司止以常祝告廟此臣所以疑而未敢決臣愚以為朝廷茍欲姑徇禮官之議今不用册則乞稽參典故凡行禮之節務致隆極使較然以異於常享庶幾上副陛下致嚴宗廟之意詔下太常寺詳議太常寺言欲比景靈宫安奉神御禮例遣重臣行事比親祠太廟用竹册宗室遥郡刺史捧册史官讀册差親王使相以下為三獻配享功臣七祀仍乞陪祠宗室係正任以上並立班其告遷神御每位用細仗二百人詔陞祔四后用綵殿告遷差宗室行禮并西櫺星門外亦用儀物稱事陳列餘從之四月二十五日六月一日閏六月三日七月十二日詔撥市易下界所納到市易欠錢六百萬緡與上界仍更給度僧牒十為錢十三萬緡以上界見闕本錢故也丙戌詔兵部自今文臣待制三省郎官正言監察御史提㸃刑獄以上武臣横行及路分都監以上各舉應武舉一人歩軍副都指揮使劉永年言汴水漲及一丈二尺法許追正防河兵二十八指揮自西窰務列兩岸至東窰務如漲及一丈三尺二寸更追準備二千人臣竊以京關防河事體至重乞自今遇水大漲或淫雨不已令都廵地分如救火法於近便增發三兩指揮不足即指所轄軍分奏差其支賜約束並依防河從之詔知宜州錢師孟追一官通判曹覯追兩官並勒停推官崔堯章司理鄒長卿各罰銅二十斤衝替推官謝扆司户盧叔度張翼並衝替坐裁減蠻人管設生事雖去官㑹赦皆特責也提舉經度制置牧馬司言奉㫖於熈河河東路揀買新置諸監騍駮馬乞差官逐路揀買詔提舉司每路各選奏大使臣一人具姓名以聞熈河路就差本司承受入内供奉官馮景河東路就差提舉按閲保甲所承受公事入内殿頭王遘仍不送門下省此據御集丁亥陜西轉運副使范純粹言見修完延州城許令用軍須金銀錢糧如不足以朝廷所賜入便錢支用其他城砦雖被㫖修完若不依延州已得指揮無由辦集欲望朝廷詳酌從之戊子禮部言舊制貢院專掌貢舉别有印章曰禮部貢舉院之印遇鎻試則知舉官總領昨廢貢院印亦隨毁以其事歸禮部昨廢貢院要見月日準格遇科塲即止牒禮部印用之緣禮部所掌貢舉乃其一事若每遇鎻試牒印即他曹事實有闕乞别鑄印曰禮部貢舉之印從之都大經制熈河蘭㑹路邊防財用司言捕獲撰匿名書人李方上批書辭詆欺萬状慢上侮下無所不至若止科以徒坐不足懲其姦凶令提㸃刑獄經制司審實是真犯人即處斬廣西經畧司言宜州溪峒言莫世忍子公效乞歸明而南丹州又言公效作過乞以一行人送藤州給田安置詔廣西經畧司令宜州取問莫世忍今公效罪惡法所不容如欲正典刑令押就境上處斬若以父子恩且欲存留即遣回本處令一靣送逺惡處覊管後世忍乞斬公效於宜州詔止刺靣配江西牢城仍免決熈河蘭㑹路制置使司上增築定西城通西寨文武官功狀詔五等皆賜銀絹第一等四人三百匹兩第二等一人二百第三等六十五人百五十第四等十三人百第五等二十七人七十涇原路經略使盧秉上姚麟去月乙丑六月二十一日部諸將討開噶平功狀斬獲首一級遷一資重傷遷一資獲强壯蕃丁一人遷一資賜絹二十匹於是主將東上閤門使英州刺史姚麟賜銀絹六百仍降敇奬諭陣將崇儀使張世矩等八人四人遷一官三人減磨勘三年一人減二年走馬承受二人各賜銀絹五十管勾機宜文字官一員銀絹三十諸班直各賜絹十匹諸軍勇敢効用弓箭手蕃兵等各絹五匹部隊將四十二人内十一人遷一官三人遷兩官一人遷三官餘減磨勘年賜絹有差朝散郎楊叔儀奏臣契勘得鄆州所管六縣牧地共二十六棚都計租額地一萬二千餘頃惟四棚租額數足二十二棚隠陷之地計七十餘頃人户冒佃積有嵗年臣遂擘畫先閲視見存牧地循其邊幅圖以形勢方見見存牧地尖斜彎曲闕縮之狀呼集人户令就紙圖見存牧地之旁自裏及外籖貼所占地段然後諭以牧地形勢侵冒灼然之迹除豪右侵占外復有見任官職田州學學田之類係占牧地者先次拘括以塞百姓觀望之意其人户遂肯伏認所占地段在牧地四至内其地例皆肥沃情願依舊住佃改税為租訖臣今畫到六縣牧地新舊形勢圖一册伏望特賜宣取御批可契勘所陳虚實及曾與不曾依格酬奬并審其人材如堪任使宜特除太僕寺主簿填見闕以勸在位首公幹力之人己丑以叔儀為將作少監楊叔儀奏據御集御集止除寺簿實録乃除少監當考辛卯詔劉昌祚夏國近雖遣使乞修誓好朝廷答詔許通常貢然新畫疆土封守未正賊之承命逆順情不可保漸邇秋防田稼在野深慮守臣安於近詔以為邊事遂寧忽於隄防或誤國事委昌祚詳此施行詔秦鳯路走馬承受楊安民陜西買馬司選馬三千匹赴涇原路以本路諸軍闕馬甚多故也都水監丞陳祐甫言滑州魚池埽危急買納物料俱竭今全河傾側南岸極力救䕶可定乞下京西轉運司具稍草百萬都水監支竹索萬條從之賜措置河北糴便司度僧牒三百修北京東西濟勝倉六月十一日御批可考手詔寋周輔今河朔雨澤調節夏必豐成秋稼立苗甚茂宜乗美嵗廣謀収糴仍具定瀛州新倉畢之期以聞是嵗北京東西濟勝二倉定州衍積寳盈二倉與瀛州之倉告成各二千楹此據本志係之六月今附見閏六月十七日賜度牒修北京二倉後七月二十一日周輔入為户侍太常寺言博士王古乞自今諸神祠加封無爵號者賜廟額已賜廟額者加封爵初封侯再封公次封王生有爵位者從其本婦人之神封夫人再封妃其封號者初二字再加四字如此則錫命馭神恩禮有序凡古所言皆當欲更增神仙封號初真人次真君並從之壬辰皇第九子佖為山南東道節度使儀國公新紀但書佖封儀國公舊紀仍書節度使癸巳權發遣提㸃開封府界諸縣鎮公事范峋上殿言知雍丘向宗慤違法見已劾奏上曰己逐之矣因問諸縣可稱者何人峋言奉議郎知考城孫載簿案嚴整税課辦集通直郎知咸平朱勛未滿任而去民至今思之上曰朱勛嘗有薦廣西勾當者峋言趙卨征安南嘗奏勛隨行上曰違慢者既斥逐有善狀者復収擢則官吏自然戒勸乃詔孫載朱勛中書省籍記姓名京東轉運司言本司置鹽官侍禁張白坐率衆竈户以久雨得晴賽神飲酒繫百餘人蓋河北人情不悦本司遣官籠取遺利恐因揺動逺近後官亦難責以辦事其張白推行鹽法最為得力所坐緣公情無大惡如當劾罪乞不追證左免致竈户例遭禁繫使煎鹽之事虧損嵗課詔特免問御史中丞黄履言聞將作監丞宋彭年五月中申監準蒲左丞吏押白頭子五道追專副人吏作匠有妨本塲工作將作監至六月方牒大理寺大理寺並不追究唯坐吏許經臣罪臣聞法行自貴者始蒲宗孟叨位政府不能悉心竭力以務報稱而自䝉大任以來退食家庭荒躭酒色翌日朝退昏倦熟寐起簽書文字不復詳究聞執政聚㕔宗孟常未至今又恃勢違法役使兵吏曠弛驕恣至於如此將作監既聞日役百餘人當即施行乃至七日而後下大理寺既知宗孟違法當盡公根究乃書吏史以輕罪且以緣故出之皆畏避權勢慢上曲法者也詔御史臺鞫實以聞履又言宗孟事乃臣所彈奏乞特命官司推治詔大理少卿韓晉卿御史楊畏就臺劾罪以聞詔廣東阜民監嵗鑄錢除本錢外並屬内蔵庫額舊無專官主領多為轉運司侵用及不以時催驅過嶺致煩朝廷專差官運致宜自今專𨽻提舉司督趣輸納令轉運司毋得干預乙未熈河蘭㑹制置司上左侍禁楊吉等募蕃兵過河討西賊功狀詔楊吉遷供備庫副使兼閤門通事舍人郭勝王師道為閤門祗候吹凌宻為三班差使策木多格為下班殿侍馬凌於所當遷五資上與諸子承襲其餘所俘獲功依例支賜阿錫達等七人於所當轉職名上亦與諸子承襲所有賻贈馬凌三百匹阿錫達百匹都虞候至蕃敢勇各五十匹不獲首級蕃軍使依條承襲王文郁賜敕奬諭賜江淮等路發運副使蔣之竒紫章服運司司嵗漕糓六百二十萬石之竒領漕事以五月至京師於是入覲上勞問備至面賜之且曰朕不復除官漕事一以委卿之竒辭謝因條畫利病三十餘事多見納用李豸云蘇迨言蔣頴叔之為江淮發運也其才智有餘人莫能欺漕運絡繹蔣吴人諳知風水嘗於所居公宇前立一旗曰占風旗使人日候之置籍焉令諸綱日程亦各記風之便逆蓋雷雹霧露等有或不均風則天下皆有運至取其程歴以合之責其稽緩者綱吏畏服蔣之竒去占風旗今廢矣賜開封府提㸃司度僧牒五百市陽武等埽物料樞密院言知熈州趙濟言捕獲逃軍元徳詐稱使臣郭誗傳李憲令開熈州城門已付所司案熈州極邊而濟止凴元徳詐稱李憲所遣即開門聽出何以伺察姦細詔濟自今凡事審實毋得輕易仍遍下所轄州軍城寨官吏亦依此指揮其元徳令制置使劾罪斬訖以聞濟尋具案奏詔元徳慮有隠伏交通外界姦細迹狀可更切劾治如無他情即處斬又詔濟不能辨察又不能審問實為昏謬可免重黜止罰銅四十斤丙申武寧軍節度使守司徒開府儀同三司致仕韓國公富弼卒舊紀書弼卒新紀書薨先是弼上疏論治亂之要曰臣聞自古致天下治與亂者大綱不出䛕佞讜直之人二端而已䛕佞者進則人主不聞有過惟惡是為所以致亂也讜直者進則人主日有開益惟善是從所以致治也此乃人主致治亂之大畧焉臣自離朝廷退居林下時亦仰知朝政所為大率諛佞者競進讜直者多處于外雖有在朝者蓋恐觸忤姦佞亦皆結舌不敢有所開陳又聞近日中外或有事緒上撓聖懐而忠義之士但仰屋竊嘆不見有聞於上致陛下不得知而更張之此實非朝廷之福也惟願陛下開忠正之路杜羣枉之門講求善政變禍為福俾天下受賜坐致太平此老臣有望於陛下其間事目甚多亦不敢妄有條列但舉其大要惟聖君留神而擇焉不爾即恐浸漬漸深禍亂將至則于時益煩宵旰之憂而亦無所濟矣老臣犬馬區區之志略陳其端伏望聖慈無少忽而深思之力行之乃天下之幸宗社之福也又言臣竊觀大凡臣僚上封論事其間甚有事沽激取虚名者亦有希利禄求實欲者臣今年整八十可謂老矣近日尤覺衰苶舉動須人扶策家居坐卧日與死廹况已致政十有餘年固非事沽激希利禄之時也惟是憂國愛君之心愈深愈切所以不量僭越特有此奏聞惟陛下少加省察思而行之疏奏上語輔臣曰富弼有疏來章惇曰弼言何事上曰言朕左右多小人惇曰盍令分析孰為小人上曰弼三朝老臣豈可令分析王安禮進曰弼之言是也罷朝惇責安禮曰右丞對上之言失矣安禮曰吾儕今日曰誠如聖諭眀日曰聖學非臣所及安得不謂之小人惇無以對此據邵伯温見聞録增入蔡確新傳所稱弼上言確小人不宜在陛下左右或即此䟽已具注五年四月癸酉弼既上疏又條陳時政之失以待上問封押付其子紹庭及卒司馬光范純仁來弔哭紹庭以告曰此殆遺表也光純仁曰當即具奏勿復啟莫知其所言後乃得其藁曰臣聞義不避難忠不忘君凡曰士夫皆宜志此况臣歴事三聖位為上公自當矢心本朝同國休戚不敢以進退之間為憂責不加便自同於衆人循嘿茍安而已今雖老病疲憊待盡朝夕家事世慮不復縈心惟是憂國愛君愈深愈切蓋是慮有所及耳有所聞恐懼憂思勞廢寢食又念今日上自輔臣下及庶士畏禍圖利習成弊風忠詞讜論無復上逹致陛下聰眀蔽塞天下禍患已成尚不知驚懼改悔創艾補救日甚一日殆將無及忠義之流痛心寒骨當此之時而臣猶忍惜奄奄餘齡圖子孫深計坐視寧處辜負天地不為陛下盡誠意而陳之則誰為陛下語者儻使誤社稷大計致生靈于塗炭則臣豈惟生則愧心死則含恨而已哉直亦天地之所不容萬世之罪人也惟願陛下察臣老病將死尚何顧求特以不忍上負聖世所以傾瀝血誠哀憐愚𠂻俯垂聽納則天下幸甚伏思朝廷紀綱天下利害豈復一一可道陛下聖眀固當無所不燭而况老臣前日論之亦已詳矣不復以聞惟取方今禍亂之幾而天下所共憂懼事之切者論之伏惟陛下天姿睿眀實邁前聖自當齊徳二帝致治於三代之隆但以即位之初邪臣納説圖治之際聽任失宜謂能拒絶衆人不使異論得行然後聖化可運事功可成此蓋奸人自謀利於茍悦而柄任之臣欲專權自肆以成己志遂誤陛下放斥忠直進用邪佞忠詞杜絶諂譽日聞上心所欲風從響應無復爭辨救止寖成大患竊思去嵗朝廷納邊臣妄議大舉戈甲以討西戎事出倉卒人情洶懼憂在不測卒致師徒潰敗兩路騷然非頼聖眀遽止再舉之師則禍難之至可勝道哉此豈非朝廷大事安危所繫者乎當舉事之初執政大臣洎臺諌侍從之官苟能犯顔極諌期於不為則聖心自回禍難自息矣臣不知是小大之臣有為陛下力爭其不可者乎如聞廟堂之上方且賡歌迭唱夸示威略以諛順聖意則事之及此又何疑焉臣謂西師之失獨陛下必以國家大計為憂他人誰肯預焉西師乃一事也不幸又有甚於此者亦將如是矣一日事出意外可復救耶乃是陛下塗塞耳目否隔上下以取欺玩古之所以速危亡之禍者亦不出乎此耳陛下豈以老臣昏愚無知論之為過甚乎然事理眀甚道塗之人皆知之陛下可不念之而寒心乎以陛下之聖若洗心降意放逐邪佞招延公正使天下昭昭知朝廷飜然改圖無諱陳罪納諫之意則忠謀讜論必凑逹天聽陛下極誠心而用之則萬事之正由此出矣臣以謂今日天下之憂其本出於誠意之不通而諫路之絶也臣特為陛下極陳所懐因先及其致患之由覬以上廣聖心而俯察老臣之論也今將列其事體之大而當今之急者耳願陛下不以臣之愚而遽棄之特加省覽則不勝大幸臣謂朝廷之事莫大於用人夫輔弼之任論議之職皆當極天下之選彼夫貪寵患失柔從順媚者豈可使之事一出於上則下莫任其責小人因得行其姦矣故事成則下得竊其利事不成則君獨當其咎豈上下同心君臣一徳之謂乎此乃朝廷之大體也願陛下察臣之論臣謂天下之大非智力可周惟誠意可通也茍上有至誠惻怛之心則山海遐僻莫不感動况朝廷之士乎今上下情意否塞不通為臣者莫得盡其心百姓愁怨失其所者無由上逹而政令之施行書詔所曉諭不聞歡欣信服之意臣恐非朝廷所以示天下也願陛下推本忠厚之教以至誠通逹上下則聖徳日隆不語而信於四方矣此亦朝廷之大體願陛下察臣之忠臣謂中外貴賤之士所宜用之各有常分宫闈之臣若委之專總兵柄統制方面皆非所宜在外則挾權怙寵凌鑠上下人心不服易以敗事入侍左右寵禄既過則驕恣易生勢位相及者猜奪互至立黨生禍此其情也不可不戒臣聞為國者以義為利不以利為利或聞興利之臣近嵗尤甚虧損國體為上斂怨民間小利皆盡争奪至若為塲以停民貨造舍而蔽舊屋𣙜河舟之載擅路糞之利急於斂取道路嗟怨此非上所以與民之意又聞今日百姓貧敝最甚者以錢聚於公府而輸之不已也故糓米貴價而民有餓殍必恐嵗月寖深民力愈困事至於極則盻盻之民不能保其無患也此衆情所憂願陛下與民共財以通天下之利無使斯民致於窮極也臣觀今日近憂最在西事不惟夏人以前日之怨必思報復兼其緣邊舊地未敢安居况國家興置城寨在其境内既未聞恩詔洗盪還其舊封則異日衝犯邊城深未可保又遼人雖重信好未敢輕絶然懐齒寒之憂又窺舉動之失豈不乗此間隙隂相黨助為我深害乎臣閑居屏處不能審知事實然道路傳聞昨來西師入界及永樂覆没官兵民夫及其齎送之人凍餓而死亡者無慮數十萬臣亦恐帥臣監司州縣之吏未必能以實數聞於朝廷使陛下惻然哀憫而急圖之也今聞邊兵寡弱村落蕭條士無鬪志難復為用久戍未解糧餉不時東兵在行者或歸或留不無悵望但慮再有征發其心易揺而百姓畏恐窮困前日繼有調發已不從命度此事勢可不深慮哉是豈諱過取敗不思捄禍之時乎前日國家罄竭公私之力以事誅討曾不傷西人之一二也彼其得我叛卒收我兵械取我金帛糧食不可貲數彼將以其所獲貽遺隣國借兵求援以為邊患是反足以增强悍也臣未知朝廷所以待之之策萬一賊犯邊境官軍既不足用民兵又不可發則將何以禦之關陜之憂豈有涯涘闗陜震蕩則闗東揺動州郡例無兵備人情易為驚擾則所當慮者又亦深矣此事之無有所恃者天幸而已今以薄忠義寡亷恥之士率無固志積愁怨之民當艱危之㑹而求患難之不成難矣萬一不幸有此臣未知陛下所恃者孰共此憂而在廷之臣孰能濟此患也惟陛下深思而預圖之則庶幾其有及不然則雖有智者難善其後此必他人之所不敢獨陳老臣又復負陛下而不論則誤陛下必矣臣所以焦心疾首傍徨旦暮不敢顧誅戮之罪者也願陛下廓天地之量為生民深計顧邊疆小醜何足校得失勝負毫末哉伏望速囬天意眀下聖詔諭以前日舉兵之因許其改心效順歸其侵土復其爵號擇忠信仁厚之將使鎮撫邊部嚴敕備守以固疆埸申信敵國使明知聖主休兵息民之意則禍患可息矣臣聞陜西州郡連嵗薄稔大兵之後公私虚耗粒食踊貴兵無見糧逃潰之卒與阻飢之民漸成羣黨今年秋種分數不多民間舊食既已空竭夏麥縱使豐熟為日尚遥民心原本缺朝夕不及今流散之民纍纍道路莫可勝數不止陜西空虚一有邊警懼難枝梧况其甚者老弱窮困不能逺去則轉死溝壑丁壯流亡者但亦妄意所之無有定所惟恐來春榖糴益貴萬一夏麥失望則去留之民皆無生理其為憂患固將不淺臣亦未聞朝廷有所處置亦意内外臣僚懐安畏縮不以事實逹于天聽遂使朝廷恬不為意也臣謂前日西師之舉秦晉之民肝腦塗地毒亦甚矣鄉村保聚哭聲相聞亦知朝廷曾降詔敇更不調發民夫旋又再謀興舉復行差雇方聞涇原罷師鄜延又自興築是以人心危疑莫肯保信此尤非今日之便窮困之民日望安息朝廷所當厚加存䘏霑以徳澤而曠日累月未有一語及之使其怨氣充塞謂朝廷無保之之意上下相蒙莫肯為陛下陳其不可老臣所以憂嘆之深也伏望陛下悼前謀之失下哀痛之詔以慰安民心留鄉里者擇循良之吏俾宣道聖意蠲除逋負廣謀賑貸求惠養之實無以空文重失民望其流亡在外者亦委所在存卹計其丁口書其鄉里或資以常平餘粟俟夏二麥將成諭令還業此亦足以寛闗中之粟為兵民之食也庶幾億萬之民復遂生活此在陛下仁聖不難施行老臣之心拳拳所望臣聞陜西之民昨經出塞死亡之餘再團保甲數少過半繼又修治教場將聚之教習州縣奉行急於星火非惟人情惶駭難將驅之戰闘亦以貧窮至甚無食可供因致大段流散以至補以餘丁亦多亡佚計今存者人數不多但恐卒難為用徒使驚擾亡失良農非計之得若不權行寢罷以招徠旋定之則恐出闗之民莫敢復業窮民無歸或生他變此乃今日事機之速者也臣所陳急於濟事若夫要道則在陛下聖心之所存與所用之人君子小人之辨耳願陛下俯察老臣之心審觀天下之勢未知聖意以今日之事為無足慮耶亦以為當深思而救之耶所信用者皆君子耶有小人耶此豈逃聖鑑之眀但無以順從為悦則忠邪判矣伏望陛下詳覽臣奏特留聖念則天下幸甚此䟽稱去年及來春恐是元豐五年冬間所為又稱夏麥則必是六年春間也弼早有公輔之望天下皆稱曰富公名聞四裔遼使每至必問其出處安否臨事而謹謀慮反覆詳悉度不萬全不發當其敢言奮不顧身忠義之性老而彌篤家居一紀斯須未嘗忘朝廷訃聞輟視朝二日發哀於後苑羣臣奉慰贈太尉諡文忠朱本削去墨本不載遺奏今復具載朱本又稱弼與韓琦争立嗣及還政功至死不通奠慰司馬記聞亦有之或者以為不然新本考異不取朱本今亦不取邵伯温見聞録第九巻云富公豈因不預定策而歉魏公引富公辭户書稱韓琦等七人委有功有徳為證丁酉閤門言使相已下至節度使除授有引麻賜告書送事例欲乞特賜比類學士舍人院亦行寢罷從之禮部言泉州民朱信等言慶歴中泉福等州訪求碎石山皇祖兆域今訪求得本朝逺祖乃福州閩縣碎石山人景徳中亦嘗遣使至福州訪碎石山家宅事迹碎石山今旃檀院是也趙真君家見存而此山下有趙氏捨田契書姓名兼有古鐘銘文可為證據乞遣使審實詔祕書省檢元降指揮仍令福建路轉運司取朱信等所陳證據其後祕書省言慶厯中無下福建路訪皇祖山陵指揮福建路轉運司言遣官案視所言謬妄無根詔朱信等罪以赦除之後又詣尚書省自言家有古書可案取視之乃唐中和七年地契後列趙氏族人有名朗者指以為聖祖其妄若此河東路經畧司言西人乞依舊入貢朝廷已降詔本路見招接西人乞眀降指揮詔使人招撫指揮更不施行其自願投順人口可説諭約回若懼殘害勢不能歸即義當安存或界上有人収索宜勿應荅如首領或用事人緣内怨願投附即収留奏聽㫖候將來已降誓詔别聽指揮詔刑部應移鄉人情理輕者十年稍重者二十年遇赦檢舉放令逐便令刑部著為令戊戌廣南東路轉運副使孫迥言準詔遣大理寺丞郭槩赴廣州制勘公事移文取臣權知廣州斷綱首王遵等案臣雖未知制勘院所治之詳然恐事由中出竊料必有虚誕譛臣者況朝廷威眀必不使臣屈於誣罔之口臣欲候將來盡見底裏方敢奏乞窮治交結造語之人以破欺罔朋黨之蔽上批廣州制獄本以迥案發陳繹等事久不結絶繼有臣僚論奏迥阿私有所庇曲即無中出特治事未知迥以何者為中出䜛口誣罔慮迥真有罪惡反託䜛誣以自解免姦人隂慝情狀多端不可不察若以石璘干渉致變亂事實則璘職位卑賤非次未嘗得親左右何敢爾者兼據元發事因未見璘當得罪令迥具析事由中出及交結造語之人以聞已而迥奏以所案陳繹事連及宦官石璘以璘方在入内内侍省謂璘誣奏其事故有是言然上察璘實不與也四月丁未差郭槩庚子王珪等請上仁宗徽號曰體天法道極功全徳神文聖武睿哲明孝英宗曰體乾膺厯隆功盛徳憲文肅武睿神宣孝詔以羣臣所上議請於本廟本室壬寅奉議郎井亮采言諸州奏案乞委本路提㸃刑獄司每旬具已奏未下事目申尚書省付刑部檢察從之詳定編修諸司敇式所言將來大禮乞且仍舊差官專提㸃事務一次上批式令析正之初誠慮及期有司奉行疑惑於事舛錯有害不悦造令之人得以藉口歸咎成法且諳詳始末惟本司官吏最為可委檢察應接宜依所奏止就差本司官提㸃應式令所該一行事務
