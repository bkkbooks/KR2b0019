body:
  text: 續資治通鑑長編卷四百十八宋李燾撰哲宗元祐三年十二月乙亥樞密院言荆湖北路羅家蠻劫掠財物焚燒屋宇申訴多不受理上下隱蔽將來減退兵將糧道恐難通行詳前此唐義問纍奏移廢城寨已畢而蠻情不能上戴寬恩輒敢侵犯不已若不隨宜討殺則必倣效轉難處置欲令唐義問及程節疾速具析申奏及措置之因如諸處蠻尚敢潜伏屯結即選兵將官討捕仍告諭歸明團峒蠻人勿令動搖驚擾從之舊録云棄城以安蠻情而侵犯劫掠不已新録削去宫苑副使胡田知沅州六宅使時定充荆湖北路都監駐泊辰州俟蠻事息日奏裁仍令體度新堡寨蠻情以時巡遏存問首領之人丙子遼國遣使長寧軍節度使耶律迪副使中散大夫守太常少卿充史館修撰鄧中舉來賀興龍節己卯詔宗室在式假興龍節許易金帶上夀庚辰樞密院言歸明人給田舊條如堪耕種田不足給户絶田元祐田令堪耕種田不足給常平田緣常平田止是人户抵當場務折納等田土數目不多詔添入常平田不足給户絶田甲申詔令唐義問程節於渠陽寨協力措置蠻事以狼江貫堡豐山蠻猶犯邊故也三佛齊貢奉人請以金蓮花一十五兩真珠五兩龍腦一十兩依例撒殿從之丙戌以雪寒泥濘免朝參五日給役工假三日詔刋神宗皇帝舉御史詔於御史臺從滕元發之請也左武衛大將軍郭逵卒舊録云神宗經制西羌以王韶為沿邊安撫招納摩正措置有序逵忌之按韶盜用庫錢治甚急韶請它官案覆遂徙逵知渭州遣大理寺丞杜純案治純懷觀望復遣御史蔡確鞫之逵坐誣罔落宣徽南院使知潞州新録辨曰郭逵按王韶事神宗寶録載之甚詳杜純所按蓋其事實蔡確所覆乃觀望爾今曰純懷觀望又曰逵坐誣罔皆失其實合改曰執政嶷純觀望又曰坐逵誣罔庶幾後來有可考云當移此段入逵知潞州日丁亥月當食以隂雪不見戊子詔應援例陳乞子弟宫觀嶽廟差遣再任者不理為資序知永興軍韓績言本路比歲災傷闕食請於法所給米豆更不限數從之庚寅朝奉郎權陜西轉運使杜純辭賜紫章服朝奉大夫廉正臣為司農少卿吏部員外郎宇文昌齡權發遣京西路轉運副使朝請大夫簽書淮康軍節度判官㕔公事陳知晦再任以其父述古老無兼侍也詔開封府軍巡院復置判官一員以罷大理寺治獄也辛卯朝議大夫試中書舍人劉攽為中大夫守中書舍人甲午江寧府司理參軍鄆州州學教授周穜罷歸吏部用右正言劉安世翰林學士蘇軾言也安世言臣伏見周穜上書乞以故相王安石配享神宗皇帝廟廷中外喧傳頗駭羣聼臣聞天聖中錢惟演嘗請以章獻明肅太后莊懿太后並配真宗廟室以希帝意是時御史中丞范諷劾惟演擅議宗廟遂落平章事罷歸本鎮臣竊謂惟演位兼將相言之未為大過而責之如此之重者乃所以嚴宗廟也今穜以疏逺微賤之臣懷姦邪觀望之志陵蔑公議妄論典禮使安石功德茂著實可從享在穜之分猶不當言而况輔政纍年曽無善狀殘民蠧國流弊至今安可侑食清廟傳之萬世如穜狂僣豈宜輕貸伏望陛下以春秋之法誅其始意重行竄殛以明好惡軾言臣先任中書舍人日敕舉學官臣曽舉江寧府右司理參軍周穜䝉朝廷差充鄆州州學教授近者竊聞穜上疏言朝廷當以故相王安石配享神宗皇帝謹按漢律擅議宗廟者棄市自髙后至文景武宣皆行此法以尊宗廟重朝廷防微杜漸蓋有深意本朝自祖宗以來推擇元勳重望始終全德之臣以配食列聖蓋自天子所不敢專必命都省集議其人非天下公議所屬不在此選奏議既上詔云恭依册告宗廟然後敢行其嚴如此豈有既行之後復使疏逺小臣各出私意以議所配若置而不問則宗廟不嚴而朝廷輕矣竊以安石平生所為是非邪正中外具知難逃聖鑒先帝蓋亦知之故置之閒散終不復用今已改青苖等法而廢退安石黨人吕惠卿李定之徒至於學校貢舉亦已罷斥佛老禁止字學大議已定行之數年而先帝配享已定用富弼天下翕然以為至當穜復何人敢建此議意欲以此嘗試朝廷漸進邪說隂倡羣小此孔子所謂行險僥幸居之不疑者也而臣忝備侍從謬於知人至引此人以汙學校若又隱而不言則罔上黨姦其罪愈大謹自劾以待罪伏望聖慈特敕有司議臣妄舉之罪重賜責降以警在位軾又言臣近上言以所舉學官周穜擅議先帝配享欲以嘗試朝廷漸進邪說隂倡羣小乞下有司議臣妄舉之罪重行責降以警在位至今纍日未奉指揮竊以為國之本在於明賞罰辨邪正二者不立亂亡隨之易曰大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也昔郭公善善惡惡而不免於亡者以善善而不能用惡惡而不能去也臣觀二聖嗣位以來斥逐小人如吕惠卿李定蔡確張誠一吳居厚崔台符楊汲王孝先何正臣盧秉蹇周輔王子京陸師閔趙濟中官李憲宋用臣之流或首開邊隙使兵連禍結或漁利𣙜財為國斂怨或倡起大獄以傾陷善良其為姦惡未易悉數而王安石實為之首今其人死亡之外雖已退處閒散而其腹心羽翼布在中外懷其私恩冀其復用為之經營遊說者甚衆皆矯情匿迹有同鬼􅈮其黨甚堅其心甚一而明主不知臣實憂之夫君子之難致如麟鳳色斯舉矣翔而後集况可麾而却之乎小人之易進如蛆蠅腥羶所聚瞬息千萬况可招而來之乎朝廷近日稍寬此等如李憲乞於近地居住王安禮抗拒恩詔蔡確乞放還其第皆即聼許崔台符王孝先之流不旋踵進用楊汲亦漸牽復吕惠卿窺見此意故敢乞居蘇州此等皆民之大賊國之巨蠧得全首領已為至幸豈可與尋常一眚之臣計日纍月洗雪復用哉今既稍寬之後必漸用之如此不已則惠卿蔡確之流必有時而用青苗市易等法必有時而復何以言之將作監丞李士京者邪佞小人衆所嗤鄙而大臣不察稍稍引用以汚寺監猶能建開壕之議為修城之役其䇿既行遂倡言於衆欲次復宋用臣茶磨之法由此觀之惠卿蔡確之流何憂不用青苖市易等法何憂不復哉昔盧把責降既久經涉纍赦德宗欲與一小郡舉朝憂恐而宰相李勉給事中袁髙諫官趙需裴造宇文鉉盧景亮張薦常侍李泌等皆以死爭之勉等非惜一郡也知杞得郡不已必將復用一炬有燎原之憂而濫觴有滔天之禍故也今周穜草芥之微而敢建此議蓋有以啓之矣昔淮南王謀反所憚獨汲黯以為說公孫丞相若發䝉耳今穜蟣蝨小臣而敢為大姦愚弄朝廷若無人然不幸而有淮南王當復誰憚乎臣不敢逺引古人但使執政之中有如富弼韓琦臺諫之中有如包拯吕誨或司馬光尚在此鼠輩敢爾哉昔王安石在仁宗英宗朝矯詐百端妄竊大名咸以為可用惟韓琦獨識其姦終不肯進使琦不去位安石何由得志以此知辨人物之邪正消禍患於未萌真宰相也臣數日以來竊聞執政之議多欲薄臣之責而寬穜之罪若果如此則是使今後近臣輕引小人而惠卿之流有以卜朝廷之輕重事關消長憂及治亂伏望特出宸斷深詔有司議臣與穜之罪不可輕恕縱使朝廷察臣本無邪心止是暗繆亦乞借臣以立法則臣上荷知遇雖云得罪實同被賞若䝉寬貸則是私臣之身而廢天下之法臣之愧恥若撻于市不勝憤悶憂國之心意切言憃伏俟誅譴貼黃稱周穜州縣小吏意在寸進而已今忽猖狂首建大議此必有人居中隂主其事不然者穜豈敢出位犯分以搖天聼乎此臣所以不得不再三論列也政目於十八日載穜罷教授送吏部丙申樞密院言宥州報夏人遣使謝封冊繼以疆埸來議詔趙卨謝封冊使未過界遣使議疆埸事即以禮卻之若過界後牒至即開諭俟謝恩畢徐議丁酉樞密院言歸明土官楊昌盟等乞依胡田所請存留渠陽軍縣依舊名事應舊送縣者令渠陽寨理斷徒已上罪即送沅州詔俟人情安帖户口增衍日保奏渝州江津縣獠人犯小溪寨詔梓䕫路鈐轄司體究作過因依若不因省地人户侵犯無故侵擾即戒約遣回仍理索虜掠人口尚不聼從乃以兵捕殺庚子責授建寧軍莭度副使本州居住吕惠卿徙居宣州此實録所書政目在九月八日今從政目是月詔比較入流四年正月行政目有此當考十一月二十三日詔又閏月十二日太皇太后云云合參照
