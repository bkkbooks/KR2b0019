body:
  text: 續資治通鑑長編卷二百八十宋李燾撰神宗熙寧十年春正月壬子朔以才人朱氏為媫妤秦鳳路轉運司言茶場司歲供熙河糴買近雖折以茶而價高不售今屯聚兵馬用度極廣欲借次年數聼減價變易上批轉運司急於得錢多減茶價則一時售者既衆蕃漢積茶猥多必壞茶利兼妨買馬如不得已可與一限數乃借支茶場司茶為錢十萬緡付之上批安南行營軍前動靜朝廷欲日知之可令權發遣雍州事周沃日具以聞遞角後别用長牌大書樞密院急速文字毋得入鋪庚申知制誥新知荆南章惇知湖州初惇自湖徙荆南仍令親至辰沅州安撫叛蠻受命即倍道疾馳道中墜馬傷足遂自陳開辰沅州事已定乞二浙一郡上批可還惇前任故也熙寧八年十月惇自三司使出知湖州九年十月移知荆南惇本傳云出知湖州荆湖蠻復擾邊移知荆南至則事平以親老再請湖州中書言近許市易司與江南西路轉運司兌洪撫等五州軍鹽和買紬絹及差屬官歐陽成總領以鹽引從便移易與轉運司財賦并場務課額有妨欲令以諸州所支和買鹽數委轉運司相度裁定罷還市易務所差官從之權發遣荆湖南路轉運判官唐義問言北路近年廢荆門軍為長林縣𨽻江陵府此軍控制巴蜀備防百越今以為縣城郭不完屯兵減少不足以控制要會比者奉使訪察之臣惟以興事塞責減放役人樁留役錢為利聞自廢軍以來鹽酒課息每歲虧數過於所存役錢乞復建軍詔荆湖北路監司相度以聞既而不行御史彭汝礪言乞約束刑部毋得以公事疑難為名巡廳商量詔法寺有疑難公案並具刑名并執見不同申中書樞密院方得稟白令御史臺覺察禮院言今以慶歷五年以後祠祭沿革參酌編修成祀儀三本乞一本留中餘付監祭禮司從之賜判太常寺陳襄等銀絹有差賜銀絹自三月十九日移入詔借河北路災傷五分以上户麥種戶一石成都府路鈐轄轉運司言乞修安逺城樓櫓移威逺軍就彼從之當考朱本與墨本並同知成都府馮京乞修永康軍城及移蠶崖關於溪谷口其城逼近大山夏秋多雨土性疏惡易摧乞壘以磚石從之知賔州殿中丞古亘勒停坐聞交趾將為寇避亡出城也癸亥廣南東路轉運司言軍興之際州縣闕官欲令江西十州軍見任京朝官選人大小使臣各依合入資序指射本路員闕上銓院奏差從之侍御史周尹言臣纍曽奏李稷為事乖謬不可處之監司乞停稷職事及治其父死不葬之罪廢棄終身至今未蒙指揮施行近訪聞河北西路提刑司體量到稷指實事理與臣所言並同却奉聖旨劄與李稷知臣初得其説固不以為信蓋朝廷往時嘗有兩禁臣僚素抱才業纍歷清近時名朝望人主所知偶為言者舉劾暴其罪狀而傳聞未審曖昧不明虛實為疑情或可恕即有聖旨劄令本官知而稷擢自冗僚地輕資淺非在兩禁清近也所至官守曾無廉譽非負時名朝望也本道按刑已究見實狀非傳聞不審也二十餘年不葬父惡逆最著非曖昧不明也今中外傳報已有上項指揮稷何人斯乃獲幸免夫監司之職表帥一方郡縣觀其政而輕重朝廷信其言而賞罰官吏其任之也既殊他職其責之也宜異衆人若受委非才罪愆已著尚加函貸實虧公論臣職忝風憲以澄清為先如稷所為尤宜彈治朝廷或謂稷小官不足數小事不足問即異時臣僚間有所任官資比稷為稍重所犯罪惡校稷為可疑則言事之臣慮朝廷復不聽察孰敢冒怨仇而論之者乎伏望檢會臣前後劄子并奏狀特賜指揮將稷早行責降使臣私心無愧獲安職分中書時政記正月十二日事甲子皇第七子生遣岐王皓告于太廟價雄州言北界巡馬過河以來敵情難測忽有奔衝則知縣縣尉弓手不多勢力難敵自今遇有巡馬許呼集應接人馬授甲於駐泊都監聽排敵於西北門裏以備非常從之詔已差官修築河北破缺塘隄收匱水勢其信安軍等處因塘水減涸退出田土已召人耕佃者並令起遣仍差河北東路提點刑獄韓正彥同屯田都監謝禹圭檢括畫圖以聞詔安南行營諸軍病死及戰殁之家所借衣賜料錢並與除放衣賜毋過一季料錢毋過一月弓箭手民兵義勇等貸借官物於合展限外更展一年詔諸寺監丞並堂選更不舉官詔權發遣京東東路轉運判官太子中舍李察展磨勘四年權京西南路提點刑獄殿中丞張復禮知魚臺縣李衆各展二年麻城縣主簿任祐之前臨潁縣尉孟厚各衝替坐檢計保明開鄧艾口新河不當也戊辰仙韶院火撤屋二百五十楹上不御朝己巳白虹貫日詔以內藏庫絹十五萬匹銀五萬兩賜熙河路經略司以偹軍賞瓊管軍員趙秀為三班差使兵士周元等十四人各轉三資賜絹有差以廣南西路經略司言秀等為交趾所獲秀率元等竊兵仗由海道投廉州又為黎洞所執至是來歸故賞之去年十月六日當併入庚午提點開封府界諸縣鎮公事太常丞直集賢院蔡確為侍御史知雜事詔羣牧都監自今與副使互置近已除張誠一副使宋有志宜罷其闕更不差人詔祁定州民欠市易水利淤田司結糴糧可止依常平法出息二分納錢仍仰逐司見計置河北三處封樁糧草自今止乘賤以錢收買壬申宰臣吳充以提舉詳定刪修軍馬司編敇成賜銀絹各三百刪修官改差遣減磨勘年有差八年二月三日初修癸酉詔諸路村不及五户别村遙逺者許通附保戶甲戌六宅副使宋用臣遷內藏庫副使依舊寄資入內供奉官李直清殿頭馮永清王獻章各減磨勘七年入內供奉官任端減五年餘賜銀絹以修內城畢也乙亥詔發法寺自今公案半年一次赴中書門下勒宿斷絶仍比較功過依三等支賜丙子知河中府兵部員外郎直史館陸經為集賢殿修撰再任以上批河中府有王孝先創置官莊及淤田私鹽等事須藉長吏協力應副聞經在彼盡力可優奬令再任故也詔成都府路轉運使俞充升一任轉運判官假介各減磨勘二年以知成都府馮京言茂州蕃賊叛充等應副辦集也尋召充權判都水監判都水監在三月二十三日詔近降指揮河北河東廢監賣牛馬并租課牧地錢等今於太原大名府送納除去府三百里內者可依前指揮外在三百里外者即於所屬州軍寄官令羣牧司召人入便於本司封樁屯田郎中勾當步軍糧料院趙令鑠言父世雄於祖宗為元孫乞同父母賃宅外居詔許令鑠入宫省覲戊寅詔前光祿寺丞知秀州華亭縣張若濟貸死杖脊刺面配沙門島權兩浙轉運副使度支郎中王廷老管勾文字大理寺丞郭附追兩官勒停提點刑獄司封員外郎朝端彥職方員外郎潘良器追兩官發運司勾當公事祕書丞胡志忠追一官並免勒停依前敕衝替前知華亭縣大理寺丞上官汲太子中允邵竒贊善大夫吕溫卿並衝替都官員外郎分司南京施邈責授舒州團練副使試將作監主簿鄭膺柳州編管先是蹇周輔李竦同鞫若濟獄溫卿等皆就劾於是獄具若濟坐枉法贓而汲竒所言有不實者溫卿以田契屬若濟質華亭庫戶錢五百千貸舊任嘉興弓手錢四百千申轉運司不候年滿勒民贖田邈倚轉運使張靚勢託在任官買物違法及沽酒入禁地志忠嘗預廷老等大教妓樂宴會案問欲舉膺詭名射民田為僧文捷法英求住杭州上下天竺院廷老靚以膺吕惠卿之舅干請必從又以附惠卿之妹夫差權知崑山縣三日攙奪已差權官職田米四百餘石詔特斷之仍追附所得米入官靚以他事别劾獄未上也要考靚後如何斷膺挾惠卿勢橫兩浙人皆呼鄭六舅或言周輔初按得吕氏姦利事推治甚急會鄧綰敗吕氏家人饋藥名藥曰綰出湯因以告周輔周輔得之遂不肯為王氏盡力抹殺吕氏事而上其獄云十朝綱要云正月戊寅張若濟獄具若濟坐受民吳湘銀九百兩等罪杖脊流海島本路轉運副使王廷老提點刑獄朝端彥等坐纍降黜有差獄初起事連參知政事吕惠卿御史中丞鄧綰發其狀上一再遣使往秀州究實至是惠卿弟溫卿亦坐罪載惠卿家傳云云已附注八年九月二十六日時政記此獄并鄧綰蔡承禧鄧潤甫等章及惠卿訴狀甚詳今但從實録曽布元符元年日録八月二十七日癸酉上諭布安惇言吕升卿發上官汲事有所挾己令移京西推勘布亦以為當然上因問秀獄事及言蹇周輔為獄官觀望不決及鄧綰貶吕溫卿在獄家人以綰出湯與之周輔等遂平反惠卿獲免而溫卿猶勒停若非綰及安石出惠卿必不免上曰自來刑獄只如此又問鄧綰論事薦人事悉以實對權御史中丞鄧潤甫言應不以赦降去官原減乞令重修編敇所及司農寺擇可刪除者先詳定從之又言朝廷向者簡求人才俾之守郡故有自通判資序而超遷者亦有例入知州而以病眊疲軟罷之者雖怨叢政府而州郡往往得人夫取怨於一二人而千里之民蒙其惠利亦溥矣聞近欲矯其弊將案審官格與之如此則病眊疲軟且將復用雖足以得一二人之心而千里之民有被其患者儻以超升通判為僥幸則裁損之可也至於郡守乞依向時考觀選擇以便元元不報己卯遣侍御史周尹乘驛齎御香往嘉州峨眉山白水寺以上批兩川豐稔尹常言有母在成都可因奉使令迎侍故也尹言乞下廣南西路宣撫司根究交趾略去人從之宣撫司言廣源州初為州須兵防托乞依熙河沅州例配罪人為牢城詔出自淮以南州軍配罪人並配廣源州郭逵等言乞就差廣南西路提點刑獄提舉興置廣源州等處金銀坑冶從之庚辰詔開封府判官吳幾復劾東頭供奉官王永年以永年詣宰相訟宗室叔皮等易衣私出求卜宰臣王圭言永年嘗言宗室與臣是親蓋臣妻父鄭戩兄載女嫁楊億之子紘紘子戫非鄭氏所出戫有女嫁宗室叔兼故永年言與臣親今永年所論言涉不順乞下有司推究有無與臣相涉事免惑衆聞從之永年妻叔皮女弟永年自江南罷官押錢綱赴京師盜用數千緡冀妻家為償之叔皮不為償三司督錢甚急永年知叔皮嘗於上元夜微服遊閭里乃夜扣東府告變云叔皮兄弟私訪卜者謂已有天命謀作亂密造乘輿服御物已具故命幾復鞫之幾復按驗皆無狀永年既服罪會病死獄中侍御史周尹言近制太廟太祠並差宗室使相以上攝太尉行事所以重宗廟尊祖考親皇族訓子孫也去冬臘享及期中書方欲出敇有宗室遽在告既别差官翊日即奉朝請亦有受誓戒後復辭疾者竊惟宗室親賢蒙九聖積纍之烈已極尊崇顯寵矣所宜春秋致力以舉典禮今乃以一日奉祠為憚則是悖德棄本莫甚於此豈非博士不喻以禮有司不示以法之過歟臣謂宜申約束自今宗室使相合赴太廟行事者毋得臨時以疾茍免委宗正司舉劾如謂宗室使相以上員數不多祠事頻數即差節度使以上通攝從之詔淮南等路近團置將兵若委州府必不能整辦可選武臣二員令往點閲招增簡補其約束令承旨司檢會取旨於是差西上閣門副使張山甫莊宅副使高遵一給事中程師孟罷判將作監歸班以奉使至涿州南高排坐次不當遣人計會改正不從因託疾不赴北亭餞送涿州移牒言其不循故事也初詔特罰銅十斤放翌日乃有此命前此遼主及其母俱賀生辰故遣使者兩畨至遼地相與坐則接伴者南鄉西上左畨南鄉東上涿州官西鄉右畨東鄉及遼母卒師孟始至涿州遼為坐圖接伴使副俱南鄉涿州官西鄉而本朝使副東鄉師孟曰如此則中國之使卑矣自日異至暮爭未決從者失色而師孟詞氣益厲叱儐者易之乃更以接伴者西鄉本朝使副東鄉而涿州官南鄉明日涿人餞于郊疾馳過之不顧涿人以師孟不與餞禮移文雄州故責之此據師孟本傳所云改坐次與實録不同當考密院時政記載師孟不赴北亭餞送事尤詳然亦不足載辛巳詔天章閣待制楚建中罰銅三十斤坐前知慶州賑濟飢民給散錢糧不當去官特斷也先是范純仁代建中知慶州擅發常平封樁粟麥收恤流亡多所全活會蓬生蔽野結實如粟公私取給焉復為營求耕稼之具歲以大穰或言純仁稟貸過多遣使按視民聞之爭先輸官比使者至則已無負邠寧間有叢塜使者發塜數骸劾純仁全活不實之罪詔窮治乃建中所封也朝廷即欲移罪建中純仁連奏建中循守法度方申請措置而民已多餓死及臣因其措置偶免流亡非臣才術能然也况建中頃坐無狀罷去朝廷既責之今緣按臣罪而又及建中是一罪再刑也建中竟不免罰銅千牛衛將軍不欺免死及除名奪一官勒停不欺十六歲父士會為宗正司追證士熭詬罵事不欺例當勒住朝參以父病乞就家取問乃懷表闌入垂拱殿唐突自陳法當不欺死罪上憫其情薄責之二月壬午朔詔河北京東提點刑獄司體量賊盜多處州軍長吏如罷軟不職及措置乖方并捕盜官不足任者選官對替訖奏侍御史周尹言昨彈奏李稷為河北轉運判官任情不公及不葬父事乞早責降詔李稷改軍器監丞九年十月五日尹初言今年五月十二日又言羣牧司言去年給安南行營及支兩省宗室諸班直諸軍諸司馬總三千餘匹未支者尚二千餘匹在平日已不足乞裁損宗室已下所給馬數諸司停給從之紹聖三年七月六日張赴等云云可考甲申崇信軍節度使知宗正事宗旦為右僕射同平章事淮康軍留後宗誼為昭化軍節度使彰武留後承選為保大軍節度使兵部郎中直史館提舉醴泉觀陳汝羲為集賢殿修撰知福州汝羲以足疾免許之工部郎中直龍圖閣判將作監謝景溫為鹽鐵副使景溫辭以知滄州工部郎中直龍圖閣李復圭代之詔京東災傷州縣巡檢縣尉不依常制選材武人詔中外禁軍已有定額三司及諸路計置請受歲有常數其間偶有闕額未招揀人充填者其請受並令封樁毋得移用於次年春季具數申樞密院乙酉詔方春民間乏食穀價稍長權停增價折納欠負以俟豐稔又詔軍頭司無引見公事毋得入殿門見勾當官非都知押班閣門使副有合奏事即具榜子以聞詔秦鳳涇原路經略安撫司闕來年春衣錢許於封樁錢內借支却於永興軍路鑄錢監鑄到錢內撥還丙戌知荆南章惇言伏見詔劾荆南澧州應副廣西糧草違法官吏開所買草不致虧百姓今已詔貼給其直又劾官司恐自今緩急軍期豪猾之家不肯中賣以待厚價官吏畏避各求茍免則難辦事詔釋之詔鄜延路經略司如西界修小堡寨更不牒問若違誓詔修建城池當牒問即奏候朝旨自今諸路移牒宥州除常程事外凖此詔蠲鄆州助教李君升所負錢千八百緡以君升嘗乞置密州板橋鎮市易司出息二十餘萬緡乞蠲舊逋為賞故也丁亥駕部員外郎熙河路相度官莊霍翔乞先次熙州城下營田出租地百一十頃置官莊差見任京官選人使臣勾當弓箭手共治從之仍以翔提點秦鳳路刑獄兼提舉官莊本志云凡言實邊者營田本趙卨官莊本霍翔元豐元年七月一日翔升任詔京東西路權發遣轉運判官公事李察特展一任滿日落發遣察前任嘗被責審官院以格當升故有此旨戊子以充容邢氏為婉儀熙河路經略司奏洮東安撫司言果莊結連南北諸羌入冦岷州城寨占據鐵城誘脅青唐等族日夕搖動已有附賊者崇儀副使知岷州种諤與東頭供奉官走馬承受康識計議十一月辛巳帥兵赴和爾川寨翌日至鐵城遇賊斬首八百八十二級及殺總噶爾首領等本司勘會果莊引總噶爾之兵驅脅熟羌深入冦邊賴包順馬忠密請出兵諤識能用其言將佐協力迎擊取勝詔諤遷引進副使識改一官與閣門祗候皇城使包順馬忠並遷遙郡刺史順康州忠逹州各與兩子恩崇儀副使趙紹忠為內藏庫副使趙醇忠為六宅副使文思副使魏慶為左藏庫副使西京左藏庫副使包誠為供備庫使餘遷官減年有差識河南人也詔選人磨勘改京朝官初任須入知縣雖不拘常制不得舉辟又詔河北京東轉運司強盜罪至死該案問減等者未得斷具析以聞候盜賊稀少日取旨以強盜多因案問減死配他郡逃還鄉里讎害告捕之人人不敢告捕而盜賊益多故也詔客省使英州刺史逹州團練使王君萬落客省使為引進使領英州刺史依舊熙河路副總管岷州團練使捧日天武四廂都指揮使知熙州高遵裕落捧日天武四廂都指揮使知潁州祠部員外郎集賢校理知河州鮮于師中落集賢校理監閬州商稅權發遣秦鳳路轉運副使屯田郎中張穆之太子中舍通判岷州黃察各追兩官勒停餘官充替坐違法結糴及回易公用也九年四月三日蔡確乘傳劾獄己丑校書郎張采為殿中丞賞捕盜功也成都府利州路安撫司言茂州緣邊接近蕃界自來人戶蓄藏兵器有禁昨蕃賊叛無以扞禦乞稍捐此禁詔綿漢卭蜀彭州及永康軍接近蕃界户除禁兵器及甲弩外計置其餘兵器仍經官注籍非緝捕賊盜毋得持入禁地河東經略轉運提舉司上義勇保甲赴巡檢縣尉以近便畨次上畨法從之辛卯詔以監修在京諸倉畢功提舉官司封員外郎劉昭逺司勳員外郎沈希顔各減二年磨勘侍禁張永德等酬賞有差是日辛卯十日日中有黑子如李至乙巳散乙巳二十四日此據實録並舊紀至乙巳散新紀削去癸巳翰林侍讀學士兼寶文閣學士提舉崇福宫吕公著知河陽公著再任崇福及是乃起為州録前大名府臨清館陶縣巡檢殿直關懷寶二子並為三班差使賜名守忠繼忠仍加賻恤以懷寶與賊王成鬬死故也詔以光州固始縣戶絶田賜國子監贍生員太學西門修築射圃聼諸生遇假日習射並從管勾國子監黃履請也甲午詔春候已深無甚寒凍高麗使非久起離令都水監趣五七日開汴口詔宗室使相雖及十年更不取旨磨勘先是宗諤自請磨勘中書檢宗室著令凡有所乞並申大宗正詳條例以聞宗諤當罰俸詔釋罪而有是命是月宗室諸衛大將軍以上磨勘遷官者一百二十五人遷官數自月末移入選舉志云是歲今從實録詔秦鳳熙河路計議措置邊事李憲畫定岷州界至乙未奉禮郎吕和卿為軍器監丞仍詔丞主簿自今於所置員數互換選人南劒州沙縣尉許公孫為奉禮郎賞捕盜功也權御史中丞鄧潤甫言嘗有興利之臣議前代帝王陵寢許民請射耕墾而司農可之緣此唐之諸陵悉見芟刈聞昭陵木已剪伐無遺熙寧令前代帝王陵寢並禁樵採遇郊祀則敇吏致祭其德意可謂逺矣小人掊克不顧大體使其所得不資猶不可為况其所獲至淺鮮者哉乞下所屬依舊禁止樵採耕墾并絀責創議之人詔唐諸陵除立定依條禁止頃畝外其餘民已請射地許依舊耕佃為守陵戶餘並禁止二十八日熊本吕嘉問等並坐展磨勘年御史彭汝礪言竊聞京東河北盜賊不禁至白晝殺人於市攻略鎮邑執縳官吏流聞四方非所以為朝廷重也比聞巡檢縣尉許不依常制舉差然巡檢縣尉職在追胥指縱則有待焉臣觀漢京兆多盜起王尊於久廢渤海驚擾用龔遂於垂老使諸郡得人如尊遂則亦不至此矣其盜發州郡乞選擢仁明智略之吏更領州事稍寬繩檢使隨宜處置且令明以德音撫諭厚設購賞使其徒自相首告捕殺則其黨易潰矣又言自北來者纍有詣臣言河北歲比不登民散徙者衆去秋旱涉冬少雨雪春夏之交民必乏食夫民無食而有司不加恤焉是棄而為冦資也惟河北土地堅徑風俗喜亂善盜什伍千百不待號召今其萌芽已不可斬絶矣禍固有藏於隱微而發於人之所忽此不可不戒也乞體量矜恤稍寬諸科率欠負以安下戶使柔良懷恩而無離叛之心則姦凶寡耦而有衰止之勢矣詔蕃巡檢殿直閣門祗候劉永年落閣門祗候坐不覺劉勃怡與夏國作姦細也丁酉詔諸州歲以十月差官檢視內外老病貧乏不能自存者注籍人日給米豆共一升小兒半之三日一給自十一月朔始止明年三月晦詔差近上內臣一員管勾同文館遇高麗入貢依都亭西驛例排辦從館伴高麗使謝景溫等請也政和元年四月十日可考己亥樞密副使禮部侍郎王韶為户部侍郎觀文殿學士知洪州韶時以母老丐外因抗疏言臣前日面論決里廣源州之事以為大臣圖國事不當貪虛名而忘實禍捨逺業而先小數執政乃疑臣有所譏刺此臣之私意所以鬱而未伸也方安南舉事之初臣力爭極論欲寬民力而省財用者多矣但執政莫肯聽用每聞臣言則必以熙河事折臣然本欲不費於朝廷而可以至伊烏魯幹初不欲遽令熙河作路河岷作州廣費以自纍也臣昨屢與王安石爭熙河劾獄今重以決里事與執政異論臣若不自求退他日必致不容又言李憲欲聚兵六萬人為攻討計臣以為用衆不如用寡兵多則與糧競兵少則與敵競願悔安南之舉懲艾於河西韶鑿空開邊以軍功至執政乃専以勤兵費財歸曲於朝廷上不悅故出之魏泰東軒雜録云熙寧十年京師旱上焦勞甚樞密副使王韶言昔桑𢎞羊為漢武帝籠天下之利是時卜式乞烹𢎞羊以致雨今市易務衰剝民利十倍𢎞羊而比來官吏失於奉行者多至黜免今之大旱皆由吕嘉問作法害人以致和氣不至臣乞烹嘉問以謝天下宜甘澤之可致也此事當考京師旱乃七年事韶言烹吕嘉問乃雨當考環慶路經略司言已差鈐轄种古赴肅逺寨從便宜處置作過蕃官英博等詔厚購賞捕為首之人脅從蕃部並釋之經略司仍厚加招撫樞密院言安南病死士卒其弟姪子孫尚幼者給公據出營俟十五歲以上有司驗公據合給廩食從之壬寅侍御史周尹言荆湖南路轉運副使朱初平與判官趙楊帥兵即楊光僣所居築城寨蠻人拒不聽殺傷官軍圍初平等凡三數日乃得還取輕外夷乞先罷初平監司委官體量虛妄生事重行絀降詔候入內供奉官張懷德使還取旨既而初平奏因出巡撫宿楊晟照家蠻數百驚疑擁道乞赦罪尋已權宜安存還武陽寨訖詔鄜延路蕃漢弓箭手及募兵自安南回者並許引見推恩詔廣源知州通判簽書判官鈐轄都監監押並遷一官候及一年更遷一官任滿升一任幕職官録事參軍判司簿尉知縣候任滿各推恩户曹兼理法以正攝官文學長史等充任滿與令録優其請給更與驛券以收復廣源機榔置郡縣人憚行故也詔永興秦鳳等路轉運使副判官並兼提舉銀銅坑冶鑄錢提點刑獄司更不兼領環慶路經略司奉凖朝旨分析已牒鄜延路經略司指揮保安軍移牒宥州問創修城寨因依本司近為探得西界欲於嘉木永宗廣聚材木修置城寨緣去本路邊界咫尺慮彼處愚幼不知誓詔明文久逺别致邊患遂不暇奏取朝旨分析是實奉旨范純仁特放罪此據密院時政記十一日事今增入甲辰侍御史知雜事蔡確言京東河北盜賊結集久未殄熄乞自朝廷選官分往逐路點檢捕盜次第從之仍委提舉官點檢前原州臨涇縣令張維除名送康州編管翰林醫學趙渙勒停西上閣門使知鎮戎軍張守約等九人並奪一官以維受趙渙等賂賖貸官錢帛與人及守約等請求維賖借違法已更赦特有是命九年四月蔡確乘傳劾獄詔河東轉運司本路堡寨并巡檢要切去處闕官許選擇有心力材武使臣權管勾乙巳詔自今虔州知州更不帶安撫鈐轄依舊令洪州知州兼領丙午宰臣吳充等上表賀安南平曲赦廣南西路諸州軍官吏起發及部押般運官物丁夫稽程有所規避誤師期者具案奏裁餘罪咸赦除之安南道經略招討都總管荆湖南路宣撫司並罷行營軍馬除量留防守外盡放歸本路經賊坊郭鄉村戶及避賊失業者并被殺土丁之家去年已放稅者更放今年并二稅役錢已免兩料者更免兩料應經賊殺戮之家見存丁口孤貧不能自存者所在州軍日給口食米十五歲以上一升半以下一升五歲以下半升至二十歲止應募弓箭手民兵義勇土丁效用軍前者今日以前諸欠負並除放以廣源州為順州舊記書丙午郭逵敗交趾於富良江屯兵逗遛不進李乾德奉表降復廣源州赦湖南路囚罪一等徒以下釋之民應征役者優恤之新紀書以復廣源蘇茂等州羣臣表賀赦廣西囚罪一等徒以下原之賜行營諸軍錢民沒征役者恤其家以廣源州為順州赦乾德罪許修貢如故當從新也河南程氏遺書蘇昞云正叔論安南事當初邊上不使令逐近點集應急救援其時雖將帥革兵冒涉炎瘴朝廷以赤子為憂亦有所不恤也其時不救應放令縱恣戰殺至數萬今既後時又不候至秋涼迄冬一直趨冦亦可以前食嶺北食積於嶺南般運今乃正於七月過嶺以瘴死者自數分及過境又糧不繼深至賊巢以筏度五百人過江且斫且焚破其竹寨幾重不能得復棹其空筏續以救兵反為賊兵會合禽殺吾衆無救或死或逃遂不成功所爭者二十五里耳欲再往又無舟可度無糧以戍此繆算未之有也猶得賊辭差順遂得有詞且承當了若使其言猶未順如何處之運糧者死八萬戰兵瘴死十一萬餘得二萬八千人生還尚多病者又先為賊殺戮數萬都不下三十萬口其昏謬無謀如此甚也此假字有錯誤姑附注此當考詳或可增修賜李乾德詔許依舊入貢送還所掠省地人口是役也上批令中書樞密院具行營兵馬數兵四萬九千五百六人馬四千六百九十匹除病死及事故見存二萬三千四百人馬三千一百七十四匹安南道行營馬步軍都總管經略招討使宣徽南院使郭逵判潭州副使天章閣待制趙卨知桂州起居舍人知潭州曾布為集賢院學士知廣州直昭文館知桂州石鑑知雍州詔河北河東路不許以銅及盧甘石博買通入蕃界又詔自今成都府梓利夔州路知州通判不得並差川峽人戊申詔新通判澧州比部郎中張淑與小處簽判官以審官院言淑人品凡陋不材也詔自今省寺等處按劾府界諸縣鎮公事並關牒開封府或提點提舉司施行府界官如省寺等處牒請入京及有公事取稟並先申中書候指揮仍往京不得過十日三司言奉詔同制置解鹽使皮公弼詳議中外所論陜西解鹽鈔法利害去年十一月十一日詔也會要載此詔却無此利害中書時政記載詔并利害畫一特詳今但依實録蓋鹽法之弊由熙河鈔溢額鈔溢額故鈔價賤鈔價賤故糧草貴又東西南三路通商州縣𣙜賣官鹽故商旅不行如此鹽法不得不改官賣不得不罷今欲更張前弊必先收舊鈔點印舊鹽行貼納之法然後自變法日為始盡買舊鈔入官其已請出鹽立限許人自陳凖新價貼納錢印鹽席給公據令條具所施行事東南舊法鹽鈔一席毋過三千五百西鹽鈔一席毋過二千五百盡買入官先令商人以鈔赴解州𣙜鹽院并池場照對批鑿方許中賣已請出鹽立限告賞許商人自陳東南鹽一席貼納錢二千五百西鹽一席貼納三千與換公據立限出賣罷兩處禁𣙜官賣其提舉司出賣鹽並依客人貼納價錢充買舊鈔支用取客人情願對行算請從省司降篆書鹽席木印樣委逐州軍雕造付所差官點檢印記給與新引將京西南北秦鳳河東路在京開封府界應通商地分各舉官一員其全席鹽限十日內經官自陳點印貼納委所差官點數用印號毁抹舊引給與新引其貼納錢許供通抵當如商人願以舊鈔依估定價折會貼納鹽錢者聽從便於隨處送納抹訖封印送制置司若私鹽衰息官鹽自可通行民間請出兩路鹽無慮三十五萬席比候民間變轉約須期年慮緣邊未入新法鹽錢糧草有闕乞權於去年折納欠負穀粟計物價借充軍糧候入到鹽錢依數撥還通商州軍縣鎮歲終委轉運提點司各以管下民户多少同者將繳納商人注賣鹽引多少為凖比較增虧依編敇江淮等路賣鹽酒比較賞罰詔除提舉出賣解鹽司官賣地分别降指揮外及市易司已買鹽亦依客人例貼納價錢餘依所定凡通商州軍在京西者為南鹽在陜西者為西鹽若禁鹽地則為采鹽其詳具天聖八年十月不司馬記聞載皮公弼言官賣鹽無利此稱官賣不得罷當改其事然詔云官賣地分别降指揮則是官賣不全罷也三月十六日指揮當即是别降者記又差誤具注八年閏四月十八日御史劾額外鹽鈔在九年二月六日沈括自志曰先此陜西鹽利亡其大半未有以救其弊括言其為鹽之蠧者其説有四其一民足於鹽歲不過三十五萬囊為錢二百一十餘萬緡而已是時乃出鈔三百五十萬緡鹽有常費而出鈔無藝此鈔之所以輕也實用之外可益二十萬緡以備水火敗失以二百萬緡為歲常無得加焉鈔自無低昻其二池鹽舊分東西路西鹽下東鹽之價囊千錢欲勝塞外之姦鹽卒不可止而徒抑西鹽之價以傾東鹽之利西鹽日流於東路而東鹽益不售守疆之吏不能禁也括請合東西之價為一而省畫疆之吏兵數百其三出鈔委之解鹽司外司常持損益之柄不計三司之有無鈔輕則又出度支錢以斂滯鈔故中都之藏日虛而鹽之出者歲溢括請外司惟謹其出納而制鈔之本歸之三司其四制諸司之鬻鹽者同為一價無得低昻以兼商人之利則歲售有常而蓄鈔可以為弊而滯錢藏於民者出矣法雖已具而鈔之藏於民未有術以斂之於是閉池無出鹽而以時價收宿鈔貸錢八十餘萬緡于少府以斂滯鈔而公私之鈔悉上矣是時鈔為錢二千五百滯鈔既上則為錢六千囊有三千五百之羡藏鈔者過幸於是發五使分籍公私之鹽囊輸錢三千然後得貨民得羡餘價五百而斂鈔之貸不失一錢而鹽利復貫度支歲糴河北邊粟三百萬緡悉為東南鹽鈔而𣙜貨務日入鈔之利萬緡以為常是時才得千餘緡括以其原生於法出於多孔省寺羣有司或借鹽鈔而隂用以易百貨稱貸入息自制高下之價民趨一切之利而度支之鈔益輕諸道轉運司得用田廬券契質鹽人不持一錢摶手以取萬鈞之鹽豈復賴度支之鈔又四方上太府錢募民入資太府執券以受錢于外州以省轉送之費此雖為利而不知民樂應募而鈔鹽不售鹽所以生財利出於海而無窮不售則為朽壤錢雖未入太府而藏於外州其實皆在也獨費將送而已閉便錢之路而專以售鹽為利者不知民食鹽有常而為鈔歲蔓則陜西折估之弊復移於東南是二法欲相權當以售鹽為主而以便錢調其盈虛不可以一術御也三孔既塞而𣙜貨萬緡之入不踰月而復括自志措置解鹽鈔法當即是十年二月二十七日實録所書者但實録全載吏牘括志稍文其言耳三十萬囊即三十五萬席也其四説第三説實録乃於元豐二年二月丙辰載之按括罷三司使具熙寧十年七月初九日括為三司使當即行其説不知何故實録就括罷三司使一年後始載此也故食貨第五卷十年三司言鹽法之弊由熙河鈔溢額價賤而芻糧貴又東西南三路通商郡邑惟賣官鹽故商旅不行今鹽法當改官賣當罷請先收舊鈔印識舊鹽行加納之法官盡買舊鈔其已出鹽約期聽商人自言準新價增之印鹽席給符驗東南舊法鹽鈔席才三千五百西鹽鈔席減一千官盡買先令解州場院驗商人鈔書之乃許賣已請鹽立限告賞聼商人自陳東南鹽席加錢二千五百西鹽席加三千為易舊符立期令賣罷兩處禁𣙜官賣提舉司賣鹽並用新價錢充買舊鈔商人願對行算請者聽官為印識如法應通商地各舉官一員其全席鹽限十日自言乃令加納錢為印識給新引聽以舊鈔當加納錢皆行之而别定官賣鹽地詔市易司已買鹽亦加納錢已上十年二月二十七日三司言澶濮濟單曹懷州南京陽武酸棗封邱考城東明白馬長垣胙城韋城九縣雖使通商而為他鹽侵奪害於商販請復官賣便河陽同華解州河中陜府陳留雍邱襄邑中牟管城尉氏鄢陵扶溝太康咸平新鄭試令通商其入不及官賣者官復自賣從之已上三月十一日又詔商鹽入京悉賣之市易務每席毋減十千民鹽皆買之市易私與商人為市許告沒其鹽已上四月十二日三司言皮公弼鹽法酌前後兩池所支鹽數歲請以二百三十萬緡為額已上四月二十三日又詔京師置七場買東南鈔而市易務言為錢五十九萬三千餘緡三司言闕錢頗還其鈔令賣之於西買者其三給錢其七準緣邊價給新引庶得民間舊鈔而新引易於變易詔用其議已上四月二十四日實録無制置解鹽使皮公弼請復范祥舊法平市價詔假三司錢三十萬緡市鈔於京師已上六月二十九日上嘗謂輔臣曰向以陜西用不足使市鈔京師蓋欲權鹽價飛錢於塞下而出錢五百萬緡不能救其弊也朝廷措置經始所當重謹便國者姑安靜以持之已上元豐二年正月二十六日先是解鹽分東西西鹽賣有分域又並邊州軍市芻糧給鈔過多故鈔及鹽甚賤商旅不行官價自分為二於是三司及制置解鹽司言鹽價東重而西輕請令西鹽得自便稍增價如東鹽以平鈔法歲可增十二萬緡因復不分東西悉廢西鹽約束解池鹽鈔舊以二百二十萬緡為額轉運使皮公弼請增十萬以助邊糴至是又為二百四十二萬三司又言商人已請西鹽宜令加納錢使與新法價平兩議皆行之已上元豐二年二月十七日詔發正兵五千與廣南西路鈐轄司分擘戍守録歸明人儂善美孫惠談為三班借職以善美與子盛明往西農州招呼人戶為賊所殺故也詔司農寺丞及提舉常平倉官並選嘗歷知縣縣令考課優等人景福殿使利州觀察使入內都知張茂則皇城使忠州防禦使入內副都知藍元震皇城使逹州刺史入內副都知蘇利涉並降敇奬諭各賜衣帶以禁中遺火救護之勞也詳定編修諸司敇式所上諸司敇令格式十二卷詔頒行之翰林醫官院五廣聖宫一慶寧宫一大內鑰匙庫一資善堂一後苑東門藥庫一提點軍器等軍一入內內侍省使臣差遣一此據會要增入藝文志同十年正月二十七日事己酉德音降廣南東路荆湖南路死罪囚徒以下釋之應民户被差役科配應副軍興者轉運司具户所運物多少地里逺近及戶所科物數奏當别優恤管押運物赴廣西有少欠損壞見根究賠偹者如非侵盜並除之新紀書赦廣東湖南如廣西路矣舊紀但於丙午書赦湖南舊紀疏給事中知陳州吕惠卿為資政殿學士知延州御史蔡承禧言臣自熙寧八年四月蒞職是時已聞參知政事吕惠卿兄弟布滿朝廷崇立私黨所喜者雖無狀而被薦若曾􅌈李定徐禧之類是也所怒者雖無罪而加黜若馮京劉載時孝孫孫鼇抃之類是也加以阿蔽所親攀援無罪之人以當罪罰惠卿之親方希益有罪而妄引朱溫其遂兩罰金之類是也又頥指章惇等奏舉其弟如此之類言之不能萬一而臣獨嘗憤悶力與明辨蒙陛下赫然罷絀猶以給事中使守藩郡且惠卿自太子中允不四五年至政府不圖報效而所為乃爾又頻為俚言妄瀆天聽然臣之所論以為惠卿之罪不在於強借錢買田而罪在於為大臣強橫紊朝廷法制昨秀州置獄偶爾網漏今寵以殿職付之邊任則後之為惡者何以懲沮又言臣嘗論吕惠卿恣橫不法前疏固已詳矣風聞或以為臣希王安石之旨而彈擊惠卿且臣熙寧八年四月蒙恩充御史五月六月以後即論其兄弟臣固不知惠卿兄弟何時失於安石邪計陛下必嘗知之然臣之與安石議論不同者故自不一若沈起李定沈季長徐禧之類皆陛下知臣之不與安石同也假使臣悅於躁進如惠卿之心臣亦不至於希王安石之旨然臣頃者恃陛下必能知此自不足辨今者伏聞惠卿才滿歲即除資政殿學士知延州乃知陛下前歲之詔而臣前日之疏豈忘之邪臣始疑之而又有言者曰豈鄉者御史之言惠卿強借錢買田事不涉惠卿而遂有此命乎此又可疑也且前歲之責詔與微臣之劄子皆不及於秀州之事何謂以此而除哉且臣之所言惠卿祗以竊弄刑賞崇立私黨不循法理大臣之罪莫重於此故陛下幸聽而顯逐之若秀州之事雖非臣所言然事亦有可以情索者今張若濟得枉法之死罪而昔也何緣以出之乎非惠卿通知外官何敢若此臣略舉此一事足以知其獄之未盡然連歲禁繫證逮為多情實不忍安敢重煩朝廷故臣亦不再言之臣嘗聆玉音嘗恨言事之臣不能如仁宗之時奉承德音悸越震恐夙夕思所稱塞而芻蕘之進惟此一事中外最為歡懌而臣未離憲府惠卿已進職邊任臣恐先朝未嘗有此自斯以往抱義戴忠之臣有為朝廷擊去強臣姦黨觀此或亦有怠而以臣為戒者伏望陛下特回睿圖奮發宸斷罷去惠卿之職任與之間地使善良得安姦惡有懼天下幸甚否則解臣御史之職以避惠卿之進毋使搢紳以臣故輕視風憲之官不聽承禧前章時政記載之三月二十八日實録因之朱本以為無施行刪去今依墨本仍移入惠卿除資政知延州後知延州寶文閣待制李承之檢正中書五房公事八年十二月二十四日知延州蔡承禧論因執政進退觀望改更劄子云前歲李承之差知瀛州八年閏四月十九日而不往陛下嘗恨進人太速既得名位而使之不行臣嘗親聞德音是惡其速進而強項不行濡戀於檢正五房也或者以為王安石之所惡不知誠否名位既得而使之不行此非但安石所惡蓋天下所甚惡也安石聞之而已人皆傳以為安石之非又已差知延安故不必論今聞又差檢正五房此天下之仕者不得不疑而觀望也承禧又論二事姑存此要考承之本末也權發遣戶部副使度支郎中王克臣為集賢殿修撰知鄆州初謀京東帥上令中書速選才堪治劇者一二人以名聞中書言克臣及蹇周輔王居卿可使詔用克臣新舊傳並云元豐初京東多盜拜克臣鄆帥誤也熙寧末京東固多盜矣今從實録並御集皇城使康州團練使知雍州陶弼為西上閣門使知順州初郭逵以重兵壓賊境使弼將精鋭殿後李乾德既納欵逵欲班師恐為賊所襲不先號令而中軍夜起兵夫爭前自相蹂踐賊隔江對壘隂伺之弼命帳下無輒動遲明整隊徐引還逵方築廣源城又使弼往視即奏用弼知順州賊數入冦復據機榔縣揚聲欲攻州城弼率厲將士固守素得人心賊動息皆知之獲覘者因令諭賊以禍福不則來戰賊始懼順州以寧詔知制誥熊本司勳貟外郎吕嘉問大理寺丞高鎛贊善大夫曾孝綽殿中丞石亘著作佐郎杜常張僅各展磨勘一年太常寺丞集賢殿修撰張琥祕書丞莊公嶽各展二年太子中允王輔之前判司農寺張諤候將來敘用當磨勘日展三年選人黃實閻令史邈候轉京官各展一年並坐申請賣廟也右正言寶文閣待制權判西京留司御史臺常秩卒詔秩久以懿行見稱鄉里朝廷特起置之侍從而恬靜自居不替素守宜優賻贈以勵廉隅贈右諫議大夫􅉠絹三百匹秩起處士在朝廷碌碌無所發明聞望日損為時譏笑張師正倦逰録載秩事頗多且云秩雉經而死王得臣麈史嘗辨其不然今亦不取判魏泰束軒録云常秩以處士起為右正言直集賢院國子監不踰年待制寶文閣兼判太常寺中間謁告歸汝隂上特降詔召之兩制降詔自秩始也會放進士徐鐸榜秩密以太學生之薄於行者藉名於册貯懷袖間每唱名有之則揭册指名進呈乞賜黜落如是者三四上方披閲試卷或與執政語往往不省秩言秩大以為沮遂謁告不朝一日翰林學士楊繪方坐禁中俄有報太常寺吏人到院者繪昔常判寺立命至前乃故吏也詢其來之故即云常待制以謁告月餘未有詔起令探刺消息楊曰此是禁中汝得妄入乎我若致汝於吏則連及待制汝速出無取禍先是秩未謁告時敇差謀向經葬事至是經葬百日上親奠祭護葬官例合迎駕秩不俟朝參而出迎駕於經門上祭奠畢登輦而去亦不顧秩秩愈不得意或告以不朝參而出就職又嘗私覘禁中臺官欲有言者秩大恐遂以病還汝隂既而卒或云方卒時狂亂若心疾將自殺者然未得其詳泰所稱狂亂將自殺蓋與張師正所載略同欲追記秩納無行士人姓名當考林希野史載秩本末甚詳已附注四年四月甲戌希又云秩心疾月餘屢索刀刃家人防守之竟自刎死與張師正所記略同須更詳考無行士人蓋曹將美也希所載今附此希云九年三月上御集英放進士諸科館職校書皆入殿侍立此例久廢張芻請之上親閲試卷久之拆卷放徐鐸王任至第三錢遹先賜第五人及第虛第三第四升陳師錫張鎰以充之李格非自第四甲升第一甲末鄧綰二子洵武升第二甲洵仁升第四甲曹將美者嘗斥出學既唱名常秩出白其事降本甲末放進士諸科特奏名考同五經三禮學究監簿文學長史六等濮州張傑者年九十三扶杖而來上特賜絹五十匹武舉人一與殿直次與奉職仍減年其下者與差使並賜紫袍牙笏銀帶乃新例也
