body:
  text: 續資治通鑑長編卷三百三十三宋李燾撰神宗元豐六年二月丁未朔大理寺上兩地供輸人周辛祖順祖六兒私過北界與崔學郎等覘事案犯在赦前詔周辛祖順祖六兒各處斬賜熙河蘭會路經略使苖授對衣金帶銀絹五百同經制通直郎趙濟三百馬申二百餘官吏有差以築通逺軍榆木岔尉斗平蘭州勝如堡等勞也五年年末實録書廢蘭州勝如智固二堡六年二月苖授乃以築勝如堡受賜必有誤當考此年五月戊子追所賜戊申詔三省吏書功過門下委給事中中書舍人尚書左右司依舊中書門下比較詔聞鄜延諸州昨走散兵卒帶官器械私易於民間委轉運司立限首納量支價錢即限滿藏匿依私有禁兵器告賞法己酉詔給度僧牒千修京城水門詔諸將因調發在邊其將副任滿訓練精通保明聞奏可令權駐劄路分具逐將副功過事狀關住營處安撫鈐轄監司勘會未差出以前并軍回駐劄處治狀及案試保明以聞詔燕達王淵取一軍合用人將按試營陳先是上親以古兵法製九軍營陳凡出戰下營互變分合作止進退方圓尖直肄習皆盡其妙至是命達等焉樞密院言昨大軍至靈州城外逺壕三重無平地可下營及賊決黃河放水入壕致限隔軍馬不得地利蘭州去黃河不逺若依此開鑿引河水以為險固縱使旋來填壕亦可出兵隔壕禦捍即不見近城地勢與河水高下可與不可疏導欲令李憲委官與李浩詳度以聞從之後以蘭州地高卒不果行庚戌詔吏部員外郎劉奉世文及甫各罰銅八斤左司郎中吳雍六斤御史臺失察官吏上簿坐住滯差周宥等勾當軍頭司文字會降特責之尚書李清臣仍放罪五年七月庚子差十月甲子劾稽滯十二月丙申取旨及今年二月庚戌乃斷覆按導河司言自王供掃下直馬村道口東過古月隄循永洛渠東北入新鄉鎮西賈跋村合入御河地形比河水低十八尺為四十九里有竒獲嘉縣在所導河之西地形差高可以修完隄防新鄉淇門洹水三鎮地下又居水衝皆當遷就高處衛鎮苑橋居高阜可不須人功成安魏縣之北當先作隄防障水設於邵澤濼下分流以入漳河巨鹿濼則深州受其患團岡在衛州西北地形高阜至關城止四里其高五十尺岡腳比關城下高二十三尺團岡前東西皆有馬棚岡去城尤近地勢下注州城理難固禦兼河港窄隘設東隄又強即須壅遏上流掃岸必危其衛州亦當遷避據公案見檢計築隄二十里有竒前高七尺後高一丈用夫萬六千梢草四百九十九萬七千竹索簽樁十一萬五千用此可作兩掃若水至隄下止實墊亦須纍掃增高所費不資以此推之則將來嵗費可知又況正在水衝勢難沮遏約水而未至岡下已有抹溢之患理須遷徙為便前案視所稱衛州黎陽內黃三處各可固護緣御河狹小不足容大河七分之一將來導河下合御河必披岸兩溢作數里浸流勢須復入舊河刷撲尤甚黎陽縣雖因山為城地形亦下昨熙寧十年衛州河水抹岸已於西御河隄上深五七尺若全河北來即當數倍雖如案視所相度作重隄十六里恐不為功將來水勢必須東西團過乃如洲島嵗費工料不資極力固護終無所益又案視所欲增夫一萬於巧婦渦下預開一河使水勢可著黎陽及同山白祠岡上陽山一帶將來繫橋看詳同山地里曠逺兼所開河道必不能吞伏大河橫費國財民功億度繫橋又不可必遂寢之辛亥吏部侍郎李承之言今議決王供掃導河北行於南岸之患自原武而下悉皆退背亦可稍緩滎澤之急至於雄武廣武正當京城之衝要慮患恐不可緩臣謂宜於理水隄外魏樓減水河之東修大隄際河下接滑州界大隄依向著地分量置河清兵及選官分巡嵗增榆柳其汴南岸亦準此仍於臨汴常積稍樁以備修塞萬一不虞得以固守障其東行可使還河似為經久之利詔都水監詳度以聞其後都水監以力大難成寢之給度僧牒二百付三門白波輦運司雇裝發嵗計并積年未運官物三門白波輦運司言乞權借發運司四百料平底船三百隻運𣙜場鹽貨賞茶等至汜水以本司船運赴河北詔應副𣙜場物至為重事若有虧欠或啓戎心上降朝旨取撥無期可選差使臣於發運司計會限十日差撥既而發運副使蔣之竒言汴綱船嵗額千七百餘艘近凖詔減數止造七百四十八以所減工料價錢封樁本司嵗運軍儲六百二十萬石而止用七百餘艘風水拋失尚憂不足兼已有旨許免朝省别司借發雖有申請許執奏不與之法若更分撥與白波輦運司即本司大計必致妨誤乞免借撥從之大理寺言泰州大保長衛和煎販私鹽為首圍掩縣尉責不敢捕私鹽狀詔斬之提舉教馬軍所子弟趙惟簡等奏臣等係百姓赴所習學近及三年及隨王中正深入西界收復州城乞馬步射各及一石五斗力上情願各加二斗馬步射各一石七斗力步射六箭馬直背射五箭其箭數深淺並乞依本所先拍試體例原降上垜箭數引見呈試御批宜令本所據所欲呈試事藝拍試聞奏此據御集一百三十六卷元豐六年二月五日手劄增入熙寧七年九月十九日十年九月二十三日元豐二年五月十四日三年三月十一日五月十一日六月十八日十一月三日五年十一月十七日六年二月五日壬子詔京西河東涇原秦鳯熙河路團結廂軍盡數差赴蘭州又二十四日詔熙河蘭會經略制置司計置蘭州人萬馬二千糧草於次路州軍剗括官私槖駝二千與經制司令自熙州摺運事力不足即發義勇保甲詔左司郎中吳雍監督趙濟馬申往來催驅般運二十四日李憲言候展定西域日選熙秦兵及劉昌祚所將各萬騎掩擊天都詔遣入內供奉官馮景往諭憲天都去熙河絶逺糧草如何營辦今若嚴守備以逸待勞或可有功令更商度如勢當興舉即具軍行措置應副畫一以聞癸丑鄜延路經略司言蕃部竒烏本韋家族弓箭手十將昨為賊所略今誘致有羊馬投來户二十四口百五十六詔竒烏遷一資詔層檀國奉使人常賜外特賜銀二千兩甲寅詔梓州路提舉司支坊場錢五萬緡付轉運司應副瀘州京西轉運司言嵗計上供外橫支錢共四十九萬緡才蒙給還十二萬乞盡給還詔京西南北路提舉司更於坊場錢給五萬緡丙辰詔熙河蘭會路經略安撫制置使武信軍留後入內副都知李憲降授宣慶使經略安撫都總管殿前都虞候沂州防禦使苖授罰銅三十斤經略安撫副使知蘭州引進使隴州團練使李浩降授四方館使階州刺史坐西賊犯蘭州幾奪西城門乃覺賊遂乘虛破西關也新紀書丙辰以夏人寇蘭州降熙河經略使李憲副使李浩官舊紀不書洛苑使熙河蘭會鈐轄王文郁為西上閣門使知蘭州代李浩西賊之圍蘭州數十萬衆奄至浩閉城拒守文郁請擊之浩曰城中騎兵不滿數百安可戰文郁曰賊衆我寡正當折其鋒以安衆心然後可守此張遼所以全合淝也走馬閻仁武曰奉詔令守不令戰必欲啓關當奏劾文郁曰今披城而出以一當千勢有萬死豈畏劾哉况守則無必固之勢戰則有可乘之機堅請不已浩許之乃募死士百餘夜縋而下持短兵突之賊衆驚潰爭渡河溺死者甚衆收其所虜入城中時以文郁方尉遲敬德云此據文郁舊傳文郁所以代浩雖緣去年十一月丙戌詔旨亦正因有此功也不知新傳削去何故丁巳詔復降授奉議郎提點開封府界諸縣鎮公事楊景略為承議郎以上批景略應副塞原武決河及救護被水民户治遼使驛道勤勞居多故也詔河北保甲司教頭等共五十六人保長五人與借職十七人與差使減磨勘二年二十六人與差使授教指使四人遷一資減磨勘三年三人遷一資減磨勘二年兼差充諸縣新置團教場巡檢指使一人遷一資減磨勘三年時河北保甲肄習成始引見藝皆應格故有是命三月十七日戊午提點廣南西路刑獄彭次雲言雍州外鎮寨水土惡弱乞量留兵更戍其餘盡用洞丁於管下諸州以季月輪差給禁軍錢糧詔許彥先劉何相度後彥先等言若盡以代正兵防守妨其力農經久非便請計戍兵三分以一分用洞丁代之季輪二千人赴雍州肄習武藝從之御史王桓言中丞舒亶論尚書省奏鈔合置録目而本省謂無條令專置以亶所奏為欺妄陛下以其互有辨論遂差陸佃蔡卞取索看詳而録黃聖旨明言舒亶妄論奏案亶任諫官御史五六年朝廷大利害亶安能悉為陛下論列舉無遺事陛下舉一事黜之其誰曰不然今乃因與都省辨論文法遽付本省屬曹劾其欺妄改付佃卞又詔以風旨所嚮則是佃卞徒有看詳之名而事之可否執政先之矣且録目之置不置非繫執政之重輕而得罪於大臣如此臣觀其意豈徒在亶是欲使耳目之官無復議己也不報正月癸巳可并此己未詔吏部員外郎唐淑問自擢任省郎不務悉心營職託疾便私可差監撫州鹽礬酒稅務淑問以疾屢請補外上以為不肯任職故也詔供備庫副使尉氏縣都監馮堯政遷一官減磨勘二年嵗中招兵千二百八十也又詔私鑄錢罪至死者比已貸之然其妻屬尚有編管法其除之自今勿緣坐庚申皇城使榮州團練使帶御器械廣南西路鈐轄同經制宜州溪洞和斌為巡檢使專管勾融柳象等州一路兵甲賊盜正月十四日八月二十四日此可削吏部言前慶州安化縣尉郝宗臣與鹽賊李平鬬捕獲青鹽二十斤當賞格第一嘗犯贓勒停詔宗臣改次等合入官開封府乞自今本府官吏夜救新城裏火如舊門已閉聽關大內鑰匙庫差東華門外當宿內臣降鑰從之大理寺言瀘州文思副使秦世章內殿承制焦勝侍禁孟文宥各坐買乞弟首級與子冒賞檢會别案秦世章為乞弟打誓事追一官勒停押出川界其焦勝當徒一年孟文宥當徒二年秦世章私罪杖並犯在赦前詔焦勝孟文宥各追一官免勒停秦世章展一期敘辛酉詔差燕達張山甫案試府界第四將軍馬及營陳詔河北緣邊安撫司雄州管勾機宜文字官自今許奏舉詔提舉河北河東路保甲緣邊州軍於今不教閲地以南二十里外方得置團教場旁近北人小使所行路並移於五里外御史楊畏言大理寺近斷邵武軍婦人阿陳等案上刑部郎中杜紘議以為不當奉詔下御史臺審定案刑部自侍郎崔台符以下凡四員而紘獨獻議餘官無所可否但據狀申都省台符本法吏陛下擢置近列不思報效循默茍簡無任責之心詔台符罰銅十斤韓晉卿莫君陳各八斤六月壬申紘罰銅种諤奏西賊於安定堡地分打虜人户已差官體量今欲指揮沿邊諸將子細探偵敵情如果是待來説話乞通和即依元豐六年正月九日指揮若賊情别有姦謀名言待來説話款我邊備乘我不意奔衝城塞即依元豐五年十月二十一日朝旨以上二事乞速賜指揮詔种諤所奏二事並不相妨今來因何妄奏朝廷取候指揮令种諤詳前後所降指揮施行并札與本路走馬承受遣官一員親詣被賊去處體量賊馬數目聞奏密記十五日事壬戍詔遼使所過州軍通判令河北都轉運司體量如有年髙精神心力不逮之人權暫對移使過界依舊上批聞諸路剩員猥多蓋將副不能展季教習又不退為廂軍其間亦有避免教習託疾減退致將下多闕額可令河東陜西路安撫司遣官往逐州軍驗年四十五已下堪披帶雖有小疾不妨挽張弓弩等武藝於元降指揮大分收管據見今武藝降等教習詔拜諸陵自今各差官太常寺輪長二餘以宗室遙郡防禦使輪充以太常博士何洵直言熙寧祀儀三陵共差朝拜官一員分拜非是故也詔河北屯田司相度尺寸立塘濼水則季比增減以聞令李諒齎詔往同議毋得張皇漏泄癸亥定西城置主簿一員從李憲請也憲又言定西城最扼賊衝元係敵中設置監軍之地當先展築然後併力蘭州已遣洛苑使康識移兵興役詔從之此據御集附見三月四日康識乃具奏今不復重見於彼賜誠州公使錢千緡從知州周士隆請也甲子詔供備庫使髙遵治西京左藏庫副使張壽各降一官坐討瀘州南蠻已降惟未納弓刀而輒殺之也既又以破乞弟巢穴功各減磨勘三年東頭供奉官杜議計罪應降一官功應減磨勘四年己死賜其家絹二十匹三省言御史臺六察案官以二年為一任欲置簿各書其糾劾之多寡當否為殿最嵗終條具取旨升黜事重者隨事取旨從之正月二十四日庚子合參照工部郎中范子竒言滑州浮橋每年漲水以前權拆秋深復繫嵗費財力欲於決口下别相視繫定免繫拆及壅遏之患詔子竒度可繫橋處具利害以聞丙寅武信軍留後贈安化軍節度使開府儀同三司髙密郡王宗達卒上欲即幸其第會兩有司以泥淖聞上命亟治道三日臨奠哭之丁卯詔軍器監東西作坊賞典太厚造軍器所日役數百人而例得二年遷一官頗僥幸自今每作實役工至萬依舊例提舉河東保甲司言太原府十三州軍九場集教保甲事藝及格差王淵梁從政按閲權發遣陜西轉運副使李察言昨察訪李承之乞改華池鎮為寨以故華池縣為鎮其稅務巡守兵員監官皆當隨徙從之詔陜西轉運司錢監闕銅興鑄纍申金部尚未支降今軍事未巳經費所入豈宜虧耗户部失於應辦其稽滯所由御史臺根究以聞後户部尚書安燾罰銅八斤侍郎陳安石郎官朝端彥十斤并典級決杖罰俸贖銅有差朱本云郎官朝端彥陳安石誤也安石五年四月為侍郎矣京西轉運判官江衍言廣武掃年計梢草西京河陽充軍糧草並闕錢應副乞借五十萬緡詔南北路提舉司共支坊場錢三十萬緡限五年還詔右侍禁閣門祗候魯福遷西頭供奉官涇原路第二將下部將賜褁創絹五十匹福涇原路準備差使回引見自言面中箭使醫視之鏃近眼不可出也後福病箭瘡死録其子堅為三班借職庚午詔聞熙河路守具闕氊皮委王欽臣具氊三千領牛皮萬張隨州縣發夫般運提點開封府界諸縣鎮公事楊景略獻造供御酒麴用竹圈杖案法詔用之李憲言計置蘭州糧十萬乞發保甲或公私槖駝般運又慮妨春耕臣已修整綱船自洮河漕至楚隴寨俟廂軍摺運赴蘭州詔如槖駝舟船運不足須當發義勇保甲即依前詔二月六日樞密院言京西河東陜西團結廂軍赴蘭州凡一萬五千人詔更於京西刷二千人上批熙河路見修葺邊備支用浩大近雖已支錢二百萬緡緣本路百物踴貴支用未足接續以坊場積剩錢一百萬緡賜之詔熙州權增公使錢三千緡通逺軍二千緡辛未种諤言自今捕獲侵犯邊界西人依朝旨施行外若諸處探子捕獲非作過西界人並乞刺配荆湖或京西本城從之詔陜西路帥臣所在通判職官不許監司差出從知慶州趙卨請也同經制熙河路邊防財用趙濟兼陜西轉運判官計置環慶路糧草陜西轉運副使李察計置秦鳯路糧草兼應副熙河路須索提舉熙河秦鳯涇原路弓箭手營田張大寧權同經制熙河路邊防財用癸酉三省言國子監公試所䇿問諸司之務寺監有所不究寺監之職六曹有所不察六曹之政都省有所不悉任其責者殆未足以盡小大相維上下相制之道焉豈制而用之者法未足與守推而行之者人未足與明歟欲度今之宜循古之舊而盡由其長則事之衆多且將有迂滯之患也諸生以為如之何則可䇿題乃起居郎蔡京撰詔京具所問事理當如何救正其所取諸生如何者為上等京言竊以命官不度久矣陛下以日躋之聖追而復之其本末度數皆取成於心而斷之以獨智故建長立屬聨事合治官無虛名人有常守稽古揆今粲然備具萬世之幸也而臣猥以淺學與討論實自愧恨不能有益聖功之萬一竊以謂聖智作法猶四時而成嵗自唐至周未有一日而具者則講明緝熙今日之事也而適被詔命校試諸生故輒妄意討論考觀諸生之政學言不别白當在吏議陛下嘉惠赦臣使畢其説臣承命震怖敢不盡愚夫朝廷之有百職百職之有佐屬猶心之運臂臂之使指蓋臂之作止不期運也而應之於心指之伸屈不期使也而應之於臂何則其血脈各相係屬而通達洞貫故也今設官分職有相𨽻之名而未有相任之責有相臨之勢而未有相糾之法此臣之所以疑也惟不相察不相任夫人得以相倚則小吏猶豫而不敢行大吏依違而不肯斷事至而莫之決則必有受其敝者矣茍任其責則長二佐屬同利共憂若手足相營也事之不舉者寡矣雖然察之無時則疲於應命而事不加修其説在察之以月要責之已甚則煩於究治而人不勝任其説在以律下從第減如此則士自盡而刑威矣或曰今御史固察事矣臣曰不然夫官府之治有正而治之者有旁而治之者有統而治之者省曹寺監以長治屬正而治之者也則其為法當詳御史非其長也而以察為官旁而治之者也則其為法當略都省無所不總統而治之者也則為法當考其成然則長吏察月御史察季都省察嵗庶乎其可也臣之區區竊意於此然以為未足以有行也故䇿之於諸生而諸生皆未能有至當之論其等上者多以經義為主至於對問之言或取其文詞而已朱本以為無施行削去新本復存之今從新本太常寺言郊廟用樂二十簴若遇雨雪則覆以幕臨祭恐不能應辦自今如望祭即設於殿上監察御史王桓言祭祀牢醴之具皆掌於光祿而寺官未嘗臨蒞失事神之敬伏請大祠皆輪光祿卿少卿朔祭及中祠輪丞主簿監視宰割禮畢頒胙有故及小祠聽宫闈令或大祝奉禮攝其應進胙者卿少一人望闕再拜進並從之都提舉汴河堤岸司言丁字河水磨近為浚蔡河開斷水口妨關茶磨本司相度通津門外汴河去自盟河咫尺自盟河下流入淮於公私無害欲置水磨百盤放退水入自盟河從之丁字河熙寧八年六月十六日初置閘水磨初置年月當考六年八月十二日七年二月六日六月一日甲戍樞密院言日畫聖旨諸房月終類聚成册進呈元豐四年正月詔樞密院所得聖旨並當日覆奏施行月終更不進入逐房因此拖滯不即抄録已責限攢寫欲自今諸房所得聖旨並當日關送院雜司置簿抄録月關時政房從之太常博士何洵直言熙寧祀儀春秋仲月祀九宫貴神祝文稱嗣天子臣某九宫貴神功佐上帝德庇下民以禮秩論之當與社稷為比伏請依熙寧祀儀為大祠其祝版即依會昌故事開寶通禮書御名不稱臣又雨師先農皆中祠馬祖先牧馬社馬􅀈小祠位一少牢今貴神九位異壇别尊為大祠而共用二少牢於腥熟之俎骨體不備比之小祠有所弗及謂宜用九少牢庶於情文相副從之詔蘭州主兵官李浩劉振孫王安民留不堪披帶病卒於極邊難得糧草處李浩坐斥候不明已降官可從重振孫安民各罰銅三十斤詔宜州溪洞都巡檢薛應之與蠻賊鬬敗走藏除名勒停詔翰林學士鄧潤甫違法支用本院厨錢已自覺舉御史臺勿劾
