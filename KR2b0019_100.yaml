body:
  text: 續資治通鑑長編卷九十六宋李燾撰真宗天禧四年秋七月庚戌朔先天節羣臣上壽涇王元儼攝太尉以未命宰相故也吕夷簡等還自東西川言梓州路勸農使王鬷知梓州蘇維甫知卭州沈同知蜀州錢昆知昌州張用通判益州狄棐劉隨通判永興軍董希甫知益州靈池縣李紘堪充三司臺省轉運提調刑獄藩郡之職詔有司記其姓名代還日升陟任使鬷臨城人大中祥符初舉進士授婺州觀察推官代還上見其狀貌竒偉特遷著作佐郎同錢塘人昆易之兄棐長沙人紘昌齡從子也蘇維甫張用董希甫三人未詳邑里西南蕃千三百人來貢丙辰遣使市小車給鳳翔府至綿州驛遞軍士仍為增葺廬舍憫其勞也韓億使淮南江浙還言池州青陽縣旌表門閭方鋼狀稱籍管稅錢四百餘千米二千五百斛同居七百口凡八世四百年景德中準詔旌表而本縣科率一無寬假望蠲其尸下雜配物詔本州凡有科率量優減之丁巳太白晝見辛酉召宗室近臣及太子太傅冦準兵部尚書馮拯觀苑中嘉穀遂宴於玉宸殿隆平集言準罷相以太子太傅歸班請對不許據此則嘗從後苑遊觀矣錢惟演日記七月十二日召給諫舍人及太子太傅等入承明殿先賜食訖召入玉宸殿看瑞穀先于太清樓見訖賜茶便詣種穀處按此則隆平集誤也知制誥吕夷簡言伏見河再決滑州計功巨萬以臣所見未宜修塞俟一二年間漸收梢芟然後興功兼聞諸州有賤易莊田者蓋慮不時科率無從出辦望降眀詔諭以河決未議修塞仍令滑州規度所須梢芟以軍士採伐或於旁近秋稅折納從之遂詔京東西河北路經水災州軍勿得科調丁夫其守捍隄防役兵仍令長吏並加存恤畨休之癸亥對參知政事李迪兵部尚書馮拯翰林學士錢惟演于滋福殿冦準罷上欲相迪迪固辭於是又以屬迪有頃皇太子出拜上前曰蒙恩用賔客為相敢以謝上顧謂迪曰尚復何辭耶是日惟演又力排冦準曰準自罷相轉更交結中外求再用曉天文卜筮者皆遍召以至管軍臣僚陛下親信內侍無不著意恐小人朋黨誑惑聖聽不如早令出外上曰有何名目惟演曰聞準已具表乞河中府見中書未除宰相兼亦聞有人許以再用遂不進此表上曰與河中府何如惟演乞召李迪諭旨上曰李迪何如惟演言迪長者無過只是才短不能制準因言中書宜早命宰相上難其人惟演對若宰相未有人可且著三兩貟參知政事上曰參政亦難得人問今誰在李迪上惟演對曹利用丁謂任中正並在李迪上上默然惟演又言馮拯舊人性純和與冦準不同上亦默然既而曰張知白何如惟演言知白清介使參政則可恐未可為宰相上頷之惟演又言冦準宜早令出外準朋黨盛王曙又其女壻作東宫賔客誰不畏懼今朝廷人三分二分皆附準矣臣知言出禍從然不敢不言惟陛下幸察上曰卿勿憂惟演再拜而退後三日拯遂拜樞密使蓋用惟演之言也迪既除宰相而準為太子太傅萊國公如故甲子大雨流潦泛溢公私廬舍大半有壓死者是月連雨而此夕為甚乙丑令京東西河北州軍津渡官給舟船濟人丙寅以禮部侍郎參知政事李迪為吏部侍郎兼太子少傅平章事兵部尚書馮拯為樞密使吏部尚書同平章事是日告謝即賜襲衣金帶鞍勒馬正謝日亦如之非常比也以霖雨壞營舍賜諸軍緡錢丁卯禁兩川諸縣弓手雇人代役犯者許鄰保紏告重繩之詔奬益州官吏趙稹等以吕夷簡言其政績也戊辰判杭州王欽若酒榷增羡獄空詔奬之先是馮拯以兵部尚書判都省上欲加拯吏部尚書參知政事召學士楊億使草制億曰此舍人職也上曰學士所職何官億曰若樞密使同平章事則制書乃學士所當草也上曰即以此命拯拯既受命樞密院領使者凡三人前此未有人皆疑怪曹利用丁謂因各求罷上徐覺其誤召知制誥晏殊語之將有所易置殊曰此非臣職也遂召錢惟演惟演入對曰馮拯故參知政事今拜樞密使當矣但中書不當止用李迪一人盍遷曹利用或丁謂過中書上曰誰可惟演曰丁謂文臣過中書為便又言玉清昭應宫未有使謂首議建宫冝即令領此又言曹利用忠赤有功國家亦冝與平章事上曰諾庚午以樞密使吏部尚書丁謂平章事樞密使檢校太尉曹利用加同平章事皆用惟演所言也此假參取錢氏及司馬氏日記修入晏殊誤召恐不至再當考馮拯自兵書加吏書必參政日記偶脫今追填之楊億所云此舍人職蓋參政制乃舍人所當草也辛未鄜延路鈐轄言普密族馬鄂克等先為北界所略今帥衆來歸壬申以久雨詔諸軍校營在新城者權免常朝賜諸班直軍營壓死者緡錢有差河北轉運使言懷衛二州仍歲災沴流民漸復請各增置通判一貟以安集之詔可上既從錢惟演之言擢丁謂首相加曺利用同平章事然所以待冦準者猶如故謂等懼謀益深是日準入對具言謂及利用等交通蹤迹又言若有罪當與李迪同坐不應獨被斥上即召迪至前質之兩人論辨良久上意不樂迪再三目準令退及俱退上復召迪入對作色曰冦準逺貶卿與丁謂曺利用並出外迪言謂及利用須學士降麻臣但乞知一州上沈吟良久色漸解曰將取文字來迪退復作文字却進上遽灑然曰卿等無他且留文字商量更召謂入對謂請除準節鉞令出外上不許此據錢惟演記刪修準迪謂入對皆二十三日也越眀日楊崇勳等遂告變周懷政伏誅又三日準乃逺貶甲戌昭宣使英州團練使入內副都知周懷政伏誅大中祥符末上始得疾是歲仲春所苦浸劇自疑不起嘗卧枕懷政股與之謀欲命太子監國懷政實典左右春坊事出告冦準準遂請間建議密令楊億草奏已而事泄準罷相丁謂等因踈斥懷政使不得親近然以上及太子故未即顯加黜責懷政憂懼不自安隂謀殺謂等復相準奉帝為太上皇傳位太子而廢皇后與其弟禮賔副使懷信潛召客省使楊崇勳內殿承制楊懷吉閣門祇候楊懷玉議其事期以二十五日竊發前是一夕崇勳懷吉夕詣謂第告變謂中夜微服乘婦人車過曺利用計之及明利用入奏於崇政殿懷政時在殿東廡即令衛士執之懷政本傳云上姑務含容不忍斥其過然漸踈逺懷政憂懼時使小黃門自禁中出詐稱宣召入內東門坐别室久之而出以欺同輩實録亦云然收懷政時實在崇政殿東廡則其出入禁中固自如也但丁謂等多為之防使懷政罕得見上爾蓋未有踈逺懷政意也本傳又云上怒甚而實録無此疑本傳飾説今不取詔宣徽北院使曺瑋與崇勳就御藥院鞫訊不數刻具引伏上坐承眀殿臨問懷政但祈哀而已命載以車赴城西普安佛寺斬之謂等并發朱能所獻天書妖妄事亟遣入內供奉官盧守眀鄧文慶馳驛詣永興軍捕能及其黨乾祐觀主王先道士張用和殿直劉益借職李貴康玉殿侍唐信徐原並免死黥面配儋梅髙崖雷瓊萬安循州懷政父內殿承制紹忠及懷信並決杖配復嶽州子姪勒停資産沒官懷政之未敗也紹忠嘗詬之曰斫頭豎子終纍及我懷信又嘗謂懷政曰兄天書事必敗當早詣上首露庶獲輕典及謀作亂又號泣伏拜而止之皆不聽故皆得免死焉右街僧録澄預聞妖妄黥面配郴州朱能父左武衛將軍致仕諤母周氏贖銅百斤并其子守昱守吉分配蔡郡道州資産沒官與諤往來結社人悉決杖配諸州自餘親事卒懷政僕使決杖分配海島逺州部下使臣第降秩記聞載懷政以二月二日懷小刀對上自割上因是疾復作皇后命收懷政下獄并于宫中得懷政奏言傳位事乃命楊崇勳告變誅懷政貶萊公按懷政誅在七月萊公罷在六月秋若懷政于仲春為此則萊公必不待夏末始罷懷政至初乃誅也然真宗實録以仲春疾益甚不知緣何事爾記聞必誤今不取懷政既誅有欲并責太子者上意惑之李迪從容奏曰陛下有幾子乃為此計上大寤由是東宫得不動搖迪之力居多此據記聞丁丑太子太傅冦準降授太常卿知相州翰林學士盛度樞密直學士王曙並落職度知光州曙知汝州皆坐與懷政交通而曙又準壻也準親吏張文質賈德潤並黜為普寧連山縣主簿及朱能敗又除名配𨽻封貴州朝士與準親厚者丁謂必斥之楊億尤善準而請太子監國奏又億所草也及準敗丁謂召億至中書億懼便液俱下面無人色謂素重億無意害之徐曰謂當改官煩公為一好詞耳億乃稍安卒保全之當時宰相愛才如此謂雖姦邪議者亦以此稱焉宰相愛才此據歐陽修歸田録是月以客省使英州防禦使楊崇勳為鄧州觀察使內殿承制楊懷吉為如京使並賜金帶及金銀降詔褒奬供奉官京城西面巡檢楊懷玉責授侍禁依前閣門祇候出為杭州都監懷玊既與崇勳等預懷政議崇勳告變之翼日始詣樞密院自陳故責之八月辛已以楊崇勳為內客省使領貴州觀察使兼羣牧使崇勳纍辭鄧州之命故改任焉入內供奉官談元吉髙品王德信決杖配唐州髙班胡允則黃門楊允文決杖配西京坐嘗受命至乾祐縣與周懷政協同妖妄故也元吉尋黥面配賔州太子太保判杭州王欽若自以備位東宫請入朝甲申召之欽若尋又言詔無馳驛之文但依程即路始令乘傳徙知相州太常卿冦準知安州初李迪與準同在中書事之甚謹及準罷丁謂意頗輕迪於是謂等不欲準居內郡白上欲逺徙之上命與小州謂退而署紙尾曰奉聖旨除逺小處知州迪曰向者聖旨無逺字謂曰君面奉德音欲擅改聖旨以庇準耶二人忿鬭蓋自此始朱能聞使者至自度不免𠂻甲以出殺盧守眀帥所部兵挈家屬叛逸永興軍奏其事詔遣內殿承制江德眀入內供奉官于德潤乘驛發兵捕之應能黨與分配嶺表者所至禁繫别俟朝旨既而能衆潰勢窮蹙入桑林自縊死永興乾耀都巡檢供奉官李興牢城十將張順斷能及其子首以獻補興閣門祇候順本城都頭興順遷陟在十一月甲寅今并書之乙酉以樞密副使任中正禮部侍郎王曽並參知政事翰林學士錢惟演為樞密副使刑部請自今犯贓濫配𨽻經恩從便者俟一年後遇赦宥方理工部郎中薑遵言陜西利夔等路州軍多無常平倉或歲歉賑糶即發軍糧望令創置量民數蓄穀詔可丙戌謁玉清昭應宫景靈宫幸開寶寺辛卯以太常丞直龍圗閣馮元為左正言兼太子右諭德初太子為壽春郡王王旦薦元宜講經資善堂帝以元少更用崔遵度於是遵度卒乃命元代之詔諸路勸農提點刑獄官自今奏事緣戶賦農田則署勸農司刑獄格法則署提點刑獄所戊戌示宰相玉宸殿瑞穀圖庚子同判太常禮院陳寬言郊廟致齋日左右街司承例遣雜職從行望自今罷之其祇事人吏不謹職者俟事畢付司科罷從之壬寅太常卿知安州冦準坐朱能叛再貶道州司馬制辭云不務敦修密朋凶慝辱豫輔弼玷乃搢紳仍以其事傳告諸州御史臺揭榜朝堂準過零陵踰大坡護兵先後不屬溪洞蠻夷乘間抄掠其酋長聞而責之曰奈何奪賢宰相行李耶趨遣人還所掠其在道州晨具朝服如常時起樓置經史道釋書暇則誦讀賔至笑語若初無廊廟之貴者自準罷相繼以三黜皆非上本意歲餘上忽問左右曰吾目中久不見冦準何也左右亦莫敢對上崩乃責雷州此據司馬光記聞丁謂傳云周懷政事敗議貶準帝意欲謫準江淮間謂退而除道州司馬獨王曽以帝語質之謂顧曰居停主人勿復言蓋指曽以第舍假準也按居停之語在仁宗初再貶雷州時曽緣此遂謀去謂龍川别志當得之以聖旨質謂乃李迪其事見記聞今從之若此時曽已詰謂則當迪謂忿爭時曽亦必不助謂矣國史恐誤也徐度國紀天禧四年十二月癸丑對輔臣及王欽若於宣和門北閣子中上曰朕覺四體不康丁謂等奏近日聖躬稍安况中外無事乞寬聖心欽若奏今來中書密院公事甚好又出冦準朝廷更無事矣上云除却冦準後甚靜又問冦準何在宰臣曰在道州上曰輕典馮拯曰如準包藏禍心漢唐之法皆當族誅陛下蓋是寬貸上曰朕曲全之於是上色稍怡命坐賜茶而罷不知徐度何從得此恐必不然今附見當考癸卯以衛尉卿填從吉為光祿卿致仕司封郎中兼侍御史知雜事杜堯臣改衛尉少卿知陜州皆坐與冦準親善也右司諫直集賢院判戶部勾院劉曄為工部貟外郎兼侍御史知雜事初河決滑州大興力役道殍相望曄請䇿免宰相以答天變時冦準丁謂實在中書及王曙坐準貶官在朝無敢往見者曄歎曰朋友之義獨不行於今日歟往餞之經夕而還謂亦不罪也河決乃三年六月事甲辰賜諸班直諸軍洎太子宫祇候己下器帛緡錢入內押班鄭志誠嘗納朱能音問及搜獲表章有請太子親政之辭令右諭德魯宗道御史劉平鞫問削兩任配𨽻房州乙巳詔故相向敏中家産日廢令內侍省官檢校之丙午入內供奉官石承慶削兩任配𨽻宿州先是周懷政嘗遣人召承慶欲有所議夜二鼓不下皇城門鑰以待之上遣黃門黃守志開大寧祥符東華門傳詔許王宫至則門不閉見承慶將入守志訊知其故戒令勿入於是門司不復納承慶守志畏懷政不敢言至是以聞鞫承慶而責之是月詔自今逐年兩稅版籍並仰令佐躬自勾鑿點檢勘新收舊管之數民有典賣析户者驗定舊稅眀出户帖勸農使按部所至索視帳目其縣官能用心者批歷為勞績當議升奬時上封者言諸州版籍止委吏人失於勘驗移易稅賦多不均等故有是命尋又詔前敕諸路勸農使所至究民間疾苦檢視帳籍慮其因緣取索受越訴以擾民冝令使副常切鈐束不得妄有行遣呼集其籍帳不整止移牒索視論訴公事並依舊次第陳狀如已經州縣轉運司不行者並即時盡公處理所置曺典勿得過提點刑獄司數此據會要或削去九月己酉以諫議大夫兼太子右庶子知開封府王隨為給事中知杭州會靈觀判官兵部貟外郎知制誥吕夷簡為刑部郎中龍圖閣直學士權知開封府隨嘗假周懷政白金五十兩至是自言故出之夷簡治開封嚴辦有聲上識其姓名於屏風意將大用之也隨本傳云隨坐此奪知制誥按隨二年八月遷左諫議兼右庶子即罷知制誥矣傳誤録故翰林學士右諫議大夫梁皓子適為祕書省正字適詣登聞自陳父兄淪沒特有是命詔翰林侍讀學士張知白玉清昭應宫副使林特三司使李士衡龍圖閣學士陳堯咨樞密直學士薛映李及馬元方張士遜兵部侍郎馬亮給事中李應機王隨右諫議大夫假曄各舉常參官堪錢穀任使者二人工部尚書朝迥翰林學士楊億劉筠晏殊龍圗閣直學士吕夷簡戶部侍郎李維知制誥李咨宋綬張師德各舉文學優長履行清素者二人給事中樂黃目孫奭右諫議大夫趙稹龍圖閣待制李虛已李行簡少府監薛顔太常少卿趙湘各舉可守大藩者二人知制誥祖士衡錢易知雜御史劉曄直龍圖閣魯宗道馮元各舉堪御史者二人諸路轉運使副勸農使各舉幕職州縣官堪京官知縣者二人限十日內具名以聞庚戌前同谷縣主簿李士程伐登聞鼓上軍機密事以所言狂悖責授惠州司戶參軍壬子以玉清昭應宫副使尚書右丞林特為工部尚書兼太子賔客副使如故丙辰復御崇德殿視事上自中春不豫止視事於長春殿至是聖體和平始御前殿詔劉益康玉徐原等十一人並活釘令衆三日訖斷手足具五刑處死王光李貴並斷手足處斬唐信八人並處斬文思院畫匠軍士百姓十五人並免死杖脊黥面配沙門島及廣南牢城朱能僕使及道士軍士十二人並杖脊配江湖福建牢城能弟文顯免杖黥面配鄧州本城初能將擐甲扞制使文顯潛以告知府朱巽等故至是獲用輕典能妻髙母李弟婦陳洎女僕家僮十二人並決杖分配湖南京東西州軍能子伴哥以幼不勝杖黥面配澧州牢城聽隨母之配所時命殿中侍御史王博文與內臣岑守素等乘傳詣永興按劾具獄以聞而降是詔初遣博文人謂連逮者必衆博文惟治首惡脅從者皆為請得以減論本傳云博文惟治首惡脅從者七人皆為請得以減論所稱七人與實録不合今削去己未以久雨放朝十日輔臣對于便坐以樞密副使周起為户部侍郎知青州簽署樞密院事曺瑋為宣徽南院使環慶路都部署兼管勾秦州兵馬起素善冦準而瑋亦不附丁謂謂惡之并指為準黨故俱罷出起性樂易好飲酒準前在中書嘗與起過瑋家飲同列多先去者準及起盡醉夜漏上乃歸翌日引咎伏謝上笑謂曰天下無事而大臣和樂何過之有然起謹密凡奏事及答禁中所問隨輒焚草故其言外無知者徐度國紀云九月己未樞密院奏事上獨留曺利用及曺瑋問瑋曰汝安得與朱能交通瑋曰臣實不識能當是以臣有虛名於西鄙欲借臣虛名耳因泣涕請出上憐之謂利用日瑋可改官令出乃以為宣徽南院使環慶都部署不知何據附見當考辛酉命知制誥宋綬為契丹國主生辰使閣門祇候談倫副之太子左諭德魯宗道為正旦使閣門祇候成吉副之壬戌知永興軍府給事中集賢院學士朱巽陜西轉運使工部郎中直集賢院梅詢並削一任巽為護國莭度副使詢為懷州團練副使並不署州事轉運使度支貟外郎劉楚降授祠部貟外郎監葉縣鹽稅勸農使職方貟外郎皇甫載時丁憂候服闋與通判副使閣門祇候程紹忠為陽武縣都監本軍通判幕職官並贖銅釋其罪巽等嘗薦舉朱能及不察姦妄致害制使故責之知鳳翔府侍御史臧奎贖銅二十斤通判寧州尋換都官貟外郎坐與能交結也永興軍部署李福者嘗任防禦使將兵失律流嶺外起為環衛在永興善事冦準後因郊祀驟復祁州防禦使能叛不即擒捕憫其衰耄授左屯衛將軍致仕都監閣門祇候康文德削職監陜州鹽稅殿直閣門祇候穆介與能善能及周懷政嘗連狀薦之杖脊黥面配韶州牢城軍士封進鳳翔府孔目官朱日昌等八人皆能等常從預為矯妄者並決杖分配海島逺郡牢城乾祐知縣蒲城長安萬年乾祐簿尉並坐絀削丁卯赦天下繫囚除十惡已殺之官典犯贓盜官物持仗放火偽造符印外咸除之天禧三年已前所逋夏秋稅貸糧種子見欠倚閣者並與蠲除周懷政朱能干連黨類除已行勘斷外自餘咸許自新一切不問己巳遣鹽鐡判官劉鍇乘傳詣永興軍安撫軍民犒設官吏將士詔文武官辭見謝合過正衙及幕職州縣官對揚衙謝在放朝假內者並放當升殿奏事者實封以聞庚午京東勸農使言決河浸徐州知州駙馬都尉王貽貞作隄城南以捍水患甚固詔奬之先是詔翰林學士劉筠等試諸州續解進士辛未筠等上其名凡五十六人其十九人授三班奉職二十九人借職八人當授諸州長史司馬特補借職並與家便差遣壬申賜京城酺太子太保王欽若自杭州來朝令入赴內殿起居甲戌給事中知河陽縣孫奭言父户部郎中致仕翌年九十按禮文九十者其家不從政令父母八十者許解官侍養望許退歸田里優詔不許王欽若請江淮制置使罷雇民船兩浙淮南權罷和糴聽商旅入中並從之冬十月戊寅朔中書門下言唐朝故事五日一開延英隻日視事雙日不坐方今中外晏寧政刑清簡望準舊制三日五日一臨軒聽政或隻日視事雙日不坐至於刑章錢穀事務遣差承受臣僚除急切大事須面對外餘並令中書樞密院附奏詔下禮儀院詳定乃請自今雙日前後殿不坐隻日視事或於長春殿或於承眀殿應內殿起居群臣並依常日起居餘如中書門下之奏俄又請隻日御承眀殿常朝依假日例便服視事不鳴鞭詔可己卯資善堂上梁皇太子會官僚觀之太子太保王欽若承詔旨預焉記聞云云具十二月丁酉壬午御正陽門觀酺皇太子侍坐凡五日上自不豫罕復臨幸至是人情歡忭戊子禮儀院言每歲十月十五日朝拜景靈宫今緣祭神州地祇奏告在散齋之內請權罷朝拜至日令宫使行酌獻之禮從之己丑以前起居郎直史館陳堯佐免持服知滑州時三司使李士衡言滑州方召徒築隄堯佐素幹事望專委之故有是命堯佐創木龍以殺水怒堤乃可築既又作長隄以護之人號為陳公堤三班奉職王貴配𨽻汀州坐嘗齎朱能周懷政音問往復也左巡使殿中侍御史王耿言諸州軍負罪散參軍安置人多在處卜居雖遇量移亦不遷徙蓋緣失官之後恣營生計不革貪心侵擾貧民規求貨利又或持州郡公事長吏稍懦則不能制之深為民患請自今委本處常切覺察如侵擾官事抑欺百姓即奏移别所仍令州縣長吏非時不得接見從之辛卯詔注釋御集檢閲官月增給錢七千京官五千壬辰以太子太保王欽若為資政殿大學士仍令日赴資善堂侍皇太子講讀十二月己丑癸巳祕書郎館閣校勘王舉正等請自今遇慶節依京官校理檢討例綴百官進奉上壽從之舉正化基子甲午賜天下宫觀大中祥符降聖記各一本戊戌以淮安鎮界六族都軍主乞理補三班借職充蕃部巡檢以鄜延鈐轄周文質言其勤效也開封府獄空詔奬吕夷簡等權判吏部流內銓陳堯咨言近準赦放選投狀選人併多其間有司士文學諸色出身流外人入官資序已定向來承例引對虛煩聖聽請自今比類未入令録者更不引對依格注擬從之甲辰詔經雨及河水衝浸秋苗宜令三司據諸處檢覆到合放分數外依赦文更放一分其已放九分者悉蠲之丙午召皇太子宗室近臣赴玉宸殿翠芳亭觀稻遂賜宴太常寺太祝丁珝為內殿崇班從其父宰相謂所乞也十一月壬子陳堯咨又言幕職闕貟百餘見集人資序應入者少欲以令録有出身人無過犯者權充代還理本資序詔令録初仕者權初等幕職兩任者權節察推官軍事判官癸丑對輔臣及王欽若於宣和門賜御製會靈觀銘石本各一甲寅玉清昭應宫副使工部尚書兼太子賔客林特請皇太子不答拜詔不許乙卯令勸農使兼提點刑獄官自今以提點刑獄勸農使副為稱修尚書省命龍圖閣學士陳堯咨總其事戊午以三司度支副使工部郎中冦瑊為右諫議大夫集賢院學士知益州時上封事者言趙稹不曉民情好自尊大與衆不協故代之降稹知同州上御龍圗閣召近臣觀聖製文論歌詩上曰朕聽覽之暇以翰墨自娛雖不足埀範亦平生遊心於此丁謂等言聖製廣大冝有宣布請鏤板以傳不朽許之遂宴於資政殿庚申內出聖製七百二十二卷示輔臣壬戌宰臣等言聖製已約分部秩望令雕板摹印頒賜館閣及道釋經藏名山勝境乃命內臣規度禁中嚴淨之所别創殿閣緘藏詔可尋於龍圖閣後修築命入內都知張景宗副都知鄧守恩管勾是為天章閣又言陛下臨御以來功業隆盛望令中書樞密院取時政記中盛美之事别為聖政録從之仍令樞密副使錢惟演參知政事王曽編次丁謂等參詳甲子宰臣李迪等上刪定一司一務編敕三十卷左巡使殿中侍御史王耿言自今臺官因譴纍降差充知州仍舊外其充通判及監當官請比品授以他官從之乙丑對輔臣於承眀殿上曰朕邇來寢膳頗漸康復然軍國之事未免勞心今太子年德漸成皇后素賢明臨事平允深可付託欲令太子蒞政于外皇后居中詳處卿等可議之輔臣進曰臣等所奉德音實邦家之大慶况太子升儲以來德望日隆皇后輔翼歲久中外遵教海內瞻企人無間言然太子既監總朝政望令中書樞密院大臣各兼東宫職任庶日奉謀議便於翼贊上許之於是退議其等列傳旨命學士草制詔可自冦準貶斥丁謂浸擅權至除吏不以聞李迪憤悶嘗慨然語同列曰迪起布衣十餘年位宰相有以報國死且不恨安能附權臣為自安計乎及議兼職時迪已帶少傅欲得中書侍郎尚書謂執不可遂草熟狀謂加門下侍郎兼少師迪加中書侍郎兼左丞曺利用加檢校太師馮拯加檢校太尉並兼少保任中正加右丞錢惟演加兵部侍郎並兼賔客玉清昭應宫副使工部尚書林特樞密直學士右諫議大夫張士遜先兼太子賔客並改詹事翰林學士户部貟外郎晏殊先兼舍人改左庶子餘官悉如故故事兩省侍郎無兼左右丞者而迪舊人亦當遷尚書謂專意抑迪迪不堪變色而起丙寅晨朝待漏謂又欲以特為樞密副使仍領賔客迪曰特去歲遷右丞今年改尚書入東宫皆非公選物議未息况已奏除詹事何可改也因詬謂引手板欲擊謂謂走得免同列極意和解不聽遂入對於長春殿內臣自禁中奉制書置榻前上曰此卿等兼東宫官制書也迪進曰臣請不受此命因斥謂姦邪㺯權中外無不畏懼臣願與謂同下憲司置對且言昨林特子在任非理決罰人致死其家詣闕訴寃寢而不理蓋謂所黨庇人不敢言又曰冦準無罪罷斥朱能事不當顯戮東宫官不當增置又錢惟演亦謂之姻家臣願與謂惟演俱罷政柄望陛下别擇賢才為輔弼又曰曺利用馮拯亦相朋黨利用進曰以片文隻字遭逄聖世臣不如迪奮空拳捐軀命入不測之敵迪不如臣也上顧謂曰中書有不當事耶謂曰願以詢臣同列乃問任中正王曽皆曰中書供職外亦無曠闕事頃之謂迪等先退獨留樞密使副議之上怒甚初欲付御史臺利用拯曰大臣下獄不惟深駭物聽况丁謂本無紛競之意而與李迪置對亦未合事冝上曰曲直未分安得不辨既而意稍解乃曰朕當即有處分惟演進曰臣與謂姻親忽加排斥願退就班列上慰諭久之乃命學士劉筠草制各降秩一級罷相謂知河南府迪知鄆州制書猶未出丁卯迪請對於承眀殿又請見太子于內東門其所言蓋不傳而謂隂圖復入惟演亦恐謂出則已失援白上欲留之并請留迪因言契丹使將至宰相絶班馮拯舊臣過中書甚便若别用人則恐生事上可之迪對承明不知言何事而實録正史皆不載今特表而出之戊辰命謂以工部尚書迪以戶部侍郎歸班事頗迫遽其制詞舍人院所草也筠所草制訖不行百官表謂以戶書知河南迪以户侍知鄆州皆係戊辰日是日惟演及中正曽等並如初議遷秩領東宫而太子議政詔書及拯利用等制皆格己巳謂入對於承眀殿詰所爭狀謂曰非臣敢爭乃迪忿詈臣爾臣不當與之俱罷願復留遂賜坐左右欲設墩謂顧曰有旨復平章事乃更以杌子進於是入內都知張景宗副都知鄧守恩傳詔送謂赴中書令依舊視事仍詔迪出知鄆州放朝辭即時赴任時已命學士劉筠草制以拯為相領玊清昭應宫使昭文館大學士制入而未出也謂既復相其制亦卒不行謂始傳詔召劉筠草復相制筠不奉詔乃更召晏殊筠既自院出遇殊樞密院南門殊側面而過不敢揖蓋內有所愧也先是上久不豫語言或錯亂嘗盛怒語輔臣曰昨夜皇后以下皆之劉氏獨留朕於宫中衆皆不敢應迪進曰果如是何不以法治之良久上寤曰無是事也后適在屏間聞之由是惡迪所以不得留非但謂等媒孽亦中宫意爾拜罷録云迪欲兼右丞王曽等以為不可又云迪語極喧戾上連叱之又云上稱迪無禮又云時契丹使將至宰相絶班且欲復相謂錢惟演請並留迪王曽等言謂無過曲在迪請令出三兩月復召之此皆陳繹私意曲筆與正史實録及諸家書並不合今不取獨所云惟演請并留迪或不妄蓋迪與謂初並出守尋復留不知何故當是從惟演議耳然惟演實為謂計當時不得已且并留迪故謂卒留而迪竟出也龍川别志載二相忿爭事與實録正史不同且云劉筠辭不草制乃命錢惟演按此時惟演已副樞密别志誤矣記聞亦以為草制者惟演也今皆不取然留丁謂出李迪其謀實自惟演但不當草制而草制者實晏殊也御史臺記劉筠傳云十一月丙辰除丁謂兼少師李迪兼少傅馮拯與曺利用並兼少保筠當制麻入未宣迪謂忿爭于帝前戊辰筠復直謂罷為户書知河南迪罷為戶侍知鄆州拯為昭文曽為集賢制既入謂復留要筠改制筠不從卒令他學士為之拯遂為集賢曽依舊為副樞北記傳載王曽事與他書不同當考宋綬作筠墓銘亦云上在東宫始議邦政以樞輔備三孤筠當上麻入而事遽易丞相要筠改詔筠拒不往卒用他學士為之然則迪謂等初領東宫職及罷相兩制皆筠所草也是日大風揚塵晝晦以樞密副使錢惟演為都大管勾祥源觀公事惟演先領會靈觀使於是乞改命故臣故特置此職庚午詔自今中書樞密院諸司該取旨公事仍舊進呈外其常程事務委皇太子與宰臣樞密使已下就資善堂會議施行訖奏皇太子上表陳讓優詔不允初議欲令太子總軍國事丁謂以為不可曰即日上體平朝廷何以處此李迪曰太子監國非古制耶力爭不已迪既罷出故有是詔迪本傳以為此詔在迪未罷相時蓋誤也考十八日上對輔臣語則可知此詔與昨詔異矣吏部尚書平章事丁謂加左僕射門下侍郎兼太子少師樞密使同平章事馮拯為右僕射中書侍郎兼少傅平章事樞密使同平章事曺利用兼少保辛未中書樞密院上言自今百官五日於長春殿起居其餘隻日視朝請御承眀殿或其日不坐則令閣門傳宣放朝從之壬申皇太子見宰相樞密使於資善堂諸司職掌以次參謁契丹遣使霸州莭度使蕭阿括副使利州觀察使耿元吉來賀承天節甲戍翰林學士太子左庶子晏殊禮賓副使太子宫祇楊懷玉上新編賜東宫御製五十卷時輔臣論次御集乞降賜皇儲文字遂命懷玉編録懷玉請令殊同纂集至是來上十二月丁丑朔起復翰林學士楊億卒録其子鈜為奉禮郎億天性頴悟自幼及終不離翰墨文格雄健自唐大中後詞氣衰濫國朝稍革其浮至億乃振起風采與古之作者方駕矣文思敏速不凝滯對客談笑揮毫無廢而精密有規裁不煩不艷善細字起草一幅數千言不加點竄於時學者翕然宗尚名聞外夷書無不覽善強記尤長典章制度之事時多取正蓋一時文字之冠也喜誨誘後進賴以成名者甚衆聞人有片辭可紀必為諷誦手集當世之事述為筆苑時文録數十編重交遊耿介坦夷敦尚名節多周人急所得廩賜隨盡談吐有味評品人物善惡大眀留心釋氏禪觀之學自屬疾即屏葷茹臨終前一日為空門偈頌識者稱其達觀云己卯給祥源觀公用錢月五十千甲申徙河北轉運使工部郎中黃昭益知鄧州屯田郎中李放知密州以部內折納過差也乙酉賜涇王元儼銀五千兩宗室防禦使各千兩團練使八百兩餘各有差又賜太子少師丁謂少傅馮拯少保曺利用各五千兩賔客任中正錢惟演王曽太保王欽若詹事林特三千兩左庶子晏殊詹事張士遜各二千兩諭德魯宗道馮元各千兩自餘宫臣常從各有差又賜殿前副都指揮使蔚昭敏錢四百萬步軍都指揮使馮守信三百五十萬殿前都虞候夏守恩馬軍都虞候劉美各三百萬四廂都指揮使諸班諸軍都虞候而下視月俸給之以皇太子親政行慶也詔自今中使傳宣齎手詔諭文字赴中書樞密院係遷秩加恩事並先赴入內都知司上籍覆奏訖乃給付施行詔中書樞密院自今內臣傳旨處分公事並須覆奏令中書提點五房堂後官樞密院承旨而下自今月十三日後從宰臣樞密使資善堂祇候中書樞密院上言請自今遇隻日承眀殿不視事則入內都知傳宣中書樞密院詣太子資善堂議事應時政及後殿軍頭司公事素有定制者施行訖奏係遷改升降者送中書樞密院進呈取旨如無公事則宰臣樞密使已下遇參辭謝皇太子許三二人已上為一班詣堂延見自餘官僚並止留榜子詔從之自是輔臣每會議皇太子秉笏南面而立中書樞密院以本司事遞進承令旨時政之外京朝幕職州縣官使臣禁卒咸引對焉事畢接見輔臣如常禮太常禮院言準御史臺狀向來京朝官承制并丁父母憂持服五十四月今詳定歷代典禮父母併亡或相繼而沒有重輕兼服之制遇虞祔練祥之祭各服齊斬之服則是隨先後而除之無五十四月之制自今文武官併丁父母憂者請令依禮隨先後除服詔可開封府言準近詔大辟罪遇十月權住斷遣過天慶節依舊行刑雜犯死罪並春夏並禁繫聞奏竊緣本府日有重囚在獄淹久欲望自今依舊逐日區斷諸州軍亦準此從之樞密院言契丹使自雄州至京館舍給使臣諸司人例物比每歲稍厚欲令國信使宋綬等至北界諸司人例物亦與加給從之丁亥龜兹可汗王智海甘州輝和爾各遣使來貢智海仍貢大尾羊二己丑以資政殿大學士太子太保王欽若為司空職如故欽若求侍東宫講讀以輔臣兼領三少品序非便表求換秩遂改命之止立學士班十月壬辰賜故秦州蕃僧努卜諾爾弟子莽布瑪喇斡紫衣以本州鈐轄言其幹事故也庚寅詔中書樞密院每赴資善堂議事止令張景宗一員侍皇子餘悉屏之辛卯大理寺丞王雍上其父旦文集擢雍為太子中允丁酉以資政殿大學士司空王欽若為山南東道節度使同平章事判河南府初欽若與丁謂善援引至兩府及謂得志稍叛欽若欽若恨之時上不豫久事多遺忘欽若先以太子太保在東宫位三少上謂不恱因改授司空欽若晏見上問曰卿何故不之中書對曰臣不為宰相安敢之中書上顧都知送欽若詣中書視事謂令設饌以待之曰上命中書設饌耳欽若既出使都知入奏以無白麻不敢奉詔因歸私第有詔學士院降麻謂乃除欽若使相為西京留守上但聞宣制亦不之寤也記聞載欽若入資善堂見太子位三少上丁謂方用事尋有詔欽若以太子太保歸班欽若袖詔書白上臣已歸班不識詔旨上留其詔改除司空按欽若以太子太保歸班乃天禧三年六月甲午初罷相時事此時謂猶未入中書也若已為太子太保又令歸班則詔旨果不可曉恐謂亦不至此繆或記聞誤也改除司空今從實録及本傳押付中書視事及為使相則參取記聞及江休復雜志稍刪潤之中書樞密院言每至資善堂請皇太子無答拜詔不許戊戌詔文武羣官使臣幕職州縣官遇雙日並門見辭謝己亥出御製文草及賜中宫詩手書等示宰相命宰相都大管勾新修天章閣張景宗鄧守恩等提點之辛丑皇太子會師傅宫官于資善堂賜教坊樂癸卯祕書丞致仕李行簡卒其妻魏表言貧不能具葬事詔賜其家錢十萬乙巳宴輔臣於龍圖閣以天章閣興功也閏十二月庚戌知辰州史方言溪洞蠻知古州向光普以錢銀詣鼎州梁山觀音院會僧祝聖夀癸丑賜輔臣册府元龜各一部板本初成也乙卯以供備庫使錢守讓領榮州刺史右屯衛將軍劉守節為右武衛將軍西頭供奉官劉守素為東頭供奉官閣門祇候右侍禁劉守通為西頭供奉官守讓俶之孫守節繼元之子守素守通鋹之子也上因謂輔臣曰舊族可念錢惟演進曰陛下念舊繼絶恩逾前代惟臣一門忠孝伏願終始保全也上曰卿一門忠孝與常人異先帝待以殊禮朕安敢忘惟演拜謝丁巳三司假內藏綾萬三千七百四十匹癸亥知洋州戶部侍郎集賢院學士李維表求歸闕上曰知河中府右諫議大夫李虛已嘗居近職亦久處外地可并召之及至命維為翰林學士承旨虛已權御史中丞知滑州陳堯佐請令兵馬部署同管勾河隄事從之西邊多言嘉勒斯賚復作文法慮為邊患獨曹瑋奏嘉勒斯賚文法已散無足慮者朝議遣近臣察之丁卯命龍圖閣學士陳堯咨為鄜延邠寧環慶涇原儀渭秦州路巡撫使皇城使劉永宗副之所至犒設官吏將校訪民間利害官吏能否功過以聞或有陳訴屈枉經轉運提點司區斷不當即按鞫詣實杖已下亟決遣之徒已上飛驛以聞仍取繫囚躬親録問催促論決戊辰詔諸州軍自今承天及天慶等節公宴監物務官使臣有二貟處許更互一員赴會己巳管勾編排御集入內供奉官朱允中等請以金鑄御製御書印從之庚午詔京城置場十四發常平倉粟賤糶以濟貧民時許滑州入中糧儲行商輦運奔赴京師穀食踴貴故也辛未開封民董德昌并其子利用杖脊黥面配沙門島遇赦不還其女決杖配相州親事卒遊斌朱進等決杖配潭泉澧鼎州百姓崔德升相國寺僧廷郁等決杖配隨安福州德昌利用素無賴結皇城司巡察親事卒伺人隂事詐欺取財京城民庶重足畏服至有小蟲大蟲之號并其黨類責之契丹遣使保靜軍節度使蕭侃副使政事舍人直樞密宋璋來賀眀年正旦上久不豫前二日因餌藥泄㵼前後殿罷奏事乙亥力疾御承眀殿召輔臣語其狀因諭以盡心輔導儲二之意出手書一幅付之其略曰朕近覺微恙發動四體未得痊和蓋念太祖太宗創業艱難不敢懈怠憂勞積久成此疾疹今皇太子雖至性天賦而年未及壯須委文武大臣盡忠翊贊自今要切時政可召入內都知會議聞奏內廷有皇后輔化宣行庶無憂也丁謂等進曰陛下微爽康和即當平愈况元儲已親庶政克固海內之心宫閫內助事皆平允特寬聖慮勉近醫藥以寧祉福自是聖體漸平凡旬浹乃復常焉時太子雖聽事資善堂然事皆決於后中外以為憂惟演后戚也王曽説惟演曰太子幼非中宫不立中宫非倚皇儲之重則人心亦不附后厚於太子則太子安太子安乃所以安劉氏也惟演以為然因以白后兩宫由是益親人遂無間三司言臣僚奏兩川逺地所産雖富般運實多收買折科豈無虧損織造染練寧不費工押綱衙前雖有酬奬户下小客最受辛勤俱荷照臨誠冝軫恤欲令益州梓州兩路州軍綱運量與放二三分庶便民庶下三司詳定三司言自來計度聖節端午十月一日內人春冬衣賜并準備取索及國信往來南郊支用綾羅錦綺鹿胎透背欹正生白大小綾花紗絹等下益梓州兩路織買出染計綱上京令除綺三十五假全減不織外餘錦綾羅鹿胎透背欹正生白大小綾花紗絹等欲且依舊所貴支用不至誤闕又勘會益梓利夔路州軍每年買納紬絹絲綿除應副陜西河東京西州軍及本路州軍衣賜支遣外餘有剩數即上京送納元不曽樁定數目每年自西川水路起發布帛六十六萬匹赴荆南水路轉般上京並應副在京并京西州軍衣賜難議減省欲且依舊從之是歲天下戶九百七十一萬六千七百一十二口二千二百七十一萬七千二百七十二趙德眀始城懷逺鎮而居之號興州德眀正傳載城興在李士彬斬拉爾後不得其時按士彬斬拉爾見今年正月因附年末
