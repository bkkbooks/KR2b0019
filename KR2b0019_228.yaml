body:
  text: 續資治通鑑長編卷二百二十四宋李燾撰神宗熙寧四年六月甲寅朔宰臣王安石為明堂大禮使樞密使文彥博為禮儀使參知政事馮京為儀仗使樞密副使吳充為鹵簿使參知政事王圭為橋道頓遞使樞密使兼羣牧制置使文彥博言羣牧之官近制不許兼領他職今河北監牧使都官郎中周革兼提㸃刑獄非制也乞罷兼領之命從之是日王安石為上言楊繪不宜在言職且曰臣事陛下即有罪大臣近臣理無肯蔽覆者不必得一楊繪乃察臣所為但如繪者使在言路四方宣力奉法之臣更疑畏沮壞政令何由成古人為國皆約七年五年必為政於天下其施行有次第可必故也今朝廷事為之數年行之未幾輒復被沮壞欲望成效恐不可得也乙卯詔鄜延比增屯兵過費邉儲令趙卨相度如遇事宜合駐軍馬計㑹轉運使趙瞻專在本路於要害城寨廣備糧草丁巳詔河北災傷州軍已遣官體量賑濟其劫盜罪至死者並減死刺配廣南牢城候豐熟日如舊又詔罷委官看詳臣僚所上封章令中書看詳以聞初命館職看詳在三年五月戊戌令罷之必有故日録亦無其說當考上批賈蕃可令治其不奉法之罪其他罪勿劾昭示四方使知朝廷用刑公正王安石曰臣亦嘗責趙子幾但案蕃違法壞助役事勿治他事子幾乃云已得其罪狀不敢貸若法當治治之固不害朝廷用刑公正也臣於蕃輩未嘗與之計校緣臣所為盡是國事蕃輩附下罔上壞得陛下國事臣有何喜慍且小人衆多安可一一與計校孟子謂政不足間人不足適一正君而國定臣所以但欲開導聖心庶幾感悟若聖心感悟不為邪辭詖行所惑則天下自定小人自當革靣從上豈須臣區區每與計校若聖心未能無惑而臣一一與小人計校亦何能勝其衆多又言朝廷立法惠在弱逺不知所以然之人怨在强近能造作讒謗者此陛下所當察按林希野史載王安石納上批不行今附注在十三日丙寅録繫囚後詳定編修三司令式所刪定官周直孺言在京麴院自來酒戶沽賣不常難及初額纍經更張未究利害推究其原在於麴數過多酒數亦因而多則價賤賤則人戶折其利為今之法宜減其數增其價使酒有限而必售則人無耗折之苦而官額不虧矣請以一百八十萬斤為足額遇閏年則添額十五萬斤舊價每斤一百六十八文請增作二百文省舊法以八十五為陌請並紐計省錢便於出入舊額二百二十二萬斤約計錢三十七萬貫今額一百八十萬斤計錢三十六萬三年一閏十五萬斤計三萬貫又減小麥萬餘石及人功並不虧元額錢數况免賖麴酒戶納小官錢借賃契書及公私費用不過每斤添支十文令用麴無餘官物無積况國初麴價二百文八十五陌太平興國六年始減五十并具到酒戶情願事件從之十一月乙酉賞直孺章服戊午環慶路經略司言都監任懷政已發赴慶州諸堡寨照管熟戶法訖樞密院言昨石昌等蕃戶驚疑犯順之後种診以厚利啖之乃復安輯凡撫御蕃族之方在明賞與罰知其疾苦申其抑塞則自宜感恩畏威至於酒食犒設之類但務從舊來規式亦不當頓為優厚使蕃情測度明見姑息之意詔劄與本路仍令經略司分析差任懷政因依以聞要見分析如何劉摯言臣竊以為為治之道惟知人為難蓋善惡者君子小人之分其實義利而已然君子為善非有心於善而惟義所在小人為惡頗能依真以售其僞而欲與善者淆故善與惡雖為君子小人之辨而常至於不明世之人徒見其須臾而不能覆其久也故君子常難進而小人常可以得志此不可不察也恭惟陛下承百年太平履大有為之㑹寤寐人物不次而用至於今日未見卓卓有功狀可以補國利民仰稱詔㫖而中外頗有疑焉此何謂也豈所以用之或未能盡得其人歟臣且以將命出使者言之其規畫法度始皆受之於朝廷也一至於外則大異矣興利於無可興革故於不可革州縣承望奔命不暇官不得守其職業農不得安其田畝以掊削民財為功以興起犴獄為才陛下賑恤均役之意變而為聚斂之事陛下興農除害之法變而為煩擾之令守令不敢主民生靈無所赴訴臣以謂此等非必皆其才之罪特其心之所向者不在乎義而已矣欲賞之志每在事先急公之心每在事後故顛倒繆戾久無所成其能少知治體有愛君之意出憂國之言者皆無以容於其間是故今天下有二人之論有安常習故樂於無事之論有變古更法喜於敢為之論二論各立一彼一此時以此為進退則人以此為去就臣嘗求二者之意蓋皆有所是亦皆有所非樂無事者以謂守祖宗成法獨可以因其所利據舊而補其偏以致於治此其所得也至昧者則茍簡怠惰便私膠習而不知變通之權此其所失也喜有為者以謂法爛道窮不大變化則不足以通物而成務此其所是也至鑿者則作為聰明棄理任智輕肆獨用强民以從事此其所非也彼以此為亂常此以彼為流俗畏義者以並進為可恥嗜利者以守道為無能二勢如此事無歸趨臣謂此風不可浸長東漢黨錮有唐朋黨之事蓋始於斯在易之象以君子道長小人道消為泰小人道長君子道消為否傳曰惟君子為能通天下之志書曰皇建其有極又曰無有作好遵王之道無有作惡遵王之路記曰一道德以同俗又曰舜執其兩端用其中於民今天下風俗可謂不同情志可謂險阻而消長之勢可謂未明矣臣願陛下虛心平聼默觀萬事之變而有以一之其要在乎審好惡重任用而已矣前日意以為是者今求諸非前日意以為短者今取其長稍抑虛華輕僞志近忘逺幸於茍合之人漸察忠厚謹重難進易退可與有為之士抑髙舉下品制齊量收合過不及之俗使㑹通於大中之道然後風俗一險阻平民知所向而忠義之士識上之所好惡無有偏陂莫不奮迅而願為之用則施設變化惟陛下號令之而已臣謂方今之故無大於此惟陛下幸察摯嘗靣對上問從學王安石邪安石稱卿器識摯曰臣東北人少孤獨學不識安石也上因摯言與安石論助役事安石辨數甚力上曰無輕民事惟艱安石曰陛下固知有是說然又審民事不可緩上曰修水土誠不可緩安石曰去徭役害農亦民事也豈特修水土乃為民事如修水土非陛下能勝異論則誰肯為陛下盡力且議助役事巳一年須令轉運使提㸃刑獄州縣體問百姓然後立法法成又當曉諭百姓無一人有異論然後著為令則其於民事可謂不輕矣庚申羣臣上尊號曰紹天法古文武仁孝詔曰夫道以常無常名為尊乾以不言所利為大朕所憲焉至於崇飾徽號以臨四方非朕所先務也方命有司議合宫之配以昭嚴父之孝矣乃當前受寶冊自為光榮哉無使大禹之不矜不伐漢光武之禁人言聖獨見稱於前世也自是三上表終不允涇原路經略使蔡挺言新知涇州劉渙先知此州日貪殘不公軍民怨苦今聞渙再至無不憂懼伏望罷渙更擇可者詔渙改知澶州楊繪又言助役之法朝廷之意甚善其法亦甚均但亦有難行之說臣願獻其否以成其可去其害以成其利假如民田有多至百頃者少至三頃者皆為第一等百頃之與三頃已三十倍矣而役則同焉今若均出錢以雇役則百頃者其出錢必三十倍於三頃者矣况永無影射之訟乎此其利也然難行之說亦有五民難得錢一也近邉州軍姦細難防二也逐處田稅多少不同三也耆長雇人則盜賊難止四也專典雇人則失陷官物五也且農民惟知種田爾而錢非出於田者也民寧出力而憚出錢者錢所無也今乃歲限其出錢之數茍遇豐歲雖穫多而賤賣猶未足輸官也凶年穀雖貴而所收者少食尚不足若之何得錢以輸官又况天下州郡患錢少者衆矣而必責民納錢可乎行之三數年此弊愈見矣其說一也唐李元平守汝州始至募人築郛浚隍李希烈隂使亡命應募凡內數百人元平不悟賊將李克誠以精騎薄城募者內應縛元平馳見希烈此乃覆轍也今若緣邉州軍不問土著惟雇一切浮浪之人萬一有間謀應募或為外國所使焚燒倉庫或守把城門潜為內應此豈得不慮哉其說二也天下之田有一畝而稅錢數十者有一畝而稅數錢者有善田而稅輕者有惡田而稅重者今若盡以稅錢為等第得無優者轉優而苦者彌苦乎其說三也人所以畏為耆長者為有不獲賊之刑也誰肯冒刑而就雇乎若未有賊限則為之或有賊限則逃又招之則又然事若何而輯乎其說四也且如倉庫多至數萬石軍資多至百千萬緡而使受雇浮浪之人為之官司無由察實有侵盜事急則逃闕誤支給隱匿文帳然後沒納抵當捕繫保任則罪人已去而平民被害其說五也乞先議防此五害然後著為定制仍乞誡勵司農寺無欲速就以祈恩賞提舉司毋得多取於民以自為功如此則誰復妄議劉摯言臣聞孟子曰徒善不足以為政言人君雖有仁心仁聞茍不因先王之道為良法度以行之則亦不免於民不得被其澤恭惟陛下至誠好治憂念元元謂天下役法久失其平故慨然有意大均之也然有司建議立法頗無以上副詔㫖而下協人情者臣請言之其法曰率錢助役官自雇人臣謂其事不可勝言而略陳其十害天下戶籍均為五等然十七路三百餘州軍千二百餘縣凡戶之虛實役之重輕類皆不同今欲斂錢用等以為率則所謂不同者非一法之能齊若隨其田業腴瘠因其所宜一州一縣一鄉一家各自立法則紛錯散殊何所總統非所謂畫一者其害一也新法患等籍之不得其實故令品量物力别立等第以定錢數然舊籍既不可信則今之品量何以得其無失不獨騷擾生弊亦使富者或輸少貧者或輸多其害二也上戶常少中下之戶常多上戶之役數而重故或以今之助錢為幸下戶之役簡而輕故皆以今之助錢為不幸優富苦貧非法之意其害三也新法所以令品量立等不取舊簿者意欲多得雇錢而患上戶之寡故臨時登降升補髙等以充足配錢之數疲匱之人何以堪命近日府界其事已驗其害四也歲有豐凶而役人有定數助不可闕則是助錢非若賦稅有商閣減放之期其害五也夏秋二熟農人惟有絲絹麥粟之類而助法皆用見錢故須隨時貨易逼於期㑹價必大賤借使許令以物代錢亦復有退㨂壅滯及夤緣乞索之患其害六也兩稅及科買貸責色目已多使常無凶災猶病不能了公私之費又起庸錢竭其所有恐斯人無悅而願為農者天下戶口日當耗失小則去為商賈為客戶為游惰或父母兄弟不相保抵冒法禁折而入下戶大則聚而為賊盜其害七也徼幸之人又能夤緣法意虛收大計如近日兩浙起一倍錢數欲自以為功而使國家受聚斂之謗其害八也夫既為之民而服役於公家乃所謂治於人者事人天下之通義也况鄉縣定差循環相代上等大役至速者猶須十餘年而一及之至於下役則動須一二十年乃復一差今使槩出緡錢蓋雇直不重則不足以募輕則不足以給輕之則法或不行重之則民不堪命其害九也夫役人必用鄉户蓋有常産則自重性愚實則罕欺舊雖有替名鄉人自任其責今既雇募恐止得輕猾浮浪姦僞之人則所謂帑庾場務綱運凡所以主財者不惟不盡心於幹守亦恐縣官之物不勝其盜用而抵冒法令罪獄日報至於弓手耆壯承符散從手力胥吏之類職在捕察賊盜發行文書追督公事者則恐遇寇有縱逸之患因事有騷擾之姦而舞文鬻事無有虛日其害十也夫民可安而不可動財可通而不可竭以臣之淺聞寡見而所列如此其沸於民口有大於此而臣未敢言者其又何窮然臣亦嘗為陛下博訪而深計之蓋天下差役莫重於衙前今司農新法一項云鄉户衙前更不抽差其長名人等並聼依舊以天下官自賣到酒稅坊場并州縣坊郭人戶助役錢數酬其重難臣謂此法有若可行然坊郭十等戶自來已是承應官中配買之物及饑饉盜賊河防城壘緩急科率郡縣賴之今亦難為使之均出助錢舊來官以場務給衙前對折役過分數然多估價不盡虧官實數今既官自拘收用私價召賣則所入固多又應係衙前當役事件官為裁省使無舊日糜費而支酬稍優則人情必當樂為可寬鄉戶重役而似無害民之事臣乞陛下將此一法詔有司講求其詳若逐路坊場錢數可以了本路召雇衙前酬奬則乞詳具條目行而觀之以三二年間若見其利則其他役法更革無難矣惟是助錢之法伏望早賜睿斷一切寢議以幸天下夫更令創制可以漸而不可以暴况欲內自畿甸外至海隅一槩率錢可謂重斂又欲迫急而成之使生靈何以自全陛下安得不謹重其事哉本志但云繪言助役之難有五摯言役法之害有十請一切罷之餘並不書辛酉同提舉在京諸司庫務度支郎中王克臣兼同知審官西院上謂王安石樞密院不留意西審官欲差克臣同知安石以為當然故有是命壬戌詔河東經略司相度如賊重兵犯境即依前後約束令緣邉城寨専為守計約合留守兵外餘悉團結為一軍以備禦賊勿令兵勢分致失枝梧中書刑房言刑部詳覆官如疏駮得諸處斷遣不當大辟罪每一人與減一年磨勘如失覆上件公事每一人即展磨勘一年纍及四人即衝替從之甲子觀文殿學士兵部尚書知蔡州歐陽修為太子少師觀文殿學士致仕修以老病數上章乞骸骨馮京固請留之上不許王安石曰修附麗韓琦以琦為社稷臣尤惡綱紀立風俗變上曰修為言事官獨能言事安石曰以其後日所為考其前日用心則恐與近日言事官用心未有異王圭曰修若去位衆必藉以為說上曰罔違道以干百姓之譽衆說何足恤修頃知青州殊不佳安石曰如此人與一州則壞一州留在朝廷則附流俗壞朝廷必令留之何所用上以為然楊繪言今舊臣告歸或屏於外者悉未老范鎮年六十三吕誨五十八歐陽修六十五而致仕富弼六十八被劾引疾司馬光王陶皆五十而求閒散陛下可不思其故耶又言兩制多闕員堂陛相承不可少衆皆以繪言為然王安石曰誠如此然要須基能承礎礎能承梁梁能承棟乃成室以糞壤為基爛石為礎朽木為柱與梁則室壞矣上笑參知政事王圭言臣前為南郊禮儀使竊見乘輿所過必勘箭然後出入此蓋天子師行故事大駕既動禮無不備及入景靈宫太廟門恐不當行勘箭之禮請下禮官考詳詔禮院詳定以聞於是禮院言皇帝親行大祠所過宣德門景靈宫太廟門出入勘箭南薰門入則勘出則否至於文德殿門并親郊出入朱雀門則勘契考詳勘契之制即唐交魚符開閉符之比用之車駕所過宫殿城門所以嚴至尊備非常也惟勘箭不見所起之因當是師行所用施於宫廟似非所宜誠可廢罷其宫殿城門并太廟車駕齊宿請並勘契至於景靈宫止少留薦享亦乞不用勘契從之宣撫司言昨西域賊攻圍柔逺寨都巡檢林廣與李克忠開城納蕃兵併力堅守都監任懷政郝惟立走馬李元凱募人守寨西谷寨主張繼凝斬獲首級詔林廣賜銀二百兩任懷政郝惟立各減二年磨勘李元凱減四年張繼凝減一年李克忠候奏案到取㫖克忠時坐取蕃官所奪西賊甲不還其直方被劾也克忠事在七月二十八日并六年四月二十二日左騏驥使卲州團練使許州兵馬都監令晏言今後每有差遣辭見并因事到闕並乞上殿或遇大禮亦乞陪位從之自後宗室領外任者悉用此例此據㑹要十一日事今附見鹽鐡副使工部郎中直史館李夀朋踈俊任俠不憚繁劇祠西太乙飲酒茹葷暴中風卒上遣中使撫其家賜銀三百兩乙丑審官東院主簿大理評事蔡曄為太子中允荆湖南路轉運判官兼提舉常平等上謂王安石曰曄可留安石曰已令為監司且試其實如此人他時自當為朝廷用曄挺子也上曰人材絶少宜務搜拔安石曰人材須奬成若趣赴朝廷法令欲立事功輒為人所攻沮附同流俗即雖有過惡羣邪共相推薦容護則中材已下孰敢正論直行此人材所以壞而可使者少也若不能改此恐無由得人材衆為天下要以定取舍變風俗為先務若不如此而乃區區勞心於細故適足以疲耗聰明為亂而已且以近事驗之邉事之興陛下一日至十數批降指揮城寨糧草多少使臣將校能否羣臣所不能知陛下無所不察然邉事更大壞不若未經營時此乃陛下於一切小事勞心於一切大事獨誤今日國事亦猶前日邉事陛下不可不察今日之患正為君子道不長小人道不消所以然者由陛下察君子小人情狀不盡若陛下能明道以御衆如日之在天則小人如雨雪之自消詩曰雨雪浮浮見晛曰流此之謂也若不然則小人道長無義何所不至宗廟社稷之計臣誠為陛下憂之詩曰如蠻如髦我是用憂此之謂也上以為極然陳瓘尊堯集邉機門論安石歸過宗廟今并附五年六月二十七日又四年五月二十日二十六日六月十二日五年正月九日又六月二十七日凡五段皆合參考司農寺言河北提㸃刑獄王廣亷請以廣惠倉錢斛併入常平從之詔賞捕殺慶州叛軍者索忠授右班殿直賜錢五百千餘轉資賜錢銀有差丙寅録繫囚雜犯死罪以下第降一等杖以下釋之時雨愆亢故也時雨愆亢據御集林希野史云趙子幾以司農㫖諭諸縣升降等第以就助役東明民二百詣丞相訴又訴御史上聞之驚安石亦惶恐上手批付中書民之不願出錢者仍舊供役內外歡然以此解訴者中丞繪諫官泳猶以為非便而助役之議直可罷也而布綰言於安石曰助役為衆所搖不可成矣安石悔又納御批而不行疑東明令賈蕃誘民來訴蕃已移官乃遣子幾至邑詢其升降民戶因窘蕃嘗以同天節宴取外界猶如此者數事子幾奏之安石大喜置獄劾之言者以為訴而發其事非體當然又蕃已去官上亦寢又批付中書但案其升降不當餘皆勿問中外聞之慶上之仁聖安石不悅又懷於上前納之又辛亥六月十三日上御崇政殿決罪人曹佾家奴盜金當徒二年半降從杖上目馮京曰橫門決杖二十已宣閣門使安石曰不可但當決十八再三言之上終不能遏自四年以來手批多不行矣按希云安石屢納御批今附注此當考孫洙自諫院出知海州在五月二十二日蓋從洙所乞不聞洙論助役當罷并合考詳己巳保平軍節度推官同提舉秦州西路蕃部及市易司王韶言昨經略司令韶招納近邉生戶入居漢界今韶已奉詔赴闕恐離任後來生戶或與夏國連結别為邉患其生戶入居漢界見給糧者非韶所招如養飼充飽或連結夏國度為寇害實非招納所致乞賜詳察詔先坐妄指閒田責官及再打量乃云實有田四千餘頃於是召對王安石白上曰王韶為陛下盡力臣不知陛下尚奪其官何意因言石顯事上曰元帝不能誅有罪安石曰顯有何罪不過害劉向之徒而已今之為姦者特才不如顯爾其罪非與顯有異也石顯尚須因忠良有釁然後敢攻今之害忠良則未嘗伺其有釁此乃過於石顯陛下何嘗能誅馮京曰李師中降官故韶須降官安石曰師中附下罔上壞陛下所欲為陛下不得不責降然內批特與舒州寵以善地韶無罪乃亦降官好惡賞罰如此君子何所恃賴小人何所畏懼京曰今日人已震懾如此足矣尚欲如何安石曰臣所論者陛下威福非臣私計也上論民兵因稱府界保甲善安石曰保甲事多沮壞安得善陛下欲為民兵誠善然驅民為兵豈皆盡願使吏措置豈能盡當人心陛下為保甲一為人言即紛紛自沮撓其事則欲為民兵未易就也大抵修立法度以便民於大利中不能無小害若欲人人皆悅但有利無害雖聖人不能如此非特聖人天地亦不能如此以時雨之於民豈可以無然不能不妨市井販賣及道塗行役亦不能使墻屋無浸漏之患也壬申以岐王皓為明堂亞獻嘉王頵為三獻不攝上將軍以禮儀使司言至道二年南郊皇太子為亞獻越王為終獻不攝官而近歲獻官雖品秩已髙猶攝上將軍今明堂亞獻已差皇弟不當更攝官也賜邠州修城官吏銀絹有差先是麟府官吏坐守備頽弛被責詔緣邉各加整治而邠州首能奉法故優賚之岐國賢夀夫人朱氏言昨以老病恩許開聖尼院養疾今得安全復見宫省本位使臣祗應人等乞賜推恩上語樞密院曰此真宗子周王乳母也百歲而耳目聰明宫中無出其右者可特聼許先是宫人有疾甚者出之尼寺十亡八九上憫其然著為條約使太醫治病歲終稽其全失而誅賞之自是全活者多朱氏其一也後一年乃卒上批朱氏入宫八十餘年可特追封魏國夫人甲戌武寧軍節度使左僕射同平章事富弼落使相以左僕射判汝州通判亳州職方郎中唐諲簽書判官都官員外郎蕭傳屯田員外郎徐公衮支使石夷庚永城等七縣令佐等十八人皆衝替坐不行新法置獄劾治而有是命弼先許給假就西京養疾於是弼辭汝州乞依先詔養疾西京上不許弼乃赴汝州仍以老病昏塞凡新法文字乞免簽書止令通判以下施行他日王安石為上言弼雖責降猶不失富貴之利何由沮姦又言行弼事要未盡法鯀以方命殛共工以象恭流弼兼此二罪止奪使相弼生平自以寬恤百姓為事今所以不放稅其情可見也不放稅事見二月五日蓋安石誣之也上曰常平事莊家所為吏獨不能為是不能為吏也不能為吏雖廢為民未為過安石曰誠如此民所能而吏不能雖廢為民不為過凡命有德討有罪皆天也人主奉若天道患所討不當而已此段據日録七月十四日備載其言可見安石無忌憚之甚也新紀書弼坐格常平令罷平章事為左僕射判汝州舊紀不著因依司馬光日記云知雜鄧綰劾奏富公除汝州不肯之官求西京養疾跋扈不遵詔命又言富公昔與劉沆書求汲引云願銜環顧印以報厚德弼昔欲以禽蟲事執政今恥以人臣事陛下宜付之請室賜以上刑上以其言險詖寢不報何洵直云日記又云劉摯為檢正官介甫將黜富公摯數諫止之由是出為御史富公竟以上奪使相摯上言亳州簿尉興級等皆坐不散青苗錢被劾以前宰相所為豈此曹所能制由是簿尉以下特宥之當是時摯在臺諫中最為敢言者周伯藥云摯言四月十九日甲戌已具載河中府言乞指揮訓練軍馬衣甲上批令曽公亮應副須選官編排十分可應敵者近裏州軍不足即取於邠涇等州邠涇州又不足令蔡挺應副挺近奏已編垜兩將器甲此必本路支用有餘宜令相度應副降知環州种診一官坐擅回韋州牒許夏國通和也范育銘診墓云朝廷密諭邉臣罷兵而夏人未有請慶帥王廣淵以屬公公間使曉賊賊入求好使再三至乃受以聞朝廷許之猶以輒通賊使奪官既而帥屬皆遷官帥謂致賊請者公也欲得文移為公辨公曰紓患息民乃吾心也講好非勞敢冒賞乎卒不與要見帥屬遷官事乙亥劉摯言五月間東明縣百姓就宰臣私第或隨馬披告助役法不便并升起戶等及詣御史臺披訴臣尋具狀及上殿劄子論列陛下令府界提㸃司體量升降等第因依今竊見趙子幾别舉發知縣賈蕃在任日貸借官錢與手力因同天節沽市村酒創買部夫席屋等事朝廷以其狀下本司取勘者臣竊以為過矣朝廷變更役法意欲均民民茍以為有利害也安可禁其所欲言者且畿甸人戶幸以居近輦轂可以自陳以近推逺以一求萬則天下之情可知也然四方之人限在遐逺上雖有州縣而安敢主之又有監司提舉司之隔礙其欲赴訴勢固難矣今又因畿民有訴而苛刻之人反怒縣官意謂不能禁遏故攟托他事期置于法朝廷不辨遂與施行臣恐四逺人情必疑朝廷以謂欲鈐天下之口而職在主民者必皆視蕃以為戒爭務拘民以杜其言然則天下休戚陛下無時而知臣伏覩編敕節文按察之司所部官屬有犯不得於官屬離任後始行發擲雖實不復受理若犯贓私雖離任有人告或因事彰露即依法施行方子幾之體量於其縣也蕃已得替離任矣子幾初求其事於僚佐又誘而鉤之於吏史借令蕃有贓私則亦不得謂之論告與因事明矣法之所不當理而子幾肆妄敢為者子幾方以苛刻怙寵用事務在力行司農新政而不復顧陛下之法與陛下之民但驅使就令冀自收功恐因民不服撓動其事是故作威以驚衆違法以案吏欲使畿內他邑與天下官吏畏罪避禍閉遏其人民使不得有言以聞于朝廷爾如蕃以司農榜內樁定人戶數目使出助錢遂將縣籍下等次第升遷者凡一千戶以就足榜內之數此其罪固不可赦是以前日聖㫖止令體量此臣願陛下治蕃此罪而已自餘替後所案乞依條不問蓋借蕃以解四方人情之疑使知陛下不禁民言之意臣區區非為蕃計也如子幾領按察之任已久當平日不聞舉擲蕃事乃今挾情違戾敕禁原心考察可見險薄伏請付吏施行王安石既為子幾辨說且曰朝廷置言事官正當為陛下彈劾如蕃輩縱蕃非承望大臣風㫖故壞法又無私贓但其措置不才如此亦不當選差今既不才如此又犯法大臣乃選擢以為可用此乃御史所當言也摯初不言此乃彈擊奉法之子幾以為諂刻子幾劾王愷所忤皆一時權要其不諂可知今營職奉公即謂之諂刻欺罔不端即以為忠純何以正朝廷富弼之責也楊繪草辭云弼天付忠純安石大恨之因子幾事具以白上上批治平中薛向於鄜延環慶路頗招納西界人戶不少慮更有似普結勒斡等人因向責官諸處遂不復奏致貧窮失所乖朝廷恩信可令薛向具析元投來人數及住坐族望候奏上再下兩路具今存亡安泊次第以聞樞密院奏約束諸路機宜官文字有遊宴媒狎無所不至之語上曰趙卨嘗為機宜今帥鄜延恐傷其意可改去此數字時卨以措置邉防事具奏上出示王安石安石曰卨奏甚善其間豫定計䇿則恐非所以應變上曰朝廷難指揮卿可因書諭之安石與卨書今集有之丙子保平軍節度推官提舉秦州西路蕃部及市易司王韶復為著作佐郎王安石自叙其本末云初王韶言沿渭地李師中先與韶合既而為大臣所諷遽極力沮韶奏以為全無荒地朝廷下李若愚等體量令竇舜卿打量乃云止有一頃有餘於是文彥博馮京等合臺諌官極力攻韶以為欺罔生事而向寶等素疾韶又與師中言韶引惹托碩族連生羌擾邉及問知擾邉事乃略不由王韶韶與髙遵裕但有撫結生羌之功而生羌與托碩為變乃由秦州遇托碩失理所致事既無效而師中寶前後奏事誣罔不一朝廷又令沈起往案問并根究韶田事起奏具得師中寶欺罔事惟田事欲須後日進呈彥博為師中言邉帥收閣詔令不行乃是常事安石曰朝廷詔令若不可行當奏請收閣不行安得無罪假令無情亦不可恕况所閣詔令其情乃在於害邉事且又奏事誣罔不遜如何可恕彥博曰既任邉帥當責成今令王韶攪之實難安石曰王韶雖是特㫖差為機宜已而師中力奏韶王佐之材乞令管勾蕃部事故朝廷從其奏然事亦皆師中相度施行韶何嘗能攪之彥博曰王韶之勢赫赫於關中孰敢違者及議罰吳充請向寶王韶皆降官安石曰向寶即有上書不實罪韶有何罪彥博曰沈起善顧望豈肯究王韶罪狀於是上疑韶田不實亦合追一官曰韶不能指言必是無地也安石曰今京東人冒占大澤泊為人論告積年不決其後告者坐不實被徒既而王廣淵根究乃始知曽冒占且內地有契帳分明尚如此况與邉人交雜無契帳可考經略使不肯根究官吏承望風㫖雖有官地但令生熟户各占認則韶亦何由可指也上既疑不決安石以不勝衆論遂止不復爭尋有㫖復下韓縝打量縝言緣渭果有荒田四千餘頃上曰邉臣誕妄誠害事緣理可知而事不可知要邉臣奏報誠實乃決事如竇舜卿言王韶所奏地只有一頃當時朝廷以為必無此地今韓縝打量乃有四千餘頃舜卿尚言今打量地必非王韶所指處文彥博馮京亦皆以縝所言非實彥博曰事患在巧言亂實上曰患不明不患巧言若見理明巧言亦何能亂安石曰巧言雖堯舜亦畏之然以見理明故共工不能亂堯舜之治也漢元帝詔曰朕不明於理靡瞻不眩靡聼不惑政令多還民心未得公卿大臣緣姦作邪惟不明于理故靡瞻不眩靡聼不惑惟眩惑故一有政令輒為浮議所奪而多還惟政令多還故民心未得上所操持如此此公卿大臣所以敢作姦邪其本乃在人主不明于理故也如王韶非邉臣妄誕能亂事實乃是陛下考覆未盡沈起自奏以為恐引惹邉事未可打量田地陛下即行遣王韶考覆未盡而遽行法此自朝廷之失非邉臣能亂事實賞罰在一人之身為輕在朝廷勸沮忠邪則為利害甚大不可不謹也上曰邉臣各自用已愛惡利害非有所忌憚韓縝所以打量出地者以與竇舜卿不相能故也其他事即不肯如此盡力安石曰陛下明察見此盡之矣彥博京皆言此是欲招弓箭手地爾安石曰韶所奏但云荒田不耕何啻萬頃即不言除欲招弓箭手地外有此彥博曰如此則須罪竇舜卿也安石曰舜卿打量時明言除出欲招弓箭手地即於文未見欺罔彥博又言臣在秦州沿渭豈有此地此必欺罔上曰是沿渭地安石即指圖所載且言韓縝專沮壞王韶於奏報中陛下自可見無緣於此荒田乃肯與韶比而為欺罔陛下嘗記御史所以攻韶否乃是陳升之馮京諭謝景溫言沈起將甘谷城地妄作沿渭地欲蓋王韶罪景溫至中書臣面詰以起案卷具在無將甘谷城地作王韶所奏者何故妄言如此景溫對臣與馮京言是集賢相公與參政諫議說如是上以韶為無罪令與復官彥博等又曰韶言耕田尚未有效如何安石曰本所以奪官非為耕田未有效也為其以無田為有而已京曰不止為此兼韶言市易事亦不便彥博因助之上曰市易無不便彥博曰官中更為販賣事誠不便安石曰且不論古事止以今事論公使皆販賣人無以為不便何也彥博曰近日事多費更不足如置古渭以來秦州愈不足安石曰今日古渭文彥博亦不知其不可廢所以費不足正由不理財故也既拓地則須理財以足其費此乃市易之所以不可無也彥博又言韶市易司馬入中不良羣牧司以是官物入中故且令受之安石曰韶但建議提舉至於買馬即自有使臣本法但令依百姓交易若不良自是羣牧司不合納耳今私販亦有退馬則市易有退馬亦未害市易司為可置也彥博又言市易司召元瓘指使乃是還俗僧甚無行三司已劾罪令更不得赴市易司矣安石曰市易司募指使何由盡得篤行君子茍有無行之人亦未害市易司可置亦未足為韶罪向者衆誣韶引惹不效又誣侵盜根究亦已無之彥博曰上下相䝉三數年後陛下自見矣安石曰韓縝無庇蓋王韶之理只今事情陛下自見不待三數年後也上曰韶招納未有效安石曰只今招出即是其效為用與否即在朝廷與將帥爾彥博又言招納無補安石曰不煩兵不費財能撫結生戶不為西人所收以為邊患焉得為無補上乃令復韶官王韶復官實録不載其月日元祐本即於三年十月二十二日并言之紹聖本又專以日録為據取四年六月二十三日事附韶責官後仍自安石止不復爭語下却攙入三年七月十一日并八月十三日兩事乃續以後上終疑韶田事十字方著韓縝打量一段考案殊非次序今復取七月十六日并八月十三日兩事附三年本月日其四年六月二十三日所録亦仍舊附此紹興本並削去日録事若並削去即於韶本末難見今明著王安石自叙云云無可考按也韶傳載韶五月復入對加太子中允集賢校理而實録四年六月十六日乃書韶奉詔入對帶保平節度推官蓋韶以五月召赴闕六月二十三日方得㫖復著作郎續遷中允校理乃在八月九日元祐紹聖紹興三史官考按俱弗詳遂并言之耳丁丑詔淮南兩浙荆湖南北江南東西路提㸃刑獄趙濟王庭老毛抗李平一晏知止陳倩並兼提舉本路鹽事歲較鹽課增虧取㫖增減磨勘年升降資序要見後來如何大理寺丞盧秉權檢正中書吏房公事盧秉初置條例司時已見秉此以寺丞權吏檢七月六日又以殿丞除吏檢今不别出五年二月十八日除浙憲專提監戊寅前權發遣提㸃成都府路刑獄兼常平等事李元瑜特與一子官元瑜死王安石甚惜之言於上曰元瑜在成都以一身抗范純仁謝景初李杲卿及部內承望監司風㫖之人純仁等皆莫能屈而其黨與多為元瑜奏其沮壞新法之罪被按劾又相度役事所至百姓輒數百或數千人為羣乞依元瑜相度施行仍乞免官司羅織不令陳述利便之罪然純仁景初等終羅織狀首及元瑜奏其事狀首乃得釋今死矣恩顧不及其子上曰元瑜盡力宜與一子官馮京曰元瑜權發遣於近制不當推恩上特令與之又令中使護其喪歸葬又賜絹三百匹詔尚衣庫官物等併入內衣物庫仍改內衣物庫為尚衣庫廢綿州西昌縣入龍安神泉象州武化縣同州夏陽縣為鎮舊紀書廢三縣新紀削去
