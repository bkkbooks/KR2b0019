body:
  text: 續資治通鑑長編巻三百一宋李燾撰神宗元豐二年十一月乙丑朔禮院言明道山陵故事啟菆百官服初䘮服入内省内侍省都知押班以下并軍員三班使臣伎術官不服請如故事詔都知押班以下並如百官服初䘮服餘如故事詔京朝官選人使臣試中經律令義第一人循一資稍優四人堂除中等百三十人與先次家便下等三百三十六人注官丁夘罷京西路轉運副使周約以權發遣度支判官太子中舍李察代之候山陵畢歸本司追封文思使李諒母天水縣太君趙氏為永嘉郡夫人以諒言趙氏韓王普之曾孫獻穆大長公主之諸婦乞依伯父端懿妻加贈例也三司言福建路蠟茶自禁私販官場漸多售者乞自今歲計所市茶預下轉運司限當年運至京師其江浙荆湖川陜路即權許通商從之戊辰詔諸路州縣並禁樂至卒哭既而禮院言案禮葬而後虞虞而後卒哭卒哭而後祔景徳中明徳皇后百日為卒哭卒哭後不禁樂以百日為卒哭蓋古之士禮不當施於朝廷廼詔改卒哭為百日庚午詔國子監直講潁州團練推官王沇之除名永不收叙太常丞余中追一官勒停監東作坊門河南左軍廵判官王沔之祕書丞范峒衝替沇之坐受太學生章公弼賂補上舍不以實罪當徒二年中坐受太學生陳度賂罪當杖峒坐為封彌官漏字號沔之沇之弟亦坐納賂囑請於中沇之等皆因虞蕃上書下御史臺案劾又用御史何正臣之請獄辭所及雖蕃所不言皆得究治沇之等雖㑹赦降猶特責之沇之始議送湖南安置既而止除名然太學一獄踰年方決追逮徧四方蓋舒亶何正臣為之詔䖍州槍仗手千五百三十六人撫州建昌軍鄉丁關軍槍仗手各千七百十八人為定額每嵗農隙輪監司提舉司官按閱武藝以備姦盗從前江西轉運副使蔣之竒請也樞宻直學士尚書右丞致仕李參卒乙亥詔濮安懿王夫人遷祔濮園其令禮官議所以將奉禮儀以聞丙子知審官東院陳襄乞委本院官重定本院敕令式從之丁丑翰林學士章惇言竊稽典禮下不得誄上則大行太皇太后諡號蓋非臣子之所敢專必將有所請謂若請之太廟於禮為宜願付禮官詳議於是禮院言孝明皇后之䘮百官書諡議讀之於廟上于靈座詔尚書省集百官議皆曰母后之諡則宜定於廟而讀之以明受成於祖宗孝明皇后諡請百官議定制下乃遣官吿于太廟而不讀今參詳古者諡法后受之於夫臣受之於君大行太皇太后作配仁祖於禮為尊宜集官諡之於廟又㓜不誄長子不爵母内英宗皇帝廟室於禮不當請諡欲乞集中書樞宻院侍從官御史臺五品尚書省四品諸司三品宗室正任團練使以上赴太廟行請諡之禮然後詔有司作冊寳吿于天地宗廟社稷讀于慶夀殿從之惇又言祖宗諸后諡皆二字惟章獻明肅四字奏禀上批太皇太后功徳盛大振古無有四字為諡大懼未足形容萬一姑循故事而已宜以四字定諡新紀於壬辰日書詔大行太皇太后以四字定諡己夘大祥祭如小祥禮先是禮院上大祥儀注皇帝祥祭訖釋小祥服服素紗幞頭幓黄衫黑銀帶羣臣移班奉慰上批宫中自實行三年之䘮宜不俟釋服受羣臣慰禮至是祥祭畢上衰服如故御殿之東間羣臣奉慰詔嵗增給定州公使造酒糯米四百石其冗食使臣仍别減定先是定州路安撫使薛向言公使錢舊嵗費萬二千餘緡熈寧七年裁為八千緡後增將官將下增押隊使臣軍班換前班武舉及第使臣凖備差使教押軍隊指使市易務監官視舊增二十三員公使錢不能贍兼極邊錢帛糧草常患不足當無事時增置使臣冗食廩禄亦恐未為得策乞增公使錢并裁減諸路近嵗增置冗食使臣故有是詔庚辰詔禁軍教閱廂軍毋得以為作院工匠壬午命輔臣祈雪癸未上初見羣臣於崇政殿西廡幄次自是日御崇政殿聽政新舊紀並書始御殿舊紀又書哀動左右四字己丑上不視事羣臣請大行太皇太后諡于太廟庚寅詔西京左藏庫黄金滿等十人等第遷官論討儂智春功也祠部言元豐元年出度僧牒九千三百六十今年出七千九百四十二上欲知二年之數詔祠部以聞故也辛夘詔遷祔濮安懿王三夫人給鹵簿全仗至國門外減半以翰林學士章惇為遷䕶使入内東頭供奉官勾當御藥院李舜舉為遷䕶都監賜主奉祠事濮國公宗暉銀二千兩絹二千匹錢三千緡以給葬具詔太子少師致仕李端愿故獻穆大長公主之子自致仕後特給節度俸見錢之半餘人不得援以為例端愿初以太子少保致仕詔給節度使俸錢之半至是驅磨請受官以謂非前任兩府不當得見錢有增請錢萬餘緡端愿自陳故有是詔權三司使李承之户部副使王居卿判官劉珵各罰銅十斤以手詔大行太皇太后神主虞主用桑栗二材即為神體三司乃榜雜買務市於閭閻下民之家䙝瀆之甚無易於此故罰之録廣南西路鈐轄張述子援為三班借職賜其家絹百匹述殁於順州援亦自有戰功故優録之也明州言髙麗貢使乞市坐船詔以靈飛順濟神舟借之又言明州象山縣尉張中嘗以詩遺髙麗貢使詔中衝替壬辰吳充等上表請御正殿不允五請乃從之翰林學士章惇言宜以祖宗之命奉上太皇太后尊諡曰慈聖光獻詔恭依前權廣南東路提㸃刑獄許懋知賀州王諤言韶英南雄連賀端康封新九州宜依廣惠循潮南恩五州例於四等以上主户三丁取一為槍手從之録内殿崇班順州同廵檢吳昊子愿為三班差使昊以瘴歿故也起居舍人龍圖閣待制知桂州曾布為龍圖閣直學士以措置交阯事畢推恩也賜度牒三百給廣州濬城壕詔豐州許依威茂州舉選人為京職官縣令癸巳詔開封府界教大保長充教頭其提舉官以昭宣使果州防禦使入内副都知王中正東上閤門使榮州刺史狄諮為之初王安石議減正兵以保甲民兵代之於是始置提舉教閱之使後又及於西北三路太祖皇帝懲唐末五代之亂始為軍制聯營厚禄以收才武之士宿重兵於京師以消四方不軌之氣畨休互遷使不得乆而生變故百餘年天下無事雖漢唐盛時不可以為比養兵之費一出於民而禦戎捍冦民不知有金革之事安石曾不深究而輕議變易茍欲以三代之法行之於今蓋不思本末不相稱而利害異也世議不以為然後卒改焉此據墨本編入朱本簽貼云檢㑹王安石日録安石嘗建言於先帝曰惟太祖軍制於今可行今所置保甲民兵也於太祖軍中制法並不相干則先朝未嘗改太祖軍制前史官乃以三代兵農之法為非以誣先朝善政合刪去新本仍復存之今并載朱史簽貼觀者當辨之西北三路置提舉保甲在三年六月十五日王中正諮等支賜在此年十二月二十七日兵志二年十一月始立府界集教大保長法以昭宣使入内内侍省副都知王中正東上閤門使狄諮兼提舉府界教保甲大保長總二十二縣為教場十一所大保長凡二千八百二十五人每十人一色事藝置教頭一凡禁軍教頭二百七十都教頭三十使臣十弓以八斗九斗一石為三等弩以二石四斗二石七斗三石為三等馬射九斗八斗為二等其材力超㧞者為出等當教時月給錢三千日給食官予戎械戰袍又具銀鍱酒醪以為賞犒三年大保長藝成乃立團教法以大保長為教頭教保丁焉凡一都保以相近者分為五團即本團都副保正所居空地聚教之以大保長藝成者十人衮教五日一周五分其丁以其一為騎二為弓三為弩府界法成乃推之三路各置文武官一人提舉三年以下未見實月日姑附此須考三路各置提舉官在三年六月十五日詔金部郎中權判都水監范子淵減磨勘二年餘推恩有差以疏濬汴河有勞也權荆湖南路轉運副使祠部員外郎集賢校理朱初平直集賢院賜度僧牒三千給兖州修孔子廟十二月戊戌詔自今解發進士太學以五百人開封府以百人為額舊制開封三百三十五人國子監百六十人熈寧八年合為一以解額通取至是復分而太學生數多故損開封解額以益之朱史云上欲漸復鄉舉里選之制廢科舉使土田學校以命官故損開封解額以益太學又簽貼云以臣京親聞并中書時政修入此盖蔡京私意也新本止從墨本今亦不取成都府利州路鈐轄司言往時川峽絹匹為錢二千六百以此編敕估贓兩鐡錢當銅錢之一近嵗絹匹不過千三百估贓二匹乃得一匹之罪多不至重法盗賊浸多法寺乞以一錢半當銅錢之一從之己亥禮院言奉詔詳定濮安懿王三夫人遷祔儀請依令用一品鹵簿依晉國大長公主故事用鼓吹從之仍詔啟菆等禮止令宗暉祭吿作哀誌祝文並遷䕶使代作涇原路經畧司言西人張靈周努偽為漢人來偵邊事㑹徳音當釋詔刺配郴州牢城詔外界青白鹽入河東路犯人罪至流者廵檢或寨主監押津堡官先次差替從河東轉運使陳安石請也庚子安陽縣主簿虞蕡江隂縣主簿蔡卞光禄寺丞袁黙杭州州學教授梅灝並為國子監直講汝州司户參軍丁執古為太學正睦州司户參軍葉景文為太學録並從張璪薦也録故䖍州觀察使趙光嗣曾孫說為三班借職說母尹氏自陳光嗣淳化中賜姓授禮賔副使擒夏州節度使趙保忠遷夏州防禦使贈䖍州觀察使今子孫補官者皆亡故録之詔御史臺重修一司敕詔罷差西南兩路管勾祔葬文臣詔元日御殿儀仗人均差天武神衞兵士壬寅禮院言故事見任文武升朝官之家候祔廟畢嫁娶京官以下過禫除臣子䘮制一等而用吉禮有逺近之差非是乞見任文武官之家候九虞祭畢為卒哭許嫁娶軍民過易月禫除不禁仍不用花綵從之詔自今申請財利與市易相干者先下都提舉市易司相度都大提舉市易司王居卿言嵗賜州府合藥錢大郡二百千小郡百千乞以賜錢之半買藥於市易務餘聽州府自合藥從之地逺不願買者聽詔荆南團結雄畧等十二指揮昨戍順州等處瘴歿數多其議優卹之軍員子孫令歩軍司降等安排有殘疾及不願為兵若無子孫者第賜緡錢内軍士子孫弟姪刺為兵並給賻自除籍後更給糧兩月填本軍仍給其家孝贈即父母年七十以上而無子孫可依者特給小分請受詔保州廣信安肅順安軍興置水利令定州路安撫使兼本路制置屯田使以定州路制置屯田使司為名差知保州張利一河北沿邊安撫使劉琯兼同管勾定州路屯田公事大理寺丞楊嬰充制置屯田司勾當公事應係興置水利州軍並逐州軍知州通判兼管勾本州軍屯田公事時政記初八日事二十七日改司名癸夘遣官分詣近京嶽瀆神祠祈雪乙巳御史中丞李定等言竊以取士兼察行藝則是古者鄉里之選蓋藝可以一日而校行則非厯嵗月不可攷今酌周官書攷賔興之意為太學三舍選察升補之法上國子監敕式令并學令凡百四十三條詔行之初太學生檀宗益上書言太學教養之策有七一尊講官二重正禄三正三舍四擇長諭五增小學六嚴責罰七崇司業上覽其言以為可行命定與畢仲衍蔡京范鏜張璪同立法至是上之太學置齋舍八十齋齋容三十人外舍生二千内舍生三百上舍生百總二千四百生員入學本貫若所在州給文據試而後入月一私試嵗一公試補内舍生間嵗又一試補上舍生封彌謄録如貢舉法而上舍則學官不與考校諸齋月書學生行藝以帥教不戾規矩為行治經程文合格為藝齋長諭學録學正直講主判官以次考察籍記公試外舍生入第一第二等參以所書行藝預籍者升内舍内舍生試入優平二等參以行藝升上舍分三等俱優為上一優一平為中俱平若一優一不為下上等命以官中等免禮部試下等免解以升補人行藝進退計人數多寡為學官之賞罰縁升舍為姦者論如違制律不用去官赦原學正增為五人學録增為十人學録參以學生為之舊紀書頒國子監敕式令學令新紀但書學令丙午御史舒亶言今法度之在天下其官吏之賢否猶有監司案視焉至於京師之官府乃漫不省治而御史或莫得行其職也誠使應在京官司御史得以檢察按治一切若監司之於郡縣且庶幾人知畏嚮而法度有維持是亦周官之遺意詔取編敕所海行在京官司見行條貫并一時指揮並録送御史臺如官司有奉行違慢即具彈奏除中書樞宻外仍許暫索文字看詳後御史中丞李定言乞依故事復置吏兵户刑禮工六案㸃檢在京官司文字每案置吏二人罷推直官二員從之仍增置臺官一員職官志以舒亶言繫之熈寧九年誤也仍增置臺官一員當考三年五月二日增主簿一員舊紀書御史臺随尚書六曹置六察糾在京官司新紀但書置御史六察定州安撫使韓絳言大理寺丞楊嬰尋訪得定州界西自山麓東接塘淀綿地百餘里可以瀦水設為險固願聽營葺從之仍以引水灌田陂為名初八日又二十七日可考增雄州公使錢二千緡以坊場錢給以知雄州苖授言熈寧中裁減公使錢為八千緡用度不足州當國信往來頓舍之地非他郡比故也丁未太常丞檢正中書孔目吏房公事曾伉減磨勘二年賜銀絹檢詳文字官吏等推恩有差以詳定閑冗文字畢也御史舒亶言比聞朝廷遣中官出使所至多委州郡造買器物其當職官承望風㫖追呼督索無所不至逺方之民受弊良甚乞重立條約詔兩浙提㸃刑獄司體量實狀以聞戊申詔三司委諸路監司檢察撫養士卒犒設蕃部錢具有無違法以聞詔蓬閬州免役錢以家業多少定數以利州路提㸃司言所部役錢法未均蓬閬二州上户家業多而稅錢少下戸家業少而稅錢多至第一第二等户輸納錢少於第四第五等故也廣南西路提舉常平等事劉誼言廣西一路户口纔二十餘萬蓋不過江淮一大郡而民出役錢至十九萬緡募役實用錢十四萬緡餘四萬緡謂之寛剩百姓貧乏非他路比上等之家不能當湖湘中下之戸而役錢之出槩用稅錢稅錢既少又敷之田米田米不足復算於身丁廣西之民身之有丁也既稅以錢又算以米是一身已輸二稅殆前世弊法今既未能蠲除之而又敷以役錢甚可憫也奈何州郡冗費略不裁損一切與他路同乎勘㑹廣南東西路監司提舉司吏人一月請給上同於令録下倍於攝官責之倉法不免時時貨取風聞迹露遂行首吿甚不稱朝廷厚禄養㢘之義謂當裁損以減雇錢庶以寛身丁田米之所出與夫下户役錢甚大利也詔下本路提舉官齊諶相度諶謂監司提舉司吏及通引官客司月給錢第減二千嵗可減役錢一千二百餘緡從之朱本簽貼誼章云無施行例不書前史官載此欲以誣役法非便今刪去新本已如墨本具載今從之辛亥詔河東路經略司如西人深入㓂掠許以西界投降人馬與擄過漢界人馬交㑹以本司言西人欲交㑹故也權發遣瀘州喬叙言乞委臣宻諭羅氏鬼主若乞弟尚敢擾邊聽羅氏一面討伐隨功酬答詔叙常以恩信撫納無令失其歡心五月六日叙乞廵邊提舉廣南東路常平等事林顔言今天下之民家為之保保為之長長為之正者豈特不容其姦而已蓋歸兵食於農藏武士於耕夫所謂教而後使之道也故其法一總於兵部而畿内之人陛下又嵗賜引見旌其藝能以勸之其在五路則又使有司以時遣官分行案視法既乆而令益信然則舉而加諸四方其無不聽者今二廣之民亦有五保之籍竊聞廣西縁邊稍已肄習武藝東路雖間有槍手然保甲之教尚闕欲乞本路沿江海諸州依西路法訓閱使其人既熟山川之險易而又知夫弓矢金鼔之習則一方自足為備可以不勞北兵矣詔下廣南東路經畧轉運提舉鈐轄司相度皆言廣惠潮封康端南恩七州皆並邊及江海外接蠻賊可依西路保甲教習武藝從之顔福州人也舊紀書辛亥詔廣南東路保甲𨽻以武事新紀不書壬子詔開封府界牧地可耕者為官莊從都大提舉淤田司請也鄜延路經畧使吕惠卿言西人來畧綏平寨雕窠鋪權都監髙永能等與戰有功詔以功次減磨勘年轉資給賜有差定州路安撫司言廣信軍民于原逃入北界妻子初實不知詔原家屬送荆南編管廣信軍官吏不覺察劾罪以聞雖遇徳音不原癸丑增明州公使錢為二千六百緡以髙麗貢使出入故也丙辰庫部員外郎權發遣福建路轉運使賈青遷祠部郎中以措置鹽事有勞也出度僧牒二千給景靈宫諸神御殿供帳之費録北界人翟公瑾為三班借職差江南指使以定州路安撫司言公瑾屢泄契丹事懼禍挈妻子來歸故也定州韓絳乞借安撫司封樁錢五千緡市水地為屯田從之丁巳始御垂拱殿舊紀書此新紀削去詔諸路應發坊場錢百萬緡令司農寺分定逐路年額立限於内藏庫寄納戊午詔御史中丞李定同御史丁執禮舒亶何正臣根治三司及提舉帳司互奏事實以聞時提舉帳司王安禮與管勾帳官孫把互有所奏故也三年正月二十七日王安禮罰銅御史舒亶言流内銓選人舊無籍記其間妄冒偽濫之弊官司莫得而知乞置簿以備檢用從之己未詔在京市易務官吏轉官減磨勘年賜緡錢有差以三司言市易務去年八月至今年七月收息錢市利錢總百三十三萬餘緡也賜前知渭州徐禧錢五百千以措置邊防事畢禧遭䘮去官也改開逺門外浮橋為土橋從提舉導洛通汴司請也庚申遼主遣長寧軍節度使蕭寧太常少卿史館修撰韓君俞來賀正旦詔都官員外郎權發遣三司度支判官李琮陞一任餘減磨勘年循資堂除先次優便差遣者二十八人以根究江東兩浙路逃絶虧陷稅役等錢九十九萬緡也祠部員外郎直史館蘇軾責授檢校水部員外郎黄州團練副使本州安置不得簽書公事令御史臺差人轉押前去絳州團練使駙馬都尉王詵追兩官勒停著作佐郎簽書應天府判官蘇轍監筠州鹽酒稅務正字王鞏監賔州鹽酒稅務令開封府差人押出門趣赴任太子少師致仕張方平知制誥李清臣罰銅三十斤端明殿學士司馬光户部侍郎致仕范鎮知開封府錢藻知審官東院陳襄京東轉運使劉攽淮南西路提㸃刑獄李常知福州孫覺知亳州曾鞏知河中府王汾知宗正丞劉摯著作佐郎黄庭堅衞尉寺丞戚秉道正字吳琯知考城縣盛僑知滕縣王安上樂清縣令周邠監仁和縣鹽稅杜子方監澶州酒稅顔復選人陳珪錢世雄各罰銅二十斤初御史臺既以軾具獄上法寺當徒二年㑹赦當原於是中丞李定言軾起於草野垢賤之餘朝廷待以郎官館職不為不厚所宜忠信正直思所以報上之施而乃怨未顯用肆意縱言譏諷時政自熈寧以來陛下所造法度悉以為非古之議令者猶有死而無赦况軾所著文字訕上惑衆豈徒議令之比軾之姦慝今已具服不屏之逺方則亂俗再使之從政則壞法伏乞特行廢絶以釋天下之惑御史舒亶又言駙馬都尉王詵收受軾譏諷朝政文字及遺軾錢物并與王鞏往還漏泄禁中語竊以軾之怨望詆訕君父蓋雖行路猶所諱聞而詵恬有軾言不以上報既乃隂通貨賂宻與燕游至若鞏者嚮連逆黨已坐廢停詵於此時同罣論議而不自省懼尚相關通案詵受國厚恩列在近戚而朋比匪人志趣如此原情議罪實不容誅乞不以赦論又言收受軾譏諷朝政文字人除王詵王鞏李清臣外張方平而下凡二十二人如盛僑周邠軰固無足論乃若方平與司馬光范鎮錢藻陳襄曾鞏孫覺李常劉攽劉摯等蓋皆畧能誦說先王之言辱在公卿士大夫之列而陛下所當以君臣之義望之者所懷如此顧可置而不誅乎疏奏軾等皆特責獄事起詵嘗屬轍宻報軾而轍不以吿官亦降黜焉軾初下獄方平及鎮皆上書救之不報方平書曰臣讀春秋傳晉叔向被囚時祁奚老矣聞之乘馹而見執政韓起為言叔向謀而寡過惠訓不倦宜䝉寛宥之意起與之同乘以言諸公而免之祁奚不見叔向而歸葢祁奚之言爲國非私叔向也今日𫝊聞有使者追蘇軾過南京當屬吏臣不詳知軾之所坐而早嘗識其爲人起逺方孤生遭遇聖明之世然其文學實天下之奇才向舉制策髙等而猶碌碌無以異於流軰陛下振拔特加眷奬由是材譽益著軾自謂見知明主亦慨然有報上之心但其性資疎率闕於審重出位多言以速尤悔頃年以來聞軾屢有封章特爲陛下優容四方聞之莫不感歎聖明寛大之徳而尤軾狂易輕發之性今其得罪必縁故態但陛下於四海生靈如天之無不覆冒如地之無不持載如四時之無不化育於一蘇軾豈所好惡伏惟英聖之主方立非常之功固在廣收材能使之以器若不棄瑕含垢則人才有可惜者昔季布親窘髙祖夏侯勝誹謗世宗鮑永不從光武陳琳毁詆魏武魏徴謀危太宗此五臣者罪至大而不可赦者也遭遇明主皆為曲法而全之卒爲忠臣有補於世自夫子刪詩取諸諷刺以為言之者無罪聞之者足以戒故詩人之作其甚者以至指斥當世之事語涉謗黷不恭亦未聞見收而下獄也唐韓愈上疏憲宗以為人主事佛則夀促此言至不順憲宗初大怒欲誅之其後思之曰愈亦是愛我今軾但以文辭為罪非大過惡臣恐付之狴牢罪有不測惟陛下聖度免其禁繫以全始終之賜雖重加譴謫敢不甘心臣自念朽質上荷異恩今伏在田廬無復涓埃之補竊慕祁奚雖老猶不忘公室而申請叔向之義僭越上言自干鼎鉞朱本改墨本云軾坐乆不得進怨望凡上所施為皆作詩詆訿無所不至及受僧屬以畫為求紫衣度牒於王詵詵坐受軾謗訕文書及借軾錢携婢妾出城與宴飲事發更遣人抵鞏轍諭使毀匿所謗訕文書轍坐受詵指諭鞏坐與詵軾交通而方平等亦並與軾往還受其謗訕歌詩按朱本所改舒亶章云隂通貨賂宻與游宴可具見矣坐乆不得進怨望詆訿則史臣崇飾之辭也今但依墨本及新本又朱本亦不載李定言方平鎮救軾據邵伯温聞見録方平疏取之本集鎮疏未見劉安世元城語録云方平疏亦不果投當考王銍元祐補録沈括集云括素與蘇軾同在館閣軾論事與時異補外括察訪兩浙陛辭神宗語括曰蘇軾通判杭州卿其善遇之括至杭與軾論舊求手録近詩一通歸則籖貼以進云詞皆訕懟軾聞之復寄詩劉恕戯曰不憂進了也其後李定舒亶論軾詩置獄實本於括云元祐中軾知杭州括閑廢在潤往來迎謁恭甚軾益薄其為人此事附注當考詳恐年月先後差池不合軾既下獄衆危之莫敢正言者直舍人院王安禮乘間進曰自古大度之君不以語言謫人按軾文士本以才自奮謂爵位可立取顧碌碌如此其中不能無觖望今一旦致於法恐後世謂不能容才願陛下無庸竟其獄上曰朕固不深譴特欲申言者路耳行為卿貰之既而戒安禮曰第去勿漏言軾前賈怨於衆恐言者縁軾以害卿也始安禮在殿廬見御史中丞李定問軾安否状定曰軾與金陵丞相論事不合公幸毋營解人將以為黨至是歸舍人院遇諫官張璪忿然作色曰公果救蘇軾耶何為詔趣其獄安禮不答其後獄果緩卒薄其罪此叚據田晝所作王安禮行狀舊紀書庚申直史館蘇軾怨望作詩詆訕貶黄州團練副使駙馬都尉王詵與軾燕游貨賂交通漏禁中語追兩官勒停王鞏等受軾謗訕詩降黜責金者二十三人新紀削去御吕本中雜說元豐中蘇子瞻自湖州以言語刺譏下史獄通畧云李定等言軾在七月己巳今聯書之吳充救軾據吕本中雜說王安禮救軾據田晝所作安禮行述吳充方為相一日問上魏武帝何如人上曰何足道充曰陛下動以堯舜為法薄魏武固宜然魏武猜忌如此猶能容禰衡陛下以堯舜為法而不能容一蘇軾何也上驚曰朕無他意止欲召他對獄考核是非爾行將放出也辛酉詔定州路安撫使韓絳提舉定州路水利事仍以提舉定州路水利司為名知保州張利一縁邊安撫副使劉琯管勾定州路水利公事大理寺丞楊嬰水利司勾當公事應興水利州軍知州通判並同管勾時保州廣信安肅順安軍興水利屯田詔以屯田司為名而絳言恐敵疑增塘濼故改之初八日可考詔提舉教習開封府界大保長王中正狄諮與上等支賜又詔依中正等所乞差開封縣保甲大張平等隨行㸃集使喚仍每人日與食錢五十文米二升又詔隨行監敎使臣十一人並特與給驛劵此並據御集增入中正詔與上等支賜及使臣驛劵皆二年十二月二十七日事大張平錢米亦二年事今附見十一月二十九日始差中正及諮提舉詔大理寺丞王觀除名永州編管坐如江都縣受賕枉法罪至流也壬戌詔恩賜歸明人田宅毋得質賣以編敕所言賜田宅本欲化外之人有業可歸不當許其質賣也詔軍士若係在公之人招捕及因亡匿首獲在大禮降御札後者賞賜減半給招捕及首獲去肆赦一月内者勿給從知保州張利一請也步軍司言奉詔唐汝州置土兵勇捷兩指揮以四百人為額請以唐州方城縣為右第十一指揮汝州襄城縣為左第十二指揮從之詔在京管軍臣僚外任路分兵官將副押隊使臣禁出謁及見賔客著為令詔開封府界旬上保甲依五路增給米月三斗詔雅州榮經縣依威茂黎三州免輸義倉米以所領户雜蕃人也甲子禮院言唐開元六年太常以昭成皇太后諡號不應稱太禮部報曰入廟稱后義繫於夫在朝稱太后義繫於子今百司文牒及奏狀恐不合除太字如諡冊入陵神主入廟即去太字奏可又大中祥符六年改正元德皇后徽名升祔於太宗廟室今參詳大行太皇太后祔仁宗陵廟當去太字冊文初稱大行太皇太后所上尊諡即稱慈聖光獻皇后諡寳宜以慈聖光獻皇后之寳為文餘行移文字及奏報即存太字從之皇城使知安肅軍王臨為兵部郎中直昭文館知齊州臨兄廣淵子得君賜同進士出身臨知安肅軍朝辭得召見上問廣淵家世臨具以對翌日手詔曰廣淵昔先帝在藩邸時早已知其姓名加意眷顧洎潛徳升聞入承大綂簡于淵衷彌所親厚逮治平纘服之初偶以哀傷過禮玉體爽豫而中外危論紛然錯出當時執政大臣亦已為之揺動廣淵以受遇感慨横身不懼委曲宣揚盛徳由是邪議少沮然亦未至釋然無疑繼得聖躬漸就康復羣臣雖日進見皆閔黙畏避莫能識察獨廣淵間受密㫖道其實於二府自是先帝始得親決庶政以幸天下跡其公忠王朝固非淺尠者不幸命竒未及褒顯遽已云殁今獨其弟臨其子得君仕宦稍著其議旌録之故有是命元豐元年三月二十三日王得君與堂除差遣可并入此王臨換官除職得君賜出身史不著其年月據臨元豐元年十一月自陳表云是元豐二年今附見年末按御集詔書凡是上所自撰者皆編次獨無此詔書不知何故當考墨本廣淵傳亦無此詔獨朱本有之詔書言英宗始得親決庶政似與慈聖光獻傳稍相違戾不知果是何月日下詔當考是歲宗室賜名授官者四十七人斷大辟八百六人
