body:
  text: 續資治通鑑長編卷三百二十七宋李燾撰神宗元豐五年六月辛亥朔蕃官皇城使李德明領資州團練使賞功也詔鄜延路轉運司葭蘆寨瀕河東路葭蘆寨對岸既城葭蘆即客户天渾定户等寨皆可省去合其兵力專事葭蘆委蔡曄相度施行既而曄以為不可廢詔鄜州制勘公事近追繫八十一人當此盛暑非人情所堪可限十日結案景思誼張誼張蕘發來赴闕如有罪案後以聞其得力蕃官亦先踈出有罪就鞫之四月甲寅遣宇文昌齡勘劉紹能於鄜州今催結案恐非紹能事五月丙戌張舜民送鄜州供答當是勘髙遵裕出界事景思誼張誼張蕘所坐當考七月十七日張蕘以通直郎上書擢環倅密記六月十四日甲子二十二日壬申七月五日甲申十三日壬辰二十二日辛丑皆合參照詔陜西都轉運司昨起乾糧千八百九十萬斤可以存留者隨處樁管不可存者兼充軍食詔陜西轉運司體究閿鄉令王師軻託疾避免部押人糧至軍前罪狀以聞又詔自今宗室防禦使轉觀察使已上聽大宗正司磨勘歷任保明奏降中書取㫖其副率至防禦使即中書磨勘進狀請畫敕授環慶經備司言斬西賊統軍威明墨沁威副統軍阿布雅得銅印起兵符契兵馬軍書并獲蕃丁頭凡三十八級詔以印符契兵馬軍書來上據張守約墓銘西賊犯懷安寨守約出他道斬二統軍蕃兵四十六級生禽八人發兵符契二甲馬六十四銅印六即此役也癸丑吏部尚書李清臣言嘗奏論門下中書省全録畫黃直付所司事今又於詳定官制所受到前批無押字畫黃四件雖著門下中書省官及名即無首尾可顯何處送到門下省進呈在格當録其事目留本省以畫黃付下既以書名則體不當押字而所承受官司各有付受歷照驗豈得不知來處詔清臣分析以聞其後罰銅十斤清臣傳云清臣為翰林學士詳定官制遷吏部尚書故事除官宰相與參知政事同進擬官制行獨中書省取㫖而尚書門下不預持權者病之數奏以迂回為言清臣請對具為上指陳尚書門下所以不便之意乃命清臣仍領官制有疑就質之執政怒摘前奏中語謂清臣有不當議者欲出之詔俾贖金清臣傳蓋因朝補之行狀載贖金事與實録不同附注當考上批張守約纍稱探得近邊賊馬屯聚今來出界帶領軍馬不少其所斬獲不多便稱今已小捷引回顯是過為大言中實畏怯不切前去掩戮方當盛暑虛有煩擾可令分析以聞既而守約自陳出竒掩擊所獲雖少然皆其酋領上釋之甲寅修兩朝正史成一百二十卷上服靴袍御埀拱殿引監修國史王圭修史官蒲宗孟李清臣王存趙彥若曾肇進讀紀傳賜圭銀絹千宗孟六百各賜對衣金帶改官並不聽辭免圭賜一子緋章服清臣存彥若肇子遷一官與修史官蘇頌黃履林希蔡卞劉奉世各賜銀絹有差故相吳充銀絹六百故史館修撰宋敏求百五十兩紀並書王圭上兩朝史河東轉運司言臣僚上言府州威遠麟州飛騎各兩指揮乞每州更增兩指揮許本路諸軍投換加料錢至五百本司據河外物價翔貴頓增馬軍四指揮似出非計乞仍舊料錢止招土人不許投換詔威逺飛騎見闕人數特增利物錢千招填候及元額以聞詔渭州推勘涇原轉運使葉康直公事可限十月結絶吏人免追此因朱本己未康直改陜西路運副先是涇原總管司承受文字梁同奏康直轉餉糧米腐惡不可食大抵為粟十八九難以責士死力上大怒曰關右之糧每斛數千而挽輸之費倍之今貴糴遠餉反不可用徒弊吾人於道路則康直可斬也王安禮曰一梁同言耳疑未得其實請按之上乃遣新陜西轉運判官張大寧與同參核其事且械康直於獄以待簿責焉既而審驗得米十八九意始解出康直於獄復其使事此據王安禮行狀增入康直初下獄是何時正月二十九日張舜民云云當考上批河東不能出力展托境土吳堡葭蘆今創為修築洎成但交割守之而已雖創添兩寨其實已併七寨人馬防戍餘皆舊日邊面未知因何如此艱難保據顯是上自主帥下至將佐惟欲廣占兵馬不恤耗蠧國財便已自營餘非所知其王居卿並管勾麟府路軍馬張世矩不可倚仗其别選官代之世矩降一官移西河路將西京左藏庫使吉州刺史內侍押班石得一再任皇城司得一再任皇城司朱本有之墨本不載今從朱本當考初任是何月日蘇利涉傳云利涉勾當皇城司循故事邏者報事不皆以聞後石得一代利涉事無巨細悉奏御且購以賞民間往往以飛語受禍利涉傳在神宗録元豐五年十月九日其後陸佃坐此被責事在紹聖二年二月四日韓駒云神宗置八廂探事人中官石得一領其事每夕語其下曰明日要好公事由是邏察嚴甚悉以付大理寺寺卿楊伋元祐間謫黃州東坡當制云豈有數年之間坐數萬人之獄謂此事也元豐七年內失一金盂上甚怒詔得一必獲賊得一奏乞捕者與供庫使犯者不問一切處斬及獲賊乃得一之子有司以斬論時謂報應致然熙河經略安撫司奏蘭州內外官屬法當撥地為圭田今新造之區居民未集耕墾人牛之具皆彊役之乞計數給以錢鈔而留其地以為營田或募弓箭手從之乙卯詔承事郎權管勾秦鳯路常平等事張大寧移永興軍路依舊兼提舉熙河等三路弓箭手營田蕃部是日三省因論奏趙彥若草吕公著告詞事王圭曰彥若性多執昨修國史龎籍傳种世衡之子古上書以其父首用間以殺雅爾旺營遂致元昊乞和龎籍為樞密使抑其功朝廷下御史臺定贈世衡防禦使彥若爭此一事久不决雖然事在境外固不可知上曰是不然當是時元昊作逆既久困於㸃集其勢已蹙非因世衡用間昔鄒與魯閧三戰而三北之小固不可以敵大以中國事勢元昊區區一小國爾安能抗也圭又曰世衡在青澗城久邊人至今思之以謂有良將才上曰世衡不知教養士卒使之樂戰欲以口舌取勝昔吳起為楚將損不急之官廢公族疏遠者以撫養戰鬭之士要在彊兵破馳說之從橫者遂成霸業此所謂知本矣初彥若草公著知定州告右丞王安禮父名益嫌用益字輒塗改數句彥若不從及權起居郎因對邇英閣奏之上曰安禮侵官當戒之月餘中書取安禮所塗草彥若即以進入故及之上批昨據李憲奏請涇原路自熙寧寨進置堡障直抵鳴沙城以為駐兵討賊之地朝廷悉力應副近李舜舉奏財糧未備人夫憚行朝廷以舜舉所言忠實可聽信已指揮放散人夫等更不追集諸路兵即是已罷深入攻取之䇿若賊犯邊自當應敵掩擊則守禦亦有定計勘㑹鄜延路止以本路事力於百里之外進築城寨討蕩屯聚賊馬今涇原如更兼熙秦兩路事力即不减七八萬兵若去邊面不遠進築堡壘自可止用廂軍饋運豈須更仰夫力或賊馬嘯聚正我所欲便可討殺如此舉動尚不可為則憲之初議直抵鳴沙萬一夫潰糧絶取侮更大令李憲依前詔速具利害以聞若果難興作即罷涇原路經略制置使歸熙河蘭㑹路經制司本任候過防秋赴闕已上朱本同先是朝廷知陜西困於夫役下詔諭民更不調夫至是李憲牒都轉運司復調夫饋糧以和雇為名官日給錢二百仍使人逼之云受密詔若軍須不辦聽擅斬都轉運使以下民間騷然出錢百緡不能雇一夫相聚立栅於山澤不受調吏往輒毆之解州枷知縣以督之不能集知州通判自詣縣督之亦不能集命巡檢尉逼之則執梃欲鬭州縣無如之何士卒前出寨凍餒死者什五六存者皆憚行倉庫蓄積所在空竭吕公著既罷羣臣無敢復諫者西京留守文彥博言師不可再舉上遜辭謝之此即二月二十五日答詔㑹李舜舉自涇原來為上泣言若再出師關中必亂上始信之乃令憲歸熙河舜舉退詣執政王圭迎勞之曰朝廷以邊事屬押班及李留後無西顧之憂矣舜舉曰四郊多壘此卿大夫之辱也相公當國而以邊事屬二內臣可乎內臣正宜供禁庭灑掃之職耳豈可當將帥之任邪聞者代圭發慙此據司馬記聞稍刪潤之陜西更不差夫見二月五日丁已敕榜先是五路出兵問罪夏國幾百萬行千里無所獲而歸上意欿然念未有以復其志者至是臨軒謂宰相王圭曰西師再舉趣以期上圭曰自古行師惟恐餽運不繼比朝廷捐錢鈔五百萬以佐軍食既有備矣復何虞尚書右丞王安禮曰圭所言特文具耳陛下誠聽之恐必誤國家事且鈔不可啖必變而為錢錢又變而為芻粟今五月矣使七月用兵則未易濟也上顧安禮曰卿亦知靈州事耶簡牘具存敕安禮就蔡確觀之安禮曰臣固不知靈州事然以今揆之未可再舉上曰姑徐議之後十數日見上有細書於䇿者出以示執政曰此熙河措置事也實李憲為之憲云昨欲行軍糗糧已具下至士卒藥石無不有也一聞罷師士皆喪氣憲宦者猶欲立事分朝廷憂卿等獨無意乎在唐憲宗時淮蔡為亂廷臣附和為含育計其謀議與主合者獨裴度耳故一舉而元濟殱焉惜乎度之謀議不出於公卿之上而乃在於閽寺之間朕甚陋之羣臣相視無以為對安禮曰淮西之叛非有險固可負特以兵利卒頑奕世擅命然必有裴度之謀光顔之忠李訴李祐之勇為之裨輔引天下方鎮屠之顧猶假以嵗月而後得志今夏國之彊非淮西之比也李憲之庸非裴度之匹也麾下諸將非有光顔訴祐之忠勇而五路之兵非有魏博朔方之節制自軍興以來士卒羸耗器械散亡幾盡當議所以蕃息之用兵非䇿也且異時陛下固嘗遣憲而憲輒辭今誠知其不可而彊欲請行此為姦言以釣其上不可不察於是上悵然感悟不復議再舉事此據田晝所為王安禮行狀附見更須考察鄜延路經略司言權葭蘆寨主折可適等乞給公使錢千緡置蕃落一指揮以五百人為額召募逃軍改刺或諸軍投換并招弓箭手借與地耕種詔公使錢給七百千招蕃落兵河東經略司相度餘從之詔自今事不以大小並中書省取㫖門下省覆奏尚書省施行三省同得㫖事更不帶三省字行出是日輔臣有言中書省獨取㫖事體太重上曰三省體均中書省揆而議之門下省審而覆之尚書省承而行之茍有不當自可論奏不當緣此以亂體統也先是官制所雖倣舊三省之名而莫能究其分省設官之意乃釐中書門下為三各得取㫖出命既紛然無統紀至是上一言遂定體統也已上據墨本已下據朱本初上欲倣唐六典修改官制王圭蔡確力贊之官制以中書造命行無法式事門下審覆行有法式事尚書省奉行三省分班奏事各行其職而政柄盡歸中書確先說圭曰公久在相位必拜中書令故圭不疑一日確因奏事罷留身密言三省長官位高恐不須設只以左僕射兼門下侍郎右僕射兼中書侍郎各主兩省事可也上以為然已而確果獨專政柄凡除吏圭皆不與聞後纍月圭乃言臣偹位宰相不與聞進退百官請尚書省官及諸道帥臣許臣同議上許之此據蔡興宗官制舊典當考神宗職官志門下省受天下之成事凡中書省樞密院所被㫖尚書省所上法式事皆奏覆審駁之中書省凡事干興革增損而非法式所載者論定而上之三省並建政事自以大事出門下其次出中書又以次出尚書皆以黃牒付外衆以為當然王安禮初不預官制事乃為上言曰政畏多門要當歸於一特所經歷異耳今也别而為三則本末不相見是何異秦齊二王教與詔敕雜行安所適從臣以謂事無巨細宣於中書奉於門下至尚書行之則盡善矣從之蔡確既為右僕射且兼中書侍郎欲以自大乃議尚書省關移中書當加上字以重之王安禮爭曰三省天子攸司政事所自出禮宜均一確乃欲因人而為輕重是法繇人變也非所以敬國家已而正色問上曰陛下用確為宰相豈以材術卓異有絶人者抑亦叙次遷陟適在此位耶上曰適在此位又曰固適在此位安禮顧謂確曰陛下謂適在此位何自大如此上每燕見大臣多及前代興亡事必究論帝王之賢否嘗曰唐德宗雖播遷然天資聰明不失為英主安禮曰德宗之為君見近而不及遠務末而不知本方在奉天時遣人偵賊中事索襦袴豫之無有而乃深自悔恨未及反正置瓊林大盈以懲其失殊不知致朱泚之亂者乃自於算商賈稅間架以植怨於民使涇原叛兵得以藉口此而聰明孰非聰明者上臨御久羣臣俯伏聽命無能有所論說時因奏事有被詰謫者安禮進說曰陛下固聖矣而左右輔弼宜擇自好之士有廉隅者居之則朝廷尊彼奊詬者見利而逝至於論事苟取容恱偷為一切之計而已人主將何便如此上善其言四事並據田晝行狀附此更須考詳上批涇原路進築城寨已降朝㫖權住興役其宣政使宣州觀察使入內副都知李憲去年功賞未施行可勘㑹取㫖於是三省樞密院以前十二月己巳指揮除憲景福殿使武信軍留後仍賜銀絹各二千匹兩四年十二月十七日己巳御史臺言察按㸃檢羣牧使韓縝替日以官物入私家已一年本臺今年正月按舉三月方納入官羣牧司亦不公行詔付大理寺并十二月二日丁巳軍器監言相州都作院造防城箭三十三萬河北無竹笴乞依定州用樺木笴從之江南東路提㸃刑獄范峋言體量江南西路州縣違法抑配賣鹽事曾伉具析鋪户賣鹽事但有當增减處州縣不時改正詔曾伉㸃檢舉不如法者有未便即具奏請江西民病蹇周輔鹽法而范峋曾伉但以州縣違法為言也朱本云此假入三月乙酉體量處書訖今仍附本日御史王祖道言鄜延路轉運判官李稷督夫糧出界令依陳法務崇虛文不恤事實民夫固不知有行伍部分之法所轄官吏又非所部紛亂雜蹂即肆殺戮不能禁止况夫隊常去大軍十餘里間卒遇賊兵不知何以捍禦方大兵未行以十萬坐食之夫頓於五龍川者十日比及出界糧食已乏逃亡者半乃妄言苦寒所致以規免乏軍之罪頃出界往回未嘗有大雨雪稷之欺罔明甚如稷具圖來上部伍行列指掌可觀及其推行紊亂一不如所言議者以稷惟事作威不知恤衆自安定堡摺運至無定河一日斬數十人故衆潰棄而去今稷雖奪官得全首領已幸豈可復領將輸伍乞按察詔提㸃刑獄胡宗回與沈括體量以聞戊午宰臣王圭言天聖中修真宗正史成别録三朝寶訓以備省覽今當修仁宗英宗兩朝寶訓詔祕書省著作局依例修進差林希曾肇舊紀書戊午命官修兩朝寶訓新紀書詔修寶訓接兩朝史下詔成都府路應副瀘川邊事依梓州路曲赦免二稅役錢别路凖此舊紀書詔供瀘州軍須者蠲其稅役新紀書蠲成都府路瀘州軍須者稅他路亦如之提舉河東路保甲司言凖朝㫖保甲以家聨保以丁聨兵小保長以上緣兵置今三路施行如有未便事理條畫以聞本司今相度以家聨保差免敇內保甲以二丁義勇以三丁入保單丁客户並為附保今欲乞除官户女户歸明人子孫刺事人河北沿邊弓手户合依舊附保外其客户單丁户及免丁之人自合排入家保責以互相覺察以丁聨兵詳差免敇本縣與都保别置簿遇有事故如外來及進丁限五日開收分併今欲乞限五日申舉開收限一年分併其未分之間多者就近權附少者姑闕若地里相遠餘丁不可聨者從舊法小保長以上緣兵置家保之法無所與於兵政至其覺察欺詐襲逐姦盜亦其所當有事於保伍之間非有總率無緣齊一今欲應家保之內有大小保長亦既干預本保內事並令就轄家保所貴上下有分緩急易使從之其分併限三年三月戊戍云云己未以涇原路轉運副使朝奉郎葉康直權發遣陜西路轉運副使環慶府轉運判官降授宣德郎范純粹權管勾陜西路轉運判官鄜延路轉運判官降授奉議郎李稷充陜西路轉運判官給事中陸佃禮部員外郎王子韶上重修說文各賜銀絹百其書不行其書不行當考上批先有西界對境圖興師西討以來諸處奏報文字指畫山川道里多有異同無以考證可令逐路選委昨出界熟知賊境次第使臣蕃官差精切畫工同指說山川堡寨應西賊聚兵處地名畫對境地圖以色别之上樞密院取到舊對境圖及軍興奏報文字比對考校繪為五路都對境圖辛酉詔自今紫衣師名止令尚書祠部給牒牒用綾紙受紫衣師名者納綾紙錢六百是嵗十月優詔依度僧牒例用紙是日輔臣論及人材上曰人材固有大小然古之立功名者管仲之於齊商鞅之於秦吳起之於楚皆能使政令必行若於道則未也傅說之於商周公之於周可謂尚道義而兼功名者也人臣但能言道義而亡功名之實亦無補於事張璪對曰人臣患能言道義而不能知茍能知之功名不足道也上曰土苴緒餘足以為天下正此也詔廣南路保甲依戎瀘例令自置褁頭無刃槍竹鏢排木弓刀蒿箭等在保下閲習若遇捕盜器甲並從官給上批宜州管勾溪峒安化三州連嵗荐饑加以去年大雪凍斃耕牛致羅世念等結集劫掠若不乘時委官宣布恩惠廣為賑濟則一方生靈枉被殺戮可審議選官措置乃差權荆湖南路轉運使朱初平廣南西路轉運副使馬默仍賜斛㪷二萬石又詔朝廷之意非欲取其地但欲省地及蠻蛋各免饑殍侵略之災毋得輒有開拓招納别致生事五月末世念攻德謹寨又此月丁卯己巳壬戍詔諸路探報西賊人馬處處蟻集慮乘秋犯塞令諸路常體測如大入界衝突並令城寨堅壁清野使賊無所得相度機便擊其惰歸熙河蘭㑹路經略司言供奉官孫晞與部落殿侍馬凌等以船接取黃河北投漢部落不虞西賊用詐虜之近馬凌等復逃歸言孫晞已被殺詔贈晞皇城副使官其二子賜銀絹酒米有差晞被虜已見四月十九日庚子此但合著被殺及贈官事文思使文州刺史內侍押班李舜舉領嘉州團練使癸亥詔尚書省六曹事應取㫖者皆尚書省檢具條例上中書省又詔門下中書省已得㫖者自今不得批劄行下皆送尚書省施行著為令詳定官制所言定到制授敕授奏授告身式從之翌日詔官告及奏鈔體式令官制所取房𤣥齡官告看詳改定以聞并癸亥詔翰林醫官院改為翰林院醫官局使副已下如舊丁卯墨史誤書朱史移入此今從朱史又詔六曹申尚書省送中書及過門下省文字皆隨事立日限即尚書省事應取㫖者皆日具件數録目尾結甲子中散大夫知陜州劉航為太僕卿方五路西討公私不虞軍興諸州不知所措令佐荷校督民於田里民多棄田宅至或自殺獨航在陜為政令期㑹如平時比他州亦先集陜民深德之為立生祠於召伯祠旁詔趙濟比聞西賊人馬嘯聚熙河並邊猝有奔衝自宜豫慮可按省蘭州及定西城等處守禦器具孰備孰闕所當調發無有後時之悔林廣言準御前劄子封付臣賞軍功告身宣劄等臣契勘隨軍出入與不顧死亡用命之人恩賞即無等差并引戰擁隊將校等隊下獲級所得酬奬比韓存寶奏功推賞不同詔引戰擁隊七級與遷一資毋加等推賞至五資止餘止賜絹乙丑林廣言伏見自來邊將領兵備敵前遣斥候以為搜山遇敵𫝊報貴知先備內用弩手䇿白旗實為非計緣弩手發機佇立方能彀弩白旗搜山惟險是登賊兵惡白旗窮力追逐白旗既走弩手隨之不容彀弩臣愚欲更用步兵弓手隨逐白旗遇敵必能相䇿從之詔梓州路轉運使承議郎苗時中遷兩官轉運判官承議郎程之才奉議郎江衍各遷一官賞瀘州軍興不之功也二月四日丙辰苗時中事或移見此丙寅朝奉郎京東路轉運判官吳居厚為轉運副使居厚本傳遷運副下便云居厚即萊蕪利國兩監官自鼓鑄贍足一路按鼓鑄事在六年九月此時未也三年六月癸卯初除運判六年九月除待制為使五月十四日云云可考司天監厯算天文三式三科令丞主簿並减罷以冬官正王賡言因减罷司天監官監倉草場門故增置三令丞主簿於職事無補故也詔將下諸軍從軍前走回並特免押赴軍前配逐處本城人員降一資鄜延路計議邊事徐禧等奏本路經略副使种諤已到京朝見多日臣等至延州合要諤計議乞趣令前來詔諤限三日內起發密記十六日事丁卯上批付張頡廣南兵員率多新募人材綿軟不知戰鬭加之將官若肆輕易落賊姦便其理固宜初聞山獠人數不多然慮蜂蠆有毒亦不可忽乃聞都巡檢等遇敵退却未知存亡既能統率羣獠戰勝官軍則氣焰方熾未可輕也據本路即今兵將事力實未可深入窮討但責以嚴守山隘謹備而已卿宜處分差去將官依近降指揮切不得輕發有誤一路邊事仍根究死傷兵級以聞并十九日五月末此月辛酉詔近諸司妄以非應奏請事輒奏者其以應申不申不應申而申輒受之者罪法申明之戊辰詔自今臣僚朝拜諸陵除見任前任執政官許進湯餘止奠獻薦新不特拜大宗正司言濟州防禦使叔充乞主奉本位祭祀事太常寺看詳太祖諸子及秦王下各已襲封主祭諸宫院時饗並於見存子孫中令最長一員相承主奉於理為順從之上因論西事曰兵不可不試當先其易者靈州之役士氣至今不挫者由熙州成功故也然兵危事尤須嚴重近亡失兵夫殆十萬張璪進曰漢武用兵三十餘年唐太宗亦纍年征高麗士馬喪亡殆盡持心堅忍亦卒成功今陛下仁聖但當訓練甲兵以彊國勢來則驅之可無後悔己巳詔尚書侍郎奏事郎中員外郎畨次隨上殿不得獨留身侍郎以下仍不得獨乞上殿其侍郎左右選奏事非尚書通領者聽侍郎上殿以郎官自隨祕書殿中書省諸寺監長官視尚書二丞以下視侍郎六曹於都省禀事亦準此侍郎以下仍日過尚書聽議事詳定禮文所言宗廟行事奠副爵不特拜於禮為允批送太常寺言儀禮特牲饋食禮無配其筮尸之辭止曰適其皇祖某子少牢饋食禮有配其筮尸及祝辭則曰以某妃配某氏蓋古者吉祭有配無配皆一尸而已其始也祝洗酌奠于鉶南但有一爵及主人獻尸主婦亞獻賓長三獻亦止一爵崔靈恩廣鄭氏周禮注意以謂王享宗廟凡九酌祼朝踐饋食衍尸各二獻諸臣為獻而每獻一爵蓋筵則同几祝則同辭食則共牢爼豆之類皆不兩陳而猶奠副爵於義無取所有祀儀禧祖翼祖宣祖太祖室奠副爵一太宗真宗室奠副爵三仁宗室奠副爵一伏請不行其祫享别廟皇后自如常禮從之廣南西路言費萬為安化蠻所截詔經略司具蠻賊行徑及捕殺次第根究費萬兵馬所在以聞時朝廷猶未知萬戰死也并十七日丁卯及十月二日辛巳王竒死事又七月十二日甲申詔將兵皆計所部多寡所亡所獲比折分釐定賞比聞諸將討賊多率衆以自衛及至奏功即减數以就賞顯屬僥冒自今出戰先以所部兵多寡奏黃上功狀即計所部人所獲級以聞辛未詔鄜延路安撫司權增公使錢萬緡壬申詔遞馬劵𨽻駕部令兵部尚書以下書押劵頭交趾郡王李乾德獻馴犀角象齒各五十又言廣源利管下古旦峒首領儂勇及本峒民户叛入雍州纍牒雍州不為施行詔儂勇元非交趾所管歸明在交趾未納降以前自是省户理難給還儂勇事又見九月十五日今削去新紀書壬申交趾獻馴犀二舊紀不書承議郎吳潜為廣南西路轉運副使潜言昨聞交州纍來取索右江户口臣與諳知安南事人測度蠻情皆言三五年間必為邊患乞訓練廣西土丁戒敕邊備詔吳潛條析措置以聞十月戊戌廣南西路轉運使馬默言安化州蠻作過乞指揮所屬官司處置或乞選有膽勇使臣前來捕殺又言自宜州界出安化等州搗賊巢穴遠者不過三百里宜融州土丁萬人素號得力其中必有三二千人可以重賞使之蠻必效首矣上曰默意欲用兵爾其為人粗疏付之未必辦事且所言本路兵丁足用若用之便言不足正如匠人造屋小計之既興功乃見材費浸多用兵大事極須謹重向者郭逵安南與昨來西師兵夫死傷皆不下二十萬有司失入一死罪其責不輕今無罪置數十萬人於死地朝廷不得不任其咎如瀘州乞弟其初但為索羅箇牟囤骨價復私怨爾王宣過分往救之為乞弟所殺事遂張大比及事平公私蕭然勞費天下大事蓋常起於至細章惇曰天下事皆積小至大唐虞君臣相戒亦曰一日二日萬幾上曰知幾至難惟聖賢為能圗於未形所以無智名勇功其次於其幾兆而圖之則易為力其下事至於著見而謀之故用力多而見功寡或遂至於傾隕章惇又曰善師者不陳蓋圗之未兆耳上曰事之將兆天常見象但人不能知彗孛示人事甚直猶如語言顧今無深曉天道之人耳古人能知之則能消伏先帝末年孛見甚大有聲光芒掃墳墓熙寧八年十月彗見軫軫長沙星朕以安南為憂王安石以為不足虞不閲月安南叛前年彗出郎位沒於張去嵗興西師乃去郎位是事由朝廷本非邊人起事之象章惇又曰太微垣正象朝廷王安禮曰天示變則當靜以應之此古之所以消伏者王圭曰天象既如此必至於用兵此亦數也上曰惟先格王正厥事能正厥事雖必至於用兵可以無悔矣事將萌而天象先見蓋人事在下氣積於上積衆人之氣而先見猶人之五藏有疾病而氣色見於面又曰天下事莫重於兵社稷安危所繫措兵既定則其他皆粉澤而已章惇曰古人以戎祀為大事蓋事神治人莫重於此上曰戎與兵異甲胄起戎蓋兵至於用則謂之戎祭祀測鬼神之情狀為難用兵測敵人之情狀為難古人所以常合而言上曰太祖平諸國遣將如親行不勞而定子孫䝉福在所加重也王安禮曰太祖以不殺得天下纍聖皆不妄殺一人所以後世安榮上曰三代得天下雖以殺蓋有出於不得已而殺者然未若得已而不殺古所謂以生道殺民雖死不怨殺者此不得已而殺又曰前世為亂者皆無賴不逞之人藝祖平定天下悉招聚四方無賴不逞之人以為兵連營以居之什伍相制節以軍法厚祿其長使自愛重付以生殺寓威於階級之間使不得動無賴不逞之人既聚而為兵有以制之無敢為非因取其力以衛養良民各安田里所以太平之業定而無叛民自古未有及者藝祖養兵止二十二萬京師十萬餘諸道十萬餘使京師之兵足以制諸道則無外亂合諸道之兵足以當京師則無內變內外相制無偏重之患天下承平百餘年蓋因於此王圭曰國朝㑹要言國朝兵制雖詳然莫能推明其意張璪曰非陛下神聖孰能知之上批近團結諸路廂軍除留京師外多已到涇原方沿邊用兵之際軍食至可寶惜不容冗食其間耗蠧滋甚遂下本路非甚急用者遣屯近裏州癸酉鎮南節度使開府儀同三司豫章郡王宗諤卒輟視朝二日臨奠之贈太尉韓王先是中書省擬封於魯上批魯乃祖封太宗皇帝下見有承嫡者𫝊襲干紊正統理極未便可改封故也太常擬諡博士王古曰寵祿光大曰榮慈惠愛親曰孝請諡曰榮孝尚書省集議以宗諤外招事權凌轢宗黨不應稱孝博士楊蟠曰欽事尊上曰恭請諡曰榮恭左僕射王圭曰以宗諤為欽事尊上義亦未安有司别定於是博士何洵直曰追悔前過曰思諡曰榮思議乃定新紀書宗諤薨甲戌知桂州張頡言知瓊州劉威引惹黎人乞特責降詔張頡選諳熟蠻獠事大使臣一員替劉威候到桂州械繫劾之十九日己巳七月戊戍乙亥發運司奏夏麥大稔已下沿流拋糴須藉本錢應副若更撥還內藏庫實有防闕乞賜展限三年上批觀其奏陳覼縷甚悉於理無容却得趂麥價賤沿河收糴充用其意止是推托認還之期故皆事欺罔其所奏可不行仰依元限送納給事中陸佃言三省樞密院文字已讀訖皆再送令封駮慮成重復上批可勘㑹差紊重復進呈乃詔罷封駮房先是故事詔㫖皆付銀臺司封駮官制既行猶循舊至是始罷之丙子詔自今特㫖衝替無公案者令中書隨特㫖定事理輕重叙復者不以官高下並歸尚書刑部詔許彥先與除轉運判官李君卿蔡洵各依元資序與合入差遣彥先等先因許將蘇頌知開封府日坐罪被責至是以上批勘㑹無名故皆復其職任彥先自監吉州酒稅得梓州路丁丑上批付李憲等環慶路懷安等鎮寨覘夏國諸監軍司并僧道悉㸃集期以七月㑹於胡盧河川欲冦涇原本路廣川平野最為賊馬長驅奔軼之地加之昨行營出塞瑪伊克之捷殱其貴將敵中銜恨最深牒報理或不妄若舉國入冦其兵將之衆不减三二十萬未知本路何以禦之可大勝捷宜博謀諸將加以帥府方略前具以聞通直郎監察御史豐稷為著作佐郎先是稷言聞吳安持除太府少卿按安持以宰相子請囑檢正官劉奉世庇相州失入馮言死罪公事坐此追官今祥禫未除即有恩命議者以謂執政家見有勒停衝替子弟用安持為例將以伸已之私臣竊惟陛下若稽經訓修明官政將拔吉士光益治功豈特忘人之過以示容德而方官制施行章惇以罔上為門下侍郎王安禮以穢德守尚書右丞以至六行尚書列曹侍郎諸司郎官寺監丞主簿其間或以不實黜降或以贓私坐廢朝廷不應輕法守略清議致謫籍之徒首與褒選萬世肇新之官府為罪人之淵藪四方臣庶何以視效甚非陛下稽古建官之意夫邦家之光發揮於端實之君子而消沮於智巧之小人選授之際尤在考擇如李士京韓縝之嬖人韓宗文維之孱子為大理寺左右推主簿鍾浚王安禮之佞人為將作少監減罷知禮院葉祖洽司農寺軍器都水監主簿頓起等至今未有差遣縱材誠卑凡豈不優於宗文之徒與夫鍾浚之頗僻側媚有間矣去取如此名實何考清明之朝不可不察其職事官所犯罪欲望令中書省條具事先重者稍放罷故有是命詳定官制所言御輦院乞依舊隸太僕寺其輿輦及應供奉事隸殿中省牛羊司隸光祿寺其養牛乳牛兵匠入牛羊司從之惟御輦院不隸省寺戊寅客省使絳州防禦使曲珍為懷州防禦使龍神衛四廂都指揮使皇城使丹州團練使李浦為東上閣門使寧州刺史高永能為榮州團練使皇城使冦偉為嘉州團練使鄜延路經略司上明堂川討蕩功也舊紀書戊寅客省使曲珍敗夏人于明堂川新紀因之詔已坼金水河透槽回水入汴自汴河北引洛水入禁中以天源河為名先是京索河水在汴南舊由汴堤上為槽北跨汴以過水然舟至即啓槽頗妨舟行時既導洛通汴乃自城西超字坊引洛立隄凡三千三十步水遂入禁中而槽廢月十八日可考新紀並書作天源河以葭蘆吳堡二寨𨽻石州詔在京秋閲賜諸軍銀器視元豐三年數付三帥給之無遣使本志五年事今附夏末
