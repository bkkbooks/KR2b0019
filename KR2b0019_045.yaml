body:
  text: 續資治通鑑長編卷四十一宋李燾撰太宗至道三年春正月丙子以户部侍郎溫仲舒禮部侍郎王化基並參知政事給事中李惟清同知樞密院事參知政事張洎罷為刑部侍郎化基寬中有度量所在僚屬或慢於禮者不以介意前知杭州掌書記張賀尤傲忽化基每優容之上知其事及歸朝詢于化基化基但稱其才語不及它對親舊亦未嘗短賀也時邉境多事上垂欲相仲舒而罷吕端會不豫乃止化基因入對備言頥生服餌之要翌日上語左右曰化基愛君無隱至于修養之道亦為朕言之辛卯以步軍都虞候傅潜為延州路都部署殿前都虞候王昭逺為靈州路都部署戶部使張鑑調陜西諸州軍儲知制誥張秉馮起翰林侍讀吕文仲等持節催督之鑑上疏曰伏以關輔之民數年以來併有科役畜産蕩盡室廬頓空加以浦洛之行曾經剽劫原州之役又致遷延非獨令之弗從實緣力所不逮况復先棄糧草見今逐處追科本戶稅租互遣它州送納往返千里費耗十倍愁若怨嗟充塞路岐自春徂冬曾無暫息餱糧乏絶力用殫窮顧此疲羸尤堪軫惜今若復有差率益致流亡縱使驅迫而前復恐逗撓而潰願陛下特垂詔㫖無使重勞因兹首春俾競東作慎固邦本詳求武經况靈州一方僻居塞外雖曰西陲之要地實為中夏之蠧區竭物力以供須困甲兵而援送蕭然空壘祗益外虞不若以賜繼遷使懷恩奉籍稍息芻挽之役事當深慮理要預防若待川决而後隄火熾而方戢則焚溺之患深矣雖欲拯救其可得乎本傳云鑑去年冬自靈州還即上此疏今移入再往陜西調發之後若已曾論諌疑不當再往矣因再往乃上疏事理或然也且疏言首春亦必指此時爾原州之役蓋指李繼隆欲取原州蔚茹河路運糧衆議不可故云遷延也二月辛丑上不豫始决事於便殿是月供奉官兩浙轉運使承受公事劉文質入奏察舉部內官髙輔之李易直未見艾仲孺梅詢髙貽慶未見姜嶼未見戚綸等八人有治迹並降璽書褒諭上曰文質善於采聽特遷文質西京作坊副使文質保州人簡穆皇后從孫父審竒為武牢關使嘗從太祖討李重進戰死輔之保寅子仲孺頴之孫詢宣城人綸楚邱人也初為淅川主簿按版籍得逋戶脫口漏租者甚衆徙知太和縣民險悍喜鬭訟綸作諭民詩五十篇因時俗耳目之事以申規誨老幼多傳誦之每嵗時必與獄囚約遣歸祀其先皆如期而復三月癸酉傅潜等言護送二十五州軍芻粟已入靈州會上不豫因止其出師靈武用兵諸州皆發丁夫餉軍儀州推官薛奎部糧至鹽州下虎寨會久雨粟潰腐奎因白轉運使盧之翰曰今兵糧不可食願令民還州償所失之翰怒欲劾奏徐曰用兵久罷轉餉今幸軍食有餘安用此陳腐以困民哉之翰意解聽還衆皆感悅既又悉奏除之奎絳人也奎事不得其時今附此之翰二年七月自陜漕責許州司馬今年正月復為工外同管漕事壬辰不視朝癸巳帝崩於萬嵗殿參知政事溫仲舒宣遺制真宗即位于柩前初太宗不豫宣政使王繼恩忌上英明與參知政事李昌齡知制誥胡旦謀立楚王元佐頗間上宰相吕端問疾禁中見上不在旁疑有變乃以笏書大漸字令親密吏趣上入侍及太宗崩繼恩白后至中書召端議所立端前知其謀即紿繼恩使入書閣檢太宗先賜墨詔遂鎖之亟入宫后謂曰宫車宴駕立嗣以長順也今將奈何端曰先帝立太子政為今日豈容更有異議后默然上既即位端平立殿下不拜請捲簾升殿審視然後降階率羣臣拜呼萬嵗王繼恩等謀廢立實録國史絶不見其事迹蓋若有所隱諱今據吕誨集正惠公補𫝊及司馬光記聞增修補傳所載比之記聞尤詳也夏四月乙未朔尊皇后為皇太后大赦天下常赦所不原者咸除之制曰先朝庶政盡有成規務在遵行不敢失墜然而纘圖伊始懼德弗明所冝拔茂異之才開諫諍之路撫綏鰥寡惠復疲羸庶幾延宗社之鴻休召天地之和氣京朝官衣緋緑及二十年並與改服色官未升朝亦聽叙賜緋紫自此始戊戌始見群臣于崇政殿西序癸卯宰相吕端加右僕射甲辰太子賔客李至為工部尚書李沆為戶部侍郎並參政事工部侍郎郭贄出知大名府贄翌日求對懇辭上曰全魏之地所寄尤重卿宜即去贄退上召輔臣問曰郭贄願留如何對曰近例亦有之上曰朕初嗣位命贄治大藩而不行則何以使人卒遣之上謂宰相曰朝行中頗有淹滯之人如梁周翰夙負詞名三十年擠於衆僚甚可念也朕在宫府多令楊億草箋奏文理精當世罕偕者冝即加奬擢辛亥以工部郎中史館修撰梁周翰為駕部郎中知制誥著作郎直集賢院楊億為左正言館職並如故故事入西閣皆中書召試制誥三篇二篇各二百字一篇百字惟周翰不召試而命焉李應機者嘗知咸平縣上以壽王尹開封遣散從以帖下縣有所追捕散從恃王勢歡呼于縣庭應機怒曰汝所事者王也我所事者王之父也父之人可以笞子之人汝乃敢如此杖之二十散從走歸具道其語泣訴于王王不答而默記其名嘉其諒直及即位擢應機通判益州事召之登殿謂曰朕方以西蜀為憂故除卿此官此未足為大任也卿苐行勉之有便宜事密疏以聞應機至州未幾有走馬入奏事前一日知州置酒餞之應機故稱疾不會走馬心已不平及暮應機使人謂走馬曰應機有密疏欲附走馬入奏明日未可行也走馬不知其受上㫖愈怒强應曰諾明日使人請應機曰某治裝已具且行矣願得所賫之疏應機曰應機疏不可與人傳也當自來受之走馬雖怒甚意欲積其驕橫之狀具奏于上乃詣應機𪠘舍受其疏以行既至升殿上迎問曰李應機無恙乎有疏來否走馬愕然失據即對曰有因探其懷出之上周覽稱善數四因問應機在蜀治行如何走馬踧踖轉辭更稱譽之上曰汝還語李應機凡所言事皆善已施行矣更有意見盡當以聞蜀中無事行召卿矣頃之召入遷擢數嵗中至顯官應機為吏強敏而貪財多權詐其後上亦察其為人浸疏之乙卯羣臣三上表請御正殿從之已未宰相吕端上大行皇帝陵名曰永熙辛酉兵部郎中知制誥史館修撰胡旦責授安逺節度行軍司馬旦與王繼恩等邪謀既露上新即位未欲窮究之而旦草行慶制詞頗恣胸臆多所溢美語復訕上故先絀之五月丙寅始御正殿視朝退御後殿問事如常儀丁卯詔御史臺告諭內外文武羣臣自今人君有過時政或虧軍事臧否民間利害並許直言極諫抗疏以聞庚午詔以國家大事足食為先今億兆至蕃未聞有九年之蓄令兩制議致豐盈之術以聞又詔三司及兹嵗稔大為市糴以實倉廪壬申罷江淮發運使諸路轉運使司承受公事朝臣使臣悉召歸闕上初聽政務從簡易也咸平四年五月當考甲戍户部侍郎參知政事李昌齡責授武忠節度行軍司馬宣政使桂州觀察使王繼恩責授右監門衛將軍均州安置安逺節度行軍司馬胡旦削籍流潯州太宗之即位也繼恩有力焉太宗以為忠自是寵遇莫比繼恩喜結黨邀名譽乘間或敢言事薦外朝臣故士大夫之輕薄好進者輒與往來每以夕寓僧舍為期潘閬得官亦繼恩所薦也閬者傾險士嘗說繼恩乘間勸太宗立儲二為它日計且言南衙自謂當立立之將不德我即議所立宜立諸王之不當立者南衙謂上也繼恩入其說頗惑太宗太宗訖立上閬尋坐狂妄絀太宗疾革繼恩與昌齡及旦更起邪謀吕端覺之謀不得逞上既即位加恩百官繼恩又密託旦為褒辭旦已先坐絀於是并逐三人者詔以繼恩潛懷凶慝與昌齡等交通請託漏泄宫禁語言也籍繼恩家資多得蜀土僣侈之物尋詔中外臣僚曾與繼恩交結及通書疏者一切不問後二年繼恩死於貶所李昌齡王繼恩胡旦三人同竄責實録及國史並不明著罪狀但具録甲戍詔書蓋當時有所諱避不得不然詔稱昌齡恣行請託深亂朝綱繼恩潜懷凶慝附下罔上結黨朋奸則亦可略見其不軌心迹故仍掇取詔書以見當時行事潘閬納說繼恩此據倦逰雜録稍刪潤之湘山野録及筆談載閬與盧多遜同謀立秦王蓋誤以繼恩為多遜楚王為秦王傳聞不審也王子融百一篇云真宗即位尚有遜抑之語羣議亟爾異同欲請明德皇后臨朝吕端笑曰置皇太子于何地衆口方籍籍聞之皆恐悚不敢復措言未踰月而李昌齡王繼恩輩狂謀畢露子融蓋亦不知繼恩昌齡乃謀廢立非請太后臨朝也真宗即位時年已三十必無太后臨朝之理子融誤矣今不取甲申上謂輔臣曰宫中嬪御頗多幽閉可閔朕已令擇給事嵗深者放出之吕端等曰陛下踐阼之初首行此令實哲王之懿範也丁丑立秦國夫人郭氏為皇后上為皇太子每事謙讓郭氏未嘗正妃號也庚寅追尊帝母隴西夫人李氏為賢妃妃真定人乾州防禦使英之女太宗在藩太祖為聘之歿于太平興國二年上及楚王元佐皆妃所生也庚寅二十七日追尊賢妃實録本紀並闕此據㑹要六月乙未詔以太宗御書墨蹟賜天下名山勝境已亥翰林學士承㫖宋白上大行皇帝諡曰神功聖德文武廟號太宗戊戌追復皇叔涪王廷美西京留守兼中書令秦王贈皇兄魏王德昭太傅岐王德芳太保上謂宰相曰諸州多以珍異祥瑞之物來獻在朕薄德非所敢當但令稼穡豐稔且得賢臣乃為瑞辛丑詔天下勿復獻珍禽竒獸及諸祥瑞先是南康軍言建昌縣民洪文撫六世義居室無異爨就所居雷湖北創書院舍來學者太宗遣內侍裴愈齎御書賜其家文撫遣弟文舉詣闕貢土物為謝太宗飛白一幅曰義居人以賜之授文舉江州助教于是詔旌表其門閭自是每嵗入貢必厚賜答之甲辰以皇兄元佐為左金吾衛上將軍復封楚王聽養疾不朝上始欲幸元佐第元佐固辭以疾曰雖來不敢見也由是終身不復見罷鹽鐡度支戶部副使工部侍郎同知樞密院事錢若水罷為集賢院學士判院事先是太宗為若水言士之學古入官遭時得位紆金拖紫躍馬食肉前呼後擁延賞宗族此足以為榮矣豈得不竭誠報國乎若水對曰髙尚之人固不以名位為光寵忠貞之士亦不以窮逹易志操其或以爵祿榮遇之故而效忠于上中人以下者之所為也太宗然其言及劉昌言罷太宗問趙鎔等曰見昌言否鎔等曰屢見之上曰涕泣否曰與臣等言多至流涕太宗曰大率如此當進用時不能悉心稱職一旦斥去即汍瀾涕泗若水曰昌言實未嘗涕泗蓋鎔等迎合上意爾吕蒙正罷太宗又謂若水曰人臣當思竭節以保富貴䝉正前日布衣朕擢為宰相今退在班列想其目穿望復位矣若水對曰蒙正雖登顯貴然其風望亦不為忝冒僕射師長百僚資品崇重又非寂寞之地也且蒙正固未嘗以退罷鬱悒當今岩穴髙士不求榮爵者甚多如臣等輩但茍貪官祿誠不足以自重太宗默然若水因自念人主待輔臣如此蓋未嘗有秉節髙邁不貪名勢能全進退之道以感動人主故也將俟滿嵗即移疾㑹春旱太宗焦勞甚若水不敢言既而西邉用兵越明年太宗宴駕章不果上上即位若水以母老請解機務章再上乃得請召對便殿命坐慰勞入對苑中從容數刻上問近臣誰人可大用者若水言中書舍人王旦有德望宜任大事上曰此固朕心之所屬也若水好汲引後進推賢重士胸中豁如也其在樞密同年生有為縣佐者每謁見若水必序齒而拜之談苑載若水辭位事甚美但頗顛倒又誤以對吕蒙正寂寞事為劉昌言按昌言罷樞密在蒙正罷相前三月蒙正罷相時昌言已在襄州矣今皆改正之又田畫記若水事云王曽罷相章聖語若水若水憤而出被道士服歸嵩山此尤誤今不取上居憂日對輔臣於禁中每見吕端等必肅然拱揖不以名呼端等再拜而請上曰公等顧命元老朕安敢上比先帝又以端膚體洪大宫庭階戺頗峻命梓人為端納陛秋七月乙丑御崇政殿召端等訪以軍國大事經久之制端陳當世急務皆有條理上甚嘉納丙寅令諸路轉運使更互赴闕詢以民間利病吏部郎中直集賢院田錫應詔上疏曰陛下臨御以來親庶政以仁接大臣以禮聞奏山陵諸事必泫然流涕聞奏靈州往事必惻然動容聖智淵深臨事能斷睿機神速馭下以寬濟之以嚴明小人屏退而斂跡博之以詢訪大臣畏愛而推誠臣未見時政之是非亦未見人君之過失若軍旅措置之宜非臣所能知若黎民利害之本惟臣輒敢議民之利莫先于省征徭寬賦役民之害莫大于用兵甲挽芻粟利害有大小康濟有先後今利害之大者無先于捨靈武康濟之先者莫重於安關輔捨靈武則甲兵不興甲兵不興則挽運自息挽運既息則關輔必寧關輔既寧則四方無虞四方無虞則四夷無事臣今所憂者關西二十五州軍昨經靈武之役不勝困弊加以時雨稍愆秋田失種府庫未實倉廩尚虗若西戎輒敢騷邉北敵忽來犯塞則朝廷何以備之關輔何以寧之臣慮此患必生臣謂此災必有何以知之臣竊聞去年九月十九日未時永興環州慶州延州清逺軍隰州同日同時六處地震塌損城墻毀壞廬舍在處州府不敢不奏所屬轉運不敢不申洎靈州送糧草回來死者十有餘萬議者即云地震已應于此臣則未以為然夫天垂象動而不息地生物靜以為常茍當靜而動是失其常若永興環延慶隰清逺軍六處地震臣亦竊見報狀延州路祇候冬官正楊文謐奏稱其月是戍月又是戌日未時自北上來臣以為當靜而動動之方位既在關輔將來慮至戍年豈無在下者輒動乎關輔若有冦盜弄兵萑蒲聚嘯跨連州郡僭稱王公則臣慮西川復保劍關之厄南方復恃重江之險閩中越中淮南湖南豈無見利忘義之人豈無幸災乘便之賊願陛下思之禳此災者在修德除此患者在早圗德之修者以誠信感神明以言行動天地以簡易理機務以清靜安黎元圗於早者减關市之征放管𣙜之利捐减租賦優復流亡鄉閭與人為害者募之入軍郡縣在官未理者命之移任設制科使懷方抱器者悉為朝廷所用置屯田俾棄本競末者盡為户籍所收鑄農器以給之儲時種以貸之免五年之租徴冀十年之生聚如此輸民民無不安如此安民民無不泰管子曰倉廩實知禮節衣食足知榮辱既知禮節又知榮辱則豈敢為寇盜豈敢犯禁令禁令既不敢犯盜寇必不敢為又何憂嘯聚之虞又何慮侵擾之患此置屯田其利一也制舉科目不可具陳今略舉可設者有賢良方正能直言極諫科才識兼茂明于體用科道侔伊吕才比管樂科傳道經典達于教化科詳明政術可以理人科文堪經邦科武足安邉科臣伏覩太祖朝曾設制科于時𠡠限三千字已上字數既多書寫不易賜食之後就試以來既對天顔豈無兢懼又值日晚固不遑寧雖有經邦之謀豈能周悉雖有安邊之䇿靡暇敷陳今若設此科條但用漢時公孫𢎞董仲舒所試之法則往復問答既盡見其才謀品藻甄升信無遺于器業此設制科其利二也與人為害者募之入軍則鄉閭靜謐在官未理者命之移任則臧否詳明稅賦蠲减則民稍蘇流亡優復則民不散放管𣙜之利則米麥可充于邉備减關市之征則商旅交通于萬物暫如此五年則關輔之民必安暫如此十年則靈武之役必息若以此下主者若以是問有司必以臣不達時機必以臣不諳世務必以臣只知蠲减稅賦以息黎元而不知供軍日費之多少必以臣只知除放管𣙜以安疲俗而不知嵗計備邉之盈虗臣豈不知㳂邊有屯兵豈不知備邉須積粟豈不知嵗時衣裘之賜錫豈不知將卒酬賞之頒宣豈不知上供京師之貨財豈不知量留州郡之物色然以臣所見則帝王所務當務廣大官吏所守各守職司所職為主計之臣不得不聚斂供億所司在主計之職不得不經度有無然天生時而地生財下用力而上節用時不可失故授時勸農使不失時財生有數故務嗇勸分使不乏用財之生也有數上之用也有節則民力不困國用常豐今未喻國家有九年之蓄乎未喻西北隅邉圉有六年之蓄乎未喻陕西二十五州軍有三年之蓄乎訪聞糶麥糴榖以充折變將無作有以應供輸謂供輸不得不然不然則軍儲無備謂折變不得不然不然則軍食不充若如是可見陜西二十五州軍無三年之蓄加以民憂再送靈州糧草臣慮變故從此生臣憂禍亂從此起變故未生陛下得不慮之禍難未起陛下得不思之若以靈州送糧草之人死者十餘萬已應地震之災即國家昨已降𠡠榜撫諭軫恤也若未應地震之災則臣慮變故起于關輔關輔既有變生則西川上供錢帛恐未能上供南北常貢物貨亦未得常貢上供既有阻常貢復未來乃是國家只知督責關輔之貨財只知供備靈武之糧草是急小利而忽大利捨逺圖而勞近謀願陛下謀之于未兆則易謀理之于未亂則易理臣又聞朝廷昨差使臣往諭遷賊以禮義觀其來意以恩信導其歸心李繼遷既忽聞朝廷告哀亦能舉部族大臨縞素受命貢奉謝恩既未聞乞守塞垣又未聞乞歸朝闕大臣必有擬議必有臧謀謀之允臧計必先定今山陵既在近邉塞雖無虞黎元尚未蘇倉庫尚未實邉防或有騷動朝廷何以枝梧關輔或有亂離朝廷何以制禦謀之正在今日理之正當是時時不再來又不可失無使有心者知關輔亂而謂劍閣可守無使適變者見關輔亂而謂天塹可憑無使關輔所得之貨財不侔吳蜀所得之貨財無使關輔所守之疆土不侔吳蜀之疆土關輔靜則蜀貨吳財交至關輔亂則劍外江南各有所守此所謂捨小利而必得大利無逺慮則必有近憂也錫自注云至道三年七月二十五日奏翌日錫又奏臣未喻陛下降詔以來有人上言否未審下詔之後有人抗疏否若未有人上一言未有人抗一議即望陛下再降優詔曲喻聖心虗竚以待賢良矜容以求直亮則懷才抱器者安敢有所隱蹈忠履信者必盡有所伸臣昨日所上奏章所陳鄙見止為關右一時之弊止為河西一處之言餘未悉陳慮煩聖覽須至備述庶補逹聰今靈州閉堅壁以待饋糧無外援不敢禦寇昨聞百姓饋送糧草死者十餘萬人糧草二十五萬到者七八萬糧草不到者非戎人劫掠之百姓不來者非戎人殺戮之是自相蹈藉或因被劫奪飢餓既衆死亡遂多去雖援之以甲兵回即害之者士卒今關西父哭子弟哭兄妻哭夫悲哀之聲感動行路寃枉之苦軫惻聖心臣謂非十年未見生其民民生十年方可充力役臣謂非十年未能聚其財財聚十年方可備供億于三十年間陛下生之聚之教之化之然後致太平然後臻至理今臣年五十八事陛下十二年年七十已當外退十二年間願伸微勞以答聖恩願罄真誠以報大造然犬馬之年未必保餘齡葵藿之心幸得承委照則未退休間有合言不敢不言未隕越間有合奏不敢不奏願陛下所務者廣大所圖者幾微幾微者事之先廣大者君之體陛下方欲求至理致太平無忽事之未萌勿輕事之未兆臣聞帝者與師處王者與友處霸者與臣處亡國之君與厮役處與師處則無為無為是無事與友處則機務簡易德業光大駁雜者霸道不足為陛下言之暴慢者亡國安敢對陛下陳之道尊德盛者帝之師才髙識逺者王之友今陛下睿聖既與天同極聽斷乃與日惟新若道尊德盛者陛下勞謙以師之才髙識逺者陛下推誠以友之友之則四友斯來師之則三師可至師道見尊則天下何憂不理王道得友則天下何慮不寧臣昨日所奏望陛下且留中不出為言地震災祥之必有為言下動叛離之將作非外人所可得而知非大臣不可得而議留中未出之際略與大臣言之其中可行之事更令近臣議之擬之而後動天下無異議中外無異言擇善而從之從長而行之不為橫議所非不為非理所破豈獨微臣之幸其實國家之福錫自注云至道三年七月二十六日奏此上它日謂宰相曰近詔中外咸貢直言庶聞朝政之闕以警朕心而群臣奏對多及瑣細之務曾無逺大之略甚非所望也惟田錫康戬陳詞不繁指事尤切張齊賢頗留意于民政乃出其疏示端等曰卿等詳酌行之先是錫以加恩官告賜崇信節度使王顯于秦州覩關右之民困河西力役故連上章極言其事云錫前疏以七月二十五日上後疏以二十六日上此錫自注今並附月末錫傳云錫使秦州賜王顯加恩官告覩關右諸州奉河西力役生民重困連上章極言其事按錫第三章乃十一月十七日上今移入本月日上出錫等疏付吕端此據寶訓康戬及張齊賢不知論何事當考八月己亥以曹彬為樞密使兼侍中罷旄鉞罷旄鉞此據會要戶部侍郎同知樞密院事向敏中給事中夏侯矯並為樞密副使上謂之曰近密之司典領尤重必素有名望端亮謹厚者處之乃可鎮靜而責成彬以耆舊冠樞術之首敏中及矯佽助之兵機邉要有所望矣敏中明辨有才略遇事敏速先是西北用兵敏中專主謀議至于二邉道路斥堠走集之所莫不周知矯仕藩府最舊故首加擢用焉舊制宣徽使著位在樞密副使之上于是以客省使簽書提㸃樞密宣徽院諸房公事周瑩為宣徽北院使瑩請居樞密副使之下詔從之瑩初與劉承規同簽書提㸃樞密宣徽院諸房公事瑩既遷承規亦罷自後不復置此職乙巳令曹彬赴中書禮上彬請就樞密院上以彬位兼左相特寵異之上以漢唐封乳母故事付中書因問吕端曰斯禮恐不可行朕不敢以私恩紊正法也端奏曰前代舊規斯可行矣或加以大國或益之美名事出宸衷禮無定制己酉詔封乳母齊國夫人劉氏為秦國延壽保聖夫人是月西川都巡檢使韓景祐行部至懷安帳下廣武卒劉旴謀作亂夜率衆襲景祐逾垣獲免旴遂掠懷安破漢州及永康軍蜀州所至城邑望風奔潰時益州鈐轄馬知節亦兼諸州都巡檢領兵三百追旴至蜀州與之角鬭自未至亥賊懼走卭州招安使上官正飛書召知節還成都計議知節曰賊黨已踰三千若破卭州必越新津大江去我九十里官軍雖倍制之亦勞不如出兵迎擊破之必矣即率所部夜渡江屯方升鎮與賊遇而正亦尋領軍至共擊斬旴其黨悉平旴自起至滅凡十日庚申詔以正為南作坊使賜知節錦袍金帶將士錫賚有差遣使按驗景祐及諸失守官吏遞貶降之正始無出兵意知益州張詠以言激正勉其親行仍盛為供帳餞之酒酣舉爵謂諸軍校曰爾曹俱有親弱在東䝉國厚恩無以報此行當亟殄賊無使逃逸若師老曠日即此地還為爾死所矣正由是倍道力戰及凱旋詠迎勞大出金帛行賞士重傷者先賞之獲級者次焉衆皆悅服
