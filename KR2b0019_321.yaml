body:
  text: 續資治通鑑長編巻三百十七宋李燾撰神宗元豐四年冬十月乙卯通直郎集賢校理同知諫院蔡卞為崇政殿説書罷知諫院樞宻院言定州諜報北界事上曰朝廷作事但取實利不當徇虛名如慶厯中輔臣欲禁元昊稱烏珠費歳賜二十萬此乃爭虚名而失實利富弼與契丹再議盟好自矜國書中入南朝白溝所管六字亦增歳賜二十萬其後白溝亦不盡屬我也昔周世宗不矜功名惟以實志取天下故十餘年間並無詔誥使天假之年其功業可比漢髙祖如李璟欲稱帝世宗許之盖已盡取其淮南地不繫其稱帝與否也熈河路都大經制司言駐兵蘭州元乞給空名宣劄填給與投來有功生羌外見在數不多乞續給詔給空名宣三百告身百鄜延路經略司言招降西賊丁壯乞比附酬賞詔每招納丁壯五人賜絹二十疋諸路準此詔李稷部押夫糧隨軍令沈括差與禁軍二百為親兵上批付沈括據种諤九月庚戌奏丁未大軍駐米脂寨遣諸將攻圍已酉晝夜進撃及據走馬承受所奏傷中兵級續具以聞今大軍出境未及百里首攻堅城損士卒挫軍威甚非善計此進軍之始失于審擇兵當避實撃虛捨堅攻瑕今乃反此甚為可憂卿宜酌彼所聞形勢更移諤令早為長慮勿使戰士氣竭之際忽遇賊界屯聚生兵救援難於取功五年七月七日詔問种諤舍直取迂時政記可考是日王中正始自白草平引兵西行三十里次鵝枝谷丙辰至皓峯以隂霧復留再宿是日李憲留李浩守蘭州總兵東上丁巳詔河東緣邊安撫司可作奉朝命以夏國任事首領亂常囚廢其主又不遵誓詔縱部落侵犯邊城今遣兵往追取罪人縁調發並邊慮北界疑惑牒北界西南面安撫司使諭朝廷之意种諤既破米脂援軍退復攻城九五日距闉城其守將都鈐轄凌結阿約勒率酋長五十餘人請降諤下令入城敢殺人及盗者斬乃降之収城中老小萬四百二十一口給以衣巾仍命阿約勒等各統所部以禦賊初四日丁巳受降十二日乙丑奏到髙永能𫝊云初圍米脂城虜以衆十萬來援前鋒將髙永能謂從弟永亨曰虜衆暴至易吾軍吾營當大川右山左水宜令前軍嚴陣待其至選精騎張右翼撃之可破也永亨從之詰朝霧四塞虜果大至與前軍戰良久竒兵翼進虜潰自相蹈藉於無定河水為不流大軍乗之自寅至辰斬首數千級獲馬三千槖駞爾牛羊以萬計器甲不可勝數城猶不下永能宻遣諜穆都統説其東壁守將諭以禍福翌日來降永能請厚賞結之衣以錦示諸城下導以鼓吹城中乃携其偽鈐轄凌阿約勒出降此事當考永能五年六月二十八日乃遷官新紀書丁巳米脂寨降舊紀于甲子日書克米脂寨戊午詔知剡縣承奉郎蘇􅬼特衝替同修起居注陸佃罰銅八斤剡人黄庸世以貲雄里中納粟得試將作監主簿佃嘗與􅬼書言庸鄉親得託公庇書至㑹庸有訟事縣累追不至􅬼忿出不意奄至其家親捕之庸妻王急呼其家僕閻師等十數人躁叫進躍奪􅬼肩輿及盖以石擊傷從者􅬼僅得免監司言王等悍惡請重懲之王與閻師自千里以次諸州編管􅬼坐是亦罷佃以致書為􅬼所奏故罰之詔三班奉職前監懷安軍金堂縣商稅任光秀處死坐討乞弟從軍冒賞及賣買首級也詳定禮文所言天道逺而難致尊而難親以其逺而難致也故常以神道致之以其尊而難親也故常以人事親之易曰聖人亨以享上帝人道親之也禮曰郊血神道致之也本朝郊禮薦熟之外不設血殊為闕禮伏請南郊先薦血于神座前盛以槃次薦腥次薦熟并北郊准此仍先瘞以致神從之四年十月五日依奏今附本月日又言㸔詳祠礿嘗烝之名春夏則物未成而祭薄秋冬則物成而祭備故許謹以品物少多文詞為祠而王弼以禴為祭之薄何休謂秋穀成者非一黍先熟可得薦故曰嘗冬萬物畢成所薦衆多故曰烝故禮以嘗為大嘗周禮以烝為大享今太廟四時雖有薦新而孟享禮略無祠礿烝嘗之别伏請春加韭卵夏加麥魚秋加黍豚冬加稻鴈當饋熟之節薦於神座其籩豆於常數之外别加時物之薦豐約各因其時以應古禮從之十月五日依奏又言國朝時令秋分饗夀星於南郊熈寧祀儀於壇上設夀星一位南嚮又於壇下卯階之南設角亢氐房心尾箕七位東嚮謹按爾雅曰夀星角亢也説者曰數起角亢列宿之長故曰夀以此言之角亢自以列宿之長故名夀星非此所謂秋分所饗夀星也今於壇下設角亢位且以氐房心尾箕同祀尤為無名臣等又案晉書天文志老人一星在弧南一曰南極常以秋分之旦見于丙春分之夕没于丁見則治平主夀昌常以秋分候之南郊後漢於國都南郊立老人星廟常以仲秋祀之則夀星謂老人星矣伏謂依後漢於壇上設夀星一位南嚮祀老人星所有壇下東方七宿位謂宜不設從之四年十月六日是日种諤破米脂援軍㨗書至上喜動顔色羣臣稱賀遣中使諭諤曰昨以卿急於滅賊恐或妄進為一方憂故俾聽王中正節制今乃能首挫賊鋒功先諸路朕甚嘉之中正節制指揮更不施行其戰勝兵員並與特支錢將官等各𫝊宣撫問八月十八日命諤聼中正節制沈括言种諤報官軍大㨗士卒奮戰甚力非逾常奬之不足以酬其忠勇詔除九月辛亥當戰漢蕃軍士朝廷已有恩賞外本路住營家屬可因告諭之際以經畧司封樁錢辦牛酒均行慶犒庶士氣益壯賊之梟巢易於蕩滅己未詔近降指揮令李憲等協力深入殄滅賊巢或勒兵過河攻取涼州湏舉兵並進不得止遣偏裨今聞糧草不繼已械馬申等送獄令李憲等未得進兵候饋運稍辦即依前詔又詔憲昨九月辛丑洎甲辰御前及朝㫖所以相繼督廹進軍者無他盖慮將帥有當進不進之失止於築城數壘而已今聞軍中乃苦見糧無旬日之備則豈有進攻深入之理乎轉漕之司是誠可罪朝廷已遣使就按矣芻糧不辦致妨進討此非將帥所任之責固不當過有恐懼其安心厝置勿為惶駭以沮士氣王師之出有征無戰安可自顧有可虞之道而欲勉副朝命以希萬一之幸哉爾其再三審念之又賜憲詔新本削去今復存之可見神宗量敵進退未始輕用兵凡深入甚敗皆臣下之過也朱本云係一百三十六冊内移到沈括言西賊冦徳靖寨詔种諤出界後如有賊犯城寨經畧司自當枝梧其徳靖寨蕃部弓箭手不少往往盡隨种諤出界豈可縱賊侵擾兼諤自東路出界今賊入西路豈可使諤任責委沈括速處畫設備河東都轉運使陳安石言軍興以來應朝省封樁并諸司及提舉司錢物並歸本司慮緩急移用不足乞更應副上批河東一路諸司錢帛大軍未出界轉運司已稱闕乏乃是用度無術枉致耗散不然過當張皇責難朝省可先下分析仍委路昌衡具實用之數以聞昌衡時為檢正中書刑房公事權管勾河東轉運司事拂菻國貢方物大首領尼斯都凌斯孟盤言其國東南至宻利國北至大海皆四十程又東至西大石及于闐王所居新福州次至舊于闐次至卓昌城乃于闐界次東至黄頭廻紇又東至達勒達次至鍾衮又至董戩所居次至林檎城又東至青唐乃至中國界西至大海約三十程其王名滅力伊靈改撒國地甚寒王服紅黄衣以金線織絲布纒頭每歳遇三月入佛寺燒香坐紅床人舁之首領皆如王之服或青緑緋白粉紅褐紫亦各纒頭跨馬城市田野各有首領主之每歳惟夏秋兩得俸給金銀胡錦穀帛以治事大小為差刑罪輕者杖五七十重者一二百大罪盛以毛囊投之海上屋無瓦産金銀珠胡錦牛羊馬獨峯駞杏梨糖千年棗巴欖子大小麥粟麻以蒲桃釀酒音樂彈胡琴箜篌吹小篳篥撃偏鼓唱歌拍手戲舞不務戰鬬事小止以文字往來詰問事大亦出兵以金銀為錢無穿孔面鑿彌勒佛名背鑿國王名禁私造其言語與宻利國同至是貢鞍馬刀劍珠兩紀並附年末拂菻正𫝊云歴代不朝貢於今九百餘年矣詳定禮文所言禮運曰地秉隂播五行於四時五行者天地之間至大之物萬物所以生成故有帝以為之主有神以為之佐祭天以天從故祀昊天上帝則五帝宜從於南郊祭地以地從故祀地祇則五神宜從於北郊五神地類也故曰地秉隂播五行於四時漢舊儀祠五祀五行官也梁武帝南北郊皆祀五行之神故許亨以謂五神主五行𨽻於地為隂祀位在北郊是也近世大雩五時迎氣以五人神配而不設五行之神是遺其大而取其小也伏請祭地祗以五行之神從以五人神配用血祭從之禮文四年六月六日依奏又言謹按周禮鼓人職曰以雷鼓鼓神祀以靈鼓鼓社祭又大宗伯以禋祀祀昊天上帝以血祭祭社稷五祀社常對天神而不言地祇者社者神地之道言社則地道可知故其神屬乎地道者祀皆為隂祀然而隂祀必以血為歆神始者血者隂幽之物隂祀而用幽隂之物所謂本乎地者親下各從其類是以類求神之意也今祭社稷儀注不用血祭皆違經禮伏請社稷以埋血為始從之四年十月六日依奏今附此又言古者祭社君南向於北墉下所以答隂也今社壝内不設北墉而有司攝事乃設東向之位於禮非是伏請太社壝内設北墉以備親祀南向答隂之位其有司攝事謂宜立北墉下少西從之四年十月六日依奏又言謹按周禮小宰之職凡祭祀贊玉祼將之事小宗伯之職凡祭祀以時將瓚裸盖孝子之求神有於隂而求之者以其形魄歸於地故於隂而求之凡祼是也禮記曰周人尚臭盖先灌而後作樂求諸形魄之謂也本朝宗廟之禮多從周謂宜先灌而後作樂從之十月六日依奏又言宗廟之有祼鬯焫蕭則與祭天燔柴祭地瘞血同意盖先王以是通徳馨於神明近代有上香之制頗為不經按韋彤五禮精義曰祭祀用香今古之禮並無其文隋志云梁天監初何佟之議鬱鬯蕭光所以逹神與其用香其義一也上古禮朴未有此制今請南郊明堂用沉香氣自然示天至恭合質陽之義北郊請用上和香地道親近雜芳可也臣等考之殊無依據今且崇事郊廟明堂器服牲幣一用古典至于上香乃襲佟之議如曰上香亦祼鬯􅌊蕭之比則今既上香而又祼焫求之古義已重複况開元開寳禮亦不用乎禮文無月日從違當考今附先灌後作樂下又言古者郊廟助祭之臣皆親疎異等貴賤異位主客異儀夷夏異制然後禮容不亂而君道益尊故儀禮特牲饋食禮有門外之位以省事有堂下之位以行禮貴者在北賤者在南尊者在前卑者在後主人在東衆賓在西而明堂位夷狄之位皆在門外諸侯之位皆在門内皆不可得而易也國朝之制天子親祠南郊亞終獻及百官統於至尊之後而公卿與分獻執事之臣獨在内壝東門之外又太廟明堂公卿在東宗室在西皆無親疎尊卑之别伏請親祠南郊設助祭公卿位於亞終獻之南設分獻官位于公卿之後執事者又在其後每等異位俱重行西向北上太廟設亞終獻位於階東設宗室位於其後皆西向北上設助祭公卿位于階西文武百官於其後皆東向北上設賔客位于門外隨其方國貼黄稱檢㑹開元開寳禮本朝儀注親祀圜丘明堂即無宗室立班位詔禮院將新定朝㑹圖及行禮處地歩參定奏聞禮文四年十月六日中書批㫖送禮院今附本月日究竟當考又言聖王之事宗廟禮如事生故饌則薦四時之和氣與四海九州之羙味貢則陳金璧龜帛以明功徳之所致雖丹漆絲纊竹箭之㣲必具以明共天下之財其餘無常必致國之所有以明逺物無不致良以土地人民皆祖宗之所生成者以其治功之所致歸美於祖宗自秦漢以來奉宗廟者皆不本先王之經訓有司奉行充其位而已故天下常貢入王府者未嘗陳於太廟良為闕畧欲乞親祠太廟並令户部陳嵗之所貢以充庭實仍以龜為前列金次之玉帛又次之餘為後從之四年十月六日依奏今附本月日又言國朝㳂唐制以太尉掌誓戒太尉三公官所謂坐而論道者非掌誓之任伏請親祠命吏部尚書一員掌誓戒刑部尚書一員涖之詔掌誓戒用左僕射闕即用右僕射又言祥符八年始命司天監二員分獻自後又命它官攝司天監行事日官既非習禮事神之司又假其官名以行禮殆非禮意伏請應以司天監分獻者並改差禮官又言唐六典以侍中奏中嚴外辦及解嚴竊詳侍中之職掌出納帝命緝熈皇極佐天子統大政凡軍國之務與中書令參總焉自唐以來謂之真宰相非復秦之丞相及漢魏掌御物之任也伏請奏中嚴外辦以禮部侍郎奏解嚴以禮部郎中並從之庚申涇原路經畧司乞指揮逐路經畧司出界每有軍前攻討殺獲互報從之詔种諤攻米脂寨未破大兵留駐已久不惟坐費糧食兼慮損傷者衆委沈括移諤宻審議如及十日未拔當如何處置以聞詔承事郎大理寺丞王援朝奉郎集賢校理大理少卿朱明之承務郎王防各追一官勒停明之落職前權漳州軍事判官練亨甫除名勒停編管均州知諫院舒亶大理卿崔台符少卿楊汲各罰銅二十斤通直郎集賢校理蔡京落職先是大理寺鞫王珫與石士端妻王氏姦罪辭及王珪之子仲端亶上言珫父子事連仲端甚明有司以珪故觀望不敢盡理根治仲端亦自訴上命内侍馮宗道監劾而事果不實宗道面奏乃元告人許貴避罪虛妄見已結案上批獄丞王援承勘作姦不可不治乃命監察御史裏行朱服檢正中書刑房公事路昌衡移劾於同文館仍以宗道監劾明之妻翰林學士王安禮之姪也與集賢校理知諫院蔡卞連親知安禮等與珪有隙明之嘗薦引援遂諭㫖於援令劾仲端有姦狀及以證左兩詞互説聞上退又偽為上語以語其妻於是安禮之子防以語亨甫亨甫以語亶亶信之以聞援嘗為安禮所舉欲合明之意故入仲端罪防𫝊明之所造上語于亨甫意欲𫝊逹言事者以聞根治仲端則事連珪亨甫以防所𫝊仲端事語亶意欲求亶引薦亶褒稱亨甫許以言逹於上又漏露所奏及宣諭語京嘗在朝堂與明之語仲端事云丞相疑吾輩獄事切湏子細及赴臺再問報上不實台符汲坐知援等為姦俱不按發故也上諭輔臣曰如明之輩不肯以忠實事上人材可謂難得使内外小大之臣皆有至誠惻怛之心以為朝廷則政事修舉夷狄知畏今士大夫出公門入私門者凡以為利而已劉向所謂行汙而寄治心私而託公昔李斯相秦并一天下可謂有功矣及趙髙説以扶蘇立則䝉恬用䝉恬用不復提通侯之印斯既有利心髙説得入不獨喪其身并亡秦之天下夫能上不為名下不為利中守義而已可謂君子人也左右近司亦當以此風厲在位宰臣王珪等曰屢聞聖訓臣等交相儆厲考察人才比數年間沙汰成就必有材能以副聖意七月四日再鞫王仲端二十五日劾王援移大理獄于同文館今并入此不復見于彼是日李憲引兵至努扎谷賊衆數萬牛羊駝畜充滿川谷於二十里外下寨前據天澗兩重後倚南山石峽賊逆戰自午至酉賊退保天澗天澗深濶憲慮有伏兵不欲追襲夜與賊對岸相射夜半賊遁去斬獲六百餘級奪馬數百匹二十三日丙子奏到今移入此不復見于彼壬戌詔李憲已總兵東行涇原總管劉昌祚副總管姚麟見統兵出界如前路相去不逺即與李憲兵㑹合結為一大陣聽李憲節制又詔趙濟與胡宗哲趣應辦軍湏從憲請也詳定禮文所言丙申詔書季秋祀英宗於明堂以配上帝餘從祀羣神悉罷臣等以類推之伏請孟春祈榖孟夏大雩惟祀上帝止以太宗配亦罷從祀羣神以明事天不二又按禮雩壇當國南今寓圜丘非是乞改築從之又言古之王者行則嚴羽衛處則厚宫闈所以示威重備非常也故周禮王㑹同則為壝宫食息則設帷宫漢祀甘泉則有竹宫至于江左益有瓦殿本朝沿舊制親祠南郊行宫獨設青城幔殿宿者有風雨之憂而又無望祭之位且青城之費嵗以萬數臣等欲乞倣青城之制創立齋宫一勞而省重費或遇風雨可以行望祭之禮詔送禮院候修尚書省了日取㫖此據禮文乃四年十月十八日聖㫖實録不載今特詳著之元符齋宫侈甚或由是始也又言謹按儀禮曰嗣舉奠又禮記曰登餕獻受爵則以上嗣尊祖之道也則知古者上嗣本為宗廟神明擁佑故當顯相人主䖍恪禮事以報神靈之貺然後舉奠而飲以明上受祖宗錫羡無疆之休下示尊崇正統之緒臣等歴選前世奉祠宗廟雖有皇嗣侍祠之儀而未有舉奠之禮欲乞將來親祠太廟既祼之後太祝以斚酌奠鉶南俟皇帝正祭受嘏訖命皇子舉奠以明上受祖宗錫羡無疆之休下示尊崇正統之緒從之四年十月九日依奏今附本月日又言古有隋祭今無之誠為闕典復請増修儀注仍藉以白茅從之十一月八日依奏今附九日又言祭祀之禮神有尊卑故禮有降殺徳有大小故物有厚薄惟其稱而已天神尊故以神道接之社稷五祀卑故以人道接之以神道接之則貴逺人之物故郊天先薦血次薦腥次薦爛次薦熟以人道接之則貴近人之物故社稷五祀先薦爛次薦熟至於羣小祀則又其卑者故薦熟而已禮記曰禮之近人情者非其至也郊血大饗腥三獻爛一獻熟是故君子之於禮也非作而致其情此有由始也又曰郊血大饗腥三獻爓一獻熟至敬不貴饗味而貴氣臭是也近世社稷五祀不薦熟皆未應禮伏請社稷五祀先薦爛次薦熟四方百物宫中七祀司中司命風師雨師止薦熟從之四年十月九日依奏又言祭祀之有樂所以昭告於天地之間庶幾求神而得之也周禮大司樂凡天地神示四望山川祖妣皆分樂而序之下至川澤山林丘陵墳衍土示亦皆有樂而風師雨師所以發生萬物司中司命司人之禍福功亦大矣豈可無樂以降格其神靈説者曰乃奏姑洗歌南吕舞大㲈者是其樂師之職曰凡國之小事用樂者令奏鐘鼓説者曰小祭祀也又舞師之職曰小祭祀不興舞説者曰宫中七祀則無舞小師職曰凡小祭祀鼓朄所謂小祭祀者司中司命風師是也既已奏鐘鼓又云鼔朄則是有樂眀矣伏請特詔有司祠司命風師雨師用樂仍製樂章以為降神之節從之四年十月九日依奏癸亥种諤至石州賊棄積年文案簿書枷械舉衆遁走移軍據之丙子二十三日奏到新紀書癸亥入石州舊紀係之乙亥誤也案石州屬河東舊兼嵐隰自為一路又合三州置都廵檢使三朝兩朝史地理志及武經邊防皆不載陷賊年月不知何故賊棄而走當考之賊界自有石州監軍司此必非河東石州也甲子詔諸路兵出界暴露寒凛委主兵官常體察給褁費或特支無令失所仍不得過為姑息史館修撰曽鞏言臣誤被聖恩付史事及䝉面諭所以任屬者臣愚不肖不知所處是以早夜一心極慮惟祖宗積累功徳非可形容矧臣之鄙陋豈能擬議髣髴將無以使列聖巍巍之偉績焜燿昭徹布在方冊此臣之惴惴也竊惟前世原天推功必始於受命之君以明王迹之所自故商頌所紀繇湯上至於契周詩生民清廟本於后稷文王宋興太祖開建鴻業更立三才為帝者首陛下所以命臣顯揚襃大之意固以謂太祖雄材大畧千載以來特起之王國家所繇興無前之烈明白暴見以覺寤萬世𫝊之無窮臣竊考舊聞旬月次輯太祖行事揆其指意所出終始之際論著于篇敢繕寫上塵臣内省大懼智不足以究測髙逺文不足以推闡精㣲使先帝成功盛徳晦昧不章不能滿足陛下仁孝繼述之心仰負恩待無以自贖伏惟陛下聰明睿智不世之姿非羣臣所能望如賜裁定使臣獲受成法更去紕謬存其可采繫於太祖本紀篇末以為國史書首以稱明詔萬分之一詔曽鞏今所擬修史格若止如司馬遷以下編年體式宜止倣前代諸史修定或欲别立義例即先具奏五年四月二十八日罷修五朝史詳定禮文所言謹按周禮大宗伯以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風師雨師所謂周人尚臭升煙以報陽也煙陽之氣也陽祀而用陽之氣以求之所謂本乎天者親上亦各從其類也近世惟親祀昊天上帝燔柏柴外其餘天神之祀惟燔祝板實為闕禮伏請天神之祀皆燔牲首所有五帝日月司中司命風師雨師靈星夀星並請以柏為柴升煙以為歆神之始詔從之兀豐四年十月十一日依奏又言熈寧祀儀正月上辛祀感生帝孟冬祭神州地祇牲用羊豕春分祀髙禖用犢與羊豕各一春秋祈報社稷用羊豕各二謹按周禮小司徒凡小祭祀奉牛牲鄭氏云小祭祀王元冕以祭然則王者之祭無不用牛唐韋彤五禮精義天寳二載詔减用犢之數配帝無犢大歴六年詔方丘减用少牢開寳通禮曰聖朝除祀天地之外太牢合用牛者皆以羊代之竊以感生帝神州地祇歴代崇奉為天地大祠今以宣祖太宗配侑雖是有司攝事謂宜俱用犢而去羊豕禮記月令仲春之月乙鳥至之日以太牢祠于髙禖記者曰求子之祭不與常祭同故不用犢今祠禖用犢與羊豕各一謂宜改犢為角握牛王制曰天子社稷皆太牢諸侯社稷皆少牢白虎通曰人非土不生非榖不食祭社稷以三牲重功也太社為天下報功後漢郡縣社稷太守令長侍祠牲用羊豕唐禮社稷用太牢大歴中减用少牢正元五年包佶奏請社稷依正禮用太牢今自社稷下至郡縣社稷皆用少牢而祭殊不應禮夫為一郡邑報功者當用少牢為天下報功者當用太牢所有春秋祈報太社太稷謂宜于羊豕外加角握牛二從之元豐四年十月十一日依奏又言周禮小宗伯之職兆五帝于四郊四類亦如之熈寧祀儀兆日于東郊兆月于西郊是以氣類為之位至于兆風師于國城東北兆雨師于國城南兆司中司命于國城西北亥地則是各從其星位而不以氣類非所謂四類也盖自隋以來失之謂宜據舊禮四類之義兆風師于西郊祠以立春後丑兆雨師於北郊祠以立夏後申兆司中司命司禄於南郊祠以立冬後亥其壇兆則從其類其祭辰則從其星位仍依熈寧祀儀以雷師從雨師之位以司民從司中司禄之位所有雨師雷師則為二壇同壝司中司命司民司禄以為四壇同壝其壇制髙廣自如故事從之四年十月十一日依奏又言古者享司寒惟以藏冰啓冰之日熈寧祀儀孟冬選吉日祭司寒宜寢罷其季冬藏冰則享司寒於冰井務牲用黒羊榖用秬黍仲春開冰則但用羔而已又開冰將以御至尊當有桃弧棘矢以禳除凶邪縁非禮之物不當設於神坐當依孔頴逹所説出冰之時置此弓矢於凌室之户從之四年十月十二日依奏又言本朝郊廟祭器陳設既已無法至臨祭之旦實籩豆簠簋者皆賤有司紛然雜亂非復禮制其三牲之爼獨以司徒一官奉之而不徹其籩豆簠簋之薦皆不屬大宗伯而又不徹伏請祭前一日司尊彛以監察祭器官充帥其屬以法陳祭器于堂東陳設之法具别圖上僕射禮部尚書視滌濯告潔祭之旦光禄卿率其屬取籩豆簠簋實之既實反其位及薦腥之初禮部尚書帥其屬薦籩豆簠簋户部尚書兵部尚書工部尚書薦三牲之腥爼又薦熟爼禮畢禮部尚書徹籩豆户部尚書兵部尚書工部尚書徹三牲之爼皆有司受之以出元豐四年十月十一日中書劄子奉聖㫖依奏又言詳國朝郊廟明堂禮以郊社令設玉幣太祝取玉幣以授門下侍郎進皇帝門下侍郎取爵進皇帝奠爵皆未合禮伏請郊廟明堂吏部尚書一員奉爵以次從皇帝至神坐前左僕射闕即右僕射以玉幣進皇帝奠於地及酌尚書左丞闕即右丞以爵授僕射進爵皇帝酌獻訖侍郎受幣以贊飲福及焚燎外宗廟仍尚書設玉几元豐四年十月十一日中書劄子奉聖㫖依奏又言詳國朝親祠太廟門下侍郎取瓚於篚進皇帝侍中酌鬯進瓚皇帝祼地置瓚皆未合禮伏請親祠太廟命禮部尚書一員奉瓚臨鬯禮部侍郎奉盤以次進皇帝酌鬯裸地訖侍郎受瓚并盤退元豐四年十月十一日中書劄子奉聖㫖依奏又言詳國朝南郊太廟儀注雖有太常卿宗正卿省牲之文實未常行至於明堂又無省牲之官惟太祝廵牲而已其省鑊則以光禄卿而又未嘗視腥熟伏請祭前一日禮部尚書禮部侍郎省牲光禄卿奉牲告充告備禮部尚書省鑊祭之日禮部侍郎視腥熟之節並從之元豐四年十月十一日中書劄子奉聖㫖依奏乙丑种諤言米脂寨降其寨正當衝要南直綏徳北捍銀夏糧儲器甲萬數不少全藉得力使臣守䕶乞以東頭供奉官觧宗道為寨主右侍禁毛思齊為監押前漢州司法參軍鄭翬為主簿詔解宗道等差權候將來討定日奏取指揮按閲三路集教義勇保甲趙卨言臣等近自晉絳至潞州按閲體問潞州昨轉運司差夫萬一千隨軍坊郭上户有差夫四百人者其次一二百人願出驢者每三驢當五夫每五驢别差一夫驅喝一夫顧直約三十千以上驢約八千加之期㑹廹趣民力實不能勝又言軍須調發煩擾止是不急之物如絳州運棗千石徃麟府每石止直四百而雇直乃約費三十千陜西買披皮供公亦非要切如此之類乞特裁損先是詔卨等聞河東轉運司應副軍事調發人夫不量民力厚薄致有實不可勝屢經州縣號訴者卿等可因按閲所至廉問如委有措置乖方事狀馳驛以聞故卨等有是奏詔以河東差夫及餽運乖方命趙卨權管勾都運司俟事畢依舊令卨選官於潞州置司械陳安石黄廉劾罪莊公岳趙咸隨軍軍囬取㫖其按閲集教義勇保甲止令李舜舉往上續批陳安石黄廉可且令送獄収禁劾之此已上並實録初王中正在河東令轉運司勾押吏與安石計度軍儲且命之坐吏曰都運在此中正叱曰此中何論都運若事辦奏汝班行不辦有劍耳安石問中正約用幾日糧中正報以四十日已而駐兵白草平彌旬安石驚曰初約用四十日糧今既彌旬不進事未可知萬一饑潰將責我之軍興矣按王中正以九月二十三日發麟州留屯白草平十二月二日乃自白草平西行十三日始渡無定河安石𫝊曰駐兵白草平彌月誤也當作彌旬又自發麟州至神堆驛與种諤軍遇才二十日耳所稱彌月其誤明甚又按中正令莊公岳等備半月糧公岳等更備八日總二十三日安石𫝊云四十日未知孰是當考即發民再運一切増配趣辦廉以提㸃刑獄兼轉運事謂安石曰乏軍興雖死斟酌無乏可也何必爾徐謂中正民力可哀宜稍寛之中正齎公錢巨萬出塞給取不平廉復規之中正始怒異時部糧率委縣令佐安石謂文吏畏怯但募敢行者得使臣二百人中正既取其半餘悉從莊公岳趙咸在軍中廉自塞内續運乃無可使者數移文不報廉即引數十騎出塞百餘里夜追及之中正等大驚分使臣五十人以歸亟上言師必無功且未有以善其後願速募民入芻粟實塞下得補官一切除罪以寛邊甿尋詔廉罷兼轉運事㑹李舜舉言安石等不請擅發民再運而中正亦以運事乖方歸罪於廉等上既命卨等考實因有是命後三日又命奉議郎知開封司録參軍喻陟提舉河東路當一等事仍不妨本職劾陳安石等此據實録乃十六日事今移入此此月十二日黄廉奏并五年二月二十一日黄廉降一官皆與此相關安石自麟州赴逮未至數十里㑹他路亦有以糧不繼聞者詔安石就職如故此據陳安石黄廉新舊𫝊及司馬光記聞刪修廉傳云中正軍潰歸罪於廉乃遣中貴人就詰廉謝不辦遂下潞獄考潞獄興于十月十二日此時中正猶未渡無定河十五十六間與种諤相遇後兵始有逃者方置獄劾廉等時中正軍未潰也其劾廉等運事乖方或在置獄後未可知今且附此更湏考詳廉罷兼轉運司事據九月二十九日催廉奏代州地界圖御札明年二月二十一日廉降一官記聞又云轉運司本具四十日糧中正止令備半月趙咸等又備以八日然則安石傳所云中正報安石備四十日糧者誤也記聞不誤湏别加刋修黄庭堅作廉行狀可考然此亦畧具矣廉行狀云廉為河東提㸃刑獄兼提舉義勇保甲八月麟府軍興兼權轉運判官又差定代州地界廉條具曲折為十二寨圖以進且言建議者以分水畫界恐地勢不能盡然啓敵人心失中國險固其後遼人果責分水之言包取兩不耕地據有形勝下臨鴈門父老於今以為恨及王中正發軍興皆用一而調二其數皆千萬計或非所急或非所用轉運使陳安石不知所出奉行唯力恐不辦或増調之一道騷然百姓朘剥至骨廉為言主將非其人其勢必敗事乏軍興雖罪死斟酌事宜使不乏而已何忍自竭根本安石字謂廉曰夷仲安石老棄今日但保首領歸安能顧惜待制其任國家大計蓋如此廉每為中正言朝廷大體民命重寄贊道其所長稍稍規之初雖言不以為忤及將出界取公錢巨萬為特給中正父子多自予餘以差給凡在軍者廉為言斂天下以奉一方皆出於不得已願更為縣官愛惜中正始怒是時隨軍使臣員二百多請託徼幸成事或父子兄弟皆在行中正已取其半莊公岳趙咸將漕隨軍廉在塞内主續餽餉欲部分使臣䕶道路而中正所取之餘盡隨公岳咸無在者師去界已百餘里移文追之皆不報廉謂勾當公事孔文仲當自馳往取之夜置酒與文仲訣文仲泣曰公行塞外事不可知使臣自從軍非公責也廉曰王事當計成敗豈但塞責耶從十數騎盡夜追至軍中正等皆大驚廉罵公岳咸取使臣五十餘復歸因上疏言大軍必無功未有以善其後乞募民入芻粟實塞下得以補官及一切除罪少寛近邊百姓已竭之力已而大軍潰歸中正歸罪轉運司應副乖方且言黄廉不肯協心同力上遣御藥竇士宣簿責乖方十事廉以書對稱死罪皆實有之繼遣開封府司録喻陟就潞州置獄安石以應副漕輓免就獄廉獨對吏月餘但坐奏請張皇降一官在職如故師出以元豐四年廉降官以五年三月檢正中書刑房公事權管勾河東轉運司公事路昌衡言乞於河北邊近本路州縣差科人夫四萬人般擔軍湏至太原府上批比以河東主漕之官為不得力故差昌衡救補之覬一路百姓稍獲寛舒今昌衡奏請尤見滋張乖方之甚欲更科差旁及他路况河東止是供辦一頭項兵馬不及五六萬人騎因何如此費力未知大綱如何措置至如陜西路分雖大元無多河東一倍之數而供四路軍湏約三十萬人騎不聞不足顯是經畫全無次緒以致人力欠闕如此緣本路止係籍義勇保丁有二十一萬餘人豈有供上件一軍不足之理若不嚴與教誡則外患未除而民力先弊何以持久其於國計邊防極為可憂中書職在軍食可具合教誡事仍令河東轉運司分析以聞竟何如當檢附是日涇原路行營總管司破賊于瑪伊克隘史作磨移隘今從張舜民所作昌祚墓銘先是詔涇原兵聽髙遵裕節制仍令環慶與涇原合兵擇便路進討夏人之諜者以謂環慶阻横山必從涇原取胡盧河大川出塞故悉河南之力以支涇原既而環慶兵不至劉昌祚與姚麟率本路蕃漢兵五萬獨出離賊界開噶平十五里遇賊三萬餘衆扼瑪伊克隘口不得進諸將欲舍而東出韋州與環慶合昌祚曰遇賊不擊枉道自全是謂無次且為客利速戰古今所聞公等去此自度能免乎乃謀分軍度胡盧河奪隘牌手當前神臂弓次之弩又次之選鋒馬在後諭衆以立功者三倍熈河之賞衆驩甚響震山谷昌祚既挾兩牌先登弓弩繼前與賊統軍國母弟梁大王戰自午至申賊小却我軍乘之賊遂大敗追奔二十里斬獲大首領瑪爾鄂沙勒監軍使梁格烏等十五級小首領二百十九級擒首領統軍姪策木多哷克等二十二人斬二千四百六十級獲偽銅印一自是我軍通行無所礙轉運副使葉康直判官張大寧皆隨軍謂昌祚曰觀公臨危持論詞氣不憤可以立朝為天子爭臣非特善於將兵也此據張舜民所為劉昌祚墓銘并實録本𫝊増修新紀載涇原總管劉昌祚大敗夏人於瑪伊克隘在己卯日舊紀于丙子日書劉昌祚敗夏人於瑪伊克隘斬首領二百十有九級獲首虜二千七百級
