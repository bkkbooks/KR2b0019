body:
  text: 續資治通鑑長編卷四百八十八宋李燾撰哲宗紹聖四年五月辛未中書舍人蹇序辰言吏房送到吳居厚除權户部尚書詞頭詔令臣命詞行下按居厚頃於元豐間被知先帝自朝散郎除天章閣待制充京東路都轉運使先帝親為褒詔稱居厚將命一道不辱使指無黷乎上不擾乎下不喧乎聞於二三年間坐致財用數百萬計前日縣官窘迫一朝變為寬舒求之內外主財之臣政績著驗顧未有出其右者至於遷官賜服數次及司馬光用事務快宿憾改更廢黜先朝政事人物故劉摯等附會首論居厚而言多無實不待服罪責為散官考其所坐悉緣公事本無贓私廢棄顯狀一被譴斥首尾十年至紹聖親政始復收用察其元犯已與除落今自户部侍郎除權尚書計其資歷無甚超越而議者尚以前事為言臣若茍隨流俗心懷顧避既慮給事中封駮又恐諌官御史奏論相與協心終不命詞反致先帝初則失人次則失言以矯誣在天之威靈而助成司馬光劉摯等之素志則是臣懷利朋姦沒身無以塞責是以聞命審思即草詞訖蓋以其心非附朝廷以為同非反同列以為異非交私居厚以為朋黨而區區之忠所深慮者纍先帝知人之明違今日紹述之志也望降臣此章與居厚除命行下明示好惡以風四方則非獨於臣幸甚詔榜示朝堂朕以眇躬獲承先造永惟休烈盛美欲以昭示萬世而頃遭群姦同逞宿憾興訛造訕力肆詆排政事人材廢毁殆盡夙夜悼懼靡敢遑寧思與卿士大夫共承厥志庶幾德業傳信無窮念今在廷之臣鮮知事君之義崇鄉原以為善士造虛譽以進無能以交私合黨相先以奉法守公為諱材智勝任則闒茸共嫉趣向至正則頗側深仇端亮徑挺有特立之操者不見容於衆人媕阿回遹持兩可之說者必得名於流俗沉溺忘返險薄可嗟乃隂懷私恩顯廢公議以姦臣所斥逐為當罪所變更為得宜以先帝所建立為不然所褒擢為非當借譽餘黨幸復甄收務令舊章未能淳一扇為是非不定之論欲開善否更用之端浸長小人之道於難知之中以疑天下之聽於未孚之際幸時事之中變庶人情之翕從每懷及兹良用慨嘆朕察言觀事灼見邪心欲正典刑當申警誡繼自今日爾其自新式懲厥愆畢趨於正示以好惡非曰茍然其或怙終必罰無赦咨爾在位尚克欽承元祐初章惇爭論役法劄子有云役法可以緩改非如京東鐡馬福建茶鹽不改一日則有一日之害也及蔡卞與序辰謀共作詔榜慮惇不從乃持惇元祐劄子以脅之曰若謂居厚京東所行非是則先帝褒詔亦非是矣惇噤不能語於是從序辰所請降詔榜云今實録元祐元年二月章惇論役法劄子亦無此不改一日則有一日害等語蓋崇寧史臣隂為惇諱紹興史臣不能檢討增益之也詔起居郎兼權中書舍人沈銖不當以無根繳奏吳居厚特罰銅二十斤銖再論居厚頃使京東坐聚斂罷不可以長地官即改命蹇序辰仍令銖分析序辰既草制銖因被罰壬戊除居厚銖繳詞頭甲子再繳戊辰改付序辰辛未罰金舊録云吳居厚除户部尚書銖以居厚領使京東坐聚斂罷不可以長地官詔銖具實狀不能對罰金新傳因之居厚實狀有何難對政坐以元祐為諱耳史臣媕阿莫辨可嘆也翌日樞密院奏事曽布曰上竊聞沈銖近以繳吳居厚詞得罪上曰止罰金布曰又聞有勑榜上曰止降詔布曰居厚初除待制葉祖洽亦嘗繳奏陛下聼之今沈銖既罰金又降詔榜告以吳居厚蹇序辰為君子以沈銖為小人恐人情不服上曰不曽指名布曰聞三省行遣先坐沈銖繳狀詞次用蹇序辰章疏降詔如此亦指名也古人以逆人主指為逆鱗以謂攖之者死然挺特自守之士以義理自守議論之際雖死不避儻欲使衆論以小人為善人君子為小人雖曰殺人亦不可奪况出榜乎臣以為詔榜無益於事兼如此乃是欺罔聖聽上曰序辰因何却與居厚一般布未及答林希進曰此已行之命無可論者曽布所陳極當望陛下知察耳上唯阿而已布録在壬申今附此日後數日布録在丙子布又言臣前日論居厚事喋喋煩聖聽然聖問以謂序辰何以與居厚一般臣倉卒未及對陛下知居厚事狀否元豐中先帝欲按閲河北保甲患用度不足居厚即獻絹三十二萬及措置糴便陜西邊事居厚皆有所獻此時先帝不得不恱財利之臣能舉職如此不得不奬擢然京東嵗有羡餘一二百萬非取之於民何所從出前日之京東今日之京東與居厚在彼時宜無以異不知居厚何術獨能致此羡餘居厚之所經營如民間禁補修舊鐡器一一要從官買其他掊斂細碎大約類此上曰事皆虗當時不曽根勘但人言如此耳布曰居厚京東之事人人共知恐不虛如鐡器事嘗為優人所玩安可謂無兼章惇元豐末章疏曽論居厚云京東之人恨不食其肉此語莫不虗否然居厚不足論掊斂之事害及一路而已若序辰者則害天下其為害蓋百倍於居厚何止一般何以言之序辰凡所議論不復顧義理若三省所恱雖凶慝小人必多方主張庇護害政之大無大於此今但言流俗之人黨助元祐姦黨冀其復用臣固嘗開陳以為君子小人皆不當有此意誠令與三省異論之人皆是小人緣小人用心惟利是視豈可舍今日權要大臣不肯附麗却一向黨附海外編管安置之人冀其復用以求官職希進用其術無乃太踈乎小人懷利必不應顛倒如此但知義理自守之士不肯為三省變易天下公議雷同欺罔爾兼居厚昨除待制葉祖洽亦嘗繳詞陛下伸祖洽之言罷居厚之命中外鼓舞稱誦今日沈銖所繳乃與祖洽無異而銖獨罰金又出敕榜此臣所不曉又如吕嘉問欲除卿陛下以為不可欲除侍郎陛下以為不可過都門欲一見陛下亦以為不可今忽除待制莫不駭聞緣權侍郎四年方即真又一年乃得待制今比之侍郎乃更速五年矣臣固疑近日政事更非前日之比也亦嘗自陳凡所欲言隱忍者十有八九而其所陳已喋喋不勝其多臣猶自厭况陛下乎上曰大臣所見豈可不言言之何害布曰臣每䝉陛下開納如此益不敢循默然願陛下更賜采納臣自初秉政即嘗奏陳以為先帝聽用王安石近世罕比然當時大臣異論者不一終不斥逐者蓋恐上下之人與安石為一則人主於民事有所不得聞矣此何可忽也上曰馮京輩皆是布曰非獨京輩先帝曽諭臣王圭雖不言未必不腹非也今三省無一人敢與惇卞異論者許將輩見差除號令有不當但鬱悒而已如序辰輩多端劫持驚恐在位之人使不敢與三省違戾只如有文字云元祐大臣非其死黨不得為執政許將見此一語為之破膽上曰不記得有此文字布曰序辰但於文字中以一兩句微詞驚恐許將輩非公然排擊許將宜其陛下不記也今上下人情如此願陛下以先帝御安石之術為意上又問林希用心如何布曰臣纍曽言希有學問識見若不為利害所怵於義理不患不曉今致身至此實不肯附麗人議論極向正上曰於卿處則然未知他處何如爾布曰或不至此布又問上近日論議者莫亦以臣為黨助元祐之人否上曰豈有此理卿何可加以此布曰臣固自知於元祐之人無一毫干涉然見其變亂是非如此臣亦不敢自保上笑曰無之豈得有此布録在丙子本附此許將時為中書侍郎陳瓘尊堯集理財總論曰按安石初為從官即倡理財之說及至參知政事故行其所言今考日録第一安石於未執政前七對神考並無一言及於理財至於執政供職之第一日即僞書對上之言曰人主當以成禮義亷恥之俗為急若宣著為利之實而禮義亷恥之俗壞則天下不勝其弊孟子恥言利曰亦有仁義而已矣然其卒曰未有義而後其君者人人不敢後其君此乃人主大利也嗚呼安石著書首撰此語却思孟子之說其於前日所行不可謂之無悔也年運而往難悔可追悔而不改濟以欺僞作為誣書隂授蔡卞卞紹聖用事之初專述熙寧及哲宗既怒常立然後驟述元豐始與序辰謀作蓋抹之事矣事之本末臣請叙而論之臣聞紹聖三年尚書右丞蔡卞引選人常立為假通直郎崇政殿說書又力薦之賜對之明日復請躐除侍從官哲宗問卞曰立詆神考而卿薦之何也又顧丞相惇曰卿不見其語乎惇謝不知因請其語哲宗怒曰語在常秩行狀其語云自安石罷相以來民在塗炭又云自秩與安石去位而識者知政事必敗其諂厚安石而詆薄神考如此卞薦之何也即命中使史院取秩行狀哲宗親指塗炭必敗四字以示宰執惇等皆頓首謝罪請貶立監夀州酒給事中葉祖洽駮曰立詆毁先烈謫輕近地乃改立永州監酒而撰常秩行狀者趙冲特勒停初太學博士林自用卞之意倡其言於太學曰神考知荆公不盡尚不及滕文公之知孟子也士大夫固駭其言矣自哲宗既怒常立卞始惶駭改意而林自滕文公之罪亦自此不敢言於衆卞於是與序辰等始用蓋抹之術矣又論曰日録載安石之言曰人君為天地萬物主須是蓋抹得事過乃能濟天下紹聖中蔡卞用蓋抹之術在既竄常立之後安排之序的然可指臣請稽其本末而論之熙寧九年鄧綰落御史中丞安石亦相繼罷去退居鍾山著此訕書以授蔡卞卞當元祐之時增光潤色九年筆削恩怨分明回互妨嫌以叶衆好照顧本末以全私美書行於紹聖之始嫁禍與造書之人惇等醉迷例邅嫁賣不知宗廟之遭詆誣也天實使之薦常立哲宗皇帝灼見姦僞竄悖臣於逺方卞惟僞迹寖彰於是屈已改圖而用蓋抹之術矣蓋卞之初意譏薄神考元豐之政專務紹述安石熙寧之事至是知其不可則與蹇序辰同謀以神考褒勸吳居厚手詔榜於朝堂其迹則善述熙寧深讃元豐其心則脫安石詆誣宗廟夫詔褒居厚乃神考駕馭監司之意爾元祐初章惇爭論役法劄子云役法可以緩改非如京東鐡馬福建茶鹽不改一日則有一日之害也及卞序辰共作勑榜之時先以章惇元祐劄子脅持宰相曰昔以居厚京東鹽馬之事不改一日則一日之害是以理財之詔為非也惇計無所出喋不能語於是亦以勑榜為是矣且安石初欲理財自謂合於經術謂司馬光之徒皆不曉孟子義利之說豈以理財為不美哉及退而著書則於初作參知政事第一日便造安石奏上之言曰孟子恥言利若宣著為利之說則恐壞風俗又造安石奏上之言曰陛下但好理財者則汲汲而用至於講道則不以為急又曰以理財為先則人將機巧趨利又曰若以理財為先務又召致無行義之人則恐天下觀聽不足蓋安石捨衆自用造法於得君之初追悔著書於十年之後歸過宗廟圖蓋已愆是可忍也復何議哉又其歸過之言曰臣嘗勸陛下不須多張法又論𣙜鐡則曰官自鼓鑄則必與漢同弊此所以譏元豐之政也卞及序辰謀取神考駕馭監司之詔榜于朝堂豈為一吳居厚而已哉欲實安石詆譏之語而杜塞天下愛君之言耳夫有舒有慘天道所以變通一弛一張文武所以相濟神考聖訓曰什一而稅足矣又曰今稅斂已重此則理財之正論聖主之本心也至於詔奬居厚則所以奬有勞之臣耳孰敢以為非乎卞等揭視一詔便謂安石所諱理財之事可以移過於宗廟而曰録誣僞之言可以取信於天下後世蓋卞等所謂蓋抹者如此御史蔡蹈言臣伏覩聖㫖指揮以權中書舍人沈銖繳還新除户部尚書吳居厚詞頭令具析聞奏者臣竊以中書舍人之職專掌書命朝廷除授未允公議則王命之出不可不審况有義當論列若論失其實而上罔朝廷即銖被罪黜可也不當更令具析待之以不信而使在廷之臣以此為戒它日無敢言者且居厚之為京東都轉運使牟利殃民衆所備聞近者朝廷初復居厚待制矣是時嘗有繳還詞頭者朝廷為罷其命不聞有令具析聞奏之㫖今居厚超遷踰等又非待制之比而銖之所論公議翕然不可不察也臣愚欲望聖慈追寢令銖具析指揮庶存近侍論思事體又言伏見聖㫖指揮以權中書舍人沈銖繳還新除權户部尚書吳居厚詞頭令具析聞奏既又罰銅二十斤放并今月十九日尚書省降到勑一道臣僚上言辨雪吳居厚事令本臺榜朝堂者臣謹按居厚奉使京東征利苛急惟務羡餘以赴功賞而創置鐡冶等非義取民一方愁怨聲動朝野在元豐末年左右大臣已嘗論奏其惡而責守廬州矣其大臣及同時被遇先帝之人莫非公心以救正朝廷法度以此見居厚非本無過者若謂悉皆緣公本無贓私則人臣奉使一方不能致朝廷之德意下究而萬口嗷嗷不勝其怨其為失職何必贓私設或棄瑕甄録出自宸聰則臣下所不敢知其如中書舍人當行職事其所見繳還詞頭未為過也而勑㫖勒令具析事狀既而罰金以加其罪亦已太甚宜乎衆所駭聞也蓋居厚事狀天下共知若謂論者厚誣是欺天下也天下之不可欺以有公議存焉公議不恤雖聖訓諄諄申警具寮恐無補也孔子曰天下有道則庶人不議今朝廷清明陛下仁孝習先朝故事固已純一庶人無知且猶無所議况士大夫乎天下既無異議而止緣中書舍人繳還詞頭便為異議如此則一切不問無繳還者謂之其志同可乎臣愚伏望聖慈更加省察沈銖繳還吳居厚詞頭實協公議特賜原宥庶使在廷之臣不以言為戒矣天下幸甚河東路經略司言內殿崇班王安靜昨出界討擊青魚河賊所部殺獲最多昨與折克行子姪一例同减半推恩依格合轉三官更减四年磨勘除正推恩外有轉一官减四年半磨勘未賞詔王安靜特依格更與轉一官仍减四年磨勘觀文殿大學士守太子太保致仕韓縝卒上為輟朝成服於後苑贈司空壬申起居郎權中書舍人沈銖乞罷中書舍人職事詔從之仍改差起居舍人龔原兼權樞密院言去秋西賊舉衆入冦鄜延除環慶係鄰路差那兵將前去䇿應外其餘路分並曽出兵牽制內涇原入界破蕩沒煙新寨廣有斬獲熙河乘此進築安西城畢以此稍沮賊氣比纍據環慶等路探報賊界今年秋㸃集河北諸監軍司人馬雖已降朝㫖下諸路過為隄備竊慮西賊併兵冦犯一路其餘路分臨時却有觀望不出兵牽制不惟使被寇路分難以枝梧若西賊分兵侵犯諸路即逐路兵力足以隨冝應敵捍禦掩擊如併兵寇犯一路其鄰路除合行䇿應外如可以側近去處據險設伏出竒掩擊或扼其歸路或旁出間道邀擊輜車或廣張旗幟多設疑兵使賊顧望難於進退因其留滯困怠可以追粘尾擊或乘其退散之際痛行掩殺即選委統制兵將帶領得力將佐及精鋭人馬前去其牽制路分若去被寇路分不逺亦依此施行或道路隔邈難以前去即精加探討發兵入界掩擊團聚兵馬或討蕩賊界諸州或監軍司或郊野住坐部落族帳或於本路有合展拓城寨乘伺間隙便行進築如此則西賊於分兵併兵皆無以得志假如蹂踐一路邊面即諸路討蕩或進築彼所喪失不少使賊兵於分合之際無不受害進退左右無以為謀賊勢自須困敝諸路邊鄙常須獲利此最為備邊困賊之要惟在帥臣公心體國不懷畏避因循觀望之意豫與兵將官講議博盡衆論廣設方略則臨時可以乘機擇利應變出竒萬全取勝及戒約激厲將佐令知紀律不敢臨事逗撓及應干戰守凡百應接方略論議素定及令將佐人人通曉貴免臨敵倉卒措置乖方滋長邉患詔陜西河東諸路詳具措置方略以聞新本刪修云樞密院言去秋西賊舉衆寇鄜延除環慶係鄰路差那兵將前去䇿應外其餘路分並曽出兵牽制內涇原入界破蕩沒煙新寨廣有斬獲熙河乘此進築安西城畢稍沮賊氣比纍據環慶等路探報賊界今年秋㸃集河北諸監軍司人馬已降朝㫖下諸路過為隄備竊慮西賊併兵寇犯一路其餘路分觀望不為出兵牽制被寇路分難以枝梧若西賊分兵侵犯諸路合行䇿應如此則西賊於分兵併兵皆無以得志此最為備邉困賊之要詔陜西河東諸路詳具措置方略以聞廣西經略司言據知南丹州莫世忍牒男公鞫與弟公佞自成唇吻前去歸明乞在本路安泊公鞫稱曽入貢授銀青光祿大夫檢校太子賔客兼御史大夫武騎尉帶到妻男等二十一人同歸明人間勞共六人內間勞亦曽授銀青光祿大夫檢校國子祭酒兼監察御史武騎尉並乞換班行名目本司今相度欲差人伴送前去吉鄂州給田産安泊詔莫公鞫與鄂州團練副使不簽書公事間勞與吉州長史並不支請受仍令廣西經略司差人伴押前去鄂州交割今於本州一處居住候到給與係官堪耕種田土仰本州常切羈縻甲戍詔以眉州進士家素為綿州司户參軍充眉州州學教授用翰林學士承㫖蔡京薦也又詔故左班殿直金明寨主何鯁已與兩資恩澤更與一名三班差使母王氏封縣太君以鯁死事故也乙亥都提舉汴河隄岸賈種民言元豐年導洛通汴遂改汴口為洛口止係通放洛河清水遂名汴河為清汴間或水小即以匱內清水添助行流自元祐年間却於黃河撥口分引渾水令自逹上流入洛口比之清洛難以調節乞將汴河依元豐年已修狹河身丈尺深淺檢計合用物力具數申尚書省復元豐清汴立限修濬通放洛水復為清汴及乞依元豐年例復置洛斗門依舊通放西河官私舟船從之閏二月十九日初差種民同楊琰相度先是曽布嘗為上言昨李仲欲廢清汴當時若非臣在河陽清汴幾廢然仲以開御河遂復用臣竊以為用人當如此凡可以吏事驅䇿之人何可責以名節陛下嘗宣諭以為不可以一言廢人臣嘗稱誦德音以為不可易之論以仲等附麗之人何足深責當時只以王巖叟經過語仲以但建此議朝廷必行仲遂决然只以數句語言便欲廢清汴當時吳安持在都水臣既令通判往再相度得不可廢遂以申都水都水乃責問河陽云二者之言孰為是非臣遂申都水云通判之言允當事方寢前日因賈種民來白清汴事臣嘗及之種民亦能笑云都水不敢决可否乃責河陽上曰巖叟用心極可罪當時貶蔡確意不在確蓋有傾搖之意布曰此臣所不知此必有人言蔡確定䇿有功逐確則有廢立之意上又曰梁燾亦然又言先帝作清汴又為天源河有深意元祐中幾廢種民云若盡復清汴不用濁流乃當世靈長之慶布曰先帝以天源河為國姓福地此衆人所知此何可廢上曰吳安持亦不佳布曰朝廷每欲屏元祐黨人而安持獨進安持在元祐中附麗大防大防臨行猶且薦之而紹聖中獨進用臣所不曉熙河蘭岷路經略安撫陜西路轉運司言岷州錢監自來應副六路用兵支費和雇腳乘道里阻逺今相度欲以舟船般運至熙蘭二州極邊使用沿河亦有古道可以修治安置遞鋪直至熙河北瑪爾巴山等路一自岷州城外裝船於洮河內駕放般載錢物至中路上襯地名噶勒斡河水湍急并山硤石磧至下襯計六十餘里不可行船今既沿河道可開自上襯擺置六鋪勒鋪兵二人陸路般運至下襯地名章龍硤石却用熙州船裝載直至熙州或臨洮堡下卸其上下襯各置監官量行修廨舍庫屋卸納裝破并往來催督水陸路般運錢物從之丁丑三省言降授左朝議大夫致仕韓維本以先帝東宫舊臣在元豐末朋附司馬光最為盡力仍於奏狀內稱止為上謝太皇太后特賜褒諭更不奏謝皇帝顯有無君之心詔韓維責授崇信軍節度副使致仕於筠州居住維諸子乞盡納已官聽父居里詔以維先朝舊臣年八十一特許之其實諸子告章惇云父執政與司馬光議論多不合故得免行維子宗孺宗質此據維本傳并邵伯溫辨誣新録曰韓維歷事三朝耆哲老臣而云有無君之心實為誣謗今刪去仍於奏狀以下三十二字按三省所言其為誣謗審矣若削去此三十二字則不見當時所以行遣今復存之邵伯溫辨誣云范純仁責永州其子正平正思聞韓維責筠州維諸子告章惇以維執政與司馬光議論不合得免行亦欲以純仁昔與光議役法不同為言求歸先白純仁純仁曰吾用君實薦至宰相昔同朝論事不合即可汝輩以為今日之言不可也有愧心而生者不如無愧心而死二子遂止維謝表云臣言五月二十九日遞到告一道責授臣崇信軍節度副使致仕筠州居住尋進發上道至汝州汝墳鎮准穎昌府牒備坐尚書吏部符准敕三省同奉聖㫖以臣八十一嵗特免筠州居住者負罪之臣方懷於震惕好生之德遽軫於衰殘祗服異恩交流感涕伏念臣才非應務智弗周身舉遭遇於盛時遂冒塵於顯仕疲駑自竭績效無聞先帝貸其狂愚屢加保護陛下憐其勤舊首預甄收賦命屯竒操心迂拙䝉東朝之訪逮條當世之便冝獨貢謝章實乖常式緣久從於踈外致有闕於講求敢怠肅恭自干誅殛仰繫聖度特屈明刑止降冗員仍干善地杖槁體而祗役冒溽暑以纒疴撫已自憐籲天無所忽頒詔㫖許復里居招驚魂於𣪚亡尚迷歸路顧舊廬而錯愕恍若異身舉宗至於歡呼行人為之嗟嘆此蓋皇帝陛下德均慈父澤並陽春察臣夙禀冥頑未忍伏之鈇鑕愍臣久嬰疲瘵恐其斃於道途特貸衰年俾終餘日退安窮約甘自比於編民追省愆尤更當朝於沒齒奏狀稱止謝太皇特垂褒諭更不謝皇帝汪應辰嘗為燾言韓家子弟以為當時太皇謂維自今當呼卿等為公故維有此奏據維謝免行表則云條當世之便宜初不及呼卿為公等事須求韓氏家傳細考之中大夫提舉崇福宫范子竒為太中大夫依前充寶文閣待制致仕從其請也兩浙轉運副使張綬知洪州知蘇州賈青權兩浙轉運副使先是三省謂綬不職議以青代之曽布林希言綬亦無它但嘗牒陳次升問周穜索錢故三省惡之兼青苛刻前在福建起獄所按官吏有至除名其後理雪乃實無罪今又使之使一路不合物論京東有吕升卿兩浙有青數路人情洶洶不安矣上然之既而卒從三省議詔賜陜西河東銀絹百三十萬上頗吝內帑物曽布請以牧租錢給之乃許章惇曰內帑本以待邊費上不答戊寅詔髙班梁敦特降一官勒歸班敦嘗管勾潁川郡王北宅月當得俸一萬五千而敦告上不盡其數僥求差使故有是責其入內內侍省指揮更不施行故入內副都知趙世長係隨龍特與恩澤五資辛已詔太史局言六月朔日有食之天著厥異朕甚懼焉其日可罷視事仍令有司具素膳公卿等更宜勉思所戒以輔不逮仍差翰林學士承㫖蔡京祭告太社日未出百司守職其合行事太常寺疾速施行先是樞密院奏事上諭曽布以太史言日食欲避殿布曰近例正陽月乃避上曰天變所當警懼布曰若出自聖意欲祇畏天戒亦不必故事也上恱退而語三省而三省實不聞之章惇曰須正陽月乃避莫不須如此布顧黃履曰聖意如此寅畏天變雖過不妨履亦然之既而詔書出莫不稱誦而惇意終不恱然亦莫敢不即時頒行也瀘南緣邊安撫司言蕃官播州夷界都巡檢楊光榮乞獻納播州疆土凖朝㫖南平軍不得擅便招誘光榮叔姪獻納地土若逐人因事出官即婉順和解仍從長處置尋下南平軍施行經今二年不見二酋出官又報文廣身死其弟文翰與光榮不相和解文廣是光榮何親當明著之舊本如此必有脫字光榮勢微弱欲倚漢界為茍安之計所以南平軍誘令獻納疆土本軍不候朝廷指揮便行接納雖已敦遣光榮等歸本族萬一為文翰攻侵無所借助或却慿付羅氏鬼主窺圖文翰深恐夷界别致生事其楊光榮已令權播州都巡檢掩其過惡但言不切鈐束部族致害文廣特與放罪正行補授所有文翰遭罹變故雖然難以盡行承襲亦乞特與殿直並充巡檢今來楊光震元係播州夷界都巡檢光榮係同巡檢光震被害後本司前官已令光榮權都巡檢難以却行貶損况文翰合承襲亦難處光榮之下所以據逐酋元管村族著望乞以播州東南地分作兩面並權充都巡檢其楊光榮楊文翰仍望以巡檢祭酒名目降告施行夷界巡檢自從宣命指揮從之仍各與帶銀青光祿大夫檢校國子祭酒兼監察御史武騎尉是月章惇欲禁河北鹽語同列曰今論者以為祖宗有詔㫖不可禁要之皆吾民何獨河北為不可禁乎曽布曰相傳太宗時河北人詣行在泣訴乞免禁鹽太宗許之遂於稅額中增鹽錢其後仁宗時有議欲禁鹽者三司使張方平以太宗時語白仁宗仁宗矍然為降手詔云朕不忍令河朔之人斗食貴鹽議遂格至今刻石在北京惇曰此只是文彥博刻石何故獨不忍河北人食貴鹽今太學諸生豈可云只照管某齊舉人此非通論許將徐曰北京石刻見在乃夏竦所刻也布曰冲元嘗守北都固當知之衆遂默然曽布日録右辛已今附月末監察御史權殿中侍御史蔡蹈言臣伏覩近降􅎁㫖施行宣德郎竇訥奏乞河北路官賣鹽者臣竊以河北諸州鹽法自五代以及本朝嘗禁𣙜矣不旋踵仍舊通行熙寧中先帝嘗問王安石曰著作佐郎張端言𣙜河北鹽事如何安石對恐亦可為但未詳見本末爾先帝曰理財節用自足致富如此等事雖不為可也先帝隆眷安石言聽計從而於此獨斷以不疑非灼見利害不至於是其後雖有計議之臣請稍更法隨即寢罷由此觀之河北鹽法若官可自賣何俟今日然則先帝之深思長慮至仁廣惠固可見矣伏願陛下留神省覽推原先帝聖語所謂如此等事雖不為可也其意安在臣伏覩元降朝㫖令本路提刑提舉轉運安撫司同共相度今來止有都轉運司保明深恐衆議必有未協况民情乎欲望聖慈速賜睿㫖且令河北鹽法依舊施行庶不生事一方安堵天下幸甚鹽禁後何如當考
