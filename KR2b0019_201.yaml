body:
  text: 續資治通鑑長編巻一百九十七宋李燾撰仁宗嘉祐七年秋七月壬子詔秋季有事于眀堂羣臣毋請加尊號太常禮院言皇祐叅用南郊百神之位不應祀法宜如隋唐舊制設昊天上帝五方位以真宗配而五方帝五官神從祀餘皆罷又前一日親饗太廟當時嘗停孟冬之薦考詳典禮宗廟時祭未有因嚴配而輟者今眀堂去孟冬為日尚逺請復薦廟前者祖宗並侑今用典禮獨配前者地祗神州並饗今以配天而亦罷是皆禮中之大者也開元開寳之禮五帝無親獻儀舊禮先詣昊天奠獻五帝並行分獻以侍臣奠幣皇帝再拜次詣真宗神座於禮為允詔恭依而五方帝亦行親獻甲寅廣西轉運使度支員外郎李師中轉運判官都官員外郎劉牧各罰銅二十斤先是嶺南多曠土茅菅茂盛蓄藏瘴毒師中募民墾田縣置籍期永無税以種及三十頃為田正免科役於是地稍開闢瘴毒減息而師中與牧坐擅除税不以聞故蒙罰交趾每因瘴毒甚時必聲言入冦師中先得其情既而攝帥事邕州果遣軍校乘驛言交趾将入冦師中不省但詰其擅乗驛之罪而已甲子右司諫知䖍州趙抃為禮部員外郎兼侍御史知雜事丁卯右衞大将軍岳州團練使宗實辭泰州防禦使知宗正寺不許是月右正言王陶上疏曰自至和中聖躬不豫之後天下之人顒顒惴惴無所寄命日望上穹眷命降生聖嗣内承九廟祀享之重外安四海億兆之心天貺莫期未如民志朝廷百執事州郡之吏下至韋布草莱之士抗疏交章引古今陳災異請擇宗室親賢早建儲嗣危言切語感動人聴者以百數夫為是議者豈皆懐不忠孝為姦利託附之人㦲盖𤼵於至誠為宗廟社稷無窮大計他日四海生靈死亡之命豫求安全深思逺慮而言也陛下納諫從善博古通今治亂之要知聖人先天而不違後天而奉天時之道在乎順民欲而安衆心也去嵗親𤼵徳音稽唐故事擇宗子使知宗正寺上以先後天心導迎景貺而俟與子之祥次以尊崇宗廟欲重祭享而修主鬯之職下以順悦人情表白聖意而示强宗之勢中外聞之咸謂此舉設施安穏不驚人耳目而天下揺揺之心一旦而定他日聖嗣降育則稍遷其秩使還本邸進退之命無傷國體莫不稱慶陛下有堯之聖仁舜之大孝漢文之恭儉而睿謨英斷非近代中庸之主所可跂及厥後稍稍寖聞稽緩四方觀聽豈免憂疑或罪宗實以為自唐以来判宗正寺者皆用宗子求之典故乃一尋常差遣何必過為辭讓或者流言去事由宫中嬪御宦官姑息之言聖意因而微惑至婦人近幸不識國家大計茍務一時感悦陛下而不知反沮壊美政睽隔英斷為害甚大也風聞宗實自有此命以来夙夜恐懼閉門不敢見人昨自二月除服合半年有餘矣臣恐天下之人謂陛下始者順天心人欲而命之今者聴左右姑息之言而疑之不獨百世之後使人歎惜聖政始卒之不一亦恐自今逺近中外姦雄之人得以窺伺間隙矣自古天下禍亂之始未有不由繼嗣不立付属之心不豫定而遂至後世争奪危亡使天下赤子糜爛塗地而受弊者也况數嵗以来災異頻數不可勝紀今春徐陳許蔡迨京畿之民訛言相傳掘土而食近又龍鬬於南京之葛驛盛夏火王金當消伏太白芒角盛大陵犯熒惑又太白經天與嵗星晝見天地人事皆見變異其占為兵而為人心不安為甚可懼太史必有以其術為陛下言之者陛下於此時豈宜尚復優游遲疑聖斷不早恐懼修省急答天戒哉夫天下者聖祖神宗之天下傳至陛下使陛下永福生民措之安全之地陛下當思先帝付託之重使宗廟社稷生民有所依賴天下忠臣節士有所取正無令漢成帝獨有美名也前日未命宗實人人上言早建儲嗣今日乃無一人敢言者非今日之人不忠也盖前日未有主名泛為公言而陛下不疑也今日補一宗正官雖非繼嗣似有主名又陛下猶豫遲疑自冬徂秋十月矣中外之人無貴賤賢愚人人自顧私計懼陛下見疑獲罪不敢出一言但日聴朝廷所為以卜治亂而已臣職為諫官儻又不言則誰為陛下言者故臣區區憂國之心顛沛徬徨而不能自已也陶因請對言宫嬪宦官有以上惑聖聰而使宗實畏避不敢前上問陶欲别與一名目如何陶對曰此止是一差遣名目乞與執政大臣議之上曰當别與一名目於是韓琦等始有立為皇子之議八月乙亥朔内出眀堂樂章迎神送神曲𨽻于太常太常博士祕閣校理裴煜奏大祠與國忌同者自慶厯至嘉祐凡八祠有司皆援舊禮樂備而不作忌日必哀志有所至其不用樂宜也然樂所以降格神祗非以適一己之私也謹按開元中禮部建言忌日事廟應用樂裴寛立議廟尊忌卑則作樂廟卑忌尊則備而不奏中書令張説以寛議為是宗廟如此則天地日月社稷之祠用樂眀矣臣以為凡祠天地日月社稷與忌日同者伏請用樂其在廟則如寛之議所冀畧輕存重不失其稱下其章禮官議曰傳稱祭天以禋為歆神之始以血為陳饌之始祭地以埋為歆神之始以血為陳饌之始宗廟以灌為歆神之始以腥為陳饌之始然則天地宗廟皆以樂為致神之始故曰大祭有三始謂此也天地之間虛豁而不見其形者陽也鬼神居天地之間不可以人道接也聲属於陽故樂之音聲號召於天地之間庶㡬神眀聞之因而来格故祭必求諸陽商人之祭先奏樂以求神先求于陽也次灌地求神於隂逹于淵泉也周人尚臭四時之祭先灌地以求神先求諸隂也然則天神地祗人鬼之祀不可去樂眀矣今七廟連室難分廟忌之尊卑欲依唐舊制及國朝故事廟祭與忌同日並縣而不作其與别廟諸右忌同者作之若祠天地日月九宫太一及祀百神並請作樂社稷以下諸祠既卑於廟則樂可不作翰林學士王珪等以為社稷國之所尊其祠日若與别廟諸右忌同者伏請亦不去樂詔恭依丙子右衛大将軍岳州團練使宗實辭泰州防禦使知宗正寺許之初宗實屢乞繳還告勅上謂韓𤦺曰彼既如此盍姑已乎琦曰此事安可中輟願陛下賜以手札使知出自聖意必不敢辭比遣使召之稱疾不入𤦺與歐陽修等私議曰宗正之命既出外人皆知必為皇子矣不若遂正其名修曰知宗正寺告敕付門下得以不受今立為皇子止用一詔書事定矣遂入對乞聴宗實辭所除官上曰勿更為他名便可立為皇子眀堂前速與了當𤦺因請諭樞宻院及張昪至帝面諭之昪曰陛下不疑否帝曰朕欲民心先有所繫属但姓趙者斯可矣昪即再拜稱賀𤦺等乞帝書手札付外施行既退輔臣未分㕔中使已傳手札至中書丁丑𤦺召翰林學士王珪令草詔珪疑焉戊寅請對言此大事也後不可悔外議皆云執政大臣强陛下為此若不出自陛下則禍亂之萌未可知上指心曰此決自朕懐非由大臣之言也不如此衆心不安卿何疑焉乃再拜殿上曰陛下能獨斷為宗廟社稷計此天下之福也退而草詔以進巳卯詔曰人道親親王者之所先務也盖二帝之隆治由兹出朕甚慕之右衛大将軍岳州團練使宗實皇兄濮安懿王之子猶朕之子也少鞠于宫中而聰知仁賢見于夙成日者選于宗子近籍命以治宗正之事使者數至其第廼崇執謙退久不受命朕默嘉焉朕䝉先帝遺徳奉承聖業罔敢失墜夫立愛之道自親者始固可以厚天下之風而上以嚴宗廟也其以為皇子辛已上悉召宗室入宫諭以立皇子之意壬午按壬午原本誤作壬子今参核前後干支改正詔入内侍省皇城司即内香藥庫之西偏營建皇子位癸未賜皇子名曙初中書擇日旁十字上㸃最下一字用之詔太子太保致仕龎籍陪祀眀堂籍辭不至邈川首領嘉勒斯賚既老國事皆委其子董戬知秦州張方平嘗誘董戬入貢許奏為防禦使董戬尋遣使入貢知雜御史吴中復劾奏方平擅以官爵許董戩唘其貪心方平議遂不行先是契丹以女妻董戬與之共圖夏國夏主諒祚與戰屢為所敗及是諒祚舉兵擊董戬屯於古渭州其熟户酋長皆懼以為諒祚且来併呑諸族亟請方平求救方平懼飾樓櫓為守城之備盡籍諸縣馬悉發下畨兵皇祐末古渭州熟户反増秦州戎兵甚多事平文彦博悉分屯永興涇原環慶三路期有警則召之以省芻糧謂之下番兵方平既𤼵畨兵闗西震聳仍驛奏乞發京畿禁軍十指揮赴本路樞宻使張昪言於上曰臣昔在秦州邊人言敵欲入冦者甚衆後皆無事實今事未可知而𤼵京畿兵以赴之驚動逺近非計也請少湏之上從之數日方平復奏諒祚已引兵西去擊董戬矣諒祚尋復為董戬所敗築堡於古渭州之側而還諫官司馬光因劾奏方平怯懦輕舉請加竄謫宰相曽公亮獨右方平曰兵不出塞何名為輕舉且冦所以不入者以有備故也有備而賊不至顧以輕舉罪之邊臣自是不敢為先事之備矣光奏三上甲申徙知秦州張方平知應天府太常禮院言奉詔詳定同判太常寺吕公著状每嵗孟享太廟七室並用羊二豕一而奉慈一廟亦如之酌之豐殺未適其宜本院伏詳天神至尊無物可稱其徳故祭用犢以貴誠宗廟社稷則用太牢以别天神之祭也楚觀射父曰天子舉以太牢祀以㑹鄭康成曰㑹太牢也周禮祫祭每各一牛漢舊儀大祭祀祫每牢中分之左辨上帝爼右辨上后爼餘肉委積於前數千斤周漢宗廟牲牢之富從可知矣請如公著議凡因郊祀親享太廟舊用犢四羊四豕四今請用犢一羊七豕七孟享臘享舊用羊二豕二今請用羊七豕七禘祫攝事舊用羊四豕四今請用羊七豕七皇后廟孟享臘享舊用羊一豕一今請用羊四豕四詔恭依乙酉詔太常寺登歌用柷敔先是翰林學士王珪言古之作樂以五聲播於八音調和諧合與治道通先王用於天地宗廟社稷事于山川鬼神使鳥獸咸若况於人乎然而樂雖盛而音虧未知所以為樂也今郊廟升歌之樂有金石絲竹匏土革而無木音夫所謂柷敔孔安國以戛擊是柷敔之用既云下而擊皷知鳴球與柷敔之在堂故傳曰堂上堂下各有柷敔也今陛下躬祀眀堂宜詔有司考樂之失而合八音之和於是下禮官議而増置之辛卯司封郎中李受為皇子位伴讀改宗正寺伴讀王獵為皇子位説書受江南人也大宗正司言皇子累奏辭所除恩命是日還其奏壬辰詔權以皇城司𪠘宇為皇子位仍命入内髙班王中慶梁徳政𤼵車乘津置行李入内上既下己卯詔書皇子猶堅卧稱疾不入司馬光王陶等言凡人於絲毫之利至相争奪今皇子辭不貲之富已三百餘日不受命其賢於人逺矣有識聞之足以知陛下之聖能為天下得人然臣聞父詔無諾君命詔不俟駕而行使者受命不受辭皇子不當辭遜使者不當徒反凡詔皇子内臣皆乞責降且以臣子大義責皇子宜必入上與輔臣謀之韓𤦺曰今既為陛下子何所間哉願令本宫族属敦勸及選親信内人就諭㫖彼必不敢違丁酉賜皇子襲衣金帶銀絹各一千詔登州防禦使同判大宗正事從古沂州防禦使虢國公宗諤敦勸皇子仍與潤王宫大将軍以上同入内皇子若稱疾即乘肩輿己亥從古等言皇子猶固稱疾是夕使者往返數四留禁門至四皷皇子終不至乃詔改擇異日庚子以立皇子告天地宗廟及諸陵辛丑皇子以肩輿入内先是宗諤責皇子曰汝為人臣子豈得堅拒君父之命而終不受耶我非不能與衆人執汝强置汝於肩輿恐使汝遂失臣子之義䧟于惡名爾皇子初讓宗正與記室周孟陽謀之所上表皆孟陽之筆也每一表餉孟陽十金孟陽辭皇子曰此不足為謝俟得請於朝方當厚賞爾凡十八表孟陽獲千餘緡及立為皇子猶固稱疾孟陽入見于卧内曰主上察知太尉之賢参以天人之助乃發徳音太尉獨稱疾堅卧其義安在皇子曰非敢徼福以避禍也孟陽曰太尉事兩宫以父母中外所聞主上為萬世計而立為子矣今固辭不拜假如得請歸藩遂得燕安無患乎皇子撫榻而起曰吾慮不及此遂與宗諤等同入内良賤不滿三十口行李蕭然無異寒士有書數厨而已中外聞之相賀中外相賀此據歐陽修私記及范祖禹帝學甲辰皇子見上于清居殿自是日再朝于内東門或入侍禁中九月乙巳朔以皇子為齊州防禦使進封鉅鹿郡公丁未以貴人董氏為充媛己酉朝饗景靈宫庚戍饗太廟辛亥大饗眀堂大赦文武升朝官父母妻並與官封轉朝官在今年冬至已前者父母亦特推恩臣僚合該奏薦赦後奏至舊例即不行自今特展限一月天下係帳有留寺觀未有名額者特賜名額其在四京管内雖不係帳而舍屋及一百間以上亦特賜名額諫官司馬光言竊以釋老之教無益治世而聚匿遊惰耗蠧良民此眀識所共知不待臣之言也是以國家眀著法令有創造寺觀百間以上者聴人陳告科違制之罪仍即時毁徹盖以流俗戅愚崇尚釋老積弊已深不可猝除故為之禁限不使繁滋而已今若有公違法令擅造寺觀及百間以上則其罪巳大幸遇赦恩免其罪犯可矣其棟宇瓦木猶當毁撤沒入縣官今既不毁又眀待恩命賜之寵名是勸之也臣聞為人上者洗濯其心一以待民是以令行禁止而莫敢不從今立法以禁之於前而發赦以勸之於後則凡國家之令将使民何信而從乎臣恐自今以往姦猾之人将不顧法令依憑釋老之教以欺誘愚民聚斂其財以廣營寺觀務及百間以湏後赦冀幸今日之恩不可復禁矣方今元元貧困衣食不贍仁君在上豈可復唱釋老之教以害其財用乎事若微而患深令有近而害逺此之謂也伏望陛下追改前命應天下寺觀院舍不係帳者不以屋舍多少並依前後勅條處分其昨来赦文内四京寺觀院舍雖不係帳亦賜名額一節乞更不施行庶使號令為民所信而遊惰不能為姦也初帝享眀堂方宿齋而充媛董氏疾革使白皇后曰妾不幸即死願勿亟聞以慁上精意后泫然從之壬子帝臨奠悽惻追贈婉儀癸丑加贈淑妃特遷其父右侍禁安為内殿崇班官其弟姪四人葬奉先資福院後諫官司馬光言伏見充媛董氏薨追贈婉儀又贈淑妃陛下親為之輟朝掛服羣臣進名奉慰又命有司為之定諡及行䇿禮於葬日仍給鹵簿外庭之議皆以為董氏名秩本微病亟之日方拜充媛今送終之禮太為崇重臣按古者婦人無諡近世惟皇后有諡及有近加䇿命者妃嬪以下未之有也鹵簿本以賞軍功未嘗施于婦人惟唐平陽公主有舉兵佐髙祖定天下之功方給皷吹後至中宗時韋后建議妃主葬日皆給皷吹非眀王之令典不足法也臣愚念陛下恭儉寡欲近嵗以来後宫之寵妃絶無太盛過分著聞于外者此四方之人所咨嗟頌詠歸仰聖徳也不意今兹以既沒之董氏而有司謟曲妄崇虛飾以隳紊制度凟慢名器使天下之人疑陛下隆於女寵甚非所以益聖徳也况禮既崇則凡事所湏用度益廣今眀堂大禮新畢帑藏空虛賦歛日滋元元愁困誠不宜更崇大後宫之䘮以横増煩費夫亡者雖加之虛名盛飾豈能復知而適足以仰累聖徳臣切惜之伏望陛下特詔有司悉罷議諡及䇿禮事其葬日更不給鹵簿凡䘮事所湏悉從減損不必盡一品之禮以眀陛下薄于女寵而厚于元元也上嘉納之己未内外言並以眀堂赦書加恩宰相韓琦封儀國公戊辰改壽星觀為崇先觀仍給永崇殿店宅務日錢二千諫官司馬光等言前者伏覩陛下幸夀星觀奉安真宗御容當是時臣等不知事之本末不敢進言自後方知本觀舊日先帝時畫夀星近因本觀管勾内臣吴知章妄有奏陳稱是先帝御容意欲張大事體廣有興修自為勞效别圖恩賞陛下天性仁孝以為崇奉祖宗不欲重違其請遂更畫先帝御容以易夀星之像改為崇先觀知章既得御容倚以為名姦詐之心不知紀極乃更求開展觀地别建更衣殿及諸屋宇将近百間制度宏侈計其所費踰數千萬向去増益未有窮期臣等切以祖宗神靈之所依在於太廟木主而已自古帝王之孝者莫若虞舜商之髙祖周之文武未聞宗廟之外更廣為象設然後得盡至誠也惟高宗祭祀親廟微為豐數故傅説曰黷于祭祀時惟弗欽禮煩則亂事神則難祖巳曰無豐於暱盖規之也後至漢氏始為原廟當時醇儒逹禮者靡不議之况畫御容于道宫佛寺而又為夀星之服其為黷也甚矣且又太祖太宗御容在京師者止于興國寺唘聖院而已真宗御容已有數處今又益以崇先觀是亦豐于暱也無乃失尊尊之義乎原其所来止因知章妄希恩澤乃敢恣為誣罔興造事端致䧟朝廷於非禮今既奉安御容難以變更若只就本觀舊来已修屋宇固足崇奉所有創添伏乞一切停寢并劾知章誣罔之罪眀正典刑冬十月乙亥皇子上表辭所除官賜詔不允丙子左屯衛大将軍登州防禦使邢國公世永為隴州防禦使初世永自陳太宗與秦王之後官正任者十餘人臣太祖之嫡孫又本宫為最長而遥領使名嵗久故特遷之世永守節長子嫡長元孫壬午封贈媫妤周氏三代初知制誥張瓌言中書送下封媫妤三代詞頭然媫妤位正二品其封贈未應法請下有司檢詳典故中書引用崇國夫人許氏美人張氏例知制誥祖無擇又言許美人張美人出一時之恩未為得禮於是更下學士院詳定而止及二代焉時學士院新定後宫封贈父祖制度皇后與妃皆及三代諫官司馬光等上言大禮之所謹在于尊卑之分别嫌眀微故國君沐粱大夫沐稷士沐粱盖以大夫貴近於君故推而逺之以防僣偪之端士賤于君雖與之同物無所嫌也况后妃之際實治亂之本聖人于此尤兢兢焉皇后敵體至尊母儀四海六宫之内無與等夷妃品秩雖貴而皇后猶為女君今封贈之典混而為一臣實懼焉雖陛下聖眀宫壼之政貴賤有倫必無僣偪之憂然非所以别嫌疑防萌兆垂法度示子孫也昔漢文帝幸郎署慎夫人與皇后同坐中郎将袁盎引却慎夫人席曰陛下既以立后慎夫人乃妾妾主豈可同坐哉文帝善其言彼少頃同席盎猶以為不可而犯顔力爭况著之典䇿以為百世之法乎臣謹按天聖中遇南郊大禮皇太后追贈三代太妃止贈二代然則妃贈三代乃近嵗之失不可以不正議者或謂外廷之臣凡入兩府者皆贈三代妃正一品禮不可後之臣竊以為不然聖主制禮内外異宜不可均一自宰相樞宻副使名秩雖殊而比肩為臣共同職業俱贈三代不足為嫌皇后與妃位次相亞而有妾主之分以此尤宜分别名器使之著眀以防後世之有僣差不可鹵莽滅裂茍然而已也臣愚欲望陛下特降聖㫖改定新制自今後惟皇后得贈三代自妃以下皆不過二代若以外廷之臣封贈太優則乞自今後惟宰相樞宻使得贈三代自𠫭知政事以下止於二代庶㡬得禮之宜不報己丑禁天下衣墨紫初皇親與内臣所衣紫皆再入為黝色後士庶寖相傚而言者以為竒衺之服故禁之甲午知制誥王安石同勾當三班院先是安石糾察在京刑獄有少年得鬬鶉其同儕借觀之因就乞之鶉主不許借者恃與之狎䁥遂携去鶉主追及之踢其脅下立死開封府按其人罪當償死安石駮之曰按律公取竊取皆為盜此不與而彼乃强携以去乃盜也此追而毆之乃捕盜也雖死當勿論府司失入平人為死罪府官不伏事下審刑大理詳定以府斷為是有詔安石放罪舊制放罪者皆詣殿門謝安石自言我無罪不謝御史臺及閤門累移牒趣之終不肯謝臺司因劾奏之執政以其名重釋不問但徙安石他官度支員外郎秘閣校理蔡抗為廣東轉運使先是岑水銅冶大發官市諸民止給空文積逋鉅萬姦民無所取資羣聚私鑄與江西鹽盗合郡縣患之督捕甚嚴抗曰採銅皆惰游之民銅悉入官而不畀其直非私鑄衣食安所給又從而誅之是豈但民犯法也因命銅入即償直民盡樂輸私鑄遂絶畨禺嵗運鹽給英韶二州道囘逺多侵竊雜惡抗命十舟為一運擇攝官主之嵗終㑹其課以為殿最是嵗鹽課増十五萬緡乙未詔天下常平倉多所移用而不足以支凶年其令内藏庫與三司共支緡錢一百萬下諸路助糴之從右正言判司農寺王陶所請也十一月己巳進封沂國公主為岐國公主建州觀察使知衞州李瑋改安州觀察使復為駙馬都尉戊子皇子徙入位辛未徙利州路轉運判官司封員外郎王靖提㸃陜西路刑獄鄉户之役于州縣者優則久留勞則欲速去賂吏輙不以時代靖令籍所役嵗月先期除代毋湏申訴後遂為令十二月皇城司邏卒吴清等宻奏富人張文政嘗殺人有司鞫問無状願得清詰所從而主者不遣御史傅堯俞言陛下不必惜此數人意恐沮塞則自是不復聞外事不若付之有司辨其是非而賞罰之則其事上聞者皆實乃所以廣視聴也諫官司馬光等言祖宗開基之始人心未安恐有大姦隂謀無状所以躬自選擇左右親信之人使之周流民間宻行伺察當是之時萬一有挾私誣枉者則斧鉞随之是以此属皆知畏懼莫敢為非今海内承平巳踰百年上下安固人無異望世變風移宜有釐革而因循舊貫更成大弊乃至帝室姻親諸司倉庫悉被此属㢘其過失廣作威福私受貨賂所愛則雖有大惡掩而不問所憎則舉動言語皆見掎摭臣等嘗病國家擇天下英才以為公卿大夫而猶不可信顧任此厮役小人以為耳目豈足恃㦲今乃妄執平民加之死罪使之幽縶囹圄横罹楚毒幸而不自誣服僅能辨眀若更不聴有司詰問元初廵察之人少加懲戒臣恐此属無復畏懼愈加横恣使京師吏民無所措其手足豈合祖宗之意哉詔清等决杖配下軍按光集以十二月九日上劄子當附見辛巳丙申幸龍圖天章閣召輔臣近侍三司副使臺諫官皇子宗室駙馬都尉主兵官觀祖宗御書又幸寳文閣為飛白書分賜從臣下逮館閣作觀書詩韓琦等属和遂宴羣玉殿傳詔學士王珪撰詩序刋名于閣庚子再㑹于天章閣觀瑞物復宴羣玉殿帝曰天下久無事今日之樂與卿等共之宜盡醉勿辭賜禁中花金盤香藥又召韓𤦺至御榻前别賜酒一巵從臣霑醉至莫而罷吕氏家塾記云皇子坐在舍人待制之後是嵗冬無氷天下斷大辟一千六百八十三人
