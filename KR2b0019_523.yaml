body:
  text: 續資治通鑑長編卷五百十九宋李燾撰哲宗元符二年十二月戊戌朔玠還至星章峽叛羌邀之玠戰沒初羌人中叛諸城被圍既而師出圍解咸即歸順獨納木宗堡遂北附夏戎夏戎亦不敢有之諭羌人自為守假兵數百戍之而已髙永年謂納木宗北控夏戎南接星章峽西連總噶爾形勢天險得之則足以為吾捍蔽而星章峽道路無阻然主者略不加意苖履等領大軍經其地亦不能取納木宗叛羌因結連鼎凌宗羌間遣人伏星章峽隘險中肆行剽劫朝廷竟以道路梗塞遂棄青唐然不知失䇿在不取納木宗堡耳鄜州觀察使仲當卒贈開府儀同三司追封順國公諡惠穆己亥知祁州馬仲良追兩官免勒停仍不用敘法以不詳悉根磨進築平夏平靈役兵死亡人數故也布録云仲良以平夏不以時遣役兵為西人所殺虜者甚衆特降兩官樞密院奏擬石徹等九人差遣徹擬京城東面巡檢御批不差餘依奏曾布因謝上以失於奏稟極皇恐上曰小事但徹不可作巡檢耳布曰徹於法當再任騏驥院并乞巡檢臣以騏驥院差遣髙故且與巡檢上曰再任却不妨巡檢須擇才武者徹乃徐王壻也布録己亥庚子夏國差使副哩寧威明濟賽等詣闕進上誓表謝恩及進奉御馬詔依例回賜銀器衣著各五百匹兩十月八日丙午吕惠卿云云可考辛丑遼國遣使臨海軍節度使耶律應副使中大夫守祕書少監充乾文閣待制王衡來賀興龍節壬寅夏國主上表言竊念臣國久不幸時多遇凶兩經母黨之擅權纍為姦臣之竊命頻生邊患頗虧事大之儀增怒上心恭行弔民之伐因削世封之故地又罷嵗頒之舊規釁隙既深理訴難逹昨幸蒙上天之祐假聖朝之威致凶黨之伏誅獲稚躬之反正故得遐馳懇奏陳前咎之所歸乞紹先盟果淵衷之俯納故頒詔而申諭俾貢誓以輸誠備冒恩隆實增慶躍臣仰符聖諭直陳誓言願傾一心修臣職以無怠庶斯百世述貢儀而益虔飭疆吏而永絶爭端誡國人而恆遵聖化若違茲約則咎凶再降儻背此盟則基緒非延所有諸路係漢緣邊界至已恭依詔旨施行本國亦於漢為界處已外側近各令安立卓望并寨子去處更其餘舊行條例并約束事節一依慶歷五年正月二十二日誓詔施行詔答曰爾以凶黨造謀數干邊吏而能悔過請命祈紹先盟爾之種人亦吾赤子措之安靜乃副朕心嘉爾自新俯從厥志爾無爽約朕不食言所宜顯諭國人永遵信誓除疆界並依已降詔旨以諸路人馬巡綽所至立界堠之處為界兼邈川青唐已係納土歸順各有舊來界至今來並係漢界及本處部族有逃叛入貢夏國者即係漢人并其餘應約束事件一依慶歷五年正月二十二日誓詔施行自今以後恩禮嵗賜並如舊例答詔兩府共定非學士院所草也又詔夏國主誓表內誡國人而字下一字犯真宗皇帝廟諱令保安軍移牒宥州聞知本國應失點檢經歷干係人並重行誡斷十月十八日丙午布録云云當考或移入此龍圖閣直學士朝奉大夫環慶路經略安撫使兼馬步軍都總管知慶州髙遵惠卒先是上諭曾布曰髙遵惠再檢見元祐中有章疏論罷吏祿以為先帝法度不問是非一切欲改此大臣有私意於其間不可不察又規切太母云不可斂怨天下此極不可得布曰當時敢出此語誠衆人所難陛下纍欲召遵惠還若爾尤不可不召臣當與三省更議可代之者上曰甚好又曰賈種民亦有章云盡罷苛法之語莫不可布曰此正與王存言橫斂一般亦可謂詆斥也上曰遵惠論種民事莫是否布曰寺監無不由六曹直逹都省者遵惠為侍郎職所當議上又曰遵惠言紊亂官制布曰如此誠紊亂官制上又曰種民言罷苛法者是上書書中云更有一册文字言十餘事尚檢未見又曰章惇終不喜遵惠布曰人言其以遵惠擊種民故惡之上曰遵惠歸作尚書侍郎皆可布曰龍圖閣直學士恐難作侍郎權尚書可也布退語三省但以上云遵惠又有章疏欲召還莫可别議慶帥否蔣之竒是太中大夫自可帥衆曰未敢議除之竒布曰上不以為不可惇曰慶不須兩制一直閣可矣布曰直閣固可帥但未知誰可為直閣許將蔡卞皆曰未見其人既而又欲以孫覽帥慶布曰范鏜可否衆默然布曰以鏜易覽如何卞曰如此即不妨又語及吕仲甫卞曰曉事却不敢為非亦恐未可也布録此假在十一月十七日乙酉其後上纍諭布欲召還遵惠而惇終未決布因言陛下纍欲召遵惠還朝亦曾與三省議但以難其代者惇謂不必兩制直閣皆可往衆皆曰未見有可除直閣者臣意謂蔣之竒是太中大夫似可除慶帥兼未須除職上曰之竒亦無事除職亦不妨布曰聖意如此中外所不知只如前日面諭韓忠彥豈衆論所敢及然尚書而下從官太闕少若非斷自聖意恐議論必難合前日聖諭欲以遵惠權吏部尚書臣以為太重刑部久不得人以遵惠為刑部必稱職忠彥為吏部甚允况韓琦定策立英廟此功不可忘陛下留意忠彥如此臣退而鼓舞稱誦此豈今日大臣所能啓發聖慮然忠彥遵惠召還皆出聖斷又之竒亦未當除帥若出自中批使人知出聖意不須政府進擬也上欣然曰待批出既而寂然疑有間言之入者已而遵惠卒後數日遂除之竒為代此假在十一月二十八日丙申十四日辛亥新知汝州蔣之竒知慶州舊録云遵惠素自檢慎無子弟過方宣仁垂簾初姦臣迷國繩檢族人一以法度不生異意特付遵惠以家事躬自表率人無間言族人稱之新録辨曰遵惠於髙氏屬尊而賢宣仁付以家事使繩檢族人史臣輒增姦臣迷國不生異意八字不唯意涉誣謗兼亦文意全不明白合刪去八字舊本又云然能逺嫌不為茍合以希進用引義抗章論述先烈士人多之髙遵惠傳云遵惠卒贈樞密直學士賜白金五百兩邸報亦有此事三省密院同奉聖旨髙遵惠在元祐中言事切直特贈樞密直學士賜銀五百兩敕神宗厭代異志専朝汲引怨望失職之人謗訕美善可久之法趨時射利鮮不雷同送往事居孰能特立追褒往善用激澆風爾趨操清修才力明敏蒙休后族席慶勳門方元祐之紛更獨抗章而論列出於忠憤發自誠心謂官制職緡之優何倉法吏祿之重非三司之經費皆諸色之蠲除𣙜貨元條并市易而俱廢執政親屬緣回避而更升言路快意而専務攻排人情希旨而漸成貪恣先帝披觀奏牘擢二地卿會帥閫之需才冠河圖而進職方資逺畫坐鎮西陲云何不臧遭此奄逝凶訃來上怛傷久之特躋宥密之華昭示哀榮之典尚其不昧知此褒嘉據告詞稱先帝即不在哲宗時也當考年月遵惠傳云為左右司員外郎上疏論法度更張事有當否如先帝所施設未可輕論此事已附元祐元年四月八日遵惠贈密直學士在元符三年二月丙寅陜西轉運判官秦希甫奏王贍王厚盜取邈川青唐府庫中金珠等物因此致變及殺森摩乾展等以滅口及分遺走馬將士等走馬後至所得亦不資詔令希甫及胡宗回李譓體量訪實聞奏布録壬寅癸卯王贍令將官李忠郭勝統騎兵討擊本敦谷叛羌不利乙巳忠勝還鄯州賊勢益張辛亥尚書左丞蔡卞乞罷政遣內侍封還所上章押赴都堂卞再上章再封還仍令諸處勿受卞章卞尋視事如故壬子以通判熙州軍州事孫適提舉熙河蘭會路新舊弓箭手罷李夷行夷行以書言邊事多失實也夷行言邊事十一月十三日可考秦希甫奏曾紘等言王贍王厚盜取邈川青唐府庫已差紘一就往河州體究曾布白上紘乃臣之姪運司自不當差權勾當公事所言如此而希甫便委之體量尤不當恐須放罪改正上曰須罰金遂罰希甫二十斤轉運司十斤紘遣回本任布録壬子紘本任何處當考廣西轉運副使張景溫言桂州修仁縣管下村洞崖茶萬斤乞復行𣙜法從之詔雄滄霸州自今遇有邊防急切事合用將兵申稟帥臣不及許知州徑牒本州駐劄將副差撥人馬應副癸丑樞密院言西蕃自嘉勒斯賚以來向化效順世受朝廷封爵因董戩無後鄂特凌古父子相繼篡奪今部族逼逐轄正出漢雖已立隆贊尋亦歸降緣溪巴烏隆贊並係嘉勒斯賚房族非本族子孫按右騏驥使趙懷義在河州乃嘉勒斯賚之嫡長曾孫於董戩最是親的子姓今青唐已降敕命建作鄯州合如何措置詔隆贊候到闕朝見訖已降朝旨除河西節度使差知鄯州軍州事充西蕃都護仍自今依府州折氏例世世承襲知鄯州管下部族並令仍舊文法管勾其趙懷義除郭州團練使同知湟州軍州事兼本州管下部族同都巡檢使其逐州城寨除通接鄯湟州道路處令熙河蘭會路經略司次第精加修葺差使臣兵馬戍守其餘並令王贍隆贊王厚趙懷義同相度分布與近上忠白首領管勾內青圭倫正結嘉沁扎實之類向漢有功之人速具其力量功狀等第以聞當議依格優與官賞兼差逐處本地分部族都同巡檢其王贍依舊熙河蘭會路鈐轄兼隴右沿邊安撫都巡檢使充鄯湟等州都護仍與隆贊同管勾隴右軍馬司公事其合留守戍兵馬及應干合措置事件並令經略司詳細相度條具奏聼朝旨仍令王贍王厚以詔旨明諭鄯湟二州管下大小首領及部族其溪巴烏并碩隴贊如能歸順亦合優與官爵內溪巴烏如願歸鄯州與隆贊同處或願同碩隴贊在錫勒噶爾城住坐並聽從便令經略司依此傳送恩信分明曉諭早令出漢仍詳具逐節已施行次第以聞青唐録以此指揮乃十一月誤也實在十二月十六日明年二月四日正隆贊位轄正上三月十七日乃除官四月六日改姓名趙懷德詔陜西河東經略司夏國已進誓表及降誓詔令不得侵犯及收接投來人口布録乙丑甲寅詔遼國賀興龍節人使於相國寺集禧觀拈香不依舊例重行立其館伴使副安惇向宗良不合依隨各特罰金三十斤潤州觀察使仲佺卒本傳不載贈官刑部郎中邵材管勾玉局觀乙卯工部員外郎曾孝廣言請自今河掃嵗調春夫並依舊條差撥正夫赴役從之新權工部侍郎杜常權户部侍郎是日三省密院同呈李彀奏青唐利害乞立溪巴烏且言王贍一罪魁不足惜一行將佐何辜乞早令還湟州等事上猶疑令溪巴烏從便回鄯州蔡卞遂和之曾布曰向者陛下嘗云王贍朝出青唐則溪巴烏暮入此無疑矣今縱不聽其從便能令溪巴烏不入乎與其令彼擅入不若聼其從便也今日青唐之變擾攘未定排難解紛固合如此若更守株致贍等陷沒或更有不測之變則朝廷更難處置若朝廷必欲有鄯州則西有湟東有洮鄯州亦難立矣隆贊其能國乎異日以漸消磨亦必為朝廷有不患不如府州折氏也若不如此措置儻有人能保王贍不陷沒河南北别不生變則昨日指揮尚可追改也卞默然不敢措一言上遂悟布因言青唐之事從初便合如此處置國人本以不平轄正父子篡奪故欲逐之而立董戩之後朝廷當助順為之建立君長乃仁義之舉反欲因其擾攘而奪其地此人情所以不服臣自七八月間纍與章惇爭論以為理當如此適會惇卞二人議論叶同已而轄正隆贊出降臣無以啓口今日變故如此已是誤朝廷舉措若更遂非固執萬一更有不測之變何以處之上曰已降指揮如此施行矣布曰臣固不合喋喋然昨進擬隆贊指揮卞猶以為未須急兼恐更生異議望陛下聖斷力賜主張自紹聖以來經營邊事所向無不如意不幸於此生事狼狽如此今但且於已然中多方醫治庶稍弭邊患兼不失鄯州之名亦足以掩覆四方觀聽昔人以火喻國事云曲突徙薪無恩澤焦頭爛額為上客臣從初爭論正曲突徙薪之比也今已焦頭爛額而論者未免猶惑願聖意深察安危之幾知言者必不輕信爾上曰甚善戊午樞密院言吕惠卿奏本路沿邊漢蕃弓箭手蕃捉生自來每遇事宜作一畨差在沿邊巡防把截及將下凖備使喚每無事日分作兩畨今西賊進上誓表已裁減東兵外尋令逐將據分定巡防把截等合用數作三畨或四畨令一畨在邊防守餘令下畨更不支口食草料仍諸路並合依此裁減上畨人數庶漢蕃軍兵稍得休息及時耕種安業并不至坐糜糧食從之權陜西路轉運副使王博聞徙京西路知陜州馬誠權陜西路轉運副使元符三年十月十七日可考是日曾布再對上曰張商英稱鄒浩布曰不知何人有言上曰為曾孝廣言刑房有文字鄒浩做却似此大名節豈肯要人物上又曰是甚大名節布曰商英素不謹言語上曰此人終不可在朝廷與一待制令作郡不妨布唯唯退同三省取問兩人者商英四月入為工侍二人不知竟如何供答當考己未著作佐郎充國史編修官吳伯舉為起居郎校書郎充國史編修官鄧洵武為起居舍人十一月辛未布言可考伯舉佐著在閏九月十三日三省言陜西錢輕物重遂降旨不許行使銅錢其後陸師閔奏請公私買賣並依鈔面以平其價訪聞陜西舊來蓄鈔豪户等多扇搖欲要仍舊詔見行錢法等務要均平經久可行無致虧損官私如有合隨宜處置事件令陸師閔詳具利害急遞以聞仍令馬誠協力管勾若轉運司為減鈔價其年額鈔錢比舊虧少即具合添數目以聞當議相度給降閏九月五日王厚言星章峽叛羌其勢甚熾已遣使促王贍回湟州此據青唐録及曽布日録先是朝廷遣苖履姚雄等領兵援青唐有詔悉誅嘯聚叛羌乃還時廓州大酋羅日凖凌結溪丹布哩克等自阿爾城據本敦谷援軍既不敢擊從而附之者日滋王贍遣李忠等擊之不勝勢益張後十餘日贍復令忠及髙永年等出兵討蕩羌迎戰為永年等所敗本敦殘衆不能軍乃與青唐峗偽主碩隴贊合兵移屯乾谷峗此據隴右録乃十一月二十日并二十五日事今附此庚申胡宗回奏已遣使臣催王贍回湟州布録壬戍左司郎中徐彥孚權户部侍郎水部員外郎曾孝廣言大河見行滑州通利軍之間蘇村掃今年兩經危急請自蘇村掃危急處候來年水發之時乘勢開隄導河使之北行以順其性下合內黃縣西見行河道永久為便從之十一月二十四日已除都水使者癸亥遼國遣使髙州觀察使蕭括副使朝議大夫守大理少卿王慶臣來賀正旦是嵗宗室子賜名授官四十一人天下上户千三百二十七萬六千四百四十一丁三千一百六萬一千四十五客户六百四十三萬九千一百一十四丁千三百三十萬三千九百四斷大辟一千三百九十五人
