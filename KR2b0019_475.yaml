body:
  text: 續資治通鑑長編卷四百七十一宋李燾撰哲宗元祐七年三月甲申朔侍讀顧臨讀仁宗寶訓至鈔法事左僕射吕大防奏曰臣側聞顧臨讀鹽鈔事臣敢陳鈔法本末仰祈陛下通知利害之詳國初輦運香藥茶帛犀象金銀等物赴陜西變易糧草嵗計率不下二百四十萬貫自鈔法之行始令商賈於沿邊入中見錢糧草却於京師或解池請鹽赴沿邊出賣一則人户無科買之擾二則商旅無折閲之弊三則邊儲無不足之患四則物貨無般輦之勞五則運鹽減腳乘之費實於官私為利上甚善之張舜民云范祥領制置兩池解鹽經始鈔法初年嵗課一百二十萬末年一百六十五萬以謂鈔鹽利止此可矣或從而多取之則法必弊是以止於一百六十五萬其策不專為以鈔請鹽兼為飛錢爾今以百千之多移致他州已為重載易之為鈔則數幅紙而已於是禁絶私鹽沿邊置折博務設官吏賣鹽賣鈔本法專賣見錢不得兊折斛斗客得錢不能致逺必來買鈔用是邊糴不匱鈔法通行逮夫熙寧邊事稍動用鈔日增元豐初年賑濟饑民亦用鹽鈔自爾軍須國用無所不資商賈入京鈔價折閲於是金部嵗出見錢三十萬貫以𣙜之見錢不繼鈔價遂下紹聖水沴解池又失大利推原天時人事符㑹如斯深可歎惜也簽書樞密院王巖叟奏曰陛下宫中何以消日上曰並無所好惟是觀書巖叟曰大抵聖學要在專勤屏去他事則可以謂之專久而不倦則可以謂之勤如此天下幸甚丙戍環慶路經略使章楶奏七年三月三日本司勘㑹往年十二月內有投來河東陷蕃婦人阿聲稱聽得西界人說首領慶鼎察香道有逹勒逹國人馬於八月內出來打劫了西界賀蘭山後面婁博貝監軍司界住坐人口孳畜已具狀聞奏訖續據西界投來蕃部晒努通說稱逹勒逹國人馬入西界右廂打劫了人口孳畜不知數目本司未敢全信今又據捉到西界首領伊特香通說於去年閏八月內梁葉普統領人馬赴麟府路作過去來至當月盡間到逹爾結羅有帶銀牌天使報梁葉普來稱逹勒逹國人馬入西界婁博貝打劫了人户一千餘户牛羊孳畜不知數目其帶牌天使當時却回去伊時香即不知梁葉普指揮事理本司看詳逐人通說並各符合夏國叛命違天逆理宜取誅滅其西南則有邈川東北則有逹勒逹皆其鄰國今不能和輯而並邊侵擾此蓋天人共所不容之效也兼勘㑹寶元康定之間元昊犯順亦嘗遣使嘉勒氏當時頗得其用蓋以外國攻外國古人之上䇿今邈川既已懷服朝廷威德可使為用而逹勒逹獨以隔逺未知嚮化之路今若於河東或邈川界求間道遣使至逹勒逹陳述大宋威德因以金帛爵命撫之使出兵攻擾夏國以與邈川相為掎角則蕞爾之國三處被患腹背受敵彼知國中內外多事宜亦自折可使不日請命此困賊之一端也伏乞朝廷詳酌施行貼黃乞體問夏國委有恭順之意且無令遣使至闕委鄜延帥臣先定議論諸路先定疆界然後降指揮丁亥詔復置滄州振武第六十七六十八兩指揮以五百人為額詔諸路轉運司管勾文字官除三路外餘路並行減罷其職事令帳司官兼行諸路提刑司檢法官發運司勾當公事官依舊存留其發運司管勾文字存留官一員外并管勾糶糴斛斗官一員並減罷仍令勾當公事官兼管勾糶糴斛斗中太一宫使馮京為太子少師依舊宣徽南院使致仕從其請也殿中侍御史楊畏言左朝奉大夫前權知和州孫賁初聞弟喪式假內用女優飲㑹論刑雖輕犯義實重賁乃泰然不以為非勘官倪本滅裂殊不推究訪聞賁交結權貴助之者衆恐非有挾不敢偃蹇如是伏望朝廷度情揆義究其所存特賜懲黜以警在位詔孫賁特差替是日三省進呈程頤服闋欲除館職判登聞檢院太皇太后不許乃以為直祕閣判西京國子監初頤在經筵歸其門者甚衆而蘇軾在翰林亦多附之者遂有洛黨蜀黨之論二黨道不同互相非毁頤竟罷去及進呈除目蘇轍遽曰頤入朝恐不肯靜太皇太后納其言故頤不得復召此據王巖叟日録當考巖叟云頤竟為蜀黨所擠蓋非平實語今改之五月四日頤尋醫此三月二十二日吳立禮言四月十四日又言五月四日董敦逸言駙馬都尉韓嘉彥除正任刺史政日初四日事附見當考戊子占城國進奉使良保故倫軋丹副使傍木知突為保順郎將己丑詔祕書省校對黃本書籍官承務郎以上到任三年為一任與除正字選人並依太學博士條改官河東轉運使胡宗回舉走馬承受使臣馮熙再任內批出宗回奏云走馬承受使臣或其間以廉勤選令再任者出自朝廷特㫖非外官可舉胡宗回不知事體宜加戒飭施行是日樞密院進呈乞且放罪亦足以戒從之御史中丞鄭雍言竊觀治古之君享國隆盛措世安榮未嘗不以人才為先堯之聖克明俊德舜之明咨於四嶽禹勤求賢士湯立賢無方則夫二帝三王未有不先於此者恭惟皇帝陛下謙恭退託委任輔相而求賢養士之法似未及古今邊鄙幸無甚患設一方有警其可使帥方靣者幾何人天下財匱黎民重困其能不傷財不害民者幾何人河流未定議論不决其能窮利害省民力者幾何人朝廷有大述作其能討論潤色華國者幾何人凡此皆朝廷嘗有求而未得也頃司馬光建請侍從之臣以十科舉士今其法雖存徒文具耳何哉朝廷不以近臣之言為信近臣不以真賢實能報朝廷求其得人難矣臣欲乞詔宰臣執政大臣各選賢能不限人數以時上聞仍令內外從官待制以上約十科法隨人才所長嵗各薦三人內中置籍列所薦及薦之者姓名以備聖覽每三省進擬間用其人陛下可以從中觀省且以察近臣之能否毋為空文示以必信則陛下之臣皆用心於求賢而堯舜之治可臻矣庚寅太常寺言看詳祭日謂之朝日祭月謂之夕月蓋朝者旦見之名夕者暮見之名言朝日夕月則祭祀之義可知故周禮掌次朝日祀五帝則張大次小次禮記曰朝日於東門之外國語曰大采朝日少采夕月前漢賈誼亦曰春朝朝日秋暮夕月今太常寺格及太史局選日畫日皆春分祀朝日秋分祀夕月各增加祀字今欲各減去祀字庶合古義從之御史中丞鄭雍殿中侍御史楊畏言知絳州安鼎到任表語涉誣毁乞行黜罰雍言鼎表叙述昨罷御史事內言欲請對則長官見排臣係御史臺官長見鼎語涉誣毁理當辨明昨因朝㫖斷王鞏事臣與本臺楊畏安鼎同議王鞏事干謝景溫蘇轍外右僕射劉摯與鞏為姻家中外觀望隱庇鞏遷延二年餘而摯並不明正鞏罪合并論三人惟楊畏以為當然獨鼎言鼎已嘗言蘇謝劉摯可後言之臣與畏言議論既已不一即難以同對亦無排鼎之言况自來言事官有所聞見各得論列亦不由官長可否豈容臣獨得排鼎而言天髙日逺無路可通益見欺罔鼎又云肯附勢而廢職臣按劉摯不公事具如前後所奏其殿中侍御史楊畏左正言姚勔右正言虞䇿並有奏劾而鼎獨不言豈非附勢當言不言豈不廢職及後來見事勢不安方入一章略云至於劉摯乃自為身謀昨來賈易挾私言事鼎専附易聖朝察見易之姦邪鼎猶屢稱易為直臣上惑聖聽按鼎係通判資序朝廷優恩除知絳州猶不省過感恩自謂盡忠潔已文飾其過在法不容伏望朝廷特賜省察畏言鼎稱孤單得志自謂千載之一時愚魯無謀不悟獨齊而衆楚又言欲請對則長官見排擬㑹謀則同列稱異以臣及鄭雍姚勔虞䇿論宰臣劉摯不公等事幾月之間章疏繼上鼎獨不聞有一言及摯罷相宣麻之日鼎乃稱疾在告猶不自引不言劉摯之罪止自謂言蘇轍不行乞出而已當日臣固知其與摯朋比但以其方言蘇轍若臣從而擊之是為轍解仇不無嫌避已而罷職守絳臣亦便當論列而臣實以大姦既去黨類雖衆務在安靜不欲更有排擊而又與鼎同列區區實有惜風義之意不即彈劾上負朝廷不謂鼎暗愚益甚殊不省咎乃於謝表猶肆邪說上則欺惑朝廷下則鼓扇黨類且又有以臣為同列稱異之論鼎身為御史欲對即可對欲言即可言則同列詎能稱異哉既未嘗欲與臣等同登而拒之又於劉摯過惡不聞有一言而去乃曰天髙日逺身無路而可通不知御史而謂天髙日逺則逺方小民何路自陳哉况鼎備官言路阿附宰政既免斥逐而姦言巧說望望不已非臣子之義辛卯詔安鼎差知髙郵軍鼎知絳州在六年十一月十六日壬辰唐州言伏見本州泌陽縣故江寧府司法參軍吳蕡女年二十四嵗而歸布衣王令未及一年而令卒吳方二十五嵗有遺腹子一人其兄欲奪而嫁之號泣弗許歸老於父母之家屏跡田桑以事兄嫂如此三十二年矣今居黃池陂每嵗農隙躬率農夫數千人大治陂水灌田利及一方人皆服其教令欲乞朝廷特賜旌表詔賜絹一十匹米二十石甲午環慶路經略使章楶奏凖元祐七年三月五日樞密院劄子經略司奏差第二將折可適統領軍馬出界攻擾今據折可適申斬首五十餘級外其餘賊馬耕牧人口已知覺遁走右勘㑹沿邊若果能審探得西賊對境委有屯聚及耕牧人口遣發兵將往彼攻擾致令驚潰即不計斬獲多少但使賊於二百里內不敢屯聚耕牧自為我利今來折可適所領人馬八千餘人入界攻擾若謂討其屯聚緣不曾逄賊大假鬭敵若為擾彼耕種又所領人馬數多竊慮此後為賊所測却於並邊陽以㱔小人馬孳畜為屯聚次第誘我出界彼却多方設伏併來拒戰必致落賊姦計挫損兵威仰本司更切嚴緊戒約諸將常子細緝探賊界屯聚虛實帥司參驗的確委是有利可乘即相度遣行無致輕易自取困辱臣勘㑹用兵之要所貴機密晦而密則我之動靜彼不能測而彼之舉動坐作皆在吾目中乘機伺隙出其不意然後可以言勝昨者探報言韋州界聚兵三萬來人馬續差人探得韋州聚兵乃是虛聲其韋州界沿邊野寨各相去二三十里每寨實有八百餘人馬四百匹以護耕者又逐處蕃馬全然瘦弱堪任戰鬭者全少及捉到西界蕃官首領詰問審知子細故遣折可適統八千餘人分道前去討擊野寨因之攻擾耕牧况蕃界逐寨所屯聚人馬不少相去至近須防救援若所遣人馬數少必遭襲逐掩擊故審彼之虛實聚衆之多少山川之險易皆已諳熟方敢遣師晝夜兼行一日一夕而至韋州監軍司居止之室不謂賊人探候烽燧先覺遂至遁逸我師既回果有追襲兵馬而所遣將豫於要害處暗設伏兵前後合之賊衆大敗生擒首領二人甲馬一十二匹斬首一十級賊衆逺遁更無一人一馬敢追官軍其折可適等出界雖斬首止於七十級而生獲正副首領二人馬一百匹駱駝三十頭牛羊約三十餘頭口燒蕩了族帳千餘帳軍回僅二百餘里如行無人之境蕃衆無人敢近官軍皆知不可與我軍鬭然則傷害賊衆不為不多犬羊之衆稍知畏避矣今凖劄子內指揮謂之擾耕所領人馬數多竊慮朝廷未知西界沿邊逐寨各添屯人馬若欲擾耕非前件人數亦不可出師今具開陳所奉戒約見依應施行次貼黃邊事方興不敢不竭誠報國即非僥幸恩賞自去冬遣師出塞粗能不辱國威非有驚世之績而好事忌嫉之人已衆或以謂輕舉深入殊非安全之䇿或以謂連結敵怨必遭重報竊緣夏人無厭不威不懼不戮不懲朝廷包容含忍不為不至一日舉大兵深冦河東直至兩郡城下殺戮不可勝計則河東何嘗與冦結怨兩郡之民先遭屠割是則顧備禦之計如何耳不在結怨不結怨也至於修築近裏城壁盡是前輩名臣遺跡皆有深意者或却將沿邊檢計城寨比方新築城壁工料多寡不同殊不知沿邊城寨已曾經圍閉别無疏虞止於增修而已如此浮言紛紛人人異論而朝廷在逺豈能察知詳悉積日之久安得不疑舉動生疑邊臣誰敢立事必為自全之計伏望朝廷考察帥臣能否速加澄汰果有不才不職或生事欺罔之人早賜黜罷或以為猶可任也則乞措置邊事專責帥臣庶幾責任歸一雖死無避元祐七年三月十一日奏此丁酉太常寺言納后六禮內五禮命使納采問名納吉納成告期其日太皇太后服禮服御崇慶殿設五禮制書內侍官先奉納采問名制書出內東門如常儀餘制書安於崇慶殿門幄次內使副受制書捧出朝堂門外安制書於車使乘車如禮至行第次日納吉納成告期如儀其命使奉迎皇帝臨軒與册禮使副同日遣本寺參詳將來納后日皇帝臨軒遣册禮使訖次遣奉迎使從之御史中丞鄭雍言伏見右朝請郎王蘧除知秀州左朝奉郎王雍除利州路轉運判官按蘧見係初任通判資序昨以病致仕已經三年因兩浙路轉運司奏許再任不因績效超躐兩任堂除知州蘧與江隂縣豪民為親就其資材不顧名節今無名擢領浙西名郡使一路觀之輕笑朝命又王雍雖係第三任通判資序歷任治效殊未有聞朝廷置監司付之一路須才實為衆所稱或經省府寺監及繁難差遣方奉使一路今自知州資序人及歷任過繁難稍有治績者尚多未聞特有遷擢奬激士類外議多云王蘧王雍二人並緣執政親戚臣竊思其人才可稱治狀可擢資序可入亦不當以親嫌遂廢今王蘧之趣操猥下王雍之治效無聞除授有因物論弗允又殿中侍御史吳立禮言雍蘧皆以常才躐等除授採之衆論咸曰不可按雍本出山東一狂生既無髙才異行未嘗經朝廷任使一旦進擢使當一路按察之寄此不可一也蘧之為人尤為汚下常州江隂縣有孀婦家富於財不止巨萬蘧利髙資屈身為贅壻貪汚至此素為士論所薄前嵗因病背瘡遂乞致仕偶幸不死而二年之後復乞從官觀其修身行已固已可知今乃由通判資序堂除知州此不可二也議者又以為雍等因緣二府執政之親故不係人材皆得不次除授審其如此非所以示至公於天下也又殿中侍御史楊畏言雍行治非有顯著使執政知其才猶當少加試用今自常調除監司誠為太驟且京師職事官如寺監丞上下差遣不少皆已經試擢有居官數年或官滿罷去未有所授冀一轉運判官不可得豈其才皆不逮雍哉此雍之除所以物論未允也蘧嘗利大姓女資財巨萬娶以為妻無異於贅未聞他長而便被此恩似亦無故今曾經堂除人在京亦不少坐淹嵗月率無差遣豈其才皆不逮蘧哉此蘧之除所以物論未允也訪聞雍係翰林學士梁燾表弟簽書樞密院王巖叟妻之表叔蘧係右丞蘇轍壻王適之兄審其如此臣恐逺方寒士聞之有以動其心矣詔以蘧知無為軍雍知遂州王雍除利路運判在二月二十八日雍改遂州政目在十四日河東經略司言應干邊防或軍政機密公事係帥臣一靣推勘者監司更不㸃檢如察訪得實有冤濫具狀聞奏從之左朝議大夫直龍圖閣謝卿材為太僕卿吏部郎中趙稱權河北路轉運副使是日輔臣奏事延和殿太皇太后深以旱暵為憂戊戌月食簽書樞密院王巖叟奏言臣伏見去嵗日食五月朔今嵗月食三月望且食之既按十月之交詩曰日月告凶不用其行四國無政不用其良𫝊曰國無政不用善則自取謫於日月之災故政不可不謹也又曰彼月而食則維其常此日而食于何不臧考告凶之蝕同以為戒考維常之言則若專戒日食而不以月食為可畏蓋詩人之時事異於今今方兩宫同聽天下之政實日月並明之道俱不當有薄蝕之變也臣竊惟皇帝陛下以光明純粹之德淵默臨朝太皇太后陛下以仁義忠恕之行發而為政蓋無一不合天心者然則何為謫見於日月之災臣殆恐隂邪道長有以蒙蔽盛明而聖心不以為疑故天見變異以示警戒此天心之仁愛陛下而欲全聖德之美也消伏之應宜在此時願陛下用人之際則審邪正使必得其真聽言之際則察是非使必歸於當斥逺隂邪深防䝉蔽之害以答天心臣等不勝幸甚貼黃臣又按漢歷志記月食之既者率二十三食而復既按元豐八年八月望嘗食之既今固未及二十三食而復既則是不當既而既臣故恐天意之有以深警陛下也巖叟言必在此後今即附見此言或緣孫升韓川升等出乃發移附六月亦便更詳之己亥疏決在京并府界繫囚雜犯死罪已下第降一等至杖釋之王巖叟云聖意必在十六日施恩以月食之變也然不明諭政目於十四日書之庚子鄜延路經略使范純粹奏準樞密院劄子勘㑹陜西河東逐路沿邊見各有緊切控扼賊馬道路以自來夏國講和未曾修建堡寨今絶彼貢奉可以乘時踏逐地基修築三省樞密院同奉聖㫖令鄜延環慶涇原秦鳯河東路經略司差官帶領人馬親詣漢地生界內選擇形勢要害堪作守禦寨基去處約度城圍地步著望去處多少月日可以畢工子細畫圖開說聞奏臣契勘本路邊防形勢實有缺隙未備之處如欲必取周備則固可擇利而作然臣竊有淺議願試陳其說乃者朝廷以久厭戎事姑務息兵故於已復數城决議給賜而夏國抗請不已迄害講和今若令逐路各侵彼疆又有興作臣愚揆料竊有四憂一則諸路中必有永樂之禍何者昨元豐四年五路並進直以靈興為圖方是之時夏人審知中國重兵竭力此舉所以望風畏遁千里一空故橫山之隂廢城舊寨之要害者皆為漢兵所城比賊之還則我守既固而賊無能為向使賊未至畏遁雖遁不逺則我尚能畢此城役乎後一年賊稍南還而沈括徐禧輕議進築即致敗覆此其驗也今朝廷又令諸路各行進築臣愚竊所未許或謂諸路並舉賊必分兵以應賊勢既分即無永樂之禍臣以謂不然計賊之力雖不能必害諸路板築之役彼若置諸路而攻一路城未及堅池未及深守計未及辦具而力役垂困諸路各事役作尚能捨已而援鄰乎則被攻路分理勢艱危斷可識矣此臣之憂一也二則他日愈無息兵之期何哉臣竊度朝廷今日之所以絶賊而不憚嚴兵者是豈得已而然乎豈真為永絶之計乎蓋欲懲僥幸絶覬覦為他日地也昨葭蘆米脂浮圖安疆四寨朝廷捐之而不以為重者蓋有重於此者也所捐不為不多而彼猶要求不厭旅拒稱兵今若又令諸路增進城壘不下十數異時彼此取舍何所措詞是堅賊之道也此臣之憂二也三則人力不足何者諸路正兵不多平日尚須以東兵增戍自元豐用武以來所增之數倍於土兵不惟素非力戰之士又皆分𨽻諸將兼均付諸城堡寨以助戍守故每將被戰土兵大抵不滿二千警急則每以少兵為患今若更增城守之數則兵勢愈益分裂而戰守之計尤疏此臣之憂三也四則支費難勝何哉朝廷自展拓熙河已來至於收復諸路州城堡寨所在增費可謂不資既竭關陜公私之力而朝廷飛運金帛係於道路然而漕官告乏尚無已時雖棄捐四城未聞餘羡今又有十城之舉則目今與永逺之費何可勝計臣恐內外窘匱理有不支貽朝廷無窮之悔嵗或饑饉狼狽可慮此臣之憂四也臣竊謂廟朝謀議豈不及此恐朝廷姑為此聲使賊知我不務速和以伐謀耳審如是願朝㫖密以誡臣臣當陽為大勢以示之雖無甚補庶無甚害如朝廷真以乘時進築為邊防之利則非臣之所知也臣未敢奉詔謹具論列以聞純粹以七年三月十七日奏此從違當考辛丑駙馬都尉郭獻卿為明州觀察使右大中大夫張安上為都官郎中右朝奉郎開封府推官揚景謨為職方貟外郎八年六月十八日江東刑禮部言五年五月十八日詔與尚書侍郎三省侍從官同議皇地祇祀典五月十八日但詔禮部太常寺六月十二日乃詔尚書侍郎三省侍從官準禮部尚書趙彥若牒檢㑹元豐六年五月九日勑太常寺修定到郊祀之嵗夏至皇帝親詣北郊祭皇地祇於方澤儀并上公攝事儀詔依所定看詳如遇郊祀之嵗親祠於方澤及攝事並合典禮之正自繫朝廷臨時指揮今太常寺止稱所有親祠北郊之嵗南郊圜丘於理亦合以上公攝事及改樂舞乞一就修定儀注如此則更無可議伏乞更不聚議又禮部郎中崔公度狀訴將建議南郊合祭天地非禮竊見纍次集議未合將來南郊或别行大禮乞用資政殿學士陳薦奏依舊合祭天地并從祀百神所有今次集議公度更不趂赴本部緣未奉朝㫖致未敢集官詳議公度嘗言謹案周頌昊天有成命之序曰昊天有成命郊祀天地也又周禮冬至祀昊天上帝於圜丘夏至祭皇地祇於方澤漢武帝郊祀歌曰惟泰元尊媪神蕃釐經緯天地作成四時又曰㳙選休成天地竝況惟豫有慕爰熙紫壇思求厥路又曰上天布施后土成穰穰豐年四時榮皆合祭天地於南郊之詞周頌合祭禮之情也周禮特祀禮之文也文必有情情必有文然則祭天地或合或分特繫於時君而禮則一也今特祀難行即當依舊合祭並依祖宗舊儀為萬世不刋之典崔公度狀據政和㑹要在趙彥若言更不聚議後與今實録所載公度狀不同今兩存之五年七月趙彥若以禮書六年二月改內翰公度為禮中在四年十二月二十四日改徐王府侍講在六年八月二日彥若公度牒狀必同時禮部又言本部郎中葉祖洽議願朝廷復明堂五帝之常祀太常少卿盛陶太常博士張瓛宋景年言若祀昊天上帝兼祀五帝如舊儀得禮之變與祖宗大享之禮前後相成祀典無闕太常博士朱彥請季秋宗祀明堂以配上帝取合諸經於義為允本部看詳若宗祀明堂昊天上帝五方上帝以五方人帝五官從祀得禮之變又言太常博士孫諤請祀太社太稷設宫架及於太社壇上設祭歌樂仍除去小壇頗為允當本部緣未奉朝㫖致未敢集官詳議詔並令侍從官及尚書侍郎給舍臺諫禮官集議以聞七年九月八日彭汝礪顧臨等議合祭八年三月八日議朱彥所請兵部狀準都省白劄子臣僚上言諸路將兵器乞逐路委提㸃刑獄官一員専一提舉每季從提舉官於本州京朝官之間精選公强了事之人㸃檢使安置如法暴磨以時應修者别修應别作措置以久逺保全者必稟於朝廷及時應措置本部檢準敕兵部狀契勘河北大名府澶定三州並河東太原府各有編排樁管二十將軍器什物乞從本部每半年一次下鄰路選差文武朝臣以上官每處各一貟詣逐一㸃檢奉聖㫖依本部勘當除河北三州并河東太原府二十將封樁軍器什物已有上項朝㫖外其諸路諸將下兵器欲乞依今來申請事理施行從之詔將作監編修到營造法式共二百五十一册內淨條一百一十六册許令頒降知潁昌府資政殿大學士韓維為太子少傅致仕從其請也甲辰詔應保甲除指定窠名合差者令從經略安撫司運司一靣抽差訖報提舉保甲司其非次合要差使並關提舉保甲司相度奏聽朝㫖如事體緊急待報不及者仰應副訖保明申奏仍須量人材所宜稱事差撥務要均當詔義飬子孫合出離所養之家而無姓可歸者聽從所養之姓若同居滿十年仍令州縣長官量給財産雖有姓而無家可歸者準此乙巳殿中侍御史吳立禮言臣竊見丁憂服闋人前通直郎程頤除授直祕閣判西京國子監進職無名頗駭士論按頤當元祐初用大臣論薦方除幕職官充西京教授意卑小官初乃固辭及朝廷再以通直郎崇政殿說書召之即欣然受命蓋其志在躁進故辭卑居尊速冀顯逹方其起自布衣勸講帷幄簡拔進用可謂不次矣不能安命循理圖報厚恩而怙勢要權日走執政諫官御史之門以遊說為事業肆其喜怒妄以進退人物為己任蓋其言僞而辨學非而博足以鼓動搢紳欺惑當世備位經筵輒敢以師臣自處欲求坐講是時諌官孔文仲上章斥其狂妄果不能逃陛下知人之明即行顯黜前謫居西京欲使之退思自省今既免喪除服還其元任足矣一旦寵擢無名優進儒館之職將何以懲戒妄人聳勸多士况更直祕閣先朝故事必宿儒舊德處之使頤冒居此衆論所以不平也伏望天聽察其狂妄無補聖世罷去職名以厭公議丙午環慶路經略司準備差使馬琮等領兵出界攻討葉結貝旺野寨斬大小首領二人首級五十此據章楶奏議增入丁未知鄭州觀文殿學士安燾知潁昌府戊申臣僚上言任子舊制天聖令以䕃出身應授職任者選滿或遇恩放選或因奏乞皆年二十五嵗乃許注官熙寧間峻立試格凡試中許年二十注官由是暗增冗貟臣願並復天聖故事詔令吏部立法申尚書省本部今修立下條諸有出身人年二十以上無出身人年二十五以上聽赴選非應免省者候試中注官年雖未及而願先試者聽諸無出身人投家狀試卷乞試者關侍郎左選遇科場關試院諸初受使臣依下項年甲聼赴選及出官其該說不盡比附施行宗室宗室女夫后妃美人才人等親屬大長公主長公主公主郡縣主親屬親王夫人親屬前代帝王之後品官親屬勳臣之後特㫖與官酬奬與官文臣換授若本有出身年二十以上三省樞密院書令史以上流外右年二十五以上武舉呈試武藝諸軍班直散直戰功換官殁於王事親屬告捕盜賊歸明落蕃得還蕃官溪峒猺人招出右年二十以上諸初次出官該試者具所習藝業投家狀試卷乞試關殿前司及侍郎左選遇科場關試院候試中注差選並從之後都省批四月二日送吏部並依所申以上聽赴選非應免試者候試中出官年雖未及而願先試者聼實録但存第一項條貫四十字餘並削去今詳著之己酉太常丞集賢校理陳察權利州路轉運判官八月十六日改江東孔武仲云云庚戌禮部言據太常寺狀修撰到納皇后儀注命使納采問名納吉納成告期發册奉迎尚宫導皇后詣福寧殿之大次以俟至日晡後皇后車入宣德門禮直官通事舍人引侍中版奏請中嚴內侍轉奏皇帝服通天冠絳紗袍御福寧殿宫人侍衛如常儀尚宫引皇后出次詣殿庭之東西向立尚儀跪奏外辦請皇帝降座禮迎尚宫前引詣庭中之西東南靣揖皇后以入皇帝導皇后升自西階入室各就榻前立尚食跪奏具皇帝揖皇后皆座尚食以饌進皇帝及皇后皆食三飯尚食以酒進皇帝皇后俱受爵飲尚食以饌從再飲如初三飲用卺如再飲尚儀跪奏禮畢皇帝皇后俱興尚宫請皇帝御常服尚寢請皇后釋禮服入幄次日以禮朝見太皇太后皇太后參皇太妃如宫中之儀詔依政目云禮部修到納皇后儀注辛亥知河中府資政殿學士蒲宗孟知永興軍詔故南陽郡君朱氏特贈美人范祖禹言臣掌國史伏覩仁宗皇帝在位四十二年豐功盛德固不可得而名言所可見者其事有五畏天愛民奉宗廟好學聼諫仁宗行此五者於天下所以為仁也陛下嗣位於今八年昧爽而聽朝旦晝而聽學風雨不易寒暑不倦可謂勤於進德矣然而天衷淵默聖度髙逺中外之人未知陛下睿意所好如仁宗之五者見於天下羣臣雖欲少禆萬一亦無自而入方今四海顒顒想望太平臣願陛下深留聖思法象祖宗日新輝光昭示所好以慰答羣生之望讀劄子畢又言臣觀仁宗每因事示人好惡皇祐中楊安國講直哉史魚邦有道如矢邦無道如矢君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之仁宗曰蘧伯玉信君子矣然不若史魚之直據孔子之言則史魚不若蘧伯玉之君子仁宗之言仁人君子之言也人君唯欲臣下切直故言蘧伯玉不若史魚以開臣下切直之路由是天下知仁宗好直不好佞此聖人之大德也如此之類臣願陛下以仁宗為法上然之先是六年十一月辛亥客星出參宿度中犯厠星太史言主有暴兵米貴晉分兵災壬子犯九斿星十二月癸酉行入奎宿度中太史言主邊兵動今年正月隨天運行入濁不見至是月辛亥在奎宿度中消伏
