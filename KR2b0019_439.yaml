第四等已下舊本無役不過差充壯丁無所賠備而雇役法例出役錢雖所取不多而貧下之人無故出三五百錢未辦之間吏卒至門非百錢不能解免官錢未納此費已重故皆化為遊手聚為盜賊當時議者亦欲蠲免此等而户數至廣積少成多役錢待此而足若皆蠲免則所喪大半雇法無由施行此雇役之法害下户者二也今改行差役則二害皆去天下幸甚獨有第三等人户方雇役時每户嵗出錢多者不過三四千而今應一役為費少者日不下百錢二年一替當費七十餘千而休間逺者不過六年則是八年之中昔者徐出三十餘千而今者併出七十餘千苦樂可知也而况農民在官貪吏狡胥恣為蠶食其費又不可以一二數此則差役之法害於中等户者一也今之議者或欲專行差役或欲復行雇法皆偏詞過論也臣愚以謂朝廷既取六色錢許用雇役以代中等人户頗除一害以全二利此最良法可久行者但元祐二年十二月二十四日敇合役空間人户不及三畨處許以六色錢雇州手分散從官承符人此法未為允當何者百姓出錢本為免役今乃限以畨次不許盡用留錢在官其名不正又所雇者少未足以紓中等人户之勞法不簡徑使姦吏小人得以伸縮臣到杭州㸃檢諸縣雇役皆不應法錢塘仁和富貴縣分則皆雇人新城昌化最為貧薄反不得雇蓋轉運司特於法外創立式樣令諸縣不得將逐等人户都數通比其貧下縣分第一等二等人户例皆稀少至第三等則户數猥多以此漲起人户皆及三畨然第三等户豈可承當第一等色役則知通計三等乃俗吏之巧薄非朝廷立法之本意也臣方一面改正施行旋凖元祐四年八月十八日敇諸州衙前投名不足處見役年滿鄉差衙前並行替放且依舊條差役更不支錢又諸州役除吏人衙前外依條定差如空間未及三年即以助役錢支募此法既下吏民相顧皆所未曉比於前來三畨之法尤為不通前史稱蕭何為法講若畫一蓋謂簡徑易曉雖山邑小吏窮鄉野人皆能别白遵守然後為不刋之法也臣身為侍從又忝長民不可不言謹具前件條貫不便事狀及臣愚見所欲起請者畫一如左一前件敇節文云看詳衙前自降招募指揮僅及一年諸路州軍尚有招募投名不足去處其應役年滿衙前雖依舊支與支酬勒令在役然非鄉户情願充應若後更無人願募即鄉户衙前卒無替期乃是勒令長名祇應顯於人情未便今欲將諸州衙前投名不足去處見役年滿鄉差衙前並行替放且依舊條差役更不支錢如願投充長名及向去招募到人其雇食支酬錢即全行支給却罷差充仍除鄉差年限未滿人户依條理當本户色役外其投募長名之人並與免本户役錢二十貫文如所納數少不係出納役錢之人即許㑹六色合納役錢之人依數免放并仰逐處監司相度見役衙前如有虛占窠名可以省併去處裁減人額却將減下錢數添搭入重難支酬施行臣今看詳前件敇條深為未便凡長名衙前所以招募不足者特以支錢虧少故也自元豐前不聞天下有闕額衙前者豈常抑勒强充直以重難月給可以足用故也當時奉使之人如李承之沈括吳雍之類每一使至輒以減刻為功至元豐之末衙前支酬可謂僅足而無餘矣而元祐改法之初又行減削多是不支月給以致招募不行今不反循其本乃欲重因鄉差全不支錢而應募之人盡數支給又放免役錢二十貫欲以誘脅盡令應募然而嵗免役錢二十千許計㑹六色人户放免則是應募日增六色錢日減也若天下投名衙前並免此二十千即六色錢存者無幾若止是闕額招募到人方得免放則均是投名厚薄頓殊其理安在朝廷既許嵗免二十千則是明知支酬虧少以此補足何如直添重難月給令招募得行所謂計㑹六色人户者蓋令衷私商量取錢若遇頑猾人户抵賴不還或將諸物高價凖折訟之於官經涉嵗月乃肯備償則衙前所獲無幾何如官支二十千朝請暮獲豈不簡徑易曉故臣愚以謂上件敕條必難久行議者多謂官若添錢招募則姦民觀望未肯投名以待多添錢數今來計㑹六色人户放免役錢正與添錢無異雖巧作名目其實一般大抵支錢既足萬無招募不行之理自熙寧以來無一人闕額豈有今日頓不應募臣今起請欲乞行下諸路監司守令應闕額長名衙前須管限日招募數足如不足即具元豐以前因何招募得行今來因何不足事由申奏如合添錢雇募即與本路監司商議一面施行訖具委無大破保明聞奏若限滿無故招募不足即取勘干繫官吏施行如此不過半年天下必無闕額長名衙前而所添錢數未必人人嵗添二十千兼止用坊場河渡錢非如今法計㑹放免侵用六色錢也一前件敇節文云看詳鄉差人户物力厚薄等第髙下丁口進減故不常定恐難限以畨次招募不若約空間之年以定差法立役次輕重雇募役人顯見均當兼可以將寬剩役錢裁減無丁及女户所出錢數欲諸州役除吏人衙前外依條定差如空間未及三年即據未及之户以助役錢支募候有户罷支已募之人各依本役年限候滿日差罷今後遇有支募凖此及以一路助役錢除依條量留一分凖備外據餘剩錢數却於無丁及女户所出役錢內量行裁減具數奏聞所有先降雇募州役及分畨指揮更不施行臣今看詳諸役大率以二年為一畨向來指揮如空間人户不及三畨則令雇募是聖恩本欲百姓空間六年也今來無故忽減作三年吏民無不愕然以謂中等人户方苦差役正望朝廷别加寬恤而六色錢幸有餘剩正可加添畨數而乃減作三年農民皆紛然相告云向來差役雖甚勞苦然朝廷猶許我輩間了六年今來只許間得三年必是朝廷别要此錢使用方二聖躬行仁厚天下歸心忽有此言布聞逺邇深為可惜雖云量留一分凖備外據餘剩數却於無丁及女户所出役錢內量行裁減此乃空言無實止是建議之人假為此名以濟其說臣請為朝廷詰之人户差役年月人人不同本縣有户無户日日不同加以稅産開收丁口進退雖有聖智莫能前知當雇當差臨事乃定如何於一年前預知來年合用錢數見得寬剩便行减放臣知此法必無由施行但空言而已若今來寬剩已行減放來年不足又須却增增減紛然簿書淆亂百弊橫生有不可勝言者矣方今中等人户正以應役為苦而六色人户猶以出錢為樂苦者更減三年樂者又行減放其理安在大抵六色錢本緣免役理當盡用雇人除量留凖備外一文不合樁留然後事簡而法意通名正而人心服惟有一事不得不加周慮蓋逐州逐縣六色錢多少不同若盡用雇人則苦樂不齊錢多之處役户太優與六色人户相形反為不易臣今起請欲乞今後六色錢常樁留一年凖備如元祐四年只得用元祐二年之錢其三年錢樁留凖備用及約度諸般合用錢外謂如官吏請雇人錢之類其餘委自提刑轉運與守令商議將逐州逐縣人户貧富色役多少預行品配以一路六色錢通融分給令州縣盡用雇人以本處色役輕重為先後如此則事簡而易行錢均而無弊雇人稍廣中户漸蘇則差役良法可以久行而不變矣貼黃若行此法今後空間三年人户官吏隱庇不差却行雇募無由㸃檢縱許人告自非多事好訟之人誰肯告訴若有本等已上間及三年未委專以空間先後為斷為復參用物力髙下定差既無果决條貫今後詞訟必多右謹件如前朝廷改法數年至今民心紛然未定臣在外服目所親見正為此數事耳伏望聖慈與執政大臣早定此法果斷而行之若還付有司則出納之令必無成議日復一日農民凋敝所憂不小臣干犯天威謹俟斧鉞之誅元祐二年十二月二十四日敕又四年八月十八日敕實録俱不載不知蘇軾所請後來從違如何姑具載之須考詳刪修壬午詔樞密院諸房條例久未經編修又自官制後舊事𨽻屬他司所存者亦未刪正冗雜難以檢用命承㫖司取索編修以奉議郎蔡駰宣德郎衡規充編修官先是御史中丞梁燾左諫議大夫劉安世進對延和殿太皇太后令具可用臣僚姓名進入於是燾安世共奏臣等竊謂朝廷有大除拜自合出於人主之意左右大臣亦不當預固非臣等所可輕議陛下特示至誠曲降清問欲採外廷公議以上裨宸斷臣等不敢堅避僣易之罪輒以名聞吏部尚書傅堯俞素有德行衆人推服凝重有守得大臣體仁宗英宗朝嘗歷臺諫有正直之譽翰林學士承㫖蘇頌學問該博練逹典故神宗朝任知制誥以不草姦人李定為御史詞落職歸班遂有重名伏望聖慈更賜詢考燾安世奏云今月八日延和殿面奏聖㫖當即是十一月八日今附十七日傅堯俞為中侍前癸未正議大夫守門下侍郎孫固為光祿大夫知樞密院事中夫夫守中書侍郎劉摯為守門下侍郎朝請大夫試吏部尚書傅堯俞為中大夫守中書侍郎甲申河北沿邉安撫司言滄州巷沽寨收到北界人船一隻取問得涿州人户孫文秀等捕魚值風入海若依指揮刺充廂軍緣非賊徒姦細朝廷推示恩信綏服四夷乞令監司雄州牒送北界從之樞密院言蘭州下臨大河慮冬深凍合詔范育檢詳纍年大河凍合差那兵將等往蘭州定西域等處守禦隄備溪峒知龍賜州彭允宗押案副使彭允金知監州彭仕明押案副使彭儒勇知吉州彭儒崇各進奉興龍節冬至正旦節溪布左中散大夫知涇州王說為祠部郎中知桂州寶文閣待制苖時中為江淮荆浙等路發運副使直龍圖閣孫覽權知桂州戊子三省言六曹寺監行遣文字甚有迂枉留滯昨雖措置終是未能盡絶今既吏額已減若不裁節不免尚費人力轉為積滯如本案顯有迂滯事件限一月陳述從之御史中丞梁燾言臣聞省吏不如省官省官不如省事朝廷屢下省吏之令誠知所急矣然未極其要也今日之弊正在官司守執之不一文書行移之繁復今既稍削吏祿又減吏貟所不動者事也事益以多而來之無窮人益以少而減之不已祿有不足之憂職懷被減之慮欲其免茍簡因循之患其可得乎必使人人有安固自勉之心則可以終責其效誠能併官而一其守約事而簡文書官日以修事日以序然後吏之祿額可得而損矣使其祿無不足之憂職無茍簡之弊以此示人羣心必服顧愁怨從何而起哉此誠上助聖政之一端也貼黃御史臺㸃檢得諸處文字依舊稽遲每加催促多是乞再三展限方能回報蓋緣官司上下行遣迂枉若更減人吏即更留滯就使應副得行必然不至精詳向去事轉不舉有司必却乞添人理須應副如此則紛紜卒難成法此不可不謹也訪聞諸處減却人吏已多文移行遣等事繁冗依舊如此則人力自是不給何緣得事不留滯伏乞聖慈詳酌早賜指揮前來四分減一指揮未已又復有再減指揮故曹部等人吏往往懷疑茍簡不復勉勵今不務澄事源徒欲省吏此建議之人不思之甚也燾言此不得其時附三省令吏陳述迂滯事後己丑太皇太后手詔曰三朝盛㑹禮見羣臣王公造廷捧觴上夀皇帝臨御五載恭已端莊慶集惟新受朝饗禮吾總攬機務協助政綱雖克享治安而每懷抑畏今有司乃欲以天聖故事行慶㑹稱賀之儀顧惟菲涼豈敢比隆於先后其在典法亦當稽合於常規是日皇帝致賀於禁中羣臣奉表於東廡足以顯邦家之慶而行孝謹之風何必外朝乃為具禮來年正月一日更不御殿受賀上夀候皇帝御殿禮畢百官並內東門拜表前此尚書禮部乃檢㑹天聖年章獻明肅皇太后元日御㑹慶殿受皇帝奉賀上夀及宰臣百官契丹使以下起居稱賀之儀為請故有是詔以殿前副都指揮使武康軍節度使劉昌祚奏請根括隴山地凡一萬九百九十頃招置弓箭手人馬凡五千二百六十一人騎賜敇書奬諭庚寅樞密都承㫖王巖叟除中書舍人巖叟自言亡妻乃孫固女乞避親嫌也龍圗閣直學士正議大夫李肅之卒詔章惇買田不法降一官與宫觀差遣候服闋日給告政目二十四日事實録不書此年八月二十二日但與宫觀六年八月十六日復官辛卯大食麻囉拔國進奉錦布象牙琉璃等物蕃唐章表二道御史臺言文彥博宴并賜御筵臨時有司取㫖今遇興龍節尚書省賜御筵取指揮詔並免赴坐詔今後將副押隊差往别路權駐劄者家屬不得與將兵同行須候將副押隊押兵已起離本處半月後方得般家前去回日凖此壬辰詔趙卨將夏國送還永樂城陷沒人口一百五十五人各支與盤纒及衣裝分作三畨差使臣管押發來赴闕仍沿路許於驛舍安下新本削去元年七月八日此年六月九日明年二月四日當考詔曹詩與叙榮州防禦使駙馬都尉王詵更候參期取㫖以刑部檢舉也刑部言諸軍率衆對本轄官員不唱喏法上軍處斬下軍及廂軍徒三年配廣南對本轄將校節級依犯階級及立告賞法從之朝奉郎試太常少卿韓川為左朝散郎直龍圖閣樞密都承㫖政目無此以左朝請郎祕書少監林旦為直祕閣太僕卿知明州左中散大夫直龍圖閣王汾為祕書少監以權京西路轉運使朝請郎王子淵知明州以權發遣淮南路轉運使朝請郎彭次雲徙京西路以權梓州路轉運副使朝奉大夫吕陶徙淮南路尋改成都府路改成都在五年正月二十八日以朝散郎時孝孫為梓州路轉運判官左諫議大夫劉安世言孝孫資禀傾邪巧於仕進昔王安石曽布鄧綰變法之際曲意附㑹遂薦充司農寺屬官推行新法於河北吏民苦之視若鷹犬其後蔡確用事傾心交結又得御史臺主簿及何正臣鞫瀘南之獄舉以自隨使正臣欺罔先朝肆行酷烈孝孫贊助其力居多獄决還朝擢任一道元祐之初罷諸路提舉官隨例得郡搢紳之議固已不平今正臣既行黜責而孝孫尚冒監司陟降頓殊公論未允伏望聖慈考其素履灼見姦狀追還新命以折羣枉御史亦以為言詔孝孫改差權知鄂州改命鄂州在十二月十六日今并書之尚書省言改立發運轉運提刑預妓樂宴㑹者徒二年法從之癸巳樞密院言今擬立法沿邉州縣鎮城堡寨興修工料闕少廂軍如係緊要處方得和雇禁軍仍奏聽朝㫖事干急速待報不及者和雇訖奏從之新無中書侍郎傅堯俞言臣今月二十二日面奏聖㫖令臣與宰臣等更商量河事密具奏聞臣與文彥博吕大防以下商量臣以才薄位輕不能回奪兼緣都堂議論體當婉順次第必不可改移今方大冬已役五萬餘夫兵工不在其數將來諸路調發人夫數十萬殫國財竭民力以就非急不可必成之役兼慮春中或遇雨雪寒凍不惟怨嗟潰散枉費物料錢糧亦恐傷害人命其數不少此陛下所深知臣不復具論今主議者云欲回河以緩北流之患而未嘗於北流略為堤備若將來河勢不肯東流不幸又加大水則北流之害豈可禦哉伏望聖慈或因寒雪或因他事批出指揮直罷回河司留孫村口凖備分減漲水便令檢計北流緊急堤岸疾速修完不致踈虞候三五年更看河勢然後别議則兩邉俱無所失上下安樂可以存全河北生靈變禍為福其利無窮在陛下神斷一言而已堯俞自注云十一月二十七日奏此九月二十八日傅堯俞初奏甲午尚書省言諸州軍奏案過限未報並令本處月申刑部及都省纍據諸州申狀催促刑法寺未斷奏案件數尤多慮淹延刑案緣本省舊専置房舉催後來併入催驅房與六曹文字滚同催促不得專一今來御史刑房專一主行委是繁簡均當更不須增添吏額請受其舉催條限約束並依舊催按房條例施行以御史催按刑房為名催按簿書依御史刑房法從之御史中丞梁燾言臣嘗論奏乞用祖宗三司𣙜貨務舊法通行商賈以廣國家財用之源猥䝉睿聰採納選官檢討行將半年未見有緒但聞以取索為名故淹時月有司官吏倦於翻閲文書一切以去失為報兩馳空言難期實效是欲以遷延迤邐為計無救弊立事之心也臣竊以方今財用之乏若不通行商旅以闢利源則必裒之於民今民力久困雖加誅求亦已窮竭矣不然則百端鐫削苛碎刻急上損國體下失人心傷惠害政不足為也臣竊為陛下思之幸有祖宗成法宜於世者不少茍得忠實仁明之吏講求而施行之則財貨蕃衍不勝其用矣伏望聖慈特賜指揮稍加督責庶得不致終廢其事以補今日之急貼黃臣所請謂取成書上之朝廷然後講議去取既已定議立法然後施行今但檢討文書已幾半年則施行之期漫不知其嵗月矣不究其慢必見廢弛伏乞聖慈指揮責以近限了當此事須賴朝廷主之乃可成就若但付所差官以行遣為名則無期可集伏望陛下面飭執政之臣以國用大計為先留心公共以救時敝燾言此不得其時先言在六月七日今因燾云將及半年附十一月末得㫖選官在六月十六日杭僧有淨源者舊居海濵與舶客交通牟利舶客至髙麗交譽之元豐末其王子義天來朝因往拜焉至是源死其徒竊其畫像附舶客往告義天亦使其徒夀介等附舶來祭祭訖乃言國母使以金塔二祝皇帝太皇太后夀知杭州蘇軾不納具言熙寧以來髙麗屢入貢至元豐末十六七年間館待賜豫之費不可勝數兩浙淮南京東三路築城造船建立亭館調發農工侵漁商賈所在騷然公私告病朝廷無絲毫之益而逺人獲不資之利使者所至圖畫山川購買書籍議者以為所得賜豫大半歸之契丹雖虛實不可明而契丹之强足以禍福髙麗若不隂相計搆則髙麗豈敢公然入朝中國有識之士以為深憂自二聖嗣位髙麗數年不至淮浙京東吏民有息肩之喜惟福建一路多以海商為業其間凶險之人猶敢交通引惹以希厚利臣稍聞其事方欲覺察行遣而夀介等實附泉州商人徐戬海舶至此且髙麗久不入貢失賜豫厚利意欲來朝久矣未測朝廷所以待之厚薄故因祭亡僧而行祝夀禮禮義渺薄抑亦可見若受而不答則逺人或以怨怒因而厚賜之正墮其計臣謂朝廷冝勿與知而使州郡却之然庸僧猾商擅招誘外國邀求厚利為國生事其漸不可長宜痛加懲創詔皆從之未幾髙麗使果至軾按舊例使之所至吳越七州實費二萬四千餘緡而民間之費不在此數乃令諸郡量事裁損比至民獲交易之利而無侵擾之害此據軾墓志仍節取軾奏狀稍增入之軾又言此疏乃十二月四日奏今附月末浙西七州軍冬春積水不種早稻及五六月水退方插晚秧又遭乾旱早晚俱損髙下共傷民之艱食無甚今嵗見今米斗九十足錢小民方冬已有饑者兩浙水鄉種麥絶少來嵗之熟指秋為期而熟不熟又未可知深恐來年春夏之交必有饑饉盜賊之憂鈐轄司除已與提轉商量多方擘畫凖備外有合申奏事件僅具畫一如左其一轉運司來年合發上供額斛及補填舊缺共一百六十餘萬石本路錢物大抵空匱剗刷變轉不行官吏急於趂辦務在免責催迫賦租督促缺負鉗束私酒漏稅之類必倍於平日饑貧之民無路逃死必將聚為盜賊又緣上供額斛數目至廣都未有備見今逐州廣行收糴指揮嚴緊官吏不免遮攔米榖添價貴糴以此斛斗湧貴小民乏食伏望聖慈愍此一方遭罹熙寧中饑疫人死大半至今城市寂寥少缺官私逋負十人而九若不痛加賑恤則一方餘民必在溝壑今來亦不敢望朝廷别賜錢米但只寬得轉運司上供年額錢斛則官吏自然不行迫急之政而民自受賜矣乞出自宸斷來年本路上供錢斛且起一半或三分之二其餘候豐熟自分作二年隨年額上供錢物起發所貴公私稍獲通濟又恐官吏為見明年既得寬減僥幸替移更不盡心擘畫收拾以備補填年額乞特賜指揮須管依年分收簇數足若遇移替具所收簇到數交割與後政承認不得出違年限其二見今逐州和糴常平斛斗及省倉軍糧又糴封樁錢上供米名目不一官吏各務趂辦爭奪相傾以此米價益貴伏望聖慈速賜勘㑹如在京諸倉不待此米支用即令提轉疾速契勘逐州如省倉不闕軍糧常平糴數有備外更不得收糴所貴米價稍平小民不至失所其三浙中自來號稱錢荒今者尤甚百姓持銀絹絲綿入市莫有顧者質庫人户往往晝閉若得官錢三二十萬散在民間如水救火欲乞指揮提轉今將合上供錢散在諸州稅户令買金銀紬絹充年額起發其四自來浙中姦民結為羣黨興販私鹽急則為盜近來朝廷痛減鹽價最為仁政然結集興販猶未甚衰深恐饑饉之民散流江海之上羣黨愈衆或為深患欲乞朝廷指揮應盜賊情理重及私鹽結聚羣黨皆許申鈐轄司權於法外行遣候豐熟日依舊所貴彈壓姦愚有所畏肅有詔許留上供米三之一詔許留上供米三之一此據軾墓志軾奏當刪取不必備載然亦可見當時事情故具存之軾五年二月十四日奏云䝉朝廷賜上供米二十萬石於本路出糴由是米不翔貴復得賜度牒百道易米以救饑者明年方春即減半價糶常平米民皆得免焉軾又作饘粥藥餌遣吏挾醫分方治病活者甚衆軾曰杭水陸之㑹因疫病死比他處常多軾乃裒集羡緡得二千復發私槖得金五十兩以作病坊稍蓄錢糧以待之名曰安樂崇寧初改賜名曰安濟云崇寧二年五月二十六日改杭州安樂坊名曰安濟是月宥州牒已指揮所委官臨時有可相近取直處令相照接連取直分畫政目有此當詳考
