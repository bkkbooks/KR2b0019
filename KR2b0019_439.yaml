body:
  text: 續資治通鑑長編卷四百三十五宋李燾撰哲宗元祐四年十一月丁卯朔戶部言諸州進貢之物不許附遞並令轉運司於順便州軍類聚計綱起發上京差人管押從之新無戊辰詔今後三省録事都事並依條揀試選人或取法官逐省各一員其初取外人仍合用銷減員闕取填政目云三省録事都事依條例試選人及法官逐省各一員詔文彥博乞致仕已斷來章如别有投進文字仍許收進己巳故陳州觀察使陳國公仲郃之嫡長子右武衛大將軍涪州刺史士關為陳國公庚午三省言舊制京朝官已上各分進士餘人自改為寄祿官後並一等改轉别無分别除朝議大夫以上置左右兩等改轉外承務郎以上至朝散朝請大夫欲依朝議大夫以上分左右兩等進士出身人加左字餘人加右字遷轉磨勘自依見行條制其所加字仍自寄祿官朝奉郎職事官監察御史以上並給黃牒餘職事官尚書省給劄子寄祿官吏部給牒從之舊録云神考以先王用人無流品之異故肇新官制寄祿官自京朝以上合為一體至是改之新録辨云記曰凡執技以事上者入鄉不與士齒今日用人無流品之異而合為一體非先王之道亦非神考之意今刪去三年二月六日癸未初令朝議大夫以上至金紫光祿大夫並分左右字四年十一月四日庚午又令承務郎以上至朝請大夫並分左右字紹聖二年四月三日戊辰除銀青光祿正議朝議中散大夫存左右字餘悉罷大觀二年六月二十七日丙午又改此制近時有陳淵者作楊龜山語録其中一節云因論寒士乍得官非不曉事便是妄作大抵科舉取人不得間有得者自是豪傑之士因科舉以進耳問李德裕言公卿大夫家子弟可用進士未必可用此論不偏否曰德裕為此論至今人以為偏當時人以德裕以資䕃進身不由科舉故為此論此最無謂以德裕之才應唐之科目極容易自是不為耳且資䕃得官與進士得官孰為優劣以進士為勝以資䕃為嫌者此自後世流俗之論至使人耻受其父祖之澤而甘心工無益之習以與孤寒之士角勝負於場屋僥幸一第以為榮是何見識夫應舉亦自寒士無祿不得已藉此進身耳如得已何用應舉范堯夫最有見識然亦以資䕃與進士分優劣建言於有無出身人銜位上帶左右字不可謂無所蔽也其言曰欲使公卿家子弟讀書耳此意甚善但以應舉得官者為讀書而加奬勸焉則彼讀書者應舉得官而止耳豈真學道之人至如韓持國自是經國之才用為執政亦了得不可以無出身便廢其執政之才曰堯夫所别異者莫非此等人否曰執政不是合下便做亦自小官以次遷之如後來吳坦求等在紹聖中被駮了博士以無出身故也彼自布衣中朝廷以其有學行賜之爵命謂其宜為博士乃復以無出身奪之此何理也資䕃進士中俱有人惟其人而用之加一右字亦自沮人為善按階官分帶左右字實録並不載是何人建議楊時乃繫之范純仁未審何據又按三年二月四日令朝議大夫以上帶左右字時純仁實同知樞密院不預三省事是年四月五日始拜右相四年十一月四日又令承務郎以上分帶左右字而純仁於六月四日已罷右相矣豈純仁嘗有此請既罷相乃行其言乎恐龜山語録要未可信也當更考詳兩朝史職官志載文臣京官至三師叙遷之制今附注此諸寺監主簿祕書省校書郎祕書郎正字太子正字有出身轉大理評事無出身轉太常寺奉禮郎內帶館職同有出身后族兩府之家轉太祝太常寺太祝奉禮郎有出身轉諸寺監丞無出身轉大理評事內帶館職同有出身大理評事有出身轉大理寺丞第一人及第轉著作佐郎無出身轉諸寺監丞內帶館職同有出身后族兩府之家審刑院詳議刑部詳覆詳斷檢法法直官轉光祿寺丞諸寺監丞有出身轉著作佐郎無出身轉大理寺丞內帶館職同有出身大理寺丞有出身轉殿中丞無出身轉太子中舍內帶館職同有出身或轉太子中允后族兩府之家審刑院詳議刑部詳覆詳斷中書堂後官轉太子右贊善大夫著作佐郎有出身轉祕書丞內第一人及第轉太常丞無出身轉太子左贊善大夫內帶館職同有出身特㫖轉祕書郎著作郎宗正寺丞太子左右贊善大夫中舍洗馬轉殿中丞內帶館職轉太常丞太子中允轉太常丞特㫖轉祕書郎著作郎宗正丞太常宗正祕書丞著作郎祕書郎轉太常博士特㫖轉左右正言監察御史宗正丞無出身轉國子博士殿中丞有出身轉太常博士無出身轉國子博士內帶館職同有出身太常國子博士轉後行貟外郎特㫖轉左右司諫殿中侍御史左右正言轉左右司諫帶待制以上職轉起居舍人監察御史轉殿中侍御史後行員外郎轉中行貟外郎特㫖轉起居舍人侍御史左右司諫轉起居郎起居舍人帶待制以上職轉吏部貟外郎殿中侍御史轉侍御史中行貟外郎轉前行貟外郎起居郎起居舍人轉兵部貟外郎帶待制以上職轉禮部郎中侍御史轉司封員外郎前行貟外郎轉後行郎中後行郎中轉中行郎中中行郎中轉前行郎中右常調轉郎中員外郎者轉右曹內有出身自屯田無出身自虞部贓罪叙復人自水部轉水部司門庫部虞部比部駕部屯田都官職方任發運轉運使副三司開封府判官侍讀侍講天章閣侍講崇政殿說書開封府推官府界提㸃三司司判官大理少卿提㸃刑獄提㸃鑄錢監諸王府翊善侍講記室中書提㸃五房公事堂後官轉左曹內有出身自祠部無出身自主客堂後官自膳部轉膳部倉部考功主客金部司勳祠部度支司封任發運轉運使副三司開封府判已上官左曹轉右名曹內有出身只轉祠部度支司封無出身合轉右名曹凖此任三司副使知雜修撰起居注直舍人院轉右名曹工部刑部兵部帶待制以上職左名曹轉右名曹仍隔一資超轉中行郎中轉左右司郎中户部轉左司刑部