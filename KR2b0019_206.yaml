body:
  text: 續資治通鑑長編巻二百二宋李燾撰英宗治平元年夏六月己亥進封皇子忠武節度使同平章事淮陽郡王頊為頴王仍令所司擇日備禮冊命増置宗室學官詔曰以宗支甚衆而誘𨗳之方未至故命近臣舉有學行之士為之教授傅不云乎少成若天性習慣如自然盖子弟之學非尊屬勉勵則莫知勸若不率教其令尊屬同以名白大宗正司教授不職大宗正司察舉以聞宗室自率府副率以上八百餘人其奉朝請者四百餘人而教學之官六員而已始命増置凡皇族年三十以上者百三十人置講書四員年十五以上者三百九人增置教授五員年十四以下者别置小學教授十二員并舊六員為二十七員以分教之上謂韓琦等曰凡事之行患於漸乆而怠廢况為學之道尤戒中止宗室之㓜者仍須本位尊長常加率勵庶不懈惰可召舍人諭此意作詔戒勉之故有是詔两朝正史從質傳云從質字子野少篤行為人修㓗嘗割股肉療其兄從謹疾已而自被疾廢朝請奉己儉薄歳時得禄賜博致珍異物獻御厨以萬計帝異之遣使問所欲對使者曰臣䝉國厚恩不幸嬰疾念無以將誠意故為此耳非有所覬也帝復遣使固問之乃曰陛下過疑臣有所覬必不得已願為臣諸位擇儒官教𨗳子弟使不隳忠孝足矣帝嗟異之為增教授員終左屯衛大將軍信州團練使宗室無少長哭之盡哀贈安州觀察使博陵侯按從質徳昭孫惟忠子卒於皇祐四年八月甲午實録有傳但載官爵遷除並不及他事不知正史何從得之割股已見天聖五年十二月庚寅獨請増教授員及從質建議今因治平元年增置宗室學官附從質傳當考癸卯貢院奏准皇祐四年詔娶宗室女補官者不得應舉按貢舉條制進納及工商雜類有竒才異行者亦聼取解今宗室壻皆三世食祿有人保任乃得充選比工商雜類納財受官流品為勝豈可以姻連皇族遂同贓私罪戾之人乞許其應舉以廣求賢之路從之贈仁宗昭儀俞氏貴儀翌日又改贈賢妃丙午宰臣韓琦等表請序位在頴王下詔答不允上既命增置宗室學官以謂宗室數倍於前而宗正司事亦滋多丁未復増置同知大宗正事一員以佐龍武衛大將軍寕州防禦使宗惠為懐州團練使領其職且降詔申警之宗惠允升子也上在藩邸凡宗室人材能否皆詳知之頗賢宗惠故擢用焉謝日告以選任之意宗惠乃即所居築堂曰聞義日與學士大夫講肄其間以身倡率宗屬两召對延和殿許條奏朝政由御藥院進入舊制大宗正司止領宗室事宗室女中人主之内外僕使𨽻管勾所宗惠請悉罷去總於宗正人以為便初宗室坐序爵仍自為賓主講官位主席之東隅於是睦親宅都講吳申不肯坐且曰宗室當以親族尊卑為序與講官分賓主再移書大宗正不能决因内朝出申二書上是之宗室正講席自申始申建安人也此事附見戊申詔大敕紫位皇子頊在冨弼上顥在宋庠下辛亥詔増邈川首領嘉勒斯賚年賜大綵百疋角茶二百斤散茶三百斤又增其妻子孫及親信穹廬官封月給茶綵等樞宻院言所管大使臣約一千一百餘員逐人脚色内舉主不少内除右職見有閤門班簿照㑹外其文臣两省官已下至京朝官𨽻御史䑓中書門下两省或審官院每身亡致仕分司犯黜降之人本院别無關防無由得見詔御史䑓中書門下省或審官院内有係本局所管官員仰今後毎有事故承受文字後限三日内供樞宻院其右職横行及諸司副使門祗候已上即閤門准此仍仰逐處今後有樞宻院帖子批問官員存亡事故限當日内批答赴院此據㑹要元年六月事今附見當刪取作睦親廣親北宅於芳林園初睦親宅宻州觀察使宗旦等五位廣親宅原州團練使克戒等二位言子孫衆多而所居狹隘遂命度故上清宫地為七位以宗旦等五位為睦親東宅克戒等二位為廣親東宅有司方營造而天章閣待制王獵建言取睦親四旁官私屋以廣两宅既遣户部副使張燾等按視而上以騷動居人頗多不許然上清所修七位無復餘地而皇族蕃衍恐後有當遷者命别擇地燾言芳林園中居宗室已多其地有餘可不擾民而足遂作宅於此園徙宗旦等七位而其後有求徙者又廣宅而徙焉克戒徳雍孫也宗旦已見至和二年六月知太原府陳升之言母老請揚湖越一州庶便奉飬上以邉臣當久任難於屢易不許㑹要六月十九日事乙卯上謂宰臣曰程戡如何人對曰戡在鄜延已三歳習邉事上曰延州都監髙遵教卒戡數言其能績乞加贈恤此髙瓊族子朕知其為庸人也戡必以后族故爾大臣茍若此朕何所賴焉丁巳詔歳賜皇子頴王公使錢三千貫顥二千貫頵一千五百貫戊午淮陽郡王府翊善王陶為頴王府翊善賜金紫淮陽郡王府記室參軍韓維為直集賢院諸王府記室參軍侍講孫思恭為直集賢院諸王府侍講初淮陽郡王將出閤以陶等為翊善記室侍講至是進封頴王而東陽郡王顥又將出閤故遷陶命兼翊善東陽而維思恭為两王記室侍講頴王性謙虛眷禮宫僚遇維尤厚每事諮訪維悉心以對至於起拜進止緩急皆陳其節一日侍王坐近侍以弓様鞋進維曰王安用舞靴王有媿色亟令毁去上始疾甚時出語頗傷太后太后泣告輔臣并咎两王維等極諫曰上已失太后歡心王盡孝恭以彌縫猶懼不逮不然父子俱受禍矣王感悟他日太后謂輔臣曰皇子近日殊有禮皆卿等善擇宫僚所致宜召至中書褒諭之曹佾之除使相也王欲使維等傳太后意於輔臣維及思恭不可王卒使陶言之維及思恭戒王曰陛下親總萬幾内外上下事體已正王當專心孝道均養三宫而已他勿有所預也曹佾除使相在五月丙辰維戒王事據司馬氏日記舞靴事據卲氏見聞録然日記語太察察今畧加刪潤又有王陶與史昭錫深交反議與任守忠用平狀為守忠所掎事當考先是司馬光及吕誨皆累奏乞寢罷两府遷官訖不從於是誨復奏曰臣聞韓琦等各已受新命臣不敢更有論列但取前降制詞之害義者以聞盖重朝廷法制而正論功之體事雖既往猶足補於將來區區之誠唯所省覽賜琦制云藩邸側㣲首議建儲之策宫車晚出復推定策之忠曾公亮則云公旦之輔成王子孟之立宣帝皆承統緒之正且無疾疹之憂富弼則云徃在至和之中嘗司冡宰之任屢陳計策請建國儲逮兹纂承出於緒論敢舉此一二而言之書曰虞舜側㣲為庶人故言側㣲陛下太宗之孫濮王之子仁宗之姪官為宿衛地居親近勢在崇髙入繼大統於體斯正豈側㣲之謂也昔豫鄂褒三王不夀先帝以陛下鞠育宫中盖知厯數之所在皇太后保䕶如所生焉此之恩意天下共知在至和中建議者甚衆迨嘉祐七年韓𤦺等成先帝之意固請遂正儲副之任於宗社誠為忠焉於陛下誠有力焉謂功逾周霍則近乎虛美周公大聖人固不當倫擬敢以霍光之事明之光事孝武三十餘年輔昭帝登極終其世儲嗣不立昌邑入繼既而昏亂立曽孫以代之是為宣帝光佐數世宣帝即位益光國封詔云宿衛忠正宣徳明恩守莭秉誼以安宗廟其褒嘉之語止是而已觀今之草制有若戯焉且如建儲定策始議之終立之皆自琦等則是大寳之位繫人臣之力於義可乎其如先帝之命何其如皇太后之恩何陛下紹徳尊親之道固若是乎成陛下之失者在此辭爾所以公議憤然不平數大臣者向時之議果邀今日之福臣非為陛下恡惜一官薄輔臣功業所惜者國體之重輕爾亦恐大臣不易當之貪天功以為己力得謂之安乎漢哀帝賞朱博之徒斯亂世之事可以為監而不可法也臣所以不願陛下賞韓琦等功正為是也事雖已徃伏望陛下記録於中不必顯明或異日轉官以輔翊之懃忠誼之莭褒之體斯得矣臣又聞近日抗章謂諫官不合論列臣料之不過以陛下即位方行爵賞遽此沮議不當允從果不計政令之得失賞罰之當否則諫臣之言罪不容誅矣臣竊思之陛下踐阼以來天下拭目傾耳有所待焉威福一行宜其怨懟因是而賈天下之怨以歸於上所謂近臣者忠耶佞耶㣲斯人之言陛下應不至深惑經云事君者將順其美匡救其惡案原書匡俱作正宋時避諱故也今並改臣所以向來不敢將順於陛下者迫公議之未允也臣豈不知拂戾人主罪在不測容悦輔臣身當有益愚而自守者知其職分也辛酉太常寺奏仁宗配享明堂奠帛用誠安之曲酌獻用徳安之曲絳州團練使嵐石隰州㳂邉都廵檢使楊遂乞比總管鈐轄舉所部使臣詔許嵗舉二人自今著為例駕部郎中路綸獻其父振所撰九國志五十巻詔以付史館振在真宗時知制誥所謂九國者吴楊行宻南唐李昪閩王潮漢劉崇南漢劉隐楚馬商西楚髙季興吴越錢鏐蜀王建孟祥也癸亥工部尚書集賢院學士余靖卒三司使蔡襄為靖言特贈刑部尚書諡曰襄秋七月庚午詔自今勿以孔氏子弟知仙源縣其襲封人如無親屬在鄉里令注近便官不得逺去家廟初京東提㸃刑獄王綱乞不以孔氏子弟知仙源縣所以重長民之官故有是詔丙子以邈川首領嘉勒斯賚子誠州團練使董戬為順州防禦使㑹要六月十七日詔嘉勒斯賚每年添大綵一百疋角茶二百斤散茶三百斤子董戬加防禦使每月添大綵三疋角茶五斤散茶十斤案斯賚添綵已見六月十六日辛亥而董戬加防禦使及今乃書之與㑹要異當考司馬光言臣累奏乞詔侍從近臣毎日輪一員直資善堂夜則宿於崇文院内備非時宣召亦曽面奉徳音云候秋凉當頻有宣召今已秋凉尚未聞有曽被召之人臣始者上言竊見陛下欣然開納将謂即時施行自後遷延日久聖意漸以為難臣竊意内外之臣必有欺惑天聽沮難此事欲陛下常居禁中不與羣下相接以壅蔽聰明專固權寵者此豈忠臣之所為而陛下之福邪臣願陛下深察此情斷自聖志使之更直陛下每日聼政餘暇宫中無事之時特賜召對與之從容講論古今治體民間情偽使各竭其胸臆所有而陛下更加采擇是者取之非者捨之忠者進之邪者黜之如此則下情盡逹聖徳日新矣若以資善堂體例稍生則學士待制於崇文院輪宿自有舊條只乞陛下傳宣崇文院今後直宿者並須從早在彼祗候宣召其有事故請假者須與以次官互換直宿此事極不難行而所益甚大惟陛下留意司馬光乞延訪羣臣第四劄子不得其時今附見七月末光言今已秋凉故也或移就九月初八月案此處原本誤脱日干詔自今大卿監未嘗任兩大省以上官因體量老病乃乞致仕者恩澤減舊之半丙辰宣政使入内都知安靜軍留後任守忠為保信莭度使蘄州安置初上為皇子令守忠宣召守忠避不肯行及上即位不豫遂交鬭兩宫間於是又擅取奉宸庫金珠數萬兩以獻皇后因受賞賜司馬光吕誨交章劾之誨言陛下即位之初内臣反側謂聖斷罔測中外憂之臣甞進言乞聖度容覆處置宜緩盖欲威令之行得其至當此區區之心也不意今日大姦尚存衆怨未平謗議益甚敢不以聞上達天聼所謂大姦者任守忠是也自昔遭遇先帝以俳優畜之天聖中勾當御藥院坐教坊使田敏公事配岳州章獻太后令内供奉全克隆就福昌寺杖守忠二十監送配所後因父文慶陳乞放逐便只於街市鬻販規利深結御藥江徳明遂援引再授髙品旁縁致身於此昨嘉祐中臣僚請立皇子先帝與太后屬意陛下日久守忠百端沮議幸在㓜君以要後福賴天意不移宰臣韓琦等力贊成之先是誣毁宗懿不孝乃其本謀也逮先帝晏駕太后主持神器大臣盡忠守忠何力之有陛下服藥經年守忠搆造語言交鬪兩宫唯幸慈孝有所不至暨迎先帝木主下禮院定太后出入儀式守忠堅欲用乾興之例非聖后賢明幾為守忠所誤今春揣知太后有罷同聼政之意掠功於已以奉陛下外臣自去冬以來但聞陛下孝養之闕今夏以後只聞太后慈愛之失騰謗之由又可明也然反覆語言離間宮禁者非一亦不出守忠朋黨衆所共知原其用情誠國之賊自先帝棄世守忠於宫禁公取財貨其數不貲近又取奉宸庫金珠數萬兩獻於中宫不唯自邀厚賜以固恩寵其實窺伺陛下將以諛言狡計乗間而入矣今内臣皆云本省差遣膏潤優便守忠専其餘利親舊孤寒者非貨賂交結無由得之仍云宫禁事無巨細皆出守忠不知有君父之命外臣聞之莫不痛心憤惋其惡萬狀不可勝陳竊恐養患日深勢轉難制伏望聖斷速正典刑并其朋黨擯斥則中外皆得安矣即位之初恐當作親政之初更考詳之光又數其十罪曰竊見守忠早以小臣獲事先帝幸䝉奨㧞榮禄俱極日侍左右不能以忠言正道補益萬分専以詼諧諂諛茍求悦媚其罪一也總領近侍委之差遣而凌忽同列與奪自恣附己則愛悦逆意則憎疾援引親黨排抑孤寒任情狥私畧無顧避其罪二也從來所受俸禄賞賜亦不為少而資性貪惏老而滋甚竊盗官物受納貨賂金帛珍玩溢於私家第宅産業甲於京師聚歛之心曾無紀極其罪三也交結朋援専權據勢縱逞胷臆妄行威福所愛者雖有大罪掩盖不言所惡者小有瑕疵紏擿成事使宫禁之内側足屏息畏憚守忠無以為比其罪四也濮王之薨守忠監䕶塟事賣弄國恩輕蔑皇族乗其有喪匄奪財物所得甚多終不滿意遂誣長子宗懿以為不孝使被譴謫感憤成疾以至沒身不能自雪其罪五也先帝以春秋寖髙未有繼嗣深思宗廟生靈之重屬意聖明固非一日而守忠隂蓄姦心沮壊大策忌國家立長立賢自欲於倉猝之際居中建議擁㓜弱昏懦之君以邀大利如唐之季定策國老門生天子賴先帝聰明卓然逺覽斷志不疑不然則太平之業幾墮於地其罪六也及陛下既為皇子守忠内懐憂懼日於先帝之前離間百端隔絶内外進對甚希使先帝為陛下之父不得施為父之恩陛下為先帝之子不得展為子之親其罪七也及先帝晏駕陛下纘繼不幸遇疾皇太后權聼政守忠乗此際大逞姦謀闚伺語言撰造事迹徃來革面進退異辭使皇太后以文母之慈不免投杼之疑陛下以曾閔之孝立有負恩之謗交鬪兩宫遂成深隙計其隂謀無所不至頼皇太后聰明確然執義不可傾移不然禍變之興豈可具道其罪八也及聖體既安皇太后恭還大政守忠不勸導陛下以勤修子道承順顔意報答盛徳恢廣令譽而相時隨勢計異炎凉欲詐輸新忠以巧遮舊惡用昔時䜛陛下之計為今日䜛皇太后之辭雖陛下未必聼受而使皇太后聞之不能不介意終日涕泣悒怏成疾守忠但欲左右反覆自為身謀並不顧天下之人議陛下之善惡其罪九也皇后正位尚新天下聳觀令徳守忠輙敢為皇后畫策並不禀聞皇太后傳教㫖開祖宗寳藏擅取金珠數萬兩以獻皇后既取悦一時又坐享厚賜逆婦姑之禮開驕侈之源使皇后受其惡名而已身收其重利為臣姦邪孰甚於此其罪十也守忠有大罪十皆陛下所親見衆人所共知其餘欺慢為姦恣横不法事類繁多不可勝言誠國之大賊人之巨蠧伏望陛下盡𤼵守忠之罪明示四方斬於都市以懲姦慝帝納其言翌日遂黜守忠文潞公私記治平元年八月諫官司馬光吕誨言入内都知任守忠交鬪宫闈光又疏其十罪乞斬之時富弼為樞相乞行諫官之言英宗命竄逐之弼與中書同奏事殿上宰相韓琦進曰陛下登極之時守忠亦預有勞願少寛之弼奮而前曰先帝親授陛下以大噐皇太后叶贊有功陛下宜追先帝顧復之恩報太后擁佑之力而此軰乃自云某人有功某人有勞臣不知此何等語且將置先帝與太后於何地耶上韙弼之言于是琦悚然失色却立數歩邵氏見聞録治平初英宗即位有疾宰執請光獻太后垂簾同聼有入内都知任守忠者姦邪反覆間謀兩宫時司馬温公知諫院呂諫議為侍御史凡十數章請誅之英宗雖未施行宰相韓魏公一日出空頭勅一道參政歐陽公已簽參政趙槩難之問歐陽公曰何如歐陽公曰第書之韓公必自有説魏公坐政事堂以頭子勾任守忠立廷下數之曰汝罪當死責蘄州團練使蘄州安置取空頭勅填之差使臣即日押行其意以謂少緩則中變也嗚呼魏公真宰相也歐陽云吾為魏公作畫錦堂記公垂紳正笏不動聲色措天下於泰山之安者盖以此按二書所載不同私記毁琦特甚見聞録譽琦又過當今並不取于案守忠之竄由于司馬氏之疏而𤦺實贊成之宋史光及守忠傳互有牴牾此書盡歸美于司馬氏亦未可盡信也丁巳以上供米三萬石賑宿亳州水災饑民司馬光言臣昨上殿陛下宣諭以内臣差遣並一切委之都知司臣即奏陳以為非便今入内都知任守忠恃此權勢背公立私奉之者坐獲進擢忤之者立致排擯威福之柄盡在其手使宫禁之中畏憚其人過於人主罪盈惡積幸賴陛下神斷已斥而去之然倘不收還威福之柄則是去一守忠生一守忠終無益也伏望陛下自今日已後除内臣常程差遣依舊令都知司定差外其勾當御藥院内東門龍圖天章閣後苑化成殿延福宫等處及非時差管勾裏外要切公事之人並乞陛下親加選擢試之以事觀其為人忠勤有功者則加賞㧞姦邪不職者則加貶退不必一一勘㑹資序檢尋體例如此則誰不懐徳畏威輸忠竭力豈獨内臣而已雖外朝之臣亦可用此道而治也見闕藥院四人亦乞陛下遵舊例於内供奉官以下自以聖意選擇忠信謹重可託腹心之人使之勾當光行狀亦言與呂誨同論誨無此疏今從光集掇附見司馬光言陛下即位之初奉事皇太后䖍恭欵至太后撫愛陛下恩渥周備數日之間慈孝之譽逹於中外播於逺近聞者無不相慶自聖體不安旬月之間道路之人漸有異議皆云因守忠等本不樂陛下為嗣故於皇太后則言陛下中宫之短於陛下與中宮則言皇太后之失遂使兩宫之心互相猜貳間隙一開猝難復合今陛下奮𤼵英斷屏絀䜛邪守忠等皆降逐出外中外之人不勝忭悦然臣愚竊恐皇太后尚未能盡知姦人之情與陛下所以斥去之意伏望陛下與中宮親詣皇太后閤頓首陳謝具述從來為守忠等所誤致有屢違忤太后之意今守忠等既去願與皇太后母子之恩一如舊日然後朝夕與中宫侍養左右膳羞藥餌躬親進獻承順顔色皆如臣庶之家母子婦姑之禮若左右之人尚有敢相離間者願陛下立行誅竄勿復有疑如此則䜛慝黜逺内外雍睦善氣興行災沴消亡宗廟永安令聞長世失此之際兩宮之歡不能復舊則恐長無可復之期豈惟當今天下之人以陛下為非將傳於史策取譏萬世矣此皆聖明所自知而臣復區區進言欲陛下深更留意爾初天聖七年置武舉皇祐元年詔罷之嘉祐八年樞宻院奏以為文武二選所闗治亂不可闕一與其任用不學無術之人臨時不知應變以撓師律不若素習韜畧頗嫻義訓之士緩急驅策可以折衝况今朝廷所用武人稍有聲稱者多由武舉而得則此舉不可廢罷明矣即詔兩制詳議所曾舉業及較試取人推恩之數兩制議請隨進士等科開設許在京管軍及正任横行使副使知雜及三院御史諫官府界提㸃朝臣使臣在外安撫轉運判官提㸃刑獄三路知軍州及路分總管鈐轄各奏舉一人試策及武藝優者與殿直次三班奉職借職殿侍三班差使策不中而武藝絶倫者取㫖學士賈黯又奏請如明經之制於太公韜畧孫吴司馬諸兵法及經史言兵事者設為問目以能用己意或引前人注釋辭明理暢及因所問自陳方畧可施行者為通詔從之而令每開舉則兵部至嵗終具所舉人名數以聞至明年三月命館職兩人與判兵部同試策一道命馬軍同試弓馬武藝具所試等籍送試官參校合格以名聞至八月則命官與判兵部同試策於秘閣命直學士以上及正任或横行使一人與軍頭司試弓馬武藝以所試等第籍送秘閣試官參合格者以名聞九月丁夘遂詔復置武舉按㑹要嘉祐八年十月八日宻院初建請治平元年三月二日王珪等上條件二十一日賈黯乞試韜畧四月九日詔六月十五日并八月十九日宻院奏皆武舉條件今依實録聨書之仍畧刪修使不相抵牾盖嘉祐八年始議治平元年九月議定乃降詔其降詔固縁宻院建請非治平元年九月方建請也初有詔以是日開邇英閣至重陽節當罷講呂公著司馬光言先帝時無事常開講筵近因聖體不安遂於端午及冬至以後盛暑盛寒之際權罷數月今陛下始初清明宜親近儒雅講求治術願不惜頃刻之間日御講筵從之丁丑禮院奏准畫日孟冬薦饗太廟改為祫祭按春秋閔公即位二十二月喪未除而行吉禘三傳譏之真宗以咸平二年六月喪除至十月乃祫祭仁宗天聖元年四月有司誤通天禧舊禘之數在再朞之内接行禘祭故四十二年之間九禘八祫例皆太速事失於始則嵗月相乗不可得而正矣今年未大祥未可祫明年未禫未可禘今年十月乞依舊時饗從之辛巳贈安逺軍節度使馬懐徳家請諡禮院奏懐徳已塟難定諡詔令更議復奏曰自古作諡皆在塟前唐開元三品以上将塟既啟殯告贈諡於柩前無贈者設啟奠即告諡既塟加諡出於唐時如顔杲卿盧奕皆盡忠王室當時置而不議至郭知運死五十餘年乃始請諡右司員外郎崔厦以為非旌善之禮而太常博士獨孤及謂新制禮死不必有諡又謂有故闕禮追逺請諡順也及長於開元之世親聞啟奠告諡而謂所制不必有諡豈非誣哉又有故闕禮追逺請諡皆違禮經何順之有國家給諡一用唐令然請諡之家例供尚書省官酒食撰議官又當有贈遺故或闕而不請景祐四年判都省宋綬建議令官給酒食其後又罷潤筆自此既塟而請諡者甚衆嵗月寖久官閥行迹士大夫所不能知子孫與其門生故吏志在虛美隱惡而有司據以加諡是廢周公聖人之法而徇唐庸有司之議詔自今得諡者塟前奏請或其家不請則尚書太常合議定諡前塟牒史館及以付其家即狥私諡不以實論如選舉不以實法既塟請諡者更不定諡臣等謂宜如舊從之翰林學士劉敞以疾告滿百日求便郡上謂執政曰如劉敞豈易得也復賜告每燕見諸學士問敞疾少間否賜以新橙慰撫甚厚癸未命敞知衛州未行改汝州三司言敞再得告例不當給俸詔令特給戊子詔免龍圖閣直學士兼侍讀李柬之進讀以其自陳有疾求致仕也帝謂柬之曰卿耆儒通識期於咨訪以輔不逮豈止經術而已先是帝亟欲肅正宫省柬之諫曰陛下長君也立自齊邸人方觀望願曲為容覆嘗令押賜頴王生日禮物故事王拜賜接坐退王入謝帝欲其從容敇母即謝留柬之食翌日見帝具道王英睿仁厚社稷之福也帝甚悦二事附見當考先是夏國賀登極進奉人呉宗等至順天門欲佩魚及以儀物自從引伴髙宜禁之不可留止厩置一夕絶供饋宗出不遜語宜折之如故事良久乃聼入及賜食殿門愬於押伴張覲詔令還赴延州與宜辨宜者延州所遣也程戡授詔通判詰之宗曰引伴謂當用一百萬兵遂入賀蘭穴此何等語也通判曰聞使人目國主為少帝引伴有此對是失在使人不在引伴宗沮服遂不復辨庚午賜諒祚詔戒以自今宜精擇使人毋俾生事司馬光吕誨乞加宜罪不報是秋夏國主諒祚數出兵㓂秦鳯涇原路熟戸擾邉寨弓箭手殺掠人畜以萬計詔遣文思副使王無忌齎詔詰問司馬光言聞周書稱文王之徳曰大邦畏其力小邦懐其徳盖言諸侯傲狠不賔則誅討之順從柔服則保全之不避強不凌弱此王者所以為政於天下也臣伏見去嵗先帝登遐趙諒祚遣使者來致祭延州差指使髙宜押伴入京宜言語輕肆傲其使者侮其國主使者臨辭自訴於朝臣當時與吕誨上言乞加宜罪朝廷忽略此事不以為意使其怨懟歸國一國之人皆以為恥今嵗以來諒祚招亡命㸃集兵馬窺伺邉境攻圍堡寨驅脅熟户八十餘族殺掠弓箭手約數千人悖逆如此而朝廷乃更遣使臣齎詔撫諭彼順從則侮之傲狠則畏之無乃非文王所以令諸侯乎若使臣至彼諒祚稽首服罪禁止侵掠猶或可赦若復拒違王命辭禮驕慢侵掠不已未知朝廷將何以待之傷威毁重孰甚於此方今公私困竭士卒驕惰將帥乏人而諒祚犯邉事之可憂孰大於此而朝廷上下晏然若無事者其故何哉豈朝廷自有其備而疎外之臣不得與知乎臣竊惑之所謂備者非但添屯軍馬積貯糧草而已也在於擇將帥而修軍政也二者皆闕何謂有備臣不勝憤懣伏望博延羣臣訪以禦邉之策擇其善者而力行之方今救邉之急宜若捧漏甕沃焦釡猶恐不及豈可外示閑暇而養成大患也
