body:
  text: 續資治通鑑長編卷二百四十九宋李燾撰神宗熙寧七年春正月己亥朔不受朝詔諸州自來不造酒處許以公使錢造每百貫造十石額外造者以違制論見㑹要七年正月一日頒諸班直禁軍名額㑹要具載名額資次或並附此癸卯定教閲諸軍其創教戰法委主將度地之形隨宜施行甲辰將作監主簿書寫熙河路經略司機宜文字王夏為大理寺丞賜緋章服夏管押蕃部都首領轄烏察等及齎賀表至闕上特引對故有是命乙巳詔諸路應災傷至甚州軍合發春夫委轉運司相度減免以聞丁未司農寺言諸路義勇保甲令逐州管勾常平官兼管勾㸃檢從之詔知欣州蕭士元祕書丞呂大忠與北界差來人議定岢嵐軍地界上批北使耶律洞在館屢生事可令曾孝寬等具析移文誡敕之於是備録館伴所文字下雄州移牒涿州蕭士元六年二月一日罰銅時任太原代州都監耶律洞乃賀正旦使去年十二月實録三本並脫此假已追書訖庚戌永興秦鳳路察訪李承之言中書下楊蟠奏諸縣並無百姓經察訪司陳訴用稅敷錢不等臣初入境見百姓經提㸃刑獄司陳狀者千八百餘人即申司農寺近再過華州又有鄭縣百姓七百餘人赴本司陳訴皆蟠詐妄不實詔永興軍路安撫司關送推勘院蟠初以同管勾陜西制置解鹽兼常平等事擢永興軍等路轉運判官五年十一月蟠權運判承之出使即按蟠不法詔罷蟠轉運判官令安撫司鞫其事蟠數自辨王安石又主之竟免它責蟠被按及罷不得其詳承之本傳云蟠倚勢不法所謂勢則指安石也六年十二月二十六日録安石云昨楊蟠不待劾而罷則其罷運判當在六年冬今附見朱史削去此假簽貼云只開送制院别無施行蓋蟠卒免重責耳當考日録六年九月初五日二十三日十一月初一日初七日十二月初九日二十二日七年正月二十八日二月九日凡八處目録皆有楊蟠事判軍器監呂惠卿等上裁定中外所獻槍刀樣詔送殿前馬步軍司定奪又上編成弓式初在京及諸路造軍器多雜惡河北尤甚至是所製兵械皆精利其後遂詔齎新造軍器付諸路作院為式遣官分諭之已而惠卿言朝廷必以武人習用器械故謀及殿前馬步軍司然臣體問得逐司每凖朝㫖送下定奪事件只是取責軍校文狀聞奏非獨務持舊說不肯改更又其智慮未必能知作器之意故凡外人所陳非己出者少肯言是朝廷亦未嘗考其說之當否遂從而寢荀卿以謂工精於器而不可以為工師有人也不能此技可使治其官惟精於道者為然今陛下置監以除戎器不屬之介胄之武夫斧斤之巧匠而使臣等領其事則豈以臣嘗能此技而使之乎殆將以其薄燭道理而可使治其官者也而臣辭不獲命遂受其職茍或自度不足以畢事則亦豈敢故其器械必盡觀中外之所藏其法度必盡考古今之所說其制作必究良匠之所編其施用必問邉臣之所以試而臣之愚慮亦以為可然後上聞而朝廷乃下此屬議之如聞前所定弓箭等習用故態亦只聚集軍校曹司共執舊說未知實否今軍器式樣又從本監齎送往逐司定奪則是使臣等營之而其是否乃取决於此屬也非獨謀及之而已臣以從官預典監事於陛下則為論思謀畫之臣朝廷一日有四方之事若幸得使令於前當使此屬奔走以聼事今乃以其悉心并智之所為而使之議可否於今日之間臣固不敢自愛深恐武夫健卒輩有以窺朝廷之心膂其智慮乃決於我也以理言之竊恐為倒蓋此屬既多出於行伍則其底裏淺深其下之所熟知也而臣等雖不肖然上托陛下名器寵任之故猶宜見懾今又使有以窺之則不特於朝廷之體為輕而非所以崇堂陛之勢而陛下經營四方又未能舍文臣而用此屬則其名分之定豈可無素雖政事之臣不慮及此而陛下豈不自愛國體也臣以朝廷已行之命不敢言改乞從本監奏乞就一司同議上由是遣管軍郝質赴監定奪皆以為便而施行焉此據惠卿家傳增入九年四月二日當考五月十七日衛端之得罪惠卿家𫝊乃以遣郝質詣監在端之得罪後當考詔諸軍十將以下至長行遇有功及呈試武藝當轉資不願轉者每一資有功人賜絹十五匹呈試人十匹辛亥賞收復洮岷等州功西京左藏庫使桑湜等八人各遷三資蕃官李楞占訥芝溫裕勒等十一人各遷兩資蕃僧馬遵九人給奉職至指揮使俸餘補下班殿侍至承局及減年磨勘支賜各有差既而湜獨辭所遷官曰羌虜畏國威靈不戰而降臣何功而遷官執政曰衆人皆受獨君不受何也湜對曰衆人皆受必有功也湜自知無功故不受卒辭之時人重其知恥湜懌子也司馬記聞云王韶開熙河諸將皆遷官皇城使知原州桑湜獨不受今附其事於此湜知原州及為皇城使未見除用月日當考司農寺請下廣西安撫司依涇原等五路置常平倉從之詔兩浙察訪轉運提㸃刑獄提舉司同相度第五等户所出役錢至少今若減放以寬剩錢補充如支用得足即盡蠲之其以家産或以稅錢均出而不分等處即截自若干貫百以下放免以聞舒亶傳衆輕易舉當考已附五年八月二十五日四年四月二日五月十六日又十月九日去年十二月陳樞云云當考乙卯皇第三子俊為彰信軍節度使永國公丙辰龍圖閣直學士同提舉在京諸司庫務兼同判太常寺張燾知河中府尋改鄧州當是緣劉季孫去年三月辛酉所言詔自今諸州具屬縣旬申雨雪尺寸上提㸃刑獄司本司類聚上司農寺類聚月奏有稽違者糾之先是雨雪狀諸州徑奏朝廷以為繁故改法令司農寺編排繳進而司農亦以為疲於省覽又從其請而降是詔河東經略都轉運司言同相度乞罷創置吳堡其寧星和市依舊開通從之丁巳詔河北西路兩地供輸户舊有弓箭社强壯義勇之類並存留外更不編排保甲去年十二月二十六日又詔荆湖路察訪章惇具建懿州四至地里所管户口置官屯兵次第以聞時惇言南江州峒悉已平定請建州縣城寨故也四月十九日建沅州知大名府韓絳言本路安撫司纍歲封樁紬絹或致陳腐乞下轉運司用新紬絹或錢銀對易或依市易法令民户入抵出息其餘經略安撫司封樁物亦乞依此從之己未永興秦鳳等路察訪李承之言通逺軍渭水所出即古渭州鎮戎軍本髙平郡即古原州蓋昔以陷沒故取州名建於他郡民間呼今原州為底原州呼鎮戎軍為故原州蓋不忘本也今疆土如舊理宜改正欲乞以原渭州名還賜鎮戎通逺軍其二州别賜名額不報庚申詔勒停人趙用叙左藏庫副使增差懷州都監用嘗為雄霸界河巡檢有威名北人謂之趙虎頭者也以過停廢至是稍收叙之以旌其才用廢在五年閏七月庚申福建路轉運司言漳州漳浦縣瀕海接潮州山有羣象為民患乞依捕虎賞格許人捕殺賣牙入官從之辛酉熙河路安撫司乞撥地二千頃籍所入為公用從之詔河北東路義勇保甲令農隙以前編排了畢賜兩路錢各十五萬緡京東路察訪鄧潤甫等言山東沿海州郡地廣一遇豐歲則榖價甚賤可於沿邊州郡瀕海之地募人為海運則山東之粟可轉之河朔以助軍食詔京東河北路轉運司相度以聞訖無施行者詔已差李憲熙河路經略安撫司勾當公事可續差兼秦鳳路經略安撫司勾當公事日録二月二十三日有論議今附見本日壬戌遣禮賔使文州刺史帶御器械王中正詣熙河路以土田募弓箭手若地有餘即召人承佃其措置事及所當用錢並令經略司應副所募人毋拘路分逺近不依常格差官召募仍親提舉所至别路州軍當用錢物並於轉運司借三司撥還賜知鳳翔府蘇宷知隴州狄詠奬諭敕書仍各賜絹百匹前通判秦州陳紘今任知開封縣滿除三司開封府推判官通判熙州劉宗傑除秦鳳路轉運判官寀等並以熙河路經略使王韶言應副軍須有勞也宗傑通判熙州實録闕熙州兩字二月一日自熙州通判除泰鳳運判今增入永興秦鳳等路察訪李承之言慶厯皇祐中秦州以鹽鈔川交子令民間變賣至今尚負錢萬餘緡乞特蠲放以寬邊民從之癸亥遣三司勾當公事李杞相度成都府置市易務利害先已遣蒲宗閔沈逵今復遣把其後上與輔臣論及市易馮京曰曩時西川因榷買物致王小波之亂故今頗以市易為言臣檢實録實有此說王安石曰王小波自以饑民衆不為官司所恤遂相聚為盜而史官乃歸咎搬取蜀物上供多而致然不知搬取孟氏府庫物以上供於饑民有何利害上曰李把行未安石曰未也然願陛下勿疑臣保市易必不能致蜀人為變也馮京云云見日録二月二十三日朱史乃附見去年十二月二十四日誤也三月十六日云云四月五日罷相度詔諸州縣常平農田水利差役並分為兩案吏人不以次選差每案三人縣毋過二人月給食錢毋過七千州毋過十千若因事取財依轉運提㸃刑獄等司法從司農寺請也詔開封府界呈試保甲免本身夫役甲子梓州路察訪常平等事兼經制夷事熊本言自十一月己卯親將蜀兵東兵募土丁凡五千人入夷界捕殺水路大小四十六村蕩平其地納銅鼓槍牌乞降者因即撫定之及於所得地內小溪口寧逺寨西置二寨三壕面荔枝激等處置卓望四堡平治險隘開修道路建置橋閣里堠悉已周備并晏州柯隂縣夷嘗助水路夷抗官軍亦行討伐即至軍前設誓永不犯省地凡得夷所獻地二百四十里已募人墾耕其屬夷悉已聯為保甲臣與轉運使陳忱提㸃刑獄范百祿於今月辛酉全所將軍馬次江安縣見遣兵分屯及差次軍前功狀續具以聞十一月乙卯十六日也今月辛酉七年正月二十三日也按熊本集淯井享士題名本以六年五月自東府掾視瀘南夷事七年正月一日自江安次寧逺二月二十日戊子同陳忱范百祿至淯廾享士其稱今月辛酉是二十三日無疑但不應二十六日便奏到恐實録誤編入此姑從之先是提舉河北路常平等事韓宗師劾程昉導滹沱河水淤田而堤壞水溢廣害民稼欺罔十六罪詔程昉分析河渠志宗師言昉十六罪在六年十二月於是進呈讀至宗師言昉奏稱百姓乞淤田臣勘㑹百姓元不曾乞淤田昉分析據差去檢踏官取到逐縣乞淤田狀但不曾户户取狀上曰亦無人户狀王安石曰淤田得差去官及逐縣官吏狀足矣何用户户取狀程昉奏乞淤田既無狀即難明虛實然為朝廷宣力淤田至四千餘頃假令奏狀稱人户乞淤田一句不實亦無可罪之理陛下於讒慝小人尚能容覆如何為國宣力之人乃不録其功惟求其一言半句之差便以為罪上曰若果淤田有實利即小小差失豈可加罪但不知淤田如何耳安石曰程昉淤田既為韓宗師所奏故令程昉差一官又令京東轉運司差一官同檢量定驗韓宗師乃不依常法差一獨員監當官往定驗決無庇蓋程昉之理今檢定到出却好田一萬頃又淤却四千餘頃好田陛下猶以為不知淤田如何臣實不審陛下所謂上言昉昨修漳河聞漳河歲歲決修滹沱河又却無下尾安石曰修漳河出却三縣民田百姓羣至京師經待漏院出頭謝朝廷差到程昉開河除去百姓三二十年災害林希野史云原武等縣民因淤田浸壞廬舍墳墓又妨秋種相率詣闕訴使者聞之急責其令追呼將杖之民即繆云詣闕謝耳使者因代為百姓謝淤田表遣吏詣鼓院投之狀有二百餘名但二吏來投之安石大喜上亦不知其妄也今附注此當考六年九月丙辰賜侯叔獻等田可并考本議漳河西岸去山不逺更不築堤既不築堤即水大自須抹岸勘㑹纍歲抹岸才侵著五十頃地其間却有鹵地因淤更生良田又假令年年壞却五十頃地即計三縣所出利害多少亦不宜謂之有罪而無功如滹沱河為事干塘泊故與密院議初未嘗言不可興修既已興功至於放水乃言滹沱河不合入塘泊臣以為滹沱河舊入邊吳淀亦是塘泊新入洪城淀亦是塘泊若俱是塘泊即淤却上泊與下泊不知有何利害之異譬如作城缺却南邊與缺却北邊有何利害之異此自是密院議論如此豈是從初失相度不留下尾陛下平居納姦人譛訴故為陛下盡力者常求其罪如不及至於姦人情狀殊未省察如中書密院行遣自來即無中書劄子為頭却是密院收接行遣如程昉事即密院兩次收中書劄子所施行事一面進呈行遣計此事不容吏人都不知自來行遣事體緣欲宣言陛下甚怒程昉欲令小人迎合聖意不留中書劄子於密院行遣即無以為驗羣小如此情狀陛下曾不省察乃患人情難知臣恐陛下所為如此即人情終無可知之理如言漳河年年決壞為有害無利宜有其人陛下平居納受其譛又不考驗乃常含怒開河之人惟其無罪而已即有犯比餘人必百倍見困不知如此欲令何人肯與朝廷宣力於是請案實開漳河事上許之又逐條讀程昉分析上曰若韓宗師所言果不實朝廷何惜行遣令轉運司考按其事韓宗師提舉河北常平既有㫖下京東轉運司及程昉各差官檢定淤田宗師固未嘗兼亰東轉運司不知何故却自差官蓋宗師只從河北常平司差官檢定河北淤田初不問亰東轉運司及程昉又差獨員監當官故王安石以為違法也十月十二日丙子程昉遷官可考沈括筆談云瓦橋關北與遼人為鄰素無關河為阻往嵗六宅使何承矩守瓦橋始議因陂澤之地瀦水為塞欲自相視恐其謀泄日㑹僚佐泛船置酒賞蓼花作詩數十篇令坐客屬和畫以為圖𫝊至亰師人初莫諭其意自此始壅諸淀慶厯中內侍楊懷敏復踵為之至熙寧中又開徐村栁莊等諸濼皆以徐鮑唐沙等河呌猴雞距五眼等泉為之原東合滹沱漳其易淶等水下并大河于是自凉州西北沉逺濼東盡滄州泥沽海口幾八百里悉為瀦深濶有及六十里者至今倚為藩籬或謂侵蝕民田嵗失邊粟之入此殊不然深冀滄瀛間惟大河滹沱漳水所淤方為美田淤澱不至處悉是斥鹵不可種蓻異日惟是聚集遊民刮鹹煮鹽禁時為冦盜自為瀦濼姦鹽遂少而魚蟹菰葦之利人亦賴之括筆談或附和王安石說今附注此待考八年閏四月十四日王安石云程昉與韓宗師同放罪可考程昉尋奏滄州增修西流河堤引黃河水淤田種稻添灌塘泊并深州開引滹沱河水淤田及開回胡盧河并回滹沱河下尾此據本志附安石請按實開漳河事下乙丑髙麗國進奉使金良鑑副使盧旦見于垂拱殿翰林學士曾布知制誥呂惠卿為河北東西路察訪使布西路惠卿東路知岷州髙遵裕乞給錢三萬緡令逐族蕃官首領互相保識借請青苖候來年豐熟日為一料送納從之廣西經略司言雍州右江溪峒田州填乃等峒産金可置場冶乞就差知雍州宣化縣鄧闢監金場從之都水監請權停修白溝河移夫浚自盟河從之初詔白溝河置閘行運分三年修而同判都水監侯叔獻以為差夫日逼又見被命提舉汴河隄岸打凌未可即往白溝因言自盟河係疏泄汴河以南民田積水最為大川近歲失於浚導水嘗為患乞輟白溝夫修之故有是詔先是王安石白上欲且罷白溝修汴南水利上曰人多以為白溝不可為而獨見可為若遂修成甚善安石曰果不可為况未曾費用功力罷之誠宜若可為即俟時為之何必計校人言也安石白上據日録十二月二十一日事今附此初治白溝河在六年五月十二日又八月十六日又十月十九日至此罷十月十九日事附八月十六日本志云都水言自盟河畎導汴南諸水近者失於疏浚為害甚大於是移夫修治而白溝之役廢丙寅詔自今修起居注直舍人院並綴兩省班初御史臺言起居日兩省班闕官乞令待制為給諌者除權三司使外及直舍人院同知諌院修起居注遇起居日權於左右兩省班叙立候正官員多仍舊從之至是中書言兩省員數稍多乃降是詔而同知諌院不預焉賜江寧府常平米五萬石修水利兩浙察訪沈括言常州無錫縣逃絶詭名挾佃約五千餘户及蘇州長洲縣户長賠納稅有至二百餘緡已選官詣逐州根究及慮人户隱蔽已出榜召人告首州縣官吏能悉心究見欺弊許令改正更不問罪其隱陷稅苖課利人限兩月自陳特免追毁從之丁卯詔諸漢蕃義軍義兒私易賣官印馬徒一年老病者即呈驗印退字許賣即不申官各減私易罪五等上與王安石議陜西諸路置帥欲用蔡延慶為環慶或涇原安石論其不可上問孰可者安石以章惇對其次趙子幾有大略上曰惇似可子幾粗疏又問李承之何如安石言承之曉吏文使為都檢正或可若作帥即不通物情上曰承之察訪陜西亦通物情但與楊蟠異論爾安石曰陛下問臣可作帥與否臣不敢不以實對不為其與楊蟠異論也
