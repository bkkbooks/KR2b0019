body:
  text: 續資治通鑑長編卷五百二十宋李燾撰哲宗元符三年春正月戊辰朔不受朝己巳故蕃官皇城使果州防禦使李楞占訥芝贈客省使皇城使賀州刺史李世恭贈引進使雄州防禦使西京左藏庫副使烏當供備庫副使包明魏釗並贈客省使內殿承制王吉贈皇城副使李世恭子良嗣為左班殿直並以青唐死事故也魏釗子孫恩澤在四月二十五日皇城使昌州刺史种朴特贈雄州防禦使母封永嘉郡太君録其後十資贈恤加等种朴傳當别修實録即於二年十月二十一日朴戰殁時立朴傳殊草略辛未詔以服藥不視事三日自五日為始今月五日紫宸殿宴遼國使副可罷仍就驛賜宴六日遼國使副辭於門外壬申太常寺言景靈宫大定殿將畢工依例奉安神御詔奉安使行禮車駕及皇太后太妃皇后更不親詣癸酉禮部言近以天下解發并免解舉人有不到京者嘗申請納卷引保各展限十日今將限滿尚有千餘人未到聞遠方舉人正值雪寒道路艱阻乞特展限鎖院五日其未鎖院以前並許納卷引保從之仍特展七日新無乙亥詔十一十二日不視事景靈宫朝獻尚書左僕射章惇等分詣行禮吏部言都大并河掃使臣兵士及修河物料雖許不拘常制抽差取射者並聽本監與轉運外丞司執奏占留從之丙子宰臣執政官入內東門問聖體丁丑景靈宫大定殿奉安太宗皇帝御容三省樞密院詣內東門問聖體至申時入對於福寧殿上著帽背坐御座神色安愈諭惇等曰醫者云胃脈未生飲食不進外事更處置惇等曰已禱宗廟社稷今更於文德殿設醮祈請是夕三省樞密院俱宿禁中戊寅三省樞密院詣內東門入問聖體上坐榻上神采光澤如常曰服丹砂數粒脈猶未生不冠勿怪惇等擬例肆赦上可之遂大赦天下應合牽復敘用量移移放人並依赦格疾速檢舉施行曾布日録十二日早聚因言昨日已肆赦及添入敘用牽復量移等當須奉行因又言布嘗於上前云編敕刺配法中亦分廣南及逺惡處為兩等今在逺惡處者縱未可徙內地且移廣南一善郡亦稍慰人心公等不可不以此奉行衆皆許肯章惇云子開致逺等皆當復職十一日宣赦畢赴內東門布云赦文中不曾及責降編管安置人等如何惇及許將皆云自有赦格布云外人安知赦格上服藥如此欲以召歡聲和氣何須更爾閉藏惇云非閉藏要添入即添遂貼麻添入應合牽復敘用量移移放人等並疾速檢舉施行罷宣德門觀燈布録十一日合添入樞密院言湟州王厚保明蕃酋婁并小首領斯多展等與多勒瓦人會戰奪還所虜漢人户及生擒蕃賊獲馬旗等乞優與推恩詔婁與東頭供奉官差充本族都巡檢斯多展䇿凌結多壘凌結嶽居戩並與三班借職仍各賜銀帛有差樞密院言朗阿克章元係河州蕃官纍立戰功兼昨收復邈川等處有功未賞本無背漢之心止因前經略使措置乖方致令逃背已令河州存恤其家及溪巴烏多勒瓦雖曾拒官軍久未出漢亦已纍行招誘詔令胡宗回謄寫蕃字選差人齎付曉諭若能翻然改圖歸順依前降指揮除授官職朗阿克章當議并未賞功績優與遷補多勒瓦亦當優補名目青唐録全録此己卯上崩於福寧殿夀二十有五王稱東都事略云殯於殿之西階夜漏未盡宰臣執政會門下省黎明詣內東門宣召入會通門至福寧殿皇太后坐殿東垂簾宰臣執政至簾前皇太后哭諭宰相章惇等惇等皆哭皇太后曰邦家不幸大行皇帝無子天下事須早定惇厲聲曰在禮律當立同母弟簡王皇太后曰神宗皇帝諸子申王雖長緣有目疾次即端王當立惇又曰論長幼之序則申王為長論禮律則同母之弟簡王當立皇太后曰俱是神宗之子豈容如此分别於次端王當立兼先帝嘗言端王有福夀又仁孝不同諸王據曾布日録先帝謂哲宗也舊録誤以為神宗今改之於是知樞密院事曾布曰章惇未嘗與衆商量皇太后聖諭極當尚書左丞蔡卞曰當依聖旨中書侍郎許將亦曰合依聖旨惇默然既承命退至階前都知梁從政等白召五王問疾章惇曰且召五王來看諸王尋至內東門是日端王偶在假皇太后再遣中使召王且戒使者若王復辭即扶持上馬以來俄頃王至獨召入於福寧殿東起居訖升殿惇等從至寢閣簾前皇太后諭曰先帝無子端王當立王對曰申王兄也固辭久之皇太后曰申王有疾王次當立王不須辭王又辭再三太后再三宣諭惇等進曰天命所屬大王當上為宗廟社稷大計不當辭徽宗乃即皇帝位宰臣等稱賀畢召翰林學士承旨蔡京於內東門幕次草遺制進入久之上命中使宣輔臣面諭請皇太后權同處分軍國事皆奏曰陛下聖德謙挹如此不知皇太后聖意如何上曰適懇請已許及遺制未下可添入遂詣簾前具陳上旨皇太后曰為皇帝再三懇請然皇帝年長聰明不須更如此輔臣皆曰願為國大計勉從皇帝所請乃呼閣門御史臺追班宣遺制宰臣再升殿奠茶酒訖移班詣東序賀皇帝即位又奉慰訖宰臣親王嗣王執政皆升殿號泣上慟哭久之又慰皇太后於簾前復位哭乃出舊録云己卯上崩於福寧殿夀二十有五是日宰臣執政黎明詣內東門宣召入會通門至福寧殿皇太后坐殿東垂簾宰臣執政至簾前皇太后哭諭章惇等以大行皇帝升遐惇等皆哭皇太后諭曰邦國不幸大行皇帝久望有子今却無子天下事須早定宰臣章惇厲聲曰在禮律當立同母弟簡王皇太后曰須立端王神宗皇帝諸子申王雖是長緣有目疾次即端王當立惇又曰論長幼之序則申王為長論禮律則同母之弟簡王當立皇太后曰俱是神宗之子莫難如此分别於次端王當立於是知樞密院曾布曰章惇未嘗與衆商量皇太后聖諭極當尚書左丞蔡卞曰皇太后為宗廟社稷大計誠是當依聖旨中書侍郎許將曰合依聖旨皇太后又曰神宗嘗有聖語云端王有福夀又仁孝不同諸王於是惇等承命退至階前都知梁從政等白召五王問疾章惇曰且召五王來看卞斥惇曰太后聖旨已定更有何擬議於是諭從政等召諸王皆至內東門唯端王得入會今上是日在假皇太后再遣中使召今上至福寧殿東起居訖升殿惇等從至寢閣簾前皇太后諭今上曰先帝無子端王當立今上曰申王兄也固辭久之皇太后曰申王有疾次當立不須辭今上又辭再三太后再三宣諭惇等進曰天命屬大王當上為宗廟社稷大計不當辭今上即皇帝位宰臣等稱賀畢召翰林學士蔡京於內東門幕次草遺制進入久之今上命中使宣輔臣靣諭請皇太后權同處分軍國事皆奏曰陛下聖德謙挹如此不知皇太后聖意如何今上曰適懇請已許及遺制未下可添入遂詣簾前具陳上旨皇太后曰為皇帝再三懇請然皇帝年長聰明不須更如此輔臣皆曰願為國大計勉從皇帝所請時所命中使吳靖方謂蔡京曰元祐禍亂前事未逺豈可更為且長君不當如此京以語輔臣而惇等不果諫乃呼閣門御史臺追班宣遺制新録辨曰自時所命中使至惇等不果諫四十二字豈有新帝即位初出命令而中官與翰林學士毁讟如此不可以訓今盡刪去舊録云哲宗皇帝十嵗即位上則太母稱制外則姦臣迷國內則阿保臨察虛路寢而居崇慶殿東數楹語默作止必以聞棄逐股肱耳目左右護衛之臣悉用先帝所仇天下寒心帝蒙飬沉潛足不踰閫見無禮者漠然若無見問則不答蓋不言九年及親政睿智濬發追保佑之功永懷而不忘悼先烈之墜當寧而流涕定國是之論堲讒而不惑正誣詆之罪必罰而無赦片言以難壬人坐籌而却大敵運量酬酢淵默雷聲主威以立搜兵選將開闢境土武功以昭左右僕御不見喜愠之色逮憑玉几神宇泰定若脫弊屣嗚呼非天下之至明孰能與此者髙宗之亮隂宣王之復古何以尚兹崇寧元年三月今上皇帝顧謂三省官曰西京寶慶殿成宜以蔡確配食確於哲廟有功方皇太后當從神宗靈駕西行確密上文字屬內臣閻守勤奏太后請留保護太后以故輟行晨夕常與之俱食以銅七箸飲水亦為之親嘗其年八月又宣諭是時姦臣誠有異意朕以親聞皇太后德音神考寢疾太后令守勤諭確弟碩使確輔立哲宗徐王數留禁中不肯出魏王牽臂引去確母入禁中皇太后使諭確外託主兵官燕逵并知開封府蔡京及哲宗即位羣臣多言廢立太后云章疏已焚之所須衣物或哲宗自買朕時尚幼哲宗最友愛時召至閣中飲食皆陶器而已臣等恭惟哲宗嗣位之初姦臣無禮若此蓋睿明淵默足以有臨終不能睥睨云新録辨云此論止是盛譽紹聖權臣能力排元祐未嘗發明哲宗聖德與祖宗實録末卷體制不同其間託為徽宗訓辭尤非恭順事皆誣詆今刪去前項四百八十一字新録别修云上聰明睿智見於夙成自初即位甫十嵗而臨朝尊嚴左右僕御莫能窺其喜愠天資好學在宫中博覽羣書祖宗寶訓實録皆詳閲數四居常淵默不言及侍臣講讀則反覆問難無倦色事宗廟盡孝每薦享必自廟門降輅步至齋宫雖盛暑却繖扇不御至神宗室未嘗不涕泗霑裳奉三宫竭誠均禮友愛諸弟無間言宣仁升遐姦人肆為誣謗上曰先后婦人之堯舜也於社稷大計聖意素定特羣小竊有窺度爾用事者假繼述以脅持上下言官請誅舊臣無虛日上獨罷激怒迎合之尤者以警其餘嘗語輔臣紹聖以來論熙豐善政元祐弊事者皆今日云爾昔日寧有是言乎常寵奬宗室王公耆夀而賢者俾判大宗正事以惇敘九族有災異輒責躬罷宴遊以祗天戒雨㿩小差必曲加詢訪唯恐病民若嘉雪應時則喜動顔色其憂民恤農如不及有司請復免行錢上曰須從民願勿強也又命減寬剩曰朝廷安侍此以佐邦用邪京師浚湟役兵冒寒遣使特加給賜常戒密院省邊事曰舉動不可不審當以生靈為意每行見昆蟲螻蟻未嘗踐履蓋仁厚出於天性云尤善知人灼見是非邪正以照臨百官中外罔有遁情如謂嘉問居厚輩誠不可用留邢恕於朝置周秩言路必無安靜之理皆切中隱慝蔡卞薦常立為侍從上曰立詆神考而卿薦之何也顧丞相惇曰卿未見其語乎命中使就史官取立父秩行狀指塗炭必敗等語示之惇卞皆頓首謝立坐是斥去一時權臣欲遣使嶺表置獄連逮元祐之臣欲盡誅之以快已意卒罷使不遣惟一人英斷是賴用能致十有六年之間天下晏然民用康乂追配祖宗殆無愧辭嗚呼盛哉紹興四年三月壬子今上皇帝顧謂宰臣朱勝非等曰神宗哲宗兩朝史録事多失實非所以傳信後世當重别修定著唐鑑范祖禹之子名沖者已有召命可促來令兼史事臣勝非奏曰神宗史緣添入王安石日録哲宗史經蔡京之手議論多不公今蒙聖諭命官刪修足以昭彰二帝盛美天下幸甚十八日丙申新除宗正少卿兼直史館范沖辭免恩命臣勝非奏曰沖謂史館専修神宗哲宗史録而其父祖禹當元祐間任諌官後坐章疏議論責死嶺表而神宗寶録又經祖禹之手令既重修則凡出京卞之意及其增添者不無刪改儻使沖預其事恐其黨未能壓服上曰以私意增添不知當否臣勝非曰皆非公論上曰然則刪之何害紛紛浮議不足恤也臣勝非曰范沖不得不以此為辭今聖斷不移沖亦安敢有請上復愀然謂勝非等曰此事豈朕敢私頃嵗昭慈聖獻皇后誕辰因置酒宫中從容語及前朝事昭慈謂朕吾老矣幸相聚於此他時身後吾復何患終有一事當為官家言之吾逮事宣仁聖烈皇后求之古今母后之賢未見其比因姦臣快其私憤肆加誣謗有玷盛德建炎初雖嘗下詔辨明而史録初載未經刪改豈足傳信後世吾意在天之靈不無望於官家也朕每念及此惕然於懷朝夕欲降一詔書明載昭慈遺旨庶使中外知朕修史之本意臣勝非進曰聖諭及此天下幸甚臣等仰惟神宗哲宗兩朝實録以今上皇帝聖意先定宰臣悉加刪修故具載聖語於篇末云邵伯溫辨誣云初哲宗升遐欽聖后曰吾每念宣仁后乃心朝廷而卒陷小人謗議蓋緣神宗寢疾之際用故事自大臣請立哲宗為皇子也於夜半自禁中立上皇羣臣不知明日垂簾問章惇曰先帝無子神宗諸子先帝兄也誰當立者惇曰以禮律推之同母弟簡王當立簡王與哲宗皆欽成皇后生於上皇為弟欽聖后曰老身無子諸王皆神宗庶子惇復曰當立長謂申王於上皇為兄欽聖后曰相公豈不知申王病廢不可以視天下申王有目疾惇尚欲有言樞密使曾布厲聲曰章惇聽皇太后處分簾卷上皇已立惇皇恐下殿後以為臣不忠貶雷州司户參軍蔡惇直筆哲宗少年乃染疾咯血而極諱病二三年間咯唾不能進唾壺只使左右內侍以帕子承唾唾皆有血內侍隨唾入袖不容人知無敢泄其病證國醫診視不許言氣虛弱養成瘵疾終不可治至元符三年正月十三日暴崩偶欽聖憲肅皇后在側欽成繼至乃號呌哲宗求一言已不應欽聖遂曵退曰他已説與我了徐問其言欽聖乃曰教我後要立端王欽成俯首而去尋宣召親王宰執問候令宰執由垂拱殿入禁內東門傳宣令端王先入頃召宰執至福寧殿下禁庭肅然章惇等再拜升殿叩簾欲入內侍曰皇太后在此惇却立欽聖遂發哭曰天下不幸早來官家忽然上仙官家無子當立誰惇對曰臣按禮與律當立嫡欽聖曰老身無子先帝諸子皆庶誰是嫡惇對曰當議親曰誰是親惇對曰同母為親曰相公是要立簡王今申王處長以病不可當天下老身已得大行言令立端王知樞密院曾布喝曰章惇不得辭説一聽皇太后聖旨欽聖曰端王已在此令卷簾時王已即位是為太上皇帝蔡惇直筆又云欽聖憲肅皇后宰相向敏中之曾孫虞部郎中經之女也神宗在潛邸選封潁國夫人治平四年春正月立為皇后哲宗即位為皇太后哲宗暴崩無子欽聖定册立太上皇帝上皇以章惇懷異意慮天下未信服懇請母后聼政乃作哲宗遺制端王某可於柩前即皇帝位請皇太后垂簾聼政欽聖令舉慈聖光獻皇后故事遂獨御內東門小殿見宰執奏事首下手書候哲宗袝廟畢撤簾初政下詔求言除去黨籍召用故老大臣復進忠良相韓忠彥罷黜章惇蔡卞一時輕躁險薄之徒相次斥逐朝廷清明四方安肅至哲宗靈駕發引欽聖下手書付三省樞密院更不候袝廟罷垂簾更不預事時元符三年七月也明年正月十三日崩欽聖所召故老忠良隨而引去其後遭姦臣謗讟變亂邦政二十餘年卒致覆亡之禍豈不哀哉曾布日録正月戊辰朔拜表於東上閣門又拜箋於內東門辛未宅引是日御藥劉友端傳宣三省密院罷初五日紫宸宴上自十二月苦痰嗽吐逆既早膳至晚必吐又嘗宣諭以腰疼便旋中下白物醫者孔元耿愚深以為憂以為精液不禁又多滑泄至是友端亦云疾勢雖向安然未愈壬申聚都堂同列皆以上疾為憂又傳宣五六七日權不視朝三日癸酉押北使朝辭宴於都亭驛是日北使止門辭受書已時赴坐未時罷酒十二行甲戍宅引乙亥英廟忌自是寒慘微雪又傳宣十一日酌獻差宰執十日奉安大定神御前後一日皆不坐乙亥余率三省入內求對問聖體起居晚遣劉友端傳宣以未可相見友端云自初六日晚再吐疾勢未退且云難言又泣下丙子宅引早出己午間得御藥院申上吐瀉未已脈氣微弱仍云因大病後失將理積久傷氣即時馳白三省約聚都堂未時再上馬入內又聞中批付三省在京寺觀作祈􅓙道場七晝夜夔方以大定奉安致齋余等皆以簡招之遂來都堂同赴東門請入問聖體御藥劉瑗劉友端蘇圭同傳宣云服藥漸安十一日決於內東門小殿中相見再請對不許遂退夔即惇也丁丑五鼓同三省赴景靈前導太宗神御赴大定至午時奉安退得中批付三省密院以復冒大寒臟腑為梗久未痊平令四京諸路降德音御藥又申上脈氣小弱余謂上服藥久方春發生何惜一赦及檢至和三年仁廟大赦衆皆然之遂至內東門求對須臾宣召福寧東閣中見上著帽背坐椅子但云臟腑久不能安服硫黃硃砂皆未效衆勉上以灼艾上云合灸即須灸余云一日不可緩須今晚便灸上云只今便灸又問德音遂言至和大赦不若更一赦為便上云更好余云已與三省草定進入送學士院次又乞下五嶽四瀆等處遣長吏祈禳從之遂退以翊日酌獻為名三省俱宿禁中戊寅同三省赴景靈分詣酌獻退赴內東門問聖體傳宣以夜來灼艾倦乏未可相見遂退聚都堂暫歸是日四御藥皆來傳宣云夜來逹旦灸百壯臟腑減一次亦纍進粥然初灸三十五壯方知痛五十壯已後痛甚醫者云脈氣未生舌強微喘約三省至未時再上馬赴都堂再詣內東門求對未上馬間御藥院又申即日已進硃砂七返丹及其他補助陽氣藥不少然自汗喘促未得脈順遂促三省上馬馳詣都堂至內東門須臾召見上坐御榻上頂白角冠披背子擁衾而坐上雖瘦瘁面微黑然精神秀峻真天人之表是時喘定汗止先是已同三省進余所服伏火硃砂二十粒大理少卿周鼎七返金液丹上云硃砂等皆已服喘亦漸定卿等但安心又問除齋醮外有何禮數余曰至和中曽於奉宸庫支錢設大會上云甚好退見醫官但云喘汗定乃乍靜脈氣大假虧減藥無不供進未有效遂各赴本省宿是日衆白上云臣等禮當逐日入問聖體得至御榻前一見已幸不煩更起坐及加冠服上云禮終不可闕衆云君臣義均父子乞不須如此五鼓得御藥院申醫官四更診脈氣愈微細自汗不止不宜更有增加遂起聚僕射廳黎明角門開詣內東門求對已卯至內東門尋便宣召至會通門見都知梁從政云已不可入至福寧殿東階立庭下垂簾都知已下云皇太后已坐再拜起居訖升殿太后坐簾下微出聲發哭宣諭云皇帝已棄天下未有皇子當如何衆未及對章惇厲聲云依典禮律令簡王母弟之親當立余愕然未對太后云申王以下俱神宗之子莫難更分别申王病眼次當立端王兼先皇帝曾言端王生得有福夀嘗啓云官家方偶不快有甚事余即應聲云章惇並不曾與衆商量皇太后聖諭極允當蔡卞亦云在皇太后聖旨許將亦唯唯夔遂默然是時都知押班御藥以下百餘人羅立簾外莫不聞此語議定遂退梁從政引坐於慈德宫南廡司飾閣前幕次中殿廷上下有哭者從政等呵止之令未得發聲余呼從政令召管軍及五王從政云五王至當先召端王入即位訖乃宣諸王少選引喝內侍持到問聖體榜子云諸王皆已來唯端王請假遂諭從政速奏皇太后遣使宣召久之未至余又督從政再奏遣皇太后殿使臣往趣召從之余又再召都知已下諭之云雖已聞皇帝大漸然宰執未曾親見乞入至御榻前從政云是是得旨令引入開御帳見大行已冠櫛小斂訖寢以衣衾從政等令解開覆面帛見大行面如傳粉余等皆哀泣但不敢發聲左右近習嗚咽涕泗榻上兩老㜮坐於左右都知以下送余等降階余謂從政等曰適來簾前奏對之語都知已下無不聞從政唯唯余又顧押班馮世寧等云總聞得余又謂端王至便當即位帽子御衣之類必已具從政云已有再聚幕次中議草遺制制詞皆二府所共草定然未敢召學士須臾報端王至遂宣入至殿廷余等皆從行端王回顧宰執側立揖甚恭又躬身揖都知已下至殿階引喝揖躬起居訖簾卷升殿余等皆同升至寢閣簾前皇太后坐簾下諭端王云皇帝已棄天下無子端王當立王踧踖固辭云申王居長不敢當太后云申王病眼次當立不須辭余等亦云宗社大計無可辭者都知已下搴簾引端王至簾中猶固辭太后宣諭云不可辭余等隔簾云國計不可辭聞簾中都知以下傳聲索帽子遂退立廷下少選卷簾上頂帽披黃背子即御坐二府都知以下各班草賀訖遂發哭再奉慰訖退赴會通門外幕次召學士承旨蔡京至相對慟哭遂草定遺制京親書訖召都知進入催閣門御史臺追百官班是時未宣遺制嗣君宮中人已來引喝內侍云皇后已在內東門候得旨宣入須臾姬侍從入者四十八人會通門猶一一點數放入移刻都知劉友方梁從政至幕次中宣諭云皇帝有指揮事召二府入對遂同入立庭下上御坐宣名奏萬福訖升殿上密諭章惇語聲低同列皆不聞余云臣等皆未聞聖語惇云請皇太后權同處分事上亦回顧余等云適再三告娘娘乞同聽政余云陛下聖德謙挹乃欲如此然長君無此故事不知皇太后聖意如何上云皇太后已許適已謝了乃敢指揮兼遺制未降可添入余等遂奉詔而退召蔡京及呼梁從政取遺制重修寫訖又呼從政等進入及指示以所添一節從政等色皆駭愕遂呼班班入慟哭福寧几筵內道場之類皆已具班定乃引宰臣升殿受遺制西向宣讀訖降階宰臣燒香奠茶酒訖又再拜方宣遺制時止哭然上下內外慟哭聲不可遏移班詣東序賀皇帝即位又奉慰訖宰臣親王嗣王執政皆升殿慟哭上亦掩面號哭是日余不覺與親王同升殿又方號泣與三省分班東向立退乃見親王在側宰執皆奏上以社稷大計乞少抑聖情哀泣又降階慰皇太后訖復升殿至簾前與親王等分立又奏皇太后已得聖旨於遺制中添入權同處分軍國事太后云官家年長聰明自家那裏理會得他事余等云皇帝宣諭云太后已許已謝了太后云只為官家再三要如此只管拜余云已降遺制願上體國計勉徇皇帝所請遂退是夕鎖院降登極赦先是大行服藥得旨以十二日午時宰臣詣中太一宫集禧醴泉觀開啓祈禱道場燒香又得旨十一日酉時大慶殿道場設醮亦宰執燒香遂議定夔與余燒香於中太一宫中書集禧左轄醴泉至十一日晚得御藥院申大行疾勢有加夔遂云惇更不赴太一宫只就大慶燒香衆相目轄云若不去時大家不去衆皆稱當夔亦云好遂入奏大慶改用午時開啓余先已語中書云此公多計數已而果然及俱不出其謀已沮然未知其意又以大行未卜疾勢如何未敢啓口然余竊計之萬一有變故唯端王年長當立無疑至是日早聚僕射廳余遂云天下事無大小然理在目前但以大公至正之心處之無不當者冀同列默喻此意及至簾前遽有簡王之請兼厲聲陳唯恐衆不聞及長樂宣諭衆議稱允渠亦更無一言但奉行而已余語中書云嘗言其多計果然但謀事踈率初欲獨留意欲専此事及倉卒又不謀於衆遽發此言殊可駭也本欲贏衆人及今如此所謂還著於本人也轄亦以為然余又云渠之言如此禍將奈何轄云此固不足論但於簡王有不安爾退赴資善堂晚復入福寧臨同百官自垂拱入是夕宿資善堂通夕不能寐廷臣哭多哀惟簡王哭甚哀睦王未嘗有淚左轄等皆訝之自是日赴朝晡臨徽宗實録元符三年正月己卯章惇等既於簾前承命立端王退至軒陛內都知梁從政等白召五王問疾惇曰姑召五王觀之蔡卞面折之曰皇太后聖旨已定復何議於是諭從政等以問疾為名召諸王諸王皆至內東門云云謹按曾布元符三年四月甲辰日録是日布及許將蔡卞同呈正月十二日時政記至章惇曰姑召五王觀之蔡卞面折曰皇太后聖旨已定復何議皇太后云不聞卞有此語卞遂云如此乞削去皇太后云不當入布退具以白上然則當日時政記固已削去卞語矣蔡京修哲宗實録貪天之功輒以私意增入紹興改修哲宗實録亦不暇考正徽宗實録更因二録皆非當日實事就令卞果有此語則不須更召五王今五王並召足明卞初無此語合依欽聖憲肅皇后聖旨削去十六字不入詔入內內侍省使臣四十人被甲守內東門殿前諸軍指揮使六十人坐甲於內東門之外增新舊城守門卒皇城司并諸門各增親從官命內侍省官四人各部親從官四百人巡警禁中差官十二人各將甲士二百人巡警皇城及新舊城至成服而罷殿前副指揮使姚麟乞守內東門外從之又差閣門通事舍人一人部禁兵五十人於軍器庫前稽察至晡百官入臨諸軍指揮使以上臨於宣祐門外自是朝晡臨自小祥至􅎭祭朝一臨軍使押班帥其屬哭於其營三日止輔臣宿資善堂宗室遙郡刺史以上宿崇政殿門之外至成服止是日詔取前省內臣馮説赴入內省説先給事陳貴儀閣嘗抱上紹聖被逐今復召入庚辰大赦天下實録前例赦書條目並合具載今録但載赦書首尾餘並削去非例也當考詳增入禁緣邊毋得侵擾外界務要安靜曾布白上曰大行不幸棄天下陛下入繼大統惟於事兩宫當盡禮上曰此固當爾蔡卞曰天下大計已定惟是先帝法度政事當持守布曰事止有是非若所持守於公議為是孰敢以為不然者詔皇太后權同處分軍國事並依嘉祐治平故事施行是日三省樞密院聚議尚書左丞蔡卞曰都知等來太常計會儀範許與不許之類先閲會要見天聖嘉祐垂簾故事皇太后稱吾臣僚上表答云覽表具知所請宜不許宜許及五日一垂簾同聽政臣僚起居皇太后訖移班起居皇帝皇帝坐在西乃皇太后之上皆天聖故事嘉祐末英宗請慈聖同聼政五日同御內東門小殿垂簾至七月十三日英宗間日御前後殿輔臣奏事退詣內東門簾前覆奏皇太后會要云皇太后勉徇上請同聽政而未嘗御殿百司亦不奏事惟中書密院詣內東門小殿覆奏事而已明年手書還政又故事惟慈聖不立生辰節名不遣使契丹若天聖元豐則御殿垂簾立誕節名遣使與北朝往還及避家諱等曾布問同列今日當如何處之章惇以下皆曰當具此二次故事稟旨布獨曰不然此事乃吾輩所當任若稟上旨恐難裁減若稟長樂亦難可否今上長君豈可垂簾聽政正當從吾等請如嘉祐故事施行乃為得禮衆皆以為當然卞徐曰卞猶疑之天聖元豐與今日皆遺制處分與嘉祐末英宗請聽政不同萬一為他人議論如此奈何布曰不然今日之事雖載於遺制實出自德音又是長君正與嘉祐事相似衆以為當卞亦曰須如此講議乃説到道理處遂同入劄子乞晚臨訖奏事退詣簾前覆奏尋得旨依奏此奏亦布所草定劄子中所乞奏事次第已如治平故事矣晚赴晡臨遂至東序起居訖升殿上服淺黃袍紅帶遂出嘉祐治平故事天聖故事更不將上進呈上曰恰一般布遂指五月同御小殿蓋英宗方服藥恐未嘗同坐至七月御前後殿即是英宗已安日御前後殿奏事退赴內東門覆奏今日正當用此故事又言雖遺制所載實出自德音正與治平事一般又言章獻時仁宗方十三宣仁時大行方十嵗陛下豈可坐簾中上甚悅曰事體雖當然且更稟皇太后聖旨布曰陛下長年聖德謙挹請皇太后權同聼覽今故事如此固當稟皇太后然足以見聖意謙屈曲盡事體同列亦皆稱賀及至簾前奏事進呈嘉祐故事如前太后曰相公等裁定惇等皆曰須稟聖旨太后又曰莫奏取官家指揮布曰適皇帝再三令稟皇太后聖旨兼此事是皇太后身分事皇帝實難裁處惇亦曰是太后面分事太后遂言皇帝長成本不須如此只為皇帝再三堅請故且勉從非久便當還政只如慈聖故事甚好惇等皆稱贊皇太后聖德謙恭德音如此實近世之所罕有布又曰既得旨不御前後殿惟三省樞密院於內東門覆奏職事則百司皆不奏事臣僚不上表章生辰不建節名不遣使契丹皆當如慈聖故事太后曰已知布又曰如此便批聖旨施行太后又宣諭曰皇帝所生陳貴儀當追贈皇太妃惇等愕然方覺思慮所未及唯唯奉詔又曰皇帝以申王是兄欲優加禮數惇等皆曰聖意如此甚善又宣諭曰皇帝欲先次優與官封惇等皆曰來日便進呈鎖院降制太后曰好又奏大行皇帝皇后當别建宫殿名號容續具奏稟緣不可居坤寧太后亦曰好自初奏事簾下見上只立於太后坐側及言申王事又於椅子後附耳語太后故又再宣語是日宰執各賜酒食皆短表謝知客司白親王以下皆用兩表曾布曰不須蓋已得旨也又謂同列曰奏事先奏皇帝次覆奏太后如今日所得指揮遂為定式矣宣政使萊州防禦使入內副都知吳靖方宣慶使密州觀察使入內押班藍從熙為都大管勾山陵事景福殿使明州觀察使入內押班馮世寧提舉製造梓宫兼按行山陵使宣慶使髙州刺史內侍押班閻安副之捧日天武四廂都指揮使昌州刺史賈嵒宣慶使瀛州防禦使內侍押班宋用臣為修奉山陵都監初議差都監欲取旨曾布曰若欲得人非用臣不可必能省費愛惜役兵以用臣素善使人故也衆然之遂擬進而有是命遣閣門通事舍人宋淵告哀於遼國辛巳皇太后手詔付中書省曰皇帝踐阼之初勉從勤請非久便當退歸房闥除不御前後殿有指揮外如回避家諱之類並勿施行是日皇太后謂輔臣曰上聰明莘王以下皆不及又曰上性仁慈見笞責人亦畏曾布曰大行雖不幸早棄天下然今上嗣立皆神宗之子亦近所罕有章惇曰神宗留意政事更張法度為萬世之利此福報也蔡卞曰臣等皆神宗拔擢惟謹守神宗法度所以報德皇太后必盡知神宗政事本末惇曰神宗政事如此中間遭變亂可為切齒太后嘆息布曰臣首被神宗識拔於政事法度無所不與所擢人材今日用之者皆是太后曰相公等皆神宗舊臣且更與輔佐官家布曰臣在熙寧中聞神宗省覽文字嘗至深夜左右未嘗有婦人其厲精憂勤如此太后曰官家性勤篤必似得神宗布曰此宗社天下之福也詔三省樞密院集侍從官議太平興國二年所用是何服紀速指定聞奏謹按太平興國元年太宗為太祖服三年其二年十一月從宰臣薛居正等請宴大明殿始作樂故朝議或疑當時但服期非三年者有詔集議詔旨載當時本語實録改云以太平興國二年所用服紀詳定聞奏其語不了了今合從詔旨又當時但詔三省集官知樞密院曾布與宰相章惇爭言樞密院不可不與議惇從之今合增入樞密院三字癸未奏合行三年喪亦合增入樞密院三字乃不失實御批但付三省章惇遣堂吏白曾布布答以批付三省恐密院不當與惇遂已翌日布乃謂惇曰密院不與集議有三不可太后手詔三省并陳太妃追册申王加恩向宗回等進官皆非密院職事得旨同行而此獨不與一不可也侍從官皆與議而獨密院不與二不可也三省若同上密院不可先退須别班奏事恐於體未安三不可也惇矍然曰是不可不與許將蔡卞後至亦曰當同議布曰此事若為私計則不須與以國事言之則不敢辭衆然之退召從官禮官合議初太常少卿曾􅌈舉興國故事以為不妨舉樂蔡京曰三年喪無疑緣兩宫及羣臣皆行三年喪若舉樂誰與同聽者兼今上嘗北面於大行自是君臣無疑布問從官曰蔡承旨之言是否衆皆曰是惇遂詬􅌈曰既是合行三年喪因何却言舉樂自不相妨􅌈頗飾非喋喋惇聲色益厲布曰不須爾此是國初草創有司講求未至若云不相妨即不當衆皆咎􅌈􅌈亦屈仍曰昨十數次來促文字若不如此必更怒布曰此尤不可禮官當執典禮豈可言怒况何以知有怒意惇又厲聲詬之曰亂道􅌈怒曰亦不是失職布曰太常所定顯是不當須如此聲説衆從官等皆曰當如此吏部侍郎徐鐸兵部侍郎黃裳默然布與蔡卞問之亦皆曰是遂令退草奏狀晚得所奏遂具劄子繳進云合行三年之喪詔恭依晚禮直官張子諒來言劉瑗問皇帝未成服間合繫紅帶否子諒答以羣臣皆黑帶恐不可御紅帶瑗曰何故子諒曰皇帝於大行稱臣否瑗曰是先是布已為同列言服紅帶未當次日見上止服黃背子不繫帶向宗回等進官附二十八日實録於十六日乃書三省奏侍從官禮官議合行三年喪詔恭依今并入此又詔皇太后皇太妃合增崇禮數令禮部太常寺具典故以聞又詔大行皇帝皇后宫殿並以元符為名仍號元符皇后先是曾布白上興國中行孝章皇后禮數未至當務從優厚上曰太后亦知此事又呈元符宫殿布曰宫稱元符宫殿為元符殿仍號元符皇后或請以皇儀殿處之衆皆曰興國中孝章故事不可用及覆奏皇太后曰神宗每以孝章事為未安嘗曰若使二哥為之謂岐王皓即是爾樣子言訖泣下章惇曰神宗亦嘗諭輔臣云處之太薄賜在京班直諸軍并諸路駐泊禁軍軍員衣帶有差詔中書省已降赦書優賞諸軍將士慮諸路錢物有未足處許轉運司於别司應係官及封樁錢物內借支不得執奏仍以數聞户部乞依元豐八年優賞諸軍則例其價直依太府所估從之壬午詔增崇皇太后儀物並如宣仁聖烈皇后故事唯不鳴鞭不用馬隊及茶酒班殿侍奏薦及度僧等不限人數臨時取旨禮部言檢會故事應天下山川地名并人名姓字有犯御名及音同者令即改其州府軍監縣鎮官司及敕賜名額宫觀寺院奏取指揮從之癸未追尊貴儀陳氏為皇太妃三省奏請故皇太妃塋域合加崇奉及將來奉册典禮令禮官檢詳典故講議聞奏并下所屬置官兵守護詔恭依先是皇太后宣諭太妃塋域當如何章惇遽曰臣等曾議當即塋為園曾布止之曰當自有典禮須令有司集議衆皆謂當如此布曰塋在奉先太后曰然布曰當改卜否太后曰地好恐不須改布録在十二日癸未二月十一日戊申同進呈責診視大行皇帝醫官秦玠孔元耿愚等並除名勒停編管奪官罰金有差羣臣上表請皇帝聽政詔答不允自是五上表乃從之三省樞密院奏集侍從官禮官議合行三年之喪詔恭依此已見十五日合刪命宰臣章惇撰大行皇帝陵名及哀册文知樞密院事曾布撰諡册文中書侍郎許將書哀册文左丞蔡卞書諡册寶翰林學士承旨蔡京撰諡議宣慶使瀛州防禦使內侍押班宋用臣為入內副都知是日中批付密院內侍押班及帶御器械皆闕官合擇曾經邊任有戰功無過犯私罪徒情重資考深三五人具名進入蓋用臣已遷閻安又副馮世寧按行山陵前省全闕人故有是命曾布以著令兩省押班乃三省同除遂白三省云此事當同奏皆然之布因言適凖御批令選內臣大使臣充押班帶御器械已下吏部取索臣不能悉記姓名然有戰功如全惟幾之類恐不可充此選臣嘗聞神宗宣諭云兩省都知押班非性行溫良者不可為之蓋其間多粗踈不平穩以至帶御器械亦須次補押班亦不可不擇上曰不平穩人固不可用但具名進入當更與執政商量密賜章惇金三百兩曽布許將蔡卞各二百兩小龍茶一斤甲申太常寺奏成服儀式百官奉慰皇帝訖詣內東門進名慰皇太后皇太妃皇后從之曽布詰太常寺曰百宫初移班慰皇太后今何以進名太常寺對以奏得旨蓋皇太后以不御殿故不肯受百官慰也賜內直長上諸班緡錢有差是日命宰臣章惇為山陵使吏部侍郎徐鐸為禮儀使工部侍郎黃裳為鹵簿使御史中丞安惇為儀仗使權知開封府吳居厚為橋道頓遞使度支郎中王韶兼權京西路轉運使應副山陵户部工部奏應奉山陵工料京西轉運司及西京河陽等處各有元豐八年例自當遵用如案籍不存許用治平嘉祐故事輒敢隱匿增減不實並以違制論不以去官赦降原減從之乙酉分遣三省官以先帝升遐嗣君即位告於天地宗廟社稷遣內侍告諸神祠命使臣劉安民等告諸路官吏兵民等布録二十八日乙未是日又呈劉安民狀云元符皇后家乞依三后家入內上云后妃家自當入許將云他不止欲入臨却云生辰上夀及非時進奉慶賀皆欲依三后家入內上云后妃家自當如此將默然安民此狀投已久纍日前欲將上而蔡卞止之將亦蓄縮曾布嘗與章惇密論卞舉措如此可歎及聞德音皆有愧色布則不然入國首命朱孝孫告諭首差劉安民安澤卞最為大行眷顧一旦遂爾殊可嗟也詔閉月臺罷遣延春閣後苑宫門親從官四十人皆紹聖後郝隨劉友端等所創也月臺在大內西北隅下瞰大水門制度極華靡都人夜見燈火及聞樂聲者皆以手加額上初令毁撤既而用日官言但改為置仙佛像之所云實録但云詔閉月臺罷遣延春閣後苑宫門親從官四十餘人事首末不備今用曾布日録增修二月二十五日逐隨及友端以大行皇帝遺留物賜輔臣及前宰相執政官有差左藏庫使帶御器械張承鑑為內侍省押班供備庫使麥文炳帶御器械詔旨在乙酉先是上令密院具三五名進入密院言取索唯此二人可與選外有梁安禮全惟幾髙偉李元嗣雖經邉任有戰功竊慮人材性行難以與選既而中批止用所選兩人丙戌詔求故皇太妃親屬二十一日付出譜系皇兄保平泰寧軍節度使守司空開府儀同三司申王佖為守太傅京兆尹兼真定尹永興成德軍節度使進封陳王賜贊拜不名加食實封邑餘如故申王佖為太傅徙封陳王賜贊拜不名只如此書亦可曾布言此已下並曾布日録在十六日癸未今依實録係之十九日丙戍此只合書曽布言實録書樞密院言非也朝廷自近嵗以來經營邊事無不如意今西夏已進誓表邊事遂且休息昨為青唐董戩為鄂特凌古篡位鄂特凌古死其子轄正又嗣立國人不順故迎董戩姪溪巴烏欲復其國姓既而國亂首領多歸溪巴烏轄正不能自立遂出降而溪巴烏之子隆贊乘間入青唐稱王子邊臣欲因有其地乃渡河據邈川以重兵臨之故隆贊亦出降朝廷即以青唐為鄯州邈川為湟州既而部族多叛覆軍殺將今又引兵圍磋藏城城中亦有將佐士卒尚未聞勝負上謂曾布曰事須卿等措置布曰臣等固不敢不盡力然蕃情未安未敢保其無事近已降詔旨以隆贊為河西節度使令如府州折氏世世襲知鄯州庶蕃情稍服事已如此但且隨宜營救維持而已上曰善又言伏聞李彀押隆贊等赴闕已止令留在京西聽旨緣引見須在聽政後除服前兵衛難以粗衰裹護欲令二月九日到闕十二日赴同文館聞大行皇帝本欲御樓受降今恐難用此議但於後殿引見可也以至諸軍素隊排立樓前仗衛皆當罷從之詔尚書省官權於門下中書省治事上批付三省以尚書及從官闕令與樞密院參議具前執政十人餘可充從官者二十人姓名進入章惇曾布等聚議以陸佃曾肇龔原郭知章及蔣之竒葉祖洽邢恕等名聞奏布曰葉濤亦當與選惇曰如此則王古范純粹亦當與蔡卞初難之既而曰濤亦不妨但須并朱服不可遺爾丁亥以前執政及從官等姓名面奏吕惠卿居首上據指之曰且令在邊次至韓忠彥上曰此當召又次至李清臣布曰以婦人狂言故罷政本無事上曰馬上共見是日親王宰執皆扈從卞曰更别因一事削職布曰只為不進呈明氏狀更無事次及黃履上曰此三人皆可召布又指安燾曰陛下知此人否元豐末舊人皆去唯燾至元祐四年丁憂乃罷上頷之至林希無所可否次及蔣之竒上曰亦當召兼學士見闕又及葉祖洽布曰在先朝無所附麗亦可用上許之次及葉濤布曰嘗為中書舍人有氣節敢言可用次及邢恕并朱服三人惇獨指濤曰惟此人可用又陸佃郭知章龔原曾肇上亦曰皆可擢衆皆曰肇在神考時已為館職布曰兩曾修史昨以修實録得罪然實非元祐之黨上然之次覆奏於簾前所陳如上皇太后曰元豐末衆人皆去惟安燾不去是不正當并上所取捨皆合公議布因曰皇帝皇太后洞照人材如此臣等更無可言者布録二十日丁亥進呈實録云詔三省以闕執政官及六曹長二令具前宰臣執政侍從官姓名及取寺監可補從官者十人以聞按曾布記此事甚詳初不聞執政闕官但欲取前執政補尚書耳不知實録何所據恐誤今從布日録實録蓋用御集所載正月十九日手札疑御集亦誤也合改修云內批付三省以尚書六曹長二闕官令樞密院參議具前執政十人餘可充侍從者二十人姓名進入戊子金紫光祿大夫尚書左僕射兼門下侍郎章惇為特進申國公左正議大夫知樞密院事曾布為右光祿大夫右光祿大夫中書侍郎許將為左光祿大夫右正議大夫尚書左丞蔡卞為左正議大夫皇弟守司空開府儀同三司武寧鎮寧節度使莘王俁為河東奉寧節度使進封衛王守太保檢校太尉開府儀同三司橫海鎮江節度使簡王似為武昌武威節度使進封蔡王檢校太尉開府儀同三司鎮安集慶節度使睦王偲為清海鎮海節度使進封定王並守司徒皇叔祖檢校司空開府儀同三司彰德軍節度使嗣濮王宗漢為寧江節度使檢校司徒檢校司空武勝軍節度使吕惠卿為鎮南軍節度使檢校司徒寧逺軍節度使髙公繪為保靜軍節度使檢校司空殿前副都指揮使武康軍節度使姚麟為建雄軍節度使殿前指揮使檢校司空昭慶軍留後宗絳為昭慶軍節度使保寧軍留後仲損為保大軍節度使鎮寧軍留後仲御為保寧軍節度使安北軍留後仲賜為保康軍節度使寧德軍留後駙馬都尉錢景臻為安德軍節度使檢校司空二月三日布録三省呈親王嗣王吕惠卿髙公繪姚麟移鎮宗絳仲御仲賜及錢景臻等自留後除節旄宰執皆遷官以登極恩也是夕鎖院降制今依舊録先見於此觀文殿大學士太子少師致仕蘇頌為太子太保右正議大夫資政殿學士致仕王存為左正議大夫羣臣皆以次序遷布録二月四日云云已見本月日內出故皇太妃親屬譜系付中書省十九日求親屬謹按實録稱皇太后誤也詔旨及曾布日録並同今合改后字作妃字詔樞密院具曾任管軍及堪充管軍人姓名以聞曾布言管軍今止闕三人有王愍者嘗管軍因邊事得罪罷絀恐當用赦敘復上深然之又言劉安張存折可適等皆邊人不可用姚雄姚古皆麟之親姪至苖履上遽曰此可作管軍衆皆曰然許將蔡卞又曰大行亦纍欲進擢布初謂惟履一人可與選以親嫌不敢啓口而上遽已及之布稱善而已罷紹聖後八廂所增探事人布録云皇城司申傳宣八廂探事紹聖以後事添差十六人並放罷實録削去紹聖以後字不分明今合增入考十六人字疑布録或誤今不書己丑進封皇太后皇太妃元符皇后故皇太妃三代布録二十三日庚寅呈故太妃贈三代條格當得三少用聖瑞例當得東宫三師夫人封次國而聖瑞昨以嗣父崔傑未贈官初贈太尉母封大國曾布曰當用此例緣故太妃曾祖乃正任防禦使父遙郡不可卑於未有官者曾祖母而下皆當封大國上以為然蔡卞猶再稟云父贈太尉祖及曾祖贈三太或便贈三師衆曰如此恐不倫遂贈太保太傅又呈太后聖瑞元符三代皆如故事及覆奏於簾前太后亦云崔傑初贈太髙然今日不可不用此例庚寅詔隨龍人昭宣使遙郡刺史劉瑗特授宣政使遙郡防禦使應隨龍內臣及長宿車子登位日供承翊衛內臣四人張琳張祐等各遷兩官餘一官親事官諸軍三省行首司內知客醫官等各轉兩資先是三省樞密院同呈治平隨龍人例有官者各遷一官親事官以下各轉一資上以為太薄故有是命謹按隨龍人遷轉恩例不可不具載使後有考而實録並闕之非法也今據曽布日録刪修詔內侍省官因元祐責降之人如藤州羈管梁知新萬州監稅曾燾並與依例轉官兼內侍省見今闕官應見責降在外監當人已經大赦放還赴省供職入內內侍省人因黜責降充前省者悉召還入內內侍省東頭供奉官管勾西京嵩山崇福宫閻守勤寄左藏庫副使添差勾當御藥院詔朝散郎諸王府記室參軍徐績承議郎諸王府侍講何執中各遷一官並為寶文閣待制績提舉醴泉觀兼侍講執中提舉萬夀觀兼侍講辛卯大行皇帝小祥羣臣臨慰如儀壬辰以大行皇帝喪二七日羣臣朝臨於福寧殿自是每七日皆朝臨羣臣奉慰如儀禮部請依故事內外臣庶軍營至禫除後文武臣僚之家至山陵祔廟畢並許嫁娶又請依故事三京諸道軍民至卒哭東京軍民及三路沿邉臣僚至祔廟其餘文武臣僚至三年乃聽用樂並從之户部言近遣官往淮浙江湖京東福建路剗刷合應副北郊錢物今緣應奉山陵之費不資尤賴外路資助欲望朝廷申戒諸路及所遣官遵依昨降敕命剗刷起發從之仁宗淑妃周氏進貴妃媫妤張氏進充儀才人楊氏進美人英宗才人張氏進媫妤才人鮑氏進美人張氏進媫妤神宗淑妃邢氏進貴妃媫妤武氏進昭儀賢妃宋氏進德妃媫妤張氏進婉容媫妤馮氏進修容才人勾氏進美人淮陽郡君郭氏進才人先是皇太后諭輔臣曰先朝嬪妃當進封曾布曰外廷皆不知姓名皇太后曰待批出遂遞遷之降大行皇帝乳母魏國福康惠佑夫人竇氏為扶風郡夫人樂安郡夫人李氏為隴西郡君永嘉郡夫人陳氏為潁川郡君司闈馬氏為掌闈司正白氏為典正司贊王氏為典贊才人韓氏為紅霞帔以大行皇帝彌留侍疾無狀及蔽匿不以聞故也建中靖國九年五月己巳竇氏復魏國夫人陳氏復郡夫人白氏敘封司字馬氏敘封典字以責降逾年故也王氏韓氏不見敘復皇太后諭云先朝妃嬪當進封又云大行乳母竇氏并本殿中伴人久在大行左右自去嵗來大行飲食不進至有全不進晚膳時一切掩覆並不曾來道直至疾勢已深尚不肯言理當削須降黜又韓才人者不是房院此直大行服藥猶使性氣不會事亦當削髮且與一紅霞帔名目令往守陵因慟哭布等亦哭又宣諭云大行病已深尚未盡知一日忽使人來云今年上元上樓不得珠子衣服亦著不得須且罷觀燈方驚駭去嵗太后為不安不曾上樓大行每云娘娘不上樓來殊冷淡今年且上樓來却忽見如此傳語元來病勢已重尚未詳知又慟哭先是陜西轉運判官秦希甫在河州嘗以所見具奏曰熙河既受轄正之降以兵至青唐即求嘉勒氏之後或只令隆贊承襲方合人心據地里從河州至湟州二百四十五里道路險厄不通車乘惟是頭口馱載人夫擔負斡楚峽中多遇冦掠道無宿頓人無飲食畜無芻秣顧到頭馱及管押之人如赴死地即今欲全師而歸已是難事緣鄯州招下新羌萬餘人若一離本處皆為讎敵望朝廷早追隆贊及三偽公主入鄯州分付降羌令自撫循求故主溫錫沁之後守湟州徐議引出尚為萬全之計於朝廷存亡繼絶之道兩無虧損漢罷朱崖郡棄輪臺皆盛德事未為國恥今所陳事機間不容息乞早措置萬一後時邊禍不輕臣及州郡官吏雖被重誅無益成敗然猶未敢深言後患也熙河蘭會經略使胡宗回怒其異已數沮之希甫乞移他官是日三省密院同進呈曾布請并以前後臣僚章疏論鄯州棄守利害不同者備録送宗回希甫公共叶心體度邊情具果決指定可守可棄事狀聞奏如有可守之理而輕易廢棄或不可強守而妄稱可守致誤措置當重行典憲如挾私避事故相違戾亦當根究理曲之人竄黜仍令宗回計置般運糧草布因言青唐本以國人不平鄂特凌古父子篡位故逐轄正而立隆贊邊人因而欲有其地臣自事初纍曾力爭以為不可為及轄正隆贊相繼出降宰臣率百官稱賀建置鄯州臣不敢復啓口然西蕃尋復反叛亦纍於大行前敷陳以為此事本不可為業已建置州郡頒告天下百官四方上章稱慶一旦棄之豈不取笑中外今於不得已中但當盡力醫治拯救若鄯州不可守猶當西守湟州東建洮州以相維持且以成先帝謂神宗以熙河洮岷為一路詔旨其後賊愈猖獗至覆軍殺將遂降旨以隆贊為河西節度使知鄯州與王贍同為隴右都護同管勾軍馬司公事然議者尚以為隆贊父子恐未肯聽命亦纍下胡宗回秦希甫令具鄯州合棄守利害聞奏今更責以果決指定棄守事上曰如此行遣亦已盡矣布又曰自紹聖已來經營邊事進築城寨五十餘所無不如意臨了作此一事至今狼狽了當不得無如之何承議郎太僕少卿趙􅀈卒實録有傳當别考詳癸巳羣臣瞻大行皇帝畫像於集英殿哭盡哀而出追封秦國惠和大長公主為魏國越國賢惠大長公主為燕國甲午進封周國大長公主為燕國楚國為吳國秦國為越國曹國長公主為冀國定國為韓國德國為慶國封德康公主為榮國懿康公主為嘉國乙未相州觀察使向宗回為彰德軍留後利州觀察使向宗良為昭信軍留後先是上謂輔臣曰皇太后只有二弟當優與推恩蔡卞曰與節使曾布曰觀察使覃恩恐只合移鎮如此是轉兩官兼節鉞非轉官可比然紹聖初大行初親政太后太妃家亦各轉官上曰如此更以上有何恩數卞曰使相布曰此尤不可輕授上亦默然布又曰朱伯材任瑜恐亦當遷紹聖初遷兩官上曰不同且近後既而上令與宗回宗良建節輔臣覆奏太后曰不可外人將謂才聽政便以濫恩及私家決不可布曰皇帝聖意甚堅再三云太后親弟唯此兩人太后曰固是如此然必未可若皇帝欲爾亦須俟禫除别議布録十四日上始欲以宗回宗良恩命與申王同日降制輔臣具以聞太后曰與申王同日遷改豈不取笑中外但且緩之布録二月四日尋得御批云且依例推恩其節度使指揮未可施行布録十四日及是皇太后謂輔臣曰本不須同聽政止為官家堅請禮數過當皆對曰慈聖作后時曹佾已為節度使太后曰只有二弟然皆不近道理曾布曰佾人才亦至尋常太后曰宗回怎生得似佾蔡卞曰宗良亦簡靜太后曰却是傳範不可得今有三叔父皆未曾霑恩布録二十八日乙未三叔父推恩在二月十三日庚戍故皇太妃長兄右班殿直陳永成為內殿承制閣門祇候次兄三班借職永清為東頭供奉官看班祗候其餘內外親族命官有差上謂永成等恐不可令在閣門曾布曰日久自習熟今但當免祗應耳李用和例極髙此止用仙逰夫人弟任澤除供奉官例爾上乃許布録己丑是日上又語輔臣以尚書從官闕人曾布曰姓名已進入上曰只是韓忠彥李清臣黃履三人安燾不堪其次從官如何布曰陸佃曾肇龔原郭知章及葉濤等恐可除上曰蔣之竒布曰葉祖洽亦是上曰待批出布又曰不唯從官執政亦闕本是八員今止有其半章惇曰三省密院各只一人上亦曰少一半蔡卞遽曰此尤不可不審至簾前布白太后上旨又及尚書從官闕臣等奏云姓名已進入在聖斷裁處因言前執政只三人惇遽言元祐措置邊事皆韓忠彥昨至紹聖二年西人分畫地界捉過説話指揮使云曾布欲一變邊事忠彥猶云待捉了髙永能後商量永能乃本路鈐轄亦商量地界官曾布曰此時無面目見天下人方屈服安燾尤甚以為汝遮先帝不敢築今何可議其後進築乃在汝遮二百五十里外布曰忠彥誠有此言然亦柔順易屈服安燾誠拗強難與議事惇曰忠彥若在朝廷亦做邊事不得遂退先是上又嘗語及人材布曰陛下踐阼之初中外觀望凡號令政事進退人材不可不謹及至簾前又以此奏蔡卞曰只是恐有人援引譏毁先帝之人望皇太后主張照察布曰同是臣子古人有言見無禮於其君者如鷹鸇之逐鳥雀亦必無此理卞退謂布曰公之言甚好然外人已傳召梁惟簡歸此不可不慮布曰公但安心蘇軾轍輩必未便歸也其他則未可知耳尋批出除忠彥等七人忠彥以資政殿大學士知大名府除吏部尚書李清臣以資政殿大學士知真定府除禮部尚書黃履以右正議大夫知亳州除資政殿大學士提舉中太一宫兼侍讀惇嘗言前執政有例作經筵故履有是除又以集賢殿修撰知蔡州陸佃為吏部侍郎集賢殿修撰知和州郭知章為工部侍郎集賢殿修撰知海州曾肇為中書舍人集賢殿修撰知潤州龔原為祕書監兼侍講三省得御批即施行布謂惇曰昨御批本令密院參議進入姓名今乃不見御批何也尋呼堂吏詰責惇遣吏白布此依官制不敢鹵莽布曰然則御批違官制也賜前宰相執政官及宗室戚里衣帶器幣有差以登極恩也先是大行遺賜密院先已得旨支給及是與三省同呈前宰執不帶職者及張敦禮等責降人恐合依例與登極恩賜上及太后皆以為合支給三省言張敦禮章疏詆毁神宗政事云始於王安石成於蔡確是神宗朝無一事是也太后曰自家戚里不合管他朝廷事然當時行遣得他亦太重是日上批付三省密院云秦希甫等奏鄯湟州利害不同已劄付希甫令般運糧草等應副及令於經略司及提舉司常平等應不許支借錢物內借支三十萬去訖令三省密院更詳議腳乘合應副事件疾速施行又令城寨未得倉卒興工别聼處分丙申章惇曾布入對因擬定希甫所乞調發陜西一路人夫保甲難議施行外已盡許顧秦州車乘頭口又通逺軍等處亦有可顧召如不足更以差去廂軍相兼般運候有備於春夏以來漸次先後進築鄯湟一帶堡寨如鄯州不可守亦須極力營辦為固守湟州之計餘依御前劄子指揮施行上深然之布又曰此乃不得已也如前所奏醫治拯救而已上曰未棄捨間須極力應副惇曰聖諭如此曲盡事情矣丁酉太史局言大行皇帝山陵斥土用四月四日啓菆用七月十一日靈駕發引用七月二十日大葬用八月八日從之詔山陵制度並依元豐八年例施行江淮等路提點坑冶鑄錢兼措置銅事王奎言諸處新坑有用官錢令坑户開發去處若至礦寶浩瀚還納官錢了當外有礦寶除填納不問多少並係元管開發新坑户賣錢入已顯屬僥幸今相度諸路坑場如有坑户係用官錢開發坑壠若遇礦寶除填納官錢了當外有剩錢分給施行從之會要有此三年正月二十九日事十一月九日可考
